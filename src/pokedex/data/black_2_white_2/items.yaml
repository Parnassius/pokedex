  descriptions:
    jp_kana: "ポケスロンの　きろくが　はいっている。\nポケモンの　こうたい　かいすうが\nきろくされた　カード。"
    jp_kanji: "ポケスロンの　記録が　はいっている。\nポケモンの　交代　回数が\n記録された　カード。"
    en: "It holds Pokéathlon records. It’s a\ncard that shows how many times you’ve\nswitched Pokémon."
    fr: "Contient vos données du Pokéathlon.\nSur cette carte est inscrit le nombre\nde fois où vous avez changé de Pokémon."
    it: "Contiene i tuoi dati Pokéathlon.\nSu questa Scheda è registrato il\nnumero di sostituzioni di Pokémon."
    de: "Speichert deine Pokéathlon-Rekorde.\nDie Karte zeigt, wie oft du deine\nPokémon ausgewechselt hast."
    es: "Contiene los datos del Pokéathlon\ncon el número de veces que has cambiado\nde Pokémon."
    ko: "포켓슬론의 기록이 들어 있다.\n포켓몬의 교체 횟수가\n기록된 카드."
data_card_24:
  names:
    jp_kana: データカード２４
    jp_kanji: データカード２４
    en: Data Card 24
    fr: Carte Mémo24
    it: Sch. Dati 24
    de: Datenkarte24
    es: T. Datos 24
    ko: 데이터카드24
  descriptions:
    jp_kana: "ポケスロンの　きろくが　はいっている。\nスマッシュゴール　１い　かいすうが\nきろくされた　カード。"
    jp_kanji: "ポケスロンの　記録が　はいっている。\nスマッシュゴール　１位　回数が\n記録された　カード。"
    en: "It holds Pokéathlon records. It’s a\ncard that shows how many times you’ve\nwon Goal Roll."
    fr: "Contient vos données du Pokéathlon.\nSur cette carte est inscrit le nombre\nde victoires à la Balle au But."
    it: "Contiene i tuoi dati Pokéathlon.\nSu questa Scheda è registrato il\nnumero di vittorie a Piazzagoal."
    de: "Speichert deine Pokéathlon-Rekorde.\nDie Karte zeigt, wie oft du beim\nTorschießen den 1. Platz belegt hast."
    es: "Contiene los datos del Pokéathlon con\nel número de victorias en Metegoles."
    ko: "포켓슬론의 기록이 들어 있다.\n스매시골 1위 횟수가\n기록된 카드."
data_card_25:
  names:
    jp_kana: データカード２５
    jp_kanji: データカード２５
    en: Data Card 25
    fr: Carte Mémo25
    it: Sch. Dati 25
    de: Datenkarte25
    es: T. Datos 25
    ko: 데이터카드25
  descriptions:
    jp_kana: "ポケスロンの　きろくが　はいっている。\nこじんしょう　かくとく　かいすうが\nきろくされた　カード。"
    jp_kanji: "ポケスロンの　記録が　はいっている。\n個人賞　獲得　回数が\n記録された　カード。"
    en: "It holds Pokéathlon records. It’s a\ncard that shows how many times your\nPokémon won individual prizes."
    fr: "Contient vos données du Pokéathlon.\nSur cette carte est inscrit votre\nnombre de prix individuels."
    it: "Contiene i tuoi dati Pokéathlon.\nSu questa Scheda è registrato il\nnumero di premi individuali."
    de: "Speichert deine Pokéathlon-Rekorde.\nDie Karte zeigt, wie oft eines deiner\nPokémon den Einzelpreis gewonnen hat."
    es: "Contiene los datos del Pokéathlon con\nel número de premios individuales."
    ko: "포켓슬론의 기록이 들어 있다.\n개인상 획득 횟수가\n기록된 카드."
data_card_26:
  names:
    jp_kana: データカード２６
    jp_kanji: データカード２６
    en: Data Card 26
    fr: Carte Mémo26
    it: Sch. Dati 26
    de: Datenkarte26
    es: T. Datos 26
    ko: 데이터카드26
  descriptions:
    jp_kana: "ポケスロンの　きろくが　はいっている。\nポケモンを　タッチした　かいすうが\nきろくされた　カード。"
    jp_kanji: "ポケスロンの　記録が　はいっている。\nポケモンを　タッチした　回数が\n記録された　カード。"
    en: "It holds Pokéathlon records. It’s a\ncard that shows how many times you’ve\ninstructed your Pokémon."
    fr: "Contient vos données du Pokéathlon.\nIl y est inscrit le nombre de fois\noù vous avez touché vos Pokémon."
    it: "Contiene i tuoi dati Pokéathlon. Su\nquesta Scheda è registrato il numero\ndi volte che hai toccato i Pokémon."
    de: "Speichert deine Pokéathlon-Rekorde.\nDie Karte zeigt, wie oft du deine\nPokémon mit dem Touchpen berührt hast."
    es: "Contiene los datos del Pokéathlon\ncon el número de veces que has\ntocado tus Pokémon."
    ko: "포켓슬론의 기록이 들어 있다.\n포켓몬을 터치한 횟수가\n기록된 카드."
data_card_27:
  names:
    jp_kana: データカード２７
    jp_kanji: データカード２７
    en: Data Card 27
    fr: Carte Mémo27
    it: Sch. Dati 27
    de: Datenkarte27
    es: T. Datos 27
    ko: 데이터카드27
  descriptions:
    jp_kana: "ポケスロンの　きろくが　はいっている。\nポケスロンで　あそんだ　じかんが\nきろくされた　カード。"
    jp_kanji: "ポケスロンの　記録が　はいっている。\nポケスロンで　遊んだ　時間が\n記録された　カード。"
    en: "It holds Pokéathlon records. It’s a\ncard that shows how much time you’ve\nspent in the Pokéathlon."
    fr: "Contient vos données du Pokéathlon.\nSur cette carte est inscrit le temps\nque vous avez passé à y jouer."
    it: "Contiene i tuoi dati Pokéathlon.\nSu questa Scheda sono registrate\nle ore che hai passato a giocare."
    de: "Speichert deine Pokéathlon-Rekorde.\nDie Karte zeigt, wie viel Zeit du\nbeim Pokéathlon verbracht hast."
    es: "Contiene los datos del Pokéathlon\ncon el tiempo que has pasado\nen esta competición."
    ko: "포켓슬론의 기록이 들어 있다.\n포켓슬론으로 즐긴 시간이\n기록된 카드."
dawn_stone:
  names:
    jp_kana: めざめいし
    jp_kanji: めざめいし
    en: Dawn Stone
    fr: Pierre Aube
    it: Pietralbore
    de: Funkelstein
    es: Piedra Alba
    ko: 각성의돌
  descriptions:
    jp_kana: "ある　とくていの　ポケモンを\nしんかさせる　ふしぎな　いし。\nひとみのように　まばゆい。"
    jp_kanji: "ある　特定の　ポケモンを\n進化させる　不思議な　石。\nひとみのように　まばゆい。"
    en: "A peculiar stone that makes certain\nspecies of Pokémon evolve.\nIt sparkles like eyes."
    fr: "Pierre étrange qui fait évoluer\ncertaines espèces de Pokémon.\nElle brille comme un œil."
    it: "Pietra particolare che fa evolvere\ndeterminate specie di Pokémon.\nÈ luccicante come gli occhi."
    de: "Dieser besondere, glitzernde Stein\nhilft manchen Pokémon bei\nihrer Evolution."
    es: "Una piedra peculiar que hace\nevolucionar a algunos Pokémon.\nBrilla como un lucero."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 돌.\n눈동자처럼 아름답다."
deep_sea_scale:
  names:
    jp_kana: しんかいのウロコ
    jp_kanji: しんかいのウロコ
    en: DeepSeaScale
    fr: Écailleocéan
    it: Squamabissi
    de: Abyssplatte
    es: Escama Mar.
    ko: 심해의비늘
  descriptions:
    jp_kana: "パールルに　もたせると\nとくぼうが　あがる　ウロコ。\nうすい　ピンクいろに　ひかる。"
    jp_kanji: "パールルに　持たせると\n特防が　あがる　ウロコ。\nうすい　ピンク色に　光る。"
    en: "An item to be held by Clamperl.\nA scale that shines a faint pink, it\nraises the Sp. Def stat."
    fr: "Objet à faire tenir à Coquiperl.\nÉcaille de couleur rose montant\nsa Défense Spéciale."
    it: "Strumento da far tenere a Clamperl.\nSquama dai bagliori rosei che aumenta\nla Difesa Speciale."
    de: "Ein Item, das von Perlu getragen\nwerden kann. Es schimmert pink\nund hebt die Spezial-Verteidigung."
    es: "Tiene un débil brillo rosado\ny debe llevarla Clamperl.\nSube la Defensa Especial."
    ko: "진주몽에게 지니게 하면\n특수방어가 올라가는 비늘.\n연한 분홍색으로 빛난다."
deep_sea_tooth:
  names:
    jp_kana: しんかいのキバ
    jp_kanji: しんかいのキバ
    en: DeepSeaTooth
    fr: Dent Océan
    it: Dente Abissi
    de: Abysszahn
    es: Diente Mar.
    ko: 심해의이빨
  descriptions:
    jp_kana: "パールルに　もたせると\nとくこうが　あがる　キバ。\nするどく　ぎんいろに　ひかる。"
    jp_kanji: "パールルに　持たせると\n特攻が　あがる　キバ。\n鋭く　銀色に　光る。"
    en: "An item to be held by Clamperl.\nA fang that gleams a sharp silver, it\nraises the Sp. Atk stat."
    fr: "Objet à faire tenir à Coquiperl.\nDent de couleur argent montant\nson Attaque Spéciale."
    it: "Strumento da far tenere a Clamperl.\nDente dai bagliori argentei che aumenta\nl’Attacco Speciale."
    de: "Ein Item, das von Perlu getragen\nwerden kann. Es schimmert silbern\nund hebt den Spezial-Angriff."
    es: "Tiene el brillo afilado de la plata\ny debe llevarlo Clamperl.\nSube el Ataque Especial."
    ko: "진주몽에게 지니게 하면\n특수공격이 올라가는 이빨.\n날카로운 은색으로 빛난다."
destiny_knot:
  names:
    jp_kana: あかいいと
    jp_kanji: あかいいと
    en: Destiny Knot
    fr: Nœud Destin
    it: Destincomune
    de: Fatumknoten
    es: Lazo Destino
    ko: 빨간실
  descriptions:
    jp_kana: "ほそくて　ながい　まっかな　いと。\nもたせると　メロメロに　なったとき\nあいても　メロメロに　できる。"
    jp_kanji: "細くて　長い　真っ赤な　糸。\n持たせると　メロメロに　なったとき\n相手も　メロメロに　できる。"
    en: "A long, thin, bright-red string to\nbe held by a Pokémon. If the holder\nbecomes infatuated, the foe does too."
    fr: "Un long fil rouge vif à faire tenir à un\nPokémon. Si le porteur succombe à\nl’attirance, l’ennemi aussi."
    it: "Gomitolo di filo rosso sottile da dare\na un Pokémon. Se il Pokémon rimane\ninfatuato, contagia anche il nemico."
    de: "Ein Item zum Tragen. Wird\nder Träger betört, gilt\ndies auch für den Angreifer."
    es: "Un hilo largo y delgado de color rojo\nque transmite el enamoramiento del\nPokémon que lo lleva a su objetivo."
    ko: "가늘고 긴 새빨간 실.\n지니게 하면 자신이 헤롱헤롱해졌을 때\n상대도 헤롱헤롱해지게 된다."
dire_hit:
  names:
    jp_kana: クリティカット
    jp_kanji: クリティカット
    en: Dire Hit
    fr: Muscle +
    it: Supercolpo
    de: Angriffplus
    es: Directo
    ko: 크리티컬커터
  descriptions:
    jp_kana: "きゅうしょりつが　おおきく　あがる。\nいちどしか　つかうことが　できない。\nひっこめると　もとに　もどる。"
    jp_kanji: "急所率が　大きく　あがる。\n１度しか　使うことが　できない。\nひっこめると　元に　戻る。"
    en: "It raises the critical-hit ratio greatly.\nIt can be used only once and wears off\nif the Pokémon is withdrawn."
    fr: "Monte fortement le taux de critiques.\nUtilisable une seule fois. L’effet\ndisparaît si le Pokémon se retire."
    it: "Brutti colpi molto più probabili.\nSi può usare una sola volta e l’effetto\nsvanisce se il Pokémon è sostituito."
    de: "Hebt einmalig die Volltrefferquote des\nPokémon im Kampf stark an. Die Wirkung\nendet mit dem Austausch des Pokémon."
    es: "Aumenta el índice de golpe crítico\nen combate. Al cambiar de\nPokémon, el efecto desaparece."
    ko: "급소 명중률이 크게 올라간다.\n한 번밖에 쓸 수 없다. 포켓몬을 볼에\n넣어버리면 원래대로 되돌아간다."
dire_hit_2:
  names:
    jp_kana: クリティカット２
    jp_kanji: クリティカット２
    en: Dire Hit 2
    fr: Muscle 2
    it: Supercolpo 2
    de: Angriffplus2
    es: Directo 2
    ko: 크리티컬커터2
  descriptions:
    jp_kana: "きゅうしょりつが　あがる。\nつかうたびに　こうかが　アップする。\nひっこめると　もとに　もどる。"
    jp_kanji: "急所率が　あがる。\n使うたびに　効果が　アップする。\nひっこめると　元に　戻る。"
    en: "It can be used many times to raise the\ncritical-hit ratio of one Pokémon. It\nwears off if the Pokémon is withdrawn."
    fr: "Augmente le taux de critiques. Plus\nefficace à chaque utilisation. L’effet\ns’estompe si le Pokémon se retire."
    it: "Rende i brutti colpi molto più probabili.\nUsato più volte, l’effetto si somma, ma\nsvanisce se il Pokémon è sostituito."
    de: "Erhöht die Volltrefferquote. Effektiver\nbei mehrfacher Anwendung. Wirksam, bis\ndas Pokémon ausgewechselt wird."
    es: "Aumenta la probabilidad de asestar\nun golpe crítico. Al cambiar de\nPokémon, el efecto desaparece."
    ko: "급소 명중률이 올라간다. 사용할 때마다\n효과가 올라간다. 포켓몬을 볼에\n넣어버리면 원래대로 되돌아간다."
dire_hit_3:
  names:
    jp_kana: クリティカット３
    jp_kanji: クリティカット３
    en: Dire Hit 3
    fr: Muscle 3
    it: Supercolpo 3
    de: Angriffplus3
    es: Directo 3
    ko: 크리티컬커터3
  descriptions:
    jp_kana: "きゅうしょりつが　おおきく　あがる。\nつかうたびに　こうかが　アップする。\nひっこめると　もとに　もどる。"
    jp_kanji: "急所率が　大きく　あがる。\n使うたびに　効果が　アップする。\nひっこめると　元に　戻る。"
    en: "It can be used many times to greatly\nraise a Pokémon’s critical-hit ratio. It\nwears off if the Pokémon is withdrawn."
    fr: "Monte fortement le taux de critiques.\nPlus efficace à chaque utilisation.\nEffet estompé si le Pokémon se retire."
    it: "Aumenta moltissimo la probabilità di\nbrutti colpi. L’effetto si può sommare,\nma svanisce se il Pokémon è sostituito."
    de: "Erhöht die Volltrefferquote stark. Bei\nmehrfachem Gebrauch effektiver. Wirkt,\nbis das Pokémon ausgewechselt wird."
    es: "Aumenta mucho la probabilidad de\nasestar un golpe crítico. Al cambiar\nde Pokémon, su efecto desaparece."
    ko: "급소 명중률이 크게 올라간다. 사용할\n때마다 효과가 올라간다. 포켓몬을\n볼에 넣어버리면 원래대로 되돌아간다."
dive_ball:
  names:
    jp_kana: ダイブボール
    jp_kanji: ダイブボール
    en: Dive Ball
    fr: Scuba Ball
    it: Sub Ball
    de: Tauchball
    es: Buceo Ball
    ko: 다이브볼
  descriptions:
    jp_kana: "みずの　せかいで　くらしている\nポケモンが　つかまえやすくなる\nちょっと　かわった　ボール。"
    jp_kanji: "水の　世界で　暮らしている\nポケモンが　捕まえやすくなる\nちょっと　変わった　ボール。"
    en: "A somewhat different Poké Ball that\nworks especially well on Pokémon that\nlive underwater."
    fr: "Une Poké Ball un peu spéciale qui\nfonctionne particulièrement bien\nsur les Pokémon sous-marins."
    it: "Poké Ball un po’ diversa. Risulta\nparticolarmente efficace sui Pokémon\nche vivono in acqua."
    de: "Ein Ball, mit dem sich Pokémon,\ndie im Wasser leben, besser\nfangen lassen."
    es: "Es algo distinta a las demás. Funciona\nespecialmente bien con los Pokémon\nque viven bajo el agua."
    ko: "물의 세계에서 사는\n포켓몬을 잡기 쉬운\n조금 특이한 볼."
dna_splicers:fuse:
  names:
    jp_kana: いでんしのくさび
    jp_kanji: いでんしのくさび
    en: DNA Splicers
    fr: Pointeau ADN
    it: Cuneo DNA
    de: DNS-Keil
    es: Punta ADN
    ko: 유전자쐐기
  descriptions:
    jp_kana: "もとは　ひとつだったと　いわれる\nキュレムと　あるポケモンを\nがったいさせる　いっついの　くさび。"
    jp_kanji: "元は　ひとつだったと　いわれる\nキュレムと　あるポケモンを\n合体させる　一対の　くさび。"
    en: "A splicer that fuses Kyurem and a\ncertain Pokémon. They are said to\nhave been one in the beginning."
    fr: "Un outil qui permet la fusiorption de\nKyurem et d’un autre Pokémon avec\nlequel il ne faisait qu’un à l’origine."
    it: "Cuneo che permette di fondere Kyurem\ncon il Pokémon al quale era unito in\norigine."
    de: "Ein Keil, der Kyurem und ein gewisses\nanderes Pokémon, die vermeintlich\neinst eins gewesen sind, vereinigt."
    es: "Punta que permite fusionar a Kyurem\ncon cierto Pokémon con el que,\noriginariamente, formaba un solo ser."
    ko: "원래는 하나였다고 전해지는\n큐레무와 어떤 포켓몬을\n합체시키는 한 쌍의 쐐기."
dna_splicers:separate:
  names:
    jp_kana: いでんしのくさび
    jp_kanji: いでんしのくさび
    en: DNA Splicers
    fr: Pointeau ADN
    it: Cuneo DNA
    de: DNS-Keil
    es: Punta ADN
    ko: 유전자쐐기
  descriptions:
    jp_kana: "がったいした　キュレムと\nあるポケモンを　もとどおりに\nぶんりさせる　いっついの　くさび。"
    jp_kanji: "合体した　キュレムと\nあるポケモンを　元通りに\n分離させる　一対の　くさび。"
    en: "A splicer that separates Kyurem\nand a certain Pokémon when\nthey are fused."
    fr: "Un outil qui permet de séparer\nKyurem et le Pokémon avec lequel\nil a fusiorbé."
    it: "Cuneo che permette di separare Kyurem\ndal Pokémon con cui era fuso."
    de: "Ein Keil, der Kyurem und ein gewisses\nanderes Pokémon, die vereinigt wurden,\nvoneinander trennt."
    es: "Punta que permite separar a Kyurem\ndel Pokémon con el que se ha fusionado."
    ko: "합체한 큐레무와\n어떤 포켓몬을 원래대로\n분리시키는 한 쌍의 쐐기."
dome_fossil:
  names:
    jp_kana: こうらのカセキ
    jp_kanji: こうらのカセキ
    en: Dome Fossil
    fr: Fossile Dôme
    it: Domofossile
    de: Domfossil
    es: Fósil Domo
    ko: 껍질화석
  descriptions:
    jp_kana: "おおむかし　うみに　すんでいた\nこだい　ポケモンの　カセキ。\nこうらの　いちぶ　らしい。"
    jp_kanji: "大昔　海に　すんでいた\n古代ポケモンの　カセキ。\nこうらの　一部らしい。"
    en: "A fossil of an ancient Pokémon that\nlived in the sea. It appears to be\npart of a shell."
    fr: "Fossile d’un ancien Pokémon aquatique.\nOn dirait un morceau de carapace."
    it: "Fossile di un Pokémon antico che\nviveva in mare. Sembra essere\nparte di una corazza."
    de: "Das Fossil eines uralten Pokémon,\ndas in der Tiefsee lebte. Es sieht\nwie das Stück einer Muschel aus."
    es: "Fósil de un Pokémon ancestral\nque vivió en el fondo del mar.\nParece ser un fragmento de concha."
    ko: "오랜 옛날 바다에 살았던\n고대 포켓몬의 화석.\n등 껍질의 일부인 듯하다."
douse_drive:
  names:
    jp_kana: アクアカセット
    jp_kanji: アクアカセット
    en: Douse Drive
    fr: Module Aqua
    it: Idromodulo
    de: Aquamodul
    es: HidroROM
    ko: 아쿠아카세트
  descriptions:
    jp_kana: "ゲノセクトに　もたせると\nテクノバスターという　わざが\nみずタイプになる　カセット。"
    jp_kanji: "ゲノセクトに　持たせると\nテクノバスターという　技が\nみずタイプになる　カセット。"
    en: "A cassette to be held by Genesect.\nIt changes Techno Blast to a\nWater-type move."
    fr: "Tenu par Genesect, ce module\nchange la capacité TechnoBuster\nen une capacité de type Eau."
    it: "Modulo da far tenere a Genesect.\nTrasforma Tecnobotto in una mossa\ndi tipo Acqua."
    de: "Gibt man es Genesect zum Tragen,\nwandelt es den Typ der Attacke\nTechblaster in Wasser um."
    es: "Cartucho que convierte\nTecno Shock de Genesect\nen un movimiento de tipo Agua."
    ko: "게노세크트에게 지니게 하면\n테크노버스터라는 기술이\n물타입으로 바뀌는 카세트."
dowsing_machine:
  names:
    jp_kana: ダウジングマシン
    jp_kanji: ダウジングマシン
    en: Dowsing MCHN
    fr: Cherch’Objet
    it: Ricerca Str.
    de: Itemradar
    es: Zahorí
    ko: 다우징머신
  descriptions:
    jp_kana: "みえない　どうぐに　はんのうして\nおとと　ひかりで　おしえてくれる\nさいしんの　きかい。"
    jp_kanji: "みえない　道具に　反応して\n音と　光で　教えてくれる\n最新の　機械。"
    en: "It checks for unseen items in the area\nand makes noise and lights when it\nfinds something."
    fr: "Un appareil high-tech qui indique\nl’emplacement des objets invisibles\nen émettant un son et en clignotant."
    it: "Dispositivo ultramoderno che indica\nla direzione verso cui si trovano gli\nstrumenti invisibili emettendo suoni."
    de: "Scannt die Umgebung nach unsichtbaren\nItems. Es blinkt und piept, sobald es\netwas findet."
    es: "Aparato de precisión que reacciona\ncon luz y sonido ante los objetos que\nno se ven indicando su posición."
    ko: "보이지 않는 도구에 반응해서\n소리와 빛으로 가르쳐주는\n최신 기계."
draco_plate:
  names:
    jp_kana: りゅうのプレート
    jp_kanji: りゅうのプレート
    en: Draco Plate
    fr: Plaque Draco
    it: Lastradrakon
    de: Dracotafel
    es: Tabla Draco
    ko: 용의플레이트
  descriptions:
    jp_kana: "ドラゴンの　タイプの　せきばん。\nもたせると　ドラゴンタイプの\nわざの　いりょくが　つよまる。"
    jp_kanji: "ドラゴンの　タイプの　石盤。\n持たせると　ドラゴンタイプの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon.\nIt is a stone tablet that boosts the\npower of Dragon-type moves."
    fr: "Objet à tenir. Tablette en pierre\naugmentant la puissance des capacités\nde type Dragon."
    it: "Strumento da far tenere a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Drago."
    de: "Ein Item zum Tragen. Diese Steintafel\nverstärkt Attacken vom Typ Drachen."
    es: "Tabla de piedra que potencia\nlos movimientos de tipo Dragón.\nDebe llevarla un Pokémon."
    ko: "드래곤타입의 석판.\n지니게 하면 드래곤타입\n기술의 위력이 강해진다."
dragon_fang:
  names:
    jp_kana: りゅうのキバ
    jp_kanji: りゅうのキバ
    en: Dragon Fang
    fr: Croc Dragon
    it: Dentedidrago
    de: Drachenzahn
    es: Colmillodrag
    ko: 용의이빨
  descriptions:
    jp_kana: "かたくて　するどい　キバ。\nもたせると　ドラゴンタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "硬くて　鋭い　キバ。\n持たせると　ドラゴンタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon.\nIt is a hard and sharp fang that ups\nthe power of Dragon-type moves."
    fr: "Objet à tenir. Croc dur et pointu\nmontant la puissance des capacités\nde type Dragon."
    it: "Strumento da far tenere a un Pokémon.\nDente duro e affilato che potenzia\nle mosse di tipo Drago."
    de: "Ein Item zum Tragen. Ein harter und\nscharfer Reißzahn, der Attacken vom\nTyp Drachen verstärkt."
    es: "Colmillo de gran dureza que refuerza\nlos movimientos de tipo Dragón.\nDebe llevarlo un Pokémon."
    ko: "단단하고 날카로운 이빨.\n지니게 하면 드래곤타입\n기술의 위력이 올라간다."
dragon_gem:
  names:
    jp_kana: ドラゴンジュエル
    jp_kanji: ドラゴンジュエル
    en: Dragon Gem
    fr: Joyau Dragon
    it: Bijoudrago
    de: Drakojuwel
    es: G. Dragón
    ko: 드래곤주얼
  descriptions:
    jp_kana: "ドラゴンの　タイプの　ジュエル。\nもたせると　いちどだけ　ドラゴンの\nわざの　いりょくが　つよまる。"
    jp_kanji: "ドラゴンの　タイプの　ジュエル。\n持たせると　１度だけ　ドラゴンの\n技の　威力が　強まる。"
    en: "A gem with a draconic essence.\nWhen held, it strengthens the power\nof a Dragon-type move only once."
    fr: "Objet à tenir. Joyau augmentant\nune fois la puissance des capacités\nde type Dragon."
    it: "Strumento da far tenere a un Pokémon.\nGioiello che potenzia una sola volta\nle mosse di tipo Drago."
    de: "Ein Juwel vom Typ Drachen. Es\nerhöht einmalig die Stärke\neiner Attacke vom Typ Drachen."
    es: "Joya de un solo uso que potencia\nlos movimientos de tipo Dragón.\nDebe llevarla un Pokémon."
    ko: "드래곤타입의 주얼.\n지니게 하면 한 번만 드래곤\n기술의 위력이 강해진다."
dragon_scale:
  names:
    jp_kana: りゅうのウロコ
    jp_kanji: りゅうのウロコ
    en: Dragon Scale
    fr: Écailledraco
    it: Squama Drago
    de: Drachenhaut
    es: Escamadragón
    ko: 용의비늘
  descriptions:
    jp_kana: "かたくて　じょうぶな　ウロコ。\nドラゴンタイプの　ポケモンが\nもっていることが　ある。"
    jp_kanji: "硬くて　丈夫な　ウロコ。\nドラゴンタイプの　ポケモンが\n持っていることが　ある。"
    en: "A thick and tough scale.\nDragon-type Pokémon may be holding\nthis item when caught."
    fr: "Une écaille épaisse et dure tenue\nparfois par les Pokémon de type Dragon\nquand ils sont attrapés."
    it: "Squama spessa e dura.\nPuò essere tenuta da un Pokémon\ndi tipo Drago quando viene catturato."
    de: "Eine dicke und starke Haut.\nDrachen-Pokémon tragen\ndieses Item gern bei sich."
    es: "Una gruesa y resistente escama que\npueden llevar los Pokémon de tipo\nDragón cuando son capturados."
    ko: "단단하고 튼튼한 비늘.\n드래곤타입의 포켓몬이\n지니고 있는 경우가 있다."
dragon_skull:
  names:
    jp_kana: ドラゴンのホネ
    jp_kanji: ドラゴンのホネ
    en: Dragon Skull
    fr: Crâne Dragon
    it: Teschio
    de: Drakoschädel
    es: Crán. Dragón
    ko: 드래곤의뼈
  descriptions:
    jp_kana: "あれくるう　うみを　ものともせず\nじゆうに　とびまわっていたと　される\nポケモンの　あたまの　ホネ。"
    jp_kanji: "荒れ狂う　海を　ものともせず\n自由に　とびまわっていたと　される\nポケモンの　頭の　ホネ。"
    en: "A skull of a Pokémon which was said to\nhave braved the angry waters to fly\naround the world."
    fr: "Crâne d’un Pokémon qui\naurait survolé librement\nla mer déchaînée."
    it: "Teschio di un Pokémon che volava libero\nqua e là senza temere nemmeno il mare\nin tempesta."
    de: "Der Schädel eines Pokémon, das einst\nwütendem Seegang zum Trotz frei\num die Welt flog."
    es: "Fósil del cráneo de un Pokémon.\nSe dice que este Pokémon cruzó\nmares embravecidos."
    ko: "성난 바다 위를 개의치 않고\n자유롭게 날아다녔다는\n포켓몬의 머리뼈."
dread_plate:
  names:
    jp_kana: こわもてプレート
    jp_kanji: こわもてプレート
    en: Dread Plate
    fr: Plaque Ombre
    it: Lastratimore
    de: Furchttafel
    es: Tabla Oscura
    ko: 공포플레이트
  descriptions:
    jp_kana: "あくの　タイプの　せきばん。\nもたせると　あくタイプの\nわざの　いりょくが　つよまる。"
    jp_kanji: "あくの　タイプの　石盤。\n持たせると　あくタイプの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon.\nIt is a stone tablet that boosts the\npower of Dark-type moves."
    fr: "Objet à tenir. Tablette en pierre\naugmentant la puissance des capacités\nde type Ténèbres."
    it: "Strumento da far tenere a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Buio."
    de: "Ein Item zum Tragen. Diese Steintafel\nverstärkt Attacken vom Typ Unlicht."
    es: "Tabla de piedra que potencia\nlos movimientos de tipo Siniestro.\nDebe llevarla un Pokémon."
    ko: "악타입의 석판.\n지니게 하면 악타입\n기술의 위력이 강해진다."
dream_ball:
  names:
    jp_kana: ドリームボール
    jp_kanji: ドリームボール
    en: Dream Ball
    fr: Rêve Ball
    it: Dream Ball
    de: Traumball
    es: Ensueño Ball
    ko: 드림볼
  descriptions:
    jp_kana: "ハイリンクのもりで　いつのまにか\nバッグに　あらわれる　ゆめのボール。\nどんな　ポケモンも　つかまえられる。"
    jp_kanji: "ハイリンクの森で　いつのまにか\nバッグに　現れる　夢のボール。\nどんな　ポケモンも　捕まえられる。"
    en: "A special Poké Ball that appears out of\nnowhere in a bag at the Entree Forest.\nIt can catch any Pokémon."
    fr: "Poké Ball du rêve. Apparue dans le\nSac à la Forêt du Heylink. Permet\nd’attraper n’importe quel Pokémon."
    it: "Ball onirica. Appare all’improvviso nella\nBorsa quando si è nel Bosco Intramondo.\nPuò acchiappare qualsiasi Pokémon."
    de: "Ein Ball wie aus einem Traum, der im\nKontaktebenenhain plötzlich im Beutel\nauftaucht. Fängt jedes Pokémon."
    es: "Bola especial que aparece de pronto\nen tu Bolsa en el Bosque Nexo y\npuede atrapar a cualquier Pokémon."
    ko: "하일링크의 숲에서 어느 사이엔지\n가방 속에 나타나는 꿈의 볼.\n어떤 포켓몬이라도 잡을 수 있다."
dropped_item:boy:
  names:
    jp_kana: わすれもの
    jp_kanji: わすれもの
    en: Dropped Item
    fr: Objet Trouvé
    it: Ogg. perso
    de: Fundsache
    es: Obj. Perdido
    ko: 잊은물건
  descriptions:
    jp_kana: "ライモンシティの　ゆうえんちで\nひろった　ライブキャスター。\nおとしぬしは　おとこのこ　らしい。"
    jp_kanji: "ライモンシティの　遊園地で\n拾った　ライブキャスター。\n落とし主は　男の子らしい。"
    en: "The Xtransceiver found at the\nNimbasa City amusement park.\nIt seems it belongs to a boy."
    fr: "Un Vokit trouvé au parc\nd’attractions de Méanville.\nC’est un modèle pour garçons."
    it: "Interpoké rinvenuto nel parco giochi\ndi Sciroccopoli. Pare che appartenga\na un ragazzo."
    de: "Ein Viso-Caster, der im Vergnügungspark\nvon Rayono City gefunden wurde.\nEr scheint einem Jungen zu gehören."
    es: "Videomisor encontrado en el parque de\natracciones de Ciudad Mayólica.\nParece que pertenece a un chico."
    ko: "뇌문시티의 유원지에서\n주운 라이브캐스터.\n잃어버린 사람은 남자인 것 같다."
dropped_item:girl:
  names:
    jp_kana: わすれもの
    jp_kanji: わすれもの
    en: Dropped Item
    fr: Objet Trouvé
    it: Ogg. perso
    de: Fundsache
    es: Obj. Perdido
    ko: 잊은물건
  descriptions:
    jp_kana: "ライモンシティの　ゆうえんちで\nひろった　ライブキャスター。\nおとしぬしは　おんなのこ　らしい。"
    jp_kanji: "ライモンシティの　遊園地で\n拾った　ライブキャスター。\n落とし主は　女の子らしい。"
    en: "The Xtransceiver found at the\nNimbasa City amusement park.\nIt seems it belongs to a girl."
    fr: "Un Vokit trouvé au parc\nd’attractions de Méanville.\nC’est un modèle pour filles."
    it: "Interpoké rinvenuto nel parco giochi\ndi Sciroccopoli. Pare che appartenga\na una ragazza."
    de: "Ein Viso-Caster, der im Vergnügungspark\nvon Rayono City gefunden wurde.\nEr scheint einem Mädchen zu gehören."
    es: "Videomisor encontrado en el parque de\natracciones de Ciudad Mayólica.\nParece que pertenece a una chica."
    ko: "뇌문시티의 유원지에서\n주운 라이브캐스터.\n잃어버린 사람은 여자인 것 같다."
dubious_disc:
  names:
    jp_kana: あやしいパッチ
    jp_kanji: あやしいパッチ
    en: Dubious Disc
    fr: CD Douteux
    it: Dubbiodisco
    de: Dubiosdisc
    es: Discoxtraño
    ko: 괴상한패치
  descriptions:
    jp_kana: "なかに　あやしい　じょうほうが\nつまった　とうめいな　きかい。\nせいさくしゃは　ふめい。"
    jp_kanji: "なかに　怪しい　情報が\nつまった　透明な　機械。\n製作者は　不明。"
    en: "A transparent device overflowing with\ndubious data.\nIts producer is unknown."
    fr: "Appareil transparent rempli de données\ndouteuses. Son fabricant n’est pas\nconnu."
    it: "Dispositivo trasparente strapieno\ndi dati di dubbia entità. Non se ne\nconosce il produttore."
    de: "Eine Scheibe mit seltsamen Daten.\nIhr Ursprung ist unbekannt."
    es: "Dispositivo transparente que contiene\ndatos misteriosos. Es de fabricante\ndesconocido."
    ko: "안에 괴상한 정보가\n가득한 투명한 기계다.\n제작자 불명."
durin_berry:
  names:
    jp_kana: ドリのみ
    jp_kanji: ドリのみ
    en: Durin Berry
    fr: Baie Durin
    it: Baccadurian
    de: Durinbeere
    es: Baya Rudion
    ko: 두리열매
  descriptions:
    jp_kana: "イッシュちほうでは　とても\nめずらしい　きのみ。\nマニアが　たかく　かってくれる。"
    jp_kanji: "イッシュ地方では　とても\n珍しい　きのみ。\nマニアが　高く　買ってくれる。"
    en: "A Berry which is very rare in the\nUnova region.\nA maniac will buy it for a high price."
    fr: "Baie très rare à Unys.\nLes amateurs en donnent un bon prix."
    it: "Bacca molto rara a Unima.\nSi può vendere a un prezzo piuttosto\nalto agli intenditori."
    de: "Eine Beere, die nur äußerst selten\nin der Einall-Region zu finden ist.\nKenner geben ihr letztes Hemd dafür."
    es: "Una Baya muy rara en la región\nde Teselia. Muy apreciada\npor los gourmets."
    ko: "하나지방에서는 매우\n희귀한 나무열매.\n마니아가 비싼 값에 산다."
dusk_ball:
  names:
    jp_kana: ダークボール
    jp_kanji: ダークボール
    en: Dusk Ball
    fr: Sombre Ball
    it: Scuro Ball
    de: Finsterball
    es: Ocaso Ball
    ko: 다크볼
  descriptions:
    jp_kana: "よるや　どうくつなど　くらいところで\nポケモンが　つかまえやすくなる\nちょっと　かわった　ボール。"
    jp_kanji: "夜や　どうくつなど　暗いところで\nポケモンが　捕まえやすくなる\nちょっと　変わった　ボール。"
    en: "A somewhat different Poké Ball that\nmakes it easier to catch wild Pokémon\nat night or in dark places like caves."
    fr: "Une Poké Ball efficace pour attraper\nles Pokémon de nuit ou dans des\nendroits sombres tels que les grottes."
    it: "Poké Ball un po’ diversa che rende più\nfacile catturare Pokémon selvatici di\nnotte o in luoghi bui come le grotte."
    de: "Ein mysteriöser Ball,\ngeeignet für Einsätze in der\nNacht oder an dunklen Orten."
    es: "Es algo distinta. Hace que sea más fácil\ncapturar a los Pokémon salvajes por la\nnoche o en lugares oscuros."
    ko: "밤이나 동굴 등 어두운 곳에서\n포켓몬을 잡기 쉬운\n조금 특이한 볼."
dusk_stone:
  names:
    jp_kana: やみのいし
    jp_kanji: やみのいし
    en: Dusk Stone
    fr: Pierre Nuit
    it: Neropietra
    de: Finsterstein
    es: Piedra Noche
    ko: 어둠의돌
  descriptions:
    jp_kana: "ある　とくていの　ポケモンを\nしんかさせる　ふしぎな　いし。\nやみのように　くらい。"
    jp_kanji: "ある　特定の　ポケモンを\n進化させる　不思議な　石。\nやみのように　暗い。"
    en: "A peculiar stone that makes certain\nspecies of Pokémon evolve.\nIt is as dark as dark can be."
    fr: "Pierre étrange qui fait évoluer\ncertaines espèces de Pokémon. Elle\nest sombre comme une nuit sans lune."
    it: "Pietra particolare che fa evolvere\ndeterminate specie di Pokémon.\nÈ scura come le tenebre."
    de: "Dieser besondere, düstere Stein\nhilft manchen Pokémon bei\nihrer Evolution."
    es: "Una piedra peculiar que hace\nevolucionar a algunos Pokémon.\nEs oscura como la noche."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 돌.\n칠흑처럼 어둡다."
earth_plate:
  names:
    jp_kana: だいちのプレート
    jp_kanji: だいちのプレート
    en: Earth Plate
    fr: Plaque Terre
    it: Lastrageo
    de: Erdtafel
    es: Tabla Terrax
    ko: 대지플레이트
  descriptions:
    jp_kana: "じめんの　タイプの　せきばん。\nもたせると　じめんタイプの\nわざの　いりょくが　つよまる。"
    jp_kanji: "じめんの　タイプの　石盤。\n持たせると　じめんタイプの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon.\nIt is a stone tablet that boosts the\npower of Ground-type moves."
    fr: "Objet à tenir. Tablette en pierre\naugmentant la puissance des capacités\nde type Sol."
    it: "Strumento da far tenere a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Terra."
    de: "Ein Item zum Tragen. Diese Steintafel\nverstärkt Attacken vom Typ Boden."
    es: "Tabla de piedra que potencia\nlos movimientos de tipo Tierra.\nDebe llevarla un Pokémon."
    ko: "땅타입의 석판.\n지니게 하면 땅타입\n기술의 위력이 강해진다."
eject_button:
  names:
    jp_kana: だっしゅつボタン
    jp_kanji: だっしゅつボタン
    en: Eject Button
    fr: Bouton Fuite
    it: Pulsantefuga
    de: Fluchtknopf
    es: Botón Escape
    ko: 탈출버튼
  descriptions:
    jp_kana: "もたせて　わざを　うけると\nせんとうから　だっしゅつして\nてもちと　いれかわる　ことができる。"
    jp_kanji: "持たせて　技を　受けると\n戦闘から　脱出して\n手持ちと　入れ替わる　ことができる。"
    en: "If the holder is hit by an attack, it will\nswitch with another Pokémon in\nyour party."
    fr: "Si le Pokémon qui le tient subit une\nattaque, il s’enfuit pour être remplacé\npar un autre membre de l’équipe."
    it: "Se il Pokémon che lo tiene è colpito da\nun attacco, viene immediatamente\nsostituito da un compagno."
    de: "Wird der Träger getroffen, flieht er\naus dem Kampf und wird mit einem\nTeam-Pokémon ausgetauscht."
    es: "Si el portador es alcanzado por un\nataque, saldrá del combate y será\nsustituido por otro Pokémon del equipo."
    ko: "지니게 하고 기술을 받으면\n배틀에서 탈출하여\n지닌 포켓몬과 교체할 수 있다."
electirizer:
  names:
    jp_kana: エレキブースター
    jp_kanji: エレキブースター
    en: Electirizer
    fr: Électiriseur
    it: Elettritore
    de: Stromisierer
    es: Electrizador
    ko: 에레키부스터
  descriptions:
    jp_kana: "とてつもない　でんきの　エネルギーが\nたくわえられている　はこ。\nある　ポケモンが　このんでいる。"
    jp_kanji: "とてつもない　電気の　エネルギーが\n蓄えられている　箱。\nある　ポケモンが　好んでいる。"
    en: "A box packed with a tremendous\namount of electric energy.\nIt is loved by a certain Pokémon."
    fr: "Une boîte remplie d’une énorme quantité\nd’énergie électrique. Appréciée d’un\ncertain Pokémon."
    it: "Scatola strapiena di energia elettrica.\nUn Pokémon in particolare adora questo\nstrumento."
    de: "Eine Schachtel mit elektrischer\nEnergie. Das Lieblingsstück\neines bestimmten Pokémon."
    es: "Este dispositivo contiene una gran\ncantidad de energía eléctrica.\nCierto Pokémon lo adora."
    ko: "엄청난 전기의 에너지가\n비축되어 있는 상자.\n어떤 포켓몬이 좋아하는 물건이다."
electric_gem:
  names:
    jp_kana: でんきのジュエル
    jp_kanji: でんきのジュエル
    en: Electric Gem
    fr: Joyau Électr
    it: Bijouelettro
    de: Elektrojuwel
    es: G. Eléctrica
    ko: 전기주얼
  descriptions:
    jp_kana: "でんきの　タイプの　ジュエル。\nもたせると　いちどだけ　でんきの\nわざの　いりょくが　つよまる。"
    jp_kanji: "でんきの　タイプの　ジュエル。\n持たせると　１度だけ　でんきの\n技の　威力が　強まる。"
    en: "A gem with an essence of electricity.\nWhen held, it strengthens the power of\nan Electric-type move only once."
    fr: "Objet à tenir. Joyau augmentant\nune fois la puissance des capacités\nde type Électrik."
    it: "Strumento da far tenere a un Pokémon.\nGioiello che potenzia una sola volta\nle mosse di tipo Elettro."
    de: "Ein Juwel vom Typ Elektro. Es\nerhöht einmalig die Stärke\neiner Attacke vom Typ Elektro."
    es: "Joya de un solo uso que potencia\nlos movimientos de tipo Eléctrico.\nDebe llevarla un Pokémon."
    ko: "전기타입의 주얼.\n지니게 하면 한 번만 전기\n기술의 위력이 강해진다."
elixir:
  names:
    jp_kana: ピーピーエイダー
    jp_kanji: ピーピーエイダー
    en: Elixir
    fr: Élixir
    it: Elisir
    de: Elixier
    es: Elixir
    ko: PP에이더
  descriptions:
    jp_kana: "ポケモンが　おぼえている\n４つの　わざの　ＰＰを\n１０ずつ　かいふくする。"
    jp_kanji: "ポケモンが　覚えている\n４つの　技の　ＰＰを\n１０ずつ　回復する。"
    en: "It restores the PP of all the\nmoves learned by the targeted Pokémon\nby 10 points each."
    fr: "Restaure 10 PP de toutes les\ncapacités d’un Pokémon."
    it: "Restituisce 10 PP a ciascuna delle\nmosse imparate dal Pokémon."
    de: "Füllt die AP aller Attacken eines\nPokémon um 10 Punkte auf."
    es: "Restaura 10 PP de todos los movimientos\naprendidos por el Pokémon elegido."
    ko: "포켓몬이 기억하고 있는\n4개 기술의 PP를\n10씩 회복한다."
energy_powder:
  names:
    jp_kana: ちからのこな
    jp_kanji: ちからのこな
    en: EnergyPowder
    fr: Poudrénergie
    it: Polvenergia
    de: Energiestaub
    es: Polvoenergía
    ko: 힘의가루
  descriptions:
    jp_kana: "とても　にがい　こなぐすり。\nポケモン　１ひきの　ＨＰを\n５０だけ　かいふくする。"
    jp_kanji: "とても　にがい　粉薬。\nポケモン　１匹の　ＨＰを\n５０だけ　回復する。"
    en: "A very bitter medicine powder.\nIt restores the HP of one Pokémon by\n50 points."
    fr: "Une poudre médicinale très amère.\nRestaure 50 PV à un Pokémon."
    it: "Rimedio amarissimo in polvere.\nRestituisce 50 PS ad un Pokémon."
    de: "Ein bitteres medizinisches Pulver,\ndas die KP eines Pokémon um\n50 Punkte auffüllt."
    es: "Polvo medicinal muy amargo que\nrestaura 50 PS de un Pokémon."
    ko: "매우 쓴 가루약.\n포켓몬 1마리의 HP를\n50만큼 회복한다."
energy_root:
  names:
    jp_kana: ちからのねっこ
    jp_kanji: ちからのねっこ
    en: Energy Root
    fr: Racinénergie
    it: Radicenergia
    de: Kraftwurzel
    es: Raíz Energía
    ko: 힘의뿌리
  descriptions:
    jp_kana: "とても　にがい　ねっこ。\nポケモン　１ひきの　ＨＰを\n２００だけ　かいふくする。"
    jp_kanji: "とても　にがい　ねっこ。\nポケモン　１匹の　ＨＰを\n２００だけ　回復する。"
    en: "A very bitter root.\nIt restores the HP of one Pokémon by\n200 points."
    fr: "Une racine très amère.\nRestaure 200 PV à un Pokémon."
    it: "Radice amarissima.\nRestituisce 200 PS ad un Pokémon."
    de: "Eine bittere Wurzel. Sie füllt die\nKP eines Pokémon um 200 Punkte auf."
    es: "Raíz muy amarga que restaura\n200 PS de un Pokémon."
    ko: "매우 쓴 뿌리.\n포켓몬 1마리의 HP를\n200만큼 회복한다."
enigma_berry:
  names:
    jp_kana: ナゾのみ
    jp_kanji: ナゾのみ
    en: Enigma Berry
    fr: Baie Enigma
    it: Baccaenigma
    de: Enigmabeere
    es: Baya Enigma
    ko: 의문열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　わざを\nうけたとき　ＨＰを　かいふくする。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　技を\n受けたとき　ＨＰを　回復する。"
    en: "If held by a Pokémon, it restores\nits HP if it is hit by any\nsupereffective attack."
    fr: "Tenue, cette Baie restaure les PV\ndu Pokémon s’il subit une attaque\nsuper efficace."
    it: "Ripristina i PS, se il Pokémon che\nla tiene è colpito da un attacco\nsuperefficace."
    de: "Als getragenes Item füllt die Beere die\nKP eines Pokémon auf, wenn es von sehr\neffektiven Attacken getroffen wird."
    es: "Restaura los PS de un Pokémon\nsi la lleva cuando le alcanza\nun ataque supereficaz."
    ko: "포켓몬에게 지니게 하면\n효과가 뛰어난 공격을\n받았을 때 HP를 회복한다."
enigma_stone:
  names:
    jp_kana: なぞのすいしょう
    jp_kanji: なぞのすいしょう
    en: Enigma Stone
    fr: Mystécristal
    it: Misticristal
    de: Mytokristall
    es: Misticristal
    ko: 수수께끼의수정
  descriptions:
    jp_kana: "じめんから　ほりだされた\nすいしょうだま。いわと　つちで\nおおわれているが　とても　きれい。"
    jp_kanji: "地面から　掘りだされた\nすいしょうだま。いわと　つちで\nおおわれているが　とても　きれい。"
    en: "A crystal ball that was excavated from\nthe ground. A very beautiful stone that\nis covered with bits of rock and earth."
    fr: "Un orbe cristallin fraîchement déterré.\nIl est encore pris dans une gangue de\nterre et de roche."
    it: "Cristallo appena estratto dal suolo.\nBellissimo malgrado sia ancora ricoperto\ndi resti di roccia e terra."
    de: "Eine kristallene Kugel, die aus der Erde\ngeborgen wurde. Schmutz und Gestein\nkonnten ihrer Schönheit nichts anhaben."
    es: "Esfera cristalina encontrada bajo\ntierra. A pesar de estar cubierta de\nroca y tierra, su belleza es increíble."
    ko: "땅에서 파 올린\n수정구슬. 바위랑 흙으로\n뒤덮여 있지만 매우 아름답다."
escape_rope:
  names:
    jp_kana: あなぬけのヒモ
    jp_kanji: あなぬけのヒモ
    en: Escape Rope
    fr: Corde Sortie
    it: Fune di Fuga
    de: Fluchtseil
    es: Cuerda Huida
    ko: 동굴탈출로프
  descriptions:
    jp_kana: "ながくて　じょうぶな　ヒモ。\nどうくつや　ダンジョンから\nぬけだすことが　できる。"
    jp_kanji: "長くて　丈夫な　ヒモ。\nどうくつや　ダンジョンから\n抜け出すことが　できる。"
    en: "A long, durable rope.\nUse it to escape instantly from a cave\nor a dungeon."
    fr: "Une corde longue et solide permettant\nde sortir rapidement d’une grotte ou\nd’un donjon."
    it: "Corda lunga e resistente che si usa\nper fuggire in un batter d’occhio\ndalle grotte o da certi luoghi chiusi."
    de: "Ein langes, festes Seil, das die\nsofortige Flucht aus Höhlen oder\nÄhnlichem ermöglicht."
    es: "Cuerda larga y resistente que sirve\npara huir de cuevas y sitios cerrados\nen general."
    ko: "길고 튼튼한 끈.\n동굴이나 던전에서\n빠져나올 수 있다."
ether:
  names:
    jp_kana: ピーピーエイド
    jp_kanji: ピーピーエイド
    en: Ether
    fr: Huile
    it: Etere
    de: Äther
    es: Éter
    ko: PP에이드
  descriptions:
    jp_kana: "ポケモンが　おぼえている\nわざのうち　１つの　ＰＰを\n１０だけ　かいふくする。"
    jp_kanji: "ポケモンが　覚えている\n技のうち　１つの　ＰＰを\n１０だけ　回復する。"
    en: "It restores the PP of a Pokémon’s\nselected move by a maximum of\n10 points."
    fr: "Restaure jusqu’à 10 PP d’une\ncapacité sélectionnée."
    it: "Restituisce un massimo di 10 PP\na una mossa a scelta che è stata\nimparata dal Pokémon."
    de: "Füllt die AP einer ausgewählten Attacke\neines Pokémon um 10 Punkte auf."
    es: "Restaura un máximo de 10 PP del\nmovimiento elegido de un Pokémon."
    ko: "포켓몬이 기억하고 있는\n기술 중 1개의 PP를\n10만큼 회복한다."
everstone:
  names:
    jp_kana: かわらずのいし
    jp_kanji: かわらずのいし
    en: Everstone
    fr: Pierre Stase
    it: Pietrastante
    de: Ewigstein
    es: Piedraeterna
    ko: 변함없는돌
  descriptions:
    jp_kana: "ポケモンに　もたせると\nそのあいだ　しんか　しなくなる\nふしぎな　いし。"
    jp_kanji: "ポケモンに　持たせると\nそのあいだ　進化しなくなる\n不思議な　石。"
    en: "An item to be held by a Pokémon.\nThe Pokémon holding this peculiar stone\nis prevented from evolving."
    fr: "Objet à tenir. Pierre merveilleuse\nempêchant l’évolution."
    it: "Strumento da far tenere a un Pokémon.\nChi tiene questa pietra particolare\nevita l’evoluzione."
    de: "Ein Item, das einem Pokémon zum\nTragen gegeben werden kann. Es\nbewirkt einen Entwicklungsstopp."
    es: "El Pokémon que lleva esta piedra\nmágica no evoluciona."
    ko: "포켓몬에게 지니게 하면\n지닌 동안에는 진화하지 않게 되는\n이상한 돌."
eviolite:
  names:
    jp_kana: しんかのきせき
    jp_kanji: しんかのきせき
    en: Eviolite
    fr: Évoluroc
    it: Evolcondensa
    de: Evolith
    es: Mineral Evol
    ko: 진화의휘석
  descriptions:
    jp_kana: "しんかの　ふしぎな　かたまり。\nもたせると　しんかまえ　ポケモンの\nぼうぎょと　とくぼうが　あがる。"
    jp_kanji: "進化の　不思議な　かたまり。\n持たせると　進化前　ポケモンの\n防御と　特防が　あがる。"
    en: "A mysterious evolutionary lump. When\nheld, it raises the Defense and Sp. Def\nof a Pokémon that can still evolve."
    fr: "Un étrange concentré d’évolution qui\naugmente la Défense et la Déf. Spé.\nd’un Pokémon pouvant évoluer."
    it: "Misteriosa sfera evolutiva. Aumenta la\nDifesa e la Difesa Speciale di un Pokémon\nche può ancora evolversi."
    de: "Ein mysteriöser Klumpen, der die Vert.\nu. Spez.-Vert. von Pokémon erhöht,\ndie sich noch entwickeln können."
    es: "Piedra evolutiva. El Pokémon portador\naumentará su Defensa y su Defensa\nEspecial si aún puede evolucionar."
    ko: "진화의 이상한 덩어리.\n지니게 하면 진화 전 포켓몬의\n방어와 특수방어가 올라간다."
exp_share:
  names:
    jp_kana: がくしゅうそうち
    jp_kanji: がくしゅうそうち
    en: Exp. Share
    fr: Multi Exp
    it: Condiv. Esp.
    de: EP-Teiler
    es: Repartir Exp
    ko: 학습장치
  descriptions:
    jp_kana: "もたせた　ポケモンは　せんとうに\nでなくても　けいけんちを\nわけてもらえる　べんりな　そうち。"
    jp_kanji: "持たせた　ポケモンは　戦闘に\nでなくても　経験値を\nわけてもらえる　便利な　装置。"
    en: "An item to be held by a Pokémon.\nThe holder gets a share of a battle’s\nExp. Points without battling."
    fr: "Objet à tenir. Le porteur reçoit une\npartie des points Exp. du combat sans\navoir à combattre."
    it: "Strumento da far tenere a un Pokémon.\nChi lo tiene ottiene Punti Esperienza\ndalla lotta anche se non vi partecipa."
    de: "Ein Item, das einem Pokémon zum Tragen\ngegeben werden kann. Es teilt die\nErfahrungs-Punkte aus einem Kampf auf."
    es: "El Pokémon que lo lleva obtiene parte\nde los Puntos de Exp. del combate\nsin participar en él."
    ko: "지니게 한 포켓몬은 배틀에\n나가지 않아도 경험치를\n나누어 받을 수 있는 편리한 장치."
expert_belt:
  names:
    jp_kana: たつじんのおび
    jp_kanji: たつじんのおび
    en: Expert Belt
    fr: Ceinture Pro
    it: Abilcintura
    de: Expertengurt
    es: Cinta Xperto
    ko: 달인의띠
  descriptions:
    jp_kana: "つかいこまれた　くろい　おび。\nもたせると　こうかばつぐんの　とき\nわざの　いりょくが　すこし　あがる。"
    jp_kanji: "使いこまれた　黒い　帯。\n持たせると　効果バツグンの　とき\n技の　威力が　少し　あがる。"
    en: "An item to be held by a Pokémon. It is\na well-worn belt that slightly boosts\nthe power of supereffective moves."
    fr: "Objet à tenir. Ceinture usée\naugmentant légèrement la puissance\ndes capacités super efficaces."
    it: "Strumento da far tenere a un Pokémon.\nCintura consumata che potenzia di poco\nle mosse superefficaci."
    de: "Ein Item zum Tragen.\nDieser alte Gürtel verstärkt\nsehr effektive Attacken."
    es: "Potencia ligeramente los movimientos\nsupereficaces.\nDebe llevarla un Pokémon."
    ko: "오래 사용한 까만 띠.\n지니게 하면 효과가 뛰어날 때\n기술의 위력이 조금 올라간다."
explorer_kit:
  names:
    jp_kana: たんけんセット
    jp_kanji: たんけんセット
    en: Explorer Kit
    fr: Explorakit
    it: Esplorokit
    de: Forschersack
    es: Kit Explor.
    ko: 탐험세트
  descriptions:
    jp_kana: "たんけんに　やくだつ　べんりな\nどうぐが　はいった　ふくろ。\nちかつうろに　はいれる。"
    jp_kanji: "探検に　役立つ　便利な\n道具が　はいった　ふくろ。\n地下通路に　はいれる。"
    en: "A bag filled with convenient tools\nfor exploring. It provides access to\nthe Underground."
    fr: "Sac contenant des objets utiles\nà l’exploration. Permet d’entrer\ndans le Souterrain."
    it: "Utilissimo kit contenente strumenti per\nl’esplorazione. Permette di percorrere\ni tunnel sotterranei."
    de: "Ein Sack voller hilfreicher Items für\nErkundungsgänge. Öffnet den\nUntergrund."
    es: "Una saca donde guardar los objetos\nútiles para la exploración.\nPermite acceder al Subsuelo."
    ko: "탐험에 도움이 되는 편리한\n도구가 들어 있는 주머니.\n지하통로에 들어갈 수 있다."
fashion_case:
  names:
    jp_kana: アクセサリーいれ
    jp_kanji: アクセサリーいれ
    en: Fashion Case
    fr: Coffret Mode
    it: Scatola Chic
    de: Modekoffer
    es: Caja Corazón
    ko: 액세서리상자
  descriptions:
    jp_kana: "ミュージカルで　ポケモンに　つける\nいろとりどりの　グッズを　たくさん\nしまえる　きれいで　すてきなケース。"
    jp_kanji: "ミュージカルで　ポケモンに　つける\nいろとりどりの　グッズを　たくさん\nしまえる　きれいで　すてきなケース。"
    en: "A lovely case to store colorful Props\nfor your Pokémon to wear in a musical."
    fr: "Boîte permettant de ranger\nles Parures pour habiller les\nPokémon au Music-Hall."
    it: "Scatola bella ed elegante per stipare\ni gadget usati per agghindare i Pokémon\ndurante il Pokémon Musical."
    de: "Ein schicker Koffer mit Platz für alle\nim Musical benötigten Deko-Artikel\ndeiner Pokémon. Da knittert nichts."
    es: "Una bonita cajita donde guardar todos\nlos Complementos para vestir a tus\nPokémon en el Teatro Musical."
    ko: "뮤지컬에서 포켓몬에게 다는\n각양각색의 굿즈를 많이\n넣을 수 있는 아름답고 멋진 케이스."
fast_ball:
  names:
    jp_kana: スピードボール
    jp_kanji: スピードボール
    en: Fast Ball
    fr: Speed Ball
    it: Rapid Ball
    de: Turboball
    es: Rapid Ball
    ko: 스피드볼
  descriptions:
    jp_kana: "にげあしの　はやい　ポケモンが\nつかまえやすくなる\nちょっと　かわった　ボール。"
    jp_kanji: "にげあしの　はやい　ポケモンが\n捕まえやすくなる\nちょっと　変わった　ボール。"
    en: "A Poké Ball that makes it easier to\ncatch Pokémon which are quick to\nrun away."
    fr: "Une Poké Ball un peu spéciale qui\nfonctionne particulièrement bien sur\nles Pokémon qui ont tendance à fuir."
    it: "Poké Ball un po’ originale che funziona\nbenissimo sui Pokémon bravi a scappare."
    de: "Ein Ball, der sich besonders gut eignet,\num flinke Pokémon zu fangen."
    es: "Poké Ball algo distinta, especialmente\nindicada para capturar Pokémon\nevasivos."
    ko: "도주가 빠른 포켓몬이\n잡기 쉬워지는\n조금 특이한 볼."
favored_mail:
  names:
    jp_kana: だいすきメール
    jp_kanji: だいすきメール
    en: Favored Mail
    fr: Lettre Fan
    it: Mess. TVB
    de: Faiblebrief
    es: C. Favoritos
    ko: 애호메일
  descriptions:
    jp_kana: "すきなものを　つたえる　メールが\nかきやすい　びんせん。\nポケモンに　もたせて　つかう。"
    jp_kanji: "好きなものを　伝える　メールが\n書きやすい　レターペーパー。\nポケモンに　持たせて　使う。"
    en: "Stationery designed for\nwriting about your favorite things.\nLet a Pokémon hold it for delivery."
    fr: "Un papier à lettres idéal pour parler\nde ce que l’on aime. Peut être tenu\net livré par un Pokémon."
    it: "Carta da lettera ideale per comunicare\nciò che si preferisce. Un Pokémon può\ntenerla e consegnarla."
    de: "Briefpapier, mit dem man jemandem\nverraten kann, was man gern mag.\nGib es einem Pokémon zum Tragen."
    es: "Carta para escribir sobre tus cosas\nfavoritas. Haz que la entregue\nun Pokémon."
    ko: "좋아하는 것을 전하는 메일을\n쉽게 쓸 수 있는 편지지.\n포켓몬에게 지니게 해서 쓴다."
fighting_gem:
  names:
    jp_kana: かくとうジュエル
    jp_kanji: かくとうジュエル
    en: Fighting Gem
    fr: Joyau Combat
    it: Bijoulotta
    de: Kampfjuwel
    es: G. Lucha
    ko: 격투주얼
  descriptions:
    jp_kana: "かくとうの　タイプの　ジュエル。\nもたせると　いちどだけ　かくとうの\nわざの　いりょくが　つよまる。"
    jp_kanji: "かくとうの　タイプの　ジュエル。\n持たせると　１度だけ　かくとうの\n技の　威力が　強まる。"
    en: "A gem with an essence of combat. When\nheld, it strengthens the power of a\nFighting-type move only once."
    fr: "Objet à tenir. Joyau augmentant\nune fois la puissance des capacités\nde type Combat."
    it: "Strumento da far tenere a un Pokémon.\nGioiello che potenzia una sola volta\nle mosse di tipo Lotta."
    de: "Ein Juwel vom Typ Kampf. Es\nerhöht einmalig die Stärke\neiner Attacke vom Typ Kampf."
    es: "Joya de un solo uso que potencia\nlos movimientos de tipo Lucha.\nDebe llevarla un Pokémon."
    ko: "격투타입의 주얼.\n지니게 하면 한 번만 격투\n기술의 위력이 강해진다."
figy_berry:
  names:
    jp_kana: フィラのみ
    jp_kanji: フィラのみ
    en: Figy Berry
    fr: Baie Figuy
    it: Baccafico
    de: Giefebeere
    es: Baya Higog
    ko: 무화열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nピンチのとき　ＨＰを　かいふくする。\nきらいな　あじだと　こんらん　する。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　ＨＰを　回復する。\nきらいな味だと　混乱する。"
    en: "If held by a Pokémon, it restores the\nuser’s HP in a pinch, but will cause\nconfusion if it hates the taste."
    fr: "Tenue, cette Baie restaure des PV en\ncas de besoin, mais rend confus si\nle Pokémon n’aime pas son goût."
    it: "Se tenuta da un Pokémon in difficoltà,\nrestituisce PS. Se al Pokémon non piace\nil suo sapore, può causare confusione."
    de: "Als getragenes Item füllt die Beere die\nKP eines Pokémon auf, doch ihr Aroma\nverwirrt jene, die es nicht mögen."
    es: "Los Pokémon pueden llevarla o usarla\npara restaurar algunos PS. Su sabor\npuede causar confusión."
    ko: "포켓몬에게 지니게 하면\n위급할 때 HP를 회복한다.\n싫어하는 맛이면 혼란에 빠진다."
fire_gem:
  names:
    jp_kana: ほのおのジュエル
    jp_kanji: ほのおのジュエル
    en: Fire Gem
    fr: Joyau Feu
    it: Bijoufuoco
    de: Feuerjuwel
    es: G. Fuego
    ko: 불꽃주얼
  descriptions:
    jp_kana: "ほのおの　タイプの　ジュエル。\nもたせると　いちどだけ　ほのおの\nわざの　いりょくが　つよまる。"
    jp_kanji: "ほのおの　タイプの　ジュエル。\n持たせると　１度だけ　ほのおの\n技の　威力が　強まる。"
    en: "A gem with an essence of fire. When\nheld, it strengthens the power of a\nFire-type move only once."
    fr: "Objet à tenir. Joyau augmentant\nune fois la puissance des capacités\nde type Feu."
    it: "Strumento da far tenere a un Pokémon.\nGioiello che potenzia una sola volta\nle mosse di tipo Fuoco."
    de: "Ein Juwel vom Typ Feuer. Es\nerhöht einmalig die Stärke\neiner Attacke vom Typ Feuer."
    es: "Joya de un solo uso que potencia\nlos movimientos de tipo Fuego.\nDebe llevarla un Pokémon."
    ko: "불꽃타입의 주얼.\n지니게 하면 한 번만 불꽃\n기술의 위력이 강해진다."
fire_stone:
  names:
    jp_kana: ほのおのいし
    jp_kanji: ほのおのいし
    en: Fire Stone
    fr: Pierre Feu
    it: Pietrafocaia
    de: Feuerstein
    es: Piedra Fuego
    ko: 불꽃의돌
  descriptions:
    jp_kana: "ある　とくていの　ポケモンを\nしんかさせる　ふしぎな　いし。\nだいだいいろを　している。"
    jp_kanji: "ある　特定の　ポケモンを\n進化させる　不思議な　石。\nだいだい色を　している。"
    en: "A peculiar stone that makes certain\nspecies of Pokémon evolve.\nIt is colored orange."
    fr: "Une pierre étrange qui fait évoluer\ncertaines espèces de Pokémon.\nElle est jaune et orange."
    it: "Pietra particolare che fa evolvere\ndeterminate specie di Pokémon.\nÈ gialla ed arancione."
    de: "Dieser spezielle Stein löst bei\nbestimmten Pokémon die Entwicklung\naus. Er ist orange."
    es: "Curiosa piedra que hace evolucionar\na determinadas especies de Pokémon.\nEs amarilla con una marca naranja."
    ko: "어느 특정한 포켓몬을\n진화시키는 이상한 돌.\n주황색을 띠고 있다."
fist_plate:
  names:
    jp_kana: こぶしのプレート
    jp_kanji: こぶしのプレート
    en: Fist Plate
    fr: Plaque Poing
    it: Lastrapugno
    de: Fausttafel
    es: Tabla Fuerte
    ko: 주먹플레이트
  descriptions:
    jp_kana: "かくとうの　タイプの　せきばん。\nもたせると　かくとうタイプの\nわざの　いりょくが　つよまる。"
    jp_kanji: "かくとうの　タイプの　石盤。\n持たせると　かくとうタイプの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon.\nIt is a stone tablet that boosts the\npower of Fighting-type moves."
    fr: "Objet à tenir. Tablette en pierre\naugmentant la puissance des capacités\nde type Combat."
    it: "Strumento da far tenere a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Lotta."
    de: "Ein Item zum Tragen. Diese Steintafel\nverstärkt Attacken vom Typ Kampf."
    es: "Tabla de piedra que potencia\nlos movimientos de tipo Lucha.\nDebe llevarla un Pokémon."
    ko: "격투타입의 석판.\n지니게 하면 격투타입\n기술의 위력이 강해진다."
flame_orb:
  names:
    jp_kana: かえんだま
    jp_kanji: かえんだま
    en: Flame Orb
    fr: Orbe Flamme
    it: Fiammosfera
    de: Heiß-Orb
    es: Llamasfera
    ko: 화염구슬
  descriptions:
    jp_kana: "さわると　ねつをだす　ふしぎなたま。\nもたせると　せんとうちゅうに\nやけどの　じょうたいに　なる。"
    jp_kanji: "触ると　熱をだす　不思議な玉。\n持たせると　戦闘中に\nやけどの　状態に　なる。"
    en: "An item to be held by a Pokémon.\nIt is a bizarre orb that inflicts a\nburn on the holder in battle."
    fr: "Objet à tenir. Orbe bizarre brûlant\nson porteur durant le combat."
    it: "Strumento da far tenere a un Pokémon.\nSfera bizzarra che procura una\nscottatura a chi la tiene in lotta."
    de: "Ein Item zum Tragen.\nDieser bizarre Orb fügt seinem\nTräger Verbrennungen zu."
    es: "Extraña esfera que causa quemaduras\nal Pokémon que la lleva en combate."
    ko: "만지면 열을 내는 이상한 구슬.\n지니게 하면 배틀 중에\n화상 상태가 된다."
flame_plate:
  names:
    jp_kana: ひのたまプレート
    jp_kanji: ひのたまプレート
    en: Flame Plate
    fr: Plaque Flam
    it: Lastrarogo
    de: Feuertafel
    es: Tabla Llama
    ko: 불구슬플레이트
  descriptions:
    jp_kana: "ほのおの　タイプの　せきばん。\nもたせると　ほのおタイプの\nわざの　いりょくが　つよまる。"
    jp_kanji: "ほのおの　タイプの　石盤。\n持たせると　ほのおタイプの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon.\nIt is a stone tablet that boosts the\npower of Fire-type moves."
    fr: "Objet à tenir. Tablette en pierre\naugmentant la puissance des capacités\nde type Feu."
    it: "Strumento da far tenere a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Fuoco."
    de: "Ein Item zum Tragen. Diese Steintafel\nverstärkt Attacken vom Typ Feuer."
    es: "Tabla de piedra que potencia\nlos movimientos de tipo Fuego.\nDebe llevarla un Pokémon."
    ko: "불꽃타입의 석판.\n지니게 하면 불꽃타입\n기술의 위력이 강해진다."
float_stone:
  names:
    jp_kana: かるいし
    jp_kanji: かるいし
    en: Float Stone
    fr: Pierrallégée
    it: Pietralieve
    de: Leichtstein
    es: Piedra Pómez
    ko: 가벼운돌
  descriptions:
    jp_kana: "とても　かるい　いし。\nもたせると　ポケモンの\nたいじゅうが　かるくなる。"
    jp_kanji: "とても　軽い　石。\n持たせると　ポケモンの\n体重が　軽くなる。"
    en: "A very light stone. It reduces the\nweight of a Pokémon when held."
    fr: "Une pierre très légère.\nElle réduit le poids du\nPokémon qui la tient."
    it: "Pietra leggerissima che riduce il peso\ndel Pokémon che la tiene."
    de: "Ein federleichter Stein, der das\nGewicht des Trägers verringert."
    es: "Piedra muy ligera que reduce el peso\ndel Pokémon que la lleve."
    ko: "매우 가벼운 돌.\n지니게 하면 포켓몬의\n체중이 가벼워진다."
fluffy_tail:
  names:
    jp_kana: エネコのシッポ
    jp_kanji: エネコのシッポ
    en: Fluffy Tail
    fr: Queue Skitty
    it: Coda Skitty
    de: Eneco-Rute
    es: Cola Skitty
    ko: 에나비꼬리
  descriptions:
    jp_kana: "ポケモンの　きを　ひかせる　どうぐ。\nやせいポケモンとの　せんとうから\nぜったいに　にげられる。"
    jp_kanji: "ポケモンの　気をひかせる　道具。\n野生ポケモンとの　戦闘から\n絶対に　逃げられる。"
    en: "An item that attracts Pokémon.\nUse it to flee from any battle with a\nwild Pokémon."
    fr: "Objet qui attire les Pokémon. Permet\nde s’enfuir d’un combat contre un\nPokémon sauvage."
    it: "Strumento che attrae i Pokémon. È utile\nper fuggire dalla lotta con Pokémon\nselvatici."
    de: "Ein hübsches Item. Es ermöglicht\ndie Flucht im Kampf gegen wilde\nPokémon."
    es: "Un objeto que atrae a los Pokémon.\nEs útil para huir de un combate\ncontra un Pokémon salvaje."
    ko: "포켓몬의 관심을 끄는 도구.\n야생 포켓몬과의 배틀에서\n반드시 도망칠 수 있다."
flying_gem:
  names:
    jp_kana: ひこうのジュエル
    jp_kanji: ひこうのジュエル
    en: Flying Gem
    fr: Joyau Vol
    it: Bijouvolante
    de: Flugjuwel
    es: G. Voladora
    ko: 비행주얼
  descriptions:
    jp_kana: "ひこうの　タイプの　ジュエル。\nもたせると　いちどだけ　ひこうの\nわざの　いりょくが　つよまる。"
    jp_kanji: "ひこうの　タイプの　ジュエル。\n持たせると　１度だけ　ひこうの\n技の　威力が　強まる。"
    en: "A gem with an essence of air. When held,\nit strengthens the power of a\nFlying-type move only once."
    fr: "Objet à tenir. Joyau augmentant\nune fois la puissance des capacités\nde type Vol."
    it: "Strumento da far tenere a un Pokémon.\nGioiello che potenzia una sola volta\nle mosse di tipo Volante."
    de: "Ein Juwel vom Typ Flug. Es\nerhöht einmalig die Stärke\neiner Attacke vom Typ Flug."
    es: "Joya de un solo uso que potencia\nlos movimientos de tipo Volador.\nDebe llevarla un Pokémon."
    ko: "비행타입의 주얼.\n지니게 하면 한 번만 비행\n기술의 위력이 강해진다."
focus_band:
  names:
    jp_kana: きあいのハチマキ
    jp_kanji: きあいのハチマキ
    en: Focus Band
    fr: Bandeau
    it: Bandana
    de: Fokus-Band
    es: Cinta Focus
    ko: 기합의머리띠
  descriptions:
    jp_kana: "もたせると　ひんしに　なりそうな\nわざを　うけても　ＨＰを　１だけ\nのこして　たえることが　ある。"
    jp_kanji: "持たせると　ひんしに　なりそうな\n技を　受けても　ＨＰを　１だけ\n残して　耐えることが　ある。"
    en: "An item to be held by a Pokémon.\nThe holder may endure a potential KO\nattack, leaving it with just 1 HP."
    fr: "Objet à tenir pouvant parfois empêcher\nd’être mis K.O., ne laissant qu’un PV."
    it: "Strumento da far tenere a un Pokémon.\nChi lo tiene può evitare un potenziale\nKO e rimanere con un solo PS."
    de: "Ein Item, das die Kampfunfähigkeit\nverhindern kann, da dem Träger\n1 KP bleibt."
    es: "El Pokémon que la lleva puede resistir\nun golpe que potencialmente lo deja\nK.O. con un PS."
    ko: "지니게 하면\n기절할 듯한 기술을 받아도\nHP를 1 남겨서 견디기도 한다."
focus_sash:
  names:
    jp_kana: きあいのタスキ
    jp_kanji: きあいのタスキ
    en: Focus Sash
    fr: Ceint. Force
    it: Focalnastro
    de: Fokusgurt
    es: Banda Focus
    ko: 기합의띠
  descriptions:
    jp_kana: "もたせると　ＨＰが　まんたんのとき\nひんしになりそうな　わざを　うけても　\nＨＰ１で　いちどだけ　たえる。"
    jp_kanji: "持たせると　ＨＰが　満タンのとき\nひんしになりそうな　技を　受けても\nＨＰ１で　１度だけ　耐える。"
    en: "An item to be held by a Pokémon. If it\nhas full HP, the holder will endure one\npotential KO attack, leaving 1 HP."
    fr: "Objet à tenir permettant au porteur,\ns’il a ses PV pleins, d’éviter un\npotentiel K.O. en conservant un PV."
    it: "Strumento da far tenere a un Pokémon.\nSe chi lo tiene ha tutti i PS, eviterà\nun potenziale KO, rimanendo con un PS."
    de: "Ein Item zum Tragen. Bei vollen KP\nreduziert eine K.O.-Attacke die\nKP nur auf 1."
    es: "Si el Pokémon que la lleva tiene los PS\nal máximo, puede resistir un golpe que\npotencialmente lo deja K.O. con un PS."
    ko: "지니게 하면 HP가 꽉 찼을 때\n기절할 듯한 기술을 당해도\nHP1로 한 번은 버틴다."
fresh_water:
  names:
    jp_kana: おいしいみず
    jp_kanji: おいしいみず
    en: Fresh Water
    fr: Eau Fraîche
    it: Acqua Fresca
    de: Tafelwasser
    es: Agua Fresca
    ko: 맛있는물
  descriptions:
    jp_kana: "ミネラル　たっぷりの　みず。\nポケモン　１ひきの　ＨＰを\n５０だけ　かいふくする。"
    jp_kanji: "ミネラル　たっぷりの　水。\nポケモン　１匹の　ＨＰを\n５０だけ　回復する。"
    en: "Water with a high mineral content.\nIt restores the HP of one Pokémon by\n50 points."
    fr: "Une eau riche en minéraux.\nRestaure 50 PV à un Pokémon."
    it: "Acqua ricca di sostanze minerali.\nRestituisce 50 PS ad un Pokémon."
    de: "Ein stilles Wasser mit hohem\nMineralienanteil, das die KP eines\nPokémon um 50 Punkte auffüllt."
    es: "Agua de alto contenido mineral que\nrestaura 50 PS de un Pokémon."
    ko: "미네랄이 가득한 물.\n포켓몬 1마리의 HP를\n50만큼 회복한다."
friend_ball:
  names:
    jp_kana: フレンドボール
    jp_kanji: フレンドボール
    en: Friend Ball
    fr: Copain Ball
    it: Friend Ball
    de: Freundesball
    es: Amigo Ball
    ko: 프렌드볼
  descriptions:
    jp_kana: "つかまえた　やせいポケモンが\nすぐに　なついて　くれる\nちょっと　かわった　ボール。"
    jp_kanji: "捕まえた　野生ポケモンが\nすぐに　なついて　くれる\nちょっと　変わった　ボール。"
    en: "A Poké Ball that makes caught Pokémon\nmore friendly."
    fr: "Une Poké Ball un peu spéciale qui\npermet de rendre rapidement amicaux\nles Pokémon sauvages attrapés avec."
    it: "Poké Ball un po’ originale che fa sì che\ni Pokémon selvatici con essa catturati\nsi affezionino più rapidamente."
    de: "Ein besonderer Ball, der die\nSympathie von gefangenen Pokémon\nschneller ansteigen lässt."
    es: "Poké Ball algo distinta que hace más\namistosos a los Pokémon salvajes que\nse capturan con ella."
    ko: "잡은 야생 포켓몬이\n바로 친밀해지는\n조금 특이한 볼."
full_heal:
  names:
    jp_kana: なんでもなおし
    jp_kanji: なんでもなおし
    en: Full Heal
    fr: Total Soin
    it: Cura Totale
    de: Hyperheiler
    es: Cura Total
    ko: 만병통치제
  descriptions:
    jp_kana: "スプレーしきの　くすり。\nポケモン　１ひきの　じょうたいの\nいじょうを　すべて　かいふくする。"
    jp_kanji: "スプレー式の　薬。\nポケモン　１匹の　状態の\n異常を　すべて　回復する。"
    en: "A spray-type medicine.\nIt heals all the status problems of a\nsingle Pokémon."
    fr: "Un médicament sous forme de spray.\nSoigne tous les problèmes de statut\nd’un Pokémon."
    it: "Rimedio spray.\nRisolve tutti i problemi di stato\ndi un Pokémon."
    de: "Ein Spray, das alle Statusprobleme\neines Pokémon behebt."
    es: "Medicina en espray que cura todos los\nproblemas de estado de un Pokémon."
    ko: "스프레이식의 약.\n포켓몬 1마리의\n상태 이상을 모두 회복한다."
full_incense:
  names:
    jp_kana: まんぷくおこう
    jp_kanji: まんぷくおこう
    en: Full Incense
    fr: Encens Plein
    it: Gonfioaroma
    de: Lahmrauch
    es: Incie. Lento
    ko: 만복향로
  descriptions:
    jp_kana: "ふしぎな　かおりの　おこう。\nもたせた　ポケモンは　いつもより\nこうどうが　おそくなる。"
    jp_kanji: "不思議な　香りの　御香。\n持たせた　ポケモンは　いつもより\n行動が　遅くなる。"
    en: "An item to be held by a Pokémon. It is\nan exotic-smelling incense that makes\nthe holder bloated and slow moving."
    fr: "Objet à tenir. Encens au parfum\nexotique gonflant son porteur et\nle faisant se déplacer lentement."
    it: "Strumento da far tenere a un Pokémon.\nIncenso dal profumo esotico che\nrende gonfio e lento chi lo tiene."
    de: "Ein Item zum Tragen. Dieses exotische\nDuftkraut macht den Träger benommen\nund langsam."
    es: "Incienso de exótico aroma que hace\nque el Pokémon que lo lleve esté\naturdido y se mueva más despacio."
    ko: "이상한 향기의 향로.\n지니게 한 포켓몬은 여느 때보다\n행동이 느려진다."
full_restore:
  names:
    jp_kana: かいふくのくすり
    jp_kanji: かいふくのくすり
    en: Full Restore
    fr: Guérison
    it: Ricarica Tot
    de: Top-Genesung
    es: Restau. Todo
    ko: 회복약
  descriptions:
    jp_kana: "ポケモン　１ひきの　ＨＰと\nじょうたい　いじょうを　すべて\nかいふくする。"
    jp_kanji: "ポケモン　１匹の　ＨＰと\n状態異常を　すべて\n回復する。"
    en: "A medicine that fully restores the HP\nand heals any status problems of a\nsingle Pokémon."
    fr: "Un médicament qui restaure tous les\nPV d’un Pokémon et soigne tous ses\nproblèmes de statut."
    it: "Rimedio che restituisce tutti i PS ad\nun Pokémon e risolve i suoi problemi\ndi stato."
    de: "Dieses Item stellt alle KP eines\nPokémon wieder her und behebt\nalle Statusprobleme."
    es: "Medicina que restaura todos los PS\ny cura todos los problemas de\nestado de un Pokémon."
    ko: "포켓몬 1마리의 HP와\n상태 이상을 모두\n회복한다."
galactic_key:
  names:
    jp_kana: ギンガだんのカギ
    jp_kanji: ギンガだんのカギ
    en: Galactic Key
    fr: Clé Galaxie
    it: Galachiave
    de: G-Schlüssel
    es: Ll. Galaxia
    ko: 갤럭시단의열쇠
  descriptions:
    jp_kana: "ギンガだんアジトの　セキュリティを\nかいじょ　するための　カードキー。\nなくすと　おしおき　されるらしい。"
    jp_kanji: "ギンガ団アジトの　セキュリティを\n解除するための　カードキー。\nなくすと　おしおき　されるらしい。"
    en: "A card key for disengaging security\nsystems in the Galactic HQ. Losing it\ncan result in punishment, apparently."
    fr: "Clé magnétique servant à désactiver les\nsystèmes de sécurité du QG Galaxie.\nLa perdre entraîne une punition."
    it: "Chiave a scheda per disattivare i\nsistemi di sicurezza nella Sede Galassia.\nSe la si perde, si viene puniti."
    de: "Dieser Türöffner deaktiviert\ndie Sicherheitssysteme im\nHauptquartier von Team Galaktik."
    es: "Desactiva los sistemas de seguridad de\nla Base Galaxia. Por lo visto, perder\nesta tarjeta se castiga severamente."
    ko: "갤럭시단아지트의 보안을\n해제하기 위한 카드키다.\n잃어버리면 벌을 받는 듯하다."
ganlon_berry:
  names:
    jp_kana: リュガのみ
    jp_kanji: リュガのみ
    en: Ganlon Berry
    fr: Baie Lingan
    it: Baccalongan
    de: Linganbeere
    es: Baya Gonlan
    ko: 용아열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nピンチのとき　じぶんの\nぼうぎょが　あがる。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　自分の\n防御が　あがる。"
    en: "If held by a Pokémon, it raises its\nDefense stat in a pinch."
    fr: "Tenue, cette Baie monte la Défense\nen cas de besoin."
    it: "Aumenta la Difesa, se il Pokémon che\nla tiene si trova in difficoltà."
    de: "Als getragenes Item erhöht diese Beere\nden Verteidigungs-Wert eines Pokémon,\nsobald es in einer Notlage steckt."
    es: "Si la lleva un Pokémon, le sube\nla Defensa en un momento de apuro."
    ko: "포켓몬에게 지니게 하면\n위급할 때 자신의\n방어가 올라간다."
gb_sounds:
  names:
    jp_kana: ＧＢプレイヤー
    jp_kanji: ＧＢプレイヤー
    en: GB Sounds
    fr: Lecteur GB
    it: Lettore GB
    de: GB-Player
    es: Lector GB
    ko: GB플레이어
  descriptions:
    jp_kana: "なつかしい　きょくが　きける\nおんがく　プレイヤー。\nスイッチ　ひとつで　きりかえられる。"
    jp_kanji: "なつかしい　曲が　きける\n音楽プレイヤー。\nスイッチ　ひとつで　きりかえられる。"
    en: "A music player that allows you to listen\nto nostalgic songs. It’s operated with\na single switch."
    fr: "Un lecteur de musique qui permet de se\nplonger dans une atmosphère rétro. Une\npression suffit pour changer de mode."
    it: "Lettore di musica che permette di\nimmergersi in atmosfere rétro.\nUn solo pulsante per cambiare canzone."
    de: "Ein Abspielgerät, das Musik aus einer\nlängst vergangenen Zeit spielt. Lässt\nsich durch simplen Knopfdruck bedienen."
    es: "Lector con el que se pueden escuchar\naquellas canciones tan nostálgicas.\nSe cambia con un solo interruptor."
    ko: "그리운 곡을 들을 수 있는\n음악 플레이어.\n스위치 하나로 전환할 수 있다."
genius_feather:
  names:
    jp_kana: ちりょくのハネ
    jp_kanji: ちりょくのハネ
    en: Genius Wing
    fr: Aile Esprit
    it: Piumingegno
    de: Geniefeder
    es: P. Intelecto
    ko: 지력날개
  descriptions:
    jp_kana: "ポケモンに　つかう　どうぐ。\nポケモン　１ひきの　とくこうの\nきそポイントを　ちょっと　あげる。"
    jp_kanji: "ポケモンに　使う　道具。\nポケモン　１匹の　特攻の\n基礎ポイントを　ちょっと　あげる。"
    en: "An item for use on a Pokémon. It\nslightly increases the base Sp. Atk\nstat of a single Pokémon."
    fr: "Objet à utiliser sur un Pokémon.\nIl augmente un peu son\nAttaque Spéciale de base."
    it: "Strumento da usare su un Pokémon.\nNe aumenta di poco l’Attacco Speciale\ndi base."
    de: "Schenkt man einem Pokémon dieses\nItem, wird dessen Spezial-Angriff\ndauerhaft erhöht."
    es: "Pluma que aumenta un poco\nel Ataque Especial de un Pokémon\nal subir de nivel."
    ko: "포켓몬에게 사용하는 도구.\n포켓몬 1마리의 특수공격\n기초 포인트를 조금 올린다."
ghost_gem:
  names:
    jp_kana: ゴーストジュエル
    jp_kanji: ゴーストジュエル
    en: Ghost Gem
    fr: Joyau Spectr
    it: Bijouspettro
    de: Geistjuwel
    es: G. Fantasma
    ko: 고스트주얼
  descriptions:
    jp_kana: "ゴーストの　タイプの　ジュエル。\nもたせると　いちどだけ　ゴーストの\nわざの　いりょくが　つよまる。"
    jp_kanji: "ゴーストの　タイプの　ジュエル。\n持たせると　１度だけ　ゴーストの\n技の　威力が　強まる。"
    en: "A gem with a spectral essence. When\nheld, it strengthens the power of a\nGhost-type move only once."
    fr: "Objet à tenir. Joyau augmentant\nune fois la puissance des capacités\nde type Spectre."
    it: "Strumento da far tenere a un Pokémon.\nGioiello che potenzia una sola volta\nle mosse di tipo Spettro."
    de: "Ein Juwel vom Typ Geist. Es\nerhöht einmalig die Stärke\neiner Attacke vom Typ Geist."
    es: "Joya de un solo uso que potencia\nlos movimientos de tipo Fantasma.\nDebe llevarla un Pokémon."
    ko: "고스트타입의 주얼.\n지니게 하면 한 번만 고스트\n기술의 위력이 강해진다."
good_rod:
  names:
    jp_kana: いいつりざお
    jp_kanji: いいつりざお
    en: Good Rod
    fr: Super Canne
    it: Amo Buono
    de: Profiangel
    es: Caña Buena
    ko: 좋은낚싯대
  descriptions:
    jp_kana: "あたらしくて　いい　つりざお。\nみずの　ある　ばしょで　つかうと\nポケモンが　つれる。"
    jp_kanji: "あたらしくて　いい　つりざお。\n水の　ある　場所で　使うと\nポケモンが　つれる。"
    en: "A new, good-quality fishing rod.\nUse it by any body of water to fish for\nwild aquatic Pokémon."
    fr: "Une canne neuve et de bonne qualité.\nUtilisez-la pour pêcher des Pokémon\nsauvages dans les points d’eau."
    it: "Amo nuovo e di qualità. Si usa per\npescare Pokémon selvatici in qualsiasi\nspecchio d’acqua."
    de: "Eine recht gute Angel. Damit kannst\ndu in jedem Gewässer nach Pokémon\nangeln."
    es: "Caña de pescar nuevecita y de gran\ncalidad. Pesca Pokémon salvajes\nen todo tipo de aguas."
    ko: "새로 나온 좋은 낚싯대.\n물이 있는 장소에서 사용하면\n포켓몬을 낚을 수 있다."
gooey_mulch:
  names:
    jp_kana: ねばねばこやし
    jp_kanji: ねばねばこやし
    en: Gooey Mulch
    fr: Fertiglu
    it: Fertilcolla
    de: Neumulch
    es: Abono Brote
    ko: 끈적끈적비료
  descriptions:
    jp_kana: "きのみを　そだてる　ちほうでは\nふかふかのつちに　まいて　つかう。\nマニアが　たかく　かってくれる。"
    jp_kanji: "きのみを　育てる　地方では\nふかふかのつちに　まいて　使う。\nマニアが　高く　買ってくれる。"
    en: "A fertilizer to be spread on soft soil\nin regions where Berries are grown.\nA maniac will buy it for a high price."
    fr: "Un engrais utilisé sur sol meuble.\nLes amateurs en donnent un bon prix."
    it: "Usata per favorire la crescita delle\nBacche nelle regioni dove si coltivano.\nGli intenditori pagano caro per averla."
    de: "In Regionen, wo man Beeren anbaut,\nmengt man ihn unter weiche Erde.\nSammler geben ihr letztes Hemd dafür."
    es: "Un fertilizante usado en suelo fértil\ndonde crecen las Bayas.\nMuy apreciado por los coleccionistas."
    ko: "나무열매를 키우는 지방에서는\n푹신푹신한 땅에 뿌려 쓴다.\n마니아가 비싼 값에 산다."
gracidea:
  names:
    jp_kana: グラシデアのはな
    jp_kanji: グラシデアのはな
    en: Gracidea
    fr: Gracidée
    it: Gracidea
    de: Gracidea
    es: Gracídea
    ko: 그라시데아꽃
  descriptions:
    jp_kana: "たんじょうびや　きねんび　などに\nかんしゃの　きもちを　つたえるため\nブーケにして　おくることが　ある。"
    jp_kanji: "誕生日や　記念日などに\n感謝の　気持ちを　伝えるため\nブーケにして　贈ることが　ある。"
    en: "A flower sometimes bundled in bouquets\nto convey gratitude on special\noccasions like birthdays."
    fr: "Fleur que l’on offre en gage de\nreconnaissance, notamment à\nl’occasion d’un anniversaire."
    it: "Un fiore, a volte raccolto in bouquet,\nche esprime gratitudine in occasioni\nparticolari, come i compleanni."
    de: "Mit dieser Blume, manchmal auch als Teil\neines Bouquets, kann man an speziellen\nTagen seine Dankbarkeit ausdrücken."
    es: "Una flor que se suele regalar en ramos\npara expresar agradecimiento en\nocasiones especiales, como cumpleaños."
    ko: "생일이나 기념일 등에\n감사의 마음을 전하기 위해\n부케로 만들어 보내는 일이 있다."
gram_1:
  names:
    jp_kana: はいたつぶつ１
    jp_kanji: はいたつぶつ１
    en: Gram 1
    fr: Courrier 1
    it: Missiva 1
    de: Briefpost 1
    es: Envío 1
    ko: 배달물1
  descriptions:
    jp_kana: "キャモメが　はいたつ　している\nたいせつな　てがみ。"
    jp_kanji: "キャモメが　配達している\nたいせつな　手紙。"
    en: "An important letter which\nWingull delivers."
    fr: "Un courrier important\ntransporté par un Goélise."
    it: "Un’importante lettera che Wingull\ndeve consegnare."
    de: "Eine wichtige Briefpost,\nüberbracht von Wingull."
    es: Carta importante que entrega Wingull.
    ko: "갈모매가 배달하는\n소중한 편지."
gram_2:
  names:
    jp_kana: はいたつぶつ２
    jp_kanji: はいたつぶつ２
    en: Gram 2
    fr: Courrier 2
    it: Missiva 2
    de: Briefpost 2
    es: Envío 2
    ko: 배달물2
  descriptions:
    jp_kana: "キャモメが　はいたつ　している\nたいせつな　てがみ。"
    jp_kanji: "キャモメが　配達している\nたいせつな　手紙。"
    en: "An important letter which\nWingull delivers."
    fr: "Un courrier important\ntransporté par un Goélise."
    it: "Un’importante lettera che Wingull\ndeve consegnare."
    de: "Eine wichtige Briefpost,\nüberbracht von Wingull."
    es: Carta importante que entrega Wingull.
    ko: "갈모매가 배달하는\n소중한 편지."
gram_3:
  names:
    jp_kana: はいたつぶつ３
    jp_kanji: はいたつぶつ３
    en: Gram 3
    fr: Courrier 3
    it: Missiva 3
    de: Briefpost 3
    es: Envío 3
    ko: 배달물3
  descriptions:
    jp_kana: "キャモメが　はいたつ　している\nたいせつな　てがみ。"
    jp_kanji: "キャモメが　配達している\nたいせつな　手紙。"
    en: "An important letter which\nWingull delivers."
    fr: "Un courrier important\ntransporté par un Goélise."
    it: "Un’importante lettera che Wingull\ndeve consegnare."
    de: "Eine wichtige Briefpost,\nüberbracht von Wingull."
    es: Carta importante que entrega Wingull.
    ko: "갈모매가 배달하는\n소중한 편지."
grass_gem:
  names:
    jp_kana: くさのジュエル
    jp_kanji: くさのジュエル
    en: Grass Gem
    fr: Joyau Plante
    it: Bijouerba
    de: Pflanzjuwel
    es: G. Planta
    ko: 풀주얼
  descriptions:
    jp_kana: "くさの　タイプの　ジュエル。\nもたせると　いちどだけ　くさの\nわざの　いりょくが　つよまる。"
    jp_kanji: "くさの　タイプの　ジュエル。\n持たせると　１度だけ　くさの\n技の　威力が　強まる。"
    en: "A gem with an essence of nature. When\nheld, it strengthens the power of a\nGrass-type move only once."
    fr: "Objet à tenir. Joyau augmentant\nune fois la puissance des capacités\nde type Plante."
    it: "Strumento da far tenere a un Pokémon.\nGioiello che potenzia una sola volta\nle mosse di tipo Erba."
    de: "Ein Juwel vom Typ Pflanze. Es\nerhöht einmalig die Stärke\neiner Attacke vom Typ Pflanze."
    es: "Joya de un solo uso que potencia\nlos movimientos de tipo Planta.\nDebe llevarla un Pokémon."
    ko: "풀타입의 주얼.\n지니게 하면 한 번만 풀\n기술의 위력이 강해진다."
great_ball:
  names:
    jp_kana: スーパーボール
    jp_kanji: スーパーボール
    en: Great Ball
    fr: Super Ball
    it: Mega Ball
    de: Superball
    es: Superball
    ko: 수퍼볼
  descriptions:
    jp_kana: "モンスターボールよりも　さらに\nポケモンを　つかまえやすくなった\nすこし　せいのうのいい　ボール。"
    jp_kanji: "モンスターボールよりも　さらに\nポケモンを　捕まえやすくなった\n少し　性能のいい　ボール。"
    en: "A good, high-performance Ball that\nprovides a higher Pokémon catch rate\nthan a standard Poké Ball."
    fr: "Une Ball très performante dont le taux\nde réussite est supérieur à celui de la\nPoké Ball."
    it: "Ball dalle ottime prestazioni: fornisce\nmaggiori probabilità di cattura rispetto\nalla Poké Ball."
    de: "Ein Ball mit guter Erfolgsquote.\nDem Pokéball in allen\nPunkten überlegen."
    es: "Poké Ball de alto rendimiento.\nTiene un índice de éxito superior\nal de la Poké Ball."
    ko: "몬스터볼보다도 더욱\n포켓몬을 잡기 쉬워진\n약간 성능이 좋은 볼."
green_apricorn:
  names:
    jp_kana: みどぼんぐり
    jp_kanji: みどぼんぐり
    en: Grn Apricorn
    fr: Noigrume Ver
    it: Ghic. Verde
    de: Aprikoko Grn
    es: Bonguri Ver
    ko: 초록규토리
  descriptions:
    jp_kana: "みどりの　ぼんぐり。\nふしぎと　こうばしい　かおりがする。"
    jp_kanji: "みどりの　ぼんぐり。\n不思議と　こうばしい　かおりがする。"
    en: "A green Apricorn.\nIt has a mysterious, aromatic scent."
    fr: "Un Noigrume de couleur verte.\nIl dégage un arôme étonnamment riche."
    it: "Una Ghicocca di colore verde.\nEmana un profumo intenso."
    de: "Eine grüne Aprikoko. Sie verströmt\neinen seltsam aromatischen Duft."
    es: "Bonguri de color verde y aroma peculiar\nque recuerda al café tostado."
    ko: "초록색의 규토리.\n이상하게도 고소한 향기가 난다."
green_scarf:
  names:
    jp_kana: みどりのバンダナ
    jp_kanji: みどりのバンダナ
    en: Green Scarf
    fr: Foul. Vert
    it: Fascia Verde
    de: Grüner Schal
    es: Pañ. Verde
    ko: 초록밴드
  descriptions:
    jp_kana: "もたせて　コンテストに　さんかすると\nその　ポケモンは　いつもより\nかしこく　みられる。"
    jp_kanji: "持たせて　コンテストに　参加すると\nその　ポケモンは　いつもより\nかしこく　みられる。"
    en: "An item to be held by a Pokémon.\nIt boosts the Smart aspect of the\nholder in a Contest."
    fr: "Objet à tenir. Augmente l’Intelligence\nd’un Pokémon dans les Concours."
    it: "Strumento da far tenere a un Pokémon.\nAumenta l’“Acume” di chi lo tiene\nin una Gara."
    de: "Ein Item zum Tragen. Trainer erhöhen\ndamit in Wettbewerben die „Klugheit“\nihres Pokémon."
    es: "Debe llevarlo un Pokémon.\nAumenta el ingenio en los concursos."
    ko: "지니게 하여 콘테스트에 참가하면\n그 포켓몬은 여느 때보다\n슬기롭게 보인다."
green_shard:
  names:
    jp_kana: みどりのかけら
    jp_kanji: みどりのかけら
    en: Green Shard
    fr: Tesson Vert
    it: Coccio Verde
    de: Grünstück
    es: Parte Verde
    ko: 초록조각
  descriptions:
    jp_kana: "みどりの　ちいさな　かけら。\nむかしに　つくられた　なにかの\nどうぐの　いちぶ　らしい。"
    jp_kanji: "緑の　小さな　かけら。\n昔に　つくられた　なにかの\n道具の　一部らしい。"
    en: "A small green shard.\nIt appears to be from some sort of\nimplement made long ago."
    fr: "Petit tesson vert.\nIl semble provenir d’un outil très\nancien."
    it: "Un piccolo coccio verde che con ogni\nprobabilità è un frammento di un antico\nstrumento."
    de: "Eine grüne Scherbe eines antiken\nWerkzeugs, das vor langer Zeit\nangefertigt wurde."
    es: "Un pequeño fragmento verde.\nParece formar parte de algún tipo\nde herramienta antigua."
    ko: "초록색 작은 조각.\n옛날에 만들어진 어떤\n도구의 일부인 듯하다."
greet_mail:
  names:
    jp_kana: はじめてメール
    jp_kanji: はじめてメール
    en: Greet Mail
    fr: Lettre Salut
    it: Mess. Inizio
    de: Grußbrief
    es: C. Inicial
    ko: 첫메일
  descriptions:
    jp_kana: "はじめましての　あいさつが\nかきやすい　びんせん。\nポケモンに　もたせて　つかう。"
    jp_kanji: "はじめましての　あいさつが\n書きやすい　レターペーパー。\nポケモンに　持たせて　使う。"
    en: "Stationery designed for\nintroductory greetings.\nLet a Pokémon hold it for delivery."
    fr: "Un papier à lettres idéal pour\nse présenter. Peut être tenu\net livré par un Pokémon."
    it: "Carta da lettera ideale per presentarsi\na qualcuno. Un Pokémon può tenerla e\nconsegnarla."
    de: "Briefpapier, mit dem man sich\nbei jemandem vorstellen kann.\nGib es einem Pokémon zum Tragen."
    es: "Carta para presentarse a alguien.\nHaz que la entregue un Pokémon."
    ko: "첫인사를\n쉽게 쓸 수 있는 편지지.\n포켓몬에게 지니게 해서 쓴다."
grepa_berry:
  names:
    jp_kana: ウブのみ
    jp_kanji: ウブのみ
    en: Grepa Berry
    fr: Baie Résin
    it: Baccauva
    de: Labrusbeere
    es: Baya Uvav
    ko: 또뽀열매
  descriptions:
    jp_kana: "ポケモンに　あげると\nとても　なつき　やすくなるが\nとくぼうの　きそポイントは　さがる。"
    jp_kanji: "ポケモンに　あげると\nとても　なつき　やすくなるが\n特防の　基礎ポイントは　さがる。"
    en: "Using it on a Pokémon makes it more\nfriendly, but it also lowers its base\nSp. Def stat."
    fr: "Rend les Pokémon plus amicaux, mais\nbaisse leur stat Défense Spéciale de\nbase."
    it: "Utilizzata su un Pokémon, lo rende più\namichevole, ma diminuisce la Difesa\nSpeciale di base."
    de: "Isst ein Pokémon diese Beere,\nstärkt dies eure Freundschaft, ver-\nringert aber seinen Spez.-Vert.-Wert."
    es: "Al usarla con un Pokémon, se gana\nsu amistad, pero también reduce\nsu Defensa Especial de base."
    ko: "포켓몬에게 주면\n매우 친밀해지기 쉬워지지만\n특수방어의 기초 포인트가 떨어진다."
grip_claw:
  names:
    jp_kana: ねばりのかぎづめ
    jp_kanji: ねばりのかぎづめ
    en: Grip Claw
    fr: Accro Griffe
    it: Presartigli
    de: Griffklaue
    es: Garra Garfio
    ko: 끈기갈고리손톱
  descriptions:
    jp_kana: "もたせると　しめつける　まきつくなど\nダメージを　あたえつづける　わざの\nターンすうが　ふえる。"
    jp_kanji: "持たせると　しめつける　まきつくなど\nダメージを　あたえつづける　技の\nターン数が　増える。"
    en: "A Pokémon held item that extends the\nduration of multiturn attacks like\nBind and Wrap."
    fr: "Objet à tenir augmentant la durée des\nattaques à tours multiples telles que\nLigotage et Étreinte."
    it: "Strumento da far tenere a un Pokémon\nche prolunga gli attacchi multiturno\ncome Avvolgibotta e Legatutto."
    de: "Ein Item zum Tragen.\nVerlängert die Dauer von\nKlammergriff, Wickel etc."
    es: "Prolonga la duración de ataques\nmultiturno como Atadura y Repetición.\nDebe llevarla un Pokémon."
    ko: "지니게 하면 조이기나 김밥말이 등\n데미지를 계속 주는 기술의\n턴 수가 늘어난다."
griseous_orb:
  names:
    jp_kana: はっきんだま
    jp_kanji: はっきんだま
    en: Griseous Orb
    fr: Orbe Platiné
    it: Grigiosfera
    de: Platinum-Orb
    es: Griseosfera
    ko: 백금옥
  descriptions:
    jp_kana: "ギラティナに　もたせると　ドラゴンと\nゴーストタイプの　わざの　いりょくが\nあがる　ひかり　かがやく　たま。"
    jp_kanji: "ギラティナに　持たせると　ドラゴンと\nゴーストタイプの　技の　威力が\nあがる　光り　輝く　珠。"
    en: "A glowing orb to be held by Giratina.\nIt boosts the power of Dragon- and\nGhost-type moves."
    fr: "Mystérieux objet destiné à Giratina.\nAméliore les capacités de type Dragon\net Spectre."
    it: "Poliedro splendente da far tenere a\nGiratina. Aumenta la potenza delle\nmosse di tipo Drago e Spettro."
    de: "Ein glühender Orb. Verstärkt\nAttacken vom Typ Drachen und\nGeist, wenn Giratina ihn trägt."
    es: "Una esfera brillante que potencia los\nmovimientos de tipo Dragón y Fantasma.\nDebe llevarla Giratina."
    ko: "기라티나에게 지니게 하면 드래곤과\n고스트타입 기술의 위력이 올라가는\n반짝반짝 빛나는 구슬."
ground_gem:
  names:
    jp_kana: じめんのジュエル
    jp_kanji: じめんのジュエル
    en: Ground Gem
    fr: Joyau Sol
    it: Bijouterra
    de: Bodenjuwel
    es: G. Tierra
    ko: 땅주얼
  descriptions:
    jp_kana: "じめんの　タイプの　ジュエル。\nもたせると　いちどだけ　じめんの\nわざの　いりょくが　つよまる。"
    jp_kanji: "じめんの　タイプの　ジュエル。\n持たせると　１度だけ　じめんの\n技の　威力が　強まる。"
    en: "A gem with an essence of land. When\nheld, it strengthens the power of a\nGround-type move only once."
    fr: "Objet à tenir. Joyau augmentant\nune fois la puissance des capacités\nde type Sol."
    it: "Strumento da far tenere a un Pokémon.\nGioiello che potenzia una sola volta\nle mosse di tipo Terra."
    de: "Ein Juwel vom Typ Boden. Es\nerhöht einmalig die Stärke\neiner Attacke vom Typ Boden."
    es: "Joya de un solo uso que potencia\nlos movimientos de tipo Tierra.\nDebe llevarla un Pokémon."
    ko: "땅타입의 주얼.\n지니게 하면 한 번만 땅\n기술의 위력이 강해진다."
growth_mulch:
  names:
    jp_kana: すくすくこやし
    jp_kanji: すくすくこやし
    en: Growth Mulch
    fr: Fertipousse
    it: Fertilrapido
    de: Wachsmulch
    es: Abono Rápido
    ko: 무럭무럭비료
  descriptions:
    jp_kana: "きのみを　そだてる　ちほうでは\nふかふかのつちに　まいて　つかう。\nマニアが　たかく　かってくれる。"
    jp_kanji: "きのみを　育てる　地方では\nふかふかのつちに　まいて　使う。\nマニアが　高く　買ってくれる。"
    en: "A fertilizer to be spread on soft soil\nin regions where Berries are grown.\nA maniac will buy it for a high price."
    fr: "Un engrais utilisé sur sol meuble.\nLes amateurs en donnent un bon prix."
    it: "Usato per favorire la crescita delle\nBacche nelle regioni dove si coltivano.\nGli intenditori pagano caro per averlo."
    de: "In Regionen, wo man Beeren anbaut,\nmengt man ihn unter weiche Erde.\nSammler geben ihr letztes Hemd dafür."
    es: "Un fertilizante usado en suelo fértil\ndonde crecen las Bayas.\nMuy apreciado por los coleccionistas."
    ko: "나무열매를 키우는 지방에서는\n푹신푹신한 땅에 뿌려 쓴다.\n마니아가 비싼 값에 산다."
grubby_hanky:
  names:
    jp_kana: よごれたハンカチ
    jp_kanji: よごれたハンカチ
    en: Grubby Hanky
    fr: MouchoirSale
    it: Pezza Sporca
    de: Schnäuztuch
    es: Pañ. Sucio
    ko: 더러운손수건
  descriptions:
    jp_kana: "シッポウシティにある　カフェソーコの\nじょうれんが　おとした　ハンカチ。\nほのかに　ポケモンの　かおりがする。"
    jp_kanji: "シッポウシティにある　カフェソーコの\n常連が　落とした　ハンカチ。\nほのかに　ポケモンの　香りがする。"
    en: "A handkerchief dropped by\na regular at Café Warehouse.\nIt smells faintly like a Pokémon."
    fr: "Un mouchoir égaré par un\nhabitué du Café de la Grange.\nIl sent légèrement le Pokémon."
    it: "Pezzo di stoffa perso al Bar Magazzino\ndi Zefiropoli da un cliente abituale.\nOdora leggermente di Pokémon."
    de: "Ein Taschentuch, das ein Stammkunde\nim Café Lagerhaus in Septerna City ver-\nloren hat. Riecht leicht nach Pokémon."
    es: "Pañuelo perdido por un cliente habitual\ndel Café Alma en Ciudad Esmalte.\nDesprende el olor de un Pokémon."
    ko: "칠보시티에 있는 카페 갤러지의\n단골손님이 떨어뜨린 손수건.\n희미하게 포켓몬의 냄새가 난다."
guard_spec:
  names:
    jp_kana: エフェクトガード
    jp_kanji: エフェクトガード
    en: Guard Spec.
    fr: Défense Spéc
    it: Superguardia
    de: Megablock
    es: Protec. Esp.
    ko: 이펙트가드
  descriptions:
    jp_kana: "せんとうちゅう　５ターンの　あいだ\nみかたの　のうりょくを\nさげられなくする　どうぐ。"
    jp_kanji: "戦闘中　５ターンの　あいだ\n味方の　能力を\nさげられなくする　道具。"
    en: "An item that prevents stat reduction\namong the Trainer’s party Pokémon\nfor five turns after use."
    fr: "Empêche la réduction des stats\nde tous les Pokémon de l’équipe\npendant 5 tours."
    it: "Per cinque turni dopo l’uso, evita\nla riduzione delle statistiche dei\nPokémon della squadra dell’Allenatore."
    de: "Eine mögliche Statusveränderung\nder Pokémon im Team wird für\n5 Runden verhindert."
    es: "Evita que bajen las características\ndel equipo Pokémon durante\ncinco turnos."
    ko: "배틀 중 5턴 동안\n같은 편의 능력을\n떨어뜨리지 않게 하는 도구."
guidebook:
  names:
    jp_kana: ぼうけんノート
    jp_kanji: ぼうけんノート
    en: Journal
    fr: Journal
    it: Agenda
    de: Tagebuch
    es: Diario
    ko: 모험노트
  descriptions:
    jp_kana: "これまでの　ぼうけんの　ようすが\nきろく　されている　ノート。"
    jp_kanji: "これまでの　冒険の　様子が\n記録　されている　ノート。"
    en: "A notebook that keeps a day-to-day\nrecord of your adventure so far."
    fr: "Journal de bord qui garde en mémoire\nvos aventures quotidiennes."
    it: "Diario in cui viene annotata la tua\navventura giorno per giorno."
    de: "In diesem Tagebuch steht, was du\nin den letzten Tagen erlebt hast."
    es: "Un cuaderno en el que se recogen, día\na día, los progresos de tu aventura."
    ko: "지금까지의 모험 상황이\n기록되어 있는 노트."
haban_berry:
  names:
    jp_kana: ハバンのみ
    jp_kanji: ハバンのみ
    en: Haban Berry
    fr: Baie Fraigo
    it: Baccahaban
    de: Terirobeere
    es: Baya Anjiro
    ko: 하반열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　ドラゴン　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　ドラゴン技を\n受けたとき　威力が　弱まる。"
    en: "Weakens a supereffective Dragon-type\nattack against the holding Pokémon."
    fr: "Tenue, cette Baie affaiblit une attaque\nennemie super efficace de type Dragon."
    it: "Se tenuta da un Pokémon, indebolisce\nl’attacco superefficace di tipo Drago\ndel nemico."
    de: "Als getragenes Item schwächt diese\nBeere besonders effektive Attacken\ndes Angreifers vom Typ Drachen."
    es: "Si la lleva un Pokémon, debilita un\nataque supereficaz de tipo Dragón\nde un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 뛰어난 드래곤 기술을\n당했을 때 위력이 약해진다."
hard_stone:
  names:
    jp_kana: かたいいし
    jp_kanji: かたいいし
    en: Hard Stone
    fr: Pierre Dure
    it: Pietradura
    de: Granitstein
    es: Piedra Dura
    ko: 딱딱한돌
  descriptions:
    jp_kana: "ぜったいに　われない　いし。\nもたせると　いわタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "絶対に　割れない　石。\n持たせると　いわタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon.\nIt is an unbreakable stone that ups\nthe power of Rock-type moves."
    fr: "Objet à tenir. Pierre incassable qui\nmonte la puissance des capacités de\ntype Roche."
    it: "Strumento da far tenere a un Pokémon.\nPietra indistruttibile che potenzia\nle mosse di tipo Roccia."
    de: "Ein Item zum Tragen. Ein unzer-\nbrechlicher Stein, der Attacken\nvom Typ Gestein verstärkt."
    es: "Debe llevarla un Pokémon.\nLa robustez de la piedra fortalece\nlos movimientos de tipo Roca."
    ko: "절대 깨지지 않는 돌.\n지니게 하면 바위타입\n기술의 위력이 올라간다."
heal_ball:
  names:
    jp_kana: ヒールボール
    jp_kanji: ヒールボール
    en: Heal Ball
    fr: Soin Ball
    it: Cura Ball
    de: Heilball
    es: Sana Ball
    ko: 힐볼
  descriptions:
    jp_kana: "つかまえた　ポケモンの　ＨＰと\nじょうたい　いじょうを　かいふくする\nちょっと　やさしい　ボール。"
    jp_kanji: "捕まえた　ポケモンの　ＨＰと\n状態異常を　回復する\nちょっと　やさしい　ボール。"
    en: "A remedial Poké Ball that restores the\ncaught Pokémon’s HP and eliminates\nany status problem."
    fr: "Une Poké Ball de soin qui rend tous les\nPV du Pokémon attrapé et qui soigne\ntous les changements de statut."
    it: "Poké Ball curativa che ridà PS\nal Pokémon catturato e risolve ogni\nproblema di stato."
    de: "Ein wohltuender Ball. Er füllt alle KP\ndes gefangenen Pokémon auf und\nbehebt alle Statusprobleme."
    es: "Poké Ball curativa que restaura los PS\ny cura todos los problemas de estado\nde un Pokémon después de capturarlo."
    ko: "잡은 포켓몬의 HP와\n상태 이상을 회복시키는\n조금 다정한 볼."
heal_powder:
  names:
    jp_kana: ばんのうごな
    jp_kanji: ばんのうごな
    en: Heal Powder
    fr: Poudre Soin
    it: Polvocura
    de: Heilpuder
    es: Pol.curación
    ko: 만능가루
  descriptions:
    jp_kana: "とても　にがい　こなぐすり。\nポケモン　１ひきの　じょうたいの\nいじょうを　すべて　かいふくする。"
    jp_kanji: "とても　にがい　粉薬。\nポケモン　１匹の　状態の\n異常を　すべて　回復する。"
    en: "A very bitter medicine powder.\nIt heals all the status problems of a\nsingle Pokémon."
    fr: "Une poudre médicinale très amère.\nSoigne tous les problèmes de statut\nd’un Pokémon."
    it: "Rimedio amarissimo in polvere.\nRisolve tutti i problemi di stato\ndi un Pokémon."
    de: "Ein bitteres medizinisches Pulver,\ndas alle Statusprobleme eines\nPokémon aufhebt."
    es: "Polvos medicinales muy amargos que\ncuran todos los problemas de estado\nde un Pokémon."
    ko: "매우 쓴 가루약.\n포켓몬 1마리의\n상태 이상을 모두 회복한다."
health_feather:
  names:
    jp_kana: たいりょくのハネ
    jp_kanji: たいりょくのハネ
    en: Health Wing
    fr: Aile Santé
    it: Piumsalute
    de: Heilfeder
    es: P. Vigor
    ko: 체력날개
  descriptions:
    jp_kana: "ポケモンに　つかう　どうぐ。\nポケモン　１ひきの　ＨＰの\nきそポイントを　ちょっと　あげる。"
    jp_kanji: "ポケモンに　使う　道具。\nポケモン　１匹の　ＨＰの\n基礎ポイントを　ちょっと　あげる。"
    en: "An item for use on a Pokémon. It\nslightly increases the base HP of a\nsingle Pokémon."
    fr: "Objet à utiliser sur un Pokémon.\nIl augmente un peu ses PV de base."
    it: "Strumento da usare su un Pokémon.\nNe aumenta di poco i PS di base."
    de: "Schenkt man einem Pokémon dieses\nItem, wird dessen Basis-KP-Anzahl\ndauerhaft erhöht."
    es: "Pluma que aumenta un poco los PS\nde un Pokémon al subir de nivel."
    ko: "포켓몬에게 사용하는 도구.\n포켓몬 1마리의 HP\n기초 포인트를 조금 올린다."
heart_scale:
  names:
    jp_kana: ハートのウロコ
    jp_kanji: ハートのウロコ
    en: Heart Scale
    fr: Écaillecœur
    it: Squama Cuore
    de: Herzschuppe
    es: Esc. Corazón
    ko: 하트비늘
  descriptions:
    jp_kana: "きれいな　ハートの　かたちの\nとても　めずらしい　ウロコ。\nにじいろに　うすく　かがやく。"
    jp_kanji: "きれいな　ハートの　形の\nとても　珍しい　ウロコ。\nにじ色に　うすく　輝く。"
    en: "A pretty, heart-shaped scale that is\nextremely rare. It glows faintly in the\ncolors of the rainbow."
    fr: "Une jolie écaille en forme de cœur qui\nest très rare. Elle brille légèrement\nd’un éclat arc-en-ciel."
    it: "Squama graziosa, a forma di cuore e\nmolto rara. Riflette tutti i colori\ndell’iride."
    de: "Eine hübsche, herzförmige, sehr\nseltene Schuppe. Sie erstrahlt\nin den Farben des Regenbogens."
    es: "Bella escama con forma de corazón\nque brilla ligeramente como los colores\ndel arcoíris. Es muy poco común."
    ko: "예쁜 하트 모양의\n무척 진귀한 비늘.\n무지개색으로 연하게 반짝인다."
heat_rock:
  names:
    jp_kana: あついいわ
    jp_kanji: あついいわ
    en: Heat Rock
    fr: Roche Chaude
    it: Rocciacalda
    de: Heißbrocken
    es: Roca Calor
    ko: 뜨거운바위
  descriptions:
    jp_kana: "もたせた　ポケモンが　にほんばれを\nつかうと　いつもより　はれの\nじかんが　ながくなる。"
    jp_kanji: "持たせた　ポケモンが　にほんばれを\n使うと　いつもより　はれの\n時間が　長くなる。"
    en: "A Pokémon held item that extends the\nduration of the move Sunny Day used\nby the holder."
    fr: "Objet à tenir augmentant la durée\nde la capacité Zénith utilisée par le\nporteur."
    it: "Strumento da far tenere a un Pokémon\nche allunga la durata della mossa\nGiornodisole se usata da chi lo tiene."
    de: "Ein Item zum Tragen. Verlängert\ndie Dauer von Sonnentag, wenn\nvon Träger eingesetzt."
    es: "Prolonga la duración del movimiento\nDía Soleado que use el Pokémon\nque la lleva."
    ko: "지니게 한 포켓몬이 쾌청을\n쓰면 여느 때보다 쾌청의\n시간이 길어진다."
heavy_ball:
  names:
    jp_kana: ヘビーボール
    jp_kanji: ヘビーボール
    en: Heavy Ball
    fr: Masse Ball
    it: Peso Ball
    de: Schwerball
    es: Peso Ball
    ko: 헤비볼
  descriptions:
    jp_kana: "たいじゅうの　おもい　ポケモンが\nつかまえやすくなる\nちょっと　かわった　ボール。"
    jp_kanji: "体重の　重い　ポケモンが\n捕まえやすくなる\nちょっと　変わった　ボール。"
    en: "A Poké Ball for catching very heavy\nPokémon."
    fr: "Une Poké Ball un peu spéciale qui\nfonctionne particulièrement bien sur\nles Pokémon lourds."
    it: "Poké Ball un po’ originale che funziona\nparticolarmente bene sui Pokémon\npesanti."
    de: "Ein Ball, der sich besonders gut eignet,\num Pokémon mit hohem Körpergewicht\nzu fangen."
    es: "Poké Ball algo distinta que funciona\nespecialmente bien a la hora de atrapar\nPokémon de mucho peso."
    ko: "체중이 무거운 포켓몬이\n잡기 쉬워지는\n조금 특이한 볼."
helix_fossil:
  names:
    jp_kana: かいのカセキ
    jp_kanji: かいのカセキ
    en: Helix Fossil
    fr: Nautile
    it: Helixfossile
    de: Helixfossil
    es: Fósil Helix
    ko: 조개화석
  descriptions:
    jp_kana: "おおむかし　うみに　すんでいた\nこだい　ポケモンの　カセキ。\nかいがらの　いちぶ　らしい。"
    jp_kanji: "大昔　海に　すんでいた\n古代ポケモンの　カセキ。\n貝殻の　一部らしい。"
    en: "A fossil of an ancient Pokémon that\nlived in the sea. It appears to be\npart of a seashell."
    fr: "Fossile d’un ancien Pokémon aquatique.\nOn dirait un morceau de coquillage."
    it: "Fossile di un Pokémon antico che\nviveva in mare. Sembra essere\nparte di una conchiglia."
    de: "Das Fossil eines uralten Pokémon,\ndas in der Tiefsee lebte. Es sieht\nwie ein Muschelstück aus."
    es: "Fósil de un Pokémon ancestral que\nvivió en el fondo del mar. Parece ser\nun fragmento de concha marina."
    ko: "오랜 옛날 바다에 살았던\n고대 포켓몬의 화석.\n조개껍질의 일부인 듯하다."
hm01:
  names:
    jp_kana: ひでんマシン０１
    jp_kanji: ひでんマシン０１
    en: HM01
    fr: CS01
    it: MN01
    de: VM01
    es: MO01
    ko: 비전머신01
  descriptions:
    jp_kana: "カマや　ツメなどの　するどいもので\nきりつけて　こうげきする。\nほそいきを　きることも　できる。"
    jp_kanji: "カマや　ツメなどで\n相手を　切りつけて　攻撃する。\n細い　樹木も　きることが　できる。"
    en: "The target is cut with a scythe or claw.\nIt can also be used to cut down thin\ntrees."
    fr: "Coupe l’ennemi avec des lames ou des\ngriffes. Hors combat, permet de couper\ndes arbres fins."
    it: "Attacca il nemico con artigli o falci\naffilate. Fuori dalla lotta si usa per\ntagliare piccoli alberi."
    de: "Das Ziel wird mit scharfen Klingen\nattackiert. Außerhalb des Kampfes\nwerden damit kleine Bäume gefällt."
    es: "Corta al objetivo con una cuchilla o\ngarra. También puede usarse para\ncortar árboles delgados."
    ko: "낫이나 발톱 등 날카로운 것으로\n갈라서 공격한다.\n얇은 나무를 자를 수도 있다."
hm02:
  names:
    jp_kana: ひでんマシン０２
    jp_kanji: ひでんマシン０２
    en: HM02
    fr: CS02
    it: MN02
    de: VM02
    es: MO02
    ko: 비전머신02
  descriptions:
    jp_kana: "１ターンめで　そらへ　とびあがって\n２ターンめで　こうげきする。\nしっているまちに　いどうも　できる。"
    jp_kanji: "１ターン目で　空へ　飛び\n２ターン目に　相手を　攻撃する。\n知っている　街に　移動も　できる。"
    en: "The user soars, then strikes on the\nsecond turn. It can also be used to\nfly to any familiar town."
    fr: "Le lanceur s’envole au 1ᵉʳ tour et\nfrappe au 2ᵉ. Permet aussi de voler\njusqu’à une ville déjà visitée."
    it: "Chi la usa si alza in volo per attaccare\nal turno seguente. Fuori dalla lotta fa\nvolare in città già visitate."
    de: "In Runde 1 fliegt der Angreifer empor\nund attackiert in Runde 2. Man kann\ndamit zu jedem bekannten Ort fliegen."
    es: "Quien lo usa levanta el vuelo y ataca en\nel siguiente turno. También se puede\nusar para volar a algún sitio conocido."
    ko: "1턴째에 하늘을 날아올라\n2턴째에 공격한다.\n알고 있는 도시로 이동할 수 있다."
hm03:
  names:
    jp_kana: ひでんマシン０３
    jp_kanji: ひでんマシン０３
    en: HM03
    fr: CS03
    it: MN03
    de: VM03
    es: MO03
    ko: 비전머신03
  descriptions:
    jp_kana: "おおきな　なみで　じぶんの　まわりに\nいるものを　こうげきする。\nみずのうえを　すすむことも　できる。"
    jp_kanji: "大きな　波で　自分の　周りに\nいるものを　攻撃する。\n水上も　泳いで　進める。"
    en: "It swamps the area around the user\nwith a giant wave.\nIt can also be used for crossing water."
    fr: "Une énorme vague s’abat sur le\nchamp de bataille. Permet aussi\nde voyager sur l’eau."
    it: "Un’onda enorme sommerge il campo\ndi lotta. Fuori dalla lotta si usa\nper spostarsi sull’acqua."
    de: "Eine riesige Flutwelle ergießt sich über\ndas nähere Umfeld des Anwenders.\nErmöglicht das Surfen auf dem Wasser."
    es: "Inunda el campo de batalla con una\nola gigante. También puede usarse\npara desplazarse por el agua."
    ko: "큰 파도를 일으켜서 자신의\n주위에 있는 포켓몬을 공격한다.\n물 위를 나아갈 수도 있다."
hm04:
  names:
    jp_kana: ひでんマシン０４
    jp_kanji: ひでんマシン０４
    en: HM04
    fr: CS04
    it: MN04
    de: VM04
    es: MO04
    ko: 비전머신04
  descriptions:
    jp_kana: "こんしんの　ちからで　こうげきする。\nおもいいわを　おすことも　できる。"
    jp_kanji: "ありったけの　力で\n相手を　なぐりつけて　攻撃する。\n重たい　岩を　押すことも　できる。"
    en: "The target is slugged with a punch\nthrown at maximum power. This move can\nalso be used to move boulders."
    fr: "Le lanceur cogne l’ennemi de toutes\nses forces. Permet aussi de déplacer\ndes rochers."
    it: "Colpisce il nemico con un’enorme\nenergia. Fuori dalla lotta si usa per\nspostare i massi."
    de: "Das Ziel trifft ein energiegeladener\nKraftschlag. Außerdem lassen sich mit\nder Attacke schwere Felsen bewegen."
    es: "Genera mucha fuerza y ataca con gran\nenergía al objetivo. También puede\nusarse para mover piedras grandes."
    ko: "혼신의 힘으로 공격한다.\n무거운 바위를 밀 수도 있다."
hm05:
  names:
    jp_kana: ひでんマシン０５
    jp_kanji: ひでんマシン０５
    en: HM05
    fr: CS05
    it: MN05
    de: VM05
    es: MO05
    ko: 비전머신05
  descriptions:
    jp_kana: "たきを　さかのぼるような　すさまじい\nいきおいで　とっしん　こうげきする。\nたきを　のぼることも　できる。"
    jp_kanji: "すごい　勢いで　相手に　つっこみ\n攻撃する。流れ落ちる　滝も\n泳いで　のぼれる。"
    en: "The user charges the target at an\nawesome speed. It can also be used\nto climb a waterfall."
    fr: "Le lanceur charge l’ennemi à une\nvitesse remarquable. Permet aussi\nde franchir une cascade."
    it: "Carica il nemico a grande velocità e\npuò farlo tentennare. Fuori dalla lotta\nconsente di risalire le cascate."
    de: "Eine mächtige Attacke, die das Ziel mit\nrasender Geschwindigkeit angreift.\nSie macht Wasserfälle bezwingbar."
    es: "Carga contra el objetivo a una\nvelocidad increíble. También puede\nusarse para remontar una cascada."
    ko: "폭포를 거꾸로 오르는 듯한\n엄청난 기세로 돌진하여 공격한다.\n폭포를 오를 수도 있다."
hm06:
  names:
    jp_kana: ひでんマシン０６
    jp_kanji: ひでんマシン０６
    en: HM06
    fr: CS06
    it: MN06
    de: VM06
    es: MO06
    ko: 비전머신06
  descriptions:
    jp_kana: "１ターンめで　もぐり　２ターンめに\nうきあがって　こうげきする。うみの\nなかに　もぐる　ことも　できる。"
    jp_kanji: "１ターン目で　潜り　２ターン目に\n浮きあがって　攻撃する。\n海の　奥深くに　潜ることも　できる。"
    en: "Diving on the first turn, the user\nfloats up and attacks on the second.\nIt can be used for diving in the ocean."
    fr: "Le lanceur plonge sous l’eau au\n1ᵉʳ tour et frappe au 2ᵉ. Permet\naussi de plonger au fond de l’eau."
    it: "Chi la usa si tuffa in acqua per poi\nattaccare al turno seguente. Fuori\ndalla lotta pemette di immergersi."
    de: "Taucht in Runde 1 ab und greift in\nRunde 2 aus der Tiefe an. Ermöglicht\nTauchgänge zum Meeresgrund."
    es: "Quien lo usa se sumerge en el agua y\nataca al siguiente turno. También puede\nusarse para bucear en el mar."
    ko: "1턴째에 잠수했다가 2턴째에\n떠올라 공격한다.\n바닷속 깊숙이 잠수할 수도 있다."
hondew_berry:
  names:
    jp_kana: ロメのみ
    jp_kanji: ロメのみ
    en: Hondew Berry
    fr: Baie Lonme
    it: Baccamelon
    de: Honmelbeere
    es: Baya Meluce
    ko: 로매열매
  descriptions:
    jp_kana: "ポケモンに　あげると\nとても　なつき　やすくなるが\nとくこうの　きそポイントは　さがる。"
    jp_kanji: "ポケモンに　あげると\nとても　なつき　やすくなるが\n特攻の　基礎ポイントは　さがる。"
    en: "Using it on a Pokémon makes it more\nfriendly, but it also lowers its base\nSp. Atk stat."
    fr: "Rend les Pokémon plus amicaux, mais\nbaisse leur stat Attaque Spéciale de\nbase."
    it: "Utilizzata su un Pokémon, lo rende più\namichevole, ma diminuisce l’Attacco\nSpeciale di base."
    de: "Isst ein Pokémon diese Beere,\nstärkt dies eure Freundschaft, ver-\nringert aber seinen Spez.-Angr.-Wert."
    es: "Al usarla con un Pokémon, se gana\nsu amistad, pero también reduce\nsu Ataque Especial de base."
    ko: "포켓몬에게 주면\n매우 친밀해지기 쉬워지지만\n특수공격의 기초 포인트가 떨어진다."
honey:
  names:
    jp_kana: あまいミツ
    jp_kanji: あまいミツ
    en: Honey
    fr: Miel
    it: Miele
    de: Honig
    es: Miel
    ko: 달콤한꿀
  descriptions:
    jp_kana: "くさむらや　どうくつ　などで\nつかうと　あまいにおいに　さそわれて\nやせいポケモンが　あらわれる。"
    jp_kanji: "草むらや　どうくつ　などで\n使うと　あまいにおいに　誘われて\n野生ポケモンが　あらわれる。"
    en: "A sweet honey with a lush aroma that\nattracts wild Pokémon when it is used\nin grass, caves, or on special trees."
    fr: "Un miel au parfum riche qui, utilisé dans\nl’herbe, une grotte ou sur des arbres\nspéciaux, attire les Pokémon sauvages."
    it: "Miele dolce dall’aroma intenso che\nattrae i Pokémon selvatici. Usalo nelle\ngrotte, nell’erba o su alberi speciali."
    de: "Der Duft dieses Honigs lockt wilde\nPokémon an. Verwende ihn in hohem\nGras oder an besonderen Bäumen."
    es: "Su delicioso aroma atrae a Pokémon\nsalvajes si se usa en zonas de hierba\nalta, cuevas o árboles especiales."
    ko: "풀밭이나 동굴 등에서 사용하면\n달콤한 냄새에 이끌려서\n야생 포켓몬이 나타난다."
hp_up:
  names:
    jp_kana: マックスアップ
    jp_kanji: マックスアップ
    en: HP Up
    fr: PV Plus
    it: PS-Su
    de: KP-Plus
    es: Más PS
    ko: 맥스업
  descriptions:
    jp_kana: "ポケモンの　えいようドリンク。\nポケモン　１ひきの　ＨＰの\nきそポイントを　あげる。"
    jp_kanji: "ポケモンの　栄養ドリンク。\nポケモン　１匹の　ＨＰの\n基礎ポイントを　あげる。"
    en: "A nutritious drink for Pokémon.\nIt raises the base HP of a single\nPokémon."
    fr: "Une boisson très nutritive qui monte\nles PV de base d’un Pokémon."
    it: "Bevanda nutriente per Pokémon.\nAumenta i PS di base."
    de: "Ein gehaltvolles Getränk, das die\nBasis-KP-Anzahl eines Pokémon\ndauerhaft erhöht."
    es: "Nutritiva bebida que aumenta los PS\nde base de un Pokémon."
    ko: "포켓몬의 영양 드링크.\n포켓몬 1마리의 HP\n기초 포인트를 올린다."
hyper_potion:
  names:
    jp_kana: すごいキズぐすり
    jp_kanji: すごいキズぐすり
    en: Hyper Potion
    fr: Hyper Potion
    it: Iperpozione
    de: Hypertrank
    es: Hiperpoción
    ko: 고급상처약
  descriptions:
    jp_kana: "スプレーしきの　キズぐすり。\nポケモン　１ひきの　ＨＰを\n２００だけ　かいふくする。"
    jp_kanji: "スプレー式の　キズぐすり。\nポケモン　１匹の　ＨＰを\n２００だけ　回復する。"
    en: "A spray-type medicine for wounds.\nIt restores the HP of one Pokémon by\n200 points."
    fr: "Un spray qui soigne les blessures.\nRestaure 200 PV à un Pokémon."
    it: "Rimedio spray per le ferite.\nRestituisce 200 PS ad un Pokémon."
    de: "Hilft bei Wunden. Füllt\ndie KP eines Pokémon\num 200 Punkte auf."
    es: "Medicina en espray que cura heridas\ny restaura 200 PS de un Pokémon."
    ko: "스프레이식의 상처약.\n포켓몬 1마리의 HP를\n200만큼 회복한다."
iapapa_berry:
  names:
    jp_kana: イアのみ
    jp_kanji: イアのみ
    en: Iapapa Berry
    fr: Baie Papaya
    it: Baccapaia
    de: Yapabeere
    es: Baya Pabaya
    ko: 파야열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nピンチのとき　ＨＰを　かいふくする。\nきらいな　あじだと　こんらん　する。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　ＨＰを　回復する。\nきらいな味だと　混乱する。"
    en: "If held by a Pokémon, it restores the\nuser’s HP in a pinch, but will cause\nconfusion if it hates the taste."
    fr: "Tenue, cette Baie restaure des PV en\ncas de besoin, mais rend confus si\nle Pokémon n’aime pas son goût."
    it: "Se tenuta da un Pokémon in difficoltà,\nrestituisce PS. Se al Pokémon non piace\nil suo sapore, può causare confusione."
    de: "Als getragenes Item füllt die Beere die\nKP eines Pokémon auf, doch ihr Aroma\nverwirrt jene, die es nicht mögen."
    es: "Los Pokémon pueden llevarla o usarla\npara restaurar algunos PS. Su sabor\npuede causar confusión."
    ko: "포켓몬에게 지니게 하면\n위급할 때 HP를 회복한다.\n싫어하는 맛이면 혼란에 빠진다."
ice_gem:
  names:
    jp_kana: こおりのジュエル
    jp_kanji: こおりのジュエル
    en: Ice Gem
    fr: Joyau Glace
    it: Bijoughiac.
    de: Eisjuwel
    es: G. Hielo
    ko: 얼음주얼
  descriptions:
    jp_kana: "こおりの　タイプの　ジュエル。\nもたせると　いちどだけ　こおりの\nわざの　いりょくが　つよまる。"
    jp_kanji: "こおりの　タイプの　ジュエル。\n持たせると　１度だけ　こおりの\n技の　威力が　強まる。"
    en: "A gem with an essence of ice. When held,\nit strengthens the power of an\nIce-type move only once."
    fr: "Objet à tenir. Joyau augmentant\nune fois la puissance des capacités\nde type Glace."
    it: "Strumento da far tenere a un Pokémon.\nGioiello che potenzia una sola volta\nle mosse di tipo Ghiaccio."
    de: "Ein Juwel vom Typ Eis. Es\nerhöht einmalig die Stärke\neiner Attacke vom Typ Eis."
    es: "Joya de un solo uso que potencia\nlos movimientos de tipo Hielo.\nDebe llevarla un Pokémon."
    ko: "얼음타입의 주얼.\n지니게 하면 한 번만 얼음\n기술의 위력이 강해진다."
ice_heal:
  names:
    jp_kana: こおりなおし
    jp_kanji: こおりなおし
    en: Ice Heal
    fr: Antigel
    it: Antigelo
    de: Eisheiler
    es: Antihielo
    ko: 얼음상태치료제
  descriptions:
    jp_kana: "スプレーしきの　くすり。\nポケモン　１ひきの　こおりの\nじょうたいを　かいふくする。"
    jp_kanji: "スプレー式の　薬。\nポケモン　１匹の　こおりの\n状態を　回復する。"
    en: "A spray-type medicine.\nIt defrosts a Pokémon that has been\nfrozen solid."
    fr: "Un médicament sous forme de spray.\nRéchauffe un Pokémon gelé."
    it: "Rimedio spray.\nCura un Pokémon dal congelamento."
    de: "Ein Spray, das ein eingefrorenes\nPokémon auftaut."
    es: "Medicina en espray que descongela\nun Pokémon."
    ko: "스프레이식의 약.\n포켓몬 1마리의\n얼음 상태를 회복한다."
icicle_plate:
  names:
    jp_kana: つららのプレート
    jp_kanji: つららのプレート
    en: Icicle Plate
    fr: Plaque Glace
    it: Lastragelo
    de: Frosttafel
    es: Tabla Helada
    ko: 고드름플레이트
  descriptions:
    jp_kana: "こおりの　タイプの　せきばん。\nもたせると　こおりタイプの\nわざの　いりょくが　つよまる。"
    jp_kanji: "こおりの　タイプの　石盤。\n持たせると　こおりタイプの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon.\nIt is a stone tablet that boosts the\npower of Ice-type moves."
    fr: "Objet à tenir. Tablette en pierre\naugmentant la puissance des capacités\nde type Glace."
    it: "Strumento da far tenere a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Ghiaccio."
    de: "Ein Item zum Tragen. Diese Steintafel\nverstärkt Attacken vom Typ Eis."
    es: "Tabla de piedra que potencia\nlos movimientos de tipo Hielo.\nDebe llevarla un Pokémon."
    ko: "얼음타입의 석판.\n지니게 하면 얼음타입\n기술의 위력이 강해진다."
icy_rock:
  names:
    jp_kana: つめたいいわ
    jp_kanji: つめたいいわ
    en: Icy Rock
    fr: Roche Glace
    it: Rocciafredda
    de: Eisbrocken
    es: Roca Helada
    ko: 차가운바위
  descriptions:
    jp_kana: "もたせた　ポケモンが　あられを\nつかうと　いつもより　あられの\nじかんが　ながくなる。"
    jp_kanji: "持たせた　ポケモンが　あられを\n使うと　いつもより　あられの\n時間が　長くなる。"
    en: "A Pokémon held item that extends the\nduration of the move Hail used by the\nholder."
    fr: "Objet à tenir augmentant la durée\nde la capacité Grêle utilisée par le\nporteur."
    it: "Strumento da far tenere a un Pokémon\nche allunga la durata della mossa\nGrandine se usata da chi lo tiene."
    de: "Ein Item zum Tragen. Verlängert\ndie Dauer von Hagelsturm, wenn\nvon Träger eingesetzt."
    es: "Prolonga la duración del movimiento\nGranizo que use el Pokémon que\nla lleva."
    ko: "지니게 한 포켓몬이 싸라기눈을\n쓰면 여느 때보다 싸라기눈의\n시간이 길어진다."
inquiry_mail:
  names:
    jp_kana: しつもんメール
    jp_kanji: しつもんメール
    en: Inquiry Mail
    fr: Let. Demande
    it: Mess. Chiedi
    de: Fragebrief
    es: C. Pregunta
    ko: 질문메일
  descriptions:
    jp_kana: "あいてへの　しつもんの　メールが\nかきやすい　びんせん。\nポケモンに　もたせて　つかう。"
    jp_kanji: "相手への　質問の　メールが\n書きやすい　レターペーパー。\nポケモンに　持たせて　使う。"
    en: "Stationery designed for\nwriting questions.\nLet a Pokémon hold it for delivery."
    fr: "Un papier à lettres idéal pour\nposer des questions. Peut être\ntenu et livré par un Pokémon."
    it: "Carta da lettera ideale per scrivere\nuna domanda a qualcuno. Un Pokémon\npuò tenerla e consegnarla."
    de: "Briefpapier, mit dem man jemandem\neine Frage stellen kann.\nGib es einem Pokémon zum Tragen."
    es: "Carta para preguntar a un compañero.\nHaz que la entregue un Pokémon."
    ko: "상대에게 질문하는 메일을\n쉽게 쓸 수 있는 편지지.\n포켓몬에게 지니게 해서 쓴다."
insect_plate:
  names:
    jp_kana: たまむしプレート
    jp_kanji: たまむしプレート
    en: Insect Plate
    fr: Plaquinsect
    it: Lastrabaco
    de: Käfertafel
    es: Tabla Bicho
    ko: 비단벌레플레이트
  descriptions:
    jp_kana: "むしの　タイプの　せきばん。\nもたせると　むしタイプの\nわざの　いりょくが　つよまる。"
    jp_kanji: "むしの　タイプの　石盤。\n持たせると　むしタイプの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon.\nIt is a stone tablet that boosts the\npower of Bug-type moves."
    fr: "Objet à tenir. Tablette en pierre\naugmentant la puissance des capacités\nde type Insecte."
    it: "Strumento da far tenere a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Coleottero."
    de: "Ein Item zum Tragen. Diese Steintafel\nverstärkt Attacken vom Typ Käfer."
    es: "Tabla de piedra que potencia\nlos movimientos de tipo Bicho.\nDebe llevarla un Pokémon."
    ko: "벌레타입의 석판.\n지니게 하면 벌레타입\n기술의 위력이 강해진다."
iron:
  names:
    jp_kana: ブロムヘキシン
    jp_kanji: ブロムヘキシン
    en: Iron
    fr: Fer
    it: Ferro
    de: Eisen
    es: Hierro
    ko: 사포닌
  descriptions:
    jp_kana: "ポケモンの　えいようドリンク。\nポケモン　１ひきの　ぼうぎょの\nきそポイントを　あげる。"
    jp_kanji: "ポケモンの　栄養ドリンク。\nポケモン　１匹の　防御の\n基礎ポイントを　あげる。"
    en: "A nutritious drink for Pokémon.\nIt raises the base Defense stat of a\nsingle Pokémon."
    fr: "Une boisson très nutritive qui monte\nla Défense de base d’un Pokémon."
    it: "Bevanda nutriente per Pokémon.\nAumenta la Difesa di base."
    de: "Ein gehaltvolles Getränk, das den\nVerteidigungs-Wert eines Pokémon\ndauerhaft erhöht."
    es: "Nutritiva bebida que aumenta la Defensa\nde base de un Pokémon."
    ko: "포켓몬의 영양 드링크.\n포켓몬 1마리의 방어\n기초 포인트를 올린다."
iron_ball:
  names:
    jp_kana: くろいてっきゅう
    jp_kanji: くろいてっきゅう
    en: Iron Ball
    fr: Balle Fer
    it: Ferropalla
    de: Eisenkugel
    es: Bola Férrea
    ko: 검은철구
  descriptions:
    jp_kana: "もたせると　すばやさが　さがる。\nひこうタイプや　ふゆう　ポケモンは\nじめんわざが　あたって　しまう。"
    jp_kanji: "持たせると　素早さが　さがる。\nひこうタイプや　ふゆう　ポケモンは\nじめん技が　当たってしまう。"
    en: "A Pokémon held item that cuts Speed.\nIt makes Flying-type and levitating\nholders susceptible to Ground moves."
    fr: "Objet à tenir réduisant la Vitesse. Rend\nles porteurs de type Vol et lévitant\nsensibles aux capacités de type Sol."
    it: "Riduce la Velocità e rende vulnerabili\nalle mosse terra se chi la tiene è di tipo\nVolante o ha l’abilità Levitazione."
    de: "Ein Item zum Tragen, das Flug-Pokémon\nanfällig für Attacken vom Typ Boden\nmacht. Senkt den Initiative-Wert."
    es: "Reduce la Velocidad. Los Pokémon que\nlevitan y los de tipo Volador se tornan\nsensibles a movimientos de tipo Tierra."
    ko: "지니게 하면 스피드가 떨어진다.\n비행타입이나 부유포켓몬은\n땅 기술에 맞아 버린다."
iron_plate:
  names:
    jp_kana: こうてつプレート
    jp_kanji: こうてつプレート
    en: Iron Plate
    fr: Plaque Fer
    it: Lastraferro
    de: Eisentafel
    es: Tabla Acero
    ko: 강철플레이트
  descriptions:
    jp_kana: "はがねの　タイプの　せきばん。\nもたせると　はがねタイプの\nわざの　いりょくが　つよまる。"
    jp_kanji: "はがねの　タイプの　石盤。\n持たせると　はがねタイプの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon.\nIt is a stone tablet that boosts the\npower of Steel-type moves."
    fr: "Objet à tenir. Tablette en pierre\naugmentant la puissance des capacités\nde type Acier."
    it: "Strumento da far tenere a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Acciaio."
    de: "Ein Item zum Tragen. Diese Steintafel\nverstärkt Attacken vom Typ Stahl."
    es: "Tabla de piedra que potencia\nlos movimientos de tipo Acero.\nDebe llevarla un Pokémon."
    ko: "강철타입의 석판.\n지니게 하면 강철타입\n기술의 위력이 강해진다."
item_drop:
  names:
    jp_kana: アイテムドロップ
    jp_kanji: アイテムドロップ
    en: Item Drop
    fr: Jette Objet
    it: Lascioggetto
    de: Itemabwurf
    es: Tiraobjeto
    ko: 아이템드롭
  descriptions:
    jp_kana: "つかうと　みかたの　ポケモンが\nもっている　どうぐを　なくす。"
    jp_kanji: "使うと　味方の　ポケモンが\n持っている　道具を　なくす。"
    en: "When used, it causes an ally Pokémon\nto drop a held item."
    fr: "Retire tout objet tenu par\nun Pokémon de l’équipe."
    it: "Usandolo un Pokémon della squadra\nlascerà il proprio strumento."
    de: "Der Mitstreiter lässt bei Gebrauch das\nvon ihm getragene Item fallen."
    es: "Cuando se usa, un Pokémon de\ntu equipo pierde su objeto."
    ko: "사용하면 같은 편 포켓몬이\n지니고 있는 도구를 잃어버린다."
item_urge:
  names:
    jp_kana: アイテムコール
    jp_kanji: アイテムコール
    en: Item Urge
    fr: Appel Objet
    it: Chiamoggetto
    de: Itemappell
    es: Activaobjeto
    ko: 아이템콜
  descriptions:
    jp_kana: "つかうと　みかたの　ポケモンが\nもっている　どうぐを　すぐつかう。"
    jp_kanji: "使うと　味方の　ポケモンが\n持っている　道具を　すぐ使う。"
    en: "When used, it causes an ally Pokémon\nto use its held item."
    fr: "Permet d’utiliser immédiatement\nl’objet tenu par un Pokémon de\nl’équipe."
    it: "Usandolo un Pokémon della squadra\nuserà immediatamente il proprio\nstrumento."
    de: "Der Mitstreiter setzt bei Gebrauch\nsofort das von ihm getragene Item ein."
    es: "Cuando se usa, un Pokémon\nde tu equipo utiliza su objeto\ninmediatamente."
    ko: "사용하면 같은 편 포켓몬이\n지니고 있는 도구를 바로 쓴다."
jaboca_berry:
  names:
    jp_kana: ジャポのみ
    jp_kanji: ジャポのみ
    en: Jaboca Berry
    fr: Baie Jaboca
    it: Baccajaba
    de: Jabocabeere
    es: Baya Jaboca
    ko: 자보열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nぶつりわざを　うけたとき\nあいてにも　ダメージを　あたえる。"
    jp_kanji: "ポケモンに　持たせると\n物理技を　受けたとき\n相手にも　ダメージを　あたえる。"
    en: "If held by a Pokémon and a physical\nattack lands, the attacker also\ntakes damage."
    fr: "Tenue, cette Baie inflige des dégâts\nà l’ennemi s’il utilise une attaque\nphysique qui atteint son but."
    it: "Se tenuta da un Pokémon, il nemico\nsubirà danni se il suo attacco fisico\nva a segno."
    de: "Als getragenes Item bewirkt die Beere\nSchaden bei denen, die den Träger\nmit einer physischen Attacke treffen."
    es: "Si la lleva un Pokémon cuando otro\nlanza un ataque físico, este último\ntambién recibe daño."
    ko: "포켓몬에게 지니게 하면\n물리 기술을 당했을 때\n상대에게도 데미지를 준다."
jade_orb:
  names:
    jp_kana: もえぎいろのたま
    jp_kanji: もえぎいろのたま
    en: Jade Orb
    fr: Orbe Vert
    it: Sfera Verde
    de: Grüne Kugel
    es: Esfera Verde
    ko: 연둣빛구슬
  descriptions:
    jp_kana: "ホウエンちほうの　でんせつと\nふかい　かかわりが　あると　いわれる\nみどりいろに　かがやく　たま。"
    jp_kanji: "ホウエン地方の　伝説と\n深い　関わりが　あると　いわれる\nみどりいろに　かがやく　たま。"
    en: "A shiny green orb that is said to have\na legend and has a deep connection with\nthe Hoenn region."
    fr: "Un orbe viride dont on dit qu’il a un\nlien très étroit avec les légendes\nde Hoenn."
    it: "Sfera con riflessi verdi, che pare\nessere strettamente legata alle\nleggende della regione di Hoenn."
    de: "Eine grün schimmernde Kugel,\nvon der in den Legenden der\nHoenn-Region berichtet wird."
    es: "Esfera glauca de la que se dice que\nguarda una estrecha relación con las\nleyendas de Hoenn."
    ko: "호연지방의 전설과\n깊은 연관이 있다고 전해지는\n초록색으로 빛나는 구슬."
kasib_berry:
  names:
    jp_kana: カシブのみ
    jp_kanji: カシブのみ
    en: Kasib Berry
    fr: Baie Sédra
    it: Baccacitrus
    de: Zitarzbeere
    es: Baya Drasi
    ko: 수불열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　ゴースト　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　ゴースト技を\n受けたとき　威力が　弱まる。"
    en: "Weakens a supereffective Ghost-type\nattack against the holding Pokémon."
    fr: "Tenue, cette Baie affaiblit une attaque\nennemie super efficace de type Spectre."
    it: "Se tenuta da un Pokémon, indebolisce\nl’attacco superefficace di tipo Spettro\ndel nemico."
    de: "Als getragenes Item schwächt diese\nBeere besonders effektive Attacken\ndes Angreifers vom Typ Geist."
    es: "Si la lleva un Pokémon, debilita un\nataque supereficaz de tipo Fantasma\nde un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 뛰어난 고스트 기술을\n당했을 때 위력이 약해진다."
kebia_berry:
  names:
    jp_kana: ビアーのみ
    jp_kanji: ビアーのみ
    en: Kebia Berry
    fr: Baie Kébia
    it: Baccakebia
    de: Grarzbeere
    es: Baya Kebia
    ko: 으름열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　どく　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　どく技を\n受けたとき　威力が　弱まる。"
    en: "Weakens a supereffective Poison-type\nattack against the holding Pokémon."
    fr: "Tenue, cette Baie affaiblit une attaque\nennemie super efficace de type Poison."
    it: "Se tenuta da un Pokémon, indebolisce\nl’attacco superefficace di tipo Veleno\ndel nemico."
    de: "Als getragenes Item schwächt diese\nBeere besonders effektive Attacken\ndes Angreifers vom Typ Gift."
    es: "Si la lleva un Pokémon, debilita un\nataque supereficaz de tipo Veneno\nde un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 뛰어난 독 기술을\n당했을 때 위력이 약해진다."
kelpsy_berry:
  names:
    jp_kana: ネコブのみ
    jp_kanji: ネコブのみ
    en: Kelpsy Berry
    fr: Baie Alga
    it: Baccalga
    de: Setangbeere
    es: Baya Algama
    ko: 시마열매
  descriptions:
    jp_kana: "ポケモンに　あげると\nとても　なつき　やすくなるが\nこうげきの　きそポイントは　さがる。"
    jp_kanji: "ポケモンに　あげると\nとても　なつき　やすくなるが\n攻撃の　基礎ポイントは　さがる。"
    en: "Using it on a Pokémon makes it more\nfriendly, but it also lowers its base\nAttack stat."
    fr: "Rend les Pokémon plus amicaux, mais\nbaisse leur stat Attaque de base."
    it: "Utilizzata su un Pokémon, lo rende più\namichevole, ma diminuisce l’Attacco\ndi base."
    de: "Isst ein Pokémon diese Beere,\nstärkt dies eure Freundschaft,\nverringert aber seinen Angriffs-Wert."
    es: "Al usarla con un Pokémon, se gana\nsu amistad, pero también reduce\nsu Ataque de base."
    ko: "포켓몬에게 주면\n매우 친밀해지기 쉬워지지만\n공격의 기초 포인트가 떨어진다."
kings_rock:
  names:
    jp_kana: おうじゃのしるし
    jp_kanji: おうじゃのしるし
    en: King’s Rock
    fr: Roche Royale
    it: Roccia Di Re
    de: King-Stein
    es: Roca del Rey
    ko: 왕의징표석
  descriptions:
    jp_kana: "もたせると　こうげきして\nダメージを　あたえたときに\nあいてを　ひるませることが　ある。"
    jp_kanji: "持たせると　攻撃して\nダメージを　あたえたときに\n相手を　ひるませることが　ある。"
    en: "An item to be held by a Pokémon.\nWhen the holder inflicts damage,\nthe target may flinch."
    fr: "Objet à tenir. Peut apeurer l’ennemi\nlorsque le porteur lui inflige des\ndégâts."
    it: "Strumento da far tenere a un Pokémon.\nSe chi lo usa arreca danni, può far\ntentennare il nemico."
    de: "Gibst du es einem Pokémon zum Tragen,\nlässt es mit seinem Angriff das Ziel\ngelegentlich zurückschrecken."
    es: "El Pokémon que la lleva puede\nhacer retroceder al Pokémon\nal que le inflige daño."
    ko: "지니게 하면\n공격해서 데미지를 줄 때\n상대를 풀죽이기도 한다."
lagging_tail:
  names:
    jp_kana: こうこうのしっぽ
    jp_kanji: こうこうのしっぽ
    en: Lagging Tail
    fr: Ralentiqueue
    it: Rallentocoda
    de: Schwerschwf.
    es: Cola Plúmbea
    ko: 느림보꼬리
  descriptions:
    jp_kana: "とても　おもたい　なにかの　しっぽ。\nもたせると　いつもより　こうどうが\nおそくなる。"
    jp_kanji: "とても　重たい　なにかの　しっぽ。\n持たせると　いつもより　行動が\n遅くなる。"
    en: "An item to be held by a Pokémon.\nIt is tremendously heavy and makes\nthe holder move slower than usual."
    fr: "Objet à tenir extrêmement lourd qui\nralentit le porteur."
    it: "Strumento da far tenere a un Pokémon.\nÈ tremendamente pesante e rende chi\nlo tiene più lento del normale."
    de: "Ein Item zum Tragen. Es ist immens\nschwer und senkt die Geschwindigkeit\ndes Trägers."
    es: "Es muy pesada y hace que el Pokémon\nque la lleva se mueva más lento de\nlo normal."
    ko: "매우 무거운 무언가의 꼬리.\n지니게 하면 여느 때보다\n행동이 느려진다."
lansat_berry:
  names:
    jp_kana: サンのみ
    jp_kanji: サンのみ
    en: Lansat Berry
    fr: Baie Lansat
    it: Baccalangsa
    de: Lansatbeere
    es: Baya Zonlan
    ko: 랑사열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nピンチのとき　こうげきが\nきゅうしょに　あたりやすくなる。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　攻撃が\n急所に　当たりやすくなる。"
    en: "If held by a Pokémon, it raises its\ncritical-hit ratio in a pinch."
    fr: "Tenue, cette Baie monte le taux de\ncritiques en cas de besoin."
    it: "Brutti colpi più probabili se il Pokémon\nche la tiene si trova in difficoltà."
    de: "Als getragenes Item erhöht diese Beere\ndie Volltrefferquote eines Pokémon,\nsobald es in einer Notlage steckt."
    es: "Si la lleva un Pokémon, aumenta\nla probabilidad de dar un golpe\ncrítico en un momento de apuro."
    ko: "포켓몬에게 지니게 하면\n위급할 때 공격이\n급소를 맞히기 쉬워진다."
lava_cookie:
  names:
    jp_kana: フエンせんべい
    jp_kanji: フエンせんべい
    en: Lava Cookie
    fr: Lava Cookie
    it: Lavottino
    de: Lavakeks
    es: Galleta Lava
    ko: 용암전병
  descriptions:
    jp_kana: "フエンめいぶつの　せんべい。\nポケモン　１ひきの　じょうたいの\nいじょうを　すべて　かいふくする。"
    jp_kanji: "フエン名物の　せんべい。\nポケモン　１匹の　状態の\n異常を　すべて　回復する。"
    en: "Lavaridge Town’s local specialty.\nIt heals all the status problems of\none Pokémon."
    fr: "La spécialité de la ville de Vermilava.\nSoigne tous les problèmes de statut\nd’un Pokémon."
    it: "Specialità tipica di Cuordilava.\nRisolve tutti i problemi di stato\ndi un Pokémon."
    de: "Eine Spezialität aus Bad Lavastadt,\ndie alle Statusprobleme eines\nPokémon heilt."
    es: "Dulce típico de Pueblo Lavacalda\nque cura todos los problemas de\nestado de un Pokémon."
    ko: "용암마을의 명물인 전병.\n포켓몬 1마리의\n상태 이상을 회복한다."
lax_incense:
  names:
    jp_kana: のんきのおこう
    jp_kanji: のんきのおこう
    en: Lax Incense
    fr: Encens Doux
    it: Distraroma
    de: Laxrauch
    es: Incie. Suave
    ko: 무사태평향로
  descriptions:
    jp_kana: "もたせると　おこうの　ふしぎな\nかおりが　あいてを　まどわせて\nわざが　めいちゅう　しにくくなる。"
    jp_kanji: "持たせると　御香の　不思議な\n香りが　相手を　まどわせて\n技が　命中　しにくくなる。"
    en: "An item to be held by a Pokémon. The\ntricky aroma of this incense may make\nattacks miss the holder."
    fr: "Objet à tenir. Le parfum trompeur\nde cet encens baisse la Précision de\nl’ennemi."
    it: "Strumento da far tenere a un Pokémon.\nIl suo aroma intenso riduce\nla precisione del nemico."
    de: "Ein Item zum Tragen. Das\nverwirrende Aroma senkt die\nGenauigkeit des Gegners."
    es: "Debe llevarlo un Pokémon.\nSu peculiar aroma reduce la Precisión\ndel objetivo."
    ko: "지니게 하면 향로의 이상한\n향기가 상대를 혼란시켜\n기술이 명중하기 어려워진다."
leaf_stone:
  names:
    jp_kana: リーフのいし
    jp_kanji: リーフのいし
    en: Leaf Stone
    fr: Pierreplante
    it: Pietrafoglia
    de: Blattstein
    es: Piedra Hoja
    ko: 리프의돌
  descriptions:
    jp_kana: "ある　とくていの　ポケモンを\nしんかさせる　ふしぎな　いし。\nはっぱの　もようが　ある。"
    jp_kanji: "ある　特定の　ポケモンを\n進化させる　不思議な　石。\nはっぱの　模様が　ある。"
    en: "A peculiar stone that makes certain\nspecies of Pokémon evolve.\nIt has a leaf pattern."
    fr: "Une pierre étrange qui fait évoluer\ncertaines espèces de Pokémon.\nUne feuille est dessinée dessus."
    it: "Pietra particolare che fa evolvere\ndeterminate specie di Pokémon.\nRiporta l’immagine di una foglia."
    de: "Dieser spezielle Stein löst bei\nbestimmten Pokémon die Entwicklung\naus. Er hat ein Blattmuster."
    es: "Curiosa piedra que hace evolucionar\na determinadas especies de Pokémon.\nTiene grabada una hoja."
    ko: "어느 특정한 포켓몬을\n진화시키는 이상한 돌.\n잎사귀 무늬가 있다."
leek:
  names:
    jp_kana: ながねぎ
    jp_kanji: ながねぎ
    en: Stick
    fr: Bâton
    it: Gambo
    de: Lauchstange
    es: Palo
    ko: 대파
  descriptions:
    jp_kana: "とても　ながくて　かたい　クキ。\nカモネギに　もたせると　わざが\nきゅうしょに　あたりやすくなる。"
    jp_kanji: "とても　長くて　硬い　クキ。\nカモネギに　持たせると　技が\n急所に　当たりやすくなる。"
    en: "An item to be held by Farfetch’d. It is\na very long and stiff stalk of leek\nthat boosts the critical-hit ratio."
    fr: "Objet à faire tenir à Canarticho.\nPoireau très long et solide qui\nmonte son taux de critiques."
    it: "Strumento da far tenere a Farfetch’d.\nGambo di porro lungo che aumenta\ndi molto la probabilità di brutti colpi."
    de: "Ein Item, das von Porenta getragen\nwerden kann. Diese lange Lauchstange\nerhöht die Volltrefferquote stark."
    es: "Es un puerro muy largo que debe llevar\nFarfetch’d. Aumenta la probabilidad de\nque logre un golpe crítico mucho."
    ko: "매우 길고 단단한 줄기.\n파오리에게 지니게 하면 기술이\n급소에 맞기 쉬워진다."
leftovers:
  names:
    jp_kana: たべのこし
    jp_kanji: たべのこし
    en: Leftovers
    fr: Restes
    it: Avanzi
    de: Überreste
    es: Restos
    ko: 먹다남은음식
  descriptions:
    jp_kana: "もたせると　ポケモンの　ＨＰが\nせんとうの　あいだ　すこしずつ\nかいふくする。"
    jp_kanji: "持たせると　ポケモンの　ＨＰが\n戦闘の　あいだ　少しずつ\n回復する。"
    en: "An item to be held by a Pokémon.\nThe holder’s HP is gradually restored\nduring battle."
    fr: "Objet à tenir permettant de restaurer\nles PV du porteur graduellement durant\nle combat."
    it: "Strumento da far tenere a un Pokémon.\nFa recuperare gradualmente i PS\ndurante la lotta."
    de: "Ein Item, das einem Pokémon zum\nTragen gegeben werden kann. Es\nfüllt im Kampf stetig KP auf."
    es: "Restaura gradualmente los PS\ndel Pokémon que lo lleva\ndurante el combate."
    ko: "지니게 하면 포켓몬의 HP가\n배틀을 하는 동안 조금씩\n회복된다."
lemonade:
  names:
    jp_kana: ミックスオレ
    jp_kanji: ミックスオレ
    en: Lemonade
    fr: Limonade
    it: Lemonsucco
    de: Limonade
    es: Limonada
    ko: 후르츠밀크
  descriptions:
    jp_kana: "とても　あまい　ジュース。\nポケモン　１ひきの　ＨＰを\n８０だけ　かいふくする。"
    jp_kanji: "とても　あまい　ジュース。\nポケモン　１匹の　ＨＰを\n８０だけ　回復する。"
    en: "A very sweet drink.\nIt restores the HP of one Pokémon by\n80 points."
    fr: "Une boisson très sucrée.\nRestaure 80 PV à un Pokémon."
    it: "Bevanda molto dolce.\nRestituisce 80 PS ad un Pokémon."
    de: "Ein sehr süßes Getränk, das die KP\neines Pokémon um 80 Punkte auffüllt."
    es: "Bebida muy dulce que restaura 80 PS\nde un Pokémon."
    ko: "매우 달콤한 쥬스.\n포켓몬 1마리의 HP를\n80만큼 회복한다."
leppa_berry:
  names:
    jp_kana: ヒメリのみ
    jp_kanji: ヒメリのみ
    en: Leppa Berry
    fr: Baie Mepo
    it: Baccamela
    de: Jonagobeere
    es: Baya Zanama
    ko: 과사열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nＰＰを　１０だけ　かいふくする。"
    jp_kanji: "ポケモンに　持たせると\nＰＰを　１０だけ　回復する。"
    en: "If held by a Pokémon,\nit restores a move’s PP by 10."
    fr: "Baie qui restaure 10 PP lorsqu’elle\nest tenue par un Pokémon."
    it: "Se tenuta da un Pokémon restituisce\n10 PP a una mossa."
    de: "Gibst du die Beere einem Pokémon\nzum Tragen, füllt sie die AP einer\nAttacke um 10 Punkte auf."
    es: "Los Pokémon pueden llevarla o usarla\npara restaurar 10 PP de un movimiento."
    ko: "포켓몬에게 지니게 하면\nPP를 10만큼 회복한다."
level_ball:
  names:
    jp_kana: レベルボール
    jp_kanji: レベルボール
    en: Level Ball
    fr: Niveau Ball
    it: Level Ball
    de: Levelball
    es: Nivel Ball
    ko: 레벨볼
  descriptions:
    jp_kana: "じぶんの　ポケモンより　レベルが\nひくいほど　つかまえやすくなる\nちょっと　かわった　ボール。"
    jp_kanji: "自分の　ポケモンより　レベルが\n低いほど　捕まえやすくなる\nちょっと　変わった　ボール。"
    en: "A Poké Ball for catching Pokémon that\nare a lower level than your own."
    fr: "Une Poké Ball un peu spéciale qui\nfonctionne particulièrement bien sur\nles Pokémon de niveau inférieur au sien."
    it: "Poké Ball un po’ originale che funziona\nparticolarmente bene sui Pokémon\ndi livello inferiore al proprio."
    de: "Ein Ball, mit dem sich Pokémon umso\nleichter fangen lassen, je niedriger ihr\nLevel im Vergleich zu deinem Team ist."
    es: "Poké Ball algo distinta que funciona\nespecialmente bien con Pokémon\nde nivel inferior a los que se posee."
    ko: "자신의 포켓몬보다 레벨이\n낮을수록 잡기 쉬워지는\n조금 특이한 볼."
liberty_pass:
  names:
    jp_kana: リバティチケット
    jp_kanji: リバティチケット
    en: Liberty Pass
    fr: Pass Liberté
    it: Liberticket
    de: Gartenpass
    es: T. Libertad
    ko: 리버티티켓
  descriptions:
    jp_kana: "リバティガーデンとうに　いくための\nとくべつな　チケット。\nヒウンシティから　ふねに　のれる。"
    jp_kanji: "リバティガーデン島に　行くための\n特別な　チケット。\nヒウンシティから　船に　乗れる。"
    en: "A special pass to go to Liberty Garden.\nBoard the ship in Castelia City."
    fr: "Ticket spécial permettant de se\nrendre sur l’Île Liberté à bord\ndu bateau de Volucité."
    it: "Biglietto speciale per l’Isola Libertà.\nLa nave parte da Austropoli."
    de: "Ein besonderes Ticket für die Überfahrt\nvon Stratos City zur Insel des\nFreiheitsgartens."
    es: "Ticket especial para ir a Isla Libertad\nmediante un barco de Ciudad Porcelana."
    ko: "리버티가든섬에 가기 위한\n특별한 티켓.\n구름시티에서 배를 탈 수 있다."
liechi_berry:
  names:
    jp_kana: チイラのみ
    jp_kanji: チイラのみ
    en: Liechi Berry
    fr: Baie Lichii
    it: Baccalici
    de: Lydzibeere
    es: Baya Lichi
    ko: 치리열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nピンチのとき　じぶんの\nこうげきが　あがる。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　自分の\n攻撃が　あがる。"
    en: "If held by a Pokémon, it raises its\nAttack stat in a pinch."
    fr: "Tenue, cette Baie monte l’Attaque\nen cas de besoin."
    it: "Aumenta l’Attacco, se il Pokémon che\nla tiene si trova in difficoltà."
    de: "Als getragenes Item erhöht diese Beere\nden Angriffs-Wert eines Pokémon, sobald\nes in einer Notlage steckt."
    es: "Si la lleva un Pokémon, le sube\nel Ataque en un momento de apuro."
    ko: "포켓몬에게 지니게 하면\n위급할 때 자신의\n공격이 올라간다."
life_orb:
  names:
    jp_kana: いのちのたま
    jp_kanji: いのちのたま
    en: Life Orb
    fr: Orbe Vie
    it: Assorbisfera
    de: Leben-Orb
    es: Vidasfera
    ko: 생명의구슬
  descriptions:
    jp_kana: "もたせると　こうげきする　たびに\nＨＰが　すこし　へってしまうが\nわざの　いりょくが　あがる。"
    jp_kanji: "持たせると　攻撃する　たびに\nＨＰが　少し　減ってしまうが\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon.\nIt boosts the power of moves, but at\nthe cost of some HP on each hit."
    fr: "Objet à tenir augmentant la puissance\ndes capacités, mais qui dépense des\nPV à chaque coup."
    it: "Strumento da far tenere a un Pokémon.\nPotenzia le mosse, a scapito di alcuni\nPS per ogni colpo."
    de: "Ein Item zum Tragen.\nVerstärkt Attacken, aber jede\nAttacke kostet den Träger KP."
    es: "Potencia los movimientos, pero\nconsume PS con cada ataque.\nDebe llevarla un Pokémon."
    ko: "지니게 하면 공격할 때마다\nHP가 조금씩 줄지만\n기술의 위력이 올라간다."
light_ball:
  names:
    jp_kana: でんきだま
    jp_kanji: でんきだま
    en: Light Ball
    fr: Ballelumière
    it: Elettropalla
    de: Kugelblitz
    es: Bolaluminosa
    ko: 전기구슬
  descriptions:
    jp_kana: "ピカチュウに　もたせると\nこうげきと　とくこうの　いりょくが\nあがる　ふしぎな　たま。"
    jp_kanji: "ピカチュウに　持たせると\n攻撃と　特攻の　威力が\nあがる　不思議な　玉。"
    en: "An item to be held by Pikachu.\nIt is a puzzling orb that raises\nthe Attack and Sp. Atk stat."
    fr: "Objet à faire tenir par Pikachu. Orbe\nénigmatique qui monte son Attaque et\nson Attaque Spéciale."
    it: "Strumento da far tenere a Pikachu.\nSfera insolita che aumenta l’Attacco e\nl’Attacco Speciale."
    de: "Ein Item, das von Pikachu getragen\nwerden kann. Es erhöht den Angriffs-\nWert und Spezial-Angriff."
    es: "Asombrosa esfera que debe llevar\nPikachu y que aumenta su Ataque\ny su Ataque Especial."
    ko: "피카츄에게 지니게 하면\n공격과 특수공격의 위력이\n올라가는 이상한 구슬."
light_clay:
  names:
    jp_kana: ひかりのねんど
    jp_kanji: ひかりのねんど
    en: Light Clay
    fr: Lumargile
    it: Creta Luce
    de: Lichtlehm
    es: Refleluz
    ko: 빛의점토
  descriptions:
    jp_kana: "もたせた　ポケモンが　ひかりのかべや\nリフレクターを　つかったとき\nいつもよりも　ながく　のこる。"
    jp_kanji: "持たせた　ポケモンが　ひかりのかべや\nリフレクターを　使ったとき\nいつもよりも　長く　残る。"
    en: "A Pokémon held item that extends the\nduration of barrier moves like Light\nScreen and Reflect used by the holder."
    fr: "Objet à tenir augmentant la durée\nde capacités barrières telles que\nMur Lumière et Protection."
    it: "Strumento da far tenere a un Pokémon.\nAllunga la durata delle mosse barriera\ncome Schermoluce e Riflesso."
    de: "Ein Item zum Tragen.\nVerlängert die Dauer von\nLichtschild, Reflektor etc."
    es: "Prolonga la duración de barreras\ncomo Reflejo y Pantalla de Luz.\nDebe llevarla un Pokémon."
    ko: "지니게 한 포켓몬이 빛의장막이나\n리플렉터를 사용했을 때\n여느 때보다 긴 시간동안 지속된다."
light_stone:
  names:
    jp_kana: ライトストーン
    jp_kanji: ライトストーン
    en: Light Stone
    fr: Galet Blanc
    it: Chiarolite
    de: Lichtstein
    es: Orbe Claro
    ko: 라이트스톤
  descriptions:
    jp_kana: "レシラムの　にくたいが　ほろび\nへんかした　すがた。えいゆうの\nとうじょうを　まっていると　される。"
    jp_kanji: "レシラムの　肉体が　滅び\n変化した　姿。　英雄の\n登場を　待っていると　される。"
    en: "Reshiram’s body was destroyed and\nchanged into this stone. It is said to\nbe waiting for the emergence of a hero."
    fr: "Ce sont les derniers restes du corps\nde Reshiram. On dit qu’ils attendent\nl’apparition d’un héros."
    it: "Pietra in cui si è tramutato Reshiram\nquando ha perso la sua forma corporea.\nAttende la venuta di un eroe."
    de: "Nach dem Zerfall seines Körpers nahm\nReshiram diese Form an. Man sagt,\nes warte auf die Ankunft eines Helden."
    es: "Forma que adoptó Reshiram\nal perder su cuerpo. Espera\nla llegada de un nuevo héroe."
    ko: "레시라무의 육체가 허물어져\n변화한 모습. 영웅의\n등장을 기다린다고 여겨진다."
like_mail:
  names:
    jp_kana: おすすめメール
    jp_kanji: おすすめメール
    en: Like Mail
    fr: Lettre Avis
    it: Mess. Sugg.
    de: Insiderbrief
    es: C. Gustos
    ko: 추천메일
  descriptions:
    jp_kana: "なにかを　おすすめする　メールが\nかきやすい　びんせん。\nポケモンに　もたせて　つかう。"
    jp_kanji: "なにかを　おすすめする　メールが\n書きやすい　レターペーパー。\nポケモンに　持たせて　使う。"
    en: "Stationery designed for\nwriting recommendations.\nLet a Pokémon hold it for delivery."
    fr: "Un papier à lettres idéal pour\ndonner des conseils. Peut être\ntenu et livré par un Pokémon."
    it: "Carta da lettera ideale per consigliare\nqualcosa a qualcuno. Un Pokémon può\ntenerla e consegnarla."
    de: "Briefpapier, mit dem man jemandem\neinen Tipp geben kann.\nGib es einem Pokémon zum Tragen."
    es: "Carta para recomendar algo.\nHaz que la entregue un Pokémon."
    ko: "뭔가 추천하는 메일을\n쉽게 쓸 수 있는 편지지.\n포켓몬에게 지니게 해서 쓴다."
lock_capsule:
  names:
    jp_kana: ロックカプセル
    jp_kanji: ロックカプセル
    en: Lock Capsule
    fr: Poké Écrin
    it: Cap. Scrigno
    de: Tresorkapsel
    es: Cáp. Candado
    ko: 록캡슐
  descriptions:
    jp_kana: "とくしゅな　カギで　あけられる\nがんじょうな　カプセル。"
    jp_kanji: "特殊な　カギで　あけられる\n頑丈な　カプセル。"
    en: "A sturdy Capsule that can only be\nopened with a special key."
    fr: "Un écrin résistant qui ne s’ouvre\nqu’avec une clé spéciale."
    it: "Scrigno blindato che si apre solo con\nuna chiave speciale."
    de: "Eine äußerst robuste Kapsel, die sich\nnur mit einem ganz speziellen\nSchlüssel öffnen lässt."
    es: "Una Cápsula resistente que solo puede\nabrirse con una llave especial."
    ko: "특수한 열쇠로 열 수 있는\n튼튼한 캡슐."
loot_sack:
  names:
    jp_kana: たからぶくろ
    jp_kanji: たからぶくろ
    en: Loot Sack
    fr: Sac Butin
    it: Bottinosacca
    de: Beutesack
    es: Saca Botín
    ko: 보물주머니
  descriptions:
    jp_kana: "たんこうで　てにいれた\nたからものを　しまっておける\nおおきくて　じょうぶな　ふくろ。"
    jp_kanji: "炭鉱で　てにいれた\n宝物を　しまっておける\nおおきくて　丈夫な　ふくろ。"
    en: "A sturdy, spacious bag that is used\nto carry loot obtained in the coal\nmine."
    fr: "Grand sac robuste utilisé pour\ntransporter le butin obtenu dans\nla mine de charbon."
    it: "Una sacca spaziosa e resistente\nusata per trasportare il bottino\nottenuto nella miniera."
    de: "Ein fester Sack. Wird verwendet,\num Beute aus der Kohlemine\nzu transportieren."
    es: "Una saca grande y resistente utilizada\npara transportar el botín reunido en\nla mina de carbón."
    ko: "탄갱에서 손에 넣은\n보물을 보관해둘 수 있는\n크고 튼튼한 주머니다."
lost_item:
  names:
    jp_kana: おとしもの
    jp_kanji: おとしもの
    en: Lost Item
    fr: Objet perdu
    it: Strum. perso
    de: Fundsache
    es: Obj. Perdido
    ko: 분실물
  descriptions:
    jp_kana: "モノマネむすめが　なくした\nマネネの　にんぎょう。"
    jp_kanji: "モノマネ娘が　なくした\nマネネの　人形。"
    en: "The Mime Jr. doll that was lost by\nthe Copycat."
    fr: Poupée Mime Jr. perdue par la Copieuse.
    it: "Poké Bambola raffigurante Mime Jr.\nsmarrita da Copiona."
    de: "Eine Pantimimi-Puppe, welche die\nNachahmerin verloren hat."
    es: "El muñeco Mime Jr. que perdió\nla Copiona."
    ko: "흉내내기 아가씨가 잃어버린\n흉내내인형."
love_ball:
  names:
    jp_kana: ラブラブボール
    jp_kanji: ラブラブボール
    en: Love Ball
    fr: Love Ball
    it: Love Ball
    de: Sympaball
    es: Amor Ball
    ko: 러브러브볼
  descriptions:
    jp_kana: "じぶんの　ポケモンと　せいべつが\nちがうと　つかまえやすくなる\nちょっと　かわった　ボール。"
    jp_kanji: "自分の　ポケモンと　性別が\n違うと　捕まえやすくなる\nちょっと　変わった　ボール。"
    en: "Poké Ball for catching Pokémon that are\nthe opposite gender of your Pokémon."
    fr: "Une Poké Ball un peu spéciale qui\nfonctionne mieux sur un Pokémon de\nla même espèce mais de sexe opposé."
    it: "Poké Ball speciale che funziona meglio\nsui Pokémon di sesso opposto a quello\ndel proprio e della stessa specie."
    de: "Ein Ball, der sich besonders gut eignet,\num Pokémon zu fangen, die ein anderes\nGeschlecht haben als dein Pokémon."
    es: "Poké Ball algo distinta que atrapa mejor\nPokémon de la misma especie que los\nque se posee, pero de sexo diferente."
    ko: "자신의 포켓몬과 성별이\n다르면 잡기 쉬워지는\n조금 특이한 볼."
luck_incense:
  names:
    jp_kana: こううんのおこう
    jp_kanji: こううんのおこう
    en: Luck Incense
    fr: Encens Veine
    it: Fortunaroma
    de: Glücksrauch
    es: Incie. Duplo
    ko: 행운의향로
  descriptions:
    jp_kana: "もたせた　ポケモンが　いちどでも\nせんとうに　かおを　だすと\nおかねが　２ばい　もらえる。"
    jp_kanji: "持たせた　ポケモンが　１度でも\n戦闘に　顔を　だすと\nお金が　２倍　もらえる。"
    en: "An item to be held by a Pokémon.\nIt doubles a battle’s prize money if\nthe holding Pokémon joins in."
    fr: "Objet à tenir. Double l’argent gagné\nsi le porteur se joint au combat."
    it: "Strumento da far tenere a un Pokémon.\nRaddoppia i guadagni nella lotta se\nchi lo tiene vi partecipa."
    de: "Ein Item, das ein Pokémon trägt und\ndas doppelte Preisgeld bringt, wenn\nder Träger am Kampf teilnimmt."
    es: "Si el Pokémon que lo lleva lucha en\nun combate, duplica las ganancias."
    ko: "지니게 한 포켓몬이\n한 번이라도 배틀에 나가면\n돈을 2배로 받을 수 있다."
lucky_egg:
  names:
    jp_kana: しあわせタマゴ
    jp_kanji: しあわせタマゴ
    en: Lucky Egg
    fr: Œuf Chance
    it: Fortunuovo
    de: Glücks-Ei
    es: Huevo Suerte
    ko: 행복의알
  descriptions:
    jp_kana: "しあわせが　つまった　タマゴ。\nもたせた　ポケモンは　もらえる\nけいけんちが　すこし　ふえる。"
    jp_kanji: "しあわせが　つまった　タマゴ。\n持たせた　ポケモンは　もらえる\n経験値が　少し　ふえる。"
    en: "An item to be held by a Pokémon.\nIt is an egg filled with happiness that\nearns extra Exp. Points in battle."
    fr: "Objet à tenir. Œuf rempli de joie qui\naugmente le nombre de points Exp.\ngagnés au combat."
    it: "Strumento da far tenere a un Pokémon.\nUovo pieno di felicità che aumenta\ni Punti Esperienza in lotta."
    de: "Ein getragenes Item, das mit Glück\ngefüllt ist und für zusätzliche\nE.-Punkte im Kampf sorgt."
    es: "Es un huevo lleno de felicidad que te\nhace ganar Puntos de Experiencia extra\nen combate. Debe llevarlo un Pokémon."
    ko: "행복이 가득한 알.\n지니게 한 포켓몬은 받을 수 있는\n경험치가 조금 늘어난다."
lucky_punch:
  names:
    jp_kana: ラッキーパンチ
    jp_kanji: ラッキーパンチ
    en: Lucky Punch
    fr: Poing Chance
    it: Fortunpugno
    de: Lucky Punch
    es: Puño Suerte
    ko: 럭키펀치
  descriptions:
    jp_kana: "こううんを　よぶ　グローブ。\nラッキーに　もたせると　わざが\nきゅうしょに　あたりやすくなる。"
    jp_kanji: "幸運を　よぶ　グローブ。\nラッキーに　持たせると　技が\n急所に　当たりやすくなる。"
    en: "An item to be held by Chansey. It is a\npair of gloves that boosts Chansey’s\ncritical-hit ratio."
    fr: "Objet à faire tenir à Leveinard. Paire\nde gants montant son taux de critiques."
    it: "Strumento da far tenere a Chansey.\nGuanti che aumentano di molto la\nprobabilità di sferrare brutti colpi."
    de: "Ein Item, das von Chaneira getragen\nwerden kann. Diese Handschuhe erhöhen\ndie Volltrefferquote von Chaneira."
    es: "Un par de guantes que debe llevar\nChansey. Potencian su índice\nde golpe crítico mucho."
    ko: "행운을 부르는 글러브다.\n럭키에게 지니게 하면 기술이\n급소에 맞기 쉬워진다."
lum_berry:
  names:
    jp_kana: ラムのみ
    jp_kanji: ラムのみ
    en: Lum Berry
    fr: Baie Prine
    it: Baccaprugna
    de: Prunusbeere
    es: Baya Ziuela
    ko: 리샘열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nすべての　じょうたい　いじょうを\nかいふくする。"
    jp_kanji: "ポケモンに　持たせると\nすべての　状態異常を\n回復する。"
    en: "If held by a Pokémon,\nit recovers from any status problem."
    fr: "Baie qui soigne tous les problèmes\nde statut lorsqu’elle est tenue\npar un Pokémon."
    it: "Se tenuta da un Pokémon risolve\nqualsiasi problema di stato."
    de: "Gibst du die Beere einem Pokémon\nzum Tragen, hebt sie alle seine\nStatusprobleme auf."
    es: "Los Pokémon pueden llevarla o usarla\npara recuperarse de problemas\nde estado."
    ko: "포켓몬에게 지니게 하면\n모든 상태 이상을\n회복한다."
lunar_feather:
  names:
    jp_kana: みかづきのはね
    jp_kanji: みかづきのはね
    en: Lunar Wing
    fr: Lun’Aile
    it: Alalunare
    de: Lunarfeder
    es: Pluma Lunar
    ko: 초승달날개
  descriptions:
    jp_kana: "つきのような　かがやきを　はなつ\nはね。　あくむを　ふりはらう　ちからを\nひめていると　つたえられている。"
    jp_kanji: "つきのような　輝きを　はなつ\nはね。　悪夢を　ふりはらう　力を\n秘めていると　伝えられている。"
    en: "A feather that glows like the moon.\nIt is said to possess the power to\ndispel nightmares."
    fr: "Plume qui brille comme la lune. On dit\nqu’elle a le pouvoir de chasser les\ncauchemars."
    it: "Piuma che brilla come la luna. Pare\nche possieda il potere di allontanare\ngli incubi."
    de: "Diese Feder leuchtet wie der Mond.\nKann angeblich Alpträume vertreiben."
    es: "Pluma que brilla como la luna. Se dice\nque tiene el poder de disipar pesadillas."
    ko: "달처럼 반짝임을 발산하는 날개.\n악몽을 뿌리치는 힘을\n간직하고 있다고 전해진다."
lure_ball:
  names:
    jp_kana: ルアーボール
    jp_kanji: ルアーボール
    en: Lure Ball
    fr: Appât Ball
    it: Esca Ball
    de: Köderball
    es: Cebo Ball
    ko: 루어볼
  descriptions:
    jp_kana: "つりざおで　つりあげた　ポケモンだと\nつかまえやすくなる\nちょっと　かわった　ボール。"
    jp_kanji: "つりざおで　つりあげた　ポケモンだと\n捕まえやすくなる\nちょっと　変わった　ボール。"
    en: "A Poké Ball for catching Pokémon hooked\nby a Rod when fishing."
    fr: "Une Poké Ball un peu spéciale qui\nfonctionne particulièrement bien sur les\nPokémon ferrés avec une canne à pêche."
    it: "Poké Ball un po’ originale che funziona\nparticolarmente bene sui Pokémon\npescati con un Amo."
    de: "Ein Ball, der sich besonders gut\neignet, um Pokémon zu fangen,\ndie an deiner Angel hängen."
    es: "Poké Ball algo distinta, especialmente\nindicada para capturar los Pokémon\nque se han pescado con una Caña."
    ko: "낚싯대로 낚아올린 포켓몬이라면\n잡기 쉬워지는\n조금 특이한 볼."
lustrous_orb:
  names:
    jp_kana: しらたま
    jp_kanji: しらたま
    en: Lustrous Orb
    fr: Orbe Perlé
    it: Splendisfera
    de: Weiß-Orb
    es: Lustresfera
    ko: 백옥
  descriptions:
    jp_kana: "パルキアに　もたせると　ドラゴンと\nみずタイプの　わざの　いりょくが\nあがる　うつくしく　かがやく　たま。"
    jp_kanji: "パルキアに　持たせると　ドラゴンと\nみずタイプの　技の　威力が\nあがる　美しく　輝く　珠。"
    en: "A beautifully glowing orb to be held by\nPalkia. It boosts the power of Dragon-\nand Water-type moves."
    fr: "Bel orbe luisant destiné à Palkia.\nAugmente la puissance des capacités\nde type Dragon et Eau."
    it: "Sfera splendente da far tenere\na Palkia. Potenzia le mosse di tipo\nDrago e Acqua."
    de: "Ein hell leuchtender Orb.\nVerstärkt Attacken vom Typ Drachen\nund Wasser, wenn Palkia ihn trägt."
    es: "Una bonita esfera que potencia\nlos movimientos de tipo Dragón y Agua.\nDebe llevarla Palkia."
    ko: "펄기아에게 지니게 하면 드래곤과\n물타입 기술의 위력이 올라가는\n아름답게 반짝이는 구슬."
luxury_ball:
  names:
    jp_kana: ゴージャスボール
    jp_kanji: ゴージャスボール
    en: Luxury Ball
    fr: Luxe Ball
    it: Chic Ball
    de: Luxusball
    es: Lujo Ball
    ko: 럭셔리볼
  descriptions:
    jp_kana: "つかまえた　やせいポケモンが\nとても　なつきやすくなる\nいごこちの　いい　ボール。"
    jp_kanji: "捕まえた　野生ポケモンが\nとても　なつきやすくなる\nいごこちの　いい　ボール。"
    en: "A comfortable Poké Ball that makes a\ncaught wild Pokémon quickly grow\nfriendly."
    fr: "Une Poké Ball pratique qui permet\nde gagner rapidement l’amitié d’un\nPokémon sauvage attrapé."
    it: "Poké Ball utile che rende più amichevoli\ni Pokémon selvatici catturati."
    de: "Ein behaglicher Ball, der Pokémon\nveranlasst, nach dem Fang schneller\nfreundlicher zu werden."
    es: "Acogedora Poké Ball que hace más\namistosos a los Pokémon salvajes\ncapturados."
    ko: "잡은 야생 포켓몬이\n매우 친밀해지기 쉬운\n편안한 볼."
machine_part:
  names:
    jp_kana: きかいのぶひん
    jp_kanji: きかいのぶひん
    en: Machine Part
    fr: Partie Mach.
    it: Pezzo macch.
    de: Spule
    es: Maquinaria
    ko: 기계부품
  descriptions:
    jp_kana: "はつでんしょから　ぬすまれた\nはつでんきの　たいせつな　ぶひん。"
    jp_kanji: "発電所から　ぬすまれた\n発電機の　たいせつな　部品。"
    en: "An important machine part for the\nPower Plant that was stolen."
    fr: "Une pièce essentielle du générateur\nde la Centrale."
    it: "Pezzo rubato alla Centrale Elettrica,\nessenziale per il generatore."
    de: "Ein unentbehrliches Maschinenteil, das\naus dem Kraftwerk entwendet wurde."
    es: "Valiosa pieza robada de una máquina\nde la Central Energía."
    ko: "발전소에서 도둑맞은\n발전기의 중요한 부품."
macho_brace:
  names:
    jp_kana: きょうせいギプス
    jp_kanji: きょうせいギプス
    en: Macho Brace
    fr: Brac. Macho
    it: Crescicappa
    de: Machoband
    es: Brazal Firme
    ko: 교정깁스
  descriptions:
    jp_kana: "かたくて　おもい　ギプス。\nもたせると　すばやさは　さがるが\nふつうより　つよく　そだちやすい。"
    jp_kanji: "硬くて　重い　ギプス。\n持たせると　素早さは　さがるが\nふつうより　強く　育ちやすい。"
    en: "An item to be held by a Pokémon. It is\na stiff and heavy brace that promotes\nstrong growth but lowers Speed."
    fr: "Objet à tenir. C’est un bracelet dur\net lourd qui rend le porteur plus fort,\nmais baisse sa Vitesse."
    it: "Strumento da far tenere a un Pokémon.\nAttrezzo pesante che riduce la Velocità\nma aiuta la crescita delle statistiche."
    de: "Ein Item, das ein Pokémon tragen\nkann. Der Initiative-Wert sinkt zwar,\naber es wird dafür umso stärker."
    es: "Sólido y pesado brazal. Sube más las\ncaracterísticas al subir nivel, pero\nbaja la Velocidad de quien lo lleva."
    ko: "단단하고 무거운 깁스.\n지니게 하면 스피드는 떨어지지만\n여느 때보다 강하게 키우기 쉽다."
magma_stone:
  names:
    jp_kana: かざんのおきいし
    jp_kanji: かざんのおきいし
    en: Magma Stone
    fr: Pierre Magma
    it: Magmapietra
    de: Magmastein
    es: Piedra Magma
    ko: 화산의돌
  descriptions:
    jp_kana: "しゃくねつの　マグマの　ねつでとけた\nがんせきが　かたまって　できたもの。\nなかに　マグマが　のこっている。"
    jp_kanji: "しゃくねつの　マグマの　熱でとけた\n岩石が　固まって　できたもの。\n中に　マグマが　残っている。"
    en: "A stone formed when boulders melted in\nintensely hot magma, then hardened.\nMagma remains sealed inside."
    fr: "Pierre formée à partir de roche en\nfusion solidifiée. Elle contient du\nmagma."
    it: "Pietra che si è formata in seguito\nad un’intensa colata lavica. Il magma\nè rimasto intrappolato al suo interno."
    de: "Ein Stein aus gehärtetem Magma.\nSein innerer Kern ist noch flüssig\nund heiß."
    es: "Formada a partir de magma enfriado\ny endurecido. Aún hay magma\nlíquido en su interior."
    ko: "이글거리는 마그마의 열로 녹은\n암석이 굳어져 생긴 것.\n안에는 마그마가 남아 있다."
magmarizer:
  names:
    jp_kana: マグマブースター
    jp_kanji: マグマブースター
    en: Magmarizer
    fr: Magmariseur
    it: Magmatore
    de: Magmaisierer
    es: Magmatizador
    ko: 마그마부스터
  descriptions:
    jp_kana: "とてつもない　マグマの　エネルギーが\nたくわえられている　はこ。\nある　ポケモンが　このんでいる。"
    jp_kanji: "とてつもない　マグマの　エネルギーが\n蓄えられている　箱。\nある　ポケモンが　好んでいる。"
    en: "A box packed with a tremendous\namount of magma energy.\nIt is loved by a certain Pokémon."
    fr: "Une boîte remplie d’une énorme quantité\nd’énergie magmatique. Appréciée d’un\ncertain Pokémon."
    it: "Scatola strapiena di energia lavica.\nUn Pokémon in particolare adora\nquesto strumento."
    de: "Eine Schachtel mit Magmaenergie.\nDas Lieblingsstück eines bestimmten\nPokémon."
    es: "Esta caja contiene una enorme\ncantidad de energía magmática.\nCierto Pokémon lo adora."
    ko: "엄청난 마그마의 에너지가\n비축되어 있는 상자.\n어떤 포켓몬이 좋아하는 물건이다."
magnet:
  names:
    jp_kana: じしゃく
    jp_kanji: じしゃく
    en: Magnet
    fr: Aimant
    it: Calamita
    de: Magnet
    es: Imán
    ko: 자석
  descriptions:
    jp_kana: "きょうりょくな　じしゃく。\nもたせると　でんきタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "強力な　磁石。\n持たせると　でんきタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon.\nIt is a powerful magnet that boosts\nthe power of Electric-type moves."
    fr: "Objet à tenir. Aimant puissant montant\nla puissance des capacités de type\nÉlectrik."
    it: "Strumento da far tenere a un Pokémon.\nPotente magnete che potenzia le mosse\ndi tipo Elettro."
    de: "Ein Item zum Tragen, dessen\nmagnetische Kraft Attacken\nvom Typ Elektro verstärkt."
    es: "Debe llevarlo un Pokémon.\nSu potente magnetismo fortalece\nlos movimientos de tipo Eléctrico."
    ko: "강력한 자석.\n지니게 하면 전기타입\n기술의 위력이 올라간다."
mago_berry:
  names:
    jp_kana: マゴのみ
    jp_kanji: マゴのみ
    en: Mago Berry
    fr: Baie Mago
    it: Baccamango
    de: Magobeere
    es: Baya Ango
    ko: 마고열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nピンチのとき　ＨＰを　かいふくする。\nきらいな　あじだと　こんらん　する。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　ＨＰを　回復する。\nきらいな味だと　混乱する。"
    en: "If held by a Pokémon, it restores the\nuser’s HP in a pinch, but will cause\nconfusion if it hates the taste."
    fr: "Tenue, cette Baie restaure des PV en\ncas de besoin, mais rend confus si\nle Pokémon n’aime pas son goût."
    it: "Se tenuta da un Pokémon in difficoltà,\nrestituisce PS. Se al Pokémon non piace\nil suo sapore, può causare confusione."
    de: "Als getragenes Item füllt die Beere die\nKP eines Pokémon auf, doch ihr Aroma\nverwirrt jene, die es nicht mögen."
    es: "Los Pokémon pueden llevarla o usarla\npara restaurar algunos PS. Su sabor\npuede causar confusión."
    ko: "포켓몬에게 지니게 하면\n위급할 때 HP를 회복한다.\n싫어하는 맛이면 혼란에 빠진다."
magost_berry:
  names:
    jp_kana: ゴスのみ
    jp_kanji: ゴスのみ
    en: Magost Berry
    fr: Baie Mangou
    it: Baccagostan
    de: Magostbeere
    es: Baya Aostan
    ko: 고스티열매
  descriptions:
    jp_kana: "イッシュちほうでは　とても\nめずらしい　きのみ。\nマニアが　たかく　かってくれる。"
    jp_kanji: "イッシュ地方では　とても\n珍しい　きのみ。\nマニアが　高く　買ってくれる。"
    en: "A Berry which is very rare in the\nUnova region.\nA maniac will buy it for a high price."
    fr: "Baie très rare à Unys.\nLes amateurs en donnent un bon prix."
    it: "Bacca molto rara a Unima.\nSi può vendere a un prezzo piuttosto\nalto agli intenditori."
    de: "Eine Beere, die nur äußerst selten\nin der Einall-Region zu finden ist.\nKenner geben ihr letztes Hemd dafür."
    es: "Una Baya muy rara en la región\nde Teselia. Muy apreciada\npor los gourmets."
    ko: "하나지방에서는 매우\n희귀한 나무열매.\n마니아가 비싼 값에 산다."
master_ball:
  names:
    jp_kana: マスターボール
    jp_kanji: マスターボール
    en: Master Ball
    fr: Master Ball
    it: Master Ball
    de: Meisterball
    es: Master Ball
    ko: 마스터볼
  descriptions:
    jp_kana: "やせいの　ポケモンを　かならず\nつかまえることが　できる\nさいこう　せいのうの　ボール。"
    jp_kanji: "野生の　ポケモンを　必ず\n捕まえることが　できる\n最高　性能の　ボール。"
    en: "The best Ball with the ultimate level of\nperformance. It will catch any wild\nPokémon without fail."
    fr: "Assurément la Ball la plus performante.\nElle permet de capturer à coup sûr un\nPokémon sauvage."
    it: "La Ball dalle prestazioni migliori:\ncattura qualsiasi Pokémon selvatico\nsenza mai fallire."
    de: "Der beste Ball!\nDamit fängst du garantiert\njedes wilde Pokémon."
    es: "La Poké Ball definitiva. Atrapa\ncualquier Pokémon salvaje y no\nfalla nunca."
    ko: "야생 포켓몬을 반드시\n잡을 수 있는\n최고 성능의 볼."
max_elixir:
  names:
    jp_kana: ピーピーマックス
    jp_kanji: ピーピーマックス
    en: Max Elixir
    fr: Max Élixir
    it: Elisir Max
    de: Top-Elixier
    es: Elixir Máx.
    ko: PP맥스
  descriptions:
    jp_kana: "ポケモンが　おぼえている\n４つの　わざの　ＰＰを\nすべて　かいふくする。"
    jp_kanji: "ポケモンが　覚えている\n４つの　技の　ＰＰを\nすべて　回復する。"
    en: "It fully restores the PP of all the\nmoves learned by the targeted\nPokémon."
    fr: "Restaure tous les PP de toutes\nles capacités d’un Pokémon."
    it: "Restituisce tutti i PP a ogni mossa\nimparata dal Pokémon."
    de: "Füllt alle AP aller Attacken eines\nPokémon vollständig auf."
    es: "Restaura completamente los PP de\ntodos los movimientos aprendidos\npor el Pokémon elegido."
    ko: "포켓몬이 기억하고 있는\n4개 기술의 PP를\n모두 회복한다."
max_ether:
  names:
    jp_kana: ピーピーリカバー
    jp_kanji: ピーピーリカバー
    en: Max Ether
    fr: Huile Max
    it: Etere Max
    de: Top-Äther
    es: Éter Máx.
    ko: PP회복
  descriptions:
    jp_kana: "ポケモンが　おぼえている\nわざのうち　１つの　ＰＰを\nすべて　かいふくする。"
    jp_kanji: "ポケモンが　覚えている\n技のうち　１つの　ＰＰを\nすべて　回復する。"
    en: "It fully restores the PP of a single\nselected move that has been learned\nby the target Pokémon."
    fr: "Restaure tous les PP d’une capacité\nsélectionnée."
    it: "Restituisce tutti i PP a una mossa\na scelta che è stata imparata\ndal Pokémon."
    de: "Füllt die AP einer ausgewählten Attacke\neines Pokémon vollständig auf."
    es: "Restaura completamente los PP del\nmovimiento elegido de un Pokémon."
    ko: "포켓몬이 기억하고 있는\n기술 중 1개의 PP를\n모두 회복한다."
max_potion:
  names:
    jp_kana: まんたんのくすり
    jp_kanji: まんたんのくすり
    en: Max Potion
    fr: Potion Max
    it: Pozione Max
    de: Top-Trank
    es: Máx. Poción
    ko: 풀회복약
  descriptions:
    jp_kana: "スプレーしきの　キズぐすり。\nポケモン　１ひきの　ＨＰを\nすべて　かいふくする。"
    jp_kanji: "スプレー式の　キズぐすり。\nポケモン　１匹の　ＨＰを\nすべて　回復する。"
    en: "A spray-type medicine for wounds.\nIt completely restores the HP of a\nsingle Pokémon."
    fr: "Un spray qui soigne les blessures.\nRestaure tous les PV d’un Pokémon."
    it: "Rimedio spray per le ferite.\nRestituisce tutti i PS ad un Pokémon."
    de: "Hilft bei Wunden. Füllt\ndie KP eines Pokémon\nvollständig wieder auf."
    es: "Medicina en espray que cura heridas\ny restaura todos los PS de un Pokémon."
    ko: "스프레이식의 상처약.\n포켓몬 1마리의 HP를\n모두 회복한다."
max_repel:
  names:
    jp_kana: ゴールドスプレー
    jp_kanji: ゴールドスプレー
    en: Max Repel
    fr: Max Repousse
    it: Repell. Max
    de: Top-Schutz
    es: Máx. Repel
    ko: 골드스프레이
  descriptions:
    jp_kana: "２５０ぽ　すすむ　あいだ\nよわい　やせいの　ポケモンが\nまったく　でて　こなくなる。"
    jp_kanji: "２５０歩　進む　あいだ\n弱い　野生の　ポケモンが\nまったく　でて　こなくなる。"
    en: "An item that prevents weak wild\nPokémon from appearing for 250 steps\nafter its use."
    fr: "Repousse les Pokémon sauvages\nfaibles pendant 250 pas."
    it: "Repellente che evita l’incontro con i\nPokémon selvatici deboli per 250 passi\ndopo l’utilizzo."
    de: "Hält 250 Schritte lang schwache,\nwilde Pokémon ab."
    es: "Repele Pokémon salvajes débiles\nen un recorrido de 250 pasos."
    ko: "250보 걸어가는 동안\n약한 야생 포켓몬이\n전혀 나오지 않게 된다."
max_revive:
  names:
    jp_kana: げんきのかたまり
    jp_kanji: げんきのかたまり
    en: Max Revive
    fr: Rappel Max
    it: Revital. Max
    de: Top-Beleber
    es: Máx. Revivir
    ko: 기력의덩어리
  descriptions:
    jp_kana: "ひんしに　なってしまった\nポケモン　１ひきの　ＨＰを\nすべて　かいふくする。"
    jp_kanji: "ひんしに　なってしまった\nポケモン　１匹の　ＨＰを\nすべて　回復する。"
    en: "A medicine that revives a fainted\nPokémon. It fully restores the\nPokémon’s HP."
    fr: "Un médicament qui ranime un Pokémon\nK.O. et restaure tous ses PV."
    it: "Rimedio che rianima un Pokémon esausto\nridandogli tutti i PS."
    de: "Eine Medizin, die ein kampfunfähiges\nPokémon wiederbelebt. Die KP werden\nvollständig wiederhergestellt."
    es: "Medicina que reanima a un Pokémon\ndebilitado y restaura todos sus PS."
    ko: "기절해 버린\n포켓몬 1마리의 HP를\n모두 회복한다."
meadow_plate:
  names:
    jp_kana: みどりのプレート
    jp_kanji: みどりのプレート
    en: Meadow Plate
    fr: Plaque Herbe
    it: Lastraprato
    de: Wiesentafel
    es: Tabla Pradal
    ko: 초록플레이트
  descriptions:
    jp_kana: "くさの　タイプの　せきばん。\nもたせると　くさタイプの\nわざの　いりょくが　つよまる。"
    jp_kanji: "くさの　タイプの　石盤。\n持たせると　くさタイプの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon.\nIt is a stone tablet that boosts the\npower of Grass-type moves."
    fr: "Objet à tenir. Tablette en pierre\naugmentant la puissance des capacités\nde type Plante."
    it: "Strumento da far tenere a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Erba."
    de: "Ein Item zum Tragen. Diese Steintafel\nverstärkt Attacken vom Typ Pflanze."
    es: "Tabla de piedra que potencia\nlos movimientos de tipo Planta.\nDebe llevarla un Pokémon."
    ko: "풀타입의 석판.\n지니게 하면 풀타입\n기술의 위력이 강해진다."
medal_box:
  names:
    jp_kana: メダルボックス
    jp_kanji: メダルボックス
    en: Medal Box
    fr: B. Médailles
    it: Box Premi
    de: Medaillenbox
    es: C. Insignias
    ko: 메달박스
  descriptions:
    jp_kana: "かくとくした　メダルを　しゅうのうし\nメダルについての　じょうほうを\nきろくする　はこがたの　きかい。"
    jp_kanji: "獲得した　メダルを　収納し\nメダルについての　情報を\n記録する　箱型の　機械。"
    en: "A box-shaped machine\nthat stores Medals and\nMedal information."
    fr: "Une boîte qui permet de ranger les\nMédailles et d’enregistrer des\ninformations à leur sujet."
    it: "Apparecchio rettangolare usato per\ncustodire i Premi ottenuti e tutte le\ninformazioni che li riguardano."
    de: "Ein Gerät in Form einer Box, in der\nMedaillen aufbewahrt und Informationen\ndazu gespeichert werden."
    es: "Un dispositivo con forma de caja\nque almacena las Insignias y\nla información relacionada."
    ko: "획득한 메달을 수납하고\n메달에 대한 정보를\n기록하는 상자 모양의 기계."
member_card:
  names:
    jp_kana: メンバーズカード
    jp_kanji: メンバーズカード
    en: Member Card
    fr: Carte Membre
    it: Scheda Soci
    de: Mitgl.Karte
    es: Carné Socio
    ko: 멤버스카드
  descriptions:
    jp_kana: "ミオシティの　やどやに　はいれる\nカード。　なぜか　５０ねんほどまえの\nひづけが　きざまれている。"
    jp_kanji: "ミオシティの　宿屋に　はいれる\nカード。　なぜか　５０年ほど前の\n日付が　刻まれている。"
    en: "A card needed for entering the inn in\nCanalave City. Oddly, the last date\nmarked on it was 50 years ago."
    fr: "Carte nécessaire pour entrer à\nl’auberge de Joliberges. Le dernier\ntampon date d’il y a 50 ans!"
    it: "Scheda necessaria per entrare\nnella locanda di Canalipoli. L’ultimo\ntimbro risale a 50 anni fa."
    de: "Eine Eintrittskarte für den Gasthof\nin Fleetburg. Sie ist über 50 Jahre\nalt..."
    es: "Necesario para entrar en la posada de\nCiudad Canal. Es extraño, pero la última\nfecha registrada es de hace 50 años."
    ko: "운하시티의 여관에 들어갈 수 있는\n카드. 어찌된 일인지 50년 정도 전의\n날짜가 새겨져 있다."
mental_herb:
  names:
    jp_kana: メンタルハーブ
    jp_kanji: メンタルハーブ
    en: Mental Herb
    fr: Herbe Mental
    it: Mentalerba
    de: Mentalkraut
    es: Hier. Mental
    ko: 멘탈허브
  descriptions:
    jp_kana: "もたせた　ポケモンが　じゆうに\nわざを　だせなくなったときに\nいちどだけ　かいふくする。"
    jp_kanji: "持たせた　ポケモンが　自由に\n技を　だせなくなったときに\n１度だけ　回復する。"
    en: "An item to be held by a Pokémon. It\nsnaps the holder out of infatuation.\nIt can be used only once."
    fr: "Objet à tenir qui annule l’attirance\nd’un Pokémon. Ne peut être utilisé\nqu’une fois."
    it: "Strumento monouso da far tenere a un\nPokémon. Annulla l’infatuazione di chi\nlo tiene."
    de: "Ein Item, das einem Pokémon zum Tragen\ngegeben werden kann. Hilft einmalig bei\neingeschränktem Handlungsspielraum."
    es: "El Pokémon que la lleva se libera\ndel enamoramiento. Solo puede\nusarse una vez."
    ko: "지니게 한 포켓몬은\n헤롱헤롱 상태가 되었을 때\n한 번만 회복한다."
metal_coat:
  names:
    jp_kana: メタルコート
    jp_kanji: メタルコート
    en: Metal Coat
    fr: Peau Métal
    it: Metalcoperta
    de: Metallmantel
    es: Rev.metálico
    ko: 금속코트
  descriptions:
    jp_kana: "とくしゅな　きんぞくの　まく。\nもたせると　はがねタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "特殊な　金属の　膜。\n持たせると　はがねタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon.\nIt is a special metallic film that ups\nthe power of Steel-type moves."
    fr: "Objet à tenir. Pellicule métallique\nspéciale qui monte la puissance des\ncapacités de type Acier."
    it: "Strumento da far tenere a un Pokémon.\nSpeciale pellicola metallica che\npotenzia le mosse di tipo Acciaio."
    de: "Ein Item, das einem Pokémon zum\nTragen gegeben werden kann. Es\nverstärkt Attacken vom Typ Stahl."
    es: "Película metálica que fortalece\nlos ataques de tipo Acero.\nDebe llevarlo un Pokémon."
    ko: "특수한 금속 장막.\n지니게 하면 강철타입\n기술의 위력이 올라간다."
metal_powder:
  names:
    jp_kana: メタルパウダー
    jp_kanji: メタルパウダー
    en: Metal Powder
    fr: Poudre Métal
    it: Metalpolvere
    de: Metallstaub
    es: Pol.metálico
    ko: 금속파우더
  descriptions:
    jp_kana: "メタモンに　もたせると　ぼうぎょが\nあがる　ふしぎなこな。\nとても　こまかくて　かたい。"
    jp_kanji: "メタモンに　持たせると　防御が\nあがる　不思議な粉。\nとても　こまかくて　硬い。"
    en: "An item to be held by Ditto.\nExtremely fine yet hard, this odd\npowder boosts the Defense stat."
    fr: "Objet à faire tenir à Métamorph. Cette\npoudre étrange, très fine mais\nrésistante, booste sa Défense."
    it: "Strumento da far tenere a Ditto.\nStrana polvere finissima e al tempo\nstesso dura che migliora la Difesa."
    de: "Ein Item, das von Ditto getragen\nwerden kann. Es erhöht seinen\nVerteidigungs-Wert."
    es: "Debe llevarlo Ditto. Es un polvo\nmuy fino, pero a la vez resistente,\nque aumenta su Defensa."
    ko: "메타몽에게 지니게 하면\n방어가 올라가는 이상한 가루.\n매우 잘고 단단하다."
metronome:
  names:
    jp_kana: メトロノーム
    jp_kanji: メトロノーム
    en: Metronome
    fr: Métronome
    it: Plessimetro
    de: Metronom
    es: Metrónomo
    ko: 메트로놈
  descriptions:
    jp_kana: "もたせると　おなじわざを　れんぞくで\nつかったとき　いりょくが　あがる。\nやめると　いりょくは　もどる。"
    jp_kanji: "持たせると　同じ技を　連続で\n使ったとき　威力が　あがる。\nやめると　威力は　もどる。"
    en: "A Pokémon held item that boosts a move\nused consecutively. Its effect is\nreset if another move is used."
    fr: "Objet à tenir boostant une capacité\nutilisée à répétition. L’effet s’annule\nsi une autre capacité est utilisée."
    it: "Strumento da far tenere a un Pokémon.\nPotenzia una mossa usata di seguito.\nL’aumento svanisce al cambio di mossa."
    de: "Ein Item zum Tragen. Verstärkt eine\nAttacke, je öfter sie ununterbrochen\nausgeführt wird."
    es: "Potencia un movimiento que se use de\nforma consecutiva. Pero el efecto se\npierde si se emplea otro movimiento."
    ko: "지니게 하면 똑같은 기술을 연속으로\n사용했을 때 위력이 올라간다.\n그만두면 위력이 되돌아간다."
micle_berry:
  names:
    jp_kana: ミクルのみ
    jp_kanji: ミクルのみ
    en: Micle Berry
    fr: Baie Micle
    it: Baccaracolo
    de: Wunfrubeere
    es: Baya Lagro
    ko: 미클열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nピンチのとき　いちどだけ\nわざの　めいちゅうりつが　あがる。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　１度だけ\n技の　命中率が　あがる。"
    en: "If held by a Pokémon, it raises the\naccuracy of a move just once in a pinch."
    fr: "Tenue, cette Baie augmente une fois\nla Précision d’une capacité en cas de\nbesoin."
    it: "Se il Pokémon che ce l’ha è in difficoltà,\naumenta la precisione della sua mossa\nsuccessiva."
    de: "Als getragenes Item erhöht diese Beere\ndie Genauigkeit eines Pokémon, sobald\nes in einer Notlage steckt."
    es: "Cuando la lleva un Pokémon, le sube\nla Precisión de un movimiento en un\nmomento de apuro."
    ko: "포켓몬에게 지니게 하면\n위급할 때 한 번만\n기술의 명중률이 올라간다."
mind_plate:
  names:
    jp_kana: ふしぎのプレート
    jp_kanji: ふしぎのプレート
    en: Mind Plate
    fr: Plaquesprit
    it: Lastramente
    de: Hirntafel
    es: Tabla Mental
    ko: 이상한플레이트
  descriptions:
    jp_kana: "エスパーの　タイプの　せきばん。\nもたせると　エスパータイプの\nわざの　いりょくが　つよまる。"
    jp_kanji: "エスパーの　タイプの　石盤。\n持たせると　エスパータイプの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon.\nIt is a stone tablet that boosts the\npower of Psychic-type moves."
    fr: "Objet à tenir. Tablette en pierre\naugmentant la puissance des capacités\nde type Psy."
    it: "Strumento da far tenere a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Psico."
    de: "Ein Item zum Tragen. Diese Steintafel\nverstärkt Attacken vom Typ Psycho."
    es: "Tabla de piedra que potencia\nlos movimientos de tipo Psíquico.\nDebe llevarla un Pokémon."
    ko: "에스퍼타입의 석판.\n지니게 하면 에스퍼타입\n기술의 위력이 강해진다."
miracle_seed:
  names:
    jp_kana: きせきのタネ
    jp_kanji: きせきのタネ
    en: Miracle Seed
    fr: Grain Miracl
    it: Miracolseme
    de: Wundersaat
    es: Sem. Milagro
    ko: 기적의씨
  descriptions:
    jp_kana: "せいめいが　やどる　タネ。\nもたせると　くさタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "生命が　宿る　タネ。\n持たせると　くさタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon.\nIt is a seed imbued with life that ups\nthe power of Grass-type moves."
    fr: "Objet à tenir. Graine remplie de vie qui\nmonte la puissance des capacités de\ntype Plante."
    it: "Strumento da far tenere a un Pokémon.\nSeme intriso di vita che potenzia\nle mosse di tipo Erba."
    de: "Ein Item zum Tragen. Ein Samen\nvoller Lebenskraft, der Attacken\nvom Typ Pflanze verstärkt."
    es: "Debe llevarla un Pokémon.\nLa vitalidad de la semilla fortalece\nlos movimientos de tipo Planta."
    ko: "생명이 깃든 씨앗.\n지니게 하면 풀타입\n기술의 위력이 올라간다."
moomoo_milk:
  names:
    jp_kana: モーモーミルク
    jp_kanji: モーモーミルク
    en: Moomoo Milk
    fr: Lait Meumeu
    it: Latte Mumu
    de: Kuhmuh-Milch
    es: Leche Mu-mu
    ko: 튼튼밀크
  descriptions:
    jp_kana: "えいよう　まんてんの　ミルク。\nポケモン　１ひきの　ＨＰを\n１００だけ　かいふくする。"
    jp_kanji: "栄養満点の　ミルク。\nポケモン　１匹の　ＨＰを\n１００だけ　回復する。"
    en: "Milk with a very high nutrition content.\nIt restores the HP of one Pokémon by\n100 points."
    fr: "Un lait très nourrissant.\nRestaure 100 PV à un Pokémon."
    it: "Latte ricco di sostanze nutrienti.\nRestituisce 100 PS ad un Pokémon."
    de: "Eine äußerst nährstoffreiche Milch, die\ndie KP eines Pokémon um 100 Punkte\nauffüllt."
    es: "Leche de alto valor nutritivo que\nrestaura 100 PS de un Pokémon."
    ko: "영양 만점의 우유.\n포켓몬 1마리의 HP를\n100만큼 회복한다."
moon_ball:
  names:
    jp_kana: ムーンボール
    jp_kanji: ムーンボール
    en: Moon Ball
    fr: Lune Ball
    it: Luna Ball
    de: Mondball
    es: Luna Ball
    ko: 문볼
  descriptions:
    jp_kana: "つきのいしで　しんかする　ポケモンが\nつかまえやすくなる\nちょっと　かわった　ボール。"
    jp_kanji: "つきのいしで　進化する　ポケモンが\n捕まえやすくなる\nちょっと　変わった　ボール。"
    en: "A Poké Ball for catching Pokémon that\nevolve using the Moon Stone."
    fr: "Une Poké Ball un peu spéciale qui\nfonctionne particulièrement bien sur les\nPokémon évoluant avec une Pierre Lune."
    it: "Poké Ball un po’ originale che funziona\nparticolarmente bene sui Pokémon\nche si evolvono con una Pietralunare."
    de: "Ein Ball, der sich besonders gut eignet,\num Pokémon zu fangen, die sich durch\neinen Mondstein weiterentwickeln."
    es: "Poké Ball algo distinta que atrapa con\nmás facilidad los Pokémon que\nevolucionan con la Piedra Lunar."
    ko: "달의돌로 진화하는 포켓몬이\n잡기 쉬워지는\n조금 특이한 볼."
moon_stone:
  names:
    jp_kana: つきのいし
    jp_kanji: つきのいし
    en: Moon Stone
    fr: Pierre Lune
    it: Pietralunare
    de: Mondstein
    es: Piedra Lunar
    ko: 달의돌
  descriptions:
    jp_kana: "ある　とくていの　ポケモンを\nしんかさせる　ふしぎな　いし。\nよぞらのように　くろい。"
    jp_kanji: "ある　特定の　ポケモンを\n進化させる　不思議な　石。\n夜空のように　黒い。"
    en: "A peculiar stone that makes certain\nspecies of Pokémon evolve.\nIt is as black as the night sky."
    fr: "Une pierre étrange qui fait évoluer\ncertaines espèces de Pokémon.\nElle est noire comme la nuit."
    it: "Pietra particolare che fa evolvere\ndeterminate specie di Pokémon.\nÈ nera come il cielo di notte."
    de: "Dieser spezielle Stein löst bei\nbestimmten Pokémon die Entwicklung\naus. Er ist schwarz wie die Nacht."
    es: "Curiosa piedra que hace evolucionar\na determinadas especies de Pokémon.\nEs negra como el azabache."
    ko: "어느 특정한 포켓몬을\n진화시키는 이상한 돌.\n밤하늘처럼 까맣다."
muscle_band:
  names:
    jp_kana: ちからのハチマキ
    jp_kanji: ちからのハチマキ
    en: Muscle Band
    fr: Band. Muscle
    it: Muscolbanda
    de: Muskelband
    es: Cinta Fuerte
    ko: 힘의머리띠
  descriptions:
    jp_kana: "ちからが　わいてくる　ハチマキ。\nもたせると　ぶつりわざの\nいりょくが　すこし　あがる。"
    jp_kanji: "ちからが　わいてくる　ハチマキ。\n持たせると　物理技の\n威力が　少し　あがる。"
    en: "An item to be held by a Pokémon.\nIt is a headband that slightly boosts\nthe power of physical moves."
    fr: "Objet à tenir. Bandeau augmentant\nlégèrement la puissance des attaques\nphysiques."
    it: "Strumento da far tenere a un Pokémon.\nFascia che potenzia di poco gli attacchi\nfisici."
    de: "Ein Item zum Tragen.\nDieses Stirnband verstärkt\nphysische Attacken etwas."
    es: "Cinta de pelo que aumenta ligeramente\nla potencia de los movimientos físicos.\nDebe llevarla un Pokémon."
    ko: "힘이 끓어오르는 머리띠.\n지니게 하면 물리 기술의\n위력이 조금 올라간다."
muscle_feather:
  names:
    jp_kana: きんりょくのハネ
    jp_kanji: きんりょくのハネ
    en: Muscle Wing
    fr: Aile Force
    it: Piumpotenza
    de: Kraftfeder
    es: P. Músculo
    ko: 근력날개
  descriptions:
    jp_kana: "ポケモンに　つかう　どうぐ。\nポケモン　１ひきの　こうげきの\nきそポイントを　ちょっと　あげる。"
    jp_kanji: "ポケモンに　使う　道具。\nポケモン　１匹の　攻撃の\n基礎ポイントを　ちょっと　あげる。"
    en: "An item for use on a Pokémon. It\nslightly increases the base Attack stat\nof a single Pokémon."
    fr: "Objet à utiliser sur un Pokémon.\nIl augmente un peu son Attaque\nde base."
    it: "Strumento da usare su un Pokémon.\nNe aumenta di poco l’Attacco di base."
    de: "Schenkt man einem Pokémon dieses\nItem, wird dessen Angriffs-Wert\ndauerhaft erhöht."
    es: "Pluma que aumenta un poco el Ataque\nde un Pokémon al subir de nivel."
    ko: "포켓몬에게 사용하는 도구.\n포켓몬 1마리의 공격\n기초 포인트를 조금 올린다."
mystery_egg:
  names:
    jp_kana: ふしぎなタマゴ
    jp_kanji: ふしぎなタマゴ
    en: Mystery Egg
    fr: Œuf Mystère
    it: Uovo Mistero
    de: Rätsel-Ei
    es: Huevo Mist
    ko: 이상한알
  descriptions:
    jp_kana: "ポケモンじいさんから　あずかった\nふしぎな　もようの　タマゴ。\nなんの　タマゴか　わからない。"
    jp_kanji: "ポケモンじいさんから　あずかった\n不思議な　もようの　タマゴ。\nなんの　タマゴか　わからない。"
    en: "A mysterious Egg obtained from Mr.\nPokémon. What’s in the Egg is unknown."
    fr: "Un œuf étrange confié par M. Pokémon.\nPersonne ne sait ce qu’il contient."
    it: "Uovo dai disegni bizzarri che si riceve\nda Mr. Pokémon. Non si sa che contenga."
    de: "Ein seltsam gemustertes Ei, das\ndu von Mr. Pokémon erhalten hast.\nSein Inhalt liegt im Dunkeln."
    es: "Misterioso Huevo con dibujos\nque obtienes del Sr. Pokémon.\nNadie sabe qué contiene."
    ko: "포켓몬 할아버지로부터 받은\n이상한 모양의 알.\n어떤 알인지 모른다."
mystic_water:
  names:
    jp_kana: しんぴのしずく
    jp_kanji: しんぴのしずく
    en: Mystic Water
    fr: Eau Mystique
    it: Acqua Magica
    de: Zauberwasser
    es: Agua Mística
    ko: 신비의물방울
  descriptions:
    jp_kana: "しずくの　かたちの　ほうせき。\nもたせると　みずタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "しずくの　形の　宝石。\n持たせると　みずタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon.\nIt is a teardrop-shaped gem that ups\nthe power of Water-type moves."
    fr: "Objet à tenir. Gemme en forme de\ngoutte d’eau montant la puissance\ndes capacités de type Eau."
    it: "Strumento da far tenere a un Pokémon.\nGemma a forma di goccia che potenzia\nle mosse di tipo Acqua."
    de: "Ein Item zum Tragen. Ein tränen-\nförmiger Edelstein, der Attacken\nvom Typ Wasser verstärkt."
    es: "Gema con forma de gota de agua que\nfortalece los movimientos de tipo Agua.\nDebe llevarla un Pokémon."
    ko: "물방울 모양의 보석.\n지니게 하면 물타입\n기술의 위력이 올라간다."
nanab_berry:
  names:
    jp_kana: ナナのみ
    jp_kanji: ナナのみ
    en: Nanab Berry
    fr: Baie Nanab
    it: Baccabana
    de: Nanabbeere
    es: Baya Latano
    ko: 나나열매
  descriptions:
    jp_kana: "イッシュちほうでは　とても\nめずらしい　きのみ。\nマニアが　たかく　かってくれる。"
    jp_kanji: "イッシュ地方では　とても\n珍しい　きのみ。\nマニアが　高く　買ってくれる。"
    en: "A Berry which is very rare in the\nUnova region.\nA maniac will buy it for a high price."
    fr: "Baie très rare à Unys.\nLes amateurs en donnent un bon prix."
    it: "Bacca molto rara a Unima.\nSi può vendere a un prezzo piuttosto\nalto agli intenditori."
    de: "Eine Beere, die nur äußerst selten\nin der Einall-Region zu finden ist.\nKenner geben ihr letztes Hemd dafür."
    es: "Una Baya muy rara en la región\nde Teselia. Muy apreciada\npor los gourmets."
    ko: "하나지방에서는 매우\n희귀한 나무열매.\n마니아가 비싼 값에 산다."
nest_ball:
  names:
    jp_kana: ネストボール
    jp_kanji: ネストボール
    en: Nest Ball
    fr: Faiblo Ball
    it: Minor Ball
    de: Nestball
    es: Nido Ball
    ko: 네스트볼
  descriptions:
    jp_kana: "つかまえる　やせいの　ポケモンが\nよわいほど　つかまえやすくなる\nちょっと　かわった　ボール。"
    jp_kanji: "捕まえる　野生の　ポケモンが\n弱いほど　捕まえやすくなる\nちょっと　変わった　ボール。"
    en: "A somewhat different Poké Ball that\nworks especially well on weaker\nPokémon in the wild."
    fr: "Une Poké Ball un peu spéciale qui\nfonctionne particulièrement bien\nsur les Pokémon les plus faibles."
    it: "Poké Ball un po’ diversa. Risulta\nparticolarmente efficace sui Pokémon\nselvatici più deboli."
    de: "Ein Ball, dessen Erfolgsquote\nbesonders bei schwächeren\nPokémon sehr hoch ist."
    es: "Es algo distinta a las demás. Funciona\nespecialmente bien con los Pokémon\nsalvajes de nivel bajo."
    ko: "잡으려는 야생 포켓몬이\n약할수록 잡기 쉬운\n조금 특이한 볼."
net_ball:
  names:
    jp_kana: ネットボール
    jp_kanji: ネットボール
    en: Net Ball
    fr: Filet Ball
    it: Rete Ball
    de: Netzball
    es: Malla Ball
    ko: 넷트볼
  descriptions:
    jp_kana: "みずタイプと　むしタイプの\nポケモンが　つかまえやすくなる\nちょっと　かわった　ボール。"
    jp_kanji: "みずタイプと　むしタイプの\nポケモンが　捕まえやすくなる\nちょっと　変わった　ボール。"
    en: "A somewhat different Poké Ball that\nworks especially well on Water- and\nBug-type Pokémon."
    fr: "Une Poké Ball un peu spéciale qui\nfonctionne particulièrement bien\nsur les Pokémon Eau ou Insecte."
    it: "Poké Ball un po’ diversa. Risulta\nparticolarmente efficace sui Pokémon\ndi tipo Acqua e Coleottero."
    de: "Ein Ball, der sich besonders gut eignet,\num Wasser- und Käfer-Pokémon\nzu fangen."
    es: "Es algo distinta a las demás. Funciona\nespecialmente bien con los Pokémon\nde tipo Agua y Bicho."
    ko: "물타입과 벌레타입의\n포켓몬을 잡기 쉬운\n조금 특이한 볼."
never_melt_ice:
  names:
    jp_kana: とけないこおり
    jp_kanji: とけないこおり
    en: NeverMeltIce
    fr: Glacéternel
    it: Gelomai
    de: Ewiges Eis
    es: Antiderretir
    ko: 녹지않는얼음
  descriptions:
    jp_kana: "ねつを　よせつけない　こおり。\nもたせると　こおりタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "熱を　よせつけない　氷。\n持たせると　こおりタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon.\nIt is a piece of ice that repels heat\nand boosts Ice-type moves."
    fr: "Objet à tenir. Morceau de glace qui\nréfléchit la chaleur et monte la\npuissance des capacités de type Glace."
    it: "Strumento da far tenere a un Pokémon.\nPezzo di ghiaccio che respinge il calore\ne potenzia le mosse di tipo Ghiaccio."
    de: "Ein Item zum Tragen. Ein Stück Eis,\ndas Hitze fernhält und Attacken\nvom Typ Eis verstärkt."
    es: "Fragmento de hielo que repele el calor y\nfortalece los movimientos de tipo Hielo.\nDebe llevarlo un Pokémon."
    ko: "열을 가까이하지 않게 하는 얼음.\n지니게 하면 얼음타입\n기술의 위력이 올라간다."
nomel_berry:
  names:
    jp_kana: ノメルのみ
    jp_kanji: ノメルのみ
    en: Nomel Berry
    fr: Baie Tronci
    it: Baccalemon
    de: Tronzibeere
    es: Baya Monli
    ko: 노멜열매
  descriptions:
    jp_kana: "イッシュちほうでは　とても\nめずらしい　きのみ。\nマニアが　たかく　かってくれる。"
    jp_kanji: "イッシュ地方では　とても\n珍しい　きのみ。\nマニアが　高く　買ってくれる。"
    en: "A Berry which is very rare in the\nUnova region.\nA maniac will buy it for a high price."
    fr: "Baie très rare à Unys.\nLes amateurs en donnent un bon prix."
    it: "Bacca molto rara a Unima.\nSi può vendere a un prezzo piuttosto\nalto agli intenditori."
    de: "Eine Beere, die nur äußerst selten\nin der Einall-Region zu finden ist.\nKenner geben ihr letztes Hemd dafür."
    es: "Una Baya muy rara en la región\nde Teselia. Muy apreciada\npor los gourmets."
    ko: "하나지방에서는 매우\n희귀한 나무열매.\n마니아가 비싼 값에 산다."
normal_gem:
  names:
    jp_kana: ノーマルジュエル
    jp_kanji: ノーマルジュエル
    en: Normal Gem
    fr: Joyau Normal
    it: Bijounormale
    de: Normaljuwel
    es: G. Normal
    ko: 노말주얼
  descriptions:
    jp_kana: "ノーマルの　タイプの　ジュエル。\nもたせると　いちどだけ　ノーマルの\nわざの　いりょくが　つよまる。"
    jp_kanji: "ノーマルの　タイプの　ジュエル。\n持たせると　１度だけ　ノーマルの\n技の　威力が　強まる。"
    en: "A gem with an ordinary essence. When\nheld, it strengthens the power of a\nNormal-type move only once."
    fr: "Objet à tenir. Joyau augmentant\nune fois la puissance des capacités\nde type Normal."
    it: "Strumento da far tenere a un Pokémon.\nGioiello che potenzia una sola volta\nle mosse di tipo Normale."
    de: "Ein Juwel vom Typ Normal. Es\nerhöht einmalig die Stärke\neiner Attacke vom Typ Normal."
    es: "Joya de un solo uso que potencia\nlos movimientos de tipo Normal.\nDebe llevarla un Pokémon."
    ko: "노말타입의 주얼.\n지니게 하면 한 번만 노말\n기술의 위력이 강해진다."
nugget:
  names:
    jp_kana: きんのたま
    jp_kanji: きんのたま
    en: Nugget
    fr: Pépite
    it: Pepita
    de: Nugget
    es: Pepita
    ko: 금구슬
  descriptions:
    jp_kana: "キラキラと　きんいろに　ひかる\nじゅんきん　せいの　たま。\nショップで　たかく　うれる。"
    jp_kanji: "キラキラと　金色に　光る\n純金製の　玉。\nショップで　高く　売れる。"
    en: "A nugget of pure gold that gives off a\nlustrous gleam. It can be sold at a\nhigh price to shops."
    fr: "Pépite d’or pur qui brille\nmagnifiquement. Peut être vendue\nà bon prix aux magasins."
    it: "Pepita d’oro puro dal luccichio\nsfavillante. Si può vendere a un prezzo\npiuttosto alto nei negozi."
    de: "Ein Nugget aus purem Gold, das\neinen schimmernden Glanz besitzt.\nEs ist von großem Wert."
    es: "Pepita de oro puro que desprende\nun brillo espectacular. Puede venderse\nmuy cara en las tiendas."
    ko: "금색으로 반짝반짝 빛나는\n순금으로 만들어진 구슬.\n상점에서 비싸게 팔린다."
oaks_letter:
  names:
    jp_kana: オーキドのてがみ
    jp_kanji: オーキドのてがみ
    en: Oak’s Letter
    fr: Lettre Chen
    it: Lettera Oak
    de: Eichs Brief
    es: Carta Pr Oak
    ko: 오박사의편지
  descriptions:
    jp_kana: "オーキドはかせ　からの　てがみ。\nなかには　２２４ばんどうろに\nきてほしいと　かかれている。"
    jp_kanji: "オーキド博士からの　手紙。\n中には　２２４番道路に\n来てほしいと　書かれている。"
    en: "A letter from Prof. Oak.\nWritten in it is a request for you to\ngo to Rt. 224."
    fr: "Lettre du Prof. Chen vous demandant de\nvous rendre sur la Route 224."
    it: "Lettera da parte del Prof. Oak con\nla richiesta di dirigerti verso\nil Percorso 224."
    de: "Ein Brief von Prof. Eich. Er bittet dich,\nzur Route 224 zu gehen."
    es: "Carta del Profesor Oak en la que se\nte pide que vayas a la Ruta 224."
    ko: "오박사의 편지다.\n안에는 224번도로로\n와달라고 적혀 있다."
occa_berry:
  names:
    jp_kana: オッカのみ
    jp_kanji: オッカのみ
    en: Occa Berry
    fr: Baie Chocco
    it: Baccacao
    de: Koakobeere
    es: Baya Caoca
    ko: 오카열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　ほのお　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　ほのお技を\n受けたとき　威力が　弱まる。"
    en: "Weakens a supereffective Fire-type\nattack against the holding Pokémon."
    fr: "Tenue, cette Baie affaiblit une attaque\nennemie super efficace de type Feu."
    it: "Se tenuta da un Pokémon, indebolisce\nl’attacco superefficace di tipo Fuoco\ndel nemico."
    de: "Als getragenes Item schwächt diese\nBeere besonders effektive Attacken\ndes Angreifers vom Typ Feuer."
    es: "Si la lleva un Pokémon, debilita un\nataque supereficaz de tipo Fuego\nde un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 뛰어난 불꽃 기술을\n당했을 때 위력이 약해진다."
odd_incense:
  names:
    jp_kana: あやしいおこう
    jp_kanji: あやしいおこう
    en: Odd Incense
    fr: Bizar.Encens
    it: Bizzoaroma
    de: Schrägrauch
    es: Incie. Raro
    ko: 괴상한향로
  descriptions:
    jp_kana: "ふしぎな　かおりの　おこう。\nもたせると　エスパータイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "不思議な　香りの　御香。\n持たせると　エスパータイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon. It is\nan exotic-smelling incense that boosts\nthe power of Psychic-type moves."
    fr: "Objet à tenir. Encens au parfum\nexotique augmentant la puissance\ndes capacités de type Psy."
    it: "Strumento da far tenere a un Pokémon.\nIncenso dal profumo esotico che\npotenzia le mosse di tipo Psico."
    de: "Ein Item zum Tragen. Dieses\nexotische Duftkraut verstärkt\nAttacken vom Typ Psycho."
    es: "Incienso de exótico aroma que fortalece\nlos movimientos de tipo Psíquico.\nDebe llevarlo un Pokémon."
    ko: "이상한 향기의 향로.\n지니게 하면 에스퍼타입\n기술의 위력이 올라간다."
odd_keystone:
  names:
    jp_kana: かなめいし
    jp_kanji: かなめいし
    en: Odd Keystone
    fr: Clé de Voûte
    it: Roccianima
    de: Spiritkern
    es: P. Espíritu
    ko: 쐐기돌
  descriptions:
    jp_kana: "これがないと　いしのとうが\nくずれてしまう　だいじないし。\nときどき　いしから　こえがきこえる。"
    jp_kanji: "これがないと　石の塔が\n崩れてしまう　大事な石。\nときどき　石から　声が聞こえる。"
    en: "A vital item that is needed to keep a\nstone tower from collapsing. Voices\ncan be heard from it occasionally."
    fr: "Objet très important qui empêche une\ntour en pierre de s’écrouler. Des\nbruits de voix en sortent parfois."
    it: "Strumento importante che impedisce\nil crollo di un pozzo di pietra. A volte\ndal suo interno provengono delle voci."
    de: "Ein wichtiges Item, mit dem\nein Steinturm repariert werden\nkann."
    es: "Vital para impedir que una torre de\npiedra se derrumbe. A veces se\noyen voces en su interior."
    ko: "이것이 없으면 돌탑이\n무너져버리는 중요한 돌.\n가끔 돌에서 목소리가 들린다."
old_amber:
  names:
    jp_kana: ひみつのコハク
    jp_kanji: ひみつのコハク
    en: Old Amber
    fr: Vieil Ambre
    it: Ambra Antica
    de: Altbernstein
    es: Ámbar Viejo
    ko: 비밀의호박
  descriptions:
    jp_kana: "こだい　ポケモンの　いでんしが\nとじこめられている　コハク。\nあかみを　おびて　すけている。"
    jp_kanji: "古代ポケモンの　遺伝子が\n閉じこめられている　コハク。\n赤みを　帯びて　透けている。"
    en: "A piece of amber that contains the\ngenetic material of an ancient Pokémon.\nIt is clear with a reddish tint."
    fr: "Un morceau d’ambre contenant\nl’ADN d’un ancien Pokémon. Il\nest de couleur jaune."
    it: "Pezzo di ambra che contiene il materiale\ngenetico di un Pokémon antico. È chiaro\ne di colore giallastro."
    de: "Ein Stück Bernstein, in dem die Gene\neines uralten Pokémon enthalten\nsind. Es ist durchsichtig!"
    es: "Fragmento de ámbar que contiene\ninformación genética de un Pokémon\nancestral. Es de color amarillo."
    ko: "고대 포켓몬의 유전자가\n갇혀 있는 호박.\n붉은 기가 돌면서 약간 투명하다."
old_charm:
  names:
    jp_kana: こだいのおまもり
    jp_kanji: こだいのおまもり
    en: Old Charm
    fr: Vieux Grigri
    it: Arcamuleto
    de: Talisman
    es: Talismán
    ko: 고대의부적
  descriptions:
    jp_kana: "カンナギタウンの　ちょうろうに\nとどける　おおむかしの　おまもり。\nポケモンの　ホネで　つくられている。"
    jp_kanji: "カンナギタウンの　長老に\n届ける　大昔の　おまもり。\nポケモンの　ホネで　つくられている。"
    en: "An ancient good-luck charm made of\nPokémon bones to be taken to the elder\nof Celestic Town."
    fr: "Un ancien porte-bonheur fait d’os de\nPokémon à porter à la doyenne de\nCélestia."
    it: "Antico portafortuna fatto di ossa\ndi Pokémon da portare all’anziana\ndi Memoride."
    de: "Ein antiker Glücksbringer. Soll der\nÄltesten in Elyses überbracht werden."
    es: "Está hecho con huesos de Pokémon y\ntrae buena suerte. Hay que llevarlo a\nla anciana de Pueblo Caelestis."
    ko: "봉신마을의 장로에게\n전해줄 오랜 옛날의 부적.\n포켓몬의 뼈로 만들어졌다."
old_gateau:
  names:
    jp_kana: もりのヨウカン
    jp_kanji: もりのヨウカン
    en: Old Gateau
    fr: Vieux Gâteau
    it: Dolce Gateau
    de: Spezialität
    es: Barrita Plus
    ko: 숲의양갱
  descriptions:
    jp_kana: "ハクタイの　かくれた　めいぶつ。\nポケモン　１ひきの　じょうたいの\nいじょうを　すべて　かいふくする。"
    jp_kanji: "ハクタイの　隠れた　名物。\nポケモン　１匹の　状態の\n異常を　すべて　回復する。"
    en: "Old Chateau’s hidden specialty.\nIt heals all the status problems of a\nsingle Pokémon."
    fr: "Spécialité du Vieux Château. Il\nsoigne tous les problèmes de\nstatut d’un Pokémon."
    it: "Specialità segreta dell’Antico Château.\nCura tutti i problemi di stato di\nun Pokémon."
    de: "Eine unbekannte Spezialität.\nSie behebt alle Statusprobleme\neines Pokémon."
    es: "Especialidad de la Vieja Mansión.\nCura todos los problemas de estado\nde un Pokémon."
    ko: "영원시티의 숨은 명물.\n포켓몬 1마리의\n상태 이상을 모두 회복한다."
old_rod:
  names:
    jp_kana: ボロのつりざお
    jp_kanji: ボロのつりざお
    en: Old Rod
    fr: Canne
    it: Amo Vecchio
    de: Angel
    es: Caña Vieja
    ko: 낡은낚싯대
  descriptions:
    jp_kana: "ふるくて　ボロい　つりざお。\nみずの　ある　ばしょで　つかうと\nポケモンが　つれる。"
    jp_kanji: "ふるくて　ボロい　つりざお。\n水の　ある　場所で　使うと\nポケモンが　つれる。"
    en: "An old and beat-up fishing rod.\nUse it by any body of water to fish for\nwild aquatic Pokémon."
    fr: "Une vieille canne usée. Utilisez-la pour\npêcher des Pokémon sauvages dans\nles points d’eau."
    it: "Amo vecchio e rovinato. Si usa per\npescare Pokémon selvatici in qualsiasi\nspecchio d’acqua."
    de: "Eine alte, abgenutzte Angel. Damit\nkannst du in jedem Gewässer nach\nPokémon angeln."
    es: "Caña de pescar bastante usada y\ndesgastada. Pesca Pokémon salvajes\nen todo tipo de aguas."
    ko: "낡고 조잡한 낚싯대.\n물이 있는 장소에서 사용하면\n포켓몬을 낚을 수 있다."
oran_berry:
  names:
    jp_kana: オレンのみ
    jp_kanji: オレンのみ
    en: Oran Berry
    fr: Baie Oran
    it: Baccarancia
    de: Sinelbeere
    es: Baya Aranja
    ko: 오랭열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nＨＰを　１０だけ　かいふくする。"
    jp_kanji: "ポケモンに　持たせると\nＨＰを　１０だけ　回復する。"
    en: "If held by a Pokémon,\nit heals the user by just 10 HP."
    fr: "Baie qui restaure 10 PV lorsqu’elle\nest tenue par un Pokémon."
    it: "Se tenuta da un Pokémon gli restituisce\n10 PS."
    de: "Gibst du die Beere einem Pokémon\nzum Tragen, füllt sie seine KP\num 10 Punkte auf."
    es: "Los Pokémon pueden llevarla o usarla\npara restaurar 10 PS."
    ko: "포켓몬에게 지니게 하면\nHP를 10만큼 회복한다."
oval_charm:
  names:
    jp_kana: まるいおまもり
    jp_kanji: まるいおまもり
    en: Oval Charm
    fr: Charme Ovale
    it: Ovamuleto
    de: Ovalpin
    es: Amuleto Oval
    ko: 둥근부적
  descriptions:
    jp_kana: "もっていると　そだてやさんで\nタマゴが　みつかりやすくなる\nふしぎで　とてもまるい　おまもり。"
    jp_kanji: "持っていると　育て屋さんで\nタマゴが　みつかりやすくなる\n不思議で　とてもまるい　おまもり。"
    en: "An oval charm said to increase the\nchance of Eggs being found\nat the Day Care."
    fr: "Un mystérieux charme rond qui permet\nde trouver plus facilement des Œufs\nà la Pension Pokémon."
    it: "Misterioso amuleto di forma sferica che\naumenta la probabilità di trovare Uova\nnella Pensione Pokémon."
    de: "Ein mysteriöser, ovaler Glücksbringer,\nder die Wahrscheinlichkeit erhöht, in\nder Pension Eier zu finden."
    es: "Misterioso amuleto redondo que aumenta\nla posibilidad de encontrar Huevos en la\nGuardería Pokémon."
    ko: "지니고 있으면 키우미집에서\n알을 발견하기 쉬워지는\n이상하고 매우 둥근 부적."
oval_stone:
  names:
    jp_kana: まんまるいし
    jp_kanji: まんまるいし
    en: Oval Stone
    fr: Pierre Ovale
    it: Pietraovale
    de: Ovaler Stein
    es: Piedra Oval
    ko: 동글동글돌
  descriptions:
    jp_kana: "ある　とくていの　ポケモンを\nしんかさせる　ふしぎな　いし。\nたまのように　まるい。"
    jp_kanji: "ある　特定の　ポケモンを\n進化させる　不思議な　石。\nたまのように　まるい。"
    en: "A peculiar stone that makes certain\nspecies of Pokémon evolve.\nIt is shaped like an egg."
    fr: "Pierre étrange qui fait évoluer\ncertaines espèces de Pokémon.\nElle a la forme d’un œuf."
    it: "Pietra particolare che fa evolvere\ndeterminate specie di Pokémon.\nÈ a forma di uovo."
    de: "Dieser besondere, eiförmige Stein\nhilft manchen Pokémon bei\nihrer Evolution."
    es: "Una piedra peculiar que hace\nevolucionar a algunos Pokémon.\nTiene forma de huevo."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 돌.\n구슬처럼 둥글다."
pal_pad:
  names:
    jp_kana: ともだちてちょう
    jp_kanji: ともだちてちょう
    en: Pal Pad
    fr: Registre Ami
    it: Blocco Amici
    de: Adressbuch
    es: Bloc amigos
    ko: 친구수첩
  descriptions:
    jp_kana: "ともだちを　とうろくしたり\nあそんだ　ことを　きろくする\nべんりな　てちょう。"
    jp_kanji: "友達を　登録したり\n遊んだことを　記録する\n便利な　手帳。"
    en: "A convenient notepad that is used for\nregistering your friends, Friend Codes,\nand keeping a record of game play."
    fr: "Un carnet bien pratique pour\nenregistrer vos amis, les codes\nami et des données de jeu."
    it: "Blocco appunti utile per registrare gli\namici, il loro codice amico e per tenere\nun resoconto dell’esperienza di gioco."
    de: "In diesem praktischen Buch\nkannst du die Freundescodes\ndeiner Freunde aufbewahren."
    es: "Un cuaderno muy práctico en el que\npuedes registrar amigos, claves\nde amigo, etc."
    ko: "친구를 등록하거나\n친구와 놀았던 기록을 관리하는\n편리한 수첩."
pamtre_berry:
  names:
    jp_kana: シーヤのみ
    jp_kanji: シーヤのみ
    en: Pamtre Berry
    fr: Baie Palma
    it: Baccapalma
    de: Pallmbeere
    es: Baya Plama
    ko: 자야열매
  descriptions:
    jp_kana: "イッシュちほうでは　とても\nめずらしい　きのみ。\nマニアが　たかく　かってくれる。"
    jp_kanji: "イッシュ地方では　とても\n珍しい　きのみ。\nマニアが　高く　買ってくれる。"
    en: "A Berry which is very rare in the\nUnova region.\nA maniac will buy it for a high price."
    fr: "Baie très rare à Unys.\nLes amateurs en donnent un bon prix."
    it: "Bacca molto rara a Unima.\nSi può vendere a un prezzo piuttosto\nalto agli intenditori."
    de: "Eine Beere, die nur äußerst selten\nin der Einall-Region zu finden ist.\nKenner geben ihr letztes Hemd dafür."
    es: "Una Baya muy rara en la región\nde Teselia. Muy apreciada\npor los gourmets."
    ko: "하나지방에서는 매우\n희귀한 나무열매.\n마니아가 비싼 값에 산다."
paralyze_heal:
  names:
    jp_kana: まひなおし
    jp_kanji: まひなおし
    en: Parlyz Heal
    fr: Anti-Para
    it: Antiparalisi
    de: Para-Heiler
    es: Antiparaliz
    ko: 마비치료제
  descriptions:
    jp_kana: "スプレーしきの　くすり。\nポケモン　１ひきの　まひの\nじょうたいを　かいふくする。"
    jp_kanji: "スプレー式の　薬。\nポケモン　１匹の　まひの\n状態を　回復する。"
    en: "A spray-type medicine.\nIt eliminates paralysis from a single\nPokémon."
    fr: "Un médicament sous forme de spray.\nSoigne un Pokémon de la paralysie."
    it: "Rimedio spray.\nCura un Pokémon dalla paralisi."
    de: "Ein Spray, das ein Pokémon\nvon Paralyse heilt."
    es: "Medicina en espray que cura\nun Pokémon paralizado."
    ko: "스프레이식의 약.\n포켓몬 1마리의\n마비 상태를 회복한다."
parcel:sinnoh:
  names:
    jp_kana: おとどけもの
    jp_kanji: おとどけもの
    en: Parcel
    fr: Colis
    it: Pacco
    de: Paket
    es: Paquete
    ko: 전해줄물건
  descriptions:
    jp_kana: "フタバタウンから　たびだった\nおさななじみに　わたすように\nたのまれた　おとどけもの。"
    jp_kanji: "フタバタウンから　旅立った\n幼なじみに　渡すように\n頼まれた　おとどけもの。"
    en: "A parcel entrusted in your care.\nYou are supposed to deliver it to your\nchildhood friend who left Twinleaf Town."
    fr: "Paquet qu’on vous a confié. Vous devez\nle remettre à votre ami d’enfance qui a\nquitté Bonaugure."
    it: "Pacchetto che ti è stato affidato\nper essere consegnato al tuo amico\nd’infanzia cha ha lasciato Duefoglie."
    de: "Ein Paket, das dir anvertraut wurde.\nDu sollst es deinem besten Freund\ngeben, der Zweiblattdorf verließ."
    es: "Paquete encomendado a tu cuidado que\ntienes que entregar a tu amigo de la\ninfancia que dejó Pueblo Hojaverde."
    ko: "떡잎마을에서 여행을 떠난\n소꿉친구에게 건네주도록\n부탁받은 물건."
park_ball:
  names:
    jp_kana: パークボール
    jp_kanji: パークボール
    en: Park Ball
    fr: Parc Ball
    it: Parco Ball
    de: Parkball
    es: Parque Ball
    ko: 파크볼
  descriptions:
    jp_kana: "パルパークの　なかで\nつかう　とくべつな　ボール。"
    jp_kanji: "パルパークの　なかで\n使う　特別な　ボール。"
    en: A special Poké Ball for the Pal Park.
    fr: "Une Poké Ball spéciale utilisée au\nParc des Amis."
    it: "Poké Ball speciale utilizzata solo\nall’interno del Parco Amici."
    de: "Ein Ball, der nur im Park der Freunde\neingesetzt wird."
    es: "Poké Ball que se utiliza dentro del\nParque Compi."
    ko: "팔파크 내에서\n사용하는 특별한 볼."
pass:
  names:
    jp_kana: リニアパス
    jp_kanji: リニアパス
    en: Pass
    fr: Passe Train
    it: Superpass
    de: Fahrschein
    es: Magnetopase
    ko: 리니어패스
  descriptions:
    jp_kana: "リニアカーに　のるときに　ひつような\nチケット。　いつでも　のりほうだい。"
    jp_kanji: "リニアカーに　乗るときに　必要な\nチケット。　いつでも　乗り放題。"
    en: "A ticket required for riding the Magnet\nTrain. It allows you to ride whenever\nand however much you’d like."
    fr: "Un ticket nécessaire pour monter\nà bord du Train Magnétique.\nUtilisable à volonté."
    it: "Biglietto necessario per viaggiare\nsul supertreno. Utilizzabile a volontà."
    de: "Eine Fahrkarte, die einem die\nReise mit dem Magnetzug ermöglicht.\nGilt für beliebig viele Fahrten."
    es: "Billete necesario para poder montar\ntodas las veces que se desee en\nel Magnetotrén."
    ko: "리니어 카를 탈 때 필요한\n티켓. 언제든지 무제한으로 이용 가능."
pass_orb:
  names:
    jp_kana: デルダマ
    jp_kanji: デルダマ
    en: Pass Orb
    fr: Offrisphère
    it: Passabilia
    de: Transferorb
    es: Regalosfera
    ko: 딜구슬
  descriptions:
    jp_kana: "デルパワーを　はっせいさせる\nときにつかう　イッシュの　パワーが\nとじこめられた　ふしぎな　たま。"
    jp_kanji: "デルパワーを　発生させる\nときに使う　イッシュの　パワーが\nとじこめられた　不思議な　玉。"
    en: "A mysterious orb containing the power\nof the Unova region, to be used when\ngenerating Pass Power."
    fr: "Sphère mystérieuse contenant\nl’Aura d’Unys et utilisable\navec l’Offri-Aura."
    it: "Bilia misteriosa che racchiude l’energia\ndi Unima ed è in grado di lanciare\nil Passapotere."
    de: "Ein mysteriöser Orb, der die Kraft\nder Einall-Region enthält und zur\nErzeugung von Transferkraft dient."
    es: "Bola misteriosa que contiene el poder\nde la región de Teselia y se utiliza para\ngenerar Poderes Regalo."
    ko: "딜파워를 발생시킬 때\n사용하는 하나지방의 파워가\n담긴 이상한 구슬."
passho_berry:
  names:
    jp_kana: イトケのみ
    jp_kanji: イトケのみ
    en: Passho Berry
    fr: Baie Pocpoc
    it: Baccapasflo
    de: Foepasbeere
    es: Baya Pasio
    ko: 꼬시개열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　みず　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　みず技を\n受けたとき　威力が　弱まる。"
    en: "Weakens a supereffective Water-type\nattack against the holding Pokémon."
    fr: "Tenue, cette Baie affaiblit une attaque\nennemie super efficace de type Eau."
    it: "Se tenuta da un Pokémon, indebolisce\nl’attacco superefficace di tipo Acqua\ndel nemico."
    de: "Als getragenes Item schwächt diese\nBeere besonders effektive Attacken\ndes Angreifers vom Typ Wasser."
    es: "Si la lleva un Pokémon, debilita un\nataque supereficaz de tipo Agua\nde un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 뛰어난 물 기술을\n당했을 때 위력이 약해진다."
payapa_berry:
  names:
    jp_kana: ウタンのみ
    jp_kanji: ウタンのみ
    en: Payapa Berry
    fr: Baie Yapap
    it: Baccapayapa
    de: Pyapabeere
    es: Baya Payapa
    ko: 야파열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　エスパー　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　エスパー技を\n受けたとき　威力が　弱まる。"
    en: "Weakens a supereffective Psychic-type\nattack against the holding Pokémon."
    fr: "Tenue, cette Baie affaiblit une attaque\nennemie super efficace de type Psy."
    it: "Se tenuta da un Pokémon, indebolisce\nl’attacco superefficace di tipo Psico\ndel nemico."
    de: "Als getragenes Item schwächt diese\nBeere besonders effektive Attacken\ndes Angreifers vom Typ Psycho."
    es: "Si la lleva un Pokémon, debilita un\nataque supereficaz de tipo Psíquico\nde un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 뛰어난 에스퍼 기술을\n당했을 때 위력이 약해진다."
pearl:
  names:
    jp_kana: しんじゅ
    jp_kanji: しんじゅ
    en: Pearl
    fr: Perle
    it: Perla
    de: Perle
    es: Perla
    ko: 진주
  descriptions:
    jp_kana: "きれいな　ぎんいろに　ひかる\nすこし　ちいさめの　しんじゅ。\nショップで　やすく　うれる。"
    jp_kanji: "きれいな　銀色に　光る\n少し　ちいさめの　真珠。\nショップで　安く　売れる。"
    en: "A somewhat-small pearl that sparkles\nin a pretty silver color.\nIt can be sold cheaply to shops."
    fr: "Une petite perle qui brille d’une jolie\ncouleur argent. Peut être vendue\nà bas prix aux magasins."
    it: "Perla piuttosto piccola dai graziosi\nriflessi argentei. Si può vendere\na un prezzo piuttosto basso nei negozi."
    de: "Eine relativ kleine Perle, die in\nschönem Silber funkelt. Sie ist\nvon geringem Wert."
    es: "Brillante perla pequeña y plateada\nque no alcanza un buen precio en\nlas tiendas."
    ko: "예쁜 은색으로 빛나는\n자그마한 진주.\n상점에서 싸게 팔린다."
pearl_string:
  names:
    jp_kana: おだんごしんじゅ
    jp_kanji: おだんごしんじゅ
    en: Pearl String
    fr: Perle Triple
    it: Trittiperla
    de: Triperle
    es: Sarta Perlas
    ko: 경단진주
  descriptions:
    jp_kana: "きれいな　ぎんいろに　ひかる\nとても　おおつぶの　しんじゅ。\nマニアが　たかく　かってくれる。"
    jp_kanji: "きれいな　銀色に　光る\nとても　大粒の　真珠。\nマニアが　高く　買ってくれる。"
    en: "Very large pearls that sparkle in a\npretty silver color.\nA maniac will buy them for a high price."
    fr: "Une très grosse perle qui brille\nd’une jolie couleur argent.\nLes amateurs en donnent un bon prix."
    it: "Grossa perla dai riflessi argentei.\nSi può vendere a un prezzo piuttosto\nalto agli intenditori."
    de: "Eine sehr große Perle mit einem\nwunderschönen, silbernen Glanz.\nSammler geben ihr letztes Hemd dafür."
    es: "Brillantes perlas plateadas de gran\ntamaño. Muy valoradas por los\ncoleccionistas."
    ko: "예쁜 은색으로 빛나는\n매우 큰 낱알의 진주.\n마니아가 비싼 값에 산다."
pecha_berry:
  names:
    jp_kana: モモンのみ
    jp_kanji: モモンのみ
    en: Pecha Berry
    fr: Baie Pêcha
    it: Baccapesca
    de: Pirsifbeere
    es: Baya Meloc
    ko: 복슝열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nどくを　かいふくする。"
    jp_kanji: "ポケモンに　持たせると\n毒を　回復する。"
    en: "If held by a Pokémon,\nit recovers from poison."
    fr: "Baie qui soigne l’empoisonnement\nlorsqu’elle est tenue par un Pokémon."
    it: "Se tenuta da un Pokémon, lo guarisce\ndall’avvelenamento."
    de: "Gibst du die Beere einem Pokémon zum\nTragen, heilt diese es von Vergiftung."
    es: "Los Pokémon pueden llevarla o usarla\npara curarse del envenenamiento."
    ko: "포켓몬에게 지니게 하면\n독을 회복한다."
permit:
  names:
    jp_kana: きょかしょう
    jp_kanji: きょかしょう
    en: Permit
    fr: Permis
    it: Permesso
    de: Genehmigung
    es: Pase
    ko: 허가증
  descriptions:
    jp_kana: "わずかな　ひとしか　しらない\nしぜんほごくに　はいるために\nひつような　ライセンスカード。"
    jp_kanji: "わずかな　人しか　知らない\n自然保護区に　入るために\n必要な　ライセンスカード。"
    en: "A permit needed\nto enter the Nature Preserve.\nOnly a few know about this place."
    fr: "Un permis nécessaire pour pénétrer\ndans la Réserve Naturelle, lieu\nprotégé des foules modernes."
    it: "Tessera che permette di accedere a una\nRiserva Naturale conosciuta da pochi."
    de: "Eine Genehmigung in Form einer Karte,\ndie den Zutritt ins Naturschutzgebiet\nermöglicht. Nur Wenige kennen den Ort."
    es: "Permiso necesario para acceder a\nla Reserva Natural, lugar que solo\nunos pocos conocen."
    ko: "소수의 사람밖에 모르는\n자연보호구역에 들어가기 위해\n필요한 라이선스 카드."
persim_berry:
  names:
    jp_kana: キーのみ
    jp_kanji: キーのみ
    en: Persim Berry
    fr: Baie Kika
    it: Baccaki
    de: Persimbeere
    es: Baya Caquic
    ko: 시몬열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこんらんを　かいふくする。"
    jp_kanji: "ポケモンに　持たせると\n混乱を　回復する。"
    en: "If held by a Pokémon,\nit recovers from confusion."
    fr: "Baie qui soigne la confusion lorsqu’elle\nest tenue par un Pokémon."
    it: "Se tenuta da un Pokémon, lo libera\ndalla confusione."
    de: "Gibst du die Beere einem Pokémon zum\nTragen, heilt diese es von Verwirrung."
    es: "Los Pokémon pueden llevarla o usarla\npara librarse de la confusión."
    ko: "포켓몬에게 지니게 하면\n혼란을 회복한다."
petaya_berry:
  names:
    jp_kana: ヤタピのみ
    jp_kanji: ヤタピのみ
    en: Petaya Berry
    fr: Baie Pitaye
    it: Baccapitaya
    de: Tahaybeere
    es: Baya Yapati
    ko: 야타비열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nピンチのとき　じぶんの\nとくこうが　あがる。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　自分の\n特攻が　あがる。"
    en: "If held by a Pokémon, it raises its\nSp. Atk stat in a pinch."
    fr: "Tenue, cette Baie monte l’Atq. Spé.\nen cas de besoin."
    it: "Aumenta l’Attacco Speciale, se\nil Pokémon che la tiene si trova\nin difficoltà."
    de: "Als getragenes Item erhöht diese Beere\nden Spezial-Angriff eines Pokémon,\nsobald es in einer Notlage steckt."
    es: "Si la lleva un Pokémon, le sube\nel Ataque Especial en un momento\nde apuro."
    ko: "포켓몬에게 지니게 하면\n위급할 때 자신의\n특수공격이 올라간다."
photo_album:
  names:
    jp_kana: フォトアルバム
    jp_kanji: フォトアルバム
    en: Photo Album
    fr: Album Photo
    it: Album
    de: Fotoalbum
    es: Álbum
    ko: 포토앨범
  descriptions:
    jp_kana: "ぼうけんちゅうに　さつえいした\nきねんしゃしんを　かざる　アルバム。"
    jp_kanji: "冒険中に　撮影した\n記念写真を　飾る　アルバム。"
    en: "A nice photo album for storing all the\nphotos taken along your adventure."
    fr: "Un album décoré de photos souvenir\nprises pendant le voyage."
    it: "Album dove si possono sistemare le foto\nscattate durante quest’avventura."
    de: "Ein Album, in dem du Erinnerungsfotos\naufbewahren kannst, die du auf\ndeinen Reisen geschossen hast."
    es: "Álbum que recoge las fotos que se toman\na lo largo de la aventura."
    ko: "모험 중에 촬영한\n기념사진을 보관하는 앨범."
pinap_berry:
  names:
    jp_kana: パイルのみ
    jp_kanji: パイルのみ
    en: Pinap Berry
    fr: Baie Nanana
    it: Baccananas
    de: Sananabeere
    es: Baya Pinia
    ko: 파인열매
  descriptions:
    jp_kana: "イッシュちほうでは　とても\nめずらしい　きのみ。\nマニアが　たかく　かってくれる。"
    jp_kanji: "イッシュ地方では　とても\n珍しい　きのみ。\nマニアが　高く　買ってくれる。"
    en: "A Berry which is very rare in the\nUnova region.\nA maniac will buy it for a high price."
    fr: "Baie très rare à Unys.\nLes amateurs en donnent un bon prix."
    it: "Bacca molto rara a Unima.\nSi può vendere a un prezzo piuttosto\nalto agli intenditori."
    de: "Eine Beere, die nur äußerst selten\nin der Einall-Region zu finden ist.\nKenner geben ihr letztes Hemd dafür."
    es: "Una Baya muy rara en la región\nde Teselia. Muy apreciada\npor los gourmets."
    ko: "하나지방에서는 매우\n희귀한 나무열매.\n마니아가 비싼 값에 산다."
pink_apricorn:
  names:
    jp_kana: ももぼんぐり
    jp_kanji: ももぼんぐり
    en: Pnk Apricorn
    fr: Noigrume Ros
    it: Ghic. Rosa
    de: Aprikoko Pnk
    es: Bonguri Ros
    ko: 담홍규토리
  descriptions:
    jp_kana: "ももいろの　ぼんぐり。\nあまそうな　いい　においがする。"
    jp_kanji: "ももいろの　ぼんぐり。\nあまそうな　いい　においがする。"
    en: "A pink Apricorn.\nIt has a nice, sweet scent."
    fr: "Un Noigrume de couleur rose.\nIl dégage un arôme sucré."
    it: "Una Ghicocca di colore rosa.\nEmana un profumo dolce."
    de: "Eine pinkfarbene Aprikoko. Sie duftet\nsüß und appetitanregend."
    es: Bonguri de color rosa y aroma dulce.
    ko: "담홍색의 규토리.\n달콤한 듯한 좋은 향기가 난다."
pink_scarf:
  names:
    jp_kana: ピンクのバンダナ
    jp_kanji: ピンクのバンダナ
    en: Pink Scarf
    fr: Foul. Rose
    it: Fascia Rosa
    de: Rosa Schal
    es: Pañuelo Rosa
    ko: 분홍밴드
  descriptions:
    jp_kana: "もたせて　コンテストに　さんかすると\nその　ポケモンは　いつもより\nかわいく　みられる。"
    jp_kanji: "持たせて　コンテストに　参加すると\nその　ポケモンは　いつもより\nかわいく　みられる。"
    en: "An item to be held by a Pokémon.\nIt boosts the Cute aspect of the\nholder in a Contest."
    fr: "Objet à tenir. Augmente la Grâce\nd’un Pokémon dans les Concours."
    it: "Strumento da far tenere a un Pokémon.\nAumenta la “Grazia” di chi lo tiene\nin una Gara."
    de: "Ein Item zum Tragen. Trainer erhöhen\ndamit in Wettbewerben die „Anmut“\nihres Pokémon."
    es: "Debe llevarlo un Pokémon.\nAumenta la dulzura en los concursos."
    ko: "지니게 하여 콘테스트에 참가하면\n그 포켓몬은 여느 때보다\n귀엽게 보인다."
plasma_card:
  names:
    jp_kana: プラズマカード
    jp_kanji: プラズマカード
    en: Plasma Card
    fr: Carte Plasma
    it: Carta Plasma
    de: Plasmakarte
    es: Tarj. Plasma
    ko: 플라스마카드
  descriptions:
    jp_kana: "プラズマフリゲートの　せんないで\nパスワードを　にゅうりょくするときに\nひつようとなる　カードキー。"
    jp_kanji: "プラズマフリゲートの　船内で\nパスワードを　入力するときに\n必要となる　カードキー。"
    en: "A card key needed to enter the\npassword inside the\nPlasma Frigate."
    fr: "Une clé magnétique indispensable\npour entrer le mot de passe\nsur la Frégate Plasma."
    it: "Carta magnetica necessaria per inserire\nla password sulla Fregata Plasma."
    de: "Ein Kartenschlüssel, der bei der\nEingabe des Passworts an Bord der\nPlasma-Fregatte benötigt wird."
    es: "Tarjeta necesaria para introducir\nla contraseña en la Fragata Plasma."
    ko: "플라스마 프리깃 배 안에서\n패스워드를 입력할 때\n필요한 카드키."
plume_fossil:
  names:
    jp_kana: はねのカセキ
    jp_kanji: はねのカセキ
    en: Plume Fossil
    fr: Foss. Plume
    it: Fossilpiuma
    de: Federfossil
    es: Fósil Pluma
    ko: 날개화석
  descriptions:
    jp_kana: "とりポケモンの　そせんと　いわれる\nこだい　ポケモンの　カセキ。\nつばさの　いちぶ　らしい。"
    jp_kanji: "とりポケモンの　祖先と　いわれる\n古代ポケモンの　カセキ。\nつばさの　一部らしい。"
    en: "A fossil of an ancient Pokémon that\nflew in the sky in ancient times.\nIt appears to be part of its wing."
    fr: "Fossile d’un ancien Pokémon\nvolant. Il semble que ce soit\nun morceau d’aile."
    it: "Fossile di un Pokémon preistorico che\nsolcava i cieli. Sembra essere parte\ndella sua ala."
    de: "Das Fossil eines uralten Pokémon, von\ndem man annimmt, dass es der Urahn der\nVogel-Pokémon sei. Ein Teil des Flügels."
    es: "Fósil de un Pokémon ancestral que\nsurcó los cielos. Parece ser parte\nde un ala suya."
    ko: "새포켓몬의 조상이라 불리는\n고대 포켓몬의 화석.\n날개의 일부인 듯하다."
poffin_case:
  names:
    jp_kana: ポフィンケース
    jp_kanji: ポフィンケース
    en: Poffin Case
    fr: Boîte Poffin
    it: Portapoffin
    de: Knurspbox
    es: Pokochera
    ko: 포핀케이스
  descriptions:
    jp_kana: "おりょうりで　つくった　ポフィンを\nほぞんする　いれもの。"
    jp_kanji: "お料理で　つくった　ポフィンを\n保存する　いれもの。"
    en: "A case for storing Poffin cooked from\nBerries."
    fr: "Boîte pour ranger les Poffins faits\nà partir de Baies."
    it: "Contenitore per conservare i Poffin\ncucinati con le Bacche."
    de: Eine Box für leckere Knurspe.
    es: "Caja en la que se transportan los\nPokochos elaborados con Bayas."
    ko: "요리로 만든 포핀을\n보존하는 용기."
point_card:
  names:
    jp_kana: ポイントカード
    jp_kanji: ポイントカード
    en: Point Card
    fr: Carte Points
    it: Scheda Punti
    de: Punktekarte
    es: Tarj. Puntos
    ko: 포인트카드
  descriptions:
    jp_kana: "かちとった　バトルポイントの　かずを\nみることが　できる　カード。"
    jp_kanji: "勝ち取った　バトルポイントの　数を\nみることが　できる　カード。"
    en: "A card that lists the Battle Points\nyou have earned."
    fr: "Carte indiquant le nombre de Points\nde Combat obtenus."
    it: "Scheda che elenca i Punti Lotta che hai\nottenuto."
    de: "Auf dieser Karte werden deine bisher\ngesammelten Gewinnpunkte festgehalten."
    es: "Una tarjeta en la que se registran los\nPuntos de Batalla que has ganado."
    ko: "이겨서 받은 배틀포인트 수를\n볼 수 있는 카드."
poison_barb:
  names:
    jp_kana: どくバリ
    jp_kanji: どくバリ
    en: Poison Barb
    fr: Pic Venin
    it: Velenaculeo
    de: Giftstich
    es: Flecha Ven.
    ko: 독바늘
  descriptions:
    jp_kana: "どくのある　ちいさな　ハリ。\nもたせると　どくタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "どくのある　ちいさな　ハリ。\n持たせると　どくタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon.\nIt is a small, poisonous barb that ups\nthe power of Poison-type moves."
    fr: "Objet à tenir. Petit pic empoisonné\nmontant la puissance des capacités\nde type Poison."
    it: "Strumento da far tenere a un Pokémon.\nAculeo piccolo e tossico che potenzia\nle mosse di tipo Veleno."
    de: "Ein Item zum Tragen. Ein schmaler und\ngiftiger Widerhaken, der Attacken vom\nTyp Gift verstärkt."
    es: "Flecha venenosa que refuerza los\nmovimientos de tipo Veneno. Debe\nllevarla un Pokémon."
    ko: "독이 있는 작은 침.\n지니게 하면 독타입\n기술의 위력이 올라간다."
poison_gem:
  names:
    jp_kana: どくのジュエル
    jp_kanji: どくのジュエル
    en: Poison Gem
    fr: Joyau Poison
    it: Bijouveleno
    de: Giftjuwel
    es: G. Veneno
    ko: 독주얼
  descriptions:
    jp_kana: "どくの　タイプの　ジュエル。\nもたせると　いちどだけ　どくの\nわざの　いりょくが　つよまる。"
    jp_kanji: "どくの　タイプの　ジュエル。\n持たせると　１度だけ　どくの\n技の　威力が　強まる。"
    en: "A gem with an essence of poison. When\nheld, it strengthens the power of a\nPoison-type move only once."
    fr: "Objet à tenir. Joyau augmentant\nune fois la puissance des capacités\nde type Poison."
    it: "Strumento da far tenere a un Pokémon.\nGioiello che potenzia una sola volta\nle mosse di tipo Veleno."
    de: "Ein Juwel vom Typ Gift. Es\nerhöht einmalig die Stärke\neiner Attacke vom Typ Gift."
    es: "Joya de un solo uso que potencia\nlos movimientos de tipo Veneno.\nDebe llevarla un Pokémon."
    ko: "독타입의 주얼.\n지니게 하면 한 번만 독\n기술의 위력이 강해진다."
poke_ball:
  names:
    jp_kana: モンスターボール
    jp_kanji: モンスターボール
    en: Poké Ball
    fr: Poké Ball
    it: Poké Ball
    de: Pokéball
    es: Poké Ball
    ko: 몬스터볼
  descriptions:
    jp_kana: "やせいの　ポケモンに　なげて\nつかまえる　ための　ボール。\nカプセルしきに　なっている。"
    jp_kanji: "野生の　ポケモンに　投げて\n捕まえるための　ボール。\nカプセル式に　なっている。"
    en: "A device for catching wild Pokémon.\nIt is thrown like a ball at the target.\nIt is designed as a capsule system."
    fr: "Un objet pareil à une capsule, qui\ncapture les Pokémon sauvages. Il suffit\npour cela de le jeter comme une balle."
    it: "Strumento dotato di capsula usato per\ncatturare Pokémon selvatici. Si lancia\ncontro il bersaglio come una palla."
    de: "Damit fängst du wilde Pokémon.\nDu wirfst ihn wie einen normalen Ball.\nDas Design ähnelt dem einer Kapsel."
    es: "Dispositivo con diseño capsular que\natrapa Pokémon salvajes. Se lanza\ncomo una bola contra el blanco."
    ko: "야생 포켓몬에게 던져서\n잡기 위한 볼.\n캡슐식으로 되어 있다."
poke_doll:
  names:
    jp_kana: ピッピにんぎょう
    jp_kanji: ピッピにんぎょう
    en: Poké Doll
    fr: Poképoupée
    it: Poké Bambola
    de: Poképuppe
    es: Poké Muñeco
    ko: 삐삐인형
  descriptions:
    jp_kana: "ポケモンの　きを　ひかせる　どうぐ。\nやせいポケモンとの　せんとうから\nぜったいに　にげられる。"
    jp_kanji: "ポケモンの　気をひかせる　道具。\n野生ポケモンとの　戦闘から\n絶対に　逃げられる。"
    en: "A doll that attracts Pokémon.\nUse it to flee from any battle with a\nwild Pokémon."
    fr: "Poupée qui attire les Pokémon. Permet\nde s’enfuir d’un combat contre un\nPokémon sauvage."
    it: "Bambola che attrae i Pokémon. È utile\nper fuggire dalla lotta con un Pokémon\nselvatico."
    de: "Eine hübsche Puppe. Sie ermöglicht\ndie Flucht im Kampf gegen wilde\nPokémon."
    es: "Un muñeco que atrae a los Pokémon.\nEs útil para huir de un combate\ncontra un Pokémon salvaje."
    ko: "포켓몬의 관심을 끄는 도구.\n야생 포켓몬과의 배틀에서\n반드시 도망칠 수 있다."
poke_radar:
  names:
    jp_kana: ポケトレ
    jp_kanji: ポケトレ
    en: Poké Radar
    fr: Poké Radar
    it: Poké Radar
    de: Pokéradar
    es: Pokéradar
    ko: 포켓트레
  descriptions:
    jp_kana: "くさむらに　かくれている　ポケモンを\nさがしだせる　どうぐ。\nあるくと　でんちが　たまる。"
    jp_kanji: "くさむらに　隠れている　ポケモンを\n探しだせる　道具。\n歩くと　電池が　たまる。"
    en: "A tool that can search out Pokémon\nthat are hiding in grass. Its battery is\nrecharged as you walk."
    fr: "Objet permettant de trouver les\nPokémon qui se cachent dans l’herbe.\nSe recharge quand vous marchez."
    it: "Strumento con cui individuare i Pokémon\nnascosti nell’erba. La batteria si\nricarica mentre cammini."
    de: "Findet Pokémon, die sich im Gras\nverstecken. Die Batterie lädt sich\nbeim Reisen auf."
    es: "Busca Pokémon que se esconden\nen la hierba. La batería se recarga\nmientras caminas."
    ko: "풀밭에 숨어 있는 포켓몬을\n찾아내는 도구.\n걸으면 전지가 충전된다."
poke_toy:
  names:
    jp_kana: ポケじゃらし
    jp_kanji: ポケじゃらし
    en: Poké Toy
    fr: Poképlumet
    it: Pokégingillo
    de: Pokéwedel
    es: Pokéseñuelo
    ko: 포켓풀
  descriptions:
    jp_kana: "ポケモンの　きを　ひかせる　どうぐ。\nやせいポケモンとの　せんとうから\nぜったいに　にげられる。"
    jp_kanji: "ポケモンの　気を　ひかせる　道具。\n野生ポケモンとの　戦闘から\n絶対に　逃げられる。"
    en: "An item that attracts Pokémon.\nUse it to flee from any battle with a\nwild Pokémon."
    fr: "Objet qui attire les Pokémon. Permet\nde s’enfuir d’un combat contre un\nPokémon sauvage."
    it: "Strumento che attrae i Pokémon. Utile\nper fuggire dalla lotta con Pokémon\nselvatici."
    de: "Ein hübscher Wedel. Er ermöglicht die\nFlucht im Kampf gegen wilde Pokémon."
    es: "Un objeto que atrae a los Pokémon.\nPuedes utilizarlo para huir de un\ncombate con un Pokémon salvaje."
    ko: "포켓몬의 관심을 끄는 도구.\n야생 포켓몬과의 배틀에서\n반드시 도망칠 수 있다."
pomeg_berry:
  names:
    jp_kana: ザロクのみ
    jp_kanji: ザロクのみ
    en: Pomeg Berry
    fr: Baie Grena
    it: Baccagrana
    de: Granabeere
    es: Baya Grana
    ko: 유석열매
  descriptions:
    jp_kana: "ポケモンに　あげると\nとても　なつき　やすくなるが\nＨＰの　きそポイントは　さがる。"
    jp_kanji: "ポケモンに　あげると\nとても　なつき　やすくなるが\nＨＰの　基礎ポイントは　さがる。"
    en: "Using it on a Pokémon makes it more\nfriendly, but it also lowers its base HP."
    fr: "Rend les Pokémon plus amicaux, mais\nbaisse leurs PV de base."
    it: "Utilizzata su un Pokémon, lo rende più\namichevole, ma riduce i PS di base."
    de: "Isst ein Pokémon diese Beere,\nstärkt dies eure Freundschaft,\nverringert aber seine Basis-KP."
    es: "Al usarla con un Pokémon, se gana\nsu amistad, pero también reduce\nsus PS de base."
    ko: "포켓몬에게 주면\n매우 친밀해지기 쉬워지지만\nHP의 기초 포인트가 떨어진다."
potion:
  names:
    jp_kana: キズぐすり
    jp_kanji: キズぐすり
    en: Potion
    fr: Potion
    it: Pozione
    de: Trank
    es: Poción
    ko: 상처약
  descriptions:
    jp_kana: "スプレーしきの　キズぐすり。\nポケモン　１ひきの　ＨＰを\n２０だけ　かいふくする。"
    jp_kanji: "スプレー式の　キズぐすり。\nポケモン　１匹の　ＨＰを\n２０だけ　回復する。"
    en: "A spray-type medicine for wounds.\nIt restores the HP of one Pokémon by\njust 20 points."
    fr: "Un spray qui soigne les blessures.\nRestaure 20 PV à un Pokémon."
    it: "Rimedio spray per le ferite.\nRestituisce 20 PS ad un Pokémon."
    de: "Hilft bei Wunden. Die KP\neines Pokémon werden\num 20 Punkte aufgefüllt."
    es: "Medicina en espray que cura heridas\ny restaura 20 PS a un Pokémon."
    ko: "스프레이식의 상처약.\n포켓몬 1마리의 HP를\n20만큼 회복한다."
power_anklet:
  names:
    jp_kana: パワーアンクル
    jp_kanji: パワーアンクル
    en: Power Anklet
    fr: Chaîne Pouv.
    it: Vigorgliera
    de: Machtkette
    es: Franja Recia
    ko: 파워앵클릿
  descriptions:
    jp_kana: "もたせると　すばやさが　さがるが\nふつうよりも　ポケモンの　すばやさが\nたかく　そだちやすい。"
    jp_kanji: "持たせると　素早さが　さがるが\nふつうよりも　ポケモンの　素早さが\n高く　育ちやすい。"
    en: "A Pokémon held item that promotes\nSpeed gain on leveling, but reduces\nthe Speed stat."
    fr: "Objet à tenir permettant à la Vitesse\nde progresser plus vite, mais la\nréduisant pendant le combat."
    it: "Strumento da far tenere a un Pokémon.\nRiduce la Velocità in lotta, ma aumenta\nmolto la Velocità di base."
    de: "Ein Item zum Tragen. Erhöht bei\nLevelaufstieg den Initiative-Wert,\nsenkt aber die Initiative allgemein."
    es: "Potencia la Velocidad al subir de nivel,\npero reduce la Velocidad en combate.\nDebe llevarla un Pokémon."
    ko: "지니게 하면 스피드는 떨어지지만\n여느 때보다 포켓몬의 스피드를\n올리면서 키우기가 쉽다."
power_band:
  names:
    jp_kana: パワーバンド
    jp_kanji: パワーバンド
    en: Power Band
    fr: Band. Pouv.
    it: Vigorbanda
    de: Machtband
    es: Banda Recia
    ko: 파워밴드
  descriptions:
    jp_kana: "もたせると　すばやさが　さがるが\nふつうよりも　ポケモンの　とくぼうが\nたかく　そだちやすい。"
    jp_kanji: "持たせると　素早さが　さがるが\nふつうよりも　ポケモンの　特防が\n高く　育ちやすい。"
    en: "A Pokémon held item that promotes\nSp. Def gain on leveling, but reduces\nthe Speed stat."
    fr: "Objet à tenir permettant à la Défense\nSpéciale de progresser plus vite, mais\nréduisant la Vitesse pendant le combat."
    it: "Strumento da far tenere a un Pokémon.\nRiduce la Velocità in lotta, ma aumenta\nmolto la Difesa Speciale di base."
    de: "Ein Item zum Tragen. Erhöht bei Level-\naufstieg die Spezial-Verteidigung,\nsenkt aber die Initiative."
    es: "Aumenta la Defensa Especial al subir\nde nivel, pero reduce la Velocidad en\ncombate. Debe llevarla un Pokémon."
    ko: "지니게 하면 스피드는 떨어지지만\n여느 때보다 포켓몬의 특수방어를\n올리면서 키우기가 쉽다."
power_belt:
  names:
    jp_kana: パワーベルト
    jp_kanji: パワーベルト
    en: Power Belt
    fr: Ceint. Pouv.
    it: Vigorfascia
    de: Machtgurt
    es: Cinto Recio
    ko: 파워벨트
  descriptions:
    jp_kana: "もたせると　すばやさが　さがるが\nふつうよりも　ポケモンの　ぼうぎょが\nたかく　そだちやすい。"
    jp_kanji: "持たせると　素早さが　さがるが\nふつうよりも　ポケモンの　防御が\n高く　育ちやすい。"
    en: "A Pokémon held item that promotes\nDefense gain on leveling, but reduces\nthe Speed stat."
    fr: "Objet à tenir permettant à la Défense\nde progresser plus vite, mais\nréduisant la Vitesse pendant le combat."
    it: "Strumento da far tenere a un Pokémon.\nRiduce la Velocità in lotta, ma aumenta\nmolto la Difesa di base."
    de: "Ein Item zum Tragen. Erhöht bei\nLevelaufstieg den Verteidigungs-\nWert, senkt aber die Initiative."
    es: "Aumenta la Defensa al subir de nivel,\npero reduce la Velocidad en combate.\nDebe llevarlo un Pokémon."
    ko: "지니게 하면 스피드는 떨어지지만\n여느 때보다 포켓몬의 방어를\n올리면서 키우기가 쉽다."
power_bracer:
  names:
    jp_kana: パワーリスト
    jp_kanji: パワーリスト
    en: Power Bracer
    fr: Poign. Pouv.
    it: Vigorcerchio
    de: Machtreif
    es: Brazal Recio
    ko: 파워리스트
  descriptions:
    jp_kana: "もたせると　すばやさが　さがるが\nふつうよりも　ポケモンの　こうげきが\nたかく　そだちやすい。"
    jp_kanji: "持たせると　素早さが　さがるが\nふつうよりも　ポケモンの　攻撃が\n高く　育ちやすい。"
    en: "A Pokémon held item that promotes\nAttack gain on leveling, but reduces\nthe Speed stat."
    fr: "Objet à tenir permettant à l’Attaque\nde progresser plus vite, mais\nréduisant la Vitesse pendant le combat."
    it: "Strumento da far tenere a un Pokémon.\nRiduce la Velocità in lotta, ma aumenta\nmolto l’Attacco di base."
    de: "Ein Item zum Tragen. Erhöht\nbei Levelaufstieg den Angriffs-\nWert, senkt aber die Initiative."
    es: "Potencia el Ataque al subir de nivel,\npero reduce la Velocidad en combate.\nDebe llevarlo un Pokémon."
    ko: "지니게 하면 스피드는 떨어지지만\n여느 때보다 포켓몬의 공격을\n올리면서 키우기가 쉽다."
power_herb:
  names:
    jp_kana: パワフルハーブ
    jp_kanji: パワフルハーブ
    en: Power Herb
    fr: Herbe Pouv.
    it: Vigorerba
    de: Energiekraut
    es: Hierba Única
    ko: 파워풀허브
  descriptions:
    jp_kana: "もたせた　ポケモンは　いちどだけ\n１ターンめに　ちからを　ためるわざを\nすぐに　つかうことが　できる。"
    jp_kanji: "持たせた　ポケモンは　１度だけ\n１ターン目に　ちからを　ためる技を\nすぐに　使うことが　できる。"
    en: "A single-use item to be held by a\nPokémon. It allows the immediate use of\na move that charges on the first turn."
    fr: "Objet à tenir et à usage unique. Permet\nd’utiliser immédiatement une capacité\nqui devrait se charger au premier tour."
    it: "Strumento monouso da far tenere a un\nPokémon. Permette l’uso immediato di\nuna mossa che al primo turno si carica."
    de: "Ein getragenes Item. Der Träger kann\ndadurch eine Attacke sofort einsetzen,\ndie sonst aufgeladen werden muss."
    es: "Permite el uso inmediato de cualquier\nmovimiento en el primer turno. Es de un\nsolo uso y debe llevarla un Pokémon."
    ko: "지니게 한 포켓몬은 한 번만\n1턴째에 힘을 모으는 기술을\n바로 사용할 수가 있다."
power_lens:
  names:
    jp_kana: パワーレンズ
    jp_kanji: パワーレンズ
    en: Power Lens
    fr: Lent. Pouv.
    it: Vigorlente
    de: Machtlinse
    es: Lente Recia
    ko: 파워렌즈
  descriptions:
    jp_kana: "もたせると　すばやさが　さがるが\nふつうよりも　ポケモンの　とくこうが\nたかく　そだちやすい。"
    jp_kanji: "持たせると　素早さが　さがるが\nふつうよりも　ポケモンの　特攻が\n高く　育ちやすい。"
    en: "A Pokémon held item that promotes\nSp. Atk gain on leveling, but reduces\nthe Speed stat."
    fr: "Objet à tenir permettant à l’Attaque\nSpéciale de progresser plus vite, mais\nréduisant la Vitesse pendant le combat."
    it: "Strumento da far tenere a un Pokémon.\nRiduce la Velocità in lotta, ma aumenta\nmolto l’Attacco Speciale di base."
    de: "Ein Item zum Tragen. Erhöht\nbei Levelaufstieg den Spezial-\nAngriff, senkt aber die Initiative."
    es: "Potencia el Ataque Especial al subir\nde nivel, pero reduce la Velocidad en\ncombate. Debe llevarla un Pokémon."
    ko: "지니게 하면 스피드는 떨어지지만\n여느 때보다 포켓몬의 특수공격을\n올리면서 키우기가 쉽다."
power_weight:
  names:
    jp_kana: パワーウエイト
    jp_kanji: パワーウエイト
    en: Power Weight
    fr: Poids Pouv.
    it: Vigorpeso
    de: Machtgewicht
    es: Pesa Recia
    ko: 파워웨이트
  descriptions:
    jp_kana: "もたせると　すばやさが　さがるが\nふつうよりも　ポケモンの　ＨＰが\nたかく　そだちやすい。"
    jp_kanji: "持たせると　素早さが　さがるが\nふつうよりも　ポケモンの　ＨＰが\n高く　育ちやすい。"
    en: "A Pokémon held item that promotes\nHP gain on leveling, but reduces the\nSpeed stat."
    fr: "Objet à tenir permettant aux PV\nde progresser plus vite, mais\nréduisant la Vitesse pendant le combat."
    it: "Strumento da far tenere a un Pokémon.\nRiduce la Velocità in lotta, ma aumenta\nmolto i PS di base."
    de: "Ein Item zum Tragen. Erhöht bei\nLevelaufstieg die maximalen\nKP, senkt aber die Initiative."
    es: "Aumenta los PS al subir de nivel,\npero reduce la Velocidad en combate.\nDebe llevarla un Pokémon."
    ko: "지니게 하면 스피드는 떨어지지만\n여느 때보다 포켓몬의 HP를\n올리면서 키우기가 쉽다."
pp_max:
  names:
    jp_kana: ポイントマックス
    jp_kanji: ポイントマックス
    en: PP Max
    fr: PP Max
    it: PP-Max
    de: AP-Top
    es: Máx. PP
    ko: 포인트맥스
  descriptions:
    jp_kana: "おぼえている　わざのうち\n１つの　ＰＰの　さいだいちを\nさいこうまで　あげる。"
    jp_kanji: "覚えている　技のうち\n１つの　ＰＰの　最大値を\n最高まで　あげる。"
    en: "It maximally raises the top PP of a\nselected move that has been learned\nby the target Pokémon."
    fr: "Monte sensiblement les PP max d’une\ncapacité sélectionnée."
    it: "Porta al limite i PP massimi di una mossa\na scelta imparata da un Pokémon."
    de: "Maximiert die Anzahl der AP\neiner Attacke eines Pokémon."
    es: "Aumenta hasta el límite los PP máximos\ndel movimiento elegido de un Pokémon."
    ko: "기억하고 있는 기술 중\n1개의 PP 최대치를\n최고까지 올린다."
pp_up:
  names:
    jp_kana: ポイントアップ
    jp_kanji: ポイントアップ
    en: PP Up
    fr: PP Plus
    it: PP-Su
    de: AP-Plus
    es: Más PP
    ko: 포인트업
  descriptions:
    jp_kana: "ポケモンが　おぼえている\nわざのうち　１つの　ＰＰの\nさいだいちを　すこし　あげる。"
    jp_kanji: "ポケモンが　覚えている\n技のうち　１つの　ＰＰの\n最大値を　少し　あげる。"
    en: "It slightly raises the maximum PP of\na selected move that has been learned\nby the target Pokémon."
    fr: "Monte un peu les PP max d’une\ncapacité sélectionnée."
    it: "Aumenta di poco i PP massimi di una mossa\na scelta che è stata imparata dal\nPokémon."
    de: "Erhöht die maximale Anzahl der AP\neiner Attacke eines Pokémon."
    es: "Aumenta ligeramente los PP máximos del\nmovimiento elegido de un Pokémon."
    ko: "포켓몬이 기억하고 있는\n기술 중 1개의 PP\n최대치를 조금 올린다."
premier_ball:
  names:
    jp_kana: プレミアボール
    jp_kanji: プレミアボール
    en: Premier Ball
    fr: Honor Ball
    it: Premier Ball
    de: Premierball
    es: Honor Ball
    ko: 프레미어볼
  descriptions:
    jp_kana: "なにかの　きねんの　しなとして\nとくべつに　つくられた\nちょっと　めずらしい　ボール。"
    jp_kanji: "なにかの　記念の　品として\n特別に　つくられた\nちょっと　珍しい　ボール。"
    en: "A somewhat rare Poké Ball that has\nbeen specially made to commemorate\nan event of some sort."
    fr: "Une Poké Ball assez rare qui fut créée\npour un événement particulier."
    it: "Poké Ball poco comune realizzata\nappositamente per commemorare\nun particolare evento."
    de: "Ein eher seltener Ball, der als\nReminiszenz an irgendein\nEreignis hergestellt wurde."
    es: "Es una Poké Ball algo singular\nque se creó para conmemorar\nalgún acontecimiento."
    ko: "무언가의 기념품으로\n특별히 만들어진\n조금 희귀한 볼."
pretty_feather:
  names:
    jp_kana: きれいなハネ
    jp_kanji: きれいなハネ
    en: Pretty Wing
    fr: Jolie Aile
    it: Piumabella
    de: Prachtfeder
    es: P. Bella
    ko: 고운날개
  descriptions:
    jp_kana: "きれいなだけで　なんの　こうかもない\nごくごく　ふつうの　ハネ。"
    jp_kanji: "きれいなだけで　なんの　効果もない\nごくごく　普通の　ハネ。"
    en: "Though this feather is beautiful, it’s\njust a regular feather and has no\neffect on Pokémon."
    fr: "Une plume très jolie, mais ordinaire\net sans effet particulier."
    it: "Piuma molto bella ma priva di qualsiasi\nutilità: non ha alcun effetto."
    de: "Eine ganz normale Feder, die\nrein gar nichts bewirkt."
    es: "Pluma normal y corriente. Muy bonita,\npero no sirve para nada."
    ko: "아름답기만 할 뿐 아무 효과도 없는\n지극히 평범한 날개."
prism_scale:
  names:
    jp_kana: きれいなウロコ
    jp_kanji: きれいなウロコ
    en: Prism Scale
    fr: Bel’Écaille
    it: Squama Bella
    de: Schönschuppe
    es: Escama Bella
    ko: 고운비늘
  descriptions:
    jp_kana: "ある　とくていの　ポケモンを\nしんかさせる　ふしぎな　ウロコ。\nにじいろに　かがやいている。"
    jp_kanji: "ある　特定の　ポケモンを\n進化させる　不思議な　ウロコ。\nにじ色に　輝いている。"
    en: "A mysterious scale that evolves\ncertain Pokémon.\nIt shines in rainbow colors."
    fr: "Une écaille étrange qui fait évoluer\ncertaines espèces de Pokémon.\nElle a une couleur arc-en-ciel."
    it: "Squama misteriosa che fa evolvere\ndeterminate specie di Pokémon.\nRiflette i colori dell’arcobaleno."
    de: "Eine seltsame Schuppe, durch die sich\nbestimmte Pokémon entwickeln. Sie\nfunkelt in den Farben des Regenbogens."
    es: "Curiosa piedra que hace evolucionar\na determinadas especies de Pokémon.\nBrilla con los colores del arcoíris."
    ko: "어느 특정한 포켓몬을\n진화시키는 이상한 비늘.\n무지갯빛으로 빛나고 있다."
prop_case:
  names:
    jp_kana: グッズケース
    jp_kanji: グッズケース
    en: Prop Case
    fr: Boîte Parure
    it: Portagadget
    de: Deko-Box
    es: Neceser
    ko: 굿즈케이스
  descriptions:
    jp_kana: "ミュージカルで　ポケモンに　つける\nいろとりどりの　グッズを　たくさん\nしまえる　きれいで　すてきなケース。"
    jp_kanji: "ミュージカルで　ポケモンに　つける\nいろとりどりの　グッズを　たくさん\n収納する　きれいで　すてきなケース。"
    en: "A lovely case to store colorful Props\nfor your Pokémon to wear in a musical."
    fr: "Boîte permettant de ranger\nles Parures pour habiller les\nPokémon au Music-Hall."
    it: "Scatola bella ed elegante per stipare\ni gadget usati per agghindare i Pokémon\ndurante il Pokémon Musical."
    de: "Eine ganz tolle Box, in der jede Menge\nbunte Deko-Artikel für Pokémon-Musicals\nPlatz haben."
    es: "Bonita caja donde puedes guardar\nlos Complementos para vestir a tus\nPokémon en el Teatro Musical."
    ko: "뮤지컬에서 포켓몬에게 다는\n각양각색의 굿즈를 많이\n넣을 수 있는 아름답고 멋진 케이스."
protector:
  names:
    jp_kana: プロテクター
    jp_kanji: プロテクター
    en: Protector
    fr: Protecteur
    it: Copertura
    de: Schützer
    es: Protector
    ko: 프로텍터
  descriptions:
    jp_kana: "なにかの　プロテクター。\nとても　かたくて　おもい。\nある　ポケモンが　このんでいる。"
    jp_kanji: "なにかの　プロテクター。\nとても　硬くて　重い。\nある　ポケモンが　好んでいる。"
    en: "A protective item of some sort.\nIt is extremely stiff and heavy.\nIt is loved by a certain Pokémon."
    fr: "Objet protecteur très dur et très\nlourd, apprécié d’un certain Pokémon."
    it: "Strumento protettivo, molto duro e\npesante, prediletto da un Pokémon\nin particolare."
    de: "Ein schützendes Item. Steif\nund schwer. Das Lieblingsstück\neines bestimmten Pokémon."
    es: "Dispositivo de protección muy pesado.\nCierto Pokémon lo adora."
    ko: "무언가의 프로텍터.\n매우 단단하고 무겁다.\n어떤 포켓몬이 좋아하는 물건이다."
protein:
  names:
    jp_kana: タウリン
    jp_kanji: タウリン
    en: Protein
    fr: Protéine
    it: Proteina
    de: Protein
    es: Proteína
    ko: 타우린
  descriptions:
    jp_kana: "ポケモンの　えいようドリンク。\nポケモン　１ひきの　こうげきの\nきそポイントを　あげる。"
    jp_kanji: "ポケモンの　栄養ドリンク。\nポケモン　１匹の　攻撃の\n基礎ポイントを　あげる。"
    en: "A nutritious drink for Pokémon.\nIt raises the base Attack stat of a\nsingle Pokémon."
    fr: "Une boisson très nutritive qui monte\nl’Attaque de base d’un Pokémon."
    it: "Bevanda nutriente per Pokémon.\nAumenta l’Attacco di base."
    de: "Ein gehaltvolles Getränk, das den\nAngriffs-Wert eines Pokémon\ndauerhaft erhöht."
    es: "Nutritiva bebida que aumenta el Ataque\nde base de un Pokémon."
    ko: "포켓몬의 영양 드링크.\n포켓몬 1마리의 공격\n기초 포인트를 올린다."
psychic_gem:
  names:
    jp_kana: エスパージュエル
    jp_kanji: エスパージュエル
    en: Psychic Gem
    fr: Joyau Psy
    it: Bijoupsico
    de: Psychojuwel
    es: G. Psíquica
    ko: 에스퍼주얼
  descriptions:
    jp_kana: "エスパーの　タイプの　ジュエル。\nもたせると　いちどだけ　エスパーの\nわざの　いりょくが　つよまる。"
    jp_kanji: "エスパーの　タイプの　ジュエル。\n持たせると　１度だけ　エスパーの\n技の　威力が　強まる。"
    en: "A gem with an essence of the mind. When\nheld, it strengthens the power of a\nPsychic-type move only once."
    fr: "Objet à tenir. Joyau augmentant\nune fois la puissance des capacités\nde type Psy."
    it: "Strumento da far tenere a un Pokémon.\nGioiello che potenzia una sola volta\nle mosse di tipo Psico."
    de: "Ein Juwel vom Typ Psycho. Es\nerhöht einmalig die Stärke\neiner Attacke vom Typ Psycho."
    es: "Joya de un solo uso que potencia\nlos movimientos de tipo Psíquico.\nDebe llevarla un Pokémon."
    ko: "에스퍼타입의 주얼.\n지니게 하면 한 번만 에스퍼\n기술의 위력이 강해진다."
pure_incense:
  names:
    jp_kana: きよめのおこう
    jp_kanji: きよめのおこう
    en: Pure Incense
    fr: Encens Pur
    it: Puroaroma
    de: Scheuchrauch
    es: Incie. Puro
    ko: 순결의향로
  descriptions:
    jp_kana: "いちばん　まえの　ポケモンに\nもたせると　やせいポケモンが\nでて　きにくくなる。"
    jp_kanji: "１番　前の　ポケモンに\n持たせると　野生ポケモンが\nでて　きにくくなる。"
    en: "An item to be held by a Pokémon.\nIt helps keep wild Pokémon away if the\nholder is the first one in the party."
    fr: "Objet à tenir. Aide à repousser les\nPokémon sauvages si le porteur est\nle premier Pokémon de l’équipe."
    it: "Strumento da far tenere a un Pokémon.\nAiuta ad allontanare i Pokémon selvatici\nse chi lo tiene è il primo della squadra."
    de: "Ein Item zum Tragen. Reduziert\nBegegnungen mit wilden Pokémon, wenn\nder Träger an erster Stelle steht."
    es: "Si lo lleva el primer Pokémon del\nequipo, se reduce la probabilidad de\nque se acerquen Pokémon salvajes."
    ko: "맨 앞의 포켓몬에게\n지니게 하면 야생 포켓몬이\n나타날 확률이 낮아진다."
qualot_berry:
  names:
    jp_kana: タポルのみ
    jp_kanji: タポルのみ
    en: Qualot Berry
    fr: Baie Qualot
    it: Baccaloquat
    de: Qualotbeere
    es: Baya Ispero
    ko: 파비열매
  descriptions:
    jp_kana: "ポケモンに　あげると\nとても　なつき　やすくなるが\nぼうぎょの　きそポイントは　さがる。"
    jp_kanji: "ポケモンに　あげると\nとても　なつき　やすくなるが\n防御の　基礎ポイントは　さがる。"
    en: "Using it on a Pokémon makes it more\nfriendly, but it also lowers its base\nDefense stat."
    fr: "Rend les Pokémon plus amicaux, mais\nbaisse leur stat Défense de base."
    it: "Utilizzata su un Pokémon, lo rende più\namichevole, ma diminuisce la Difesa\ndi base."
    de: "Isst ein Pokémon diese Beere,\nstärkt dies eure Freundschaft,\nverringert aber seinen Vert.-Wert."
    es: "Al usarla con un Pokémon, se gana\nsu amistad, pero también reduce\nsu Defensa de base."
    ko: "포켓몬에게 주면\n매우 친밀해지기 쉬워지지만\n방어의 기초 포인트가 떨어진다."
quick_ball:
  names:
    jp_kana: クイックボール
    jp_kanji: クイックボール
    en: Quick Ball
    fr: Rapide Ball
    it: Velox Ball
    de: Flottball
    es: Veloz Ball
    ko: 퀵볼
  descriptions:
    jp_kana: "せんとうが　はじまって　すぐに\nつかうと　つかまえやすくなる\nちょっと　かわった　ボール。"
    jp_kanji: "戦闘が　はじまって　すぐに\n使うと　捕まえやすくなる\nちょっと　変わった　ボール。"
    en: "A somewhat different Poké Ball that\nprovides a better catch rate if it is\nused at the start of a wild encounter."
    fr: "Une Poké Ball qui permet d’attraper un\nPokémon sauvage plus facilement si on\nl’utilise au début du combat."
    it: "Poké Ball un po’ diversa che facilita\nla cattura di un Pokémon selvatico\nse usata all’inizio della lotta."
    de: "Ein ungewöhnlicher Ball, der\nzu Beginn eines Kampfes am\nwirkungsvollsten ist."
    es: "Una Poké Ball algo distinta que potencia\nel índice de captura si se usa al inicio\nde un encuentro con Pokémon salvajes."
    ko: "배틀이 시작되자마자\n사용하면 잡기 쉬워지는\n조금 특이한 볼."
quick_claw:
  names:
    jp_kana: せんせいのツメ
    jp_kanji: せんせいのツメ
    en: Quick Claw
    fr: Vive Griffe
    it: Rapidartigli
    de: Flinkklaue
    es: Garra Rápida
    ko: 선제공격손톱
  descriptions:
    jp_kana: "かるくて　するどい　ツメ。\nもたせると　あいてより　さきに\nこうどう　できることが　ある。"
    jp_kanji: "軽くて　鋭い　ツメ。\n持たせると　相手より　先に\n行動できることが　ある。"
    en: "An item to be held by a Pokémon.\nA light, sharp claw that lets the\nbearer move first occasionally."
    fr: "Objet à tenir. Griffe légère mais\ntranchante qui permet parfois de\nfrapper le premier."
    it: "Strumento da far tenere a un Pokémon.\nLeggero e affilato, permette di fare\nla prima mossa ogni tanto."
    de: "Ein Item, das einem Pokémon zum Tragen\ngegeben werden kann. Es hebt gelegent-\nlich die Erstschlagquote."
    es: "Garra ligera y afilada que permite que\nel Pokémon que la lleve ataque\na veces el primero."
    ko: "가볍고 날카로운 손톱.\n지니게 하면 상대보다 먼저\n행동할 수도 있다."
quick_powder:
  names:
    jp_kana: スピードパウダー
    jp_kanji: スピードパウダー
    en: Quick Powder
    fr: Poudre Vite
    it: Velopolvere
    de: Flottstaub
    es: Polvo Veloz
    ko: 스피드파우더
  descriptions:
    jp_kana: "メタモンに　もたせると　すばやさが\nあがる　ふしぎなこな。\nとても　こまかくて　かたい。"
    jp_kanji: "メタモンに　持たせると　素早さが\nあがる　不思議な粉。\nとても　こまかくて　硬い。"
    en: "An item to be held by Ditto.\nExtremely fine yet hard, this odd\npowder boosts the Speed stat."
    fr: "Objet à faire tenir à Métamorph. Cette\npoudre étrange, très fine mais\nrésistante, augmente sa Vitesse."
    it: "Strumento da far tenere a Ditto.\nQuesta strana polvere, fine e al\ncontempo dura, aumenta la Velocità."
    de: "Ein Item, das Ditto zum Tragen gegeben\nwerden kann. Fein und doch hart,\nerhöht es den Initiative-Wert."
    es: "Debe llevarlo Ditto. Es un polvo\nmuy fino, pero a la vez resistente,\nque aumenta su Velocidad."
    ko: "메타몽에게 지니게 하면 스피드가\n올라가는 이상한 가루.\n매우 작고 단단하다."
rabuta_berry:
  names:
    jp_kana: ラブタのみ
    jp_kanji: ラブタのみ
    en: Rabuta Berry
    fr: Baie Rabuta
    it: Baccambutan
    de: Rabutabeere
    es: Baya Rautan
    ko: 라부탐열매
  descriptions:
    jp_kana: "イッシュちほうでは　とても\nめずらしい　きのみ。\nマニアが　たかく　かってくれる。"
    jp_kanji: "イッシュ地方では　とても\n珍しい　きのみ。\nマニアが　高く　買ってくれる。"
    en: "A Berry which is very rare in the\nUnova region.\nA maniac will buy it for a high price."
    fr: "Baie très rare à Unys.\nLes amateurs en donnent un bon prix."
    it: "Bacca molto rara a Unima.\nSi può vendere a un prezzo piuttosto\nalto agli intenditori."
    de: "Eine Beere, die nur äußerst selten\nin der Einall-Region zu finden ist.\nKenner geben ihr letztes Hemd dafür."
    es: "Una Baya muy rara en la región\nde Teselia. Muy apreciada\npor los gourmets."
    ko: "하나지방에서는 매우\n희귀한 나무열매.\n마니아가 비싼 값에 산다."
rage_candy_bar:
  names:
    jp_kana: いかりまんじゅう
    jp_kanji: いかりまんじゅう
    en: RageCandyBar
    fr: Bonbon Rage
    it: Iramella
    de: Wutkeks
    es: Caram. Furia
    ko: 분노의호두과자
  descriptions:
    jp_kana: "チョウジめいぶつの　まんじゅう。\nおみやげひん　として　ゆうめい。"
    jp_kanji: "ジョウト地方　にある\nチョウジタウン名物の　まんじゅう。\nお土産品として　有名。"
    en: "A famous Mahogany Town candy tourists\nlike to buy and take home. It restores\nthe HP of one Pokémon by 20 points."
    fr: "Un bonbon, spécialité d’Acajou.\nIl constitue un cadeau très réputé."
    it: "Caramella tipica di Mogania.\nSouvenir con un’ottima reputazione."
    de: "Eine Spezialität aus Mahagonia City.\nSie wird gern als Souvenir gekauft."
    es: "Caramelo típico de Pueblo Caoba,\nmuy popular como souvenir."
    ko: "황토마을의 명물인 호두과자.\n선물로 아주 유명하다."
rainbow_wing:
  names:
    jp_kana: にじいろのはね
    jp_kanji: にじいろのはね
    en: Rainbow Wing
    fr: Arcenci’Aile
    it: Ala d’Iride
    de: Buntschwinge
    es: Ala Arcoíris
    ko: 무지갯빛날개
  descriptions:
    jp_kana: "にじいろに　ひかり　かがやく\nふしぎな　はね。"
    jp_kanji: "にじいろに　ひかり　かがやく\n不思議な　はね。"
    en: "A mystical rainbow feather\nthat sparkles."
    fr: "Une étrange plume qui brille\nd’un éclat arc-en-ciel."
    it: Piuma magica dai mille colori.
    de: "Eine mystische Feder, die\nvon einem regenbogenfarbenen\nLeuchten erfüllt ist."
    es: "Misteriosa ala de un brillante\ncolor arcoíris."
    ko: "무지갯빛으로 빛나는\n이상한 날개."
rare_bone:
  names:
    jp_kana: きちょうなホネ
    jp_kanji: きちょうなホネ
    en: Rare Bone
    fr: Os Rare
    it: Osso Raro
    de: Steinknochen
    es: Hueso Raro
    ko: 귀중한뼈
  descriptions:
    jp_kana: "ポケモンこうこがくの　うえで\nとても　きちょうな　ホネ。\nショップで　たかく　うれる。"
    jp_kanji: "ポケモン考古学の　うえで\nとても　貴重な　ホネ。\nショップで　高く　売れる。"
    en: "A bone that is extremely valuable for\nPokémon archeology. It can be sold\nfor a high price to shops."
    fr: "Un os d’une grande valeur pour\nl’archéologie Pokémon. Peut être\nvendu à bon prix aux magasins."
    it: "Osso di grande valore per l’archeologia\nPokémon. Può essere venduto nei negozi\na un prezzo piuttosto alto."
    de: "Dieser Knochen erfreut jeden\nPokémon-Archäologen. Er ist\nvon hohem Wert."
    es: "Un hueso de gran valor para la\narqueología Pokémon. Puede alcanzar\nun alto precio en las tiendas."
    ko: "포켓몬 고고학 상에서\n매우 귀중한 뼈.\n상점에서 비싸게 팔린다."
rare_candy:
  names:
    jp_kana: ふしぎなアメ
    jp_kanji: ふしぎなアメ
    en: Rare Candy
    fr: Super Bonbon
    it: Caram. Rara
    de: Sonderbonbon
    es: Carameloraro
    ko: 이상한사탕
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nあたえると　ポケモン　１ひきの\nレベルが　１だけ　あがる。"
    jp_kanji: "エネルギーの　つまった　アメ。\nあたえると　ポケモン　１匹の\nレベルが　１だけ　あがる。"
    en: "A candy that is packed with energy.\nIt raises the level of a single Pokémon\nby one."
    fr: "Un bonbon plein d’énergie.\nIl permet à un Pokémon de gagner\nun niveau d’expérience."
    it: "Caramella altamente energetica.\nFa salire un Pokémon di un livello."
    de: "Ein energiereiches Bonbon, das\nden Level eines Pokémon dauerhaft\num eins erhöht."
    es: "Caramelo energético que sube\na un Pokémon de nivel."
    ko: "에너지가 가득한 사탕.\n먹이면 포켓몬 1마리의\n레벨이 1만큼 올라간다."
rawst_berry:
  names:
    jp_kana: チーゴのみ
    jp_kanji: チーゴのみ
    en: Rawst Berry
    fr: Baie Fraive
    it: Baccafrago
    de: Fragiabeere
    es: Baya Safre
    ko: 복분열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nやけどを　かいふくする。"
    jp_kanji: "ポケモンに　持たせると\nやけどを　回復する。"
    en: "If held by a Pokémon,\nit recovers from a burn."
    fr: "Baie qui soigne les brûlures lorsqu’elle\nest tenue par un Pokémon."
    it: "Se tenuta da un Pokémon, lo guarisce\nda una scottatura."
    de: "Gibst du die Beere einem Pokémon\nzum Tragen, heilt diese es von\nVerbrennung."
    es: "Los Pokémon pueden llevarla o usarla\npara curarse las quemaduras."
    ko: "포켓몬에게 지니게 하면\n화상을 회복한다."
razor_claw:
  names:
    jp_kana: するどいツメ
    jp_kanji: するどいツメ
    en: Razor Claw
    fr: Grif. Rasoir
    it: Affilartigli
    de: Scharfklaue
    es: Garrafilada
    ko: 예리한손톱
  descriptions:
    jp_kana: "するどく　とがった　ツメ。\nもたせると　わざが　きゅうしょに\nあたりやすくなる。"
    jp_kanji: "鋭く　とがった　ツメ。\n持たせると　技が　急所に\n当たりやすくなる。"
    en: "An item to be held by a Pokémon.\nIt is a sharply hooked claw that ups\nthe holder’s critical-hit ratio."
    fr: "Objet à tenir. Griffe crochue\net pointue augmentant le taux\nde critiques."
    it: "Strumento da far tenere a un Pokémon.\nArtiglio che aumenta le probabilità per\nchi lo tiene di sferrare dei brutti colpi."
    de: "Ein Item zum Tragen.\nDie scharfe Klaue erhöht die\nVolltrefferquote des Trägers."
    es: "Aumenta la probabilidad de que\nel Pokémon que la lleve consiga\nun golpe crítico."
    ko: "날카롭고 뾰족한 손톱.\n지니게 하면 기술이\n급소에 맞기 쉬워진다."
razor_fang:
  names:
    jp_kana: するどいキバ
    jp_kanji: するどいキバ
    en: Razor Fang
    fr: Croc Rasoir
    it: Affilodente
    de: Scharfzahn
    es: Colmillagudo
    ko: 예리한이빨
  descriptions:
    jp_kana: "するどく　とがった　キバ。\nもたせると　ダメージを　あたえたとき\nひるませることが　ある。"
    jp_kanji: "鋭く　とがった　キバ。\n持たせると　ダメージを　与えたとき\nひるませることが　ある。"
    en: "An item to be held by a Pokémon.\nIt may make foes and allies flinch\nwhen the holder inflicts damage."
    fr: "Objet à tenir pouvant apeurer l’ennemi\nquand le porteur lui inflige des dégâts."
    it: "Strumento da far tenere a un Pokémon.\nChi lo tiene può far tentennare il nemico\ncolpito."
    de: "Ein Item zum Tragen.\nVerursacht der Träger Schaden,\nerschrickt das Ziel eventuell."
    es: "Si lo lleva un Pokémon cuando inflige\ndaño a otro, puede hacer retroceder\na este último."
    ko: "날카롭고 뾰족한 이빨.\n지니게 하면 데미지를 줬을 때\n풀죽게 하기도 한다."
razz_berry:
  names:
    jp_kana: ズリのみ
    jp_kanji: ズリのみ
    en: Razz Berry
    fr: Baie Framby
    it: Baccalampon
    de: Himmihbeere
    es: Baya Frambu
    ko: 라즈열매
  descriptions:
    jp_kana: "イッシュちほうでは　とても\nめずらしい　きのみ。\nマニアが　たかく　かってくれる。"
    jp_kanji: "イッシュ地方では　とても\n珍しい　きのみ。\nマニアが　高く　買ってくれる。"
    en: "A Berry which is very rare in the\nUnova region.\nA maniac will buy it for a high price."
    fr: "Baie très rare à Unys.\nLes amateurs en donnent un bon prix."
    it: "Bacca molto rara a Unima.\nSi può vendere a un prezzo piuttosto\nalto agli intenditori."
    de: "Eine Beere, die nur äußerst selten\nin der Einall-Region zu finden ist.\nKenner geben ihr letztes Hemd dafür."
    es: "Una Baya muy rara en la región\nde Teselia. Muy apreciada\npor los gourmets."
    ko: "하나지방에서는 매우\n희귀한 나무열매.\n마니아가 비싼 값에 산다."
reaper_cloth:
  names:
    jp_kana: れいかいのぬの
    jp_kanji: れいかいのぬの
    en: Reaper Cloth
    fr: Tissu Fauche
    it: Terrorpanno
    de: Düsterumhang
    es: Telaterrible
    ko: 영계의천
  descriptions:
    jp_kana: "おそろしく　つよい　れいりょくが\nこめられている　ぬの。\nある　ポケモンが　このんでいる。"
    jp_kanji: "おそろしく　強い　霊力が\nこめられている　布。\nある　ポケモンが　好んでいる。"
    en: "A cloth imbued with horrifyingly strong\nspiritual energy.\nIt is loved by a certain Pokémon."
    fr: "Un tissu imprégné d’une énergie\nspirituelle horriblement puissante.\nApprécié d’un certain Pokémon."
    it: "Panno intriso di un’energia spirituale\nterribilmente forte. Un Pokémon in\nparticolare adora questo strumento."
    de: "Ein Stoffumhang mit geistiger\nEnergie. Das Lieblingsstück\neines bestimmten Pokémon."
    es: "Tela imbuida de una energía espiritual\nmuy potente. Cierto Pokémon la adora."
    ko: "무섭고 강한 영력이\n담겨 있는 천.\n어떤 포켓몬이 좋아하는 물건이다."
red_apricorn:
  names:
    jp_kana: あかぼんぐり
    jp_kanji: あかぼんぐり
    en: Red Apricorn
    fr: Noigrume Rge
    it: Ghic. Rossa
    de: Aprikoko Rot
    es: Bonguri Roj
    ko: 빨간규토리
  descriptions:
    jp_kana: "あかい　ぼんぐり。\nつーんと　はなにくる　においがする。"
    jp_kanji: "あかい　ぼんぐり。\nつーんと　はなにくる　においがする。"
    en: "A red Apricorn.\nIt assails your nostrils."
    fr: "Un Noigrume de couleur rouge.\nIl dégage un puissant arôme."
    it: "Una Ghicocca di colore rosso.\nEmana un odore molto forte."
    de: "Eine rote Aprikoko. Besitzt einen\nstechenden Geruch."
    es: "Bonguri de color rojo y aroma\nmuy penetrante."
    ko: "빨간색의 규토리.\n코를 톡 쏘는 향기가 난다."
red_card:
  names:
    jp_kana: レッドカード
    jp_kanji: レッドカード
    en: Red Card
    fr: Carton Rouge
    it: Cartelrosso
    de: Rote Karte
    es: Tarjeta Roja
    ko: 레드카드
  descriptions:
    jp_kana: "ふしぎな　ちからのある　カード。\nもたせると　わざをうけた　あいてを\nたいじょう　させることが　できる。"
    jp_kanji: "不思議な　ちからのある　カード。\n持たせると　技を受けた　相手を\n退場させることが　できる。"
    en: "A card with a mysterious power. When\nthe holder is struck by a foe, the\nattacker is removed from battle."
    fr: "Carte au pouvoir mystérieux.\nTenue, elle force un Pokémon touchant\nle porteur à se retirer du combat."
    it: "Cartellino dal potere misterioso.\nChi lo tiene fa ritirare dalla lotta\nil Pokémon che lo ha colpito."
    de: "Eine Karte mit mysteriösen Kräften.\nWird der Träger getroffen, wird der\nAngreifer des Platzes verwiesen."
    es: "Misteriosa tarjeta que permite al\nPokémon que la lleve expulsar al\nagresor cuando este le cause daño."
    ko: "이상한 힘이 있는 카드.\n지니게 하면 기술을 당한 상대를\n퇴장시킬 수 있다."
red_chain:
  names:
    jp_kana: あかいくさり
    jp_kanji: あかいくさり
    en: Red Chain
    fr: Chaîne Rouge
    it: Rossocatena
    de: Rote Kette
    es: Cadena Roja
    ko: 빨강쇠사슬
  descriptions:
    jp_kana: "シンオウちほうを　うみだした\nでんせつの　ポケモンを　つなぐと\nいわれる　しんわの　どうぐ。"
    jp_kanji: "シンオウ地方を　うみだした\n伝説の　ポケモンを　つなぐと\nいわれる　神話の　道具。"
    en: "A mythical chain that is said to link\nthe legendary Pokémon that created\nthe Sinnoh region."
    fr: "Chaîne mystique qui serait reliée au\nPokémon légendaire ayant créé la\nrégion de Sinnoh."
    it: "Catena mitica che pare essere\ncollegata al Pokémon leggendario\nche ha creato la regione di Sinnoh."
    de: "Diese mythische Kette ist angeblich\ndie Verbindung zu einem Legendären\nPokémon."
    es: "Se dice que esta cadena mítica está\nrelacionada con el Pokémon legendario\nque creó la región de Sinnoh."
    ko: "신오지방을 만들어낸\n전설의 포켓몬과 이어진다고\n전해지는 신화의 도구."
red_flute:
  names:
    jp_kana: あかいビードロ
    jp_kanji: あかいビードロ
    en: Red Flute
    fr: Flûte Rouge
    it: Flauto Rosso
    de: Rote Flöte
    es: Flauta Roja
    ko: 빨강비드로
  descriptions:
    jp_kana: "あかい　ガラスで　できている\nおもちゃの　ふえ。\nマニアが　たかく　かってくれる。"
    jp_kanji: "赤い　ガラスで　できている\nおもちゃの　笛。\nマニアが　高く　買ってくれる。"
    en: "A toy flute made from red glass.\nA maniac will buy it for a high price."
    fr: "Jouet en forme de flûte en verre\nrouge. Les amateurs en donnent\nun bon prix."
    it: "Flauto giocattolo fatto di vetro rosso.\nSi può vendere a un prezzo piuttosto\nalto agli intenditori."
    de: "Eine Spielzeugflöte aus rotem Glas.\nSammler geben ihr letztes Hemd dafür\nher."
    es: "Una flauta de juguete hecha de\ncristal rojo.\nMuy valorada por los coleccionistas."
    ko: "빨간 유리로 만들어진\n장난감 피리.\n마니아가 비싼 값에 산다."
red_orb:
  names:
    jp_kana: べにいろのたま
    jp_kanji: べにいろのたま
    en: Red Orb
    fr: Orbe Rouge
    it: Sfera Rossa
    de: Rote Kugel
    es: Esfera Roja
    ko: 주홍구슬
  descriptions:
    jp_kana: "ホウエンちほうの　でんせつと\nふかい　かかわりが　あると　いわれる\nあかく　かがやく　たま。"
    jp_kanji: "ホウエン地方の　伝説と\n深い　関わりが　あると　いわれる\nあかく　かがやく　たま。"
    en: "A shiny red orb that is said to have\na legend and has a deep connection with\nthe Hoenn region."
    fr: "Un orbe incarnat dont on dit qu’il a\nun lien très étroit avec les légendes\nde Hoenn."
    it: "Sfera con riflessi rossi, che pare\nessere strettamente legata alle\nleggende della regione di Hoenn."
    de: "Eine rot schimmernde Kugel,\nvon der in den Legenden der\nHoenn-Region berichtet wird."
    es: "Esfera carmesí de la que se dice que\nguarda una estrecha relación con las\nleyendas de Hoenn."
    ko: "호연지방의 전설과\n깊은 연관이 있다고 전해지는\n빨갛게 빛나는 구슬."
red_scale:
  names:
    jp_kana: あかいウロコ
    jp_kanji: あかいウロコ
    en: Red Scale
    fr: Écaillerouge
    it: Squama Rossa
    de: Rote Haut
    es: Escama Roja
    ko: 빨간비늘
  descriptions:
    jp_kana: "いかりのみずうみに　あらわれた\nあかい　ギャラドスの　ウロコ。\nほのおのように　あかく　かがやく。"
    jp_kanji: "怒りの湖に　あらわれた\nあかい　ギャラドスの　ウロコ。\nほのおのように　あかく　かがやく。"
    en: "A scale from the red Gyarados. It glows\nred like a flame."
    fr: "Une écaille du Léviator apparu au Lac\nColère. Elle rougeoie comme une flamme."
    it: "Una squama del Gyarados rosso apparso\nal Lago d’Ira. È rossa come il fuoco."
    de: "Eine Schuppe des roten Garados,\ndas im See des Zorns erschienen ist.\nSie glänzt rot wie Feuer."
    es: "Escama del Gyarados aparecido en\nel Lago de la Furia. Es de un rojo\ntan intenso como las llamas."
    ko: "분노의 호수에 나타난\n빨간 갸라도스의 비늘.\n불꽃처럼 빨갛게 빛난다."
red_scarf:
  names:
    jp_kana: あかいバンダナ
    jp_kanji: あかいバンダナ
    en: Red Scarf
    fr: Foul. Rouge
    it: Fascia Rossa
    de: Roter Schal
    es: Pañuelo Rojo
    ko: 빨강밴드
  descriptions:
    jp_kana: "もたせて　コンテストに　さんかすると\nその　ポケモンは　いつもより\nかっこよく　みられる。"
    jp_kanji: "持たせて　コンテストに　参加すると\nその　ポケモンは　いつもより\nかっこよく　みられる。"
    en: "An item to be held by a Pokémon.\nIt boosts the Cool aspect of the\nholder in a Contest."
    fr: "Objet à tenir. Augmente le Sang-froid\nd’un Pokémon dans les Concours."
    it: "Strumento da far tenere a un Pokémon.\nAumenta la “Classe” di chi lo tiene\nin una Gara."
    de: "Ein Item zum Tragen. Trainer erhöhen\ndamit in Wettbewerben die „Coolness“\nihres Pokémon."
    es: "Debe llevarlo un Pokémon.\nAumenta el carisma en los concursos."
    ko: "지니게 하여 콘테스트에 참가하면\n그 포켓몬은 여느 때보다\n근사하게 보인다."
red_shard:
  names:
    jp_kana: あかいかけら
    jp_kanji: あかいかけら
    en: Red Shard
    fr: Tesson Rouge
    it: Coccio Rosso
    de: Purpurstück
    es: Parte Roja
    ko: 빨강조각
  descriptions:
    jp_kana: "あかい　ちいさな　かけら。\nむかしに　つくられた　なにかの\nどうぐの　いちぶ　らしい。"
    jp_kanji: "赤い　小さな　かけら。\n昔に　つくられた　なにかの\n道具の　一部らしい。"
    en: "A small red shard.\nIt appears to be from some sort of\nimplement made long ago."
    fr: "Petit tesson rouge.\nIl semble provenir d’un outil très\nancien."
    it: "Un piccolo coccio rosso che con ogni\nprobabilità è un frammento di un antico\nstrumento."
    de: "Eine rote Scherbe eines antiken\nWerkzeugs, das vor langer Zeit\nangefertigt wurde."
    es: "Un pequeño fragmento rojo.\nParece formar parte de algún tipo\nde herramienta antigua."
    ko: "빨간 작은 조각.\n이전에 만들어진 어떤\n도구의 일부인 듯하다."
relic_band:
  names:
    jp_kana: こだいのうでわ
    jp_kanji: こだいのうでわ
    en: Relic Band
    fr: Vieux Bijou
    it: Bracciantico
    de: Alter Reif
    es: Brazal
    ko: 고대의팔찌
  descriptions:
    jp_kana: "３０００ねんほど　むかしの\nぶんめいで　つくられた　うでわ。\nマニアが　たかく　かってくれる。"
    jp_kanji: "３０００年ほど　昔の\n文明で　つくられた　腕輪。\nマニアが　高く　買ってくれる。"
    en: "A bracelet made in a civilization\nabout 3,000 years ago.\nA maniac will buy it for a high price."
    fr: "Un bijou d’une civilisation\nvieille de plus de 3 000 ans.\nLes amateurs en donnent un bon prix."
    it: "Braccialetto di circa 3000 anni fa.\nSi può vendere a un prezzo piuttosto\nalto agli intenditori."
    de: "Ein Armreif, angefertigt von einer\ngut 3 000 Jahre alten Kultur. Sammler\ngeben ihr letztes Hemd dafür."
    es: "Brazalete de más de tres mil años\nde antigüedad. Muy valorado por\nlos coleccionistas."
    ko: "3000년 정도 된\n오랜 문명에서 만들어진 팔찌.\n마니아가 비싼 값에 산다."
relic_copper:
  names:
    jp_kana: こだいのどうか
    jp_kanji: こだいのどうか
    en: Relic Copper
    fr: Vieux Sou
    it: Soldantico
    de: Alter Heller
    es: Real Cobre
    ko: 고대의동화
  descriptions:
    jp_kana: "３０００ねんほど　むかしの\nぶんめいで　つかわれた　どうか。\nマニアが　たかく　かってくれる。"
    jp_kanji: "３０００年ほど　昔の\n文明で　使われた　銅貨。\nマニアが　高く　買ってくれる。"
    en: "A copper coin used in a civilization\nabout 3,000 years ago.\nA maniac will buy it for a high price."
    fr: "Une pièce de cuivre d’une civilisation\nvieille de plus de 3 000 ans.\nLes amateurs en donnent un bon prix."
    it: "Moneta di rame di circa 3000 anni fa.\nSi può vendere a un prezzo piuttosto\nalto agli intenditori."
    de: "Eine alte Kupfermünze. Die Währung\neiner gut 3 000 Jahre alten Kultur.\nSammler geben ihr letztes Hemd dafür."
    es: "Moneda de cobre de más de tres mil\naños de antigüedad. Muy valorada\npor los coleccionistas."
    ko: "3000년 정도 된\n오랜 문명에서 사용된 동화.\n마니아가 비싼 값에 산다."
relic_crown:
  names:
    jp_kana: こだいのおうかん
    jp_kanji: こだいのおうかん
    en: Relic Crown
    fr: Vieux Tortil
    it: Coronantica
    de: Alte Krone
    es: Cor. Antigua
    ko: 고대의왕관
  descriptions:
    jp_kana: "３０００ねんほど　むかしの\nぶんめいで　つくられた　おうかん。\nマニアが　たかく　かってくれる。"
    jp_kanji: "３０００年ほど　昔の\n文明で　つくられた　王冠。\nマニアが　高く　買ってくれる。"
    en: "A crown made in a civilization\nabout 3,000 years ago.\nA maniac will buy it for a high price."
    fr: "Une couronne d’une civilisation\nvieille de plus de 3 000 ans.\nLes amateurs en donnent un bon prix."
    it: "Corona di circa 3000 anni fa.\nSi può vendere a un prezzo piuttosto\nalto agli intenditori."
    de: "Die Krone eines Königs, angefertigt von\neiner gut 3 000 Jahre alten Kultur.\nSammler geben ihr letztes Hemd dafür."
    es: "Corona de más de tres mil años\nde antigüedad. Muy valorada\npor los coleccionistas."
    ko: "3000년 정도 된\n오랜 문명에서 만들어진 왕관.\n마니아가 비싼 값에 산다."
relic_gold:
  names:
    jp_kana: こだいのきんか
    jp_kanji: こだいのきんか
    en: Relic Gold
    fr: Vieux Ducat
    it: Doblonantico
    de: Alter Dukat
    es: Real Oro
    ko: 고대의금화
  descriptions:
    jp_kana: "３０００ねんほど　むかしの\nぶんめいで　つかわれた　きんか。\nマニアが　たかく　かってくれる。"
    jp_kanji: "３０００年ほど　昔の\n文明で　使われた　金貨。\nマニアが　高く　買ってくれる。"
    en: "A gold coin used in a civilization\nabout 3,000 years ago.\nA maniac will buy it for a high price."
    fr: "Une pièce d’or d’une civilisation\nvieille de plus de 3 000 ans.\nLes amateurs en donnent un bon prix."
    it: "Moneta d’oro di circa 3000 anni fa.\nSi può vendere a un prezzo piuttosto\nalto agli intenditori."
    de: "Eine alte Goldmünze. Die Währung\neiner gut 3 000 Jahre alten Kultur.\nSammler geben ihr letztes Hemd dafür."
    es: "Moneda de oro de más de tres mil\naños de antigüedad. Muy valorada\npor los coleccionistas."
    ko: "3000년 정도 된\n오랜 문명에서 사용된 금화.\n마니아가 비싼 값에 산다."
relic_silver:
  names:
    jp_kana: こだいのぎんか
    jp_kanji: こだいのぎんか
    en: Relic Silver
    fr: Vieil Écu
    it: Ducatantico
    de: Alter Taler
    es: Real Plata
    ko: 고대의은화
  descriptions:
    jp_kana: "３０００ねんほど　むかしの\nぶんめいで　つかわれた　ぎんか。\nマニアが　たかく　かってくれる。"
    jp_kanji: "３０００年ほど　昔の\n文明で　使われた　銀貨。\nマニアが　高く　買ってくれる。"
    en: "A silver coin used in a civilization\nabout 3,000 years ago.\nA maniac will buy it for a high price."
    fr: "Une pièce d’argent d’une civilisation\nvieille de plus de 3 000 ans.\nLes amateurs en donnent un bon prix."
    it: "Moneta di argento di circa 3000 anni fa.\nSi può vendere a un prezzo piuttosto\nalto agli intenditori."
    de: "Eine alte Silbermünze. Die Währung\neiner gut 3 000 Jahre alten Kultur.\nSammler geben ihr letztes Hemd dafür."
    es: "Moneda de plata de más de tres mil\naños de antigüedad. Muy valorada\npor los coleccionistas."
    ko: "3000년 정도 된\n오랜 문명에서 사용된 은화.\n마니아가 비싼 값에 산다."
relic_statue:
  names:
    jp_kana: こだいのせきぞう
    jp_kanji: こだいのせきぞう
    en: Relic Statue
    fr: Vieux Santon
    it: Statuantica
    de: Alte Statue
    es: Efi. Antigua
    ko: 고대의석상
  descriptions:
    jp_kana: "３０００ねんほど　むかしの\nぶんめいで　つくられた　せきぞう。\nマニアが　たかく　かってくれる。"
    jp_kanji: "３０００年ほど　昔の\n文明で　つくられた　石像。\nマニアが　高く　買ってくれる。"
    en: "A stone figure made in a civilization\nabout 3,000 years ago.\nA maniac will buy it for a high price."
    fr: "Une statuette d’une civilisation\nvieille de plus de 3 000 ans.\nLes amateurs en donnent un bon prix."
    it: "Statua di circa 3000 anni fa.\nSi può vendere a un prezzo piuttosto\nalto agli intenditori."
    de: "Eine Statue, angefertigt von einer gut\n3 000 Jahre alten Kultur. Sammler\ngeben ihr letztes Hemd dafür."
    es: "Efigie de piedra de más de tres mil\naños de antigüedad. Muy valorada\npor los coleccionistas."
    ko: "3000년 정도 된\n오랜 문명에서 만들어진 석상.\n마니아가 비싼 값에 산다."
relic_vase:
  names:
    jp_kana: こだいのツボ
    jp_kanji: こだいのツボ
    en: Relic Vase
    fr: Vieux Vase
    it: Vasantico
    de: Alte Vase
    es: Ánfora
    ko: 고대의항아리
  descriptions:
    jp_kana: "３０００ねんほど　むかしの\nぶんめいで　つくられた　ツボ。\nマニアが　たかく　かってくれる。"
    jp_kanji: "３０００年ほど　昔の\n文明で　つくられた　ツボ。\nマニアが　高く　買ってくれる。"
    en: "A vase made in a civilization\nabout 3,000 years ago.\nA maniac will buy it for a high price."
    fr: "Un vase d’une civilisation\nvieille de plus de 3 000 ans.\nLes amateurs en donnent un bon prix."
    it: "Vaso di circa 3000 anni fa.\nSi può vendere a un prezzo piuttosto\nalto agli intenditori."
    de: "Eine Vase, angefertigt von einer\ngut 3 000 Jahre alten Kultur. Sammler\ngeben ihr letztes Hemd dafür."
    es: "Jarrón de más de tres mil años de\nantigüedad. Muy valorado por\nlos coleccionistas."
    ko: "3000년 정도 된\n오랜 문명에서 만들어진 항아리.\n마니아가 비싼 값에 산다."
repeat_ball:
  names:
    jp_kana: リピートボール
    jp_kanji: リピートボール
    en: Repeat Ball
    fr: Bis Ball
    it: Bis Ball
    de: Wiederball
    es: Acopio Ball
    ko: 리피드볼
  descriptions:
    jp_kana: "つかまえたことの　ある\nポケモンが　つかまえやすくなる\nちょっと　かわった　ボール。"
    jp_kanji: "捕まえたことの　ある\nポケモンが　捕まえやすくなる\nちょっと　変わった　ボール。"
    en: "A somewhat different Poké Ball that\nworks especially well on Pokémon\nspecies that were previously caught."
    fr: "Une Poké Ball un peu spéciale qui\nfonctionne particulièrement bien sur\nles espèces de Pokémon déjà capturées."
    it: "Poké Ball un po’ diversa. Risulta\nparticolarmente efficace sulle specie\ndi Pokémon già catturate in precedenza."
    de: "Ein Ball, der besonders dann sehr gut\nist, wenn man ein Pokémon fangen will,\ndessen Art bereits gefangen wurde."
    es: "Es algo distinta a las demás. Funciona\nespecialmente bien con las especies\nde Pokémon que ya has capturado."
    ko: "잡은 적이 있는\n포켓몬을 잡기 쉬운\n조금 특이한 볼."
repel:
  names:
    jp_kana: むしよけスプレー
    jp_kanji: むしよけスプレー
    en: Repel
    fr: Repousse
    it: Repellente
    de: Schutz
    es: Repelente
    ko: 벌레회피스프레이
  descriptions:
    jp_kana: "１００ぽ　すすむ　あいだ\nよわい　やせいの　ポケモンが\nまったく　でて　こなくなる。"
    jp_kanji: "１００歩　進む　あいだ\n弱い　野生の　ポケモンが\nまったく　でて　こなくなる。"
    en: "An item that prevents weak wild\nPokémon from appearing for 100 steps\nafter its use."
    fr: "Repousse les Pokémon sauvages\nfaibles pendant 100 pas."
    it: "Strumento che evita l’incontro con i\nPokémon selvatici deboli per 100 passi\ndopo l’utilizzo."
    de: "Hält 100 Schritte lang schwache,\nwilde Pokémon ab."
    es: "Repele Pokémon salvajes débiles\nen un recorrido de 100 pasos."
    ko: "100보 걸어가는 동안\n약한 야생 포켓몬이\n전혀 나오지 않게 된다."
reply_mail:
  names:
    jp_kana: おかえしメール
    jp_kanji: おかえしメール
    en: Reply Mail
    fr: Let. Réponse
    it: Mess. Risp.
    de: Rückbrief
    es: C. Respuesta
    ko: 답장메일
  descriptions:
    jp_kana: "もらった　メールへの　おかえしが\nかきやすい　びんせん。\nポケモンに　もたせて　つかう。"
    jp_kanji: "もらった　メールへの　お返しが\n書きやすい　レターペーパー。\nポケモンに　持たせて　使う。"
    en: "Stationery designed for\nwriting a reply.\nLet a Pokémon hold it for delivery."
    fr: "Un papier à lettres idéal pour répondre\nà un autre courrier. Peut être tenu\net livré par un Pokémon."
    it: "Carta da lettera ideale per scrivere\nuna risposta ad un messaggio.\nUn Pokémon può tenerla e consegnarla."
    de: "Briefpapier, mit dem man einen\nanderen Brief beantworten kann.\nGib es einem Pokémon zum Tragen."
    es: "Carta para responder a un mensaje.\nHaz que la entregue un Pokémon."
    ko: "받은 메일에 대한 답장을\n쉽게 쓸 수 있는 편지지.\n포켓몬에게 지니게 해서 쓴다."
reset_urge:
  names:
    jp_kana: フラットコール
    jp_kanji: フラットコール
    en: Reset Urge
    fr: Réamorçage
    it: Ripristino
    de: Umkehrappell
    es: Quitaestado
    ko: 플랫콜
  descriptions:
    jp_kana: "つかうと　みかたの　ポケモンの\nのうりょく　へんかが　もとにもどる。"
    jp_kanji: "使うと　味方の　ポケモンの\n能力変化が　元に　戻る。"
    en: "When used, it restores any stat\nchanges of an ally Pokémon."
    fr: "Permet d’annuler les variations de\nstats d’un Pokémon de l’équipe."
    it: "Usandolo tutte le modifiche alle\nstatistiche di un Pokémon della\nsquadra saranno annullate."
    de: "Hebt bei Gebrauch Statusveränderungen\ndeines Mitstreiters auf."
    es: "Cuando se usa, se anulan los cambios\nen las características de un Pokémon\nde tu equipo."
    ko: "사용하면 같은 편 포켓몬의\n능력 변화가 원래대로 되돌아간다."
resist_feather:
  names:
    jp_kana: ていこうのハネ
    jp_kanji: ていこうのハネ
    en: Resist Wing
    fr: Aile Armure
    it: Piumtutela
    de: Abwehrfeder
    es: P. Aguante
    ko: 저항력날개
  descriptions:
    jp_kana: "ポケモンに　つかう　どうぐ。\nポケモン　１ひきの　ぼうぎょの\nきそポイントを　ちょっと　あげる。"
    jp_kanji: "ポケモンに　使う　道具。\nポケモン　１匹の　防御の\n基礎ポイントを　ちょっと　あげる。"
    en: "An item for use on a Pokémon. It\nslightly increases the base Defense\nstat of a single Pokémon."
    fr: "Objet à utiliser sur un Pokémon.\nIl augmente un peu sa Défense\nde base."
    it: "Strumento da usare su un Pokémon.\nNe aumenta di poco la Difesa di base."
    de: "Schenkt man einem Pokémon dieses\nItem, wird dessen Verteidigungs-Wert\ndauerhaft erhöht."
    es: "Pluma que aumenta un poco la Defensa\nde un Pokémon al subir de nivel."
    ko: "포켓몬에게 사용하는 도구.\n포켓몬 1마리의 방어\n기초 포인트를 조금 올린다."
reveal_glass:
  names:
    jp_kana: うつしかがみ
    jp_kanji: うつしかがみ
    en: Reveal Glass
    fr: Miroir Sacré
    it: Verispecchio
    de: Wahrspiegel
    es: Espejo Veraz
    ko: 비추는거울
  descriptions:
    jp_kana: "しんじつを　うつしだすことで\nポケモンを　ほんらいの　すがたに\nかえてしまう　ふしぎな　かがみ。"
    jp_kanji: "真実を　映しだすことで\nポケモンを　本来の　姿に\n変えてしまう　不思議な　鏡。"
    en: "A glass that reveals the truth.\nIt is a mysterious glass that returns\na Pokémon back to its original shape."
    fr: "Un mystérieux miroir qui, en reflétant\nla vérité, permet de redonner à un\nPokémon sa forme originelle."
    it: "Specchio misterioso che, riflettendo\nla verità, fa riacquistare ai Pokémon\nla loro forma originaria."
    de: "Ein mysteriöser Spiegel, der Pokémon\nin ihre eigentliche Form verwandelt,\nindem er die Wahrheit widerspiegelt."
    es: "Espejo misterioso que refleja la verdad\ny devuelve los Pokémon a su forma\noriginal."
    ko: "진실을 비춰줌으로\n포켓몬을 본래의 모습으로\n바꿔버리는 이상한 거울."
revival_herb:
  names:
    jp_kana: ふっかつそう
    jp_kanji: ふっかつそう
    en: Revival Herb
    fr: Herbe Rappel
    it: Vitalerba
    de: Vitalkraut
    es: Hierba Rev.
    ko: 부활초
  descriptions:
    jp_kana: "とても　にがい　やくそう。\nひんしの　ポケモン　１ひきの\nＨＰを　すべて　かいふくする。"
    jp_kanji: "とても　にがい　薬草。\nひんしの　ポケモン　１匹の\nＨＰを　すべて　回復する。"
    en: "A very bitter medicinal herb.\nIt revives a fainted Pokémon, fully\nrestoring its HP."
    fr: "Une herbe médicinale très amère.\nRanime un Pokémon K.O. et restaure\ntous ses PV."
    it: "Erba medicinale amarissima.\nRianima un Pokémon esausto e gli\nrestituisce tutti i PS."
    de: "Ein bitteres medizinisches Kraut, das\nkampfunfähige Pokémon belebt und\ndie KP vollständig auffüllt."
    es: "Hierba muy amarga que reanima a\nun Pokémon debilitado y restaura\ntodos sus PS."
    ko: "매우 쓴 약초.\n기절한 포켓몬 1마리의\nHP를 모두 회복한다."
revive:
  names:
    jp_kana: げんきのかけら
    jp_kanji: げんきのかけら
    en: Revive
    fr: Rappel
    it: Revitaliz.
    de: Beleber
    es: Revivir
    ko: 기력의조각
  descriptions:
    jp_kana: "ひんしに　なってしまった\nポケモン　１ひきの　ＨＰを\nはんぶんまで　かいふくする。"
    jp_kanji: "ひんしに　なってしまった\nポケモン　１匹の　ＨＰを\n半分まで　回復する。"
    en: "A medicine that revives a fainted\nPokémon. It restores half the\nPokémon’s maximum HP."
    fr: "Un médicament qui ranime un Pokémon\nK.O. et restaure la moitié de ses PV\nmax."
    it: "Rimedio che rianima un Pokémon esausto\ne gli restituisce metà dei suoi\nPS massimi."
    de: "Eine Medizin, die ein kampfunfähiges\nPokémon wiederbelebt. Die Hälfte der\nmaximalen KP wird wiederhergestellt."
    es: "Medicina que reanima a un Pokémon\ndebilitado y restaura la mitad de\nsus PS máximos."
    ko: "기절해 버린\n포켓몬 1마리의 HP를\n절반까지 회복한다."
rindo_berry:
  names:
    jp_kana: リンドのみ
    jp_kanji: リンドのみ
    en: Rindo Berry
    fr: Baie Ratam
    it: Baccarindo
    de: Grindobeere
    es: Baya Tamar
    ko: 린드열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　くさ　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　くさ技を\n受けたとき　威力が　弱まる。"
    en: "Weakens a supereffective Grass-type\nattack against the holding Pokémon."
    fr: "Tenue, cette Baie affaiblit une attaque\nennemie super efficace de type Plante."
    it: "Se tenuta da un Pokémon, indebolisce\nl’attacco superefficace di tipo Erba\ndel nemico."
    de: "Als getragenes Item schwächt diese\nBeere besonders effektive Attacken\ndes Angreifers vom Typ Pflanze."
    es: "Si la lleva un Pokémon, debilita un\nataque supereficaz de tipo Planta\nde un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 뛰어난 풀 기술을\n당했을 때 위력이 약해진다."
ring_target:
  names:
    jp_kana: ねらいのまと
    jp_kanji: ねらいのまと
    en: Ring Target
    fr: Pt de Mire
    it: Facilsaglio
    de: Zielscheibe
    es: Blanco
    ko: 겨냥표적
  descriptions:
    jp_kana: "ポケモンの　タイプの　あいしょうで\nむこう　だった　わざが\nあたるように　なってしまう。"
    jp_kanji: "ポケモンの　タイプの　相性で\n無効だった　技が\n当たるように　なってしまう。"
    en: "Moves that would otherwise have no\neffect will land on the Pokémon that\nholds it."
    fr: "Un Pokémon tenant cet objet devient\nsensible aux capacités autrement\ninefficaces en raison de son type."
    it: "Se un Pokémon ha questo strumento, le\nmosse che di norma non hanno effetto\ncontro il suo tipo vanno a segno."
    de: "Attacken, die aufgrund der Wechsel-\nwirkungen zwischen den Typen keine\nWirkung haben, treffen den Träger."
    es: "El Pokémon que lo lleva es vulnerable\nfrente a movimientos que normalmente\nno afectan a su tipo."
    ko: "포켓몬 타입의 상성 때문에\n무효였던 기술이\n맞게 되어 버린다."
rock_gem:
  names:
    jp_kana: いわのジュエル
    jp_kanji: いわのジュエル
    en: Rock Gem
    fr: Joyau Roche
    it: Bijouroccia
    de: Gesteinjuwel
    es: G. Roca
    ko: 바위주얼
  descriptions:
    jp_kana: "いわの　タイプの　ジュエル。\nもたせると　いちどだけ　いわの\nわざの　いりょくが　つよまる。"
    jp_kanji: "いわの　タイプの　ジュエル。\n持たせると　１度だけ　いわの\n技の　威力が　強まる。"
    en: "A gem with an essence of rock. When\nheld, it strengthens the power of a\nRock-type move only once."
    fr: "Objet à tenir. Joyau augmentant\nune fois la puissance des capacités\nde type Roche."
    it: "Strumento da far tenere a un Pokémon.\nGioiello che potenzia una sola volta\nle mosse di tipo Roccia."
    de: "Ein Juwel vom Typ Gestein. Es\nerhöht einmalig die Stärke\neiner Attacke vom Typ Gestein."
    es: "Joya de un solo uso que potencia\nlos movimientos de tipo Roca.\nDebe llevarla un Pokémon."
    ko: "바위타입의 주얼.\n지니게 하면 한 번만 바위\n기술의 위력이 강해진다."
rock_incense:
  names:
    jp_kana: がんせきおこう
    jp_kanji: がんせきおこう
    en: Rock Incense
    fr: Encens Roc
    it: Roccioaroma
    de: Steinrauch
    es: Incie. Roca
    ko: 암석향로
  descriptions:
    jp_kana: "ふしぎな　かおりの　おこう。\nもたせると　いわタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "不思議な　香りの　御香。\n持たせると　いわタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon. It is\nan exotic-smelling incense that boosts\nthe power of Rock-type moves."
    fr: "Objet à tenir. Encens au parfum\nexotique augmentant la puissance\ndes capacités de type Roche."
    it: "Strumento da far tenere a un Pokémon.\nIncenso dal profumo esotico che\npotenzia le mosse di tipo Roccia."
    de: "Ein Item zum Tragen. Dieses\nexotische Duftkraut verstärkt\nAttacken vom Typ Gestein."
    es: "Incienso de exótico aroma que fortalece\nlos movimientos de tipo Roca.\nDebe llevarlo un Pokémon."
    ko: "이상한 향기의 향로.\n지니게 하면 바위타입\n기술의 위력이 올라간다."
rocky_helmet:
  names:
    jp_kana: ゴツゴツメット
    jp_kanji: ゴツゴツメット
    en: Rocky Helmet
    fr: Casque Brut
    it: Bitorzolelmo
    de: Beulenhelm
    es: Cas. Dentado
    ko: 울퉁불퉁멧
  descriptions:
    jp_kana: "ポケモンに　もたせると\nだげきわざを　うけたとき\nあいてにも　ダメージを　あたえる。"
    jp_kanji: "ポケモンに　持たせると\n打撃技を　受けたとき\n相手にも　ダメージを　あたえる。"
    en: "If the holder of this item takes damage,\nthe attacker will also be damaged\nupon contact."
    fr: "Tenu, cet objet inflige des dégâts\nà l’attaquant si ce dernier utilise une\nattaque physique qui atteint son but."
    it: "Se il Pokémon che lo tiene è colpito da\nun attacco fisico, anche l’avversario\nsubisce dei danni."
    de: "Wird der Träger von einer physischen\nAttacke getroffen, erhält der\nAngreifer ebenfalls Schaden."
    es: "Si el portador es alcanzado por un\nataque físico, el agresor también\nrecibe daño."
    ko: "포켓몬에게 지니게 하면\n타격 기술을 당했을 때\n상대에게도 데미지를 준다."
root_fossil:
  names:
    jp_kana: ねっこのカセキ
    jp_kanji: ねっこのカセキ
    en: Root Fossil
    fr: Foss. Racine
    it: Radifossile
    de: Wurzelfossil
    es: Fósil Raíz
    ko: 뿌리화석
  descriptions:
    jp_kana: "おおむかし　うみに　すんでいた\nこだい　ポケモンの　カセキ。\nねっこの　いちぶ　らしい。"
    jp_kanji: "大昔　海に　すんでいた\n古代ポケモンの　カセキ。\nねっこの　一部らしい。"
    en: "A fossil of an ancient Pokémon that\nlived in the sea. It appears to be\npart of a plant root."
    fr: "Fossile d’un ancien Pokémon aquatique.\nOn dirait un morceau de racine de\nplante."
    it: "Fossile di un antico Pokémon che\nviveva in mare. Sembra essere\nparte di una radice."
    de: "Das Fossil eines uralten Pokémon,\ndas in der Tiefsee lebte. Es sieht\nwie eine Pflanzenwurzel aus."
    es: "Fósil de un Pokémon ancestral que\nvivió en el fondo del mar. Parece\nser parte de una raíz."
    ko: "오랜 옛날 바다에 살았던\n고대 포켓몬의 화석.\n뿌리의 일부인 듯하다."
rose_incense:
  names:
    jp_kana: おはなのおこう
    jp_kanji: おはなのおこう
    en: Rose Incense
    fr: Encens Fleur
    it: Rosaroma
    de: Rosenrauch
    es: Inc. Floral
    ko: 꽃향로
  descriptions:
    jp_kana: "ふしぎな　かおりの　おこう。\nもたせると　くさタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "不思議な　香りの　御香。\n持たせると　くさタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon. It is\nan exotic-smelling incense that boosts\nthe power of Grass-type moves."
    fr: "Objet à tenir. Encens au parfum\nexotique augmentant la puissance\ndes capacités de type Plante."
    it: "Strumento da far tenere a un Pokémon.\nIncenso dal profumo esotico che\npotenzia le mosse di tipo Erba."
    de: "Ein Item zum Tragen. Dieses\nexotische Duftkraut verstärkt\nAttacken vom Typ Pflanze."
    es: "Incienso de exótico aroma que fortalece\nlos movimientos de tipo Planta.\nDebe llevarlo un Pokémon."
    ko: "이상한 향기의 향로.\n지니게 하면 풀타입\n기술의 위력이 올라간다."
rowap_berry:
  names:
    jp_kana: レンブのみ
    jp_kanji: レンブのみ
    en: Rowap Berry
    fr: Baie Pommo
    it: Baccaroam
    de: Roselbeere
    es: Baya Magua
    ko: 애터열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nとくしゅわざを　うけたとき\nあいてにも　ダメージを　あたえる。"
    jp_kanji: "ポケモンに　持たせると\n特殊技を　受けたとき\n相手にも　ダメージを　あたえる。"
    en: "If held by a Pokémon and a special\nattack lands, the attacker also\ntakes damage."
    fr: "Tenue, cette Baie inflige des dégâts\nà l’ennemi s’il utilise une attaque\nspéciale qui atteint son but."
    it: "Se tenuta da un Pokémon, il nemico\nsubirà danni se il suo attacco speciale\nva a segno."
    de: "Als getragenes Item bewirkt die Beere\nSchaden bei denen, die den Träger\nmit einer Spezial-Attacke treffen."
    es: "Si la lleva un Pokémon cuando otro\nlanza un ataque especial, este último\ntambién recibe daño."
    ko: "포켓몬에게 지니게 하면\n특수 기술을 당했을 때\n상대에게도 데미지를 준다."
rsvp_mail:
  names:
    jp_kana: おさそいメール
    jp_kanji: おさそいメール
    en: RSVP Mail
    fr: Lettre Invit
    it: Mess. Invito
    de: Einladebrief
    es: C. Invitar
    ko: 권유메일
  descriptions:
    jp_kana: "あいてを　おさそいする　メールが\nかきやすい　びんせん。\nポケモンに　もたせて　つかう。"
    jp_kanji: "相手を　お誘いする　メールが\n書きやすい　レターペーパー。\nポケモンに　持たせて　使う。"
    en: "Stationery designed for\ninvitations.\nLet a Pokémon hold it for delivery."
    fr: "Un papier à lettres idéal pour\nles invitations. Peut être tenu\net livré par un Pokémon."
    it: "Carta da lettera ideale per scrivere\nun invito a qualcuno. Un Pokémon può\ntenerla e consegnarla."
    de: "Briefpapier, mit dem man eine andere\nPerson zu etwas einladen kann.\nGib es einem Pokémon zum Tragen."
    es: "Carta para invitar a un compañero.\nHaz que la entregue un Pokémon."
    ko: "상대를 초대하는 메일을\n쉽게 쓸 수 있는 편지지.\n포켓몬에게 지니게 해서 쓴다."
rule_book:
  names:
    jp_kana: ルールブック
    jp_kanji: ルールブック
    en: Rule Book
    fr: Livre Règles
    it: Libro Regole
    de: Regelbuch
    es: Reglamento
    ko: 룰북
  descriptions:
    jp_kana: "たいせんの　ルールが　かかれている。\nつうしんたいせん　するとき\nルールを　えらぶことが　できる。"
    jp_kanji: "対戦の　ルールが　かかれている。\n通信対戦するとき\nルールを　選ぶことが　できる。"
    en: "It lists the rules for holding battles.\nFor linked battles, you may choose\nwhich set of rules you wish to use."
    fr: "La liste des règles de combat. Vous\npouvez choisir les règles des combats\nen Link."
    it: "Elenca le regole per le lotte. Infatti,\nnelle lotte in link puoi scegliere diversi\nset di regole da utilizzare."
    de: "Enthält die Kampfregeln.\nBei Link-Kämpfen kannst du daraus\ndie gewünschten Regeln wählen."
    es: "Recoge las normas de los combates. En\nlos combates en conexión puedes elegir\nel conjunto de reglas que quieres usar."
    ko: "대전에 대한 룰이 적혀 있다.\n통신대전을 할 때\n룰을 선택할 수 있다."
sacred_ash:
  names:
    jp_kana: せいなるはい
    jp_kanji: せいなるはい
    en: Sacred Ash
    fr: Cendresacrée
    it: Ceneremagica
    de: Zauberasche
    es: Cen. Sagrada
    ko: 성스러운분말
  descriptions:
    jp_kana: "ひんしに　なってしまった\nポケモン　ぜんいんの　ＨＰを\nすべて　かいふくする。"
    jp_kanji: "ひんしに　なってしまった\nポケモン　全員の　ＨＰを\nすべて　回復する。"
    en: "It revives all fainted Pokémon.\nIn doing so, it also fully restores\ntheir HP."
    fr: "Ranime tous les Pokémon K.O. et\nrestaure tous leurs PV."
    it: "Rianima tutti i Pokémon esausti,\nrestituendo loro anche tutti i PS."
    de: "Belebt und erfrischt alle besiegten\nPokémon und füllt deren KP\nvollständig wieder auf."
    es: "Reanima completamente a todos los\nPokémon debilitados y restaura\ntodos sus PS."
    ko: "기절해 버린\n포켓몬 전원의 HP를\n모두 회복한다."
safari_ball:
  names:
    jp_kana: サファリボール
    jp_kanji: サファリボール
    en: Safari Ball
    fr: Safari Ball
    it: Safari Ball
    de: Safariball
    es: Safari Ball
    ko: 사파리볼
  descriptions:
    jp_kana: "だいしつげんの　なか　だけで\nつかう　とくべつな　ボール。\nめいさいがらに　なっている。"
    jp_kanji: "大湿原の　中だけで\n使う　特別な　ボール。\n迷彩柄に　なっている。"
    en: "A special Poké Ball that is used only in\nthe Great Marsh. It is decorated in a\ncamouflage pattern."
    fr: "Une Poké Ball spéciale dont l’usage\nest réservé au Parc Safari. Elle est\ndécorée d’un motif camouflage."
    it: "Poké Ball speciale, usata soltanto\nnella Gran Palude. È decorata con\nun motivo mimetico."
    de: "Ein Ball, der nur in der Safari-Zone\neingesetzt wird. Er besticht durch\nsein Tarnfarbenmuster."
    es: "Poké Ball con un diseño de camuflaje\nque se utiliza únicamente en el Gran\nPantano."
    ko: "대습초원 안에서만\n쓰는 특별한 볼.\n얼룩무늬로 되어 있다."
salac_berry:
  names:
    jp_kana: カムラのみ
    jp_kanji: カムラのみ
    en: Salac Berry
    fr: Baie Sailak
    it: Baccasalak
    de: Salkabeere
    es: Baya Aslac
    ko: 캄라열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nピンチのとき　じぶんの\nすばやさが　あがる。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　自分の\n素早さが　あがる。"
    en: "If held by a Pokémon, it raises its\nSpeed stat in a pinch."
    fr: "Tenue, cette Baie monte la Vitesse\nen cas de besoin."
    it: "Aumenta la Velocità, se il Pokémon che\nla tiene si trova in difficoltà."
    de: "Als getragenes Item erhöht diese Beere\nden Initiative-Wert eines Pokémon,\nsobald es in einer Notlage steckt."
    es: "Si la lleva un Pokémon, le sube\nla Velocidad en un momento de apuro."
    ko: "포켓몬에게 지니게 하면\n위급할 때 자신의\n스피드가 올라간다."
scope_lens:
  names:
    jp_kana: ピントレンズ
    jp_kanji: ピントレンズ
    en: Scope Lens
    fr: Lentilscope
    it: Mirino
    de: Scope-Linse
    es: Periscopio
    ko: 초점렌즈
  descriptions:
    jp_kana: "じゃくてんが　みえる　レンズ。\nもたせた　ポケモンの　わざが\nきゅうしょに　あたりやすくなる。"
    jp_kanji: "弱点が　みえる　レンズ。\n持たせた　ポケモンの　技が\n急所に　当たりやすくなる。"
    en: "An item to be held by a Pokémon.\nIt is a lens that boosts the holder’s\ncritical-hit ratio."
    fr: "Objet à tenir. Lentille qui augmente le\ntaux de critiques du porteur."
    it: "Strumento da far tenere a un Pokémon.\nLente che aumenta le probabilità per chi\nla tiene di sferrare dei brutti colpi."
    de: "Ein Item, das einem Pokémon zum\nTragen gegeben werden kann. Es\nerhöht die Volltrefferquote."
    es: "Su lente aumenta la probabilidad que\ntiene el Pokémon que lo lleva de\nconseguir un golpe crítico."
    ko: "약점이 보이는 렌즈.\n지니게 한 포켓몬의 기술이\n급소에 맞기 쉬워진다."
sea_incense:
  names:
    jp_kana: うしおのおこう
    jp_kanji: うしおのおこう
    en: Sea Incense
    fr: Encens Mer
    it: Marearoma
    de: Seerauch
    es: Incie. Mar.
    ko: 바닷물향로
  descriptions:
    jp_kana: "ふしぎな　かおりの　おこう。\nもたせると　みずタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "不思議な　香りの　御香。\n持たせると　みずタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon. It is\nincense with a curious aroma that\nboosts the power of Water-type moves."
    fr: "Objet à tenir. Encens au parfum curieux\nqui augmente la puissance des capacités\nde type Eau."
    it: "Strumento da far tenere a un Pokémon.\nIncenso dal curioso aroma che potenzia\nle mosse di tipo Acqua."
    de: "Ein Item zum Tragen. Sein\nausgefallenes Aroma verstärkt\nAttacken vom Typ Wasser."
    es: "Tiene un curioso aroma que potencia\nlos movimientos de tipo Agua.\nDebe llevarlo un Pokémon."
    ko: "이상한 향기의 향로.\n지니게 하면 물타입\n기술의 위력이 올라간다."
secret_key:rotoms_room:
  names:
    jp_kana: ひみつのカギ
    jp_kanji: ひみつのカギ
    en: Secret Key
    fr: Clé Secrète
    it: Chiave Segr.
    de: ?-Öffner
    es: Ll. Secreta
    ko: 비밀의열쇠
  descriptions:
    jp_kana: "きまった　ばしょで　つかうことで\nとくしゅな　でんきしんごうを　だして\nとびらを　あける　ハイテクな　カギ。"
    jp_kanji: "決まった　場所で　使うことで\n特殊な　電気信号を　だして\n扉を　開ける　ハイテクな　カギ。"
    en: "A high-tech key that has to be used at\na specific location. It emits a special\nelectric signal to open a door."
    fr: "Clé destinée à une serrure très\ncomplexe. Ouvre une porte en\ntransmettant un signal électrique."
    it: "Una sofisticata chiave da usare in un\ndeterminato luogo. Emette un impulso\nelettrico speciale per aprire una porta."
    de: "Ein besonderer Schlüssel, der an\neinem speziellen Ort Türen durch\nein elektrisches Signal öffnet."
    es: "Una llave de alta tecnología que debe\nusarse en un lugar concreto. Emite una\nseñal eléctrica que abre una puerta."
    ko: "정해진 장소에서 쓰는 것으로\n특수한 전기 신호를 내어\n문을 여는 첨단기술의 열쇠."
secret_medicine:
  names:
    jp_kana: ひでんのくすり
    jp_kanji: ひでんのくすり
    en: SecretPotion
    fr: Potionsecret
    it: Poz. Segreta
    de: Geheimtrank
    es: Poc. Secreta
    ko: 비전신약
  descriptions:
    jp_kana: "タンバシティの　くすりやで　もらった\nどんな　ポケモンでも　たちまち\nげんきになる　すごい　くすり。"
    jp_kanji: "タンバシティの　薬屋で　もらった\nどんな　ポケモンでも　たちまち\nげんきになる　すごい　くすり。"
    en: "A fantastic medicine dispensed by the\npharmacy in Cianwood City. It fully\nheals a Pokémon of any ailment."
    fr: "Médicament génial vendu à la pharmacie\nd’Irisia. Soigne totalement un Pokémon\nde tout problème de statut."
    it: "Rimedio fantastico distribuito dalla\nfarmacia a Fiorlisopoli. Cura i problemi\ndi qualunque Pokémon."
    de: "Eine fantastische Medizin aus\nAnemonia City. Heilt und kuriert\nein Pokémon vollständig."
    es: "Fantástico medicamento vendido en la\nfarmacia de Ciudad Orquídea. Cura\ncompletamente un Pokémon."
    ko: "진청시티의 약국에서 받은\n어떤 포켓몬이라도 금방\n건강해지는 대단한 약."
sharp_beak:
  names:
    jp_kana: するどいくちばし
    jp_kanji: するどいくちばし
    en: Sharp Beak
    fr: Bec Pointu
    it: Beccaffilato
    de: Hackattack
    es: Pico Afilado
    ko: 예리한부리
  descriptions:
    jp_kana: "ながく　とがった　くちばし。\nもたせると　ひこうタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "長く　とがった　くちばし。\n持たせると　ひこうタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon.\nIt is a long, sharp beak that boosts\nthe power of Flying-type moves."
    fr: "Objet à tenir. Bec long et pointu\nmontant la puissance des capacités\nde type Vol."
    it: "Strumento da far tenere a un Pokémon.\nBecco lungo e affilato che potenzia\nle mosse di tipo Volante."
    de: "Ein Item zum Tragen. Ein langer,\nscharfer Schnabel verstärkt\nAttacken vom Typ Flug."
    es: "Pico largo y afilado que aumenta la\npotencia de los movimientos de tipo\nVolador. Debe llevarlo un Pokémon."
    ko: "길고 뾰족한 부리.\n지니게 하면 비행타입\n기술의 위력이 올라간다."
shed_shell:
  names:
    jp_kana: きれいなぬけがら
    jp_kanji: きれいなぬけがら
    en: Shed Shell
    fr: Carapace Mue
    it: Disfoguscio
    de: Wechselhülle
    es: Muda Concha
    ko: 아름다운허물
  descriptions:
    jp_kana: "じょうぶで　かたい　ぬけがら。\nもたせた　ポケモンは　ひかえの\nポケモンと　かならず　いれかわれる。"
    jp_kanji: "丈夫で　硬い　ぬけがら。\n持たせた　ポケモンは　控えの\nポケモンと　必ず　いれかわれる。"
    en: "A tough, discarded carapace to be held\nby a Pokémon. It enables the holder to\nswitch with a waiting Pokémon in battle."
    fr: "Objet à tenir. Carapace dure qui permet\nau porteur de se retirer même s’il est\naffecté par une attaque immobilisante."
    it: "Un Pokémon con questo robusto guscio\npuò sfuggire al nemico anche se questi\nha usato mosse o abilità intrappolanti."
    de: "Ein Item zum Tragen. Dieser harte\nPanzer ermöglicht den Austausch des\nTrägers gegen ein wartendes Pokémon."
    es: "En combate, esta concha desechada\nsirve para que un Pokémon se cambie\npor otro que no esté combatiendo."
    ko: "튼튼하고 단단한 허물.\n지니게 한 포켓몬은 교대\n포켓몬과 반드시 교체할 수 있다."
shell_bell:
  names:
    jp_kana: かいがらのすず
    jp_kanji: かいがらのすず
    en: Shell Bell
    fr: Grelot Coque
    it: Conchinella
    de: Seegesang
    es: Camp. Concha
    ko: 조개껍질방울
  descriptions:
    jp_kana: "もたせた　ポケモンが　こうげきして\nあいてに　ダメージを　あたえたとき\nＨＰを　すこし　かいふく　できる。"
    jp_kanji: "持たせた　ポケモンが　攻撃して\n相手に　ダメージを　あたえたとき\nＨＰを　少し　回復できる。"
    en: "An item to be held by a Pokémon.\nThe holder’s HP is restored a little\nevery time it inflicts damage."
    fr: "Objet à tenir. Restaure un peu les PV\ndu porteur à chaque fois qu’il inflige\ndes dégâts."
    it: "Strumento da far tenere a un Pokémon.\nChi lo tiene recupera un po’ di PS\nogni volta che infligge danni."
    de: "Ein Item zum Tragen. Es stellt einige\nKP des Trägers immer dann wieder her,\nwenn dieser dem Ziel Schaden zufügt."
    es: "Debe llevarla un Pokémon.\nCada vez que este inflige daño,\nrecupera algunos PS."
    ko: "지니게 한 포켓몬이 공격하여\n상대에게 데미지를 줬을 때\nHP를 조금 회복할 수 있다."
shiny_charm:
  names:
    jp_kana: ひかるおまもり
    jp_kanji: ひかるおまもり
    en: Shiny Charm
    fr: CharmeChroma
    it: Cromamuleto
    de: Schillerpin
    es: Amuleto Iris
    ko: 빛나는부적
  descriptions:
    jp_kana: "もっていると　ひかる　ポケモンと\nであいやすくなる　といわれる\nふしぎで　ひかりかがやく　おまもり。"
    jp_kanji: "持っていると　ひかる　ポケモンと\n出会いやすくなる　といわれる\n不思議で　ひかりかがやく　おまもり。"
    en: "A shiny charm said to increase\nthe chance of finding a\nShiny Pokémon."
    fr: "Un mystérieux charme scintillant qui\nfacilite la rencontre avec les Pokémon\nchromatiques."
    it: "Misterioso amuleto luminoso che\naumenta la probabilità di incontrare\nPokémon cromatici."
    de: "Ein mysteriöser, schillernder Glücks-\nbringer, der die Wahrscheinlichkeit\nerhöht, Schillernde Pokémon zu finden."
    es: "Misterioso amuleto brillante que\naumenta la probabilidad de encontrar\nPokémon variocolores."
    ko: "지니고 있으면 빛나는 포켓몬과\n만나기 쉬워진다고 전해지는\n이상하고 매우 반짝이는 부적."
shiny_stone:
  names:
    jp_kana: ひかりのいし
    jp_kanji: ひかりのいし
    en: Shiny Stone
    fr: Pierre Éclat
    it: Pietrabrillo
    de: Leuchtstein
    es: Piedra Día
    ko: 빛의돌
  descriptions:
    jp_kana: "ある　とくていの　ポケモンを\nしんかさせる　ふしぎな　いし。\nひかりのように　まぶしい。"
    jp_kanji: "ある　特定の　ポケモンを\n進化させる　不思議な　石。\nひかりのように　まぶしい。"
    en: "A peculiar stone that makes certain\nspecies of Pokémon evolve.\nIt shines with a dazzling light."
    fr: "Pierre étrange qui fait évoluer\ncertaines espèces de Pokémon. Elle\nbrille d’une lumière aveuglante."
    it: "Pietra particolare che fa evolvere\ndeterminate specie di Pokémon.\nBrilla di una luce abbagliante."
    de: "Dieser besondere, hell leuchtende\nStein hilft manchen Pokémon bei\nihrer Evolution."
    es: "Una piedra peculiar que hace\nevolucionar a algunos Pokémon.\nTiene un brillo espectacular."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 돌.\n빛처럼 눈부시다."
shoal_salt:
  names:
    jp_kana: あさせのしお
    jp_kanji: あさせのしお
    en: Shoal Salt
    fr: Sel Tréfonds
    it: Sale Ondoso
    de: Küstensalz
    es: Sal Cardumen
    ko: 여울소금
  descriptions:
    jp_kana: "あさせのほらあな　という　ばしょで\nみつかる　きれいな　しお。\nマニアが　たかく　かってくれる。"
    jp_kanji: "浅瀬の洞穴という　場所で\nみつかる　きれいな　塩。\nマニアが　高く　買ってくれる。"
    en: "Pure salt that can be discovered deep\ninside the Shoal Cave.\nA maniac will buy it for a high price."
    fr: "Sel pur provenant des profondeurs\nde la Grotte Tréfonds. Les amateurs\nen donnent un bon prix."
    it: "Sale purissimo rinvenuto nella Grotta\nOndosa. Si può vendere a un prezzo\npiuttosto alto agli intenditori."
    de: "Reine Salzkristalle, die sich in der sog.\nKüstenhöhle finden lassen. Sammler\ngeben ihr letztes Hemd dafür her."
    es: "Una sal muy fina encontrada en la\nCueva Cardumen.\nMuy valorada por los coleccionistas."
    ko: "여울의 동굴이라는 장소에서\n발견할 수 있는 깨끗한 소금.\n마니아가 비싼 값에 산다."
shoal_shell:
  names:
    jp_kana: あさせのかいがら
    jp_kanji: あさせのかいがら
    en: Shoal Shell
    fr: Co. Tréfonds
    it: Gusciondoso
    de: Küstenschale
    es: C. Cardumen
    ko: 여울조개껍질
  descriptions:
    jp_kana: "あさせのほらあな　という　ばしょで\nみつかる　きれいな　かいがら。\nマニアが　たかく　かってくれる。"
    jp_kanji: "浅瀬の洞穴という　場所で\nみつかる　きれいな　貝殻。\nマニアが　高く　買ってくれる。"
    en: "A pretty seashell that can be found\ndeep inside the Shoal Cave.\nA maniac will buy it for a high price."
    fr: "Joli coquillage provenant des\nprofondeurs de la Grotte Tréfonds.\nLes amateurs en donnent un bon prix."
    it: "Un bel guscio rinvenuto nella Grotta\nOndosa. Si può vendere a un prezzo\npiuttosto alto agli intenditori."
    de: "Eine hübsche Schale, die sich in der\nKüstenhöhle finden lässt. Sammler\ngeben ihr letztes Hemd dafür her."
    es: "Concha encontrada en la Cueva\nCardumen.\nMuy valorada por los coleccionistas."
    ko: "여울의 동굴이라는 장소에서\n발견할 수 있는 예쁜 조개껍질.\n마니아가 비싼 값에 산다."
shock_drive:
  names:
    jp_kana: イナズマカセット
    jp_kanji: イナズマカセット
    en: Shock Drive
    fr: Module Choc
    it: Voltmodulo
    de: Blitzmodul
    es: FulgoROM
    ko: 번개카세트
  descriptions:
    jp_kana: "ゲノセクトに　もたせると\nテクノバスターという　わざが\nでんきタイプになる　カセット。"
    jp_kanji: "ゲノセクトに　持たせると\nテクノバスターという　技が\nでんきタイプになる　カセット。"
    en: "A cassette to be held by Genesect.\nIt changes Techno Blast to an\nElectric-type move."
    fr: "Tenu par Genesect, ce module\nchange la capacité TechnoBuster\nen une capacité de type Électrik."
    it: "Modulo da far tenere a Genesect.\nTrasforma Tecnobotto in una mossa\ndi tipo Elettro."
    de: "Gibt man es Genesect zum Tragen,\nwandelt es den Typ der Attacke\nTechblaster in Elektro um."
    es: "Cartucho que convierte\nTecno Shock de Genesect\nen un movimiento de tipo Eléctrico."
    ko: "게노세크트에게 지니게 하면\n테크노버스터라는 기술이\n전기타입으로 바뀌는 카세트."
shuca_berry:
  names:
    jp_kana: シュカのみ
    jp_kanji: シュカのみ
    en: Shuca Berry
    fr: Baie Jouca
    it: Baccanaca
    de: Schukebeere
    es: Baya Acardo
    ko: 슈캐열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　じめん　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　じめん技を\n受けたとき　威力が　弱まる。"
    en: "Weakens a supereffective Ground-type\nattack against the holding Pokémon."
    fr: "Tenue, cette Baie affaiblit une attaque\nennemie super efficace de type Sol."
    it: "Se tenuta da un Pokémon, indebolisce\nl’attacco superefficace di tipo Terra\ndel nemico."
    de: "Als getragenes Item schwächt diese\nBeere besonders effektive Attacken\ndes Angreifers vom Typ Boden."
    es: "Si la lleva un Pokémon, debilita un\nataque supereficaz de tipo Tierra\nde un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 뛰어난 땅 기술을\n당했을 때 위력이 약해진다."
silk_scarf:
  names:
    jp_kana: シルクのスカーフ
    jp_kanji: シルクのスカーフ
    en: Silk Scarf
    fr: Mouch. Soie
    it: Sciarpa Seta
    de: Seidenschal
    es: Pañuelo Seda
    ko: 실크스카프
  descriptions:
    jp_kana: "はだざわりの　よい　スカーフ。\nもたせると　ノーマルタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "はだざわりの　よい　スカーフ。\n持たせると　ノーマルタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon.\nIt is a sumptuous scarf that boosts\nthe power of Normal-type moves."
    fr: "Objet à tenir. Mouchoir somptueux\nmontant la puissance des capacités\nde type Normal."
    it: "Strumento da far tenere a un Pokémon.\nSciarpa raffinata che potenzia le mosse\ndi tipo Normale."
    de: "Ein Item zum Tragen. Ein kostbarer\nSchal, der Attacken vom Typ Normal\nverstärkt."
    es: "La delicadeza del pañuelo fortalece\nlos movimientos de tipo Normal.\nDebe llevarlo un Pokémon."
    ko: "감촉이 좋은 스카프.\n지니게 하면 노말타입\n기술의 위력이 올라간다."
silver_powder:
  names:
    jp_kana: ぎんのこな
    jp_kanji: ぎんのこな
    en: SilverPowder
    fr: Poudre Arg.
    it: Argenpolvere
    de: Silberstaub
    es: Polvo Plata
    ko: 은빛가루
  descriptions:
    jp_kana: "ぎんいろに　かがやく　こな。\nもたせると　むしタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "銀色に　輝く　粉。\n持たせると　むしタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon.\nIt is a shiny, silver powder that ups\nthe power of Bug-type moves."
    fr: "Objet à tenir. Poudre d’argent\nbrillante qui monte la puissance\ndes capacités de type Insecte."
    it: "Strumento da far tenere a un Pokémon.\nPolvere argentea e brillante che\npotenzia le mosse di tipo Coleottero."
    de: "Ein Item, das einem Pokémon zum\nTragen gegeben werden kann. Es\nverbessert Attacken vom Typ Käfer."
    es: "Polvo de brillo argénteo que fortalece\nlos ataques de tipo Bicho.\nDebe llevarlo un Pokémon."
    ko: "은색으로 반짝이는 가루.\n지니게 하면 벌레타입\n기술의 위력이 올라간다."
silver_wing:
  names:
    jp_kana: ぎんいろのはね
    jp_kanji: ぎんいろのはね
    en: Silver Wing
    fr: Argent’Aile
    it: Aladargento
    de: Silberflügel
    es: Ala Plateada
    ko: 은빛날개
  descriptions:
    jp_kana: "ぎんいろに　ひかり　かがやく\nふしぎな　はね。"
    jp_kanji: "ぎんいろに　ひかり　かがやく\n不思議な　はね。"
    en: "A strange, silvery feather\nthat sparkles."
    fr: "Une étrange plume qui brille\nd’un éclat argenté."
    it: "Misteriosa piuma che brilla di luce\nargentata."
    de: "Eine silberne Feder, die von\neinem seltsamen Leuchten\nerfüllt ist."
    es: "Misteriosa ala de un brillante\ncolor plateado."
    ko: "은빛으로 빛나는\n신비한 날개."
sitrus_berry:
  names:
    jp_kana: オボンのみ
    jp_kanji: オボンのみ
    en: Sitrus Berry
    fr: Baie Sitrus
    it: Baccacedro
    de: Tsitrubeere
    es: Baya Zidra
    ko: 자뭉열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nＨＰを　すこしだけ　かいふくする。"
    jp_kanji: "ポケモンに　持たせると\nＨＰを　少しだけ　回復する。"
    en: "If held by a Pokémon,\nit heals the user’s HP a little."
    fr: "Baie qui restaure quelques PV\nlorsqu’elle est tenue par un Pokémon."
    it: "Se tenuta da un Pokémon restituisce\nun po’ di PS."
    de: "Gibst du die Beere einem Pokémon\nzum Tragen, füllt diese seine KP\nein wenig auf."
    es: "Los Pokémon pueden llevarla o usarla\npara restaurar algunos PS."
    ko: "포켓몬에게 지니게 하면\nHP를 조금 회복한다."
skull_fossil:
  names:
    jp_kana: ずがいのカセキ
    jp_kanji: ずがいのカセキ
    en: Skull Fossil
    fr: Foss. Crâne
    it: Fossilcranio
    de: Kopffossil
    es: Fósil Cráneo
    ko: 두개의화석
  descriptions:
    jp_kana: "おおむかし　ちじょうで　くらした\nこだい　ポケモンの　カセキ。\nあたまの　いちぶ　らしい。"
    jp_kanji: "大昔　地上で　暮らした\n古代ポケモンの　カセキ。\n頭の　一部らしい。"
    en: "A fossil from a prehistoric Pokémon\nthat lived on the land. It appears to\nbe part of a head."
    fr: "Fossile d’un Pokémon préhistorique\nterrestre. On dirait une partie d’un\ncrâne."
    it: "Fossile di un Pokémon preistorico che\nviveva sulla terraferma. Sembra far\nparte di un teschio."
    de: "Das Fossil eines uralten\nPokémon, das an Land lebte.\nEs sieht wie ein Schädel aus."
    es: "Fósil de un Pokémon prehistórico\nterrestre. Parece ser parte de una\ncabeza."
    ko: "오랜 옛날 지상에서 살았던\n고대 포켓몬의 화석.\n머리의 일부인 듯하다."
sky_plate:
  names:
    jp_kana: あおぞらプレート
    jp_kanji: あおぞらプレート
    en: Sky Plate
    fr: Plaque Ciel
    it: Lastracielo
    de: Wolkentafel
    es: Tabla Cielo
    ko: 푸른하늘플레이트
  descriptions:
    jp_kana: "ひこうの　タイプの　せきばん。\nもたせると　ひこうタイプの\nわざの　いりょくが　つよまる。"
    jp_kanji: "ひこうの　タイプの　石盤。\n持たせると　ひこうタイプの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon.\nIt is a stone tablet that boosts the\npower of Flying-type moves."
    fr: "Objet à tenir. Tablette en pierre\naugmentant la puissance des capacités\nde type Vol."
    it: "Strumento da far tenere a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Volante."
    de: "Ein Item zum Tragen. Diese Steintafel\nverstärkt Attacken vom Typ Flug."
    es: "Tabla de piedra que potencia\nlos movimientos de tipo Volador.\nDebe llevarla un Pokémon."
    ko: "비행타입의 석판.\n지니게 하면 비행타입\n기술의 위력이 강해진다."
slowpoke_tail:
  names:
    jp_kana: おいしいシッポ
    jp_kanji: おいしいシッポ
    en: SlowpokeTail
    fr: Queueramolos
    it: Codaslowpoke
    de: Flegmon-Rute
    es: Colaslowpoke
    ko: 맛있는꼬리
  descriptions:
    jp_kana: "とても　おいしい　なにかの　しっぽ。\nショップで　たかく　うれる。"
    jp_kanji: "とても　おいしい　なにかの　しっぽ。\nショップで　高く　売れる。"
    en: "A very tasty tail of something.\nIt sells for a high price."
    fr: "Une queue d’origine inconnue tout à fait\nsavoureuse, vendue très cher."
    it: "Coda di origine sconosciuta dal sapore\ndelizioso. Si vende piuttosto cara."
    de: "Die Rute eines unbestimmten\nWesens. Extrem schmackhaft.\nLässt sich teuer verkaufen."
    es: "Sabrosa cola de origen desconocido.\nSe puede comprar a un precio\nmuy elevado."
    ko: "매우 맛있는 무언가의 꼬리.\n가게에서 비싸게 팔린다."
smoke_ball:
  names:
    jp_kana: けむりだま
    jp_kanji: けむりだま
    en: Smoke Ball
    fr: Boule Fumée
    it: Palla Fumo
    de: Rauchball
    es: Bola Humo
    ko: 연막탄
  descriptions:
    jp_kana: "もたせた　ポケモンは　やせいの\nポケモンとの　せんとうから\nぜったいに　にげられる。"
    jp_kanji: "持たせた　ポケモンは　野生の\nポケモンとの　戦闘から\n絶対に　逃げられる。"
    en: "An item to be held by a Pokémon.\nIt enables the holder to flee from any\nwild Pokémon without fail."
    fr: "Objet à tenir. Permet au porteur de\ns’enfuir à coup sûr face à un Pokémon\nsauvage."
    it: "Strumento da far tenere a un Pokémon.\nPermette a chi lo tiene di fuggire con\nsuccesso da un Pokémon selvatico."
    de: "Ein Pokémon kann dieses Item tragen.\nEs ermöglicht die garantierte Flucht\naus dem Kampf mit einem wilden Pokémon."
    es: "Debe llevarla un Pokémon.\nPermite huir siempre de combates\ncontra Pokémon salvajes."
    ko: "지니게 한 포켓몬은\n야생 포켓몬과의 배틀에서\n반드시 도망칠 수 있다."
smooth_rock:
  names:
    jp_kana: さらさらいわ
    jp_kanji: さらさらいわ
    en: Smooth Rock
    fr: Roche Lisse
    it: Roccialiscia
    de: Glattbrocken
    es: Roca Suave
    ko: 보송보송바위
  descriptions:
    jp_kana: "もたせた　ポケモンが　すなあらしを\nつかうと　いつもより　すなあらしの\nじかんが　ながくなる。"
    jp_kanji: "持たせた　ポケモンが　すなあらしを\n使うと　いつもより　すなあらしの\n時間が　長くなる。"
    en: "A Pokémon held item that extends the\nduration of the move Sandstorm used\nby the holder."
    fr: "Objet à tenir augmentant la durée de\nla capacité Tempêtesable utilisée par\nle porteur."
    it: "Strumento da far tenere a un Pokémon\nche allunga la durata della mossa\nTerrempesta se usata da chi lo tiene."
    de: "Ein Item zum Tragen. Verlängert\ndie Dauer von Sandsturm, wenn\nvon Träger eingesetzt."
    es: "Prolonga la duración del movimiento\nTormenta Arena que use el Pokémon\nque la lleva."
    ko: "지니게 한 포켓몬이 모래바람을\n쓰면 여느 때보다 모래바람의\n시간이 길어진다."
soda_pop:
  names:
    jp_kana: サイコソーダ
    jp_kanji: サイコソーダ
    en: Soda Pop
    fr: Soda Cool
    it: Gassosa
    de: Sprudel
    es: Refresco
    ko: 미네랄사이다
  descriptions:
    jp_kana: "シュワっと　はじける　ソーダ。\nポケモン　１ひきの　ＨＰを\n６０だけ　かいふくする。"
    jp_kanji: "シュワっと　はじける　ソーダ。\nポケモン　１匹の　ＨＰを\n６０だけ　回復する。"
    en: "A fizzy soda drink.\nIt restores the HP of one Pokémon by\n60 points."
    fr: "Une boisson pétillante.\nRestaure 60 PV à un Pokémon."
    it: "Bevanda frizzante.\nRestituisce 60 PS ad un Pokémon."
    de: "Ein sprudelndes Mineralwasser,\ndas die KP eines Pokémon\num 60 Punkte auffüllt."
    es: "Chispeante bebida gaseosa que\nrestaura 60 PS de un Pokémon."
    ko: "쏴하고 톡 쏘는 사이다.\n포켓몬 1마리의 HP를\n60만큼 회복한다."
soft_sand:
  names:
    jp_kana: やわらかいすな
    jp_kanji: やわらかいすな
    en: Soft Sand
    fr: Sable Doux
    it: Sabbia Soff.
    de: Pudersand
    es: Arena Fina
    ko: 부드러운모래
  descriptions:
    jp_kana: "さわると　サラサラする　すな。\nもたせると　じめんタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "さわると　サラサラする　砂。\n持たせると　じめんタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon.\nIt is a loose, silky sand that boosts\nthe power of Ground-type moves."
    fr: "Objet à tenir. Sable fin et soyeux\nmontant la puissance des capacités\nde type Sol."
    it: "Strumento da far tenere a un Pokémon.\nSabbia leggera e farinosa che potenzia\nle mosse di tipo Terra."
    de: "Ein Item zum Tragen. Samtiger\nSand, der Attacken vom Typ\nBoden verstärkt."
    es: "Debe llevarla un Pokémon.\nLa suavidad de la arena fortalece\nlos movimientos de tipo Tierra."
    ko: "만지면 보슬보슬한 모래.\n지니게 하면 땅타입\n기술의 위력이 올라간다."
soothe_bell:
  names:
    jp_kana: やすらぎのすず
    jp_kanji: やすらぎのすず
    en: Soothe Bell
    fr: Grelot Zen
    it: Calmanella
    de: Sanftglocke
    es: Camp. Alivio
    ko: 평온의방울
  descriptions:
    jp_kana: "ここちよい　ねいろの　すず。\nもたせた　ポケモンは　こころが\nやすらぎ　なつきやすくなる。"
    jp_kanji: "心地よい　音色の　鈴。\n持たせた　ポケモンは　こころが\nやすらぎ　なつきやすくなる。"
    en: "An item to be held by a Pokémon. It is\na bell with a comforting chime that\ncalms the holder and makes it friendly."
    fr: "Objet à tenir. Grelot dont le carillon\ncalme le porteur et favorise l’amitié."
    it: "Strumento da far tenere a un Pokémon.\nCampanella dal suono rassicurante che\ncalma chi la usa rendendolo amichevole."
    de: "Ein Item, das einem Pokémon zum\nTragen gegeben werden kann. Es\nbesänftigt und fördert Sympathie."
    es: "Una campana con un tañido calmante\nque reconforta al Pokémon que la lleva\ny lo vuelve más amistoso."
    ko: "기분 좋은 소리의 방울.\n지니게 한 포켓몬은 마음이\n편안해져 친밀해지기 쉬워진다."
soul_dew:
  names:
    jp_kana: こころのしずく
    jp_kanji: こころのしずく
    en: Soul Dew
    fr: Rosée Âme
    it: Cuorugiada
    de: Seelentau
    es: Rocío Bondad
    ko: 마음의물방울
  descriptions:
    jp_kana: "ラティオス　または　ラティアスに\nもたせると　とくこうと　とくぼうが\nあがる　ふしぎな　たま。"
    jp_kanji: "ラティオス　または　ラティアスに\n持たせると　特攻と　特防が\nあがる　不思議な　珠。"
    en: "A wondrous orb to be held by Latios\nor Latias. It raises both the\nSp. Atk and Sp. Def stats."
    fr: "Orbe prodigieux à faire tenir à Latios\nou Latias qui monte leur Attaque\nSpéciale et leur Défense Spéciale."
    it: "Sfera miracolosa da far tenere a\nLatios o Latias. Aumenta l’Attacco\nSpeciale e la Difesa Speciale."
    de: "Ein Item, das von Latios oder Latias\ngetragen werden kann. Es hebt Spezial-\nAngriff und Spezial-Verteidigung."
    es: "Un orbe fantástico que debe llevar\nLatios o Latias. Sube su Ataque\nEspecial y su Defensa Especial."
    ko: "라티오스 혹은 라티아스에게\n지니게 하면 특수공격과 특수방어가\n올라가는 이상한 구슬."
spell_tag:
  names:
    jp_kana: のろいのおふだ
    jp_kanji: のろいのおふだ
    en: Spell Tag
    fr: Rune Sort
    it: Spettrotarga
    de: Bannsticker
    es: Hechizo
    ko: 저주의부적
  descriptions:
    jp_kana: "あやしくて　ぶきみな　おふだ。\nもたせると　ゴーストタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "怪しくて　不気味な　お札。\n持たせると　ゴーストタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon.\nIt is a sinister, eerie tag that boosts\nthe power of Ghost-type moves."
    fr: "Objet à tenir. Plaque sinistre et\nétrange montant la puissance des\ncapacités de type Spectre."
    it: "Strumento da far tenere a un Pokémon.\nTarga sinistra e inquietante che\npotenzia le mosse di tipo Spettro."
    de: "Ein Item zum Tragen. Ein fieser,\nunheimlicher Sticker, der Attacken\nvom Typ Geist verstärkt."
    es: "Misterioso y siniestro objeto que\npotencia los movimientos de tipo\nFantasma. Debe llevarlo un Pokémon."
    ko: "괴상하고 으스스한 부적.\n지니게 하면 고스트타입\n기술의 위력이 올라간다."
spelon_berry:
  names:
    jp_kana: ノワキのみ
    jp_kanji: ノワキのみ
    en: Spelon Berry
    fr: Baie Kiwan
    it: Baccamelos
    de: Kiwanbeere
    es: Baya Wikano
    ko: 메호키열매
  descriptions:
    jp_kana: "イッシュちほうでは　とても\nめずらしい　きのみ。\nマニアが　たかく　かってくれる。"
    jp_kanji: "イッシュ地方では　とても\n珍しい　きのみ。\nマニアが　高く　買ってくれる。"
    en: "A Berry which is very rare in the\nUnova region.\nA maniac will buy it for a high price."
    fr: "Baie très rare à Unys.\nLes amateurs en donnent un bon prix."
    it: "Bacca molto rara a Unima.\nSi può vendere a un prezzo piuttosto\nalto agli intenditori."
    de: "Eine Beere, die nur äußerst selten\nin der Einall-Region zu finden ist.\nKenner geben ihr letztes Hemd dafür."
    es: "Una Baya muy rara en la región\nde Teselia. Muy apreciada\npor los gourmets."
    ko: "하나지방에서는 매우\n희귀한 나무열매.\n마니아가 비싼 값에 산다."
splash_plate:
  names:
    jp_kana: しずくプレート
    jp_kanji: しずくプレート
    en: Splash Plate
    fr: Plaque Hydro
    it: Lastraidro
    de: Wassertafel
    es: Tabla Linfa
    ko: 물방울플레이트
  descriptions:
    jp_kana: "みずの　タイプの　せきばん。\nもたせると　みずタイプの\nわざの　いりょくが　つよまる。"
    jp_kanji: "みずの　タイプの　石盤。\n持たせると　みずタイプの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon.\nIt is a stone tablet that boosts the\npower of Water-type moves."
    fr: "Objet à tenir. Tablette en pierre\naugmentant la puissance des capacités\nde type Eau."
    it: "Strumento da far tenere a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Acqua."
    de: "Ein Item zum Tragen. Diese Steintafel\nverstärkt Attacken vom Typ Wasser."
    es: "Tabla de piedra que potencia\nlos movimientos de tipo Agua.\nDebe llevarla un Pokémon."
    ko: "물타입의 석판.\n지니게 하면 물타입\n기술의 위력이 강해진다."
spooky_plate:
  names:
    jp_kana: もののけプレート
    jp_kanji: もののけプレート
    en: Spooky Plate
    fr: Plaque Fantô
    it: Lastratetra
    de: Spuktafel
    es: Tabla Terror
    ko: 원령플레이트
  descriptions:
    jp_kana: "ゴーストの　タイプの　せきばん。\nもたせると　ゴーストタイプの\nわざの　いりょくが　つよまる。"
    jp_kanji: "ゴーストの　タイプの　石盤。\n持たせると　ゴーストタイプの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon.\nIt is a stone tablet that boosts the\npower of Ghost-type moves."
    fr: "Objet à tenir. Tablette en pierre\naugmentant la puissance des capacités\nde type Spectre."
    it: "Strumento da far tenere a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Spettro."
    de: "Ein Item zum Tragen. Diese Steintafel\nverstärkt Attacken vom Typ Geist."
    es: "Tabla de piedra que potencia\nlos movimientos de tipo Fantasma.\nDebe llevarla un Pokémon."
    ko: "고스트타입의 석판.\n지니게 하면 고스트타입\n기술의 위력이 강해진다."
sport_ball:
  names:
    jp_kana: コンペボール
    jp_kanji: コンペボール
    en: Sport Ball
    fr: Compét’Ball
    it: Gara Ball
    de: Turnierball
    es: Competi Ball
    ko: 콤페볼
  descriptions:
    jp_kana: "むしとりたいかいの　なかで\nつかう　とくべつな　ボール。"
    jp_kanji: "虫捕り大会の　なかで\n使う　特別な　ボール。"
    en: "A special Poké Ball for the\nBug-Catching Contest."
    fr: "Une Poké Ball spéciale utilisée au\nConcours de Capture d’insecte."
    it: "Poké Ball speciale utilizzata solo nella\nGara Pigliamosche."
    de: "Ein Ball, der nur beim Käferturnier\neingesetzt wird."
    es: "Poké Ball que se utiliza en el\nConcurso de Captura de Bichos."
    ko: "곤충채집 대회 내에서\n사용하는 특별한 볼."
sprayduck:
  names:
    jp_kana: コダックじょうろ
    jp_kanji: コダックじょうろ
    en: Sprayduck
    fr: Kwakarrosoir
    it: Sprayduck
    de: Entonkanne
    es: Psydugadera
    ko: 고라파덕물뿌리개
  descriptions:
    jp_kana: "みずを　かける　どうぐ。\nふかふかのつちに　うめた　きのみを\nすくすく　そだてる。"
    jp_kanji: "水を　かける　道具。\nふかふかのつちに　埋めた　きのみを\nすくすく　育てる。"
    en: "A watering can shaped like a Psyduck.\nIt helps promote healthy growth of\nBerries planted in soft soil."
    fr: "Arrosoir en forme de Psykokwak. Aide\nà la croissance des Baies plantées dans\nles sols meubles."
    it: "Annaffiatoio fatto a forma di Psyduck.\nFavorisce la crescita delle Bacche\npiantate nel terreno soffice."
    de: "Eine Gießkanne in Form von\nEnton. Gieße gepflanzte Beeren,\ndamit sie besser wachsen."
    es: "Una regadera con forma de Psyduck.\nAyuda a que las Bayas plantadas en\nsuelo fértil crezcan mejor."
    ko: "물을 주는 도구.\n푹신푹신한 땅에 심은 나무열매를\n쑥쑥 키운다."
squirt_bottle:
  names:
    jp_kana: ゼニガメじょうろ
    jp_kanji: ゼニガメじょうろ
    en: SquirtBottle
    fr: Carapuce à O
    it: Annaffiatoio
    de: Schiggykanne
    es: Regadera
    ko: 꼬부기물뿌리개
  descriptions:
    jp_kana: "みずを　かける　どうぐ。\nきのみプランターの　きのみを\nすくすく　そだてる。"
    jp_kanji: "みずを　かける　道具。\nきのみプランターの　きのみを\nすくすく　育てる。"
    en: "A bottle used for watering plants in the\nBerry Pots."
    fr: "Un arrosoir qui permet de faire croître\nrapidement les Baies plantées dans le\nPlante-Baies."
    it: "Strumento che serve a innaffiare.\nPermette un’ottima crescita delle\nBacche seminate nel Piantabacche."
    de: "Eine Gießkanne, durch deren\nWasser Beeren im Pflanzset\numso rascher wachsen."
    es: "Objeto que contiene agua y se usa para\nregar las Bayas del Plantabayas."
    ko: "물을 주는 도구.\n나무열매플랜터의 나무열매를\n쑥쑥 키운다."
ss_ticket:ss_aqua:
  names:
    jp_kana: ふねのチケット
    jp_kanji: ふねのチケット
    en: S.S. Ticket
    fr: Passe Bateau
    it: Bigl. Nave
    de: Bootsticket
    es: Ticket Barco
    ko: 승선티켓
  descriptions:
    jp_kana: "こうそくせん　アクアごうに　のるとき\nひつような　ふねの　チケット。\nふねの　えが　かかれている。"
    jp_kanji: "高速船アクア号に　乗るとき\n必要な　船の　チケット。\n船の　絵が　描かれている。"
    en: "The ticket required for sailing on the\nferry S.S. Aqua. It has a drawing of a\nship on it."
    fr: "Un ticket nécessaire pour embarquer\nsur le Bateau Express Aquaria.\nIl y a un bateau dessiné dessus."
    it: "Biglietto necessario per salire sulla\nM/N Acqua. C’è disegnata una nave."
    de: "Ein Ticket, um auf der M.S. Aqua\nzu fahren. Eine Zeichnung der\nFähre ist auf dem Ticket zu sehen."
    es: "Es el billete válido para embarcar\nen el Ferry S.S. Aqua. Tiene dibujado\nun barco."
    ko: "쾌속선 아쿠아호에 탈 때\n필요한 승선티켓.\n배 그림이 그려져 있다."
stable_mulch:
  names:
    jp_kana: ながながこやし
    jp_kanji: ながながこやし
    en: Stable Mulch
    fr: Fertistable
    it: Fertilsaldo
    de: Stabilmulch
    es: Ab. Fijador
    ko: 오래오래비료
  descriptions:
    jp_kana: "きのみを　そだてる　ちほうでは\nふかふかのつちに　まいて　つかう。\nマニアが　たかく　かってくれる。"
    jp_kanji: "きのみを　育てる　地方では\nふかふかのつちに　まいて　使う。\nマニアが　高く　買ってくれる。"
    en: "A fertilizer to be spread on soft soil\nin regions where Berries are grown.\nA maniac will buy it for a high price."
    fr: "Un engrais utilisé sur sol meuble.\nLes amateurs en donnent un bon prix."
    it: "Usato per favorire la crescita delle\nBacche nelle regioni dove si coltivano.\nGli intenditori pagano caro per averlo."
    de: "In Regionen, wo man Beeren anbaut,\nmengt man ihn unter weiche Erde.\nSammler geben ihr letztes Hemd dafür."
    es: "Un fertilizante usado en suelo fértil\ndonde crecen las Bayas.\nMuy apreciado por los coleccionistas."
    ko: "나무열매를 키우는 지방에서는\n푹신푹신한 땅에 뿌려 쓴다.\n마니아가 비싼 값에 산다."
star_piece:
  names:
    jp_kana: ほしのかけら
    jp_kanji: ほしのかけら
    en: Star Piece
    fr: Morc. Étoile
    it: Pezzo Stella
    de: Sternenstück
    es: Tr. Estrella
    ko: 별의조각
  descriptions:
    jp_kana: "キラキラと　あかく　ひかる\nきれいな　ほうせきの　かけら。\nショップで　たかく　うれる。"
    jp_kanji: "キラキラと　赤く　光る\nきれいな　宝石の　かけら。\nショップで　高く　売れる。"
    en: "A shard of a pretty gem that sparkles\nin a red color. It can be sold at a\nhigh price to shops."
    fr: "Fragment de gemme qui brille d’un éclat\nrouge. Peut se vendre à bon prix aux\nmagasins."
    it: "Frammento rosso acceso di una gemma.\nSi può vendere a un prezzo piuttosto\nalto nei negozi."
    de: "Teil eines hübschen Edelsteins, der in\nrötlicher Farbe schimmert. Erzielt einen\nhohen Preis, wenn man ihn verkauft."
    es: "Fragmento de una bonita gema roja\nque puede venderse muy caro en las\ntiendas."
    ko: "반짝반짝 빨갛게 빛나는\n예쁜 보석 조각.\n상점에서 비싸게 팔린다."
stardust:
  names:
    jp_kana: ほしのすな
    jp_kanji: ほしのすな
    en: Stardust
    fr: Pouss.Étoile
    it: Polvostella
    de: Sternenstaub
    es: Polvoestelar
    ko: 별의모래
  descriptions:
    jp_kana: "てざわりが　サラサラの\nあかくて　きれいな　すな。\nショップで　たかく　うれる。"
    jp_kanji: "てざわりが　サラサラの\n赤くて　きれいな　砂。\nショップで　高く　売れる。"
    en: "Lovely, red-colored sand with a loose,\nsilky feel. It can be sold at a high\nprice to shops."
    fr: "Sable rouge ravissant, aux grains très\nfins. Peut être vendu à bon prix aux\nmagasins."
    it: "Bella sabbia rossa dalla consistenza\nleggera e farinosa. Si può vendere\na un prezzo piuttosto alto nei negozi."
    de: "Schöner, roter Sand, der sich\nseidenweich anfühlt. Er ist von\nhohem Wert."
    es: "Bonita arena roja de tacto sedoso que\nalcanza un alto precio en las tiendas."
    ko: "감촉이 보슬보슬한\n빨갛고 예쁜 모래.\n상점에서 비싸게 팔린다."
starf_berry:
  names:
    jp_kana: スターのみ
    jp_kanji: スターのみ
    en: Starf Berry
    fr: Baie Frista
    it: Baccambola
    de: Krambobeere
    es: Baya Arabol
    ko: 스타열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nピンチのとき　どれか　１つの\nのうりょくが　ぐーんと　あがる。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　どれか　１つの\n能力が　ぐーんと　あがる。"
    en: "If held by a Pokémon, it sharply raises\none of its stats in a pinch."
    fr: "Tenue, cette Baie monte beaucoup une\ndes stats en cas de besoin."
    it: "Aumenta molto una statistica se\nil Pokémon che la tiene si trova\nin difficoltà."
    de: "Als getragenes Item erhöht diese Beere\neinen Statuswert des Pokémon stark,\nsobald es in einer Notlage steckt."
    es: "Si la lleva un Pokémon, aumenta\nmucho una característica en un\nmomento de apuro."
    ko: "포켓몬에게 지니게 하면\n위급할 때 능력 중의 하나가\n크게 올라간다."
steel_gem:
  names:
    jp_kana: はがねのジュエル
    jp_kanji: はがねのジュエル
    en: Steel Gem
    fr: Joyau Acier
    it: Bijouacciaio
    de: Stahljuwel
    es: G. Acero
    ko: 강철주얼
  descriptions:
    jp_kana: "はがねの　タイプの　ジュエル。\nもたせると　いちどだけ　はがねの\nわざの　いりょくが　つよまる。"
    jp_kanji: "はがねの　タイプの　ジュエル。\n持たせると　１度だけ　はがねの\n技の　威力が　強まる。"
    en: "A gem with an essence of steel. When\nheld, it strengthens the power of a\nSteel-type move only once."
    fr: "Objet à tenir. Joyau augmentant\nune fois la puissance des capacités\nde type Acier."
    it: "Strumento da far tenere a un Pokémon.\nGioiello che potenzia una sola volta\nle mosse di tipo Acciaio."
    de: "Ein Juwel vom Typ Stahl. Es\nerhöht einmalig die Stärke\neiner Attacke vom Typ Stahl."
    es: "Joya de un solo uso que potencia\nlos movimientos de tipo Acero.\nDebe llevarla un Pokémon."
    ko: "강철타입의 주얼.\n지니게 하면 한 번만 강철\n기술의 위력이 강해진다."
sticker_bag:
  names:
    jp_kana: シールぶくろ
    jp_kanji: シールぶくろ
    en: Seal Bag
    fr: Sac Sceaux
    it: Bollosacca
    de: Stickertüte
    es: Bolsa Sellos
    ko: 실주머니
  descriptions:
    jp_kana: "シールが　１０まい　いれられる\nちっちゃな　ふくろ。"
    jp_kanji: "シールが　１０枚　いれられる\nちっちゃな　ふくろ。"
    en: "A tiny bag that can hold 10 Seals for\ndecorating Poké Balls."
    fr: "Petit sac pouvant contenir dix Sceaux\npour décorer les Poké Balls."
    it: "Sacchettino che può contenere dieci\nBolli per decorare le Poké Ball."
    de: "Ein kleines Tütchen. Es bietet Platz\nfür bis zu 10 Sticker für die Pokébälle."
    es: "Bolsita con capacidad para diez Sellos\nde los que decoran las Poké Balls."
    ko: "실이 10장 들어가는\n작은 주머니."
sticker_case:
  names:
    jp_kana: シールいれ
    jp_kanji: シールいれ
    en: Seal Case
    fr: Boîte Sceaux
    it: Portabolli
    de: Stick.Koffer
    es: Caja Sellos
    ko: 실상자
  descriptions:
    jp_kana: "ボールカプセルに　はりつけられる\nシールが　はいった　いれもの。"
    jp_kanji: "ボールカプセルに　はりつけられる\nシールが　はいった　いれもの。"
    en: "A case for storing Seals that can be\napplied to the Capsule cases of\nPoké Balls."
    fr: "Boîte contenant les Sceaux pouvant\nêtre placés sur les capsules des\nPoké Balls."
    it: "Contenitore per conservare i Bolli che\npossono essere applicati sulle Capsule\ndelle Poké Ball."
    de: "In diesem Koffer kannst du die Sticker\nfür die Ballkapseln der Pokébälle\naufbewahren."
    es: "Caja en la que se pueden guardar los\nSellos que se aplican a las Cápsulas\nde las Poké Balls."
    ko: "볼캡슐에 붙일 수 있는\n실이 들어 있는 용기."
sticky_barb:
  names:
    jp_kana: くっつきバリ
    jp_kanji: くっつきバリ
    en: Sticky Barb
    fr: Piquants
    it: Vischiopunta
    de: Klettdorn
    es: Toxiestrella
    ko: 끈적끈적바늘
  descriptions:
    jp_kana: "もたせると　まいターン　ダメージを\nうける。　じぶんに　ふれてきた\nあいてに　くっつくことも　ある。"
    jp_kanji: "持たせると　毎ターン　ダメージを\n受ける。　自分に　ふれてきた\n相手に　くっつくことも　ある。"
    en: "A held item that damages the holder on\nevery turn. It may latch on to foes and\nallies that touch the holder."
    fr: "Objet à tenir blessant le porteur à\nchaque tour. Peut s’accrocher aux\nennemis qui attaquent le porteur."
    it: "Strumento che danneggia chi lo tiene\nad ogni turno. Può attaccarsi al nemico\nche lancia un attacco fisico."
    de: "Schadet dem Träger in jeder Runde,\nkann aber an Angreifern haften\nbleiben, die ihn berühren."
    es: "Daña en cada turno al Pokémon que\nla lleva. Puede adherirse al Pokémon\nque alcance con su ataque al portador."
    ko: "지니게 하면 매 턴 데미지를 입는다.\n자신에게 접촉해온 상대에게\n들러붙기도 한다."
stone_plate:
  names:
    jp_kana: がんせきプレート
    jp_kanji: がんせきプレート
    en: Stone Plate
    fr: Plaque Roc
    it: Lastrapietra
    de: Steintafel
    es: Tabla Pétrea
    ko: 암석플레이트
  descriptions:
    jp_kana: "いわの　タイプの　せきばん。\nもたせると　いわタイプの\nわざの　いりょくが　つよまる。"
    jp_kanji: "いわの　タイプの　石盤。\n持たせると　いわタイプの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon.\nIt is a stone tablet that boosts the\npower of Rock-type moves."
    fr: "Objet à tenir. Tablette en pierre\naugmentant la puissance des capacités\nde type Roche."
    it: "Strumento da far tenere a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Roccia."
    de: "Ein Item zum Tragen. Diese Steintafel\nverstärkt Attacken vom Typ Gestein."
    es: "Tabla de piedra que potencia\nlos movimientos de tipo Roca.\nDebe llevarla un Pokémon."
    ko: "바위타입의 석판.\n지니게 하면 바위타입\n기술의 위력이 강해진다."
storage_key:galactic_warehouse:
  names:
    jp_kana: そうこのカギ
    jp_kanji: そうこのカギ
    en: Storage Key
    fr: Clé Stockage
    it: Depochiave
    de: L-Schlüssel
    es: Ll. Almacén
    ko: 창고열쇠
  descriptions:
    jp_kana: "トバリシティの　はずれにある\nギンガだんの　あやしい\nそうこに　はいるための　カギ。"
    jp_kanji: "トバリシティの　はずれにある\nギンガ団の　怪しい\n倉庫に　はいるための　カギ。"
    en: "The key to Team Galactic’s sinister\nwarehouse located at the edge of\nVeilstone City."
    fr: "La clé de l’entrepôt de la Team Galaxie\nsitué à la périphérie de Voilaroc."
    it: "Chiave del misterioso deposito del Team\nGalassia situato ai confini di Rupepoli."
    de: "Der Schlüssel zur Lagerhalle des\nTeams Galaktik am Rande von Schleiede."
    es: "Llave del siniestro almacén del Equipo\nGalaxia que está ubicado en las afueras\nde Ciudad Rocavelo."
    ko: "장막시티 변두리에 있는\n갤럭시단의 수상한 창고에\n들어가기 위한 열쇠다."
suite_key:
  names:
    jp_kana: ルームキー
    jp_kanji: ルームキー
    en: Suite Key
    fr: Clé Chambre
    it: Chiave Suite
    de: B-Schlüssel
    es: Llave Suite
    ko: 룸키
  descriptions:
    jp_kana: "みずうみの　ほとりにある\nこうきゅうホテルの　ルームキー。\nなぜか　よく　なくなってしまう。"
    jp_kanji: "湖の　ほとりにある\n高級ホテルの　ルームキー。\nなぜか　よく　なくなってしまう。"
    en: "A key to one of the suites at the\nluxury hotel by a lake. For some odd\nreason, it often disappears."
    fr: "Clé de l’une des suites de l’hôtel de\nluxe se trouvant près du lac.\nBizarrement, elle disparaît souvent."
    it: "Chiave di una suite vicino a un lago.\nPer ragioni misteriose, scompare\nspesso."
    de: "Schlüssel zu einer Hotelsuite.\nVerschwindet seltsamerweise\nimmer wieder mal."
    es: "Llave de una suite del hotel de lujo\njunto al lago. Por algún motivo,\nse pierde a menudo."
    ko: "호수 근처에 있는 고급 호텔의 룸 키.\n왜인지는 모르나 잘 없어진다."
sun_stone:
  names:
    jp_kana: たいようのいし
    jp_kanji: たいようのいし
    en: Sun Stone
    fr: Pierresoleil
    it: Pietrasolare
    de: Sonnenstein
    es: Piedra Solar
    ko: 태양의돌
  descriptions:
    jp_kana: "ある　とくていの　ポケモンを\nしんかさせる　ふしぎな　いし。\nたいようのように　あかい。"
    jp_kanji: "ある　特定の　ポケモンを\n進化させる　不思議な　石。\n太陽のように　赤い。"
    en: "A peculiar stone that makes certain\nspecies of Pokémon evolve.\nIt is as red as the sun."
    fr: "Une pierre étrange qui fait évoluer\ncertaines espèces de Pokémon.\nElle est rouge comme le soleil."
    it: "Pietra particolare che fa evolvere\ndeterminate specie di Pokémon.\nÈ rossa come il sole."
    de: "Dieser spezielle Stein löst bei\nbestimmten Pokémon die Entwicklung\naus. Er ist rot wie die Sonne."
    es: "Curiosa piedra que hace evolucionar\na determinadas especies de Pokémon.\nEs roja como el núcleo del sol."
    ko: "어느 특정한 포켓몬을\n진화시키는 이상한 돌.\n태양처럼 빨갛다."
super_potion:
  names:
    jp_kana: いいキズぐすり
    jp_kanji: いいキズぐすり
    en: Super Potion
    fr: Super Potion
    it: Superpozione
    de: Supertrank
    es: Superpoción
    ko: 좋은상처약
  descriptions:
    jp_kana: "スプレーしきの　キズぐすり。\nポケモン　１ひきの　ＨＰを\n５０だけ　かいふくする。"
    jp_kanji: "スプレー式の　キズぐすり。\nポケモン　１匹の　ＨＰを\n５０だけ　回復する。"
    en: "A spray-type medicine for wounds.\nIt restores the HP of one Pokémon by\n50 points."
    fr: "Un spray qui soigne les blessures.\nRestaure 50 PV à un Pokémon."
    it: "Rimedio spray per le ferite.\nRestituisce 50 PS ad un Pokémon."
    de: "Hilft bei Wunden. Es füllt\ndie KP eines Pokémon\num 50 Punkte auf."
    es: "Medicina en espray que cura heridas\ny restaura 50 PS de un Pokémon."
    ko: "스프레이식의 상처약.\n포켓몬 1마리의 HP를\n50만큼 회복한다."
super_repel:
  names:
    jp_kana: シルバースプレー
    jp_kanji: シルバースプレー
    en: Super Repel
    fr: Superepousse
    it: Superrepell.
    de: Superschutz
    es: Superrepel
    ko: 실버스프레이
  descriptions:
    jp_kana: "２００ぽ　すすむ　あいだ\nよわい　やせいの　ポケモンが\nまったく　でて　こなくなる。"
    jp_kanji: "２００歩　進む　あいだ\n弱い　野生の　ポケモンが\nまったく　でて　こなくなる。"
    en: "An item that prevents weak wild\nPokémon from appearing for 200 steps\nafter its use."
    fr: "Repousse les Pokémon sauvages\nfaibles pendant 200 pas."
    it: "Repellente che evita l’incontro con i\nPokémon selvatici deboli per 200 passi\ndopo l’utilizzo."
    de: "Hält 200 Schritte lang schwache,\nwilde Pokémon ab."
    es: "Repele Pokémon salvajes débiles\nen un recorrido de 200 pasos."
    ko: "200보 걸어가는 동안\n약한 야생 포켓몬이\n전혀 나오지 않게 된다."
super_rod:
  names:
    jp_kana: すごいつりざお
    jp_kanji: すごいつりざお
    en: Super Rod
    fr: Méga Canne
    it: Super Amo
    de: Superangel
    es: Supercaña
    ko: 대단한낚싯대
  descriptions:
    jp_kana: "さいしんの　すごい　つりざお。\nみずの　ある　ばしょで　つかうと\nポケモンが　つれる。"
    jp_kanji: "最新の　すごい　つりざお。\n水の　ある　場所で　使うと\nポケモンが　釣れる。"
    en: "An awesome, high-tech fishing rod.\nUse it by any body of water to fish for\nwild aquatic Pokémon."
    fr: "Une canne à pêche ultramoderne.\nUtilisez-la pour pêcher des Pokémon\nsauvages dans les points d’eau."
    it: "Amo supertecnologico. Si usa per\npescare Pokémon selvatici in qualsiasi\nspecchio d’acqua."
    de: "Eine wundervoll gefertigte Angel.\nDie beste Angel, um Pokémon zu angeln."
    es: "Increíble caña de pescar de alta\ntecnología. Pesca Pokémon salvajes\nen todo tipo de aguas."
    ko: "최신식의 대단한 낚싯대.\n물이 있는 장소에서 사용하면\n포켓몬을 낚을 수 있다."
sweet_heart:
  names:
    jp_kana: ハートスイーツ
    jp_kanji: ハートスイーツ
    en: Sweet Heart
    fr: Chococœur
    it: Dolcecuore
    de: Herzkonfekt
    es: Cor. Dulce
    ko: 하트스위트
  descriptions:
    jp_kana: "とても　あまったるい　チョコレート。\nポケモン　１ひきの　ＨＰを\n２０だけ　かいふくする。"
    jp_kanji: "とても　甘ったるい　チョコレート。\nポケモン　１匹の　ＨＰを\n２０だけ　回復する。"
    en: "Very sweet chocolate.\nIt restores the HP of one Pokémon\nby only 20 points."
    fr: "Un chocolat extrêmement\nsucré. Restaure 20 PV\nà un Pokémon."
    it: "Cioccolato molto dolce.\nRestituisce 20 PS ad un Pokémon."
    de: "Ein süßer Schokosnack, der die KP\neines Pokémon um 20 Punkte auffüllt."
    es: "Chocolatina de sabor dulce.\nRestaura 20 PS de un Pokémon."
    ko: "지나칠 정도로 달콤한 초콜릿.\n포켓몬 1마리의 HP를\n20만큼 회복한다."
swift_feather:
  names:
    jp_kana: しゅんぱつのハネ
    jp_kanji: しゅんぱつのハネ
    en: Swift Wing
    fr: Aile Sprint
    it: Piumreazione
    de: Flinkfeder
    es: P. Ímpetu
    ko: 순발력날개
  descriptions:
    jp_kana: "ポケモンに　つかう　どうぐ。\nポケモン　１ひきの　すばやさの\nきそポイントを　ちょっと　あげる。"
    jp_kanji: "ポケモンに　使う　道具。\nポケモン　１匹の　素早さの\n基礎ポイントを　ちょっと　あげる。"
    en: "An item for use on a Pokémon. It\nslightly increases the base Speed stat\nof a single Pokémon."
    fr: "Objet à utiliser sur un Pokémon.\nIl augmente un peu sa Vitesse\nde base."
    it: "Strumento da usare su un Pokémon.\nNe aumenta di poco la Velocità di base."
    de: "Schenkt man einem Pokémon dieses\nItem, wird dessen Initiative-Wert\ndauerhaft erhöht."
    es: "Pluma que aumenta un poco\nla Velocidad de un Pokémon\nal subir de nivel."
    ko: "포켓몬에게 사용하는 도구.\n포켓몬 1마리의 스피드\n기초 포인트를 조금 올린다."
tamato_berry:
  names:
    jp_kana: マトマのみ
    jp_kanji: マトマのみ
    en: Tamato Berry
    fr: Baie Tamato
    it: Baccamodoro
    de: Tamotbeere
    es: Baya Tamate
    ko: 토망열매
  descriptions:
    jp_kana: "ポケモンに　あげると\nとても　なつき　やすくなるが\nすばやさの　きそポイントは　さがる。"
    jp_kanji: "ポケモンに　あげると\nとても　なつき　やすくなるが\n素早さの　基礎ポイントは　さがる。"
    en: "Using it on a Pokémon makes it more\nfriendly, but it also lowers its base\nSpeed stat."
    fr: "Rend les Pokémon plus amicaux, mais\nbaisse leur stat Vitesse de base."
    it: "Utilizzata su un Pokémon, lo rende più\namichevole, ma diminuisce la Velocità\ndi base."
    de: "Isst ein Pokémon diese Beere,\nstärkt dies eure Freundschaft, ver-\nringert aber seinen Initiative-Wert."
    es: "Al usarla con un Pokémon, se gana\nsu amistad, pero también reduce\nsu Velocidad de base."
    ko: "포켓몬에게 주면\n매우 친밀해지기 쉬워지지만\n스피드의 기초 포인트가 떨어진다."
tanga_berry:
  names:
    jp_kana: タンガのみ
    jp_kanji: タンガのみ
    en: Tanga Berry
    fr: Baie Panga
    it: Baccaitan
    de: Tanigabeere
    es: Baya Yecana
    ko: 리체열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　むし　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　むし技を\n受けたとき　威力が　弱まる。"
    en: "Weakens a supereffective Bug-type\nattack against the holding Pokémon."
    fr: "Tenue, cette Baie affaiblit une attaque\nennemie super efficace de type Insecte."
    it: "Se tenuta da un Pokémon, indebolisce\nl’attacco superefficace di tipo\nColeottero del nemico."
    de: "Als getragenes Item schwächt diese\nBeere besonders effektive Attacken\ndes Angreifers vom Typ Käfer."
    es: "Si la lleva un Pokémon, debilita un\nataque supereficaz de tipo Bicho\nde un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 뛰어난 벌레 기술을\n당했을 때 위력이 약해진다."
thanks_mail:
  names:
    jp_kana: かんしゃメール
    jp_kanji: かんしゃメール
    en: Thanks Mail
    fr: Lettre Merci
    it: Mess. Grazie
    de: Dankesbrief
    es: C. Gracias
    ko: 감사메일
  descriptions:
    jp_kana: "かんしゃを　つたえる　メールが\nかきやすい　びんせん。\nポケモンに　もたせて　つかう。"
    jp_kanji: "感謝を　伝える　メールが\n書きやすい　レターペーパー。\nポケモンに　持たせて　使う。"
    en: "Stationery designed for\na thank-you note.\nLet a Pokémon hold it for delivery."
    fr: "Un papier à lettres idéal pour les\nremerciements. Peut être tenu\net livré par un Pokémon."
    it: "Carta da lettera ideale per scrivere\ndei ringraziamenti. Un Pokémon può\ntenerla e consegnarla."
    de: "Briefpapier, mit dem man sich\nbei jemandem bedanken kann.\nGib es einem Pokémon zum Tragen."
    es: "Carta de agradecimiento.\nHaz que la entregue un Pokémon."
    ko: "감사의 마음을 전하는 메일을\n쉽게 쓸 수 있는 편지지.\n포켓몬에게 지니게 해서 쓴다."
thick_club:
  names:
    jp_kana: ふといホネ
    jp_kanji: ふといホネ
    en: Thick Club
    fr: Masse Os
    it: Ossospesso
    de: Kampfknochen
    es: Hueso Grueso
    ko: 굵은뼈
  descriptions:
    jp_kana: "なにかの　かたい　ホネ。\nカラカラ　または　ガラガラに\nもたせると　こうげきが　あがる。"
    jp_kanji: "なにかの　硬い　ホネ。\nカラカラ　または　ガラガラに\n持たせると　攻撃が　あがる。"
    en: "An item to be held by Cubone or\nMarowak. It is a hard bone of some\nsort that boosts the Attack stat."
    fr: "Objet à faire tenir à Osselait ou\nOssatueur. Os dur qui monte leur\nAttaque."
    it: "Strumento da far tenere a Cubone o\nMarowak. Osso duro che migliora\nl’Attacco."
    de: "Ein harter Knochen, der den Angriffs-\nWert von Tragosso oder Knogga\nerhöht, wenn sie ihn tragen."
    es: "Un extraño tipo de hueso que potencia\nel Ataque. Deben llevarlo Cubone o\nMarowak."
    ko: "무언가의 단단한 뼈.\n탕구리 혹은 텅구리에게\n지니게 하면 공격이 올라간다."
thunder_stone:
  names:
    jp_kana: かみなりのいし
    jp_kanji: かみなりのいし
    en: Thunderstone
    fr: Pierrefoudre
    it: Pietratuono
    de: Donnerstein
    es: Piedratrueno
    ko: 천둥의돌
  descriptions:
    jp_kana: "ある　とくていの　ポケモンを\nしんかさせる　ふしぎな　いし。\nいなずまの　もようが　ある。"
    jp_kanji: "ある　特定の　ポケモンを\n進化させる　不思議な　石。\n稲妻の　模様が　ある。"
    en: "A peculiar stone that makes certain\nspecies of Pokémon evolve.\nIt has a thunderbolt pattern."
    fr: "Une pierre étrange qui fait évoluer\ncertaines espèces de Pokémon.\nUn éclair est dessiné dessus."
    it: "Pietra particolare che fa evolvere\ndeterminate specie di Pokémon.\nRiporta l’immagine di un fulmine."
    de: "Dieser spezielle Stein löst bei\nbestimmten Pokémon die Entwicklung\naus. Er hat ein Blitzmuster."
    es: "Curiosa piedra que hace evolucionar\na determinadas especies de Pokémon.\nTiene grabado un rayo."
    ko: "어느 특정한 포켓몬을\n진화시키는 이상한 돌.\n천둥번개 무늬가 있다."
tidal_bell:
  names:
    jp_kana: うみなりのスズ
    jp_kanji: うみなりのスズ
    en: Tidal Bell
    fr: Glas Tempête
    it: Camp. Onda
    de: Gischtglocke
    es: Camp. Oleaje
    ko: 해명의방울
  descriptions:
    jp_kana: "こころ　やすまる　ねいろが　きける\nとても　ふるめかしい　スズ。"
    jp_kanji: "こころ　やすまる　ねいろが　きける\nとても　ふるめかしい　スズ。"
    en: "A very old-fashioned bell that makes a\ngentle ringing."
    fr: "Une cloche antique au tintement\napaisant."
    it: "Campana antica. Produce un suono\nche dona pace al cuore."
    de: "Eine altehrwürdige Glocke,\nderen Läuten alle besänftigt,\ndie es hören."
    es: "Campana de aspecto antiguo que emite\nun sonido que calma el espíritu."
    ko: "마음이 편안해지는 음색이 들리는\n아주 고풍스런 방울."
timer_ball:
  names:
    jp_kana: タイマーボール
    jp_kanji: タイマーボール
    en: Timer Ball
    fr: Chrono Ball
    it: Timer Ball
    de: Timerball
    es: Turno Ball
    ko: 타이마볼
  descriptions:
    jp_kana: "ターンすうが　かかれば　かかるほど\nポケモンが　つかまえやすくなる\nちょっと　かわった　ボール。"
    jp_kanji: "ターン数が　かかれば　かかるほど\nポケモンが　捕まえやすくなる\nちょっと　変わった　ボール。"
    en: "A somewhat different Ball that\nbecomes progressively better the\nmore turns there are in a battle."
    fr: "Une Poké Ball un peu spéciale qui\nfonctionne de mieux en mieux à\nmesure que le combat s’éternise."
    it: "Poké Ball un po’ diversa che diventa\nprogressivamente più efficace con\nl’aumentare dei turni in lotta."
    de: "Ein Ball, der mit zunehmender\nKampfdauer effektiver wird."
    es: "Una Poké Ball algo distinta que va\nmejorando su rendimiento con cada\nturno de combate."
    ko: "턴 수가 길어지면 길어질수록\n포켓몬을 잡기 쉬운\n조금 특이한 볼."
tiny_mushroom:
  names:
    jp_kana: ちいさなキノコ
    jp_kanji: ちいさなキノコ
    en: TinyMushroom
    fr: Petit Champi
    it: Minifungo
    de: Minipilz
    es: Mini Seta
    ko: 작은버섯
  descriptions:
    jp_kana: "ちいさな　めずらしい　キノコ。\nいちぶの　マニアの　あいだでは\nけっこう　にんきが　たかい。"
    jp_kanji: "ちいさな　珍しい　キノコ。\n一部の　マニアの　あいだでは\nけっこう　人気が　高い。"
    en: "A small and rare mushroom.\nIt is sought after by collectors."
    fr: "Un petit champignon plutôt rare.\nIl est plutôt populaire parmi\ncertains fans dévoués."
    it: "Fungo piccolo e raro. È parecchio\napprezzato da alcuni intenditori."
    de: "Ein kleiner und seltener Pilz.\nSeine Fans sind ganz aus dem\nHäuschen, wenn sie einen finden."
    es: "Una pequeña seta que es poco común\ny bastante popular entre determinados\ngrupos de gourmets."
    ko: "작고 진귀한 버섯.\n일부 마니아 사이에서는\n매우 인기가 높다."
tm001:
  names:
    jp_kana: わざマシン０１
    jp_kanji: わざマシン０１
    en: TM01
    fr: CT01
    it: MT01
    de: TM01
    es: MT01
    ko: 기술머신01
  descriptions:
    jp_kana: "つめを　みがいて　するどく　する。\nじぶんの　こうげきと　\nめいちゅうりつを　あげる。"
    jp_kanji: "つめを　磨いて　鋭く　する。\n自分の　攻撃と　\n命中率を　あげる。"
    en: "The user sharpens its claws to\nboost its Attack stat and accuracy."
    fr: "Le lanceur s’aiguise les griffes.\nAugmente l’Attaque et la Précision."
    it: "Chi la usa affila i propri artigli,\naumentando Attacco e precisione."
    de: "Der Anwender wetzt seine Klauen,\num sie zu schärfen. Angriff und\nGenauigkeit werden erhöht."
    es: "Lima y afila las garras.\nAumenta el Ataque y la Precisión."
    ko: "발톱을 갈아 날카롭게 만든다.\n자신의 공격과\n명중률을 올린다."
tm002:
  names:
    jp_kana: わざマシン０２
    jp_kanji: わざマシン０２
    en: TM02
    fr: CT02
    it: MT02
    de: TM02
    es: MT02
    ko: 기술머신02
  descriptions:
    jp_kana: "するどく　とがった　きょだいな\nツメで　ひっかいて　こうげきする。"
    jp_kanji: "鋭く　とがった　巨大な　ツメで\n相手を　切り裂いて　攻撃する。"
    en: "The user slashes the target with huge,\nsharp claws."
    fr: "Le lanceur lacère l’ennemi de ses\ngrandes griffes aiguisées."
    it: "Chi la usa attacca con artigli affilati\nche graffiano il nemico rapidamente e\ncon grande forza."
    de: "Das Ziel wird mit langen,\nscharfen Krallen brutal attackiert."
    es: "Engancha y araña al objetivo con unas\npotentes y enormes garras afiladas."
    ko: "날카롭고 뾰족한 거대한 발톱으로\n상대를 베어 갈라서 공격한다."
tm003:
  names:
    jp_kana: わざマシン０３
    jp_kanji: わざマシン０３
    en: TM03
    fr: CT03
    it: MT03
    de: TM03
    es: MT03
    ko: 기술머신03
  descriptions:
    jp_kana: "ふしぎな　ねんぱを　じったいかして\nあいてを　こうげきする。\nぶつりてきな　ダメージを　あたえる。"
    jp_kanji: "不思議な　念波を　実体化して\n相手を　攻撃する。\n物理的な　ダメージを　与える。"
    en: "The user materializes an odd\npsychic wave to attack the target.\nThis attack does physical damage."
    fr: "Le lanceur matérialise des ondes\nmystérieuses qu’il projette sur\nl’ennemi. Inflige des dégâts physiques."
    it: "Chi la usa attacca il bersaglio facendo\nmaterializzare un misterioso raggio\npsichico che provoca danni fisici."
    de: "Anwender erzeugt eine seltsame\nEnergiewelle, die dem Ziel\nphysischen Schaden zufügt."
    es: "Crea una onda psíquica que causa\ndaño físico al objetivo."
    ko: "이상한 염력파를 실체화하여\n상대를 공격한다.\n물리적인 데미지를 준다."
tm004:
  names:
    jp_kana: わざマシン０４
    jp_kanji: わざマシン０４
    en: TM04
    fr: CT04
    it: MT04
    de: TM04
    es: MT04
    ko: 기술머신04
  descriptions:
    jp_kana: "しずかに　せいしんを　とういつして\nこころを　しずめることで　じぶんの\nとくこうと　とくぼうを　あげる。"
    jp_kanji: "静かに　精神を　統一し\n心を　鎮めることで　自分の\n特攻と　特防を　あげる。"
    en: "The user quietly focuses its mind and\ncalms its spirit to raise its Sp. Atk\nand Sp. Def stats."
    fr: "Le lanceur se concentre et fait le vide\ndans son esprit pour monter son\nAtq. Spé. et sa Déf. Spé."
    it: "Chi la usa, meditando, placa il proprio\nspirito per aumentare l’Attacco\nSpeciale e la Difesa Speciale."
    de: "Der Anwender konzentriert und beruhigt\nsich. So werden Spezial-Angriff und\nSpezial-Verteidigung verstärkt."
    es: "Quien lo usa concentra su energía\nmental y calma su espíritu para\naumentar su At. Esp. y su Def. Esp."
    ko: "조용히 정신을 통일해서\n마음을 가라앉혀 자신의\n특수공격과 특수방어를 올린다."
tm005:
  names:
    jp_kana: わざマシン０５
    jp_kanji: わざマシン０５
    en: TM05
    fr: CT05
    it: MT05
    de: TM05
    es: MT05
    ko: 기술머신05
  descriptions:
    jp_kana: "あいてを　にがして　ひかえポケモンを\nひきずりだす。　やせいポケモンなら\nせんとうは　おわる。"
    jp_kanji: "相手を　逃がして\n控えの　ポケモンを　ひきずりだす。\n野生の　場合は　戦闘が　終わる。"
    en: "The target is scared off and replaced\nby another Pokémon in its party.\nIn the wild, the battle ends."
    fr: "Effraie le Pokémon visé et le\nremplace par un autre. Dans\nla nature, met fin au combat."
    it: "Il bersaglio è costretto a lasciare\nil campo e viene sostituito. Mette fine\nalle lotte contro Pokémon selvatici."
    de: "Der Brüller schlägt das Ziel in\ndie Flucht. Ein Kampf gegen ein\nwildes Pokémon wird beendet."
    es: "Asusta tanto al objetivo que tiene que\ncambiarse por otro de su grupo. Si es\nun Pokémon salvaje, la batalla acaba."
    ko: "상대를 도망가게 해서\n교대할 포켓몬을 끌어낸다.\n야생의 경우에는 배틀이 끝난다."
tm006:
  names:
    jp_kana: わざマシン０６
    jp_kanji: わざマシン０６
    en: TM06
    fr: CT06
    it: MT06
    de: TM06
    es: MT06
    ko: 기술머신06
  descriptions:
    jp_kana: "もうどくの　じょうたいに　する。\nターンすうが　すすむほど　どくの\nダメージりょうは　ふえる。"
    jp_kanji: "相手を　猛毒の　状態に　する。\nターンが　すすむほど\n毒の　ダメージが　増えていく。"
    en: "A move that leaves the target badly\npoisoned. Its poison damage\nworsens every turn."
    fr: "Empoisonne gravement l’ennemi. Les\ndégâts dus au poison augmentent à\nchaque tour."
    it: "Iperavvelena il nemico con una potente\ntossina. Il danno peggiora ad ogni\nturno."
    de: "Das Ziel wird schwer vergiftet.\nDer Schaden durch das Gift wird\nin jeder Runde stärker."
    es: "Un movimiento altamente tóxico que\nenvenena gravemente al objetivo y\ncausa un daño mayor en cada turno."
    ko: "상대를 맹독의 상태로 만든다.\n턴이 진행될수록\n독의 데미지가 증가한다."
tm007:
  names:
    jp_kana: わざマシン０７
    jp_kanji: わざマシン０７
    en: TM07
    fr: CT07
    it: MT07
    de: TM07
    es: MT07
    ko: 기술머신07
  descriptions:
    jp_kana: "５ターンの　あいだ　あられを\nふらして　こおりタイプ　いがいの\nポケモンに　ダメージを　あたえる。"
    jp_kanji: "５ターンの　あいだ　あられを\n降らして　こおりタイプ　以外の\nポケモンに　ダメージを　与える。"
    en: "Summons a hailstorm that lasts for\nfive turns. The hailstorm damages\nall types except Ice."
    fr: "Invoque une tempête de grêle qui dure\n5 tours. Ne blesse pas les Pokémon de\ntype Glace."
    it: "Chi la usa provoca una grandinata di\ncinque turni. Danneggia tutti i Pokémon\ntranne quelli di tipo Ghiaccio."
    de: "Der verursachte Hagelsturm hält\n5 Runden an und schadet allen\nPokémon, außer denen vom Typ Eis."
    es: "Invoca una tormenta de granizo que\ndura cinco turnos y daña a todos los\nPokémon excepto a los de tipo Hielo."
    ko: "5턴 동안 싸라기눈을\n내리게 해서 얼음타입 이외의\n포켓몬에게 데미지를 준다."
tm008:
  names:
    jp_kana: わざマシン０８
    jp_kanji: わざマシン０８
    en: TM08
    fr: CT08
    it: MT08
    de: TM08
    es: MT08
    ko: 기술머신08
  descriptions:
    jp_kana: "ちからを　こめて　きんにくを\nあつくする　ことで　じぶんの\nこうげきと　ぼうぎょを　あげる。"
    jp_kanji: "体に　力を　こめて\n筋肉を　ぶあつく　することで\n自分の　攻撃と　防御を　あげる。"
    en: "The user tenses its muscles to bulk up\nits body, boosting both its Attack and\nDefense stats."
    fr: "Le lanceur tend ses muscles pour se\ngonfler, ce qui booste son Attaque et\nsa Défense."
    it: "Chi la usa tende i muscoli per gonfiare\nil corpo, aumentando Difesa e Attacco."
    de: "Der Anwender spannt seine Muskeln an\nund steigert damit den Angriffs- und\nden Verteidigungs-Wert."
    es: "Tensa los músculos de quien lo usa y\npotencia su Ataque y su Defensa."
    ko: "몸에 힘을 담아\n근육을 두껍게 해서\n자신의 공격과 방어를 올린다."
tm009:
  names:
    jp_kana: わざマシン０９
    jp_kanji: わざマシン０９
    en: TM09
    fr: CT09
    it: MT09
    de: TM09
    es: MT09
    ko: 기술머신09
  descriptions:
    jp_kana: "とくしゅな　どくえきを　あびせる。\nどく　じょうたいの　あいてには\nいりょくが　２ばいに　なる。"
    jp_kanji: "特殊な　毒液を　浴びせかける。\n毒状態の　相手には\n威力が　２倍に　なる。"
    en: "The user drenches the target in a\nspecial poisonous liquid. Its power\nis doubled if the target is poisoned."
    fr: "Le lanceur inocule un poison spécial\nà l’ennemi. L’effet est doublé si\nl’ennemi est déjà empoisonné."
    it: "Lancia uno speciale liquido tossico sul\nbersaglio. Se questi è avvelenato, il\ndanno provocato raddoppia."
    de: "Überschüttet das Ziel mit einer spe-\nziellen toxischen Flüssigkeit. Doppelt\nso stark gegen vergiftete Ziele."
    es: "Un líquido venenoso que cubre al\nobjetivo y provoca un daño doble\nsi este ya estaba envenenado."
    ko: "특수한 독액을 날린다.\n독 상태의 상대에게는\n위력이 2배가 된다."
tm010:
  names:
    jp_kana: わざマシン１０
    jp_kanji: わざマシン１０
    en: TM10
    fr: CT10
    it: MT10
    de: TM10
    es: MT10
    ko: 기술머신10
  descriptions:
    jp_kana: "おぼえる　ポケモンの　かくされた\nのうりょくで　わざの　タイプと\nいりょくが　かわる。"
    jp_kanji: "技を　使った　ポケモンに　よって\n相手に　与える\n技の　タイプと　威力が　変わる。"
    en: "A unique attack that varies in type and\nintensity depending on the Pokémon\nusing it."
    fr: "La puissance et le type de la\ncapacité dépendent de l’aptitude\ncachée du lanceur."
    it: "Mossa singolare che cambia tipo e\npotenza a seconda del Pokémon che\nla usa."
    de: "Die Stärke und der Typ dieser Attacke\nhängen vom jeweiligen Pokémon ab."
    es: "Movimiento variable que cambia de tipo\ny potencia en función de la habilidad\noculta del Pokémon que lo use."
    ko: "기술을 배운 포켓몬의\n숨겨진 능력으로\n기술 타입과 위력이 바뀐다."
tm011:
  names:
    jp_kana: わざマシン１１
    jp_kanji: わざマシン１１
    en: TM11
    fr: CT11
    it: MT11
    de: TM11
    es: MT11
    ko: 기술머신11
  descriptions:
    jp_kana: "５ターンの　あいだ　ひざしを\nつよくして　ほのおタイプの\nわざの　いりょくを　あげる。"
    jp_kanji: "５ターンの　あいだ　日差しを\nつよくして　ほのおタイプの\n技の　威力を　あげる。"
    en: "The user intensifies the sun for\nfive turns, powering up Fire-type\nmoves."
    fr: "Fait briller le soleil pendant 5 tours et\naméliore les capacités de type Feu."
    it: "Chi la usa intensifica i raggi solari per\ncinque turni, potenziando le mosse di\ntipo Fuoco."
    de: "Die Sonne brennt unbarmherzig 5\nRunden lang. Dadurch werden Attacken\nvom Typ Feuer verstärkt."
    es: "Quien lo usa intensifica el sol durante\ncinco turnos, lo que potencia\nlos movimientos de tipo Fuego."
    ko: "5턴 동안 햇살을 강하게 해서\n불꽃타입 기술의 위력을 올린다."
tm012:
  names:
    jp_kana: わざマシン１２
    jp_kanji: わざマシン１２
    en: TM12
    fr: CT12
    it: MT12
    de: TM12
    es: MT12
    ko: 기술머신12
  descriptions:
    jp_kana: "あいてを　おこらせる。３ターンの\nあいだ　あいては　ダメージを\nあたえる　わざしか　だせなくなる。"
    jp_kanji: "相手を　怒らせる。３ターンの\nあいだ　相手は　ダメージを\n与える　技しか　だせなくなる。"
    en: "The target is taunted into a rage that\nallows it to use only attack moves\nfor three turns."
    fr: "Provoque l’ennemi. L’oblige à n’utiliser\nque des attaques pendant 3 tours."
    it: "Provoca il nemico, inducendolo ad usare\nsolo mosse d’attacco per tre turni."
    de: "Das Ziel wird so gereizt, dass es\nüber 3 Runden hinweg nur\nAngriffsattacken einsetzt."
    es: "Provoca un ataque de ira en el objetivo\nque solo le permite usar movimientos\nde ataque durante tres turnos."
    ko: "상대를 화나게 한다.\n3턴 동안 상대는 데미지를\n주는 기술밖에 쓸 수 없게 된다."
tm013:
  names:
    jp_kana: わざマシン１３
    jp_kanji: わざマシン１３
    en: TM13
    fr: CT13
    it: MT13
    de: TM13
    es: MT13
    ko: 기술머신13
  descriptions:
    jp_kana: "れいきの　ビームを　はっしゃして\nこうげきする。　あいてを　こおりの\nじょうたいに　することが　ある。"
    jp_kanji: "凍える　ビームを\n相手に　発射して　攻撃する。\nこおり状態に　することが　ある。"
    en: "The target is struck with an icy-cold\nbeam of energy.\nIt may also freeze the target solid."
    fr: "Un rayon de glace frappe l’ennemi.\nPeut aussi le geler."
    it: "Il nemico è colpito da un raggio di\nenergia gelida che può anche\ncongelarlo."
    de: "Das Ziel wird von einem eiskalten\nEnergiestrahl getroffen. Dieser friert\nes eventuell ein."
    es: "Ataca al objetivo con un rayo de hielo\nque puede llegar a congelarlo."
    ko: "냉동빔을\n상대에게 발사하여 공격한다.\n얼음 상태로 만들 때가 있다."
tm014:
  names:
    jp_kana: わざマシン１４
    jp_kanji: わざマシン１４
    en: TM14
    fr: CT14
    it: MT14
    de: TM14
    es: MT14
    ko: 기술머신14
  descriptions:
    jp_kana: "はげしい　ふぶきを　ぶつけて\nこうげきする。　あいてを　こおりの\nじょうたいに　することが　ある。"
    jp_kanji: "激しい　吹雪を\n相手に　吹きつけて　攻撃する。\nこおり状態に　することが　ある。"
    en: "A howling blizzard is summoned to strike\nthe opposing team. It may also freeze\nthem solid."
    fr: "Une violente tempête de neige est\ndéclenchée sur l’ennemi. Peut aussi\nle geler."
    it: "Colpisce i bersagli con una tremenda\ntempesta di ghiaccio che può anche\ncongelarli."
    de: "Eine ungnädige Eis- und Schnee-Attacke,\ndie Pokémon in der Nähe des Anwenders\ntrifft und eventuell einfrieren kann."
    es: "Invoca una tormenta de viento y nieve\nque envuelve al objetivo y puede llegar\na congelarlo."
    ko: "세찬 눈보라를\n상대에게 내뿜어 공격한다.\n얼음 상태로 만들 때가 있다."
tm015:
  names:
    jp_kana: わざマシン１５
    jp_kanji: わざマシン１５
    en: TM15
    fr: CT15
    it: MT15
    de: TM15
    es: MT15
    ko: 기술머신15
  descriptions:
    jp_kana: "つよい　こうせんを　はっしゃする。\nつかった　つぎのターンは　はんどうで\nうごけなくなる。"
    jp_kanji: "強い　光線を\n相手に　発射して　攻撃する。\n次の　ターンは　動けなくなる。"
    en: "The target is attacked with a powerful\nbeam. The user must rest on the next\nturn to regain its energy."
    fr: "Projette un puissant rayon sur\nl’ennemi. Le lanceur doit se reposer\nau tour suivant."
    it: "Colpisce il nemico con un potente\nraggio. Chi la usa salta il turno\nsuccessivo per recuperare energia."
    de: "Eine äußerst starke Attacke, die viel\nSchaden anrichtet. Anwender muss\nsich in der nächsten Runde ausruhen."
    es: "Ataca al objetivo con un potente rayo,\npero quien lo usa debe descansar en el\nsiguiente turno para reponer energía."
    ko: "강한 광선을\n상대에게 발사하여 공격한다.\n다음 턴은 움직일 수 없다."
tm016:
  names:
    jp_kana: わざマシン１６
    jp_kanji: わざマシン１６
    en: TM16
    fr: CT16
    it: MT16
    de: TM16
    es: MT16
    ko: 기술머신16
  descriptions:
    jp_kana: "５ターンの　あいだ　ふしぎな　かべで\nあいてから　うける　とくしゅわざの\nダメージを　よわめる。"
    jp_kanji: "５ターンの　あいだ　不思議な　かべで\n相手から　受ける　特殊攻撃の\nダメージを　弱める。"
    en: "A wondrous wall of light is put up to\nsuppress damage from special attacks\nfor five turns."
    fr: "Un fabuleux mur de lumière qui réduit\nles dégâts causés par les attaques\nspéciales durant 5 tours."
    it: "Innalza una barriera di luce fantastica\nper ridurre i danni degli attacchi\nspeciali alla squadra per 5 turni."
    de: "Eine Wand aus Licht wird über 5 Runden\nerrichtet. Sie senkt den durch Spezial-\nAngriffe herbeigeführten Schaden."
    es: "Impresionante pared de luz que reduce\nel daño de los Ataques Especiales\ndurante cinco turnos."
    ko: "5턴 동안 이상한 장막으로\n상대로부터 받는 특수 기술의\n데미지를 약하게 만든다."
tm017:
  names:
    jp_kana: わざマシン１７
    jp_kanji: わざマシン１７
    en: TM17
    fr: CT17
    it: MT17
    de: TM17
    es: MT17
    ko: 기술머신17
  descriptions:
    jp_kana: "こうげきを　まったく　うけない。\nわざを　れんぞくで　だすと\nしっぱい　しやすくなる。"
    jp_kanji: "相手の　攻撃を\nまったく　受けない。\n連続で　だすと　失敗しやすい。"
    en: "It enables the user to evade all\nattacks. Its chance of failing rises\nif it is used in succession."
    fr: "Le lanceur esquive toutes les attaques.\nPlus la capacité est utilisée de fois à la\nsuite, plus elle risque d’échouer."
    it: "Permette di eludere tutti gli attacchi.\nSe usata in successione può fallire."
    de: "Garantierter Schutz in der Runde,\nin der die Attacke eingesetzt wird.\nKönnte bei häufigem Einsatz versagen."
    es: "Bloquea todos los ataques.\nPuede fallar si se usa repetidamente."
    ko: "상대의 공격을\n전혀 받지 않는다.\n연속으로 쓰면 실패하기 쉽다."
tm018:
  names:
    jp_kana: わざマシン１８
    jp_kanji: わざマシン１８
    en: TM18
    fr: CT18
    it: MT18
    de: TM18
    es: MT18
    ko: 기술머신18
  descriptions:
    jp_kana: "５ターンの　あいだ　あめを　ふらして\nみずタイプの　わざの　いりょくを\nあげる。"
    jp_kanji: "５ターンの　あいだ　雨を　降らして\nみずタイプの\n技の　威力を　あげる。"
    en: "The user summons a heavy rain that\nfalls for five turns, powering up\nWater-type moves."
    fr: "Invoque de fortes pluies qui durent\n5 tours et améliorent les capacités\nde type Eau."
    it: "Chi la usa provoca una forte pioggia per\ncinque turni, potenziando le mosse di\ntipo Acqua."
    de: "Schwerer Niederschlag setzt für 5\nRunden ein. Attacken vom Typ Wasser\nwerden verstärkt."
    es: "Quien lo usa invoca una fuerte lluvia\nque dura cinco turnos y fortalece los\nmovimientos de tipo Agua."
    ko: "5턴 동안 비를 내려서\n물타입 기술의 위력을 올린다."
tm019:
  names:
    jp_kana: わざマシン１９
    jp_kanji: わざマシン１９
    en: TM19
    fr: CT19
    it: MT19
    de: TM19
    es: MT19
    ko: 기술머신19
  descriptions:
    jp_kana: "あいてを　うかせて　３ターンの\nあいだ　こうげきが　あいてに\nあたりやすくなる。"
    jp_kanji: "超能力で　相手を　浮かせる。\n３ターンの　あいだ　攻撃が\n相手に　当たりやすく　なる。"
    en: "The user makes the target float with\nits psychic power. The target is easier\nto hit for three turns."
    fr: "Un pouvoir qui fait flotter l’ennemi\ndans les airs. Pendant 3 tours, il\ndevient plus facile à atteindre."
    it: "Chi la usa fa galleggiare in aria il\nbersaglio, rendendolo facile da\ncolpire per tre turni."
    de: "Bringt Ziel durch Psycho-Kräfte zum\nSchweben. Dieses lässt sich so über\n3 Runden besonders leicht treffen."
    es: "Quien lo usa emplea su poder mental\npara hacer levitar al objetivo, que es\nmás vulnerable durante tres turnos."
    ko: "초능력으로 상대를 띄운다.\n3턴 동안 공격이\n상대에게 맞기 쉬워진다."
tm020:
  names:
    jp_kana: わざマシン２０
    jp_kanji: わざマシン２０
    en: TM20
    fr: CT20
    it: MT20
    de: TM20
    es: MT20
    ko: 기술머신20
  descriptions:
    jp_kana: "５ターンの　あいだ\nふしぎな　ちからに　まもられて\nじょうたい　いじょうに　ならなくなる。"
    jp_kanji: "５ターンの　あいだ\n不思議な　力に　守られて\n状態異常に　ならなくなる。"
    en: "The user creates a protective field\nthat prevents status problems\nfor five turns."
    fr: "Champ protecteur empêchant tous les\nproblèmes de statut pendant 5 tours."
    it: "Chi la usa crea un campo protettivo che\ndifende tutta la squadra dai problemi di\nstato per cinque turni."
    de: "Ein Schild schützt das Team\n5 Runden vor Statusproblemen\njeglicher Art."
    es: "Un escudo que protege de problemas\nde estado, como el sueño o la parálisis,\ndurante cinco turnos."
    ko: "5턴 동안\n이상한 힘으로 보호받아\n상태 이상이 되지 않는다."
tm021:
  names:
    jp_kana: わざマシン２１
    jp_kanji: わざマシン２１
    en: TM21
    fr: CT21
    it: MT21
    de: TM21
    es: MT21
    ko: 기술머신21
  descriptions:
    jp_kana: "ふまんを　はらすために　ぜんりょくで\nこうげきする。　なついて　いないほど\nいりょくは　あがる。"
    jp_kanji: "不満を　はらすため　全力で\n攻撃する。　なついて　いないほど\n威力は　あがる。"
    en: "A full-power attack that grows more\npowerful the less the user likes its\nTrainer."
    fr: "Moins le Pokémon aime son Dresseur,\nplus cette attaque est puissante."
    it: "Mossa che diventa tanto più potente\nquanto minore è il grado di affezione\ndel Pokémon per il proprio Allenatore."
    de: "Je unbeliebter der Trainer bei\nseinem Pokémon ist, desto größer\nist die Wirkung."
    es: "Un ataque de gran potencia que resulta\nmás fuerte cuanto menos le guste el\nEntrenador al Pokémon que lo usa."
    ko: "불만을 풀기 위해서 전력으로\n공격한다. 친밀하지 않을수록\n위력이 올라간다."
tm022:
  names:
    jp_kana: わざマシン２２
    jp_kanji: わざマシン２２
    en: TM22
    fr: CT22
    it: MT22
    de: TM22
    es: MT22
    ko: 기술머신22
  descriptions:
    jp_kana: "１ターンめに　ひかりを　あつめて\n２ターンめに　ひかりの　こうせんを\nはっしゃして　こうげきする。"
    jp_kanji: "１ターン目に　光を　いっぱいに　集め\n２ターン目に　光の　束を\n発射して　攻撃する。"
    en: "A two-turn attack. The user gathers\nlight, then blasts a bundled beam on\nthe second turn."
    fr: "Absorbe la lumière au premier tour\net envoie un rayon puissant au\ntour suivant."
    it: "Chi la usa assorbe luce al primo turno\nper proiettare un raggio intenso al\nturno successivo."
    de: "Eine Attacke über 2 Runden.\nZunächst wird Sonnenlicht absorbiert,\nanschließend erfolgt der Angriff."
    es: "Ataque de dos turnos. En el primer\nturno se concentra luz, y en el segundo\nse canaliza en un rayo para atacar."
    ko: "1턴째에 빛을 가득 모아\n2턴째에 빛의 다발을\n발사하여 공격한다."
tm023:
  names:
    jp_kana: わざマシン２３
    jp_kanji: わざマシン２３
    en: TM23
    fr: CT23
    it: MT23
    de: TM23
    es: MT23
    ko: 기술머신23
  descriptions:
    jp_kana: "いしや　たまを　なげて　とんでいる\nあいてを　こうげきする。あいては\nうちおとされて　じめんに　おちる。"
    jp_kanji: "石や　弾を　投げて　飛んでいる\n相手を　攻撃する。相手は\nうちおとされて　地面に　おちる。"
    en: "The user throws a stone or projectile\nto attack an opponent. A flying Pokémon\nwill fall to the ground when it’s hit."
    fr: "Le lanceur jette toutes sortes\nde projectiles à un ennemi. Si ce\ndernier vole, il tombe au sol."
    it: "Chi la usa lancia una pietra o un\nproiettile. Può colpire anche un\nbersaglio in volo e farlo cadere."
    de: "Greift das Ziel mit Steinen und Wurfge-\nschossen an. Fliegende Ziele fallen\nvom Himmel und landen auf dem Boden."
    es: "El usuario ataca lanzando una piedra\no un proyectil. Puede estrellar contra\nel suelo al objetivo si vuela."
    ko: "돌이나 탄알을 던져 날고 있는\n상대를 공격한다. 상대는\n격추되어 지면에 떨어진다."
tm024:
  names:
    jp_kana: わざマシン２４
    jp_kanji: わざマシン２４
    en: TM24
    fr: CT24
    it: MT24
    de: TM24
    es: MT24
    ko: 기술머신24
  descriptions:
    jp_kana: "つよい　でんげきを　あびせて\nこうげきする。　あいてを　まひの\nじょうたいに　することが　ある。"
    jp_kanji: "強い　電撃を\n相手に　浴びせて　攻撃する。\nまひ状態に　することが　ある。"
    en: "A strong electric blast is loosed at the\ntarget. It may also leave the target\nwith paralysis."
    fr: "Une grosse décharge électrique tombe\nsur l’ennemi. Peut aussi le paralyser."
    it: "Il bersaglio viene colpito da una\npotente scarica elettrica che può\nanche paralizzarlo."
    de: "Das Ziel wird von einem verheerenden\nStromschlag getroffen. Kann eventuell\nParalyse bewirken."
    es: "Ataca al objetivo con una fuerte\ndescarga eléctrica que puede\nllegar a paralizar."
    ko: "강한 전격을\n상대에게 날려서 공격한다.\n마비 상태로 만들 때가 있다."
tm025:
  names:
    jp_kana: わざマシン２５
    jp_kanji: わざマシン２５
    en: TM25
    fr: CT25
    it: MT25
    de: TM25
    es: MT25
    ko: 기술머신25
  descriptions:
    jp_kana: "はげしい　かみなりを　おとして\nこうげきする。　あいてを　まひの\nじょうたいに　することが　ある。"
    jp_kanji: "激しい　雷を\n相手に　落として　攻撃する。\nまひ状態に　することが　ある。"
    en: "A wicked thunderbolt is dropped\non the target to inflict damage. It may\nalso leave the target with paralysis."
    fr: "La foudre tombe sur l’ennemi pour\nlui infliger des dégâts. Peut aussi\nle paralyser."
    it: "Il nemico è colpito da un lampo molto\nviolento che può anche paralizzarlo."
    de: "Das Ziel wird von einem mächtigen\nDonnerschlag, der Paralyse bewirken\nkann, heimgesucht."
    es: "Ataca con un terrible rayo que puede\nparalizar al objetivo."
    ko: "강한 번개를\n상대에게 떨어뜨려 공격한다.\n마비 상태로 만들 때가 있다."
tm026:
  names:
    jp_kana: わざマシン２６
    jp_kanji: わざマシン２６
    en: TM26
    fr: CT26
    it: MT26
    de: TM26
    es: MT26
    ko: 기술머신26
  descriptions:
    jp_kana: "じぶんの　まわりの　ポケモンに\nじしんの　しょうげきを　あたえて\nこうげきする。"
    jp_kanji: "自分の　周りの　ポケモンに\n地震の　衝撃を　あたえて　\n攻撃する。"
    en: "The user sets off an earthquake that\nstrikes every Pokémon around it."
    fr: "Le lanceur provoque un tremblement\nde terre touchant tous les Pokémon\nautour de lui."
    it: "Chi la usa provoca un potente sisma che\ncolpisce gli altri Pokémon in campo."
    de: "Ein starkes Beben wird verursacht, das\nden anderen Pokémon in der Umgebung\ndes Angreifers Schaden zufügt."
    es: "Quien lo usa genera un terremoto que\nafecta a los Pokémon de alrededor\nen combate."
    ko: "지진의 충격을 일으켜서\n자신의 주위에 있는 포켓몬을\n공격한다."
tm027:
  names:
    jp_kana: わざマシン２７
    jp_kanji: わざマシン２７
    en: TM27
    fr: CT27
    it: MT27
    de: TM27
    es: MT27
    ko: 기술머신27
  descriptions:
    jp_kana: "トレーナーのために　ぜんりょくで\nこうげきする。　なついて　いるほど\nいりょくは　あがる。"
    jp_kanji: "トレーナーの　ために　全力で\n攻撃する。　なついて　いるほど\n威力は　あがる。"
    en: "A full-power attack that grows more\npowerful the more the user likes its\nTrainer."
    fr: "Une attaque furieuse dont la puissance\naugmente quand le Pokémon apprécie\nson Dresseur."
    it: "Mossa che diventa tanto più potente\nquanto maggiore è il grado di affezione\ndel Pokémon per il proprio Allenatore."
    de: "Je beliebter der Trainer bei\nseinem Pokémon ist, desto\ngrößer ist die Wirkung."
    es: "Un ataque de gran potencia que resulta\nmás fuerte cuanto más le guste el\nEntrenador al Pokémon que lo usa."
    ko: "트레이너를 위해 전력으로 공격한다.\n친밀할수록 위력이 올라간다."
tm028:
  names:
    jp_kana: わざマシン２８
    jp_kanji: わざマシン２８
    en: TM28
    fr: CT28
    it: MT28
    de: TM28
    es: MT28
    ko: 기술머신28
  descriptions:
    jp_kana: "１ターンめに　もぐり　２ターンめで\nこうげきする。　どうくつで　つかうと\nそとに　だっしゅつ　できる。"
    jp_kanji: "１ターン目に　潜り　２ターン目で\n相手を　攻撃する。\nどうくつからの　脱出も　できる。"
    en: "The user burrows, then attacks on the\nsecond turn. It can also be used to\nexit dungeons."
    fr: "Le lanceur creuse au 1ᵉʳ tour et\nfrappe au 2ᵉ. Permet aussi de\ns’échapper d’un donjon."
    it: "Chi la usa scava al primo turno e\nattacca al successivo. Fuori dalla\nlotta fa uscire da alcuni luoghi."
    de: "Eine Attacke über 2 Runden.\nZunächst gräbt sich der Angreifer ein,\nanschließend erfolgt der Angriff."
    es: "Quien lo usa cava en el primer turno y\nataca en el segundo. También se puede\nusar para escapar de lugares cerrados."
    ko: "1턴째에 파고들어 2턴째에\n상대를 공격한다.\n동굴에서 탈출할 수도 있다."
tm029:
  names:
    jp_kana: わざマシン２９
    jp_kanji: わざマシン２９
    en: TM29
    fr: CT29
    it: MT29
    de: TM29
    es: MT29
    ko: 기술머신29
  descriptions:
    jp_kana: "つよい　ねんりきを　おくって\nこうげきする。　あいての　とくぼうを\nさげることが　ある。"
    jp_kanji: "強い　念力を　相手に　送って\n攻撃する。相手の　特防を\nさげることが　ある。"
    en: "The target is hit by a strong\ntelekinetic force. It may also reduce\nthe target’s Sp. Def stat."
    fr: "Une puissante force télékinésique\nfrappe l’ennemi. Peut aussi faire\nbaisser sa Défense Spéciale."
    it: "Il nemico viene colpito da una potente\nforza telecinetica che può anche\nridurne la Difesa Speciale."
    de: "Ein mächtiger Strahl telekinetischer\nEnergie trifft das Ziel. Die Spezial-\nVerteidigung des Zieles sinkt evtl."
    es: "Ataca al objetivo con un potente\nataque telequinético que le puede\nbajar la Defensa Especial."
    ko: "강한 염동력을 상대에게 보내어\n공격한다. 상대의 특수방어를\n떨어뜨릴 때가 있다."
tm030:
  names:
    jp_kana: わざマシン３０
    jp_kanji: わざマシン３０
    en: TM30
    fr: CT30
    it: MT30
    de: TM30
    es: MT30
    ko: 기술머신30
  descriptions:
    jp_kana: "くろいかげの　かたまりを　なげて\nこうげきする。　あいての　とくぼうを\nさげることが　ある。"
    jp_kanji: "黒い影の　塊を　投げつけて\n攻撃する。相手の　特防を\nさげることが　ある。"
    en: "The user hurls a shadowy blob at the\ntarget. It may also lower the target’s\nSp. Def stat."
    fr: "Projette une grande ombre sur\nl’ennemi. Peut aussi faire baisser\nsa Défense Spéciale."
    it: "Lancia sul nemico una sfera nera.\nPuò anche ridurne la Difesa Speciale."
    de: "Das Ziel wird mit einem dunklen\nKlumpen attackiert, der eventuell die\nSpezial-Verteidigung senkt."
    es: "Lanza una bola oscura que puede bajar\nla Defensa Especial del objetivo."
    ko: "까만 그림자의 덩어리를 내던져서\n공격한다. 상대의 특수방어를\n떨어뜨릴 때가 있다."
tm031:
  names:
    jp_kana: わざマシン３１
    jp_kanji: わざマシン３１
    en: TM31
    fr: CT31
    it: MT31
    de: TM31
    es: MT31
    ko: 기술머신31
  descriptions:
    jp_kana: "こぶしなどで　こうげきする。\nひかりのかべや　リフレクターも\nはかいできる。"
    jp_kanji: "硬い　こぶしなどで\n相手を　攻撃する。ひかりのかべや\nリフレクターも　破壊できる。"
    en: "The user attacks with tough fists,\netc. It can also break any barrier\nsuch as Light Screen and Reflect."
    fr: "Une attaque avec la main ou autre.\nPeut briser les barrières comme Mur\nLumière et Protection."
    it: "Colpisce il nemico con una mano e può\nanche rompere barriere come Riflesso e\nSchermoluce."
    de: "Das Ziel wird mit der Faust angegriffen.\nBarrieren wie Lichtschild oder Reflektor\nwerden zerstört."
    es: "Ataca con contundentes puñetazos.\nPuede destruir barreras como Pantalla\nLuz y Reflejo."
    ko: "주먹 등으로 공격한다.\n빛의장막이나 리플렉터도\n파괴할 수 있다."
tm032:
  names:
    jp_kana: わざマシン３２
    jp_kanji: わざマシン３２
    en: TM32
    fr: CT32
    it: MT32
    de: TM32
    es: MT32
    ko: 기술머신32
  descriptions:
    jp_kana: "すばやい　うごきで　ぶんしんを\nつくる。　あいてを　まどわせることで\nかいひりつを　あげる。"
    jp_kanji: "素早い　動きで　分身を　つくり\n相手を　まどわせて\n回避率を　あげる。"
    en: "By moving rapidly, the user makes\nillusory copies of itself to raise\nits evasiveness."
    fr: "Le lanceur se déplace si vite qu’il crée\ndes copies illusoires de lui, augmentant\nson Esquive."
    it: "Chi la usa si muove in fretta e crea\ncopie illusorie di se stesso che\naumentano la capacità di elusione."
    de: "Der Angreifer ist so schnell, dass\nvirtuelle Abbilder generiert werden,\ndie den Fluchtwert erhöhen."
    es: "Quien lo usa se mueve tan rápido que\ndeja una estela de sí mismo que\naumenta la Evasión."
    ko: "재빠른 움직임으로 분신을 만들어\n상대를 혼란시켜\n회피율을 올린다."
tm033:
  names:
    jp_kana: わざマシン３３
    jp_kanji: わざマシン３３
    en: TM33
    fr: CT33
    it: MT33
    de: TM33
    es: MT33
    ko: 기술머신33
  descriptions:
    jp_kana: "５ターンの　あいだ　ふしぎな　かべで\nあいてから　うける　ぶつりわざの\nダメージを　よわめる。"
    jp_kanji: "５ターンの　あいだ　不思議な　かべで\n相手から　受ける　物理攻撃の\nダメージを　弱める。"
    en: "A wondrous wall of light is put up to\nsuppress damage from physical attacks\nfor five turns."
    fr: "Un fabuleux mur de lumière qui réduit\nles dégâts causés par les attaques\nphysiques durant 5 tours."
    it: "Innalza una barriera di luce fantastica\nper ridurre i danni degli attacchi fisici\nalla squadra per cinque turni."
    de: "Eine Wand aus Licht wird für 5 Runden\nerrichtet, die den Schaden physischer\nAttacken reduziert."
    es: "Impresionante pared de luz que reduce\nel daño de los ataques físicos durante\ncinco turnos."
    ko: "5턴 동안 이상한 장막으로\n상대에게 받은 물리 기술의\n데미지를 약하게 만든다."
tm034:
  names:
    jp_kana: わざマシン３４
    jp_kanji: わざマシン３４
    en: TM34
    fr: CT34
    it: MT34
    de: TM34
    es: MT34
    ko: 기술머신34
  descriptions:
    jp_kana: "ヘドロの　なみで　じぶんの　まわりに\nいるものを　こうげきする。\nどくに　することが　ある。"
    jp_kanji: "ヘドロの　波で　自分の　周りに\nいるものを　攻撃する。\n毒状態に　することが　ある。"
    en: "It swamps the area around the user\nwith a giant sludge wave.\nIt may also poison those hit."
    fr: "Attaque tout ce qui se trouve autour\navec une vague de crasse. Peut aussi\nempoisonner."
    it: "Lancia un’onda di fango che attacca\ntutti i Pokémon nelle vicinanze.\nPuò anche avvelenarli."
    de: "Greift Pokémon in der Nähe des\nAnwenders mit einer Schlammwelle an.\nDiese werden eventuell vergiftet."
    es: "Onda de porquería que afecta a todos\nlos Pokémon de alrededor y puede\ncausar envenenamiento."
    ko: "오물의 파장으로 자신의 주위에\n있는 포켓몬을 공격한다.\n독 상태로 만들기도 한다."
tm035:
  names:
    jp_kana: わざマシン３５
    jp_kanji: わざマシン３５
    en: TM35
    fr: CT35
    it: MT35
    de: TM35
    es: MT35
    ko: 기술머신35
  descriptions:
    jp_kana: "はげしい　ほのおを　はっしゃして\nこうげきする。　あいてを　やけどの\nじょうたいに　することが　ある。"
    jp_kanji: "激しい　炎を\n相手に　発射して　攻撃する。\nやけど状態に　することが　ある。"
    en: "The target is scorched with an intense\nblast of fire. It may also leave the\ntarget with a burn."
    fr: "L’ennemi reçoit un torrent de flammes.\nPeut aussi le brûler."
    it: "Il nemico viene colpito da intense\nfiammate che possono anche scottarlo."
    de: "Das Ziel wird in ein Flammenmeer\ngehüllt. Verursacht eventuell\nVerbrennungen."
    es: "Abrasa al objetivo con una intensa\nllamarada que puede causarle\nquemaduras."
    ko: "세찬 불꽃을\n상대에게 발사하여 공격한다.\n화상 상태로 만들 때가 있다."
tm036:
  names:
    jp_kana: わざマシン３６
    jp_kanji: わざマシン３６
    en: TM36
    fr: CT36
    it: MT36
    de: TM36
    es: MT36
    ko: 기술머신36
  descriptions:
    jp_kana: "きたない　ヘドロを　なげつける。\nあいてを　どくの　じょうたいに\nすることが　ある。"
    jp_kanji: "汚い　ヘドロを\n相手に　投げつけて　攻撃する。\n毒状態に　することが　ある。"
    en: "Unsanitary sludge is hurled at the\ntarget. It may also poison the target."
    fr: "Envoie des détritus sur l’ennemi. Peut\naussi l’empoisonner."
    it: "Chi la usa attacca lanciando fango\nsul bersaglio. Può anche avvelenarlo."
    de: "Das Ziel versinkt im Giftschlamm.\nKann eventuell Vergiftungen\nhervorrufen."
    es: "Descarga de lodo tóxico que puede\nllegar a envenenar al objetivo."
    ko: "더러운 오물을\n상대에게 내던져서 공격한다.\n독 상태로 만들 때가 있다."
tm037:
  names:
    jp_kana: わざマシン３７
    jp_kanji: わざマシン３７
    en: TM37
    fr: CT37
    it: MT37
    de: TM37
    es: MT37
    ko: 기술머신37
  descriptions:
    jp_kana: "５ターンの　あいだ　すなあらしで\nじめん　いわ　はがね　タイプいがいに\nダメージを　あたえる。"
    jp_kanji: "５ターンの　あいだ　砂あらしで\nいわ　じめん　はがねタイプ　以外の\nポケモンに　ダメージを　与える。"
    en: "A five-turn sandstorm is summoned\nto hurt all combatants except the\nRock, Ground, and Steel types."
    fr: "Une tempête de sable de 5 tours\nqui blesse tous les Pokémon sauf\nles types Roche, Sol et Acier."
    it: "Causa una tempesta di sabbia per cinque\nturni che danneggia tutti i tipi in campo\nesclusi Terra, Roccia e Acciaio."
    de: "Ein Sandsturm trifft für 5 Runden\nalle Pokémon, außer denen vom\nTyp Boden, Gestein und Stahl."
    es: "Tormenta de arena de cinco turnos\nque daña a todos los Pokémon excepto\na los de tipo Roca, Tierra y Acero."
    ko: "5턴 동안 모래바람으로\n바위, 땅, 강철타입 이외의\n포켓몬에게 데미지를 준다."
tm038:
  names:
    jp_kana: わざマシン３８
    jp_kanji: わざマシン３８
    en: TM38
    fr: CT38
    it: MT38
    de: TM38
    es: MT38
    ko: 기술머신38
  descriptions:
    jp_kana: "だいのじの　ほのおで　あいてを\nやきつくす。　やけどの　じょうたいに\nすることが　ある。"
    jp_kanji: "大の字の　炎で\n相手を　焼きつくす。\nやけど状態に　することが　ある。"
    en: "The target is attacked with an intense\nblast of all-consuming fire. It may\nalso leave the target with a burn."
    fr: "Un déluge de flammes ardentes submerge\nl’ennemi. Peut le brûler."
    it: "Investe il nemico con un’intensa\nfiammata che fa terra bruciata.\nPuò anche scottarlo."
    de: "Dem Ziel wird ordentlich eingeheizt.\nKann eventuell Verbrennungen\nhervorrufen."
    es: "Ataca con una intensa ráfaga de fuego\nabrasador que puede causar\nquemaduras."
    ko: "큰 대자의 불꽃으로\n상대를 불태운다.\n화상 상태로 만들 때가 있다."
tm039:
  names:
    jp_kana: わざマシン３９
    jp_kanji: わざマシン３９
    en: TM39
    fr: CT39
    it: MT39
    de: TM39
    es: MT39
    ko: 기술머신39
  descriptions:
    jp_kana: "いわを　なげつけ　こうげきする。\nおちた　いわが　うごきを　ふうじて\nあいての　すばやさを　さげる。"
    jp_kanji: "岩石を　投げつけて　攻撃する。\n相手の　動きを　封じることで\n素早さを　さげる。"
    en: "Boulders are hurled at the target. It\nalso lowers the target’s Speed by\npreventing its movement."
    fr: "Des rochers frappent l’ennemi. Réduit\naussi sa Vitesse en l’empêchant de\nse déplacer."
    it: "Colpisce il nemico con rocce. Inoltre,\nlo rallenta riducendone la Velocità."
    de: "Das Ziel wird mit Felsen\nbeworfen. Kann Initiative-\nWert senken."
    es: "Tira rocas que detienen al objetivo y\nbajan su Velocidad."
    ko: "암석을 내던져서 공격한다.\n상대의 움직임을 봉인함으로써\n스피드를 떨어뜨린다."
tm040:
  names:
    jp_kana: わざマシン４０
    jp_kanji: わざマシン４０
    en: TM40
    fr: CT40
    it: MT40
    de: TM40
    es: MT40
    ko: 기술머신40
  descriptions:
    jp_kana: "すばやい　うごきで　ほんろうする。\nこうげきは　かならず　あいてに\nめいちゅうする。"
    jp_kanji: "素早い　動きで\n相手を　ほんろうして　切りつける。\n攻撃は　必ず　命中する。"
    en: "The user confounds the target\nwith speed, then slashes.\nThe attack lands without fail."
    fr: "Le lanceur prend l’ennemi de vitesse\net le lacère. N’échoue jamais."
    it: "Chi la usa attacca il nemico a grande\nvelocità. Questa mossa è infallibile."
    de: "Der Anwender irritiert das Ziel durch\nSchnelligkeit, bevor er angreift.\nDiese Attacke trifft immer ihr Ziel."
    es: "Ataque que desconcierta por su\nrapidez y que no falla nunca."
    ko: "재빠른 움직임으로\n상대를 농락해 벤다.\n공격은 반드시 명중한다."
tm041:
  names:
    jp_kana: わざマシン４１
    jp_kanji: わざマシン４１
    en: TM41
    fr: CT41
    it: MT41
    de: TM41
    es: MT41
    ko: 기술머신41
  descriptions:
    jp_kana: "いちゃもんを　つけて　おなじわざを\nれんぞくで　だせない　ようにする。"
    jp_kanji: "相手に　いちゃもんを　つけて　\n同じ　技を　２回　連続で\nだせなくする。"
    en: "The user torments and enrages the\ntarget, making it incapable of using the\nsame move twice in a row."
    fr: "Le lanceur irrite l’ennemi pour\nl’empêcher d’utiliser la même\ncapacité 2 fois de suite."
    it: "Chi la usa tormenta e fa infuriare\nil nemico, impedendogli di usare\nla stessa mossa due volte di seguito."
    de: "Der Anwender bringt das Ziel in Rage.\nDieses ist nicht mehr in der Lage, eine\nAttacke zweimal anzuwenden."
    es: "Atormenta al objetivo y le provoca un\nataque de ira que le impide usar el\nmismo movimiento dos veces seguidas."
    ko: "트집을 잡아서 똑같은 기술을\n연속으로 쓸 수 없게 한다."
tm042:
  names:
    jp_kana: わざマシン４２
    jp_kanji: わざマシン４２
    en: TM42
    fr: CT42
    it: MT42
    de: TM42
    es: MT42
    ko: 기술머신42
  descriptions:
    jp_kana: "どく　まひ　やけど　のじょうたいで\nわざを　だすと　２ばいの　いりょくで\nこうげき　できる。"
    jp_kanji: "自分が　どく　まひ　やけど\n状態のとき　相手に　くりだすと\n技の　威力が　２倍に　なる。"
    en: "An attack move that doubles its power\nif the user is poisoned, paralyzed, or\nhas a burn."
    fr: "Une attaque dont la puissance double\nlorsque le lanceur est empoisonné,\nparalysé ou brûlé."
    it: "Mossa d’attacco che raddoppia\nla potenza se chi la usa è scottato,\navvelenato o paralizzato."
    de: "Ist der Anwender vergiftet, paralysiert\noder leidet er unter Verbrennung,\nverdoppelt sich die Kraft der Attacke."
    es: "Movimiento de ataque que dobla su\npotencia si quien lo utiliza está\nenvenenado, quemado o paralizado."
    ko: "독, 마비, 화상 상태에서\n기술을 쓰면 2배의 위력으로\n공격할 수 있다."
tm043:
  names:
    jp_kana: わざマシン４３
    jp_kanji: わざマシン４３
    en: TM43
    fr: CT43
    it: MT43
    de: TM43
    es: MT43
    ko: 기술머신43
  descriptions:
    jp_kana: "ほのおを　まとい　あいてを\nこうげきする。　ちからを　ためて\nじぶんの　すばやさを　あげる。"
    jp_kanji: "炎を　まとい　相手を　攻撃する。\n力を　ためて　自分の\n素早さを　あげる。"
    en: "The user cloaks itself with flame and\nattacks. Building up more power,\nit raises the user’s Speed stat."
    fr: "Le lanceur s’entoure de feu\net charge l’ennemi. Augmente\naussi la Vitesse."
    it: "Chi la usa si copre di fuoco e attacca\nil bersaglio. Concentrandosi aumenta,\ninoltre, la propria Velocità."
    de: "Anwender hüllt sich in Flammen u. greift\ndas Ziel an. Er sammelt seine Kräfte\nund erhöht so die eigene Initiative."
    es: "Ataca al objetivo envuelto en llamas.\nAcumula fuerza y hace subir la Velocidad\ndel usuario."
    ko: "불꽃을 둘러 상대를 공격한다.\n힘을 모아서 자신의\n스피드를 올린다."
tm044:
  names:
    jp_kana: わざマシン４４
    jp_kanji: わざマシン４４
    en: TM44
    fr: CT44
    it: MT44
    de: TM44
    es: MT44
    ko: 기술머신44
  descriptions:
    jp_kana: "２ターンの　あいだ　ねむりつづける。\nＨＰと　からだの　いじょうを\nすべて　かいふくする。"
    jp_kanji: "２ターンの　あいだ　眠り続ける。\n自分の　ＨＰと　状態異常を\nすべて　回復する。"
    en: "The user goes to sleep for two\nturns. It fully restores the user’s HP\nand heals any status problem."
    fr: "Le lanceur dort pendant 2 tours. Il\nregagne tous ses PV et n’a plus de\nproblèmes de statut."
    it: "Chi la usa dorme per due turni.\nRecupera, però, tutti i PS e risolve\ntutti i suoi problemi di stato."
    de: "Anwender wird vollkommen\ngeheilt und schläft die\nfolgenden zwei Runden."
    es: "Restaura todos los PS y cura todos los\nproblemas de estado del usuario.\nDuerme los dos próximos turnos."
    ko: "2턴 동안 계속 잠잔다.\n자신의 HP와 상태 이상을\n모두 회복한다."
tm045:
  names:
    jp_kana: わざマシン４５
    jp_kanji: わざマシン４５
    en: TM45
    fr: CT45
    it: MT45
    de: TM45
    es: MT45
    ko: 기술머신45
  descriptions:
    jp_kana: "♂なら♀を　♀なら♂を　ゆうわくして\nメロメロにする。　メロメロに　なった\nあいては　わざが　だしにくくなる。"
    jp_kanji: "♂なら♀を　♀なら♂を　誘惑して\nメロメロに　する。\n相手は　技が　だしにくくなる。"
    en: "If it is the opposite gender of the\nuser, the target becomes infatuated\nand less likely to attack."
    fr: "Si l’ennemi est du sexe opposé, il\ntombe amoureux et rechigne alors\nà attaquer."
    it: "Se il nemico è del sesso opposto,\ns’infatua e attacca con meno\nprobabilità."
    de: "Gehört das Ziel dem anderen\nGeschlecht an, verliebt es sich\nund greift eventuell nicht an."
    es: "Si el objetivo es del sexo opuesto,\nel enamoramiento reducirá las\nprobabilidades de que ataque."
    ko: "수컷은 암컷을 암컷은 수컷을 유혹하여\n헤롱헤롱하게 만든다.\n상대가 기술을 쓰기 어려워진다."
tm046:
  names:
    jp_kana: わざマシン４６
    jp_kanji: わざマシン４６
    en: TM46
    fr: CT46
    it: MT46
    de: TM46
    es: MT46
    ko: 기술머신46
  descriptions:
    jp_kana: "こうげきと　どうじに　もちものを\nぬすむ。　じぶんに　もちものが\nあると　しっぱいする。"
    jp_kanji: "攻撃と　同時に　道具を　盗む。\n自分が　道具を　持っている　場合は\n盗めない。"
    en: "The user attacks and steals the\ntarget’s held item simultaneously. It\ncan’t steal if the user holds an item."
    fr: "Le lanceur attaque la cible et vole\nson objet. Le lanceur ne peut rien\nvoler s’il tient déjà un objet."
    it: "Chi la usa attacca il bersaglio e può\nrubargli uno strumento, se non ne tiene\ngià uno."
    de: "Der Anwender greift an und stiehlt dem\nZiel gleichzeitig ein Item, sofern er\nselbst gerade kein Item trägt."
    es: "Quien lo usa ataca y roba el objeto que\nlleva su objetivo simultáneamente. Si ya\nlleva un objeto, no podrá robar."
    ko: "공격과 동시에 도구를 훔친다.\n자신이 도구를 지니고 있을 경우에는\n훔칠 수 없다."
tm047:
  names:
    jp_kana: わざマシン４７
    jp_kanji: わざマシン４７
    en: TM47
    fr: CT47
    it: MT47
    de: TM47
    es: MT47
    ko: 기술머신47
  descriptions:
    jp_kana: "すばやい　うごきで　あいての　あしを\nねらって　こうげきする。\nあいての　すばやさを　さげる。"
    jp_kanji: "素早い　動きで　相手の　足を\nねらって　攻撃する。\n相手の　素早さを　さげる。"
    en: "The user attacks the target’s legs\nswiftly, reducing the target’s\nSpeed stat."
    fr: "Un coup rapide qui vise les pieds\nde l’ennemi et diminue sa Vitesse."
    it: "Chi la usa colpisce con un attacco\nfulmineo la parte inferiore del corpo\ndel bersaglio, riducendone la Velocità."
    de: "Anwender greift mit blitzschnellen\nBewegungen die Beine des Zieles\nan und senkt dessen Initiative."
    es: "Ataque rápido dirigido a los pies del\nobjetivo que le hace perder Velocidad."
    ko: "재빠른 움직임으로 상대의 다리를\n노려 공격한다.\n상대의 스피드를 떨어뜨린다."
tm048:
  names:
    jp_kana: わざマシン４８
    jp_kanji: わざマシン４８
    en: TM48
    fr: CT48
    it: MT48
    de: TM48
    es: MT48
    ko: 기술머신48
  descriptions:
    jp_kana: "うたで　あいてを　こうげきする。\nみんなで　つかうと　れんぞくで\nだせて　いりょくも　あがる。"
    jp_kanji: "歌で　相手を　攻撃する。\nみんなで　輪唱すると　続けて\nだすことが　でき　威力も　あがる。"
    en: "The user attacks the target with a\nsong. Others can join in the Round and\nmake the attack do greater damage."
    fr: "Le lanceur chante et attaque l’ennemi.\nSi plusieurs Pokémon déclenchent cette\nattaque à la suite, l’effet augmente."
    it: "Attacca il bersaglio con una melodia.\nSe usata durante lo stesso turno da\npiù Pokémon i danni inflitti aumentano."
    de: "Angriff mit Gesang. Singt der Anwender\nmit allen im Kanon, kann er die Attacke\nmehrfach auslösen u. die Stärke steigt."
    es: "Canto que sirve de ataque.\nSu fuerza aumenta cuantos más\nPokémon lo usan en cadena."
    ko: "노래로 상대를 공격한다.\n함께 돌림노래를 하면 계속해서\n쓸 수 있고 위력도 올라간다."
tm049:
  names:
    jp_kana: わざマシン４９
    jp_kanji: わざマシン４９
    en: TM49
    fr: CT49
    it: MT49
    de: TM49
    es: MT49
    ko: 기술머신49
  descriptions:
    jp_kana: "こえで　あいてを　こうげきする。\nまいターン　だれかが　つかうと\nいりょくが　あがる。"
    jp_kanji: "響く　声で　相手を　攻撃する。\n毎ターン　だれかが　使い続けると\n威力が　あがる。"
    en: "The user attacks the target with an\nechoing voice. If this move is used\nevery turn, it does greater damage."
    fr: "Attaque l’ennemi avec la voix. Cette\nattaque devient plus efficace si à\nchaque tour quelqu’un l’utilise."
    it: "Attacca il bersaglio con la propria voce\necheggiante. Se usata a ripetizione da\nuno o più Pokémon il danno aumenta."
    de: "Angriff mit widerhallender Stimme. Wird\ndieser in jeder Runde von jemandem\nwiederholt, steigt die Stärke."
    es: "Ataca al objetivo con un susurro.\nSu fuerza aumenta si cualquiera\nde los Pokémon lo usa cada turno."
    ko: "목소리로 상대를 공격한다.\n매 턴 누군가 기술을\n계속해서 쓰면 위력이 올라간다."
tm050:
  names:
    jp_kana: わざマシン５０
    jp_kanji: わざマシン５０
    en: TM50
    fr: CT50
    it: MT50
    de: TM50
    es: MT50
    ko: 기술머신50
  descriptions:
    jp_kana: "フルパワーで　ほのおの　こうげき。\nつかったあと　じぶんの　とくこうは\nがくっと　さがる。"
    jp_kanji: "フルパワーで　相手を　攻撃する。\n使うと　反動で\n自分の　特攻が　がくっと　さがる。"
    en: "The user attacks the target at full\npower. The attack’s recoil harshly\nreduces the user’s Sp. Atk stat."
    fr: "Attaque l’ennemi à pleine puissance.\nLe contrecoup baisse énormément\nl’Attaque Spéciale du lanceur."
    it: "Chi la usa sferra un potente attacco,\nma il contraccolpo riduce di molto\nil suo Attacco Speciale."
    de: "Angriff mit maximaler Kraft und\nfeuriger Energie, der gleichzeitig den\nSpezial-Angriff des Angreifers senkt."
    es: "Quien lo usa ataca con toda\nsu fuerza, pero ve muy reducido\nsu Ataque Especial."
    ko: "풀 파워로 불꽃 공격을 한다.\n사용한 뒤 자신의 특수공격이\n크게 떨어진다."
tm051:
  names:
    jp_kana: わざマシン５１
    jp_kanji: わざマシン５１
    en: TM51
    fr: CT51
    it: MT51
    de: TM51
    es: MT51
    ko: 기술머신51
  descriptions:
    jp_kana: "ふしぎな　ちからで　テレポートして\nじぶんと　みかたの　いばしょを\nいれかえる。"
    jp_kanji: "不思議な　力で　テレポートして\n自分と　味方の　居場所を\n入れ換える。"
    en: "The user teleports using a strange\npower and switches its place with one of\nits allies."
    fr: "Le lanceur se téléporte à l’aide d’un\npouvoir mystérieux. Il échange sa place\navec celle d’un allié sur le terrain."
    it: "Chi la usa si teletrasporta al posto\ndi un compagno in campo, grazie\nad un misterioso potere."
    de: "Wundersame Kräfte teleportieren\nden Anwender an den Platz eines\nMitstreiters und umgekehrt."
    es: "Extraño poder que intercambia la\nposición del usuario con la de un\naliado sobre el terreno de combate."
    ko: "이상한 힘으로 순간이동하여\n자신과 같은 편이 있는 장소를\n바꾼다."
tm052:
  names:
    jp_kana: わざマシン５２
    jp_kanji: わざマシン５２
    en: TM52
    fr: CT52
    it: MT52
    de: TM52
    es: MT52
    ko: 기술머신52
  descriptions:
    jp_kana: "こんしんの　ちからで　こうげきする。\nあたった　あいての　とくぼうを\nさげることが　ある。"
    jp_kanji: "気合を　高めて\nありったけの　力を　放出する。\n相手の　特防を　さげることが　ある。"
    en: "The user heightens its mental focus and\nunleashes its power.\nIt may also lower the target’s Sp. Def."
    fr: "Le lanceur rassemble ses forces et\nlaisse éclater son pouvoir. Peut aussi\nbaisser la Défense Spéciale de l’ennemi."
    it: "Chi la usa si concentra e rilascia la sua\nforza. Può ridurre la Difesa Speciale del\nPokémon colpito."
    de: "Ein Angriff mit aller Macht.\nDie Spezial-Verteidigung des\nZieles sinkt eventuell."
    es: "Quien lo usa ataca con toda su energía.\nTambién puede bajar la Defensa\nEspecial del objetivo si lo alcanza."
    ko: "기합을 높여서\n혼신의 힘을 방출한다. 상대의\n특수방어를 떨어뜨릴 때가 있다."
tm053:
  names:
    jp_kana: わざマシン５３
    jp_kanji: わざマシン５３
    en: TM53
    fr: CT53
    it: MT53
    de: TM53
    es: MT53
    ko: 기술머신53
  descriptions:
    jp_kana: "いのちの　ちからを　あつめて　\nこうげきする。　あたった　あいての\nとくぼうを　さげることが　ある。"
    jp_kanji: "自然から　集めた\n命の力を　発射する。\n相手の　特防を　さげることが　ある。"
    en: "The user draws power from nature and\nfires it at the target. It may also\nlower the target’s Sp. Def."
    fr: "Utilise les pouvoirs de la nature pour\nattaquer l’ennemi. Peut aussi baisser\nla Défense Spéciale de l’ennemi."
    it: "Chi la usa attinge energia dalla natura\ne la scaglia contro il nemico. Può anche\nridurne la Difesa Speciale."
    de: "Entfesselt die Kraft der Natur\ngegen das Ziel. Dessen Spezial-\nVerteidigung sinkt eventuell."
    es: "Extrae energía de la naturaleza y la\nlanza contra el objetivo. También\npuede reducir su Defensa Especial."
    ko: "자연으로부터 모은\n생명의 힘을 발사한다. 상대의\n특수방어를 떨어뜨릴 때가 있다."
tm054:
  names:
    jp_kana: わざマシン５４
    jp_kanji: わざマシン５４
    en: TM54
    fr: CT54
    it: MT54
    de: TM54
    es: MT54
    ko: 기술머신54
  descriptions:
    jp_kana: "てかげんして　こうげきする。\nこうげきした　あいての　ＨＰは\nかならず　１　のこる。"
    jp_kanji: "相手の　ＨＰが　\n必ず　１だけ　残るように\n手加減して　攻撃する。"
    en: "A restrained attack that prevents the\ntarget from fainting. The target is left\nwith at least 1 HP."
    fr: "Le lanceur retient ses coups pour\nque l’ennemi garde au moins 1 PV et\nne tombe pas K.O."
    it: "Chi la usa trattiene il colpo per\nimpedire al nemico di andare KO,\nlasciandolo con almeno un PS."
    de: "Eine zurückhaltende Attacke, die\neine Kampfunfähigkeit des Zieles\nverhindert, dem mindestens 1 KP bleibt."
    es: "Ataque controlado que impide que\nel objetivo se debilite al dejarle\ncon un mínimo de un PS."
    ko: "상대의 HP가\n반드시 1만큼 남도록\n조절하여 공격한다."
tm055:
  names:
    jp_kana: わざマシン５５
    jp_kanji: わざマシン５５
    en: TM55
    fr: CT55
    it: MT55
    de: TM55
    es: MT55
    ko: 기술머신55
  descriptions:
    jp_kana: "あつく　にえたぎる　みずを\nはっしゃして　こうげきする。\nやけどに　することが　ある。"
    jp_kanji: "熱く　煮えたぎる　水を\n相手に　発射して　攻撃する。\nやけど状態に　することが　ある。"
    en: "The user shoots boiling hot water at\nits target. It may also leave the\ntarget with a burn."
    fr: "Envoie un jet d’eau bouillante.\nInflige des dégâts et peut\nparfois brûler."
    it: "Chi la usa attacca il bersaglio con un\ngetto d’acqua bollente che può anche\nscottarlo."
    de: "Heizt dem Ziel mit einem Schwall siedend\nheißen Kochwassers ein. Dieses\nerleidet eventuell Verbrennungen."
    es: "Abrasa al objetivo con agua hirviendo\ny puede causarle quemaduras."
    ko: "뜨겁게 끓어오르는 물을\n상대에게 발사해서 공격한다.\n화상 상태로 만들 때가 있다."
tm056:
  names:
    jp_kana: わざマシン５６
    jp_kanji: わざマシン５６
    en: TM56
    fr: CT56
    it: MT56
    de: TM56
    es: MT56
    ko: 기술머신56
  descriptions:
    jp_kana: "どうぐを　なげつけて　こうげきする。\nなげる　もちものに　よって　わざの\nいりょくと　こうかは　かわる。"
    jp_kanji: "持たせた　道具を\n素早く　投げつけて　攻撃する。\n道具で　威力と　効果が　かわる。"
    en: "The user flings its held item at the\ntarget as an attack. Its power and\neffects depend on the item."
    fr: "Le lanceur envoie l’objet qu’il tient\nsur l’ennemi. La puissance et les\neffets dépendent de l’objet."
    it: "Chi la usa lancia sul nemico lo strumento\nche tiene. La forza e l’effetto\ndipendono dallo strumento."
    de: "Der Anwender wirft sein Item auf\ndas Ziel. Die Kraft und die Wirkung\nhängen vom jeweiligen Item ab."
    es: "El usuario ataca al objetivo arrojando\nel objeto que lleve. La potencia y los\nefectos dependen del objeto arrojado."
    ko: "도구를 내던져서 공격한다.\n던질 물건에 따라 기술의\n위력과 효과가 바뀐다."
tm057:
  names:
    jp_kana: わざマシン５７
    jp_kanji: わざマシン５７
    en: TM57
    fr: CT57
    it: MT57
    de: TM57
    es: MT57
    ko: 기술머신57
  descriptions:
    jp_kana: "でんげきを　あびせて　こうげきする。\nのこった　でんきを　ためて　じぶんの\nとくこうを　あげることが　ある。"
    jp_kanji: "電撃の　束を　相手に\n発射する。電気を　ためて　自分の\n特攻を　あげることが　ある。"
    en: "The user attacks with an electric\ncharge. The user may use any remaining\nelectricity to raise its Sp. Atk stat."
    fr: "Le lanceur tire un rayon chargé\nd’électricité. Peut aussi augmenter\nson Attaque Spéciale."
    it: "Chi la usa lancia un fascio di elettricità\nmolto intensa. Può anche aumentare il\nsuo Attacco Speciale."
    de: "Greift mit einer elektrischen\nEntladung an. Der Spezial-Angriff\ndes Angreifers steigt eventuell."
    es: "Quien lo usa ataca con una descarga\neléctrica y puede usar la electricidad\nrestante para subir su Ataque Especial."
    ko: "전격의 다발을 상대에게\n발사한다. 전기를 모아서 자신의\n특수공격을 올릴 때가 있다."
tm058:
  names:
    jp_kana: わざマシン５８
    jp_kanji: わざマシン５８
    en: TM58
    fr: CT58
    it: MT58
    de: TM58
    es: MT58
    ko: 기술머신58
  descriptions:
    jp_kana: "つれさった　あいてを　２ターンめに\nそらから　おとして　こうげきする。\nつれさられた　あいては　うごけない。"
    jp_kanji: "連れさった　相手を　２ターン目に\n空から　落として　攻撃する。\n連れさられた　相手は　動けない。"
    en: "The user hurls the target into the air,\nthen drops it on the second turn. The\ntarget cannot attack while in the air."
    fr: "Le lanceur emmène l’ennemi dans les airs\nau 1ᵉʳ tour et le lâche dans le vide au\n2ᵉ. L’ennemi saisi ne peut pas attaquer."
    it: "Porta il bersaglio in cielo e lo scaglia a\nterra al turno successivo. Il bersaglio\ncatturato non può muoversi."
    de: "Das entführte Ziel wird in Runde 2 vom\nHimmel fallen gelassen. In der Luft\nkann das Ziel nicht attackieren."
    es: "Arroja al objetivo por los aires y lo\nestrella contra el suelo al siguiente\nturno, impidiéndole moverse en el aire."
    ko: "끌려온 상대를 2턴째에\n하늘에서 떨어뜨려 공격한다.\n끌려간 상대는 움직일 수 없다."
tm059:
  names:
    jp_kana: わざマシン５９
    jp_kanji: わざマシン５９
    en: TM59
    fr: CT59
    it: MT59
    de: TM59
    es: MT59
    ko: 기술머신59
  descriptions:
    jp_kana: "ほのおで　あいてを　こうげきする。\nあいてが　きのみを　もっている　とき\nもやして　つかえなく　する。"
    jp_kanji: "炎で　相手を　攻撃する。\n相手が　きのみを　持っているとき\n燃やして　使えなくする。"
    en: "The user attacks the target with fire.\nIf the target is holding a Berry, the\nBerry becomes burnt up and unusable."
    fr: "Des flammes calcinent l’ennemi.\nS’il tient une Baie, elle est brûlée\net devient inutilisable."
    it: "Attacca il nemico con una fiammata.\nSe il nemico ha una Bacca, viene\ndivorata dalle fiamme."
    de: "Eine Feuer-Attacke. Trägt das Ziel eine\nBeere bei sich, wird diese von den\nFlammen verzehrt und geht verloren."
    es: "El usuario ataca con fuego al objetivo.\nSi este lleva una Baya, se quemará\ny ya no la podrá usar."
    ko: "불꽃으로 상대를 공격한다.\n상대가 나무열매를 지니고 있을 때\n불태워서 쓸 수 없게 만든다."
tm060:
  names:
    jp_kana: わざマシン６０
    jp_kanji: わざマシン６０
    en: TM60
    fr: CT60
    it: MT60
    de: TM60
    es: MT60
    ko: 기술머신60
  descriptions:
    jp_kana: "あいてを　おさえつけて\nこうどうの　じゅんばんを\nさいごに　する。"
    jp_kanji: "相手を　おさえつけて\n行動の　順番を\n最後に　する。"
    en: "The user suppresses the target and\nmakes its move go last."
    fr: "Retient la cible de force,\nl’obligeant à agir en dernier."
    it: "Chi la usa spinge via il bersaglio,\ncostringendolo ad agire per ultimo."
    de: "Anwender stemmt sich gegen das Ziel\nund bewirkt, dass dieses erst zuletzt\nangreift."
    es: "Consigue que el objetivo sea\nel último en moverse."
    ko: "상대를 억눌러서\n행동의 순서를\n마지막으로 만든다."
tm061:
  names:
    jp_kana: わざマシン６１
    jp_kanji: わざマシン６１
    en: TM61
    fr: CT61
    it: MT61
    de: TM61
    es: MT61
    ko: 기술머신61
  descriptions:
    jp_kana: "あおじろく　もえる　あやしげな\nほのおを　はなつ。　あいてを\nやけどの　じょうたいに　する。"
    jp_kanji: "不気味で　怪しい　炎を　放って\n相手を　やけどの　状態に　する。"
    en: "The user shoots a sinister, bluish-white\nflame at the target to inflict a burn."
    fr: "Lance une sinistre flamme violette à\nl’ennemi pour lui infliger une brûlure."
    it: "Fiamme intense di colore viola causano\nuna scottatura al nemico."
    de: "Feuert eine fiese, blauweiße Flamme\nauf das Ziel ab, um eine Verbrennung\nzu verursachen."
    es: "Lanza una siniestra llamarada morada\nque provoca quemaduras al objetivo."
    ko: "으스스하고 괴상한 불꽃을 쏘아\n상대를 화상 상태로 만든다."
tm062:
  names:
    jp_kana: わざマシン６２
    jp_kanji: わざマシン６２
    en: TM62
    fr: CT62
    it: MT62
    de: TM62
    es: MT62
    ko: 기술머신62
  descriptions:
    jp_kana: "かろやかに　あいてを　こうげきする。\nじぶんが　どうぐを　もっていないと\nおおきな　ダメージを　あたえる。"
    jp_kanji: "軽やかに　相手を　攻撃する。\n自分が　道具を　持っていないとき\n大きな　ダメージを　与える。"
    en: "The user nimbly strikes the target.\nIf the user is not holding an item,\nthis attack inflicts massive damage."
    fr: "Attaque agile. Si le lanceur ne tient\npas d’objet, l’attaque inflige\ndavantage de dégâts."
    it: "Attacca rapidamente il bersaglio.\nSe chi la usa non ha uno strumento,\ninfligge al nemico grossi danni."
    de: "Ein graziler Angriff auf das Ziel. Trägt\nder Anwender kein Item bei sich,\nrichtet die Attacke großen Schaden an."
    es: "Quien lo usa realiza un ataque rápido\nque aumenta de potencia si el atacante\nno lleva ningún objeto."
    ko: "경쾌하게 상대를 공격한다.\n자신이 도구를 지니고 있지 않을 때\n큰 데미지를 준다."
tm063:
  names:
    jp_kana: わざマシン６３
    jp_kanji: わざマシン６３
    en: TM63
    fr: CT63
    it: MT63
    de: TM63
    es: MT63
    ko: 기술머신63
  descriptions:
    jp_kana: "もたせた　どうぐを　つかえなくする。\nトレーナーも　その　ポケモンには\nどうぐを　つかうことが　できない。"
    jp_kanji: "持たせた　道具を　使えなくする。\nトレーナーも　その　ポケモンには\n道具を　使えない。"
    en: "It prevents the target from using its\nheld item. Its Trainer is also prevented\nfrom using items on it."
    fr: "Empêche l’ennemi d’utiliser un objet\ntenu et son Dresseur d’utiliser un\nobjet sur lui."
    it: "Impedisce al nemico di usare lo\nstrumento che tiene e al suo\nAllenatore di usarne altri sul Pokémon."
    de: "Verhindert, dass das Ziel Items\neinsetzt. Dies wirkt sich auch auf\nden Trainer des Zieles aus."
    es: "Impide que el objetivo use el objeto\nque lleve y que su Entrenador use\nobjetos sobre él."
    ko: "지니게 한 도구를 쓸 수 없게 한다.\n트레이너도 그 포켓몬에게는\n도구를 쓸 수 없다."
tm064:
  names:
    jp_kana: わざマシン６４
    jp_kanji: わざマシン６４
    en: TM64
    fr: CT64
    it: MT64
    de: TM64
    es: MT64
    ko: 기술머신64
  descriptions:
    jp_kana: "おおきな　ばくはつで　じぶんの\nまわりに　いるものを　こうげきする。\nつかったあと　ひんしに　なる。"
    jp_kanji: "大きな　爆発で　自分の　周りに\nいるものを　攻撃する。\n使ったあとに　ひんしに　なる。"
    en: "The user explodes to inflict damage on\nthose around it.\nThe user faints upon using this move."
    fr: "Le lanceur explose et inflige des\ndégâts à tous les Pokémon autour\nde lui. Met K.O. le lanceur."
    it: "Chi la usa esplode per infliggere danni\nagli altri Pokémon attorno, ma va KO."
    de: "Diese besondere Attacke verletzt\nPokémon in der Nähe des Anwenders,\nder dabei jedoch kampfunfähig wird."
    es: "Quien lo usa explosiona en combate\ne inflige daño a todos los Pokémon\na su alrededor. El usuario se debilita."
    ko: "큰 폭발을 일으켜서 자신의\n주위에 있는 포켓몬을 공격한다.\n사용한 뒤 기절한다."
tm065:
  names:
    jp_kana: わざマシン６５
    jp_kanji: わざマシン６５
    en: TM65
    fr: CT65
    it: MT65
    de: TM65
    es: MT65
    ko: 기술머신65
  descriptions:
    jp_kana: "かげで　つくった　するどいツメで\nきりさいて　こうげきする。\nきゅうしょに　あたりやすい。"
    jp_kanji: "影から　つくった　鋭い　ツメで\n相手を　切り裂く。\n急所に　当たりやすい。"
    en: "The user slashes with a sharp claw\nmade from shadows. It has a high\ncritical-hit ratio."
    fr: "Attaque avec une griffe puissante faite\nd’ombres. Taux de critiques élevé."
    it: "Chi la usa attacca con artigli d’ombra\nche colpiscono con gran forza.\nProbabile brutto colpo."
    de: "Eine Klaue aus Schatten greift\ndas Ziel an. Die Volltrefferquote\nist dabei sehr hoch."
    es: "Quien lo usa ataca con una afilada\ngarra de sombras. Su índice de golpe\ncrítico es muy alto."
    ko: "그림자로 만든 날카로운 발톱으로\n상대를 베어 가른다.\n급소에 맞기 쉽다."
tm066:
  names:
    jp_kana: わざマシン６６
    jp_kanji: わざマシン６６
    en: TM66
    fr: CT66
    it: MT66
    de: TM66
    es: MT66
    ko: 기술머신66
  descriptions:
    jp_kana: "ちからを　ためこみ　こうげきする。\nあいてより　あとに　だせると\nわざの　いりょくは　２ばいに　なる。"
    jp_kanji: "ためこんで　攻撃する。\n相手より　後に　攻撃できると\n技の　威力は　２倍に　なる。"
    en: "The user stores power, then attacks.\nIf the user can use this attack after\nthe target, its power is doubled."
    fr: "Le lanceur charge son énergie, puis\nattaque. La puissance est doublée\nsi le lanceur agit après l’ennemi."
    it: "Chi la usa accumula forza, poi attacca.\nLa potenza raddoppia se agisce dopo\nil Pokémon nemico."
    de: "Der Anwender lädt die Attacke auf.\nHandelt das Ziel vor dem Anwender,\nverdoppelt sich die Kraft der Attacke."
    es: "Quien lo usa se carga de energía y\nluego ataca. Y, si ataca después del\nobjetivo, dobla la potencia del ataque."
    ko: "힘을 모아 공격한다.\n상대보다 나중에 쓰면\n기술의 위력은 2배가 된다."
tm067:
  names:
    jp_kana: わざマシン６７
    jp_kanji: わざマシン６７
    en: TM67
    fr: CT67
    it: MT67
    de: TM67
    es: MT67
    ko: 기술머신67
  descriptions:
    jp_kana: "たおれた　みかたの　かたきを　うつ。\nまえの　ターンに　たおされて\nいると　いりょくが　あがる。"
    jp_kanji: "倒れた　味方の　かたきを　討つ。\n前の　ターンに　味方が\n倒されていると　威力が　あがる。"
    en: "The user gets revenge for a fainted\nally. If an ally fainted in the previous\nturn, this attack’s damage increases."
    fr: "Venge un Pokémon de l’équipe mis K.O.\nSi un Pokémon de l’équipe a été mis\nK.O. au tour d’avant, l’effet augmente."
    it: "Vendica un compagno messo KO. Se ciò è\naccaduto al turno precedente, il danno\nè maggiore."
    de: "Anwender rächt einen besiegten\nMitstreiter. Wurde in der vor. Runde ein\nMitstreiter besiegt, steigt die Kraft."
    es: "Quien lo usa puede vengar a sus amigos.\nEl daño causado será mayor si en el\nturno anterior han debilitado a uno."
    ko: "쓰러진 같은 편의 원수를 갚는다.\n앞 턴에서 같은 편이\n쓰러졌다면 위력이 올라간다."
tm068:
  names:
    jp_kana: わざマシン６８
    jp_kanji: わざマシン６８
    en: TM68
    fr: CT68
    it: MT68
    de: TM68
    es: MT68
    ko: 기술머신68
  descriptions:
    jp_kana: "もてる　ちからの　すべてを　あつめて\nとつげきする。　つぎの　ターン\nはんどうで　うごけなくなる。"
    jp_kanji: "持てる　力を　すべて　使って\n相手に　突撃する。\n次の　ターンは　動けなくなる。"
    en: "The user charges at the target using\nevery bit of its power.\nThe user must rest on the next turn."
    fr: "Le lanceur charge l’ennemi de toute sa\npuissance. Il doit ensuite se reposer\nau tour suivant."
    it: "Chi la usa carica il nemico usando\ntutta la sua forza, ma al turno\nsuccessivo deve riposare."
    de: "Ein harter Angriff mit aller Energie.\nDanach muss der Anwender sich\nausruhen und neue Energie sammeln."
    es: "Quien lo usa carga contra el objetivo\nusando toda su energía y en el turno\nsiguiente tiene que descansar."
    ko: "가진 힘을 모두 사용해서\n상대에게 돌격한다.\n다음 턴은 움직일 수 없다."
tm069:
  names:
    jp_kana: わざマシン６９
    jp_kanji: わざマシン６９
    en: TM69
    fr: CT69
    it: MT69
    de: TM69
    es: MT69
    ko: 기술머신69
  descriptions:
    jp_kana: "からだを　みがきあげて　くうきの\nていこうを　すくなくする。\nすばやさを　ぐーんと　あげる。"
    jp_kanji: "自分の　体を　磨いて　空気の\n抵抗を　少なくする。素早さを\nぐーんと　あげることが　できる。"
    en: "The user polishes its body to reduce\ndrag. It sharply raises the Speed\nstat."
    fr: "Le lanceur polit son corps pour\ndiminuer sa résistance au vent.\nAugmente fortement la Vitesse."
    it: "Chi la usa leviga il proprio corpo per\nridurre l’attrito. Aumenta di molto\nla Velocità."
    de: "Der Anwender poliert seinen Körper.\nKann Initiative-Wert deutlich erhöhen."
    es: "Quien lo usa reduce la resistencia\nque ofrece su cuerpo y gana\nmucho en Velocidad."
    ko: "자신의 몸을 닦아 공기의\n저항을 적게 한다. 스피드를\n크게 올릴 수 있다."
tm070:
  names:
    jp_kana: わざマシン７０
    jp_kanji: わざマシン７０
    en: TM70
    fr: CT70
    it: MT70
    de: TM70
    es: MT70
    ko: 기술머신70
  descriptions:
    jp_kana: "あいての　めいちゅうりつを　さげる。\nくらい　どうくつを　あかるく\nてらすことも　できる。"
    jp_kanji: "まぶしい　光で　\n相手の　命中率を　さげる。\n暗い　どうくつも　明るく　照らせる。"
    en: "The user flashes a bright light that\ncuts the target’s accuracy.\nIt can also be used to illuminate caves."
    fr: "Explosion lumineuse qui fait baisser\nla Précision de l’ennemi. Permet\naussi d’éclairer les grottes."
    it: "Investe il nemico con un flash che ne\nriduce la precisione. Fuori dalla lotta\nserve per illuminare le grotte."
    de: "Ein flackerndes Licht reduziert\ndie Genauigkeit des Zieles.\nKann auch Höhlen erleuchten."
    es: "Lanza una luz cegadora que reduce\nla Precisión del objetivo. También\npuede usarse para iluminar cuevas."
    ko: "눈이 부신 빛으로\n상대의 명중률을 떨어뜨린다.\n어두운 동굴도 밝게 비춰준다."
tm071:
  names:
    jp_kana: わざマシン７１
    jp_kanji: わざマシン７１
    en: TM71
    fr: CT71
    it: MT71
    de: TM71
    es: MT71
    ko: 기술머신71
  descriptions:
    jp_kana: "とがった　がんせきを　したから\nつきさして　こうげきする。\nきゅうしょに　あたりやすい。"
    jp_kanji: "とがった　岩を\n相手に　突き刺して　攻撃する。\n急所に　当たりやすい。"
    en: "The user stabs the foe with\nsharpened stones from below.\nIt has a high critical-hit ratio."
    fr: "Fait surgir des pierres aiguisées sous\nl’ennemi. Taux de critiques élevé."
    it: "Chi la usa colpisce il nemico dal\nbasso con pietre affilate. Probabile\nbrutto colpo."
    de: "Angriff mit spitzen Steinen.\nBesitzt eine hohe Volltrefferquote."
    es: "Apuñala al objetivo desde abajo con\npiedras afiladas. Su índice de golpe\ncrítico es muy alto."
    ko: "뾰족한 바위를\n상대에게 꿰찔러서 공격한다.\n급소에 맞기 쉽다."
tm072:
  names:
    jp_kana: わざマシン７２
    jp_kanji: わざマシン７２
    en: TM72
    fr: CT72
    it: MT72
    de: TM72
    es: MT72
    ko: 기술머신72
  descriptions:
    jp_kana: "こうげき　したあと\nものすごい　スピードで　もどってきて\nひかえ　ポケモンと　いれかわる。"
    jp_kanji: "攻撃したあと\nものすごい　スピードで　もどってきて\n控えポケモンと　入れ替わる。"
    en: "After making its attack, the user\nrushes back to switch places with\na party Pokémon in waiting."
    fr: "Après son attaque, le lanceur revient à\ntoute vitesse et change de place avec\nun Pokémon de l’équipe prêt au combat."
    it: "Chi usa questa mossa fa marcia indietro\nper farsi sostituire dopo aver sferrato\nl’attacco."
    de: "Nach der Attacke eilt der Anwender\nzurück und tauscht den Platz mit\neinem anderen Pokémon."
    es: "Tras atacar, vuelve a toda prisa para\ndar paso a otro Pokémon del equipo."
    ko: "공격한 뒤\n굉장한 스피드로 돌아와서\n교대 포켓몬과 교체한다."
tm073:
  names:
    jp_kana: わざマシン７３
    jp_kanji: わざマシン７３
    en: TM73
    fr: CT73
    it: MT73
    de: TM73
    es: MT73
    ko: 기술머신73
  descriptions:
    jp_kana: "よわい　でんきを　あびせることで\nあいてを　まひじょうたいに　する。"
    jp_kanji: "弱い　電撃を　浴びせることで\n相手を　まひ状態に　する。"
    en: "A weak electric charge is launched\nat the target. It causes paralysis\nif it hits."
    fr: "Un faible choc électrique frappe\nl’ennemi. Si l’attaque touche, l’ennemi\nest paralysé."
    it: "Il nemico viene colpito da una debole\nscarica elettrica che, se va a segno,\nne causa la paralisi."
    de: "Das Ziel wird mit einem schwachen\nelektrischen Schlag angegriffen. Wird\nes getroffen, wird es paralysiert."
    es: "Débil descarga eléctrica que se lanza\ncontra el objetivo y causa parálisis\nsi es certera."
    ko: "약한 전기를 날려\n상대를 마비 상태로 만든다."
tm074:
  names:
    jp_kana: わざマシン７４
    jp_kanji: わざマシン７４
    en: TM74
    fr: CT74
    it: MT74
    de: TM74
    es: MT74
    ko: 기술머신74
  descriptions:
    jp_kana: "からだを　こうそくに　かいてん\nさせて　たいあたりする。　あいてより\nおそいほど　いりょくは　あがる。"
    jp_kanji: "体を　高速に　回転させて\n体当たりする。相手より　素早さが\n遅いほど　強い。"
    en: "The user tackles the target with a\nhigh-speed spin. The slower the\nuser, the greater the damage."
    fr: "Le lanceur effectue une rotation et\nfrappe l’ennemi. Plus le lanceur est\nlent, plus il fait de dégâts."
    it: "Chi la usa colpisce il nemico con un\nvortice rapidissimo. Più lento è chi\nla usa, maggiore è il danno."
    de: "Eine verzerrte Drehattacke. Je\nlangsamer der Anwender, desto\nmehr Schaden fügt er zu."
    es: "Quien lo usa ataca al objetivo como\nun remolino. Cuanto más lento sea\nquien lo usa, más daño causa."
    ko: "몸을 고속으로 회전시켜\n몸통박치기한다. 상대보다\n스피드가 느릴수록 위력은 올라간다."
tm075:
  names:
    jp_kana: わざマシン７５
    jp_kanji: わざマシン７５
    en: TM75
    fr: CT75
    it: MT75
    de: TM75
    es: MT75
    ko: 기술머신75
  descriptions:
    jp_kana: "たたかいのまいを　はげしく　おどり\nきあいを　たかめる。　じぶんの\nこうげきを　ぐーんと　あげる。"
    jp_kanji: "戦いの舞を　激しく　踊って\n気合を　高める。\n自分の　攻撃を　ぐーんと　あげる。"
    en: "A frenetic dance to uplift the fighting\nspirit. It sharply raises the user’s\nAttack stat."
    fr: "Danse frénétique qui exalte l’esprit\ncombatif. Augmente beaucoup\nl’Attaque du lanceur."
    it: "Danza frenetica che incrementa lo\nspirito combattivo. Chi la usa aumenta\ndi molto il suo Attacco."
    de: "Ein wilder Tanz, der den Kampfgeist\nerhöhen soll. Der Angriffs-Wert des\nAnwenders steigt deutlich."
    es: "Danza frenética que eleva el espíritu\ncombativo. Aumenta mucho el Ataque\nde quien lo usa."
    ko: "싸움의 춤을 격렬하게 춰서\n기세를 높인다.\n자신의 공격을 크게 올린다."
tm076:
  names:
    jp_kana: わざマシン７６
    jp_kanji: わざマシン７６
    en: TM76
    fr: CT76
    it: MT76
    de: TM76
    es: MT76
    ko: 기술머신76
  descriptions:
    jp_kana: "ていこう　して\nあいてを　こうげきする。\nあいての　とくこうを　さげる。"
    jp_kanji: "抵抗して　相手を　攻撃する。\n相手の　特攻を　さげる。"
    en: "Resisting, the user attacks the\nopposing Pokémon. The targets’ Sp. Atk\nstat is reduced."
    fr: "Le lanceur résiste et attaque.\nBaisse l’Attaque Spéciale de l’ennemi."
    it: "Colpisce i nemici opponendo resistenza\ne riducendo il loro Attacco Speciale."
    de: "Anwender leistet Widerstand und\ngreift an. Der Spezial-Angriff des\nZieles sinkt."
    es: "Quien lo usa realiza un contraataque\nque baja el Ataque Especial\ndel oponente."
    ko: "저항하여 상대를 공격한다.\n상대의 특수공격을 떨어뜨린다."
tm077:
  names:
    jp_kana: わざマシン７７
    jp_kanji: わざマシン７７
    en: TM77
    fr: CT77
    it: MT77
    de: TM77
    es: MT77
    ko: 기술머신77
  descriptions:
    jp_kana: "じぶんに　あんじを　かけることで\nのうりょく　へんかの　じょうたいを\nあいてと　おなじにする。"
    jp_kanji: "自分に　暗示を　かけることで\n能力変化の　状態を\n相手と　同じにする。"
    en: "The user hypnotizes itself into\ncopying any stat change made\nby the target."
    fr: "Une autohypnose qui permet au lanceur\nde copier les changements de stats de\nla cible."
    it: "Chi la usa s’ipnotizza per copiare ogni\nmodifica alle statistiche del bersaglio."
    de: "Der Anwender hypnotisiert sich selbst,\num die Statusveränderungen des\nZieles zu kopieren."
    es: "Quien lo usa se hipnotiza y copia\ncualquier cambio que haya en las\ncaracterísticas de su objetivo."
    ko: "자신에게 암시를 걸어서\n능력 변화 상태를\n상대와 똑같은 상태로 만든다."
tm078:
  names:
    jp_kana: わざマシン７８
    jp_kanji: わざマシン７８
    en: TM78
    fr: CT78
    it: MT78
    de: TM78
    es: MT78
    ko: 기술머신78
  descriptions:
    jp_kana: "じめんを　ふみならして　じぶんの\nまわりに　いるものを　こうげきする。\nあいての　すばやさを　さげる。"
    jp_kanji: "地面を　踏みならして　自分の\n周りに　いるものを　攻撃する。\n相手の　素早さを　さげる。"
    en: "The user stomps down on the ground\nand attacks everything in the area.\nThe targets’ Speed stat is reduced."
    fr: "Le lanceur piétine le sol et inflige des\ndégâts à tous les Pokémon autour\nde lui. Baisse aussi la Vitesse."
    it: "Chi la usa calpesta il terreno e scatena\nun terremoto che danneggia i Pokémon\nnei paraggi, riducendone la Velocità."
    de: "Anwender greift an, indem er den Boden\num sich herum platt walzt. Die Initiative\naller Pokémon in der Umgebung sinkt."
    es: "Sacudida sísmica que afecta a los demás\nPokémon adyacentes y también\nreduce su Velocidad."
    ko: "땅을 힘껏 밟아 자신의\n주위에 있는 포켓몬을 공격한다.\n상대의 스피드를 떨어뜨린다."
tm079:
  names:
    jp_kana: わざマシン７９
    jp_kanji: わざマシン７９
    en: TM79
    fr: CT79
    it: MT79
    de: TM79
    es: MT79
    ko: 기술머신79
  descriptions:
    jp_kana: "つめたい　いきを\nあいてに　ふきつけて　こうげきする。\nかならず　きゅうしょに　あたる。"
    jp_kanji: "冷たい　息を\n相手に　吹きつけて　攻撃する。\n必ず　急所に　当たる。"
    en: "The user blows a cold breath on the\ntarget. This attack always results in\na critical hit."
    fr: "Un souffle froid blesse l’ennemi.\nL’effet est toujours critique."
    it: "Chi la usa attacca il bersaglio con un\nsoffio d’aria gelida. Brutto colpo\nassicurato."
    de: "Anwender greift an, indem er dem\nZiel eisigen Atem entgegenhaucht.\nVolltreffergarantie."
    es: "Quien lo usa ataca lanzando un\naliento gélido. Siempre resulta\nen un golpe crítico."
    ko: "차가운 숨결을\n상대에게 내뿜어 공격한다.\n반드시 급소에 맞는다."
tm080:
  names:
    jp_kana: わざマシン８０
    jp_kanji: わざマシン８０
    en: TM80
    fr: CT80
    it: MT80
    de: TM80
    es: MT80
    ko: 기술머신80
  descriptions:
    jp_kana: "おおきな　がんせきを　なげつけて\nこうげきする。\nあいてを　ひるませることが　ある。"
    jp_kanji: "大きな　岩を\n激しく　ぶつけて　攻撃する。\n相手を　ひるませることが　ある。"
    en: "Large boulders are hurled at the\nopposing team to inflict damage. They\nmay also make the targets flinch."
    fr: "Envoie de gros rochers sur l’ennemi\npour infliger des dégâts. Peut\nl’apeurer."
    it: "I nemici vengono colpiti da grandi massi\nche possono anche farli tentennare."
    de: "Der Anwender schleudert große\nFelsbrocken auf das Ziel. Dieses\nerschrickt eventuell."
    es: "Arroja grandes rocas para infligir\ndaño. También puede hacer\nretroceder al objetivo."
    ko: "큰 바위를\n세차게 부딪쳐서 공격한다.\n상대를 풀죽게 만들 때가 있다."
tm081:
  names:
    jp_kana: わざマシン８１
    jp_kanji: わざマシン８１
    en: TM81
    fr: CT81
    it: MT81
    de: TM81
    es: MT81
    ko: 기술머신81
  descriptions:
    jp_kana: "カマや　ツメを　ハサミのように\nこうさ　させながら　きりさいて\nこうげきする。"
    jp_kanji: "カマや　ツメを　ハサミのように\n交差させながら　相手を　切り裂く。"
    en: "The user slashes at the target by\ncrossing its scythes or claws as if\nthey were a pair of scissors."
    fr: "Le lanceur taillade l’ennemi en utilisant\nses faux ou ses griffes comme une\npaire de ciseaux."
    it: "Chi la usa colpisce il nemico usando\nle sue falci o i suoi artigli come se\nfossero delle forbici."
    de: "Der Anwender greift mit gekreuzten\nScheren oder Klauen an, als wären\ndiese eine normale Schere."
    es: "Ataca al objetivo con cuchillas o\ngarras que se cruzan a modo\nde tijera."
    ko: "낫이나 발톱을 가위처럼\n교차시키면서 상대를 베어 가른다."
tm082:
  names:
    jp_kana: わざマシン８２
    jp_kanji: わざマシン８２
    en: TM82
    fr: CT82
    it: MT82
    de: TM82
    es: MT82
    ko: 기술머신82
  descriptions:
    jp_kana: "あいてを　はじきとばして\nひかえの　ポケモンを　ひきずりだす。\nやせいなら　せんとうが　おわる。"
    jp_kanji: "相手を　はじきとばして\n控えの　ポケモンを　ひきずりだす。\n野生の　場合は　戦闘が　終わる。"
    en: "The user knocks away the target and\ndrags out another Pokémon in its party.\nIn the wild, the battle ends."
    fr: "Un coup puissant qui blesse la cible\net l’envoie balader. Dans la nature,\nmet fin au combat."
    it: "Chi la usa fa volar via il bersaglio in\nmodo che venga sostituito. Se il nemico\nè un Pokémon selvatico, la lotta finisce."
    de: "Fegt das Ziel vom Feld und wechselt\nes mit einem anderen Pokémon aus.\nBeendet Kämpfe gegen wilde Pokémon."
    es: "Se lleva al objetivo, que es cambiado\npor otro Pokémon. Si es un Pokémon\nsalvaje, acaba el combate."
    ko: "상대를 튕겨내서\n교대할 포켓몬을 끌어낸다.\n야생의 경우에는 배틀이 끝난다."
tm083:
  names:
    jp_kana: わざマシン８３
    jp_kanji: わざマシン８３
    en: TM83
    fr: CT83
    it: MT83
    de: TM83
    es: MT83
    ko: 기술머신83
  descriptions:
    jp_kana: "じぶんを　ふるいたてて\nこうげきと　とくこうを　あげる。"
    jp_kanji: "自分を　奮いたてて\n攻撃と　特攻を　あげる。"
    en: "The user is roused, and its Attack\nand Sp. Atk stats increase."
    fr: "Le lanceur se rengorge. Augmente\nl’Attaque et l’Attaque Spéciale."
    it: "Chi la usa si tira su di morale,\naumentando il proprio Attacco e\nl’Attacco Speciale."
    de: "Anwender erhält einen Kraftschub, der\nseinen Angriff und Spezial-Angriff\nerhöht."
    es: "Quien lo usa se concentra y potencia\nsu Ataque y su Ataque Especial."
    ko: "스스로 분발해서\n공격과 특수공격을 올린다."
tm084:
  names:
    jp_kana: わざマシン８４
    jp_kanji: わざマシン８４
    en: TM84
    fr: CT84
    it: MT84
    de: TM84
    es: MT84
    ko: 기술머신84
  descriptions:
    jp_kana: "どくに　そまった　しょくしゅや\nうでで　こうげきする。どくの\nじょうたいに　することが　ある。"
    jp_kanji: "毒に　そまった　触手や　腕で\n相手を　突き刺す。\n毒状態に　することが　ある。"
    en: "The target is stabbed with a tentacle\nor arm steeped in poison. It may also\npoison the target."
    fr: "Attaque l’ennemi avec un tentacule ou\nun bras plein de poison. Peut aussi\nl’empoisonner."
    it: "Il nemico è colpito da un tentacolo o da\nun arto intriso di una sostanza tossica,\nche può anche avvelenarlo."
    de: "Der Anwender greift mit giftigen\nTentakeln oder Armen an. Das Ziel\nwird dabei eventuell vergiftet."
    es: "Ataca con un tentáculo o brazo\nimpregnado de veneno que puede\nllegar a envenenar al objetivo."
    ko: "독에 물든 촉수나 팔로\n상대를 꿰찌른다.\n독 상태로 만들 때가 있다."
tm085:
  names:
    jp_kana: わざマシン８５
    jp_kanji: わざマシン８５
    en: TM85
    fr: CT85
    it: MT85
    de: TM85
    es: MT85
    ko: 기술머신85
  descriptions:
    jp_kana: "ねている　あいての　ゆめを　たべて\nこうげきする。　あたえた　ダメージの\nはんぶん　ＨＰを　かいふくする。"
    jp_kanji: "寝ている　相手の　夢を　食べて\n攻撃する。ダメージの　半分の\nＨＰを　回復する。"
    en: "The user eats the dreams of a sleeping\ntarget. It absorbs half the damage\ncaused to heal the user’s HP."
    fr: "Attaque réservée aux ennemis endormis.\nLe lanceur récupère en PV la moitié des\ndégâts infligés."
    it: "Attacco che funziona solo su un nemico\nche dorme. Chi lo usa riceve metà dei PS\npersi dal nemico."
    de: "Wirkt nur auf schlafende\nZiele. Angreifer erhält 50 %\ndes Schadens als KP."
    es: "Solo funciona con objetivos dormidos.\nAbsorbe la mitad del daño causado para\nrestaurar los PS de quien lo usa."
    ko: "잠자고 있는 상대의 꿈을 먹어\n공격한다. 데미지의 절반을\nHP로 회복한다."
tm086:
  names:
    jp_kana: わざマシン８６
    jp_kanji: わざマシン８６
    en: TM86
    fr: CT86
    it: MT86
    de: TM86
    es: MT86
    ko: 기술머신86
  descriptions:
    jp_kana: "くさを　からませて　ころばせる。\nあいてが　おもいほど　わざの\nいりょくは　あがる。"
    jp_kanji: "草を　からませて　相手を\n転ばせる。相手が　重いほど\n威力が　あがる。"
    en: "The user snares the target with grass\nand trips it. The heavier the target,\nthe greater the damage."
    fr: "L’ennemi est piégé dans de l’herbe qui\nle fait trébucher. Plus il est lourd,\nplus il reçoit de dégâts."
    it: "Chi la usa intrappola il nemico con\nl’erba e lo fa cadere. Danneggia\nmaggiormente i nemici più pesanti."
    de: "Gras lässt das Ziel straucheln.\nJe schwerer das Ziel, desto\nmehr Schaden wird verursacht."
    es: "Atrapa al objetivo con hierbas y lo\nderriba. Cuanto más pesado sea\nel objetivo, más daño causa."
    ko: "풀을 휘감아서 상대를\n쓰러뜨린다. 상대가 무거울수록\n위력이 올라간다."
tm087:
  names:
    jp_kana: わざマシン８７
    jp_kanji: わざマシン８７
    en: TM87
    fr: CT87
    it: MT87
    de: TM87
    es: MT87
    ko: 기술머신87
  descriptions:
    jp_kana: "おこらせて　こんらんさせる。\nいかりで　あいての　こうげきは\nぐーんと　あがってしまう。"
    jp_kanji: "相手を　怒らせて　混乱させる。\n怒りで　相手の　攻撃は\nぐーんと　あがってしまう。"
    en: "The user enrages and confuses the\ntarget. However, it also sharply raises\nthe target’s Attack stat."
    fr: "Fait enrager la cible et la plonge dans\nla confusion, mais augmente fortement\nson Attaque."
    it: "Chi la usa provoca il bersaglio e lo\nconfonde, facendo aumentare però\ndi molto il suo Attacco."
    de: "Reizt das Ziel und verursacht\nVerwirrung. Dies erhöht jedoch\ndessen Angriffs-Wert."
    es: "Envuelve al objetivo en confusión, pero\ntambién sube marcadamente su Ataque."
    ko: "상대를 화내게 해서 혼란시킨다.\n분노로 상대의 공격은\n크게 올라가 버린다."
tm088:
  names:
    jp_kana: わざマシン８８
    jp_kanji: わざマシン８８
    en: TM88
    fr: CT88
    it: MT88
    de: TM88
    es: MT88
    ko: 기술머신88
  descriptions:
    jp_kana: "くちばしで　こうげきする。\nあいてが　きのみを　もっているとき\nついばんで　こうかを　うけられる。"
    jp_kanji: "くちばしで　攻撃する。\n相手が　きのみを　持っているとき\nついばんで　効果を　受けられる。"
    en: "The user pecks the target. If the\ntarget is holding a Berry, the user\nplucks it and gains its effect."
    fr: "Le lanceur picore l’ennemi. S’il tient\nune Baie, le lanceur s’en empare et\nprofite de ses effets."
    it: "Chi la usa becca il bersaglio. Inoltre,\nse questi tiene una Bacca, gliela ruba\ne ne sfrutta gli effetti."
    de: "Hält das Ziel eine Beere,\nstiehlt der Angreifer sie und\ngenießt ihre Auswirkungen."
    es: "Ataca picoteando al objetivo. Si este\ntiene una Baya, se la arrebata y se\nbeneficia de sus efectos."
    ko: "부리로 공격한다.\n상대가 나무열매를 갖고 있을 때\n쪼아서 효과를 볼 수 있다."
tm089:
  names:
    jp_kana: わざマシン８９
    jp_kanji: わざマシン８９
    en: TM89
    fr: CT89
    it: MT89
    de: TM89
    es: MT89
    ko: 기술머신89
  descriptions:
    jp_kana: "あいてを　こうげきした　あとに\nひかえの　ポケモンと　いれかわる。"
    jp_kanji: "攻撃したあと\nものすごい　スピードで　もどってきて\n控えの　ポケモンと　入れ替わる。"
    en: "After making its attack, the user\nrushes back to switch places with a\nparty Pokémon in waiting."
    fr: "Après son attaque, le lanceur revient à\ntoute vitesse et change de place avec\nun Pokémon de l’équipe prêt au combat."
    it: "Chi usa questa mossa si tira indietro\nper farsi sostituire dopo aver sferrato\nl’attacco."
    de: "Direkt nach der Attacke tauscht\nder Angreifer mit einem wartenden\nPokémon den Platz."
    es: "Después de atacar, quien lo usa cambia\nrápidamente su puesto con un compañero\nque no esté combatiendo."
    ko: "공격한 뒤\n굉장한 스피드로 돌아와서\n교대 포켓몬과 교체한다."
tm090:
  names:
    jp_kana: わざマシン９０
    jp_kanji: わざマシン９０
    en: TM90
    fr: CT90
    it: MT90
    de: TM90
    es: MT90
    ko: 기술머신90
  descriptions:
    jp_kana: "じぶんの　ＨＰを　すこし　けずって\nぶんしんを　だす。　じぶんの\nかわりに　こうげきを　うける。"
    jp_kanji: "自分の　ＨＰを　少し　削って\n分身を　だす。\n分身は　自分の　身代わりに　なる。"
    en: "The user makes a copy of itself using\nsome of its HP. The copy serves as\nthe user’s decoy."
    fr: "Le lanceur fait une copie de lui-même\nen sacrifiant quelques PV. La copie\nsert de leurre."
    it: "Chi la usa crea una copia di se stesso\nusando alcuni PS. La copia serve come\nesca per il nemico."
    de: "Der Angreifer erschafft aus\nein paar eigenen KP einen\nKlon, der als Ablenkung dient."
    es: "Quien lo usa utiliza parte de sus PS\npara hacer una copia de sí mismo\nque sirve como señuelo."
    ko: "자신의 HP를 조금 깎아서\n분신을 만든다.\n분신은 자신의 대타가 된다."
tm091:
  names:
    jp_kana: わざマシン９１
    jp_kanji: わざマシン９１
    en: TM91
    fr: CT91
    it: MT91
    de: TM91
    es: MT91
    ko: 기술머신91
  descriptions:
    jp_kana: "からだの　ひかりを　いってんに\nあつめ　ひかりを　はなつ。　あいての\nとくぼうを　さげることがある。"
    jp_kanji: "体の　光を　一点に　集めて\n力を　放つ。\n相手の　特防を　さげることが　ある。"
    en: "The user gathers all its light energy\nand releases it at once. It may also\nlower the target’s Sp. Def stat."
    fr: "Le lanceur concentre son énergie\nlumineuse et la fait exploser. Peut\naussi baisser la Déf. Spé. de l’ennemi."
    it: "Chi la usa attacca raccogliendo e\nrilasciando energia luminosa. Può anche\nridurre la Difesa Speciale del nemico."
    de: "Entfesselt konzentrierte Lichtenergie.\nDie Spezial-Verteidigung des Zieles\nsinkt eventuell."
    es: "Quien lo usa concentra toda su energía\nlumínica y la libera de golpe. Puede\nreducir la Def. Especial del objetivo."
    ko: "몸의 빛을 한곳에 모아서\n힘을 쏜다. 상대의\n특수방어를 떨어뜨릴 때가 있다."
tm092:
  names:
    jp_kana: わざマシン９２
    jp_kanji: わざマシン９２
    en: TM92
    fr: CT92
    it: MT92
    de: TM92
    es: MT92
    ko: 기술머신92
  descriptions:
    jp_kana: "まかふしぎな　くうかんを　つくる。\n５ターンの　あいだ　うごきの　おそい\nポケモンから　こうげきできる。"
    jp_kanji: "まかふしぎな　空間を　つくる。\n５ターンの　あいだ\n遅い　ポケモンから　行動できる。"
    en: "The user creates a bizarre space in\nwhich slower Pokémon get to move\nfirst for five turns."
    fr: "Le lanceur crée une zone étrange\noù les Pokémon les plus lents\nfrappent en 1ᵉʳ pendant 5 tours."
    it: "Chi la usa crea una dimensione in cui\ni Pokémon più lenti si muovono per primi\nper cinque turni."
    de: "Verzerrt die Raumzeit für 5 Runden.\nLangsamere Pokémon greifen\nzuerst an."
    es: "Distorsiona el espacio de forma que los\nPokémon más lentos consiguen moverse\nen primer lugar durante cinco turnos."
    ko: "아주 이상한 공간을 만든다.\n5턴 동안 움직임이 느린\n포켓몬부터 공격할 수 있다."
tm093:
  names:
    jp_kana: わざマシン９３
    jp_kanji: わざマシン９３
    en: TM93
    fr: CT93
    it: MT93
    de: TM93
    es: MT93
    ko: 기술머신93
  descriptions:
    jp_kana: "でんきを　まとって\nあいてに　ぶつかって　こうげきする。\nじぶんも　ダメージを　うける。"
    jp_kanji: "電気を　まとって\n相手に　ぶつかって　攻撃する。\n自分も　少し　ダメージを　受ける。"
    en: "The user shrouds itself in electricity\nand smashes into its target.\nIt also damages the user a little."
    fr: "Une charge électrique violente qui\nblesse aussi légèrement le lanceur."
    it: "Chi la usa si carica di elettricità per\npoi scagliarsi sul bersaglio, ma subisce\ndei danni per il contraccolpo."
    de: "Anwender erzeugt Spannung und greift\nan, indem er auf Kollisionskurs geht. Er\nerleidet selbst leichten Schaden."
    es: "Placaje de alto voltaje que hiere\ntambién al atacante."
    ko: "전기를 두르고\n상대에게 부딪쳐 공격한다.\n자신도 조금 데미지를 입는다."
tm094:
  names:
    jp_kana: わざマシン９４
    jp_kanji: わざマシン９４
    en: TM94
    fr: CT94
    it: MT94
    de: TM94
    es: MT94
    ko: 기술머신94
  descriptions:
    jp_kana: "いわをも　くだくような\nパンチで　こうげきする。あいての\nぼうぎょを　さげる　ことが　ある。"
    jp_kanji: "岩をも　くだくような\nパンチで　攻撃する。相手の\n防御を　さげる　ことが　ある。"
    en: "The user attacks with a punch that can\nshatter a rock. It may also lower the\ntarget’s Defense stat."
    fr: "Porte un coup dévastateur à l’ennemi.\nPeut briser des rochers fissurés.\nPeut baisser la Défense."
    it: "Il nemico viene colpito da un pugno in\ngrado di frantumare anche la roccia.\nPuò anche ridurne la Difesa."
    de: "Steinbrechende Attacke, die\nden Verteidigungs-Wert des\nZieles senken kann."
    es: "Ataque demoledor que puede bajar la\nDefensa del objetivo. También puede\ndestrozar piedras resquebrajadas."
    ko: "바위를 깨는 듯한\n펀치로 공격한다. 상대의\n방어를 떨어뜨릴 때가 있다."
tm095:
  names:
    jp_kana: わざマシン９５
    jp_kanji: わざマシン９５
    en: TM95
    fr: CT95
    it: MT95
    de: TM95
    es: MT95
    ko: 기술머신95
  descriptions:
    jp_kana: "まくしたてる　ように　どなりつけて\nあいての　とくこうを　さげる。"
    jp_kanji: "まくしたてる　ように　怒鳴りつけて\n相手の　特攻を　さげる。"
    en: "The user yells as if it is ranting about\nsomething, making the target’s Sp. Atk\nstat decrease."
    fr: "Le lanceur hurle sur l’ennemi.\nBaisse l’Atq. Spé. de l’ennemi."
    it: "Chi la usa si mette a urlare per un po’,\nriducendo l’Attacco Speciale dei nemici."
    de: "Gibt Gegnern mit einer nicht enden\nwollenden Standpauke was auf die Ohren\nund senkt dabei deren Spezial-Angriff."
    es: "Ataca con un chillido desagradable\nque baja el Ataque Especial del rival."
    ko: "호되게 호통을 쳐서\n상대의 특수공격을 떨어뜨린다."
town_map:
  names:
    jp_kana: タウンマップ
    jp_kanji: タウンマップ
    en: Town Map
    fr: Carte
    it: Mappa Città
    de: Karte
    es: Mapa
    ko: 타운맵
  descriptions:
    jp_kana: "いつでも　てがるに　みることが\nできる　べんりな　ちず。\nじぶんの　ばしょも　わかる。"
    jp_kanji: "いつでも　手軽に　みることが\nできる　便利な　地図。\n自分の　場所も　わかる。"
    en: "A very convenient map that can be\nviewed anytime. It even shows your\npresent location."
    fr: "Une carte très pratique pouvant\nêtre consultée n’importe quand. Elle\nindique votre position actuelle."
    it: "Utilissima mappa, consultabile in ogni\nsituazione. Mostra anche la propria\nposizione in tempo reale."
    de: "Eine praktische Karte, die jederzeit\naufgerufen werden kann. Dein aktueller\nStandort wird auch angezeigt."
    es: "Un mapa muy útil que puede consultarse\nen cualquier momento y que, además,\nte indica dónde te encuentras."
    ko: "언제라도 간편하게 볼 수\n있는 편리한 지도.\n자신이 있는 곳도 알 수 있다."
toxic_orb:
  names:
    jp_kana: どくどくだま
    jp_kanji: どくどくだま
    en: Toxic Orb
    fr: Orbe Toxique
    it: Tossicsfera
    de: Toxik-Orb
    es: Toxisfera
    ko: 맹독구슬
  descriptions:
    jp_kana: "さわると　どくをだす　ふしぎなたま。\nもたせると　せんとうちゅうに\nもうどくの　じょうたいに　なる。"
    jp_kanji: "触ると　毒をだす　不思議な玉。\n持たせると　戦闘中に\n猛毒の　状態に　なる。"
    en: "An item to be held by a Pokémon.\nIt is a bizarre orb that badly poisons\nthe holder in battle."
    fr: "Objet à tenir. Orbe bizarre\nempoisonnant gravement son\nporteur durant le combat."
    it: "Strumento da far tenere a un Pokémon.\nSfera bizzarra che iperavvelena chi la\ntiene in lotta."
    de: "Ein Item zum Tragen. Dieser\nbizarre Orb vergiftet seinen\nTräger im Kampf schwer."
    es: "Extraña esfera que envenena\ngravemente al Pokémon que\nla lleva en combate."
    ko: "만지면 독을 발산하는 이상한 구슬.\n지니게 하면 배틀 중에\n맹독 상태가 된다."
toxic_plate:
  names:
    jp_kana: もうどくプレート
    jp_kanji: もうどくプレート
    en: Toxic Plate
    fr: Plaque Toxic
    it: Lastrafiele
    de: Gifttafel
    es: Tabla Tóxica
    ko: 맹독플레이트
  descriptions:
    jp_kana: "どくの　タイプの　せきばん。\nもたせると　どくタイプの\nわざの　いりょくが　つよまる。"
    jp_kanji: "どくの　タイプの　石盤。\n持たせると　どくタイプの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon.\nIt is a stone tablet that boosts the\npower of Poison-type moves."
    fr: "Objet à tenir. Tablette en pierre\naugmentant la puissance des capacités\nde type Poison."
    it: "Strumento da far tenere a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Veleno."
    de: "Ein Item zum Tragen. Diese Steintafel\nverstärkt Attacken vom Typ Gift."
    es: "Tabla de piedra que potencia\nlos movimientos de tipo Veneno.\nDebe llevarla un Pokémon."
    ko: "독타입의 석판.\n지니게 하면 독타입\n기술의 위력이 강해진다."
twisted_spoon:
  names:
    jp_kana: まがったスプーン
    jp_kanji: まがったスプーン
    en: TwistedSpoon
    fr: Cuillertordu
    it: Cucch. Torto
    de: Krummlöffel
    es: Cuchara Tor
    ko: 휘어진스푼
  descriptions:
    jp_kana: "ねんりきを　こめた　スプーン。\nもたせると　エスパータイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "念力を　こめた　スプーン。\n持たせると　エスパータイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon. It is\na spoon imbued with telekinetic power\nthat boosts Psychic-type moves."
    fr: "Objet à tenir. Cuillère contenant un\npouvoir télékinésique montant la\npuissance des capacités de type Psy."
    it: "Strumento da far tenere a un Pokémon.\nCucchiaio dotato di potere telecinetico\nche potenzia le mosse di tipo Psico."
    de: "Ein Item zum Tragen. Ein Löffel voller\ntelekinetischer Energie, der Attacken\nvom Typ Psycho verstärkt."
    es: "Cuchara llena de energía telequinética\nque potencia los movimientos de tipo\nPsíquico. Debe llevarla un Pokémon."
    ko: "염동력을 담은 숟가락.\n지니게 하면 에스퍼타입\n기술의 위력이 올라간다."
ultra_ball:
  names:
    jp_kana: ハイパーボール
    jp_kanji: ハイパーボール
    en: Ultra Ball
    fr: Hyper Ball
    it: Ultra Ball
    de: Hyperball
    es: Ultraball
    ko: 하이퍼볼
  descriptions:
    jp_kana: "スーパーボールよりも　さらに\nポケモンを　つかまえやすくなった\nすごく　せいのうのいい　ボール。"
    jp_kanji: "スーパーボールよりも　さらに\nポケモンを　捕まえやすくなった\nすごく　性能のいい　ボール。"
    en: "An ultra-performance Ball that\nprovides a higher Pokémon catch rate\nthan a Great Ball."
    fr: "Une Ball ultraperformante dont le taux\nde réussite est supérieur à celui de la\nSuper Ball."
    it: "Ball dalle prestazioni eccellenti:\nfornisce maggiori probabilità di\ncattura rispetto alla Mega Ball."
    de: "Ein Ball mit hoher Erfolgsquote.\nDem Superball in allen\nPunkten überlegen."
    es: "Poké Ball de rendimiento superior.\nTiene un índice de éxito mayor\nal de la Superball."
    ko: "수퍼볼보다도 더욱\n포켓몬을 잡기 쉬워진\n매우 성능이 좋은 볼."
unown_report:
  names:
    jp_kana: アンノーンノート
    jp_kanji: アンノーンノート
    en: Unown Report
    fr: Carnet Zarbi
    it: UnownBloc
    de: Icognitoheft
    es: Bloc Unown
    ko: 안농노트
  descriptions:
    jp_kana: "みつけた　アンノーンの　ようすが\nきろく　されている　ノート。"
    jp_kanji: "みつけた　アンノーンの　ようすが\n記録されている　ノート。"
    en: "A report of all the discovered kinds\nof Unown."
    fr: "Un carnet permettant de noter toutes\nles formes de Zarbi capturées."
    it: "Quaderno dove si registrano tutte\nle forme di Unown catturate."
    de: "Ein Heft, in dem automatisch\nDaten zu bereits gefangenen\nIcognito aufgezeichnet werden."
    es: "Bloc que almacena la información de los\nUnown capturados hasta el momento."
    ko: "발견한 안농의 모습이\n기록되어 있는 노트."
upgrade:
  names:
    jp_kana: アップグレード
    jp_kanji: アップグレード
    en: Up-Grade
    fr: Améliorator
    it: Upgrade
    de: Up-Grade
    es: Mejora
    ko: 업그레이드
  descriptions:
    jp_kana: "なかに　いろんな　じょうほうが\nつまった　とうめいな　きかい。\nシルフ　カンパニーせい。"
    jp_kanji: "中に　いろんな　情報が\nつまった　透明な　機械。\nシルフ　カンパニー製。"
    en: "A transparent device filled with all\nsorts of data.\nIt was produced by Silph Co."
    fr: "Dispositif transparent rempli de\ndonnées diverses et variées.\nFabriqué par la Sylphe SARL."
    it: "Apparecchio trasparente pieno zeppo\ndi dati di ogni tipo. È un prodotto\ndella Silph SpA."
    de: "Ein durchsichtiges Gerät. Es\nenthält alle möglichen Daten.\nHergestellt von Silph Co."
    es: "Peculiar dispositivo fabricado en\nSilph S. A. que contiene todo tipo\nde datos."
    ko: "안에 여러 가지 정보가\n가득한 투명한 기계다.\n실프주식회사 제품."
vs_recorder:
  names:
    jp_kana: バトルレコーダー
    jp_kanji: バトルレコーダー
    en: Vs. Recorder
    fr: Magnéto VS
    it: Registradati
    de: Kampfkamera
    es: Cámara Lucha
    ko: 배틀레코더
  descriptions:
    jp_kana: "ともだち　との　しょうぶや\nとくしゅな　しせつでの　しょうぶを\nきろくできる　かっこいい　きかい。"
    jp_kanji: "友達との　勝負や\n特殊な　施設での　勝負を\n記録できる　かっこいい　機械。"
    en: "An amazing device that can record a\nbattle either between friends or at a\nspecial battle facility."
    fr: "Appareil utile permettant d’enregistrer\nles combats entre amis et ceux ayant\nlieu dans un bâtiment de combat."
    it: "Fantastico dispositivo che registra le\nlotte tra amici o quelle che hanno luogo\nin alcuni edifici dedicati alla lotta."
    de: "Ein tolles Gerät, um Kämpfe zwischen\nFreunden oder Kämpfe in einer speziel-\nlen Kampfeinrichtung aufzuzeichnen."
    es: "Un fantástico dispositivo que graba\ncombates entre amigos o celebrados\nen algún recinto especial."
    ko: "친구와의 승부나\n특수한 시설에서의 승부를\n기록할 수 있는 멋있는 기계."
vs_seeker:
  names:
    jp_kana: バトルサーチャー
    jp_kanji: バトルサーチャー
    en: Vs. Seeker
    fr: Cherche VS
    it: Cercasfide
    de: Kampffahnder
    es: Buscapelea
    ko: 배틀서처
  descriptions:
    jp_kana: "たたかいたい　トレーナーを\nおしえてくれる　きかい。\nあるくと　でんちが　たまる。"
    jp_kanji: "戦いたい　トレーナーを\n教えてくれる　機械。\n歩くと　電池が　たまる。"
    en: "A device that indicates Trainers who\nwant to battle. Its battery charges\nwhile you walk."
    fr: "Un appareil indiquant les Dresseurs\nprêts à se battre. La batterie se\nrecharge quand vous marchez."
    it: "Apparecchio per trovare gli Allenatori\nche vogliono lottare. La batteria si\nricarica camminando."
    de: "Ein Gerät, das rückkampfwillige\nTrainer ausfindig macht. Die\nBatterie lädt sich beim Reisen auf."
    es: "Dispositivo que busca Entrenadores\nlistos para el combate. La batería se\ncarga mientras caminas."
    ko: "싸우고 싶어하는 트레이너를\n알려주는 기계.\n걸으면 전지가 충전된다."
wacan_berry:
  names:
    jp_kana: ソクノのみ
    jp_kanji: ソクノのみ
    en: Wacan Berry
    fr: Baie Parma
    it: Baccaparmen
    de: Kerzalbeere
    es: Baya Gualot
    ko: 초나열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　でんき　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　でんき技を\n受けたとき　威力が　弱まる。"
    en: "Weakens a supereffective Electric-type\nattack against the holding Pokémon."
    fr: "Tenue, cette Baie affaiblit une\nattaque ennemie super efficace\nde type Électrik."
    it: "Se tenuta da un Pokémon, indebolisce\nl’attacco superefficace di tipo Elettro\ndel nemico."
    de: "Als getragenes Item schwächt diese\nBeere besonders effektive Attacken\ndes Angreifers vom Typ Elektro."
    es: "Si la lleva un Pokémon, debilita un\nataque supereficaz de tipo Eléctrico\nde un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 뛰어난 전기 기술을\n당했을 때 위력이 약해진다."
water_gem:
  names:
    jp_kana: みずのジュエル
    jp_kanji: みずのジュエル
    en: Water Gem
    fr: Joyau Eau
    it: Bijouacqua
    de: Wasserjuwel
    es: G. Agua
    ko: 물주얼
  descriptions:
    jp_kana: "みずの　タイプの　ジュエル。\nもたせると　いちどだけ　みずの\nわざの　いりょくが　つよまる。"
    jp_kanji: "みずの　タイプの　ジュエル。\n持たせると　１度だけ　みずの\n技の　威力が　強まる。"
    en: "A gem with an essence of water. When\nheld, it strengthens the power of a\nWater-type move only once."
    fr: "Objet à tenir. Joyau augmentant\nune fois la puissance des capacités\nde type Eau."
    it: "Strumento da far tenere a un Pokémon.\nGioiello che potenzia una sola volta\nle mosse di tipo Acqua."
    de: "Ein Juwel vom Typ Wasser. Es\nerhöht einmalig die Stärke\neiner Attacke vom Typ Wasser."
    es: "Joya de un solo uso que potencia\nlos movimientos de tipo Agua.\nDebe llevarla un Pokémon."
    ko: "물타입의 주얼.\n지니게 하면 한 번만 물\n기술의 위력이 강해진다."
water_stone:
  names:
    jp_kana: みずのいし
    jp_kanji: みずのいし
    en: Water Stone
    fr: Pierre Eau
    it: Pietraidrica
    de: Wasserstein
    es: Piedra Agua
    ko: 물의돌
  descriptions:
    jp_kana: "ある　とくていの　ポケモンを\nしんかさせる　ふしぎな　いし。\nすんだ　みずいろを　している。"
    jp_kanji: "ある　特定の　ポケモンを\n進化させる　不思議な　石。\n澄んだ　水色を　している。"
    en: "A peculiar stone that makes certain\nspecies of Pokémon evolve.\nIt is a clear, light blue."
    fr: "Une pierre étrange qui fait évoluer\ncertaines espèces de Pokémon.\nElle est de couleur bleue."
    it: "Pietra particolare che fa evolvere\ndeterminate specie di Pokémon.\nHa delle macchioline azzurre."
    de: "Dieser spezielle Stein löst bei\nbestimmten Pokémon die Entwicklung\naus. Er ist hellblau."
    es: "Curiosa piedra que hace evolucionar\na determinadas especies de Pokémon.\nEs de color azul."
    ko: "어느 특정한 포켓몬을\n진화시키는 이상한 돌.\n맑고 푸른 색을 띠고 있다."
watmel_berry:
  names:
    jp_kana: カイスのみ
    jp_kanji: カイスのみ
    en: Watmel Berry
    fr: Baie Stekpa
    it: Baccacomero
    de: Wasmelbeere
    es: Baya Sambia
    ko: 슈박열매
  descriptions:
    jp_kana: "イッシュちほうでは　とても\nめずらしい　きのみ。\nマニアが　たかく　かってくれる。"
    jp_kanji: "イッシュ地方では　とても\n珍しい　きのみ。\nマニアが　高く　買ってくれる。"
    en: "A Berry which is very rare in the\nUnova region.\nA maniac will buy it for a high price."
    fr: "Baie très rare à Unys.\nLes amateurs en donnent un bon prix."
    it: "Bacca molto rara a Unima.\nSi può vendere a un prezzo piuttosto\nalto agli intenditori."
    de: "Eine Beere, die nur äußerst selten\nin der Einall-Region zu finden ist.\nKenner geben ihr letztes Hemd dafür."
    es: "Una Baya muy rara en la región\nde Teselia. Muy apreciada\npor los gourmets."
    ko: "하나지방에서는 매우\n희귀한 나무열매.\n마니아가 비싼 값에 산다."
wave_incense:
  names:
    jp_kana: さざなみのおこう
    jp_kanji: さざなみのおこう
    en: Wave Incense
    fr: Encens Vague
    it: Ondaroma
    de: Wellenrauch
    es: Incie. Aqua
    ko: 잔물결향로
  descriptions:
    jp_kana: "ふしぎな　かおりの　おこう。\nもたせると　みずタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "不思議な　香りの　御香。\n持たせると　みずタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon. It is\nincense with a curious aroma that\nboosts the power of Water-type moves."
    fr: "Objet à tenir. Encens au parfum\nexotique augmentant la puissance\ndes capacités de type Eau."
    it: "Strumento da far tenere a un Pokémon.\nIncenso dal curioso aroma che potenzia\nle mosse di tipo Acqua."
    de: "Ein Item zum Tragen. Sein\nausgefallenes Aroma verstärkt\nAttacken vom Typ Wasser."
    es: "Incienso que tiene un curioso aroma\nque potencia los movimientos de\ntipo Agua. Debe llevarlo un Pokémon."
    ko: "이상한 향기의 향로.\n지니게 하면 물타입\n기술의 위력이 올라간다."
wepear_berry:
  names:
    jp_kana: セシナのみ
    jp_kanji: セシナのみ
    en: Wepear Berry
    fr: Baie Repoi
    it: Baccapera
    de: Nirbebeere
    es: Baya Peragu
    ko: 서배열매
  descriptions:
    jp_kana: "イッシュちほうでは　とても\nめずらしい　きのみ。\nマニアが　たかく　かってくれる。"
    jp_kanji: "イッシュ地方では　とても\n珍しい　きのみ。\nマニアが　高く　買ってくれる。"
    en: "A Berry which is very rare in the\nUnova region.\nA maniac will buy it for a high price."
    fr: "Baie très rare à Unys.\nLes amateurs en donnent un bon prix."
    it: "Bacca molto rara a Unima.\nSi può vendere a un prezzo piuttosto\nalto agli intenditori."
    de: "Eine Beere, die nur äußerst selten\nin der Einall-Region zu finden ist.\nKenner geben ihr letztes Hemd dafür."
    es: "Una Baya muy rara en la región\nde Teselia. Muy apreciada\npor los gourmets."
    ko: "하나지방에서는 매우\n희귀한 나무열매.\n마니아가 비싼 값에 산다."
white_apricorn:
  names:
    jp_kana: しろぼんぐり
    jp_kanji: しろぼんぐり
    en: Wht Apricorn
    fr: Noigrume Blc
    it: Ghic. Bianca
    de: Aprikoko Wss
    es: Bonguri Bla
    ko: 하얀규토리
  descriptions:
    jp_kana: "しろい　ぼんぐり。\nなんの　においも　しない。"
    jp_kanji: "しろい　ぼんぐり。\nなんの　においも　しない。"
    en: "A white Apricorn.\nIt doesn’t smell like anything."
    fr: "Un Noigrume de couleur blanche.\nIl ne dégage aucun arôme."
    it: "Una Ghicocca di colore bianco.\nNon emana alcun odore."
    de: "Eine weiße Aprikoko.\nRiecht nach überhaupt nichts."
    es: "Bonguri de color blanco que no\ndesprende aroma alguno."
    ko: "하얀색의 규토리.\n어떠한 향기도 나지 않는다."
white_flute:
  names:
    jp_kana: しろいビードロ
    jp_kanji: しろいビードロ
    en: White Flute
    fr: Flûteblanche
    it: Flauto B.nco
    de: Weiße Flöte
    es: Fl. Blanca
    ko: 하양비드로
  descriptions:
    jp_kana: "しろい　ガラスで　できている\nおもちゃの　ふえ。\nマニアが　たかく　かってくれる。"
    jp_kanji: "白い　ガラスで　できている\nおもちゃの　笛。\nマニアが　高く　買ってくれる。"
    en: "A toy flute made from white glass.\nA maniac will buy it for a high price."
    fr: "Jouet en forme de flûte en verre\nblanc. Les amateurs en donnent\nun bon prix."
    it: "Flauto giocattolo fatto di vetro bianco.\nSi può vendere a un prezzo piuttosto\nalto agli intenditori."
    de: "Eine Spielzeugflöte aus weißem Glas.\nSammler geben ihr letztes Hemd dafür\nher."
    es: "Una flauta de juguete hecha de\ncristal blanco.\nMuy valorada por los coleccionistas."
    ko: "하얀 유리로 만들어진\n장난감 피리.\n마니아가 비싼 값에 산다."
white_herb:
  names:
    jp_kana: しろいハーブ
    jp_kanji: しろいハーブ
    en: White Herb
    fr: Herbeblanche
    it: Erbachiara
    de: Schlohkraut
    es: Hier. Blanca
    ko: 하양허브
  descriptions:
    jp_kana: "もたせた　ポケモンの　のうりょくが\nさがったとき　いちどだけ　もとの\nじょうたいに　もどす。"
    jp_kanji: "持たせた　ポケモンの　能力が\nさがったとき　１度だけ　もとの\n状態に　もどす。"
    en: "An item to be held by a Pokémon.\nIt restores any lowered stat in\nbattle. It can be used only once."
    fr: "Objet à tenir qui restaure les stats\nbaissées. Ne peut être utilisé qu’une\nfois."
    it: "Strumento da far tenere a un Pokémon.\nRipristina le statistiche ridotte in\nlotta. Si può usare una sola volta."
    de: "Ein Item, das einem Pokémon zum Tragen\ngegeben werden kann. Es hebt einmalig\njede negative Statusveränderung auf."
    es: "Restaura cualquier característica\nreducida en combate. Solo se puede\nusar una vez. Debe llevarla un Pokémon."
    ko: "지니게 한 포켓몬의 능력이\n떨어졌을 때 한 번만 원래\n상태로 돌아온다."
wide_lens:
  names:
    jp_kana: こうかくレンズ
    jp_kanji: こうかくレンズ
    en: Wide Lens
    fr: Loupe
    it: Grandelente
    de: Großlinse
    es: Lupa
    ko: 광각렌즈
  descriptions:
    jp_kana: "ものが　おおきく　みえる　レンズ。\nもたせると　わざの　めいちゅうりつが\nすこし　あがる。"
    jp_kanji: "ものが　大きく　みえる　レンズ。\n持たせると　技の　命中率が\n少し　あがる。"
    en: "An item to be held by a Pokémon.\nIt is a magnifying lens that slightly\nboosts the accuracy of moves."
    fr: "Objet à tenir. Magnifique loupe\naugmentant un peu la Précision\ndes capacités."
    it: "Strumento da far tenere a un Pokémon.\nLente d’ingrandimento che aumenta\ndi poco la precisione delle mosse."
    de: "Ein Item zum Tragen.\nDieses Vergrößerungsglas\nerhöht die Genauigkeit etwas."
    es: "Debe llevarla un Pokémon.\nAumenta ligeramente la Precisión de\nlos movimientos."
    ko: "물건이 크게 보이는 렌즈.\n지니게 하면 기술의 명중률이\n조금 올라간다."
wiki_berry:
  names:
    jp_kana: ウイのみ
    jp_kanji: ウイのみ
    en: Wiki Berry
    fr: Baie Wiki
    it: Baccakiwi
    de: Wikibeere
    es: Baya Wiki
    ko: 위키열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nピンチのとき　ＨＰを　かいふくする。\nきらいな　あじだと　こんらん　する。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　ＨＰを　回復する。\nきらいな味だと　混乱する。"
    en: "If held by a Pokémon, it restores the\nuser’s HP in a pinch, but will cause\nconfusion if it hates the taste."
    fr: "Tenue, cette Baie restaure des PV en\ncas de besoin, mais rend confus si\nle Pokémon n’aime pas son goût."
    it: "Se tenuta da un Pokémon in difficoltà,\nrestituisce PS. Se al Pokémon non piace\nil suo sapore, può causare confusione."
    de: "Als getragenes Item füllt die Beere die\nKP eines Pokémon auf, doch ihr Aroma\nverwirrt jene, die es nicht mögen."
    es: "Los Pokémon pueden llevarla o usarla\npara restaurar algunos PS. Su sabor\npuede causar confusión."
    ko: "포켓몬에게 지니게 하면\n위급할 때 HP를 회복한다.\n싫어하는 맛이면 혼란에 빠진다."
wise_glasses:
  names:
    jp_kana: ものしりメガネ
    jp_kanji: ものしりメガネ
    en: Wise Glasses
    fr: Lunet. Sages
    it: Saviocchiali
    de: Schlauglas
    es: Gafas Esp.
    ko: 박식안경
  descriptions:
    jp_kana: "ぶあつい　レンズの　ついた　メガネ。\nもたせると　とくしゅわざの\nいりょくが　すこし　あがる。"
    jp_kanji: "ぶあつい　レンズの　ついた　メガネ。\n持たせると　特殊技の\n威力が　少し　あがる。"
    en: "An item to be held by a Pokémon. It is\na thick pair of glasses that slightly\nboosts the power of special moves."
    fr: "Objet à tenir. Paire de lunettes\népaisses augmentant un peu la\npuissance des attaques spéciales."
    it: "Strumento da far tenere a un Pokémon.\nPaio di occhiali dalle lenti spesse che\npotenzia di poco le mosse speciali."
    de: "Ein Item zum Tragen. Diese\ndicke Brille verstärkt auf Spezial-\nAngriff basierende Attacken."
    es: "Potencian ligeramente los movimientos\nespeciales. Debe llevarlas un Pokémon."
    ko: "두꺼운 렌즈를 붙인 안경.\n지니게 하면 특수 기술의\n위력이 조금 올라간다."
works_key:
  names:
    jp_kana: はつでんしょキー
    jp_kanji: はつでんしょキー
    en: Works Key
    fr: Clé Centrale
    it: Turbinchiave
    de: K-Schlüssel
    es: Ll. Central
    ko: 발전소키
  descriptions:
    jp_kana: "たにまのはつでんしょの　とびらを\nあけしめする　おおきな　カギ。\nなぜか　ギンガだんが　もっていた。"
    jp_kanji: "谷間の発電所の　扉を\nあけしめする　おおきな　カギ。\nなぜか　ギンガ団が　持っていた。"
    en: "A large key for operating the doors of\nthe Valley Windworks in the canyon.\nIt was held by a Team Galactic Grunt."
    fr: "Grande clé servant à ouvrir la porte\nde la centrale Les Éoliennes du canyon.\nUn sbire de la Team Galaxie la détenait."
    it: "Grande chiave usata per azionare la\nporta dell’Impianto Turbine. Prima ce\nl’aveva una Recluta del Team Galassia."
    de: "Ein großer Schlüssel, der zum\nWindkraftwerk gehört. Einer der Rüpel\nvon Team Galaktik hatte ihn im Besitz."
    es: "Abre la puerta de la Central del\nValle Eólico. La llevaba un Recluta\ndel Equipo Galaxia."
    ko: "골짜기발전소의 문을 여닫는 큰 열쇠.\n어찌된 영문인지\n갤럭시단이 지니고 있었다."
x_accuracy:
  names:
    jp_kana: ヨクアタール
    jp_kanji: ヨクアタール
    en: X Accuracy
    fr: Précision +
    it: Precisione X
    de: X-Treffer
    es: Precisión X
    ko: 잘-맞히기
  descriptions:
    jp_kana: "せんとうちゅうの　ポケモンの\nめいちゅうを　あげる　どうぐ。\nひっこめると　もとに　もどる。"
    jp_kanji: "戦闘中の　ポケモンの\n命中を　あげる　道具。\nひっこめると　元に　戻る。"
    en: "An item that raises the accuracy\nof a Pokémon in battle. It wears off if\nthe Pokémon is withdrawn."
    fr: "Monte la Précision pendant un combat.\nL’effet s’estompe si le Pokémon se\nretire."
    it: "Aumenta la precisione di un Pokémon\nin una lotta. L’effetto svanisce se\nil Pokémon è sostituito."
    de: "Hebt die Genauigkeit eines Pokémon\nim Kampf. Die Wirkung wird mit dem\nAustausch des Pokémon beendet."
    es: "Aumenta la Precisión de los ataques\nen combate. Al cambiar de Pokémon,\nel efecto desaparece."
    ko: "배틀 중인 포켓몬의 명중률을 올리는\n도구. 포켓몬을 볼에 넣어버리면\n원래대로 되돌아간다."
x_accuracy_2:
  names:
    jp_kana: ヨクアタール２
    jp_kanji: ヨクアタール２
    en: X Accuracy 2
    fr: Précision 2
    it: Precis. X-2
    de: X-Treffer2
    es: Prec. X 2
    ko: 잘-맞히기2
  descriptions:
    jp_kana: "せんとうちゅうの　ポケモンの\nめいちゅうを　それなりに　あげる。\nひっこめると　もとに　もどる。"
    jp_kanji: "戦闘中の　ポケモンの\n命中を　それなりに　あげる。\nひっこめると　元に　戻る。"
    en: "It sharply raises the accuracy of a\nPokémon in battle. It wears off if the\nPokémon is withdrawn."
    fr: "Monte un peu la Précision pendant\nun combat. L’effet s’estompe\nsi le Pokémon se retire."
    it: "Aumenta di molto la precisione di\nun Pokémon in una lotta. L’effetto\nsvanisce se il Pokémon è sostituito."
    de: "Hebt die Genauigkeit eines Pokémon\nim Kampf leicht an. Die Wirkung\nendet mit dem Austausch des Pokémon."
    es: "Aumenta ligeramente la Precisión en\ncombate. Al cambiar de Pokémon,\nel efecto desaparece."
    ko: "배틀 중인 포켓몬의 명중률을\n그럭저럭 올린다. 포켓몬을 볼에\n넣어버리면 원래대로 되돌아간다."
x_accuracy_3:
  names:
    jp_kana: ヨクアタール３
    jp_kanji: ヨクアタール３
    en: X Accuracy 3
    fr: Précision 3
    it: Precis. X-3
    de: X-Treffer3
    es: Prec. X 3
    ko: 잘-맞히기3
  descriptions:
    jp_kana: "せんとうちゅうの　ポケモンの\nめいちゅうを　かなり　あげる。\nひっこめると　もとに　もどる。"
    jp_kanji: "戦闘中の　ポケモンの\n命中を　かなり　あげる。\nひっこめると　元に　戻る。"
    en: "It drastically raises the accuracy of a\nPokémon in battle. It wears off if the\nPokémon is withdrawn."
    fr: "Monte sensiblement la Précision\npendant un combat. L’effet s’estompe\nsi le Pokémon se retire."
    it: "Aumenta moltissimo la precisione\ndi un Pokémon in una lotta. L’effetto\nsvanisce se il Pokémon è sostituito."
    de: "Hebt die Genauigkeit eines Pokémon\nim Kampf stark an. Die Wirkung endet mit\ndem Austausch des Pokémon."
    es: "Aumenta bastante la Precisión en\ncombate. Al cambiar de Pokémon,\nel efecto desaparece."
    ko: "배틀 중인 포켓몬의 명중률을\n상당히 올린다. 포켓몬을 볼에\n넣어버리면 원래대로 되돌아간다."
x_accuracy_6:
  names:
    jp_kana: ヨクアタール６
    jp_kanji: ヨクアタール６
    en: X Accuracy 6
    fr: Précision 6
    it: Precis. X-6
    de: X-Treffer6
    es: Prec. X 6
    ko: 잘-맞히기6
  descriptions:
    jp_kana: "せんとうちゅうの　ポケモンの\nめいちゅうを　ものすごく　あげる。\nひっこめると　もとに　もどる。"
    jp_kanji: "戦闘中の　ポケモンの\n命中を　ものすごく　あげる。\nひっこめると　元に　戻る。"
    en: "It raises the accuracy of a Pokémon in\nbattle immensely. It wears off if the\nPokémon is withdrawn."
    fr: "Monte fortement la Précision pendant\nun combat. L’effet s’estompe\nsi le Pokémon se retire."
    it: "Aumenta incredibilmente la precisione\ndi un Pokémon in una lotta. L’effetto\nsvanisce se il Pokémon è sostituito."
    de: "Hebt die Genauigkeit eines Pokémon im\nKampf enorm an. Die Wirkung endet mit\ndem Austausch des Pokémon."
    es: "Aumenta mucho la Precisión en\ncombate. Al cambiar de Pokémon,\nel efecto desaparece."
    ko: "배틀 중인 포켓몬의 명중률을\n엄청나게 올린다. 포켓몬을 볼에\n넣어버리면 원래대로 되돌아간다."
x_attack:
  names:
    jp_kana: プラスパワー
    jp_kanji: プラスパワー
    en: X Attack
    fr: Attaque +
    it: Attacco X
    de: X-Angriff
    es: Ataque X
    ko: 플러스파워
  descriptions:
    jp_kana: "せんとうちゅうの　ポケモンの\nこうげきを　あげる　どうぐ。\nひっこめると　もとに　もどる。"
    jp_kanji: "戦闘中の　ポケモンの\n攻撃を　あげる　道具。\nひっこめると　元に　戻る。"
    en: "An item that raises the Attack stat\nof a Pokémon in battle. It wears off if\nthe Pokémon is withdrawn."
    fr: "Monte l’Attaque pendant un combat.\nL’effet s’estompe si le Pokémon se\nretire."
    it: "Aumenta l’Attacco di un Pokémon\nin una lotta. L’effetto svanisce se\nil Pokémon è sostituito."
    de: "Hebt den Angriffs-Wert eines Pokémon\nim Kampf. Die Wirkung wird mit dem\nTausch des Pokémon beendet."
    es: "Aumenta el Ataque en combate.\nAl cambiar de Pokémon, el efecto\ndesaparece."
    ko: "배틀 중인 포켓몬의 공격을 올리는\n도구. 포켓몬을 볼에 넣어버리면\n원래대로 되돌아간다."
x_attack_2:
  names:
    jp_kana: プラスパワー２
    jp_kanji: プラスパワー２
    en: X Attack 2
    fr: Attaque 2
    it: Attacco X-2
    de: X-Angriff2
    es: Ataque X 2
    ko: 플러스파워2
  descriptions:
