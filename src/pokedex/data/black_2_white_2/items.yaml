ability_urge:
  names:
    jp_kana: スキルコール
    jp_kanji: スキルコール
    en: Ability Urge
    fr: Appel CapSpé
    it: Chiamabilità
    de: Fäh.-Appell
    es: Habilitador
    ko: 스킬콜
  descriptions:
    jp_kana: "つかうと　みかたの　ポケモンの\nとくせいを　はつどう　させる。"
    jp_kanji: "使うと　味方の　ポケモンの\n特性を　発動させる。"
    en: "When used, it activates the Ability of\nan ally Pokémon."
    fr: "Déclenche la capacité spéciale\nd’un Pokémon de l’équipe."
    it: "Usandolo su un Pokémon della squadra,\nne verrà attivata l’abilità."
    de: "Aktiviert bei Gebrauch die Fähigkeit\ndes Mitstreiters."
    es: "Al usarlo, activa la habilidad de\nun Pokémon de tu equipo."
    ko: "사용하면 같은 편 포켓몬의\n특성을 발동시킨다."
absorb_bulb:
  names:
    jp_kana: きゅうこん
    jp_kanji: きゅうこん
    en: Absorb Bulb
    fr: Bulbe
    it: Bulbo
    de: Knolle
    es: Tubérculo
    ko: 구근
  descriptions:
    jp_kana: "つかいすての　きゅうこん。\nもたせて　みずの　わざを　うけると\nとくこうが　あがる。"
    jp_kanji: "使い捨ての　きゅうこん。\n持たせて　みずの　技を　受けると\n特攻が　あがる。"
    en: "A consumable bulb. If the holder is hit\nby a Water-type move, its Sp. Atk\nwill rise."
    fr: "Bulbe jetable. Tenu, il augmente\nl’Attaque Spéciale lorsque le Pokémon\nsubit une attaque de type Eau."
    it: "Bulbo monouso. Se il Pokémon che\nlo tiene subisce una mossa di tipo\nAcqua, il suo Attacco Speciale aumenta."
    de: "Eine einmalig einsetzbare Knolle.\nErhöht den Spez.-Angr. des Trägers,\nwenn ihn eine Wasser-Attacke trifft."
    es: "Raíz de usar y tirar que sube el Ataque\nEspecial cuando se recibe un ataque\nde tipo Agua."
    ko: "단 한 번 쓰면 없어지는 구근.\n지니게 하고 물 기술을 받으면\n특수공격이 올라간다."
adamant_orb:
  names:
    jp_kana: こんごうだま
    jp_kanji: こんごうだま
    en: Adamant Orb
    fr: Orbe Adamant
    it: Adamasfera
    de: Adamant-Orb
    es: Diamansfera
    ko: 금강옥
  descriptions:
    jp_kana: "ディアルガに　もたせると　ドラゴンと\nはがねタイプの　わざの　いりょくが\nあがる　ひかり　かがやく　たま。"
    jp_kanji: "ディアルガに　持たせると　ドラゴンと\nはがねタイプの　技の　威力が\nあがる　光り　輝く　珠。"
    en: "A brightly gleaming orb to be held by\nDialga. It boosts the power of Dragon-\nand Steel-type moves."
    fr: "Orbe très brillant destiné à Dialga.\nAugmente la puissance des capacités\nde type Dragon et Acier."
    it: "Sfera molto luminosa da far tenere\na Dialga. Potenzia le mosse di tipo\nDrago e Acciaio."
    de: "Ein hell leuchtender Orb.\nVerstärkt Attacken vom Typ Drachen\nund Stahl, wenn Dialga ihn trägt."
    es: "Una esfera brillante que potencia los\nmovimientos de tipo Acero y Dragón.\nDebe llevarla Dialga."
    ko: "디아루가에게 지니게 하면 드래곤과\n강철타입 기술의 위력이 올라가는\n반짝반짝 빛나는 구슬."
aguav_berry:
  names:
    jp_kana: バンジのみ
    jp_kanji: バンジのみ
    en: Aguav Berry
    fr: Baie Gowav
    it: Baccaguava
    de: Gauvebeere
    es: Baya Guaya
    ko: 아바열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nピンチのとき　ＨＰを　かいふくする。\nきらいな　あじだと　こんらん　する。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　ＨＰを　回復する。\nきらいな味だと　混乱する。"
    en: "If held by a Pokémon, it restores the\nuser’s HP in a pinch, but will cause\nconfusion if it hates the taste."
    fr: "Tenue, cette Baie restaure des PV en\ncas de besoin, mais rend confus si\nle Pokémon n’aime pas son goût."
    it: "Se tenuta da un Pokémon in difficoltà,\nrestituisce PS. Se al Pokémon non piace\nil suo sapore, può causare confusione."
    de: "Als getragenes Item füllt die Beere die\nKP eines Pokémon auf, doch ihr Aroma\nverwirrt jene, die es nicht mögen."
    es: "Los Pokémon pueden llevarla o usarla\npara restaurar algunos PS. Su sabor\npuede causar confusión."
    ko: "포켓몬에게 지니게 하면\n위급할 때 HP를 회복한다.\n싫어하는 맛이면 혼란에 빠진다."
air_balloon:
  names:
    jp_kana: ふうせん
    jp_kanji: ふうせん
    en: Air Balloon
    fr: Ballon
    it: Palloncino
    de: Luftballon
    es: Globo Helio
    ko: 풍선
  descriptions:
    jp_kana: "ポケモンに　もたせると\nポケモンが　ちゅうに　うく。\nこうげきを　うけると　われてしまう。"
    jp_kanji: "ポケモンに　持たせると\nポケモンが　宙に　浮く。\n攻撃を　受けると　割れてしまう。"
    en: "When held by a Pokémon, the Pokémon\nwill float into the air. When the holder\nis attacked, this item will burst."
    fr: "Tenu par un Pokémon, cet objet lui\npermet de flotter dans les airs.\nIl éclate en cas d’attaque."
    it: "Permette al Pokémon che lo tiene di\nfluttuare in aria. Scoppia se è colpito\nda un attacco."
    de: "Gibt man es einem Pokémon zum Tragen,\nfängt es an zu schweben. Wird es\ngetroffen, platzt das Item."
    es: "El Pokémon que lo lleve flotará en el\naire. Si recibe un golpe, estallará."
    ko: "포켓몬에게 지니게 하면\n포켓몬이 허공에 뜬다.\n공격을 받으면 터져버린다."
amulet_coin:
  names:
    jp_kana: おまもりこばん
    jp_kanji: おまもりこばん
    en: Amulet Coin
    fr: Pièce Rune
    it: Monetamuleto
    de: Münzamulett
    es: Mon. Amuleto
    ko: 부적금화
  descriptions:
    jp_kana: "もたせた　ポケモンが　いちどでも\nせんとうに　かおを　だすと\nおかねが　２ばい　もらえる。"
    jp_kanji: "持たせた　ポケモンが　１度でも\n戦闘に　顔を　だすと\nお金が　２倍　もらえる。"
    en: "An item to be held by a Pokémon.\nIt doubles a battle’s prize money if\nthe holding Pokémon joins in."
    fr: "Objet à tenir. Double l’argent gagné\nsi le porteur se joint au combat."
    it: "Strumento da far tenere a un Pokémon.\nRaddoppia i guadagni nella lotta se\nchi lo tiene vi partecipa."
    de: "Ein Item, das ein Pokémon trägt und\ndas doppeltes Preisgeld bringt, wenn\nder Träger am Kampf teilnimmt."
    es: "Si el Pokémon que la lleva lucha en\nun combate, duplica las ganancias."
    ko: "지니게 한 포켓몬이\n한 번이라도 배틀에 나가면\n돈을 2배로 받을 수 있다."
antidote:
  names:
    jp_kana: どくけし
    jp_kanji: どくけし
    en: Antidote
    fr: Antidote
    it: Antidoto
    de: Gegengift
    es: Antídoto
    ko: 해독제
  descriptions:
    jp_kana: "スプレーしきの　くすり。\nポケモン　１ひきの　どくの\nじょうたいを　かいふくする。"
    jp_kanji: "スプレー式の　薬。\nポケモン　１匹の　どくの\n状態を　回復する。"
    en: "A spray-type medicine.\nIt lifts the effect of poison from one\nPokémon."
    fr: "Un médicament sous forme de spray.\nGuérit un Pokémon empoisonné."
    it: "Rimedio spray.\nCura un Pokémon dall’avvelenamento."
    de: "Ein Spray, das Vergiftungen\neines Pokémon heilt."
    es: "Medicina en espray que contrarresta\nlos efectos del veneno en un Pokémon."
    ko: "스프레이식의 약.\n포켓몬 1마리의\n독 상태를 회복한다."
apicot_berry:
  names:
    jp_kana: ズアのみ
    jp_kanji: ズアのみ
    en: Apicot Berry
    fr: Baie Abriko
    it: Baccacocca
    de: Apikobeere
    es: Baya Aricoc
    ko: 규살열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nピンチのとき　じぶんの\nとくぼうが　あがる。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　自分の\n特防が　あがる。"
    en: "If held by a Pokémon, it raises its\nSp. Def stat in a pinch."
    fr: "Tenue, cette Baie monte la Déf. Spé.\nen cas de besoin."
    it: "Aumenta la Difesa Speciale, se\nil Pokémon che la tiene si trova\nin difficoltà."
    de: "Als getragenes Item erhöht diese Beere\ndie Spezial-Verteidigung eines Pokémon,\nsobald es in einer Notlage steckt."
    es: "Si la lleva un Pokémon, le sube\nla Defensa Especial en un momento\nde apuro."
    ko: "포켓몬에게 지니게 하면\n위급할 때 자신의\n특수방어가 올라간다."
apricorn_box:
  names:
    jp_kana: ぼんぐりケース
    jp_kanji: ぼんぐりケース
    en: Apricorn Box
    fr: Bte Noigrume
    it: Ghicobox
    de: Aprikokobox
    es: Caja Bonguri
    ko: 규토리케이스
  descriptions:
    jp_kana: "ぼんぐりを　９９こ　ほぞん　できる\nべんりな　いれもの。"
    jp_kanji: "ぼんぐりを　９９こ　保存できる\n便利な　いれもの。"
    en: "A handy box where you can store up to\n99 Apricorns of each kind."
    fr: "Une boîte bien pratique qui peut\ncontenir jusqu’à 99 Noigrumes."
    it: "Contenitore molto pratico dove\nconservare fino a 99 Ghicocche diverse."
    de: "Eine praktische Tragebox, in der\ndu bis zu 99 Aprikokos jeder\nSorte transportieren kannst."
    es: "Práctico recipiente que puede almacenar\nhasta 99 Bonguri de cada especie."
    ko: "규토리를 99개 보존할 수 있는\n편리한 용기."
armor_fossil:
  names:
    jp_kana: たてのカセキ
    jp_kanji: たてのカセキ
    en: Armor Fossil
    fr: Foss. Armure
    it: Fossilscudo
    de: Panzerfossil
    es: Fósil Coraza
    ko: 방패의화석
  descriptions:
    jp_kana: "おおむかし　ちじょうで　くらした\nこだい　ポケモンの　カセキ。\nえりかざりの　いちぶ　らしい。"
    jp_kanji: "大昔　地上で　暮らした\n古代ポケモンの　カセキ。\n襟飾りの　一部らしい。"
    en: "A fossil from a prehistoric Pokémon\nthat lived on the land. It appears to\nbe part of a collar."
    fr: "Fossile d’un Pokémon préhistorique\nterrestre. On dirait une partie d’un\ncollier."
    it: "Fossile di un Pokémon preistorico che\nviveva sulla terraferma. Sembra far\nparte di un collare."
    de: "Das Fossil eines uralten Pokémon,\ndas an Land lebte. Es sieht wie\nein Schlüsselbein aus."
    es: "Fósil de un Pokémon prehistórico\nterrestre. Parece ser parte\nde un cuello."
    ko: "오랜 옛날 지상에서 살았던\n고대 포켓몬의 화석.\n깃 장식의 일부인 듯하다."
aspear_berry:
  names:
    jp_kana: ナナシのみ
    jp_kanji: ナナシのみ
    en: Aspear Berry
    fr: Baie Willia
    it: Baccaperina
    de: Wilbirbeere
    es: Baya Perasi
    ko: 배리열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこおりを　かいふくする。"
    jp_kanji: "ポケモンに　持たせると\nこおりを　回復する。"
    en: "If held by a Pokémon,\nit defrosts it."
    fr: "Baie qui soigne le gel lorsqu’elle\nest tenue par un Pokémon."
    it: "Se tenuta da un Pokémon, lo cura\ndal congelamento."
    de: "Gibst du die Beere einem Pokémon zum\nTragen, heilt diese es von Frost."
    es: "Los Pokémon pueden llevarla o usarla\npara descongelarse."
    ko: "포켓몬에게 지니게 하면\n얼음을 회복한다."
awakening:
  names:
    jp_kana: ねむけざまし
    jp_kanji: ねむけざまし
    en: Awakening
    fr: Réveil
    it: Sveglia
    de: Aufwecker
    es: Despertar
    ko: 잠깨는약
  descriptions:
    jp_kana: "スプレーしきの　くすり。\nポケモン　１ひきの　ねむりの\nじょうたいを　かいふくする。"
    jp_kanji: "スプレー式の　薬。\nポケモン　１匹の　ねむりの\n状態を　回復する。"
    en: "A spray-type medicine.\nIt awakens a Pokémon from the\nclutches of sleep."
    fr: "Un médicament sous forme de spray.\nRéveille un Pokémon endormi."
    it: "Rimedio spray.\nSveglia un Pokémon addormentato."
    de: "Ein Spray, das ein schlafendes\nPokémon aufweckt."
    es: "Medicina en espray que libera un\nPokémon de las garras del sueño."
    ko: "스프레이식의 약.\n포켓몬 1마리의\n잠듦 상태를 회복한다."
azure_flute:
  names:
    jp_kana: てんかいのふえ
    jp_kanji: てんかいのふえ
    en: Azure Flute
    fr: Flûte Azur
    it: Flauto Cielo
    de: Azurflöte
    es: Flauta Azur
    ko: 천계의피리
  descriptions:
    jp_kana: "このよの　ものとは　おもえない\nねいろが　なりひびく　ふえ。　いつ\nだれが　つくったのか　わからない。"
    jp_kanji: "この世の　ものとは　おもえない\n音色が　なりひびく　ふえ。　いつ\nだれが　つくったのか　わからない。"
    en: "A flute that puts out echoing sounds\nthat do not seem to be of this world.\nIt is unknown who made it."
    fr: "Flûte produisant des sons qui semblent\nprovenir d’un autre monde. On ne sait\npas qui l’a fabriquée."
    it: "Flauto che emette una melodia che\nsembra appartenere ad un altro mondo.\nNon si sa chi l’abbia creato."
    de: "Eine Flöte, deren Töne nicht von\ndieser Welt zu sein scheinen.\nIhr Erschaffer ist nicht bekannt."
    es: "Emite sonidos que no parecen de este\nmundo. Es de fabricante desconocido."
    ko: "이 세상의 것이라고는 생각할 수 없는\n음색이 울려 퍼지는 피리. 언제\n누가 만들었는지 모른다."
babiri_berry:
  names:
    jp_kana: リリバのみ
    jp_kanji: リリバのみ
    en: Babiri Berry
    fr: Baie Babiri
    it: Baccababiri
    de: Babiribeere
    es: Baya Baribá
    ko: 바리비열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　はがね　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　はがね技を\n受けたとき　威力が　弱まる。"
    en: "Weakens a supereffective Steel-type\nattack against the holding Pokémon."
    fr: "Tenue, cette Baie affaiblit une attaque\nennemie super efficace de type Acier."
    it: "Se tenuta da un Pokémon, indebolisce\nl’attacco superefficace di tipo Acciaio\ndel nemico."
    de: "Als getragenes Item schwächt diese\nBeere besonders effektive Attacken\ndes Angreifers vom Typ Stahl."
    es: "Si la lleva un Pokémon, debilita un\nataque supereficaz de tipo Acero\nde un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 뛰어난 강철 기술을\n당했을 때 위력이 약해진다."
balm_mushroom:
  names:
    jp_kana: かおるキノコ
    jp_kanji: かおるキノコ
    en: BalmMushroom
    fr: Champi Suave
    it: Profumfungo
    de: Duftpilz
    es: Seta Aroma
    ko: 향기버섯
  descriptions:
    jp_kana: "あたりいったいに　いい　かおりが\nひろがる　めずらしい　キノコ。\nマニアが　たかく　かってくれる。"
    jp_kanji: "あたりいったいに　いい　香りが\nひろがる　珍しい　キノコ。\nマニアが　高く　買ってくれる。"
    en: "A rare mushroom which gives off a nice\nfragrance.\nA maniac will buy it for a high price."
    fr: "Champignon rare qui répand un\nagréable parfum autour de lui.\nLes amateurs en donnent un bon prix."
    it: "Fungo raro che emana un profumo\ngradevolissimo. Si può vendere a un\nprezzo piuttosto alto agli intenditori."
    de: "Ein seltener Pilz, der ein angenehmes\nAroma verbreitet. Kenner geben ihr\nletztes Hemd dafür."
    es: "Extraña seta que desprende un\nagradable aroma. Muy apreciada\npor los gourmets."
    ko: "주변 일대에 좋은 향기가\n퍼지는 희귀한 버섯.\n마니아가 비싼 값에 산다."
basement_key:goldenrod_tunnel:
  names:
    jp_kana: ちかのかぎ
    jp_kanji: ちかのかぎ
    en: Basement Key
    fr: Clé Sous-Sol
    it: Chiave Sott.
    de: Kelleröffner
    es: Ll. Sótano
    ko: 지하의열쇠
  descriptions:
    jp_kana: "コガネちかどうに　ある　とびらを\nあける　カギ。"
    jp_kanji: "コガネ地下道に　ある　扉を\n空ける　カギ。"
    en: "A key that opens a door in the\nGoldenrod Tunnel."
    fr: "Une clé qui permet d’ouvrir la porte\nau fond du Doublon-Tunnel."
    it: "Chiave che permette di aprire la porta\nall’interno del Fiortunnel."
    de: "Ein Schlüssel, der eine Tür\nin der Dukatia-Passage\nvon Dukatia City öffnet."
    es: "Llave que abre la puerta que hay\nen el Túnel Trigal."
    ko: "금빛지하도에 있는 문을\n여는 열쇠."
belue_berry:
  names:
    jp_kana: ベリブのみ
    jp_kanji: ベリブのみ
    en: Belue Berry
    fr: Baie Myrte
    it: Baccartillo
    de: Myrtilbeere
    es: Baya Andano
    ko: 루베열매
  descriptions:
    jp_kana: "イッシュちほうでは　とても\nめずらしい　きのみ。\nマニアが　たかく　かってくれる。"
    jp_kanji: "イッシュ地方では　とても\n珍しい　きのみ。\nマニアが　高く　買ってくれる。"
    en: "A Berry which is very rare in the\nUnova region.\nA maniac will buy it for a high price."
    fr: "Baie très rare à Unys.\nLes amateurs en donnent un bon prix."
    it: "Bacca molto rara a Unima.\nSi può vendere a un prezzo piuttosto\nalto agli intenditori."
    de: "Eine Beere, die nur äußerst selten\nin der Einall-Region zu finden ist.\nKenner geben ihr letztes Hemd dafür."
    es: "Una Baya muy rara en la región\nde Teselia. Muy apreciada\npor los gourmets."
    ko: "하나지방에서는 매우\n희귀한 나무열매.\n마니아가 비싼 값에 산다."
berry_juice:
  names:
    jp_kana: きのみジュース
    jp_kanji: きのみジュース
    en: Berry Juice
    fr: Jus de Baie
    it: Succodibacca
    de: Beerensaft
    es: Zumo de Baya
    ko: 나무열매쥬스
  descriptions:
    jp_kana: "きのみ　１００％の　ジュース。\nポケモン　１ひきの　ＨＰを\n２０だけ　かいふくする。"
    jp_kanji: "きのみ　１００％の　ジュース。\nポケモン　１匹の　ＨＰを\n２０だけ　回復する。"
    en: "A 100% pure juice made of Berries.\nIt restores the HP of one Pokémon by\njust 20 points."
    fr: "Une boisson 100% pur jus de Baies.\nRestaure 20 PV à un Pokémon."
    it: "Bevanda a base di puro succo di Bacche.\nRestituisce 20 PS ad un Pokémon."
    de: "100 %iger Fruchtsaft, aus Beeren\ngekeltert. Er stellt 20 KP eines\nPokémon wieder her."
    es: "Zumo de Bayas 100% natural que\nrestaura 20 PS de un Pokémon."
    ko: "나무열매 100% 쥬스.\n포켓몬 1마리의 HP를\n20만큼 회복한다."
berry_pots:
  names:
    jp_kana: きのみプランター
    jp_kanji: きのみプランター
    en: Berry Pots
    fr: Plante-Baies
    it: Piantabacche
    de: Pflanzset
    es: Plantabayas
    ko: 나무열매플랜터
  descriptions:
    jp_kana: "いつでも　てがるに　きのみを\nそだてられる　けいたいしきの\nさいばい　ようき。"
    jp_kanji: "いつでも　手軽に　きのみを\n育てられる　携帯式の\n栽培容器。"
    en: "Handy containers for cultivating\nBerries wherever you go."
    fr: "Un accessoire portatif qui permet de\ncultiver des Baies en tout lieu et à\ntout moment."
    it: "Accessorio tascabile che permette\ndi coltivare Bacche in qualunque\nluogo e momento."
    de: "Ein tragbares Utensil, das die Aufzucht\nvon Pflanzen aus Beeren ermöglicht,\nwo immer du auch gerade bist."
    es: "Dispositivo portátil de cultivo que\npermite plantar Bayas en cualquier\nmomento de forma sencilla."
    ko: "항상 손쉽게 나무열매를\n키울 수 있는 휴대형\n재배 용기."
big_mushroom:
  names:
    jp_kana: おおきなキノコ
    jp_kanji: おおきなキノコ
    en: Big Mushroom
    fr: Gros Champi
    it: Grande Fungo
    de: Riesenpilz
    es: Seta Grande
    ko: 큰버섯
  descriptions:
    jp_kana: "おおきな　めずらしい　キノコ。\nいちぶの　マニアの　あいだでは\nとても　にんきが　たかい。"
    jp_kanji: "おおきな　珍しい　キノコ。\n一部の　マニアの　あいだでは\nとても　人気が　高い。"
    en: "A large and rare mushroom.\nIt is sought after by collectors."
    fr: "Un grand champignon plutôt rare.\nIl est très populaire parmi\ncertains fans dévoués."
    it: "Fungo grande e raro. È molto\napprezzato da alcuni intenditori."
    de: "Ein großer und seltener Pilz. Liebhaber\ndieses Pilzes freuen sich ein Loch in\nden Bauch, wenn sie einen finden."
    es: "Una gran seta que es poco común\ny muy popular entre determinados\ngrupos de gourmets."
    ko: "크고 진귀한 버섯.\n일부 마니아 사이에서는\n매우 인기가 높다."
big_nugget:
  names:
    jp_kana: でかいきんのたま
    jp_kanji: でかいきんのたま
    en: Big Nugget
    fr: Maxi Pépite
    it: Granpepita
    de: Riesennugget
    es: Maxipepita
    ko: 큰금구슬
  descriptions:
    jp_kana: "キラキラと　きんいろに　ひかる\nじゅんきんせいの　おおきな　たま。\nマニアが　たかく　かってくれる。"
    jp_kanji: "キラキラと　金色に　光る\n純金製の　おおきな　玉。\nマニアが　高く　買ってくれる。"
    en: "A big nugget of pure gold that gives off\na lustrous gleam.\nA maniac will buy it for a high price."
    fr: "Grosse pépite d’or pur qui brille\nmagnifiquement.\nLes amateurs en donnent un bon prix."
    it: "Grossa pepita d’oro puro dal luccichio\nsfavillante. Si può vendere a un prezzo\npiuttosto alto agli intenditori."
    de: "Ein großes Nugget aus purem Gold, das\neinen schimmernden Glanz besitzt.\nSammler zahlen einen hohen Preis dafür."
    es: "Pepita grande de oro puro que\ndesprende un brillo espectacular.\nMuy valorada por los coleccionistas."
    ko: "금색으로 반짝반짝 빛나는\n순금으로 만들어진 큰 구슬.\n마니아가 비싼 값에 산다."
big_pearl:
  names:
    jp_kana: おおきなしんじゅ
    jp_kanji: おおきなしんじゅ
    en: Big Pearl
    fr: Grande Perle
    it: Grande Perla
    de: Riesenperle
    es: Perla Grande
    ko: 큰진주
  descriptions:
    jp_kana: "きれいな　ぎんいろに　ひかる\nかなり　おおつぶの　しんじゅ。\nショップで　たかく　うれる。"
    jp_kanji: "きれいな　銀色に　光る\nかなり　大粒の　真珠。\nショップで　高く　売れる。"
    en: "A quite-large pearl that sparkles in a\npretty silver color. It can be sold at\na high price to shops."
    fr: "Une grande perle qui brille d’une jolie\ncouleur argent. Peut être vendue à\nbon prix aux magasins."
    it: "Perla piuttosto grande dai graziosi\nriflessi argentei. Si può vendere\na un prezzo piuttosto alto nei negozi."
    de: "Eine relativ große Perle, die in\nschönem Silber funkelt. Sie ist\nvon hohem Wert."
    es: "Brillante perla plateada de gran\ntamaño que puede venderse\na buen precio en las tiendas."
    ko: "예쁜 은색으로 빛나는\n상당히 큰 낱알의 진주.\n상점에서 비싸게 팔린다."
big_root:
  names:
    jp_kana: おおきなねっこ
    jp_kanji: おおきなねっこ
    en: Big Root
    fr: Grosseracine
    it: Granradice
    de: Großwurzel
    es: Raíz Grande
    ko: 큰뿌리
  descriptions:
    jp_kana: "もたせると　ＨＰを　すいとる　わざで\nいつもより　おおく　じぶんの　ＨＰを\nかいふくできる。"
    jp_kanji: "持たせると　ＨＰを　吸いとる　技で\nいつもより　おおく　自分の　ＨＰを\n回復できる。"
    en: "A Pokémon held item that boosts the\npower of HP-stealing moves to let the\nholder recover more HP."
    fr: "Objet à tenir augmentant la puissance\ndes attaques volant des PV."
    it: "Strumento da far tenere a un Pokémon.\nPotenzia le mosse ruba-PS facendo\nrecuperare più PS a chi lo usa."
    de: "Ein Item zum Tragen. Verstärkt\nKP-stehlende Attacken."
    es: "El Pokémon que la lleva recupera\nmás PS al usar movimientos que\ndrenan al objetivo."
    ko: "지니게 하면 HP 흡수 기술을 썼을 때\n여느 때보다 많은 HP를\n자신이 회복할 수 있다."
bike:
  names:
    jp_kana: じてんしゃ
    jp_kanji: じてんしゃ
    en: Bicycle
    fr: Bicyclette
    it: Bicicletta
    de: Fahrrad
    es: Bici
    ko: 자전거
  descriptions:
    jp_kana: "ランニングシューズ　よりも\nはやく　はしることが　できる\nおりたたみしきの　じてんしゃ。"
    jp_kanji: "ランニングシューズ　よりも\n速く　走ることが　できる\n折りたたみ式の　じてんしゃ。"
    en: "A folding Bicycle that enables much\nfaster movement than the Running\nShoes."
    fr: "Une Bicyclette pliable permettant de se\ndéplacer plus rapidement qu’avec les\nChaussures de Sport."
    it: "Bici pieghevole, che permette di\nspostarsi più velocemente che\ncon le Scarpe da Corsa."
    de: "Ein Klapprad, mit dem man schneller\nals mit Turbotretern ist."
    es: "Bicicleta plegable con la que se va más\nrápido que con las Deportivas."
    ko: "러닝슈즈보다도\n빨리 달릴 수 있는\n접이식 자전거다."
binding_band:
  names:
    jp_kana: しめつけバンド
    jp_kanji: しめつけバンド
    en: Binding Band
    fr: B. Étreinte
    it: Legafascia
    de: Klammerband
    es: Ban. Atadura
    ko: 조임밴드
  descriptions:
    jp_kana: "しめつけるわざを　ほじょする　バンド。\nもたせると　しめつけるわざの\nいりょくが　つよく　なる。"
    jp_kanji: "締めつける技を　補助する　バンド。\n持たせると　締めつける技の\n威力が　強くなる。"
    en: "A band that increases the power of\nbinding moves when held."
    fr: "Objet à tenir augmentant la puissance\ndes attaques immobilisantes telles\nque Ligotage ou Étreinte."
    it: "Strumento da far tenere a un Pokémon\nche aumenta la potenza di mosse come\nAvvolgibotta e Legatutto."
    de: "Ein Band, das die Stärke aller\nKlammerattacken des Trägers\nerhöht."
    es: "Banda que potencia los movimientos\nque estrujan al rival."
    ko: "조이기 기술을 보조하는 밴드.\n지니게 하면 조이기 기술의\n위력이 강해진다."
black_apricorn:
  names:
    jp_kana: くろぼんぐり
    jp_kanji: くろぼんぐり
    en: Blk Apricorn
    fr: Noigrume Noi
    it: Ghic. Nera
    de: Aprikoko Swz
    es: Bonguri Neg
    ko: 검은규토리
  descriptions:
    jp_kana: "くろい　ぼんぐり。\nなんともいえない　においがする。"
    jp_kanji: "くろい　ぼんぐり。\nなんともいえない　においがする。"
    en: "A black Apricorn\nIt has an indescribable scent."
    fr: "Un Noigrume de couleur noire.\nIl dégage un arôme indéfinissable."
    it: "Una Ghicocca di colore nero.\nEmana un odore indefinibile."
    de: "Eine schwarze Aprikoko. Sie riecht\nirgendwie unbeschreiblich."
    es: "Bonguri de color negro y aroma\nindescriptible."
    ko: "검은색의 규토리.\n말로는 표현할 수 없는 향기가 난다."
black_belt:
  names:
    jp_kana: くろおび
    jp_kanji: くろおび
    en: Black Belt
    fr: Ceint.Noire
    it: Cinturanera
    de: Schwarzgurt
    es: Cint. Negro
    ko: 검은띠
  descriptions:
    jp_kana: "きが　ひきしまる　おび。\nもたせると　かくとうタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "気が　ひきしまる　帯。\n持たせると　かくとうタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon.\nIt is a belt that boosts determination\nand Fighting-type moves."
    fr: "Objet à tenir. Ceinture qui augmente\nla détermination et la puissance des\ncapacités de type Combat."
    it: "Strumento da far tenere a un Pokémon.\nCintura che potenzia la determinazione\ne le mosse di tipo Lotta."
    de: "Ein Item zum Tragen. Der Gürtel\nverstärkt die Entschlossenheit\nund Attacken vom Typ Kampf."
    es: "Debe llevarlo un Pokémon.\nAumenta la decisión y fortalece\nlos movimientos de tipo Lucha."
    ko: "마음을 긴장시키는 띠.\n지니게 하면 격투타입\n기술의 위력이 올라간다."
black_flute:
  names:
    jp_kana: くろいビードロ
    jp_kanji: くろいビードロ
    en: Black Flute
    fr: Flûte Noire
    it: Flauto Nero
    de: Schw. Flöte
    es: Flauta Negra
    ko: 검정비드로
  descriptions:
    jp_kana: "くろい　ガラスで　できている\nおもちゃの　ふえ。\nマニアが　たかく　かってくれる。"
    jp_kanji: "黒い　ガラスで　できている\nおもちゃの　笛。\nマニアが　高く　買ってくれる。"
    en: "A toy flute made from black glass.\nA maniac will buy it for a high price."
    fr: "Jouet en forme de flûte en verre\nnoir. Les amateurs en donnent\nun bon prix."
    it: "Flauto giocattolo fatto di vetro nero.\nSi può vendere a un prezzo piuttosto\nalto agli intenditori."
    de: "Eine Spielzeugflöte aus schwarzem Glas.\nSammler geben ihr letztes Hemd dafür\nher."
    es: "Una flauta de juguete hecha de\ncristal negro.\nMuy valorada por los coleccionistas."
    ko: "검은 유리로 만들어진\n장난감 피리.\n마니아가 비싼 값에 산다."
black_glasses:
  names:
    jp_kana: くろいメガネ
    jp_kanji: くろいメガネ
    en: BlackGlasses
    fr: Lunet.Noires
    it: Occhialineri
    de: Schattenglas
    es: Gafas de Sol
    ko: 검은안경
  descriptions:
    jp_kana: "あやしく　みえる　メガネ。\nもたせると　あくタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "怪しく　みえる　メガネ。\n持たせると　あくタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon.\nIt is a shady-looking pair of glasses\nthat boosts Dark-type moves."
    fr: "Objet à tenir. Paire de lunettes à\nl’aspect louche qui monte la puissance\ndes capacités de type Ténèbres."
    it: "Strumento da far tenere a un Pokémon.\nInquietante paio di occhiali che\npotenzia le mosse di tipo Buio."
    de: "Ein Item zum Tragen. Eine\ndunkle Brille, die Attacken\nvom Typ Unlicht verstärkt."
    es: "Debe llevarlas un Pokémon.\nFortalecen los movimientos de\ntipo Siniestro."
    ko: "괴상하게 보이는 안경.\n지니게 하면 악타입\n기술의 위력이 올라간다."
black_sludge:
  names:
    jp_kana: くろいヘドロ
    jp_kanji: くろいヘドロ
    en: Black Sludge
    fr: Boue Noire
    it: Fangopece
    de: Giftschleim
    es: Lodo Negro
    ko: 검은진흙
  descriptions:
    jp_kana: "もたせると　どくタイプの　ポケモンは\nすこしずつ　ＨＰを　かいふくする。\nそれいがいは　ＨＰが　へってしまう。"
    jp_kanji: "持たせると　どくタイプの　ポケモンは\n少しずつ　ＨＰを　回復する。\nそれ以外は　ＨＰが　減ってしまう。"
    en: "A held item that gradually restores\nthe HP of Poison-type Pokémon.\nIt inflicts damage on all other types."
    fr: "Objet à tenir restaurant peu à peu les\nPV des Pokémon de type Poison. Inflige\ndes dégâts à tous les autres types."
    it: "Strumento da far tenere a un Pokémon:\nridà gradualmente PS ai Pokémon di\ntipo Veleno. Danneggia tutti gli altri."
    de: "Ein Item zum Tragen, das einem\nGift-Pokémon KP zurückgibt, anderen\nPokémon aber Schaden zufügt."
    es: "Restaura gradualmente los PS\nde los Pokémon de tipo Veneno\ny daña a todos los demás."
    ko: "지니게 하면 독타입의 포켓몬은\n조금씩 HP를 회복한다.\n그 이외의 타입은 HP가 줄어 버린다."
blue_apricorn:
  names:
    jp_kana: あおぼんぐり
    jp_kanji: あおぼんぐり
    en: Blu Apricorn
    fr: Noigrume Blu
    it: Ghic. Blu
    de: Aprikoko Blu
    es: Bonguri Azu
    ko: 파란규토리
  descriptions:
    jp_kana: "あおい　ぼんぐり。\nすこし　あおくさい　かおりがする。"
    jp_kanji: "あおい　ぼんぐり。\n少し　あおくさい　かおりがする。"
    en: "A blue Apricorn.\nIt smells a bit like grass."
    fr: "Un Noigrume de couleur bleue.\nIl dégage un arôme un peu aigre."
    it: "Una Ghicocca di colore blu.\nEmana un odore un po’ aspro."
    de: "Eine blaue Aprikoko. Ein frischer\nGeruch geht von ihr aus."
    es: Bonguri de color azul y aroma tierno.
    ko: "파란색의 규토리.\n약간 풋내가 난다."
blue_card:
  names:
    jp_kana: ブルーカード
    jp_kanji: ブルーカード
    en: Blue Card
    fr: Carte Bleue
    it: Carta Blu
    de: Blaue Karte
    es: Tarjeta Azul
    ko: 블루카드
  descriptions:
    jp_kana: "「アオイのあいことば」　ばんぐみの\nポイントを　ためる　カード。"
    jp_kanji: "「アオイのあいことば」　番組の\nポイントを　貯める　カード。"
    en: "A card to save points for the\nBuena’s Password show."
    fr: "Une carte pour accumuler les points de\nl’émission “Le Mot de Passe de Buena”."
    it: "Carta su cui accumulare i punti del\nprogramma “Password Show” di Buena."
    de: "Eine Karte, auf der die Punkte\nfür „Passwort mit Buena“\nfestgehalten werden."
    es: "Tarjeta para conseguir puntos con el\nprograma de radio Las contraseñas\nde Buena."
    ko: "“규화의 암호” 방송의\n포인트를 모으는 카드."
blue_flute:
  names:
    jp_kana: あおいビードロ
    jp_kanji: あおいビードロ
    en: Blue Flute
    fr: Flûte Bleue
    it: Flauto Blu
    de: Blaue Flöte
    es: Flauta Azul
    ko: 파랑비드로
  descriptions:
    jp_kana: "あおい　ガラスで　できている\nおもちゃの　ふえ。\nマニアが　たかく　かってくれる。"
    jp_kanji: "青い　ガラスで　できている\nおもちゃの　笛。\nマニアが　高く　買ってくれる。"
    en: "A toy flute made from blue glass.\nA maniac will buy it for a high price."
    fr: "Jouet en forme de flûte en verre\nbleu. Les amateurs en donnent\nun bon prix."
    it: "Flauto giocattolo fatto di vetro blu.\nSi può vendere a un prezzo piuttosto\nalto agli intenditori."
    de: "Eine Spielzeugflöte aus blauem Glas.\nSammler geben ihr letztes Hemd dafür\nher."
    es: "Una flauta de juguete hecha\nde cristal azul.\nMuy valorada por los coleccionistas."
    ko: "파란 유리로 만들어진\n장난감 피리.\n마니아가 비싼 값에 산다."
blue_orb:
  names:
    jp_kana: あいいろのたま
    jp_kanji: あいいろのたま
    en: Blue Orb
    fr: Orbe Bleu
    it: Sfera Blu
    de: Blaue Kugel
    es: Esfera Azul
    ko: 쪽빛구슬
  descriptions:
    jp_kana: "ホウエンちほうの　でんせつと\nふかい　かかわりが　あると　いわれる\nあおく　かがやく　たま。"
    jp_kanji: "ホウエン地方の　伝説と\n深い　関わりが　あると　いわれる\nあおく　かがやく　たま。"
    en: "A shiny blue orb that is said to have\na legend and has a deep connection with\nthe Hoenn region."
    fr: "Un orbe céruléen dont on dit qu’il a\nun lien très étroit avec les légendes\nde Hoenn."
    it: "Sfera con riflessi blu, che pare\nessere strettamente legata alle\nleggende della regione di Hoenn."
    de: "Eine blau schimmernde Kugel,\nvon der in den Legenden der\nHoenn-Region berichtet wird."
    es: "Esfera añil que, según dicen, guarda\nuna estrecha relación con las leyendas\nde Hoenn."
    ko: "호연지방의 전설과\n깊은 연관이 있다고 전해지는\n파랗게 빛나는 구슬."
blue_scarf:
  names:
    jp_kana: あおいバンダナ
    jp_kanji: あおいバンダナ
    en: Blue Scarf
    fr: Foul. Bleu
    it: Fascia Blu
    de: Blauer Schal
    es: Pañuelo Azul
    ko: 파랑밴드
  descriptions:
    jp_kana: "もたせて　コンテストに　さんかすると\nその　ポケモンは　いつもより\nうつくしく　みられる。"
    jp_kanji: "持たせて　コンテストに　参加すると\nその　ポケモンは　いつもより\nうつくしく　みられる。"
    en: "An item to be held by a Pokémon.\nIt boosts the Beauty aspect of the\nholder in a Contest."
    fr: "Objet à tenir. Augmente la Beauté\nd’un Pokémon dans les Concours."
    it: "Strumento da far tenere a un Pokémon.\nAumenta la “Bellezza” di chi lo tiene\nin una Gara."
    de: "Ein Item zum Tragen. Trainer erhöhen\ndamit in Wettbewerben die „Schönheit“\nihres Pokémon."
    es: "Debe llevarlo un Pokémon.\nAumenta la belleza en los concursos."
    ko: "지니게 하여 콘테스트에 참가하면\n그 포켓몬은 여느 때보다\n아름답게 보인다."
blue_shard:
  names:
    jp_kana: あおいかけら
    jp_kanji: あおいかけら
    en: Blue Shard
    fr: Tesson Bleu
    it: Coccio Blu
    de: Indigostück
    es: Parte Azul
    ko: 파랑조각
  descriptions:
    jp_kana: "あおい　ちいさな　かけら。\nむかしに　つくられた　なにかの\nどうぐの　いちぶ　らしい。"
    jp_kanji: "青い　小さな　かけら。\n昔に　つくられた　なにかの\n道具の　一部らしい。"
    en: "A small blue shard.\nIt appears to be from some sort of\nimplement made long ago."
    fr: "Petit tesson bleu.\nIl semble provenir d’un outil très\nancien."
    it: "Un piccolo coccio blu che con ogni\nprobabilità è un frammento di un antico\nstrumento."
    de: "Eine blaue Scherbe eines antiken\nWerkzeugs, das vor langer Zeit\nangefertigt wurde."
    es: "Un pequeño fragmento azul.\nParece formar parte de algún tipo\nde herramienta antigua."
    ko: "파란 작은 조각.\n옛날에 만들어진 어떤\n도구의 일부인 듯하다."
bluk_berry:
  names:
    jp_kana: ブリーのみ
    jp_kanji: ブリーのみ
    en: Bluk Berry
    fr: Baie Remu
    it: Baccamora
    de: Morbbeere
    es: Baya Oram
    ko: 블리열매
  descriptions:
    jp_kana: "イッシュちほうでは　とても\nめずらしい　きのみ。\nマニアが　たかく　かってくれる。"
    jp_kanji: "イッシュ地方では　とても\n珍しい　きのみ。\nマニアが　高く　買ってくれる。"
    en: "A Berry which is very rare in the\nUnova region.\nA maniac will buy it for a high price."
    fr: "Baie très rare à Unys.\nLes amateurs en donnent un bon prix."
    it: "Bacca molto rara a Unima.\nSi può vendere a un prezzo piuttosto\nalto agli intenditori."
    de: "Eine Beere, die nur äußerst selten\nin der Einall-Region zu finden ist.\nKenner geben ihr letztes Hemd dafür."
    es: "Una Baya muy rara en la región\nde Teselia. Muy apreciada\npor los gourmets."
    ko: "하나지방에서는 매우\n희귀한 나무열매.\n마니아가 비싼 값에 산다."
bridge_mail_d:
  names:
    jp_kana: ブリッジメールＨ
    jp_kanji: ブリッジメールＨ
    en: BridgeMail D
    fr: Lettre PontY
    it: Mess. Libec.
    de: Brückbrief M
    es: C. Puente F
    ko: 브리지메일M
  descriptions:
    jp_kana: "まっかな　はねばしの　えがらが\nプリントされた　びんせん。\nポケモンに　もたせて　つかう。"
    jp_kanji: "真っ赤な　跳ね橋の　絵柄が\nプリントされた　レターペーパー。\nポケモンに　持たせて　使う。"
    en: "Stationery featuring a print of\na red drawbridge.\nLet a Pokémon hold it for use."
    fr: "Un papier à lettres avec un motif de\npont mobile rouge. Peut être tenu\net livré par un Pokémon."
    it: "Carta da lettera che riporta l’immagine\ndi un ponte mobile di color rosso fuoco.\nUn Pokémon può tenerla e consegnarla."
    de: "Das Briefpapier hat eine knallrote\nZugbrücke als Hintergrund.\nGib es einem Pokémon zum Tragen."
    es: "Carta con la imagen de un puente\nlevadizo de color rojo. Haz que\nla entregue un Pokémon."
    ko: "새빨간 도개교의 무늬가\n프린트된 편지지.\n포켓몬에게 지니게 해서 쓴다."
bridge_mail_m:
  names:
    jp_kana: ブリッジメールＷ
    jp_kanji: ブリッジメールＷ
    en: BridgeMail M
    fr: Lettre PontI
    it: Mess. Merav.
    de: Brückbrief W
    es: C. Puente P
    ko: 브리지메일W
  descriptions:
    jp_kana: "アーチを　えがいた　はしの　えがらが\nプリントされた　びんせん。\nポケモンに　もたせて　つかう。"
    jp_kanji: "アーチを　描いた　橋の　絵柄が\nプリントされた　レターペーパー。\nポケモンに　持たせて　使う。"
    en: "Stationery featuring a print of\nan arched bridge.\nLet a Pokémon hold it for use."
    fr: "Un papier à lettres avec un motif de\npont bâti sur des arches. Peut être\ntenu et livré par un Pokémon."
    it: "Carta da lettera che riporta l’immagine\ndi un ponte ad archi.\nUn Pokémon può tenerla e consegnarla."
    de: "Das Briefpapier hat eine geschwungene\nBrücke als Hintergrundmotiv.\nGib es einem Pokémon zum Tragen."
    es: "Carta con la imagen de un puente\ncon forma de varios arcos. Haz\nque la entregue un Pokémon."
    ko: "아치가 그려진 다리 무늬가\n프린트된 편지지.\n포켓몬에게 지니게 해서 쓴다."
bridge_mail_s:
  names:
    jp_kana: ブリッジメールＳ
    jp_kanji: ブリッジメールＳ
    en: BridgeMail S
    fr: Lettre PontS
    it: Mess. Frec.
    de: Brückbrief H
    es: C. Puente S
    ko: 브리지메일S
  descriptions:
    jp_kana: "そらを　つらぬく　はしの　えがらが\nプリントされた　びんせん。\nポケモンに　もたせて　つかう。"
    jp_kanji: "空を　つらぬく　橋の　絵柄が\nプリントされた　レターペーパー。\nポケモンに　持たせて　使う。"
    en: "Stationery featuring a print of\na sky-piercing bridge.\nLet a Pokémon hold it for use."
    fr: "Un papier à lettres avec un motif de\npont traversant le ciel. Peut être\ntenu et livré par un Pokémon."
    it: "Carta da lettera che riporta l’immagine\ndi un ponte che attraversa il cielo.\nUn Pokémon può tenerla e consegnarla."
    de: "Das Briefpapier hat eine weit in den\nHimmel ragende Brücke als Hintergrund.\nGib es einem Pokémon zum Tragen."
    es: "Carta con la imagen de un puente\nque se alza hacia el cielo. Haz que\nla entregue un Pokémon."
    ko: "하늘을 관통하는 다리의 무늬가\n프린트된 편지지.\n포켓몬에게 지니게 해서 쓴다."
bridge_mail_t:
  names:
    jp_kana: ブリッジメールＣ
    jp_kanji: ブリッジメールＣ
    en: BridgeMail T
    fr: Lettre PontF
    it: Mess. Prop.
    de: Brückbrief Z
    es: C. Puente A
    ko: 브리지메일C
  descriptions:
    jp_kana: "こうてつの　つりばしの　えがらが\nプリントされた　びんせん。\nポケモンに　もたせて　つかう。"
    jp_kanji: "鋼鉄の　つり橋の　絵柄が\nプリントされた　レターペーパー。\nポケモンに　持たせて　使う。"
    en: "Stationery featuring a print of\na steel suspension bridge.\nLet a Pokémon hold it for use."
    fr: "Un papier à lettres avec un motif de\npont suspendu en acier. Peut être\ntenu et livré par un Pokémon."
    it: "Carta da lettera che riporta l’immagine\ndi un ponte sospeso in acciaio.\nUn Pokémon può tenerla e consegnarla."
    de: "Das Briefpapier hat eine stählerne\nHängebrücke als Hintergrund.\nGib es einem Pokémon zum Tragen."
    es: "Carta con la imagen de un puente\ncolgante de acero. Haz que la\nentregue un Pokémon."
    ko: "강철의 현수교 무늬가\n프린트된 편지지.\n포켓몬에게 지니게 해서 쓴다."
bridge_mail_v:
  names:
    jp_kana: ブリッジメールＶ
    jp_kanji: ブリッジメールＶ
    en: BridgeMail V
    fr: Lettre PontH
    it: Mess. Vill.
    de: Brückbrief D
    es: C. Puente V
    ko: 브리지메일V
  descriptions:
    jp_kana: "レンガづくりの　はしの　えがらが\nプリントされた　びんせん。\nポケモンに　もたせて　つかう。"
    jp_kanji: "レンガ造りの　橋の　絵柄が\nプリントされた　レターペーパー。\nポケモンに　持たせて　使う。"
    en: "Stationery featuring a print of\na brick bridge.\nLet a Pokémon hold it for use."
    fr: "Un papier à lettres avec un motif\nde pont en briques. Peut être tenu\net livré par un Pokémon."
    it: "Carta da lettera che riporta l’immagine\ndi un ponte fatto di mattoni.\nUn Pokémon può tenerla e consegnarla."
    de: "Das Briefpapier hat eine Brücke\naus Ziegelsteinen als Hintergrund.\nGib es einem Pokémon zum Tragen."
    es: "Carta con la imagen de un puente\nde ladrillos. Haz que la entregue\nun Pokémon."
    ko: "벽돌로 만든 다리 무늬가\n프린트된 편지지.\n포켓몬에게 지니게 해서 쓴다."
bright_powder:
  names:
    jp_kana: ひかりのこな
    jp_kanji: ひかりのこな
    en: BrightPowder
    fr: Poudreclaire
    it: Luminpolvere
    de: Blendpuder
    es: Polvo Brillo
    ko: 반짝가루
  descriptions:
    jp_kana: "キラキラ　ひかるこな。　もたせると\nひかりが　あいてを　まどわして\nわざが　めいちゅう　しにくくなる。"
    jp_kanji: "キラキラ　光る粉。　持たせると\n光が　相手を　惑わして\n技が　命中しにくくなる。"
    en: "An item to be held by a Pokémon.\nIt casts a tricky glare that lowers\nthe opponent’s accuracy."
    fr: "Objet à tenir qui intimide et baisse\nla Précision de l’ennemi."
    it: "Strumento da far tenere a un Pokémon.\nEmette un bagliore insidioso che riduce\nla precisione dell’avversario."
    de: "Ein Item, das einem Pokémon zum\nTragen gegeben werden kann. Es\nsenkt die Genauigkeit des Gegners."
    es: "Lanza un destello que baja la Precisión\ndel enemigo. Debe llevarlo un Pokémon."
    ko: "반짝반짝 빛나는 가루. 지니게 하면\n빛이 상대를 혼란시켜\n기술이 명중되기 어려워진다."
bug_gem:
  names:
    jp_kana: むしのジュエル
    jp_kanji: むしのジュエル
    en: Bug Gem
    fr: Joyau Insect
    it: Bijoucoleot.
    de: Käferjuwel
    es: G. Bicho
    ko: 벌레주얼
  descriptions:
    jp_kana: "むしの　タイプの　ジュエル。\nもたせると　いちどだけ　むしの\nわざの　いりょくが　つよまる。"
    jp_kanji: "むしの　タイプの　ジュエル。\n持たせると　１度だけ　むしの\n技の　威力が　強まる。"
    en: "A gem with an insect-like essence.\nWhen held, it strengthens the power of\na Bug-type move only once."
    fr: "Objet à tenir. Joyau augmentant\nune fois la puissance des capacités\nde type Insecte."
    it: "Strumento da far tenere a un Pokémon.\nGioiello che potenzia una sola volta\nle mosse di tipo Coleottero."
    de: "Ein Juwel vom Typ Käfer. Es\nerhöht einmalig die Stärke\neiner Attacke vom Typ Käfer."
    es: "Joya de un solo uso que potencia\nlos movimientos de tipo Bicho.\nDebe llevarla un Pokémon."
    ko: "벌레타입의 주얼.\n지니게 하면 한 번만 벌레\n기술의 위력이 강해진다."
burn_drive:
  names:
    jp_kana: ブレイズカセット
    jp_kanji: ブレイズカセット
    en: Burn Drive
    fr: Module Pyro
    it: Piromodulo
    de: Flammenmodul
    es: PiroROM
    ko: 블레이즈카세트
  descriptions:
    jp_kana: "ゲノセクトに　もたせると\nテクノバスターという　わざが\nほのおタイプになる　カセット。"
    jp_kanji: "ゲノセクトに　持たせると\nテクノバスターという　技が\nほのおタイプになる　カセット。"
    en: "A cassette to be held by Genesect.\nIt changes Techno Blast to a\nFire-type move."
    fr: "Tenu par Genesect, ce module\nchange la capacité TechnoBuster\nen une capacité de type Feu."
    it: "Modulo da far tenere a Genesect.\nTrasforma Tecnobotto in una mossa\ndi tipo Fuoco."
    de: "Gibt man es Genesect zum Tragen,\nwandelt es den Typ der Attacke\nTechblaster in Feuer um."
    es: "Cartucho que convierte\nTecno Shock de Genesect\nen un movimiento de tipo Fuego."
    ko: "게노세크트에게 지니게 하면\n테크노버스터라는 기술이\n불꽃타입으로 바뀌는 카세트."
burn_heal:
  names:
    jp_kana: やけどなおし
    jp_kanji: やけどなおし
    en: Burn Heal
    fr: Anti-Brûle
    it: Antiscottat.
    de: Feuerheiler
    es: Antiquemar
    ko: 화상치료제
  descriptions:
    jp_kana: "スプレーしきの　くすり。\nポケモン　１ひきの　やけどの\nじょうたいを　かいふくする。"
    jp_kanji: "スプレー式の　薬。\nポケモン　１匹の　やけどの\n状態を　回復する。"
    en: "A spray-type medicine.\nIt heals a single Pokémon that is\nsuffering from a burn."
    fr: "Un médicament sous forme de spray.\nSoigne les brûlures d’un Pokémon."
    it: "Rimedio spray.\nCura un Pokémon dalla scottatura."
    de: "Ein Spray, das Verbrennungen\neines Pokémon heilt."
    es: "Medicina en espray que cura\nlas quemaduras a un Pokémon."
    ko: "스프레이식의 약.\n포켓몬 1마리의\n화상 상태를 회복한다."
calcium:
  names:
    jp_kana: リゾチウム
    jp_kanji: リゾチウム
    en: Calcium
    fr: Calcium
    it: Calcio
    de: Kalzium
    es: Calcio
    ko: 리보플라빈
  descriptions:
    jp_kana: "ポケモンの　えいようドリンク。\nポケモン　１ひきの　とくこうの\nきそポイントを　あげる。"
    jp_kanji: "ポケモンの　栄養ドリンク。\nポケモン　１匹の　特攻の\n基礎ポイントを　あげる。"
    en: "A nutritious drink for Pokémon.\nIt raises the base Sp. Atk (Special\nAttack) stat of a single Pokémon."
    fr: "Une boisson très nutritive qui\nmonte l’Attaque Spéciale de\nbase d’un Pokémon."
    it: "Bevanda nutriente per Pokémon.\nAumenta l’Attacco Speciale di base."
    de: "Ein gehaltvolles Getränk, das den\nSpezial-Angriff eines Pokémon\ndauerhaft erhöht."
    es: "Nutritiva bebida que aumenta el Ataque\nEspecial de base de un Pokémon."
    ko: "포켓몬의 영양 드링크.\n포켓몬 1마리의 특수공격\n기초 포인트를 올린다."
carbos:
  names:
    jp_kana: インドメタシン
    jp_kanji: インドメタシン
    en: Carbos
    fr: Carbone
    it: Carburante
    de: Carbon
    es: Carburante
    ko: 알칼로이드
  descriptions:
    jp_kana: "ポケモンの　えいようドリンク。\nポケモン　１ひきの　すばやさの\nきそポイントを　あげる。"
    jp_kanji: "ポケモンの　栄養ドリンク。\nポケモン　１匹の　素早さの\n基礎ポイントを　あげる。"
    en: "A nutritious drink for Pokémon.\nIt raises the base Speed stat of a\nsingle Pokémon."
    fr: "Une boisson très nutritive qui monte\nla Vitesse de base d’un Pokémon."
    it: "Bevanda nutriente per Pokémon.\nAumenta la Velocità di base."
    de: "Ein gehaltvolles Getränk, das den\nInitiative-Wert eines Pokémon\ndauerhaft erhöht."
    es: "Nutritiva bebida que aumenta la\nVelocidad de base de un Pokémon."
    ko: "포켓몬의 영양 드링크.\n포켓몬 1마리의 스피드\n기초 포인트를 올린다."
card_key:goldenrod_radio_tower:
  names:
    jp_kana: カードキー
    jp_kanji: カードキー
    en: Card Key
    fr: Carte Magn.
    it: Apriporta
    de: Türöffner
    es: Ll.Magnética
    ko: 카드키
  descriptions:
    jp_kana: "ラジオきょくの　シャッターを　あける\nカードしきの　カギ。"
    jp_kanji: "ラジオ局の　シャッターを　開ける\nカード式の　カギ。"
    en: "A card key that opens a shutter in the\nRadio Tower."
    fr: "Une clé en forme de carte permettant\nd’ouvrir les cloisons de la Tour Radio."
    it: "Chiave a forma di scheda che apre le\nporte automatizzate della Torre Radio."
    de: "Eine Schlüsselkarte, die eine\nTür im Radioturm öffnet."
    es: "Llave con forma de tarjeta que abre\nlas puertas de la Torre Radio."
    ko: "라디오방송국의 셔터를 여는\n카드식 열쇠."
casteliacone:
  names:
    jp_kana: ヒウンアイス
    jp_kanji: ヒウンアイス
    en: Casteliacone
    fr: Glace Volute
    it: Conostropoli
    de: Stratos-Eis
    es: Porcehelado
    ko: 구름아이스
  descriptions:
    jp_kana: "ヒウンシティの　めいぶつアイス。\nポケモン　１ひきの　じょうたいの\nいじょうを　すべて　かいふくする。"
    jp_kanji: "ヒウンシティの　名物アイス。\nポケモン　１匹の　状態の\n異常を　すべて　回復する。"
    en: "Castelia City’s specialty, soft-serve\nice cream. It heals all the status\nproblems of a single Pokémon."
    fr: "Spécialité de Volucité. Elle\nsoigne tous les problèmes\nde statut d’un Pokémon."
    it: "Il famoso gelato di Austropoli. Cura\ntutti i problemi di stato di un Pokémon."
    de: "Dieses Eis ist eine Spezialität\naus Stratos City. Es behebt alle\nStatusprobleme eines Pokémon."
    es: "Especialidad de Ciudad Porcelana.\nCura los problemas de estado de\nun Pokémon."
    ko: "구름시티의 명물 아이스.\n포켓몬 1마리의 상태 이상을\n모두 회복한다."
cell_battery:
  names:
    jp_kana: じゅうでんち
    jp_kanji: じゅうでんち
    en: Cell Battery
    fr: Pile
    it: Ricaripila
    de: Akku
    es: Pila
    ko: 충전지
  descriptions:
    jp_kana: "つかいすての　じゅうでんち。\nもたせて　でんきの　わざを　うけると\nこうげきが　あがる。"
    jp_kanji: "使い捨ての　じゅうでんち。\n持たせて　でんきの　技を　受けると\n攻撃が　あがる。"
    en: "A consumable battery. If the\nholder is hit by an Electric-type\nmove, its Attack will rise."
    fr: "Pile jetable. Tenue, elle augmente\nl’Attaque lorsque le Pokémon subit\nune attaque de type Électrik."
    it: "Pila monouso. Se il Pokémon che la\ntiene subisce un attacco di tipo\nElettro, il suo Attacco aumenta."
    de: "Ein einmalig aufladbarer Akku.\nErhöht den Angriff des Trägers, wenn\nihn eine Elektro-Attacke trifft."
    es: "Batería de usar y tirar que sube\nel Ataque de quien la lleva cuando\nrecibe un golpe de tipo Eléctrico."
    ko: "단 한 번 쓰면 없어지는 충전지.\n지니게 하고 전기 기술을 받으면\n공격이 올라간다."
charcoal:
  names:
    jp_kana: もくたん
    jp_kanji: もくたん
    en: Charcoal
    fr: Charbon
    it: Carbonella
    de: Holzkohle
    es: Carbón
    ko: 목탄
  descriptions:
    jp_kana: "ものを　もやす　ねんりょう。\nもたせると　ほのおタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "ものを　燃やす　燃料。\n持たせると　ほのおタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon.\nIt is a combustible fuel that boosts\nthe power of Fire-type moves."
    fr: "Objet à tenir. Combustible montant la\npuissance des capacités de type Feu."
    it: "Strumento da far tenere a un Pokémon.\nSostanza combustibile che potenzia\nle mosse di tipo Fuoco."
    de: "Ein Item zum Tragen. Ein Brennstoff,\nder Attacken vom Typ Feuer verstärkt."
    es: "Actúa como combustible y potencia\nlos movimientos de tipo Fuego.\nDebe llevarlo un Pokémon."
    ko: "물건을 태우는 연료.\n지니게 하면 불꽃타입\n기술의 위력이 올라간다."
charti_berry:
  names:
    jp_kana: ヨロギのみ
    jp_kanji: ヨロギのみ
    en: Charti Berry
    fr: Baie Charti
    it: Baccaciofo
    de: Chiaribeere
    es: Baya Alcho
    ko: 루미열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　いわ　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　いわ技を\n受けたとき　威力が　弱まる。"
    en: "Weakens a supereffective Rock-type\nattack against the holding Pokémon."
    fr: "Tenue, cette Baie affaiblit une attaque\nennemie super efficace de type Roche."
    it: "Se tenuta da un Pokémon, indebolisce\nl’attacco superefficace di tipo Roccia\ndel nemico."
    de: "Als getragenes Item schwächt diese\nBeere besonders effektive Attacken\ndes Angreifers vom Typ Gestein."
    es: "Si la lleva un Pokémon, debilita un\nataque supereficaz de tipo Roca\nde un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 뛰어난 바위 기술을\n당했을 때 위력이 약해진다."
cheri_berry:
  names:
    jp_kana: クラボのみ
    jp_kanji: クラボのみ
    en: Cheri Berry
    fr: Baie Ceriz
    it: Baccaliegia
    de: Amrenabeere
    es: Baya Zreza
    ko: 버치열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nまひを　かいふくする。"
    jp_kanji: "ポケモンに　持たせると\nまひを　回復する。"
    en: "If held by a Pokémon,\nit recovers from paralysis."
    fr: "Baie qui soigne la paralysie lorsqu’elle\nest tenue par un Pokémon."
    it: "Se tenuta da un Pokémon, lo cura\ndalla paralisi."
    de: "Gibst du die Beere einem Pokémon zum\nTragen, heilt diese es von Paralyse."
    es: "Los Pokémon pueden llevarla o usarla\npara recuperarse de la parálisis."
    ko: "포켓몬에게 지니게 하면\n마비를 회복한다."
cherish_ball:
  names:
    jp_kana: プレシャスボール
    jp_kanji: プレシャスボール
    en: Cherish Ball
    fr: Mémoire Ball
    it: Pregio Ball
    de: Jubelball
    es: Gloria Ball
    ko: 프레셔스볼
  descriptions:
    jp_kana: "なにかの　きねんの　しなとして\nとくべつに　つくられた\nかなり　めずらしい　ボール。"
    jp_kanji: "なにかの　記念の　品として\n特別に　つくられた\nかなり　珍しい　ボール。"
    en: "A quite rare Poké Ball that has been\nspecially crafted to commemorate\nan occasion of some sort."
    fr: "Une Poké Ball plutôt rare qui fut créée\npour une occasion spéciale."
    it: "Poké Ball molto esclusiva creata per\ncommemorare un evento speciale."
    de: "Ein seltener Ball, der als\nReminiszenz an irgendein\nEreignis hergestellt wurde."
    es: "Es una Poké Ball bastante singular\nque se creó para conmemorar\nalguna ocasión especial."
    ko: "무언가의 기념품으로\n특별히 만들어진\n상당히 진귀한 볼."
chesto_berry:
  names:
    jp_kana: カゴのみ
    jp_kanji: カゴのみ
    en: Chesto Berry
    fr: Baie Maron
    it: Baccastagna
    de: Maronbeere
    es: Baya Atania
    ko: 유루열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nねむりを　かいふくする。"
    jp_kanji: "ポケモンに　持たせると\n眠りを　回復する。"
    en: "If held by a Pokémon,\nit recovers from sleep."
    fr: "Baie qui soigne le sommeil lorsqu’elle\nest tenue par un Pokémon."
    it: "Se tenuta da un Pokémon, lo risveglia\ndal sonno."
    de: "Gibst du die Beere einem Pokémon\nzum Tragen, erwacht es dadurch\naus dem Schlaf."
    es: "Los Pokémon pueden llevarla o usarla\npara despertar del sueño."
    ko: "포켓몬에게 지니게 하면\n잠듦을 회복한다."
chilan_berry:
  names:
    jp_kana: ホズのみ
    jp_kanji: ホズのみ
    en: Chilan Berry
    fr: Baie Zalis
    it: Baccacinlan
    de: Latchibeere
    es: Baya Chilan
    ko: 카리열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nノーマル　わざを　うけたとき\nいりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\nノーマル技を　受けたとき\n威力が　弱まる。"
    en: "Weakens a Normal-type attack against\nthe Pokémon holding this berry."
    fr: "Tenue, cette Baie affaiblit une attaque\nennemie de type Normal."
    it: "Se tenuta da un Pokémon, indebolisce\nl’attacco di tipo Normale del nemico."
    de: "Als getragenes Item schwächt diese\nBeere Attacken des Angreifers vom\nTyp Normal."
    es: "Si la lleva un Pokémon, debilita un\nataque de tipo Normal de un enemigo."
    ko: "포켓몬에게 지니게 하면\n노말 기술을 당했을 때\n위력이 약해진다."
chill_drive:
  names:
    jp_kana: フリーズカセット
    jp_kanji: フリーズカセット
    en: Chill Drive
    fr: Module Cryo
    it: Gelomodulo
    de: Gefriermodul
    es: CrioROM
    ko: 프리즈카세트
  descriptions:
    jp_kana: "ゲノセクトに　もたせると\nテクノバスターという　わざが\nこおりタイプになる　カセット。"
    jp_kanji: "ゲノセクトに　持たせると\nテクノバスターという　技が\nこおりタイプになる　カセット。"
    en: "A cassette to be held by Genesect.\nIt changes Techno Blast to an\nIce-type move."
    fr: "Tenu par Genesect, ce module\nchange la capacité TechnoBuster\nen une capacité de type Glace."
    it: "Modulo da far tenere a Genesect.\nTrasforma Tecnobotto in una mossa\ndi tipo Ghiaccio."
    de: "Gibt man es Genesect zum Tragen,\nwandelt es den Typ der Attacke\nTechblaster in Eis um."
    es: "Cartucho que convierte\nTecno Shock de Genesect\nen un movimiento de tipo Hielo."
    ko: "게노세크트에게 지니게 하면\n테크노버스터라는 기술이\n얼음타입으로 바뀌는 카세트."
choice_band:
  names:
    jp_kana: こだわりハチマキ
    jp_kanji: こだわりハチマキ
    en: Choice Band
    fr: Band. Choix
    it: Bendascelta
    de: Wahlband
    es: Cin. Elegida
    ko: 구애머리띠
  descriptions:
    jp_kana: "ちょっと　こだわった　ハチマキ。\nもたせると　こうげきは　あがるが\nおなじ　わざしか　だせなくなる。"
    jp_kanji: "ちょっと　こだわった　ハチマキ。\n持たせると　攻撃は　あがるが\n同じ　技しか　だせなくなる。"
    en: "An item to be held by a Pokémon.\nThis headband ups Attack, but allows\nthe use of only one of its moves."
    fr: "Objet à tenir. Ce bandeau monte\nl’Attaque, mais ne permet d’utiliser\nqu’une seule capacité par combat."
    it: "Strumento da far tenere a un Pokémon.\nQuesta benda aumenta l’Attacco, ma\npermette l’uso di una sola mossa."
    de: "Ein Item, das ein Pokémon tragen\nkann. Es stärkt den Angriffs-Wert,\naber nur eine Attacke ist einsetzbar."
    es: "Aumenta el Ataque, pero solo permite\nusar un movimiento.\nDebe llevarla un Pokémon."
    ko: "기술을 구애받는 머리띠.\n지니게 하면 공격은 올라가지만\n똑같은 기술밖에 쓰지 못한다."
choice_scarf:
  names:
    jp_kana: こだわりスカーフ
    jp_kanji: こだわりスカーフ
    en: Choice Scarf
    fr: Mouch. Choix
    it: Stolascelta
    de: Wahlschal
    es: Pañ. Elegido
    ko: 구애스카프
  descriptions:
    jp_kana: "ちょっと　こだわった　スカーフ。\nもたせると　すばやさは　あがるが\nおなじ　わざしか　だせなくなる。"
    jp_kanji: "ちょっと　こだわった　スカーフ。\n持たせると　素早さは　あがるが\n同じ　技しか　だせなくなる。"
    en: "An item to be held by a Pokémon.\nThis scarf boosts Speed, but allows\nthe use of only one of its moves."
    fr: "Objet à tenir augmentant la Vitesse,\nmais ne permettant d’utiliser qu’une\nseule capacité par combat."
    it: "Strumento da far tenere a un Pokémon.\nStola che aumenta la Velocità, ma\nconsente l’uso di una sola mossa."
    de: "Ein Item zum Tragen. Der Schal\nerhöht den Initiative-Wert, aber nur\neine Attacke ist einsetzbar."
    es: "Debe llevarlo un Pokémon. Potencia\nla Velocidad, pero solo permite usar\nun movimiento."
    ko: "기술을 구애받는 스카프.\n지니게 하면 스피드는 올라가지만\n같은 기술밖에 쓸 수 없다."
choice_specs:
  names:
    jp_kana: こだわりメガネ
    jp_kanji: こだわりメガネ
    en: Choice Specs
    fr: Lunet. Choix
    it: Lentiscelta
    de: Wahlglas
    es: Gafas Elegid
    ko: 구애안경
  descriptions:
    jp_kana: "ちょっと　こだわった　メガネ。\nもたせると　とくこうは　あがるが\nおなじ　わざしか　だせなくなる。"
    jp_kanji: "ちょっと　こだわった　メガネ。\n持たせると　特攻は　あがるが\n同じ　技しか　だせなくなる。"
    en: "An item to be held by a Pokémon. These\ndistinctive glasses boost Sp. Atk but\nallow the use of only one of its moves."
    fr: "Objet à tenir augmentant l’Attaque\nSpéciale, mais ne permettant d’utiliser\nqu’une seule capacité par combat."
    it: "Strumento da far tenere a un Pokémon.\nQuesti occhiali aumentano l’Att. Sp., ma\npermettono l’uso di una sola mossa."
    de: "Ein Item zum Tragen. Die Brille\nerhöht den Spezial-Angriff, aber\nnur eine Attacke ist einsetzbar."
    es: "Potencian el Ataque Especial, pero solo\npermiten usar un movimiento.\nDebe llevarlas un Pokémon."
    ko: "기술을 구애받는 안경.\n지니게 하면 특수공격이 올라가지만\n같은 기술밖에 쓸 수 없다."
chople_berry:
  names:
    jp_kana: ヨプのみ
    jp_kanji: ヨプのみ
    en: Chople Berry
    fr: Baie Pomroz
    it: Baccarosmel
    de: Rospelbeere
    es: Baya Pomaro
    ko: 로플열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　かくとう　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　かくとう技を\n受けたとき　威力が　弱まる。"
    en: "Weakens a supereffective Fighting-type\nattack against the holding Pokémon."
    fr: "Tenue, cette Baie affaiblit une attaque\nennemie super efficace de type Combat."
    it: "Se tenuta da un Pokémon, indebolisce\nl’attacco superefficace di tipo Lotta\ndel nemico."
    de: "Als getragenes Item schwächt diese\nBeere besonders effektive Attacken\ndes Angreifers vom Typ Kampf."
    es: "Si la lleva un Pokémon, debilita un\nataque supereficaz de tipo Lucha\nde un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 뛰어난 격투 기술을\n당했을 때 위력이 약해진다."
claw_fossil:
  names:
    jp_kana: ツメのカセキ
    jp_kanji: ツメのカセキ
    en: Claw Fossil
    fr: Foss. Griffe
    it: Fossilunghia
    de: Klauenfossil
    es: Fósil Garra
    ko: 발톱화석
  descriptions:
    jp_kana: "おおむかし　うみに　すんでいた\nこだい　ポケモンの　カセキ。\nツメの　いちぶ　らしい。"
    jp_kanji: "大昔　海に　すんでいた\n古代ポケモンの　カセキ。\nツメの　一部らしい。"
    en: "A fossil of an ancient Pokémon that\nlived in the sea. It appears to be\npart of a claw."
    fr: "Fossile d’un ancien Pokémon aquatique.\nOn dirait un morceau de griffe."
    it: "Fossile di un antico Pokémon che\nviveva in mare. Sembra essere\nparte di un artiglio."
    de: "Das Fossil eines uralten Pokémon,\ndas in der Tiefsee lebte. Es sieht\nwie eine Klaue aus."
    es: "Fósil de un Pokémon ancestral que\nvivió en el fondo del mar. Parece\nser parte de una garra."
    ko: "오랜 옛날 바다에 살았던\n고대 포켓몬의 화석.\n발톱의 일부인 듯하다."
cleanse_tag:
  names:
    jp_kana: きよめのおふだ
    jp_kanji: きよめのおふだ
    en: Cleanse Tag
    fr: Rune Purif.
    it: Velopuro
    de: Schutzband
    es: Amuleto
    ko: 순결의부적
  descriptions:
    jp_kana: "いちばん　まえの　ポケモンに\nもたせると　やせいポケモンが\nでて　きにくくなる。"
    jp_kanji: "１番　前の　ポケモンに\n持たせると　野生ポケモンが\nでて　きにくくなる。"
    en: "An item to be held by a Pokémon.\nIt helps keep wild Pokémon away if the\nholder is the first one in the party."
    fr: "Objet à tenir. Aide à repousser les\nPokémon sauvages si le porteur est\nle premier Pokémon de l’équipe."
    it: "Strumento da far tenere a un Pokémon.\nAiuta ad allontanare i Pokémon selvatici\nse chi lo tiene è il primo della squadra."
    de: "Ein Item zum Tragen. Reduziert\nBegegnungen mit wilden Pokémon, wenn\nder Träger an erster Stelle steht."
    es: "Si lo lleva el primer Pokémon del\nequipo, se reduce la probabilidad de\nque se acerquen Pokémon salvajes."
    ko: "맨 앞의 포켓몬에게\n지니게 하면 야생 포켓몬이\n나타날 확률이 낮아진다."
clear_bell:
  names:
    jp_kana: とうめいなスズ
    jp_kanji: とうめいなスズ
    en: Clear Bell
    fr: Glas Transp.
    it: Camp. Chiara
    de: Klarglocke
    es: Camp. Clara
    ko: 크리스탈방울
  descriptions:
    jp_kana: "こころ　やすまる　ねいろが　きける\nとても　ふるめかしい　スズ。"
    jp_kanji: "こころ　やすまる　音色が　きける\nとても　ふるめかしい　スズ。"
    en: "A very old-fashioned bell that makes a\ngentle ringing."
    fr: "Une cloche antique au tintement\napaisant."
    it: "Campana antica. Produce un suono\nche dona pace al cuore."
    de: "Eine altehrwürdige Glocke,\nderen Läuten alle besänftigt,\ndie es hören."
    es: "Campana de aspecto antiguo que emite\nun sonido que calma el espíritu."
    ko: "마음이 편안해지는 음색이 들리는\n아주 고풍스런 방울."
clever_feather:
  names:
    jp_kana: せいしんのハネ
    jp_kanji: せいしんのハネ
    en: Clever Wing
    fr: Aile Mental
    it: Piumintuito
    de: Espritfeder
    es: P. Mente
    ko: 정신력날개
  descriptions:
    jp_kana: "ポケモンに　つかう　どうぐ。\nポケモン　１ひきの　とくぼうの\nきそポイントを　ちょっと　あげる。"
    jp_kanji: "ポケモンに　使う　道具。\nポケモン　１匹の　特防の\n基礎ポイントを　ちょっと　あげる。"
    en: "An item for use on a Pokémon. It\nslightly increases the base Sp. Def\nstat of a single Pokémon."
    fr: "Objet à utiliser sur un Pokémon.\nIl augmente un peu sa\nDéfense Spéciale de base."
    it: "Strumento da usare su un Pokémon.\nNe aumenta di poco la Difesa Speciale\ndi base."
    de: "Schenkt man einem Pokémon dieses\nItem, wird dessen Spezial-Verteidigung\ndauerhaft erhöht."
    es: "Pluma que aumenta un poco\nla Defensa Especial de un Pokémon\nal subir de nivel."
    ko: "포켓몬에게 사용하는 도구.\n포켓몬 1마리의 특수방어\n기초 포인트를 조금 올린다."
coba_berry:
  names:
    jp_kana: バコウのみ
    jp_kanji: バコウのみ
    en: Coba Berry
    fr: Baie Cobaba
    it: Baccababa
    de: Kobabeere
    es: Baya Kouba
    ko: 바코열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　ひこう　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　ひこう技を\n受けたとき　威力が　弱まる。"
    en: "Weakens a supereffective Flying-type\nattack against the holding Pokémon."
    fr: "Tenue, cette Baie affaiblit une attaque\nennemie super efficace de type Vol."
    it: "Se tenuta da un Pokémon, indebolisce\nl’attacco superefficace di tipo Volante\ndel nemico."
    de: "Als getragenes Item schwächt diese\nBeere besonders effektive Attacken\ndes Angreifers vom Typ Flug."
    es: "Si la lleva un Pokémon, debilita un\nataque supereficaz de tipo Volador\nde un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 뛰어난 비행 기술을\n당했을 때 위력이 약해진다."
coin_case:
  names:
    jp_kana: コインケース
    jp_kanji: コインケース
    en: Coin Case
    fr: Boîte Jetons
    it: Salvadanaio
    de: Münzkorb
    es: Monedero
    ko: 동전케이스
  descriptions:
    jp_kana: "ゲームコーナーで　てにいれた\nコインを　５００００まい　まで\nいれることが　できる　ケース。"
    jp_kanji: "ゲームコーナーで　てにいれた\nコインを　５００００枚まで\nいれることが　できる　ケース。"
    en: "A case for holding coins obtained at\nthe Game Corner.\nIt holds up to 50,000 coins."
    fr: "Une boîte pour conserver les Jetons\nobtenus au Casino.\nPeut contenir jusqu’à 50 000 Jetons."
    it: "Contenitore ottenuto al Casinò che può\ncontenere fino a 50.000 Gettoni."
    de: "Im Korb finden bis zu 50 000 Münzen\nder Spielhalle Platz."
    es: "Puedes obtenerlo en el Casino.\nTiene capacidad para 50 000 Fichas."
    ko: "게임코너에서 손에 넣은\n동전을 50000개 까지\n넣을 수 있는 케이스."
colbur_berry:
  names:
    jp_kana: ナモのみ
    jp_kanji: ナモのみ
    en: Colbur Berry
    fr: Baie Lampou
    it: Baccaxan
    de: Burleobeere
    es: Baya Dillo
    ko: 마코열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　あく　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　あく技を\n受けたとき　威力が　弱まる。"
    en: "Weakens a supereffective Dark-type\nattack against the holding Pokémon."
    fr: "Tenue, cette Baie affaiblit une\nattaque ennemie super efficace\nde type Ténèbres."
    it: "Se tenuta da un Pokémon, indebolisce\nl’attacco superefficace di tipo Buio\ndel nemico."
    de: "Als getragenes Item schwächt diese\nBeere besonders effektive Attacken\ndes Angreifers vom Typ Unlicht."
    es: "Si la lleva un Pokémon, debilita un\nataque supereficaz de tipo Siniestro\nde un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 뛰어난 악 기술을\n당했을 때 위력이 약해진다."
colress_machine:
  names:
    jp_kana: アクロママシーン
    jp_kanji: アクロママシーン
    en: Colress MCHN
    fr: Nikodule
    it: Acrocongegno
    de: Achromat
    es: Acromáquina
    ko: 아크로마머신
  descriptions:
    jp_kana: "ポケモンの　のうりょくを　むりやり\nめざめさせる　とくしゅな　そうち。\nだが　しさくひんのため　ふかんぜん。"
    jp_kanji: "ポケモンの　能力を　無理やり\n目覚めさせる　特殊な　装置。\nだが　試作品のため　不完全。"
    en: "A special device that wrings out\nthe potential of Pokémon.\nIt is an imperfect prototype."
    fr: "Un appareil spécial qui permet d’éveiller\nde force la puissance des Pokémon.\nMais il ne s’agit que d’un prototype."
    it: "Prototipo imperfetto di un dispositivo\nspeciale ideato per risvegliare in modo\nforzato le capacità dei Pokémon."
    de: "Eine Vorrichtung, die verborgene Kräfte\nin den Pokémon weckt. Es handelt sich\ndabei um einen unfertigen Prototyp."
    es: "Dispositivo que permite aumentar\nforzadamente las características de los\nPokémon. Es un prototipo imperfecto."
    ko: "포켓몬의 능력을 강제로\n눈뜨게 만드는 특수 장치.\n그러나 시작품이기에 불완전하다."
comet_shard:
  names:
    jp_kana: すいせいのかけら
    jp_kanji: すいせいのかけら
    en: Comet Shard
    fr: Morc. Comète
    it: Pezzo Cometa
    de: Kometstück
    es: Frag. Cometa
    ko: 혜성조각
  descriptions:
    jp_kana: "すいせいが　ちかづいたとき\nちひょうに　おちた　かけら。\nマニアが　たかく　かってくれる。"
    jp_kanji: "すい星が　近づいたとき\n地表に　落ちた　かけら。\nマニアが　高く　買ってくれる。"
    en: "A shard which fell to the ground when\na comet approached.\nA maniac will buy it for a high price."
    fr: "Un fragment de comète, tombé au sol\nquand elle traversait l’atmosphère.\nLes amateurs en donnent un bon prix."
    it: "Scheggia di cometa caduta al suolo.\nSi può vendere a un prezzo piuttosto\nalto agli intenditori."
    de: "Ein Kometensplitter, der aus dem All\nherabgefallen ist. Sammler geben ihr\nletztes Hemd dafür."
    es: "Fragmento de un cometa caído al\nsuelo al atravesar la atmósfera.\nMuy valorado por los coleccionistas."
    ko: "혜성이 가까워졌을 때\n지표면에 떨어진 조각.\n마니아가 비싼 값에 산다."
contest_pass:
  names:
    jp_kana: コンテストパス
    jp_kanji: コンテストパス
    en: Contest Pass
    fr: Passeconcour
    it: Tessera Gare
    de: Wettb.-Karte
    es: Pase Concur.
    ko: 콘테스트패스
  descriptions:
    jp_kana: "もっていれば　ポケモンコンテストに\nさんか　することが　できる。\nきねんリボンが　かかれている。"
    jp_kanji: "持っていれば　ポケモンコンテストに\n参加することが　できる。\n記念リボンが　描かれている。"
    en: "The pass required for entering Pokémon\nContests. It has a drawing of an award\nribbon on it."
    fr: "La carte requise pour participer aux\nConcours Pokémon. Il y a un ruban\ndessiné dessus."
    it: "Tessera necessaria per partecipare\nalle Gare Pokémon. Riporta un disegno\ndi un fiocco."
    de: "Ausweis zur Teilnahme an Pokémon-\nWettbewerben. Die Zeichnung\neines Bandes ist aufgedruckt."
    es: "Es necesario para participar en\nConcursos Pokémon. Tiene una\nCinta de ganador dibujada."
    ko: "지니고 있으면 포켓몬 콘테스트에\n참가할 수 있다.\n기념 리본이 그려져 있다."
cornn_berry:
  names:
    jp_kana: モコシのみ
    jp_kanji: モコシのみ
    en: Cornn Berry
    fr: Baie Siam
    it: Baccavena
    de: Saimbeere
    es: Baya Mais
    ko: 수숙열매
  descriptions:
    jp_kana: "イッシュちほうでは　とても\nめずらしい　きのみ。\nマニアが　たかく　かってくれる。"
    jp_kanji: "イッシュ地方では　とても\n珍しい　きのみ。\nマニアが　高く　買ってくれる。"
    en: "A Berry which is very rare in the\nUnova region.\nA maniac will buy it for a high price."
    fr: "Baie très rare à Unys.\nLes amateurs en donnent un bon prix."
    it: "Bacca molto rara a Unima.\nSi può vendere a un prezzo piuttosto\nalto agli intenditori."
    de: "Eine Beere, die nur äußerst selten\nin der Einall-Region zu finden ist.\nKenner geben ihr letztes Hemd dafür."
    es: "Una Baya muy rara en la región\nde Teselia. Muy apreciada\npor los gourmets."
    ko: "하나지방에서는 매우\n희귀한 나무열매.\n마니아가 비싼 값에 산다."
coupon_1:
  names:
    jp_kana: ひきかえけん１
    jp_kanji: ひきかえけん１
    en: Coupon 1
    fr: Bon 1
    it: Coupon 1
    de: Kupon 1
    es: Cupón 1
    ko: 교환권1
  descriptions:
    jp_kana: "ポケモンウォッチ　ちぢめて\nポケッチを　もらうために　ひつような\nひきかえけん。　３まい　ひつよう。"
    jp_kanji: "ポケモンウォッチ　ちぢめて\nポケッチを　もらうために　必要な\nひきかえけん。　３枚必要。"
    en: "A coupon to be exchanged for a\nPokémon Watch (Pokétch for short).\nThree coupons are needed."
    fr: "Un des trois bons à échanger contre\nune Pokémontre."
    it: "Coupon da scambiare con un PokéKron.\nNe servono tre."
    de: "Einer der drei Kupons, die du\nfür den Pokétch benötigst."
    es: "Uno de los tres cupones que sirve\npara obtener un Poké-reloj."
    ko: "포켓몬워치, 줄여서 포켓치를\n받는 데 필요한 교환권.\n3장이 필요하다."
coupon_2:
  names:
    jp_kana: ひきかえけん２
    jp_kanji: ひきかえけん２
    en: Coupon 2
    fr: Bon 2
    it: Coupon 2
    de: Kupon 2
    es: Cupón 2
    ko: 교환권2
  descriptions:
    jp_kana: "ポケモンウォッチ　ちぢめて\nポケッチを　もらうために　ひつような\nひきかえけん。　３まい　ひつよう。"
    jp_kanji: "ポケモンウォッチ　ちぢめて\nポケッチを　もらうために　必要な\nひきかえけん。　３枚必要。"
    en: "A coupon to be exchanged for a\nPokémon Watch (Pokétch for short).\nThree coupons are needed."
    fr: "Un des trois bons à échanger contre\nune Pokémontre."
    it: "Coupon da scambiare con un PokéKron.\nNe servono tre."
    de: "Einer der drei Kupons, die du\nfür den Pokétch benötigst."
    es: "Uno de los tres cupones que sirve\npara obtener un Poké-reloj."
    ko: "포켓몬워치, 줄여서 포켓치를\n받는 데 필요한 교환권.\n3장이 필요하다."
coupon_3:
  names:
    jp_kana: ひきかえけん３
    jp_kanji: ひきかえけん３
    en: Coupon 3
    fr: Bon 3
    it: Coupon 3
    de: Kupon 3
    es: Cupón 3
    ko: 교환권3
  descriptions:
    jp_kana: "ポケモンウォッチ　ちぢめて\nポケッチを　もらうために　ひつような\nひきかえけん。　３まい　ひつよう。"
    jp_kanji: "ポケモンウォッチ　ちぢめて\nポケッチを　もらうために　必要な\nひきかえけん。　３枚必要。"
    en: "A coupon to be exchanged for a\nPokémon Watch (Pokétch for short).\nThree coupons are needed."
    fr: "Un des trois bons à échanger contre\nune Pokémontre."
    it: "Coupon da scambiare con un PokéKron.\nNe servono tre."
    de: "Einer der drei Kupons, die du\nfür den Pokétch benötigst."
    es: "Uno de los tres cupones que sirve\npara obtener un Poké-reloj."
    ko: "포켓몬워치, 줄여서 포켓치를\n받는 데 필요한 교환권.\n3장이 필요하다."
cover_fossil:
  names:
    jp_kana: ふたのカセキ
    jp_kanji: ふたのカセキ
    en: Cover Fossil
    fr: Foss. Plaque
    it: Fossiltappo
    de: Schildfossil
    es: Fósil Tapa
    ko: 덮개화석
  descriptions:
    jp_kana: "おおむかし　うみに　すんでいた\nこだい　ポケモンの　カセキ。\nせなかの　いちぶ　らしい。"
    jp_kanji: "大昔　海に　すんでいた\n古代ポケモンの　カセキ。\nせなかの　一部らしい。"
    en: "A fossil of an ancient Pokémon that\nlived in the sea in ancient times.\nIt appears to be part of its back."
    fr: "Fossile d’un ancien Pokémon\naquatique. Il semble que ce\nsoit une partie de son dos."
    it: "Fossile di un Pokémon preistorico che\nviveva nel mare. Sembra essere parte\ndel suo dorso."
    de: "Das Fossil eines uralten Pokémon,\ndas in der Tiefsee lebte. Offenbar\nhandelt sich um einen Teil des Rückens."
    es: "Fósil de un Pokémon ancestral que\nvivió en el fondo del mar. Parece ser\nun fragmento de concha marina."
    ko: "오랜 옛날 바다에 살았던\n고대 포켓몬의 화석.\n등의 일부인 듯하다."
custap_berry:
  names:
    jp_kana: イバンのみ
    jp_kanji: イバンのみ
    en: Custap Berry
    fr: Baie Chérim
    it: Baccacrela
    de: Eipfelbeere
    es: Baya Chiri
    ko: 애슈열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nピンチのとき　いちどだけ\nこうどうが　はやくなる。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　１度だけ\n行動が　早くなる。"
    en: "If held by a Pokémon, it gets to move\nfirst just once in a pinch."
    fr: "Tenue, cette Baie permet d’attaquer\nen premier une fois en cas de besoin."
    it: "Se il Pokémon che ce l’ha è in difficoltà,\ngli consente di fare per primo la sua\nmossa. Funziona una sola volta."
    de: "Als getragenes Item ermöglicht\ndiese Beere dem Träger in einer\nNotlage den Erstschlag."
    es: "El Pokémon que la lleva puede actuar\nen primer lugar una vez cuando se\nencuentra en un momento de apuro."
    ko: "포켓몬에게 지니게 하면\n위급할 때 한 번만\n행동이 빨라진다."
damp_mulch:
  names:
    jp_kana: じめじめこやし
    jp_kanji: じめじめこやし
    en: Damp Mulch
    fr: Fertihumide
    it: Fertilidro
    de: Feuchtmulch
    es: Abono Lento
    ko: 축축이비료
  descriptions:
    jp_kana: "きのみを　そだてる　ちほうでは\nふかふかのつちに　まいて　つかう。\nマニアが　たかく　かってくれる。"
    jp_kanji: "きのみを　育てる　地方では\nふかふかのつちに　まいて　使う。\nマニアが　高く　買ってくれる。"
    en: "A fertilizer to be spread on soft soil\nin regions where Berries are grown.\nA maniac will buy it for a high price."
    fr: "Un engrais utilisé sur sol meuble.\nLes amateurs en donnent un bon prix."
    it: "Usato per favorire la crescita delle\nBacche nelle regioni dove si coltivano.\nGli intenditori pagano caro per averlo."
    de: "In Regionen, wo man Beeren anbaut,\nmengt man ihn unter weiche Erde.\nSammler geben ihr letztes Hemd dafür."
    es: "Un fertilizante usado en suelo fértil\ndonde crecen las Bayas.\nMuy apreciado por los coleccionistas."
    ko: "나무열매를 키우는 지방에서는\n푹신푹신한 땅에 뿌려 쓴다.\n마니아가 비싼 값에 산다."
damp_rock:
  names:
    jp_kana: しめったいわ
    jp_kanji: しめったいわ
    en: Damp Rock
    fr: Roche Humide
    it: Rocciaumida
    de: Nassbrocken
    es: Roca Lluvia
    ko: 축축한바위
  descriptions:
    jp_kana: "もたせた　ポケモンが　あまごいを\nつかうと　いつもより　あめの\nじかんが　ながくなる。"
    jp_kanji: "持たせた　ポケモンが　あまごいを\n使うと　いつもより　あめの\n時間が　長くなる。"
    en: "A Pokémon held item that extends the\nduration of the move Rain Dance used\nby the holder."
    fr: "Objet à tenir augmentant la durée\nde la capacité Danse Pluie utilisée\npar le porteur."
    it: "Strumento da far tenere a un Pokémon\nche allunga la durata della mossa\nPioggiadanza se usata da chi lo tiene."
    de: "Ein Item zum Tragen. Verlängert\ndie Dauer von Regentanz, wenn\nvon Träger eingesetzt."
    es: "Prolonga la duración del movimiento\nDanza Lluvia que use el Pokémon\nque la lleva."
    ko: "지니게 한 포켓몬이 비바라기를\n쓰면 여느 때보다 비내리는\n시간이 길어진다."
dark_gem:
  names:
    jp_kana: あくのジュエル
    jp_kanji: あくのジュエル
    en: Dark Gem
    fr: Joyau Ténèbr
    it: Bijoubuio
    de: Unlichtjuwel
    es: G. Siniestra
    ko: 악주얼
  descriptions:
    jp_kana: "あくの　タイプの　ジュエル。\nもたせると　いちどだけ　あくの\nわざの　いりょくが　つよまる。"
    jp_kanji: "あくの　タイプの　ジュエル。\n持たせると　１度だけ　あくの\n技の　威力が　強まる。"
    en: "A gem with an essence of darkness.\nWhen held, it strengthens the power of\na Dark-type move only once."
    fr: "Objet à tenir. Joyau augmentant\nune fois la puissance des capacités\nde type Ténèbres."
    it: "Strumento da far tenere a un Pokémon.\nGioiello che potenzia una sola volta\nle mosse di tipo Buio."
    de: "Ein Juwel vom Typ Unlicht. Es\nerhöht einmalig die Stärke\neiner Attacke vom Typ Unlicht."
    es: "Joya de un solo uso que potencia\nlos movimientos de tipo Siniestro.\nDebe llevarla un Pokémon."
    ko: "악타입의 주얼.\n지니게 하면 한 번만 악\n기술의 위력이 강해진다."
dark_stone:
  names:
    jp_kana: ダークストーン
    jp_kanji: ダークストーン
    en: Dark Stone
    fr: Galet Noir
    it: Scurolite
    de: Dunkelstein
    es: Orbe Oscuro
    ko: 다크스톤
  descriptions:
    jp_kana: "ゼクロムの　にくたいが　ほろび\nへんかした　すがた。えいゆうの\nとうじょうを　まっていると　される。"
    jp_kanji: "ゼクロムの　肉体が　滅び\n変化した　姿。　英雄の\n登場を　待っていると　される。"
    en: "Zekrom’s body was destroyed and\nchanged into this stone. It is said to\nbe waiting for the emergence of a hero."
    fr: "Ce sont les derniers restes du corps\nde Zekrom. On dit qu’ils attendent\nl’apparition d’un héros."
    it: "Pietra in cui si è tramutato Zekrom\nquando ha perso la sua forma corporea.\nAttende la venuta di un eroe."
    de: "Nach dem Zerfall seines Körpers nahm\nZekrom diese Gestalt an. Man sagt,\nes warte auf die Ankunft eines Helden."
    es: "Forma que adoptó Zekrom\nal perder su cuerpo. Espera\nla llegada de un nuevo héroe."
    ko: "제크로무의 육체가 허물어져\n변화한 모습. 영웅의\n등장을 기다린다고 여겨진다."
data_card_01:
  names:
    jp_kana: データカード０１
    jp_kanji: データカード０１
    en: Data Card 01
    fr: Carte Mémo01
    it: Sch. Dati 01
    de: Datenkarte01
    es: T. Datos 01
    ko: 데이터카드01
  descriptions:
    jp_kana: "ポケスロンの　きろくが　はいっている。\nゆうしょう　かいすうが"
    jp_kanji: "ポケスロンの　記録が　はいっている。\n優勝　回数が\n記録された　カード。"
    en: "It holds Pokéathlon records. It’s a\ncard that shows how many victories\nyou’ve had."
    fr: "Contient vos données du Pokéathlon.\nSur cette carte est inscrit votre\nnombre de victoires au Pokéathlon."
    it: "Contiene i tuoi dati Pokéathlon.\nSu questa Scheda è registrato il\nnumero totale di vittorie."
    de: "Speichert deine Pokéathlon-Rekorde.\nDie Karte zeigt, wie oft du ein Turnier\ngewonnen hast."
    es: "Contiene los datos del Pokéathlon\ncon el número de victorias."
    ko: "포켓슬론의 기록이 들어 있다.\n우승 횟수가\n기록된 카드."
data_card_02:
  names:
    jp_kana: データカード０２
    jp_kanji: データカード０２
    en: Data Card 02
    fr: Carte Mémo02
    it: Sch. Dati 02
    de: Datenkarte02
    es: T. Datos 02
    ko: 데이터카드02
  descriptions:
    jp_kana: "ポケスロンの　きろくが　はいっている。\nビリになった　かいすうが\nきろくされた　カード。"
    jp_kanji: "ポケスロンの　記録が　はいっている。\nビリになった　回数が\n記録された　カード。"
    en: "It holds Pokéathlon records. It’s a\ncard that shows how many\nlosses you’ve had."
    fr: "Contient vos données du Pokéathlon.\nSur cette carte est inscrit le nombre\nde fois où vous avez fini en dernier."
    it: "Contiene i tuoi dati Pokéathlon.\nSu questa Scheda è registrato il\nnumero di ultimi posti."
    de: "Speichert deine Pokéathlon-Rekorde.\nDie Karte zeigt, wie oft du bei einem\nTurnier Letzter geworden bist."
    es: "Contiene los datos del Pokéathlon con\nel número de veces que se ha quedado\nen último lugar."
    ko: "포켓슬론의 기록이 들어 있다.\n꼴찌가 된 횟수가\n기록된 카드."
data_card_03:
  names:
    jp_kana: データカード０３
    jp_kanji: データカード０３
    en: Data Card 03
    fr: Carte Mémo03
    it: Sch. Dati 03
    de: Datenkarte03
    es: T. Datos 03
    ko: 데이터카드03
  descriptions:
    jp_kana: "ポケスロンの　きろくが　はいっている。\nポケモンの　ダッシュした　かいすうが\nきろくされた　カード。"
    jp_kanji: "ポケスロンの　記録が　はいっている。\nポケモンの　ダッシュした　回数が\n記録された　カード。"
    en: "It holds Pokéathlon records. It’s a\ncard that shows how many times your\nPokémon have dashed."
    fr: "Contient vos données du Pokéathlon.\nSur cette carte est inscrit le nombre\nde sprints de vos Pokémon."
    it: "Contiene i tuoi dati Pokéathlon.\nSu questa Scheda è registrato il\nnumero di sprint dei tuoi Pokémon."
    de: "Speichert deine Pokéathlon-Rekorde.\nDie Karte zeigt, wie viele Sprints\ndu schon hinter dir hast."
    es: "Contiene los datos del Pokéathlon con\nel número de sprints de los Pokémon."
    ko: "포켓슬론의 기록이 들어 있다.\n포켓몬이 대시한 횟수가\n기록된 카드."
data_card_04:
  names:
    jp_kana: データカード０４
    jp_kanji: データカード０４
    en: Data Card 04
    fr: Carte Mémo04
    it: Sch. Dati 04
    de: Datenkarte04
    es: T. Datos 04
    ko: 데이터카드04
  descriptions:
    jp_kana: "ポケスロンの　きろくが　はいっている。\nポケモンの　ジャンプした　かいすうが\nきろくされた　カード。"
    jp_kanji: "ポケスロンの　記録が　はいっている。\nポケモンの　ジャンプした　回数が\n記録された　カード。"
    en: "It holds Pokéathlon records. It’s a\ncard that shows how many times your\nPokémon have jumped."
    fr: "Contient vos données du Pokéathlon.\nSur cette carte est inscrit le nombre\nde sauts de vos Pokémon."
    it: "Contiene i tuoi dati Pokéathlon.\nSu questa Scheda è registrato il\nnumero di salti dei tuoi Pokémon."
    de: "Speichert deine Pokéathlon-Rekorde.\nDie Karte zeigt, wie oft du\ngesprungen bist."
    es: "Contiene los datos del Pokéathlon con\nel número de saltos de los Pokémon."
    ko: "포켓슬론의 기록이 들어 있다.\n포켓몬이 점프한 횟수가\n기록된 카드."
data_card_05:
  names:
    jp_kana: データカード０５
    jp_kanji: データカード０５
    en: Data Card 05
    fr: Carte Mémo05
    it: Sch. Dati 05
    de: Datenkarte05
    es: T. Datos 05
    ko: 데이터카드05
  descriptions:
    jp_kana: "ポケスロンの　きろくが　はいっている。\nダッシュハードル　１い　かいすうが\nきろくされた　カード。"
    jp_kanji: "ポケスロンの　記録が　はいっている。\nダッシュハードル　１位　回数が\n記録された　カード。"
    en: "It holds Pokéathlon records. It’s a\ncard that shows how many times you’ve\nwon the Hurdle Dash."
    fr: "Contient vos données du Pokéathlon.\nSur cette carte est inscrit le nombre\nde victoires à la Cours’Obstacles."
    it: "Contiene i tuoi dati Pokéathlon.\nSu questa Scheda è registrato il\nnumero di vittorie a Corsostacoli."
    de: "Speichert deine Pokéathlon-Rekorde.\nDie Karte zeigt, wie oft du beim\nHürdenlauf den 1. Platz belegt hast."
    es: "Contiene los datos del Pokéathlon\ncon el número de victorias\nen Saltaobstáculos."
    ko: "포켓슬론의 기록이 들어 있다.\n대시허들 1위 횟수가\n기록된 카드."
data_card_06:
  names:
    jp_kana: データカード０６
    jp_kanji: データカード０６
    en: Data Card 06
    fr: Carte Mémo06
    it: Sch. Dati 06
    de: Datenkarte06
    es: T. Datos 06
    ko: 데이터카드06
  descriptions:
    jp_kana: "ポケスロンの　きろくが　はいっている。\nチェンジリレー　１い　かいすうが\nきろくされた　カード。"
    jp_kanji: "ポケスロンの　記録が　はいっている。\nチェンジリレー　１位　回数が\n記録された　カード。"
    en: "It holds Pokéathlon records. It’s a\ncard that shows how many times you’ve\nwon the Relay Run."
    fr: "Contient vos données du Pokéathlon.\nSur cette carte est inscrit le nombre\nde victoires à la Course de Relais."
    it: "Contiene i tuoi dati Pokéathlon.\nSu questa Scheda è registrato il\nnumero di vittorie a Staffetta."
    de: "Speichert deine Pokéathlon-Rekorde.\nDie Karte zeigt, wie oft du beim\nStaffellauf den 1. Platz belegt hast."
    es: "Contiene los datos del Pokéathlon\ncon el número de victorias en\nCarrera de Relevos."
    ko: "포켓슬론의 기록이 들어 있다.\n체인지릴레이 1위 횟수가\n기록된 카드."
data_card_07:
  names:
    jp_kana: データカード０７
    jp_kanji: データカード０７
    en: Data Card 07
    fr: Carte Mémo07
    it: Sch. Dati 07
    de: Datenkarte07
    es: T. Datos 07
