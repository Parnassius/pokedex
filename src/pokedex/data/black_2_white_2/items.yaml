    fr: "Monte la Vitesse pendant un combat.\nL’effet s’estompe si le Pokémon se\nretire."
    it: "Aumenta la Velocità di un Pokémon\nin una lotta. L’effetto svanisce se\nil Pokémon è sostituito."
    de: "Hebt den Initiative-Wert eines Pokémon\nim Kampf. Die Wirkung wird mit dem\nAustausch des Pokémon beendet."
    es: "Aumenta la Velocidad en combate.\nAl cambiar de Pokémon, el efecto\ndesaparece."
    ko: "배틀 중인 포켓몬의 스피드를 올리는\n도구. 포켓몬을 볼에 넣어버리면\n원래대로 되돌아간다."
x_speed_2:
  names:
    jp_kana: スピーダー２
    jp_kanji: スピーダー２
    en: X Speed 2
    fr: Vitesse 2
    it: Velocità X-2
    de: X-Tempo2
    es: Veloc. X 2
    ko: 스피드업2
  descriptions:
    jp_kana: "せんとうちゅうの　ポケモンの\nすばやさを　それなりに　あげる。\nひっこめると　もとに　もどる。"
    jp_kanji: "戦闘中の　ポケモンの\n素早さを　それなりに　あげる。\nひっこめると　元に　戻る。"
    en: "It sharply raises the Speed stat of a\nPokémon in battle. It wears off if\nthe Pokémon is withdrawn."
    fr: "Monte un peu la Vitesse pendant\nun combat. L’effet s’estompe si\nle Pokémon se retire."
    it: "Aumenta di molto la Velocità di\nun Pokémon in una lotta. L’effetto\nsvanisce se il Pokémon è sostituito."
    de: "Hebt den Initiative-Wert eines Pokémon\nim Kampf leicht an. Die Wirkung endet\nmit dem Austausch des Pokémon."
    es: "Aumenta ligeramente la Velocidad en\ncombate. Al cambiar de Pokémon,\nel efecto desaparece."
    ko: "배틀 중인 포켓몬의 스피드를\n그럭저럭 올린다. 포켓몬을 볼에\n넣어버리면 원래대로 되돌아간다."
x_speed_3:
  names:
    jp_kana: スピーダー３
    jp_kanji: スピーダー３
    en: X Speed 3
    fr: Vitesse 3
    it: Velocità X-3
    de: X-Tempo3
    es: Veloc. X 3
    ko: 스피드업3
  descriptions:
    jp_kana: "せんとうちゅうの　ポケモンの\nすばやさを　かなり　あげる。\nひっこめると　もとに　もどる。"
    jp_kanji: "戦闘中の　ポケモンの\n素早さを　かなり　あげる。\nひっこめると　元に　戻る。"
    en: "It drastically raises the Speed stat of\na Pokémon in battle. It wears off if the\nPokémon is withdrawn."
    fr: "Monte sensiblement la Vitesse pendant\nun combat. L’effet s’estompe\nsi le Pokémon se retire."
    it: "Aumenta moltissimo la Velocità\ndi un Pokémon in una lotta. L’effetto\nsvanisce se il Pokémon è sostituito."
    de: "Hebt den Initiative-Wert eines Pokémon\nim Kampf stark an. Die Wirkung endet mit\ndem Austausch des Pokémon."
    es: "Aumenta bastante la Velocidad en\ncombate. Al cambiar de Pokémon,\nel efecto desaparece."
    ko: "배틀 중인 포켓몬의 스피드를\n상당히 올린다. 포켓몬을 볼에\n넣어버리면 원래대로 되돌아간다."
x_speed_6:
  names:
    jp_kana: スピーダー６
    jp_kanji: スピーダー６
    en: X Speed 6
    fr: Vitesse 6
    it: Velocità X-6
    de: X-Tempo6
    es: Veloc. X 6
    ko: 스피드업6
  descriptions:
    jp_kana: "せんとうちゅうの　ポケモンの\nすばやさを　ものすごく　あげる。\nひっこめると　もとに　もどる。"
    jp_kanji: "戦闘中の　ポケモンの\n素早さを　ものすごく　あげる。\nひっこめると　元に　戻る。"
    en: "It raises the Speed stat of a Pokémon\nin battle immensely. It wears off if the\nPokémon is withdrawn."
    fr: "Monte fortement la Vitesse pendant\nun combat. L’effet s’estompe\nsi le Pokémon se retire."
    it: "Aumenta incredibilmente la Velocità\ndi un Pokémon in una lotta. L’effetto\nsvanisce se il Pokémon è sostituito."
    de: "Hebt den Initiative-Wert eines Pokémon\nim Kampf enorm an. Die Wirkung endet mit\ndem Austausch des Pokémon."
    es: "Aumenta mucho la Velocidad en\ncombate. Al cambiar de Pokémon,\nel efecto desaparece."
    ko: "배틀 중인 포켓몬의 스피드를\n엄청나게 올린다. 포켓몬을 볼에\n넣어버리면 원래대로 되돌아간다."
xtransceiver:female:
  names:
    jp_kana: ライブキャスター
    jp_kanji: ライブキャスター
    en: Xtransceiver
    fr: Vokit
    it: Interpoké
    de: Viso-Caster
    es: Videomisor
    ko: 라이브캐스터
  descriptions:
    jp_kana: "さいだい　４にんで　つうわができる\nテレビカメラきのうつきの\nさいしんがた　トランシーバー。"
    jp_kanji: "最大４人で　通話ができる\nテレビカメラ機能つきの\n最新型トランシーバー。"
    en: "A high-tech transceiver with a\ncamera function. It allows up to\nfour-way calls."
    fr: "Transmetteur high-tech permettant\nà 4 personnes de communiquer par\nle son et l’image."
    it: "Ricetrasmittente all’avanguardia che\npermette di fare videochiamate con\nun gruppo massimo di quattro persone."
    de: "Ein hochmodernes Gerät, mit dem bis zu\n4 Personen miteinander kommunizieren\nkönnen. Es ermöglicht sogar Video-Chat!"
    es: "Comunicador de alta tecnología con\ncámara que permite hablar a cuatro\npersonas a la vez."
    ko: "영상 통화 기능이 내장된\n최신식 무전기.\n최대 4명이 동시에 통화할 수 있다."
xtransceiver:male:
  names:
    jp_kana: ライブキャスター
    jp_kanji: ライブキャスター
    en: Xtransceiver
    fr: Vokit
    it: Interpoké
    de: Viso-Caster
    es: Videomisor
    ko: 라이브캐스터
  descriptions:
    jp_kana: "さいだい　４にんで　つうわができる\nテレビカメラきのうつきの\nさいしんがた　トランシーバー。"
    jp_kanji: "最大４人で　通話ができる\nテレビカメラ機能つきの\n最新型トランシーバー。"
    en: "A high-tech transceiver with a\ncamera function. It allows up to\nfour-way calls."
    fr: "Transmetteur high-tech permettant\nà 4 personnes de communiquer par\nle son et l’image."
    it: "Ricetrasmittente all’avanguardia che\npermette di fare videochiamate con\nun gruppo massimo di quattro persone."
    de: "Ein hochmodernes Gerät, mit dem bis zu\n4 Personen miteinander kommunizieren\nkönnen. Es ermöglicht sogar Video-Chat!"
    es: "Comunicador de alta tecnología con\ncámara que permite hablar a cuatro\npersonas a la vez."
    ko: "영상 통화 기능이 내장된\n최신식 무전기.\n최대 4명이 동시에 통화할 수 있다."
yache_berry:
  names:
    jp_kana: ヤチェのみ
    jp_kanji: ヤチェのみ
    en: Yache Berry
    fr: Baie Nanone
    it: Baccamoya
    de: Kiroyabeere
    es: Baya Rimoya
    ko: 플카열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　こおり　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　こおり技を\n受けたとき　威力が　弱まる。"
    en: "Weakens a supereffective Ice-type\nattack against the holding Pokémon."
    fr: "Tenue, cette Baie affaiblit une attaque\nennemie super efficace de type Glace."
    it: "Se tenuta da un Pokémon, indebolisce\nl’attacco superefficace di tipo Ghiaccio\ndel nemico."
    de: "Als getragenes Item schwächt diese\nBeere besonders effektive Attacken\ndes Angreifers vom Typ Eis."
    es: "Si la lleva un Pokémon, debilita un\nataque supereficaz de tipo Hielo\nde un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 뛰어난 얼음 기술을\n당했을 때 위력이 약해진다."
yellow_apricorn:
  names:
    jp_kana: きぼんぐり
    jp_kanji: きぼんぐり
    en: Ylw Apricorn
    fr: Noigrume Jne
    it: Ghic. Gialla
    de: Aprikoko Glb
    es: Bonguri Ama
    ko: 노랑규토리
  descriptions:
    jp_kana: "きいろの　ぼんぐり。\nさわやかな　かおりが　する。"
    jp_kanji: "きいろの　ぼんぐり。\nさわやかな　かおりが　する。"
    en: "A yellow Apricorn.\nIt has an invigorating scent."
    fr: "Un Noigrume de couleur jaune.\nIl dégage un arôme délicat."
    it: "Una Ghicocca di colore giallo.\nEmana un profumo delicato."
    de: "Eine gelbe Aprikoko.\nSie riecht ein wenig unreif."
    es: "Bonguri de color amarillo y aroma\nrefrescante."
    ko: "노란색의 규토리.\n산뜻한 향기가 난다."
yellow_flute:
  names:
    jp_kana: きいろビードロ
    jp_kanji: きいろビードロ
    en: Yellow Flute
    fr: Flûte Jaune
    it: Flauto Gial.
    de: Gelbe Flöte
    es: Fl. Amarilla
    ko: 노랑비드로
  descriptions:
    jp_kana: "きいろい　ガラスで　できている\nおもちゃの　ふえ。\nマニアが　たかく　かってくれる。"
    jp_kanji: "黄色い　ガラスで　できている\nおもちゃの　笛。\nマニアが　高く　買ってくれる。"
    en: "A toy flute made from yellow glass.\nA maniac will buy it for a high price."
    fr: "Jouet en forme de flûte en verre\njaune. Les amateurs en donnent\nun bon prix."
    it: "Flauto giocattolo fatto di vetro giallo.\nSi può vendere a un prezzo piuttosto\nalto agli intenditori."
    de: "Eine Spielzeugflöte aus gelbem Glas.\nSammler geben ihr letztes Hemd dafür\nher."
    es: "Una flauta de juguete hecha de\ncristal amarillo.\nMuy valorada por los coleccionistas."
    ko: "노란 유리로 만들어진\n장난감 피리.\n마니아가 비싼 값에 산다."
yellow_scarf:
  names:
    jp_kana: きいろのバンダナ
    jp_kanji: きいろのバンダナ
    en: Yellow Scarf
    fr: Foul. Jaune
    it: Fascia Gial.
    de: Gelber Schal
    es: P. Amarillo
    ko: 노랑밴드
  descriptions:
    jp_kana: "もたせて　コンテストに　さんかすると\nその　ポケモンは　いつもより\nたくましく　みられる。"
    jp_kanji: "持たせて　コンテストに　参加すると\nその　ポケモンは　いつもより\nたくましく　みられる。"
    en: "An item to be held by a Pokémon.\nIt boosts the Tough aspect of the\nholder in a Contest."
    fr: "Objet à tenir. Augmente la Robustesse\nd’un Pokémon dans les Concours."
    it: "Strumento da far tenere a un Pokémon.\nAumenta la “Grinta” di chi lo tiene\nin una Gara."
    de: "Ein Item zum Tragen. Trainer erhöhen\ndamit in Wettbewerben die „Stärke“\nihres Pokémon."
    es: "Debe llevarlo un Pokémon.\nAumenta la dureza en los concursos."
    ko: "지니게 하여 콘테스트에 참가하면\n그 포켓몬은 여느 때보다\n강인하게 보인다."
yellow_shard:
  names:
    jp_kana: きいろいかけら
    jp_kanji: きいろいかけら
    en: Yellow Shard
    fr: Tesson Jaune
    it: Coccio Gial.
    de: Gelbstück
    es: P. Amarilla
    ko: 노랑조각
  descriptions:
    jp_kana: "きいろい　ちいさな　かけら。\nむかしに　つくられた　なにかの\nどうぐの　いちぶ　らしい。"
    jp_kanji: "黄色い　小さな　かけら。\n昔に　つくられた　なにかの\n道具の　一部らしい。"
    en: "A small yellow shard.\nIt appears to be from some sort of\nimplement made long ago."
    fr: "Petit tesson jaune.\nIl semble provenir d’un outil très\nancien."
    it: "Un piccolo coccio giallo che con ogni\nprobabilità è un frammento di un antico\nstrumento."
    de: "Eine gelbe Scherbe eines antiken\nWerkzeugs, das vor langer Zeit\nangefertigt wurde."
    es: "Un pequeño fragmento amarillo.\nParece formar parte de algún tipo\nde herramienta antigua."
    ko: "노란 작은 조각.\n옛날에 만들어진 어떤\n도구의 일부인 듯하다."
zap_plate:
  names:
    jp_kana: いかずちプレート
    jp_kanji: いかずちプレート
    en: Zap Plate
    fr: Plaque Volt
    it: Lastrasaetta
    de: Blitztafel
    es: Tabla Trueno
    ko: 우뢰플레이트
  descriptions:
    jp_kana: "でんきの　タイプの　せきばん。\nもたせると　でんきタイプの\nわざの　いりょくが　つよまる。"
    jp_kanji: "でんきの　タイプの　石盤。\n持たせると　でんきタイプの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon.\nIt is a stone tablet that boosts the\npower of Electric-type moves."
    fr: "Objet à tenir. Tablette en pierre\naugmentant la puissance des capacités\nde type Électrik."
    it: "Strumento da far tenere a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Elettro."
    de: "Ein Item zum Tragen. Diese Steintafel\nverstärkt Attacken vom Typ Elektro."
    es: "Tabla de piedra que potencia\nlos movimientos de tipo Eléctrico.\nDebe llevarla un Pokémon."
    ko: "전기타입의 석판.\n지니게 하면 전기타입\n기술의 위력이 강해진다."
zinc:
  names:
    jp_kana: キトサン
    jp_kanji: キトサン
    en: Zinc
    fr: Zinc
    it: Zinco
    de: Zink
    es: Zinc
    ko: 키토산
  descriptions:
    jp_kana: "ポケモンの　えいようドリンク。\nポケモン　１ひきの　とくぼうの\nきそポイントを　あげる。"
    jp_kanji: "ポケモンの　栄養ドリンク。\nポケモン　１匹の　特防の\n基礎ポイントを　あげる。"
    en: "A nutritious drink for Pokémon.\nIt raises the base Sp. Def (Special\nDefense) stat of a single Pokémon."
    fr: "Une boisson très nutritive qui monte\nla Défense Spéciale d’un Pokémon."
    it: "Bevanda nutriente per Pokémon.\nAumenta la Difesa Speciale di base."
    de: "Ein gehaltvolles Getränk, das die\nSpezial-Verteidigung eines Pokémon\ndauerhaft erhöht."
    es: "Nutritiva bebida que aumenta la Defensa\nEspecial de base de un Pokémon."
    ko: "포켓몬의 영양 드링크.\n포켓몬 1마리의 특수방어\n기초 포인트를 올린다."
zoom_lens:
  names:
    jp_kana: フォーカスレンズ
    jp_kanji: フォーカスレンズ
    en: Zoom Lens
    fr: Lentil. Zoom
    it: Zoomlente
    de: Zoomlinse
    es: Telescopio
    ko: 포커스렌즈
  descriptions:
    jp_kana: "もたせた　ポケモンが　あいてよりも\nこうどうするのが　おそいとき\nわざが　めいちゅう　しやすくなる。"
    jp_kanji: "持たせた　ポケモンが　相手よりも\n行動するのが　遅いとき\n技が　命中しやすくなる。"
    en: "An item to be held by a Pokémon.\nIf the holder moves after its\ntarget, its accuracy will be boosted."
    fr: "Objet à tenir. Augmente la Précision\ndu porteur s’il attaque après l’ennemi."
    it: "Strumento da far tenere a un Pokémon.\nAumenta la precisione se chi lo tiene\nattacca dopo il nemico."
    de: "Ein Item zum Tragen. Agiert das\nZiel zuerst, erhöht sich die\nGenauigkeit des Trägers."
    es: "Debe llevarlo un Pokémon. Si se mueve\ndespués del enemigo, aumenta la\nPrecisión del Pokémon."
    ko: "지니게 한 포켓몬이 상대보다도\n행동하는 것이 늦을 때\n기술이 명중하기 쉬워진다."
