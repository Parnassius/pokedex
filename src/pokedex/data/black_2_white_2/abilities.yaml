    fr: "Attaque toujours après\nl’ennemi, même plus lent."
    it: "Anche i nemici più lenti\nattaccano per primi."
    de: "Handelt erst nach Pokémon\nmit niedrigerer Initiative."
    es: "El Pokémon se mueve\ntras todos los demás."
    ko: "상대보다 재빨라도\n행동이 느려진다."
static:
  names:
    jp_kana: せいでんき
    jp_kanji: せいでんき
    en: Static
    fr: Statik
    it: Statico
    de: Statik
    es: Elec. Estát.
    ko: 정전기
  descriptions:
    jp_kana: "さわった　あいてを\nまひさせる　ことがある。"
    jp_kanji: "触った　相手を\nまひさせる　ことがある。"
    en: "Contact with the Pokémon\nmay cause paralysis."
    fr: "Un contact avec le\nPokémon peut paralyser."
    it: "Il contatto fisico con il\nPokémon può dare paralisi."
    de: "Kann bei Berührung\nparalysieren."
    es: "Puede paralizar al\nmínimo contacto."
    ko: "접촉한 상대를\n마비시킬 때가 있다."
steadfast:
  names:
    jp_kana: ふくつのこころ
    jp_kanji: ふくつのこころ
    en: Steadfast
    fr: Impassible
    it: Cuordeciso
    de: Felsenfest
    es: Impasible
    ko: 불굴의마음
  descriptions:
    jp_kana: "ひるむ　たびに\nすばやさが　あがる。"
    jp_kanji: "ひるむ　たびに\n素早さが　あがる。"
    en: "Raises Speed each time\nthe Pokémon flinches."
    fr: "Augmente la Vitesse quand\nle Pokémon a peur."
    it: "Aumenta la Velocità se\nil Pokémon tentenna."
    de: "Erhöht Initiative, sobald\nPokémon zurückschreckt."
    es: "Cada vez que retrocede\nsube su Velocidad."
    ko: "풀죽을 때마다\n스피드가 올라간다."
stench:
  names:
    jp_kana: あくしゅう
    jp_kanji: あくしゅう
    en: Stench
    fr: Puanteur
    it: Tanfo
    de: Duftnote
    es: Hedor
    ko: 악취
  descriptions:
    jp_kana: "くさくて　あいてが\nひるむ　ことがある。"
    jp_kanji: "臭くて　相手が\nひるむ　ことがある。"
    en: "The stench may cause\nthe target to flinch."
    fr: "La puanteur peut\neffrayer l’adversaire."
    it: "A volte fa tentennare\ni nemici."
    de: "Lässt den Gegner durch\nGestank zurückschrecken."
    es: "Es posible que el rival\nretroceda por el mal olor."
    ko: "악취 때문에 상대가\n풀죽을 때가 있다."
sticky_hold:
  names:
    jp_kana: ねんちゃく
    jp_kanji: ねんちゃく
    en: Sticky Hold
    fr: Glue
    it: Antifurto
    de: Wertehalter
    es: Viscosidad
    ko: 점착
  descriptions:
    jp_kana: "ねんちゃくして\nどうぐを　まもる。"
    jp_kanji: "ねんちゃくして\n道具を　守る。"
    en: "Protects the Pokémon\nfrom item theft."
    fr: "Fait s’agripper à l’objet\npour en empêcher le vol."
    it: "Protegge il Pokémon\ndal furto di strumenti."
    de: "Verhindert durch Klebe-\neffekt Item-Diebstähle."
    es: Impide el robo de objetos.
    ko: "달라붙어서\n도구를 지킨다."
storm_drain:
  names:
    jp_kana: よびみず
    jp_kanji: よびみず
    en: Storm Drain
    fr: Lavabo
    it: Acquascolo
    de: Sturmsog
    es: Colector
    ko: 마중물
  descriptions:
    jp_kana: "みずを　よびこんで\nとくこうを　あげる。"
    jp_kanji: "みずを　呼び込んで\n特攻を　あげる。"
    en: "Draws in all Water-type\nmoves to up Sp. Attack."
    fr: "Attire l’eau et augmente\nl’Atq. Spé."
    it: "Le mosse acqua subite\naumentano l’Att. Sp."
    de: "Ruft Wasser herbei und\nerhöht Sp.-Ang."
    es: "Atrae agua para aumentar\nel At. Esp."
    ko: "물을 끌어모아\n특수공격을 올린다."
sturdy:
  names:
    jp_kana: がんじょう
    jp_kanji: がんじょう
    en: Sturdy
    fr: Fermeté
    it: Vigore
    de: Robustheit
    es: Robustez
    ko: 옹골참
  descriptions:
    jp_kana: "いちげきで\nたおされない。"
    jp_kanji: 一撃で　倒されない。
    en: "It cannot be knocked\nout with one hit."
    fr: "Protège des capacités\nmettant K.O. en un coup."
    it: "Evita che il Pokémon vada\nKO in un sol colpo."
    de: "Schutz gegen\nK.O.-Treffer-Angriffe."
    es: "Evita que el rival pueda\ndebilitar de un solo golpe."
    ko: "일격으로\n쓰러지지 않는다."
suction_cups:
  names:
    jp_kana: きゅうばん
    jp_kanji: きゅうばん
    en: Suction Cups
    fr: Ventouse
    it: Ventose
    de: Saugnapf
    es: Ventosas
    ko: 흡반
  descriptions:
    jp_kana: "いれかえさせる　わざや\nどうぐが　きかない。"
    jp_kanji: "入れ替えさせる　技や\n道具が　効かない。"
    en: "Negates all moves that\nforce switching out."
    fr: "Annule les cap. et obj. qui\nfont changer de Pokémon."
    it: "Resiste a strumenti e\nmosse di sostituzione."
    de: "Negiert Att. und Items,\ndie PKMN austauschen."
    es: "Anula movs. y objetos que\nfuerzan el relevo."
    ko: "교체시키는 기술이나 도구의\n효과를 받지 않는다."
super_luck:
  names:
    jp_kana: きょううん
    jp_kanji: きょううん
    en: Super Luck
    fr: Chanceux
    it: Supersorte
    de: Glückspilz
    es: Afortunado
    ko: 대운
  descriptions:
    jp_kana: "あいての　きゅうしょに\nこうげきが　あたりやすい。"
    jp_kanji: "相手の　急所に\n攻撃が　当たりやすい。"
    en: "Heightens the critical-\nhit ratios of moves."
    fr: "Augmente la fréquence\ndes coups critiques."
    it: "Aumenta la probabilità di\ninfliggere brutti colpi."
    de: "Erhöht die Chance auf\neinen Volltreffer."
    es: "Aumenta la probabilidad\nde dar golpes críticos."
    ko: "상대의 급소에\n공격이 맞기 쉽다."
swarm:
  names:
    jp_kana: むしのしらせ
    jp_kanji: むしのしらせ
    en: Swarm
    fr: Essaim
    it: Aiutinsetto
    de: Hexaplaga
    es: Enjambre
    ko: 벌레의알림
  descriptions:
    jp_kana: "ピンチのとき　むしの\nいりょくが　あがる。"
    jp_kanji: "ピンチのとき　むしの\n威力が　あがる。"
    en: "Powers up Bug-type\nmoves in a pinch."
    fr: "Booste les capacités\nInsecte en cas de besoin."
    it: "In difficoltà, potenzia le\nmosse di tipo Coleottero."
    de: "Stärkt Käfer-Attacken,\nwenn Not am Mann ist."
    es: "Potencia los ataques de\ntipo Bicho en un apuro."
    ko: "위급할 때 벌레타입의\n위력이 올라간다."
swift_swim:
  names:
    jp_kana: すいすい
    jp_kanji: すいすい
    en: Swift Swim
    fr: Glissade
    it: Nuotovelox
    de: Wassertempo
    es: Nado Rápido
    ko: 쓱쓱
  descriptions:
    jp_kana: "あめのとき　すばやさが\nあがる。"
    jp_kanji: "雨のとき　素早さが\nあがる。"
    en: "Boosts the Pokémon’s\nSpeed in rain."
    fr: "Augmente la Vitesse du\nPokémon s’il pleut."
    it: "Se piove, la statistica\nVelocità aumenta."
    de: "Steigert Initiative bei\nRegen."
    es: "Sube la Velocidad cuando\nhay lluvia."
    ko: "비가 올 때 스피드가\n올라간다."
synchronize:
  names:
    jp_kana: シンクロ
    jp_kanji: シンクロ
    en: Synchronize
    fr: Synchro
    it: Sincronismo
    de: Synchro
    es: Sincronía
    ko: 싱크로
  descriptions:
    jp_kana: "どく　まひ　やけどを\nあいてに　うつす。"
    jp_kanji: "どく　まひ　やけどを\n相手に　うつす。"
    en: "Passes a burn, poison,\nor paralysis to the foe."
    fr: "Transmet brûlure, poison\nou paralysie à l’ennemi."
    it: "Passa veleno, paralisi o\nscottatura al nemico."
    de: "Gibt Verbr., Vergift. u.\nParaly. an Angreifer."
    es: "Contagia envenenamiento,\nparálisis o quemaduras."
    ko: "독, 마비, 화상을\n상대에게 옮긴다."
tangled_feet:
  names:
    jp_kana: ちどりあし
    jp_kanji: ちどりあし
    en: Tangled Feet
    fr: Pieds Confus
    it: Intricopiedi
    de: Fußangel
    es: Tumbos
    ko: 갈지자걸음
  descriptions:
    jp_kana: "こんらん　していると\nかいひ　しやすくなる。"
    jp_kanji: "混乱していると\n回避しやすくなる。"
    en: "Raises evasion if the\nPokémon is confused."
    fr: "Augmente l’Esquive si le\nPokémon est confus."
    it: "Aumenta l’elusione se\nil Pokémon è confuso."
    de: "Erhöht Fluchtwert, wenn\ndas Pokémon verwirrt ist."
    es: "Sube la Evasión si el\nPokémon está confuso."
    ko: "혼란에 빠져있으면\n회피하기 쉬워진다."
technician:
  names:
    jp_kana: テクニシャン
    jp_kanji: テクニシャン
    en: Technician
    fr: Technicien
    it: Tecnico
    de: Techniker
    es: Experto
    ko: 테크니션
  descriptions:
    jp_kana: "よわい　わざの\nいりょくが　あがる。"
    jp_kanji: "弱い　技の\n威力が　あがる。"
    en: "Powers up the Pokémon’s\nweaker moves."
    fr: "Augmente la puissance des\ncapacités les plus faibles."
    it: "Potenzia le mosse più\ndeboli del Pokémon."
    de: "Steigert Effektivität von\nschwächeren Attacken."
    es: "Potencia los movimientos\nmás débiles del Pokémon."
    ko: "약한 기술의\n위력이 올라간다."
telepathy:
  names:
    jp_kana: テレパシー
    jp_kanji: テレパシー
    en: Telepathy
    fr: Télépathe
    it: Telepatia
    de: Telepathie
    es: Telepatía
    ko: 텔레파시
  descriptions:
    jp_kana: "みかたの　こうげきを\nよみとって　うけない。"
    jp_kanji: "味方の　攻撃を\n読み取って　受けない。"
    en: "Anticipates an ally’s\nattack and dodges it."
    fr: "Anticipe et évite les\nattaques de ses alliés."
    it: "Prevede ed evita gli\nattacchi dei compagni."
    de: "Erkennt und pariert\nAngriffe von Mitstreitern."
    es: "Elude los ataques de\naliados en batalla."
    ko: "같은 편의 공격의 낌새를\n읽고 기술을 받지 않는다."
teravolt:
  names:
    jp_kana: テラボルテージ
    jp_kanji: テラボルテージ
    en: Teravolt
    fr: Téra-Voltage
    it: Teravolt
    de: Teravolt
    es: Terravoltaje
    ko: 테라볼티지
  descriptions:
    jp_kana: "とくせいに　かんけいなく\nあいてに　わざを　だせる。"
    jp_kanji: "特性に　関係なく\n相手に　技を　だせる。"
    en: "Moves can be used\nregardless of Abilities."
    fr: "Les cap. spé. adverses ne\nbloquent pas ses cap."
    it: "Neutralizza le abilità\nche bloccano le mosse."
    de: "Att. können ungeachtet d.\nFähigkeit verw. werden."
    es: "Usa movimientos sin que\nimporten las habilidades."
    ko: "특성에 관계없이 상대에게\n기술을 쓸 수 있다."
thick_fat:
  names:
    jp_kana: あついしぼう
    jp_kanji: あついしぼう
    en: Thick Fat
    fr: Isograisse
    it: Grassospesso
    de: Speckschicht
    es: Sebo
    ko: 두꺼운지방
  descriptions:
    jp_kana: "ほのおと　こおりタイプの\nわざに　つよい。"
    jp_kanji: "ほのおと　こおりタイプの\n技に　強い。"
    en: "Ups resistance to Fire-\nand Ice-type moves."
    fr: "Augmente la résistance\naux cap. Feu et Glace."
    it: "Aumenta la resistenza alle\nmosse fuoco e ghiaccio."
    de: "Stark gegen Attacken der\nTypen Feuer und Eis."
    es: "Atenúa los ataques de\ntipo Fuego y Hielo."
    ko: "불꽃과 얼음타입의\n기술에 강하다."
tinted_lens:
  names:
    jp_kana: いろめがね
    jp_kanji: いろめがね
    en: Tinted Lens
    fr: Lentiteintée
    it: Lentifumé
    de: Aufwertung
    es: Cromolente
    ko: 색안경
  descriptions:
    jp_kana: "こうかいまひとつ　のとき\nわざを　つよめる。"
    jp_kanji: "効果いまひとつ　のとき\n技を　強める。"
    en: "Powers up “not very\neffective” moves."
    fr: "Améliore les capacités\n“pas très efficaces”."
    it: "Potenzia le mosse\nnon molto efficaci."
    de: "Verstärkt nicht sehr\neffektive Attacken."
    es: "Potencia los movimientos\npoco eficaces."
    ko: "효과가 별로인 기술이\n강해진다."
torrent:
  names:
    jp_kana: げきりゅう
    jp_kanji: げきりゅう
    en: Torrent
    fr: Torrent
    it: Acquaiuto
    de: Sturzbach
    es: Torrente
    ko: 급류
  descriptions:
    jp_kana: "ピンチのとき　みずの\nいりょくが　あがる。"
    jp_kanji: "ピンチのとき　みずの\n威力が　あがる。"
    en: "Powers up Water-type\nmoves in a pinch."
    fr: "Booste les capacités\nEau en cas de besoin."
    it: "In difficoltà, potenzia\nle mosse di tipo Acqua."
    de: "Stärkt Wasser-Attacken,\nwenn Not am Mann ist."
    es: "Potencia los ataques de\ntipo Agua en un apuro."
    ko: "위급할 때 물타입의\n위력이 올라간다."
toxic_boost:
  names:
    jp_kana: どくぼうそう
    jp_kanji: どくぼうそう
    en: Toxic Boost
    fr: Rage Poison
    it: Velenimpeto
    de: Giftwahn
    es: Ím. Tóxico
    ko: 독폭주
  descriptions:
    jp_kana: "どくのとき　ぶつりの\nいりょくが　あがる。"
    jp_kanji: "毒のとき　物理の\n威力が　あがる。"
    en: "Powers up physical\nattacks when poisoned."
    fr: "Booste les att. physiques\nsi le statut est poison."
    it: "Aumenta l’Attacco se il\nPokémon è avvelenato."
    de: "Verstärkt bei Vergiftung\nphysische Angriffe."
    es: "Aumenta la potencia física\nsi está envenenado."
    ko: "독 상태일 때 물리 공격의\n위력이 올라간다."
trace:
  names:
    jp_kana: トレース
    jp_kanji: トレース
    en: Trace
    fr: Calque
    it: Traccia
    de: Fährte
    es: Rastro
    ko: 트레이스
  descriptions:
    jp_kana: "あいてと　おなじ\nとくせいに　なる。"
    jp_kanji: "相手と　同じ\n特性に　なる。"
    en: "The Pokémon copies a\nfoe’s Ability."
    fr: "Imite la capacité spéciale\nde l’ennemi."
    it: Copia l’abilità del nemico.
    de: "Das Pokémon kopiert\nFähigkeit des Gegners."
    es: "El Pokémon copia la\nhabilidad del rival."
    ko: "상대와 같은\n특성이 된다."
truant:
  names:
    jp_kana: なまけ
    jp_kanji: なまけ
    en: Truant
    fr: Absentéisme
    it: Pigrone
    de: Schnarchnase
    es: Ausente
    ko: 게으름
  descriptions:
    jp_kana: "こうげきが　れんぞくで\nだせない。"
    jp_kanji: "攻撃が　連続で\nだせない。"
    en: "Pokémon can’t attack\non consecutive turns."
    fr: "Le Pokémon ne frappe\nqu’un tour sur deux."
    it: "Il Pokémon attacca\nun turno sì e uno no."
    de: "Greift nur in jeder\nzweiten Runde an."
    es: "El Pokémon no atacará en\nturnos consecutivos."
    ko: "연속으로\n공격할 수 없다."
turboblaze:
  names:
    jp_kana: ターボブレイズ
    jp_kanji: ターボブレイズ
    en: Turboblaze
    fr: TurboBrasier
    it: Piroturbina
    de: Turbobrand
    es: Turbollama
    ko: 터보블레이즈
  descriptions:
    jp_kana: "とくせいに　かんけいなく\nあいてに　わざを　だせる。"
    jp_kanji: "特性に　関係なく\n相手に　技を　だせる。"
    en: "Moves can be used\nregardless of Abilities."
    fr: "Les cap. spé. adverses ne\nbloquent pas ses cap."
    it: "Neutralizza le abilità\nche bloccano le mosse."
    de: "Att. können ungeachtet d.\nFähigkeit verw. werden."
    es: "Usa movimientos sin que\nimporten las habilidades."
    ko: "특성에 관계없이 상대에게\n기술을 쓸 수 있다."
unaware:
  names:
    jp_kana: てんねん
    jp_kanji: てんねん
    en: Unaware
    fr: Inconscient
    it: Imprudenza
    de: Unkenntnis
    es: Ignorante
    ko: 천진
  descriptions:
    jp_kana: "あいての　のうりょくの\nへんかを　むしする。"
    jp_kanji: "相手の　能力の\n変化を　無視する。"
    en: "Ignores any stat changes\nin the Pokémon."
    fr: "Ignore les changements de\nstats de l’ennemi."
    it: "Ignora i cambi delle\nstatistiche del nemico."
    de: "Ignoriert Wechsel der\nStatuswerte des Zieles."
    es: "Ignora mejoras en las\ncaracterísticas del rival."
    ko: "상대의 능력\n변화를 무시한다."
unburden:
  names:
    jp_kana: かるわざ
    jp_kanji: かるわざ
    en: Unburden
    fr: Délestage
    it: Agiltecnica
    de: Entlastung
    es: Liviano
    ko: 곡예
  descriptions:
    jp_kana: "どうぐが　なくなると\nすばやさが　あがる。"
    jp_kanji: "道具が　なくなると\n素早さが　あがる。"
    en: "Raises Speed if a held\nitem is used."
    fr: "Augmente la Vit. si l’objet\ntenu est utilisé ou perdu."
    it: "Aumenta la Velocità dopo\naver usato uno strumento."
    de: "Erhöht Init., wenn 1 Item\nverwendet/verloren wird."
    es: "Sube la Veloc. si usa o\npierde un objeto llevado."
    ko: "도구가 없어지면\n스피드가 올라간다."
unnerve:
  names:
    jp_kana: きんちょうかん
    jp_kanji: きんちょうかん
    en: Unnerve
    fr: Tension
    it: Agitazione
    de: Anspannung
    es: Nerviosismo
    ko: 긴장감
  descriptions:
    jp_kana: "あいてを　きんちょうさせ\nきのみを　たべさせない。"
    jp_kanji: "相手を　緊張させ\nきのみを　食べさせない。"
    en: "Makes the foe nervous and\nunable to eat Berries."
    fr: "L’ennemi stresse et ne\npeut plus manger de Baies."
    it: "Il nemico viene intimidito e\nnon può mangiare Bacche."
    de: "Hindert den Gegner durch\nStress am Beerenkonsum."
    es: "Pone nervioso al rival\ny le impide usar Bayas."
    ko: "상대를 긴장시켜 나무열매를\n먹지 못하게 한다."
victory_star:
  names:
    jp_kana: しょうりのほし
    jp_kanji: しょうりのほし
    en: Victory Star
    fr: Victorieux
    it: Vittorstella
    de: Triumphstern
    es: Tinovictoria
    ko: 승리의별
  descriptions:
    jp_kana: "じぶんや　みかたの\nめいちゅうが　あがる。"
    jp_kanji: "自分や　味方の\n命中が　あがる。"
    en: "Boosts the accuracy of its\nallies and itself."
    fr: "Monte la Précision des\nPokémon de l’équipe."
    it: "Aumenta la precisione di\ntutta la squadra."
    de: "Erhöht Genauigk. bei sich\nselbst und Mitstreitern."
    es: "Sube la Precisión\nde todo el equipo."
    ko: "자신과 같은 편의\n명중률이 올라간다."
vital_spirit:
  names:
    jp_kana: やるき
    jp_kanji: やるき
    en: Vital Spirit
    fr: Esprit Vital
    it: Spiritovivo
    de: Munterkeit
    es: Espír. Vital
    ko: 의기양양
  descriptions:
    jp_kana: "ねむり　じょうたいに\nならない。"
    jp_kanji: "ねむり状態に\nならない。"
    en: "Prevents the Pokémon\nfrom falling asleep."
    fr: "Empêche le Pokémon de\ns’endormir."
    it: "Evita che il Pokémon\nsi addormenti."
    de: Verhindert Einschlafen.
    es: Evita el quedarse dormido.
    ko: "잠듦 상태가\n되지 않는다."
volt_absorb:
  names:
    jp_kana: ちくでん
    jp_kanji: ちくでん
    en: Volt Absorb
    fr: Absorb Volt
    it: Assorbivolt
    de: Voltabsorber
    es: Absor. Elec.
    ko: 축전
  descriptions:
    jp_kana: "でんきを　うけると\nかいふくする。"
    jp_kanji: "でんきを　受けると\n回復する。"
    en: "Restores HP if hit by an\nElectric-type move."
    fr: "Récupère des PV si touché\npar une capacité Électrik."
    it: "Ridà PS se si subisce una\nmossa di tipo Elettro."
    de: "Wandelt Elektrizität in\nKP um."
    es: "Recupera PS al recibir\nataques eléctricos."
    ko: "전기를 받으면\n회복한다."
water_absorb:
  names:
    jp_kana: ちょすい
    jp_kanji: ちょすい
    en: Water Absorb
    fr: Absorb Eau
    it: Assorbacqua
    de: H2O-Absorber
    es: Absor. Agua
    ko: 저수
  descriptions:
    jp_kana: "みずを　うけると\nかいふくする。"
    jp_kanji: "みずを　受けると\n回復する。"
    en: "Restores HP if hit by a\nWater-type move."
    fr: "Récupère des PV si touché\npar une capacité Eau."
    it: "Ridà PS se si subisce\nuna mossa di tipo Acqua."
    de: "Treffer durch Wasser-\nAttacken regenerieren KP."
    es: "Recupera PS al recibir\nataques de tipo Agua."
    ko: "물을 받으면\n회복한다."
water_veil:
  names:
    jp_kana: みずのベール
    jp_kanji: みずのベール
    en: Water Veil
    fr: Ignifu-Voile
    it: Idrovelo
    de: Aquahülle
    es: Velo Agua
    ko: 수의베일
  descriptions:
    jp_kana: "やけど　じょうたいに\nならない。"
    jp_kanji: "やけど状態に\nならない。"
    en: "Prevents the Pokémon\nfrom getting a burn."
    fr: "Protège le Pokémon\ndes brûlures."
    it: "Evita che il Pokémon\nresti scottato."
    de: "Verhindert\nVerbrennungen."
    es: Evita las quemaduras.
    ko: "화상 상태가\n되지 않는다."
weak_armor:
  names:
    jp_kana: くだけるよろい
    jp_kanji: くだけるよろい
    en: Weak Armor
    fr: Armurouillée
    it: Sottilguscio
    de: Bruchrüstung
    es: Arm. Frágil
    ko: 깨어진갑옷
  descriptions:
    jp_kana: "ぶつりわざで　ぼうぎょが\nさがり　すばやさがあがる。"
    jp_kanji: "物理技で　防御がさがり\n素早さが　あがる。"
    en: "Physical attacks lower\nDefense and raise Speed."
    fr: "Un coup physique baisse la\nDéfense, monte la Vitesse."
    it: "Riduce la Difesa e aumenta\nla Velocità se colpito."
    de: "Phys. Treffer senken\nVert., steigern Initiative."
    es: "Un ataque físico baja la\nDefensa y sube la Veloc."
    ko: "물리 기술을 받으면 방어가\n떨어져 스피드가 올라간다."
white_smoke:
  names:
    jp_kana: しろいけむり
    jp_kanji: しろいけむり
    en: White Smoke
    fr: Écran Fumée
    it: Fumochiaro
    de: Pulverrauch
    es: Humo Blanco
    ko: 하얀연기
  descriptions:
    jp_kana: "あいてに　のうりょくを\nさげられない。"
    jp_kanji: "相手に　能力を\nさげられない。"
    en: "Prevents other Pokémon\nfrom lowering its stats."
    fr: "Empêche les stats\ndu Pokémon de baisser."
    it: "Le statistiche non\npossono essere ridotte."
    de: "Hindert Angreifer daran,\nStatuswerte zu senken."
    es: "Evita que bajen las\ncaracterísticas."
    ko: "상대가 능력을\n떨어뜨릴 수 없다."
wonder_guard:
  names:
    jp_kana: ふしぎなまもり
    jp_kanji: ふしぎなまもり
    en: Wonder Guard
    fr: Garde Mystik
    it: Magidifesa
    de: Wunderwache
    es: Superguarda
    ko: 불가사의부적
  descriptions:
    jp_kana: "こうかばつぐん　しか\nあたらない。"
    jp_kanji: "効果バツグン　しか\n当たらない。"
    en: "Only supereffective\nmoves will hit."
    fr: "Seules les cap. “super\nefficaces” l’atteignent."
    it: "Rende vulnerabili solo\nalle mosse superefficaci."
    de: "Nur sehr effektive Treffer\nschaden."
    es: "Solo hacen daño los\nmovimientos muy eficaces."
    ko: "효과가 굉장한 기술밖에\n맞지 않는다."
wonder_skin:
  names:
    jp_kana: ミラクルスキン
    jp_kanji: ミラクルスキン
    en: Wonder Skin
    fr: Peau Miracle
    it: Splendicute
    de: Wunderhaut
    es: Piel Milagro
    ko: 미라클스킨
  descriptions:
    jp_kana: "へんかわざを　うけにくい\nからだに　なっている。"
    jp_kanji: "変化技を　受けにくい\n体に　なっている。"
    en: "Makes status-changing\nmoves more likely to miss."
    fr: "Son corps résiste mieux\naux attaques de statut."
    it: "Resiste più facilmente ai\ncambiamenti di stato."
    de: "Wehrt mit robustem Körper\nviele Status-Attacken ab."
    es: "Dificulta que le afecten\nlos ataques de estado."
    ko: "변화 기술을 받기 어려운\n몸으로 되어 있다."
zen_mode:
  names:
    jp_kana: ダルマモード
    jp_kanji: ダルマモード
    en: Zen Mode
    fr: Mode Transe
    it: Stato Zen
    de: Trance-Modus
    es: Modo Daruma
    ko: 달마모드
  descriptions:
    jp_kana: "ピンチに　なると\nすがたが　へんかする。"
    jp_kanji: "ピンチに　なると\n姿が　変化する。"
    en: "Changes the Pokémon’s\nshape when HP is halved."
    fr: "Transforme le Pokémon\ndans les moments délicats."
    it: "Se in difficoltà, cambia\nl’aspetto del Pokémon."
    de: "Wechselt seine Gestalt,\nwenn Not am Mann ist."
    es: "Cambia de forma\nen un apuro."
    ko: "위급할 때\n모습이 변화한다."
