    jp_kana: "わざの　ついかこうかを\nうけない。"
    jp_kanji: "技の　追加効果を\n受けない。"
    en: "Blocks the added effects\nof attacks taken."
    fr: "Annule les effets cumulés\nd’une attaque ennemie."
