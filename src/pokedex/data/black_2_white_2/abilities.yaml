    jp_kana: "はれると　ＨＰが　へるが\nとくこうが　あがる。"
    jp_kanji: "晴れると　ＨＰが　減るが\n特攻が　あがる。"
    en: "In sunshine, Sp. Atk is\nboosted but HP decreases."
    fr: "Augmente l’Atq. Spé. mais\nbaisse les PV au soleil."
    it: "Se c’è il sole aumenta\nl’Att. Sp. ma riduce i PS."
    de: "Steigert Spezial-Angriff\nbei Sonne, senkt aber KP."
    es: "Si hace sol, baja los PS,\npero potencia el At. Esp."
    ko: "맑으면 HP가 줄지만\n특수공격이 올라간다."
solid_rock:
  names:
    jp_kana: ハードロック
    jp_kanji: ハードロック
