    de: "Blockiert Zusatz-Effekte\ngegnerischer Angriffe."
    es: "Anula el efecto secundario\ndel ataque sufrido."
    ko: "기술의 추가 효과를\n받지 않는다."
simple:
  names:
    jp_kana: たんじゅん
    jp_kanji: たんじゅん
