    fr: "Monte une stat tout en\nen baissant une autre."
    it: "Aumenta una statistica\ne ne riduce un’altra."
    de: "Erhöht einen Statuswert\nund senkt einen anderen."
    es: "Sube una característica\nmucho, pero baja otra."
    ko: "능력 변화가\n오르락내리락한다."
motor_drive:
  names:
    jp_kana: でんきエンジン
    jp_kanji: でんきエンジン
    en: Motor Drive
    fr: Motorisé
    it: Elettrorapid
    de: Starthilfe
    es: Electromotor
    ko: 전기엔진
