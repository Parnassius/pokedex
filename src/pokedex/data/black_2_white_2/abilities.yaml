    fr: "Reçoit moins de dégâts si\nles PV sont au maximum."
    it: "Riduce il danno subito se\ni PS sono al massimo."
    de: "Verringert erlittenen\nSchaden bei vollen KP."
    es: "Reduce el daño sufrido\nsi los PS están al máximo."
    ko: "HP가 꽉 찼을 때\n데미지가 줄어든다."
multitype:
  names:
    jp_kana: マルチタイプ
    jp_kanji: マルチタイプ
    en: Multitype
    fr: Multi-Type
    it: Multitipo
    de: Variabilität
    es: Multitipo
    ko: 멀티타입
  descriptions:
    jp_kana: "もっている　プレートで\nタイプが　かわる。"
    jp_kanji: "持っている　プレートで\nタイプが　変わる。"
    en: "Changes type to match\nthe held Plate."
    fr: "Modifie le type en fonction\nde la Plaque tenue."
    it: "Cambia tipo a seconda\ndella lastra che ha."
    de: "Passt seinen Typ der\ngetragenen Tafel an."
    es: "Cambia el tipo al de la\nTabla que lleve."
    ko: "지니고 있는 플레이트에\n따라 타입이 바뀐다."
mummy:
  names:
    jp_kana: ミイラ
    jp_kanji: ミイラ
    en: Mummy
    fr: Momie
    it: Mummia
    de: Mumie
    es: Momia
    ko: 미라
  descriptions:
    jp_kana: "あいてに　さわられると\nあいてを　ミイラにする。"
    jp_kanji: "相手に　触られると\n相手を　ミイラにする。"
    en: "Contact with this Pokémon\nspreads this Ability."
    fr: "Momifie la cap. spé. de\nl’ennemi qui le touche."
    it: "L’abilità del nemico cambia\nin Mummia dopo il contatto."
    de: "Berührt man es, übernimmt\nman seine Fähigkeit."
    es: "Contagia Momia al\nrival que lo toque."
    ko: "상대의 기술을 받으면\n상대를 미라로 만든다."
natural_cure:
  names:
    jp_kana: しぜんかいふく
    jp_kanji: しぜんかいふく
    en: Natural Cure
    fr: Médic Nature
    it: Alternacura
    de: Innere Kraft
    es: Cura Natural
    ko: 자연회복
  descriptions:
    jp_kana: "じょうたい　いじょうが\nひっこむと　なおる。"
    jp_kanji: "状態異常が\nひっこむと　治る。"
    en: "All status problems heal\nwhen it switches out."
    fr: "Quitter le combat soigne\nles problèmes de statut."
    it: "Cura i problemi di stato\ndel Pokémon sostituito."
    de: "Heilt bei Austausch\nStatusprobleme."
    es: "Cura problemas de estado\nal cambiar de Pokémon."
    ko: "배틀에서 일단 물러나면\n상태 이상이 회복된다."
no_guard:
  names:
    jp_kana: ノーガード
    jp_kanji: ノーガード
    en: No Guard
    fr: Annule Garde
    it: Nullodifesa
    de: Schildlos
    es: Indefenso
    ko: 노가드
  descriptions:
    jp_kana: "おたがいの　わざが\nかならず　あたる。"
    jp_kanji: "お互いの　技が\n必ず　当たる。"
    en: "Ensures attacks by or\nagainst the Pokémon land."
    fr: "Capacités du Pokémon et\nde l’ennemi réussissent."
    it: "Le mosse di entrambi i\nPokémon vanno a segno."
    de: "Attacken d. Pokémon u. v.\nAngreifern treffen immer."
    es: "El movimiento del Pokémon\ny el del rival acertarán."
    ko: "서로의 기술이\n반드시 맞는다."
normalize:
  names:
    jp_kana: ノーマルスキン
    jp_kanji: ノーマルスキン
    en: Normalize
    fr: Normalise
    it: Normalità
    de: Regulierung
    es: Normalidad
    ko: 노말스킨
  descriptions:
    jp_kana: "だしたわざが　すべて\nノーマルタイプに　なる。"
    jp_kanji: "だした技が　すべて\nノーマルタイプに　なる。"
    en: "All the Pokémon’s moves\nbecome the Normal type."
    fr: "Toutes les capacités sont\nde type Normal."
    it: "Le mosse del Pokémon\ndiventano di tipo Normale."
    de: "Alle Attacken des Pokémon\nwerden zu Normal-Att."
    es: "Todos los movimientos se\nvuelven de tipo Normal."
    ko: "쓴 기술이 모두\n노말타입이 된다."
oblivious:
  names:
    jp_kana: どんかん
    jp_kanji: どんかん
    en: Oblivious
    fr: Benêt
    it: Indifferenza
    de: Dösigkeit
    es: Despiste
    ko: 둔감
  descriptions:
    jp_kana: "メロメロ　じょうたいに\nならない。"
    jp_kanji: "メロメロ　状態に\nならない。"
    en: "Prevents it from\nbecoming infatuated."
    fr: "Empêche le Pokémon de\ntomber amoureux."
    it: "Impedisce al Pokémon di\ninfatuarsi."
    de: Verhindert Anziehung.
    es: "Evita que el Pokémon\nse enamore."
    ko: "헤롱헤롱 상태가\n되지 않는다."
overcoat:
  names:
    jp_kana: ぼうじん
    jp_kanji: ぼうじん
    en: Overcoat
    fr: Envelocape
    it: Copricapo
    de: Wetterfest
    es: Funda
    ko: 방진
  descriptions:
    jp_kana: "てんきの　えいきょうで\nダメージを　うけない。"
    jp_kanji: "天気の　影響で\nダメージを　受けない。"
    en: "Protects the Pokémon from\ndamage from weather."
    fr: "Neutralise les dégâts dus\nà la météo."
    it: "Non subisce danni causati\ndalle condizioni meteo."
    de: "Nimmt keinen Schaden\ndurch Wetterbedingungen."
    es: "Anula los daños causados\npor el tiempo atmosférico."
    ko: "날씨의 영향으로\n데미지를 입지 않는다."
overgrow:
  names:
    jp_kana: しんりょく
    jp_kanji: しんりょく
    en: Overgrow
    fr: Engrais
    it: Erbaiuto
    de: Notdünger
    es: Espesura
    ko: 심록
  descriptions:
    jp_kana: "ピンチのとき　くさの\nいりょくが　あがる。"
    jp_kanji: "ピンチのとき　くさの\n威力が　あがる。"
    en: "Powers up Grass-type\nmoves in a pinch."
    fr: "Booste les capacités\nPlante en cas de besoin."
    it: "In difficoltà, potenzia\nle mosse di tipo Erba."
    de: "Stärkt Pflanzen-Attacken,\nwenn Not am Mann ist."
    es: "Potencia los ataques de\ntipo Planta en un apuro."
    ko: "위급할 때 풀타입의\n위력이 올라간다."
own_tempo:
  names:
    jp_kana: マイペース
    jp_kanji: マイペース
    en: Own Tempo
    fr: Tempo Perso
    it: Mente Locale
    de: Tempomacher
    es: Ritmo Propio
    ko: 마이페이스
  descriptions:
    jp_kana: "こんらん　じょうたいに\nならない。"
    jp_kanji: "混乱状態に\nならない。"
    en: "Prevents the Pokémon\nfrom becoming confused."
    fr: Empêche la confusion.
    it: "Impedisce al Pokémon\ndi venire confuso."
    de: Verhindert Verwirrung.
    es: Evita ser confundido.
    ko: "혼란 상태가\n되지 않는다."
pickpocket:
  names:
    jp_kana: わるいてぐせ
    jp_kanji: わるいてぐせ
    en: Pickpocket
    fr: Pickpocket
    it: Arraffalesto
    de: Langfinger
    es: Hurto
    ko: 나쁜손버릇
  descriptions:
    jp_kana: "さわられた　あいてから\nどうぐを　ぬすむ。"
    jp_kanji: "触られた　相手から\n道具を　盗む。"
    en: "Steals an item when hit\nby another Pokémon."
    fr: "Vole l’objet de l’ennemi\nsi son attaque touche."
    it: "Al contatto subito, ruba\nlo strumento nemico."
    de: "Stiehlt Item, wenn es\nvon Träger berührt wird."
    es: "Al ser golpeado, roba\nel objeto del objetivo."
    ko: "닿은 상대로부터\n도구를 훔친다."
pickup:
  names:
    jp_kana: ものひろい
    jp_kanji: ものひろい
    en: Pickup
    fr: Ramassage
    it: Raccolta
    de: Mitnahme
    es: Recogida
    ko: 픽업
  descriptions:
    jp_kana: "どうぐを　ひろってくる\nことが　ある。"
    jp_kanji: "道具を　拾ってくる\nことが　ある。"
    en: "The Pokémon may\npick up items."
    fr: "Permet parfois au Pokémon\nde ramasser des objets."
    it: "Aumenta la probabilità\ndi trovare strumenti."
    de: "Hebt gelegentlich Items\nauf."
    es: "El Pokémon puede\nencontrar objetos."
    ko: "도구를 주워올\n때가 있다."
plus:
  names:
    jp_kana: プラス
    jp_kanji: プラス
    en: Plus
    fr: Plus
    it: Più
    de: Plus
    es: Más
    ko: 플러스
  descriptions:
    jp_kana: "プラスかマイナスがいると\nとくこうが　あがる。"
    jp_kanji: "プラスかマイナスがいると\n特攻が　あがる。"
    en: "Ups Sp. Atk if another\nPokémon has Plus or Minus."
    fr: "Augmente l’Atq. Spé. si un\nPokémon a Minus ou Plus."
    it: "Aumenta l’Attacco Speciale\nse ci sono Meno o Più."
    de: "Erhöht Sp.-Ang., wenn Plus\noder Minus vertreten sind."
    es: "Potencia el At. Esp. si\notro tiene Más o Menos."
    ko: "플러스나 마이너스가 있으면\n특수공격이 올라간다."
poison_heal:
  names:
    jp_kana: ポイズンヒール
    jp_kanji: ポイズンヒール
    en: Poison Heal
    fr: Soin Poison
    it: Velencura
    de: Aufheber
    es: Antídoto
    ko: 포이즌힐
  descriptions:
    jp_kana: "どくじょうたいに　なると\nＨＰを　かいふくする。"
    jp_kanji: "どく状態に　なると\nＨＰを　回復する。"
    en: "Restores HP if the\nPokémon is poisoned."
    fr: "Restaure des PV si le\nPokémon est empoisonné."
    it: "Ridà PS se il Pokémon\nè avvelenato."
    de: "Steigert KP, wenn das\nPokémon vergiftet ist."
    es: "Recupera PS si el Pokémon\nha sido envenenado."
    ko: "독 상태가 되면\nHP를 회복한다."
poison_point:
  names:
    jp_kana: どくのトゲ
    jp_kanji: どくのトゲ
    en: Poison Point
    fr: Point Poison
    it: Velenopunto
    de: Giftdorn
    es: Punto Tóxico
    ko: 독가시
  descriptions:
    jp_kana: "ふれた　あいてに　どくを\nおわせる　ことがある。"
    jp_kanji: "触れた　相手に　毒を\nおわせる　ことがある。"
    en: "Contact with the Pokémon\nmay poison the attacker."
    fr: "Peut empoisonner l’ennemi\ns’il y a contact."
    it: "Al contatto subito, può\navvelenare il nemico."
    de: "Vergiftet den Angreifer\neventuell bei Berührung."
    es: "Puede envenenar al\nmínimo contacto."
    ko: "접촉한 상대를\n중독 시킬 때가 있다."
poison_touch:
  names:
    jp_kana: どくしゅ
    jp_kanji: どくしゅ
    en: Poison Touch
    fr: Toxitouche
    it: Velentocco
    de: Giftgriff
    es: Toque Tóxico
    ko: 독수
  descriptions:
    jp_kana: "さわるだけで　あいてを　\nどくにすることがある。"
    jp_kanji: "触るだけで　相手を　\n毒にすることがある。"
    en: "May poison targets when a\nPokémon makes contact."
    fr: "Peut empoisonner l’ennemi\npar simple contact."
    it: "Può avvelenare il nemico\nal solo contatto fisico."
    de: "Kann Ziel durch bloßes\nBerühren vergiften."
    es: "Puede envenenar al\nobjetivo con solo tocarlo."
    ko: "접촉하기만 해도 상대를\n독 상태로 만들 때가 있다."
prankster:
  names:
    jp_kana: いたずらごころ
    jp_kanji: いたずらごころ
    en: Prankster
    fr: Farceur
    it: Burla
    de: Strolch
    es: Bromista
    ko: 짓궂은마음
  descriptions:
    jp_kana: "へんかわざを　せんせいで\nだすことが　できる。"
    jp_kanji: "変化技を　先制で\nだすことが　できる。"
    en: "Gives priority to a\nstatus move."
    fr: "Utilise les attaques de\nstatut en premier."
    it: "Dà priorità a mosse che\nalterano lo stato."
    de: "Ermöglicht Erstschlag\nmit Status-Attacken."
    es: "Permite lanzar primero\nun ataque de estado."
    ko: "변화 기술을 먼저\n쓸 수 있다."
pressure:
  names:
    jp_kana: プレッシャー
    jp_kanji: プレッシャー
    en: Pressure
    fr: Pression
    it: Pressione
    de: Erzwinger
    es: Presión
    ko: 프레셔
  descriptions:
    jp_kana: "あいての　つかう　わざの\nＰＰを　おおく　へらす。"
    jp_kanji: "相手の　使う　技の\nＰＰを　多く　減らす。"
    en: "The Pokémon raises the\nfoe’s PP usage."
    fr: "Force l’ennemi à\ndépenser plus de PP."
    it: Il nemico usa più PP.
    de: "Steigert den Verbrauch\nder AP des Gegners."
    es: "Hace que los PP del rival\nse acaben antes."
    ko: "상대가 사용하는 기술의\nPP를 많이 줄인다."
pure_power:
  names:
    jp_kana: ヨガパワー
    jp_kanji: ヨガパワー
    en: Pure Power
    fr: Force Pure
    it: Forzapura
    de: Mentalkraft
    es: Energía Pura
    ko: 순수한힘
  descriptions:
    jp_kana: "ぶつり　こうげきの\nいりょくが　あがる。"
    jp_kanji: "物理攻撃の\n威力が　あがる。"
    en: "Raises the Pokémon’s\nAttack stat."
    fr: "Augmente l’Attaque du\nPokémon."
    it: "Migliora la statistica\nAttacco del Pokémon."
    de: "Stärkt physische\nAttacken."
    es: Aumenta el Ataque.
    ko: "물리 공격의\n위력이 올라간다."
quick_feet:
  names:
    jp_kana: はやあし
    jp_kanji: はやあし
    en: Quick Feet
    fr: Pied Véloce
    it: Piedisvelti
    de: Rasanz
    es: Pies Rápidos
    ko: 속보
  descriptions:
    jp_kana: "じょうたい　いじょうで\nすばやさが　あがる。"
    jp_kanji: "状態異常で\n素早さが　あがる。"
    en: "Boosts Speed if there is\na status problem."
    fr: "Augmente la Vitesse en cas\nde problème de statut."
    it: "Aumenta la Velocità se\nc’è un problema di stato."
    de: "Erhöht Initiative bei\nStatusproblemen."
    es: "Potencia la Velocidad si\nhay problemas de estado."
    ko: "상태 이상이 되면\n스피드가 올라간다."
rain_dish:
  names:
    jp_kana: あめうけざら
    jp_kanji: あめうけざら
    en: Rain Dish
    fr: Cuvette
    it: Copripioggia
    de: Regengenuss
    es: Cura Lluvia
    ko: 젖은접시
  descriptions:
    jp_kana: "あめのとき　すこしずつ\nＨＰを　かいふくする。"
    jp_kanji: "雨のとき　少しずつ\nＨＰを　回復する。"
    en: "The Pokémon gradually\nregains HP in rain."
    fr: "Récupère progressivement\ndes PV par temps de pluie."
    it: "Il Pokémon recupera PS\nquando piove."
    de: "Langsame Wiederherstellg.\nvon KP bei Regen."
    es: "El Pokémon gana PS\ngradualmente si llueve."
    ko: "비가 올 때 조금씩\nHP를 회복한다."
rattled:
  names:
    jp_kana: びびり
    jp_kanji: びびり
    en: Rattled
    fr: Phobique
    it: Paura
    de: Hasenfuß
    es: Cobardía
    ko: 주눅
  descriptions:
    jp_kana: "びびって　すばやさが\nあがる　タイプがある。"
    jp_kanji: "びびって　素早さが\nあがる　タイプがある。"
    en: "Some move types scare\nit and boost its Speed."
    fr: "Sa peur de certains types\naugmente sa Vitesse."
    it: "Per la paura di certi tipi\ndi mosse la Velocità sale."
    de: "Aus Angst vor manchen\nAttacken steigt die Init."
    es: "El miedo a algunos ataques\nsube su Velocidad."
    ko: "주눅이 들어 스피드가\n올라가는 타입이 있다."
reckless:
  names:
    jp_kana: すてみ
    jp_kanji: すてみ
    en: Reckless
    fr: Téméraire
    it: Temerarietà
    de: Achtlos
    es: Audaz
    ko: 이판사판
  descriptions:
    jp_kana: "はんどうで　ダメージを\nうけるわざが　つよくなる。"
    jp_kanji: "反動で　ダメージを\n受ける技が　強くなる。"
    en: "Powers up moves that\nhave recoil damage."
    fr: "Booste les cap. ayant des\ndégâts de contrecoups."
    it: "Potenzia le mosse che\nprovocano contraccolpi."
    de: "Steigert Attacken mit\nRückstoß-Schaden."
    es: "Potencia los movimientos\nque dañan al usuario."
    ko: "반동 데미지를\n받는 기술이 강해진다."
regenerator:
  names:
    jp_kana: さいせいりょく
    jp_kanji: さいせいりょく
    en: Regenerator
    fr: Régé-Force
    it: Rigenergia
    de: Belebekraft
    es: Regeneración
    ko: 재생력
  descriptions:
    jp_kana: "ひっこめると ＨＰが\nすこし　かいふくする。"
    jp_kanji: "ひっこめると ＨＰが\n少し　回復する。"
    en: "Restores a little HP when\nwithdrawn from battle."
    fr: "Restaure un peu de PV\nsi le Pokémon est retiré."
    it: "Recupera un po’ di PS\nquando viene sostituito."
    de: "Heilt beim Austauschen\neine geringe Menge an KP."
    es: "Recupera unos pocos PS\nal cambiar de Pokémon."
    ko: "볼에 넣으면 HP가\n조금 회복된다."
rivalry:
  names:
    jp_kana: とうそうしん
    jp_kanji: とうそうしん
    en: Rivalry
    fr: Rivalité
    it: Antagonismo
    de: Rivalität
    es: Rivalidad
    ko: 투쟁심
  descriptions:
    jp_kana: "あいてと　せいべつが\nおなじだと　つよくなる。"
    jp_kanji: "相手と　性別が\n同じだと　強くなる。"
    en: "Deals more damage to a\nPokémon of same gender."
    fr: "Devient plus fort si\nl’ennemi est du même sexe."
    it: "Rende più forti contro\nnemici dello stesso sesso."
    de: "Erhöht Schaden, wenn Ziel\ndasselbe Geschlecht hat."
    es: "Si el objetivo es del mismo\nsexo, inflige más daño."
    ko: "상대와 성별이\n같으면 강해진다."
rock_head:
  names:
    jp_kana: いしあたま
    jp_kanji: いしあたま
    en: Rock Head
    fr: Tête de Roc
    it: Testadura
    de: Steinhaupt
    es: Cabeza Roca
    ko: 돌머리
  descriptions:
    jp_kana: "ぶつかっても\nはんどうを　うけない。"
    jp_kanji: "ぶつかっても\n反動を　受けない。"
    en: "Protects the Pokémon\nfrom recoil damage."
    fr: "Protège le Pokémon des\ndégâts de contrecoups."
    it: "Protegge il Pokémon dai\ncontraccolpi."
    de: "Verhindert Schaden, der\ndurch Rückstoß entsteht."
    es: "Impide que el Pokémon\nse dañe con sus movs."
    ko: "부딪쳐도\n반동을 받지 않는다."
rough_skin:
  names:
    jp_kana: さめはだ
    jp_kanji: さめはだ
    en: Rough Skin
    fr: Peau Dure
    it: Cartavetro
    de: Rauhaut
    es: Piel Tosca
    ko: 까칠한피부
  descriptions:
    jp_kana: "ふれた　あいてを\nキズつける。"
    jp_kanji: "触れた　相手を\nキズつける。"
    en: "Inflicts damage to the\nattacker on contact."
    fr: "Le Pokémon blesse\nl’ennemi qui le touche."
    it: "Danneggia il nemico\nal minimo contatto fisico."
    de: "Verletzt Angreifer\nbei Berührung."
    es: Hiere al tacto.
    ko: "접촉한 상대에게\n상처를 입힌다."
run_away:
  names:
    jp_kana: にげあし
    jp_kanji: にげあし
    en: Run Away
    fr: Fuite
    it: Fugafacile
    de: Angsthase
    es: Fuga
    ko: 도주
  descriptions:
    jp_kana: "やせいの　ポケモンから\nかならず　にげられる。"
    jp_kanji: "野生の　ポケモンから\n必ず　逃げられる。"
    en: "Enables a sure getaway\nfrom wild Pokémon."
    fr: "Permet de fuir n’importe\nquel Pokémon sauvage."
    it: "Garantisce la fuga dai\nPokémon selvatici."
    de: "Die Flucht vor wilden\nPokémon gelingt immer."
    es: "Permite escapar de todos\nlos Pokémon salvajes."
    ko: "야생 포켓몬으로부터\n반드시 도망칠 수 있다."
sand_force:
  names:
    jp_kana: すなのちから
    jp_kanji: すなのちから
    en: Sand Force
    fr: Force Sable
    it: Silicoforza
    de: Sandgewalt
    es: Poder Arena
    ko: 모래의힘
  descriptions:
    jp_kana: "すなあらしで　いりょくが\nあがる　わざがある。"
    jp_kanji: "砂あらしで　威力が\nあがる　技がある。"
    en: "Boosts certain moves’\npower in a sandstorm."
    fr: "Renforce des capacités en\ncas de tempête de sable."
    it: "Potenzia alcune mosse\nnelle tempeste di sabbia."
    de: "Manche Attacken wirken\nin Sandstürmen besser."
    es: "Potencia algunos movs.\nen tormentas de arena."
    ko: "모래바람으로 위력이\n올라가는 기술이 있다."
sand_rush:
  names:
    jp_kana: すなかき
    jp_kanji: すなかき
    en: Sand Rush
    fr: Baigne Sable
    it: Remasabbia
    de: Sandscharrer
    es: Ímpetu Arena
    ko: 모래헤치기
  descriptions:
    jp_kana: "すなあらしで\nすばやさが　あがる。"
    jp_kanji: "砂あらしで\n素早さが　あがる。"
    en: "Boosts the Pokémon’s\nSpeed in a sandstorm."
    fr: "Augmente la Vitesse lors\ndes tempêtes de sable."
    it: "La Velocità aumenta\nnelle tempeste di sabbia."
    de: "Erhöht in Sandstürmen\ndie Initiative."
    es: "Aumenta la Velocidad en\ntormentas de arena."
    ko: "모래바람으로\n스피드가 올라간다."
sand_stream:
  names:
    jp_kana: すなおこし
    jp_kanji: すなおこし
