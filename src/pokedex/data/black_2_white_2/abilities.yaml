    fr: "Augmente la puissance\ndes coups critiques."
    it: "Potenzia le mosse se\ndiventano brutti colpi."
    de: "Steigert den Schaden\nvon Volltreffern."
    es: "Potencia los movimientos\nsi se vuelven críticos."
