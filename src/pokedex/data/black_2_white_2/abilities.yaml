    fr: "Affaiblit les capacités\n“super efficaces”."
    it: "Riduce i danni delle\nmosse superefficaci."
    de: "Senkt die Stärke sehr\neffektiver Attacken."
    es: "Mitiga los movimientos\nsupereficaces."
    ko: "효과가 굉장한 기술의\n위력을 약하게 한다."
soundproof:
  names:
    jp_kana: ぼうおん
    jp_kanji: ぼうおん
    en: Soundproof
    fr: Anti-Bruit
    it: Antisuono
    de: Lärmschutz
    es: Insonorizar
    ko: 방음
  descriptions:
    jp_kana: "おとの　わざを\nうけない。"
    jp_kanji: "音の　技を\n受けない。"
    en: "Gives full immunity to all\nsound-based moves."
    fr: "Protège de toutes les\ncapacités sonores."
    it: "Fornisce immunità dalle\nmosse basate sul suono."
    de: "Immun gegen Lärm-\nAttacken."
    es: Evita ataques de sonido.
    ko: "소리 기술을\n받지 않는다."
speed_boost:
  names:
    jp_kana: かそく
    jp_kanji: かそく
    en: Speed Boost
    fr: Turbo
    it: Acceleratore
    de: Temposchub
    es: Impulso
    ko: 가속
  descriptions:
    jp_kana: "ちょっとずつ\nすばやく　なっていく。"
    jp_kanji: "ちょっとずつ\n素早く　なっていく。"
    en: "Its Speed stat is\ngradually boosted."
    fr: "La Vitesse du Pokémon\naugmente progressivement."
    it: "La statistica Velocità\naumenta gradualmente."
    de: "Erhöht Initiative nach\nund nach."
    es: "Aumenta la Velocidad\ngradualmente."
    ko: "조금씩\n스피드가 높아진다."
stall:
  names:
    jp_kana: あとだし
    jp_kanji: あとだし
