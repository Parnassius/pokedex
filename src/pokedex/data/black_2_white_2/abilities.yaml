    jp_kana: "でんきを　うけると\nすばやさが　あがる。"
    jp_kanji: "でんきを　受けると\n素早さが　あがる。"
    en: "Raises Speed if hit by an\nElectric-type move."
    fr: "Augmente la Vit. si touché\npar une cap. Électrik."
    it: "Le mosse elettro subite\naumentano la Velocità."
    de: "Erhöht Initiative nach\neiner Elektro-Attacke."
    es: "Sube la Velocidad si le\nda un ataque eléctrico."
    ko: "전기를 받으면\n스피드가 올라간다."
moxie:
  names:
    jp_kana: じしんかじょう
    jp_kanji: じしんかじょう
    en: Moxie
    fr: Impudence
    it: Arroganza
    de: Hochmut
    es: Autoestima
    ko: 자기과신
  descriptions:
    jp_kana: "あいてを　たおすと\nこうげきが　あがる。"
    jp_kanji: "相手を　倒すと\n攻撃が　あがる。"
    en: "Boosts Attack after\nknocking out any Pokémon."
    fr: "Monte l’Attaque quand\nil met un ennemi K.O."
    it: "Aumenta l’Attacco quando\nmanda un nemico KO."
    de: "Besiegt es ein Pokémon,\nsteigt sein Angriffs-Wert."
    es: "Potencia el Ataque al\ndebilitar a un objetivo."
    ko: "상대를 쓰러뜨리면\n공격이 올라간다."
multiscale:
  names:
    jp_kana: マルチスケイル
    jp_kanji: マルチスケイル
