    ko: "플러스나 마이너스가 있으면\n특수공격이 올라간다."
mold_breaker:
  names:
    jp_kana: かたやぶり
    jp_kanji: かたやぶり
    en: Mold Breaker
    fr: Brise Moule
    it: Rompiforma
    de: Überbrückung
    es: Rompemoldes
    ko: 틀깨기
