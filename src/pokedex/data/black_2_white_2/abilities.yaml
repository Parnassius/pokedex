adaptability:
  names:
    jp_kana: てきおうりょく
    jp_kanji: てきおうりょく
    en: Adaptability
    fr: Adaptabilité
    it: Adattabilità
    de: Anpassung
    es: Adaptable
    ko: 적응력
  descriptions:
    jp_kana: "タイプが　おなじ　わざの\nいりょくが　あがる。"
    jp_kanji: "タイプが　同じ　技の\n威力が　あがる。"
    en: "Powers up moves of the\nsame type."
    fr: "Augmente la puissance des\ncapacités de même type."
    it: "Potenzia le mosse del\ntipo del Pokémon."
    de: "Steigert Attacken\ndesselben Typs."
    es: "Potencia los movimientos\ndel mismo tipo."
    ko: "타입이 같은 기술의\n위력이 올라간다."
aftermath:
  names:
    jp_kana: ゆうばく
    jp_kanji: ゆうばく
    en: Aftermath
    fr: Boom Final
    it: Scoppio
    de: Finalschlag
    es: Resquicio
    ko: 유폭
  descriptions:
    jp_kana: "ひんしの　ときに　ふれた\nあいてに　ダメージ。"
    jp_kanji: "ひんしの　ときに　触れた\n相手に　ダメージ。"
    en: "Damages the attacker\nlanding the finishing hit."
    fr: "Blesse l’ennemi qui\nporte le coup de grâce."
    it: "Arreca danni al nemico che\nsferra il colpo finale."
    de: "Schadet Angreifer, der\nfinale Attacke landet."
    es: "Daña al agresor que le ha\ndado el golpe de gracia."
    ko: "기절할 때 스친\n상대에게 데미지를 준다."
air_lock:
  names:
    jp_kana: エアロック
    jp_kanji: エアロック
    en: Air Lock
    fr: Air Lock
    it: Riparo
    de: Klimaschutz
    es: Bucle Aire
    ko: 에어록
  descriptions:
    jp_kana: "てんきの　えいきょうが\nなくなる。"
    jp_kanji: "天気の　影響が\nなくなる。"
    en: "Eliminates the effects of\nweather."
    fr: "Annule les effets du\nclimat."
    it: "Neutralizza gli effetti dei\ncambiamenti atmosferici."
    de: Hebt Wetter-Effekte auf.
    es: "Anula los efectos del\ntiempo atmosférico."
    ko: "날씨의 영향이\n없어진다."
analytic:
  names:
    jp_kana: アナライズ
    jp_kanji: アナライズ
    en: Analytic
    fr: Analyste
    it: Ponderazione
    de: Analyse
    es: Cálc. Final
    ko: 애널라이즈
  descriptions:
    jp_kana: "いちばん　さいごに\nわざをだすと　つよくなる。"
    jp_kanji: "一番　最後に\n技をだすと　強くなる。"
    en: "Boosts move power when\nthe Pokémon moves last."
    fr: "Booste les capacités s’il\nattaque en dernier."
    it: "Se agisce per ultimo, la\npotenza della mossa sale."
    de: "Greift das Pokémon zuletzt\nan, ist es stärker."
    es: "Potencia el movimiento\nsi es el último en atacar."
    ko: "제일 마지막에\n기술을 쓰면 강해진다."
anger_point:
  names:
    jp_kana: いかりのつぼ
    jp_kanji: いかりのつぼ
    en: Anger Point
    fr: Colérique
    it: Grancollera
    de: Kurzschluss
    es: Irascible
    ko: 분노의경혈
  descriptions:
    jp_kana: "きゅうしょに　うけると\nこうげきが　あがる。"
    jp_kanji: "急所に　受けると\n攻撃が　あがる。"
    en: "Maxes Attack after\ntaking a critical hit."
    fr: "Monte l’Attaque au max\naprès un coup critique."
    it: "Massimizza l’Attacco se si\nsubisce un brutto colpo."
    de: "Maximiert Angriff n. Ein-\nstecken e. Volltreffers."
    es: "Sube el Ataque al máximo\ntras un golpe crítico."
    ko: "급소에 맞으면\n공격이 올라간다."
anticipation:
  names:
    jp_kana: きけんよち
    jp_kanji: きけんよち
    en: Anticipation
    fr: Anticipation
    it: Presagio
    de: Vorahnung
    es: Anticipación
    ko: 위험예지
  descriptions:
    jp_kana: "あいての　もつ　きけんな\nわざを　さっちする。"
    jp_kanji: "相手の　持つ　危険な\n技を　察知する。"
    en: "Senses a foe’s\ndangerous moves."
    fr: "Prévoit les capacités\nennemies dangereuses."
    it: "Rivela se il nemico ha\nmosse pericolose."
    de: "Ahnt gefährliche Attacken\ndes Gegners voraus."
    es: "Prevé los movimientos\npeligrosos del rival."
    ko: "상대가 지닌 위험한\n기술을 감지한다."
arena_trap:
  names:
    jp_kana: ありじごく
    jp_kanji: ありじごく
    en: Arena Trap
    fr: Piège
    it: Trappoarena
    de: Ausweglos
    es: Trampa Arena
    ko: 개미지옥
  descriptions:
    jp_kana: "せんとうで　あいてを\nにげられなくする。"
    jp_kanji: "戦闘で　相手を\n逃げられなくする。"
    en: "Prevents the foe from\nfleeing."
    fr: "Empêche l’ennemi de\ns’enfuir."
    it: "Impedisce la fuga al\nnemico."
    de: "Verhindert Flucht\ndes Gegners."
    es: Evita que el rival huya.
    ko: "배틀에서 상대를\n도망칠 수 없게 한다."
bad_dreams:
  names:
    jp_kana: ナイトメア
    jp_kanji: ナイトメア
    en: Bad Dreams
    fr: Mauvais Rêve
    it: Sogniamari
    de: Alptraum
    es: Mal Sueño
    ko: 나이트메어
  descriptions:
    jp_kana: "ねむっている　あいての\nＨＰを　へらす。"
    jp_kanji: "ねむっている　相手の\nＨＰを　減らす。"
    en: "Reduces a sleeping\nfoe’s HP."
    fr: "Réduit les PV d’un ennemi\nendormi."
    it: "Riduce i PS dei nemici\naddormentati."
    de: "Senkt die KP eines\nschlafenden Gegners."
    es: "Reduce los PS de un rival\nmientras duerme."
    ko: "잠들어 있는 상대의\nHP를 줄인다."
battle_armor:
  names:
    jp_kana: カブトアーマー
    jp_kanji: カブトアーマー
    en: Battle Armor
    fr: Armurbaston
    it: Lottascudo
    de: Kampfpanzer
    es: Armad. Bat.
    ko: 전투무장
  descriptions:
    jp_kana: "あいての　こうげきが\nきゅうしょに　あたらない。"
    jp_kanji: "相手の　攻撃が\n急所に　当たらない。"
    en: "The Pokémon is protected\nagainst critical hits."
    fr: "Le Pokémon est protégé\ndes coups critiques."
    it: "Evita che il Pokémon\nsubisca brutti colpi."
    de: "Wehrt gegnerische\nVolltreffer ab."
    es: Bloquea golpes críticos.
    ko: "상대의 공격이\n급소에 맞지 않는다."
big_pecks:
  names:
    jp_kana: はとむね
    jp_kanji: はとむね
    en: Big Pecks
    fr: Cœur de Coq
    it: Pettinfuori
    de: Brustbieter
    es: Sacapecho
    ko: 부풀린가슴
  descriptions:
    jp_kana: "ぼうぎょを　さげる\nこうげきを　うけない。"
    jp_kanji: "防御を　さげる\n攻撃を　受けない。"
    en: "Protects the Pokémon from\nDefense-lowering attacks."
    fr: "Empêche la Déf. de baisser\nà cause d’attaques."
    it: "Evita che la Difesa\ndiminuisca."
    de: "Hindert Angreifer, die\nVerteidigung zu senken."
    es: "Protege de los ataques\nque bajan la Defensa."
    ko: "방어를 떨어뜨리는\n공격을 받지 않는다."
blaze:
  names:
    jp_kana: もうか
    jp_kanji: もうか
    en: Blaze
    fr: Brasier
    it: Aiutofuoco
    de: Großbrand
    es: Mar Llamas
    ko: 맹화
  descriptions:
    jp_kana: "ピンチのとき　ほのおの\nいりょくが　あがる。"
    jp_kanji: "ピンチのとき　ほのおの\n威力が　あがる。"
    en: "Powers up Fire-type\nmoves in a pinch."
    fr: "Booste les capacités\nFeu en cas de besoin."
    it: "In difficoltà, potenzia\nle mosse di tipo Fuoco."
    de: "Stärkt Feuer-Attacken,\nwenn Not am Mann ist."
    es: "Potencia los ataques de\ntipo Fuego en un apuro."
    ko: "위급할 때 불꽃타입의\n위력이 올라간다."
chlorophyll:
  names:
    jp_kana: ようりょくそ
    jp_kanji: ようりょくそ
    en: Chlorophyll
    fr: Chlorophyle
    it: Clorofilla
    de: Chlorophyll
    es: Clorofila
    ko: 엽록소
  descriptions:
    jp_kana: "はれのとき　すばやさが\nあがる。"
    jp_kanji: "晴れのとき　素早さが\nあがる。"
    en: "Boosts the Pokémon’s\nSpeed in sunshine."
    fr: "Augmente la Vitesse du\nPokémon s’il y a du soleil."
    it: "Se c’è sole, la statistica\nVelocità aumenta."
    de: "Steigert Initiative bei\nSonnenschein."
    es: "Sube la Velocidad cuando\nhay sol."
    ko: "맑을 때 스피드가\n올라간다."
clear_body:
  names:
    jp_kana: クリアボディ
    jp_kanji: クリアボディ
    en: Clear Body
    fr: Corps Sain
    it: Corpochiaro
    de: Neutraltorso
    es: Cuerpo Puro
    ko: 클리어바디
  descriptions:
    jp_kana: "あいてに　のうりょくを\nさげられない。"
    jp_kanji: "相手に　能力を\nさげられない。"
    en: "Prevents other Pokémon\nfrom lowering its stats."
    fr: "Empêche les stats\ndu Pokémon de baisser."
    it: "Le sue statistiche non\npossono essere ridotte."
    de: "Hindert Angreifer daran,\nStatuswerte zu senken."
    es: "Evita que bajen\nlas características."
    ko: "상대가 능력을\n떨어뜨릴 수 없다."
cloud_nine:
  names:
    jp_kana: ノーてんき
    jp_kanji: ノーてんき
    en: Cloud Nine
    fr: Ciel Gris
    it: Antimeteo
    de: Wolke Sieben
    es: Aclimatación
    ko: 날씨부정
  descriptions:
    jp_kana: "てんきの　えいきょうが\nなくなる。"
    jp_kanji: "天気の　影響が\nなくなる。"
    en: "Eliminates the effects of\nweather."
    fr: "Annule les effets du\nclimat."
    it: "Neutralizza gli effetti dei\ncambiamenti atmosferici."
    de: Hebt Wetter-Effekte auf.
    es: "Anula los efectos del\ntiempo atmosférico."
    ko: "날씨의 영향이\n없어진다."
color_change:
  names:
    jp_kana: へんしょく
    jp_kanji: へんしょく
    en: Color Change
    fr: Déguisement
    it: Cambiacolore
    de: Farbwechsel
    es: Cambio Color
    ko: 변색
  descriptions:
    jp_kana: "うけた　わざの　タイプに\nへんかする。"
    jp_kanji: "受けた　技の　タイプに\n変化する。"
    en: "Changes the Pokémon’s\ntype to the foe’s move."
    fr: "Le Pokémon adopte le type\nde la capacité ennemie."
    it: "Il Pokémon acquisisce il\ntipo della mossa subita."
    de: "Ändert seinen Typ zu dem\nder Att. des Angreifers."
    es: "Cambia el tipo al del\nmovimiento rival."
    ko: "받은 기술의 타입으로\n변화한다."
compound_eyes:
  names:
    jp_kana: ふくがん
    jp_kanji: ふくがん
    en: Compoundeyes
    fr: Œil Composé
    it: Insettocchi
    de: Facettenauge
    es: Ojocompuesto
    ko: 복안
  descriptions:
    jp_kana: "わざの　めいちゅうりつが\nあがる。"
    jp_kanji: "技の　命中率が\nあがる。"
    en: "The Pokémon’s accuracy\nis boosted."
    fr: "Augmente la Précision du\nPokémon."
    it: "Aumenta la precisione\ndel Pokémon."
    de: "Steigert die Genauigkeit\nvon Attacken."
    es: "Aumenta la Precisión\ndel Pokémon."
    ko: "기술의 명중률이\n올라간다."
contrary:
  names:
    jp_kana: あまのじゃく
    jp_kanji: あまのじゃく
    en: Contrary
    fr: Contestation
    it: Inversione
    de: Umkehrung
    es: Respondón
    ko: 심술꾸러기
  descriptions:
    jp_kana: "のうりょくの　へんかが\nぎゃくてんする。"
    jp_kanji: "能力の　変化が\n逆転する。"
    en: "Makes stat changes have\nan opposite effect."
    fr: "Inverse les variations\nde stats."
    it: "I cambi alle statistiche\nhanno effetto inverso."
    de: "Statusveränderungen\nwerden umgekehrt."
    es: "Invierte los cambios\nen las características."
    ko: "능력의 변화가\n역전된다."
cursed_body:
  names:
    jp_kana: のろわれボディ
    jp_kanji: のろわれボディ
    en: Cursed Body
    fr: Corps Maudit
    it: Corpofunesto
    de: Tastfluch
    es: Cue. Maldito
    ko: 저주받은바디
  descriptions:
    jp_kana: "こうげきされると　たまに\nかなしばりにする。"
    jp_kanji: "攻撃されると　たまに\nかなしばりにする。"
    en: "May disable a move used\non the Pokémon."
    fr: "Peut empêcher l’ennemi de\nréutiliser une attaque."
    it: "A volte inibisce l’ultima\nmossa usata dal nemico."
    de: "Blockiert gelegentlich\nAttacken."
    es: "Puede anular el movimiento\nusado en su contra."
    ko: "공격받으면 가끔 상대를\n사슬묶기 상태로 만든다."
cute_charm:
  names:
    jp_kana: メロメロボディ
    jp_kanji: メロメロボディ
    en: Cute Charm
    fr: Joli Sourire
    it: Incantevole
    de: Charmebolzen
    es: Gran Encanto
    ko: 헤롱헤롱바디
  descriptions:
    jp_kana: "ふれると　メロメロに\nすることがある。"
    jp_kanji: "触れると　メロメロに\nすることがある。"
    en: "Contact with the Pokémon\nmay cause infatuation."
    fr: "Séduit parfois l’ennemi\nau contact."
    it: "Al contatto subito, il\nnemico può infatuarsi."
    de: "Kann bei Kontakt\nbetörend wirken."
    es: "Tocar al Pokémon puede\ncausar enamoramiento."
    ko: "스치면 헤롱헤롱 상태가\n될 때가 있다."
damp:
  names:
    jp_kana: しめりけ
    jp_kanji: しめりけ
    en: Damp
    fr: Moiteur
    it: Umidità
    de: Feuchtigkeit
    es: Humedad
    ko: 습기
  descriptions:
    jp_kana: "だれも　ばくはつが\nできなくなる。"
    jp_kanji: "だれも　爆発が\nできなくなる。"
    en: "Prevents the use of\nself-destructing moves."
    fr: "Empêche les combattants\nde s’autodétruire."
    it: "Impedisce le mosse\nautodistruttive."
    de: "Hält alle Pokémon davon\nab zu explodieren."
    es: "Evita que un Pokémon\npueda autodestruirse."
    ko: "누구도 폭발\n할 수 없게 된다."
defeatist:
  names:
    jp_kana: よわき
    jp_kanji: よわき
    en: Defeatist
    fr: Défaitiste
    it: Sconforto
    de: Schwächling
    es: Flaqueza
    ko: 무기력
  descriptions:
    jp_kana: "ＨＰが　はんぶんになると\nのうりょくが　さがる。"
    jp_kanji: "ＨＰが　半分になると\n能力が　さがる。"
    en: "Lowers stats when HP\nbecomes half or less."
    fr: "Baisse les stats quand les\nPV tombent à la moitié."
    it: "Le statistiche scendono se\ni PS calano a metà o meno."
    de: "Bei halbierter KP-Anzahl\nsinken die Statuswerte."
    es: "Baja las características\nal llegar a la mitad los PS."
    ko: "HP가 절반이 되면\n능력이 떨어진다."
defiant:
  names:
    jp_kana: まけんき
    jp_kanji: まけんき
    en: Defiant
    fr: Acharné
    it: Agonismo
    de: Siegeswille
    es: Competitivo
    ko: 오기
  descriptions:
    jp_kana: "のうりょくが　さがると\nこうげきが　あがる。"
    jp_kanji: "能力が　さがると\n攻撃が　あがる。"
    en: "When its stats are lowered\nits Attack increases."
    fr: "Monte l’Attaque quand\nles stats baissent."
    it: "L’Attacco aumenta se\ncalano le statistiche."
    de: "Sinken Statuswerte,\nsteigt der Angriffs-Wert."
    es: "Sube el Ataque si bajan\nlas características."
    ko: "능력이 떨어지면\n공격이 올라간다."
download:
  names:
    jp_kana: ダウンロード
    jp_kanji: ダウンロード
    en: Download
    fr: Télécharge
    it: Download
    de: Download
    es: Descarga
    ko: 다운로드
  descriptions:
    jp_kana: "あいての　のうりょくを\nみて　つよさを　かえる。"
    jp_kanji: "相手の　能力を　みて\n強さを　変える。"
    en: "Adjusts power according\nto a foe’s defenses."
    fr: "Ajuste la puissance selon\nl’ennemi."
    it: "Regola la potenza in base\nal nemico."
    de: "Passt Kraft entsprechend\nder gegn. Statuswerte an."
    es: "Adapta su fuerza para\ncada rival."
    ko: "상대의 능력을\n보고 능력치를 바꾼다."
drizzle:
  names:
    jp_kana: あめふらし
    jp_kanji: あめふらし
    en: Drizzle
    fr: Crachin
    it: Piovischio
    de: Niesel
    es: Llovizna
    ko: 잔비
  descriptions:
    jp_kana: "せんとうに　でると\nあめを　ふらす。"
    jp_kanji: "戦闘に　でると\n雨を　降らす。"
    en: "The Pokémon makes it rain\nif it appears in battle."
    fr: "Le Pokémon invoque la pluie\nquand il entre au combat."
    it: "Quando scende in campo,\nil Pokémon attira pioggia."
    de: "Ruft im Kampf\nRegen herbei."
    es: "Hace que llueva cuando\nentra en combate."
    ko: "배틀에 나가면\n비를 내린다."
drought:
  names:
    jp_kana: ひでり
    jp_kanji: ひでり
    en: Drought
    fr: Sécheresse
    it: Siccità
    de: Dürre
    es: Sequía
    ko: 가뭄
  descriptions:
    jp_kana: "せんとうに　でると\nひざしが　つよくなる。"
    jp_kanji: "戦闘に　でると\n日差しが　強くなる。"
    en: "Turns the sunlight harsh\nif it is in battle."
    fr: "Intensifie les rayons du\nsoleil pendant le combat."
    it: "Aumenta l’intensità dei\nraggi solari nella lotta."
    de: "Erzeugt im Kampf\ngleißendes Sonnenlicht."
    es: "El sol sale si el Pokémon\nentra en combate."
    ko: "배틀에 나가면\n햇살이 강해진다."
dry_skin:
  names:
    jp_kana: かんそうはだ
    jp_kanji: かんそうはだ
    en: Dry Skin
    fr: Peau Sèche
    it: Pellearsa
    de: Trockenheit
    es: Piel Seca
    ko: 건조피부
  descriptions:
    jp_kana: "あついと　ＨＰが　へる。\nみずで　ＨＰを　かいふく。"
    jp_kanji: "あついと　ＨＰが　減る。\nみずで　ＨＰを　回復。"
    en: "Reduces HP if it is hot.\nWater restores HP."
    fr: "Perd des PV à la chaleur.\nL’eau les restaure."
    it: "Riduce PS se fa caldo.\nL’acqua ridà PS."
    de: "Heißes Wetter reduziert\nKP. Wasser steigert KP."
    es: "Pierde PS si hace calor.\nLos recupera con agua."
    ko: "더우면 HP가 줄어든다.\n물로 HP를 회복한다."
early_bird:
  names:
    jp_kana: はやおき
    jp_kanji: はやおき
    en: Early Bird
    fr: Matinal
    it: Sveglialampo
    de: Frühwecker
    es: Madrugar
    ko: 일찍기상
  descriptions:
    jp_kana: おきるのが　はやくなる。
    jp_kanji: 起きるのが　早くなる。
    en: "The Pokémon awakens\nquickly from sleep."
    fr: "Le Pokémon se réveille\nplus rapidement."
    it: "Il Pokémon si risveglia\nrapidamente dal sonno."
    de: Schnelles Aufwachen.
    es: "El Pokémon se despierta\nrápidamente."
    ko: "잠듦 상태에서\n빨리 깨어난다."
effect_spore:
  names:
    jp_kana: ほうし
    jp_kanji: ほうし
    en: Effect Spore
    fr: Pose Spore
    it: Spargispora
    de: Sporenwirt
    es: Efec. Espora
    ko: 포자
  descriptions:
    jp_kana: "ふれると　どく　まひ\nねむりに　することがある。"
    jp_kanji: "触れると　どく　まひ\nねむりに　することがある。"
    en: "Contact may poison or\ncause paralysis or sleep."
    fr: "Peut paralyser, empoison-\nner, endormir au contact."
    it: "Al contatto può causare\nveleno, paralisi o sonno."
    de: "Bei Kontakt evtl. Paraly.,\nVergiftg. oder Schlaf."
    es: "Puede dormir, envenenar\no paralizar al contacto."
    ko: "스치면 독, 마비, 잠듦\n상태가 될 때가 있다."
filter:
  names:
    jp_kana: フィルター
    jp_kanji: フィルター
    en: Filter
    fr: Filtre
    it: Filtro
    de: Filter
    es: Filtro
    ko: 필터
  descriptions:
    jp_kana: "こうかばつぐん　のとき\nいりょくを　よわめる。"
    jp_kanji: "効果バツグン　のとき\n威力を　弱める。"
    en: "Reduces damage from\nsupereffective attacks."
    fr: "Affaiblit les capacités\n“super efficaces”."
    it: "Riduce la potenza delle\nmosse superefficaci."
    de: "Senkt die Stärke sehr\neffektiver Attacken."
    es: "Mitiga los movimientos\nsupereficaces."
    ko: "효과가 굉장한 기술의\n위력을 약하게 한다."
flame_body:
  names:
    jp_kana: ほのおのからだ
    jp_kanji: ほのおのからだ
    en: Flame Body
    fr: Corps Ardent
    it: Corpodifuoco
    de: Flammkörper
    es: Cuerpo Llama
    ko: 불꽃몸
  descriptions:
    jp_kana: "ふれた　あいてを　やけど\nさせることがある。"
    jp_kanji: "触れた　相手を　やけど\nさせることがある。"
    en: "Contact with the Pokémon\nmay burn the attacker."
    fr: "Peut brûler l’ennemi s’il y\na contact."
    it: "Il contatto subito può\nscottare il nemico."
    de: "Verbrennt den Angreifer\neventuell bei Berührung."
    es: "Puede quemar al mínimo\ncontacto."
    ko: "접촉한 상대에게\n화상을 입힐 때가 있다."
flare_boost:
  names:
    jp_kana: ねつぼうそう
    jp_kanji: ねつぼうそう
    en: Flare Boost
    fr: Rage Brûlure
    it: Bruciaimpeto
    de: Hitzewahn
    es: Ím. Ardiente
    ko: 열폭주
  descriptions:
    jp_kana: "やけどのとき　とくしゅの\nいりょくが　あがる。"
    jp_kanji: "やけどのとき　特殊の\n威力が　あがる。"
    en: "Powers up special attacks\nwhen burned."
    fr: "Booste les att. spéciales\nsi le statut est brûlure."
    it: "Aumenta l’Att. Sp. se il\nPokémon è scottato."
    de: "Verstärkt Spezial-Att. im\nFall von Verbrennungen."
    es: "Potencia el Ataque\nEspecial al ser quemado."
    ko: "화상 상태일 때 특수\n공격의 위력이 올라간다."
flash_fire:
  names:
    jp_kana: もらいび
    jp_kanji: もらいび
    en: Flash Fire
    fr: Torche
    it: Fuocardore
    de: Feuerfänger
    es: Absor. Fuego
    ko: 타오르는불꽃
  descriptions:
    jp_kana: "ほのおを　うけると\nほのおわざが　つよくなる。"
    jp_kanji: "ほのおを　受けると\nほのお技が　強くなる。"
    en: "It powers up Fire-type\nmoves if it’s hit by one."
    fr: "Booste capacités Feu si\ntouché par attaque Feu."
    it: "Potenzia le proprie mosse\nfuoco se ne subisce una."
    de: "Verstärkt Feuer-A., wenn\nv. Feuer-A. getroffen."
    es: "Potencia movs. de tipo\nFuego si sufre uno antes."
    ko: "불꽃을 받으면\n불꽃 기술이 강해진다."
flower_gift:
  names:
    jp_kana: フラワーギフト
    jp_kanji: フラワーギフト
    en: Flower Gift
    fr: Don Floral
    it: Regalfiore
    de: Pflanzengabe
    es: Don Floral
    ko: 플라워기프트
  descriptions:
    jp_kana: "はれのとき　じぶんと\nみかたが　つよくなる。"
    jp_kanji: "晴れのとき　自分と\n味方が　強くなる。"
    en: "Powers up party Pokémon\nwhen it is sunny."
    fr: "Pokémon de l’équipe plus\npuissants au soleil."
    it: "Potenzia i Pokémon della\nsquadra se c’è il sole."
    de: "Steigert Effektivität von\nTeam-Pokémon bei Sonne."
    es: "Potencia los Pokémon del\nequipo si está soleado."
    ko: "맑을 때 자신과\n같은 편이 강해진다."
forecast:
  names:
    jp_kana: てんきや
    jp_kanji: てんきや
    en: Forecast
    fr: Météo
    it: Previsioni
    de: Prognose
    es: Predicción
    ko: 기분파
  descriptions:
    jp_kana: "てんきで　ポワルンが\nへんかする。"
    jp_kanji: "天気で　ポワルンが\n変化する。"
    en: "Castform transforms with\nthe weather."
    fr: "Morphéo change de forme\nselon le climat."
    it: "La forma di Castform\ncambia in base al tempo."
    de: "Formeo verändert seine\nForm abhängig vom Wetter."
    es: "Se transforma con el\ntiempo atmosférico."
    ko: "날씨에 따라\n캐스퐁이 변화한다."
forewarn:
  names:
    jp_kana: よちむ
    jp_kanji: よちむ
    en: Forewarn
    fr: Prédiction
    it: Premonizione
    de: Vorwarnung
    es: Alerta
    ko: 예지몽
  descriptions:
    jp_kana: "あいての　もつ　わざを\nよみとることが　できる。"
    jp_kanji: "相手の　持つ　技を\n読み取ることが　できる。"
    en: "Determines what moves\na foe has."
    fr: "Découvre la capacité\nennemie la plus puissante."
    it: "Scopre la mossa più\npotente del nemico."
    de: "Gibt Auskunft über die\nstärkste gegn. Attacke."
    es: "Determina el movimiento\nmás potente del rival."
    ko: "상대가 지닌 기술을\n꿰뚫어볼 수 있다."
friend_guard:
  names:
    jp_kana: フレンドガード
    jp_kanji: フレンドガード
    en: Friend Guard
    fr: Garde Amie
    it: Amicoscudo
    de: Freundeshut
    es: Compiescolta
    ko: 프렌드가드
  descriptions:
    jp_kana: "みかたの　ダメージを\nへらすことができる。"
    jp_kanji: "味方の　ダメージを\n減らすことができる。"
    en: "Reduces damage done\nto allies."
    fr: "Diminue les dégâts subis\npar les alliés."
    it: "Riduce il danno subito dai\ncompagni."
    de: "Verringert den Schaden\nan Mitstreitern."
    es: "Reduce el daño que sufren\nlos aliados."
    ko: "같은 편의 데미지를\n줄일 수 있다."
frisk:
  names:
    jp_kana: おみとおし
    jp_kanji: おみとおし
    en: Frisk
    fr: Fouille
    it: Indagine
    de: Schnüffler
    es: Cacheo
    ko: 통찰
  descriptions:
    jp_kana: "あいての　もちものを\nしることが　できる。"
    jp_kanji: "相手の　持ち物を\n知ることが　できる。"
    en: "The Pokémon can check\na foe’s held item."
    fr: "Permet de connaître\nl’objet tenu par l’ennemi."
    it: "Il Pokémon scopre che\nstrumento ha il nemico."
    de: "Gibt Auskunft über\ngegnerische Items."
    es: "El Pokémon puede ver el\nobjeto que lleva el rival."
    ko: "상대가 지닌 물건을\n알 수 있다."
gluttony:
  names:
    jp_kana: くいしんぼう
    jp_kanji: くいしんぼう
    en: Gluttony
    fr: Gloutonnerie
    it: Voracità
    de: Völlerei
    es: Gula
    ko: 먹보
  descriptions:
    jp_kana: "きのみを　いつもより\nはやく　つかう。"
    jp_kanji: "きのみを　いつもより\n早く　使う。"
    en: "Encourages the early use\nof a held Berry."
    fr: "Encourage l’utilisation\nd’une Baie tenue."
    it: "Favorisce l’uso anticipato\ndi una Bacca tenuta."
    de: "Ermutigt zum frühzeitigen\nVerwenden einer Beere."
    es: "Fomenta el uso rápido de\nla Baya que porte."
    ko: "나무열매를 여느 때보다\n빨리 사용한다."
guts:
  names:
    jp_kana: こんじょう
    jp_kanji: こんじょう
    en: Guts
    fr: Cran
    it: Dentistretti
    de: Adrenalin
    es: Agallas
    ko: 근성
  descriptions:
    jp_kana: "じょうたい　いじょうで\nこうげきが　あがる。"
    jp_kanji: "状態異常で\n攻撃が　あがる。"
    en: "Boosts Attack if there is\na status problem."
    fr: "Augmente l’Attaque s’il y\na un problème de statut."
    it: "Aumenta l’Attacco in\ncaso di problemi di stato."
    de: "Steigert Angriff bei\nStatusproblemen."
    es: "Sube el Ataque si sufre\nun problema de estado."
    ko: "상태 이상이 되면\n공격이 올라간다."
harvest:
  names:
    jp_kana: しゅうかく
    jp_kanji: しゅうかく
    en: Harvest
    fr: Récolte
    it: Coglibacche
    de: Reiche Ernte
    es: Cosecha
    ko: 수확
  descriptions:
    jp_kana: "つかった　きのみを\nなんかいも　つくりだす。"
    jp_kanji: "使った　きのみを\n何回も　つくりだす。"
    en: "May create another\nBerry after one is used."
    fr: "Les Baies utilisées\npeuvent repousser."
    it: "Può ricreare una Bacca\nutilizzata."
    de: "Aufgebrauchte Beeren\nkönnen nachwachsen."
    es: "Permite reutilizar varias\nveces una misma Baya."
    ko: "사용한 나무열매를\n몇 번이고 만들어 낸다."
healer:
  names:
    jp_kana: いやしのこころ
    jp_kanji: いやしのこころ
    en: Healer
    fr: Cœur Soin
    it: Curacuore
    de: Heilherz
    es: Alma Cura
    ko: 치유의마음
  descriptions:
    jp_kana: "みかたの　じょうたい\nいじょうを　たまに　なおす。"
    jp_kanji: "味方の　状態異常を\nたまに　治す。"
    en: "May heal an ally’s status\nconditions."
    fr: "Guérit parfois le statut\ndes alliés alentour."
    it: "A volte cura i problemi di\nstato dei compagni vicini."
    de: "Heilt gel. Statusprobleme\nv. Partnern in der Nähe."
    es: "Puede curar los cambios de\nestado de aliados vecinos."
    ko: "같은 편의 상태 이상을\n가끔 회복시킨다."
heatproof:
  names:
    jp_kana: たいねつ
    jp_kanji: たいねつ
    en: Heatproof
    fr: Ignifuge
    it: Antifuoco
    de: Hitzeschutz
    es: Ignífugo
    ko: 내열
  descriptions:
    jp_kana: "ほのお　わざの\nいりょくを　よわめる。"
    jp_kanji: "ほのお　技の\n威力を　弱める。"
    en: "Weakens the power of\nFire-type moves."
    fr: "Réduit la puissance des\ncapacités de type Feu."
    it: "Indebolisce l’effetto di\nmosse di tipo Fuoco."
    de: "Senkt die Kraft von\nFeuer-Attacken."
    es: "Atenúa los movimientos\nde tipo Fuego."
    ko: "불꽃 기술의\n위력을 약하게 한다."
heavy_metal:
  names:
    jp_kana: ヘヴィメタル
    jp_kanji: ヘヴィメタル
    en: Heavy Metal
    fr: Heavy Metal
    it: Metalpesante
    de: Schwermetall
    es: Met. Pesado
    ko: 헤비메탈
  descriptions:
    jp_kana: "じぶんの　おもさが\n２ばいに　なる。"
    jp_kanji: "自分の　重さが\n２倍に　なる。"
    en: "Doubles the Pokémon’s\nweight."
    fr: "Double le poids\ndu Pokémon."
    it: "Raddoppia il peso\ndel Pokémon."
    de: "Verdoppelt das eigene\nGewicht."
    es: "Duplica el peso\ndel Pokémon."
    ko: "자신의 무게가\n2배가 된다."
honey_gather:
  names:
    jp_kana: みつあつめ
    jp_kanji: みつあつめ
    en: Honey Gather
    fr: Cherche Miel
    it: Mielincetta
    de: Honigmaul
    es: Recogemiel
    ko: 꿀모으기
  descriptions:
    jp_kana: "あまいミツを　あつめて\nくることが　ある。"
    jp_kanji: "あまいミツを　集めて\nくることが　ある。"
    en: "The Pokémon may gather\nHoney from somewhere."
    fr: "Le Pokémon peut parfois\ntrouver du Miel."
    it: "Il Pokémon può\nraccogliere Miele."
    de: "Das Pokémon sammelt\ngelegentlich Honig auf."
    es: "El Pokémon recoge Miel\nde donde puede."
    ko: "달콤한꿀을 모아서\n올 때가 있다."
huge_power:
  names:
    jp_kana: ちからもち
    jp_kanji: ちからもち
    en: Huge Power
    fr: Coloforce
    it: Macroforza
    de: Kraftkoloss
    es: Potencia
    ko: 천하장사
  descriptions:
    jp_kana: "ぶつり　こうげきの\nいりょくが　あがる。"
    jp_kanji: "物理攻撃の\n威力が　あがる。"
    en: "Raises the Pokémon’s\nAttack stat."
    fr: "Augmente l’Attaque du\nPokémon."
    it: "Migliora la statistica\nAttacco del Pokémon."
    de: "Stärkt physische\nAttacken."
    es: Aumenta el Ataque.
    ko: "물리 공격의\n위력이 올라간다."
hustle:
  names:
    jp_kana: はりきり
    jp_kanji: はりきり
    en: Hustle
    fr: Agitation
    it: Tuttafretta
    de: Übereifer
    es: Entusiasmo
    ko: 의욕
  descriptions:
    jp_kana: "こうげきは　たかいが\nはずれやすい。"
    jp_kanji: "攻撃は　たかいが\nはずれやすい。"
    en: "Boosts the Attack stat,\nbut lowers accuracy."
    fr: "Améliore l’Attaque mais\ndiminue la Précision."
    it: "Aumenta l’Attacco, ma\nriduce la precisione."
    de: "Erhöht Angriffs-Wert,\naber senkt Genauigkeit."
    es: "Aumenta el Ataque, pero\nreduce la Precisión."
    ko: "공격은 높지만\n빗나가기 쉽다."
hydration:
  names:
    jp_kana: うるおいボディ
    jp_kanji: うるおいボディ
    en: Hydration
    fr: Hydratation
    it: Idratazione
    de: Hydration
    es: Hidratación
    ko: 촉촉바디
  descriptions:
    jp_kana: "じょうたい　いじょうが\nあめの　とき　なおる。"
    jp_kanji: "状態異常が\n雨の　とき　治る。"
    en: "Heals status problems if\nit is raining."
    fr: "Soigne les problèmes de\nstatut s’il pleut."
    it: "Cura i problemi di stato\nse piove."
    de: "Heilt Statusprobleme\nbei Regen."
    es: "Cura los problemas de\nestado si está lloviendo."
    ko: "비가 오면\n상태 이상이 회복된다."
hyper_cutter:
  names:
    jp_kana: かいりきバサミ
    jp_kanji: かいりきバサミ
    en: Hyper Cutter
    fr: Hyper Cutter
    it: Ipertaglio
    de: Scherenmacht
    es: Corte Fuerte
    ko: 괴력집게
  descriptions:
    jp_kana: "あいてに　こうげきを\nさげられない。"
    jp_kanji: "相手に　攻撃を\nさげられない。"
    en: "Prevents other Pokémon\nfrom lowering Attack stat."
    fr: "Empêche la réduction de\nl’Attaque."
    it: "Evita che la statistica\nAttacco venga ridotta."
    de: "Hindert Angreifer, den\nAngriffs-Wert zu senken."
    es: "Evita que disminuya\nel Ataque."
    ko: "상대가 공격을\n떨어뜨리지 못한다."
ice_body:
  names:
    jp_kana: アイスボディ
    jp_kanji: アイスボディ
    en: Ice Body
    fr: Corps Gel
    it: Corpogelo
    de: Eishaut
    es: Gélido
    ko: 아이스바디
  descriptions:
    jp_kana: "あられのとき　HPを\nすこしずつ　かいふく。"
    jp_kanji: "あられのとき　ＨＰを\n少しずつ　回復。"
    en: "The Pokémon gradually\nregains HP in a hailstorm."
    fr: "Régénère ses PV lors des\ntempêtes de grêle."
    it: "Il Pokémon recupera PS\nquando grandina."
    de: "Regeneriert bei Hagel\nnach und nach KP."
    es: "Recupera algunos PS en\ntormentas de granizo."
    ko: "싸라기눈일 때 HP를\n조금씩 회복한다."
illuminate:
  names:
    jp_kana: はっこう
    jp_kanji: はっこう
    en: Illuminate
    fr: Lumiatirance
    it: Risplendi
    de: Erleuchtung
    es: Iluminación
    ko: 발광
  descriptions:
    jp_kana: "やせいの　ポケモンに\nそうぐう　しやすくなる。"
    jp_kanji: "野生の　ポケモンに\n遭遇しやすくなる。"
    en: "Raises the likelihood of\nmeeting wild Pokémon."
    fr: "Augmente les rencontres\navec Pokémon sauvages."
    it: "È più probabile incontrare\nPokémon selvatici."
    de: "Mehr Pokémon-\nBegegnungen."
    es: "Aumenta la probabilidad\nde encontrar Pokémon."
    ko: "야생 포켓몬과\n만나기 쉬워진다."
illusion:
  names:
    jp_kana: イリュージョン
    jp_kanji: イリュージョン
    en: Illusion
    fr: Illusion
    it: Illusione
    de: Trugbild
    es: Ilusión
    ko: 일루전
  descriptions:
    jp_kana: "うしろの　ポケモンに\nなりきって　でてくる。"
    jp_kanji: "後ろの　ポケモンに\nなりきって　でてくる。"
    en: "Comes out disguised as\nthe Pokémon in back."
    fr: "Prend l’apparence du der-\nnier Pokémon de l’équipe."
    it: "Entra mutato nell’ultimo\nPokémon della squadra."
    de: "Bestreitet Kämpfe in der\nGestalt des Listenletzten."
    es: "Se convierte en el último\nPokémon del equipo."
    ko: "뒤의 포켓몬으로\n둔갑하여 나온다."
immunity:
  names:
    jp_kana: めんえき
    jp_kanji: めんえき
    en: Immunity
    fr: Vaccin
    it: Immunità
    de: Immunität
    es: Inmunidad
    ko: 면역
  descriptions:
    jp_kana: "どく　じょうたいに\nならない。"
    jp_kanji: "どく状態に\nならない。"
    en: "Prevents the Pokémon\nfrom getting poisoned."
    fr: "Empêche le Pokémon d’être\nempoisonné."
    it: "Impedisce al Pokémon di\nvenire avvelenato."
    de: Verhindert Vergiftungen.
    es: Evita el envenenamiento.
    ko: "독 상태가\n되지 않는다."
imposter:
  names:
    jp_kana: かわりもの
    jp_kanji: かわりもの
    en: Imposter
    fr: Imposteur
    it: Sosia
    de: Doppelgänger
    es: Impostor
    ko: 괴짜
  descriptions:
    jp_kana: "めのまえの　ポケモンに\nへんしん　してしまう。"
    jp_kanji: "目の前の　ポケモンに\n変身してしまう。"
    en: "It transforms itself into\nthe Pokémon it is facing."
    fr: "Adopte l’apparence du\nPokémon adverse."
    it: "Si trasforma nel Pokémon\nche ha davanti."
    de: "Kämpft als Kopie\nseines Gegenübers."
    es: "Se transforma en el que\ntiene enfrente."
    ko: "눈앞의 포켓몬으로\n변신해버린다."
infiltrator:
  names:
    jp_kana: すりぬけ
    jp_kanji: すりぬけ
    en: Infiltrator
    fr: Infiltration
    it: Intrapasso
    de: Schwebedurch
    es: Allanamiento
    ko: 틈새포착
  descriptions:
    jp_kana: "あいての　かべを\nすりぬけて　こうげき。"
    jp_kanji: "相手の　かべを\nすりぬけて　攻撃。"
    en: "Passes through the foe’s\nbarrier and strikes."
    fr: "Traverse les barrières de\nl’ennemi pour attaquer."
    it: "Attacca evitando\nle barriere del nemico."
