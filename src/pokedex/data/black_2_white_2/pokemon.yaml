sawsbuck:
  species_id: 586
  names:
    jp_kana: メブキジカ
    jp_kanji: メブキジカ
    en: Sawsbuck
    fr: Haydaim
    it: Sawsbuck
    de: Kronjuwild
    es: Sawsbuck
    ko: 바라철록
  forms:
    sawsbuck_spring_form:
      form_id: 0
      names:
        jp_kana: はるのすがた
        jp_kanji: はるのすがた
        en: Spring Form
        fr: Forme Printemps
        it: Forma Primavera
        de: Frühlingsform
        es: Forma Primavera
        ko: 봄의 모습
      base_stats:
        hp: 80
        attack: 100
        defense: 70
        special_attack: 60
        special_defense: 70
        speed: 95
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - normal
        - grass
      egg_groups:
        - field
      abilities:
        - chlorophyll
        - sap_sipper
      hidden_ability: serene_grace
      descriptions:
        jp_kana:
          black_2: "きせつの　うつりかわりと　ともに\nすみかを　かえるので　メブキジカが\nはるをはこぶと　いう　ひともいる。"
          white_2: "きせつの　うつりかわりと　ともに\nすみかを　かえるので　メブキジカが\nはるをはこぶと　いう　ひともいる。"
        jp_kanji:
          black_2: "季節の　移り変わりと　ともに\nすみかを　変えるので　メブキジカが\n春を運ぶと　いう　人もいる。"
          white_2: "季節の　移り変わりと　ともに\nすみかを　変えるので　メブキジカが\n春を運ぶと　いう　人もいる。"
        en:
          black_2: "They migrate according to the seasons,\nso some people call Sawsbuck\nthe harbingers of spring."
          white_2: "They migrate according to the seasons,\nso some people call Sawsbuck\nthe harbingers of spring."
        fr:
          black_2: "Il change d’habitat selon les saisons.\nCertains disent même qu’il est celui\nqui apporte le printemps."
          white_2: "Il change d’habitat selon les saisons.\nCertains disent même qu’il est celui\nqui apporte le printemps."
        it:
          black_2: "Si spostano da un luogo all’altro al\nmutare delle stagioni, per questo alcuni\ndicono che portano con sé la primavera."
          white_2: "Si spostano da un luogo all’altro al\nmutare delle stagioni, per questo alcuni\ndicono che portano con sé la primavera."
        de:
          black_2: "Mancherorts sagt man, sie brächten den\nFrühling, da sie je nach Jahreszeit ihr\nRevier wechseln."
          white_2: "Mancherorts sagt man, sie brächten den\nFrühling, da sie je nach Jahreszeit ihr\nRevier wechseln."
        es:
          black_2: "Migra con el cambio de estación, por lo\nque hay quien considera a Sawsbuck\nel heraldo de la primavera."
          white_2: "Migra con el cambio de estación, por lo\nque hay quien considera a Sawsbuck\nel heraldo de la primavera."
        ko:
          black_2: "계절의 변화와 함께\n거처를 바꾸기에 바라철록이\n봄을 나른다고 말하는 사람도 있다."
          white_2: "계절의 변화와 함께\n거처를 바꾸기에 바라철록이\n봄을 나른다고 말하는 사람도 있다."
