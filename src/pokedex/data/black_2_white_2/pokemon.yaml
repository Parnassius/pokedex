        jp_kana:
          black_2: "たいようの　ひかりを　あびると\nいつもよりも　すばやく　うごける。\nてよりも　ツルを　うまくつかう。"
          white_2: "たいようの　ひかりを　あびると\nいつもよりも　すばやく　うごける。\nてよりも　ツルを　うまくつかう。"
        jp_kanji:
          black_2: "太陽の　光を　浴びると\nいつもよりも　すばやく　動ける。\n手よりも　ツルを　うまく使う。"
          white_2: "太陽の　光を　浴びると\nいつもよりも　すばやく　動ける。\n手よりも　ツルを　うまく使う。"
        en:
          black_2: "Being exposed to sunlight makes\nits movements swifter. It uses\nvines more adeptly than its hands."
          white_2: "Being exposed to sunlight makes\nits movements swifter. It uses\nvines more adeptly than its hands."
        fr:
          black_2: "La lumière du soleil augmente fortement\nson agilité. Ses lianes sont plus habiles\nque ses mains."
          white_2: "La lumière du soleil augmente fortement\nson agilité. Ses lianes sont plus habiles\nque ses mains."
        it:
          black_2: "Quando è esposto alla luce solare può\nmuoversi più velocemente. Usa le sue\nliane meglio dei suoi stessi arti."
          white_2: "Quando è esposto alla luce solare può\nmuoversi più velocemente. Usa le sue\nliane meglio dei suoi stessi arti."
        de:
          black_2: "Im Sonnenlicht erhöht sich das Tempo\nseiner Bewegungen. Es ist mit seinen\nSchlingen geschickter als mit den Händen."
          white_2: "Im Sonnenlicht erhöht sich das Tempo\nseiner Bewegungen. Es ist mit seinen\nSchlingen geschickter als mit den Händen."
        es:
          black_2: "Cuando recibe los rayos de sol, se mueve\nmucho más rápido que de costumbre. Usa\nmejor sus lianas que sus manos."
          white_2: "Cuando recibe los rayos de sol, se mueve\nmucho más rápido que de costumbre. Usa\nmejor sus lianas que sus manos."
        ko:
          black_2: "태양의 빛을 받으면\n평소보다 빨리 움직일 수 있다.\n손보다 덩굴을 잘 사용한다."
          white_2: "태양의 빛을 받으면\n평소보다 빨리 움직일 수 있다.\n손보다 덩굴을 잘 사용한다."
