        en:
          black_2: "For some time after its birth, it\ngrows by gaining nourishment from\nthe seed on its back."
          white_2: "For some time after its birth, it\ngrows by gaining nourishment from\nthe seed on its back."
        fr:
          black_2: "Au matin de sa vie, la graine sur\nson dos lui fournit les éléments\ndont il a besoin pour grandir."
          white_2: "Au matin de sa vie, la graine sur\nson dos lui fournit les éléments\ndont il a besoin pour grandir."
        it:
          black_2: "Dopo la nascita, cresce traendo\nnutrimento dal seme piantato\nsul suo dorso."
          white_2: "Dopo la nascita, cresce traendo\nnutrimento dal seme piantato\nsul suo dorso."
        de:
          black_2: "Nach der Geburt nimmt es für eine\nWeile Nährstoffe über den Samen\nauf seinem Rücken auf."
          white_2: "Nach der Geburt nimmt es für eine\nWeile Nährstoffe über den Samen\nauf seinem Rücken auf."
        es:
          black_2: "Después de nacer, crece alimentándose\nde la semilla de su lomo."
          white_2: "Después de nacer, crece alimentándose\nde la semilla de su lomo."
        ko:
          black_2: "태어나서부터 얼마 동안은\n등의 씨앗으로부터 영양을\n공급받아 크게 성장한다."
          white_2: "태어나서부터 얼마 동안은\n등의 씨앗으로부터 영양을\n공급받아 크게 성장한다."
