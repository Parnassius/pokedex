          black_2: "ビクティニが　むげんに　うみだす\nエネルギーを　わけあたえてもらうと\nぜんしんに　パワーが　あふれだす。"
          white_2: "ビクティニが　むげんに　うみだす\nエネルギーを　わけあたえてもらうと\nぜんしんに　パワーが　あふれだす。"
        jp_kanji:
          black_2: "ビクティニが　無限に　生みだす\nエネルギーを　わけあたえてもらうと\n全身に　パワーが　あふれだす。"
          white_2: "ビクティニが　無限に　生みだす\nエネルギーを　わけあたえてもらうと\n全身に　パワーが　あふれだす。"
        en:
          black_2: "When it shares the infinite energy\nit creates, that being’s entire\nbody will be overflowing with power."
          white_2: "When it shares the infinite energy\nit creates, that being’s entire\nbody will be overflowing with power."
        fr:
          black_2: "L’énergie sans limites qu’il produit\ndonne une force incroyable à ceux\nqui entrent en contact avec elle."
          white_2: "L’énergie sans limites qu’il produit\ndonne une force incroyable à ceux\nqui entrent en contact avec elle."
        it:
          black_2: "Può condividere l’energia infinita che\nemana, donando un potere immenso\na chi la riceve."
          white_2: "Può condividere l’energia infinita che\nemana, donando un potere immenso\na chi la riceve."
        de:
          black_2: "Jeder, dem Victini seine grenzenlose\nEnergie zuteilwerden lässt, strotzt\nnur so vor Kraft."
          white_2: "Jeder, dem Victini seine grenzenlose\nEnergie zuteilwerden lässt, strotzt\nnur so vor Kraft."
        es:
          black_2: "Cuando Victini comparte su energía\nilimitada, esa persona o Pokémon\nirradia abundante poder."
          white_2: "Cuando Victini comparte su energía\nilimitada, esa persona o Pokémon\nirradia abundante poder."
        ko:
          black_2: "비크티니가 무한히 만들어내는\n에너지를 나누어 받으면\n전신에 파워가 넘친다."
          white_2: "비크티니가 무한히 만들어내는\n에너지를 나누어 받으면\n전신에 파워가 넘친다."
