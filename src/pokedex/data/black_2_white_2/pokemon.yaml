wobbuffet:
  species_id: 202
  names:
    jp_kana: ソーナンス
    jp_kanji: ソーナンス
    en: Wobbuffet
    fr: Qulbutoké
    it: Wobbuffet
    de: Woingenau
    es: Wobbuffet
    ko: 마자용
  forms:
    wobbuffet:
      form_id: 0
      base_stats:
        hp: 190
        attack: 33
        defense: 58
        special_attack: 33
        special_defense: 58
        speed: 33
      evs_yield:
        hp: 2
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - psychic
      egg_groups:
        - amorphous
      abilities:
        - shadow_tag
      hidden_ability: telepathy
      descriptions:
        jp_kana:
          black_2: "くろい　しっぽを　ひっしになって\nかくすのは　しっぽに　ひみつがある\nしょうこだと　かんぐられている。"
          white_2: "くろい　しっぽを　ひっしになって\nかくすのは　しっぽに　ひみつがある\nしょうこだと　かんぐられている。"
        jp_kanji:
          black_2: "黒い　しっぽを　必死になって\n隠すのは　しっぽに　秘密がある\n証拠だと　勘ぐられている。"
          white_2: "黒い　しっぽを　必死になって\n隠すのは　しっぽに　秘密がある\n証拠だと　勘ぐられている。"
        en:
          black_2: "It desperately tries to keep its\nblack tail hidden. It is said to be\nproof the tail hides a secret."
          white_2: "It desperately tries to keep its\nblack tail hidden. It is said to be\nproof the tail hides a secret."
        fr:
          black_2: "Il cherche désespérément à cacher\nsa queue noire. Certains pensent\nqu’elle renferme un secret."
          white_2: "Il cherche désespérément à cacher\nsa queue noire. Certains pensent\nqu’elle renferme un secret."
        it:
          black_2: "Cerca di tenere nascosta la sua coda\nnera ad ogni costo. Pare che essa celi\nun segreto."
          white_2: "Cerca di tenere nascosta la sua coda\nnera ad ogni costo. Pare che essa celi\nun segreto."
        de:
          black_2: "Verzweifelt versucht es, seinen\nschwarzen Schweif zu verstecken.\nEr soll ein Geheimnis enthalten."
          white_2: "Verzweifelt versucht es, seinen\nschwarzen Schweif zu verstecken.\nEr soll ein Geheimnis enthalten."
        es:
          black_2: "Siempre intenta ocultar su cola,\npor lo que muchos creen que\ncontiene un secreto."
          white_2: "Siempre intenta ocultar su cola,\npor lo que muchos creen que\ncontiene un secreto."
        ko:
          black_2: "까만 꼬리를 필사적으로\n숨기는 것은 꼬리에 비밀이 있다는\n증거라고 의심받고 있다."
          white_2: "까만 꼬리를 필사적으로\n숨기는 것은 꼬리에 비밀이 있다는\n증거라고 의심받고 있다."
girafarig:
  species_id: 203
  names:
    jp_kana: キリンリキ
    jp_kanji: キリンリキ
    en: Girafarig
    fr: Girafarig
    it: Girafarig
    de: Girafarig
    es: Girafarig
    ko: 키링키
