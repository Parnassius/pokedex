    girafarig:
      form_id: 0
      base_stats:
        hp: 70
        attack: 80
        defense: 65
        special_attack: 90
        special_defense: 65
        speed: 85
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 2
        special_defense: 0
        speed: 0
      types:
        - normal
        - psychic
      egg_groups:
        - field
      abilities:
        - inner_focus
        - early_bird
      hidden_ability: sap_sipper
      held_items:
        rare: persim_berry
      descriptions:
        jp_kana:
          black_2: "しっぽの　あたまにも　ちいさな\nのうがあり　うしろを　むいたままでも\nほんのうで　たたかうことが　できる。"
          white_2: "しっぽの　あたまにも　ちいさな\nのうがあり　うしろを　むいたままでも\nほんのうで　たたかうことが　できる。"
        jp_kanji:
          black_2: "しっぽの　頭にも　小さな\n脳があり　後ろを　向いたままでも\n本能で　戦うことが　できる。"
          white_2: "しっぽの　頭にも　小さな\n脳があり　後ろを　向いたままでも\n本能で　戦うことが　できる。"
        en:
          black_2: "The head on its tail contains a\nsmall brain. It can instinctively\nfight even while facing backward."
          white_2: "The head on its tail contains a\nsmall brain. It can instinctively\nfight even while facing backward."
        fr:
          black_2: "La tête qu’il a sur la queue dispose\nde son propre cerveau et lui\npermet de couvrir ses arrières."
          white_2: "La tête qu’il a sur la queue dispose\nde son propre cerveau et lui\npermet de couvrir ses arrières."
        it:
          black_2: "Sulla coda ha una testa con un piccolo\ncervello. Riesce a lottare anche se\nil nemico è alle sue spalle."
          white_2: "Sulla coda ha una testa con un piccolo\ncervello. Riesce a lottare anche se\nil nemico è alle sue spalle."
        de:
          black_2: "Es kann sich in beide Richtungen\nverteidigen, da der Kopf auf seinem\nSchweif ein kleines Gehirn besitzt."
          white_2: "Es kann sich in beide Richtungen\nverteidigen, da der Kopf auf seinem\nSchweif ein kleines Gehirn besitzt."
        es:
          black_2: "La cabeza de su cola también tiene\nun pequeño cerebro, así que puede\ncombatir por delante o por detrás."
          white_2: "La cabeza de su cola también tiene\nun pequeño cerebro, así que puede\ncombatir por delante o por detrás."
        ko:
          black_2: "꼬리의 머리에도 작은\n뇌가 있어서 뒤를 향한 채로도\n본능적으로 싸울 수 있다."
          white_2: "꼬리의 머리에도 작은\n뇌가 있어서 뒤를 향한 채로도\n본능적으로 싸울 수 있다."
