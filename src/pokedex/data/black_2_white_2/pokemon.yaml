      descriptions:
        jp_kana:
          black_2: "せなかの　つぼみが　ふくらみだすと\nあまい　においが　ただよいはじめる。\nたいりんの　はなが　さく　まえぶれ。"
          white_2: "せなかの　つぼみが　ふくらみだすと\nあまい　においが　ただよいはじめる。\nたいりんの　はなが　さく　まえぶれ。"
        jp_kanji:
          black_2: "背中の　つぼみが　膨らみだすと\n甘い　においが　漂いはじめる。\n大輪の　花が　咲く　前触れ。"
          white_2: "背中の　つぼみが　膨らみだすと\n甘い　においが　漂いはじめる。\n大輪の　花が　咲く　前触れ。"
        en:
          black_2: "When the bud on its back starts\nswelling, a sweet aroma wafts to\nindicate the flower’s coming bloom."
          white_2: "When the bud on its back starts\nswelling, a sweet aroma wafts to\nindicate the flower’s coming bloom."
        fr:
          black_2: "Lorsque le bourgeon sur son dos\néclot, il répand un doux parfum\npour célébrer sa floraison."
          white_2: "Lorsque le bourgeon sur son dos\néclot, il répand un doux parfum\npour célébrer sa floraison."
        it:
          black_2: "Quando il bocciolo che ha sul dorso\nsi gonfia, emana un dolce profumo.\nÈ indice dell’imminente fioritura."
          white_2: "Quando il bocciolo che ha sul dorso\nsi gonfia, emana un dolce profumo.\nÈ indice dell’imminente fioritura."
        de:
          black_2: "Sobald die Knospe auf seinem Rücken\nein süßes Aroma abgibt, steht die\nBlüte kurz bevor."
          white_2: "Sobald die Knospe auf seinem Rücken\nein süßes Aroma abgibt, steht die\nBlüte kurz bevor."
        es:
          black_2: "Cuando el capullo de su lomo se hincha,\ndesprende un dulce aroma para indicar\nel florecimiento."
          white_2: "Cuando el capullo de su lomo se hincha,\ndesprende un dulce aroma para indicar\nel florecimiento."
        ko:
          black_2: "등의 봉오리가 부풀어오르면\n달콤한 냄새가 감돌기 시작한다.\n큰 꽃이 필 조짐이다."
          white_2: "등의 봉오리가 부풀어오르면\n달콤한 냄새가 감돌기 시작한다.\n큰 꽃이 필 조짐이다."
