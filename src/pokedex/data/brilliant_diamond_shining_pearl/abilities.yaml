adaptability:
  names:
    jp_kana: てきおうりょく
    jp_kanji: てきおうりょく
    en: Adaptability
    fr: Adaptabilité
    it: Adattabilità
    de: Anpassung
    es: Adaptable
    ko: 적응력
    zh_simp: 适应力
    zh_trad: 適應力
  descriptions:
    jp_kana: "じぶんと　おなじ　タイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "自分と　おなじ　タイプの\n技の　威力が　上がる。"
    en: Powers up moves of the same type as the Pokémon.
    fr: "Quand le Pokémon utilise une capacité du même type\nque lui, le bonus de puissance qu’elle reçoit est encore\nplus important que normalement."
    it: "Potenzia di molto le mosse dello stesso tipo\ndel Pokémon."
    de: "Erhöht die Stärke von Attacken, die dem Typ des\nPokémon entsprechen."
    es: "Potencia aún más los movimientos cuyo tipo coincida\ncon el suyo."
    ko: "자신과 같은 타입인\n기술의 위력이 올라간다."
    zh_simp: "与自身同属性的招式\n威力会提高。"
    zh_trad: "與自身同屬性的招式\n威力會提高。"
aerilate:
  names:
    jp_kana: スカイスキン
    jp_kanji: スカイスキン
    en: Aerilate
    fr: Peau Céleste
    it: Pellecielo
    de: Zenithaut
    es: Piel Celeste
    ko: 스카이스킨
    zh_simp: 飞行皮肤
    zh_trad: 飛行皮膚
  descriptions:
    jp_kana: "ノーマルタイプの　わざが\nひこうタイプになる。\nいりょくが　すこし　あがる。"
    jp_kanji: "ノーマルタイプの　技が\nひこうタイプになる。\n威力が　少し　上がる。"
    en: "Normal-type moves become Flying-type moves.\nThe power of those moves is boosted a little."
    fr: "Les capacités de type Normal deviennent de type Vol.\nLeur puissance augmente légèrement."
    it: "Le mosse di tipo Normale diventano di tipo Volante\ne la loro potenza aumenta un po’."
    de: "Attacken vom Typ Normal nehmen den Typ Flug an und\nihre Stärke erhöht sich ein wenig."
    es: "Convierte los movimientos de tipo Normal en tipo\nVolador y aumenta ligeramente su potencia."
    ko: "노말타입의 기술이\n비행타입이 된다.\n위력이 조금 올라간다."
    zh_simp: "一般属性的招式\n会变为飞行属性。\n威力会少量提高。"
    zh_trad: "一般屬性的招式\n會變為飛行屬性。\n威力會少量提高。"
aftermath:
  names:
    jp_kana: ゆうばく
    jp_kanji: ゆうばく
    en: Aftermath
    fr: Boom Final
    it: Scoppio
    de: Finalschlag
    es: Detonación
    ko: 유폭
    zh_simp: 诱爆
    zh_trad: 引爆
  descriptions:
    jp_kana: "ひんしに　なったとき\nさわった　あいてに\nダメージを　あたえる。"
    jp_kanji: "ひんしに　なったとき\n触った　相手に\nダメージを　あたえる。"
    en: "Damages the attacker if it contacts the Pokémon\nwith a finishing hit."
    fr: "Si le Pokémon est mis K.O. par une attaque directe,\nil inflige des dégâts à l’attaquant avant de s’évanouir."
    it: "Chi manda KO questo Pokémon con un attacco\ndiretto subisce dei danni."
    de: "Wird das Pokémon durch eine direkte Attacke besiegt,\nfügt es dem Angreifer Schaden zu."
    es: "Daña al agresor que le ha dado el golpe de gracia con\nun movimiento de contacto."
    ko: "기절했을 때\n접촉한 상대에게\n데미지를 준다."
    zh_simp: "变为昏厥时，\n会对接触到自己的对手造成伤害。"
    zh_trad: "瀕死時，\n會對接觸到自己的對手造成傷害。"
air_lock:
  names:
    jp_kana: エアロック
    jp_kanji: エアロック
    en: Air Lock
    fr: Air Lock
    it: Riparo
    de: Klimaschutz
    es: Bucle Aire
    ko: 에어록
    zh_simp: 气闸
    zh_trad: 氣閘
  descriptions:
    jp_kana: "あらゆる　てんきの　えいきょうが\nきえて　しまう。"
    jp_kanji: "あらゆる　天気の　影響が\n消えて　しまう。"
    en: Eliminates the effects of weather.
    fr: Annule tous les effets de la météo.
    it: "Neutralizza gli effetti di tutte le condizioni\natmosferiche."
    de: Hebt alle Wetter-Effekte auf.
    es: Neutraliza todos los efectos del tiempo atmosférico.
    ko: "모든 날씨의 영향이\n없어진다."
    zh_simp: 所有天气的影响都会消失。
    zh_trad: 所有天氣的影響都會消失。
analytic:
  names:
    jp_kana: アナライズ
    jp_kanji: アナライズ
    en: Analytic
    fr: Analyste
    it: Ponderazione
    de: Analyse
    es: Cálculo Final
    ko: 애널라이즈
    zh_simp: 分析
    zh_trad: 分析
  descriptions:
    jp_kana: "いちばん　さいごに　わざを　だすと\nわざの　いりょくが　あがる。"
    jp_kanji: "いちばん　最後に　技を　出すと\n技の　威力が　上がる。"
    en: Boosts move power when the Pokémon moves last.
    fr: "Augmente la puissance des capacités du Pokémon\ns’il attaque en dernier."
    it: "Se il Pokémon agisce per ultimo, la potenza\ndella mossa aumenta."
    de: "Greift das Pokémon zuletzt an, erhöht sich die Stärke\nder Attacke, die es einsetzt."
    es: "Aumenta la potencia de su movimiento si es el último\nen atacar."
    ko: "제일 마지막에 기술을 쓰면\n기술의 위력이 올라간다."
    zh_simp: "如果在最后使出招式，\n招式的威力会提高。"
    zh_trad: "如果在最後使出招式，\n招式的威力就會變強。"
anger_point:
  names:
    jp_kana: いかりのつぼ
    jp_kanji: いかりのつぼ
    en: Anger Point
    fr: Colérique
    it: Grancollera
    de: Kurzschluss
    es: Irascible
    ko: 분노의경혈
    zh_simp: 愤怒穴位
    zh_trad: 憤怒穴位
  descriptions:
    jp_kana: "きゅうしょに　こうげきが　あたると\nいかりくるって　こうげきりょくが\nさいだいに　なる。"
    jp_kanji: "急所に　攻撃が　当たると\n怒りくるって　攻撃力が\n最大に　なる。"
    en: "The Pokémon is angered when it takes a critical hit,\nand that maxes its Attack stat."
    fr: "Si le Pokémon subit un coup critique, il entre\ndans une colère noire qui augmente son Attaque\nau maximum."
    it: "Se il Pokémon subisce un brutto colpo, monta su\ntutte le furie e il suo Attacco aumenta al massimo."
    de: "Wird nach Einstecken eines Volltreffers wütend und\nmaximiert dabei seinen Angriffs-Wert."
    es: "Si recibe un golpe crítico, monta en cólera y sube su\nAtaque hasta el máximo."
    ko: "급소에 공격이 맞으면\n크게 분노해 공격력이\n최대가 된다."
    zh_simp: "要害被击中时，\n会大发雷霆，\n攻击力变为最大。"
    zh_trad: "要害被擊中時會大發雷霆。\n攻擊力會提高到最大。"
anticipation:
  names:
    jp_kana: きけんよち
    jp_kanji: きけんよち
    en: Anticipation
    fr: Anticipation
    it: Presagio
    de: Vorahnung
    es: Anticipación
    ko: 위험예지
    zh_simp: 危险预知
    zh_trad: 危險預知
  descriptions:
    jp_kana: "あいての　もつ　きけんな　わざを\nさっちする　ことができる。"
    jp_kanji: "相手の　持つ　危険な　技を\n察知する　ことができる。"
    en: "The Pokémon can sense an opposing Pokémon’s\ndangerous moves."
    fr: "Le Pokémon devine si l’adversaire connaît une capacité\ndangereuse pour lui."
    it: Rivela se il nemico ha mosse pericolose.
    de: Kann gefährliche gegnerische Attacken erahnen.
    es: Prevé los movimientos peligrosos del rival.
    ko: "상대가 지닌 위험한 기술을\n감지할 수 있다."
    zh_simp: "可以察觉到\n对手拥有的危险招式。"
    zh_trad: "察覺對手持有的\n危險招式。"
arena_trap:
  names:
    jp_kana: ありじごく
    jp_kanji: ありじごく
    en: Arena Trap
    fr: Piège Sable
    it: Trappoarena
    de: Ausweglos
    es: Trampa Arena
    ko: 개미지옥
    zh_simp: 沙穴
    zh_trad: 沙穴
  descriptions:
    jp_kana: "せんとうで　あいてを\nにげられなくする。"
    jp_kanji: "戦闘で　相手を\n逃げられなくする。"
    en: Prevents opposing Pokémon from fleeing.
    fr: Empêche l’ennemi de s’enfuir.
    it: Impedisce la fuga al nemico.
    de: Hindert Gegner im Kampf an der Flucht.
    es: Evita que el rival huya.
    ko: "배틀에서 상대를\n도망칠 수 없게 한다."
    zh_simp: 在战斗中让对手无法逃走。
    zh_trad: 在戰鬥中讓對手無法逃走。
aroma_veil:
  names:
    jp_kana: アロマベール
    jp_kanji: アロマベール
    en: Aroma Veil
    fr: Aroma-Voile
    it: Aromavelo
    de: Dufthülle
    es: Velo Aroma
    ko: 아로마베일
    zh_simp: 芳香幕
    zh_trad: 芳香幕
  descriptions:
    jp_kana: "じぶんと　みかたへの　メンタル\nこうげきを　ふせぐことが　できる。"
    jp_kanji: "自分と　味方への　メンタル\n攻撃を　防ぐことが　できる。"
    en: "Protects itself and its allies from attacks that limit\ntheir move choices."
    fr: Protège l’équipe des effets limitant le libre arbitre.
    it: "Protegge tutta la squadra da effetti che ne limitano\nla libertà di scelta delle mosse."
    de: "Kann alle Team-Pokémon vor mentalen Angriffen\nschützen."
    es: "Se protege a sí mismo y a sus aliados de ataques que\nimpiden elegir movimientos."
    ko: "자신과 같은 편으로 향하는\n멘탈 공격을 막을 수 있다."
    zh_simp: "可以防住向自己和同伴\n发出的心灵攻击。"
    zh_trad: "可防住向自己和同伴\n發出的心靈攻擊。"
as_one:glastrier:
  names:
    jp_kana: じんばいったい
    jp_kanji: じんばいったい
    en: As One
    fr: Osmose Équine
    it: Sintonia Equina
    de: Reitgespann
    es: Unidad Ecuestre
    ko: 혼연일체
    zh_simp: 人马一体
    zh_trad: 人馬一體
  descriptions:
    jp_kana: "バドレックスの　きんちょうかんと\nブリザポスの　しろのいななきの\nふたつの　とくせいを　あわせもつ。"
    jp_kanji: "バドレックスの　きんちょうかんと\nブリザポスの　しろのいななきの\n二つの　特性を　あわせ持つ。"
    en: "This Ability combines the effects of both Calyrex’s\nUnnerve Ability and Glastrier’s Chilling Neigh Ability."
    fr: "Les talents Tension de Sylveroy et Blanche Ruade\nde Blizzeval sont cumulés."
    it: "Il Pokémon ha una doppia abilità: Agitazione di Calyrex\ne Nitrito Bianco di Glastrier."
    de: "Das Pokémon verfügt sowohl über Coronospas Fähigkeit\nAnspannung als auch über Polaross’ Fähigkeit\nHelles Wiehern."
    es: "El Pokémon tiene dos habilidades: Relincho Blanco de\nGlastrier y Nerviosismo de Calyrex."
    ko: "버드렉스의 긴장감과\n블리자포스의 백의울음\n두 가지 특성을 겸비한다."
    zh_simp: "兼备蕾冠王的紧张感和\n雪暴马的苍白嘶鸣这两种特性。"
    zh_trad: "兼具蕾冠王的緊張感和\n雪暴馬的蒼白嘶鳴這２種特性。"
as_one:spectrier:
  names:
    jp_kana: じんばいったい
    jp_kanji: じんばいったい
    en: As One
    fr: Osmose Équine
    it: Sintonia Equina
    de: Reitgespann
    es: Unidad Ecuestre
    ko: 혼연일체
    zh_simp: 人马一体
    zh_trad: 人馬一體
  descriptions:
    jp_kana: "バドレックスの　きんちょうかんと\nレイスポスの　くろのいななきの\nふたつの　とくせいを　あわせもつ。"
    jp_kanji: "バドレックスの　きんちょうかんと\nレイスポスの　くろのいななきの\n二つの　特性を　あわせ持つ。"
    en: "This Ability combines the effects of both Calyrex’s\nUnnerve Ability and Spectrier’s Grim Neigh Ability."
    fr: "Les talents Tension de Sylveroy et Sombre Ruade\nde Spectreval sont cumulés."
    it: "Il Pokémon ha una doppia abilità: Agitazione di Calyrex\ne Nitrito Nero di Spectrier."
    de: "Das Pokémon verfügt sowohl über Coronospas Fähigkeit\nAnspannung als auch über Phantoross’ Fähigkeit\nDunkles Wiehern."
    es: "El Pokémon tiene dos habilidades: Relincho Negro de\nSpectrier y Nerviosismo de Calyrex."
    ko: "버드렉스의 긴장감과\n레이스포스의 흑의울음\n두 가지 특성을 겸비한다."
    zh_simp: "兼备蕾冠王的紧张感和\n灵幽马的漆黑嘶鸣这两种特性。"
    zh_trad: "兼具蕾冠王的緊張感和\n靈幽馬的漆黑嘶鳴這２種特性。"
aura_break:
  names:
    jp_kana: オーラブレイク
    jp_kanji: オーラブレイク
    en: Aura Break
    fr: Aura Inversée
    it: Frangiaura
    de: Aura-Umkehr
    es: Rompeaura
    ko: 오라브레이크
    zh_simp: 气场破坏
    zh_trad: 氣場破壞
  descriptions:
    jp_kana: "オーラの　こうかを　ぎゃくてんさせて\nいりょくを　さげる。"
    jp_kanji: "オーラの　効果を　逆転させて\n威力を　下げる。"
    en: "The effects of “Aura” Abilities are reversed\nto lower the power of affected moves."
    fr: Inverse l’effet des auras en baissant leur puissance.
    it: "Inverte gli effetti di tutte le aure riducendone\nla potenza."
    de: "Kehrt die Wirkung von Auren um und senkt so die\nStärke bestimmter Attacken, anstatt sie zu erhöhen."
    es: "Invierte los efectos de las auras, por lo que baja la\npotencia de ciertos movimientos en vez de subirla."
    ko: "오라의 효과를 역전시켜\n위력을 떨어뜨린다."
    zh_simp: "让气场的效果发生逆转，\n降低威力。"
    zh_trad: "讓氣場的效果逆轉，\n並降低威力。"
bad_dreams:
  names:
    jp_kana: ナイトメア
    jp_kanji: ナイトメア
    en: Bad Dreams
    fr: Mauvais Rêve
    it: Sogniamari
    de: Alptraum
    es: Mal Sueño
    ko: 나이트메어
    zh_simp: 梦魇
    zh_trad: 夢魘
  descriptions:
    jp_kana: "ねむり　じょうたいの　あいてに\nダメージを　あたえる。"
    jp_kanji: "ねむり状態の　相手に\nダメージを　あたえる。"
    en: Reduces the HP of sleeping opposing Pokémon.
    fr: Inflige des dégâts aux ennemis endormis.
    it: Infligge danni ai nemici addormentati.
    de: Fügt schlafenden Gegnern Schaden zu.
    es: Inflige daño a cualquier rival que esté dormido.
    ko: "잠듦 상태의 상대에게\n데미지를 준다."
    zh_simp: 给予睡眠状态的对手伤害。
    zh_trad: 給予陷入睡眠狀態的對手傷害。
ball_fetch:
  names:
    jp_kana: たまひろい
    jp_kanji: たまひろい
    en: Ball Fetch
    fr: Ramasse Ball
    it: Raccattapalle
    de: Apport
    es: Recogebolas
    ko: 볼줍기
    zh_simp: 捡球
    zh_trad: 撿球
  descriptions:
    jp_kana: "どうぐを　もっていない　ばあい\n１かいめに　なげて　しっぱい　した\nモンスターボールを　ひろってくる。"
    jp_kanji: "道具を　持っていない　場合\n１回目に　投げて　失敗　した\nモンスターボールを　拾ってくる。"
    en: "If the Pokémon is not holding an item, it will fetch\nthe Poké Ball from the first failed throw\nof the battle."
    fr: "Si le Pokémon ne tient aucun objet, il ramassera\nla Poké Ball lors du premier lancer raté du combat."
    it: "Se il Pokémon non ha uno strumento con sé,\nraccoglie la Poké Ball del primo tentativo\ndi cattura fallito."
    de: "Trägt das Pokémon kein Item bei sich, hebt es den Ball\naus dem ersten gescheiterten Fangversuch des Kampfes\nwieder auf."
    es: "Si no lleva equipado ningún objeto, recupera la\nPoké Ball del primer intento de captura fallido."
    ko: "도구를 지니고 있지 않은 경우\n첫 번째로 던져서 실패한\n몬스터볼을 주워 온다."
    zh_simp: "没有携带道具时，\n会拾取第１个投出后\n捕捉失败的精灵球。"
    zh_trad: "當寶可夢沒有攜帶道具時，\n會撿回第１個投出後\n捕捉失敗的精靈球。"
battery:
  names:
    jp_kana: バッテリー
    jp_kanji: バッテリー
    en: Battery
    fr: Batterie
    it: Batteria
    de: Batterie
    es: Batería
    ko: 배터리
    zh_simp: 蓄电池
    zh_trad: 蓄電池
  descriptions:
    jp_kana: "みかたの　とくしゅわざの\nいりょくを　あげる。"
    jp_kanji: "味方の　特殊技の\n威力を　上げる。"
    en: Powers up ally Pokémon’s special moves.
    fr: Augmente la puissance des capacités spéciales des alliés.
    it: "Aumenta la potenza delle mosse speciali\ndegli alleati."
    de: "Erhöht die Stärke der Spezial-Attacken seiner\nMitstreiter."
    es: Potencia los ataques especiales de los aliados.
    ko: "같은 편 특수 기술의\n위력을 올린다."
    zh_simp: "会提高我方的\n特殊招式的威力。"
    zh_trad: "會提高我方的\n特殊招式的威力。"
battle_armor:
  names:
    jp_kana: カブトアーマー
    jp_kanji: カブトアーマー
    en: Battle Armor
    fr: Armurbaston
    it: Lottascudo
    de: Kampfpanzer
    es: Armadura Batalla
    ko: 전투무장
    zh_simp: 战斗盔甲
    zh_trad: 戰鬥盔甲
  descriptions:
    jp_kana: "かたい　こうらに　まもられて\nあいての　こうげきが\nきゅうしょに　あたらない。"
    jp_kanji: "硬い　甲羅に　守られて\n相手の　攻撃が\n急所に　当たらない。"
    en: Hard armor protects the Pokémon from critical hits.
    fr: "Le Pokémon est protégé des coups critiques\npar une solide carapace."
    it: "Il Pokémon è protetto da una dura corazza\nche gli evita di subire brutti colpi."
    de: "Wehrt gegnerische Volltreffer mit einem harten\nPanzer ab."
    es: "La robusta coraza que lo protege bloquea los golpes\ncríticos."
    ko: "단단한 껍질에 보호받아\n상대의 공격이\n급소에 맞지 않는다."
    zh_simp: "被坚硬的甲壳守护着，\n不会被对手的攻击击中要害。"
    zh_trad: "被堅硬的甲殼守護著，\n不會被對手的攻擊擊中要害。"
battle_bond:
  names:
    jp_kana: きずなへんげ
    jp_kanji: きずなへんげ
    en: Battle Bond
    fr: Synergie
    it: Morfosintonia
    de: Freundschaftsakt
    es: Fuerte Afecto
    ko: 유대변화
    zh_simp: 牵绊变身
    zh_trad: 牽絆變身
  descriptions:
    jp_kana: "あいてを　たおすと　トレーナーとの\nきずなが　ふかまり　サトシゲッコウガに\nへんげする。みずしゅりけんが　つよくなる。"
    jp_kanji: "相手を　倒すと　トレーナーとの\nキズナが　深まり　サトシゲッコウガに\n変化する。みずしゅりけんが　強くなる。"
    en: "Defeating an opposing Pokémon strengthens the\nPokémon’s bond with its Trainer, and it becomes\nAsh-Greninja. Water Shuriken gets more powerful."
    fr: "En battant un ennemi, ce Pokémon renforce ses liens\navec son Dresseur. Il prend alors sa Forme Sacha\net ses Sheauriken gagnent en puissance."
    it: "Se il Pokémon manda KO un nemico, il legame con\nl’Allenatore si rafforza, attivando la trasformazione\nin Greninja Forma Ash. Acqualame si potenzia."
    de: "Besiegt es ein Ziel, vertieft dies die Freundschaft zu\nseinem Trainer, wodurch es die Ash-Form annimmt\nund sein Wasser-Shuriken stärker wird."
    es: "Al derrotar a un rival, los vínculos con su Entrenador\nse refuerzan y se convierte en Greninja Ash. Su Shuriken\nde Agua también se ve potenciado."
    ko: "상대를 쓰러뜨리면 트레이너와의\n유대감이 깊어져서 지우개굴닌자로\n변한다. 물수리검이 강해진다."
    zh_simp: "打倒对手时，与训练家的牵绊会增强，\n变为小智版甲贺忍蛙。\n飞水手里剑的招式威力会增强。"
    zh_trad: "打倒對手時，與訓練家的牽絆會加深，\n變化成小智版甲賀忍蛙。\n飛水手裡劍的威力會增強。"
beast_boost:
  names:
    jp_kana: ビーストブースト
    jp_kanji: ビーストブースト
    en: Beast Boost
    fr: Boost Chimère
    it: Ultraboost
    de: Bestien-Boost
    es: Ultraimpulso
    ko: 비스트부스트
    zh_simp: 异兽提升
    zh_trad: 異獸提升
  descriptions:
    jp_kana: "あいてを　たおしたとき\nじぶんの　いちばん　たかい\nのうりょくが　あがる。"
    jp_kanji: "相手を　倒したとき\n自分の　いちばん　高い\n能力が　上がる。"
    en: "The Pokémon boosts its most proficient stat each\ntime it knocks out a Pokémon."
    fr: "Augmente la stat la plus élevée du Pokémon\ns’il met K.O. un autre Pokémon pendant son tour."
    it: "Quando il Pokémon manda KO un altro Pokémon,\naumenta la propria statistica di punta."
    de: "Erhöht in jeder Runde, in der es ein anderes Pokémon\nbesiegt, seinen höchsten Statuswert."
    es: "Si derrota a un rival en ese turno, aumenta su\ncaracterística más fuerte."
    ko: "상대를 기절시켰을 때\n자신의 가장 높은\n능력이 올라간다."
    zh_simp: "打倒对手的时候，\n自己最高的那项能力会提高。"
    zh_trad: "打倒對手的時候，\n會提高自己最高的那項能力。"
berserk:
  names:
    jp_kana: ぎゃくじょう
    jp_kanji: ぎゃくじょう
    en: Berserk
    fr: Dracolère
    it: Furore
    de: Wutausbruch
    es: Cólera
    ko: 발끈
    zh_simp: 怒火冲天
    zh_trad: 怒火沖天
  descriptions:
    jp_kana: "あいての　こうげきで\nＨＰが　はんぶんに　なると\nとくこうが　あがる。"
    jp_kanji: "相手の　攻撃で\nＨＰが　半分に　なると\n特攻が　上がる。"
    en: "Boosts the Pokémon’s Sp. Atk stat when it takes\na hit that causes its HP to become half or less."
    fr: "Augmente l’Attaque Spéciale du Pokémon lorsqu’il\ntombe à la moitié de ses PV à cause d’une attaque."
    it: "Se i PS scendono a metà o meno a causa di\nun attacco, l’Attacco Speciale aumenta."
    de: "Fallen seine KP nach einem Angriff auf die Hälfte des\nMaximalwerts oder weniger, steigt sein Spezial-Angriff."
    es: "Aumenta su Ataque Especial si sus PS se ven reducidos\na la mitad debido a algún ataque."
    ko: "상대의 공격으로\nHP가 절반이 되면\n특수공격이 올라간다."
    zh_simp: "因对手的攻击\nＨＰ变为一半时，\n特攻会提高。"
    zh_trad: "ＨＰ因對手的攻擊\n降到一半時，\n特攻會提高。"
big_pecks:
  names:
    jp_kana: はとむね
    jp_kanji: はとむね
    en: Big Pecks
    fr: Cœur de Coq
    it: Pettinfuori
    de: Brustbieter
    es: Sacapecho
    ko: 부풀린가슴
    zh_simp: 健壮胸肌
    zh_trad: 健壯胸肌
  descriptions:
    jp_kana: "ぼうぎょを　さげる\nこうかを　うけない。"
    jp_kanji: "防御を　下げる\n効果を　受けない。"
    en: "Protects the Pokémon from\nDefense-lowering effects."
    fr: Empêche les capacités adverses de baisser la Défense.
    it: Evita che la Difesa diminuisca.
    de: "Hindert Angreifer daran, die Verteidigung des Pokémon\nzu senken."
    es: Impide que el rival le baje la Defensa.
    ko: "방어를 떨어뜨리는\n효과를 받지 않는다."
    zh_simp: 不会受到防御降低的效果。
    zh_trad: 不會受到降低防禦的效果影響。
blaze:
  names:
    jp_kana: もうか
    jp_kanji: もうか
    en: Blaze
    fr: Brasier
    it: Aiutofuoco
    de: Großbrand
    es: Mar Llamas
    ko: 맹화
    zh_simp: 猛火
    zh_trad: 猛火
  descriptions:
    jp_kana: "ＨＰが　へったとき\nほのおタイプの　わざの\nいりょくが　あがる。"
    jp_kanji: "ＨＰが　減ったとき\nほのおタイプの　技の\n威力が　上がる。"
    en: "Powers up Fire-type moves when the Pokémon’s HP\nis low."
    fr: "Augmente la puissance des capacités de type Feu\ndu Pokémon quand il a perdu une certaine quantité\nde PV."
    it: "Quando il Pokémon ha pochi PS, la potenza delle\nsue mosse di tipo Fuoco aumenta."
    de: "Erhöht die Stärke von Feuer-Attacken, wenn die KP auf\neinen gewissen Wert fallen."
    es: "Potencia sus movimientos de tipo Fuego cuando le\nquedan pocos PS."
    ko: "HP가 줄었을 때\n불꽃타입 기술의\n위력이 올라간다."
    zh_simp: "ＨＰ减少的时候，\n火属性的招式威力会提高。"
    zh_trad: "ＨＰ減少的時候，\n火屬性的招式威力會提高。"
bulletproof:
  names:
    jp_kana: ぼうだん
    jp_kanji: ぼうだん
    en: Bulletproof
    fr: Pare-Balles
    it: Antiproiettile
    de: Kugelsicher
    es: Antibalas
    ko: 방탄
    zh_simp: 防弹
    zh_trad: 防彈
  descriptions:
    jp_kana: "あいての　たまや　ばくだんなどの\nわざを　ふせぐことが　できる。"
    jp_kanji: "相手の　弾や　爆弾などの\n技を　防ぐことが　できる。"
    en: "Protects the Pokémon from some ball and\nbomb moves."
    fr: "Protège de certaines capacités lançant des projectiles\ncomme des bombes et des balles."
    it: "Protegge da alcune mosse a base di proiettili\ne bombe."
    de: "Kann das Pokémon vor geworfenen kugelförmigen\nObjekten, wie zum Beispiel Bomben, schützen."
    es: No le afectan las bombas ni algunos proyectiles.
    ko: "상대의 구슬이나 폭탄 등의\n기술을 막을 수 있다."
    zh_simp: "可以防住对手的\n球和弹类招式。"
    zh_trad: "可防住對手的\n球和彈類的招式。"
cheek_pouch:
  names:
    jp_kana: ほおぶくろ
    jp_kanji: ほおぶくろ
    en: Cheek Pouch
    fr: Bajoues
    it: Guancegonfie
    de: Backentaschen
    es: Carrillo
    ko: 볼주머니
    zh_simp: 颊囊
    zh_trad: 頰囊
  descriptions:
    jp_kana: "どんな　きのみでも\nたべると　ＨＰも　かいふくする。"
    jp_kanji: "どんな　きのみでも\n食べると　ＨＰも　回復する。"
    en: Restores HP as well when the Pokémon eats a Berry.
    fr: "Restaure des PV lorsque le Pokémon consomme\nune Baie, quelle qu’elle soit."
    it: "Quando il Pokémon mangia una bacca, recupera anche\ndei PS."
    de: "Regeneriert beim Konsum von Beeren ungeachtet\nder Beerensorte KP."
    es: Recupera PS al comer cualquier baya.
    ko: "나무열매를 먹으면\n추가로 HP를 회복한다."
    zh_simp: "无论是哪种树果，\n食用后，ＨＰ都会回复。"
    zh_trad: "無論是哪種樹果，\n吃下去後ＨＰ都會回復。"
chilling_neigh:
  names:
    jp_kana: しろのいななき
    jp_kanji: しろのいななき
    en: Chilling Neigh
    fr: Blanche Ruade
    it: Nitrito Bianco
    de: Helles Wiehern
    es: Relincho Blanco
    ko: 백의울음
    zh_simp: 苍白嘶鸣
    zh_trad: 蒼白嘶鳴
  descriptions:
    jp_kana: "あいてを　たおすと\nつめたい　こえで　いなないて\nこうげきが　あがる。"
    jp_kanji: "相手を　倒すと\n冷たい　声で　いなないて\n攻撃が　上がる。"
    en: "When the Pokémon knocks out a target, it utters a\nchilling neigh, which boosts its Attack stat."
    fr: "Quand le Pokémon met un ennemi K.O., il émet\nun hennissement glaçant, ce qui augmente son Attaque."
    it: "Quando manda KO il nemico, emette un nitrito\nagghiacciante, aumentando il proprio Attacco."
    de: "Besiegt es ein Pokémon, stößt es ein frostiges Wiehern\naus und erhöht damit seinen Angriff."
    es: "Al derrotar a un objetivo, emite un relincho gélido y\naumenta su Ataque."
    ko: "상대를 쓰러뜨리면\n차가운 울음소리를 내면서\n공격이 올라간다."
    zh_simp: "打倒对手时\n会用冰冷的声音嘶鸣\n并提高攻击。"
    zh_trad: "打倒對手時\n會用冰冷的聲音嘶鳴\n並提高攻擊。"
chlorophyll:
  names:
    jp_kana: ようりょくそ
    jp_kanji: ようりょくそ
    en: Chlorophyll
    fr: Chlorophylle
    it: Clorofilla
    de: Chlorophyll
    es: Clorofila
    ko: 엽록소
    zh_simp: 叶绿素
    zh_trad: 葉綠素
  descriptions:
    jp_kana: "てんきが　はれのとき\nすばやさが　あがる。"
    jp_kanji: "天気が　晴れのとき\n素早さが　上がる。"
    en: Boosts the Pokémon’s Speed stat in harsh sunlight.
    fr: Augmente la Vitesse du Pokémon s’il y a du soleil.
    it: Se la luce del sole è intensa, la Velocità aumenta.
    de: Erhöht bei Sonnenschein die Initiative.
    es: Sube su Velocidad cuando hace sol.
    ko: "날씨가 맑을 때\n스피드가 올라간다."
    zh_simp: "晴朗天气时，\n速度会提高。"
    zh_trad: "天氣為晴朗時，\n速度會提高。"
clear_body:
  names:
    jp_kana: クリアボディ
    jp_kanji: クリアボディ
    en: Clear Body
    fr: Corps Sain
    it: Corpochiaro
    de: Neutraltorso
    es: Cuerpo Puro
    ko: 클리어바디
    zh_simp: 恒净之躯
    zh_trad: 恆淨之軀
  descriptions:
    jp_kana: "あいての　わざや　とくせいで\nのうりょくを　さげられない。"
    jp_kanji: "相手の　技や　特性で\n能力を　下げられない。"
    en: "Prevents other Pokémon’s moves or Abilities from\nlowering the Pokémon’s stats."
    fr: "Empêche les stats du Pokémon de baisser à cause\nd’une capacité ou d’un talent."
    it: "Impedisce la diminuzione delle statistiche causata\nda abilità o mosse di altri Pokémon."
    de: "Verhindert das Senken der Statuswerte durch Attacken\nund Fähigkeiten von Angreifern."
    es: "Evita que bajen sus características a causa de\nmovimientos o habilidades de otros Pokémon."
    ko: "상대 기술이나 특성으로\n능력이 떨어지지 않는다."
    zh_simp: "不会因为对手的招式或特性\n而被降低能力。"
    zh_trad: "不會因對手的招式或特性\n而被降低能力。"
cloud_nine:
  names:
    jp_kana: ノーてんき
    jp_kanji: ノーてんき
    en: Cloud Nine
    fr: Ciel Gris
    it: Antimeteo
    de: Wolke Sieben
    es: Aclimatación
    ko: 날씨부정
    zh_simp: 无关天气
    zh_trad: 無關天氣
  descriptions:
    jp_kana: "あらゆる　てんきの　えいきょうが\nなくなって　しまう。"
    jp_kanji: "あらゆる　天気の　影響が\nなくなって　しまう。"
    en: Eliminates the effects of weather.
    fr: Annule tous les effets liés à la météo.
    it: "Neutralizza gli effetti di tutte le condizioni\natmosferiche."
    de: Hebt alle Wetter-Effekte auf.
    es: Anula todos los efectos del tiempo atmosférico.
    ko: "모든 날씨의 영향이\n없어진다."
    zh_simp: 任何天气的影响都会消失。
    zh_trad: 任何天氣的影響都會消失。
color_change:
  names:
    jp_kana: へんしょく
    jp_kanji: へんしょく
    en: Color Change
    fr: Homochromie
    it: Cambiacolore
    de: Farbwechsel
    es: Cambio Color
    ko: 변색
    zh_simp: 变色
    zh_trad: 變色
  descriptions:
    jp_kana: "あいてから　うけた　わざの　タイプに\nじぶんの　タイプが　へんか　する。"
    jp_kanji: "相手から　受けた　技の　タイプに\n自分の　タイプが　変化　する。"
    en: "The Pokémon’s type becomes the type of the move\nused on it."
    fr: "Lorsque le Pokémon est touché par une capacité,\nil prend le type de celle-ci."
    it: Il Pokémon acquisisce il tipo della mossa subita.
    de: Ändert seinen Typ zu dem der Attacke des Angreifers.
    es: "Adopta el tipo del último movimiento del que es\nblanco."
    ko: "상대에게 받은 기술의 타입으로\n자신의 타입이 변화한다."
    zh_simp: "自己的属性会变为\n从对手处所受招式的属性。"
    zh_trad: "自己的屬性會變為\n擊中自己的對手招式的屬性。"
comatose:
  names:
    jp_kana: ぜったいねむり
    jp_kanji: ぜったいねむり
    en: Comatose
    fr: Hypersommeil
    it: Sonno Assoluto
    de: Dauerschlaf
    es: Letargo Perenne
    ko: 절대안깸
    zh_simp: 绝对睡眠
    zh_trad: 絕對睡眠
  descriptions:
    jp_kana: "つねに　ゆめうつつの　じょうたいで\nぜったいに　めざめない。\nねむったまま　こうげきが　できる。"
    jp_kanji: "つねに　夢うつつの　状態で\n絶対に　目覚めない。\n眠ったまま　攻撃が　できる。"
    en: "It’s always drowsing and will never wake up.\nIt can attack without waking up."
    fr: "Le Pokémon rêve en permanence et ne se réveille\njamais. Il est capable d’attaquer normalement\ntout en dormant."
    it: "Il Pokémon si trova in un costante stato di\ndormiveglia che gli impedisce di svegliarsi.\nPuò attaccare anche da addormentato."
    de: "Das Pokémon befindet sich ununterbrochen im\nHalbschlaf und wacht nie vollständig auf. Es kann\njedoch im Schlaf angreifen."
    es: "No despierta jamás de su profundo letargo e incluso\nataca dormido."
    ko: "항상 비몽사몽 상태로\n절대 깨지 않는다.\n잠든 상태로 공격할 수 있다."
    zh_simp: "总是半梦半醒的状态，\n绝对不会醒来。\n可以就这么睡着进行攻击。"
    zh_trad: "總是半夢半醒的狀態，\n絕對不會醒來。\n可在睡著的狀況下進行攻擊。"
competitive:
  names:
    jp_kana: かちき
    jp_kanji: かちき
    en: Competitive
    fr: Battant
    it: Tenacia
    de: Unbeugsamkeit
    es: Tenacidad
    ko: 승기
    zh_simp: 好胜
    zh_trad: 好勝
  descriptions:
    jp_kana: "のうりょくを　さげられると\nとくこうが　ぐーんと　あがる。"
    jp_kanji: "能力を　下げられると\n特攻が　ぐーんと　上がる。"
    en: "Boosts the Sp. Atk stat sharply when a stat\nis lowered."
    fr: "Augmente beaucoup l’Attaque Spéciale du Pokémon\nquand ses stats baissent."
    it: "L’Attacco Speciale aumenta di molto quando le\nstatistiche diminuiscono a causa di un nemico."
    de: "Erhöht den Spezial-Angriff stark, wenn ein Statuswert\ngesenkt wurde."
    es: "Aumenta mucho su Ataque Especial cuando el rival\nle baja cualquiera de sus características."
    ko: "능력이 떨어지면\n특수공격이 크게 올라간다."
    zh_simp: "如果能力被降低，\n特攻就会大幅提高。"
    zh_trad: "能力被降低時，\n特攻會大幅提高。"
compound_eyes:
  names:
    jp_kana: ふくがん
    jp_kanji: ふくがん
    en: Compound Eyes
    fr: Œil Composé
    it: Insettocchi
    de: Facettenauge
    es: Ojo Compuesto
    ko: 복안
    zh_simp: 复眼
    zh_trad: 複眼
  descriptions:
    jp_kana: "ふくがんを　もっているため\nわざの　めいちゅうりつが　あがる。"
    jp_kanji: "複眼を　持っているため\n技の　命中率が　上がる。"
    en: The Pokémon’s compound eyes boost its accuracy.
    fr: "Les yeux à facettes du Pokémon augmentent\nsa Précision."
    it: "La precisione del Pokémon aumenta grazie ai suoi\nocchi composti."
    de: Erhöht die Genauigkeit von Attacken.
    es: Aumenta la precisión de sus movimientos.
    ko: "복안을 가지고 있어\n기술의 명중률이 올라간다."
    zh_simp: "因为拥有复眼，\n招式的命中率会提高。"
    zh_trad: "因為擁有複眼，\n會提高招式的命中率。"
contrary:
  names:
    jp_kana: あまのじゃく
    jp_kanji: あまのじゃく
    en: Contrary
    fr: Contestation
    it: Inversione
    de: Umkehrung
    es: Respondón
    ko: 심술꾸러기
    zh_simp: 唱反调
    zh_trad: 唱反調
  descriptions:
    jp_kana: "のうりょくの　へんかが　ぎゃくてんして\nあがるときに　さがり\nさがるときに　あがる。"
    jp_kanji: "能力の　変化が　逆転して\n上がるときに　下がり\n下がるときに　上がる。"
    en: Makes stat changes have an opposite effect.
    fr: "Inverse les changements de stats :\nles augmentations de stats se transforment en baisses,\net vice-versa."
    it: "Le modifiche alle statistiche hanno effetto inverso:\nle statistiche aumentano quando dovrebbero diminuire\ne viceversa."
    de: "Statusveränderungen werden umgekehrt: Statuswerte,\ndie eigentlich erhöht werden sollten, sinken und\numgekehrt."
    es: "Invierte los cambios en las características: bajan\ncuando les toca subir y suben cuando les toca bajar."
    ko: "능력의 변화가 역전해서\n올라갈 때 떨어지고\n떨어질 때 올라간다."
    zh_simp: "能力的变化发生逆转，\n原本提高时会降低，\n而原本降低时会提高。"
    zh_trad: "能力的變化會逆轉，\n原本提高時會降低，\n原本降低時會提高。"
corrosion:
  names:
    jp_kana: ふしょく
    jp_kanji: ふしょく
    en: Corrosion
    fr: Corrosion
    it: Corrosione
    de: Korrosion
    es: Corrosión
    ko: 부식
    zh_simp: 腐蚀
    zh_trad: 腐蝕
  descriptions:
    jp_kana: "はがねタイプや　どくタイプも\nどく　じょうたいに　することが　できる。"
    jp_kanji: "はがねタイプや　どくタイプも\nどく状態に　することが　できる。"
    en: "The Pokémon can poison the target even if it’s\na Steel or Poison type."
    fr: "Permet d’empoisonner les Pokémon de type Acier\nou Poison."
    it: "Il Pokémon è in grado di avvelenare il bersaglio\nanche se questo è di tipo Acciaio o Veleno."
    de: Kann selbst Pokémon vom Typ Stahl oder Gift vergiften.
    es: "Puede envenenar incluso a rivales de tipo Acero o\nVeneno."
    ko: "강철타입이나 독타입 포켓몬도\n독 상태로 만들 수 있다."
    zh_simp: "可以使钢属性和毒属性的宝可梦\n也陷入中毒状态。"
    zh_trad: "就算對方是鋼屬性或毒屬性寶可夢，\n也可讓對方陷入中毒狀態。"
cotton_down:
  names:
    jp_kana: わたげ
    jp_kanji: わたげ
    en: Cotton Down
    fr: Effilochage
    it: Lanugine
    de: Wollflaum
    es: Pelusa
    ko: 솜털
    zh_simp: 棉絮
    zh_trad: 棉絮
  descriptions:
    jp_kana: "こうげきを　うけると　わたげを　ばらまいて\nじぶんいがいの　ポケモン　すべての\nすばやさを　さげる。"
    jp_kanji: "攻撃を　受けると　わたげを　ばらまいて\n自分以外の　ポケモン　すべての\n素早さを　下げる。"
    en: "When the Pokémon is hit by an attack, it scatters\ncotton fluff around and lowers the Speed stat of\nall Pokémon except itself."
    fr: "Quand le Pokémon est touché par une attaque,\nil dissémine des aigrettes qui diminuent la Vitesse\nde tout le monde, sauf la sienne."
    it: "Se il Pokémon subisce un attacco, sparge della lanugine\nche diminuisce la Velocità di tutti i Pokémon in campo\ntranne la sua."
    de: "Wird es von einem Angriff getroffen, verstreut es Teile\nseines Wollflaums, wodurch die Initiative aller anderen\nPokémon sinkt."
    es: "Al ser alcanzado por un ataque, suelta una pelusa de\nalgodón que reduce la Velocidad de todos los demás\nPokémon."
    ko: "공격을 받으면 솜털을 흩뿌려서\n자신을 제외한 모든 포켓몬의\n스피드를 떨어뜨린다."
    zh_simp: "受到攻击后撒下棉絮，\n降低除自己以外的\n所有宝可梦的速度。"
    zh_trad: "受到攻擊時會撒下棉絮，\n降低除自己以外的\n所有寶可夢的速度。"
curious_medicine:
  names:
    jp_kana: きみょうなくすり
    jp_kanji: きみょうなくすり
    en: Curious Medicine
    fr: Breuvage Suspect
    it: Stranofarmaco
    de: Kuriose Arznei
    es: Medicina Extraña
    ko: 기묘한약
    zh_simp: 怪药
    zh_trad: 怪藥
  descriptions:
    jp_kana: "とうじょう　したときに\nかいがらから　くすりを　ふりまいて\nみかたの　のうりょくへんかを　もとにもどす。"
    jp_kanji: "登場　したときに\n貝がらから　薬を　振りまいて\n味方の　能力変化を　元に戻す。"
    en: "When the Pokémon enters a battle, it scatters medicine\nfrom its shell, which removes all stat changes\nfrom allies."
    fr: "Quand il entre au combat, le Pokémon répand\nune substance qui annule les changements de stats\nde ses alliés."
    it: "Quando il Pokémon entra in campo, sparge un farmaco\ndalla conchiglia che annulla le modifiche alle statistiche\ndegli alleati."
    de: "Das Pokémon versprüht bei Kampfantritt Arznei aus\nseiner Muschel, die alle Statusveränderungen auf der\nMitstreiterseite aufhebt."
    es: "Al entrar en combate, rezuma una substancia medicinal\npor la caracola que revierte los cambios en las\ncaracterísticas de los aliados."
    ko: "등장했을 때\n조개껍질에서 약을 흩뿌려서\n능력 변화를 원래대로 되돌린다."
    zh_simp: "出场时会从贝壳撒药，\n将我方的能力变化复原。"
    zh_trad: "出場時，會從貝殼撒藥，\n將我方的能力變化復原。"
cursed_body:
  names:
    jp_kana: のろわれボディ
    jp_kanji: のろわれボディ
    en: Cursed Body
    fr: Corps Maudit
    it: Corpofunesto
    de: Tastfluch
    es: Cuerpo Maldito
    ko: 저주받은바디
    zh_simp: 咒术之躯
    zh_trad: 詛咒之軀
  descriptions:
    jp_kana: "こうげきを　うけると　あいての　わざを\nかなしばり　じょうたいに\nすることが　ある。"
    jp_kanji: "攻撃を　受けると　相手の　技を\nかなしばり状態に\nすることが　ある。"
    en: May disable a move used on the Pokémon.
    fr: "Quand le Pokémon est touché par une capacité,\nil inflige parfois Entrave sur celle-ci."
    it: Può bloccare la mossa subita dal Pokémon.
    de: "Blockiert eventuell die Attacke, mit welcher der\nAngreifer es getroffen hat."
    es: Puede anular el movimiento usado en su contra.
    ko: "공격을 받으면 상대의 기술을\n사슬묶기 상태로\n만들 때가 있다."
    zh_simp: "受到攻击时，\n有时会把对手的招式\n变为定身法状态。"
    zh_trad: "受到攻擊時，\n有時會把對手的招式\n變為定身法狀態。"
cute_charm:
  names:
    jp_kana: メロメロボディ
    jp_kanji: メロメロボディ
    en: Cute Charm
    fr: Joli Sourire
    it: Incantevole
    de: Charmebolzen
    es: Gran Encanto
    ko: 헤롱헤롱바디
    zh_simp: 迷人之躯
    zh_trad: 迷人之軀
  descriptions:
    jp_kana: "じぶんに　さわった　あいてを\nメロメロに　することが　ある。"
    jp_kanji: "自分に　触った　相手を\nメロメロに　することが　ある。"
    en: Contact with the Pokémon may cause infatuation.
    fr: "Peut séduire l’attaquant lorsque le Pokémon subit\nune attaque directe."
    it: "Può causare infatuazione a chi manda a segno\nun attacco diretto."
    de: "Wird dieses Pokémon durch eine direkte Attacke\nangegriffen, verliebt sich der Gegner eventuell in es."
    es: Puede causar enamoramiento al rival que lo toque.
    ko: "자신에게 접촉한 상대를\n헤롱헤롱하게 만들 때가 있다."
    zh_simp: 有时会让接触到自己的对手着迷。
    zh_trad: "有時會讓接觸到自己的對手\n陷入著迷狀態。"
damp:
  names:
    jp_kana: しめりけ
    jp_kanji: しめりけ
    en: Damp
    fr: Moiteur
    it: Umidità
    de: Feuchtigkeit
    es: Humedad
    ko: 습기
    zh_simp: 湿气
    zh_trad: 濕氣
  descriptions:
    jp_kana: "あたりを　しめらせることに　よって\nじばく　などの　ばくはつする　わざを\nだれも　つかえなくなる。"
    jp_kanji: "あたりを　湿らせることに　よって\nじばく　などの　爆発する　技を\nだれも　使えなくなる。"
    en: "Prevents the use of explosive moves, such as\nSelf-Destruct, by dampening its surroundings."
    fr: "Le Pokémon augmente l’humidité de l’air,\nce qui empêche tous les Pokémon d’utiliser\ndes capacités explosives telles que Destruction."
    it: "Aumenta l’umidità circostante, impedendo l’uso\ndi Autodistruzione e di altre mosse esplosive."
    de: "Befeuchtet die Umgebung und verhindert so den Einsatz\nvon Attacken wie Finale, die Explosionen auslösen."
    es: "Aumenta la humedad del entorno y evita que se\npuedan utilizar movimientos explosivos, tales como\nAutodestrucción."
    ko: "주변을 습하게 함으로써\n자폭 등 폭발하는 기술을\n아무도 못 쓰게 한다."
    zh_simp: "通过把周围都弄湿，\n使谁都无法使用玉石俱碎等爆发类的招式。"
    zh_trad: "透過把周圍都弄濕，\n使誰都無法使用自爆等爆炸類的招式。"
dancer:
  names:
    jp_kana: おどりこ
    jp_kanji: おどりこ
    en: Dancer
    fr: Danseuse
    it: Sincrodanza
    de: Tänzer
    es: Pareja de Baile
    ko: 무희
    zh_simp: 舞者
    zh_trad: 舞者
  descriptions:
    jp_kana: "だれかが　おどりわざを　つかうと\nじぶんも　それに　つづいて\nおどりわざを　だすことが　できる。"
    jp_kanji: "だれかが　踊り技を　使うと\n自分も　それに　続いて\n踊り技を　出すことが　できる。"
    en: "When another Pokémon uses a dance move,\nit can use a dance move following it regardless\nof its Speed."
    fr: "Si n’importe quel Pokémon utilise une capacité dansante,\nce Pokémon peut se mettre aussi à danser."
    it: "Permette al Pokémon di copiare immediatamente\nqualsiasi mossa basata sulla danza usata da un\naltro Pokémon in campo."
    de: "Kann direkt im Anschluss an die Tanz-Attacke eines\nanderen Pokémon ebenfalls eine solche einsetzen."
    es: "Puede copiar inmediatamente cualquier movimiento\nde baile que haya usado otro Pokémon presente en\nel combate."
    ko: "누군가 춤 기술을 쓰면\n자신도 이어서\n춤 기술을 쓸 수 있다."
    zh_simp: "有谁使出跳舞招式时，\n自己也能就这么接着使出跳舞招式。"
    zh_trad: "當有誰使出跳舞招式時，\n自己也能接著使出跳舞招式。"
dark_aura:
  names:
    jp_kana: ダークオーラ
    jp_kanji: ダークオーラ
    en: Dark Aura
    fr: Aura Ténébreuse
    it: Auratetra
    de: Dunkelaura
    es: Aura Oscura
    ko: 다크오라
    zh_simp: 暗黑气场
    zh_trad: 暗黑氣場
  descriptions:
    jp_kana: "ぜんいんの　あくタイプの\nわざが　つよくなる。"
    jp_kanji: "全員の　あくタイプの\n技が　強くなる。"
    en: Powers up each Pokémon’s Dark-type moves.
    fr: "Augmente la puissance des attaques de type Ténèbres\nde tous les Pokémon."
    it: Potenzia le mosse di tipo Buio di tutti i Pokémon.
    de: Erhöht die Stärke aller Attacken des Typs Unlicht.
    es: "Aumenta la potencia de todos los movimientos de tipo\nSiniestro."
    ko: "전원의 악타입\n기술이 강해진다."
    zh_simp: 全体的恶属性招式变强。
    zh_trad: 全體的惡屬性招式變強。
dauntless_shield:
  names:
    jp_kana: ふくつのたて
    jp_kanji: ふくつのたて
    en: Dauntless Shield
    fr: Égide Inflexible
    it: Scudo Saldo
    de: Wackerer Schild
    es: Escudo Recio
    ko: 불굴의방패
    zh_simp: 不屈之盾
    zh_trad: 不屈之盾
  descriptions:
    jp_kana: "とうじょう　したときに\nぼうぎょが　あがる。"
    jp_kanji: "登場　したときに\n防御が　上がる。"
    en: "Boosts the Pokémon’s Defense stat when the\nPokémon enters a battle."
    fr: "Augmente la Défense du Pokémon quand il entre\nau combat."
    it: "Quando il Pokémon entra in campo, la sua Difesa\naumenta."
    de: Erhöht bei Kampfantritt die Verteidigung.
    es: Aumenta su Defensa al entrar en combate.
    ko: "등장했을 때\n방어가 올라간다."
    zh_simp: "出场时，\n防御会提高。"
    zh_trad: "出場時，\n防禦會提高。"
dazzling:
  names:
    jp_kana: ビビッドボディ
    jp_kanji: ビビッドボディ
    en: Dazzling
    fr: Corps Coloré
    it: Corposgargiante
    de: Buntkörper
    es: Cuerpo Vívido
    ko: 비비드바디
    zh_simp: 鲜艳之躯
    zh_trad: 鮮艷之軀
  descriptions:
    jp_kana: "あいてを　びっくり　させて\nこちらに　むかって　せんせいわざを\nだせない　ようにする。"
    jp_kanji: "相手を　びっくり　させて\nこちらに　むかって　先制技を\n出せない　ようにする。"
    en: "Surprises the opposing Pokémon, making it unable\nto attack using priority moves."
    fr: "L’adversaire est abasourdi par le Pokémon et\nne peut pas le viser avec une capacité prioritaire."
    it: "Il Pokémon sbalordisce il nemico e non gli permette\ndi attaccarlo con mosse che hanno priorità alta."
    de: "Überrascht Gegner und hindert sie so daran,\nErstschlag-Attacken gegen es einzusetzen."
    es: "Desconcierta al rival y le impide utilizar movimientos\ncon prioridad en su contra."
    ko: "상대를 놀라게 해서\n이쪽을 향한 선제 기술을\n사용할 수 없게 한다."
    zh_simp: "让对手吓一跳，\n使其无法对我方使出先制招式。"
    zh_trad: "讓對手嚇一跳，\n使其無法對我方使出先制招式。"
defeatist:
  names:
    jp_kana: よわき
    jp_kanji: よわき
    en: Defeatist
    fr: Défaitiste
    it: Sconforto
    de: Schwächling
    es: Flaqueza
    ko: 무기력
    zh_simp: 软弱
    zh_trad: 軟弱
  descriptions:
    jp_kana: "ＨＰが　はんぶんに　なると\nよわきに　なって　こうげきと\nとくこうが　はんげんする。"
    jp_kanji: "ＨＰが　半分に　なると\n弱気に　なって　攻撃と\n特攻が　半減する。"
    en: "Halves the Pokémon’s Attack and Sp. Atk stats\nwhen its HP becomes half or less."
    fr: "Le Pokémon devient défaitiste quand ses PV tombent\nà la moitié, et son Attaque et son Attaque Spéciale\nsont divisées par deux."
    it: "Quando i PS scendono a metà o meno, il Pokémon\nsi scoraggia e l’Attacco e l’Attacco Speciale\nvengono dimezzati."
    de: "Fallen seine KP auf die Hälfte des Maximalwerts oder\nweniger, bekommt es Angst. Dadurch wird die Stärke\nseines Angriffs und Spezial-Angriffs halbiert."
    es: "Se debilita tanto cuando sus PS se ven reducidos a la\nmitad que su Ataque y su Ataque Especial bajan."
    ko: "HP가 절반이 되면\n무기력해져서 공격과\n특수공격이 반감된다."
    zh_simp: "ＨＰ减半时，\n会变得软弱，\n攻击和特攻会减半。"
    zh_trad: "ＨＰ降到一半以下時，\n會變得軟弱而使得\n攻擊和特攻減半。"
defiant:
  names:
    jp_kana: まけんき
    jp_kanji: まけんき
    en: Defiant
    fr: Acharné
    it: Agonismo
    de: Siegeswille
    es: Competitivo
    ko: 오기
    zh_simp: 不服输
    zh_trad: 不服輸
  descriptions:
    jp_kana: "のうりょくを　さげられると\nこうげきが　ぐーんと　あがる。"
    jp_kanji: "能力を　下げられると\n攻撃が　ぐーんと　上がる。"
    en: "Boosts the Pokémon’s Attack stat sharply when its\nstats are lowered."
    fr: "Augmente beaucoup l’Attaque du Pokémon\nquand ses stats baissent."
    it: "L’Attacco aumenta di molto quando le statistiche\ndiminuiscono a causa di un nemico."
    de: "Erhöht den Angriff stark, wenn ein Statuswert\ngesenkt wurde."
    es: "Sube mucho su Ataque cuando el rival le baja las\ncaracterísticas."
    ko: "능력이 떨어지면\n공격이 크게 올라간다."
    zh_simp: "能力被降低时，\n攻击会大幅提高。"
    zh_trad: "能力被降低時，\n攻擊會大幅提高。"
delta_stream:
  names:
    jp_kana: デルタストリーム
    jp_kanji: デルタストリーム
    en: Delta Stream
    fr: Souffle Delta
    it: Flusso Delta
    de: Delta-Wind
    es: Ráfaga Delta
    ko: 델타스트림
    zh_simp: 德尔塔气流
    zh_trad: 德爾塔氣流
  descriptions:
    jp_kana: "ひこうタイプの　じゃくてんが\nなくなる　てんきにする。"
    jp_kanji: "ひこうタイプの　弱点が\nなくなる　天気にする。"
    en: "The Pokémon changes the weather to eliminate all\nof the Flying type’s weaknesses."
    fr: "Altère les conditions météo et annule les faiblesses\ndu type Vol."
    it: "Crea un clima che annulla i punti deboli\ndel tipo Volante."
    de: "Ändert das Wetter, um die Schwächen des Typs Flug\nzu beseitigen."
    es: "Altera el clima para anular las vulnerabilidades del tipo\nVolador."
    ko: "비행타입의 약점이\n없어지는 날씨로 만든다."
    zh_simp: "变为令飞行属性的弱点\n消失的天气。"
    zh_trad: "變為令飛行屬性的弱點\n消失的天氣。"
desolate_land:
  names:
    jp_kana: おわりのだいち
    jp_kanji: おわりのだいち
    en: Desolate Land
    fr: Terre Finale
    it: Terra Estrema
    de: Endland
    es: Tierra del Ocaso
    ko: 끝의대지
    zh_simp: 终结之地
    zh_trad: 終結之地
  descriptions:
    jp_kana: "みずタイプの　こうげきを\nうけない　てんきにする。"
    jp_kanji: "みずタイプの　攻撃を\n受けない　天気にする。"
    en: "The Pokémon changes the weather to nullify\nWater-type attacks."
    fr: "Altère les conditions météo et rend inefficaces\nles attaques de type Eau."
    it: "Crea un clima che rende inefficaci\ngli attacchi di tipo Acqua."
    de: "Ändert das Wetter, um Wasser-Attacken wirkungslos\nzu machen."
    es: Altera el clima para anular los ataques de tipo Agua.
    ko: "물타입의 공격을\n받지 않는 날씨로 만든다."
    zh_simp: "变为不会受到\n水属性攻击的天气。"
    zh_trad: "變為讓水屬性攻擊\n失效的天氣。"
disguise:
  names:
    jp_kana: ばけのかわ
    jp_kanji: ばけのかわ
    en: Disguise
    fr: Fantômasque
    it: Fantasmanto
    de: Kostümspuk
    es: Disfraz
    ko: 탈
    zh_simp: 画皮
    zh_trad: 畫皮
  descriptions:
    jp_kana: "からだを　おおう　ばけのかわで\n１かい　こうげきを　ふせぐことが　できる。"
    jp_kanji: "体を　被う　化けの皮で\n１回　攻撃を　防ぐことが　できる。"
    en: "Once per battle, the shroud that covers the\nPokémon can protect it from an attack."
    fr: "Le déguisement qui recouvre le corps du Pokémon\nest capable de le protéger d’une attaque."
    it: "Il panno che ricopre il Pokémon lo protegge\nda un singolo attacco."
    de: "Kann ein Mal pro Kampf mit seinem gruseligen Kostüm\neinen Angriff abwehren."
    es: "Puede eludir un ataque valiéndose de la tela que le\ncubre el cuerpo una vez por combate."
    ko: "몸을 덮는 탈로\n1번 공격을 막을 수 있다."
    zh_simp: "通过画皮覆盖住身体，\n可以防住１次攻击。"
    zh_trad: "用畫皮覆蓋住身體，\n可防住１次攻擊。"
download:
  names:
    jp_kana: ダウンロード
    jp_kanji: ダウンロード
    en: Download
    fr: Télécharge
    it: Download
    de: Download
    es: Descarga
    ko: 다운로드
    zh_simp: 下载
    zh_trad: 下載
  descriptions:
    jp_kana: "あいての　ぼうぎょと　とくぼうを　くらべて\nひくい　ほうの　のうりょくに　あわせて\nじぶんの　こうげきか　とくこうを　あげる。"
    jp_kanji: "相手の　防御と　特防を　くらべて\n低い　ほうの　能力に　あわせて\n自分の　攻撃か　特攻を　上げる。"
    en: "Compares an opposing Pokémon’s Defense and\nSp. Def stats before raising its own Attack or\nSp. Atk stat—whichever will be more effective."
    fr: "Le Pokémon compare la Défense et la Défense Spéciale\nde l’adversaire et, en fonction de la stat la plus basse,\nil augmente sa propre Attaque ou Attaque Spéciale."
    it: "Il Pokémon analizza Difesa e Difesa Speciale\ndel nemico e, a seconda di qual è più bassa,\naumenta il proprio Attacco o Attacco Speciale."
    de: "Ist die Spezial-Verteidigung des Gegners niedriger als\nseine Verteidigung, wird der eigene Spezial-Angriff\nerhöht. Ist die Verteidigung niedriger, steigt der Angriff."
    es: "Compara la Defensa y la Defensa Especial del rival\npara ver cuál es inferior y aumenta su propio Ataque\no Ataque Especial según sea lo más eficaz."
    ko: "상대의 방어와 특수방어를 비교해서\n낮은 쪽 능력에 맞춰서\n자신의 공격이나 특수공격을 올린다."
    zh_simp: "比较对手的防御和特防，\n根据较低的那项能力\n相应地提高自己的攻击或特攻。"
    zh_trad: "比較對手的防禦和特防，\n根據較低的那項能力\n相應地提高自己的攻擊或特攻。"
dragons_maw:
  names:
    jp_kana: りゅうのあぎと
    jp_kanji: りゅうのあぎと
    en: Dragon’s Maw
    fr: Dent de Dragon
    it: Dragomascelle
    de: Drachenkiefer
    es: Mandíbula Dragón
    ko: 용의턱
    zh_simp: 龙颚
    zh_trad: 龍顎
  descriptions:
    jp_kana: "ドラゴンタイプの　わざの\nいりょくが　あがる。"
    jp_kanji: "ドラゴンタイプの　技の\n威力が　上がる。"
    en: Powers up Dragon-type moves.
    fr: Augmente la puissance des attaques de type Dragon.
    it: Potenzia le mosse di tipo Drago.
    de: Erhöht die Stärke von Drachen-Attacken.
    es: Potencia los movimientos de tipo Dragón.
    ko: "드래곤타입 기술의\n위력이 올라간다."
    zh_simp: 龙属性的招式威力会提高。
    zh_trad: 龍屬性的招式威力會提高。
drizzle:
  names:
    jp_kana: あめふらし
    jp_kanji: あめふらし
    en: Drizzle
    fr: Crachin
    it: Piovischio
    de: Niesel
    es: Llovizna
    ko: 잔비
    zh_simp: 降雨
    zh_trad: 降雨
  descriptions:
    jp_kana: "とうじょう　したときに\nてんきを　あめに　する。"
    jp_kanji: "登場　したときに\n天気を　雨に　する。"
    en: The Pokémon makes it rain when it enters a battle.
    fr: Le Pokémon invoque la pluie quand il entre au combat.
    it: Quando il Pokémon entra in campo, attira la pioggia.
    de: Ruft bei Kampfantritt Regen herbei.
    es: Hace que llueva al entrar en combate.
    ko: "등장했을 때\n날씨를 비로 만든다."
    zh_simp: "出场时，\n会将天气变为下雨。"
    zh_trad: "出場時，\n會將天氣變為下雨。"
drought:
  names:
    jp_kana: ひでり
    jp_kanji: ひでり
    en: Drought
    fr: Sécheresse
    it: Siccità
    de: Dürre
    es: Sequía
    ko: 가뭄
    zh_simp: 日照
    zh_trad: 日照
  descriptions:
    jp_kana: "とうじょう　したときに\nてんきを　はれに　する。"
    jp_kanji: "登場　したときに\n天気を　晴れに　する。"
    en: "Turns the sunlight harsh when the Pokémon enters\na battle."
    fr: "Le soleil se met à briller quand le Pokémon\nentre au combat."
    it: "Quando il Pokémon entra in campo, la luce solare\ndiventa intensa."
    de: Erzeugt bei Kampfantritt gleißendes Sonnenlicht.
    es: "Cuando entra en combate, el tiempo pasa a ser\nsoleado."
    ko: "등장했을 때\n날씨를 맑음으로 만든다."
    zh_simp: "出场时，\n会将天气变为晴朗。"
    zh_trad: "出場時，\n會將天氣變為晴朗。"
dry_skin:
  names:
    jp_kana: かんそうはだ
    jp_kanji: かんそうはだ
    en: Dry Skin
    fr: Peau Sèche
    it: Pellearsa
    de: Trockenheit
    es: Piel Seca
    ko: 건조피부
    zh_simp: 干燥皮肤
    zh_trad: 乾燥皮膚
  descriptions:
    jp_kana: "てんきが　あめのときや　みずタイプの\nわざで　ＨＰが　かいふくし　はれのときや\nほのおタイプの　わざで　へってしまう。"
    jp_kanji: "天気が　雨の時や　みずタイプの\n技で　ＨＰが　回復し　はれの時や\nほのおタイプの　技で　減ってしまう。"
    en: "Restores HP in rain or when hit by Water-type\nmoves. Reduces HP in harsh sunlight, and increases\nthe damage received from Fire-type moves."
    fr: "Le Pokémon perd des PV quand le soleil brille,\nmais il en regagne lorsqu’il pleut ou s’il est touché par\nune capacité Eau. Il subit aussi plus de dégâts de Feu."
    it: "Il Pokémon recupera PS se piove o se subisce\nmosse di tipo Acqua, ma perde PS con la luce solare\nintensa. Subisce più danni da mosse di tipo Fuoco."
    de: "Bei Sonnenschein verliert das Pokémon KP und der\nSchaden durch Feuer-Attacken steigt. Bei Regen und\nTreffern durch Wasser-Attacken regeneriert es KP."
    es: "Pierde PS si hace sol y los recupera si llueve o recibe\nun movimiento de tipo Agua. Los movimientos de tipo\nFuego, por su parte, le hacen más daño de lo normal."
    ko: "비가 오는 날씨나\n물타입의 기술로 공격받으면 HP가 회복되고\n맑을 때나 불꽃타입의 기술로 공격받으면 줄어든다."
    zh_simp: "下雨天气时和受到水属性的招式时，\nＨＰ会回复。晴朗天气时和受到火属性的\n招式时，ＨＰ会减少。"
    zh_trad: "下雨天氣時和受到水屬性的招式攻擊時，\nＨＰ會回復。晴朗天氣時和受到火屬性的\n招式攻擊時，ＨＰ會減少。"
early_bird:
  names:
    jp_kana: はやおき
    jp_kanji: はやおき
    en: Early Bird
    fr: Matinal
    it: Sveglialampo
    de: Frühwecker
    es: Madrugar
    ko: 일찍기상
    zh_simp: 早起
    zh_trad: 早起
  descriptions:
    jp_kana: "ねむり　じょうたいに　なっても\n２ばいの　はやさで\nめざめる　ことが　できる。"
    jp_kanji: "ねむり状態に　なっても\n２倍の　早さで\n目覚める　ことが　できる。"
    en: "The Pokémon awakens from sleep twice as fast\nas other Pokémon."
    fr: "Le Pokémon se réveille deux fois plus rapidement\nque les autres."
    it: "Il Pokémon impiega metà del tempo per risvegliarsi\ndal sonno rispetto agli altri."
    de: "Wenn es eingeschlafen ist, kann es doppelt so schnell\nwieder aufwachen wie andere Pokémon."
    es: "Si se duerme, tardará la mitad de tiempo en\ndespertarse."
    ko: "잠듦 상태가 되어도\n2배 빠르게\n깨어날 수 있다."
    zh_simp: "即使变为睡眠状态，\n也能以２倍的速度提早醒来。"
    zh_trad: "即使陷入睡眠狀態，\n也能以２倍的速度提早醒來。"
effect_spore:
  names:
    jp_kana: ほうし
    jp_kanji: ほうし
    en: Effect Spore
    fr: Pose Spore
    it: Spargispora
    de: Sporenwirt
    es: Efecto Espora
    ko: 포자
    zh_simp: 孢子
    zh_trad: 孢子
  descriptions:
    jp_kana: "こうげきで　じぶんに　ふれた　あいてを\nどくや　まひや　ねむり　じょうたいに\nする　ことがある。"
    jp_kanji: "攻撃で　自分に　触れた　相手を\nどくや　まひや　ねむり状態に\nする　ことがある。"
    en: "Contact with the Pokémon may inflict poison, sleep,\nor paralysis on its attacker."
    fr: "Peut paralyser, empoisonner ou endormir l’attaquant\nlorsque le Pokémon subit une attaque directe."
    it: "Può causare avvelenamento, paralisi o sonno\na chi manda a segno un attacco diretto."
    de: "Wird dieses Pokémon durch eine direkte Attacke\nangegriffen, kann das beim Gegner Paralyse,\nVergiftung oder Schlaf auslösen."
    es: "Puede dormir, envenenar o paralizar al Pokémon con\nel que entre en contacto al recibir un ataque."
    ko: "공격으로 자신에게 접촉한 상대를\n독이나 마비, 잠듦 상태로\n만들 때가 있다."
    zh_simp: "受到攻击时，\n有时会把接触到自己的对手\n变为中毒、麻痹或睡眠状态。"
    zh_trad: "受到攻擊時，\n有時會讓接觸到自己的對手\n陷入中毒、麻痺或睡眠狀態。"
electric_surge:
  names:
    jp_kana: エレキメイカー
    jp_kanji: エレキメイカー
    en: Electric Surge
    fr: Créa-Élec
    it: Elettrogenesi
    de: Elektro-Erzeuger
    es: Electrogénesis
    ko: 일렉트릭메이커
    zh_simp: 电气制造者
    zh_trad: 電氣製造者
  descriptions:
    jp_kana: "とうじょう　したときに\nエレキフィールドを　はりめぐらせる。"
    jp_kanji: "登場　したときに\nエレキフィールドを　はりめぐらせる。"
    en: "Turns the ground into Electric Terrain when the\nPokémon enters a battle."
    fr: "Le Pokémon crée un Champ Électrifié au moment\noù il entre au combat."
    it: "Quando il Pokémon entra in campo,\nlo trasforma in un Campo Elettrico."
    de: Erzeugt bei Kampfantritt ein Elektrofeld.
    es: Crea un campo eléctrico al entrar en combate.
    ko: "등장했을 때\n일렉트릭필드를 사용한다."
    zh_simp: "出场时，\n会布下电气场地。"
    zh_trad: "出場時，\n會布下電氣場地。"
emergency_exit:
  names:
    jp_kana: ききかいひ
    jp_kanji: ききかいひ
    en: Emergency Exit
    fr: Repli Tactique
    it: Passoindietro
    de: Rückzug
    es: Retirada
    ko: 위기회피
    zh_simp: 危险回避
    zh_trad: 危險迴避
  descriptions:
    jp_kana: "ＨＰが　はんぶんに　なると\nきけんを　かいひするため\nてもちに　ひっこんで　しまう。"
    jp_kanji: "ＨＰが　半分に　なると\n危険を　回避するため\n手持ちに　引っ込んで　しまう。"
    en: "The Pokémon, sensing danger, switches out when its\nHP becomes half or less."
    fr: "Le Pokémon évite les situations inutilement\ndangereuses. Quand ses PV tombent à la moitié,\nil se réfugie dans sa Poké Ball."
    it: "Se i PS scendono a metà o meno, il Pokémon\nabbandona la lotta per sfuggire al pericolo."
    de: "Fallen seine KP auf die Hälfte des Maximalwerts oder\nweniger, bringt es sich in Sicherheit."
    es: "Abandona el terreno de combate cuando sus PS se ven\nreducidos a la mitad para evitar males mayores."
    ko: "HP가 절반이 되면\n위험을 회피하기 위해\n지닌 포켓몬으로 돌아간다."
    zh_simp: "ＨＰ变为一半时，\n为了回避危险，\n会退回到同行队伍中。"
    zh_trad: "ＨＰ減到一半時，\n為了避開危險，\n會退回同行隊伍裡面。"
fairy_aura:
  names:
    jp_kana: フェアリーオーラ
    jp_kanji: フェアリーオーラ
    en: Fairy Aura
    fr: Aura Féérique
    it: Aurafolletto
    de: Feenaura
    es: Aura Feérica
    ko: 페어리오라
    zh_simp: 妖精气场
    zh_trad: 妖精氣場
  descriptions:
    jp_kana: "ぜんいんの　フェアリータイプの\nわざが　つよくなる。"
    jp_kanji: "全員の　フェアリータイプの\n技が　強くなる。"
    en: Powers up each Pokémon’s Fairy-type moves.
    fr: "Augmente la puissance des attaques de type Fée\nde tous les Pokémon."
    it: Potenzia le mosse di tipo Folletto di tutti i Pokémon.
    de: Erhöht die Stärke aller Attacken des Typs Fee.
    es: "Aumenta la potencia de todos los movimientos de tipo\nHada."
    ko: "전원의 페어리타입\n기술이 강해진다."
    zh_simp: 全体的妖精属性招式变强。
    zh_trad: 全體的妖精屬性招式變強。
filter:
  names:
    jp_kana: フィルター
    jp_kanji: フィルター
    en: Filter
    fr: Filtre
    it: Filtro
    de: Filter
    es: Filtro
    ko: 필터
    zh_simp: 过滤
    zh_trad: 過濾
  descriptions:
    jp_kana: "こうかばつぐんに　なってしまう\nこうげきの　いりょくを\nよわめる　ことが　できる。"
    jp_kanji: "効果バツグンに　なってしまう\n攻撃の　威力を\n弱める　ことが　できる。"
    en: Reduces the power of supereffective attacks taken.
    fr: "Réduit les dégâts subis lorsque le Pokémon est touché\npar une capacité super efficace."
    it: Riduce i danni subiti dalle mosse superefficaci.
    de: "Reduziert die Stärke von sehr effektiven Attacken und\nverringert damit den Schaden, den das Pokémon durch\nsie erleidet."
    es: "Mitiga el daño que le infligen los movimientos\nsupereficaces."
    ko: "자신이 받는 효과가 굉장한\n공격의 위력을\n약하게 만든다."
    zh_simp: "受到效果绝佳的攻击时，\n可以减弱其威力。"
    zh_trad: "受到效果絕佳的攻擊時，\n可減弱其威力。"
flame_body:
  names:
    jp_kana: ほのおのからだ
    jp_kanji: ほのおのからだ
    en: Flame Body
    fr: Corps Ardent
    it: Corpodifuoco
    de: Flammkörper
    es: Cuerpo Llama
    ko: 불꽃몸
    zh_simp: 火焰之躯
    zh_trad: 火焰之軀
  descriptions:
    jp_kana: "じぶんに　さわった　あいてを\nやけど　じょうたいに　する　ことがある。"
    jp_kanji: "自分に　触った　相手を\nやけど状態に　する　ことがある。"
    en: Contact with the Pokémon may burn the attacker.
    fr: "Peut brûler l’attaquant lorsque le Pokémon subit\nune attaque directe."
    it: Può scottare chi manda a segno un attacco diretto.
    de: "Fügt dem Angreifer bei Berührung eventuell\nVerbrennungen zu."
    es: Puede quemar al mínimo contacto.
    ko: "자신에게 접촉한 상대를\n화상 상태로 만들 때가 있다."
    zh_simp: "有时会让接触到自己的\n对手变为灼伤状态。"
    zh_trad: "有時會讓接觸到自己的\n對手陷入灼傷狀態。"
flare_boost:
  names:
    jp_kana: ねつぼうそう
    jp_kanji: ねつぼうそう
    en: Flare Boost
    fr: Rage Brûlure
    it: Bruciaimpeto
    de: Hitzewahn
    es: Ímpetu Ardiente
    ko: 열폭주
    zh_simp: 受热激升
    zh_trad: 受熱激升
  descriptions:
    jp_kana: "やけど　じょうたいに　なったとき\nとくしゅわざの　いりょくが　あがる。"
    jp_kanji: "やけど状態に　なったとき\n特殊技の　威力が　上がる。"
    en: "Powers up special attacks when the Pokémon\nis burned."
    fr: "Augmente la puissance des capacités spéciales\nquand le Pokémon est brûlé."
    it: "Se il Pokémon è scottato, la potenza delle sue mosse\nspeciali aumenta."
    de: "Erhöht bei Verbrennungen die Stärke von\nSpezial-Attacken."
    es: "Aumenta la potencia de sus ataques especiales cuando\nsufre quemaduras."
    ko: "화상 상태가 되었을 때\n특수 기술의 위력이 올라간다."
    zh_simp: "变为灼伤状态时，\n特殊招式的威力会提高。"
    zh_trad: "陷入灼傷狀態時，\n特殊招式的威力會提高。"
flash_fire:
  names:
    jp_kana: もらいび
    jp_kanji: もらいび
    en: Flash Fire
    fr: Torche
    it: Fuocardore
    de: Feuerfänger
    es: Absorbe Fuego
    ko: 타오르는불꽃
    zh_simp: 引火
    zh_trad: 引火
  descriptions:
    jp_kana: "ほのおタイプの　わざを　うけると\nほのおを　もらい　じぶんが　だす\nほのおタイプの　わざが　つよくなる。"
    jp_kanji: "ほのおタイプの　技を　受けると\n炎を　もらい　自分が　出す\nほのおタイプの　技が　強くなる。"
    en: "Powers up the Pokémon’s Fire-type moves if it’s hit\nby one."
    fr: "Lorsque le Pokémon est touché par une capacité\nde type Feu, il absorbe la chaleur pour renforcer\nses propres capacités Feu."
    it: "Se il Pokémon subisce una mossa di tipo Fuoco,\nne sfrutta il calore per potenziare le proprie mosse\ndello stesso tipo."
    de: "Verstärkt Feuer-Attacken, wenn es von Feuer-Attacken\ngetroffen wird."
    es: "Si le alcanza algún movimiento de tipo Fuego, potencia\nsus propios movimientos de dicho tipo."
    ko: "불꽃타입의 기술로 공격받으면\n불꽃을 받아서 자신이 사용하는\n불꽃타입의 기술이 강해진다."
    zh_simp: "受到火属性的招式攻击时，\n吸收火焰，自己使出的\n火属性招式会变强。"
    zh_trad: "受到火屬性的招式攻擊時，\n吸收火焰，讓自己使出的\n火屬性招式變強。"
flower_gift:
  names:
    jp_kana: フラワーギフト
    jp_kanji: フラワーギフト
    en: Flower Gift
    fr: Don Floral
    it: Regalfiore
    de: Pflanzengabe
    es: Don Floral
    ko: 플라워기프트
    zh_simp: 花之礼
    zh_trad: 花之禮
  descriptions:
    jp_kana: "てんきが　はれのとき\nじぶんと　みかたの　こうげきと\nとくぼうの　のうりょくが　あがる。"
    jp_kanji: "天気が　晴れのとき\n自分と　味方の　攻撃と\n特防の　能力が　上がる。"
    en: "Boosts the Attack and Sp. Def stats of itself\nand allies in harsh sunlight."
    fr: "Augmente l’Attaque et la Défense Spéciale du Pokémon\net de ses alliés lorsque le soleil brille."
    it: "Se la luce del sole è intensa, aumenta l’Attacco\ne la Difesa Speciale del Pokémon e dei suoi alleati."
    de: "Erhöht bei Sonnenschein den Angriff und die\nSpezial-Verteidigung aller Team-Pokémon."
    es: "Si hace sol, aumenta su Ataque y su Defensa Especial,\nasí como los de sus aliados."
    ko: "날씨가 맑을 때\n자신과 같은 편의 공격과\n특수방어의 능력이 올라간다."
    zh_simp: "晴朗天气时，\n自己与同伴的攻击和\n特防能力会提高。"
    zh_trad: "天氣為晴朗時，\n自己和同伴的攻擊和\n特防能力會提高。"
flower_veil:
  names:
    jp_kana: フラワーベール
    jp_kanji: フラワーベール
    en: Flower Veil
    fr: Flora-Voile
    it: Fiorvelo
    de: Blütenhülle
    es: Velo Flor
    ko: 플라워베일
    zh_simp: 花幕
    zh_trad: 花幕
  descriptions:
    jp_kana: "みかたの　くさポケモンは\nのうりょくが　さがらず\nじょうたい　いじょうにも　ならない。"
    jp_kanji: "味方の　草ポケモンは\n能力が　下がらず\n状態異常にも　ならない。"
    en: "Ally Grass-type Pokémon are protected from\nstatus conditions and the lowering of their stats."
    fr: "Empêche les alliés de type Plante de subir des baisses\nde stats et des altérations de statut."
    it: "Rende gli alleati di tipo Erba immuni alla diminuzione\ndelle statistiche e ai problemi di stato."
    de: "Schützt Mitstreiter vom Typ Pflanze vor dem Senken\nihrer Statuswerte sowie vor Statusproblemen."
    es: "Evita que los Pokémon de tipo Planta aliados sufran\nproblemas de estado o que les bajen sus características."
    ko: "같은 편의 풀타입 포켓몬은\n능력이 떨어지지 않고\n상태 이상도 되지 않는다."
    zh_simp: "我方的草属性宝可梦\n能力不会降低，\n也不会变为异常状态。"
    zh_trad: "我方的草屬性寶可夢\n能力不會降低。\n也不會陷入異常狀態。"
fluffy:
  names:
    jp_kana: もふもふ
    jp_kanji: もふもふ
    en: Fluffy
    fr: Boule de Poils
    it: Morbidone
    de: Flauschigkeit
    es: Peluche
    ko: 복슬복슬
    zh_simp: 毛茸茸
    zh_trad: 毛茸茸
  descriptions:
    jp_kana: "あいてから　うけた　せっしょくする　わざの\nダメージを　はんげんするが　ほのおタイプの\nわざの　ダメージは　２ばいになる。"
    jp_kanji: "相手から　受けた　接触する　技の\nダメージを　半減するが　ほのおタイプの\n技の　ダメージは　２倍になる。"
    en: "Halves the damage taken from moves that make\ndirect contact, but doubles that of Fire-type moves."
    fr: "Divise par deux les dégâts des attaques directes\nsubies par le Pokémon, mais double les dégâts\ndes capacités de type Feu."
    it: "Dimezza il danno causato dagli attacchi diretti\ndi un nemico, ma raddoppia quello subito dalle\nmosse di tipo Fuoco."
    de: "Halbiert den Schaden, den es durch direkte Attacken\nnimmt, aber verdoppelt dafür den durch Feuer-Attacken\nerlittenen Schaden."
    es: "Reduce a la mitad el daño provocado por los\nmovimientos de contacto, pero duplica el infligido\npor los de tipo Fuego."
    ko: "상대로부터 받은 접촉하는 기술의\n데미지를 반감시키지만 불꽃타입\n기술의 데미지는 2배가 된다."
    zh_simp: "会将对手所给予的接触类招式的伤害减半，\n但火属性招式的伤害会变为２倍。"
    zh_trad: "會將對手所給予的接觸類招式的傷害減半，\n但火屬性招式的傷害會變為２倍。"
forecast:
  names:
    jp_kana: てんきや
    jp_kanji: てんきや
    en: Forecast
    fr: Météo
    it: Previsioni
    de: Prognose
    es: Predicción
    ko: 기분파
    zh_simp: 阴晴不定
    zh_trad: 陰晴不定
  descriptions:
    jp_kana: "てんきの　えいきょうを　うけて\nみずタイプ　ほのおタイプ　こおりタイプの\nどれかに　へんかする。"
    jp_kanji: "天気の　影響を　受けて\nみずタイプ　ほのおタイプ　こおりタイプの\nどれかに　変化する。"
    en: "The Pokémon transforms with the weather to change\nits type to Water, Fire, or Ice."
    fr: "Le Pokémon prend le type Eau, Feu ou Glace\nen fonction de la météo."
    it: "Cambia il tipo del Pokémon in Acqua, Fuoco\no Ghiaccio in base alle condizioni atmosferiche."
    de: "Nimmt je nach Wetter entweder den Typ Wasser, Feuer\noder Eis an."
    es: "Cambia a tipo Agua, Fuego o Hielo en función del\ntiempo atmosférico."
    ko: "날씨의 영향을 받아\n물타입, 불꽃타입, 얼음타입 중\n하나로 변화한다."
    zh_simp: "受天气的影响，\n会变为水属性、火属性\n或冰属性中的某一个。"
    zh_trad: "在天氣的影響下，\n會變成水屬性、火屬性\n或冰屬性之中的一種。"
forewarn:
  names:
    jp_kana: よちむ
    jp_kanji: よちむ
    en: Forewarn
    fr: Prédiction
    it: Premonizione
    de: Vorwarnung
    es: Alerta
    ko: 예지몽
    zh_simp: 预知梦
    zh_trad: 預知夢
  descriptions:
    jp_kana: "とうじょう　したとき\nあいての　もつ　わざを\nひとつだけ　よみとる。"
    jp_kanji: "登場　したとき\n相手の　持つ　技を\nひとつだけ　読み取る。"
    en: "When it enters a battle, the Pokémon can tell one of\nthe moves an opposing Pokémon has."
    fr: "Révèle l’une des capacités de l’ennemi\nquand le combat commence."
    it: "Quando il Pokémon entra in campo, rivela una delle\nmosse del nemico."
    de: "Gibt bei Kampfantritt Auskunft über eine Attacke aus\ndem gegnerischen Repertoire."
    es: "Indica el movimiento más potente del rival al entrar\nen combate."
    ko: "등장했을 때\n상대가 지닌 기술을\n하나만 간파한다."
    zh_simp: "出场时，\n只读取１个对手拥有的招式。"
    zh_trad: "出場時，預見１個\n對手持有的招式。"
friend_guard:
  names:
    jp_kana: フレンドガード
    jp_kanji: フレンドガード
    en: Friend Guard
    fr: Garde-Ami
    it: Amicoscudo
    de: Freundeshut
    es: Compiescolta
    ko: 프렌드가드
    zh_simp: 友情防守
    zh_trad: 友情防守
  descriptions:
    jp_kana: "みかたの　ダメージを\nへらすことが　できる。"
    jp_kanji: "味方の　ダメージを\n減らすことが　できる。"
    en: Reduces damage done to allies.
    fr: Diminue les dégâts subis par les alliés.
    it: "I danni inflitti agli alleati del Pokémon\nvengono ridotti."
    de: Kann den Schaden, den Mitstreiter erleiden, verringern.
    es: Reduce el daño que sufren los aliados.
    ko: "같은 편의 데미지를\n줄일 수 있다."
    zh_simp: 可以减少我方的伤害。
    zh_trad: 可以減少我方受到的傷害。
frisk:
  names:
    jp_kana: おみとおし
    jp_kanji: おみとおし
    en: Frisk
    fr: Fouille
    it: Indagine
    de: Schnüffler
    es: Cacheo
    ko: 통찰
    zh_simp: 察觉
    zh_trad: 察覺
  descriptions:
    jp_kana: "とうじょう　したとき\nあいての　もちものを\nみとおすことが　できる。"
    jp_kanji: "登場　したとき\n相手の　持ち物を\n見通すことが　できる。"
    en: "When it enters a battle, the Pokémon can check an\nopposing Pokémon’s held item."
    fr: "Permet de connaître l’objet tenu par l’ennemi\nquand le combat commence."
    it: "Quando il Pokémon entra in campo, rivela\nlo strumento del nemico."
    de: "Kann bei Kampfantritt Auskunft über das vom Gegner\ngetragene Item geben."
    es: "Puede ver el objeto que lleva el rival al entrar en\ncombate."
    ko: "등장했을 때\n상대의 지닌 물건을\n통찰할 수 있다."
    zh_simp: "出场时，\n可以察觉对手的持有物。"
    zh_trad: "出場時，\n可以察覺對手的持有物。"
full_metal_body:
  names:
    jp_kana: メタルプロテクト
    jp_kanji: メタルプロテクト
    en: Full Metal Body
    fr: Métallo-Garde
    it: Metalprotezione
    de: Metallprotektor
    es: Guardia Metálica
    ko: 메탈프로텍트
    zh_simp: 金属防护
    zh_trad: 金屬防護
  descriptions:
    jp_kana: "あいての　わざや　とくせいで\nのうりょくを　さげられない。"
    jp_kanji: "相手の　技や　特性で\n能力を　下げられない。"
    en: "Prevents other Pokémon’s moves or Abilities from\nlowering the Pokémon’s stats."
    fr: "Empêche les stats du Pokémon de baisser à cause\nd’une capacité ou d’un talent."
    it: "Impedisce la diminuzione delle statistiche causata\nda abilità o mosse di altri Pokémon."
    de: "Verhindert das Senken der Statuswerte durch Attacken\nund Fähigkeiten von Angreifern."
    es: "Evita que bajen sus características a causa de\nmovimientos o habilidades de otros Pokémon."
    ko: "상대 기술이나 특성으로\n능력이 떨어지지 않는다."
    zh_simp: "不会因为对手的招式或特性\n而被降低能力。"
    zh_trad: "不會因對手的招式或特性\n而被降低能力。"
fur_coat:
  names:
    jp_kana: ファーコート
    jp_kanji: ファーコート
    en: Fur Coat
    fr: Toison Épaisse
    it: Foltopelo
    de: Fellkleid
    es: Pelaje Recio
    ko: 퍼코트
    zh_simp: 毛皮大衣
    zh_trad: 毛皮大衣
  descriptions:
    jp_kana: "あいてから　うける　ぶつりわざの\nダメージが　はんぶんに　なる。"
    jp_kanji: "相手から　受ける　物理技の\nダメージが　半分に　なる。"
    en: Halves the damage from physical moves.
    fr: "Divise par deux les dégâts des capacités physiques\nsubies par le Pokémon."
    it: Dimezza il danno subito dalle mosse fisiche.
    de: "Halbiert den Schaden, den das Pokémon durch\nphysische Attacken erleidet."
    es: "Reduce a la mitad el daño que recibe de ataques\nfísicos del rival."
    ko: "상대로부터 받는 물리 기술의\n데미지가 절반이 된다."
    zh_simp: "对手给予的物理招式的\n伤害会减半。"
    zh_trad: "對手的物理招式造成的\n傷害會減半。"
gale_wings:
  names:
    jp_kana: はやてのつばさ
    jp_kanji: はやてのつばさ
    en: Gale Wings
    fr: Ailes Bourrasque
    it: Aliraffica
    de: Orkanschwingen
    es: Alas Vendaval
    ko: 질풍날개
    zh_simp: 疾风之翼
    zh_trad: 疾風之翼
  descriptions:
    jp_kana: "ＨＰが　まんたん　だと\nひこうタイプの　わざを\nせんせいで　だすことが　できる。"
    jp_kanji: "ＨＰが　満タン　だと\nひこうタイプの　技を\n先制で　出すことが　できる。"
    en: "Gives priority to Flying-type moves when\nthe Pokémon’s HP is full."
    fr: "Quand les PV du Pokémon sont au maximum,\nses capacités de type Vol sont prioritaires."
    it: "Se il Pokémon ha tutti i PS, le sue mosse\ndi tipo Volante acquistano priorità alta."
    de: "Kann bei vollen KP einen Erstschlag mit Flug-Attacken\nermöglichen."
    es: "Da prioridad a los movimientos de tipo Volador si sus\nPS están al máximo."
    ko: "HP가 꽉 찼을 때\n비행타입의 기술을\n먼저 쓸 수 있다."
    zh_simp: "ＨＰ全满时，\n飞行属性的招式可以率先使出。"
    zh_trad: "ＨＰ全滿時，\n可以搶先在對手之前\n使出飛行屬性的招式。"
galvanize:
  names:
    jp_kana: エレキスキン
    jp_kanji: エレキスキン
    en: Galvanize
    fr: Peau Électrique
    it: Pellelettro
    de: Elektrohaut
    es: Piel Eléctrica
    ko: 일렉트릭스킨
    zh_simp: 电气皮肤
    zh_trad: 電氣皮膚
  descriptions:
    jp_kana: "ノーマルタイプの　わざが\nでんきタイプになる。\nいりょくが　すこし　あがる。"
    jp_kanji: "ノーマルタイプの　技が\nでんきタイプになる。\n威力が　少し　上がる。"
    en: "Normal-type moves become Electric-type moves.\nThe power of those moves is boosted a little."
    fr: "Les capacités de type Normal deviennent de type\nÉlectrik. Leur puissance augmente légèrement."
    it: "Le mosse di tipo Normale diventano di tipo Elettro\ne la loro potenza aumenta un po’."
    de: "Attacken vom Typ Normal nehmen den Typ Elektro an\nund ihre Stärke erhöht sich ein wenig."
    es: "Convierte los movimientos de tipo Normal en tipo\nEléctrico y aumenta ligeramente su potencia."
    ko: "노말타입 기술이\n전기타입이 된다.\n위력이 조금 올라간다."
    zh_simp: "一般属性的招式\n会变为电属性。\n威力会少量提高。"
    zh_trad: "一般屬性的招式\n會變為電屬性。\n威力會少量提高。"
gluttony:
  names:
    jp_kana: くいしんぼう
    jp_kanji: くいしんぼう
    en: Gluttony
    fr: Gloutonnerie
    it: Voracità
    de: Völlerei
    es: Gula
    ko: 먹보
    zh_simp: 贪吃鬼
    zh_trad: 貪吃鬼
  descriptions:
    jp_kana: "ＨＰが　すくなくなったら　たべる\nきのみを　ＨＰ　はんぶんの\nときに　たべてしまう。"
    jp_kanji: "ＨＰが　少なくなったら　食べる\nきのみを　ＨＰ　半分の\n時に　食べてしまう。"
    en: "Makes the Pokémon eat a held Berry when its HP\ndrops to half or less, which is sooner than usual."
    fr: "Si le Pokémon tient une Baie à manger en cas de PV\nbas, il la mange dès qu’il a perdu la moitié de ses PV."
    it: "Il Pokémon non attende di aver perso molti PS\nper mangiare certe bacche, ma lo fa non appena\ni suoi PS scendono a metà o meno."
    de: "Setzt bestimmte Beeren nicht erst in einer Notlage ein,\nsondern bereits dann, wenn seine KP auf die Hälfte des\nMaximalwerts fallen."
    es: "Cuando sus PS se ven reducidos a la mitad, engulle\nla baya que normalmente solo se comería cuando le\nquedasen pocos PS."
    ko: "HP가 줄어들면 먹을\n나무열매를 HP가\n절반일 때 먹어 버린다."
    zh_simp: "原本ＨＰ变得很少时才会吃树果，\n在ＨＰ还有一半时就会把它吃掉。"
    zh_trad: "原本ＨＰ變得很少時才會吃的樹果，\n在ＨＰ還有一半時就會把它吃掉。"
gooey:
  names:
    jp_kana: ぬめぬめ
    jp_kanji: ぬめぬめ
    en: Gooey
    fr: Poisseux
    it: Viscosità
    de: Viskosität
    es: Baba
    ko: 미끈미끈
    zh_simp: 黏滑
    zh_trad: 黏滑
  descriptions:
    jp_kana: "こうげきで　じぶんに　ふれた　あいての\nすばやさを　さげる。"
    jp_kanji: "攻撃で　自分に　触れた　相手の\n素早さを　下げる。"
    en: "Contact with the Pokémon lowers the attacker’s\nSpeed stat."
    fr: "Baisse la Vitesse de l’attaquant lorsque le Pokémon\nsubit une attaque directe."
    it: "Se il Pokémon viene colpito da un attacco diretto,\nla Velocità di chi l’ha colpito diminuisce."
    de: "Senkt bei Berührung im Zuge eines Angriffs die\nInitiative des Angreifers."
    es: "Baja la Velocidad del rival cuando este le ataca con\nun movimiento de contacto."
    ko: "공격으로 자신에게 접촉한 상대의\n스피드를 떨어뜨린다."
    zh_simp: "对于用攻击接触到自己的对手，\n会降低其速度。"
    zh_trad: "對手用攻擊接觸到自己時，\n降低此對手的速度。"
gorilla_tactics:
  names:
    jp_kana: ごりむちゅう
    jp_kanji: ごりむちゅう
    en: Gorilla Tactics
    fr: Entêtement
    it: Vigorilla
    de: Affenfokus
    es: Monotema
    ko: 무아지경
    zh_simp: 一猩一意
    zh_trad: 一猩一意
  descriptions:
    jp_kana: "こうげきは　あがるが\nさいしょに　えらんだ\nわざしか　だせなくなる。"
    jp_kanji: "攻撃は　上がるが\n最初に　選んだ\n技しか　出せなくなる。"
    en: "Boosts the Pokémon’s Attack stat but only allows\nthe use of the first selected move."
    fr: "Augmente l’Attaque, mais empêche d’utiliser\ntoute autre capacité que celle utilisée en premier\npar le Pokémon."
    it: "Aumenta l’Attacco ma costringe il Pokémon a usare\nsolo la prima mossa selezionata."
    de: "Erhöht den Angriff, aber nur die zuerst gewählte\nAttacke kann eingesetzt werden."
    es: "Potencia su Ataque, pero solo puede usar el primer\nmovimiento escogido."
    ko: "공격이 올라가지만\n처음에 선택한\n기술 외에는 쓸 수 없게 된다."
    zh_simp: "虽然攻击会提高，\n但是只能使出\n一开始所选的招式。"
    zh_trad: "攻擊雖然會提高，\n但只能使出\n最初選擇的招式。"
grass_pelt:
  names:
    jp_kana: くさのけがわ
    jp_kanji: くさのけがわ
    en: Grass Pelt
    fr: Toison Herbue
    it: Peloderba
    de: Pflanzenpelz
    es: Manto Frondoso
    ko: 풀모피
    zh_simp: 草之毛皮
    zh_trad: 草之毛皮
  descriptions:
    jp_kana: "グラスフィールドのとき\nぼうぎょが　あがる。"
    jp_kanji: "グラスフィールドのとき\n防御が　上がる。"
    en: "Boosts the Pokémon’s Defense stat on\nGrassy Terrain."
    fr: "Augmente la Défense du Pokémon si Champ Herbu\nest actif."
    it: "In presenza di un Campo Erboso, la Difesa\naumenta."
    de: Erhöht die Verteidigung, wenn Grasfeld aktiv ist.
    es: "Aumenta su Defensa si hay un campo de hierba en el\nterreno de combate."
    ko: "그래스필드일 때\n방어가 올라간다."
    zh_simp: "在青草场地时，\n防御会提高。"
    zh_trad: "在青草場地時，\n防禦會提高。"
grassy_surge:
  names:
    jp_kana: グラスメイカー
    jp_kanji: グラスメイカー
    en: Grassy Surge
    fr: Créa-Herbe
    it: Erbogenesi
    de: Gras-Erzeuger
    es: Herbogénesis
    ko: 그래스메이커
    zh_simp: 青草制造者
    zh_trad: 青草製造者
  descriptions:
    jp_kana: "とうじょう　したときに\nグラスフィールドを　はりめぐらせる。"
    jp_kanji: "登場　したときに\nグラスフィールドを　はりめぐらせる。"
    en: "Turns the ground into Grassy Terrain when\nthe Pokémon enters a battle."
    fr: "Le Pokémon crée un Champ Herbu au moment\noù il entre au combat."
    it: "Quando il Pokémon entra in campo,\nlo trasforma in un Campo Erboso."
    de: Erzeugt bei Kampfantritt ein Grasfeld.
    es: Crea un campo de hierba al entrar en combate.
    ko: "등장했을 때\n그래스필드를 사용한다."
    zh_simp: "出场时，\n会布下青草场地。"
    zh_trad: "出場時，\n會布下青草場地。"
grim_neigh:
  names:
    jp_kana: くろのいななき
    jp_kanji: くろのいななき
    en: Grim Neigh
    fr: Sombre Ruade
    it: Nitrito Nero
    de: Dunkles Wiehern
    es: Relincho Negro
    ko: 흑의울음
    zh_simp: 漆黑嘶鸣
    zh_trad: 漆黑嘶鳴
  descriptions:
    jp_kana: "あいてを　たおすと\nおそろしい　こえで　いなないて\nとくこうが　あがる。"
    jp_kanji: "相手を　倒すと\n恐ろしい　声で　いなないて\n特攻が　上がる。"
    en: "When the Pokémon knocks out a target, it utters a\nterrifying neigh, which boosts its Sp. Atk stat."
    fr: "Quand le Pokémon met un ennemi K.O., il émet\nun hennissement terrifiant qui augmente\nson Attaque Spéciale."
    it: "Quando manda KO il nemico, emette un nitrito\nterrificante, aumentando il proprio Attacco Speciale."
    de: "Besiegt es ein Pokémon, stößt es ein furchteinflößendes\nWiehern aus und erhöht damit seinen Spezial-Angriff."
    es: "Al derrotar a un objetivo, emite un relincho aterrador y\naumenta su Ataque Especial."
    ko: "상대를 쓰러뜨리면\n무서운 울음소리를 내면서\n특수공격이 올라간다."
    zh_simp: "打倒对手时\n会用恐怖的声音嘶鸣\n并提高特攻。"
    zh_trad: "打倒對手時\n會用恐怖的聲音嘶鳴\n並提高特攻。"
gulp_missile:
  names:
    jp_kana: うのミサイル
    jp_kanji: うのミサイル
    en: Gulp Missile
    fr: Dégobage
    it: Inghiottimissile
    de: Würggeschoss
    es: Tragamisil
    ko: 그대로꿀꺽미사일
    zh_simp: 一口导弹
    zh_trad: 一口飛彈
  descriptions:
    jp_kana: "なみのりか　ダイビングを　すると\nえものを　くわえてくる。　ダメージを\nうけると　えものを　はきだして　こうげき。"
    jp_kanji: "なみのりか　ダイビングを　すると\n獲物を　くわえてくる。　ダメージを\n受けると　獲物を　吐きだして　攻撃。"
    en: "When the Pokémon uses Surf or Dive, it will come back\nwith prey. When it takes damage, it will spit out the prey\nto attack."
    fr: "Quand le Pokémon utilise Surf ou Plongée, il revient\navec une proie. Lorsqu’il subit des dégâts par la suite,\nil attaque en recrachant sa proie."
    it: "Quando usa Surf o Sub, il Pokémon cattura una preda.\nSe subisce dei danni, la sputa fuori per attaccare."
    de: "Wenn das Pokémon Surfer oder Taucher einsetzt, fängt\nes sich dabei Beute. Erleidet es anschließend Schaden,\ngreift es an, indem es die Beute wieder ausspuckt."
    es: "Tras usar Surf o Buceo, emerge con una presa en la\nboca. Al recibir daño, ataca escupiéndola al rival."
    ko: "파도타기나 다이빙을 쓰면\n먹이를 물어 온다. 데미지를\n받으면 먹이를 토해내서 공격한다."
    zh_simp: "冲浪或潜水时会叼来猎物。\n受到伤害时，\n会吐出猎物进行攻击。"
    zh_trad: "衝浪或潛水時會叼來獵物。\n當受到傷害時，\n會吐出獵物攻擊對手。"
guts:
  names:
    jp_kana: こんじょう
    jp_kanji: こんじょう
    en: Guts
    fr: Cran
    it: Dentistretti
    de: Adrenalin
    es: Agallas
    ko: 근성
    zh_simp: 毅力
    zh_trad: 毅力
  descriptions:
    jp_kana: "じょうたい　いじょうに　なると\nこんじょうを　だして\nこうげきが　あがる。"
    jp_kanji: "状態異常に　なると\n根性を　だして\n攻撃が　上がる。"
    en: "It’s so gutsy that having a status condition boosts\nthe Pokémon’s Attack stat."
    fr: "Augmente l’Attaque du Pokémon s’il est affecté\npar une altération de statut."
    it: "Se il Pokémon è affetto da un problema di stato,\ntira fuori la grinta e aumenta il proprio Attacco."
    de: "Bei Statusproblemen setzt es Adrenalin frei und\nerhöht so seinen Angriffs-Wert."
    es: "Si sufre un problema de estado, se viene arriba y\naumenta su Ataque."
    ko: "상태 이상이 되면\n근성을 보여서\n공격이 올라간다."
    zh_simp: "如果变为异常状态，\n会拿出毅力，\n攻击会提高。"
    zh_trad: "陷入異常狀態時，\n會拿出毅力，\n攻擊會提高。"
harvest:
  names:
    jp_kana: しゅうかく
    jp_kanji: しゅうかく
    en: Harvest
    fr: Récolte
    it: Coglibacche
    de: Reiche Ernte
    es: Cosecha
    ko: 수확
    zh_simp: 收获
    zh_trad: 收穫
  descriptions:
    jp_kana: "つかった　きのみを\nなんかいも　つくりだす。"
    jp_kanji: "使った　きのみを\n何回も　作りだす。"
    en: May create another Berry after one is used.
    fr: Permet de réutiliser une même Baie plusieurs fois.
    it: Può ricreare una bacca utilizzata.
    de: Dieselbe Beere kann mehrmals verwendet werden.
    es: Puede reutilizar varias veces una misma baya.
    ko: "사용한 나무열매를\n몇 번이고 만들어 낸다."
    zh_simp: "可以多次制作出\n已被使用掉的树果。"
    zh_trad: "可多次採收\n已被使用過的樹果。"
healer:
  names:
    jp_kana: いやしのこころ
    jp_kanji: いやしのこころ
    en: Healer
    fr: Cœur Soin
    it: Curacuore
    de: Heilherz
    es: Alma Cura
    ko: 치유의마음
    zh_simp: 治愈之心
    zh_trad: 治癒之心
  descriptions:
    jp_kana: "じょうたい　いじょうの　みかたを\nたまに　なおしてあげる。"
    jp_kanji: "状態異常の　味方を\nたまに　治してあげる。"
    en: Sometimes heals an ally’s status condition.
    fr: Soigne parfois une altération de statut d’un allié proche.
    it: A volte cura i problemi di stato degli alleati.
    de: Befreit Mitstreiter gelegentlich von Statusproblemen.
    es: A veces cura los problemas de estado de un aliado.
    ko: "같은 편의 상태 이상을\n가끔 회복시킨다."
    zh_simp: 有时会治愈异常状态的同伴。
    zh_trad: 有時會治癒同伴的異常狀態。
heatproof:
  names:
    jp_kana: たいねつ
    jp_kanji: たいねつ
    en: Heatproof
    fr: Ignifugé
    it: Antifuoco
    de: Hitzeschutz
    es: Ignífugo
    ko: 내열
    zh_simp: 耐热
    zh_trad: 耐熱
  descriptions:
    jp_kana: "たいねつの　からだに　よって\nほのおタイプの　わざの\nダメージを　はんげんさせる"
    jp_kanji: "耐熱の　体に　よって\nほのおタイプの　技の\n威力を　半減させる。"
    en: "The heatproof body of the Pokémon halves the\ndamage from Fire-type moves that hit it."
    fr: "Diminue de moitié les dégâts infligés au Pokémon\npar les capacités de type Feu."
    it: "Il corpo termoresistente del Pokémon dimezza i danni\nche subisce dalle mosse di tipo Fuoco."
    de: "Sein Hitze abweisender Körper halbiert den durch\nFeuer-Attacken erlittenen Schaden."
    es: "Su cuerpo, resistente al calor, reduce a la mitad el daño\nrecibido por movimientos de tipo Fuego."
    ko: "내열인 몸으로 인해\n불꽃타입 공격의\n데미지를 반감한다."
    zh_simp: "耐热的体质会\n让火属性的招式威力减半。"
    zh_trad: "靠著耐熱的體質，\n讓火屬性的招式威力減半。"
heavy_metal:
  names:
    jp_kana: ヘヴィメタル
    jp_kanji: ヘヴィメタル
    en: Heavy Metal
    fr: Heavy Metal
    it: Metalpesante
    de: Schwermetall
    es: Metal Pesado
    ko: 헤비메탈
    zh_simp: 重金属
    zh_trad: 重金屬
  descriptions:
    jp_kana: "じぶんの　おもさが\n２ばいに　なる。"
    jp_kanji: "自分の　重さが\n２倍に　なる。"
    en: Doubles the Pokémon’s weight.
    fr: Double le poids du Pokémon.
    it: Raddoppia il peso del Pokémon.
    de: Verdoppelt das eigene Gewicht.
    es: Duplica su peso.
    ko: "자신의 무게가\n2배가 된다."
    zh_simp: 自身的重量会变为２倍。
    zh_trad: 自己的重量會變為２倍。
honey_gather:
  names:
    jp_kana: みつあつめ
    jp_kanji: みつあつめ
    en: Honey Gather
    fr: Cherche Miel
    it: Mielincetta
    de: Honigmaul
    es: Recogemiel
    ko: 꿀모으기
    zh_simp: 采蜜
    zh_trad: 採蜜
  descriptions:
    jp_kana: "せんとうが　おわったとき\nあまいミツを　ひろうことが　ある。"
    jp_kanji: "戦闘が　終わったとき\nあまいミツを　拾うことが　ある。"
    en: The Pokémon may gather Honey after a battle.
    fr: "Le Pokémon peut parfois trouver du Miel après\nun combat."
    it: "Il Pokémon può raccogliere del Miele alla fine\ndella lotta."
    de: "Das Pokémon sammelt nach Kämpfen eventuell\nHonig auf."
    es: "Puede que encuentre Miel una vez concluido el\ncombate."
    ko: "배틀이 끝났을 때\n달콤한꿀을 주울 때가 있다."
    zh_simp: "战斗结束时，\n有时候会捡来甜甜蜜。"
    zh_trad: "戰鬥結束時，\n有時候會撿來甜甜蜜。"
huge_power:
  names:
    jp_kana: ちからもち
    jp_kanji: ちからもち
    en: Huge Power
    fr: Coloforce
    it: Macroforza
    de: Kraftkoloss
    es: Potencia
    ko: 천하장사
    zh_simp: 大力士
    zh_trad: 大力士
  descriptions:
    jp_kana: "ぶつり　こうげきの\nいりょくが　２ばいに　なる。"
    jp_kanji: "物理攻撃の\n威力が　２倍になる。"
    en: Doubles the Pokémon’s Attack stat.
    fr: Double l’Attaque du Pokémon.
    it: Raddoppia l’Attacco del Pokémon.
    de: Verdoppelt die Stärke von physischen Attacken.
    es: Duplica la potencia de sus ataques físicos.
    ko: "물리공격의\n위력이 2배가 된다."
    zh_simp: 物理攻击的威力会变为２倍。
    zh_trad: 物理攻擊的威力會變為２倍。
hunger_switch:
  names:
    jp_kana: はらぺこスイッチ
    jp_kanji: はらぺこスイッチ
    en: Hunger Switch
    fr: Déclic Fringale
    it: Pancialterna
    de: Heißhunger
    es: Mutapetito
    ko: 꼬르륵스위치
    zh_simp: 饱了又饿
    zh_trad: 飽了又餓
  descriptions:
    jp_kana: "ターンの　おわりに　まんぷくもよう\nはらぺこもよう　まんぷくもよう……と\nこうごに　すがたを　かえる。"
    jp_kanji: "ターンの　終わりに　まんぷくもよう\nはらぺこもよう　まんぷくもよう……と\n交互に　姿を　変える。"
    en: "The Pokémon changes its form, alternating between\nits Full Belly Mode and Hangry Mode after the end of\neach turn."
    fr: "À la fin de chaque tour, le Pokémon alterne\nentre ses formes Mode Rassasié et Mode Affamé."
    it: "Alla fine di ogni turno cambia forma, alternando\ntra Motivo Panciapiena e Motivo Panciavuota."
    de: "Das Pokémon ändert zum Ende jeder Runde seine\nForm und wechselt somit zwischen dem Pappsatt- und\ndem Kohldampfmuster."
    es: "Alterna entre su Forma Saciada y Forma Voraz al final\nde cada turno."
    ko: "턴이 끝날 때마다 배부른 모양,\n배고픈 모양, 배부른 모양...으로\n번갈아서 모습을 바꾼다."
    zh_simp: "每回合结束时会在\n满腹花纹与空腹花纹之间\n交替改变样子。"
    zh_trad: "在每個回合結束時，\n會在滿腹花紋和空腹花紋之間\n交替改變樣子。"
hustle:
  names:
    jp_kana: はりきり
    jp_kanji: はりきり
    en: Hustle
    fr: Agitation
    it: Tuttafretta
    de: Übereifer
    es: Entusiasmo
    ko: 의욕
    zh_simp: 活力
    zh_trad: 活力
  descriptions:
    jp_kana: "じぶんの　こうげきが　たかくなるが\nめいちゅうりつが　さがる。"
    jp_kanji: "自分の　攻撃が　高くなるが\n命中率が　下がる。"
    en: Boosts the Attack stat, but lowers accuracy.
    fr: "Améliore l’Attaque du Pokémon, mais diminue\nla Précision."
    it: L’Attacco aumenta, ma la precisione diminuisce.
    de: Erhöht den Angriffs-Wert, aber senkt die Genauigkeit.
    es: Aumenta su Ataque, pero reduce su Precisión.
    ko: "자신의 공격이 높아지지만\n명중률이 떨어진다."
    zh_simp: "自己的攻击变高，\n但命中率会降低。"
    zh_trad: "自己的攻擊雖會變高，\n但命中率會降低。"
hydration:
  names:
    jp_kana: うるおいボディ
    jp_kanji: うるおいボディ
    en: Hydration
    fr: Hydratation
    it: Idratazione
    de: Hydration
    es: Hidratación
    ko: 촉촉바디
    zh_simp: 湿润之躯
    zh_trad: 濕潤之軀
  descriptions:
    jp_kana: "てんきが　あめのとき\nじょうたい　いじょうが　なおる。"
    jp_kanji: "天気が　雨のとき\n状態異常が　治る。"
    en: Heals status conditions if it’s raining.
    fr: "Soigne les altérations de statut du Pokémon\nquand il pleut."
    it: Se piove, il Pokémon guarisce dai problemi di stato.
    de: Heilt bei Regen Statusprobleme.
    es: Cura los problemas de estado si está lloviendo.
    ko: "비가 오는 날씨일 때\n상태 이상이 회복된다."
    zh_simp: "下雨天气时，\n异常状态会治愈。"
    zh_trad: "天氣為下雨時，\n會治癒異常狀態。"
hyper_cutter:
  names:
    jp_kana: かいりきバサミ
    jp_kanji: かいりきバサミ
    en: Hyper Cutter
    fr: Hyper Cutter
    it: Ipertaglio
    de: Scherenmacht
    es: Corte Fuerte
    ko: 괴력집게
    zh_simp: 怪力钳
    zh_trad: 怪力鉗
  descriptions:
    jp_kana: "ちからじまんの　ハサミを　もっているので\nあいてに　こうげきを　さげられない。"
    jp_kanji: "力自慢の　ハサミを　持っているので\n相手に　攻撃を　下げられない。"
    en: "The Pokémon’s proud of its powerful pincers.\nThey prevent other Pokémon from lowering\nits Attack stat."
    fr: "Le Pokémon est armé de lames tranchantes qui font\nsa fierté et empêchent son Attaque de baisser."
    it: "L’Attacco del Pokémon non può diminuire\ngrazie alla morsa micidiale in cui è in grado\ndi stringere i nemici."
    de: "Hindert Angreifer durch mächtige Scheren daran,\nden Angriffs-Wert zu senken."
    es: Evita que el rival le baje el Ataque.
    ko: "힘이 자랑인 집게를 가지고 있어\n상대가 공격을 떨어뜨리지 못하게 한다."
    zh_simp: "因为拥有以力量自豪的钳子，\n不会被对手降低攻击。"
    zh_trad: "因為擁有以力量為傲的鉗子，\n不會被對手降低攻擊。"
ice_body:
  names:
    jp_kana: アイスボディ
    jp_kanji: アイスボディ
    en: Ice Body
    fr: Corps Gel
    it: Corpogelo
    de: Eishaut
    es: Gélido
    ko: 아이스바디
    zh_simp: 冰冻之躯
    zh_trad: 冰凍之軀
  descriptions:
    jp_kana: "てんきが　あられのとき　ＨＰを\nすこしずつ　かいふく　する。"
    jp_kanji: "天気が　あられのとき　ＨＰを\n少しずつ　回復　する。"
    en: The Pokémon gradually regains HP in a hailstorm.
    fr: Régénère les PV du Pokémon lors des tempêtes de grêle.
    it: Se grandina, il Pokémon recupera PS.
    de: Regeneriert bei Hagel nach und nach KP.
    es: "Recupera PS de forma gradual cuando hay tormentas\nde granizo."
    ko: "날씨가 싸라기눈일 때 HP를\n조금씩 회복한다."
    zh_simp: "冰雹天气时，\n会缓缓回复ＨＰ。"
    zh_trad: "天氣為冰雹時，\n會漸漸回復ＨＰ。"
ice_face:
  names:
    jp_kana: アイスフェイス
    jp_kanji: アイスフェイス
    en: Ice Face
    fr: Tête de Gel
    it: Gelofaccia
    de: Tiefkühlkopf
    es: Cara de Hielo
    ko: 아이스페이스
    zh_simp: 结冻头
    zh_trad: 結凍頭
  descriptions:
    jp_kana: "ぶつりこうげきは　あたまの　こおりが\nみがわりに　なるが　すがたも　かわる。\nこおりは　あられが　ふると　もとにもどる。"
    jp_kanji: "物理攻撃は　頭の　氷が\nみがわりに　なるが　姿も　変わる。\n氷は　あられが　降ると　元に戻る。"
    en: "The Pokémon’s ice head can take a physical attack as\na substitute, but the attack also changes the Pokémon’s\nappearance. The ice will be restored when it hails."
    fr: "Le glaçon sur sa tête encaisse les attaques physiques\nà la place du Pokémon, mais sa destruction modifie\nson apparence. Le glaçon se reforme quand il grêle."
    it: "Grazie al ghiaccio sulla testa, il Pokémon può incassare\ni danni causati da mosse fisiche, ma cambia forma.\nTorna al suo stato originale quando grandina."
    de: "Der Eisblock um seinen Kopf blockt eine physische\nAttacke ab. Dies bewirkt jedoch einen Formwechsel.\nDurch Hagel wird der Eisblock wiederhergestellt."
    es: "Absorbe el daño de un ataque físico con el hielo de\nla cabeza, tras lo cual cambia de forma. El hielo se\nregenerará la próxima vez que granice."
    ko: "물리공격을 머리의 얼음이\n대신 맞아 주지만 모습도 바뀐다.\n얼음은 싸라기눈이 내리면 원래대로 돌아온다."
    zh_simp: "头部的冰会代替自己承受\n物理攻击，但是样子会改变。\n下冰雹时，冰会恢复原状。"
    zh_trad: "頭部的冰會代替自己承受\n物理攻擊，但是樣子會改變。\n下冰雹時，冰會回復原狀。"
ice_scales:
  names:
    jp_kana: こおりのりんぷん
    jp_kanji: こおりのりんぷん
    en: Ice Scales
    fr: Écailles Glacées
    it: Geloscaglie
    de: Eisflügelstaub
    es: Escama de Hielo
    ko: 얼음인분
    zh_simp: 冰鳞粉
    zh_trad: 冰鱗粉
  descriptions:
    jp_kana: "こおりのりんぷんに　まもられて\nとくしゅこうげきで　うける\nダメージが　はんげん　する。"
    jp_kanji: "こおりのりんぷんに　守られて\n特殊攻撃で　受ける\nダメージが　半減　する。"
    en: "The Pokémon is protected by ice scales, which halve\nthe damage taken from special moves."
    fr: "Le Pokémon est protégé par des écailles de glace.\nLes dégâts qu’il subit par des capacités spéciales\nsont divisés par deux."
    it: "Scaglie di ghiaccio proteggono il Pokémon dalle mosse\nspeciali, dimezzandone i danni subiti."
    de: "Halbiert mithilfe von schützendem Eisflügelstaub den\nSchaden, den das Pokémon durch Spezial-Attacken\nerleidet."
    es: "Las gélidas escamas que protegen su cuerpo reducen a\nla mitad el daño que le infligen los ataques especiales."
    ko: "얼음인분의 보호를 받아\n특수공격으로 받는\n데미지가 절반이 된다."
    zh_simp: "由于有冰鳞粉的守护，\n受到的特殊攻击伤害会减半。"
    zh_trad: "得到冰鱗粉的守護，\n受到的特殊攻擊傷害會減半。"
illuminate:
  names:
    jp_kana: はっこう
    jp_kanji: はっこう
    en: Illuminate
    fr: Lumiattirance
    it: Risplendi
    de: Erleuchtung
    es: Iluminación
    ko: 발광
    zh_simp: 发光
    zh_trad: 發光
  descriptions:
    jp_kana: "あたりを　あかるくする　ことで\nやせいの　ポケモンに\nそうぐう　しやすくなる。"
    jp_kanji: "あたりを　明るくする　ことで\n野生の　ポケモンに\n遭遇　しやすくなる。"
    en: "Raises the likelihood of meeting wild Pokémon by\nilluminating the surroundings."
    fr: "Émet une lumière spécifique qui facilite les rencontres\navec les Pokémon sauvages."
    it: "Illumina tutto intorno, rendendo più probabile\nincontrare Pokémon selvatici."
    de: "Erhellt die Umgebung und erhöht dadurch die\nWahrscheinlichkeit, wilden Pokémon zu begegnen."
    es: "Aumenta la probabilidad de encontrar Pokémon al\niluminar el entorno."
    ko: "주변을 밝게 하여\n야생 포켓몬과\n만나기 쉬워진다."
    zh_simp: "通过让周围变亮，\n变得容易遇到野生的宝可梦。"
    zh_trad: "透過讓周圍變亮，\n變得容易遇見野生的寶可夢。"
illusion:
  names:
    jp_kana: イリュージョン
    jp_kanji: イリュージョン
    en: Illusion
    fr: Illusion
    it: Illusione
    de: Trugbild
    es: Ilusión
    ko: 일루전
    zh_simp: 幻觉
    zh_trad: 幻覺
  descriptions:
    jp_kana: "てもちの　いちばん　うしろに　いる\nポケモンに　なりきって　とうじょうして\nあいてを　ばかす。"
    jp_kanji: "手持ちの　いちばん　うしろに　いる\nポケモンに　なりきって　登場して\n相手を　化かす。"
    en: "Comes out disguised as the Pokémon in the party’s\nlast spot."
    fr: "Le Pokémon prend l’apparence du dernier membre\nde l’équipe pour tromper l’adversaire."
    it: "Il Pokémon inganna il nemico entrando in campo\ncon le sembianze dell’ultimo Pokémon della propria\nsquadra."
    de: "Führt den Gegner hinters Licht, indem es bei\nKampfantritt die Gestalt des Pokémon an der\nletzten Stelle im Team annimmt."
    es: "Adopta el aspecto del último Pokémon del equipo al\nentrar en combate para desconcertar al rival."
    ko: "지닌 포켓몬 중 제일 뒤에 있는\n포켓몬으로 둔갑하여 나와서\n상대를 속인다."
    zh_simp: "假扮成同行队伍中的\n最后一只宝可梦出场，\n迷惑对手。"
    zh_trad: "假扮成同行隊伍中的\n最後一隻寶可夢出場，\n迷惑對手。"
immunity:
  names:
    jp_kana: めんえき
    jp_kanji: めんえき
    en: Immunity
    fr: Vaccin
    it: Immunità
    de: Immunität
    es: Inmunidad
    ko: 면역
    zh_simp: 免疫
    zh_trad: 免疫
  descriptions:
    jp_kana: "たいないに　めんえきを　もっているため\nどく　じょうたいに　ならない。"
    jp_kanji: "体内に　免疫を　持っているため\nどく状態に　ならない。"
    en: "The immune system of the Pokémon prevents it from\ngetting poisoned."
    fr: "Le Pokémon est naturellement immunisé\ncontre toute forme de poison."
    it: "L’immunità naturale del Pokémon gli impedisce\ndi essere avvelenato."
    de: "Das starke Immunsystem des Pokémon verhindert\nVergiftungen."
    es: Su sistema inmunitario evita el envenenamiento.
    ko: "체내에 면역을 가지고 있어\n독 상태가 되지 않는다."
    zh_simp: "因为体内拥有免疫能力，\n不会变为中毒状态。"
    zh_trad: "因為體內擁有免疫能力，\n不會陷入中毒狀態。"
imposter:
  names:
    jp_kana: かわりもの
    jp_kanji: かわりもの
    en: Imposter
    fr: Imposteur
    it: Sosia
    de: Doppelgänger
    es: Impostor
    ko: 괴짜
    zh_simp: 变身者
    zh_trad: 變身者
  descriptions:
    jp_kana: "めのまえの　ポケモンに\nへんしん　してしまう。"
    jp_kanji: "目の前の　ポケモンに\n変身　してしまう。"
    en: "The Pokémon transforms itself into the Pokémon\nit’s facing."
    fr: Le Pokémon prend l’apparence du Pokémon adverse.
    it: Il Pokémon si trasforma nel nemico che ha davanti.
    de: Kämpft als Kopie seines Gegenübers.
    es: Se transforma en el Pokémon que tiene enfrente.
    ko: "눈앞의 포켓몬으로\n변신해 버린다."
    zh_simp: 变身为当前面对的宝可梦。
    zh_trad: 變身為當前面對的寶可夢。
infiltrator:
  names:
    jp_kana: すりぬけ
    jp_kanji: すりぬけ
    en: Infiltrator
    fr: Infiltration
    it: Intrapasso
    de: Schwebedurch
    es: Allanamiento
    ko: 틈새포착
    zh_simp: 穿透
    zh_trad: 穿透
  descriptions:
    jp_kana: "あいての　かべや　みがわりを\nすりぬけて　こうげき　できる"
    jp_kanji: "相手の　壁や　身代わりを\nすりぬけて　攻撃　できる"
    en: "Passes through the opposing Pokémon’s barrier,\nsubstitute, and the like and strikes."
    fr: "Traverse les barrières et les clones de l’ennemi\npour attaquer directement."
    it: "Il Pokémon attacca evitando le barriere e il sostituto\ndel nemico."
    de: "Überwindet gegnerische Schilde sowie Delegatoren\nund greift an."
    es: Ataca sorteando la barrera o el sustituto del rival.
    ko: "상대의 벽이나 대타출동을\n뚫고 공격할 수 있다."
    zh_simp: "可以穿透对手的壁障\n或替身进行攻击。"
    zh_trad: "可穿透對手的屏障\n或替身進行攻擊。"
innards_out:
  names:
    jp_kana: とびだすなかみ
    jp_kanji: とびだすなかみ
    en: Innards Out
    fr: Expuls’Organes
    it: Espellinterno
    de: Magenkrempler
    es: Revés
    ko: 내용물분출
    zh_simp: 飞出的内在物
    zh_trad: 飛出的內在物
  descriptions:
    jp_kana: "あいてに　たおされたとき\nＨＰの　のこりの　ぶんだけ\nあいてに　ダメージを　あたえる。"
    jp_kanji: "相手に　倒されたとき\nＨＰの　残りの　ぶんだけ\n相手に　ダメージを　あたえる。"
    en: "Damages the attacker landing the finishing hit\nby the amount equal to its last HP."
    fr: "Le Pokémon inflige à l’adversaire l’ayant mis K.O.\ndes dégâts égaux au nombre de PV qu’il lui restait\navant le coup de grâce."
    it: "Se il Pokémon viene mandato KO da un attacco,\ninfligge a chi lo ha sferrato tanti danni quanti\nerano i suoi PS prima di ricevere il colpo."
    de: "Wird es durch eine Attacke besiegt, fügt es dem\nAngreifer Schaden in Höhe des KP-Werts zu,\nden es besaß, bevor es kampfunfähig wurde."
    es: "Al caer debilitado, inflige al rival un daño equivalente\na los PS que le quedaran."
    ko: "상대에게 쓰러졌을 때\n남아 있던 HP의 양만큼\n상대에게 데미지를 준다."
    zh_simp: "被对手打倒的时候，\n会给予对手相当于\nＨＰ剩余量的伤害。"
    zh_trad: "被對手打倒的時候，\n會給予對手相當於\nＨＰ剩餘量的傷害。"
inner_focus:
  names:
    jp_kana: せいしんりょく
    jp_kanji: せいしんりょく
    en: Inner Focus
    fr: Attention
    it: Forza Interiore
    de: Konzentrator
    es: Foco Interno
    ko: 정신력
    zh_simp: 精神力
    zh_trad: 精神力
  descriptions:
    jp_kana: "きたえられた　せいしんに　よって\nあいての　こうげきに　ひるまない。"
    jp_kanji: "鍛えられた　精神に　よって\n相手の　攻撃に　ひるまない。"
    en: "The Pokémon’s intensely focused, and that protects\nthe Pokémon from flinching."
    fr: "Le Pokémon a un mental à toute épreuve qui empêche\nles capacités ennemies de lui faire peur."
    it: "La capacità di concentrazione del Pokémon evita\nche tentenni per gli attacchi del nemico."
    de: "Verhindert durch erhöhte Konzentrationsfähigkeit\nZurückschrecken."
    es: "Gracias a su profunda concentración, no se amedrenta\nante los ataques del rival."
    ko: "단련한 정신 덕분에\n상대의 공격에 풀죽지 않는다."
    zh_simp: "拥有经过锻炼的精神，\n而不会因对手的攻击而畏缩。"
    zh_trad: "靠著經過鍛鍊的精神，\n不會因對手的攻擊而畏縮。"
insomnia:
  names:
    jp_kana: ふみん
    jp_kanji: ふみん
    en: Insomnia
    fr: Insomnia
    it: Insonnia
    de: Insomnia
    es: Insomnio
    ko: 불면
    zh_simp: 不眠
    zh_trad: 不眠
  descriptions:
    jp_kana: "ねむれない　たいしつ　なので\nねむり　じょうたいに　ならない。"
    jp_kanji: "眠れない　体質　なので\nねむり状態に　ならない。"
    en: "The Pokémon is suffering from insomnia and cannot\nfall asleep."
    fr: Le Pokémon est incapable de dormir.
    it: Il Pokémon soffre d’insonnia e non può addormentarsi.
    de: Verhindert Einschlafen.
    es: Su resistencia al sueño le impide quedarse dormido.
    ko: "잠들지 못하는 체질이라\n잠듦 상태가 되지 않는다."
    zh_simp: "因为有着睡不着的体质，\n所以不会陷入睡眠状态。"
    zh_trad: "因為有著睡不著的體質，\n所以不會陷入睡眠狀態。"
intimidate:
  names:
    jp_kana: いかく
    jp_kanji: いかく
    en: Intimidate
    fr: Intimidation
    it: Prepotenza
    de: Bedroher
    es: Intimidación
    ko: 위협
    zh_simp: 威吓
    zh_trad: 威嚇
  descriptions:
    jp_kana: "とうじょう　したとき　いかくして\nあいてを　いしゅくさせ\nあいての　こうげきを　さげて　しまう。"
    jp_kanji: "登場　したとき　威嚇して\n相手を　萎縮させ\n相手の　攻撃を　下げて　しまう。"
    en: "The Pokémon intimidates opposing Pokémon upon\nentering battle, lowering their Attack stat."
    fr: "Le Pokémon rugit lorsqu’il arrive au combat,\nce qui intimide l’ennemi et baisse son Attaque."
    it: "Quando il Pokémon entra in campo, la sua\nprepotenza intimidisce i nemici, riducendone\nl’Attacco."
    de: "Senkt den Angriff der Gegner, indem es sie gleich zu\nKampfantritt bedroht und einschüchtert."
    es: "Al entrar en combate amilana al rival de tal manera\nque su Ataque disminuye."
    ko: "등장했을 때 위협해서\n상대를 위축시켜\n상대의 공격을 떨어뜨린다."
    zh_simp: "出场时威吓对手，\n让其退缩，\n降低对手的攻击。"
    zh_trad: "出場時威嚇對手，\n使其退縮，\n從而降低對手的攻擊。"
intrepid_sword:
  names:
    jp_kana: ふとうのけん
    jp_kanji: ふとうのけん
    en: Intrepid Sword
    fr: Lame Indomptable
    it: Spada Indomita
    de: Kühnes Schwert
    es: Espada Indómita
    ko: 불요의검
    zh_simp: 不挠之剑
    zh_trad: 不撓之劍
  descriptions:
    jp_kana: "とうじょう　したときに\nこうげきが　あがる。"
    jp_kanji: "登場　したときに\n攻撃が　上がる。"
    en: "Boosts the Pokémon’s Attack stat when the Pokémon\nenters a battle."
    fr: "Augmente l’Attaque du Pokémon quand il entre\nau combat."
    it: "Quando il Pokémon entra in campo, il suo Attacco\naumenta."
    de: Erhöht bei Kampfantritt den Angriff.
    es: Aumenta su Ataque al entrar en combate.
    ko: "등장했을 때\n공격이 올라간다."
    zh_simp: "出场时，\n攻击会提高。"
    zh_trad: "出場時，\n攻擊會提高。"
iron_barbs:
  names:
    jp_kana: てつのトゲ
    jp_kanji: てつのトゲ
    en: Iron Barbs
    fr: Épine de Fer
    it: Spineferrate
    de: Eisenstachel
    es: Punta Acero
    ko: 철가시
    zh_simp: 铁刺
    zh_trad: 鐵刺
  descriptions:
    jp_kana: "じぶんに　さわった　あいてに\nてつのトゲで　ダメージを　あたえる。"
    jp_kanji: "自分に　触った　相手に\n鉄のトゲで　ダメージを　あたえる。"
    en: "Inflicts damage on the attacker upon contact with\niron barbs."
    fr: "Inflige des dégâts à l’attaquant lorsque le Pokémon\nsubit une attaque directe."
    it: "Se il Pokémon viene colpito da un attacco diretto,\ninfligge danni a sua volta con le sue spine di ferro."
    de: "Fügt dem Angreifer bei Berührung mit eisernen Stacheln\nSchaden zu."
    es: "Inflige daño al rival si este le golpea con un movimiento\nde contacto."
    ko: "자신에게 접촉한 상대에게\n철가시로 데미지를 준다."
    zh_simp: "用铁刺给予接触到自己的\n对手伤害。"
    zh_trad: "用鐵刺給予接觸到自己的\n對手傷害。"
iron_fist:
  names:
    jp_kana: てつのこぶし
    jp_kanji: てつのこぶし
    en: Iron Fist
    fr: Poing de Fer
    it: Ferropugno
    de: Eisenfaust
    es: Puño Férreo
    ko: 철주먹
    zh_simp: 铁拳
    zh_trad: 鐵拳
  descriptions:
    jp_kana: "パンチを　つかう　わざの\nいりょくが　あがる。"
    jp_kanji: "パンチを　使う　技の\n威力が　上がる。"
    en: Powers up punching moves.
    fr: Augmente la puissance des capacités coups de poing.
    it: Potenzia le mosse che utilizzano pugni.
    de: "Erhöht die Stärke von Hieb-, Punch-, Faust- und\nSchlag-Attacken."
    es: Aumenta la potencia de los puñetazos.
    ko: "펀치를 사용하는 기술의\n위력이 올라간다."
    zh_simp: 使用拳类招式的威力会提高。
    zh_trad: "使用到拳頭的招式\n威力會提高。"
justified:
  names:
    jp_kana: せいぎのこころ
    jp_kanji: せいぎのこころ
    en: Justified
    fr: Cœur Noble
    it: Giustizia
    de: Redlichkeit
    es: Justiciero
    ko: 정의의마음
    zh_simp: 正义之心
    zh_trad: 正義之心
  descriptions:
    jp_kana: "あくタイプの　こうげきを　うけると\nせいぎかんで　こうげきが　あがる。"
    jp_kanji: "あくタイプの　攻撃を　受けると\n正義感で　攻撃が　上がる。"
    en: "Being hit by a Dark-type move boosts the Attack\nstat of the Pokémon, for justice."
    fr: "Réveille la noblesse du Pokémon lorsqu’il subit\nune capacité de type Ténèbres, ce qui augmente\nson Attaque."
    it: "Quando il Pokémon viene colpito da una mossa\ndi tipo Buio, il suo forte senso di giustizia fa sì\nche l’Attacco aumenti."
    de: "Wird es von einer Unlicht-Attacke getroffen, meldet\nsich sein Sinn für Gerechtigkeit zu Wort und sein\nAngriff steigt."
    es: "Si le alcanza un movimiento de tipo Siniestro, aumenta\nel Ataque debido a su integridad."
    ko: "악타입 공격을 받으면\n정의감으로 공격이 올라간다."
    zh_simp: "受到恶属性的招式攻击时，\n因为正义感，攻击会提高。"
    zh_trad: "受到惡屬性的招式攻擊時，\n因為正義感，攻擊會提高。"
keen_eye:
  names:
    jp_kana: するどいめ
    jp_kanji: するどいめ
    en: Keen Eye
    fr: Regard Vif
    it: Sguardofermo
    de: Adlerauge
    es: Vista Lince
    ko: 날카로운눈
    zh_simp: 锐利目光
    zh_trad: 銳利目光
  descriptions:
    jp_kana: "するどい　めの　おかげで\nめいちゅうりつを　さげられない。"
    jp_kanji: "鋭い　目の　おかげで\n命中率を　下げられない。"
    en: "Keen eyes prevent other Pokémon from lowering this\nPokémon’s accuracy."
    fr: "Les yeux perçants du Pokémon empêchent\nsa Précision de baisser."
    it: "La vista acuta del Pokémon impedisce che la sua\nprecisione diminuisca."
    de: "Sein scharfer Blick hindert Angreifer daran,\nseine Genauigkeit zu senken."
    es: Su aguda vista evita que le disminuya la Precisión.
    ko: "날카로운 눈 덕분에\n명중률이 떨어지지 않는다."
    zh_simp: "多亏了锐利的目光，\n命中率不会被降低。"
    zh_trad: "靠著銳利的目光，\n命中率不會被降低。"
klutz:
  names:
    jp_kana: ぶきよう
    jp_kanji: ぶきよう
    en: Klutz
    fr: Maladresse
    it: Impaccio
    de: Tollpatsch
    es: Zoquete
    ko: 서투름
    zh_simp: 笨拙
    zh_trad: 笨拙
  descriptions:
    jp_kana: "もっている　どうぐを\nつかうことが　できない。"
    jp_kanji: "持っている　道具を\n使うことが　できない。"
    en: The Pokémon can’t use any held items.
    fr: Le Pokémon ne peut utiliser aucun objet tenu.
    it: Il Pokémon non può usare lo strumento che ha con sé.
    de: Das Pokémon kann keine getragenen Items verwenden.
    es: No puede usar objetos equipados.
    ko: "지니고 있는 도구를\n쓸 수 없다."
    zh_simp: 无法使用持有的道具。
    zh_trad: 無法使用持有的道具。
leaf_guard:
  names:
    jp_kana: リーフガード
    jp_kanji: リーフガード
    en: Leaf Guard
    fr: Feuille Garde
    it: Fogliamanto
    de: Floraschild
    es: Defensa Hoja
    ko: 리프가드
    zh_simp: 叶子防守
    zh_trad: 葉子防守
  descriptions:
    jp_kana: "てんきが　はれのときは\nじょうたい　いじょうに　ならない。"
    jp_kanji: "天気が　晴れのときは\n状態異常に　ならない。"
    en: Prevents status conditions in harsh sunlight.
    fr: "Protège le Pokémon contre les altérations de statut\nquand le soleil brille."
    it: "Se la luce del sole è intensa, evita i problemi\ndi stato."
    de: Verhindert bei Sonnenschein Statusprobleme.
    es: Evita los problemas de estado si hace sol.
    ko: "날씨가 맑을 때는\n상태 이상이 되지 않는다."
    zh_simp: "晴朗天气时，\n不会变为异常状态。"
    zh_trad: "天氣為晴朗時，\n不會陷入異常狀態。"
levitate:
  names:
    jp_kana: ふゆう
    jp_kanji: ふゆう
    en: Levitate
    fr: Lévitation
    it: Levitazione
    de: Schwebe
    es: Levitación
    ko: 부유
    zh_simp: 飘浮
    zh_trad: 飄浮
  descriptions:
    jp_kana: "じめんから　うくことによって\nじめんタイプの　わざを　うけない。"
    jp_kanji: "地面から　浮くことによって\nじめんタイプの　技を　受けない。"
    en: "By floating in the air, the Pokémon receives full\nimmunity to all Ground-type moves."
    fr: "Le Pokémon flotte, ce qui l’immunise contre\nles capacités de type Sol."
    it: "La capacità di levitare conferisce al Pokémon\nimmunità agli attacchi di tipo Terra."
    de: "Verleiht volle Immunität gegen alle Boden-Attacken\ndurch Schwebezustand."
    es: "Su capacidad de flotar sobre el suelo le proporciona\ninmunidad frente a los movimientos de tipo Tierra."
    ko: "땅에서 뜨는 성질 때문에\n땅타입의 기술로 공격받지 않는다."
    zh_simp: "从地面浮起，\n从而不会受到地面属性招式的攻击。"
    zh_trad: "從地面浮起，\n從而不會受到地面屬性招式的攻擊。"
libero:
  names:
    jp_kana: リベロ
    jp_kanji: リベロ
    en: Libero
    fr: Libéro
    it: Libero
    de: Libero
    es: Líbero
    ko: 리베로
    zh_simp: 自由者
    zh_trad: 自由者
  descriptions:
    jp_kana: "じぶんが　だす　わざと\nおなじ　タイプに　へんかする。"
    jp_kanji: "自分が　出す　技と\n同じ　タイプに　変化する。"
    en: "Changes the Pokémon’s type to the type of the\nmove it’s about to use."
    fr: Le Pokémon prend le type de la capacité qu’il utilise.
    it: "Cambia il tipo del Pokémon in quello della mossa\nche usa."
    de: "Das Pokémon nimmt bei Einsatz einer Attacke deren\nTyp an."
    es: Cambia su tipo al del movimiento que va a usar.
    ko: "자신이 사용한 기술과\n같은 타입으로 변화한다."
    zh_simp: "变为与自己使出的招式\n相同的属性。"
    zh_trad: "變為與自己使出的招式\n相同的屬性。"
light_metal:
  names:
    jp_kana: ライトメタル
    jp_kanji: ライトメタル
    en: Light Metal
    fr: Light Metal
    it: Metalleggero
    de: Leichtmetall
    es: Metal Liviano
    ko: 라이트메탈
    zh_simp: 轻金属
    zh_trad: 輕金屬
  descriptions:
    jp_kana: "じぶんの　おもさが\nはんぶんに　なる。"
    jp_kanji: "自分の　重さが\n半分に　なる。"
    en: Halves the Pokémon’s weight.
    fr: Divise par deux le poids du Pokémon.
    it: Dimezza il peso del Pokémon.
    de: Halbiert das eigene Gewicht.
    es: Reduce a la mitad su peso.
    ko: "자신의 무게가\n절반이 된다."
    zh_simp: 自身的重量会减半。
    zh_trad: 自己的重量會減半。
lightning_rod:
  names:
    jp_kana: ひらいしん
    jp_kanji: ひらいしん
    en: Lightning Rod
    fr: Paratonnerre
    it: Parafulmine
    de: Blitzfänger
    es: Pararrayos
    ko: 피뢰침
    zh_simp: 避雷针
    zh_trad: 避雷針
  descriptions:
    jp_kana: "でんきタイプの　わざを　じぶんに\nよせつけ　ダメージを　うけずに\nとくこうが　あがる。"
    jp_kanji: "でんきタイプの　技を　自分に\n寄せつけ　ダメージを　受けずに\n特攻が　上がる。"
    en: "The Pokémon draws in all Electric-type moves.\nInstead of being hit by Electric-type moves,\nit boosts its Sp. Atk."
    fr: "Le Pokémon détourne sur lui les capacités\nde type Électrik et les neutralise, tout en montant\nson Attaque Spéciale."
    it: "Il Pokémon attira e neutralizza le mosse di tipo Elettro\ne fa aumentare il suo Attacco Speciale."
    de: "Zieht Elektro-Attacken an. Statt durch diese Schaden\nzu nehmen, erhöht es den eigenen Spezial-Angriff."
    es: "Atrae y neutraliza los movimientos de tipo Eléctrico,\nque además le suben el Ataque Especial."
    ko: "전기타입의 기술을 자신에게\n끌어모아 데미지를 받지 않고\n특수공격을 올린다."
    zh_simp: "将电属性的招式吸引到自己身上，\n不会受到伤害，而是会提高特攻。"
    zh_trad: "將電屬性的招式吸引到自己身上，\n不但不會受到傷害，反而會提高特攻。"
limber:
  names:
    jp_kana: じゅうなん
    jp_kanji: じゅうなん
    en: Limber
    fr: Échauffement
    it: Scioltezza
    de: Flexibilität
    es: Flexibilidad
    ko: 유연
    zh_simp: 柔软
    zh_trad: 柔軟
  descriptions:
    jp_kana: "じゅうなんな　からだによって\nまひ　じょうたいに　ならない。"
    jp_kanji: "柔軟な　体によって\nまひ状態に　ならない。"
    en: Its limber body protects the Pokémon from paralysis.
    fr: "Le Pokémon s’est suffisamment échauffé,\nce qui l’immunise contre la paralysie."
    it: "Il corpo flessibile del Pokémon gli impedisce\ndi subire gli effetti della paralisi."
    de: "Der flexible Körper des Pokémon schützt es vor\nParalyse."
    es: "Evita ser paralizado gracias a la flexibilidad de su\ncuerpo."
    ko: "유연한 몸으로 인해\n마비 상태가 되지 않는다."
    zh_simp: "因为身体柔软，\n不会变为麻痹状态。"
    zh_trad: "因為身體柔軟，\n不會陷入麻痺狀態。"
liquid_ooze:
  names:
    jp_kana: ヘドロえき
    jp_kanji: ヘドロえき
    en: Liquid Ooze
    fr: Suintement
    it: Melma
    de: Kloakensoße
    es: Lodo Líquido
    ko: 해감액
    zh_simp: 污泥浆
    zh_trad: 污泥漿
  descriptions:
    jp_kana: "ヘドロえきを　すいとった　あいては\nきょうれつな　あくしゅうで\nダメージを　うけて　ＨＰを　へらす。"
    jp_kanji: "ヘドロ液を　吸い取った　相手は\n強烈な　悪臭で\nダメージを　受けて　ＨＰを　減らす。"
    en: "The oozed liquid has a strong stench, which damages\nattackers using any draining move."
    fr: "Le Pokémon suinte un liquide toxique nauséabond\nqui blesse tous ceux qui tentent de voler ses PV."
    it: "Il Pokémon secerne delle sostanze tossiche.\nSe un nemico manda a segno una mossa che\nassorbe i PS, subisce dei danni."
    de: "Angreifer, die durch Saug-Attacken Kloakensoße in\nsich aufgenommen haben, nehmen durch deren\nwiderwärtigen Gestank Schaden."
    es: "Exuda una sustancia tóxica de intenso hedor que hiere\na quienes intentan drenarle PS."
    ko: "해감액을 흡수한 상대는\n강렬한 악취로\n데미지를 받아 HP가 줄어든다."
    zh_simp: "吸收了污泥浆的对手\n会因强烈的恶臭\n而受到伤害，减少ＨＰ。"
    zh_trad: "吸收了污泥漿的對手\n會因為強烈的惡臭而\n使得ＨＰ減少。"
liquid_voice:
  names:
    jp_kana: うるおいボイス
    jp_kanji: うるおいボイス
    en: Liquid Voice
    fr: Hydrata-Son
    it: Idrovoce
    de: Plätscherstimme
    es: Voz Fluida
    ko: 촉촉보이스
    zh_simp: 湿润之声
    zh_trad: 濕潤之聲
  descriptions:
    jp_kana: "すべての　おとわざが\nみずタイプに　なる。"
    jp_kanji: "すべての　音技が\nみずタイプに　なる。"
    en: All sound-based moves become Water-type moves.
    fr: "Toutes les attaques sonores du Pokémon prennent\nle type Eau."
    it: "Le mosse del Pokémon basate sul suono diventano\ndi tipo Acqua."
    de: "Bewirkt, dass alle Lärm-Attacken des Pokémon den\nTyp Wasser annehmen."
    es: "Hace que todos sus movimientos que usan sonido pasen\na ser de tipo Agua."
    ko: "모든 소리 기술이\n물타입이 된다."
    zh_simp: "所有的声音招式\n都变为水属性。"
    zh_trad: "所有的聲音招式\n都變為水屬性。"
long_reach:
  names:
    jp_kana: えんかく
    jp_kanji: えんかく
    en: Long Reach
    fr: Longue Portée
    it: Distacco
    de: Langstrecke
    es: Remoto
    ko: 원격
    zh_simp: 远隔
    zh_trad: 遠隔
  descriptions:
    jp_kana: "すべての　わざを\nあいてに　せっしょく　しないで\nだすことが　できる。"
    jp_kanji: "すべての　技を\n相手に　接触　しないで\n出すことが　できる。"
    en: "The Pokémon uses its moves without making contact\nwith the target."
    fr: "Le Pokémon est capable d’utiliser toutes ses capacités\nsans entrer en contact direct avec sa cible."
    it: "Il Pokémon è in grado di usare tutte le sue mosse\nsenza entrare in contatto diretto con il bersaglio."
    de: "Ermöglicht dem Pokémon den Einsatz aller seiner\nAttacken, ohne das Ziel dabei direkt zu berühren."
    es: "Puede usar cualquier movimiento sin entrar en contacto\ncon el rival."
    ko: "모든 기술을\n상대에게 접촉하지 않고\n사용할 수 있다."
    zh_simp: "可以不接触对手\n就使出所有的招式。"
    zh_trad: "可以不接觸對手\n就使出所有的招式。"
magic_bounce:
  names:
    jp_kana: マジックミラー
    jp_kanji: マジックミラー
    en: Magic Bounce
    fr: Miroir Magik
    it: Magispecchio
    de: Magiespiegel
    es: Espejo Mágico
    ko: 매직미러
    zh_simp: 魔法镜
    zh_trad: 魔法鏡
  descriptions:
    jp_kana: "あいてに　だされた　へんかわざを　うけずに\nそのまま　かえす　ことが　できる。"
    jp_kanji: "相手に　だされた　変化技を　受けずに\nそのまま　返す　ことが　できる。"
    en: "Reflects status moves instead of getting hit\nby them."
    fr: "Annule les effets des capacités de statut subies\npar le Pokémon et les retourne à l’envoyeur."
    it: "Il Pokémon respinge al mittente le mosse di stato senza\nsubirne gli effetti."
    de: "Lenkt Status-Attacken auf den Angreifer um,\nohne selbst von ihnen getroffen zu werden."
    es: "Puede devolver los movimientos de estado lanzados\npor el rival, sin verse afectado por ellos."
    ko: "상대가 쓴 변화 기술로 공격받지 않고\n그대로 되돌려줄 수 있다."
    zh_simp: "可以不受到由对手使出的\n变化招式影响，并将其反弹。"
    zh_trad: "可不受到由對手使出的\n變化類招式所影響，並將其反彈。"
magic_guard:
  names:
    jp_kana: マジックガード
    jp_kanji: マジックガード
    en: Magic Guard
    fr: Garde Magik
    it: Magicscudo
    de: Magieschild
    es: Muro Mágico
    ko: 매직가드
    zh_simp: 魔法防守
    zh_trad: 魔法防守
  descriptions:
    jp_kana: "こうげき　いがいでは\nダメージを　うけない。"
    jp_kanji: "攻撃　以外では\nダメージを　受けない。"
    en: The Pokémon only takes damage from attacks.
    fr: Seules les attaques peuvent blesser le Pokémon.
    it: Il Pokémon subisce danni solo dagli attacchi.
    de: "Das Pokémon nimmt nur durch Offensiv-Attacken\nSchaden."
    es: Solo recibe daño de ataques.
    ko: "공격 이외에는\n데미지를 받지 않는다."
    zh_simp: 不会受到攻击以外的伤害。
    zh_trad: 不會受到攻擊以外的傷害。
magician:
  names:
    jp_kana: マジシャン
    jp_kanji: マジシャン
    en: Magician
    fr: Magicien
    it: Prestigiatore
    de: Zauberer
    es: Prestidigitador
    ko: 매지션
    zh_simp: 魔术师
    zh_trad: 魔術師
  descriptions:
    jp_kana: "わざを　あてた　あいての\nどうぐを　うばってしまう。"
    jp_kanji: "技を　当てた　相手の\n道具を　奪ってしまう。"
    en: "The Pokémon steals the held item of a Pokémon it\nhits with a move."
    fr: Les capacités volent aussi l’objet tenu par la cible.
    it: "Quando chi la usa colpisce un Pokémon con una mossa,\ngli ruba lo strumento."
    de: "Trifft das Pokémon ein Ziel mit einer Attacke, kann es\nihm dabei sein Item stehlen."
    es: "Roba el objeto del Pokémon al que alcance con un\nmovimiento."
    ko: "기술을 맞은 상대의\n도구를 빼앗아 버린다."
    zh_simp: "夺走被自己的招式\n击中的对手的道具。"
    zh_trad: "奪走被自己招式\n擊中的對手的道具。"
magma_armor:
  names:
    jp_kana: マグマのよろい
    jp_kanji: マグマのよろい
    en: Magma Armor
    fr: Armumagma
    it: Magmascudo
    de: Magmapanzer
    es: Escudo Magma
    ko: 마그마의무장
    zh_simp: 熔岩铠甲
    zh_trad: 熔岩鎧甲
  descriptions:
    jp_kana: "あつい　マグマを　みにまとい\nこおり　じょうたいに　ならない。"
    jp_kanji: "熱い　マグマを　身にまとい\nこおり状態に　ならない。"
    en: "The Pokémon is covered with hot magma, which\nprevents the Pokémon from becoming frozen."
    fr: "Le magma qui recouvre le corps du Pokémon le protège\ncontre le gel."
    it: "Il magma riveste il corpo del Pokémon\nimpedendogli di venire congelato."
    de: "Dank eines Panzers aus Magma kann dieses Pokémon\nnicht eingefroren werden."
    es: "Gracias al magma candente que lo envuelve, no puede\nser congelado."
    ko: "뜨거운 마그마를 몸에 둘러서\n얼음 상태가 되지 않는다."
    zh_simp: "将炽热的熔岩覆盖在身上，\n不会变为冰冻状态。"
    zh_trad: "將熾熱的熔岩覆蓋在身上，\n不會陷入冰凍狀態。"
magnet_pull:
  names:
    jp_kana: じりょく
    jp_kanji: じりょく
    en: Magnet Pull
    fr: Magnépiège
    it: Magnetismo
    de: Magnetfalle
    es: Imán
    ko: 자력
    zh_simp: 磁力
    zh_trad: 磁力
  descriptions:
    jp_kana: "はがねタイプの　ポケモンを\nじりょくで　ひきつけて\nにげられなくする。"
    jp_kanji: "はがねタイプの　ポケモンを\n磁力で　引きつけて\n逃げられなくする。"
    en: "Prevents Steel-type Pokémon from escaping using\nits magnetic force."
    fr: "Attire les Pokémon Acier grâce à un champ magnétique,\nce qui les empêche de fuir."
    it: "La carica magnetica attrae i Pokémon di tipo\nAcciaio impedendogli la fuga o la sostituzione."
    de: "Hindert Stahl-Pokémon durch Magnetismus an der\nFlucht."
    es: "Su magnetismo atrae a los Pokémon de tipo Acero y\nles impide huir."
    ko: "강철타입의 포켓몬을\n자력으로 끌어모아\n도망칠 수 없게 한다."
    zh_simp: "用磁力吸住钢属性的宝可梦，\n使其无法逃走。"
    zh_trad: "用磁力吸住鋼屬性的寶可夢，\n使其無法逃走。"
marvel_scale:
  names:
    jp_kana: ふしぎなうろこ
    jp_kanji: ふしぎなうろこ
    en: Marvel Scale
    fr: Écaille Spéciale
    it: Pelledura
    de: Notschutz
    es: Escama Especial
    ko: 이상한비늘
    zh_simp: 神奇鳞片
    zh_trad: 神奇鱗片
  descriptions:
    jp_kana: "じょうたい　いじょうに　なると\nふしぎなうろこが　はんのうして\nぼうぎょが　あがる。"
    jp_kanji: "状態異常に　なると\n不思議なウロコが　反応して\n防御が　上がる。"
    en: "The Pokémon’s marvelous scales boost the Defense\nstat if it has a status condition."
    fr: "Les écailles mystérieuses du Pokémon réagissent\naux altérations de statut en augmentant sa Défense."
    it: "Se il Pokémon è affetto da un problema di stato,\nle squame sulla sua pelle si induriscono aumentando\nla sua Difesa."
    de: "Bei Statusproblemen schützt es sich mit mysteriösen\nSchuppen und erhöht so seine Verteidigung."
    es: Sube su Defensa si sufre un problema de estado.
    ko: "상태 이상이 되면\n이상한 비늘이 반응해서\n방어가 올라간다."
    zh_simp: "如果变为异常状态，\n神奇鳞片会发生反应，\n防御会提高。"
    zh_trad: "陷入異常狀態時，\n神奇鱗片會發生反應，\n防禦會提高。"
mega_launcher:
  names:
    jp_kana: メガランチャー
    jp_kanji: メガランチャー
    en: Mega Launcher
    fr: Méga Blaster
    it: Megalancio
    de: Megawumme
    es: Megadisparador
    ko: 메가런처
    zh_simp: 超级发射器
    zh_trad: 超級發射器
  descriptions:
    jp_kana: "はどうの　わざの\nいりょくが　たかくなる。"
    jp_kanji: "波動の　技の\n威力が　高くなる。"
    en: Powers up aura and pulse moves.
    fr: "Augmente la puissance de certaines capacités\nde type aura."
    it: Potenzia Forzasfera, Ondasana e le mosse "pulsar".
    de: "Erhöht die Stärke einiger Wellen-, Aura- und\nPuls-Attacken."
    es: "Aumenta la potencia de algunos movimientos de pulsos\ny auras."
    ko: "파동 기술의\n위력이 올라간다."
    zh_simp: "波动和波导类招式的\n威力会提高。"
    zh_trad: "波動和波導類招式的\n威力會提高。"
merciless:
  names:
    jp_kana: ひとでなし
    jp_kanji: ひとでなし
    en: Merciless
    fr: Cruauté
    it: Spietatezza
    de: Quälerei
    es: Ensañamiento
    ko: 무도한행동
    zh_simp: 不仁不义
    zh_trad: 不仁不義
  descriptions:
    jp_kana: "どく　じょうたいの\nあいてを　こうげきすると\nかならず　きゅうしょに　あたる。"
    jp_kanji: "どく状態の\n相手を　攻撃すると\nかならず　急所に　当たる。"
    en: "The Pokémon’s attacks become critical hits if the\ntarget is poisoned."
    fr: "Lorsque le Pokémon attaque un adversaire empoisonné,\nle coup est forcément critique."
    it: "Gli attacchi sferrati su un bersaglio avvelenato\nproducono sempre brutti colpi."
    de: "Sorgt bei Angriffen auf vergiftete Ziele für\nVolltreffergarantie."
    es: "Hace que sus movimientos asesten siempre un golpe\ncrítico si el rival está envenenado."
    ko: "독 상태의\n상대를 공격하면\n반드시 급소에 맞는다."
    zh_simp: "攻击中毒状态的对手时，\n必定会击中要害。"
    zh_trad: "攻擊中毒狀態的對手時，\n必定會擊中要害。"
mimicry:
  names:
    jp_kana: ぎたい
    jp_kanji: ぎたい
    en: Mimicry
    fr: Mimétisme
    it: Mimetismo
    de: Mimese
    es: Mimetismo
    ko: 의태
    zh_simp: 拟态
    zh_trad: 擬態
  descriptions:
    jp_kana: "フィールドの　じょうたいに　あわせて\nポケモンの　タイプが　かわる。"
    jp_kanji: "フィールドの　状態に　あわせて\nポケモンの　タイプが　変わる。"
    en: Changes the Pokémon’s type depending on the terrain.
    fr: "Le Pokémon adopte le même type que le terrain\nlorsqu’un champ est actif."
    it: "Il tipo del Pokémon cambia a seconda dello stato\ndel campo."
    de: "Der Typ des Pokémon ändert sich in Abhängigkeit vom\nZustand des Feldes."
    es: "Cambia su tipo según el campo que haya en el terreno\nde combate."
    ko: "필드의 상태에 따라\n포켓몬의 타입이 바뀐다."
    zh_simp: "宝可梦的属性会根据\n场地的状态而变化。"
    zh_trad: "寶可夢的屬性會隨著\n場地的狀態而改變。"
minus:
  names:
    jp_kana: マイナス
    jp_kanji: マイナス
    en: Minus
    fr: Moins
    it: Meno
    de: Minus
    es: Menos
    ko: 마이너스
    zh_simp: 负电
    zh_trad: 負電
  descriptions:
    jp_kana: "プラスか　マイナスの　とくせいを　もつ\nポケモンが　なかまに　いると\nじぶんの　とくこうが　あがる。"
    jp_kanji: "プラスか　マイナスの　特性を　持つ\nポケモンが　仲間に　いると\n自分の　特攻が　上がる。"
    en: "Boosts the Sp. Atk stat of the Pokémon if an ally\nwith the Plus or Minus Ability is also in battle."
    fr: "L’Attaque Spéciale du Pokémon augmente\nsi un Pokémon allié a le talent Moins ou Plus."
    it: "L’Attacco Speciale aumenta se ci sono alleati con\nl’abilità Meno o Più."
    de: "Erhöht den Spezial-Angriff, wenn das Pokémon einen\nMitstreiter mit der Fähigkeit Plus oder Minus hat."
    es: "Potencia su Ataque Especial si un Pokémon aliado tiene\nla habilidad Más o Menos."
    ko: "플러스나 마이너스의 특성을 가진\n포켓몬이 동료에 있으면\n자신의 특수공격이 올라간다."
    zh_simp: "出场的伙伴之间\n如果有正电或负电特性的宝可梦，\n自己的特攻会提高。"
    zh_trad: "場上的夥伴之中，\n如果有正電或負電特性的寶可夢，\n自己的特攻會提高。"
mirror_armor:
  names:
    jp_kana: ミラーアーマー
    jp_kanji: ミラーアーマー
    en: Mirror Armor
    fr: Armure Miroir
    it: Blindospecchio
    de: Spiegelrüstung
    es: Coraza Reflejo
    ko: 미러아머
    zh_simp: 镜甲
    zh_trad: 鏡甲
  descriptions:
    jp_kana: "じぶんが　うけた\nのうりょく　ダウンの\nこうか　だけを　はねかえす。"
    jp_kanji: "自分が　受けた\n能力　ダウンの\n効果　だけを　跳ね返す。"
    en: "Bounces back only the stat-lowering effects that\nthe Pokémon receives."
    fr: "Le Pokémon renvoie les effets réducteurs de stats\nqu’il reçoit."
    it: "Rimanda al mittente le diminuzioni alle statistiche\nsubite."
    de: "Lenkt ausschließlich Effekte, welche die Statuswerte\ndes Pokémon senken würden, auf den Angreifer um."
    es: Refleja los efectos que reducen las características.
    ko: "자신이 받는\n능력 다운 효과에 한해\n되받아친다."
    zh_simp: "只反弹自己受到的\n能力降低效果。"
    zh_trad: "只反彈自己受到的\n能力降低效果。"
misty_surge:
  names:
    jp_kana: ミストメイカー
    jp_kanji: ミストメイカー
    en: Misty Surge
    fr: Créa-Brume
    it: Nebbiogenesi
    de: Nebel-Erzeuger
    es: Nebulogénesis
    ko: 미스트메이커
    zh_simp: 薄雾制造者
    zh_trad: 薄霧製造者
  descriptions:
    jp_kana: "とうじょう　したときに\nミストフィールドを　はりめぐらせる。"
    jp_kanji: "登場　したときに\nミストフィールドを　はりめぐらせる。"
    en: "Turns the ground into Misty Terrain when\nthe Pokémon enters a battle."
    fr: "Le Pokémon crée un Champ Brumeux au moment\noù il entre au combat."
    it: "Quando il Pokémon entra in campo,\nlo trasforma in un Campo Nebbioso."
    de: Erzeugt bei Kampfantritt ein Nebelfeld.
    es: Crea un campo de niebla al entrar en combate.
    ko: "등장했을 때\n미스트필드를 사용한다."
    zh_simp: "出场时，\n会布下薄雾场地。"
    zh_trad: "出場時，\n會布下薄霧場地。"
mold_breaker:
  names:
    jp_kana: かたやぶり
    jp_kanji: かたやぶり
    en: Mold Breaker
    fr: Brise Moule
    it: Rompiforma
    de: Überbrückung
    es: Rompemoldes
    ko: 틀깨기
    zh_simp: 破格
    zh_trad: 破格
  descriptions:
    jp_kana: "あいての　とくせいに\nじゃまされる　ことなく　あいてに\nわざを　だすことが　できる。"
    jp_kanji: "相手の　特性に\nジャマされる　ことなく　相手に\n技を　出すことが　できる。"
    en: "Moves can be used on the target regardless of\nits Abilities."
    fr: "Le Pokémon ignore les talents adverses qui auraient\nun effet sur ses capacités."
    it: "Quando il Pokémon attacca, ignora l’abilità del\nbersaglio se questa ha effetto sulle mosse."
    de: "Attacken können ungeachtet der Fähigkeiten des\nZieles verwendet werden."
    es: "Las habilidades del objetivo no afectan a los\nmovimientos que emplea."
    ko: "상대 특성에\n방해받지 않고 상대에게\n기술을 쓸 수 있다."
    zh_simp: "可以不受对手特性的干扰，\n向对手使出招式。"
    zh_trad: "可不受特性影響，\n向對手使出招式。"
moody:
  names:
    jp_kana: ムラっけ
    jp_kanji: ムラっけ
    en: Moody
    fr: Lunatique
    it: Altalena
    de: Gefühlswippe
    es: Veleta
    ko: 변덕쟁이
    zh_simp: 心情不定
    zh_trad: 心情不定
  descriptions:
    jp_kana: "まいターン　のうりょくの　どれかが\nぐーんと　あがって　どれかが　さがる。"
    jp_kanji: "毎ターン　能力の　どれかが\nぐーんと　上がって　どれかが　下がる。"
    en: "Raises one stat sharply and lowers another\nevery turn."
    fr: "Augmente beaucoup une stat du Pokémon\net en baisse une autre au hasard à chaque tour."
    it: "A ogni turno, aumenta di molto una statistica\ne ne riduce un’altra."
    de: "Erhöht in jeder Runde aufs Neue einen Statuswert stark\nund senkt einen anderen."
    es: "Una característica le sube mucho en cada turno, pero\nle baja otra."
    ko: "매 턴 능력 중 하나가\n크게 오르고 하나가 떨어진다."
    zh_simp: "每一回合，能力中的某项\n会大幅提高，而某项会降低。"
    zh_trad: "每一回合，能力中的某項\n會大幅提高，相對地某項會降低。"
motor_drive:
  names:
    jp_kana: でんきエンジン
    jp_kanji: でんきエンジン
    en: Motor Drive
    fr: Motorisé
    it: Elettrorapid
    de: Starthilfe
    es: Electromotor
    ko: 전기엔진
    zh_simp: 电气引擎
    zh_trad: 電氣引擎
  descriptions:
    jp_kana: "でんきタイプの　わざを　うけると\nダメージを　うけずに\nすばやさが　あがる。"
    jp_kanji: "でんきタイプの　技を　受けると\nダメージを　受けずに\n素早さが　上がる。"
    en: "Boosts its Speed stat if hit by an Electric-type move\ninstead of taking damage."
    fr: "Si le Pokémon est touché par une capacité Électrik,\nil ne subit aucun dégât et sa Vitesse augmente."
    it: "Se il Pokémon viene colpito da una mossa di\ntipo Elettro, la neutralizza e sfrutta la carica\nelettrica per aumentare la propria Velocità."
    de: "Treffer durch Elektro-Attacken verursachen keinen\nSchaden, sondern geben dem Pokémon eine\nStarthilfe und erhöhen so seine Initiative."
    es: "Si le alcanza un movimiento de tipo Eléctrico, le sube\nla Velocidad en vez de sufrir daño."
    ko: "전기타입의 기술로 공격받으면\n데미지를 받지 않고\n스피드가 올라간다."
    zh_simp: "受到电属性的招式攻击时，\n不会受到伤害，而是速度会提高。"
    zh_trad: "受到電屬性的招式攻擊時，\n不但不會受到傷害，反而速度會提高。"
moxie:
  names:
    jp_kana: じしんかじょう
    jp_kanji: じしんかじょう
    en: Moxie
    fr: Impudence
    it: Arroganza
    de: Hochmut
    es: Autoestima
    ko: 자기과신
    zh_simp: 自信过度
    zh_trad: 自信過度
  descriptions:
    jp_kana: "あいてを　たおすと\nじしんが　ついて\nこうげきが　あがる。"
    jp_kanji: "相手を　倒すと\n自信が　ついて\n攻撃が　上がる。"
    en: "The Pokémon shows moxie, and that boosts the\nAttack stat after knocking out any Pokémon."
    fr: "Quand le Pokémon met un ennemi K.O.,\nsa confiance en lui ne connaît plus de limite\net son Attaque augmente."
    it: "Quando manda un nemico KO, il Pokémon si fa\nsicuro di sé e aumenta il proprio Attacco."
    de: "Besiegt es ein Pokémon, steigt sein Selbstvertrauen\nund somit auch sein Angriff."
    es: "Al debilitar a un objetivo, su confianza se refuerza\nde tal manera que aumenta su Ataque."
    ko: "상대를 쓰러뜨리면\n자신감이 붙어서\n공격이 올라간다."
    zh_simp: "如果打倒对手，\n就会充满自信，攻击会提高。"
    zh_trad: "如果打倒對手，\n會充滿自信並提高攻擊。"
multiscale:
  names:
    jp_kana: マルチスケイル
    jp_kanji: マルチスケイル
    en: Multiscale
    fr: Multiécaille
    it: Multisquame
    de: Multischuppe
    es: Multiescamas
    ko: 멀티스케일
    zh_simp: 多重鳞片
    zh_trad: 多重鱗片
  descriptions:
    jp_kana: "ＨＰが　まんたんの　ときに\nうける　ダメージが　すくなくなる。"
    jp_kanji: "ＨＰが　満タンの　ときに\n受ける　ダメージが　少なくなる。"
    en: "Reduces the amount of damage the Pokémon takes\nwhile its HP is full."
    fr: "Le Pokémon reçoit moins de dégâts quand ses PV\nsont au maximum."
    it: Se i PS sono al massimo, riduce il danno subito.
    de: Verringert den erlittenen Schaden bei vollen KP.
    es: Reduce el daño que sufre si sus PS están al máximo.
    ko: "HP가 꽉 찼을 때\n받는 데미지가 줄어든다."
    zh_simp: "ＨＰ全满时，\n受到的伤害会变少。"
    zh_trad: "ＨＰ全滿時，\n受到的傷害會變少。"
multitype:
  names:
    jp_kana: マルチタイプ
    jp_kanji: マルチタイプ
    en: Multitype
    fr: Multi-Type
    it: Multitipo
    de: Variabilität
    es: Multitipo
    ko: 멀티타입
    zh_simp: 多属性
    zh_trad: 多屬性
  descriptions:
    jp_kana: "もっている　プレートで\nタイプが　かわる。"
    jp_kanji: "持っている　プレートで\nタイプが　変わる。"
    en: Changes the Pokémon’s type to match the Plate it holds.
    fr: Modifie le type en fonction de la Plaque tenue.
    it: "Cambia il tipo del Pokémon a seconda della lastra\nche ha con sé."
    de: Passt seinen Typ der getragenen Tafel an.
    es: Cambia su tipo al de la tabla que lleve.
    ko: "지니고 있는 플레이트에\n따라 타입이 바뀐다."
    zh_simp: 属性会根据持有的石板而改变。
    zh_trad: 屬性會依持有的石板而改變。
mummy:
  names:
    jp_kana: ミイラ
    jp_kanji: ミイラ
    en: Mummy
    fr: Momie
    it: Mummia
    de: Mumie
    es: Momia
    ko: 미라
    zh_simp: 木乃伊
    zh_trad: 木乃伊
  descriptions:
    jp_kana: "あいてに　さわられると\nあいてを　ミイラに　してしまう。"
    jp_kanji: "相手に　触られると\n相手を　ミイラに　してしまう。"
    en: "Contact with the Pokémon changes the attacker’s\nAbility to Mummy."
    fr: "Remplace le talent de l’attaquant par « Momie »\nlorsque le Pokémon subit une attaque directe."
    it: "Al contatto con il Pokémon, l’abilità del nemico\ndiventa Mummia."
    de: "Überträgt bei Berührung die Fähigkeit Mumie auf den\nAngreifer."
    es: "Contagia la habilidad Momia al rival que entre en\ncontacto con él."
    ko: "상대가 접촉하면\n상대를 미라로 만들어 버린다."
    zh_simp: "被对手接触到后，\n会将对手变为木乃伊。"
    zh_trad: "被對手接觸到時，\n會將對手變成木乃伊。"
natural_cure:
  names:
    jp_kana: しぜんかいふく
    jp_kanji: しぜんかいふく
    en: Natural Cure
    fr: Médic Nature
    it: Alternacura
    de: Innere Kraft
    es: Cura Natural
    ko: 자연회복
    zh_simp: 自然回复
    zh_trad: 自然回復
  descriptions:
    jp_kana: "てもちに　ひっこむと\nじょうたい　いじょうが　なおる。"
    jp_kanji: "手持ちに　ひっこむと\n状態異常が　治る。"
    en: "All status conditions heal when the Pokémon\nswitches out."
    fr: "Le Pokémon soigne ses altérations de statut\nen quittant le combat."
    it: "Quando il Pokémon viene sostituito, guarisce\ndai problemi di stato."
    de: "Wird das Pokémon ausgewechselt, werden seine\nStatusprobleme geheilt."
    es: "Cura sus problemas de estado al cambiarse con otro\nPokémon."
    ko: "지닌 포켓몬으로 돌아오면\n상태 이상이 회복된다."
    zh_simp: "回到同行队伍后，\n异常状态就会被治愈。"
    zh_trad: "異常狀態會在\n離場後治癒。"
neuroforce:
  names:
    jp_kana: ブレインフォース
    jp_kanji: ブレインフォース
    en: Neuroforce
    fr: Cérébro-Force
    it: Cerebroforza
    de: Zerebralmacht
    es: Fuerza Cerebral
    ko: 브레인포스
    zh_simp: 脑核之力
    zh_trad: 腦核之力
  descriptions:
    jp_kana: "こうかばつぐんの　こうげきで\nいりょくが　さらに　あがる。"
    jp_kanji: "効果バツグンの　攻撃で\n威力が　さらに　上がる。"
    en: Powers up moves that are super effective.
    fr: "Augmente encore plus les dégâts infligés\npar les attaques super efficaces."
    it: Potenzia le mosse superefficaci.
    de: Erhöht die Stärke von sehr effektiven Attacken.
    es: Potencia los ataques supereficaces.
    ko: "효과가 굉장한 공격의\n위력이 더욱 올라간다."
    zh_simp: "效果绝佳的攻击，\n威力会变得更强。"
    zh_trad: "可進一步提升\n效果絕佳招式的威力。"
neutralizing_gas:
  names:
    jp_kana: かがくへんかガス
    jp_kanji: かがくへんかガス
    en: Neutralizing Gas
    fr: Gaz Inhibiteur
    it: Gas Reagente
    de: Reaktionsgas
    es: Gas Reactivo
    ko: 화학변화가스
    zh_simp: 化学变化气体
    zh_trad: 化學變化氣體
  descriptions:
    jp_kana: "かがくへんかガスの　ポケモンが　ばにいると\nすべての　ポケモンの　とくせいの\nこうかが　きえたり　はつどう　しなくなる。"
    jp_kanji: "かがくへんかガスの　ポケモンが　場にいると\nすべての　ポケモンの　特性の\n効果が　消えたり　発動　しなくなる。"
    en: "If the Pokémon with Neutralizing Gas is in the battle,\nthe effects of all Pokémon’s Abilities will be nullified\nor will not be triggered."
    fr: "Si un Pokémon avec Gaz Inhibiteur est sur le terrain,\nles effets des talents de tous les autres Pokémon\nsont annulés."
    it: "Se in campo c’è un Pokémon con Gas Reagente,\ngli effetti delle abilità di tutti gli altri Pokémon\nvengono annullati o non si attivano."
    de: "Solange ein Pokémon mit der Fähigkeit Reaktionsgas\nam Kampf beteiligt ist, werden die Fähigkeiten aller\nanderen Pokémon unterdrückt oder aufgehoben."
    es: "Anula los efectos de las habilidades de los demás\nPokémon presentes mientras esté en el terreno de\ncombate."
    ko: "화학변화가스를 가진 포켓몬이 배틀에 나와 있으면\n모든 포켓몬이 가진 특성의 효과가\n사라지거나 발동하지 않게 된다."
    zh_simp: "特性为化学变化气体的宝可梦在场时，\n场上所有宝可梦的\n特性效果都会消失或者无法生效。"
    zh_trad: "當場上有特性是化學變化氣體的寶可夢時，\n所有寶可夢的特性效果\n都會消失或無法發動。"
no_guard:
  names:
    jp_kana: ノーガード
    jp_kanji: ノーガード
    en: No Guard
    fr: Annule Garde
    it: Nullodifesa
    de: Schildlos
    es: Indefenso
    ko: 노가드
    zh_simp: 无防守
    zh_trad: 無防守
  descriptions:
    jp_kana: "ノーガード　せんぽうに　よって\nおたがいの　だす　わざが\nかならず　あたる　ようになる。"
    jp_kanji: "ノーガード戦法に　よって\nお互いの　出す　技が\nかならず　当たる　ようになる。"
    en: "The Pokémon employs no-guard tactics to ensure\nincoming and outgoing attacks always land."
    fr: "Les capacités du Pokémon touchent l’ennemi à coup sûr,\nmais les capacités de l’ennemi le touchent aussi\nà coup sûr."
    it: "Il Pokémon e chiunque lo attacchi abbassano\nla guardia e le loro mosse vanno sempre a segno."
    de: "Alle Attacken des oder auf das Pokémon gelingen\naufgrund seiner deckungslosen Kampftaktik."
    es: "Al quedar ambos expuestos, tanto sus movimientos\ncomo los del rival acertarán siempre."
    ko: "노가드전법에 따라\n서로가 사용하는 기술이\n반드시 맞게 된다."
    zh_simp: "由于无防守战术，\n双方使出的招式都必定会击中。"
    zh_trad: "由於無防守戰術，\n雙方使出的招式都必定會擊中。"
normalize:
  names:
    jp_kana: ノーマルスキン
    jp_kanji: ノーマルスキン
    en: Normalize
    fr: Normalise
    it: Normalità
    de: Regulierung
    es: Normalidad
    ko: 노말스킨
    zh_simp: 一般皮肤
    zh_trad: 一般皮膚
  descriptions:
    jp_kana: "どんな　タイプの　わざでも\nすべて　ノーマルタイプに　なる。\nいりょくが　すこし　あがる。"
    jp_kanji: "どんな　タイプの　技でも\nすべて　ノーマルタイプに　なる。\n威力が　少し　上がる。"
    en: "All the Pokémon’s moves become Normal type.\nThe power of those moves is boosted a little."
    fr: "Toutes les capacités du Pokémon deviennent\nde type Normal, quel que soit leur type original.\nLeur puissance augmente légèrement."
    it: "Tutte le mosse del Pokémon diventano di tipo\nNormale e la loro potenza aumenta un po’."
    de: "Alle Attacken des Pokémon nehmen den Typ Normal\nan und ihre Stärke erhöht sich ein wenig."
    es: "Hace que todos sus movimientos se vuelvan de tipo\nNormal y aumenten ligeramente su potencia."
    ko: "사용하는 기술의 타입이\n모두 노말타입이 된다.\n위력이 조금 올라간다."
    zh_simp: "无论是什么属性的招式，\n全部会变为一般属性。\n威力会少量提高。"
    zh_trad: "無論是什麼屬性的招式，\n全部都會變為一般屬性。\n威力會少量提高。"
oblivious:
  names:
    jp_kana: どんかん
    jp_kanji: どんかん
    en: Oblivious
    fr: Benêt
    it: Indifferenza
    de: Dösigkeit
    es: Despiste
    ko: 둔감
    zh_simp: 迟钝
    zh_trad: 遲鈍
  descriptions:
    jp_kana: "どんかん　なので\nメロメロや　ちょうはつ　じょうたいに\nならない。"
    jp_kanji: "鈍感なので\nメロメロや　ちょうはつ状態に\nならない。"
    en: "The Pokémon is oblivious, and that keeps it from\nbeing infatuated or falling for taunts."
    fr: "Le Pokémon est un grand benêt, ce qui l’immunise\ncontre l’attraction ou la provocation."
    it: "L’imperturbabilità del Pokémon lo protegge\nda infatuazioni e provocazioni."
    de: "Das Pokémon ist so apathisch, dass es nicht betört oder\nprovoziert werden kann."
    es: "Su indiferencia evita que sea provocado o caiga presa\ndel enamoramiento."
    ko: "둔감해서\n헤롱헤롱이나 도발 상태가\n되지 않는다."
    zh_simp: "因为感觉迟钝，\n不会变为着迷和被挑衅状态。"
    zh_trad: "感覺遲鈍，\n不會陷入著迷和被挑釁狀態。"
overcoat:
  names:
    jp_kana: ぼうじん
    jp_kanji: ぼうじん
    en: Overcoat
    fr: Envelocape
    it: Copricapo
    de: Partikelschutz
    es: Funda
    ko: 방진
    zh_simp: 防尘
    zh_trad: 防塵
  descriptions:
    jp_kana: "すなあらしや　あられなどの\nダメージを　うけない。\nこなの　わざを　うけない。"
    jp_kanji: "すなあらしや　あられなどの\nダメージを　受けない。\n粉の　技を　受けない。"
    en: "Protects the Pokémon from things like sand, hail,\nand powder."
    fr: "Protège des dégâts occasionnés par les tempêtes\nde sable ou la grêle, et neutralise les attaques à base\nde poudre."
    it: "Rende immuni ai danni da grandine e tempesta di\nsabbia, alle mosse Spora, Cottonspora, Sonnifero,\nParalizzante e alle mosse \"polvere\"."
    de: "Nimmt weder durch Wetterlagen wie Sandsturm oder\nHagel noch durch Pulver oder Puder Schaden."
    es: "No le afectan las tormentas de arena, el granizo y los\nmovimientos con polvos."
    ko: "모래바람이나 싸라기눈 등의\n데미지를 입지 않는다.\n가루 기술의 효과도 받지 않는다."
    zh_simp: "不会受到沙暴或冰雹等的伤害。\n不会受到粉末类招式的攻击。"
    zh_trad: "不會受到沙暴或冰雹等的傷害。\n不會受到粉末類招式的攻擊。"
overgrow:
  names:
    jp_kana: しんりょく
    jp_kanji: しんりょく
    en: Overgrow
    fr: Engrais
    it: Erbaiuto
    de: Notdünger
    es: Espesura
    ko: 심록
    zh_simp: 茂盛
    zh_trad: 茂盛
  descriptions:
    jp_kana: "ＨＰが　へったとき\nくさタイプの　わざの\nいりょくが　あがる。"
    jp_kanji: "ＨＰが　減ったとき\nくさタイプの　技の\n威力が　上がる。"
    en: "Powers up Grass-type moves when the Pokémon’s\nHP is low."
    fr: "Augmente la puissance des capacités de type Plante\ndu Pokémon quand il a perdu une certaine quantité\nde PV."
    it: "Quando il Pokémon ha pochi PS, la potenza delle\nsue mosse di tipo Erba aumenta."
    de: "Erhöht die Stärke von Pflanzen-Attacken, wenn die KP\nauf einen gewissen Wert fallen."
    es: "Potencia sus movimientos de tipo Planta cuando le\nquedan pocos PS."
    ko: "HP가 줄었을 때\n풀타입 기술의\n위력이 올라간다."
    zh_simp: "ＨＰ减少的时候，\n草属性的招式威力会提高。"
    zh_trad: "ＨＰ減少的時候，\n草屬性的招式威力會提高。"
own_tempo:
  names:
    jp_kana: マイペース
    jp_kanji: マイペース
    en: Own Tempo
    fr: Tempo Perso
    it: Mente Locale
    de: Tempomacher
    es: Ritmo Propio
    ko: 마이페이스
    zh_simp: 我行我素
    zh_trad: 我行我素
  descriptions:
    jp_kana: "マイペースなので\nこんらん　じょうたいに　ならない。"
    jp_kanji: "マイペースなので\nこんらん状態に　ならない。"
    en: "This Pokémon has its own tempo, and that prevents\nit from becoming confused."
    fr: "Le Pokémon vit sa vie à son propre rythme,\nce qui l’immunise contre la confusion."
    it: "Il Pokémon affronta la vita al proprio ritmo e per\nquesto non può essere confuso."
    de: "Das Pokémon lässt sich nicht aus der Ruhe bringen und\nverhindert so Verwirrung."
    es: "Como le gusta hacer las cosas a su manera, los rivales\nno logran confundirlo."
    ko: "마이페이스라서\n혼란 상태가 되지 않는다."
    zh_simp: "因为我行我素，\n不会变为混乱状态。"
    zh_trad: "因為我行我素，\n不會陷入混亂狀態。"
parental_bond:
  names:
    jp_kana: おやこあい
    jp_kanji: おやこあい
    en: Parental Bond
    fr: Amour Filial
    it: Amorefiliale
    de: Familienbande
    es: Amor Filial
    ko: 부자유친
    zh_simp: 亲子爱
    zh_trad: 親子愛
  descriptions:
    jp_kana: "おやこ　２ひきで　２かい\nこうげきする　ことが　できる。"
    jp_kanji: "親子　２匹で　２回\n攻撃することが　できる。"
    en: Parent and child each attacks.
    fr: "Permet à la mère et à son petit d’attaquer tous les deux\nen même temps."
    it: Il Pokémon e il suo piccolo attaccano insieme.
    de: "Zwei Generationen setzen jeweils ein Mal zum\nAngriff an."
    es: Une fuerzas con su cría y ataca dos veces.
    ko: "부모와 자식 2마리로 2번\n공격할 수 있다."
    zh_simp: 亲子俩可以合计攻击２次。
    zh_trad: 親子倆可合計攻擊２次。
pastel_veil:
  names:
    jp_kana: パステルベール
    jp_kanji: パステルベール
    en: Pastel Veil
    fr: Voile Pastel
    it: Pastelvelo
    de: Pastellhülle
    es: Velo Pastel
    ko: 파스텔베일
    zh_simp: 粉彩护幕
    zh_trad: 粉彩護幕
  descriptions:
    jp_kana: "じぶんも　みかたも\nどくの　じょうたいいじょうを\nうけなくなる。"
    jp_kanji: "自分も　味方も\nどくの　状態異常を\n受けなくなる。"
    en: "Protects the Pokémon and its ally Pokémon from\nbeing poisoned."
    fr: "Protège le Pokémon et ses alliés contre toutes\nles altérations de statut liées à l’empoisonnement."
    it: "Protegge il Pokémon e gli alleati dai problemi di stato\ncausati dal veleno."
    de: "Schützt das Pokémon und seine Mitstreiter vor\nVergiftung."
    es: "Se protege a sí mismo y a sus aliados del\nenvenenamiento."
    ko: "자신과 같은 편은\n독 상태가 되지 않는다."
    zh_simp: "自己和同伴都不会\n陷入中毒的异常状态。"
    zh_trad: "自己和我方同伴都不會\n陷入中毒的異常狀態。"
perish_body:
  names:
    jp_kana: ほろびのボディ
    jp_kanji: ほろびのボディ
    en: Perish Body
    fr: Corps Condamné
    it: Ultimotocco
    de: Unheilskörper
    es: Cuerpo Mortal
    ko: 멸망의바디
    zh_simp: 灭亡之躯
    zh_trad: 滅亡之軀
  descriptions:
    jp_kana: "せっしょくする　わざを　うけると\nおたがい　３ターン　たつと　ひんしになる。\nこうたいすると　こうかは　なくなる。"
    jp_kanji: "接触する　技を　受けると\nお互い　３ターン　たつと　ひんしになる。\n交代すると　効果は　なくなる。"
    en: "When hit by a move that makes direct contact,\nthe Pokémon and the attacker will faint after three turns\nunless they switch out of battle."
    fr: "Lorsque le Pokémon est directement touché par\nune attaque, l’assaillant et lui tomberont K.O. dans trois\ntours, à moins qu’ils ne soient remplacés entre temps."
    it: "Se il Pokémon viene colpito da un attacco diretto,\ndopo tre turni va KO assieme a chi lo ha attaccato.\nSe uno dei due viene sostituito, non va KO."
    de: "Erleidet es einen Treffer von einer direkten Attacke,\nwird es zusammen mit dem Angreifer nach drei Runden\nbesiegt. Rettung ist durch Austausch möglich."
    es: "Si le alcanza un movimiento de contacto, se debilitará\nal cabo de 3 turnos, así como su agresor, a menos que\nabandonen el terreno de combate."
    ko: "접촉하는 기술로 공격받으면\n3턴 후에 양쪽 모두 기절한다.\n교체되면 효과가 없어진다."
    zh_simp: "受到接触类招式攻击时，\n双方都会在３回合后变为昏厥状态。\n替换后效果消失。"
    zh_trad: "在受到接觸類招式攻擊時，\n３個回合後雙方都會陷入瀕死。\n替換寶可夢後效果就會消失。"
pickpocket:
  names:
    jp_kana: わるいてぐせ
    jp_kanji: わるいてぐせ
    en: Pickpocket
    fr: Pickpocket
    it: Arraffalesto
    de: Langfinger
    es: Hurto
    ko: 나쁜손버릇
    zh_simp: 顺手牵羊
    zh_trad: 順手牽羊
  descriptions:
    jp_kana: "さわられた　あいての　どうぐを\nぬすんで　しまう。"
    jp_kanji: "触られた　相手の　道具を\n盗んで　しまう。"
    en: "Steals an item from an attacker that made\ndirect contact."
    fr: "Vole l’objet que tient l’attaquant quand le Pokémon\nsubit une attaque directe."
    it: "Se il Pokémon viene colpito da un attacco diretto,\nruba lo strumento di chi lo ha attaccato."
    de: Stiehlt das Item des Angreifers bei Berührung.
    es: "Si el rival usa un movimiento de contacto al atacar,\nle roba el objeto."
    ko: "자신에게 접촉한 상대의\n도구를 훔친다."
    zh_simp: "盗取接触到自己的\n对手的道具。"
    zh_trad: "盜取接觸到自己的\n對手的道具。"
pickup:
  names:
    jp_kana: ものひろい
    jp_kanji: ものひろい
    en: Pickup
    fr: Ramassage
    it: Raccolta
    de: Mitnahme
    es: Recogida
    ko: 픽업
    zh_simp: 捡拾
    zh_trad: 撿拾
  descriptions:
    jp_kana: "あいての　つかった　どうぐを\nひろってくることが　ある。\nぼうけんちゅうも　ひろってくる。"
    jp_kanji: "相手の　使った　道具を\n拾ってくることが　ある。\n冒険中も　拾ってくる。"
    en: "The Pokémon may pick up the item an opposing\nPokémon used during a battle. It may pick up items\noutside of battle, too."
    fr: "Permet parfois au Pokémon de ramasser les objets\nque ses ennemis ont utilisés. Il lui arrive aussi\nd’en trouver hors des combats."
    it: "Il Pokémon può raccogliere lo strumento usato da\nun nemico durante la lotta. A volte potrebbe\nraccogliere strumenti anche fuori dalla lotta."
    de: "Hebt gelegentlich von Gegnern benutzte Items auf.\nDies geschieht nicht nur während Kämpfen, sondern\nauch unterwegs."
    es: "Puede recoger objetos que el rival haya usado, o bien\notros que encuentre en plena aventura."
    ko: "상대가 사용한 도구를\n주워 올 때가 있다.\n모험 중에도 주워 온다."
    zh_simp: "有时会捡来对手用过的道具，\n冒险过程中也会捡到。"
    zh_trad: "有時會撿來對手用過的道具。\n冒險過程中也會撿來。"
pixilate:
  names:
    jp_kana: フェアリースキン
    jp_kanji: フェアリースキン
    en: Pixilate
    fr: Peau Féérique
    it: Pellefolletto
    de: Feenschicht
    es: Piel Feérica
    ko: 페어리스킨
    zh_simp: 妖精皮肤
    zh_trad: 妖精皮膚
  descriptions:
    jp_kana: "ノーマルタイプの　わざが\nフェアリータイプになる。\nいりょくが　すこし　あがる。"
    jp_kanji: "ノーマルタイプの　技が\nフェアリータイプになる。\n威力が　少し　上がる。"
    en: "Normal-type moves become Fairy-type moves.\nThe power of those moves is boosted a little."
    fr: "Les capacités de type Normal deviennent de type Fée.\nLeur puissance augmente légèrement."
    it: "Le mosse di tipo Normale diventano di tipo Folletto\ne la loro potenza aumenta un po’."
    de: "Attacken vom Typ Normal nehmen den Typ Fee an und\nihre Stärke erhöht sich ein wenig."
    es: "Convierte los movimientos de tipo Normal en tipo Hada\ny aumenta ligeramente su potencia."
    ko: "노말타입의 기술이\n페어리타입이 된다.\n위력이 조금 올라간다."
    zh_simp: "一般属性的招式\n会变为妖精属性。\n威力会少量提高。"
    zh_trad: "一般屬性的招式\n會變為妖精屬性。\n威力會少量提高。"
plus:
  names:
    jp_kana: プラス
    jp_kanji: プラス
    en: Plus
    fr: Plus
    it: Più
    de: Plus
    es: Más
    ko: 플러스
    zh_simp: 正电
    zh_trad: 正電
  descriptions:
    jp_kana: "プラスか　マイナスの　とくせいを　もつ\nポケモンが　なかまに　いると\nじぶんの　とくこうが　あがる。"
    jp_kanji: "プラスか　マイナスの　特性を　持つ\nポケモンが　仲間に　いると\n自分の　特攻が　上がる。"
    en: "Boosts the Sp. Atk stat of the Pokémon if an ally\nwith the Plus or Minus Ability is also in battle."
    fr: "L’Attaque Spéciale du Pokémon augmente\nsi un Pokémon allié a le talent Moins ou Plus."
    it: "L’Attacco Speciale aumenta se ci sono alleati con\nl’abilità Meno o Più."
    de: "Erhöht den Spezial-Angriff, wenn das Pokémon einen\nMitstreiter mit der Fähigkeit Plus oder Minus hat."
    es: "Potencia su Ataque Especial si un Pokémon aliado tiene\nla habilidad Más o Menos."
    ko: "플러스나 마이너스의 특성을 가진\n포켓몬이 동료에 있으면\n자신의 특수공격이 올라간다."
    zh_simp: "出场的伙伴之间\n如果有正电或负电特性的宝可梦，\n自己的特攻会提高。"
    zh_trad: "場上的夥伴之中，\n如果有正電或負電特性的寶可夢，\n自己的特攻會提高。"
poison_heal:
  names:
    jp_kana: ポイズンヒール
    jp_kanji: ポイズンヒール
    en: Poison Heal
    fr: Soin Poison
    it: Velencura
    de: Aufheber
    es: Antídoto
    ko: 포이즌힐
    zh_simp: 毒疗
    zh_trad: 毒療
  descriptions:
    jp_kana: "どくじょうたいに　なると\nＨＰが　へらずに　ふえていく。"
    jp_kanji: "どく状態に　なると\nＨＰが　減らずに　増えていく。"
    en: "Restores HP if the Pokémon is poisoned instead of\nlosing HP."
    fr: "Quand le Pokémon est empoisonné, il regagne des PV\nau lieu d’en perdre."
    it: "Se il Pokémon è avvelenato, recupera PS anziché\nperderli."
    de: "Das Pokémon erleidet keinen Schaden durch Vergiftung,\nsondern regeneriert KP."
    es: Si resulta envenenado, recupera PS en vez de perderlos.
    ko: "독 상태가 되면\nHP가 줄지 않고 증가한다."
    zh_simp: "变为中毒状态时，\nＨＰ不会减少，反而会增加起来。"
    zh_trad: "陷入中毒狀態時，\nＨＰ不會減少，反而會漸漸增加。"
poison_point:
  names:
    jp_kana: どくのトゲ
    jp_kanji: どくのトゲ
    en: Poison Point
    fr: Point Poison
    it: Velenopunto
    de: Giftdorn
    es: Punto Tóxico
    ko: 독가시
    zh_simp: 毒刺
    zh_trad: 毒刺
  descriptions:
    jp_kana: "じぶんに　さわった　あいてを\nどく　じょうたいに　する　ことがある。"
    jp_kanji: "自分に　触った　相手を\nどく状態に　することがある。"
    en: Contact with the Pokémon may poison the attacker.
    fr: "Peut empoisonner l’attaquant lorsque le Pokémon\nsubit une attaque directe."
    it: Può avvelenare chi manda a segno un attacco diretto.
    de: Vergiftet den Angreifer bei Berührung eventuell.
    es: Puede envenenar al mínimo contacto.
    ko: "자신에게 접촉한 상대를\n독 상태로 만들 때가 있다."
    zh_simp: "有时会让接触到自己的\n对手变为中毒状态。"
    zh_trad: "有時會讓接觸到自己的\n對手陷入中毒狀態。"
poison_touch:
  names:
    jp_kana: どくしゅ
    jp_kanji: どくしゅ
    en: Poison Touch
    fr: Toxitouche
    it: Velentocco
    de: Giftgriff
    es: Toque Tóxico
    ko: 독수
    zh_simp: 毒手
    zh_trad: 毒手
  descriptions:
    jp_kana: "さわる　だけで　あいてを\nどく　じょうたいに　することがある。"
    jp_kanji: "触る　だけで　相手を\nどく　状態に　することがある。"
    en: "May poison a target when the Pokémon\nmakes contact."
    fr: Peut empoisonner l’ennemi par simple contact.
    it: Il Pokémon può avvelenare il nemico al solo contatto.
    de: Kann das Ziel durch bloßes Berühren vergiften.
    es: Puede envenenar al objetivo con solo tocarlo.
    ko: "접촉하기만 해도 상대를\n독 상태로 만들 때가 있다."
    zh_simp: "只通过接触就有可能\n让对手变为中毒状态。"
    zh_trad: "有時僅是接觸\n就能讓對手中毒。"
power_construct:
  names:
    jp_kana: スワームチェンジ
    jp_kanji: スワームチェンジ
    en: Power Construct
    fr: Rassemblement
    it: Sciamefusione
    de: Scharwandel
    es: Agrupamiento
    ko: 스웜체인지
    zh_simp: 群聚变形
    zh_trad: 群聚變形
  descriptions:
    jp_kana: "ＨＰが　はんぶんに　なると\nセルたちが　おうえんに　かけつけ\nパーフェクトフォルムに　すがたを　かえる。"
    jp_kanji: "ＨＰが　半分に　なると\nセルたちが　応援に　駆けつけ\nパーフェクトフォルムに　姿を　変える。"
    en: "Other Cells gather to aid when its HP becomes\nhalf or less. Then the Pokémon changes\nits form to Complete Forme."
    fr: "Lorsque le Pokémon perd la moitié de ses PV,\nses Cellules se rassemblent pour l’encourager,\nce qui lui permet de prendre sa Forme Parfaite."
    it: "Se i PS del Pokémon scendono a metà o meno, le\ncellule si raggruppano e gli permettono di assumere\nla Forma Perfetta."
    de: "Fallen seine KP auf die Hälfte des Maximalwerts oder\nweniger, eilen ihm weitere Zellen zu Hilfe und es\nnimmt die Optimumform an."
    es: "Cuando sus PS se ven reducidos a la mitad, las células\nse reagrupan y adopta su Forma Completa."
    ko: "HP가 절반이 되면\n셀들이 응원하러 달려와\n퍼펙트폼으로 모습이 변한다."
    zh_simp: "ＨＰ变为一半时，\n细胞们会赶来支援，\n变为完全体形态。"
    zh_trad: "ＨＰ變為一半時，\n細胞們會趕來支援，\n變為完全體形態。"
power_of_alchemy:
  names:
    jp_kana: かがくのちから
    jp_kanji: かがくのちから
    en: Power of Alchemy
    fr: Osmose
    it: Forza Chimica
    de: Chemiekraft
    es: Reacción Química
    ko: 과학의힘
    zh_simp: 化学之力
    zh_trad: 化學之力
  descriptions:
    jp_kana: "たおされた　みかたの　とくせいを　うけつぎ\nおなじ　とくせいに　かわる。"
    jp_kanji: "倒された　味方の　特性を　受け継ぎ\n同じ　特性に　変わる。"
    en: The Pokémon copies the Ability of a defeated ally.
    fr: Le Pokémon acquiert le talent d’un allié mis K.O.
    it: "Il Pokémon trasforma la propria abilità in quella\ndi un alleato andato KO."
    de: "Wechselt seine Fähigkeit zu der eines kampfunfähig\ngewordenen Mitstreiters."
    es: "Reacciona copiando la habilidad de un aliado\ndebilitado."
    ko: "쓰러진 같은 편의 특성을\n이어받아 같은 특성으로 바뀐다."
    zh_simp: "继承被打倒的同伴的特性，\n变为相同的特性。"
    zh_trad: "繼承被打倒的同伴的特性，\n變為相同的特性。"
power_spot:
  names:
    jp_kana: パワースポット
    jp_kanji: パワースポット
    en: Power Spot
    fr: Cercle d’Énergie
    it: Fonte Energetica
    de: Kraftquelle
    es: Fuente Energía
    ko: 파워스폿
    zh_simp: 能量点
    zh_trad: 能量點
  descriptions:
    jp_kana: "となりに　いるだけで\nわざの　いりょくが　あがる。"
    jp_kanji: "隣に　いるだけで\n技の　威力が　上がる。"
    en: Just being next to the Pokémon powers up moves.
    fr: "Augmente la puissance des capacités des Pokémon\nqui se trouvent à proximité."
    it: "Potenzia le mosse di chi si trova nelle immediate\nvicinanze."
    de: "Erhöht bei direkt benachbarten Pokémon die Stärke\nvon Attacken."
    es: Potencia los movimientos de los Pokémon adyacentes.
    ko: "옆에 있기만 해도\n기술의 위력이 올라간다."
    zh_simp: "只要处在相邻位置，\n招式的威力就会提高。"
    zh_trad: "只要站在旁邊，\n招式的威力就會提高。"
prankster:
  names:
    jp_kana: いたずらごころ
    jp_kanji: いたずらごころ
    en: Prankster
    fr: Farceur
    it: Burla
    de: Strolch
    es: Bromista
    ko: 짓궂은마음
    zh_simp: 恶作剧之心
    zh_trad: 惡作劇之心
  descriptions:
    jp_kana: "へんかわざを　せんせいで\nだすことが　できる。"
    jp_kanji: "変化技を　先制で\n出すことが　できる。"
    en: Gives priority to a status move.
    fr: Rend les capacités de statut prioritaires.
    it: "Le mosse di stato del Pokémon acquistano\npriorità alta."
    de: Ermöglicht einen Erstschlag mit Status-Attacken.
    es: Sus movimientos de estado tienen prioridad alta.
    ko: "변화 기술을 먼저\n쓸 수 있다."
    zh_simp: 可以率先使出变化招式。
    zh_trad: 可以搶先使出變化類招式。
pressure:
  names:
    jp_kana: プレッシャー
    jp_kanji: プレッシャー
    en: Pressure
    fr: Pression
    it: Pressione
    de: Erzwinger
    es: Presión
    ko: 프레셔
    zh_simp: 压迫感
    zh_trad: 壓迫感
  descriptions:
    jp_kana: "プレッシャーを　あたえて\nあいての　つかう　わざの　ＰＰを\nおおく　へらす。"
    jp_kanji: "プレッシャーを　あたえて\n相手の　使う　技の　ＰＰを\n多く　減らす。"
    en: "By putting pressure on the opposing Pokémon, it\nraises their PP usage."
    fr: "Met la pression à l’ennemi pour le forcer\nà dépenser plus de PP."
    it: "Il Pokémon mette pressione al nemico, facendogli\nconsumare più PP."
    de: "Zwingt Gegner dazu, beim Einsatz von Attacken\nmehr AP zu verbrauchen."
    es: Presiona al rival para que sus PP se acaben antes.
    ko: "프레셔를 줘서\n상대가 쓰는 기술의 PP를\n많이 줄인다."
    zh_simp: "给予对手压迫感，\n大量减少其使用招式的ＰＰ。"
    zh_trad: "給予對手壓迫感，\n大量減少其使用招式的ＰＰ。"
primordial_sea:
  names:
    jp_kana: はじまりのうみ
    jp_kanji: はじまりのうみ
    en: Primordial Sea
    fr: Mer Primaire
    it: Mare Primordiale
    de: Urmeer
    es: Mar del Albor
    ko: 시작의바다
    zh_simp: 始源之海
    zh_trad: 始源之海
  descriptions:
    jp_kana: "ほのおタイプの　こうげきを\nうけない　てんきにする。"
    jp_kanji: "ほのおタイプの　攻撃を\n受けない　天気にする。"
    en: "The Pokémon changes the weather to nullify\nFire-type attacks."
    fr: "Altère les conditions météo et rend inefficaces\nles attaques de type Feu."
    it: "Crea un clima che rende inefficaci\ngli attacchi di tipo Fuoco."
    de: "Ändert das Wetter, um Feuer-Attacken wirkungslos\nzu machen."
    es: Altera el clima para anular los ataques de tipo Fuego.
    ko: "불꽃타입의 공격을\n받지 않는 날씨로 만든다."
    zh_simp: "变为不会受到\n火属性攻击的天气。"
    zh_trad: "變為讓火屬性攻擊\n失效的天氣。"
prism_armor:
  names:
    jp_kana: プリズムアーマー
    jp_kanji: プリズムアーマー
    en: Prism Armor
    fr: Prisme-Armure
    it: Scudoprisma
    de: Prismarüstung
    es: Armadura Prisma
    ko: 프리즘아머
    zh_simp: 棱镜装甲
    zh_trad: 稜鏡裝甲
  descriptions:
    jp_kana: "こうかばつぐんに　なってしまう\nこうげきの　いりょくを\nよわめる　ことが　できる。"
    jp_kanji: "効果バツグンに　なってしまう\n攻撃の　威力を\n弱める　ことが　できる。"
    en: Reduces the power of supereffective attacks taken.
    fr: "Réduit les dégâts subis lorsque le Pokémon\nest touché par une capacité super efficace."
    it: Riduce i danni subiti dalle mosse superefficaci.
    de: "Reduziert die Stärke von sehr effektiven Attacken und\nverringert damit den Schaden, den das Pokémon durch\nsie erleidet."
    es: "Mitiga el daño que le infligen los movimientos\nsupereficaces."
    ko: "자신이 받는 효과가 굉장한\n공격의 위력을\n약하게 만든다."
    zh_simp: "受到效果绝佳的攻击时，\n可以减弱其威力。"
    zh_trad: "受到效果絕佳的攻擊時，\n可減弱其威力。"
propeller_tail:
  names:
    jp_kana: スクリューおびれ
    jp_kanji: スクリューおびれ
    en: Propeller Tail
    fr: Propulseur
    it: Elicopinna
    de: Schraubflosse
    es: Hélice Caudal
    ko: 스크루지느러미
    zh_simp: 螺旋尾鳍
    zh_trad: 螺旋尾鰭
  descriptions:
    jp_kana: "あいての　わざを　ひきうける\nとくせいや　わざの\nえいきょうを　むし　できる。"
    jp_kanji: "相手の　技を　引き受ける\n特性や　技の\n影響を　無視　できる。"
    en: "Ignores the effects of opposing Pokémon’s\nAbilities and moves that draw in moves."
    fr: "Permet d’ignorer l’effet des capacités\nou des talents qui attirent les capacités."
    it: "Permette di ignorare gli effetti di mosse e abilità\nche attirano altre mosse."
    de: "Ignoriert die Effekte von Fähigkeiten und Attacken\nanderer Pokémon, die Attacken auf sich lenken."
    es: "Impide que el rival pueda atraer ataques hacia sí mismo\npor efecto de su habilidad o sus movimientos."
    ko: "상대의 기술을 끌어모으는\n특성이나 기술의\n영향을 받지 않는다."
    zh_simp: "能无视具有吸引\n对手招式效果的\n特性或招式的影响。"
    zh_trad: "能無視具有吸引\n對手招式效果的\n特性或招式的影響。"
protean:
  names:
    jp_kana: へんげんじざい
    jp_kanji: へんげんじざい
    en: Protean
    fr: Protéen
    it: Mutatipo
    de: Wandlungskunst
    es: Mutatipo
    ko: 변환자재
    zh_simp: 变幻自如
    zh_trad: 變幻自如
  descriptions:
    jp_kana: "じぶんが　だす　わざと\nおなじ　タイプに　へんかする。"
    jp_kanji: "自分が　出す　技と\n同じ　タイプに　変化する。"
    en: "Changes the Pokémon’s type to the type of the\nmove it’s about to use."
    fr: Le Pokémon prend le type de la capacité qu’il utilise.
    it: "Cambia il tipo del Pokémon in quello della mossa\nche usa."
    de: "Das Pokémon nimmt bei Einsatz einer Attacke deren\nTyp an."
    es: Cambia su tipo al del movimiento que va a usar.
    ko: "자신이 사용한 기술과\n같은 타입으로 변화한다."
    zh_simp: "变为与自己使出的招式\n相同的属性。"
    zh_trad: "變為與自己使出的招式\n相同的屬性。"
psychic_surge:
  names:
    jp_kana: サイコメイカー
    jp_kanji: サイコメイカー
    en: Psychic Surge
    fr: Créa-Psy
    it: Psicogenesi
    de: Psycho-Erzeuger
    es: Psicogénesis
    ko: 사이코메이커
    zh_simp: 精神制造者
    zh_trad: 精神製造者
  descriptions:
    jp_kana: "とうじょう　したときに\nサイコフィールドを　はりめぐらせる。"
    jp_kanji: "登場　したときに\nサイコフィールドを　はりめぐらせる。"
    en: "Turns the ground into Psychic Terrain when\nthe Pokémon enters a battle."
    fr: "Le Pokémon crée un Champ Psychique au moment\noù il entre au combat."
    it: "Quando il Pokémon entra in campo,\nlo trasforma in un Campo Psichico."
    de: Erzeugt bei Kampfantritt ein Psychofeld.
    es: Crea un campo psíquico al entrar en combate.
    ko: "등장했을 때\n사이코필드를 사용한다."
    zh_simp: "出场时，\n会布下精神场地。"
    zh_trad: "出場時，\n會布下精神場地。"
punk_rock:
  names:
    jp_kana: パンクロック
    jp_kanji: パンクロック
    en: Punk Rock
    fr: Punk Rock
    it: Punk Rock
    de: Punk Rock
    es: Punk Rock
    ko: 펑크록
    zh_simp: 庞克摇滚
    zh_trad: 龐克搖滾
  descriptions:
    jp_kana: "おとわざの　いりょくが　あがる。\nうけた　おとわざの\nダメージは　はんぶんに　なる。"
    jp_kanji: "音技の　威力が　上がる。\n受けた　音技の\nダメージは　半分に　なる。"
    en: "Boosts the power of sound-based moves.\nThe Pokémon also takes half the damage from\nthese kinds of moves."
    fr: "Augmente la puissance des capacités basées sur le son.\nLe Pokémon ne subit que la moitié des dégâts\nquand il est touché par ce genre de capacités."
    it: "Aumenta la potenza delle mosse basate sul suono.\nInoltre, dimezza i danni subiti dal Pokémon se\nviene colpito da tali mosse."
    de: "Erhöht die Stärke von eigenen Lärm-Attacken und\nhalbiert den Schaden, den das Pokémon selbst durch\nLärm-Attacken erleidet."
    es: "Potencia los movimientos que usan sonido y reduce\na la mitad el daño que le infligen dichos movimientos."
    ko: "소리 기술의 위력이 올라간다.\n상대로부터 받는 소리 기술의\n데미지는 절반이 된다."
    zh_simp: "声音招式的威力会提高。\n受到的声音招式伤害会减半。"
    zh_trad: "聲音招式的威力會提高。\n受到聲音招式的傷害會減半。"
pure_power:
  names:
    jp_kana: ヨガパワー
    jp_kanji: ヨガパワー
    en: Pure Power
    fr: Force Pure
    it: Forzapura
    de: Mentalkraft
    es: Energía Pura
    ko: 순수한힘
    zh_simp: 瑜伽之力
    zh_trad: 瑜伽之力
  descriptions:
    jp_kana: "ヨガの　ちからで\nぶつり　こうげきの　いりょくが\n２ばいに　なる。"
    jp_kanji: "ヨガの　力で\n物理攻撃の　威力が\n２倍に　なる。"
    en: "Using its pure power, the Pokémon doubles its\nAttack stat."
    fr: "Le Pokémon utilise sa maîtrise du yoga pour doubler\nla puissance de ses capacités physiques."
    it: "L’Attacco del Pokémon raddoppia grazie\nalla sua padronanza delle tecniche yoga."
    de: "Verdoppelt mit reiner Willenskraft die Stärke seiner\nphysischen Attacken."
    es: "Duplica la potencia de sus ataques físicos gracias al\nyoga."
    ko: "요가의 힘으로\n물리공격의 위력이\n2배가 된다."
    zh_simp: "因瑜伽的力量，\n物理攻击的威力会变为２倍。"
    zh_trad: "因瑜伽的力量，\n物理攻擊的威力會變為２倍。"
queenly_majesty:
  names:
    jp_kana: じょおうのいげん
    jp_kanji: じょおうのいげん
    en: Queenly Majesty
    fr: Prestance Royale
    it: Regalità
    de: Majestät
    es: Regia Presencia
    ko: 여왕의위엄
    zh_simp: 女王的威严
    zh_trad: 女王的威嚴
  descriptions:
    jp_kana: "あいてに　いあつかんを　あたえ\nこちらに　むかって　せんせいわざを\nだせない　ようにする。"
    jp_kanji: "相手に　威圧感を　あたえ\nこちらに　むかって　先制技を\n出せない　ようにする。"
    en: "Its majesty pressures the opposing Pokémon,\nmaking it unable to attack using priority moves."
    fr: "L’adversaire est impressionné par la majesté du Pokémon\net ne peut pas le viser avec une attaque prioritaire."
    it: "L’aura di regalità del Pokémon impedisce al nemico\ndi attaccarlo con mosse che hanno priorità alta."
    de: "Schüchtert Gegner ein und hindert sie so daran,\nErstschlag-Attacken gegen es einzusetzen."
    es: "Intimida al objetivo y le impide usar movimientos con\nprioridad."
    ko: "상대에게 위압감을 줘서\n이쪽을 향한 선제 기술을\n사용할 수 없게 한다."
    zh_simp: "向对手施加威慑力，\n使其无法对我方使出先制招式。"
    zh_trad: "向對手施加威懾力，\n使其無法對我方使出先制招式。"
quick_draw:
  names:
    jp_kana: クイックドロウ
    jp_kanji: クイックドロウ
    en: Quick Draw
    fr: Tir Vif
    it: Colpolesto
    de: Schnellschuss
    es: Mano Rápida
    ko: 퀵드로
    zh_simp: 速击
    zh_trad: 速擊
  descriptions:
    jp_kana: "あいてより　さきに\nこうどう　できることが　ある。"
    jp_kanji: "相手より　先に\n行動できることが　ある。"
    en: Enables the Pokémon to move first occasionally.
    fr: Permet parfois au Pokémon d’agir en premier.
    it: A volte permette al Pokémon di agire per primo.
    de: Ermöglicht dem Pokémon gelegentlich den Erstschlag.
    es: A veces, puede atacar el primero.
    ko: "상대보다 먼저\n행동할 수도 있다."
    zh_simp: 有时能比对手先一步行动。
    zh_trad: 有時能比對手先一步行動。
quick_feet:
  names:
    jp_kana: はやあし
    jp_kanji: はやあし
    en: Quick Feet
    fr: Pied Véloce
    it: Piedisvelti
    de: Rasanz
    es: Pies Rápidos
    ko: 속보
    zh_simp: 飞毛腿
    zh_trad: 飛毛腿
  descriptions:
    jp_kana: "じょうたい　いじょうに　なると\nすばやさが　あがる。"
    jp_kanji: "状態異常に　なると\n素早さが　上がる。"
    en: "Boosts the Speed stat if the Pokémon has a\nstatus condition."
    fr: "Augmente la Vitesse du Pokémon en cas d’altération\nde statut."
    it: "Se il Pokémon è affetto da un problema di stato,\nla Velocità aumenta."
    de: Erhöht bei Statusproblemen die Initiative.
    es: Aumenta la Velocidad si sufre problemas de estado.
    ko: "상태 이상이 되면\n스피드가 올라간다."
    zh_simp: "变为异常状态时，\n速度会提高。"
    zh_trad: "陷入異常狀態時，\n速度會提高。"
rain_dish:
  names:
    jp_kana: あめうけざら
    jp_kanji: あめうけざら
    en: Rain Dish
    fr: Cuvette
    it: Copripioggia
    de: Regengenuss
    es: Cura Lluvia
    ko: 젖은접시
    zh_simp: 雨盘
    zh_trad: 雨盤
  descriptions:
    jp_kana: "てんきが　あめのとき\nすこしずつ　ＨＰを　かいふくする。"
    jp_kanji: "天気が　雨のとき\n少しずつ　ＨＰを　回復する。"
    en: The Pokémon gradually regains HP in rain.
    fr: "Le Pokémon récupère progressivement des PV\nlorsqu’il pleut."
    it: Il Pokémon recupera PS quando piove.
    de: Regeneriert bei Regen nach und nach KP.
    es: Recupera PS de forma gradual cuando llueve.
    ko: "비가 오는 날씨일 때\n조금씩 HP를 회복한다."
    zh_simp: "下雨天气时，\n会缓缓回复ＨＰ。"
    zh_trad: "天氣為下雨時，\n會漸漸回復ＨＰ。"
rattled:
  names:
    jp_kana: びびり
    jp_kanji: びびり
    en: Rattled
    fr: Phobique
    it: Paura
    de: Hasenfuß
    es: Cobardía
    ko: 주눅
    zh_simp: 胆怯
    zh_trad: 膽怯
  descriptions:
    jp_kana: "あくタイプと　ゴーストタイプと\nむしタイプの　わざを　うけると\nびびって　すばやさが　あがる。"
    jp_kanji: "あくタイプと　ゴーストタイプと\nむしタイプの　技を　受けると\nびびって　素早さが　上がる。"
    en: "Dark-, Ghost-, and Bug-type moves scare the\nPokémon and boost its Speed stat."
    fr: "Si le Pokémon est touché par une capacité de type\nTénèbres, Spectre ou Insecte, sa phobie se révèle\net sa Vitesse augmente."
    it: "Le mosse di tipo Buio, Spettro e Coleottero\nspaventano il Pokémon aumentandone la Velocità."
    de: "Wird es von einer Unlicht-, Geister- oder Käfer-Attacke\ngetroffen, bekommt es Angst und seine Initiative steigt."
    es: "Si le alcanza un movimiento de tipo Siniestro, Bicho o\nFantasma, el miedo hace que le suba la Velocidad."
    ko: "악타입과 고스트타입,\n벌레타입의 기술로 공격받으면\n주눅이 들어 스피드가 올라간다."
    zh_simp: "受到恶属性、幽灵属性\n和虫属性的招式攻击时，\n会因胆怯而速度提高。"
    zh_trad: "受到惡屬性、幽靈屬性\n和蟲屬性的招式攻擊時，\n會因膽怯而使得速度提高。"
receiver:
  names:
    jp_kana: レシーバー
    jp_kanji: レシーバー
    en: Receiver
    fr: Receveur
    it: Ricezione
    de: Receiver
    es: Receptor
    ko: 리시버
    zh_simp: 接球手
    zh_trad: 接球手
  descriptions:
    jp_kana: "たおされた　みかたの　とくせいを\nうけついで　おなじ　とくせいに　なる。"
    jp_kanji: "倒された　味方の　特性を\n受け継いで　同じ　特性に　なる。"
    en: The Pokémon copies the Ability of a defeated ally.
    fr: Le Pokémon reçoit le talent d’un allié mis K.O.
    it: "Il Pokémon acquisisce l’abilità di un alleato\nandato KO."
    de: "Wird einer seiner Mitstreiter besiegt, erhält es\ndessen Fähigkeit."
    es: Adquiere la habilidad de un aliado debilitado.
    ko: "쓰러진 같은 편의 특성을\n이어받아 같은 특성이 된다."
    zh_simp: "继承被打倒的同伴的特性，\n变为相同的特性。"
    zh_trad: "繼承被打倒的同伴的特性，\n變為相同的特性。"
reckless:
  names:
    jp_kana: すてみ
    jp_kanji: すてみ
    en: Reckless
    fr: Téméraire
    it: Temerarietà
    de: Achtlos
    es: Audaz
    ko: 이판사판
    zh_simp: 舍身
    zh_trad: 捨身
  descriptions:
    jp_kana: "はんどうで　ダメージを\nうける　わざの　いりょくが　あがる。"
    jp_kanji: "反動で　ダメージを\n受ける　技の　威力が　上がる。"
    en: Powers up moves that have recoil damage.
    fr: "Augmente la puissance des capacités occasionnant\nun contrecoup."
    it: Potenzia le mosse che causano contraccolpo.
    de: Erhöht die Stärke von Attacken mit Rückstoßschaden.
    es: Potencia los movimientos que también dañan al usuario.
    ko: "반동 데미지를\n받는 기술의 위력이 올라간다."
    zh_simp: "自己会因反作用力受伤的招式，\n其威力会提高。"
    zh_trad: "會讓自己因反作用力而受傷的招式\n威力會提高。"
refrigerate:
  names:
    jp_kana: フリーズスキン
    jp_kanji: フリーズスキン
    en: Refrigerate
    fr: Peau Gelée
    it: Pellegelo
    de: Frostschicht
    es: Piel Helada
    ko: 프리즈스킨
    zh_simp: 冰冻皮肤
    zh_trad: 冰凍皮膚
  descriptions:
    jp_kana: "ノーマルタイプの　わざが\nこおりタイプになる。\nいりょくが　すこし　あがる。"
    jp_kanji: "ノーマルタイプの　技が\nこおりタイプに　なる。\n威力が　少し　上がる。"
    en: "Normal-type moves become Ice-type moves.\nThe power of those moves is boosted a little."
    fr: "Les capacités de type Normal deviennent de type Glace.\nLeur puissance augmente légèrement."
    it: "Le mosse di tipo Normale diventano di tipo\nGhiaccio e la loro potenza aumenta un po’."
    de: "Attacken vom Typ Normal nehmen den Typ Eis an und\nihre Stärke erhöht sich ein wenig."
    es: "Convierte los movimientos de tipo Normal en tipo\nHielo y aumenta ligeramente su potencia."
    ko: "노말타입의 기술이\n얼음타입이 된다.\n위력이 조금 올라간다."
    zh_simp: "一般属性的招式\n会变为冰属性。\n威力会少量提高。"
    zh_trad: "一般屬性的招式\n會變為冰屬性。\n威力會少量提高。"
regenerator:
  names:
    jp_kana: さいせいりょく
    jp_kanji: さいせいりょく
    en: Regenerator
    fr: Régé-Force
    it: Rigenergia
    de: Belebekraft
    es: Regeneración
    ko: 재생력
    zh_simp: 再生力
    zh_trad: 再生力
  descriptions:
    jp_kana: "てもちに　ひっこむと\nＨＰが　すこし　かいふくする。"
    jp_kanji: "手持ちに　引っ込むと\nＨＰが　少し　回復する。"
    en: Restores a little HP when withdrawn from battle.
    fr: "Restaure un peu de PV si le Pokémon est retiré\ndu combat."
    it: "Il Pokémon recupera un po’ di PS quando lascia\nil campo."
    de: "Wird das Pokémon ausgewechselt, regeneriert es eine\nkleine Menge an KP."
    es: "Recupera unos pocos PS al ser cambiado por otro\nPokémon."
    ko: "지닌 포켓몬으로 돌아오면\nHP를 조금 회복한다."
    zh_simp: "退回同行队伍后，\nＨＰ会少量回复。"
    zh_trad: "退回同行隊伍後，\nＨＰ會少量回復。"
ripen:
  names:
    jp_kana: じゅくせい
    jp_kanji: じゅくせい
    en: Ripen
    fr: Mûrissement
    it: Maturazione
    de: Heranreifen
    es: Maduración
    ko: 숙성
    zh_simp: 熟成
    zh_trad: 熟成
  descriptions:
    jp_kana: "じゅくせい　させることで\nきのみの　こうかが\nばいに　なる。"
    jp_kanji: "熟成　させることで\nきのみの　効果が\n倍に　なる。"
    en: Ripens Berries and doubles their effect.
    fr: "Le Pokémon fait mûrir la Baie qu’il tient\net double ainsi son effet."
    it: Fa maturare le bacche raddoppiandone gli effetti.
    de: "Verdoppelt den Effekt von Beeren, indem es sie\nheranreifen lässt."
    es: Hace madurar las bayas, por lo que duplica sus efectos.
    ko: "나무열매를\n숙성시켜서\n효과가 2배가 된다."
    zh_simp: "使树果成熟，\n效果变为２倍。"
    zh_trad: "讓樹果成熟，\n使效果變為２倍。"
rivalry:
  names:
    jp_kana: とうそうしん
    jp_kanji: とうそうしん
    en: Rivalry
    fr: Rivalité
    it: Antagonismo
    de: Rivalität
    es: Rivalidad
    ko: 투쟁심
    zh_simp: 斗争心
    zh_trad: 鬥爭心
  descriptions:
    jp_kana: "せいべつが　おなじだと\nとうそうしんを　もやして　つよくなる\nせいべつが　ちがうと　よわくなる"
    jp_kanji: "性別が　同じだと\n闘争心を　燃やして　強くなる。\n性別が　違うと　弱くなる。"
    en: "Becomes competitive and deals more damage to\nPokémon of the same gender, but deals less to\nPokémon of the opposite gender."
    fr: "Le Pokémon déteste la concurrence et inflige plus\nde dégâts si l’ennemi est du même sexe. Par contre,\nil en inflige moins si l’ennemi est du sexe opposé."
    it: "Rende più forti contro nemici dello stesso sesso,\nma più deboli contro nemici di sesso opposto."
    de: "Greift es einen Rivalen desselben Geschlechts an,\nwird es stärker. Greift es ein Ziel des anderen\nGeschlechts an, wird es schwächer."
    es: "Si el objetivo es del mismo sexo, su competitividad le\nlleva a infligir más daño. Si es del sexo contrario, en\ncambio, el daño será menor."
    ko: "성별이 같으면\n투쟁심을 불태워 강해진다.\n성별이 다르면 약해진다."
    zh_simp: "面对性别相同的对手，\n会燃起斗争心，变得更强。\n而面对性别不同的，则会变弱。"
    zh_trad: "面對性別相同的對手，\n會燃起鬥爭心，變得更強。\n面對性別不同的對手時則會變弱。"
rks_system:
  names:
    jp_kana: ＡＲシステム
    jp_kanji: ＡＲシステム
    en: RKS System
    fr: Système Alpha
    it: Sistema Primevo
    de: Alpha-System
    es: Sistema Alfa
    ko: AR시스템
    zh_simp: ＡＲ系统
    zh_trad: ＡＲ系統
  descriptions:
    jp_kana: "もっている　メモリで\nじぶんの　タイプが　かわる。"
    jp_kanji: "持っている　メモリで\n自分の　タイプが　変わる。"
    en: "Changes the Pokémon’s type to match the\nmemory disc it holds."
    fr: "Change le type du Pokémon en fonction\nde la ROM équipée."
    it: "Il tipo del Pokémon cambia in base alla ROM\ninstallata."
    de: Das Pokémon passt seinen Typ der getragenen Disc an.
    es: Cambia su tipo según el disco que lleve instalado.
    ko: "지니고 있는 메모리로\n자신의 타입이 변한다."
    zh_simp: "根据持有的存储碟，\n自己的属性会改变。"
    zh_trad: "根據持有的記憶碟，\n自己的屬性會改變。"
rock_head:
  names:
    jp_kana: いしあたま
    jp_kanji: いしあたま
    en: Rock Head
    fr: Tête de Roc
    it: Testadura
    de: Steinhaupt
    es: Cabeza Roca
    ko: 돌머리
    zh_simp: 坚硬脑袋
    zh_trad: 堅硬腦袋
  descriptions:
    jp_kana: "はんどうを　うける　わざを　だしても\nＨＰが　へらない。"
    jp_kanji: "反動を　受ける　技を　出しても\nＨＰが　減らない。"
    en: Protects the Pokémon from recoil damage.
    fr: "Le Pokémon peut utiliser des capacités occasionnant\nun contrecoup sans perdre de PV."
    it: Protegge il Pokémon dai contraccolpi.
    de: "Verhindert Schaden, der durch Rückstoß entstehen\nwürde."
    es: No puede dañarse con sus propios movimientos.
    ko: "반동을 받는 기술을 사용해도\nHP가 줄지 않는다."
    zh_simp: "即使使出会受反作用力伤害的招式，\nＨＰ也不会减少。"
    zh_trad: "即使使出會受反作用力傷害的招式，\nＨＰ也不會減少。"
rough_skin:
  names:
    jp_kana: さめはだ
    jp_kanji: さめはだ
    en: Rough Skin
    fr: Peau Dure
    it: Cartavetro
    de: Rauhaut
    es: Piel Tosca
    ko: 까칠한피부
    zh_simp: 粗糙皮肤
    zh_trad: 粗糙皮膚
  descriptions:
    jp_kana: "こうげきを　うけたとき\nじぶんに　ふれた　あいてを\nざらざらの　はだで　キズつける。"
    jp_kanji: "攻撃を　受けたとき\n自分に　触れた　相手を\nざらざらの　肌で　キズつける。"
    en: "This Pokémon inflicts damage with its rough skin\nto the attacker on contact."
    fr: "Blesse l’attaquant lorsque le Pokémon subit\nune attaque directe."
    it: "Se il Pokémon è colpito da un attacco diretto, grazie\nalla sua pelle ruvida infligge danni a sua volta."
    de: "Angreifer werden durch die raue Haut des Pokémon\nbei direkten Attacken verletzt."
    es: "Hiere con su piel áspera al rival que lo ataque con un\nmovimiento de contacto."
    ko: "공격을 받았을 때\n자신에게 접촉한 상대를\n까칠까칠한 피부로 상처를 입힌다."
    zh_simp: "受到攻击时，\n用粗糙的皮肤弄伤\n接触到自己的对手。"
    zh_trad: "受到攻擊時，\n用粗糙的皮膚弄傷\n接觸到自己的對手。"
run_away:
  names:
    jp_kana: にげあし
    jp_kanji: にげあし
    en: Run Away
    fr: Fuite
    it: Fugafacile
    de: Angsthase
    es: Fuga
    ko: 도주
    zh_simp: 逃跑
    zh_trad: 逃跑
  descriptions:
    jp_kana: "やせいの　ポケモンから\nかならず　にげられる。"
    jp_kanji: "野生の　ポケモンから\n必ず　逃げられる。"
    en: Enables a sure getaway from wild Pokémon.
    fr: Permet de fuir n’importe quel Pokémon sauvage.
    it: Garantisce la fuga dai Pokémon selvatici.
    de: Die Flucht vor wilden Pokémon gelingt immer.
    es: Puede escaparse de todos los Pokémon salvajes.
    ko: "야생 포켓몬으로부터\n반드시 도망칠 수 있다."
    zh_simp: "一定能从野生宝可梦\n那儿逃走。"
    zh_trad: "一定能從野生寶可夢\n那裡逃走。"
sand_force:
  names:
    jp_kana: すなのちから
    jp_kanji: すなのちから
    en: Sand Force
    fr: Force Sable
    it: Silicoforza
    de: Sandgewalt
    es: Poder Arena
    ko: 모래의힘
    zh_simp: 沙之力
    zh_trad: 沙之力
  descriptions:
    jp_kana: "てんきが　すなあらしの　とき\nいわタイプと　じめんタイプと\nはがねタイプの　いりょくが　あがる。"
    jp_kanji: "天気が　すなあらしの　とき\nいわタイプと　じめんタイプと\nはがねタイプの　威力が　上がる。"
    en: "Boosts the power of Rock-, Ground-, and Steel-type\nmoves in a sandstorm."
    fr: "Augmente la puissance des capacités de types Roche,\nSol et Acier en cas de tempête de sable."
    it: "Potenzia le mosse di tipo Roccia, Terra e Acciaio\ndurante le tempeste di sabbia."
    de: "Erhöht in Sandstürmen die Stärke von Gesteins-,\nBoden- und Stahl-Attacken."
    es: "Potencia los movimientos de tipo Tierra, Acero y Roca\ndurante las tormentas de arena."
    ko: "날씨가 모래바람일 때\n바위타입과 땅타입,\n강철타입 기술의 위력이 올라간다."
    zh_simp: "沙暴天气时，\n岩石属性、地面属性\n和钢属性的招式威力会提高。"
    zh_trad: "天氣為沙暴時，\n岩石屬性、地面屬性\n和鋼屬性招式的威力會提高。"
sand_rush:
  names:
    jp_kana: すなかき
    jp_kanji: すなかき
    en: Sand Rush
    fr: Baigne Sable
    it: Remasabbia
    de: Sandscharrer
    es: Ímpetu Arena
    ko: 모래헤치기
    zh_simp: 拨沙
    zh_trad: 撥沙
  descriptions:
    jp_kana: "てんきが　すなあらし　のとき\nすばやさが　あがる。"
    jp_kanji: "天気が　すなあらし　のとき\n素早さが　上がる。"
    en: Boosts the Pokémon’s Speed stat in a sandstorm.
    fr: Augmente la Vitesse lors des tempêtes de sable.
    it: Se c’è una tempesta di sabbia, la Velocità aumenta.
    de: Erhöht in Sandstürmen die Initiative.
    es: Aumenta su Velocidad durante las tormentas de arena.
    ko: "날씨가 모래바람일 때\n스피드가 올라간다."
    zh_simp: "沙暴天气时，\n速度会提高。"
    zh_trad: "天氣為沙暴時，\n速度會提高。"
sand_spit:
  names:
    jp_kana: すなはき
    jp_kanji: すなはき
    en: Sand Spit
    fr: Expul’Sable
    it: Sputasabbia
    de: Sandspeier
    es: Expulsarena
    ko: 모래뿜기
    zh_simp: 吐沙
    zh_trad: 吐沙
  descriptions:
    jp_kana: "こうげきを　うけると\nすなあらしを　おこす。"
    jp_kanji: "攻撃を　受けると\n砂あらしを　起こす。"
    en: "The Pokémon creates a sandstorm when it’s hit by\nan attack."
    fr: "Le Pokémon déclenche une tempête de sable\nquand il subit une attaque."
    it: "Quando il Pokémon viene colpito da un attacco,\nscatena una tempesta di sabbia."
    de: "Löst einen Sandsturm aus, wenn das Pokémon von einer\nAttacke erfasst wird."
    es: Provoca una tormenta de arena al recibir un ataque.
    ko: "공격을 받으면\n모래바람을 일으킨다."
    zh_simp: "受到攻击时，\n会刮起沙暴。"
    zh_trad: "受到攻擊時，\n會刮起沙暴。"
sand_stream:
  names:
    jp_kana: すなおこし
    jp_kanji: すなおこし
    en: Sand Stream
    fr: Sable Volant
    it: Sabbiafiume
    de: Sandsturm
    es: Chorro Arena
    ko: 모래날림
    zh_simp: 扬沙
    zh_trad: 揚沙
  descriptions:
    jp_kana: "とうじょう　したとき\nてんきを　すなあらしに　する。"
    jp_kanji: "登場　したとき\n天気を　砂あらしにする。"
    en: "The Pokémon summons a sandstorm when it enters\na battle."
    fr: "Le Pokémon invoque une tempête de sable\nquand il entre au combat."
    it: "Quando il Pokémon entra in campo, scatena\nuna tempesta di sabbia."
    de: Erzeugt bei Kampfantritt Sandstürme.
    es: Crea una tormenta de arena al entrar en combate.
    ko: "등장했을 때\n날씨를 모래바람으로 만든다."
    zh_simp: "出场时，\n会把天气变为沙暴。"
    zh_trad: "出場時，\n會把天氣變為沙暴。"
sand_veil:
  names:
    jp_kana: すながくれ
    jp_kanji: すながくれ
    en: Sand Veil
    fr: Voile Sable
    it: Sabbiavelo
    de: Sandschleier
    es: Velo Arena
    ko: 모래숨기
    zh_simp: 沙隐
    zh_trad: 沙隱
  descriptions:
    jp_kana: "すなあらしの　とき\nかいひりつが　あがる。"
    jp_kanji: "砂あらしの　とき\n回避率が　上がる。"
    en: Boosts the Pokémon’s evasiveness in a sandstorm.
    fr: "Augmente l’Esquive du Pokémon lors des tempêtes\nde sable."
    it: L’elusione aumenta durante le tempeste di sabbia.
    de: Erhöht in Sandstürmen den Ausweichwert.
    es: Aumenta su Evasión durante las tormentas de arena.
    ko: "모래바람일 때\n회피율이 올라간다."
    zh_simp: "在沙暴的时候，\n闪避率会提高。"
    zh_trad: "在沙暴中\n閃避率會提高。"
sap_sipper:
  names:
    jp_kana: そうしょく
    jp_kanji: そうしょく
    en: Sap Sipper
    fr: Herbivore
    it: Mangiaerba
    de: Vegetarier
    es: Herbívoro
    ko: 초식
    zh_simp: 食草
    zh_trad: 食草
  descriptions:
    jp_kana: "くさタイプの　わざを　うけると\nダメージを　うけずに\nこうげきが　あがる。"
    jp_kanji: "くさタイプの　技を　受けると\nダメージを　受けずに\n攻撃が　上がる。"
    en: "Boosts the Attack stat if hit by a Grass-type move\ninstead of taking damage."
    fr: "Annule les attaques de type Plante subies\npar le Pokémon et augmente son Attaque."
    it: "Se il Pokémon viene colpito da una mossa di tipo Erba,\nla neutralizza e aumenta il proprio Attacco."
    de: "Wird es von einer Pflanzen-Attacke getroffen, erleidet\nes keinerlei Schaden und sein Angriff steigt."
    es: "Neutraliza los movimientos de tipo Planta y sube su\nAtaque."
    ko: "풀타입 기술로 공격받으면\n데미지를 입지 않고\n공격이 올라간다."
    zh_simp: "受到草属性的招式攻击时，\n不会受到伤害，而是攻击会提高。"
    zh_trad: "受到草屬性的招式攻擊時，\n不但不會受到傷害，反而攻擊會提高。"
schooling:
  names:
    jp_kana: ぎょぐん
    jp_kanji: ぎょぐん
    en: Schooling
    fr: Banc
    it: Banco
    de: Fischschwarm
    es: Banco
    ko: 어군
    zh_simp: 鱼群
    zh_trad: 魚群
  descriptions:
    jp_kana: "ＨＰが　おおいときは　むれて　つよくなる。\nＨＰの　のこりが　すくなくなると\nむれは　ちりぢりに　なってしまう。"
    jp_kanji: "ＨＰが　多いときは　群れて　強くなる。\nＨＰの　残りが　少なくなると\n群れは　散り散りに　なってしまう。"
    en: "When it has a lot of HP, the Pokémon forms a\npowerful school. It stops schooling when its HP\nis low."
    fr: "Le Pokémon se rassemble avec ses congénères\nquand ses PV sont élevés. Plus ses PV baissent,\nplus le banc s’amenuise."
    it: "Quando ha molti PS, il Pokémon forma un banco\ncon i propri simili e si rafforza.\nQuando ne ha pochi, il banco si disperde."
    de: "Verfügt es über einen hohen KP-Wert, wird es zu einem\nSchwarm und gewinnt an Stärke. Ist der KP-Wert niedrig,\nlöst sich der Schwarm wieder auf."
    es: "Forma bancos con sus congéneres cuando tiene muchos\nPS, lo cual le otorga más fuerza. Cuando le quedan\npocos PS, el banco se dispersa."
    ko: "HP가 많을 때 무리지어 강해진다.\nHP가 얼마 남지 않으면\n무리는 뿔뿔이 흩어진다."
    zh_simp: "ＨＰ多的时候会聚起来变强。\nＨＰ剩余量变少时，\n群体会分崩离析。"
    zh_trad: "ＨＰ多的時候會聚起來變強。\nＨＰ剩餘量變少時，\n群體會分崩離析。"
scrappy:
  names:
    jp_kana: きもったま
    jp_kanji: きもったま
    en: Scrappy
    fr: Querelleur
    it: Nervisaldi
    de: Rauflust
    es: Intrépido
    ko: 배짱
    zh_simp: 胆量
    zh_trad: 膽量
  descriptions:
    jp_kana: "ゴーストタイプの　ポケモンに\nノーマルタイプと　かくとうタイプの\nわざを　あてることが　できる。"
    jp_kanji: "ゴーストタイプの　ポケモンに\nノーマルタイプと　かくとうタイプの\n技を　当てることが　できる。"
    en: "The Pokémon can hit Ghost-type Pokémon with\nNormal- and Fighting-type moves."
    fr: "Permet aux capacités de type Normal ou Combat\ndu Pokémon de toucher les Pokémon de type Spectre."
    it: "Permette di colpire Pokémon di tipo Spettro\ncon mosse di tipo Normale e Lotta."
    de: "Bewirkt, dass Normal- und Kampf-Attacken auch\nPokémon vom Typ Geist treffen können."
    es: "Puede alcanzar a Pokémon de tipo Fantasma con\nmovimientos de tipo Normal o Lucha."
    ko: "고스트타입 포켓몬에게\n노말타입과 격투타입의\n기술을 맞게 한다."
    zh_simp: "一般属性和格斗属性的招式\n可以击中幽灵属性的宝可梦。"
    zh_trad: "一般屬性和格鬥屬性的招式\n可擊中幽靈屬性的寶可夢。"
screen_cleaner:
  names:
    jp_kana: バリアフリー
    jp_kanji: バリアフリー
    en: Screen Cleaner
    fr: Brise-Barrière
    it: Annullabarriere
    de: Hemmungslos
    es: Antibarrera
    ko: 배리어프리
    zh_simp: 除障
    zh_trad: 除障
  descriptions:
    jp_kana: "とうじょう　したときに　てきと　みかたの\nひかりのかべ　リフレクター\nオーロラベールの　こうかが　きえる。"
    jp_kanji: "登場　したときに　敵と　味方の\nひかりのかべ　リフレクター\nオーロラベールの　効果が　消える。"
    en: "When the Pokémon enters a battle, the effects of\nLight Screen, Reflect, and Aurora Veil are nullified for\nboth opposing and ally Pokémon."
    fr: "Quand le Pokémon entre au combat, les effets\nde Mur Lumière, Protection et Voile Aurore\ndisparaissent pour les alliés comme pour les ennemis."
    it: "Quando il Pokémon entra in campo, annulla l’effetto\ndi Schermoluce, Riflesso e Velaurora sia per i nemici\nche per gli alleati."
    de: "Hebt bei Kampfantritt die Wirkung von Lichtschild,\nReflektor und Auroraschleier auf Mitstreiter- und\nGegnerseite auf."
    es: "Anula los efectos de Pantalla de Luz, Reflejo y Velo\nAurora tanto de rivales como de aliados al entrar en\ncombate."
    ko: "등장했을 때 상대와 같은 편의\n빛의장막, 리플렉터, 오로라베일의\n효과가 사라진다."
    zh_simp: "出场时，敌方和我方的光墙、\n反射壁和极光幕的效果会消失。"
    zh_trad: "出場時，敵方和我方的\n光牆、反射壁和極光幕的效果會消失。"
serene_grace:
  names:
    jp_kana: てんのめぐみ
    jp_kanji: てんのめぐみ
    en: Serene Grace
    fr: Sérénité
    it: Leggiadro
    de: Edelmut
    es: Dicha
    ko: 하늘의은총
    zh_simp: 天恩
    zh_trad: 天恩
  descriptions:
    jp_kana: "てんのめぐみの　おかげで\nわざの　ついかこうかが　でやすい。"
    jp_kanji: "天の恵みの　おかげで\n技の　追加効果が　でやすい。"
    en: "Boosts the likelihood of additional effects occurring\nwhen attacking."
    fr: Augmente les chances d’infliger des effets additionnels.
    it: Rende più probabili gli effetti aggiuntivi delle mosse.
    de: "Erhöht die Wahrscheinlichkeit, dass Zusatzeffekte von\nAttacken auftreten."
    es: "Aumenta la probabilidad de que los movimientos\ncausen efectos secundarios."
    ko: "하늘의 은총 덕분에\n기술의 추가 효과가 나오기 쉽다."
    zh_simp: "托天恩的福，\n招式的追加效果容易出现。"
    zh_trad: "受到上天保佑，\n容易出現招式的追加效果。"
shadow_shield:
  names:
    jp_kana: ファントムガード
    jp_kanji: ファントムガード
    en: Shadow Shield
    fr: Spectro-Bouclier
    it: Spettroguardia
    de: Phantomschutz
    es: Guardia Espectro
    ko: 스펙터가드
    zh_simp: 幻影防守
    zh_trad: 幻影防守
  descriptions:
    jp_kana: "ＨＰが　まんたんの　ときに\nうける　ダメージが　すくなくなる。"
    jp_kanji: "ＨＰが　満タンの　ときに\n受ける　ダメージが　少なくなる。"
    en: "Reduces the amount of damage the Pokémon takes\nwhile its HP is full."
    fr: "Le Pokémon reçoit moins de dégâts quand ses PV\nsont au maximum."
    it: Se i PS sono al massimo, riduce il danno subito.
    de: Verringert den erlittenen Schaden bei vollen KP.
    es: Reduce el daño que sufre si sus PS están al máximo.
    ko: "HP가 꽉 찼을 때\n받는 데미지가 줄어든다."
    zh_simp: "ＨＰ全满时，\n受到的伤害会变少。"
    zh_trad: "ＨＰ全滿時，\n受到的傷害會變少。"
shadow_tag:
  names:
    jp_kana: かげふみ
    jp_kanji: かげふみ
    en: Shadow Tag
    fr: Marque Ombre
    it: Pedinombra
    de: Wegsperre
    es: Sombra Trampa
    ko: 그림자밟기
    zh_simp: 踩影
    zh_trad: 踩影
  descriptions:
    jp_kana: "あいての　かげを　ふみ\nにげたり　こうたい　できなくする。"
    jp_kanji: "相手の　影を　踏み\n逃げたり　交代　できなくする。"
    en: "This Pokémon steps on the opposing Pokémon’s\nshadow to prevent it from escaping."
    fr: Empêche les Pokémon ennemis de quitter le combat.
    it: "Il Pokémon calpesta l’ombra del nemico impedendogli\nla fuga o la sostituzione."
    de: "Hindert Gegner an der Flucht beziehungsweise am\nAuswechseln, indem es ihnen den Weg versperrt."
    es: Impide que el enemigo huya o sea cambiado por otro.
    ko: "상대의 그림자를 밟아\n도망치거나 교체할 수 없게 한다."
    zh_simp: "踩住对手的影子\n使其无法逃走或替换。"
    zh_trad: "踩住對手的影子\n使其無法逃走或替換。"
shed_skin:
  names:
    jp_kana: だっぴ
    jp_kanji: だっぴ
    en: Shed Skin
    fr: Mue
    it: Muta
    de: Expidermis
    es: Mudar
    ko: 탈피
    zh_simp: 蜕皮
    zh_trad: 蛻皮
  descriptions:
    jp_kana: "からだの　かわを　ぬぎすてることで\nじょうたい　いじょうを\nなおすことが　ある。"
    jp_kanji: "体の　皮を　脱ぎ捨てることで\n状態異常を\n治すことが　ある。"
    en: "The Pokémon may heal its own status conditions\nby shedding its skin."
    fr: "Le Pokémon soigne parfois ses altérations de statut\nen muant."
    it: "Il Pokémon può guarire dai problemi di stato\nfacendo la muta completa della pelle."
    de: "Das Pokémon befreit sich eventuell von\nStatusproblemen, indem es seine Haut abstreift."
    es: Puede curar sus problemas de estado al mudar la piel.
    ko: "몸의 껍질을 벗어 던져\n상태 이상을\n회복할 때가 있다."
    zh_simp: "通过蜕去身上的皮，\n有时会治愈异常状态。"
    zh_trad: "透過蛻去身上的皮，\n有時會治癒異常狀態。"
sheer_force:
  names:
    jp_kana: ちからずく
    jp_kanji: ちからずく
    en: Sheer Force
    fr: Sans Limite
    it: Forzabruta
    de: Rohe Gewalt
    es: Potencia Bruta
    ko: 우격다짐
    zh_simp: 强行
    zh_trad: 強行
  descriptions:
    jp_kana: "わざの　ついか　こうかは　なくなるが\nそのぶん　たかい　いりょくで\nわざを　だすことが　できる。"
    jp_kanji: "技の　追加効果は　なくなるが\nそのぶん　高い　威力で\n技を　出すことが　できる。"
    en: "Removes additional effects to increase the power\nof moves when attacking."
    fr: "Les capacités ayant un effet additionnel le perdent,\nmais leur puissance augmente."
    it: "Aumenta la potenza delle mosse, ma ne annulla\ngli effetti aggiuntivi."
    de: "Erhöht die Stärke von Attacken, aber hebt dafür ihre\nZusatzeffekte auf."
    es: "Sube la potencia de sus movimientos en detrimento\nde los efectos secundarios, que se ven anulados."
    ko: "기술의 추가 효과가 없어지지만\n그만큼 높은 위력으로\n기술을 사용할 수 있다."
    zh_simp: "招式的追加效果消失，\n但因此能以更高的威力使出招式。"
    zh_trad: "招式會失去追加效果，\n但可以用更高的威力使出招式。"
shell_armor:
  names:
    jp_kana: シェルアーマー
    jp_kanji: シェルアーマー
    en: Shell Armor
    fr: Coque Armure
    it: Guscioscudo
    de: Panzerhaut
    es: Caparazón
    ko: 조가비갑옷
    zh_simp: 硬壳盔甲
    zh_trad: 硬殼盔甲
  descriptions:
    jp_kana: "かたい　からに　まもられ\nあいての　こうげきが\nきゅうしょに　あたらない。"
    jp_kanji: "硬い　殻に　守られ\n相手の　攻撃が\n急所に　当たらない。"
    en: A hard shell protects the Pokémon from critical hits.
    fr: "Le Pokémon est protégé des coups critiques\npar sa carapace."
    it: "Il Pokémon è protetto da un guscio robusto\nche gli evita di subire brutti colpi."
    de: "Wehrt gegnerische Volltreffer mit einem harten\nPanzer ab."
    es: "La robusta coraza que lo protege bloquea los golpes\ncríticos."
    ko: "단단한 껍질의 보호를 받아\n상대의 공격이\n급소에 맞지 않는다."
    zh_simp: "被坚硬的壳保护着，\n对手的攻击不会击中要害。"
    zh_trad: "被堅硬的殼保護著，\n對手的攻擊不會擊中要害。"
shield_dust:
  names:
    jp_kana: りんぷん
    jp_kanji: りんぷん
    en: Shield Dust
    fr: Écran Poudre
    it: Polvoscudo
    de: Puderabwehr
    es: Polvo Escudo
    ko: 인분
    zh_simp: 鳞粉
    zh_trad: 鱗粉
  descriptions:
    jp_kana: "りんぷんに　まもられて\nわざの　ついかこうかを　うけなくなる。"
    jp_kanji: "りんぷんに　守られて\n技の　追加効果を　受けなくなる。"
    en: "This Pokémon’s dust blocks the additional effects of\nattacks taken."
    fr: "Le Pokémon dispose d’un écran naturel qui le protège\ndes effets additionnels des attaques ennemies."
    it: "Il Pokémon è protetto da uno strato di scaglie\nche annulla gli effetti aggiuntivi delle mosse subite."
    de: "Blockiert durch Puder die Zusatzeffekte gegnerischer\nAngriffe."
    es: "El polvo de escamas que lo envuelve lo protege de\nlos efectos secundarios de los ataques recibidos."
    ko: "인분에 보호받아\n기술의 추가 효과를 받지 않게 된다."
    zh_simp: "被鳞粉守护着，\n不会受到招式的追加效果影响。"
    zh_trad: "被鱗粉守護著，\n不會受到招式的追加效果影響。"
shields_down:
  names:
    jp_kana: リミットシールド
    jp_kanji: リミットシールド
    en: Shields Down
    fr: Bouclier-Carcan
    it: Scudosoglia
    de: Limitschild
    es: Escudo Limitado
    ko: 리밋실드
    zh_simp: 界限盾壳
    zh_trad: 界限盾殼
  descriptions:
    jp_kana: "ＨＰが　はんぶんに　なると\nからが　こわれて\nこうげきてきに　なる。"
    jp_kanji: "ＨＰが　半分に　なると\n殻が　壊れて\n攻撃的に　なる。"
    en: "When its HP becomes half or less, the Pokémon’s\nshell breaks and it becomes aggressive."
    fr: "Lorsque le Pokémon perd la moitié de ses PV,\nson enveloppe se brise, mais son Attaque\net son Attaque Spéciale augmentent."
    it: "Se i PS scendono a metà o meno, il guscio\nsi rompe e il Pokémon si prepara all’offensiva."
    de: "Fallen seine KP auf die Hälfte des Maximalwerts oder\nweniger, zerbricht die Panzerung des Pokémon und es\nwird aggressiver."
    es: "Rompe su coraza cuando sus PS se ven reducidos a\nla mitad y adopta una forma ofensiva."
    ko: "HP가 절반이 되면\n껍질이 깨져\n공격적으로 된다."
    zh_simp: "ＨＰ变为一半时，\n壳会坏掉，变得有攻击性。"
    zh_trad: "ＨＰ變為一半時，\n殼會壞掉，變得更有攻擊性。"
simple:
  names:
    jp_kana: たんじゅん
    jp_kanji: たんじゅん
    en: Simple
    fr: Simple
    it: Disinvoltura
    de: Wankelmut
    es: Simple
    ko: 단순
    zh_simp: 单纯
    zh_trad: 單純
  descriptions:
    jp_kana: "のうりょく　へんかが\nいつもの　２ばいに　なる。"
    jp_kanji: "能力　変化が\nいつもの　２倍に　なる。"
    en: The stat changes the Pokémon receives are doubled.
    fr: "Les variations de stats sont deux fois plus importantes\npour le Pokémon."
    it: Raddoppia le modifiche alle statistiche.
    de: Verdoppelt die Wirkung eigener Statusveränderungen.
    es: Duplica los cambios en las características.
    ko: "능력 변화가\n평소의 2배가 된다."
    zh_simp: 能力变化会变为平时的２倍。
    zh_trad: 能力變化會變為平時的２倍。
skill_link:
  names:
    jp_kana: スキルリンク
    jp_kanji: スキルリンク
    en: Skill Link
    fr: Multi-Coups
    it: Abillegame
    de: Wertelink
    es: Encadenado
    ko: 스킬링크
    zh_simp: 连续攻击
    zh_trad: 連續攻擊
  descriptions:
    jp_kana: "れんぞくわざを　つかうと　いつも\nさいこう　かいすう　だすことが　できる。"
    jp_kanji: "連続技を　使うと　いつも\n最高回数　出すことが　できる。"
    en: "Maximizes the number of times multistrike\nmoves hit."
    fr: "Les capacités pouvant frapper plusieurs fois frappent\ntoujours le nombre maximal de coups."
    it: "Le mosse multicolpo mandano a segno sempre\nil massimo dei colpi possibili."
    de: "Landet mit Serien-Attacken immer die maximale Anzahl\nan Treffern."
    es: "Ejecuta siempre los movimientos múltiples con el\nnúmero máximo de golpes."
    ko: "연속 기술을 사용하면 항상\n최고 횟수로 사용할 수 있다."
    zh_simp: "如果使用连续招式，\n总是能使出最高次数。"
    zh_trad: "使用連續招式時，\n每回都能以最多次數進行攻擊。"
slow_start:
  names:
    jp_kana: スロースタート
    jp_kanji: スロースタート
    en: Slow Start
    fr: Début Calme
    it: Lentoinizio
    de: Saumselig
    es: Inicio Lento
    ko: 슬로스타트
    zh_simp: 慢启动
    zh_trad: 慢啟動
  descriptions:
    jp_kana: "５ターンの　あいだ\nこうげきと　すばやさが\nはんぶんに　なる。"
    jp_kanji: "５ターンの　あいだ\n攻撃と　素早さが\n半分に　なる。"
    en: "For five turns, the Pokémon’s Attack and Speed\nstats are halved."
    fr: "Divise la Vitesse et l’Attaque du Pokémon par deux\npendant les cinq premiers tours du combat."
    it: Dimezza per cinque turni l’Attacco e la Velocità.
    de: "Halbiert fünf Runden lang den Angriffs-Wert und die\nInitiative des Pokémon."
    es: "Baja a la mitad su Ataque y su Velocidad durante cinco\nturnos."
    ko: "5턴 동안\n공격과 스피드가\n절반이 된다."
    zh_simp: "在５回合内，\n攻击和速度减半。"
    zh_trad: "在５回合內，\n攻擊和速度會減半。"
slush_rush:
  names:
    jp_kana: ゆきかき
    jp_kanji: ゆきかき
    en: Slush Rush
    fr: Chasse-Neige
    it: Spalaneve
    de: Schneescharrer
    es: Quitanieves
    ko: 눈치우기
    zh_simp: 拨雪
    zh_trad: 撥雪
  descriptions:
    jp_kana: "てんきが　あられ　のとき\nすばやさが　あがる。"
    jp_kanji: "天気が　あられ　のとき\n素早さが　上がる。"
    en: Boosts the Pokémon’s Speed stat in a hailstorm.
    fr: Augmente la Vitesse du Pokémon quand il grêle.
    it: Se grandina, la Velocità aumenta.
    de: Erhöht bei Hagel die Initiative.
    es: Aumenta su Velocidad si está granizando.
    ko: "날씨가 싸라기눈일 때\n스피드가 올라간다."
    zh_simp: "冰雹天气时，\n速度会提高。"
    zh_trad: "天氣為冰雹時，\n速度會提高。"
sniper:
  names:
    jp_kana: スナイパー
    jp_kanji: スナイパー
    en: Sniper
    fr: Sniper
    it: Cecchino
    de: Superschütze
    es: Francotirador
    ko: 스나이퍼
    zh_simp: 狙击手
    zh_trad: 狙擊手
  descriptions:
    jp_kana: "こうげきを　きゅうしょに　あてると\nいりょくが　さらに　あがる。"
    jp_kanji: "攻撃を　急所に　当てると\n威力が　さらに　上がる。"
    en: "Powers up moves if they become critical hits\nwhen attacking."
    fr: "Lorsque le Pokémon porte un coup critique, les dégâts\ninfligés augmentent encore plus que d’habitude."
    it: Aumenta ulteriormente i danni inflitti dai brutti colpi.
    de: "Erhöht bei Volltreffern die Stärke der Attacke noch\nweiter."
    es: "Potencia los golpes críticos que asesta aún más de lo\nnormal."
    ko: "공격을 급소에 맞혔을 때\n위력이 더욱 올라간다."
    zh_simp: "击中要害时，\n威力会变得更强。"
    zh_trad: "擊中要害時，\n威力會進一步提高。"
snow_cloak:
  names:
    jp_kana: ゆきがくれ
    jp_kanji: ゆきがくれ
    en: Snow Cloak
    fr: Rideau Neige
    it: Mantelneve
    de: Schneemantel
    es: Manto Níveo
    ko: 눈숨기
    zh_simp: 雪隐
    zh_trad: 雪隱
  descriptions:
    jp_kana: "てんきが　あられのとき\nかいひりつが　あがる。"
    jp_kanji: "天気が　あられのとき\n回避率が　上がる。"
    en: Boosts evasiveness in a hailstorm.
    fr: "Augmente l’Esquive du Pokémon durant les tempêtes\nde grêle."
    it: Se grandina, l’elusione aumenta.
    de: Erhöht bei Hagel den Ausweichwert.
    es: Sube la Evasión cuando graniza.
    ko: "날씨가 싸라기눈일 때\n회피율이 올라간다."
    zh_simp: "冰雹天气时，\n闪避率会提高。"
    zh_trad: "天氣為冰雹時，\n閃避率會提高。"
snow_warning:
  names:
    jp_kana: ゆきふらし
    jp_kanji: ゆきふらし
    en: Snow Warning
    fr: Alerte Neige
    it: Scendineve
    de: Hagelalarm
    es: Nevada
    ko: 눈퍼뜨리기
    zh_simp: 降雪
    zh_trad: 降雪
  descriptions:
    jp_kana: "とうじょう　したときに\nてんきを　あられに　する。"
    jp_kanji: "登場　したときに\n天気を　あられに　する。"
    en: "The Pokémon summons a hailstorm when it enters\na battle."
    fr: "Déclenche une tempête de grêle quand le Pokémon\nentre au combat."
    it: "Quando il Pokémon entra in campo, provoca\nuna grandinata."
    de: Löst bei Kampfantritt Hagel aus.
    es: Invoca una tormenta de granizo al entrar en combate.
    ko: "등장했을 때\n날씨를 싸라기눈으로 만든다."
    zh_simp: "出场时，\n会将天气变为冰雹。"
    zh_trad: "出場時，\n會將天氣變為冰雹。"
solar_power:
  names:
    jp_kana: サンパワー
    jp_kanji: サンパワー
    en: Solar Power
    fr: Force Soleil
    it: Solarpotere
    de: Solarkraft
    es: Poder Solar
    ko: 선파워
    zh_simp: 太阳之力
    zh_trad: 太陽之力
  descriptions:
    jp_kana: "てんきが　はれると\nとくこうが　あがるが\nまいターン　ＨＰが　へる。"
    jp_kanji: "天気が　晴れると\n特攻が　上がるが\n毎ターン　ＨＰが　減る。"
    en: "Boosts the Sp. Atk stat in harsh sunlight, but HP\ndecreases every turn."
    fr: "Quand le soleil brille, l’Attaque Spéciale du Pokémon\naugmente mais il perd des PV à chaque tour."
    it: "Se la luce del sole è intensa, l’Attacco Speciale\naumenta, ma il Pokémon perde PS a ogni turno."
    de: "Führt bei Sonnenschein in jeder Runde zu KP-Verlusten,\nerhöht aber den Spezial-Angriff."
    es: "Si hace sol, aumenta su Ataque Especial, pero pierde PS\nen cada turno."
    ko: "날씨가 맑으면\n특수공격이 올라가지만\n매 턴 HP가 줄어든다."
    zh_simp: "晴朗天气时，\n特攻会提高，\n而每回合ＨＰ会减少。"
    zh_trad: "天氣為晴朗時特攻會提高，\n但每回合ＨＰ會減少。"
solid_rock:
  names:
    jp_kana: ハードロック
    jp_kanji: ハードロック
    en: Solid Rock
    fr: Solide Roc
    it: Solidroccia
    de: Felskern
    es: Roca Sólida
    ko: 하드록
    zh_simp: 坚硬岩石
    zh_trad: 堅硬岩石
  descriptions:
    jp_kana: "こうかばつぐんに　なってしまう\nこうげきの　いりょくを\nよわめる　ことが　できる。"
    jp_kanji: "効果バツグンに　なってしまう\n攻撃の　威力を\n弱める　ことが　できる。"
    en: Reduces the power of supereffective attacks taken.
    fr: "Réduit les dégâts subis lorsque le Pokémon est touché\npar une capacité super efficace."
    it: Riduce i danni subiti dalle mosse superefficaci.
    de: "Reduziert die Stärke von sehr effektiven Attacken und\nverringert damit den Schaden, den das Pokémon durch\nsie erleidet."
    es: "Mitiga el daño que le infligen los movimientos\nsupereficaces."
    ko: "자신이 받는 효과가 굉장한\n공격의 위력을\n약하게 만든다."
    zh_simp: "受到效果绝佳的攻击时，\n可以减弱其威力。"
    zh_trad: "受到效果絕佳的攻擊時，\n可減弱其威力。"
soul_heart:
  names:
    jp_kana: ソウルハート
    jp_kanji: ソウルハート
    en: Soul-Heart
    fr: Animacœur
    it: Cuoreanima
    de: Seelenherz
    es: Coránima
    ko: 소울하트
    zh_simp: 魂心
    zh_trad: 魂心
  descriptions:
    jp_kana: "ポケモンが　ひんしに　なるたびに\nとくこうが　あがる。"
    jp_kanji: "ポケモンが　ひんしに　なるたびに\n特攻が　上がる。"
    en: Boosts its Sp. Atk stat every time a Pokémon faints.
    fr: "Augmente l’Attaque Spéciale du Pokémon\nlorsqu’un autre Pokémon est mis K.O."
    it: "Aumenta l’Attacco Speciale ogni volta che\nun Pokémon va KO."
    de: "Erhöht jedes Mal, wenn ein Pokémon besiegt wird,\nden eigenen Spezial-Angriff."
    es: "Aumenta su Ataque Especial cada vez que un Pokémon\ncae debilitado."
    ko: "포켓몬이 기절할 때마다\n특수공격이 올라간다."
    zh_simp: "宝可梦每次变为昏厥状态时，\n特攻会提高。"
    zh_trad: "每當場上有寶可夢\n陷入瀕死狀態時，\n特攻就會提高。"
soundproof:
  names:
    jp_kana: ぼうおん
    jp_kanji: ぼうおん
    en: Soundproof
    fr: Anti-Bruit
    it: Antisuono
    de: Lärmschutz
    es: Insonorizar
    ko: 방음
    zh_simp: 隔音
    zh_trad: 隔音
  descriptions:
    jp_kana: "おとを　しゃだん　することに　よって\nおとの　こうげきを　うけない。"
    jp_kanji: "音を　遮断　することに　よって\n音の　攻撃を　受けない。"
    en: "Soundproofing gives the Pokémon full\nimmunity to all sound-based moves."
    fr: Protège le Pokémon de toutes les capacités sonores.
    it: "Il Pokémon è dotato di una sorta di isolamento\nacustico che lo rende immune alle mosse basate\nsul suono."
    de: "Bietet durch Schalldämmung volle Immunität gegen\nalle Lärm-Attacken."
    es: "Su aislamiento acústico lo protege de movimientos\nque usan sonido."
    ko: "소리를 차단하여\n소리 공격을 받지 않는다."
    zh_simp: "通过屏蔽声音，\n不受到声音招式的攻击。"
    zh_trad: "透過遮蔽聲音，\n不受到聲音招式的攻擊。"
speed_boost:
  names:
    jp_kana: かそく
    jp_kanji: かそく
    en: Speed Boost
    fr: Turbo
    it: Acceleratore
    de: Temposchub
    es: Impulso
    ko: 가속
    zh_simp: 加速
    zh_trad: 加速
  descriptions:
    jp_kana: まいターン　すばやさが　あがる。
    jp_kanji: 毎ターン　素早さが　上がる。
    en: Its Speed stat is boosted every turn.
    fr: La Vitesse du Pokémon augmente à chaque tour.
    it: La Velocità aumenta a ogni turno.
    de: Erhöht in jeder Runde die Initiative.
    es: Aumenta su Velocidad en cada turno.
    ko: 매 턴 스피드가 올라간다.
    zh_simp: 每一回合速度会变快。
    zh_trad: 每一回合速度會變快。
stakeout:
  names:
    jp_kana: はりこみ
    jp_kanji: はりこみ
    en: Stakeout
    fr: Filature
    it: Sorveglianza
    de: Beschattung
    es: Vigilante
    ko: 잠복
    zh_simp: 蹲守
    zh_trad: 監視
  descriptions:
    jp_kana: "こうたいで　でてきた　あいてに\n２ばいの　ダメージで　こうげき　できる。"
    jp_kanji: "交代で　出てきた　相手に\n２倍の　ダメージで　攻撃　できる。"
    en: "Doubles the damage dealt to the target’s\nreplacement if the target switches out."
    fr: "Lorsque le Pokémon attaque une cible qui vient d’entrer\nsur le terrain en remplacement d’un autre Pokémon,\nles dégâts infligés sont doublés."
    it: "Raddoppia i danni inflitti a un bersaglio che è\nappena entrato in campo per sostituire un altro\nPokémon."
    de: "Bewirkt bei Angriffen auf neu eingewechselte Ziele\ndoppelten Schaden."
    es: "Si el objetivo de su ataque es sustituido por otro,\nduplica el daño que infligirá."
    ko: "교체로 나온 상대에게\n2배 데미지로 공격할 수 있다."
    zh_simp: "可以对替换出场的对手\n以２倍的伤害进行攻击。"
    zh_trad: "可以向替換出場的對手\n以２倍的傷害進行攻擊。"
stall:
  names:
    jp_kana: あとだし
    jp_kanji: あとだし
    en: Stall
    fr: Frein
    it: Rallentatore
    de: Zeitspiel
    es: Rezagado
    ko: 시간벌기
    zh_simp: 慢出
    zh_trad: 慢出
  descriptions:
    jp_kana: "わざを　だす　じゅんばんが\nかならず　さいごに　なる。"
    jp_kanji: "技を　出す　順番が\nかならず　最後に　なる。"
    en: The Pokémon moves after all other Pokémon do.
    fr: Le Pokémon utilise toujours sa capacité en dernier.
    it: Il Pokémon agisce sempre per ultimo.
    de: Handelt auch mit Initiative-Vorteil stets als Letztes.
    es: Ejecuta su movimiento tras todos los demás.
    ko: "기술을 사용하는 순서가\n반드시 마지막이 된다."
    zh_simp: "使出招式的顺序\n必定会变为最后。"
    zh_trad: "使出招式的順序\n必定會變為最後。"
stalwart:
  names:
    jp_kana: すじがねいり
    jp_kanji: すじがねいり
    en: Stalwart
    fr: Nerfs d’Acier
    it: Volontà di Ferro
    de: Stahlrückgrat
    es: Acérrimo
    ko: 굳건한신념
    zh_simp: 坚毅
    zh_trad: 堅毅
  descriptions:
    jp_kana: "あいての　わざを　ひきうける\nとくせいや　わざの\nえいきょうを　むし　できる。"
    jp_kanji: "相手の　技を　引き受ける\n特性や　技の\n影響を　無視　できる。"
    en: "Ignores the effects of opposing Pokémon’s Abilities and\nmoves that draw in moves."
    fr: "Permet d’ignorer l’effet des capacités ou des talents\nqui attirent les capacités."
    it: "Permette di ignorare gli effetti di mosse e abilità\nche attirano altre mosse."
    de: "Ignoriert die Effekte von Fähigkeiten und Attacken\nanderer Pokémon, die Attacken auf sich lenken."
    es: "Impide que el rival pueda atraer ataques hacia sí mismo\npor efecto de su habilidad o sus movimientos."
    ko: "상대의 기술을 끌어모으는\n특성이나 기술의\n영향을 받지 않는다."
    zh_simp: "能无视具有吸引\n对手招式效果的\n特性或招式的影响。"
    zh_trad: "能無視具有吸引\n對手招式效果的\n特性或招式的影響。"
stamina:
  names:
    jp_kana: じきゅうりょく
    jp_kanji: じきゅうりょく
    en: Stamina
    fr: Endurance
    it: Sopportazione
    de: Zähigkeit
    es: Firmeza
    ko: 지구력
    zh_simp: 持久力
    zh_trad: 持久力
  descriptions:
    jp_kana: "こうげきを　うけると\nぼうぎょが　あがる。"
    jp_kanji: "攻撃を　受けると\n防御が　上がる。"
    en: Boosts the Defense stat when hit by an attack.
    fr: "Augmente la Défense du Pokémon lorsqu’il subit\nune attaque."
    it: "Se il Pokémon subisce un attacco, la sua Difesa\naumenta."
    de: "Wird es von einer Attacke getroffen, steigt seine\nVerteidigung."
    es: Aumenta su Defensa al recibir un ataque.
    ko: "공격을 받으면\n방어가 올라간다."
    zh_simp: "受到攻击时，\n防御会提高。"
    zh_trad: "受到攻擊時，\n防禦會提高。"
stance_change:
  names:
    jp_kana: バトルスイッチ
    jp_kanji: バトルスイッチ
    en: Stance Change
    fr: Déclic Tactique
    it: Accendilotta
    de: Taktikwechsel
    es: Cambio Táctico
    ko: 배틀스위치
    zh_simp: 战斗切换
    zh_trad: 戰鬥切換
  descriptions:
    jp_kana: "こうげきわざを　だすと　ブレードフォルムに\nわざ　キングシールドを　だすと\nシールドフォルムに　へんかする。"
    jp_kanji: "攻撃技を　出すと　ブレードフォルムに\n技　キングシールドを　出すと\nシールドフォルムに　変化する。"
    en: "The Pokémon changes its form to Blade Forme when\nit uses an attack move and changes to Shield Forme\nwhen it uses King’s Shield."
    fr: "Le Pokémon prend la Forme Assaut lorsqu’il utilise\nune attaque, et la Forme Parade lorsqu’il utilise\nBouclier Royal."
    it: "Assume la Forma Spada se usa una mossa\nd’attacco e la Forma Scudo se usa Scudo Reale."
    de: "Setzt das Pokémon eine Offensiv-Attacke ein, nimmt\nes die Klingenform an. Setzt es danach die Attacke\nKönigsschild ein, nimmt es die Schildform an."
    es: "Adopta la Forma Filo al lanzar un ataque, o bien la\nForma Escudo si usa el movimiento Escudo Real."
    ko: "공격 기술을 쓰면 블레이드폼으로\n기술 킹실드를 쓰면\n실드폼으로 변한다."
    zh_simp: "如果使出攻击招式，会变为刀剑形态，\n如果使出招式“王者盾牌”，\n会变为盾牌形态。"
    zh_trad: "若使出攻擊招式，會變為刀劍形態，\n若使出招式「王者盾牌」，\n會變為盾牌形態。"
static:
  names:
    jp_kana: せいでんき
    jp_kanji: せいでんき
    en: Static
    fr: Statik
    it: Statico
    de: Statik
    es: Elec. Estática
    ko: 정전기
    zh_simp: 静电
    zh_trad: 靜電
  descriptions:
    jp_kana: "せいでんきを　からだに　まとい\nさわった　あいてを\nまひさせる　ことがある。"
    jp_kanji: "静電気を　体に　まとい\n触った　相手を\nまひさせる　ことがある。"
    en: "The Pokémon is charged with static electricity, so\ncontact with it may cause paralysis."
    fr: "Le Pokémon charge son corps en électricité statique,\net tout contact avec lui peut paralyser."
    it: "Il contatto fisico con il corpo percorso\ndall’elettricità statica del Pokémon può\ncausare paralisi."
    de: "Kann bei Berührung durch statisch aufgeladenen Körper\nparalysieren."
    es: "La electricidad estática que lo envuelve puede paralizar\nal mínimo contacto."
    ko: "정전기를 몸에 둘러\n자신에게 접촉한 상대를\n마비시킬 때가 있다."
    zh_simp: "身上带有静电，\n有时会让接触到的对手麻痹。"
    zh_trad: "身上帶有靜電，\n有時會令接觸到的對手麻痺。"
steadfast:
  names:
    jp_kana: ふくつのこころ
    jp_kanji: ふくつのこころ
    en: Steadfast
    fr: Impassible
    it: Cuordeciso
    de: Felsenfest
    es: Impasible
    ko: 불굴의마음
    zh_simp: 不屈之心
    zh_trad: 不屈之心
  descriptions:
    jp_kana: "ひるむ　たびに\nふくつのこころを　もやして\nすばやさが　あがる。"
    jp_kanji: "ひるむ　たびに\n不屈の心を　燃やして\n素早さが　上がる。"
    en: "The Pokémon’s determination boosts the Speed\nstat each time the Pokémon flinches."
    fr: Augmente la Vitesse du Pokémon quand il a peur.
    it: "Se il Pokémon tentenna, il suo animo indomito\nsi risveglia e la sua Velocità aumenta."
    de: "Sein eiserner Wille erhöht die Initiative, wann immer\ndas Pokémon zurückschreckt."
    es: "Cada vez que se amedrenta sube su Velocidad, debido\na su voluntad inquebrantable."
    ko: "풀죽을 때마다\n불굴의 마음을 불태워\n스피드가 올라간다."
    zh_simp: "每次畏缩时，\n不屈之心就会燃起，\n速度也会提高。"
    zh_trad: "每次畏縮時，\n不屈之心就會燃起，\n速度也會提高。"
steam_engine:
  names:
    jp_kana: じょうききかん
    jp_kanji: じょうききかん
    en: Steam Engine
    fr: Turbine
    it: Vapormacchina
    de: Dampfantrieb
    es: Combustible
    ko: 증기기관
    zh_simp: 蒸汽机
    zh_trad: 蒸汽機
  descriptions:
    jp_kana: "みずタイプ　ほのおタイプの\nわざを　うけると\nすばやさが　ぐぐーんと　あがる。"
    jp_kanji: "みずタイプ　ほのおタイプの\n技を　受けると\n素早さが　ぐぐーんと　上がる。"
    en: "Boosts the Pokémon’s Speed stat drastically if hit by a\nFire- or Water-type move."
    fr: "Lorsque le Pokémon est touché par des capacités\nde type Eau ou Feu, sa Vitesse augmente énormément."
    it: "Se il Pokémon viene colpito da una mossa di tipo Acqua\no Fuoco, la sua Velocità aumenta moltissimo."
    de: "Wird es von einer Wasser- oder Feuer-Attacke\ngetroffen, steigt seine Initiative drastisch."
    es: "Si le alcanza un movimiento de tipo Fuego o Agua,\nle sube muchísimo la Velocidad."
    ko: "물타입이나 불꽃타입\n기술로 공격받으면\n스피드가 매우 크게 올라간다."
    zh_simp: "受到水属性或\n火属性的招式攻击时，\n速度会巨幅提高。"
    zh_trad: "受到水屬性或\n火屬性招式攻擊時，\n速度會極大幅提高。"
steelworker:
  names:
    jp_kana: はがねつかい
    jp_kanji: はがねつかい
    en: Steelworker
    fr: Expert Acier
    it: Tempracciaio
    de: Stahlprofi
    es: Acero Templado
    ko: 강철술사
    zh_simp: 钢能力者
    zh_trad: 鋼能力者
  descriptions:
    jp_kana: "はがねタイプの　わざの\nいりょくが　あがる。"
    jp_kanji: "はがねタイプの　技の\n威力が　上がる。"
    en: Powers up Steel-type moves.
    fr: Augmente la puissance des attaques de type Acier.
    it: Aumenta la potenza delle mosse di tipo Acciaio.
    de: Erhöht die Stärke von Stahl-Attacken.
    es: Potencia los movimientos de tipo Acero.
    ko: "강철타입 기술의\n위력이 올라간다."
    zh_simp: 钢属性的招式威力会提高。
    zh_trad: 鋼屬性的招式威力會提高。
steely_spirit:
  names:
    jp_kana: はがねのせいしん
    jp_kanji: はがねのせいしん
    en: Steely Spirit
    fr: Boost Acier
    it: Spiritoferreo
    de: Stählerner Wille
    es: Alma Acerada
    ko: 강철정신
    zh_simp: 钢之意志
    zh_trad: 鋼之意志
  descriptions:
    jp_kana: "みかたの　はがねタイプの\nこうげきの　いりょくが　あがる。"
    jp_kanji: "味方の　はがねタイプの\n攻撃の　威力が　あがる。"
    en: Powers up ally Pokémon’s Steel-type moves.
    fr: "Augmente la puissance d’Attaque des capacités\nde type Acier des Pokémon alliés."
    it: Potenzia gli attacchi di tipo Acciaio degli alleati.
    de: "Erhöht die Stärke von Stahl-Attacken auf\nMitstreiterseite."
    es: Potencia los movimientos de tipo Acero de los aliados.
    ko: "같은 편의 강철타입\n공격의 위력이 올라간다."
    zh_simp: "我方的钢属性\n攻击威力会提高。"
    zh_trad: "我方的鋼屬性\n攻擊威力會提高。"
stench:
  names:
    jp_kana: あくしゅう
    jp_kanji: あくしゅう
    en: Stench
    fr: Puanteur
    it: Tanfo
    de: Duftnote
    es: Hedor
    ko: 악취
    zh_simp: 恶臭
    zh_trad: 惡臭
  descriptions:
    jp_kana: "くさい　においを　はなつことによって\nこうげきした　ときに　あいてを\nひるませることが　ある。"
    jp_kanji: "臭い　においを　放つことによって\n攻撃した　ときに　相手を\nひるませることが　ある。"
    en: "By releasing stench when attacking, this Pokémon\nmay cause the target to flinch."
    fr: "Le Pokémon émet une odeur si nauséabonde\nqu’il peut effrayer sa cible."
    it: "A volte il cattivo odore emesso dal Pokémon\nfa tentennare i nemici quando attacca."
    de: "Lässt das Ziel beim Angriff eventuell durch Gestank\nzurückschrecken."
    es: "Puede amedrentar al rival al atacarlo debido al mal olor\nque emana."
    ko: "악취를 풍겨서\n공격했을 때 상대가\n풀죽을 때가 있다."
    zh_simp: "通过释放臭臭的气味，\n在攻击的时候，\n有时会使对手畏缩。"
    zh_trad: "發出臭氣，\n在攻擊的時候，\n有時會使對手畏縮。"
sticky_hold:
  names:
    jp_kana: ねんちゃく
    jp_kanji: ねんちゃく
    en: Sticky Hold
    fr: Glu
    it: Antifurto
    de: Klebekörper
    es: Viscosidad
    ko: 점착
    zh_simp: 黏着
    zh_trad: 黏著
  descriptions:
    jp_kana: "ねんちゃくしつの　からだに\nどうぐが　くっついているため\nあいてに　どうぐを　うばわれない。"
    jp_kanji: "粘着質の　体に\n道具が　くっついているため\n相手に　道具を　奪われない。"
    en: "Items held by the Pokémon are stuck fast and\ncannot be removed by other Pokémon."
    fr: "Les objets sont collés au corps gluant du Pokémon,\nce qui empêche ses adversaires de les dérober."
    it: "Gli strumenti restano appiccicati al corpo adesivo\ndel Pokémon e non possono essere rubati."
    de: "Trägt es ein Item, bleibt dieses an seinem klebrigen\nKörper haften, wodurch Item-Diebstahl verhindert wird."
    es: "Los objetos se quedan pegados a su cuerpo, por lo que\nno pueden robárselos."
    ko: "점성이 높은 몸에\n도구가 달라붙어 있어\n상대에게 도구를 뺏기지 않는다."
    zh_simp: "因为道具是粘在黏性身体上的，\n所以不会被对手夺走。"
    zh_trad: "道具會黏在\n具有黏性的身體上，\n不會被對手奪走。"
storm_drain:
  names:
    jp_kana: よびみず
    jp_kanji: よびみず
    en: Storm Drain
    fr: Lavabo
    it: Acquascolo
    de: Sturmsog
    es: Colector
    ko: 마중물
    zh_simp: 引水
    zh_trad: 引水
  descriptions:
    jp_kana: "みずタイプの　わざを　じぶんに　よせつけ\nダメージは　うけずに　とくこうが　あがる。"
    jp_kanji: "みずタイプの　技を　自分に　よせつけ\nダメージは　受けずに　特攻が　上がる。"
    en: "Draws in all Water-type moves. Instead of being hit\nby Water-type moves, it boosts its Sp. Atk."
    fr: "Le Pokémon détourne sur lui les capacités de type Eau\net les neutralise, tout en montant son Attaque Spéciale."
    it: "Il Pokémon attira e neutralizza le mosse di tipo Acqua\ne fa aumentare il proprio Attacco Speciale."
    de: "Zieht Wasser-Attacken an. Statt durch diese Schaden\nzu nehmen, erhöht es den eigenen Spezial-Angriff."
    es: "Atrae y neutraliza los movimientos de tipo Agua, que\nademás le suben el Ataque Especial."
    ko: "물타입의 기술을 자신에게\n끌어모아 데미지를 받지 않고\n특수공격이 올라간다."
    zh_simp: "将水属性的招式引到自己身上，\n不会受到伤害，而是会提高特攻。"
    zh_trad: "將水屬性的招式引到自己身上，\n不但不會受到傷害，\n反而會提高特攻。"
strong_jaw:
  names:
    jp_kana: がんじょうあご
    jp_kanji: がんじょうあご
    en: Strong Jaw
    fr: Prognathe
    it: Ferromascella
    de: Titankiefer
    es: Mandíbula Fuerte
    ko: 옹골찬턱
    zh_simp: 强壮之颚
    zh_trad: 強壯之顎
  descriptions:
    jp_kana: "あごが　がんじょうで\nかむ　わざの　いりょくが\nたかくなる。"
    jp_kanji: "あごが　頑丈で\n噛む　技の　威力が\n高くなる。"
    en: "The Pokémon’s strong jaw boosts the power of its\nbiting moves."
    fr: "Le Pokémon a une mâchoire robuste qui augmente\nla puissance de ses capacités à base de morsures."
    it: "La robusta mascella del Pokémon permette\nmorsi molto potenti."
    de: "Der kräftige Kiefer des Pokémon erhöht die Stärke\nvon Biss-Attacken."
    es: "Su robusta mandíbula le confiere una mordedura\npotente."
    ko: "턱이 튼튼하여\n무는 기술의 위력이\n올라간다."
    zh_simp: "因为颚部强壮，\n啃咬类招式的威力会提高。"
    zh_trad: "顎部強壯，\n會提高啃咬類招式的威力。"
sturdy:
  names:
    jp_kana: がんじょう
    jp_kanji: がんじょう
    en: Sturdy
    fr: Fermeté
    it: Vigore
    de: Robustheit
    es: Robustez
    ko: 옹골참
    zh_simp: 结实
    zh_trad: 結實
  descriptions:
    jp_kana: "あいての　わざを　うけても\nいちげきで　たおされることが　ない。\nいちげきひっさつわざも　きかない。"
    jp_kanji: "相手の　技を　受けても\n一撃で　倒されることが　ない。\n一撃必殺技も　効かない。"
    en: "It cannot be knocked out with one hit. One-hit KO\nmoves cannot knock it out, either."
    fr: "Le Pokémon encaisse toujours au moins une attaque\ns’il a tous ses PV. Il est également immunisé contre\nles capacités pouvant mettre K.O. en un coup."
    it: "Evita che il Pokémon vada KO in un sol colpo se ha\ntutti i PS, e lo rende immune alle mosse che causano\nKO immediato."
    de: "Bietet Schutz gegen K.O.-Attacken. Bei vollen KP\nübersteht das Pokémon auch K.O.-Treffer."
    es: "Evita que el rival pueda debilitarlo de un solo golpe\ncuando tiene los PS al máximo.\nTambién evita los movimientos fulminantes."
    ko: "상대의 기술로 공격받아도\n일격으로 쓰러지지 않는다.\n일격필살 기술도 효과 없다."
    zh_simp: "即使受到对手的招式攻击，\n也不会被一击打倒。\n一击必杀的招式也没有效果。"
    zh_trad: "受到對手的招式攻擊時\n不會被一擊打倒。\n一擊必殺的招式也沒有效果。"
suction_cups:
  names:
    jp_kana: きゅうばん
    jp_kanji: きゅうばん
    en: Suction Cups
    fr: Ventouse
    it: Ventose
    de: Saugnapf
    es: Ventosas
    ko: 흡반
    zh_simp: 吸盘
    zh_trad: 吸盤
  descriptions:
    jp_kana: "きゅうばんで　じめんに　はりつき\nポケモンを　いれかえさせる\nわざや　どうぐが　きかなくなる。"
    jp_kanji: "吸盤で　地面に　張り付き\nポケモンを　入れ替えさせる\n技や　道具が　効かなくなる。"
    en: "This Pokémon uses suction cups to stay in one spot\nto negate all moves and items that force\nswitching out."
    fr: "Le Pokémon est solidement fixé au sol, ce qui le protège\ndes capacités ou objets qui font changer de Pokémon."
    it: "Il Pokémon resiste a strumenti e mosse che causano\nla sostituzione appiccicandosi al terreno con le ventose."
    de: "Blockt Attacken und Items, die Pokémon austauschen,\nindem es sich mit einem Saugnapf am Boden verankert."
    es: "Sus ventosas se aferran al suelo, con lo cual anula\nmovimientos y objetos que fuerzan el relevo."
    ko: "흡반으로 지면에 달라붙어\n포켓몬을 교체시키는 기술이나\n도구의 효과를 발휘하지 못하게 한다."
    zh_simp: "用吸盘牢牢贴在地面上，\n让替换宝可梦的招式和道具无效。"
    zh_trad: "用吸盤將自己牢牢吸附在地面上，\n讓替換寶可夢的招式和道具失效。"
super_luck:
  names:
    jp_kana: きょううん
    jp_kanji: きょううん
    en: Super Luck
    fr: Chanceux
    it: Supersorte
    de: Glückspilz
    es: Afortunado
    ko: 대운
    zh_simp: 超幸运
    zh_trad: 超幸運
  descriptions:
    jp_kana: "きょううんを　もっているため\nあいての　きゅうしょに\nこうげきが　あたりやすい。"
    jp_kanji: "強運を　持っているため\n相手の　急所に\n攻撃が　当たりやすい。"
    en: "The Pokémon is so lucky that the critical-hit ratios\nof its moves are boosted."
    fr: "Le Pokémon est tellement chanceux qu’il inflige\nplus fréquemment des coups critiques."
    it: "L’incredibile fortuna del Pokémon aumenta\nla sua probabilità di infliggere brutti colpi."
    de: "Großes Glück erhöht die Wahrscheinlichkeit,\neinen Volltreffer zu landen."
    es: "Su buena suerte aumenta la probabilidad de asestar\ngolpes críticos."
    ko: "대운을 가지고 있어\n상대의 급소에\n공격이 맞기 쉽다."
    zh_simp: "因为拥有超幸运，\n攻击容易击中对手的要害。"
    zh_trad: "因為非常幸運，\n容易擊中對手的要害。"
surge_surfer:
  names:
    jp_kana: サーフテール
    jp_kanji: サーフテール
    en: Surge Surfer
    fr: Surf Caudal
    it: Codasurf
    de: Surf-Schweif
    es: Cola Surf
    ko: 서핑테일
    zh_simp: 冲浪之尾
    zh_trad: 衝浪之尾
  descriptions:
    jp_kana: "エレキフィールド　のとき\nすばやさが　２ばいに　なる。"
    jp_kanji: "エレキフィールド　のとき\n素早さが　２倍に　なる。"
    en: "Doubles the Pokémon’s Speed stat on\nElectric Terrain."
    fr: "La Vitesse du Pokémon est doublée sur\nun Champ Électrifié."
    it: "In presenza di un Campo Elettrico, la Velocità\nraddoppia."
    de: "Verdoppelt die Initiative, wenn zuvor ein Elektrofeld\nerzeugt wurde."
    es: "Duplica su Velocidad si hay un campo eléctrico en el\nterreno de combate."
    ko: "일렉트릭필드일 때\n스피드가 2배가 된다."
    zh_simp: "电气场地时，\n速度会变为２倍。"
    zh_trad: "電氣場地時，\n速度會變為２倍。"
swarm:
  names:
    jp_kana: むしのしらせ
    jp_kanji: むしのしらせ
    en: Swarm
    fr: Essaim
    it: Aiutinsetto
    de: Hexaplaga
    es: Enjambre
    ko: 벌레의알림
    zh_simp: 虫之预感
    zh_trad: 蟲之預感
  descriptions:
    jp_kana: "ＨＰが　へったとき\nむしタイプの　わざの\nいりょくが　あがる。"
    jp_kanji: "ＨＰが　減ったとき\nむしタイプの　技の\n威力が　上がる。"
    en: "Powers up Bug-type moves when the Pokémon’s HP\nis low."
    fr: "Augmente la puissance des capacités de type Insecte\ndu Pokémon quand il a perdu une certaine quantité\nde PV."
    it: "Quando il Pokémon ha pochi PS, la potenza delle\nsue mosse di tipo Coleottero aumenta."
    de: "Erhöht die Stärke von Käfer-Attacken, wenn die KP auf\neinen gewissen Wert fallen."
    es: "Potencia sus movimientos de tipo Bicho cuando le\nquedan pocos PS."
    ko: "HP가 줄었을 때\n벌레타입 기술의\n위력이 올라간다."
    zh_simp: "ＨＰ减少的时候，\n虫属性的招式威力会提高。"
    zh_trad: "ＨＰ減少的時候，\n蟲屬性的招式威力會提高。"
sweet_veil:
  names:
    jp_kana: スイートベール
    jp_kanji: スイートベール
    en: Sweet Veil
    fr: Gluco-Voile
    it: Dolcevelo
    de: Zuckerhülle
    es: Velo Dulce
    ko: 스위트베일
    zh_simp: 甜幕
    zh_trad: 甜幕
  descriptions:
    jp_kana: "みかたの　ポケモンは\nねむらなくなる。"
    jp_kanji: "味方の　ポケモンは\n眠らなくなる。"
    en: Prevents itself and ally Pokémon from falling asleep.
    fr: Les Pokémon de l’équipe ne peuvent pas s’endormir.
    it: Rende il Pokémon e i suoi alleati immuni al sonno.
    de: Alle Team-Pokémon können nicht einschlafen.
    es: "No cae dormido y evita también que sus aliados se\nduerman."
    ko: "같은 편의 포켓몬이\n잠들지 않게 된다."
    zh_simp: "我方的宝可梦\n不会变为睡眠状态。"
    zh_trad: "我方的寶可夢\n不會陷入睡眠狀態。"
swift_swim:
  names:
    jp_kana: すいすい
    jp_kanji: すいすい
    en: Swift Swim
    fr: Glissade
    it: Nuotovelox
    de: Wassertempo
    es: Nado Rápido
    ko: 쓱쓱
    zh_simp: 悠游自如
    zh_trad: 悠游自如
  descriptions:
    jp_kana: "てんきが　あめのとき\nすばやさが　あがる。"
    jp_kanji: "天気が　雨のとき\n素早さが　上がる。"
    en: Boosts the Pokémon’s Speed stat in rain.
    fr: Augmente la Vitesse du Pokémon s’il pleut.
    it: Se piove, la Velocità aumenta.
    de: Erhöht bei Regen die Initiative.
    es: Sube su Velocidad cuando llueve.
    ko: "비가 오는 날씨일 때\n스피드가 올라간다."
    zh_simp: "下雨天气时，\n速度会提高。"
    zh_trad: "天氣為下雨時，\n速度會提高。"
symbiosis:
  names:
    jp_kana: きょうせい
    jp_kanji: きょうせい
    en: Symbiosis
    fr: Symbiose
    it: Simbiosi
    de: Nutznießer
    es: Simbiosis
    ko: 공생
    zh_simp: 共生
    zh_trad: 共生
  descriptions:
    jp_kana: "みかたが　どうぐを　つかうと\nじぶんの　もっている　どうぐを\nみかたに　わたす。"
    jp_kanji: "味方が　道具を　使うと\n自分の　持っている　道具を\n味方に　渡す。"
    en: "The Pokémon passes its item to an ally that has\nused up an item."
    fr: "Quand les alliés utilisent l’objet qu’ils tiennent,\nle Pokémon leur donne l’objet qu’il tient\nen remplacement."
    it: "Se un alleato usa uno strumento, il Pokémon\ngli passa il proprio."
    de: "Gibt Mitstreitern, die ihr Item aufgebraucht haben,\nsein eigenes Item."
    es: Pasa su objeto a un aliado que ya haya utilizado el suyo.
    ko: "같은 편이 도구를 쓰면\n자신이 지니고 있는 도구를\n같은 편에게 건넨다."
    zh_simp: "同伴使用道具时，\n会把自己持有的道具传递给同伴。"
    zh_trad: "同伴使用道具時，\n會把自己持有的道具交給同伴。"
synchronize:
  names:
    jp_kana: シンクロ
    jp_kanji: シンクロ
    en: Synchronize
    fr: Synchro
    it: Sincronismo
    de: Synchro
    es: Sincronía
    ko: 싱크로
    zh_simp: 同步
    zh_trad: 同步
  descriptions:
    jp_kana: "じぶんが　なってしまった\nどくや　まひや　やけどを\nあいてに　うつす。"
    jp_kanji: "自分が　なってしまった\nどくや　まひや　やけどを\n相手に　うつす。"
    en: "The attacker will receive the same status condition if\nit inflicts a burn, poison, or paralysis to the Pokémon."
    fr: "Quand le Pokémon est brûlé, paralysé ou empoisonné\npar un autre Pokémon, il partage ce statut avec celui-ci."
    it: "Se un nemico avvelena, paralizza o scotta un\nPokémon con questa abilità, viene colpito dallo\nstesso problema di stato."
    de: "Erleidet das Pokémon Verbrennungen, Vergiftungen\noder Paralyse, ereilt das jeweilige Statusproblem\nauch den Verursacher."
    es: "Contagia el envenenamiento, las quemaduras o la\nparálisis al Pokémon que le cause ese estado."
    ko: "자신이 걸린\n독이나 마비, 화상을\n상대에게 옮긴다."
    zh_simp: "将自己的中毒、麻痹\n或灼伤状态传染给对手。"
    zh_trad: "將自己的中毒、麻痺或\n灼傷狀態傳染給對手。"
tangled_feet:
  names:
    jp_kana: ちどりあし
    jp_kanji: ちどりあし
    en: Tangled Feet
    fr: Pieds Confus
    it: Intricopiedi
    de: Fußangel
    es: Tumbos
    ko: 갈지자걸음
    zh_simp: 蹒跚
    zh_trad: 蹣跚
  descriptions:
    jp_kana: "こんらん　じょうたいの　ときは\nかいひりつが　アップする。"
    jp_kanji: "こんらん状態の　ときは\n回避率が　アップする。"
    en: Raises evasiveness if the Pokémon is confused.
    fr: Augmente l’Esquive du Pokémon s’il est confus.
    it: Se il Pokémon è confuso, la sua elusione aumenta.
    de: "Erhöht den Ausweichwert, wenn das Pokémon\nverwirrt ist."
    es: Sube su Evasión si está confuso.
    ko: "혼란 상태일 때는\n회피율이 올라간다."
    zh_simp: "在混乱状态时，\n闪避率会提高。"
    zh_trad: "陷入混亂狀態時，\n閃避率會提高。"
tangling_hair:
  names:
    jp_kana: カーリーヘアー
    jp_kanji: カーリーヘアー
    en: Tangling Hair
    fr: Mèche Rebelle
    it: Boccolidoro
    de: Lockenkopf
    es: Rizos Rebeldes
    ko: 컬리헤어
    zh_simp: 卷发
    zh_trad: 捲髮
  descriptions:
    jp_kana: "こうげきで　じぶんに　ふれた　あいての\nすばやさを　さげる。"
    jp_kanji: "攻撃で　自分に　触れた　相手の\n素早さを　下げる。"
    en: "Contact with the Pokémon lowers the attacker’s\nSpeed stat."
    fr: "Baisse la Vitesse de l’attaquant lorsque le Pokémon\nsubit une attaque directe."
    it: "Se il Pokémon viene colpito da un attacco diretto,\nla Velocità di chi l’ha colpito diminuisce."
    de: "Senkt bei Berührung im Zuge eines Angriffs die\nInitiative des Angreifers."
    es: "Baja la Velocidad del rival cuando este le ataca con un\nmovimiento de contacto."
    ko: "공격으로 자신에게 접촉한 상대의\n스피드를 떨어뜨린다."
    zh_simp: "对于用攻击接触到自己的对手，\n会降低其速度。"
    zh_trad: "對手用攻擊接觸到自己時，\n降低此對手的速度。"
technician:
  names:
    jp_kana: テクニシャン
    jp_kanji: テクニシャン
    en: Technician
    fr: Technicien
    it: Tecnico
    de: Techniker
    es: Experto
    ko: 테크니션
    zh_simp: 技术高手
    zh_trad: 技術高手
  descriptions:
    jp_kana: "いりょくが　ひくい　わざの\nいりょくを　たかくして　こうげきできる。"
    jp_kanji: "威力が　低い　技の\n威力を　高くして　攻撃できる。"
    en: Powers up the Pokémon’s weaker moves.
    fr: Augmente la puissance des capacités les plus faibles.
    it: Potenzia le mosse più deboli del Pokémon.
    de: Erhöht die Stärke von schwächeren Attacken.
    es: Potencia sus movimientos más débiles.
    ko: "위력이 약한 기술의\n위력을 올려서 공격할 수 있다."
    zh_simp: "攻击时可以将\n低威力招式的威力提高。"
    zh_trad: "可讓威力低的招式\n提高威力來進行攻擊。"
telepathy:
  names:
    jp_kana: テレパシー
    jp_kanji: テレパシー
    en: Telepathy
    fr: Télépathe
    it: Telepatia
    de: Telepathie
    es: Telepatía
    ko: 텔레파시
    zh_simp: 心灵感应
    zh_trad: 心靈感應
  descriptions:
    jp_kana: "みかたの　こうげきを　よみとって\nわざを　かいひする。"
    jp_kanji: "味方の　攻撃を　読み取って\n技を　回避する。"
    en: Anticipates an ally’s attack and dodges it.
    fr: Le Pokémon anticipe et évite les attaques de ses alliés.
    it: Il Pokémon prevede ed evita gli attacchi degli alleati.
    de: Erkennt und pariert Attacken von Mitstreitern.
    es: Elude los ataques de los aliados durante el combate.
    ko: "같은 편의 공격을 간파하여\n기술을 회피한다."
    zh_simp: "读取我方的攻击，\n并闪避其招式伤害。"
    zh_trad: "預測我方的攻擊，\n並閃避其招式。"
teravolt:
  names:
    jp_kana: テラボルテージ
    jp_kanji: テラボルテージ
    en: Teravolt
    fr: Téra-Voltage
    it: Teravolt
    de: Teravolt
    es: Terravoltaje
    ko: 테라볼티지
    zh_simp: 兆级电压
    zh_trad: 兆級電壓
  descriptions:
    jp_kana: "あいての　とくせいに　じゃまされず\nあいてに　わざを　だすことが　できる。"
    jp_kanji: "相手の　特性に　ジャマされず\n相手に　技を　出すことが　できる。"
    en: "Moves can be used on the target regardless of\nits Abilities."
    fr: "Le Pokémon ignore les talents adverses qui auraient\nun effet sur ses capacités."
    it: "Quando il Pokémon attacca, ignora l’abilità del\nbersaglio se questa ha effetto sulle mosse."
    de: "Attacken können ungeachtet der Fähigkeit des Zieles\neingesetzt werden."
    es: "Las habilidades del objetivo no afectan a los\nmovimientos que emplea."
    ko: "상대 특성에 방해받지 않고\n상대에게 기술을 쓸 수 있다."
    zh_simp: "可以不受对手特性的干扰，\n向对手使出招式。"
    zh_trad: "可以不受對手特性的干擾，\n向對手使出招式。"
thick_fat:
  names:
    jp_kana: あついしぼう
    jp_kanji: あついしぼう
    en: Thick Fat
    fr: Isograisse
    it: Grassospesso
    de: Speckschicht
    es: Sebo
    ko: 두꺼운지방
    zh_simp: 厚脂肪
    zh_trad: 厚脂肪
  descriptions:
    jp_kana: "あつい　しぼうで　まもられているので\nほのおタイプと　こおりタイプの\nわざの　ダメージを　はんげんさせる。"
    jp_kanji: "厚い　脂肪で　守られているので\nほのおタイプと　こおりタイプの\n技の　ダメージを　半減させる。"
    en: "The Pokémon is protected by a layer of thick fat,\nwhich halves the damage taken from Fire- and\nIce-type moves."
    fr: "Le Pokémon est protégé par une épaisse couche\nde graisse qui diminue de moitié les dégâts qu’il subit\ndes capacités de types Feu et Glace."
    it: "Il Pokémon è protetto da uno spesso strato\ndi grasso che dimezza il danno causato da\nmosse di tipo Fuoco e Ghiaccio."
    de: "Das Pokémon wird von einer dicken Fettschicht\ngeschützt, was den durch Feuer- und Eis-Attacken\nerlittenen Schaden halbiert."
    es: "Gracias a la gruesa capa de grasa que lo protege,\nreduce a la mitad el daño que recibe de ataques de\ntipo Fuego o Hielo."
    ko: "두꺼운 지방으로 보호되고 있어\n불꽃타입과 얼음타입의\n기술의 데미지를 반감시킨다."
    zh_simp: "因为被厚厚的脂肪保护着，\n会让火属性和冰属性的招式伤害减半。"
    zh_trad: "被厚厚的脂肪保護著，\n能夠讓火屬性和冰屬性\n招式的傷害減半。"
tinted_lens:
  names:
    jp_kana: いろめがね
    jp_kanji: いろめがね
    en: Tinted Lens
    fr: Lentiteintée
    it: Lentifumé
    de: Aufwertung
    es: Cromolente
    ko: 색안경
    zh_simp: 有色眼镜
    zh_trad: 有色眼鏡
  descriptions:
    jp_kana: "こうかが　いまひとつの　わざを\nつうじょうの　いりょくで\nだすことが　できる。"
    jp_kanji: "効果が　いまひとつの　技を\n通常の　威力で\n出すことが　できる。"
    en: "The Pokémon can use “not very effective” moves\nto deal regular damage."
    fr: "Permet à une capacité « pas très efficace » d’infliger\ndes dégâts comme si elle était efficace normalement."
    it: "Permette alle mosse non molto efficaci di infliggere\ndanni normalmente."
    de: "Bewirkt, dass nicht sehr effektive Attacken dem Ziel\ntrotz des Typennachteils normalen Schaden zufügen."
    es: "Potencia los movimientos que no son muy eficaces, que\ninfligen ahora un daño normal."
    ko: "효과가 별로인 기술을\n통상의 위력으로\n쓸 수 있다."
    zh_simp: "可以将效果不好的招式\n以通常的威力使出。"
    zh_trad: "可將效果不好的招式\n以正常的威力使出。"
torrent:
  names:
    jp_kana: げきりゅう
    jp_kanji: げきりゅう
    en: Torrent
    fr: Torrent
    it: Acquaiuto
    de: Sturzbach
    es: Torrente
    ko: 급류
    zh_simp: 激流
    zh_trad: 激流
  descriptions:
    jp_kana: "ＨＰが　へったとき\nみずタイプの　わざの\nいりょくが　あがる。"
    jp_kanji: "ＨＰが　減ったとき\nみずタイプの　技の\n威力が　上がる。"
    en: "Powers up Water-type moves when the Pokémon’s\nHP is low."
    fr: "Augmente la puissance des capacités de type Eau\ndu Pokémon quand il a perdu une certaine quantité\nde PV."
    it: "Quando il Pokémon ha pochi PS, la potenza delle\nsue mosse di tipo Acqua aumenta."
    de: "Erhöht die Stärke von Wasser-Attacken, wenn die KP auf\neinen gewissen Wert fallen."
    es: "Potencia sus movimientos de tipo Agua cuando le\nquedan pocos PS."
    ko: "HP가 줄었을 때\n물타입 기술의\n위력이 올라간다."
    zh_simp: "ＨＰ减少的时候，\n水属性的招式威力会提高。"
    zh_trad: "ＨＰ減少的時候，\n水屬性的招式威力會提高。"
tough_claws:
  names:
    jp_kana: かたいツメ
    jp_kanji: かたいツメ
    en: Tough Claws
    fr: Griffe Dure
    it: Unghiedure
    de: Krallenwucht
    es: Garra Dura
    ko: 단단한발톱
    zh_simp: 硬爪
    zh_trad: 硬爪
  descriptions:
    jp_kana: "あいてに　せっしょくする　わざの\nいりょくが　たかくなる。"
    jp_kanji: "相手に　接触する　技の\n威力が　高くなる。"
    en: Powers up moves that make direct contact.
    fr: "Augmente la puissance des attaques directes\ndu Pokémon."
    it: Potenzia le mosse che causano un contatto fisico.
    de: Erhöht die Stärke von direkten Attacken.
    es: Aumenta la potencia de los movimientos de contacto.
    ko: "상대에게 접촉하는 기술의\n위력이 올라간다."
    zh_simp: "接触到对手的招式\n威力会提高。"
    zh_trad: "接觸到對手的招式\n威力會提高。"
toxic_boost:
  names:
    jp_kana: どくぼうそう
    jp_kanji: どくぼうそう
    en: Toxic Boost
    fr: Rage Poison
    it: Velenimpeto
    de: Giftwahn
    es: Ímpetu Tóxico
    ko: 독폭주
    zh_simp: 中毒激升
    zh_trad: 中毒激升
  descriptions:
    jp_kana: "どく　じょうたいに　なったとき\nぶつりわざの　いりょくが　あがる。"
    jp_kanji: "どく状態に　なったとき\n物理技の　威力が　上がる。"
    en: "Powers up physical attacks when the Pokémon\nis poisoned."
    fr: "Augmente la puissance des capacités physiques\nquand le Pokémon est empoisonné."
    it: "Se il Pokémon è avvelenato, la potenza delle sue mosse\nfisiche aumenta."
    de: "Erhöht bei Vergiftungen die Stärke von physischen\nAttacken."
    es: "Aumenta la potencia de sus ataques físicos cuando\nestá envenenado."
    ko: "독 상태가 되었을 때\n물리 기술의 위력이 올라간다."
    zh_simp: "变为中毒状态时，\n物理招式的威力会提高。"
    zh_trad: "陷入中毒狀態時，\n物理招式的威力會提高。"
trace:
  names:
    jp_kana: トレース
    jp_kanji: トレース
    en: Trace
    fr: Calque
    it: Traccia
    de: Erfassen
    es: Rastro
    ko: 트레이스
    zh_simp: 复制
    zh_trad: 複製
  descriptions:
    jp_kana: "とうじょう　したとき\nあいての　とくせいを　トレースして\nおなじ　とくせいに　なる。"
    jp_kanji: "登場　したとき\n相手の　特性を　トレースして\n同じ　特性に　なる。"
    en: "When it enters a battle, the Pokémon copies an\nopposing Pokémon’s Ability."
    fr: "Lorsque le Pokémon entre au combat, il calque\nle talent d’un ennemi pour remplacer le sien."
    it: "Quando il Pokémon entra in campo, copia l’abilità\ndi un nemico."
    de: Kopiert bei Kampfantritt die Fähigkeit eines Gegners.
    es: Al entrar en combate copia la habilidad del rival.
    ko: "등장했을 때\n상대의 특성을 트레이스해서\n같은 특성이 된다."
    zh_simp: "出场时，复制对手的特性，\n变为与之相同的特性。"
    zh_trad: "出場時，複製對手的特性，\n變為與之相同的特性。"
transistor:
  names:
    jp_kana: トランジスタ
    jp_kanji: トランジスタ
    en: Transistor
    fr: Transistor
    it: Transistor
    de: Transistor
    es: Transistor
    ko: 트랜지스터
    zh_simp: 电晶体
    zh_trad: 電晶體
  descriptions:
    jp_kana: "でんきタイプの　わざの\nいりょくが　あがる。"
    jp_kanji: "でんきタイプの　技の\n威力が　上がる。"
    en: Powers up Electric-type moves.
    fr: Augmente la puissance des attaques de type Électrik.
    it: Potenzia le mosse di tipo Elettro.
    de: Erhöht die Stärke von Elektro-Attacken.
    es: Potencia los movimientos de tipo Eléctrico.
    ko: "전기타입 기술의\n위력이 올라간다."
    zh_simp: 电属性的招式威力会提高。
    zh_trad: 電屬性的招式威力會提高。
triage:
  names:
    jp_kana: ヒーリングシフト
    jp_kanji: ヒーリングシフト
    en: Triage
    fr: Prioguérison
    it: Primacura
    de: Heilwandel
    es: Primer Auxilio
    ko: 힐링시프트
    zh_simp: 先行治疗
    zh_trad: 先行治療
  descriptions:
    jp_kana: "かいふくわざを　せんせいで\nだすことが　できる。"
    jp_kanji: "回復技を　先制で\n出すことが　できる。"
    en: Gives priority to a healing move.
    fr: "Toutes les capacités qui soignent le Pokémon\ndirectement deviennent prioritaires."
    it: "Le mosse che ripristinano direttamente i PS\ndel Pokémon acquistano priorità alta."
    de: "Ermöglicht einen Erstschlag mit Attacken, welche die\nKP des Anwenders direkt regenerieren."
    es: Da prioridad a los movimientos que restauran PS.
    ko: "회복 기술을 먼저\n사용할 수 있다."
    zh_simp: 可以率先使出回复招式。
    zh_trad: 可以搶先使出回復招式。
truant:
  names:
    jp_kana: なまけ
    jp_kanji: なまけ
    en: Truant
    fr: Absentéisme
    it: Pigrone
    de: Schnarchnase
    es: Ausente
    ko: 게으름
    zh_simp: 懒惰
    zh_trad: 懶惰
  descriptions:
    jp_kana: "わざを　だすと\nつぎの　ターンは　やすんでしまう。"
    jp_kanji: "技を　出すと\n次の　ターンは　休んでしまう。"
    en: "The Pokémon can’t use a move if it had used a move\non the previous turn."
    fr: "Lorsque le Pokémon utilise une capacité,\nil passe le tour suivant à paresser."
    it: "Quando il Pokémon usa una mossa, nel turno\nsuccessivo si riposerà."
    de: "Das Pokémon muss nach Einsatz einer Attacke\neine Runde lang aussetzen."
    es: "Al ejecutar un movimiento, descansará en el turno\nsiguiente."
    ko: "기술을 사용하면\n다음 턴은 쉰다."
    zh_simp: "如果使出招式，\n下一回合就会休息。"
    zh_trad: "如果使出招式，\n下一回合就需要休息。"
turboblaze:
  names:
    jp_kana: ターボブレイズ
    jp_kanji: ターボブレイズ
    en: Turboblaze
    fr: Turbo Brasier
    it: Piroturbina
    de: Turbobrand
    es: Turbollama
    ko: 터보블레이즈
    zh_simp: 涡轮火焰
    zh_trad: 渦輪火焰
  descriptions:
    jp_kana: "あいての　とくせいに　じゃまされず\nあいてに　わざを　だすことが　できる。"
    jp_kanji: "相手の　特性に　ジャマされず\n相手に　技を　出すことが　できる。"
    en: "Moves can be used on the target regardless of\nits Abilities."
    fr: "Le Pokémon ignore les talents adverses qui auraient\nun effet sur ses capacités."
    it: "Quando il Pokémon attacca, ignora l’abilità del\nbersaglio se questa ha effetto sulle mosse."
    de: "Attacken können ungeachtet der Fähigkeit des Zieles\neingesetzt werden."
    es: "Las habilidades del objetivo no afectan a los\nmovimientos que emplea."
    ko: "상대 특성에 방해받지 않고\n상대에게 기술을 쓸 수 있다."
    zh_simp: "可以不受对手特性的干扰，\n向对手使出招式。"
    zh_trad: "可以不受對手特性的干擾，\n向對手使出招式。"
unaware:
  names:
    jp_kana: てんねん
    jp_kanji: てんねん
    en: Unaware
    fr: Inconscient
    it: Imprudenza
    de: Unkenntnis
    es: Ignorante
    ko: 천진
    zh_simp: 纯朴
    zh_trad: 純樸
  descriptions:
    jp_kana: "あいての　のうりょくの　へんかを\nむしして　こうげきが　できる。"
    jp_kanji: "相手の　能力の　変化を\n無視して　攻撃が　できる。"
    en: "When attacking, the Pokémon ignores the target\nPokémon’s stat changes."
    fr: "Quand il attaque, le Pokémon ignore les changements\nde stats de l’ennemi."
    it: "Quando il Pokémon attacca, ignora le modifiche\nalle statistiche del nemico."
    de: "Greift das Pokémon an, ignoriert es sämtliche\nStatusveränderungen des Zieles."
    es: "Pasa por alto las mejoras en las características del rival\nal atacar."
    ko: "상대의 능력 변화를\n무시하고 공격할 수 있다."
    zh_simp: "可以无视对手能力的变化，\n进行攻击。"
    zh_trad: "可無視對手能力的變化，\n進行攻擊。"
unburden:
  names:
    jp_kana: かるわざ
    jp_kanji: かるわざ
    en: Unburden
    fr: Délestage
    it: Agiltecnica
    de: Entlastung
    es: Liviano
    ko: 곡예
    zh_simp: 轻装
    zh_trad: 輕裝
  descriptions:
    jp_kana: "もっていた　どうぐが　なくなると\nすばやさが　あがる。"
    jp_kanji: "持っていた　道具が　なくなると\n素早さが　上がる。"
    en: "Boosts the Speed stat if the Pokémon’s held item is\nused or lost."
    fr: "Augmente la Vitesse du Pokémon s’il perd ou utilise\nl’objet qu’il tenait au début du combat."
    it: "Se il Pokémon usa o perde uno strumento,\nla sua Velocità aumenta."
    de: "Wenn das von ihm getragene Item verwendet wird\noder verloren geht, erhöht dies seine Initiative."
    es: Sube su Velocidad si usa o pierde el objeto que lleva.
    ko: "지니던 도구가 없어지면\n스피드가 올라간다."
    zh_simp: "失去所持有的道具时，\n速度会提高。"
    zh_trad: "失去所持有的道具時，\n速度會提高。"
unnerve:
  names:
    jp_kana: きんちょうかん
    jp_kanji: きんちょうかん
    en: Unnerve
    fr: Tension
    it: Agitazione
    de: Anspannung
    es: Nerviosismo
    ko: 긴장감
    zh_simp: 紧张感
    zh_trad: 緊張感
  descriptions:
    jp_kana: "あいてを　きんちょうさせて\nきのみを　たべられなく　させる。"
    jp_kanji: "相手を　緊張させて\nきのみを　食べられなく　させる。"
    en: "Unnerves opposing Pokémon and makes them unable\nto eat Berries."
    fr: "Fait stresser l’ennemi, ce qui l’empêche de manger\ndes Baies."
    it: "Il nemico viene intimidito e non può mangiare\nbacche."
    de: "Erzeugt bei Gegnern Stress und hindert sie so daran,\nBeeren zu konsumieren."
    es: Pone nervioso al rival y le impide usar bayas.
    ko: "상대를 긴장시켜 나무열매를\n먹지 못하게 한다."
    zh_simp: "让对手紧张，\n使其无法食用树果。"
    zh_trad: "讓對手感到緊張，\n無法吃樹果。"
unseen_fist:
  names:
    jp_kana: ふかしのこぶし
    jp_kanji: ふかしのこぶし
    en: Unseen Fist
    fr: Poing Invisible
    it: Pugni Invisibili
    de: Verborgene Faust
    es: Puño Invisible
    ko: 보이지않는주먹
    zh_simp: 无形拳
    zh_trad: 無形拳
  descriptions:
    jp_kana: "あいてに　せっしょくする　わざなら\nまもりの　こうかを\nむしして　こうげき　することが　できる。"
    jp_kanji: "相手に　接触する　技なら\n守りの　効果を\n無視して　攻撃することが　できる。"
    en: "If the Pokémon uses moves that make direct contact,\nit can attack the target even if the target protects itself."
    fr: "Si le Pokémon utilise une attaque directe, celle-ci\npourra passer outre les protections de la cible."
    it: "Quando il Pokémon utilizza un attacco diretto,\ngli effetti di mosse protettive vengono ignorati."
    de: "Wenn das Pokémon eine direkte Attacke einsetzt,\ntrifft diese auch dann, wenn sich das Ziel selbst\nschützt."
    es: "Si usa un movimiento de contacto, puede infligir daño\nal objetivo aunque este se proteja."
    ko: "상대에게 접촉하는 기술을 사용하면\n방어의 효과를 무시하고 공격할 수 있다."
    zh_simp: "如果使出的是接触到对手的招式，\n就可以无视守护效果进行攻击。"
    zh_trad: "只要是接觸到對手的招式，\n就可以無視對手的防守效果進行攻擊。"
victory_star:
  names:
    jp_kana: しょうりのほし
    jp_kanji: しょうりのほし
    en: Victory Star
    fr: Victorieux
    it: Vittorstella
    de: Triumphstern
    es: Tinovictoria
    ko: 승리의별
    zh_simp: 胜利之星
    zh_trad: 勝利之星
  descriptions:
    jp_kana: "じぶんや　みかたの\nめいちゅうりつが　あがる。"
    jp_kanji: "自分や　味方の\n命中率が　上がる。"
    en: Boosts the accuracy of its allies and itself.
    fr: Augmente la Précision des Pokémon de l’équipe.
    it: Aumenta la precisione di tutta la squadra.
    de: Erhöht die Genauigkeit aller Team-Pokémon.
    es: Sube su Precisión y la de sus aliados.
    ko: "자신과 같은 편의\n명중률이 올라간다."
    zh_simp: 自己和同伴的命中率会提高。
    zh_trad: 自己和同伴的命中率會提高。
vital_spirit:
  names:
    jp_kana: やるき
    jp_kanji: やるき
    en: Vital Spirit
    fr: Esprit Vital
    it: Spiritovivo
    de: Munterkeit
    es: Espíritu Vital
    ko: 의기양양
    zh_simp: 干劲
    zh_trad: 幹勁
  descriptions:
    jp_kana: "やるきを　だすことに　よって\nねむり　じょうたいに　ならない。"
    jp_kanji: "やる気を　だすことに　よって\nねむり状態に　ならない。"
    en: "The Pokémon is full of vitality, and that prevents\nit from falling asleep."
    fr: Empêche le Pokémon de s’endormir.
    it: "Il Pokémon è talmente vivace che non può\naddormentarsi."
    de: "Das Pokémon ist so munter, dass es nicht\neinschlafen kann."
    es: Su determinación le impide quedarse dormido.
    ko: "의기양양해져서\n잠듦 상태가 되지 않는다."
    zh_simp: "通过激发出干劲，\n不会变为睡眠状态。"
    zh_trad: "透過激發出幹勁，\n不會陷入睡眠狀態。"
volt_absorb:
  names:
    jp_kana: ちくでん
    jp_kanji: ちくでん
    en: Volt Absorb
    fr: Absorbe-Volt
    it: Assorbivolt
    de: Voltabsorber
    es: Absorbe Elec
    ko: 축전
    zh_simp: 蓄电
    zh_trad: 蓄電
  descriptions:
    jp_kana: "でんきタイプの　わざを　うけると\nダメージを　うけずに　かいふくする。"
    jp_kanji: "でんきタイプの　技を　受けると\nダメージを　受けずに　回復する。"
    en: "Restores HP if hit by an Electric-type move instead\nof taking damage."
    fr: "Si le Pokémon est touché par une capacité Électrik,\nil ne subit aucun dégât et regagne des PV à la place."
    it: "Se il Pokémon viene colpito da una mossa di tipo\nElettro, recupera PS anziché subire danni."
    de: "Treffer durch Elektro-Attacken verursachen keinen\nSchaden, sondern regenerieren stattdessen KP."
    es: "Si le alcanza un movimiento de tipo Eléctrico, recupera\nPS en vez de sufrir daño."
    ko: "전기타입의 기술로 공격받으면\n데미지를 받지 않고 회복한다."
    zh_simp: "受到电属性的招式攻击时，\n不会受到伤害，而是会回复。"
    zh_trad: "受到電屬性的招式攻擊時，\n不會受到傷害，而是會回復。"
wandering_spirit:
  names:
    jp_kana: さまようたましい
    jp_kanji: さまようたましい
    en: Wandering Spirit
    fr: Âme Vagabonde
    it: Anima Errante
    de: Rastlose Seele
    es: Alma Errante
    ko: 떠도는영혼
    zh_simp: 游魂
    zh_trad: 遊魂
  descriptions:
    jp_kana: "せっしょくする　わざで\nこうげき　してきた　ポケモンと\nとくせいを　いれかえる。"
    jp_kanji: "接触する　技で\n攻撃　してきた　ポケモンと\n特性を　入れ替える。"
    en: "The Pokémon exchanges Abilities with a Pokémon\nthat hits it with a move that makes direct contact."
    fr: "Lorsque le Pokémon est directement touché\npar une attaque, il échange son talent avec celui\nde l’assaillant."
    it: "Se il Pokémon subisce un attacco diretto, scambia\nla sua abilità con quella di chi lo ha colpito."
    de: "Wird das Pokémon von einer direkten Attacke\ngetroffen, tauscht es seine Fähigkeit mit der des\nAngreifers."
    es: "Si le alcanza un movimiento de contacto, intercambia\nsu habilidad con la del agresor."
    ko: "접촉하는 기술로\n공격해 온 포켓몬과\n특성을 바꾼다."
    zh_simp: "与使用接触类招式\n攻击自己的宝可梦互换特性。"
    zh_trad: "與使用接觸類招式\n攻擊自己的寶可夢互換特性。"
water_absorb:
  names:
    jp_kana: ちょすい
    jp_kanji: ちょすい
    en: Water Absorb
    fr: Absorbe-Eau
    it: Assorbacqua
    de: H2O-Absorber
    es: Absorbe Agua
    ko: 저수
    zh_simp: 储水
    zh_trad: 儲水
  descriptions:
    jp_kana: "みずタイプの　わざを　うけると\nダメージを　うけずに　かいふくする。"
    jp_kanji: "みずタイプの　技を　受けると\nダメージを　受けずに　回復する。"
    en: "Restores HP if hit by a Water-type move instead of\ntaking damage."
    fr: "Si le Pokémon est touché par une capacité Eau,\nil ne subit aucun dégât et regagne des PV à la place."
    it: "Se il Pokémon viene colpito da una mossa di tipo\nAcqua, recupera PS anziché subire danni."
    de: "Treffer durch Wasser-Attacken verursachen keinen\nSchaden, sondern regenerieren stattdessen KP."
    es: "Si le alcanza un movimiento de tipo Agua, recupera PS\nen vez de sufrir daño."
    ko: "물타입의 기술로 공격받으면\n데미지를 받지 않고 회복한다."
    zh_simp: "受到水属性的招式攻击时，\n不会受到伤害，而是会回复。"
    zh_trad: "受到水屬性的招式攻擊時，\n不會受到傷害，而是會回復。"
water_bubble:
  names:
    jp_kana: すいほう
    jp_kanji: すいほう
    en: Water Bubble
    fr: Aquabulle
    it: Bolladacqua
    de: Wasserblase
    es: Pompa
    ko: 수포
    zh_simp: 水泡
    zh_trad: 水泡
  descriptions:
    jp_kana: "じぶんに　たいする　ほのおタイプの\nわざの　いりょくを　さげる。\nやけど　しない。"
    jp_kanji: "自分に　対する　ほのおタイプの\n技の　威力を　下げる。\nやけど　しない。"
    en: "Lowers the power of Fire-type moves done to the\nPokémon and prevents the Pokémon from getting\na burn."
    fr: "Réduit les dégâts des capacités de type Feu subis\npar le Pokémon. Il est également immunisé contre\nles brûlures."
    it: "Riduce i danni subiti dalle mosse di tipo Fuoco\ne rende immuni alle scottature."
    de: "Feuer-Attacken fügen dem Pokémon weniger\nSchaden zu. Verhindert Verbrennungen."
    es: "Reduce el daño que le provocan los movimientos de\ntipo Fuego y es inmune a las quemaduras."
    ko: "자신을 향하는 불꽃타입\n기술의 위력을 떨어뜨린다.\n화상을 입지 않는다."
    zh_simp: "降低自己受到的火属性\n招式的威力，不会灼伤。"
    zh_trad: "降低自己受到的火屬性\n招式的威力。不會灼傷。"
water_compaction:
  names:
    jp_kana: みずがため
    jp_kanji: みずがため
    en: Water Compaction
    fr: Sable Humide
    it: Idrorinforzo
    de: Verklumpen
    es: Hidrorrefuerzo
    ko: 꾸덕꾸덕굳기
    zh_simp: 遇水凝固
    zh_trad: 遇水凝固
  descriptions:
    jp_kana: "みずタイプの　わざを　うけると\nぼうぎょが　ぐーんと　あがる。"
    jp_kanji: "みずタイプの　技を　受けると\n防御が　ぐーんと　上がる。"
    en: "Boosts the Pokémon’s Defense stat sharply when hit\nby a Water-type move."
    fr: "Augmente beaucoup la Défense du Pokémon\nquand il subit une capacité de type Eau."
    it: "Se il Pokémon subisce una mossa di tipo Acqua,\nla sua Difesa aumenta di molto."
    de: "Wird es von einer Wasser-Attacke getroffen, steigt\nseine Verteidigung stark."
    es: "Aumenta mucho su Defensa si le alcanza un movimiento\nde tipo Agua."
    ko: "물타입의 기술로 공격받으면\n방어가 크게 올라간다."
    zh_simp: "受到水属性的招式攻击时，\n防御会大幅提高。"
    zh_trad: "受到水屬性的招式攻擊時，\n防禦會大幅提高。"
water_veil:
  names:
    jp_kana: みずのベール
    jp_kanji: みずのベール
    en: Water Veil
    fr: Ignifu-Voile
    it: Idrovelo
    de: Aquahülle
    es: Velo Agua
    ko: 수의베일
    zh_simp: 水幕
    zh_trad: 水幕
  descriptions:
    jp_kana: "みずのベールを　みにまとい\nやけど　じょうたいに　ならない。"
    jp_kanji: "水のベールを　身にまとい\nやけど状態に　ならない。"
    en: "The Pokémon is covered with a water veil, which\nprevents the Pokémon from getting a burn."
    fr: "Le voile qui recouvre le Pokémon le protège\ndes brûlures."
    it: "Un velo d’acqua riveste il corpo del Pokémon\nimpedendogli di venire scottato."
    de: Verhindert durch eine Hülle aus Wasser Verbrennungen.
    es: "Evita las quemaduras gracias a la capa de agua que\nlo envuelve."
    ko: "물의 베일을 몸에 둘러서\n화상 상태가 되지 않는다."
    zh_simp: "将水幕裹在身上，\n不会变为灼伤状态。"
    zh_trad: "將水幕裹在身上，\n不會陷入灼傷狀態。"
weak_armor:
  names:
    jp_kana: くだけるよろい
    jp_kanji: くだけるよろい
    en: Weak Armor
    fr: Armurouillée
    it: Sottilguscio
    de: Bruchrüstung
    es: Armadura Frágil
    ko: 깨어진갑옷
    zh_simp: 碎裂铠甲
    zh_trad: 碎裂鎧甲
  descriptions:
    jp_kana: "ぶつりわざで　ダメージを　うけると\nぼうぎょが　さがり\nすばやさが　ぐーんと　あがる。"
    jp_kanji: "物理技で　ダメージを　受けると\n防御が　下がり\n素早さが　ぐーんと　上がる。"
    en: "Physical attacks to the Pokémon lower its Defense\nstat but sharply raise its Speed stat."
    fr: "Quand le Pokémon est touché par une capacité\nphysique, sa Défense baisse mais sa Vitesse\naugmente beaucoup."
    it: "Se il Pokémon subisce danni da mosse fisiche, la Difesa\ndiminuisce e la Velocità aumenta di molto."
    de: "Senkt bei erlittenem Treffer durch eine physische\nAttacke die Verteidigung des Pokémon, aber erhöht\ndafür seine Initiative stark."
    es: "Al recibir daño de un ataque físico, le baja la Defensa,\npero le sube mucho la Velocidad."
    ko: "물리 기술로 데미지를 받으면\n방어가 떨어지고\n스피드가 크게 올라간다."
    zh_simp: "如果因物理招式受到伤害，\n防御会降低，\n速度会大幅提高。"
    zh_trad: "因物理招式受到傷害時，\n防禦會降低，\n速度會大幅提高。"
white_smoke:
  names:
    jp_kana: しろいけむり
    jp_kanji: しろいけむり
    en: White Smoke
    fr: Écran Fumée
    it: Fumochiaro
    de: Pulverrauch
    es: Humo Blanco
    ko: 하얀연기
    zh_simp: 白色烟雾
    zh_trad: 白色煙霧
  descriptions:
    jp_kana: "しろいけむりに　まもられて\nあいてに　のうりょくを　さげられない。"
    jp_kanji: "白い煙に　守られて\n相手に　能力を　下げられない。"
    en: "The Pokémon is protected by its white smoke, which\nprevents other Pokémon from lowering its stats."
    fr: "Un écran de fumée empêche l’ennemi de baisser\nles stats du Pokémon."
    it: "Il Pokémon è protetto da un fumo chiaro che\nimpedisce ai nemici di diminuire le sue statistiche."
    de: "Indem es sich mit pulvrigem Rauch umhüllt, hindert es\nAngreifer daran, seine Statuswerte zu senken."
    es: "El humo blanco que lo protege evita que otros Pokémon\nle bajen las características."
    ko: "하얀 연기의 보호를 받아\n상대가 능력을 떨어뜨리지 못하게 한다."
    zh_simp: "被白色烟雾保护着，\n不会被对手降低能力。"
    zh_trad: "被白色煙霧保護著，\n不會被對手降低能力。"
wimp_out:
  names:
    jp_kana: にげごし
    jp_kanji: にげごし
    en: Wimp Out
    fr: Escampette
    it: Fuggifuggi
    de: Reißaus
    es: Huida
    ko: 도망태세
    zh_simp: 跃跃欲逃
    zh_trad: 躍躍欲逃
  descriptions:
    jp_kana: "ＨＰが　はんぶんに　なると\nあわてて　にげだして\nてもちに　ひっこんで　しまう。"
    jp_kanji: "ＨＰが　半分に　なると\nあわてて　逃げ出して\n手持ちに　引っ込んで　しまう。"
    en: "The Pokémon cowardly switches out when its HP\nbecomes half or less."
    fr: "Le Pokémon perd confiance quand ses PV tombent\nà la moitié et s’enfuit dans sa Poké Ball."
    it: "Se i PS scendono a metà o meno, il Pokémon\nsi fa prendere dalla paura e abbandona la lotta\nin tutta fretta."
    de: "Fallen seine KP auf die Hälfte des Maximalwerts oder\nweniger, zieht es sich ängstlich zurück."
    es: "Se asusta y abandona el terreno de combate cuando\nsus PS se ven reducidos a la mitad."
    ko: "HP가 절반이 되면\n황급히 도망쳐서\n지닌 포켓몬으로 돌아간다."
    zh_simp: "ＨＰ变为一半时，\n会慌慌张张逃走，\n退回同行队伍中。"
    zh_trad: "ＨＰ變為一半時，\n會慌慌張張逃走，\n退回同行隊伍裡面。"
wonder_guard:
  names:
    jp_kana: ふしぎなまもり
    jp_kanji: ふしぎなまもり
    en: Wonder Guard
    fr: Garde Mystik
    it: Magidifesa
    de: Wunderwache
    es: Superguarda
    ko: 불가사의부적
    zh_simp: 神奇守护
    zh_trad: 神奇守護
  descriptions:
    jp_kana: "こうかばつぐんの　わざしか\nあたらない　ふしぎな　ちから。"
    jp_kanji: "効果バツグンの　技しか\n当たらない　不思議な　力。"
    en: "Its mysterious power only lets supereffective moves\nhit the Pokémon."
    fr: "Une puissance mystérieuse protège le Pokémon contre\ntoutes les capacités, sauf celles « super efficaces »."
    it: "Un potere misterioso protegge il Pokémon e lo\nrende vulnerabile solo alle mosse superefficaci."
    de: "Wundersame Kräfte bewirken, dass nur sehr effektive\nTreffer bei ihm Schaden anrichten."
    es: "Gracias a un poder misterioso, solo le hacen daño los\nmovimientos supereficaces."
    ko: "효과가 굉장한 기술만\n맞는 불가사의한 힘."
    zh_simp: "不可思议的力量，\n只有效果绝佳的招式才能击中。"
    zh_trad: "不可思議的力量，\n只有效果絕佳的招式才會擊中自己。"
wonder_skin:
  names:
    jp_kana: ミラクルスキン
    jp_kanji: ミラクルスキン
    en: Wonder Skin
    fr: Peau Miracle
    it: Splendicute
    de: Wunderhaut
    es: Piel Milagro
    ko: 미라클스킨
    zh_simp: 奇迹皮肤
    zh_trad: 奇跡皮膚
  descriptions:
    jp_kana: "へんかわざを　うけにくい\nからだに　なっている。"
    jp_kanji: "変化技を　受けにくい\n体に　なっている。"
    en: Makes status moves more likely to miss.
    fr: Le Pokémon résiste mieux aux capacités de statut.
    it: Il Pokémon resiste più facilmente alle mosse di stato.
    de: Wehrt mit robustem Körper viele Status-Attacken ab.
    es: "Presenta una mayor resistencia ante los movimientos de\nestado."
    ko: "변화 기술로 공격받기 어려운\n몸으로 되어 있다."
    zh_simp: "成为不易受到变化招式\n攻击的身体。"
    zh_trad: "不易受到變化類招式\n攻擊的身體。"
zen_mode:
  names:
    jp_kana: ダルマモード
    jp_kanji: ダルマモード
    en: Zen Mode
    fr: Mode Transe
    it: Stato Zen
    de: Trance-Modus
    es: Modo Daruma
    ko: 달마모드
    zh_simp: 达摩模式
    zh_trad: 達摩模式
  descriptions:
    jp_kana: "ＨＰが　はんぶん　いかに　なると\nすがたが　へんかする。"
    jp_kanji: "ＨＰが　半分　以下に　なると\n姿が　変化する。"
    en: "Changes the Pokémon’s shape when HP is half\nor less."
    fr: "Quand le Pokémon perd la moitié de ses PV,\nil se transforme."
    it: "Cambia la forma del Pokémon se i PS scendono\na metà o meno."
    de: "Fallen seine KP auf die Hälfte des Maximalwerts oder\nweniger, wechselt es seine Gestalt."
    es: Cambia de forma si sus PS se ven reducidos a la mitad.
    ko: "HP가 절반 이하가 되면\n모습이 변화한다."
    zh_simp: "ＨＰ变为一半以下时，\n样子会改变。"
    zh_trad: "ＨＰ變為一半以下時，\n樣子會改變。"
