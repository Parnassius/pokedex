        es:
          brilliant_diamond: "Es muy territorial. Expulsa a los intrusos con unos\ntemblores que se sienten en un radio de 5 km."
          shining_pearl: "Ha desarrollado la capacidad de prever\nterremotos reales debido a los temblores\nque provoca."
