          shining_pearl: "Il perçoit les émotions humaines grâce aux cornes\nsur sa tête. On dit qu’il se montre aux personnes\nenjouées."
        it:
          brilliant_diamond: "Percepisce gli stati d’animo delle persone con\nle corna che ha sul capo. Si mostra alla gente\nallegra."
          shining_pearl: "Percepisce gli stati d’animo delle persone con\nle corna che ha sul capo. Si mostra alla gente\nallegra."
        de:
