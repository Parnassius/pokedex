          brilliant_diamond: "Il vit en forêt avec ses pairs. Les poches\nsur ses joues emmagasinent de l’électricité."
          shining_pearl: "Les poches électriques sur ses joues\ncrépitent lorsqu’il est sur ses gardes."
        it:
          brilliant_diamond: "Vive nelle foreste insieme ai suoi simili.\nImmagazzina elettricità nelle sacche sulle guance."
          shining_pearl: "Se le sacche sulle sue guance emettono elettricità\ncrepitando, significa che è diffidente."
        de:
