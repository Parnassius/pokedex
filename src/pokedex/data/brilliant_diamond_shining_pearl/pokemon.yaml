      descriptions:
        jp_kana:
          brilliant_diamond: "ゆきやまで　くらしている。\nめったに　であわない　にんげんを\nめずらしがって　ちかよってくる。"
          shining_pearl: "はるになると　アイスキャンディーの\nような　しょっかんの　きのみが\nおなかの　まわりに　なる。"
        jp_kanji:
          brilliant_diamond: "雪山で　暮らしている。\nめったに　出会わない　人間を\n珍しがって　近寄ってくる。"
          shining_pearl: "春になると　アイスキャンディーの\nような　触感の　木の実が\nお腹の　まわりに　生る。"
        en:
          brilliant_diamond: "It lives on snowy mountains. Having had little\ncontact with humans, it is boldly inquisitive."
          shining_pearl: "In the spring, it grows berries with the texture of\nfrozen treats around its belly."
        fr:
          brilliant_diamond: "Il vit sur les monts enneigés. Peu habitué à croiser\ndes êtres humains, il n’hésite pas à s’en approcher\npar curiosité."
          shining_pearl: "Au printemps, des Baies dont la texture\nrappelle celle des glaces à l’eau poussent\nautour de son ventre."
        it:
          brilliant_diamond: "Vive sui monti innevati. Non ha molti contatti\ncon gli esseri umani, quindi è molto curioso\ne si avvicina quando ne vede uno."
          shining_pearl: "In primavera, attorno al ventre gli crescono\ndelle bacche simili a dolci ghiaccioli."
        de:
          brilliant_diamond: "Da es auf schneebedeckten Bergen zu Hause\nist und dort kaum Kontakt zu Menschen hat,\nnähert es sich diesen mit großer Neugier."
          shining_pearl: "Im Frühjahr wachsen um seinen Bauch herum\nBeeren, die sich wie gefrorene Süßigkeiten\nanfühlen."
        es:
          brilliant_diamond: "Vive en montañas nevadas. Como apenas tiene\ncontacto con los humanos, se acerca a ellos con\nsuma curiosidad."
          shining_pearl: "En primavera, le crecen en el vientre unas bayas\ncuya textura recuerda al helado."
        ko:
          brilliant_diamond: "설산에서 살고 있다.\n인간을 만날 일이 거의 없기에\n마주치면 신기해하며 다가온다."
          shining_pearl: "봄이 되면 아이스 캔디와\n같은 촉감의 나무열매가\n배의 주위에 열린다."
        zh_simp:
          brilliant_diamond: "生活在雪山之上。\n很少见到人类，\n会因好奇而靠近过来。"
          shining_pearl: "到了春天，\n肚子的周围会生长出\n口感好似冰棍的树果。"
        zh_trad:
          brilliant_diamond: "生活在雪山裡。\n會滿懷好奇地靠近\n平時鮮少接觸的人類。"
          shining_pearl: "一到春天，\n腹部周圍就會長出\n口感像冰棒的樹果。"
