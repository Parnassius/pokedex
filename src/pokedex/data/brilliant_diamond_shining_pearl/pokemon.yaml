      types:
        - dragon
        - ground
      egg_groups:
        - monster
        - dragon
      abilities:
        - sand_veil
      hidden_ability: rough_skin
      descriptions:
        jp_kana:
          brilliant_diamond: "からだを　おりたたみ　つばさを\nのばすと　まるで　ジェットき。\nおんそくで　とぶことが　できる。"
          shining_pearl: "ジェットせんとうきに　まけない\nスピードで　そらを　とぶ。\nねらった　えものは　にがさない。"
        jp_kanji:
          brilliant_diamond: "体を　折り畳み　翼を　伸ばすと\nまるで　ジェット機。\n音速で　飛ぶことが　できる。"
          shining_pearl: "ジェット戦闘機に　負けない\nスピードで　空を　飛ぶ。\nねらった　獲物は　逃がさない。"
        en:
          brilliant_diamond: "When it folds up its body and extends its wings,\nit looks like a jet plane. It flies at sonic speed."
          shining_pearl: "It flies at speeds equal to a jet fighter plane.\nIt never allows its prey to escape."
        fr:
          brilliant_diamond: "Lorsqu’il se recroqueville et étend ses ailes,\nc’est un véritable avion à réaction : il est\ncapable de voler à la vitesse du son."
          shining_pearl: "Il vole à la vitesse d’un avion de chasse\net ne laisse jamais sa proie s’échapper."
        it:
          brilliant_diamond: "Quando si piega e distende le ali sembra un jet.\nVola a una velocità supersonica."
          shining_pearl: "Vola alla velocità di un jet da combattimento.\nQuando prende di mira una preda, non se la\nlascia mai sfuggire."
        de:
          brilliant_diamond: "Wenn es seinen Körper zusammenfaltet und\nseine Flügel ausbreitet, ähnelt es einem Jet.\nEs fliegt mit Schallgeschwindigkeit."
          shining_pearl: "Es fliegt mit der Geschwindigkeit eines Kampfjets\ndurch die Lüfte und lässt Beute, die es ins Visier\ngenommen hat, niemals entkommen."
        es:
          brilliant_diamond: "Cuando contrae el cuerpo y despliega las alas,\nparece un avión a reacción. Vuela a la velocidad\ndel sonido."
          shining_pearl: "Vuela tan rápido como un avión a reacción.\nNunca se le escapa una presa."
        ko:
          brilliant_diamond: "몸을 접고 날개를 펼치면\n마치 제트기 같다.\n음속으로 날 수 있다."
          shining_pearl: "제트기와 맞먹는\n스피드로 하늘을 난다.\n노린 먹이는 놓치지 않는다."
        zh_simp:
          brilliant_diamond: "如果收拢身体，伸展翅膀，\n简直就是一架喷气式飞机。\n能以音速飞行。"
          shining_pearl: "以不逊色于喷气式战斗机的速度\n在天空中飞行。\n被盯上的猎物根本无处可逃。"
        zh_trad:
          brilliant_diamond: "當折疊起身體並伸展翅膀時，\n看起來簡直就是一架噴射機。\n能夠以音速飛行。"
          shining_pearl: "以不遜於噴射戰鬥機的速度\n在天空中飛行。\n被盯上的獵物根本無處可逃。"
