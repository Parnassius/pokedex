        jp_kana:
          brilliant_diamond: "ひとの　ことばを　おぼえて　なく。\nなかまが　いっかしょに　あつまると\nみんな　おなじ　ことばを　おぼえる。"
          shining_pearl: "おばねを　メトロノームのように\nさゆうに　ふって　リズムを　きざむ。\nひとの　ことばを　くちまねする。"
        jp_kanji:
          brilliant_diamond: "人の　言葉を　覚えて　鳴く。\n仲間が　一か所に　集まると\nみんな　同じ　言葉を　覚える。"
          shining_pearl: "尾羽を　メトロノームのように\n左右に　振って　リズムを　刻む。\n人の　言葉を　口真似する。"
        en:
          brilliant_diamond: "They can learn and speak human words.\nIf they gather, they all learn the same saying."
          shining_pearl: "It keeps rhythm by flicking its tail feathers like\na metronome. It also imitates human speech."
        fr:
          brilliant_diamond: "Il mémorise et répète les mots des êtres humains.\nSi plusieurs de ces Pokémon sont réunis au même\nendroit, ils apprennent tous les mêmes mots."
          shining_pearl: "Ce Pokémon bat la mesure en balançant les\nplumes de sa queue de droite à gauche comme\nun métronome. Il imite le langage humain."
        it:
          brilliant_diamond: "Memorizza e riproduce il linguaggio umano.\nSe forma un gruppo con altri suoi simili,\nimparano tutti le stesse parole."
          shining_pearl: "Batte il tempo muovendo le piume della coda\ncome se fosse un metronomo. Sa imitare\nil linguaggio umano."
        de:
          brilliant_diamond: "Es kann die menschliche Sprache nachahmen.\nSammeln sich mehrere an einem Ort, lernen sie\nalle dieselben Wörter."
          shining_pearl: "Es hält den Takt, indem es seine Schwanzfeder\nwie ein Metronom nach links und rechts schwingt.\nAuch kann es menschliche Sprache nachahmen."
        es:
          brilliant_diamond: "Puede imitar el lenguaje humano. Si se juntan\nvarios, todos aprenden las mismas palabras."
          shining_pearl: "Mantiene el compás agitando la cola como un\nmetrónomo. Imita el habla humana."
        ko:
          brilliant_diamond: "사람의 말을 기억해서 운다.\n동료가 한 장소에 모이면\n모두 똑같은 말을 기억한다."
          shining_pearl: "꽁지를 메트로놈처럼\n좌우로 흔들어 박자를 맞춘다.\n사람의 말을 흉내 낸다."
        zh_simp:
          brilliant_diamond: "学习人类的语言来鸣叫。\n当伙伴们聚集在同一个地方时，\n大家就会学习到同样的词汇。"
          shining_pearl: "会像节拍器一样\n左右摆动尾羽来打拍子。\n还会模仿人类说话。"
        zh_trad:
          brilliant_diamond: "學習人類的語言來鳴叫。\n當夥伴們聚集在同一個地方時，\n大家就會學會同樣的詞語。"
          shining_pearl: "牠會像節拍器一樣，\n左右擺動尾羽來打拍子。\n會模仿人類說話。"
