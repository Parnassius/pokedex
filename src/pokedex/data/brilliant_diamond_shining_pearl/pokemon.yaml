      descriptions:
        jp_kana:
          brilliant_diamond: "しんかに　ひつような　えいようぶんが\nちいさい　たまに　ためられている。\nとても　あまくて　おいしい　らしい。"
          shining_pearl: "ひのひかりで　あかく　いろづく。\nえいようぶんが　すわれて　ちいさい\nたまが　しぼむと　しんかが　ちかい。"
        jp_kanji:
          brilliant_diamond: "進化に　必要な　栄養分が\n小さい　玉に　溜められている。\nとても　甘くて　美味しい　らしい。"
          shining_pearl: "日の光で　赤く　色づく。\n栄養分が　吸われて　小さい　玉が\nしぼむと　進化が　近い。"
        en:
          brilliant_diamond: "The small ball holds the nutrients needed for\nevolution. Apparently, it is very sweet and tasty."
          shining_pearl: "Sunlight colors it red. When the small ball is\ndrained of nutrients and shriveled, evolution\nis near."
        fr:
          brilliant_diamond: "Sa petite boule renferme les nutriments\ndont il a besoin pour évoluer. Il paraît\nqu’elle a un délicieux goût sucré."
          shining_pearl: "Il rougit au soleil. La petite boule se flétrit lorsque\ntous ses nutriments ont été absorbés. Cela signifie\nque le Pokémon va bientôt évoluer."
        it:
          brilliant_diamond: "La sfera più piccola contiene sostanze nutrienti\nnecessarie per l’evoluzione. Dicono che sia molto\ndolce e deliziosa."
          shining_pearl: "La luce solare lo tinge di rosso. Quando la sfera\npiù piccola esaurisce i nutrimenti e si avvizzisce,\nsignifica che l’evoluzione è imminente."
        de:
          brilliant_diamond: "Das kleine Bällchen enthält alle Nährstoffe,\ndie dieses Pokémon zur Entwicklung benötigt,\nund soll sehr süß und lecker schmecken."
          shining_pearl: "Sonnenlicht färbt es rot. Sind die Nährstoffe des\nkleinen Bällchens aufgebraucht, welkt dieses\nund die Entwicklung steht bevor."
        es:
          brilliant_diamond: "La pequeña esfera, dulce y sabrosa, contiene los\nnutrientes necesarios para evolucionar."
          shining_pearl: "Bajo la luz solar es rojo. La esfera pequeña\npierde sus nutrientes y se seca para anunciar\nla evolución."
        ko:
          brilliant_diamond: "진화에 필요한 영양분이\n작은 구슬에 모여 있다.\n매우 달고 맛있는 듯하다."
          shining_pearl: "햇빛으로 빨갛게 물들었다.\n영양분이 흡수되어 작은 구슬이\n시들면 곧 진화한다는 뜻이다."
        zh_simp:
          brilliant_diamond: "进化所需的养分\n都积蓄在小球里。\n据说很甜很好吃。"
          shining_pearl: "在阳光下会渐渐变红。\n吸收养分，小球瘪掉的话，\n就是说快要进化了。"
        zh_trad:
          brilliant_diamond: "進化時所需的養分\n都會儲存在小球裡。\n據說很甜很好吃。"
          shining_pearl: "在陽光下會漸漸變紅。\n當小球的養分被吸收完而變得乾扁時，\n就代表進化的時候快到了。"
