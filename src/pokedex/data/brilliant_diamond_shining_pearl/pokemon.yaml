        - levitate
      descriptions:
        jp_kana:
          brilliant_diamond: "じゅもんのような　なきごえを　だして\nみみにした　あいてを\nずつうや　げんかくで　くるしめる。"
          shining_pearl: "じゅもんを　となえる　ポケモン。\nあいてを　くるしめるもの　だけでなく\nしあわせにする　じゅもんも　ある。"
        jp_kanji:
          brilliant_diamond: "呪文のような　鳴き声を　出して\n耳にした　相手を\n頭痛や　幻覚で　苦しめる。"
          shining_pearl: "じゅもんを　唱える　ポケモン。\n相手を　苦しめるもの　だけでなく\n幸せにする　じゅもんも　ある。"
        en:
          brilliant_diamond: "Its cries sound like incantations.\nThose who hear it are tormented by headaches\nand hallucinations."
          shining_pearl: "It chants incantations. While these incantations\ncan torment targets, some bring happiness."
        fr:
          brilliant_diamond: "Son cri ressemble à une incantation.\nCeux qui l’entendent souffrent\nde migraines et d’hallucinations."
          shining_pearl: "Ce Pokémon psalmodie des incantations.\nIl ne s’agit pas uniquement de malédictions ;\ncertaines portent bonheur."
        it:
          brilliant_diamond: "I suoi versi sembrano incantesimi. Chi li sente\nè tormentato da emicranie e allucinazioni."
          shining_pearl: "Degli incantesimi che recita, alcuni tormentano\nil nemico, ma altri sono in grado di portare\nla felicità."
        de:
          brilliant_diamond: "Sein Ruf klingt wie eine Beschwörung. Wer ihn\nhört, wird sogleich von Kopfschmerzen und\nSinnestäuschungen geplagt."
          shining_pearl: "Es spricht Zauberformeln aus, die Gegnern nicht\nnur schaden, sondern auch Glück bringen können."
        es:
          brilliant_diamond: "Sus gritos parecen cánticos. Quienes los escuchan\npadecen migrañas y alucinaciones."
          shining_pearl: "Recita conjuros. Algunos de ellos atormentan\na sus rivales, mientras que otros producen\nfelicidad."
        ko:
          brilliant_diamond: "주문 같은 울음소리를 내어\n소리를 들은 상대를\n두통이나 환각으로 괴롭힌다."
          shining_pearl: "주문을 외는 포켓몬이다.\n상대를 고통스럽게 하는 것뿐만 아니라\n행복하게 하는 주문도 있다."
        zh_simp:
          brilliant_diamond: "发出咒语般的叫声，\n用头痛和幻觉折磨\n听到叫声的对象。"
          shining_pearl: "吟唱咒语的宝可梦。\n不是只会折磨对手，\n也有会带来幸福的咒语。"
        zh_trad:
          brilliant_diamond: "發出咒語般的叫聲，\n用頭痛及幻覺折磨\n聽見叫聲的對手。"
          shining_pearl: "吟唱咒語的寶可夢。\n不是只會用咒語折磨對手，\n也有能帶來幸福的咒語。"
