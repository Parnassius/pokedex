          shining_pearl: "Si narra che, nelle notti senza luna, questo\nPokémon provochi incubi terrificanti."
        de:
          brilliant_diamond: "Es kann andere in tiefen Schlaf versetzen und\nträumen lassen. In Neumondnächten wird es aktiv."
          shining_pearl: "Laut einer Volkssage verursacht dieses Pokémon\nin mondlosen Nächten schreckliche Alpträume."
        es:
          brilliant_diamond: "Puede sumir a la gente en un sueño profundo y\nhacerles soñar. Está activo en las noches de luna\nnueva."
          shining_pearl: "Las historias populares cuentan que en las noches\nde luna nueva provoca horribles pesadillas."
        ko:
          brilliant_diamond: "사람들을 깊은 잠으로 유인하여\n꿈을 꾸게 하는 능력을 가지고 있다.\n그믐달이 뜨는 밤에 활동한다."
          shining_pearl: "달이 뜨지 않는 밤에는\n다크라이가 무서운 꿈을\n보여 준다는 이야기가 전해진다."
        zh_simp:
          brilliant_diamond: "拥有诱使人们进入深度睡眠\n并做梦的能力。\n在朔月的夜晚活动。"
          shining_pearl: "流传着这样一种说法，\n达克莱伊会在没有月亮的\n夜晚带来恐怖的噩梦。"
        zh_trad:
          brilliant_diamond: "有著引誘人們進入深層睡眠，\n並使其作夢的能力。\n會在新月之夜活動。"
          shining_pearl: "有傳聞說，在沒有月亮的\n夜晚裡，達克萊伊會讓人\n夢見恐怖的夢境。"
