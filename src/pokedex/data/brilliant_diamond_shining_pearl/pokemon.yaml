          shining_pearl: "なんでも　食べるので\n汚い　川や　湖でも　生きていける。\nだれも　注目しない　ポケモン。"
        en:
          brilliant_diamond: "They are famous for their shabby appearance.\nAlthough populous, they tend to cluster in\nset locations."
          shining_pearl: "It eats anything, so it can even live in polluted\nstreams and lakes. No one pays any attention\nto it."
        fr:
          brilliant_diamond: "Ces Pokémon sont connus pour leur apparence\nmiteuse. Il en existe beaucoup, mais ils ont\ntendance à se regrouper aux mêmes endroits."
          shining_pearl: "Il peut vivre même dans les fleuves et les lacs\npollués, car il mange tout et n’importe quoi.\nPersonne ne fait attention à lui."
        it:
          brilliant_diamond: "È noto per il suo misero aspetto. Ce ne sono\nmolti in giro, ma tendono a raggrupparsi tutti\nin un posto solo."
          shining_pearl: "Si nutre di qualsiasi cosa, pertanto vive anche\nin fiumi e laghi inquinati. È un Pokémon a cui\nnessuno presta attenzione."
        de:
          brilliant_diamond: "Dieses Pokémon ist bekannt für sein schäbiges\nÄußeres. Es lebt in großen Gruppen, jedoch nur\nan ganz bestimmten Orten."
          shining_pearl: "Dieses Pokémon wird von kaum jemandem\nbeachtet. Es frisst alles Mögliche und kann daher\nauch in schmutzigen Flüssen und Seen leben."
        es:
          brilliant_diamond: "Se caracteriza por tener un aspecto descuidado.\nSu numerosa población se halla distribuida y\nconcentrada en lugares muy concretos."
          shining_pearl: "Come de todo, por lo que puede vivir incluso en\naguas contaminadas. Nadie le presta atención."
        ko:
          brilliant_diamond: "볼품없는 모습으로 유명하다.\n서식 수는 많지만\n한군데 모여 있는 습성이 있다."
          shining_pearl: "무엇이든 먹기 때문에\n더러운 강이나 호수에서도 살 수 있다.\n누구도 주목하지 않는 포켓몬이다."
        zh_simp:
          brilliant_diamond: "以样子寒酸而闻名。\n尽管数量非常多，\n但还是会聚居在一处。"
          shining_pearl: "什么都吃，所以可以在\n肮脏的河流或湖泊中生存。\n是谁也不会去关注的宝可梦。"
        zh_trad:
          brilliant_diamond: "以樣子寒酸而聞名。\n雖然數量非常多，\n卻有著齊聚一處的習性。"
          shining_pearl: "什麼都吃，所以能在\n骯髒的河川或湖泊裡生存。\n是誰都不會去注意的寶可夢。"
