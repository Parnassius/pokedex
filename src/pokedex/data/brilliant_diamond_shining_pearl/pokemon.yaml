          shining_pearl: "敵に　襲われた　ときは\n顔の　盾で　防壁を　作り\n群れの　子供たちを　守る。"
        en:
          brilliant_diamond: "Any frontal attack is repulsed. It is a docile\nPokémon that feeds on grass and berries."
          shining_pearl: "When attacked, they form a wall with their\nshield-like faces to protect their young."
        fr:
          brilliant_diamond: "Ce Pokémon docile se nourrit d’herbe et\nde Baies. Il résiste à toute attaque frontale."
          shining_pearl: "En cas d’attaque, ils forment un mur défensif\nà l’aide de leurs visages en forme de bouclier\npour protéger les petits du troupeau."
        it:
          brilliant_diamond: "Respinge qualsiasi attacco frontale. È docile\ne si nutre di erba e di bacche."
          shining_pearl: "Se vengono attaccati, formano un muro\nprotettivo con i loro musi per proteggere\ni cuccioli del branco."
        de:
          brilliant_diamond: "Dieses friedliche Pokémon, das sich von Gras und\nBeeren ernährt, schmettert jeden Frontalangriff\nab."
          shining_pearl: "Werden sie angegriffen, bilden sie mit ihren\nGesichtsschilden einen Schutzwall, um den\nNachwuchs der Herde zu beschützen."
        es:
          brilliant_diamond: "Repele cualquier ataque frontal. Es muy dócil y\nse alimenta de hierba y bayas."
          shining_pearl: "Cuando reciben un ataque, forman una barrera\nalineando sus escudos faciales para proteger a\nlas crías de la manada."
        ko:
          brilliant_diamond: "정면에서의 공격은 전부 튕겨 낸다.\n풀이나 나무열매를 먹는\n얌전한 성격이다."
          shining_pearl: "상대에게 습격당했을 때는\n얼굴을 방패로 방벽을 만들어\n무리의 새끼들을 지킨다."
        zh_simp:
          brilliant_diamond: "会反弹掉来自\n正面的全部攻击。\n性格温顺，吃草和树果。"
          shining_pearl: "受到敌人袭击时，会用\n脸上的盾来形成防护墙，\n以保护群里的孩子们。"
        zh_trad:
          brilliant_diamond: "會反彈掉來自\n正面的全部攻擊。\n性情溫順，主食是草和樹果。"
          shining_pearl: "遭受敵人攻擊時，會用\n臉上的盾牌形成防護牆，\n保護群體裡的孩子們。"
