uxie:
  species_id: 480
  names:
    jp_kana: ユクシー
    jp_kanji: ユクシー
    en: Uxie
    fr: Créhelf
    it: Uxie
    de: Selfe
    es: Uxie
    ko: 유크시
    zh_simp: 由克希
    zh_trad: 由克希
  forms:
    uxie:
      form_id: 0
      base_stats:
        hp: 75
        attack: 75
        defense: 130
        special_attack: 75
        special_defense: 130
        speed: 95
      evs_yield:
        hp: 0
        attack: 0
        defense: 2
        special_attack: 0
        special_defense: 1
        speed: 0
      types:
        - psychic
      egg_groups:
        - undiscovered
      abilities:
        - levitate
      descriptions:
        jp_kana:
          brilliant_diamond: "ちしきのかみ　と　よばれている。\nめを　あわせた　ものの　きおくを\nけしてしまう　ちからを　もつという。"
          shining_pearl: "ユクシーの　たんじょうにより\nひとびとの　せいかつを　ゆたかにする\nちえが　うまれたと　いわれている。"
        jp_kanji:
          brilliant_diamond: "知識の神と　呼ばれている。\n目を　合わせた　者の　記憶を\n消してしまう　力を　持つという。"
          shining_pearl: "ユクシーの　誕生により\n人々の　生活を　豊かにする\n知恵が　生まれたと　言われている。"
        en:
          brilliant_diamond: "Known as the Being of Knowledge, it is said that\nit can wipe out the memory of those who see\nits eyes."
          shining_pearl: "It is said that its emergence gave humans the\nintelligence to improve their quality of life."
        fr:
          brilliant_diamond: "On l’appelle « l’être du savoir ». On dit\nqu’il a le pouvoir d’effacer la mémoire\nde ceux qui croisent son regard."
          shining_pearl: "On dit que sa naissance a éveillé les êtres\nhumains à la connaissance nécessaire pour\nenrichir leur existence."
        it:
          brilliant_diamond: "Noto come \"divinità della conoscenza\".\nPare possa cancellare la memoria di chiunque\nincroci il suo sguardo."
          shining_pearl: "Si narra che con la nascita di questo Pokémon\nl’uomo abbia acquisito le conoscenze necessarie\na migliorare la propria esistenza."
        de:
          brilliant_diamond: "Es wird auch das „wissende Wesen“ genannt und\nsoll die Erinnerungen derer löschen können,\ndie ihm in die Augen sehen."
          shining_pearl: "Man sagt, dass sein Erscheinen den Menschen\ndie nötige Weisheit verlieh, um ihr Leben\nverbessern zu können."
        es:
          brilliant_diamond: "Se lo conoce como el Ser de la Sabiduría. Dicen\nque puede borrar la memoria con una mirada."
          shining_pearl: "Se dice que su aparición otorgó a los humanos la\ninteligencia para mejorar sus vidas."
        ko:
          brilliant_diamond: "지식의 신이라 불리고 있다.\n눈을 마주친 사람의 기억을\n지워 버리는 힘을 가지고 있다고 한다."
          shining_pearl: "유크시의 탄생에 의해\n사람들의 생활을 풍요롭게 하는\n지혜가 생겨났다고 전해진다."
        zh_simp:
          brilliant_diamond: "被称为知识之神。\n据说拥有消除与之目光交会者的\n记忆的力量。"
          shining_pearl: "据说，由克希的诞生\n给人类带来了令生活\n变得丰富多彩的智慧。"
        zh_trad:
          brilliant_diamond: "被稱為知識之神。\n擁有將與自己視線相對者的\n記憶消去的力量。"
          shining_pearl: "據說因為由克希的誕生，\n使人們的生活變得\n豐富多彩的智慧才得以出現。"
