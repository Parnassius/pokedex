        jp_kana:
          brilliant_diamond: "きょうれつな　ずつきの　こうげきは\nどんなに　がんじょうな　ものでも\nいちげきで　ふんさいする　いりょく。"
          shining_pearl: "てつのように　かたい　ずがいこつ。\nジャングルの　きぎを　なぎたおし\nえものを　とらえる　あばれんぼう。"
        jp_kanji:
          brilliant_diamond: "強烈な　頭突きの　攻撃は\nどんなに　頑丈な　ものでも\n一撃で　粉砕する　威力。"
          shining_pearl: "鉄のように　硬い　頭蓋骨。\nジャングルの　木々を　なぎ倒し\n獲物を　捕らえる　暴れん坊。"
        en:
          brilliant_diamond: "Its powerful headbutt has enough force\nto shatter even the most durable things\nupon impact."
          shining_pearl: "Its skull is as hard as iron. It is a brute that tears\ndown jungle trees while catching prey."
        fr:
          brilliant_diamond: "Son violent coup de tête est assez puissant\npour pulvériser instantanément les matériaux\nles plus résistants."
          shining_pearl: "Son crâne est dur comme le fer. Cette brute abat\ndes arbres pour attraper ses proies dans la jungle."
        it:
          brilliant_diamond: "Tira testate talmente potenti da frantumare\nin un colpo solo anche gli oggetti più duri."
          shining_pearl: "Il suo cranio è duro come il ferro.\nÈ violento e abbatte gli alberi della giungla\nmentre va a caccia di prede."
        de:
          brilliant_diamond: "Sein gewaltiger Kopfstoß besitzt genug Kraft,\num auch die robustesten Dinge zu zerschmettern."
          shining_pearl: "Sein Schädel ist hart wie Eisen. Auf seiner wilden\nJagd nach Beute reißt es ganze Dschungelbäume\nnieder."
        es:
          brilliant_diamond: "Su potente cabezazo puede hacer añicos\ncualquier cosa, por resistente que sea."
          shining_pearl: "Su cráneo es duro como el hierro. Es tan bruto\nque destroza la jungla cuando persigue presas."
        ko:
          brilliant_diamond: "강력한 박치기 공격은\n아무리 튼튼한 것이라도\n일격에 분쇄하는 위력을 가지고 있다."
          shining_pearl: "두개골이 철처럼 단단하다.\n정글의 나무들을 넘어뜨려서\n먹이를 잡는 난동꾼이다."
        zh_simp:
          brilliant_diamond: "头锤攻击的威力巨大，\n不管多坚固的东西\n也只要一击就能粉碎。"
          shining_pearl: "头盖骨像铁一样坚硬。\n会一路撞倒丛林里的树木捕捉猎物，\n是个粗暴的家伙。"
        zh_trad:
          brilliant_diamond: "牠強烈的頭錘攻擊\n有著不管是多堅固的東西\n都能一擊粉碎的威力。"
          shining_pearl: "頭蓋骨像鐵一般堅硬。\n會撞倒叢林裡的樹木來捕捉獵物，\n是個粗暴的傢伙。"
