          shining_pearl: "Si da media vuelta a la cabeza, significa que está\nenfrascado en sus pensamientos."
        ko:
          brilliant_diamond: "조금이라도 빛이 있으면\n어둠 속에서도 사물을 분간할 수 있는\n특수한 눈을 가지고 있다."
          shining_pearl: "머리가 거꾸로 되어 있을 때는\n매우 어려운 것을\n생각하고 있다는 표시다."
        zh_simp:
          brilliant_diamond: "它的眼睛构造特殊，\n只要有一丝光线，\n就能在黑暗中分辨物体。"
          shining_pearl: "头倒转过来时，\n就表示它在思考\n非常难懂的事情。"
        zh_trad:
