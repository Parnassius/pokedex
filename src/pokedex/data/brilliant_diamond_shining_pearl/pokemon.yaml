          brilliant_diamond: "よるに　その　すがたを　みかけると\nふきつな　できごとが　おきると\nしんじられている　ポケモン。"
          shining_pearl: "ふかい　もりへ　さそいこもうと\nたびびとの　ちかくに　あつまる。\nふこうを　はこぶと　いわれている。"
        jp_kanji:
          brilliant_diamond: "夜に　その　姿を　見かけると\n不吉な　出来事が　起きると\n信じられている　ポケモン。"
          shining_pearl: "深い　森へ　誘いこもうと\n旅人の　近くに　集まる。\n不幸を　運ぶと　言われている。"
        en:
          brilliant_diamond: "It is believed that seeing this Pokémon at night\nwill bring about ominous occurrences."
          shining_pearl: "It appears near travelers to lure them into\ndeep forests. It is said to bring misfortune."
        fr:
          brilliant_diamond: "On dit qu’apercevoir un Cornèbre\nla nuit est de mauvais augure."
          shining_pearl: "Ces Pokémon apparaissent près des voyageurs\net tentent de les attirer en pleine forêt. On dit\nqu’ils portent malheur."
        it:
          brilliant_diamond: "Non sono in pochi a credere che se si incontra\nquesto Pokémon di notte, accadrà di sicuro\nqualcosa di terribile."
          shining_pearl: "Si radunano nelle vicinanze di viaggiatori con\nl’intenzione di attirarli nel fitto della foresta.\nSi dice che portino sfortuna."
        de:
          brilliant_diamond: "Man glaubt, dass es ein böses Vorzeichen sei,\ndieses Pokémon bei Nacht zu erblicken."
          shining_pearl: "Diese Pokémon scharen sich um Wanderer,\num sie tief in den Wald zu locken. Es heißt,\ndass sie Unheil bringen sollen."
        es:
          brilliant_diamond: "Se dice que ver a este Pokémon por la noche es\nseñal de que van a ocurrir cosas terribles."
          shining_pearl: "Se acercan en grupo a los viajeros para intentar\natraerlos a las profundidades del bosque. Dicen\nque este Pokémon porta mala fortuna."
        ko:
          brilliant_diamond: "밤에 그 모습을 보게 되면\n불길한 일이 일어난다고\n여겨지고 있는 포켓몬이다."
          shining_pearl: "깊은 숲속으로 유인하려고\n여행자 근처로 모여든다.\n불행을 가져다준다고 전해진다."
        zh_simp:
          brilliant_diamond: "人们相信如果在晚上\n看到它的身影，\n就会发生不吉利的事。"
          shining_pearl: "为将旅人诱入森林深处\n而聚集在其附近。\n据传会带来不幸。"
        zh_trad:
          brilliant_diamond: "人們相信在晚上\n看到這種寶可夢\n就會發生不吉利的事。"
          shining_pearl: "為了將旅人引誘進森林深處，\n會聚集在旅人周圍。\n據說會帶來不幸。"
slowking:
  species_id: 199
  names:
    jp_kana: ヤドキング
    jp_kanji: ヤドキング
    en: Slowking
    fr: Roigada
    it: Slowking
    de: Laschoking
    es: Slowking
    ko: 야도킹
    zh_simp: 呆呆王
    zh_trad: 呆呆王
  forms:
    slowking:
      form_id: 0
      base_stats:
        hp: 95
        attack: 75
        defense: 80
        special_attack: 100
        special_defense: 110
        speed: 30
      evs_yield:
