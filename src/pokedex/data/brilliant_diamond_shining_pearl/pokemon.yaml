          shining_pearl: "ちょうのうりょくを　はっきすると\nつよい　アルファはを　だして\nせいみつきかいを　こわしてしまう。"
        jp_kanji:
          brilliant_diamond: "ユンゲラーが　そばにいると　テレビに\n不思議な　影が　映る。それを\n見ると　不幸になると　言われる。"
          shining_pearl: "超能力を　発揮すると\n強い　アルファ波を　出して\n精密機械を　壊してしまう。"
        en:
          brilliant_diamond: "If one is nearby, an eerie shadow appears on\nTV screens. Seeing the shadow is said to bring\nbad luck."
          shining_pearl: "When it uses its psychic power, it emits strong\nalpha waves that can ruin precision instruments."
        fr:
          brilliant_diamond: "Une ombre étrange apparaît sur les écrans de\ntélévision lorsqu’il est à proximité. On dit que\nle malheur frappe quiconque la voit."
          shining_pearl: "Lorsqu’il utilise ses pouvoirs psychiques, il émet\nde puissantes ondes alpha qui endommagent\nles instruments de précision."
        it:
          brilliant_diamond: "Si dice che, quando Kadabra è nelle vicinanze,\nalla TV appaiano ombre inquietanti che portano\nsfortuna a chi le guarda."
          shining_pearl: "Quando usa i poteri psichici, emette forti onde\nalfa che possono rovinare strumenti di precisione."
        de:
          brilliant_diamond: "Hält es sich in der Nähe auf, erscheint ein\nseltsamer Schatten auf Fernsehbildschirmen,\ndessen Anblick Unglück bringen soll."
          shining_pearl: "Beim Einsatz seiner Psycho-Kräfte sondert es\nstarke Alphawellen ab, die Präzisionsgeräte\nbeschädigen können."
        es:
          brilliant_diamond: "Su presencia provoca la aparición de una extraña\nsombra en los televisores. Se dice que verla trae\nmala suerte."
          shining_pearl: "Cuando utiliza su poder psíquico, emite\npoderosas ondas alfa que pueden destruir\ninstrumentos de precisión."
        ko:
          brilliant_diamond: "윤겔라가 옆에 있으면 TV에\n이상한 그림자가 비친다.\n그것을 보면 불행해진다고 전해진다."
          shining_pearl: "초능력을 발휘하면\n강한 알파파를 내어\n정밀 기계를 고장 내 버린다."
        zh_simp:
          brilliant_diamond: "勇基拉在身边时，电视上\n会映出不可思议的影子。\n据说看到这影子的人会变得不幸。"
          shining_pearl: "发挥超能力时\n发出的强烈阿尔法波\n会损坏精密器械。"
        zh_trad:
          brilliant_diamond: "只要勇基拉在旁邊，\n電視上就會出現奇異的影子。\n據說看了將會變得不幸。"
          shining_pearl: "發揮超能力時\n釋放出的強烈阿爾法波\n會把精密機器破壞掉。"
