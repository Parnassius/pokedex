          brilliant_diamond: "りょうて　りょうあしを　つかった\nとくしゅな　かくとうわざを　つかう。\nほのおは　いっしょう　きえない。"
          shining_pearl: "あたまで　もえる　ほのおの　ように\nはげしい　せいかくの　ポケモン。\nすばやさでは　だれにも　まけない。"
        jp_kanji:
          brilliant_diamond: "両手　両足を　使った\n特殊な　格闘技を　使う。\n炎は　一生　消えない。"
          shining_pearl: "頭で　燃える　炎の　ように\n激しい　性格の　ポケモン。\n素早さでは　だれにも　負けない。"
        en:
          brilliant_diamond: "It uses a special kind of martial arts involving\nall its limbs. Its fire never goes out."
          shining_pearl: "Its crown of fire is indicative of its fiery nature.\nIt is beaten by none in terms of quickness."
        fr:
          brilliant_diamond: "Il pratique un art martial spécial\nqui tire parti de ses quatre membres.\nSa flamme ne s’éteint jamais."
          shining_pearl: "Un Pokémon au tempérament ardent,\nà l’image des flammes qui brûlent\nsur sa tête. Sa vitesse est inégalée."
        it:
          brilliant_diamond: "Usa un tipo speciale di arte marziale che\ncoinvolge tutti gli arti. La sua fiamma non\nsi estingue mai."
          shining_pearl: "La sua criniera di fuoco è indice della sua natura\nviolenta. Nessuno può batterlo in velocità."
        de:
          brilliant_diamond: "Es wendet eine Kampfkunst an, bei der all seine\nGliedmaßen zum Einsatz kommen. Sein Feuer\nerlischt niemals."
          shining_pearl: "Sein Temperament ist ebenso feurig wie die\nFlamme auf seinem Kopf. Niemand kann ihm\nin Sachen Schnelligkeit das Wasser reichen."
        es:
          brilliant_diamond: "Practica un tipo especial de artes marciales que\nse caracteriza por el empleo de todos sus\nmiembros. Su fuego nunca se extingue."
          shining_pearl: "Su corona de fuego demuestra su naturaleza\nardiente. Nadie le gana en velocidad."
        ko:
          brilliant_diamond: "양팔과 양다리를 활용한\n특수한 격투 기술을 사용한다.\n불꽃은 평생 꺼지지 않는다."
          shining_pearl: "머리에서 타오르는 불꽃처럼\n과격한 성격의 포켓몬이다.\n스피드는 누구에게도 지지 않는다."
        zh_simp:
          brilliant_diamond: "会使出手脚并用的\n特殊格斗招式。\n身上的火焰一生都不会熄灭。"
          shining_pearl: "性格像头上燃烧的\n火焰一样激烈。\n在速度方面无可匹敌。"
        zh_trad:
          brilliant_diamond: "會使用手腳並用的\n獨特格鬥招式。\n火焰一輩子都不會熄滅。"
          shining_pearl: "性格像頭上燃燒的火焰般激烈。\n在速度方面沒有任何\n寶可夢可以匹敵。"
