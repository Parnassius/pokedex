          brilliant_diamond: "しっぽを　うきぶくろにして\nすいちゅうに　もぐる。\nかわぞこの　みずくさが　こうぶつ。"
          shining_pearl: "しっぽの　さきには　みずより　かるい\nあぶらが　つまっているので\nうきぶくろの　かわりに　なるのだ。"
        jp_kanji:
          brilliant_diamond: "しっぽを　浮き袋にして\n水中に　潜る。\n川底の　水草が　好物。"
          shining_pearl: "尻尾の　先には　水より　軽い\n油が　つまっているので\n浮き袋の　かわりに　なるのだ。"
        en:
          brilliant_diamond: "Using its tail as a float, it dives underwater.\nIt likes eating plants that grow in riverbeds."
          shining_pearl: "The tip of its tail is filled with oil that is lighter\nthan water, so it acts as a float."
        fr:
          brilliant_diamond: "Il plonge sous l’eau en se servant de sa queue\ncomme d’un organe de flottaison. Il aime les\nplantes du fond des rivières par-dessus tout."
          shining_pearl: "Le bout de sa queue renferme une huile\nplus légère que l’eau et lui sert d’organe\nde flottaison."
        it:
          brilliant_diamond: "Si tuffa in acqua e usa la coda come galleggiante.\nAma particolarmente mangiare le piante che\ncrescono sul fondo dei fiumi."
          shining_pearl: "La punta della coda contiene un olio più leggero\ndell’acqua, che gli permette di stare a galla."
        de:
          brilliant_diamond: "Beim Tauchen setzt es seinen Schweif als eine Art\nRettungsring ein. Seine Leibspeise sind die\nWasserpflanzen am Flussgrund."
          shining_pearl: "Seine Schweifspitze ist mit Öl gefüllt, das leichter\nals Wasser ist, und dient ihm so als eine Art\nSchwimmring."
        es:
          brilliant_diamond: "Bucea usando su cola a modo de boya. Le gusta\ncomer las plantas del fondo fluvial."
          shining_pearl: "La punta de su cola está llena de un aceite que,\nal ser más ligero que el agua, le permite flotar."
        ko:
          brilliant_diamond: "꼬리를 부낭으로 사용해서\n물속에 잠수한다.\n강바닥의 수초를 좋아한다."
          shining_pearl: "꼬리의 끝에는 물보다 가벼운\n기름이 가득 차 있어서\n부낭 대신 쓸 수 있다."
        zh_simp:
          brilliant_diamond: "尾巴可以当作潜入\n水中时所需的浮囊来用。\n喜欢吃河底的水草。"
          shining_pearl: "尾巴前端贮满了\n比水还轻的油，\n因此能用它来代替浮囊。"
        zh_trad:
          brilliant_diamond: "會將尾巴當成浮囊\n潛入水中。\n喜歡吃河底的水草。"
          shining_pearl: "尾巴前端儲滿了\n比水還輕的油，\n可以用來代替浮囊。"
