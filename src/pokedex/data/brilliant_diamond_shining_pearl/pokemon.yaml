ambipom:
  species_id: 424
  names:
    jp_kana: エテボース
    jp_kanji: エテボース
    en: Ambipom
    fr: Capidextre
    it: Ambipom
    de: Ambidiffel
    es: Ambipom
    ko: 겟핸보숭
    zh_simp: 双尾怪手
    zh_trad: 雙尾怪手
  forms:
    ambipom:
      form_id: 0
      base_stats:
        hp: 75
        attack: 100
        defense: 66
        special_attack: 60
        special_defense: 66
        speed: 115
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 2
      types:
        - normal
      egg_groups:
        - field
      abilities:
        - technician
        - pickup
      hidden_ability: skill_link
      descriptions:
        jp_kana:
          brilliant_diamond: "２ほんの　しっぽで　きのみの　からを\nきように　むいて　たべる。ほんものの\nうでは　ほとんど　つかわなくなった。"
          shining_pearl: "おおぜいの　むれで　こうどうする。\nしっぽを　つなぎあわせて　わっかを\nつくる。ゆうじょうの　しるしらしい。"
        jp_kanji:
          brilliant_diamond: "２本の　尻尾で　木の実の　殻を\n器用に　むいて　食べる。本物の\n腕は　ほとんど　使わなくなった。"
          shining_pearl: "大勢の　群れで　行動する。\n尻尾を　つなぎ合わせて　輪っかを\n作る。友情の　印らしい。"
        en:
          brilliant_diamond: "To eat, it deftly shucks nuts with its two tails.\nIt rarely uses its arms now."
          shining_pearl: "They work in large colonies and make rings by\nlinking their tails, apparently in friendship."
        fr:
          brilliant_diamond: "Ce Pokémon se nourrit de Baies qu’il décortique\nhabilement avec ses deux queues. Il n’utilise\nquasiment plus ses bras."
          shining_pearl: "Ces Pokémon agissent en grands groupes.\nIls relient leurs queues et se mettent en cercle,\nvraisemblablement en signe d’amitié."
        it:
          brilliant_diamond: "Si nutre di bacche che sbuccia abilmente\ncon le due code. Ormai usa raramente\nle sue vere braccia."
          shining_pearl: "Vive in colonie numerose e forma anelli legando\nle code con gli altri in segno di amicizia."
        de:
          brilliant_diamond: "Wenn es hungrig ist, knackt es mit seinen beiden\nSchweifen geschickt Nüsse. Seine eigentlichen\nArme verwendet es kaum noch."
          shining_pearl: "Sie agieren in großen Kolonien. Wenn sie ihre\nSchweife verbinden und so Ringe bilden, gilt dies\noffenbar als Zeichen der Freundschaft."
        es:
          brilliant_diamond: "Para comer, casca hábilmente nueces con las dos\ncolas. Rara vez utiliza los brazos."
          shining_pearl: "Habitan en grandes colonias y forman anillos\nuniendo las colas, aparentemente en signo de\namistad."
        ko:
          brilliant_diamond: "2개의 꼬리로 나무열매 껍질을\n솜씨 좋게 벗겨 먹는다.\n진짜 팔은 거의 쓰지 않게 되었다."
          shining_pearl: "많은 무리로 행동한다.\n꼬리를 맞잡아 원을 만든다.\n우정의 표시인 듯하다."
        zh_simp:
          brilliant_diamond: "能用２根尾巴灵活地\n剥掉树果的壳来进食。\n真正的手臂几乎不怎么用了。"
          shining_pearl: "以庞大的群体进行行动。\n把尾巴紧紧连在一起做成环。\n就像是友情的证明。"
        zh_trad:
          brilliant_diamond: "會用２根尾巴靈活地\n剝掉樹果的殼來進食。\n真正的手臂幾乎沒有在用了。"
          shining_pearl: "以龐大的群體來行動。\n會將尾巴連在一起形成圓環。\n這似乎是友情的象徵。"
drifloon:
  species_id: 425
  names:
    jp_kana: フワンテ
    jp_kanji: フワンテ
    en: Drifloon
    fr: Baudrive
    it: Drifloon
    de: Driftlon
    es: Drifloon
    ko: 흔들풍손
    zh_simp: 飘飘球
    zh_trad: 飄飄球
  forms:
    drifloon:
      form_id: 0
      base_stats:
        hp: 90
        attack: 50
        defense: 34
        special_attack: 60
        special_defense: 44
        speed: 70
      evs_yield:
        hp: 1
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ghost
        - flying
      egg_groups:
        - amorphous
      abilities:
        - aftermath
        - unburden
      hidden_ability: flare_boost
      descriptions:
        jp_kana:
          brilliant_diamond: "ひとや　ポケモンの　たましいが\nかたまって　うまれた　ポケモン。\nジメジメした　きせつが　だいすき。"
          shining_pearl: "あのよへ　つれていこうとして\nこどもの　てを　ひっぱろうとするが\nはんたいに　ふりまわされてしまう。"
        jp_kanji:
          brilliant_diamond: "人や　ポケモンの　魂が\n固まって　生まれた　ポケモン。\nジメジメした　季節が　大好き。"
          shining_pearl: "あの世へ　連れていこうとして\n子供の　手を　引っ張ろうとするが\n反対に　振りまわされてしまう。"
        en:
          brilliant_diamond: "It is a Pokémon formed by the spirits of people\nand Pokémon. It loves damp, humid seasons."
          shining_pearl: "It tugs on the hands of children to spirit them\naway. However, it gets pulled around instead."
        fr:
          brilliant_diamond: "Ce Pokémon est né de l’agglomération\nd’âmes d’êtres humains et de Pokémon.\nIl aime les saisons humides."
          shining_pearl: "Il tente d’emmener les enfants dans l’au-delà\nen les tirant par les mains, mais ce sont eux\nqui finissent par l’entraîner où ils veulent."
        it:
          brilliant_diamond: "È nato dall’unione tra le anime degli esseri umani\ne dei Pokémon. Ama le stagioni umide."
          shining_pearl: "Cerca di portare i bambini nell’aldilà afferrandoli\nper le mani, ma alla fine sono loro che se lo\nportano in giro."
        de:
          brilliant_diamond: "Driftlon entstand aus den Seelen von Menschen\nund Pokémon. Es mag feuchte Jahreszeiten."
          shining_pearl: "Es versucht, Kinder an der Hand ins Jenseits zu\nzerren, wird jedoch letztlich stets von ihnen durch\ndie Gegend gezogen."
        es:
          brilliant_diamond: "Está formado por los espíritus de personas y\nPokémon. Le encantan las estaciones húmedas."
          shining_pearl: "Agarra las manos de los niños para llevárselos\nal otro mundo, pero siempre son estos los que\nacaban arrastrándolo a él."
        ko:
          brilliant_diamond: "사람이나 포켓몬의 영혼이\n한데 모여 태어난 포켓몬이다.\n습기 많은 계절을 매우 좋아한다."
          shining_pearl: "저승으로 데려가려고\n아이의 손을 끌어당기지만\n반대로 자기가 끌려다닌다."
        zh_simp:
          brilliant_diamond: "人或宝可梦的魂魄\n聚集在一起后生成的宝可梦。\n非常喜欢湿哒哒的季节。"
          shining_pearl: "它会去拉小孩的手，\n想将其带到另一个世界去，\n但却反被抓着甩来甩去。"
        zh_trad:
          brilliant_diamond: "人或寶可夢的靈魂\n聚集起來所誕生的寶可夢。\n最喜歡濕答答的季節。"
          shining_pearl: "會去拉小孩子的手，\n想將對方帶往另一個世界，\n但卻常常反被抓起來揮甩。"
