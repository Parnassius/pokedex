      descriptions:
        jp_kana:
          brilliant_diamond: "どうもうな　せいかくの　ポケモン。\nじぶんよりも　からだの　おおきい\nあいてにも　かかんに　いどみかかる。"
          shining_pearl: "つばさと　あしの　きんにくが　つよく\nちいさな　ポケモンを　つかんだまま\nらくらくと　とぶことが　できる。"
        jp_kanji:
          brilliant_diamond: "獰猛な　性格の　ポケモン。\n自分よりも　体の　大きい\n相手にも　果敢に　挑みかかる。"
          shining_pearl: "翼と　脚の　筋肉が　強く\n小さな　ポケモンを　つかんだまま\nらくらくと　飛ぶことが　できる。"
        en:
          brilliant_diamond: "It has a savage nature. It will courageously\nchallenge foes that are much larger than itself."
          shining_pearl: "The muscles in its wings and legs are strong.\nIt can easily fly while gripping a small Pokémon."
        fr:
          brilliant_diamond: "Un Pokémon féroce qui a le courage de défier\ndes ennemis beaucoup plus grands que lui."
          shining_pearl: "Grâce aux puissants muscles de ses ailes\net de ses pattes, il peut facilement voler\ntout en agrippant un petit Pokémon."
        it:
          brilliant_diamond: "È un Pokémon feroce che sfida senza pensarci\ndue volte anche i nemici più grossi di lui."
          shining_pearl: "I muscoli di ali e zampe sono molto sviluppati.\nVola senza fatica anche trasportando con sé\ni piccoli Pokémon che cattura."
        de:
          brilliant_diamond: "Dieses grausame Pokémon fordert immer wieder\nGegner heraus, die viel größer sind als es selbst."
          shining_pearl: "Die Muskeln in seinen Flügeln und Beinen sind so\nstark, dass es im Flug mühelos kleinere Pokémon\ntragen kann, indem es sie mit den Klauen festhält."
        es:
          brilliant_diamond: "Tiene un carácter salvaje. No duda en desafiar a\nrivales mucho mayores."
          shining_pearl: "Tiene los músculos de las alas y las patas muy\ndesarrollados. Puede llevarse volando Pokémon\npequeños con suma facilidad."
        ko:
          brilliant_diamond: "사나운 성격의 포켓몬이다.\n자신보다 몸집이 큰\n상대에게도 과감하게 도전한다."
          shining_pearl: "날개와 발의 근육이 강해\n작은 포켓몬을 붙잡은 채로\n너끈히 날 수 있다."
        zh_simp:
          brilliant_diamond: "性格凶猛的宝可梦。\n即使遇到体型比自己大的对手，\n也会果敢地上前挑战。"
          shining_pearl: "翅膀和脚的肌肉很发达，\n能抓着小的宝可梦\n轻轻松松地飞行。"
        zh_trad:
          brilliant_diamond: "性格凶猛的寶可夢。\n即使是體型比自己大的對手，\n也會果敢地發起挑戰。"
          shining_pearl: "翅膀和腳的肌肉很發達，\n能夠抓著小型的寶可夢\n輕輕鬆鬆地飛行。"
