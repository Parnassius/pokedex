          brilliant_diamond: "３びきが　ひとつになった　ポケモン。\nビークインのために　せっせと\nはなの　あまい　ミツを　はこぶ。"
          shining_pearl: "あつめた　ミツを　すみかに　はこぶ。\nよるには　たくさんの　ミツハニーが\nかさなって　はちのすになり　ねむる。"
        jp_kanji:
          brilliant_diamond: "３匹が　ひとつになった　ポケモン。\nビークインのために　せっせと\n花の　甘い　ミツを　運ぶ。"
          shining_pearl: "集めた　ミツを　住処に　運ぶ。\n夜には　たくさんの　ミツハニーが\n重なって　ハチの巣になり　眠る。"
        en:
          brilliant_diamond: "Three Pokémon joined to become one. It busily\ncarries sweet nectar to Vespiquen."
          shining_pearl: "They collect and deliver honey to their colony.\nAt night, they cluster to form a beehive\nand sleep."
        fr:
          brilliant_diamond: "Ce Pokémon est composé d’un trio.\nIl est toujours occupé à apporter\ndu nectar de fleur à Apireine."
          shining_pearl: "Ces Pokémon récoltent le nectar et le rapportent\nchez eux. La nuit, ils s’entassent pour former\nune ruche avant de s’endormir."
        it:
          brilliant_diamond: "È formato da tre Pokémon. Si dà un gran daffare\na trasportare il nettare dei fiori per Vespiquen."
          shining_pearl: "Trasporta il nettare che raccoglie fino al nido.\nDi notte si riunisce con i suoi simili per formare\nun alveare e dormire."
        de:
          brilliant_diamond: "Es besteht aus drei einzelnen Pokémon und bringt\nfleißig Blütennektar zu Honweisel."
          shining_pearl: "Es sammelt Nektar und bringt diesen in seine\nKolonie. Nachts formiert es sich zum Schlafen\nmit Artgenossen zu einem Bienenstock."
        es:
          brilliant_diamond: "Está formado por tres Pokémon. Se dedica a\nrecolectar laboriosamente el néctar de las flores\npara Vespiquen."
          shining_pearl: "Recolectan miel y la almacenan en su colonia.\nPor la noche, se apiñan para formar una colmena\ny dormir."
        ko:
          brilliant_diamond: "3마리가 하나가 된 포켓몬이다.\n비퀸을 위해서 부지런히\n꽃의 달콤한 꿀을 나른다."
          shining_pearl: "모은 꿀을 거처로 운반한다.\n밤에는 많은 세꿀버리가\n겹쳐져 벌집이 되어 잠잔다."
        zh_simp:
          brilliant_diamond: "３只合为一只的宝可梦。\n一直在为蜂女王\n辛勤搬运甜甜的花蜜。"
          shining_pearl: "会把采集到的花蜜搬运到住处。\n在夜里，许多三蜜蜂会重重叠叠\n形成蜂巢后睡觉。"
        zh_trad:
          brilliant_diamond: "３隻合為１隻的寶可夢。\n會為了蜂女王勤勞地\n搬運甜甜的花蜜。"
          shining_pearl: "會把採集到的花蜜搬運到住處。\n在夜裡，許多三蜜蜂會疊在一起，\n形成蜂巢後睡覺。"
