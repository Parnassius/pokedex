        jp_kana:
          brilliant_diamond: "おしりから　きょうれつに　くさい\nえきたいを　とばして　みを　まもる。\nにおいは　２４じかん　きえない。"
          shining_pearl: "はなが　まがるほど　ひどい　においの\nえきたいを　おしりから　ふきだして\nおそってきた　てきを　おいはらう。"
        jp_kanji:
          brilliant_diamond: "お尻から　強烈に　くさい　液体を\n飛ばして　身を　守る。\nにおいは　２４時間　消えない。"
          shining_pearl: "鼻が　曲がるほど　酷い　においの\n液体を　お尻から　吹き出して\n襲ってきた　敵を　追い払う。"
        en:
          brilliant_diamond: "It protects itself by spraying a noxious fluid from\nits rear. The stench lingers for 24 hours."
          shining_pearl: "It sprays a nose-curling, stinky fluid from its rear\nto repel attackers."
        fr:
          brilliant_diamond: "Il se protège en expulsant un fluide pestilentiel\npar son derrière. La puanteur perdure vingt-quatre\nheures."
          shining_pearl: "Son derrière projette un fluide d’une puanteur\nabominable qu’il utilise pour repousser l’ennemi."
        it:
          brilliant_diamond: "Si protegge spruzzando un fluido puzzolente\ndal posteriore. Il tanfo permane per 24 ore."
          shining_pearl: "Spruzza un fluido puzzolente e disgustoso\ndal posteriore per allontanare i nemici\nche lo vogliono attaccare."
        de:
          brilliant_diamond: "Zum Schutz versprüht es eine enorm stinkende\nFlüssigkeit aus seinem Hinterleib, deren Geruch\n24 Stunden lang anhält."
          shining_pearl: "Um Angreifer zu vertreiben, versprüht es eine\nübel riechende Flüssigkeit aus seinem Hinterleib."
        es:
          brilliant_diamond: "Se protege expulsando un fluido nocivo por el\ntrasero. El hedor dura 24 horas."
          shining_pearl: "Expulsa un líquido de olor nauseabundo por\nel trasero para repeler a sus atacantes."
        ko:
          brilliant_diamond: "엉덩이에서 강렬한 구린내의\n액체를 날려서 몸을 지킨다.\n냄새가 24시간 사라지지 않는다."
          shining_pearl: "코를 틀어막을 정도로 심한 냄새가 나는\n액체를 엉덩이에서 뿜어내어\n습격해 온 적을 쫓아 버린다."
        zh_simp:
          brilliant_diamond: "从屁屁喷出具有强烈臭味的\n液体保护自己。\n气味２４小时内都不会消散。"
          shining_pearl: "从屁股喷射出\n恶臭扑鼻的液体，\n以此击退来袭的敌人。"
        zh_trad:
          brilliant_diamond: "從屁股噴出帶有強烈臭味的\n液體來保護自己。\n氣味在２４小時內都不會消散。"
          shining_pearl: "會從屁股噴出\n惡臭撲鼻的液體，\n趕走來襲的敵人。"
