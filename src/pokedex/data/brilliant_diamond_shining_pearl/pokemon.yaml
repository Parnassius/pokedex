        jp_kana:
          brilliant_diamond: "まんねんゆきの　つもる　やまで\nくらし　ブリザードを　まきおこす。\nゆきおとこの　しょうたいだ。"
          shining_pearl: "ブリザードを　はっせいさせて　あたり\nいちめんを　まっしろに　してしまう。\nべつめい　アイスモンスター。"
        jp_kanji:
          brilliant_diamond: "万年雪の　積もる　山で\n暮らし　ブリザードを　巻き起こす。\n雪男の　正体だ。"
          shining_pearl: "ブリザードを　発生させて　あたり\n一面を　真っ白に　してしまう。\n別名　アイスモンスター。"
        en:
          brilliant_diamond: "It whips up blizzards in mountains that are always\nburied in snow. It is the abominable snowman."
          shining_pearl: "It blankets wide areas in snow by whipping up\nblizzards. It is also known as the Ice Monster."
        fr:
          brilliant_diamond: "L’abominable homme des neiges, c’est lui.\nIl vit dans les montagnes recouvertes de neiges\néternelles, et déclenche des blizzards."
          shining_pearl: "Il provoque des blizzards qui recouvrent\nles alentours de neige. On l’appelle aussi\n« le monstre des glaces »."
        it:
          brilliant_diamond: "Crea tormente sui monti ricoperti da nevi\nperenni. È l’abominevole uomo delle nevi."
          shining_pearl: "Crea bufere che ricoprono di neve ampissime\naree. È noto anche come \"mostro dei ghiacci\"."
        de:
          brilliant_diamond: "Dieses Pokémon lebt auf Bergen, wo ewiger\nSchnee liegt, und löst dort Blizzards aus. Mitunter\nwird es für einen Schneemenschen gehalten."
          shining_pearl: "Dieses Pokémon wird auch das „Eismonster“\ngenannt und bedeckt weite Gebiete mit Schnee,\nindem es Schneestürme hervorruft."
        es:
          brilliant_diamond: "Es el abominable hombre de las nieves. Levanta\nventiscas en las montañas de nieves perpetuas."
          shining_pearl: "Genera ventiscas con las que cubre de nieve\ngrandes áreas. Lo llaman el Monstruo de Hielo."
        ko:
          brilliant_diamond: "만년설이 쌓인 산에서 살며\n블리자드를 일으킨다.\n설인의 정체가 바로 눈설왕이다."
          shining_pearl: "블리자드를 발생시켜\n주변 일대를 새하얗게 만든다.\n별명은 아이스 몬스터다."
        zh_simp:
          brilliant_diamond: "生活在万年积雪的山上，\n会引发暴风雪。\n雪男的正身就是它。"
          shining_pearl: "会引发暴风雪，\n让周围变得一片雪白。\n别名叫冰雪怪物。"
        zh_trad:
          brilliant_diamond: "生活在萬年積雪的山中，\n會引發暴風雪。\n雪男的原形就是牠。"
          shining_pearl: "會引發暴風雪，\n讓四周變成一片雪白。\n別名是冰雪怪獸。"
