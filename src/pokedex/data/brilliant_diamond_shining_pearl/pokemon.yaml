          shining_pearl: "따뜻한 바다에 사는 포켓몬이다.\n머리의 부낭을 부풀려서\n파도 사이를 떠돌며 먹이를 찾는다."
        zh_simp:
          brilliant_diamond: "栖息在温暖的海里。\n会让头部的浮囊膨胀起来，\n漂浮在波涛间寻找食物。"
          shining_pearl: "栖息在温暖的海里。\n会让头部的浮囊膨胀起来，\n漂浮在波涛间寻找食物。"
