      descriptions:
        jp_kana:
          brilliant_diamond: "あたまを　ぜんごに　ゆすって\nしょっかくを　ぶつけあうことで\nもっきんのような　おとを　ならす。"
          shining_pearl: "しょっかくを　ぶつけあって　ならす\nおとで　なかまと　かいわをする。\nねいろは　あきの　よの　ふうぶつし。"
        jp_kanji:
          brilliant_diamond: "頭を　前後に　揺すって\n触角を　ぶつけ合うことで\n木琴のような　音を　鳴らす。"
          shining_pearl: "触角を　ぶつけ合って　鳴らす　音で\n仲間と　会話をする。\n音色は　秋の　夜の　風物詩。"
        en:
          brilliant_diamond: "It shakes its head back to front, causing its\nantennae to hit each other and sound like\na xylophone."
          shining_pearl: "It chats with others using the sounds of\nits colliding antennae. These sounds are\nthe hallmarks of fall evenings."
        fr:
          brilliant_diamond: "Quand il bascule sa tête d’avant\nen arrière, ses antennes se heurtent\net émettent un son de xylophone."
          shining_pearl: "Il communique avec ses congénères grâce au\ntintement de ses antennes, qu’il frotte entre\nelles. Ce son est associé aux nuits d’automne."
        it:
          brilliant_diamond: "Muove la testa avanti e indietro e le antenne,\nscontrandosi, producono un suono simile a\nquello di uno xilofono."
          shining_pearl: "Comunica con i suoi simili tramite il suono\nprodotto dallo sfregamento delle antenne.\nLe sue note annunciano l’arrivo dell’autunno."
        de:
          brilliant_diamond: "Schüttelt es den Kopf vor und zurück, schlagen\nseine Antennen gegeneinander und erzeugen\nLaute, die wie ein Xylophon klingen."
          shining_pearl: "Die Töne, die es durch Aneinanderschlagen der\nAntennen erzeugt, dienen der Kommunikation.\nDer Klang ist typisch für Herbstnächte."
        es:
          brilliant_diamond: "Al agitar la cabeza de atrás hacia delante, sus\nantenas chocan y suenan como un xilófono."
          shining_pearl: "Se comunican entre sí chocando las antenas. Los\nsonidos producidos son muy característicos de\nlas noches otoñales."
        ko:
          brilliant_diamond: "머리를 전후로 흔들어\n더듬이를 서로 부딪치며\n실로폰 같은 소리를 낸다."
          shining_pearl: "더듬이를 서로 부딪쳐 내는 소리로\n동료와 대화한다.\n음색은 가을밤의 정취를 잘 나타낸다."
        zh_simp:
          brilliant_diamond: "前后摇晃头部让触角\n相互碰撞的话，就会\n奏出木琴一般的声响。"
          shining_pearl: "用互相撞击触角发出的声音\n和伙伴对话。\n那音色是秋夜的风景诗。"
        zh_trad:
          brilliant_diamond: "會前後搖動頭部\n讓觸角互相碰撞，\n以此發出如木琴般的聲響。"
          shining_pearl: "用互相撞擊觸角發出的聲音\n和夥伴對話。\n那音色可說是秋夜的象徵。"
