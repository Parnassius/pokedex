turtwig:
  species_id: 387
  names:
    jp_kana: ナエトル
    jp_kanji: ナエトル
    en: Turtwig
    fr: Tortipouss
    it: Turtwig
    de: Chelast
    es: Turtwig
    ko: 모부기
    zh_simp: 草苗龟
    zh_trad: 草苗龜
  forms:
    turtwig:
      form_id: 0
      base_stats:
        hp: 55
        attack: 68
        defense: 64
        special_attack: 45
        special_defense: 55
        speed: 31
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - grass
      egg_groups:
        - monster
        - grass
      abilities:
        - overgrow
      hidden_ability: shell_armor
      descriptions:
        jp_kana:
          brilliant_diamond: "つちで　できた　せなかの　こうらは\nみずを　のむと　さらに　かたくなる。\nみずうみの　ほとりで　くらしている。"
          shining_pearl: "ぜんしんで　こうごうせいを　して\nさんそを　つくる。のどが　かわくと\nあたまの　はっぱが　しおれてしまう。"
        jp_kanji:
          brilliant_diamond: "土で　できた　背中の　甲羅は\n水を　飲むと　さらに　硬くなる。\n湖の　ほとりで　暮らしている。"
          shining_pearl: "全身で　光合成を　して\n酸素を　作る。のどが　渇くと\n頭の　葉っぱが　しおれてしまう。"
        en:
          brilliant_diamond: "Made from soil, the shell on its back hardens\nwhen it drinks water. It lives along lakes."
          shining_pearl: "It undertakes photosynthesis within its body,\nmaking oxygen. The leaf on its head wilts if the\nPokémon is thirsty."
        fr:
          brilliant_diamond: "Ce Pokémon vit sur les rives des lacs.\nIl est doté d’une carapace en terre\nqui se durcit lorsqu’il s’abreuve."
          shining_pearl: "Son corps produit de l’oxygène\npar photosynthèse. Les feuilles sur\nsa tête se flétrissent quand il a soif."
        it:
          brilliant_diamond: "Il suo guscio fatto di terra diventa ancora più\nduro quando il Pokémon beve. Vive sulle rive\ndei laghi."
          shining_pearl: "Tutto il suo corpo è in grado di svolgere\nla fotosintesi e di produrre ossigeno.\nLe sue foglie appassiscono se ha sete."
        de:
          brilliant_diamond: "Der Panzer auf seinem Rücken besteht aus Lehm\nund wird härter, wenn das Pokémon Wasser trinkt.\nEs lebt am Ufer von Seen."
          shining_pearl: "Sein Körper erzeugt durch Photosynthese\nSauerstoff. Ist es durstig, welken die Blätter\nauf seinem Kopf."
        es:
          brilliant_diamond: "La concha de su espalda es de tierra y se\nendurece cuando bebe agua. Vive cerca de los\nlagos."
          shining_pearl: "Realiza la fotosíntesis con todo el cuerpo para\nobtener oxígeno. Cuando tiene sed, las hojas de\nla cabeza se marchitan."
        ko:
          brilliant_diamond: "흙으로 만들어진 등껍질은\n물을 마시면 한층 단단해진다.\n호수 근처에서 살고 있다."
          shining_pearl: "전신으로 광합성을 하여\n산소를 만든다. 목이 마르면\n머리의 잎사귀가 시들어 버린다."
        zh_simp:
          brilliant_diamond: "背上的甲壳是由泥土形成的，\n喝水之后会变得更硬。\n栖息在湖泊边。"
          shining_pearl: "用全身进行光合作用，\n制造氧气。如果口渴，\n头上的叶子就会枯萎。"
        zh_trad:
          brilliant_diamond: "背上的甲殼是由泥土形成的，\n喝水之後就會變得更硬。\n平時生活在湖邊。"
          shining_pearl: "用全身進行光合作用，\n製造氧氣。當口渴的時候，\n頭上的葉子就會枯萎。"
grotle:
  species_id: 388
  names:
    jp_kana: ハヤシガメ
    jp_kanji: ハヤシガメ
    en: Grotle
    fr: Boskara
    it: Grotle
    de: Chelcarain
    es: Grotle
    ko: 수풀부기
    zh_simp: 树林龟
    zh_trad: 樹林龜
  forms:
    grotle:
      form_id: 0
      base_stats:
        hp: 75
        attack: 89
        defense: 85
        special_attack: 55
        special_defense: 65
        speed: 36
      evs_yield:
        hp: 0
        attack: 1
        defense: 1
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - grass
      egg_groups:
        - monster
        - grass
      abilities:
        - overgrow
      hidden_ability: shell_armor
      descriptions:
        jp_kana:
          brilliant_diamond: "もりの　なかの　みずべで　くらす。\nひるまは　もりの　そとに　でて\nこうらの　きに　ひかりを　あてる。"
          shining_pearl: "こうらは　つちが　かたまった　もの。\nじゅもくに　なった　みを　ついばみに\nやってくる　ポケモンも　いる。"
        jp_kanji:
          brilliant_diamond: "森の　中の　水辺で　暮らす。\n昼間は　森の　外に　出て\n甲羅の　木に　光を　当てる。"
          shining_pearl: "甲羅は　土が　固まった　もの。\n樹木に　なった　実を　ついばみに\nやってくる　ポケモンも　いる。"
        en:
          brilliant_diamond: "It lives along water in forests. In the daytime,\nit leaves the forest to sunbathe the trees on\nits shell."
          shining_pearl: "Its shell is hardened soil. Some Pokémon come to\npeck the berries growing on the trees on its back."
        fr:
          brilliant_diamond: "Il vit en forêt, près de l’eau. La journée, il en\nsort pour exposer les arbres de sa carapace\nà la lumière."
          shining_pearl: "Sa carapace est composée de terre durcie.\nCertains Pokémon picorent les Baies des arbres\nsur son dos."
        it:
          brilliant_diamond: "Vive in prossimità dell’acqua nel cuore\ndelle foreste, ma di giorno esce allo scoperto\nper far prendere sole alle piante sul guscio."
          shining_pearl: "Il suo guscio è fatto di terra indurita. Le bacche\ndelle piante sulla sua schiena sono molto amate\nda alcuni Pokémon."
        de:
          brilliant_diamond: "Es lebt in der Nähe von Gewässern im Wald.\nTagsüber verlässt es diesen, um die Bäume auf\nseinem Panzer im Sonnenlicht zu baden."
          shining_pearl: "Sein Panzer besteht aus erhärtetem Lehm.\nManche Pokémon naschen gerne von den Beeren,\ndie an den Bäumen auf seinem Rücken wachsen."
        es:
          brilliant_diamond: "Vive en los bosques cerca del agua. De día, sale\na que les dé el sol a las plantas de la espalda."
          shining_pearl: "Su concha está compuesta de tierra endurecida.\nAlgunos Pokémon picotean las bayas de los\narbustos que le crecen en el lomo."
        ko:
          brilliant_diamond: "숲속의 물가에서 산다.\n낮에는 숲 밖으로 나와서\n등껍질의 나무에 빛을 쬔다."
          shining_pearl: "등껍질은 흙이 굳어진 것이다.\n수목에 열린 나무열매를 쪼려고\n오는 포켓몬도 있다."
        zh_simp:
          brilliant_diamond: "生活在森林中的水边。\n白天会去森林的外面，\n让甲壳上的树木晒晒阳光。"
          shining_pearl: "它的甲壳是泥土变硬后\n形成的。有些宝可梦会来\n啄食甲壳上树木所结的果子。"
        zh_trad:
          brilliant_diamond: "生活在森林中的水邊。\n白天會去森林的外面，\n讓甲殼上的樹木曬曬太陽。"
          shining_pearl: "牠的甲殼是泥土硬化而成的。\n也有些寶可夢會前來啄食\n牠甲殼上的樹木結出的果實。"
torterra:
  species_id: 389
  names:
    jp_kana: ドダイトス
    jp_kanji: ドダイトス
    en: Torterra
    fr: Torterra
    it: Torterra
    de: Chelterrar
    es: Torterra
    ko: 토대부기
    zh_simp: 土台龟
    zh_trad: 土台龜
  forms:
    torterra:
      form_id: 0
      base_stats:
        hp: 95
        attack: 109
        defense: 105
        special_attack: 75
        special_defense: 85
        speed: 56
      evs_yield:
        hp: 0
        attack: 2
        defense: 1
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - grass
        - ground
      egg_groups:
        - monster
        - grass
      abilities:
        - overgrow
      hidden_ability: shell_armor
      descriptions:
        jp_kana:
          brilliant_diamond: "ちいさな　ポケモンたちが　あつまり\nうごかない　ドダイトスの　せなかで\nすづくりを　はじめることがある。"
          shining_pearl: "いどうする　もりの　しょうたいは\nみずを　さがして　すみかを　うつす\nドダイトスの　むれだ。"
        jp_kanji:
          brilliant_diamond: "小さな　ポケモンたちが　集まり\n動かない　ドダイトスの　背中で\n巣作りを　はじめることがある。"
          shining_pearl: "移動する　森の　正体は\n水を　探して　住処を移す\nドダイトスの　群れだ。"
        en:
          brilliant_diamond: "Small Pokémon occasionally gather on its\nunmoving back to begin building their nests."
          shining_pearl: "Groups of this Pokémon migrating in search of\nwater have been mistaken for moving forests."
        fr:
          brilliant_diamond: "Il arrive que de petits Pokémon se rassemblent\nsur le dos d’un Torterra immobile et commencent\nà y faire leur nid."
          shining_pearl: "Certains groupes de Torterra qui migrent\nen quête d’eau ont été pris pour des forêts\nvivantes."
        it:
          brilliant_diamond: "Pokémon di piccole dimensioni si radunano\ntalvolta sul suo dorso immobile per costruirvi\nla loro tana."
          shining_pearl: "Gruppi di questi Pokémon che migrano in cerca\ndi acqua sono stati scambiati per foreste viventi."
        de:
          brilliant_diamond: "Kleine Pokémon versammeln sich manchmal auf\nseinem reglosen Rücken und beginnen dort mit\ndem Nestbau."
          shining_pearl: "Manchmal werden Herden von Chelterrar,\ndie auf der Suche nach Wasser umherstreifen,\nfür wandernde Wälder gehalten."
        es:
          brilliant_diamond: "Algunos Pokémon pequeños se juntan en su\nespalda inmóvil para hacer sus nidos."
          shining_pearl: "Muchos confunden los grupos de Torterra que\nmigran en busca de agua con bosques vivientes."
        ko:
          brilliant_diamond: "작은 포켓몬들이 모여\n움직이지 않는 토대부기의 등에서\n둥지를 만들려고 하는 경우가 있다."
          shining_pearl: "이동하는 숲의 정체는\n물을 찾아서 거처를 옮기는\n토대부기의 무리다."
        zh_simp:
          brilliant_diamond: "有时候小小的宝可梦们\n会聚集起来，在一动不动的\n土台龟的背上建造巢穴。"
          shining_pearl: "会移动的森林其实就是\n为了寻找水源而\n迁徙的土台龟群。"
        zh_trad:
          brilliant_diamond: "有時候小型的寶可夢們\n會聚集起來，在一動不動的\n土台龜背上築起巢穴。"
          shining_pearl: "移動的森林其實是\n為尋求水源而正在\n搬家的土台龜們。"
chimchar:
