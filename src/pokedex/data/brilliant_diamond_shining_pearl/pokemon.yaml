      descriptions:
        jp_kana:
          brilliant_diamond: "むしポケモンを　ねらって\nもりや　そうげんを　とびまわる。\nおおきな　むれで　こうどうする。"
          shining_pearl: "もりや　そうげんに　せいそく。\nグループが　でくわすと　なわばりを\nかけた　あらそいが　はじまる。"
        jp_kanji:
          brilliant_diamond: "虫ポケモンを　狙って\n森や　草原を　飛びまわる。\n大きな　群れで　行動する。"
          shining_pearl: "森や　草原に　生息。\nグループが　出くわすと　なわばりを\nかけた　争いが　はじまる。"
        en:
          brilliant_diamond: "They fly around forests and fields in search of\nbug Pokémon, moving together in huge flocks."
          shining_pearl: "They live in forests and fields. Squabbles over\nterritory occur when flocks collide."
        fr:
          brilliant_diamond: "Ils forment de grandes volées\net survolent les forêts et les champs\nen quête de Pokémon insectes."
          shining_pearl: "Ce Pokémon peuple les prés et les forêts.\nLorsque deux volées d’Étourvol se croisent,\nelles se disputent le territoire."
        it:
          brilliant_diamond: "Vola nelle foreste e nei campi in cerca\ndi Pokémon di tipo Coleottero. Si muove\nin grandi gruppi."
          shining_pearl: "Vive nelle foreste e nei campi. Se due gruppi si\nincontrano, iniziano a lottare per il territorio."
        de:
          brilliant_diamond: "Auf der Suche nach Käfer-Pokémon fliegt es in\ngroßen Schwärmen über Wiesen und Wälder."
          shining_pearl: "Es lebt in Wäldern und auf Wiesen. Treffen\nSchwärme von ihnen aufeinander, streiten sie\nsich sogleich um das Revier."
        es:
          brilliant_diamond: "Vuela por bosques y campos en busca de\nPokémon insecto. Forma grandes bandadas."
          shining_pearl: "Vive en bosques y campos. Si dos bandadas se\nencuentran, pelean por el territorio."
        ko:
          brilliant_diamond: "벌레 포켓몬을 노리고\n숲이나 초원을 날아다닌다.\n큰 무리를 이루어 행동한다."
          shining_pearl: "숲이나 초원에 서식한다.\n그룹이 마주치면 영역을 건\n분쟁이 시작된다."
        zh_simp:
          brilliant_diamond: "在森林和草原上空飞来飞去，\n追捕虫宝可梦。\n会聚集成大群一起行动。"
          shining_pearl: "栖息在森林和草原。\n如果遇到同类的团队，\n就会开始争夺领地。"
        zh_trad:
          brilliant_diamond: "為了捕捉蟲寶可夢\n在森林和草原四處飛行。\n會結成大型群體來行動。"
          shining_pearl: "棲息在森林和草原。\n如果遇上同類的團隊，\n就會開始爭奪地盤。"
