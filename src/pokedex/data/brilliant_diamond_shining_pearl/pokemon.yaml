      descriptions:
        jp_kana:
          brilliant_diamond: "たくさんの　むれで　こうどうする。\nからだは　ちいさいが　はばたく\nちからは　ひじょうに　つよい。"
          shining_pearl: "ふだんは　むれで　くらしているが\n１ぴきに　なると　めだたなくなる。\nなきごえが　とても　やかましい。"
        jp_kanji:
          brilliant_diamond: "たくさんの　群れで　行動する。\n体は　小さいが\n羽ばたく　力は　非常に　強い。"
          shining_pearl: "普段は　群れで　暮らしているが\n１匹に　なると　目立たなくなる。\n鳴き声が　とても　やかましい。"
        en:
          brilliant_diamond: "They flock in great numbers. Though small, they\nflap their wings with great power."
          shining_pearl: "Usually with a large flock, it is barely noticeable\nwhen alone. Its cries are very strident."
        fr:
          brilliant_diamond: "Ces Pokémon agissent à l’unisson, en grandes\nvolées. Malgré leur petit gabarit, ils battent\ndes ailes très vigoureusement."
          shining_pearl: "Il vit généralement en groupe et passe\ninaperçu quand il se retrouve seul.\nSes cris sont très désagréables."
        it:
          brilliant_diamond: "Si muove in grandi stormi. È piccolo, ma la forza\ncon cui sbatte le ali è sorprendente."
          shining_pearl: "Di solito si muove in gruppi numerosi, ma se è\nda solo passa del tutto inosservato. Emette dei\nversi estremamente acuti."
        de:
          brilliant_diamond: "Staralili sind in großen Schwärmen unterwegs.\nTrotz ihrer kleinen Statur schlagen sie äußerst\nkraftvoll mit den Flügeln."
          shining_pearl: "Normalerweise ist es immer im Schwarm\nunterwegs, während es im Alleingang kaum\nauffällt. Sein Ruf ist äußerst durchdringend."
        es:
          brilliant_diamond: "Viaja en grandes bandadas. Aunque es pequeño,\nagita las alas con gran fuerza."
          shining_pearl: "Suele vivir en grupo, pero pasa totalmente\ndesapercibido cuando está solo. Profiere unos\ngritos muy estridentes."
        ko:
          brilliant_diamond: "많은 수가 무리를 이루어\n행동한다. 몸은 작지만\n날갯짓하는 힘은 매우 강하다."
          shining_pearl: "평소에는 무리로 살고 있지만\n1마리가 되면 눈에 띄지 않는다.\n울음소리가 무척 시끄럽다."
        zh_simp:
          brilliant_diamond: "会很多只一起群体行动。\n虽然身体很小，\n但拍打翅膀的力量非常强。"
          shining_pearl: "平时过着群体生活，\n当仅有１只在的时候就会变得\n很不起眼。叫声非常吵闹。"
        zh_trad:
          brilliant_diamond: "會多隻一起群體行動。\n雖然身體很小，\n但拍打翅膀的力量非常強。"
          shining_pearl: "平時都是群體生活，一旦\n單獨行動就會變得毫不起眼。\n叫聲非常吵鬧。"
