wormadam:
  species_id: 413
  names:
    jp_kana: ミノマダム
    jp_kanji: ミノマダム
    en: Wormadam
    fr: Cheniselle
    it: Wormadam
    de: Burmadame
    es: Wormadam
    ko: 도롱마담
    zh_simp: 结草贵妇
    zh_trad: 結草貴婦
  forms:
    wormadam_plant_cloak:
      form_id: 0
      names:
        jp_kana: くさきのミノ
        jp_kanji: くさきのミノ
        en: Plant Cloak
        fr: Cape Plante
        it: Manto Pianta
        de: Pflanzenumhang
        es: Tronco Planta
        ko: 초목도롱
        zh_simp: 草木蓑衣
        zh_trad: 草木蓑衣
      base_stats:
        hp: 60
        attack: 59
        defense: 85
        special_attack: 79
        special_defense: 105
        speed: 36
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 2
        speed: 0
      types:
        - bug
        - grass
      egg_groups:
        - bug
      abilities:
        - anticipation
      hidden_ability: overcoat
      held_items:
        rare: silver_powder
      descriptions:
        jp_kana:
          brilliant_diamond: "ミノムッチから　しんかしたとき\nミノが　からだの　いちぶに　なった。\nいっしょう　ミノを　ぬぐことはない。"
          shining_pearl: "しんかした　ばしょによって　すがたが\nかわる。みぢかにある　ざいりょうが\nからだの　いちぶに　なるのだ。"
        jp_kanji:
          brilliant_diamond: "ミノムッチから　進化したとき\nミノが　体の　一部に　なった。\n一生　ミノを　脱ぐことはない。"
          shining_pearl: "進化した　場所によって\n姿が　変わる。身近にある　材料が\n体の　一部に　なるのだ。"
        en:
          brilliant_diamond: "When Burmy evolves, its cloak becomes a part of\nits body. Wormadam’s cloak is never shed."
          shining_pearl: "Its appearance changes depending on where it\nevolved. The materials on hand become a part\nof its body."
        fr:
          brilliant_diamond: "Quand Cheniti a évolué, sa cape a fusionné\navec son corps. Cheniselle ne peut désormais\nplus s’en séparer."
          shining_pearl: "Son apparence varie selon le lieu où\nil a évolué. Les matériaux à proximité\nont fusionné avec son corps."
        it:
          brilliant_diamond: "Con l’evoluzione, il manto di Burmy diventa\nparte del suo corpo. Non se ne separa mai."
          shining_pearl: "Il suo aspetto dipende dal luogo in cui si evolve.\nCiò che ha intorno va a costituire il suo corpo."
        de:
          brilliant_diamond: "Als sich Burmy entwickelte, wurde sein Umhang\nTeil seines Körpers. Es legt diesen nun nicht mehr\nab."
          shining_pearl: "Da das umliegende Material Teil seines Körpers\nwird, hängt sein Aussehen davon ab, wo es seine\nEntwicklung vollzogen hat."
        es:
          brilliant_diamond: "Cuando Burmy evolucionó, su saco pasó a formar\nparte del Pokémon. Nunca se desprende de él."
          shining_pearl: "Su apariencia varía según dónde evolucione. Los\nmateriales que haya pasan a formar parte de su\ncuerpo."
        ko:
          brilliant_diamond: "도롱충이로부터 진화할 때\n도롱이가 몸의 일부가 되었다.\n일생 도롱이를 벗는 일은 없다."
          shining_pearl: "진화한 장소에 따라 모습이 바뀐다.\n가까이 있는 재료가\n몸의 일부가 된다."
        zh_simp:
          brilliant_diamond: "从结草儿进化过来时，\n蓑衣成为了身体的一部分。\n一辈子都不会脱下蓑衣。"
          shining_pearl: "根据进化地点的不同，\n样子会发生变化。\n身边的材料会成为身体的一部分。"
        zh_trad:
          brilliant_diamond: "從結草兒進化過來時，\n蓑衣成了身體的一部分。\n一輩子都不會脫下蓑衣。"
          shining_pearl: "樣子會根據進化時\n所在地點的不同而發生變化。\n身邊的材料會成為身體的一部分。"
