        jp_kana:
          brilliant_diamond: "しっぽの　さきから　ひどい　においの\nえきたいを　とばして　こうげきする。\nひきょりは　５０メートルいじょう。"
          shining_pearl: "しっぽから　くさい　しるを　とばす。\nおなかで　じゅくせいさせる　じかんが\nながいほど　においが　ひどくなる。"
        jp_kanji:
          brilliant_diamond: "尻尾の　先から　ひどい　においの\n液体を　飛ばして　攻撃する。\n飛距離は　５０メートル以上。"
          shining_pearl: "尻尾から　くさい　汁を　飛ばす。\nお腹で　熟成させる　時間が\n長いほど　においが　ひどくなる。"
        en:
          brilliant_diamond: "It sprays a vile-smelling fluid from the tip of its\ntail to attack. It can fire this spray more than\n160 feet."
          shining_pearl: "It sprays a stinky fluid from its tail. The fluid\nsmells worse the longer it is allowed to fester\nin its belly."
        fr:
          brilliant_diamond: "Il attaque en projetant un liquide fétide du bout\nde sa queue. Il peut tirer à plus de 50 m."
          shining_pearl: "Sa queue projette un fluide nauséabond.\nPlus celui-ci a fermenté dans son estomac,\nplus l’odeur est insoutenable."
        it:
          brilliant_diamond: "Attacca spruzzando un fluido puzzolente\ndalla punta della coda. Ha un raggio d’azione\ndi oltre 50 m."
          shining_pearl: "Spruzza un fluido puzzolente dalla coda.\nPiù il liquido viene fatto fermentare nel ventre,\npiù il suo odore diventa insopportabile."
        de:
          brilliant_diamond: "Wenn es angreift, sprüht es mit einer Reichweite\nvon mehr als 50 m eine übel riechende\nFlüssigkeit aus seiner Schweifspitze."
          shining_pearl: "Es spritzt eine stinkende Flüssigkeit aus seinem\nSchweif, die umso schlimmer riecht, je länger\nsie in seinem Bauch gegoren hat."
        es:
          brilliant_diamond: "Para atacar, emite un fluido maloliente por la\npunta de la cola que puede llegar a más de\n50 m."
          shining_pearl: "Emite un fluido apestoso por la cola. Cuanto más\ntiempo lo tiene fermentando en las tripas, peor\nhuele."
        ko:
          brilliant_diamond: "꼬리 끝에서 심한 냄새가 나는\n액체를 뿌려 공격한다.\n사정거리는 50m 이상이다."
          shining_pearl: "꼬리에서 역한 분비액을 날린다.\n배에서 숙성된 시간이 길수록\n냄새가 심해진다."
        zh_simp:
          brilliant_diamond: "从尾巴尖端喷出\n带有恶臭的液体进行攻击。\n喷射距离能达到５０米以上。"
          shining_pearl: "从尾部喷出臭液。\n液体在肚子里发酵的时间越长，\n气味就会变得越臭。"
        zh_trad:
          brilliant_diamond: "從尾巴尖端噴出\n帶有惡臭的液體進行攻擊。\n噴射距離能達到５０公尺以上。"
          shining_pearl: "從尾巴噴出臭液。\n液體在肚子裡發酵的時間越長，\n氣味就會變得越臭。"
