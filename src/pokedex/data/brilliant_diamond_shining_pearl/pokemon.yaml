      descriptions:
        jp_kana:
          brilliant_diamond: "やまみちに　おおく　せいそくする。\nからだの　はんぶんを　じめんに　うめ\nとざんしゃの　ようすを　みている。"
          shining_pearl: "いしころと　みわけが　つかない。\nがんじょうな　からだを　なかまと\nぶつけあい　かたさを　きそいあう。"
        jp_kanji:
          brilliant_diamond: "山道に　多く　生息する。\n体の　半分を　地面に　埋め\n登山者の　様子を　見ている。"
          shining_pearl: "石ころと　見分けが　つかない。\n頑丈な　体を　仲間と　ぶつけ合い\n硬さを　競い合う。"
        en:
          brilliant_diamond: "Many live on mountain trails and remain\nhalf-buried while keeping an eye on climbers."
          shining_pearl: "It is impossible to distinguish from rocks. It slams\nagainst others in contests of toughness."
        fr:
          brilliant_diamond: "De nombreux Racaillou vivent sur les sentiers\nde montagne. Ils s’enfouissent à moitié dans\nle sol pour épier les alpinistes."
          shining_pearl: "Ces Pokémon se fondent dans les rochers.\nIls se cognent les uns aux autres pour\ndéterminer qui est le plus solide."
        it:
          brilliant_diamond: "Molti vivono sui sentieri montani e rimangono\nparzialmente sepolti nel terreno a osservare\ngli scalatori."
          shining_pearl: "È impossibile distinguerlo dalle rocce. Si scaglia\ncontro i suoi simili per vedere chi è più duro."
        de:
          brilliant_diamond: "Viele von ihnen leben auf Bergpfaden, wo sie\nhalb vergraben in der Erde verweilen und\nBergsteiger beobachten."
          shining_pearl: "Sie sind kaum von Felsbrocken zu unterscheiden.\nMit ihren robusten Körpern stoßen sie einander,\num darum zu wetteifern, wer am härtesten ist."
        es:
          brilliant_diamond: "Muchos viven en zonas montañosas y\npermanecen semienterrados mientras miran\na los escaladores."
          shining_pearl: "Es imposible distinguirlos de las rocas. Compiten\nchocándose entre sí para ver quién es más duro."
        ko:
          brilliant_diamond: "산길에 많이 서식한다.\n몸의 절반을 땅에 묻고 등산하는\n사람들의 모습을 바라본다."
          shining_pearl: "돌멩이와 구별되지 않는다.\n튼튼한 몸을 동료와\n서로 부딪쳐서 단단함을 겨룬다."
        zh_simp:
          brilliant_diamond: "多数栖息在山路上。\n会把一半身体埋入地下，\n观察过往登山者的样子。"
          shining_pearl: "无法区分它和小石头有什么不同。\n会用结实的身体和伙伴互撞，\n以此来比比谁更坚硬。"
        zh_trad:
          brilliant_diamond: "大多棲息在山路上。\n會把一半的身體埋入地下，\n觀察登山客的樣子。"
          shining_pearl: "看起來和小石頭毫無分別。\n會用結實的身體和夥伴互撞，\n比較哪一方更堅硬。"
