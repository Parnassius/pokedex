      descriptions:
        jp_kana:
          brilliant_diamond: "だんがいぜっぺきを　みがるに　のぼり\nいわやまの　うえで　せいかつする。\nほのおを　けして　ねむる。"
          shining_pearl: "おしりの　ほのおは　おなかで\nつくられた　ガスが　ねんりょう。\nあめに　ぬれても　きえない。"
        jp_kanji:
          brilliant_diamond: "断崖絶壁を　身軽に　登り\n岩山の　上で　生活する。\n炎を　消して　眠る。"
          shining_pearl: "お尻の　炎は\nお腹で　作られた　ガスが　燃料。\n雨に　ぬれても　消えない。"
        en:
          brilliant_diamond: "It agilely scales sheer cliffs to live atop craggy\nmountains. Its fire is put out when it sleeps."
          shining_pearl: "Its fiery rear end is fueled by gas made in its\nbelly. Even rain can’t extinguish the fire."
        fr:
          brilliant_diamond: "Il escalade prestement les falaises\nescarpées et vit sur les sommets.\nIl éteint sa flamme avant de dormir."
          shining_pearl: "La flamme sur son derrière est alimentée par\nun gaz produit à l’intérieur de son estomac.\nMême la pluie ne saurait l’éteindre."
        it:
          brilliant_diamond: "Scala agilmente pareti rocciose e va a vivere\nsulle cime dei monti. Prima di dormire spegne\nla sua fiamma."
          shining_pearl: "La fiamma sulla coda, alimentata dai gas della\npancia, non si spegne neppure quando piove."
        de:
          brilliant_diamond: "Es lebt auf zerklüfteten Bergen und klettert mit\nLeichtigkeit steile Felswände hinauf. Bevor es\nschlafen geht, löscht es seine Flamme."
          shining_pearl: "Das Feuer an seinem Hinterteil wird durch Gase\nim Bauch genährt und hält sogar Regen stand."
        es:
          brilliant_diamond: "Escala acantilados escarpados con agilidad y vive\nen las cimas de montañas rocosas. Su fuego se\napaga cuando duerme."
          shining_pearl: "Los gases de su estómago alimentan el fuego de\nsu trasero, que ni la lluvia puede extinguir."
        ko:
          brilliant_diamond: "낭떠러지 절벽을 민첩하게 올라\n바위산의 위에서 생활한다.\n불꽃을 끄고 잠든다."
          shining_pearl: "엉덩이의 불꽃은 배에서\n만들어진 가스가 연료다.\n비에 젖어도 꺼지지 않는다."
        zh_simp:
          brilliant_diamond: "在悬崖峭壁间也能穿梭自如。\n生活在岩山之上。\n睡觉时会将火焰熄灭。"
          shining_pearl: "屁屁的火焰以腹部\n产生的瓦斯为燃料。\n即使被雨淋到也不会熄灭。"
        zh_trad:
          brilliant_diamond: "能夠輕鬆地爬上斷崖絕壁。\n平時生活在岩山上。\n睡覺時會將火焰熄滅。"
          shining_pearl: "屁股上的火焰是以\n肚子裡產生的瓦斯為燃料。\n即使被雨淋到也不會熄滅。"
monferno:
