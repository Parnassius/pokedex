        jp_kana:
          brilliant_diamond: "はなの　ミツが　だいすき。\nミツハニーの　あつめた　ミツを\nよこどりして　たべてしまう。"
          shining_pearl: "きまった　すみかを　もたない。\nこうぶつの　はなの　ミツを　さがして\nのやまを　こえて　とびつづける。"
        jp_kanji:
          brilliant_diamond: "花の　ミツが　大好き。\nミツハニーの　集めた　ミツを\n横取りして　食べてしまう。"
          shining_pearl: "決まった　住処を　持たない。\n好物の　花の　ミツを　探して\n野山を　越えて　飛び続ける。"
        en:
          brilliant_diamond: "It loves the nectar of flowers and steals nectar\ncollected by Combee."
          shining_pearl: "It does not keep a nest. It flies over fields\nand mountains in constant search of its\nmuch-beloved nectar."
        fr:
          brilliant_diamond: "Il adore le nectar des fleurs et n’hésite pas\nà voler celui que récoltent les Apitrini pour\nle manger."
          shining_pearl: "Ce Pokémon ne vit pas dans un lieu en particulier.\nIl survole les champs et les montagnes en quête\nde son mets favori : le nectar floral."
        it:
          brilliant_diamond: "Ama il nettare dei fiori. Ruba quello raccolto\ndai Combee per mangiarlo."
          shining_pearl: "Non ha una tana fissa. Vola su campi e monti\nin perenne ricerca del nettare dei fiori di cui\nè ghiotto."
        de:
          brilliant_diamond: "Es liebt Blütennektar und stiehlt diesen von\nWadribie, um ihn selbst zu essen."
          shining_pearl: "Es baut sich kein festes Nest und fliegt auf der\nSuche nach seiner Leibspeise Blütennektar über\nFelder und Wiesen."
        es:
          brilliant_diamond: "Le encanta la miel de las flores y roba la que\nrecogen los Combee para comérsela."
          shining_pearl: "No tiene nido. Vuela sobre los campos y las\nmontañas en busca de su néctar favorito."
        ko:
          brilliant_diamond: "꽃의 꿀을 매우 좋아한다.\n세꿀버리가 모아 둔 꿀을\n가로채어 먹어 버린다."
          shining_pearl: "정해진 거처를 갖지 않는다.\n좋아하는 꽃의 꿀을 찾아서\n산과 들을 넘어 날아다닌다."
        zh_simp:
          brilliant_diamond: "非常喜欢吃花蜜。\n会抢夺三蜜蜂采集到的蜜，\n然后自己吃掉。"
          shining_pearl: "没有固定的住处。\n为了寻找爱吃的花蜜，\n它会不停地飞过山野。"
        zh_trad:
          brilliant_diamond: "非常愛吃花蜜。\n會搶奪三蜜蜂採集到的花蜜，\n然後自己吃掉。"
          shining_pearl: "沒有固定的巢穴。\n為了尋找最愛吃的花蜜，\n會在山野中不斷飛行。"
