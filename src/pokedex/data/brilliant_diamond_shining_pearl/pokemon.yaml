          brilliant_diamond: "ヨガの　しゅぎょうによって\nだい６かんが　はったつした。\nゆうがに　おどるような　みのこなし。"
          shining_pearl: "まいにちの　めいそうに　よって\nとぎすまされた　せいしんりょくが\nあいての　かんがえを　よみとる。"
        jp_kanji:
          brilliant_diamond: "ヨガの　修行によって\n第６感が　発達した。\n優雅に　踊るような　身のこなし。"
          shining_pearl: "毎日の　瞑想に　よって\n研ぎ澄まされた　精神力が\n相手の　考えを　読み取る。"
        en:
          brilliant_diamond: "Through yoga training, it has honed its sixth\nsense. Its movements are elegant."
          shining_pearl: "Through daily meditation, it hones its spiritual\npower. It can sense what others are thinking."
        fr:
          brilliant_diamond: "Il a développé son sixième sens grâce au yoga.\nSes mouvements gracieux ressemblent\nà une danse."
          shining_pearl: "Sa pratique quotidienne de la méditation lui a\npermis de développer sa force spirituelle, si bien\nqu’il peut lire les pensées de ses adversaires."
        it:
          brilliant_diamond: "Ha affinato il sesto senso facendo yoga.\nI suoi movimenti sono molto eleganti."
          shining_pearl: "Grazie alla meditazione quotidiana affina la sua\nforza spirituale e riesce a intuire i pensieri altrui."
        de:
          brilliant_diamond: "Dieses Pokémon kämpft mit eleganten,\ntänzelnden Bewegungen und hat seinen\nsechsten Sinn mit Yogaübungen geschärft."
          shining_pearl: "Durch tägliche Meditation stärkt es seine mentale\nKraft, die es ihm ermöglicht, die Gedanken seines\nGegners zu erkennen."
        es:
          brilliant_diamond: "El yoga le ha permitido desarrollar su sexto\nsentido. Sus movimientos son tan gráciles como\nuna elegante danza."
          shining_pearl: "Meditar a diario le ha permitido desarrollar\nsu poder espiritual y adquirir la capacidad de\nleer los pensamientos de sus adversarios."
        ko:
          brilliant_diamond: "요가 수행에 의해\n육감이 발달했다.\n우아하게 춤추는 듯이 몸을 움직인다."
          shining_pearl: "매일 명상을 통해\n갈고 닦은 정신력으로\n상대의 생각을 간파한다."
        zh_simp:
          brilliant_diamond: "因修行瑜伽而提高了第６感。\n它的动作十分优雅，\n就像是在舞蹈一般。"
          shining_pearl: "天天冥想使它锻炼出了\n异常敏锐的精神力，\n能够读取对方的想法。"
        zh_trad:
          brilliant_diamond: "透過瑜伽的修行使牠的\n第６感變得發達。一舉一動\n就如同舞蹈般地優雅。"
          shining_pearl: "能透過每天的冥想\n所磨練出的精神力，\n來讀取對方的想法。"
