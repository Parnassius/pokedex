          brilliant_diamond: "Once Gyarados appears, its rage never settles\nuntil the Pokémon has razed the fields and\nmountains around it."
          shining_pearl: "In ancient literature, there is a record of\na Gyarados that razed a village when\nviolence flared."
        fr:
          brilliant_diamond: "Une fois qu’il apparaît, sa colère ne s’apaise\nque lorsqu’il a réduit en cendres les plaines\net les montagnes alentour."
          shining_pearl: "Des documents anciens font état d’un Léviator\nqui aurait réduit en cendres un village en proie\naux conflits."
        it:
          brilliant_diamond: "Quando Gyarados appare, la sua ira non si placa\nfinché non ha raso al suolo campi e monti attorno\na sé."
          shining_pearl: "I testi antichi parlano di un Gyarados che ridusse\nin cenere un villaggio in cui dilagava la violenza."
        de:
          brilliant_diamond: "Wenn es sich zeigt, schwindet seine Wut nicht\neher, bis es die Felder und Berge ringsum\nzerstört hat."
          shining_pearl: "In alten Schriften wird von einem Garados\nberichtet, das ein Dorf niedergebrannt haben\nsoll, in dem ein Streit ausgebrochen war."
        es:
          brilliant_diamond: "Cuando se enfada, su furia solo se calma tras\nhaber arrasado los campos y montañas vecinos."
          shining_pearl: "Se conservan escritos antiguos que narran cómo\nun Gyarados redujo a cenizas un poblado que\nhabía sido consumido por la violencia."
        ko:
          brilliant_diamond: "한번 모습을 나타내면\n산과 들의 모든 것을 다 태워 버리기 전까지\n분노가 가라앉지 않는다."
          shining_pearl: "분쟁이 일어난 마을을\n다 태워 버렸다는 기록이\n고문서에 남아 있다."
        zh_simp:
          brilliant_diamond: "暴鲤龙一旦现身，\n不把山野的一切都燃烧殆尽，\n它的怒火就不会平息。"
          shining_pearl: "在古书里留有\n它将发生纷争的村庄\n整个烧光的记录。"
        zh_trad:
          brilliant_diamond: "暴鯉龍一旦現身，\n在將山野的一切燃燒殆盡前，\n牠的怒火不會平息。"
          shining_pearl: "古書裡留下了\n牠將發生紛爭的村莊\n整個燒光的紀錄。"
