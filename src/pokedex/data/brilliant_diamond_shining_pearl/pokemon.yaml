      descriptions:
        jp_kana:
          brilliant_diamond: "たいようを　いっぱいに　あびた\nおびれの　もようは　くらくなると\nあざやかな　いろで　ひかりだす。"
          shining_pearl: "２まいの　おびれを　はばたかせて\nおよぐ　すがたから　べつめい\nうみの　アゲハントと　よばれている。"
        jp_kanji:
          brilliant_diamond: "太陽を　いっぱいに　浴びた\n尾びれの　模様は　暗くなると\n鮮やかな　色で　光り出す。"
          shining_pearl: "２枚の　尾びれを　羽ばたかせて\n泳ぐ　姿から　別名\n海の　アゲハントと　呼ばれている。"
        en:
          brilliant_diamond: "After long exposure to sunlight, the patterns on\nits tail fins shine vividly when darkness arrives."
          shining_pearl: "The way its two tail fins flutter while it swims has\nearned it the nickname Beautifly of the Sea."
        fr:
          brilliant_diamond: "Après avoir été exposés longtemps au soleil,\nles motifs de ses nageoires caudales se mettent\nà luire avec intensité dans l’obscurité."
          shining_pearl: "Le mouvement que font ses deux nageoires\ncaudales lorsqu’il nage lui a valu le surnom\nde « Charmillon des mers »."
        it:
          brilliant_diamond: "Al calare dell’oscurità, dopo una lunga\nesposizione al sole, i motivi sulle sue pinne\ncaudali brillano intensamente."
          shining_pearl: "Il modo in cui agita le sue due pinne caudali\nquando nuota gli è valso il soprannome\ndi \"Beautifly dei mari\"."
        de:
          brilliant_diamond: "Wenn es lange dem Sonnenlicht ausgesetzt war,\nleuchten die Muster auf seinen Schwanzflossen\nbei Dunkelheit in intensiven Farben."
          shining_pearl: "Die Art, auf die seine zwei Schwanzflossen beim\nSchwimmen flattern, hat ihm den Spitznamen\n„Papinella der Meere“ eingebracht."
        es:
          brilliant_diamond: "Si se expone mucho al sol, las marcas de sus\naletas caudales brillan intensamente en la\noscuridad."
          shining_pearl: "Lo llaman el Beautifly del Mar por la forma en\nque se balancean sus dos aletas cuando nada."
        ko:
          brilliant_diamond: "햇볕을 잔뜩 쬔 꼬리지느러미의 무늬는\n어두워지면 선명한 색으로\n반짝이기 시작한다."
          shining_pearl: "2개의 꼬리지느러미로\n헤엄치는 모습 때문에\n바다의 뷰티플라이라는 별명으로 불린다."
        zh_simp:
          brilliant_diamond: "充分沐浴了阳光的尾鳍花纹\n到了天暗的时候，\n就会发出颜色鲜艳的光来。"
          shining_pearl: "张开２片尾鳍游泳的\n样子使它获得了\n海中狩猎凤蝶这个别称。"
        zh_trad:
          brilliant_diamond: "充分沐浴陽光的尾鰭花紋，\n每當天色一暗就會\n閃耀出鮮明的色彩。"
          shining_pearl: "揮動２片尾鰭游泳的樣子，\n使牠有了個別稱叫做\n海裡的狩獵鳳蝶。"
