          shining_pearl: "リザードが　くらす　いわやまを\nよなかに　みあげると　しっぽの\nほのおが　ほしのように　みえる。"
        jp_kanji:
          brilliant_diamond: "リザードが　暮らす　岩山を\n夜中に　見上げると\nしっぽの　炎が　星のように　見える。"
          shining_pearl: "リザードが　暮らす　岩山を\n夜中に　見上げると\nしっぽの　炎が　星のように　見える。"
        en:
          brilliant_diamond: "In the rocky mountains where Charmeleon live,\ntheir fiery tails shine at night like stars."
          shining_pearl: "In the rocky mountains where Charmeleon live,\ntheir fiery tails shine at night like stars."
        fr:
          brilliant_diamond: "La nuit, si on observe les montagnes rocheuses\noù vivent les Reptincel, on aperçoit leurs queues\nenflammées qui brillent comme des étoiles."
          shining_pearl: "La nuit, si on observe les montagnes rocheuses\noù vivent les Reptincel, on aperçoit leurs queues\nenflammées qui brillent comme des étoiles."
        it:
          brilliant_diamond: "Di notte, sui monti rocciosi dove vivono\ni Charmeleon, si vedono le loro code brillare\ncome stelle."
          shining_pearl: "Di notte, sui monti rocciosi dove vivono\ni Charmeleon, si vedono le loro code brillare\ncome stelle."
        de:
          brilliant_diamond: "Schaut man nachts zu den felsigen Bergen hinauf,\nin denen Glutexo leben, scheinen die Flammen\nauf ihren Schwanzspitzen wie Sterne zu leuchten."
          shining_pearl: "Schaut man nachts zu den felsigen Bergen hinauf,\nin denen Glutexo leben, scheinen die Flammen\nauf ihren Schwanzspitzen wie Sterne zu leuchten."
        es:
          brilliant_diamond: "En las montañas rocosas donde viven los\nCharmeleon, sus colas ardientes brillan como\nestrellas en la noche."
          shining_pearl: "En las montañas rocosas donde viven los\nCharmeleon, sus colas ardientes brillan como\nestrellas en la noche."
        ko:
          brilliant_diamond: "리자드가 사는 바위산을\n한밤중에 올려다보면\n꼬리의 불꽃이 별처럼 보인다."
          shining_pearl: "리자드가 사는 바위산을\n한밤중에 올려다보면\n꼬리의 불꽃이 별처럼 보인다."
        zh_simp:
          brilliant_diamond: "如果在夜晚抬头仰望栖息着\n火恐龙的岩山，尾巴上的火焰\n看起来就像夜空的星星。"
          shining_pearl: "如果在夜晚抬头仰望栖息着\n火恐龙的岩山，尾巴上的火焰\n看起来就像夜空的星星。"
        zh_trad:
          brilliant_diamond: "如果在夜裡抬頭仰望棲息著\n火恐龍的岩山，尾巴上的火焰\n看起來就像是天上的星星。"
          shining_pearl: "如果在夜裡抬頭仰望棲息著\n火恐龍的岩山，尾巴上的火焰\n看起來就像是天上的星星。"
