      descriptions:
        jp_kana:
          brilliant_diamond: "けわしい　がけの　ちゅうふくに\nいくつもの　よこあなを　みつけたら\nそれは　ゴローンの　すみか。"
          shining_pearl: "ころがりおちる　あいだに　からだの\nあちこちが　とれても　きにしない。\n１にち　１トンの　いわを　たべる。"
        jp_kanji:
          brilliant_diamond: "険しい　崖の　中腹に\nいくつもの　横穴を　見つけたら\nそれは　ゴローンの　住処。"
          shining_pearl: "転がり落ちる　間に　体の\nあちこちが　取れても　気にしない。\n１日　１トンの　岩を　食べる。"
        en:
          brilliant_diamond: "Graveler make their homes on sheer cliff faces\nthat have numerous holes in them."
          shining_pearl: "It tumbles down slopes, heedless of any body\nparts chipping off. It eats a ton of rocks daily."
        fr:
          brilliant_diamond: "Gravalanch creuse son antre à flanc de falaise\nen perçant des galeries horizontales."
          shining_pearl: "Il dévale les pentes sans se soucier du fait\nque son corps se désagrège par endroits\net mange une tonne de pierres chaque jour."
        it:
          brilliant_diamond: "Si costruisce la tana scavando grotte nelle\npareti di precipizi e dirupi scoscesi."
          shining_pearl: "Ruzzola lungo i pendii incurante dei pezzi di\ncorpo che gli si staccano. Mangia una tonnellata\ndi rocce al giorno."
        de:
          brilliant_diamond: "Stößt man an steilen Felswänden auf viele\nhorizontale Löcher, handelt es sich dabei um\nGeoroks Höhlen."
          shining_pearl: "Wenn es Abhänge hinabrollt, verliert es dabei\nmitunter Körperteile, was ihm jedoch nichts\nausmacht. Es verzehrt täglich eine Tonne Steine."
        es:
          brilliant_diamond: "Muchos Graveler hacen agujeros en acantilados\nescarpados para establecerse dentro de ellos."
          shining_pearl: "Se lanza ladera abajo sin importarle astillarse el\ncuerpo. Come una tonelada de roca al día."
        ko:
          brilliant_diamond: "험한 절벽의 중턱에\n몇 개의 구멍이 보인다면\n그곳은 데구리의 거처이다."
          shining_pearl: "굴러 떨어지는 동안에 몸의\n여기저기가 부서져도 신경 안 쓴다.\n하루에 1톤의 바위를 먹는다."
        zh_simp:
          brilliant_diamond: "在险峻悬崖的半山腰\n有时可以找到几处横洞，\n这些洞就是隆隆石的住处。"
          shining_pearl: "从高处滚下来时，就算\n滚得身体到处缺损也毫不在意。\n１天要吃１吨重的岩石。"
        zh_trad:
          brilliant_diamond: "如果在險峻懸崖的半山腰\n發現了多處洞窟，\n那就是隆隆石的巢穴。"
          shining_pearl: "從高處滾下的過程中，就算\n身體到處缺損也毫不在意。\n１天會吃掉１噸的岩石。"
