        it:
          brilliant_diamond: "Ha una vista particolare che gli permette\ndi scorgere oggetti anche con la luce più fioca."
          shining_pearl: "Se mette la testa all’ingiù significa che sta\nriflettendo su qualche questione estremamente\ncomplicata."
        de:
