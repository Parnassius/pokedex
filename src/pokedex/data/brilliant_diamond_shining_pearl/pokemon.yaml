          brilliant_diamond: "能以１００公里的時速撲向獵物，\n但因為只能直線奔跑，\n所以也常常撲空。"
          shining_pearl: "能以１００公里的時速撲向獵物，\n但因為只能直線奔跑，\n所以也常常撲空。"
