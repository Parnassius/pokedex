          shining_pearl: "どくぶくろを　おおきく　ふくらませて\nゴボゴボと　ぶきみな　おとを　だす。\nあいてを　いかくするためだ。"
        jp_kanji:
          brilliant_diamond: "ほっぺたに　毒袋を　持つ。\n相手の　すきを　ついて　猛毒を\nにじませている　指を　突き刺す。"
          shining_pearl: "毒袋を　大きく　膨らませて\nゴボゴボと　不気味な　音を　出す。\n相手を　威嚇するためだ。"
        en:
          brilliant_diamond: "Its cheeks hold poison sacs. It tries to catch foes\noff guard to jab them with toxic fingers."
          shining_pearl: "It inflates its poison sacs and makes a blubbering\nsound to intimidate foes."
        fr:
          brilliant_diamond: "Ses joues contiennent des glandes toxiques.\nIl attaque ses ennemis par surprise en les piquant\navec ses doigts imbibés d’un poison virulent."
          shining_pearl: "Il émet un gargouillis sinistre lorsqu’il gonfle\nses glandes de poison pour intimider l’ennemi."
        it:
          brilliant_diamond: "Le sacche delle guance contengono veleno.\nCoglie di sorpresa i nemici per infilzarli\ncon le sue dita avvelenate."
          shining_pearl: "Gonfiando le sacche di veleno, emette dei\ngargarismi misteriosi che intimoriscono il nemico."
        de:
          brilliant_diamond: "In seinen Backen befinden sich Giftbeutel.\nEs versucht, Beute zu überrumpeln, um dann\nmit seinen hochgiftigen Fingern zuzustechen."
          shining_pearl: "Wenn es seine Giftbeutel aufbläst, ertönt ein\nunheimliches, blubberndes Geräusch, mit dem\nes Gegner einschüchtert."
        es:
          brilliant_diamond: "Tiene bolsas de veneno en las mejillas. Pilla\ndesprevenidos a sus rivales para inyectarles\nponzoña con sus dedos."
          shining_pearl: "Infla sus bolsas de veneno para emitir un sonido\nmacabro con el que intimidar a sus adversarios."
        ko:
          brilliant_diamond: "볼에 독주머니를 가지고 있다.\n상대의 틈을 노려 맹독이\n밴 손가락을 꿰찌른다."
          shining_pearl: "독주머니를 크게 부풀려서\n쿨렁쿨렁 으스스한 소리를 낸다.\n상대를 위협하기 위해서다."
        zh_simp:
          brilliant_diamond: "脸颊上带有毒囊。\n会抓住对手的空当，\n用渗透了剧毒的手指猛戳。"
          shining_pearl: "会将毒囊鼓得非常大，\n发出咕嘟咕嘟的诡异声音，\n起到威吓对手的作用。"
        zh_trad:
          brilliant_diamond: "臉頰上有著毒囊。\n會趁對手不注意時，\n以浸透著劇毒的手指猛戳。"
          shining_pearl: "會將毒囊大大地鼓起，\n發出咕嘟咕嘟的詭異聲音，\n這麼做是為了要威嚇對手。"
