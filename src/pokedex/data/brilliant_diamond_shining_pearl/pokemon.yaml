          brilliant_diamond: "It always stands on one foot. Even when\nattacked, it does not brace itself using both feet."
          shining_pearl: "It switches its standing foot so quickly that the\nswitch can’t be seen. It cries at the same time\nevery day."
        fr:
          brilliant_diamond: "Ce Pokémon se tient toujours sur une patte.\nIl ne prend jamais appui sur ses deux pattes,\nmême s’il se fait attaquer."
          shining_pearl: "Ce Pokémon change de patte d’appui\nsi rapidement que c’en est imperceptible.\nIl hulule chaque jour à la même heure."
        it:
          brilliant_diamond: "Sta sempre ritto su una zampa sola e non mette\ngiù l’altra neppure quando viene attaccato."
          shining_pearl: "Cambia così in fretta la zampa su cui si regge\nche non lo si nota. Si fa sentire ogni giorno\nalla stessa ora."
        de:
          brilliant_diamond: "Es steht ständig auf einem Bein. Selbst wenn es\nangegriffen wird, stellt es sich nicht auf beide\nBeine."
          shining_pearl: "Es wechselt sein Standbein so schnell, dass man\ndies mit bloßem Auge nicht ausmachen kann.\nSein Ruf ertönt jeden Tag zur gleichen Zeit."
        es:
          brilliant_diamond: "Siempre se yergue sobre una pata. Nunca apoya\nambas, ni siquiera al sufrir un ataque."
          shining_pearl: "Cambia la pata sobre la que se apoya tan rápido\nque es imposible verlo. Ulula a la misma hora\ntodos los días."
        ko:
          brilliant_diamond: "항상 한 발로 서 있다.\n공격을 받아도 두 발로\n버티거나 하지 않는다."
          shining_pearl: "발을 바꾸는 순간은\n너무 빨라서 아무도 본 적이 없다.\n매일 똑같은 시간에 운다."
        zh_simp:
          brilliant_diamond: "一直用单脚站立。\n即使受到攻击也不会用\n两只脚来稳住身体。"
          shining_pearl: "由于换脚的速度太快了，\n谁也没有见过那个瞬间。\n每天会在同一时间鸣叫。"
        zh_trad:
          brilliant_diamond: "總是用單腳站立。\n即使受到攻擊也不會用\n兩隻腳來穩住身體。"
          shining_pearl: "由於換腳的速度太快，\n還沒有人看過牠換腳的瞬間。\n每天都會在同一時間鳴叫。"
