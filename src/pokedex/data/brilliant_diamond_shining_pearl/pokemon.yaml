          shining_pearl: "It clings to Mantine to feed on the big Pokémon’s\nscraps. This is an adaptation to avoid foes."
        fr:
          brilliant_diamond: "Il a pour particularité de cracher un puissant\njet d’eau pour abattre les proies volantes."
          shining_pearl: "Il s’accroche à Démanta pour se nourrir des\nrestes de ce dernier. Ce stratagème lui évite\nde se faire attaquer par ses ennemis."
        it:
          brilliant_diamond: "Spara potenti getti d’acqua dalla bocca,\ncon i quali riesce ad abbattere persino\nle prede in volo."
          shining_pearl: "Sta sempre attaccato a Mantine e si ciba\ndei suoi avanzi. In questo modo evita di essere\npreso di mira dai nemici."
        de:
          brilliant_diamond: "Es spritzt mit Hochdruck Wasser aus seinem\nMaul, um damit fliegende Beute abzuschießen."
          shining_pearl: "Es heftet sich an Mantax, um von dessen\nEssensresten zu leben und sich so gleichzeitig\nauch vor Feinden zu schützen."
        es:
          brilliant_diamond: "Escupe potentes chorros de agua para derribar\npresas voladoras."
          shining_pearl: "Se aferra a un Mantine para comerse sus sobras.\nDe esta forma, está a salvo de sus enemigos."
        ko:
          brilliant_diamond: "입에서 물을 발사하여 하늘을 나는\n먹이를 맞혀 떨어뜨린다고 해서\n이 이름이 붙여졌다."
          shining_pearl: "만타인의 몸에 달라붙어\n먹다 남은 음식을 받아 먹는다.\n적에게 습격당하지 않는 지혜이다."
        zh_simp:
          brilliant_diamond: "从口中射出的水能够\n击落空中飞行的猎物。\n它的名字正是由此而来。"
          shining_pearl: "会吸附在巨翅飞鱼身上，\n吃它平常吃剩下的东西。\n这是种避开敌人袭击的生存智慧。"
        zh_trad:
          brilliant_diamond: "由於會從口中發射出水，\n擊落在空中飛行的獵物，\n因此而得名。"
          shining_pearl: "會吸附在巨翅飛魚身上，\n吃牠平常吃剩下的東西。這是\n一種避開敵人襲擊的生存智慧。"
