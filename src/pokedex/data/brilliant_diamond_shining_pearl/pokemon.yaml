        en:
          brilliant_diamond: "It is said to be the world’s weakest Pokémon.\nNo one knows why it has managed to survive."
          shining_pearl: "It is unable to swim against even slow-moving\ncurrents. It always splashes about for\nsome reason."
        fr:
          brilliant_diamond: "On dit que c’est le Pokémon le plus faible\nau monde. On ignore comment son espèce\nperdure."
          shining_pearl: "Incapable de résister même à un courant faible,\nil se fait toujours emporter par les flots. Pour une\nraison inconnue, il passe son temps à bondir."
        it:
          brilliant_diamond: "Si dice che sia il Pokémon più debole del mondo.\nNessuno sa come abbia fatto a sopravvivere."
          shining_pearl: "Non riesce a risalire nemmeno le correnti\npiù deboli, dalle quali viene trascinato via.\nSguazza qua e là senza apparente motivo."
        de:
          brilliant_diamond: "Man sagt, dies sei das schwächste Pokémon der\nWelt. Es ist ein Rätsel, wie es bis heute überleben\nkonnte."
          shining_pearl: "Unfähig, selbst gegen die schwächste Strömung\nanzuschwimmen, wird es vom Wasser fortgespült.\nAus irgendeinem Grund platscht es immer herum."
        es:
          brilliant_diamond: "Dicen que es el Pokémon más débil del mundo.\nNo se sabe cómo ha logrado sobrevivir."
          shining_pearl: "Como es incapaz de nadar contra la más mínima\ncorriente, siempre termina siendo arrastrado. Se\npasa el día chapoteando sin razón alguna."
        ko:
          brilliant_diamond: "세상에서 제일 약하다고 전해지는\n잉어킹이 어떻게 살아남아 있는지\n아무도 모른다."
          shining_pearl: "강의 흐름이 완만해도 거슬러\n올라가지 못하고 휩쓸려 버린다.\n왜인지 항상 파닥거리고 있다."
        zh_simp:
          brilliant_diamond: "谁也说不清为什么\n被称为世界最弱的\n鲤鱼王能够存活至今。"
          shining_pearl: "在水流很缓的河川也无法\n逆流而上，只能被水冲走。\n不知为何总是跳个不停。"
        zh_trad:
          brilliant_diamond: "沒人知道為何被稱為\n全世界最弱的鯉魚王\n能夠存活至今。"
          shining_pearl: "連在水流緩慢的河川也無法\n逆流而上，只能被水沖走。\n不知為何總是跳個不停。"
