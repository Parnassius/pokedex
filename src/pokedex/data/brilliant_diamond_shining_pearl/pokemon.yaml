          shining_pearl: "あいての　はっする　はどうを\nキャッチすることで　かんがえや\nうごきを　よみとることが　できる。"
        jp_kanji:
          brilliant_diamond: "あらゆる　ものが　発する　波動を\nキャッチする　能力を　持つ。\n人の　言葉を　理解できる。"
          shining_pearl: "相手の　発する　波動を\nキャッチすることで　考えや　動きを\n読み取ることが　できる。"
        en:
          brilliant_diamond: "It has the ability to sense the auras of all things.\nIt understands human speech."
          shining_pearl: "By sensing the aura emanating from others, it can\nread their thoughts and movements."
        fr:
          brilliant_diamond: "Il est capable de ressentir les auras émises\npar toutes les choses et comprend le langage\nhumain."
          shining_pearl: "Il peut lire dans les pensées et détecter\nles mouvements des autres en ressentant\nleur aura."
        it:
          brilliant_diamond: "È in grado di avvertire l’aura di qualunque cosa.\nComprende il linguaggio umano."
          shining_pearl: "Decifra l’aura emessa dal nemico, riuscendo così\na leggerne i pensieri e i movimenti."
        de:
          brilliant_diamond: "Es ist imstande, die Aura aller Dinge zu spüren,\nund versteht zudem die menschliche Sprache."
          shining_pearl: "Es nimmt die Aura von Gegnern wahr und kann so\nderen Gedanken lesen sowie ihre Bewegungen\nvorhersehen."
        es:
          brilliant_diamond: "Es capaz de percibir el aura de todas las cosas,\nasí como de comprender el lenguaje humano."
          shining_pearl: "Puede leer los pensamientos y prever los\nmovimientos de sus adversarios a través del\naura que emanan."
        ko:
          brilliant_diamond: "모든 것이 발하는 파동을\n포착하는 능력을 가지고 있다.\n사람의 말을 이해할 수 있다."
          shining_pearl: "상대가 발하는 파동을\n감지하여 생각이나\n움직임을 간파할 수 있다."
        zh_simp:
          brilliant_diamond: "拥有侦测所有东西\n发出的波导的能力。\n能够理解人类的语言。"
          shining_pearl: "通过侦测对方\n发出的波导，\n就能读取其想法和行动。"
        zh_trad:
          brilliant_diamond: "擁有可以偵測所有東西\n發出的波導的能力。\n能夠理解人類的語言。"
          shining_pearl: "透過捕捉對方發出的波導，\n能夠讀取對方的想法和行動。"
