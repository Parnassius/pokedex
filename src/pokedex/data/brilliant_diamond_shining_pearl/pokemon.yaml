        - oblivious
        - own_tempo
      hidden_ability: regenerator
      held_items:
        rare: kings_rock
      descriptions:
        jp_kana:
          brilliant_diamond: "シェルダーに　かまれたことによって\nせかいてき　けんいの　かがくしゃに\nならぶほどの　ちのうを　えた。"
          shining_pearl: "シェルダーに　かまれたことによって\nせかいてき　けんいの　かがくしゃに\nならぶほどの　ちのうを　えた。"
        jp_kanji:
          brilliant_diamond: "シェルダーに　かまれたことによって\n世界的権威の　科学者に\n並ぶほどの　知能を　得た。"
          shining_pearl: "シェルダーに　かまれたことによって\n世界的権威の　科学者に\n並ぶほどの　知能を　得た。"
        en:
          brilliant_diamond: "Being bitten by Shellder gave it intelligence\ncomparable to that of internationally\nrecognized scientists."
          shining_pearl: "Being bitten by Shellder gave it intelligence\ncomparable to that of internationally\nrecognized scientists."
        fr:
          brilliant_diamond: "La morsure de Kokiyas a fait de lui un génie dont\nl’intelligence rivalise avec celle des scientifiques\nles plus éminents du monde."
          shining_pearl: "La morsure de Kokiyas a fait de lui un génie dont\nl’intelligence rivalise avec celle des scientifiques\nles plus éminents du monde."
        it:
          brilliant_diamond: "Il morso di Shellder gli ha infuso un’intelligenza\npari a quella di scienziati di fama mondiale."
          shining_pearl: "Il morso di Shellder gli ha infuso un’intelligenza\npari a quella di scienziati di fama mondiale."
        de:
          brilliant_diamond: "Durch Muschas’ Biss wurde es derart intelligent,\ndass es den Vergleich mit Wissenschaftlern von\nWeltrang nicht zu scheuen braucht."
          shining_pearl: "Durch Muschas’ Biss wurde es derart intelligent,\ndass es den Vergleich mit Wissenschaftlern von\nWeltrang nicht zu scheuen braucht."
        es:
          brilliant_diamond: "Al ser mordido por un Shellder, desarrolló una\ninteligencia comparable a la de una eminencia\ncientífica mundial."
          shining_pearl: "Al ser mordido por un Shellder, desarrolló una\ninteligencia comparable a la de una eminencia\ncientífica mundial."
        ko:
          brilliant_diamond: "셀러에 물린 것을 계기로\n세계적으로 권위 있는 과학자에\n견줄 수준의 지능을 얻었다."
          shining_pearl: "셀러에 물린 것을 계기로\n세계적으로 권위 있는 과학자에\n견줄 수준의 지능을 얻었다."
        zh_simp:
          brilliant_diamond: "被大舌贝咬到后，它的智力\n上升到了与世界顶级科学家\n相媲美的水准。"
          shining_pearl: "被大舌贝咬到后，它的智力\n上升到了与世界顶级科学家\n相媲美的水准。"
        zh_trad:
          brilliant_diamond: "因為被大舌貝咬到，\n使牠獲得了媲美\n世界頂尖科學家的智能。"
          shining_pearl: "因為被大舌貝咬到，\n使牠獲得了媲美\n世界頂尖科學家的智能。"
misdreavus:
  species_id: 200
  names:
    jp_kana: ムウマ
    jp_kanji: ムウマ
    en: Misdreavus
    fr: Feuforêve
    it: Misdreavus
    de: Traunfugil
    es: Misdreavus
    ko: 무우마
    zh_simp: 梦妖
    zh_trad: 夢妖
  forms:
    misdreavus:
      form_id: 0
      base_stats:
        hp: 60
        attack: 60
        defense: 60
        special_attack: 85
        special_defense: 85
        speed: 85
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 1
        speed: 0
      types:
        - ghost
      egg_groups:
        - amorphous
      abilities:
        - levitate
      descriptions:
        jp_kana:
          brilliant_diamond: "まよなか　はいごから　ちかづき\nなきさけぶような　なきごえを　あげて\nおどろかせては　よろこぶ　ポケモン。"
          shining_pearl: "こわがる　こころを　あかい　たまで\nきゅうしゅうして　えいようにする。\nひるまは　くらがりで　ねむっている。"
        jp_kanji:
          brilliant_diamond: "真夜中　背後から　近づき\n泣き叫ぶような　鳴き声を　あげて\n驚かせては　喜ぶ　ポケモン。"
          shining_pearl: "怖がる　心を　赤い　玉で\n吸収して　栄養にする。\n昼間は　暗がりで　眠っている。"
        en:
          brilliant_diamond: "It loves to sneak up on people late at night\nand startle them with its shrieking cry."
          shining_pearl: "It gets nourishment from fear that it absorbs into\nits red orbs. During the daytime, it sleeps in\nthe shadows."
        fr:
          brilliant_diamond: "La nuit, il adore se faufiler derrière les gens\net les surprendre en poussant des hurlements\nqui ressemblent à des lamentations."
          shining_pearl: "Il absorbe la peur à l’aide de ses orbes\nrouges et s’en nourrit. Pendant la journée,\nil dort dans la pénombre."
        it:
          brilliant_diamond: "Ama avvicinarsi alle persone alle spalle, in piena\nnotte, per terrorizzarle con il suo urlo stridulo."
          shining_pearl: "Si nutre di paura, che assorbe con le sue sfere\nrosse. Di giorno dorme nell’oscurità."
        de:
          brilliant_diamond: "Nachts schleicht es sich liebend gern von hinten\nan Leute an, um sie dann mit seinem schrillen\nSchrei zu erschrecken."
          shining_pearl: "Es ernährt sich von Angst, die es über seine\nroten Kugeln absorbiert. Tagsüber schläft es\nim Dunkeln."
        es:
          brilliant_diamond: "De noche, le encanta acercarse a la gente por\ndetrás para asustarla con sus estridentes gritos."
          shining_pearl: "Se alimenta del miedo, que absorbe con sus\nesferas rojas. Por el día, duerme en la oscuridad."
        ko:
          brilliant_diamond: "한밤중 등 뒤에서 다가와\n울부짖는 울음소리를 내어\n놀라게 하고는 즐거워하는 포켓몬이다."
          shining_pearl: "무서워하는 마음을 빨간 구슬로\n흡수해 영양분으로 만든다.\n낮에는 어두운 곳에서 잠자고 있다."
        zh_simp:
          brilliant_diamond: "深更半夜从背后接近，发出\n彷佛哭喊般的声音来吓唬人们，\n并以此为乐的宝可梦。"
          shining_pearl: "会用红色的珠子吸收恐惧之心，\n并将其作为自己的养料。\n白天会在黑暗处睡觉。"
        zh_trad:
          brilliant_diamond: "會在深夜時分從背後接近，\n發出哭喊般的叫聲嚇人，\n並以此為樂的寶可夢。"
          shining_pearl: "會用紅色珠子吸收恐懼之心，\n將其作為自己的營養。\n白天會在陰暗處睡覺。"
