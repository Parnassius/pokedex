      descriptions:
        jp_kana:
          brilliant_diamond: "２ほんの　しょっかくで　かいすいの\nびみょうな　うごきを　キャッチする。\nひとなつっこい　ポケモン。"
          shining_pearl: "とくちょうてきな　せなかの　もようは\nすむ　ちいきによって　ちがうことが\nがくしゃの　けんきゅうで　わかった。"
        jp_kanji:
          brilliant_diamond: "２本の　触角で　海水の\n微妙な　動きを　キャッチする。\n人懐っこい　ポケモン。"
          shining_pearl: "特徴的な　背中の　模様は\n住む　地域によって　違うことが\n学者の　研究で　わかった。"
        en:
          brilliant_diamond: "A friendly Pokémon that senses the subtle flows\nof seawater using its two antennae."
          shining_pearl: "Scientists discovered that the distinctive patterns\non its back differ by region."
        fr:
          brilliant_diamond: "Ce Pokémon amical détecte\nles mouvements subtils de l’eau\nde mer grâce à ses deux antennes."
          shining_pearl: "Grâce à des études scientifiques, on sait\nque ses motifs dorsaux caractéristiques\nvarient selon les régions."
        it:
          brilliant_diamond: "È un Pokémon mansueto. Con le antenne\nè in grado di avvertire anche le più deboli\ncorrenti marine."
          shining_pearl: "Gli scienziati hanno scoperto che il disegno\ncaratteristico sul suo dorso varia da regione\na regione."
        de:
          brilliant_diamond: "Ein zutrauliches Pokémon, das mit seinen beiden\nAntennen selbst die leichtesten Strömungen des\nMeeres wahrnimmt."
          shining_pearl: "Wissenschaftler haben bei ihren Nachforschungen\nherausgefunden, dass Mantirps’ charakteristisches\nRückenmuster regionale Unterschiede aufweist."
        es:
          brilliant_diamond: "Un Pokémon afable que detecta los más sutiles\ncambios en el flujo del agua marina con sus dos\nantenas."
          shining_pearl: "Los científicos descubrieron que el característico\npatrón que luce en el lomo varía según la región."
        ko:
          brilliant_diamond: "2개의 더듬이로 해수의\n미묘한 움직임을 포착한다.\n사람을 잘 따르는 포켓몬이다."
          shining_pearl: "학자의 연구에 따르면\n등에 있는 특징적인 무늬는\n사는 지역에 따라 다르다고 한다."
        zh_simp:
          brilliant_diamond: "２根触角能够感受到\n海水细微的流动。\n是种很亲近人的宝可梦。"
          shining_pearl: "学者们通过研究发现，\n它们背上独特的花纹\n会因栖息的地域而有所不同。"
        zh_trad:
          brilliant_diamond: "能透過２根觸角來感知\n海水細微的流動。\n是種愛親近人的寶可夢。"
          shining_pearl: "根據學者的研究發現，\n小球飛魚獨特的背部花紋，\n會因地域而有所差別。"
snover:
