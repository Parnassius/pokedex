      descriptions:
        jp_kana:
          brilliant_diamond: "きけんを　かんじると　ぜんしんの\nたいもうが　ひかる。あいてが　めを\nくらませている　あいだに　にげる。"
          shining_pearl: "きんにくの　うごきで　でんきを\nつくる　しくみを　まえあしに　もつ。\nピンチになると　ぜんしんが　ひかる。"
        jp_kanji:
          brilliant_diamond: "危険を　感じると　全身の\n体毛が　光る。相手が　目を\nくらませている　あいだに　逃げる。"
          shining_pearl: "筋肉の　動きで　電気を\n作る　仕組みを　前足に　持つ。\nピンチになると　全身が　光る。"
        en:
          brilliant_diamond: "All of its fur dazzles if danger is sensed. It flees\nwhile the foe is momentarily blinded."
          shining_pearl: "Its forelegs have a muscle-based system of\ngenerating electricity. Its body shines when\nit is in danger."
        fr:
          brilliant_diamond: "Sa fourrure étincelle quand il perçoit un danger.\nIl profite du fait que l’ennemi soit temporairement\naveuglé pour s’enfuir."
          shining_pearl: "Les muscles de ses pattes avant produisent\nde l’électricité lorsqu’ils travaillent.\nSon corps s’illumine en cas de danger."
        it:
          brilliant_diamond: "In caso di pericolo, la sua pelliccia si illumina.\nIl nemico rimane accecato e lui ne approfitta\nper fuggire."
          shining_pearl: "È in grado di generare elettricità con i muscoli\ndelle zampe anteriori. Il suo corpo brilla se è\nin pericolo."
        de:
          brilliant_diamond: "Bei Gefahr lässt es sein Fell aufleuchten,\num Reißaus zu nehmen, solange der Gegner\ngeblendet ist."
          shining_pearl: "Über die Muskulatur seiner Vorderbeine kann es\nElektrizität erzeugen. Bei Gefahr leuchtet sein\ngesamter Körper."
        es:
          brilliant_diamond: "Si siente peligro, todo su pelaje brilla. Aprovecha\nla ceguera temporal de su rival para huir."
          shining_pearl: "Genera electricidad gracias a los músculos de las\npatas delanteras. Si está en peligro, brilla."
        ko:
          brilliant_diamond: "위험을 느끼면 전신의 털이\n빛난다. 그로 인해 상대가 앞을\n보지 못하는 동안 도망친다."
          shining_pearl: "근육의 움직임으로 전기를 만드는\n구조를 앞발에 가지고 있다.\n위급해지면 전신이 빛난다."
        zh_simp:
          brilliant_diamond: "一旦感知到危险，\n全身的体毛都会发光。\n趁对手眼睛被闪到时逃之夭夭。"
          shining_pearl: "前脚有着通过肌肉运动\n来制造电力的构造。\n遇上危机时全身会发光。"
        zh_trad:
          brilliant_diamond: "一旦感知到危險，\n全身的體毛就會發光，\n趁對手眼睛被閃到時逃之夭夭。"
          shining_pearl: "前腳有著靠肌肉運動\n來製造電力的構造。\n遇上危機時全身就會發光。"
