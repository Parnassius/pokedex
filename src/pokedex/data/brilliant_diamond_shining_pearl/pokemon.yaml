        fr:
          brilliant_diamond: "Il adore le sang des êtres humains et des\nPokémon, et il virevolte dans le ciel nocturne\nen quête d’un cou où planter ses crocs."
          shining_pearl: "Quand ce chasseur nocturne se met à sucer\ndu sang, il ne s’arrête qu’une fois rassasié."
        it:
          brilliant_diamond: "Ama il sangue umano e quello dei Pokémon.\nVola nell’oscurità della notte alla ricerca\ndi arterie carotidi da addentare."
