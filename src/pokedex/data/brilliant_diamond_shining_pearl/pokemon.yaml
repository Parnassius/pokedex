        es:
          brilliant_diamond: "Se vuelve agresivo si su cuerpo acumula\ndemasiada electricidad, que descarga a través\nde la cola."
          shining_pearl: "Puede emitir ráfagas de 100 000 V capaces\nde acabar de un solo golpe con rivales mucho\nmás grandes que él."
        ko:
          brilliant_diamond: "몸의 전기가 지나치게 축적되면\n공격적인 성향을 지니게 된다.\n꼬리로부터 전기를 흘려보낸다."
          shining_pearl: "전기의 충격은 10만 볼트다.\n자신보다 몇 배나 큰 상대를\n일격에 기절시킨다."
        zh_simp:
          brilliant_diamond: "如果身体里积蓄的电力过多，\n情绪就会变得具有攻击性。\n会从尾巴处放电。"
          shining_pearl: "电击的威力高达十万伏特。\n能一击击晕比自己大\n好几倍的对手。"
        zh_trad:
          brilliant_diamond: "當體內累積了過多的電力，\n情緒就會變得帶有攻擊性。\n會從尾巴放電。"
          shining_pearl: "電擊的威力高達十萬伏特。\n能一擊電暈比自己大\n好幾倍的對手。"
