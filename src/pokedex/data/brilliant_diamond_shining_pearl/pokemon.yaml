        de:
          brilliant_diamond: "Es liebt das Blut von Menschen und Pokémon.\nNachts fliegt es auf der Suche nach Halsvenen\numher."
          shining_pearl: "Es flattert durch die Nacht und sucht nach Beute.\nHat es einmal angefangen, Blut zu saugen, hört\nes erst wieder auf, wenn es satt ist."
        es:
          brilliant_diamond: "Le encanta la sangre, tanto la de Pokémon\ncomo la humana. Por la noche vuela en busca\nde cuellos con los que calmar su sed."
          shining_pearl: "Cuando chupa sangre, no para hasta hartarse.\nPor la noche sale volando a la caza de presas."
        ko:
          brilliant_diamond: "사람이나 포켓몬의 혈액을\n매우 좋아한다. 목덜미의 혈관을\n노리며 밤하늘을 날아다닌다."
          shining_pearl: "한번 피를 빨기 시작하면\n배가 부를 때까지 그만두지 않는다.\n어둠 속을 날며 먹이를 찾는다."
        zh_simp:
          brilliant_diamond: "非常喜欢人和宝可梦的血液。\n会以猎物脖子处的血管为目标，\n在夜空中飞来飞去。"
          shining_pearl: "一旦开始吸血，\n在吸饱之前是不会停下来的。\n会在黑暗中飞着寻找猎物。"
        zh_trad:
          brilliant_diamond: "人和寶可夢的血液是牠的最愛。\n會以後頸處的血管為目標，\n在夜空中飛來飛去。"
          shining_pearl: "一旦開始吸血，\n在吸飽之前絕不會停下來。\n會在黑暗中飛著尋找獵物。"
