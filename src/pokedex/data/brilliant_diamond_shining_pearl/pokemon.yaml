          shining_pearl: "ちょっけい　２メートルの　おおぐち。\nじどうしゃを　ペシャンコに\nつぶしてしまう　はかいりょくだ。"
        jp_kanji:
          brilliant_diamond: "体内に　ためた　砂を　体の　穴から\n噴き上げて　巨大な\n竜巻を　作り　攻撃する。"
          shining_pearl: "直径　２メートルの　大口。\n自動車を　ペシャンコに\n潰してしまう　破壊力だ。"
        en:
          brilliant_diamond: "It blasts internally stored sand from ports on its\nbody to create a towering twister for attack."
          shining_pearl: "Its huge mouth opens almost seven feet wide.\nIt has enough power to completely crush a car."
        fr:
          brilliant_diamond: "Lorsqu’il attaque, il expulse par ses orifices\nle sable emmagasiné dans son corps pour\ncréer de gigantesques tornades."
          shining_pearl: "Sa grande gueule fait 2 m de diamètre.\nIl a assez de force pour écraser une voiture."
        it:
          brilliant_diamond: "Immagazzina sabbia all’interno del corpo\ne la espelle con violenza dai pori per attaccare,\nformando enormi vortici."
          shining_pearl: "La sua enorme bocca misura quasi 2 m.\nÈ tanto forte da poter demolire un’automobile."
        de:
          brilliant_diamond: "Es wirbelt den Sand, den es in seinem Körper\nsammelt, durch die Öffnungen hinaus und erzeugt\nso eine große Windhose, mit der es angreift."
          shining_pearl: "Sein Maul hat einen Durchmesser von 2 m.\nEs besitzt genug Kraft, um ein Auto vollkommen\nzu zermalmen."
        es:
          brilliant_diamond: "Cuando ataca, expele arena almacenada en su\ninterior por los orificios del lomo para crear un\ngran tornado."
          shining_pearl: "Su enorme boca mide 2 m. Es tan fuerte que\npuede aplastar un automóvil por completo."
        ko:
          brilliant_diamond: "체내에 모아 둔 모래를\n몸의 구멍에서 뿜어내\n거대한 회오리를 만들어 공격한다."
          shining_pearl: "직경 2m의 큰 입은\n자동차를 납작하게\n찌그러뜨려 버리는 파괴력을 가졌다."
        zh_simp:
          brilliant_diamond: "会从身体的孔洞里\n向上喷出体内储存的沙子，\n制造出巨大龙卷风进行攻击。"
          shining_pearl: "巨大的嘴巴直径可达２米。\n其威力之强足以把\n一辆汽车咬成破铜烂铁。"
        zh_trad:
          brilliant_diamond: "會從身體的孔洞裡\n向上噴出體內儲存的沙子，\n製造出巨大龍捲風進行攻擊。"
          shining_pearl: "嘴巴有直徑２公尺大，\n擁有能把汽車咬成\n破銅爛鐵的破壞力。"
