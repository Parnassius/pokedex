      descriptions:
        jp_kana:
          brilliant_diamond: "いつも　ないているように　みえるが\nたいないの　すいぶんを　そとに\nだして　ちょうせつしているのだ。"
          shining_pearl: "かんそうした　ばしょを　このむ。\nめ　から　みずを　だして　からだの\nすいぶんを　ちょうせつする。"
        jp_kanji:
          brilliant_diamond: "いつも　泣いているように　見えるが\n体内の　水分を　外に\n出して　調節しているのだ。"
          shining_pearl: "乾燥した　場所を　好む。\n目から　水を　出して\n体の　水分を　調節する。"
        en:
          brilliant_diamond: "It looks as if it is always crying. It is actually\nadjusting its body’s fluid levels by\neliminating excess."
          shining_pearl: "It prefers arid environments. It leaks water from\nits eyes to adjust its body’s fluid levels."
        fr:
          brilliant_diamond: "On dirait qu’il pleure constamment, mais\nen réalité, il régule ses fluides corporels\nen les expulsant."
          shining_pearl: "Ce Pokémon aime les endroits arides.\nIl évacue de l’eau par les yeux pour\nréguler ses fluides corporels."
        it:
          brilliant_diamond: "Sembra che pianga tutto il tempo, ma in realtà\nsta solo regolando il livello dei suoi fluidi\ncorporei eliminando gli eccessi."
          shining_pearl: "Preferisce le terre aride. Rilascia acqua\ndagli occhi per regolare il livello dei suoi\nfluidi corporei."
        de:
          brilliant_diamond: "Es sieht aus, als würde es ständig weinen, dabei\nreguliert es durch das Ausscheiden von Wasser\nnur seinen Wasserhaushalt."
          shining_pearl: "Es bevorzugt trockene Gebiete. Über die Augen\nscheidet es Wasser aus, um den Wasserhaushalt\nseines Körpers zu regulieren."
        es:
          brilliant_diamond: "Parece que siempre está llorando, pero en\nrealidad está eliminando el exceso de fluidos\ncorporales."
          shining_pearl: "Prefiere entornos áridos. Expulsa agua por los\nojos para ajustar los niveles de fluido corporal."
        ko:
          brilliant_diamond: "항상 우는 것처럼 보이지만\n체내의 수분을 밖으로\n내어 조절하고 있는 것이다."
          shining_pearl: "건조한 장소를 좋아한다.\n눈에서 물을 내어\n몸의 수분을 조절한다."
        zh_simp:
          brilliant_diamond: "虽然它看上去一直在哭，\n但其实是在排出多余的水分，\n以调节体内水分平衡。"
          shining_pearl: "喜欢干燥的地方。\n从眼睛里流出水来\n调节体内的水分。"
        zh_trad:
          brilliant_diamond: "雖然牠看起來總是在哭，\n但其實是正在排出水分，\n以調節體內的水分平衡。"
          shining_pearl: "喜歡乾燥的地方。\n會從眼睛裡流出水來\n調節體內的水分。"
