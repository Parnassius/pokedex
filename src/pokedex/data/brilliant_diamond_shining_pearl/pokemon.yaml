          shining_pearl: "するどい　めつきで　あいてを　かるい\nさいみん　じょうたいに　してしまう。\nとても　きまぐれな　ポケモン。"
        jp_kanji:
          brilliant_diamond: "気に入らないと　ツメを　立てるが\nたまに　のどを　鳴らして\n甘える　性格が　一部に　大人気だ。"
          shining_pearl: "鋭い　目つきで　相手を　軽い\n催眠　状態に　してしまう。\nとても　気まぐれな　ポケモン。"
        en:
          brilliant_diamond: "It claws if displeased and purrs when\naffectionate. Its fickleness is very popular\namong some."
          shining_pearl: "With its sharp glare, it puts foes in a mild\nhypnotic state. It is a very fickle Pokémon."
        fr:
          brilliant_diamond: "Lorsqu’il est contrarié, il griffe. Lorsqu’il\nveut des câlins, il ronronne. Son caractère\nimprévisible plaît à certaines personnes."
          shining_pearl: "Son regard perçant plonge l’ennemi\ndans une légère hypnose.\nC’est un Pokémon très lunatique."
        it:
          brilliant_diamond: "Se non gli piaci tira fuori gli artigli, ma a volte\nfa le fusa in cerca di attenzioni. Ad alcuni piace\nmolto questo suo carattere."
          shining_pearl: "Con il suo sguardo penetrante può far cadere\nil nemico in un leggero stato di ipnosi.\nÈ molto lunatico."
        de:
          brilliant_diamond: "Bei Missfallen zeigt es zwar seine Krallen, doch\nmanchmal schmiegt es sich auch schnurrend an.\nDieses Verhalten ist bei einigen sehr beliebt."
          shining_pearl: "Mit seinem scharfen Blick versetzt dieses äußerst\nlaunenhafte Pokémon seine Gegner in einen\nleicht hypnotischen Zustand."
        es:
          brilliant_diamond: "Araña cuando está enfadado y ronronea cuando\nestá cariñoso. Su imprevisibilidad es famosa."
          shining_pearl: "Hipnotiza ligeramente a sus enemigos con su\npenetrante mirada. Es de carácter impredecible."
        ko:
          brilliant_diamond: "마음에 안 들면 발톱을 세우지만\n가끔 울음소리로 응석을 부리는\n성격이 일부에게 매우 인기가 있다."
          shining_pearl: "날카로운 눈초리로 상대를 가벼운\n최면 상태로 만들어 버린다.\n매우 변덕스러운 포켓몬이다."
        zh_simp:
          brilliant_diamond: "一不称心，就会竖起爪子。\n但偶尔会从喉咙里发出声响来撒娇，\n这样的性格很受部分人喜爱。"
          shining_pearl: "锐利的目光会让对手\n陷入轻度的催眠状态。\n是种非常随性的宝可梦。"
        zh_trad:
          brilliant_diamond: "一不高興就會豎起爪子。\n但有時也會從喉嚨發出聲響來撒嬌。\n這樣的性格很受部分人的喜愛。"
          shining_pearl: "會用犀利的眼神讓對手\n陷入輕度的催眠狀態。\n是種性情善變的寶可夢。"
