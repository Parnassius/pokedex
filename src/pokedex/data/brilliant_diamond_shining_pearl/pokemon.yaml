          shining_pearl: "2개의 뿔 사이에 먹이를 끼우고\n조각날 때까지 놓지 않는다.\n조각나지 않으면 저편으로 세게 내던진다."
        zh_simp:
          brilliant_diamond: "会用２只角夹住猎物，\n在撕碎猎物前不会松开。\n无法撕碎时就会把猎物扔到天边去。"
