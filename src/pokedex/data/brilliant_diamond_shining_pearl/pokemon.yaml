          shining_pearl: "くちから　だす　しろい　いとは\nくうきに　ふれると　ネバネバになって\nあいての　うごきを　ふうじる。"
        jp_kanji:
          brilliant_diamond: "葉っぱが　大好物。\nムックルに　襲われたときは\nお尻の　トゲで　撃退する。"
          shining_pearl: "口から　出す　白い　糸は\n空気に　触れると　ネバネバになって\n相手の　動きを　封じる。"
        en:
          brilliant_diamond: "It loves to eat leaves. If it is attacked by a Starly,\nit will defend itself with its spiked rear."
          shining_pearl: "It spits a white silk thread that turns sticky when\ncoming into contact with air. The silk is used to\nimmobilize foes."
        fr:
          brilliant_diamond: "Il adore manger des feuilles. Si un Étourmi\nl’attaque, il riposte avec ses pointes arrière."
          shining_pearl: "Le fil blanc qu’il sécrète par la bouche\ndevient collant au contact de l’air.\nIl s’en sert pour immobiliser ses ennemis."
        it:
          brilliant_diamond: "Ama mangiare le foglie. Se uno Starly lo attacca,\nlo respinge con gli aculei che ha sulla parte\nposteriore."
          shining_pearl: "Emette dalla bocca un filo di seta bianco che\ndiventa appiccicoso a contatto con l’aria e con\nil quale immobilizza i nemici."
        de:
          brilliant_diamond: "Am liebsten frisst es Blätter. Wird es von einem\nStaralili angegriffen, schlägt es dieses mit den\nStacheln an seinem Hinterteil zurück."
          shining_pearl: "Waumpel spuckt weiße Seide aus seinem Mund,\ndie an der Luft klebrig wird, und macht so seine\nGegner bewegungsunfähig."
        es:
          brilliant_diamond: "Le encanta comer hojas. Si le ataca un Starly,\nse defenderá con las púas de la cola."
          shining_pearl: "Inmoviliza a sus enemigos escupiendo una seda\nblanca que se vuelve pegajosa al contacto con el\naire."
        ko:
          brilliant_diamond: "잎사귀를 매우 좋아한다.\n찌르꼬에게 습격당했을 때는\n엉덩이의 가시로 물리친다."
          shining_pearl: "입에서 내는 하얀 실은\n공기에 닿으면 끈적끈적해져서\n상대의 움직임을 봉쇄한다."
        zh_simp:
          brilliant_diamond: "非常喜欢吃叶子。\n受到姆克儿的袭击时，\n会用尾部的刺击退对方。"
          shining_pearl: "从嘴里吐出的白丝只要\n接触到空气就会变得黏糊糊的，\n以此来封住对手的行动。"
        zh_trad:
          brilliant_diamond: "最喜歡吃葉子。\n受到姆克兒的襲擊時，\n會用尾部的刺擊退對方。"
          shining_pearl: "從嘴裡吐出的白絲，只要\n接觸到空氣就會變得黏答答，\n以此來封住對手的行動。"
