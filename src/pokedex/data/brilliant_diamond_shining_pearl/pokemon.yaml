          brilliant_diamond: "２０００ねん　いじょう　ねむっていた\nドータクンが　こうじげんばから\nほりだされ　だいニュースに　なった。"
          shining_pearl: "あまぐもを　よび　あめを　ふらせる\nわざを　もつ。ほうさくの　かみさまと\nむかしの　ひとびとは　まつっていた。"
        jp_kanji:
          brilliant_diamond: "２０００年以上　眠っていた\nドータクンが　工事現場から\n掘り出され　大ニュースに　なった。"
          shining_pearl: "雨雲を　呼び　雨を　降らせる\n技を　持つ。豊作の　神様と\n昔の　人々は　まつっていた。"
        en:
          brilliant_diamond: "One caused a media storm when it was dug up\nat a construction site after a 2,000-year sleep."
          shining_pearl: "It can summon rain clouds. People long ago\nrevered it as the bringer of plentiful harvests."
        fr:
          brilliant_diamond: "Lorsqu’il a été découvert sur un chantier\naprès plus de 2 000 ans de sommeil,\nla nouvelle a fait la une des journaux."
          shining_pearl: "Il a la capacité d’invoquer des nuages pluvieux\net était jadis vénéré comme le dieu des bonnes\nmoissons."
        it:
          brilliant_diamond: "Il suo ritrovamento in un cantiere dopo un sonno\ndi 2.000 anni fece a suo tempo molto scalpore."
          shining_pearl: "Può invocare delle nubi cariche di pioggia per\nscatenare un acquazzone. Un tempo era venerato\ncome patrono dei buoni raccolti."
        de:
          brilliant_diamond: "Es wurde nach zweitausendjährigem Schlaf bei\nGrabungen auf einer Baustelle entdeckt und\nsorgte so weltweit für Schlagzeilen."
          shining_pearl: "Es ist imstande, Regen heraufzubeschwören und\nwurde deshalb einst von den Menschen als\nErntegottheit verehrt."
        es:
          brilliant_diamond: "Se produjo un gran revuelo mediático cuando en\nuna obra encontraron un Bronzong que llevaba\nmás de 2000 años durmiendo."
          shining_pearl: "Puede conjurar nubes de lluvia. Antaño, la gente\nlo veneraba como una deidad de las buenas\ncosechas."
        ko:
          brilliant_diamond: "2000년 이상 잠자고 있던\n동탁군이 공사현장에서\n발굴되어 빅뉴스가 되었다."
          shining_pearl: "비구름을 불러 비를 내리는 기술을\n가지고 있다. 풍작의 신이라고\n옛날 사람들은 받들어 모셨다."
        zh_simp:
          brilliant_diamond: "沉睡了２０００多年的\n青铜钟在工地被挖掘出来，\n成为了一件大新闻。"
          shining_pearl: "能够召唤雨云，降下大雨。\n从前人们把它当作\n丰收之神供奉着。"
        zh_trad:
          brilliant_diamond: "沉睡了２０００年以上的\n青銅鐘在工地被挖出，\n成了一件大新聞。"
          shining_pearl: "擁有能召喚雨雲來降下\n雨水的招式。過去被人們\n當成豐收之神來供奉。"
