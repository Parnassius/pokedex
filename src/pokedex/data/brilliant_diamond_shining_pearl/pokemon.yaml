          brilliant_diamond: "Ce Pokémon a le pouvoir de plonger les gens\ndans un profond sommeil pour les forcer à rêver.\nIl est actif les nuits de nouvelle lune."
          shining_pearl: "Selon la légende, ce Pokémon provoquerait\nd’horribles cauchemars lors des nuits sans lune."
