          brilliant_diamond: "こぶしの　トゲからは　かすりきずでも\nいのちを　おとすほどの　もうどくを\nぶんぴつしている。"
          shining_pearl: "どくぶくろで　つくられた　もうどくは\nうでの　くだを　とおって\nこぶしの　トゲに　おくられるのだ。"
        jp_kanji:
          brilliant_diamond: "こぶしの　トゲからは\nかすり傷でも　命を　落とすほどの\n猛毒を　分泌する。"
          shining_pearl: "毒袋で　作られた　猛毒は\n腕の　管を　通って\n拳の　トゲに　送られるのだ。"
        en:
          brilliant_diamond: "Its knuckle claws secrete a toxin so vile that even\na scratch could prove fatal."
          shining_pearl: "The toxin made in its poison sac is pumped to\nthe knuckle claws through tubes down its arms."
        fr:
          brilliant_diamond: "Les épines de ses poings sécrètent une toxine\nsi dangereuse qu’une simple égratignure peut\ns’avérer fatale."
          shining_pearl: "La toxine virulente produite par ses glandes\nde poison traverse les vaisseaux de ses bras\npour arriver jusqu’à ses griffes."
        it:
          brilliant_diamond: "Gli artigli delle mani secernono una tossina così\nvelenosa che persino un graffio può essere letale."
          shining_pearl: "La tossina prodotta nella sua sacca di veleno\nviene pompata negli artigli attraverso\ndei condotti negli arti superiori."
        de:
          brilliant_diamond: "Die Klauen an seinen Fingerknöcheln geben ein\nso starkes Gift ab, dass selbst ein kleiner Kratzer\ntödlich ist."
          shining_pearl: "In seinem Giftsack entsteht ein starkes Gift,\ndas durch Röhren in beiden Armen direkt in die\nKlauen an seinen Fingerknöcheln gepumpt wird."
        es:
          brilliant_diamond: "Sus garras segregan una toxina tan potente que\nun simple arañazo puede ser mortal."
          shining_pearl: "Produce una toxina en su bolsa de veneno que le\nllega a las garras por unos tubos en los brazos."
        ko:
          brilliant_diamond: "주먹의 가시는 긁히기만 해도\n생명을 잃을 정도의 맹독을\n분비하고 있다."
          shining_pearl: "독주머니에서 만들어진 맹독은\n팔의 관을 통해서\n주먹의 가시에 보내진다."
        zh_simp:
          brilliant_diamond: "从拳头的尖刺里\n分泌出的剧毒，即使\n只是擦伤也足以致命。"
          shining_pearl: "从毒囊生成的剧毒\n会通过手臂上的管道，\n进到拳头上的尖刺里。"
        zh_trad:
          brilliant_diamond: "拳頭上的刺\n可以分泌出即使只是擦傷\n也足以致命的劇毒。"
          shining_pearl: "用毒囊製造出的劇毒，\n會通過手臂上的導管，\n輸進拳頭上的尖刺中。"
carnivine:
