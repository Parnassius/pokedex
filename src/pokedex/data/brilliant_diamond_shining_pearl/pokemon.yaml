          brilliant_diamond: "It dips its large bill in the sea, then scoops up\nnumerous prey along with water."
          shining_pearl: "It acts as a delivery service by carrying small\nPokémon in its bill. It bobs on the waves to rest."
        fr:
          brilliant_diamond: "Pour se nourrir, il trempe son grand bec\ndans la mer. Lorsqu’il le ressort de l’eau,\nson bec est rempli de proies."
          shining_pearl: "Il livre de petits Pokémon qu’il charge\ndans son bec. Il se repose en se laissant\nbercer par la houle."
        it:
          brilliant_diamond: "Immerge il suo enorme becco nel mare,\nraccogliendo numerose prede in una volta sola."
          shining_pearl: "Funge da corriere trasportando piccoli Pokémon\nnell’enorme becco. Quando è stanco, si riposa\ngalleggiando nel mare."
        de:
          brilliant_diamond: "Indem es seinen großen Schnabel ins Wasser\ntaucht, schöpft es eine Menge Beute auf einmal."
          shining_pearl: "Es fungiert als Transportdienst, indem es kleine\nPokémon in seinem Schnabel befördert. Ist es\nmüde, lässt es sich auf dem Meer treiben."
        es:
          brilliant_diamond: "Hunde su gran pico en el mar para sacar\nnumerosas presas junto con mucha agua."
          shining_pearl: "Transporta Pokémon pequeños en el interior del\npico cual mensajero. Cuando se cansa, reposa\nmeciéndose sobre las olas."
        ko:
          brilliant_diamond: "큰 부리를 바다에 넣고 먹이를\n한 번에 많이 건져 올리려는\n궁리를 하는 포켓몬이다."
          shining_pearl: "부리에 작은 포켓몬을\n넣고 날아다니는 배달부다.\n지치면 바다에 떠다니며 쉰다."
        zh_simp:
          brilliant_diamond: "大嘴鸥将大大的鸟嘴\n伸进海里再抬起来后，\n嘴里就会装着满满的食物。"
          shining_pearl: "鸟嘴里放着小型宝可梦的\n飞天快递员。\n累了就会浮在海上休息。"
        zh_trad:
          brilliant_diamond: "大嘴鷗將大大的鳥嘴\n伸進海裡再抬起來時，\n嘴裡就會裝著滿滿的食物。"
          shining_pearl: "會把小型寶可夢放進鳥嘴裡\n飛翔的送貨員。疲累時\n會漂浮在海上休息。"
