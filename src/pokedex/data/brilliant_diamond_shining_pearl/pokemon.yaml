          shining_pearl: "かたてで　ダンプカーを　もちあげる\nパワーを　いかして　ひとの　かわりに\nちからしごとを　てつだう　ポケモン。"
        jp_kanji:
          brilliant_diamond: "ゴーリキーの　底知れない　パワーは\nとても　危険なので　力を\n制御する　ベルトを　巻いている。"
          shining_pearl: "片手で　ダンプカーを　持ち上げる\nパワーを　活かして　人の　かわりに\n力仕事を　手伝う　ポケモン。"
        en:
          brilliant_diamond: "Machoke’s boundless power is very dangerous,\nso it wears a belt that suppresses its energy."
          shining_pearl: "It can lift a dump truck with one hand. Using that\nkind of strength, it helps people do heavy jobs."
        fr:
          brilliant_diamond: "Sa force incommensurable est très dangereuse,\nc’est pourquoi il porte une ceinture pour contenir\nson énergie."
          shining_pearl: "Il peut soulever un camion-benne d’une main,\net il met sa force au service des êtres humains en\naccomplissant des travaux physiques à leur place."
        it:
          brilliant_diamond: "La sua incredibile forza può essere molto\npericolosa. Indossa una cintura per tenerla\nsotto controllo."
          shining_pearl: "È così forte da sollevare un autocarro con una\nsola mano. Aiuta le persone nei lavori pesanti."
        de:
          brilliant_diamond: "Maschocks grenzenlose Kraft birgt allerlei\nGefahren, weshalb dieses Pokémon einen\nkraftregulierenden Gürtel trägt."
          shining_pearl: "Es kann mit einer Hand einen Lastwagen stemmen\nund nutzt seine Kraft, um Menschen bei schweren\nkörperlichen Arbeiten zu helfen."
        es:
          brilliant_diamond: "Posee una extraordinaria fuerza que puede\nresultar muy peligrosa, por lo que lleva un\ncinturón que la limita."
          shining_pearl: "Puede levantar un camión con una sola mano.\nUtiliza su fuerza para ayudar a la gente en\ntrabajos que la requieren."
        ko:
          brilliant_diamond: "근육몬의 끝없는 파워는\n매우 위험하므로\n힘을 제어하는 벨트를 차고 있다."
          shining_pearl: "한 손으로 덤프트럭을 들어 올린다.\n파워를 살려서 사람 대신\n힘쓰는 일을 돕는 포켓몬이다."
        zh_simp:
          brilliant_diamond: "豪力那深不可测的力量\n非常危险，所以它戴着\n能够限制力量的腰带。"
          shining_pearl: "会活用自己那单手举\n翻斗车的力量，代替并帮助\n人们做些力气活的宝可梦。"
        zh_trad:
          brilliant_diamond: "豪力深不可測的力量\n非常危險，因此牠戴著\n能夠限制力量的腰帶。"
          shining_pearl: "靠著能夠單手舉起\n大貨車的力量，幫忙人們\n做各種費力工作的寶可夢。"
