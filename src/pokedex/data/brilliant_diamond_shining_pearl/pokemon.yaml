        fr:
          brilliant_diamond: "Il enroule tout dans sa langue extensible.\nCeux qui l’approchent sans prendre garde\nfinissent couverts de bave."
          shining_pearl: "Il enroule tout dans sa langue extensible.\nCeux qui l’approchent sans prendre garde\nfinissent couverts de bave."
