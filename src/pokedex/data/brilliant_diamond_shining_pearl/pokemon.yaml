      descriptions:
        jp_kana:
          brilliant_diamond: "ヒトカゲの　しっぽの　ほのおは\nいのちの　ともしび。げんきな　ときは\nほのおも　ちからづよく　もえあがる。"
          shining_pearl: "ヒトカゲの　しっぽの　ほのおは\nいのちの　ともしび。げんきな　ときは\nほのおも　ちからづよく　もえあがる。"
        jp_kanji:
          brilliant_diamond: "ヒトカゲの　しっぽの　炎は\n命の　ともしび。元気な　ときは\n炎も　力強く　燃え上がる。"
          shining_pearl: "ヒトカゲの　しっぽの　炎は\n命の　ともしび。元気な　ときは\n炎も　力強く　燃え上がる。"
        en:
          brilliant_diamond: "The fire on the tip of its tail is a measure of\nits life. If the Pokémon is healthy, its tail\nburns intensely."
          shining_pearl: "The fire on the tip of its tail is a measure of\nits life. If the Pokémon is healthy, its tail\nburns intensely."
        fr:
          brilliant_diamond: "La flamme au bout de sa queue symbolise\nsa vitalité. Elle brûle intensément quand\nil est en bonne santé."
          shining_pearl: "La flamme au bout de sa queue symbolise\nsa vitalité. Elle brûle intensément quand\nil est en bonne santé."
        it:
          brilliant_diamond: "La fiamma sulla punta della coda è indice della\nsua vitalità. Quando il Pokémon sta bene,\nla fiamma arde più intensamente."
          shining_pearl: "La fiamma sulla punta della coda è indice della\nsua vitalità. Quando il Pokémon sta bene,\nla fiamma arde più intensamente."
        de:
          brilliant_diamond: "Die Flamme auf seiner Schwanzspitze spiegelt\nGlumandas Lebensenergie wider. Ist es gesund,\nlodert dieses Feuer kräftig."
          shining_pearl: "Die Flamme auf seiner Schwanzspitze spiegelt\nGlumandas Lebensenergie wider. Ist es gesund,\nlodert dieses Feuer kräftig."
        es:
          brilliant_diamond: "La llama de la punta de la cola es un indicador\nde su salud. Si Charmander está sano, arderá con\nmás fuerza."
          shining_pearl: "La llama de la punta de la cola es un indicador\nde su salud. Si Charmander está sano, arderá con\nmás fuerza."
        ko:
          brilliant_diamond: "파이리 꼬리의 불꽃은\n생명의 등불이다. 건강할 때는\n불꽃도 강하게 타오른다."
          shining_pearl: "파이리 꼬리의 불꽃은\n생명의 등불이다. 건강할 때는\n불꽃도 강하게 타오른다."
        zh_simp:
          brilliant_diamond: "小火龙尾巴上的火焰是它\n生命的灯火。精神好的时候\n火焰也会烧得更旺。"
          shining_pearl: "小火龙尾巴上的火焰是它\n生命的灯火。精神好的时候\n火焰也会烧得更旺。"
        zh_trad:
          brilliant_diamond: "小火龍尾巴上的火焰是牠\n生命的燈火。充滿活力時\n火焰也會燃燒得更加旺盛。"
          shining_pearl: "小火龍尾巴上的火焰是牠\n生命的燈火。充滿活力時\n火焰也會燃燒得更加旺盛。"
