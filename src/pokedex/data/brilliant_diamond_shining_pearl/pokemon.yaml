        jp_kana:
          brilliant_diamond: "ひるまは　ねぼけて　うかんでいるが\nゆうがた　たいぐんで　とんでいく。\nいきさきは　だれも　しらない。"
          shining_pearl: "ひとや　ポケモンを　のせて　とぶが\nかぜに　ながされているだけなので\nどこへ　とんでいくか　わからない。"
        jp_kanji:
          brilliant_diamond: "昼間は　寝ぼけて　浮かんでいるが\n夕方　大群で　飛んでいく。\n行先は　だれも　知らない。"
          shining_pearl: "人や　ポケモンを　乗せて　飛ぶが\n風に　流されているだけなので\nどこへ　飛んでいくか　わからない。"
        en:
          brilliant_diamond: "They’re drowsy in daytime but fly off in the\nevening in big groups. No one knows where\nthey go."
          shining_pearl: "It carries people and Pokémon when it flies.\nBut since it only drifts, it can end up anywhere."
        fr:
          brilliant_diamond: "Ils flottent en somnolant la journée\net s’envolent en grands groupes\nle soir venu. Nul ne sait où ils vont."
          shining_pearl: "Il s’envole en transportant des êtres humains\net des Pokémon, mais nul ne sait où il va,\ncar il se laisse simplement porter par le vent."
        it:
          brilliant_diamond: "Di giorno fluttua con aria sonnolenta, ma di notte\nvola via in gruppo. Nessuno sa dove vada."
          shining_pearl: "Vola portando in giro persone e Pokémon.\nSiccome si lascia trasportare dal vento, non si sa\nmai quale sia la sua destinazione."
        de:
          brilliant_diamond: "Tagsüber treibt es schläfrig vor sich hin. Nachts\nfliegt es in Schwärmen umher, doch niemand\nweiß, wohin."
          shining_pearl: "Es kann Menschen und Pokémon durch die Lüfte\ntragen, doch da es nur vom Wind getrieben wird,\nweiß man nie, wohin es fliegt."
        es:
          brilliant_diamond: "Durante el día está somnoliento, pero, al caer\nla noche, sale volando en grupo, aunque nadie\nsabe adónde."
          shining_pearl: "Transporta a gente y a Pokémon volando, pero,\ncomo se deja llevar, puede acabar en cualquier\nsitio."
        ko:
          brilliant_diamond: "낮에는 잠이 덜 깨어 떠 있지만\n저녁 무렵에는 큰 무리를 지어 날아간다.\n목적지는 아무도 모른다."
          shining_pearl: "사람이나 포켓몬을 태우고 날지만\n바람에 떠밀려 다닐 뿐이므로\n어디로 날아갈지 모른다."
        zh_simp:
          brilliant_diamond: "白天就这么迷迷糊糊地飘浮着，\n到了傍晚就会整群飞走。\n谁也不知道要飞去哪儿。"
          shining_pearl: "能让人或宝可梦乘着飞行，\n但因为只能跟着风向飘，\n所以不知道会飞到哪里去。"
        zh_trad:
          brilliant_diamond: "白天總是迷迷糊糊地飄浮著，\n到了傍晚就整群飛走。\n誰也不知道牠們要飛去哪裡。"
          shining_pearl: "能讓人或寶可夢乘著飛行。\n但因為只能隨風飄流，\n所以不知道會飛到哪裡去。"
buneary:
  species_id: 427
  names:
    jp_kana: ミミロル
    jp_kanji: ミミロル
    en: Buneary
    fr: Laporeille
    it: Buneary
    de: Haspiror
    es: Buneary
    ko: 이어롤
    zh_simp: 卷卷耳
    zh_trad: 捲捲耳
  forms:
    buneary:
      form_id: 0
      base_stats:
        hp: 55
