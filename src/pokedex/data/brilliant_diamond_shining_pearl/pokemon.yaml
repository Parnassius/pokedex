      descriptions:
        jp_kana:
          brilliant_diamond: "うまれてから　しばらくの　あいだは\nせなかの　タネから　えいようを\nもらって　おおきく　そだつ。"
          shining_pearl: "うまれてから　しばらくの　あいだは\nせなかの　タネから　えいようを\nもらって　おおきく　そだつ。"
        jp_kanji:
          brilliant_diamond: "生まれてから　しばらくの　あいだは\n背中の　タネから　栄養を　もらって\n大きく　育つ。"
          shining_pearl: "生まれてから　しばらくの　あいだは\n背中の　タネから　栄養を　もらって\n大きく　育つ。"
        en:
          brilliant_diamond: "For some time after its birth, it grows by taking\nnourishment from the seed on its back."
          shining_pearl: "For some time after its birth, it grows by taking\nnourishment from the seed on its back."
        fr:
          brilliant_diamond: "Au début de sa vie, la graine sur son dos\nlui fournit les nutriments dont il a besoin\npour grandir."
          shining_pearl: "Au début de sa vie, la graine sur son dos\nlui fournit les nutriments dont il a besoin\npour grandir."
        it:
          brilliant_diamond: "Dopo la nascita, cresce traendo nutrimento\ndal seme piantato sul suo dorso."
          shining_pearl: "Dopo la nascita, cresce traendo nutrimento\ndal seme piantato sul suo dorso."
        de:
          brilliant_diamond: "Nach der Geburt wächst es, indem es für eine\nWeile Nährstoffe über den Samen auf seinem\nRücken aufnimmt."
          shining_pearl: "Nach der Geburt wächst es, indem es für eine\nWeile Nährstoffe über den Samen auf seinem\nRücken aufnimmt."
        es:
          brilliant_diamond: "Durante un tiempo tras nacer, se alimenta de la\nsemilla que tiene en el lomo para crecer."
          shining_pearl: "Durante un tiempo tras nacer, se alimenta de la\nsemilla que tiene en el lomo para crecer."
        ko:
          brilliant_diamond: "태어나서부터 얼마 동안은\n등의 씨앗으로부터\n영양을 공급받아 크게 성장한다."
          shining_pearl: "태어나서부터 얼마 동안은\n등의 씨앗으로부터\n영양을 공급받아 크게 성장한다."
        zh_simp:
          brilliant_diamond: "在出生后的一段时间里，\n它会从背上的种子里\n汲取营养茁壮成长。"
          shining_pearl: "在出生后的一段时间里，\n它会从背上的种子里\n汲取营养茁壮成长。"
        zh_trad:
          brilliant_diamond: "在出生後的一段時間裡，\n牠會從背上的種子裡\n汲取營養成長茁壯。"
          shining_pearl: "在出生後的一段時間裡，\n牠會從背上的種子裡\n汲取營養成長茁壯。"
