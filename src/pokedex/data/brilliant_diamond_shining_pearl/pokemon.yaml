          brilliant_diamond: "からだの　ほとんどが　すいぶん。\nすいしょうのような　めだまから\nふしぎな　ビームを　はっしゃする。"
          shining_pearl: "しおの　ながれに　のって　ただよう。\nメノクラゲの　どくバリに　さされる\nつりびとは　あとを　たたない。"
        jp_kanji:
          brilliant_diamond: "体の　ほとんどが　水分。\n水晶のような　目玉から\n不思議な　ビームを　発射する。"
          shining_pearl: "潮の　流れに　乗って　漂う。\nメノクラゲの　どくバリに　刺される\n釣り人は　後を　絶たない。"
        en:
          brilliant_diamond: "Its body is mostly composed of water. It shoots\nstrange beams from its crystal-like eyes."
          shining_pearl: "It drifts in sea currents. Countless fishers are hurt\nby its poison stingers."
        fr:
          brilliant_diamond: "Son corps est principalement composé d’eau.\nSes yeux cristallins projettent d’étranges rayons."
          shining_pearl: "Il dérive au gré des marées.\nOn ne compte plus le nombre de pêcheurs\nvictimes de ses piqûres toxiques."
        it:
          brilliant_diamond: "Il suo corpo è quasi interamente composto\nd’acqua. Emette dei raggi misteriosi dagli occhi\nsimili a cristalli."
          shining_pearl: "Si lascia trascinare dalle correnti. Innumerevoli\npescatori vengono punti dai suoi aculei velenosi."
        de:
          brilliant_diamond: "Sein Körper besteht fast vollständig aus Wasser.\nAus seinen kristallartigen Augen feuert es\ngeheimnisvolle Strahlen ab."
          shining_pearl: "Es lässt sich von der Strömung treiben. Unzählige\nFischer werden durch seine giftigen Stacheln\nverletzt."
        es:
          brilliant_diamond: "Su cuerpo se compone casi en exclusiva de agua.\nLanza extraños rayos con sus ojos cristalinos."
          shining_pearl: "Se deja arrastrar por las corrientes marinas.\nNumerosos pescadores sufren la punzada de\nsus aguijones venenosos."
        ko:
          brilliant_diamond: "몸 대부분이 수분이다.\n수정 같은 눈에서\n이상한 빔을 발사한다."
          shining_pearl: "바닷물의 흐름을 타고 떠돈다.\n수많은 낚시꾼들이\n왕눈해의 독침에 쏘였다."
        zh_simp:
          brilliant_diamond: "身体的绝大部分都是水。\n会从水晶般的眼珠里\n发射神奇的光束。"
          shining_pearl: "随着海潮四处漂荡。\n垂钓者被玛瑙水母的毒针\n刺到的情形屡见不鲜。"
        zh_trad:
          brilliant_diamond: "身體的絕大部分都是水。\n會從水晶般的眼珠裡\n發射奇異的光束。"
          shining_pearl: "會隨著海流漂浮。\n釣客被瑪瑙水母的毒針\n刺中的事件屢見不鮮。"
