          shining_pearl: "スーパーコンピューター並みの　頭脳。\n発達した　頭脳は　あらゆる\n超能力を　使いこなす。"
        en:
          brilliant_diamond: "Its superb memory lets it recall everything it has\nexperienced from birth. Its IQ exceeds 5,000."
          shining_pearl: "Its highly developed brain is on par with a\nsupercomputer. It can use all forms of\npsychic abilities."
        fr:
          brilliant_diamond: "Grâce à sa mémoire exceptionnelle,\nil se souvient de tout ce qu’il a vécu depuis\nsa naissance. Son Q.I. est supérieur à 5 000."
          shining_pearl: "Son cerveau surdéveloppé est aussi performant\nqu’un superordinateur. Grâce à lui, Alakazam\nmaîtrise tous types de pouvoirs psychiques."
        it:
          brilliant_diamond: "La sua incredibile memoria gli permette\ndi ricordare tutto quello che ha vissuto fin\ndalla nascita. Il suo QI supera 5.000."
          shining_pearl: "Il suo cervello molto sviluppato è simile\na un supercomputer. Sa usare ogni tipo\ndi potere psichico."
        de:
          brilliant_diamond: "Dieses Pokémon mit einem IQ von über 5 000\nbesitzt ein fantastisches Gedächtnis und erinnert\nsich an alles, was es seit seiner Geburt erlebt hat."
          shining_pearl: "Simsala verfügt über diverse Psycho-Kräfte.\nSein hoch entwickeltes Gehirn ist vergleichbar\nmit einem Supercomputer."
        es:
          brilliant_diamond: "Su gran memoria le permite recordar todo lo que\nha vivido desde su nacimiento. Su coeficiente\nintelectual es superior a 5000."
          shining_pearl: "Su cerebro está tan desarrollado como un\nsuperordenador, lo que le permite usar cualquier\npoder psíquico."
        ko:
          brilliant_diamond: "태어나서부터 체험한 모든 것을\n기억하고 있을 정도의 기억력을\n가지고 있다. IQ가 5000이 넘는다."
          shining_pearl: "슈퍼컴퓨터 수준의 두뇌다.\n발달한 두뇌는\n모든 초능력을 구사한다."
        zh_simp:
          brilliant_diamond: "记忆力超群，据说它能记住\n自出生起经历过的每一件事。\n其智商超过了５０００。"
          shining_pearl: "其头脑堪比超级计算机。\n发达的头脑使它能够\n自在使用各种超能力。"
        zh_trad:
          brilliant_diamond: "記憶力驚人，能記下從出生起\n所經驗過的任何一件事。\n智商超過５０００。"
          shining_pearl: "擁有媲美超級電腦的頭腦。\n功能發達的頭腦讓牠能\n自在地操控各種超能力。"
