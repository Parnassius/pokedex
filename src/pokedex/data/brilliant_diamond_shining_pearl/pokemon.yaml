          shining_pearl: "À force de faire trembler le sol en s’agitant\nviolemment, il a appris à prédire les vrais\ntremblements de terre."
        it:
          brilliant_diamond: "È un Pokémon molto territoriale. Respinge\ni nemici scatenando terremoti del raggio di 5 km."
