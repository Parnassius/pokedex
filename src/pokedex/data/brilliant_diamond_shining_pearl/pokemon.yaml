          shining_pearl: "A dim-witted Pokémon. It doesn’t care if it\nbumps its head into boats or rocks\nwhile swimming."
        fr:
          brilliant_diamond: "Ce Pokémon détendu s’installe au fond\ndes rivières et se contente d’attendre que\ndes proies s’égarent dans sa bouche ouverte."
          shining_pearl: "Ce Pokémon simple d’esprit ne se soucie pas des\npierres ou des bateaux qu’il percute en nageant."
        it:
          brilliant_diamond: "È pigro per natura. Sta sul fondo dei fiumi con\nla bocca aperta in attesa della preda."
          shining_pearl: "Pokémon poco astuto. Non si scompone\nse sbatte la testa contro le rocce o gli scafi\ndelle barche mentre nuota."
        de:
          brilliant_diamond: "Ein träges Pokémon, das am Flussgrund mit\ngeöffnetem Maul darauf wartet, dass Beute\nhineinschwimmt."
          shining_pearl: "Diesem etwas stumpfsinnigen Pokémon macht es\nnichts aus, wenn es sich beim Schwimmen den\nKopf an Felsen oder Schiffen stößt."
        es:
          brilliant_diamond: "Un Pokémon bastante perezoso, cuya técnica de\npesca consiste en plantarse con la boca abierta\nen el fondo del río y esperar a que entre algo."
          shining_pearl: "Un Pokémon poco avispado. Si se choca de\ncabeza contra un barco o una roca mientras está\nnadando, ni se inmuta."
        ko:
          brilliant_diamond: "느긋한 성격이다.\n강바닥에서 입을 벌리고 먹이가\n들어오는 것을 한결같이 기다린다."
          shining_pearl: "둔감한 포켓몬이다.\n헤엄치다가 바위나 배에\n부딪쳐도 신경 쓰지 않는다."
        zh_simp:
          brilliant_diamond: "性格悠闲自得。\n会在河底张开嘴巴\n静静地等着食物自己跳进来。"
          shining_pearl: "感觉迟钝的宝可梦。\n就算在游泳时头撞到了\n岩石或船底也毫不在意。"
        zh_trad:
          brilliant_diamond: "性格悠閒自得。\n會在河底張開嘴巴，\n靜靜等著食物自己跳進來。"
          shining_pearl: "反應遲鈍的寶可夢。游泳時\n就算頭撞到了岩石或船底，\n也完全不會去在意。"
