        jp_kana:
          brilliant_diamond: "あいくるしい　しぐさで　だいにんき。\nしずかな　やまおくで　なかまたちと\nくらしていると　かんがえられている。"
          shining_pearl: "つきの　ひかりを　せなかの　つばさに\nあつめて　くうちゅうに　うかぶ。\nみつけるのが　むずかしい　ポケモン。"
        jp_kanji:
          brilliant_diamond: "愛くるしい　しぐさで　大人気。\n静かな　山奥で　仲間たちと\n暮らしていると　考えられている。"
          shining_pearl: "月の　光を　背中の　翼に\n集めて　空中に　浮かぶ。\n見つけるのが　難しい　ポケモン。"
        en:
          brilliant_diamond: "Thought to live with others on quiet mountains,\nit is popular for its adorable nature."
          shining_pearl: "Moonlight gathers on the wings on Clefairy’s\nback, allowing Clefairy to fly. This Pokémon is\ndifficult to find."
        fr:
          brilliant_diamond: "Ses adorables mimiques l’ont rendu très\npopulaire. On pense qu’il vit en groupe\ndans le calme des montagnes."
          shining_pearl: "Les ailes sur son dos absorbent la lumière\nde la lune, ce qui lui permet de flotter dans\nles airs. C’est un Pokémon difficile à trouver."
        it:
          brilliant_diamond: "È molto amato per le sue graziose movenze.\nSi pensa che viva in gruppo nella quiete\ndelle montagne."
          shining_pearl: "Fluttua a mezz’aria accumulando la luce lunare\nnelle ali che ha sul dorso. È piuttosto raro."
        de:
          brilliant_diamond: "Dank seiner verspielten Art erfreut es sich großer\nBeliebtheit. Man nimmt an, dass es mit seinen\nArtgenossen in der Stille der Berge lebe."
          shining_pearl: "Dieses nur schwer auffindbare Pokémon kann\nfliegen, indem es mit den Flügeln auf seinem\nRücken Mondlicht absorbiert."
        es:
          brilliant_diamond: "El preferido de mucha gente por su naturaleza\nafable. Se cree que vive en grupo en montañas\ntranquilas."
          shining_pearl: "Acumula luz lunar en las alas del dorso, lo que le\npermite levitar. Se trata de un Pokémon difícil de\nencontrar."
        ko:
          brilliant_diamond: "귀여운 표정과 동작으로 인기가 많다.\n조용한 산속에서 동료들과\n사는 것으로 여겨지고 있다."
          shining_pearl: "달빛을 등의 날개에 모아서\n공중에 뜬다.\n발견하기 어려운 포켓몬이다."
        zh_simp:
          brilliant_diamond: "因可爱的举止而深受欢迎。\n被认为和伙伴们一起生活在\n安静的深山里。"
          shining_pearl: "将月光聚集在背后的\n翅膀上后能够浮在空中。\n是种很难找到的宝可梦。"
        zh_trad:
          brilliant_diamond: "因可愛的舉止而廣受歡迎。\n人們認為牠和夥伴們一起\n生活在安靜的深山裡。"
          shining_pearl: "能夠將月光聚集在背後的\n翅膀上，讓自己浮在空中。\n是種很難找到的寶可夢。"
