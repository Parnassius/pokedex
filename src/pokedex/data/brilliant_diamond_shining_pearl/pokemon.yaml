          shining_pearl: "てっきゅうの　ような　かせきから\nふっかつした　こだいの　ポケモン。\nずつきで　えものを　しとめた。"
        jp_kanji:
          brilliant_diamond: "およそ　１億年前に\n古代の　密林で　暮らしていた。\n鉄のように　硬い　頭蓋骨。"
          shining_pearl: "鉄球の　ような　化石から\n復活した　古代の　ポケモン。\n頭突きで　獲物を　しとめた。"
        en:
          brilliant_diamond: "It lived in jungles around 100 million years ago.\nIts skull is as hard as iron."
          shining_pearl: "It was resurrected from an iron-ball-like fossil.\nIt downs prey with its headbutts."
        fr:
          brilliant_diamond: "Il vivait dans la jungle il y a environ\n100 millions d’années. Son crâne\nest dur comme du fer."
          shining_pearl: "On l’a ressuscité à partir d’un fossile\nqui ressemblait à une balle en fer.\nIl met ses proies K.O. à coups de tête."
        it:
          brilliant_diamond: "Viveva nella giungla circa 100 milioni di anni fa.\nIl suo cranio è duro come il ferro."
          shining_pearl: "Pokémon dell’antichità, rigenerato a partire\nda un fossile simile a una palla di ferro.\nAbbatteva le prede prendendole a testate."
        de:
          brilliant_diamond: "Vor ungefähr 100 Millionen Jahren lebte es im\nurzeitlichen Dschungel. Sein Schädel ist hart wie\nEisen."
          shining_pearl: "Dieses antike Pokémon wurde aus einem\nballförmigen, eisernen Fossil wiederbelebt.\nBeute streckte es einst mit Kopfnüssen nieder."
        es:
          brilliant_diamond: "Vivía en la jungla hace unos cien millones de\naños. Su cráneo es tan duro como el hierro."
          shining_pearl: "Este Pokémon prehistórico fue regenerado a\npartir de un fósil con forma esférica. Derriba las\npresas a cabezazos."
        ko:
          brilliant_diamond: "약 1억 년 전에\n고대의 밀림에서 살고 있었다.\n두개골이 철처럼 단단하다."
          shining_pearl: "쇠공처럼 보이는 화석에서\n부활한 고대 포켓몬이다.\n박치기로 먹이를 꼼짝 못 하게 한다."
        zh_simp:
          brilliant_diamond: "栖息在大约１亿年前的\n古代密林中。\n头盖骨像铁一样坚硬。"
          shining_pearl: "从铁球一样的化石中\n复活出来的古代的宝可梦。\n用头锤来了结猎物。"
        zh_trad:
          brilliant_diamond: "曾經棲息在大約\n１億年前的古代密林中。\n頭蓋骨像鐵一般堅硬。"
          shining_pearl: "從鐵球般的化石中\n復活的古代寶可夢。\n會用頭錘來解決獵物。"
