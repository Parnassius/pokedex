          shining_pearl: "タマゴに　にた　まんまるい　いしを\nおなかの　ふくろに　いれている。\nすきな　あいてに　いしを　わたす。"
        jp_kanji:
          brilliant_diamond: "白くて　丸いものが　大好き。\nラッキーの　真似をして　タマゴに\nそっくりな　石を　抱えている。"
          shining_pearl: "タマゴに　似た　真んまるい　石を\nお腹の　袋に　入れている。\n好きな　相手に　石を　渡す。"
        en:
          brilliant_diamond: "It loves round, white things. It carries an\negg-shaped rock in imitation of Chansey."
          shining_pearl: "It carries a round, egg-shaped rock in its belly\npouch and gives the rock to its friends."
        fr:
          brilliant_diamond: "Ce Pokémon aime ce qui est rond et blanc\net transporte un caillou en forme d’œuf\npour imiter Leveinard."
          shining_pearl: "Ptiravi transporte un caillou en forme d’œuf\ndans sa poche ventrale pour l’offrir à ceux\nqu’il apprécie."
        it:
          brilliant_diamond: "Ama gli oggetti bianchi e tondi. Imita Chansey\ntrasportando un sasso a forma di uovo."
          shining_pearl: "Trasporta nella sua tasca ventrale un sasso\nrotondo simile a un uovo, che poi offre a chi\ngli sta simpatico."
        de:
          brilliant_diamond: "Es liebt runde, weiße Dinge. Um Chaneira\nnachzuahmen, trägt es stets einen eiförmigen\nStein mit sich."
          shining_pearl: "In seinem Beutel trägt es einen kugelrunden\nStein, der einem Ei ähnelt. Diesen übergibt es\nseinen Freunden."
        es:
          brilliant_diamond: "Le encantan las cosas blancas y redondas.\nLleva una roca con forma de huevo para imitar\na Chansey."
          shining_pearl: "Les da a sus amigos una roca con forma de huevo\nque transporta en la bolsa de su panza."
        ko:
          brilliant_diamond: "하얗고 둥근 물건을 매우 좋아한다.\n럭키를 흉내 내어 알과\n똑 닮은 돌을 껴안고 있다."
          shining_pearl: "알을 닮은 둥근 돌을\n배의 주머니에 넣고 있다.\n좋아하는 상대에게 돌을 준다."
        zh_simp:
          brilliant_diamond: "非常喜欢又白又圆的东西。\n它学吉利蛋的样子，\n抱着一块很像蛋的石头。"
          shining_pearl: "把很像蛋的浑圆石头\n放入腹部的袋子中。\n会把石头交给喜爱的那位。"
        zh_trad:
          brilliant_diamond: "非常喜歡白白圓圓的東西。\n會模仿吉利蛋，抱著和蛋\n長得一模一樣的石頭。"
          shining_pearl: "腹部的袋子裡放著\n很像蛋的渾圓石頭。\n會把石頭交給喜歡的對象。"
