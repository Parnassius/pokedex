        it:
          brilliant_diamond: "Ha l’abilità di distorcere lo spazio.\nNella mitologia della regione di Sinnoh viene\nrappresentato come una divinità."
          shining_pearl: "Di lui si narra nella mitologia. Si dice che viva\nin uno squarcio fra dimensioni parallele."
        de:
