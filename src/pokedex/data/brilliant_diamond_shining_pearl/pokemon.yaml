      descriptions:
        jp_kana:
          brilliant_diamond: "あらゆるものを　とうししてしまう\nめを　もつ。ものかげに　かくれた\nえものを　みつけて　とらえる。"
          shining_pearl: "ひとみが　きんいろに　ひかるとき\nカベの　むこうに　かくれている\nえものを　みつけることが　できる。"
        jp_kanji:
          brilliant_diamond: "あらゆるものを　透視してしまう\n目を　持つ。物陰に　隠れた\n獲物を　見つけて　捕らえる。"
          shining_pearl: "瞳が　金色に　光るとき\n壁の　向こうに　隠れている\n獲物を　見つけることが　できる。"
        en:
          brilliant_diamond: "It has eyes that can see through anything.\nIt spots and captures prey hiding behind objects."
          shining_pearl: "When its eyes gleam gold, it can spot hiding\nprey—even those taking shelter behind a wall."
        fr:
          brilliant_diamond: "Ses yeux qui voient à travers tout\nlui permettent de repérer ses proies\ncachées avant de les capturer."
          shining_pearl: "Quand ses yeux brillent d’un éclat doré,\nil peut repérer une proie cachée derrière\nun mur."
        it:
          brilliant_diamond: "I suoi occhi gli permettono di vedere attraverso\nqualsiasi cosa. Individua e cattura le prede anche\nse sono nascoste."
          shining_pearl: "Quando i suoi occhi brillano di una luce dorata,\nè in grado di individuare anche le prede che\nsi nascondono dietro le pareti."
        de:
          brilliant_diamond: "Dank seiner Augen, mit denen es durch alles\nhindurchsehen kann, findet es auch Beute,\ndie sich hinter etwas versteckt hat."
          shining_pearl: "Leuchten seine Augen golden auf, kann es selbst\nBeute ausmachen, die sich hinter dicken Wänden\nversteckt."
        es:
          brilliant_diamond: "Gracias a sus ojos, que le permiten ver a través\nde todo, localiza a las presas escondidas detrás\nde objetos y las captura."
          shining_pearl: "Cuando sus ojos brillan como el oro, puede ver\npresas escondidas, incluso detrás de un muro."
        ko:
          brilliant_diamond: "모든 것을 투시해 버리는 눈을\n가지고 있다. 보이지 않는 곳에\n숨은 먹이를 찾아서 잡는다."
          shining_pearl: "눈동자가 금색으로 빛날 때\n벽의 저편에 숨어 있는\n먹이를 찾아낼 수 있다."
        zh_simp:
          brilliant_diamond: "有着一双能够透视\n任何物体的眼睛。能够找出\n藏在暗处的猎物并将其捕获。"
          shining_pearl: "瞳孔闪着金色时，\n能发现躲藏在\n墙壁另一侧的猎物。"
        zh_trad:
          brilliant_diamond: "擁有能夠透視任何物體的眼睛。\n能夠找出躲在暗處的獵物，\n並將其捕獲。"
          shining_pearl: "瞳孔閃現金色光芒時，\n能發現躲藏在牆壁\n另一側的獵物。"
