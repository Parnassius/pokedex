        jp_kana:
          brilliant_diamond: "なにごとにも　どうじない　ずぶとい\nしんけいの　もちぬし。みかけの\nわりには　きびんに　かつどうする。"
          shining_pearl: "いつも　たいぼくや　いしを　かじって\nじょうぶな　まえばを　けずっている。\nみずべに　すを　つくり　くらす。"
        jp_kanji:
          brilliant_diamond: "なにごとにも　動じない\n図太い　神経の　持ち主。\n見かけの　割には　機敏に　活動する。"
          shining_pearl: "いつも　大木や　石を　かじって\n丈夫な　前歯を　削っている。\n水辺に　巣を　作り　暮らす。"
        en:
          brilliant_diamond: "With nerves of steel, nothing can perturb it. It is\nmore agile and active than it appears."
          shining_pearl: "It constantly gnaws on logs and rocks to whittle\ndown its front teeth. It nests alongside water."
        fr:
          brilliant_diamond: "Ce Pokémon imperturbable possède des nerfs\nd’acier. Il est plus agile qu’il n’y paraît."
          shining_pearl: "Ce Pokémon se taille de solides incisives\nen rongeant constamment de grands arbres\net des pierres. Il niche au bord de l’eau."
        it:
          brilliant_diamond: "Ha i nervi d’acciaio e niente può turbarlo.\nÈ più agile e attivo di quanto sembri."
          shining_pearl: "Rosicchia continuamente legno e rocce\nper affilare i robusti denti anteriori.\nNidifica vicino all’acqua."
        de:
          brilliant_diamond: "Bidiza hat Nerven wie Drahtseile und lässt sich\ndurch nichts erschüttern. Es ist agiler, als es\nscheint."
          shining_pearl: "Es knabbert ständig an Holz und Steinen, um die\nkräftigen Vorderzähne abzuschleifen. Sein Nest\nbaut es in Wassernähe."
        es:
          brilliant_diamond: "Tiene nervios de acero y nada puede\nperturbarlo. Es más ágil y activo de lo\nque aparenta."
          shining_pearl: "Roe constantemente los troncos y las rocas para\nlimarse los incisivos. Construye su madriguera\ncerca del agua."
        ko:
          brilliant_diamond: "어떤 것에도 동요하지 않는\n대담한 신경의 소유자다.\n보기보다는 기민하게 활동한다."
          shining_pearl: "항상 큰 나무나 돌을 갉아서\n튼튼한 앞니를 갈아 내고 있다.\n물가에 둥지를 만들어 산다."
        zh_simp:
          brilliant_diamond: "遇到任何事都不慌不忙，\n神经很大条的家伙。\n能做出与外表不符的灵敏动作。"
          shining_pearl: "总是啃大树和石头\n来磨结实的门牙。\n在水边筑巢生活。"
        zh_trad:
          brilliant_diamond: "遇到任何事都不慌不忙，\n神經很大條的傢伙。\n能做出與外表不相稱的靈敏動作。"
          shining_pearl: "總是啃大樹和石頭\n來打磨堅硬的門牙。\n在水邊築巢生活。"
