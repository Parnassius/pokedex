          shining_pearl: "マンタインの　からだに　くっついて\nたべのこしを　わけてもらっている。\nてきに　おそわれない　ちえ。"
        jp_kanji:
          brilliant_diamond: "口から　水を　発射して\n空を　飛ぶ　獲物を　撃ち落とす\nことから　この　名前が　ついた。"
          shining_pearl: "マンタインの　体に　くっついて\n食べ残しを　分けてもらっている。\n敵に　襲われない　知恵。"
        en:
