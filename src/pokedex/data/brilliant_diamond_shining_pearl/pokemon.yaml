      descriptions:
        jp_kana:
          brilliant_diamond: "つめたい　こがらしを　ふせぐため\nこえだや　おちばを　ざいりょうに\nミノを　つくり　からだを　おおう。"
          shining_pearl: "たたかいで　ミノが　こわれてしまうと\nちかくにある　ざいりょうで\nミノを　すぐに　つくりなおす。"
        jp_kanji:
          brilliant_diamond: "冷たい　木枯らしを　防ぐため\n小枝や　落ち葉を　材料に\nミノを　作り　体を　覆う。"
          shining_pearl: "戦いで　ミノが　壊れてしまうと\n近くにある　材料で\nミノを　すぐに　作り直す。"
        en:
          brilliant_diamond: "To shelter itself from cold, wintry winds, it covers\nitself with a cloak made of twigs and leaves."
          shining_pearl: "If its cloak is broken in battle, it quickly remakes\nthe cloak with materials nearby."
        fr:
          brilliant_diamond: "Pour se protéger des vents glacés hivernaux,\nil se couvre d’une cape fabriquée à partir\nde feuilles mortes et de brindilles."
          shining_pearl: "Si sa cape se déchire en combat, il en\nfabrique immédiatement une nouvelle\navec ce qui lui tombe sous la main."
        it:
          brilliant_diamond: "Per ripararsi dal freddo e dai venti invernali\nsi copre con un manto fatto di rami e foglie."
          shining_pearl: "Se il suo manto si rompe mentre lotta, lo rifà\nvelocemente con ciò che trova attorno a sé."
        de:
          brilliant_diamond: "Um sich vor eisigen Windstößen zu schützen,\nhüllt es sich in einen Umhang aus Laub und\nZweigen."
          shining_pearl: "Wird sein Umhang im Kampf zerstört, fertigt es\nsich aus dem Material, das es in der Nähe findet,\numgehend einen neuen an."
        es:
          brilliant_diamond: "Para protegerse de los vientos fríos invernales,\nse cubre con un saco de ramitas y hojas."
          shining_pearl: "Si se le rompe el saco en combate, lo rehace\nrápidamente con lo que tenga a mano."
        ko:
          brilliant_diamond: "차가운 초겨울 바람을 막으려고\n작은 가지나 낙엽을 재료로\n도롱이를 만들어 몸을 감싼다."
          shining_pearl: "싸움으로 도롱이가 부서져 버리면\n가까이 있는 재료로\n도롱이를 바로 만들어 고친다."
        zh_simp:
          brilliant_diamond: "为了抵御寒冷的秋风，\n会用小树枝和落叶当材料，\n做成蓑衣裹在身上。"
          shining_pearl: "如果蓑衣在战斗中坏掉了，\n就会用附近的材料\n立刻重新做一件蓑衣。"
        zh_trad:
          brilliant_diamond: "為了抵禦秋冬時節的寒風，\n會用小樹枝和落葉當材料，\n做成蓑衣裹在身上。"
          shining_pearl: "如果蓑衣在戰鬥中壞掉了，\n就會用附近的材料\n立刻重新做一件蓑衣。"
