        jp_kana:
          brilliant_diamond: "ほかの　ポケモンの　すみかにも\nかまわず　はいりこんで　じぶんの\nねばしょにしてしまう　ずうずうしさ。"
          shining_pearl: "からだを　おおきく　みせて　あいてを\nいあつするため　ふたまたの　しっぽで\nウエストを　ぎゅっと　しぼっている。"
        jp_kanji:
          brilliant_diamond: "他の　ポケモンの　住処にも\nかまわず　入りこんで　自分の\n寝場所にしてしまう　図々しさ。"
          shining_pearl: "体を　大きく　見せて　相手を\n威圧するため　ふたまたの　尻尾で\nウエストを　ぎゅっと　絞っている。"
        en:
          brilliant_diamond: "It is a brazen brute that barges its way into\nanother Pokémon’s nest and claims it as its own."
          shining_pearl: "To make itself appear intimidatingly beefy,\nit tightly cinches its waist with its split tail."
        fr:
          brilliant_diamond: "Ce Pokémon insolent n’hésite pas à s’inviter\ndans le refuge d’autres Pokémon pour s’y\ninstaller."
          shining_pearl: "Il ceinture fermement sa taille à l’aide\nde sa queue bifide pour paraître plus\ngrand et intimider son adversaire."
        it:
          brilliant_diamond: "Si introduce sfacciatamente nelle tane degli altri\nPokémon rivendicandole poi come proprie."
          shining_pearl: "Si stringe la vita con la coda biforcuta per\napparire più imponente e minaccioso."
        de:
          brilliant_diamond: "Dieses unverschämte Pokémon dringt einfach\nin die Behausung anderer Pokémon ein, um sich\ndort einzunisten."
          shining_pearl: "Damit es bedrohlicher und größer aussieht,\numschlingt es seine Taille fest mit seinem\ngespaltenen Schweif."
        es:
          brilliant_diamond: "Insolente y descarado, establece su morada allí\ndonde le place, sin importarle en absoluto que\npueda ser de otro Pokémon."
          shining_pearl: "Para intimidar y parecer más corpulento, se\naprieta la cintura con su cola bífida."
        ko:
          brilliant_diamond: "다른 포켓몬의 거처라 할지라도\n아무렇지 않게 들어가서\n쿨쿨 잘 정도로 뻔뻔하다."
          shining_pearl: "몸을 크게 보여서 상대를\n위압하기 위해 두 갈래의 꼬리로\n허리를 꼭 조이고 있다."
        zh_simp:
          brilliant_diamond: "脸皮极厚，即使是\n其他宝可梦的住处，\n也会大摇大摆地进去睡起觉来。"
          shining_pearl: "为了让自己的身体看起来大些，\n以此威吓对手，\n会把分叉的尾巴紧紧缠在腰上。"
        zh_trad:
          brilliant_diamond: "即使是其他寶可夢的巢穴，\n牠也會毫不在意地進去把那裡\n當成自己睡覺的地方，非常厚臉皮。"
          shining_pearl: "為了讓自己的身體看起來\n大一點來威嚇對手，\n會把分叉的尾巴緊緊纏在腰上。"
