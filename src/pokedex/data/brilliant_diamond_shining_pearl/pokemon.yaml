      descriptions:
        jp_kana:
          brilliant_diamond: "あまい　においの　だえきで　えものを\nおびきよせ　おおあごで　がぶり。\n１にち　かけて　えものを　たべる。"
          shining_pearl: "しょくしゅを　きのえだに　まきつけて\nうごかなければ　まるで　しょくぶつ。\nおおぐちを　あけて　えものを　まつ。"
        jp_kanji:
          brilliant_diamond: "甘い　においの　だえきで　獲物を\nおびき寄せ　おおあごで　がぶり。\n１日　かけて　獲物を　食べる。"
          shining_pearl: "触手を　木の枝に　巻きつけて\n動かなければ　まるで　植物。\n大口を　開けて　獲物を　待つ。"
        en:
          brilliant_diamond: "It attracts prey with its sweet-smelling saliva, then\nchomps down. It takes a whole day to eat\nits prey."
          shining_pearl: "Using its tentacles to hang from branches,\nit looks like a plant when it is not moving.\nIt awaits prey with its mouth wide open."
        fr:
          brilliant_diamond: "Il attire sa proie avec sa salive au doux parfum,\navant de refermer ses grandes mâchoires sur elle.\nIl lui faut toute une journée pour l’avaler."
          shining_pearl: "Lorsqu’il se suspend aux branches à l’aide de ses\ntentacules, immobile, il ressemble à une plante.\nIl attend sa proie la bouche grande ouverte."
        it:
          brilliant_diamond: "Attira le prede con il dolce aroma emanato\ndalla saliva e poi le ingoia. Impiega un giorno\nper mangiare una preda."
          shining_pearl: "Se si appende ai rami con i suoi tentacoli e resta\nimmobile, può sembrare una pianta. Aspetta\nla preda con la bocca aperta."
        de:
          brilliant_diamond: "Mit süßlich riechendem Speichel lockt es Beute\nan und schnappt dann mit seinen gewaltigen\nKiefern zu. Es braucht einen Tag, um sie zu essen."
          shining_pearl: "Hängt es sich mit seinen Tentakeln an Äste und\nverharrt regungslos, wirkt es wie eine Pflanze.\nMit aufgesperrtem Maul wartet es so auf Beute."
        es:
          brilliant_diamond: "Atrae a sus presas con saliva de olor dulce y las\nmastica con su enorme mandíbula. Tarda todo un\ndía en comérselas."
          shining_pearl: "Se cuelga de las ramas con los tentáculos y\nespera a sus presas con la boca abierta, inmóvil\ny camuflado como una planta."
        ko:
          brilliant_diamond: "달콤한 냄새의 타액으로 먹이를\n유인하여 큰 턱으로 꿀꺽한다.\n하루에 걸쳐 먹이를 먹는다."
          shining_pearl: "촉수를 나뭇가지에 휘감은 채\n움직이지 않으면 마치 식물 같다.\n큰 입을 열어 먹이를 기다린다."
        zh_simp:
          brilliant_diamond: "先用甜香的唾液引诱猎物，\n然后用大颚大口地嚼。\n要花１整天吃掉猎物。"
          shining_pearl: "将触手缠绕上树枝后\n一动不动的样子像极了植物。\n会张开大嘴等待猎物上钩。"
        zh_trad:
          brilliant_diamond: "以散發甜甜香氣的唾液吸引獵物，\n再用大顎一口咬住。\n會花上一整天吃掉獵物。"
          shining_pearl: "當牠用觸手纏繞在樹枝上\n不動聲響時，看起來就像一棵植物。\n會張著大嘴巴等待獵物上門。"
