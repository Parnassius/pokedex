          shining_pearl: "큰 나무 위에서 산다.\n자고 있는 동안 떨어지지 않도록\n꼬리를 줄기에 휘감아 둔다."
        zh_simp:
          brilliant_diamond: "会用尾巴摘取伸长了手\n也够不着的树枝上的水果。\n它的尾巴比手还要灵活。"
          shining_pearl: "栖息在大树上。\n在睡觉时为了不从树上\n掉下来，会用尾巴卷住树干。"
        zh_trad:
