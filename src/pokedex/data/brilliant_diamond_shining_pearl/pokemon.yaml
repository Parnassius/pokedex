      descriptions:
        jp_kana:
          brilliant_diamond: "けいかいしんの　つよい　ポケモン。\nきけんを　かんじると　ふわふわした\nみみさきの　けで　からだを　つつむ。"
          shining_pearl: "いつも　みみさきを　けづくろいして\nていれを　おこたらない　きれいずき。\nかろやかに　とびはねて　はしる。"
        jp_kanji:
          brilliant_diamond: "警戒心の　強い　ポケモン。\n危険を　感じると　ふわふわした\n耳先の　毛で　体を　包む。"
          shining_pearl: "いつも　耳先を　毛づくろいして\n手入れを　怠らない　きれい好き。\n軽やかに　飛び跳ねて　走る。"
        en:
          brilliant_diamond: "An extremely cautious Pokémon that cloaks its\nbody with its fluffy ear fur when it senses danger."
          shining_pearl: "It likes to keep itself clean and never fails to\ngroom its ears. It runs with sprightly jumps."
        fr:
          brilliant_diamond: "Lorsqu’il sent un danger, ce Pokémon\nextrêmement prudent enveloppe son corps\ndans ses oreilles pelucheuses."
          shining_pearl: "Ce Pokémon soigné passe son temps à nettoyer\nle bout de ses oreilles et ne néglige jamais sa\ntoilette. Il avance en bondissant avec légèreté."
        it:
          brilliant_diamond: "Pokémon molto cauto. Se percepisce un pericolo,\nsi avvolge nelle sue orecchie morbide e pelose."
          shining_pearl: "È molto pulito e non dimentica mai di lisciarsi\nle orecchie. Corre saltando con destrezza."
        de:
          brilliant_diamond: "Wittert dieses äußerst vorsichtige Pokémon\nGefahr, umwickelt es seinen Körper zum Schutz\nmit der weichen Wolle an seinen Ohren."
          shining_pearl: "Es ist sehr auf sein Äußeres bedacht und vergisst\nnie, seine Ohrenspitzen zu pflegen. Es hüpft beim\nLaufen leicht."
        es:
          brilliant_diamond: "Es un Pokémon muy precavido. Si siente peligro,\nse envuelve con el suave pelaje de sus orejas."
          shining_pearl: "Se preocupa de su imagen y siempre se está\nacicalando las orejas. Corre con saltos enérgicos."
        ko:
          brilliant_diamond: "경계심이 강한 포켓몬이다.\n위험을 느끼면 푹신푹신한\n귀 끝의 털로 몸을 감싼다."
          shining_pearl: "항상 귀 끝의 털을 다듬고 손질을\n게을리하지 않는 깔끔쟁이다.\n가뿐하게 뛰어올라 달린다."
        zh_simp:
          brilliant_diamond: "警戒心很强的宝可梦。\n一旦感知到危险，就会用\n耳朵尖上蓬松柔软的毛包住身体。"
          shining_pearl: "很爱干净，常常会梳理\n耳朵尖的毛，从不疏于保养自己。\n会轻盈地蹦跳着奔跑。"
        zh_trad:
          brilliant_diamond: "警戒心很強的寶可夢。\n一旦感知到危險，就會用\n耳尖上毛茸茸的毛皮裹住身體。"
          shining_pearl: "愛乾淨，對保養自己從不懈怠，\n時不時都在梳理耳朵前端的毛。\n會輕盈地跳躍奔跑。"
