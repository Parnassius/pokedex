          shining_pearl: "からだの　こうぞうを　しらべようと\nレントゲンで　さつえいしたが\nけっきょく　なにも　うつらなかった。"
        jp_kanji:
          brilliant_diamond: "古い　お墓から　ドーミラーに\nそっくりな　道具が　掘り出されたが\n関係は　わかっていない。"
          shining_pearl: "体の　構造を　調べようと\nレントゲンで　撮影したが\n結局　何も　映らなかった。"
        en:
          brilliant_diamond: "Implements shaped like Bronzor were discovered\nin ancient tombs. It is unknown whether they\nare related."
          shining_pearl: "X-ray photos were taken to check its body\nstructure, but nothing was seen."
        fr:
          brilliant_diamond: "Des objets ressemblant en tout point à des\nArchéomire ont été exhumés de vieilles tombes,\nmais on ignore s’ils ont un lien avec ces Pokémon."
          shining_pearl: "On a voulu examiner sa structure aux rayons X,\nmais les radios ne montraient absolument rien."
        it:
          brilliant_diamond: "Il suo aspetto è identico a quello di alcuni\noggetti ritrovati in antiche tombe, ma non si sa\nancora se ci sia una correlazione."
          shining_pearl: "Gli esami ai raggi X, fatti per studiarne la\nmorfologia, non hanno dato alcun risultato."
        de:
          brilliant_diamond: "In alten Gräbern wurden Gegenstände gefunden,\ndie Bronzel zum Verwechseln ähnlich sehen, doch\nes ist unklar, ob ein Zusammenhang besteht."
          shining_pearl: "Zur Untersuchung der Körperstruktur dieses\nPokémon wurden Röntgenaufnahmen gemacht,\nauf denen jedoch nichts zu erkennen war."
        es:
          brilliant_diamond: "Se descubrieron herramientas con su forma en\ntumbas antiguas, pero se desconoce si tienen\nrelación."
          shining_pearl: "Se intentó examinar su estructura corporal\nmediante rayos X, pero no apareció nada."
        ko:
          brilliant_diamond: "고대 무덤에서 동미러와\n똑 닮은 도구가 발굴되었지만\n관계는 알 수 없다."
          shining_pearl: "몸의 구조를 조사하려고\nX선으로 촬영했지만\n결국 아무것도 찍히지 않았다."
        zh_simp:
          brilliant_diamond: "从古墓里挖掘出了\n与铜镜怪一模一样的道具，\n但两者之间的关系还未知。"
          shining_pearl: "为了调查它的身体构造\n而用Ｘ光拍摄了照片，\n但照片上却空无一物。"
        zh_trad:
          brilliant_diamond: "從古墓裡挖掘出了\n與銅鏡怪一模一樣的道具，\n但兩者之間的關係還未知。"
          shining_pearl: "為了調查牠的身體構造\n而用Ｘ光拍了照片，\n結果卻什麼都拍不出來。"
bronzong:
