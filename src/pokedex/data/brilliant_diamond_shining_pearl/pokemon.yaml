      descriptions:
        jp_kana:
          brilliant_diamond: "からだから　のびる　いとを　えだに\nまきつけて　おちないように　こてい。\nじっと　うごかずに　しんかを　まつ。"
          shining_pearl: "いとに　ついた　あさつゆを　のんで\nしんかの　ときを　まちつづける。\nかたい　マユが　こうげきを　ふせぐ。"
        jp_kanji:
          brilliant_diamond: "体から　伸びる　糸を　枝に\n巻きつけて　落ちないように　固定。\nじっと　動かずに　進化を　待つ。"
          shining_pearl: "糸に　ついた　朝露を　飲んで\n進化の　ときを　待ち続ける。\n硬い　繭が　攻撃を　防ぐ。"
        en:
          brilliant_diamond: "It anchors itself by wrapping twigs with the silk\nfrom its body. It motionlessly awaits evolution."
          shining_pearl: "It drinks dew that collects on its silk while it waits\nfor evolution. Its hard cocoon repels attacks."
        fr:
          brilliant_diamond: "Il s’accroche à une branche à l’aide\ndes fils qui poussent sur son corps,\npuis il attend d’évoluer, immobile."
          shining_pearl: "À l’abri dans son robuste cocon, il boit\nla rosée qui se dépose sur ses fils de soie\nen attendant d’évoluer."
        it:
          brilliant_diamond: "Si ancora ai rami con fili di seta che secerne\ndal corpo. In questa posizione aspetta\nimmobile l’evoluzione."
          shining_pearl: "Beve la rugiada che si posa sui suoi fili di seta\ne aspetta l’evoluzione. Il suo bozzolo duro\nrespinge gli attacchi."
        de:
          brilliant_diamond: "Es bindet sich mit körpereigenen Seidenfäden an\nÄsten fest, um nicht hinunterzufallen. So wartet\nes dann regungslos auf seine Entwicklung."
          shining_pearl: "Es trinkt Tau, der sich in seinen Fäden verfängt,\nund wartet auf seine Entwicklung. Der harte\nKokon schützt es vor Angriffen."
        es:
          brilliant_diamond: "La seda que segrega su cuerpo le permite\naferrarse a las ramas de los árboles, donde\naguarda pacientemente su evolución."
          shining_pearl: "Bebe el rocío que recoge con la seda mientras\nespera su evolución. Su duro capullo lo protege\nde posibles ataques."
        ko:
          brilliant_diamond: "몸에서 나오는 실을 가지에\n휘감아서 떨어지지 않게 고정한다.\n가만히 꼼짝 않고 진화를 기다린다."
          shining_pearl: "실에 맺힌 아침 이슬을 마시며\n진화할 때를 기다린다.\n단단한 고치가 공격을 막는다."
        zh_simp:
          brilliant_diamond: "为了不掉下来，它将身上伸出的\n丝线缠在树枝上以固定自身。\n然后一动不动地等待进化。"
          shining_pearl: "会喝丝线上挂着的朝露，\n持续等待进化的那一刻。\n坚硬的茧能够防御攻击。"
        zh_trad:
          brilliant_diamond: "將身上延伸出的絲線纏繞\n在樹枝上固定自己，防止掉落。\n會一動也不動地等待進化。"
          shining_pearl: "會喝絲線上掛著的朝露，\n持續等待進化的時刻來臨。\n堅硬的繭能夠防禦攻擊。"
