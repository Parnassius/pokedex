        zh_simp:
          brilliant_diamond: "栖息在湖里的宝可梦。\n游泳速度快过世界级的\n游泳运动员。"
          shining_pearl: "手脚上发达的蹼\n赐予了它惊人的速度。\n是最擅长游泳的宝可梦。"
