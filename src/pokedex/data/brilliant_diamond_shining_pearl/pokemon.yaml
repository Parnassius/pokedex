          brilliant_diamond: "かわを　きのみきや　どろの　ダムで\nせきとめて　すみかを　つくる。\nはたらきものとして　しられている。"
          shining_pearl: "ちじょうでの　どうさは　のんびり\nしているが　およぐ　スピードは\nヒンバスと　ごかくの　すばやさだ。"
        jp_kanji:
          brilliant_diamond: "川を　木の幹や　泥の　ダムで\nせき止めて　住処を　作る。\n働き者として　知られている。"
          shining_pearl: "地上での　動作は　のんびり\nしているが　泳ぐ　スピードは\nヒンバスと　互角の　素早さだ。"
        en:
          brilliant_diamond: "It makes its nest by damming streams with bark\nand mud. It is known as an industrious worker."
          shining_pearl: "While its movements out of water are sluggish,\nit can swim as fast as any Feebas."
        fr:
          brilliant_diamond: "Ce Pokémon construit un barrage de boue et\nde troncs d’arbres sur une rivière, et s’y installe.\nIl a la réputation d’être très travailleur."
          shining_pearl: "Il a beau être plutôt lent sur la terre ferme,\nce Pokémon nage aussi vite que Barpau."
        it:
          brilliant_diamond: "Sbarra il corso dei fiumi con dighe fatte\ndi corteccia e fango per farsi la tana.\nÈ noto per essere un lavoratore instancabile."
          shining_pearl: "Fuori dall’acqua si muove molto lentamente,\nma quando nuota è veloce quanto un Feebas."
        de:
          brilliant_diamond: "Dieser fleißige Arbeiter staut Flüsse mithilfe von\nDämmen aus Baumstämmen und Schlamm,\num sich ein Nest zu bauen."
          shining_pearl: "Seine Bewegungen an Land mögen unbeholfen\nsein, doch im Wasser schwimmt es genauso\nschnell wie ein Barschwa."
        es:
          brilliant_diamond: "Para construir su madriguera, crea presas en\nlos ríos con troncos y barro. Tiene fama de\ntrabajador."
          shining_pearl: "Fuera del agua es muy lento, pero puede nadar\ntan rápido como un Feebas."
        ko:
          brilliant_diamond: "강을 나무줄기나 진흙의 댐으로\n막아서 거처를 만든다.\n부지런한 일꾼으로 알려져 있다."
          shining_pearl: "지상에서의 동작은 느리지만\n헤엄치는 스피드는\n빈티나와 호각을 이룬다."
        zh_simp:
          brilliant_diamond: "用树干和泥巴筑坝堵住河流，\n建造住所。\n以勤劳而闻名。"
          shining_pearl: "虽然在陆地上行动迟缓，\n但游起泳来却快得\n和丑丑鱼不相上下。"
        zh_trad:
          brilliant_diamond: "用樹幹和泥巴築起水壩，\n堵住河流建造住所。\n以勤勞而聞名。"
          shining_pearl: "雖然在陸地上步調悠閒，\n但游泳的速度卻足以\n和醜醜魚匹敵。"
kricketot:
