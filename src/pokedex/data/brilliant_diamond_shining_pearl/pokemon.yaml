        it:
          brilliant_diamond: "Si dice che sorga dai fondali dei laghi\nper placare gli animi furiosi delle persone\nche litigano."
          shining_pearl: "È il Pokémon più bello del mondo. Ci sono\nparecchie opere d’arte ispirate a Milotic."
        de:
          brilliant_diamond: "Wenn Zwietracht zwischen Menschen herrscht,\nsoll es aus den Tiefen von Seen emporsteigen,\num die Herzen der Streitenden zu besänftigen."
