        fr:
          brilliant_diamond: "Il arpente les forêts en quête de sève, son mets\nfavori. Il possède assez de force pour projeter\nses ennemis dans les airs à l’aide de sa corne."
          shining_pearl: "Ses pattes robustes et ses griffes acérées\nlui donnent la force nécessaire pour projeter\nses ennemis au loin."
        it:
          brilliant_diamond: "Si aggira nelle foreste in cerca di linfa, di cui è\nghiotto. È molto forte e con il suo corno robusto\npuò scagliare lontano i nemici."
          shining_pearl: "Grazie alle zampe poderose e agli artigli affilati,\npuò scaraventare lontanissimo qualsiasi nemico."
        de:
