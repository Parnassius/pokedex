        jp_kanji: ネガフォルム
        en: Overcast Form
        fr: Temps Couvert
        it: Forma Nuvola
        de: Wolkenform
        es: Forma Encapotado
        ko: 네거폼
        zh_simp: 阴天形态
        zh_trad: 陰天形態
      base_stats:
        hp: 70
        attack: 60
        defense: 70
        special_attack: 87
        special_defense: 78
        speed: 85
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 2
        special_defense: 0
        speed: 0
      types:
        - grass
      egg_groups:
        - fairy
        - grass
      abilities:
        - flower_gift
      held_items:
        rare: miracle_seed
      descriptions:
        jp_kana:
          brilliant_diamond: "ひざしが　つよくなると　はなひらく。\nつぼみの　ときに　たえしのんだ\nうっぷんを　いっきに　はらすのだ。"
          shining_pearl: "つぼみの　ときは　おとなしいが\nはなが　ひらくと　いつも　ニコニコ。\nひが　かげると　つぼみに　もどる。"
        jp_kanji:
          brilliant_diamond: "日差しが　強くなると　花開く。\nつぼみの　ときに　耐え忍んだ\nうっぷんを　一気に　晴らすのだ。"
          shining_pearl: "つぼみの　ときは　大人しいが\n花が　開くと　いつも　ニコニコ。\n日が　陰ると　つぼみに　戻る。"
        en:
          brilliant_diamond: "It blooms during times of strong sunlight.\nThe Pokémon tries to make up for everything\nit endured as a bud."
          shining_pearl: "It is docile as a bud and turns cheerful when it\nblooms. It folds back into a bud if sunlight wanes."
        fr:
          brilliant_diamond: "Il fleurit quand il fait grand soleil et en profite\npour laisser derrière lui toutes les frustrations\nqu’il a ressenties à l’état de bourgeon."
          shining_pearl: "Sous sa forme de bourgeon, il est réservé, mais\nlorsque sa fleur éclot, il sourit en permanence.\nIl redevient bourgeon quand le soleil se cache."
        it:
          brilliant_diamond: "Sboccia quando la luce del sole si fa intensa,\nliberandosi all’istante di tutta la frustrazione e\nla rabbia accumulate quando era un bocciolo."
          shining_pearl: "Da bocciolo è tutto serio, ma quando sboccia\nè sempre sorridente. Al calar del sole, torna\na essere un bocciolo."
        de:
          brilliant_diamond: "Bei starkem Sonnenlicht blüht es auf und holt in\nWindeseile alles nach, was ihm als Knospe\nverwehrt blieb."
          shining_pearl: "Als Knospe ist es zurückhaltend, aber dafür umso\nlebhafter, wenn es die Blütenblätter öffnet. Lässt\ndas Sonnenlicht nach, wird es wieder zur Knospe."
        es:
          brilliant_diamond: "Florece cuando el sol pega con fuerza y trata de\naprovechar al máximo la energía de la que no ha\npodido disfrutar en su estadio como capullo."
          shining_pearl: "Es muy dócil como capullo y alegre cuando\nflorece. Si la luz solar mengua, vuelve a\nreplegarse en un capullo."
        ko:
          brilliant_diamond: "햇살이 강해지면 꽃이 핀다.\n봉오리일 때에 참고 견딘\n울분을 한번에 푸는 것이다."
          shining_pearl: "봉오리일 때는 얌전하지만\n꽃이 피면 항상 생글생글한다.\n해가 지면 봉오리로 되돌아간다."
        zh_simp:
          brilliant_diamond: "如果阳光变得强烈就会开花。\n花苞形态的时候忍受的积愤\n会一下子发泄出来。"
          shining_pearl: "花苞形态的时候性格稳重，\n开花后则一直笑容满面。\n天如果阴下来就会变回花苞。"
        zh_trad:
          brilliant_diamond: "只要日照變強就會開花。\n在花苞狀態下所忍下的憤恨，\n會一口氣發洩出來。"
          shining_pearl: "花苞狀態下的牠性情穩重，\n但只要一開花便總是笑容滿面。\n天色一暗就會變回花苞。"
    cherrim_sunshine_form:
