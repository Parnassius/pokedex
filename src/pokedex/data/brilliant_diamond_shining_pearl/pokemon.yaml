      types:
        - grass
        - poison
      egg_groups:
        - monster
        - grass
      abilities:
        - overgrow
      hidden_ability: chlorophyll
      descriptions:
        jp_kana:
          brilliant_diamond: "せなかの　つぼみが　ふくらみだすと\nあまい　においが　ただよいはじめる。\nたいりんの　はなが　さく　まえぶれ。"
          shining_pearl: "せなかの　つぼみが　ふくらみだすと\nあまい　においが　ただよいはじめる。\nたいりんの　はなが　さく　まえぶれ。"
        jp_kanji:
          brilliant_diamond: "背中の　つぼみが　ふくらみ出すと\n甘い　においが　漂いはじめる。\n大輪の　花が　咲く　前触れ。"
          shining_pearl: "背中の　つぼみが　ふくらみ出すと\n甘い　においが　漂いはじめる。\n大輪の　花が　咲く　前触れ。"
        en:
          brilliant_diamond: "When the bud on its back starts swelling,\na sweet aroma wafts to indicate the flower’s\ncoming bloom."
          shining_pearl: "When the bud on its back starts swelling,\na sweet aroma wafts to indicate the flower’s\ncoming bloom."
        fr:
          brilliant_diamond: "Lorsque le bourgeon sur son dos gonfle,\nil dégage un doux parfum : c’est le signe\nque sa grande fleur va bientôt éclore."
          shining_pearl: "Lorsque le bourgeon sur son dos gonfle,\nil dégage un doux parfum : c’est le signe\nque sa grande fleur va bientôt éclore."
        it:
          brilliant_diamond: "Quando il bocciolo che ha sul dorso si gonfia,\nemana un dolce profumo. È indice dell’imminente\nfioritura."
          shining_pearl: "Quando il bocciolo che ha sul dorso si gonfia,\nemana un dolce profumo. È indice dell’imminente\nfioritura."
        de:
          brilliant_diamond: "Schwillt die Knospe auf seinem Rücken an,\nbreitet sich ein süßer Duft aus, der ihr baldiges\nAufblühen ankündigt."
          shining_pearl: "Schwillt die Knospe auf seinem Rücken an,\nbreitet sich ein süßer Duft aus, der ihr baldiges\nAufblühen ankündigt."
        es:
          brilliant_diamond: "Cuando se le hincha el bulbo del lomo,\ndesprende un dulce aroma para indicar que su\ngran flor se va a abrir."
          shining_pearl: "Cuando se le hincha el bulbo del lomo,\ndesprende un dulce aroma para indicar que su\ngran flor se va a abrir."
        ko:
          brilliant_diamond: "등의 봉오리가 부풀어 오르면\n달콤한 냄새가 감돌기 시작한다.\n큰 꽃이 필 조짐이다."
          shining_pearl: "등의 봉오리가 부풀어 오르면\n달콤한 냄새가 감돌기 시작한다.\n큰 꽃이 필 조짐이다."
        zh_simp:
          brilliant_diamond: "当它背上的花苞开始鼓起时，\n就会飘出一股甜美的香气。\n这是大花即将盛开的前兆。"
          shining_pearl: "当它背上的花苞开始鼓起时，\n就会飘出一股甜美的香气。\n这是大花即将盛开的前兆。"
        zh_trad:
          brilliant_diamond: "當背上的花苞開始鼓起時，\n會散發出一股甜美的香氣。\n這是大朵的花即將盛開的前兆。"
          shining_pearl: "當背上的花苞開始鼓起時，\n會散發出一股甜美的香氣。\n這是大朵的花即將盛開的前兆。"
