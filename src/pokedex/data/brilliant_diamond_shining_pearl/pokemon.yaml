          shining_pearl: "大木の　幹に　こすりつけて\n硬い　顔を　磨く　習性。\n後ろからの　攻撃に　弱い。"
        en:
          brilliant_diamond: "A Pokémon that lived in jungles around\n100 million years ago. Its facial hide is\nextremely hard."
          shining_pearl: "It habitually polishes its face by rubbing it against\ntree trunks. It is weak to attacks from behind."
        fr:
          brilliant_diamond: "Ce Pokémon vivait dans la jungle\nil y a environ 100 millions d’années.\nLa peau de son visage est très dure."
          shining_pearl: "Ce Pokémon a pour habitude de polir son visage\nrigide en le frottant contre le tronc d’un grand\narbre. Il craint les attaques par-derrière."
        it:
          brilliant_diamond: "Viveva nella giungla circa 100 milioni di anni fa.\nLa pelle che ricopre la sua testa è\nestremamente dura."
          shining_pearl: "Si pulisce il muso strofinandolo contro i tronchi\ndegli alberi. Gli attacchi alle spalle sono\nil suo punto debole."
        de:
          brilliant_diamond: "Vor ungefähr 100 Millionen Jahren lebte es im\nDschungel. Seine Gesichtshaut ist äußerst hart."
          shining_pearl: "Dieses Pokémon reibt sein hartes Gesicht an\nBaumstämmen, um es zu polieren. Gegen\nAngriffe von hinten ist es wehrlos."
        es:
          brilliant_diamond: "Vivía en la jungla hace unos cien millones de\naños. Su protección facial es tremendamente\ndura."
          shining_pearl: "Se abrillanta la cara frotándola contra los troncos\nde los árboles. Es vulnerable a los ataques por la\nespalda."
        ko:
          brilliant_diamond: "약 1억 년 전에\n밀림에서 살고 있었던 포켓몬이다.\n얼굴의 피부가 매우 단단하다."
          shining_pearl: "큰 나무의 줄기에 비벼서\n단단한 얼굴을 닦는 습성이 있다.\n뒤쪽에서 받는 공격에 약하다."
        zh_simp:
          brilliant_diamond: "栖息在约１亿年前的\n密林里的宝可梦。\n脸上的皮肤异常坚硬。"
          shining_pearl: "有着摩擦大树的树干，\n打磨坚硬脸孔的习性。\n不擅长对付来自后方的攻击。"
        zh_trad:
          brilliant_diamond: "曾經棲息在大約１億年前\n的密林中的寶可夢。\n臉部的皮膚非常堅硬。"
          shining_pearl: "有著摩擦大樹的樹幹，\n藉此打磨堅硬臉孔的習性。\n不擅長應付來自後方的攻擊。"
