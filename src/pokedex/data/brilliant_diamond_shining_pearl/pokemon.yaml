        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - normal
      egg_groups:
        - undiscovered
      abilities:
        - multitype
      descriptions:
        jp_kana:
          brilliant_diamond: "１０００ぼんの　うでで\nうちゅうを　つくった　ポケモンとして\nしんわに　えがかれている。"
          shining_pearl: "うちゅうが　まだ　ない　ころに\nさいしょに　うまれた　ポケモンと\nしんわの　なかで　かたられている。"
        jp_kanji:
          brilliant_diamond: "１０００本の　腕で\n宇宙を　作った　ポケモンとして\n神話に　描かれている。"
          shining_pearl: "宇宙が　まだ　ない　ころに\n最初に　生まれた　ポケモンと\n神話の　中で　語られている。"
        en:
          brilliant_diamond: "It is described in mythology as the Pokémon that\nshaped the universe with its 1,000 arms."
          shining_pearl: "It is told in mythology that this Pokémon was\nthe first Pokémon born before the universe\neven existed."
        fr:
          brilliant_diamond: "La mythologie le décrit comme le Pokémon\nqui a façonné l’univers avec ses mille bras."
          shining_pearl: "D’après la mythologie, ce Pokémon existait déjà\navant la formation de l’univers."
        it:
          brilliant_diamond: "Nella mitologia è descritto come il Pokémon\nche ha dato forma all’universo con le sue\nmille braccia."
          shining_pearl: "Nei racconti mitologici si dice che questo\nPokémon fu il primo a venire alla luce, ancor\nprima che l’universo esistesse."
        de:
          brilliant_diamond: "Die Mythologie beschreibt es als das Pokémon,\nwelches unter Einsatz seiner tausend Arme das\nUniversum erschaffen habe."
          shining_pearl: "Mythen besagen, dass dieses Pokémon bereits\nvor der Existenz des Universums geboren wurde."
        es:
          brilliant_diamond: "La mitología lo describe como el Pokémon que\ndio forma al universo con sus mil brazos."
          shining_pearl: "La mitología cuenta que este Pokémon nació\nantes de que el universo existiera."
        ko:
          brilliant_diamond: "1000개의 팔로\n우주를 만든 포켓몬으로\n신화에 묘사된다."
          shining_pearl: "우주가 아직 생기지 않았을 무렵에\n처음으로 태어난 포켓몬이라고\n신화 속에서 묘사된다."
        zh_simp:
          brilliant_diamond: "神话里将它描述为\n用１０００只手创造了\n宇宙的宝可梦。"
          shining_pearl: "在神话里，\n它被描述为宇宙尚未存在时，\n就诞生的最早的宝可梦。"
        zh_trad:
          brilliant_diamond: "神話裡將牠描述為\n用１０００隻手臂\n創造了宇宙的寶可夢。"
          shining_pearl: "神話裡描述牠是\n在宇宙還不存在時\n就誕生的最早的寶可夢。"
