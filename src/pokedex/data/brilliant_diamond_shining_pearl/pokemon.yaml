        en:
          brilliant_diamond: "It is known as the Being of Willpower. It sleeps at\nthe bottom of a lake to keep the world\nin balance."
          shining_pearl: "It is thought that Uxie, Mesprit, and Azelf all\ncame from the same egg."
        fr:
          brilliant_diamond: "On l’appelle « l’être de la volonté ».\nIl dort au fond d’un lac et maintient\nl’équilibre du monde."
          shining_pearl: "On pense que Créhelf, Créfollet et Créfadet\nsont sortis du même Œuf."
        it:
          brilliant_diamond: "Noto come \"divinità della volontà\".\nDorme sul fondo di un lago per mantenere\nil mondo in equilibrio."
          shining_pearl: "Si pensa che Uxie, Mesprit e Azelf abbiano avuto\norigine dallo stesso Uovo."
        de:
          brilliant_diamond: "Es wird auch das „starke Wesen“ genannt.\nAuf dem Grund eines Sees schlafend hält es\ndie Welt im Gleichgewicht."
          shining_pearl: "Man vermutet, dass Selfe, Vesprit und Tobutz\nalle demselben Ei entsprungen seien."
        es:
          brilliant_diamond: "Se lo conoce como el Ser de la Voluntad.\nDuerme en el fondo de un lago para equilibrar\nel mundo."
          shining_pearl: "Se cree que Uxie, Mesprit y Azelf provienen del\nmismo huevo."
        ko:
          brilliant_diamond: "의지의 신이라 불리고 있다.\n호수의 밑바닥에서 계속 잠을 자며\n세계의 균형을 지키고 있다."
          shining_pearl: "유크시, 엠라이트, 아그놈은\n같은 알에서 태어난\n포켓몬이라 여겨지고 있다."
        zh_simp:
          brilliant_diamond: "被称为意志之神。\n一直沉睡在湖底，\n维持着世界的平衡。"
          shining_pearl: "人们认为，\n由克希、艾姆利多和亚克诺姆\n是从同一个蛋里出生的宝可梦。"
        zh_trad:
          brilliant_diamond: "被稱為意志之神。\n在湖底沉睡著，\n維持世界的平衡。"
          shining_pearl: "由克希、艾姆利多和亞克諾姆\n被認為是從同一個蛋裡\n誕生出的寶可夢。"
