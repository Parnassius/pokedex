      descriptions:
        jp_kana:
          brilliant_diamond: "あめの　ふった　よくじつは　せなかの\nはなの　かおりが　つよまる。かおりに\nさそわれ　ポケモンが　あつまる。"
          shining_pearl: "あめの　ふった　よくじつは　せなかの\nはなの　かおりが　つよまる。かおりに\nさそわれ　ポケモンが　あつまる。"
        jp_kanji:
          brilliant_diamond: "雨の　降った　翌日は\n背中の　花の　香りが　強まる。\n香りに　誘われ　ポケモンが　集まる。"
          shining_pearl: "雨の　降った　翌日は\n背中の　花の　香りが　強まる。\n香りに　誘われ　ポケモンが　集まる。"
        en:
          brilliant_diamond: "After a rainy day, the flower on its back smells\nstronger. The scent attracts other Pokémon."
          shining_pearl: "After a rainy day, the flower on its back smells\nstronger. The scent attracts other Pokémon."
        fr:
          brilliant_diamond: "Le parfum de sa fleur est plus fort\naprès une journée pluvieuse, ce qui\nappâte les autres Pokémon."
          shining_pearl: "Le parfum de sa fleur est plus fort\naprès une journée pluvieuse, ce qui\nappâte les autres Pokémon."
        it:
          brilliant_diamond: "Il giorno dopo che è piovuto, il fiore sul suo\ndorso emana un profumo più intenso e attira\ngli altri Pokémon."
          shining_pearl: "Il giorno dopo che è piovuto, il fiore sul suo\ndorso emana un profumo più intenso e attira\ngli altri Pokémon."
        de:
          brilliant_diamond: "Nach einem Regentag duftet die Blume auf\nseinem Rücken noch intensiver und zieht mit\nihrem Aroma andere Pokémon an."
          shining_pearl: "Nach einem Regentag duftet die Blume auf\nseinem Rücken noch intensiver und zieht mit\nihrem Aroma andere Pokémon an."
        es:
          brilliant_diamond: "Después de un día de lluvia, el aroma de la flor\nque tiene en el lomo se intensifica y atrae a otros\nPokémon."
          shining_pearl: "Después de un día de lluvia, el aroma de la flor\nque tiene en el lomo se intensifica y atrae a otros\nPokémon."
        ko:
          brilliant_diamond: "비가 내린 다음 날은\n등의 꽃향기가 강해진다.\n향기에 이끌려 포켓몬이 모여든다."
          shining_pearl: "비가 내린 다음 날은\n등의 꽃향기가 강해진다.\n향기에 이끌려 포켓몬이 모여든다."
        zh_simp:
          brilliant_diamond: "雨后第二天，\n它背上花朵的香味会愈加浓郁。\n宝可梦会被香味引诱而聚拢过来。"
          shining_pearl: "雨后第二天，\n它背上花朵的香味会愈加浓郁。\n宝可梦会被香味引诱而聚拢过来。"
        zh_trad:
          brilliant_diamond: "下雨過後的第二天，\n背上花朵散發的香味會變得濃郁。\n香味會吸引寶可夢聚集而來。"
          shining_pearl: "下雨過後的第二天，\n背上花朵散發的香味會變得濃郁。\n香味會吸引寶可夢聚集而來。"
