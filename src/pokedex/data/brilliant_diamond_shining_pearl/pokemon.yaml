      descriptions:
        jp_kana:
          brilliant_diamond: "まるめた　みみを　いきおいよく\nのばして　あいてに　たたきつける。\nおとなでも　とびあがるほど　いたい。"
          shining_pearl: "きけんを　かんじとると　りょうみみを\nたてて　けいかいする。さむい　よるは\nけがわに　かおを　うずめて　ねむる。"
        jp_kanji:
          brilliant_diamond: "丸めた　耳を　勢いよく\n伸ばして　相手に　叩きつける。\n大人でも　飛び上がるほど　痛い。"
          shining_pearl: "危険を　感じ取ると　両耳を　立てて\n警戒する。寒い　夜は\n毛皮に　顔を　埋めて　眠る。"
        en:
          brilliant_diamond: "It slams foes by sharply uncoiling its rolled ears.\nIt stings enough to make a grown-up cry in pain."
          shining_pearl: "When it senses danger, it perks up its ears.\nOn cold nights, it sleeps with its head tucked into\nits fur."
        fr:
          brilliant_diamond: "Il frappe l’ennemi en déroulant énergiquement\nses oreilles. Le coup est si violent que même\nun adulte bondirait de douleur."
          shining_pearl: "Quand ce Pokémon sent un danger, il se tient\nsur ses gardes, les oreilles dressées. Les nuits\nfroides, il dort la tête enfouie dans sa fourrure."
        it:
          brilliant_diamond: "Sbaraglia i nemici dispiegando con forza\nl’orecchio arrotolato. Fa piangere di dolore\nanche gli adulti."
          shining_pearl: "Drizza le orecchie quando avverte un pericolo.\nNelle notti fredde, dorme con il muso sepolto\nnella pelliccia."
        de:
          brilliant_diamond: "Entrollt es seine eingerollten Ohren mit voller\nWucht, teilt es so Schläge aus, durch die selbst\nerwachsene Gegner vor Schmerz aufspringen."
          shining_pearl: "Wittert es Gefahr, wird es wachsam und stellt\nbeide Ohren auf. In kalten Nächten vergräbt es\nzum Schlafen das Gesicht in seinem Fell."
        es:
          brilliant_diamond: "Ataca a sus enemigos extendiendo rápidamente\nlas orejas enrolladas. Golpea con tal fuerza que\npodría hacer llorar de dolor a un adulto."
          shining_pearl: "Cuando siente peligro, levanta las orejas. En\nnoches frías, duerme con la cabeza metida en\nel pelaje."
        ko:
          brilliant_diamond: "말고 있던 귀를 기세 좋게\n뻗어서 상대를 힘껏 친다.\n어른이라도 펄쩍 뛸 만큼 아프다."
          shining_pearl: "위험을 느끼면 양쪽 귀를\n세워서 경계한다. 추운 밤에는\n털에 얼굴을 묻고 잠잔다."
        zh_simp:
          brilliant_diamond: "会猛地将卷成团的耳朵\n伸直来捶打对手。\n连大人也会痛得跳起来。"
          shining_pearl: "如果感觉到有危险，\n就会竖起双耳保持警觉。\n在寒冷的夜里把脸埋在毛皮里睡觉。"
        zh_trad:
          brilliant_diamond: "會猛然將捲成團的耳朵\n伸直來擊打對手。\n就連成年人都會痛得跳起來。"
          shining_pearl: "如果感覺到有危險，\n就會豎起雙耳保持警覺。\n在寒冷的夜裡會把臉埋在毛皮裡睡覺。"
lopunny:
