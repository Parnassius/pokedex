          shining_pearl: "Es umklammert Dinge mit seiner dehnbaren\nZunge. Nähert man sich ihm achtlos, wird man\nvon seinem Speichel durchnässt."
        es:
          brilliant_diamond: "Agarra cualquier cosa con su lengua extensible.\nQuien se acerca mucho termina lleno de babas."
          shining_pearl: "Agarra cualquier cosa con su lengua extensible.\nQuien se acerca mucho termina lleno de babas."
        ko:
          brilliant_diamond: "쭉쭉 늘어나는 혓바닥으로\n무엇이든 휘감는다. 함부로 다가가면\n타액으로 끈적끈적거리게 된다."
          shining_pearl: "쭉쭉 늘어나는 혓바닥으로\n무엇이든 휘감는다. 함부로 다가가면\n타액으로 끈적끈적거리게 된다."
