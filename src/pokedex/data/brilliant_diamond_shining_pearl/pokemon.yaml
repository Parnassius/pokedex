        - water
        - ground
      egg_groups:
        - water_1
        - amorphous
      abilities:
        - sticky_hold
        - storm_drain
      hidden_ability: sand_force
      descriptions:
        jp_kana:
          brilliant_diamond: "ホネがなく　グニャグニャの　からだ。\nからだの　いちぶが　ちぎれても\nすぐに　さいせいされて　もとどおり。"
          shining_pearl: "おおむかしは　じょうぶな　カラで\nからだを　まもっていたらしい。\nうみの　あさせに　せいそくする。"
        jp_kanji:
          brilliant_diamond: "ホネがなく　グニャグニャの　体。\n体の　一部が　ちぎれても\nすぐに　再生されて　元通り。"
          shining_pearl: "大昔は　丈夫な　殻で\n体を　守っていたらしい。\n海の　浅瀬に　生息する。"
        en:
          brilliant_diamond: "It has a pliable body without any bones. If any\npart of its body is torn off, it grows right back."
          shining_pearl: "It apparently had a huge shell for protection in\nancient times. It lives in shallow tidal pools."
        fr:
          brilliant_diamond: "Son corps mou est dépourvu d’os.\nS’il perd une partie de son corps,\ncelle-ci repousse immédiatement."
          shining_pearl: "Ce Pokémon vit dans les hauts-fonds.\nIl paraît qu’il portait autrefois une solide\ncarapace pour se protéger."
        it:
          brilliant_diamond: "Ha un corpo flessibile e privo di ossa.\nSe ne viene lacerata una parte, si rigenera\ntornando subito come prima."
          shining_pearl: "Pare che in passato il suo corpo fosse protetto\nda un robusto carapace. Vive in bacini di mare\npoco profondi."
        de:
          brilliant_diamond: "Sein biegsamer Körper enthält keinen einzigen\nKnochen. Wird ein Körperteil abgetrennt, wächst\ner sofort nach."
          shining_pearl: "Es lebt an seichten Stellen im Meer und soll vor\nUrzeiten einen kräftigen Schutzpanzer besessen\nhaben."
        es:
          brilliant_diamond: "Posee un cuerpo flexible sin huesos. Si pierde\nalguna parte, le vuelve a crecer rápidamente."
          shining_pearl: "Al parecer, hace mucho tiempo tenía una robusta\nconcha protectora. Vive en aguas poco\nprofundas."
        ko:
          brilliant_diamond: "뼈가 없이 흐물흐물한 몸이다.\n몸 일부가 조각나도\n바로 재생되어 원래대로 되돌아온다."
          shining_pearl: "아주 옛날에는 튼튼한 껍질로\n몸을 보호하고 있었던 듯하다.\n바다의 얕은 곳에서 서식한다."
        zh_simp:
          brilliant_diamond: "没有骨头，身体软瘫瘫的。\n即使身体的一部分断掉，\n也很快就会再生并恢复原状。"
          shining_pearl: "在遥远的过去，\n好像会用结实的壳保护身体。\n栖息在海边的浅滩。"
        zh_trad:
          brilliant_diamond: "身體裡沒有骨頭所以軟綿綿的。\n即使身體的一部分斷了，\n也會立刻長回原樣。"
          shining_pearl: "在遙遠的過去，\n身體好像有堅硬的殼保護。\n棲息在海邊的淺灘。"
