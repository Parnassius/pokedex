          brilliant_diamond: "Le sacche che ha sulle guance sono ancora\npiccole e non riescono a immagazzinare molta\nelettricità."
          shining_pearl: "I Pichu giocano fra di loro unendo le punte\ndelle code per produrre scintille. Pare che\nsi tratti di una prova di coraggio."
