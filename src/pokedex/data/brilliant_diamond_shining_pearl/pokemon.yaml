        jp_kana:
          brilliant_diamond: "むれを　つくらずに　１ぴきで　いる。\nじぶんが　いちばん　えらいと　どの\nポッタイシも　かんがえているようだ。"
          shining_pearl: "つばさの　いちげきは　きょうれつ。\nたいぼくも　ボキリと　おれるほどだ。\nこおりの　うみで　えものを　さがす。"
        jp_kanji:
          brilliant_diamond: "群れを　作らずに　１匹で　いる。\n自分が　一番　偉いと　どの\nポッタイシも　考えているようだ。"
          shining_pearl: "翼の　一撃は　強烈。\n大木も　ボキリと　折れるほどだ。\n氷の　海で　獲物を　探す。"
        en:
          brilliant_diamond: "It lives alone, away from others. Apparently,\nevery one of them believes it is the\nmost important."
          shining_pearl: "Its wings deliver wicked blows that snap even the\nthickest of trees. It searches for prey in icy seas."
        fr:
          brilliant_diamond: "Il vit seul, à l’écart de ses congénères.\nChaque spécimen est convaincu d’être\nmeilleur que les autres."
          shining_pearl: "Il est capable de trancher un grand arbre\nd’un coup d’aile et chasse dans les eaux\nglacées."
        it:
          brilliant_diamond: "Vive da solo, senza fare gruppo con i suoi simili.\nPare che ogni esemplare creda di essere\nil più importante."
          shining_pearl: "Il battito delle sue ali è così potente da spezzare\nin due anche gli alberi più robusti. Va in cerca\ndi prede nei mari ghiacciati."
        de:
          brilliant_diamond: "Es lebt fernab seiner Artgenossen. Jedes Pliprin\nhält sich offenbar für das bedeutendste Exemplar\nvon allen."
          shining_pearl: "Dieses Pokémon kann durch Schläge seiner\nkräftigen Flügel selbst dicke Bäume umknicken.\nEs sucht im Eismeer nach Beute."
        es:
          brilliant_diamond: "Vive solo, alejado de los demás. Al parecer,\ncada uno piensa que es el más importante."
          shining_pearl: "Puede partir los árboles más gruesos de un fuerte\naletazo. Busca sus presas en aguas heladas."
        ko:
          brilliant_diamond: "무리를 만들지 않고 혼자 생활한다.\n어떤 팽태자라도 자신이\n제일 훌륭하다고 생각하는 듯하다."
          shining_pearl: "날개의 일격은 강렬해서\n큰 나무도 뚝하고 부러질 정도다.\n얼음 바다에서 먹이를 찾는다."
        zh_simp:
          brilliant_diamond: "不集结成群，独来独往。\n似乎所有波皇子都认为\n自己是最了不起的。"
          shining_pearl: "翅膀的一击非常强烈，\n连大树也能轻易折断。\n会在冰海里寻找猎物。"
        zh_trad:
          brilliant_diamond: "總是獨來獨往，從不集結成群。\n所有的波皇子似乎都認為\n自己是最了不起的。"
          shining_pearl: "用翅膀發出的一擊威力強烈，\n就連大樹都能輕易折斷。\n會在冰海中找尋獵物。"
