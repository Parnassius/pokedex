    zh_trad: 未知圖騰
  forms:
    unown_a:
      form_id: 0
      names:
        jp_kana: あるすがた
        jp_kanji: あるすがた
        en: One form
        fr: Forme Unique
        it: Forma Vaga
        de: Eine Form
        es: Forma de Unown
        ko: 형태별 모습
        zh_simp: 某种样子
        zh_trad: 某種樣子
      base_stats:
        hp: 48
        attack: 72
        defense: 48
        special_attack: 72
        special_defense: 48
        speed: 48
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 1
        special_defense: 0
        speed: 0
      types:
        - psychic
      egg_groups:
        - undiscovered
      abilities:
        - levitate
      descriptions:
        jp_kana:
          brilliant_diamond: "こだいぶんめいの　もじに　にている。\nもじが　さきか　アンノーンが　さきか\nせかいの　７ふしぎの　ひとつ。"
          shining_pearl: "テレパシーを　つかい　なかまどうしで\nいしそつうを　しているらしい。\nいつも　かべに　はりついている。"
        jp_kanji:
          brilliant_diamond: "古代文明の　文字に　似ている。\n文字が　先か　アンノーンが　先か\n世界の　七不思議の　ひとつ。"
          shining_pearl: "テレパシーを　使い　仲間同士で\n意思疎通を　しているらしい。\nいつも　壁に　張り付いている。"
        en:
          brilliant_diamond: "Because the Pokémon is shaped like ancient\nwriting, it is a huge mystery whether written\nlanguage or Unown came first."
          shining_pearl: "They seem to communicate among each other\ntelepathically. They are always found stuck\non walls."
        fr:
          brilliant_diamond: "Son aspect rappelle l’écriture d’une civilisation\nantique. À ce jour, nul ne sait qui de Zarbi\nou de cette écriture est apparu en premier."
          shining_pearl: "On raconte qu’ils communiquent entre eux\npar télépathie. Ils sont toujours collés aux murs."
        it:
          brilliant_diamond: "Ha la forma delle lettere di un antico alfabeto.\nÈ un mistero chi sia apparso prima, l’alfabeto\no Unown."
          shining_pearl: "Sembra che comunichi con i suoi simili\ntelepaticamente. Se ne trovano spesso\nesemplari attaccati alle pareti."
        de:
          brilliant_diamond: "Sie ähneln der Schrift antiker Kulturen. Ob zuerst\ndie Schriftzeichen oder die Icognito existierten,\nist eines der größten Rätsel unserer Zeit."
          shining_pearl: "Diese Pokémon haften immerzu an Wänden\nund scheinen telepathisch miteinander zu\nkommunizieren."
        es:
          brilliant_diamond: "Su aspecto evoca las letras de una antigua\ncivilización. Se desconoce qué fue antes:\nsi la escritura o los Unown."
          shining_pearl: "Vive adherido a muros y parece comunicarse con\nlos suyos mediante telepatía."
        ko:
          brilliant_diamond: "고대 문명의 문자와 닮았다.\n문자가 먼저인지 안농이 먼저인지\n세계 7대 불가사의 중 하나다."
          shining_pearl: "텔레파시를 써서 동료들과\n의사소통을 하는 듯하다.\n항상 벽에 달라붙어 있다."
        zh_simp:
          brilliant_diamond: "很像古代文明的文字。\n是先有文字还是先有未知图腾，\n这是世界七大不可思议之一。"
          shining_pearl: "据说它们会用心灵感应\n与伙伴互通想法。\n平时总是贴在墙上。"
        zh_trad:
          brilliant_diamond: "長得很像古代文明的文字。\n究竟先有文字還是先有未知圖騰，\n這是世界七大不可思議之一。"
          shining_pearl: "據說牠是用心靈感應\n來與夥伴們彼此溝通。\n平時總是貼在牆壁上。"
