          shining_pearl: "うらみの　かんじょうが　だいすき。\nうらみを　もつ　ひとが　すむ　いえの\nのきしたに　ずらりと　ぶらさがる。"
        jp_kanji:
          brilliant_diamond: "恨みの　感情が　大好き。\n恨みを　持つ　人が　住む　家の\n軒下に　ずらりと　ぶらさがる。"
          shining_pearl: "恨みの　感情が　大好き。\n恨みを　持つ　人が　住む　家の\n軒下に　ずらりと　ぶらさがる。"
        en:
          brilliant_diamond: "They love vengeful emotions and hang in rows\nunder the eaves of houses where vengeful\npeople live."
          shining_pearl: "They love vengeful emotions and hang in rows\nunder the eaves of houses where vengeful\npeople live."
        fr:
          brilliant_diamond: "Ces Pokémon adorent la rancune. Ils vivent\nen rang sous les corniches des maisons\nde ceux qui éprouvent ce sentiment."
          shining_pearl: "Ces Pokémon adorent la rancune. Ils vivent\nen rang sous les corniches des maisons\nde ceux qui éprouvent ce sentiment."
        it:
          brilliant_diamond: "Adorano il rancore. Penzolano in file dagli\nspioventi dei tetti delle case in cui vivono\npersone che covano sentimenti di vendetta."
          shining_pearl: "Adorano il rancore. Penzolano in file dagli\nspioventi dei tetti delle case in cui vivono\npersone che covano sentimenti di vendetta."
        de:
          brilliant_diamond: "Sie lieben Rachegefühle und hängen reihenweise\nunter der Dachrinne von Häusern, in denen\nnachtragende Menschen leben."
          shining_pearl: "Sie lieben Rachegefühle und hängen reihenweise\nunter der Dachrinne von Häusern, in denen\nnachtragende Menschen leben."
        es:
          brilliant_diamond: "Adoran los sentimientos de rencor, por lo que los\naleros de las casas donde vive gente vengativa\nsuelen estar a rebosar de ellos."
          shining_pearl: "Adoran los sentimientos de rencor, por lo que los\naleros de las casas donde vive gente vengativa\nsuelen estar a rebosar de ellos."
        ko:
          brilliant_diamond: "원망하는 감정을 매우 좋아한다.\n원한을 가지고 있는 사람이 사는 집\n처마 밑에 죽 매달려 있다."
          shining_pearl: "원망하는 감정을 매우 좋아한다.\n원한을 가지고 있는 사람이 사는 집\n처마 밑에 죽 매달려 있다."
        zh_simp:
          brilliant_diamond: "非常喜欢怨恨的感情。\n会成排地悬挂在\n心怀怨恨的人的屋檐下。"
          shining_pearl: "非常喜欢怨恨的感情。\n会成排地悬挂在\n心怀怨恨的人的屋檐下。"
