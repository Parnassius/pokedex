        es:
          brilliant_diamond: "Forma grupos en los bosques para buscar savia,\nsu comida favorita. Su fuerza le permite lanzar a\nlos rivales por los aires con su robusto cuerno."
          shining_pearl: "Gracias a sus poderosas patas y afiladas garras,\npuede lanzar a sus enemigos a gran distancia."
        ko:
          brilliant_diamond: "좋아하는 수액을 구하러\n숲에 모여든다. 강인한 뿔로\n상대를 내던질 정도로 힘이 세다."
          shining_pearl: "강인한 다리와 날카로운 발톱이\n상대를 저편으로 세차게 내던질\n파워를 만들어 낸다."
        zh_simp:
          brilliant_diamond: "为了吃喜欢的树液而\n聚集到森林里。力大无比，\n强壮的角能将对手扔飞。"
          shining_pearl: "强健的下盘与锐利的爪子\n使它拥有能将对手\n扔至天边的力量。"
