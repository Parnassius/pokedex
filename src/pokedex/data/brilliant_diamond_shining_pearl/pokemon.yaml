        jp_kana:
          brilliant_diamond: "しっぽの　ツメで　えものを　はさみ\nどくを　おくりこむ。どくが　きくまで\nぜったいに　はなさない　しゅうねん。"
          shining_pearl: "かんそうした　とちに　せいそく。\nすなちに　あなを　ほり　もぐりこみ\nかくれて　えものを　まちつづける。"
        jp_kanji:
          brilliant_diamond: "尻尾の　ツメで　獲物を　挟み\n毒を　送りこむ。毒が　効くまで\n絶対に　放さない　執念。"
          shining_pearl: "乾燥した　土地に　生息。\n砂地に　穴を　掘り　潜りこみ\n隠れて　獲物を　待ち続ける。"
        en:
          brilliant_diamond: "It grips prey with its tail claws and injects poison.\nIt tenaciously hangs on until the poison takes."
          shining_pearl: "It lives in arid lands. It buries itself in sand and\nlies in wait for unsuspecting prey."
        fr:
          brilliant_diamond: "Il saisit sa proie avec les crochets de sa queue\net lui injecte un poison. Tenace, il refuse de\nlâcher prise jusqu’à ce que la toxine fasse effet."
          shining_pearl: "Ce Pokémon vit sur les terres arides. Il creuse\nun trou dans le sable et s’y cache dans l’attente\nd’une proie."
        it:
          brilliant_diamond: "Afferra le prede con gli artigli della coda per\navvelenarle. È talmente tenace da non mollare\nla presa finché il veleno che inietta non agisce."
          shining_pearl: "Vive in terre aride. Scava buche nella sabbia\nin cui si nasconde mentre aspetta l’arrivo di una\npreda ignara del pericolo."
        de:
          brilliant_diamond: "Es ergreift seine Beute mit den Klauen an seinem\nSchwanz, vergiftet sie und lässt sie erst dann\nwieder los, wenn das Gift Wirkung gezeigt hat."
          shining_pearl: "Es lebt in Trockengebieten, wo es sich im Sand\nvergräbt und geduldig auf Beute wartet."
        es:
          brilliant_diamond: "Agarra a sus presas con las pinzas de la cola, les\ninyecta veneno y espera pacientemente hasta\nque hace efecto."
          shining_pearl: "Vive en zonas áridas. Se entierra en la arena y\nespera a que pase una presa confiada."
        ko:
          brilliant_diamond: "꼬리의 발톱으로 먹이를 집어\n독을 주입한다. 독이 퍼질 때까지\n절대 놓치지 않는 집념이 있다."
          shining_pearl: "건조한 땅에 서식한다.\n모래땅에 구멍을 파고 그 안에\n숨어서 먹이를 계속 기다린다."
        zh_simp:
          brilliant_diamond: "用尾巴上的钩爪夹住猎物\n并注入毒素。很执着，\n毒不发作就绝不松开。"
          shining_pearl: "栖息在干燥的土地上。\n会在沙地里挖洞，然后\n潜藏在里面等待猎物上门。"
        zh_trad:
          brilliant_diamond: "會用尾巴上的鉤爪夾住獵物\n並注入毒素。性情執著，\n在毒發作之前絕不會鬆開。"
          shining_pearl: "棲息在乾燥的土地上。\n會在沙地上挖洞，並埋伏\n在裡面等待獵物上門。"
