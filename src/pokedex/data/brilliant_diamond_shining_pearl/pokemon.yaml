        en:
          brilliant_diamond: "It looks just like a pinecone. Its shell protects it\nfrom bird Pokémon that peck it by mistake."
          shining_pearl: "It looks just like a pinecone. Its shell protects it\nfrom bird Pokémon that peck it by mistake."
        fr:
          brilliant_diamond: "Il ressemble à une pomme de pin.\nSa carapace solide le protège des Pokémon\noiseaux qui le picorent par erreur."
          shining_pearl: "Il ressemble à une pomme de pin.\nSa carapace solide le protège des Pokémon\noiseaux qui le picorent par erreur."
        it:
          brilliant_diamond: "Ha l’aspetto di una pigna. Il suo guscio lo\nprotegge dai Pokémon alati che lo beccano\nper errore."
          shining_pearl: "Ha l’aspetto di una pigna. Il suo guscio lo\nprotegge dai Pokémon alati che lo beccano\nper errore."
