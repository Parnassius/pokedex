      descriptions:
        jp_kana:
          brilliant_diamond: "１にち　１かい　たいじゅうと　おなじ\nりょうの　エサを　いっきに　たべる。\nほとんど　かまずに　まるのみ。"
          shining_pearl: "ながい　からだの　けの　したに\nたべものを　かくす　しゅうせい。\nかくしたことを　わすれてしまう。"
        jp_kanji:
          brilliant_diamond: "１日　１回　体重と　同じ\n量の　エサを　一気に　食べる。\nほとんど　噛まずに　丸呑み。"
          shining_pearl: "長い　体の　毛の　下に\n食べ物を　隠す　習性。\n隠したことを　忘れてしまう。"
        en:
          brilliant_diamond: "It wolfs down its weight in food once a day,\nswallowing it whole with almost no chewing."
          shining_pearl: "It hides food under its long body hair. However,\nit forgets it has hidden the food."
        fr:
          brilliant_diamond: "Une fois par jour, il avale d’une seule traite\nson poids en nourriture, presque sans mâcher."
          shining_pearl: "Il a pour habitude de cacher de la nourriture\ndans son long pelage et de l’oublier là."
        it:
          brilliant_diamond: "Divora quotidianamente una quantità di cibo\npari al suo peso, mandandolo giù quasi senza\nmasticare."
          shining_pearl: "Ha l’abitudine di nascondere il cibo sotto\ni lunghi peli del suo corpo, ma poi si dimentica\ndi averlo fatto."
        de:
          brilliant_diamond: "Es verschlingt täglich eine Nahrungsmenge,\ndie seinem eigenen Gewicht entspricht,\nund zwar ohne zu kauen."
          shining_pearl: "Es hat die Angewohnheit, unter seinem langen\nFell Nahrung zu verstecken und sie anschließend\ndort zu vergessen."
        es:
          brilliant_diamond: "Engulle su peso en comida una vez al día.\nSe lo traga todo sin apenas masticar."
          shining_pearl: "Esconde comida bajo el largo pelo de su cuerpo,\npero más tarde lo olvida."
        ko:
          brilliant_diamond: "하루에 한 번 체중과\n같은 양의 먹이를 한 번에 먹는다.\n거의 씹지 않고 통째로 삼킨다."
          shining_pearl: "몸의 긴 털 안쪽에\n먹이를 숨기는 습성이 있다.\n숨긴 것을 잊어버린다."
        zh_simp:
          brilliant_diamond: "每天都要一口气吞下一次\n与体重相当的食物。基本上\n不怎么咀嚼，直接吞下去。"
          shining_pearl: "有着把食物藏在长长体毛下的习性。\n不过又会将藏了食物的事\n忘得一干二净。"
        zh_trad:
          brilliant_diamond: "每天都要吃下一次\n與自己體重同等份量的食物。\n幾乎不咀嚼就直接吞下去。"
          shining_pearl: "有著把食物藏在長長體毛下的習性。\n但又會把藏了食物的事\n忘得一乾二淨。"
