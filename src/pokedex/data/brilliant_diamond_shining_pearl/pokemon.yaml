          shining_pearl: "あたたかい　うみの　あさせに　いる。\nしおが　ひくと　すなはまに　もぐった\nえものを　ほりだして　たべる。"
        jp_kanji:
          brilliant_diamond: "暖かい　海の　浅瀬に　いる。\n潮が　引くと　砂浜に　潜った\n獲物を　掘り出して　食べる。"
          shining_pearl: "暖かい　海の　浅瀬に　いる。\n潮が　引くと　砂浜に　潜った\n獲物を　掘り出して　食べる。"
        en:
          brilliant_diamond: "It lives in the shallows of warm seas. When the\ntide goes out, it digs up prey from beaches."
          shining_pearl: "It lives in the shallows of warm seas. When the\ntide goes out, it digs up prey from beaches."
        fr:
          brilliant_diamond: "Il vit dans les hauts-fonds des mers chaudes.\nQuand la marée se retire, il déterre les proies\nenfouies dans le sable et les mange."
          shining_pearl: "Il vit dans les hauts-fonds des mers chaudes.\nQuand la marée se retire, il déterre les proies\nenfouies dans le sable et les mange."
        it:
          brilliant_diamond: "Vive in acque poco profonde nei mari caldi.\nCon la bassa marea, scava sulla riva in cerca\ndi prede."
          shining_pearl: "Vive in acque poco profonde nei mari caldi.\nCon la bassa marea, scava sulla riva in cerca\ndi prede."
        de:
          brilliant_diamond: "Dieses Pokémon lebt an seichten Stellen warmer\nMeere. Bei Ebbe gräbt es im Sand nach Beute,\num sie dann zu verspeisen."
          shining_pearl: "Dieses Pokémon lebt an seichten Stellen warmer\nMeere. Bei Ebbe gräbt es im Sand nach Beute,\num sie dann zu verspeisen."
        es:
          brilliant_diamond: "Vive en aguas templadas y poco profundas.\nCuando baja la marea, busca presas enterradas\nen la arena y las engulle."
          shining_pearl: "Vive en aguas templadas y poco profundas.\nCuando baja la marea, busca presas enterradas\nen la arena y las engulle."
        ko:
          brilliant_diamond: "따뜻한 바다의 얕은 곳에 있다.\n바닷물이 빠지면 모래 해변에\n숨어 있는 먹이를 파내어 먹는다."
          shining_pearl: "따뜻한 바다의 얕은 곳에 있다.\n바닷물이 빠지면 모래 해변에\n숨어 있는 먹이를 파내어 먹는다."
        zh_simp:
          brilliant_diamond: "会待在温暖的海洋浅滩上。\n退潮后就会去把那些藏在\n沙滩里的猎物挖出来吃掉。"
          shining_pearl: "会待在温暖的海洋浅滩上。\n退潮后就会去把那些藏在\n沙滩里的猎物挖出来吃掉。"
        zh_trad:
          brilliant_diamond: "會待在溫暖的海洋淺灘上。\n退潮時會把躲在沙灘下的獵物\n挖出來吃掉。"
          shining_pearl: "會待在溫暖的海洋淺灘上。\n退潮時會把躲在沙灘下的獵物\n挖出來吃掉。"
