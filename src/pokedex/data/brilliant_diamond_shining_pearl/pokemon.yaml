          shining_pearl: "おそわれると　はげしく　はばたいて\nもうどくの　こなを　まきちらす。\nひがくれると　こうどうを　はじめる。"
        jp_kanji:
          brilliant_diamond: "夜行性の　ポケモン。\n明かりに　誘われた　ドクケイルが\n街路樹の　葉を　食い散らかす。"
          shining_pearl: "襲われると　激しく　羽ばたいて\n猛毒の　粉を　まき散らす。\n日が暮れると　行動を　はじめる。"
        en:
          brilliant_diamond: "Dustox are nocturnal Pokémon. Drawn by\nstreetlights, they messily eat the leaves of\ntrees lining boulevards."
          shining_pearl: "It violently flutters its wings to scatter toxic dust\nwhen attacked. It becomes active after sunset."
        fr:
          brilliant_diamond: "Attiré par les lumières des villes, ce Pokémon\nnocturne se nourrit de feuilles d’arbres urbains\nqu’il éparpille au passage."
          shining_pearl: "Quand on l’attaque, ce Pokémon nocturne bat\ndes ailes pour disséminer sa poudre toxique."
        it:
          brilliant_diamond: "Pokémon notturno. Attirato dalla luce\ndei lampioni, divora le foglie degli alberi\nlungo i viali."
          shining_pearl: "Se attaccato, sbatte con forza le ali e sparge\nuna polvere tossica. È attivo dopo il tramonto."
        de:
          brilliant_diamond: "Dieses nachtaktive Pokémon wird von den\nLichtern der Stadt angezogen, wo es die\nBlätter der Bäume am Straßenrand frisst."
          shining_pearl: "Wird es angegriffen, flattert dieses nachtaktive\nPokémon wild mit den Flügeln und verteilt dabei\nhochgiftigen Puder."
        es:
          brilliant_diamond: "Pokémon nocturno. Atraído por las luces de la\nciudad, se come las hojas y arbustos de las\navenidas."
          shining_pearl: "Cuando lo atacan, bate las alas con fuerza para\nesparcir polvo tóxico. Es un Pokémon nocturno."
        ko:
          brilliant_diamond: "야행성 포켓몬이다.\n불빛에 이끌려 나온 독케일이\n가로수의 잎을 헤적거리며 먹어 댄다."
          shining_pearl: "습격당하면 격하게 날갯짓하며\n맹독 가루를 흩뿌린다.\n날이 저물면 행동을 시작한다."
        zh_simp:
          brilliant_diamond: "夜行性宝可梦。\n被灯光引诱的毒粉蛾会把\n行道树上的叶子吃得一塌糊涂。"
          shining_pearl: "受到袭击时会猛烈地\n扇动翅膀撒出剧毒的粉末。\n太阳下山后就会开始活动。"
        zh_trad:
          brilliant_diamond: "夜行性寶可夢。\n被燈光引誘的毒粉蛾會把\n行道樹的葉子吃得一塌糊塗。"
          shining_pearl: "受到襲擊時會猛烈地\n揮動翅膀撒出劇毒的粉末。\n太陽下山後就會開始活動。"
