          shining_pearl: "おやの　あとを　おいかけるうちに\nきょうじんな　あしこしに　なる。\n１にちじゅう　のやまを　かけまわる。"
        jp_kanji:
          brilliant_diamond: "生まれてから　１時間も　すると\n炎の　たてがみや　しっぽが\n生えそろい　立派な　姿になる。"
          shining_pearl: "親の　あとを　追いかけるうちに\n強靭な　足腰になる。\n１日中　野山を　駆け回る。"
        en:
          brilliant_diamond: "About an hour after birth, Ponyta’s fiery\nmane and tail grow out, giving the Pokémon\nan impressive appearance."
          shining_pearl: "Its legs grow strong while it chases after its\nparents. It runs all day in fields and on mountains."
        fr:
          brilliant_diamond: "Sa queue et sa crinière de feu splendides\npoussent une heure à peine après sa naissance."
          shining_pearl: "À force de courir pour rattraper ses parents,\nil a fortement musclé ses pattes. Il arpente\nles plaines et les montagnes toute la journée."
        it:
          brilliant_diamond: "Un’ora dopo la nascita gli crescono criniera\ne coda infuocate, che gli donano un aspetto\nmagnifico."
          shining_pearl: "A forza di seguire i genitori, le sue zampe\ndiventano forti e scattanti. Corre tutto il giorno\nper campi e monti."
        de:
          brilliant_diamond: "Bereits eine Stunde nach der Geburt wachsen\nseine lodernde Mähne und sein feuriger Schweif,\nwas ihm eine prächtige Erscheinung verleiht."
          shining_pearl: "Seine Beine werden immer kräftiger, während es\nseinen Eltern hinterherjagt. Es rennt den ganzen\nTag über Felder und Berge."
        es:
          brilliant_diamond: "Apenas una hora después de nacer, ya le crecen\nla cola y la crin de fuego, que le confieren un\naspecto magnífico."
          shining_pearl: "Seguir el ritmo de sus progenitores le sirve para\nfortalecer las patas. Galopa el día entero por el\ncampo y la montaña."
        ko:
          brilliant_diamond: "태어나서 1시간이 지나면\n불꽃의 갈기와 꼬리가\n자라나 멋진 모습이 된다."
          shining_pearl: "부모의 뒤를 쫓아다니는 동안\n다리가 강인해진다.\n온종일 산과 들을 뛰어다닌다."
        zh_simp:
          brilliant_diamond: "出生后只需经过１个小时\n就能长齐火焰的鬃毛和尾巴，\n看上去已经十分像样了。"
          shining_pearl: "在追赶双亲的同时，\n练就了强韧的腰腿。\n整天都在山野里到处乱跑。"
        zh_trad:
          brilliant_diamond: "出生後只需經過１小時，\n火焰的鬃毛和尾巴就會長齊，\n模樣也會變得十分氣派。"
          shining_pearl: "在追趕雙親的同時，\n練成了強韌的下盤。\n整天都在山野裡到處跑。"
