      types:
        - grass
      egg_groups:
        - undiscovered
      abilities:
        - natural_cure
      held_items:
        common: lum_berry
        rare: lum_berry
      descriptions:
        jp_kana:
          brilliant_diamond: "はなばたけの　なかで　くらしているが\nからだを　まるめると　はなのように\nみえるため　だれも　きづかないのだ。"
          shining_pearl: "たいきの　どくそを　ぶんかいして\nあれた　だいちを　いっしゅんのうちに\nはなばたけにする　ちからを　もつ。"
        jp_kanji:
          brilliant_diamond: "花畑の　中で　暮らしているが\n体を　丸めると　花のように\n見えるため　誰も　気づかないのだ。"
          shining_pearl: "大気の　毒素を　分解して\n荒れた　大地を　一瞬のうちに\n花畑にする　力を　持つ。"
        en:
          brilliant_diamond: "It lives in common flower patches but is rarely\nnoticed. It is often mistaken for a flowering plant\nwhen curled up."
          shining_pearl: "It can dissolve toxins in the air to instantly\ntransform ruined land into a lush field of flowers."
        fr:
          brilliant_diamond: "Il vit dans les champs fleuris, mais personne\nne le remarque car il ressemble à une fleur\nlorsqu’il se met en boule."
          shining_pearl: "Il peut décomposer les toxines présentes\ndans l’air pour transformer instantanément\ndes terres arides en champs de fleurs."
        it:
          brilliant_diamond: "Vive nei campi di fiori. Quando si raggomitola\nnessuno si accorge della sua presenza perché\nsembra una pianta fiorita."
          shining_pearl: "Può dissolvere le tossine nell’aria per tramutare\nall’istante una terra arida in un rigoglioso\ncampo fiorito."
        de:
          brilliant_diamond: "Es lebt auf Blumenwiesen und rollt sich ein,\num selbst wie eine Blume auszusehen und so\nunerkannt zu bleiben."
          shining_pearl: "Es kann die Luft von Giftstoffen reinigen und\nÖdland im Nu in blühende Blumenfelder\nverwandeln."
        es:
          brilliant_diamond: "Vive entre las flores. Para evitar ser descubierto,\nse enrolla para parecer una planta florida."
          shining_pearl: "Puede disolver las toxinas del aire para\ntransformar al instante tierra yerma en campos\nde flores."
        ko:
          brilliant_diamond: "꽃밭 속에서 살고 있지만\n몸을 웅크리면 꽃처럼 보이기\n때문에 누구도 눈치채지 못한다."
          shining_pearl: "대기의 독소를 분해해서\n거칠어진 대지를 일순간에\n꽃밭으로 만드는 힘을 가지고 있다."
        zh_simp:
          brilliant_diamond: "生活在花圃中，只要把身体\n蜷成团，看起来就像花一样，\n任谁都察觉不到。"
          shining_pearl: "拥有分解大气中的\n毒素，让荒芜大地\n瞬间变成花圃的力量。"
        zh_trad:
          brilliant_diamond: "生活在花圃裡，當牠蜷起\n身體時看起來就像花朵，\n任誰都無法發現牠。"
          shining_pearl: "有著能分解大氣中的毒素，\n並將荒蕪的大地瞬間\n變成一片花圃的力量。"
