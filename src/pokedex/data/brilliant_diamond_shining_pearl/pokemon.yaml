          brilliant_diamond: "Sa vitesse au galop est de 240 km/h.\nLes flammes de sa crinière brûlent intensément\nlorsqu’il file comme une flèche."
          shining_pearl: "Sa force d’accélération est si puissante\nque lorsqu’il se met au galop, dix foulées\nlui suffisent à atteindre sa vitesse de pointe."
        it:
          brilliant_diamond: "Galoppa alla velocità di 240 km/h. Quando\nsfreccia, la sua criniera ardente ondeggia."
          shining_pearl: "Ha un’accelerazione sbalorditiva. Da fermo\nraggiunge la velocità massima in 10 passi."
        de:
          brilliant_diamond: "Seine Flammenmähne lodert kräftig auf, wenn es\nmit 240 km/h schnell wie ein Pfeil galoppiert."
          shining_pearl: "Dank seiner erstaunlichen Beschleunigungskraft\nerreicht es aus dem Stand in nur zehn Schritten\nseine Höchstgeschwindigkeit."
        es:
          brilliant_diamond: "Su crin de fuego centellea cuando galopa como\nuna flecha a velocidades que llegan a alcanzar\nlos 240 km/h."
          shining_pearl: "Posee una gran aceleración. En tan solo diez\npasos, puede llegar a su máxima velocidad."
        ko:
          brilliant_diamond: "달리는 속도는 시속 240km.\n갈기의 불꽃이 세차게 타오르고\n화살처럼 달려 나간다."
          shining_pearl: "달리기 시작하면 단 10걸음으로\n최고 속도를 낼 정도로\n강력한 가속력을 가지고 있다."
        zh_simp:
          brilliant_diamond: "奔跑时速为２４０公里。\n鬃毛上的火焰会剧烈燃烧，\n能像箭一样地飞驰而去。"
          shining_pearl: "拥有非凡的加速能力，\n一旦开始奔跑，只需１０步\n就能达到最高速度。"
        zh_trad:
          brilliant_diamond: "奔跑時速高達２４０公里。\n鬃毛上的火焰會劇烈燃燒，\n能像箭一般地飛馳而去。"
          shining_pearl: "擁有一旦開始奔跑，\n只需１０步即可達到\n最高速度的強烈加速力。"
