      descriptions:
        jp_kana:
          brilliant_diamond: "プライドが　たかく　ひとから\nたべものを　もらう　ことを　きらう。\nながい　うぶげが　さむさを　ふせぐ。"
          shining_pearl: "きたぐにの　かいがんせんで　くらす。\nおよぎが　とくい。１０ぷん　いじょう\nうみに　もぐって　エサを　とる。"
        jp_kanji:
          brilliant_diamond: "プライドが　高く　人から\n食べ物を　もらう　ことを　嫌う。\n長い　産毛が　寒さを　防ぐ。"
          shining_pearl: "北国の　海岸線で　暮らす。\n泳ぎが　得意。１０分　以上\n海に　潜って　エサを　取る。"
        en:
          brilliant_diamond: "Because it is very proud, it hates accepting food\nfrom people. Its thick down guards it from cold."
          shining_pearl: "It lives along the shore in northern countries.\nA skilled swimmer, it dives for over\n10 minutes while hunting."
        fr:
          brilliant_diamond: "D’un tempérament fier, il déteste que des êtres\nhumains lui offrent de la nourriture. Son duvet\népais le protège du froid."
          shining_pearl: "Il vit sur les côtes des régions nordiques.\nC’est un nageur doué capable de plonger\nplus de dix minutes pour trouver à manger."
        it:
          brilliant_diamond: "È molto orgoglioso e odia accettare cibo\ndalla gente. Le fitte piume lo proteggono\ndal freddo."
          shining_pearl: "Vive lungo le coste nei paesi del nord.\nAbile nuotatore, quando caccia può rimanere\nsott’acqua per più di 10 minuti."
        de:
          brilliant_diamond: "Sein stark ausgeprägter Stolz hält es davon ab,\nvon Menschen Futter anzunehmen. Die dicke\nDaunenschicht schützt es vor Kälte."
          shining_pearl: "Dieser ausgezeichnete Schwimmer lebt an den\nKüsten nördlicher Gefilde und kann länger als\nzehn Minuten am Stück nach Beute tauchen."
        es:
          brilliant_diamond: "Es muy orgulloso, por lo que odia aceptar\ncomida de la gente. Su grueso plumón lo protege\ndel frío."
          shining_pearl: "Es un gran nadador que puede bucear más de\ndiez minutos en busca de alimento. Habita en\nlas costas de las regiones más septentrionales."
        ko:
          brilliant_diamond: "자존심이 강해서 사람에게\n먹이를 얻는 것을 싫어한다.\n긴 솜털이 추위를 막는다."
          shining_pearl: "북쪽 나라의 해안선에서 살며\n수영이 특기이다. 10분 이상\n바다에 잠수해서 먹이를 잡는다."
        zh_simp:
          brilliant_diamond: "自尊心很强，\n讨厌从人那里接受食物。\n长长的绒毛能抵御寒冷。"
          shining_pearl: "栖息于北国的海岸线。\n很擅长游泳。为寻找食物\n会在海里潜水超过１０分钟。"
        zh_trad:
          brilliant_diamond: "自尊心很強，\n討厭從人那裡接受食物。\n長長的絨毛能抵禦寒冷。"
          shining_pearl: "生活在北國的海岸線上。\n擅長游泳。會潛進海裡\n找尋食物長達１０分鐘以上。"
