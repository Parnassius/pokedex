      descriptions:
        jp_kana:
          brilliant_diamond: "のどの　おくで　まるい　たまを\nふるわせて　なきごえを　だす。\nふわりと　はずんで　いどうする。"
          shining_pearl: "はねるたび　リリンと　おとを　だす。\nたかい　しゅうはすうの　なきごえで\nあいての　みみを　きこえなくする。"
        jp_kanji:
          brilliant_diamond: "喉の　奥で　丸い　玉を\n振るわせて　鳴き声を　出す。\nふわりと　弾んで　移動する。"
          shining_pearl: "跳ねるたびに　リリンと　音を　出す。\n高い　周波数の　鳴き声で\n相手の　耳を　聞こえなくする。"
        en:
          brilliant_diamond: "It emits cries by agitating an orb at the back of\nits throat. It moves with flouncing hops."
          shining_pearl: "Each time it hops, it makes a ringing sound.\nIt deafens foes by emitting high-frequency cries."
        fr:
          brilliant_diamond: "Il émet des cris en agitant l’orbe\nà l’arrière de sa gorge et se déplace\nen bondissant avec légèreté."
          shining_pearl: "Ce Pokémon tinte comme un grelot à chaque\nbond. Ses cris à haute fréquence assourdissent\nl’ennemi."
        it:
          brilliant_diamond: "Emette versi muovendo la sfera che ha nella gola.\nSi muove saltellando agilmente."
          shining_pearl: "A ogni salto produce un suono che sembra\nuno squillo. I suoi versi ad alta frequenza\nassordano i nemici."
        de:
          brilliant_diamond: "Es bewegt sich hopsend fort und stößt Rufe aus,\nindem es die Kugel in seinem Rachen zum\nSchwingen bringt."
          shining_pearl: "Jedes Mal, wenn es hüpft, ertönt ein klingender\nLaut. Die hohe Frequenz seiner Schreie macht\nseine Gegner taub."
        es:
          brilliant_diamond: "Emite chillidos al agitar la esfera de su garganta.\nSe desplaza mediante enérgicos saltos."
          shining_pearl: "Emite un tintineo cada vez que salta. Ensordece\na sus rivales con sonidos de alta frecuencia."
        ko:
          brilliant_diamond: "목 속의 둥근 구슬을\n떨게 하여 울음소리를 낸다.\n두둥실 떠서 이동한다."
          shining_pearl: "뛸 때마다 딸랑딸랑 소리를 낸다.\n높은 주파수의 울음소리로\n상대의 귀를 들리지 않게 한다."
        zh_simp:
          brilliant_diamond: "通过振动喉咙里的\n圆珠子发出叫声。\n用轻快的弹跳来移动身体。"
          shining_pearl: "每次跳跃都会发出\n铃铃声。用高频率的\n叫声让对手失聪。"
        zh_trad:
          brilliant_diamond: "振動喉嚨深處的圓珠\n以發出叫聲。\n會輕飄飄地彈跳移動。"
          shining_pearl: "每次跳躍都會發出鈴鈴聲。\n用高頻率的叫聲\n讓對手失去聽力。"
