          shining_pearl: "５００ねんまえに　わるさをしたため\nかなめいしの　ひびわれに\nからだを　つなぎとめられてしまった。"
        jp_kanji:
          brilliant_diamond: "１０８個の　魂が　集まって\n生まれた　ポケモン。\n要石の　ひび割れに　つながれている。"
          shining_pearl: "５００年前に　悪さをしたため\n要石の　ひび割れに\n体を　つなぎとめられてしまった。"
        en:
          brilliant_diamond: "It is a Pokémon that was formed by 108 spirits.\nIt is bound to a fissure in an odd keystone."
          shining_pearl: "It was bound to a fissure in an odd keystone as\npunishment for misdeeds 500 years ago."
        fr:
          brilliant_diamond: "Ce Pokémon est né de l’agglomération\nde 108 esprits. Il est enchaîné à une fissure\ndans une clé de voûte."
          shining_pearl: "On l’a enchaîné à la fissure d’une clé de voûte\nafin de le punir de ses mauvaises actions il y a\n500 ans."
        it:
          brilliant_diamond: "Nato dall’unione di 108 spiriti, è stato\nimprigionato nella fessura di una Roccianima."
          shining_pearl: "500 anni fa fu imprigionato nella fessura di una\nRoccianima come punizione per le sue malefatte."
        de:
          brilliant_diamond: "Ein Pokémon, das aus 108 Seelen besteht.\nEs ist an einen Spalt in einem Spiritkern\ngebunden."
          shining_pearl: "Als Sühne für vor 500 Jahren begangene Untaten\nwurde dieses Pokémon in den Spalt eines\nSpiritkerns gebannt."
        es:
          brilliant_diamond: "Se formó a partir de 108 espíritus. Está unido a\nla fisura de una piedra angular mística."
          shining_pearl: "Como castigo por una fechoría cometida 500\naños atrás, está unido a la fisura de una piedra\nangular mística."
        ko:
          brilliant_diamond: "108개의 영혼이 모여서\n태어난 포켓몬이다.\n쐐기돌의 균열과 연결되어 있다."
          shining_pearl: "500년 전에 나쁜 짓을 했기 때문에\n쐐기돌의 균열에\n몸이 연결되어 갇혀 버렸다."
        zh_simp:
          brilliant_diamond: "１０８个魂魄聚集在一起\n生成的宝可梦。\n被绑缚在楔石的裂缝里。"
          shining_pearl: "因为５００年前作恶多端，\n而导致身体被\n绑缚在楔石的裂缝里。"
        zh_trad:
          brilliant_diamond: "１０８個靈魂聚集在一起\n誕生出的寶可夢。\n被鎖在楔石的裂縫裡。"
          shining_pearl: "因為５００年前作惡多端，\n導致身體被綁縛在\n楔石的裂縫裡。"
gible:
