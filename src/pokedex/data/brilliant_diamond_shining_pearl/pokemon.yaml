          brilliant_diamond: "It hefts a Graveler repeatedly to strengthen\nits entire body. It uses every type of martial arts."
          shining_pearl: "Its muscles never cramp however much it trains.\nIt lives in the mountains away from humans."
        fr:
          brilliant_diamond: "Il muscle son corps entier en soulevant des\nGravalanch comme il soulèverait des poids\net il pratique tous les arts martiaux."
          shining_pearl: "Il peut s’entraîner autant qu’il le souhaite\nsans jamais avoir de courbatures. Il vit dans\nles montagnes à l’écart des êtres humains."
        it:
          brilliant_diamond: "Solleva Graveler ripetutamente per allenare\ntutti i muscoli del corpo. Conosce ogni tipo\ndi arte marziale."
          shining_pearl: "Per quanto si alleni, non gli vengono mai dolori\nmuscolari. Vive sui monti, lontano dai luoghi\nabitati."
        de:
          brilliant_diamond: "Es stemmt Georok, um sämtliche Muskeln seines\nKörpers zu stählen. Außerdem übt es sich in jeder\nArt von Kampfsport."
          shining_pearl: "Dank seiner körperlichen Beschaffenheit leidet es\nnie an Muskelkater, egal, wie viel es trainiert.\nEs lebt fernab von Menschen in den Bergen."
        es:
          brilliant_diamond: "Levanta Graveler para entrenar los músculos de\ntodo el cuerpo. Practica todas las artes marciales."
          shining_pearl: "Por más que haga ejercicio, nunca tiene agujetas.\nVive lejos de los humanos, en las montañas."
        ko:
          brilliant_diamond: "데구리를 수없이 들었다 놨다 하며\n전신의 근육을 단련한다.\n모든 격투기를 사용한다."
          shining_pearl: "아무리 단련해도 근육통이\n생기지 않는 몸을 가진 포켓몬이다.\n마을과 떨어진 산에서 산다."
        zh_simp:
          brilliant_diamond: "通过多次反复上下举动\n隆隆石来锻炼全身的肌肉。\n会使用所有的格斗技。"
          shining_pearl: "不管怎么锻炼身体都不会\n感到肌肉酸痛的宝可梦。\n生活在远离人烟的山里。"
        zh_trad:
          brilliant_diamond: "透過反覆舉起和放下\n隆隆石來鍛鍊全身的肌肉。\n會使用所有的格鬥技。"
          shining_pearl: "不管怎樣鍛鍊身體都不會\n感到肌肉酸痛的寶可夢。\n住在遠離人煙的山裡。"
