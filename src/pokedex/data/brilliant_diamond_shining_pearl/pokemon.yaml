        en:
          brilliant_diamond: "It makes its nest on steep sea cliffs.\nRiding updrafts, it soars to great heights."
          shining_pearl: "Catching sea winds with its long wings, it soars\nas if it were a glider. It folds its wings to rest."
        fr:
          brilliant_diamond: "Il niche sur les falaises escarpées qui surplombent\nla mer et se sert des courants ascendants pour\nvoler en altitude."
          shining_pearl: "Ce Pokémon profite des vents marins\npour planer à l’aide de ses longues ailes.\nIl replie ces dernières pour se reposer."
        it:
          brilliant_diamond: "Nidifica su scogliere a picco sul mare.\nSi fa trasportare ad alta quota dalle correnti\nascensionali."
          shining_pearl: "Usa le sue lunghe ali per farsi sostenere dai venti\nmarini, librandosi in volo come un aliante.\nQuando riposa, le ripiega."
        de:
          brilliant_diamond: "Es baut sein Nest an steilen Klippen an der Küste\nund nutzt den Aufwind, um sich hoch in die Lüfte\nzu erheben."
          shining_pearl: "Mit seinen langen Flügeln lässt es sich wie ein\nSegelflugzeug vom Seewind treiben. Wenn es\nsich ausruht, faltet es die Flügel zusammen."
        es:
          brilliant_diamond: "Anida en acantilados y alcanza grandes alturas\naprovechando las corrientes ascendentes."
          shining_pearl: "Sus largas alas le permiten planear aprovechando\nla brisa marina. Cuando descansa, las pliega."
        ko:
          brilliant_diamond: "해변의 낭떠러지 절벽에 둥지를 튼다.\n상승 기류를 이용하여\n넓은 하늘로 날아오른다."
          shining_pearl: "긴 날개로 바닷바람을 받아서\n글라이더처럼 활공한다.\n쉴 때는 날개를 접는다."
        zh_simp:
          brilliant_diamond: "会在海边的悬崖峭壁\n上筑巢。能借助\n上升气流飞向高空。"
          shining_pearl: "会用长长的翅膀迎着海风，\n像滑翔机一样滑翔。\n休息的时候会收拢翅膀。"
        zh_trad:
          brilliant_diamond: "會在海邊的懸崖峭壁上築巢。\n能藉助上升氣流\n飛上高空。"
          shining_pearl: "會用長長的翅膀迎著海風，\n像滑翔機一樣滑翔。\n休息的時候會收攏翅膀。"
