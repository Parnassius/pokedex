        jp_kana:
          brilliant_diamond: "あいての　うごきを　モノマネする\nしゅうせい。まねを　された　あいては\nめが　はなせなくなる　という。"
          shining_pearl: "ひとの　あつまる　ばしょを　このむ。\nあいての　うごきを　そっくり　マネて\nとまどわせる。その　すきに　にげる。"
        jp_kanji:
          brilliant_diamond: "相手の　動きを　モノマネする\n習性。真似を　された　相手は\n目が　離せなくなる　という。"
          shining_pearl: "人の　集まる　場所を　好む。\n相手の　動きを　そっくり　マネて\n戸惑わせる。その　隙に　逃げる。"
        en:
          brilliant_diamond: "It habitually mimics foes. The mimicked foe is\nsaid to be unable to look away from Mime Jr."
          shining_pearl: "It likes places where people gather. It mimics\nfoes to confuse them, then makes its getaway."
        fr:
          brilliant_diamond: "Il a pour habitude d’imiter les autres.\nOn dit que ceux qu’il copie ne peuvent\nplus le quitter des yeux."
          shining_pearl: "Ce Pokémon imite l’ennemi pour le déstabiliser,\net en profite pour s’enfuir. Il aime les endroits\nfréquentés par les êtres humains."
        it:
          brilliant_diamond: "Imita i movimenti dei nemici. Si dice che\nquesti ultimi non riescano più a distogliere\nlo sguardo da lui."
          shining_pearl: "Ama i luoghi affollati. Imita le movenze\ndei nemici per confonderli e ne approfitta\nper fuggire."
        de:
          brilliant_diamond: "Es ahmt die Bewegungen seiner Gegner nach.\nAngeblich können diese anschließend den Blick\nnicht mehr von ihm abwenden."
          shining_pearl: "Es hält sich gern an belebten Orten auf. Seine\nGegner ahmt es zuerst nach, um sie zu verwirren,\nund nutzt dann die Gelegenheit zur Flucht."
        es:
          brilliant_diamond: "Suele imitar los movimientos de sus enemigos.\nCuando lo hace, su rival no puede apartar los\nojos de él."
          shining_pearl: "Le gustan los sitios donde se reúne gente. Imita\na sus rivales para confundirlos y huir."
        ko:
          brilliant_diamond: "상대의 움직임을 흉내 내는\n습성이 있다. 모방을 당한 상대는\n눈을 뗄 수 없게 된다고 한다."
          shining_pearl: "사람이 모이는 장소를 좋아한다.\n상대의 움직임을 똑같이 흉내를 내\n당황하게 한다. 그 틈에 도망친다."
        zh_simp:
          brilliant_diamond: "有着模仿对手动作的\n习性。据说被模仿的\n对手会目不转睛。"
          shining_pearl: "喜欢人群聚集的地方。\n会完美地模仿对手的动作\n来迷惑对手，然后乘机逃跑。"
        zh_trad:
          brilliant_diamond: "有著模仿對手動作的習性。\n據說被模仿的對手會\n不由得看得目不轉睛。"
          shining_pearl: "喜歡人群聚集的地方。\n會分毫不差地模仿對手的動作\n來使其迷惑，然後趁機逃走。"
