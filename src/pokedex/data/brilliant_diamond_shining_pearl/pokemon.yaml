          shining_pearl: "２ほんの　しっぽを　スクリューの\nように　まわして　およぐ。もぐる\nときは　うきぶくろが　しぼむ。"
        jp_kanji:
          brilliant_diamond: "首に　ある　浮き袋に　空気を\n溜めると　浮き輪のように　膨らむ。\n水面に　顔を　出して　浮かぶ。"
          shining_pearl: "２本の　尻尾を\nスクリューの　ように　回して　泳ぐ。\n潜る　ときは　浮き袋が　しぼむ。"
        en:
          brilliant_diamond: "When air fills the flotation sac on its neck, the sac\nballoons like an inner tube. This Pokémon floats\nwith its head out of the water."
          shining_pearl: "It swims by rotating its two tails like a screw.\nWhen it dives, its flotation sac collapses."
        fr:
          brilliant_diamond: "L’organe de flottaison sur son cou gonfle\ncomme une bouée lorsqu’il le remplit d’air.\nQuand il flotte, il garde la tête hors de l’eau."
          shining_pearl: "Il nage en faisant tournoyer ses deux queues\ncomme une hélice. Son organe de flottaison\nse dégonfle quand il plonge."
        it:
          brilliant_diamond: "Se riempito d’aria, il suo collare si gonfia come\nun galleggiante. Quando nuota, la sua testa\nrimane sempre fuori dall’acqua."
          shining_pearl: "Nuota roteando le due code come fosse una vite.\nQuando si immerge, il suo galleggiante si sgonfia."
        de:
          brilliant_diamond: "Die Schwimmblase um seinen Hals dient ihm als\nSchwimmreifen, wenn es Luft darin speichert.\nSo gerät sein Kopf niemals unter Wasser."
          shining_pearl: "Es schwimmt, indem es seine beiden Schweife wie\neine Schiffsschraube rotieren lässt. Beim Tauchen\nschrumpft seine Schwimmblase."
        es:
          brilliant_diamond: "Posee una vejiga natatoria alrededor del cuello\nque se hincha como un flotador. Flota en el agua\ncon la cabeza fuera."
          shining_pearl: "Nada rotando sus dos colas a modo de hélice.\nCuando bucea, su vejiga natatoria se desinfla."
        ko:
          brilliant_diamond: "목에 있는 부낭에\n공기를 모으면 튜브처럼 부푼다.\n수면에 얼굴을 내밀고 뜬다."
          shining_pearl: "2개의 꼬리를 스크루처럼\n돌려서 헤엄친다. 잠수할 때는\n부낭이 오그라든다."
        zh_simp:
          brilliant_diamond: "脖子上的浮囊充满空气后\n会像泳圈一样膨胀。\n它浮在水上时会从水面露出脸。"
          shining_pearl: "会像螺旋桨一样\n旋转２条尾巴来游泳。\n潜水的时候浮囊会瘪掉。"
        zh_trad:
          brilliant_diamond: "脖子上的浮囊儲存空氣後，\n就會像泳圈一樣膨脹起來。\n會露出臉浮在水面上。"
          shining_pearl: "會像螺旋槳一樣\n旋轉２根尾巴來游泳。\n潛水的時候浮囊會洩氣。"
floatzel:
  species_id: 419
  names:
    jp_kana: フローゼル
    jp_kanji: フローゼル
    en: Floatzel
    fr: Mustéflott
    it: Floatzel
    de: Bojelin
    es: Floatzel
    ko: 플로젤
    zh_simp: 浮潜鼬
    zh_trad: 浮潛鼬
  forms:
    floatzel:
      form_id: 0
      base_stats:
        hp: 85
        attack: 105
        defense: 55
        special_attack: 85
        special_defense: 50
        speed: 115
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 2
      types:
        - water
      egg_groups:
        - water_1
        - field
      abilities:
        - swift_swim
      hidden_ability: water_veil
      descriptions:
        jp_kana:
          brilliant_diamond: "はったつした　うきぶくろで　うかぶ。\nおぼれた　ひとを　きゅうじょする\nてつだいを　している　ポケモンだ。"
          shining_pearl: "すいちゅうの　えものを　おいかける\nうちに　うきぶくろが　はったつした。\nゴムボートのように　ひとを　のせる。"
        jp_kanji:
          brilliant_diamond: "発達した　浮き袋で　浮かぶ。\nおぼれた　人を　救助する\n手伝いを　している　ポケモンだ。"
          shining_pearl: "水中の　獲物を　追いかける　うちに\n浮き袋が　発達した。\nゴムボートのように　人を　乗せる。"
        en:
          brilliant_diamond: "It floats using its well-developed flotation sac.\nIt assists in the rescues of drowning people."
          shining_pearl: "Its flotation sac developed as a result of pursuing\naquatic prey. Floatzel carries people as if it were\na rubber raft."
        fr:
          brilliant_diamond: "Ce Pokémon flotte grâce à son organe de\nflottaison très développé. Il aide à sauver\nles gens de la noyade."
          shining_pearl: "À force de poursuivre ses proies dans l’eau, il a\ndéveloppé son organe de flottaison. Il fait monter\ndes gens dessus comme sur un bateau gonflable."
        it:
          brilliant_diamond: "Nuota con il suo grosso galleggiante e prende\nparte ai soccorsi di chi sta per annegare."
          shining_pearl: "Il suo galleggiante si è sviluppato in seguito\nall’abitudine di cacciare le prede nell’acqua.\nTrasporta le persone come fosse un gommone."
        de:
          brilliant_diamond: "Seine gut ausgeprägte Schwimmblase lässt es auf\ndem Wasser treiben, wo es Ertrinkenden zu Hilfe\nkommt."
          shining_pearl: "Seine Schwimmblase entwickelte sich als Folge\nder Beutejagd im Wasser. Es transportiert\nMenschen, als wäre es ein Gummiboot."
        es:
          brilliant_diamond: "Flota gracias a su desarrollada vejiga natatoria.\nAyuda en los rescates de gente que se está\nahogando."
          shining_pearl: "Su vejiga natatoria, que hace las veces de balsa,\nse desarrolló a raíz de perseguir presas acuáticas."
        ko:
          brilliant_diamond: "발달한 부낭으로 뜬다.\n물에 빠진 사람을 구조하는 것을\n돕는 포켓몬이다."
          shining_pearl: "수중의 먹이를 쫓아가는 사이에\n부낭이 발달했다.\n고무보트처럼 사람을 태운다."
        zh_simp:
          brilliant_diamond: "用发达的浮囊\n浮在水面。是会帮忙\n拯救溺水者的宝可梦。"
          shining_pearl: "在追逐水中猎物的过程中，\n浮囊变得发达了。\n可以像橡皮船一样让人乘坐。"
        zh_trad:
          brilliant_diamond: "用發達的浮囊浮在水面。\n是會幫忙拯救\n溺水者的寶可夢。"
          shining_pearl: "在追逐水中獵物的過程中，\n浮囊變得更加發達。\n可以像橡皮艇一樣讓人乘坐。"
cherubi:
  species_id: 420
  names:
    jp_kana: チェリンボ
    jp_kanji: チェリンボ
    en: Cherubi
