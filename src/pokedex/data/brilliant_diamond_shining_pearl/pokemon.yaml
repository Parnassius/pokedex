        jp_kana:
          brilliant_diamond: "まいにち　１８じかん　ねむる。\nめざめている　ときも　すわったまま\nテレポートで　いどうする。"
          shining_pearl: "ねむっている　あいだも　テレパシーの\nレーダーを　はりめぐらしている。\nピンチになると　テレポートする。"
        jp_kanji:
          brilliant_diamond: "毎日　１８時間　眠る。\n目覚めている　ときも　座ったまま\nテレポートで　移動する。"
          shining_pearl: "眠っている　間も　テレパシーの\nレーダーを　張り巡らしている。\nピンチになると　テレポートする。"
        en:
          brilliant_diamond: "It sleeps for 18 hours a day. Even when awake, it\nteleports itself while remaining seated."
          shining_pearl: "Even while asleep, it maintains a telepathic radar.\nIt teleports when it is threatened."
        fr:
          brilliant_diamond: "Il dort dix-huit heures par jour.\nLorsqu’il est éveillé, il se déplace\npar téléportation tout en restant assis."
          shining_pearl: "Ce Pokémon se sert de son radar\ntélépathique même lorsqu’il dort.\nIl se téléporte en cas de danger."
        it:
          brilliant_diamond: "Dorme per 18 ore al giorno. Anche da sveglio,\nsi teletrasporta rimanendo seduto."
          shining_pearl: "Anche mentre dorme tiene attivo il radar\ntelepatico. Si teletrasporta quando si sente\nminacciato."
        de:
          brilliant_diamond: "Abra schläft 18 Stunden am Tag. Selbst im\nwachen Zustand bleibt es sitzen, während es\nsich von einem Ort zum anderen teleportiert."
          shining_pearl: "Selbst im Schlaf ist sein telepathisches Radar\naktiv. Bei Gefahr teleportiert es sich fort."
        es:
          brilliant_diamond: "Duerme 18 horas al día. Cuando está despierto,\nno se levanta ni para teletransportarse."
          shining_pearl: "Su radar telepático está activo incluso cuando\nduerme. Si se ve amenazado, se teletransporta."
        ko:
          brilliant_diamond: "매일 18시간을 잠잔다.\n깨어 있을 때도 앉은 채\n순간이동으로 이동한다."
          shining_pearl: "잠자는 동안에도 몸 주변에\n텔레파시 레이더를 두르고 있다.\n위급해지면 순간이동한다."
        zh_simp:
          brilliant_diamond: "每天要睡上１８个小时。\n即使醒着的时候也会保持坐姿，\n用瞬间移动来移动身体。"
          shining_pearl: "在睡觉时也会用\n心灵感应侦测周围的情况。\n遇到危险就会使用瞬间移动。"
        zh_trad:
          brilliant_diamond: "每天要睡１８個小時。\n即使是醒著的時候也都保持坐姿，\n用瞬間移動來轉移自己的位置。"
          shining_pearl: "就算在睡夢中也會\n布下心靈感應的雷達。\n遇到危機時就會使出瞬間移動。"
