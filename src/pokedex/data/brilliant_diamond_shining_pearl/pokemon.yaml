          shining_pearl: "가스로 된 혓바닥으로 핥이게 되면\n영혼을 빼앗겨 버린다.\n어둠에 숨어 먹이를 노린다."
        zh_simp:
          brilliant_diamond: "能够穿透任何物体。\n会潜藏在墙壁里\n观察对手的情况。"
          shining_pearl: "如果被它气体状的舌头舔到，\n灵魂就会被抓走。\n会躲在暗处寻找猎物。"
        zh_trad:
          brilliant_diamond: "能夠穿透任何物體。\n會潛藏在牆壁裡\n觀察對手的樣子。"
          shining_pearl: "如果被牠的氣體狀的舌頭舔到，\n靈魂就會被抓走。\n會躲在暗處尋找獵物。"
