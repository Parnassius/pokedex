          shining_pearl: "湖の　底で　眠っているが\n魂が　抜け出して　水面を\n飛び回ると　言われている。"
        en:
          brilliant_diamond: "It is known as the Being of Emotion. It taught\nhumans the nobility of sorrow, pain, and joy."
          shining_pearl: "It sleeps at the bottom of a lake. Its spirit is said\nto leave its body to fly on the lake’s surface."
        fr:
          brilliant_diamond: "On l’appelle « l’être de l’émotion ».\nIl a enseigné aux êtres humains la douleur\nde la tristesse et la noblesse de la joie."
          shining_pearl: "Il dort au fond d’un lac. On dit que son esprit\nsort de son corps pour aller voler à la surface\nde l’eau."
        it:
          brilliant_diamond: "Noto come \"divinità delle emozioni\".\nHa insegnato agli uomini il dolore causato\ndalla tristezza e il valore della felicità."
          shining_pearl: "Dorme sul fondo di un lago, ma si dice che\nil suo spirito abbandoni il corpo per svolazzare\nsulla superficie dell’acqua."
        de:
          brilliant_diamond: "Es wird auch das „fühlende Wesen“ genannt.\nEinst lehrte es die Menschen den durch Trauer\nverursachten Schmerz und den Wert von Freude."
          shining_pearl: "Es schläft auf dem Grund eines Sees. Man sagt,\nsein Geist verlasse den Körper und fliege über\ndie Wasseroberfläche."
        es:
          brilliant_diamond: "Se lo conoce como el Ser de la Emoción. Enseñó\na los humanos la nobleza de la aflicción, el dolor\ny la alegría."
          shining_pearl: "Duerme en el fondo de un lago. Se dice que su\nespíritu abandona el cuerpo para volar sobre el\nagua."
        ko:
          brilliant_diamond: "슬픔의 괴로움과 즐거움의 소중함을\n사람들에게 가르쳐 주었다.\n감정의 신이라 불리고 있다."
          shining_pearl: "호수의 밑바닥에서 잠자고 있지만\n영혼이 빠져나가서\n수면을 날아다닌다고 전해진다."
        zh_simp:
          brilliant_diamond: "教会了人们\n悲伤的痛苦和快乐的宝贵。\n被称为感情之神。"
          shining_pearl: "沉睡在湖底，\n但据说会灵魂出窍，\n在水面上飞来飞去。"
        zh_trad:
          brilliant_diamond: "教導了人們悲傷的痛苦\n以及喜悅的珍貴。\n被稱為感情之神。"
          shining_pearl: "在湖底沉睡。\n但據說牠的靈魂會跑出來，\n在水面徘徊飛行。"
