      descriptions:
        jp_kana:
          brilliant_diamond: "どうくつの　ちいさな　よこあなを\nねぐらにする。えものが　ちかづくと\nすばやく　とびだして　つかまえる。"
          shining_pearl: "かつては　ねったいの　とちにいた。\nさむさを　さけるため　ちねつで\nあたたかい　どうくつで　くらす。"
        jp_kanji:
          brilliant_diamond: "洞窟の　小さな　横穴を\nねぐらにする。獲物が　近づくと\n素早く　飛び出して　捕まえる。"
          shining_pearl: "かつては　熱帯の　土地にいた。\n寒さを　避けるため　地熱で\n暖かい　洞窟で　暮らす。"
        en:
          brilliant_diamond: "It nests in small, horizontal holes in cave walls.\nIt pounces to catch prey that stray too close."
          shining_pearl: "It once lived in the tropics. To avoid the cold,\nit lives in caves warmed by geothermal heat."
        fr:
          brilliant_diamond: "Il niche dans les petites cavités horizontales\ndes murs des grottes. Quand une proie\ns’approche, il bondit sur elle pour la saisir."
          shining_pearl: "Il vivait jadis sous les tropiques. Pour échapper\nau froid, il habite désormais dans des grottes\nchauffées par l’énergie géothermique."
        it:
          brilliant_diamond: "Nidifica in piccoli tunnel nelle pareti delle grotte.\nSi avventa rapido sulle prede per catturarle\nquando si avvicinano."
          shining_pearl: "Un tempo viveva ai tropici. Per ripararsi\ndal freddo, vive in grotte riscaldate\ndal calore geotermico."
        de:
          brilliant_diamond: "Dieses Pokémon nistet in kleinen Löchern in\nHöhlenwänden. Es springt Beute an, die sich\nzu nah heranwagt, und schnappt zu."
          shining_pearl: "Da es einst in tropischen Gefilden zu Hause war,\nlebt es nun in durch Erdwärme aufgeheizten\nHöhlen, um der Kälte zu entgehen."
        es:
          brilliant_diamond: "Vive en pequeños agujeros en las paredes de\ncuevas. Cuando una presa pasa cerca, salta hacia\nella."
          shining_pearl: "Antiguamente, había habitado en el trópico.\nPara evitar el frío, anida en cuevas al amparo\ndel calor geotérmico."
        ko:
          brilliant_diamond: "동굴의 조그만 구멍을\n보금자리로 쓴다. 먹이가 다가오면\n재빠르게 뛰쳐나가 붙잡는다."
          shining_pearl: "일찍이 열대의 땅에 있었다.\n추위를 피하기 위해 지열로 데워진\n따뜻한 동굴에서 산다."
        zh_simp:
          brilliant_diamond: "把洞窟里的小横洞作为住所。\n如果有猎物靠近，\n就会迅速扑出来捕捉。"
          shining_pearl: "曾经居住在热带地区。\n为了躲避寒冷而在\n有地热的温暖洞窟里生活。"
        zh_trad:
          brilliant_diamond: "把洞窟裡的小洞當成住所。\n如果有獵物靠近，\n就會迅速地撲出來捕捉。"
          shining_pearl: "過去居住在熱帶地區。\n為了避寒而生活在\n充滿地熱的溫暖洞窟裡。"
gabite:
  species_id: 444
  names:
    jp_kana: ガバイト
    jp_kanji: ガバイト
    en: Gabite
    fr: Carmache
    it: Gabite
    de: Knarksel
    es: Gabite
    ko: 한바이트
    zh_simp: 尖牙陆鲨
    zh_trad: 尖牙陸鯊
  forms:
    gabite:
      form_id: 0
      base_stats:
        hp: 68
        attack: 90
        defense: 65
        special_attack: 50
        special_defense: 55
        speed: 82
      evs_yield:
        hp: 0
