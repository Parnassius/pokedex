          shining_pearl: "５ノットの　スピードで　およぐ。\nみの　きけんを　かんじると\nするどい　ツノで　はんげきする。"
        jp_kanji:
          brilliant_diamond: "尾びれを　ドレスのように　揺らして\n優雅に　泳ぐ　姿は\nまるで　水中の　女王。"
          shining_pearl: "５ノットの　スピードで　泳ぐ。\n身の　危険を　感じると\n鋭い　ツノで　反撃する。"
        en:
          brilliant_diamond: "It swims elegantly by flittering its tail fin as if it\nwere a dress. It has the look of a queen."
          shining_pearl: "It swims at a steady five knots. If it senses\ndanger, it will strike back with its sharp horn."
        fr:
          brilliant_diamond: "Lorsque ce Pokémon nage élégamment, avec sa\nnageoire caudale qui remue comme si c’était une\nrobe, on dirait qu’il règne sur les mers."
          shining_pearl: "Il nage à une vitesse de cinq nœuds.\nQuand il se sent menacé, il réplique\nd’un coup de corne aiguisée."
        it:
          brilliant_diamond: "Nuota con eleganza, facendo ondeggiare\nle pinne caudali come fossero un abito.\nIl suo aspetto è davvero regale."
          shining_pearl: "Nuota alla velocità di 5 nodi. Se avverte\nun pericolo, contrattacca con il suo corno aguzzo."
        de:
          brilliant_diamond: "Es schwimmt elegant durchs Wasser und lässt\ndabei seine Schwanzflosse wie ein Kleid wallen,\nsodass es wie eine Wasserkönigin wirkt."
          shining_pearl: "Dieses Pokémon, das mit einer Geschwindigkeit\nvon bis zu fünf Knoten schwimmt, wehrt sich bei\nGefahr mit seinem spitzen Horn."
        es:
          brilliant_diamond: "Nada elegantemente moviendo la aleta caudal\ncomo un vestido, cual reina de los mares."
          shining_pearl: "Nada a una velocidad de cinco nudos. Si se\nencuentra en peligro, usa su afilado cuerno para\ncontraatacar."
        ko:
          brilliant_diamond: "꼬리지느러미를 드레스같이 흔들며\n우아하게 헤엄치는 모습은\n마치 수중의 여왕 같다."
          shining_pearl: "5노트의 스피드로 헤엄친다.\n몸에 위험을 느끼면\n날카로운 뿔로 반격한다."
        zh_simp:
          brilliant_diamond: "像裙子一样摇摆着尾鳍\n优雅游动的样子，\n简直就像水中的女王。"
          shining_pearl: "能以５节的速度游动。\n感到自身有危险的话，\n就会用尖锐的角反击。"
        zh_trad:
          brilliant_diamond: "搖擺著如同裙子般的尾鰭\n優雅游動的樣子，看起來\n簡直就是水中的女王。"
          shining_pearl: "能以５節的速度游動。\n感到自身有危險的時候，\n會用尖銳的角來反擊。"
