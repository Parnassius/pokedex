          shining_pearl: "Emanations from its fingertips solidify the air into\ninvisible walls that repel even harsh attacks."
        fr:
          brilliant_diamond: "Ce Pokémon est un expert de la pantomime.\nLes murs qu’il invente par ses gestes\nfinissent par se matérialiser."
          shining_pearl: "Les ondes qu’il émet du bout des doigts\nsolidifient l’air pour créer des murs capables de\nrepousser même les attaques les plus violentes."
        it:
          brilliant_diamond: "È un esperto di mimica che, con i gesti, riesce\na innalzare pareti che diventano reali."
          shining_pearl: "Con le onde che emette dalla punta delle dita\nsolidifica l’aria e crea pareti invisibili che\nrespingono gli attacchi più violenti."
        de:
          brilliant_diamond: "Dieser Experte der Pantomime kann unsichtbare\nund doch solide Wände allein mittels Mimik und\nGestik erzeugen."
          shining_pearl: "Mit Wellen, die es aus seinen Fingerspitzen\nausstößt, verhärtet es die Luft und erzeugt eine\nWand, an der selbst mächtige Attacken scheitern."
        es:
          brilliant_diamond: "Un experto de la pantomima capaz de crear\nparedes invisibles pero sólidas solo con sus\ngestos."
          shining_pearl: "Para repeler ataques, solidifica el aire y crea\nmuros invisibles gracias a las ondas que emite\npor la punta de los dedos."
        ko:
          brilliant_diamond: "팬터마임의 달인이다.\n손짓 발짓으로 만든 벽은\n이윽고 진짜 벽이 된다."
          shining_pearl: "손가락 끝에서 내는 파동이\n공기를 굳혀서 벽을 만든다.\n격렬한 공격도 튕겨 낸다."
        zh_simp:
          brilliant_diamond: "默剧大师，通过肢体动作\n展现出的墙壁会渐渐变成\n一面真正的墙壁。"
          shining_pearl: "从指尖发出的波动\n可以硬化空气制造墙壁。\n即便是强烈的攻击也能弹开。"
        zh_trad:
          brilliant_diamond: "默劇高手。\n透過肢體動作做出的牆壁，\n最後會變成真正的牆壁。"
          shining_pearl: "從指尖發出的波動\n可以硬化空氣製造牆壁。\n即便是猛烈的攻擊也能彈開。"
