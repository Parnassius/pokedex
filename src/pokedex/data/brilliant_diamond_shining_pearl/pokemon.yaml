          shining_pearl: "La punta de su cola emite una luz intensa que\nantiguamente la gente usaba para enviar señales."
        ko:
          brilliant_diamond: "꼬리 끝에 빛이 반짝인다.\n옛날 사람들은 이 불빛을 써서\n신호를 주고받았다."
          shining_pearl: "꼬리 끝에 빛이 반짝인다.\n옛날 사람들은 이 불빛을 써서\n신호를 주고받았다."
        zh_simp:
          brilliant_diamond: "尾巴前端闪耀着光芒。\n以前人们会利用这亮光\n来互相传递信号。"
          shining_pearl: "尾巴前端闪耀着光芒。\n以前人们会利用这亮光\n来互相传递信号。"
        zh_trad:
          brilliant_diamond: "尾巴尖端閃耀著光輝。\n以前的人們會利用此亮光\n來互相傳遞信號。"
          shining_pearl: "尾巴尖端閃耀著光輝。\n以前的人們會利用此亮光\n來互相傳遞信號。"
