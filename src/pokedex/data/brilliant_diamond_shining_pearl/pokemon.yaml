        jp_kana:
          brilliant_diamond: "ふかい　うみの　そこで　くらす。\n４まいの　ひれの　もようを　ひからせ\nえものを　おびきよせる。"
          shining_pearl: "てんてきに　みつからないように\nむねの　２まいの　ひれを　つかい\nかいていを　はって　いどうする。"
        jp_kanji:
          brilliant_diamond: "深い　海の　底で　暮らす。\n４枚の　ヒレの　模様を　光らせて\n獲物を　おびき寄せる。"
          shining_pearl: "天敵に　見つからないように\n胸の　２枚の　ヒレを　使い\n海底を　這って　移動する。"
        en:
          brilliant_diamond: "It lives on the deep-sea floor. It attracts prey by\nflashing patterns on its four fins."
          shining_pearl: "To avoid detection by predators, it crawls along\nthe seafloor using the two fins on its chest."
        fr:
          brilliant_diamond: "Ce Pokémon vit au fin fond de l’océan.\nIl attire ses proies en illuminant les motifs\nqui ornent ses quatre nageoires."
          shining_pearl: "Pour éviter d’être repéré par ses ennemis,\nil rampe au fond de l’eau à l’aide\nde ses deux nageoires ventrales."
        it:
          brilliant_diamond: "Vive sui fondali degli abissi marini. Attira le prede\nilluminando i motivi delle sue quattro pinne."
          shining_pearl: "Per non farsi scoprire dai suoi nemici naturali,\nsi muove sui fondali marini strisciando con le due\npinne pettorali."
        de:
          brilliant_diamond: "Dieses Pokémon lebt auf dem Grund der Tiefsee\nund lockt Beute an, indem es die Muster auf\nseinen vier Rückenflossen aufleuchten lässt."
          shining_pearl: "Um nicht von seinen natürlichen Feinden\nentdeckt zu werden, kriecht es mit seinen\nbeiden Brustflossen über den Meeresgrund."
        es:
          brilliant_diamond: "Vive en las profundidades marinas. Atrae a sus\npresas con parpadeos del dibujo de sus cuatro\naletas."
          shining_pearl: "Para que los depredadores no lo detecten, se\narrastra por el fondo marino con las aletas del\npecho."
        ko:
          brilliant_diamond: "깊은 바다의 밑바닥에서 산다.\n4개의 지느러미 무늬를 반짝거려\n먹이를 유인한다."
          shining_pearl: "천적에게 발견되지 않도록\n가슴에 있는 2개의 지느러미로\n해저에 붙어서 이동한다."
        zh_simp:
          brilliant_diamond: "生活在深深的海底。\n让４片鳍的花纹发光，\n以此引诱猎物。"
          shining_pearl: "为了不被天敌发现，\n会用胸部的２片鳍\n在海底爬行。"
        zh_trad:
          brilliant_diamond: "在深海海底生活。\n讓４片鰭上的花紋發光，\n吸引獵物上門。"
          shining_pearl: "為了不被天敵發現，\n會使用２片胸鰭\n在海底匍匐前進。"
