          shining_pearl: "Es sieht aus wie ein Tannenzapfen, weshalb es\nirrtümlicherweise von Vogel-Pokémon angepickt\nwird. Doch seine harte Schale bietet ihm Schutz."
        es:
          brilliant_diamond: "Se asemeja a una piña piñonera. Su coraza lo\nprotege de los Pokémon pájaro que lo picotean\npor error."
