        jp_kana:
          brilliant_diamond: "あまい　かおりで　おびきよせて\nりょううでの　はなたばの　なかに\nある　トゲの　ムチで　しとめる。"
          shining_pearl: "ダンサーのような　みのこなしで\nどくの　トゲが　びっしりと　ならんだ\nムチを　あやつり　こうげきする。"
        jp_kanji:
          brilliant_diamond: "甘い　香りで　おびき寄せて\n両腕の　花束の　中に\nある　トゲの　ムチで　しとめる。"
          shining_pearl: "ダンサーのような　身のこなしで\n毒の　トゲが　びっしりと　並んだ\nムチを　操り　攻撃する。"
        en:
          brilliant_diamond: "It attracts prey with a sweet aroma, then downs\nit with thorny whips hidden in its arms."
          shining_pearl: "With the movements of a dancer, it strikes with\nwhips that are densely lined with poison thorns."
        fr:
          brilliant_diamond: "Il attire ses proies grâce à son doux parfum et les\nachève avec les fouets couverts d’épines qui sont\ncachés dans les bouquets au bout de ses bras."
          shining_pearl: "Lorsqu’il attaque ses ennemis avec ses fouets\ndotés d’épines empoisonnées, il a la prestance\nd’un danseur."
        it:
          brilliant_diamond: "Attira la preda con un dolce aroma, poi\nl’abbatte con le fruste spinose celate fra\ni bouquet delle braccia."
          shining_pearl: "Attacca con le fruste piene di spine velenose\nmentre si muove a passo di danza."
        de:
          brilliant_diamond: "Mit süßem Duft lockt es Beute an und bringt sie\nmithilfe der dornenbesetzten Ranken in den\nBlumensträußen an beiden Armen zur Strecke."
          shining_pearl: "Mit tänzerischen Bewegungen holt es aus und\nschlägt mit Ranken um sich, die von giftigen\nDornen übersät sind."
        es:
          brilliant_diamond: "Atrae a sus presas con un dulce aroma y las\nderrota con las cepas espinosas de los brazos."
          shining_pearl: "Se mueve como un bailarín y golpea con cepas\nrepletas de púas venenosas."
        ko:
          brilliant_diamond: "달콤한 향기로 유인하여\n양팔의 꽃다발 속에 있는 가시의\n채찍으로 꼼짝 못 하게 한다."
          shining_pearl: "댄서 같은 재빠른 몸놀림으로\n독가시가 빽빽이 늘어선\n채찍을 조종하여 공격한다."
        zh_simp:
          brilliant_diamond: "会用甜甜的香气吸引猎物，\n然后用双臂上花朵里的\n毒刺鞭了结对方。"
          shining_pearl: "用舞者般的身体动作\n挥动毒刺密布的\n鞭子进行攻击。"
        zh_trad:
          brilliant_diamond: "會先用甜甜的香氣吸引獵物\n接近自己後，再以雙臂上\n花束裡的毒刺鞭將其解決。"
          shining_pearl: "會用舞者般的動作\n揮動布滿毒刺的\n鞭子進行攻擊。"
