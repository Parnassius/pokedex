        fr:
          brilliant_diamond: "La substance visqueuse qui recouvre son corps\nle rend glissant et lui permet ainsi de se libérer\nen se tortillant lorsqu’on l’agrippe."
          shining_pearl: "Ses barbillons font un excellent radar\nqui lui permet de repérer ses proies,\nmême en eaux troubles."
        it:
          brilliant_diamond: "Il suo corpo è ricoperto da un liquido viscido\nche gli permette di sgusciare via, se afferrato."
          shining_pearl: "I suoi baffi sono un radar eccellente, tant’è che\nsono in grado di localizzare le prede persino\nnelle acque più torbide."
        de:
          brilliant_diamond: "Sein gesamter Körper ist von einer schleimigen\nSubstanz bedeckt, sodass es leicht entkommen\nkann, wenn jemand es packen will."
          shining_pearl: "Seine Barthaare sind ein hervorragendes Radar.\nMit ihnen kann es selbst in trübem Wasser Beute\naufspüren."
        es:
          brilliant_diamond: "Recubre su cuerpo con una película viscosa\nque le permite escurrirse y escapar si alguien\nlo agarra."
          shining_pearl: "Los bigotes le sirven de radar para localizar a sus\npresas, incluso en las aguas más turbias."
        ko:
          brilliant_diamond: "전신이 미끈미끈한 체액으로\n덮여 있기 때문에 잡아도\n미끈하게 빠져나갈 수 있다."
          shining_pearl: "수염은 우수한 레이더다.\n탁해진 물속에서도\n수염을 써서 먹이를 찾아낸다."
        zh_simp:
          brilliant_diamond: "全身覆盖着黏糊糊的体液，\n所以就算被捉住也可以\n哧溜一下挣脱出来。"
          shining_pearl: "胡子是灵敏的雷达。\n即使是在浑水中\n也能靠胡子来找出食物。"
        zh_trad:
          brilliant_diamond: "全身覆蓋著黏黏的體液，\n即使被抓住也能\n滑溜溜地掙脫出來。"
          shining_pearl: "鬍鬚是優秀的雷達。\n即使是在混濁的水裡，\n也能靠鬍鬚來找出食物。"
