          shining_pearl: "家族を　守るため　ドリルのように\n鋭い　ツノで　戦う。\n川底の　岩の　穴で　暮らす。"
        en:
          brilliant_diamond: "It makes its nest by hollowing out boulders in\nstreams with its horn. The Pokémon defends\nits eggs with its life."
          shining_pearl: "To protect its family, it will fight with its\ndrill-sharp horn. It lives in hollowed rocks\nin streams."
        fr:
          brilliant_diamond: "À l’aide de sa corne, ce Pokémon évide\nles rochers au fond des rivières pour y faire\nson nid. Il risquerait sa vie pour protéger ses Œufs."
          shining_pearl: "Il protège sa famille à l’aide de sa corne pointue,\nqu’il utilise comme une perceuse. Il vit dans\nles trous des rochers au fond des rivières."
        it:
          brilliant_diamond: "Con il suo corno, scava nelle rocce sul letto\ndei fiumi per farsi la tana. Difende le Uova\na costo della vita."
          shining_pearl: "Per proteggere la sua famiglia, attacca col corno\nappuntito come un trapano. Vive nelle cavità\ndelle rocce sul letto dei fiumi."
        de:
          brilliant_diamond: "Es baut Nester, indem es mit dem Horn an seinem\nKopf Steine im Flussbett aushöhlt. Seine Eier\nverteidigt es mit seinem Leben."
          shining_pearl: "Dieses Pokémon lebt in ausgehöhlten Felsen\nim Flussbett und setzt sein spitzes Horn ein,\num seine Familie zu beschützen."
        es:
          brilliant_diamond: "Utiliza el cuerno para abrir huecos en las rocas\ndel lecho de los ríos y establecer ahí su nido.\nProtege los huevos con su vida."
          shining_pearl: "Lucha con su cuerno afilado como un taladro\npara proteger a su familia. Vive en agujeros\nhoradados en las piedras del lecho del río."
        ko:
          brilliant_diamond: "머리의 뿔로 강바닥에 있는\n돌을 파내어 둥지를 만든다.\n알을 목숨 걸고 지킨다."
          shining_pearl: "가족을 지키기 위해 드릴같이\n날카로운 뿔로 싸운다.\n강바닥의 바위 구멍에서 산다."
        zh_simp:
          brilliant_diamond: "会用头上的角在河底的\n岩石上钻孔筑巢。\n为了保护蛋它会不惜性命。"
          shining_pearl: "为了保护家人，它会用\n钻头般锐利的角战斗。\n栖息在河底的岩洞里。"
        zh_trad:
          brilliant_diamond: "用頭上的角在河底的\n岩石上鑽孔築巢。\n會不惜性命地保護自己的蛋。"
          shining_pearl: "為了守護家人，牠會用如\n鑽頭般銳利的角戰鬥。\n平時生活在河底下的岩穴中。"
