        - shadow_tag
      hidden_ability: telepathy
      descriptions:
        jp_kana:
          brilliant_diamond: "くろい　しっぽを　ひっしになって\nかくすのは　しっぽに　ひみつがある\nしょうこだと　かんぐられている。"
          shining_pearl: "くろい　しっぽを　ひっしになって\nかくすのは　しっぽに　ひみつがある\nしょうこだと　かんぐられている。"
        jp_kanji:
          brilliant_diamond: "黒い　しっぽを　必死になって\n隠すのは　しっぽに　秘密がある\n証拠だと　勘ぐられている。"
          shining_pearl: "黒い　しっぽを　必死になって\n隠すのは　しっぽに　秘密がある\n証拠だと　勘ぐられている。"
        en:
          brilliant_diamond: "It desperately tries to keep its black tail hidden.\nThis behavior is said to be proof that its tail\nhides a secret."
          shining_pearl: "It desperately tries to keep its black tail hidden.\nThis behavior is said to be proof that its tail\nhides a secret."
        fr:
          brilliant_diamond: "Ce Pokémon fait tout pour cacher sa queue noire.\nCertains en concluent, à tort, qu’elle renferme\nun secret."
          shining_pearl: "Ce Pokémon fait tout pour cacher sa queue noire.\nCertains en concluent, à tort, qu’elle renferme\nun secret."
        it:
          brilliant_diamond: "Cerca di tenere nascosta la sua coda nera ad\nogni costo, facendo sorgere a molti il sospetto\nche vi si celi un segreto."
          shining_pearl: "Cerca di tenere nascosta la sua coda nera ad\nogni costo, facendo sorgere a molti il sospetto\nche vi si celi un segreto."
        de:
          brilliant_diamond: "Da es um jeden Preis versucht, seinen schwarzen\nSchweif versteckt zu halten, vermutet man,\ndass in diesem ein Geheimnis verborgen liege."
          shining_pearl: "Da es um jeden Preis versucht, seinen schwarzen\nSchweif versteckt zu halten, vermutet man,\ndass in diesem ein Geheimnis verborgen liege."
        es:
          brilliant_diamond: "Siempre intenta ocultar su cola de color negro,\npor lo que muchos creen que alberga un secreto."
          shining_pearl: "Siempre intenta ocultar su cola de color negro,\npor lo que muchos creen que alberga un secreto."
        ko:
          brilliant_diamond: "까만 꼬리를 필사적으로\n숨기는 것은 꼬리에 비밀이 있다는\n증거라고 의심받고 있다."
          shining_pearl: "까만 꼬리를 필사적으로\n숨기는 것은 꼬리에 비밀이 있다는\n증거라고 의심받고 있다."
        zh_simp:
          brilliant_diamond: "它会拼命隐藏黑色的尾巴，\n人们认为这正是\n尾巴里藏有秘密的证据。"
          shining_pearl: "它会拼命隐藏黑色的尾巴，\n人们认为这正是\n尾巴里藏有秘密的证据。"
        zh_trad:
          brilliant_diamond: "牠會拼命地把黑黑的尾巴\n藏起來，人們推測這證明了\n牠的尾巴裡藏有秘密。"
          shining_pearl: "牠會拼命地把黑黑的尾巴\n藏起來，人們推測這證明了\n牠的尾巴裡藏有秘密。"
girafarig:
  species_id: 203
  names:
    jp_kana: キリンリキ
    jp_kanji: キリンリキ
    en: Girafarig
    fr: Girafarig
    it: Girafarig
    de: Girafarig
    es: Girafarig
    ko: 키링키
    zh_simp: 麒麟奇
    zh_trad: 麒麟奇
  forms:
    girafarig:
      form_id: 0
      base_stats:
        hp: 70
        attack: 80
        defense: 65
        special_attack: 90
        special_defense: 65
        speed: 85
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 2
        special_defense: 0
        speed: 0
      types:
        - normal
        - psychic
      egg_groups:
        - field
      abilities:
        - inner_focus
        - early_bird
      hidden_ability: sap_sipper
      descriptions:
        jp_kana:
          brilliant_diamond: "しっぽも　ちいさい　のうを　もつ。\nうしろから　しのびよる　あいてを\nかみついて　げきたいする。"
          shining_pearl: "ねむっている　あいだ　しっぽの\nあたまが　あたりを　みはっている。\nしっぽは　ねむらなくても　へいき。"
        jp_kanji:
          brilliant_diamond: "しっぽも　小さい　脳を　持つ。\n後ろから　忍び寄る　相手を\n噛みついて　撃退する。"
          shining_pearl: "眠っている　あいだ　尻尾の　頭が\nあたりを　見張っている。\n尻尾は　眠らなくても　平気。"
        en:
          brilliant_diamond: "Its tail has a separate small brain. The tail bites\nto repel any foe trying to sneak up on the\nPokémon from behind."
          shining_pearl: "While it sleeps, the head on its tail keeps watch.\nThe tail doesn’t need to sleep."
        fr:
          brilliant_diamond: "Sa queue contient un petit cerveau et mord\ntout ennemi qui tente une attaque par-derrière."
          shining_pearl: "Quand il est assoupi, la tête sur sa queue monte\nla garde, car elle n’a pas besoin de dormir."
        it:
          brilliant_diamond: "La sua coda possiede un piccolo cervello e\nrespinge con un morso i nemici che si avvicinano\nalle spalle di soppiatto."
          shining_pearl: "La testa che ha sulla coda rimane vigile mentre\nil Pokémon dorme. La coda, infatti, non ha\nbisogno di riposare."
        de:
          brilliant_diamond: "Sein Schweif besitzt ebenfalls ein kleines Gehirn.\nEr verjagt Gegner, die sich diesem Pokémon von\nhinten nähern, indem er zubeißt."
          shining_pearl: "Während es schläft, hält der Kopf an seinem\nSchweif Wache, da dieser keinen Schlaf benötigt."
        es:
          brilliant_diamond: "Su cola tiene un pequeño cerebro y muerde a los\nenemigos que intentan acercarse por la espalda."
          shining_pearl: "Cuando duerme, la cabeza de la cola se queda\nvigilando, ya que ella no necesita dormir."
        ko:
          brilliant_diamond: "꼬리도 작은 뇌를 가지고 있다.\n뒤에서 살며시 다가오는 상대를\n물어서 격퇴시킨다."
          shining_pearl: "잠자는 동안 꼬리의 머리가\n주위를 망보고 있다.\n꼬리는 잠을 잘 필요가 없다."
        zh_simp:
          brilliant_diamond: "尾巴上也有小小的大脑。\n如果有谁从身后悄悄接近的话，\n它会张嘴咬退对手。"
          shining_pearl: "睡觉时尾巴上的脑袋\n会监视周围的情况。\n尾巴不睡觉也没关系。"
        zh_trad:
          brilliant_diamond: "尾巴上也有小小的大腦。\n會咬住並擊退從背後\n偷偷靠近自己的對手。"
          shining_pearl: "睡覺時尾巴上的腦袋\n會監視周圍的狀況。\n尾巴不睡覺也沒關係。"
