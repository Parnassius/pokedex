      descriptions:
        jp_kana:
          brilliant_diamond: "なくときは　ナイフのような　うでを\nむねの　まえで　こうささせる。\nそっきょうで　メロディを　つくる。"
          shining_pearl: "かんじょうを　メロディで　あらわす。\nメロディの　ほうそくせいを\nがくしゃたちが　けんきゅうしている。"
        jp_kanji:
          brilliant_diamond: "鳴くときは　ナイフのような　腕を\n胸の　前で　交差させる。\n即興で　メロディを　作る。"
          shining_pearl: "感情を　メロディで　表す。\nメロディの　法則性を\n学者たちが　研究している。"
        en:
          brilliant_diamond: "It crosses its knifelike arms in front of its chest\nwhen it cries. It can compose melodies ad lib."
          shining_pearl: "It signals its emotions with its melodies. Scientists\nare studying these melodic patterns."
        fr:
          brilliant_diamond: "Ce Pokémon croise ses bras affûtés devant\nson torse lorsqu’il crie. Il improvise des mélodies."
          shining_pearl: "Il exprime ses émotions par des mélodies.\nLes scientifiques en étudient actuellement\nla composition musicale."
        it:
          brilliant_diamond: "Quando canta tiene incrociate sul petto le zampe\nsimili a coltelli. Sa improvvisare melodie."
          shining_pearl: "Esprime le proprie emozioni con delle melodie,\nla cui composizione è oggetto di studio\ndi molti scienziati."
        de:
          brilliant_diamond: "Wenn es seinen Ruf ausstößt, verschränkt es die\nmesserartigen Arme vor der Brust. Es komponiert\nMelodien aus dem Stegreif."
          shining_pearl: "Dieses Pokémon bringt seine Gefühle durch\nMelodien zum Ausdruck, deren Struktur auch\nvon Wissenschaftlern untersucht wird."
        es:
          brilliant_diamond: "Cuando canta, cruza sus brazos con forma de\ncuchillo. Puede improvisar melodías."
          shining_pearl: "Los estudiosos investigan los patrones de sus\nmelodías, que son un reflejo de sus emociones."
        ko:
          brilliant_diamond: "울 때는 나이프 같은 팔을\n가슴 앞에서 교차시킨다.\n즉흥으로 멜로디를 만든다."
          shining_pearl: "감정을 멜로디로 나타낸다.\n멜로디의 법칙성을\n학자들이 연구하고 있다."
        zh_simp:
          brilliant_diamond: "鸣叫的时候会将刀子般的前臂\n交叉在胸前。\n即兴创作出旋律。"
          shining_pearl: "用旋律表达感情。\n学者们正在研究\n旋律的规律性。"
        zh_trad:
          brilliant_diamond: "鳴叫的時候會將刀子般的\n前臂交叉在胸前。\n會即興創作出旋律。"
          shining_pearl: "會用旋律表達感情。\n學者們正在研究\n旋律的規律性。"
