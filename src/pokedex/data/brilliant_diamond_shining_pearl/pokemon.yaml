          shining_pearl: "À la fin de la saison des pluies, il sort danser\nen plein air, attiré par la chaleur du soleil."
        it:
          brilliant_diamond: "Quando finisce la stagione delle piogge,\nlo si vede danzare sotto i caldi raggi del sole."
          shining_pearl: "Quando finisce la stagione delle piogge,\nlo si vede danzare sotto i caldi raggi del sole."
        de:
