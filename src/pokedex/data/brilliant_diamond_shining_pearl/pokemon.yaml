      descriptions:
        jp_kana:
          brilliant_diamond: "しっぽの　ほのおを　ながく　のばして\nからだを　おおきく　みせることで\nおそってきた　てきを　こわがらせる。"
          shining_pearl: "てんじょうや　かべを　りようして\nくうちゅうさっぽうを　くりだす。\nしっぽの　ほのおも　ぶきの　ひとつ。"
        jp_kanji:
          brilliant_diamond: "しっぽの　炎を　長く　伸ばして\n体を　大きく　見せることで\n襲ってきた　敵を　怖がらせる。"
          shining_pearl: "天井や　壁を　利用して\n空中殺法を　繰り出す。\n尻尾の　炎も　武器の　ひとつ。"
        en:
          brilliant_diamond: "To intimidate attackers, it expands the fire on\nits tail to make itself appear bigger."
          shining_pearl: "It uses ceilings and walls to launch aerial attacks.\nIts fiery tail is but one of its weapons."
        fr:
          brilliant_diamond: "Il gonfle les flammes de sa queue pour paraître\nplus grand et intimider ses agresseurs."
          shining_pearl: "Ce Pokémon lance des attaques aériennes\nen prenant appui sur les murs et les plafonds. Il\nmanie les flammes de sa queue comme une arme."
        it:
          brilliant_diamond: "Intensifica la fiamma sulla coda per apparire\npiù grande e intimorire così i nemici che\nlo attaccano."
          shining_pearl: "Attacca la preda lanciandosi da soffitti e pareti.\nLa fiamma sulla coda è solo una delle sue armi."
        de:
          brilliant_diamond: "Um Angreifer abzuschrecken, verstärkt es das\nFeuer an seinem Schweif, wodurch es größer\nwirkt."
          shining_pearl: "Es stürzt sich kampflustig von Decken und\nWänden auf seine Beute. Sein lodernder Schweif\ndient ihm ebenfalls als Waffe."
        es:
          brilliant_diamond: "Intimida a sus enemigos avivando el fuego de su\ncola para parecer más grande."
          shining_pearl: "Utiliza techos y paredes para lanzar ataques\naéreos. También emplea su cola ígnea como\narma."
        ko:
          brilliant_diamond: "꼬리의 불꽃을 길게 늘여\n몸을 커 보이게 해서\n습격해 온 적에게 겁을 준다."
          shining_pearl: "천장이나 벽을 이용하여\n공중 내리찍기를 날린다.\n꼬리의 불꽃도 무기 중 하나이다."
        zh_simp:
          brilliant_diamond: "通过拉长尾部的火焰\n使自己看起来更加高大，\n以此威吓来袭的敌人。"
          shining_pearl: "利用天花板和墙壁\n使出空中攻击。\n尾部的火焰也是武器之一。"
        zh_trad:
          brilliant_diamond: "會拉長尾部的火焰\n讓身體看起來更加高大，\n以此威嚇襲擊自己的敵人。"
          shining_pearl: "利用天花板和牆壁使出空中攻擊。\n尾巴上的火焰也是武器之一。"
