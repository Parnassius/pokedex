      types:
        - dragon
        - ground
      egg_groups:
        - monster
        - dragon
      abilities:
        - sand_veil
      hidden_ability: rough_skin
      descriptions:
        jp_kana:
          brilliant_diamond: "ガバイトの　ウロコから　つくった\nくすりが　ふじのやまいを　なおすと\nふるくから　しんじられてきた。"
          shining_pearl: "ほりだした　ほうせきを　すみかに\nあつめる　しゅうせい。それを　ねらう\nどろぼうが　あとをたたない。"
        jp_kanji:
          brilliant_diamond: "ガバイトの　ウロコから　作った\n薬が　不治の病を　治すと\n古くから　信じられてきた。"
          shining_pearl: "掘り出した　宝石を　住処に\n集める　習性。それを　狙う\n泥棒が　後を絶たない。"
        en:
          brilliant_diamond: "There is a long-held belief that medicine made\nfrom its scales will heal incurable illnesses."
          shining_pearl: "It habitually digs up and hoards gems in its nest.\nIts loot is constantly targeted by thieves."
        fr:
          brilliant_diamond: "Selon une croyance ancestrale, les écailles\nde Carmache peuvent guérir les maladies\nincurables."
          shining_pearl: "Il a pour habitude d’amasser dans sa tanière\nles gemmes qu’il déterre. Son butin est\nconstamment pris pour cible par les voleurs."
        it:
          brilliant_diamond: "Fin dall’antichità si è sempre creduto, e si crede\ntuttora, che le medicine fatte con le sue scaglie\nguariscano anche i mali incurabili."
          shining_pearl: "Ha l’abitudine di conservare nella sua tana\nle gemme che trova scavando nel terreno.\nSono molti i ladri che tentano di rubargliele."
        de:
          brilliant_diamond: "Schon seit uralten Zeiten glaubt man, dass sich\nmit Medizin aus den Schuppen dieses Pokémon\nselbst unheilbare Krankheiten kurieren lassen."
          shining_pearl: "Es gräbt Edelsteine aus und hortet sie in seinem\nNest. Zahllose Diebe haben es darauf abgesehen."
        es:
          brilliant_diamond: "Existe la arraigada creencia de que una medicina\nelaborada a partir de sus escamas puede curarlo\ntodo."
          shining_pearl: "Suele buscar y acumular gemas en su nido.\nSu botín es objetivo constante de ladrones."
        ko:
          brilliant_diamond: "한바이트의 비늘로 만든 약은\n불치의 병을 고친다고\n오래전부터 믿어져 왔다."
          shining_pearl: "캐낸 보석을 거처에 모으는\n습성이 있다. 그것을 노리는\n도둑이 끊이질 않는다."
        zh_simp:
          brilliant_diamond: "自古以来人们就相信\n用尖牙陆鲨的鳞片做成的药\n可以治愈不治之症。"
          shining_pearl: "有着把挖到的宝石收集到\n巢穴里的习性。因此觊觎宝石\n而来的小偷络绎不绝。"
        zh_trad:
          brilliant_diamond: "自古以來人們一直相信\n用尖牙陸鯊的鱗片做出的藥\n能夠治癒不治之症。"
          shining_pearl: "有著會把挖出的寶石帶回\n自己巢穴收藏的習性。\n因此而盯上牠的小偷從未少過。"
