          brilliant_diamond: "It meditates in order to build up its mental\nenergy. It’s said to eat just one Berry a day."
          shining_pearl: "It never misses its daily yoga workouts, and it\nheightens its spiritual power through meditation."
        fr:
          brilliant_diamond: "Ce Pokémon médite afin d’affûter son esprit.\nOn dit qu’il ne mange qu’une Baie par jour."
          shining_pearl: "Il pratique le yoga tous les jours et développe\nsa force spirituelle grâce à la méditation."
        it:
          brilliant_diamond: "Tempra il suo spirito con la meditazione.\nMangia solo una bacca al giorno."
          shining_pearl: "Non rinuncia mai agli esercizi quotidiani\ndi yoga ed eleva la sua forza spirituale con\nla meditazione."
        de:
          brilliant_diamond: "Es schärft seinen Geist durch Meditation.\nMan sagt, es nehme jeden Tag nur eine Beere\nzu sich."
          shining_pearl: "Dieses Pokémon vergisst niemals seine täglichen\nYogaübungen und erhöht seine mentale Stärke\ndurch Meditation."
        es:
          brilliant_diamond: "Fortalece su espíritu mediante la meditación.\nAl parecer, solo come una baya al día."
          shining_pearl: "Practica yoga todos los días y aumenta su poder\nespiritual a través de la meditación."
        ko:
          brilliant_diamond: "하루 종일 나무열매 한 개만 먹는다.\n배고픔을 참는 것으로\n마음을 갈고 닦아 간다."
          shining_pearl: "요가의 수행을 하루도\n거르지 않는다. 명상을 통해\n정신을 가다듬고 있다."
        zh_simp:
          brilliant_diamond: "１天只吃１个树果。\n会通过忍饥挨饿\n来磨砺己心。"
          shining_pearl: "瑜伽修行对它来说\n是每天都不可或缺的。\n会通过冥想来提高精神力。"
        zh_trad:
          brilliant_diamond: "１天只吃１個樹果。\n藉由忍耐飢餓\n來磨練自己的心。"
          shining_pearl: "瑜伽修行對牠來說\n是每天都不可或缺的。\n會用冥想來提高精神力。"
