          shining_pearl: "Wenn es vor jemandem auf der Hut ist, entlädt\nsich knisternd Elektrizität aus seinen\nBackentaschen."
        es:
          brilliant_diamond: "Habita en bosques, donde forma grupos con sus\ncongéneres. Almacena electricidad en las bolsas\nde las mejillas."
          shining_pearl: "Cuando se pone en alerta, las bolsas de sus\nmejillas emiten chisporroteos de electricidad."
        ko:
          brilliant_diamond: "숲속에서 동료와 산다.\n볼의 양쪽에 있는\n전기 주머니에 전기를 모아 둔다."
          shining_pearl: "볼의 전기 주머니로부터\n전기를 찌릿찌릿 내뿜고 있을 때는\n상대를 경계하고 있다는 신호다."
        zh_simp:
          brilliant_diamond: "在森林里和同伴们\n一起生活。会把电力\n储存在两颊的电囊里。"
          shining_pearl: "当它从脸颊上的电囊\n噼里啪啦地放出电流时，\n表示它正在警戒对手。"
        zh_trad:
          brilliant_diamond: "在森林裡和夥伴們\n一起生活。會把電力\n儲存在兩頰的電囊裡。"
          shining_pearl: "當牠從兩頰的電囊\n劈哩啪啦地放出電流時，\n表示牠正在警戒對手。"
