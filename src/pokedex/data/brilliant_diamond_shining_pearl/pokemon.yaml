          shining_pearl: "すんだ　いけの　ほとりに　せいそく。\nはげしい　くしゃみと　はなみずを\nひきおこす　かふんを　ばらまく。"
        jp_kanji:
          brilliant_diamond: "冬の　間は　つぼみを　閉ざして\n寒さに　耐える。春になると\nつぼみを　開き　花粉を　飛ばす。"
          shining_pearl: "澄んだ　池の　ほとりに　生息。\n激しい　くしゃみと　鼻水を\n引き起こす　花粉を　ばらまく。"
        en:
          brilliant_diamond: "Over the winter, it closes its bud and endures the\ncold. In spring, the bud opens and releases pollen."
          shining_pearl: "It lives alongside clear ponds. It scatters pollen\nthat induces harsh sneezing and runny noses."
        fr:
          brilliant_diamond: "En hiver, son bourgeon se referme\npour résister au froid. Il s’ouvre\nau printemps et libère du pollen."
          shining_pearl: "Il vit près des mares d’eau claire et répand\nun pollen qui provoque des éternuements\nviolents et fait couler le nez."
        it:
          brilliant_diamond: "D’inverno chiude la sua gemma per resistere\nal freddo. In primavera la riapre per rilasciare\nil polline."
          shining_pearl: "Vive sulle rive di limpidi specchi d’acqua. Sparge\ndel polline che fa starnutire e colare il naso."
        de:
          brilliant_diamond: "Im Winter schließt es die Knospe, um der Kälte\nzu trotzen, doch im Frühjahr öffnet es sie und\nverteilt Pollen in der Luft."
          shining_pearl: "Es lebt an sauberen Teichen und sondert Pollen\nab, die eine laufende Nase und heftiges Niesen\nverursachen."
        es:
          brilliant_diamond: "En invierno cierra su capullo para protegerse del\nfrío. En primavera, el capullo se abre y esparce\npolen."
          shining_pearl: "Vive junto a los estanques de agua clara. Esparce\nun polen que provoca goteo nasal y fuertes\nestornudos."
        ko:
          brilliant_diamond: "겨울 동안 봉오리를 닫고\n추위를 견딘다. 봄이 되면\n봉오리를 펴서 꽃가루를 날린다."
          shining_pearl: "맑은 연못 주위에 서식한다.\n세찬 재채기와 콧물을 일으키는\n꽃가루를 흩뿌린다."
        zh_simp:
          brilliant_diamond: "冬季会合上花苞忍受严寒。\n春天到来时就会打开花苞，\n飞散出花粉。"
          shining_pearl: "栖息在清澈的池塘边。\n它散播的花粉能够引发\n喷嚏不停、鼻涕不止的症状。"
        zh_trad:
          brilliant_diamond: "冬季會閉上花苞抵禦嚴寒。\n春天到來時就會打開花苞，\n飛散出花粉。"
          shining_pearl: "棲息在清澈的池邊。\n會散播讓人猛打噴嚏、\n狂流鼻水的花粉。"
