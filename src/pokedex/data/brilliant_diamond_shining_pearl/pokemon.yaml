      descriptions:
        jp_kana:
          brilliant_diamond: "８０ほんの　しょくしゅを　もつ。\nえものを　からめとり　どくで\nよわるまで　ぜったいに　にがさない。"
          shining_pearl: "あたまの　あかい　たまを\nはげしく　てんめつさせて\nなかまに　きけんを　しらせるのだ。"
        jp_kanji:
          brilliant_diamond: "８０本の　触手を　持つ。\n獲物を　絡め取り　毒で\n弱るまで　絶対に　逃がさない。"
          shining_pearl: "頭の　赤い　玉を\n激しく　点滅させて\n仲間に　危険を　知らせるのだ。"
        en:
          brilliant_diamond: "With 80 tentacles for ensnaring victims, it\nprevents escape until the prey is weakened\nby poison."
          shining_pearl: "It alerts others to danger by stridently flashing\nthe red orbs on its head."
        fr:
          brilliant_diamond: "Ses quatre-vingts tentacules ligotent ses proies\net les retiennent jusqu’à ce que son poison les\naffaiblisse."
          shining_pearl: "Il avertit ses semblables d’un danger en faisant\nclignoter les orbes rouges sur sa tête."
        it:
          brilliant_diamond: "Ha 80 tentacoli che usa per intrappolare\nla preda, e non la rilascia finché il veleno\nnon l’ha indebolita."
          shining_pearl: "Avvisa gli altri del pericolo facendo lampeggiare\nvistosamente le sfere rosse che ha sulla testa."
        de:
          brilliant_diamond: "Es besitzt 80 Tentakel, mit denen es seine Beute\nfest umschlingt und erst dann wieder loslässt,\nwenn es sie mit Gift geschwächt hat."
          shining_pearl: "Es warnt Artgenossen vor Gefahr, indem es die\nroten Kugeln auf seinem Kopf grell aufleuchten\nlässt."
        es:
          brilliant_diamond: "Posee 80 tentáculos con los que aprisiona a sus\npresas hasta que se debilitan por el veneno."
          shining_pearl: "Para alertar a sus congéneres de un peligro,\nemite destellos con las esferas rojas que tiene\nen la cabeza."
        ko:
          brilliant_diamond: "80개의 촉수를 가지고 있다.\n먹이를 붙잡으면 독으로 인해\n약해질 때까지 절대 놓치지 않는다."
          shining_pearl: "머리의 빨간 구슬을\n요란하게 반짝거려서\n동료에게 위험을 알린다."
        zh_simp:
          brilliant_diamond: "用８０只触手缠住猎物，\n在对方因中毒而衰弱之前，\n它绝不会放开猎物。"
          shining_pearl: "通过快速闪烁\n头上的红色珠子\n来向伙伴传递危险信号。"
        zh_trad:
          brilliant_diamond: "擁有８０根觸手。\n纏住獵物後，直到對手因中毒\n而失去抵抗力前，牠絕不會鬆綁。"
          shining_pearl: "會急速閃爍頭上的\n紅色珠子來通知\n夥伴注意危險。"
