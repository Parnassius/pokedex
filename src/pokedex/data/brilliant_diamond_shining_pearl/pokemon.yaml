        fr:
          brilliant_diamond: "Ce Pokémon parcourt de grandes distances\npour retourner dans les profondeurs froides\nde l’océan, où il est né."
          shining_pearl: "Composé à 80 % d’eau, le corps de ce Pokémon\nest très sensible à son environnement."
        it:
          brilliant_diamond: "Nato su freddi fondali marini, percorre a nuoto\nlunghe distanze per tornare al suo luogo\ndi nascita."
          shining_pearl: "Il suo corpo è composto per l’80% d’acqua.\nÈ influenzato molto facilmente dall’ambiente\ncircostante."
        de:
          brilliant_diamond: "Schwimmend bewältigt es große Distanzen,\num an den kalten Meeresgrund zurückzukehren,\nauf dem es geboren wurde."
          shining_pearl: "Sein Körper besteht zu 80 % aus Wasser.\nEs wird leicht von seiner Umgebung beeinflusst."
        es:
          brilliant_diamond: "Nació en el frío fondo marino. Nada grandes\ndistancias para regresar a su lugar de origen."
          shining_pearl: "Su cuerpo está compuesto en un 80 % por agua.\nLe afecta considerablemente el entorno."
        ko:
          brilliant_diamond: "차가운 바다 밑에서 태어났다.\n자신이 태어난 바다의 밑바닥까지\n긴 거리를 헤엄쳐서 돌아간다."
          shining_pearl: "몸의 80%가 물이다.\n주위의 환경에 영향받기\n쉬운 체질의 포켓몬이다."
        zh_simp:
          brilliant_diamond: "出生于冰冷的海底。\n为了回到自己出生的海底，\n它会游上非常长的距离。"
          shining_pearl: "身体的８０％由水组成。\n是种体质容易受周围环境\n影响的宝可梦。"
        zh_trad:
          brilliant_diamond: "出生於冰冷的海底。\n會游上一段很長的距離，\n來回到自己出生的海底。"
          shining_pearl: "身體的８０％是水分。\n是種容易受到周遭環境\n影響的寶可夢。"
