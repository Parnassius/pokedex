          shining_pearl: "うでに　はえた　はっぱは　たいぼくも\nすっぱり　きりたおす　きれあじ。\nみつりんの　たたかいでは　むてき。"
        jp_kanji:
          brilliant_diamond: "腕に　生えた　葉っぱは　大木も\nスッパリ　切り倒す　切れ味。\n密林の　戦いでは　無敵。"
          shining_pearl: "腕に　生えた　葉っぱは　大木も\nスッパリ　切り倒す　切れ味。\n密林の　戦いでは　無敵。"
        en:
          brilliant_diamond: "The leaves that grow on its arms can slice down\nthick trees. It is without peer in jungle combat."
          shining_pearl: "The leaves that grow on its arms can slice down\nthick trees. It is without peer in jungle combat."
        fr:
          brilliant_diamond: "Les feuilles sur ses bras peuvent trancher des\narbres épais. Dans la jungle, il est invincible."
          shining_pearl: "Les feuilles sur ses bras peuvent trancher des\narbres épais. Dans la jungle, il est invincible."
        it:
          brilliant_diamond: "Le foglie che crescono sulle sue braccia possono\ntagliare persino grandi alberi. Quando lotta\nnella giungla, è imbattibile."
          shining_pearl: "Le foglie che crescono sulle sue braccia possono\ntagliare persino grandi alberi. Quando lotta\nnella giungla, è imbattibile."
        de:
          brilliant_diamond: "Die Blätter an seinen Armen sind so scharf, dass\nsie dicke Bäume glatt durchschneiden können.\nIm Dschungel ist es ein ungeschlagener Kämpfer."
          shining_pearl: "Die Blätter an seinen Armen sind so scharf, dass\nsie dicke Bäume glatt durchschneiden können.\nIm Dschungel ist es ein ungeschlagener Kämpfer."
        es:
