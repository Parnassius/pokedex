          shining_pearl: "Se dice que vive en un espacio entre dimensiones\nparalelas. Aparece en la mitología."
        ko:
          brilliant_diamond: "공간을 뒤틀리게 하는 능력을\n가졌으며 신오지방의 신화에서는\n신으로 묘사되고 있다."
          shining_pearl: "평행으로 늘어선 공간의\n틈새에 산다고 전해진다.\n신화에 등장하는 포켓몬이다."
        zh_simp:
