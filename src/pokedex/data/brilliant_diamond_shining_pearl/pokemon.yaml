          shining_pearl: "Cuando acaba la estación de las lluvias, salen a\nbailar invitados por los cálidos rayos del sol."
        ko:
          brilliant_diamond: "장마의 계절이 끝나면\n따뜻한 햇살에 이끌려 나온\n아르코가 춤추기 시작한다."
          shining_pearl: "장마의 계절이 끝나면\n따뜻한 햇살에 이끌려 나온\n아르코가 춤추기 시작한다."
        zh_simp:
          brilliant_diamond: "大雨的季节结束后，\n受到温暖阳光吸引的\n美丽花就会开始跳舞。"
          shining_pearl: "大雨的季节结束后，\n受到温暖阳光吸引的\n美丽花就会开始跳舞。"
        zh_trad:
