          brilliant_diamond: "マユの　なかは　おんどが　たかい。\nそのなかで　ぜんしんの　さいぼうが\nしんかの　エネルギーを　つくりだす。"
          shining_pearl: "かたい　マユに　つつまれて　あいての\nこうげきを　じっと　たえている。\nあいての　すがたは　わすれない。"
        jp_kanji:
          brilliant_diamond: "マユの　中は　温度が　高い。\nその中で　全身の　細胞が\n進化の　エネルギーを　作り出す。"
          shining_pearl: "硬い　マユに　包まれて　相手の\n攻撃を　じっと　耐えている。\n相手の　姿は　忘れない。"
        en:
          brilliant_diamond: "It is hot inside its cocoon. All the cells in its body\ncreate the energy for it to evolve."
          shining_pearl: "Encased within its tough cocoon, it endures\nattacks. It never forgets the appearance of\nits foes."
        fr:
          brilliant_diamond: "Il fait chaud à l’intérieur du cocon de\nce Pokémon. Ses cellules y produisent\nl’énergie nécessaire à son évolution."
          shining_pearl: "Protégé par son solide cocon, ce Pokémon\nencaisse les coups sans bouger. Il n’oublie\njamais le visage d’un ennemi."
        it:
          brilliant_diamond: "La temperatura interna del suo bozzolo\nè molto alta. Ogni cellula del suo corpo\ncontribuisce a creare energia per l’evoluzione."
          shining_pearl: "Resiste agli attacchi chiuso nel suo duro bozzolo.\nNon dimentica mai l’aspetto dei nemici."
        de:
          brilliant_diamond: "In seinem Kokon ist es heiß, denn sämtliche\nKörperzellen produzieren in dessen Innerem\nEnergie, damit es sich entwickeln kann."
          shining_pearl: "Geschützt durch seinen stabilen Kokon übersteht\nes die Angriffe seiner Gegner. Es vergisst niemals\nderen Aussehen."
        es:
          brilliant_diamond: "La temperatura del interior del capullo es muy\nelevada, pues todas las células de su cuerpo\ngeneran la energía necesaria para evolucionar."
          shining_pearl: "Protegido por el duro capullo que lo envuelve,\nsoporta inmóvil los ataques, pero no olvida\njamás a sus enemigos."
        ko:
          brilliant_diamond: "고치 안은 온도가 높다.\n그 안에서 전신의 세포가\n진화의 에너지를 만들어 낸다."
          shining_pearl: "단단한 고치에 둘러싸여\n상대의 공격을 가만히 견디고 있다.\n상대의 모습은 잊지 않는다."
        zh_simp:
          brilliant_diamond: "茧内温度非常高，\n浑身细胞都在里面\n制造进化所需的能量。"
          shining_pearl: "身体被坚硬的茧包裹着，\n一动不动地忍受对手的攻击。\n不会忘记对手长什么样子。"
        zh_trad:
          brilliant_diamond: "繭內的溫度很高，\n全身的細胞都會在其中\n製造出進化的能量。"
          shining_pearl: "被堅硬的繭裹住，一動也不動地\n承受對手的攻擊。不會忘記\n攻擊過牠的對手長什麼樣子。"
