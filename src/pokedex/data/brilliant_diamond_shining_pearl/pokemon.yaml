        jp_kana:
          brilliant_diamond: "１ねんに　１かい　だっぴする。\nがんせきのような　かたい　からだは\nダイナマイトでも　きずつかない。"
          shining_pearl: "さんちょうから　ふもとまで　つづく\nみぞは　ゴローニャが　ころがりおちる\nとおりみちなので　ようちゅうい。"
        jp_kanji:
          brilliant_diamond: "１年に　１回　脱皮する。\n岩石のような　硬い　体は\nダイナマイトでも　傷つかない。"
          shining_pearl: "山頂から　ふもとまで　続く　溝は\nゴローニャが　転がり落ちる\n通り道なので　要注意。"
        en:
          brilliant_diamond: "It sheds its hide once a year. Its boulder-like\nbody is so tough, even dynamite can’t harm it."
          shining_pearl: "It tumbles down mountains, leaving grooves\nfrom peak to base. Stay clear of these grooves."
        fr:
          brilliant_diamond: "Il mue une fois par an. Son corps\nsemblable à la pierre est si dur\nqu’il résiste même à la dynamite."
          shining_pearl: "À force de dégringoler du sommet des\nmontagnes, il a creusé des sillons dans la roche.\nMieux vaut ne pas s’approcher de ces derniers."
        it:
          brilliant_diamond: "Fa la muta una volta all’anno. Il suo corpo\nduro come la roccia non è scalfito neanche\ndalla dinamite."
          shining_pearl: "A furia di rotolare giù dalla cima dei monti,\nfinisce per formare dei solchi. Meglio starne\nalla larga."
        de:
          brilliant_diamond: "Einmal im Jahr häutet es sich. Seinem harten,\nfelsengleichen Körper kann selbst Dynamit\nnichts anhaben."
          shining_pearl: "Die Rillen, die Geowaz hinterlassen, wenn sie\nvom Gipfel bis zum Fuß eines Berges rollen,\nsollte man besser meiden."
        es:
          brilliant_diamond: "Muda su piel una vez al año. Su cuerpo rocoso es\ntan duro que ni la dinamita lo daña."
          shining_pearl: "Conviene alejarse de los caminos que recorren la\nmontaña de la cima al pie, pues son los surcos\nque dejan los Golem al rodar por la ladera."
        ko:
          brilliant_diamond: "1년에 1번 탈피한다. 암석 같은\n단단한 몸은 다이너마이트로도\n상처를 입힐 수 없다."
          shining_pearl: "산 정상에서 산기슭까지 이어지는\n움푹 패인 홈은 딱구리가\n굴러다니는 길이므로 주의가 필요하다."
        zh_simp:
          brilliant_diamond: "１年蜕１次皮。\n它的身体像岩石一样坚硬，\n即使是炸药也无法伤其分毫。"
          shining_pearl: "请注意，从山顶延续到\n山脚的沟槽是隆隆岩\n滚下来时的通道。"
        zh_trad:
          brilliant_diamond: "１年會蛻皮１次。\n身體像岩石一樣堅硬，\n即使是炸藥也無法傷其分毫。"
          shining_pearl: "請注意，從山頂延續到\n山腳的溝槽是隆隆岩\n滾下來時的通道。"
