          shining_pearl: "はなばたけが　まんかいになると\nかふんを　あつめて　とびまわる。\nすがたに　にあわず　きょうぼう。"
        jp_kanji:
          brilliant_diamond: "長細い　口を　突き刺して\n相手の　体液を　吸い取る。\n攻撃的な　性格。"
          shining_pearl: "花畑が　満開になると\n花粉を　集めて　飛びまわる。\n姿に　似合わず　凶暴。"
        en:
          brilliant_diamond: "It has an aggressive nature. It stabs prey with its\nlong, narrow mouth to drain the prey’s fluids."
          shining_pearl: "When flower fields bloom, it flits around,\ncollecting pollen. Despite its appearance,\nit is savage."
        fr:
          brilliant_diamond: "Ce Pokémon est très agressif. Il pique\nses adversaires avec sa longue trompe\net aspire leurs fluides corporels."
          shining_pearl: "Il volette dans les champs fleuris et récolte\ndu pollen. Il est plus féroce qu’il n’y paraît."
        it:
          brilliant_diamond: "Ha un’indole aggressiva. Conficca l’ago lungo\ne sottile che ha sulla bocca nelle prede e\nne succhia i fluidi."
          shining_pearl: "Quando i fiori sbocciano nei campi, vola qua\ne là raccogliendo polline. Ha un aspetto docile,\nma è in realtà piuttosto aggressivo."
        de:
          brilliant_diamond: "Dieses angriffslustige Pokémon bohrt seinen\nlangen, schmalen Rüssel in Gegner und saugt\nihre Körpersäfte aus."
          shining_pearl: "Stehen die Blumenbeete in voller Blüte, fliegt es\numher, um Pollen zu sammeln. Sein Aussehen\ntäuscht, denn es ist äußerst aggressiv."
        es:
          brilliant_diamond: "Es un Pokémon agresivo. Con su espiritrompa\nlarga y afilada ataca a sus rivales para drenar\nsus fluidos."
          shining_pearl: "Revolotea por los campos de flores y recoge\npolen. A pesar de su apariencia, es muy feroz."
        ko:
          brilliant_diamond: "가늘고 긴 입을 깊이 찔러\n상대의 체액을 흡수한다.\n공격적인 성격이다."
          shining_pearl: "꽃밭에 꽃이 활짝 피게 되면\n날아다니며 꽃가루를 모은다.\n모습에 어울리지 않게 난폭하다."
        zh_simp:
          brilliant_diamond: "会用细长的嘴巴刺向对手，\n并吸取对手的体液。\n生性好斗。"
          shining_pearl: "当花圃中满开鲜花时\n就会飞来飞去收集花粉。\n有着与外表不符的凶暴性格。"
        zh_trad:
          brilliant_diamond: "會用細長的嘴刺向對手，\n吸取對手的體液。\n具有很強的攻擊性。"
          shining_pearl: "當花田中的百花盛開時，\n會飛來到處採集花粉。\n性情兇暴，與外表毫不相稱。"
