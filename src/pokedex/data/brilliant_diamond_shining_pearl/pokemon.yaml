          shining_pearl: "ピンチになると　６つの　すあなから\nこどもが　とびだし　はんげきする。\nむれに　ビークインは　１ぴきだけ。"
        jp_kanji:
          brilliant_diamond: "胴体が　子供たちの　巣穴に\nなっている。ミツハニーの　集めた\nミツで　子供たちを　育てる。"
          shining_pearl: "ピンチになると　６つの　巣穴から\n子供が　飛び出し　反撃する。\n群れに　ビークインは　１匹だけ。"
        en:
          brilliant_diamond: "Its abdomen is a honeycomb for grubs. It raises\nits grubs on nectar collected by Combee."
          shining_pearl: "When it is in danger, grubs from its six-cell\nhoneycomb strike back. There is only one\nin a colony. "
        fr:
          brilliant_diamond: "Ce Pokémon abrite ses enfants dans son abdomen\net les élève avec le nectar récolté par les Apitrini."
          shining_pearl: "Lorsqu’un danger le menace, les larves\nde son rayon de six alvéoles ripostent.\nIl n’y a qu’un seul Apireine par colonie."
        it:
          brilliant_diamond: "Il suo addome funge da rifugio per le larve,\nche nutre con il nettare raccolto dai Combee."
          shining_pearl: "Quando è in pericolo, dalle sei celle dell’alveare\nescono delle larve che partono all’attacco.\nC’è un solo esemplare in ogni colonia."
        de:
          brilliant_diamond: "Sein Bauch fungiert als Wabe für die Larven.\nDiese zieht es mit dem von Wadribie\ngesammelten Nektar groß."
          shining_pearl: "Von diesem Pokémon gibt es nur ein Exemplar je\nKolonie. Ist es in Gefahr, springen die Larven aus\nseinen sechs Waben hervor und schlagen zurück."
        es:
          brilliant_diamond: "Su abdomen es un panal de larvas, que alimenta\ncon la miel recogida por los Combee."
          shining_pearl: "Si se encuentra en peligro, salen larvas de su\npanal de seis celdas y emprenden el ataque.\nSolo hay un único ejemplar por colonia."
        ko:
          brilliant_diamond: "몸통이 새끼들의 둥지로 되어 있다.\n세꿀버리가 모은 꿀로\n새끼들을 키운다."
          shining_pearl: "위급해지면 6개의 둥지에서\n새끼가 뛰쳐나와 반격한다.\n무리의 비퀸은 1마리뿐이다."
        zh_simp:
          brilliant_diamond: "躯体成为了孩子们的巢穴。\n用三蜜蜂采集到的\n花蜜养育孩子们。"
          shining_pearl: "遇到危机时孩子们会从\n６个巢穴里飞出并进行反击。\n一个蜂群里只有一只蜂女王。"
        zh_trad:
          brilliant_diamond: "身體是孩子們的巢穴。\n用三蜜蜂採集來的花蜜\n養育孩子們。"
          shining_pearl: "遇上危機時，孩子們會從牠\n身體的６個巢穴中飛出來反擊。\n一個群體中只會有一隻蜂女王。"
