        en:
          brilliant_diamond: "It lives in the gaps of boulders and in holes on\nthe seafloor. Its suction cups grip prey tightly."
          shining_pearl: "It obscures its foe’s vision by spitting a cloud of\nblack ink. It makes its nest among boulders."
        fr:
          brilliant_diamond: "Il vit à l’ombre des rochers et dans les cavités\ndes fonds marins. Ses ventouses s’accrochent\nà ses proies et ne lâchent jamais prise."
          shining_pearl: "Il aveugle l’ennemi en crachant un nuage d’encre\nopaque et creuse sa tanière à l’ombre des rochers."
        it:
          brilliant_diamond: "Vive tra le rocce o nelle cavità del fondale\nmarino. Si attacca alla preda con le sue ventose,\nimpedendole di fuggire."
          shining_pearl: "Oscura la vista al nemico emettendo una nuvola\nd’inchiostro nero dalla bocca. Fa la tana in mezzo\nalle rocce."
        de:
          brilliant_diamond: "Es lebt in Gesteinsritzen und Löchern auf dem\nMeeresboden. Mit seinen Saugnäpfen hält es\nBeute fest."
          shining_pearl: "Dieses Pokémon nistet in Felsspalten und\nversprüht schwarze Tinte, um die Sicht seiner\nGegner zu verdunkeln."
        es:
          brilliant_diamond: "Se refugia en cavidades rocosas y agujeros\ndel lecho marino. Atrapa a sus presas con las\nventosas para evitar que huyan."
          shining_pearl: "Nubla la visión de su rival escupiéndole una nube\nde tinta negra. Anida entre las rocas."
        ko:
          brilliant_diamond: "해저의 바위 그늘이나 구멍을\n거처로 해서 산다. 빨판으로\n먹이에 달라붙어 놓치지 않는다."
          shining_pearl: "새까만 먹물을 입으로부터 내뿜어\n상대의 눈을 안 보이게 한다.\n바위 그늘에 둥지를 만든다."
        zh_simp:
          brilliant_diamond: "栖息在海底岩石的背后\n或洞穴里。会用吸盘吸住\n猎物使其无法逃脱。"
          shining_pearl: "会从嘴里喷出漆黑的墨汁\n以蒙蔽对手的视觉。\n在岩石的背后筑巢。"
        zh_trad:
          brilliant_diamond: "將海底的岩石背面或洞穴\n當作棲身之處。會用吸盤\n吸住獵物使其無法逃脫。"
          shining_pearl: "會吐出漆黑墨汁\n來遮蔽對手的視線。\n會在岩石背面築巢。"
