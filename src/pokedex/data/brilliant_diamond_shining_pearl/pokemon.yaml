        es:
          brilliant_diamond: "Se dice que, cuando la gente discute, emerge\ndel fondo de los lagos para sosegar sus agitados\ncorazones."
          shining_pearl: "Se trata del Pokémon más hermoso del mundo.\nHa servido de fuente de inspiración para\nnumerosas obras de arte."
        ko:
          brilliant_diamond: "사람들이 싸움을 시작하면\n호수 깊은 곳에서 나타나\n거칠어진 마음을 가라앉힌다고 한다."
          shining_pearl: "세계에서 제일 아름다운 포켓몬이다.\n밀로틱을 모델로 한\n회화나 조각이 많이 있다."
        zh_simp:
          brilliant_diamond: "据说当人们开始争斗时，\n会现身自湖底，\n并治愈人们躁动的心。"
          shining_pearl: "世上最美的宝可梦。\n有着很多以美纳斯\n为原型的绘画和雕刻。"
        zh_trad:
          brilliant_diamond: "據說只要人們開始鬥爭，\n牠就會從湖泊深處現身，\n安撫人們心中一切的憤恨。"
          shining_pearl: "世上最美的寶可夢。\n有很多以美納斯為原型的\n畫作及雕刻。"
