          shining_pearl: "ながい　みみは　すぐれた　センサー。\nかわぞこで　うごく　いきものの\nおとを　ききわける　ことが　できる。"
        jp_kanji:
          brilliant_diamond: "川や　湖に　生息する。\n水の　中では　体の　色と\n模様が　敵の　目を　あざむく。"
          shining_pearl: "長い　耳は　優れた　センサー。\n川底で　動く　生き物の　音を\n聞き分ける　ことが　できる。"
        en:
          brilliant_diamond: "It lives in rivers and lakes. In water, its coloring\nand patterns trick the vision of foes."
          shining_pearl: "Its long ears are superb sensors. It can distinguish\nthe movements of living things on riverbeds."
        fr:
          brilliant_diamond: "Il peuple les rivières et les lacs.\nSous l’eau, ses motifs et ses couleurs\ntrompent les yeux de l’ennemi."
          shining_pearl: "Ses longues oreilles font d’excellents détecteurs.\nElles peuvent identifier les différents Pokémon\ndes lits des rivières au son de leurs mouvements."
        it:
          brilliant_diamond: "Vive nei fiumi e nei laghi. Il suo colore e i disegni\nsul suo corpo confondono i nemici in acqua."
          shining_pearl: "Le lunghe orecchie sono ottimi sensori.\nRiesce a distinguere i suoni prodotti dai diversi\nesseri viventi che si spostano sui fondali fluviali."
        de:
          brilliant_diamond: "Es lebt in Flüssen und Seen. Unter Wasser täuscht\nes die Wahrnehmung seiner Feinde durch Farbe\nund Muster seines Körpers."
          shining_pearl: "Mit seinen langen Ohren, die ihm als erstklassige\nSensoren dienen, kann es die Lebewesen am\nFlussgrund anhand ihrer Geräusche erkennen."
        es:
          brilliant_diamond: "Vive en ríos y lagos. Cuando está en el agua, sus\ncolores y dibujos engañan a los enemigos."
          shining_pearl: "Sus largas orejas son tan sensibles que pueden\ndetectar el sonido que producen otras criaturas\nal moverse en el lecho del río."
        ko:
          brilliant_diamond: "강이나 호수에 서식한다.\n물속에서는 몸의 색깔과\n무늬가 상대의 눈을 속인다."
          shining_pearl: "긴 귀는 우수한 센서다.\n강바닥에서 움직이는 생명체의\n소리를 분간할 수 있다."
        zh_simp:
          brilliant_diamond: "栖息在河川或湖泊里。\n在水中可以凭借身上的\n花纹和体色骗过敌人的眼睛。"
          shining_pearl: "长长的耳朵是灵敏的\n感应器。能够听出生物\n在河底移动的声音。"
        zh_trad:
          brilliant_diamond: "棲息在河川或湖泊裡。\n身體的顏色和花紋能讓牠\n在水中騙過敵人的眼睛。"
          shining_pearl: "長長的耳朵是靈敏的感應器。\n能夠分辨出在河底\n移動的生物的聲音。"
