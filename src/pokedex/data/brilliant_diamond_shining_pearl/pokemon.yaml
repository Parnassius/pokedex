          shining_pearl: "ほっぺの　でんきぶくろで　つくった\nでんきを　しっぽから　うちだす。\nきの　うえで　せいかつしている。"
        jp_kanji:
          brilliant_diamond: "静電気が　たまって　パチパチする\n毛玉を　大好物の　木の実と　一緒に\n幹の　穴に　隠す。"
          shining_pearl: "ほっぺの　電気袋で　作った\n電気を　しっぽから　撃ちだす。\n木の　上で　生活している。"
        en:
          brilliant_diamond: "It stores its own fur balls that crackle with static\nelectricity together with its favorite berries\nin tree hollows."
          shining_pearl: "It makes electricity with pouches in its cheeks and\nshoots charges from its tail. It lives atop trees."
        fr:
          brilliant_diamond: "Ce Pokémon cache ses boules de poils pleines\nd’électricité statique et ses Baies favorites dans\ndes troncs d’arbre."
          shining_pearl: "Ce Pokémon vit dans les arbres. Les poches\nde ses joues produisent de l’électricité qu’il\nprojette par sa queue."
        it:
          brilliant_diamond: "Forma delle palle di pelo cariche di elettricità\nelettrostatica, che conserva nelle cavità degli\nalberi insieme alle bacche di cui va ghiotto."
          shining_pearl: "Colpisce rilasciando dalla coda l’elettricità che\nsi crea nelle sacche sulle sue guance.\nVive in cima agli alberi."
        de:
          brilliant_diamond: "Es bildet Fellknäuel, die vor statischer Energie\nnur so knistern. Diese versteckt es zusammen mit\nBeeren, seiner Leibspeise, in Baumlöchern."
          shining_pearl: "Es lebt in Baumwipfeln und erzeugt Elektrizität in\nseinen Backentaschen, die es über den Schweif\nentlädt."
        es:
          brilliant_diamond: "Crea bolas de pelo que crepitan con electricidad\nestática. Las almacena junto a bayas en agujeros\nde árboles."
          shining_pearl: "Este Pokémon arborícola genera electricidad con\nlas bolsas de las mejillas y suelta descargas por\nla cola."
        ko:
          brilliant_diamond: "정전기가 모여 톡톡 튀는 솜털을\n자신이 좋아하는 나무열매와 함께\n나무줄기의 구멍에 숨긴다."
          shining_pearl: "볼의 전기 주머니에서 만든\n전기를 꼬리로 내보낸다.\n나무 위에서 생활하고 있다."
        zh_simp:
          brilliant_diamond: "把储存了静电帕奇作响的\n毛球和最喜欢吃的树果\n一起藏在树干的洞穴里。"
          shining_pearl: "脸颊上的电囊生成的\n电力会通过尾巴放射出去。\n生活在树木上面。"
        zh_trad:
          brilliant_diamond: "會把儲存了靜電的毛球\n和最愛吃的樹果\n一起藏在樹幹上的洞穴裡。"
          shining_pearl: "會將臉頰裡的電囊製造出的\n電流從尾巴發射出去。\n平時生活在樹上。"
