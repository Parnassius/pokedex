        jp_kana:
          brilliant_diamond: "かんそうした　とちで　くらす。\nあせの　かわりに　すなつぶを\nからだから　ぶんぴつする　ポケモン。"
          shining_pearl: "ぜんしんに　すなを　まとうことで\nばいきんから　からだを　まもる。\nみずに　ぬれることが　にがて。"
        jp_kanji:
          brilliant_diamond: "乾燥した　土地で　暮らす。\n汗の　かわりに　砂粒を\n体から　分泌する　ポケモン。"
          shining_pearl: "全身に　砂を　まとうことで\nばい菌から　体を　守る。\n水に　ぬれることが　苦手。"
        en:
          brilliant_diamond: "It lives in arid places. Instead of perspiration,\nit expels grainy sand from its body."
          shining_pearl: "It enshrouds itself with sand to protect itself from\ngerms. It does not enjoy getting wet."
        fr:
          brilliant_diamond: "Il vit sur des terres arides et exsude des grains\nde sable au lieu de transpirer."
          shining_pearl: "Ce Pokémon se recouvre de sable pour\nse protéger des microbes. Il n’aime pas\nêtre mouillé."
        it:
          brilliant_diamond: "Vive in territori aridi. Invece del sudore,\nespelle dal corpo sabbia granulosa."
          shining_pearl: "Si ricopre di sabbia per proteggersi dai germi.\nNon ama bagnarsi."
        de:
          brilliant_diamond: "Es lebt in Trockengebieten. Anstatt zu schwitzen,\nsondert sein Körper Sand ab."
          shining_pearl: "Es bedeckt seinen gesamten Körper mit Sand,\num sich vor Keimen zu schützen. Nass zu werden\nbehagt ihm überhaupt nicht."
        es:
          brilliant_diamond: "Vive en zonas áridas. En lugar de sudar, su\ncuerpo expulsa granos de arena."
          shining_pearl: "Se embadurna de arena para protegerse de los\ngérmenes. No le gusta mojarse."
        ko:
          brilliant_diamond: "건조한 땅에서 산다.\n땀 대신 모래알을\n몸에서 분비하는 포켓몬이다."
          shining_pearl: "전신에 모래를 둘러서\n세균으로부터 몸을 보호한다.\n물에 젖는 것을 싫어한다."
        zh_simp:
          brilliant_diamond: "在干燥的土地生活。\n是身体会分泌出沙粒\n而不是汗水的宝可梦。"
          shining_pearl: "通过用沙子包裹全身\n来防止身体受细菌的侵害。\n不太适应被水弄湿。"
        zh_trad:
          brilliant_diamond: "生活在乾燥的土地。\n身體會分泌出沙粒\n而不是汗水的寶可夢。"
          shining_pearl: "會用沙子包裹全身，\n藉此防止身體受到細菌侵害。\n不喜歡被水弄濕。"
