          shining_pearl: "あいてが　うごけなくなるまで\nこうげきを　やめようと　しない。\nひじょうに　どうもうな　ポケモン。"
        jp_kanji:
          brilliant_diamond: "住処から　タマゴを　かすめ取り\n食べてしまう。鋭い　カギヅメが\n相手の　急所を　切り裂く。"
          shining_pearl: "相手が　動けなくなるまで\n攻撃を　やめようと　しない。\n非常に　獰猛な　ポケモン。"
        en:
          brilliant_diamond: "It feeds on eggs stolen from nests. Its sharply\nhooked claws rip vulnerable spots on prey."
          shining_pearl: "It is extremely vicious and will not stop attacking\nuntil its foe is incapable of moving."
        fr:
          brilliant_diamond: "Il se nourrit d’Œufs volés dans des nids.\nSes griffes crochues lacèrent les organes\nvitaux de ses ennemis."
          shining_pearl: "Ce Pokémon sans pitié attaquera jusqu’à\nce que l’ennemi soit incapable de bouger."
        it:
          brilliant_diamond: "Mangia Uova rubate dai nidi. Lacera i nemici\ncon i suoi artigli uncinati, sfruttando i loro\npunti deboli."
          shining_pearl: "È spietatissimo e continua ad attaccare il nemico\nfinché questo non è più capace di muoversi."
        de:
          brilliant_diamond: "Es ernährt sich von Eiern, die es aus Nestern\nstiehlt. Mit seinen scharfen Klauen zerfetzt es\ndie wunden Punkte seiner Gegner."
          shining_pearl: "Dieses äußerst grausame Pokémon stellt seinen\nAngriff erst dann ein, wenn der Gegner sich nicht\nmehr rührt."
        es:
          brilliant_diamond: "Se alimenta de huevos que roba de nidos. Clava\nsus afiladas garras en los puntos débiles de sus\nrivales."
          shining_pearl: "Este Pokémon extremadamente feroz no deja de\natacar hasta que su rival es incapaz de moverse."
        ko:
          brilliant_diamond: "거처에서 알을 가로채어 먹어 버린다.\n날카로운 갈고리 손톱이\n상대의 급소를 베어 가른다."
          shining_pearl: "상대가 움직일 수 없게 될 때까지\n공격을 멈추려 하지 않는다.\n굉장히 사나운 포켓몬이다."
        zh_simp:
          brilliant_diamond: "会从巢穴里抢走蛋\n并吃掉。锋利的钩爪\n能割开对手的要害。"
          shining_pearl: "直到对手无法动弹为止，\n都不会停止攻击。\n是种极其凶猛的宝可梦。"
        zh_trad:
          brilliant_diamond: "會從巢穴裡搶走蛋並吃掉。\n鋒利的鉤爪能撕裂\n對手的要害。"
          shining_pearl: "直到對手無法動彈為止，\n牠絕不會停止攻擊。\n是種極為凶猛的寶可夢。"
