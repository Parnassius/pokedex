          brilliant_diamond: "よるになると　かつどうを　はじめる。\nたくさんの　ヤミカラスを　ひきつれ\nむれを　つくることで　しられる。"
          shining_pearl: "こぶんの　ヤミカラスに　エサを\nはこばせる。じぶんは　すみかで\nけづくろいに　じかんを　ついやす。"
        jp_kanji:
          brilliant_diamond: "夜になると　活動を　はじめる。\nたくさんの　ヤミカラスを　引き連れ\n群れを　作ることで　知られる。"
          shining_pearl: "子分の　ヤミカラスに　エサを\n運ばせる。自分は　住処で\n毛づくろいに　時間を　費やす。"
        en:
          brilliant_diamond: "Becoming active at night, it is known to form\nflocks with numerous Murkrow in tow."
          shining_pearl: "It makes its Murkrow cronies bring it food. It idles\nits time away, grooming itself in its nest."
        fr:
          brilliant_diamond: "Ce Pokémon nocturne est connu pour\nsa propension à se faire escorter\nd’une multitude de Cornèbre."
          shining_pearl: "Il envoie ses sbires Cornèbre lui chercher\nà manger pendant qu’il passe le temps\nà se pomponner dans son nid."
        it:
          brilliant_diamond: "Diventa attivo di notte. È famoso per la sua\ntendenza a radunare attorno a sé numerosi\nMurkrow, di cui diventa il capo."
          shining_pearl: "Si fa portare il cibo dai suoi scagnozzi Murkrow,\nmentre lui passa il tempo a lisciarsi le penne\nnel nido."
        de:
          brilliant_diamond: "Ein nachtaktives Pokémon, das dafür bekannt ist,\nzahlreiche Kramurx um sich zu scharen und so\ngroße Schwärme zu bilden."
          shining_pearl: "Es lässt sich von seinen untergebenen Kramurx\nmit Essen versorgen und vertrödelt seine Zeit\nim Nest mit Körperpflege."
        es:
          brilliant_diamond: "Un Pokémon de hábitos nocturnos, conocido por\nformar bandadas con los numerosos Murkrow\nque lo siguen."
          shining_pearl: "Manda a sus esbirros Murkrow a que le traigan\ncomida mientras él se dedica a holgazanear y\nacicalarse en su nido."
        ko:
          brilliant_diamond: "밤이 되면 활동을 시작한다.\n많은 니로우들을 거느리고\n무리를 만든다고 알려져 있다."
          shining_pearl: "부하 니로우에게 먹이를\n운반하게 한다. 자신은 거처에서\n털 다듬기에 시간을 보낸다."
        zh_simp:
          brilliant_diamond: "到了晚上就开始活动。\n以带领着许多黑暗鸦\n集结成群而闻名。"
          shining_pearl: "让跟班的黑暗鸦去搬运\n食物。自己则在巢穴里\n花大把的时间梳理羽毛。"
        zh_trad:
          brilliant_diamond: "到了晚上就開始活動。\n以帶領著許多黑暗鴉\n集結成群而聞名。"
          shining_pearl: "搬運食物的工作會丟給手下的\n黑暗鴉來做，而自己則會花上\n大把時間在巢穴裡梳理羽毛。"
