        en:
          brilliant_diamond: "It has the power to control time. It appears in\nSinnoh-region myths as an ancient deity."
          shining_pearl: "This Pokémon is spoken of in legend. It is said\nthat time began moving when Dialga was born."
        fr:
          brilliant_diamond: "Ce Pokémon capable de contrôler le temps\nest considéré comme une divinité à Sinnoh\net apparaît dans les mythes de cette région."
          shining_pearl: "Selon une légende, le temps se serait mis\nen mouvement à la naissance de Dialga."
        it:
          brilliant_diamond: "Ha il potere di controllare il tempo.\nViene descritto nei miti della regione di Sinnoh\ncome un’antica divinità."
          shining_pearl: "Le leggende in cui compare questo Pokémon\nnarrano che la sua nascita sia all’origine\ndello scorrere del tempo."
        de:
          brilliant_diamond: "Es besitzt die Macht, die Zeit zu kontrollieren.\nIn den Mythen von Sinnoh wird es als eine\nGottheit dargestellt."
          shining_pearl: "Eine Legende besagt, dass mit Dialgas Geburt\nder Lauf der Zeit begonnen habe."
        es:
          brilliant_diamond: "Tiene el poder de controlar el tiempo. Aparece\nen los mitos de Sinnoh como una antigua deidad."
          shining_pearl: "Un Pokémon de leyenda. Se dice que el tiempo\ncomenzó a avanzar cuando Dialga nació."
        ko:
          brilliant_diamond: "시간을 조종하는 힘을 가지고 있다.\n신오지방에서는 신이라고\n불리며 신화에 등장한다."
          shining_pearl: "디아루가가 태어남으로써\n시간이 움직이기 시작했다는\n전설을 가진 포켓몬이다."
        zh_simp:
          brilliant_diamond: "拥有操纵时间的力量，\n在神奥地区的神话里\n被描述成神。"
          shining_pearl: "由于帝牙卢卡的诞生，\n时间才开始流动。\n是有着这样传说的宝可梦。"
        zh_trad:
          brilliant_diamond: "擁有操縱時間的力量。\n在神奧地區被稱為神，\n並在神話中登場。"
          shining_pearl: "因為帝牙盧卡的誕生，\n時間才得以開始流動。\n是有著如此傳說的寶可夢。"
