          shining_pearl: "じゅもくや　こおりの　ひょうめんに\nするどい　ツメで　ふしぎな　もようを\nきざみ　なかまに　あいずを　おくる。"
        jp_kanji:
          brilliant_diamond: "寒い　地域で　暮らす　ポケモン。\n４、５匹の　グループは　見事な\n連係で　獲物を　追いつめる。"
          shining_pearl: "樹木や　氷の　表面に\n鋭い　ツメで　不思議な　模様を\n刻み　仲間に　合図を　送る。"
        en:
          brilliant_diamond: "They live in cold regions, forming groups\nof four or five that hunt prey with\nimpressive coordination."
          shining_pearl: "It sends signals to others of its kind by carving\nodd patterns on trees and ice."
        fr:
          brilliant_diamond: "Ces Pokémon vivent dans les régions froides.\nIls chassent par groupes de quatre ou cinq\nde façon très organisée."
          shining_pearl: "Il transmet des signaux à ses pairs\nen gravant d’étranges motifs dans\nla glace et les troncs d’arbres."
        it:
          brilliant_diamond: "Vivono in zone fredde in gruppi di quattro\no cinque. Abbattono le prede sfruttando\nla loro intesa perfetta."
          shining_pearl: "Lascia segnali per i suoi simili incidendo motivi\nmisteriosi sul ghiaccio e sui tronchi degli alberi."
        de:
          brilliant_diamond: "Es lebt in kalten Gebieten und formt Gruppen\nvon vier bis fünf Pokémon, welche bei der Jagd\nauf Beute eine perfekte Einheit bilden."
          shining_pearl: "Es kommuniziert mit Artgenossen, indem es mit\nseinen scharfen Klauen seltsame Muster in Bäume\nund Eis kratzt."
        es:
          brilliant_diamond: "Viven en zonas frías y forman grupos de cuatro o\ncinco para cazar con gran coordinación."
          shining_pearl: "Se comunica con otros miembros de su especie\ntallando extrañas marcas con las garras en los\ntroncos de los árboles o en el hielo."
        ko:
          brilliant_diamond: "추운 지역에서 사는 포켓몬이다.\n4, 5마리의 그룹은 훌륭한\n연계 작전으로 먹이를 몰아넣는다."
          shining_pearl: "수목이나 얼음의 표면에\n날카로운 발톱으로 이상한 무늬를 새겨\n동료에게 신호를 보낸다."
        zh_simp:
          brilliant_diamond: "生活在寒冷地方的宝可梦。\n４到５只组成一个团队，\n以出色的合作来追捕猎物。"
          shining_pearl: "会用锐利的爪子在树木和\n冰块表面刻下不可思议的图形，\n以此向伙伴传递暗号。"
        zh_trad:
          brilliant_diamond: "在寒冷地帶生活的寶可夢。\n會由４、５隻組成團隊，\n合作無間地追捕獵物。"
          shining_pearl: "會用爪子在樹或冰的\n表面留下奇妙的記號，\n藉此向夥伴傳遞暗號。"
