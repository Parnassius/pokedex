        jp_kana:
          brilliant_diamond: "からだから　はっする　はどうは\nこわいとき　かなしいときに　つよまり\nピンチを　なかまに　つたえる。"
          shining_pearl: "しなやかで　きょうじんな　からだ。\n３つの　やまと　２つの　たにを\nひとばんで　こえることが　できる。"
        jp_kanji:
          brilliant_diamond: "体から　発する　波動は\n怖いとき　悲しいときに　強まり\nピンチを　仲間に　伝える。"
          shining_pearl: "しなやかで　強靭な　体。\n３つの　山と　２つの　谷を\n一晩で　越えることが　できる。"
        en:
          brilliant_diamond: "The aura that emanates from its body intensifies\nto alert others if it is afraid or sad."
          shining_pearl: "Its body is lithe yet powerful. It can crest three\nmountains and cross two canyons in one night."
        fr:
          brilliant_diamond: "Lorsqu’il a peur ou qu’il est triste, son aura\ns’intensifie pour prévenir ses congénères."
          shining_pearl: "Son corps est souple et robuste.\nIl peut traverser trois montagnes\net deux vallées en une nuit."
        it:
          brilliant_diamond: "L’aura che emana si intensifica quando è triste\no spaventato, allertando così i suoi simili."
          shining_pearl: "Ha un corpo flessibile e robusto. Può scalare\ntre montagne e attraversare due valli in una\nsola notte."
        de:
          brilliant_diamond: "Riolu strahlt eine Aura aus, die sich verstärkt,\nwenn es Angst oder Trauer verspürt. Dadurch\nwerden seine Artgenossen bei Gefahr alarmiert."
          shining_pearl: "Sein geschmeidiger und zäher Körper ermöglicht\nes ihm, drei Berge und zwei Täler in einer Nacht\nzu überwinden."
        es:
          brilliant_diamond: "El aura que emana su cuerpo se intensifica para\nalertar a otros cuando está triste o tiene miedo."
          shining_pearl: "Su cuerpo es ágil pero fuerte. Puede subir tres\nmontañas y cruzar dos cañones en una noche."
        ko:
          brilliant_diamond: "몸에서 발산되는 파동은\n무서울 때나 슬플 때에 강해져\n동료에게 위기를 알린다."
          shining_pearl: "부드럽고 강인한 몸이다.\n3개의 산과 2개의 골짜기를\n하룻밤 사이에 넘을 수 있다."
        zh_simp:
          brilliant_diamond: "从体内发出的波导\n会在害怕或悲伤时变强，\n并向伙伴传递危险的信号。"
          shining_pearl: "身体既柔韧又强健。\n只要一个晚上就能翻过\n３座山头，越过２条峡谷。"
        zh_trad:
          brilliant_diamond: "從身體發出的波導\n會在害怕或悲傷時變強，\n將危機傳遞給夥伴。"
          shining_pearl: "身體柔韌且結實。\n一晚就能翻越\n３個山頭和２座山谷。"
lucario:
