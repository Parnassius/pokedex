          shining_pearl: "It squirms through the ground using its long and\nrugged body. It always eats while burrowing."
        fr:
          brilliant_diamond: "Quand il se creuse un chemin dans le sol,\nla terre se met à gronder et à trembler.\nIl se déplace à 80 km/h."
          shining_pearl: "Ce Pokémon se déplace sous terre en tortillant\nson long corps robuste. Il se nourrit en creusant."
        it:
          brilliant_diamond: "Si muove sottoterra provocando scosse e boati.\nPuò raggiungere anche una velocità di 80 km/h."
          shining_pearl: "Avanza sottoterra contorcendo il suo corpo lungo\ne robusto. Scava mangiando di continuo."
        de:
          brilliant_diamond: "Wenn es sich mit bis zu 80 km/h durch den\nErdboden gräbt, verursacht es lautes Dröhnen\nund Erschütterungen."
          shining_pearl: "Es bohrt seinen langen und schroffen Körper mit\nDrehbewegungen durchs Erdreich und nimmt\ndabei ununterbrochen Nahrung auf."
        es:
          brilliant_diamond: "Cuando viaja bajo tierra, causa temblores y\nestruendo. Se puede mover a 80 km/h."
          shining_pearl: "Se alimenta sin cesar a medida que se abre paso\nbajo tierra retorciendo su robusto y largo cuerpo."
        ko:
          brilliant_diamond: "롱스톤이 땅속을 뚫고 나아가면\n땅울림이 들리며 지면이 흔들린다.\n이동 속도는 시속 80km."
          shining_pearl: "튼튼하고 긴 몸을\n비틀며 땅속을 나아간다.\n구멍을 파면서 계속 먹이를 먹는다."
        zh_simp:
          brilliant_diamond: "大岩蛇在地下挖洞前进时，\n大地会不停晃动并能听到轰鸣声。\n其移动速度高达时速８０公里。"
          shining_pearl: "扭动又长又结实的\n身体在地下前进。\n会一边挖掘一边进食。"
        zh_trad:
          brilliant_diamond: "當大岩蛇在地底挖掘前進時，就會\n聽見地鳴聲，並感受到地面在搖晃。\n移動速度為時速８０公里。"
          shining_pearl: "扭動長而結實的身體\n在地底挖掘前進。\n會一邊挖掘一邊進食。"
