          shining_pearl: "Disliking sunlight, it sleeps deep in forests and\ncaves until sundown."
        fr:
          brilliant_diamond: "Dépourvu d’yeux, il détecte les obstacles\nalentour grâce à ses cris ultrasoniques."
          shining_pearl: "Il se tapit dans les profondeurs des grottes\nou des forêts pour dormir jusqu’à la tombée\nde la nuit, car il n’aime pas la lumière du soleil."
        it:
          brilliant_diamond: "Non ha occhi, ma avverte gli ostacoli con le onde\nultrasoniche che emette dalla bocca."
          shining_pearl: "Non ama la luce solare, pertanto si nasconde\nnel fitto delle foreste e nelle grotte fino\nal tramonto."
        de:
          brilliant_diamond: "Zubat hat zwar keine Augen, kann jedoch mithilfe\nvon Ultraschallwellen, die es aus dem Mund\naussendet, Hindernisse erspüren."
          shining_pearl: "Da es Sonnenlicht nicht ausstehen kann, schläft\nes bis zum Sonnenuntergang in Höhlen oder tief\nim Waldesinneren."
        es:
          brilliant_diamond: "Aunque carezca de ojos, puede detectar\nobstáculos con las ondas ultrasónicas que\nemite por la boca."
          shining_pearl: "No le gusta el sol, por lo que permanece\ndormido en bosques y cuevas hasta el anochecer."
        ko:
          brilliant_diamond: "입에서 내는 초음파로\n두 눈이 없어도 주위의\n장애물을 탐색할 수 있다."
          shining_pearl: "태양 빛을 싫어한다.\n날이 저물 때까지 동굴이나\n숲속 깊은 곳에서 잠잔다."
        zh_simp:
          brilliant_diamond: "即使没有双眼，\n也能靠嘴里发出的超音波\n探察周围的障碍物。"
          shining_pearl: "讨厌太阳光，会在\n洞窟里或森林深处\n一直睡到太阳下山。"
        zh_trad:
          brilliant_diamond: "靠著口中發出的超音波，\n就算沒有雙眼也能\n探查周圍的障礙物。"
          shining_pearl: "討厭太陽光。會一直在\n洞窟或森林深處睡覺，\n直到太陽下山。"
