          shining_pearl: "ぜんしんが　がんじょうな　こうらで\nおおわれている。あたまが　１８０ど\nかいてんするので　しかくが　ない。"
        jp_kanji:
          brilliant_diamond: "両腕の　ツメは　自動車を\nスクラップにする　破壊力。\nツメの　先から　毒を　出す。"
          shining_pearl: "全身が　頑丈な　甲羅で\n覆われている。頭が１８０度\n回転するので　死角が　ない。"
        en:
          brilliant_diamond: "It has the power in its clawed arms to make scrap\nof a car. The tips of its claws release poison."
          shining_pearl: "Its body is encased in a sturdy shell. Its head\nrotates 180 degrees, eliminating blind spots."
        fr:
          brilliant_diamond: "Il sécrète du poison par l’extrémité de\nses crochets. Ceux de ses bras sont assez\npuissants pour réduire une voiture en pièces."
          shining_pearl: "Son corps est recouvert d’une carapace robuste.\nGrâce à sa tête qui pivote à 180 degrés, il peut\nvoir dans toutes les directions."
        it:
          brilliant_diamond: "Con le braccia può accartocciare una macchina.\nLe punte degli artigli sono velenose."
          shining_pearl: "Il suo corpo è protetto da un robusto carapace.\nÈ capace di ruotare la testa di 180 gradi,\neliminando ogni punto morto."
        de:
          brilliant_diamond: "Die zerstörerischen Klauen an seinen Armen\nkönnen nicht nur Autos demolieren, sondern\nsetzen außerdem über ihre Enden Gift frei."
          shining_pearl: "Ein robuster Panzer umgibt seinen Körper. Da es\nden Kopf um 180 Grad drehen kann, weist sein\nBlickfeld keine toten Winkel auf."
        es:
          brilliant_diamond: "Tiene tal fuerza en los brazos que puede\ndestrozar un coche. Segrega veneno por la\npunta de las zarpas."
          shining_pearl: "Todo su cuerpo está recubierto por un robusto\nexoesqueleto. Puede rotar el torso 180º, lo que\nle permite ver en todas direcciones."
        ko:
          brilliant_diamond: "양팔의 발톱은 자동차를\n동강 내는 파괴력이 있다.\n발톱의 끝에서 독을 뿌린다."
          shining_pearl: "전신이 튼튼한 껍질로\n덮여 있다. 머리가 180도\n회전하므로 사각이 없다."
        zh_simp:
          brilliant_diamond: "双臂的钩爪有着能把\n汽车扯成废铁的破坏力。\n会从钩爪的前端放出毒素。"
          shining_pearl: "全身都覆盖有坚硬的甲壳。\n头部可以旋转１８０度，\n在它面前不存在死角。"
        zh_trad:
          brilliant_diamond: "雙臂的鉤爪有著能把\n汽車扯成廢鐵的破壞力。\n會從鉤爪的前端放出毒素。"
          shining_pearl: "全身被堅硬的甲殼覆蓋著。\n頭部可以１８０度旋轉，\n因此沒有任何死角。"
