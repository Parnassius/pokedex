      descriptions:
        jp_kana:
          brilliant_diamond: "いっぱつで　きぜつさせるほどの\nでんりゅうを　ツメから　ながす。\nすうひきの　グループで　くらす。"
          shining_pearl: "まえあしで　なかまの　からだに\nふれる。ツメから　ながす　でんきの\nリズムで　きもちを　つたえるのだ。"
        jp_kanji:
          brilliant_diamond: "１発で　気絶させるほどの　電流を\nツメから　流す。\n数匹の　グループで　暮らす。"
          shining_pearl: "前足で　仲間の　体に\n触れる。ツメから　流す　電気の\nリズムで　気持ちを　伝えるのだ。"
        en:
          brilliant_diamond: "Its claws loose electricity with enough\namperage to cause opponents to faint.\nIt lives in small groups."
          shining_pearl: "It rests its forelegs on others to communicate\nwith rhythmic electric pulses from its claws."
        fr:
          brilliant_diamond: "L’électricité libérée par ses griffes peut assommer\nses ennemis en un coup. Il vit en petits groupes."
          shining_pearl: "Il communique en posant ses pattes avant\nsur ses pairs et en émettant des impulsions\nélectriques rythmées avec ses griffes."
        it:
          brilliant_diamond: "Rilascia dagli artigli una corrente elettrica\ntalmente intensa da mandare KO il nemico\nin un colpo solo. Vive in piccoli branchi."
          shining_pearl: "Tocca il corpo dei suoi simili per comunicare con\nloro mediante gli impulsi elettrici ritmici emessi\ndagli artigli anteriori."
        de:
          brilliant_diamond: "Ein Schlag mit seinen elektrisch geladenen Krallen\nreicht aus, um jemanden bewusstlos zu machen.\nEs lebt mit Artgenossen in kleinen Gruppen."
          shining_pearl: "Es berührt Artgenossen mit seinen Vorderbeinen\nund teilt diesen seine Gefühle über rhythmische\nStromstöße aus seinen Krallen mit."
        es:
          brilliant_diamond: "Sus garras emiten electricidad con tal intensidad\nque puede debilitar a sus rivales. Viven en grupos\npequeños."
          shining_pearl: "Para comunicarse entre sí, se tocan con las patas\ndelanteras y transmiten pulsos eléctricos con las\ngarras."
        ko:
          brilliant_diamond: "발톱에서는 한 방에 적을\n기절시킬 정도로 강한 전류가 흘러나온다.\n여러 마리가 그룹을 이루어 산다."
          shining_pearl: "앞발로 동료의 몸에 접촉한다.\n발톱에서 흐르는 전기의 리듬으로\n자신의 기분을 전달한다."
        zh_simp:
          brilliant_diamond: "从爪子释放出一击就能\n令人晕厥的电流。\n由数只组成团队生活。"
          shining_pearl: "会用前脚碰触伙伴的身体。\n通过从爪子流出的电流节奏\n来传递自己的心情。"
        zh_trad:
          brilliant_diamond: "從爪子釋放出足以\n一擊令人暈厥的電流。\n平時由數隻組成群體來生活。"
          shining_pearl: "會用前腳觸碰夥伴的身體。\n靠著從爪子流出的電流節奏\n來傳達自己的心情。"
