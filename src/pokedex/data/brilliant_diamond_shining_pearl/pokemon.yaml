        fr:
          brilliant_diamond: "Il devient agressif lorsque son corps emmagasine\ntrop d’électricité. Il laisse alors cette électricité\ns’échapper par sa queue."
          shining_pearl: "Il envoie des décharges de 100 000 volts, ce qui\nlui permet de mettre au tapis des ennemis bien\nplus imposants que lui en une seule attaque."
        it:
          brilliant_diamond: "Se il suo corpo accumula troppa energia elettrica,\ndiventa aggressivo. Scarica l’elettricità dalla coda."
          shining_pearl: "Può rilasciare scariche elettriche da 100.000 volt\nin grado di far perdere i sensi a nemici diverse\nvolte più grandi di lui."
        de:
          brilliant_diamond: "Sammelt sich zu viel Elektrizität in seinem Körper\nan, wird es aggressiv. Es entlädt sich dann über\nseinen Schweif."
