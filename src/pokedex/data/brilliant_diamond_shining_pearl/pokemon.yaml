          shining_pearl: "１キロ先で　落ちた　針の　音も\n聞き分ける　優れた　耳を　持つ。\n静かな　山奥に　住んでいる。"
        en:
          brilliant_diamond: "Rarely seen by people, it is said to be drawn by\nthe full moon to play at deserted lakes."
          shining_pearl: "Its hearing is so acute it can hear a pin drop over\nhalf a mile away. It lives on quiet mountains."
        fr:
          brilliant_diamond: "Ce Pokémon ne se montre que rarement.\nIl paraît que la pleine lune l’incite à aller\njouer au bord des lacs peu fréquentés."
          shining_pearl: "Il vit dans le calme des montagnes reculées.\nSon ouïe exceptionnelle lui permet d’entendre\nle bruit d’une aiguille qui tombe à 1 km."
        it:
          brilliant_diamond: "Si vedono molto raramente. Si dice che nelle\nnotti di luna piena vadano a giocare in prossimità\ndi laghi deserti."
          shining_pearl: "Ha un udito tanto acuto da sentire la caduta\ndi uno spillo a 1 km di distanza. Vive nella\ntranquillità dei monti."
        de:
          brilliant_diamond: "Man bekommt es nur selten zu sehen.\nBei Vollmond soll es an den Ufern einsam\ngelegener Seen spielen."
          shining_pearl: "Mit seinem ausgezeichneten Gehör kann es sogar\neine Nadel ausmachen, die in 1 km Entfernung\nzu Boden fällt. Es lebt in der Stille der Berge."
        es:
          brilliant_diamond: "Rara vez se lo ve. Dicen que en noches de luna\nllena sale a jugar en lagos solitarios."
          shining_pearl: "Su oído es tan agudo que puede oír una aguja\ncaer a 1 km. Vive en montañas solitarias."
        ko:
          brilliant_diamond: "거의 모습을 드러내지 않는다.\n보름달에 이끌려 인적 없는\n호수에서 논다고 전해진다."
          shining_pearl: "1km 전방에 떨어진 바늘 소리도\n분간할 수 있는 우수한 귀를 가지고 있다.\n조용한 산속에 살고 있다."
        zh_simp:
          brilliant_diamond: "极少在人类面前现身。\n据说会被满月所吸引，\n来到杳无人影的湖上玩耍。"
          shining_pearl: "有着连１公里外针落地的声音\n都能听见的优秀耳朵。\n住在宁静的深山里。"
        zh_trad:
          brilliant_diamond: "很少在人們面前現身。\n據說會被滿月吸引，\n在杳無人煙的湖泊玩耍。"
          shining_pearl: "有著連１公里外針落地的聲音\n都聽得到的優秀耳朵。\n住在寧靜的深山裡。"
