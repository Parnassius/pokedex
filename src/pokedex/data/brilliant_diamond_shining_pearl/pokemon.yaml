  names:
    jp_kana: ミミロップ
    jp_kanji: ミミロップ
    en: Lopunny
    fr: Lockpin
    it: Lopunny
    de: Schlapor
    es: Lopunny
    ko: 이어롭
    zh_simp: 长耳兔
    zh_trad: 長耳兔
