          shining_pearl: "When the temperature cools in the evening,\nthey emerge from water to seek food along\nthe shore."
        fr:
          brilliant_diamond: "Il vit en eaux froides et dort à moitié enfoui\ndans la boue des profondeurs."
          shining_pearl: "Il émerge de l’eau en fin de journée,\nlorsque l’air se rafraîchit, pour aller\nchasser sur les berges."
        it:
          brilliant_diamond: "Vive nell’acqua fredda e quando vuole dormire\nsi seppellisce a metà nei fondali melmosi."
          shining_pearl: "Attende la sera, quando scende la temperatura,\nper avventurarsi sulla riva alla ricerca di cibo."
        de:
          brilliant_diamond: "Dieses Pokémon lebt in kaltem Wasser.\nZum Schlafen gräbt es die Hälfte seines\nKörpers im schlammigen Grund ein."
          shining_pearl: "Wenn es abends kühler wird, kommt es an Land,\num das Ufer nach Nahrung abzusuchen."
        es:
          brilliant_diamond: "Vive en aguas frías. Para dormir, entierra la mitad\ndel cuerpo en el cieno del fondo."
          shining_pearl: "Cuando la temperatura baja por la tarde, se ve\na los Wooper salir del agua y pasear por la orilla\nen busca de alimento."
        ko:
          brilliant_diamond: "차가운 물속에 산다.\n물 밑바닥의 진흙에\n몸을 반쯤 묻고 잠잔다."
          shining_pearl: "해질녘 시원해지면\n물에서 올라온 우파들은\n먹이를 찾으러 물가를 걷는다."
        zh_simp:
          brilliant_diamond: "栖息在冰冷的水中。\n睡觉时会把一半身体\n埋进水底的泥里面。"
          shining_pearl: "傍晚天气变凉之后，\n乌波们就会从水里上来，\n走在水边觅食。"
        zh_trad:
          brilliant_diamond: "在冰冷的水中生活。\n會把一半身體埋在\n水底的泥巴裡睡覺。"
          shining_pearl: "傍晚天氣變涼時，\n烏波們就會從水中上來，\n走在水邊覓食。"
