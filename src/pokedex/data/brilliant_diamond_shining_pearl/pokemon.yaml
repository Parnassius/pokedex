          shining_pearl: "みずくさに　そっくりな　ポケモン。\nおよげない　ポケモンを　はっぱに\nのせて　むこうぎしまで　はこぶ。"
        jp_kanji:
          brilliant_diamond: "水草に　そっくりな　ポケモン。\n泳げない　ポケモンを　葉っぱに\n乗せて　向こう岸まで　運ぶ。"
          shining_pearl: "水草に　そっくりな　ポケモン。\n泳げない　ポケモンを　葉っぱに\n乗せて　向こう岸まで　運ぶ。"
