          shining_pearl: "Caché dans un coin sombre de la pièce,\nil guette l’occasion d’ôter la vie à ses proies."
        it:
          brilliant_diamond: "Si nasconde nell’ombra. Pare che nei luoghi\nin cui Gengar si cela, la temperatura si abbassi\ndi 5 ºC."
          shining_pearl: "Si cela negli angoli bui delle stanze e aspetta\nl’opportunità di sottrarre vitalità alle prede."
        de:
          brilliant_diamond: "Es versteckt sich in den Schatten. Man sagt, dass\ndie Raumtemperatur um 5 ºC sinkt, wenn sich ein\nGengar im Zimmer verbirgt."
          shining_pearl: "In dunklen Zimmerecken lauert es Beute auf und\nwartet auf den richtigen Zeitpunkt, um ihr die\nLebenskraft zu rauben."
        es:
          brilliant_diamond: "Se esconde entre las sombras. Dicen que la\ntemperatura baja 5 ºC allí donde acecha."
          shining_pearl: "Acecha en las esquinas oscuras a la espera de\nuna oportunidad para arrebatarle la vida a su\npresa."
        ko:
          brilliant_diamond: "그림자에 모습을 숨긴다.\n팬텀이 숨어 있는 방은\n온도가 5도 내려간다고 전해진다."
          shining_pearl: "방구석에 생긴 그늘진 곳에서\n생명을 빼앗을 타이밍을\n가만히 살피고 있다."
        zh_simp:
          brilliant_diamond: "会隐藏在物体的阴影里。\n据说躲着耿鬼的房间\n温度会下降５度。"
          shining_pearl: "它会潜藏在房屋角落的\n阴暗处，悄悄地窥探着\n夺取性命的时机。"
        zh_trad:
          brilliant_diamond: "會隱藏在陰暗之處。\n據說在耿鬼躲著的房間\n溫度會下降５度。"
          shining_pearl: "牠會靜靜地潛伏在\n房屋角落的陰暗處，\n伺機奪走生命。"
