        fr:
          brilliant_diamond: "Sa couleur et sa silhouette varient\nselon les régions. On en recense\ndeux types à Sinnoh."
          shining_pearl: "Il vit au bord de l’eau. Sa morphologie a changé\npour s’adapter à son environnement."
        it:
          brilliant_diamond: "La sua forma e il suo colore variano a seconda\ndel suo habitat. Nella regione di Sinnoh è stata\nconfermata la presenza di due tipologie diverse."
          shining_pearl: "Vive in prossimità dell’acqua. La forma del suo\ncorpo è mutata per adattarsi all’habitat."
        de:
          brilliant_diamond: "Form und Farbe dieses Pokémon unterscheiden\nsich je nach Habitat. In Sinnoh wurden zwei\nVarianten nachgewiesen."
          shining_pearl: "Die Körperform dieses in Ufernähe beheimateten\nPokémon hat sich seinem Habitat angepasst."
        es:
          brilliant_diamond: "El color y la forma cambian según la región.\nEn Sinnoh, hay dos variantes confirmadas."
          shining_pearl: "Vive cerca del agua. La forma de su cuerpo ha\ncambiado para adaptarse al hábitat."
