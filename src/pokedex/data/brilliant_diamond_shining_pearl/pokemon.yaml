          shining_pearl: "いちげきで　でんしゃを　ふっとばす\nパンチを　くりだすが　ゆびさきを\nつかう　しごとは　とても　にがて。"
        jp_kanji:
          brilliant_diamond: "４本の　腕を　目にも留まらぬ\n速さで　動かし　２秒間に\n１０００発の　パンチを　繰り出す。"
          shining_pearl: "一撃で　電車を　吹っ飛ばす\nパンチを　繰り出すが　指先を\n使う　仕事は　とても　苦手。"
        en:
          brilliant_diamond: "It punches with its four arms at blinding speed.\nIt can launch 1,000 punches in two seconds."
          shining_pearl: "It can knock a train flying with a punch. However,\nit is terrible at delicate work using its fingers."
        fr:
          brilliant_diamond: "Ses quatre bras bougent si vite qu’on ne distingue\npas leurs mouvements. Il est capable de porter\nmille coups en deux secondes."
          shining_pearl: "Il peut envoyer valser un train d’un simple coup\nde poing, mais les tâches qui requièrent l’usage\nde ses doigts lui donnent du fil à retordre."
        it:
          brilliant_diamond: "Tira pugni con le quattro braccia a una velocità\nimpressionante. Ne sferra 1.000 ogni 2 secondi."
          shining_pearl: "Con un pugno può scaraventare in aria un treno,\nma è maldestro nei lavori manuali di precisione."
        de:
          brilliant_diamond: "Es bewegt seine vier Arme so schnell, dass es in\nzwei Sekunden 1 000 Schläge austeilen kann."
          shining_pearl: "Es kann einen Zug mit einem Schlag entgleisen\nlassen. Arbeiten, die Fingerfertigkeit erfordern,\nliegen ihm hingegen überhaupt nicht."
        es:
          brilliant_diamond: "Mueve sus cuatro brazos a tal velocidad que\nresultan imposibles de ver. Puede asestar hasta\nmil puñetazos en dos segundos."
          shining_pearl: "Propina tales puñetazos que es capaz de lanzar\nun tren por los aires de un solo golpe, pero es\nincapaz de realizar trabajos delicados."
        ko:
          brilliant_diamond: "4개의 팔을 눈에 보이지 않을 정도로\n빠르게 움직여 2초간\n1000발의 펀치를 날린다."
          shining_pearl: "일격에 기차를 날려 버리는\n강력한 펀치를 쓰지만 손끝을\n사용하는 일은 무척 서투르다."
        zh_simp:
          brilliant_diamond: "能用快到看不清的\n速度挥动４条手臂，\n在２秒内打出１０００拳。"
          shining_pearl: "虽然它能使出只要一击就能\n打飞电车的拳击，但却很不擅长\n需要用到手指的工作。"
        zh_trad:
          brilliant_diamond: "能夠用迅雷不及掩耳的\n速度活動４隻手臂，\n在２秒內打出１０００拳。"
          shining_pearl: "雖然牠的拳擊擁有一發就能\n打飛電車的威力，但卻相當\n不擅長需要用到手指的工作。"
