        en:
          brilliant_diamond: "Roselia raised on clean drinking water are known\nto grow vividly colored flowers."
          shining_pearl: "The beautiful flowers on its arms have toxic\nthorns. Don’t even think about picking\nthose flowers."
        fr:
          brilliant_diamond: "Les Rosélia nourris à l’eau claire sont célèbres\npour leurs ravissantes fleurs aux couleurs vives."
          shining_pearl: "Les belles fleurs à l’extrémité de ses bras\nsont dotées d’épines toxiques.\nIl ne faut donc surtout pas les cueillir."
        it:
          brilliant_diamond: "È risaputo che i Roselia cresciuti bevendo acqua\npulita facciano sbocciare fiori dai vividi colori."
          shining_pearl: "I bellissimi fiori sulle sue braccia possiedono\nspine velenose. Non pensateci nemmeno a\nprovare a raccoglierli!"
        de:
          brilliant_diamond: "Roselia, die mit klarem Wasser aufgezogen\nwurden, sind für ihre Blüten bekannt, die in\nleuchtenden Farben erstrahlen."
          shining_pearl: "Man sollte sich davor hüten, die schönen Blumen\nan seinen Armen zu pflücken, denn sie sind mit\ngiftigen Dornen gespickt."
        es:
          brilliant_diamond: "Es conocido por sus flores de vivos colores, que\nle brotan cuando se alimenta de aguas limpias."
          shining_pearl: "Las hermosas flores de sus brazos tienen espinas\ntóxicas, por lo que no conviene intentar cogerlas."
        ko:
          brilliant_diamond: "맑은 물을 마시고 자란\n로젤리아는 산뜻한 색상의 꽃을\n피우는 것으로 알려져 있다."
          shining_pearl: "양팔에 달려 있는 예쁜 꽃에는\n맹독의 가시가 있다.\n꽃을 따려고 생각하면 안 된다."
        zh_simp:
          brilliant_diamond: "喝着清净的水\n长大的毒蔷薇因开出\n色彩鲜艳的花朵而闻名。"
          shining_pearl: "双臂上美丽的花朵\n带有剧毒的尖刺。\n千万别想要摘下它的花朵。"
        zh_trad:
          brilliant_diamond: "喝下乾淨的水長大的\n毒薔薇，以會綻放色彩\n鮮豔的花朵而聞名。"
          shining_pearl: "兩條手臂上的美麗花朵中\n藏著帶有劇毒的尖刺。\n千萬別想要摘下牠的花朵。"
