          shining_pearl: "A group of Poliwag and Poliwhirl will form with\na Politoed as the leader. Politoed’s cries make\nthe Pokémon of the group obey."
        fr:
          brilliant_diamond: "Tarpaud est choisi comme chef par des groupes\nde Ptitard et Têtarte. Ces derniers obéissent\nà ses cris."
          shining_pearl: "Tarpaud est choisi comme chef par des groupes\nde Ptitard et Têtarte. Ces derniers obéissent\nà ses cris."
        it:
          brilliant_diamond: "Raduna altri Pokémon, atteggiandosi a loro\ncapogruppo. I suoi versi gli permettono di\ncomandare i Poliwag e i Poliwhirl."
          shining_pearl: "Raduna altri Pokémon, atteggiandosi a loro\ncapogruppo. I suoi versi gli permettono di\ncomandare i Poliwag e i Poliwhirl."
        de:
          brilliant_diamond: "Es führt eine Gruppe aus Quapsel und Quaputzi\nan, die alle seinem Ruf gehorchen."
          shining_pearl: "Es führt eine Gruppe aus Quapsel und Quaputzi\nan, die alle seinem Ruf gehorchen."
        es:
          brilliant_diamond: "Reúne a varios Poliwag y Poliwhirl y se erige\ncomo su líder. Todos los miembros del grupo\nobedecen sus gritos."
          shining_pearl: "Reúne a varios Poliwag y Poliwhirl y se erige\ncomo su líder. Todos los miembros del grupo\nobedecen sus gritos."
        ko:
          brilliant_diamond: "왕구리를 리더로 해서 그룹이\n만들어진다. 왕구리의 울음소리가\n발챙이들을 따르게 한다."
          shining_pearl: "왕구리를 리더로 해서 그룹이\n만들어진다. 왕구리의 울음소리가\n발챙이들을 따르게 한다."
        zh_simp:
          brilliant_diamond: "以蚊香蛙皇为头领组成团队。\n蚊香蛙皇的叫声能让\n蚊香蝌蚪们都对它服服帖帖。"
          shining_pearl: "以蚊香蛙皇为头领组成团队。\n蚊香蛙皇的叫声能让\n蚊香蝌蚪们都对它服服帖帖。"
