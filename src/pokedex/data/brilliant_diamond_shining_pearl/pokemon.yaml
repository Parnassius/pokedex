      descriptions:
        jp_kana:
          brilliant_diamond: "なみが　おだやかな　ときは\nおおうなばらを　とぶように　およぐ\nマンタインの　むれに　そうぐうする。"
          shining_pearl: "おおきな　ヒレに　テッポウオを\nくっつけたまま　ゆうがに　およぐ。\nおとなしい　せいかくの　ポケモン。"
        jp_kanji:
          brilliant_diamond: "波が　穏やかな　ときは\n大海原を　飛ぶように　泳ぐ\nマンタインの　群れに　遭遇する。"
          shining_pearl: "大きな　ヒレに　テッポウオを\nくっつけたまま　優雅に　泳ぐ。\n大人しい　性格の　ポケモン。"
        en:
          brilliant_diamond: "When the waves are calm, one may encounter\na swarm of Mantine swimming as if they are\nin flight."
          shining_pearl: "It swims elegantly, mindless of Remoraid hitching\nonto its broad fins. It is naturally docile."
        fr:
          brilliant_diamond: "Lorsque la mer est calme, on peut croiser\nun banc de Démanta en train de nager\ncomme s’ils volaient."
          shining_pearl: "Ce Pokémon de nature docile nage avec\nélégance, accompagné d’un Rémoraid\ncollé à l’une de ses grandes nageoires."
        it:
          brilliant_diamond: "Quando il mare è calmo, è possibile vedere\nbranchi di Mantine nuotare leggiadri come se\nvolassero."
          shining_pearl: "Nuota elegantemente, incurante del Remoraid\nattaccato alle sue ampie pinne.\nHa un’indole docile."
        de:
          brilliant_diamond: "Bei ruhigem Wellengang erblickt man mitunter\neinen Schwarm von Mantax, die im weiten Meer\nschwimmen, als würden sie fliegen."
          shining_pearl: "Unbeeindruckt von Remoraid, die sich an seine\nFlossen geheftet haben, zieht dieses gutmütige\nPokémon im Meer elegant seine Bahnen."
        es:
          brilliant_diamond: "Cuando el mar está en calma, se pueden ver\nbancos de Mantine nadando como si volasen."
          shining_pearl: "Este Pokémon de carácter dócil nada con suma\nelegancia con un Remoraid aferrado a una de sus\ngrandes aletas."
        ko:
          brilliant_diamond: "파도가 조용할 때는\n드넓은 창해를 나는 듯이 헤엄치는\n만타인의 무리와 조우한다."
          shining_pearl: "큰 지느러미에 총어를 붙인 채로\n우아하게 헤엄친다.\n얌전한 성격의 포켓몬이다."
        zh_simp:
          brilliant_diamond: "风平浪静的时候，\n你可能会遭遇到在大海里\n游得飞快的巨翅飞鱼群。"
          shining_pearl: "并不在意大大的鳍上吸附着\n铁炮鱼，在水中优雅地游泳。\n是种性格温顺的宝可梦。"
        zh_trad:
          brilliant_diamond: "風平浪靜的時候\n會遇見像飛一樣地暢游在\n汪洋大海上的巨翅飛魚群。"
          shining_pearl: "會任憑鐵炮魚吸附在牠大大的\n鰭上，在水中優雅地游泳。\n是種性情溫馴的寶可夢。"
