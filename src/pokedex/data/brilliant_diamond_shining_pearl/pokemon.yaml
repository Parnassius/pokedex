          shining_pearl: "식물과 똑 닮은 포켓몬이다.\n방심해서 가까이 다가온 먹이에게\n독가루를 뿌려서 잡는다."
        zh_simp:
          brilliant_diamond: "看上去和植物毫无分别的宝可梦。\n会向疏忽靠近的猎物喷出\n有毒的粉末来捕捉对方。"
          shining_pearl: "看上去和植物毫无分别的宝可梦。\n会向疏忽靠近的猎物喷出\n有毒的粉末来捕捉对方。"
