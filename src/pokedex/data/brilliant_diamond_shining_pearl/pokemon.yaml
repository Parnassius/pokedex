          shining_pearl: "きの　ふりをして　みちばたに\nたっているが　あめが　ふってくると\nいつのまにか　すがたを　けす。"
        jp_kanji:
          brilliant_diamond: "樹木の　ように　見える　体は\nじつは　岩や　石に　近い。\n水には　めっぽう　弱いのだ。"
          shining_pearl: "木の　ふりをして　道端に\n立っているが　雨が　降ってくると\nいつの間にか　姿を　消す。"
        en:
          brilliant_diamond: "Though it looks like a tree, its body is actually\nmore like rock or stone. The Pokémon is very\nweak to water."
          shining_pearl: "It stands along paths pretending to be a tree.\nIf it starts raining, it seems to disappear."
        fr:
          brilliant_diamond: "Bien qu’il ressemble à un arbre, la composition\nde son corps est proche de celle de la pierre.\nIl est très sensible à l’eau."
          shining_pearl: "Il borde les chemins en se faisant passer pour\nun arbre, mais il disparaît soudainement quand\nil se met à pleuvoir."
        it:
          brilliant_diamond: "Ha l’aspetto di un albero, ma il suo corpo\nè più simile alla roccia o alla pietra.\nNon sopporta l’acqua."
          shining_pearl: "Si piazza lungo le strade fingendosi un albero,\nma scompare non appena comincia a piovere."
        de:
          brilliant_diamond: "Es mag aussehen wie ein Baum, doch sein Körper\nbesitzt eher die Beschaffenheit von Felsgestein,\nweshalb es sehr schwach gegenüber Wasser ist."
          shining_pearl: "Es steht am Wegesrand und tut so, als sei es ein\nBaum. Doch kaum beginnt es zu regnen, nimmt\nes fluchtartig Reißaus."
        es:
          brilliant_diamond: "Aunque parezca un árbol, su cuerpo se asemeja\nmás a las rocas y piedras. Es débil frente al agua."
          shining_pearl: "Se planta junto a los caminos fingiendo ser un\nárbol, pero desaparece en cuanto empieza a\nllover."
        ko:
          brilliant_diamond: "수목처럼 보이는 몸은\n실제로는 바위나 돌에 가깝다.\n물에는 대단히 약하다."
          shining_pearl: "나무인 척하며 길가에\n서 있지만 비가 내리면\n어느 사이엔가 모습을 감춘다."
        zh_simp:
          brilliant_diamond: "虽然身体看上去像树木，\n但其实更接近石头或岩石。\n对水完全没有抵抗力。"
          shining_pearl: "会伪装成树的样子站在路边，\n如果天上开始下雨，\n就会在不知不觉间消失不见。"
        zh_trad:
          brilliant_diamond: "看起來像是樹木的身體，\n實際上更接近石頭或岩石。\n對水完全沒有抵抗力。"
          shining_pearl: "總是偽裝成樹的樣子站在路邊。\n只要一開始下雨，就會在\n不知不覺間消失無蹤。"
