          shining_pearl: "Las hojas que tiene en los brazos son tan afiladas\nque pueden cortar gruesos árboles. Es invencible\ncuando combate en la selva."
        ko:
          brilliant_diamond: "팔에 자란 잎사귀는 큰 나무도\n싹둑 베어 넘어뜨릴 정도다.\n밀림의 싸움에서는 무적이다."
          shining_pearl: "팔에 자란 잎사귀는 큰 나무도\n싹둑 베어 넘어뜨릴 정도다.\n밀림의 싸움에서는 무적이다."
        zh_simp:
          brilliant_diamond: "手臂上长出的叶子锋利得\n连大树都能“唰”地一刀砍倒。\n在密林中战斗无人能敌。"
