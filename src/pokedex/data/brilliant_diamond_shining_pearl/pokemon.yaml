        fr:
          brilliant_diamond: "Grâce à la haute pression et à la température\nélevée des souterrains, son corps est devenu\nplus dur que le métal."
          shining_pearl: "Ses mâchoires robustes lui permettent de\nse frayer un chemin à travers la pierre, et ses\nyeux de voir dans l’obscurité des souterrains."
        it:
          brilliant_diamond: "Il suo corpo, temprato dalla pressione\ne dal calore sotterranei, è più duro\ndi qualsiasi metallo."
          shining_pearl: "Distrugge le rocce con le mascelle robuste\nper farsi strada. I suoi occhi riescono a vedere\nnell’oscurità sotterranea."
        de:
          brilliant_diamond: "Der hohe Druck und die Hitze unter der Erde\nhaben seinen Körper derart abgehärtet, dass er\nhärter als jedes Metall wurde."
          shining_pearl: "Mit den kräftigen Kiefern beißt es sich seinen\nWeg durchs Felsgestein. Es kann selbst in der\nunterirdischen Dunkelheit noch sehen."
        es:
          brilliant_diamond: "Su cuerpo es más duro que cualquier metal\ndebido a la gran presión y al calor a los que\nestá sometido en el interior de la tierra."
          shining_pearl: "Con su potente mandíbula, se abre paso entre\nlas rocas a mordisco limpio. Sus ojos le permiten\nver en la oscuridad del subsuelo."
        ko:
          brilliant_diamond: "땅속의 높은 압력과\n열로 단련된 몸은\n어떠한 금속보다도 단단하다."
          shining_pearl: "튼튼한 턱으로 암석을 깨물어 부수고\n나아간다. 아주 캄캄한 땅속에서도\n보이는 눈을 가지고 있다."
        zh_simp:
          brilliant_diamond: "由地下高压和高热\n锻炼出来的身体\n比任何金属都要坚硬。"
          shining_pearl: "会用结实的颚咬碎岩石前进。\n有着即使是在漆黑的地下\n也能看清东西的眼睛。"
        zh_trad:
