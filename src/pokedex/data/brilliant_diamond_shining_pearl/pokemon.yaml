          shining_pearl: "Dieses Pokémon, das mit den Hörnern auf seinem\nKopf menschliche Gefühle wahrnimmt, zeigt sich\nangeblich nur fröhlichen Menschen."
        es:
          brilliant_diamond: "Percibe las emociones humanas gracias a los\ncuernos. Dicen que se aparece a la gente alegre."
          shining_pearl: "Percibe las emociones humanas gracias a los\ncuernos. Dicen que se aparece a la gente alegre."
        ko:
