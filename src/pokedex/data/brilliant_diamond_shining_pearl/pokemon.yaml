          shining_pearl: "すいじょうオートバイなみの　そくどで\nおよぐ。　つばさの　へりは　するどく\nりゅうひょうを　せつだんする。"
        jp_kanji:
          brilliant_diamond: "クチバシから　伸びている　３本の\nツノは　強さの　象徴。\nリーダーが　一番　大きい。"
          shining_pearl: "水上オートバイ並みの　速度で\n泳ぐ。　翼の　縁は　鋭く\n流氷を　切断する。"
        en:
          brilliant_diamond: "The three horns that extend from its beak attest\nto its power. The leader has the biggest horns."
          shining_pearl: "It swims as fast as a jet boat. The edges of its\nwings are sharp and can slice apart drifting ice."
        fr:
          brilliant_diamond: "Les trois cornes de son bec sont le symbole\nde sa force. Celles du chef sont plus grosses\nque celles des autres."
          shining_pearl: "Il nage aussi vite qu’un scooter des mers.\nLe bord de ses ailes est aiguisé, si bien\nqu’il peut fendre un bloc de glace à la dérive."
        it:
          brilliant_diamond: "È dotato di tre corna sul becco che attestano la\nsua forza. Il capogruppo le ha più grandi."
          shining_pearl: "Nuota veloce come una moto d’acqua.\nLe estremità delle ali sono talmente aguzze\nda fendere banchi di ghiaccio."
        de:
          brilliant_diamond: "Die drei Hörner, die aus dem Schnabel wachsen,\nsind ein Symbol für Stärke. Der Anführer hat die\ngrößten Hörner."
          shining_pearl: "Es schwimmt so schnell wie ein Rennboot. Seine\nFlügel haben scharfe Kanten, die sogar Treibeis\ndurchschneiden können."
        es:
          brilliant_diamond: "Los tres cuernos del pico son muestra de su\nfuerza. El líder tiene los cuernos más grandes."
          shining_pearl: "Nada tan rápido como un fueraborda. Con los\nafilados bordes de sus alas es capaz de cortar\ntémpanos de hielo."
        ko:
          brilliant_diamond: "부리에서 늘어난 3개의 뿔은\n강하다는 것을 증명한다.\n리더의 뿔이 제일 크다."
          shining_pearl: "수상 오토바이와 맞먹는 속도로\n헤엄친다. 날개 가장자리는\n날카롭게 유빙을 절단한다."
        zh_simp:
          brilliant_diamond: "从嘴部延伸出的３只角\n是实力的象征。\n领袖的角是最大的。"
          shining_pearl: "能以不输水上摩托的速度游泳。\n翅膀的边缘很锐利，\n能将浮冰切断。"
        zh_trad:
          brilliant_diamond: "從鳥嘴延伸出的３隻角\n是實力的象徵。\n領袖的角是最大的。"
          shining_pearl: "能以不輸水上摩托車的速度游泳。\n翅膀的邊緣十分鋒利，\n甚至能夠切斷浮冰。"
