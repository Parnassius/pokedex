potion:
  names:
    jp_kana: キズぐすり
    jp_kanji: キズぐすり
    en: Potion
    fr: Potion
    it: Pozione
    de: Trank
    es: Poción
    ko: 상처약
    zh_simp: 伤药
    zh_trad: 傷藥
  descriptions:
    jp_kana: "スプレーしきの　キズぐすり。\nポケモン　１ひきの　ＨＰを\n２０だけ　かいふくする。"
    jp_kanji: "スプレー式の　キズぐすり。\nポケモン　１匹の　ＨＰを\n２０だけ　回復する。"
    en: "A spray-type medicine for treating wounds. It can\nbe used to restore 20 HP to a single Pokémon."
    fr: "Un spray qui soigne les blessures.\nRestaure 20 PV d’un Pokémon."
    it: "Rimedio spray per le ferite.\nRestituisce 20 PS a un Pokémon."
    de: "Hilft bei Wunden. Füllt die KP eines Pokémon um\n20 Punkte auf."
    es: "Medicina en espray que cura heridas y restaura 20 PS a\nun Pokémon."
    ko: "스프레이식의 상처약.\n포켓몬 1마리의 HP를\n20만큼 회복한다."
    zh_simp: "喷雾式伤药。\n能让１只宝可梦\n回复２０ＨＰ。"
    zh_trad: "噴霧式傷藥。\n能讓１隻寶可夢\n回復２０ＨＰ。"
power_anklet:
  names:
    jp_kana: パワーアンクル
    jp_kanji: パワーアンクル
    en: Power Anklet
    fr: Chaîne Pouvoir
    it: Vigorgliera
    de: Machtkette
    es: Franja Recia
    ko: 파워앵클릿
    zh_simp: 力量护踝
    zh_trad: 力量護踝
  descriptions:
    jp_kana: "もたせると　すばやさが　さがるが\nふつうよりも　ポケモンの　すばやさが\nたかく　そだちやすい。"
    jp_kanji: "持たせると　素早さが　さがるが\nふつうよりも　ポケモンの　素早さが\n高く　育ちやすい。"
    en: "An item to be held by a Pokémon. It reduces Speed\nbut allows the holder’s Speed stat to grow more\nafter battling."
    fr: "Objet à tenir. Permet à la Vitesse de progresser\nplus vite, mais la réduit pendant le combat."
    it: "Strumento da dare a un Pokémon.\nRiduce la Velocità nella lotta ma permette ai punti\nbase della Velocità di crescere più rapidamente."
    de: "Ein Item zum Tragen. Erhöht nach dem Kampf den\nInitiative-Wert, senkt aber die Initiative allgemein."
    es: "Potencia la Velocidad de base, pero reduce la\nVelocidad en combate. Debe llevarla un Pokémon."
    ko: "지니게 하면 스피드는 떨어지지만\n여느 때보다 포켓몬의 스피드를\n올리면서 키우기가 쉽다."
    zh_simp: "虽然携带后速度会降低，\n但宝可梦的速度\n会比平时成长得更高。"
    zh_trad: "雖然攜帶後速度會降低，\n但寶可夢的速度\n會比平時成長得更高。"
power_band:
  names:
    jp_kana: パワーバンド
    jp_kanji: パワーバンド
    en: Power Band
    fr: Bandeau Pouvoir
    it: Vigorbanda
    de: Machtband
    es: Banda Recia
    ko: 파워밴드
    zh_simp: 力量束带
    zh_trad: 力量束帶
  descriptions:
    jp_kana: "もたせると　すばやさが　さがるが\nふつうよりも　ポケモンの　とくぼうが\nたかく　そだちやすい。"
    jp_kanji: "持たせると　素早さが　さがるが\nふつうよりも　ポケモンの　特防が\n高く　育ちやすい。"
    en: "An item to be held by a Pokémon. It reduces Speed\nbut allows the holder’s Sp. Def stat to grow more\nafter battling."
    fr: "Objet à tenir. Permet à la Défense Spéciale de\nprogresser plus vite, mais réduit la Vitesse pendant\nle combat."
    it: "Strumento da dare a un Pokémon. Riduce la Velocità\nnella lotta ma permette ai punti base della Difesa\nSpeciale di crescere più rapidamente."
    de: "Ein Item zum Tragen. Erhöht nach dem Kampf den\nSpezial-Verteidigungs-Wert, senkt aber die\nInitiative."
    es: "Potencia la Defensa Especial de base, pero reduce la\nVelocidad en combate. Debe llevarla un Pokémon."
    ko: "지니게 하면 스피드는 떨어지지만\n여느 때보다 포켓몬의 특수방어를\n올리면서 키우기가 쉽다."
    zh_simp: "虽然携带后速度会降低，\n但宝可梦的特防\n会比平时成长得更高。"
    zh_trad: "雖然攜帶後速度會降低，\n但寶可夢的特防\n會比平時成長得更高。"
power_belt:
  names:
    jp_kana: パワーベルト
    jp_kanji: パワーベルト
    en: Power Belt
    fr: Ceinture Pouvoir
    it: Vigorfascia
    de: Machtgurt
    es: Cinto Recio
    ko: 파워벨트
    zh_simp: 力量腰带
    zh_trad: 力量腰帶
  descriptions:
    jp_kana: "もたせると　すばやさが　さがるが\nふつうよりも　ポケモンの　ぼうぎょが\nたかく　そだちやすい。"
    jp_kanji: "持たせると　素早さが　さがるが\nふつうよりも　ポケモンの　防御が\n高く　育ちやすい。"
    en: "An item to be held by a Pokémon. It reduces Speed\nbut allows the holder’s Defense stat to grow more\nafter battling."
    fr: "Objet à tenir. Permet à la Défense de progresser\nplus vite, mais réduit la Vitesse pendant le combat."
    it: "Strumento da dare a un Pokémon.\nRiduce la Velocità nella lotta ma permette ai punti\nbase della Difesa di crescere più rapidamente."
    de: "Ein Item zum Tragen. Erhöht nach dem Kampf den\nVerteidigungs-Wert, senkt aber die Initiative."
    es: "Potencia la Defensa de base, pero reduce la Velocidad\nen combate. Debe llevarlo un Pokémon."
    ko: "지니게 하면 스피드는 떨어지지만\n여느 때보다 포켓몬의 방어를\n올리면서 키우기가 쉽다."
    zh_simp: "虽然携带后速度会降低，\n但宝可梦的防御\n会比平时成长得更高。"
    zh_trad: "雖然攜帶後速度會降低，\n但寶可夢的防禦\n會比平時成長得更高。"
power_bracer:
  names:
    jp_kana: パワーリスト
    jp_kanji: パワーリスト
    en: Power Bracer
    fr: Poignet Pouvoir
    it: Vigorcerchio
    de: Machtreif
    es: Brazal Recio
    ko: 파워리스트
    zh_simp: 力量护腕
    zh_trad: 力量護腕
  descriptions:
    jp_kana: "もたせると　すばやさが　さがるが\nふつうよりも　ポケモンの　こうげきが\nたかく　そだちやすい。"
    jp_kanji: "持たせると　素早さが　さがるが\nふつうよりも　ポケモンの　攻撃が\n高く　育ちやすい。"
    en: "An item to be held by a Pokémon. It reduces Speed\nbut allows the holder’s Attack stat to grow more\nafter battling."
    fr: "Objet à tenir. Permet à l’Attaque de progresser\nplus vite, mais réduit la Vitesse pendant le combat."
    it: "Strumento da dare a un Pokémon.\nRiduce la Velocità nella lotta ma permette ai punti\nbase dell’Attacco di crescere più rapidamente."
    de: "Ein Item zum Tragen. Erhöht nach dem Kampf den\nAngriffs-Wert, senkt aber die Initiative."
    es: "Potencia el Ataque de base, pero reduce la Velocidad\nen combate. Debe llevarlo un Pokémon."
    ko: "지니게 하면 스피드는 떨어지지만\n여느 때보다 포켓몬의 공격을\n올리면서 키우기가 쉽다."
    zh_simp: "虽然携带后速度会降低，\n但宝可梦的攻击\n会比平时成长得更高。"
    zh_trad: "雖然攜帶後速度會降低，\n但寶可夢的攻擊\n會比平時成長得更高。"
power_herb:
  names:
    jp_kana: パワフルハーブ
    jp_kanji: パワフルハーブ
    en: Power Herb
    fr: Herbe Pouvoir
    it: Vigorerba
    de: Energiekraut
    es: Hierba Única
    ko: 파워풀허브
    zh_simp: 强力香草
    zh_trad: 強力香草
  descriptions:
    jp_kana: "もたせた　ポケモンは　いちどだけ\n１ターンめに　ちからを　ためるわざを\nすぐに　つかうことが　できる。"
    jp_kanji: "持たせた　ポケモンは　１度だけ\n１ターン目に　ちからを　ためる技を\nすぐに　使うことが　できる。"
    en: "A single-use item to be held by a Pokémon.\nIt allows the holder to immediately use a move\nthat normally requires a turn to charge."
    fr: "Objet à tenir et à usage unique. Permet d’utiliser\nimmédiatement une capacité qui devrait se charger\nau premier tour."
    it: "Strumento monouso da dare a un Pokémon.\nPermette l’uso immediato di una mossa che in\ngenere richiede un turno prima di essere eseguita."
    de: "Ein Item zum einmaligen Tragen. Der Träger kann\ndadurch eine Attacke sofort einsetzen, die sonst\naufgeladen werden muss."
    es: "Permite el uso inmediato de cualquier movimiento en el\nprimer turno. Es de un solo uso y debe llevarla un\nPokémon."
    ko: "지니게 한 포켓몬은 한 번만\n1턴째에 힘을 모으는 기술을\n바로 사용할 수 있다."
    zh_simp: "携带它的宝可梦仅有１次机会\n可以在第１回合使出\n需要蓄力的招式。"
    zh_trad: "攜帶它的寶可夢將有１次機會，\n可以在１回合內就發動\n需要蓄力的招式。"
power_lens:
  names:
    jp_kana: パワーレンズ
    jp_kanji: パワーレンズ
    en: Power Lens
    fr: Lentille Pouvoir
    it: Vigorlente
    de: Machtlinse
    es: Lente Recia
    ko: 파워렌즈
    zh_simp: 力量镜
    zh_trad: 力量鏡
  descriptions:
    jp_kana: "もたせると　すばやさが　さがるが\nふつうよりも　ポケモンの　とくこうが\nたかく　そだちやすい。"
    jp_kanji: "持たせると　素早さが　さがるが\nふつうよりも　ポケモンの　特攻が\n高く　育ちやすい。"
    en: "An item to be held by a Pokémon. It reduces Speed\nbut allows the holder’s Sp. Atk stat to grow more\nafter battling."
    fr: "Objet à tenir. Permet à l’Attaque Spéciale de progresser\nplus vite, mais réduit la Vitesse pendant le combat."
    it: "Strumento da dare a un Pokémon. Riduce la Velocità\nnella lotta ma permette ai punti base dell’Attacco\nSpeciale di crescere più rapidamente."
    de: "Ein Item zum Tragen. Erhöht nach dem Kampf den\nSpezial-Angriffs-Wert, senkt aber die Initiative."
    es: "Potencia el Ataque Especial de base, pero reduce la\nVelocidad en combate. Debe llevarla un Pokémon."
    ko: "지니게 하면 스피드는 떨어지지만\n여느 때보다 포켓몬의 특수공격을\n올리면서 키우기가 쉽다."
    zh_simp: "虽然携带后速度会降低，\n但宝可梦的特攻\n会比平时成长得更高。"
    zh_trad: "雖然攜帶後速度會降低，\n但寶可夢的特攻\n會比平時成長得更高。"
power_plant_pass:
  names:
    jp_kana: はつでんしょパス
    jp_kanji: はつでんしょパス
    en: Power Plant Pass
    fr: Passe Centrale
    it: Pass Centrale
    de: Kraftwerks-Pass
    es: Pase Central
    ko: 발전소패스
    zh_simp: 发电厂通行证
    zh_trad: 發電廠通行證
  descriptions:
    jp_kana: "１３ばんどうろに　ある\nはつでんしょに　はいるための\nみぶんしょうとなる　パス。"
    jp_kanji: "１３番道路に　ある\n発電所に　入るための\n身分証となる　パス。"
    en: "This pass serves as an ID card for gaining access\nto the Power Plant that lies along Route 13."
    fr: "Un passe de sécurité permettant d’accéder\nà la Centrale de Kalos, à proximité de la Route 13."
    it: "Tesserino di riconoscimento che consente\nl’accesso alla Centrale di Kalos che si trova\nnel Percorso 13."
    de: Dieser Pass gewährt Zutritt zum Kraftwerk auf Route 13.
    es: "Documento de identificación necesario para acceder a\nla central eléctrica de la Ruta 13."
    ko: "13번도로에 있는\n발전소에 들어가기 위한\n신분증이 되는 패스."
    zh_simp: "该通行证可用作进入\n１３号道路上的发电厂时\n所需的身份证明。"
    zh_trad: "該通行證可用作進入\n１３號道路上的發電廠時\n所需的身分證明。"
power_up_pocket:
  names:
    jp_kana: きょうかポケット
    jp_kanji: きょうかポケット
    en: Power-Up Pocket
    fr: Poche à Renforts
    it: Tasca potenziam.
    de: Stärkungstasche
    es: Bolsillo Mejoras
    ko: 강화포켓
    zh_simp: 强化口袋
    zh_trad: 強化口袋
  descriptions:
    jp_kana: "ー\nー\nー"
    jp_kanji: "ー\nー\nー"
    en: "-\n-\n-"
    fr: "-\n-\n-"
    it: "-\n-\n-"
    de: ー
    ko: "-\n-\n-"
    zh_simp: "ー\nー\nー"
    zh_trad: "ー\nー\nー"
power_weight:
  names:
    jp_kana: パワーウエイト
    jp_kanji: パワーウエイト
    en: Power Weight
    fr: Poids Pouvoir
    it: Vigorpeso
    de: Machtgewicht
    es: Pesa Recia
    ko: 파워웨이트
    zh_simp: 力量负重
    zh_trad: 力量負重
  descriptions:
    jp_kana: "もたせると　すばやさが　さがるが\nふつうよりも　ポケモンの　ＨＰが\nたかく　そだちやすい。"
    jp_kanji: "持たせると　素早さが　さがるが\nふつうよりも　ポケモンの　ＨＰが\n高く　育ちやすい。"
    en: "An item to be held by a Pokémon. It reduces Speed but\nallows the holder’s max HP to grow more after battling."
    fr: "Objet à tenir. Permet aux PV max de progresser\nplus vite, mais réduit la Vitesse pendant le combat."
    it: "Strumento da dare a un Pokémon.\nRiduce la Velocità nella lotta ma permette ai punti\nbase dei PS di crescere più rapidamente."
    de: "Ein Item zum Tragen. Erhöht nach dem Kampf die\nmaximalen KP, senkt aber die Initiative."
    es: "Mejora los PS de base, pero reduce la Velocidad en\ncombate. Debe llevarla un Pokémon."
    ko: "지니게 하면 스피드는 떨어지지만\n여느 때보다 포켓몬의 HP를\n올리면서 키우기가 쉽다."
    zh_simp: "虽然携带后速度会降低，\n但宝可梦的ＨＰ\n会比平时成长得更高。"
    zh_trad: "雖然攜帶後速度會降低，\n但寶可夢的ＨＰ\n會比平時成長得更高。"
pp_max:
  names:
    jp_kana: ポイントマックス
    jp_kanji: ポイントマックス
    en: PP Max
    fr: PP Max
    it: PP-Max
    de: AP-Top
    es: PP Máximos
    ko: 포인트맥스
    zh_simp: ＰＰ极限提升剂
    zh_trad: ＰＰ極限提升劑
  descriptions:
    jp_kana: "おぼえている　わざのうち\n１つの　ＰＰの　さいだいちを\nさいこうまで　あげる。"
    jp_kanji: "覚えている　技のうち\n１つの　ＰＰの　最大値を\n最高まで　あげる。"
    en: "A medicine that optimally raises the max PP of a single\nselected move that has been learned by a Pokémon."
    fr: "Augmente sensiblement les PP max d’une capacité\nsélectionnée."
    it: "Porta al limite i PP massimi di una mossa\na scelta tra quelle conosciute dal Pokémon."
    de: "Maximiert die Anzahl der AP einer Attacke eines\nPokémon."
    es: "Aumenta hasta el límite los PP máximos del movimiento\nelegido de un Pokémon."
    ko: "기억하고 있는 기술 중\n1개의 PP 최대치를\n최고까지 올린다."
    zh_simp: "能将宝可梦学会的\n其中１个招式的\nＰＰ最大值提至最高。"
    zh_trad: "能將寶可夢已學會的\n其中１個招式的\nＰＰ最大值提至最高。"
pp_up:
  names:
    jp_kana: ポイントアップ
    jp_kanji: ポイントアップ
    en: PP Up
    fr: PP Plus
    it: PP-Su
    de: AP-Plus
    es: Más PP
    ko: 포인트업
    zh_simp: ＰＰ提升剂
    zh_trad: ＰＰ提升劑
  descriptions:
    jp_kana: "ポケモンが　おぼえている\nわざのうち　１つの　ＰＰの\nさいだいちを　すこし　あげる。"
    jp_kanji: "ポケモンが　覚えている\n技のうち　１つの　ＰＰの\n最大値を　少し　あげる。"
    en: "A medicine that slightly raises the max PP of a single\nselected move that has been learned by a Pokémon."
    fr: "Augmente un peu les PP max d’une capacité\nsélectionnée."
    it: "Aumenta di poco i PP massimi di una mossa\na scelta tra quelle conosciute dal Pokémon."
    de: "Erhöht die maximale Anzahl der AP einer Attacke\neines Pokémon."
    es: "Aumenta ligeramente los PP máximos del movimiento\nelegido de un Pokémon."
    ko: "포켓몬이 기억하고 있는\n기술 중 1개의 PP 최대치를\n조금 올린다."
    zh_simp: "能让宝可梦学会的\n其中１个招式的\nＰＰ最大值少量提高。"
    zh_trad: "能讓寶可夢已學會的\n其中１個招式的\nＰＰ最大值少量提高。"
precooked_burger:
  names:
    jp_kana: レトルトバーグ
    jp_kanji: レトルトバーグ
    en: Precooked Burger
    fr: Steak Haché
    it: Hamburger
    de: Frikadellen
    es: Hamburguesas
    ko: 레토르트햄버그
    zh_simp: 即食肉排
    zh_trad: 即食肉排
  descriptions:
    jp_kana: "キャンプの　りょうりに　つかう\nしょくざいの　いっしゅ。まよった　ときは\nハンバーグを　いれておけば　まちがいない。"
    jp_kanji: "キャンプの　料理に　使う\n食材の　一種。迷った　ときは\nハンバーグを　入れておけば　間違いない。"
    en: "One of the many ingredients that can be used for\ncooking at your camp. If you’re unsure about what to\ncook, you can’t go wrong with some burger."
    fr: "Un ingrédient de cuisine pour le camping.\nQuand on ne sait pas quoi ajouter à un curry,\nle steak haché est une valeur sûre."
    it: "Uno degli ingredienti che puoi usare per cucinare\nin campeggio. Quando non sai bene cosa fare,\naggiungi un Hamburger e non sbagli mai."
    de: "Eine Zutat für PokéCamping-Mahlzeiten. Mit Frikadellen\nliegt man nie falsch. Die perfekte Zutat für alle Köche,\ndie sich nicht für eine Zutat entscheiden können."
    es: "Un ingrediente para cocinar en el campamento. Una\napuesta segura, perfecta para esos momentos de duda."
    ko: "캠프 요리에 사용되는\n식재료 중 하나. 고민될 때\n햄버그를 넣으면 실패할 일은 없다."
    zh_simp: "在露营营地制作料理时会使用的\n一种食材。不知道该加什么的时候，\n选择这种汉堡肉准没错。"
    zh_trad: "製作露營料理時使用的食材之一。\n不知道該放什麼的時候，\n放漢堡排就一定不會錯。"
premier_ball:
  names:
    jp_kana: プレミアボール
    jp_kanji: プレミアボール
    en: Premier Ball
    fr: Honor Ball
    it: Premier Ball
    de: Premierball
    es: Honor Ball
    ko: 프레미어볼
    zh_simp: 纪念球
    zh_trad: 紀念球
  descriptions:
    jp_kana: "なにかの　きねんの　しなとして\nとくべつに　つくられた\nちょっと　めずらしい　ボール。"
    jp_kanji: "なにかの　記念の　品として\n特別に　つくられた\nちょっと　珍しい　ボール。"
    en: "A somewhat rare Poké Ball that was made as a\ncommemorative item used to celebrate an event of\nsome sort."
    fr: "Une Poké Ball assez rare qui fut créée\npour un évènement particulier."
    it: "Poké Ball poco comune realizzata appositamente\nper commemorare un particolare evento."
    de: "Ein eher seltener Ball, der als Reminiszenz an irgendein\nEreignis hergestellt wurde."
    es: "Es una Poké Ball algo singular que se creó para\nconmemorar algún acontecimiento."
    ko: "무언가의 기념품으로\n특별히 만들어진\n조금 희귀한 볼."
    zh_simp: "有点珍贵的球。\n特制出来的某种纪念品。"
    zh_trad: "作為某種紀念品\n而特別製造的，\n有點稀奇的球。"
pretty_feather:
  names:
    jp_kana: きれいなハネ
    jp_kanji: きれいなハネ
    en: Pretty Feather
    fr: Jolie Plume
    it: Piumabella
    de: Prachtfeder
    es: Pluma Bella
    ko: 고운날개
    zh_simp: 美丽之羽
    zh_trad: 美麗之羽
  descriptions:
    jp_kana: "きれいなだけで　なんの　こうかもない\nごくごく　ふつうの　ハネ。"
    jp_kanji: "きれいなだけで　なんの　効果もない\nごくごく　普通の　ハネ。"
    en: "Though this feather is beautiful, it’s just a regular\nfeather and has no effect."
    fr: "Une plume très jolie, mais ordinaire et sans effet\nparticulier."
    it: "Piuma molto bella, ma priva di qualsiasi utilità:\nnon ha alcun effetto."
    de: Eine ganz normale Feder, die rein gar nichts bewirkt.
    es: "Pluma normal y corriente. Muy bonita, pero no sirve\npara nada."
    ko: "아름답기만 할 뿐 아무 효과도 없는\n지극히 평범한 날개."
    zh_simp: "仅仅只是漂亮，\n没有任何效果，\n极其普通的羽毛。"
    zh_trad: "僅僅只是漂亮，\n沒有任何效果，\n極其普通的羽毛。"
primarium_z:bag:
  names:
    jp_kana: アシレーヌＺ
    jp_kanji: アシレーヌＺ
    en: Primarium Z
    fr: Oratozélite
    it: Primarinium Z
    de: Primarenium Z
    es: Primastal Z
    ko: 누리레느Z
    zh_simp: 西狮海壬Ｚ
    zh_trad: 西獅海壬Ｚ
  descriptions:
    jp_kana: "アシレーヌの　うたかたのアリアを\nとくべつな　Ｚワザに　グレードアップする\nＺパワーの　けっしょうを　つくりだす。"
    jp_kanji: "アシレーヌの　うたかたのアリアを\n特別な　Ｚワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nPrimarina’s Sparkling Aria to an exclusive Z-Move."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise l’Oratoria qui le tient à transformer\nson Aria de l’Écume en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono a Primarina di trasformare la mossa\nCanto Effimero in una mossa Z."
    de: "Kristallisierte Z-Kraft, die Primarenes Attacke\nSchaumserenade zu einer Z-Attacke aufstuft.\nWird bei Bedarf automatisch vervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a\nPrimarina convertir su Aria Burbuja en un movimiento Z."
    ko: "누리레느의 물거품아리아를\n특별한 Z기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将西狮海壬的泡影的咏叹调\n升级成特殊Ｚ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把西獅海壬的泡影的詠歎調\n升級為特殊Ｚ招式的Ｚ力量結晶。"
primarium_z:held:
  names:
    jp_kana: アシレーヌＺ
    jp_kanji: アシレーヌＺ
    en: Primarium Z
    fr: Oratozélite
    it: Primarinium Z
    de: Primarenium Z
    es: Primastal Z
    ko: 누리레느Z
    zh_simp: 西狮海壬Ｚ
    zh_trad: 西獅海壬Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　けっしょう。\nアシレーヌの　うたかたのアリアを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nアシレーヌの　うたかたのアリアを\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Primarina’s Sparkling Aria to a Z-Move."
    fr: "Une cristallisation de la Force Z, permettant\nde transformer l’Aria de l’Écume d’un Oratoria\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare la mossa Canto Effimero\ndi Primarina in una mossa Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft Primarenes\nAttacke Schaumserenade zu einer Z-Attacke auf."
    es: "Cristal que confiere el Poder Z al movimiento Aria\nBurbuja de Primarina."
    ko: "Z파워의 결정.\n누리레느의 물거품아리아를\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将西狮海壬的泡影的咏叹调\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把西獅海壬的泡影的詠歎調\n升級為Ｚ招式。"
prism_scale:
  names:
    jp_kana: きれいなウロコ
    jp_kanji: きれいなウロコ
    en: Prism Scale
    fr: Bel’Écaille
    it: Squama Bella
    de: Schönschuppe
    es: Escama Bella
    ko: 고운비늘
    zh_simp: 美丽鳞片
    zh_trad: 美麗鱗片
  descriptions:
    jp_kana: "ある　とくていの　ポケモンを\nしんかさせる　ふしぎな　ウロコ。\nにじいろに　かがやいている。"
    jp_kanji: "ある　特定の　ポケモンを\n進化させる　不思議な　ウロコ。\nにじ色に　輝いている。"
    en: "A mysterious scale that causes a certain Pokémon\nto evolve. It shines in rainbow colors."
    fr: "Une écaille étrange qui fait évoluer une certaine espèce\nde Pokémon. Elle a une couleur arc-en-ciel."
    it: "Squama misteriosa che fa evolvere determinate\nspecie di Pokémon.\nRiflette i colori dell’arcobaleno."
    de: "Eine seltsame Schuppe, durch die sich ein bestimmtes\nPokémon entwickelt. Sie funkelt in den Farben des\nRegenbogens."
    es: "Curiosa escama que hace evolucionar a cierto Pokémon.\nBrilla con los colores del arcoíris."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 비늘.\n무지갯빛으로 빛나고 있다."
    zh_simp: "能让某些特定宝可梦\n进化的神奇鳞片。\n散发着虹色光辉。"
    zh_trad: "能讓特定寶可夢\n進化的神奇鱗片。\n散發著虹色光輝。"
prison_bottle:
  names:
    jp_kana: いましめのツボ
    jp_kanji: いましめのツボ
    en: Prison Bottle
    fr: Vase Scellé
    it: Vaso del vincolo
    de: Banngefäß
    es: Vasija Castigo
    ko: 굴레의항아리
    zh_simp: 惩戒之壶
    zh_trad: 懲戒之壺
  descriptions:
    jp_kana: "おおむかしに　とある　ポケモンの\nちからを　ふうじこめたと　される　ツボ。"
    jp_kanji: "大昔に　とある　ポケモンの　力を\n封じ込めたと　される　ツボ。"
    en: "A bottle believed to have been used to seal away\nthe power of a certain Pokémon long, long ago."
    fr: "Récipient utilisé il y a fort longtemps pour sceller\nle pouvoir d’un certain Pokémon."
    it: "Vaso in cui si dice sia sigillata da tempo\nimmemorabile la forza di un Pokémon."
    de: "Ein Gefäß, mit dem vor langer, langer Zeit die Macht\neines gewissen Pokémon versiegelt wurde."
    es: "Vasija en la que se halla confinado el poder de cierto\nPokémon desde hace muchísimo tiempo."
    ko: "먼 옛날 어떤 포켓몬의 힘을\n봉인했다고 여겨지는 항아리."
    zh_simp: "据说在很久以前封印着\n某只宝可梦力量的壶。"
    zh_trad: "據說在很久以前封印著\n某隻寶可夢力量的壺。"
professors_mask:
  names:
    jp_kana: はかせのふくめん
    jp_kanji: はかせのふくめん
    en: Professor’s Mask
    fr: Masque du Prof
    it: Maschera Prof.
    de: Maske des Profs
    es: Máscara Profesor
    ko: 박사의복면
    zh_simp: 博士的面罩
    zh_trad: 博士的面罩
  descriptions:
    jp_kana: "ロイヤルマスクの　ふくめん。\nプロレスラー　みずから\nミシンで　ぬっているらしい。"
    jp_kanji: "ロイヤルマスクの　覆面。\nプロレスラー　自ら\nミシンで　縫っているらしい。"
    en: "The mask that belongs to The Masked Royal.\nThis pro wrestler apparently sews his mask on a\nmachine himself."
    fr: "Le masque de Royal Mask !\nOn raconte que ce catcheur professionnel\naurait cousu son costume lui-même."
    it: "Maschera di Mister Royale.\nSembra che il famoso lottatore l’abbia realizzata\npersonalmente."
    de: "Die Maske von Mask Royale. Der Profi-Wrestler hat sie\nselbst mit der Nähmaschine genäht."
    es: "La máscara de luchador de Royale, el Enmascarado.\nMuy probablemente de factura propia."
    ko: "로열마스크의 복면.\n프로레슬러 스스로\n재봉틀로 누빈 듯하다."
    zh_simp: "皇家蒙面人的面罩。\n好像是职业摔角手\n自己用缝纫机缝制的。"
    zh_trad: "皇家蒙面人的面罩。\n好像是職業摔角手\n自己用縫紉機縫製的。"
profs_letter:
  names:
    jp_kana: はかせのてがみ
    jp_kanji: はかせのてがみ
    en: Prof’s Letter
    fr: Lettre du Prof
    it: Lettera del Prof
    de: Brief vom Prof
    es: Carta Profesor
    ko: 박사의편지
    zh_simp: 博士的信
    zh_trad: 博士的信
  descriptions:
    jp_kana: "プラターヌはかせから\nママあてに　かかれた　てがみ。\nほんのり　いい　かおりがする。"
    jp_kanji: "プラターヌ博士から\nママあてに　書かれた　手紙。\nほんのり　いい　香りがする。"
    en: "A letter that Professor Sycamore wrote to your\nmother. A faint but pleasant perfume seems to\ncling to the paper."
    fr: "Une lettre du Professeur Platane à Maman.\nElle dégage un parfum subtil."
    it: "Lettera del Professor Platan per la mamma.\nEmana un delicato profumo."
    de: "Ein an deine Mutter adressierter Brief von\nProfessor Platan. Ihm haftet ein schwacher\nParfümduft an."
    es: "Una carta sutilmente perfumada que el Profesor Ciprés\nle ha escrito a tu madre."
    ko: "플라타느박사가\n엄마에게 쓴 편지.\n은은하게 좋은 향기가 난다."
    zh_simp: "布拉塔诺博士写给妈妈的信。\n上面带有微微的香气。"
    zh_trad: "布拉塔諾博士\n寫給媽媽的信。\n信上帶有微微香氣。"
prop_case:
  names:
    jp_kana: グッズケース
    jp_kanji: グッズケース
    en: Prop Case
    fr: Boîte Parure
    it: Portagadget
    de: Deko-Box
    es: Neceser
    ko: 굿즈케이스
    zh_simp: 物品箱
    zh_trad: 物品箱
  descriptions:
    jp_kana: "ミュージカルで　ポケモンに　つける\nいろとりどりの　グッズを　たくさん\nしまえる　きれいで　すてきなケース。"
    jp_kanji: "ミュージカルで　ポケモンに　つける\nいろとりどりの　グッズを　たくさん\n収納する　きれいで　すてきなケース。"
    en: "A lovely case to store colorful Props for your\nPokémon to wear in a musical."
    fr: "Une boîte permettant de ranger les Parures\npour habiller les Pokémon au Music-Hall."
    it: "Scatola bella ed elegante per conservare i gadget\nusati per agghindare i Pokémon durante\nil Pokémon Musical."
    de: "Eine ganz tolle Box, in der jede Menge bunte\nDeko-Objekte für Pokémon-Musicals Platz haben."
    es: "Una bonita cajita donde guardar todos los\nComplementos para vestir a tus Pokémon en el Teatro\nMusical."
    ko: "뮤지컬에서 포켓몬에게 다는\n각양각색의 굿즈를 많이\n넣을 수 있는 아름답고 멋진 케이스."
    zh_simp: "漂亮精美的箱子。\n可以存放宝可梦出演音乐剧时\n用来装扮自己的多种小物件。"
    zh_trad: "漂亮精美的箱子。\n可以存放多種用來裝扮\n出演音樂劇的寶可夢的小飾品。"
protective_pads:
  names:
    jp_kana: ぼうごパット
    jp_kanji: ぼうごパット
    en: Protective Pads
    fr: Pare-Effet
    it: Smorzaurti
    de: Schutzpolster
    es: Paracontacto
    ko: 방호패드
    zh_simp: 部位护具
    zh_trad: 部位護具
  descriptions:
    jp_kana: "こうげき　する　あいてに\nさわって　うける　こうかを\nうけないように　する。"
    jp_kanji: "攻撃　する　相手に\nさわって　受ける　効果を\n受けないように　する。"
    en: "An item to be held by a Pokémon. These pads\nprotect the holder from effects caused by\nmaking direct contact with the target."
    fr: "Objet à tenir. Annule les effets subis par le porteur\nquand il utilise une attaque directe sur un autre\nPokémon."
    it: "Protegge dagli effetti causati dal contatto diretto\ncon altri Pokémon."
    de: "Greift der Träger ein Ziel an, ist er vor Effekten, die\ndurch direkten Kontakt mit diesem ausgelöst werden,\ngeschützt."
    es: "Protege al Pokémon de los efectos que le produciría\nel contacto directo en combate."
    ko: "공격하는 상대와\n접촉해서 받게 되는\n효과를 받지 않게 한다."
    zh_simp: "不会受到触碰攻击对手时\n本应受到的效果。"
    zh_trad: "觸碰要攻擊的對手時，\n不會受到本應受到的效果。"
protector:
  names:
    jp_kana: プロテクター
    jp_kanji: プロテクター
    en: Protector
    fr: Protecteur
    it: Copertura
    de: Schützer
    es: Protector
    ko: 프로텍터
    zh_simp: 护具
    zh_trad: 護具
  descriptions:
    jp_kana: "なにかの　プロテクター。\nとても　かたくて　おもい。\nある　ポケモンが　このんでいる。"
    jp_kanji: "なにかの　プロテクター。\nとても　硬くて　重い。\nある　ポケモンが　好んでいる。"
    en: "A protective item of some sort. It is extremely stiff\nand heavy. It’s loved by a certain Pokémon."
    fr: "Un objet protecteur très dur et très lourd,\napprécié d’un certain Pokémon."
    it: "Strumento protettivo, molto duro e pesante,\nprediletto da un Pokémon in particolare."
    de: "Ein schützendes Item. Steif und schwer.\nDas Lieblingsstück eines bestimmten Pokémon."
    es: "Dispositivo de protección muy pesado. Cierto Pokémon\nlo adora."
    ko: "무언가의 프로텍터.\n매우 단단하고 무겁다.\n어떤 포켓몬이 좋아하는 물건이다."
    zh_simp: "某种护具。\n非常坚硬而且沉重。\n某种宝可梦很喜欢它。"
    zh_trad: "某種護具。\n非常堅硬而且沉重。\n某種寶可夢很喜歡它。"
protein:
  names:
    jp_kana: タウリン
    jp_kanji: タウリン
    en: Protein
    fr: Protéine
    it: Proteina
    de: Protein
    es: Proteína
    ko: 타우린
    zh_simp: 攻击增强剂
    zh_trad: 攻擊增強劑
  descriptions:
    jp_kana: "ポケモンの　えいようドリンク。\nポケモン　１ひきの　こうげきの\nきそポイントを　あげる。"
    jp_kanji: "ポケモンの　栄養ドリンク。\nポケモン　１匹の　攻撃の\n基礎ポイントを　あげる。"
    en: "A nutritious drink for Pokémon. When consumed,\nit raises the Attack base points of a single Pokémon."
    fr: "Une boisson très nutritive qui augmente\nl’Attaque de base d’un Pokémon."
    it: "Bevanda nutriente per Pokémon.\nAumenta i punti base dell’Attacco."
    de: "Ein gehaltvolles Getränk, das den Angriffs-Basiswert\neines Pokémon dauerhaft erhöht."
    es: "Nutritiva bebida que potencia el Ataque de base de un\nPokémon."
    ko: "포켓몬의 영양 드링크.\n포켓몬 1마리의 공격\n기초 포인트를 올린다."
    zh_simp: "宝可梦的营养饮料。\n能提高１只宝可梦的\n攻击的基础点数。"
    zh_trad: "寶可夢的營養飲料。\n能提高１隻寶可夢的\n攻擊的基礎點數。"
psychic_gem:
  names:
    jp_kana: エスパージュエル
    jp_kanji: エスパージュエル
    en: Psychic Gem
    fr: Joyau Psy
    it: Bijoupsico
    de: Psychojuwel
    es: Gema Psíquica
    ko: 에스퍼주얼
    zh_simp: 超能力宝石
    zh_trad: 超能力寶石
  descriptions:
    jp_kana: "エスパーの　タイプの　ジュエル。\nもたせると　いちどだけ　エスパーの\nわざの　いりょくが　つよまる。"
    jp_kanji: "エスパーの　タイプの　ジュエル。\n持たせると　１度だけ　エスパーの\n技の　威力が　強まる。"
    en: "A gem with an essence of the mind. When held, it\nstrengthens the power of a Psychic-type move\none time."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Psy."
    it: "Strumento da dare a un Pokémon.\nGioiello che potenzia una sola volta le mosse\ndi tipo Psico."
    de: "Ein Juwel vom Typ Psycho. Es erhöht einmalig die Stärke\neiner Attacke vom Typ Psycho."
    es: "Joya de un solo uso que potencia los movimientos de\ntipo Psíquico. Debe llevarla un Pokémon."
    ko: "에스퍼타입의 주얼.\n지니게 하면 한 번만 에스퍼\n기술의 위력이 강해진다."
    zh_simp: "超能力属性的宝石。\n携带后，超能力属性的\n招式威力仅会增强１次。"
    zh_trad: "超能力屬性的寶石。\n攜帶後，超能力屬性招式的\n威力會僅增強１次。"
psychic_memory:
  names:
    jp_kana: サイキックメモリ
    jp_kanji: サイキックメモリ
    en: Psychic Memory
    fr: ROM Psy
    it: ROM Psico
    de: Psycho-Disc
    es: Disco Psíquico
    ko: 사이킥메모리
    zh_simp: 精神存储碟
    zh_trad: 精神記憶碟
  descriptions:
    jp_kana: "エスパータイプの　データが　はいった\nメモリ。　とくていの　ポケモンが\nもつと　タイプが　かわる。"
    jp_kanji: "エスパータイプの　データが　入った\nメモリ。　特定の　ポケモンが　持つと\nタイプが　変わる。"
    en: "A memory disc that contains Psychic-type data.\nIt changes the type of the holder if held by\na certain species of Pokémon."
    fr: "Une carte mémoire contenant des données sur\nle type Psy. Un certain Pokémon peut changer\nde type en l’équipant."
    it: "ROM contenente dati sul tipo Psico in formato\ndigitale. Permette a un certo Pokémon di cambiare\ntipo."
    de: "Eine Disc mit Daten zum Typ Psycho. Sie löst bei einem\nbestimmten Pokémon einen Typenwechsel aus."
    es: "Disco de datos que contiene información relativa al tipo\nPsíquico. Permite cambiar de tipo a cierto Pokémon."
    ko: "에스퍼타입의 데이터가 들어 있는\n메모리. 특정 포켓몬이\n지니면 타입이 바뀐다."
    zh_simp: "装有超能力属性数据的存储碟。\n特定宝可梦携带后，\n属性就会发生变化。"
    zh_trad: "裝有超能力屬性資料的記憶碟。\n特定寶可夢攜帶後，\n就會產生屬性的變化。"
psychic_seed:
  names:
    jp_kana: サイコシード
    jp_kanji: サイコシード
    en: Psychic Seed
    fr: Graine Psychique
    it: Psicoseme
    de: Psycho-Samen
    es: Semilla Psique
    ko: 사이코시드
    zh_simp: 精神种子
    zh_trad: 精神種子
  descriptions:
    jp_kana: "ポケモンに　もたせると\nサイコフィールドのときに　つかって\nとくぼうが　あがる。"
    jp_kanji: "ポケモンに　持たせると\nサイコフィールドのときに　使って\n特防が　あがる。"
    en: "An item to be held by a Pokémon. It boosts Sp. Def\non Psychic Terrain. It can only be used once."
    fr: "Objet à tenir. Augmente la Défense Spéciale lorsque\nle terrain est couvert d’un Champ Psychique."
    it: "Strumento da dare a un Pokémon.\nFa aumentare la Difesa Speciale quando il terreno\ndi lotta è nello stato di Campo Psichico."
    de: "Gibst du den Samen einem Pokémon zum Tragen, setzt\nes ihn ein, wenn ein Psychofeld aktiv ist, und erhöht\ndadurch seine Spezial-Verteidigung."
    es: "Aumenta la Defensa Especial del portador si se usa\ncuando el terreno está cubierto por un campo psíquico."
    ko: "포켓몬에게 지니게 하면\n사이코필드일 때 사용하여\n특수방어가 올라간다."
    zh_simp: "让宝可梦携带后，\n在精神场地上使用，\n特防就会提高。"
    zh_trad: "讓寶可夢攜帶後，\n在精神場地上使用，\n就會提高特防。"
psychium_z:bag:
  names:
    jp_kana: エスパーＺ
    jp_kanji: エスパーＺ
    en: Psychium Z
    fr: Psychézélite
    it: Psichium Z
    de: Psium Z
    es: Psicostal Z
    ko: 에스퍼Z
    zh_simp: 超能力Ｚ
    zh_trad: 超能力Ｚ
  descriptions:
    jp_kana: "エスパータイプの　わざを\nＺワザに　グレードアップする\nＺパワーの　けっしょうを　つくりだす。"
    jp_kanji: "エスパータイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nPsychic-type moves to Psychic-type Z-Moves."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise son porteur à transformer ses capacités\nde type Psy en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono ai Pokémon di trasformare le mosse\ndi tipo Psico in mosse Z."
    de: "Kristallisierte Z-Kraft, die Psycho-Attacken zu\nZ-Attacken aufstuft. Wird bei Bedarf automatisch\nvervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a los\nportadores convertir sus movimientos de tipo Psíquico\nen movimientos Z."
    ko: "에스퍼타입 기술을\nZ기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将超能力属性招式升级成\nＺ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把超能力屬性招式\n升級為Ｚ招式的Ｚ力量結晶。"
psychium_z:held:
  names:
    jp_kana: エスパーＺ
    jp_kanji: エスパーＺ
    en: Psychium Z
    fr: Psychézélite
    it: Psichium Z
    de: Psium Z
    es: Psicostal Z
    ko: 에스퍼Z
    zh_simp: 超能力Ｚ
    zh_trad: 超能力Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　けっしょう。\nエスパータイプの　わざを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nエスパータイプの　技を\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Psychic-type moves to Z-Moves."
    fr: "Une cristallisation de la Force Z, permettant\nde transformer les capacités de type Psy\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare le mosse di tipo Psico\nin mosse Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft\nPsycho-Attacken zu Z-Attacken auf."
    es: "Cristal que confiere el Poder Z a los movimientos\nde tipo Psíquico."
    ko: "Z파워의 결정.\n에스퍼타입 기술을\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将超能力属性的招式\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把超能力屬性的招式\n升級為Ｚ招式。"
psyduck_candy:
  names:
    jp_kana: コダックのアメ
    jp_kanji: コダックのアメ
    en: Psyduck Candy
    fr: Bonbon Psykokwak
    it: Caramella Psyduck
    de: Enton-Bonbon
    es: Caramelo Psyduck
    ko: 고라파덕의사탕
    zh_simp: 可达鸭的糖果
    zh_trad: 可達鴨的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
pungent_root:
  names:
    jp_kana: みずべのハーブ
    jp_kanji: みずべのハーブ
    en: Pungent Root
    fr: Tubercule
    it: Erbe acquatiche
    de: Uferkraut
    es: Hierba Intensa
    ko: 물가허브팩
    zh_simp: 水边香草
    zh_trad: 水邊香草
  descriptions:
    jp_kana: "キャンプの　りょうりに　つかう\nしょくざいの　いっしゅ。てきとうに　つんだ\nハーブが　かおり　いろどりを　ついかする。"
    jp_kanji: "キャンプの　料理に　使う\n食材の　一種。適当に　摘んだ\nハーブが　香り　彩りを　追加する。"
    en: "One of the many ingredients that can be used for\ncooking at your camp. Though carelessly picked, these\nherbs can add a fragrant accent to a dish."
    fr: "Un ingrédient de cuisine pour le camping.\nCette racine permet d’ajouter du parfum\net de la couleur aux plats."
    it: "Uno degli ingredienti che puoi usare per cucinare\nin campeggio. Queste erbe selezionate con grande\ncura aggiungono a ogni pietanza un aroma unico."
    de: "Eine Zutat für PokéCamping-Mahlzeiten. Dieses wahllos\ngepflückte Kraut verleiht Speisen ein spezielles Aroma\nund eine kräftige Farbe."
    es: "Un ingrediente para cocinar en el campamento. Unas\nhierbas que aportan color y aroma a la salsa."
    ko: "캠프 요리에 사용되는\n식재료 중 하나. 알맞게 딴\n허브가 향과 색감을 더해 준다."
    zh_simp: "在露营营地制作料理时会使用的\n一种食材。将信手摘取的香草\n点缀在上面，使料理更加色香味俱全。"
    zh_trad: "製作露營料理時使用的食材之一。\n隨手摘取的香草能夠為料理\n增添香氣和色彩。"
pure_incense:
  names:
    jp_kana: きよめのおこう
    jp_kanji: きよめのおこう
    en: Pure Incense
    fr: Encens Pur
    it: Puroaroma
    de: Scheuchrauch
    es: Incienso Puro
    ko: 순결의향로
    zh_simp: 洁净薰香
    zh_trad: 潔淨薰香
  descriptions:
    jp_kana: "いちばん　まえの　ポケモンに\nもたせると　やせいポケモンが\nでて　きにくくなる。"
    jp_kanji: "１番　前の　ポケモンに\n持たせると　野生ポケモンが\nでて　きにくくなる。"
    en: "An item to be held by a Pokémon. It helps keep\nwild Pokémon away if the holder is the head of\nthe party."
    fr: "Objet à tenir. Aide à repousser les Pokémon sauvages\nsi le porteur est le premier Pokémon de l’équipe."
    it: "Strumento da dare a un Pokémon.\nSe chi ce l’ha è il primo della squadra, aiuta\nad allontanare i Pokémon selvatici."
    de: "Ein Item zum Tragen. Reduziert Begegnungen mit wilden\nPokémon, wenn der Träger an der Spitze deines Teams\nsteht."
    es: "Si lo lleva el primer Pokémon del equipo, se reduce la\nprobabilidad de que se acerquen Pokémon salvajes."
    ko: "맨 앞의 포켓몬에게\n지니게 하면 야생 포켓몬이\n나타날 확률이 낮아진다."
    zh_simp: "让排在最前面的宝可梦携带后，\n野生宝可梦就会不容易出现。"
    zh_trad: "讓排在最前面的寶可夢\n攜帶後，野生寶可夢\n會變得不容易出現。"
purple_nectar:
  names:
    jp_kana: むらさきのミツ
    jp_kanji: むらさきのミツ
    en: Purple Nectar
    fr: Nectar Mauve
    it: Nettare viola
    de: Purpurner Nektar
    es: Néctar Violeta
    ko: 보라꿀
    zh_simp: 兰紫色花蜜
    zh_trad: 蘭紫色花蜜
  descriptions:
    jp_kana: "ポニのはなぞので　てにいれた\nはなのミツ。　とくていの　ポケモンの\nすがたを　かえる。"
    jp_kanji: "ポニの花園で　手に入れた\n花のミツ。　特定の　ポケモンの\n姿を　変える。"
    en: "A flower nectar obtained at Poni Meadow.\nIt changes the form of certain species of Pokémon."
    fr: "Un nectar obtenu au Jardin de Poni.\nPermet à un certain Pokémon de changer d’apparence."
    it: "Nettare ottenuto dai fiori del Prato Poni.\nFa cambiare forma a una determinata\nspecie di Pokémon."
    de: "Blütennektar vom Poni-Blumenmeer. Ein bestimmtes\nPokémon kann damit seine Form ändern."
    es: "Néctar de ciertas flores de los Jardines de Poni, capaz\nde hacer cambiar de forma a una determinada especie\nde Pokémon."
    ko: "포니 화원에서 손에 넣은\n꽃의 꿀. 특정 포켓몬의\n모습을 바꾼다."
    zh_simp: "在波尼花园里获得的花蜜。\n可以改变特定宝可梦的样子。"
    zh_trad: "在波尼花園裡獲得的花蜜。\n可以改變特定寶可夢的樣子。"
purple_petal:
  names:
    jp_kana: むらさきはなびら
    jp_kanji: むらさきはなびら
    en: Purple Petal
    fr: Pétale Violet
    it: Petalo violetto
    de: Violettes Blatt
    es: Pétalo Violeta
    ko: 보라꽃잎
    zh_simp: 紫色花瓣
    zh_trad: 紫色花瓣
  descriptions:
    jp_kana: "マツリカのしれんで　クチナシから\nもらえる　はなびらの　おしばな。\n７しゅるい　あつめるのが　もくてき。"
    jp_kanji: "マツリカの試練で　クチナシから\nもらえる　はなびらの　押し花。\n７種類　集めるのが　目的。"
    en: "A pressed flower petal you receive from Nanu\nduring Mina’s trial. The goal is to collect seven\ndifferent kinds of petals."
    fr: "Un pétale pressé que Danh vous a remis lors\nde l’Épreuve d’Oléa. Il y en a sept à collectionner."
    it: "Petalo di fiore pressato ottenuto da Augusto\ndurante la prova di Rika. L’obiettivo è ricevere\nsette petali diversi."
    de: "Ein gepresstes Blütenblatt, das man im Rahmen von\nMatsurikas Prüfung von Yasu erhält. Ziel ist es,\nsieben verschiedene Blütenblätter zu sammeln."
    es: "Pétalo prensado recibido de manos de Denio durante la\nprueba de Rika. El objetivo es reunir siete distintos."
    ko: "말리화의 시련에서 나누에게\n받을 수 있는 꽃잎의 압화.\n7종류 모으는 것이 목적."
    zh_simp: "在茉莉的考验中，\n能从默丹那里得到的干花花瓣。\n目标是集齐７种。"
    zh_trad: "在茉莉的考驗中，\n從默丹那裡得到的壓花花瓣。\n目標是集滿７種花瓣。"
qualot_berry:
  names:
    jp_kana: タポルのみ
    jp_kanji: タポルのみ
    en: Qualot Berry
    fr: Baie Qualot
    it: Baccaloquat
    de: Qualotbeere
    es: Baya Ispero
    ko: 파비열매
    zh_simp: 比巴果
    zh_trad: 比巴果
  descriptions:
    jp_kana: "ポケモンに　あげると\nとても　なかよく　なりやすくなるが\nぼうぎょの　きそポイントは　さがる。"
    jp_kanji: "ポケモンに　あげると\nとても　なかよく　なりやすくなるが\n防御の　基礎ポイントは　さがる。"
    en: "A Berry to be consumed by Pokémon. Using it on a\nPokémon makes it more friendly but lowers its\nDefense base points."
    fr: "Une Baie qui rend les Pokémon plus amicaux,\nmais baisse leur Défense de base."
    it: "Usata su un Pokémon, ne aumenta il livello di amicizia,\nma ne diminuisce i punti base della Difesa."
    de: "Isst ein Pokémon diese Beere, stärkt dies seine\nZutraulichkeit, verringert aber seinen\nVerteidigungs-Basiswert."
    es: "Al usarla con un Pokémon, se gana su amistad, pero\ntambién reduce su Defensa de base."
    ko: "포켓몬에게 주면\n매우 친밀해지기 쉬워지지만\n방어의 기초 포인트가 떨어진다."
    zh_simp: "如果把它交给宝可梦，\n宝可梦就会变得非常容易和训练家亲密，\n但防御的基础点数会降低。"
    zh_trad: "如果把它餵給寶可夢，\n寶可夢會非常容易和訓練家變得友好，\n但防禦的基礎點數會降低。"
quick_ball:
  names:
    jp_kana: クイックボール
    jp_kanji: クイックボール
    en: Quick Ball
    fr: Rapide Ball
    it: Velox Ball
    de: Flottball
    es: Veloz Ball
    ko: 퀵볼
    zh_simp: 先机球
    zh_trad: 先機球
  descriptions:
    jp_kana: "せんとうが　はじまって　すぐに\nつかうと　つかまえやすくなる\nちょっと　かわった　ボール。"
    jp_kanji: "戦闘が　はじまって　すぐに\n使うと　捕まえやすくなる\nちょっと　変わった　ボール。"
    en: "A somewhat different Poké Ball that has a more\nsuccessful catch rate if used at the start of a\nwild encounter."
    fr: "Une Poké Ball qui permet d’attraper un Pokémon\nsauvage plus facilement si on l’utilise au début\ndu combat."
    it: "Poké Ball un po’ diversa che facilita la cattura\ndi un Pokémon selvatico se usata all’inizio\ndella lotta."
    de: "Ein ungewöhnlicher Ball, der zu Beginn eines Kampfes\nam wirkungsvollsten ist."
    es: "Una Poké Ball algo distinta que potencia el índice de\ncaptura si se usa al inicio de un encuentro con Pokémon\nsalvajes."
    ko: "배틀이 시작되자마자\n사용하면 잡기 쉬워지는\n조금 특이한 볼."
    zh_simp: "有点与众不同的球。\n如果战斗开始后立刻使用，\n就能很容易地捉到宝可梦。"
    zh_trad: "有點與眾不同的球。\n在戰鬥開始後立刻使用，\n就會變得容易捉到寶可夢。"
quick_candy:
  names:
    jp_kana: はやさのアメ
    jp_kanji: はやさのアメ
    en: Quick Candy
    fr: Bonbon Sprint S
    it: Caramella rapidità S
    de: Flottbonbon
    es: Caramelo Ímpetu
    ko: 속도의사탕
    zh_simp: 敏捷糖果
    zh_trad: 敏捷糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nポケモンの　すばやさを　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\nポケモンの　すばやさを　上げる。"
    en: "A candy that is packed with energy. When given to\na Pokémon, it will increase that Pokémon’s Speed stat."
    fr: "Un bonbon plein d’énergie.\nIl augmente la Vitesse d’un Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta la Velocità di un Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\ndie Initiative eines Pokémon."
    es: "Caramelo energético que aumenta la Velocidad del\nPokémon."
    ko: "에너지가 가득한 사탕.\n포켓몬의 스피드를 올린다."
    zh_simp: "充满能量的糖果。\n能提高宝可梦的速度。"
    zh_trad: "充滿能量的糖果。\n能提高寶可夢的速度。"
quick_candy_l:
  names:
    jp_kana: はやさのアメＬ
    jp_kanji: はやさのアメＬ
    en: Quick Candy L
    fr: Bonbon Sprint M
    it: Caramella rapidità M
    de: Flottbonbon+
    es: Caramelo Ímpetu +
    ko: 속도의사탕L
    zh_simp: 敏捷糖果Ｌ
    zh_trad: 敏捷糖果Ｌ
  descriptions:
    jp_kana: "エネルギーの　つまった　おおきい　アメ。\nレベル３０　いじょうの　ポケモンの\nすばやさを　あげる。"
    jp_kanji: "エネルギーの　つまった　大きい　アメ。\nレベル３０　以上の　ポケモンの\nすばやさを　上げる。"
    en: "A big candy that is packed with energy. When given to\na Pokémon at Lv. 30 or higher, it will increase that\nPokémon’s Speed stat."
    fr: "Un gros bonbon plein d’énergie.\nIl augmente la Vitesse d’un Pokémon de niveau 30\nou supérieur."
    it: "Una caramella piena zeppa di energia.\nAumenta la Velocità di un Pokémon di livello 30\no superiore."
    de: "Ein großes Bonbon, das voller Energie steckt.\nErhöht dauerhaft die Initiative eines Pokémon ab\nLevel 30."
    es: "Caramelo energético grande que aumenta la Velocidad\nde un Pokémon de Nv. 30 o superior."
    ko: "에너지가 가득한 큰 사탕.\n레벨 30 이상인 포켓몬의\n스피드를 올린다."
    zh_simp: "充满能量的大糖果。\n能让等级３０以上的\n宝可梦的速度上升。"
    zh_trad: "充滿能量的大糖果。\n能提高等級在３０以上的\n寶可夢的速度。"
quick_candy_xl:
  names:
    jp_kana: はやさのアメＸＬ
    jp_kanji: はやさのアメＸＬ
    en: Quick Candy XL
    fr: Bonbon Sprint L
    it: Caramella rapidità L
    de: Flottbonbon++
    es: Caramelo Ímpetu ++
    ko: 속도의사탕XL
    zh_simp: 敏捷糖果ＸＬ
    zh_trad: 敏捷糖果ＸＬ
  descriptions:
    jp_kana: "エネルギーの　つまった　とくだいの　アメ。\nレベル６０　いじょうの　ポケモンの\nすばやさを　あげる。"
    jp_kanji: "エネルギーの　つまった　特大の　アメ。\nレベル６０　以上の　ポケモンの\nすばやさを　上げる。"
    en: "A huge candy that is packed with energy. When given\nto a Pokémon at Lv. 60 or higher, it will increase that\nPokémon’s Speed stat."
    fr: "Un énorme bonbon plein d’énergie.\nIl augmente la Vitesse d’un Pokémon de niveau 60\nou supérieur."
    it: "Una caramella piena zeppa di energia.\nAumenta la Velocità di un Pokémon di livello 60\no superiore."
    de: "Ein riesiges Bonbon, das voller Energie steckt.\nErhöht dauerhaft die Initiative eines Pokémon ab\nLevel 60."
    es: "Caramelo energético enorme que aumenta la Velocidad\nde un Pokémon de Nv. 60 o superior."
    ko: "에너지가 가득한 매우 큰 사탕.\n레벨 60 이상인 포켓몬의\n스피드를 올린다."
    zh_simp: "充满能量的超大糖果。\n能让等级６０以上的\n宝可梦的速度上升。"
    zh_trad: "充滿能量的特大糖果。\n能提高等級在６０以上的\n寶可夢的速度。"
quick_claw:
  names:
    jp_kana: せんせいのツメ
    jp_kanji: せんせいのツメ
    en: Quick Claw
    fr: Vive Griffe
    it: Rapidartigli
    de: Flinkklaue
    es: Garra Rápida
    ko: 선제공격손톱
    zh_simp: 先制之爪
    zh_trad: 先制之爪
  descriptions:
    jp_kana: "かるくて　するどい　ツメ。\nもたせると　あいてより　さきに\nこうどう　できることが　ある。"
    jp_kanji: "軽くて　鋭い　ツメ。\n持たせると　相手より　先に\n行動できることが　ある。"
    en: "An item to be held by a Pokémon. This light, sharp\nclaw lets the bearer move first occasionally."
    fr: "Objet à tenir. Une griffe légère mais tranchante\nqui permet parfois de frapper en priorité."
    it: "Strumento da dare a un Pokémon.\nLeggero e affilato, ogni tanto permette di fare\nla prima mossa."
    de: "Ein Item, das einem Pokémon zum Tragen gegeben\nwerden kann. Es ermöglicht gelegentlich den Erstschlag."
    es: "Garra ligera y afilada que permite que el Pokémon que\nla lleve ataque a veces el primero."
    ko: "가볍고 날카로운 손톱.\n지니게 하면 상대보다 먼저\n행동할 수도 있다."
    zh_simp: "又轻又尖锐的爪子。\n携带后，有时能比对手\n先一步行动。"
    zh_trad: "又輕又尖銳的爪子。\n攜帶後，有時能比對手\n先一步行動。"
quick_powder:
  names:
    jp_kana: スピードパウダー
    jp_kanji: スピードパウダー
    en: Quick Powder
    fr: Poudre Vite
    it: Velopolvere
    de: Flottstaub
    es: Polvo Veloz
    ko: 스피드파우더
    zh_simp: 速度粉
    zh_trad: 速度粉
  descriptions:
    jp_kana: "メタモンに　もたせると　すばやさが\nあがる　ふしぎなこな。\nとても　こまかくて　かたい。"
    jp_kanji: "メタモンに　持たせると　素早さが\nあがる　不思議な粉。\nとても　こまかくて　硬い。"
    en: "An item to be held by Ditto. Extremely fine yet\nhard, this odd powder boosts the Speed stat."
    fr: "Objet à faire tenir à Métamorph.\nCette poudre étrange, très fine mais résistante,\naugmente sa Vitesse."
    it: "Strumento da dare a Ditto.\nQuesta strana polvere, fine e al contempo dura,\naumenta la Velocità."
    de: "Ein Item, das Ditto zum Tragen gegeben werden kann.\nFein und doch hart, erhöht es den Initiative-Wert."
    es: "Debe llevarlo Ditto. Es un polvo muy fino, pero a la vez\npoderoso, que aumenta su Velocidad."
    ko: "메타몽에게 지니게 하면\n스피드가 올라가는 이상한 가루.\n매우 잘고 단단하다."
    zh_simp: "让百变怪携带后，\n速度就会提高的神奇粉末。\n非常细腻坚硬。"
    zh_trad: "讓百變怪攜帶後，\n速度就會提高的神奇粉末。\n非常細緻堅硬。"
quiet_mint:
  names:
    jp_kana: れいせいミント
    jp_kanji: れいせいミント
    en: Quiet Mint
    fr: Aromate Discret
    it: Menta Quieta
    de: Ruhig-Minze
    es: Menta Mansa
    ko: 냉정민트
    zh_simp: 冷静薄荷
    zh_trad: 冷靜薄荷
  descriptions:
    jp_kana: "ポケモンに　かおりを　かがせると\nとくこうが　あがりやすく　なるが\nすばやさは　あがりにくくなる　ミント。"
    jp_kanji: "ポケモンに　香りを　かがせると\n特攻が　上がりやすく　なるが\n素早さは　上がりにくくなる　ミント。"
    en: "When a Pokémon smells this mint, its Sp. Atk will grow\nmore easily, but its Speed will grow more slowly."
    fr: "Si un Pokémon hume cet aromate, son Attaque Spéciale\nmontera plus facilement, mais sa Vitesse\nse développera plus lentement."
    it: "Quando un Pokémon ne sente il profumo,\nil suo Attacco Speciale aumenta più facilmente\na scapito della Velocità."
    de: "Lässt man ein Pokémon an dieser Minze schnuppern,\nsteigt sein Spezial-Angriff schneller, aber seine Initiative\numso langsamer."
    es: "Cuando un Pokémon percibe su aroma, aumenta con\nmás facilidad su Ataque Especial, en detrimento de su\nVelocidad."
    ko: "포켓몬에게 향기를 맡게 하면\n특수공격이 오르기 쉬워지지만\n스피드가 오르기 어려워지는 민트."
    zh_simp: "宝可梦闻了这种薄荷之后，\n会令特攻容易提高，\n而速度则难以提高。"
    zh_trad: "讓寶可夢聞這種薄荷的氣味，\n會令特攻變得容易提高，\n但速度則難以提高。"
rabuta_berry:
  names:
    jp_kana: ラブタのみ
    jp_kanji: ラブタのみ
    en: Rabuta Berry
    fr: Baie Rabuta
    it: Baccambutan
    de: Rabutabeere
    es: Baya Rautan
    ko: 라부탐열매
    zh_simp: 茸丹果
    zh_trad: 茸丹果
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。\nふかふかのつちに　うめると\nラブタが　そだつ。"
    jp_kanji: "ポフィンの　材料。\nふかふかの土に　埋めると\nラブタが　育つ。"
    en: "A Poffin ingredient. Bury it in soft soil to grow a\nRabuta Berry plant."
    fr: "Un ingrédient entrant dans la confection de Poffins.\nPlantez cette Baie dans un sol meuble et fertile\npour faire pousser un arbre à Baies Rabuta."
    it: "Si usa per fare i poffin. Seminala nella terra soffice\nper far crescere una pianta di Baccambutan."
    de: "Eine Knursp-Zutat. Pflanze sie in weichen Lehmboden\nein, damit neue Rabutabeeren wachsen."
    es: "Ingrediente para pokochos. Si se planta en tierra suelta,\nsaldrá una planta de Rautan."
    ko: "포핀의 재료.\n푹신푹신한 땅에 심으면\n라부탐이 자란다."
    zh_simp: "宝芬的材料。\n埋在松软的土地里\n可以培育出茸丹。"
    zh_trad: "製作寶芬的材料。\n埋進鬆軟的泥土裡，\n長成後會結出茸丹。"
radiant_petal:
  names:
    jp_kana: かがやくはなびら
    jp_kanji: かがやくはなびら
    en: Radiant Petal
    fr: Pétale Brillant
    it: Petalo lucente
    de: Kronblatt
    es: Pétalo Fulgor
    ko: 빛나는꽃잎
    zh_simp: 光辉花瓣
    zh_trad: 光輝花瓣
  descriptions:
    jp_kana: "ほうじょうのおう　から　もらった\nひとひらの　はなびら。\nあわい　ひかりを　はなっている。"
    jp_kanji: "豊穣の王　から　もらった\nひとひらの　はなびら。\n淡い　ひかりを　放っている。"
    en: "A single petal that the King of Bountiful Harvests\ngave you. It radiates faint light."
    fr: "Un pétale offert par le Seigneur des récoltes.\nIl en émane une faible lueur."
    it: "Un petalo ricevuto dal Re dell’abbondanza.\nEmana una luce fioca."
    de: "Ein Blütenblatt, das du vom König der reichen Ernte\nerhalten hast. Es strahlt ein sanftes Licht aus."
    es: "Un pétalo recibido del Rey de las Cosechas.\nEmite una luz tenue."
    ko: "풍요의 왕에게서 받은 한 장의 꽃잎.\n희미하게 빛을 내고 있다."
    zh_simp: "从丰饶之王那里\n得到的一片花瓣。\n散发着朦胧的光辉。"
    zh_trad: "從豐饒之王那裡\n得到的一片花瓣。\n散發著淡淡的光輝。"
rage_candy_bar:
  names:
    jp_kana: いかりまんじゅう
    jp_kanji: いかりまんじゅう
    en: Rage Candy Bar
    fr: Bonbon Rage
    it: Iramella
    de: Wutkeks
    es: Caramelo Furia
    ko: 분노의호두과자
    zh_simp: 愤怒馒头
    zh_trad: 憤怒饅頭
  descriptions:
    jp_kana: "チョウジめいぶつの　まんじゅう。\nポケモン　１ひきの　じょうたいの\nいじょうを　すべて　かいふくする。"
    jp_kanji: "チョウジタウン名物の　まんじゅう。\nポケモン　１匹の　状態の\n異常を　すべて　回復する。"
    en: "Mahogany Town’s famous candy. It can be used\nonce to heal all the status conditions of a Pokémon."
    fr: "Un bonbon, spécialité d’Acajou.\nSoigne toutes les altérations de statut d’un Pokémon."
    it: "Caramella tipica di Mogania.\nCura tutti i problemi di stato di un Pokémon."
    de: "Eine Spezialität aus Mahagonia City, die alle\nStatusprobleme eines Pokémon heilt."
    es: "Caramelo típico de Pueblo Caoba. Cura todos los\nproblemas de estado de un Pokémon."
    ko: "황토마을의 명물인 호두과자.\n포켓몬 1마리의 상태 이상을\n모두 회복한다."
    zh_simp: "卡吉镇特产的馒头。\n能治愈１只宝可梦的\n所有异常状态。"
    zh_trad: "卡吉鎮特產的饅頭。\n能治癒１隻寶可夢的\n所有異常狀態。"
rainbow_flower:
  names:
    jp_kana: にじいろのはな
    jp_kanji: にじいろのはな
    en: Rainbow Flower
    fr: Fleur 7 Couleurs
    it: Fiore arcobaleno
    de: Regenbogenblüte
    es: Flor Irisada
    ko: 무지개꽃
    zh_simp: 虹色之花
    zh_trad: 虹色之花
  descriptions:
    jp_kana: "キャプテンたちから　もらった\nはなびらを　ひとつに　まとめたもの。\nせいちょうを　みとめられた　あかし。"
    jp_kanji: "キャプテンたちから　もらった\nはなびらを　ひとつに　まとめたもの。\n成長を　認められた　証。"
    en: "A flower made of the petals you received from\ncaptains. It’s proof that your growth has been\nrecognized by them."
    fr: "Une fleur formée à partir des pétales que vous ont\nremis les sept Capitaines. C’est le symbole de\nce que vous avez accompli jusqu’ici."
    it: "Fiore composto dai petali ottenuti dai Capitani.\nÈ la prova che i tuoi progressi sono stati\nriconosciuti."
    de: "Diese Blüte besteht aus den Blütenblättern, die du von\nden Captains erhalten hast. Sie ist ein Symbol der\nAnerkennung deiner Stärke."
    es: "Flor resultante de la unión de los siete pétalos\nentregados por los Capitanes, símbolo de la experiencia\ny madurez acumuladas en tu aventura."
    ko: "캡틴들에게 받은\n꽃잎을 하나로 만든 것.\n성장을 인정받은 증표."
    zh_simp: "将得自队长们那里的花瓣\n化零为整后形成的东西。\n是成长得到认可的证明。"
    zh_trad: "以從隊長們那裡得到的花瓣\n構成的一朵花。這朵花\n證明了他們認同你的成長。"
rainbow_slate:
  names:
    jp_kana: にじのせきばん
    jp_kanji: にじのせきばん
    en: Rainbow Slate
    fr: Tablette Arc-en-ciel
    it: Piastra arcobaleno
    de: Regenbogenplatte
    es: Losa Arcoíris
    ko: 무지개의석판
    zh_simp: 彩虹石板
    zh_trad: 彩虹石板
  descriptions:
    jp_kana: "ふしぎな　ちからに　あふれる　せきばん。\nハマナスパークの　にじのへやと\nふかい　つながりを　かんじる。"
    jp_kanji: "不思議な　力に　あふれる　石板。\nハマナスパークの　虹の部屋と\n深い　つながりを　感じる。"
    en: "A slate overflowing with enigmatic energy. You can feel\na strong connection between it and the Rainbow Room\nat Ramanas Park."
    fr: "Une tablette qui regorge d’une étrange énergie.\nElle semble intimement liée à la Salle de l’Arc-en-ciel\ndu Parc Rosa Rugosa."
    it: "Lastra di pietra che emana una misteriosa energia.\nSembra profondamente connessa alla Stanza arcobaleno\ndel Parco Rosa Rugosa."
    de: "Eine Platte, die vor rätselhafter Energie strotzt.\nMan kann eine starke Verbindung zwischen ihr und der\nRegenbogenkammer im Hamanasu-Park spüren."
    es: "Una losa rebosante de una misteriosa energía.\nParece estrechamente relacionada con la Sala\ndel Arcoíris del Parque Hansa."
    ko: "신비한 힘이 넘치는 석판.\n해당화파크의 무지개의 방과\n깊은 연관이 있는 것 같다."
    zh_simp: "充满了神秘力量的石板。\n感觉它与玫瑰公园的彩虹之厅\n有着很深的关联。"
    zh_trad: "充滿神奇力量的石板。\n感覺它和玫瑰公園的彩虹之廳\n有很深的關係。"
rainbow_wing:
  names:
    jp_kana: にじいろのはね
    jp_kanji: にじいろのはね
    en: Rainbow Wing
    fr: Arc-en-Ci’Aile
    it: Ala d’Iride
    de: Buntschwinge
    es: Ala Arcoíris
    ko: 무지갯빛날개
    zh_simp: 虹色之羽
    zh_trad: 虹色之羽
  descriptions:
    jp_kana: "にじいろに　ひかり　かがやく\nふしぎな　はね。"
    jp_kanji: "にじいろに　ひかり　かがやく\n不思議な　はね。"
    en: A mystical rainbow feather that sparkles.
    fr: Une étrange plume qui brille d’un éclat arc-en-ciel.
    it: Piuma magica dai mille colori.
    de: "Eine mystische Feder, die von einem\nregenbogenfarbenen Leuchten erfüllt ist."
    es: Misteriosa ala de un brillante color arcoíris.
    ko: "무지갯빛으로 빛나는\n이상한 날개."
    zh_simp: "散发着虹色光辉的\n神奇羽毛。"
    zh_trad: "散發著虹色光輝的\n神奇羽毛。"
rare_bone:
  names:
    jp_kana: きちょうなホネ
    jp_kanji: きちょうなホネ
    en: Rare Bone
    fr: Os Rare
    it: Osso Raro
    de: Steinknochen
    es: Hueso Raro
    ko: 귀중한뼈
    zh_simp: 贵重骨头
    zh_trad: 貴重骨頭
  descriptions:
    jp_kana: "ポケモンこうこがくの　うえで\nとても　きちょうな　ホネ。\nショップで　たかく　うれる。"
    jp_kanji: "ポケモン考古学の　うえで\nとても　貴重な　ホネ。\nショップで　高く　売れる。"
    en: "A rare bone that is extremely valuable for the\nstudy of Pokémon archeology. It can be sold for a\nhigh price to shops."
    fr: "Un os d’une grande valeur pour l’archéologie Pokémon.\nPeut être vendu à bon prix en magasin."
    it: "Osso di grande valore per l’archeologia Pokémon.\nPuò essere venduto nei negozi a un prezzo\npiuttosto alto."
    de: "Dieser Knochen erfreut jeden Pokémon-Archäologen.\nEr ist von hohem Wert."
    es: "Un hueso de gran valor para la arqueología Pokémon.\nPuede alcanzar un alto precio en las tiendas."
    ko: "포켓몬 고고학에 있어\n매우 귀중한 뼈.\n상점에서 비싸게 팔린다."
    zh_simp: "在宝可梦考古学上\n非常贵重的骨头。\n可以在商店高价出售。"
    zh_trad: "在寶可夢考古學上\n非常貴重的骨頭。\n可以在商店高價出售。"
rare_candy:
  names:
    jp_kana: ふしぎなアメ
    jp_kanji: ふしぎなアメ
    en: Rare Candy
    fr: Super Bonbon
    it: Caramella rara
    de: Sonderbonbon
    es: Caramelo Raro
    ko: 이상한사탕
    zh_simp: 神奇糖果
    zh_trad: 神奇糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nあたえると　ポケモン　１ひきの\nレベルが　１だけ　あがる。"
    jp_kanji: "エネルギーの　つまった　アメ。\nあたえると　ポケモン　１匹の\nレベルが　１だけ　あがる。"
    en: "A candy that is packed with energy. When consumed,\nit will instantly raise the level of a single Pokémon\nby one."
    fr: "Un bonbon plein d’énergie.\nIl permet à un Pokémon de monter d’un niveau."
    it: "Caramella altamente energetica.\nFa salire un Pokémon di un livello."
    de: "Ein energiereiches Bonbon, das den Level eines\nPokémon dauerhaft um 1 erhöht."
    es: Caramelo energético que sube a un Pokémon de nivel.
    ko: "에너지가 가득한 사탕.\n먹이면 포켓몬 1마리의\n레벨이 1만큼 올라간다."
    zh_simp: "充满能量的糖果。\n将它交给宝可梦后，\n１只宝可梦的等级仅会提高１。"
    zh_trad: "充滿能量的糖果。\n餵給寶可夢後，\n能讓１隻寶可夢的等級提高１級。"
rash_mint:
  names:
    jp_kana: うっかりやミント
    jp_kanji: うっかりやミント
    en: Rash Mint
    fr: Aromate Foufou
    it: Menta Ardente
    de: Hitzig-Minze
    es: Menta Alocada
    ko: 덜렁민트
    zh_simp: 马虎薄荷
    zh_trad: 馬虎薄荷
  descriptions:
    jp_kana: "ポケモンに　かおりを　かがせると\nとくこうが　あがりやすく　なるが\nとくぼうは　あがりにくくなる　ミント。"
    jp_kanji: "ポケモンに　香りを　かがせると\n特攻が　上がりやすく　なるが\n特防は　上がりにくくなる　ミント。"
    en: "When a Pokémon smells this mint, its Sp. Atk will grow\nmore easily, but its Sp. Def will grow more slowly."
    fr: "Si un Pokémon hume cet aromate, son Attaque Spéciale\nmontera plus facilement, mais sa Défense Spéciale\nse développera plus lentement."
    it: "Quando un Pokémon ne sente il profumo,\nil suo Attacco Speciale aumenta più facilmente\na scapito della Difesa Speciale."
    de: "Lässt man ein Pokémon an dieser Minze schnuppern,\nsteigt sein Spezial-Angriff schneller, aber seine\nSpezial-Verteidigung umso langsamer."
    es: "Cuando un Pokémon percibe su aroma, aumenta con\nmás facilidad su Ataque Especial, en detrimento de su\nDefensa Especial."
    ko: "포켓몬에게 향기를 맡게 하면\n특수공격이 오르기 쉬워지지만\n특수방어가 오르기 어려워지는 민트."
    zh_simp: "宝可梦闻了这种薄荷之后，\n会令特攻容易提高，\n而特防则难以提高。"
    zh_trad: "讓寶可夢聞這種薄荷的氣味，\n會令特攻變得容易提高，\n但特防則難以提高。"
rattata_candy:
  names:
    jp_kana: コラッタのアメ
    jp_kanji: コラッタのアメ
    en: Rattata Candy
    fr: Bonbon Rattata
    it: Caramella Rattata
    de: Rattfratz-Bonbon
    es: Caramelo Rattata
    ko: 꼬렛의사탕
    zh_simp: 小拉达的糖果
    zh_trad: 小拉達的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
rawst_berry:
  names:
    jp_kana: チーゴのみ
    jp_kanji: チーゴのみ
    en: Rawst Berry
    fr: Baie Fraive
    it: Baccafrago
    de: Fragiabeere
    es: Baya Safre
    ko: 복분열매
    zh_simp: 莓莓果
    zh_trad: 莓莓果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nやけどを　かいふくする。"
    jp_kanji: "ポケモンに　持たせると\nやけどを　回復する。"
    en: "A Berry to be consumed by Pokémon. If a Pokémon\nholds one, it can recover from a burn on its own\nin battle."
    fr: "Une Baie qui soigne une brûlure lorsqu’elle est tenue\npar un Pokémon."
    it: "Se un Pokémon ha questa bacca, guarisce\ndalle scottature."
    de: "Gibst du die Beere einem Pokémon zum Tragen,\nheilt diese es von Verbrennungen."
    es: "Los Pokémon pueden llevarla o usarla para curarse las\nquemaduras."
    ko: "포켓몬에게 지니게 하면\n화상을 회복한다."
    zh_simp: "让宝可梦携带后，\n可以治愈灼伤。"
    zh_trad: "讓寶可夢攜帶後，\n可以治癒灼傷。"
razor_claw:
  names:
    jp_kana: するどいツメ
    jp_kanji: するどいツメ
    en: Razor Claw
    fr: Griffe Rasoir
    it: Affilartigli
    de: Scharfklaue
    es: Garra Afilada
    ko: 예리한손톱
    zh_simp: 锐利之爪
    zh_trad: 銳利之爪
  descriptions:
    jp_kana: "するどく　とがった　ツメ。\nもたせると　わざが　きゅうしょに\nあたりやすくなる。"
    jp_kanji: "鋭く　とがった　ツメ。\n持たせると　技が　急所に\n当たりやすくなる。"
    en: "An item to be held by a Pokémon. This sharply\nhooked claw increases the holder’s\ncritical-hit ratio."
    fr: "Objet à tenir. Une griffe crochue et pointue\naugmentant le taux de critiques."
    it: "Strumento da dare a un Pokémon.\nArtiglio che aumenta la probabilità di sferrare\nbrutti colpi."
    de: "Ein Item zum Tragen. Die scharfe Klaue erhöht die\nVolltrefferquote des Trägers."
    es: "Aumenta la probabilidad de que el Pokémon que la\nlleve consiga un golpe crítico."
    ko: "날카롭고 뾰족한 손톱.\n지니게 하면 기술이\n급소에 맞기 쉬워진다."
    zh_simp: "尖锐的爪子。\n携带后，招式会\n变得容易击中要害。"
    zh_trad: "尖銳的爪子。\n攜帶後，招式會\n變得容易擊中要害。"
razor_fang:
  names:
    jp_kana: するどいキバ
    jp_kanji: するどいキバ
    en: Razor Fang
    fr: Croc Rasoir
    it: Affilodente
    de: Scharfzahn
    es: Colmillo Agudo
    ko: 예리한이빨
    zh_simp: 锐利之牙
    zh_trad: 銳利之牙
  descriptions:
    jp_kana: "するどく　とがった　キバ。\nもたせると　ダメージを　あたえたとき\nひるませることが　ある。"
    jp_kanji: "鋭く　とがった　キバ。\n持たせると　ダメージを　与えたとき\nひるませることが　ある。"
    en: "An item to be held by a Pokémon. When the holder\nsuccessfully inflicts damage, the target may\nalso flinch."
    fr: "Objet à tenir. Peut apeurer l’ennemi quand le porteur\nlui inflige des dégâts."
    it: "Strumento da dare a un Pokémon.\nChi ce l’ha può far tentennare il nemico colpito."
    de: "Ein Item zum Tragen. Verursacht der Träger Schaden,\nschreckt das Ziel eventuell zurück."
    es: "Si lo lleva un Pokémon, puede amedrentar al objetivo\nal infligirle daño."
    ko: "날카롭고 뾰족한 이빨.\n지니게 하면 데미지를 줬을 때\n풀죽게 하기도 한다."
    zh_simp: "尖锐的牙齿。\n携带后，在给予伤害时，\n有时会让对手畏缩。"
    zh_trad: "尖銳的牙齒。\n攜帶後，在給予傷害時，\n有時會讓對手畏縮。"
razz_berry:
  names:
    jp_kana: ズリのみ
    jp_kanji: ズリのみ
    en: Razz Berry
    fr: Baie Framby
    it: Baccalampon
    de: Himmihbeere
    es: Baya Frambu
    ko: 라즈열매
    zh_simp: 蔓莓果
    zh_trad: 蔓莓果
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。\nふかふかのつちに　うめると\nズリが　そだつ。"
    jp_kanji: "ポフィンの　材料。\nふかふかの土に　埋めると\nズリが　育つ。"
    en: "A Poffin ingredient. Bury it in soft soil to grow a\nRazz Berry plant."
    fr: "Un ingrédient entrant dans la confection de Poffins.\nPlantez cette Baie dans un sol meuble et fertile\npour faire pousser un arbre à Baies Framby."
    it: "Si usa per fare i poffin. Seminala nella terra soffice\nper far crescere una pianta di Baccalampon."
    de: "Eine Knursp-Zutat. Pflanze sie in weichen Lehmboden\nein, damit neue Himmihbeeren wachsen."
    es: "Ingrediente para pokochos. Si se planta en tierra suelta,\nsaldrá una planta de Frambu."
    ko: "포핀의 재료.\n푹신푹신한 땅에 심으면\n라즈가 자란다."
    zh_simp: "宝芬的材料。\n埋在松软的土地里\n可以培育出蔓莓。"
    zh_trad: "製作寶芬的材料。\n埋進鬆軟的泥土裡，\n長成後會結出蔓莓。"
reaper_cloth:
  names:
    jp_kana: れいかいのぬの
    jp_kanji: れいかいのぬの
    en: Reaper Cloth
    fr: Tissu Fauche
    it: Terrorpanno
    de: Düsterumhang
    es: Tela Terrible
    ko: 영계의천
    zh_simp: 灵界之布
    zh_trad: 靈界之布
  descriptions:
    jp_kana: "おそろしく　つよい　れいりょくが\nこめられている　ぬの。\nある　ポケモンが　このんでいる。"
    jp_kanji: "おそろしく　強い　霊力が\nこめられている　布。\nある　ポケモンが　好んでいる。"
    en: "A cloth imbued with horrifyingly strong spiritual\nenergy. It’s loved by a certain Pokémon."
    fr: "Un tissu imprégné d’une énergie spirituelle\nhorriblement puissante. Apprécié d’un certain Pokémon."
    it: "Panno intriso di un’energia spirituale terribilmente\nforte. Piace a un Pokémon in particolare."
    de: "Ein Stoffumhang mit geistiger Energie.\nDas Lieblingsstück eines bestimmten Pokémon."
    es: "Tela imbuida de una energía espiritual muy potente.\nCierto Pokémon la adora."
    ko: "무섭고 강한 영력이\n담겨 있는 천.\n어떤 포켓몬이 좋아하는 물건이다."
    zh_simp: "蕴含着惊人强大灵力的布。\n某种宝可梦很喜欢它。"
    zh_trad: "蘊含著驚人的\n強大靈力的布。\n某種寶可夢很喜歡它。"
red_apricorn:
  names:
    jp_kana: あかぼんぐり
    jp_kanji: あかぼんぐり
    en: Red Apricorn
    fr: Noigrume Rouge
    it: Ghicocca Rossa
    de: Aprikoko Rot
    es: Bonguri Rojo
    ko: 빨간규토리
    zh_simp: 红球果
    zh_trad: 紅球果
  descriptions:
    jp_kana: "あかい　ぼんぐり。\nつーんと　はなにくる　においがする。"
    jp_kanji: "あかい　ぼんぐり。\nつーんと　はなにくる　においがする。"
    en: A red Apricorn. It assails your nostrils.
    fr: "Un Noigrume de couleur rouge.\nIl dégage un puissant arôme."
    it: "Una ghicocca di colore rosso.\nEmana un odore molto forte."
    de: Eine rote Aprikoko. Besitzt einen stechenden Geruch.
    es: Bonguri de color rojo y aroma muy penetrante.
    ko: "빨간색의 규토리.\n코를 톡 쏘는 향기가 난다."
    zh_simp: "红色的球果。\n有种刺鼻的气味。"
    zh_trad: "紅色的球果。\n有種刺鼻的氣味。"
red_card:
  names:
    jp_kana: レッドカード
    jp_kanji: レッドカード
    en: Red Card
    fr: Carton Rouge
    it: Cartelrosso
    de: Rote Karte
    es: Tarjeta Roja
    ko: 레드카드
    zh_simp: 红牌
    zh_trad: 紅牌
  descriptions:
    jp_kana: "ふしぎな　ちからのある　カード。\nもたせると　わざをつかってきた　あいてを\nたいじょう　させることが　できる。"
    jp_kanji: "不思議な　ちからのある　カード。\n持たせると　技を　使ってきた　相手を\n退場させることが　できる。"
    en: "An item to be held by a Pokémon. When the holder\nis hit by an attack, the attacker is removed\nfrom battle."
    fr: "Objet à tenir. Une carte au pouvoir mystérieux qui\npermet d’éjecter un Pokémon du combat si ce dernier\nattaque le porteur."
    it: "Cartellino dal potere misterioso. Chi ce l’ha\nfa ritirare dalla lotta il Pokémon che lo ha colpito."
    de: "Eine Karte mit mysteriösen Kräften. Wird der Träger\ngetroffen, wird der Angreifer des Platzes verwiesen."
    es: "Misteriosa tarjeta que permite al Pokémon que la lleva\nexpulsar al oponente cuando este le cause daño."
    ko: "이상한 힘이 있는 카드.\n지니게 하면 기술을 사용한 상대를\n퇴장시킬 수 있다."
    zh_simp: "有着神奇力量的卡片。\n携带后，能让使用了\n招式的对手退场。"
    zh_trad: "有著神奇力量的卡片。\n攜帶後，能讓使用了\n招式的對手退場。"
red_chain:
  names:
    jp_kana: あかいくさり
    jp_kanji: あかいくさり
    en: Red Chain
    fr: Chaîne Rouge
    it: Catena rossa
    de: Rote Kette
    es: Cadena Roja
    ko: 빨강사슬
    zh_simp: 红色锁链
    zh_trad: 紅色鎖鏈
  descriptions:
    jp_kana: "シンオウちほうを　うみだした\nでんせつの　ポケモンを　つなぐと\nいわれる　しんわの　どうぐ。"
    jp_kanji: "シンオウ地方を　うみだした\n伝説の　ポケモンを　つなぐと\nいわれる　神話の　道具。"
    en: "A mythical chain that is said to link the\nLegendary Pokémon that created the Sinnoh region."
    fr: "Une chaîne mystique qui serait reliée au Pokémon\nlégendaire ayant créé la région de Sinnoh."
    it: "Catena mitica che si dice leghi il Pokémon leggendario\nche ha creato la regione di Sinnoh."
    de: "Diese mythische Kette soll das Legendäre Pokémon\nbinden können, das einst die Sinnoh-Region erschuf."
    es: "Se dice que esta cadena mística está relacionada con el\nPokémon legendario que creó la región de Sinnoh."
    ko: "신오지방을 만들어 낸\n전설의 포켓몬과 이어진다고\n전해지는 신화의 도구."
    zh_simp: "神话道具。\n据说连接着孕育出\n神奥地区的传说的宝可梦。"
    zh_trad: "神話道具。\n據說連結著孕育出\n神奧地區的傳說的寶可夢。"
red_flute:
  names:
    jp_kana: あかいビードロ
    jp_kanji: あかいビードロ
    en: Red Flute
    fr: Flûte Rouge
    it: Flauto Rosso
    de: Rote Flöte
    es: Flauta Roja
    ko: 빨강비드로
    zh_simp: 红色玻璃哨
    zh_trad: 紅色玻璃哨
  descriptions:
    jp_kana: "あかいガラスで　できた　ふえ。\nメロメロ　じょうたいを\nかいふくする。"
    jp_kanji: "赤いガラスで　できた　笛。\nメロメロ状態を　回復する。"
    en: "A flute made from red glass. It snaps Pokémon\nout of infatuation."
    fr: "Un jouet en forme de flûte en verre rouge.\nAnnule l’effet du statut attraction."
    it: "Flauto fatto di vetro rosso. Ha il potere di guarire\ndall’infatuazione."
    de: Eine Spielzeugflöte aus rotem Glas. Heilt Anziehung.
    es: "Una flauta de cristal rojo cuyas notas vuelven en sí a un\nPokémon enamorado."
    ko: "빨간 유리로 만들어진 피리.\n헤롱헤롱 상태를\n회복한다."
    zh_simp: "以红色玻璃制成的哨子。\n可以治愈着迷状态。"
    zh_trad: "以紅色玻璃製成的笛子。\n可以治癒著迷狀態。"
red_nectar:
  names:
    jp_kana: くれないのミツ
    jp_kanji: くれないのミツ
    en: Red Nectar
    fr: Nectar Rouge
    it: Nettare rosso
    de: Roter Nektar
    es: Néctar Rojo
    ko: 다홍꿀
    zh_simp: 朱红色花蜜
    zh_trad: 朱紅色花蜜
  descriptions:
    jp_kana: "ウラウラのはなぞので　てにいれた\nはなのミツ。　とくていの　ポケモンの\nすがたを　かえる。"
    jp_kanji: "ウラウラの花園で　手に入れた\n花のミツ。　特定の　ポケモンの\n姿を　変える。"
    en: "A flower nectar obtained at Ula’ula Meadow.\nIt changes the form of certain species of Pokémon."
    fr: "Un nectar obtenu au Jardin d’Ula-Ula.\nPermet à un certain Pokémon de changer d’apparence."
    it: "Nettare ottenuto dai fiori del Prato Ula Ula.\nFa cambiare forma a una determinata\nspecie di Pokémon."
    de: "Blütennektar vom Ula-Ula-Blumenmeer. Ein bestimmtes\nPokémon kann damit seine Form ändern."
    es: "Néctar de ciertas flores de los Jardines de Ula-Ula,\ncapaz de hacer cambiar de forma a una determinada\nespecie de Pokémon."
    ko: "울라울라 화원에서 손에 넣은\n꽃의 꿀. 특정 포켓몬의\n모습을 바꾼다."
    zh_simp: "在乌拉乌拉花园里获得的花蜜。\n可以改变特定宝可梦的样子。"
    zh_trad: "在烏拉烏拉花園裡獲得的花蜜。\n可以改變特定寶可夢的樣子。"
red_orb:
  names:
    jp_kana: べにいろのたま
    jp_kanji: べにいろのたま
    en: Red Orb
    fr: Gemme Rouge
    it: Gemma rossa
    de: Roter Edelstein
    es: Prisma Rojo
    ko: 주홍구슬
    zh_simp: 朱红色宝珠
    zh_trad: 朱紅色寶珠
  descriptions:
    jp_kana: "ホウエンちほうの　でんせつと\nふかい　かかわりが　あると　いわれる\nあかく　かがやく　たま。"
    jp_kanji: "ホウエン地方の　伝説と\n深い　関わりが　あると　いわれる\nあかく　かがやく　たま。"
    en: "A shiny red orb that is said to have a legend tied\nto it. It’s known to have a deep connection with the\nHoenn region."
    fr: "Une gemme incarnate dont on dit qu’elle a un lien\ntrès étroit avec les légendes de Hoenn."
    it: "Gemma con riflessi rossi, che pare essere\nstrettamente legata alle leggende della regione\ndi Hoenn."
    de: "Ein rot schimmernder Stein, von dem in den Legenden\nder Hoenn-Region berichtet wird."
    es: "Piedra carmesí de la que se dice que guarda una\nestrecha relación con las leyendas de Hoenn."
    ko: "호연지방의 전설과\n깊은 연관이 있다고 전해지는\n빨갛게 빛나는 구슬."
    zh_simp: "散发着红色光辉的宝珠。\n据说和丰缘地区的传说渊源颇深。"
    zh_trad: "散發著紅色光輝的寶珠。\n據說和豐緣地區的傳說\n有著很深的淵源。"
red_petal:
  names:
    jp_kana: あかのはなびら
    jp_kanji: あかのはなびら
    en: Red Petal
    fr: Pétale Rouge
    it: Petalo rosso
    de: Rotes Blatt
    es: Pétalo Rojo
    ko: 빨강꽃잎
    zh_simp: 红色花瓣
    zh_trad: 紅色花瓣
  descriptions:
    jp_kana: "マツリカのしれんで　カキから\nもらえる　はなびらの　おしばな。\n７しゅるい　あつめるのが　もくてき。"
    jp_kanji: "マツリカの試練で　カキから\nもらえる　はなびらの　押し花。\n７種類　集めるのが　目的。"
    en: "A pressed flower petal you receive from Kiawe\nduring Mina’s trial. The goal is to collect seven\ndifferent kinds of petals."
    fr: "Un pétale pressé que Kiawe vous a remis lors\nde l’Épreuve d’Oléa. Il y en a sept à collectionner."
    it: "Petalo di fiore pressato ottenuto da Kawe durante\nla prova di Rika. L’obiettivo è ricevere sette petali\ndiversi."
    de: "Ein gepresstes Blütenblatt, das man im Rahmen von\nMatsurikas Prüfung von Kiawe erhält. Ziel ist es,\nsieben verschiedene Blütenblätter zu sammeln."
    es: "Pétalo prensado recibido de manos de Kiawe durante la\nprueba de Rika. El objetivo es reunir siete distintos."
    ko: "말리화의 시련에서 키아웨에게\n받을 수 있는 꽃잎의 압화.\n7종류 모으는 것이 목적."
    zh_simp: "在茉莉的考验中，\n能从卡奇那里得到的干花花瓣。\n目标是集齐７种。"
    zh_trad: "在茉莉的考驗中，\n從卡奇那裡得到的壓花花瓣。\n目標是集滿７種花瓣。"
red_scale:
  names:
    jp_kana: あかいウロコ
    jp_kanji: あかいウロコ
    en: Red Scale
    fr: Écaille Rouge
    it: Squama Rossa
    de: Rote Haut
    es: Escama Roja
    ko: 빨간비늘
    zh_simp: 红色鳞片
    zh_trad: 紅色鱗片
  descriptions:
    jp_kana: "いかりのみずうみに　あらわれた\nあかい　ギャラドスの　ウロコ。\nほのおのように　あかく　かがやく。"
    jp_kanji: "怒りの湖に　あらわれた\nあかい　ギャラドスの　ウロコ。\nほのおのように　あかく　かがやく。"
    en: "A scale from a red Gyarados. It glows red like\na flame."
    fr: "Une écaille du Léviator apparu au Lac Colère.\nElle rougeoie comme une flamme."
    it: "Una squama del Gyarados rosso apparso\nal Lago d’Ira. È rossa come il fuoco."
    de: "Eine Schuppe des roten Garados, das im See des Zorns\nerschienen ist. Sie glänzt rot wie Feuer."
    es: "Escama del Gyarados aparecido en el Lago de la Furia.\nEs de un rojo tan intenso como las llamas."
    ko: "분노의 호수에 나타난\n빨간 갸라도스의 비늘.\n불꽃처럼 빨갛게 빛난다."
    zh_simp: "在愤怒之湖里出现的\n红色暴鲤龙的鳞片。\n散发着像火一样的红色光芒。"
    zh_trad: "在憤怒之湖裡出現的\n紅色暴鯉龍的鱗片。\n散發著像火一樣的紅色光芒。"
red_scarf:
  names:
    jp_kana: あかいバンダナ
    jp_kanji: あかいバンダナ
    en: Red Scarf
    fr: Foulard Rouge
    it: Fascia Rossa
    de: Roter Schal
    es: Pañuelo Rojo
    ko: 빨강밴드
    zh_simp: 红色头巾
    zh_trad: 紅色頭巾
  descriptions:
    jp_kana: "もたせて　スーパーコンテストショー！に\nさんかすると　その　ポケモンは\nいつもより　かっこよく　みられる。"
    jp_kanji: "持たせて　スーパーコンテストショー！に\n参加すると　その　ポケモンは\nいつもより　かっこよく　みられる。"
    en: "An item to be held by a Pokémon. During a Super\nContest Show, it raises the Coolness of the\nPokémon holding it."
    fr: "Objet à tenir. Augmente le Sang-froid d’un Pokémon\nlors du Super Show Concours."
    it: "Strumento da dare a un Pokémon. Ne aumenta\nla Classe in una Super Gara-show."
    de: "Ein Item zum Tragen. Trainer erhöhen damit in der\nSuper-Wettbewerbs-Show die Coolness ihres Pokémon."
    es: "Debe llevarlo un Pokémon. Aumenta el carisma en las\nGalas Superconcurso."
    ko: "지니게 하여 슈퍼 콘테스트 쇼!에 참가하면\n그 포켓몬은 여느 때보다 근사하게 보인다."
    zh_simp: "携带它去参加超级华丽大赛的\n宝可梦会比平时看上去更加帅气。"
    zh_trad: "攜帶它去參加超級華麗大賽的\n寶可夢會比平時看起來更加帥氣。"
red_shard:
  names:
    jp_kana: あかいかけら
    jp_kanji: あかいかけら
    en: Red Shard
    fr: Tesson Rouge
    it: Coccio Rosso
    de: Purpurstück
    es: Parte Roja
    ko: 빨강조각
    zh_simp: 红色碎片
    zh_trad: 紅色碎片
  descriptions:
    jp_kana: "あかい　ちいさな　かけら。\nむかしに　つくられた　なにかの\nどうぐの　いちぶ　らしい。"
    jp_kanji: "赤い　小さな　かけら。\n昔に　つくられた　なにかの\n道具の　一部らしい。"
    en: "A small red shard. It appears to be a fragment of\nsome sort of implement made long ago."
    fr: "Un petit tesson rouge.\nIl semble provenir d’un objet très ancien."
    it: "Un piccolo coccio rosso che con ogni probabilità\nè un frammento di un antico strumento."
    de: "Eine rote Scherbe eines antiken Werkzeugs, das vor\nlanger Zeit angefertigt wurde."
    es: "Un pequeño fragmento rojo. Parece formar parte de\nalgún tipo de herramienta antigua."
    ko: "빨간 작은 조각.\n옛날에 만들어진 어떤\n도구의 일부인 듯하다."
    zh_simp: "红色的小碎片。\n好像是以前制作的\n某道具的一部分。"
    zh_trad: "紅色的小碎片。\n好像是以前製作的\n某道具的一部分。"
reins_of_unity:
  names:
    jp_kana: キズナのタヅナ
    jp_kanji: キズナのタヅナ
    en: Reins of Unity
    fr: Rênes de l’Unité
    it: Briglie legame
    de: Zügel des Bundes
    es: Riendas Unión
    ko: 유대의고삐
    zh_simp: 牵绊缰绳
    zh_trad: 牽絆韁繩
  descriptions:
    jp_kana: "ひかりに　かざすと　かがやく　ぬの。\nむかし　にんげんが　ほうじょうのおうに\nかんしゃの　きもちとして　ささげていた。"
    jp_kanji: "光に　かざすと　かがやく　布。\n昔　人間が　豊穣の王に\n感謝の　気持ちとして　捧げていた。"
    en: "Cords that shine when you hold them up to the light.\nThe people of old times presented these to the King of\nBountiful Harvests to express their gratitude."
    fr: "Une courroie faite d’un tissu qui scintille à la lumière.\nLes humains en offraient autrefois au Seigneur\ndes récoltes en gage de leur gratitude."
    it: "Nastri che risplendono se illuminati. Un tempo venivano\nofferti dagli esseri umani al Re dell’abbondanza in\nsegno di gratitudine."
    de: "Zügel gewoben aus Stoff, der leuchtet, wenn man ihn\nins Licht hält. Einst schenkten die Menschen sie dem\nKönig der reichen Ernte als Zeichen ihrer Dankbarkeit."
    es: "Correas elaboradas con un tejido que brilla bajo la luz.\nEn el pasado, los humanos las entregaban como ofrenda\nal Rey de las Cosechas en señal de gratitud."
    ko: "빛에 비추면 반짝이는 천.\n과거에 인간들이 풍요의 왕에게\n감사하는 마음을 담아 바쳤다고 한다."
    zh_simp: "拿到光下即可生辉的布。\n人们曾经将其进献给\n丰饶之王以表感谢之意。"
    zh_trad: "透光時會熠熠生輝的布料。\n人們曾經將它獻給豐饒之王，\n藉此表達感謝之意。"
reins_of_unity:separate:
  names:
    jp_kana: キズナのタヅナ
    jp_kanji: キズナのタヅナ
    en: Reins of Unity
    fr: Rênes de l’Unité
    it: Briglie legame
    de: Zügel des Bundes
    es: Riendas Unión
    ko: 유대의고삐
    zh_simp: 牵绊缰绳
    zh_trad: 牽絆韁繩
  descriptions:
    jp_kana: "ひとが　おうに　けんじょうしていた　タヅナ。\nつながったもの　どうし　いしそつうが　できる。\nバドレックスと　あいばを　ぶんり　させる。"
    jp_kanji: "人が　王に　献上していた　タヅナ。\n繋がった者　同士　意思疎通が　できる。\nバドレックスと　愛馬を　分離させる。"
    en: "Reins that people presented to the king. They enable\nthose who are connected to communicate with each\nother. The reins separate Calyrex and its beloved steed."
    fr: "Une offrande des humains au roi. Ces rênes permettent\nà ceux qu’elles unissent de se comprendre. Elles\npermettent aussi de séparer Sylveroy de son destrier."
    it: "Briglie offerte in dono al re dagli esseri umani.\nPermettono a coloro che sono uniti di comprendersi\ne consentono a Calyrex di separarsi dal suo destriero."
    de: "Zügel, die dem König vom Volk dargeboten wurden.\nSie sorgen für Verständnis zwischen Coronospa und\nseinem treuen Ross und ermöglichen ihre Trennung."
    es: "Riendas que se entregaron como ofrenda al rey.\nPermiten el entendimiento mutuo entre aquellos que\nestán unidos y separan a Calyrex de su amado corcel."
    ko: "인간들이 왕에게 바친 고삐.\n연결된 이들은 의사소통할 수 있게 된다.\n버드렉스와 애마를 분리시킨다."
    zh_simp: "人们曾经用来进献给国王的缰绳。\n通过缰绳连接的二者可以相互交流。\n可使蕾冠王与爱马一分为二。"
    zh_trad: "過去曾由人們獻給國王的韁繩。\n韁繩相繫的生物可以彼此溝通。\n能夠解開蕾冠王與愛馬的合體。"
reins_of_unity:unite:
  names:
    jp_kana: キズナのタヅナ
    jp_kanji: キズナのタヅナ
    en: Reins of Unity
    fr: Rênes de l’Unité
    it: Briglie legame
    de: Zügel des Bundes
    es: Riendas Unión
    ko: 유대의고삐
    zh_simp: 牵绊缰绳
    zh_trad: 牽絆韁繩
  descriptions:
    jp_kana: "ひとが　おうに　けんじょうしていた　タヅナ。\nほうじょうの　ちからを　ぞうふくし\nバドレックスと　あいばを　がったい　させる。"
    jp_kanji: "人が　王に　献上していた　タヅナ。\n豊穣の力を　増幅し\nバドレックスと　愛馬を　合体させる。"
    en: "Reins that people presented to the king. They enhance\nCalyrex’s power over bountiful harvests and unite\nCalyrex with its beloved steed."
    fr: "Une offrande des humains au roi. Ces rênes permettent\nd’unir Sylveroy à son fidèle destrier, et renforcent son\nhabilité à prodiguer d’abondantes récoltes."
    it: "Briglie offerte in dono al re dagli esseri umani.\nAmplificano il potere di Calyrex di donare prosperità\ne gli permettono di unirsi al suo destriero."
    de: "Zügel, die dem König vom Volk dargeboten wurden.\nSie verstärken Coronospas Macht über reiche Ernten\nund ermöglichen das Bündnis mit seinem treuen Ross."
    es: "Riendas que se entregaron como ofrenda al rey.\nPotencian los poderes de Calyrex para mejorar las\ncosechas y le permiten unirse con su amado corcel."
    ko: "인간들이 왕에게 바친 고삐.\n풍요의 힘을 증폭시켜서\n버드렉스와 애마를 합체시킨다."
    zh_simp: "人们曾经用来进献给国王的缰绳。\n可增强丰饶之力，\n并使蕾冠王与爱马合二为一。"
    zh_trad: "過去曾由人們獻給國王的韁繩。\n能夠增強豐饒之力，\n使蕾冠王與愛馬合體。"
relaxed_mint:
  names:
    jp_kana: のんきミント
    jp_kanji: のんきミント
    en: Relaxed Mint
    fr: Aromate Relax
    it: Menta Placida
    de: Locker-Minze
    es: Menta Plácida
    ko: 무사태평민트
    zh_simp: 悠闲薄荷
    zh_trad: 悠閒薄荷
  descriptions:
    jp_kana: "ポケモンに　かおりを　かがせると\nぼうぎょが　あがりやすく　なるが\nすばやさは　あがりにくくなる　ミント。"
    jp_kanji: "ポケモンに　香りを　かがせると\n防御が　上がりやすく　なるが\n素早さは　上がりにくくなる　ミント。"
    en: "When a Pokémon smells this mint, its Defense will grow\nmore easily, but its Speed will grow more slowly."
    fr: "Si un Pokémon hume cet aromate, sa Défense\nmontera plus facilement, mais sa Vitesse\nse développera plus lentement."
    it: "Quando un Pokémon ne sente il profumo, la sua Difesa\naumenta più facilmente a scapito della Velocità."
    de: "Lässt man ein Pokémon an dieser Minze schnuppern,\nsteigt seine Verteidigung schneller, aber seine Initiative\numso langsamer."
    es: "Cuando un Pokémon percibe su aroma, aumenta\ncon más facilidad su Defensa, en detrimento de su\nVelocidad."
    ko: "포켓몬에게 향기를 맡게 하면\n방어가 오르기 쉬워지지만\n스피드가 오르기 어려워지는 민트."
    zh_simp: "宝可梦闻了这种薄荷之后，\n会令防御容易提高，\n而速度则难以提高。"
    zh_trad: "讓寶可夢聞這種薄荷的氣味，\n會令防禦變得容易提高，\n但速度則難以提高。"
relic_band:
  names:
    jp_kana: こだいのうでわ
