electirizer:
  names:
    jp_kana: エレキブースター
    jp_kanji: エレキブースター
    en: Electirizer
    fr: Électriseur
    it: Elettritore
    de: Stromisierer
    es: Electrizador
    ko: 에레키부스터
    zh_simp: 电力增幅器
    zh_trad: 電力增幅器
  descriptions:
    jp_kana: "とてつもない　でんきの　エネルギーが\nたくわえられている　はこ。\nある　ポケモンが　このんでいる。"
    jp_kanji: "とてつもない　電気の　エネルギーが\n蓄えられている　箱。\nある　ポケモンが　好んでいる。"
    en: "A box packed with a tremendous amount of electric\nenergy. It’s loved by a certain Pokémon."
    fr: "Une boîte remplie d’une énorme quantité d’énergie\nélectrique. Appréciée d’un certain Pokémon."
    it: "Scatola strapiena di energia elettrica.\nPiace a un Pokémon in particolare."
    de: "Eine Schachtel mit elektrischer Energie.\nDas Lieblingsstück eines bestimmten Pokémon."
    es: "Este dispositivo contiene una gran cantidad de energía\neléctrica. Cierto Pokémon lo adora."
    ko: "엄청난 전기의 에너지가\n비축되어 있는 상자.\n어떤 포켓몬이 좋아하는 물건이다."
    zh_simp: "积蓄着庞大电气能量的箱子。\n某种宝可梦很喜欢它。"
    zh_trad: "蓄積著龐大\n電氣能量的箱子。\n某種寶可夢很喜歡它。"
electric_gem:
  names:
    jp_kana: でんきのジュエル
    jp_kanji: でんきのジュエル
    en: Electric Gem
    fr: Joyau Électrik
    it: Bijouelettro
    de: Elektrojuwel
    es: Gema Eléctrica
    ko: 전기주얼
    zh_simp: 电之宝石
    zh_trad: 電之寶石
  descriptions:
    jp_kana: "でんきの　タイプの　ジュエル。\nもたせると　いちどだけ　でんきの\nわざの　いりょくが　つよまる。"
    jp_kanji: "でんきの　タイプの　ジュエル。\n持たせると　１度だけ　でんきの\n技の　威力が　強まる。"
    en: "A gem with an essence of electricity. When held,\nit strengthens the power of an Electric-type move\none time."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Électrik."
    it: "Strumento da dare a un Pokémon.\nGioiello che potenzia una sola volta le mosse\ndi tipo Elettro."
    de: "Ein Juwel vom Typ Elektro. Es erhöht einmalig die Stärke\neiner Attacke vom Typ Elektro."
    es: "Joya de un solo uso que potencia los movimientos de\ntipo Eléctrico. Debe llevarla un Pokémon."
    ko: "전기타입의 주얼.\n지니게 하면 한 번만 전기\n기술의 위력이 강해진다."
    zh_simp: "电属性的宝石。\n携带后，电属性的\n招式威力仅会增强１次。"
    zh_trad: "電屬性的寶石。\n攜帶後，電屬性招式的\n威力會僅增強１次。"
electric_memory:
  names:
    jp_kana: エレクトロメモリ
    jp_kanji: エレクトロメモリ
    en: Electric Memory
    fr: ROM Électrik
    it: ROM Elettro
    de: Elektro-Disc
    es: Disco Eléctrico
    ko: 일렉트릭메모리
    zh_simp: 电子存储碟
    zh_trad: 電子記憶碟
  descriptions:
    jp_kana: "でんきタイプの　データが　はいった\nメモリ。　とくていの　ポケモンが\nもつと　タイプが　かわる。"
    jp_kanji: "でんきタイプの　データが　入った\nメモリ。　特定の　ポケモンが　持つと\nタイプが　変わる。"
    en: "A memory disc that contains Electric-type data.\nIt changes the type of the holder if held by\na certain species of Pokémon."
    fr: "Une carte mémoire contenant des données sur\nle type Électrik. Un certain Pokémon peut changer\nde type en l’équipant."
    it: "ROM contenente dati sul tipo Elettro in formato\ndigitale. Permette a un certo Pokémon di cambiare\ntipo."
    de: "Eine Disc mit Daten zum Typ Elektro. Sie löst bei einem\nbestimmten Pokémon einen Typenwechsel aus."
    es: "Disco de datos que contiene información relativa al tipo\nEléctrico. Permite cambiar de tipo a cierto Pokémon."
    ko: "전기타입의 데이터가 들어 있는\n메모리. 특정 포켓몬이\n지니면 타입이 바뀐다."
    zh_simp: "装有电属性数据的存储碟。\n特定宝可梦携带后，\n属性就会发生变化。"
    zh_trad: "裝有電屬性資料的記憶碟。\n特定寶可夢攜帶後，\n就會產生屬性的變化。"
electric_seed:
  names:
    jp_kana: エレキシード
    jp_kanji: エレキシード
    en: Electric Seed
    fr: Graine Électrik
    it: Elettroseme
    de: Elektro-Samen
    es: Semilla Electro
    ko: 일렉트릭시드
    zh_simp: 电气种子
    zh_trad: 電氣種子
  descriptions:
    jp_kana: "ポケモンに　もたせると\nエレキフィールドのときに　つかって\nぼうぎょが　あがる。"
    jp_kanji: "ポケモンに　持たせると\nエレキフィールドのときに　使って\n防御が　あがる。"
    en: "An item to be held by a Pokémon. It boosts Defense\non Electric Terrain. It can only be used once."
    fr: "Objet à tenir. Augmente la Défense lorsque le terrain\nest couvert d’un Champ Électrifié."
    it: "Strumento da dare a un Pokémon.\nFa aumentare la Difesa quando il terreno\ndi lotta è nello stato di Campo Elettrico."
    de: "Gibst du den Samen einem Pokémon zum Tragen, setzt\nes ihn ein, wenn ein Elektrofeld aktiv ist, und erhöht\ndadurch seine Verteidigung."
    es: "Aumenta la Defensa del portador si se usa cuando\nel terreno está cubierto por un campo eléctrico."
    ko: "포켓몬에게 지니게 하면\n일렉트릭필드일 때 사용하여\n방어가 올라간다."
    zh_simp: "让宝可梦携带后，\n在电气场地上使用，\n防御就会提高。"
    zh_trad: "讓寶可夢攜帶後，\n在電氣場地上使用，\n就會提高防禦。"
