    zh_trad: "距今約３０００年前的\n文明裡製造的壺。"
repeat_ball:
  names:
    jp_kana: リピートボール
    jp_kanji: リピートボール
    en: Repeat Ball
    fr: Bis Ball
    it: Bis Ball
    de: Wiederball
    es: Acopio Ball
    ko: 리피드볼
    zh_simp: 重复球
    zh_trad: 重複球
  descriptions:
    jp_kana: "つかまえたことの　ある\nポケモンが　つかまえやすくなる\nちょっと　かわった　ボール。"
    jp_kanji: "捕まえたことの　ある\nポケモンが　捕まえやすくなる\nちょっと　変わった　ボール。"
    en: "A somewhat different Poké Ball that works\nespecially well on a Pokémon species that has been\ncaught before."
    fr: "Une Poké Ball un peu spéciale qui fonctionne\nparticulièrement bien sur les espèces de Pokémon\ndéjà capturées."
    it: "Poké Ball un po’ diversa. Risulta particolarmente\nefficace sulle specie di Pokémon già catturate\nin precedenza."
    de: "Ein Ball, der sich besonders dann sehr gut eignet,\nwenn man ein Pokémon fangen will, dessen Art bereits\ngefangen wurde."
    es: "Es algo distinta a las demás. Funciona especialmente\nbien con las especies de Pokémon ya capturadas."
    ko: "잡은 적이 있는\n포켓몬을 잡기 쉬워지는\n조금 특이한 볼."
    zh_simp: "有点与众不同的球。\n能很容易地捕捉\n以前曾捉到过的宝可梦。"
    zh_trad: "有點與眾不同的球。\n曾經捉到過的寶可夢\n會變得容易捉到。"
repel:
  names:
    jp_kana: むしよけスプレー
    jp_kanji: むしよけスプレー
    en: Repel
    fr: Repousse
    it: Repellente
    de: Schutz
    es: Repelente
    ko: 벌레회피스프레이
    zh_simp: 除虫喷雾
    zh_trad: 除蟲噴霧
  descriptions:
    jp_kana: "つかうと　すこしの　あいだ\nよわい　やせいの　ポケモンが\nまったく　でて　こなくなる。"
    jp_kanji: "使うと　少しの　あいだ\n弱い　野生の　ポケモンが\nまったく　でて　こなくなる。"
    en: "An item that prevents any low-level wild Pokémon\nfrom jumping out at you for a while."
    fr: "Repousse les Pokémon sauvages faibles pendant\nun court moment."
    it: "Strumento che evita a chi lo usa di incontrare\nPokémon selvatici deboli per un po’ di tempo."
    de: Hält für kurze Zeit schwache wilde Pokémon ab.
    es: "Evita encuentros con Pokémon salvajes débiles durante\nun corto período de tiempo."
    ko: "사용하면 잠시 동안\n약한 야생 포켓몬이\n전혀 나오지 않게 된다."
    zh_simp: "使用后，在较短的一段时间内，\n弱小的野生宝可梦将完全不会出现。"
    zh_trad: "使用後的短暫期間，\n弱小的野生寶可夢變得\n完全不會出現。"
reply_mail:
  names:
    jp_kana: おかえしメール
    jp_kanji: おかえしメール
    en: Reply Mail
    fr: Lettre Réponse
    it: Mess. Risp.
    de: Rückbrief
    es: Carta Respuesta
    ko: 답장메일
    zh_simp: 回复邮件
    zh_trad: 回覆郵件
  descriptions:
    jp_kana: "もらった　メールへの　おかえしが\nかきやすい　びんせん。\nポケモンに　もたせて　つかう。"
    jp_kanji: "もらった　メールへの　お返しが\n書きやすい　レターペーパー。\nポケモンに　持たせて　使う。"
    en: "Stationery designed to make it easy to respond\nto a letter you received. Have a Pokémon hold it\nfor delivery."
    fr: "Un papier à lettres idéal pour répondre à un autre\ncourrier. Peut être tenu et livré par un Pokémon."
    it: "Carta da lettere ideale per scrivere una risposta\na un messaggio.\nSi può dare a un Pokémon affinché la consegni."
    de: "Briefpapier, mit dem man einen anderen Brief\nbeantworten kann. Gib es einem Pokémon zum Tragen."
    es: "Carta para responder a un mensaje. Haz que la\nentregue un Pokémon."
    ko: "받은 메일에 대한 답장을\n쉽게 쓸 수 있는 편지지.\n포켓몬에게 지니게 해서 쓴다."
    zh_simp: "方便写回复邮件的信纸。\n使用该道具时，\n需要让宝可梦携带着来用。"
    zh_trad: "方便寫回覆郵件的信紙。\n需讓寶可夢攜帶使用。"
reset_urge:
  names:
    jp_kana: フラットコール
    jp_kanji: フラットコール
    en: Reset Urge
    fr: Réamorçage
    it: Ripristino
    de: Umkehrappell
    es: Quitaestado
    ko: 플랫콜
    zh_simp: ？？？
    zh_trad: ？？？
  descriptions:
    jp_kana: "つかうと　みかたの　ポケモンの\nのうりょく　へんかが　もとにもどる。"
    jp_kanji: "使うと　味方の　ポケモンの\n能力変化が　元に　戻る。"
    en: "When used, it restores any stat changes of an\nally Pokémon."
    fr: "Permet d’annuler les variations de stats d’un Pokémon\nallié."
    it: "Usandolo, tutte le modifiche alle statistiche di\nun Pokémon della squadra saranno annullate."
    de: "Hebt bei Gebrauch Statusveränderungen deines\nMitstreiters auf."
    es: "Cuando se usa, se anulan los cambios en las\ncaracterísticas de un Pokémon de tu equipo."
    ko: "사용하면 같은 편 포켓몬의\n능력 변화가 원래대로 되돌아간다."
    zh_simp: "使用后，我方宝可梦的\n能力变化将消失。"
    zh_trad: "使用後，我方寶可夢的\n能力變化將復原。"
resist_feather:
  names:
    jp_kana: ていこうのハネ
    jp_kanji: ていこうのハネ
    en: Resist Feather
    fr: Plume Armure
    it: Piumtutela
    de: Abwehrfeder
    es: Pluma Aguante
    ko: 저항력날개
    zh_simp: 抵抗之羽
    zh_trad: 抵抗之羽
  descriptions:
    jp_kana: "ポケモンに　つかう　どうぐ。\nポケモン　１ひきの　ぼうぎょの\nきそポイントを　ちょっと　あげる。"
    jp_kanji: "ポケモンに　使う　道具。\nポケモン　１匹の　防御の\n基礎ポイントを　ちょっと　あげる。"
    en: "An item for use on a Pokémon. It slightly increases\nthe Defense base points of a single Pokémon."
    fr: "Objet à utiliser sur un Pokémon pour un peu augmenter\nsa Défense de base."
    it: "Strumento da usare su un Pokémon.\nNe aumenta di poco i punti base della Difesa."
    de: "Wendet man dieses Item auf ein Pokémon an, wird\ndessen Verteidigungs-Basiswert dauerhaft erhöht."
    es: "Pluma que aumenta un poco la Defensa de base de un\nPokémon."
    ko: "포켓몬에게 사용하는 도구.\n포켓몬 1마리의 방어\n기초 포인트를 조금 올린다."
    zh_simp: "用于宝可梦的道具。\n能稍微提高１只宝可梦的\n防御的基础点数。"
    zh_trad: "用於寶可夢的道具。\n能稍微提高１隻寶可夢的\n防禦的基礎點數。"
reveal_glass:
  names:
    jp_kana: うつしかがみ
    jp_kanji: うつしかがみ
    en: Reveal Glass
    fr: Miroir Sacré
    it: Verispecchio
    de: Wahrspiegel
    es: Espejo Veraz
    ko: 비추는거울
    zh_simp: 现形镜
    zh_trad: 現形鏡
  descriptions:
    jp_kana: "しんじつを　うつしだすことで\nポケモンを　ほんらいの　すがたに\nかえてしまう　ふしぎな　かがみ。"
    jp_kanji: "真実を　映しだすことで\nポケモンを　本来の　姿に\n変えてしまう　不思議な　鏡。"
    en: "A looking glass that reveals the truth. It’s a\nmysterious glass that returns a Pokémon to its\noriginal shape."
    fr: "Un mystérieux miroir qui, en reflétant la vérité,\npermet de redonner à un Pokémon sa forme originelle."
    it: "Specchio misterioso che, riflettendo la verità, fa\nriacquistare ai Pokémon la loro forma originaria."
    de: "Ein mysteriöser Spiegel, der Pokémon in ihre eigentliche\nForm verwandelt, indem er die Wahrheit widerspiegelt."
    es: "Espejo misterioso que refleja la verdad y devuelve los\nPokémon a su forma original."
    ko: "진실을 비춰 줌으로\n포켓몬을 본래의 모습으로\n바꿔 버리는 이상한 거울."
    zh_simp: "能够通过照出真实，\n让宝可梦变回原来\n样子的神奇镜子。"
    zh_trad: "能藉由照出真實，\n讓寶可夢變回原來\n樣子的神奇鏡子。"
revival_herb:
  names:
    jp_kana: ふっかつそう
    jp_kanji: ふっかつそう
    en: Revival Herb
    fr: Herbe Rappel
    it: Vitalerba
    de: Vitalkraut
    es: Hierba Revivir
    ko: 부활초
    zh_simp: 复活草
    zh_trad: 復活草
  descriptions:
    jp_kana: "とても　にがい　やくそう。\nひんしの　ポケモン　１ひきの\nＨＰを　すべて　かいふくする。"
    jp_kanji: "とても　にがい　薬草。\nひんしの　ポケモン　１匹の\nＨＰを　すべて　回復する。"
    en: "A terribly bitter medicinal herb. It revives a fainted\nPokémon and fully restores its max HP."
    fr: "Une herbe médicinale très amère.\nRanime un Pokémon K.O. et restaure tous ses PV."
    it: "Erba medicinale amarissima.\nRianima un Pokémon esausto e gli restituisce\ntutti i PS."
    de: "Ein bitteres medizinisches Kraut, das kampfunfähige\nPokémon belebt und die KP vollständig auffüllt."
    es: "Hierba muy amarga que reanima a un Pokémon\ndebilitado y restaura todos sus PS."
    ko: "매우 쓴 약초.\n기절한 포켓몬 1마리의\nHP를 모두 회복한다."
    zh_simp: "非常苦的药草。\n能让１只昏厥的宝可梦\n回复所有ＨＰ。"
    zh_trad: "非常苦的藥草。\n能讓１隻瀕死的寶可夢\n回復所有ＨＰ。"
revive:
  names:
    jp_kana: げんきのかけら
    jp_kanji: げんきのかけら
    en: Revive
    fr: Rappel
    it: Revitalizzante
    de: Beleber
    es: Revivir
    ko: 기력의조각
    zh_simp: 活力碎片
    zh_trad: 活力碎片
  descriptions:
    jp_kana: "ひんしに　なった　ポケモン\n１ひきを　げんきに　したうえで\nＨＰを　はんぶんまで　かいふくする。"
    jp_kanji: "ひんしに　なった　ポケモン\n１匹を　元気に　したうえで\nＨＰを　半分まで　回復する。"
    en: "A medicine that can be used to revive a single\nPokémon that has fainted. It also restores half of\nthe Pokémon’s max HP."
    fr: "Un médicament qui ranime un Pokémon K.O.\net restaure la moitié de ses PV max."
    it: "Rimedio che rianima un Pokémon esausto\ne gli restituisce metà dei suoi PS massimi."
    de: "Eine Medizin, die ein kampfunfähiges Pokémon\nwiederbelebt. Die Hälfte der maximalen KP wird\nwiederhergestellt."
    es: "Medicina que revive a un Pokémon debilitado y le\ndevuelve la mitad de sus PS."
    ko: "기절해 버린 포켓몬\n1마리를 건강하게 하고\nHP를 절반까지 회복한다."
    zh_simp: "能让１只陷入昏厥的\n宝可梦重获生机，\n并回复一半ＨＰ。"
    zh_trad: "能讓１隻陷入瀕死的\n寶可夢重獲生機，\n並回復一半ＨＰ。"
rhyhorn_candy:
  names:
    jp_kana: サイホーンのアメ
    jp_kanji: サイホーンのアメ
    en: Rhyhorn Candy
    fr: Bonbon Rhinocorne
    it: Caramella Rhyhorn
    de: Rihorn-Bonbon
    es: Caramelo Rhyhorn
    ko: 뿔카노의사탕
    zh_simp: 独角犀牛的糖果
    zh_trad: 獨角犀牛的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
ribbon_sweet:
  names:
    jp_kana: リボンアメざいく
    jp_kanji: リボンアメざいく
    en: Ribbon Sweet
    fr: Ruban en Sucre
    it: Bonbonfiocco
    de: Zucker-Schleife
    es: Confite Lazo
    ko: 리본사탕공예
    zh_simp: 蝴蝶结糖饰
    zh_trad: 蝴蝶結糖飾
  descriptions:
    jp_kana: "リボンの　かたちを　した　アメざいく。\nマホミルに　もたせてあげると\nくるくる　まわって　よろこぶ。"
    jp_kanji: "リボンの　形を　した　アメ細工。\nマホミルに　持たせてあげると\nくるくる　回って　喜ぶ。"
    en: "A ribbon-shaped sweet. When a Milcery\nholds this, it spins around happily."
    fr: "Un bonbon en forme de ruban.\nQuand on le donne à un Crèmy, il danse de bonheur."
    it: "Bonbon a forma di fiocco. Se dato a Milcery,\nil Pokémon farà le piroette per la felicità."
    de: "Zuckerwerk in Form einer Schleife. Gibt man es Hokumil\nzum Tragen, dreht es sich vor Freude im Kreis."
    es: "Figura de caramelo con forma de lazo. Al dárselo a\nMilcery, se pone a girar rebosante de alegría."
    ko: "리본 모양의 사탕공예.\n마빌크에게 지니게 하면\n빙빙 돌며 기뻐한다."
    zh_simp: "蝴蝶结形状的工艺糖果。\n让小仙奶携带的话，\n会高兴地转圈圈。"
    zh_trad: "蝴蝶結形狀的工藝糖果。\n讓小仙奶攜帶的話，\n牠會高興得轉圈圈。"
rich_mulch:
  names:
    jp_kana: たわわこやし
    jp_kanji: たわわこやし
    en: Rich Mulch
    fr: Fertibondance
    it: Fertilflorido
    de: Sprießmulch
    es: Abono Fértil
    ko: 주렁주렁비료
    zh_simp: 硕果肥
    zh_trad: 碩果肥
  descriptions:
    jp_kana: "きのみを　そだてるときの　ひりょう。\nしかし　ホウエンちほうの　つちには\nまるで　なじまないので　こうかが　ない。"
    jp_kanji: "きのみを　育てるときの　肥料。\nしかし　ホウエン地方の　土には\nまるで　なじまないので　効果が　ない。"
    en: "A fertilizer for growing Berries. However, it appears\nto be unsuitable for the soil in the Hoenn region and\nhas no effect."
    fr: "Un engrais à utiliser sur un sol meuble.\nIl n’est cependant pas adapté aux terres de Hoenn\net n’y a aucun effet."
    it: "Fertilizzante usato per coltivare le bacche.\nTuttavia, non ha effetto a Hoenn, perché\nnon è adatto al terreno della regione."
    de: "Mulch zur Nutzung auf Beerenfeldern. Durch seine\nUnverträglichkeit mit den Böden in Hoenn bleibt sein\nEinsatz dort ohne Wirkung."
    es: "Un fertilizante usado para el cultivo de bayas. Parece\nque no se asienta bien en el suelo de Hoenn, por lo\nque no tiene efecto en esta región."
    ko: "나무열매를 키울 때 사용하는 비료.\n그러나 호연지방의 흙에는\n전혀 맞지 않기에 효과가 없다."
    zh_simp: "培育树果时的肥料。\n但完全不适合丰缘地区的土壤，\n所以没什么效果。"
    zh_trad: "培育樹果時的肥料。\n但完全不適合豐緣地區的土壤，\n所以沒什麼效果。"
ride_pager:
  names:
    jp_kana: ライドギア
    jp_kanji: ライドギア
    en: Ride Pager
    fr: Appel-Monture
    it: Chiamapassaggio
    de: PokéMobil-Funk
    es: Buscamontura
    ko: 라이드기어
    zh_simp: 骑行装置
    zh_trad: 騎行裝置
  descriptions:
    jp_kana: "ナンバーを　うちこむことで\nたいおうした　ライドポケモンを\nしゅんじに　よびだす　どうぐ。"
    jp_kanji: "ナンバーを　うちこむことで\n対応した　ライドポケモンを\n瞬時に　呼びだす　道具。"
    en: "By entering certain numbers on this pager,\nyou can summon Ride Pokémon in an instant."
    fr: "Un appareil permettant d’appeler une Poké Monture\ninstantanément en tapant le bon numéro."
    it: "Dispositivo che permette di chiamare i Pokémon\ndel Poképassaggio digitando il numero\ncorrispondente."
    de: "Ein Gerät, mit dem durch die Eingabe einer Nummer\ndas entsprechende Pokémon für PokéMobil gerufen\nwird."
    es: "Dispositivo dotado de un teclado numérico con el que\nllamar a diversas Pokémonturas."
    ko: "넘버를 입력하는 것으로\n대응하는 라이드포켓몬을\n순식간에 불러내는 도구."
    zh_simp: "通过输入编号，瞬间召唤\n与编号对应的坐骑宝可梦的道具。"
    zh_trad: "透過輸入編號，瞬間叫出\n與編號對應的坐騎寶可夢的道具。"
rindo_berry:
  names:
    jp_kana: リンドのみ
    jp_kanji: リンドのみ
    en: Rindo Berry
    fr: Baie Ratam
    it: Baccarindo
    de: Grindobeere
    es: Baya Tamar
    ko: 린드열매
    zh_simp: 罗子果
    zh_trad: 羅子果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　くさ　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　くさ技を\n受けたとき　威力が　弱まる。"
    en: "If held by a Pokémon, this Berry will lessen the\ndamage taken from one supereffective\nGrass-type attack."
    fr: "Tenue, cette Baie affaiblit une attaque ennemie\nsuper efficace de type Plante."
    it: "Se un Pokémon ha questa bacca, l’attacco\nsuperefficace di tipo Erba del nemico\nviene indebolito."
    de: "Als getragenes Item schwächt diese Beere sehr effektive\ngegnerische Attacken vom Typ Pflanze."
    es: "Si la lleva un Pokémon, debilita un ataque supereficaz\nde tipo Planta de un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 굉장한 풀 기술로\n공격받았을 때 위력이 약해진다."
    zh_simp: "让宝可梦携带后，\n在受到效果绝佳的草属性招式\n攻击时，能令其威力减弱。"
    zh_trad: "讓寶可夢攜帶後，\n在受到效果絕佳的草屬性招式\n攻擊時，能使其威力減弱。"
ring_target:
  names:
    jp_kana: ねらいのまと
    jp_kanji: ねらいのまと
    en: Ring Target
    fr: Point de Mire
    it: Facilsaglio
    de: Zielscheibe
    es: Blanco
    ko: 겨냥표적
    zh_simp: 标靶
    zh_trad: 標靶
  descriptions:
    jp_kana: "ポケモンの　タイプの　あいしょうで\nむこう　だった　わざが\nあたるように　なってしまう。"
    jp_kanji: "ポケモンの　タイプの　相性で\n無効だった　技が\n当たるように　なってしまう。"
    en: "An item to be held by a Pokémon. Moves that\nnormally have no effect will land on a Pokémon\nholding it."
    fr: "Objet à tenir. Rend le porteur sensible aux capacités\nauxquelles il devrait être immunisé en raison de son\ntype."
    it: "Se un Pokémon ha questo strumento, le mosse\nche di norma non hanno effetto contro il suo tipo\nvanno a segno."
    de: "Attacken, die aufgrund der Wechselwirkungen zwischen\nden Typen keine Wirkung haben, treffen den Träger."
    es: "El Pokémon que lo lleva es vulnerable frente a\nmovimientos que normalmente no afectan a su tipo."
    ko: "포켓몬 타입의 상성 때문에\n무효였던 기술이\n맞게 되어 버린다."
    zh_simp: "原本因宝可梦的属性相克关系\n而无效的招式现在会变得\n能够击中自己。"
    zh_trad: "原本因寶可夢的屬性相剋關係\n而無效的招式現在會變得\n能夠擊中自己。"
rock_gem:
  names:
    jp_kana: いわのジュエル
    jp_kanji: いわのジュエル
    en: Rock Gem
    fr: Joyau Roche
    it: Bijouroccia
    de: Gesteinsjuwel
    es: Gema Roca
    ko: 바위주얼
    zh_simp: 岩石宝石
    zh_trad: 岩石寶石
  descriptions:
    jp_kana: "いわの　タイプの　ジュエル。\nもたせると　いちどだけ　いわの\nわざの　いりょくが　つよまる。"
    jp_kanji: "いわの　タイプの　ジュエル。\n持たせると　１度だけ　いわの\n技の　威力が　強まる。"
    en: "A gem with an essence of rock. When held, it\nstrengthens the power of a Rock-type move\none time."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Roche."
    it: "Strumento da dare a un Pokémon.\nGioiello che potenzia una sola volta le mosse\ndi tipo Roccia."
    de: "Ein Juwel vom Typ Gestein. Es erhöht einmalig die\nStärke einer Attacke vom Typ Gestein."
    es: "Joya de un solo uso que potencia los movimientos de\ntipo Roca. Debe llevarla un Pokémon."
    ko: "바위타입의 주얼.\n지니게 하면 한 번만 바위\n기술의 위력이 강해진다."
    zh_simp: "岩石属性的宝石。\n携带后，岩石属性的\n招式威力仅会增强１次。"
    zh_trad: "岩石屬性的寶石。\n攜帶後，岩石屬性招式的\n威力會僅增強１次。"
rock_incense:
  names:
    jp_kana: がんせきおこう
    jp_kanji: がんせきおこう
    en: Rock Incense
    fr: Encens Roc
    it: Roccioaroma
    de: Steinrauch
    es: Incienso Roca
    ko: 암석향로
    zh_simp: 岩石薰香
    zh_trad: 岩石薰香
  descriptions:
    jp_kana: "ふしぎな　かおりの　おこう。\nもたせると　いわタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "不思議な　香りの　御香。\n持たせると　いわタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon.\nThis exotic-smelling incense boosts the\npower of Rock-type moves."
    fr: "Objet à tenir. Un encens au parfum exotique\naugmentant la puissance des capacités de type Roche."
    it: "Strumento da dare a un Pokémon.\nIncenso dal profumo esotico che potenzia\nle mosse di tipo Roccia."
    de: "Ein Item zum Tragen. Dieses exotische Duftkraut\nverstärkt Attacken vom Typ Gestein."
    es: "Incienso de exótico aroma que fortalece los\nmovimientos de tipo Roca. Debe llevarlo un Pokémon."
    ko: "이상한 향기의 향로.\n지니게 하면 바위타입\n기술의 위력이 올라간다."
    zh_simp: "有着神奇香气的薰香。\n携带后，岩石属性的\n招式威力就会提高。"
    zh_trad: "有著神奇香氣的薰香。\n攜帶後，岩石屬性的\n招式威力就會提高。"
rock_memory:
  names:
    jp_kana: ロックメモリ
    jp_kanji: ロックメモリ
    en: Rock Memory
    fr: ROM Roche
    it: ROM Roccia
    de: Gesteins-Disc
    es: Disco Roca
    ko: 락메모리
    zh_simp: 岩石存储碟
    zh_trad: 岩石記憶碟
  descriptions:
    jp_kana: "いわタイプの　データが　はいった\nメモリ。　とくていの　ポケモンが\nもつと　タイプが　かわる。"
    jp_kanji: "いわタイプの　データが　入った\nメモリ。　特定の　ポケモンが　持つと\nタイプが　変わる。"
    en: "A memory disc that contains Rock-type data.\nIt changes the type of the holder if held by\na certain species of Pokémon."
    fr: "Une carte mémoire contenant des données sur\nle type Roche. Un certain Pokémon peut changer\nde type en l’équipant."
    it: "ROM contenente dati sul tipo Roccia in formato\ndigitale. Permette a un certo Pokémon di cambiare\ntipo."
    de: "Eine Disc mit Daten zum Typ Gestein. Sie löst bei einem\nbestimmten Pokémon einen Typenwechsel aus."
    es: "Disco de datos que contiene información relativa al tipo\nRoca. Permite cambiar de tipo a cierto Pokémon."
    ko: "바위타입의 데이터가 들어 있는\n메모리. 특정 포켓몬이\n지니면 타입이 바뀐다."
    zh_simp: "装有岩石属性数据的存储碟。\n特定宝可梦携带后，\n属性就会发生变化。"
    zh_trad: "裝有岩石屬性資料的記憶碟。\n特定寶可夢攜帶後，\n就會產生屬性的變化。"
rockium_z:bag:
  names:
    jp_kana: イワＺ
    jp_kanji: イワＺ
    en: Rockium Z
    fr: Rocazélite
    it: Petrium Z
    de: Petrium Z
    es: Litostal Z
    ko: 바위Z
    zh_simp: 岩石Ｚ
    zh_trad: 岩石Ｚ
  descriptions:
    jp_kana: "いわタイプの　わざを\nＺワザに　グレードアップする\nＺパワーの　けっしょうを　つくりだす。"
    jp_kanji: "いわタイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nRock-type moves to Rock-type Z-Moves."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise son porteur à transformer ses capacités\nde type Roche en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono ai Pokémon di trasformare le mosse\ndi tipo Roccia in mosse Z."
    de: "Kristallisierte Z-Kraft, die Gesteins-Attacken zu\nZ-Attacken aufstuft. Wird bei Bedarf automatisch\nvervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a los\nportadores convertir sus movimientos de tipo Roca en\nmovimientos Z."
    ko: "바위타입 기술을\nZ기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将岩石属性招式升级成\nＺ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把岩石屬性招式\n升級為Ｚ招式的Ｚ力量結晶。"
rockium_z:held:
  names:
    jp_kana: イワＺ
    jp_kanji: イワＺ
    en: Rockium Z
    fr: Rocazélite
    it: Petrium Z
    de: Petrium Z
    es: Litostal Z
    ko: 바위Z
    zh_simp: 岩石Ｚ
    zh_trad: 岩石Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　けっしょう。\nいわタイプの　わざを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nいわタイプの　技を\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Rock-type moves to Z-Moves."
    fr: "Une cristallisation de la Force Z, permettant\nde transformer les capacités de type Roche\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare le mosse di tipo Roccia\nin mosse Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft\nGesteins-Attacken zu Z-Attacken auf."
    es: "Cristal que confiere el Poder Z a los movimientos\nde tipo Roca."
    ko: "Z파워의 결정.\n바위타입 기술을\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将岩石属性的招式\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把岩石屬性的招式\n升級為Ｚ招式。"
rocky_helmet:
  names:
    jp_kana: ゴツゴツメット
    jp_kanji: ゴツゴツメット
    en: Rocky Helmet
    fr: Casque Brut
    it: Bitorzolelmo
    de: Beulenhelm
    es: Casco Dentado
    ko: 울퉁불퉁멧
    zh_simp: 凸凸头盔
    zh_trad: 凸凸頭盔
  descriptions:
    jp_kana: "ポケモンに　もたせると\nだげきわざを　うけたとき\nあいてにも　ダメージを　あたえる。"
    jp_kanji: "ポケモンに　持たせると\n打撃技を　受けたとき\n相手にも　ダメージを　与える。"
    en: "An item to be held by a Pokémon. If the holder is\nhit, the attacker will also be damaged upon contact."
    fr: "Objet à tenir. Inflige des dégâts à l’attaquant\nsi ce dernier utilise une capacité qui atteint\ndirectement le porteur."
    it: "Se il Pokémon che ha questo strumento è colpito\nda un attacco diretto, anche il nemico subisce\ndei danni."
    de: "Wird der Träger von einer physischen Attacke getroffen,\nerleidet der Angreifer ebenfalls Schaden."
    es: "Si el portador es alcanzado por un movimiento de\ncontacto, el agresor también recibe daño."
    ko: "포켓몬에게 지니게 하면\n타격 기술로 공격받았을 때\n상대에게도 데미지를 준다."
    zh_simp: "让宝可梦携带后，\n在受到打击招式攻击时，\n能给予对手伤害。"
    zh_trad: "讓寶可夢攜帶後，\n在受到打擊招式攻擊時，\n也能給予對手傷害。"
roller_skates:
  names:
    jp_kana: ローラースケート
    jp_kanji: ローラースケート
    en: Roller Skates
    fr: Rollers
    it: Pattini
    de: Rollerskates
    es: Patines
    ko: 롤러스케이트
    zh_simp: 轮滑鞋
    zh_trad: 溜冰鞋
  descriptions:
    jp_kana: "クツぞこに　ローラーが　ついている。\nじめんを　かっそう　したり\nトリックプレイを　きめたりできる。"
    jp_kanji: "クツ底に　ローラーが　ついている。\n地面を　滑走　したり\nトリックプレイを　決めたりできる。"
    en: "Attaches roller skates to the bottom of your shoes,\nallowing you to glide quickly around and\nperform tricks."
    fr: "Aussi connus sous le nom de patins à roulettes,\nils permettent de se déplacer rapidement\net éventuellement de réaliser des figures."
    it: "Pattini applicati alla suola delle scarpe.\nPermettono di pattinare e di eseguire figure."
    de: "Schuhe mit Rädern an der Sohle. Mit ihnen kannst du\nüber den Boden rollen und Tricks ausführen."
    es: "Ruedas que se acoplan a la suela del calzado y te\npermiten ir más rápido y realizar piruetas\nespectaculares."
    ko: "신발 바닥에 롤러가 달려 있다.\n지면을 활주하거나\n트릭플레이를 할 수 있다."
    zh_simp: "鞋底下装着滑轮。\n能在地面上滑行，\n或漂亮地表演特技。"
    zh_trad: "鞋底裝著滑輪。\n能在地面上滑行，\n或漂亮地表演特技。"
room_service:
  names:
    jp_kana: ルームサービス
    jp_kanji: ルームサービス
    en: Room Service
    fr: Chariot Distordu
    it: Distorservizio
    de: Bizarroservice
    es: Servicio Raro
    ko: 룸서비스
    zh_simp: 客房服务
    zh_trad: 客房服務
  descriptions:
    jp_kana: "ポケモンに　もたせると\nトリックルームのときに　つかって\nすばやさが　さがる。"
    jp_kanji: "ポケモンに　持たせると\nトリックルームのときに　使って\n素早さが　下がる。"
    en: "An item to be held by a Pokémon. Lowers Speed when\nTrick Room takes effect."
    fr: "Objet à tenir. Baisse la Vitesse du porteur\nlorsque la capacité Distorsion est active."
    it: "Se un Pokémon ha questo strumento quando il campo\ndi lotta è sotto l’effetto di Distortozona,\nla sua Velocità diminuisce."
    de: Senkt die Initiative des Trägers, wenn Bizarroraum wirkt.
    es: "Si lo lleva un Pokémon, reduce la Velocidad cuando se\nusa Espacio Raro."
    ko: "포켓몬에게 지니게 하면\n트릭룸일 때 사용하여\n스피드가 떨어진다."
    zh_simp: "让宝可梦携带后，\n在戏法空间使用时，\n速度会下降。"
    zh_trad: "讓寶可夢攜帶後，\n當戲法空間成功時，\n速度會降低。"
root_fossil:
  names:
    jp_kana: ねっこのカセキ
    jp_kanji: ねっこのカセキ
    en: Root Fossil
    fr: Fossile Racine
    it: Radifossile
    de: Wurzelfossil
    es: Fósil Raíz
    ko: 뿌리화석
    zh_simp: 根状化石
    zh_trad: 根狀化石
  descriptions:
    jp_kana: "おおむかし　うみに　すんでいた\nこだい　ポケモンの　カセキ。\nねっこの　いちぶ　らしい。"
    jp_kanji: "大昔　海に　すんでいた\n古代ポケモンの　カセキ。\nねっこの　一部らしい。"
    en: "A fossil from a prehistoric Pokémon that once lived\nin the sea. It looks as if it could be part of a\nplant’s root."
    fr: "Le fossile d’un ancien Pokémon aquatique.\nOn dirait un morceau de racine."
    it: "Fossile di un Pokémon preistorico che viveva in\nmare. Sembra essere parte di una radice."
    de: "Das Fossil eines uralten Pokémon, das in der Tiefsee\nlebte. Es sieht wie eine Pflanzenwurzel aus."
    es: "Fósil de un Pokémon prehistórico que vivía en el fondo\ndel mar. Parece ser parte de una raíz."
    ko: "오랜 옛날 바다에 살았던\n고대 포켓몬의 화석.\n뿌리의 일부인 듯하다."
    zh_simp: "很久以前栖息在海里的\n古代宝可梦的化石。\n好像是根的一部分。"
    zh_trad: "很久以前棲息在海裡的\n古代寶可夢的化石。\n好像是根的一部分。"
rose_incense:
  names:
    jp_kana: おはなのおこう
    jp_kanji: おはなのおこう
    en: Rose Incense
    fr: Encens Fleur
    it: Rosaroma
    de: Rosenrauch
    es: Incienso Floral
    ko: 꽃향로
    zh_simp: 花朵薰香
    zh_trad: 花朵薰香
  descriptions:
    jp_kana: "ふしぎな　かおりの　おこう。\nもたせると　くさタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "不思議な　香りの　御香。\n持たせると　くさタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon.\nThis exotic-smelling incense boosts the\npower of Grass-type moves."
    fr: "Objet à tenir. Un encens au parfum exotique\naugmentant la puissance des capacités de type Plante."
    it: "Strumento da dare a un Pokémon.\nIncenso dal profumo esotico che potenzia\nle mosse di tipo Erba."
    de: "Ein Item zum Tragen. Dieses exotische Duftkraut\nverstärkt Attacken vom Typ Pflanze."
    es: "Incienso de exótico aroma que fortalece los\nmovimientos de tipo Planta. Debe llevarlo un Pokémon."
    ko: "이상한 향기의 향로.\n지니게 하면 풀타입\n기술의 위력이 올라간다."
    zh_simp: "有着神奇香气的薰香。\n携带后，草属性的\n招式威力就会提高。"
    zh_trad: "有著神奇香氣的薰香。\n攜帶後，草屬性的\n招式威力就會提高。"
roseli_berry:
  names:
    jp_kana: ロゼルのみ
    jp_kanji: ロゼルのみ
    en: Roseli Berry
    fr: Baie Selro
    it: Baccarcadè
    de: Hibisbeere
    es: Baya Hibis
    ko: 로셀열매
    zh_simp: 洛玫果
    zh_trad: 洛玫果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　フェアリー　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　フェアリー技を\n受けたとき　威力が　弱まる。"
    en: "If held by a Pokémon, this Berry will lessen the\ndamage taken from one supereffective\nFairy-type attack."
    fr: "Tenue, cette Baie affaiblit une attaque ennemie\nsuper efficace de type Fée."
    it: "Se un Pokémon ha questa bacca, l’attacco\nsuperefficace di tipo Folletto del nemico\nviene indebolito."
    de: "Als getragenes Item schwächt diese Beere sehr effektive\ngegnerische Attacken vom Typ Fee."
    es: "Si la lleva un Pokémon, debilita un ataque supereficaz\nde tipo Hada de un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 굉장한 페어리 기술로\n공격받았을 때 위력이 약해진다."
    zh_simp: "让宝可梦携带后，\n在受到效果绝佳的妖精属性招式\n攻击时，能令其威力减弱。"
    zh_trad: "讓寶可夢攜帶後，\n在受到效果絕佳的妖精屬性招式\n攻擊時，能使其威力減弱。"
roto_bargain:
  names:
    jp_kana: やすうりポン
    jp_kanji: やすうりポン
    en: Roto Bargain
    fr: Moti-Promo
    it: Sconto’n’roll
    de: Schnäppchenbon
    es: Cupón Rebaja
    ko: 할인캡슐토이
    zh_simp: 优惠碰碰
    zh_trad: 優惠碰碰
  descriptions:
    jp_kana: "ロトムパワーの　ひとつ。\nつかうと　フレンドリィショップの\nしょうひんが　はんがくに　なる。"
    jp_kanji: "ロトムパワーの　ひとつ。\n使うと　フレンドリィショップの\n商品が　半額に　なる。"
    en: "One of the Rotom Powers.\nIt reduces the prices of products at Poké Marts\nby half."
    fr: "Une des Motism’Auras. Elle permet de réduire de moitié\nle coût des objets vendus dans les Boutiques Pokémon."
    it: "Potere Rotom che consente di acquistare\ni prodotti del Pokémon-Market a metà prezzo."
    de: "Diese Rotom-Kraft bewirkt, dass die Preise im\nPokémon-Supermarkt halbiert werden."
    es: "Poder Rotom que reduce a la mitad el coste de los\nartículos en las Tiendas Pokémon."
    ko: "로토무파워 중 하나.\n사용하면 프렌들리숍의\n상품이 반값이 된다."
    zh_simp: "洛托姆之力的一种。\n使用后，友好商店的\n商品就会变成半价。"
    zh_trad: "洛托姆之力的一種。\n使用後，友好商店的\n商品就會變成半價。"
roto_boost:
  names:
    jp_kana: おうえんポン
    jp_kanji: おうえんポン
    en: Roto Boost
    fr: Moti-Soutien
    it: Stat’n’roll
    de: Statuswertebon
    es: Cupón Refuerzo
    ko: 응원캡슐토이
    zh_simp: 加油碰碰
    zh_trad: 加油碰碰
  descriptions:
    jp_kana: "ロトムパワーの　ひとつ。\nたたかっている　じぶんの　ポケモンの\nのうりょくが　すべて　あがる。"
    jp_kanji: "ロトムパワーの　ひとつ。\n戦っている　自分の　ポケモンの\n能力が　すべて　あがる。"
    en: "One of the Rotom Powers.\nIt raises all stats of your battling Pokémon."
    fr: "Une des Motism’Auras. Elle permet d’augmenter\ntoutes les stats de vos Pokémon en combat."
    it: "Potere Rotom che fa aumentare tutte le statistiche\ndei propri Pokémon impegnati in una lotta."
    de: "Diese Rotom-Kraft bewirkt, dass im Kampf die\nStatuswerte der eigenen Pokémon auf der\nMitstreiterseite erhöht werden."
    es: "Poder Rotom que hace aumentar las características\nde los Pokémon de tu equipo que estén combatiendo."
    ko: "로토무파워 중 하나.\n싸우고 있는 자신의 포켓몬의\n능력이 모두 올라간다."
    zh_simp: "洛托姆之力的一种。\n正在战斗的我方宝可梦的\n所有能力都会提高。"
    zh_trad: "洛托姆之力的一種。\n可以提升戰鬥中的\n我方寶可夢的所有能力。"
roto_catch:
  names:
    jp_kana: つかまえポン
    jp_kanji: つかまえポン
    en: Roto Catch
    fr: Moti-Capture
    it: Acchiappa’n’roll
    de: Fangbon
    es: Cupón Captura
    ko: 잡기캡슐토이
    zh_simp: 捕捉碰碰
    zh_trad: 捕捉碰碰
  descriptions:
    jp_kana: "ロトムパワーの　ひとつ。　つかうと\nめのまえにいる　やせいポケモンが\nとても　つかまえやすくなる。"
    jp_kanji: "ロトムパワーの　ひとつ。　使うと\n目の前にいる　野生ポケモンが\nとても　捕まえやすくなる。"
    en: "One of the Rotom Powers.\nIt increases the chance to catch Pokémon\na lot."
    fr: "Une des Motism’Auras. Elle permet d’attraper\nbeaucoup plus facilement le Pokémon sauvage\nque vous affrontez."
    it: "Potere Rotom che rende considerevolmente\npiù facile catturare i Pokémon selvatici."
    de: "Diese Rotom-Kraft bewirkt, dass wilde Pokémon mit\nhöherer Wahrscheinlichkeit gefangen werden."
    es: "Poder Rotom que aumenta mucho la probabilidad\nde capturar al Pokémon salvaje al que te estés\nenfrentando."
    ko: "로토무파워 중 하나. 사용하면\n눈앞에 있는 야생 포켓몬을\n매우 잡기 쉬워진다."
    zh_simp: "洛托姆之力的一种。\n使用后，眼前的野生宝可梦\n会变得非常容易捕捉。"
    zh_trad: "洛托姆之力的一種。\n使用後，可以讓眼前的\n野生寶可夢變得非常容易捕捉。"
roto_encounter:
  names:
    jp_kana: みっけポン
    jp_kanji: みっけポン
    en: Roto Encounter
    fr: Moti-Appât
    it: Incontra’n’roll
    de: Lockbon
    es: Cupón Reclamo
    ko: 발견캡슐토이
    zh_simp: 相遇碰碰
    zh_trad: 相遇碰碰
  descriptions:
    jp_kana: "ロトムパワーの　ひとつ。\nいっていじかん　レベルの　たかい\nやせいポケモンと　であいやすくなる。"
    jp_kanji: "ロトムパワーの　ひとつ。\n一定時間　レベルの　高い\n野生ポケモンと　出会いやすくなる。"
    en: "One of the Rotom Powers.\nIt increases the chance of encountering high-level\nwild Pokémon a lot for a certain period of time."
    fr: "Une des Motism’Auras. Elle permet de rencontrer\nplus de Pokémon sauvages de haut niveau durant\nune période déterminée."
    it: "Potere Rotom che aumenta le probabilità\ndi incontrare Pokémon selvatici di livello alto\nper un certo lasso di tempo."
    de: "Diese Rotom-Kraft bewirkt, dass wilde Pokémon mit\nhohem Level für eine bestimmte Zeit viel häufiger\nerscheinen."
    es: "Poder Rotom que aumenta la probabilidad de encontrar\nPokémon salvajes de nivel alto durante un tiempo\ndeterminado."
    ko: "로토무파워 중 하나.\n일정 시간 레벨이 높은\n야생 포켓몬과 만나기 쉬워진다."
    zh_simp: "洛托姆之力的一种。\n一定时间内，会变得容易\n遇到高等级的野生宝可梦。"
    zh_trad: "洛托姆之力的一種。\n在一定時間內可以變得\n容易遇見等級高的野生寶可夢。"
roto_exp_points:
  names:
    jp_kana: けいけんポン
    jp_kanji: けいけんポン
    en: Roto Exp. Points
    fr: Moti-Exp
    it: Esp’n’roll
    de: EP-Bon
    es: Cupón Exp
    ko: 경험캡슐토이
    zh_simp: 经验碰碰
    zh_trad: 經驗碰碰
  descriptions:
    jp_kana: "ロトムパワーの　ひとつ。\nしょうぶの　あとに　もらえる\nけいけんちが　すこし　ふえる。"
    jp_kanji: "ロトムパワーの　ひとつ。\n勝負の　あとに　もらえる\n経験値が　少し　増える。"
    en: "One of the Rotom Powers.\nIt increases the Exp. Points your Pokémon receive\nafter battle a little."
    fr: "Une des Motism’Auras. Elle permet d’augmenter\nlégèrement l’expérience gagnée par vos Pokémon\nen combat."
    it: "Potere Rotom che fa aumentare un po’\ni Punti Esperienza ottenuti dopo ogni lotta."
    de: "Diese Rotom-Kraft bewirkt, dass Pokémon im Kampf\nmehr Erfahrungspunkte erhalten."
    es: "Poder Rotom que incrementa ligeramente los Puntos de\nExperiencia obtenidos en combate."
    ko: "로토무파워 중 하나.\n승부 후에 얻는\n경험치가 조금 늘어난다."
    zh_simp: "洛托姆之力的一种。\n对战后能得到的\n经验值会稍微增加。"
    zh_trad: "洛托姆之力的一種。\n對戰後可獲得的\n經驗值將會稍微增加。"
roto_friendship:
  names:
    jp_kana: なつきポン
    jp_kanji: なつきポン
    en: Roto Friendship
    fr: Moti-Cœur
    it: Affetto’n’roll
    de: Freundschaftsbon
    es: Cupón Amistad
    ko: 친밀도캡슐토이
    zh_simp: 亲密碰碰
    zh_trad: 親密碰碰
  descriptions:
    jp_kana: "ロトムパワーの　ひとつ。\nつれている　ポケモンが\nかなり　なかよく　なりやすくなる。"
    jp_kanji: "ロトムパワーの　ひとつ。\n連れている　ポケモンが\nかなり　なかよく　なりやすくなる。"
    en: "One of the Rotom Powers.\nIt helps Pokémon in your party grow friendly faster."
    fr: "Une des Motism’Auras. Elle permet d’augmenter\nplus rapidement l’amitié que vous portent les Pokémon\nde votre équipe."
    it: "Potere Rotom che fa sì che i Pokémon in squadra\naumentino il loro livello di amicizia molto più\nfacilmente."
    de: "Diese Rotom-Kraft bewirkt, dass im Team mitgeführte\nPokémon viel schneller zutraulich werden."
    es: "Poder Rotom que hace que el grado de amistad de los\nPokémon del equipo aumente más rápido."
    ko: "로토무파워 중 하나.\n데리고 있는 포켓몬과\n상당히 친밀해지기 쉬워진다."
    zh_simp: "洛托姆之力的一种。\n带在身边的宝可梦\n会变得非常容易亲近。"
    zh_trad: "洛托姆之力的一種。\n帶在身邊的寶可夢\n會非常容易和訓練家變得友好。"
roto_hatch:
  names:
    jp_kana: タマゴふかポン
    jp_kanji: タマゴふかポン
    en: Roto Hatch
    fr: Moti-Couveuse
    it: Cova’n’roll
    de: Brutbon
    es: Cupón Eclosión
    ko: 알부화캡슐토이
    zh_simp: 孵蛋碰碰
    zh_trad: 孵蛋碰碰
  descriptions:
    jp_kana: "ロトムパワーの　ひとつ。\nつかうと　タマゴが\nとても　かえりやすくなる。"
    jp_kanji: "ロトムパワーの　ひとつ。\n使うと　タマゴが\nとても　かえりやすくなる。"
    en: "One of the Rotom Powers.\nIt helps Eggs hatch faster."
    fr: "Une des Motism’Auras. Elle permet de faire éclore\nles Œufs beaucoup plus rapidement."
    it: "Potere Rotom che aumenta considerevolmente\nla rapidità con cui si schiudono le Uova."
    de: "Diese Rotom-Kraft bewirkt, dass Pokémon schneller aus\nEiern schlüpfen."
    es: "Poder Rotom que hace que los Huevos eclosionen\nmucho antes."
    ko: "로토무파워 중 하나.\n사용하면 알이\n매우 부화하기 쉬워진다."
    zh_simp: "洛托姆之力的一种。\n使用后，蛋就会变得\n非常容易孵化。"
    zh_trad: "洛托姆之力的一種。\n使用後，蛋就會變得\n非常容易孵化。"
roto_hp_restore:
  names:
    jp_kana: ＨＰかいふくポン
    jp_kanji: ＨＰかいふくポン
    en: Roto HP Restore
    fr: Moti-Récup’ PV
    it: PS’n’roll
    de: KP-Bon
    es: Cupón PS
    ko: HP회복캡슐토이
    zh_simp: ＨＰ回复碰碰
    zh_trad: ＨＰ回復碰碰
  descriptions:
    jp_kana: "ロトムパワーの　ひとつ。\nたたかっている　じぶんの　ポケモンの\nＨＰが　すべて　かいふくする。"
    jp_kanji: "ロトムパワーの　ひとつ。\n戦っている　自分の　ポケモンの\nＨＰが　すべて　回復する。"
    en: "One of the Rotom Powers.\nIt fully restores the HP of your battling Pokémon."
    fr: "Une des Motism’Auras. Elle permet à vos Pokémon\nen combat de récupérer la totalité de leurs PV."
    it: "Potere Rotom che permette ai propri Pokémon\nimpegnati in una lotta di recuperare tutti i PS."
    de: "Diese Rotom-Kraft bewirkt, dass im Kampf die KP der\neigenen Pokémon auf der Mitstreiterseite vollständig\nwiederaufgefüllt werden."
    es: "Poder Rotom que restaura todos los PS de los Pokémon\nde tu equipo que estén combatiendo."
    ko: "로토무파워 중 하나.\n싸우고 있는 자신의 포켓몬의\nHP가 모두 회복한다."
    zh_simp: "洛托姆之力的一种。\n正在战斗的我方宝可梦的\nＨＰ会全部回复。"
    zh_trad: "洛托姆之力的一種。\n可以回復戰鬥中的\n我方寶可夢所有的ＨＰ。"
roto_pp_restore:
  names:
    jp_kana: ＰＰかいふくポン
    jp_kanji: ＰＰかいふくポン
    en: Roto PP Restore
    fr: Moti-Récup’ PP
    it: PP’n’roll
    de: AP-Bon
    es: Cupón PP
    ko: PP회복캡슐토이
    zh_simp: ＰＰ回复碰碰
    zh_trad: ＰＰ回復碰碰
  descriptions:
    jp_kana: "ロトムパワーの　ひとつ。\nたたかっている　じぶんの　ポケモンの\nＰＰが　すべて　かいふくする。"
    jp_kanji: "ロトムパワーの　ひとつ。\n戦っている　自分の　ポケモンの\nＰＰが　すべて　回復する。"
    en: "One of the Rotom Powers.\nIt fully restores the PP of your battling Pokémon."
    fr: "Une des Motism’Auras. Elle permet à vos Pokémon\nen combat de récupérer la totalité de leurs PP."
    it: "Potere Rotom che permette ai propri Pokémon\nimpegnati in una lotta di recuperare tutti i PP."
    de: "Diese Rotom-Kraft bewirkt, dass im Kampf die AP der\neigenen Pokémon auf der Mitstreiterseite vollständig\nwiederaufgefüllt werden."
    es: "Poder Rotom que restaura todos los PP de los Pokémon\nde tu equipo que estén combatiendo."
    ko: "로토무파워 중 하나.\n싸우고 있는 자신의 포켓몬의\nPP가 모두 회복한다."
    zh_simp: "洛托姆之力的一种。\n正在战斗的我方宝可梦的\nＰＰ会全部回复。"
    zh_trad: "洛托姆之力的一種。\n可以回復戰鬥中的\n我方寶可夢所有的ＰＰ。"
roto_prize_money:
  names:
    jp_kana: おこづかいポン
    jp_kanji: おこづかいポン
    en: Roto Prize Money
    fr: Moti-Magot
    it: Soldi’n’roll
    de: Preisgeldbon
    es: Cupón Botín
    ko: 용돈캡슐토이
    zh_simp: 零花钱碰碰
    zh_trad: 零用錢碰碰
  descriptions:
    jp_kana: "ロトムパワーの　ひとつ。\nしょうぶの　あとに　もらえる\nおこづかいが　３ばいに　なる。"
    jp_kanji: "ロトムパワーの　ひとつ。\n勝負の　あとに　もらえる\nおこづかいが　３倍に　なる。"
    en: "One of the Rotom Powers.\nIt triples the prize money you receive after battle."
    fr: "Une des Motism’Auras. Elle permet de tripler\nles gains d’argent à la fin d’un combat."
    it: "Potere Rotom che triplica la quantità\ndi soldi ottenuti dopo ogni lotta."
    de: "Diese Rotom-Kraft bewirkt, dass sich das nach einem\ngewonnenen Kampf erhaltene Preisgeld verdreifacht."
    es: "Poder Rotom que triplica las ganancias obtenidas en\ncombate."
    ko: "로토무파워 중 하나.\n승부 후에 받는\n용돈이 3배가 된다."
    zh_simp: "洛托姆之力的一种。\n对战后能得到的\n零花钱会变成３倍。"
    zh_trad: "洛托姆之力的一種。\n對戰後可獲得的\n零用錢將會變成３倍。"
roto_stealth:
  names:
    jp_kana: かくれポン
    jp_kanji: かくれポン
    en: Roto Stealth
    fr: Moti-Camouflage
    it: Repelle’n’roll
    de: Schutzbon
    es: Cupón Sigilo
    ko: 숨기캡슐토이
    zh_simp: 隐身碰碰
    zh_trad: 隱身碰碰
  descriptions:
    jp_kana: "ロトムパワーの　ひとつ。\nいっていじかん　やせいポケモンと\nぜんぜん　であわなくなる。"
    jp_kanji: "ロトムパワーの　ひとつ。\n一定時間　野生ポケモンと\nぜんぜん　出会わなくなる。"
    en: "One of the Rotom Powers.\nIt prevents you from encountering wild Pokémon for\na certain period of time."
    fr: "Une des Motism’Auras. Elle permet de ne plus\nrencontrer de Pokémon sauvages durant\nune période déterminée."
    it: "Potere Rotom che permette di evitare\nl’incontro con i Pokémon selvatici\nper un certo lasso di tempo."
    de: "Diese Rotom-Kraft bewirkt, dass für eine bestimmte\nZeit keine wilden Pokémon erscheinen."
    es: "Poder Rotom que permite evitar por completo los\nencuentros con Pokémon salvajes durante un tiempo\ndeterminado."
    ko: "로토무파워 중 하나.\n일정 시간 야생 포켓몬과\n전혀 만나지 않게 된다."
    zh_simp: "洛托姆之力的一种。\n一定时间内，会变得完全\n不会遇到野生宝可梦。"
    zh_trad: "洛托姆之力的一種。\n在一定時間內會變得\n完全無法遇見野生寶可夢。"
rotom_bike:glistening_black:
  names:
    jp_kana: ロトムじてんしゃ
    jp_kanji: ロトムじてんしゃ
    en: Rotom Bike
    fr: Moticyclette
    it: Bici Rotom
    de: Rotom-Rad
    es: Bici Rotom
    ko: 로토무자전거
    zh_simp: 洛托姆自行车
    zh_trad: 洛托姆自行車
  descriptions:
    jp_kana: "ロトムの　ちからで　ターボが　でき\nすいじょうも　はしれる　じてんしゃ。\nあかぐろく　ひかる　ギラギラブラック。"
    jp_kanji: "ロトムの　力で　ターボが　でき\n水上も　走れる　じてんしゃ。\n赤黒く　光る　ギラギラブラック。"
    en: "This bike can do a turbo boost and run on the water\nusing Rotom’s power. It’s a glistening black that\nshines reddish-black."
    fr: "Une bicyclette qui permet de mettre le turbo\net de se déplacer sur l’eau grâce à Motisma.\nSon noir crépusculaire brille d’une lueur rouge."
    it: "Una bicicletta dotata del turbo che può anche spostarsi\nin acqua grazie ai poteri di Rotom. È di colore nero\nscintillante ed emana una luce rossastra."
    de: "Ein gleißend schwarzes Fahrrad, das dank Rotom über\neinen Turbo verfügt und auf dem Wasser gefahren\nwerden kann. Versprüht schwarz-rote Funken."
    es: "Gracias al poder de Rotom, esta bicicleta permite usar\nel turbo y desplazarse sobre el agua. De color negro y\ncon una fulgurante estela rojinegra."
    ko: "로토무의 힘으로 터보를 사용할 수 있고\n물 위에서도 달릴 수 있는 자전거.\n검붉게 빛나는 글리터링 블랙 디자인이다."
    zh_simp: "能借助洛托姆的力量进行涡轮加速，\n且可在水面上骑行的自行车。\n闪烁着红黑色光泽的炫耀黑。"
    zh_trad: "能用洛托姆的力量進行渦輪加速，\n還能在水上移動的自行車。\n會閃閃發出赤黑亮光的炫耀黑。"
rotom_bike:land:
  names:
    jp_kana: ロトムじてんしゃ
    jp_kanji: ロトムじてんしゃ
    en: Rotom Bike
    fr: Moticyclette
    it: Bici Rotom
    de: Rotom-Rad
    es: Bici Rotom
    ko: 로토무자전거
    zh_simp: 洛托姆自行车
    zh_trad: 洛托姆自行車
  descriptions:
    jp_kana: "ポケモンの　ロトムが\nモーターに　はいったことで\nターボが　できるようになった　じてんしゃ。"
    jp_kanji: "ポケモンの　ロトムが\nモーターに　入ったことで\nターボが　できるようになった　じてんしゃ。"
    en: "This bike can be combined with the Pokémon Rotom to\nuse a turbo boost."
    fr: "Motisma est entré dans le moteur de cette bicyclette\nà assistance électrique et permet désormais de mettre\nle turbo."
    it: "Una bicicletta che permette di mettere il turbo\ngrazie al Rotom che è entrato nel suo motore."
    de: "Ein Fahrrad mit einem Motor, in dem sich ein Rotom\nbefindet. Dank des Rotom-Turbos erreicht das Rad\nabsolute Spitzengeschwindigkeiten."
    es: "Una bicicleta en la que puede activarse el turbo, al\nllevar al Pokémon Rotom incorporado en el motor."
    ko: "포켓몬 로토무가\n모터에 들어가서\n터보를 사용할 수 있게 된 자전거."
    zh_simp: "宝可梦洛托姆潜入马达后，\n这辆自行车变得可以\n通过涡轮发动机加速了。"
    zh_trad: "由於寶可夢洛托姆\n進入了這輛自行車的馬達中，\n使得它變得可以進行渦輪加速。"
rotom_bike:sparkling_white:
  names:
    jp_kana: ロトムじてんしゃ
    jp_kanji: ロトムじてんしゃ
    en: Rotom Bike
    fr: Moticyclette
    it: Bici Rotom
    de: Rotom-Rad
    es: Bici Rotom
    ko: 로토무자전거
    zh_simp: 洛托姆自行车
    zh_trad: 洛托姆自行車
  descriptions:
    jp_kana: "ロトムの　ちからで　ターボが　でき\nすいじょうも　はしれる　じてんしゃ。\nしろく　かがやく　ぴかぴかホワイト。"
    jp_kanji: "ロトムの　力で　ターボが　でき\n水上も　走れる　じてんしゃ。\n白く　輝く　ぴかぴかホワイト。"
    en: "This bike can do a turbo boost and run on the water\nusing Rotom’s power. It’s a sparkling white that\nshines brilliantly."
    fr: "Une bicyclette qui permet de mettre le turbo et de\nse déplacer sur l’eau grâce à Motisma. D’une blancheur\néclatante, elle projette des étincelles sur son passage."
    it: "Una bicicletta dotata del turbo che può anche spostarsi\nin acqua grazie ai poteri di Rotom. È di un bianco\nsfavillante."
    de: "Ein glitzernd weißes Fahrrad, das dank Rotom über\neinen Turbo verfügt und auf dem Wasser gefahren\nwerden kann. Versprüht weiße Funken."
    es: "Gracias al poder de Rotom, esta bicicleta permite usar\nel turbo y desplazarse sobre el agua. Tiene un color\nblanco centelleante."
    ko: "로토무의 힘으로 터보를 사용할 수 있고\n물 위에서도 달릴 수 있는 자전거.\n하얗게 빛나는 스파클링 화이트 디자인이다."
    zh_simp: "能借助洛托姆的力量进行涡轮加速，\n且可在水面上骑行的自行车。\n洁白耀眼的闪亮白。"
    zh_trad: "能用洛托姆的力量進行渦輪加速，\n還能在水上移動的自行車。\n潔白耀眼的閃亮白。"
rotom_bike:water:
  names:
    jp_kana: ロトムじてんしゃ
    jp_kanji: ロトムじてんしゃ
    en: Rotom Bike
    fr: Moticyclette
    it: Bici Rotom
    de: Rotom-Rad
    es: Bici Rotom
    ko: 로토무자전거
    zh_simp: 洛托姆自行车
    zh_trad: 洛托姆自行車
  descriptions:
    jp_kana: "ポケモンの　ロトムを　くみあわせ\nターボが　できるようになった　だけでなく\nすいじょうも　はしれる　じてんしゃ。"
    jp_kanji: "ポケモンの　ロトムを　組み合わせ\nターボが　できるようになった　だけでなく\n水上も　走れる　じてんしゃ。"
    en: "This bike can be combined with the Pokémon Rotom to\nnot only do a turbo boost but also run on the water."
    fr: "Sous l’influence de Motisma, cette bicyclette permet\nnon seulement de mettre le turbo, mais également\nde se déplacer sur l’eau."
    it: "La presenza di Rotom non permette solo di usare\nil turbo, ma anche di correre sulla superficie dell’acqua."
    de: "Ein Fahrrad, in dem sich ein Rotom befindet. Es wurde\nnicht nur um den Rotom-Turbo erweitert, sondern kann\nsich jetzt auch auf dem Wasser fortbewegen."
    es: "Combinada con el Pokémon Rotom, esta bicicleta te\npermite usar un turbo y también desplazarte por encima\ndel agua."
    ko: "포켓몬 로토무와의 조합으로\n터보를 사용할 수 있을 뿐만 아니라\n물 위에서도 달릴 수 있는 자전거."
    zh_simp: "自行车和宝可梦洛托姆组合后，\n不仅可以通过涡轮发动机加速，\n而且可以在水面上骑行。"
    zh_trad: "和寶可夢洛托姆結合的自行車。\n不僅可以進行渦輪加速，\n還能在水上移動。"
rotom_catalog:
  names:
    jp_kana: ロトムのカタログ
    jp_kanji: ロトムのカタログ
    en: Rotom Catalog
    fr: Moti-Catalogue
    it: Catalogo Rotom
    de: Rotom-Katalog
    es: Catálogo Rotom
    ko: 로토무카탈로그
    zh_simp: 洛托姆型录
    zh_trad: 洛托姆型錄
  descriptions:
    jp_kana: "ロトムが　すきな　かでんが　のっている。\nカタログを　つかうことで　ロトムを\nかでんに　いれたり　だすことが　できる。"
    jp_kanji: "ロトムが　好きな　家電が　載っている。\nカタログを　使うことで　ロトムを\n家電に　いれたり　だすことが　できる。"
    en: "A catalog of devices that Rotom like. Use the catalog\nto have Rotom hop in and out of the various devices\nlisted within."
    fr: "Un catalogue présentant divers appareils ménagers\nque Motisma apprécie. À utiliser pour faire entrer\nMotisma dans ces appareils ou l’en faire sortir."
    it: "Contiene una lista degli apparecchi che piacciono\na Rotom. Può essere usato per far entrare Rotom\nnel motore degli elettrodomestici o per farlo uscire."
    de: "Ein Katalog, der Rotoms Lieblingsgeräte auflistet.\nMit diesem Katalog kann Rotom in Geräte schlüpfen\nund sie wieder verlassen."
    es: "Un catálogo de los artilugios favoritos de Rotom que le\npermite introducirse o salir fácilmente de los mismos."
    ko: "로토무가 좋아하는 가전제품이 실려 있다.\n카탈로그를 사용하면 로토무를\n가전제품에 넣거나 꺼낼 수 있다."
    zh_simp: "上面记载着洛托姆喜欢的家电。\n通过使用这本指南，可以\n让洛托姆潜入或脱离家电。"
    zh_trad: "記載著洛托姆喜歡的電器。\n透過使用這本型錄，可以讓\n洛托姆進入或離開電器。"
rowap_berry:
  names:
    jp_kana: レンブのみ
    jp_kanji: レンブのみ
    en: Rowap Berry
    fr: Baie Pommo
    it: Baccaroam
    de: Roselbeere
    es: Baya Magua
    ko: 애터열매
    zh_simp: 雾莲果
    zh_trad: 霧蓮果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nとくしゅわざを　うけたとき\nあいてにも　ダメージを　あたえる。"
    jp_kanji: "ポケモンに　持たせると\n特殊技を　受けたとき\n相手にも　ダメージを　あたえる。"
    en: "A Berry to be consumed by Pokémon. If a special\nattack hits the Pokémon holding it, the attacker will\nalso be hurt."
    fr: "Tenue, cette Baie inflige des dégâts à l’attaquant\ns’il utilise une capacité spéciale qui atteint sa cible."
    it: "Se un Pokémon ha questa bacca, chi attacca\nsubirà danni se la sua mossa speciale va a segno."
    de: "Als getragenes Item bewirkt diese Beere Schaden bei\njenen, die den Träger mit einer Spezial-Attacke treffen."
    es: "Si la lleva un Pokémon cuando otro lanza un ataque\nespecial, este último también recibe daño."
    ko: "포켓몬에게 지니게 하면\n특수 기술로 공격받았을 때\n상대에게도 데미지를 준다."
    zh_simp: "让宝可梦携带后，\n在受到特殊招式攻击时，\n能给予对手伤害。"
    zh_trad: "讓寶可夢攜帶後，\n在受到特殊招式攻擊時，\n也能給予對手傷害。"
rsvp_mail:
  names:
    jp_kana: おさそいメール
    jp_kanji: おさそいメール
    en: RSVP Mail
    fr: Lettre Invit
    it: Messaggio Invito
    de: Einladebrief
    es: Carta Invitar
    ko: 권유메일
    zh_simp: 邀请邮件
    zh_trad: 邀請郵件
  descriptions:
    jp_kana: "あいてを　おさそいする　メールが\nかきやすい　びんせん。\nポケモンに　もたせて　つかう。"
    jp_kanji: "相手を　お誘いする　メールが\n書きやすい　レターペーパー。\nポケモンに　持たせて　使う。"
    en: "Stationery designed to allow you to extend an\ninvitation to the recipient. Have a Pokémon hold it\nfor delivery."
    fr: "Un papier à lettres idéal pour les invitations.\nPeut être tenu et livré par un Pokémon."
    it: "Carta da lettere ideale per scrivere un invito.\nSi può dare a un Pokémon affinché la consegni."
    de: "Briefpapier, mit dem man eine andere Person zu etwas\neinladen kann. Gib es einem Pokémon zum Tragen."
    es: "Carta para invitar a un compañero. Haz que la entregue\nun Pokémon."
    ko: "상대를 초대하는 메일을\n쉽게 쓸 수 있는 편지지.\n포켓몬에게 지니게 해서 쓴다."
    zh_simp: "方便写邀请对方这类邮件的信纸。\n使用该道具时，\n需要让宝可梦携带着来用。"
    zh_trad: "方便寫邀請對方這類郵件的信紙。\n需讓寶可夢攜帶使用。"
rule_book:
  names:
    jp_kana: ルールブック
    jp_kanji: ルールブック
    en: Rule Book
    fr: Livre Règles
    it: Libro Regole
    de: Regelbuch
    es: Reglamento
    ko: 룰북
    zh_simp: 规则书
    zh_trad: 規則書
  descriptions:
    jp_kana: "たいせんの　ルールが　かかれている。\nつうしんたいせん　するとき\nルールを　えらぶことが　できる。"
    jp_kanji: "対戦の　ルールが　かかれている。\n通信対戦するとき\nルールを　選ぶことが　できる。"
    en: "It lists the rules for holding battles.\nFor Link Battles, you may choose which set of rules\nyou wish to use."
    fr: "La liste des règles de combat.\nPermet de choisir les règles des combats en réseau."
    it: "Elenca le regole per le lotte. Nelle lotte in link\npuoi scegliere diversi set di regole da utilizzare."
    de: "Enthält die Kampfregeln. Bei Link-Kämpfen kannst du\ndaraus die gewünschten Regeln wählen."
    es: "Recoge las normas de los combates. En los combates en\nconexión puedes elegir el conjunto de reglas que\nquieres usar."
    ko: "대전에 대한 룰이 적혀 있다.\n통신대전을 할 때\n룰을 선택할 수 있다."
    zh_simp: "写着对战规则。\n在进行连接对战时，\n可以选择规则。"
    zh_trad: "寫著對戰規則。\n在進行連線對戰時，\n可以選擇規則。"
rusted_shield:
  names:
    jp_kana: くちたたて
    jp_kanji: くちたたて
    en: Rusted Shield
    fr: Bouclier Rouillé
    it: Scudo rovinato
    de: Rostiger Schild
    es: Escudo Oxidado
    ko: 녹슨방패
    zh_simp: 腐朽的盾
    zh_trad: 腐朽的盾
  descriptions:
    jp_kana: "おおむかしの　えいゆうが　さいやくを\nうちはらったと　つたえられる　たて　だが\nいまは　さびて　ボロボロに　なっている。"
    jp_kanji: "大昔の　英雄が　災厄を\n討ち払ったと　伝えられる　盾　だが\nいまは　さびて　ボロボロに　なっている。"
    en: "It is said that a hero used this shield to halt a terrible\ndisaster in ancient times. But it’s grown rusty and worn."
    fr: "On raconte que ce bouclier fut jadis utilisé\npar un héros pour vaincre une calamité.\nÀ présent, il est tout usé et rouillé."
    it: "Si racconta che in passato un eroe riuscì a respingere\nla calamità servendosi di questo scudo. Ora è tutto\narrugginito e rovinato."
    de: "Mit diesem Schild soll ein Held einstmals großes Unheil\nabgewendet haben. Rost sowie der Zahn der Zeit haben\njedoch ihre Spuren hinterlassen."
    es: "Cuenta una antigua leyenda que un valiente héroe\nasió este escudo para hacer frente a un cataclismo,\npero ahora está oxidado y en un estado lamentable."
    ko: "먼 옛날의 영웅이 재앙을 막는 데\n사용했다고 전해지는 방패지만\n지금은 녹이 슬고 닳아 버렸다."
    zh_simp: "据说很久以前，英雄就是\n拿着这面盾驱走了灾厄。\n而现在早已变得锈迹斑斑。"
    zh_trad: "據說在很久以前，英雄就是\n用這面盾來擊退災厄。\n但現在已經生鏽，變得破爛不堪。"
rusted_sword:
  names:
    jp_kana: くちたけん
    jp_kanji: くちたけん
    en: Rusted Sword
    fr: Épée Rouillée
    it: Spada rovinata
    de: Rostiges Schwert
    es: Espada Oxidada
    ko: 녹슨검
    zh_simp: 腐朽的剑
    zh_trad: 腐朽的劍
  descriptions:
    jp_kana: "おおむかしの　えいゆうが　さいやくを\nうちはらったと　つたえられる　けん　だが\nいまは　さびて　ボロボロに　なっている。"
    jp_kanji: "大昔の　英雄が　災厄を\n討ち払ったと　伝えられる　剣　だが\nいまは　さびて　ボロボロに　なっている。"
    en: "It is said that a hero used this sword to halt a terrible\ndisaster in ancient times. But it’s grown rusty and worn."
    fr: "On raconte que cette épée fut jadis utilisée\npar un héros pour vaincre une calamité.\nÀ présent, elle est toute usée et rouillée."
    it: "Si racconta che in passato un eroe riuscì a respingere\nla calamità servendosi di questa spada. Ora è tutta\narrugginita e rovinata."
    de: "Mit diesem Schwert soll ein Held einstmals großes\nUnheil abgewendet haben. Rost sowie der Zahn der\nZeit haben jedoch ihre Spuren hinterlassen."
    es: "Cuenta una antigua leyenda que un valiente héroe\nblandió esta espada para hacer frente a un cataclismo,\npero ahora está oxidada y en un estado lamentable."
    ko: "먼 옛날의 영웅이 재앙을 막는 데\n사용했다고 전해지는 검이지만\n지금은 녹이 슬고 닳아 버렸다."
    zh_simp: "据说很久以前，英雄就是\n拿着这把剑驱走了灾厄。\n而现在早已变得锈迹斑斑。"
    zh_trad: "據說在很久以前，英雄就是\n用這把劍來擊退災厄。\n但現在已經生鏽，變得破爛不堪。"
sablenite:
  names:
    jp_kana: ヤミラミナイト
    jp_kanji: ヤミラミナイト
    en: Sablenite
    fr: Ténéfixite
    it: Sableyite
    de: Zobirisnit
    es: Sableynita
    ko: 깜까미나이트
    zh_simp: 勾魂眼进化石
    zh_trad: 勾魂眼進化石
  descriptions:
    jp_kana: "ヤミラミに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "ヤミラミに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Sableye hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Ténéfix, elle lui permet de méga-évoluer\ndurant un combat."
    it: "Una delle misteriose Megapietre.\nData a Sableye, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Zobiris getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Sableye en combate."
    ko: "깜까미에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让勾魂眼携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓勾魂眼攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
sachet:
  names:
    jp_kana: においぶくろ
    jp_kanji: においぶくろ
    en: Sachet
    fr: Sachet Senteur
    it: Bustina aromi
    de: Duftbeutel
    es: Saquito Fragante
    ko: 향기주머니
    zh_simp: 香袋
    zh_trad: 香袋
  descriptions:
    jp_kana: "ちょっと　きつめの　かおりをだす\nこうりょうを　つめた　ふくろ。\nある　ポケモンが　このんでいる。"
    jp_kanji: "ちょっと　きつめの　香りをだす\n香料を　詰めた　袋。\nある　ポケモンが　好んでいる。"
    en: "A sachet filled with fragrant perfumes that are just\nslightly too overwhelming. Yet it’s loved by a\ncertain Pokémon."
    fr: "Un sachet d’herbes et d’épices, au parfum trop marqué\npour beaucoup, mais néanmoins apprécié\nd’un certain Pokémon."
    it: "Una bustina che contiene aromi dal profumo\npiuttosto intenso.\nPiace a un Pokémon in particolare."
    de: "Ein mit Parfüm gefüllter Beutel, der einen penetranten\nDuft verströmt und bei einer bestimmten Pokémon-Art\nsehr beliebt ist."
    es: "Un saquito lleno de sustancias aromáticas cuyo perfume\nresulta abrumador, pero que a cierto Pokémon le\nencanta."
    ko: "살짝 강렬한 향기가 나는\n향료를 채운 주머니.\n어떤 포켓몬이 좋아하는 물건이다."
    zh_simp: "装着散发微浓香气的\n香料的袋子。\n某种宝可梦很喜欢它。"
    zh_trad: "裝著散發有點濃的香氣的\n香料的袋子。\n某種寶可夢很喜歡它。"
sacred_ash:
  names:
    jp_kana: せいなるはい
    jp_kanji: せいなるはい
    en: Sacred Ash
    fr: Cendre Sacrée
    it: Ceneremagica
    de: Zauberasche
    es: Ceniza Sagrada
    ko: 성스러운분말
    zh_simp: 圣灰
    zh_trad: 聖灰
  descriptions:
    jp_kana: "ひんしに　なってしまった\nポケモン　ぜんいんの　ＨＰを\nすべて　かいふくする。"
    jp_kanji: "ひんしに　なってしまった\nポケモン　全員の　ＨＰを\nすべて　回復する。"
    en: "This rare ash can revive all fainted Pokémon in a\nparty. In doing so, it also fully restores their max HP."
    fr: Ranime tous les Pokémon K.O. et restaure tous leurs PV.
    it: "Rimedio che rianima tutti i Pokémon esausti,\nrestituendo loro anche tutti i PS."
    de: "Belebt und erfrischt alle besiegten Pokémon und\nfüllt deren KP wieder vollständig auf."
    es: "Reanima completamente a todos los Pokémon\ndebilitados y restaura todos sus PS."
    ko: "기절해 버린\n포켓몬 전원의 HP를\n모두 회복한다."
    zh_simp: "能让陷入昏厥的\n全部宝可梦\n回复所有ＨＰ。"
    zh_trad: "能讓所有\n陷入瀕死的寶可夢\n回復所有ＨＰ。"
safari_ball:
  names:
    jp_kana: サファリボール
    jp_kanji: サファリボール
    en: Safari Ball
    fr: Safari Ball
    it: Safari Ball
    de: Safariball
    es: Safari Ball
    ko: 사파리볼
    zh_simp: 狩猎球
    zh_trad: 狩獵球
  descriptions:
    jp_kana: "だいしつげんの　なか　だけで\nつかう　とくべつな　ボール。\nめいさいがらに　なっている。"
    jp_kanji: "大湿原の　中だけで\n使う　特別な　ボール。\n迷彩柄に　なっている。"
    en: "A special Poké Ball that is used only in the\nGreat Marsh. It is recognizable by the camouflage\npattern decorating it."
    fr: "Une Poké Ball spéciale dont l’usage est réservé au\nGrand Marais. Elle est décorée d’un motif camouflage."
    it: "Poké Ball speciale, usata soltanto nella Gran Palude.\nÈ decorata con un motivo mimetico."
    de: "Ein Ball, der nur im Großmoor eingesetzt wird.\nEr besticht durch sein Tarnfarbenmuster."
    es: "Poké Ball con un diseño de camuflaje que se utiliza\núnicamente en el Gran Pantano."
    ko: "대습초원 내에서\n사용하는 특별한 볼.\n얼룩무늬로 되어 있다."
    zh_simp: "仅能在大湿地中使用的特殊的球。\n上面有迷彩花纹。"
    zh_trad: "僅能在大濕地中\n使用的特殊的球。\n上面有迷彩花紋。"
safety_goggles:
  names:
    jp_kana: ぼうじんゴーグル
    jp_kanji: ぼうじんゴーグル
    en: Safety Goggles
    fr: Lunettes Filtre
    it: Visierantisabbia
    de: Schutzbrille
    es: Gafa Protectora
    ko: 방진고글
    zh_simp: 防尘护目镜
    zh_trad: 防塵護目鏡
  descriptions:
    jp_kana: "てんこうの　ダメージだけでなく\nこなを　だす　わざの\nこうかも　ふせげる　ゴーグル。"
    jp_kanji: "天候の　ダメージだけでなく\n粉を　だす　技の\n効果も　防げる　ゴーグル。"
    en: "An item to be held by a Pokémon. These goggles\nprotect the holder from both weather-related\ndamage and powder."
    fr: "Objet à tenir. Protège le Pokémon contre les dégâts\ndus à la météo et la plupart des capacités utilisant\nde la poudre."
    it: "Visiera che protegge dai danni legati alle condizioni\natmosferiche e dalla maggior parte delle mosse\nche rilasciano polvere."
    de: "Diese Brille schützt ihren Träger nicht nur vor\nwetterbedingtem Schaden, sondern auch vor vielen\nAttacken, bei denen Puder eingesetzt wird."
    es: "Gafa que protege de los efectos adversos del clima y\ndel polvo lanzado por los rivales."
    ko: "날씨로 인한 데미지뿐만 아니라\n가루를 내보내는 기술의\n효과도 막을 수 있는 고글."
    zh_simp: "不单是天气造成的伤害，\n就连粉末类招式的效果\n也能防御的护目镜。"
    zh_trad: "不單是天氣造成的傷害，\n連放出粉末的招式效果\n也能防止的護目鏡。"
sail_fossil:
  names:
    jp_kana: ヒレのカセキ
    jp_kanji: ヒレのカセキ
    en: Sail Fossil
    fr: Fossile Nageoire
    it: Fossilpinna
    de: Flossenfossil
    es: Fósil Aleta
    ko: 지느러미화석
    zh_simp: 鳍之化石
    zh_trad: 鰭之化石
  descriptions:
    jp_kana: "おおむかし　ちじょうで　くらした\nこだい　ポケモンの　カセキ。\nくびの　ヒレの　いちぶ　らしい。"
    jp_kanji: "大昔　地上で　暮らした\n古代ポケモンの　カセキ。\n首の　ヒレの　一部らしい。"
    en: "A fossil from a prehistoric Pokémon that once lived\non the land. It looks like the impression from a\nskin sail."
    fr: "Le fossile d’un Pokémon préhistorique terrestre.\nOn dirait un morceau de nageoire."
    it: "Fossile di un Pokémon preistorico che viveva\nsulla terraferma. Sembra far parte di una pinna."
    de: "Das Fossil eines uralten Pokémon, das an Land lebte.\nEs sieht wie eine Flosse aus."
    es: "Fósil de un Pokémon prehistórico terrestre. Parece la\nimpresión de una aleta."
    ko: "오랜 옛날 지상에서 살았던\n고대 포켓몬의 화석.\n목지느러미의 일부인 듯하다."
    zh_simp: "很久以前生活在地上的\n古代宝可梦的化石。\n好像是头鳍的一部分。"
    zh_trad: "很久以前生活在地上的\n古代寶可夢的化石。\n好像是頭鰭的一部分。"
salac_berry:
  names:
    jp_kana: カムラのみ
    jp_kanji: カムラのみ
    en: Salac Berry
    fr: Baie Sailak
    it: Baccasalak
    de: Salkabeere
    es: Baya Aslac
    ko: 캄라열매
    zh_simp: 沙鳞果
    zh_trad: 沙鱗果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nピンチのとき　じぶんの\nすばやさが　あがる。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　自分の\n素早さが　あがる。"
    en: "A Berry to be consumed by Pokémon. If a Pokémon\nholds one, its Speed stat will increase when it’s in\na pinch."
    fr: Tenue, cette Baie augmente la Vitesse en cas de besoin.
    it: "Se il Pokémon che ha questa bacca si trova\nin difficoltà, la sua Velocità aumenta."
    de: "Als getragenes Item erhöht diese Beere den\nInitiative-Wert eines Pokémon, sobald es in einer\nNotlage steckt."
    es: "Si la lleva un Pokémon, le sube la Velocidad en un\nmomento de apuro."
    ko: "포켓몬에게 지니게 하면\n위급할 때 자신의\n스피드가 올라간다."
    zh_simp: "让宝可梦携带后，危机时，\n自己的速度就会提高。"
    zh_trad: "讓寶可夢攜帶後，\n危機時，自己的\n速度就會提高。"
salad_mix:
  names:
    jp_kana: やさいパック
    jp_kanji: やさいパック
    en: Salad Mix
    fr: Légumes
    it: Verdure
    de: Gemüse
    es: Verduras
    ko: 채소팩
    zh_simp: 袋装蔬菜
    zh_trad: 袋裝蔬菜
  descriptions:
    jp_kana: "キャンプの　りょうりに　つかう\nしょくざいの　いっしゅ。いろんな　やさいの\nつめあわせで　けんこうに　よさそう。"
    jp_kanji: "キャンプの　料理に　使う\n食材の　一種。いろんな　野菜の\n詰めあわせで　健康に　よさそう。"
    en: "One of the many ingredients that can be used for\ncooking at your camp. The assortment of vegetables\nlooks quite appealing and healthy."
    fr: "Un ingrédient de cuisine pour le camping.\nCet assortiment de légumes divers permet de préparer\ndes plats équilibrés."
    it: "Uno degli ingredienti che puoi usare per cucinare\nin campeggio. Un assortimento di ortaggi dall’aria\nmolto salutare."
    de: "Eine Zutat für PokéCamping-Mahlzeiten. Diese bunte\nMischung aus verschiedenen Gemüsesorten sorgt für\neine ausgewogene und gesunde Ernährung."
    es: "Un ingrediente para cocinar en el campamento. Una\nmezcla muy sana de varios tipos de verduras."
    ko: "캠프 요리에 사용되는\n식재료 중 하나. 다양한 채소가\n들어 있어 건강에 좋아 보인다."
    zh_simp: "在露营营地制作料理时会使用的\n一种食材。将各种蔬菜搭配到一起，\n看上去就非常有益健康。"
    zh_trad: "製作露營料理時使用的食材之一。\n裡面裝著什錦蔬菜，\n看起來十分有益健康。"
salamencite:
  names:
    jp_kana: ボーマンダナイト
    jp_kanji: ボーマンダナイト
    en: Salamencite
    fr: Drattakite
    it: Salamencite
    de: Brutalandanit
    es: Salamencita
    ko: 보만다나이트
    zh_simp: 暴飞龙进化石
    zh_trad: 暴飛龍進化石
  descriptions:
    jp_kana: "ボーマンダに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "ボーマンダに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Salamence hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Drattak, elle lui permet de méga-évoluer\ndurant un combat."
    it: "Una delle misteriose Megapietre.\nData a Salamence, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Brutalanda getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Salamence en combate."
    ko: "보만다에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "暴飞龙携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "暴飛龍攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
sandshrew_candy:
  names:
    jp_kana: サンドのアメ
    jp_kanji: サンドのアメ
    en: Sandshrew Candy
    fr: Bonbon Sabelette
    it: Caramella Sandshrew
    de: Sandan-Bonbon
    es: Caramelo Sandshrew
    ko: 모래두지의사탕
    zh_simp: 穿山鼠的糖果
    zh_trad: 穿山鼠的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
sassy_mint:
  names:
    jp_kana: なまいきミント
    jp_kanji: なまいきミント
    en: Sassy Mint
    fr: Aromate Malpoli
    it: Menta Vivace
    de: Forsch-Minze
    es: Menta Grosera
    ko: 건방민트
    zh_simp: 自大薄荷
    zh_trad: 自大薄荷
  descriptions:
    jp_kana: "ポケモンに　かおりを　かがせると\nとくぼうが　あがりやすく　なるが\nすばやさは　あがりにくくなる　ミント。"
    jp_kanji: "ポケモンに　香りを　かがせると\n特防が　上がりやすく　なるが\n素早さは　上がりにくくなる　ミント。"
    en: "When a Pokémon smells this mint, its Sp. Def will grow\nmore easily, but its Speed will grow more slowly."
    fr: "Si un Pokémon hume cet aromate, sa Défense Spéciale\nmontera plus facilement, mais sa Vitesse\nse développera plus lentement."
    it: "Quando un Pokémon ne sente il profumo,\nla sua Difesa Speciale aumenta più facilmente\na scapito della Velocità."
    de: "Lässt man ein Pokémon an dieser Minze schnuppern,\nsteigt seine Spezial-Verteidigung schneller, aber seine\nInitiative umso langsamer."
    es: "Cuando un Pokémon percibe su aroma, aumenta con\nmás facilidad su Defensa Especial, en detrimento de su\nVelocidad."
    ko: "포켓몬에게 향기를 맡게 하면\n특수방어가 오르기 쉬워지지만\n스피드가 오르기 어려워지는 민트."
    zh_simp: "宝可梦闻了这种薄荷之后，\n会令特防容易提高，\n而速度则难以提高。"
    zh_trad: "讓寶可夢聞這種薄荷的氣味，\n會令特防變得容易提高，\n但速度則難以提高。"
sausages:
  names:
    jp_kana: あらびきヴルスト
    jp_kanji: あらびきヴルスト
    en: Sausages
    fr: Saucisses
    it: Salsicce
    de: Würstchen
    es: Salchichas
    ko: 탱글탱글부어스트
    zh_simp: 粗绞肉香肠
    zh_trad: 粗絞肉香腸
  descriptions:
    jp_kana: "キャンプの　りょうりに　つかう\nしょくざいの　いっしゅ。ヴルストとは\nソーセージの　しゅるい。ボイルしてたべる。"
    jp_kanji: "キャンプの　料理に　使う\n食材の　一種。ヴルストとは\nソーセージの　種類。ボイルして食べる。"
    en: "One of the many ingredients that can be used for\ncooking at your camp. These sausages should be\nboiled before eating."
    fr: "Un ingrédient de cuisine pour le camping.\nÀ faire bouillir avant de déguster."
    it: "Uno degli ingredienti che puoi usare per cucinare\nin campeggio. Questo tipo di salsiccia va mangiato\nbollito."
    de: "Eine Zutat für PokéCamping-Mahlzeiten. Die kleinen\ngroben Würstchen werden vor dem Verzehr gekocht."
    es: "Un ingrediente para cocinar en el campamento.\nSi te apetece disfrutar de su delicioso sabor, basta\ncon hervirlas."
    ko: "캠프 요리에 사용되는\n식재료 중 하나. 부어스트는\n소시지의 한 종류다. 삶아서 먹는다."
    zh_simp: "在露营营地制作料理时会使用的\n一种食材。白香肠是香肠的一种。\n需要先煮过之后再食用。"
    zh_trad: "製作露營料理時使用的食材之一。\n是香腸的一種，\n水煮後方可食用。"
scanner:
  names:
    jp_kana: たんちき
    jp_kanji: たんちき
    en: Scanner
    fr: Scanner
    it: Scanner
    de: Scanner
    es: Escáner
    ko: 탐지기
    zh_simp: 探测器
    zh_trad: 探測器
  descriptions:
    jp_kana: "シーキンセツの　なかで\nみつけた　どうぐ。"
    jp_kanji: "シーキンセツの　中で\nみつけた　道具。"
    en: A device found inside Sea Mauville.
    fr: Un objet trouvé à Lavandia Sea.
    it: "Dispositivo trovato nella scogliera artificiale\nCiclamare."
    de: "Ein Gerät, das du in Seewoge Malvenfroh gefunden\nhast."
    es: Objeto hallado en el interior de Malvamar.
    ko: "씨보라 안에서\n발견한 도구."
    zh_simp: "在海紫堇中\n找到的道具。"
    zh_trad: "在海紫菫中\n找到的道具。"
sceptilite:
  names:
    jp_kana: ジュカインナイト
    jp_kanji: ジュカインナイト
    en: Sceptilite
    fr: Jungkite
    it: Sceptilite
    de: Gewaldronit
    es: Sceptilita
    ko: 나무킹나이트
    zh_simp: 蜥蜴王进化石
    zh_trad: 蜥蜴王進化石
  descriptions:
    jp_kana: "ジュカインに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "ジュカインに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Sceptile hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Jungko, elle lui permet de méga-évoluer\ndurant un combat."
    it: "Una delle misteriose Megapietre.\nData a Sceptile, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Gewaldro getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Sceptile en combate."
    ko: "나무킹에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让蜥蜴王携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓蜥蜴王攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
scizorite:
  names:
    jp_kana: ハッサムナイト
    jp_kanji: ハッサムナイト
    en: Scizorite
    fr: Cizayoxite
    it: Scizorite
    de: Scheroxnit
    es: Scizorita
    ko: 핫삼나이트
    zh_simp: 巨钳螳螂进化石
    zh_trad: 巨鉗螳螂進化石
  descriptions:
    jp_kana: "ハッサムに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "ハッサムに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Scizor hold it, and this stone will enable it to\nMega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Cizayox, elle lui permet de\nméga-évoluer durant un combat."
    it: "Un esemplare delle misteriose Megapietre.\nData a Scizor, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Scherox getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Scizor en combate."
    ko: "핫삼에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让巨钳螳螂携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓巨鉗螳螂攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
scope_lens:
  names:
    jp_kana: ピントレンズ
    jp_kanji: ピントレンズ
    en: Scope Lens
    fr: Lentilscope
    it: Mirino
    de: Scope-Linse
    es: Periscopio
    ko: 초점렌즈
    zh_simp: 焦点镜
    zh_trad: 焦點鏡
  descriptions:
    jp_kana: "じゃくてんが　みえる　レンズ。\nもたせた　ポケモンの　わざが\nきゅうしょに　あたりやすくなる。"
    jp_kanji: "弱点が　みえる　レンズ。\n持たせた　ポケモンの　技が\n急所に　当たりやすくなる。"
    en: "An item to be held by a Pokémon. It’s a lens for\nscoping out weak points. It boosts the holder’s\ncritical-hit ratio."
    fr: "Objet à tenir. Une lentille qui augmente le taux\nde critiques du porteur."
    it: "Strumento da dare a un Pokémon.\nLente che aumenta la probabilità di sferrare\nbrutti colpi."
    de: "Ein Item, das einem Pokémon zum Tragen gegeben\nwerden kann. Es erhöht die Volltrefferquote."
    es: "Su lente aumenta la probabilidad que tiene el Pokémon\nque lo lleva de conseguir un golpe crítico."
    ko: "약점이 보이는 렌즈.\n지니게 한 포켓몬의 기술이\n급소에 맞기 쉬워진다."
    zh_simp: "能看见弱点的镜片。\n携带它的宝可梦的招式\n会变得容易击中要害。"
    zh_trad: "能看見弱點的鏡片。\n攜帶它的寶可夢的招式\n會變得容易擊中要害。"
scyther_candy:
  names:
    jp_kana: ストライクのアメ
    jp_kanji: ストライクのアメ
    en: Scyther Candy
    fr: Bonbon Insécateur
    it: Caramella Scyther
    de: Sichlor-Bonbon
    es: Caramelo Scyther
    ko: 스라크의사탕
    zh_simp: 飞天螳螂的糖果
    zh_trad: 飛天螳螂的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de cierto Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
sea_incense:
  names:
    jp_kana: うしおのおこう
    jp_kanji: うしおのおこう
    en: Sea Incense
    fr: Encens Mer
    it: Marearoma
    de: Seerauch
    es: Incienso Marino
    ko: 바닷물향로
    zh_simp: 海潮薰香
    zh_trad: 海潮薰香
  descriptions:
    jp_kana: "ふしぎな　かおりの　おこう。\nもたせると　みずタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "不思議な　香りの　御香。\n持たせると　みずタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon. This incense has\na curious aroma that boosts the power of\nWater-type moves."
    fr: "Objet à tenir. Un encens au parfum curieux augmentant\nla puissance des capacités de type Eau."
    it: "Strumento da dare a un Pokémon.\nIncenso dal profumo esotico che potenzia\nle mosse di tipo Acqua."
    de: "Ein Item zum Tragen. Dieses exotische Duftkraut\nverstärkt Attacken vom Typ Wasser."
    es: "Tiene un curioso aroma que potencia los movimientos\nde tipo Agua. Debe llevarlo un Pokémon."
    ko: "이상한 향기의 향로.\n지니게 하면 물타입\n기술의 위력이 올라간다."
    zh_simp: "有着神奇香气的薰香。\n携带后，水属性的\n招式威力就会提高。"
    zh_trad: "有著神奇香氣的薰香。\n攜帶後，水屬性的\n招式威力就會提高。"
secret_key:cinnabar_island_gym:
  names:
    jp_kana: ひみつのカギ
    jp_kanji: ひみつのカギ
    en: Secret Key
    fr: Clé Secrète
    it: Chiave segreta
    de: Geheimschlüssel
    es: Llave Secreta
    ko: 비밀의열쇠
    zh_simp: 秘密钥匙
    zh_trad: 秘密鑰匙
  descriptions:
    jp_kana: "グレンじま　ポケモンジムの\nいりぐちを　あける　カギ。\nあかく　そうしょく　してある。"
    jp_kanji: "グレン島　ポケモンジムの\n入り口を　開ける　カギ。\n赤く　装飾　してある。"
    en: "The key that unlocks the front door of\nthe Pokémon Gym on Cinnabar Island.\nIt has a red decoration."
    fr: "La clé de la porte de l’Arène de Cramois’Île.\nElle est décorée en rouge."
    it: "Chiave della Palestra dell’Isola Cannella.\nÈ ornata da graziose decorazioni rosse."
    de: "Der Schlüssel zur Arena der Zinnoberinsel. Er ist mit\neiner roten Verzierung versehen."
    es: "Llave que abre las puertas del Gimnasio de Isla Canela.\nEn su diseño predomina el color rojo."
    ko: "홍련섬 포켓몬체육관의\n입구를 여는 열쇠.\n빨갛게 장식되어 있다."
    zh_simp: "能打开红莲岛上那座\n宝可梦道馆的钥匙。\n周身都以红色装饰。"
    zh_trad: "能打開紅蓮島上的\n寶可夢道館入口的鑰匙。\n上面有紅色的裝飾。"
secret_key:rotoms_room:
  names:
    jp_kana: ひみつのカギ
    jp_kanji: ひみつのカギ
    en: Secret Key
    fr: Clé Secrète
    it: Chiave segreta
    de: Geheimschlüssel
    es: Llave Secreta
    ko: 비밀의열쇠
    zh_simp: 秘密钥匙
    zh_trad: 秘密鑰匙
  descriptions:
    jp_kana: "きまった　ばしょで　つかうことで\nとくしゅな　でんきしんごうを　だして\nとびらを　あける　ハイテクな　カギ。"
    jp_kanji: "決まった　場所で　使うことで\n特殊な　電気信号を　だして\n扉を　開ける　ハイテクな　カギ。"
    en: "A high-tech key that has to be used at a specific\nlocation. It emits a special electronic signal to open\na door."
    fr: "Une clé destinée à une serrure très complexe.\nOuvre une porte en transmettant un signal électrique."
    it: "Una sofisticata chiave da usare in un determinato\nluogo. Emette un impulso elettrico speciale che\napre una porta."
    de: "Ein besonderer Schlüssel, der an einem speziellen Ort\nTüren durch ein elektrisches Signal öffnet."
    es: "Una llave de alta tecnología que debe usarse en un\nlugar concreto. Emite una señal eléctrica que abre una\npuerta."
    ko: "정해진 장소에서 쓰는 것으로\n특수한 전기 신호를 내어\n문을 여는 첨단 기술의 열쇠."
    zh_simp: "在特定的地方使用，\n就会发出特殊电信号\n来开门的高科技钥匙。"
    zh_trad: "在特定的地方使用，\n就會發出特殊電子訊號\n來開門的高科技鑰匙。"
secret_medicine:
  names:
    jp_kana: ひでんのくすり
    jp_kanji: ひでんのくすり
    en: Secret Medicine
    fr: Remède Secret
    it: Rimedio segreto
    de: Geheimmedizin
    es: Medicina Secreta
    ko: 비전신약
    zh_simp: 秘传之药
    zh_trad: 秘傳之藥
  descriptions:
    jp_kana: "タンバシティの　くすりやで　もらえる\nどんな　ポケモンでも　たちまち\nげんきになる　すごい　くすり。"
    jp_kanji: "タンバシティの　薬屋で　もらえる\nどんな　ポケモンでも　たちまち\nげんきになる　すごい　くすり。"
    en: "A fantastic medicine dispensed by the pharmacy in\nCianwood City. It fully heals a Pokémon of\nany ailment."
    fr: "Un médicament génial vendu à la pharmacie d’Irisia.\nIl permet à n’importe quel Pokémon de retrouver\nla forme rapidement."
    it: "Rimedio fantastico distribuito dalla farmacia\na Fiorlisopoli. Cura i problemi di stato\ndi qualunque Pokémon."
    de: "Eine fantastische Medizin aus Anemonia City.\nHeilt und kuriert ein Pokémon vollständig."
    es: "Fantástico medicamento vendido en la farmacia de\nCiudad Orquídea. Cura completamente a un Pokémon."
    ko: "진청시티의 약국에서 받을 수 있는\n어떤 포켓몬이라도 금방\n건강해지는 대단한 약."
    zh_simp: "可在湛蓝市的药店里得到的，\n能让任何宝可梦立刻变得\n精力充沛的高效药。"
    zh_trad: "能在湛藍市的藥店裡得到的，\n不管什麼寶可夢都能立刻\n變得精力充沛的高效藥。"
seel_candy:
  names:
    jp_kana: パウワウのアメ
    jp_kanji: パウワウのアメ
    en: Seel Candy
    fr: Bonbon Otaria
    it: Caramella Seel
    de: Jurob-Bonbon
    es: Caramelo Seel
    ko: 쥬쥬의사탕
    zh_simp: 小海狮的糖果
    zh_trad: 小海獅的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
serious_mint:
  names:
    jp_kana: まじめミント
    jp_kanji: まじめミント
    en: Serious Mint
    fr: Aromate Sérieux
    it: Menta Seria
    de: Ernst-Minze
    es: Menta Seria
    ko: 성실민트
    zh_simp: 认真薄荷
    zh_trad: 認真薄荷
  descriptions:
    jp_kana: "ポケモンに　かおりを　かがせると\nこうげき　ぼうぎょ　すばやさ　とくぼう\nとくこうが　まんべんなく　そだつ　ミント。"
    jp_kanji: "ポケモンに　香りを　かがせると\n攻撃　防御　素早さ　特防\n特攻が　万遍なく　育つ　ミント。"
    en: "When a Pokémon smells this mint, all of its stats will\ngrow at an equal rate."
    fr: "Si un Pokémon hume cet aromate, son Attaque,\nsa Défense, sa Vitesse, son Attaque Spéciale\net sa Défense Spéciale se développeront uniformément."
    it: "Quando un Pokémon ne sente il profumo, le sue\nstatistiche di Attacco, Difesa, Velocità, Difesa Speciale\ne Attacco Speciale aumentano uniformemente."
    de: "Lässt man ein Pokémon an dieser Minze schnuppern,\nsteigen Angriff, Verteidigung, Spezial-Angriff,\nSpezial-Verteidigung und Initiative gleichmäßig."
    es: "Cuando un Pokémon percibe su aroma, su Ataque,\nDefensa, Velocidad, Defensa Especial y Ataque Especial\ncrecen de forma uniforme."
    ko: "포켓몬에게 향기를 맡게 하면\n공격, 방어, 스피드, 특수방어\n특수공격이 골고루 오르게 되는 민트."
    zh_simp: "宝可梦闻了这种薄荷之后，\n攻击、防御、速度、\n特防、特攻能全方位提高。"
    zh_trad: "讓寶可夢聞這種薄荷的氣味，\n會令攻擊、防禦、速度、\n特防和特攻均衡地成長。"
shaderoot_carrot:
  names:
    jp_kana: くろいにんじん
    jp_kanji: くろいにんじん
    en: Shaderoot Carrot
    fr: Carotte Sombre
    it: Carota oscura
    de: Phantomkarotte
    es: Zanahoria Oscura
    ko: 검은당근
    zh_simp: 黑萝卜
    zh_trad: 黑蘿蔔
  descriptions:
    jp_kana: "ほうじょうのおうの　あいばが\nこのんで　たべる　さくもつ。\nうすぐらい　はたけで　そだった。"
    jp_kanji: "豊穣の王の　愛馬が\n好んで　食べる　作物。\n薄暗い　畑で　育った。"
    en: "Produce that the King of Bountiful Harvests’ beloved\nsteed likes to eat. It grew in a gloomy field."
    fr: "Un légume très apprécié du fidèle destrier\ndu Seigneur des récoltes. Il a été cultivé\ndans un champ ombragé."
    it: "Un ortaggio molto apprezzato dal fedele destriero\ndel Re dell’abbondanza. Cresce nei campi ombreggiati."
    de: "Eine Karotte, die auf einem in Schatten getauchten\nFeld heranwuchs. Das treue Ross des Königs der\nreichen Ernte mag sie besonders gern."
    es: "Una zanahoria cultivada en un huerto sombrío. Es la\nhortaliza preferida del amado corcel del Rey de las\nCosechas."
    ko: "풍요의 왕의 애마가\n즐겨 먹는 작물.\n어두컴컴한 밭에서 자랐다."
    zh_simp: "丰饶之王的爱马\n喜欢吃的农作物。\n生长于光线暗淡的田地。"
    zh_trad: "豐饒之王的愛馬喜歡吃的農作物。\n生長在光線幽暗的田地。"
shalour_sable:
  names:
    jp_kana: シャラサブレ
    jp_kanji: シャラサブレ
    en: Shalour Sable
    fr: Sablé Yantreizh
    it: Yantafrollino
    de: Yantara-Sablé
    es: Galleta Yantra
    ko: 사라사블레
    zh_simp: 娑罗沙布蕾
    zh_trad: 娑羅沙布蕾
  descriptions:
    jp_kana: "シャラシティ　めいぶつの　サブレ。\nポケモン　１ひきの　じょうたいの\nいじょうを　すべて　かいふくする。"
    jp_kanji: "シャラシティ　名物の　サブレ。\nポケモン　１匹の　状態の\n異常を　すべて　回復する。"
    en: "Shalour City’s famous shortbread. It can be used\nonce to heal all the status conditions of a Pokémon."
    fr: "La spécialité de Yantreizh.\nElle soigne tous les problèmes de statut\nd’un Pokémon."
    it: "Il famoso Yantafrollino di Yantaropoli.\nCura tutti i problemi di stato di un Pokémon."
    de: "Dieser Butterkeks ist eine Spezialität aus Yantara City.\nEr behebt alle Statusprobleme eines Pokémon."
    es: "Especialidad de Ciudad Yantra. Cura los problemas de\nestado de un Pokémon."
    ko: "사라시티의 명물 사블레.\n포켓몬 1마리의 상태 이상을\n모두 회복한다."
    zh_simp: "娑罗市特产的沙布蕾。\n能治愈１只宝可梦的\n所有异常状态。"
    zh_trad: "娑羅市特產的沙布蕾。\n能治癒１隻寶可夢的\n所有異常狀態。"
sharp_beak:
  names:
    jp_kana: するどいくちばし
    jp_kanji: するどいくちばし
    en: Sharp Beak
    fr: Bec Pointu
    it: Beccaffilato
    de: Spitzer Schnabel
    es: Pico Afilado
    ko: 예리한부리
    zh_simp: 锐利鸟嘴
    zh_trad: 銳利鳥嘴
  descriptions:
    jp_kana: "ながく　とがった　くちばし。\nもたせると　ひこうタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "長く　とがった　くちばし。\n持たせると　ひこうタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon. It’s a long, sharp\nbeak that boosts the power of Flying-type moves."
    fr: "Objet à tenir. Un bec long et pointu qui augmente\nla puissance des capacités de type Vol."
    it: "Strumento da dare a un Pokémon.\nBecco lungo e affilato che potenzia le mosse\ndi tipo Volante."
    de: "Ein Item zum Tragen. Ein langer, scharfer Schnabel,\nder Attacken vom Typ Flug verstärkt."
    es: "Pico largo y afilado que aumenta la potencia de los\nmovimientos de tipo Volador. Debe llevarlo un\nPokémon."
    ko: "길고 뾰족한 부리.\n지니게 하면 비행타입\n기술의 위력이 올라간다."
    zh_simp: "又长又尖的鸟嘴。\n携带后，飞行属性的\n招式威力就会提高。"
    zh_trad: "又長又尖的鳥嘴。\n攜帶後，飛行屬性的\n招式威力就會提高。"
sharpedonite:
  names:
    jp_kana: サメハダナイト
    jp_kanji: サメハダナイト
    en: Sharpedonite
    fr: Sharpedite
    it: Sharpedite
    de: Tohaidonit
    es: Sharpedonita
    ko: 샤크니아나이트
    zh_simp: 巨牙鲨进化石
    zh_trad: 巨牙鯊進化石
  descriptions:
    jp_kana: "サメハダーに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "サメハダーに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Sharpedo hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Sharpedo, elle lui permet\nde méga-évoluer durant un combat."
    it: "Una delle misteriose Megapietre.\nData a Sharpedo, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Tohaido getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Sharpedo en combate."
    ko: "샤크니아에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让巨牙鲨携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓巨牙鯊攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
shed_shell:
  names:
    jp_kana: きれいなぬけがら
    jp_kanji: きれいなぬけがら
    en: Shed Shell
    fr: Carapace Mue
    it: Disfoguscio
    de: Wechselhülle
    es: Muda Concha
    ko: 아름다운허물
    zh_simp: 美丽空壳
    zh_trad: 美麗空殼
  descriptions:
    jp_kana: "じょうぶで　かたい　ぬけがら。\nもたせた　ポケモンは　ひかえの\nポケモンと　かならず　いれかわれる。"
    jp_kanji: "丈夫で　硬い　ぬけがら。\n持たせた　ポケモンは　控えの\nポケモンと　必ず　いれかわれる。"
    en: "An item to be held by a Pokémon. This discarded\ncarapace enables the holder to switch out of battle\nwithout fail."
    fr: "Objet à tenir. Une carapace dure qui permet\nau porteur de se retirer même s’il est affecté\npar une attaque immobilisante."
    it: "Un Pokémon con questo robusto guscio può essere\nsempre sostituito, anche se sotto l’effetto di mosse\no abilità antifuga."
    de: "Ein Item zum Tragen. Dieser harte Panzer sorgt dafür,\ndass sein Träger unter allen Umständen ausgetauscht\nwerden kann."
    es: "En combate, esta concha desechada permite que el\nportador siempre pueda cambiarse por otro Pokémon\nque no esté combatiendo."
    ko: "튼튼하고 단단한 허물.\n지니게 한 포켓몬은 교대\n포켓몬과 반드시 교체할 수 있다."
    zh_simp: "结实坚硬的空壳。\n携带它的宝可梦必定可以\n和后备的宝可梦进行替换。"
    zh_trad: "結實堅硬的空殼。\n攜帶它的寶可夢必定可以\n和後備的寶可夢進行替換。"
shell_bell:
  names:
    jp_kana: かいがらのすず
    jp_kanji: かいがらのすず
    en: Shell Bell
    fr: Grelot Coque
    it: Conchinella
    de: Muschelglocke
    es: Cascabel Concha
    ko: 조개껍질방울
    zh_simp: 贝壳之铃
    zh_trad: 貝殼之鈴
  descriptions:
    jp_kana: "もたせた　ポケモンが　こうげきして\nあいてに　ダメージを　あたえたとき\nＨＰを　すこし　かいふく　できる。"
    jp_kanji: "持たせた　ポケモンが　攻撃して\n相手に　ダメージを　あたえたとき\nＨＰを　少し　回復できる。"
    en: "An item to be held by a Pokémon. The holder\nrestores a little HP every time it inflicts damage\non others."
    fr: "Objet à tenir. Restaure un peu les PV du porteur\nchaque fois qu’il inflige des dégâts."
    it: "Strumento da dare a un Pokémon.\nChi ce l’ha recupera un po’ di PS ogni volta\nche infligge danni."
    de: "Ein Item zum Tragen. Es stellt einige KP des Trägers\nimmer dann wieder her, wenn dieser dem Ziel Schaden\nzufügt."
    es: "Debe llevarlo un Pokémon. Cada vez que este inflige\ndaño, recupera algunos PS."
    ko: "지니게 한 포켓몬이 공격하여\n상대에게 데미지를 줬을 때\nHP를 조금 회복할 수 있다."
    zh_simp: "当携带它的宝可梦\n攻击对手并造成伤害时，\n能回复少量ＨＰ。"
    zh_trad: "當攜帶它的寶可夢\n攻擊並造成對手傷害時，\n能回復少量ＨＰ。"
shellder_candy:
  names:
    jp_kana: シェルダーのアメ
    jp_kanji: シェルダーのアメ
    en: Shellder Candy
    fr: Bonbon Kokiyas
    it: Caramella Shellder
    de: Muschas-Bonbon
    es: Caramelo Shellder
    ko: 셀러의사탕
    zh_simp: 大舌贝的糖果
    zh_trad: 大舌貝的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
shiny_charm:
  names:
    jp_kana: ひかるおまもり
    jp_kanji: ひかるおまもり
    en: Shiny Charm
    fr: Charme Chroma
    it: Cromamuleto
    de: Schillerpin
    es: Amuleto Iris
    ko: 빛나는부적
    zh_simp: 闪耀护符
    zh_trad: 閃耀護符
  descriptions:
    jp_kana: "もっていると　ひかる　ポケモンと\nであいやすくなる　といわれる\nふしぎで　ひかりかがやく　おまもり。"
    jp_kanji: "持っていると　ひかる　ポケモンと\n出会いやすくなる　といわれる\n不思議で　ひかりかがやく　おまもり。"
    en: "A shiny charm said to increase the chance of\nfinding a Shiny Pokémon in the wild."
    fr: "Un mystérieux charme scintillant qui facilite la rencontre\navec les Pokémon chromatiques."
    it: "Misterioso amuleto luminoso che aumenta\nla probabilità di incontrare Pokémon cromatici."
    de: "Ein mysteriöser, schillernder Glücksbringer, der die\nWahrscheinlichkeit erhöht, Schillernde Pokémon zu\nfinden."
    es: "Misterioso amuleto brillante que aumenta la\nprobabilidad de encontrar Pokémon variocolor."
    ko: "지니고 있으면 빛나는 포켓몬과\n만나기 쉬워진다고 전해지는\n이상하고 매우 반짝이는 부적."
    zh_simp: "拥有它之后，据说会\n更容易遇见发光宝可梦的\n神奇闪光护符。"
    zh_trad: "只要擁有它，據說會變得\n更容易遇見發光寶可夢的\n神奇閃光護符。"
shiny_stone:
  names:
    jp_kana: ひかりのいし
    jp_kanji: ひかりのいし
    en: Shiny Stone
    fr: Pierre Éclat
    it: Pietrabrillo
    de: Leuchtstein
    es: Piedra Día
    ko: 빛의돌
    zh_simp: 光之石
    zh_trad: 光之石
  descriptions:
    jp_kana: "ある　とくていの　ポケモンを\nしんかさせる　ふしぎな　いし。\nひかりのように　まぶしい。"
    jp_kanji: "ある　特定の　ポケモンを\n進化させる　不思議な　石。\nひかりのように　まぶしい。"
    en: "A peculiar stone that can make certain species of\nPokémon evolve. It shines with a dazzling light."
    fr: "Une pierre étrange qui fait évoluer certaines espèces\nde Pokémon. Elle brille d’une lumière aveuglante."
    it: "Pietra particolare che fa evolvere determinate\nspecie di Pokémon. Brilla di una luce abbagliante."
    de: "Dieser besondere, hell leuchtende Stein hilft manchen\nPokémon bei ihrer Entwicklung."
    es: "Una piedra peculiar que hace evolucionar a algunos\nPokémon. Tiene un brillo espectacular."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 돌.\n빛처럼 눈부시다."
    zh_simp: "能让某些特定宝可梦\n进化的神奇石头。\n像光芒一样耀眼。"
    zh_trad: "能讓特定寶可夢\n進化的神奇石頭。\n像光芒一樣耀眼。"
shoal_salt:
  names:
    jp_kana: あさせのしお
    jp_kanji: あさせのしお
    en: Shoal Salt
    fr: Sel Tréfonds
    it: Sale Ondoso
    de: Küstensalz
    es: Sal Cardumen
    ko: 여울소금
    zh_simp: 浅滩海盐
    zh_trad: 淺灘海鹽
  descriptions:
    jp_kana: "あさせのほらあなで\nみつけた　しお。"
    jp_kanji: "浅瀬の洞穴で\nみつけた　塩。"
    en: Salt that you found inside Shoal Cave.
    fr: Du sel provenant de la Grotte Tréfonds.
    it: Sale rinvenuto nella Grotta Ondosa.
    de: "Reine Salzkristalle, die du in der Küstenhöhle\ngefunden hast."
    es: "Una sal muy fina que se encuentra en la Cueva\nCardumen."
    ko: "여울의 동굴에서\n발견한 소금."
    zh_simp: "在浅滩洞穴这地方\n找到的海盐。"
    zh_trad: "在名為淺灘洞穴的地方\n找到的海鹽。"
shoal_shell:
  names:
    jp_kana: あさせのかいがら
    jp_kanji: あさせのかいがら
    en: Shoal Shell
    fr: CoquilleTréfonds
    it: Gusciondoso
    de: Küstenschale
    es: Concha Cardumen
    ko: 여울조개껍질
    zh_simp: 浅滩贝壳
    zh_trad: 淺灘貝殼
  descriptions:
    jp_kana: "あさせのほらあなで\nみつけた　かいがら。"
    jp_kanji: "浅瀬の洞穴で\nみつけた　貝殻。"
    en: A seashell that you found inside Shoal Cave.
    fr: Un coquillage provenant de la Grotte Tréfonds.
    it: Guscio rinvenuto nella Grotta Ondosa.
    de: "Eine hübsche Muschelschale, die du in der Küstenhöhle\ngefunden hast."
    es: Concha que se encuentra en la Cueva Cardumen.
    ko: "여울의 동굴에서\n발견한 조개껍질."
    zh_simp: "在浅滩洞穴这地方\n找到的贝壳。"
    zh_trad: "在名為淺灘洞穴的地方\n找到的貝殼。"
shock_drive:
  names:
    jp_kana: イナズマカセット
    jp_kanji: イナズマカセット
    en: Shock Drive
    fr: Module Choc
    it: Voltmodulo
    de: Blitzmodul
    es: FulgoROM
    ko: 번개카세트
    zh_simp: 闪电卡带
    zh_trad: 閃電卡帶
  descriptions:
    jp_kana: "ゲノセクトに　もたせると\nテクノバスターという　わざが\nでんきタイプになる　カセット。"
    jp_kanji: "ゲノセクトに　持たせると\nテクノバスターという　技が\nでんきタイプになる　カセット。"
    en: "A cassette to be held by Genesect. It changes\nGenesect’s Techno Blast move so it becomes\nElectric type."
    fr: "Tenu par Genesect, ce module change la capacité\nTechno-Buster en une capacité de type Électrik."
    it: "Modulo da dare a Genesect.\nTrasforma Tecnobotto in una mossa di tipo Elettro."
    de: "Gibt man es Genesect zum Tragen, wandelt es den Typ\nder Attacke Techblaster in Elektro um."
    es: "Cartucho que convierte Tecno Shock de Genesect en un\nmovimiento de tipo Eléctrico."
    ko: "게노세크트에게 지니게 하면\n테크노버스터라는 기술이\n전기타입으로 바뀌는 카세트."
    zh_simp: "这是让盖诺赛克特携带的卡带。\n携带后，高科技光炮这招式\n就会变为电属性。"
    zh_trad: "讓蓋諾賽克特攜帶的卡帶。\n攜帶後，招式高科技光炮\n會變為電屬性。"
shuca_berry:
  names:
    jp_kana: シュカのみ
    jp_kanji: シュカのみ
    en: Shuca Berry
    fr: Baie Jouca
    it: Baccanaca
    de: Schukebeere
    es: Baya Acardo
    ko: 슈캐열매
    zh_simp: 腰木果
    zh_trad: 腰木果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　じめん　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　じめん技を\n受けたとき　威力が　弱まる。"
    en: "If held by a Pokémon, this Berry will lessen the\ndamage taken from one supereffective\nGround-type attack."
    fr: "Tenue, cette Baie affaiblit une attaque ennemie\nsuper efficace de type Sol."
    it: "Se un Pokémon ha questa bacca, l’attacco\nsuperefficace di tipo Terra del nemico\nviene indebolito."
    de: "Als getragenes Item schwächt diese Beere sehr effektive\ngegnerische Attacken vom Typ Boden."
    es: "Si la lleva un Pokémon, debilita un ataque supereficaz\nde tipo Tierra de un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 굉장한 땅 기술로\n공격받았을 때 위력이 약해진다."
    zh_simp: "让宝可梦携带后，\n在受到效果绝佳的地面属性招式\n攻击时，能令其威力减弱。"
    zh_trad: "讓寶可夢攜帶後，\n在受到效果絕佳的地面屬性招式\n攻擊時，能使其威力減弱。"
silk_scarf:
  names:
    jp_kana: シルクのスカーフ
    jp_kanji: シルクのスカーフ
    en: Silk Scarf
    fr: Mouchoir Soie
    it: Sciarpa Seta
    de: Seidenschal
    es: Pañuelo de Seda
    ko: 실크스카프
    zh_simp: 丝绸围巾
    zh_trad: 絲綢圍巾
  descriptions:
    jp_kana: "はだざわりの　よい　スカーフ。\nもたせると　ノーマルタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "はだざわりの　よい　スカーフ。\n持たせると　ノーマルタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon. It’s a sumptuous\nscarf that boosts the power of Normal-type moves."
    fr: "Objet à tenir. Un mouchoir somptueux qui augmente\nla puissance des capacités de type Normal."
    it: "Strumento da dare a un Pokémon.\nSciarpa raffinata che potenzia le mosse\ndi tipo Normale."
    de: "Ein Item zum Tragen. Ein kostbarer Schal, der Attacken\nvom Typ Normal verstärkt."
    es: "La delicadeza del pañuelo fortalece los movimientos de\ntipo Normal. Debe llevarlo un Pokémon."
    ko: "감촉이 좋은 스카프.\n지니게 하면 노말타입\n기술의 위력이 올라간다."
    zh_simp: "手感不错的围巾。\n携带后，一般属性的\n招式威力就会提高。"
    zh_trad: "手感不錯的圍巾。\n攜帶後，一般屬性的\n招式威力就會提高。"
silph_scope:
  names:
    jp_kana: シルフスコープ
    jp_kanji: シルフスコープ
    en: Silph Scope
    fr: Scope Sylphe
    it: Spettrosonda
    de: Silph Scope
    es: Visor Silph
    ko: 실프스코프
    zh_simp: 西尔佛检视镜
    zh_trad: 西爾佛檢視鏡
  descriptions:
    jp_kana: "ひとの　めに　みえない　ものを\nみることが　できる　スコープ。\nシルフカンパニーせい。"
    jp_kanji: "人の　目に　見えない　ものを\n見ることが　できる　スコープ。\nシルフカンパニー製。"
    en: "A scope that lets you see what cannot usually be seen.\nIt is made by Silph Co."
    fr: "Un appareil permettant de voir les Pokémon invisibles.\nIl est fabriqué par la Sylphe SARL."
    it: "Sonda che rivela i Pokémon invisibili, prodotta\ndalla Silph S.p.A."
    de: "Dieses Gerät macht Dinge sichtbar, die dem\nmenschlichen Auge sonst verborgen bleiben.\nEs wurde von der Silph Company entwickelt."
    es: "Dispositivo que permite ver cosas que, de otra forma,\nresultarían invisibles para el ojo humano. Fabricado por\nSilph S. A."
    ko: "사람의 눈에 보이지 않는 것을\n볼 수 있게 해 주는 스코프.\n실프주식회사 제품."
    zh_simp: "西尔佛公司制造的透视镜。\n可以看见人眼无法看见的东西。"
    zh_trad: "西爾佛公司製造的檢視鏡。\n能看見人類肉眼\n看不到的東西。"
silver_leaf:
  names:
    jp_kana: ぎんのはっぱ
    jp_kanji: ぎんのはっぱ
    en: Silver Leaf
    fr: Feuille Argentée
    it: Fogliargento
    de: Silberblatt
    es: Hoja de Plata
    ko: 은빛잎사귀
    zh_simp: 银色叶子
    zh_trad: 銀色葉子
  descriptions:
    jp_kana: "ぎんいろの　ふしぎな　はっぱ。\nこの　はっぱを　つける　きは\nみつかって　いない。"
    jp_kanji: "銀色の　不思議な　はっぱ。\nこの　はっぱを　つける　木は\n見つかって　いない。"
    en: "A mysterious silver leaf. No trees with this leaf have\nbeen found yet."
    fr: "Une feuille argentée mystérieuse. Elle ne semble\nappartenir à aucun arbre connu."
    it: "Una strana foglia argentata. Nessuno sa da che albero\nprovenga."
    de: "Ein rätselhaftes Blatt mit silberner Färbung. Bisher hat\nman noch keinen Baum entdeckt, an dem solche Blätter\nwachsen."
    es: "Extraña hoja de color plateado. Se desconoce de qué\nárbol procede."
    ko: "은빛의 신비한 나뭇잎.\n이 나뭇잎이 자라는 나무는\n아직 발견되지 않았다."
    zh_simp: "神奇的银色叶子。\n至今仍未发现能长出\n这种叶子的树木。"
    zh_trad: "不可思議的銀色葉子。\n至今還未發現\n長有這種葉子的樹。"
silver_nanab_berry:
  names:
    jp_kana: ぎんのナナのみ
    jp_kanji: ぎんのナナのみ
    en: Silver Nanab Berry
    fr: Baie Nanab argentée
    it: Baccabana argentata
    de: Silberne Nanabbeere
    es: Baya Latano Plateada
    ko: 은 나나열매
    zh_simp: 银色蕉香果
    zh_trad: 銀色蕉香果
  descriptions:
    jp_kana: "ポケモンを　つかまえる　ときに\nあたえると　おちつく　きのみ。"
    jp_kanji: "ポケモンを　捕まえる　ときに\nあたえると　落ち着く　きのみ。"
    en: "A Berry that calms wild Pokémon you’re trying to catch\nwhen given to them."
    fr: "Une Baie à donner à un Pokémon sauvage au moment\nde la capture pour le calmer pendant un instant."
    it: "Bacca che calma il Pokémon selvatico\na cui viene data."
    de: "Gibst du diese Beere einem Pokémon zu essen,\nwird es während des Fangversuchs ruhiger."
    es: "Una baya que puedes lanzar a un Pokémon salvaje\npara tranquilizarlo bastante."
    ko: "포켓몬을 잡을 때 주면\n얌전해지는 나무열매."
    zh_simp: "捕捉宝可梦时，\n把这树果交给宝可梦\n就能平复对方的情绪。"
    zh_trad: "在捕捉時把這個樹果餵給寶可夢，\n就能讓牠們的情緒穩定下來。"
silver_pinap_berry:
  names:
    jp_kana: ぎんのパイルのみ
    jp_kanji: ぎんのパイルのみ
    en: Silver Pinap Berry
    fr: Baie Nanana argentée
    it: Baccananas argentata
    de: Silberne Sananabeere
    es: Baya Pinia Plateada
    ko: 은 파인열매
    zh_simp: 银色凰梨果
    zh_trad: 銀色凰梨果
  descriptions:
    jp_kana: "ポケモンに　あたえると\nつかまえた　ときに　どうぐが\nてにはいり　やすくなる　きのみ。"
    jp_kanji: "ポケモンに　あたえると\n捕まえた　ときに　道具が\n手にはいり　やすくなる　きのみ。"
    en: "A Berry that makes you more likely to get an item when\ngiven to Pokémon you’re trying to catch."
    fr: "Une Baie à donner à un Pokémon sauvage pour avoir\nplus de chances d’obtenir un objet après l’avoir capturé."
    it: "Bacca che rende più facile ottenere strumenti\nquando catturi il Pokémon a cui l’hai data."
    de: "Gibst du diese Beere einem Pokémon zu essen, wird die\nChance, bei einem erfolgreichen Fangversuch ein Item\nzu erhalten, erhöht."
    es: "Una baya que puedes lanzar a un Pokémon salvaje\npara aumentar bastante las probabilidades de conseguir\nun objeto tras capturarlo."
    ko: "포켓몬에게 주면\n잡았을 때 도구를 손에 넣기\n쉬워지는 나무열매."
    zh_simp: "如果把这树果交给宝可梦，\n那么接下来捉住该宝可梦时，\n会更容易获得道具。"
    zh_trad: "把這個樹果餵給寶可夢，\n在捕捉成功後，\n會更容易獲得道具。"
silver_powder:
  names:
    jp_kana: ぎんのこな
    jp_kanji: ぎんのこな
    en: Silver Powder
    fr: Poudre Argentée
    it: Argenpolvere
    de: Silberstaub
    es: Polvo Plata
    ko: 은빛가루
    zh_simp: 银粉
    zh_trad: 銀粉
  descriptions:
    jp_kana: "ぎんいろに　かがやく　こな。\nもたせると　むしタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "銀色に　輝く　粉。\n持たせると　むしタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon. It’s a shiny\nsilver powder that will boost the power of\nBug-type moves."
    fr: "Objet à tenir. De la poudre d’argent brillante\nqui augmente la puissance des capacités\nde type Insecte."
    it: "Strumento da dare a un Pokémon.\nPolvere argentea e brillante che potenzia le mosse\ndi tipo Coleottero."
    de: "Ein Item, das einem Pokémon zum Tragen gegeben\nwerden kann. Es verstärkt Attacken vom Typ Käfer."
    es: "Polvo de brillo argénteo que fortalece los ataques de\ntipo Bicho. Debe llevarlo un Pokémon."
    ko: "은색으로 반짝이는 가루.\n지니게 하면 벌레타입\n기술의 위력이 올라간다."
    zh_simp: "散发着银色光辉的粉末。\n携带后，虫属性的\n招式威力就会提高。"
    zh_trad: "散發著銀色光輝的粉末。\n攜帶後，蟲屬性的\n招式威力就會提高。"
silver_razz_berry:
  names:
    jp_kana: ぎんのズリのみ
    jp_kanji: ぎんのズリのみ
    en: Silver Razz Berry
    fr: Baie Framby argentée
    it: Baccalampon argentata
    de: Silberne Himmihbeere
    es: Baya Frambu Plateada
    ko: 은 라즈열매
    zh_simp: 银色蔓莓果
    zh_trad: 銀色蔓莓果
  descriptions:
    jp_kana: "ポケモンに　あたえると\nつかまえ　やすくなる　きのみ。"
    jp_kanji: "ポケモンに　あたえると\n捕まえ　やすくなる　きのみ。"
    en: "A Berry that makes it easier to catch Pokémon when\ngiven to them."
    fr: "Une Baie à donner à un Pokémon sauvage pour pouvoir\nl’attraper plus facilement."
    it: "Bacca che facilita la cattura del Pokémon\nselvatico a cui viene data."
    de: "Gibst du diese Beere einem Pokémon zu essen,\nlässt es sich leichter fangen."
    es: "Una baya que puedes lanzar a un Pokémon salvaje\npara que resulte bastante más fácil capturarlo."
    ko: "포켓몬에게 주면\n잡기 쉬워지는 나무열매."
    zh_simp: "把这树果交给宝可梦后，\n宝可梦就会变得容易捕捉。"
    zh_trad: "把這個樹果餵給寶可夢，\n就能讓牠們變得容易捕捉。"
silver_wing:
  names:
    jp_kana: ぎんいろのはね
    jp_kanji: ぎんいろのはね
    en: Silver Wing
    fr: Argent’Aile
    it: Aladargento
    de: Silberflügel
    es: Ala Plateada
    ko: 은빛날개
    zh_simp: 银色之羽
    zh_trad: 銀色之羽
  descriptions:
    jp_kana: "ぎんいろに　ひかり　かがやく\nふしぎな　はね。"
    jp_kanji: "ぎんいろに　ひかり　かがやく\n不思議な　はね。"
    en: A strange, silvery feather that sparkles.
    fr: Une étrange plume qui brille d’un éclat argenté.
    it: Misteriosa piuma che brilla di luce argentea.
    de: "Eine silberne Feder, die von einem seltsamen Leuchten\nerfüllt ist."
    es: Misteriosa ala de un brillante color plateado.
    ko: "은빛으로 빛나는\n신비한 날개."
    zh_simp: "散发着银色光辉的\n神奇羽毛。"
    zh_trad: "散發著銀色光輝的\n神奇羽毛。"
sitrus_berry:
  names:
    jp_kana: オボンのみ
    jp_kanji: オボンのみ
    en: Sitrus Berry
    fr: Baie Sitrus
    it: Baccacedro
    de: Tsitrubeere
    es: Baya Zidra
    ko: 자뭉열매
    zh_simp: 文柚果
    zh_trad: 文柚果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nＨＰを　すこしだけ　かいふくする。"
    jp_kanji: "ポケモンに　持たせると\nＨＰを　少しだけ　回復する。"
    en: "A Berry to be consumed by Pokémon. If a Pokémon\nholds one, it can restore its own HP by a small\namount during battle."
    fr: "Une Baie qui restaure quelques PV lorsqu’elle est tenue\npar un Pokémon."
    it: Se un Pokémon ha questa bacca, recupera un po’ di PS.
    de: "Gibst du die Beere einem Pokémon zum Tragen,\nfüllt diese seine KP ein wenig auf."
    es: "Los Pokémon pueden llevarla o usarla para restaurar\nalgunos PS."
    ko: "포켓몬에게 지니게 하면\nHP를 조금 회복한다."
    zh_simp: "让宝可梦携带后，\n可以回复少量ＨＰ。"
    zh_trad: "讓寶可夢攜帶後，\n可以回復少量ＨＰ。"
skull_fossil:
  names:
    jp_kana: ずがいのカセキ
    jp_kanji: ずがいのカセキ
    en: Skull Fossil
    fr: Fossile Crâne
    it: Fossilcranio
    de: Kopffossil
    es: Fósil Cráneo
    ko: 두개의화석
    zh_simp: 头盖化石
    zh_trad: 頭蓋化石
  descriptions:
    jp_kana: "おおむかし　ちじょうで　くらした\nこだい　ポケモンの　カセキ。\nあたまの　いちぶ　らしい。"
    jp_kanji: "大昔　地上で　暮らした\n古代ポケモンの　カセキ。\n頭の　一部らしい。"
    en: "A fossil from a prehistoric Pokémon that once lived\non the land. It appears as though it’s part of\na head."
    fr: "Le fossile d’un Pokémon préhistorique terrestre.\nOn dirait un morceau de crâne."
    it: "Fossile di un Pokémon preistorico che viveva sulla\nterraferma. Sembra essere parte di un teschio."
    de: "Das Fossil eines uralten Pokémon, das an Land lebte.\nEs sieht wie ein Schädel aus."
    es: "Fósil de un Pokémon prehistórico terrestre. Parece ser\nparte de una cabeza."
    ko: "오랜 옛날 지상에서 살았던\n고대 포켓몬의 화석.\n머리의 일부인 듯하다."
    zh_simp: "很久以前生活在地上的\n古代宝可梦的化石。\n好像是头部的一部分。"
    zh_trad: "很久以前生活在地上的\n古代寶可夢的化石。\n好像是頭部的一部分。"
sky_plate:
  names:
    jp_kana: あおぞらプレート
    jp_kanji: あおぞらプレート
    en: Sky Plate
    fr: Plaque Ciel
    it: Lastracielo
    de: Wolkentafel
    es: Tabla Cielo
    ko: 푸른하늘플레이트
    zh_simp: 蓝天石板
    zh_trad: 藍天石板
  descriptions:
    jp_kana: "ひこうの　タイプの　せきばん。\nもたせると　ひこうタイプの\nわざの　いりょくが　つよまる。"
    jp_kanji: "ひこうの　タイプの　石盤。\n持たせると　ひこうタイプの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon. It’s a stone tablet\nthat boosts the power of Flying-type moves."
    fr: "Objet à tenir. Une tablette en pierre augmentant\nla puissance des capacités de type Vol."
    it: "Strumento da dare a un Pokémon. Lastra di pietra che\npotenzia le mosse di tipo Volante."
    de: "Ein Item zum Tragen. Diese Steintafel verstärkt\nAttacken vom Typ Flug."
    es: "Tabla de piedra que potencia los movimientos de tipo\nVolador. Debe llevarla un Pokémon."
    ko: "비행타입의 석판.\n지니게 하면 비행타입\n기술의 위력이 강해진다."
    zh_simp: "飞行属性的石板。\n携带后，飞行属性的\n招式威力就会增强。"
    zh_trad: "飛行屬性的石板。\n攜帶後，飛行屬性的\n招式威力就會增強。"
slowbronite:
  names:
    jp_kana: ヤドランナイト
    jp_kanji: ヤドランナイト
    en: Slowbronite
    fr: Flagadossite
    it: Slowbroite
    de: Lahmusnit
    es: Slowbronita
    ko: 야도란나이트
    zh_simp: 呆壳兽进化石
    zh_trad: 呆殼獸進化石
  descriptions:
    jp_kana: "ヤドランに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "ヤドランに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Slowbro hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Flagadoss, elle lui permet\nde méga-évoluer durant un combat."
    it: "Una delle misteriose Megapietre.\nData a Slowbro, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Lahmus getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Slowbro en combate."
    ko: "야도란에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让呆壳兽携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓呆殼獸攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
slowpoke_candy:
  names:
    jp_kana: ヤドンのアメ
    jp_kanji: ヤドンのアメ
    en: Slowpoke Candy
    fr: Bonbon Ramoloss
    it: Caramella Slowpoke
    de: Flegmon-Bonbon
    es: Caramelo Slowpoke
    ko: 야돈의사탕
    zh_simp: 呆呆兽的糖果
    zh_trad: 呆呆獸的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
slowpoke_tail:
  names:
    jp_kana: おいしいシッポ
    jp_kanji: おいしいシッポ
    en: Slowpoke Tail
    fr: Queue Ramoloss
    it: Coda Slowpoke
    de: Flegmon-Rute
    es: Cola Slowpoke
    ko: 맛있는꼬리
    zh_simp: 美味尾巴
    zh_trad: 美味尾巴
  descriptions:
    jp_kana: "とても　おいしい　なにかの　しっぽ。\nショップで　たかく　うれる。"
    jp_kanji: "とても　おいしい　なにかの　しっぽ。\nショップで　高く　売れる。"
    en: "A very tasty tail of something. It can be sold at a high\nprice to shops."
    fr: "Une queue d’origine inconnue tout à fait savoureuse.\nPeut être vendue à bon prix en magasin."
    it: "Coda di origine sconosciuta dal sapore delizioso.\nSi vende a un prezzo piuttosto alto."
    de: "Die Rute eines unbestimmten Wesens. Extrem\nschmackhaft. Lässt sich teuer verkaufen."
    es: "Sabrosa cola de origen desconocido. Se puede\ncomprar a un precio muy elevado."
    ko: "매우 맛있는 무언가의 꼬리.\n가게에서 비싸게 팔린다."
    zh_simp: "非常美味的某种尾巴。\n可以在商店高价出售。"
    zh_trad: "非常美味的某種尾巴。\n可以在商店高價出售。"
small_bouquet:
  names:
    jp_kana: ちいさなはなたば
    jp_kanji: ちいさなはなたば
    en: Small Bouquet
    fr: Petit Bouquet
    it: Bouquet
    de: Ministrauß
    es: Ramo Pequeño
    ko: 작은꽃다발
    zh_simp: 小小花束
    zh_trad: 小小花束
  descriptions:
    jp_kana: "ただ　ひとりの　トレーナーへの\nきもちを　こめて　いっしょうけんめい\nつくった　ささやかな　はなたば。"
    jp_kanji: "ただ　ひとりの　トレーナーへの\n気持ちを　こめて　一生懸命\n作った　ささやかな　花束。"
    en: "A small bouquet that was made with heart and soul\nfor a single Trainer."
    fr: "Un petit bouquet arrangé avec amour pour\n\n vraiment unique."
    it: "Un piccolo mazzo di fiori composto con cura\ne amore per \n\n unic\n\n al mondo."
    de: "Ein Blumenstrauß, der sorgfältig und mit viel Mühe\nfür einen ganz besonderen Trainer gesteckt wurde."
    es: "Pequeño ramo de flores confeccionado con dedicación\ny esmero solo para ti."
    ko: "단 하나뿐인 트레이너를 향한\n마음을 담아 정성껏 만든\n작은 꽃다발."
    zh_simp: "竭尽心力制作的素雅花束。\n里面满满都是对训练家的心意。"
    zh_trad: "竭盡心力製作的花束。\n雖然不起眼，但裡頭\n充滿了對訓練家的心意。"
smart_candy:
  names:
    jp_kana: ちしきのアメ
    jp_kanji: ちしきのアメ
    en: Smart Candy
    fr: Bonbon Esprit S
    it: Caramella acume S
    de: Gripsbonbon
    es: Caramelo Intelecto
    ko: 지식의사탕
    zh_simp: 知识糖果
    zh_trad: 知識糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nポケモンの　とくこうを　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\nポケモンの　とくこうを　上げる。"
    en: "A candy that is packed with energy. When given to\na Pokémon, it will increase that Pokémon’s Sp. Atk stat."
    fr: "Un bonbon plein d’énergie.\nIl augmente l’Attaque Spéciale d’un Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta l’Attacco Speciale di un Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nden Spezial-Angriff eines Pokémon."
    es: "Caramelo energético que aumenta el Ataque Especial\ndel Pokémon."
    ko: "에너지가 가득한 사탕.\n포켓몬의 특수공격을 올린다."
    zh_simp: "充满能量的糖果。\n能提高宝可梦的特攻。"
    zh_trad: "充滿能量的糖果。\n能提高寶可夢的特攻。"
smart_candy_l:
  names:
    jp_kana: ちしきのアメＬ
    jp_kanji: ちしきのアメＬ
    en: Smart Candy L
    fr: Bonbon Esprit M
    it: Caramella acume M
    de: Gripsbonbon+
    es: Caramelo Intelecto +
    ko: 지식의사탕L
    zh_simp: 知识糖果Ｌ
    zh_trad: 知識糖果Ｌ
  descriptions:
    jp_kana: "エネルギーの　つまった　おおきい　アメ。\nレベル３０　いじょうの　ポケモンの\nとくこうを　あげる。"
    jp_kanji: "エネルギーの　つまった　大きい　アメ。\nレベル３０　以上の　ポケモンの\nとくこうを　上げる。"
    en: "A big candy that is packed with energy. When given to\na Pokémon at Lv. 30 or higher, it will increase that\nPokémon’s Sp. Atk stat."
    fr: "Un gros bonbon plein d’énergie.\nIl augmente l’Attaque Spéciale d’un Pokémon\nde niveau 30 ou supérieur."
    it: "Una caramella piena zeppa di energia.\nAumenta l’Attacco Speciale di un Pokémon\ndi livello 30 o superiore."
    de: "Ein großes Bonbon, das voller Energie steckt.\nErhöht dauerhaft den Spezial-Angriff eines Pokémon\nab Level 30."
    es: "Caramelo energético grande que aumenta el Ataque\nEspecial de un Pokémon de Nv. 30 o superior."
    ko: "에너지가 가득한 큰 사탕.\n레벨 30 이상인 포켓몬의\n특수공격을 올린다."
    zh_simp: "充满能量的大糖果。\n能让等级３０以上的\n宝可梦的特攻上升。"
    zh_trad: "充滿能量的大糖果。\n能提高等級在３０以上的\n寶可夢的特攻。"
smart_candy_xl:
  names:
    jp_kana: ちしきのアメＸＬ
    jp_kanji: ちしきのアメＸＬ
    en: Smart Candy XL
    fr: Bonbon Esprit L
    it: Caramella acume L
    de: Gripsbonbon++
    es: Caramelo Intelecto ++
    ko: 지식의사탕XL
    zh_simp: 知识糖果ＸＬ
    zh_trad: 知識糖果ＸＬ
  descriptions:
    jp_kana: "エネルギーの　つまった　とくだいの　アメ。\nレベル６０　いじょうの　ポケモンの\nとくこうを　あげる。"
    jp_kanji: "エネルギーの　つまった　特大の　アメ。\nレベル６０　以上の　ポケモンの\nとくこうを　上げる。"
    en: "A huge candy that is packed with energy. When given\nto a Pokémon at Lv. 60 or higher, it will increase that\nPokémon’s Sp. Atk stat."
    fr: "Un énorme bonbon plein d’énergie.\nIl augmente l’Attaque Spéciale d’un Pokémon\nde niveau 60 ou supérieur."
    it: "Una caramella piena zeppa di energia.\nAumenta l’Attacco Speciale di un Pokémon\ndi livello 60 o superiore."
    de: "Ein riesiges Bonbon, das voller Energie steckt.\nErhöht dauerhaft den Spezial-Angriff eines Pokémon\nab Level 60."
    es: "Caramelo energético enorme que aumenta el Ataque\nEspecial de un Pokémon de Nv. 60 o superior."
    ko: "에너지가 가득한 매우 큰 사탕.\n레벨 60 이상인 포켓몬의\n특수공격을 올린다."
    zh_simp: "充满能量的超大糖果。\n能让等级６０以上的\n宝可梦的特攻上升。"
    zh_trad: "充滿能量的特大糖果。\n能提高等級在６０以上的\n寶可夢的特攻。"
smoke_ball:
  names:
    jp_kana: けむりだま
    jp_kanji: けむりだま
    en: Smoke Ball
    fr: Boule Fumée
    it: Palla Fumo
    de: Rauchball
    es: Bola de Humo
    ko: 연막탄
    zh_simp: 烟雾球
    zh_trad: 煙霧球
  descriptions:
    jp_kana: "もたせた　ポケモンは　やせいの\nポケモンとの　せんとうから\nぜったいに　にげられる。"
    jp_kanji: "持たせた　ポケモンは　野生の\nポケモンとの　戦闘から\n絶対に　逃げられる。"
    en: "An item to be held by a Pokémon. It enables the\nholder to flee from any wild Pokémon encounter\nwithout fail."
    fr: "Objet à tenir. Permet au porteur de s’enfuir à coup sûr\nface à un Pokémon sauvage."
    it: "Strumento da dare a un Pokémon.\nPermette di fuggire con successo da un\nPokémon selvatico."
    de: "Ein Pokémon kann dieses Item tragen. Es ermöglicht\ndie garantierte Flucht aus dem Kampf mit einem\nwilden Pokémon."
    es: "Debe llevarla un Pokémon. Permite huir siempre de\ncombates contra Pokémon salvajes."
    ko: "지니게 한 포켓몬은\n야생 포켓몬과의 배틀에서\n반드시 도망칠 수 있다."
    zh_simp: "携带它的宝可梦在和\n野生宝可梦的战斗中\n绝对可以逃走。"
    zh_trad: "攜帶它的寶可夢在和\n野生寶可夢的戰鬥中\n絕對可以逃走。"
smoke_poke_tail:
  names:
    jp_kana: しっぽのくんせい
    jp_kanji: しっぽのくんせい
    en: Smoke-Poke Tail
    fr: Queue Fumée
    it: Coda affumicata
    de: Röstrute
    es: Cola Ahumada
    ko: 꼬리훈제
    zh_simp: 烟熏尾巴
    zh_trad: 煙燻尾巴
  descriptions:
    jp_kana: "キャンプの　りょうりに　つかう\nしょくざいの　いっしゅ。ポケモン　ヤドンの\nしっぽは　ぬけても　すぐ　はえかわる。"
    jp_kanji: "キャンプの　料理に　使う\n食材の　一種。ポケモン　ヤドンの\nしっぽは　抜けても　すぐ　生えかわる。"
    en: "One of the many ingredients that can be used for\ncooking at your camp. When a Slowpoke’s tail falls off,\nit grows back quickly."
    fr: "Un ingrédient de cuisine pour le camping.\nLorsque la queue d’un Ramoloss tombe,\nelle repousse tout de suite."
    it: "Uno degli ingredienti che puoi usare per cucinare\nin campeggio. Quando la coda degli Slowpoke\nsi stacca, ricresce subito dopo."
    de: "Eine Zutat für PokéCamping-Mahlzeiten. Flegmon-Ruten\nwachsen sofort wieder nach, wenn sie abfallen."
    es: "Un ingrediente para cocinar en el campamento. Las\ncolas de Slowpoke siempre vuelven a crecer al poco\nde desprenderse."
    ko: "캠프 요리에 사용되는\n식재료 중 하나. 포켓몬 야돈의\n꼬리는 떨어져도 금방 새로 자란다."
    zh_simp: "在露营营地制作料理时会使用的\n一种食材。宝可梦呆呆兽的尾巴\n就算断掉也会很快长出新的。"
    zh_trad: "製作露營料理時使用的食材之一。\n寶可夢呆呆獸的尾巴，\n就算掉了也會馬上長回來。"
smooth_rock:
  names:
    jp_kana: さらさらいわ
    jp_kanji: さらさらいわ
    en: Smooth Rock
    fr: Roche Lisse
    it: Roccialiscia
    de: Glattbrocken
    es: Roca Suave
    ko: 보송보송바위
    zh_simp: 沙沙岩石
    zh_trad: 沙沙岩石
  descriptions:
    jp_kana: "もたせた　ポケモンが　すなあらしを\nつかうと　いつもより　すなあらしの\nじかんが　ながくなる。"
    jp_kanji: "持たせた　ポケモンが　すなあらしを\n使うと　いつもより　すなあらしの\n時間が　長くなる。"
    en: "An item to be held by a Pokémon. It extends the\nduration of the move Sandstorm when used by\nthe holder."
    fr: "Objet à tenir. Prolonge la durée de la capacité\nTempête de Sable utilisée par le porteur."
    it: "Strumento da dare a un Pokémon.\nAllunga la durata della mossa Terrempesta."
    de: "Ein Item zum Tragen. Verlängert die Dauer von\nSandsturm, wenn der Träger diese Attacke einsetzt."
    es: "Prolonga la duración del movimiento Tormenta de\nArena que use el Pokémon que la lleva."
    ko: "지니게 한 포켓몬이 모래바람을\n쓰면 여느 때보다 모래바람의\n시간이 길어진다."
    zh_simp: "携带它的宝可梦使出沙暴的话，\n沙暴的时间就会比平时更长。"
    zh_trad: "攜帶它的寶可夢\n使出沙暴的話，\n沙暴的時間就會比平時更長。"
snorlax_candy:
  names:
    jp_kana: カビゴンのアメ
    jp_kanji: カビゴンのアメ
    en: Snorlax Candy
    fr: Bonbon Ronflex
    it: Caramella Snorlax
    de: Relaxo-Bonbon
    es: Caramelo Snorlax
    ko: 잠만보의사탕
    zh_simp: 卡比兽的糖果
    zh_trad: 卡比獸的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de cierto Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
snorlium_z:bag:
  names:
    jp_kana: カビゴンＺ
    jp_kanji: カビゴンＺ
    en: Snorlium Z
    fr: Ronflézélite
    it: Snorlactium Z
    de: Relaxonium Z
    es: Snorlastal Z
    ko: 잠만보Z
    zh_simp: 卡比兽Ｚ
    zh_trad: 卡比獸Ｚ
  descriptions:
    jp_kana: "カビゴンの　ギガインパクトを\nとくべつな　Ｚワザに　グレードアップする\nＺパワーの　けっしょうを　つくりだす。"
    jp_kanji: "カビゴンの　ギガインパクトを\n特別な　Ｚワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nSnorlax’s Giga Impact to an exclusive Z-Move."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise le Ronflex qui le tient à transformer\nson Giga Impact en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono a Snorlax di trasformare la mossa\nGigaimpatto in una mossa Z."
    de: "Kristallisierte Z-Kraft, die Relaxos Attacke\nGigastoß zu einer Z-Attacke aufstuft.\nWird bei Bedarf automatisch vervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a\nSnorlax convertir su Gigaimpacto en un movimiento Z."
    ko: "잠만보의 기가임팩트를\n특별한 Z기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将卡比兽的终极冲击\n升级成特殊Ｚ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把卡比獸的終極衝擊\n升級為特殊Ｚ招式的Ｚ力量結晶。"
snorlium_z:held:
  names:
    jp_kana: カビゴンＺ
    jp_kanji: カビゴンＺ
    en: Snorlium Z
    fr: Ronflézélite
    it: Snorlactium Z
    de: Relaxonium Z
    es: Snorlastal Z
    ko: 잠만보Z
    zh_simp: 卡比兽Ｚ
    zh_trad: 卡比獸Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　けっしょう。\nカビゴンの　ギガインパクトを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nカビゴンの　ギガインパクトを\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Snorlax’s Giga Impact to a Z-Move."
    fr: "Une cristallisation de la Force Z, permettant\nde transformer le Giga Impact d’un Ronflex\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare la mossa Gigaimpatto\ndi Snorlax in una mossa Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft Relaxos\nAttacke Gigastoß zu einer Z-Attacke auf."
    es: "Cristal que confiere el Poder Z al movimiento\nGigaimpacto de Snorlax."
    ko: "Z파워의 결정.\n잠만보의 기가임팩트를\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将卡比兽的终极冲击\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把卡比獸的終極衝擊\n升級為Ｚ招式。"
snowball:
  names:
    jp_kana: ゆきだま
    jp_kanji: ゆきだま
    en: Snowball
    fr: Boule de Neige
    it: Palla di neve
    de: Schneeball
    es: Bola de Nieve
    ko: 눈덩이
    zh_simp: 雪球
    zh_trad: 雪球
  descriptions:
    jp_kana: "つかいすての　ゆきだま。\nもたせて　こおりの　わざを　うけると\nこうげきが　あがる。"
    jp_kanji: "使い捨ての　ゆきだま。\n持たせて　こおりの　技を　受けると\n攻撃が　あがる。"
    en: "An item to be held by a Pokémon. It boosts Attack\nif the holder is hit with an Ice-type attack. It can only\nbe used once."
    fr: "Objet à tenir. Une boule de neige à usage unique\nqui augmente l’Attaque du porteur lorsqu’il encaisse\nune attaque de type Glace."
    it: "Palla di neve monouso.\nSe il Pokémon che ce l’ha subisce una mossa\ndi tipo Ghiaccio, il suo Attacco aumenta."
    de: "Wird der Träger von einer Eis-Attacke getroffen,\nsteigt sein Angriff und das Item verschwindet."
    es: "Objeto de un solo uso. Aumenta el Ataque del Pokémon\nque lo lleva si este recibe un ataque de tipo Hielo."
    ko: "단 한 번 쓰면 없어지는 눈덩이.\n지니게 하고 얼음 기술로 공격받으면\n공격이 올라간다."
    zh_simp: "一次性使用的雪球。\n携带它的宝可梦如果受到冰属性\n招式攻击，攻击就会提高。"
    zh_trad: "只能使用一次的雪球。\n攜帶它的寶可夢如果受到冰屬性\n招式攻擊，攻擊就會提高。"
soda_pop:
  names:
    jp_kana: サイコソーダ
    jp_kanji: サイコソーダ
    en: Soda Pop
    fr: Soda Cool
    it: Gassosa
    de: Sprudel
    es: Refresco
    ko: 미네랄사이다
    zh_simp: 劲爽汽水
    zh_trad: 勁爽汽水
  descriptions:
    jp_kana: "シュワっと　はじける　ソーダ。\nポケモン　１ひきの　ＨＰを\n５０だけ　かいふくする。"
    jp_kanji: "シュワっと　はじける　ソーダ。\nポケモン　１匹の　ＨＰを\n５０だけ　回復する。"
    en: "A highly carbonated soda drink. It can be used to\nrestore 50 HP to a single Pokémon."
    fr: "Une boisson pétillante.\nRestaure 50 PV d’un Pokémon."
    it: "Bevanda frizzante.\nRestituisce 50 PS a un Pokémon."
    de: "Ein sprudelndes Mineralwasser, das die KP eines\nPokémon um 50 Punkte auffüllt."
    es: "Chispeante bebida gaseosa que restaura 50 PS de un\nPokémon."
    ko: "싸하고 톡 쏘는 사이다.\n포켓몬 1마리의 HP를\n50만큼 회복한다."
    zh_simp: "翻腾着气泡的汽水。\n能让１只宝可梦\n回复５０ＨＰ。"
    zh_trad: "冒著氣泡的汽水。\n能讓１隻寶可夢\n回復５０ＨＰ。"
soft_sand:
  names:
    jp_kana: やわらかいすな
    jp_kanji: やわらかいすな
    en: Soft Sand
    fr: Sable Doux
    it: Sabbia Soffice
    de: Pudersand
    es: Arena Fina
    ko: 부드러운모래
    zh_simp: 柔软沙子
    zh_trad: 柔軟沙子
  descriptions:
    jp_kana: "さわると　サラサラする　すな。\nもたせると　じめんタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "さわると　サラサラする　砂。\n持たせると　じめんタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon. It’s a loose, silky\nsand that boosts the power of Ground-type moves."
    fr: "Objet à tenir. Du sable fin et soyeux qui augmente\nla puissance des capacités de type Sol."
    it: "Strumento da dare a un Pokémon.\nSabbia leggera e farinosa che potenzia le mosse\ndi tipo Terra."
    de: "Ein Item zum Tragen. Samtiger Sand, der Attacken vom\nTyp Boden verstärkt."
    es: "Debe llevarla un Pokémon. La suavidad de la arena\nfortalece los movimientos de tipo Tierra."
    ko: "만지면 보슬보슬한 모래.\n지니게 하면 땅타입\n기술의 위력이 올라간다."
    zh_simp: "手感细腻的沙子。\n携带后，地面属性的\n招式威力就会提高。"
    zh_trad: "手感細緻的沙子。\n攜帶後，地面屬性的\n招式威力就會提高。"
solganium_z:bag:
  names:
    jp_kana: ソルガレオＺ
    jp_kanji: ソルガレオＺ
    en: Solganium Z
    fr: Solgazélite
    it: Solgaleium Z
    de: Solgalium Z
    es: Solgaleostal Z
    ko: 솔가레오Z
    zh_simp: 索尔迦雷欧Ｚ
    zh_trad: 索爾迦雷歐Ｚ
  descriptions:
    jp_kana: "ソルガレオの　メテオドライブを\nＺワザに　グレードアップする\nＺパワーの　けっしょうを　つくりだす。"
    jp_kanji: "ソルガレオの　メテオドライブを\nＺワザに　グレードアップする\nＺパワーの　結晶を　つくりだす。"
    en: "It converts Z-Power into crystals that upgrade\nSolgaleo’s Sunsteel Strike to an exclusive Z-Move."
    fr: "Permet de concentrer la Force Z en un cristal qui,\ntenu, autorise Solgaleo à transformer son Choc Météore\nen capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono a Solgaleo di trasformare la mossa\nAstrocarica in una mossa Z."
    de: "Kristallisierte Z-Kraft, die Solgaleos Attacke Stahlgestirn\nzu einer Z-Attacke aufstuft. Wird bei Bedarf\nautomatisch vervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a\nSolgaleo convertir su Meteoimpacto en un\nmovimiento Z."
    ko: "솔가레오의 메테오드라이브를\nZ기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将索尔迦雷欧的流星闪冲\n升级成Ｚ招式的Ｚ力量结晶。"
    zh_trad: "可用來製造將\n索爾迦雷歐的流星閃衝\n升級為Ｚ招式的Ｚ力量結晶。"
solganium_z:held:
  names:
    jp_kana: ソルガレオＺ
    jp_kanji: ソルガレオＺ
    en: Solganium Z
    fr: Solgazélite
    it: Solgaleium Z
    de: Solgalium Z
    es: Solgaleostal Z
    ko: 솔가레오Z
    zh_simp: 索尔迦雷欧Ｚ
    zh_trad: 索爾迦雷歐Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　けっしょう。\nソルガレオの　メテオドライブを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nソルガレオの　メテオドライブを\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Solgaleo’s Sunsteel Strike to a Z-Move."
    fr: "Une cristallisation de la Force Z, permettant\nde transformer le Choc Météore de Solgaleo\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare la mossa Astrocarica\ndi Solgaleo in una mossa Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft Solgaleos\nAttacke Stahlgestirn zu einer Z-Attacke auf."
    es: "Cristal que confiere el Poder Z al movimiento\nMeteoimpacto de Solgaleo."
    ko: "Z파워의 결정.\n솔가레오의 메테오드라이브를\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将索尔迦雷欧的流星闪冲\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n可將索爾迦雷歐的流星閃衝\n升級為Ｚ招式。"
sonias_book:
  names:
    jp_kana: ソニアのほん
    jp_kanji: ソニアのほん
    en: Sonia’s Book
    fr: Livre de Sonya
    it: Libro di Sonia
    de: Sanias Buch
    es: Libro de Sonia
    ko: 소니아의책
    zh_simp: 索妮亚的书
    zh_trad: 索妮亞的書
  descriptions:
    jp_kana: "ソニアはかせが　しゅっぱん　した。\nガラルちほうの　でんせつに　ついての\nしんはっけんが　おもしろく　かかれている。"
    jp_kanji: "ソニア博士が　出版　した。\nガラル地方の　伝説に　ついての\n新発見が　おもしろく　書かれている。"
    en: "Professor Sonia’s published writings. Her new\ndiscoveries about the Galar region’s legends are\nrecorded in this enjoyable read."
    fr: "Ouvrage publié par Professeure Sonya,\noù elle conte à sa manière les nouvelles découvertes\nfaites au sujet des légendes de Galar."
    it: "Pubblicazione della Professoressa Sonia.\nRaccoglie tutte le ultime scoperte riguardanti le\nleggende di Galar in un libro scorrevole e informativo."
    de: "Dieses Buch wurde von Professor Sania herausgebracht.\nEs ist eine unterhaltsam geschriebene Abhandlung über\nneue Erkenntnisse zu Legenden der Galar-Region."
    es: "Publicación de la Profesora Sonia que trata de forma\namena los recientes descubrimientos sobre las leyendas\nde la región de Galar."
    ko: "소니아박사가 출판했다.\n가라르지방의 전설에 대한\n새로운 발견이 흥미롭게 쓰여 있다."
    zh_simp: "索妮亚博士出版的书。\n以风趣的文笔展示了\n关于伽勒尔地区传说的最新发现。"
    zh_trad: "索妮亞博士出版的書。\n書中以有趣的手法描述了\n關於伽勒爾地區傳說的新發現。"
soot_sack:
  names:
    jp_kana: はいぶくろ
    jp_kanji: はいぶくろ
    en: Soot Sack
    fr: Sac à Suie
    it: Sacco cenere
    de: Aschetasche
    es: Saco Hollín
    ko: 재주머니
    zh_simp: 集灰袋
    zh_trad: 集灰袋
  descriptions:
    jp_kana: "つもった　かざんばいを\nあつめるための　ふくろ。"
    jp_kanji: "つもった　かざんばいを\n集めるための　ふくろ。"
    en: A sack used to gather and hold volcanic ash.
    fr: "Un sac utilisé pour ramasser les cendres volcaniques\naccumulées au sol."
    it: Sacco per raccogliere la cenere vulcanica.
    de: "Eine Tasche, mit der du herabgerieselte Vulkanasche\naufsammeln kannst."
    es: "Bolsa en la que recoger la ceniza de volcán\nsedimentada en el suelo."
    ko: "쌓인 화산재를\n모으기 위한 주머니."
    zh_simp: "将堆积起来的火山灰\n收集起来的袋子。"
    zh_trad: "用於收集堆積的\n火山灰的袋子。"
soothe_bell:
  names:
    jp_kana: やすらぎのすず
    jp_kanji: やすらぎのすず
    en: Soothe Bell
    fr: Grelot Zen
    it: Calmanella
    de: Sanftglocke
    es: Cascabel Alivio
    ko: 평온의방울
    zh_simp: 安抚之铃
    zh_trad: 安撫之鈴
  descriptions:
    jp_kana: "ここちよい　ねいろの　すず。\nもたせた　ポケモンは　こころが\nやすらぎ　なかよく　なりやすくなる。"
    jp_kanji: "心地よい　音色の　鈴。\n持たせた　ポケモンは　こころが\nやすらぎ　なかよく　なりやすくなる。"
    en: "An item to be held by a Pokémon. The comforting\nchime of this bell calms the holder, making\nit friendly."
    fr: "Objet à tenir. Un grelot dont le carillon calme le porteur\net favorise l’amitié."
    it: "Strumento da dare a un Pokémon.\nCampanella dal suono rassicurante che calma\nchi la usa aumentandone il livello di amicizia."
    de: "Ein Item, das einem Pokémon zum Tragen gegeben\nwerden kann. Es besänftigt den Träger und macht ihn\nzutraulicher."
    es: "Un cascabel con un tañido calmante que reconforta al\nPokémon que lo lleva y lo vuelve más amistoso."
    ko: "기분 좋은 소리의 방울.\n지니게 한 포켓몬은 마음이\n편안해져 친밀해지기 쉬워진다."
    zh_simp: "音色悦耳的铃铛。\n让携带它的宝可梦清心怡神，\n变得容易和训练家亲密。"
    zh_trad: "音色悅耳的鈴鐺。\n寶可夢攜帶後心情會平靜下來，\n容易和訓練家變得友好。"
soul_dew:
  names:
    jp_kana: こころのしずく
    jp_kanji: こころのしずく
    en: Soul Dew
    fr: Rosée Âme
    it: Cuorugiada
    de: Seelentau
    es: Rocío Bondad
    ko: 마음의물방울
    zh_simp: 心之水滴
    zh_trad: 心之水滴
  descriptions:
    jp_kana: "ラティオスや　ラティアスに　もたせると\nエスパーと　ドラゴンタイプの　わざの\nいりょくが　あがる　ふしぎな　たま。"
    jp_kanji: "ラティオスや　ラティアスに　持たせると\nエスパーと　ドラゴンタイプの　技の\n威力が　あがる　不思議な　珠。"
    en: "A wondrous orb to be held by either Latios or\nLatias. It raises the power of Psychic- and\nDragon-type moves."
    fr: "Objet à faire tenir à Latios ou Latias.\nUn orbe prodigieux qui augmente la puissance\nde leurs capacités de type Psy ou Dragon."
    it: "Sfera miracolosa da dare a Latios o Latias.\nAumenta la potenza delle mosse di tipo Psico\ne Drago."
    de: "Ein Item, das von Latios oder Latias getragen werden\nkann. Es erhöht die Stärke von Psycho- und Drachen-\nAttacken."
    es: "Un orbe fantástico que debe llevar Latios o Latias.\nPotencia los movimientos de tipo Psíquico y Dragón."
    ko: "라티오스나 라티아스에게 지니게 하면\n에스퍼와 드래곤타입 기술의 위력이\n올라가는 이상한 구슬."
    zh_simp: "让拉帝欧斯或拉帝亚斯携带后，\n超能力和龙属性的招式威力\n就会提高的神奇珠子。"
    zh_trad: "讓拉帝歐斯或拉帝亞斯攜帶後，\n超能力和龍屬性的招式威力\n就會提高的神奇珠子。"
soul_slate:
  names:
    jp_kana: こころのせきばん
    jp_kanji: こころのせきばん
    en: Soul Slate
    fr: Tablette Cœur
    it: Piastra del cuore
    de: Gefühlsplatte
    es: Losa Empatía
    ko: 마음의석판
    zh_simp: 心之石板
    zh_trad: 心之石板
  descriptions:
    jp_kana: "ふしぎな　ちからに　あふれる　せきばん。\nハマナスパークの　こころのへやと\nふかい　つながりを　かんじる。"
    jp_kanji: "不思議な　力に　あふれる　石板。\nハマナスパークの　心の部屋と\n深い　つながりを　感じる。"
    en: "A slate overflowing with enigmatic energy. You can feel\na strong connection between it and the Soul Room at\nRamanas Park."
    fr: "Une tablette qui regorge d’une étrange énergie.\nElle semble intimement liée à la Salle du Cœur\ndu Parc Rosa Rugosa."
    it: "Lastra di pietra che emana una misteriosa energia.\nSembra profondamente connessa alla Stanza del cuore\ndel Parco Rosa Rugosa."
    de: "Eine Platte, die vor rätselhafter Energie strotzt.\nMan kann eine starke Verbindung zwischen ihr und der\nGefühlskammer im Hamanasu-Park spüren."
    es: "Una losa rebosante de una misteriosa energía.\nParece estrechamente relacionada con la Sala\nde la Empatía del Parque Hansa."
    ko: "신비한 힘이 넘치는 석판.\n해당화파크의 마음의 방과\n깊은 연관이 있는 것 같다."
    zh_simp: "充满了神秘力量的石板。\n感觉它与玫瑰公园的心之厅\n有着很深的关联。"
    zh_trad: "充滿神奇力量的石板。\n感覺它和玫瑰公園的心之廳\n有很深的關係。"
sparkling_stone:
  names:
    jp_kana: かがやくいし
    jp_kanji: かがやくいし
    en: Sparkling Stone
    fr: Gemme Lumière
    it: Pietra lucente
    de: Glitzerstein
    es: Piedra Brillante
    ko: 빛나는돌
    zh_simp: 光辉石
    zh_trad: 光輝石
  descriptions:
    jp_kana: "アローラの　まもりがみと　される\nポケモンから　もらった　いし。\nかがやきに　ひみつが　あるという。"
    jp_kanji: "アローラの　守り神と　される\nポケモンから　もらった　石。\nかがやきに　秘密が　あるという。"
    en: "A stone entrusted by a Pokémon that has been\nvenerated as a guardian deity in the Alola region.\nThere is said to be some secret in how it sparkles."
    fr: "Une pierre donnée par un Pokémon gardien d’Alola.\nSon éclat cache un secret."
    it: "Pietra ricevuta dal Pokémon protettore di Alola.\nDietro la sua lucentezza si nasconde un segreto."
    de: "Ein Stein, den du von einem der Schutzpatrone Alolas\nerhalten hast. Es heißt, dass sich hinter dem Glitzern ein\nGeheimnis verberge."
    es: "Piedra con un misterioso brillo entregada por un\nPokémon considerado como uno de los espíritus\nguardianes de Alola."
    ko: "알로라의 수호신으로 여겨지는\n포켓몬으로부터 받은 돌.\n빛에 비밀이 있다고 한다."
    zh_simp: "从被认为是阿罗拉守护神的\n宝可梦那里得到的石头。\n据说其光辉下有着某种秘密。"
    zh_trad: "從被認為是阿羅拉守護神的\n寶可夢處得到的石頭。\n據說其光輝包含著某種秘密。"
spearow_candy:
  names:
    jp_kana: オニスズメのアメ
    jp_kanji: オニスズメのアメ
    en: Spearow Candy
    fr: Bonbon Piafabec
    it: Caramella Spearow
    de: Habitak-Bonbon
    es: Caramelo Spearow
    ko: 깨비참의사탕
    zh_simp: 烈雀的糖果
    zh_trad: 烈雀的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
spell_tag:
  names:
    jp_kana: のろいのおふだ
    jp_kanji: のろいのおふだ
    en: Spell Tag
    fr: Rune Sort
    it: Spettrotarga
    de: Bannsticker
    es: Hechizo
    ko: 저주의부적
    zh_simp: 咒术之符
    zh_trad: 詛咒之符
  descriptions:
    jp_kana: "あやしくて　ぶきみな　おふだ。\nもたせると　ゴーストタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "怪しくて　不気味な　お札。\n持たせると　ゴーストタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon. It’s a sinister,\neerie tag that boosts the power of\nGhost-type moves."
    fr: "Objet à tenir. Un talisman sinistre et étrange\nqui augmente la puissance des capacités\nde type Spectre."
    it: "Strumento da dare a un Pokémon.\nTarga sinistra e inquietante che potenzia le mosse\ndi tipo Spettro."
    de: "Ein Item zum Tragen. Ein fieser, unheimlicher Sticker,\nder Attacken vom Typ Geist verstärkt."
    es: "Misterioso y siniestro objeto que potencia los\nmovimientos de tipo Fantasma. Debe llevarlo un\nPokémon."
    ko: "괴상하고 으스스한 부적.\n지니게 하면 고스트타입\n기술의 위력이 올라간다."
    zh_simp: "古怪可怕的咒符。\n携带后，幽灵属性的\n招式威力就会提高。"
    zh_trad: "古怪可怕的咒符。\n攜帶後，幽靈屬性的\n招式威力就會提高。"
spelon_berry:
  names:
    jp_kana: ノワキのみ
    jp_kanji: ノワキのみ
    en: Spelon Berry
    fr: Baie Kiwan
    it: Baccamelos
    de: Kiwanbeere
    es: Baya Wikano
    ko: 메호키열매
    zh_simp: 刺角果
    zh_trad: 刺角果
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。\nふかふかのつちに　うめると\nノワキが　そだつ。"
    jp_kanji: "ポフィンの　材料。\nふかふかの土に　埋めると\nノワキが　育つ。"
    en: "A Poffin ingredient. Bury it in soft soil to grow a\nSpelon Berry plant."
    fr: "Un ingrédient entrant dans la confection de Poffins.\nPlantez cette Baie dans un sol meuble et fertile\npour faire pousser un arbre à Baies Kiwan."
    it: "Si usa per fare i poffin. Seminala nella terra soffice\nper far crescere una pianta di Baccamelos."
    de: "Eine Knursp-Zutat. Pflanze sie in weichen Lehmboden\nein, damit neue Kiwanbeeren wachsen."
    es: "Ingrediente para pokochos. Si se planta en tierra suelta,\nsaldrá una planta de Wikano."
    ko: "포핀의 재료.\n푹신푹신한 땅에 심으면\n메호키가 자란다."
    zh_simp: "宝芬的材料。\n埋在松软的土地里\n可以培育出刺角。"
    zh_trad: "製作寶芬的材料。\n埋進鬆軟的泥土裡，\n長成後會結出刺角。"
spice_mix:
  names:
    jp_kana: スパイスセット
    jp_kanji: スパイスセット
    en: Spice Mix
    fr: Épices
    it: Spezie assortite
    de: Gewürzmix
    es: Especias
    ko: 스파이스세트
    zh_simp: 香料组合
    zh_trad: 香料組合
  descriptions:
    jp_kana: "キャンプの　りょうりに　つかう\nしょくざいの　いっしゅ。５０しゅるいを\nこえる　スパイスが　はいっており　からい。"
    jp_kanji: "キャンプの　料理に　使う\n食材の　一種。５０種類を\n超える　スパイスが　入っており　辛い。"
    en: "One of the many ingredients that can be used for\ncooking at your camp. There are over fifty spices\ncontained within this ingredient’s hot flavor."
    fr: "Un ingrédient de cuisine pour le camping.\nCe mélange de plus d’une cinquantaine d’épices\nest souvent utilisé pour donner du piquant au curry."
    it: "Uno degli ingredienti che puoi usare per cucinare\nin campeggio. Miscela di oltre cinquanta spezie\ndiverse, dal sapore piccante."
    de: "Eine Zutat für PokéCamping-Mahlzeiten. Diese scharfe\nMischung setzt sich aus mehr als 50 verschiedenen\nGewürzen zusammen."
    es: "Un ingrediente para cocinar en el campamento. Es una\nmezcla picante de más de 50 tipos de especias."
    ko: "캠프 요리에 사용되는\n식재료 중 하나. 50가지가 넘는\n향신료가 들어 있어 맵다."
    zh_simp: "在露营营地制作料理时会使用的\n一种食材。加入了超过５０种\n香辛料调配而成，香辣十足。"
    zh_trad: "製作露營料理時使用的食材之一。\n裡面有超過５０種的香料，很辣。"
splash_plate:
  names:
    jp_kana: しずくプレート
    jp_kanji: しずくプレート
    en: Splash Plate
    fr: Plaque Hydro
    it: Lastraidro
    de: Wassertafel
    es: Tabla Linfa
    ko: 물방울플레이트
    zh_simp: 水滴石板
    zh_trad: 水滴石板
  descriptions:
    jp_kana: "みずの　タイプの　せきばん。\nもたせると　みずタイプの\nわざの　いりょくが　つよまる。"
    jp_kanji: "みずの　タイプの　石盤。\n持たせると　みずタイプの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon. It’s a stone tablet\nthat boosts the power of Water-type moves."
    fr: "Objet à tenir. Une tablette en pierre augmentant\nla puissance des capacités de type Eau."
    it: "Strumento da dare a un Pokémon. Lastra di pietra che\npotenzia le mosse di tipo Acqua."
    de: "Ein Item zum Tragen. Diese Steintafel verstärkt\nAttacken vom Typ Wasser."
    es: "Tabla de piedra que potencia los movimientos de tipo\nAgua. Debe llevarla un Pokémon."
    ko: "물타입의 석판.\n지니게 하면 물타입\n기술의 위력이 강해진다."
    zh_simp: "水属性的石板。\n携带后，水属性的\n招式威力就会增强。"
    zh_trad: "水屬性的石板。\n攜帶後，水屬性的\n招式威力就會增強。"
spooky_plate:
  names:
    jp_kana: もののけプレート
    jp_kanji: もののけプレート
    en: Spooky Plate
    fr: Plaque Fantôme
    it: Lastratetra
    de: Spuktafel
    es: Tabla Terror
    ko: 원령플레이트
    zh_simp: 妖怪石板
    zh_trad: 妖怪石板
  descriptions:
    jp_kana: "ゴーストの　タイプの　せきばん。\nもたせると　ゴーストタイプの\nわざの　いりょくが　つよまる。"
    jp_kanji: "ゴーストの　タイプの　石盤。\n持たせると　ゴーストタイプの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon. It’s a stone tablet\nthat boosts the power of Ghost-type moves."
    fr: "Objet à tenir. Une tablette en pierre augmentant\nla puissance des capacités de type Spectre."
    it: "Strumento da dare a un Pokémon. Lastra di pietra che\npotenzia le mosse di tipo Spettro."
    de: "Ein Item zum Tragen. Diese Steintafel verstärkt\nAttacken vom Typ Geist."
    es: "Tabla de piedra que potencia los movimientos de tipo\nFantasma. Debe llevarla un Pokémon."
    ko: "고스트타입의 석판.\n지니게 하면 고스트타입\n기술의 위력이 강해진다."
    zh_simp: "幽灵属性的石板。\n携带后，幽灵属性的\n招式威力就会增强。"
    zh_trad: "幽靈屬性的石板。\n攜帶後，幽靈屬性的\n招式威力就會增強。"
sport_ball:
  names:
    jp_kana: コンペボール
    jp_kanji: コンペボール
    en: Sport Ball
    fr: Compét’Ball
    it: Gara Ball
    de: Turnierball
    es: Competi Ball
    ko: 콤페볼
    zh_simp: 竞赛球
    zh_trad: 競賽球
  descriptions:
    jp_kana: "むしとりたいかいの　なかで\nつかう　とくべつな　ボール。"
    jp_kanji: "虫捕り大会の　なかで\n使う　特別な　ボール。"
    en: "A special Poké Ball that is used during the\nBug-Catching Contest."
    fr: "Une Poké Ball spéciale utilisée au Concours\nde Capture d’insecte."
    it: "Poké Ball speciale utilizzata solo nella Gara\nPigliamosche."
    de: Ein Ball, der nur beim Käferturnier eingesetzt wird.
    es: "Poké Ball que se utiliza en el Concurso de Captura de\nBichos."
    ko: "곤충채집 대회 내에서\n사용하는 특별한 볼."
    zh_simp: "在捕虫大赛上使用的\n特殊的球。"
    zh_trad: "在捕蟲大賽上使用的\n特殊的球。"
sprayduck:
  names:
    jp_kana: コダックじょうろ
    jp_kanji: コダックじょうろ
    en: Sprayduck
    fr: Kwakarrosoir
    it: Sprayduck
    de: Enton-Kanne
    es: Psydugadera
    ko: 고라파덕물뿌리개
    zh_simp: 可达鸭喷壶
    zh_trad: 可達鴨噴壺
  descriptions:
    jp_kana: "みずを　かける　どうぐ。\nふかふかのつちに　うめた　きのみを\nすくすく　そだてる。"
    jp_kanji: "水を　かける　道具。\nふかふかのつちに　埋めた　きのみを\nすくすく　育てる。"
    en: "A watering can shaped like a Psyduck. It helps\npromote the healthy growth of any Berries planted\nin good, soft soil."
    fr: "Un arrosoir en forme de Psykokwak.\nAide à la croissance des Baies plantées\ndans les sols meubles."
    it: "Annaffiatoio fatto a forma di Psyduck.\nFavorisce la crescita delle bacche piantate\nnel terreno soffice."
    de: "Eine Gießkanne in Form von Enton. Gieße gepflanzte\nBeeren, damit sie besser wachsen."
    es: "Una regadera con forma de Psyduck. Ayuda a que las\nbayas plantadas en suelo fértil crezcan mejor."
    ko: "물을 주는 도구.\n푹신푹신한 흙에 심은 나무열매를\n쑥쑥 키운다."
    zh_simp: "浇水的道具。\n能让埋在松软土壤里的\n树果快快长大。"
    zh_trad: "澆水的器具。\n能讓埋在鬆軟土壤裡的\n樹果快快長大。"
sprinklotad:
  names:
    jp_kana: ハスボーじょうろ
    jp_kanji: ハスボーじょうろ
    en: Sprinklotad
    fr: Nénurrosoir
    it: Irrigalotad
    de: Loturzelkanne
    es: Lotadgadera
    ko: 연꽃몬물뿌리개
    zh_simp: 莲叶童子喷壶
    zh_trad: 蓮葉童子噴壺
  descriptions:
    jp_kana: "みずを　かける　どうぐ。\nふかふかのつちに　うめた\nきのみを　すくすく　そだてる。"
    jp_kanji: "水を　かける　道具。\nふかふかのつちに　埋めた\nきのみを　すくすく　育てる。"
    en: "A watering can shaped like a Lotad. It helps\npromote the healthy growth of any Berries planted\nin good, soft soil."
    fr: "Un arrosoir en forme de Nénupiot qui aide\nà la croissance des Baies plantées dans les sols meubles."
    it: "Strumento per annaffiare a forma di Lotad.\nFavorisce la crescita delle bacche piantate\nnel terreno soffice."
    de: "Eine Gießkanne in Form von Loturzel. Gieße gepflanzte\nBeeren, damit sie besser wachsen."
    es: "Una regadera con forma de Lotad. Ayuda a que las\nbayas plantadas en suelo blandito crezcan mejor."
    ko: "물을 주는 도구.\n푹신푹신한 흙에 심은\n나무열매를 쑥쑥 키운다."
    zh_simp: "浇水的道具。\n能让埋在松软土壤里的\n树果快快长大。"
    zh_trad: "澆水的器具。\n能讓埋在鬆軟土壤裡的\n樹果快快長大。"
squall_slate:
  names:
    jp_kana: あらしのせきばん
    jp_kanji: あらしのせきばん
    en: Squall Slate
    fr: Tablette Tempête
    it: Piastra dei venti
    de: Sturmplatte
    es: Losa Tormenta
    ko: 폭풍의석판
    zh_simp: 暴风石板
    zh_trad: 暴風石板
  descriptions:
    jp_kana: "ふしぎな　ちからに　あふれる　せきばん。\nハマナスパークの　あらしのへやと\nふかい　つながりを　かんじる。"
    jp_kanji: "不思議な　力に　あふれる　石板。\nハマナスパークの　嵐の部屋と\n深い　つながりを　感じる。"
    en: "A slate overflowing with enigmatic energy. You can feel\na strong connection between it and the Squall Room at\nRamanas Park."
    fr: "Une tablette qui regorge d’une étrange énergie.\nElle semble intimement liée à la Salle de la Tempête\ndu Parc Rosa Rugosa."
    it: "Lastra di pietra che emana una misteriosa energia.\nSembra profondamente connessa alla Stanza dei venti\ndel Parco Rosa Rugosa."
    de: "Eine Platte, die vor rätselhafter Energie strotzt.\nMan kann eine starke Verbindung zwischen ihr und der\nSturmkammer im Hamanasu-Park spüren."
    es: "Una losa rebosante de una misteriosa energía.\nParece estrechamente relacionada con la Sala\nde la Tormenta del Parque Hansa."
    ko: "신비한 힘이 넘치는 석판.\n해당화파크의 폭풍의 방과\n깊은 연관이 있는 것 같다."
    zh_simp: "充满了神秘力量的石板。\n感觉它与玫瑰公园的暴风之厅\n有着很深的关联。"
    zh_trad: "充滿神奇力量的石板。\n感覺它和玫瑰公園的暴風之廳\n有很深的關係。"
squirt_bottle:
  names:
    jp_kana: ゼニガメじょうろ
    jp_kanji: ゼニガメじょうろ
    en: Squirt Bottle
    fr: Carapuce à O
    it: Annaffiatoio
    de: Schiggykanne
    es: Regadera
    ko: 꼬부기물뿌리개
    zh_simp: 杰尼龟喷壶
    zh_trad: 傑尼龜噴壺
  descriptions:
    jp_kana: "みずを　かける　どうぐ。\nきのみプランターの　きのみを\nすくすく　そだてる。"
    jp_kanji: "みずを　かける　道具。\nきのみプランターの　きのみを\nすくすく　育てる。"
    en: A bottle used for watering plants in the Berry Pots.
    fr: "Un arrosoir qui permet de faire croître rapidement\nles Baies plantées dans le Plante-Baies."
    it: "Strumento che serve a innaffiare.\nPermette un’ottima crescita delle bacche\nseminate nel Piantabacche."
    de: "Eine Gießkanne, durch deren Wasser Beeren im\nPflanzset umso rascher wachsen."
    es: "Objeto que contiene agua y se usa para regar las\nbayas del Plantabayas."
    ko: "물을 주는 도구.\n나무열매플랜터의 나무열매를\n쑥쑥 키운다."
    zh_simp: "浇水的道具。\n能让树果种植盆里的\n树果快快长大。"
    zh_trad: "澆水的器具。\n能讓樹果種植盆裡的\n樹果快快長大。"
squirtle_candy:
  names:
    jp_kana: ゼニガメのアメ
    jp_kanji: ゼニガメのアメ
    en: Squirtle Candy
    fr: Bonbon Carapuce
    it: Caramella Squirtle
    de: Schiggy-Bonbon
    es: Caramelo Squirtle
    ko: 꼬부기의사탕
    zh_simp: 杰尼龟的糖果
    zh_trad: 傑尼龜的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
ss_ticket:ss_anne:
  names:
    jp_kana: ふねのチケット
    jp_kanji: ふねのチケット
    en: S.S. Ticket
    fr: Passe Bateau
    it: Biglietto nave
    de: Bootsticket
    es: Ticket del Barco
    ko: 승선티켓
    zh_simp: 船票
    zh_trad: 船票
  descriptions:
    jp_kana: "サント・アンヌごうに　のるとき\nひつような　ふねの　チケット。\nふねの　えが　かかれている。"
    jp_kanji: "サント・アンヌ号に　乗るとき\n必要な　船の　チケット。\n船の　絵が　描かれている。"
    en: "The ticket required to board the S.S. Anne.\nIt has a drawing of a ship on it."
    fr: "Un ticket nécessaire pour embarquer à bord\nde L’Océane. Il y a une image du navire dessus."
    it: "Biglietto per salire sulla Motonave Anna.\nC’è disegnata sopra una nave."
    de: "Ein Ticket, das benötigt wird, um an Bord der MS Anne\nzu gehen. Das Schiff ist darauf abgebildet."
    es: "Billete necesario para embarcar en el S. S. Anne. Tiene\ndibujado un barco."
    ko: "상트앙느호에 탈 때\n필요한 승선 티켓.\n배 그림이 그려져 있다."
    zh_simp: "乘坐圣特安努号时所需的船票。\n上面绘有船只的图案。"
    zh_trad: "乘搭聖特安努號時\n所需的船票。\n上面畫了一艘船。"
ss_ticket:ss_aqua:
  names:
    jp_kana: ふねのチケット
    jp_kanji: ふねのチケット
    en: S.S. Ticket
    fr: Passe Bateau
    it: Biglietto nave
    de: Bootsticket
    es: Ticket del Barco
    ko: 승선티켓
    zh_simp: 船票
    zh_trad: 船票
  descriptions:
    jp_kana: "こうそくせん　アクアごうに　のるとき\nひつような　ふねの　チケット。\nふねの　えが　かかれている。"
    jp_kanji: "高速船アクア号に　乗るとき\n必要な　船の　チケット。\n船の　絵が　描かれている。"
    en: "A ticket required for sailing on the ferry S.S. Aqua.\nIt has a drawing of a ship on its front."
    fr: "Un ticket nécessaire pour embarquer sur le ferry\nL’Aquaria. Un bateau est dessiné dessus."
    it: "Biglietto per imbarcarsi sulla Motonave Acqua.\nC’è disegnata una nave."
    de: "Ein Ticket, um auf der MS Aqua zu fahren. Eine\nZeichnung der Fähre ist auf dem Ticket zu sehen."
    es: "Es el billete válido para embarcar en el Ferry S. S. Aqua.\nTiene dibujado un barco."
    ko: "쾌속선 아쿠아호에 탈 때\n필요한 승선티켓.\n배 그림이 그려져 있다."
    zh_simp: "乘坐高速船水流号时所需的船票。\n上面绘有船的图案。"
    zh_trad: "乘坐高速船水流號時\n所需的船票。\n上面繪有船的圖案。"
ss_ticket:ss_tidal:
  names:
    jp_kana: ふねのチケット
    jp_kanji: ふねのチケット
    en: S.S. Ticket
    fr: Passe Bateau
    it: Biglietto nave
    de: Bootsticket
    es: Ticket del Barco
    ko: 승선티켓
    zh_simp: 船票
    zh_trad: 船票
  descriptions:
    jp_kana: "れんらくせんに\nのるとき　ひつよう。"
    jp_kanji: "連絡船に\n乗るとき　必要。"
    en: Ticket required for sailing on a ferry.
    fr: Indispensable pour prendre le ferry.
    it: Biglietto necessario per imbarcarsi su un traghetto.
    de: Ein Ticket, mit dem man die Fähre benutzen kann.
    es: Necesario para montar en barcos de línea regular.
    ko: "연락선에\n탈 때 필요하다."
    zh_simp: 乘坐渡船时需要用到。
    zh_trad: "乘坐交通船時\n需要用到。"
stable_mulch:
  names:
    jp_kana: ながながこやし
    jp_kanji: ながながこやし
    en: Stable Mulch
    fr: Fertistable
    it: Fertilsaldo
    de: Stabilmulch
    es: Abono Fijador
    ko: 오래오래비료
    zh_simp: 久久肥
    zh_trad: 久久肥
  descriptions:
    jp_kana: "きのみを　そだてるときの　ひりょう。\nしかし　ホウエンちほうの　つちには\nまるで　なじまないので　こうかが　ない。"
    jp_kanji: "きのみを　育てるときの　肥料。\nしかし　ホウエン地方の　土には\nまるで　なじまないので　効果が　ない。"
    en: "A fertilizer for growing Berries. However, it appears\nto be unsuitable for the soil in the Hoenn region and\nhas no effect."
    fr: "Un engrais à utiliser sur un sol meuble.\nIl n’est cependant pas adapté aux terres de Hoenn\net n’y a aucun effet."
    it: "Fertilizzante usato per coltivare le bacche.\nTuttavia, non ha effetto a Hoenn, perché\nnon è adatto al terreno della regione."
    de: "Mulch zur Nutzung auf Beerenfeldern. Durch seine\nUnverträglichkeit mit den Böden in Hoenn bleibt sein\nEinsatz dort ohne Wirkung."
    es: "Un fertilizante usado para el cultivo de bayas. Parece\nque no se asienta bien en el suelo de Hoenn, por lo\nque no tiene efecto en esta región."
    ko: "나무열매를 키울 때 사용하는 비료.\n그러나 호연지방의 흙에는\n전혀 맞지 않기에 효과가 없다."
    zh_simp: "培育树果时的肥料。\n但完全不适合丰缘地区的土壤，\n所以没什么效果。"
    zh_trad: "培育樹果時的肥料。\n但完全不適合豐緣地區的土壤，\n所以沒什麼效果。"
star_piece:
  names:
    jp_kana: ほしのかけら
    jp_kanji: ほしのかけら
    en: Star Piece
    fr: Morceau d’Étoile
    it: Pezzo Stella
    de: Sternenstück
    es: Trozo Estrella
    ko: 별의조각
    zh_simp: 星星碎片
    zh_trad: 星星碎片
  descriptions:
    jp_kana: "キラキラと　あかく　ひかる\nきれいな　ほうせきの　かけら。\nショップで　たかく　うれる。"
    jp_kanji: "キラキラと　赤く　光る\nきれいな　宝石の　かけら。\nショップで　高く　売れる。"
    en: "A small shard of a beautiful gem that gives off\na distinctly red sparkle. It can be sold at a high price\nto shops."
    fr: "Un fragment de gemme qui brille d’un éclat rouge.\nPeut être vendu à bon prix en magasin."
    it: "Frammento rosso acceso di una gemma.\nSi può vendere a un prezzo piuttosto alto\nnei negozi."
    de: "Teil eines hübschen Edelsteins, der in rötlicher Farbe\nschimmert. Erzielt einen hohen Preis, wenn man ihn\nverkauft."
    es: "Fragmento de una bonita gema roja que puede\nvenderse muy caro en las tiendas."
    ko: "반짝반짝 빨갛게 빛나는\n예쁜 보석 조각.\n상점에서 비싸게 팔린다."
    zh_simp: "闪着红光且十分\n美丽的宝石碎片。\n可以在商店高价出售。"
    zh_trad: "閃著紅光且十分\n美麗的寶石碎片。\n可以在商店高價出售。"
star_sweet:
  names:
    jp_kana: スターアメざいく
    jp_kanji: スターアメざいく
    en: Star Sweet
    fr: Étoile en Sucre
    it: Bonbonstella
    de: Zucker-Stern
    es: Confite Estrella
    ko: 스타사탕공예
    zh_simp: 星星糖饰
    zh_trad: 星星糖飾
  descriptions:
    jp_kana: "スターの　かたちを　した　アメざいく。\nマホミルに　もたせてあげると\nくるくる　まわって　よろこぶ。"
    jp_kanji: "スターの　形を　した　アメ細工。\nマホミルに　持たせてあげると\nくるくる　回って　喜ぶ。"
    en: "A star-shaped sweet. When a Milcery\nholds this, it spins around happily."
    fr: "Un bonbon en forme d’étoile.\nQuand on le donne à un Crèmy, il danse de bonheur."
    it: "Bonbon a forma di stella. Se dato a Milcery,\nil Pokémon farà le piroette per la felicità."
    de: "Zuckerwerk in Form eines Sterns. Gibt man es Hokumil\nzum Tragen, dreht es sich vor Freude im Kreis."
    es: "Figura de caramelo con forma de estrella. Al dárselo a\nMilcery, se pone a girar rebosante de alegría."
    ko: "별 모양의 사탕공예.\n마빌크에게 지니게 하면\n빙빙 돌며 기뻐한다."
    zh_simp: "星星形状的工艺糖果。\n让小仙奶携带的话，\n会高兴地转圈圈。"
    zh_trad: "星星形狀的工藝糖果。\n讓小仙奶攜帶的話，\n牠會高興得轉圈圈。"
stardust:
  names:
    jp_kana: ほしのすな
    jp_kanji: ほしのすな
    en: Stardust
    fr: Poussière Étoile
    it: Polvostella
    de: Sternenstaub
    es: Polvo Estelar
    ko: 별의모래
    zh_simp: 星星沙子
    zh_trad: 星星沙子
  descriptions:
    jp_kana: "てざわりが　サラサラの\nあかくて　きれいな　すな。\nショップで　やすく　うれる。"
    jp_kanji: "てざわりが　サラサラの\n赤くて　きれいな　砂。\nショップで　安く　売れる。"
    en: "Lovely red sand that flows between the fingers\nwith a loose, silky feel. It can be sold at a low price\nto shops."
    fr: "Du sable rouge ravissant, aux grains très fins.\nPeut être vendu aux magasins pour un peu d’argent."
    it: "Bella sabbia rossa dalla consistenza leggera\ne farinosa. Si può vendere a un prezzo piuttosto\nbasso nei negozi."
    de: "Schöner, roter Sand, der sich seidenweich anfühlt.\nEr ist von geringem Wert."
    es: "Bonita arena roja de tacto sedoso que no alcanza un\nbuen precio en las tiendas."
    ko: "감촉이 보슬보슬한\n빨갛고 예쁜 모래.\n상점에서 싸게 팔린다."
    zh_simp: "手感细腻且十分\n美丽的红色沙子。\n可以在商店低价出售。"
    zh_trad: "手感細緻且十分\n美麗的紅色沙子。\n可以在商店低價出售。"
starf_berry:
  names:
    jp_kana: スターのみ
    jp_kanji: スターのみ
    en: Starf Berry
    fr: Baie Frista
    it: Baccambola
    de: Krambobeere
    es: Baya Arabol
    ko: 스타열매
    zh_simp: 星桃果
    zh_trad: 星桃果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nピンチのとき　どれか　１つの\nのうりょくが　ぐーんと　あがる。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　どれか　１つの\n能力が　ぐーんと　あがる。"
    en: "A Berry to be consumed by Pokémon. If a Pokémon\nholds one, one of its stats will sharply increase\nwhen it’s in a pinch."
    fr: "Tenue, cette Baie augmente beaucoup une des stats\nen cas de besoin."
    it: "Se il Pokémon che ha questa bacca si trova\nin difficoltà, una delle sue statistiche aumenta\ndi molto."
    de: "Als getragenes Item erhöht diese Beere einen\nStatuswert des Pokémon stark, sobald es in einer\nNotlage steckt."
    es: "Si la lleva un Pokémon, aumenta mucho una\ncaracterística en un momento de apuro."
    ko: "포켓몬에게 지니게 하면\n위급할 때 능력 중의 하나가\n크게 올라간다."
    zh_simp: "让宝可梦携带后，危机时，\n某一项能力就会大幅提高。"
    zh_trad: "讓寶可夢攜帶後，\n危機時，某一項能力\n就會大幅提高。"
staryu_candy:
  names:
    jp_kana: ヒトデマンのアメ
    jp_kanji: ヒトデマンのアメ
    en: Staryu Candy
    fr: Bonbon Stari
    it: Caramella Staryu
    de: Sterndu-Bonbon
    es: Caramelo Staryu
    ko: 별가사리의사탕
    zh_simp: 海星星的糖果
    zh_trad: 海星星的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
steel_gem:
  names:
    jp_kana: はがねのジュエル
    jp_kanji: はがねのジュエル
    en: Steel Gem
    fr: Joyau Acier
    it: Bijouacciaio
    de: Stahljuwel
    es: Gema Acero
    ko: 강철주얼
    zh_simp: 钢之宝石
    zh_trad: 鋼之寶石
  descriptions:
    jp_kana: "はがねの　タイプの　ジュエル。\nもたせると　いちどだけ　はがねの\nわざの　いりょくが　つよまる。"
    jp_kanji: "はがねの　タイプの　ジュエル。\n持たせると　１度だけ　はがねの\n技の　威力が　強まる。"
    en: "A gem with an essence of steel. When held, it\nstrengthens the power of a Steel-type move\none time."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Acier."
    it: "Strumento da dare a un Pokémon.\nGioiello che potenzia una sola volta le mosse\ndi tipo Acciaio."
    de: "Ein Juwel vom Typ Stahl. Es erhöht einmalig die Stärke\neiner Attacke vom Typ Stahl."
    es: "Joya de un solo uso que potencia los movimientos de\ntipo Acero. Debe llevarla un Pokémon."
    ko: "강철타입의 주얼.\n지니게 하면 한 번만 강철\n기술의 위력이 강해진다."
    zh_simp: "钢属性的宝石。\n携带后，钢属性的\n招式威力仅会增强１次。"
    zh_trad: "鋼屬性的寶石。\n攜帶後，鋼屬性招式的\n威力會僅增強１次。"
steel_memory:
  names:
    jp_kana: スチールメモリ
    jp_kanji: スチールメモリ
    en: Steel Memory
    fr: ROM Acier
    it: ROM Acciaio
    de: Stahl-Disc
    es: Disco Acero
    ko: 스틸메모리
    zh_simp: 钢铁存储碟
    zh_trad: 鋼鐵記憶碟
  descriptions:
    jp_kana: "はがねタイプの　データが　はいった\nメモリ。　とくていの　ポケモンが\nもつと　タイプが　かわる。"
    jp_kanji: "はがねタイプの　データが　入った\nメモリ。　特定の　ポケモンが　持つと\nタイプが　変わる。"
    en: "A memory disc that contains Steel-type data.\nIt changes the type of the holder if held by\na certain species of Pokémon."
    fr: "Une carte mémoire contenant des données sur\nle type Acier. Un certain Pokémon peut changer\nde type en l’équipant."
    it: "ROM contenente dati sul tipo Acciaio in formato\ndigitale. Permette a un certo Pokémon di cambiare\ntipo."
    de: "Eine Disc mit Daten zum Typ Stahl. Sie löst bei einem\nbestimmten Pokémon einen Typenwechsel aus."
    es: "Disco de datos que contiene información relativa al tipo\nAcero. Permite cambiar de tipo a cierto Pokémon."
    ko: "강철타입의 데이터가 들어 있는\n메모리. 특정 포켓몬이\n지니면 타입이 바뀐다."
    zh_simp: "装有钢属性数据的存储碟。\n特定宝可梦携带后，\n属性就会发生变化。"
    zh_trad: "裝有鋼屬性資料的記憶碟。\n特定寶可夢攜帶後，\n就會產生屬性的變化。"
steelium_z:bag:
  names:
    jp_kana: ハガネＺ
    jp_kanji: ハガネＺ
    en: Steelium Z
    fr: Métallozélite
    it: Metallium Z
    de: Metallium Z
    es: Metalostal Z
    ko: 강철Z
    zh_simp: 钢Ｚ
    zh_trad: 鋼Ｚ
  descriptions:
    jp_kana: "はがねタイプの　わざを\nＺワザに　グレードアップする\nＺパワーの　けっしょうを　つくりだす。"
    jp_kanji: "はがねタイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nSteel-type moves to Steel-type Z-Moves."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise son porteur à transformer ses capacités\nde type Acier en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono ai Pokémon di trasformare le mosse\ndi tipo Acciaio in mosse Z."
    de: "Kristallisierte Z-Kraft, die Stahl-Attacken zu Z-Attacken\naufstuft. Wird bei Bedarf automatisch vervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a los\nportadores convertir sus movimientos de tipo Acero en\nmovimientos Z."
    ko: "강철타입 기술을\nZ기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将钢属性招式升级成\nＺ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把鋼屬性招式\n升級為Ｚ招式的Ｚ力量結晶。"
steelium_z:held:
  names:
    jp_kana: ハガネＺ
    jp_kanji: ハガネＺ
    en: Steelium Z
    fr: Métallozélite
    it: Metallium Z
    de: Metallium Z
    es: Metalostal Z
    ko: 강철Z
    zh_simp: 钢Ｚ
    zh_trad: 鋼Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　けっしょう。\nはがねタイプの　わざを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nはがねタイプの　技を\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Steel-type moves to Z-Moves."
    fr: "Une cristallisation de la Force Z, permettant\nde transformer les capacités de type Acier\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare le mosse di tipo Acciaio\nin mosse Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft\nStahl-Attacken zu Z-Attacken auf."
    es: "Cristal que confiere el Poder Z a los movimientos\nde tipo Acero."
    ko: "Z파워의 결정.\n강철타입 기술을\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将钢属性的招式\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把鋼屬性的招式\n升級為Ｚ招式。"
steelixite:
  names:
    jp_kana: ハガネールナイト
    jp_kanji: ハガネールナイト
    en: Steelixite
    fr: Steelixite
    it: Steelixite
    de: Stahlosnit
    es: Steelixita
    ko: 강철톤나이트
    zh_simp: 大钢蛇进化石
    zh_trad: 大鋼蛇進化石
  descriptions:
    jp_kana: "ハガネールに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "ハガネールに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Steelix hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Steelix, elle lui permet de méga-évoluer\ndurant un combat."
    it: "Una delle misteriose Megapietre.\nData a Steelix, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Stahlos getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Steelix en combate."
    ko: "강철톤에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让大钢蛇携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓大鋼蛇攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
sticker_bag:
  names:
    jp_kana: シールぶくろ
    jp_kanji: シールぶくろ
    en: Sticker Bag
    fr: Sac Sceaux
    it: Bollosacca
    de: Stickertüte
    es: Bolsa Sellos
    ko: 실주머니
    zh_simp: 贴纸袋
    zh_trad: 貼紙袋
  descriptions:
    jp_kana: "シールが　１０まい　いれられる\nちっちゃな　ふくろ。"
    jp_kanji: "シールが　１０枚　いれられる\nちっちゃな　ふくろ。"
    en: "A tiny bag that can hold 10 Stickers for decorating\nPoké Balls."
    fr: "Un petit sac pouvant contenir dix sceaux\npour décorer les Poké Balls."
    it: "Sacchettino che può contenere dieci bolli per decorare\nle Poké Ball."
    de: "Ein kleines Tütchen. Es bietet Platz für bis zu 10 Sticker\nfür die Pokébälle."
    es: "Bolsita con capacidad para diez sellos de los que\ndecoran las Poké Balls."
    ko: "실이 10장 들어가는\n작은 주머니."
    zh_simp: "可以放入１０张\n贴纸的小袋子。"
    zh_trad: "可以放入１０張\n貼紙的小袋子。"
sticker_case:
  names:
    jp_kana: シールいれ
    jp_kanji: シールいれ
    en: Sticker Case
    fr: Boîte à Sceaux
    it: Portabolli
    de: Stickerkoffer
    es: Caja de Sellos
    ko: 실상자
    zh_simp: 贴纸盒
    zh_trad: 貼紙盒
  descriptions:
    jp_kana: "ボールカプセルに　はりつけられる\nシールが　はいった　いれもの。"
    jp_kanji: "ボールカプセルに　はりつけられる\nシールが　はいった　いれもの。"
    en: "A case for storing Stickers that can be applied to\nBall Capsules."
    fr: "Une boîte qui sert à ranger des sceaux à coller\nsur des Capsule Balls."
    it: "Contenitore per conservare i bolli che possono essere\napplicati sulle capsule delle Poké Ball."
    de: "In diesem Koffer kannst du die Sticker für die\nBallkapseln der Pokébälle aufbewahren."
    es: "Caja en la que se pueden guardar los sellos que se\naplican a las cápsulas de las Poké Balls."
    ko: "볼캡슐에 붙일 수 있는\n실이 들어 있는 용기."
    zh_simp: "放有贴在球壳上的\n贴纸的容器。"
    zh_trad: "放有貼在球殼上的\n貼紙的容器。"
sticky_barb:
  names:
    jp_kana: くっつきバリ
    jp_kanji: くっつきバリ
    en: Sticky Barb
    fr: Piquants
    it: Vischiopunta
    de: Klettdorn
    es: Toxiestrella
    ko: 끈적끈적바늘
    zh_simp: 附着针
    zh_trad: 附著針
  descriptions:
    jp_kana: "もたせると　まいターン　ダメージを\nうける。　じぶんに　ふれてきた\nあいてに　くっつくことも　ある。"
    jp_kanji: "持たせると　毎ターン　ダメージを\n受ける。　自分に　ふれてきた\n相手に　くっつくことも　ある。"
    en: "An item to be held by a Pokémon. It damages the\nholder every turn and may latch on to Pokémon\nthat touch the holder."
    fr: "Objet à tenir. Blesse le porteur à chaque tour.\nPeut s’accrocher aux ennemis qui attaquent le porteur."
    it: "Strumento che danneggia chi ce l’ha a ogni turno.\nPuò attaccarsi a un Pokémon che entra in contatto\ncon chi ce l’ha a causa di un attacco."
    de: "Ein Item zum Tragen. Schadet dem Träger in jeder\nRunde, kann aber an Angreifern haften bleiben,\ndie ihn berühren."
    es: "Daña en cada turno al Pokémon que la lleva. Puede\nadherirse al Pokémon que alcance con su ataque al\nportador."
    ko: "지니게 하면 매 턴 데미지를 입는다.\n자신에게 접촉해 온 상대에게\n들러붙기도 한다."
    zh_simp: "携带后，每回合都会受到伤害。\n有时也会附着到\n碰到自己的对手身上。"
    zh_trad: "攜帶後，每回合都會受到傷害。\n有時也會附著到\n碰到自己的對手身上。"
stone_plate:
  names:
    jp_kana: がんせきプレート
    jp_kanji: がんせきプレート
    en: Stone Plate
    fr: Plaque Roc
    it: Lastrapietra
    de: Steintafel
    es: Tabla Pétrea
    ko: 암석플레이트
    zh_simp: 岩石石板
    zh_trad: 岩石石板
  descriptions:
    jp_kana: "いわの　タイプの　せきばん。\nもたせると　いわタイプの\nわざの　いりょくが　つよまる。"
    jp_kanji: "いわの　タイプの　石盤。\n持たせると　いわタイプの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon. It’s a stone tablet\nthat boosts the power of Rock-type moves."
    fr: "Objet à tenir. Une tablette en pierre augmentant\nla puissance des capacités de type Roche."
    it: "Strumento da dare a un Pokémon. Lastra di pietra che\npotenzia le mosse di tipo Roccia."
    de: "Ein Item zum Tragen. Diese Steintafel verstärkt\nAttacken vom Typ Gestein."
    es: "Tabla de piedra que potencia los movimientos de tipo\nRoca. Debe llevarla un Pokémon."
    ko: "바위타입의 석판.\n지니게 하면 바위타입\n기술의 위력이 강해진다."
    zh_simp: "岩石属性的石板。\n携带后，岩石属性的\n招式威力就会增强。"
    zh_trad: "岩石屬性的石板。\n攜帶後，岩石屬性的\n招式威力就會增強。"
storage_key:galactic_warehouse:
  names:
    jp_kana: そうこのカギ
    jp_kanji: そうこのカギ
    en: Storage Key
    fr: Clé du Hangar
    it: Chiave magazzino
    de: Lagerschlüssel
    es: Llave Almacén
    ko: 창고열쇠
    zh_simp: 仓库钥匙
    zh_trad: 倉庫鑰匙
  descriptions:
    jp_kana: "トバリシティの　はずれにある\nギンガだんの　あやしい\nそうこに　はいるための　カギ。"
    jp_kanji: "トバリシティの　はずれにある\nギンガ団の　怪しい\n倉庫に　はいるための　カギ。"
    en: "The key to Team Galactic’s sinister warehouse\nlocated at the edge of Veilstone City."
    fr: "La clé du hangar de la Team Galaxie situé\nà la périphérie de Voilaroc."
    it: "Chiave del misterioso magazzino del Team Galassia\nsituato ai confini di Rupepoli."
    de: "Der Schlüssel zur Lagerhalle von Team Galaktik am\nRande von Schleiede."
    es: "Llave del siniestro almacén del Equipo Galaxia que está\nubicado en las afueras de Ciudad Rocavelo."
    ko: "장막시티 변두리에 있는\n갤럭시단의 수상한 창고에\n들어가기 위한 열쇠다."
    zh_simp: "用于进入银河队在帷幕市市郊的\n可疑仓库的钥匙。"
    zh_trad: "用於進入銀河隊在\n帷幕市市郊的\n可疑倉庫的鑰匙。"
storage_key:sea_mauville:
  names:
    jp_kana: そうこのカギ
    jp_kanji: そうこのカギ
    en: Storage Key
    fr: Clé du Hangar
    it: Chiave magazzino
    de: Lagerschlüssel
    es: Llave Almacén
    ko: 창고열쇠
    zh_simp: 仓库钥匙
    zh_trad: 倉庫鑰匙
  descriptions:
    jp_kana: "シーキンセツの　そうこに\nはいる　ための　カギ。"
    jp_kanji: "シーキンセツの　倉庫に\n入るための　カギ。"
    en: "A key that opens the storage hold inside\nSea Mauville."
    fr: La clé de la réserve de Lavandia Sea.
    it: Chiave per accedere al magazzino di Ciclamare.
    de: "Ein Schlüssel, der in das Schloss des Lagerraums auf\nSeewoge Malvenfroh passt."
    es: Llave de acceso al almacén de Malvamar.
    ko: "씨보라의 창고로\n들어가기 위한 열쇠."
    zh_simp: "进入海紫堇的仓库时\n所需的钥匙。"
    zh_trad: "用於進入\n海紫菫的房間的鑰匙。"
strange_souvenir:
  names:
    jp_kana: ふしぎなおきもの
    jp_kanji: ふしぎなおきもの
    en: Strange Souvenir
    fr: Bibelot Bizarre
    it: Strano ninnolo
    de: Skurriloskulptur
    es: Estatuilla Rara
    ko: 이상한장식품
    zh_simp: 神秘摆设
    zh_trad: 神秘擺設
  descriptions:
    jp_kana: "アローラちほうで　ふるくから\nまもりがみ　とされる　ふしぎな\nポケモンを　かたどった　おきもの。"
    jp_kanji: "アローラ地方で　古くから\n守り神　とされる　不思議な\nポケモンを　かたどった　置物。"
    en: "An ornament depicting a mysterious Pokémon\nthat has been venerated as a guardian deity\nfor an extremely long time in the Alola region."
    fr: "Un ornement à l’image d’un Pokémon vénéré à Alola\net considéré comme divinité protectrice depuis\ndes temps immémoriaux."
    it: "Statuetta raffigurante un Pokémon misterioso\nche ad Alola viene considerato una divinità\nprotettrice sin dall’antichità."
    de: "Eine Skulptur in Form eines wundersamen Pokémon,\ndas in der Alola-Region seit jeher als Schutzpatron\nangesehen wird."
    es: "Ornamento que representa a un Pokémon misterioso\nvenerado desde la antigüedad en Alola como espíritu\nprotector."
    ko: "알로라지방에서 예로부터\n수호신으로 여겨지는 신비한\n포켓몬을 본떠 만든 장식품."
    zh_simp: "在阿罗拉地区，据说是模仿\n古时候被称为守护神的\n神奇宝可梦而制作的摆设。"
    zh_trad: "據說是模仿自古以來\n在阿羅拉地區被稱為守護神的\n神奇寶可夢而製作的擺設。"
stratospheric_slate:
  names:
    jp_kana: てんくうのせきばん
    jp_kanji: てんくうのせきばん
    en: Stratospheric Slate
    fr: Tablette Cieux
    it: Piastra dei cieli
    de: Himmelsplatte
    es: Losa Cielo
    ko: 천공의석판
    zh_simp: 天空石板
    zh_trad: 天空石板
  descriptions:
    jp_kana: "ふしぎな　ちからに　あふれる　せきばん。\nハマナスパークの　てんくうのへやと\nふかい　つながりを　かんじる。"
    jp_kanji: "不思議な　力に　あふれる　石板。\nハマナスパークの　天空の部屋と\n深い　つながりを　感じる。"
    en: "A slate overflowing with enigmatic energy. You can feel\na strong connection between it and the Stratospheric\nRoom at Ramanas Park."
    fr: "Une tablette qui regorge d’une étrange énergie.\nElle semble intimement liée à la Salle des Cieux\ndu Parc Rosa Rugosa."
    it: "Lastra di pietra che emana una misteriosa energia.\nSembra profondamente connessa alla Stanza dei cieli\ndel Parco Rosa Rugosa."
    de: "Eine Platte, die vor rätselhafter Energie strotzt.\nMan kann eine starke Verbindung zwischen ihr und der\nHimmelskammer im Hamanasu-Park spüren."
    es: "Una losa rebosante de una misteriosa energía.\nParece estrechamente relacionada con la Sala\ndel Cielo del Parque Hansa."
    ko: "신비한 힘이 넘치는 석판.\n해당화파크의 천공의 방과\n깊은 연관이 있는 것 같다."
    zh_simp: "充满了神秘力量的石板。\n感觉它与玫瑰公园的天空之厅\n有着很深的关联。"
    zh_trad: "充滿神奇力量的石板。\n感覺它和玫瑰公園的天空之廳\n有很深的關係。"
strawberry_sweet:
  names:
    jp_kana: いちごアメざいく
    jp_kanji: いちごアメざいく
    en: Strawberry Sweet
    fr: Fraise en Sucre
    it: Bonbonfragola
    de: Zucker-Erdbeere
    es: Confite Fresa
    ko: 딸기사탕공예
    zh_simp: 草莓糖饰
    zh_trad: 草莓糖飾
  descriptions:
    jp_kana: "いちごの　かたちを　した　アメざいく。\nマホミルに　もたせてあげると\nくるくる　まわって　よろこぶ。"
    jp_kanji: "いちごの　形を　した　アメ細工。\nマホミルに　持たせてあげると\nくるくる　回って　喜ぶ。"
    en: "A strawberry-shaped sweet. When a Milcery\nholds this, it will spin around happily."
    fr: "Un bonbon en forme de fraise.\nQuand on le donne à un Crèmy, il danse de bonheur."
    it: "Bonbon a forma di fragola. Se dato a Milcery,\nil Pokémon farà le piroette per la felicità."
    de: "Zuckerwerk in Form einer Erdbeere. Gibt man es\nHokumil zum Tragen, dreht es sich vor Freude im Kreis."
    es: "Figura de caramelo con forma de fresa. Al dárselo a\nMilcery, se pone a girar rebosante de alegría."
    ko: "딸기 모양의 사탕공예.\n마빌크에게 지니게 하면\n빙빙 돌며 기뻐한다."
    zh_simp: "草莓形状的工艺糖果。\n让小仙奶携带的话，\n会高兴地转圈圈。"
    zh_trad: "草莓形狀的工藝糖果。\n讓小仙奶攜帶的話，\n牠會高興得轉圈圈。"
stretchy_spring:
  names:
    jp_kana: のびたバネ
    jp_kanji: のびたバネ
    en: Stretchy Spring
    fr: Ressort Détendu
    it: Molla elastica
    de: Spiralfeder
    es: Muelle Estirado
    ko: 늘어난용수철
    zh_simp: 松掉的弹簧
    zh_trad: 鬆掉的彈簧
  descriptions:
    jp_kana: "ほそくて　ちいさい　バネ。\nすっかり　のびきって　つかいみちが\nみつからない。"
    jp_kanji: "細くて　小さい　バネ。\nすっかり　伸びきって　使い道が\nみつからない。"
    en: "A thin small spring. It’s totally stretched out, and\nwhat it’s used for is unknown."
    fr: "Un petit ressort fin et complètement distendu.\nNul ne sait à quoi il peut bien servir."
    it: "Una molla piccola e sottile.\nÈ deformata e ormai inutilizzabile."
    de: "Eine kleine, dünne Feder, die bis zum Äußersten\ngedehnt wurde. Man kann nicht mehr erkennen,\nwofür sie ursprünglich verwendet wurde."
    es: "Muelle fino y pequeño. Está algo elongado y se\ndesconoce cuál puede ser su uso."
    ko: "가늘고 작은 용수철.\n완전히 늘어나서 어디에\n써야 할지 모르겠다."
    zh_simp: "细小的弹簧。\n被拉得太长了，\n不知道能派上什么用。"
    zh_trad: "細小的彈簧。\n已經完全鬆掉，\n找不到任何用途。"
style_card:
  names:
    jp_kana: おしゃれカード
    jp_kanji: おしゃれカード
    en: Style Card
    fr: Carte Élégance
    it: Tessera chic
    de: Style-Karte
    es: Tarjeta Chic
    ko: 멋쟁이카드
    zh_simp: 时尚名人卡
    zh_trad: 時尚名人卡
  descriptions:
    jp_kana: "もっていると　ブティックで　かえる\nしなものが　ふえる。　ヘアサロンでは\nえらべる　かみがたが　ふえる　カード。"
    jp_kanji: "持っていると　ブティックで　買える\n品物が　増える。　ヘアサロンでは\n選べる　髪型が　増える　カード。"
    en: "A card that increases the selection in boutiques and\nhair salons."
    fr: "Une carte permettant d’accéder à un plus vaste choix\nd’articles dans les boutiques chics et à davantage de\ncoiffures dans les salons Salle à Mèche."
    it: "Una tessera che amplia la scelta di acconciature\ndisponibili dai Parrucchieri e di articoli acquistabili\nnei Negozi di vestiti."
    de: "Wer diese Karte bei sich trägt, erhält in Boutiquen\nund Friseursalons eine größere Auswahl."
    es: "Una tarjeta que aumenta la selección de artículos\ndisponibles en las tiendas y permite elegir entre una\nmayor variedad de peinados en las peluquerías."
    ko: "지니고 있으면 부티크에서 살 수 있는\n품목이 늘어나고, 헤어살롱에서는\n고를 수 있는 헤어스타일이 늘어나는 카드."
    zh_simp: "拥有后，在时装店可以买到的物品\n和在美发沙龙可以选择的发型\n都会有所增加的卡片。"
    zh_trad: "擁有這張卡，就能在時裝店買到\n更多商品。到美髮沙龍時，\n也能有更多樣化的髮型選項。"
suite_key:
  names:
    jp_kana: ルームキー
    jp_kanji: ルームキー
    en: Suite Key
    fr: Clé de Chambre
    it: Chiave suite
    de: Hotelschlüssel
    es: Llave Suite
    ko: 룸키
    zh_simp: 房间钥匙
    zh_trad: 房間鑰匙
  descriptions:
    jp_kana: "みずうみの　ほとりにある\nこうきゅうホテルの　ルームキー。\nなぜか　よく　なくなってしまう。"
    jp_kanji: "湖の　ほとりにある\n高級ホテルの　ルームキー。\nなぜか　よく　なくなってしまう。"
    en: "A key to one of the suites at a certain luxury hotel\nby a lake. For some odd reason, it often disappears."
    fr: "La clé de l’une des suites de l’hôtel de luxe se trouvant\nprès du lac. Bizarrement, elle disparaît souvent."
    it: "Chiave di una suite vicino a un lago.\nPer ragioni misteriose, scompare spesso."
    de: "Schlüssel zu einer Hotelsuite. Verschwindet\nseltsamerweise immer wieder mal."
    es: "Llave de una suite del hotel de lujo junto al lago. Por\nalgún motivo, se pierde a menudo."
    ko: "호수 근처에 있는 고급 호텔의 룸키.\n왜인지는 모르나 잘 없어진다."
    zh_simp: "湖畔高级宾馆的房间钥匙。\n不知为何，它经常会丢失。"
    zh_trad: "湖畔高級旅館的房間鑰匙。\n不知為何老是搞丟。"
sun_flute:
  names:
    jp_kana: たいようのふえ
    jp_kanji: たいようのふえ
    en: Sun Flute
    fr: Flûte du Soleil
    it: Flauto solare
    de: Sonnenflöte
    es: Flauta Solar
    ko: 태양의피리
    zh_simp: 太阳之笛
    zh_trad: 太陽之笛
  descriptions:
    jp_kana: "たいようの　でんせつポケモンに\nかんしゃの　きもちを　あらわすため\nねいろを　ささげていた　という。"
    jp_kanji: "太陽の　伝説ポケモンに\n感謝の　気持ちを　表すため\n音色を　捧げていた　という。"
    en: "It is said that the tones it produces were offered\nup as an expression of gratitude to the Legendary\nPokémon of the sun."
    fr: "Une flûte dont le timbre permettait d’exprimer\nsa reconnaissance au Pokémon légendaire du soleil."
    it: "Flauto il cui dolce suono esprime la riconoscenza\ndegli esseri umani verso il Pokémon leggendario\ndel sole."
    de: "Auf dieser Flöte soll eine Melodie gespielt worden sein,\num dem Legendären Sonnen-Pokémon Dank zu sagen."
    es: "Flauta que se hace sonar como muestra de gratitud\nhacia el Pokémon legendario del sol."
    ko: "태양의 전설포켓몬에게\n감사의 마음을 표현하기 위해\n음색을 바쳤다고 한다."
    zh_simp: "为了对太阳的\n传说的宝可梦表达感激之情，\n据说会用它来献上美乐。"
    zh_trad: "為了對太陽的\n傳說的寶可夢表達感激之情，\n據說會用它來獻上美樂。"
sun_stone:
  names:
    jp_kana: たいようのいし
    jp_kanji: たいようのいし
    en: Sun Stone
    fr: Pierre Soleil
    it: Pietrasolare
    de: Sonnenstein
    es: Piedra Solar
    ko: 태양의돌
    zh_simp: 日之石
    zh_trad: 日之石
  descriptions:
    jp_kana: "ある　とくていの　ポケモンを\nしんかさせる　ふしぎな　いし。\nたいようのように　あかい。"
    jp_kanji: "ある　特定の　ポケモンを\n進化させる　不思議な　石。\n太陽のように　赤い。"
    en: "A peculiar stone that can make certain species of\nPokémon evolve. It burns as red as the evening sun."
    fr: "Une pierre étrange qui fait évoluer certaines espèces\nde Pokémon. Elle est rouge comme le soleil couchant."
    it: "Pietra particolare che fa evolvere determinate\nspecie di Pokémon. È rossa come il sole\nal tramonto."
    de: "Dieser spezielle Stein löst bei bestimmten Pokémon\ndie Entwicklung aus. Er ist rot wie die Abendsonne."
    es: "Curiosa piedra que hace evolucionar a determinadas\nespecies de Pokémon. Es roja como el núcleo del sol."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 돌.\n태양처럼 빨갛다."
    zh_simp: "能让某些特定宝可梦\n进化的神奇石头。\n像太阳一样赤红。"
    zh_trad: "能讓特定寶可夢\n進化的神奇石頭。\n像太陽一樣赤紅。"
super_lure:
  names:
    jp_kana: シルバーコロン
    jp_kanji: シルバーコロン
    en: Super Lure
    fr: Super Parfum
    it: Superprofumo
    de: Super-Lockparfüm
    es: Supercolonia
    ko: 실버코롱
    zh_simp: 白银香水
    zh_trad: 白銀香水
  descriptions:
    jp_kana: "つかうと　めずらしい　ポケモンが\nでて　きやすく　なる　こうすい。\nむしよせコロンより　ながく　もつ。"
    jp_kanji: "使うと　珍しい　ポケモンが\n出て　きやすく　なる　香水。\nむしよせコロンより　長く　もつ。"
    en: "A glass bottle of perfume that makes rare Pokémon\nmore likely to appear. It lasts longer than a Lure."
    fr: "Une substance qui fait apparaître les Pokémon rares\nplus facilement pendant une durée plus longue que\nle Parfum."
    it: "Profumo che attira Pokémon rari.\nIl suo effetto dura più a lungo di quello\ndel Profumo invito."
    de: "Ein Parfüm, das für kurze Zeit vermehrt seltene\nPokémon erscheinen lässt. Wirkt länger als das Item\nLockparfüm."
    es: "Colonia que atrae a los Pokémon raros y cuyo efecto\nes algo más duradero que el de la Colonia."
    ko: "사용하면 희귀한 포켓몬이\n나오기 쉬워지는 향수.\n벌레유인코롱보다 효과가 오래간다."
    zh_simp: "使用该香水后，\n稀有宝可梦会更容易出现。\n效果比引虫香水更持久。"
    zh_trad: "使用後，讓稀有寶可夢\n變得容易出現的香水。\n效果比引蟲香水更持久。"
super_potion:
  names:
    jp_kana: いいキズぐすり
    jp_kanji: いいキズぐすり
    en: Super Potion
    fr: Super Potion
    it: Superpozione
    de: Supertrank
    es: Superpoción
    ko: 좋은상처약
    zh_simp: 好伤药
    zh_trad: 好傷藥
  descriptions:
    jp_kana: "スプレーしきの　キズぐすり。\nポケモン　１ひきの　ＨＰを\n６０だけ　かいふくする。"
    jp_kanji: "スプレー式の　キズぐすり。\nポケモン　１匹の　ＨＰを\n６０だけ　回復する。"
    en: "A spray-type medicine for treating wounds. It can\nbe used to restore 60 HP to a single Pokémon."
    fr: "Un spray qui soigne les blessures.\nRestaure 60 PV d’un Pokémon."
    it: "Rimedio spray per le ferite.\nRestituisce 60 PS a un Pokémon."
    de: "Hilft bei Wunden. Füllt die KP eines Pokémon um\n60 Punkte auf."
    es: "Medicina en espray que cura heridas y restaura 60 PS\nde un Pokémon."
    ko: "스프레이식의 상처약.\n포켓몬 1마리의 HP를\n60만큼 회복한다."
    zh_simp: "喷雾式伤药。\n能让１只宝可梦\n回复６０ＨＰ。"
    zh_trad: "噴霧式傷藥。\n能讓１隻寶可夢\n回復６０ＨＰ。"
super_repel:
  names:
    jp_kana: シルバースプレー
    jp_kanji: シルバースプレー
    en: Super Repel
    fr: Super Repousse
    it: Superrepellente
    de: Superschutz
    es: Superrepelente
    ko: 실버스프레이
    zh_simp: 白银喷雾
    zh_trad: 白銀噴霧
  descriptions:
    jp_kana: "よわい　やせいの　ポケモンが\nまったく　でて　こなくなる。\nむしよけスプレーより　ながく　きく。"
    jp_kanji: "弱い　野生の　ポケモンが\nまったく　でて　こなくなる。\nむしよけスプレーより　長く　効く。"
    en: "An item that prevents any low-level wild Pokémon\nfrom jumping out at you for a while. It lasts longer\nthan Repel."
    fr: "Repousse les Pokémon sauvages faibles pendant\nune durée plus longue que celle du Repousse."
    it: "Strumento che evita a chi lo usa di incontrare\nPokémon selvatici deboli. Il suo effetto dura più\na lungo di quello del Repellente."
    de: "Hält schwache wilde Pokémon ab. Wirkt länger als das\nItem Schutz."
    es: "Evita encuentros con Pokémon salvajes débiles durante\nmás tiempo que un Repelente normal."
    ko: "약한 야생 포켓몬이\n전혀 나오지 않게 된다.\n벌레회피스프레이보다 효과가 오래간다."
    zh_simp: "弱小的野生宝可梦\n将完全不会出现。\n效果比除虫喷雾更持久。"
    zh_trad: "弱小的野生寶可夢\n變得完全不會出現。\n效果比除蟲噴霧更持久。"
super_rod:
  names:
    jp_kana: すごいつりざお
    jp_kanji: すごいつりざお
    en: Super Rod
    fr: Méga Canne
    it: Super Amo
    de: Superangel
    es: Supercaña
    ko: 대단한낚싯대
    zh_simp: 厉害钓竿
    zh_trad: 厲害釣竿
  descriptions:
    jp_kana: "さいしんの　すごい　つりざお。\nみずの　ある　ばしょで　つかうと\nポケモンが　つれる。"
    jp_kanji: "最新の　すごい　つりざお。\n水の　ある　場所で　使うと\nポケモンが　つれる。"
    en: "An awesome, high-tech fishing rod. Use it at any\nbody of water to fish for wild aquatic Pokémon."
    fr: "Une canne à pêche ultramoderne.\nUtilisez-la pour pêcher des Pokémon sauvages\ndans les points d’eau."
    it: "Amo supertecnologico. Si usa per pescare\nPokémon selvatici in qualsiasi specchio d’acqua."
    de: "Eine wundervoll gefertigte Angel. Die beste Angel,\num Pokémon an Land zu ziehen."
    es: "Increíble caña de pescar de alta tecnología. Pesca\nPokémon salvajes en todo tipo de aguas."
    ko: "최신식의 대단한 낚싯대.\n물이 있는 장소에서 사용하면\n포켓몬을 낚을 수 있다."
    zh_simp: "最新的厉害钓竿。\n在有水的地方使用的话，\n可以钓到宝可梦。"
    zh_trad: "最新的厲害釣竿。\n在有水的地方使用的話，\n可以釣到寶可夢。"
surge_badge:
  names:
    jp_kana: だいだいバッジ
    jp_kanji: だいだいバッジ
    en: Surge Badge
    fr: Fulguro-Badge
    it: Medaglia Tonante
    de: Gewitterorden
    es: Medalla Fulgor
    ko: 주황배지
    zh_simp: 桔色徽章
    zh_trad: 橘色徽章
  descriptions:
    jp_kana: "ジムオブカントーで　もらえる\nノベルティの　バッジ。　どこかの\nジムバッジを　まねているらしい。"
    jp_kanji: "ジムオブカントーで　もらえる\nノベルティの　バッジ。　どこかの\nジムバッジを　まねているらしい。"
    en: "A novelty badge that you can receive at the\nKantonian Gym. Rumor has it that it imitates\nthe Badge of a Gym somewhere."
    fr: "Un badge promotionnel obtenu à l’Arène de Kanto.\nIl paraît que c’est une imitation du Badge\nd’une certaine Arène."
    it: "Medaglia souvenir ottenuta alla Palestra di Kanto.\nSembra ispirata alla Medaglia di un’altra Palestra."
    de: "Ein Werbegeschenk, das man in der Kanto-Arena erhält.\nEs scheint sich dabei um die Nachbildung eines Ordens\neiner bestimmten Arena zu handeln."
    es: "Medalla conseguida en el Gimnasio de Kanto. Su\naspecto guarda un sospechoso parecido con la medalla\nde otro gimnasio."
    ko: "체육관오브관동에서 받을 수 있는\n노벨티 배지. 어딘가의\n체육관 배지를 흉내 낸 듯하다."
    zh_simp: "能从关都之道馆那里得到的徽章赠品。\n好像仿照了某个地区的道馆徽章。"
    zh_trad: "可在關都之道館獲得的徽章贈品。\n聽說這好像是在模仿\n某個地方的道館徽章。"
surprise_mulch:
  names:
    jp_kana: びっくりこやし
    jp_kanji: びっくりこやし
    en: Surprise Mulch
    fr: Fertistantané
    it: Fertilsorpresa
    de: Wundermulch
    es: Abono Sorpresa
    ko: 깜놀비료
    zh_simp: 吃惊肥
    zh_trad: 吃驚肥
  descriptions:
    jp_kana: "きのみを　そだてるときの　ひりょう。\nしかし　ホウエンちほうの　つちには\nまるで　なじまないので　こうかが　ない。"
    jp_kanji: "きのみを　育てるときの　肥料。\nしかし　ホウエン地方の　土には\nまるで　なじまないので　効果が　ない。"
    en: "A fertilizer for growing Berries. However, it appears\nto be unsuitable for the soil in the Hoenn region and\nhas no effect."
    fr: "Un engrais à utiliser sur un sol meuble.\nIl n’est cependant pas adapté aux terres de Hoenn\net n’y a aucun effet."
    it: "Fertilizzante usato per coltivare le bacche.\nTuttavia, non ha effetto a Hoenn, perché\nnon è adatto al terreno della regione."
    de: "Mulch zur Nutzung auf Beerenfeldern. Durch seine\nUnverträglichkeit mit den Böden in Hoenn bleibt sein\nEinsatz dort ohne Wirkung."
    es: "Un fertilizante usado para el cultivo de bayas. Parece\nque no se asienta bien en el suelo de Hoenn, por lo\nque no tiene efecto en esta región."
    ko: "나무열매를 키울 때 사용하는 비료.\n그러나 호연지방의 흙에는\n전혀 맞지 않기에 효과가 없다."
    zh_simp: "培育树果时的肥料。\n但完全不适合丰缘地区的土壤，\n所以没什么效果。"
    zh_trad: "培育樹果時的肥料。\n但完全不適合豐緣地區的土壤，\n所以沒什麼效果。"
swampertite:
  names:
    jp_kana: ラグラージナイト
    jp_kanji: ラグラージナイト
    en: Swampertite
    fr: Laggronite
    it: Swampertite
    de: Sumpexnit
    es: Swampertita
    ko: 대짱이나이트
    zh_simp: 巨沼怪进化石
    zh_trad: 巨沼怪進化石
  descriptions:
    jp_kana: "ラグラージに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "ラグラージに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Swampert hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Laggron, elle lui permet de méga-évoluer\ndurant un combat."
    it: "Una delle misteriose Megapietre.\nData a Swampert, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Sumpex getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Swampert en combate."
    ko: "대짱이에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让巨沼怪携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓巨沼怪攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
sweet_apple:
  names:
    jp_kana: あまーいりんご
    jp_kanji: あまーいりんご
    en: Sweet Apple
    fr: Pomme Sucrée
    it: Dolcepomo
    de: Süßer Apfel
    es: Manzana Dulce
    ko: 달콤한사과
    zh_simp: 甜甜苹果
    zh_trad: 甜甜蘋果
  descriptions:
    jp_kana: "ある　とくていの　ポケモンを\nしんかさせる　ふしぎな　りんご。\nとにかく　あまい。"
    jp_kanji: "ある　特定の　ポケモンを\n進化させる　不思議な　りんご。\nとにかく　甘い。"
    en: "A peculiar apple that can make a certain species of\nPokémon evolve. It’s exceptionally sweet."
    fr: "Une pomme mystérieuse très sucrée qui permet\nde faire évoluer un certain Pokémon."
    it: "Mela particolare e dal sapore molto dolce che\nfa evolvere determinate specie di Pokémon."
    de: "Dieser sonderbare Apfel löst bei einem bestimmten\nPokémon die Entwicklung aus. Er schmeckt sehr süß."
    es: "Curiosa manzana, de sabor particularmente dulce, que\nhace evolucionar a determinadas especies de Pokémon."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 사과.\n엄청나게 달다."
    zh_simp: "这种神奇的苹果\n可以使特定的宝可梦进化。\n吃起来非常甜美。"
    zh_trad: "能讓特定寶可夢\n進化的神奇蘋果。\n非常甜。"
sweet_heart:
  names:
    jp_kana: ハートスイーツ
    jp_kanji: ハートスイーツ
    en: Sweet Heart
    fr: Chococœur
    it: Dolcecuore
    de: Herzkonfekt
    es: Corazón Dulce
    ko: 하트스위트
    zh_simp: 心形甜点
    zh_trad: 心形甜點
  descriptions:
    jp_kana: "とても　あまったるい　チョコレート。\nポケモン　１ひきの　ＨＰを\n２０だけ　かいふくする。"
    jp_kanji: "とても　甘ったるい　チョコレート。\nポケモン　１匹の　ＨＰを\n２０だけ　回復する。"
    en: "A piece of cloyingly sweet chocolate.\nIt can be used to restore 20 HP to a single Pokémon."
    fr: "Un chocolat extrêmement sucré.\nRestaure 20 PV d’un Pokémon."
    it: "Cioccolato molto dolce.\nRestituisce 20 PS a un Pokémon."
    de: "Ein süßer Schokosnack, der die KP eines Pokémon um\n20 Punkte auffüllt."
    es: "Chocolatina de sabor dulce. Restaura 20 PS de un\nPokémon."
    ko: "지나칠 정도로 달콤한 초콜릿.\n포켓몬 1마리의 HP를\n20만큼 회복한다."
    zh_simp: "非常甜腻的巧克力。\n能让１只宝可梦\n回复２０ＨＰ。"
    zh_trad: "非常甜膩的巧克力。\n能讓１隻寶可夢\n回復２０ＨＰ。"
swift_feather:
  names:
    jp_kana: しゅんぱつのハネ
    jp_kanji: しゅんぱつのハネ
    en: Swift Feather
    fr: Plume Sprint
    it: Piumreazione
    de: Flinkfeder
    es: Pluma Ímpetu
    ko: 순발력날개
    zh_simp: 瞬发之羽
    zh_trad: 瞬發之羽
  descriptions:
    jp_kana: "ポケモンに　つかう　どうぐ。\nポケモン　１ひきの　すばやさの\nきそポイントを　ちょっと　あげる。"
    jp_kanji: "ポケモンに　使う　道具。\nポケモン　１匹の　素早さの\n基礎ポイントを　ちょっと　あげる。"
    en: "An item for use on a Pokémon. It slightly increases\nthe Speed base points of a single Pokémon."
    fr: "Objet à utiliser sur un Pokémon pour un peu augmenter\nsa Vitesse de base."
    it: "Strumento da usare su un Pokémon.\nNe aumenta di poco i punti base della Velocità."
    de: "Wendet man dieses Item auf ein Pokémon an, wird\ndessen Initiative-Basiswert dauerhaft erhöht."
    es: "Pluma que aumenta un poco la Velocidad de base de un\nPokémon."
    ko: "포켓몬에게 사용하는 도구.\n포켓몬 1마리의 스피드\n기초 포인트를 조금 올린다."
    zh_simp: "用于宝可梦的道具。\n能稍微提高１只宝可梦的\n速度的基础点数。"
    zh_trad: "用於寶可夢的道具。\n能稍微提高１隻寶可夢的\n速度的基礎點數。"
tamato_berry:
  names:
    jp_kana: マトマのみ
    jp_kanji: マトマのみ
    en: Tamato Berry
    fr: Baie Tamato
    it: Baccamodoro
    de: Tamotbeere
    es: Baya Tamate
    ko: 토망열매
    zh_simp: 茄番果
    zh_trad: 茄番果
  descriptions:
    jp_kana: "ポケモンに　あげると\nとても　なかよく　なりやすくなるが\nすばやさの　きそポイントは　さがる。"
    jp_kanji: "ポケモンに　あげると\nとても　なかよく　なりやすくなるが\n素早さの　基礎ポイントは　さがる。"
    en: "A Berry to be consumed by Pokémon. Using it on a\nPokémon makes it more friendly but lowers its\nSpeed base points."
    fr: "Une Baie qui rend les Pokémon plus amicaux,\nmais baisse leur Vitesse de base."
    it: "Usata su un Pokémon, ne aumenta il livello di amicizia,\nma ne diminuisce i punti base della Velocità."
    de: "Isst ein Pokémon diese Beere, stärkt dies seine\nZutraulichkeit, verringert aber seinen\nInitiative-Basiswert."
    es: "Al usarla con un Pokémon, se gana su amistad, pero\ntambién reduce su Velocidad de base."
    ko: "포켓몬에게 주면\n매우 친밀해지기 쉬워지지만\n스피드의 기초 포인트가 떨어진다."
    zh_simp: "如果把它交给宝可梦，\n宝可梦就会变得非常容易和训练家亲密，\n但速度的基础点数会降低。"
    zh_trad: "如果把它餵給寶可夢，\n寶可夢會非常容易和訓練家變得友好，\n但速度的基礎點數會降低。"
tanga_berry:
  names:
    jp_kana: タンガのみ
    jp_kanji: タンガのみ
    en: Tanga Berry
    fr: Baie Panga
    it: Baccaitan
    de: Tanigabeere
    es: Baya Yecana
    ko: 리체열매
    zh_simp: 扁樱果
    zh_trad: 扁櫻果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　むし　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　むし技を\n受けたとき　威力が　弱まる。"
    en: "If held by a Pokémon, this Berry will lessen the\ndamage taken from one supereffective\nBug-type attack."
    fr: "Tenue, cette Baie affaiblit une attaque ennemie\nsuper efficace de type Insecte."
    it: "Se un Pokémon ha questa bacca, l’attacco\nsuperefficace di tipo Coleottero del nemico\nviene indebolito."
    de: "Als getragenes Item schwächt diese Beere sehr effektive\ngegnerische Attacken vom Typ Käfer."
    es: "Si la lleva un Pokémon, debilita un ataque supereficaz\nde tipo Bicho de un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 굉장한 벌레 기술로\n공격받았을 때 위력이 약해진다."
    zh_simp: "让宝可梦携带后，\n在受到效果绝佳的虫属性招式\n攻击时，能令其威力减弱。"
    zh_trad: "讓寶可夢攜帶後，\n在受到效果絕佳的蟲屬性招式\n攻擊時，能使其威力減弱。"
tangela_candy:
  names:
    jp_kana: モンジャラのアメ
    jp_kanji: モンジャラのアメ
    en: Tangela Candy
    fr: Bonbon Saquedeneu
    it: Caramella Tangela
    de: Tangela-Bonbon
    es: Caramelo Tangela
    ko: 덩쿠리의사탕
    zh_simp: 蔓藤怪的糖果
    zh_trad: 蔓藤怪的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de cierto Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
tapunium_z:bag:
  names:
    jp_kana: カプＺ
    jp_kanji: カプＺ
    en: Tapunium Z
    fr: Tokozélite
    it: Tapium Z
    de: Kapium Z
    es: Tapistal Z
    ko: 카푸Z
    zh_simp: 卡璞Ｚ
    zh_trad: 卡璞Ｚ
  descriptions:
    jp_kana: "カプたちの　しぜんのいかりを\nとくべつな　Ｚワザに　グレードアップする\nＺパワーの　けっしょうを　つくりだす。"
    jp_kanji: "カプたちの　しぜんのいかりを\n特別な　Ｚワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade the\ntapu’s Nature’s Madness to an exclusive Z-Move."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise le Pokémon Tutélaire qui le tient\nà transformer son Ire de la Nature en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono ai Tapu di trasformare la mossa\nIra della Natura in una mossa Z."
    de: "Kristallisierte Z-Kraft, die die Kapu-Attacke\nNaturzorn zu einer Z-Attacke aufstuft.\nWird bei Bedarf automatisch vervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a\nlos Tapu convertir su Furia Natural en un movimiento Z."
    ko: "카푸들의 자연의분노를\n특별한 Z기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将卡璞们的自然之怒\n升级成特殊Ｚ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把卡璞們的自然之怒\n升級為特殊Ｚ招式的Ｚ力量結晶。"
tapunium_z:held:
  names:
    jp_kana: カプＺ
    jp_kanji: カプＺ
    en: Tapunium Z
    fr: Tokozélite
    it: Tapium Z
    de: Kapium Z
    es: Tapistal Z
    ko: 카푸Z
    zh_simp: 卡璞Ｚ
    zh_trad: 卡璞Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　けっしょう。\nカプたちの　しぜんのいかりを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nカプたちの　しぜんのいかりを\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power. It upgrades\nthe tapu’s Nature’s Madness to a Z-Move."
    fr: "Une cristallisation de la Force Z, permettant\nde transformer l’Ire de la Nature d’un Toko\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare la mossa Ira della Natura\ndei Tapu in una mossa Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft die\nKapu-Attacke Naturzorn zu einer Z-Attacke auf."
    es: "Cristal que confiere el Poder Z al movimiento Furia\nNatural de los Tapu."
    ko: "Z파워의 결정.\n카푸들의 자연의분노를\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将卡璞们的自然之怒\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把卡璞們的自然之怒\n升級為Ｚ招式。"
tart_apple:
  names:
    jp_kana: すっぱいりんご
    jp_kanji: すっぱいりんご
    en: Tart Apple
    fr: Pomme Acidulée
    it: Aspropomo
    de: Saurer Apfel
    es: Manzana Ácida
    ko: 새콤한사과
    zh_simp: 酸酸苹果
    zh_trad: 酸酸蘋果
  descriptions:
    jp_kana: "ある　とくていの　ポケモンを\nしんかさせる　ふしぎな　りんご。\nとにかく　すっぱい。"
    jp_kanji: "ある　特定の　ポケモンを\n進化させる　不思議な　りんご。\nとにかく　酸っぱい。"
    en: "A peculiar apple that can make a certain species of\nPokémon evolve. It’s exceptionally tart."
    fr: "Une pomme mystérieuse très acide qui permet\nde faire évoluer un certain Pokémon."
    it: "Mela particolare dal sapore molto aspro che\nfa evolvere determinate specie di Pokémon."
    de: "Dieser sonderbare Apfel löst bei einem bestimmten\nPokémon die Entwicklung aus. Er schmeckt sehr sauer."
    es: "Curiosa manzana, de sabor particularmente ácido, que\nhace evolucionar a determinadas especies de Pokémon."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 사과.\n엄청나게 새콤하다."
    zh_simp: "这种神奇的苹果\n可以使特定的宝可梦进化。\n吃起来酸酸的。"
    zh_trad: "能讓特定寶可夢\n進化的神奇蘋果。\n非常酸。"
tauros_candy:
  names:
    jp_kana: ケンタロスのアメ
    jp_kanji: ケンタロスのアメ
    en: Tauros Candy
    fr: Bonbon Tauros
    it: Caramella Tauros
    de: Tauros-Bonbon
    es: Caramelo Tauros
    ko: 켄타로스의사탕
    zh_simp: 肯泰罗的糖果
    zh_trad: 肯泰羅的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de cierto Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
tea:
  names:
    jp_kana: おちゃ
    jp_kanji: おちゃ
    en: Tea
    fr: Thé
    it: Tè
    de: Tee
    es: Té
    ko: 차
    zh_simp: 茶
    zh_trad: 茶
  descriptions:
    jp_kana: "すこし　にがくて\nこうばしい　かおりの　おちゃ。\nかわいた　のどが　うるおう。"
    jp_kanji: "すこし　苦くて\n芳ばしい　香りの　お茶。\nかわいた　喉が　うるおう。"
    en: "Aromatic tea that has a slightly bitter taste.\nIt soothes a dry throat."
    fr: "Un thé aromatique légèrement amer.\nIl a des vertus désaltérantes."
    it: "Un tè fragrante dal sapore amarognolo.\nMolto dissetante."
    de: "Ein aromatischer Tee mit leicht bitterem Geschmack.\nGenau das Richtige, um den Durst zu stillen."
    es: "Un aromático té de sabor ligeramente amargo que\nresulta ideal para aplacar la sed."
    ko: "약간 씁쓸하고\n구수한 향기가 나는 차.\n말랐던 목이 촉촉해진다."
    zh_simp: "有一点点苦，\n却又芬芳宜人的香茶。\n抿一口，清咽润喉。"
    zh_trad: "散發著撲鼻芳香，\n喝起來有點苦澀的茶。\n能滋潤乾渴的喉嚨。"
tectonic_slate:
  names:
    jp_kana: たいりくのせきばん
    jp_kanji: たいりくのせきばん
    en: Tectonic Slate
    fr: Tablette Continents
    it: Piastra delle terre
    de: Kontinentplatte
    es: Losa Tierra
    ko: 대륙의석판
    zh_simp: 大陆石板
    zh_trad: 大陸石板
  descriptions:
    jp_kana: "ふしぎな　ちからに　あふれる　せきばん。\nハマナスパークの　たいりくのへやと\nふかい　つながりを　かんじる。"
    jp_kanji: "不思議な　力に　あふれる　石板。\nハマナスパークの　大陸の部屋と\n深い　つながりを　感じる。"
    en: "A slate overflowing with enigmatic energy. You can feel\na strong connection between it and the Tectonic Room\nat Ramanas Park."
    fr: "Une tablette qui regorge d’une étrange énergie.\nElle semble intimement liée à la Salle des Continents\ndu Parc Rosa Rugosa."
    it: "Lastra di pietra che emana una misteriosa energia.\nSembra profondamente connessa alla Stanza delle terre\ndel Parco Rosa Rugosa."
    de: "Eine Platte, die vor rätselhafter Energie strotzt.\nMan kann eine starke Verbindung zwischen ihr und der\nKontinentkammer im Hamanasu-Park spüren."
    es: "Una losa rebosante de una misteriosa energía.\nParece estrechamente relacionada con la Sala\nde la Tierra del Parque Hansa."
    ko: "신비한 힘이 넘치는 석판.\n해당화파크의 대륙의 방과\n깊은 연관이 있는 것 같다."
    zh_simp: "充满了神秘力量的石板。\n感觉它与玫瑰公园的大陆之厅\n有着很深的关联。"
    zh_trad: "充滿神奇力量的石板。\n感覺它和玫瑰公園的大陸之廳\n有很深的關係。"
tentacool_candy:
  names:
    jp_kana: メノクラゲのアメ
    jp_kanji: メノクラゲのアメ
    en: Tentacool Candy
    fr: Bonbon Tentacool
    it: Caramella Tentacool
    de: Tentacha-Bonbon
    es: Caramelo Tentacool
    ko: 왕눈해의사탕
    zh_simp: 玛瑙水母的糖果
    zh_trad: 瑪瑙水母的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
terrain_extender:
  names:
    jp_kana: グランドコート
    jp_kanji: グランドコート
    en: Terrain Extender
    fr: Champ’Duit
    it: Fissacampo
    de: Feldbeschichtung
    es: Cubresuelos
    ko: 그라운드코트
    zh_simp: 大地膜
    zh_trad: 大地膜
  descriptions:
    jp_kana: "もたせた　ポケモンが　わざや\nとくせいで　フィールドを　はったとき\nいつもよりも　ながく　のこる。"
    jp_kanji: "持たせた　ポケモンが　技や\n特性で　フィールドを　張ったとき\nいつもよりも　長く　残る。"
    en: "An item to be held by a Pokémon. It extends the\nduration of the terrain caused by the holder’s move\nor Ability."
    fr: "Objet à tenir. Prolonge la durée des champs\nque le Pokémon peut créer sur le terrain\navec une capacité ou un talent."
    it: "Se un Pokémon ha questo strumento, l’effetto di\nuna sua mossa o abilità che modifica il campo\ndi lotta durerà più a lungo."
    de: "Ein Item zum Tragen. Hat der Träger durch eine Attacke\noder eine Fähigkeit ein Feld erzeugt, verlängert sich\ndessen Dauer."
    es: "Al llevarlo, prolonga la duración de los campos creados\npor el Pokémon en el terreno de combate mediante\nmovimientos o su habilidad."
    ko: "지니게 한 포켓몬이 기술이나\n특성으로 필드를 사용했을 때\n여느 때보다 긴 시간 동안 지속된다."
    zh_simp: "当携带它的宝可梦\n利用招式或特性展开场地时，\n场地的持续时间会比平时更长。"
    zh_trad: "當攜帶它的寶可夢\n透過招式或特性展開場地時，\n場地的持續時間會比平時更長。"
thanks_mail:
  names:
    jp_kana: かんしゃメール
    jp_kanji: かんしゃメール
    en: Thanks Mail
    fr: Lettre Merci
    it: Messaggio Grazie
    de: Dankesbrief
    es: Carta Gracias
    ko: 감사메일
    zh_simp: 感谢邮件
    zh_trad: 感謝郵件
  descriptions:
    jp_kana: "かんしゃを　つたえる　メールが\nかきやすい　びんせん。\nポケモンに　もたせて　つかう。"
    jp_kanji: "感謝を　伝える　メールが\n書きやすい　レターペーパー。\nポケモンに　持たせて　使う。"
    en: "Stationery designed to make it easy for you to\nexpress thanks. Have a Pokémon hold it\nfor delivery."
    fr: "Un papier à lettres idéal pour les remerciements.\nPeut être tenu et livré par un Pokémon."
    it: "Carta da lettere ideale per scrivere dei\nringraziamenti.\nSi può dare a un Pokémon affinché la consegni."
    de: "Briefpapier, mit dem man sich bei jemandem bedanken\nkann. Gib es einem Pokémon zum Tragen."
    es: "Carta de agradecimiento. Haz que la entregue un\nPokémon."
    ko: "감사의 마음을 전하는 메일을\n쉽게 쓸 수 있는 편지지.\n포켓몬에게 지니게 해서 쓴다."
    zh_simp: "方便写表达感谢这类邮件的信纸。\n使用该道具时，\n需要让宝可梦携带着来用。"
    zh_trad: "方便寫表達感謝這類郵件的信紙。\n需讓寶可夢攜帶使用。"
thick_club:
  names:
    jp_kana: ふといホネ
    jp_kanji: ふといホネ
    en: Thick Club
    fr: Masse Os
    it: Ossospesso
    de: Kampfknochen
    es: Hueso Grueso
    ko: 굵은뼈
    zh_simp: 粗骨头
    zh_trad: 粗骨頭
  descriptions:
    jp_kana: "なにかの　かたい　ホネ。\nカラカラ　または　ガラガラに\nもたせると　こうげきが　あがる。"
    jp_kanji: "なにかの　硬い　ホネ。\nカラカラ　または　ガラガラに\n持たせると　攻撃が　あがる。"
    en: "An item to be held by Cubone or Marowak. It’s a\nhard bone of some sort that boosts the\nAttack stat."
    fr: "Objet à faire tenir à Osselait ou Ossatueur.\nUn os dur qui augmente leur Attaque."
    it: "Strumento da dare a Cubone o Marowak.\nOsso duro che migliora la potenza delle\nmosse fisiche."
    de: "Ein harter Knochen, der den Angriffs-Wert von Tragosso\noder Knogga erhöht, wenn sie ihn tragen."
    es: "Un extraño tipo de hueso que potencia los ataques\nfísicos de Cubone y Marowak cuando lo llevan."
    ko: "무언가의 단단한 뼈.\n탕구리 혹은 텅구리에게\n지니게 하면 공격이 올라간다."
    zh_simp: "某种坚硬的骨头。\n让卡拉卡拉或嘎啦嘎啦携带后，\n攻击就会提高。"
    zh_trad: "某種堅硬的骨頭。\n讓卡拉卡拉或嘎啦嘎啦攜帶後，\n攻擊就會提高。"
throat_spray:
  names:
    jp_kana: のどスプレー
    jp_kanji: のどスプレー
    en: Throat Spray
    fr: Spray Gorge
    it: Spray gola
    de: Halsspray
    es: Espray Bucal
    ko: 목스프레이
    zh_simp: 爽喉喷雾
    zh_trad: 爽喉噴霧
  descriptions:
    jp_kana: "おとに　かんする　わざを　つかうと\nとくこうが　あがる。"
    jp_kanji: "音に　関する　技を　使うと\n特攻が　上がる。"
    en: "Raises Sp. Atk when a Pokémon uses a sound-based\nmove."
    fr: "Augmente l’Attaque Spéciale du porteur\nlorsqu’il utilise une capacité basée sur le son."
    it: "Aumenta l’Attacco Speciale quando il Pokémon usa\nuna mossa basata sul suono."
    de: "Erhöht bei Einsatz einer Lärm-Attacke den\nSpezial-Angriff."
    es: "Aumenta el Ataque Especial al emplear un movimiento\nque se sirva del sonido."
    ko: "소리 기술을 사용하면\n특수공격이 올라간다."
    zh_simp: "使用声音相关的招式时，\n特攻会提高。"
    zh_trad: "使用與聲音有關的招式時，\n特攻會提高。"
thunder_stone:
  names:
    jp_kana: かみなりのいし
    jp_kanji: かみなりのいし
    en: Thunder Stone
    fr: Pierre Foudre
    it: Pietratuono
    de: Donnerstein
    es: Piedra Trueno
    ko: 천둥의돌
    zh_simp: 雷之石
    zh_trad: 雷之石
  descriptions:
    jp_kana: "ある　とくていの　ポケモンを\nしんかさせる　ふしぎな　いし。\nいなずまの　もようが　ある。"
    jp_kanji: "ある　特定の　ポケモンを\n進化させる　不思議な　石。\n稲妻の　模様が　ある。"
    en: "A peculiar stone that can make certain species of\nPokémon evolve. It has a distinct thunderbolt pattern."
    fr: "Une pierre étrange qui fait évoluer certaines espèces\nde Pokémon. Un éclair est dessiné dessus."
    it: "Pietra particolare che fa evolvere determinate\nspecie di Pokémon. Riporta l’immagine di un fulmine."
    de: "Dieser spezielle Stein löst bei bestimmten Pokémon\ndie Entwicklung aus. Er hat ein Blitzmuster."
    es: "Curiosa piedra que hace evolucionar a determinadas\nespecies de Pokémon. Tiene grabado un rayo."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 돌.\n천둥 번개 무늬가 있다."
    zh_simp: "能让某些特定宝可梦\n进化的神奇石头。\n有着闪电般的花纹。"
    zh_trad: "能讓特定寶可夢\n進化的神奇石頭。\n上面有著閃電花紋。"
tidal_bell:
  names:
    jp_kana: うみなりのスズ
    jp_kanji: うみなりのスズ
    en: Tidal Bell
    fr: Glas Tempête
    it: Campana Onda
    de: Gischtglocke
    es: Cascabel Oleaje
    ko: 해명의방울
    zh_simp: 海声铃铛
    zh_trad: 海聲鈴鐺
  descriptions:
    jp_kana: "こころ　やすまる　ねいろが　きける\nとても　ふるめかしい　スズ。"
    jp_kanji: "こころ　やすまる　ねいろが　きける\nとても　ふるめかしい　スズ。"
    en: "A very old-fashioned bell that makes a gentle\nringing sound."
    fr: Une cloche antique au tintement apaisant.
    it: "Una campana antica. Produce un suono che dona pace\nal cuore."
    de: "Eine altehrwürdige Glocke, deren Läuten alle\nbesänftigt, die es hören."
    es: "Cascabel de aspecto antiguo que emite un sonido que\ncalma el espíritu."
    ko: "마음이 편안해지는 음색이 들리는\n아주 고풍스러운 방울."
    zh_simp: "能发出静心宁神音色的，\n非常古旧的铃铛。"
    zh_trad: "能發出使人心情平靜音色的，\n非常古老的鈴鐺。"
timer_ball:
  names:
    jp_kana: タイマーボール
    jp_kanji: タイマーボール
    en: Timer Ball
    fr: Chrono Ball
    it: Timer Ball
    de: Timerball
    es: Turno Ball
    ko: 타이마볼
    zh_simp: 计时球
    zh_trad: 計時球
  descriptions:
    jp_kana: "ターンすうが　かかれば　かかるほど\nポケモンが　つかまえやすくなる\nちょっと　かわった　ボール。"
    jp_kanji: "ターン数が　かかれば　かかるほど\nポケモンが　捕まえやすくなる\nちょっと　変わった　ボール。"
    en: "A somewhat different Poké Ball that becomes\nprogressively more effective at catching Pokémon\nthe more turns that are taken in battle."
    fr: "Une Poké Ball un peu spéciale qui fonctionne\nde mieux en mieux à mesure que le combat s’éternise."
    it: "Poké Ball un po’ diversa che diventa\nprogressivamente più efficace con il passare\ndei turni nella lotta."
    de: "Ein Ball, der mit zunehmender Kampfdauer\neffektiver wird."
    es: "Una Poké Ball algo distinta que va mejorando su\nrendimiento con cada turno de combate."
    ko: "턴 수가 길어지면 길어질수록\n포켓몬을 잡기 쉬워지는\n조금 특이한 볼."
    zh_simp: "有点与众不同的球。\n回合数花费得越多，\n宝可梦就会越容易捕捉。"
    zh_trad: "有點與眾不同的球。\n回合數花費得越多，\n就越容易捉到寶可夢。"
timid_mint:
  names:
    jp_kana: おくびょうミント
    jp_kanji: おくびょうミント
    en: Timid Mint
    fr: Aromate Timide
    it: Menta Timida
    de: Scheu-Minze
    es: Menta Miedosa
    ko: 겁쟁이민트
    zh_simp: 胆小薄荷
    zh_trad: 膽小薄荷
  descriptions:
    jp_kana: "ポケモンに　かおりを　かがせると\nすばやさが　あがりやすく　なるが\nこうげきは　あがりにくくなる　ミント。"
    jp_kanji: "ポケモンに　香りを　かがせると\n素早さが　上がりやすく　なるが\n攻撃は　上がりにくくなる　ミント。"
    en: "When a Pokémon smells this mint, its Speed will grow\nmore easily, but its Attack will grow more slowly."
    fr: "Si un Pokémon hume cet aromate, sa Vitesse\nmontera plus facilement, mais son Attaque\nse développera plus lentement."
    it: "Quando un Pokémon ne sente il profumo,\nla sua Velocità aumenta più facilmente\na scapito dell’Attacco."
    de: "Lässt man ein Pokémon an dieser Minze schnuppern,\nsteigt seine Initiative schneller, aber sein Angriff umso\nlangsamer."
    es: "Cuando un Pokémon percibe su aroma, aumenta\ncon más facilidad su Velocidad, en detrimento de su\nAtaque."
    ko: "포켓몬에게 향기를 맡게 하면\n스피드가 오르기 쉬워지지만\n공격이 오르기 어려워지는 민트."
    zh_simp: "宝可梦闻了这种薄荷之后，\n会令速度容易提高，\n而攻击则难以提高。"
    zh_trad: "讓寶可夢聞這種薄荷的氣味，\n會令速度變得容易提高，\n但攻擊則難以提高。"
tin_of_beans:
  names:
    jp_kana: マメかん
    jp_kanji: マメかん
    en: Tin of Beans
    fr: Haricots
    it: Lattina fagioli
    de: Dosenbohnen
    es: Lata de Habas
    ko: 콩통조림
    zh_simp: 豆子罐头
    zh_trad: 豆子罐頭
  descriptions:
    jp_kana: "キャンプの　りょうりに　つかう\nしょくざいの　いっしゅ。いっしょに\nにこむと　マメの　あまみが　ひろがる。"
    jp_kanji: "キャンプの　料理に　使う\n食材の　一種。いっしょに\n煮込むと　マメの　甘味が　広がる。"
    en: "One of the many ingredients that can be used for\ncooking at your camp. When simmered, the beans\nsuffuse a dish with their mild flavor."
    fr: "Un ingrédient de cuisine pour le camping.\nÀ faire mijoter avec les autres ingrédients\npour que la douce saveur des fèves se propage."
    it: "Uno degli ingredienti che puoi usare per cucinare\nin campeggio. Questi fagioli donano alla pietanza\nun sapore dolce quando vengono bolliti."
    de: "Eine Zutat für PokéCamping-Mahlzeiten. Ihr süßliches\nAroma überträgt sich beim Kochen auf die anderen\nZutaten."
    es: "Un ingrediente para cocinar en el campamento. Al\nestofar las habas en la salsa, esta absorbe parte de su\ndulzor."
    ko: "캠프 요리에 사용되는\n식재료 중 하나. 다른 재료와 같이 넣고\n푹 삶으면 콩의 단맛이 퍼지게 된다."
    zh_simp: "在露营营地制作料理时会使用的\n一种食材。放进料理里一起煮，\n豆子的那种香甜就会散发出来。"
    zh_trad: "製作露營料理時使用的食材之一。\n和其他材料一起燉煮，\n豆子的甜味就會散發出來。"
tiny_mushroom:
  names:
    jp_kana: ちいさなキノコ
    jp_kanji: ちいさなキノコ
    en: Tiny Mushroom
    fr: Petit Champi
    it: Minifungo
    de: Minipilz
    es: Miniseta
    ko: 작은버섯
    zh_simp: 小蘑菇
    zh_trad: 小蘑菇
  descriptions:
    jp_kana: "ちいさな　めずらしい　キノコ。\nいちぶの　マニアの　あいだでは\nけっこう　にんきが　たかい。"
    jp_kanji: "ちいさな　珍しい　キノコ。\n一部の　マニアの　あいだでは\nけっこう　人気が　高い。"
    en: "A very small and rare mushroom. It’s popular with\na certain class of collectors."
    fr: "Un petit champignon assez rare.\nIl est plutôt populaire parmi certains fans dévoués."
    it: "Fungo piccolo e raro.\nÈ discretamente apprezzato da alcuni intenditori."
    de: "Ein kleiner und seltener Pilz. Sammler sind ganz aus\ndem Häuschen, wenn sie einen finden."
    es: "Una pequeña seta que es poco común y bastante\npopular entre determinados grupos de gourmets."
    ko: "작고 진귀한 버섯.\n일부 마니아 사이에서는\n매우 인기가 높다."
    zh_simp: "珍稀的小蘑菇。\n在一些爱好者中\n有着相当高的人气。"
    zh_trad: "稀奇的小蘑菇。\n在部分愛好者間\n頗受歡迎。"
tm00:
  names:
    jp_kana: わざマシン００
    jp_kanji: わざマシン００
    en: TM00
    fr: CT00
    it: MT00
    de: TM00
    es: MT00
    ko: 기술머신00
    zh_simp: 招式学习器００
    zh_trad: 招式學習器００
  descriptions:
    jp_kana: "ちからを　こめた　パンチで\nあいてを　こうげきする。"
    jp_kanji: "力を　こめた　パンチで\n相手を　攻撃する。"
    en: "The target is slugged by a punch thrown with\nmuscle-packed power."
    fr: "L’ennemi reçoit un coup de poing d’une puissance\nincroyable."
    it: Colpisce il bersaglio con un pugno poderoso.
    de: Ein unglaublich kräftiger Hieb.
    es: Un puñetazo de gran potencia.
    ko: "힘을 담은 펀치로\n상대를 공격한다."
    zh_simp: 用充满力量的拳头攻击对手。
    zh_trad: "用帶有強大力量的拳頭\n攻擊對手。"
tm001:
  names:
    jp_kana: わざマシン０１
    jp_kanji: わざマシン０１
    en: TM01
    fr: CT01
    it: MT01
    de: TM01
    es: MT01
    ko: 기술머신01
    zh_simp: 招式学习器０１
    zh_trad: 招式學習器０１
  descriptions:
    jp_kana: "せいしんを　たかめて　パンチを\nくりだす。　わざを　だす　までに\nこうげきを　うけると　しっぱい　する。"
    jp_kanji: "精神を　高めて　パンチを　くりだす。\n技を　だすまでに\n攻撃を　受けると　失敗する。"
    en: "The user focuses its mind before launching a punch.\nThis move fails if the user is hit before it is used."
    fr: "Le lanceur se concentre avant d’attaquer.\nÉchoue s’il est touché avant d’avoir frappé."
    it: "Chi la usa prende la mira prima di sferrare\nun pugno. Fallirà se verrà colpito prima\ndi eseguire la mossa."
    de: "Anwender konzentriert sich, bevor er angreift. Wird er\nvorher getroffen, ist die Attacke erfolglos."
    es: "Se concentra para dar un puñetazo. Falla si se sufre un\ngolpe antes de su uso."
    ko: "정신을 집중해 펀치를 날린다.\n기술을 쓰기 전에\n공격을 받으면 실패한다."
    zh_simp: "集中精神出拳。\n在招式使出前\n若受到攻击则会失败。"
    zh_trad: "集中精神後出拳。\n若出拳前受到攻擊，\n則會失敗。"
tm002:
  names:
    jp_kana: わざマシン０２
    jp_kanji: わざマシン０２
    en: TM02
    fr: CT02
    it: MT02
    de: TM02
    es: MT02
    ko: 기술머신02
    zh_simp: 招式学习器０２
    zh_trad: 招式學習器０２
  descriptions:
    jp_kana: "するどく　とがった　きょだいな　ツメで\nあいてを　きりさいて　こうげきする。"
    jp_kanji: "鋭く　とがった　巨大な　ツメで\n相手を　切り裂いて　攻撃する。"
    en: The user slashes the target with huge sharp claws.
    fr: "Le lanceur lacère l’ennemi de ses grandes griffes\naiguisées."
    it: "Chi la usa attacca con artigli affilati che graffiano\nil bersaglio rapidamente e con grande forza."
    de: "Der Anwender greift das Ziel mit riesigen, scharfen\nKlauen an."
    es: Araña al objetivo con garras afiladas.
    ko: "날카롭고 뾰족하며 거대한 발톱으로\n상대를 베어 갈라서 공격한다."
    zh_simp: "用尖锐的巨爪\n劈开对手进行攻击。"
    zh_trad: "用尖銳的巨爪\n撕裂對手進行攻擊。"
tm003:
  names:
    jp_kana: わざマシン０３
    jp_kanji: わざマシン０３
    en: TM03
    fr: CT03
    it: MT03
    de: TM03
    es: MT03
    ko: 기술머신03
    zh_simp: 招式学习器０３
    zh_trad: 招式學習器０３
  descriptions:
    jp_kana: "みずの　しんどうを\nあいてに　あたえて　こうげきする。\nあいてを　こんらん　させることが　ある。"
    jp_kanji: "水の　振動を\n相手に　与えて　攻撃する。\n相手を　混乱させることが　ある。"
    en: "The user attacks the target with a pulsing blast of\nwater. This may also confuse the target."
    fr: "Le lanceur envoie un puissant jet d’eau sur l’ennemi.\nPeut le rendre confus."
    it: "Il bersaglio viene colpito da un getto d’acqua\npotentissimo che può anche confonderlo."
    de: "Angriff mit Wasserwelle, die das Ziel eventuell\nverwirren kann."
    es: "Ataca con un potente chorro de agua. Puede confundir\nal objetivo."
    ko: "물의 진동을\n상대에게 가하여 공격한다.\n상대를 혼란시킬 때가 있다."
    zh_simp: "用水的震动攻击对手。\n有时会使对手混乱。"
    zh_trad: "用水的震動攻擊對手。\n有時會使對手混亂。"
tm004:
  names:
    jp_kana: わざマシン０４
    jp_kanji: わざマシン０４
    en: TM04
    fr: CT04
    it: MT04
    de: TM04
    es: MT04
    ko: 기술머신04
    zh_simp: 招式学习器０４
    zh_trad: 招式學習器０４
  descriptions:
    jp_kana: "しずかに　せいしんを　とういつし\nこころを　しずめる　ことで　じぶんの\nとくこうと　とくぼうを　あげる。"
    jp_kanji: "静かに　精神を　統一し\n心を　鎮めることで　自分の\n特攻と　特防を　あげる。"
    en: "The user quietly focuses its mind and calms its\nspirit to raise its Sp. Atk and Sp. Def stats."
    fr: "Le lanceur se concentre et fait le vide dans son esprit\npour augmenter son Attaque Spéciale et sa Défense\nSpéciale."
    it: "Chi la usa placa il proprio spirito meditando per\naumentare l’Attacco Speciale e la Difesa Speciale."
    de: "Erhöht Spezial-Angriff und Spezial-Verteidigung durch\nKonzentration."
    es: "Aumenta la concentración y calma el espíritu para subir\nel Ataque Especial y la Defensa Especial."
    ko: "조용히 정신을 통일하고\n마음을 가라앉혀서 자신의\n특수공격과 특수방어를 올린다."
    zh_simp: "静心凝神，\n从而提高自己的特攻和特防。"
    zh_trad: "屏氣凝神，\n提高自己的特攻和特防。"
tm005:
  names:
    jp_kana: わざマシン０５
    jp_kanji: わざマシン０５
    en: TM05
    fr: CT05
    it: MT05
    de: TM05
    es: MT05
    ko: 기술머신05
    zh_simp: 招式学习器０５
    zh_trad: 招式學習器０５
  descriptions:
    jp_kana: "あいてを　にがして\nひかえの　ポケモンを　ひきずりだす。\nやせいの　ばあいは　せんとうが　おわる。"
    jp_kanji: "相手を　逃がして\n控えの　ポケモンを　ひきずりだす。\n野生の　場合は　戦闘が　終わる。"
    en: "The target is scared off, and a different Pokémon is\ndragged out. In the wild, this ends a battle against a\nsingle Pokémon."
    fr: "Effraie le Pokémon ennemi et le remplace par un autre.\nLors d’un combat contre un Pokémon sauvage seul,\nmet fin au combat."
    it: "Il bersaglio lascia il campo e viene sostituito.\nSe usata contro singoli Pokémon selvatici, mette\nfine alla lotta."
    de: "Verjagt das Ziel und ersetzt es durch ein anderes\nPokémon. Beendet den Kampf in der Wildnis."
    es: "Se lleva al objetivo, que es cambiado por otro\nPokémon. Si es un Pokémon salvaje, acaba el\ncombate."
    ko: "상대를 도망가게 해서\n교대할 포켓몬을 끌어낸다.\n야생의 경우에는 배틀이 끝난다."
    zh_simp: "放走对手，强制拉后备宝可梦上场。\n如果对手为野生宝可梦，\n战斗将直接结束。"
    zh_trad: "趕走對手，\n強制讓後備寶可夢上場。\n對手為野生寶可夢時，戰鬥將直接結束。"
tm006:
  names:
    jp_kana: わざマシン０６
    jp_kanji: わざマシン０６
    en: TM06
    fr: CT06
    it: MT06
    de: TM06
    es: MT06
    ko: 기술머신06
    zh_simp: 招式学习器０６
    zh_trad: 招式學習器０６
  descriptions:
    jp_kana: "あいてを　もうどくの\nじょうたいに　する。　ターンが　すすむほど\nどくの　ダメージが　ふえていく。"
    jp_kanji: "相手を　猛毒の　状態に　する。\nターンが　すすむほど\n毒の　ダメージが　増えていく。"
    en: "A move that leaves the target badly poisoned.\nIts poison damage worsens every turn."
    fr: "Empoisonne gravement l’ennemi.\nLes dégâts dus au poison augmentent à chaque tour."
    it: "Iperavvelena il bersaglio con una potente tossina.\nIl danno peggiora a ogni turno."
    de: "Vergiftet das Ziel mit einem potenten Toxin schwer.\nDie Vergiftung wird von Runde zu Runde stärker."
    es: "Envenena gravemente al objetivo y causa un daño\nmayor en cada turno."
    ko: "상대를 맹독의 상태로 만든다.\n턴이 진행될수록\n독의 데미지가 증가한다."
    zh_simp: "让对手陷入剧毒状态。\n随着回合的推进，\n中毒伤害会增加。"
    zh_trad: "讓對手陷入劇毒狀態。\n中毒傷害會隨著\n回合的進行而增加。"
tm007:
  names:
    jp_kana: わざマシン０７
    jp_kanji: わざマシン０７
    en: TM07
    fr: CT07
    it: MT07
    de: TM07
    es: MT07
    ko: 기술머신07
    zh_simp: 招式学习器０７
    zh_trad: 招式學習器０７
  descriptions:
    jp_kana: "５ターンの　あいだ　あられを　ふらして\nこおりタイプで　ない　ポケモン\nぜんいんに　ダメージを　あたえる。"
    jp_kanji: "５ターンの　間　あられを　降らして\nこおりタイプで　ない　ポケモン\n全員に　ダメージを　与える。"
    en: "The user summons a hailstorm lasting five turns.\nIt damages all Pokémon except Ice types."
    fr: "Invoque une tempête de grêle qui dure cinq tours.\nBlesse tous les Pokémon, sauf ceux de type Glace."
    it: "Chi la usa causa una grandinata che dura cinque turni.\nDanneggia tutti i Pokémon tranne quelli\ndi tipo Ghiaccio."
    de: "Hagelsturm für fünf Runden. Schadet allen außer\nEis-Pokémon."
    es: "Tormenta de granizo que dura cinco turnos. Hiere a\ntodos los Pokémon excepto a los de tipo Hielo."
    ko: "5턴 동안 싸라기눈을 내리게 해서\n얼음타입이 아닌 포켓몬\n모두에게 데미지를 준다."
    zh_simp: "在５回合内一直降冰雹，\n除冰属性的宝可梦以外，\n给予全体宝可梦伤害。"
    zh_trad: "降下冰雹，在５回合內\n場上除了冰屬性以外的寶可夢\n都會受到傷害。"
tm008:
  names:
    jp_kana: わざマシン０８
    jp_kanji: わざマシン０８
    en: TM08
    fr: CT08
    it: MT08
    de: TM08
    es: MT08
    ko: 기술머신08
    zh_simp: 招式学习器０８
    zh_trad: 招式學習器０８
  descriptions:
    jp_kana: "からだに　ちからを　こめて　きんにくを\nぶあつく　することで　じぶんの\nこうげきと　ぼうぎょを　あげる。"
    jp_kanji: "体に　力を　こめて\n筋肉を　ぶあつく　することで\n自分の　攻撃と　防御を　あげる。"
    en: "The user tenses its muscles to bulk up its body,\nraising both its Attack and Defense stats."
    fr: "Le lanceur tend ses muscles pour se gonfler,\nce qui booste son Attaque et sa Défense."
    it: "Chi la usa tende i muscoli per gonfiare il corpo,\naumentando Difesa e Attacco."
    de: "Der Anwender spannt seine Muskeln an, um den Angriff\nund die Verteidigung zu erhöhen."
    es: Robustece el cuerpo para subir el Ataque y la Defensa.
    ko: "몸에 힘을 주어\n근육을 두껍게 해서\n자신의 공격과 방어를 올린다."
    zh_simp: "使出全身力气绷紧肌肉，\n从而提高自己的攻击和防御。"
    zh_trad: "將力量集中於體內，增厚肌肉，\n提高自己的攻擊和防禦。"
tm009:
  names:
    jp_kana: わざマシン０９
    jp_kanji: わざマシン０９
    en: TM09
    fr: CT09
    it: MT09
    de: TM09
    es: MT09
    ko: 기술머신09
    zh_simp: 招式学习器０９
    zh_trad: 招式學習器０９
  descriptions:
    jp_kana: "タネを　いきおいよく\nあいてに　はっしゃして　こうげきする。\n２ー５かいの　あいだ　れんぞくで　だす。"
    jp_kanji: "タネを　勢いよく\n相手に　発射して　攻撃する。\n２ー５回の　間　連続で　だす。"
    en: "The user forcefully shoots seeds at the target two\nto five times in a row."
    fr: "Le lanceur mitraille l’ennemi avec une rafale de graines.\nDe deux à cinq rafales sont lancées à la suite."
    it: "Chi la usa spara da due a cinque raffiche di semi\ncontro il bersaglio in successione."
    de: "Der Anwender wirft zwei- bis fünfmal in rascher Folge\nSamen auf das Ziel."
    es: "Dispara rápido de dos a cinco ráfagas de semillas de\nmanera consecutiva."
    ko: "씨앗을 기세 좋게\n상대에게 발사하여 공격한다.\n2~5회 연속으로 쓴다."
    zh_simp: "向对手猛烈地\n发射种子进行攻击。\n连续攻击２～５次。"
    zh_trad: "向對手猛烈地\n發射種子進行攻擊。\n連續攻擊２～５次。"
tm010:
  names:
    jp_kana: わざマシン１０
    jp_kanji: わざマシン１０
    en: TM10
    fr: CT10
    it: MT10
    de: TM10
    es: MT10
    ko: 기술머신10
    zh_simp: 招式学习器１０
    zh_trad: 招式學習器１０
  descriptions:
    jp_kana: "じぶんを　ふるいたてて\nこうげきと　とくこうを　あげる。"
    jp_kanji: "自分を　奮いたてて\n攻撃と　特攻を　あげる。"
    en: "The user is roused, and its Attack and Sp. Atk\nstats increase."
    fr: "Le lanceur se rengorge.\nAugmente l’Attaque et l’Attaque Spéciale."
    it: "Chi la usa si tira su di morale, aumentando\nil proprio Attacco e l’Attacco Speciale."
    de: "Anwender erhält einen Kraftschub, der seinen Angriff\nund Spezial-Angriff erhöht."
    es: "Quien lo usa se concentra y potencia su Ataque y\nsu Ataque Especial."
    ko: "스스로 분발해서\n공격과 특수공격을 올린다."
    zh_simp: "激励自己，\n从而提高攻击和特攻。"
    zh_trad: "激勵自己，\n提高自己的攻擊和特攻。"
tm011:
  names:
    jp_kana: わざマシン１１
    jp_kanji: わざマシン１１
    en: TM11
    fr: CT11
    it: MT11
    de: TM11
    es: MT11
    ko: 기술머신11
    zh_simp: 招式学习器１１
    zh_trad: 招式學習器１１
  descriptions:
    jp_kana: "５ターンの　あいだ　ひざしを　つよくして\nほのおタイプの　いりょくを　あげる。\nみずタイプの　いりょくは　さがる。"
    jp_kanji: "５ターンの　間　日差しを　強くして\nほのおタイプの　威力を　あげる。\nみずタイプの　威力は　さがる。"
    en: "The user intensifies the sun for five turns, powering\nup Fire-type moves. It lowers the power of\nWater-type moves."
    fr: "Fait briller le soleil pendant cinq tours, augmentant\nla puissance des capacités de type Feu et baissant\ncelle des capacités de type Eau."
    it: "Chi la usa intensifica i raggi solari per cinque turni,\npotenziando le mosse di tipo Fuoco e riducendo\nla potenza di quelle di tipo Acqua."
    de: "Die Sonne brennt unbarmherzig fünf Runden lang.\nDadurch werden Attacken vom Typ Feuer verstärkt,\nwährend Wasser-Attacken abgeschwächt werden."
    es: "Hace que se intensifique el efecto del sol durante\ncinco turnos, lo que potencia los movimientos de tipo\nFuego y debilita los de tipo Agua."
    ko: "5턴 동안 햇살을 강하게 해서\n불꽃타입 기술의 위력을 올린다.\n물타입의 위력은 떨어진다."
    zh_simp: "在５回合内让日照变得强烈，\n从而提高火属性的招式威力。\n水属性的招式威力则降低。"
    zh_trad: "讓日照增強，在５回合內\n提高火屬性招式的威力。\n水屬性招式的威力會降低。"
tm012:
  names:
    jp_kana: わざマシン１２
    jp_kanji: わざマシン１２
    en: TM12
    fr: CT12
    it: MT12
    de: TM12
    es: MT12
    ko: 기술머신12
    zh_simp: 招式学习器１２
    zh_trad: 招式學習器１２
  descriptions:
    jp_kana: "あいてを　おこらせる。　３ターンの\nあいだ　あいては　ダメージを\nあたえる　わざしか　だせなく　なる。"
    jp_kanji: "相手を　怒らせる。　３ターンの\n間　相手は　ダメージを\n与える　技しか　だせなくなる。"
    en: "The target is taunted into a rage that allows it to use\nonly attack moves for three turns."
    fr: "Provoque l’ennemi. L’oblige à n’utiliser que des attaques\npendant trois tours."
    it: "Provoca il bersaglio inducendolo a usare solo mosse\nd’attacco per tre turni."
    de: "Bringt das Ziel in Rage. Dieses kann über drei Runden\nhinweg nur noch angreifen."
    es: "Enfurece al objetivo para que solo use movimientos de\nataque durante tres turnos."
    ko: "상대를 화나게 한다.\n3턴 동안 상대는 데미지를\n주는 기술밖에 쓸 수 없게 된다."
    zh_simp: "使对手愤怒。\n在３回合内让对手\n只能使出给予伤害的招式。"
    zh_trad: "激怒對手。\n在３回合內讓對手\n只能使出給予傷害的招式。"
tm013:
  names:
    jp_kana: わざマシン１３
    jp_kanji: わざマシン１３
    en: TM13
    fr: CT13
    it: MT13
    de: TM13
    es: MT13
    ko: 기술머신13
    zh_simp: 招式学习器１３
    zh_trad: 招式學習器１３
  descriptions:
    jp_kana: "こごえる　ビームを\nあいてに　はっしゃして　こうげきする。\nこおり　じょうたいに　することが　ある。"
    jp_kanji: "凍える　ビームを\n相手に　発射して　攻撃する。\nこおり状態に　することが　ある。"
    en: "The target is struck with an icy-cold beam of energy.\nThis may also leave the target frozen."
    fr: "Un rayon de glace frappe l’ennemi.\nPeut aussi le geler."
    it: "Il bersaglio è colpito da un raggio di energia gelida\nche può anche congelarlo."
    de: "Das Ziel wird von einem Eisstrahl getroffen und friert\neventuell ein."
    es: Rayo de hielo que puede llegar a congelar.
    ko: "냉동빔을\n상대에게 발사하여 공격한다.\n얼음 상태로 만들 때가 있다."
    zh_simp: "向对手发射\n冰冻光束进行攻击。\n有时会让对手陷入冰冻状态。"
    zh_trad: "向對手發射\n冰凍光束進行攻擊。\n有時會讓對手陷入冰凍狀態。"
tm014:
  names:
    jp_kana: わざマシン１４
    jp_kanji: わざマシン１４
    en: TM14
    fr: CT14
    it: MT14
    de: TM14
    es: MT14
    ko: 기술머신14
    zh_simp: 招式学习器１４
    zh_trad: 招式學習器１４
  descriptions:
    jp_kana: "はげしい　ふぶきを\nあいてに　ふきつけて　こうげきする。\nこおり　じょうたいに　することが　ある。"
    jp_kanji: "激しい　吹雪を\n相手に　吹きつけて　攻撃する。\nこおり状態に　することが　ある。"
    en: "A howling blizzard is summoned to strike opposing\nPokémon. This may also leave the opposing\nPokémon frozen."
    fr: "Une violente tempête de neige s’abat sur l’ennemi.\nPeut aussi le geler."
    it: "Colpisce i nemici intorno con una tremenda\ntempesta di ghiaccio che può anche congelarli."
    de: "Ein Schneesturm wütet, der gegnerische Pokémon\neinfrieren kann."
    es: Tormenta de hielo que puede llegar a congelar.
    ko: "세찬 눈보라를\n상대에게 내뿜어 공격한다.\n얼음 상태로 만들 때가 있다."
    zh_simp: "将猛烈的暴风雪\n刮向对手进行攻击。\n有时会让对手陷入冰冻状态。"
    zh_trad: "將猛烈的暴風雪\n吹向對手進行攻擊。\n有時會讓對手陷入冰凍狀態。"
tm015:
  names:
    jp_kana: わざマシン１５
    jp_kanji: わざマシン１５
    en: TM15
    fr: CT15
    it: MT15
    de: TM15
    es: MT15
    ko: 기술머신15
    zh_simp: 招式学习器１５
    zh_trad: 招式學習器１５
  descriptions:
    jp_kana: "つよい　こうせんを\nあいてに　はっしゃして　こうげきする。\nつぎの　ターンは　うごけなく　なる。"
    jp_kanji: "強い　光線を\n相手に　発射して　攻撃する。\n次の　ターンは　動けなくなる。"
    en: "The target is attacked with a powerful beam.\nThe user can’t move on the next turn."
    fr: "Projette un puissant rayon sur l’ennemi.\nLe lanceur doit se reposer au tour suivant."
    it: "Colpisce il bersaglio con un potente raggio. Chi la usa\nsalta il turno successivo per recuperare energia."
    de: "Starke Attacke, die den Anwender zwingt, eine Runde\nauszusetzen."
    es: "Es eficaz, pero el atacante deberá descansar en el\nsiguiente turno."
    ko: "강한 광선을\n상대에게 발사하여 공격한다.\n다음 턴은 움직일 수 없다."
    zh_simp: "向对手发射\n强烈的光线进行攻击。\n下一回合自己将无法动弹。"
    zh_trad: "向對手發射\n強烈的光線進行攻擊。\n下一回合自己將無法動彈。"
tm016:
  names:
    jp_kana: わざマシン１６
    jp_kanji: わざマシン１６
    en: TM16
    fr: CT16
    it: MT16
    de: TM16
    es: MT16
    ko: 기술머신16
    zh_simp: 招式学习器１６
    zh_trad: 招式學習器１６
  descriptions:
    jp_kana: "５ターンの　あいだ　ふしぎな　かべで\nあいてから　うける　とくしゅ　こうげきの\nダメージを　よわめる。"
    jp_kanji: "５ターンの　間　不思議な　かべで\n相手から　受ける　特殊攻撃の\nダメージを　弱める。"
    en: "A wondrous wall of light is put up to reduce damage\nfrom special attacks for five turns."
    fr: "Crée un fabuleux mur de lumière qui réduit les dégâts\ncausés par les capacités spéciales pendant cinq tours."
    it: "Innalza una barriera misteriosa che riduce i danni degli\nattacchi speciali per sé e gli alleati per cinque turni."
    de: "Erzeugt eine Lichtwand und senkt den Schaden durch\nSpezial-Attacken für fünf Runden."
    es: "Pared de luz que reduce durante cinco turnos el daño\nproducido por los ataques especiales."
    ko: "5턴 동안 이상한 장막을 쳐서\n상대로부터 받는 특수공격의\n데미지를 약하게 한다."
    zh_simp: "利用神奇的墙壁，\n在５回合内减弱从对手那里\n受到的特殊攻击的伤害。"
    zh_trad: "利用神奇的屏障，\n在５回合內減輕\n來自對手的特殊攻擊傷害。"
tm017:
  names:
    jp_kana: わざマシン１７
    jp_kanji: わざマシン１７
    en: TM17
    fr: CT17
    it: MT17
    de: TM17
    es: MT17
    ko: 기술머신17
    zh_simp: 招式学习器１７
    zh_trad: 招式學習器１７
  descriptions:
    jp_kana: "あいての　こうげきを\nまったく　うけない。\nれんぞくで　だすと　しっぱい　しやすい。"
    jp_kanji: "相手の　攻撃を\nまったく　受けない。\n連続で　だすと　失敗しやすい。"
    en: "This move enables the user to protect itself from\nall attacks. Its chance of failing rises if it is used\nin succession."
    fr: "Le lanceur se protège de toutes les attaques.\nPeut échouer si utilisée plusieurs fois de suite."
    it: "Permette di eludere tutti gli attacchi.\nSe usata in successione, può fallire."
    de: "Anwender wehrt jede Attacke ab. Scheitert eventuell\nbei Wiederholung."
    es: "Frena todos los ataques, pero puede fallar si se usa\nrepetidamente."
    ko: "상대의 공격을\n전혀 받지 않는다.\n연속으로 쓰면 실패하기 쉽다."
    zh_simp: "完全抵挡\n对手的攻击。\n连续使出则容易失败。"
    zh_trad: "完全防住對手的所有攻擊。\n連續使用時容易失敗。"
tm018:
  names:
    jp_kana: わざマシン１８
    jp_kanji: わざマシン１８
    en: TM18
    fr: CT18
    it: MT18
    de: TM18
    es: MT18
    ko: 기술머신18
    zh_simp: 招式学习器１８
    zh_trad: 招式學習器１８
  descriptions:
    jp_kana: "５ターンの　あいだ　あめを　ふらせて\nみずタイプの　いりょくを　あげる。\nほのおタイプの　いりょくは　さがる。"
    jp_kanji: "５ターンの　間　雨を　降らせて\nみずタイプの　威力を　あげる。\nほのおタイプの　威力は　さがる。"
    en: "The user summons a heavy rain that falls for five\nturns, powering up Water-type moves. It lowers\nthe power of Fire-type moves."
    fr: "Invoque de fortes pluies qui durent cinq tours,\naugmentant la puissance des capacités de type Eau\net baissant celle des capacités de type Feu."
    it: "Chi la usa provoca una forte pioggia per cinque turni,\npotenziando le mosse di tipo Acqua e riducendo\nla potenza di quelle di tipo Fuoco."
    de: "Anwender erzeugt starken Regen. Die Stärke von\nWasser-Attacken erhöht sich fünf Runden lang,\nwährend die Stärke von Feuer-Attacken sinkt."
    es: "Genera una fuerte lluvia que refuerza los movimientos\nde tipo Agua durante cinco turnos y debilita los de tipo\nFuego."
    ko: "5턴 동안 비를 내리게 해서\n물타입 기술의 위력을 올린다.\n불꽃타입의 위력은 떨어진다."
    zh_simp: "在５回合内一直降雨，\n从而提高水属性的招式威力。\n火属性的招式威力则降低。"
    zh_trad: "降下大雨，在５回合內\n提高水屬性招式的威力。\n火屬性招式的威力會降低。"
tm019:
  names:
    jp_kana: わざマシン１９
    jp_kanji: わざマシン１９
    en: TM19
    fr: CT19
    it: MT19
    de: TM19
    es: MT19
    ko: 기술머신19
    zh_simp: 招式学习器１９
    zh_trad: 招式學習器１９
  descriptions:
    jp_kana: "ようぶんを　すいとり　こうげきする。\nあたえた　ダメージの\nはんぶんの　ＨＰを　かいふく　できる。"
    jp_kanji: "養分を　吸い取り　攻撃する。\n与えた　ダメージの\n半分の　ＨＰを　回復できる。"
    en: "A nutrient-draining attack. The user’s HP is restored\nby half the damage taken by the target."
    fr: "Une attaque qui convertit la moitié des dégâts\ninfligés en PV pour le lanceur."
    it: "Mossa che assorbe PS. Chi la usa recupera una\nquantità di PS pari alla metà del danno inferto."
    de: "Das Ziel wird angegriffen und die Hälfte des zugefügten\nSchadens dem Anwender als KP gutgeschrieben."
    es: "Un ataque que absorbe nutrientes. Quien lo usa\nrecupera la mitad de los PS del daño que produce."
    ko: "양분을 흡수하여 공격한다.\n입힌 데미지의 절반에 해당하는\nHP를 회복할 수 있다."
    zh_simp: "吸取对手的养分进行攻击。\n可以回复给予对手\n伤害的一半ＨＰ。"
    zh_trad: "吸取對手的養分進行攻擊。\n可以回復給予對手\n傷害的一半ＨＰ。"
tm020:
  names:
    jp_kana: わざマシン２０
    jp_kanji: わざマシン２０
    en: TM20
    fr: CT20
    it: MT20
    de: TM20
    es: MT20
    ko: 기술머신20
    zh_simp: 招式学习器２０
    zh_trad: 招式學習器２０
  descriptions:
    jp_kana: "５ターンの　あいだ\nふしぎな　ちからに　まもられて\nじょうたい　いじょうに　ならなくなる。"
    jp_kanji: "５ターンの　間\n不思議な　力に　守られて\n状態異常に　ならなくなる。"
    en: "The user creates a protective field that prevents\nstatus conditions for five turns."
    fr: "Crée un champ protecteur qui empêche toutes\nles altérations de statut pendant cinq tours."
    it: "Chi la usa crea un campo protettivo che evita problemi\ndi stato per sé e gli alleati per cinque turni."
    de: "Team des Anwenders ist fünf Runden lang vor\nStatusproblemen geschützt."
    es: "Un escudo que protege de problemas de estado, como\nel sueño o la parálisis, durante cinco turnos."
    ko: "5턴 동안\n이상한 힘의 보호를 받아\n상태 이상이 되지 않는다."
    zh_simp: "在５回合内\n被神奇的力量守护，\n从而不会陷入异常状态。"
    zh_trad: "在５回合內\n被神奇的力量守護，\n不會陷入異常狀態。"
tm021:
  names:
    jp_kana: わざマシン２１
    jp_kanji: わざマシン２１
    en: TM21
    fr: CT21
    it: MT21
    de: TM21
    es: MT21
    ko: 기술머신21
    zh_simp: 招式学习器２１
    zh_trad: 招式學習器２１
  descriptions:
    jp_kana: "きょうりょくな　ひかりを　はなち\nあいてに　ダメージを　あたえる。"
    jp_kanji: "強力な　光を　放ち\n相手に　ダメージを　与える。"
    en: "The user damages opposing Pokémon by emitting a\npowerful flash."
    fr: "Libère une puissante décharge lumineuse\nqui inflige des dégâts à l’ennemi."
    it: "Chi la usa emette una luce potentissima che\ninfligge danni ai nemici intorno."
    de: "Der Anwender feuert einen mächtigen Lichtblitz ab,\nder gegnerischen Pokémon Schaden zufügt."
    es: Inflige daño a los oponentes con una potente luz.
    ko: "강력한 빛을 내어\n상대에게 데미지를 준다."
    zh_simp: "向对手发射强光，\n并给予伤害。"
    zh_trad: "發出強烈的閃光，\n給予對手傷害。"
tm022:
  names:
    jp_kana: わざマシン２２
    jp_kanji: わざマシン２２
    en: TM22
    fr: CT22
    it: MT22
    de: TM22
    es: MT22
    ko: 기술머신22
    zh_simp: 招式学习器２２
    zh_trad: 招式學習器２２
  descriptions:
    jp_kana: "１ターンめに　ひかりを　いっぱいに\nあつめ　２ターンめに　ひかりの　たばを\nはっしゃして　こうげきする。"
    jp_kanji: "１ターン目に　光を　いっぱいに　集め\n２ターン目に　光の　束を\n発射して　攻撃する。"
    en: "In this two-turn attack, the user gathers light, then\nblasts a bundled beam on the next turn."
    fr: "Absorbe la lumière au premier tour et envoie un rayon\npuissant au tour suivant."
    it: "Chi la usa assorbe luce al primo turno per proiettare\nun raggio intenso al turno successivo."
    de: "Absorbiert Licht in Runde 1. In Runde 2 erfolgt der\nAngriff."
    es: "El usuario absorbe luz en el primer turno y en el\nsegundo lanza un potente rayo de energía."
    ko: "1턴째에 빛을 가득 모아\n2턴째에 빛의 다발을\n발사하여 공격한다."
    zh_simp: "第１回合收集满满的日光，\n第２回合发射光束进行攻击。"
    zh_trad: "使用後的第１回合吸收大量日光，\n並於第２回合發射光束進行攻擊。"
tm023:
  names:
    jp_kana: わざマシン２３
    jp_kanji: わざマシン２３
    en: TM23
    fr: CT23
    it: MT23
    de: TM23
    es: MT23
    ko: 기술머신23
    zh_simp: 招式学习器２３
    zh_trad: 招式學習器２３
  descriptions:
    jp_kana: "かたい　しっぽで　あいてを　たたきつけて\nこうげきする。　あいての　ぼうぎょを\nさげることが　ある。"
    jp_kanji: "硬い　しっぽで\n相手を　たたきつけて　攻撃する。\n相手の　防御を　さげることが　ある。"
    en: "The target is slammed with a steel-hard tail.\nThis may also lower the target’s Defense stat."
    fr: "Attaque l’ennemi avec une queue de fer.\nPeut aussi baisser sa Défense."
    it: "Il bersaglio viene colpito da una robusta coda\nd’acciaio che può anche ridurne la Difesa."
    de: "Attacke mit hartem Eisenschweif. Senkt eventuell den\nVerteidigungs-Wert des Zieles."
    es: "Ataca con una cola férrea y puede bajar la Defensa\ndel objetivo."
    ko: "단단한 꼬리로\n상대를 힘껏 쳐서 공격한다.\n상대의 방어를 떨어뜨릴 때가 있다."
    zh_simp: "使用坚硬的尾巴\n摔打对手进行攻击。\n有时会降低对手的防御。"
    zh_trad: "將堅硬的尾巴\n甩向對手進行攻擊。\n有時會降低對手的防禦。"
tm024:
  names:
    jp_kana: わざマシン２４
    jp_kanji: わざマシン２４
    en: TM24
    fr: CT24
    it: MT24
    de: TM24
    es: MT24
    ko: 기술머신24
    zh_simp: 招式学习器２４
    zh_trad: 招式學習器２４
  descriptions:
    jp_kana: "つよい　でんげきを\nあいてに　あびせて　こうげきする。\nまひ　じょうたいに　することが　ある。"
    jp_kanji: "強い　電撃を\n相手に　浴びせて　攻撃する。\nまひ状態に　することが　ある。"
    en: "A strong electric blast crashes down on the target.\nThis may also leave the target with paralysis."
    fr: "Une grosse décharge électrique tombe sur l’ennemi.\nPeut aussi le paralyser."
    it: "Il bersaglio viene colpito da una potente scarica\nelettrica che può anche paralizzarlo."
    de: "Eine starke Elektro-Attacke, die das Ziel eventuell\nparalysiert."
    es: "Potente ataque eléctrico que puede paralizar al\nobjetivo."
    ko: "강한 전격을\n상대에게 날려서 공격한다.\n마비 상태로 만들 때가 있다."
    zh_simp: "向对手发出\n强力电击进行攻击。\n有时会让对手陷入麻痹状态。"
    zh_trad: "向對手放出強力電流進行攻擊。\n有時會讓對手陷入麻痺狀態。"
tm025:
  names:
    jp_kana: わざマシン２５
    jp_kanji: わざマシン２５
    en: TM25
    fr: CT25
    it: MT25
    de: TM25
    es: MT25
    ko: 기술머신25
    zh_simp: 招式学习器２５
    zh_trad: 招式學習器２５
  descriptions:
    jp_kana: "はげしい　かみなりを\nあいてに　おとして　こうげきする。\nまひ　じょうたいに　することが　ある。"
    jp_kanji: "激しい　雷を\n相手に　落として　攻撃する。\nまひ状態に　することが　ある。"
    en: "A wicked thunderbolt is dropped on the target to\ninflict damage. This may also leave the target\nwith paralysis."
    fr: "La foudre tombe sur l’ennemi pour lui infliger\ndes dégâts. Peut aussi le paralyser."
    it: "Il bersaglio è colpito da un fulmine molto violento\nche può anche paralizzarlo."
    de: "Eine verheerende Elektro-Attacke, die das Ziel\neventuell paralysiert."
    es: "Un poderoso rayo que daña al objetivo y puede\nparalizarlo."
    ko: "강한 번개를\n상대에게 떨어뜨려 공격한다.\n마비 상태로 만들 때가 있다."
    zh_simp: "向对手劈下暴雷进行攻击。\n有时会让对手陷入麻痹状态。"
    zh_trad: "向對手劈下暴雷進行攻擊。\n有時會讓對手陷入麻痺狀態。"
tm026:
  names:
    jp_kana: わざマシン２６
    jp_kanji: わざマシン２６
    en: TM26
    fr: CT26
    it: MT26
    de: TM26
    es: MT26
    ko: 기술머신26
    zh_simp: 招式学习器２６
    zh_trad: 招式學習器２６
  descriptions:
    jp_kana: "じしんの　しょうげきで　じぶんの\nまわりに　いるものを　こうげきする。"
    jp_kanji: "地震の　衝撃で　自分の\n周りに　いるものを　攻撃する。"
    en: "The user sets off an earthquake that strikes every\nPokémon around it."
    fr: "Le lanceur provoque un tremblement de terre\ntouchant tous les Pokémon autour de lui."
    it: "Chi la usa provoca un potente sisma che colpisce\ni Pokémon che ha intorno."
    de: "Ein mächtiges Beben, das alle Pokémon im Umkreis\ntrifft."
    es: "Un terremoto que afecta a todos los Pokémon que\nestén a su alrededor."
    ko: "지진의 충격으로 자신의\n주위에 있는 포켓몬을 공격한다."
    zh_simp: "利用地震的冲击，\n攻击自己周围所有的宝可梦。"
    zh_trad: "用地震的衝擊，\n攻擊自己周圍所有的寶可夢。"
tm027:
  names:
    jp_kana: わざマシン２７
    jp_kanji: わざマシン２７
    en: TM27
    fr: CT27
    it: MT27
    de: TM27
    es: MT27
    ko: 기술머신27
    zh_simp: 招式学习器２７
    zh_trad: 招式學習器２７
  descriptions:
    jp_kana: "すばやい　うごきで　あいての　あしを\nねらって　こうげきする。\nあいての　すばやさを　さげる。"
    jp_kanji: "素早い　動きで　相手の　足を\nねらって　攻撃する。\n相手の　素早さを　さげる。"
    en: "The user makes a swift attack on the target’s legs,\nwhich lowers the target’s Speed stat."
    fr: "Un coup rapide qui affecte la mobilité de l’ennemi\net diminue sa Vitesse."
    it: "Chi la usa colpisce con un attacco fulmineo\nla parte inferiore del corpo del bersaglio,\nriducendone la Velocità."
    de: "Anwender greift mit blitzschnellen Bewegungen die\nBeine des Zieles an und senkt dessen Initiative."
    es: "Ataque rápido dirigido a los pies del objetivo que le\nhace perder Velocidad."
    ko: "재빠른 움직임으로\n상대의 다리를 노려 공격한다.\n상대의 스피드를 떨어뜨린다."
    zh_simp: "以敏捷的动作瞄准\n对手的脚进行攻击。\n降低对手的速度。"
    zh_trad: "瞄準對手的腳，\n以敏捷的動作進行攻擊。\n可降低對手的速度。"
tm028:
  names:
    jp_kana: わざマシン２８
    jp_kanji: わざマシン２８
    en: TM28
    fr: CT28
    it: MT28
    de: TM28
    es: MT28
    ko: 기술머신28
    zh_simp: 招式学习器２８
    zh_trad: 招式學習器２８
  descriptions:
    jp_kana: "１ターンめに　もぐり　２ターンめで\nあいてを　こうげきする。\nどうくつ　などから　だっしゅつも　できる。"
    jp_kanji: "１ターン目に　潜り　２ターン目で\n相手を　攻撃する。\n洞窟　などから　脱出も　できる。"
    en: "The user burrows into the ground, then attacks on the\nnext turn. It can also be used to exit dungeons."
    fr: "Le lanceur creuse un tunnel au premier tour et frappe\nau second. Permet également de sortir d’une grotte,\nentre autres."
    it: "Chi la usa scava al primo turno e attacca al successivo.\nFuori dalla lotta consente di uscire da grotte e\nluoghi simili."
    de: "In Runde 1 gräbt sich der Anwender ein und in Runde 2\ngreift er an. Macht Flucht aus Höhlen möglich."
    es: "El usuario cava durante el primer turno y ataca en el\nsegundo. También sirve para salir de ciertas zonas."
    ko: "1턴째에 파고들어 2턴째에\n상대를 공격한다.\n동굴 등에서 탈출할 수도 있다."
    zh_simp: "第１回合钻入，\n第２回合攻击对手。\n还能用来逃离洞窟之类的地方。"
    zh_trad: "使用後的第１回合潛入地底，\n並於第２回合攻擊對手。\n還能用來從洞窟之類的地方脫身。"
tm029:
  names:
    jp_kana: わざマシン２９
    jp_kanji: わざマシン２９
    en: TM29
    fr: CT29
    it: MT29
    de: TM29
    es: MT29
    ko: 기술머신29
    zh_simp: 招式学习器２９
    zh_trad: 招式學習器２９
  descriptions:
    jp_kana: "つよい　ねんりきを　あいてに　おくって\nこうげきする。　あいての　とくぼうを\nさげることが　ある。"
    jp_kanji: "強い　念力を　相手に　送って\n攻撃する。　相手の　特防を\nさげることが　ある。"
    en: "The target is hit by a strong telekinetic force.\nThis may also lower the target’s Sp. Def stat."
    fr: "Une puissante force télékinétique frappe l’ennemi.\nPeut aussi faire baisser sa Défense Spéciale."
    it: "Il bersaglio viene colpito da una potente\nforza telecinetica che può anche ridurne\nla Difesa Speciale."
    de: "Starke Psycho-Attacke, die eventuell die\nSpezial-Verteidigung des Zieles senkt."
    es: "Fuerte ataque telequinético que puede bajar la Defensa\nEspecial del objetivo."
    ko: "강한 염동력을 상대에게 보내어\n공격한다. 상대의 특수방어를\n떨어뜨릴 때가 있다."
    zh_simp: "向对手发送\n强大的念力进行攻击。\n有时会降低对手的特防。"
    zh_trad: "向對手發送\n強大的念力進行攻擊。\n有時會降低對手的特防。"
tm030:
  names:
    jp_kana: わざマシン３０
    jp_kanji: わざマシン３０
    en: TM30
    fr: CT30
    it: MT30
    de: TM30
    es: MT30
    ko: 기술머신30
    zh_simp: 招式学习器３０
    zh_trad: 招式學習器３０
  descriptions:
    jp_kana: "くろいかげの　かたまりを　なげつけて\nこうげきする。　あいての　とくぼうを\nさげることが　ある。"
    jp_kanji: "黒い影の　塊を　投げつけて\n攻撃する。　相手の　特防を\nさげることが　ある。"
    en: "The user hurls a shadowy blob at the target.\nThis may also lower the target’s Sp. Def stat."
    fr: "Projette une grande ombre sur l’ennemi.\nPeut aussi faire baisser sa Défense Spéciale."
    it: "Lancia sul bersaglio una sfera nera.\nPuò anche ridurne la Difesa Speciale."
    de: "Bewirft das Ziel mit einem gruseligen Ball und senkt\neventuell dessen Spezial-Verteidigung."
    es: "Lanza una bola oscura que puede bajar la Defensa\nEspecial del objetivo."
    ko: "까만 그림자의 덩어리를 내던져서\n공격한다. 상대의 특수방어를\n떨어뜨릴 때가 있다."
    zh_simp: "投掷一团黑影进行攻击。\n有时会降低对手的特防。"
    zh_trad: "投擲一團黑影進行攻擊。\n有時會降低對手的特防。"
tm031:
  names:
    jp_kana: わざマシン３１
    jp_kanji: わざマシン３１
    en: TM31
    fr: CT31
    it: MT31
    de: TM31
    es: MT31
    ko: 기술머신31
    zh_simp: 招式学习器３１
    zh_trad: 招式學習器３１
  descriptions:
    jp_kana: "しゅとうを　いきおいよく　ふりおろして\nあいてを　こうげきする。　ひかりのかべや\nリフレクター　なども　はかいできる。"
    jp_kanji: "手刀を　勢いよく　振りおろして\n相手を　攻撃する。　ひかりのかべや\nリフレクター　なども　破壊できる。"
    en: "The user attacks with a swift chop. It can also break\nbarriers, such as Light Screen and Reflect."
    fr: "Le lanceur attaque avec le tranchant de la main.\nPermet aussi de briser les barrières\ncomme Mur Lumière et Protection."
    it: "Colpisce il bersaglio con una mano e rompe\nbarriere come Riflesso e Schermoluce."
    de: "Ein beherzter Handkantenschlag. Durchbricht Barrieren\nwie Lichtschild und Reflektor."
    es: "Potente ataque que también es capaz de destruir\nbarreras como Pantalla de Luz y Reflejo."
    ko: "수도로 기세 좋게 내려쳐서\n상대를 공격한다. 빛의장막이나\n리플렉터 등도 파괴할 수 있다."
    zh_simp: "将手刀猛烈地挥下攻击对手。\n还可以破坏光墙和反射壁等。"
    zh_trad: "猛烈地揮下手刀\n攻擊對手。還可以破壞\n光牆和反射壁等。"
tm032:
  names:
    jp_kana: わざマシン３２
    jp_kanji: わざマシン３２
    en: TM32
    fr: CT32
    it: MT32
    de: TM32
    es: MT32
    ko: 기술머신32
    zh_simp: 招式学习器３２
    zh_trad: 招式學習器３２
  descriptions:
    jp_kana: "すばやい　うごきで　ぶんしんを　つくり\nあいてを　まどわせて\nかいひりつを　あげる。"
    jp_kanji: "素早い　動きで　分身を　つくり\n相手を　まどわせて\n回避率を　あげる。"
    en: "By moving rapidly, the user makes illusory copies of\nitself to raise its evasiveness."
    fr: "Le lanceur se déplace si vite qu’il crée des copies\nillusoires de lui-même, augmentant son Esquive."
    it: "Chi la usa si muove in fretta e crea copie illusorie\ndi se stesso che aumentano la capacità di elusione."
    de: "Erzeugt durch schnelle Bewegungen Ebenbilder,\num den Ausweichwert zu erhöhen."
    es: Crea copias de sí mismo para mejorar la Evasión.
    ko: "재빠른 움직임으로 분신을 만들어\n상대에게 혼동을 유발해\n회피율을 올린다."
    zh_simp: "通过快速移动来制造分身，\n扰乱对手，从而提高闪避率。"
    zh_trad: "利用快速移動\n製造出分身擾亂對手，\n提高自己的閃避率。"
tm033:
  names:
    jp_kana: わざマシン３３
    jp_kanji: わざマシン３３
    en: TM33
    fr: CT33
    it: MT33
    de: TM33
    es: MT33
    ko: 기술머신33
    zh_simp: 招式学习器３３
    zh_trad: 招式學習器３３
  descriptions:
    jp_kana: "５ターンの　あいだ　ふしぎな　かべで\nあいてから　うける　ぶつり　こうげきの\nダメージを　よわめる。"
    jp_kanji: "５ターンの　間　不思議な　かべで\n相手から　受ける　物理攻撃の\nダメージを　弱める。"
    en: "A wondrous wall of light is put up to reduce damage\nfrom physical attacks for five turns."
    fr: "Crée un fabuleux mur de lumière qui réduit les dégâts\ncausés par les capacités physiques pendant cinq tours."
    it: "Innalza una barriera misteriosa che riduce i danni degli\nattacchi fisici per sé e gli alleati per cinque turni."
    de: "Eine mysteriöse Wand, die für fünf Runden den Schaden\nvon physischen gegnerischen Treffern reduziert."
    es: "Pared de luz que reduce durante cinco turnos el daño\nproducido por los ataques físicos."
    ko: "5턴 동안 이상한 장막을 쳐서\n상대로부터 받는 물리공격의\n데미지를 약하게 한다."
    zh_simp: "利用神奇的墙壁，\n在５回合内减弱从对手那里\n受到的物理攻击的伤害。"
    zh_trad: "利用神奇的屏障，\n在５回合內減輕\n來自對手的物理攻擊傷害。"
tm034:
  names:
    jp_kana: わざマシン３４
    jp_kanji: わざマシン３４
    en: TM34
    fr: CT34
    it: MT34
    de: TM34
    es: MT34
    ko: 기술머신34
    zh_simp: 招式学习器３４
    zh_trad: 招式學習器３４
  descriptions:
    jp_kana: "でんげきを　すばやく\nあいてに　あびせる。\nこうげきは　かならず　めいちゅう　する。"
    jp_kanji: "電撃を　素早く\n相手に　浴びせる。\n攻撃は　必ず　命中する。"
    en: "The user strikes the target with a quick jolt of\nelectricity. This attack never misses."
    fr: "Le lanceur envoie un choc électrique rapide à l’ennemi.\nImpossible à esquiver."
    it: "Chi la usa colpisce il bersaglio con una scossa\nelettrica. È impossibile eludere questa mossa."
    de: "Angriff mit schnellem Elektro-Schlag. Ausweichen nicht\nmöglich."
    es: Ataque eléctrico muy rápido e ineludible.
    ko: "전격을 재빠르게\n상대에게 날린다.\n공격은 반드시 명중한다."
    zh_simp: "向对手快速发出电击。\n攻击必定会命中。"
    zh_trad: "向對手迅速放出電流。\n攻擊一定會命中。"
tm035:
  names:
    jp_kana: わざマシン３５
    jp_kanji: わざマシン３５
    en: TM35
    fr: CT35
    it: MT35
    de: TM35
    es: MT35
    ko: 기술머신35
    zh_simp: 招式学习器３５
    zh_trad: 招式學習器３５
  descriptions:
    jp_kana: "はげしい　ほのおを\nあいてに　はっしゃして　こうげきする。\nやけど　じょうたいに　することが　ある。"
    jp_kanji: "激しい　炎を\n相手に　発射して　攻撃する。\nやけど状態に　することが　ある。"
    en: "The target is scorched with an intense blast of fire.\nThis may also leave the target with a burn."
    fr: "L’ennemi reçoit un torrent de flammes.\nPeut aussi le brûler."
    it: "Il bersaglio viene colpito da intense fiammate\nche possono anche scottarlo."
    de: "Starke Feuer-Attacke, durch die das Ziel eventuell\nVerbrennungen erleidet."
    es: "Ataca con una gran ráfaga de fuego que puede causar\nquemaduras."
    ko: "세찬 불꽃을\n상대에게 발사하여 공격한다.\n화상 상태로 만들 때가 있다."
    zh_simp: "向对手发射\n烈焰进行攻击。\n有时会让对手陷入灼伤状态。"
    zh_trad: "向對手發射\n強烈火焰進行攻擊。\n有時會讓對手陷入灼傷狀態。"
tm036:
  names:
    jp_kana: わざマシン３６
    jp_kanji: わざマシン３６
    en: TM36
    fr: CT36
    it: MT36
    de: TM36
    es: MT36
    ko: 기술머신36
    zh_simp: 招式学习器３６
    zh_trad: 招式學習器３６
  descriptions:
    jp_kana: "きたない　ヘドロを\nあいてに　なげつけて　こうげきする。\nどく　じょうたいに　することが　ある。"
    jp_kanji: "汚い　ヘドロを\n相手に　投げつけて　攻撃する。\n毒状態に　することが　ある。"
    en: "Unsanitary sludge is hurled at the target. This may\nalso poison the target."
    fr: "Des détritus toxiques sont projetés sur l’ennemi.\nPeut aussi l’empoisonner."
    it: "Chi la usa lancia fango malsano sul bersaglio.\nPuò anche avvelenarlo."
    de: "Wirft Schlamm auf das Ziel. Dieses wird eventuell\nvergiftet."
    es: Arroja residuos al objetivo. Puede llegar a envenenar.
    ko: "더러운 오물을\n상대에게 내던져서 공격한다.\n독 상태로 만들 때가 있다."
    zh_simp: "用污泥投掷对手进行攻击。\n有时会让对手陷入中毒状态。"
    zh_trad: "向對手投擲污泥進行攻擊。\n有時會讓對手陷入中毒狀態。"
tm037:
  names:
    jp_kana: わざマシン３７
    jp_kanji: わざマシン３７
    en: TM37
    fr: CT37
    it: MT37
    de: TM37
    es: MT37
    ko: 기술머신37
    zh_simp: 招式学习器３７
    zh_trad: 招式學習器３７
  descriptions:
    jp_kana: "５ターンの　あいだ　すなあらしで　いわ\nじめん　はがねタイプ　いがいに　ダメージ。\nいわタイプの　とくぼうが　あがる。"
    jp_kanji: "５ターンの　間　砂あらしで　いわ\nじめん　はがねタイプ　以外に　ダメージ。\nいわタイプの　特防が　あがる。"
    en: "A five-turn sandstorm is summoned to hurt all\ncombatants except Rock, Ground, and Steel types.\nIt raises the Sp. Def stat of Rock types."
    fr: "Une tempête de sable blesse tous les Pokémon pendant\ncinq tours, sauf ceux de type Roche, Sol ou Acier.\nAugmente la Défense Spéciale des Pokémon Roche."
    it: "Causa una tempesta di sabbia per cinque turni che\ndanneggia tutti i tipi, esclusi Terra, Roccia e Acciaio.\nAumenta la Difesa Speciale dei Pokémon di tipo Roccia."
    de: "Sandsturm für fünf Runden. Schadet Pokémon aller\nTypen außer Gestein, Boden und Stahl. Erhöht die\nSpezial-Verteidigung von Gesteins-Pokémon."
    es: "Tormenta de arena que dura cinco turnos y hiere a\ntodos, excepto a los de tipo Roca, Tierra y Acero,\ny aumenta la Defensa Especial de los de tipo Roca."
    ko: "5턴 동안 모래바람을 일으켜\n바위, 땅, 강철타입 이외의 상대에게 데미지를 준다.\n바위타입의 특수방어가 올라간다."
    zh_simp: "在５回合内扬起沙暴，除岩石、地面和\n钢属性以外的宝可梦，都会受到伤害。\n岩石属性的特防还会提高。"
    zh_trad: "揚起沙暴，在５回合內給予\n岩石、地面和鋼屬性以外的寶可夢傷害。\n岩石屬性寶可夢的特防會提高。"
tm038:
  names:
    jp_kana: わざマシン３８
    jp_kanji: わざマシン３８
    en: TM38
    fr: CT38
    it: MT38
    de: TM38
    es: MT38
    ko: 기술머신38
    zh_simp: 招式学习器３８
    zh_trad: 招式學習器３８
  descriptions:
    jp_kana: "だいのじの　ほのおで\nあいてを　やきつくす。\nやけど　じょうたいに　することが　ある。"
    jp_kanji: "大の字の　炎で\n相手を　焼きつくす。\nやけど状態に　することが　ある。"
    en: "The target is attacked with an intense blast of\nall-consuming fire. This may also leave the target\nwith a burn."
    fr: "Un déluge de flammes ardentes submerge l’ennemi.\nPeut aussi le brûler."
    it: "Investe il bersaglio con un’intensa fiammata\nche fa terra bruciata. Può anche scottarlo."
    de: "Feuersbrunst, die das Ziel versengt und ihm eventuell\neine Verbrennung zufügt."
    es: "Llama intensa que chamusca y puede causar\nquemaduras."
    ko: "큰대자의 불꽃으로\n상대를 불태운다.\n화상 상태로 만들 때가 있다."
    zh_simp: "用大字形状的火焰烧尽对手。\n有时会让对手陷入灼伤状态。"
    zh_trad: "用大字形狀的火焰燒盡對手。\n有時會讓對手陷入灼傷狀態。"
tm039:
  names:
    jp_kana: わざマシン３９
    jp_kanji: わざマシン３９
    en: TM39
    fr: CT39
    it: MT39
    de: TM39
    es: MT39
    ko: 기술머신39
    zh_simp: 招式学习器３９
    zh_trad: 招式學習器３９
  descriptions:
    jp_kana: "がんせきを　なげつけて　こうげきする。\nあいての　うごきを　ふうじることで\nすばやさを　さげる。"
    jp_kanji: "岩石を　投げつけて　攻撃する。\n相手の　動きを　封じることで\n素早さを　さげる。"
    en: "Boulders are hurled at the target. This also lowers\nthe target’s Speed stat by preventing its movement."
    fr: "Des rochers frappent l’ennemi.\nRéduit aussi sa Vitesse."
    it: "Colpisce il bersaglio con rocce. Inoltre, lo ostacola\nriducendone la Velocità."
    de: "Angriff mit Felsen. Bei Erfolg wird der Initiative-Wert\ndes Zieles gesenkt."
    es: "Tira rocas que detienen al objetivo y bajan su\nVelocidad."
    ko: "암석을 내던져서 공격한다.\n상대의 움직임을 봉인함으로써\n스피드를 떨어뜨린다."
    zh_simp: "投掷岩石进行攻击。\n封住对手的行动，\n从而降低速度。"
    zh_trad: "投擲岩石進行攻擊。\n封住對手的行動，\n進而降低其速度。"
tm040:
  names:
    jp_kana: わざマシン４０
    jp_kanji: わざマシン４０
    en: TM40
    fr: CT40
    it: MT40
    de: TM40
    es: MT40
    ko: 기술머신40
    zh_simp: 招式学习器４０
    zh_trad: 招式學習器４０
  descriptions:
    jp_kana: "すばやい　うごきで\nあいてを　ほんろうして　きりつける。\nこうげきは　かならず　めいちゅう　する。"
    jp_kanji: "素早い　動きで\n相手を　ほんろうして　切りつける。\n攻撃は　必ず　命中する。"
    en: "The user confounds the target with speed, then\nslashes. This attack never misses."
    fr: "Le lanceur prend l’ennemi de vitesse et le lacère.\nN’échoue jamais."
    it: "Chi la usa attacca il bersaglio a grande velocità.\nQuesto attacco è infallibile."
    de: "Eine extrem schnelle Attacke, der das Ziel nicht\nausweichen kann."
    es: El usuario lanza un ataque muy rápido e ineludible.
    ko: "재빠른 움직임으로\n상대를 농락해 벤다.\n공격은 반드시 명중한다."
    zh_simp: "以敏捷的动作\n戏弄对手后进行切斩。\n攻击必定会命中。"
    zh_trad: "以敏捷的動作\n戲弄對手後進行切斬。\n攻擊必定會命中。"
tm041:
  names:
    jp_kana: わざマシン４１
    jp_kanji: わざマシン４１
    en: TM41
    fr: CT41
    it: MT41
    de: TM41
    es: MT41
    ko: 기술머신41
    zh_simp: 招式学习器４１
    zh_trad: 招式學習器４１
  descriptions:
    jp_kana: "あいてに　いちゃもんを　つけて\nおなじ　わざを　２かい　れんぞくで\nだせなくする。"
    jp_kanji: "相手に　いちゃもんを　つけて\n同じ　技を　２回連続で\nだせなくする。"
    en: "The user torments and enrages the target, making it\nincapable of using the same move twice in a row."
    fr: "Le lanceur irrite l’ennemi pour l’empêcher d’utiliser\nla même capacité deux fois de suite."
    it: "Chi la usa tormenta e fa infuriare il bersaglio,\nimpedendogli di usare la stessa mossa\ndue volte di seguito."
    de: "Erzürnt das Ziel, um wiederholten Einsatz derselben\nAttacke zu verhindern."
    es: "Atormenta y enfurece al objetivo, que no puede usar\ndos veces seguidas el mismo movimiento."
    ko: "상대에게 트집을 잡아서\n똑같은 기술을 2회 연속으로\n쓸 수 없게 한다."
    zh_simp: "向对手无理取闹，\n令其不能连续２次\n使出相同招式。"
    zh_trad: "無理取鬧，\n讓對手不能連續２次\n使出相同招式。"
tm042:
  names:
    jp_kana: わざマシン４２
    jp_kanji: わざマシン４２
    en: TM42
    fr: CT42
    it: MT42
    de: TM42
    es: MT42
    ko: 기술머신42
    zh_simp: 招式学习器４２
    zh_trad: 招式學習器４２
  descriptions:
    jp_kana: "じぶんが　どく　まひ　やけど\nじょうたいの　とき　あいてに　くりだすと\nわざの　いりょくが　２ばいに　なる。"
    jp_kanji: "自分が　毒　まひ　やけど\n状態のとき　相手に　くりだすと\n技の　威力が　２倍に　なる。"
    en: "This attack move doubles its power if the user is\npoisoned, burned, or paralyzed."
    fr: "Une attaque dont la puissance double lorsque\nle lanceur est empoisonné, paralysé ou brûlé."
    it: "Mossa d’attacco che raddoppia la potenza\nse chi la usa è scottato, avvelenato o paralizzato."
    de: "Ist der Anwender vergiftet, paralysiert oder leidet er\nunter Verbrennungen, verdoppelt sich die Kraft der\nAttacke."
    es: "Si el usuario está quemado, paralizado o envenenado,\nataca con el doble de potencia."
    ko: "자신이 독, 마비, 화상\n상태일 때 날리면\n기술의 위력이 2배가 된다."
    zh_simp: "当自己处于中毒、麻痹、灼伤状态时，\n向对手使出此招式的话，\n威力会变成２倍。"
    zh_trad: "當自己陷入中毒、麻痺、灼傷等\n狀態時，向對手使用此招式，\n威力會變成２倍。"
tm043:
  names:
    jp_kana: わざマシン４３
    jp_kanji: わざマシン４３
    en: TM43
    fr: CT43
    it: MT43
    de: TM43
    es: MT43
    ko: 기술머신43
    zh_simp: 招式学习器４３
    zh_trad: 招式學習器４３
  descriptions:
    jp_kana: "こうげき　したあと\nものすごい　スピードで　もどってきて\nひかえ　ポケモンと　いれかわる。"
    jp_kanji: "攻撃したあと\nものすごい　スピードで　もどってきて\n控えポケモンと　入れ替わる。"
    en: "After making its attack, the user rushes back to\nswitch places with a party Pokémon in waiting."
    fr: "Après son attaque, le lanceur revient à toute vitesse\net change de place avec un Pokémon de l’équipe\nprêt au combat."
    it: "Chi usa questa mossa si tira indietro per farsi\nsostituire dopo aver sferrato l’attacco."
    de: "Nach der Attacke eilt der Anwender zurück und\ntauscht den Platz mit einem anderen Pokémon."
    es: "Tras atacar, el usuario vuelve a toda prisa para dar paso\na otro Pokémon del equipo."
    ko: "공격한 뒤\n굉장한 스피드로 돌아와서\n교대 포켓몬과 교체한다."
    zh_simp: "在攻击之后急速返回，\n和后备宝可梦进行替换。"
    zh_trad: "攻擊後迅速返回，\n和後備寶可夢進行替換。"
tm044:
  names:
    jp_kana: わざマシン４４
    jp_kanji: わざマシン４４
    en: TM44
    fr: CT44
    it: MT44
    de: TM44
    es: MT44
    ko: 기술머신44
    zh_simp: 招式学习器４４
    zh_trad: 招式學習器４４
  descriptions:
    jp_kana: "２ターンの　あいだ　ねむり　つづける。\nじぶんの　ＨＰと　じょうたいいじょうを\nすべて　かいふく　する。"
    jp_kanji: "２ターンの　間　眠り続ける。\n自分の　ＨＰと　状態異常を\nすべて　回復する。"
    en: "The user goes to sleep for two turns. This fully\nrestores the user’s HP and heals any\nstatus conditions."
    fr: "Le lanceur regagne tous ses PV et soigne ses altérations\nde statut, puis il dort pendant deux tours."
    it: "Chi la usa recupera tutti i PS e guarisce da tutti\ni suoi problemi di stato, ma dorme per due turni."
    de: "Anwender wird vollkommen geheilt, von allen\nStatusproblemen befreit und schläft die folgenden\nzwei Runden."
    es: "Restaura todos los PS y cura todos los problemas de\nestado del usuario, que se duerme los dos turnos\nsiguientes."
    ko: "2턴 동안 계속 잠잔다.\n자신의 HP와 상태 이상을\n모두 회복한다."
    zh_simp: "连续睡上２回合。\n回复自己的全部ＨＰ\n以及治愈所有异常状态。"
    zh_trad: "連續睡２回合。\n回復自己的全部ＨＰ\n以及治癒所有異常狀態。"
tm045:
  names:
    jp_kana: わざマシン４５
    jp_kanji: わざマシン４５
    en: TM45
    fr: CT45
    it: MT45
    de: TM45
    es: MT45
    ko: 기술머신45
    zh_simp: 招式学习器４５
    zh_trad: 招式學習器４５
  descriptions:
    jp_kana: "♂なら♀を　♀なら♂を　ゆうわくして\nメロメロに　する。\nあいては　わざが　だしにくく　なる。"
    jp_kanji: "♂なら♀を　♀なら♂を　誘惑して\nメロメロに　する。\n相手は　技が　だしにくくなる。"
    en: "If it is the opposite gender of the user, the target\nbecomes infatuated and less likely to attack."
    fr: "Si l’ennemi est du sexe opposé, il tombe amoureux\net rechigne alors à attaquer."
    it: "Se il bersaglio è del sesso opposto, s’infatua\ne diventa riluttante ad attaccare."
    de: "Wenn das Ziel nicht dem Geschlecht des Anwenders\nangehört, fühlt es sich zu ihm hingezogen und greift\neventuell nicht an."
    es: "Si el objetivo es del sexo opuesto, se enamorará y\nbajará la posibilidad de que ataque."
    ko: "수컷은 암컷을 암컷은 수컷을 유혹하여\n헤롱헤롱하게 만든다.\n상대가 기술을 쓰기 어려워진다."
    zh_simp: "♂诱惑♀或♀诱惑♂，\n让对手着迷。\n对手将很难使出招式。"
    zh_trad: "♂誘惑♀而♀誘惑♂，\n讓對手著迷。\n對手將難以使用招式。"
tm046:
  names:
    jp_kana: わざマシン４６
    jp_kanji: わざマシン４６
    en: TM46
    fr: CT46
    it: MT46
    de: TM46
    es: MT46
    ko: 기술머신46
    zh_simp: 招式学习器４６
    zh_trad: 招式學習器４６
  descriptions:
    jp_kana: "こうげきと　どうじに　どうぐを　ぬすむ。\nじぶんが　どうぐを　もっている　ばあいは\nぬすめない。"
    jp_kanji: "攻撃と　同時に　道具を　盗む。\n自分が　道具を　持っている　場合は\n盗めない。"
    en: "The user attacks and steals the target’s held item\nsimultaneously. The user can’t steal anything if it\nalready holds an item."
    fr: "Le lanceur attaque la cible et vole son objet.\nLe lanceur ne peut rien voler s’il tient déjà un objet."
    it: "Chi la usa attacca il bersaglio e può rubargli\nlo strumento, se non ne ha già uno."
    de: "Ermöglicht es, das Item des Zieles zu stehlen, solang\nder Anwender selbst keins bei sich trägt."
    es: "El agresor ataca y le quita el objeto al objetivo siempre\ny cuando no lleve ninguno."
    ko: "공격과 동시에 도구를 훔친다.\n자신이 도구를 지니고 있을 경우에는\n훔칠 수 없다."
    zh_simp: "攻击的同时盗取道具。\n当自己携带道具时，\n不会去盗取。"
    zh_trad: "在攻擊的同時偷取道具。\n當寶可夢自己有攜帶道具時，\n則無法偷取。"
tm047:
  names:
    jp_kana: わざマシン４７
    jp_kanji: わざマシン４７
    en: TM47
    fr: CT47
    it: MT47
    de: TM47
    es: MT47
    ko: 기술머신47
    zh_simp: 招式学习器４７
    zh_trad: 招式學習器４７
  descriptions:
    jp_kana: "かたい　つばさを　あいてに　たたきつけて\nこうげきする。　じぶんの　ぼうぎょが\nあがることが　ある。"
    jp_kanji: "硬い　翼を　相手に　たたきつけて\n攻撃する。　自分の　防御が\nあがることが　ある。"
    en: "The target is hit with wings of steel. This may also\nraise the user’s Defense stat."
    fr: "Le lanceur frappe l’ennemi avec des ailes d’acier.\nPeut aussi augmenter la Défense du lanceur."
    it: "Colpisce il bersaglio con ali d’acciaio.\nPuò anche aumentare la Difesa di chi la usa."
    de: "Trifft das Ziel mit Stahlflügeln. Verteidigungs-Wert des\nAnwenders steigt eventuell."
    es: "Alas macizas que golpean al objetivo y pueden subir\nla Defensa del usuario."
    ko: "단단한 날개를 상대에게 부딪쳐서\n공격한다. 자신의 방어가\n올라갈 때가 있다."
    zh_simp: "用坚硬的翅膀敲打\n对手进行攻击。\n有时会提高自己的防御。"
    zh_trad: "用堅硬的翅膀撞擊\n對手進行攻擊。\n有時會提高自己的防禦。"
tm048:
  names:
    jp_kana: わざマシン４８
    jp_kanji: わざマシン４８
    en: TM48
    fr: CT48
    it: MT48
    de: TM48
    es: MT48
    ko: 기술머신48
    zh_simp: 招式学习器４８
    zh_trad: 招式學習器４８
  descriptions:
    jp_kana: "ちょうのうりょくで　じぶんの　とくせいと\nあいての　とくせいを　いれかえる。"
    jp_kanji: "超能力で　自分の　特性と\n相手の　特性を　入れ替える。"
    en: "The user employs its psychic power to exchange\nAbilities with the target."
    fr: "Le lanceur utilise ses pouvoirs psychiques pour échanger\nson talent avec la cible."
    it: "Chi la usa sfrutta i suoi poteri psichici per scambiare\nl’abilità con il bersaglio."
    de: Anwender tauscht seine Fähigkeit mit der des Zieles.
    es: "Usa el poder psíquico para intercambiar habilidades\ncon el objetivo."
    ko: "초능력으로 자신의 특성과\n상대의 특성을 바꾼다."
    zh_simp: "利用超能力互换\n自己和对手的特性。"
    zh_trad: "用超能力將自己和\n對手的特性互相交換。"
tm049:
  names:
    jp_kana: わざマシン４９
    jp_kanji: わざマシン４９
    en: TM49
    fr: CT49
    it: MT49
    de: TM49
    es: MT49
    ko: 기술머신49
    zh_simp: 招式学习器４９
    zh_trad: 招式學習器４９
  descriptions:
    jp_kana: "あつく　にえたぎる　みずを\nあいてに　はっしゃして　こうげきする。\nやけど　じょうたいに　することが　ある。"
    jp_kanji: "熱く　煮えたぎる　水を\n相手に　発射して　攻撃する。\nやけど状態に　することが　ある。"
    en: "The user shoots boiling hot water at its target.\nThis may also leave the target with a burn."
    fr: "L’ennemi est attaqué par un jet d’eau bouillante.\nPeut aussi le brûler."
    it: "Chi la usa attacca il bersaglio con un getto\nd’acqua bollente che può anche scottarlo."
    de: "Heizt dem Ziel mit einem Schwall siedend heißen\nKochwassers ein. Das Ziel erleidet dabei eventuell\nVerbrennungen."
    es: "Ataca arrojando agua hirviendo al objetivo. Puede\ncausar quemaduras."
    ko: "뜨겁게 끓어오르는 물을\n상대에게 발사해서 공격한다.\n화상 상태로 만들 때가 있다."
    zh_simp: "向对手喷射\n煮得翻滚的开水进行攻击。\n有时会让对手陷入灼伤状态。"
    zh_trad: "向對手噴射\n滾燙的熱水進行攻擊。\n有時會讓對手陷入灼傷狀態。"
tm050:
  names:
    jp_kana: わざマシン５０
    jp_kanji: わざマシン５０
    en: TM50
    fr: CT50
    it: MT50
    de: TM50
    es: MT50
    ko: 기술머신50
    zh_simp: 招式学习器５０
    zh_trad: 招式學習器５０
  descriptions:
    jp_kana: "フルパワーで　あいてを　こうげきする。\nつかうと　はんどうで\nじぶんの　とくこうが　がくっと　さがる。"
    jp_kanji: "フルパワーで　相手を　攻撃する。\n使うと　反動で\n自分の　特攻が　がくっと　さがる。"
    en: "The user attacks the target at full power. The attack’s\nrecoil harshly lowers the user’s Sp. Atk stat."
    fr: "Attaque l’ennemi à pleine puissance.\nLe contrecoup baisse beaucoup l’Attaque Spéciale\ndu lanceur."
    it: "Chi la usa sferra un potente attacco, ma il contraccolpo\nriduce di molto il suo Attacco Speciale."
    de: "Angriff mit voller Kraft, der den Spezial-Angriff des\nAnwenders durch den Rückstoß stark senkt."
    es: "Ataque en toda regla que baja mucho el Ataque\nEspecial de quien lo usa."
    ko: "풀 파워로 상대를 공격한다.\n쓰면 반동으로\n자신의 특수공격이 크게 떨어진다."
    zh_simp: "使出全部力量攻击对手。\n使用之后会因为反作用力，\n自己的特攻大幅降低。"
    zh_trad: "釋放全部能量攻擊對手。\n使用後因為反作用力，\n自己的特攻會大幅降低。"
tm051:
  names:
    jp_kana: わざマシン５１
    jp_kanji: わざマシン５１
    en: TM51
    fr: CT51
    it: MT51
    de: TM51
    es: MT51
    ko: 기술머신51
    zh_simp: 招式学习器５１
    zh_trad: 招式學習器５１
  descriptions:
    jp_kana: "じめんに　おりて　からだを　やすめる。\nさいだい　ＨＰの　はんぶんの\nＨＰを　かいふく　する。"
    jp_kanji: "地面に　降りて　体を　やすめる。\n最大ＨＰの　半分の\nＨＰを　回復する。"
    en: "The user lands and rests its body. This move restores\nthe user’s HP by up to half of its max HP."
    fr: "Le lanceur atterrit et se repose.\nRestaure jusqu’à la moitié de ses PV max."
    it: "Chi la usa sta fermo e riposa, recuperando metà\ndei propri PS massimi."
    de: "Anwender landet und ruht sich aus. KP des Anwenders\nwerden um 50 % der maximalen KP aufgefüllt."
    es: "Aterriza sobre la superficie para descansar.\nRecupera hasta la mitad del total de sus PS."
    ko: "땅에 내려와 몸을 쉬게 한다.\n최대 HP의 절반만큼\nHP를 회복한다."
    zh_simp: "降到地面，使身体休息。\n回复自己最大ＨＰ的一半。"
    zh_trad: "降落到地面，讓身體休息。\n回復自己最大ＨＰ的一半。"
tm052:
  names:
    jp_kana: わざマシン５２
    jp_kanji: わざマシン５２
    en: TM52
    fr: CT52
    it: MT52
    de: TM52
    es: MT52
    ko: 기술머신52
    zh_simp: 招式学习器５２
    zh_trad: 招式學習器５２
  descriptions:
    jp_kana: "きあいを　たかめて　こんしんの　ちからを\nほうしゅつする。あいての　とくぼうを\nさげることが　ある。"
    jp_kanji: "気合を　高めて\nありったけの　力を　放出する。\n相手の　特防を　さげることが　ある。"
    en: "The user heightens its mental focus and unleashes\nits power. This may also lower the target’s\nSp. Def stat."
    fr: "Le lanceur rassemble ses forces et laisse éclater\nson pouvoir. Peut aussi baisser la Défense Spéciale\nde l’ennemi."
    it: "Chi la usa si concentra e rilascia la sua forza.\nPuò ridurre la Difesa Speciale del Pokémon colpito."
    de: "Anwender erhöht seinen mentalen Fokus und greift\ndann an. Senkt eventuell Spezial-Verteidigung des\nZieles."
    es: "Agudiza la concentración mental y libera su poder.\nPuede disminuir la Defensa Especial del objetivo."
    ko: "기합을 높여서\n혼신의 힘을 방출한다. 상대의\n특수방어를 떨어뜨릴 때가 있다."
    zh_simp: "提高气势，\n释放出全部力量。\n有时会降低对手的特防。"
    zh_trad: "提高氣勢，\n釋放全身所有力量。\n有時會降低對手的特防。"
tm053:
  names:
    jp_kana: わざマシン５３
    jp_kanji: わざマシン５３
    en: TM53
    fr: CT53
    it: MT53
    de: TM53
    es: MT53
    ko: 기술머신53
    zh_simp: 招式学习器５３
    zh_trad: 招式學習器５３
  descriptions:
    jp_kana: "しぜんから　あつめた\nいのちの　ちからを　はっしゃする。\nあいての　とくぼうを　さげることがある。"
    jp_kanji: "自然から　集めた\n命の力を　発射する。\n相手の　特防を　さげることがある。"
    en: "The user draws power from nature and fires it at the\ntarget. This may also lower the target’s Sp. Def stat."
    fr: "Utilise les pouvoirs de la nature pour attaquer l’ennemi.\nPeut aussi baisser sa Défense Spéciale."
    it: "Chi la usa attinge energia dalla natura e la scaglia\ncontro il bersaglio, la cui Difesa Speciale può diminuire."
    de: "Anwender zieht Kraft aus der Natur und feuert sie auf\ndas Ziel. Senkt eventuell Spezial-Verteidigung des\nZieles."
    es: "Aúna fuerzas de la naturaleza y libera su ataque.\nPuede disminuir la Defensa Especial del objetivo."
    ko: "자연으로부터 모은\n생명의 힘을 발사한다.\n상대의 특수방어를 떨어뜨릴 때가 있다."
    zh_simp: "发射从自然收集的生命力量。\n有时会降低对手的特防。"
    zh_trad: "發射從大自然匯聚而來的生命力量。\n有時會降低對手的特防。"
tm054:
  names:
    jp_kana: わざマシン５４
    jp_kanji: わざマシン５４
    en: TM54
    fr: CT54
    it: MT54
    de: TM54
    es: MT54
    ko: 기술머신54
    zh_simp: 招式学习器５４
    zh_trad: 招式學習器５４
  descriptions:
    jp_kana: "あいての　ＨＰが\nかならず　１だけ　のこる　ように\nてかげん　して　こうげきする。"
    jp_kanji: "相手の　ＨＰが\n必ず　１だけ　残るように\n手加減して　攻撃する。"
    en: "A restrained attack that prevents the target from\nfainting. The target is left with at least 1 HP."
    fr: "Le lanceur retient ses coups pour que l’ennemi\ngarde au moins 1 PV et ne tombe pas K.O."
    it: "Chi la usa attenua il colpo per impedire al bersaglio\ndi andare KO, lasciandolo con almeno un PS."
    de: Ein Angriff, der dem Ziel zumindest 1 KP lässt.
    es: "Ataque moderado que no debilita al objetivo y le deja\nal menos 1 PS."
    ko: "상대의 HP가\n반드시 1만 남도록\n조절하여 공격한다."
    zh_simp: "对手的ＨＰ\n至少会留下１ＨＰ，\n如此般手下留情地攻击。"
    zh_trad: "手下留情地攻擊對手，\n一定會讓對手剩下１ＨＰ。"
tm055:
  names:
    jp_kana: わざマシン５５
    jp_kanji: わざマシン５５
    en: TM55
    fr: CT55
    it: MT55
    de: TM55
    es: MT55
    ko: 기술머신55
    zh_simp: 招式学习器５５
    zh_trad: 招式學習器５５
  descriptions:
    jp_kana: "あいてが　ＨＰの　はんぶん　くらい\nきずを　おっていると　わざの　いりょくが\n２ばいに　なる。"
    jp_kanji: "相手が　ＨＰの　半分くらい\nきずを　おっていると　技の　威力が\n２倍に　なる。"
    en: "If the target’s HP is half or less, this attack will hit\nwith double the power."
    fr: "Cette attaque est deux fois plus puissante lorsque\nl’ennemi a moins de la moitié de ses PV."
    it: "Se i PS del bersaglio sono scesi a metà o meno,\nquesta mossa colpirà con il doppio della potenza."
    de: "Hat das Ziel die Hälfte oder weniger seiner maximalen\nKP, trifft diese Attacke mit doppelter Kraft."
    es: "Si al objetivo le queda la mitad o menos de sus PS, el\nataque será el doble de fuerte."
    ko: "상대가 HP의 절반 정도\n상처를 입고 있으면 기술의\n위력이 2배가 된다."
    zh_simp: "当对手的ＨＰ\n负伤到一半左右时，\n招式威力会变成２倍。"
    zh_trad: "當對手負傷，\nＨＰ剩一半左右時，\n招式威力會變成２倍。"
tm056:
  names:
    jp_kana: わざマシン５６
    jp_kanji: わざマシン５６
    en: TM56
    fr: CT56
    it: MT56
    de: TM56
    es: MT56
    ko: 기술머신56
    zh_simp: 招式学习器５６
    zh_trad: 招式學習器５６
  descriptions:
    jp_kana: "もたせた　どうぐを\nすばやく　なげつけて　こうげきする。\nどうぐで　いりょくと　こうかが　かわる。"
    jp_kanji: "持たせた　道具を\n素早く　投げつけて　攻撃する。\n道具で　威力と　効果が　変わる。"
    en: "The user flings its held item at the target to attack.\nThis move’s power and effects depend on the item."
    fr: "Le lanceur envoie l’objet qu’il tient sur l’ennemi.\nLa puissance et les effets dépendent de l’objet."
    it: "Chi la usa lancia il suo strumento addosso al bersaglio.\nLa forza e l’effetto dipendono dallo strumento."
    de: "Anwender schleudert sein Item auf das Ziel. Stärke und\nEffekt der Attacke hängen vom Item ab."
    es: "El usuario lanza contra el objetivo el objeto que lleva.\nLa fuerza del ataque y su efecto varían según el objeto."
    ko: "지니게 한 도구를\n재빠르게 내던져서 공격한다.\n도구에 따라 위력과 효과가 바뀐다."
    zh_simp: "快速投掷携带的道具进行攻击。\n根据道具不同，\n威力和效果会改变。"
    zh_trad: "快速投擲攜帶的道具進行攻擊。\n招式威力和效果會隨著\n道具不同而改變。"
tm057:
  names:
    jp_kana: わざマシン５７
    jp_kanji: わざマシン５７
    en: TM57
    fr: CT57
    it: MT57
    de: TM57
    es: MT57
    ko: 기술머신57
    zh_simp: 招式学习器５７
    zh_trad: 招式學習器５７
  descriptions:
    jp_kana: "でんげきの　たばを　あいてに\nはっしゃする。でんきを　ためて　じぶんの\nとくこうを　あげることが　ある。"
    jp_kanji: "電撃の　束を　相手に\n発射する。電気を　ためて　自分の\n特攻を　あげることが　ある。"
    en: "The user attacks the target with an electric charge.\nThe user may use any remaining electricity to raise its\nSp. Atk stat."
    fr: "Le lanceur tire un rayon chargé d’électricité.\nPeut aussi augmenter son Attaque Spéciale."
    it: "Chi la usa lancia un fascio di elettricità molto intensa.\nPuò anche aumentare il suo Attacco Speciale."
    de: "Ziel wird von einem Elektrostrahl getroffen. Erhöht\neventuell Spezial-Angriff des Anwenders."
    es: "Lanza un rayo eléctrico contra el objetivo. Puede subir\nel Ataque Especial de quien lo usa."
    ko: "전격의 다발을 상대에게\n발사한다. 전기를 모아서 자신의\n특수공격을 올릴 때가 있다."
    zh_simp: "向对手发射电击光束。\n由于蓄满电流，\n有时会提高自己的特攻。"
    zh_trad: "向對手發射電擊光束。\n有時會因電流蓄積，\n提高自己的特攻。"
tm058:
  names:
    jp_kana: わざマシン５８
    jp_kanji: わざマシン５８
    en: TM58
    fr: CT58
    it: MT58
    de: TM58
    es: MT58
    ko: 기술머신58
    zh_simp: 招式学习器５８
    zh_trad: 招式學習器５８
  descriptions:
    jp_kana: "こうげきを　うけても\nＨＰを　かならず　１だけ　のこせる。\nれんぞくで　だすと　しっぱい　しやすい。"
    jp_kanji: "攻撃を　受けても\nＨＰを　必ず　１だけ　残せる。\n連続で　だすと　失敗しやすい。"
    en: "The user endures any attack with at least 1 HP.\nIts chance of failing rises if it is used in succession."
    fr: "Le lanceur résiste aux attaques avec 1 PV.\nPeut échouer si utilisée plusieurs fois de suite."
    it: "Chi la usa resta con un PS anche se subisce un colpo\nda KO in quel turno. Usata in successione può fallire."
    de: "Nach fatalen Attacken bleibt stets 1 KP übrig.\nMisserfolg bei Wiederholung möglich."
    es: "Resiste cualquier ataque y deja al menos 1 PS.\nPuede fallar si se usa repetidamente."
    ko: "공격을 받아도\nHP를 반드시 1만큼은 남긴다.\n연속으로 쓰면 실패하기 쉽다."
    zh_simp: "即使受到攻击，\n也至少会留下１ＨＰ。\n连续使出则容易失败。"
    zh_trad: "即使受到再強烈的攻擊，\n也一定會剩下１ＨＰ。\n連續使用時容易失敗。"
tm059:
  names:
    jp_kana: わざマシン５９
    jp_kanji: わざマシン５９
    en: TM59
    fr: CT59
    it: MT59
    de: TM59
    es: MT59
    ko: 기술머신59
    zh_simp: 招式学习器５９
    zh_trad: 招式學習器５９
  descriptions:
    jp_kana: "おおきな　くちから　しょうげきはを\nまきおこして　あいてを　こうげきする。"
    jp_kanji: "大きな　口から　衝撃波を\nまきおこして　相手を　攻撃する。"
    en: "The target is attacked with a shock wave generated\nby the user’s gaping mouth."
    fr: "Le lanceur ouvre la bouche pour envoyer\nune onde de choc qui frappe l’ennemi."
    it: "Chi la usa spalanca la bocca e genera un’onda\nd’urto che colpisce il bersaglio."
    de: "Das Ziel wird mit einer Schockwelle angegriffen,\ndie aus dem offenen Maul des Anwenders kommt."
    es: "Abre mucho la boca y libera una onda de choque que\nataca al objetivo."
    ko: "큰 입으로 충격파를\n일으켜서 상대를 공격한다."
    zh_simp: "从大大的口中\n掀起冲击波攻击对手。"
    zh_trad: "從張大的口中\n發射衝擊波攻擊對手。"
tm060:
  names:
    jp_kana: わざマシン６０
    jp_kanji: わざマシン６０
    en: TM60
    fr: CT60
    it: MT60
    de: TM60
    es: MT60
    ko: 기술머신60
    zh_simp: 招式学习器６０
    zh_trad: 招式學習器６０
  descriptions:
    jp_kana: "こぶしから　あいての　ちからを\nすいとる。　あたえた　ダメージの\nはんぶんの　ＨＰを　かいふく　できる。"
    jp_kanji: "こぶしから　相手の　力を　吸い取る。\n与えた　ダメージの\n半分の　ＨＰを　回復できる。"
    en: "An energy-draining punch. The user’s HP is restored\nby half the damage taken by the target."
    fr: "Un coup de poing qui draine l’énergie.\nConvertit la moitié des dégâts infligés en PV\npour le lanceur."
    it: "Pugno che assorbe energia. Fa recuperare una quantità\ndi PS pari alla metà del danno inferto."
    de: "Entzieht dem Ziel Energie. Die Hälfte des Schadens\nwird den KP des Anwenders zugerechnet."
    es: "Un golpe que drena energía. El Pokémon recupera la\nmitad de los PS arrebatados al objetivo."
    ko: "주먹으로 상대의 힘을 흡수한다.\n입힌 데미지의 절반에\n해당하는 HP를 회복할 수 있다."
    zh_simp: "用拳头吸取对手的力量。\n可以回复给予对手\n伤害的一半ＨＰ。"
    zh_trad: "從拳頭吸取對手的力量。\n可以回復給予對手\n傷害的一半ＨＰ。"
tm061:
  names:
    jp_kana: わざマシン６１
    jp_kanji: わざマシン６１
    en: TM61
    fr: CT61
    it: MT61
    de: TM61
    es: MT61
    ko: 기술머신61
    zh_simp: 招式学习器６１
    zh_trad: 招式學習器６１
  descriptions:
    jp_kana: "ぶきみで　あやしい　ほのおを　はなって\nあいてを　やけどの　じょうたいに　する。"
    jp_kanji: "不気味で　怪しい　炎を　放って\n相手を　やけどの　状態に　する。"
    en: "The user shoots a sinister flame at the target to inflict\na burn."
    fr: "Lance un bouquet de flammes maléfiques à l’ennemi\npour lui infliger une brûlure."
    it: "Fiamme sinistre e misteriose causano una scottatura\nal bersaglio."
    de: "Anwender feuert unheimliche Flammen ab, die beim\nZiel Verbrennungen verursachen."
    es: Siniestra llama morada que produce quemaduras.
    ko: "으스스하고 괴상한 불꽃을 쏘아\n상대를 화상 상태로 만든다."
    zh_simp: "放出怪异的火焰，\n从而让对手陷入灼伤状态。"
    zh_trad: "放出詭異的火焰，\n讓對手陷入灼傷狀態。"
tm062:
  names:
    jp_kana: わざマシン６２
    jp_kanji: わざマシン６２
    en: TM62
    fr: CT62
    it: MT62
    de: TM62
    es: MT62
    ko: 기술머신62
    zh_simp: 招式学习器６２
    zh_trad: 招式學習器６２
  descriptions:
    jp_kana: "しんどうで　おんぱを　おこして\nこうげきする。あいての　とくぼうを\nさげることが　ある。"
    jp_kanji: "振動で　音波を　おこして\n攻撃する。相手の　特防を\nさげることが　ある。"
    en: "The user generates a damaging sound wave by\nvibration. This may also lower the target’s\nSp. Def stat."
    fr: "Le lanceur fait vibrer son corps pour lancer une vague\nsonique. Peut aussi baisser la Défense Spéciale\nde l’ennemi."
    it: "Chi la usa crea un’onda sonora che infligge danni.\nPuò anche ridurre la Difesa Speciale del bersaglio."
    de: "Anwender erzeugt Schallwellen, die beim Ziel Schaden\nverursachen und eventuell dessen Spezial-Verteidigung\nsenken."
    es: "El usuario crea una onda sónica dañina moviendo\nsu cuerpo que también puede disminuir la Defensa\nEspecial del objetivo."
    ko: "진동으로 음파를 일으켜서\n공격한다. 상대의 특수방어를\n떨어뜨릴 때가 있다."
    zh_simp: "利用振动发出音波进行攻击。\n有时会降低对手的特防。"
    zh_trad: "利用振動產生出的音波進行攻擊。\n有時會降低對手的特防。"
tm063:
  names:
    jp_kana: わざマシン６３
    jp_kanji: わざマシン６３
    en: TM63
    fr: CT63
    it: MT63
    de: TM63
    es: MT63
    ko: 기술머신63
    zh_simp: 招式学习器６３
    zh_trad: 招式學習器６３
  descriptions:
    jp_kana: "わるいことを　かんがえて\nあたまを　かっせいか　させる。\nじぶんの　とくこうを　ぐーんと　あげる。"
    jp_kanji: "悪いことを　考えて\n頭を　活性化させる。\n自分の　特攻を　ぐーんと　あげる。"
    en: "The user stimulates its brain by thinking bad\nthoughts. This sharply raises the user’s Sp. Atk stat."
    fr: "Stimule l’esprit par de mauvaises pensées.\nAugmente beaucoup l’Attaque Spéciale du lanceur."
    it: "Chi la usa stimola il cervello pensando a cose cattive.\nAumenta di molto l’Attacco Speciale."
    de: "Anwender stimuliert sein Gehirn und hat finstere\nGedanken. Erhöht Spezial-Angriff stark."
    es: "Estimula su cerebro pensando en cosas malas.\nAumenta mucho el Ataque Especial."
    ko: "나쁜 일을 생각해서\n머리를 활성화시킨다.\n자신의 특수공격을 크게 올린다."
    zh_simp: "谋划诡计，激活头脑。\n大幅提高自己的特攻。"
    zh_trad: "動歪腦筋，活化大腦。\n大幅提高自己的特攻。"
tm064:
  names:
    jp_kana: わざマシン６４
    jp_kanji: わざマシン６４
    en: TM64
    fr: CT64
    it: MT64
    de: TM64
    es: MT64
    ko: 기술머신64
    zh_simp: 招式学习器６４
    zh_trad: 招式學習器６４
  descriptions:
    jp_kana: "おおきな　ばくはつで　じぶんの\nまわりに　いるものを　こうげきする。\nつかった　あとに　ひんしに　なる。"
    jp_kanji: "大きな　爆発で　自分の\n周りに　いるものを　攻撃する。\n使ったあとに　ひんしに　なる。"
    en: "The user attacks everything around it by causing a\ntremendous explosion. The user faints upon using\nthis move."
    fr: "Le lanceur explose et inflige des dégâts à tous\nles Pokémon autour de lui. Met K.O. le lanceur."
    it: "Chi la usa esplode per infliggere danni agli altri\nPokémon attorno, ma va KO."
    de: "Anwender explodiert, richtet bei allen Pokémon\nim Umkreis großen Schaden an und wird selbst\nkampfunfähig."
    es: "El atacante causa una grandísima explosión y hiere\na todos a su alrededor. El usuario se debilita de\ninmediato."
    ko: "큰 폭발로 자신의\n주위에 있는 포켓몬을 공격한다.\n쓰고 나서는 기절한다."
    zh_simp: "引发大爆炸，\n攻击自己周围所有的宝可梦。\n使用后自己会陷入昏厥。"
    zh_trad: "引起大爆炸，\n攻擊自己周圍所有的寶可夢。\n使用後自己會陷入瀕死。"
tm065:
  names:
    jp_kana: わざマシン６５
    jp_kanji: わざマシン６５
    en: TM65
    fr: CT65
    it: MT65
    de: TM65
    es: MT65
    ko: 기술머신65
    zh_simp: 招式学习器６５
    zh_trad: 招式學習器６５
  descriptions:
    jp_kana: "かげから　つくった　するどい　ツメで\nあいてを　きりさく。\nきゅうしょに　あたりやすい。"
    jp_kanji: "影から　つくった　鋭い　ツメで\n相手を　切り裂く。\n急所に　当たりやすい。"
    en: "The user slashes with a sharp claw made from\nshadows. Critical hits land more easily."
    fr: "Attaque avec une griffe puissante faite d’ombres.\nTaux de critiques élevé."
    it: "Chi la usa attacca con artigli d’ombra che colpiscono\ncon gran forza. Probabile brutto colpo."
    de: "Greift das Ziel mit einer scharfen Klaue aus Schatten an.\nHohe Volltrefferquote."
    es: "Ataca con una garra afilada hecha de sombras.\nSuele ser crítico."
    ko: "그림자로 만든 날카로운 발톱으로\n상대를 베어 가른다.\n급소에 맞기 쉽다."
    zh_simp: "以影子做成的锐爪，\n劈开对手。\n容易击中要害。"
    zh_trad: "用黑影化成的銳利爪子\n撕裂對手。\n容易擊中要害。"
tm066:
  names:
    jp_kana: わざマシン６６
    jp_kanji: わざマシン６６
    en: TM66
    fr: CT66
    it: MT66
    de: TM66
    es: MT66
    ko: 기술머신66
    zh_simp: 招式学习器６６
    zh_trad: 招式學習器６６
  descriptions:
    jp_kana: "ためこんで　こうげきする。\nあいてより　あとに　こうげき　できると\nわざの　いりょくは　２ばいに　なる。"
    jp_kanji: "ためこんで　攻撃する。\n相手より　あとに　攻撃できると\n技の　威力は　２倍に　なる。"
    en: "The user stores power, then attacks. If the user\nmoves after the target, this attack’s power will\nbe doubled."
    fr: "Le lanceur concentre son énergie puis attaque.\nLa puissance de cette capacité est doublée si\nle lanceur agit après l’ennemi."
    it: "Chi la usa accumula forza, poi attacca. La potenza\nraddoppia se il Pokémon agisce dopo il bersaglio."
    de: "Der Anwender lädt die Attacke auf. Handelt das Ziel vor\ndem Anwender, verdoppelt sich die Stärke der Attacke."
    es: "El usuario contraataca con el doble de fuerza si el\nobjetivo usa un movimiento antes."
    ko: "모아서 공격한다.\n상대보다 나중에 공격할 수 있으면\n기술의 위력은 2배가 된다."
    zh_simp: "蓄力攻击。\n如果能在对手之后攻击，\n招式的威力会变成２倍。"
    zh_trad: "累積力量進行攻擊。\n若在對手之後進行攻擊，\n招式的威力會變成２倍。"
tm067:
  names:
    jp_kana: わざマシン６７
    jp_kanji: わざマシン６７
    en: TM67
    fr: CT67
    it: MT67
    de: TM67
    es: MT67
    ko: 기술머신67
    zh_simp: 招式学习器６７
    zh_trad: 招式學習器６７
  descriptions:
    jp_kana: "せんとうちゅうに　つかって　なくなった\nじぶんの　もちものを　さいせい　させて\nつかえるように　する。"
    jp_kanji: "戦闘中に　使って　なくなった\n自分の　持ち物を　再生させて\n使えるように　する。"
    en: "The user recycles a held item that has been used in\nbattle so it can be used again."
    fr: "Recycle un objet tenu à usage unique déjà utilisé\nlors du combat pour pouvoir l’utiliser à nouveau."
    it: "Chi la usa ricicla uno strumento che ha usato\nnella lotta e può riutilizzarlo."
    de: "Recycling eines getragenen Items, das zuvor im Kampf\nverwendet wurde."
    es: "Recicla y así recupera un objeto equipado de un solo\nuso que ya haya sido empleado durante el combate."
    ko: "배틀 중에 사용하여 없어진\n자신의 지닌 물건을 재생시켜\n사용할 수 있게 한다."
    zh_simp: "使战斗中已经消耗掉的\n自己的持有物再生，\n并可以再次使用。"
    zh_trad: "將在戰鬥中已消耗完的\n寶可夢持有物回收後，\n回復成可以使用的狀態。"
tm068:
  names:
    jp_kana: わざマシン６８
    jp_kanji: わざマシン６８
    en: TM68
    fr: CT68
    it: MT68
    de: TM68
    es: MT68
    ko: 기술머신68
    zh_simp: 招式学习器６８
    zh_trad: 招式學習器６８
  descriptions:
    jp_kana: "もてる　ちからを　すべて　つかって\nあいてに　とつげきする。\nつぎの　ターンは　うごけなく　なる。"
    jp_kanji: "持てる　力を　すべて　使って\n相手に　突撃する。\n次の　ターンは　動けなくなる。"
    en: "The user charges at the target using every bit of its\npower. The user can’t move on the next turn."
    fr: "Le lanceur charge l’ennemi de toute sa puissance\net doit ensuite se reposer au tour suivant."
    it: "Chi la usa carica il bersaglio usando tutta la sua forza,\nma al turno successivo deve riposarsi."
    de: "Anwender rennt mit seiner ganzen Kraft gegen das\nZiel an und muss dann eine Runde ruhen."
    es: "El usuario carga contra el objetivo con toda la fuerza\nque tiene y descansa durante el siguiente turno."
    ko: "가진 힘을 모두 사용해서\n상대에게 돌격한다.\n다음 턴은 움직일 수 없다."
    zh_simp: "使出自己浑身力量突击对手。\n下一回合自己将无法动弹。"
    zh_trad: "使出全身上下所有力量突擊對手。\n下一回合自己將無法動彈。"
tm069:
  names:
    jp_kana: わざマシン６９
    jp_kanji: わざマシン６９
    en: TM69
    fr: CT69
    it: MT69
    de: TM69
    es: MT69
    ko: 기술머신69
    zh_simp: 招式学习器６９
    zh_trad: 招式學習器６９
  descriptions:
    jp_kana: "じぶんの　からだを　みがいて　くうきの\nていこうを　すくなくする。すばやさを\nぐーんと　あげることが　できる。"
    jp_kanji: "自分の　体を　磨いて　空気の\n抵抗を　少なくする。素早さを\nぐーんと　あげることが　できる。"
    en: "The user polishes its body to reduce drag.\nThis sharply raises the Speed stat."
    fr: "Le lanceur polit son corps pour diminuer sa résistance\nau vent. Augmente beaucoup la Vitesse."
    it: "Chi la usa leviga il proprio corpo per ridurne l’attrito.\nAumenta di molto la Velocità."
    de: "Anwender reduziert so gut wie möglich den\nLuftwiderstand. Erhöht den Initiative-Wert stark."
    es: "Reduce la resistencia puliendo su cuerpo. Aumenta\nmucho la Velocidad."
    ko: "자신의 몸을 갈아\n공기의 저항을 적게 한다.\n스피드를 크게 올릴 수 있다."
    zh_simp: "打磨自己的身体，\n减少空气阻力。\n可以大幅提高自己的速度。"
    zh_trad: "打磨自己的身體，\n減少空氣阻力。\n可大幅提高自己的速度。"
tm070:
  names:
    jp_kana: わざマシン７０
    jp_kanji: わざマシン７０
    en: TM70
    fr: CT70
    it: MT70
    de: TM70
    es: MT70
    ko: 기술머신70
    zh_simp: 招式学习器７０
    zh_trad: 招式學習器７０
  descriptions:
    jp_kana: "ひかりで　あいての\nめいちゅうりつを　さげる。\nくらい　どうくつも　あかるく　てらせる。"
    jp_kanji: "光で　相手の\n命中率を　さげる。\n暗い　洞窟も　明るく　照らせる。"
    en: "The user flashes a light that lowers the target’s accuracy.\nIt can also be used to illuminate caves."
    fr: "Une explosion lumineuse qui baisse la Précision\nde l’ennemi.\nPermet aussi d’éclairer les grottes trop sombres."
    it: "Investe il bersaglio con una luce abbagliante\nche ne riduce la precisione. Fuori dalla lotta\nserve per illuminare le grotte."
    de: "Erzeugt helles Licht, das die Genauigkeit des Zieles\nsenkt. Erhellt dunkle Orte."
    es: "Luz cegadora que baja la Precisión del objetivo.\nTambién puede usarse para iluminar lugares oscuros."
    ko: "빛으로 상대의 명중률을 떨어뜨린다.\n어두운 동굴도 밝게 비출 수 있다."
    zh_simp: "使出光芒，从而降低对手的命中率。\n也可在阴暗的洞窟里照亮四周。"
    zh_trad: "用亮光降低對手的命中率。\n此外，還能照亮黑暗的洞窟。"
tm071:
  names:
    jp_kana: わざマシン７１
    jp_kanji: わざマシン７１
    en: TM71
    fr: CT71
    it: MT71
    de: TM71
    es: MT71
    ko: 기술머신71
    zh_simp: 招式学习器７１
    zh_trad: 招式學習器７１
  descriptions:
    jp_kana: "とがった　いわを\nあいてに　つきさして　こうげきする。\nきゅうしょに　あたりやすい。"
    jp_kanji: "とがった　岩を\n相手に　突き刺して　攻撃する。\n急所に　当たりやすい。"
    en: "The user stabs the target from below with\nsharpened stones. Critical hits land more easily."
    fr: "Fait surgir des pierres aiguisées sous l’ennemi.\nTaux de critiques élevé."
    it: "Chi la usa colpisce il bersaglio dal basso con\npietre affilate. Probabile brutto colpo."
    de: "Anwender schleudert scharfe Steine auf das Ziel.\nHohe Volltrefferquote."
    es: Clava piedras muy afiladas al objetivo. Suele ser crítico.
    ko: "뾰족한 바위를\n상대에게 꿰찔러서 공격한다.\n급소에 맞기 쉽다."
    zh_simp: "用尖尖的岩石\n刺入对手进行攻击。\n容易击中要害。"
    zh_trad: "用尖銳的岩石\n刺進對手進行攻擊。\n容易擊中要害。"
tm072:
  names:
    jp_kana: わざマシン７２
    jp_kanji: わざマシン７２
    en: TM72
    fr: CT72
    it: MT72
    de: TM72
    es: MT72
    ko: 기술머신72
    zh_simp: 招式学习器７２
    zh_trad: 招式學習器７２
  descriptions:
    jp_kana: "あいてから　わざを　うけていると\nその　あいてに　たいして\nわざの　いりょくが　２ばいに　なる。"
    jp_kanji: "相手から　技を　受けていると\nその　相手に　対して\n技の　威力が　２倍に　なる。"
    en: "The power of this attack move is doubled if the user\nhas been hurt by the target in the same turn."
    fr: "Une capacité dont la puissance est doublée si le lanceur\na été blessé par l’ennemi durant le tour."
    it: "Mossa d’attacco che infligge doppi danni se chi la usa\nè stato ferito dal Pokémon bersaglio nello stesso turno."
    de: "Wurde der Anwender in dieser Runde vom Ziel\ngetroffen, verdoppelt sich die Stärke der Attacke\nbei Angriffen auf dieses Ziel."
    es: "Este ataque inflige el doble de daño a un objetivo que\nhaya golpeado al usuario en ese mismo turno."
    ko: "상대에게 기술로 공격받으면\n그 상대에 대해서\n기술의 위력이 2배가 된다."
    zh_simp: "如果受到对手的招式攻击，\n就能给予该对手\n２倍威力的攻击。"
    zh_trad: "如果受到對手的招式攻擊，\n給予該對手的招式威力就會變成２倍。"
tm073:
  names:
    jp_kana: わざマシン７３
    jp_kanji: わざマシン７３
    en: TM73
    fr: CT73
    it: MT73
    de: TM73
    es: MT73
    ko: 기술머신73
    zh_simp: 招式学习器７３
    zh_trad: 招式學習器７３
  descriptions:
    jp_kana: "よわい　でんげきを　あびせる　ことで\nあいてを　まひ　じょうたいに　する。"
    jp_kanji: "弱い　電撃を　浴びせることで\n相手を　まひ状態に　する。"
    en: "The user launches a weak jolt of electricity that\nparalyzes the target."
    fr: "Un faible choc électrique frappe l’ennemi.\nSi l’attaque le touche, celui-ci est paralysé."
    it: "Colpisce il bersaglio con una debole scarica\nelettrica che lo paralizza."
    de: Ein schwacher Stromstoß, der das Ziel paralysiert.
    es: "Una ligera descarga que paraliza al objetivo si lo\nalcanza."
    ko: "약한 전격을 날려서\n상대를 마비 상태로 만든다."
    zh_simp: "向对手发出\n微弱的电击，\n从而让对手陷入麻痹状态。"
    zh_trad: "放出微弱的電流。\n讓對手陷入麻痺狀態。"
tm074:
  names:
    jp_kana: わざマシン７４
    jp_kanji: わざマシン７４
    en: TM74
    fr: CT74
    it: MT74
    de: TM74
    es: MT74
    ko: 기술머신74
    zh_simp: 招式学习器７４
    zh_trad: 招式學習器７４
  descriptions:
    jp_kana: "からだを　こうそくに　かいてん　させて\nたいあたりする。あいてより　すばやさが\nひくいほど　つよい。"
    jp_kanji: "体を　高速に　回転させて\n体当たりする。相手より　素早さが\n低いほど　強い。"
    en: "The user tackles the target with a high-speed spin.\nThe slower the user compared to the target, the\ngreater the move’s power."
    fr: "Le lanceur effectue une rotation et frappe l’ennemi.\nPlus la Vitesse du lanceur est basse par rapport à celle\nde sa cible, plus il inflige de dégâts."
    it: "Chi la usa si scaglia sul bersaglio facendo ruotare\nvorticosamente il proprio corpo. Più lento è chi la usa,\nmaggiore è il danno."
    de: "Angriff mit hoher Geschwindigkeit. Je niedriger die\nInitiative des Anwenders im Vergleich zum Ziel ist,\ndesto höher der Schaden."
    es: "Embiste al objetivo con un potente ataque giratorio.\nCuanto más lento es el usuario, más daño causa."
    ko: "몸을 고속으로 회전시켜\n몸통박치기한다. 상대보다 스피드가\n낮을수록 위력은 올라간다."
    zh_simp: "让身体高速旋转并撞击对手。\n速度比对手越慢，威力越大。"
    zh_trad: "高速旋轉身體，撞擊對手。\n速度比對手越慢，威力越大。"
tm075:
  names:
    jp_kana: わざマシン７５
    jp_kanji: わざマシン７５
    en: TM75
    fr: CT75
    it: MT75
    de: TM75
    es: MT75
    ko: 기술머신75
    zh_simp: 招式学习器７５
    zh_trad: 招式學習器７５
  descriptions:
    jp_kana: "たたかいのまいを　はげしく　おどって\nきあいを　たかめる。\nじぶんの　こうげきを　ぐーんと　あげる。"
    jp_kanji: "戦いの舞を　激しく　おどって\n気合を　高める。\n自分の　攻撃を　ぐーんと　あげる。"
    en: "A frenetic dance to uplift the fighting spirit.\nThis sharply raises the user’s Attack stat."
    fr: "Une danse frénétique qui exalte l’esprit combatif.\nAugmente beaucoup l’Attaque du lanceur."
    it: "Danza frenetica che incrementa lo spirito combattivo.\nChi la usa aumenta di molto il suo Attacco."
    de: "Ein wilder Tanz, der den Kampfgeist wecken soll.\nDer Angriffs-Wert des Anwenders wird stark erhöht."
    es: Baile frenético que aumenta mucho el Ataque.
    ko: "싸움의 춤을 격렬하게 춰서\n기세를 높인다.\n자신의 공격을 크게 올린다."
    zh_simp: "激烈地跳起战舞提高气势。\n大幅提高自己的攻击。"
    zh_trad: "激烈地跳起戰舞提升氣勢，\n大幅提高自己的攻擊。"
tm076:
  names:
    jp_kana: わざマシン７６
    jp_kanji: わざマシン７６
    en: TM76
    fr: CT76
    it: MT76
    de: TM76
    es: MT76
    ko: 기술머신76
    zh_simp: 招式学习器７６
    zh_trad: 招式學習器７６
  descriptions:
    jp_kana: "あいての　まわりに　むすうの　いわを\nうかべて　こうたいで　でてきた　あいての\nポケモンに　ダメージを　あたえる。"
    jp_kanji: "相手の　周りに　無数の　岩を\n浮かべて　交代で　でてきた　相手の\nポケモンに　ダメージを　与える。"
    en: "The user lays a trap of levitating stones around the\nopposing team. The trap hurts opposing Pokémon\nthat switch into battle."
    fr: "Lance des pierres flottantes autour de l’ennemi,\nqui blessent tout adversaire entrant au combat."
    it: "Chi la usa piazza una trappola di rocce sospese\nche danneggia i nemici che entrano in campo."
    de: "Der Anwender legt eine Falle aus schwebenden Steinen\naus, die gegnerische Pokémon verletzen, die in den\nKampf gerufen werden."
    es: "Una trampa de rocas que flota en el aire y daña a los\nobjetivos que entran en combate."
    ko: "상대의 주위에 무수한 바위를\n띄워 교체해서 나온 상대\n포켓몬에게 데미지를 준다."
    zh_simp: "将无数岩石悬浮在对手的周围，\n从而对替换出场的对手的\n宝可梦给予伤害。"
    zh_trad: "在對手周圍撒下無數飄浮的岩石，\n讓對手替換出場的寶可夢受到傷害。"
tm077:
  names:
    jp_kana: わざマシン７７
    jp_kanji: わざマシン７７
    en: TM77
    fr: CT77
    it: MT77
    de: TM77
    es: MT77
    ko: 기술머신77
    zh_simp: 招式学习器７７
    zh_trad: 招式學習器７７
  descriptions:
    jp_kana: "じぶんに　あんじを　かけることで\nのうりょく　へんかの　じょうたいを\nあいてと　おなじにする。"
    jp_kanji: "自分に　暗示を　かけることで\n能力変化の　状態を\n相手と　同じにする。"
    en: "The user hypnotizes itself into copying any stat\nchange made by the target."
    fr: "Une autohypnose qui permet au lanceur de copier\nles changements de stats de la cible."
    it: "Chi la usa s’ipnotizza per copiare ogni modifica\nalle statistiche del bersaglio."
    de: "Der Anwender hypnotisiert sich selbst, um die\nStatusveränderungen des Zieles zu kopieren."
    es: "Quien lo usa se sume en un trance y copia cualquier\ncambio que haya en las características de su objetivo."
    ko: "자신에게 암시를 걸어서\n능력 변화 상태를\n상대와 똑같은 상태로 만든다."
    zh_simp: "向自己施以自我暗示，\n将能力变化的状态\n变得和对手一样。"
    zh_trad: "向自己施加自我暗示，\n讓能力變化的狀態\n變得與對手相同。"
tm078:
  names:
    jp_kana: わざマシン７８
    jp_kanji: わざマシン７８
    en: TM78
    fr: CT78
    it: MT78
    de: TM78
    es: MT78
    ko: 기술머신78
    zh_simp: 招式学习器７８
    zh_trad: 招式學習器７８
  descriptions:
    jp_kana: "まくしたてる　ように　どなりつけて\nあいての　とくこうを　さげる。"
    jp_kanji: "まくしたてる　ように　怒鳴りつけて\n相手の　特攻を　さげる。"
    en: "The user yells as if it’s ranting about something,\nwhich lowers the Sp. Atk stats of opposing Pokémon."
    fr: "Le lanceur hurle sur l’ennemi.\nBaisse l’Attaque Spéciale de l’ennemi."
    it: "Chi la usa si mette a urlare per un po’, riducendo\nl’Attacco Speciale dei nemici intorno."
    de: "Wäscht gegnerischen Pokémon mit einer ausführlichen\nStandpauke den Kopf und senkt dabei deren\nSpezial-Angriff."
    es: "Chillido desagradable que baja el Ataque Especial del\nrival."
    ko: "호되게 호통을 쳐서\n상대의 특수공격을 떨어뜨린다."
    zh_simp: "没完没了地大声斥责，\n从而降低对手的特攻。"
    zh_trad: "沒完沒了地向對手大聲咆哮，\n降低對手的特攻。"
tm079:
  names:
    jp_kana: わざマシン７９
    jp_kanji: わざマシン７９
    en: TM79
    fr: CT79
    it: MT79
    de: TM79
    es: MT79
    ko: 기술머신79
    zh_simp: 招式学习器７９
    zh_trad: 招式學習器７９
  descriptions:
    jp_kana: "からだから　あくいに\nみちた　おそろしい　オーラを　はっする。\nあいてを　ひるませる　ことが　ある。"
    jp_kanji: "体から　悪意に　みちた\n恐ろしい　オーラを　発する。\n相手を　ひるませることが　ある。"
    en: "The user releases a horrible aura imbued with dark\nthoughts. This may also make the target flinch."
    fr: "Le lanceur dégage une horrible aura chargée\nde pensées maléfiques. Peut aussi apeurer l’ennemi."
    it: "Chi la usa emana un’aura impregnata di oscuri pensieri.\nPuò anche far tentennare il Pokémon colpito."
    de: "Anwender greift mit fürchterlicher Aura schlechter\nGedanken an. Ziel schreckt eventuell zurück."
    es: "Libera una horrible aura llena de malos pensamientos\nque puede amedrentar al objetivo."
    ko: "몸에서 악의로 가득한\n무서운 오라를 발한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "从体内发出\n充满恶意的恐怖气场。\n有时会使对手畏缩。"
    zh_trad: "從身體散發出\n充滿惡意的恐怖氣場。\n有時會使對手畏縮。"
tm080:
  names:
    jp_kana: わざマシン８０
    jp_kanji: わざマシン８０
    en: TM80
    fr: CT80
    it: MT80
    de: TM80
    es: MT80
    ko: 기술머신80
    zh_simp: 招式学习器８０
    zh_trad: 招式學習器８０
  descriptions:
    jp_kana: "おおきな　いわを\nはげしく　ぶつけて　こうげきする。\nあいてを　ひるませる　ことが　ある。"
    jp_kanji: "大きな　岩を\n激しく　ぶつけて　攻撃する。\n相手を　ひるませることが　ある。"
    en: "Large boulders are hurled at opposing Pokémon to\ninflict damage. This may also make the opposing\nPokémon flinch."
    fr: "Envoie de gros rochers sur l’ennemi pour infliger\ndes dégâts. Peut aussi l’apeurer."
    it: "I nemici vengono colpiti con violenza da grandi\nmassi che possono anche farli tentennare."
    de: "Schleudert riesige Felsen auf gegnerische Pokémon,\ndie eventuell zurückschrecken."
    es: Lanza grandes pedruscos. Puede amedrentar al objetivo.
    ko: "큰 바위를\n세차게 부딪쳐서 공격한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "将大岩石\n猛烈地撞向对手进行攻击。\n有时会使对手畏缩。"
    zh_trad: "將大岩石\n猛烈地砸向對手進行攻擊。\n有時會讓對手畏縮。"
tm081:
  names:
    jp_kana: わざマシン８１
    jp_kanji: わざマシン８１
    en: TM81
    fr: CT81
    it: MT81
    de: TM81
    es: MT81
    ko: 기술머신81
    zh_simp: 招式学习器８１
    zh_trad: 招式學習器８１
  descriptions:
    jp_kana: "カマや　ツメを　ハサミのように\nこうさ　させながら　あいてを　きりさく。"
    jp_kanji: "カマや　ツメを　ハサミのように\n交差させながら　相手を　切り裂く。"
    en: "The user slashes at the target by crossing its\nscythes or claws as if they were a pair of scissors."
    fr: "Le lanceur taillade l’ennemi en utilisant ses faux\nou ses griffes comme une paire de ciseaux."
    it: "Chi la usa colpisce il bersaglio con un attacco\nche ricorda un colpo di forbici."
    de: "Der Anwender führt eine Attacke aus, die einer\nScherenbewegung ähnelt."
    es: "Cruza las guadañas o las garras para atacar al objetivo\ncomo si fueran unas tijeras."
    ko: "낫이나 발톱을 가위처럼\n교차시키면서 상대를 베어 가른다."
    zh_simp: "将镰刀或爪子像剪刀般地交叉，\n顺势劈开对手。"
    zh_trad: "將鐮刀或爪子像剪刀般地交叉，\n順勢劈開對手。"
tm082:
  names:
    jp_kana: わざマシン８２
    jp_kanji: わざマシン８２
    en: TM82
    fr: CT82
    it: MT82
    de: TM82
    es: MT82
    ko: 기술머신82
    zh_simp: 招式学习器８２
    zh_trad: 招式學習器８２
  descriptions:
    jp_kana: "じぶんが　おぼえている　わざの　うち\nどれか　１つを　くりだす。\nじぶんが　ねている　ときだけ　つかえる。"
    jp_kanji: "自分が　おぼえている　技の　うち\nどれか　１つを　くりだす。\n自分が　寝ているときだけ　使える。"
    en: "While it is asleep, the user randomly uses one of the\nmoves it knows."
    fr: "Le lanceur utilise une de ses capacités au hasard\npendant qu’il dort."
    it: "Chi la usa sferra a caso una delle proprie mosse\nmentre sta dormendo."
    de: "Anwender setzt per Zufall eine ihm bekannte Attacke\nein. Klappt nur, wenn der Anwender gerade schläft."
    es: "Mientras duerme, usa uno de sus movimientos elegido\nal azar."
    ko: "자신이 배운 기술 중\n하나를 무작위로 날린다.\n자신이 잠들어 있을 때만 쓸 수 있다."
    zh_simp: "从自己已学会的招式中\n任意使出１个。\n只能在自己睡觉时使用。"
    zh_trad: "從自己已學會的招式中\n隨機選出１個使出。\n只有在睡眠狀態時可以使用。"
tm083:
  names:
    jp_kana: わざマシン８３
    jp_kanji: わざマシン８３
    en: TM83
    fr: CT83
    it: MT83
    de: TM83
    es: MT83
    ko: 기술머신83
    zh_simp: 招式学习器８３
    zh_trad: 招式學習器８３
  descriptions:
    jp_kana: "じめんを　ふみならして　じぶんの\nまわりに　いるものを　こうげきする。\nあいての　すばやさを　さげる。"
    jp_kanji: "地面を　踏みならして　自分の\n周りに　いるものを　攻撃する。\n相手の　素早さを　さげる。"
    en: "The user strikes everything around it by stomping\ndown on the ground. This lowers the Speed stats of\nthose hit."
    fr: "Le lanceur piétine le sol et inflige des dégâts à tous\nles Pokémon autour de lui. Baisse aussi leur Vitesse."
    it: "Chi la usa calpesta il terreno e scatena un terremoto\nche danneggia i Pokémon nei paraggi, riducendone\nla Velocità."
    de: "Anwender walzt den Boden platt und greift dabei alle\nPokémon im Umkreis an. Die Initiative aller betroffenen\nPokémon sinkt."
    es: "Sacudida sísmica que afecta a los demás Pokémon\nadyacentes y también reduce su Velocidad."
    ko: "땅을 힘껏 밟아 자신의\n주위에 있는 포켓몬을 공격한다.\n상대의 스피드를 떨어뜨린다."
    zh_simp: "用力踩踏地面并攻击\n自己周围所有的宝可梦。\n降低对方的速度。"
    zh_trad: "用力踩踏地面，\n攻擊自己周圍所有的寶可夢。\n可降低對手的速度。"
tm084:
  names:
    jp_kana: わざマシン８４
    jp_kanji: わざマシン８４
    en: TM84
    fr: CT84
    it: MT84
    de: TM84
    es: MT84
    ko: 기술머신84
    zh_simp: 招式学习器８４
    zh_trad: 招式學習器８４
  descriptions:
    jp_kana: "どくに　そまった　しょくしゅや　うでで\nあいてを　つきさす。\nどく　じょうたいに　することが　ある。"
    jp_kanji: "毒に　そまった　触手や　腕で\n相手を　突き刺す。\n毒状態に　することが　ある。"
    en: "The target is stabbed with a tentacle, arm, or the like\nsteeped in poison. This may also poison the target."
    fr: "Attaque l’ennemi avec un tentacule, un bras,\nou un autre membre plein de poison.\nPeut aussi l’empoisonner."
    it: "Il bersaglio è colpito da un tentacolo o da un arto\nintriso di una sostanza tossica che può anche\navvelenarlo."
    de: "Der Anwender greift mit giftigen Gliedmaßen wie\nTentakeln oder Armen an. Das Ziel wird dabei\neventuell vergiftet."
    es: "Pincha al objetivo con un tentáculo o brazo\nenvenenado. Puede llegar a envenenar al objetivo."
    ko: "독에 물든 촉수나 팔로\n상대를 꿰찌른다.\n독 상태로 만들 때가 있다."
    zh_simp: "用带毒的触手或手臂刺入对手。\n有时会让对手陷入中毒状态。"
    zh_trad: "以帶有毒性的觸手或手臂刺進對手。\n有時會讓對手陷入中毒狀態。"
tm085:
  names:
    jp_kana: わざマシン８５
    jp_kanji: わざマシン８５
    en: TM85
    fr: CT85
    it: MT85
    de: TM85
    es: MT85
    ko: 기술머신85
    zh_simp: 招式学习器８５
    zh_trad: 招式學習器８５
  descriptions:
    jp_kana: "ねている　あいての　ゆめを　たべて\nこうげきする。　ダメージの　はんぶんの\nＨＰを　かいふく　する。"
    jp_kanji: "寝ている　相手の　夢を　食べて\n攻撃する。　ダメージの　半分の\nＨＰを　回復する。"
    en: "The user eats the dreams of a sleeping target.\nThe user’s HP is restored by half the damage taken by\nthe target."
    fr: "Le lanceur mange le rêve de l’ennemi endormi\net récupère en PV la moitié des dégâts infligés."
    it: "Attacco che funziona solo su un bersaglio che dorme.\nChi lo usa riceve metà dei PS persi dal Pokémon colpito."
    de: "Frisst die Träume eines schlafenden Zieles. Anwender\nwird um die Hälfte des zugefügten Schadens geheilt."
    es: "Restaura al usuario la mitad del daño causado a un\nobjetivo dormido."
    ko: "잠자고 있는 상대의 꿈을 먹어\n공격한다. 데미지의 절반을\nHP로 회복한다."
    zh_simp: "吃掉正在睡觉的对手的梦\n进行攻击。回复对手\n所受到伤害的一半ＨＰ。"
    zh_trad: "吃掉熟睡中對手的夢\n進行攻擊。可以回復給予對手\n傷害的一半ＨＰ。"
tm086:
  names:
    jp_kana: わざマシン８６
    jp_kanji: わざマシン８６
    en: TM86
    fr: CT86
    it: MT86
    de: TM86
    es: MT86
    ko: 기술머신86
    zh_simp: 招式学习器８６
    zh_trad: 招式學習器８６
  descriptions:
    jp_kana: "くさを　からませて　あいてを\nころばせる。あいてが　おもいほど\nいりょくが　あがる。"
    jp_kanji: "草を　からませて　相手を\n転ばせる。相手が　重いほど\n威力が　あがる。"
    en: "The user snares the target with grass and trips it.\nThe heavier the target, the greater the\nmove’s power."
    fr: "L’ennemi est piégé dans de l’herbe qui le fait trébucher.\nPlus il est lourd, plus la puissance de cette capacité\naugmente."
    it: "Chi la usa intrappola il bersaglio con l’erba e lo fa\ncadere. Danneggia maggiormente i Pokémon\npiù pesanti."
    de: "Ziel wird durch Gras ins Straucheln gebracht.\nJe schwerer das Ziel, desto mehr Schaden."
    es: "Enreda al objetivo con hierba y lo derriba. Cuanto más\npesado es el objetivo, más daño inflige."
    ko: "풀을 휘감아서 상대를\n쓰러뜨린다. 상대가 무거울수록\n위력이 올라간다."
    zh_simp: "用草缠住并绊倒对手。\n对手越重，威力越大。"
    zh_trad: "用打結的草絆倒對手。\n對手越重，威力越大。"
tm087:
  names:
    jp_kana: わざマシン８７
    jp_kanji: わざマシン８７
    en: TM87
    fr: CT87
    it: MT87
    de: TM87
    es: MT87
    ko: 기술머신87
    zh_simp: 招式学习器８７
    zh_trad: 招式學習器８７
  descriptions:
    jp_kana: "あいてを　おこらせて　こんらん　させる。\nいかりで　あいての　こうげきは\nぐーんと　あがってしまう。"
    jp_kanji: "相手を　怒らせて　混乱させる。\n怒りで　相手の　攻撃は\nぐーんと　あがってしまう。"
    en: "The user enrages and confuses the target. However,\nthis also sharply raises the target’s Attack stat."
    fr: "Fait enrager la cible et la plonge dans la confusion,\nmais augmente beaucoup son Attaque."
    it: "Chi la usa provoca il bersaglio e lo confonde,\nfacendo aumentare però di molto il suo Attacco."
    de: Verwirrt das Ziel und erhöht dessen Angriffs-Wert stark.
    es: "Provoca confusión en el objetivo, pero también sube\nmucho su Ataque."
    ko: "상대를 화내게 해서 혼란시킨다.\n분노로 상대의 공격은\n크게 올라가 버린다."
    zh_simp: "激怒对手，使其混乱。\n因为愤怒，对手的攻击\n会大幅提高。"
    zh_trad: "讓對手火大並陷入混亂。\n但對手的攻擊會因憤怒\n而大幅提高。"
tm088:
  names:
    jp_kana: わざマシン８８
    jp_kanji: わざマシン８８
    en: TM88
    fr: CT88
    it: MT88
    de: TM88
    es: MT88
    ko: 기술머신88
    zh_simp: 招式学习器８８
    zh_trad: 招式學習器８８
  descriptions:
    jp_kana: "くちばしで　こうげき。\nあいてが　きのみを　もっている　とき\nたべて　きのみの　こうかを　うけられる。"
    jp_kanji: "くちばしで　攻撃。\n相手が　きのみを　持っているとき\n食べて　きのみの　効果を　受けられる。"
    en: "The user pecks the target. If the target is holding a\nBerry, the user eats it and gains its effect."
    fr: "Le lanceur picore la cible.\nSi cette dernière tient une Baie, le lanceur la mange\net profite de ses effets."
    it: "Chi la usa becca il bersaglio. Inoltre, se questi ha\nuna bacca, gliela ruba e ne sfrutta gli effetti."
    de: "Anwender pickt das Ziel, nimmt die Beere, falls das\nZiel eine trägt, und erhält ihren Effekt."
    es: "Picotea al objetivo. Si este sostiene una baya, la picotea\ntambién y obtiene sus efectos."
    ko: "부리로 공격한다.\n상대가 나무열매를 지니고 있을 때\n먹어서 나무열매의 효과를 받을 수 있다."
    zh_simp: "用喙进行攻击。\n当对手携带树果时，\n可以食用并获得其效果。"
    zh_trad: "用鳥喙進行攻擊。\n可以吃下對手攜帶的樹果，\n並獲得樹果的效果。"
tm089:
  names:
    jp_kana: わざマシン８９
    jp_kanji: わざマシン８９
    en: TM89
    fr: CT89
    it: MT89
    de: TM89
    es: MT89
    ko: 기술머신89
    zh_simp: 招式学习器８９
    zh_trad: 招式學習器８９
  descriptions:
    jp_kana: "こうげき　したあと\nものすごい　スピードで　もどってきて\nひかえ　ポケモンと　いれかわる。"
    jp_kanji: "攻撃したあと\nものすごい　スピードで　もどってきて\n控えの　ポケモンと　入れ替わる。"
    en: "After making its attack, the user rushes back to switch\nplaces with a party Pokémon in waiting."
    fr: "Après son attaque, le lanceur revient à toute vitesse\net change de place avec un Pokémon de l’équipe\nprêt au combat."
    it: "Chi usa questa mossa fa marcia indietro per farsi\nsostituire dopo aver sferrato l’attacco."
    de: "Nach der Attacke eilt der Anwender zurück und\ntauscht den Platz mit einem anderen Pokémon."
    es: "Tras atacar, el usuario vuelve a toda prisa para dar paso\na otro Pokémon del equipo."
    ko: "공격한 뒤\n굉장한 스피드로 돌아와서\n교대 포켓몬과 교체한다."
    zh_simp: "在攻击之后急速返回，\n和后备宝可梦进行替换。"
    zh_trad: "攻擊後迅速返回，\n和後備寶可夢進行替換。"
tm090:
  names:
    jp_kana: わざマシン９０
    jp_kanji: わざマシン９０
    en: TM90
    fr: CT90
    it: MT90
    de: TM90
    es: MT90
    ko: 기술머신90
    zh_simp: 招式学习器９０
    zh_trad: 招式學習器９０
  descriptions:
    jp_kana: "じぶんの　ＨＰを　すこし　けずって\nぶんしんを　だす。\nぶんしんは　じぶんの　みがわりに　なる。"
    jp_kanji: "自分の　ＨＰを　少し　削って\n分身を　だす。\n分身は　自分の　身代わりに　なる。"
    en: "The user creates a substitute for itself using some of\nits HP. The substitute serves as the user’s decoy."
    fr: "Le lanceur crée un clone en sacrifiant quelques PV.\nCe clone sert de leurre."
    it: "Chi la usa crea una copia di se stesso usando alcuni PS.\nLa copia serve come esca per il nemico."
    de: "Anwender setzt eine kleine Menge an KP ein, um einen\nDoppelgänger zu erzeugen, der für ihn Schläge\neinsteckt."
    es: "Utiliza parte de los PS propios para crear un sustituto\nque actúa como señuelo."
    ko: "자신의 HP를 조금 깎아서\n분신을 만든다.\n분신은 자신의 대타가 된다."
    zh_simp: "削减少许自己的ＨＰ，\n制造分身。\n分身将成为自己的替身。"
    zh_trad: "消耗一些自己的ＨＰ，\n製造分身。\n分身將成為自己的替身。"
tm091:
  names:
    jp_kana: わざマシン９１
    jp_kanji: わざマシン９１
    en: TM91
    fr: CT91
    it: MT91
    de: TM91
    es: MT91
    ko: 기술머신91
    zh_simp: 招式学习器９１
    zh_trad: 招式學習器９１
  descriptions:
    jp_kana: "からだの　ひかりを　いってんに　あつめて\nちからを　はなつ。あいての　とくぼうを\nさげることが　ある。"
    jp_kanji: "体の　光を　一点に　集めて\n力を　放つ。\n相手の　特防を　さげることが　ある。"
    en: "The user gathers all its light energy and releases it\nall at once. This may also lower the target’s\nSp. Def stat."
    fr: "Le lanceur concentre son énergie lumineuse\net la fait exploser.\nPeut aussi baisser la Défense Spéciale de l’ennemi."
    it: "Chi la usa attacca raccogliendo e rilasciando energia\nluminosa. Può ridurre la Difesa Speciale del bersaglio."
    de: "Anwender sammelt Lichtenergie und feuert sie auf\neinmal ab. Senkt eventuell Spezial-Verteidigung des\nZieles."
    es: "El usuario concentra toda la luz del cuerpo y la libera.\nPuede bajar la Defensa Especial del objetivo."
    ko: "몸의 빛을 한곳에 모아서\n힘을 방출한다. 상대의 특수방어를\n떨어뜨릴 때가 있다."
    zh_simp: "将身体的光芒\n聚集在一点释放出去。\n有时会降低对手的特防。"
    zh_trad: "將身體的光芒\n聚集在一個點後釋放出去。\n有時會降低對手的特防。"
tm092:
  names:
    jp_kana: わざマシン９２
    jp_kanji: わざマシン９２
    en: TM92
    fr: CT92
    it: MT92
    de: TM92
    es: MT92
    ko: 기술머신92
    zh_simp: 招式学习器９２
    zh_trad: 招式學習器９２
  descriptions:
    jp_kana: "まかふしぎな　くうかんを　つくる。\n５ターンの　あいだ\nおそい　ポケモンから　こうどう　できる。"
    jp_kanji: "まか不思議な　空間を　つくる。\n５ターンの　間\n遅い　ポケモンから　行動できる。"
    en: "The user creates a bizarre area in which slower\nPokémon get to move first for five turns."
    fr: "Le lanceur crée une zone mystérieuse où les Pokémon\nles plus lents frappent en priorité pendant cinq tours."
    it: "Chi la usa crea una dimensione in cui i Pokémon\npiù lenti agiscono per primi per cinque turni."
    de: "Anwender erzeugt einen bizarren Raum, in dem\nlangsame Pokémon fünf Runden lang zuerst agieren."
    es: "Crea un espacio extraño en el que los Pokémon lentos\nse mueven primero durante cinco turnos."
    ko: "이상한 공간을 만든다.\n5턴 동안 느린 포켓몬부터\n행동할 수 있다."
    zh_simp: "制造出离奇的空间。\n在５回合内\n速度慢的宝可梦可以先行动。"
    zh_trad: "創造出非常不可思議的空間。\n在５回合內，\n速度慢的寶可夢可以先行動。"
tm093:
  names:
    jp_kana: わざマシン９３
    jp_kanji: わざマシン９３
    en: TM93
    fr: CT93
    it: MT93
    de: TM93
    es: MT93
    ko: 기술머신93
    zh_simp: 招式学习器９３
    zh_trad: 招式學習器９３
  descriptions:
    jp_kana: "カマや　ツメなどで\nあいてを　きりつけて　こうげきする。\nポケッチの　ひでんわざの　ひとつ。"
    jp_kanji: "カマや　ツメなどで\n相手を　切りつけて　攻撃する。\nポケッチの　秘伝技の　一つ。"
    en: "The target is cut with a scythe or claw. It’s also one of\nthe Pokétch’s hidden moves."
    fr: "Une des capacités secrètes de la Pokémontre.\nCoupe l’ennemi avec des lames ou des griffes."
    it: "Attacca il bersaglio con artigli o falci affilate.\nÈ una delle mosse MN del PokéKron."
    de: "Ein Angriff mit Schere oder Klaue. Kann als VM-Attacke\nüber den Pokétch eingesetzt werden."
    es: "Uno de los movimientos ocultos del Poké Reloj.\nCorta al adversario con garras, guadañas, etc."
    ko: "낫이나 발톱 등으로\n상대를 베어 공격한다.\n포켓치의 비전기술 중 하나."
    zh_simp: "用镰刀或爪子等\n切斩对手进行攻击。\n是宝可表的秘传招式之一。"
    zh_trad: "用鐮刀或爪子等\n斬切對手進行攻擊。\n是寶可錶的秘傳招式之一。"
tm094:
  names:
    jp_kana: わざマシン９４
    jp_kanji: わざマシン９４
    en: TM94
    fr: CT94
    it: MT94
    de: TM94
    es: MT94
    ko: 기술머신94
    zh_simp: 招式学习器９４
    zh_trad: 招式學習器９４
  descriptions:
    jp_kana: "１ターンめで　そらへ　とび\n２ターンめに　あいてを　こうげきする。\nポケッチの　ひでんわざの　ひとつ。"
    jp_kanji: "１ターン目で　空へ　飛び\n２ターン目に　相手を　攻撃する。\nポケッチの　秘伝技の　一つ。"
    en: "The user flies up into the sky and then strikes its target\non the next turn. It’s also one of the Pokétch’s\nhidden moves."
    fr: "Une des capacités secrètes de la Pokémontre.\nLe lanceur s’envole au premier tour et frappe\nau second."
    it: "Chi la usa si alza in volo per attaccare al turno\nseguente. È una delle mosse MN del PokéKron."
    de: "Steigt in Runde 1 empor und trifft das Ziel in Runde 2.\nKann als VM-Attacke über den Pokétch eingesetzt\nwerden."
    es: "Uno de los movimientos ocultos del Poké Reloj.\nEl usuario vuela en el primer turno y ataca en el\nsegundo."
    ko: "1턴째에 하늘을 날아\n2턴째에 상대를 공격한다.\n포켓치의 비전기술 중 하나."
    zh_simp: "第１回合飞上天空，\n第２回合攻击对手。\n是宝可表的秘传招式之一。"
    zh_trad: "使用後的第１回合飛上天空，\n並於第２回合攻擊對手。\n是寶可錶的秘傳招式之一。"
tm095:
  names:
    jp_kana: わざマシン９５
    jp_kanji: わざマシン９５
    en: TM95
    fr: CT95
    it: MT95
    de: TM95
    es: MT95
    ko: 기술머신95
    zh_simp: 招式学习器９５
    zh_trad: 招式學習器９５
  descriptions:
    jp_kana: "おおきな　なみで　じぶんの\nまわりに　いるものを　こうげきする。\nポケッチの　ひでんわざの　ひとつ。"
    jp_kanji: "大きな　波で　自分の\n周りに　いるものを　攻撃する。\nポケッチの　秘伝技の　一つ。"
    en: "The user attacks everything around it by swamping its\nsurroundings with a giant wave. It’s also one of the\nPokétch’s hidden moves."
    fr: "Une des capacités secrètes de la Pokémontre.\nUne énorme vague s’abat sur le champ de bataille et\ninflige des dégâts à tous les Pokémon autour du lanceur."
    it: "Un’onda enorme sommerge il campo di lotta,\ncolpendo tutti i Pokémon intorno a chi la scatena.\nÈ una delle mosse MN del PokéKron."
    de: "Anwender greift mit einer gewaltigen Welle alle\nPokémon im Umkreis an. Kann als VM-Attacke über\nden Pokétch eingesetzt werden."
    es: "Uno de los movimientos ocultos del Poké Reloj.\nInunda el terreno de combate con una ola gigante."
    ko: "큰 파도로 자신의\n주위에 있는 포켓몬을 공격한다.\n포켓치의 비전기술 중 하나."
    zh_simp: "利用大浪\n攻击自己周围所有的宝可梦。\n是宝可表的秘传招式之一。"
    zh_trad: "使用大浪\n攻擊自己周圍所有的寶可夢。\n是寶可錶的秘傳招式之一。"
tm096:
  names:
    jp_kana: わざマシン９６
    jp_kanji: わざマシン９６
    en: TM96
    fr: CT96
    it: MT96
    de: TM96
    es: MT96
    ko: 기술머신96
    zh_simp: 招式学习器９６
    zh_trad: 招式學習器９６
  descriptions:
    jp_kana: "こんしんの　ちからで\nあいてを　なぐりつけて　こうげきする。\nポケッチの　ひでんわざの　ひとつ。"
    jp_kanji: "こん身の　力で\n相手を　なぐりつけて　攻撃する。\nポケッチの　秘伝技の　一つ。"
    en: "The target is slugged with a punch thrown at maximum\npower. It’s also one of the Pokétch’s hidden moves."
    fr: "Une des capacités secrètes de la Pokémontre.\nLe lanceur cogne l’ennemi de toutes ses forces."
    it: "Chi la usa colpisce il bersaglio con tutte le sue forze.\nÈ una delle mosse MN del PokéKron."
    de: "Das Ziel wird extrem stark getroffen. Kann als\nVM-Attacke über den Pokétch eingesetzt werden."
    es: "Uno de los movimientos ocultos del Poké Reloj.\nPropina un potente puñetazo con todas sus fuerzas."
    ko: "혼신의 힘으로\n상대를 세게 때려서 공격한다.\n포켓치의 비전기술 중 하나."
    zh_simp: "使出浑身力气\n殴打对手进行攻击。\n是宝可表的秘传招式之一。"
    zh_trad: "使出渾身力量\n毆打對手進行攻擊。\n是寶可錶的秘傳招式之一。"
tm097:
  names:
    jp_kana: わざマシン９７
    jp_kanji: わざマシン９７
    en: TM97
    fr: CT97
    it: MT97
    de: TM97
    es: MT97
    ko: 기술머신97
    zh_simp: 招式学习器９７
    zh_trad: 招式學習器９７
  descriptions:
    jp_kana: "あいての　リフレクターなどを　はらいのける。\nかいひりつも　さげる。\nポケッチの　ひでんわざの　ひとつ。"
    jp_kanji: "相手の　リフレクターなどを　払いのける。\n回避率も　さげる。\nポケッチの　秘伝技の　一つ。"
    en: "A strong wind blows away the target’s barriers, such as\nReflect or Light Screen, and lowers their evasiveness.\nIt’s also one of the Pokétch’s hidden moves."
    fr: "Une des capacités secrètes de la Pokémontre. Disperse\ncertains effets mis en place par l’ennemi, tels que\nProtection ou Mur Lumière. Diminue aussi son Esquive."
    it: "Chi la usa spazza via barriere come Schermoluce\ne Riflesso con un forte vento e riduce l’elusione\ndel bersaglio. È una delle mosse MN del PokéKron."
    de: "Hebt Attacken des Zieles auf, wie etwa Reflektor. Senkt\naußerdem den Ausweichwert. Kann als VM-Attacke über\nden Pokétch eingesetzt werden."
    es: "Uno de los movimientos ocultos del Poké Reloj.\nPotente viento que destruye barreras como Pantalla\nde Luz y Reflejo y reduce la Evasión del objetivo."
    ko: "상대의 리플렉터 등을 제거한다.\n회피율도 떨어뜨린다.\n포켓치의 비전기술 중 하나."
    zh_simp: "吹开对手的反射壁等防御物。\n也会降低对手的闪避率。\n是宝可表的秘传招式之一。"
    zh_trad: "吹開對手的反射壁等防禦物，\n也會降低對手的閃避率。\n是寶可錶的秘傳招式之一。"
tm098:
  names:
    jp_kana: わざマシン９８
    jp_kanji: わざマシン９８
    en: TM98
    fr: CT98
    it: MT98
    de: TM98
    es: MT98
    ko: 기술머신98
    zh_simp: 招式学习器９８
    zh_trad: 招式學習器９８
  descriptions:
    jp_kana: "パンチで　こうげき。　あいての\nぼうぎょを　さげる　ことが　ある。\nポケッチの　ひでんわざの　ひとつ。"
    jp_kanji: "パンチで　攻撃。相手の\n防御を　さげる　ことが　ある。\nポケッチの　秘伝技の　一つ。"
    en: "The user attacks with a punch that may lower the\ntarget’s Defense stat. It’s also one of the Pokétch’s\nhidden moves."
    fr: "Une des capacités secrètes de la Pokémontre.\nPorte un coup de poing à l’ennemi, ce qui peut baisser\nsa Défense."
    it: "Chi la usa colpisce il bersaglio con un pugno che\npuò anche ridurne la Difesa. È una delle mosse MN\ndel PokéKron."
    de: "Der Anwender greift mit einem Hieb an und kann so\nden Verteidigungs-Wert des Zieles senken. Kann als\nVM-Attacke über den Pokétch eingesetzt werden."
    es: "Uno de los movimientos ocultos del Poké Reloj.\nAtaque con los puños. Puede bajar la Defensa del\nobjetivo."
    ko: "펀치로 공격한다.\n상대의 방어를 떨어뜨릴 때가 있다.\n포켓치의 비전기술 중 하나."
    zh_simp: "用拳头进行攻击。\n有时会降低对手的防御。\n是宝可表的秘传招式之一。"
    zh_trad: "用拳頭進行攻擊。\n有時會降低對手的防禦。\n是寶可錶的秘傳招式之一。"
tm099:
  names:
    jp_kana: わざマシン９９
    jp_kanji: わざマシン９９
    en: TM99
    fr: CT99
    it: MT99
    de: TM99
    es: MT99
    ko: 기술머신99
    zh_simp: 招式学习器９９
    zh_trad: 招式學習器９９
  descriptions:
    jp_kana: "すごい　いきおいで　あいてに　つっこむ。\nあいてを　ひるませる　ことが　ある。\nポケッチの　ひでんわざの　ひとつ。"
    jp_kanji: "すごい　勢いで　相手に　つっこむ。\n相手を　ひるませる　ことが　ある。\nポケッチの　秘伝技の　一つ。"
    en: "The user charges at the target and may make it flinch.\nIt’s also one of the Pokétch’s hidden moves."
    fr: "Une des capacités secrètes de la Pokémontre.\nLe lanceur charge l’ennemi à une vitesse remarquable,\nce qui peut l’apeurer."
    it: "Chi la usa carica il bersaglio a grande velocità e può\nfarlo tentennare. È una delle mosse MN del PokéKron."
    de: "Eine mächtige Attacke, durch die das Ziel eventuell\nzurückschreckt. Kann als VM-Attacke über den Pokétch\neingesetzt werden."
    es: "Uno de los movimientos ocultos del Poké Reloj.\nEmbiste con un gran impulso que puede llegar a\namedrentar."
    ko: "굉장한 기세로 상대에게 돌진한다.\n상대를 풀죽게 만들 때가 있다.\n포켓치의 비전기술 중 하나."
    zh_simp: "以惊人的气势扑向对手。\n有时会使对手畏缩。\n是宝可表的秘传招式之一。"
    zh_trad: "以驚人的氣勢撲向對手。\n有時會讓對手畏縮。\n是寶可錶的秘傳招式之一。"
tm100:
  names:
    jp_kana: わざマシン１００
    jp_kanji: わざマシン１００
    en: TM100
    fr: CT100
    it: MT100
    de: TM100
    es: MT100
    ko: 기술머신100
    zh_simp: 招式学习器１００
    zh_trad: 招式學習器１００
  descriptions:
    jp_kana: "とっしん　こうげきで　こんらん\nさせることが　ある。\nポケッチの　ひでんわざの　ひとつ。"
    jp_kanji: "とっしん　攻撃で　こんらん\nさせることが　ある。\nポケッチの　秘伝技の　一つ。"
    en: "A charging attack that may also leave the foe confused.\nIt’s also one of the Pokétch’s hidden moves."
    fr: "Une des capacités secrètes de la Pokémontre.\nLe lanceur charge l’ennemi, ce qui peut rendre\nce dernier confus."
    it: "Carica il bersaglio e può anche confonderlo.\nÈ una delle mosse MN del PokéKron."
    de: "Eine stürmische Attacke, die das Ziel eventuell verwirrt.\nKann als VM-Attacke über den Pokétch eingesetzt\nwerden."
    es: "Uno de los movimientos ocultos del Poké Reloj.\nAtaque de derribo que puede confundir al rival."
    ko: "돌진하여 공격한다.\n상대를 혼란시킬 때가 있다.\n포켓치의 비전기술 중 하나."
    zh_simp: "发动猛撞攻击，\n有时会使对手混乱。\n是宝可表的秘传招式之一。"
    zh_trad: "用盡全力撲向對手進行攻擊。\n有時會使對手混亂。\n是寶可錶的秘傳招式之一。"
tm_case:
  names:
    jp_kana: わざマシンケース
    jp_kanji: わざマシンケース
    en: TM Case
    fr: Boîte CT
    it: Porta MT
    de: TM-Box
    es: Estuche de MT
    ko: 기술머신케이스
    zh_simp: 招式学习器盒
    zh_trad: 招式學習器盒
  descriptions:
    jp_kana: "ー\nー\nー"
    jp_kanji: "ー\nー\nー"
    en: "-\n-\n-"
    fr: "-\n-\n-"
    it: "-\n-\n-"
    de: ー
    ko: "-\n-\n-"
    zh_simp: "ー\nー\nー"
    zh_trad: "ー\nー\nー"
tmv_pass:
  names:
    jp_kana: ＴＭＶパス
    jp_kanji: ＴＭＶパス
    en: TMV Pass
    fr: Passe TMV
    it: Pass TMV
    de: TMV-Pass
    es: Abono del TMV
    ko: TMV패스
    zh_simp: ＴＭＶ自由票
    zh_trad: ＴＭＶ自由票
  descriptions:
    jp_kana: "ミアレシティと　キナンシティを\nむすぶ　ちょうこうそくてつどうに\nいつでも　のれる　チケット。"
    jp_kanji: "ミアレシティと　キナンシティを\n結ぶ　超高速鉄道に\nいつでも　乗れる　チケット。"
    en: "A commuter pass that allows the holder to ride the\nTMV between Lumiose City and Kiloude City at\nany time."
    fr: "Un abonnement à vie à la ligne de TMV qui relie\nIllumis à Batisques."
    it: "Biglietto che permette di salire liberamente\nsul treno a megavelocità che collega Luminopoli\ne Batikopoli."
    de: "Mit dieser Fahrkarte kannst du jederzeit den\nHochgeschwindigkeitszug nehmen, der zwischen\nIllumina City und Batika City verkehrt."
    es: "Pase que permite realizar viajes ilimitados en el TMV\nque une las ciudades de Luminalia y Batik."
    ko: "미르시티와 기남시티를 잇는\n초고속철도를 언제든지\n탈 수 있는 티켓."
    zh_simp: "可以随时乘坐连接着\n密阿雷市和奇楠市的\n超高速列车的车票。"
    zh_trad: "可以隨時乘坐連接著\n密阿雷市和奇楠市的\n超高速列車的車票。"
tough_candy:
  names:
    jp_kana: まもりのアメ
    jp_kanji: まもりのアメ
    en: Tough Candy
    fr: Bonbon Armure S
    it: Caramella protezione S
    de: Robustbonbon
    es: Caramelo Aguante
    ko: 수비의사탕
    zh_simp: 守护糖果
    zh_trad: 守護糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nポケモンの　ぼうぎょを　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\nポケモンの　ぼうぎょを　上げる。"
    en: "A candy that is packed with energy. When given to\na Pokémon, it will increase that Pokémon’s Defense stat."
    fr: "Un bonbon plein d’énergie.\nIl augmente la Défense d’un Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta la Difesa di un Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\ndie Verteidigung eines Pokémon."
    es: "Caramelo energético que aumenta la Defensa del\nPokémon."
    ko: "에너지가 가득한 사탕.\n포켓몬의 방어를 올린다."
    zh_simp: "充满能量的糖果。\n能提高宝可梦的防御。"
    zh_trad: "充滿能量的糖果。\n能提高寶可夢的防禦。"
tough_candy_l:
  names:
    jp_kana: まもりのアメＬ
    jp_kanji: まもりのアメＬ
    en: Tough Candy L
    fr: Bonbon Armure M
    it: Caramella protezione M
    de: Robustbonbon+
    es: Caramelo Aguante +
    ko: 수비의사탕L
    zh_simp: 守护糖果Ｌ
    zh_trad: 守護糖果Ｌ
  descriptions:
    jp_kana: "エネルギーの　つまった　おおきい　アメ。\nレベル３０　いじょうの　ポケモンの\nぼうぎょを　あげる。"
    jp_kanji: "エネルギーの　つまった　大きい　アメ。\nレベル３０　以上の　ポケモンの\nぼうぎょを　上げる。"
    en: "A big candy that is packed with energy. When given to\na Pokémon at Lv. 30 or higher, it will increase\nthat Pokémon’s Defense stat."
    fr: "Un gros bonbon plein d’énergie.\nIl augmente la Défense d’un Pokémon de niveau 30\nou supérieur."
    it: "Una caramella piena zeppa di energia.\nAumenta la Difesa di un Pokémon di livello 30\no superiore."
    de: "Ein großes Bonbon, das voller Energie steckt.\nErhöht dauerhaft die Verteidigung eines Pokémon ab\nLevel 30."
    es: "Caramelo energético grande que aumenta la Defensa\nde un Pokémon de Nv. 30 o superior."
    ko: "에너지가 가득한 큰 사탕.\n레벨 30 이상인 포켓몬의\n방어를 올린다."
    zh_simp: "充满能量的大糖果。\n能让等级３０以上的\n宝可梦的防御上升。"
    zh_trad: "充滿能量的大糖果。\n能提高等級在３０以上的\n寶可夢的防禦。"
tough_candy_xl:
  names:
    jp_kana: まもりのアメＸＬ
    jp_kanji: まもりのアメＸＬ
    en: Tough Candy XL
    fr: Bonbon Armure L
    it: Caramella protezione L
    de: Robustbonbon++
    es: Caramelo Aguante ++
    ko: 수비의사탕XL
    zh_simp: 守护糖果ＸＬ
    zh_trad: 守護糖果ＸＬ
  descriptions:
    jp_kana: "エネルギーの　つまった　とくだいの　アメ。\nレベル６０　いじょうの　ポケモンの\nぼうぎょを　あげる。"
    jp_kanji: "エネルギーの　つまった　特大の　アメ。\nレベル６０　以上の　ポケモンの\nぼうぎょを　上げる。"
    en: "A huge candy that is packed with energy. When given\nto a Pokémon at Lv. 60 or higher, it will increase\nthat Pokémon’s Defense stat."
    fr: "Un énorme bonbon plein d’énergie.\nIl augmente la Défense d’un Pokémon de niveau 60\nou supérieur."
    it: "Una caramella piena zeppa di energia.\nAumenta la Difesa di un Pokémon di livello 60\no superiore."
    de: "Ein riesiges Bonbon, das voller Energie steckt.\nErhöht dauerhaft die Verteidigung eines Pokémon ab\nLevel 60."
    es: "Caramelo energético enorme que aumenta la Defensa\nde un Pokémon de Nv. 60 o superior."
    ko: "에너지가 가득한 매우 큰 사탕.\n레벨 60 이상인 포켓몬의\n방어를 올린다."
    zh_simp: "充满能量的超大糖果。\n能让等级６０以上的\n宝可梦的防御上升。"
    zh_trad: "充滿能量的特大糖果。\n能提高等級在６０以上的\n寶可夢的防禦。"
town_map:
  names:
    jp_kana: タウンマップ
    jp_kanji: タウンマップ
    en: Town Map
    fr: Carte
    it: Mappa città
    de: Karte
    es: Mapa
    ko: 타운맵
    zh_simp: 城镇地图
    zh_trad: 城鎮地圖
  descriptions:
    jp_kana: "いつでも　てがるに　みることが\nできる　べんりな　ちず。\nじぶんの　ばしょも　わかる。"
    jp_kanji: "いつでも　手軽に　みることが\nできる　便利な　地図。\n自分の　場所も　わかる。"
    en: "A very convenient map that can be viewed anytime.\nIt even shows you your present location in the region."
    fr: "Une carte très pratique pouvant être consultée\nn’importe quand. Elle indique la position actuelle."
    it: "Utilissima mappa, consultabile in ogni situazione.\nMostra anche la propria posizione in tempo reale."
    de: "Eine praktische Karte, die jederzeit aufgerufen werden\nkann. Dein aktueller Standort wird auch angezeigt."
    es: "Un mapa muy útil que puede consultarse en cualquier\nmomento y que, además, te indica dónde te encuentras."
    ko: "언제라도 간편하게 볼 수\n있는 편리한 지도.\n자신이 있는 곳도 알 수 있다."
    zh_simp: "可以随时轻松\n查看的便利地图。\n也能清楚自己的位置。"
    zh_trad: "可以隨時輕鬆\n查看的好用地圖。\n也能知道自己的位置。"
toxic_orb:
  names:
    jp_kana: どくどくだま
    jp_kanji: どくどくだま
    en: Toxic Orb
    fr: Orbe Toxique
    it: Tossicsfera
    de: Toxik-Orb
    es: Toxisfera
    ko: 맹독구슬
    zh_simp: 剧毒宝珠
    zh_trad: 劇毒寶珠
  descriptions:
    jp_kana: "さわると　どくをだす　ふしぎなたま。\nもたせると　せんとうちゅうに\nもうどくの　じょうたいに　なる。"
    jp_kanji: "触ると　毒をだす　不思議な玉。\n持たせると　戦闘中に\n猛毒の　状態に　なる。"
    en: "An item to be held by a Pokémon. It’s a bizarre orb\nthat will badly poison the holder during battle."
    fr: "Objet à tenir. Un orbe bizarre qui empoisonne\ngravement son porteur durant le combat."
    it: "Strumento da dare a un Pokémon.\nSfera bizzarra che iperavvelena chi l’ha con sé\nin una lotta."
    de: "Ein Item zum Tragen. Dieser bizarre Orb vergiftet\nseinen Träger im Kampf schwer."
    es: "Extraña esfera que envenena gravemente al Pokémon\nque la lleva en combate."
    ko: "만지면 독을 발산하는 이상한 구슬.\n지니게 하면 배틀 중에\n맹독 상태가 된다."
    zh_simp: "触碰后会放出毒的神奇宝珠。\n携带后，在战斗时会变成剧毒状态。"
    zh_trad: "觸碰後會放出毒的神奇寶珠。\n攜帶後，在戰鬥時\n會變成劇毒狀態。"
toxic_plate:
  names:
    jp_kana: もうどくプレート
    jp_kanji: もうどくプレート
    en: Toxic Plate
    fr: Plaque Toxicité
    it: Lastrafiele
    de: Gifttafel
    es: Tabla Tóxica
    ko: 맹독플레이트
    zh_simp: 剧毒石板
    zh_trad: 劇毒石板
  descriptions:
    jp_kana: "どくの　タイプの　せきばん。\nもたせると　どくタイプの\nわざの　いりょくが　つよまる。"
    jp_kanji: "どくの　タイプの　石盤。\n持たせると　どくタイプの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon. It’s a stone tablet\nthat boosts the power of Poison-type moves."
    fr: "Objet à tenir. Une tablette en pierre augmentant\nla puissance des capacités de type Poison."
    it: "Strumento da dare a un Pokémon. Lastra di pietra che\npotenzia le mosse di tipo Veleno."
    de: "Ein Item zum Tragen. Diese Steintafel verstärkt\nAttacken vom Typ Gift."
    es: "Tabla de piedra que potencia los movimientos de tipo\nVeneno. Debe llevarla un Pokémon."
    ko: "독타입의 석판.\n지니게 하면 독타입\n기술의 위력이 강해진다."
    zh_simp: "毒属性的石板。\n携带后，毒属性的\n招式威力就会增强。"
    zh_trad: "毒屬性的石板。\n攜帶後，毒屬性的\n招式威力就會增強。"
tr00:
  names:
    jp_kana: わざレコード００
    jp_kanji: わざレコード００
    en: TR00
    fr: DT00
    it: DT00
    de: TP00
    es: DT00
    ko: 기술레코드00
    zh_simp: 招式记录００
    zh_trad: 招式紀錄００
  descriptions:
    jp_kana: "たたかいのまいを　はげしく　おどって\nきあいを　たかめる。\nじぶんの　こうげきを　ぐーんと　あげる。"
    jp_kanji: "戦いの舞を　激しく　おどって\n気合を　高める。\n自分の　攻撃を　ぐーんと　あげる。"
    en: "A frenetic dance to uplift the fighting spirit.\nThis sharply raises the user’s Attack stat."
    fr: "Une danse frénétique qui exalte l’esprit combatif.\nAugmente beaucoup l’Attaque du lanceur."
    it: "Danza frenetica che incrementa lo spirito combattivo.\nChi la usa aumenta di molto il suo Attacco."
    de: "Ein wilder Tanz, der den Kampfgeist wecken soll.\nDer Angriffs-Wert des Anwenders wird stark erhöht."
    es: Baile frenético que aumenta mucho el Ataque.
    ko: "싸움의 춤을 격렬하게 춰서\n기세를 높인다.\n자신의 공격을 크게 올린다."
    zh_simp: "激烈地跳起战舞提高气势。\n大幅提高自己的攻击。"
    zh_trad: "激烈地跳起戰舞提升氣勢，\n大幅提高自己的攻擊。"
tr01:
  names:
    jp_kana: わざレコード０１
    jp_kanji: わざレコード０１
    en: TR01
    fr: DT01
    it: DT01
    de: TP01
    es: DT01
    ko: 기술레코드01
    zh_simp: 招式记录０１
    zh_trad: 招式紀錄０１
  descriptions:
    jp_kana: "からだ　ぜんたいで\nあいてに　のしかかり　こうげきする。\nまひ　じょうたいに　することが　ある。"
    jp_kanji: "全身で\n相手に　のしかかり　攻撃する。\nまひ状態に　することが　ある。"
    en: "The user drops onto the target with its full body\nweight. This may also leave the target with paralysis."
    fr: "Le lanceur se laisse tomber sur l’ennemi\nde tout son poids. Peut aussi le paralyser."
    it: "Chi la usa carica il bersaglio con tutto il corpo.\nPuò causarne anche la paralisi."
    de: "Trifft das Ziel mit vollem Körpereinsatz und paralysiert\nes eventuell."
    es: "Salta sobre el objetivo con todo su peso y puede llegar\na paralizarlo."
    ko: "몸 전체로\n상대를 덮쳐눌러 공격한다.\n마비 상태로 만들 때가 있다."
    zh_simp: "用整个身体\n压住对手进行攻击。\n有时会让对手陷入麻痹状态。"
    zh_trad: "用整個身體\n壓住對手進行攻擊。\n有時會讓對手陷入麻痺狀態。"
tr02:
  names:
    jp_kana: わざレコード０２
    jp_kanji: わざレコード０２
    en: TR02
    fr: DT02
    it: DT02
    de: TP02
    es: DT02
    ko: 기술레코드02
    zh_simp: 招式记录０２
    zh_trad: 招式紀錄０２
  descriptions:
    jp_kana: "はげしい　ほのおを\nあいてに　はっしゃして　こうげきする。\nやけど　じょうたいに　することが　ある。"
    jp_kanji: "激しい　炎を\n相手に　発射して　攻撃する。\nやけど状態に　することが　ある。"
    en: "The target is scorched with an intense blast of fire.\nThis may also leave the target with a burn."
    fr: "L’ennemi reçoit un torrent de flammes.\nPeut aussi le brûler."
    it: "Il bersaglio viene colpito da intense fiammate\nche possono anche scottarlo."
    de: "Starke Feuer-Attacke, durch die das Ziel eventuell\nVerbrennungen erleidet."
    es: "Ataca con una gran ráfaga de fuego que puede causar\nquemaduras."
    ko: "세찬 불꽃을\n상대에게 발사하여 공격한다.\n화상 상태로 만들 때가 있다."
    zh_simp: "向对手发射烈焰进行攻击。\n有时会让对手陷入灼伤状态。"
    zh_trad: "向對手發射\n強烈火焰進行攻擊。\n有時會讓對手陷入灼傷狀態。"
tr03:
  names:
    jp_kana: わざレコード０３
    jp_kanji: わざレコード０３
    en: TR03
    fr: DT03
    it: DT03
    de: TP03
    es: DT03
    ko: 기술레코드03
    zh_simp: 招式记录０３
    zh_trad: 招式紀錄０３
  descriptions:
    jp_kana: "たいりょうの　みずを\nはげしい　いきおいで\nあいてに　はっしゃして　こうげきする。"
    jp_kanji: "大量の　水を\n激しい　勢いで\n相手に　発射して　攻撃する。"
    en: "The target is blasted by a huge volume of water\nlaunched under great pressure."
    fr: Un puissant jet d’eau est dirigé sur l’ennemi.
    it: "Il bersaglio è travolto da un potente getto d’acqua\nspruzzato ad altissima pressione."
    de: Spritzt eine Menge Wasser mit Hochdruck auf das Ziel.
    es: Lanza una gran masa de agua a presión para atacar.
    ko: "대량의 물을\n세찬 기세로\n상대에게 발사하여 공격한다."
    zh_simp: "向对手猛烈地\n喷射大量水流进行攻击。"
    zh_trad: "向對手猛烈地噴射\n大量水流進行攻擊。"
tr04:
  names:
    jp_kana: わざレコード０４
    jp_kanji: わざレコード０４
    en: TR04
    fr: DT04
    it: DT04
    de: TP04
    es: DT04
    ko: 기술레코드04
    zh_simp: 招式记录０４
    zh_trad: 招式紀錄０４
  descriptions:
    jp_kana: "おおきな　なみで　じぶんの\nまわりに　いるものを　こうげきする。"
    jp_kanji: "大きな　波で　自分の\n周りに　いるものを　攻撃する。"
    en: "The user attacks everything around it by swamping\nits surroundings with a giant wave."
    fr: "Une énorme vague s’abat sur le champ de bataille\net inflige des dégâts à tous les Pokémon autour\ndu lanceur."
    it: "Un’onda enorme sommerge il campo di lotta,\ncolpendo tutti i Pokémon intorno a chi la scatena."
    de: "Anwender greift mit einer gewaltigen Welle\nalle Pokémon im Umkreis an."
    es: Inunda el terreno de combate con una ola gigante.
    ko: "큰 파도로 자신의\n주위에 있는 포켓몬을 공격한다."
    zh_simp: "利用大浪\n攻击自己周围所有的宝可梦。"
    zh_trad: "使用大浪\n攻擊自己周圍所有的寶可夢。"
tr05:
  names:
    jp_kana: わざレコード０５
    jp_kanji: わざレコード０５
    en: TR05
    fr: DT05
    it: DT05
    de: TP05
    es: DT05
    ko: 기술레코드05
    zh_simp: 招式记录０５
    zh_trad: 招式紀錄０５
  descriptions:
    jp_kana: "こごえる　ビームを\nあいてに　はっしゃして　こうげきする。\nこおり　じょうたいに　することが　ある。"
    jp_kanji: "凍える　ビームを\n相手に　発射して　攻撃する。\nこおり状態に　することが　ある。"
    en: "The target is struck with an icy-cold beam of energy.\nThis may also leave the target frozen."
    fr: "Un rayon de glace frappe l’ennemi.\nPeut aussi le geler."
    it: "Il bersaglio è colpito da un raggio di energia gelida\nche può anche congelarlo."
    de: "Das Ziel wird von einem Eisstrahl getroffen und friert\neventuell ein."
    es: Rayo de hielo que puede llegar a congelar.
    ko: "냉동빔을\n상대에게 발사하여 공격한다.\n얼음 상태로 만들 때가 있다."
    zh_simp: "向对手发射冰冻光束进行攻击。\n有时会让对手陷入冰冻状态。"
    zh_trad: "向對手發射\n冰凍光束進行攻擊。\n有時會讓對手陷入冰凍狀態。"
tr06:
  names:
    jp_kana: わざレコード０６
    jp_kanji: わざレコード０６
    en: TR06
    fr: DT06
    it: DT06
    de: TP06
    es: DT06
    ko: 기술레코드06
    zh_simp: 招式记录０６
    zh_trad: 招式紀錄０６
  descriptions:
    jp_kana: "はげしい　ふぶきを\nあいてに　ふきつけて　こうげきする。\nこおり　じょうたいに　することが　ある。"
    jp_kanji: "激しい　吹雪を\n相手に　吹きつけて　攻撃する。\nこおり状態に　することが　ある。"
    en: "A howling blizzard is summoned to strike opposing\nPokémon. This may also leave the opposing\nPokémon frozen."
    fr: "Une violente tempête de neige s’abat sur l’ennemi.\nPeut aussi le geler."
    it: "Colpisce i nemici intorno con una tremenda\ntempesta di ghiaccio che può anche congelarli."
    de: "Ein Schneesturm wütet, der gegnerische Pokémon\neinfrieren kann."
    es: Tormenta de hielo que puede llegar a congelar.
    ko: "세찬 눈보라를\n상대에게 내뿜어 공격한다.\n얼음 상태로 만들 때가 있다."
    zh_simp: "将猛烈的暴风雪\n刮向对手进行攻击。\n有时会让对手陷入冰冻状态。"
    zh_trad: "將猛烈的暴風雪\n吹向對手進行攻擊。\n有時會讓對手陷入冰凍狀態。"
tr07:
  names:
    jp_kana: わざレコード０７
    jp_kanji: わざレコード０７
    en: TR07
    fr: DT07
    it: DT07
    de: TP07
    es: DT07
    ko: 기술레코드07
    zh_simp: 招式记录０７
    zh_trad: 招式紀錄０７
  descriptions:
    jp_kana: "あしを　つよく　けり　あいてを\nころばせて　こうげきする。あいてが\nおもいほど　いりょくが　あがる。"
    jp_kanji: "足を　強く　けり\n相手を　転ばせて　攻撃する。\n相手が　重いほど　威力が　あがる。"
    en: "A powerful low kick that makes the target fall over.\nThe heavier the target, the greater the move’s power."
    fr: "Un puissant coup de pied bas qui fauche l’ennemi.\nIl est plus efficace contre les ennemis lourds."
    it: "Un calcio basso e potente che fa cadere il bersaglio.\nDanneggia maggiormente i Pokémon più pesanti."
    de: "Ein Tritt, der das Ziel umwirft. Je schwerer das Ziel ist,\ndesto mehr Schaden fügt ihm die Attacke zu."
    es: "Patada baja que derriba al oponente. Cuanto más pesa\nel objetivo, más daño le causa."
    ko: "발을 강하게 걸고\n상대를 넘어뜨려 공격한다.\n상대가 무거울수록 위력이 올라간다."
    zh_simp: "用力踢对手的脚，\n使其摔倒进行攻击。\n对手越重，威力越大。"
    zh_trad: "用力踢對手的腳，\n讓對手摔倒進行攻擊。\n對手越重，威力越大。"
tr08:
  names:
    jp_kana: わざレコード０８
    jp_kanji: わざレコード０８
    en: TR08
    fr: DT08
    it: DT08
    de: TP08
    es: DT08
    ko: 기술레코드08
    zh_simp: 招式记录０８
    zh_trad: 招式紀錄０８
  descriptions:
    jp_kana: "つよい　でんげきを\nあいてに　あびせて　こうげきする。\nまひ　じょうたいに　することが　ある。"
    jp_kanji: "強い　電撃を\n相手に　浴びせて　攻撃する。\nまひ状態に　することが　ある。"
    en: "A strong electric blast crashes down on the target.\nThis may also leave the target with paralysis."
    fr: "Une grosse décharge électrique tombe sur l’ennemi.\nPeut aussi le paralyser."
    it: "Il bersaglio viene colpito da una potente scarica\nelettrica che può anche paralizzarlo."
    de: "Eine starke Elektro-Attacke, die das Ziel eventuell\nparalysiert."
    es: "Potente ataque eléctrico que puede paralizar al\nobjetivo."
    ko: "강한 전격을\n상대에게 날려서 공격한다.\n마비 상태로 만들 때가 있다."
    zh_simp: "向对手发出强力电击进行攻击。\n有时会让对手陷入麻痹状态。"
    zh_trad: "向對手放出強力電流進行攻擊。\n有時會讓對手陷入麻痺狀態。"
tr09:
  names:
    jp_kana: わざレコード０９
    jp_kanji: わざレコード０９
    en: TR09
    fr: DT09
    it: DT09
    de: TP09
    es: DT09
    ko: 기술레코드09
    zh_simp: 招式记录０９
    zh_trad: 招式紀錄０９
  descriptions:
    jp_kana: "はげしい　かみなりを\nあいてに　おとして　こうげきする。\nまひ　じょうたいに　することが　ある。"
    jp_kanji: "激しい　雷を\n相手に　落として　攻撃する。\nまひ状態に　することが　ある。"
    en: "A wicked thunderbolt is dropped on the target to\ninflict damage. This may also leave the target\nwith paralysis."
    fr: "La foudre tombe sur l’ennemi pour lui infliger\ndes dégâts. Peut aussi le paralyser."
    it: "Il bersaglio è colpito da un fulmine molto violento\nche può anche paralizzarlo."
    de: "Eine verheerende Elektro-Attacke, die das Ziel\neventuell paralysiert."
    es: "Un poderoso rayo que daña al objetivo y puede\nparalizarlo."
    ko: "강한 번개를\n상대에게 떨어뜨려 공격한다.\n마비 상태로 만들 때가 있다."
    zh_simp: "向对手劈下暴雷进行攻击。\n有时会让对手陷入麻痹状态。"
    zh_trad: "向對手劈下暴雷進行攻擊。\n有時會讓對手陷入麻痺狀態。"
tr10:
  names:
    jp_kana: わざレコード１０
    jp_kanji: わざレコード１０
    en: TR10
    fr: DT10
    it: DT10
    de: TP10
    es: DT10
    ko: 기술레코드10
    zh_simp: 招式记录１０
    zh_trad: 招式紀錄１０
  descriptions:
    jp_kana: "じしんの　しょうげきで　じぶんの\nまわりに　いるものを　こうげきする。"
    jp_kanji: "地震の　衝撃で　自分の\n周りに　いるものを　攻撃する。"
    en: "The user sets off an earthquake that strikes every\nPokémon around it."
    fr: "Le lanceur provoque un tremblement de terre\ntouchant tous les Pokémon autour de lui."
    it: "Chi la usa provoca un potente sisma che colpisce\ni Pokémon che ha intorno."
    de: "Ein mächtiges Beben, das alle Pokémon im Umkreis\ntrifft."
    es: "Un terremoto que afecta a todos los Pokémon que\nestén a su alrededor."
    ko: "지진의 충격으로 자신의\n주위에 있는 포켓몬을 공격한다."
    zh_simp: "利用地震的冲击，\n攻击自己周围所有的宝可梦。"
    zh_trad: "用地震的衝擊，\n攻擊自己周圍所有的寶可夢。"
tr11:
  names:
    jp_kana: わざレコード１１
    jp_kanji: わざレコード１１
    en: TR11
    fr: DT11
    it: DT11
    de: TP11
    es: DT11
    ko: 기술레코드11
    zh_simp: 招式记录１１
    zh_trad: 招式紀錄１１
  descriptions:
    jp_kana: "つよい　ねんりきを　あいてに　おくって\nこうげきする。　あいての　とくぼうを\nさげることが　ある。"
    jp_kanji: "強い　念力を　相手に　送って\n攻撃する。　相手の　特防を\nさげることが　ある。"
    en: "The target is hit by a strong telekinetic force.\nThis may also lower the target’s Sp. Def stat."
    fr: "Une puissante force télékinétique frappe l’ennemi.\nPeut aussi faire baisser sa Défense Spéciale."
    it: "Il bersaglio viene colpito da una potente\nforza telecinetica che può anche ridurne\nla Difesa Speciale."
    de: "Starke Psycho-Attacke, die eventuell die\nSpezial-Verteidigung des Zieles senkt."
    es: "Fuerte ataque telequinético que puede bajar la Defensa\nEspecial del objetivo."
    ko: "강한 염동력을 상대에게 보내어\n공격한다. 상대의 특수방어를\n떨어뜨릴 때가 있다."
    zh_simp: "向对手发送强大的念力进行攻击。\n有时会降低对手的特防。"
    zh_trad: "向對手發送\n強大的念力進行攻擊。\n有時會降低對手的特防。"
tr12:
  names:
    jp_kana: わざレコード１２
    jp_kanji: わざレコード１２
    en: TR12
    fr: DT12
    it: DT12
    de: TP12
    es: DT12
    ko: 기술레코드12
    zh_simp: 招式记录１２
    zh_trad: 招式紀錄１２
  descriptions:
    jp_kana: "ちからを　ぬいて　からだを　かるくして\nこうそくで　うごく。\nじぶんの　すばやさを　ぐーんと　あげる。"
    jp_kanji: "力を　ぬいて　体を　軽くして\n高速で　動く。\n自分の　素早さを　ぐーんと　あげる。"
    en: "The user relaxes and lightens its body to move\nfaster. This sharply raises the Speed stat."
    fr: "Le lanceur se relaxe et allège son corps pour beaucoup\naugmenter sa Vitesse."
    it: "Chi la usa rilassa e alleggerisce il proprio corpo\nper far salire di molto la Velocità."
    de: "Entspannt den Körper, um den Initiative-Wert stark\nzu erhöhen."
    es: Relaja el cuerpo para ganar mucha Velocidad.
    ko: "힘을 빼고 몸을 가볍게 해서\n고속으로 움직인다.\n자신의 스피드를 크게 올린다."
    zh_simp: "让身体放松变得轻盈，\n以便高速移动。\n大幅提高自己的速度。"
    zh_trad: "放鬆身體，\n讓自己變得輕盈以進行高速移動。\n可大幅提高自己的速度。"
tr13:
  names:
    jp_kana: わざレコード１３
    jp_kanji: わざレコード１３
    en: TR13
    fr: DT13
    it: DT13
    de: TP13
    es: DT13
    ko: 기술레코드13
    zh_simp: 招式记录１３
    zh_trad: 招式紀錄１３
  descriptions:
    jp_kana: "ふかく　いきを　すい　きあいを　こめる。\nじぶんの　こうげきが\nきゅうしょに　あたりやすく　なる。"
    jp_kanji: "深く　息を　吸い　気合を　こめる。\n自分の　攻撃が\n急所に　当たりやすくなる。"
    en: "The user takes a deep breath and focuses so that\ncritical hits land more easily."
    fr: "Le lanceur prend une profonde inspiration\net se concentre pour augmenter son taux de critiques."
    it: "Chi la usa fa un profondo respiro e si concentra\nper rendere più probabili i brutti colpi."
    de: "Anwender atmet ein und bündelt Kraft.\nDie Volltrefferquote steigt dadurch."
    es: "Concentra energía para aumentar las posibilidades de\nasestar un golpe crítico."
    ko: "깊게 숨을 들이마셔 기합을 넣는다.\n자신의 공격이\n급소에 맞기 쉬워진다."
    zh_simp: "深深地吸口气，集中精神。\n自己的攻击会变得\n容易击中要害。"
    zh_trad: "深呼吸後集中精神。\n讓自己的攻擊\n變得容易擊中要害。"
tr14:
  names:
    jp_kana: わざレコード１４
    jp_kanji: わざレコード１４
    en: TR14
    fr: DT14
    it: DT14
    de: TP14
    es: DT14
    ko: 기술레코드14
    zh_simp: 招式记录１４
    zh_trad: 招式紀錄１４
  descriptions:
    jp_kana: "ゆびをふり　じぶんの　のうを　しげきして\nすべての　わざの　なかから\nどれか　１つを　くりだす。"
    jp_kanji: "指をふり　自分の　脳を　刺激して\nすべての　技の　なかから\nどれか　１つを　くりだす。"
    en: "The user waggles a finger and stimulates its brain\ninto randomly using nearly any move."
    fr: "Le lanceur agite un doigt et stimule son cerveau pour\nutiliser presque n’importe quelle capacité au hasard."
    it: "Chi la usa fa di no con il dito e stimola il cervello\na usare a caso una delle tante mosse esistenti."
    de: "Bewegt Finger, um das Gehirn zu stimulieren.\nWählt zufällig eine Attacke aus."
    es: "Mueve un dedo y estimula su cerebro para usar al azar\ncasi cualquier movimiento."
    ko: "손가락을 흔들어 자신의 뇌를\n자극해서 모든 기술 중\n어느 하나를 날린다."
    zh_simp: "挥动手指刺激自己的大脑，\n从所有的招式中\n任意使出１个。"
    zh_trad: "揮動手指刺激自己的大腦，\n從全部的招式中\n隨機選出１招使出。"
tr15:
  names:
    jp_kana: わざレコード１５
    jp_kanji: わざレコード１５
    en: TR15
    fr: DT15
    it: DT15
    de: TP15
    es: DT15
    ko: 기술레코드15
    zh_simp: 招式记录１５
    zh_trad: 招式紀錄１５
  descriptions:
    jp_kana: "だいのじの　ほのおで\nあいてを　やきつくす。\nやけど　じょうたいに　することが　ある。"
    jp_kanji: "大の字の　炎で\n相手を　焼きつくす。\nやけど状態に　することが　ある。"
    en: "The target is attacked with an intense blast of\nall-consuming fire. This may also leave the target\nwith a burn."
    fr: "Un déluge de flammes ardentes submerge l’ennemi.\nPeut aussi le brûler."
    it: "Investe il bersaglio con un’intensa fiammata\nche fa terra bruciata. Può anche scottarlo."
    de: "Feuersbrunst, die das Ziel versengt und ihm eventuell\neine Verbrennung zufügt."
    es: "Llama intensa que chamusca y puede causar\nquemaduras."
    ko: "큰대자의 불꽃으로\n상대를 불태운다.\n화상 상태로 만들 때가 있다."
    zh_simp: "用大字形状的火焰烧净对手。\n有时会让对手陷入灼伤状态。"
    zh_trad: "用大字形狀的火焰燒盡對手。\n有時會讓對手陷入灼傷狀態。"
tr16:
  names:
    jp_kana: わざレコード１６
    jp_kanji: わざレコード１６
    en: TR16
    fr: DT16
    it: DT16
    de: TP16
    es: DT16
    ko: 기술레코드16
    zh_simp: 招式记录１６
    zh_trad: 招式紀錄１６
  descriptions:
    jp_kana: "すごい　いきおいで　あいてに　つっこむ。\nあいてを　ひるませる　ことが　ある。"
    jp_kanji: "すごい　勢いで　相手に　つっこむ。\n相手を　ひるませることが　ある。"
    en: "The user charges at the target and may make\nit flinch."
    fr: "Le lanceur charge l’ennemi à une vitesse remarquable,\nce qui peut l’apeurer."
    it: "Chi la usa carica il bersaglio a grande velocità e può\nfarlo tentennare."
    de: "Eine mächtige Attacke, durch die das Ziel eventuell\nzurückschreckt."
    es: "Embiste con un gran impulso que puede llegar a\namedrentar."
    ko: "굉장한 기세로 상대에게 돌진한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "以惊人的气势扑向对手。\n有时会使对手畏缩。"
    zh_trad: "以驚人的氣勢撲向對手。\n有時會讓對手畏縮。"
tr17:
  names:
    jp_kana: わざレコード１７
    jp_kanji: わざレコード１７
    en: TR17
    fr: DT17
    it: DT17
    de: TP17
    es: DT17
    ko: 기술레코드17
    zh_simp: 招式记录１７
    zh_trad: 招式紀錄１７
  descriptions:
    jp_kana: "あたまを　からにして\nいっしゅん　なにかを　わすれる　ことで\nじぶんの　とくぼうを　ぐーんと　あげる。"
    jp_kanji: "頭を　からにして\n一瞬　なにかを　忘れることで\n自分の　特防を　ぐーんと　あげる。"
    en: "The user temporarily empties its mind to forget its\nconcerns. This sharply raises the user’s Sp. Def stat."
    fr: "Le lanceur fait le vide dans son esprit pour oublier\nses soucis. Augmente beaucoup sa Défense Spéciale."
    it: "Chi la usa svuota per un po’ la mente per dimenticare\ni problemi. La Difesa Speciale aumenta di molto."
    de: "Gedächtnisverlust, der die Spezial-Verteidigung\nstark erhöht."
    es: "El usuario olvida sus preocupaciones y aumenta mucho\nla Defensa Especial."
    ko: "머리를 비워서 순간적으로\n무언가를 잊어버림으로써\n자신의 특수방어를 크게 올린다."
    zh_simp: "将头脑清空，\n瞬间忘记某事，\n从而大幅提高自己的特防。"
    zh_trad: "將頭腦清空，\n藉由在一瞬間遺忘某些事\n大幅提高自己的特防。"
tr18:
  names:
    jp_kana: わざレコード１８
    jp_kanji: わざレコード１８
    en: TR18
    fr: DT18
    it: DT18
    de: TP18
    es: DT18
    ko: 기술레코드18
    zh_simp: 招式记录１８
    zh_trad: 招式紀錄１８
  descriptions:
    jp_kana: "ちを　すいとって　あいてを\nこうげきする。　あたえた　ダメージの\nはんぶんの　ＨＰを　かいふく　できる。"
    jp_kanji: "血を　吸い取って　相手を\n攻撃する。　与えた　ダメージの\n半分の　ＨＰを　回復できる。"
    en: "The user drains the target’s blood. The user’s HP is\nrestored by half the damage taken by the target."
    fr: "Une attaque qui aspire le sang de l’ennemi.\nLa moitié des dégâts sont convertis en PV\npour le lanceur."
    it: "Mossa succhiasangue. Chi la usa recupera una\nquantità di PS pari alla metà del danno inferto."
    de: "Der Anwender saugt dem Ziel Blut ab. Die Hälfte des\nzugefügten Schadens wird dem Anwender als KP\ngutgeschrieben."
    es: "Restaura al usuario la mitad del daño causado al\nobjetivo."
    ko: "피를 빨아서 상대를\n공격한다. 준 데미지의\n절반을 HP로 회복한다."
    zh_simp: "吸取血液攻击对手。\n可以回复给予对手伤害的一半ＨＰ。"
    zh_trad: "吸取對手的血液進行攻擊。\n可以回復給予對手\n傷害的一半ＨＰ。"
tr19:
  names:
    jp_kana: わざレコード１９
    jp_kanji: わざレコード１９
    en: TR19
    fr: DT19
    it: DT19
    de: TP19
    es: DT19
    ko: 기술레코드19
    zh_simp: 招式记录１９
    zh_trad: 招式紀錄１９
  descriptions:
    jp_kana: "３つの　こうせんで　こうげきする。\nまひか　やけどか　こおりじょうたいの\nどれかに　することが　ある。"
    jp_kanji: "３つの　光線で　攻撃する。\nまひか　やけどか　こおり状態の\nどれかに　することが　ある。"
    en: "The user strikes with a simultaneous three-beam attack.\nThis may also burn, freeze, or paralyze the target."
    fr: "Le lanceur envoie trois boules d’énergie simultanément.\nPeut aussi paralyser, brûler ou geler l’ennemi."
    it: "Colpisce il bersaglio con tre raggi di luce che\npossono paralizzarlo, scottarlo o congelarlo."
    de: "Feuert drei Strahlen ab. Verursacht eventuell Paralyse,\nVerbrennung oder Einfrieren."
    es: "Ataque triple que puede paralizar, quemar o congelar al\nobjetivo."
    ko: "3개의 광선으로 공격한다.\n마비, 화상 또는 얼음 상태 중\n어느 하나로 만들 때가 있다."
    zh_simp: "用３种光线进行攻击。\n有时会让对手陷入\n麻痹、灼伤或冰冻的状态。"
    zh_trad: "用３種光線進行攻擊。\n有時會讓對手陷入\n麻痺、灼傷或冰凍的狀態。"
tr20:
  names:
    jp_kana: わざレコード２０
    jp_kanji: わざレコード２０
    en: TR20
    fr: DT20
    it: DT20
    de: TP20
    es: DT20
    ko: 기술레코드20
    zh_simp: 招式记录２０
    zh_trad: 招式紀錄２０
  descriptions:
    jp_kana: "じぶんの　ＨＰを　すこし　けずって\nぶんしんを　だす。\nぶんしんは　じぶんの　みがわりに　なる。"
    jp_kanji: "自分の　ＨＰを　少し　削って\n分身を　だす。\n分身は　自分の　身代わりに　なる。"
    en: "The user creates a substitute for itself using some of\nits HP. The substitute serves as the user’s decoy."
    fr: "Le lanceur crée un clone en sacrifiant quelques PV.\nCe clone sert de leurre."
    it: "Chi la usa crea una copia di se stesso usando alcuni PS.\nLa copia serve come esca per il nemico."
    de: "Anwender setzt eine kleine Menge an KP ein, um einen\nDoppelgänger zu erzeugen, der für ihn Schläge\neinsteckt."
    es: "Utiliza parte de los PS propios para crear un sustituto\nque actúa como señuelo."
    ko: "자신의 HP를 조금 깎아서\n분신을 만든다.\n분신은 자신의 대타가 된다."
    zh_simp: "削减少许自己的ＨＰ，\n制造分身。\n分身将成为自己的替身。"
    zh_trad: "消耗一些自己的ＨＰ，\n製造分身。\n分身將成為自己的替身。"
tr21:
  names:
    jp_kana: わざレコード２１
    jp_kanji: わざレコード２１
    en: TR21
    fr: DT21
    it: DT21
    de: TP21
    es: DT21
    ko: 기술레코드21
    zh_simp: 招式记录２１
    zh_trad: 招式紀錄２１
  descriptions:
    jp_kana: "ちからを　ふりしぼり　こうげきする。\nじぶんの　ＨＰが　すくないほど\nわざの　いりょくは　あがる。"
    jp_kanji: "力を　ふりしぼり　攻撃する。\n自分の　ＨＰが　少ないほど\n技の　威力は　あがる。"
    en: "An all-out attack that becomes more powerful the\nless HP the user has."
    fr: "Le lanceur ne retient plus ses coups.\nPlus ses PV sont bas, plus l’attaque est puissante."
    it: "Chi la usa attacca con tutte le sue forze.\nPiù i PS sono bassi, maggiore è la potenza\ndi questa mossa."
    de: Richtet mehr Schaden an, wenn eigene KP niedrig sind.
    es: "Ataque desesperado que causa más daño cuantos\nmenos PS tenga el usuario."
    ko: "힘을 쥐어짜서 공격한다.\n자신의 HP가 적을수록\n기술의 위력이 올라간다."
    zh_simp: "竭尽全力进行攻击。\n自己的ＨＰ越少，\n招式的威力越大。"
    zh_trad: "竭盡全力進行攻擊。\n自己的ＨＰ越少，\n招式的威力越大。"
tr22:
  names:
    jp_kana: わざレコード２２
    jp_kanji: わざレコード２２
    en: TR22
    fr: DT22
    it: DT22
    de: TP22
    es: DT22
    ko: 기술레코드22
    zh_simp: 招式记录２２
    zh_trad: 招式紀錄２２
  descriptions:
    jp_kana: "きたない　ヘドロを\nあいてに　なげつけて　こうげきする。\nどく　じょうたいに　することが　ある。"
    jp_kanji: "汚い　ヘドロを\n相手に　投げつけて　攻撃する。\n毒状態に　することが　ある。"
    en: "Unsanitary sludge is hurled at the target. This may\nalso poison the target."
    fr: "Des détritus toxiques sont projetés sur l’ennemi.\nPeut aussi l’empoisonner."
    it: "Chi la usa lancia fango malsano sul bersaglio.\nPuò anche avvelenarlo."
    de: "Wirft Schlamm auf das Ziel. Dieses wird eventuell\nvergiftet."
    es: Arroja residuos al objetivo. Puede llegar a envenenar.
    ko: "더러운 오물을\n상대에게 내던져서 공격한다.\n독 상태로 만들 때가 있다."
    zh_simp: "用污泥投掷对手进行攻击。\n有时会让对手陷入中毒状态。"
    zh_trad: "向對手投擲污泥進行攻擊。\n有時會讓對手陷入中毒狀態。"
tr23:
  names:
    jp_kana: わざレコード２３
    jp_kanji: わざレコード２３
    en: TR23
    fr: DT23
    it: DT23
    de: TP23
    es: DT23
    ko: 기술레코드23
    zh_simp: 招式记录２３
    zh_trad: 招式紀錄２３
  descriptions:
    jp_kana: "あいての　あしもとに　まきびしを\nしかける。こうたいで　でてきた　あいての\nポケモンに　ダメージを　あたえる。"
    jp_kanji: "相手の　足下に　まきびしを\nしかける。交代で　でてきた　相手の\nポケモンに　ダメージを　与える。"
    en: "The user lays a trap of spikes at the opposing\nteam’s feet. The trap hurts Pokémon that switch\ninto battle."
    fr: "Le lanceur disperse des piquants sur le sol pour blesser\ntout ennemi qui entre au combat."
    it: "Chi la usa piazza sul terreno una trappola di punte\nche danneggia i nemici quando scendono in campo."
    de: "Der Anwender legt Stacheln aus, die gegnerische\nPokémon verletzen, die in den Kampf gerufen\nwerden."
    es: "Esparce púas alrededor del equipo rival que hieren a\nlos Pokémon rivales que entran en combate."
    ko: "상대의 발밑에 압정을\n뿌린다. 교체된 상대\n포켓몬에게 데미지를 준다."
    zh_simp: "在对手的脚下扔撒菱。\n对替换出场的\n对手的宝可梦给予伤害。"
    zh_trad: "將撒菱散布在對手的腳下。\n讓對手替換出場的寶可夢\n受到傷害。"
tr24:
  names:
    jp_kana: わざレコード２４
    jp_kanji: わざレコード２４
    en: TR24
    fr: DT24
    it: DT24
    de: TP24
    es: DT24
    ko: 기술레코드24
    zh_simp: 招式记录２４
    zh_trad: 招式紀錄２４
  descriptions:
    jp_kana: "２ー３ターンの　あいだ\nあばれまくって　こうげきする。\nあばれた　あとは　こんらん　する。"
    jp_kanji: "２ー３ターンの　間\n暴れまくって　攻撃する。\n暴れたあとは　混乱する。"
    en: "The user rampages and attacks for two to three\nturns. The user then becomes confused."
    fr: "Le lanceur enrage et attaque pendant deux ou trois tours\navant de devenir confus."
    it: "Chi la usa sfoga la sua ira e attacca il nemico\nper due o tre turni prima di essere lasciato\nin preda alla confusione."
    de: "Attacke über zwei bis drei Runden, die den Anwender\ndanach verwirrt."
    es: "Ataca de dos a tres turnos y acaba confundiendo al\nagresor."
    ko: "2~3턴 동안\n마구 난동 부려서 공격한다.\n난동 부린 뒤에는 혼란에 빠진다."
    zh_simp: "在２～３回合内，\n乱打一气地进行攻击。\n大闹一番后自己会陷入混乱。"
    zh_trad: "在２～３回合內\n瘋狂亂打對手進行攻擊。\n大鬧一番後自己會陷入混亂。"
tr25:
  names:
    jp_kana: わざレコード２５
    jp_kanji: わざレコード２５
    en: TR25
    fr: DT25
    it: DT25
    de: TP25
    es: DT25
    ko: 기술레코드25
    zh_simp: 招式记录２５
    zh_trad: 招式紀錄２５
  descriptions:
    jp_kana: "ふしぎな　ねんぱを　じったいかして\nあいてを　こうげきする。\nぶつりてきな　ダメージを　あたえる。"
    jp_kanji: "不思議な　念波を　実体化して\n相手を　攻撃する。\n物理的な　ダメージを　与える。"
    en: "The user materializes an odd psychic wave to attack\nthe target. This attack does physical damage."
    fr: "Le lanceur matérialise des ondes mystérieuses\nqu’il projette sur l’ennemi. Inflige des dégâts physiques."
    it: "Chi la usa attacca il bersaglio facendo materializzare\nmisteriose onde psichiche che provocano danni fisici."
    de: "Anwender erzeugt eine seltsame Energiewelle, die dem\nZiel physischen Schaden zufügt."
    es: "Crea una onda psíquica que causa daño físico al\nobjetivo."
    ko: "이상한 염력파를 실체화하여\n상대를 공격한다.\n물리적인 데미지를 준다."
    zh_simp: "将神奇的念波实体化攻击对手。\n给予物理伤害。"
    zh_trad: "將神奇的念力波實體化後攻擊對手。\n給予對手物理傷害。"
tr26:
  names:
    jp_kana: わざレコード２６
    jp_kanji: わざレコード２６
    en: TR26
    fr: DT26
    it: DT26
    de: TP26
    es: DT26
    ko: 기술레코드26
    zh_simp: 招式记录２６
    zh_trad: 招式紀錄２６
  descriptions:
    jp_kana: "こうげきを　うけても\nＨＰを　かならず　１だけ　のこせる。\nれんぞくで　だすと　しっぱい　しやすい。"
    jp_kanji: "攻撃を　受けても\nＨＰを　必ず　１だけ　残せる。\n連続で　だすと　失敗しやすい。"
    en: "The user endures any attack with at least 1 HP.\nIts chance of failing rises if it is used in succession."
    fr: "Le lanceur résiste aux attaques avec 1 PV.\nPeut échouer si utilisée plusieurs fois de suite."
    it: "Chi la usa resta con un PS anche se subisce un colpo\nda KO in quel turno. Usata in successione può fallire."
    de: "Nach fatalen Attacken bleibt stets 1 KP übrig.\nMisserfolg bei Wiederholung möglich."
    es: "Resiste cualquier ataque y deja al menos 1 PS.\nPuede fallar si se usa repetidamente."
    ko: "공격을 받아도\nHP를 반드시 1만큼은 남긴다.\n연속으로 쓰면 실패하기 쉽다."
    zh_simp: "即使受到攻击，\n也至少会留下１ＨＰ。\n连续使出则容易失败。"
    zh_trad: "即使受到再強烈的攻擊，\n也一定會剩下１ＨＰ。\n連續使用時容易失敗。"
tr27:
  names:
    jp_kana: わざレコード２７
    jp_kanji: わざレコード２７
    en: TR27
    fr: DT27
    it: DT27
    de: TP27
    es: DT27
    ko: 기술레코드27
    zh_simp: 招式记录２７
    zh_trad: 招式紀錄２７
  descriptions:
    jp_kana: "じぶんが　おぼえている　わざの　うち\nどれか　１つを　くりだす。\nじぶんが　ねている　ときだけ　つかえる。"
    jp_kanji: "自分が　おぼえている　技の　うち\nどれか　１つを　くりだす。\n自分が　寝ているときだけ　使える。"
    en: "While it is asleep, the user randomly uses one of the\nmoves it knows."
    fr: "Le lanceur utilise une de ses capacités au hasard\npendant qu’il dort."
    it: "Chi la usa sferra a caso una delle proprie mosse\nmentre sta dormendo."
    de: "Anwender setzt per Zufall eine ihm bekannte Attacke\nein. Klappt nur, wenn der Anwender gerade schläft."
    es: "Mientras duerme, usa uno de sus movimientos elegido\nal azar."
    ko: "자신이 배운 기술 중\n하나를 무작위로 날린다.\n자신이 잠들어 있을 때만 쓸 수 있다."
    zh_simp: "从自己已学会的招式中\n任意使出１个。\n只能在自己睡觉时使用。"
    zh_trad: "從自己已學會的招式中\n隨機選出１個使出。\n只有在睡眠狀態時可以使用。"
tr28:
  names:
    jp_kana: わざレコード２８
    jp_kanji: わざレコード２８
    en: TR28
    fr: DT28
    it: DT28
    de: TP28
    es: DT28
    ko: 기술레코드28
    zh_simp: 招式记录２８
    zh_trad: 招式紀錄２８
  descriptions:
    jp_kana: "かたくて　りっぱな　つので　おもいっきり\nあいてを　つきさして　こうげきする。"
    jp_kanji: "硬くて　りっぱな　つので　おもいっきり\n相手を　突き刺して　攻撃する。"
    en: "Using its tough and impressive horn, the user rams\ninto the target with no letup."
    fr: "Le lanceur utilise ses gigantesques cornes\npour charger l’ennemi."
    it: "Chi la usa utilizza il suo robusto e imponente\ncorno per colpire il bersaglio con tutto se stesso."
    de: "Brutaler Ramm-Angriff mit spitzem,\nbeeindruckendem Horn."
    es: Violenta embestida con cuernos imponentes.
    ko: "단단하고 훌륭한 뿔로 힘껏\n상대를 꿰찔러서 공격한다."
    zh_simp: "用坚硬且华丽的角狠狠地\n刺入对手进行攻击。"
    zh_trad: "用堅硬且華麗的角狠狠地\n刺進對手進行攻擊。"
tr29:
  names:
    jp_kana: わざレコード２９
    jp_kanji: わざレコード２９
    en: TR29
    fr: DT29
    it: DT29
    de: TP29
    es: DT29
    ko: 기술레코드29
    zh_simp: 招式记录２９
    zh_trad: 招式紀錄２９
  descriptions:
    jp_kana: "ひかえの　ポケモンと　いれかわる。\nのうりょく　へんかは　かわった\nポケモンが　そのまま　うけつぐ。"
    jp_kanji: "控えの　ポケモンと　入れ替わる。\n能力変化は　替わった\nポケモンが　そのまま　受けつぐ。"
    en: "The user switches places with a party Pokémon in\nwaiting and passes along any stat changes."
    fr: "Le lanceur échange sa place et tout changement\nde stat avec un Pokémon de l’équipe."
    it: "Chi la usa è sostituito da un Pokémon della squadra,\nche eredita anche ogni modifica alle statistiche."
    de: "Tauscht den Anwender aus und überträgt alle\nStatusveränderungen auf das eingewechselte\nPokémon."
    es: "Cambia el puesto con otro miembro del equipo y le\npasa los cambios de características."
    ko: "교대 포켓몬과 바뀐다.\n능력 변화는 바뀐 포켓몬이\n그대로 이어받는다."
    zh_simp: "和后备宝可梦进行替换。\n换上的宝可梦\n能直接继承其能力的变化。"
    zh_trad: "與後備寶可夢進行替換。\n替換上場的寶可夢，\n將承接目前寶可夢的能力變化。"
tr30:
  names:
    jp_kana: わざレコード３０
    jp_kanji: わざレコード３０
    en: TR30
    fr: DT30
    it: DT30
    de: TP30
    es: DT30
    ko: 기술레코드30
    zh_simp: 招式记录３０
    zh_trad: 招式紀錄３０
  descriptions:
    jp_kana: "あいてに　アンコールした　わざを\n３かい　つづけて　ださせる。"
    jp_kanji: "相手に　アンコールした　技を\n３回　続けて　出させる。"
    en: "The user compels the target to keep using the move\nit encored for three turns."
    fr: "Oblige l’ennemi à répéter la dernière capacité utilisée\ndurant trois tours."
    it: "Chi la usa obbliga il bersaglio a ripetere per tre\nturni l’ultima mossa eseguita."
    de: Das Ziel wiederholt die letzte Attacke drei Runden lang.
    es: "El objetivo repite su último movimiento durante tres\nturnos."
    ko: "상대에게 앵콜시킨 기술을\n3번 연속으로 쓰게 한다."
    zh_simp: "让对手接受再来一次，\n连续３次使出最后使用的招式。"
    zh_trad: "要求對手再來一次，\n讓對手連續３次\n使出最近一次使用的招式。"
tr31:
  names:
    jp_kana: わざレコード３１
    jp_kanji: わざレコード３１
    en: TR31
    fr: DT31
    it: DT31
    de: TP31
    es: DT31
    ko: 기술레코드31
    zh_simp: 招式记录３１
    zh_trad: 招式紀錄３１
  descriptions:
    jp_kana: "かたい　しっぽで　あいてを　たたきつけて\nこうげきする。　あいての　ぼうぎょを\nさげることが　ある。"
    jp_kanji: "硬い　しっぽで\n相手を　たたきつけて　攻撃する。\n相手の　防御を　さげることが　ある。"
    en: "The target is slammed with a steel-hard tail.\nThis may also lower the target’s Defense stat."
    fr: "Attaque l’ennemi avec une queue de fer.\nPeut aussi baisser sa Défense."
    it: "Il bersaglio viene colpito da una robusta coda\nd’acciaio che può anche ridurne la Difesa."
    de: "Attacke mit hartem Eisenschweif. Senkt eventuell den\nVerteidigungs-Wert des Zieles."
    es: "Ataca con una cola férrea y puede bajar la Defensa\ndel objetivo."
    ko: "단단한 꼬리로\n상대를 힘껏 쳐서 공격한다.\n상대의 방어를 떨어뜨릴 때가 있다."
    zh_simp: "使用坚硬的尾巴\n摔打对手进行攻击。\n有时会降低对手的防御。"
    zh_trad: "將堅硬的尾巴\n甩向對手進行攻擊。\n有時會降低對手的防禦。"
tr32:
  names:
    jp_kana: わざレコード３２
    jp_kanji: わざレコード３２
    en: TR32
    fr: DT32
    it: DT32
    de: TP32
    es: DT32
    ko: 기술레코드32
    zh_simp: 招式记录３２
    zh_trad: 招式紀錄３２
  descriptions:
    jp_kana: "するどい　はで　あいてを　かみくだいて\nこうげきする。あいての　ぼうぎょを\nさげることが　ある。"
    jp_kanji: "鋭い　歯で\n相手を　かみくだいて　攻撃する。\n相手の　防御を　さげることが　ある。"
    en: "The user crunches up the target with sharp fangs.\nThis may also lower the target’s Defense stat."
    fr: "Le lanceur mord l’ennemi de ses crocs pointus.\nPeut aussi baisser sa Défense."
    it: "Il bersaglio viene morso con denti affilati.\nPuò anche ridurne la Difesa."
    de: "Beißt mit scharfen Reißzähnen zu und senkt eventuell\ndie Verteidigung."
    es: "Tritura con afilados colmillos y puede bajar la Defensa\ndel objetivo."
    ko: "날카로운 이빨로\n상대를 깨물어 부숴서 공격한다.\n상대의 방어를 떨어뜨릴 때가 있다."
    zh_simp: "用利牙咬碎对手进行攻击。\n有时会降低对手的防御。"
    zh_trad: "用尖銳的牙齒咬碎對手進行攻擊。\n有時會降低對手的防禦。"
tr33:
  names:
    jp_kana: わざレコード３３
    jp_kanji: わざレコード３３
    en: TR33
    fr: DT33
    it: DT33
    de: TP33
    es: DT33
    ko: 기술레코드33
    zh_simp: 招式记录３３
    zh_trad: 招式紀錄３３
  descriptions:
    jp_kana: "くろいかげの　かたまりを　なげつけて\nこうげきする。　あいての　とくぼうを\nさげることが　ある。"
    jp_kanji: "黒い影の　塊を　投げつけて\n攻撃する。　相手の　特防を\nさげることが　ある。"
    en: "The user hurls a shadowy blob at the target.\nThis may also lower the target’s Sp. Def stat."
    fr: "Projette une grande ombre sur l’ennemi.\nPeut aussi faire baisser sa Défense Spéciale."
    it: "Lancia sul bersaglio una sfera nera.\nPuò anche ridurne la Difesa Speciale."
    de: "Bewirft das Ziel mit einem gruseligen Ball und senkt\neventuell dessen Spezial-Verteidigung."
    es: "Lanza una bola oscura que puede bajar la Defensa\nEspecial del objetivo."
    ko: "까만 그림자의 덩어리를 내던져서\n공격한다. 상대의 특수방어를\n떨어뜨릴 때가 있다."
    zh_simp: "投掷一团黑影进行攻击。\n有时会降低对手的特防。"
    zh_trad: "投擲一團黑影進行攻擊。\n有時會降低對手的特防。"
tr34:
  names:
    jp_kana: わざレコード３４
    jp_kanji: わざレコード３４
    en: TR34
    fr: DT34
    it: DT34
    de: TP34
    es: DT34
    ko: 기술레코드34
    zh_simp: 招式记录３４
    zh_trad: 招式紀錄３４
  descriptions:
    jp_kana: "わざを　つかった　２ターン　あとに\nあいてに　ねんりきの\nかたまりを　おくって　こうげきする。"
    jp_kanji: "技を　使った　２ターン後に\n相手に　念力の\n塊を　送って　攻撃する。"
    en: "Two turns after this move is used, a hunk of psychic\nenergy attacks the target."
    fr: "De l’énergie psychique vient frapper l’ennemi\ndeux tours après l’utilisation de cette capacité."
    it: "Due turni dopo l’utilizzo di questa mossa,\nil bersaglio viene attaccato con energia psichica."
    de: "Zwei Runden, nachdem Seher eingesetzt wurde,\nerfolgt ein Angriff mit Psycho-Energie."
    es: "Concentra energía psíquica para golpear al objetivo dos\nturnos después."
    ko: "기술을 사용한 2턴 뒤에\n상대에게 염동력의\n덩어리를 보내어 공격한다."
    zh_simp: "在使用招式２回合后，\n向对手发送一团念力进行攻击。"
    zh_trad: "使用招式的２回合後，\n向對手發送一團念力進行攻擊。"
tr35:
  names:
    jp_kana: わざレコード３５
    jp_kanji: わざレコード３５
    en: TR35
    fr: DT35
    it: DT35
    de: TP35
    es: DT35
    ko: 기술레코드35
    zh_simp: 招式记录３５
    zh_trad: 招式紀錄３５
  descriptions:
    jp_kana: "３ターンの　あいだ\nさわいで　あいてを　こうげきする。\nそのあいだは　だれも　ねむれなく　なる。"
    jp_kanji: "３ターンの　間\n騒いで　相手を　攻撃する。\nそのあいだは　だれも　眠れなくなる。"
    en: "The user attacks in an uproar for three turns.\nDuring that time, no Pokémon can fall asleep."
    fr: "Le lanceur attaque en rugissant durant trois tours.\nPendant ce temps, aucun Pokémon ne peut s’endormir."
    it: "Chi la usa attacca per tre turni con un frastuono\nche non fa dormire nessuno."
    de: "Anwender greift an, indem er über drei Runden hinweg\neinen Aufruhr erzeugt. Verhindert Schlaf."
    es: "Ataca de forma alborotada durante tres turnos.\nMantiene despiertos a todos."
    ko: "3턴 동안\n소란 피워 공격한다.\n그동안은 아무도 잠들지 않게 된다."
    zh_simp: "在３回合内\n用骚乱攻击对手。\n在此期间谁都不能入眠。"
    zh_trad: "在３回合內\n大吵大鬧攻擊對手。\n在此期間誰都無法入眠。"
tr36:
  names:
    jp_kana: わざレコード３６
    jp_kanji: わざレコード３６
    en: TR36
    fr: DT36
    it: DT36
    de: TP36
    es: DT36
    ko: 기술레코드36
    zh_simp: 招式记录３６
    zh_trad: 招式紀錄３６
  descriptions:
    jp_kana: "あつい　いきを\nあいてに　ふきつけて　こうげきする。\nやけど　じょうたいに　することが　ある。"
    jp_kanji: "熱い　息を\n相手に　吹きつけて　攻撃する。\nやけど状態に　することが　ある。"
    en: "The user attacks by exhaling hot breath on opposing\nPokémon. This may also leave those Pokémon with\na burn."
    fr: "Le lanceur provoque une vague de chaleur.\nPeut aussi brûler l’ennemi."
    it: "Chi la usa investe i nemici che ha intorno con\nuna folata di vento caldo. Può anche scottarli."
    de: "Gegnerische Pokémon werden von einem Sturm aus\nheißer Luft getroffen und erleiden eventuell\nVerbrennungen."
    es: "Provoca un viento abrasador que puede quemar al\nobjetivo."
    ko: "뜨거운 숨결을\n상대에게 내뿜어 공격한다.\n화상 상태로 만들 때가 있다."
    zh_simp: "将炎热的气息\n吹向对手进行攻击。\n有时会让对手陷入灼伤状态。"
    zh_trad: "將炎熱的氣息\n吹向對手進行攻擊。\n有時會讓對手陷入灼傷狀態。"
tr37:
  names:
    jp_kana: わざレコード３７
    jp_kanji: わざレコード３７
    en: TR37
    fr: DT37
    it: DT37
    de: TP37
    es: DT37
    ko: 기술레코드37
    zh_simp: 招式记录３７
    zh_trad: 招式紀錄３７
  descriptions:
    jp_kana: "あいてを　おこらせる。　３ターンの\nあいだ　あいては　ダメージを\nあたえる　わざしか　だせなく　なる。"
    jp_kanji: "相手を　怒らせる。　３ターンの\n間　相手は　ダメージを\n与える　技しか　だせなくなる。"
    en: "The target is taunted into a rage that allows it to use\nonly attack moves for three turns."
    fr: "Provoque l’ennemi. L’oblige à n’utiliser que des attaques\npendant trois tours."
    it: "Provoca il bersaglio inducendolo a usare solo mosse\nd’attacco per tre turni."
    de: "Bringt das Ziel in Rage. Dieses kann über drei Runden\nhinweg nur noch angreifen."
    es: "Enfurece al objetivo para que solo use movimientos de\nataque durante tres turnos."
    ko: "상대를 화나게 한다.\n3턴 동안 상대는 데미지를\n주는 기술밖에 쓸 수 없게 된다."
    zh_simp: "使对手愤怒。\n在３回合内让对手只能使出\n给予伤害的招式。"
    zh_trad: "激怒對手。\n在３回合內讓對手\n只能使出給予傷害的招式。"
tr38:
  names:
    jp_kana: わざレコード３８
    jp_kanji: わざレコード３８
    en: TR38
    fr: DT38
    it: DT38
    de: TP38
    es: DT38
    ko: 기술레코드38
    zh_simp: 招式记录３８
    zh_trad: 招式紀錄３８
  descriptions:
    jp_kana: "あいての　すきを　ついて\nじぶんと　あいての\nもちものを　こうかんする。"
    jp_kanji: "相手の　すきを　ついて\n自分と　相手の\n持ち物を　交換する。"
    en: "The user catches the target off guard and swaps its\nheld item with its own."
    fr: "Le lanceur prend la cible au dépourvu\net l’oblige à échanger son objet contre le sien."
    it: "Chi la usa coglie il bersaglio in contropiede e lo\nobbliga a scambiare il suo strumento con il proprio."
    de: "Der Anwender überrumpelt das Ziel und tauscht mit\nihm die getragenen Items."
    es: Engaña al objetivo desprevenido e intercambia objetos.
    ko: "상대의 빈틈을 노려\n자신과 상대가 지닌 물건을\n바꿔치기한다."
    zh_simp: "抓住对手的空隙，\n交换自己和对手的持有物。"
    zh_trad: "在對手露出空隙時，\n趁機交換自己和對手的持有物。"
tr39:
  names:
    jp_kana: わざレコード３９
    jp_kanji: わざレコード３９
    en: TR39
    fr: DT39
    it: DT39
    de: TP39
    es: DT39
    ko: 기술레코드39
    zh_simp: 招式记录３９
    zh_trad: 招式紀錄３９
  descriptions:
    jp_kana: "すごい　ちからを　はっきして\nあいてを　こうげきする。じぶんの\nこうげきと　ぼうぎょが　さがる。"
    jp_kanji: "すごい　力を　発揮して\n相手を　攻撃する。自分の\n攻撃と　防御が　さがる。"
    en: "The user attacks the target with great power.\nHowever, this also lowers the user’s Attack and\nDefense stats."
    fr: "Une attaque puissante, mais qui baisse l’Attaque\net la Défense du lanceur."
    it: "Chi la usa attacca il bersaglio con grande forza,\nma il suo Attacco e la sua Difesa diminuiscono."
    de: "Starke Attacke, die jedoch auch den Angriff und die\nVerteidigung des Anwenders senkt."
    es: "Ataque de gran potencia, pero que reduce el Ataque y\nla Defensa del agresor."
    ko: "엄청난 힘을 발휘하여\n상대를 공격한다. 자신의\n공격과 방어가 떨어진다."
    zh_simp: "发挥惊人的力量攻击对手。\n自己的攻击和防御会降低。"
    zh_trad: "發揮驚人的力量攻擊對手。\n自己的攻擊和防禦會降低。"
tr40:
  names:
    jp_kana: わざレコード４０
    jp_kanji: わざレコード４０
    en: TR40
    fr: DT40
    it: DT40
    de: TP40
    es: DT40
    ko: 기술레코드40
    zh_simp: 招式记录４０
    zh_trad: 招式紀錄４０
  descriptions:
    jp_kana: "ちょうのうりょくで　じぶんの　とくせいと\nあいての　とくせいを　いれかえる。"
    jp_kanji: "超能力で　自分の　特性と\n相手の　特性を　入れ替える。"
    en: "The user employs its psychic power to exchange\nAbilities with the target."
    fr: "Le lanceur utilise ses pouvoirs psychiques pour échanger\nson talent avec la cible."
    it: "Chi la usa sfrutta i suoi poteri psichici per scambiare\nl’abilità con il bersaglio."
    de: Anwender tauscht seine Fähigkeit mit der des Zieles.
    es: "Usa el poder psíquico para intercambiar habilidades\ncon el objetivo."
    ko: "초능력으로 자신의 특성과\n상대의 특성을 바꾼다."
    zh_simp: "利用超能力互换\n自己和对手的特性。"
    zh_trad: "用超能力將自己和\n對手的特性互相交換。"
tr41:
  names:
    jp_kana: わざレコード４１
    jp_kanji: わざレコード４１
    en: TR41
    fr: DT41
    it: DT41
    de: TP41
    es: DT41
    ko: 기술레코드41
    zh_simp: 招式记录４１
    zh_trad: 招式紀錄４１
  descriptions:
    jp_kana: "こうげきした　あいてを\nやけど　じょうたいに　することが　ある。\nきゅうしょにも　あたりやすい。"
    jp_kanji: "攻撃した　相手を\nやけど状態に　することが　ある。\n急所にも　当たりやすい。"
    en: "The user launches a kick that lands a critical hit\nmore easily. This may also leave the target with\na burn."
    fr: "Le lanceur envoie un coup de pied au taux de critiques\nélevé. Peut aussi brûler la cible."
    it: "Chi la usa tira un calcio. Probabile brutto colpo.\nPuò anche scottare il bersaglio."
    de: "Starker Tritt mit hoher Volltrefferquote. Verursacht\neventuell Verbrennungen."
    es: "Patada que suele ser un golpe crítico y puede causar\nquemaduras."
    ko: "공격한 상대를\n화상 상태로 만들 때가 있다.\n급소에도 맞기 쉽다."
    zh_simp: "攻击对手后，\n有时会使其陷入灼伤状态。\n也容易击中要害。"
    zh_trad: "有時會讓受到攻擊的對手\n陷入灼傷狀態。\n且容易擊中要害。"
tr42:
  names:
    jp_kana: わざレコード４２
    jp_kanji: わざレコード４２
    en: TR42
    fr: DT42
    it: DT42
    de: TP42
    es: DT42
    ko: 기술레코드42
    zh_simp: 招式记录４２
    zh_trad: 招式紀錄４２
  descriptions:
    jp_kana: "うるさく　ひびく　おおきな　しんどうを\nあいてに　あたえて　こうげきする。"
    jp_kanji: "うるさく　響く　大きな　振動を\n相手に　与えて　攻撃する。"
    en: "The user lets loose a horribly echoing shout with\nthe power to inflict damage."
    fr: "Le lanceur pousse un cri dont l’écho terrifiant\na le pouvoir d’infliger des dégâts à l’ennemi."
    it: "Chi la usa lancia un urlo straziante che danneggia\ni nemici intorno a sé."
    de: "Eine laute Attacke, bei der gegnerische Pokémon mit\nSchallwellen angegriffen werden."
    es: Grito desgarrador que inflige daño al objetivo.
    ko: "시끄럽게 울리는 큰 진동을\n상대에게 전달하여 공격한다."
    zh_simp: "给予对手又吵又响的\n巨大震动进行攻击。"
    zh_trad: "製造出震耳欲聾的\n巨大聲波攻擊對手。"
tr43:
  names:
    jp_kana: わざレコード４３
    jp_kanji: わざレコード４３
    en: TR43
    fr: DT43
    it: DT43
    de: TP43
    es: DT43
    ko: 기술레코드43
    zh_simp: 招式记录４３
    zh_trad: 招式紀錄４３
  descriptions:
    jp_kana: "フルパワーで　あいてを　こうげきする。\nつかうと　はんどうで\nじぶんの　とくこうが　がくっと　さがる。"
    jp_kanji: "フルパワーで　相手を　攻撃する。\n使うと　反動で\n自分の　特攻が　がくっと　さがる。"
    en: "The user attacks the target at full power. The attack’s\nrecoil harshly lowers the user’s Sp. Atk stat."
    fr: "Attaque l’ennemi à pleine puissance.\nLe contrecoup baisse beaucoup l’Attaque Spéciale\ndu lanceur."
    it: "Chi la usa sferra un potente attacco, ma il contraccolpo\nriduce di molto il suo Attacco Speciale."
    de: "Angriff mit voller Kraft, der den Spezial-Angriff des\nAnwenders durch den Rückstoß stark senkt."
    es: "Ataque en toda regla que baja mucho el Ataque\nEspecial de quien lo usa."
    ko: "풀 파워로 상대를 공격한다.\n쓰면 반동으로\n자신의 특수공격이 크게 떨어진다."
    zh_simp: "使出全部力量攻击对手。\n使用之后会因为反作用力，\n自己的特攻大幅降低。"
    zh_trad: "釋放全部能量攻擊對手。\n使用後因為反作用力，\n自己的特攻會大幅降低。"
tr44:
  names:
    jp_kana: わざレコード４４
    jp_kanji: わざレコード４４
    en: TR44
    fr: DT44
    it: DT44
    de: TP44
    es: DT44
    ko: 기술레코드44
    zh_simp: 招式记录４４
    zh_trad: 招式紀錄４４
  descriptions:
    jp_kana: "うちゅう　から　しんぴの　ちからを\nとりこむ　ことで　じぶんの\nぼうぎょと　とくぼうを　あげる。"
    jp_kanji: "宇宙から　神秘の　力を\nとりこむ　ことで\n自分の　防御と　特防を　あげる。"
    en: "The user absorbs a mystical power from space to\nraise its Defense and Sp. Def stats."
    fr: "Le lanceur absorbe un pouvoir mystique spatial\nqui augmente sa Défense et sa Défense Spéciale."
    it: "Chi la usa assorbe una forza mistica dallo spazio\nche aumenta la Difesa e la Difesa Speciale."
    de: "Erhöht Verteidigung und Spezial-Verteidigung durch\neine mystische Kraft."
    es: "Sube la Defensa y la Defensa Especial propias con\nenergía mística."
    ko: "우주로부터 신비한 힘을\n손에 넣음으로써\n자신의 방어와 특수방어를 올린다."
    zh_simp: "汲取宇宙中神秘的力量，\n从而提高自己的防御和特防。"
    zh_trad: "吸取來自宇宙的神秘力量，\n提高自己的防禦和特防。"
tr45:
  names:
    jp_kana: わざレコード４５
    jp_kanji: わざレコード４５
    en: TR45
    fr: DT45
    it: DT45
    de: TP45
    es: DT45
    ko: 기술레코드45
    zh_simp: 招式记录４５
    zh_trad: 招式紀錄４５
  descriptions:
    jp_kana: "にごった　みずを\nあいてに　はっしゃして　こうげきする。\nめいちゅうりつを　さげることが　ある。"
    jp_kanji: "濁った　水を\n相手に　発射して　攻撃する。\n命中率を　さげることが　ある。"
    en: "The user attacks by shooting muddy water at opposing\nPokémon. This may also lower their accuracy."
    fr: "Le lanceur attaque en projetant de l’eau boueuse.\nPeut aussi réduire la Précision de l’ennemi."
    it: "Chi la usa attacca i nemici che ha intorno con un\ngetto di fango che può anche ridurne la precisione."
    de: "Greift mit Matsch an und senkt eventuell die\nGenauigkeit der gegnerischen Pokémon."
    es: "Ataque con agua lodosa que puede bajar la Precisión\ndel equipo rival."
    ko: "탁해진 물을\n상대에게 발사하여 공격한다.\n명중률을 떨어뜨릴 때가 있다."
    zh_simp: "向对手喷射浑浊的水进行攻击。\n有时会降低对手的命中率。"
    zh_trad: "用渾濁的污水攻擊對手。\n有時會降低對手的命中率。"
tr46:
  names:
    jp_kana: わざレコード４６
    jp_kanji: わざレコード４６
    en: TR46
    fr: DT46
    it: DT46
    de: TP46
    es: DT46
    ko: 기술레코드46
    zh_simp: 招式记录４６
    zh_trad: 招式紀錄４６
  descriptions:
    jp_kana: "ひふを　てつのように\nかたくする　ことで\nじぶんの　ぼうぎょを　ぐーんと　あげる。"
    jp_kanji: "皮膚を　鉄のように\n硬くする　ことで\n自分の　防御を　ぐーんと　あげる。"
    en: "The user hardens its body’s surface like iron,\nsharply raising its Defense stat."
    fr: "L’épiderme du lanceur devient dur comme du fer,\nce qui augmente beaucoup sa Défense."
    it: "Il corpo di chi la usa si indurisce come il ferro,\nfacendone salire di molto la Difesa."
    de: "Anwender stärkt den Körper, um den\nVerteidigungs-Wert stark zu erhöhen."
    es: "Fortalece el cuerpo como si fuera de hierro y sube\nmucho la Defensa."
    ko: "피부를 쇠처럼\n단단하게 만듦으로써\n자신의 방어를 크게 올린다."
    zh_simp: "将皮肤变得坚硬如铁，\n从而大幅提高自己的防御。"
    zh_trad: "將皮膚變得堅硬如鐵，\n大幅提高自己的防禦。"
tr47:
  names:
    jp_kana: わざレコード４７
    jp_kanji: わざレコード４７
    en: TR47
    fr: DT47
    it: DT47
    de: TP47
    es: DT47
    ko: 기술레코드47
    zh_simp: 招式记录４７
    zh_trad: 招式紀錄４７
  descriptions:
    jp_kana: "するどく　とがった　きょだいな　ツメで\nあいてを　きりさいて　こうげきする。"
    jp_kanji: "鋭く　とがった　巨大な　ツメで\n相手を　切り裂いて　攻撃する。"
    en: The user slashes the target with huge sharp claws.
    fr: "Le lanceur lacère l’ennemi de ses grandes griffes\naiguisées."
    it: "Chi la usa attacca con artigli affilati che graffiano\nil bersaglio rapidamente e con grande forza."
    de: "Der Anwender greift das Ziel mit riesigen, scharfen\nKlauen an."
    es: Araña al objetivo con garras afiladas.
    ko: "날카롭고 뾰족하며 거대한 발톱으로\n상대를 베어 갈라서 공격한다."
    zh_simp: "用尖锐的巨爪\n劈开对手进行攻击。"
    zh_trad: "用尖銳的巨爪\n撕裂對手進行攻擊。"
tr48:
  names:
    jp_kana: わざレコード４８
    jp_kanji: わざレコード４８
    en: TR48
    fr: DT48
    it: DT48
    de: TP48
    es: DT48
    ko: 기술레코드48
    zh_simp: 招式记录４８
    zh_trad: 招式紀錄４８
  descriptions:
    jp_kana: "からだに　ちからを　こめて　きんにくを\nぶあつく　することで　じぶんの\nこうげきと　ぼうぎょを　あげる。"
    jp_kanji: "体に　力を　こめて\n筋肉を　ぶあつく　することで\n自分の　攻撃と　防御を　あげる。"
    en: "The user tenses its muscles to bulk up its body,\nraising both its Attack and Defense stats."
    fr: "Le lanceur tend ses muscles pour se gonfler,\nce qui booste son Attaque et sa Défense."
    it: "Chi la usa tende i muscoli per gonfiare il corpo,\naumentando Difesa e Attacco."
    de: "Der Anwender spannt seine Muskeln an, um den Angriff\nund die Verteidigung zu erhöhen."
    es: Robustece el cuerpo para subir el Ataque y la Defensa.
    ko: "몸에 힘을 주어\n근육을 두껍게 해서\n자신의 공격과 방어를 올린다."
    zh_simp: "使出全身力气绷紧肌肉，\n从而提高自己的攻击和防御。"
    zh_trad: "將力量集中於體內，增厚肌肉，\n提高自己的攻擊和防禦。"
tr49:
  names:
    jp_kana: わざレコード４９
    jp_kanji: わざレコード４９
    en: TR49
    fr: DT49
    it: DT49
    de: TP49
    es: DT49
    ko: 기술레코드49
    zh_simp: 招式记录４９
    zh_trad: 招式紀錄４９
  descriptions:
    jp_kana: "しずかに　せいしんを　とういつし\nこころを　しずめる　ことで　じぶんの\nとくこうと　とくぼうを　あげる。"
    jp_kanji: "静かに　精神を　統一し\n心を　鎮めることで　自分の\n特攻と　特防を　あげる。"
    en: "The user quietly focuses its mind and calms its\nspirit to raise its Sp. Atk and Sp. Def stats."
    fr: "Le lanceur se concentre et fait le vide dans son esprit\npour augmenter son Attaque Spéciale et sa Défense\nSpéciale."
    it: "Chi la usa placa il proprio spirito meditando per\naumentare l’Attacco Speciale e la Difesa Speciale."
    de: "Erhöht Spezial-Angriff und Spezial-Verteidigung durch\nKonzentration."
    es: "Aumenta la concentración y calma el espíritu para subir\nel Ataque Especial y la Defensa Especial."
    ko: "조용히 정신을 통일하고\n마음을 가라앉혀서 자신의\n특수공격과 특수방어를 올린다."
    zh_simp: "静心凝神，\n从而提高自己的特攻和特防。"
    zh_trad: "屏氣凝神，\n提高自己的特攻和特防。"
tr50:
  names:
    jp_kana: わざレコード５０
    jp_kanji: わざレコード５０
    en: TR50
    fr: DT50
    it: DT50
    de: TP50
    es: DT50
    ko: 기술레코드50
    zh_simp: 招式记录５０
    zh_trad: 招式紀錄５０
  descriptions:
    jp_kana: "はっぱを　つるぎのように　あやつり\nあいてを　きりつけて　こうげきする。\nきゅうしょに　あたりやすい。"
    jp_kanji: "はっぱを　剣のように　あやつり\n相手を　切りつけて　攻撃する。\n急所に　当たりやすい。"
    en: "The user handles a sharp leaf like a sword and\nattacks by cutting its target. Critical hits land\nmore easily."
    fr: "Une feuille coupante comme une lame entaille l’ennemi.\nTaux de critiques élevé."
    it: "Colpisce il bersaglio usando una foglia affilata\ncome una spada. Probabile brutto colpo."
    de: Hieb mit scharfkantigem Blatt. Hohe Volltrefferquote.
    es: Acuchilla con una hoja fina. Suele dar un golpe crítico.
    ko: "잎사귀를 칼처럼 이용해\n상대를 베어 공격한다.\n급소에 맞기 쉽다."
    zh_simp: "像用剑一般操纵叶片\n切斩对手进行攻击。\n容易击中要害。"
    zh_trad: "如用劍般操控葉子\n切斬對手進行攻擊。\n容易擊中要害。"
tr51:
  names:
    jp_kana: わざレコード５１
    jp_kanji: わざレコード５１
    en: TR51
    fr: DT51
    it: DT51
    de: TP51
    es: DT51
    ko: 기술레코드51
    zh_simp: 招式记录５１
    zh_trad: 招式紀錄５１
  descriptions:
    jp_kana: "しんぴてきで　ちからづよい　まいを\nはげしく　おどる。　じぶんの\nこうげきと　すばやさを　あげる。"
    jp_kanji: "神秘的で　力強い　舞を\n激しく　おどる。　自分の\n攻撃と　素早さを　あげる。"
    en: "The user vigorously performs a mystic, powerful\ndance that raises its Attack and Speed stats."
    fr: "Une danse mystique dont le rythme effréné\naugmente l’Attaque et la Vitesse du lanceur."
    it: "Danza mistica e vigorosa che aumenta l’Attacco\ne la Velocità di chi la usa."
    de: "Ein mystischer Tanz, der den Angriffs- und\nInitiative-Wert erhöht."
    es: Danza mística que sube el Ataque y la Velocidad.
    ko: "신비롭고 힘센 춤을\n격렬하게 춘다. 자신의\n공격과 스피드를 올린다."
    zh_simp: "激烈地跳起神秘且\n强有力的舞蹈。\n从而提高自己的攻击和速度。"
    zh_trad: "激烈地跳起神秘又強而有力的舞蹈。\n提高自己的攻擊和速度。"
tr52:
  names:
    jp_kana: わざレコード５２
    jp_kanji: わざレコード５２
    en: TR52
    fr: DT52
    it: DT52
    de: TP52
    es: DT52
    ko: 기술레코드52
    zh_simp: 招式记录５２
    zh_trad: 招式紀錄５２
  descriptions:
    jp_kana: "からだを　こうそくに　かいてん　させて\nたいあたりする。あいてより　すばやさが\nひくいほど　つよい。"
    jp_kanji: "体を　高速に　回転させて\n体当たりする。相手より　素早さが\n低いほど　強い。"
    en: "The user tackles the target with a high-speed spin.\nThe slower the user compared to the target, the\ngreater the move’s power."
    fr: "Le lanceur effectue une rotation et frappe l’ennemi.\nPlus la Vitesse du lanceur est basse par rapport à celle\nde sa cible, plus il inflige de dégâts."
    it: "Chi la usa si scaglia sul bersaglio facendo ruotare\nvorticosamente il proprio corpo. Più lento è chi la usa,\nmaggiore è il danno."
    de: "Angriff mit hoher Geschwindigkeit. Je niedriger die\nInitiative des Anwenders im Vergleich zum Ziel ist,\ndesto höher der Schaden."
    es: "Embiste al objetivo con un potente ataque giratorio.\nCuanto más lento es el usuario, más daño causa."
    ko: "몸을 고속으로 회전시켜\n몸통박치기한다. 상대보다 스피드가\n낮을수록 위력은 올라간다."
    zh_simp: "让身体高速旋转并撞击对手。\n速度比对手越慢，威力越大。"
    zh_trad: "高速旋轉身體，撞擊對手。\n速度比對手越慢，威力越大。"
tr53:
  names:
    jp_kana: わざレコード５３
    jp_kanji: わざレコード５３
    en: TR53
    fr: DT53
    it: DT53
    de: TP53
    es: DT53
    ko: 기술레코드53
    zh_simp: 招式记录５３
    zh_trad: 招式紀錄５３
  descriptions:
    jp_kana: "まもりを　すてて　あいての　ふところに\nとつげきする。　じぶんの\nぼうぎょと　とくぼうが　さがる。"
    jp_kanji: "守りを　捨てて　相手の　ふところに\n突撃する。　自分の\n防御と　特防が　さがる。"
    en: "The user fights the target up close without guarding\nitself. This also lowers the user’s Defense and\nSp. Def stats."
    fr: "Le lanceur combat au corps à corps sans se protéger.\nBaisse aussi sa Défense et sa Défense Spéciale."
    it: "Chi la usa attacca abbassando la guardia.\nLa propria Difesa e la Difesa Speciale si riducono."
    de: "Nahkampf-Attacke ohne Rücksicht auf Verluste. Senkt\nVerteidigung und Spezial-Verteidigung des Anwenders."
    es: "Lucha abiertamente contra el objetivo sin protegerse.\nTambién reduce la Defensa y la Defensa Especial del\nusuario."
    ko: "방어를 포기하고 상대 쪽으로\n깊숙이 돌격한다. 자신의\n방어와 특수방어가 떨어진다."
    zh_simp: "放弃守护，向对手的怀里突击。\n自己的防御和特防会降低。"
    zh_trad: "反守為攻，近身突擊對手。\n自己的防禦和特防會降低。"
tr54:
  names:
    jp_kana: わざレコード５４
    jp_kanji: わざレコード５４
    en: TR54
    fr: DT54
    it: DT54
    de: TP54
    es: DT54
    ko: 기술레코드54
    zh_simp: 招式记录５４
    zh_trad: 招式紀錄５４
  descriptions:
    jp_kana: "あいての　あしもとに　どくびしを\nしかける。　こうたいで　でてきた　あいての\nポケモンに　どくを　おわせる。"
    jp_kanji: "相手の　足下に　どくびしを\nしかける。　交代で　でてきた　相手の\nポケモンに　毒を　おわせる。"
    en: "The user lays a trap of poison spikes at the feet of\nthe opposing team. The spikes will poison opposing\nPokémon that switch into battle."
    fr: "Lance des pics autour de l’ennemi.\nIls empoisonnent les ennemis qui entrent au combat."
    it: "Chi la usa piazza una trappola di punte che\navvelenano i nemici che scendono in campo."
    de: "Anwender legt eine Falle mit Giftdornen aus. In den\nKampf eingewechselte gegnerische Pokémon werden\nvergiftet."
    es: "Lanza una trampa de púas tóxicas a los pies del\nobjetivo. El veneno afecta a los Pokémon oponentes\nque entran en combate."
    ko: "상대의 발밑에 독 압정을\n뿌린다. 교체로 나온 상대\n포켓몬에게 독을 퍼지게 한다."
    zh_simp: "在对手的脚下撒毒菱。\n使对手替换出场的宝可梦中毒。"
    zh_trad: "在對手腳下散布毒菱。\n讓對手替換出場的寶可夢\n陷入中毒狀態。"
tr55:
  names:
    jp_kana: わざレコード５５
    jp_kanji: わざレコード５５
    en: TR55
    fr: DT55
    it: DT55
    de: TP55
    es: DT55
    ko: 기술레코드55
    zh_simp: 招式记录５５
    zh_trad: 招式紀錄５５
  descriptions:
    jp_kana: "ほのおを　まとって　とっしんする。\nじぶんも　かなり　ダメージを　うける。\nやけど　じょうたいに　することが　ある。"
    jp_kanji: "炎を　まとって　突進する。\n自分も　かなり　ダメージを　受ける。\nやけど状態に　することが　ある。"
    en: "The user cloaks itself in fire and charges the target.\nThis also damages the user quite a lot. This attack\nmay leave the target with a burn."
    fr: "Le lanceur s’embrase avant de charger l’ennemi.\nLe choc blesse aussi gravement le lanceur.\nPeut brûler l’ennemi."
    it: "Chi la usa si ricopre di fuoco e carica il bersaglio,\nma subisce seri danni per il contraccolpo.\nPuò anche scottare il Pokémon colpito."
    de: "Anwender hüllt sich in Flammen und stürmt auf das\nZiel zu, das dadurch eventuell Verbrennungen\nerleidet. Anwender nimmt selbst großen Schaden."
    es: "El Pokémon se cubre de llamas y carga contra el\nobjetivo, aunque él también recibe daño. Puede\nquemar."
    ko: "불꽃을 두르고 돌진한다.\n자신도 상당한 데미지를 입는다.\n화상 상태로 만들 때가 있다."
    zh_simp: "让火焰覆盖全身猛撞向对手。\n自己也会受到不小的伤害。\n有时会让对手陷入灼伤状态。"
    zh_trad: "將火焰圍繞全身後猛撞對手。\n自己也會受到不小的傷害。\n有時會讓對手陷入灼傷狀態。"
tr56:
  names:
    jp_kana: わざレコード５６
    jp_kanji: わざレコード５６
    en: TR56
    fr: DT56
    it: DT56
    de: TP56
    es: DT56
    ko: 기술레코드56
    zh_simp: 招式记录５６
    zh_trad: 招式紀錄５６
  descriptions:
    jp_kana: "からだの　おくから　はどうの　ちからを\nあいてに　うちはなつ。\nこうげきは　かならず　めいちゅう　する。"
    jp_kanji: "体の　奥から　波導の　力を\n相手に　うち放つ。\n攻撃は　必ず　命中する。"
    en: "The user lets loose a blast of aura power from deep\nwithin its body at the target. This attack\nnever misses."
    fr: "Le lanceur dégage une aura et projette de l’énergie.\nN’échoue jamais."
    it: "Chi la usa rilascia una forza eterea dal profondo\ndel corpo. La mossa è infallibile."
    de: "Tief aus dem Inneren des Anwenders löst sich ein\nkraftvoller Stoß Aura-Energie. Diese Attacke trifft\ngarantiert."
    es: "Libera, desde su interior, una inmensa descarga de aura.\nEs infalible."
    ko: "몸속에서 파동의 힘을\n끌어내 상대에게 쏜다.\n공격은 반드시 명중한다."
    zh_simp: "从体内产生出波导之力，\n然后向对手发出。\n攻击必定会命中。"
    zh_trad: "將來自體內深處的波導之力\n擊向對手。\n攻擊必定會命中。"
tr57:
  names:
    jp_kana: わざレコード５７
    jp_kanji: わざレコード５７
    en: TR57
    fr: DT57
    it: DT57
    de: TP57
    es: DT57
    ko: 기술레코드57
    zh_simp: 招式记录５７
    zh_trad: 招式紀錄５７
  descriptions:
    jp_kana: "どくに　そまった　しょくしゅや　うでで\nあいてを　つきさす。\nどく　じょうたいに　することが　ある。"
    jp_kanji: "毒に　そまった　触手や　腕で\n相手を　突き刺す。\n毒状態に　することが　ある。"
    en: "The target is stabbed with a tentacle, arm, or the like\nsteeped in poison. This may also poison the target."
    fr: "Attaque l’ennemi avec un tentacule, un bras,\nou un autre membre plein de poison.\nPeut aussi l’empoisonner."
    it: "Il bersaglio è colpito da un tentacolo o da un arto\nintriso di una sostanza tossica che può anche\navvelenarlo."
    de: "Der Anwender greift mit giftigen Gliedmaßen wie\nTentakeln oder Armen an. Das Ziel wird dabei\neventuell vergiftet."
    es: "Pincha al objetivo con un tentáculo o brazo\nenvenenado. Puede llegar a envenenar al objetivo."
    ko: "독에 물든 촉수나 팔로\n상대를 꿰찌른다.\n독 상태로 만들 때가 있다."
    zh_simp: "用带毒的触手或手臂\n刺入对手。\n有时会让对手陷入中毒状态。"
    zh_trad: "以帶有毒性的觸手或手臂刺進對手。\n有時會讓對手陷入中毒狀態。"
tr58:
  names:
    jp_kana: わざレコード５８
    jp_kanji: わざレコード５８
    en: TR58
    fr: DT58
    it: DT58
    de: TP58
    es: DT58
    ko: 기술레코드58
    zh_simp: 招式记录５８
    zh_trad: 招式紀錄５８
  descriptions:
    jp_kana: "からだから　あくいに\nみちた　おそろしい　オーラを　はっする。\nあいてを　ひるませる　ことが　ある。"
    jp_kanji: "体から　悪意に　みちた\n恐ろしい　オーラを　発する。\n相手を　ひるませることが　ある。"
    en: "The user releases a horrible aura imbued with dark\nthoughts. This may also make the target flinch."
    fr: "Le lanceur dégage une horrible aura chargée\nde pensées maléfiques. Peut aussi apeurer l’ennemi."
    it: "Chi la usa emana un’aura impregnata di oscuri pensieri.\nPuò anche far tentennare il Pokémon colpito."
    de: "Anwender greift mit fürchterlicher Aura schlechter\nGedanken an. Ziel schreckt eventuell zurück."
    es: "Libera una horrible aura llena de malos pensamientos\nque puede amedrentar al objetivo."
    ko: "몸에서 악의로 가득한\n무서운 오라를 발한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "从体内发出\n充满恶意的恐怖气场。\n有时会使对手畏缩。"
    zh_trad: "從身體散發出\n充滿惡意的恐怖氣場。\n有時會使對手畏縮。"
tr59:
  names:
    jp_kana: わざレコード５９
    jp_kanji: わざレコード５９
    en: TR59
    fr: DT59
    it: DT59
    de: TP59
    es: DT59
    ko: 기술레코드59
    zh_simp: 招式记录５９
    zh_trad: 招式紀錄５９
  descriptions:
    jp_kana: "かたい　からを　もつ　おおきな　タネを\nうえから　たたきつけて\nあいてを　こうげきする。"
    jp_kanji: "硬い　殻を　もつ　大きな　タネを\n上から　たたきつけて\n相手を　攻撃する。"
    en: "The user slams a barrage of hard-shelled seeds\ndown on the target from above."
    fr: "Le lanceur fait pleuvoir un déluge de graines explosives\nsur l’ennemi."
    it: "Chi la usa emette una raffica di semi dal guscio\nduro che colpiscono il bersaglio dall’alto."
    de: "Anwender lässt eine Menge Samen mit harter Schale\nvon oben auf das Ziel fallen."
    es: "Lanza al objetivo una descarga de semillas explosivas\ndesde arriba."
    ko: "단단한 껍질을 가지고 있는\n큰 씨앗을 위에서 힘껏 내던져\n상대를 공격한다."
    zh_simp: "将外壳坚硬的大种子，\n从上方砸下攻击对手。"
    zh_trad: "從上方砸下外殼堅硬的\n大種子，攻擊對手。"
tr60:
  names:
    jp_kana: わざレコード６０
    jp_kanji: わざレコード６０
    en: TR60
    fr: DT60
    it: DT60
    de: TP60
    es: DT60
    ko: 기술레코드60
    zh_simp: 招式记录６０
    zh_trad: 招式紀錄６０
  descriptions:
    jp_kana: "カマや　ツメを　ハサミのように\nこうさ　させながら　あいてを　きりさく。"
    jp_kanji: "カマや　ツメを　ハサミのように\n交差させながら　相手を　切り裂く。"
    en: "The user slashes at the target by crossing its\nscythes or claws as if they were a pair of scissors."
    fr: "Le lanceur taillade l’ennemi en utilisant ses faux\nou ses griffes comme une paire de ciseaux."
    it: "Chi la usa colpisce il bersaglio con un attacco\nche ricorda un colpo di forbici."
    de: "Der Anwender führt eine Attacke aus, die einer\nScherenbewegung ähnelt."
    es: "Cruza las guadañas o las garras para atacar al objetivo\ncomo si fueran unas tijeras."
    ko: "낫이나 발톱을 가위처럼\n교차시키면서 상대를 베어 가른다."
    zh_simp: "将镰刀或爪子像剪刀般地交叉，\n顺势劈开对手。"
    zh_trad: "將鐮刀或爪子像剪刀般地交叉，\n順勢劈開對手。"
tr61:
  names:
    jp_kana: わざレコード６１
    jp_kanji: わざレコード６１
    en: TR61
    fr: DT61
    it: DT61
    de: TP61
    es: DT61
    ko: 기술레코드61
    zh_simp: 招式记录６１
    zh_trad: 招式紀錄６１
  descriptions:
    jp_kana: "しんどうで　おんぱを　おこして\nこうげきする。あいての　とくぼうを\nさげることが　ある。"
    jp_kanji: "振動で　音波を　おこして\n攻撃する。相手の　特防を\nさげることが　ある。"
    en: "The user generates a damaging sound wave by\nvibration. This may also lower the target’s\nSp. Def stat."
    fr: "Le lanceur fait vibrer son corps pour lancer une vague\nsonique. Peut aussi baisser la Défense Spéciale\nde l’ennemi."
    it: "Chi la usa crea un’onda sonora che infligge danni.\nPuò anche ridurre la Difesa Speciale del bersaglio."
    de: "Anwender erzeugt Schallwellen, die beim Ziel Schaden\nverursachen und eventuell dessen Spezial-Verteidigung\nsenken."
    es: "El usuario crea una onda sónica dañina moviendo\nsu cuerpo que también puede disminuir la Defensa\nEspecial del objetivo."
    ko: "진동으로 음파를 일으켜서\n공격한다. 상대의 특수방어를\n떨어뜨릴 때가 있다."
    zh_simp: "利用振动发出音波进行攻击。\n有时会降低对手的特防。"
    zh_trad: "利用振動產生出的音波進行攻擊。\n有時會降低對手的特防。"
tr62:
  names:
    jp_kana: わざレコード６２
    jp_kanji: わざレコード６２
    en: TR62
    fr: DT62
    it: DT62
    de: TP62
    es: DT62
    ko: 기술레코드62
    zh_simp: 招式记录６２
    zh_trad: 招式紀錄６２
  descriptions:
    jp_kana: "おおきな　くちから　しょうげきはを\nまきおこして　あいてを　こうげきする。"
    jp_kanji: "大きな　口から　衝撃波を\nまきおこして　相手を　攻撃する。"
    en: "The target is attacked with a shock wave generated\nby the user’s gaping mouth."
    fr: "Le lanceur ouvre la bouche pour envoyer\nune onde de choc qui frappe l’ennemi."
    it: "Chi la usa spalanca la bocca e genera un’onda\nd’urto che colpisce il bersaglio."
    de: "Das Ziel wird mit einer Schockwelle angegriffen,\ndie aus dem offenen Maul des Anwenders kommt."
    es: "Abre mucho la boca y libera una onda de choque que\nataca al objetivo."
    ko: "큰 입으로 충격파를\n일으켜서 상대를 공격한다."
    zh_simp: "从大大的口中\n掀起冲击波攻击对手。"
    zh_trad: "從張大的口中\n發射衝擊波攻擊對手。"
tr63:
  names:
    jp_kana: わざレコード６３
    jp_kanji: わざレコード６３
    en: TR63
    fr: DT63
    it: DT63
    de: TP63
    es: DT63
    ko: 기술레코드63
    zh_simp: 招式记录６３
    zh_trad: 招式紀錄６３
  descriptions:
    jp_kana: "ほうせきの　ように　きらめく　ひかりを\nはっしゃして　あいてを　こうげきする。"
    jp_kanji: "宝石のように　きらめく　光を\n発射して　相手を　攻撃する。"
    en: "The user attacks with a ray of light that sparkles as\nif it were made of gemstones."
    fr: "Le lanceur attaque avec un rayon de lumière\nqui scintille comme s’il était composé de gemmes."
    it: "Chi la usa attacca con un raggio di luce che brilla\ncome se fosse fatto di pietre preziose."
    de: "Anwender attackiert mit einem Lichtstrahl, der funkelt,\nals sei er aus Juwelen."
    es: "Ataca con un rayo de luz que centellea como si lo\nformaran miles de joyas."
    ko: "보석처럼 반짝이는 빛을\n발사하여 상대를 공격한다."
    zh_simp: "发射如宝石般闪耀的光芒\n攻击对手。"
    zh_trad: "發射如寶石般\n閃耀的光芒攻擊對手。"
tr64:
  names:
    jp_kana: わざレコード６４
    jp_kanji: わざレコード６４
    en: TR64
    fr: DT64
    it: DT64
    de: TP64
    es: DT64
    ko: 기술레코드64
    zh_simp: 招式记录６４
    zh_trad: 招式紀錄６４
  descriptions:
    jp_kana: "きあいを　たかめて　こんしんの　ちからを\nほうしゅつする。あいての　とくぼうを\nさげることが　ある。"
    jp_kanji: "気合を　高めて\nありったけの　力を　放出する。\n相手の　特防を　さげることが　ある。"
    en: "The user heightens its mental focus and unleashes\nits power. This may also lower the target’s\nSp. Def stat."
    fr: "Le lanceur rassemble ses forces et laisse éclater\nson pouvoir. Peut aussi baisser la Défense Spéciale\nde l’ennemi."
    it: "Chi la usa si concentra e rilascia la sua forza.\nPuò ridurre la Difesa Speciale del Pokémon colpito."
    de: "Anwender erhöht seinen mentalen Fokus und greift\ndann an. Senkt eventuell Spezial-Verteidigung des\nZieles."
    es: "Agudiza la concentración mental y libera su poder.\nPuede disminuir la Defensa Especial del objetivo."
    ko: "기합을 높여서\n혼신의 힘을 방출한다. 상대의\n특수방어를 떨어뜨릴 때가 있다."
    zh_simp: "提高气势，\n释放出全部力量。\n有时会降低对手的特防。"
    zh_trad: "提高氣勢，\n釋放全身所有力量。\n有時會降低對手的特防。"
tr65:
  names:
    jp_kana: わざレコード６５
    jp_kanji: わざレコード６５
    en: TR65
    fr: DT65
    it: DT65
    de: TP65
    es: DT65
    ko: 기술레코드65
    zh_simp: 招式记录６５
    zh_trad: 招式紀錄６５
  descriptions:
    jp_kana: "しぜんから　あつめた\nいのちの　ちからを　はっしゃする。\nあいての　とくぼうを　さげることがある。"
    jp_kanji: "自然から　集めた\n命の力を　発射する。\n相手の　特防を　さげることがある。"
    en: "The user draws power from nature and fires it at the\ntarget. This may also lower the target’s Sp. Def stat."
    fr: "Utilise les pouvoirs de la nature pour attaquer l’ennemi.\nPeut aussi baisser sa Défense Spéciale."
    it: "Chi la usa attinge energia dalla natura e la scaglia\ncontro il bersaglio, la cui Difesa Speciale può diminuire."
    de: "Anwender zieht Kraft aus der Natur und feuert sie auf\ndas Ziel. Senkt eventuell Spezial-Verteidigung des\nZieles."
    es: "Aúna fuerzas de la naturaleza y libera su ataque.\nPuede disminuir la Defensa Especial del objetivo."
    ko: "자연으로부터 모은\n생명의 힘을 발사한다.\n상대의 특수방어를 떨어뜨릴 때가 있다."
    zh_simp: "发射从自然收集的生命力量。\n有时会降低对手的特防。"
    zh_trad: "發射從大自然匯聚而來的生命力量。\n有時會降低對手的特防。"
tr66:
  names:
    jp_kana: わざレコード６６
    jp_kanji: わざレコード６６
    en: TR66
    fr: DT66
    it: DT66
    de: TP66
    es: DT66
    ko: 기술레코드66
    zh_simp: 招式记录６６
    zh_trad: 招式紀錄６６
  descriptions:
    jp_kana: "はねを　おりたたみ\nていくう　ひこうで　とつげきする。\nじぶんも　かなり　ダメージを　うける。"
    jp_kanji: "はねを　おりたたみ\n低空飛行で　突撃する。\n自分も　かなり　ダメージを　受ける。"
    en: "The user tucks in its wings and charges from a low\naltitude. This also damages the user quite a lot."
    fr: "Le lanceur replie ses ailes et charge en rase-mottes.\nBlesse gravement le lanceur."
    it: "Chi la usa ripiega le ali e carica da bassa quota.\nTuttavia, subisce considerevoli danni."
    de: "Anwender greift aus niedriger Höhe an. Er erleidet\nbei dieser Attacke selbst großen Schaden."
    es: "Pliega sus alas y ataca con un vuelo rasante. El Pokémon\nque lo usa también resulta seriamente dañado."
    ko: "날개를 접어\n저공비행으로 돌격한다.\n자신도 상당한 데미지를 입는다."
    zh_simp: "收拢翅膀，\n通过低空飞行突击对手。\n自己也会受到不小的伤害。"
    zh_trad: "收起翅膀，\n低空飛行突擊對手。\n自己也會受到不小的傷害。"
tr67:
  names:
    jp_kana: わざレコード６７
    jp_kanji: わざレコード６７
    en: TR67
    fr: DT67
    it: DT67
    de: TP67
    es: DT67
    ko: 기술레코드67
    zh_simp: 招式记录６７
    zh_trad: 招式紀錄６７
  descriptions:
    jp_kana: "あいての　あしもとへ　だいちの　ちからを\nほうしゅつする。あいての　とくぼうを\nさげることが　ある。"
    jp_kanji: "相手の　足下へ　大地の力を\n放出する。相手の　特防を\nさげることが　ある。"
    en: "The user makes the ground under the target erupt\nwith power. This may also lower the target’s\nSp. Def stat."
    fr: "De terribles séismes secouent l’ennemi.\nPeut aussi baisser sa Défense Spéciale."
    it: "Dal terreno sotto il bersaglio si sprigiona una forza\ndevastante. Può anche ridurne la Difesa Speciale."
    de: "Der Boden unter dem Ziel erzittert durch die Kraft\nder Erde. Senkt eventuell Spezial-Verteidigung."
    es: "La tierra a los pies del objetivo erupciona\nviolentamente. Puede disminuir la Defensa Especial\ndel objetivo."
    ko: "상대의 발밑에 대지의 힘을\n방출한다. 상대의 특수방어를\n떨어뜨릴 때가 있다."
    zh_simp: "向对手脚下释放出大地之力。\n有时会降低对手的特防。"
    zh_trad: "向對手腳下\n釋放出大地之力。\n有時會降低對手的特防。"
tr68:
  names:
    jp_kana: わざレコード６８
    jp_kanji: わざレコード６８
    en: TR68
    fr: DT68
    it: DT68
    de: TP68
    es: DT68
    ko: 기술레코드68
    zh_simp: 招式记录６８
    zh_trad: 招式紀錄６８
  descriptions:
    jp_kana: "わるいことを　かんがえて\nあたまを　かっせいか　させる。\nじぶんの　とくこうを　ぐーんと　あげる。"
    jp_kanji: "悪いことを　考えて\n頭を　活性化させる。\n自分の　特攻を　ぐーんと　あげる。"
    en: "The user stimulates its brain by thinking bad\nthoughts. This sharply raises the user’s Sp. Atk stat."
    fr: "Stimule l’esprit par de mauvaises pensées.\nAugmente beaucoup l’Attaque Spéciale du lanceur."
    it: "Chi la usa stimola il cervello pensando a cose cattive.\nAumenta di molto l’Attacco Speciale."
    de: "Anwender stimuliert sein Gehirn und hat finstere\nGedanken. Erhöht Spezial-Angriff stark."
    es: "Estimula su cerebro pensando en cosas malas.\nAumenta mucho el Ataque Especial."
    ko: "나쁜 일을 생각해서\n머리를 활성화시킨다.\n자신의 특수공격을 크게 올린다."
    zh_simp: "谋划诡计，激活头脑。\n大幅提高自己的特攻。"
    zh_trad: "動歪腦筋，活化大腦。\n大幅提高自己的特攻。"
tr69:
  names:
    jp_kana: わざレコード６９
    jp_kanji: わざレコード６９
    en: TR69
    fr: DT69
    it: DT69
    de: TP69
    es: DT69
    ko: 기술레코드69
    zh_simp: 招式记录６９
    zh_trad: 招式紀錄６９
  descriptions:
    jp_kana: "しねんの　ちからを\nひたいに　あつめて　こうげきする。\nあいてを　ひるませる　ことが　ある。"
    jp_kanji: "思念の　力を\n額に　集めて　攻撃する。\n相手を　ひるませることが　ある。"
    en: "The user focuses its willpower to its head and\nattacks the target. This may also make the\ntarget flinch."
    fr: "Le lanceur concentre sa volonté et donne\nun coup de tête. Peut aussi apeurer l’ennemi."
    it: "Chi la usa concentra le energie psichiche nella testa e si\nlancia contro il bersaglio. Può anche farlo tentennare."
    de: "Anwender konzentriert seinen Willen und rammt das\nZiel. Dieses schreckt eventuell zurück."
    es: "Concentra su energía psíquica en la cabeza para\ngolpear. Puede hacer que el objetivo se amedrente."
    ko: "사념의 힘을\n이마에 모아서 공격한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "将思念的力量\n集中在前额进行攻击。\n有时会使对手畏缩。"
    zh_trad: "將意念的力量集中在\n前額進行攻擊。\n有時會讓對手畏縮。"
tr70:
  names:
    jp_kana: わざレコード７０
    jp_kanji: わざレコード７０
    en: TR70
    fr: DT70
    it: DT70
    de: TP70
    es: DT70
    ko: 기술레코드70
    zh_simp: 招式记录７０
    zh_trad: 招式紀錄７０
  descriptions:
    jp_kana: "からだの　ひかりを　いってんに　あつめて\nちからを　はなつ。あいての　とくぼうを\nさげることが　ある。"
    jp_kanji: "体の　光を　一点に　集めて\n力を　放つ。\n相手の　特防を　さげることが　ある。"
    en: "The user gathers all its light energy and releases it\nall at once. This may also lower the target’s\nSp. Def stat."
    fr: "Le lanceur concentre son énergie lumineuse\net la fait exploser.\nPeut aussi baisser la Défense Spéciale de l’ennemi."
    it: "Chi la usa attacca raccogliendo e rilasciando energia\nluminosa. Può ridurre la Difesa Speciale del bersaglio."
    de: "Anwender sammelt Lichtenergie und feuert sie auf\neinmal ab. Senkt eventuell Spezial-Verteidigung des\nZieles."
    es: "El usuario concentra toda la luz del cuerpo y la libera.\nPuede bajar la Defensa Especial del objetivo."
    ko: "몸의 빛을 한곳에 모아서\n힘을 방출한다. 상대의 특수방어를\n떨어뜨릴 때가 있다."
    zh_simp: "将身体的光芒聚集在一点\n释放出去。\n有时会降低对手的特防。"
    zh_trad: "將身體的光芒\n聚集在一個點後釋放出去。\n有時會降低對手的特防。"
tr71:
  names:
    jp_kana: わざレコード７１
    jp_kanji: わざレコード７１
    en: TR71
    fr: DT71
    it: DT71
    de: TP71
    es: DT71
    ko: 기술레코드71
    zh_simp: 招式记录７１
    zh_trad: 招式紀錄７１
  descriptions:
    jp_kana: "とがった　はっぱで　あいてに　あらしを\nおこす。つかうと　はんどうで\nじぶんの　とくこうが　がくっと　さがる。"
    jp_kanji: "とがった　はっぱで　相手に　あらしを\nおこす。使うと　反動で\n自分の　特攻が　がくっと　さがる。"
    en: "The user whips up a storm of leaves around the\ntarget. The attack’s recoil harshly lowers the user’s\nSp. Atk stat."
    fr: "Invoque une tempête de feuilles acérées.\nLe contrecoup réduit beaucoup l’Attaque Spéciale\ndu lanceur."
    it: "Si forma una tempesta di foglie affilate. Il contraccolpo\nriduce di molto l’Attacco Speciale di chi la usa."
    de: "Anwender erzeugt einen Sturm aus scharfen Blättern.\nRückstoß senkt Spezial-Angriff des Anwenders stark."
    es: "Envuelve al objetivo con una lluvia de hojas afiladas,\npero reduce mucho su Ataque Especial."
    ko: "뾰족한 잎사귀로 상대에게 돌풍을\n일으킨다. 사용하면 반동으로\n자신의 특수공격이 크게 떨어진다."
    zh_simp: "用尖尖的叶片向对手卷起风暴。\n使用之后因为反作用力\n自己的特攻会大幅降低。"
    zh_trad: "用尖銳的葉子捲起風暴向對手進行攻擊。\n使用後因為反作用力，\n自己的特攻會大幅降低。"
tr72:
  names:
    jp_kana: わざレコード７２
    jp_kanji: わざレコード７２
    en: TR72
    fr: DT72
    it: DT72
    de: TP72
    es: DT72
    ko: 기술레코드72
    zh_simp: 招式记录７２
    zh_trad: 招式紀錄７２
  descriptions:
    jp_kana: "ツタや　しょくしゅを　はげしく　ふるって\nあいてを　たたきつけ　こうげきする。"
    jp_kanji: "ツタや　触手を　激しく　ふるって\n相手を　たたきつけ　攻撃する。"
    en: "The user violently whirls its vines, tentacles, or the\nlike to harshly lash the target."
    fr: "Le lanceur fait virevolter violemment ses lianes\nou ses tentacules pour fouetter l’ennemi."
    it: "Chi la usa agita violentemente liane o tentacoli\nper sferzare il bersaglio."
    de: "Anwender wirbelt seine Ranken oder Tentakel\npeitschenartig gegen das Ziel."
    es: "El usuario agita violentamente sus lianas o tentáculos\npara golpear al objetivo."
    ko: "덩굴이나 촉수를 세차게 흔들어\n상대를 힘껏 쳐서 공격한다."
    zh_simp: "激烈地挥舞青藤或触手\n摔打对手进行攻击。"
    zh_trad: "激烈地揮舞藤蔓或觸手\n向對手進行攻擊。"
tr73:
  names:
    jp_kana: わざレコード７３
    jp_kanji: わざレコード７３
    en: TR73
    fr: DT73
    it: DT73
    de: TP73
    es: DT73
    ko: 기술레코드73
    zh_simp: 招式记录７３
    zh_trad: 招式紀錄７３
  descriptions:
    jp_kana: "きたない　ゴミを\nあいてに　ぶつけて　こうげきする。\nどく　じょうたいに　することが　ある。"
    jp_kanji: "汚い　ゴミを\n相手に　ぶつけて　攻撃する。\n毒状態に　することが　ある。"
    en: "The user shoots filthy garbage at the target to\nattack. This may also poison the target."
    fr: "Le lanceur envoie des détritus sur l’ennemi.\nPeut aussi l’empoisonner."
    it: "Chi la usa attacca il bersaglio con rifiuti sudici\nche possono anche avvelenarlo."
    de: "Anwender schießt mit Müll auf das Ziel. Vergiftet dieses\neventuell."
    es: "Lanza contra el objetivo basura asquerosa y puede\nenvenenarlo."
    ko: "더러운 쓰레기를\n상대에게 부딪쳐서 공격한다.\n독 상태로 만들 때가 있다."
    zh_simp: "用肮脏的垃圾\n撞向对手进行攻击。\n有时会让对手陷入中毒状态。"
    zh_trad: "將骯髒的垃圾\n丟向對手進行攻擊。\n有時會讓對手陷入中毒狀態。"
tr74:
  names:
    jp_kana: わざレコード７４
    jp_kanji: わざレコード７４
    en: TR74
    fr: DT74
    it: DT74
    de: TP74
    es: DT74
    ko: 기술레코드74
    zh_simp: 招式记录７４
    zh_trad: 招式紀錄７４
  descriptions:
    jp_kana: "はがねの　ような\nかたい　あたまで　こうげきする。\nあいてを　ひるませる　ことが　ある。"
    jp_kanji: "鋼の　ような\n硬い　頭で　攻撃する。\n相手を　ひるませることが　ある。"
    en: "The user slams the target with its steel-hard head.\nThis may also make the target flinch."
    fr: "Le lanceur heurte l’ennemi avec sa tête dure\ncomme de l’acier. Peut aussi l’apeurer."
    it: "Chi la usa colpisce il bersaglio con la sua testa\ndura come l’acciaio. Può anche farlo tentennare."
    de: "Ziel wird durch stahlharten Kopf des Anwenders\ngetroffen und schreckt eventuell zurück."
    es: "Ataca con su dura cabeza de hierro. Puede hacer que\nel objetivo se amedrente."
    ko: "강철과 같은\n단단한 머리로 공격한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "用钢铁般坚硬的头部进行攻击。\n有时会使对手畏缩。"
    zh_trad: "用如同鋼鐵般\n堅硬的頭部進行攻擊。\n有時會讓對手畏縮。"
tr75:
  names:
    jp_kana: わざレコード７５
    jp_kanji: わざレコード７５
    en: TR75
    fr: DT75
    it: DT75
    de: TP75
    es: DT75
    ko: 기술레코드75
    zh_simp: 招式记录７５
    zh_trad: 招式紀錄７５
  descriptions:
    jp_kana: "とがった　いわを\nあいてに　つきさして　こうげきする。\nきゅうしょに　あたりやすい。"
    jp_kanji: "とがった　岩を\n相手に　突き刺して　攻撃する。\n急所に　当たりやすい。"
    en: "The user stabs the target from below with\nsharpened stones. Critical hits land more easily."
    fr: "Fait surgir des pierres aiguisées sous l’ennemi.\nTaux de critiques élevé."
    it: "Chi la usa colpisce il bersaglio dal basso con\npietre affilate. Probabile brutto colpo."
    de: "Anwender schleudert scharfe Steine auf das Ziel.\nHohe Volltrefferquote."
    es: Clava piedras muy afiladas al objetivo. Suele ser crítico.
    ko: "뾰족한 바위를\n상대에게 꿰찔러서 공격한다.\n급소에 맞기 쉽다."
    zh_simp: "用尖尖的岩石\n刺入对手进行攻击。\n容易击中要害。"
    zh_trad: "用尖銳的岩石\n刺進對手進行攻擊。\n容易擊中要害。"
tr76:
  names:
    jp_kana: わざレコード７６
    jp_kanji: わざレコード７６
    en: TR76
    fr: DT76
    it: DT76
    de: TP76
    es: DT76
    ko: 기술레코드76
    zh_simp: 招式记录７６
    zh_trad: 招式紀錄７６
  descriptions:
    jp_kana: "あいての　まわりに　むすうの　いわを\nうかべて　こうたいで　でてきた　あいての\nポケモンに　ダメージを　あたえる。"
    jp_kanji: "相手の　周りに　無数の　岩を\n浮かべて　交代で　でてきた　相手の\nポケモンに　ダメージを　与える。"
    en: "The user lays a trap of levitating stones around the\nopposing team. The trap hurts opposing Pokémon\nthat switch into battle."
    fr: "Lance des pierres flottantes autour de l’ennemi,\nqui blessent tout adversaire entrant au combat."
    it: "Chi la usa piazza una trappola di rocce sospese\nche danneggia i nemici che entrano in campo."
    de: "Der Anwender legt eine Falle aus schwebenden Steinen\naus, die gegnerische Pokémon verletzen, die in den\nKampf gerufen werden."
    es: "Una trampa de rocas que flota en el aire y daña a los\nobjetivos que entran en combate."
    ko: "상대의 주위에 무수한 바위를\n띄워 교체해서 나온 상대\n포켓몬에게 데미지를 준다."
    zh_simp: "将无数岩石悬浮在对手的周围，\n从而对替换出场的\n对手的宝可梦给予伤害。"
    zh_trad: "在對手周圍撒下無數飄浮的岩石，\n讓對手替換出場的寶可夢受到傷害。"
tr77:
  names:
    jp_kana: わざレコード７７
    jp_kanji: わざレコード７７
    en: TR77
    fr: DT77
    it: DT77
    de: TP77
    es: DT77
    ko: 기술레코드77
    zh_simp: 招式记录７７
    zh_trad: 招式紀錄７７
  descriptions:
    jp_kana: "くさを　からませて　あいてを\nころばせる。あいてが　おもいほど\nいりょくが　あがる。"
    jp_kanji: "草を　からませて　相手を\n転ばせる。相手が　重いほど\n威力が　あがる。"
    en: "The user snares the target with grass and trips it.\nThe heavier the target, the greater the\nmove’s power."
    fr: "L’ennemi est piégé dans de l’herbe qui le fait trébucher.\nPlus il est lourd, plus la puissance de cette capacité\naugmente."
    it: "Chi la usa intrappola il bersaglio con l’erba e lo fa\ncadere. Danneggia maggiormente i Pokémon\npiù pesanti."
    de: "Ziel wird durch Gras ins Straucheln gebracht.\nJe schwerer das Ziel, desto mehr Schaden."
    es: "Enreda al objetivo con hierba y lo derriba. Cuanto más\npesado es el objetivo, más daño inflige."
    ko: "풀을 휘감아서 상대를\n쓰러뜨린다. 상대가 무거울수록\n위력이 올라간다."
    zh_simp: "用草缠住并绊倒对手。\n对手越重，威力越大。"
    zh_trad: "用打結的草絆倒對手。\n對手越重，威力越大。"
tr78:
  names:
    jp_kana: わざレコード７８
    jp_kanji: わざレコード７８
    en: TR78
    fr: DT78
    it: DT78
    de: TP78
    es: DT78
    ko: 기술레코드78
    zh_simp: 招式记录７８
    zh_trad: 招式紀錄７８
  descriptions:
    jp_kana: "ヘドロの　なみで　じぶんの\nまわりに　いるものを　こうげきする。\nどく　じょうたいに　することが　ある。"
    jp_kanji: "ヘドロの　波で　自分の\n周りに　いるものを　攻撃する。\n毒状態に　することが　ある。"
    en: "The user strikes everything around it by swamping\nthe area with a giant sludge wave. This may also\npoison those hit."
    fr: "Une vague de détritus attaque tous les Pokémon\nautour du lanceur. Peut aussi empoisonner."
    it: "Lancia un’onda di fango che attacca tutti i Pokémon\nnelle vicinanze. Può anche avvelenarli."
    de: "Greift alle Pokémon im Umkreis mit einer Schlammwelle\nan. Diese werden eventuell auch vergiftet."
    es: "Una onda tóxica que daña a los Pokémon de alrededor.\nPuede envenenar."
    ko: "오물 파도로 자신의\n주위에 있는 포켓몬을 공격한다.\n독 상태로 만들 때가 있다."
    zh_simp: "用污泥波攻击\n自己周围所有的宝可梦。\n有时会让其他宝可梦陷入中毒状态。"
    zh_trad: "用污泥波攻擊\n自己周圍所有的寶可夢。\n有時會讓對手陷入中毒狀態。"
tr79:
  names:
    jp_kana: わざレコード７９
    jp_kanji: わざレコード７９
    en: TR79
    fr: DT79
    it: DT79
    de: TP79
    es: DT79
    ko: 기술레코드79
    zh_simp: 招式记录７９
    zh_trad: 招式紀錄７９
  descriptions:
    jp_kana: "おもたい　からだで　あいてに　ぶつかって\nこうげきする。　じぶんが　あいてより\nおもいほど　いりょくが　あがる。"
    jp_kanji: "重たい　体で　相手に　ぶつかって\n攻撃する。　自分が　相手より\n重いほど　威力が　あがる。"
    en: "The user slams into the target with its heavy body.\nThe more the user outweighs the target, the greater\nthe move’s power."
    fr: "Le lanceur se jette sur l’ennemi de tout son poids.\nS’il est plus lourd que l’ennemi, l’effet augmente\nen conséquence."
    it: "Chi la usa si lancia contro il bersaglio con tutto\nil proprio peso. Più è pesante rispetto ad esso,\npiù danni causa."
    de: "Anwender rammt das Ziel mit massivem Körper.\nJe schwerer er im Vergleich zum Ziel ist, desto\nstärker die Attacke."
    es: "El usuario golpea con todo su cuerpo. Cuanto mayor\nsea su peso comparado con el del objetivo, más daño\ncausará."
    ko: "무거운 몸으로 상대에게 부딪쳐\n공격한다. 자신이 상대보다\n무거울수록 위력이 올라간다."
    zh_simp: "用沉重的身体撞向对手进行攻击。\n自己比对手越重，威力越大。"
    zh_trad: "用沉重的身體衝撞對手進行攻擊。\n體重比對手重越多，威力越大。"
tr80:
  names:
    jp_kana: わざレコード８０
    jp_kanji: わざレコード８０
    en: TR80
    fr: DT80
    it: DT80
    de: TP80
    es: DT80
    ko: 기술레코드80
    zh_simp: 招式记录８０
    zh_trad: 招式紀錄８０
  descriptions:
    jp_kana: "でんきの　かたまりを　あいてに\nぶつける。あいてより　すばやさが\nはやいほど　いりょくが　あがる。"
    jp_kanji: "電気の　塊を　相手に\nぶつける。相手より　素早さが\n速いほど　威力が　あがる。"
    en: "The user hurls an electric orb at the target. The\nfaster the user is than the target, the greater the\nmove’s power."
    fr: "Le lanceur envoie une boule d’électricité.\nSi sa Vitesse est plus grande que celle de l’ennemi,\nles dégâts augmentent d’autant."
    it: "Chi la usa attacca con una sfera d’energia elettrica.\nPiù è rapido rispetto al bersaglio, più danni arreca."
    de: "Je höher die Initiative des Anwenders im Vergleich\nzum Ziel ist, desto stärker trifft dieses eine geballte\nLadung Strom."
    es: "Lanza una bola eléctrica. Cuanto mayor sea la\nVelocidad del usuario en comparación con la del\nobjetivo, mayor será el daño causado."
    ko: "전기 덩어리를 상대에게 부딪쳐서\n공격한다. 상대보다 스피드가\n빠를수록 위력이 올라간다."
    zh_simp: "用电气团撞向对手。\n自己比对手速度越快，威力越大。"
    zh_trad: "用電球攻擊對手。\n速度比對手快越多，\n威力越大。"
tr81:
  names:
    jp_kana: わざレコード８１
    jp_kanji: わざレコード８１
    en: TR81
    fr: DT81
    it: DT81
    de: TP81
    es: DT81
    ko: 기술레코드81
    zh_simp: 招式记录８１
    zh_trad: 招式紀錄８１
  descriptions:
    jp_kana: "あいての　ちからを　りようする。\nたたかっている　あいての　こうげきが\nたかいほど　ダメージが　あがる。"
    jp_kanji: "相手の　力を　利用する。\n戦っている　相手の　攻撃が\n高いほど　ダメージが　あがる。"
    en: "The user turns the target’s power against it.\nThe higher the target’s Attack stat, the greater\nthe damage it deals."
    fr: "Le lanceur utilise la force de l’ennemi.\nPlus l’Attaque de l’ennemi est élevée,\nplus le lanceur inflige de dégâts."
    it: "Chi la usa sfrutta la forza del bersaglio. Il danno\ninflitto è proporzionale all’Attacco del nemico."
    de: "Anwender macht sich die Kraft des Zieles zunutze.\nJe höher dessen Angriff, desto mehr Schaden richtet\ndie Attacke an."
    es: "El usuario emplea la fuerza del objetivo para atacarlo.\nCuanto mayor es el Ataque del objetivo, más daño\nprovoca."
    ko: "상대의 힘을 이용한다.\n싸우고 있는 상대의 공격이\n높을수록 데미지가 올라간다."
    zh_simp: "利用对手的力量进行攻击。\n正和自己战斗的对手，\n其攻击越高，伤害越大。"
    zh_trad: "利用對手的力量進行攻擊。\n對手的攻擊越高，\n給予對手的傷害越大。"
tr82:
  names:
    jp_kana: わざレコード８２
    jp_kanji: わざレコード８２
    en: TR82
    fr: DT82
    it: DT82
    de: TP82
    es: DT82
    ko: 기술레코드82
    zh_simp: 招式记录８２
    zh_trad: 招式紀錄８２
  descriptions:
    jp_kana: "ちくせき　された　パワーで　あいてを\nこうげきする。じぶんの　のうりょくが\nあがって　いるほど　いりょくが　あがる。"
    jp_kanji: "蓄積された　パワーで　相手を\n攻撃する。自分の　能力が\nあがっているほど　威力が　あがる。"
    en: "The user attacks the target with stored power.\nThe more the user’s stats are raised, the greater\nthe move’s power."
    fr: "Le lanceur attaque l’ennemi avec une force accumulée.\nPlus les stats du lanceur sont augmentées,\nplus le coup est efficace."
    it: "Attacca il bersaglio con l’energia accumulata.\nPiù sono state aumentate le statistiche, maggiore\nè il danno inflitto."
    de: "Angriff mit angesparter Energie. Je stärker die\nStatuswerte des Anwenders erhöht wurden, desto mehr\nSchaden richtet diese Attacke an."
    es: "Acumula poder para golpear. Cuanto más suban las\ncaracterísticas del usuario, mayor será el daño."
    ko: "축적된 파워로 상대를\n공격한다. 자신의 능력이\n올라가 있는 만큼 위력이 오른다."
    zh_simp: "用蓄积起来的力量攻击对手。\n自己的能力提高得越多，威力就越大。"
    zh_trad: "用蓄積的力量攻擊對手。\n自己的能力提高越多，\n招式的威力越大。"
tr83:
  names:
    jp_kana: わざレコード８３
    jp_kanji: わざレコード８３
    en: TR83
    fr: DT83
    it: DT83
    de: TP83
    es: DT83
    ko: 기술레코드83
    zh_simp: 招式记录８３
    zh_trad: 招式紀錄８３
  descriptions:
    jp_kana: "ふしぎな　ちからで　テレポートして\nじぶんと　みかたの　いばしょを\nいれかえる。"
    jp_kanji: "不思議な　力で　テレポートして\n自分と　味方の　居場所を\n入れ替える。"
    en: "The user teleports using a strange power and\nswitches places with one of its allies."
    fr: "Le lanceur se téléporte à l’aide d’un pouvoir mystérieux.\nIl échange sa place avec celle d’un allié sur le terrain."
    it: "Chi la usa cambia di posto con un alleato\nin campo grazie a un misterioso potere."
    de: "Wundersame Kräfte teleportieren den Anwender an\nden Platz eines Mitstreiters."
    es: "Extraño poder que intercambia la posición del usuario\ncon la de un aliado sobre el terreno de combate."
    ko: "이상한 힘으로 순간이동하여\n자신과 같은 편의 위치를 바꾼다."
    zh_simp: "用神奇的力量瞬间移动，\n互换自己和同伴所在的位置。"
    zh_trad: "用神奇的力量瞬間移動，\n讓自己和同伴的所在位置互換。"
tr84:
  names:
    jp_kana: わざレコード８４
    jp_kanji: わざレコード８４
    en: TR84
    fr: DT84
    it: DT84
    de: TP84
    es: DT84
    ko: 기술레코드84
    zh_simp: 招式记录８４
    zh_trad: 招式紀錄８４
  descriptions:
    jp_kana: "あつく　にえたぎる　みずを\nあいてに　はっしゃして　こうげきする。\nやけど　じょうたいに　することが　ある。"
    jp_kanji: "熱く　煮えたぎる　水を\n相手に　発射して　攻撃する。\nやけど状態に　することが　ある。"
    en: "The user shoots boiling hot water at its target.\nThis may also leave the target with a burn."
    fr: "L’ennemi est attaqué par un jet d’eau bouillante.\nPeut aussi le brûler."
    it: "Chi la usa attacca il bersaglio con un getto\nd’acqua bollente che può anche scottarlo."
    de: "Heizt dem Ziel mit einem Schwall siedend heißen\nKochwassers ein. Das Ziel erleidet dabei eventuell\nVerbrennungen."
    es: "Ataca arrojando agua hirviendo al objetivo. Puede\ncausar quemaduras."
    ko: "뜨겁게 끓어오르는 물을\n상대에게 발사해서 공격한다.\n화상 상태로 만들 때가 있다."
    zh_simp: "向对手喷射\n煮得翻滚的开水进行攻击。\n有时会让对手陷入灼伤状态。"
    zh_trad: "向對手噴射\n滾燙的熱水進行攻擊。\n有時會讓對手陷入灼傷狀態。"
tr85:
  names:
    jp_kana: わざレコード８５
    jp_kanji: わざレコード８５
    en: TR85
    fr: DT85
    it: DT85
    de: TP85
    es: DT85
    ko: 기술레코드85
    zh_simp: 招式记录８５
    zh_trad: 招式紀錄８５
  descriptions:
    jp_kana: "じぶんを　ふるいたてて\nこうげきと　とくこうを　あげる。"
    jp_kanji: "自分を　奮いたてて\n攻撃と　特攻を　あげる。"
    en: "The user is roused, and its Attack and Sp. Atk\nstats increase."
    fr: "Le lanceur se rengorge.\nAugmente l’Attaque et l’Attaque Spéciale."
    it: "Chi la usa si tira su di morale, aumentando\nil proprio Attacco e l’Attacco Speciale."
    de: "Anwender erhält einen Kraftschub, der seinen Angriff\nund Spezial-Angriff erhöht."
    es: "Quien lo usa se concentra y potencia su Ataque y\nsu Ataque Especial."
    ko: "스스로 분발해서\n공격과 특수공격을 올린다."
    zh_simp: "激励自己，\n从而提高攻击和特攻。"
    zh_trad: "激勵自己，\n提高自己的攻擊和特攻。"
tr86:
  names:
    jp_kana: わざレコード８６
    jp_kanji: わざレコード８６
    en: TR86
    fr: DT86
    it: DT86
    de: TP86
    es: DT86
    ko: 기술레코드86
    zh_simp: 招式记录８６
    zh_trad: 招式紀錄８６
  descriptions:
    jp_kana: "でんきを　まとって\nあいてに　ぶつかって　こうげきする。\nじぶんも　すこし　ダメージを　うける。"
    jp_kanji: "電気を　まとって\n相手に　ぶつかって　攻撃する。\n自分も　少し　ダメージを　受ける。"
    en: "The user shrouds itself in electricity and smashes\ninto its target. This also damages the user a little."
    fr: "Une charge électrique violente qui blesse aussi\nlégèrement le lanceur."
    it: "Chi la usa si carica di elettricità per poi scagliarsi\nsul bersaglio, ma subisce dei danni per il contraccolpo."
    de: "Anwender erzeugt Spannung und greift an, indem er\nauf Kollisionskurs geht. Er erleidet selbst leichten\nSchaden."
    es: "Carga eléctrica muy potente que también hiere\nligeramente a quien la usa."
    ko: "전기를 두르고\n상대에게 부딪쳐 공격한다.\n자신도 조금 데미지를 입는다."
    zh_simp: "让电流覆盖全身，\n撞向对手进行攻击。\n自己也会受到少许伤害。"
    zh_trad: "讓電流圍繞全身，\n衝撞對手進行攻擊。\n自己也會受到少許傷害。"
tr87:
  names:
    jp_kana: わざレコード８７
    jp_kanji: わざレコード８７
    en: TR87
    fr: DT87
    it: DT87
    de: TP87
    es: DT87
    ko: 기술레코드87
    zh_simp: 招式记录８７
    zh_trad: 招式紀錄８７
  descriptions:
    jp_kana: "ドリルのように　からだを　かいてん\nしながら　あいてに　たいあたりする。\nきゅうしょに　あたりやすい。"
    jp_kanji: "ドリルのように　体を　回転しながら\n相手に　体当たりする。\n急所に　当たりやすい。"
    en: "The user crashes into its target while rotating its\nbody like a drill. Critical hits land more easily."
    fr: "Le lanceur tourne sur lui-même comme une perceuse\net se jette sur l’ennemi. Taux de critiques élevé."
    it: "Chi la usa si scaglia sul bersaglio ruotando su se stesso\ncome un trapano perforante. Probabile brutto colpo."
    de: "Anwender rammt das Ziel, während er seinen Körper\nwie einen Bohrer dreht. Hohe Volltrefferquote."
    es: "El usuario golpea usando su cuerpo como un taladro.\nSuele ser crítico."
    ko: "드릴처럼 몸을 회전시켜서\n상대에게 몸통박치기한다.\n급소에 맞기 쉽다."
    zh_simp: "像钢钻一样，\n一边旋转身体一边撞击对手。\n容易击中要害。"
    zh_trad: "像鑽頭一樣旋轉身體，\n猛烈地撞擊對手。\n容易擊中要害。"
tr88:
  names:
    jp_kana: わざレコード８８
    jp_kanji: わざレコード８８
    en: TR88
    fr: DT88
    it: DT88
    de: TP88
    es: DT88
    ko: 기술레코드88
    zh_simp: 招式记录８８
    zh_trad: 招式紀錄８８
  descriptions:
    jp_kana: "もえる　からだで　あいてに　ぶつかって\nこうげきする。　じぶんが　あいてより\nおもいほど　いりょくが　あがる。"
    jp_kanji: "燃える　体で　相手に　ぶつかって\n攻撃する。　自分が　相手より\n重いほど　威力が　あがる。"
    en: "The user slams its target with its flame-covered\nbody. The more the user outweighs the target, the\ngreater the move’s power."
    fr: "Le lanceur projette son corps enflammé contre l’ennemi.\nS’il est plus lourd que l’ennemi, l’effet augmente\nen conséquence."
    it: "Chi la usa carica con il suo corpo rovente. Più è\npesante rispetto al bersaglio, più danni causa."
    de: "Rempelattacke mit brennendem Körper. Je schwerer\nder Anwender im Vergleich zum Ziel ist, desto stärker\ndie Attacke."
    es: "El usuario ataca con su cuerpo ardiente. Cuanto mayor\nsea su peso comparado con el del objetivo, más daño\ncausará."
    ko: "불타는 몸으로 상대에게 부딪쳐서\n공격한다. 자신이 상대보다\n무거울수록 위력이 올라간다."
    zh_simp: "用燃烧的身体\n撞向对手进行攻击。\n自己比对手越重，威力越大。"
    zh_trad: "用燃燒的身體重壓對手\n進行攻擊。體重比對手\n重越多，威力越大。"
tr89:
  names:
    jp_kana: わざレコード８９
    jp_kanji: わざレコード８９
    en: TR89
    fr: DT89
    it: DT89
    de: TP89
    es: DT89
    ko: 기술레코드89
    zh_simp: 招式记录８９
    zh_trad: 招式紀錄８９
  descriptions:
    jp_kana: "きょうれつな　かぜで　あいてを\nつつみこんで　こうげきする。\nあいてを　こんらん　させることが　ある。"
    jp_kanji: "強烈な　風で　相手を\n包みこんで　攻撃する。\n相手を　混乱させることが　ある。"
    en: "The user attacks by wrapping its opponent in a\nfierce wind that flies up into the sky. This may also\nconfuse the target."
    fr: "Le lanceur déclenche une tempête de vents violents\nqui s’abat sur l’ennemi. Peut aussi le rendre confus."
    it: "Chi la usa attacca il bersaglio avvolgendolo con\nun vento fortissimo. Può anche confonderlo."
    de: "Anwender greift das Ziel an, indem er es mit heftigen\nWindböen umgibt. Ziel wird eventuell verwirrt."
    es: "Golpea al objetivo con un fuerte torbellino que\nenvuelve al rival y puede confundirlo."
    ko: "강렬한 바람으로 상대를\n둘러싸서 공격한다.\n상대를 혼란시킬 때가 있다."
    zh_simp: "用强烈的风\n席卷对手进行攻击。\n有时会使对手混乱。"
    zh_trad: "用強烈的風席捲\n對手進行攻擊。\n有時會使對手混亂。"
tr90:
  names:
    jp_kana: わざレコード９０
    jp_kanji: わざレコード９０
    en: TR90
    fr: DT90
    it: DT90
    de: TP90
    es: DT90
    ko: 기술레코드90
    zh_simp: 招式记录９０
    zh_trad: 招式紀錄９０
  descriptions:
    jp_kana: "あいてに　じゃれついて\nこうげきする。　あいての\nこうげきを　さげる　ことがある。"
    jp_kanji: "相手に　じゃれついて\n攻撃する。　相手の\n攻撃を　さげる　ことがある。"
    en: "The user plays rough with the target and attacks it.\nThis may also lower the target’s Attack stat."
    fr: "Attaque l’ennemi avec un câlin.\nPeut diminuer son Attaque."
    it: "Chi la usa attacca il bersaglio con delle carinerie.\nPuò anche ridurne l’Attacco."
    de: "Der Anwender knuddelt das Ziel und greift es an.\nSenkt eventuell den Angriffs-Wert des Zieles."
    es: "El Pokémon que lo usa le hace cucamonas al objetivo y\nlo ataca. Puede disminuir el Ataque del objetivo."
    ko: "상대에게 치근거리며\n공격한다. 상대의\n공격을 떨어뜨릴 때가 있다."
    zh_simp: "与对手嬉闹并攻击。\n有时会降低对手的攻击。"
    zh_trad: "在和對手嬉鬧的同時進行攻擊。\n有時會降低對手的攻擊。"
tr91:
  names:
    jp_kana: わざレコード９１
    jp_kanji: わざレコード９１
    en: TR91
    fr: DT91
    it: DT91
    de: TP91
    es: DT91
    ko: 기술레코드91
    zh_simp: 招式记录９１
    zh_trad: 招式紀錄９１
  descriptions:
    jp_kana: "とくしゅな　どくえきを　あびせかける。\nどく　じょうたいの　あいては\nこうげき　とくこう　すばやさが　さがる。"
    jp_kanji: "特殊な　毒液を　浴びせかける。\n毒状態の　相手は\n攻撃　特攻　素早さが　さがる。"
    en: "Opposing Pokémon are drenched in an odd\npoisonous liquid. This lowers the Attack, Sp. Atk, and\nSpeed stats of a poisoned target."
    fr: "Sécrète un liquide empoisonné.\nDiminue l’Attaque, l’Attaque Spéciale et la Vitesse\nde l’ennemi empoisonné."
    it: "Emette un liquido particolare che riduce\nl’Attacco, l’Attacco Speciale e la Velocità\ndei nemici avvelenati intorno a chi la usa."
    de: "Anwender bespritzt das Ziel mit einer speziellen\nGiftflüssigkeit. Senkt den Angriff, den Spezial-Angriff\nund die Initiative von vergifteten Zielen."
    es: "Impregna a su objetivo con un líquido venenoso que\ndisminuye el Ataque, el Ataque Especial y la Velocidad.\nSolo afecta a Pokémon ya envenenados."
    ko: "특수한 독액을 끼얹는다.\n독 상태인 상대는\n공격, 특수공격, 스피드가 떨어진다."
    zh_simp: "将特殊的毒液泼向对手。\n对处于中毒状态的对手，\n其攻击、特攻和速度都会降低。"
    zh_trad: "向對手發射特殊的毒液。\n陷入中毒狀態的對手\n攻擊、特攻和速度會降低。"
tr92:
  names:
    jp_kana: わざレコード９２
    jp_kanji: わざレコード９２
    en: TR92
    fr: DT92
    it: DT92
    de: TP92
    es: DT92
    ko: 기술레코드92
    zh_simp: 招式记录９２
    zh_trad: 招式紀錄９２
  descriptions:
    jp_kana: "きょうりょくな　ひかりを　はなち\nあいてに　ダメージを　あたえる。"
    jp_kanji: "強力な　光を　放ち\n相手に　ダメージを　与える。"
    en: "The user damages opposing Pokémon by emitting a\npowerful flash."
    fr: "Libère une puissante décharge lumineuse\nqui inflige des dégâts à l’ennemi."
    it: "Chi la usa emette una luce potentissima che\ninfligge danni ai nemici intorno."
    de: "Der Anwender feuert einen mächtigen Lichtblitz ab,\nder gegnerischen Pokémon Schaden zufügt."
    es: Inflige daño a los oponentes con una potente luz.
    ko: "강력한 빛을 내어\n상대에게 데미지를 준다."
    zh_simp: "向对手发射强光，\n并给予伤害。"
    zh_trad: "發出強烈的閃光，\n給予對手傷害。"
tr93:
  names:
    jp_kana: わざレコード９３
    jp_kanji: わざレコード９３
    en: TR93
    fr: DT93
    it: DT93
    de: TP93
    es: DT93
    ko: 기술레코드93
    zh_simp: 招式记录９３
    zh_trad: 招式紀錄９３
  descriptions:
    jp_kana: "りょううでを　まわし　あいてに　あてる。\nあいての　のうりょく　へんかに\nかんけいなく　ダメージを　あたえる。"
    jp_kanji: "両腕を　回し　相手に　当てる。\n相手の　能力変化に\n関係なく　ダメージを　与える。"
    en: "The user swings both arms and hits the target.\nThe target’s stat changes don’t affect this\nattack’s damage."
    fr: "Le Pokémon étend les bras et frappe l’adversaire\nen tournant violemment. Inflige des dégâts et ignore\nles changements de stats de la cible."
    it: "Chi la usa attacca il bersaglio mulinando gli arti.\nIl danno inflitto ignora le modifiche alle statistiche\ndel bersaglio."
    de: "Der Anwender wirbelt mit beiden Armen und prallt\nso auf das Ziel. Richtet unabhängig von den\nStatusveränderungen des Zieles Schaden an."
    es: "Gira sobre sí mismo y golpea al oponente con ambos\nbrazos. Ignora los cambios en las características del\nobjetivo."
    ko: "양팔을 돌려 상대에게 부딪친다.\n상대의 능력 변화에\n상관없이 데미지를 준다."
    zh_simp: "旋转双臂打向对手。\n无视对手的能力变化，\n直接给予伤害。"
    zh_trad: "旋轉雙臂並打向對手。\n可不顧對手的能力變化\n給予傷害。"
tr94:
  names:
    jp_kana: わざレコード９４
    jp_kanji: わざレコード９４
    en: TR94
    fr: DT94
    it: DT94
    de: TP94
    es: DT94
    ko: 기술레코드94
    zh_simp: 招式记录９４
    zh_trad: 招式紀錄９４
  descriptions:
    jp_kana: "ぜんしんを　つかって\nあいてに　もうアタックする。"
    jp_kanji: "全身を　使って\n相手に　猛アタックする。"
    en: "The user fiercely attacks the target using its\nentire body."
    fr: "Le lanceur attaque violemment en utilisant\ntout son poids."
    it: Chi la usa travolge il bersaglio con un attacco possente.
    de: "Der Anwender greift das Ziel mit einer heftigen\nGanzkörper-Attacke an."
    es: Asesta un golpe devastador usando todo su cuerpo.
    ko: "온몸을 써서 상대를\n맹렬히 공격한다."
    zh_simp: "使出全身力量，\n猛攻对手。"
    zh_trad: "使出全身力量，\n猛攻對手。"
tr95:
  names:
    jp_kana: わざレコード９５
    jp_kanji: わざレコード９５
    en: TR95
    fr: DT95
    it: DT95
    de: TP95
    es: DT95
    ko: 기술레코드95
    zh_simp: 招式记录９５
    zh_trad: 招式紀錄９５
  descriptions:
    jp_kana: "この　わざを　うけた　あいては\nじごくの　くるしみから　２ターンのあいだ\nおとの　わざを　だすことが　できなくなる。"
    jp_kanji: "この　技を　受けた　相手は\n地獄の　苦しみから　２ターンの間\n音の　技を　出すことが　できなくなる。"
    en: "The user attacks the target’s throat, and the\nresultant suffering prevents the target from using\nmoves that emit sound for two turns."
    fr: "Inflige une douleur tellement violente à la cible\nqu’elle ne peut plus émettre de sons pendant deux tours."
    it: "Chi viene colpito da questa mossa prova un\ndolore lancinante e non può più usare mosse\nbasate sul suono per due turni."
    de: "Das Pokémon, das von dieser Attacke getroffen wird,\nerleidet starke Schmerzen und kann deswegen zwei\nRunden lang keine Lärm-Attacken mehr einsetzen."
    es: "Inflige al rival un dolor tan abrumador que le impide\nutilizar durante dos turnos ataques que se sirven del\nsonido."
    ko: "이 기술에 맞은 상대는\n지옥의 고통 때문에 2턴 동안\n소리 기술을 낼 수 없다."
    zh_simp: "受到此招式攻击的对手，\n会因为深渊般的痛苦，在２回合内，\n变得无法使出声音类招式。"
    zh_trad: "受到此招式攻擊的對手，\n會因為地獄般的痛苦，在２回合內\n無法使用會發出聲音的招式。"
tr96:
  names:
    jp_kana: わざレコード９６
    jp_kanji: わざレコード９６
    en: TR96
    fr: DT96
    it: DT96
    de: TP96
    es: DT96
    ko: 기술레코드96
    zh_simp: 招式记录９６
    zh_trad: 招式紀錄９６
  descriptions:
    jp_kana: "てきには　ばくはつする　だんごを\nつかって　こうげき。　みかたには\nかいふくする　だんごを　あたえる。"
    jp_kanji: "敵には　爆発する　だんごを\n使って　攻撃。　味方には\n回復する　だんごを　与える。"
    en: "The user attacks the enemy with a pollen puff that\nexplodes. If the target is an ally, it gives the ally a\npollen puff that restores its HP instead."
    fr: "Utilisée sur l’ennemi, envoie une boule explosive\nqui fait des dégâts ; sur un allié, donne du bon pollen\nnutritif qui fait récupérer des PV."
    it: "Chi la usa attacca il nemico con una sfera esplosiva.\nSe colpisce degli alleati, fa recuperare loro dei PS."
    de: "Der Anwender greift mit einem Ball aus Pollen an,\nder beim Ziel explodiert. Mitstreiter werden von\neinem Ball getroffen, der ihre KP auffüllt."
    es: "Ataca al oponente con una bola explosiva. Si esta\nalcanza a un aliado, le hará recuperar PS."
    ko: "상대에게는 폭발하는 경단을\n사용하여 공격한다. 같은 편에게는\n회복하는 경단을 준다."
    zh_simp: "对敌人使用是会爆炸的团子。\n对我方使用则是给予回复的团子。"
    zh_trad: "對敵人使用時，用會爆炸的花粉團來攻擊。\n對我方同伴使用時，\n則給予有回復效果的花粉團。"
tr97:
  names:
    jp_kana: わざレコード９７
    jp_kanji: わざレコード９７
    en: TR97
    fr: DT97
    it: DT97
    de: TP97
    es: DT97
    ko: 기술레코드97
    zh_simp: 招式记录９７
    zh_trad: 招式紀錄９７
  descriptions:
    jp_kana: "サイコパワーで　かみついて\nあいてを　こうげきする。　ひかりのかべや\nリフレクター　なども　はかいできる。"
    jp_kanji: "サイコパワーで　かみついて\n相手を　攻撃する。　ひかりのかべや\nリフレクター　なども　破壊できる。"
    en: "The user bites the target with its psychic\ncapabilities. This can also destroy Light Screen\nand Reflect."
    fr: "Le lanceur mord la cible avec ses pouvoirs psychiques.\nBrise aussi les barrières comme Mur Lumière\net Protection."
    it: "Morde il bersaglio con delle zanne generate\ncon l’energia psichica e rompe barriere come\nRiflesso e Schermoluce."
    de: "Der Anwender beißt das Ziel mithilfe von\nPsycho-Kräften. Die Attacke durchbricht auch\nBarrieren wie Lichtschild und Reflektor."
    es: "Ataca a sus rivales con poderes psíquicos que además\ndestruyen barreras como Pantalla de Luz y Reflejo."
    ko: "사이코 파워로 물어서\n상대를 공격한다. 빛의장막이나\n리플렉터도 파괴할 수 있다."
    zh_simp: "利用精神力量咬住对手进行攻击。\n还可以破坏光墙和反射壁等。"
    zh_trad: "利用精神力量咬住對手進行攻擊。\n並可破壞光牆和反射壁等。"
tr98:
  names:
    jp_kana: わざレコード９８
    jp_kanji: わざレコード９８
    en: TR98
    fr: DT98
    it: DT98
    de: TP98
    es: DT98
    ko: 기술레코드98
    zh_simp: 招式记录９８
    zh_trad: 招式紀錄９８
  descriptions:
    jp_kana: "みずの　ちからで　あいてに\nぶつかって　こうげきする。\nあいての　ぼうぎょを　さげる　ことがある。"
    jp_kanji: "水の　力で　相手に\nぶつかって　攻撃する。\n相手の　防御を　さげる　ことがある。"
    en: "The user slams into the target using a full-force\nblast of water. This may also lower the target’s\nDefense stat."
    fr: "Le lanceur utilise la force de l’eau pour attaquer.\nPeut aussi baisser la Défense de la cible."
    it: "Chi la usa colpisce il bersaglio con la forza\ndell’acqua. Può anche ridurne la Difesa."
    de: "Der Anwender greift das Ziel mit der Kraft des Wassers\nan. Senkt eventuell die Verteidigung des Zieles."
    es: "Ataca golpeando gracias a la fuerza del agua.\nTambién puede reducir la Defensa del objetivo."
    ko: "물의 힘으로 상대에게\n부딪쳐서 공격한다.\n상대의 방어를 떨어뜨릴 때가 있다."
    zh_simp: "用水之力量\n撞向对手进行攻击。\n有时会降低对手的防御。"
    zh_trad: "用水之力量撞向對手進行攻擊。\n有時會降低對手的防禦。"
tr99:
  names:
    jp_kana: わざレコード９９
    jp_kanji: わざレコード９９
    en: TR99
    fr: DT99
    it: DT99
    de: TP99
    es: DT99
    ko: 기술레코드99
    zh_simp: 招式记录９９
    zh_trad: 招式紀錄９９
  descriptions:
    jp_kana: "からだを　ぶつけて　こうげき。\nぼうぎょが　たかいほど\nあたえる　ダメージが　ふえる。"
    jp_kanji: "体を　ぶつけて　攻撃。\n防御が　高いほど\n与える　ダメージが　増える。"
    en: "The user attacks by slamming its body into the target.\nThe higher the user’s Defense, the more damage it can\ninflict on the target."
    fr: "Le lanceur utilise son corps pour attaquer sa cible.\nPlus la Défense du lanceur est élevée,\nplus les dégâts infligés sont importants."
    it: "Chi la usa schiaccia il bersaglio con il suo corpo.\nPiù la sua Difesa è alta, maggiori sono i danni inflitti."
    de: "Der Anwender greift mit seinem ganzen Körper an.\nJe höher seine Verteidigung ist, desto mehr Schaden\nrichtet er an."
    es: "El usuario usa el cuerpo para lanzar su ataque e infligir\nun daño directamente proporcional a su Defensa."
    ko: "몸을 부딪쳐서 공격한다.\n방어가 높을수록\n주는 데미지가 올라간다."
    zh_simp: "用身体撞向对手进行攻击。\n防御越高，\n给予的伤害就越高。"
    zh_trad: "用身體撞向對手進行攻擊。\n自己的防禦越高，\n給予對手的傷害越大。"
travel_trunk:gold:
  names:
    jp_kana: いしょうトランク
    jp_kanji: いしょうトランク
    en: Travel Trunk
    fr: Malle Penderie
    it: Baule per abiti
    de: Kleiderkoffer
    es: Maleta
    ko: 의상트렁크
    zh_simp: 衣物箱
    zh_trad: 衣物箱
  descriptions:
    jp_kana: "どんな　ファッションアイテムでも\nつめこんでおける　しゅうのうりょく\nばつぐんの　かるい　トランク。"
    jp_kanji: "どんな　ファッションアイテムでも\n詰めこんでおける　収納力\n抜群の　軽い　トランク。"
    en: "A light and yet incredibly effective trunk, which can\ncontain every last piece of clothing that can\nbe bought."
    fr: "Une valise extrêmement légère, parfaite pour stocker\nun grand nombre de vêtements et d’accessoires\nde mode."
    it: "Un baule leggero ma estremamente capiente che\npuò contenere qualsiasi capo d’abbigliamento."
    de: "Ein leichter und sehr hilfreicher Koffer mit so viel\nStauraum, dass jedes erdenkliche Kleidungsstück\nund Accessoire darin aufbewahrt werden kann."
    es: "Maleta ligera de increíble capacidad donde podrás\nguardar todas las prendas de ropa que quieras."
    ko: "어떤 패션 아이템이라도\n담아 둘 수 있고 가벼우며\n수납력이 뛰어난 트렁크."
    zh_simp: "能塞入任意时尚物品，\n收纳能力极佳的轻箱子。"
    zh_trad: "能夠塞入各種時尚物品的\n收納能力極佳的輕箱子。"
tropical_shell:
  names:
    jp_kana: なんごくかいがら
    jp_kanji: なんごくかいがら
    en: Tropical Shell
    fr: Coquille du Sud
    it: Tropiconchiglia
    de: Tropenmuschel
    es: Concha Tropical
    ko: 트로피컬조개껍질
    zh_simp: 南国贝壳
    zh_trad: 南國貝殼
  descriptions:
    jp_kana: "あたたかい　ちほうの　うみから\nながれついた　かも　しれない\nしろくて　きれいな　かいがら。"
    jp_kanji: "あたたかい　地方の　海から\n流れついた　かも　しれない\n白くて　きれいな　貝がら。"
    en: "A beautiful white shell that may have drifted from\na sea in a warm region."
    fr: "Un joli coquillage blanc. Il a peut-être été porté\npar les vagues depuis une région tropicale."
    it: "Una bellissima conchiglia bianca, forse arrivata dalle\nregioni calde sulla scia delle correnti marine."
    de: "Eine wunderschöne weiße Muschelschale. Vermutlich\nstammt sie aus dem Meer einer wärmeren Region und\nwurde von der Strömung angespült."
    es: "Preciosa concha de color blanco que quizá haya sido\narrastrada por las corrientes marinas desde mares de\nregiones más cálidas."
    ko: "따뜻한 지방의 바다에서\n흘러들어 왔을지도 모르는\n하얗고 예쁜 조개껍질."
    zh_simp: "美丽的白色贝壳。\n或许是从温暖的海域那里\n漂流到这里的。"
    zh_trad: "美麗的白色貝殼。\n可能是從溫暖的海域\n漂流過來的。"
twisted_spoon:
  names:
    jp_kana: まがったスプーン
    jp_kanji: まがったスプーン
    en: Twisted Spoon
    fr: Cuillère Tordue
    it: Cucchiaio Torto
    de: Krummlöffel
    es: Cuchara Torcida
    ko: 휘어진스푼
    zh_simp: 弯曲的汤匙
    zh_trad: 彎曲的湯匙
  descriptions:
    jp_kana: "ねんりきを　こめた　スプーン。\nもたせると　エスパータイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "念力を　こめた　スプーン。\n持たせると　エスパータイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon. This spoon is\nimbued with telekinetic power and boosts\nPsychic-type moves."
    fr: "Objet à tenir. Une cuillère contenant un pouvoir\ntélékinétique qui augmente la puissance des capacités\nde type Psy."
    it: "Strumento da dare a un Pokémon.\nCucchiaio dotato di potere telecinetico che\npotenzia le mosse di tipo Psico."
    de: "Ein Item zum Tragen. Ein Löffel voller telekinetischer\nEnergie, der Attacken vom Typ Psycho verstärkt."
    es: "Cuchara imbuida de energía telequinética que potencia\nlos movimientos de tipo Psíquico. Debe llevarla un\nPokémon."
    ko: "염동력을 담은 숟가락.\n지니게 하면 에스퍼타입\n기술의 위력이 올라간다."
    zh_simp: "注入了念力的汤匙。\n携带后，超能力属性的\n招式威力就会提高。"
    zh_trad: "注入了念力的湯匙。\n攜帶後，超能力屬性的\n招式威力就會提高。"
tyranitarite:
  names:
    jp_kana: バンギラスナイト
    jp_kanji: バンギラスナイト
    en: Tyranitarite
    fr: Tyranocivite
    it: Tyranitarite
    de: Despotarnit
    es: Tyranitarita
    ko: 마기라스나이트
    zh_simp: 班基拉斯进化石
    zh_trad: 班基拉斯進化石
  descriptions:
    jp_kana: "バンギラスに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "バンギラスに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Tyranitar hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Tyranocif, elle lui permet de\nméga-évoluer durant un combat."
    it: "Un esemplare delle misteriose Megapietre.\nData a Tyranitar, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Despotar getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Tyranitar en combate."
    ko: "마기라스에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让班基拉斯携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓班基拉斯攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
ultra_ball:
  names:
    jp_kana: ハイパーボール
    jp_kanji: ハイパーボール
    en: Ultra Ball
    fr: Hyper Ball
    it: Ultra Ball
    de: Hyperball
    es: Ultra Ball
    ko: 하이퍼볼
    zh_simp: 高级球
    zh_trad: 高級球
  descriptions:
    jp_kana: "スーパーボールよりも　さらに\nポケモンを　つかまえやすくなった\nすごく　せいのうのいい　ボール。"
    jp_kanji: "スーパーボールよりも　さらに\nポケモンを　捕まえやすくなった\nすごく　性能のいい　ボール。"
    en: "An ultra-high-performance Poké Ball that provides\na higher success rate for catching Pokémon than\na Great Ball."
    fr: "Une Poké Ball très performante dont le taux de réussite\nest supérieur à celui de la Super Ball."
    it: "Poké Ball dalle prestazioni eccellenti: fornisce\nmaggiori probabilità di cattura rispetto alla\nMega Ball."
    de: "Ein Ball mit hoher Erfolgsquote. Dem Superball in allen\nPunkten überlegen."
    es: "Poké Ball de rendimiento superior. Tiene un índice de\néxito mayor al de la Super Ball."
    ko: "수퍼볼보다도 더욱\n포켓몬을 잡기 쉬워진\n매우 성능이 좋은 볼."
    zh_simp: "比起超级球来\n更容易捉到宝可梦的，\n性能非常不错的球。"
    zh_trad: "性能非常不錯的球。\n比起超級球\n更容易捉到寶可夢。"
ultranecrozium_z:bag:
  names:
    jp_kana: ウルトラネクロＺ
    jp_kanji: ウルトラネクロＺ
    en: Ultranecrozium Z
    fr: Ultranécrozélite
    it: Ultranecrozium Z
    de: Ultranecronium Z
    es: Ultranecrostal Z
    ko: 울트라네크로Z
    zh_simp: 究极奈克洛Ｚ
    zh_trad: 究極奈克洛Ｚ
  descriptions:
    jp_kana: "ソルガレオか　ルナアーラと\nがったいした　ネクロズマを\nあらたな　すがたにする　けっしょう。"
    jp_kanji: "ソルガレオか　ルナアーラと\n合体した　ネクロズマを\n新たな　姿にする　結晶。"
    en: "It’s a crystal that turns Necrozma fused with\nSolgaleo or Lunala into a new form."
    fr: "Un cristal permettant de donner une nouvelle forme\nà Necrozma quand il a fusionné avec Solgaleo ou Lunala."
    it: "Cristallo che permette a Necrozma di assumere una\nnuova forma quando è fuso con Lunala o Solgaleo."
    de: "Kristallisierte Z-Kraft, die bei Necrozma nach der Fusion\nmit Solgaleo oder Lunala bewirkt, dass es eine neue\nForm annimmt."
    es: "Cristal que permite a Necrozma, una vez fusionado\ncon Solgaleo o Lunala, adoptar una nueva forma."
    ko: "솔가레오나 루나아라와\n합체한 네크로즈마를\n새로운 모습으로 만드는 결정."
    zh_simp: "能让和索尔迦雷欧或\n露奈雅拉合体的奈克洛兹玛\n变成崭新样子的结晶。"
    zh_trad: "可讓和索爾迦雷歐或露奈雅拉\n合體後的奈克洛茲瑪\n展現出全新樣子的結晶。"
ultranecrozium_z:held:
  names:
    jp_kana: ウルトラネクロＺ
    jp_kanji: ウルトラネクロＺ
    en: Ultranecrozium Z
    fr: Ultranécrozélite
    it: Ultranecrozium Z
    de: Ultranecronium Z
    es: Ultranecrostal Z
    ko: 울트라네크로Z
    zh_simp: 究极奈克洛Ｚ
    zh_trad: 究極奈克洛Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　けっしょう。\nネクロズマの　フォトンゲイザーを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nネクロズマの　フォトンゲイザーを\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Necrozma’s Photon Geyser to\na Z-Move."
    fr: "Une cristallisation de la Force Z, permettant\nde transformer le Photo-Geyser de Necrozma\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare la mossa Geyser Fotonico\ndi Necrozma in una mossa Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft Necrozmas\nAttacke Photonen-Geysir zu einer Z-Attacke auf."
    es: "Cristal que confiere el Poder Z al movimiento Géiser\nFotónico de Necrozma."
    ko: "Z파워의 결정.\n네크로즈마의 포톤가이저를\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将奈克洛兹玛的光子喷涌\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n可將奈克洛茲瑪的光子噴湧\n升級為Ｚ招式。"
unown_report:
  names:
    jp_kana: アンノーンノート
    jp_kanji: アンノーンノート
    en: Unown Report
    fr: Carnet Zarbi
    it: UnownBloc
    de: Icognitoheft
    es: Bloc Unown
    ko: 안농노트
    zh_simp: 未知图腾笔记
    zh_trad: 未知圖騰筆記
  descriptions:
    jp_kana: "みつけた　アンノーンの　ようすが\nきろく　されている　ノート。"
    jp_kanji: "みつけた　アンノーンの　ようすが\n記録されている　ノート。"
    en: A report detailing all of the discovered kinds of Unown.
    fr: "Un carnet permettant de noter toutes les formes\nde Zarbi capturées."
    it: "Quaderno dove si registrano tutte le forme di Unown\ncatturate."
    de: "Ein Heft, in dem automatisch Daten zu bereits\ngefangenen Icognito aufgezeichnet werden."
    es: "Bloc que almacena la información de los Unown\ncapturados hasta el momento."
    ko: "발견한 안농의 모습이\n기록되어 있는 노트."
    zh_simp: "记录着已找到的\n未知图腾样子的笔记本。"
    zh_trad: "記錄著已找到的\n未知圖騰樣子的筆記本。"
upgrade:
  names:
    jp_kana: アップグレード
    jp_kanji: アップグレード
    en: Upgrade
    fr: Améliorator
    it: Upgrade
    de: Up-Grade
    es: Mejora
    ko: 업그레이드
    zh_simp: 升级数据
    zh_trad: 升級資料
  descriptions:
    jp_kana: "なかに　いろんな　じょうほうが\nつまった　とうめいな　きかい。\nシルフ　カンパニーせい。"
    jp_kanji: "中に　いろんな　情報が\nつまった　透明な　機械。\nシルフ　カンパニー製。"
    en: "A transparent device somehow filled with all sorts\nof data. It was produced by Silph Co."
    fr: "Un dispositif transparent rempli de données diverses\net variées. Fabriqué par la Sylphe SARL."
    it: "Apparecchio trasparente pieno zeppo di dati\ndi ogni tipo. È un prodotto della Silph S.p.A."
    de: "Ein durchsichtiges Gerät. Es enthält alle möglichen\nDaten. Hergestellt von der Silph Company."
    es: "Peculiar dispositivo fabricado en Silph S. A. que\ncontiene todo tipo de datos."
    ko: "안에 여러 가지 정보가\n가득한 투명한 기계다.\n실프주식회사 제품."
    zh_simp: "内部储存了各种信息的透明机器。\n西尔佛公司制造。"
    zh_trad: "內部儲存了各種\n資訊的透明機器。\n西爾佛公司製造。"
utility_umbrella:
  names:
    jp_kana: ばんのうがさ
    jp_kanji: ばんのうがさ
    en: Utility Umbrella
    fr: Parapluie Solide
    it: Superombrello
    de: Allzweckschirm
    es: Parasol Multiuso
    ko: 만능우산
    zh_simp: 万能伞
    zh_trad: 萬能傘
  descriptions:
    jp_kana: "もたせた　ポケモンは\nあらゆる　てんこうの\nえいきょうを　うけなくなる。"
    jp_kanji: "持たせた　ポケモンは\nあらゆる　天候の\n影響を　受けなくなる。"
    en: "An item to be held by a Pokémon. This sturdy umbrella\nprotects the holder from the effects of weather."
    fr: Objet à tenir. Protège le porteur des effets de la météo.
    it: "Strumento da dare a un Pokémon. Protegge dagli\neffetti causati da qualunque condizione atmosferica."
    de: "Der Träger ist gegen diverse Wetterphänomene\ngeschützt."
    es: "El portador se vuelve invulnerable a los efectos de\ncualquier tiempo atmosférico."
    ko: "지니게 한 포켓몬은\n모든 날씨의\n영향을 받지 않게 된다."
    zh_simp: "携带它的宝可梦\n将不受各种天气的影响。"
    zh_trad: "攜帶它的寶可夢\n將不會受任何天氣所影響。"
venonat_candy:
  names:
    jp_kana: コンパンのアメ
    jp_kanji: コンパンのアメ
    en: Venonat Candy
    fr: Bonbon Mimitoss
    it: Caramella Venonat
    de: Bluzuk-Bonbon
    es: Caramelo Venonat
    ko: 콘팡의사탕
    zh_simp: 毛球的糖果
    zh_trad: 毛球的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
venusaurite:
  names:
    jp_kana: フシギバナイト
    jp_kanji: フシギバナイト
    en: Venusaurite
    fr: Florizarrite
    it: Venusaurite
    de: Bisaflornit
    es: Venusaurita
    ko: 이상해꽃나이트
    zh_simp: 妙蛙花进化石
    zh_trad: 妙蛙花進化石
  descriptions:
    jp_kana: "フシギバナに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "フシギバナに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Venusaur hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Florizarre, elle lui permet de\nméga-évoluer durant un combat."
    it: "Un esemplare delle misteriose Megapietre.\nData a Venusaur, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Bisaflor getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Venusaur en combate."
    ko: "이상해꽃에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让妙蛙花携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓妙蛙花攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
voltorb_candy:
  names:
    jp_kana: ビリリダマのアメ
    jp_kanji: ビリリダマのアメ
    en: Voltorb Candy
    fr: Bonbon Voltorbe
    it: Caramella Voltorb
    de: Voltobal-Bonbon
    es: Caramelo Voltorb
    ko: 찌리리공의사탕
    zh_simp: 霹雳电球的糖果
    zh_trad: 霹靂電球的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
vs_recorder:
  names:
    jp_kana: バトルレコーダー
    jp_kanji: バトルレコーダー
    en: Vs. Recorder
    fr: Magnéto VS
    it: Registradati
    de: Kampfkamera
    es: Cámara Lucha
    ko: 배틀레코더
    zh_simp: 对战记录器
    zh_trad: 對戰記錄器
  descriptions:
    jp_kana: "ともだち　との　しょうぶや\nとくしゅな　しせつでの　しょうぶを\nきろくできる　かっこいい　きかい。"
    jp_kanji: "友達との　勝負や\n特殊な　施設での　勝負を\n記録できる　かっこいい　機械。"
    en: "An amazing device that can record a battle\nbetween friends or the battles at certain special\nbattle facilities."
    fr: "Un appareil utile permettant d’enregistrer les combats\nentre amis et ceux ayant lieu dans un bâtiment\nde combat."
    it: "Fantastico dispositivo che registra le lotte\ntra amici o quelle che hanno luogo in alcuni\nedifici dedicati alla lotta."
    de: "Ein tolles Gerät, um Kämpfe zwischen Freunden\noder Kämpfe in einer speziellen Kampfeinrichtung\naufzuzeichnen."
    es: "Un fantástico dispositivo que graba combates entre\namigos o celebrados en algún recinto especial."
    ko: "친구와의 승부나\n특수한 시설에서의 승부를\n기록할 수 있는 멋있는 기계."
    zh_simp: "很酷的机器。\n可以记录和朋友或\n在特殊设施里的对战过程。"
    zh_trad: "很酷的機器。\n可以記錄和朋友或\n在特殊設施裡的對戰過程。"
vs_seeker:
  names:
    jp_kana: バトルサーチャー
    jp_kanji: バトルサーチャー
    en: Vs. Seeker
    fr: Cherch’Combat
    it: Cercasfide
    de: Kampffahnder
    es: Buscapelea
    ko: 배틀서처
    zh_simp: 对战搜寻器
    zh_trad: 對戰搜尋器
  descriptions:
    jp_kana: "たたかいたい　トレーナーを\nおしえてくれる　きかい。\nあるくと　でんちが　たまる。"
    jp_kanji: "戦いたい　トレーナーを\n教えてくれる　機械。\n歩くと　電池が　たまる。"
    en: "A device that indicates Trainers who want to\nbattle. Its battery charges while you walk."
    fr: "Un appareil indiquant les Dresseurs prêts à se battre.\nLa batterie se recharge quand on marche."
    it: "Apparecchio per trovare gli Allenatori che vogliono\nlottare. La batteria si ricarica camminando."
    de: "Ein Gerät, das rückkampfwillige Trainer ausfindig macht.\nDie Batterie lädt sich beim Reisen auf."
    es: "Dispositivo que busca Entrenadores listos para el\ncombate. La batería se carga mientras caminas."
    ko: "싸우고 싶어하는 트레이너를\n알려 주는 기계.\n걸으면 전지가 충전된다."
    zh_simp: "会告诉你想对战的\n训练家在哪里的机器。\n走路就能给电池充电。"
    zh_trad: "會告訴你想對戰的\n訓練家在哪裡的機器。\n走路就能給電池充電。"
vulpix_candy:
  names:
    jp_kana: ロコンのアメ
    jp_kanji: ロコンのアメ
    en: Vulpix Candy
    fr: Bonbon Goupix
    it: Caramella Vulpix
    de: Vulpix-Bonbon
    es: Caramelo Vulpix
    ko: 식스테일의사탕
    zh_simp: 六尾的糖果
    zh_trad: 六尾的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
wacan_berry:
  names:
    jp_kana: ソクノのみ
    jp_kanji: ソクノのみ
    en: Wacan Berry
    fr: Baie Parma
    it: Baccaparmen
    de: Kerzalbeere
    es: Baya Gualot
    ko: 초나열매
    zh_simp: 烛木果
    zh_trad: 燭木果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　でんき　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　でんき技を\n受けたとき　威力が　弱まる。"
    en: "If held by a Pokémon, this Berry will lessen the\ndamage taken from one supereffective\nElectric-type attack."
    fr: "Tenue, cette Baie affaiblit une attaque ennemie\nsuper efficace de type Électrik."
    it: "Se un Pokémon ha questa bacca, l’attacco\nsuperefficace di tipo Elettro del nemico\nviene indebolito."
    de: "Als getragenes Item schwächt diese Beere sehr effektive\ngegnerische Attacken vom Typ Elektro."
    es: "Si la lleva un Pokémon, debilita un ataque supereficaz\nde tipo Eléctrico de un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 굉장한 전기 기술로\n공격받았을 때 위력이 약해진다."
    zh_simp: "让宝可梦携带后，\n在受到效果绝佳的电属性招式\n攻击时，能令其威力减弱。"
    zh_trad: "讓寶可夢攜帶後，\n在受到效果絕佳的電屬性招式\n攻擊時，能使其威力減弱。"
wailmer_pail:
  names:
    jp_kana: ホエルコじょうろ
    jp_kanji: ホエルコじょうろ
    en: Wailmer Pail
    fr: Wailmerrosoir
    it: Vaso Wailmer
    de: Wailmerkanne
    es: Wailmegadera
    ko: 고래왕자물뿌리개
    zh_simp: 吼吼鲸喷壶
    zh_trad: 吼吼鯨噴壺
  descriptions:
    jp_kana: "みずを　かける　どうぐ。\nつちに　うめた　きのみを\nすくすく　そだてる。"
    jp_kanji: "みずを　かける　道具。\n土に　うめた　きのみを\nすくすく　育てる。"
    en: "This is a tool for watering Berries you planted to\nmake them grow more quickly."
    fr: Sert à arroser les Baies plantées dans le sol.
    it: "Annaffiatoio a forma di Wailmer che aiuta a far\ncrescere rigogliose le piantine di bacche."
    de: "Eine Gießkanne. Gießt du mit ihr im Boden\nangepflanzte Beeren, wachsen sie schneller."
    es: "Regadera con forma de Wailmer. Muy útil para que\ncrezcan las bayas plantadas."
    ko: "물을 주는 도구.\n땅에 심은 나무열매를\n쑥쑥 키운다."
    zh_simp: "浇水的道具。\n能让埋在土壤里的\n树果快快长大。"
    zh_trad: "澆水的器具。\n能讓埋在土壤裡的\n樹果快快長大。"
water_gem:
  names:
    jp_kana: みずのジュエル
    jp_kanji: みずのジュエル
    en: Water Gem
    fr: Joyau Eau
    it: Bijouacqua
    de: Wasserjuwel
    es: Gema Agua
    ko: 물주얼
    zh_simp: 水之宝石
    zh_trad: 水之寶石
  descriptions:
    jp_kana: "みずの　タイプの　ジュエル。\nもたせると　いちどだけ　みずの\nわざの　いりょくが　つよまる。"
    jp_kanji: "みずの　タイプの　ジュエル。\n持たせると　１度だけ　みずの\n技の　威力が　強まる。"
    en: "A gem with an essence of water. When held, it\nstrengthens the power of a Water-type move\none time."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Eau."
    it: "Strumento da dare a un Pokémon.\nGioiello che potenzia una sola volta le mosse\ndi tipo Acqua."
    de: "Ein Juwel vom Typ Wasser. Es erhöht einmalig die Stärke\neiner Attacke vom Typ Wasser."
    es: "Joya de un solo uso que potencia los movimientos de\ntipo Agua. Debe llevarla un Pokémon."
    ko: "물타입의 주얼.\n지니게 하면 한 번만 물\n기술의 위력이 강해진다."
    zh_simp: "水属性的宝石。\n携带后，水属性的\n招式威力仅会增强１次。"
    zh_trad: "水屬性的寶石。\n攜帶後，水屬性招式的\n威力會僅增強１次。"
water_memory:
  names:
    jp_kana: ウオーターメモリ
    jp_kanji: ウオーターメモリ
    en: Water Memory
    fr: ROM Eau
    it: ROM Acqua
    de: Wasser-Disc
    es: Disco Agua
    ko: 워터메모리
    zh_simp: 清水存储碟
    zh_trad: 清水記憶碟
  descriptions:
    jp_kana: "みずタイプの　データが　はいった\nメモリ。　とくていの　ポケモンが\nもつと　タイプが　かわる。"
    jp_kanji: "みずタイプの　データが　入った\nメモリ。　特定の　ポケモンが　持つと\nタイプが　変わる。"
    en: "A memory disc that contains Water-type data.\nIt changes the type of the holder if held by\na certain species of Pokémon."
    fr: "Une carte mémoire contenant des données sur\nle type Eau. Un certain Pokémon peut changer\nde type en l’équipant."
    it: "ROM contenente dati sul tipo Acqua in formato\ndigitale. Permette a un certo Pokémon di cambiare\ntipo."
    de: "Eine Disc mit Daten zum Typ Wasser. Sie löst bei einem\nbestimmten Pokémon einen Typenwechsel aus."
    es: "Disco de datos que contiene información relativa al tipo\nAgua. Permite cambiar de tipo a cierto Pokémon."
    ko: "물타입의 데이터가 들어 있는\n메모리. 특정 포켓몬이\n지니면 타입이 바뀐다."
    zh_simp: "装有水属性数据的存储碟。\n特定宝可梦携带后，\n属性就会发生变化。"
    zh_trad: "裝有水屬性資料的記憶碟。\n特定寶可夢攜帶後，\n就會產生屬性的變化。"
water_stone:
  names:
    jp_kana: みずのいし
    jp_kanji: みずのいし
    en: Water Stone
    fr: Pierre Eau
    it: Pietraidrica
    de: Wasserstein
    es: Piedra Agua
    ko: 물의돌
    zh_simp: 水之石
    zh_trad: 水之石
  descriptions:
    jp_kana: "ある　とくていの　ポケモンを\nしんかさせる　ふしぎな　いし。\nすんだ　みずいろを　している。"
    jp_kanji: "ある　特定の　ポケモンを\n進化させる　不思議な　石。\n澄んだ　水色を　している。"
    en: "A peculiar stone that can make certain species of\nPokémon evolve. It is the blue of a pool of clear water."
    fr: "Une pierre étrange qui fait évoluer certaines espèces\nde Pokémon. Elle est de couleur bleue."
    it: "Pietra particolare che fa evolvere determinate\nspecie di Pokémon. Ha delle macchioline azzurre."
    de: "Dieser spezielle Stein löst bei bestimmten Pokémon\ndie Entwicklung aus. Er ist hellblau."
    es: "Curiosa piedra que hace evolucionar a determinadas\nespecies de Pokémon. Es de color azul."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 돌.\n투명한 푸른색을 띠고 있다."
    zh_simp: "能让某些特定宝可梦\n进化的神奇石头。\n看上去是澄蓝色的。"
    zh_trad: "能讓特定寶可夢\n進化的神奇石頭。\n看起來是澄澈的藍色。"
waterium_z:bag:
  names:
    jp_kana: ミズＺ
    jp_kanji: ミズＺ
    en: Waterium Z
    fr: Aquazélite
    it: Idrium Z
    de: Aquium Z
    es: Hidrostal Z
    ko: 물Z
    zh_simp: 水Ｚ
    zh_trad: 水Ｚ
  descriptions:
    jp_kana: "みずタイプの　わざを\nＺワザに　グレードアップする\nＺパワーの　けっしょうを　つくりだす。"
    jp_kanji: "みずタイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nWater-type moves to Water-type Z-Moves."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise son porteur à transformer ses capacités\nde type Eau en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono ai Pokémon di trasformare le mosse\ndi tipo Acqua in mosse Z."
    de: "Kristallisierte Z-Kraft, die Wasser-Attacken zu\nZ-Attacken aufstuft. Wird bei Bedarf automatisch\nvervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a los\nportadores convertir sus movimientos de tipo Agua en\nmovimientos Z."
    ko: "물타입 기술을\nZ기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将水属性招式升级成\nＺ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把水屬性招式\n升級為Ｚ招式的Ｚ力量結晶。"
waterium_z:held:
  names:
    jp_kana: ミズＺ
    jp_kanji: ミズＺ
    en: Waterium Z
    fr: Aquazélite
    it: Idrium Z
    de: Aquium Z
    es: Hidrostal Z
    ko: 물Z
    zh_simp: 水Ｚ
    zh_trad: 水Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　けっしょう。\nみずタイプの　わざを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nみずタイプの　技を\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Water-type moves to Z-Moves."
    fr: "Une cristallisation de la Force Z, permettant\nde transformer les capacités de type Eau\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare le mosse di tipo Acqua\nin mosse Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft\nWasser-Attacken zu Z-Attacken auf."
    es: "Cristal que confiere el Poder Z a los movimientos\nde tipo Agua."
    ko: "Z파워의 결정.\n물타입 기술을\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将水属性的招式\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把水屬性的招式\n升級為Ｚ招式。"
watmel_berry:
  names:
    jp_kana: カイスのみ
    jp_kanji: カイスのみ
    en: Watmel Berry
    fr: Baie Stekpa
    it: Baccacomero
    de: Wasmelbeere
    es: Baya Sambia
    ko: 슈박열매
    zh_simp: 瓜西果
    zh_trad: 瓜西果
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。\nふかふかのつちに　うめると\nカイスが　そだつ。"
    jp_kanji: "ポフィンの　材料。\nふかふかの土に　埋めると\nカイスが　育つ。"
    en: "A Poffin ingredient. Bury it in soft soil to grow a\nWatmel Berry plant."
    fr: "Un ingrédient entrant dans la confection de Poffins.\nPlantez cette Baie dans un sol meuble et fertile\npour faire pousser un arbre à Baies Stekpa."
    it: "Si usa per fare i poffin. Seminala nella terra soffice\nper far crescere una pianta di Baccacomero."
    de: "Eine Knursp-Zutat. Pflanze sie in weichen Lehmboden\nein, damit neue Wasmelbeeren wachsen."
    es: "Ingrediente para pokochos. Si se planta en tierra suelta,\nsaldrá una planta de Sambia."
    ko: "포핀의 재료.\n푹신푹신한 땅에 심으면\n슈박이 자란다."
    zh_simp: "宝芬的材料。\n埋在松软的土地里\n可以培育出瓜西。"
    zh_trad: "製作寶芬的材料。\n埋進鬆軟的泥土裡，\n長成後會結出瓜西。"
wave_incense:
  names:
    jp_kana: さざなみのおこう
    jp_kanji: さざなみのおこう
    en: Wave Incense
    fr: Encens Vague
    it: Ondaroma
    de: Wellenrauch
    es: Incienso Acua
    ko: 잔물결향로
    zh_simp: 涟漪薰香
    zh_trad: 漣漪薰香
  descriptions:
    jp_kana: "ふしぎな　かおりの　おこう。\nもたせると　みずタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "不思議な　香りの　御香。\n持たせると　みずタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon. This incense has\na curious aroma that boosts the power of\nWater-type moves."
    fr: "Objet à tenir. Un encens au parfum curieux augmentant\nla puissance des capacités de type Eau."
    it: "Strumento da dare a un Pokémon.\nIncenso dal profumo esotico che potenzia\nle mosse di tipo Acqua."
    de: "Ein Item zum Tragen. Dieses exotische Duftkraut\nverstärkt Attacken vom Typ Wasser."
    es: "Tiene un curioso aroma que potencia los movimientos\nde tipo Agua. Debe llevarlo un Pokémon."
    ko: "이상한 향기의 향로.\n지니게 하면 물타입\n기술의 위력이 올라간다."
    zh_simp: "有着神奇香气的薰香。\n携带后，水属性的\n招式威力就会提高。"
    zh_trad: "有著神奇香氣的薰香。\n攜帶後，水屬性的\n招式威力就會提高。"
weakness_policy:
  names:
    jp_kana: じゃくてんほけん
    jp_kanji: じゃくてんほけん
    en: Weakness Policy
    fr: Vulné-Assurance
    it: Vulneropolizza
    de: Schwächenschutz
    es: Seguro Debilidad
    ko: 약점보험
    zh_simp: 弱点保险
    zh_trad: 弱點保險
  descriptions:
    jp_kana: "じゃくてんを　つかれたとき\nこうげきと　とくこうが\nそれぞれ　ぐーんと　あがる。"
    jp_kanji: "弱点を　つかれたとき\n攻撃と　特攻が\nそれぞれ　ぐーんと　あがる。"
    en: "An item to be held by a Pokémon. Attack and\nSp. Atk sharply increase if the holder is hit with\na move it’s weak to."
    fr: "Objet à tenir. Augmente beaucoup l’Attaque\net l’Attaque Spéciale du Pokémon lorsqu’il est touché\npar une capacité d’un type auquel il est vulnérable."
    it: "Se il Pokémon viene colpito da una mossa contro\ncui è debole, l’Attacco e l’Attacco Speciale\naumentano considerevolmente."
    de: "Erhöht den Angriff und den Spezial-Angriff des Trägers\nstark, wenn er von einer sehr effektiven Attacke\ngetroffen wird."
    es: "Aumenta mucho el Ataque y el Ataque Especial cuando\nel Pokémon que lo lleva recibe un ataque frente al cual\nes débil."
    ko: "약점을 공격당했을 때\n공격과 특수공격이\n각각 크게 올라간다."
    zh_simp: "被针对弱点时，\n攻击和特攻就会大幅提高。"
    zh_trad: "被攻擊到弱點時，\n攻擊和特攻就會\n分別大幅提高。"
weedle_candy:
  names:
    jp_kana: ビードルのアメ
    jp_kanji: ビードルのアメ
    en: Weedle Candy
    fr: Bonbon Aspicot
    it: Caramella Weedle
    de: Hornliu-Bonbon
    es: Caramelo Weedle
    ko: 뿔충이의사탕
    zh_simp: 独角虫的糖果
    zh_trad: 獨角蟲的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
wepear_berry:
  names:
    jp_kana: セシナのみ
    jp_kanji: セシナのみ
    en: Wepear Berry
    fr: Baie Repoi
    it: Baccapera
    de: Nirbebeere
    es: Baya Peragu
    ko: 서배열매
    zh_simp: 西梨果
    zh_trad: 西梨果
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。\nふかふかのつちに　うめると\nセシナが　そだつ。"
    jp_kanji: "ポフィンの　材料。\nふかふかの土に　埋めると\nセシナが　育つ。"
    en: "A Poffin ingredient. Bury it in soft soil to grow a\nWepear Berry plant."
    fr: "Un ingrédient entrant dans la confection de Poffins.\nPlantez cette Baie dans un sol meuble et fertile\npour faire pousser un arbre à Baies Repoi."
    it: "Si usa per fare i poffin. Seminala nella terra soffice\nper far crescere una pianta di Baccapera."
    de: "Eine Knursp-Zutat. Pflanze sie in weichen Lehmboden\nein, damit neue Nirbebeeren wachsen."
    es: "Ingrediente para pokochos. Si se planta en tierra suelta,\nsaldrá una planta de Peragu."
    ko: "포핀의 재료.\n푹신푹신한 땅에 심으면\n서배가 자란다."
    zh_simp: "宝芬的材料。\n埋在松软的土地里\n可以培育出西梨。"
    zh_trad: "製作寶芬的材料。\n埋進鬆軟的泥土裡，\n長成後會結出西梨。"
whipped_dream:
  names:
    jp_kana: ホイップポップ
    jp_kanji: ホイップポップ
    en: Whipped Dream
    fr: Chantibonbon
    it: Dolcespuma
    de: Sahnehäubchen
    es: Dulce de Nata
    ko: 휘핑팝
    zh_simp: 泡沫奶油
    zh_trad: 泡沫奶油
  descriptions:
    jp_kana: "ふんわり　ふわふわに　あわだてた\nほんのり　あまい　クリーム。\nある　ポケモンが　このんでいる。"
    jp_kanji: "ふんわり　ふわふわに　泡立てた\nほんのり　甘い　クリーム。\nある　ポケモンが　好んでいる。"
    en: "A soft and sweet treat made of fluffy, puffy,\nwhipped, and whirled cream. It’s loved by a\ncertain Pokémon."
    fr: "Une crème sucrée qui fond dans la bouche,\nlégère comme un nuage. Elle est appréciée\nd’un certain Pokémon."
    it: "Una spuma soffice, delicata e leggermente dolce.\nPiace a un Pokémon in particolare."
    de: "Ein lockeres, leicht süßliches Häubchen aus\nSchlagsahne, das bei einer bestimmten Pokémon-Art\nsehr beliebt ist."
    es: "Un dulce a base de suave y esponjosa nata montada.\nA cierto Pokémon le encanta."
    ko: "풍성하게 거품을 낸\n살짝 달콤한 크림.\n어떤 포켓몬이 좋아한다."
    zh_simp: "松松软软起着泡的，\n稍微有点甜的奶油。\n某种宝可梦很喜欢它。"
    zh_trad: "鬆鬆軟軟起著泡的，\n稍微有點甜的奶油。\n某種寶可夢很喜歡它。"
white_apricorn:
  names:
    jp_kana: しろぼんぐり
    jp_kanji: しろぼんぐり
    en: White Apricorn
    fr: Noigrume Blanc
    it: Ghicocca Bianca
    de: Aprikoko Weiß
    es: Bonguri Blanco
    ko: 하얀규토리
    zh_simp: 白球果
    zh_trad: 白球果
  descriptions:
    jp_kana: "しろい　ぼんぐり。\nなんの　においも　しない。"
    jp_kanji: "しろい　ぼんぐり。\nなんの　においも　しない。"
    en: A white Apricorn. It doesn’t smell like anything.
    fr: "Un Noigrume de couleur blanche.\nIl ne dégage aucun arôme."
    it: "Una ghicocca di colore bianco.\nNon emana alcun odore."
    de: Eine weiße Aprikoko. Riecht nach überhaupt nichts.
    es: "Bonguri de color blanco que no desprende aroma\nalguno."
    ko: "하얀색의 규토리.\n어떠한 향기도 나지 않는다."
    zh_simp: "白色的球果。\n没有任何气味。"
    zh_trad: "白色的球果。\n沒有任何氣味。"
white_flute:
  names:
    jp_kana: しろいビードロ
    jp_kanji: しろいビードロ
    en: White Flute
    fr: Flûte Blanche
    it: Flauto Bianco
    de: Weiße Flöte
    es: Flauta Blanca
    ko: 하양비드로
    zh_simp: 白色玻璃哨
    zh_trad: 白色玻璃哨
  descriptions:
    jp_kana: "しろいガラスで　できた　ふえ。\nつかった　ばしょで　よわいポケモンと\nそうぐう　しやすくなる。"
    jp_kanji: "白いガラスで　できた　笛。\n使った　場所で　弱いポケモンと\n遭遇　しやすくなる。"
    en: "A flute made from white glass. It makes it easier to\nencounter weak Pokémon in the place you use it."
    fr: "Un jouet en forme de flûte en verre blanc.\nAugmente les chances de rencontrer des Pokémon\nsauvages faibles là où l’on en joue."
    it: "Flauto fatto di vetro bianco. Aumenta le probabilità\ndi incontrare Pokémon deboli nell’area in cui viene\nusato."
    de: "Eine Spielzeugflöte aus weißem Glas. Erhöht am\nEinsatzort die Wahrscheinlichkeit, schwachen wilden\nPokémon zu begegnen."
    es: "Una flauta de cristal blanco cuyas notas atraen a\nPokémon salvajes más débiles al lugar en el que\nse usa."
    ko: "하얀 유리로 만들어진 피리.\n사용한 장소에서 약한 포켓몬과\n만나기 쉬워진다."
    zh_simp: "以白色玻璃制成的哨子。\n在使用的地方更容易\n遇到弱小的宝可梦。"
    zh_trad: "以白色玻璃製成的笛子。\n在使用的地方更容易\n遇到弱小的寶可夢。"
white_herb:
  names:
    jp_kana: しろいハーブ
    jp_kanji: しろいハーブ
    en: White Herb
    fr: Herbe Blanche
    it: Erbachiara
    de: Schlohkraut
    es: Hierba Blanca
    ko: 하양허브
    zh_simp: 白色香草
    zh_trad: 白色香草
  descriptions:
    jp_kana: "もたせた　ポケモンの　のうりょくが\nさがったとき　いちどだけ　もとの\nじょうたいに　もどす。"
    jp_kanji: "持たせた　ポケモンの　能力が\nさがったとき　１度だけ　もとの\n状態に　戻す。"
    en: "An item to be held by a Pokémon. It will restore any\nlowered stat in battle. It can be used only once."
    fr: "Objet à tenir. Restaure les stats qui ont subi une baisse.\nNe peut être utilisé qu’une fois."
    it: "Strumento da dare a un Pokémon.\nRipristina le statistiche ridotte in lotta.\nSi può usare una sola volta."
    de: "Ein Item, das einem Pokémon zum Tragen gegeben\nwerden kann. Es hebt einmalig jede negative\nStatusveränderung auf."
    es: "Restaura cualquier característica reducida en combate.\nSolo se puede usar una vez. Debe llevarla un Pokémon."
    ko: "지니게 한 포켓몬의 능력이\n떨어졌을 때 한 번만 원래\n상태로 돌아온다."
    zh_simp: "当携带它的宝可梦能力降低时，\n仅能回到之前的状态１次。"
    zh_trad: "當攜帶它的寶可夢\n能力降低時，將能回到\n初始狀態１次。"
white_mane_hair:
  names:
    jp_kana: しろいたてがみ
    jp_kanji: しろいたてがみ
    en: White Mane Hair
    fr: Crins Blancs
    it: Crini bianchi
    de: Helles Rosshaar
    es: Crin Blanca
    ko: 하얀갈기
    zh_simp: 白色鬃毛
    zh_trad: 白色鬃毛
  descriptions:
    jp_kana: "ほうじょうのおうの　あいば\nブリザポスの　たてがみ。\nじょうぶで　よく　しなる。"
    jp_kanji: "豊穣の王の　愛馬\nブリザポスの　たてがみ。\n丈夫で　よく　しなる。"
    en: "Mane hair that belonged to the King of Bountiful\nHarvests’ beloved steed, Glastrier. The hair is strong\nand very flexible."
    fr: "Des crins de Blizzeval, le fidèle destrier du Seigneur\ndes récoltes. Ils sont à la fois souples et robustes."
    it: "Un ciuffo di crini di Glastrier, il fedele destriero\ndel Re dell’abbondanza. Sono resistenti e flessibili."
    de: "Eine Haarsträhne von Polaross, dem treuen Ross des\nKönigs der reichen Ernte. Sie ist robust und biegsam."
    es: "Parte de la crin de Glastrier, el amado corcel del Rey de\nlas Cosechas. Es flexible y resistente."
    ko: "풍요의 왕의 애마\n블리자포스의 갈기.\n튼튼하고도 매우 유연하다."
    zh_simp: "丰饶之王的爱马\n雪暴马的鬃毛。\n既结实又柔韧。"
    zh_trad: "豐饒之王的愛馬\n「雪暴馬」的鬃毛。\n既結實又柔韌。"
wide_lens:
  names:
    jp_kana: こうかくレンズ
    jp_kanji: こうかくレンズ
    en: Wide Lens
    fr: Loupe
    it: Grandelente
    de: Großlinse
    es: Lupa
    ko: 광각렌즈
    zh_simp: 广角镜
    zh_trad: 廣角鏡
  descriptions:
    jp_kana: "ものが　おおきく　みえる　レンズ。\nもたせると　わざの　めいちゅうりつが\nすこし　あがる。"
    jp_kanji: "ものが　大きく　みえる　レンズ。\n持たせると　技の　命中率が\n少し　あがる。"
    en: "An item to be held by a Pokémon. It’s a magnifying\nlens that slightly boosts the accuracy of moves."
    fr: "Objet à tenir. Une loupe qui augmente légèrement\nla Précision des capacités."
    it: "Strumento da dare a un Pokémon.\nLente d’ingrandimento che aumenta di poco\nla precisione delle mosse."
    de: "Ein Item zum Tragen. Dieses Vergrößerungsglas erhöht\ndie Genauigkeit etwas."
    es: "Debe llevarla un Pokémon. Aumenta ligeramente la\nprecisión de los movimientos."
    ko: "물건이 크게 보이는 렌즈.\n지니게 하면 기술의 명중률이\n조금 올라간다."
    zh_simp: "能放大观看物体的镜片。\n携带后，招式的命中率\n就会少量提高。"
    zh_trad: "會讓物體看起來比較大的鏡片。\n攜帶後，招式的命中率\n就會少量提高。"
wiki_berry:
  names:
    jp_kana: ウイのみ
    jp_kanji: ウイのみ
    en: Wiki Berry
    fr: Baie Wiki
    it: Baccakiwi
    de: Wikibeere
    es: Baya Wiki
    ko: 위키열매
    zh_simp: 异奇果
    zh_trad: 異奇果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nピンチのとき　ＨＰを　かいふくする。\nきらいな　あじだと　こんらん　する。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　ＨＰを　回復する。\nきらいな味だと　混乱する。"
    en: "If held by a Pokémon, it restores the user’s HP in a\npinch, but it will cause confusion if the user hates\nthe taste."
    fr: "Tenue, cette Baie restaure des PV en cas de besoin,\nmais rend le Pokémon confus si son goût lui déplaît."
    it: "Se un Pokémon in difficoltà ha questa bacca,\nrecupera dei PS. Se al Pokémon non piace\nil suo sapore, può causare confusione."
    de: "Als getragenes Item füllt die Beere im Notfall die KP\neines Pokémon auf, doch ihr Aroma verwirrt jene,\ndie es nicht mögen."
    es: "Los Pokémon pueden llevarla o usarla para restaurar\nalgunos PS. Su sabor puede causar confusión si no les\ngusta."
    ko: "포켓몬에게 지니게 하면\n위급할 때 HP를 회복한다.\n싫어하는 맛이면 혼란에 빠진다."
    zh_simp: "让宝可梦携带后，\n危机时可以回复ＨＰ。\n如果讨厌这味道就会混乱。"
    zh_trad: "讓寶可夢攜帶後，\n危機時可以回復ＨＰ。\n如果討厭這味道就會混亂。"
wise_glasses:
  names:
    jp_kana: ものしりメガネ
    jp_kanji: ものしりメガネ
    en: Wise Glasses
    fr: Lunettes Sages
    it: Saviocchiali
    de: Schlaubrille
    es: Gafas Especiales
    ko: 박식안경
    zh_simp: 博识眼镜
    zh_trad: 博識眼鏡
  descriptions:
    jp_kana: "ぶあつい　レンズの　ついた　メガネ。\nもたせると　とくしゅわざの\nいりょくが　すこし　あがる。"
    jp_kanji: "ぶあつい　レンズの　ついた　メガネ。\n持たせると　特殊技の\n威力が　少し　あがる。"
    en: "An item to be held by a Pokémon. This thick pair of\nglasses slightly boosts the power of special moves."
    fr: "Objet à tenir. Une paire de lunettes épaisses\nqui augmente légèrement la puissance des capacités\nspéciales."
    it: "Strumento da dare a un Pokémon.\nPaio di occhiali dalle lenti spesse che potenzia\ndi poco le mosse speciali."
    de: "Ein Item zum Tragen. Diese dicke Brille verstärkt auf\nSpezial-Angriff basierende Attacken."
    es: "Potencian ligeramente los ataques especiales. Debe\nllevarlas un Pokémon."
    ko: "두꺼운 렌즈를 붙인 안경.\n지니게 하면 특수 기술의\n위력이 조금 올라간다."
    zh_simp: "装着很厚镜片的眼镜。\n携带后，特殊招式的\n威力就会少量提高。"
    zh_trad: "裝著很厚鏡片的眼鏡。\n攜帶後，特殊招式的\n威力就會少量提高。"
wishing_chip:
  names:
    jp_kana: ねがいのかけら
    jp_kanji: ねがいのかけら
    en: Wishing Chip
    fr: Fragment Vœu
    it: Desioframmento
    de: Wunschsplitter
    es: Trocito Deseo
    ko: 소원의조각
    zh_simp: 许愿星碎片
    zh_trad: 許願星碎片
  descriptions:
    jp_kana: "ポケモンの　すあなに　いくつか\nなげいれると　ダイマックスした\nポケモンが　あらわれることが　ある。"
    jp_kanji: "ポケモンの　巣穴に　いくつか\n投げいれると　ダイマックスした\nポケモンが　現れることが　ある。"
    en: "Toss a number of them into a Pokémon Den for the\nchance to attract a wild Dynamax Pokémon."
    fr: "En lancer plusieurs dans l’antre d’un Pokémon augmente\nles chances d’y faire apparaître un Pokémon Dynamax."
    it: "Se ne lanci alcuni dentro una tana di Pokémon possono\nfar comparire un Pokémon Dynamax."
    de: "Wirft man mehrere von ihnen in ein Pokémon-Nest,\ntaucht eventuell ein Dynamax-Pokémon auf."
    es: "Al lanzar unos cuantos a un nido Pokémon, es posible\nque aparezca algún Pokémon Dinamax."
    ko: "포켓몬굴에 몇 개 던져넣으면\n다이맥스 포켓몬이\n나타날 때가 있다."
    zh_simp: "投掷数个到宝可梦的巢穴里，\n可能就会有极巨化宝可梦出现。"
    zh_trad: "投幾個進寶可夢的巢穴裡，\n有時可讓極巨化寶可夢現身。"
wishing_piece:
  names:
    jp_kana: ねがいのかたまり
    jp_kanji: ねがいのかたまり
    en: Wishing Piece
    fr: Morceau Vœu
    it: Desioblocco
    de: Wunschbrocken
    es: Trozo Deseo
    ko: 소원의덩어리
    zh_simp: 许愿星块
    zh_trad: 許願星塊
  descriptions:
    jp_kana: "ポケモンの　すあなに　なげいれると\nダイマックスポケモンが　あらわれる。"
    jp_kanji: "ポケモンの　巣穴に　投げいれると\nダイマックスポケモンが　現れる。"
    en: "Throw one into a Pokémon Den to attract\na wild Dynamax Pokémon."
    fr: "Un objet à lancer dans l’antre d’un Pokémon\npour y faire apparaître un Pokémon Dynamax."
    it: "Se lanciato dentro una tana di Pokémon\nfa comparire un Pokémon Dynamax."
    de: "Wirft man ihn in ein Pokémon-Nest, taucht ein\nDynamax-Pokémon auf."
    es: "Al lanzarlo en un nido Pokémon, aparece un Pokémon\nDinamax."
    ko: "포켓몬굴에 던져넣으면\n다이맥스 포켓몬이 나타난다."
    zh_simp: "投掷到宝可梦的巢穴里，\n就会有极巨化宝可梦出现。"
    zh_trad: "投進寶可夢的巢穴裡，\n極巨化寶可夢就會現身。"
wishing_star:
  names:
    jp_kana: ねがいぼし
    jp_kanji: ねがいぼし
    en: Wishing Star
    fr: Étoile Vœu
    it: Desiostella
    de: Wunschstern
    es: Estrella Deseo
    ko: 소원의별
    zh_simp: 许愿星
    zh_trad: 許願星
  descriptions:
    jp_kana: "ガラルちほうで　みつかる　ふしぎな\nパワーを　ひめている　いし。ひろうと\nねがいが　かなうとも　いわれている。"
    jp_kanji: "ガラル地方で　みつかる　不思議な\nパワーを　秘めている　石。拾うと\n願いが　叶うとも　いわれている。"
    en: "A stone found in the Galar region with a mysterious power.\nIt’s said that your dreams come true if you find one."
    fr: "Une gemme aux pouvoirs mystérieux que l’on trouve\ndans la région de Galar. On raconte que le vœu\nde la personne l’ayant ramassée se réalisera."
    it: "Pietra dal potere misterioso che si può trovare nella\nregione di Galar. Si dice che possa avverare i desideri\ndi chi la trova."
    de: "In Galar verstreute Steine, denen eine geheimnisvolle\nEnergie innewohnt. Es wird erzählt, Wünsche gingen in\nErfüllung, wenn man sie aufsammelt."
    es: "Piedra de poder misterioso hallada en la región de\nGalar. Se dice que quien encuentra una verá realizados\nsus sueños."
    ko: "가라르지방에서 발견되는\n신비한 힘을 간직하고 있는 돌.\n주우면 소원이 이루어진다고도 전해진다."
    zh_simp: "这是一块在伽勒尔地区发现的\n蕴含着神奇力量的石头。听说\n捡到它的人能实现自己的愿望。"
    zh_trad: "在伽勒爾地區發現的\n蘊藏著神秘力量的石頭。\n據說撿到它就能讓願望成真。"
wooden_crown:
  names:
    jp_kana: きぼりのかんむり
    jp_kanji: きぼりのかんむり
    en: Wooden Crown
    fr: Couronne en Bois
    it: Corona di legno
    de: Holzkrone
    es: Corona Tallada
    ko: 목각왕관
    zh_simp: 木雕王冠
    zh_trad: 木雕王冠
  descriptions:
    jp_kana: "き　で　ほられた　なぞの　かたまり。\nかけているような　あとが　あり\nなにかの　いちぶ　なのかもしれない。"
    jp_kanji: "木で　彫られた　謎の　かたまり。\n欠けているような　跡が　あり\nなにかの一部　なのかもしれない。"
    en: "A mysterious object made of wood. Part of it seems to\nbe chipped. Maybe it’s meant to be part of something."
    fr: "Une mystérieuse sculpture en bois.\nOn dirait qu’il lui manque un morceau, comme\ns’il s’agissait d’un fragment de quelque chose."
    it: "Un misterioso pezzo di legno intagliato. Ha dei segni\nche fanno pensare a una parte mancante."
    de: "Eine rätselhafte Holzschnitzerei, die aussieht, als sei\netwas von ihr abgebrochen. Vielleicht ist sie Teil von\netwas anderem."
    es: "Un misterioso objeto hecho de madera. Las marcas que\npresenta parecen indicar que no está completo, como si\nformase parte de algo."
    ko: "나무로 만들어진 수수께끼의 덩어리.\n뭔가가 빠진 듯한 흔적이 있는 것으로 보아\n무엇인가의 일부일지도 모른다."
    zh_simp: "用木头雕制而成的神秘物体。\n上面有看起来缺了什么的痕迹。\n可能是其他物品的一部分。"
    zh_trad: "神秘的木頭雕刻。\n上面有著像是缺損的痕跡，\n很可能是某種東西的一部分。"
works_key:
  names:
    jp_kana: はつでんしょキー
    jp_kanji: はつでんしょキー
    en: Works Key
    fr: Clé Parc Éolien
    it: Chiave impianto
    de: K-Schlüssel
    es: Llave Central
    ko: 발전소키
    zh_simp: 发电厂钥匙
    zh_trad: 發電廠鑰匙
  descriptions:
    jp_kana: "たにまのはつでんしょの　とびらを\nあけしめする　おおきな　カギ。\nなぜか　ギンガだんが　もっていた。"
    jp_kanji: "谷間の発電所の　扉を\nあけしめする　おおきな　カギ。\nなぜか　ギンガ団が　持っていた。"
    en: "A large key for operating the doors of the\nValley Windworks in the canyon. It was held by\na Team Galactic Grunt."
    fr: "Une grande clé servant à ouvrir la porte\nde la centrale du Parc Éolien. Étonnamment,\nun Sbire de la Team Galaxie la détenait."
    it: "Grande chiave usata per azionare la porta\ndell’Impianto Turbine. L’aveva con sé una\nRecluta del Team Galassia."
    de: "Ein großer Schlüssel, der zum Windkraftwerk gehört.\nEiner der Rüpel von Team Galaktik hatte ihn im Besitz."
    es: "Abre la puerta de la central del Valle Eólico. La llevaba\nun Recluta del Equipo Galaxia."
    ko: "골짜기발전소의 문을 여닫는 큰 열쇠.\n어찌된 영문인지\n갤럭시단이 지니고 있었다."
    zh_simp: "用来打开或关闭\n山谷发电厂大门的大钥匙。\n不知为何，它落入了银河队的手中。"
    zh_trad: "用來打開或關閉\n山谷發電廠大門的大鑰匙。\n不知為何它在銀河隊手中。"
x_accuracy:
  names:
    jp_kana: ヨクアタール
    jp_kanji: ヨクアタール
    en: X Accuracy
    fr: Précision +
    it: Precisione X
    de: X-Genauigkeit
    es: Precisión X
    ko: 잘-맞히기
    zh_simp: 命中强化
    zh_trad: 命中強化
  descriptions:
    jp_kana: "せんとうちゅうの　ポケモンの\nめいちゅうを　おおきく　あげる　どうぐ。\nひっこめると　もとに　もどる。"
    jp_kanji: "戦闘中の　ポケモンの\n命中を　大きく　あげる　道具。\nひっこめると　元に　戻る。"
    en: "An item that sharply boosts the accuracy of a\nPokémon during a battle. It wears off once the\nPokémon is withdrawn."
    fr: "Augmente beaucoup la Précision pendant un combat.\nL’effet disparaît si le Pokémon est retiré."
    it: "Aumenta di molto la precisione di un Pokémon\nin una lotta. L’effetto svanisce se il Pokémon\nè sostituito."
    de: "Hebt die Genauigkeit eines Pokémon im Kampf\nstark an. Die Wirkung wird mit dem Austausch des\nPokémon beendet."
    es: "Aumenta mucho la Precisión en combate. Al cambiar\nde Pokémon, el efecto desaparece."
    ko: "배틀 중인 포켓몬의 명중률을 크게 올리는\n도구. 포켓몬을 볼에 넣어 버리면\n원래대로 되돌아간다."
    zh_simp: "大幅提高战斗中\n宝可梦命中的道具。\n离场后，效果便会消失。"
    zh_trad: "大大提高戰鬥中\n寶可夢命中的道具。\n離場後，效果便會消失。"
x_accuracy_2:
  names:
    jp_kana: ヨクアタール２
    jp_kanji: ヨクアタール２
    en: X Accuracy 2
    fr: Précision 2
    it: Precisione X-2
    de: X-Genauigkeit 2
    es: Precisión X 2
    ko: 잘-맞히기2
    zh_simp: 命中强化２
    zh_trad: 命中強化２
  descriptions:
    jp_kana: "せんとうちゅうの　ポケモンの\nめいちゅうを　それなりに　あげる。\nひっこめると　もとに　もどる。"
    jp_kanji: "戦闘中の　ポケモンの\n命中を　それなりに　あげる。\nひっこめると　元に　戻る。"
    en: "It sharply raises the accuracy of a Pokémon in\nbattle. It wears off if the Pokémon is withdrawn."
    fr: "Augmente un peu la Précision pendant un combat.\nL’effet se dissipe si le Pokémon est retiré."
    it: "Aumenta molto la precisione di un Pokémon in\nuna lotta. L’effetto svanisce se il Pokémon\nè sostituito."
    de: "Hebt die Genauigkeit eines Pokémon im Kampf\nleicht an. Die Wirkung endet mit dem Austausch des\nPokémon."
    es: "Aumenta ligeramente la Precisión en combate. Al\ncambiar de Pokémon, el efecto desaparece."
    ko: "배틀 중인 포켓몬의 명중률을\n그럭저럭 올린다. 포켓몬을 볼에\n넣어 버리면 원래대로 되돌아간다."
    zh_simp: "能相对提高战斗中\n宝可梦的命中。\n离场后，效果便会消失。"
    zh_trad: "能相對提高戰鬥中\n寶可夢的命中。\n離場後，效果便會消失。"
x_accuracy_3:
  names:
    jp_kana: ヨクアタール３
    jp_kanji: ヨクアタール３
    en: X Accuracy 3
    fr: Précision 3
    it: Precisione X-3
    de: X-Genauigkeit 3
    es: Precisión X 3
    ko: 잘-맞히기3
    zh_simp: 命中强化３
    zh_trad: 命中強化３
  descriptions:
    jp_kana: "せんとうちゅうの　ポケモンの\nめいちゅうを　かなり　あげる。\nひっこめると　もとに　もどる。"
    jp_kanji: "戦闘中の　ポケモンの\n命中を　かなり　あげる。\nひっこめると　元に　戻る。"
    en: "It drastically raises the accuracy of a Pokémon in\nbattle. It wears off if the Pokémon is withdrawn."
    fr: "Augmente sensiblement la Précision pendant un combat.\nL’effet se dissipe si le Pokémon est retiré."
    it: "Aumenta moltissimo la precisione di un Pokémon\nin una lotta. L’effetto svanisce se il Pokémon\nè sostituito."
    de: "Hebt die Genauigkeit eines Pokémon im Kampf\nstark an. Die Wirkung endet mit dem Austausch des\nPokémon."
    es: "Aumenta bastante la Precisión en combate. Al cambiar\nde Pokémon, el efecto desaparece."
    ko: "배틀 중인 포켓몬의 명중률을\n상당히 올린다. 포켓몬을 볼에\n넣어 버리면 원래대로 되돌아간다."
    zh_simp: "能大量提高战斗中\n宝可梦的命中。\n离场后，效果便会消失。"
    zh_trad: "能大幅提高戰鬥中\n寶可夢的命中。\n離場後，效果便會消失。"
x_accuracy_6:
  names:
