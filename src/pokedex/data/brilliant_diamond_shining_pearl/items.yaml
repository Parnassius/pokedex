kings_rock:
  names:
    jp_kana: おうじゃのしるし
    jp_kanji: おうじゃのしるし
    en: King’s Rock
    fr: Roche Royale
    it: Roccia di Re
    de: King-Stein
    es: Roca del Rey
    ko: 왕의징표석
    zh_simp: 王者之证
    zh_trad: 王者之證
  descriptions:
    jp_kana: "もたせると　こうげきして\nダメージを　あたえたときに\nあいてを　ひるませることが　ある。"
    jp_kanji: "持たせると　攻撃して\nダメージを　与えたときに\n相手を　ひるませることが　ある。"
    en: "An item to be held by a Pokémon. When the holder\nsuccessfully inflicts damage, the target may\nalso flinch."
    fr: "Objet à tenir. Peut apeurer l’ennemi lorsque le porteur\nlui inflige des dégâts."
    it: "Strumento da dare a un Pokémon.\nSe chi lo usa arreca danni, può far tentennare\nil nemico."
    de: "Gibst du es einem Pokémon zum Tragen, lässt es mit\nseinem Angriff das Ziel gelegentlich zurückschrecken."
    es: "El Pokémon que la lleva puede amedrentar al Pokémon\nal que le inflige daño."
    ko: "지니게 하면\n공격해서 데미지를 줄 때\n상대를 풀죽이기도 한다."
    zh_simp: "携带后进行攻击，\n在造成伤害时，\n有时会让对手畏缩。"
    zh_trad: "攜帶後進行攻擊，\n並造成傷害時，\n有時會讓對手畏縮。"
koffing_candy:
  names:
    jp_kana: ドガースのアメ
    jp_kanji: ドガースのアメ
    en: Koffing Candy
    fr: Bonbon Smogo
    it: Caramella Koffing
    de: Smogon-Bonbon
    es: Caramelo Koffing
    ko: 또가스의사탕
    zh_simp: 瓦斯弹的糖果
    zh_trad: 瓦斯彈的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
kommonium_z:bag:
  names:
    jp_kana: ジャラランガＺ
    jp_kanji: ジャラランガＺ
    en: Kommonium Z
    fr: Ékaïzélite
    it: Kommonium Z
    de: Grandirasium Z
    es: Kommostal Z
    ko: 짜랑고우거Z
    zh_simp: 杖尾鳞甲龙Ｚ
    zh_trad: 杖尾鱗甲龍Ｚ
  descriptions:
    jp_kana: "ジャラランガの　スケイルノイズを\nＺワザに　グレードアップする\nＺパワーの　けっしょうを　つくりだす。"
    jp_kanji: "ジャラランガの　スケイルノイズを\nＺワザに　グレードアップする\nＺパワーの　結晶を　つくりだす。"
    en: "It converts Z-Power into crystals that upgrade\nKommo-o’s Clanging Scales to an exclusive Z-Move."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise l’Ékaïser qui le tient à transformer\nsa capacité Vibrécaille en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono a Kommo-o di trasformare la mossa\nClamorsquame in una mossa Z."
    de: "Kristallisierte Z-Kraft, die Grandiras’ Attacke\nSchuppenrasseln zu einer Z-Attacke aufstuft. Wird bei\nBedarf automatisch vervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a\nKommo-o convertir su Fragor Escamas en un\nmovimiento Z."
    ko: "짜랑고우거의 스케일노이즈를\nZ기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将杖尾鳞甲龙的鳞片噪音\n升级成Ｚ招式的Ｚ力量结晶。"
    zh_trad: "可用來製造將\n杖尾鱗甲龍的鱗片噪音\n升級為Ｚ招式的Ｚ力量結晶。"
kommonium_z:held:
  names:
    jp_kana: ジャラランガＺ
    jp_kanji: ジャラランガＺ
    en: Kommonium Z
    fr: Ékaïzélite
    it: Kommonium Z
    de: Grandirasium Z
    es: Kommostal Z
    ko: 짜랑고우거Z
    zh_simp: 杖尾鳞甲龙Ｚ
    zh_trad: 杖尾鱗甲龍Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　けっしょう。\nジャラランガの　スケイルノイズを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nジャラランガの　スケイルノイズを\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Kommo-o’s Clanging Scales to\na Z-Move."
    fr: "Une cristallisation de la Force Z, permettant\nde transformer la capacité Vibrécaille d’un Ékaïser\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare la mossa Clamorsquame\ndi Kommo-o in una mossa Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft Grandiras’\nAttacke Schuppenrasseln zu einer Z-Attacke auf."
    es: "Cristal que confiere el Poder Z al movimiento Fragor\nEscamas de Kommo-o."
    ko: "Z파워의 결정.\n짜랑고우거의 스케일노이즈를\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将杖尾鳞甲龙的鳞片噪音\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n可將杖尾鱗甲龍的鱗片噪音\n升級為Ｚ招式。"
krabby_candy:
  names:
    jp_kana: クラブのアメ
    jp_kanji: クラブのアメ
    en: Krabby Candy
    fr: Bonbon Krabby
    it: Caramella Krabby
    de: Krabby-Bonbon
    es: Caramelo Krabby
