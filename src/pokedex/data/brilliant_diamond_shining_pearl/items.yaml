    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
lagging_tail:
  names:
    jp_kana: こうこうのしっぽ
    jp_kanji: こうこうのしっぽ
    en: Lagging Tail
    fr: Ralentiqueue
    it: Rallentocoda
    de: Schwerschweif
    es: Cola Plúmbea
    ko: 느림보꼬리
    zh_simp: 后攻之尾
    zh_trad: 後攻之尾
  descriptions:
    jp_kana: "とても　おもたい　なにかの　しっぽ。\nもたせると　いつもより　こうどうが\nおそくなる。"
    jp_kanji: "とても　重たい　なにかの　しっぽ。\n持たせると　いつもより　行動が\n遅くなる。"
    en: "An item to be held by a Pokémon. It is tremendously\nheavy and makes the holder move slower\nthan usual."
    fr: Objet à tenir extrêmement lourd qui ralentit le porteur.
    it: "Strumento da dare a un Pokémon.\nÈ tremendamente pesante e rende più lenti\ndel normale."
    de: "Ein Item zum Tragen. Es ist immens schwer und senkt\ndie Geschwindigkeit des Trägers."
    es: "Es muy pesada y hace que el Pokémon que la lleva se\nmueva más lento de lo normal."
    ko: "매우 무거운 무언가의 꼬리.\n지니게 하면 여느 때보다\n행동이 느려진다."
    zh_simp: "非常沉重的某种尾巴。\n携带后，行动会比平时更加迟缓。"
    zh_trad: "非常沉重的某種尾巴。\n攜帶後，行動會比\n平時更加緩慢。"
lansat_berry:
  names:
    jp_kana: サンのみ
    jp_kanji: サンのみ
    en: Lansat Berry
    fr: Baie Lansat
    it: Baccalangsa
    de: Lansatbeere
    es: Baya Zonlan
    ko: 랑사열매
    zh_simp: 兰萨果
    zh_trad: 蘭薩果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nピンチのとき　こうげきが\nきゅうしょに　あたりやすくなる。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　攻撃が\n急所に　当たりやすくなる。"
    en: "A Berry to be consumed by Pokémon. If a Pokémon\nholds one, its critical-hit ratio will increase when it’s\nin a pinch."
    fr: "Tenue, cette Baie augmente le taux de critiques\nen cas de besoin."
    it: "Se il Pokémon che ha questa bacca si trova\nin difficoltà, la probabilità di sferrare brutti colpi\naumenta."
    de: "Als getragenes Item erhöht diese Beere die\nVolltrefferquote eines Pokémon, sobald es in einer\nNotlage steckt."
    es: "Si la lleva un Pokémon, aumenta la probabilidad de dar\nun golpe crítico en un momento de apuro."
    ko: "포켓몬에게 지니게 하면\n위급할 때 공격이\n급소를 맞히기 쉬워진다."
    zh_simp: "让宝可梦携带后，危机时，\n攻击会变得容易击中要害。"
    zh_trad: "讓寶可夢攜帶後，\n危機時，攻擊會變得\n容易擊中要害。"
lapras_candy:
  names:
    jp_kana: ラプラスのアメ
    jp_kanji: ラプラスのアメ
    en: Lapras Candy
    fr: Bonbon Lokhlass
    it: Caramella Lapras
    de: Lapras-Bonbon
    es: Caramelo Lapras
    ko: 라프라스의사탕
    zh_simp: 拉普拉斯的糖果
    zh_trad: 拉普拉斯的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de cierto Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
large_leek:
  names:
    jp_kana: ふといながねぎ
    jp_kanji: ふといながねぎ
    en: Large Leek
    fr: Gros Poireau
    it: Grosso porro
    de: Dicker Lauch
    es: Puerro Grueso
    ko: 굵은대파
    zh_simp: 粗枝大葱
    zh_trad: 粗枝大蔥
  descriptions:
    jp_kana: "キャンプの　りょうりに　つかう\nしょくざいの　いっしゅ。ポケモン　カモネギが\nこのむ　しょくぶつの　クキなのかは　なぞ。"
    jp_kanji: "キャンプの　料理に　使う\n食材の　一種。ポケモン　カモネギが\n好む　植物の　クキなのかは　謎。"
    en: "One of the many ingredients that can be used for\ncooking at your camp. Whether this is the kind of\nvegetable stalk that Farfetch’d like is unknown."
    fr: "Un ingrédient de cuisine pour le camping.\nOn ne sait pas trop pourquoi les Canarticho\nles affectionnent tant."
    it: "Uno degli ingredienti che puoi usare per cucinare\nin campeggio. Nessuno sa se questo sia lo stesso\ntipo di gambo che piace tanto ai Farfetch’d."
    de: "Eine Zutat für PokéCamping-Mahlzeiten. Es ist unklar,\nob es dieselbe Sorte Lauch ist, die bei Porenta so hoch\nim Kurs steht."
    es: "Un ingrediente para cocinar en el campamento. No se\nsabe si este es el tipo de verdura que le gusta a\nFarfetch’d."
    ko: "캠프 요리에 사용되는\n식재료 중 하나. 포켓몬 파오리가\n좋아하는 식물의 줄기인지는 불명이다."
    zh_simp: "在露营营地制作料理时会使用的\n一种食材。不知是不是宝可梦\n大葱鸭最爱的那种植物的茎。"
    zh_trad: "製作露營料理時使用的食材之一。\n不知道是不是寶可夢大蔥鴨\n所喜愛的那種植物的莖。"
latiasite:
  names:
    jp_kana: ラティアスナイト
    jp_kanji: ラティアスナイト
    en: Latiasite
    fr: Latiasite
    it: Latiasite
    de: Latiasnit
    es: Latiasita
    ko: 라티아스나이트
    zh_simp: 拉帝亚斯进化石
    zh_trad: 拉帝亞斯進化石
  descriptions:
    jp_kana: "ラティアスに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "ラティアスに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Latias hold it, and this stone will enable it to\nMega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par Latias, elle lui permet de\nméga-évoluer durant un combat."
    it: "Un esemplare delle misteriose Megapietre.\nData a Latias, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Latias getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Latias en combate."
    ko: "라티아스에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让拉帝亚斯携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓拉帝亞斯攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
latiosite:
  names:
    jp_kana: ラティオスナイト
    jp_kanji: ラティオスナイト
    en: Latiosite
    fr: Latiosite
    it: Latiosite
    de: Latiosnit
    es: Latiosita
    ko: 라티오스나이트
    zh_simp: 拉帝欧斯进化石
    zh_trad: 拉帝歐斯進化石
  descriptions:
    jp_kana: "ラティオスに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "ラティオスに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Latios hold it, and this stone will enable it to\nMega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par Latios, elle lui permet de\nméga-évoluer durant un combat."
    it: "Un esemplare delle misteriose Megapietre.\nData a Latios, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Latios getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Latios en combate."
    ko: "라티오스에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让拉帝欧斯携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓拉帝歐斯攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
lava_cookie:
  names:
    jp_kana: フエンせんべい
    jp_kanji: フエンせんべい
    en: Lava Cookie
    fr: Lava Cookie
    it: Lavottino
    de: Lavakeks
    es: Galleta Lava
    ko: 용암전병
    zh_simp: 釜炎仙贝
    zh_trad: 釜炎仙貝
  descriptions:
    jp_kana: "フエンめいぶつの　せんべい。\nポケモン　１ひきの　じょうたいの\nいじょうを　すべて　かいふくする。"
    jp_kanji: "フエン名物の　せんべい。\nポケモン　１匹の　状態の\n異常を　すべて　回復する。"
    en: "Lavaridge Town’s local specialty. It can be used\nonce to heal all the status conditions of a Pokémon."
    fr: "Une spécialité de Vermilava.\nSoigne toutes les altérations de statut d’un Pokémon."
    it: "Specialità tipica di Cuordilava.\nCura tutti i problemi di stato di un Pokémon."
    de: "Eine Spezialität aus Bad Lavastadt, die alle\nStatusprobleme eines Pokémon heilt."
    es: "Dulce típico de Pueblo Lavacalda que cura todos los\nproblemas de estado de un Pokémon."
    ko: "용암마을의 명물인 전병.\n포켓몬 1마리의\n상태 이상을 모두 회복한다."
    zh_simp: "釜炎特产的仙贝。\n能治愈１只宝可梦的\n所有异常状态。"
    zh_trad: "釜炎特產的仙貝。\n能治癒１隻寶可夢的\n所有異常狀態。"
lax_incense:
  names:
    jp_kana: のんきのおこう
    jp_kanji: のんきのおこう
    en: Lax Incense
    fr: Encens Doux
    it: Distraroma
    de: Laxrauch
    es: Incienso Suave
    ko: 무사태평향로
    zh_simp: 悠闲薰香
    zh_trad: 悠閒薰香
  descriptions:
    jp_kana: "もたせると　おこうの　ふしぎな\nかおりが　あいてを　まどわせて\nわざが　めいちゅう　しにくくなる。"
    jp_kanji: "持たせると　御香の　不思議な\n香りが　相手を　まどわせて\n技が　命中　しにくくなる。"
    en: "An item to be held by a Pokémon. The beguiling\naroma of this incense may cause attacks to miss\nits holder."
    fr: "Objet à tenir. Le parfum trompeur de cet encens\nbaisse la Précision de l’ennemi."
    it: "Strumento da dare a un Pokémon.\nIl suo aroma intenso riduce la precisione del nemico."
    de: "Ein Item zum Tragen. Das verwirrende Aroma senkt die\nGenauigkeit des Gegners."
    es: "Debe llevarlo un Pokémon. Su peculiar aroma reduce la\nPrecisión del objetivo."
    ko: "지니게 하면 향로의 이상한\n향기가 상대를 혼란시켜\n기술이 명중하기 어려워진다."
    zh_simp: "携带后，薰香的\n神奇香气会迷惑对手，\n其招式会变得不容易命中。"
    zh_trad: "攜帶後，薰香的\n神奇香氣會迷惑對手，\n其招式會變得不容易命中。"
lax_mint:
  names:
    jp_kana: のうてんきミント
    jp_kanji: のうてんきミント
    en: Lax Mint
    fr: Aromate Lâche
    it: Menta Fiacca
    de: Lasch-Minze
    es: Menta Floja
    ko: 촐랑민트
    zh_simp: 乐天薄荷
    zh_trad: 樂天薄荷
  descriptions:
    jp_kana: "ポケモンに　かおりを　かがせると\nぼうぎょが　あがりやすく　なるが\nとくぼうは　あがりにくくなる　ミント。"
    jp_kanji: "ポケモンに　香りを　かがせると\n防御が　上がりやすく　なるが\n特防は　上がりにくくなる　ミント。"
    en: "When a Pokémon smells this mint, its Defense will grow\nmore easily, but its Sp. Def will grow more slowly."
    fr: "Si un Pokémon hume cet aromate, sa Défense\nmontera plus facilement, mais sa Défense Spéciale\nse développera plus lentement."
    it: "Quando un Pokémon ne sente il profumo, la sua Difesa\naumenta più facilmente a scapito della Difesa Speciale."
    de: "Lässt man ein Pokémon an dieser Minze schnuppern,\nsteigt seine Verteidigung schneller, aber seine\nSpezial-Verteidigung umso langsamer."
    es: "Cuando un Pokémon percibe su aroma, aumenta con\nmás facilidad su Defensa, en detrimento de su Defensa\nEspecial."
    ko: "포켓몬에게 향기를 맡게 하면\n방어가 오르기 쉬워지지만\n특수방어가 오르기 어려워지는 민트."
    zh_simp: "宝可梦闻了这种薄荷之后，\n会令防御容易提高，\n而特防则难以提高。"
    zh_trad: "讓寶可夢聞這種薄荷的氣味，\n會令防禦變得容易提高，\n但特防則難以提高。"
leaf_letter:eevee:
  names:
    jp_kana: このはのおてがみ
    jp_kanji: このはのおてがみ
    en: Leaf Letter
    fr: Lettre Végétale
    it: Foglialettera
    de: Blattbrief
    es: Hoja Escrita
    ko: 나뭇잎편지
    zh_simp: 树叶信
    zh_trad: 樹葉信
  descriptions:
    jp_kana: "このはで　つくった　てがみ。\nイーブイの　あしあとで\nなにかが　かかれて　いる。"
    jp_kanji: "木の葉で　作った　手紙。\nイーブイの　足あとで\nなにかが　書かれて　いる。"
    en: "A letter written on a leaf. Something is written using\nEevee’s footprints."
    fr: "Une lettre rédigée sur une feuille d’arbre.\nÉvoli semble y avoir écrit quelque chose avec ses pattes."
    it: "Una lettera scritta sulla foglia di un albero, dove le\nimpronte di Eevee sembrano formare delle frasi\ndi senso compiuto."
    de: "Ein Brief, der auf einem Blatt verfasst wurde.\nEvoli scheint mit seinen Pfotenabdrücken\netwas geschrieben zu haben."
    es: "Una carta escrita en una hoja. Hay huellas de Eevee\nestampadas en ella y parecen guardar algún significado."
    ko: "나뭇잎으로 만든 편지.\n이브이의 발자국으로\n무언가가 쓰여 있다."
    zh_simp: "以树叶制作的信件。\n上面留有伊布的脚印，\n好像是要表达些什么。"
    zh_trad: "用樹葉做的信。\n上面有伊布的腳印。\n好像是想表達些什麼。"
leaf_letter:pikachu:
  names:
    jp_kana: このはのおてがみ
    jp_kanji: このはのおてがみ
    en: Leaf Letter
    fr: Lettre Végétale
    it: Foglialettera
    de: Blattbrief
    es: Hoja Escrita
    ko: 나뭇잎편지
    zh_simp: 树叶信
    zh_trad: 樹葉信
  descriptions:
    jp_kana: "このはで　つくった　てがみ。\nピカチュウの　あしあとで\nなにかが　かかれて　いる。"
    jp_kanji: "木の葉で　作った　手紙。\nピカチュウの　足あとで\nなにかが　書かれて　いる。"
    en: "A letter written on a leaf. Something is written using\nPikachu’s footprints."
    fr: "Une lettre rédigée sur une feuille d’arbre.\nPikachu semble y avoir écrit quelque chose\navec ses pattes."
    it: "Una lettera scritta sulla foglia di un albero, dove le\nimpronte di Pikachu sembrano formare delle frasi\ndi senso compiuto."
    de: "Ein Brief, der auf einem Blatt verfasst wurde.\nPikachu scheint mit seinen Pfotenabdrücken\netwas geschrieben zu haben."
    es: "Una carta escrita en una hoja. Hay huellas de Pikachu\nestampadas en ella y parecen guardar algún significado."
    ko: "나뭇잎으로 만든 편지.\n피카츄의 발자국으로\n무언가가 쓰여 있다."
    zh_simp: "以树叶制作的信件。\n上面留有皮卡丘的脚印，\n好像是要表达些什么。"
    zh_trad: "用樹葉做的信。\n上面有皮卡丘的腳印。\n好像是想表達些什麼。"
leaf_stone:
  names:
    jp_kana: リーフのいし
    jp_kanji: リーフのいし
    en: Leaf Stone
    fr: Pierre Plante
    it: Pietrafoglia
    de: Blattstein
    es: Piedra Hoja
    ko: 리프의돌
    zh_simp: 叶之石
    zh_trad: 葉之石
  descriptions:
    jp_kana: "ある　とくていの　ポケモンを\nしんかさせる　ふしぎな　いし。\nはっぱの　もようが　ある。"
    jp_kanji: "ある　特定の　ポケモンを\n進化させる　不思議な　石。\nはっぱの　模様が　ある。"
    en: "A peculiar stone that can make certain species of\nPokémon evolve. It has an unmistakable leaf pattern."
    fr: "Une pierre étrange qui fait évoluer certaines espèces\nde Pokémon. Une feuille est dessinée dessus."
    it: "Pietra particolare che fa evolvere determinate\nspecie di Pokémon. Riporta l’immagine di una foglia."
    de: "Dieser spezielle Stein löst bei bestimmten Pokémon\ndie Entwicklung aus. Er hat ein Blattmuster."
    es: "Curiosa piedra que hace evolucionar a determinadas\nespecies de Pokémon. Tiene grabada una hoja."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 돌.\n잎사귀 무늬가 있다."
    zh_simp: "能让某些特定宝可梦\n进化的神奇石头。\n有着叶子般的花纹。"
    zh_trad: "能讓特定寶可夢\n進化的神奇石頭。\n上面有著葉子花紋。"
leek:
  names:
    jp_kana: ながねぎ
    jp_kanji: ながねぎ
    en: Leek
    fr: Poireau
    it: Gambo
    de: Lauchstange
    es: Puerro
    ko: 대파
    zh_simp: 大葱
    zh_trad: 大蔥
  descriptions:
    jp_kana: "とても　ながくて　かたい　クキ。\nカモネギに　もたせると　わざが\nきゅうしょに　あたりやすくなる。"
    jp_kanji: "とても　長くて　硬い　クキ。\nカモネギに　持たせると　技が\n急所に　当たりやすくなる。"
    en: "An item to be held by Farfetch’d. This very long\nand stiff stalk of leek boosts its critical-hit ratio."
    fr: "Objet à faire tenir à Canarticho.\nUn poireau très long et solide qui augmente\nson taux de critiques."
    it: "Strumento da dare a Farfetch’d.\nLungo gambo di porro che aumenta molto\nla probabilità di sferrare brutti colpi."
    de: "Ein Item, das von Porenta getragen werden kann. Diese\nlange Lauchstange erhöht die Volltrefferquote stark."
    es: "Es un puerro muy largo que debe llevar Farfetch’d.\nAumenta mucho la probabilidad de que logre un golpe\ncrítico."
    ko: "매우 길고 단단한 줄기.\n파오리에게 지니게 하면 기술이\n급소에 맞기 쉬워진다."
    zh_simp: "非常长且坚硬的茎。\n让大葱鸭携带后，\n招式会变得容易击中要害。"
    zh_trad: "非常長且堅硬的莖。\n讓大蔥鴨攜帶後，招式會\n變得容易擊中要害。"
left_poke_ball:
  names:
    jp_kana: のこされたボール
    jp_kanji: のこされたボール
    en: Left Poké Ball
    fr: Poké Ball donnée
    it: Poké Ball altrui
    de: Nachlassball
    es: Poké Ball Ajena
    ko: 남겨진 볼
    zh_simp: 留下的精灵球
    zh_trad: 留下的精靈球
  descriptions:
    jp_kana: "トレーナーを　うしなった　ポケモンが\nはいっている　ボール。　トレーナーは\nウラウラじま　しゅっしん　らしい。"
    jp_kanji: "トレーナーを　失った　ポケモンが\n入っている　ボール。　トレーナーは\nウラウラ島　出身　らしい。"
    en: "A Poké Ball with a Pokémon that lost its Trainer\ninside. It seems to be from Ula’ula Island."
    fr: "Une Poké Ball contenant un Pokémon dont le Dresseur\na disparu. Il semblerait que ce Dresseur soit originaire\nd’Ula-Ula."
    it: "Poké Ball contenente un Pokémon rimasto orfano\ndell’Allenatore. Sembra che l’Allenatore fosse\noriginario di Ula Ula."
    de: "Der Pokéball enthält ein Pokémon, das seinen Trainer\nverloren hat. Dieser stammt wohl aus Ula-Ula."
    es: "Poké Ball que alberga un Pokémon que perdió a su\nEntrenador, al parecer, natural de Ula-Ula."
    ko: "트레이너를 잃은 포켓몬이\n들어 있는 볼. 트레이너는\n울라울라섬 출신인 듯하다."
    zh_simp: "该精灵球里面装的是没有了\n训练家的宝可梦。那位训练家\n好像是出生自乌拉乌拉岛。"
    zh_trad: "這個精靈球裡面裝了\n失去訓練家的寶可夢。\n訓練家似乎來自烏拉烏拉島。"
leftovers:
  names:
    jp_kana: たべのこし
    jp_kanji: たべのこし
    en: Leftovers
    fr: Restes
    it: Avanzi
    de: Überreste
    es: Restos
    ko: 먹다남은음식
    zh_simp: 吃剩的东西
    zh_trad: 吃剩的東西
  descriptions:
    jp_kana: "もたせると　ポケモンの　ＨＰが\nせんとうの　あいだ　すこしずつ\nかいふくする。"
    jp_kanji: "持たせると　ポケモンの　ＨＰが\n戦闘の　あいだ　少しずつ\n回復する。"
    en: "An item to be held by a Pokémon. The holder’s HP\nis slowly but steadily restored throughout\nevery battle."
    fr: "Objet à tenir. Permet de restaurer graduellement\nles PV du porteur durant le combat."
    it: "Strumento da dare a un Pokémon.\nFa recuperare gradualmente i PS durante la lotta."
    de: "Ein Item, das einem Pokémon zum Tragen gegeben\nwerden kann. Es füllt im Kampf stetig KP auf."
    es: "Este objeto restaura gradualmente durante el combate\nlos PS del Pokémon que lo lleva."
    ko: "지니게 하면 포켓몬의 HP가\n배틀을 하는 동안 조금씩\n회복된다."
    zh_simp: "携带后，宝可梦的ＨＰ\n会在战斗期间缓缓回复。"
    zh_trad: "攜帶後，寶可夢的ＨＰ\n會在戰鬥期間緩緩回復。"
legendary_clue_1:
  names:
    jp_kana: でんせつのメモ１
    jp_kanji: でんせつのメモ１
    en: Legendary Clue 1
    fr: Note Légende 1
    it: Leggenda 1
    de: Legenden-Notiz 1
    es: Leyenda 1
    ko: 전설의메모1
    zh_simp: 传说笔记１
    zh_trad: 傳說筆記１
  descriptions:
    jp_kana: "ほうじょうのおう　でんせつについて\nピオニーが　まとめた　メモ。\nふるい　しゃしんが　はりつけられている。"
    jp_kanji: "豊穣の王　伝説について\nピオニーが　まとめた　メモ。\n古い　写真が　貼り付けられている。"
    en: "A clue about the King of Bountiful Harvests. It’s written\nby Peony, and an old photo is attached to it."
    fr: "Les notes de Dhilan sur le légendaire Seigneur\ndes récoltes. Elles sont accompagnées d’une vieille\nphotographie."
    it: "Appunti presi da Peony sulla leggenda del Re\ndell’abbondanza. C’è attaccata una vecchia foto."
    de: "Gesammelte Notizen von Peony über die Legende des\nKönigs der reichen Ernte. Ein altes Foto ist auch dabei."
    es: "Una nota escrita por Peony acerca de la leyenda del\nRey de las Cosechas. Lleva adjunta una vieja fotografía."
    ko: "풍요의 왕 전설에 대해\n피오니가 정리한 메모.\n오래된 사진이 붙어 있다."
    zh_simp: "皮欧尼整理的\n有关丰饶之王传说的笔记。\n上面贴着很旧的照片。"
    zh_trad: "皮歐尼針對豐饒之王傳說\n所整理的筆記。\n上面貼著很舊的照片。"
legendary_clue_2:
  names:
    jp_kana: でんせつのメモ２
    jp_kanji: でんせつのメモ２
    en: Legendary Clue 2
    fr: Note Légende 2
    it: Leggenda 2
    de: Legenden-Notiz 2
    es: Leyenda 2
    ko: 전설의메모2
    zh_simp: 传说笔记２
    zh_trad: 傳說筆記２
  descriptions:
    jp_kana: "きょじん　でんせつについて\nピオニーが　まとめた　メモ。\nこせいてきな　えが　かかれている。"
    jp_kanji: "巨人　伝説について\nピオニーが　まとめた　メモ。\n個性的な　絵が　描かれている。"
    en: "A clue about the legend of giants. It’s written\nby Peony and has unique drawings."
    fr: "Les notes de Dhilan sur les colosses légendaires.\nIl a pris le temps de les accompagner d’illustrations."
    it: "Appunti presi da Peony sulla leggenda dei giganti.\nContengono un’illustrazione singolare."
    de: "Gesammelte Notizen von Peony über die Legende der\nGiganten. Ein paar einzigartige Illustrationen sind\nauch dabei."
    es: "Una nota escrita por Peony acerca de la leyenda de los\ngigantes. Contiene unas ilustraciones muy particulares."
    ko: "거인의 전설에 대해\n피오니가 정리한 메모.\n개성적인 그림이 그려져 있다."
    zh_simp: "皮欧尼整理的\n有关巨人传说的笔记。\n上面绘有充满个性的画。"
    zh_trad: "皮歐尼針對巨人傳說\n所整理的筆記。\n上面畫有個性十足的圖案。"
legendary_clue_3:
  names:
    jp_kana: でんせつのメモ３
    jp_kanji: でんせつのメモ３
    en: Legendary Clue 3
    fr: Note Légende 3
    it: Leggenda 3
    de: Legenden-Notiz 3
    es: Leyenda 3
    ko: 전설의메모3
    zh_simp: 传说笔记３
    zh_trad: 傳說筆記３
  descriptions:
    jp_kana: "とりポケモン　でんせつについて\nピオニーが　まとめた　メモ。\nこせいてきな　えが　かかれている。"
    jp_kanji: "とりポケモン　伝説について\nピオニーが　まとめた　メモ。\n個性的な　絵が　描かれている。"
    en: "A clue about the legend of bird Pokémon. It’s written\nby Peony and has a unique drawing."
    fr: "Les notes de Dhilan sur les oiseaux de légende.\nIl a pris le temps de les accompagner d’une illustration."
    it: "Appunti presi da Peony sulla leggenda dei Pokémon\nalati. Contengono un’illustrazione singolare."
    de: "Gesammelte Notizen von Peony über die Legende der\nVogel-Pokémon. Eine einzigartige Illustration ist auch\ndabei."
    es: "Una nota escrita por Peony acerca de la leyenda de\nlas aves legendarias. Contiene una ilustración muy\nparticular."
    ko: "새포켓몬 전설에 대해\n피오니가 정리한 메모.\n개성적인 그림이 그려져 있다."
    zh_simp: "皮欧尼整理的\n有关鸟宝可梦传说的笔记。\n上面绘有充满个性的画。"
    zh_trad: "皮歐尼針對鳥寶可夢傳說\n所整理的筆記。\n上面畫有個性十足的圖案。"
legendary_clue_question:
  names:
    jp_kana: でんせつのメモ？
    jp_kanji: でんせつのメモ？
    en: Legendary Clue?
    fr: Note Légende (?)
    it: Leggenda ?
    de: Legenden-Notiz X
    es: Leyenda (?)
    ko: 전설의메모?
    zh_simp: 传说笔记？
    zh_trad: 傳說筆記？
  descriptions:
    jp_kana: "ピオニーが　おとした　ふしぎなメモ。\nマックスダイすあなに　ひかる　あなが\nひらかれた　しゃしんが　はりつけてある。"
    jp_kanji: "ピオニーが　落とした　不思議なメモ。\nマックスダイ巣穴に　光の穴が\n開かれた　写真が　貼り付けてある。"
    en: "A mysterious clue that Peony seems to have dropped.\nThere’s a photo attached to it showing a shining hole\nopening above the Max Lair."
    fr: "Une note mystérieuse que Dhilan a égarée.\nOn peut y voir la photo d’un trou de lumière,\ndans le Grand Antre Dynamax."
    it: "Appunti misteriosi perduti da Peony.\nVi è incollata una foto di uno squarcio luminoso\napertosi in una dynatana max."
    de: "Eine rätselhafte Notiz, die Peony verloren hat.\nDarin klebt ein Foto eines leuchtenden Lochs,\ndas sich über dem Dyna-Riesennest geöffnet hat."
    es: "Una extraña nota que se le cayó a Peony. Tiene pegada\nuna foto del Supernido Dinamax en la que se ve una\ncavidad luminosa."
    ko: "피오니가 떨어뜨린 수상한 메모.\n맥스다이맥스굴에 빛나는 구멍이 열린\n사진이 붙어 있다."
    zh_simp: "皮欧尼掉落的神秘笔记。\n上面贴有极巨巢穴\n出现光洞的照片。"
    zh_trad: "皮歐尼掉落的神秘筆記。\n上面貼的照片裡可以看見\n極巨巢穴有個發光的大洞。"
lemonade:
  names:
    jp_kana: ミックスオレ
    jp_kanji: ミックスオレ
    en: Lemonade
    fr: Limonade
    it: Lemonsucco
    de: Limonade
    es: Limonada
    ko: 후르츠밀크
    zh_simp: 果汁牛奶
    zh_trad: 果汁牛奶
  descriptions:
    jp_kana: "とても　あまい　ジュース。\nポケモン　１ひきの　ＨＰを\n７０だけ　かいふくする。"
    jp_kanji: "とても　あまい　ジュース。\nポケモン　１匹の　ＨＰを\n７０だけ　回復する。"
    en: "A very sweet and refreshing drink. It can be used to\nrestore 70 HP to a single Pokémon."
    fr: "Une boisson très sucrée.\nRestaure 70 PV d’un Pokémon."
    it: "Bevanda molto dolce.\nRestituisce 70 PS a un Pokémon."
    de: "Ein sehr süßes Getränk, das die KP eines Pokémon um\n70 Punkte auffüllt."
    es: Bebida muy dulce que restaura 70 PS de un Pokémon.
    ko: "매우 달콤한 주스.\n포켓몬 1마리의 HP를\n70만큼 회복한다."
    zh_simp: "非常香甜的果汁。\n能让１只宝可梦\n回复７０ＨＰ。"
    zh_trad: "非常甜的果汁。\n能讓１隻寶可夢\n回復７０ＨＰ。"
lens_case:
  names:
    jp_kana: レンズケース
    jp_kanji: レンズケース
    en: Lens Case
    fr: Boîte Lentilles
    it: Portalenti
    de: Linsenetui
    es: Portalentillas
    ko: 렌즈케이스
    zh_simp: 隐形眼镜盒
    zh_trad: 隱形眼鏡盒
  descriptions:
    jp_kana: "コンタクトレンズを　しまっておける\nちょっと　おしゃれな　ケース。"
    jp_kanji: "コンタクトレンズを　しまっておける\nちょっと　おしゃれな　ケース。"
    en: A rather chic-looking case for carrying contact lenses.
    fr: Un étui plutôt chic destiné aux lentilles de contact.
    it: Un elegante astuccio per lenti a contatto.
    de: Ein stilvolles Etui zur Aufbewahrung von Kontaktlinsen.
    es: "Estuche de aspecto sofisticado para llevar tus lentes\nde contacto."
    ko: "콘택트렌즈를 담아 둘 수 있는\n살짝 멋진 케이스."
    zh_simp: "可以存放隐形眼镜的，\n有点漂亮的盒子。"
    zh_trad: "可以存放隱形眼鏡的，\n有點漂亮的盒子。"
leppa_berry:
  names:
    jp_kana: ヒメリのみ
    jp_kanji: ヒメリのみ
    en: Leppa Berry
    fr: Baie Mepo
    it: Baccamela
    de: Jonagobeere
    es: Baya Zanama
    ko: 과사열매
    zh_simp: 苹野果
    zh_trad: 蘋野果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nＰＰを　１０だけ　かいふくする。"
    jp_kanji: "ポケモンに　持たせると\nＰＰを　１０だけ　回復する。"
    en: "A Berry to be consumed by Pokémon. If a Pokémon\nholds one, it can restore 10 PP to a depleted move\nduring battle."
    fr: "Une Baie qui restaure 10 PP lorsqu’elle est tenue\npar un Pokémon."
    it: "Se un Pokémon ha questa bacca, una delle sue mosse\nrecupera 10 PP."
    de: "Gibst du die Beere einem Pokémon zum Tragen,\nfüllt sie die AP einer Attacke um 10 Punkte auf."
    es: "Los Pokémon pueden llevarla o usarla para restaurar\n10 PP de un movimiento."
    ko: "포켓몬에게 지니게 하면\nPP를 10만큼 회복한다."
    zh_simp: "让宝可梦携带后，\n可以回复１０ＰＰ。"
    zh_trad: "讓寶可夢攜帶後，\n可以回復１０ＰＰ。"
letter:
  names:
    jp_kana: ダイゴへのてがみ
    jp_kanji: ダイゴへのてがみ
    en: Letter
    fr: Lettre à Pierre
    it: Lettera
    de: Brief an Troy
    es: Carta a Máximo
    ko: 성호에게줄편지
    zh_simp: 给大吾的信
    zh_trad: 給大吾的信
  descriptions:
    jp_kana: "デボンしゃちょうから\nあずかった　てがみ。"
    jp_kanji: "デボン社長から\nあずかった　手紙。"
    en: "An extremely important letter to Steven from\nthe president of Devon Corporation."
    fr: Une lettre confiée par le directeur de Devon.
    it: "Lettera che ti è stata affidata dal direttore\ndella Devon."
    de: "Ein Brief, den du im Namen des Präsidenten der\nDevon Corporation an Troy aushändigen sollst."
    es: Carta que te ha confiado el presidente de Devon S. A.
    ko: "데봉사장이\n맡긴 편지."
    zh_simp: "从得文社长\n那里得到的信。"
    zh_trad: 得文社長託付的信。
level_ball:
  names:
    jp_kana: レベルボール
    jp_kanji: レベルボール
    en: Level Ball
    fr: Niveau Ball
    it: Level Ball
    de: Levelball
    es: Nivel Ball
    ko: 레벨볼
    zh_simp: 等级球
    zh_trad: 等級球
  descriptions:
    jp_kana: "じぶんの　ポケモンより　レベルが\nひくいほど　つかまえやすくなる\nちょっと　かわった　ボール。"
    jp_kanji: "自分の　ポケモンより　レベルが\n低いほど　捕まえやすくなる\nちょっと　変わった　ボール。"
    en: "A Poké Ball that makes it easier to catch Pokémon\nthat are at a lower level than your own Pokémon."
    fr: "Une Poké Ball un peu spéciale qui fonctionne\nparticulièrement bien sur les Pokémon de niveau\ninférieur au sien."
    it: "Poké Ball un po’ diversa che funziona\nparticolarmente bene con i Pokémon di livello\ninferiore a quello del proprio."
    de: "Ein Ball, mit dem sich Pokémon umso leichter fangen\nlassen, je niedriger ihr Level im Vergleich zu deinem\nTeam ist."
    es: "Poké Ball algo distinta que funciona especialmente bien\ncon Pokémon de nivel inferior a los que se posee."
    ko: "자신의 포켓몬보다 레벨이\n낮을수록 잡기 쉬워지는\n조금 특이한 볼."
    zh_simp: "有点与众不同的球。\n要捕捉的宝可梦比自己宝可梦的\n等级越低，就会越容易捕捉。"
    zh_trad: "有點與眾不同的球。\n對手的等級比自己的寶可夢低越多，\n就越容易捉到。"
liberty_pass:
  names:
    jp_kana: リバティチケット
    jp_kanji: リバティチケット
    en: Liberty Pass
    fr: Passe Liberté
    it: Liberticket
    de: Gartenpass
    es: Tarjeta Libertad
    ko: 리버티티켓
    zh_simp: 自由船票
    zh_trad: 自由船票
  descriptions:
    jp_kana: "リバティガーデンとうに　いくための\nとくべつな　チケット。\nヒウンシティから　ふねに　のれる。"
    jp_kanji: "リバティガーデン島に　行くための\n特別な　チケット。\nヒウンシティから　船に　乗れる。"
    en: "A special pass to go to Liberty Garden.\nBoard the ship in Castelia City."
    fr: "Un ticket spécial permettant de se rendre\nsur l’Île Liberté à bord du bateau de Volucité."
    it: "Biglietto speciale per l’Isola Libertà.\nLa nave parte da Austropoli."
    de: "Ein besonderes Ticket für die Überfahrt von Stratos City\nzur Insel des Freiheitsgartens."
    es: "Ticket especial para ir en barco desde Ciudad Porcelana\na Isla Libertad."
    ko: "리버티가든섬에 가기 위한\n특별한 티켓.\n구름시티에서 배를 탈 수 있다."
    zh_simp: "用于前往自由庭园岛的特殊船票。\n可以从飞云市上船。"
    zh_trad: "用於前往自由庭園島的\n特殊船票。\n可以從飛雲市上船。"
lickitung_candy:
  names:
    jp_kana: ベロリンガのアメ
    jp_kanji: ベロリンガのアメ
    en: Lickitung Candy
    fr: Bonbon Excelangue
    it: Caramella Lickitung
    de: Schlurp-Bonbon
    es: Caramelo Lickitung
    ko: 내루미의사탕
    zh_simp: 大舌头的糖果
    zh_trad: 大舌頭的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de cierto Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
liechi_berry:
  names:
    jp_kana: チイラのみ
    jp_kanji: チイラのみ
    en: Liechi Berry
    fr: Baie Lichii
    it: Baccalici
    de: Lydzibeere
    es: Baya Lichi
    ko: 치리열매
    zh_simp: 枝荔果
    zh_trad: 枝荔果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nピンチのとき　じぶんの\nこうげきが　あがる。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　自分の\n攻撃が　あがる。"
    en: "A Berry to be consumed by Pokémon. If a Pokémon\nholds one, its Attack stat will increase when it’s in\na pinch."
    fr: Tenue, cette Baie augmente l’Attaque en cas de besoin.
    it: "Se il Pokémon che ha questa bacca si trova\nin difficoltà, il suo Attacco aumenta."
    de: "Als getragenes Item erhöht diese Beere den\nAngriffs-Wert eines Pokémon, sobald es in einer\nNotlage steckt."
    es: "Si la lleva un Pokémon, le sube el Ataque en un\nmomento de apuro."
    ko: "포켓몬에게 지니게 하면\n위급할 때 자신의\n공격이 올라간다."
    zh_simp: "让宝可梦携带后，危机时，\n自己的攻击就会提高。"
    zh_trad: "讓寶可夢攜帶後，\n危機時，自己的\n攻擊就會提高。"
life_orb:
  names:
    jp_kana: いのちのたま
    jp_kanji: いのちのたま
    en: Life Orb
    fr: Orbe Vie
    it: Assorbisfera
    de: Leben-Orb
    es: Vidasfera
    ko: 생명의구슬
    zh_simp: 生命宝珠
    zh_trad: 生命寶珠
  descriptions:
    jp_kana: "もたせると　こうげきする　たびに\nＨＰが　すこし　へってしまうが\nわざの　いりょくが　あがる。"
    jp_kanji: "持たせると　攻撃する　たびに\nＨＰが　少し　減ってしまうが\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon. It boosts the\npower of moves but at the cost of some HP on\neach hit."
    fr: "Objet à tenir. Augmente la puissance des capacités,\nmais dépense des PV à chaque coup."
    it: "Strumento da dare a un Pokémon.\nPotenzia le mosse a scapito di alcuni PS\nper ogni colpo."
    de: "Ein Item zum Tragen. Verstärkt Attacken, aber jede\nAttacke kostet den Träger KP."
    es: "Potencia los movimientos, pero consume PS con cada\nataque. Debe llevarla un Pokémon."
    ko: "지니게 하면 공격할 때마다\nHP가 조금씩 줄지만\n기술의 위력이 올라간다."
    zh_simp: "携带后，虽然每次攻击时\nＨＰ少量减少，\n但招式的威力会提高。"
    zh_trad: "攜帶後，雖然每次攻擊時\nＨＰ會少量減少，但招式的\n威力會提高。"
lift_key:
  names:
    jp_kana: エレベータのカギ
    jp_kanji: エレベータのカギ
    en: Lift Key
    fr: Clé Ascenseur
    it: Chiave ascensore
    de: Aufzugsschlüssel
    es: Llave Ascensor
    ko: 엘리베이터열쇠
    zh_simp: 电梯钥匙
    zh_trad: 電梯鑰匙
  descriptions:
    jp_kana: "ロケットだん　アジトに　ある\nエレベータを　うごかす　カギ。\nロケットだんの　マークいり。"
    jp_kanji: "ロケット団　アジトに　ある\nエレベータを　動かす　カギ。\nロケット団の　マーク入り。"
    en: "A key that operates the elevator in the Team Rocket\nHideout. It bears the Team Rocket logo."
    fr: "Une clé activant l’ascenseur du Repaire de la Team\nRocket. Elle porte la marque de l’organisation."
    it: "Chiave per l’ascensore nel Rifugio del Team Rocket.\nPresenta il logo del Team Rocket."
    de: "Ein Schlüssel, mit dessen Hilfe der Aufzug im\nRocket-Versteck in Gang gesetzt werden kann.\nDas Logo von Team Rocket ist darauf abgebildet."
    es: "Llave que permite acceder al ascensor de la Guarida\ndel Team Rocket. Lleva grabado el símbolo del\nTeam Rocket."
    ko: "로켓단아지트에 있는\n엘리베이터를 작동시키는 열쇠.\n로켓단의 마크가 새겨져 있다."
    zh_simp: "带有火箭队标志的钥匙。\n能启动位于火箭队基地的电梯。"
    zh_trad: "能啟動火箭隊基地\n電梯的鑰匙。\n上面有火箭隊的標誌。"
light_ball:
  names:
    jp_kana: でんきだま
    jp_kanji: でんきだま
    en: Light Ball
    fr: Balle Lumière
    it: Elettropalla
    de: Kugelblitz
    es: Bola Luminosa
    ko: 전기구슬
    zh_simp: 电气球
    zh_trad: 電氣球
  descriptions:
    jp_kana: "ピカチュウに　もたせると\nこうげきと　とくこうの　いりょくが\nあがる　ふしぎな　たま。"
    jp_kanji: "ピカチュウに　持たせると\n攻撃と　特攻の　威力が\nあがる　不思議な　玉。"
    en: "An item to be held by Pikachu. It’s a puzzling orb\nthat boosts its Attack and Sp. Atk stats."
    fr: "Objet à faire tenir à Pikachu.\nUn orbe énigmatique qui augmente son Attaque\net son Attaque Spéciale."
    it: "Strumento da dare a Pikachu.\nSfera insolita che aumenta l’Attacco e l’Attacco\nSpeciale."
    de: "Ein Item, das von Pikachu getragen werden kann.\nEs erhöht den Angriffs-Wert und Spezial-Angriffs-Wert."
    es: "Asombrosa esfera que debe llevar Pikachu y que\naumenta su Ataque y su Ataque Especial."
    ko: "피카츄에게 지니게 하면\n공격과 특수공격의 위력이\n올라가는 이상한 구슬."
    zh_simp: "让皮卡丘携带后，\n攻击和特攻的威力\n就会提高的神奇之球。"
    zh_trad: "讓皮卡丘攜帶後，\n攻擊和特攻的威力\n就會提高的神奇之球。"
light_clay:
  names:
    jp_kana: ひかりのねんど
    jp_kanji: ひかりのねんど
    en: Light Clay
    fr: Lumargile
    it: Creta Luce
    de: Lichtlehm
    es: Refleluz
    ko: 빛의점토
    zh_simp: 光之黏土
    zh_trad: 光之黏土
  descriptions:
    jp_kana: "もたせた　ポケモンが　ひかりのかべや\nリフレクターを　つかったとき\nいつもよりも　ながく　のこる。"
    jp_kanji: "持たせた　ポケモンが　ひかりのかべや\nリフレクターを　使ったとき\nいつもよりも　長く　残る。"
    en: "An item to be held by a Pokémon. Protective moves\nlike Light Screen and Reflect will be effective longer."
    fr: "Objet à tenir. Prolonge la durée des capacités\nbarrières telles que Mur Lumière et Protection."
    it: "Strumento da dare a un Pokémon.\nAllunga la durata delle mosse barriera come\nSchermoluce e Riflesso."
    de: "Ein Item zum Tragen. Verlängert die Dauer von\nLichtschild, Reflektor etc."
    es: "Prolonga la duración de barreras como las creadas por\nReflejo y Pantalla de Luz. Debe llevarlo un Pokémon."
    ko: "지니게 한 포켓몬이 빛의장막이나\n리플렉터를 사용했을 때\n여느 때보다 긴 시간 동안 지속된다."
    zh_simp: "当携带它的宝可梦\n使出光墙或反射壁时，\n效果会比平时持续得更长。"
    zh_trad: "當攜帶它的寶可夢\n使出光牆或反射壁時，\n效果會比平時持續得更久。"
light_stone:
  names:
    jp_kana: ライトストーン
    jp_kanji: ライトストーン
    en: Light Stone
    fr: Galet Blanc
    it: Chiarolite
    de: Lichtstein
    es: Orbe Claro
    ko: 라이트스톤
    zh_simp: 光明石
    zh_trad: 光明石
  descriptions:
    jp_kana: "レシラムの　にくたいが　ほろび\nへんかした　すがた。えいゆうの\nとうじょうを　まっていると　される。"
    jp_kanji: "レシラムの　肉体が　滅び\n変化した　姿。　英雄の\n登場を　待っていると　される。"
    en: "Reshiram’s body was destroyed and changed into\nthis stone. It is said to be waiting for the\nemergence of a hero."
    fr: "Ce sont les derniers restes du corps de Reshiram.\nOn dit qu’ils attendent l’apparition d’un héros."
    it: "Pietra in cui si è tramutato Reshiram quando\nha perso la sua forma corporea.\nAttende la venuta di un eroe."
    de: "Nach dem Zerfall seines Körpers nahm Reshiram diese\nForm an. Man sagt, es warte auf die Ankunft eines\nHelden."
    es: "Forma que adoptó Reshiram al perder su cuerpo. Espera\nla llegada de un nuevo héroe."
    ko: "레시라무의 육체가 허물어져\n변화한 모습. 영웅의\n등장을 기다린다고 여겨진다."
    zh_simp: "莱希拉姆的肉体\n毁灭后变成的样子。\n据说它在等待着英雄的到来。"
    zh_trad: "萊希拉姆的肉體\n毀滅後變成的樣子。\n據說它在等待著英雄的到來。"
like_mail:
  names:
    jp_kana: おすすめメール
    jp_kanji: おすすめメール
    en: Like Mail
    fr: Lettre Avis
    it: Mess. Sugg.
    de: Insiderbrief
    es: Carta Gustos
    ko: 추천메일
    zh_simp: 推荐邮件
    zh_trad: 推薦郵件
  descriptions:
    jp_kana: "なにかを　おすすめする　メールが\nかきやすい　びんせん。\nポケモンに　もたせて　つかう。"
    jp_kanji: "なにかを　おすすめする　メールが\n書きやすい　レターペーパー。\nポケモンに　持たせて　使う。"
    en: "Stationery designed to allow you to recommend\nsomething to the reader. Have a Pokémon hold it\nfor delivery."
    fr: "Un papier à lettres idéal pour donner des conseils.\nPeut être tenu et livré par un Pokémon."
    it: "Carta da lettere ideale per scrivere un consiglio.\nSi può dare a un Pokémon affinché la consegni."
    de: "Briefpapier, mit dem man jemandem einen Tipp geben\nkann. Gib es einem Pokémon zum Tragen."
    es: "Carta para recomendar algo. Haz que la entregue un\nPokémon."
    ko: "뭔가 추천하는 메일을\n쉽게 쓸 수 있는 편지지.\n포켓몬에게 지니게 해서 쓴다."
    zh_simp: "方便写推荐内容这类邮件的信纸。\n使用该道具时，\n需要让宝可梦携带着来用。"
    zh_trad: "方便寫推薦內容這類郵件的信紙。\n需讓寶可夢攜帶使用。"
lock_capsule:
  names:
    jp_kana: ロックカプセル
    jp_kanji: ロックカプセル
    en: Lock Capsule
    fr: Poké Écrin
    it: Capsula Scrigno
    de: Tresorkapsel
    es: Cápsula Candado
    ko: 록캡슐
    zh_simp: 上锁的容器
    zh_trad: 上鎖的容器
  descriptions:
    jp_kana: "とくしゅな　カギで　あけられる\nがんじょうな　カプセル。"
    jp_kanji: "特殊な　カギで　あけられる\n頑丈な　カプセル。"
    en: "A sturdy capsule that can only be opened with a\nspecial key."
    fr: "Un écrin résistant qui ne s’ouvre qu’avec une clé\nspéciale."
    it: "Scrigno blindato che si apre solo con una chiave\nspeciale."
    de: "Eine äußerst robuste Kapsel, die sich nur mit einem\nganz speziellen Schlüssel öffnen lässt."
    es: "Una cápsula resistente que solo puede abrirse con una\nllave especial."
    ko: "특수한 열쇠로 열 수 있는\n튼튼한 캡슐."
    zh_simp: "需用特殊钥匙打开的\n坚固的容器。"
    zh_trad: "需用特殊鑰匙打開的\n堅固容器。"
lone_earring:
  names:
    jp_kana: かたっぽピアス
    jp_kanji: かたっぽピアス
    en: Lone Earring
    fr: Boucle d’Oreille
    it: Orecchino
    de: Ohrring
    es: Pendiente
    ko: 한쪽귀고리
    zh_simp: 一边的耳环
    zh_trad: 一邊的耳環
  descriptions:
    jp_kana: "だれかが　おとした\nかたっぽ　だけの　ピアス。"
    jp_kanji: "だれかが　落とした\n片っぽ　だけの　ピアス。"
    en: A single earring that somebody dropped.
    fr: Une boucle d’oreille perdue par quelqu’un.
    it: Un orecchino spaiato, perso da qualcuno.
    de: Ein einzelner Ohrring, den irgendjemand verloren hat.
    es: Un pendiente que se le ha debido de caer a alguien.
    ko: "누군가가 떨어뜨린\n한쪽뿐인 귀고리."
    zh_simp: 某人遗失的单只耳环。
    zh_trad: "只有一邊的耳環。\n不知道是誰遺失的。"
lonely_mint:
  names:
    jp_kana: さみしがりミント
    jp_kanji: さみしがりミント
    en: Lonely Mint
    fr: Aromate Solo
    it: Menta Schiva
    de: Solo-Minze
    es: Menta Huraña
    ko: 외로움민트
    zh_simp: 怕寂寞薄荷
    zh_trad: 怕寂寞薄荷
  descriptions:
    jp_kana: "ポケモンに　かおりを　かがせると\nこうげきが　あがりやすく　なるが\nぼうぎょは　あがりにくくなる　ミント。"
    jp_kanji: "ポケモンに　香りを　かがせると\n攻撃が　上がりやすく　なるが\n防御は　上がりにくくなる　ミント。"
    en: "When a Pokémon smells this mint, its Attack will grow\nmore easily, but its Defense will grow more slowly."
    fr: "Si un Pokémon hume cet aromate, son Attaque\nmontera plus facilement, mais sa Défense\nse développera plus lentement."
    it: "Quando un Pokémon ne sente il profumo, il suo Attacco\naumenta più facilmente a scapito della sua Difesa."
    de: "Lässt man ein Pokémon an dieser Minze schnuppern,\nsteigt sein Angriff schneller, aber seine Verteidigung\numso langsamer."
    es: "Cuando un Pokémon percibe su aroma, aumenta con\nmás facilidad su Ataque, en detrimento de su Defensa."
    ko: "포켓몬에게 향기를 맡게 하면\n공격이 오르기 쉬워지지만\n방어가 오르기 어려워지는 민트."
    zh_simp: "宝可梦闻了这种薄荷之后，\n攻击会易于提高，\n而防御则难以提高。"
    zh_trad: "讓寶可夢聞這種薄荷的氣味，\n會令攻擊變得容易提高，\n但防禦則難以提高。"
looker_ticket:
  names:
    jp_kana: ハンサムチケット
    jp_kanji: ハンサムチケット
    en: Looker Ticket
    fr: Ticket Beladonis
    it: Carta Bellocchio
    de: LeBelle-Ticket
    es: Boleto Handsome
    ko: 핸섬티켓
    zh_simp: 帅哥券
    zh_trad: 帥哥券
  descriptions:
    jp_kana: "きらきら　かがやく\nとりょうが　ふきつけられた\nハンサム　てづくりの　チケット。"
    jp_kanji: "きらきら　かがやく\n塗料が　吹きつけられた\nハンサム　てづくりの　チケット。"
    en: "A ticket that was handmade by Looker. It’s\ndecorated with a liberal amount of glittery paint."
    fr: "Un ticket brillant de mille feux, peint à la main\npar Beladonis."
    it: "Un biglietto realizzato a mano da Bellocchio,\ndipinto con colori brillanti."
    de: "Ein von LeBelle persönlich gebasteltes Ticket.\nEs ist mit einer leuchtenden Farbschicht überzogen."
    es: "Boleto hecho a mano por Handsome, decorado con una\ngenerosa cantidad de purpurina."
    ko: "번쩍번쩍 빛나는\n스프레이가 뿌려진\n핸섬이 직접 만든 티켓."
    zh_simp: "喷有闪闪发光的涂料，\n帅哥亲手制作的券。"
    zh_trad: "噴有閃閃發光的塗料，\n帥哥親手製作的券。"
loot_sack:
  names:
    jp_kana: たからぶくろ
    jp_kanji: たからぶくろ
    en: Loot Sack
    fr: Sac Butin
    it: Bottinosacca
    de: Beutesack
    es: Saca Botín
    ko: 보물주머니
    zh_simp: 宝物袋
    zh_trad: 寶物袋
  descriptions:
    jp_kana: "たんこうで　てにいれた\nたからものを　しまっておける\nおおきくて　じょうぶな　ふくろ。"
    jp_kanji: "炭鉱で　てにいれた\n宝物を　しまっておける\nおおきくて　丈夫な　ふくろ。"
    en: "A sturdy, spacious bag that is used to carry any\ntreasures or loot obtained in the coal mine."
    fr: "Un grand sac robuste utilisé pour transporter\nle butin obtenu dans la mine de charbon."
    it: "Una sacca spaziosa e resistente usata per\ntrasportare il bottino ottenuto nella miniera."
    de: "Ein fester Sack. Wird verwendet, um Beute aus der\nKohlemine zu transportieren."
    es: "Una saca grande y resistente utilizada para transportar\nel botín reunido en la mina de carbón."
    ko: "탄갱에서 손에 넣은\n보물을 보관해 둘 수 있는\n크고 튼튼한 주머니다."
    zh_simp: "结实的大袋子。\n可以将在煤矿里\n获得的宝物放进去。"
    zh_trad: "結實的大袋子。\n可以將在礦坑裡\n獲得的寶物放進去。"
lopunnite:
  names:
    jp_kana: ミミロップナイト
    jp_kanji: ミミロップナイト
    en: Lopunnite
    fr: Lockpinite
    it: Lopunnite
    de: Schlapornit
    es: Lopunnita
    ko: 이어롭나이트
    zh_simp: 长耳兔进化石
    zh_trad: 長耳兔進化石
  descriptions:
    jp_kana: "ミミロップに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "ミミロップに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Lopunny hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Lockpin, elle lui permet de méga-évoluer\ndurant un combat."
    it: "Una delle misteriose Megapietre.\nData a Lopunny, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Schlapor getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Lopunny en combate."
    ko: "이어롭에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "长耳兔携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "長耳兔攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
lost_item:
  names:
    jp_kana: おとしもの
    jp_kanji: おとしもの
    en: Lost Item
    fr: Objet perdu
    it: Strumento perso
    de: Fundsache
    es: Objeto Perdido
    ko: 분실물
    zh_simp: 遗失物
    zh_trad: 遺失物
  descriptions:
    jp_kana: "モノマネむすめが　なくした\nマネネの　にんぎょう。"
    jp_kanji: "モノマネ娘が　なくした\nマネネの　人形。"
    en: The Mime Jr. doll that was lost by the Copycat.
    fr: La poupée Mime Jr. perdue par la Copieuse.
    it: Pupazzo raffigurante Mime Jr. smarrito da Copiona.
    de: "Eine Pantimimi-Puppe, welche die Nachahmerin\nverloren hat."
    es: El muñeco Mime Jr. que perdió la Copiona.
    ko: "흉내내기 아가씨가 잃어버린\n흉내내인형."
    zh_simp: "模仿少女丢失的\n魔尼尼人偶。"
    zh_trad: "模仿少女丟失的\n魔尼尼人偶。"
love_ball:
  names:
    jp_kana: ラブラブボール
    jp_kanji: ラブラブボール
    en: Love Ball
    fr: Love Ball
    it: Love Ball
    de: Sympaball
    es: Amor Ball
    ko: 러브러브볼
    zh_simp: 甜蜜球
    zh_trad: 甜蜜球
  descriptions:
    jp_kana: "じぶんの　ポケモンと　せいべつが\nちがうと　つかまえやすくなる\nちょっと　かわった　ボール。"
    jp_kanji: "自分の　ポケモンと　性別が\n違うと　捕まえやすくなる\nちょっと　変わった　ボール。"
    en: "A Poké Ball that works best when catching a\nPokémon that is of the opposite gender of\nyour Pokémon."
    fr: "Une Poké Ball un peu spéciale qui fonctionne\nmieux sur un Pokémon de sexe opposé."
    it: "Poké Ball speciale che funziona meglio con i\nPokémon di sesso opposto a quello del proprio\ne della stessa specie."
    de: "Ein Ball, der sich besonders gut eignet, um Pokémon\nzu fangen, die ein anderes Geschlecht haben als dein\nPokémon."
    es: "Poké Ball algo distinta que atrapa mejor Pokémon de la\nmisma especie que los que se posee, pero de sexo\ndiferente."
    ko: "자신의 포켓몬과 성별이\n다르면 잡기 쉬워지는\n조금 특이한 볼."
    zh_simp: "有点与众不同的球。\n能很容易地捕捉\n和自己宝可梦性别不同的宝可梦。"
    zh_trad: "有點與眾不同的球。\n能更容易地捉到\n與自己的寶可夢性別不同的寶可夢。"
love_sweet:
  names:
    jp_kana: ハートアメざいく
    jp_kanji: ハートアメざいく
    en: Love Sweet
    fr: Cœur en Sucre
    it: Bonboncuore
    de: Zucker-Herz
    es: Confite Corazón
    ko: 하트사탕공예
    zh_simp: 爱心糖饰
    zh_trad: 愛心糖飾
  descriptions:
    jp_kana: "ハートの　かたちを　した　アメざいく。\nマホミルに　もたせてあげると\nくるくる　まわって　よろこぶ。"
    jp_kanji: "ハートの　形を　した　アメ細工。\nマホミルに　持たせてあげると\nくるくる　回って　喜ぶ。"
    en: "A heart-shaped sweet. When a Milcery\nholds this, it spins around happily."
    fr: "Un bonbon en forme de cœur.\nQuand on le donne à un Crèmy, il danse de bonheur."
    it: "Bonbon a forma di cuore. Se dato a Milcery,\nil Pokémon farà le piroette per la felicità."
    de: "Zuckerwerk in Form eines Herzchens. Gibt man es\nHokumil zum Tragen, dreht es sich vor Freude im Kreis."
    es: "Figura de caramelo con forma de corazón. Al dárselo a\nMilcery, se pone a girar rebosante de alegría."
    ko: "하트 모양의 사탕공예.\n마빌크에게 지니게 하면\n빙빙 돌며 기뻐한다."
    zh_simp: "爱心形状的工艺糖果。\n让小仙奶携带的话，\n会高兴地转圈圈。"
    zh_trad: "愛心形狀的工藝糖果。\n讓小仙奶攜帶的話，\n牠會高興得轉圈圈。"
lucarionite:
  names:
    jp_kana: ルカリオナイト
    jp_kanji: ルカリオナイト
    en: Lucarionite
    fr: Lucarite
    it: Lucarite
    de: Lucarionit
    es: Lucarita
    ko: 루카리오나이트
    zh_simp: 路卡利欧进化石
    zh_trad: 路卡利歐進化石
  descriptions:
    jp_kana: "ルカリオに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "ルカリオに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Lucario hold it, and this stone will enable it to\nMega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Lucario, elle lui permet de\nméga-évoluer durant un combat."
    it: "Un esemplare delle misteriose Megapietre.\nData a Lucario, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Lucario getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Lucario en combate."
    ko: "루카리오에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让路卡利欧携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓路卡利歐攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
luck_incense:
  names:
    jp_kana: こううんのおこう
    jp_kanji: こううんのおこう
    en: Luck Incense
    fr: Encens Veine
    it: Fortunaroma
    de: Glücksrauch
    es: Incienso Duplo
    ko: 행운의향로
    zh_simp: 幸运薰香
    zh_trad: 幸運薰香
  descriptions:
    jp_kana: "もたせた　ポケモンが　いちどでも\nせんとうに　かおを　だすと\nおかねが　２ばい　もらえる。"
    jp_kanji: "持たせた　ポケモンが　１度でも\n戦闘に　顔を　だすと\nお金が　２倍　もらえる。"
    en: "An item to be held by a Pokémon. It doubles any\nprize money received if the holding Pokémon joins\na battle."
    fr: "Objet à tenir. Double l’argent gagné si le porteur\nse joint au combat."
    it: "Strumento da dare a un Pokémon.\nSe chi ce l’ha partecipa alla lotta, i guadagni\nraddoppiano."
    de: "Ein Item zum Tragen. Dieses exotische Duftkraut\nverdoppelt das Preisgeld, wenn der Träger am\nKampf teilnimmt."
    es: "Si el Pokémon que lo lleva lucha en un combate,\nduplica las ganancias."
    ko: "지니게 한 포켓몬이\n한 번이라도 배틀에 나가면\n돈을 2배로 받을 수 있다."
    zh_simp: "只要携带它的宝可梦\n在战斗时出场一次，\n就能获得２倍金钱。"
    zh_trad: "只要攜帶它的寶可夢\n在戰鬥時出場一次，\n就能獲得２倍金錢。"
lucky_egg:
  names:
    jp_kana: しあわせタマゴ
    jp_kanji: しあわせタマゴ
    en: Lucky Egg
    fr: Œuf Chance
    it: Fortunuovo
    de: Glücks-Ei
    es: Huevo Suerte
    ko: 행복의알
    zh_simp: 幸运蛋
    zh_trad: 幸運蛋
  descriptions:
    jp_kana: "しあわせが　つまった　タマゴ。\nもたせた　ポケモンは　もらえる\nけいけんちが　すこし　ふえる。"
    jp_kanji: "しあわせが　つまった　タマゴ。\n持たせた　ポケモンは　もらえる\n経験値が　少し　増える。"
    en: "An item to be held by a Pokémon. It’s an egg filled\nwith happiness that earns the holder extra Exp. Points\nin battle."
    fr: "Objet à tenir. Un œuf rempli de joie qui augmente\nle nombre de Points d’Expérience gagnés au combat."
    it: "Strumento da dare a un Pokémon.\nUovo pieno di felicità che aumenta i Punti\nEsperienza ottenuti nelle lotte."
    de: "Ein Item zum Tragen, das mit Glück gefüllt ist und für\nzusätzliche Erfahrungspunkte im Kampf sorgt."
    es: "Es un huevo lleno de felicidad que te hace ganar Puntos\nde Experiencia extra en combate. Debe llevarlo un\nPokémon."
    ko: "행복이 가득한 알.\n지니게 한 포켓몬은 받을 수 있는\n경험치가 조금 늘어난다."
    zh_simp: "满载着幸福的蛋。\n携带它的宝可梦获得的\n经验值会少量增加。"
    zh_trad: "滿載著幸福的蛋。\n攜帶它的寶可夢獲得的\n經驗值會少量增加。"
lucky_punch:
  names:
    jp_kana: ラッキーパンチ
    jp_kanji: ラッキーパンチ
    en: Lucky Punch
    fr: Poing Chance
    it: Fortunpugno
    de: Lucky Punch
    es: Puño Suerte
    ko: 럭키펀치
    zh_simp: 吉利拳
    zh_trad: 吉利拳
  descriptions:
    jp_kana: "こううんを　よぶ　グローブ。\nラッキーに　もたせると　わざが\nきゅうしょに　あたりやすくなる。"
    jp_kanji: "幸運を　よぶ　グローブ。\nラッキーに　持たせると　技が\n急所に　当たりやすくなる。"
    en: "An item to be held by Chansey. This pair of lucky\nboxing gloves will boost Chansey’s critical-hit ratio."
    fr: "Objet à faire tenir à Leveinard.\nUne paire de gants qui augmente son taux de critiques."
    it: "Strumento da dare a Chansey.\nGuanti che aumentano molto la probabilità\ndi sferrare brutti colpi."
    de: "Ein Item, das von Chaneira getragen werden kann.\nDiese Handschuhe erhöhen die Volltrefferquote des\nTrägers."
    es: "Un par de guantes que debe llevar Chansey. Potencian\nmucho su índice de golpe crítico."
    ko: "행운을 부르는 글러브다.\n럭키에게 지니게 하면 기술이\n급소에 맞기 쉬워진다."
    zh_simp: "能带来幸运的拳套。\n让吉利蛋携带后，\n招式会变得容易击中要害。"
    zh_trad: "能帶來幸運的拳套。\n讓吉利蛋攜帶後，招式會\n變得容易擊中要害。"
lum_berry:
  names:
    jp_kana: ラムのみ
    jp_kanji: ラムのみ
    en: Lum Berry
    fr: Baie Prine
    it: Baccaprugna
    de: Prunusbeere
    es: Baya Ziuela
    ko: 리샘열매
    zh_simp: 木子果
    zh_trad: 木子果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nすべての　じょうたい　いじょうを\nかいふくする。"
    jp_kanji: "ポケモンに　持たせると\nすべての　状態異常を\n回復する。"
    en: "A Berry to be consumed by Pokémon. If a Pokémon\nholds one, it can recover from any status condition\nduring battle."
    fr: "Une Baie qui soigne toutes les altérations de statut\nlorsqu’elle est tenue par un Pokémon."
    it: "Se un Pokémon ha questa bacca, guarisce\nda qualsiasi problema di stato."
    de: "Gibst du die Beere einem Pokémon zum Tragen,\nhebt sie alle seine Statusprobleme auf."
    es: "Los Pokémon pueden llevarla o usarla para recuperarse\nde problemas de estado."
    ko: "포켓몬에게 지니게 하면\n모든 상태 이상을\n회복한다."
    zh_simp: "让宝可梦携带后，\n可以治愈所有异常状态。"
    zh_trad: "讓寶可夢攜帶後，\n可以治癒所有異常狀態。"
luminous_moss:
  names:
    jp_kana: ひかりごけ
    jp_kanji: ひかりごけ
    en: Luminous Moss
    fr: Lichen Lumineux
    it: Muschioluce
    de: Leuchtmoos
    es: Musgo Brillante
    ko: 빛이끼
    zh_simp: 光苔
    zh_trad: 光苔
  descriptions:
    jp_kana: "つかいすての　ひかりごけ。\nもたせて　みずの　わざを　うけると\nとくぼうが　あがる。"
    jp_kanji: "使い捨ての　ひかりごけ。\n持たせて　みずの　技を　受けると\n特防が　あがる。"
    en: "An item to be held by a Pokémon. It boosts Sp. Def\nif the holder is hit with a Water-type attack. It can only\nbe used once."
    fr: "Objet à tenir. Du lichen à usage unique qui augmente\nla Défense Spéciale du porteur lorsqu’il encaisse\nune attaque de type Eau."
    it: "Muschio luminoso monouso. Se il Pokémon che ha\nquesto strumento subisce una mossa di tipo\nAcqua, la sua Difesa Speciale aumenta."
    de: "Wird der Träger von einer Wasser-Attacke getroffen,\nsteigt seine Spezial-Verteidigung und das Item\nverschwindet."
    es: "Objeto de un solo uso. Aumenta la Defensa Especial\ndel Pokémon que lo lleva si este recibe un ataque de\ntipo Agua."
    ko: "단 한 번 쓰면 없어지는 빛이끼.\n지니게 하고 물 기술로 공격받으면\n특수방어가 올라간다."
    zh_simp: "一次性使用的光苔。\n携带它的宝可梦如果受到水属性\n招式攻击，特防就会提高。"
    zh_trad: "只能使用一次的光苔。\n攜帶它的寶可夢如果受到水屬性\n招式攻擊，特防就會提高。"
lumiose_galette:
  names:
    jp_kana: ミアレガレット
    jp_kanji: ミアレガレット
    en: Lumiose Galette
    fr: Galette Illumis
    it: Pan di Lumi
    de: Illumina-Galette
    es: Crêpe Luminalia
    ko: 미르갈레트
    zh_simp: 密阿雷格雷派饼
    zh_trad: 密阿雷格雷派餅
  descriptions:
    jp_kana: "ミアレシティで　にんきの　おかし。\nポケモン　１ひきの　じょうたいの\nいじょうを　すべて　かいふくする。"
    jp_kanji: "ミアレシティで　人気の　お菓子。\nポケモン　１匹の　状態の\n異常を　すべて　回復する。"
    en: "A popular treat in Lumiose City. It can be used once\nto heal all the status conditions of a Pokémon."
    fr: "Une spécialité d’Illumis.\nSoigne toutes les altérations de statut d’un Pokémon."
    it: "Un famoso dolce di Luminopoli.\nPuò guarire un Pokémon da tutti i problemi\ndi stato."
    de: "Eine beliebte Süßigkeit in Illumina City, die alle\nStatusprobleme eines Pokémon behebt."
    es: "El dulce estrella de Ciudad Luminalia. Cura los\nproblemas de estado de un Pokémon."
    ko: "미르시티에서 인기 있는 과자.\n포켓몬 1마리의 상태 이상을\n모두 회복한다."
    zh_simp: "在密阿雷市很受欢迎的点心。\n能治愈１只宝可梦的\n所有异常状态。"
    zh_trad: "在密阿雷市很受歡迎的點心。\n能治癒１隻寶可夢的\n所有異常狀態。"
lunalium_z:bag:
  names:
    jp_kana: ルナアーラＺ
    jp_kanji: ルナアーラＺ
    en: Lunalium Z
    fr: Lunazélite
    it: Lunalium Z
    de: Lunalium Z
    es: Lunalastal Z
    ko: 루나아라Z
    zh_simp: 露奈雅拉Ｚ
    zh_trad: 露奈雅拉Ｚ
  descriptions:
    jp_kana: "ルナアーラの　シャドーレイを\nＺワザに　グレードアップする\nＺパワーの　けっしょうを　つくりだす。"
    jp_kanji: "ルナアーラの　シャドーレイを\nＺワザに　グレードアップする\nＺパワーの　結晶を　つくりだす。"
    en: "It converts Z-Power into crystals that upgrade\nLunala’s Moongeist Beam to an exclusive Z-Move."
    fr: "Permet de concentrer la Force Z en un cristal qui,\ntenu, autorise Lunala à transformer son Rayon Spectral\nen capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono a Lunala di trasformare la mossa\nRaggio d’Ombra in una mossa Z."
    de: "Kristallisierte Z-Kraft, die Lunalas Attacke Schattenstrahl\nzu einer Z-Attacke aufstuft. Wird bei Bedarf\nautomatisch vervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a\nLunala convertir su Rayo Umbrío en un\nmovimiento Z."
    ko: "루나아라의 섀도레이를\nZ기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将露奈雅拉的暗影之光\n升级成Ｚ招式的Ｚ力量结晶。"
    zh_trad: "可用來製造將\n露奈雅拉的暗影之光\n升級為Ｚ招式的Ｚ力量結晶。"
lunalium_z:held:
  names:
    jp_kana: ルナアーラＺ
    jp_kanji: ルナアーラＺ
    en: Lunalium Z
    fr: Lunazélite
    it: Lunalium Z
    de: Lunalium Z
    es: Lunalastal Z
    ko: 루나아라Z
    zh_simp: 露奈雅拉Ｚ
    zh_trad: 露奈雅拉Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　けっしょう。\nルナアーラの　シャドーレイを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nルナアーラの　シャドーレイを\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Lunala’s Moongeist Beam to a Z-Move."
    fr: "Une cristallisation de la Force Z, permettant\nde transformer le Rayon Spectral de Lunala\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare la mossa Raggio d’Ombra\ndi Lunala in una mossa Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft Lunalas\nAttacke Schattenstrahl zu einer Z-Attacke auf."
    es: "Cristal que confiere el Poder Z al movimiento Rayo\nUmbrío de Lunala."
    ko: "Z파워의 결정.\n루나아라의 섀도레이를\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将露奈雅拉的暗影之光\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n可將露奈雅拉的暗影之光\n升級為Ｚ招式。"
lunar_feather:
  names:
    jp_kana: みかづきのはね
    jp_kanji: みかづきのはね
    en: Lunar Feather
    fr: Plume Lune
    it: Piumalunare
    de: Lunarfeder
    es: Pluma Lunar
    ko: 초승달날개
    zh_simp: 新月之羽
    zh_trad: 新月之羽
  descriptions:
    jp_kana: "つきのような　かがやきを　はなつ\nはね。　あくむを　ふりはらう　ちからを\nひめていると　つたえられている。"
    jp_kanji: "つきのような　輝きを　はなつ\nはね。　悪夢を　ふりはらう　力を\n秘めていると　伝えられている。"
    en: "A feather that glows like the moon. It’s said to\npossess the power to dispel nightmares."
    fr: "Une plume qui brille comme la lune.\nOn dit qu’elle a le pouvoir de chasser les cauchemars."
    it: "Piuma che brilla come la luna. Pare che abbia\nil potere di allontanare gli incubi."
    de: "Diese Feder leuchtet wie der Mond. Kann angeblich\nAlpträume vertreiben."
    es: "Pluma que brilla como la luna. Se dice que tiene el\npoder de disipar pesadillas."
    ko: "달처럼 반짝임을 발산하는 날개.\n악몽을 뿌리치는 힘을\n간직하고 있다고 전해진다."
    zh_simp: "散发着月辉般光芒的羽毛。\n据说隐藏着可以驱散恶梦的力量。"
    zh_trad: "散發著月輝般光芒的羽毛。\n據說隱藏著可以驅除\n惡夢的力量。"
lure:
  names:
    jp_kana: むしよせコロン
    jp_kanji: むしよせコロン
    en: Lure
    fr: Parfum
    it: Profumo invito
    de: Lockparfüm
    es: Colonia
    ko: 벌레유인코롱
    zh_simp: 引虫香水
    zh_trad: 引蟲香水
  descriptions:
    jp_kana: "つかうと　すこしの　あいだ\nめずらしい　ポケモンが\nでて　きやすく　なる　こうすい。"
    jp_kanji: "使うと　少しの　あいだ\n珍しい　ポケモンが\n出て　きやすく　なる　香水。"
    en: "A glass bottle of perfume that makes rare Pokémon\nmore likely to appear."
    fr: "Une substance qui fait apparaître les Pokémon rares\nplus facilement pendant un court moment."
    it: Profumo che attira Pokémon rari per un po’ di tempo.
    de: "Ein Parfüm, das für kurze Zeit vermehrt seltene\nPokémon erscheinen lässt."
    es: "Colonia que atrae a los Pokémon raros durante un breve\nespacio de tiempo."
    ko: "사용하면 잠시 동안\n희귀한 포켓몬이\n나오기 쉬워지는 향수."
    zh_simp: "使用该香水后的一小段时间内，\n稀有宝可梦会更容易出现。"
    zh_trad: "使用後的一小段期間，\n讓稀有寶可夢變得\n容易出現的香水。"
lure_ball:
  names:
    jp_kana: ルアーボール
    jp_kanji: ルアーボール
    en: Lure Ball
    fr: Appât Ball
    it: Esca Ball
    de: Köderball
    es: Cebo Ball
    ko: 루어볼
    zh_simp: 诱饵球
    zh_trad: 誘餌球
  descriptions:
    jp_kana: "つりざおで　つりあげた　ポケモンだと\nつかまえやすくなる\nちょっと　かわった　ボール。"
    jp_kanji: "つりざおで　つりあげた　ポケモンだと\n捕まえやすくなる\nちょっと　変わった　ボール。"
    en: "A Poké Ball that is good for catching Pokémon that\nyou reel in with a rod while out fishing."
    fr: "Une Poké Ball un peu spéciale qui fonctionne\nparticulièrement bien sur les Pokémon ferrés\navec une canne à pêche."
    it: "Poké Ball un po’ diversa che funziona\nparticolarmente bene con i Pokémon pescati\ncon un Amo."
    de: "Ein Ball, der sich besonders gut eignet, um Pokémon\nzu fangen, die an deiner Angel hängen."
    es: "Poké Ball algo distinta, especialmente indicada para\ncapturar los Pokémon que se han pescado con una\ncaña."
    ko: "낚싯대로 낚아 올린 포켓몬이라면\n잡기 쉬워지는\n조금 특이한 볼."
    zh_simp: "有点与众不同的球。\n能很容易地捕捉\n用钓竿钓上来的宝可梦。"
    zh_trad: "有點與眾不同的球。\n能更容易地捉到\n用釣竿釣上來的寶可夢。"
lustrous_orb:
  names:
    jp_kana: しらたま
    jp_kanji: しらたま
    en: Lustrous Orb
    fr: Orbe Perlé
    it: Splendisfera
    de: Weiß-Orb
    es: Lustresfera
    ko: 백옥
    zh_simp: 白玉宝珠
    zh_trad: 白玉寶珠
  descriptions:
    jp_kana: "パルキアに　もたせると　ドラゴンと\nみずタイプの　わざの　いりょくが\nあがる　うつくしく　かがやく　たま。"
    jp_kanji: "パルキアに　持たせると　ドラゴンと\nみずタイプの　技の　威力が\nあがる　美しく　輝く　珠。"
    en: "A beautifully glowing orb to be held by Palkia.\nIt boosts the power of Dragon- and Water-type\nmoves when it is held."
    fr: "Un bel orbe luisant destiné à Palkia.\nAugmente la puissance des capacités de types\nDragon et Eau."
    it: "Sfera splendente da dare a Palkia.\nPotenzia le mosse di tipo Drago e Acqua."
    de: "Ein hell leuchtender Orb. Verstärkt Attacken vom Typ\nDrache und Wasser, wenn Palkia ihn trägt."
    es: "Una bonita esfera que potencia los movimientos de tipo\nDragón y Agua. Debe llevarla Palkia."
    ko: "펄기아에게 지니게 하면 드래곤과\n물타입 기술의 위력이 올라가는\n아름답게 빛나는 구슬."
    zh_simp: "让帕路奇亚携带的话，\n龙和水属性的招式威力就会提高。\n散发着美丽光辉的宝珠。"
    zh_trad: "讓帕路奇亞攜帶的話，\n龍和水屬性的招式威力就會提高。\n散發著美麗光輝的寶珠。"
luxury_ball:
  names:
    jp_kana: ゴージャスボール
    jp_kanji: ゴージャスボール
    en: Luxury Ball
    fr: Luxe Ball
    it: Chic Ball
    de: Luxusball
    es: Lujo Ball
    ko: 럭셔리볼
    zh_simp: 豪华球
    zh_trad: 豪華球
  descriptions:
    jp_kana: "つかまえた　やせいポケモンが\nとても　なかよく　なりやすくなる\nいごこちの　いい　ボール。"
    jp_kanji: "捕まえた　野生ポケモンが\nとても　なかよく　なりやすくなる\nいごこちの　いい　ボール。"
    en: "A particularly comfortable Poké Ball that makes a\nwild Pokémon quickly grow friendlier after\nbeing caught."
    fr: "Une Poké Ball pratique qui permet de gagner\nrapidement l’amitié d’un Pokémon sauvage attrapé."
    it: "Poké Ball graziosa che aumenta il livello di amicizia\ndei Pokémon selvatici catturati."
    de: "Ein behaglicher Ball, der Pokémon veranlasst, nach dem\nFang dem Trainer gegenüber schneller zutraulich zu\nwerden."
    es: "Acogedora Poké Ball que hace más amistosos a los\nPokémon salvajes capturados."
    ko: "잡은 야생 포켓몬이\n매우 친밀해지기 쉬운\n편안한 볼."
    zh_simp: "舒适宜居的球。\n捉到的野生宝可梦会\n变得非常容易和训练家亲密。"
    zh_trad: "住起來十分舒適的球。\n捉到的野生寶可夢會\n非常容易和訓練家變得友好。"
lycanium_z:bag:
  names:
    jp_kana: ルガルガンＺ
    jp_kanji: ルガルガンＺ
    en: Lycanium Z
    fr: Lougarozélite
    it: Lycanrochium Z
    de: Wolwerockium Z
    es: Lycanrostal Z
    ko: 루가루암Z
    zh_simp: 鬃岩狼人Ｚ
    zh_trad: 鬃岩狼人Ｚ
  descriptions:
    jp_kana: "ルガルガンの　ストーンエッジを\nＺワザに　グレードアップする\nＺパワーの　けっしょうを　つくりだす。"
    jp_kanji: "ルガルガンの　ストーンエッジを\nＺワザに　グレードアップする\nＺパワーの　結晶を　つくりだす。"
    en: "It converts Z-Power into crystals that upgrade\nLycanroc’s Stone Edge to an exclusive Z-Move."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise le Lougaroc qui le tient à transformer\nsa capacité Lame de Roc en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono a Lycanroc di trasformare la mossa\nPietrataglio in una mossa Z."
    de: "Kristallisierte Z-Kraft, die Wolwerocks Attacke\nSteinkante zu einer Z-Attacke aufstuft. Wird bei Bedarf\nautomatisch vervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a\nLycanroc convertir su Roca Afilada en un\nmovimiento Z."
    ko: "루가루암의 스톤에지를\nZ기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将鬃岩狼人的尖石攻击\n升级成Ｚ招式的Ｚ力量结晶。"
    zh_trad: "可用來製造將\n鬃岩狼人的尖石攻擊\n升級為Ｚ招式的Ｚ力量結晶。"
lycanium_z:held:
  names:
    jp_kana: ルガルガンＺ
    jp_kanji: ルガルガンＺ
    en: Lycanium Z
    fr: Lougarozélite
    it: Lycanrochium Z
    de: Wolwerockium Z
    es: Lycanrostal Z
    ko: 루가루암Z
    zh_simp: 鬃岩狼人Ｚ
    zh_trad: 鬃岩狼人Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　けっしょう。\nルガルガンの　ストーンエッジを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nルガルガンの　ストーンエッジを\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Lycanroc’s Stone Edge to a Z-Move."
    fr: "Une cristallisation de la Force Z, permettant\nde transformer la capacité Lame de Roc d’un Lougaroc\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare la mossa Pietrataglio\ndi Lycanroc in una mossa Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft Wolwerocks\nAttacke Steinkante zu einer Z-Attacke auf."
    es: "Cristal que confiere el Poder Z al movimiento Roca\nAfilada de Lycanroc."
    ko: "Z파워의 결정.\n루가루암의 스톤에지를\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将鬃岩狼人的尖石攻击\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n可將鬃岩狼人的尖石攻擊\n升級為Ｚ招式。"
mach_bike:
  names:
    jp_kana: マッハじてんしゃ
    jp_kanji: マッハじてんしゃ
    en: Mach Bike
    fr: Vélo de Course
    it: Bici da corsa
    de: Eilrad
    es: Bici de Carreras
    ko: 마하자전거
    zh_simp: 音速自行车
    zh_trad: 音速自行車
  descriptions:
    jp_kana: "２ばい　いじょうの\nはやさで　いどう　できる\nおりたたみの　じてんしゃ。"
    jp_kanji: "２倍　以上の\n速さで　移動できる\nおりたたみの　自転車。"
    en: "This folding bike more than doubles your\nmovement speed."
    fr: "Un vélo pliable qui roule jusqu’à deux fois plus vite\nqu’une bicyclette ordinaire."
    it: "Bici pieghevole che permette di spostarsi al doppio\ndella velocità normale."
    de: "Ein Klapprad, mit dem du dich doppelt so schnell\nfortbewegen kannst wie gewöhnlich."
    es: "Bicicleta plegable que va a más del doble de velocidad\nque otras."
    ko: "2배 이상의\n스피드로 이동할 수 있는\n접이식 자전거다."
    zh_simp: "能以２倍以上的速度移动的\n折叠式自行车。"
    zh_trad: "能以２倍以上速度移動的\n折疊式自行車。"
machine_part:
  names:
    jp_kana: きかいのぶひん
    jp_kanji: きかいのぶひん
    en: Machine Part
    fr: Partie Machine
    it: Pezzo macch.
    de: Spule
    es: Maquinaria
    ko: 기계부품
    zh_simp: 机械零件
    zh_trad: 機械零件
  descriptions:
    jp_kana: "はつでんしょから　ぬすまれた\nはつでんきの　たいせつな　ぶひん。"
    jp_kanji: "発電所から　ぬすまれた\n発電機の　たいせつな　部品。"
    en: "An important part of a machine that was stolen from the\nPower Plant."
    fr: Une pièce essentielle du générateur de la Centrale.
    it: "Pezzo rubato alla Centrale Elettrica, essenziale\nper il generatore."
    de: "Ein unentbehrliches Maschinenteil, das aus dem\nKraftwerk entwendet wurde."
    es: "Valiosa pieza robada de una máquina de la Central\nEnergía."
    ko: "발전소에서 도둑맞은\n발전기의 중요한 부품."
    zh_simp: "发电厂里被盗的，\n用于发电机的重要零件。"
    zh_trad: "被人從發電廠裡偷走的\n發電機的重要零件。"
macho_brace:
  names:
    jp_kana: きょうせいギプス
    jp_kanji: きょうせいギプス
    en: Macho Brace
    fr: Bracelet Macho
    it: Crescicappa
    de: Machoband
    es: Brazal Firme
    ko: 교정깁스
    zh_simp: 强制锻炼器
    zh_trad: 強制鍛鍊器
  descriptions:
    jp_kana: "かたくて　おもい　ギプス。\nもたせると　すばやさは　さがるが\nふつうより　つよく　そだちやすい。"
    jp_kanji: "硬くて　重い　ギプス。\n持たせると　素早さは　さがるが\nふつうより　強く　育ちやすい。"
    en: "An item to be held by a Pokémon. This stiff, heavy\nbrace helps Pokémon grow strong but cuts Speed\nin battle."
    fr: "Objet à tenir. Un bracelet dur et lourd qui rend\nle porteur plus fort, mais baisse sa Vitesse."
    it: "Strumento da dare a un Pokémon.\nAttrezzo pesante che riduce la Velocità ma aiuta\nla crescita delle statistiche."
    de: "Ein Item, das ein Pokémon tragen kann.\nDer Initiative-Wert sinkt zwar, aber es wird\ndafür umso stärker."
    es: "Sólido y pesado brazal que potencia aún más las\ncaracterísticas del Pokémon que lo lleva al subir de\nnivel, pero que reduce la Velocidad en combate."
    ko: "단단하고 무거운 깁스.\n지니게 하면 스피드는 떨어지지만\n여느 때보다 강하게 키우기 쉽다."
    zh_simp: "又硬又重的锻炼器。\n虽然携带后速度会降低，\n但会比平时更容易茁壮成长。"
    zh_trad: "又硬又重的鍛鍊器。\n雖然攜帶後速度會降低，\n但會比平時更容易茁壯成長。"
machop_candy:
  names:
    jp_kana: ワンリキーのアメ
    jp_kanji: ワンリキーのアメ
    en: Machop Candy
    fr: Bonbon Machoc
    it: Caramella Machop
    de: Machollo-Bonbon
    es: Caramelo Machop
    ko: 알통몬의사탕
    zh_simp: 腕力的糖果
    zh_trad: 腕力的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
magikarp_candy:
  names:
    jp_kana: コイキングのアメ
    jp_kanji: コイキングのアメ
    en: Magikarp Candy
    fr: Bonbon Magicarpe
    it: Caramella Magikarp
    de: Karpador-Bonbon
    es: Caramelo Magikarp
    ko: 잉어킹의사탕
    zh_simp: 鲤鱼王的糖果
    zh_trad: 鯉魚王的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
magma_stone:
  names:
    jp_kana: かざんのおきいし
    jp_kanji: かざんのおきいし
    en: Magma Stone
    fr: Pierre Magma
    it: Magmapietra
    de: Magmastein
    es: Piedra Magma
    ko: 화산의돌
    zh_simp: 火山镇石
    zh_trad: 火山鎮石
  descriptions:
    jp_kana: "しゃくねつの　マグマの　ねつでとけた\nがんせきが　かたまって　できたもの。\nなかに　マグマが　のこっている。"
    jp_kanji: "しゃくねつの　マグマの　熱でとけた\n岩石が　固まって　できたもの。\n中に　マグマが　残っている。"
    en: "A stone formed by boulders melting in intensely hot\nmagma, then hardening. Magma remains sealed\ninside it."
    fr: "Une pierre formée à partir de roche en fusion solidifiée.\nElle contient du magma."
    it: "Pietra che si è formata a seguito di un’intensa\ncolata lavica. Il magma è rimasto intrappolato\nal suo interno."
    de: "Ein Stein aus gehärtetem Magma. Sein Kern ist noch\nflüssig und heiß."
    es: "Formada a partir de magma enfriado y endurecido. Aún\nhay magma líquido en su interior."
    ko: "이글거리는 마그마의 열로 녹은\n암석이 굳어져 생긴 것.\n안에는 마그마가 남아 있다."
    zh_simp: "被灼热熔岩熔化的岩石\n凝固后形成的产物。\n里面还留有熔岩。"
    zh_trad: "被灼熱熔岩熔化的岩石\n凝固後形成的產物。\n裡面還留有熔岩。"
magma_suit:
  names:
    jp_kana: マグマスーツ
    jp_kanji: マグマスーツ
    en: Magma Suit
    fr: Scaph. Magma
    it: Tuta Magma
    de: Magma-Anzug
    es: Traje Magma
    ko: 마그마슈트
    zh_simp: 熔岩装
    zh_trad: 熔岩裝
  descriptions:
    jp_kana: "マグマだんの　かがくぎじゅつを\nけっしゅうして　つくられた　スーツ。\nどんな　しょうげき　にも　たえられる。"
    jp_kanji: "マグマ団の　科学技術を\n結集して　つくられた　スーツ。\nどんな　衝撃にも　耐えられる。"
    en: "A suit made with the collective technological\nknow-how of Team Magma. It can withstand\nany impact."
    fr: "Une combinaison créée à partir des méthodes\nscientifiques de la Team Magma.\nElle résiste à tous les chocs."
    it: "Tuta altamente tecnologica costruita dal\nTeam Magma, in grado di resistere a qualunque\nshock."
    de: "Ein Anzug, der unter Einsatz des gesamten technischen\nWissens von Team Magma entstand. Hält jeder Art von\nErschütterung stand."
    es: "Este traje es el resultado de las arduas investigaciones\ncientíficas del Equipo Magma. Es capaz de soportar\ncualquier impacto."
    ko: "마그마단이 과학기술을\n결집하여 만든 슈트다.\n어떠한 충격에도 견딜 수 있다."
    zh_simp: "集熔岩队科学技术于一身的服装。\n能承受任何冲击。"
    zh_trad: "集結了熔岩隊的\n科學技術製造的服裝。\n能承受任何衝擊。"
magmar_candy:
  names:
    jp_kana: ブーバーのアメ
    jp_kanji: ブーバーのアメ
    en: Magmar Candy
    fr: Bonbon Magmar
    it: Caramella Magmar
    de: Magmar-Bonbon
    es: Caramelo Magmar
    ko: 마그마의사탕
    zh_simp: 鸭嘴火兽的糖果
    zh_trad: 鴨嘴火獸的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de cierto Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
magmarizer:
  names:
    jp_kana: マグマブースター
    jp_kanji: マグマブースター
    en: Magmarizer
    fr: Magmariseur
    it: Magmatore
    de: Magmaisierer
    es: Magmatizador
    ko: 마그마부스터
    zh_simp: 熔岩增幅器
    zh_trad: 熔岩增幅器
  descriptions:
    jp_kana: "とてつもない　マグマの　エネルギーが\nたくわえられている　はこ。\nある　ポケモンが　このんでいる。"
    jp_kanji: "とてつもない　マグマの　エネルギーが\n蓄えられている　箱。\nある　ポケモンが　好んでいる。"
    en: "A box packed with a tremendous amount of magma\nenergy. It’s loved by a certain Pokémon."
    fr: "Une boîte remplie d’une énorme quantité d’énergie\nmagmatique. Appréciée d’un certain Pokémon."
    it: "Scatola strapiena di energia lavica.\nPiace a un Pokémon in particolare."
    de: "Eine Schachtel mit Magma-Energie.\nDas Lieblingsstück eines bestimmten Pokémon."
    es: "Esta caja contiene una enorme cantidad de energía\nmagmática. Cierto Pokémon la adora."
    ko: "엄청난 마그마의 에너지가\n비축되어 있는 상자.\n어떤 포켓몬이 좋아하는 물건이다."
    zh_simp: "积蓄着庞大熔岩能量的箱子。\n某种宝可梦很喜欢它。"
    zh_trad: "蓄積著龐大\n熔岩能量的箱子。\n某種寶可夢很喜歡它。"
magnemite_candy:
  names:
    jp_kana: コイルのアメ
    jp_kanji: コイルのアメ
    en: Magnemite Candy
    fr: Bonbon Magnéti
    it: Caramella Magnemite
    de: Magnetilo-Bonbon
    es: Caramelo Magnemite
    ko: 코일의사탕
    zh_simp: 小磁怪的糖果
    zh_trad: 小磁怪的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
magnet:
  names:
    jp_kana: じしゃく
    jp_kanji: じしゃく
    en: Magnet
    fr: Aimant
    it: Calamita
    de: Magnet
    es: Imán
    ko: 자석
    zh_simp: 磁铁
    zh_trad: 磁鐵
  descriptions:
    jp_kana: "きょうりょくな　じしゃく。\nもたせると　でんきタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "強力な　磁石。\n持たせると　でんきタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon. It’s a powerful\nmagnet that boosts the power of\nElectric-type moves."
    fr: "Objet à tenir. Un aimant puissant qui augmente\nla puissance des capacités de type Électrik."
    it: "Strumento da dare a un Pokémon.\nPotente magnete che potenzia le mosse di tipo\nElettro."
    de: "Ein Item zum Tragen, dessen magnetische Kraft\nAttacken vom Typ Elektro verstärkt."
    es: "Debe llevarlo un Pokémon. Su potente magnetismo\nfortalece los movimientos de tipo Eléctrico."
    ko: "강력한 자석.\n지니게 하면 전기타입\n기술의 위력이 올라간다."
    zh_simp: "强力的磁铁。\n携带后，电属性的\n招式威力就会提高。"
    zh_trad: "強力的磁鐵。\n攜帶後，電屬性的\n招式威力就會提高。"
mago_berry:
  names:
    jp_kana: マゴのみ
    jp_kanji: マゴのみ
    en: Mago Berry
    fr: Baie Mago
    it: Baccamango
    de: Magobeere
    es: Baya Ango
    ko: 마고열매
    zh_simp: 芒芒果
    zh_trad: 芒芒果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nピンチのとき　ＨＰを　かいふくする。\nきらいな　あじだと　こんらん　する。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　ＨＰを　回復する。\nきらいな味だと　混乱する。"
    en: "If held by a Pokémon, it restores the user’s HP in a\npinch, but it will cause confusion if the user hates\nthe taste."
    fr: "Tenue, cette Baie restaure des PV en cas de besoin,\nmais rend le Pokémon confus si son goût lui déplaît."
    it: "Se un Pokémon in difficoltà ha questa bacca,\nrecupera dei PS. Se al Pokémon non piace\nil suo sapore, può causare confusione."
    de: "Als getragenes Item füllt die Beere im Notfall die KP\neines Pokémon auf, doch ihr Aroma verwirrt jene,\ndie es nicht mögen."
    es: "Los Pokémon pueden llevarla o usarla para restaurar\nalgunos PS. Su sabor puede causar confusión si no les\ngusta."
    ko: "포켓몬에게 지니게 하면\n위급할 때 HP를 회복한다.\n싫어하는 맛이면 혼란에 빠진다."
    zh_simp: "让宝可梦携带后，\n危机时可以回复ＨＰ。\n如果讨厌这味道就会混乱。"
    zh_trad: "讓寶可夢攜帶後，\n危機時可以回復ＨＰ。\n如果討厭這味道就會混亂。"
magost_berry:
  names:
    jp_kana: ゴスのみ
    jp_kanji: ゴスのみ
    en: Magost Berry
    fr: Baie Mangou
    it: Baccagostan
    de: Magostbeere
    es: Baya Aostan
    ko: 고스티열매
    zh_simp: 岳竹果
    zh_trad: 岳竹果
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。\nふかふかのつちに　うめると\nゴスが　そだつ。"
    jp_kanji: "ポフィンの　材料。\nふかふかの土に　埋めると\nゴスが　育つ。"
    en: "A Poffin ingredient. Bury it in soft soil to grow a\nMagost Berry plant."
    fr: "Un ingrédient entrant dans la confection de Poffins.\nPlantez cette Baie dans un sol meuble et fertile\npour faire pousser un arbre à Baies Mangou."
    it: "Si usa per fare i poffin. Seminala nella terra soffice\nper far crescere una pianta di Baccagostan."
    de: "Eine Knursp-Zutat. Pflanze sie in weichen Lehmboden\nein, damit neue Magostbeeren wachsen."
    es: "Ingrediente para pokochos. Si se planta en tierra suelta,\nsaldrá una planta de Aostan."
    ko: "포핀의 재료.\n푹신푹신한 땅에 심으면\n고스티가 자란다."
    zh_simp: "宝芬的材料。\n埋在松软的土地里\n可以培育出岳竹。"
    zh_trad: "製作寶芬的材料。\n埋進鬆軟的泥土裡，\n長成後會結出岳竹。"
makeup_bag:
  names:
    jp_kana: コスメポーチ
    jp_kanji: コスメポーチ
    en: Makeup Bag
    fr: Trousse Beauté
    it: Trousse
    de: Kosmetiketui
    es: Kit Maquillaje
    ko: 코스메틱파우치
    zh_simp: 化妆包
    zh_trad: 化妝包
  descriptions:
    jp_kana: "リップを　しまっておける\nおしゃれな　こものいれ。"
    jp_kanji: "リップを　しまっておける\nおしゃれな　小物入れ。"
    en: A rather chic-looking case for carrying lipsticks.
    fr: Un étui très chic destiné aux rouges à lèvres.
    it: "Un elegante astuccio per avere sempre a portata\ndi mano il rossetto."
    de: Ein stilvolles Etui zur Aufbewahrung von Lippenstiften.
    es: "Neceser de aspecto sofisticado para guardar tus barras\nde labios."
    ko: "립을 담아 둘 수 있는\n멋진 케이스."
    zh_simp: 可以存放唇膏的精美小包包。
    zh_trad: 可以存放唇膏的精美小包包。
manectite:
  names:
    jp_kana: ライボルトナイト
    jp_kanji: ライボルトナイト
    en: Manectite
    fr: Élecsprintite
    it: Manectricite
    de: Voltensonit
    es: Manectricita
    ko: 썬더볼트나이트
    zh_simp: 雷电兽进化石
    zh_trad: 雷電獸進化石
  descriptions:
    jp_kana: "ライボルトに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "ライボルトに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Manectric hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Élecsprint, elle lui permet de\nméga-évoluer durant un combat."
    it: "Un esemplare delle misteriose Megapietre.\nData a Manectric, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Voltenso getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Manectric en combate."
    ko: "썬더볼트에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让雷电兽携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓雷電獸攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
mankey_candy:
  names:
    jp_kana: マンキーのアメ
    jp_kanji: マンキーのアメ
    en: Mankey Candy
    fr: Bonbon Férosinge
    it: Caramella Mankey
    de: Menki-Bonbon
    es: Caramelo Mankey
    ko: 망키의사탕
    zh_simp: 猴怪的糖果
    zh_trad: 猴怪的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
maranga_berry:
  names:
    jp_kana: タラプのみ
    jp_kanji: タラプのみ
    en: Maranga Berry
    fr: Baie Rangma
    it: Baccapane
    de: Tarabeere
    es: Baya Maranga
    ko: 타라프열매
    zh_simp: 香罗果
    zh_trad: 香羅果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nとくしゅわざを　うけたとき\nじぶんの　とくぼうが　あがる。"
    jp_kanji: "ポケモンに　持たせると\n特殊技を　受けたとき\n自分の　特防が　あがる。"
    en: "If held by a Pokémon, this Berry will increase the\nholder’s Sp. Def if it’s hit with a special move."
    fr: "Tenue, cette Baie augmente la Défense Spéciale\ndu Pokémon lorsqu’il est touché par une capacité\nspéciale."
    it: "Se un Pokémon ha questa bacca, aumenta\nla propria Difesa Speciale quando subisce\nuna mossa speciale."
    de: "Als getragenes Item erhöht diese Beere die\nSpezial-Verteidigung des Trägers, wenn dieser von\nSpezial-Attacken getroffen wird."
    es: "Si la lleva un Pokémon, aumenta su Defensa Especial\ntras recibir un ataque especial."
    ko: "포켓몬에게 지니게 하면\n특수 기술로 공격받았을 때\n자신의 특수방어가 올라간다."
    zh_simp: "让宝可梦携带后，\n在受到特殊招式攻击时，\n自己的特防就会提高。"
    zh_trad: "讓寶可夢攜帶後，\n在受到特殊招式攻擊時，\n自己的特防就會提高。"
marble:
  names:
    jp_kana: ビーだま
    jp_kanji: ビーだま
    en: Marble
    fr: Bille
    it: Biglia
    de: Glasmurmel
    es: Canica
    ko: 유리구슬
    zh_simp: 弹珠
    zh_trad: 彈珠
  descriptions:
    jp_kana: "まんまるの　ガラスだま。\nとうめいな　たまの　なかに\nいろガラスの　もようが　みえる。"
    jp_kanji: "まんまるの　ガラス玉。\n透明な　玉の　中に\n色ガラスの　模様が　見える。"
    en: "A round glass marble. You can see colored glass\ninside the transparent marble."
    fr: "Une bille de verre transparente avec un motif coloré\nà l’intérieur."
    it: "Una biglia di vetro perfettamente rotonda. Al suo\ninterno si vede in trasparenza del vetro colorato."
    de: "Eine runde, durchsichtige Kugel aus Glas. In ihrer Mitte\nbefinden sich Muster in verschiedensten Farben."
    es: "Esfera de cristal transparente en cuyo interior se\npueden apreciar diferentes colores."
    ko: "동글동글한 유리구슬.\n투명한 구슬 안에\n색유리의 무늬가 비친다."
    zh_simp: "非常圆润的玻璃球。\n能在透明的球体中\n看见彩色玻璃的花纹。"
    zh_trad: "圓滾滾的玻璃彈珠。\n在透明的彈珠中\n能看見彩色玻璃的花紋。"
mark_charm:
  names:
    jp_kana: あかしのおまもり
    jp_kanji: あかしのおまもり
    en: Mark Charm
    fr: Charme Insigne
    it: Emblemamuleto
    de: Zeichenpin
    es: Amuleto Emblema
    ko: 증표의부적
    zh_simp: 证章护符
    zh_trad: 證章護符
  descriptions:
    jp_kana: "もっていると　あかしが　ついた\nポケモンと　であいやすくなる\nふしぎで　こせいてきな　おまもり。"
    jp_kanji: "持っていると　あかしが　ついた\nポケモンと　出会いやすくなる\n不思議で　個性的な　おまもり。"
    en: "A mysterious and unique charm that increases the\nchance of finding a Pokémon with a mark."
    fr: "Un charme mystérieux qui permet de rencontrer\nplus facilement des Pokémon avec des insignes."
    it: "Misterioso e singolare amuleto che rende più facile\nincontrare Pokémon con un emblema."
    de: "Ein mysteriöser, individueller Glücksbringer, der die\nWahrscheinlichkeit erhöht, Pokémon zu finden,\ndie über ein Zeichen verfügen."
    es: "Misterioso y particular amuleto que aumenta las\nposibilidades de encontrar Pokémon con emblemas."
    ko: "지니고 있으면 증표가 붙은 포켓몬과\n만나기 쉬워지는 이상하고 개성적인 부적."
    zh_simp: "神奇而富有个性的护符。\n拥有该护符后，\n会更容易遇到带有证章的宝可梦。"
    zh_trad: "又神奇又個性十足的護符。\n只要擁有它，就會變得\n容易遇見有證章的寶可夢。"
marshadium_z:bag:
  names:
    jp_kana: マーシャドーＺ
    jp_kanji: マーシャドーＺ
    en: Marshadium Z
    fr: Marshadozélite
    it: Marshadium Z
    de: Marshadownium Z
    es: Marshastal Z
    ko: 마샤도Z
    zh_simp: 玛夏多Ｚ
    zh_trad: 瑪夏多Ｚ
  descriptions:
    jp_kana: "マーシャドーの　シャドースチールを\nとくべつな　Ｚワザに　グレードアップする\nＺパワーの　けっしょうを　つくりだす。"
    jp_kanji: "マーシャドーの　シャドースチールを\n特別な　Ｚワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nMarshadow’s Spectral Thief to an\nexclusive Z-Move."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise le Marshadow qui le tient à transformer\nson Clepto-Mânes en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono a Marshadow di trasformare la mossa\nOmbrafurto in una mossa Z."
    de: "Kristallisierte Z-Kraft, die Marshadows Attacke\nDiebesschatten zu einer Z-Attacke aufstuft.\nWird bei Bedarf automatisch vervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a\nMarshadow convertir su Robasombra en un\nmovimiento Z."
    ko: "마샤도의 섀도스틸을\n특별한 Z기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将玛夏多的暗影偷盗\n升级成特殊Ｚ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把瑪夏多的暗影偷盜\n升級為特殊Ｚ招式的Ｚ力量結晶。"
marshadium_z:held:
  names:
    jp_kana: マーシャドーＺ
    jp_kanji: マーシャドーＺ
    en: Marshadium Z
    fr: Marshadozélite
    it: Marshadium Z
    de: Marshadownium Z
    es: Marshastal Z
    ko: 마샤도Z
    zh_simp: 玛夏多Ｚ
    zh_trad: 瑪夏多Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　けっしょう。\nマーシャドーの　シャドースチールを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nマーシャドーの　シャドースチールを\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Marshadow’s Spectral Thief to\na Z-Move."
    fr: "Une cristallisation de la Force Z, permettant\nde transformer le Clepto-Mânes de Marshadow\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare la mossa Ombrafurto\ndi Marshadow in una mossa Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft\nMarshadows Attacke Diebesschatten zu einer\nZ-Attacke auf."
    es: "Cristal que confiere el Poder Z al movimiento\nRobasombra de Marshadow."
    ko: "Z파워의 결정.\n마샤도의 섀도스틸을\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将玛夏多的暗影偷盗\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把瑪夏多的暗影偷盜\n升級為Ｚ招式。"
master_ball:
  names:
    jp_kana: マスターボール
    jp_kanji: マスターボール
    en: Master Ball
    fr: Master Ball
    it: Master Ball
    de: Meisterball
    es: Master Ball
    ko: 마스터볼
    zh_simp: 大师球
    zh_trad: 大師球
  descriptions:
    jp_kana: "やせいの　ポケモンを　かならず\nつかまえることが　できる\nさいこう　せいのうの　ボール。"
    jp_kanji: "野生の　ポケモンを　必ず\n捕まえることが　できる\n最高　性能の　ボール。"
    en: "The best Poké Ball with the ultimate level of\nperformance. With it, you will catch any wild\nPokémon without fail."
    fr: "Assurément la Poké Ball la plus performante.\nElle permet de capturer à coup sûr un Pokémon\nsauvage."
    it: "La Poké Ball dalle prestazioni migliori: cattura\nqualsiasi Pokémon selvatico senza mai fallire."
    de: "Der beste Ball! Damit fängst du garantiert jedes\nwilde Pokémon."
    es: "La Poké Ball definitiva. Atrapa cualquier Pokémon\nsalvaje y no falla nunca."
    ko: "야생 포켓몬을 반드시\n잡을 수 있는\n최고 성능의 볼."
    zh_simp: "必定能捉到野生宝可梦的，\n性能最好的球。"
    zh_trad: "性能最好的球。\n必定能捉到野生寶可夢。"
mawilite:
  names:
    jp_kana: クチートナイト
    jp_kanji: クチートナイト
    en: Mawilite
    fr: Mysdibulite
    it: Mawilite
    de: Flunkifernit
    es: Mawilita
    ko: 입치트나이트
    zh_simp: 大嘴娃进化石
    zh_trad: 大嘴娃進化石
  descriptions:
    jp_kana: "クチートに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "クチートに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Mawile hold it, and this stone will enable it to\nMega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Mysdibule, elle lui permet de\nméga-évoluer durant un combat."
    it: "Un esemplare delle misteriose Megapietre.\nData a Mawile, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Flunkifer getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Mawile en combate."
    ko: "입치트에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让大嘴娃携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓大嘴娃攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
max_elixir:
  names:
    jp_kana: ピーピーマックス
    jp_kanji: ピーピーマックス
    en: Max Elixir
    fr: Élixir Max
    it: Elisir Max
    de: Top-Elixier
    es: Elixir Máximo
    ko: PP맥스
    zh_simp: ＰＰ多项全补剂
    zh_trad: ＰＰ多項全補劑
  descriptions:
    jp_kana: "ポケモンが　おぼえている\n４つの　わざの　ＰＰを\nすべて　かいふくする。"
    jp_kanji: "ポケモンが　覚えている\n４つの　技の　ＰＰを\nすべて　回復する。"
    en: "This medicine can be used to fully restore the PP of all\nof the moves that have been learned by a Pokémon."
    fr: "Restaure tous les PP de toutes les capacités\nd’un Pokémon."
    it: "Restituisce tutti i PP a ogni mossa conosciuta\ndal Pokémon."
    de: "Füllt die AP aller Attacken eines Pokémon\nvollständig auf."
    es: "Restaura completamente los PP de todos los\nmovimientos aprendidos por el Pokémon elegido."
    ko: "포켓몬이 기억하고 있는\n4개 기술의 PP를\n모두 회복한다."
    zh_simp: "能让宝可梦学会的\n４个招式\n回复所有ＰＰ。"
    zh_trad: "能讓寶可夢已學會的\n４個招式\n回復所有ＰＰ。"
max_ether:
  names:
    jp_kana: ピーピーリカバー
    jp_kanji: ピーピーリカバー
    en: Max Ether
    fr: Huile Max
    it: Etere Max
    de: Top-Äther
    es: Éter Máximo
    ko: PP회복
    zh_simp: ＰＰ单项全补剂
    zh_trad: ＰＰ單項全補劑
  descriptions:
    jp_kana: "ポケモンが　おぼえている\nわざのうち　１つの　ＰＰを\nすべて　かいふくする。"
    jp_kanji: "ポケモンが　覚えている\n技のうち　１つの　ＰＰを\nすべて　回復する。"
    en: "This medicine can be used to fully restore the PP of\na single selected move that has been learned by\na Pokémon."
    fr: Restaure tous les PP d’une capacité sélectionnée.
    it: "Restituisce tutti i PP a una mossa a scelta\ntra quelle conosciute dal Pokémon."
    de: "Füllt die AP einer ausgewählten Attacke eines Pokémon\nvollständig auf."
    es: "Restaura completamente los PP del movimiento elegido\nde un Pokémon."
    ko: "포켓몬이 기억하고 있는\n기술 중 1개의 PP를\n모두 회복한다."
    zh_simp: "能让宝可梦学会的\n其中１个招式\n回复所有ＰＰ。"
    zh_trad: "能讓寶可夢已學會的\n其中１個招式\n回復所有ＰＰ。"
max_honey:
  names:
    jp_kana: ダイミツ
    jp_kanji: ダイミツ
    en: Max Honey
    fr: Maxi Miel
    it: Mielemax
    de: Dyna-Honig
    es: Maxipanal
    ko: 다이꿀
    zh_simp: 极巨甜蜜
    zh_trad: 極巨甜蜜
  descriptions:
    jp_kana: "ダイマックスした　ビークインが　つくる　ミツ。\nダイスープに　いれると　まろやかになる。\nげんきのかたまりと　おなじ　こうかも　ある。"
    jp_kanji: "ダイマックスした　ビークインが　作る　ミツ。\nダイスープに　入れると　まろやかになる。\nげんきのかたまりと　同じ　効果も　ある。"
    en: "Honey that Dynamax Vespiquen produces. Adding this\nhoney to Max Soup makes the taste very smooth. It also\nhas the same effect as a Max Revive."
    fr: "Un miel crémeux produit par un Apireine Dynamax\nqui permet d’adoucir le goût de la Maxi Soupe.\nIl a également le même effet qu’un Rappel Max."
    it: "Miele prodotto dai Vespiquen dynamaxizzati.\nSe aggiunto alla Zuppamax la rende molto saporita.\nHa anche gli stessi effetti di un Revitalizzante Max."
    de: "Honig, der von dynamaximierten Honweisel hergestellt\nwird und den Geschmack einer Dyna-Suppe abrundet.\nVerfügt über denselben Effekt wie Top-Beleber."
    es: "Panal construido por Vespiquen Dinamax cuya densa\nmiel suaviza el sabor de la Maxisopa. También tiene\nel mismo efecto que un Revivir Máximo."
    ko: "다이맥스한 비퀸이 만드는 꿀.\n다이수프에 넣으면 부드러워진다.\n기력의덩어리와 같은 효과도 있다."
    zh_simp: "极巨化的蜂女王制造出的蜜汁。\n放进极巨汤里，就能让汤的味道变得很温和。\n与活力块具有相同的效果。"
    zh_trad: "由極巨化的蜂女王製造的蜜汁。\n放進極巨湯裡，湯就會變得又甜又醇。\n也有與活力塊相同的效果。"
max_lure:
  names:
    jp_kana: ゴールドコロン
    jp_kanji: ゴールドコロン
    en: Max Lure
    fr: Parfum Max
    it: Profumo Max
    de: Top-Lockparfüm
    es: Colonia Máxima
    ko: 골드코롱
    zh_simp: 黄金香水
    zh_trad: 黃金香水
  descriptions:
    jp_kana: "つかうと　めずらしい　ポケモンが\nでて　きやすく　なる　こうすい。\nシルバーコロンより　ながく　もつ。"
    jp_kanji: "使うと　珍しい　ポケモンが\n出て　きやすく　なる　香水。\nシルバーコロンより　長く　もつ。"
    en: "A glass bottle of perfume that makes rare Pokémon\nmore likely to appear. It lasts longer than a Super Lure."
    fr: "Une substance qui fait apparaître les Pokémon rares\nplus facilement pendant une durée plus longue que\nle Super Parfum."
    it: "Profumo che attira Pokémon rari.\nIl suo effetto dura più a lungo di quello\ndel Superprofumo."
    de: "Ein Parfüm, das für kurze Zeit vermehrt seltene\nPokémon erscheinen lässt. Wirkt länger als das Item\nSuper-Lockparfüm."
    es: "Colonia que atrae a los Pokémon raros y cuyo efecto\nes algo más duradero que el de la Supercolonia."
    ko: "사용하면 희귀한 포켓몬이\n나오기 쉬워지는 향수.\n실버코롱보다 효과가 오래간다."
    zh_simp: "使用该香水后，\n稀有宝可梦会更容易出现。\n效果比白银香水更持久。"
    zh_trad: "使用後，讓稀有寶可夢\n變得容易出現的香水。\n效果比白銀香水更持久。"
max_mushrooms:
  names:
    jp_kana: ダイキノコ
    jp_kanji: ダイキノコ
    en: Max Mushrooms
    fr: Maxi Champi
    it: Fungomax
    de: Dyna-Pilz
    es: Maxiseta
    ko: 다이버섯
    zh_simp: 极巨菇菇
    zh_trad: 極巨菇菇
  descriptions:
    jp_kana: "ダイマックスの　すがたを　かえる\nちからを　もった　キノコ。　せんとうちゅう\nポケモンの　すべての　のうりょくを　あげる。"
    jp_kanji: "ダイマックスの　姿を　変える\n力を　持った　キノコ。　戦闘中\nポケモンの　すべての　能力を　あげる。"
    en: "Mushrooms that have the power of changing Dynamax\nforms. They boost all stats of a Pokémon during battle."
    fr: "Un champignon pouvant modifier l’apparence\ndes Pokémon Dynamax. Utilisé en combat,\nil augmente toutes les stats d’un Pokémon."
    it: "Un fungo con il potere di modificare la forma dei\nPokémon Dynamax. Se usato durante la lotta,\naumenta tutte le statistiche."
    de: "Ein Pilz, der über die Eigenschaft verfügt, die Gestalt\nvon Dynamax-Pokémon zu ändern. Im Kampf hebt er\nalle Statuswerte eines Pokémon an."
    es: "Una seta capaz de cambiar el aspecto de los Pokémon\nal dinamaxizarse. Aumenta todas las características de\nun Pokémon si se usa en combate."
    ko: "다이맥스의 모습을 바꿀 수 있는 힘을 가진 버섯.\n배틀 중인 포켓몬의 모든 능력을 올린다."
    zh_simp: "拥有某种神奇力量的蘑菇，\n能改变宝可梦极巨化的样子。\n在战斗中，可以提高宝可梦所有的能力。"
    zh_trad: "蘊藏著神奇力量的蘑菇，\n可以讓寶可夢改變極巨化的樣子。\n在戰鬥中能提高寶可夢的所有能力。"
max_potion:
  names:
    jp_kana: まんたんのくすり
    jp_kanji: まんたんのくすり
    en: Max Potion
    fr: Potion Max
    it: Pozione Max
    de: Top-Trank
    es: Poción Máxima
    ko: 풀회복약
    zh_simp: 全满药
    zh_trad: 全滿藥
  descriptions:
    jp_kana: "スプレーしきの　キズぐすり。\nポケモン　１ひきの　ＨＰを\nすべて　かいふくする。"
    jp_kanji: "スプレー式の　キズぐすり。\nポケモン　１匹の　ＨＰを\nすべて　回復する。"
    en: "A spray-type medicine for treating wounds. It can\nbe used to completely restore the max HP of\na single Pokémon."
    fr: "Un spray qui soigne les blessures.\nRestaure tous les PV d’un Pokémon."
    it: "Rimedio spray per le ferite.\nRestituisce tutti i PS a un Pokémon."
    de: "Hilft bei Wunden. Füllt die KP eines Pokémon wieder\nvollständig auf."
    es: "Medicina en espray que cura heridas y restaura todos\nlos PS de un Pokémon."
    ko: "스프레이식의 상처약.\n포켓몬 1마리의 HP를\n모두 회복한다."
    zh_simp: "喷雾式伤药。\n能让１只宝可梦\n回复所有ＨＰ。"
    zh_trad: "噴霧式傷藥。\n能讓１隻寶可夢\n回復所有ＨＰ。"
max_repel:
  names:
    jp_kana: ゴールドスプレー
    jp_kanji: ゴールドスプレー
    en: Max Repel
    fr: Repousse Max
    it: Repellente Max
    de: Top-Schutz
    es: Repelente Máximo
    ko: 골드스프레이
    zh_simp: 黄金喷雾
    zh_trad: 黃金噴霧
  descriptions:
    jp_kana: "よわい　やせいの　ポケモンが\nまったく　でて　こなくなる。\nシルバースプレーより　ながく　きく。"
    jp_kanji: "弱い　野生の　ポケモンが\nまったく　でて　こなくなる。\nシルバースプレーより　長く　効く。"
    en: "An item that prevents any low-level wild Pokémon\nfrom jumping out at you for a while. It lasts longer\nthan Super Repel."
    fr: "Repousse les Pokémon sauvages faibles pendant\nune durée plus longue que celle du Super Repousse."
    it: "Strumento che evita a chi lo usa di incontrare\nPokémon selvatici deboli. Il suo effetto dura più\na lungo di quello del Superrepellente."
    de: "Hält schwache wilde Pokémon ab. Wirkt länger als das\nItem Superschutz."
    es: "Evita encuentros con Pokémon salvajes débiles durante\nmás tiempo que un Superrepelente."
    ko: "약한 야생 포켓몬이\n전혀 나오지 않게 된다.\n실버스프레이보다 효과가 오래간다."
    zh_simp: "弱小的野生宝可梦\n将完全不会出现。\n效果比白银喷雾更持久。"
    zh_trad: "弱小的野生寶可夢\n變得完全不會出現。\n效果比白銀噴霧更持久。"
max_revive:
  names:
    jp_kana: げんきのかたまり
    jp_kanji: げんきのかたまり
    en: Max Revive
    fr: Rappel Max
    it: Revitalizz. Max
    de: Top-Beleber
    es: Revivir Máximo
    ko: 기력의덩어리
    zh_simp: 活力块
    zh_trad: 活力塊
  descriptions:
    jp_kana: "ひんしに　なった　ポケモン\n１ひきを　げんきに　したうえで\nＨＰを　すべて　かいふくする。"
    jp_kanji: "ひんしに　なった　ポケモン\n１匹を　元気に　したうえで\nＨＰを　すべて　回復する。"
    en: "A medicine that can be used to revive a single\nPokémon that has fainted. It also fully restores\nthe Pokémon’s max HP."
    fr: "Un médicament qui ranime un Pokémon K.O.\net restaure tous ses PV."
    it: "Rimedio che rianima un Pokémon esausto\nrestituendogli tutti i PS."
    de: "Eine Medizin, die ein kampfunfähiges Pokémon\nwiederbelebt. Die KP werden vollständig\nwiederhergestellt."
    es: "Medicina que revive a un Pokémon debilitado y le\ndevuelve todos sus PS."
    ko: "기절해 버린 포켓몬\n1마리를 건강하게 하고\nHP를 모두 회복한다."
    zh_simp: "能让１只陷入昏厥的\n宝可梦重获生机，\n并回复所有ＨＰ。"
    zh_trad: "能讓１隻陷入瀕死的\n寶可夢重獲生機，\n並回復所有ＨＰ。"
meadow_plate:
  names:
    jp_kana: みどりのプレート
    jp_kanji: みどりのプレート
    en: Meadow Plate
    fr: Plaque Herbe
    it: Lastraprato
    de: Wiesentafel
    es: Tabla Pradal
    ko: 초록플레이트
    zh_simp: 碧绿石板
    zh_trad: 碧綠石板
  descriptions:
    jp_kana: "くさの　タイプの　せきばん。\nもたせると　くさタイプの\nわざの　いりょくが　つよまる。"
    jp_kanji: "くさの　タイプの　石盤。\n持たせると　くさタイプの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon. It’s a stone tablet\nthat boosts the power of Grass-type moves."
    fr: "Objet à tenir. Une tablette en pierre augmentant\nla puissance des capacités de type Plante."
    it: "Strumento da dare a un Pokémon. Lastra di pietra che\npotenzia le mosse di tipo Erba."
    de: "Ein Item zum Tragen. Diese Steintafel verstärkt\nAttacken vom Typ Pflanze."
    es: "Tabla de piedra que potencia los movimientos de tipo\nPlanta. Debe llevarla un Pokémon."
    ko: "풀타입의 석판.\n지니게 하면 풀타입\n기술의 위력이 강해진다."
    zh_simp: "草属性的石板。\n携带后，草属性的\n招式威力就会增强。"
    zh_trad: "草屬性的石板。\n攜帶後，草屬性的\n招式威力就會增強。"
medal_box:
  names:
    jp_kana: メダルボックス
    jp_kanji: メダルボックス
    en: Medal Box
    fr: Boîte Médailles
    it: Box Premi
    de: Medaillenbox
    es: Caja Insignias
    ko: 메달박스
    zh_simp: 奖牌盒
    zh_trad: 獎牌盒
  descriptions:
    jp_kana: "かくとくした　メダルを　しゅうのうし\nメダルについての　じょうほうを\nきろくする　はこがたの　きかい。"
    jp_kanji: "獲得した　メダルを　収納し\nメダルについての　情報を\n記録する　箱型の　機械。"
    en: "A box-shaped machine that stores Medals and\nMedal information."
    fr: "Une boîte qui permet de ranger les Médailles\net d’enregistrer des informations à leur sujet."
    it: "Apparecchio rettangolare usato per custodire\ni Premi ottenuti e tutte le informazioni che li\nriguardano."
    de: "Ein Gerät in Form einer Box, in der Medaillen\naufbewahrt und Informationen dazu gespeichert werden."
    es: "Un dispositivo con forma de caja que almacena las\ninsignias y la información relacionada."
    ko: "획득한 메달을 수납하고\n메달에 대한 정보를\n기록하는 상자 모양의 기계."
    zh_simp: "可以放入获得的奖牌，\n并记录奖牌信息的箱形机器。"
    zh_trad: "可以放入獲得的獎牌，\n並記錄獎牌資訊的\n箱形機器。"
medichamite:
  names:
    jp_kana: チャーレムナイト
    jp_kanji: チャーレムナイト
    en: Medichamite
    fr: Charminite
    it: Medichamite
    de: Meditalisnit
    es: Medichamita
    ko: 요가램나이트
    zh_simp: 恰雷姆进化石
    zh_trad: 恰雷姆進化石
  descriptions:
    jp_kana: "チャーレムに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "チャーレムに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Medicham hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Charmina, elle lui permet de\nméga-évoluer durant un combat."
    it: "Un esemplare delle misteriose Megapietre.\nData a Medicham, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Meditalis getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Medicham en combate."
    ko: "요가램에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让恰雷姆携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓恰雷姆攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
medicine_pocket:
  names:
    jp_kana: かいふくポケット
    jp_kanji: かいふくポケット
    en: Medicine Pocket
    fr: Trousse de Soins
    it: Tasca rimedi
    de: Medizintasche
    es: Botiquín
    ko: 회복포켓
    zh_simp: 回复口袋
    zh_trad: 回復口袋
  descriptions:
    jp_kana: "ー\nー\nー"
    jp_kanji: "ー\nー\nー"
    en: "-\n-\n-"
    fr: "-\n-\n-"
    it: "-\n-\n-"
    de: ー
    ko: "-\n-\n-"
    zh_simp: "ー\nー\nー"
    zh_trad: "ー\nー\nー"
mega_anchor:
  names:
    jp_kana: メガイカリ
    jp_kanji: メガイカリ
    en: Mega Anchor
    fr: Méga-Ancre
    it: Megaancora
    de: Mega-Anker
    es: Megaancla
    ko: 메가앵커
    zh_simp: 超级船锚
    zh_trad: 超級船錨
  descriptions:
    jp_kana: "メガストーンを　もったまま　たたかう\nポケモンを　メガシンカさせる\nみちのパワーを　ひめた　アンカー。"
    jp_kanji: "メガストーンを　持ったまま　戦う\nポケモンを　メガシンカさせる\n未知のパワーを　秘めた　アンカー。"
    en: "This anchor contains an untold power that\nsomehow enables Pokémon carrying a Mega Stone\nto Mega Evolve in battle."
    fr: "Une ancre aux pouvoirs mystérieux permettant\nà un Pokémon de méga-évoluer au combat s’il tient\nla bonne Méga-Gemme."
    it: "Ancora dotata di un misterioso potere.\nPermette a un Pokémon che ha una Megapietra\ndi megaevolversi durante la lotta."
    de: "Ein Anker mit geheimnisvollen Kräften. Er ermöglicht\nPokémon, die einen Mega-Stein tragen, eine\nMega-Entwicklung durchzuführen."
