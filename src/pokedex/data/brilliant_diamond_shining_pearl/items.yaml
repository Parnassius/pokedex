    jp_kana: "ポケモンに　かおりを　かがせると\nとくこうが　あがりやすく　なるが\nぼうぎょは　あがりにくくなる　ミント。"
    jp_kanji: "ポケモンに　香りを　かがせると\n特攻が　上がりやすく　なるが\n防御は　上がりにくくなる　ミント。"
    en: "When a Pokémon smells this mint, its Sp. Atk will grow\nmore easily, but its Defense will grow more slowly."
    fr: "Si un Pokémon hume cet aromate, son Attaque Spéciale\nmontera plus facilement, mais sa Défense\nse développera plus lentement."
    it: "Quando un Pokémon ne sente il profumo,\nil suo Attacco Speciale aumenta più facilmente\na scapito della Difesa."
    de: "Lässt man ein Pokémon an dieser Minze schnuppern,\nsteigt sein Spezial-Angriff schneller, aber seine\nVerteidigung umso langsamer."
    es: "Cuando un Pokémon percibe su aroma, aumenta con\nmás facilidad su Ataque Especial, en detrimento de su\nDefensa."
    ko: "포켓몬에게 향기를 맡게 하면\n특수공격이 오르기 쉬워지지만\n방어가 오르기 어려워지는 민트."
    zh_simp: "宝可梦闻了这种薄荷之后，\n会令特攻容易提高，\n而防御则难以提高。"
    zh_trad: "讓寶可夢聞這種薄荷的氣味，\n會令特攻變得容易提高，\n但防禦則難以提高。"
