    it: Baccacocca
    de: Apikobeere
    es: Baya Aricoc
    ko: 규살열매
    zh_simp: 杏仔果
    zh_trad: 杏仔果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nピンチのとき　じぶんの\nとくぼうが　あがる。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　自分の\n特防が　あがる。"
    en: "A Berry to be consumed by Pokémon. If a Pokémon\nholds one, its Sp. Def stat will increase when it’s in\na pinch."
    fr: "Tenue, cette Baie augmente la Défense Spéciale\nen cas de besoin."
    it: "Se il Pokémon che ha questa bacca si trova\nin difficoltà, la sua Difesa Speciale aumenta."
    de: "Als getragenes Item erhöht diese Beere den\nSpezial-Verteidigungs-Wert eines Pokémon, sobald es\nin einer Notlage steckt."
    es: "Si la lleva un Pokémon, le sube la Defensa Especial en\nun momento de apuro."
    ko: "포켓몬에게 지니게 하면\n위급할 때 자신의\n특수방어가 올라간다."
    zh_simp: "让宝可梦携带后，危机时，\n自己的特防就会提高。"
    zh_trad: "讓寶可夢攜帶後，\n危機時，自己的\n特防就會提高。"
apricorn_box:
  names:
    jp_kana: ぼんぐりケース
    jp_kanji: ぼんぐりケース
    en: Apricorn Box
    fr: Boîte Noigrume
    it: Ghicobox
    de: Aprikokobox
    es: Caja Bonguri
    ko: 규토리케이스
    zh_simp: 球果盒
    zh_trad: 球果盒
  descriptions:
    jp_kana: "ぼんぐりを　９９こ　ほぞん　できる\nべんりな　いれもの。"
    jp_kanji: "ぼんぐりを　９９こ　保存できる\n便利な　いれもの。"
    en: "A handy box where you can store up to 99 of each\nkind of Apricorn."
    fr: "Une boîte bien pratique qui peut contenir jusqu’à\n99 Noigrumes."
    it: "Contenitore molto pratico dove conservare\nfino a 99 ghicocche diverse."
    de: "Eine praktische Tragebox, in der du bis zu 99 Aprikokos\njeder Sorte transportieren kannst."
    es: "Práctico recipiente que puede almacenar hasta\n99 bonguris de cada especie."
    ko: "규토리를 99개 보존할 수 있는\n편리한 용기."
    zh_simp: "使用方便，可以保存\n９９个球果的容器。"
    zh_trad: "可以存放\n９９個球果的好用容器。"
aqua_suit:
  names:
    jp_kana: アクアスーツ
    jp_kanji: アクアスーツ
    en: Aqua Suit
    fr: Scaphandre Aqua
    it: Tuta Idro
    de: Aqua-Anzug
    es: Traje Aqua
    ko: 아쿠아슈트
    zh_simp: 海洋装
    zh_trad: 海洋裝
  descriptions:
    jp_kana: "アクアだんの　かがくぎじゅつを\nけっしゅうして　つくられた　スーツ。\nどんな　しょうげき　にも　たえられる。"
    jp_kanji: "アクア団の　科学技術を\n結集して　つくられた　スーツ。\nどんな　衝撃にも　耐えられる。"
    en: "A suit made with the collective technological\nknow-how of Team Aqua. It can withstand\nany impact."
    fr: "Une combinaison créée à partir des méthodes\nscientifiques de la Team Aqua.\nElle résiste à tous les chocs."
    it: "Tuta altamente tecnologica costruita dal\nTeam Idro in grado di resistere a qualunque\nshock."
    de: "Ein Anzug, der unter Einsatz des gesamten technischen\nWissens von Team Aqua entstand. Hält jeder Art von\nErschütterung stand."
    es: "Este traje es el resultado de las arduas investigaciones\ncientíficas del Equipo Aqua. Es capaz de soportar\ncualquier impacto."
    ko: "아쿠아단이 과학기술을\n결집하여 만든 슈트다.\n어떠한 충격에도 견딜 수 있다."
    zh_simp: "集海洋队科学技术于一身的服装。\n能承受任何冲击。"
    zh_trad: "集結了海洋隊的\n科學技術製造的服裝。\n能承受任何衝擊。"
armor_fossil:
  names:
    jp_kana: たてのカセキ
    jp_kanji: たてのカセキ
    en: Armor Fossil
    fr: Fossile Armure
    it: Fossilscudo
    de: Panzerfossil
    es: Fósil Coraza
    ko: 방패의화석
    zh_simp: 盾甲化石
    zh_trad: 盾甲化石
  descriptions:
    jp_kana: "おおむかし　ちじょうで　くらした\nこだい　ポケモンの　カセキ。\nえりかざりの　いちぶ　らしい。"
    jp_kanji: "大昔　地上で　暮らした\n古代ポケモンの　カセキ。\n襟飾りの　一部らしい。"
    en: "A fossil from a prehistoric Pokémon that once lived\non the land. It looks to be from some kind of\nprotective collar."
    fr: "Le fossile d’un Pokémon préhistorique terrestre.\nOn dirait un morceau de collerette osseuse."
    it: "Fossile di un Pokémon preistorico che viveva sulla\nterraferma. Sembra essere parte di un collare."
    de: "Das Fossil eines uralten Pokémon, das an Land lebte.\nEs sieht wie ein Teil eines Nackenschildes aus."
    es: "Fósil de un Pokémon prehistórico terrestre. Parece ser\nparte de una protección ósea del cuello."
    ko: "오랜 옛날 지상에서 살았던\n고대 포켓몬의 화석.\n깃 장식의 일부인 듯하다."
    zh_simp: "很久以前生活在地上的\n古代宝可梦的化石。\n好像是领饰的一部分。"
    zh_trad: "很久以前生活在地上的\n古代寶可夢的化石。\n好像是領飾的一部分。"
armor_pass:
  names:
    jp_kana: ヨロイパス
    jp_kanji: ヨロイパス
    en: Armor Pass
    fr: Pass Isolarmure
    it: Pass Armatura
    de: Rüstungspass
    es: Pase Armadura
    ko: 갑옷패스
    zh_simp: 铠甲车票
    zh_trad: 鎧甲車票
  descriptions:
    jp_kana: "ヨロイじまに　いくための　パス。\nブラッシータウンの　えきで\nえきいんさんに　みせよう。"
    jp_kanji: "ヨロイ島に　行くための　パス。\nブラッシータウンの　駅で\n駅員さんに　見せよう。"
    en: "A pass to go to the Isle of Armor. Show it to the rail\nstaff at Wedgehurst Station."
    fr: "Un pass pour se rendre à Isolarmure.\nMontrez-le à l’employé de la Gare de Brasswick."
    it: "Un pass necessario per raggiungere l’Isola\ndell’Armatura. Mostralo al personale della\nStazione di Brassbury."
    de: "Ein Pass, mit dem du zur Rüstungsinsel gelangst.\nZeige ihn dem Personal am Brassbury-Bahnhof."
    es: "Un pase que permite viajar hasta la Isla de la Armadura.\nHay que mostrárselo al empleado de la estación de\nPueblo Par."
    ko: "갑옷섬에 갈 수 있는 패스.\n브래시마을역에 있는\n역무원에게 보여 주자."
    zh_simp: "前往铠岛的车票。\n在木杆镇的车站，\n把它出示给站务员看吧。"
    zh_trad: "前往鎧島的車票。\n在木桿鎮的車站\n把它出示給站務員看吧。"
armorite_ore:
  names:
    jp_kana: ヨロイこうせき
    jp_kanji: ヨロイこうせき
    en: Armorite Ore
    fr: Armurium
    it: Rocciarmatura
    de: Rüstungserz
    es: Duralium
    ko: 갑옷광석
    zh_simp: 铠甲矿石
    zh_trad: 鎧甲礦石
  descriptions:
    jp_kana: "ヨロイじまで　とれる　めずらしい　いし。\nヨロイじまの　コレクターに　あげると\nなにか　いいことが　ある。"
    jp_kanji: "ヨロイ島で　採れる　珍しい石。\nヨロイ島の　コレクターに　あげると\nなにか　いいことが　ある。"
    en: "Rare ore that can be obtained on the Isle of Armor.\nSomething good will happen if you give it to a collector\non the Isle of Armor."
    fr: "Un minerai rare que l’on trouve à Isolarmure.\nVous pourriez avoir une bonne surprise\nen le donnant à un collectionneur de l’île."
    it: "Una pietra rara che si può trovare sull’Isola\ndell’Armatura. Se la consegni a un collezionista\ndi quella zona, potresti guadagnarci qualcosa."
    de: "Ein seltenes Gestein, das auf der Rüstungsinsel zu\nfinden ist. Gibst du es einem Sammler auf der Insel,\npassiert etwas Gutes."
    es: "Un mineral poco común que se encuentra en la Isla de\nla Armadura. Tal vez ocurra algo bueno al dárselo a un\ncoleccionista de dicha isla."
    ko: "갑옷섬에서 얻을 수 있는 희귀한 광석.\n갑옷섬의 컬렉터에게 주면 좋은 일이 일어난다."
    zh_simp: "能够在铠岛找出的珍稀石头。\n把它送给铠岛的收藏家，\n就会有好事发生。"
    zh_trad: "能夠在鎧島找到的稀奇石頭。\n把它送給鎧島上的收藏家，\n就會有好事發生。"
articuno_candy:
  names:
    jp_kana: フリーザーのアメ
    jp_kanji: フリーザーのアメ
    en: Articuno Candy
    fr: Bonbon Artikodin
    it: Caramella Articuno
    de: Arktos-Bonbon
    es: Caramelo Articuno
    ko: 프리져의사탕
    zh_simp: 急冻鸟的糖果
    zh_trad: 急凍鳥的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de cierto Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
aspear_berry:
  names:
    jp_kana: ナナシのみ
    jp_kanji: ナナシのみ
    en: Aspear Berry
    fr: Baie Willia
    it: Baccaperina
    de: Wilbirbeere
    es: Baya Perasi
    ko: 배리열매
    zh_simp: 利木果
    zh_trad: 利木果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこおりを　かいふくする。"
    jp_kanji: "ポケモンに　持たせると\nこおりを　回復する。"
    en: "A Berry to be consumed by Pokémon. If a Pokémon\nholds one, it can recover from being frozen on its\nown in battle."
    fr: "Une Baie qui soigne le gel lorsqu’elle est tenue\npar un Pokémon."
    it: "Se un Pokémon ha questa bacca, guarisce\ndal congelamento."
    de: "Gibst du die Beere einem Pokémon zum Tragen,\ntaut diese es auf, wenn es eingefroren wird."
    es: "Los Pokémon pueden llevarla o usarla para\ndescongelarse."
    ko: "포켓몬에게 지니게 하면\n얼음을 회복한다."
    zh_simp: "让宝可梦携带后，\n可以治愈冰冻。"
    zh_trad: "讓寶可夢攜帶後，\n可以治癒冰凍。"
assault_vest:
  names:
    jp_kana: とつげきチョッキ
    jp_kanji: とつげきチョッキ
    en: Assault Vest
    fr: Veste de Combat
    it: Corpetto assalto
    de: Offensivweste
    es: Chaleco Asalto
    ko: 돌격조끼
    zh_simp: 突击背心
    zh_trad: 突擊背心
  descriptions:
    jp_kana: "こうげきてきに　なる　チョッキ。\nもたせると　とくぼうが　あがるが\nへんかわざを　だせなくなる。"
    jp_kanji: "攻撃的に　なる　チョッキ。\n持たせると　特防が　あがるが\n変化技を　だせなくなる。"
    en: "An item to be held by a Pokémon. This offensive\nvest raises Sp. Def but prevents the use of\nstatus moves."
    fr: "Objet à tenir. Une veste augmentant la Défense\nSpéciale, mais empêchant d’utiliser des capacités\nde statut."
    it: "Strumento da dare a un Pokémon.\nQuesto corpetto aumenta la Difesa Speciale\nma impedisce l’uso di mosse di stato."
    de: "Trägt ein Pokémon diese Weste, erhöht sich seine\nSpezial-Verteidigung, aber es kann keine\nStatus-Attacken mehr einsetzen."
    es: "Chaleco que potencia la Defensa Especial del Pokémon\nque lo lleva, pero le impide lanzar movimientos de\nestado."
    ko: "공격적으로 변하는 조끼.\n지니게 하면 특수방어가 올라가지만\n변화 기술을 쓸 수 없게 된다."
    zh_simp: "会变得富有攻击性的背心。\n虽然携带后特防会提高，\n但会无法使出变化招式。"
    zh_trad: "會變得富有攻擊性的背心。\n雖然攜帶後特防會提高，\n但會無法使出變化招式。"
audinite:
  names:
    jp_kana: タブンネナイト
    jp_kanji: タブンネナイト
    en: Audinite
    fr: Nanméouïte
    it: Audinite
    de: Ohrdochnit
    es: Audinita
    ko: 다부니나이트
    zh_simp: 差不多娃娃进化石
    zh_trad: 差不多娃娃進化石
  descriptions:
    jp_kana: "タブンネに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "タブンネに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Audino hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Nanméouïe, elle lui permet\nde méga-évoluer durant un combat."
    it: "Una delle misteriose Megapietre.\nData a Audino, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Ohrdoch getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Audino en combate."
    ko: "다부니에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让差不多娃娃携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓差不多娃娃攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
autograph:
  names:
    jp_kana: マチスのサイン
    jp_kanji: マチスのサイン
    en: Autograph
    fr: Dédicace de Bob
    it: Autografo
    de: Autogramm
    es: Autógrafo
    ko: 마티스의사인
    zh_simp: 马志士的签名
    zh_trad: 馬志士的簽名
  descriptions:
    jp_kana: "クチバ　ジムリーダー　マチスから\nもらった　サインしきし。\nＧｏｏｄ　Ｌｕｃｋ！と　かかれている。"
    jp_kanji: "クチバ　ジムリーダー　マチスから\nもらった　サイン色紙。\nＧｏｏｄ　Ｌｕｃｋ！と　書かれている。"
    en: "The autograph you got from the Vermilion City Gym\nLeader, Lt. Surge. He wrote, “Good luck!”"
    fr: "C’est un autographe de Major Bob, le Champion\nde l’Arène de Carmin sur Mer ! Il y a écrit « Good\nluck ! » dessus."
    it: "È l’autografo di Lt. Surge, il Capopalestra\ndi Aranciopoli. C’è scritto \"Good luck!\"."
    de: "Das ist ein Autogramm von Major Bob, dem Arenaleiter\nvon Orania City. Darauf steht: „Viel Glück, \n\n!“"
    es: "El autógrafo del Teniente Surge, el Líder de Gimnasio\nde Ciudad Carmín. La dedicatoria reza: \"Good luck!\"."
    ko: "갈색체육관 관장 마티스에게\n받은 사인이 적힌 종이.\nGood Luck!이라고 써 있다."
    zh_simp: "枯叶市道馆馆主马志士\n给你的彩色签名纸。\n上面写着“Ｇｏｏｄ Ｌｕｃｋ！”。"
    zh_trad: "從枯葉市道館館主馬志士\n那裡拿到的簽名板。\n上面寫著「Ｇｏｏｄ　Ｌｕｃｋ！」。"
awakening:
  names:
    jp_kana: ねむけざまし
    jp_kanji: ねむけざまし
    en: Awakening
    fr: Réveil
    it: Sveglia
    de: Aufwecker
    es: Despertar
    ko: 잠깨는약
    zh_simp: 解眠药
    zh_trad: 解眠藥
  descriptions:
    jp_kana: "スプレーしきの　くすり。\nポケモン　１ひきの　ねむりの\nじょうたいを　かいふくする。"
    jp_kanji: "スプレー式の　薬。\nポケモン　１匹の　ねむりの\n状態を　回復する。"
    en: "A spray-type medicine to wake the sleeping. It can be\nused to rouse a single Pokémon from the clutches\nof sleep."
    fr: "Un médicament sous forme de spray.\nRéveille un Pokémon endormi."
    it: "Rimedio spray.\nSveglia un Pokémon addormentato."
    de: Ein Spray, das ein schlafendes Pokémon aufweckt.
    es: "Medicina en espray que libera a un Pokémon de las\ngarras del sueño."
    ko: "스프레이식의 약.\n포켓몬 1마리의\n잠듦 상태를 회복한다."
    zh_simp: "喷雾式药水。\n能治愈１只宝可梦的\n睡眠状态。"
    zh_trad: "噴霧式藥水。\n能治癒１隻寶可夢的\n睡眠狀態。"
azure_flute:
  names:
    jp_kana: てんかいのふえ
    jp_kanji: てんかいのふえ
    en: Azure Flute
    fr: Flûte Azur
    it: Flauto cielo
    de: Azurflöte
    es: Flauta Azur
    ko: 천계의피리
    zh_simp: 天界之笛
    zh_trad: 天界之笛
  descriptions:
    jp_kana: "このよの　ものとは　おもえない\nねいろが　なりひびく　ふえ。　いつ\nだれが　つくったのか　わからない。"
    jp_kanji: "この世の　ものとは　おもえない\n音色が　なりひびく　ふえ。　いつ\nだれが　つくったのか　わからない。"
    en: "A flute that puts out echoing sounds that do not\nseem to be of this world. No one knows who\nmade it."
    fr: "Une flûte produisant des sons qui semblent provenir\nd’un autre monde. On ne sait pas qui l’a fabriquée."
    it: "Flauto che emette una melodia che sembra\nappartenere a un altro mondo. Non si sa\nchi l’abbia creato."
    de: "Eine Flöte, deren Töne nicht von dieser Welt zu sein\nscheinen. Ihr Erschaffer ist nicht bekannt."
    es: "Emite sonidos que no parecen de este mundo. Es de\nfabricante desconocido."
    ko: "이 세상의 것이라고는 생각할 수 없는\n음색이 울려 퍼지는 피리. 언제\n누가 만들었는지 모른다."
    zh_simp: "能发出响彻云霄的天籁之音的笛子。\n不知道是谁在什么时候制造的它。"
    zh_trad: "能發出響徹雲霄的\n天籟之音的笛子。不知是什麼人\n在什麼時候製造了它。"
babiri_berry:
  names:
    jp_kana: リリバのみ
    jp_kanji: リリバのみ
    en: Babiri Berry
    fr: Baie Babiri
    it: Baccababiri
    de: Babiribeere
    es: Baya Baribá
    ko: 바리비열매
    zh_simp: 霹霹果
    zh_trad: 霹霹果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　はがね　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　はがね技を\n受けたとき　威力が　弱まる。"
    en: "If held by a Pokémon, this Berry will lessen the\ndamage taken from one supereffective\nSteel-type attack."
    fr: "Tenue, cette Baie affaiblit une attaque ennemie\nsuper efficace de type Acier."
    it: "Se un Pokémon ha questa bacca, l’attacco\nsuperefficace di tipo Acciaio del nemico\nviene indebolito."
    de: "Als getragenes Item schwächt diese Beere sehr effektive\ngegnerische Attacken vom Typ Stahl."
    es: "Si la lleva un Pokémon, debilita un ataque supereficaz\nde tipo Acero de un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 굉장한 강철 기술로\n공격받았을 때 위력이 약해진다."
    zh_simp: "让宝可梦携带后，\n在受到效果绝佳的钢属性招式\n攻击时，能令其威力减弱。"
    zh_trad: "讓寶可夢攜帶後，\n在受到效果絕佳的鋼屬性招式\n攻擊時，能使其威力減弱。"
bachs_food_tin:
  names:
    jp_kana: バックのかんづめ
    jp_kanji: バックのかんづめ
    en: Bach’s Food Tin
    fr: Conserve de Bach
    it: Scatoletta Bach
    de: Bachs Feinkost
    es: Lata de Bach
    ko: 바크의통조림
    zh_simp: 巴哈罐头
    zh_trad: 巴哈罐頭
  descriptions:
    jp_kana: "キャンプの　りょうりに　つかう\nしょくざいの　いっしゅ。バックが　うる\nかんづめが　なぜか　ガラルで　にんきだ。"
    jp_kanji: "キャンプの　料理に　使う\n食材の　一種。バックが　売る\n缶詰が　なぜか　ガラルで　人気だ。"
    en: "One of the many ingredients that can be used for\ncooking at your camp. The tinned food that Bach sells\nis curiously popular in Galar."
    fr: "Un ingrédient de cuisine pour le camping.\nCette conserve, vendue par Bach, connaît un succès\nsurprenant à Galar."
    it: "Uno degli ingredienti che puoi usare per cucinare\nin campeggio. Queste scatolette vendute da Bach\nsono particolarmente amate dagli abitanti di Galar."
    de: "Eine Zutat für PokéCamping-Mahlzeiten. Diese von\nBach vertriebene Dosennahrung erfreut sich in Galar\nüberraschend hoher Beliebtheit."
    es: "Un ingrediente para cocinar en el campamento. Las\nconservas de Bach son muy apreciadas por todo Galar."
    ko: "캠프 요리에 사용되는\n식재료 중 하나. 바크가 파는 통조림은\n어째선지 가라르에서 인기다."
    zh_simp: "在露营营地制作料理时会使用的\n一种食材。不知是什么原因，\n巴哈卖的罐头在伽勒尔特别受欢迎。"
    zh_trad: "製作露營料理時使用的食材之一。\n巴哈賣的罐頭不知為何\n在伽勒爾很受歡迎。"
balm_mushroom:
  names:
    jp_kana: かおるキノコ
    jp_kanji: かおるキノコ
    en: Balm Mushroom
    fr: Champi Suave
    it: Profumfungo
    de: Duftpilz
    es: Seta Aroma
    ko: 향기버섯
    zh_simp: 芳香蘑菇
    zh_trad: 芳香蘑菇
  descriptions:
    jp_kana: "あたりいったいに　いい　かおりが\nひろがる　めずらしい　キノコ。\nショップで　たかく　うれる。"
    jp_kanji: "あたりいったいに　いい　香りが\nひろがる　珍しい　キノコ。\nショップで　高く　売れる。"
    en: "A rare mushroom that gives off a nice fragrance.\nIt can be sold at a high price to shops."
    fr: "Un champignon rare qui répand un agréable parfum\nautour de lui. Peut être vendu à bon prix en magasin."
    it: "Fungo raro che emana un profumo gradevolissimo.\nSi può vendere a un prezzo piuttosto alto\nnei negozi."
    de: "Ein seltener Pilz, der ein angenehmes Aroma verbreitet.\nEr ist von großem Wert."
    es: "Extraña seta que desprende un agradable aroma.\nPuede alcanzar un alto precio en las tiendas."
    ko: "주변 일대에 좋은 향기가\n퍼지는 희귀한 버섯.\n상점에서 비싸게 팔린다."
    zh_simp: "能让附近一带\n芳香四溢的珍稀蘑菇。\n可以在商店高价出售。"
    zh_trad: "能讓附近一帶\n充滿馥郁香氣的稀奇蘑菇。\n可以在商店高價出售。"
band_autograph:
  names:
    jp_kana: バンドのサイン
    jp_kanji: バンドのサイン
    en: Band Autograph
    fr: Dédicace
    it: Autografo band
    de: Band-Autogramm
    es: Autógrafo Grupo
    ko: 밴드의사인
    zh_simp: 乐队的签名
    zh_trad: 樂團的簽名
  descriptions:
    jp_kana: "ガラルちほうの　カリスマで　ある\nバンド「マキシマイザズ」の\nメンバー　ぜんいんに　よる　サイン。"
    jp_kanji: "ガラル地方の　カリスマで　ある\nバンド「マキシマイザズ」の\nメンバー　全員に　よる　サイン。"
    en: "It’s signed by all members of the Galar region’s most\ncharismatic band, the Maximizers."
    fr: "Une dédicace des membres du célèbre groupe de Galar,\n« The Maximizers », au grand complet."
    it: "Gli autografi di tutti i membri della banda\npiù carismatica di Galar, i \"Maximizers\"."
    de: "Auf dieser Autogrammkarte haben alle Mitglieder der\nMaximizers unterschrieben. Die Band erfreut sich in der\nGalar-Region großer Beliebtheit."
    es: "Un autógrafo firmado por todos los miembros de los\nMaximizers, el grupo musical más carismático de Galar."
    ko: "가라르지방의 카리스마 넘치는\n밴드 “맥시마이저즈”\n멤버 전원의 사인."
    zh_simp: "伽勒尔地区的标志性乐队\n“马西马赛”\n全体成员的亲笔签名。"
    zh_trad: "伽勒爾地區神級樂團\n「馬西馬賽」全體成員的簽名。"
banettite:
  names:
    jp_kana: ジュペッタナイト
    jp_kanji: ジュペッタナイト
    en: Banettite
    fr: Branettite
    it: Banettite
    de: Banetteonit
    es: Banettita
    ko: 다크펫나이트
    zh_simp: 诅咒娃娃进化石
    zh_trad: 詛咒娃娃進化石
  descriptions:
    jp_kana: "ジュペッタに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "ジュペッタに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Banette hold it, and this stone will enable it to\nMega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Branette, elle lui permet de\nméga-évoluer durant un combat."
    it: "Un esemplare delle misteriose Megapietre.\nData a Banette, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Banette getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Banette en combate."
    ko: "다크펫에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让诅咒娃娃携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓詛咒娃娃攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
basement_key:goldenrod_tunnel:
  names:
    jp_kana: ちかのかぎ
    jp_kanji: ちかのかぎ
    en: Basement Key
    fr: Clé Sous-Sol
    it: Chiave sotterr.
    de: Kelleröffner
    es: Llave Sótano
    ko: 지하의열쇠
    zh_simp: 地下钥匙
    zh_trad: 地下鑰匙
  descriptions:
    jp_kana: "コガネちかどうに　ある　とびらを\nあける　カギ。"
    jp_kanji: "コガネ地下道に　ある　扉を\n空ける　カギ。"
    en: A key that opens a door in the Goldenrod Tunnel.
    fr: "Une clé qui permet d’ouvrir la porte au fond\ndu Doublon-Tunnel."
    it: "Chiave che permette di aprire la porta all’interno\ndel Fiortunnel."
    de: "Ein Schlüssel, der eine Tür in der Dukatia-Passage von\nDukatia City öffnet."
    es: Llave que abre la puerta que hay en el Túnel Trigal.
    ko: "금빛지하도에 있는 문을\n여는 열쇠."
    zh_simp: "用来打开满金地道\n大门的钥匙。"
    zh_trad: "用來打開滿金地下道的\n門的鑰匙。"
basement_key:new_mauville:
  names:
    jp_kana: ちかのカギ
    jp_kanji: ちかのカギ
    en: Basement Key
    fr: Clé Sous-Sol
    it: Chiave sotterr.
    de: Kelleröffner
    es: Llave del Sótano
    ko: 지하열쇠
    zh_simp: 地下钥匙
    zh_trad: 地下鑰匙
  descriptions:
    jp_kana: "キンセツの　ちかにある\nニューキンセツに\nはいる　ための　カギ。"
    jp_kanji: "キンセツの　地下にある\nニューキンセツに\n入るための　カギ。"
    en: "The key to New Mauville, which was constructed\nbeneath Mauville City."
    fr: "Une clé permettant d’accéder à New Lavandia,\ndans les sous-sols de Lavandia."
    it: "Chiave che permette di accedere a Ciclanova,\nla città sotterranea costruita sotto a Ciclamipoli."
    de: "Ein Schlüssel, der dir Zugang nach Neu Malvenfroh\nverschafft, welches unter Malvenfroh City liegt."
    es: "Llave que da acceso a Malvalanova, situada en los\nsubterráneos de Ciudad Malvalona."
    ko: "보라시티 지하에 있는\n뉴보라에 들어가기 위한\n열쇠다."
    zh_simp: "进入紫堇地下的新紫堇时，\n所使用的钥匙。"
    zh_trad: "用於進入紫菫地下的\n新紫菫的鑰匙。"
battle_pocket:
  names:
    jp_kana: バトルポケット
    jp_kanji: バトルポケット
    en: Battle Pocket
    fr: Poche de Combat
    it: Tasca lotta
    de: Kampftasche
    es: Bolsillo Combate
    ko: 배틀포켓
    zh_simp: 对战口袋
    zh_trad: 對戰口袋
  descriptions:
    jp_kana: "ー\nー\nー"
    jp_kanji: "ー\nー\nー"
    en: "-\n-\n-"
    fr: "-\n-\n-"
    it: "-\n-\n-"
    de: ー
    ko: "-\n-\n-"
    zh_simp: "ー\nー\nー"
    zh_trad: "ー\nー\nー"
beach_glass:
  names:
    jp_kana: うみべのガラス
    jp_kanji: うみべのガラス
    en: Beach Glass
    fr: Galet de Verre
    it: Vetro marino
    de: Strandscherbe
    es: Cristal Marino
    ko: 바닷가유리
    zh_simp: 海边的玻璃
    zh_trad: 海邊的玻璃
  descriptions:
    jp_kana: "なみに　もまれて　まるくなった\nいろの　ついた　ガラスへん。\nすこし　ざらざら　している。"
    jp_kanji: "波に　もまれて　丸くなった\n色のついた　ガラス片。\n少し　ざらざら　している。"
    en: "A piece of colored glass. Waves have rounded its edges.\nIt’s slightly rough to the touch."
    fr: "Un morceau de verre coloré arrondi par les vagues.\nSa texture est légèrement rugueuse."
    it: "Un piccolo pezzetto di vetro colorato che è stato\narrotondato dalle onde del mare. È un po’ ruvido\nal tatto."
    de: "Ein farbiges Stück Glas, das von den Wellen umspült\nund so abgeschliffen wurde. Es fühlt sich etwas rau an."
    es: "Cristal de colores pulido por la acción erosiva de las\nolas. Al tacto resulta algo áspero."
    ko: "파도에 깎여 둥글어진\n색이 있는 유리 파편.\n조금 거칠거칠하다."
    zh_simp: "受到波浪的洗刷从而\n变成圆形的彩色玻璃片。\n表面摸起来有点粗糙不平。"
    zh_trad: "受海浪沖刷而變圓的\n彩色玻璃碎片。\n表面有點粗糙。"
beast_ball:
  names:
    jp_kana: ウルトラボール
    jp_kanji: ウルトラボール
    en: Beast Ball
    fr: Ultra Ball
    it: UC Ball
    de: Ultraball
    es: Ente Ball
    ko: 울트라볼
    zh_simp: 究极球
    zh_trad: 究極球
  descriptions:
    jp_kana: "ポケモンが　つかまえにくい\nちょっと　かわった　ボール。"
    jp_kanji: "ポケモンが　捕まえにくい\nちょっと　変わった　ボール。"
    en: "A somewhat different Poké Ball that has a low success\nrate for catching a Pokémon."
    fr: "Une Poké Ball un peu spéciale avec laquelle\nil est assez difficile de capturer des Pokémon."
    it: Poké Ball speciale con cui è difficile catturare Pokémon.
    de: "Ein etwas ungewöhnlicher Ball, mit dem sich Pokémon\nnur schwer fangen lassen."
    es: "Un tipo especial de Poké Ball con la que resulta difícil\natrapar Pokémon."
    ko: "포켓몬을 잡기 어려운\n조금 특이한 볼."
    zh_simp: "有点与众不同的球。\n很难捕捉一般的宝可梦。"
    zh_trad: "有點與眾不同的球。\n很難捕捉寶可夢。"
beedrillite:
  names:
    jp_kana: スピアナイト
    jp_kanji: スピアナイト
    en: Beedrillite
    fr: Dardargnite
    it: Beedrillite
    de: Bibornit
    es: Beedrillita
    ko: 독침붕나이트
    zh_simp: 大针蜂进化石
    zh_trad: 大針蜂進化石
  descriptions:
    jp_kana: "スピアーに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "スピアーに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Beedrill hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Dardargnan, elle lui permet\nde méga-évoluer durant un combat."
    it: "Una delle misteriose Megapietre.\nData a Beedrill, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Bibor getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Beedrill en combate."
    ko: "독침붕에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "大针蜂携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "大針蜂攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
bellsprout_candy:
  names:
    jp_kana: マダツボミのアメ
    jp_kanji: マダツボミのアメ
    en: Bellsprout Candy
    fr: Bonbon Chétiflor
    it: Caramella Bellsprout
    de: Knofensa-Bonbon
    es: Caramelo Bellsprout
    ko: 모다피의사탕
    zh_simp: 喇叭芽的糖果
    zh_trad: 喇叭芽的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
belue_berry:
  names:
    jp_kana: ベリブのみ
    jp_kanji: ベリブのみ
    en: Belue Berry
    fr: Baie Myrte
    it: Baccartillo
    de: Myrtilbeere
    es: Baya Andano
    ko: 루베열매
    zh_simp: 靛莓果
    zh_trad: 靛莓果
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。\nふかふかのつちに　うめると\nベリブが　そだつ。"
    jp_kanji: "ポフィンの　材料。\nふかふかの土に　埋めると\nベリブが　育つ。"
    en: "A Poffin ingredient. Bury it in soft soil to grow a\nBelue Berry plant."
    fr: "Un ingrédient entrant dans la confection de Poffins.\nPlantez cette Baie dans un sol meuble et fertile\npour faire pousser un arbre à Baies Myrte."
    it: "Si usa per fare i poffin. Seminala nella terra soffice\nper far crescere una pianta di Baccartillo."
    de: "Eine Knursp-Zutat. Pflanze sie in weichen Lehmboden\nein, damit neue Myrtilbeeren wachsen."
    es: "Ingrediente para pokochos. Si se planta en tierra suelta,\nsaldrá una planta de Andano."
    ko: "포핀의 재료.\n푹신푹신한 땅에 심으면\n루베가 자란다."
    zh_simp: "宝芬的材料。\n埋在松软的土地里\n可以培育出靛莓。"
    zh_trad: "製作寶芬的材料。\n埋進鬆軟的泥土裡，\n長成後會結出靛莓。"
berry_juice:
  names:
    jp_kana: きのみジュース
    jp_kanji: きのみジュース
    en: Berry Juice
    fr: Jus de Baie
    it: Succodibacca
    de: Beerensaft
    es: Zumo de Baya
    ko: 나무열매쥬스
    zh_simp: 树果汁
    zh_trad: 樹果汁
  descriptions:
    jp_kana: "きのみ　１００％の　ジュース。\nポケモン　１ひきの　ＨＰを\n２０だけ　かいふくする。"
    jp_kanji: "きのみ　１００％の　ジュース。\nポケモン　１匹の　ＨＰを\n２０だけ　回復する。"
    en: "A 100 percent pure juice made of Berries.\nIt can be used to restore 20 HP to a single Pokémon."
    fr: "Une boisson 100 % pur Jus de Baie.\nRestaure 20 PV d’un Pokémon."
    it: "Bevanda di puro succo di bacche.\nRestituisce 20 PS a un Pokémon."
    de: "Hundertprozentiger Fruchtsaft, aus Beeren gekeltert.\nFüllt die KP eines Pokémon um 20 Punkte auf."
    es: "Zumo de bayas 100 % natural que restaura 20 PS de un\nPokémon."
    ko: "나무열매 100% 주스.\n포켓몬 1마리의 HP를\n20만큼 회복한다."
    zh_simp: "１００％树果果汁。\n能让１只宝可梦\n回复２０ＨＰ。"
    zh_trad: "１００％樹果果汁。\n能讓１隻寶可夢\n回復２０ＨＰ。"
berry_pots:
  names:
    jp_kana: きのみプランター
    jp_kanji: きのみプランター
    en: Berry Pots
    fr: Plante-Baies
    it: Piantabacche
    de: Pflanzset
    es: Plantabayas
    ko: 나무열매플랜터
    zh_simp: 树果种植盆
    zh_trad: 樹果種植盆
  descriptions:
    jp_kana: "いつでも　てがるに　きのみを\nそだてられる　けいたいしきの\nさいばい　ようき。"
    jp_kanji: "いつでも　手軽に　きのみを\n育てられる　携帯式の\n栽培容器。"
    en: "Handy containers for cultivating Berries wherever\nyou go."
    fr: "Un accessoire portatif qui permet de cultiver des Baies\nen tout lieu et à tout moment."
    it: "Accessorio tascabile che permette di coltivare\nbacche in qualunque luogo e momento."
    de: "Ein tragbares Utensil, das die Aufzucht von Pflanzen\naus Beeren ermöglicht, wo immer du auch gerade bist."
    es: "Dispositivo portátil de cultivo que permite plantar bayas\nen cualquier momento de forma sencilla."
    ko: "항상 손쉽게 나무열매를\n키울 수 있는 휴대형\n재배 용기."
    zh_simp: "可以随时轻松培育树果的\n便携式栽培容器。"
    zh_trad: "可以隨時輕鬆培育樹果的\n可攜式栽培容器。"
berry_sweet:
  names:
    jp_kana: ベリーアメざいく
    jp_kanji: ベリーアメざいく
    en: Berry Sweet
    fr: Baie en Sucre
    it: Bonbonbosco
    de: Zucker-Beere
    es: Confite Fruto
    ko: 베리사탕공예
    zh_simp: 野莓糖饰
    zh_trad: 野莓糖飾
  descriptions:
    jp_kana: "ベリーの　かたちを　した　アメざいく。\nマホミルに　もたせてあげると\nくるくる　まわって　よろこぶ。"
    jp_kanji: "ベリーの　形を　した　アメ細工。\nマホミルに　持たせてあげると\nくるくる　回って　喜ぶ。"
    en: "A berry-shaped sweet. When a Milcery\nholds this, it spins around happily."
    fr: "Un bonbon en forme de Baie.\nQuand on le donne à un Crèmy, il danse de bonheur."
    it: "Bonbon a forma di frutto di bosco. Se dato a Milcery,\nil Pokémon farà le piroette per la felicità."
    de: "Zuckerwerk in Form einer Beere. Gibt man es Hokumil\nzum Tragen, dreht es sich vor Freude im Kreis."
    es: "Figura de caramelo con forma de baya. Al dárselo a\nMilcery, se pone a girar rebosante de alegría."
    ko: "베리 모양의 사탕공예.\n마빌크에게 지니게 하면\n빙빙 돌며 기뻐한다."
    zh_simp: "浆果形状的工艺糖果。\n让小仙奶携带的话，\n会高兴地转圈圈。"
    zh_trad: "莓果形狀的工藝糖果。\n讓小仙奶攜帶的話，\n牠會高興得轉圈圈。"
big_malasada:
  names:
    jp_kana: おおきいマラサダ
    jp_kanji: おおきいマラサダ
    en: Big Malasada
    fr: Malasada Maxi
    it: Malasada maxi
    de: Maxi-Malasada
    es: Malasada Maxi
    ko: 큰 말라사다
    zh_simp: 大马拉萨达
    zh_trad: 大馬拉薩達
  descriptions:
    jp_kana: "アローラめいぶつの　あげパン。\nポケモン　１ひきの　じょうたいの\nいじょうを　すべて　かいふくする。"
    jp_kanji: "アローラ名物の　あげパン。\nポケモン　１匹の　状態の\n異常を　すべて　回復する。"
    en: "The Alola region’s local specialty—fried bread.\nIt can be used once to heal all the status conditions\nof a Pokémon."
    fr: "Une spécialité d’Alola.\nSoigne toutes les altérations de statut d’un Pokémon."
    it: "Frittella tipica di Alola.\nCura tutti i problemi di stato di un Pokémon."
    de: "Eine Spezialität aus Alola, die alle Statusprobleme eines\nPokémon heilt."
    es: "Fritura típica de Alola que cura todos los problemas de\nestado de un Pokémon."
    ko: "알로라의 명물인 튀긴 빵.\n포켓몬 1마리의\n상태 이상을 모두 회복한다."
    zh_simp: "阿罗拉特产的油炸面包。\n能治愈１只宝可梦的\n所有异常状态。"
    zh_trad: "阿羅拉特產的油炸麵包。\n能治癒１隻寶可夢的\n所有異常狀態。"
big_mushroom:
  names:
    jp_kana: おおきなキノコ
    jp_kanji: おおきなキノコ
    en: Big Mushroom
    fr: Gros Champi
    it: Grande Fungo
    de: Riesenpilz
    es: Seta Grande
    ko: 큰버섯
    zh_simp: 大蘑菇
    zh_trad: 大蘑菇
  descriptions:
    jp_kana: "おおきな　めずらしい　キノコ。\nいちぶの　マニアの　あいだでは\nとても　にんきが　たかい。"
    jp_kanji: "おおきな　珍しい　キノコ。\n一部の　マニアの　あいだでは\nとても　人気が　高い。"
    en: "A very large and rare mushroom. It’s popular with\na certain class of collectors."
    fr: "Un grand champignon assez rare.\nIl est très populaire parmi certains fans dévoués."
    it: "Fungo grande e raro.\nÈ molto apprezzato da alcuni intenditori."
    de: "Ein großer und seltener Pilz. Liebhaber dieses Pilzes\nfreuen sich ein Loch in den Bauch, wenn sie einen\nfinden."
    es: "Una gran seta que es poco común y muy popular entre\ndeterminados grupos de gourmets."
    ko: "크고 진귀한 버섯.\n일부 마니아 사이에서는\n매우 인기가 높다."
    zh_simp: "珍稀的大蘑菇。\n在一些爱好者中\n有着非常高的人气。"
    zh_trad: "稀奇的大蘑菇。\n在部分愛好者中\n非常受歡迎。"
big_nugget:
  names:
    jp_kana: でかいきんのたま
    jp_kanji: でかいきんのたま
    en: Big Nugget
    fr: Maxi Pépite
    it: Granpepita
    de: Riesennugget
    es: Maxipepita
    ko: 큰금구슬
    zh_simp: 巨大金珠
    zh_trad: 巨大金珠
  descriptions:
    jp_kana: "キラキラと　きんいろに　ひかる\nじゅんきんせいの　おおきな　たま。\nショップで　たかく　うれる。"
    jp_kanji: "キラキラと　金色に　光る\n純金製の　おおきな　玉。\nショップで　高く　売れる。"
    en: "A big nugget of pure gold that gives off a lustrous\ngleam. It can be sold at a high price to shops."
    fr: "Une pépite d’or pur qui brille d’un éclat magnifique.\nPeut être vendue à bon prix en magasin."
    it: "Grossa pepita d’oro puro dal luccichio sfavillante.\nSi può vendere a un prezzo piuttosto alto\nnei negozi."
    de: "Ein großes Nugget aus purem Gold, das einen\nschimmernden Glanz besitzt. Es ist von großem Wert."
    es: "Pepita grande de oro puro que desprende un brillo\nespectacular. Puede venderse a un precio muy alto en\nlas tiendas."
    ko: "금색으로 반짝반짝 빛나는\n순금으로 만들어진 큰 구슬.\n상점에서 비싸게 팔린다."
    zh_simp: "以纯金制成，\n闪着金光的大珠子。\n可以在商店高价出售。"
    zh_trad: "閃著金光的\n純金製大珠子。\n可以在商店高價出售。"
big_pearl:
  names:
    jp_kana: おおきなしんじゅ
    jp_kanji: おおきなしんじゅ
    en: Big Pearl
    fr: Grande Perle
    it: Grande Perla
    de: Riesenperle
    es: Perla Grande
    ko: 큰진주
    zh_simp: 大珍珠
    zh_trad: 大珍珠
  descriptions:
    jp_kana: "きれいな　ぎんいろに　ひかる\nかなり　おおつぶの　しんじゅ。\nショップで　たかく　うれる。"
    jp_kanji: "きれいな　銀色に　光る\nかなり　大粒の　真珠。\nショップで　高く　売れる。"
    en: "A rather large pearl that has a very nice silvery sheen.\nIt can be sold at a high price to shops."
    fr: "Une grosse perle qui brille d’une jolie couleur argent.\nPeut être vendue à bon prix en magasin."
    it: "Perla piuttosto grande dai graziosi riflessi\nargentei. Si può vendere a un prezzo piuttosto\nalto nei negozi."
    de: "Eine relativ große Perle, die in schönem Silber funkelt.\nSie ist von hohem Wert."
    es: "Brillante perla plateada de gran tamaño que puede\nvenderse a buen precio en las tiendas."
    ko: "예쁜 은색으로 빛나는\n상당히 큰 낱알의 진주.\n상점에서 비싸게 팔린다."
    zh_simp: "散发着美丽银辉\n且相当大颗的珍珠。\n可以在商店高价出售。"
    zh_trad: "散發著美麗銀輝的\n頗大顆的珍珠。\n可以在商店高價出售。"
big_root:
  names:
    jp_kana: おおきなねっこ
    jp_kanji: おおきなねっこ
    en: Big Root
    fr: Grosse Racine
    it: Granradice
    de: Großwurzel
    es: Raíz Grande
    ko: 큰뿌리
    zh_simp: 大根茎
    zh_trad: 大根莖
  descriptions:
    jp_kana: "もたせると　ＨＰを　すいとる　わざで\nいつもより　おおく　じぶんの　ＨＰを\nかいふくできる。"
    jp_kanji: "持たせると　ＨＰを　吸いとる　技で\nいつもより　おおく　自分の　ＨＰを\n回復できる。"
    en: "An item to be held by a Pokémon. It boosts the\namount of HP the holder restores from\nHP-stealing moves."
    fr: "Objet à tenir. Augmente la puissance des capacités\nvolant des PV."
    it: "Strumento da dare a un Pokémon.\nPotenzia le mosse ruba-PS facendo recuperare\nun maggior numero di PS."
    de: Ein Item zum Tragen. Verstärkt KP-stehlende Attacken.
    es: "El Pokémon que la lleva recupera más PS al usar\nmovimientos que drenan al objetivo."
    ko: "지니게 하면 HP 흡수 기술을 썼을 때\n여느 때보다 많은 HP를\n자신이 회복할 수 있다."
    zh_simp: "携带后，吸取ＨＰ的招式\n可以比平时更多地回复自己的ＨＰ。"
    zh_trad: "攜帶後，吸取ＨＰ的招式\n可以比平時回復更多\n自己的ＨＰ。"
bike:
  names:
    jp_kana: じてんしゃ
    jp_kanji: じてんしゃ
    en: Bike
    fr: Bicyclette
    it: Bicicletta
    de: Fahrrad
    es: Bici
    ko: 자전거
    zh_simp: 自行车
    zh_trad: 自行車
  descriptions:
    jp_kana: "ランニングシューズ　よりも\nはやく　はしることが　できる\nおりたたみしきの　じてんしゃ。"
    jp_kanji: "ランニングシューズ　よりも\n速く　走ることが　できる\n折りたたみ式の　じてんしゃ。"
    en: "A folding bike that enables a rider to get around\nmuch faster than with Running Shoes."
    fr: "Une Bicyclette pliable permettant de se déplacer\nbien plus rapidement qu’en marchant."
    it: "Bici pieghevole che permette di spostarsi\npiù velocemente che con le scarpe da corsa."
    de: Ein Klapprad, mit dem man schneller ist als zu Fuß.
    es: "Bicicleta plegable con la que se va más rápido que\ncorriendo."
    ko: "러닝슈즈보다도\n빨리 달릴 수 있는\n접이식 자전거다."
    zh_simp: "能比跑步鞋跑得还快的\n折叠式自行车。"
    zh_trad: "能跑得比跑步鞋還快的\n折疊式自行車。"
bike:yellow:
  names:
    jp_kana: じてんしゃ
    jp_kanji: じてんしゃ
    en: Bike
    fr: Bicyclette
    it: Bicicletta
    de: Fahrrad
    es: Bici
    ko: 자전거
    zh_simp: 自行车
    zh_trad: 自行車
  descriptions:
    jp_kana: "ランニングシューズ　よりも\nはやく　はしることが　できる\nおりたたみしきの　じてんしゃ。"
    jp_kanji: "ランニングシューズ　よりも\n速く　走ることが　できる\n折りたたみ式の　じてんしゃ。"
    en: "A folding bike that enables a rider to get around\nmuch faster than with Running Shoes."
    fr: "Une Bicyclette pliable permettant de se déplacer\nbien plus rapidement qu’en marchant."
    it: "Bici pieghevole che permette di spostarsi\npiù velocemente che con le scarpe da Corsa."
    de: Ein Klapprad, mit dem man schneller ist als zu Fuß.
    es: "Bicicleta plegable con la que se va más rápido que\ncorriendo."
    ko: "러닝슈즈보다도\n빨리 달릴 수 있는\n접이식 자전거다."
    zh_simp: "能比跑步鞋跑得还快的\n折叠式自行车。"
    zh_trad: "能跑得比跑步鞋還快的\n折疊式自行車。"
binding_band:
  names:
    jp_kana: しめつけバンド
    jp_kanji: しめつけバンド
    en: Binding Band
    fr: Bande Étreinte
    it: Legafascia
    de: Klammerband
    es: Banda Atadura
    ko: 조임밴드
    zh_simp: 紧绑束带
    zh_trad: 緊綁束帶
  descriptions:
    jp_kana: "しめつけるわざを　ほじょする　バンド。\nもたせると　しめつけるわざの\nいりょくが　つよく　なる。"
    jp_kanji: "締めつける技を　補助する　バンド。\n持たせると　締めつける技の\n威力が　強くなる。"
    en: "An item to be held by a Pokémon. It’s a band that\nincreases the power of binding moves used by\nthe holder."
    fr: "Objet à tenir. Augmente la puissance des attaques\nimmobilisantes telles que Ligotage ou Étreinte."
    it: "Strumento da dare a un Pokémon che aumenta\nla potenza di mosse come Avvolgibotta e\nLegatutto."
    de: "Ein Band, das die Stärke aller Klammerattacken des\nTrägers erhöht."
    es: "Banda que potencia los movimientos que estrujan al\nrival."
    ko: "조이기 기술을 보조하는 밴드.\n지니게 하면 조이기 기술의\n위력이 강해진다."
    zh_simp: "能增强绑紧招式的束带。\n携带后，绑紧招式的威力会变强。"
    zh_trad: "輔助綁緊類招式的束帶。\n攜帶後，綁緊類招式的\n威力會變強。"
black_apricorn:
  names:
    jp_kana: くろぼんぐり
    jp_kanji: くろぼんぐり
    en: Black Apricorn
    fr: Noigrume Noir
    it: Ghicocca Nera
    de: Aprikoko Schwarz
    es: Bonguri Negro
    ko: 검은규토리
    zh_simp: 黑球果
    zh_trad: 黑球果
  descriptions:
    jp_kana: "くろい　ぼんぐり。\nなんともいえない　においがする。"
    jp_kanji: "くろい　ぼんぐり。\nなんともいえない　においがする。"
    en: "A black Apricorn. It has a scent beyond\none’s experience."
    fr: "Un Noigrume de couleur noire.\nIl dégage un arôme indéfinissable."
    it: "Una ghicocca di colore nero.\nEmana un odore indefinibile."
    de: "Eine schwarze Aprikoko. Sie riecht irgendwie\nunbeschreiblich."
    es: Bonguri de color negro y aroma indescriptible.
    ko: "검은색의 규토리.\n말로는 표현할 수 없는 향기가 난다."
    zh_simp: "黑色的球果。\n有种无法形容的气味。"
    zh_trad: "黑色的球果。\n有種無法形容的氣味。"
black_belt:
  names:
    jp_kana: くろおび
    jp_kanji: くろおび
    en: Black Belt
    fr: Ceinture Noire
    it: Cinturanera
    de: Schwarzgurt
    es: Cinturón Negro
    ko: 검은띠
    zh_simp: 黑带
    zh_trad: 黑帶
  descriptions:
    jp_kana: "きが　ひきしまる　おび。\nもたせると　かくとうタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "気が　ひきしまる　帯。\n持たせると　かくとうタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon. This belt helps\nthe wearer to focus and boosts the power of\nFighting-type moves."
    fr: "Objet à tenir. Une ceinture d’art martial qui augmente\nla puissance des capacités de type Combat."
    it: "Strumento da dare a un Pokémon.\nCintura che potenzia la determinazione e le mosse\ndi tipo Lotta."
    de: "Ein Item zum Tragen. Ein Gürtel, der die\nEntschlossenheit sowie Attacken vom Typ Kampf\nverstärkt."
    es: "Debe llevarlo un Pokémon. Aumenta la concentración y\nfortalece los movimientos de tipo Lucha."
    ko: "마음을 긴장시키는 띠.\n지니게 하면 격투타입\n기술의 위력이 올라간다."
    zh_simp: "能振作精神的带子。\n携带后，格斗属性的\n招式威力就会提高。"
    zh_trad: "能振作精神的帶子。\n攜帶後，格鬥屬性的\n招式威力就會提高。"
black_flute:
  names:
    jp_kana: くろいビードロ
    jp_kanji: くろいビードロ
    en: Black Flute
    fr: Flûte Noire
    it: Flauto Nero
    de: Schwarze Flöte
    es: Flauta Negra
    ko: 검정비드로
    zh_simp: 黑色玻璃哨
    zh_trad: 黑色玻璃哨
  descriptions:
    jp_kana: "くろいガラスで　できた　ふえ。\nつかった　ばしょで　つよいポケモンと\nそうぐう　しやすくなる。"
    jp_kanji: "黒いガラスで　できた　笛。\n使った　場所で　強いポケモンと\n遭遇　しやすくなる。"
    en: "A flute made from black glass. It makes it easier to\nencounter strong Pokémon in the place you use it."
    fr: "Un jouet en forme de flûte en verre noir.\nAugmente les chances de rencontrer des Pokémon\nsauvages puissants là où l’on en joue."
    it: "Flauto fatto di vetro nero. Aumenta le probabilità\ndi incontrare Pokémon forti nell’area in cui viene\nusato."
    de: "Eine Spielzeugflöte aus schwarzem Glas. Erhöht am\nEinsatzort die Wahrscheinlichkeit, starken wilden\nPokémon zu begegnen."
    es: "Una flauta de cristal negro cuyas notas atraen a\nPokémon salvajes más fuertes al lugar en el que\nse usa."
    ko: "검은 유리로 만들어진 피리.\n사용한 장소에서 강한 포켓몬과\n만나기 쉬워진다."
    zh_simp: "以黑色玻璃制成的哨子。\n在使用的地方更容易\n遇到强大的宝可梦。"
    zh_trad: "以黑色玻璃製成的笛子。\n在使用的地方更容易\n遇到強大的寶可夢。"
black_glasses:
  names:
    jp_kana: くろいメガネ
    jp_kanji: くろいメガネ
    en: Black Glasses
    fr: Lunettes Noires
    it: Occhialineri
    de: Schattenbrille
    es: Gafas de Sol
    ko: 검은안경
    zh_simp: 黑色眼镜
    zh_trad: 黑色眼鏡
  descriptions:
    jp_kana: "あやしく　みえる　メガネ。\nもたせると　あくタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "怪しく　みえる　メガネ。\n持たせると　あくタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon. It’s a pair of\nshady-looking glasses that boost the power of\nDark-type moves."
    fr: "Objet à tenir. Une paire de lunettes à l’aspect\nlouche qui augmente la puissance des capacités\nde type Ténèbres."
    it: "Strumento da dare a un Pokémon.\nInquietante paio di occhiali che potenzia le mosse\ndi tipo Buio."
    de: "Ein Item zum Tragen. Eine dunkle Brille, die Attacken\nvom Typ Unlicht verstärkt."
    es: "Debe llevarlas un Pokémon. Fortalecen los\nmovimientos de tipo Siniestro."
    ko: "괴상하게 보이는 안경.\n지니게 하면 악타입\n기술의 위력이 올라간다."
    zh_simp: "看上去很奇怪的眼镜。\n携带后，恶属性的\n招式威力就会提高。"
    zh_trad: "看起來很奇怪的眼鏡。\n攜帶後，惡屬性的\n招式威力就會提高。"
black_mane_hair:
  names:
    jp_kana: くろいたてがみ
    jp_kanji: くろいたてがみ
    en: Black Mane Hair
    fr: Crins Sombres
    it: Crini neri
    de: Dunkles Rosshaar
    es: Crin Negra
    ko: 검은갈기
    zh_simp: 黑色鬃毛
    zh_trad: 黑色鬃毛
  descriptions:
    jp_kana: "ほうじょうのおうの　あいば\nレイスポスの　たてがみ。\nなめらかな　はだざわりだ。"
    jp_kanji: "豊穣の王の　愛馬\nレイスポスの　たてがみ。\nなめらかな　肌ざわりだ。"
    en: "Mane hair that belonged to the King of Bountiful\nHarvests’ beloved steed, Spectrier. The hair is very\nsmooth to the touch."
    fr: "Des crins de Spectreval, le fidèle destrier du Seigneur\ndes récoltes. Ils sont soyeux au toucher."
    it: "Un ciuffo di crini di Spectrier, il fedele destriero\ndel Re dell’abbondanza. Sono morbidi al tatto."
    de: "Eine Haarsträhne von Phantoross, dem treuen Ross des\nKönigs der reichen Ernte. Sie fühlt sich weich und\ngeschmeidig an."
    es: "Parte de la crin de Spectrier, el amado corcel del Rey de\nlas Cosechas. Es suave al tacto."
    ko: "풍요의 왕의 애마\n레이스포스의 갈기.\n촉감이 매우 부드럽다."
    zh_simp: "丰饶之王的爱马\n灵幽马的鬃毛。\n摸起来非常柔顺。"
    zh_trad: "豐饒之王的愛馬\n「靈幽馬」的鬃毛。\n觸感柔滑。"
black_sludge:
  names:
    jp_kana: くろいヘドロ
    jp_kanji: くろいヘドロ
    en: Black Sludge
    fr: Boue Noire
    it: Fangopece
    de: Giftschleim
    es: Lodo Negro
    ko: 검은진흙
    zh_simp: 黑色污泥
    zh_trad: 黑色污泥
  descriptions:
    jp_kana: "もたせると　どくタイプの　ポケモンは\nすこしずつ　ＨＰを　かいふくする。\nそれいがいは　ＨＰが　へってしまう。"
    jp_kanji: "持たせると　どくタイプの　ポケモンは\n少しずつ　ＨＰを　回復する。\nそれ以外は　ＨＰが　減ってしまう。"
    en: "An item to be held by a Pokémon. It gradually\nrestores HP to Poison-type Pokémon. It damages\nany other type."
    fr: "Objet à tenir. Restaure peu à peu les PV des Pokémon\nde type Poison. Inflige des dégâts à tous\nles autres types."
    it: "Strumento da dare a un Pokémon.\nRestituisce gradualmente PS ai Pokémon di tipo\nVeleno, ma danneggia tutti gli altri."
    de: "Ein Item zum Tragen, das einem Gift-Pokémon nach und\nnach KP zurückgibt, anderen Pokémon aber Schaden\nzufügt."
    es: "Si lo lleva un Pokémon de tipo Veneno, restaura\ngradualmente sus PS durante el combate. Si es de otro\ntipo, sus PS se reducirán."
    ko: "지니게 하면 독타입의 포켓몬은\n조금씩 HP를 회복한다.\n그 이외의 타입은 HP가 줄어 버린다."
    zh_simp: "携带后，毒属性的宝可梦\n会缓缓回复ＨＰ。\n其他属性的话，ＨＰ则会减少。"
    zh_trad: "攜帶後，毒屬性的寶可夢\n會緩緩回復ＨＰ。\n其他屬性的話，ＨＰ則會減少。"
blastoisinite:
  names:
    jp_kana: カメックスナイト
    jp_kanji: カメックスナイト
    en: Blastoisinite
    fr: Tortankite
    it: Blastoisite
    de: Turtoknit
    es: Blastoisita
    ko: 거북왕나이트
    zh_simp: 水箭龟进化石
    zh_trad: 水箭龜進化石
  descriptions:
    jp_kana: "カメックスに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "カメックスに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Blastoise hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Tortank, elle lui permet de\nméga-évoluer durant un combat."
    it: "Un esemplare delle misteriose Megapietre.\nData a Blastoise, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Turtok getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Blastoise en combate."
    ko: "거북왕에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让水箭龟携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓水箭龜攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
blazikenite:
  names:
    jp_kana: バシャーモナイト
    jp_kanji: バシャーモナイト
    en: Blazikenite
    fr: Braségalite
    it: Blazikenite
    de: Lohgocknit
    es: Blazikenita
    ko: 번치코나이트
    zh_simp: 火焰鸡进化石
    zh_trad: 火焰雞進化石
  descriptions:
    jp_kana: "バシャーモに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "バシャーモに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Blaziken hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Braségali, elle lui permet de\nméga-évoluer durant un combat."
    it: "Un esemplare delle misteriose Megapietre.\nData a Blaziken, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Lohgock getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Blaziken en combate."
    ko: "번치코에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让火焰鸡携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓火焰雞攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
blue_apricorn:
  names:
    jp_kana: あおぼんぐり
    jp_kanji: あおぼんぐり
    en: Blue Apricorn
    fr: Noigrume Bleu
    it: Ghicocca Blu
    de: Aprikoko Blau
    es: Bonguri Azul
    ko: 파란규토리
    zh_simp: 蓝球果
    zh_trad: 藍球果
  descriptions:
    jp_kana: "あおい　ぼんぐり。\nすこし　あおくさい　かおりがする。"
    jp_kanji: "あおい　ぼんぐり。\n少し　あおくさい　かおりがする。"
    en: A blue Apricorn. It smells a bit like grass.
    fr: "Un Noigrume de couleur bleue.\nIl dégage un arôme un peu aigre."
    it: "Una ghicocca di colore blu.\nEmana un odore un po’ acre."
    de: Eine blaue Aprikoko. Sie riecht ein wenig unreif.
    es: Bonguri de color azul y aroma tierno.
    ko: "파란색의 규토리.\n약간 풋내가 난다."
    zh_simp: "蓝色的球果。\n略有一股青草的香味。"
    zh_trad: "藍色的球果。\n略有一股青草的香味。"
blue_card:
  names:
    jp_kana: ブルーカード
    jp_kanji: ブルーカード
    en: Blue Card
    fr: Carte Bleue
    it: Carta Blu
    de: Blaue Karte
    es: Tarjeta Azul
    ko: 블루카드
    zh_simp: 蓝卡
    zh_trad: 藍卡
  descriptions:
    jp_kana: "「アオイのあいことば」　ばんぐみの\nポイントを　ためる　カード。"
    jp_kanji: "「アオイのあいことば」　番組の\nポイントを　貯める　カード。"
    en: A card to save points for the Buena’s Password show.
    fr: "Une carte pour accumuler les points de l’émission\n« Le Mot de Passe de Buena »."
    it: "Carta per accumulare i punti del programma\n\"Password Show\" di Buena."
    de: "Eine Karte, auf der die Punkte für „Passwort mit Buena“\nfestgehalten werden."
    es: "Tarjeta para conseguir puntos con el programa de\nradio Las contraseñas de Buena."
    ko: "“규화의 암호” 방송의\n포인트를 모으는 카드."
    zh_simp: "可以将《葵妍的密语》\n这节目的点数积攒起来的卡片。"
    zh_trad: "可以將《葵妍的密語》\n這節目的點數\n儲存起來的卡片。"
blue_flute:
  names:
    jp_kana: あおいビードロ
    jp_kanji: あおいビードロ
    en: Blue Flute
    fr: Flûte Bleue
    it: Flauto Blu
    de: Blaue Flöte
    es: Flauta Azul
    ko: 파랑비드로
    zh_simp: 蓝色玻璃哨
    zh_trad: 藍色玻璃哨
  descriptions:
    jp_kana: "あおいガラスで　できた　ふえ。\nねむり　じょうたいを\nかいふくする。"
    jp_kanji: "青いガラスで　できた　笛。\n眠り状態を　回復する。"
    en: "A flute made from blue glass. It awakens\nsleeping Pokémon."
    fr: "Un jouet en forme de flûte en verre bleu.\nRéveille un Pokémon endormi."
    it: "Flauto fatto di vetro blu. Ha il potere di risvegliare\ni Pokémon addormentati."
    de: "Eine Spielzeugflöte aus blauem Glas. Weckt ein\nschlafendes Pokémon auf."
    es: "Una flauta de cristal azul cuyas notas despiertan a un\nPokémon del sueño."
    ko: "파란 유리로 만들어진 피리.\n잠듦 상태를\n회복한다."
    zh_simp: "以蓝色玻璃制成的哨子。\n可以治愈睡眠状态。"
    zh_trad: "以藍色玻璃製成的笛子。\n可以治癒睡眠狀態。"
blue_orb:
  names:
    jp_kana: あいいろのたま
    jp_kanji: あいいろのたま
    en: Blue Orb
    fr: Gemme Bleue
    it: Gemma blu
    de: Blauer Edelstein
    es: Prisma Azul
    ko: 쪽빛구슬
    zh_simp: 靛蓝色宝珠
    zh_trad: 靛藍色寶珠
  descriptions:
    jp_kana: "ホウエンちほうの　でんせつと\nふかい　かかわりが　あると　いわれる\nあおく　かがやく　たま。"
    jp_kanji: "ホウエン地方の　伝説と\n深い　関わりが　あると　いわれる\nあおく　かがやく　たま。"
    en: "A shiny blue orb that is said to have a legend tied\nto it. It’s known to have a deep connection with the\nHoenn region."
    fr: "Une gemme céruléenne dont on dit qu’elle a un lien\ntrès étroit avec les légendes de Hoenn."
    it: "Gemma con riflessi blu, che pare essere\nstrettamente legata alle leggende della regione\ndi Hoenn."
    de: "Ein blau schimmernder Stein, von dem in den Legenden\nder Hoenn-Region berichtet wird."
    es: "Piedra añil que, según dicen, guarda una estrecha\nrelación con las leyendas de Hoenn."
    ko: "호연지방의 전설과\n깊은 연관이 있다고 전해지는\n파랗게 빛나는 구슬."
    zh_simp: "散发着蓝色光辉的宝珠。\n据说和丰缘地区的传说渊源颇深。"
    zh_trad: "散發著藍色光輝的寶珠。\n據說和豐緣地區的傳說\n有著很深的淵源。"
blue_petal:
  names:
    jp_kana: あおのはなびら
    jp_kanji: あおのはなびら
    en: Blue Petal
    fr: Pétale Bleu
    it: Petalo azzurro
    de: Blaues Blatt
    es: Pétalo Azul
    ko: 파랑꽃잎
    zh_simp: 蓝色花瓣
    zh_trad: 藍色花瓣
  descriptions:
    jp_kana: "マツリカのしれんで　スイレンから\nもらえる　はなびらの　おしばな。\n７しゅるい　あつめるのが　もくてき。"
    jp_kanji: "マツリカの試練で　スイレンから\nもらえる　はなびらの　押し花。\n７種類　集めるのが　目的。"
    en: "A pressed flower petal you receive from Lana\nduring Mina’s trial. The goal is to collect seven\ndifferent kinds of petals."
    fr: "Un pétale pressé que Néphie vous a remis lors\nde l’Épreuve d’Oléa. Il y en a sept à collectionner."
    it: "Petalo di fiore pressato ottenuto da Suiren durante\nla prova di Rika. L’obiettivo è ricevere sette petali\ndiversi."
    de: "Ein gepresstes Blütenblatt, das man im Rahmen von\nMatsurikas Prüfung von Tracy erhält. Ziel ist es,\nsieben verschiedene Blütenblätter zu sammeln."
    es: "Pétalo prensado recibido de manos de Nereida durante\nla prueba de Rika. El objetivo es reunir siete distintos."
    ko: "말리화의 시련에서 수련에게\n받을 수 있는 꽃잎의 압화.\n7종류 모으는 것이 목적."
    zh_simp: "在茉莉的考验中，\n能从水莲那里得到的干花花瓣。\n目标是集齐７种。"
    zh_trad: "在茉莉的考驗中，\n從水蓮那裡得到的壓花花瓣。\n目標是集滿７種花瓣。"
blue_scarf:
  names:
    jp_kana: あおいバンダナ
    jp_kanji: あおいバンダナ
    en: Blue Scarf
    fr: Foulard Bleu
    it: Fascia Blu
    de: Blauer Schal
    es: Pañuelo Azul
    ko: 파랑밴드
    zh_simp: 蓝色头巾
    zh_trad: 藍色頭巾
  descriptions:
    jp_kana: "もたせて　スーパーコンテストショー！に\nさんかすると　その　ポケモンは\nいつもより　うつくしく　みられる。"
    jp_kanji: "持たせて　スーパーコンテストショー！に\n参加すると　その　ポケモンは\nいつもより　うつくしく　みられる。"
    en: "An item to be held by a Pokémon. During a Super\nContest Show, it raises the Beauty of the\nPokémon holding it."
    fr: "Objet à tenir. Augmente la Beauté d’un Pokémon\nlors du Super Show Concours."
    it: "Strumento da dare a un Pokémon. Ne aumenta\nla Bellezza in una Super Gara-show."
    de: "Ein Item zum Tragen. Trainer erhöhen damit in der\nSuper-Wettbewerbs-Show die Schönheit ihres Pokémon."
    es: "Debe llevarlo un Pokémon. Aumenta la belleza en las\nGalas Superconcurso."
    ko: "지니게 하여 슈퍼 콘테스트 쇼!에 참가하면\n그 포켓몬은 여느 때보다 아름답게 보인다."
    zh_simp: "携带它去参加超级华丽大赛的\n宝可梦会比平时看上去更加美丽。"
    zh_trad: "攜帶它去參加超級華麗大賽的\n寶可夢會比平時看起來更加美麗。"
blue_shard:
  names:
    jp_kana: あおいかけら
    jp_kanji: あおいかけら
    en: Blue Shard
    fr: Tesson Bleu
    it: Coccio Blu
    de: Indigostück
    es: Parte Azul
    ko: 파랑조각
    zh_simp: 蓝色碎片
    zh_trad: 藍色碎片
  descriptions:
    jp_kana: "あおい　ちいさな　かけら。\nむかしに　つくられた　なにかの\nどうぐの　いちぶ　らしい。"
    jp_kanji: "青い　小さな　かけら。\n昔に　つくられた　なにかの\n道具の　一部らしい。"
    en: "A small blue shard. It appears to be a fragment of\nsome sort of implement made long ago."
    fr: "Un petit tesson bleu.\nIl semble provenir d’un objet très ancien."
    it: "Un piccolo coccio blu che con ogni probabilità\nè un frammento di un antico strumento."
    de: "Eine blaue Scherbe eines antiken Werkzeugs, das vor\nlanger Zeit angefertigt wurde."
    es: "Un pequeño fragmento azul. Parece formar parte de\nalgún tipo de herramienta antigua."
    ko: "파란 작은 조각.\n옛날에 만들어진 어떤\n도구의 일부인 듯하다."
    zh_simp: "蓝色的小碎片。\n好像是以前制作的\n某道具的一部分。"
    zh_trad: "藍色的小碎片。\n好像是以前製作的\n某道具的一部分。"
bluk_berry:
  names:
    jp_kana: ブリーのみ
    jp_kanji: ブリーのみ
    en: Bluk Berry
    fr: Baie Remu
    it: Baccamora
    de: Morbbeere
    es: Baya Oram
    ko: 블리열매
    zh_simp: 墨莓果
    zh_trad: 墨莓果
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。\nふかふかのつちに　うめると\nブリーが　そだつ。"
    jp_kanji: "ポフィンの　材料。\nふかふかの土に　埋めると\nブリーが　育つ。"
    en: "A Poffin ingredient. Bury it in soft soil to grow a\nBluk Berry plant."
    fr: "Un ingrédient entrant dans la confection de Poffins.\nPlantez cette Baie dans un sol meuble et fertile\npour faire pousser un arbre à Baies Remu."
    it: "Si usa per fare i poffin. Seminala nella terra soffice\nper far crescere una pianta di Baccamora."
    de: "Eine Knursp-Zutat. Pflanze sie in weichen Lehmboden\nein, damit neue Morbbeeren wachsen."
    es: "Ingrediente para pokochos. Si se planta en tierra suelta,\nsaldrá una planta de Oram."
    ko: "포핀의 재료.\n푹신푹신한 땅에 심으면\n블리가 자란다."
    zh_simp: "宝芬的材料。\n埋在松软的土地里\n可以培育出墨莓。"
    zh_trad: "製作寶芬的材料。\n埋進鬆軟的泥土裡，\n長成後會結出墨莓。"
blunder_policy:
  names:
    jp_kana: からぶりほけん
    jp_kanji: からぶりほけん
    en: Blunder Policy
    fr: Assurance Échec
    it: Fiascopolizza
    de: Fehlschlagschutz
    es: Seguro Fallo
    ko: 허탕보험
    zh_simp: 打空保险
    zh_trad: 打空保險
  descriptions:
    jp_kana: "めいちゅうりつに　よって\nわざが　はずれたとき\nすばやさが　ぐーんと　あがる。"
    jp_kanji: "命中率に　よって\n技が　はずれたとき\n素早さが　ぐーんと　上がる。"
    en: "Raises Speed sharply when a Pokémon misses with a\nmove because of accuracy."
    fr: "Si un Pokémon manque sa cible parce qu’une capacité\na peu de Précision, sa Vitesse augmente beaucoup."
    it: "Se una mossa non va a segno a causa della scarsa\nprecisione, la Velocità aumenta considerevolmente."
    de: "Schlägt eine Attacke des Anwenders mangels\nGenauigkeit fehl, steigt im Gegenzug dessen\nInitiative stark an."
    es: "Aumenta mucho la Velocidad cuando el Pokémon yerra\nel movimiento debido a la precisión."
    ko: "명중률에 의해\n기술이 빗나갔을 때\n스피드가 크게 올라간다."
    zh_simp: "招式因命中率影响而落空时，\n速度会大幅提高。"
    zh_trad: "當招式受命中率影響\n而未能擊中對手時，\n自己的速度將大幅提高。"
bobs_food_tin:
  names:
    jp_kana: ボブのかんづめ
    jp_kanji: ボブのかんづめ
    en: Bob’s Food Tin
    fr: Conserve de Bob
    it: Lattina Gustavo
    de: Pauls Feinkost
    es: Lata de Darren
    ko: 밥의통조림
    zh_simp: 饱伯罐头
    zh_trad: 飽伯罐頭
  descriptions:
    jp_kana: "キャンプの　りょうりに　つかう\nしょくざいの　いっしゅ。ボブが　うりだした\nかんづめが　なぜか　ガラルで　にんきだ。"
    jp_kanji: "キャンプの　料理に　使う\n食材の　一種。ボブが　売り出した\n缶詰が　なぜか　ガラルで　人気だ。"
    en: "One of the many ingredients that can be used for\ncooking at your camp. The tinned food that Bob sells\nis curiously popular in Galar."
    fr: "Un ingrédient de cuisine pour le camping.\nCette conserve, vendue par Bob, connaît un succès\nétonnant à Galar."
    it: "Uno degli ingredienti che puoi usare per cucinare\nin campeggio. Queste lattine vendute da Gustavo\nsono particolarmente amate dagli abitanti di Galar."
    de: "Eine Zutat für PokéCamping-Mahlzeiten. Diese von\nLeckerpaul vertriebene Dosennahrung erfreut sich in\nGalar überraschend hoher Beliebtheit."
    es: "Un ingrediente para cocinar en el campamento. Las\nconservas de Darren son muy apreciadas por todo\nGalar."
    ko: "캠프 요리에 사용되는\n식재료 중 하나. 밥이 파는 통조림은\n어째선지 가라르에서 인기다."
    zh_simp: "在露营营地制作料理时会使用的\n一种食材。不知是什么原因，\n饱伯卖的罐头在伽勒尔特别受欢迎。"
    zh_trad: "製作露營料理時使用的食材之一。\n飽伯賣的罐頭不知為何\n在伽勒爾很受歡迎。"
boiled_egg:
  names:
    jp_kana: ゆでタマゴ
    jp_kanji: ゆでタマゴ
    en: Boiled Egg
    fr: Œuf Dur
    it: Uovo sodo
    de: Gekochtes Ei
    es: Huevo Duro
    ko: 삶은알
    zh_simp: 水煮蛋
    zh_trad: 水煮蛋
  descriptions:
    jp_kana: "キャンプの　りょうりに　つかう\nしょくざいの　いっしゅ。たった　ひとつの\nゆでタマゴが　クオリティを　あげてくれる。"
    jp_kanji: "キャンプの　料理に　使う\n食材の　一種。たった　一つの\nゆでタマゴが　クオリティを　あげてくれる。"
    en: "One of the many ingredients that can be used for\ncooking at your camp. Even just one boiled egg can\nreally enhance a dish."
    fr: "Un ingrédient de cuisine pour le camping.\nLe simple ajout d’un œuf donne une touche\nde prestige à tous les plats."
    it: "Uno degli ingredienti che puoi usare per cucinare\nin campeggio. Basta una di queste Uova sode\nper creare un piatto d’alta qualità."
    de: "Eine Zutat für PokéCamping-Mahlzeiten. Ein einzelnes\ngekochtes Ei reicht aus, um die Qualität einer Speise\ndeutlich anzuheben."
    es: "Un ingrediente para cocinar en el campamento. Con tan\nsolo uno de estos huevos se consigue un plato gourmet."
    ko: "캠프 요리에 사용되는\n식재료 중 하나. 단 하나의 삶은알이\n요리의 퀄리티를 높여 준다."
    zh_simp: "在露营营地制作料理时会使用的\n一种食材。只需一个水煮蛋，\n整道料理的水准都能得到升华。"
    zh_trad: "製作露營料理時使用的食材之一。\n只需一顆水煮蛋就能讓\n整道料理的水準向上提升。"
bold_mint:
  names:
    jp_kana: ずぶといミント
    jp_kanji: ずぶといミント
    en: Bold Mint
    fr: Aromate Assuré
    it: Menta Sicura
    de: Kühn-Minze
    es: Menta Osada
    ko: 대담민트
    zh_simp: 大胆薄荷
    zh_trad: 大膽薄荷
  descriptions:
    jp_kana: "ポケモンに　かおりを　かがせると\nぼうぎょが　あがりやすく　なるが\nこうげきは　あがりにくくなる　ミント。"
    jp_kanji: "ポケモンに　香りを　かがせると\n防御が　上がりやすく　なるが\n攻撃は　上がりにくくなる　ミント。"
    en: "When a Pokémon smells this mint, its Defense will grow\nmore easily, but its Attack will grow more slowly."
    fr: "Si un Pokémon hume cet aromate, sa Défense\nmontera plus facilement, mais son Attaque\nse développera plus lentement."
    it: "Quando un Pokémon ne sente il profumo, la sua Difesa\naumenta più facilmente a scapito dell’Attacco."
    de: "Lässt man ein Pokémon an dieser Minze schnuppern,\nsteigt seine Verteidigung schneller, aber sein Angriff\numso langsamer."
    es: "Cuando un Pokémon percibe su aroma, aumenta con\nmás facilidad su Defensa, en detrimento de su Ataque."
    ko: "포켓몬에게 향기를 맡게 하면\n방어가 오르기 쉬워지지만\n공격이 오르기 어려워지는 민트."
    zh_simp: "宝可梦闻了这种薄荷之后，\n会令防御容易提高，\n而攻击则难以提高。"
    zh_trad: "讓寶可夢聞這種薄荷的氣味，\n會令防禦變得容易提高，\n但攻擊則難以提高。"
boost_mulch:
  names:
    jp_kana: ぐんぐんこやし
    jp_kanji: ぐんぐんこやし
    en: Boost Mulch
    fr: Fertibérance
    it: Fertilcopioso
    de: Wuchermulch
    es: Abono Fructífero
    ko: 부쩍부쩍비료
    zh_simp: 劲劲肥
    zh_trad: 勁勁肥
  descriptions:
    jp_kana: "きのみを　そだてるときの　ひりょう。\nしかし　ホウエンちほうの　つちには\nまるで　なじまないので　こうかが　ない。"
    jp_kanji: "きのみを　育てるときの　肥料。\nしかし　ホウエン地方の　土には\nまるで　なじまないので　効果が　ない。"
    en: "A fertilizer for growing Berries. However, it appears\nto be unsuitable for the soil in the Hoenn region and\nhas no effect."
    fr: "Un engrais à utiliser sur un sol meuble.\nIl n’est cependant pas adapté aux terres de Hoenn\net n’y a aucun effet."
    it: "Fertilizzante usato per coltivare le bacche.\nTuttavia, non ha effetto a Hoenn, perché\nnon è adatto al terreno della regione."
    de: "Mulch zur Nutzung auf Beerenfeldern. Durch seine\nUnverträglichkeit mit den Böden in Hoenn bleibt sein\nEinsatz dort ohne Wirkung."
    es: "Un fertilizante usado para el cultivo de bayas. Parece\nque no se asienta bien en el suelo de Hoenn, por lo\nque no tiene efecto en esta región."
    ko: "나무열매를 키울 때 사용하는 비료.\n그러나 호연지방의 흙에는\n전혀 맞지 않기에 효과가 없다."
    zh_simp: "培育树果时的肥料。\n但完全不适合丰缘地区的土壤，\n所以没什么效果。"
    zh_trad: "培育樹果時的肥料。\n但完全不適合豐緣地區的土壤，\n所以沒什麼效果。"
bottle_cap:
  names:
    jp_kana: ぎんのおうかん
    jp_kanji: ぎんのおうかん
    en: Bottle Cap
    fr: Capsule d’Argent
    it: Tappo d’argento
    de: Silberkronkorken
    es: Chapa Plateada
    ko: 은왕관
    zh_simp: 银色王冠
    zh_trad: 銀色王冠
  descriptions:
    jp_kana: "ぎんいろの　きれいな　おうかん。\nわたすと　よろこぶ　ひともいる。"
    jp_kanji: "銀色の　きれいな　王冠。\n渡すと　よろこぶ　人もいる。"
    en: "A beautiful bottle cap that gives off a silver gleam.\nSome people are happy to receive one."
    fr: "Une jolie capsule en argent.\nCertaines personnes adorent en recevoir."
    it: "Un bel tappo a corona color argento, molto\napprezzato da alcuni."
    de: "Ein hübscher silberner Kronkorken. Es gibt Leute,\ndie sich sehr darüber freuen würden!"
    es: "Una bonita chapa de color plata. Hay gente que las\naprecia mucho."
    ko: "은색의 아름다운 왕관.\n받으면 좋아하는 사람도 있다."
    zh_simp: "银色的美丽王冠。\n有些人收到它会很高兴。"
    zh_trad: "銀色的美麗王冠。\n有些人收到它會很高興。"
brave_mint:
  names:
    jp_kana: ゆうかんミント
    jp_kanji: ゆうかんミント
    en: Brave Mint
    fr: Aromate Brave
    it: Menta Audace
    de: Mutig-Minze
    es: Menta Audaz
    ko: 용감민트
    zh_simp: 勇敢薄荷
    zh_trad: 勇敢薄荷
  descriptions:
    jp_kana: "ポケモンに　かおりを　かがせると\nこうげきが　あがりやすく　なるが\nすばやさは　あがりにくくなる　ミント。"
    jp_kanji: "ポケモンに　香りを　かがせると\n攻撃が　上がりやすく　なるが\n素早さは　上がりにくくなる　ミント。"
    en: "When a Pokémon smells this mint, its Attack will grow\nmore easily, but its Speed will grow more slowly."
    fr: "Si un Pokémon hume cet aromate, son Attaque\nmontera plus facilement, mais sa Vitesse\nse développera plus lentement."
    it: "Quando un Pokémon ne sente il profumo, il suo Attacco\naumenta più facilmente a scapito della Velocità."
    de: "Lässt man ein Pokémon an dieser Minze schnuppern,\nsteigt sein Angriff schneller, aber seine Initiative umso\nlangsamer."
    es: "Cuando un Pokémon percibe su aroma, aumenta\ncon más facilidad su Ataque, en detrimento de su\nVelocidad."
    ko: "포켓몬에게 향기를 맡게 하면\n공격이 오르기 쉬워지지만\n스피드가 오르기 어려워지는 민트."
    zh_simp: "宝可梦闻了这种薄荷之后，\n会令攻击容易提高，\n而速度则难以提高。"
    zh_trad: "讓寶可夢聞這種薄荷的氣味，\n會令攻擊變得容易提高，\n但速度則難以提高。"
bread:
  names:
    jp_kana: しょくパン
    jp_kanji: しょくパン
    en: Bread
    fr: Pain de Mie
    it: Pan carré
    de: Toastbrot
    es: Pan de Molde
    ko: 식빵
    zh_simp: 吐司面包
    zh_trad: 吐司麵包
  descriptions:
    jp_kana: "キャンプの　りょうりに　つかう\nしょくざいの　いっしゅ。おさらに　のこった\nカレーを　ふくのにも　ちょうほうする。"
    jp_kanji: "キャンプの　料理に　使う\n食材の　一種。お皿に　残った\nカレーを　拭くのにも　重宝する。"
    en: "One of the many ingredients that can be used for\ncooking at your camp. An indispensable tool for\nmopping up that extra curry left on your plate."
    fr: "Un ingrédient de cuisine pour le camping.\nParfait pour saucer le curry quand on a fini son assiette."
    it: "Uno degli ingredienti che puoi usare per cucinare\nin campeggio. Queste fette di pane sono perfette\nper fare la scarpetta dopo aver mangiato il curry."
    de: "Eine Zutat für PokéCamping-Mahlzeiten. Eignet sich\nbestens, um damit Curryreste aufzutunken."
    es: "Un ingrediente para cocinar en el campamento. No hay\nplacer mayor que usar el pan para rebañar la salsa que\nqueda en el plato."
    ko: "캠프 요리에 사용되는\n식재료 중 하나. 접시에 남은\n카레를 닦아내는 데도 유용하다."
    zh_simp: "在露营营地制作料理时会使用的\n一种食材。同时也是用于吸干盘中\n最后一滴咖喱的秘密武器。"
    zh_trad: "製作露營料理時使用的食材之一。\n也很適合用來把留在盤子上\n的咖哩全部抹乾淨。"
bridge_mail_d:
  names:
    jp_kana: ブリッジメールＨ
    jp_kanji: ブリッジメールＨ
    en: Bridge Mail D
    fr: Lettre Pont Y
    it: Mess. Libec.
    de: Brückbrief M
    es: Carta Puente F
    ko: 브리지메일M
    zh_simp: 桥梁邮件Ｈ
    zh_trad: 橋梁郵件Ｈ
  descriptions:
    jp_kana: "まっかな　はねばしの　えがらが\nプリントされた　びんせん。\nポケモンに　もたせて　つかう。"
    jp_kanji: "真っ赤な　跳ね橋の　絵柄が\nプリントされた　レターペーパー。\nポケモンに　持たせて　使う。"
    en: "Stationery featuring an illustration of a bright-red\ndrawbridge. Have a Pokémon hold it for delivery."
    fr: "Un papier à lettres avec un motif de pont mobile rouge.\nPeut être tenu et livré par un Pokémon."
    it: "Carta da lettere che riporta l’immagine di un ponte\nmobile di colore rosso fuoco.\nSi può dare a un Pokémon affinché la consegni."
    de: "Das Briefpapier hat eine knallrote Zugbrücke als\nHintergrund. Gib es einem Pokémon zum Tragen."
    es: "Carta con la imagen de un puente levadizo de color\nrojo. Haz que la entregue un Pokémon."
    ko: "새빨간 도개교의 무늬가\n프린트된 편지지.\n포켓몬에게 지니게 해서 쓴다."
    zh_simp: "印有鲜红色活动桥图案的信纸。\n使用该道具时，\n需要让宝可梦携带着来用。"
    zh_trad: "印有大紅色活動橋圖案的信紙。\n需讓寶可夢攜帶使用。"
bridge_mail_m:
  names:
    jp_kana: ブリッジメールＷ
    jp_kanji: ブリッジメールＷ
    en: Bridge Mail M
    fr: Lettre Pont I
    it: Mess. Merav.
    de: Brückbrief W
    es: Carta Puente P
    ko: 브리지메일W
    zh_simp: 桥梁邮件Ｗ
    zh_trad: 橋梁郵件Ｗ
  descriptions:
    jp_kana: "アーチを　えがいた　はしの　えがらが\nプリントされた　びんせん。\nポケモンに　もたせて　つかう。"
    jp_kanji: "アーチを　描いた　橋の　絵柄が\nプリントされた　レターペーパー。\nポケモンに　持たせて　使う。"
    en: "Stationery featuring an illustration of a majestically\narched bridge. Have a Pokémon hold it for delivery."
    fr: "Un papier à lettres avec un motif de pont à voûtes.\nPeut être tenu et livré par un Pokémon."
    it: "Carta da lettere che riporta l’immagine di un ponte\nad arco.\nSi può dare a un Pokémon affinché la consegni."
    de: "Das Briefpapier hat eine geschwungene Brücke als\nHintergrundmotiv. Gib es einem Pokémon zu Tragen."
    es: "Carta con la imagen de un puente con varios arcos. Haz\nque la entregue un Pokémon."
    ko: "아치가 그려진 다리의 무늬가\n프린트된 편지지.\n포켓몬에게 지니게 해서 쓴다."
    zh_simp: "印有拱桥图案的信纸。\n使用该道具时，\n需要让宝可梦携带着来用。"
    zh_trad: "印有拱橋圖案的信紙。\n需讓寶可夢攜帶使用。"
bridge_mail_s:
  names:
    jp_kana: ブリッジメールＳ
    jp_kanji: ブリッジメールＳ
    en: Bridge Mail S
    fr: Lettre Pont S
    it: Mess. Frec.
    de: Brückbrief H
    es: Carta Puente S
    ko: 브리지메일S
    zh_simp: 桥梁邮件Ｓ
    zh_trad: 橋梁郵件Ｓ
  descriptions:
    jp_kana: "そらを　つらぬく　はしの　えがらが\nプリントされた　びんせん。\nポケモンに　もたせて　つかう。"
    jp_kanji: "空を　つらぬく　橋の　絵柄が\nプリントされた　レターペーパー。\nポケモンに　持たせて　使う。"
    en: "Stationery featuring an illustration of a bridge that\nseems to pierce the sky. Have a Pokémon hold it\nfor delivery."
    fr: "Un papier à lettres avec un motif de pont traversant\nle ciel. Peut être tenu et livré par un Pokémon."
    it: "Carta da lettere che riporta l’immagine di un ponte\nsospeso nel cielo.\nSi può dare a un Pokémon affinché la consegni."
    de: "Das Briefpapier hat eine weit in den Himmel ragende\nBrücke als Hintergrund. Gib es einem Pokémon zum\nTragen."
    es: "Carta con la imagen de un puente que se alza hacia el\ncielo. Haz que la entregue un Pokémon."
    ko: "하늘을 관통하는 다리의 무늬가\n프린트된 편지지.\n포켓몬에게 지니게 해서 쓴다."
    zh_simp: "印有通天桥图案的信纸。\n使用该道具时，\n需要让宝可梦携带着来用。"
    zh_trad: "印有通天橋圖案的信紙。\n需讓寶可夢攜帶使用。"
bridge_mail_t:
  names:
    jp_kana: ブリッジメールＣ
    jp_kanji: ブリッジメールＣ
    en: Bridge Mail T
    fr: Lettre Pont F
    it: Mess. Prop.
    de: Brückbrief Z
    es: Carta Puente A
    ko: 브리지메일C
    zh_simp: 桥梁邮件Ｃ
    zh_trad: 橋梁郵件Ｃ
  descriptions:
    jp_kana: "こうてつの　つりばしの　えがらが\nプリントされた　びんせん。\nポケモンに　もたせて　つかう。"
    jp_kanji: "鋼鉄の　つり橋の　絵柄が\nプリントされた　レターペーパー。\nポケモンに　持たせて　使う。"
    en: "Stationery featuring an illustration of a high-tension\nsteel suspension bridge. Have a Pokémon hold it\nfor delivery."
    fr: "Un papier à lettres avec un motif de pont suspendu\nen acier. Peut être tenu et livré par un Pokémon."
    it: "Carta da lettere che riporta l’immagine di un ponte\nd’acciaio sospeso.\nSi può dare a un Pokémon affinché la consegni."
    de: "Das Briefpapier hat eine stählerne Hängebrücke als\nHintergrund. Gib es einem Pokémon zum Tragen."
    es: "Carta con la imagen de un puente colgante de acero.\nHaz que la entregue un Pokémon."
    ko: "강철의 현수교 무늬가\n프린트된 편지지.\n포켓몬에게 지니게 해서 쓴다."
    zh_simp: "印有钢铁吊桥图案的信纸。\n使用该道具时，\n需要让宝可梦携带着来用。"
    zh_trad: "印有鋼鐵懸索橋圖案的信紙。\n需讓寶可夢攜帶使用。"
bridge_mail_v:
  names:
    jp_kana: ブリッジメールＶ
    jp_kanji: ブリッジメールＶ
    en: Bridge Mail V
    fr: Lettre Pont H
    it: Mess. Vill.
    de: Brückbrief D
    es: Carta Puente V
    ko: 브리지메일V
    zh_simp: 桥梁邮件Ｖ
    zh_trad: 橋梁郵件Ｖ
  descriptions:
    jp_kana: "レンガづくりの　はしの　えがらが\nプリントされた　びんせん。\nポケモンに　もたせて　つかう。"
    jp_kanji: "レンガ造りの　橋の　絵柄が\nプリントされた　レターペーパー。\nポケモンに　持たせて　使う。"
    en: "Stationery featuring an illustration of a\nvintage-looking brick bridge. Have a Pokémon hold\nit for delivery."
    fr: "Un papier à lettres avec un motif de pont en briques.\nPeut être tenu et livré par un Pokémon."
    it: "Carta da lettere che riporta l’immagine di un ponte\ndi mattoni.\nSi può dare a un Pokémon affinché la consegni."
    de: "Das Briefpapier hat eine Brücke aus Ziegelsteinen als\nHintergrund. Gib es einem Pokémon zum Tragen."
    es: "Carta con la imagen de un puente de ladrillos. Haz que\nla entregue un Pokémon."
    ko: "벽돌로 만든 다리의 무늬가\n프린트된 편지지.\n포켓몬에게 지니게 해서 쓴다."
    zh_simp: "印有砖桥图案的信纸。\n使用该道具时，\n需要让宝可梦携带着来用。"
    zh_trad: "印有磚橋圖案的信紙。\n需讓寶可夢攜帶使用。"
bright_powder:
  names:
    jp_kana: ひかりのこな
    jp_kanji: ひかりのこな
    en: Bright Powder
    fr: Poudre Claire
    it: Luminpolvere
    de: Blendpuder
    es: Polvo Brillo
    ko: 반짝가루
    zh_simp: 光粉
    zh_trad: 光粉
  descriptions:
    jp_kana: "キラキラ　ひかるこな。　もたせると\nひかりが　あいてを　まどわして\nわざが　めいちゅう　しにくくなる。"
    jp_kanji: "キラキラ　光る粉。　持たせると\n光が　相手を　惑わして\n技が　命中しにくくなる。"
    en: "An item to be held by a Pokémon. It casts a tricky\nglare that lowers the opposing\nPokémon’s accuracy."
    fr: Objet à tenir. Intimide l’ennemi et baisse sa Précision.
    it: "Strumento da dare a un Pokémon.\nEmette un bagliore insidioso che riduce\nla precisione del nemico."
    de: "Ein Item, das einem Pokémon zum Tragen gegeben\nwerden kann. Es senkt die Genauigkeit des Gegners."
    es: "Lanza un destello que baja la Precisión del enemigo.\nDebe llevarlo un Pokémon."
    ko: "반짝반짝 빛나는 가루. 지니게 하면\n빛이 상대를 혼란시켜\n기술이 명중되기 어려워진다."
    zh_simp: "闪闪发光的粉末。\n携带后，光芒会迷惑对手，\n从而使其招式变得不容易命中。"
    zh_trad: "閃閃發光的粉末。\n攜帶後，光芒會迷惑對手，\n進而使其招式變得不容易命中。"
brittle_bones:
  names:
    jp_kana: かぼそいホネ
    jp_kanji: かぼそいホネ
    en: Brittle Bones
    fr: Os à Moelle
    it: Ossi sottili
    de: Feine Knochen
    es: Huesos Finos
    ko: 가느다란뼈
    zh_simp: 细骨
    zh_trad: 細骨
  descriptions:
    jp_kana: "キャンプの　りょうりに　つかう\nしょくざいの　いっしゅ。ホネから　ほんのり\nにじみだす　エキスが　うまみを　たす。"
    jp_kanji: "キャンプの　料理に　使う\n食材の　一種。ホネから　ほんのり\nにじみだす　エキスが　旨味を　足す。"
    en: "One of the many ingredients that can be used for\ncooking at your camp. The taste boiled off from the\nbones is sure to give a dish a light umami taste."
    fr: "Un ingrédient de cuisine pour le camping.\nLes saveurs subtiles extraites de cet os\ndonnent un goût exquis aux plats."
    it: "Uno degli ingredienti che puoi usare per cucinare\nin campeggio. Le sostanze rilasciate da questi\nossi donano al piatto un gusto unico."
    de: "Eine Zutat für PokéCamping-Mahlzeiten. Das Aroma,\ndas diese Knochen auf andere Zutaten übertragen,\nverleiht jeder Speise einen vorzüglichen Geschmack."
    es: "Un ingrediente para cocinar en el campamento. Los\njugos del hueso dan un profundo sabor a la salsa."
    ko: "캠프 요리에 사용되는\n식재료 중 하나. 뼈에서 은은하게\n배어 나오는 진액이 감칠맛을 더해 준다."
    zh_simp: "在露营营地制作料理时会使用的\n一种食材。将骨头精心熬煮而得的\n一丝浓缩的精华加深了料理的美味。"
    zh_trad: "製作露營料理時使用的食材之一。\n從骨頭裡滲出來的少量精華\n可以使料理更添美味。"
bug_gem:
  names:
    jp_kana: むしのジュエル
    jp_kanji: むしのジュエル
    en: Bug Gem
    fr: Joyau Insecte
    it: Bijoucoleottero
    de: Käferjuwel
    es: Gema Bicho
    ko: 벌레주얼
    zh_simp: 虫之宝石
    zh_trad: 蟲之寶石
  descriptions:
    jp_kana: "むしの　タイプの　ジュエル。\nもたせると　いちどだけ　むしの\nわざの　いりょくが　つよまる。"
    jp_kanji: "むしの　タイプの　ジュエル。\n持たせると　１度だけ　むしの\n技の　威力が　強まる。"
    en: "A gem with an insect-like essence. When held, it\nstrengthens the power of a Bug-type move\none time."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Insecte."
    it: "Strumento da dare a un Pokémon.\nGioiello che potenzia una sola volta le mosse\ndi tipo Coleottero."
    de: "Ein Juwel vom Typ Käfer. Es erhöht einmalig die Stärke\neiner Attacke vom Typ Käfer."
    es: "Joya de un solo uso que potencia los movimientos de\ntipo Bicho. Debe llevarla un Pokémon."
    ko: "벌레타입의 주얼.\n지니게 하면 한 번만 벌레\n기술의 위력이 강해진다."
    zh_simp: "虫属性的宝石。\n携带后，虫属性的\n招式威力仅会增强１次。"
    zh_trad: "蟲屬性的寶石。\n攜帶後，蟲屬性招式的\n威力會僅增強１次。"
bug_memory:
  names:
    jp_kana: バグメモリ
    jp_kanji: バグメモリ
    en: Bug Memory
    fr: ROM Insecte
    it: ROM Coleottero
    de: Käfer-Disc
    es: Disco Bicho
    ko: 버그메모리
    zh_simp: 虫子存储碟
    zh_trad: 蟲子記憶碟
  descriptions:
    jp_kana: "むしタイプの　データが　はいった\nメモリ。　とくていの　ポケモンが\nもつと　タイプが　かわる。"
    jp_kanji: "むしタイプの　データが　入った\nメモリ。　特定の　ポケモンが　持つと\nタイプが　変わる。"
    en: "A memory disc that contains Bug-type data.\nIt changes the type of the holder if held by\na certain species of Pokémon."
    fr: "Une carte mémoire contenant des données sur\nle type Insecte. Un certain Pokémon peut changer\nde type en l’équipant."
    it: "ROM contenente dati sul tipo Coleottero in formato\ndigitale. Permette a un certo Pokémon di cambiare\ntipo."
    de: "Eine Disc mit Daten zum Typ Käfer. Sie löst bei einem\nbestimmten Pokémon einen Typenwechsel aus."
    es: "Disco de datos que contiene información relativa al tipo\nBicho. Permite cambiar de tipo a cierto Pokémon."
    ko: "벌레타입의 데이터가 들어 있는\n메모리. 특정 포켓몬이\n지니면 타입이 바뀐다."
    zh_simp: "装有虫属性数据的存储碟。\n特定宝可梦携带后，\n属性就会发生变化。"
    zh_trad: "裝有蟲屬性資料的記憶碟。\n特定寶可夢攜帶後，\n就會產生屬性的變化。"
buginium_z:bag:
  names:
    jp_kana: ムシＺ
    jp_kanji: ムシＺ
    en: Buginium Z
    fr: Insectozélite
    it: Insectium Z
    de: Insectium Z
    es: Insectostal Z
    ko: 벌레Z
    zh_simp: 虫Ｚ
    zh_trad: 蟲Ｚ
  descriptions:
    jp_kana: "むしタイプの　わざを\nＺワザに　グレードアップする\nＺパワーの　けっしょうを　つくりだす。"
    jp_kanji: "むしタイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nBug-type moves to Bug-type Z-Moves."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise son porteur à transformer ses capacités\nde type Insecte en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono ai Pokémon di trasformare le mosse\ndi tipo Coleottero in mosse Z."
    de: "Kristallisierte Z-Kraft, die Käfer-Attacken zu Z-Attacken\naufstuft. Wird bei Bedarf automatisch vervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a los\nportadores convertir sus movimientos de tipo Bicho en\nmovimientos Z."
    ko: "벌레타입 기술을\nZ기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将虫属性招式升级成\nＺ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把蟲屬性招式\n升級為Ｚ招式的Ｚ力量結晶。"
buginium_z:held:
  names:
    jp_kana: ムシＺ
    jp_kanji: ムシＺ
    en: Buginium Z
    fr: Insectozélite
    it: Insectium Z
    de: Insectium Z
    es: Insectostal Z
    ko: 벌레Z
    zh_simp: 虫Ｚ
    zh_trad: 蟲Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　けっしょう。\nむしタイプの　わざを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nむしタイプの　技を\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Bug-type moves to Z-Moves."
    fr: "Une cristallisation de la Force Z, permettant\nde transformer les capacités de type Insecte\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare le mosse di tipo\nColeottero in mosse Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft\nKäfer-Attacken zu Z-Attacken auf."
    es: "Cristal que confiere el Poder Z a los movimientos\nde tipo Bicho."
    ko: "Z파워의 결정.\n벌레타입 기술을\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将虫属性的招式\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把蟲屬性的招式\n升級為Ｚ招式。"
bulbasaur_candy:
  names:
    jp_kana: フシギダネのアメ
    jp_kanji: フシギダネのアメ
    en: Bulbasaur Candy
    fr: Bonbon Bulbizarre
    it: Caramella Bulbasaur
    de: Bisasam-Bonbon
    es: Caramelo Bulbasaur
    ko: 이상해씨의사탕
    zh_simp: 妙蛙种子的糖果
    zh_trad: 妙蛙種子的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
burn_drive:
  names:
    jp_kana: ブレイズカセット
    jp_kanji: ブレイズカセット
    en: Burn Drive
    fr: Module Pyro
    it: Piromodulo
    de: Flammenmodul
    es: PiroROM
    ko: 블레이즈카세트
    zh_simp: 火焰卡带
    zh_trad: 火焰卡帶
  descriptions:
    jp_kana: "ゲノセクトに　もたせると\nテクノバスターという　わざが\nほのおタイプになる　カセット。"
    jp_kanji: "ゲノセクトに　持たせると\nテクノバスターという　技が\nほのおタイプになる　カセット。"
    en: "A cassette to be held by Genesect. It changes\nGenesect’s Techno Blast move so it becomes\nFire type."
    fr: "Tenu par Genesect, ce module change la capacité\nTechno-Buster en une capacité de type Feu."
    it: "Modulo da dare a Genesect.\nTrasforma Tecnobotto in una mossa di tipo Fuoco."
    de: "Gibt man es Genesect zum Tragen, wandelt es den Typ\nder Attacke Techblaster in Feuer um."
    es: "Cartucho que convierte Tecno Shock de Genesect en un\nmovimiento de tipo Fuego."
    ko: "게노세크트에게 지니게 하면\n테크노버스터라는 기술이\n불꽃타입으로 바뀌는 카세트."
    zh_simp: "这是让盖诺赛克特携带的卡带。\n携带后，高科技光炮这招式\n就会变为火属性。"
    zh_trad: "讓蓋諾賽克特攜帶的卡帶。\n攜帶後，招式高科技光炮\n會變為火屬性。"
burn_heal:
  names:
    jp_kana: やけどなおし
    jp_kanji: やけどなおし
    en: Burn Heal
    fr: Anti-Brûle
    it: Antiscottatura
    de: Feuerheiler
    es: Antiquemar
    ko: 화상치료제
    zh_simp: 灼伤药
    zh_trad: 灼傷藥
  descriptions:
    jp_kana: "スプレーしきの　くすり。\nポケモン　１ひきの　やけどの\nじょうたいを　かいふくする。"
    jp_kanji: "スプレー式の　薬。\nポケモン　１匹の　やけどの\n状態を　回復する。"
    en: "A spray-type medicine for treating burns. It can be\nused to heal a single Pokémon suffering from a burn."
    fr: "Un médicament sous forme de spray.\nSoigne les brûlures d’un Pokémon."
    it: "Rimedio spray.\nCura un Pokémon dalla scottatura."
    de: Ein Spray, das Verbrennungen eines Pokémon heilt.
    es: "Medicina en espray que cura las quemaduras a un\nPokémon."
    ko: "스프레이식의 약.\n포켓몬 1마리의\n화상 상태를 회복한다."
    zh_simp: "喷雾式药水。\n能治愈１只宝可梦的\n灼伤状态。"
    zh_trad: "噴霧式藥水。\n能治癒１隻寶可夢的\n灼傷狀態。"
calcium:
  names:
    jp_kana: リゾチウム
    jp_kanji: リゾチウム
    en: Calcium
    fr: Calcium
    it: Calcio
    de: Kalzium
    es: Calcio
    ko: 리보플라빈
    zh_simp: 特攻增强剂
    zh_trad: 特攻增強劑
  descriptions:
    jp_kana: "ポケモンの　えいようドリンク。\nポケモン　１ひきの　とくこうの\nきそポイントを　あげる。"
    jp_kanji: "ポケモンの　栄養ドリンク。\nポケモン　１匹の　特攻の\n基礎ポイントを　あげる。"
    en: "A nutritious drink for Pokémon. When consumed,\nit raises the Sp. Atk base points of a single Pokémon."
    fr: "Une boisson très nutritive qui augmente\nl’Attaque Spéciale de base d’un Pokémon."
    it: "Bevanda nutriente per Pokémon.\nAumenta i punti base dell’Attacco Speciale."
    de: "Ein gehaltvolles Getränk, das den\nSpezial-Angriffs-Basiswert eines Pokémon\ndauerhaft erhöht."
    es: "Nutritiva bebida que potencia el Ataque Especial de\nbase de un Pokémon."
    ko: "포켓몬의 영양 드링크.\n포켓몬 1마리의 특수공격\n기초 포인트를 올린다."
    zh_simp: "宝可梦的营养饮料。\n能提高１只宝可梦的\n特攻的基础点数。"
    zh_trad: "寶可夢的營養飲料。\n能提高１隻寶可夢的\n特攻的基礎點數。"
calm_mint:
  names:
    jp_kana: おだやかミント
    jp_kanji: おだやかミント
    en: Calm Mint
    fr: Aromate Calme
    it: Menta Calma
    de: Still-Minze
    es: Menta Serena
    ko: 차분민트
    zh_simp: 温和薄荷
    zh_trad: 溫和薄荷
  descriptions:
    jp_kana: "ポケモンに　かおりを　かがせると\nとくぼうが　あがりやすく　なるが\nこうげきは　あがりにくくなる　ミント。"
    jp_kanji: "ポケモンに　香りを　かがせると\n特防が　上がりやすく　なるが\n攻撃は　上がりにくくなる　ミント。"
    en: "When a Pokémon smells this mint, its Sp. Def will grow\nmore easily, but its Attack will grow more slowly."
    fr: "Si un Pokémon hume cet aromate, sa Défense Spéciale\nmontera plus facilement, mais son Attaque\nse développera plus lentement."
    it: "Quando un Pokémon ne sente il profumo,\nla sua Difesa Speciale aumenta più facilmente\na scapito dell’Attacco."
    de: "Lässt man ein Pokémon an dieser Minze schnuppern,\nsteigt seine Spezial-Verteidigung schneller, aber sein\nAngriff umso langsamer."
    es: "Cuando un Pokémon percibe su aroma, aumenta con\nmás facilidad su Defensa Especial, en detrimento de su\nAtaque."
    ko: "포켓몬에게 향기를 맡게 하면\n특수방어가 오르기 쉬워지지만\n공격이 오르기 어려워지는 민트."
    zh_simp: "宝可梦闻了这种薄荷之后，\n会令特防容易提高，\n而攻击则难以提高。"
    zh_trad: "讓寶可夢聞這種薄荷的氣味，\n會令特防變得容易提高，\n但攻擊則難以提高。"
cameruptite:
  names:
    jp_kana: バクーダナイト
    jp_kanji: バクーダナイト
    en: Cameruptite
    fr: Caméruptite
    it: Cameruptite
    de: Cameruptnit
    es: Cameruptita
    ko: 폭타나이트
    zh_simp: 喷火驼进化石
    zh_trad: 噴火駝進化石
  descriptions:
    jp_kana: "バクーダに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "バクーダに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Camerupt hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Camérupt, elle lui permet\nde méga-évoluer durant un combat."
    it: "Una delle misteriose Megapietre.\nData a Camerupt, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Camerupt getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Camerupt en combate."
    ko: "폭타에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "喷火驼携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "噴火駝攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
camping_gear:
  names:
    jp_kana: キャンプセット
    jp_kanji: キャンプセット
    en: Camping Gear
    fr: Kit de Camping
    it: Kit da campeggio
    de: Camping-Set
    es: Kit de Acampada
    ko: 캠프세트
    zh_simp: 露营组合
    zh_trad: 露營組合
  descriptions:
    jp_kana: "ワイルドエリアや　キャンプスポットで\nテントを　はったり　そのなかで\nりょうりを　つくることが　できる。"
    jp_kanji: "ワイルドエリアや　キャンプスポットで\nテントを　張ったり　その中で\n料理を　作ることが　できる。"
    en: "Everything you need to set up a tent and get cooking in\na Wild Area or at a camping spot."
    fr: "Ce kit permet d’installer une tente dans les zones\nde camping des Terres Sauvages et d’y cuisiner."
    it: "Permette di montare una tenda e cucinare nelle\nTerre Selvagge o in altri luoghi adatti al campeggio."
    de: "Mit diesem Set ist es möglich, in der Naturzone sowie\nan anderen bestimmten Orten ein Zelt aufzuschlagen\nund dort zu kochen."
    es: "Este kit tiene todo lo necesario para montar una tienda\nde campaña y cocinar, ya sea en el Área Silvestre o en\nzonas de acampada."
    ko: "와일드에리어나 캠핑 스폿에서\n텐트를 치거나 그 안에서\n요리를 만들 수 있다."
    zh_simp: "可以在旷野地带\n或露营营地上搭起帐篷，\n在那里制作料理。"
    zh_trad: "可以用它\n在曠野地帶或營地\n搭起帳篷和製作料理。"
candy_jar:
  names:
    jp_kana: アメボトル
    jp_kanji: アメボトル
    en: Candy Jar
    fr: Bonbonnière
    it: Portacaramelle
    de: Bonbonglas
    es: Tarro de Caramelos
    ko: 사탕보틀
    zh_simp: 糖果罐
    zh_trad: 糖果罐
  descriptions:
    jp_kana: "ー\nー\nー"
    jp_kanji: "ー\nー\nー"
    en: "-\n-\n-"
    fr: "-\n-\n-"
    it: "-\n-\n-"
    de: ー
    ko: "-\n-\n-"
    zh_simp: "ー\nー\nー"
    zh_trad: "ー\nー\nー"
carbos:
  names:
    jp_kana: インドメタシン
    jp_kanji: インドメタシン
    en: Carbos
    fr: Carbone
    it: Carburante
    de: Carbon
    es: Carburante
    ko: 알칼로이드
    zh_simp: 速度增强剂
    zh_trad: 速度增強劑
  descriptions:
    jp_kana: "ポケモンの　えいようドリンク。\nポケモン　１ひきの　すばやさの\nきそポイントを　あげる。"
    jp_kanji: "ポケモンの　栄養ドリンク。\nポケモン　１匹の　素早さの\n基礎ポイントを　あげる。"
    en: "A nutritious drink for Pokémon. When consumed,\nit raises the Speed base points of a single Pokémon."
    fr: "Une boisson très nutritive qui augmente\nla Vitesse de base d’un Pokémon."
    it: "Bevanda nutriente per Pokémon.\nAumenta i punti base della Velocità."
    de: "Ein gehaltvolles Getränk, das den Initiative-Basiswert\neines Pokémon dauerhaft erhöht."
    es: "Nutritiva bebida que potencia la Velocidad de base de\nun Pokémon."
    ko: "포켓몬의 영양 드링크.\n포켓몬 1마리의 스피드\n기초 포인트를 올린다."
    zh_simp: "宝可梦的营养饮料。\n能提高１只宝可梦的\n速度的基础点数。"
    zh_trad: "寶可夢的營養飲料。\n能提高１隻寶可夢的\n速度的基礎點數。"
card_key:goldenrod_radio_tower:
  names:
    jp_kana: カードキー
    jp_kanji: カードキー
    en: Card Key
    fr: Carte Magnétique
    it: Apriporta
    de: Schlüsselkarte
    es: Llave Magnética
    ko: 카드키
    zh_simp: 钥匙卡
    zh_trad: 鑰匙卡
  descriptions:
    jp_kana: "ラジオきょくの　シャッターを　あける\nカードしきの　カギ。"
    jp_kanji: "ラジオ局の　シャッターを　開ける\nカード式の　カギ。"
    en: A card key that opens a shutter in the Radio Tower.
    fr: "Une clé en forme de carte permettant d’ouvrir\nles cloisons de la Tour Radio."
    it: "Chiave a scheda che apre le porte automatizzate\ndella Torre Radio."
    de: Eine Schlüsselkarte, die eine Tür im Radioturm öffnet.
    es: "Llave con forma de tarjeta que abre las puertas\nde la Torre Radio."
    ko: "라디오방송국의 셔터를 여는\n카드식 열쇠."
    zh_simp: "用来打开电台卷帘门的\n卡片式钥匙。"
    zh_trad: "用來打開電台鐵捲門的\n卡片式鑰匙。"
card_key:silph_co:
  names:
    jp_kana: カードキー
    jp_kanji: カードキー
    en: Card Key
    fr: Carte Magnétique
    it: Apriporta
    de: Schlüsselkarte
    es: Llave Magnética
    ko: 카드키
    zh_simp: 钥匙卡
    zh_trad: 鑰匙卡
  descriptions:
    jp_kana: "ヤマブキの　シルフカンパニー\nほんしゃ　ビルの　ドアロックを\nはずす　カードタイプの　カギ。"
    jp_kanji: "ヤマブキの　シルフカンパニー\n本社　ビルの　ドアロックを\nはずす　カードタイプの　カギ。"
    en: "A card key that unlocks doors in Silph Co.’s head\noffice in Saffron City."
    fr: "Une carte magnétique pouvant ouvrir les portes\ndu siège de la Sylphe SARL à Safrania."
    it: "Chiave a scheda per sbloccare le porte nella sede\ndella Silph S.p.A. a Zafferanopoli."
    de: "Eine Schlüsselkarte, mit der die Türen im Hauptsitz der\nSilph Company in Saffronia City geöffnet werden\nkönnen."
    es: "Esta tarjeta permite abrir las puertas de la Oficina\nCentral de Silph S. A. en Ciudad Azafrán."
    ko: "노랑시티의 실프주식회사\n본사 빌딩의 도어록을\n해제하는 카드 타입의 열쇠."
    zh_simp: "用来打开位于金黄市的\n西尔佛公司总部大厦门锁的\n卡片式钥匙。"
    zh_trad: "卡片型的鑰匙。\n能打開位於金黃市的\n西爾佛公司總部的門鎖。"
careful_mint:
  names:
    jp_kana: しんちょうミント
    jp_kanji: しんちょうミント
    en: Careful Mint
    fr: Aromate Prudent
    it: Menta Cauta
    de: Sacht-Minze
    es: Menta Cauta
    ko: 신중민트
    zh_simp: 慎重薄荷
    zh_trad: 慎重薄荷
  descriptions:
    jp_kana: "ポケモンに　かおりを　かがせると\nとくぼうが　あがりやすく　なるが\nとくこうは　あがりにくくなる　ミント。"
    jp_kanji: "ポケモンに　香りを　かがせると\n特防が　上がりやすく　なるが\n特攻は　上がりにくくなる　ミント。"
    en: "When a Pokémon smells this mint, its Sp. Def will grow\nmore easily, but its Sp. Atk will grow more slowly."
    fr: "Si un Pokémon hume cet aromate, sa Défense Spéciale\nmontera plus facilement, mais son Attaque Spéciale\nse développera plus lentement."
    it: "Quando un Pokémon ne sente il profumo,\nla sua Difesa Speciale aumenta più facilmente\na scapito dell’Attacco Speciale."
    de: "Lässt man ein Pokémon an dieser Minze schnuppern,\nsteigt seine Spezial-Verteidigung schneller, aber sein\nSpezial-Angriff umso langsamer."
    es: "Cuando un Pokémon percibe su aroma, aumenta con\nmás facilidad su Defensa Especial, en detrimento de su\nAtaque Especial."
    ko: "포켓몬에게 향기를 맡게 하면\n특수방어가 오르기 쉬워지지만\n특수공격이 오르기 어려워지는 민트."
    zh_simp: "宝可梦闻了这种薄荷之后，\n会令特防容易提高，\n而特攻则难以提高。"
    zh_trad: "讓寶可夢聞這種薄荷的氣味，\n會令特防變得容易提高，\n但特攻則難以提高。"
carrot_seeds:
  names:
    jp_kana: にんじんのタネ
    jp_kanji: にんじんのタネ
    en: Carrot Seeds
    fr: Graines Carotte
    it: Semi di carota
    de: Karottensamen
    es: Sem. Zanahoria
    ko: 당근씨
    zh_simp: 萝卜种子
    zh_trad: 蘿蔔種子
  descriptions:
    jp_kana: "はたけに　うえて　つかう　タネ。\nうえる　はたけに　よって　できる\nにんじんの　しゅるいが　かわる。"
    jp_kanji: "畑に　植えて　使う　タネ。\n植える　畑に　よって　できる\nにんじんの　種類が　変わる。"
    en: "Seeds to plant in a field. The kind of carrot you’ll get is\ndetermined by which field you plant the seeds in."
    fr: "Des graines à planter dans un champ. L’espèce\nde carotte obtenue varie selon le type de sol."
    it: "Dei semi da piantare in un campo. La varietà di carote\nottenibili cambia in base al terreno."
    de: "Samen, die sich auf einem Feld einpflanzen lassen.\nJe nachdem, wie dieses beschaffen ist, wächst dort\neine andere Karottenart."
    es: "Semillas para plantar en un huerto. Permiten obtener\nun tipo u otro de zanahoria en función del lugar elegido\npara su cultivo."
    ko: "밭에 심을 수 있는 씨.\n심은 밭에 따라\n자라는 당근의 종류가 달라진다."
    zh_simp: "种在田地里使用的种子。\n出产的萝卜种类会根据\n种下的田地而有所不同。"
    zh_trad: "可以種在田地裡的種子。\n長出來的蘿蔔種類會根據\n種下它的田地而不同。"
casteliacone:
  names:
    jp_kana: ヒウンアイス
    jp_kanji: ヒウンアイス
    en: Casteliacone
    fr: Glace Volute
    it: Conostropoli
    de: Stratos-Eis
    es: Porcehelado
    ko: 구름아이스
    zh_simp: 飞云冰淇淋
    zh_trad: 飛雲冰淇淋
  descriptions:
    jp_kana: "ヒウンシティの　めいぶつアイス。\nポケモン　１ひきの　じょうたいの\nいじょうを　すべて　かいふくする。"
    jp_kanji: "ヒウンシティの　名物アイス。\nポケモン　１匹の　状態の\n異常を　すべて　回復する。"
    en: "Castelia City’s specialty, soft-serve ice cream.\nIt can be used once to heal all the status conditions\nof a Pokémon."
    fr: "Une spécialité de Volucité.\nSoigne toutes les altérations de statut d’un Pokémon."
    it: "Il famoso gelato di Austropoli. Cura tutti i problemi\ndi stato di un Pokémon."
    de: "Dieses Eis ist eine Spezialität aus Stratos City.\nEs behebt alle Statusprobleme eines Pokémon."
    es: "Especialidad de Ciudad Porcelana. Cura los problemas\nde estado de un Pokémon."
    ko: "구름시티의 명물 아이스.\n포켓몬 1마리의 상태 이상을\n모두 회복한다."
    zh_simp: "飞云市特产的冰淇淋。\n能治愈１只宝可梦的\n所有异常状态。"
    zh_trad: "飛雲市特產的冰淇淋。\n能治癒１隻寶可夢的\n所有異常狀態。"
catching_charm:
  names:
    jp_kana: ゆれないおまもり
    jp_kanji: ゆれないおまもり
    en: Catching Charm
    fr: Charme Stabilité
    it: Catturamuleto
    de: Superfangpin
    es: Amuleto Captura
    ko: 흔들림없는부적
    zh_simp: 防晃护符
    zh_trad: 防晃護符
  descriptions:
    jp_kana: "もっていると　ほかくクリティカルが\nはっせい　しやすくなる\nふしぎで　あまりゆれない　おまもり。"
    jp_kanji: "持っていると　ほかくクリティカルが\n発生　しやすくなる\n不思議で　あまりゆれない　おまもり。"
    en: "Holding it is said to increase the chance of getting a\ncritical catch. Curiously, the charm doesn’t shake much."
    fr: "Ce porte-bonheur permet de stabiliser les Poké Balls\net augmente les chances de réaliser une capture\ncritique."
    it: "Misterioso amuleto che non oscilla molto.\nAumenta la probabilità che si verifichi una\ncattura critica."
    de: "Ein mysteriöser Glücksbringer, der nur wenig wackelt\nund die Wahrscheinlichkeit erhöht, einen Superfang\nhinzulegen."
    es: "Aumenta la probabilidad de lograr una captura crítica\nal llevarlo equipado. Curiosamente, apenas vibra."
    ko: "지니고 있으면 포획 크리티컬이\n나오기 쉬워지는\n이상하고 잘 흔들리지 않는 부적."
    zh_simp: "带上这个神奇的\n可增强稳定性的护身符，\n就能更容易触发会心捕捉。"
    zh_trad: "不怎麼會晃動的神奇護符。\n只要帶在身上就會\n更容易出現會心捕捉。"
catching_pocket:
  names:
    jp_kana: ほかくポケット
    jp_kanji: ほかくポケット
    en: Catching Pocket
    fr: Poche de Capture
    it: Tasca cattura
    de: Fangtasche
    es: Bolsillo Captura
    ko: 포획포켓
    zh_simp: 捕捉口袋
    zh_trad: 捕捉口袋
  descriptions:
    jp_kana: "ー\nー\nー"
    jp_kanji: "ー\nー\nー"
    en: "-\n-\n-"
    fr: "-\n-\n-"
    it: "-\n-\n-"
    de: ー
    ko: "-\n-\n-"
    zh_simp: "ー\nー\nー"
    zh_trad: "ー\nー\nー"
caterpie_candy:
  names:
    jp_kana: キャタピーのアメ
    jp_kanji: キャタピーのアメ
    en: Caterpie Candy
    fr: Bonbon Chenipan
    it: Caramella Caterpie
    de: Raupy-Bonbon
    es: Caramelo Caterpie
    ko: 캐터피의사탕
    zh_simp: 绿毛虫的糖果
    zh_trad: 綠毛蟲的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
cell_battery:
  names:
    jp_kana: じゅうでんち
    jp_kanji: じゅうでんち
    en: Cell Battery
    fr: Pile
    it: Ricaripila
    de: Akku
    es: Pila
    ko: 충전지
    zh_simp: 充电电池
    zh_trad: 充電電池
  descriptions:
    jp_kana: "つかいすての　じゅうでんち。\nもたせて　でんきの　わざを　うけると\nこうげきが　あがる。"
    jp_kanji: "使い捨ての　じゅうでんち。\n持たせて　でんきの　技を　受けると\n攻撃が　あがる。"
    en: "An item to be held by a Pokémon. It boosts Attack\nif the holder is hit with an Electric-type attack. It can\nonly be used once."
    fr: "Objet à tenir. Une pile jetable qui augmente\nl’Attaque du porteur lorsqu’il encaisse une attaque\nde type Électrik."
    it: "Pila monouso. Se il Pokémon che ha questo\nstrumento subisce un attacco di tipo Elettro,\nil suo Attacco aumenta."
    de: "Ein einmalig aufladbarer Akku. Erhöht den Angriff des\nTrägers, wenn ihn eine Elektro-Attacke trifft."
    es: "Batería de usar y tirar que sube el Ataque de quien la\nlleva cuando recibe un golpe de tipo Eléctrico."
    ko: "단 한 번 쓰면 없어지는 충전지.\n지니게 하고 전기 기술로 공격받으면\n공격이 올라간다."
    zh_simp: "一次性使用的充电电池。\n携带它的宝可梦如果受到电属性\n招式的攻击，攻击就会提高。"
    zh_trad: "只能使用一次的充電電池。\n攜帶它的寶可夢如果受到電屬性\n招式的攻擊，攻擊就會提高。"
chalky_stone:
  names:
    jp_kana: チョークいし
    jp_kanji: チョークいし
    en: Chalky Stone
    fr: Craie
    it: Gessetto
    de: Kreidestein
    es: Tiza
    ko: 초크돌
    zh_simp: 粉笔石
    zh_trad: 粉筆石
  descriptions:
    jp_kana: "みちの　はしっこで　ひろった\nしろっぽい　ちいさな　いし。"
    jp_kanji: "道の　はしっこで　拾った\n白っぽい　小さな　石。"
    en: A small whitish stone picked up at the edge of the road.
    fr: "Une petite pierre blanchâtre trouvée sur le bord\nde la route."
    it: Piccola pietra biancastra raccolta sul ciglio della strada.
    de: "Ein kleiner Stein mit weißlicher Färbung, der vom\nStraßenrand aufgehoben wurde."
    es: "Piedra de yeso pequeña y blanquecina encontrada en\nla linde de un camino."
    ko: "길가 구석에서 주운\n하얗고 작은 돌."
    zh_simp: "路边捡到的\n白白的小石头。"
    zh_trad: "在路邊撿到的\n白白的小石頭。"
chansey_candy:
  names:
    jp_kana: ラッキーのアメ
    jp_kanji: ラッキーのアメ
    en: Chansey Candy
    fr: Bonbon Leveinard
    it: Caramella Chansey
    de: Chaneira-Bonbon
    es: Caramelo Chansey
    ko: 럭키의사탕
    zh_simp: 吉利蛋的糖果
    zh_trad: 吉利蛋的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de cierto Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
charcoal:
  names:
    jp_kana: もくたん
    jp_kanji: もくたん
    en: Charcoal
    fr: Charbon
    it: Carbonella
    de: Holzkohle
    es: Carbón
    ko: 목탄
    zh_simp: 木炭
    zh_trad: 木炭
  descriptions:
    jp_kana: "ものを　もやす　ねんりょう。\nもたせると　ほのおタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "ものを　燃やす　燃料。\n持たせると　ほのおタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon. It’s a combustible\nfuel that boosts the power of Fire-type moves."
    fr: "Objet à tenir. Un combustible qui augmente\nla puissance des capacités de type Feu."
    it: "Strumento da dare a un Pokémon.\nSostanza combustibile che potenzia le mosse\ndi tipo Fuoco."
    de: "Ein Item zum Tragen. Ein Brennstoff, der Attacken vom\nTyp Feuer verstärkt."
    es: "Actúa como combustible y potencia los movimientos de\ntipo Fuego. Debe llevarlo un Pokémon."
    ko: "물건을 태우는 연료.\n지니게 하면 불꽃타입\n기술의 위력이 올라간다."
    zh_simp: "焚烧用的燃料。\n携带后，火属性的\n招式威力就会提高。"
    zh_trad: "燒東西的燃料。\n攜帶後，火屬性的\n招式威力就會提高。"
charizardite_x:
  names:
    jp_kana: リザードナイトＸ
    jp_kanji: リザードナイトＸ
    en: Charizardite X
    fr: Dracaufite X
    it: Charizardite X
    de: Gluraknit X
    es: Charizardita X
    ko: 리자몽나이트X
    zh_simp: 喷火龙进化石Ｘ
    zh_trad: 噴火龍進化石Ｘ
  descriptions:
    jp_kana: "リザードンに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "リザードンに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Charizard hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Dracaufeu, elle lui permet de\nméga-évoluer durant un combat."
    it: "Un esemplare delle misteriose Megapietre.\nData a Charizard, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Glurak getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Charizard en combate."
    ko: "리자몽에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让喷火龙携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓噴火龍攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
charizardite_y:
  names:
    jp_kana: リザードナイトＹ
    jp_kanji: リザードナイトＹ
    en: Charizardite Y
    fr: Dracaufite Y
    it: Charizardite Y
    de: Gluraknit Y
    es: Charizardita Y
    ko: 리자몽나이트Y
    zh_simp: 喷火龙进化石Ｙ
    zh_trad: 噴火龍進化石Ｙ
  descriptions:
    jp_kana: "リザードンに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "リザードンに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Charizard hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Dracaufeu, elle lui permet de\nméga-évoluer durant un combat."
    it: "Un esemplare delle misteriose Megapietre.\nData a Charizard, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Glurak getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Charizard en combate."
    ko: "리자몽에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让喷火龙携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓噴火龍攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
charmander_candy:
  names:
    jp_kana: ヒトカゲのアメ
    jp_kanji: ヒトカゲのアメ
    en: Charmander Candy
    fr: Bonbon Salamèche
    it: Caramella Charmander
    de: Glumanda-Bonbon
    es: Caramelo Charmander
    ko: 파이리의사탕
    zh_simp: 小火龙的糖果
    zh_trad: 小火龍的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
charti_berry:
  names:
    jp_kana: ヨロギのみ
    jp_kanji: ヨロギのみ
    en: Charti Berry
    fr: Baie Charti
    it: Baccaciofo
    de: Chiaribeere
    es: Baya Alcho
    ko: 루미열매
    zh_simp: 草蚕果
    zh_trad: 草蠶果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　いわ　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　いわ技を\n受けたとき　威力が　弱まる。"
    en: "If held by a Pokémon, this Berry will lessen the\ndamage taken from one supereffective\nRock-type attack."
    fr: "Tenue, cette Baie affaiblit une attaque ennemie\nsuper efficace de type Roche."
    it: "Se un Pokémon ha questa bacca, l’attacco\nsuperefficace di tipo Roccia del nemico\nviene indebolito."
    de: "Als getragenes Item schwächt diese Beere sehr effektive\ngegnerische Attacken vom Typ Gestein."
    es: "Si la lleva un Pokémon, debilita un ataque supereficaz\nde tipo Roca de un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 굉장한 바위 기술로\n공격받았을 때 위력이 약해진다."
    zh_simp: "让宝可梦携带后，\n在受到效果绝佳的岩石属性招式\n攻击时，能令其威力减弱。"
    zh_trad: "讓寶可夢攜帶後，\n在受到效果絕佳的岩石屬性招式\n攻擊時，能使其威力減弱。"
cheri_berry:
  names:
    jp_kana: クラボのみ
    jp_kanji: クラボのみ
    en: Cheri Berry
    fr: Baie Ceriz
    it: Baccaliegia
    de: Amrenabeere
    es: Baya Zreza
    ko: 버치열매
    zh_simp: 樱子果
    zh_trad: 櫻子果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nまひを　かいふくする。"
    jp_kanji: "ポケモンに　持たせると\nまひを　回復する。"
    en: "A Berry to be consumed by Pokémon. If a Pokémon\nholds one, it can recover from paralysis on its own\nin battle."
    fr: "Une Baie qui soigne la paralysie lorsqu’elle est tenue\npar un Pokémon."
    it: Se un Pokémon ha questa bacca, guarisce dalla paralisi.
    de: "Gibst du die Beere einem Pokémon zum Tragen,\nheilt diese es von Paralyse."
    es: "Los Pokémon pueden llevarla o usarla para recuperarse\nde la parálisis."
    ko: "포켓몬에게 지니게 하면\n마비를 회복한다."
    zh_simp: "让宝可梦携带后，\n可以治愈麻痹。"
    zh_trad: "讓寶可夢攜帶後，\n可以治癒麻痺。"
cherish_ball:
  names:
    jp_kana: プレシャスボール
    jp_kanji: プレシャスボール
    en: Cherish Ball
    fr: Mémoire Ball
    it: Pregio Ball
    de: Jubelball
    es: Gloria Ball
    ko: 프레셔스볼
    zh_simp: 贵重球
    zh_trad: 貴重球
  descriptions:
    jp_kana: "なにかの　きねんの　しなとして\nとくべつに　つくられた\nかなり　めずらしい　ボール。"
    jp_kanji: "なにかの　記念の　品として\n特別に　つくられた\nかなり　珍しい　ボール。"
    en: "A quite rare Poké Ball that has been crafted in\norder to commemorate a special occasion of\nsome sort."
    fr: "Une Poké Ball plutôt rare qui fut créée\npour une occasion spéciale."
    it: "Poké Ball molto esclusiva creata per commemorare\nun evento speciale."
    de: "Ein seltener Ball, der als Reminiszenz an irgendein\nEreignis hergestellt wurde."
    es: "Es una Poké Ball bastante singular que se creó para\nconmemorar alguna ocasión especial."
    ko: "무언가의 기념품으로\n특별히 만들어진\n상당히 진귀한 볼."
    zh_simp: "相当珍贵的球。\n特制出来的某种纪念品。"
    zh_trad: "作為某種紀念品\n而特別製造的，\n頗稀奇的球。"
chesto_berry:
  names:
    jp_kana: カゴのみ
    jp_kanji: カゴのみ
    en: Chesto Berry
    fr: Baie Maron
    it: Baccastagna
    de: Maronbeere
    es: Baya Atania
    ko: 유루열매
    zh_simp: 零余果
    zh_trad: 零餘果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nねむりを　かいふくする。"
    jp_kanji: "ポケモンに　持たせると\n眠りを　回復する。"
    en: "A Berry to be consumed by Pokémon. If a Pokémon\nholds one, it can recover from sleep on its own\nin battle."
    fr: "Une Baie qui soigne le sommeil lorsqu’elle est tenue\npar un Pokémon."
    it: Se un Pokémon ha questa bacca, si risveglia dal sonno.
    de: "Gibst du die Beere einem Pokémon zum Tragen,\nerwacht es dadurch aus dem Schlaf."
    es: "Los Pokémon pueden llevarla o usarla para despertar\ndel sueño."
    ko: "포켓몬에게 지니게 하면\n잠듦을 회복한다."
    zh_simp: "让宝可梦携带后，\n可以治愈睡眠。"
    zh_trad: "讓寶可夢攜帶後，\n可以治癒睡眠。"
chilan_berry:
  names:
    jp_kana: ホズのみ
    jp_kanji: ホズのみ
    en: Chilan Berry
    fr: Baie Zalis
    it: Baccacinlan
    de: Latchibeere
    es: Baya Chilan
    ko: 카리열매
    zh_simp: 灯浆果
    zh_trad: 燈漿果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nノーマル　わざを　うけたとき\nいりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\nノーマル技を　受けたとき\n威力が　弱まる。"
    en: "If held by a Pokémon, this Berry will lessen the\ndamage taken from one Normal-type attack."
    fr: "Tenue, cette Baie affaiblit une attaque ennemie\nde type Normal."
    it: "Se un Pokémon ha questa bacca, l’attacco\ndi tipo Normale del nemico viene indebolito."
    de: "Als getragenes Item schwächt diese Beere gegnerische\nAttacken vom Typ Normal."
    es: "Si la lleva un Pokémon, debilita un ataque de tipo\nNormal de un enemigo."
    ko: "포켓몬에게 지니게 하면\n노말 기술로 공격받았을 때\n위력이 약해진다."
    zh_simp: "让宝可梦携带后，\n在受到一般属性招式攻击时，\n能令其威力减弱。"
    zh_trad: "讓寶可夢攜帶後，\n在受到一般屬性招式攻擊時，\n能使其威力減弱。"
chill_drive:
  names:
    jp_kana: フリーズカセット
    jp_kanji: フリーズカセット
    en: Chill Drive
    fr: Module Cryo
    it: Gelomodulo
    de: Gefriermodul
    es: CrioROM
    ko: 프리즈카세트
    zh_simp: 冰冻卡带
    zh_trad: 冰凍卡帶
  descriptions:
    jp_kana: "ゲノセクトに　もたせると\nテクノバスターという　わざが\nこおりタイプになる　カセット。"
    jp_kanji: "ゲノセクトに　持たせると\nテクノバスターという　技が\nこおりタイプになる　カセット。"
    en: "A cassette to be held by Genesect. It changes\nGenesect’s Techno Blast move so it becomes\nIce type."
    fr: "Tenu par Genesect, ce module change la capacité\nTechno-Buster en une capacité de type Glace."
    it: "Modulo da dare a Genesect.\nTrasforma Tecnobotto in una mossa di tipo\nGhiaccio."
    de: "Gibt man es Genesect zum Tragen, wandelt es den Typ\nder Attacke Techblaster in Eis um."
    es: "Cartucho que convierte Tecno Shock de Genesect en un\nmovimiento de tipo Hielo."
    ko: "게노세크트에게 지니게 하면\n테크노버스터라는 기술이\n얼음타입으로 바뀌는 카세트."
    zh_simp: "这是让盖诺赛克特携带的卡带。\n携带后，高科技光炮这招式\n就会变为冰属性。"
    zh_trad: "讓蓋諾賽克特攜帶的卡帶。\n攜帶後，招式高科技光炮\n會變為冰屬性。"
chipped_pot:
  names:
    jp_kana: かけたポット
    jp_kanji: かけたポット
    en: Chipped Pot
    fr: Théière Ébréchée
    it: Teiera crepata
    de: Löchrige Kanne
    es: Tetera Rota
    ko: 이빠진포트
    zh_simp: 缺损的茶壶
    zh_trad: 缺損的茶壺
  descriptions:
    jp_kana: "ある　とくていの　ポケモンを\nしんかさせる　ふしぎな　ポット。\nかけているが　おちゃは　おいしくなる。"
    jp_kanji: "ある　特定の　ポケモンを\n進化させる　不思議な　ポット。\n欠けているが　お茶は　おいしくなる。"
    en: "A peculiar teapot that can make a certain species of\nPokémon evolve. It may be chipped, but tea poured\nfrom it is delicious."
    fr: "Un récipient mystérieux pouvant faire évoluer un certain\nPokémon. Il est ébréché, mais on y fait du bon thé."
    it: "Teiera particolare che fa evolvere determinate\nspecie di Pokémon. È crepata, ma il tè che contiene\nè davvero ottimo."
    de: "Diese spezielle Kanne löst bei einem bestimmten\nPokémon die Entwicklung aus. Sie weist zwar Löcher auf,\naber das wirkt sich nicht negativ auf den Tee aus."
    es: "Curiosa tetera que hace evolucionar a determinadas\nespecies de Pokémon. Pese a estar rota, sirve un té\nexquisito."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 포트.\n이가 빠졌지만 차는 맛있어진다."
    zh_simp: "这个神奇的茶壶\n可以使特定的宝可梦进化。\n虽然有缺陷，但泡出来的茶依旧清香。"
    zh_trad: "可以讓特定的寶可夢\n進化的神奇茶壺。\n雖然有缺口，但茶會變得美味。"
choice_band:
  names:
    jp_kana: こだわりハチマキ
    jp_kanji: こだわりハチマキ
    en: Choice Band
    fr: Bandeau Choix
    it: Bendascelta
    de: Wahlband
    es: Cinta Elección
    ko: 구애머리띠
    zh_simp: 讲究头带
    zh_trad: 講究頭帶
  descriptions:
    jp_kana: "ちょっと　こだわった　ハチマキ。\nもたせると　こうげきは　あがるが\nおなじ　わざしか　だせなくなる。"
    jp_kanji: "ちょっと　こだわった　ハチマキ。\n持たせると　攻撃は　あがるが\n同じ　技しか　だせなくなる。"
    en: "An item to be held by a Pokémon. This curious\nheadband boosts Attack but only allows the use of\none move."
    fr: "Objet à tenir. Ce bandeau augmente l’Attaque,\nmais ne permet d’utiliser qu’une seule capacité."
    it: "Strumento da dare a un Pokémon.\nQuesta benda aumenta l’Attacco, ma permette\nl’uso di una sola mossa."
    de: "Ein Item, das von einem Pokémon getragen werden\nkann. Es stärkt den Angriffs-Wert, aber nur eine Attacke\nist einsetzbar."
    es: "Aumenta la potencia de los ataques físicos del Pokémon\nque la lleva, pero solo le permite usar un movimiento."
    ko: "기술을 구애받는 머리띠.\n지니게 하면 공격은 올라가지만\n같은 기술밖에 쓸 수 없다."
    zh_simp: "有点讲究的头带。\n虽然携带后攻击会提高，\n但只能使出相同的招式。"
    zh_trad: "有點講究的頭帶。\n雖然攜帶後攻擊會提高，\n但只能使出相同的招式。"
choice_scarf:
  names:
    jp_kana: こだわりスカーフ
    jp_kanji: こだわりスカーフ
    en: Choice Scarf
    fr: Mouchoir Choix
    it: Stolascelta
    de: Wahlschal
    es: Pañuelo Elección
    ko: 구애스카프
    zh_simp: 讲究围巾
    zh_trad: 講究圍巾
  descriptions:
    jp_kana: "ちょっと　こだわった　スカーフ。\nもたせると　すばやさは　あがるが\nおなじ　わざしか　だせなくなる。"
    jp_kanji: "ちょっと　こだわった　スカーフ。\n持たせると　素早さは　あがるが\n同じ　技しか　だせなくなる。"
    en: "An item to be held by a Pokémon. This curious\nscarf boosts Speed but only allows the use of\none move."
    fr: "Objet à tenir. Augmente la Vitesse, mais ne permet\nd’utiliser qu’une seule capacité."
    it: "Strumento da dare a un Pokémon.\nStola che aumenta la Velocità, ma consente l’uso\ndi una sola mossa."
    de: "Ein Item zum Tragen. Der Schal erhöht den\nInitiative-Wert, aber nur eine Attacke ist einsetzbar."
    es: "Debe llevarlo un Pokémon. Potencia la Velocidad, pero\nsolo permite usar un movimiento."
    ko: "기술을 구애받는 스카프.\n지니게 하면 스피드는 올라가지만\n같은 기술밖에 쓸 수 없다."
    zh_simp: "有点讲究的围巾。\n虽然携带后速度会提高，\n但只能使出相同的招式。"
    zh_trad: "有點講究的圍巾。\n雖然攜帶後速度會提高，\n但只能使出相同的招式。"
choice_specs:
  names:
    jp_kana: こだわりメガネ
    jp_kanji: こだわりメガネ
    en: Choice Specs
    fr: Lunettes Choix
    it: Lentiscelta
    de: Wahlbrille
    es: Gafas Elección
    ko: 구애안경
    zh_simp: 讲究眼镜
    zh_trad: 講究眼鏡
  descriptions:
    jp_kana: "ちょっと　こだわった　メガネ。\nもたせると　とくこうは　あがるが\nおなじ　わざしか　だせなくなる。"
    jp_kanji: "ちょっと　こだわった　メガネ。\n持たせると　特攻は　あがるが\n同じ　技しか　だせなくなる。"
    en: "An item to be held by a Pokémon. These curious\nglasses boost Sp. Atk but only allow the use of\none move."
    fr: "Objet à tenir. Augmente l’Attaque Spéciale,\nmais ne permet d’utiliser qu’une seule capacité."
    it: "Strumento da dare a un Pokémon.\nQuesti occhiali aumentano la potenza delle mosse\nspeciali, ma permettono l’uso di una sola mossa."
    de: "Ein Item zum Tragen. Die Brille erhöht den\nSpezial-Angriff, aber nur eine Attacke ist einsetzbar."
    es: "Aumentan la potencia de los ataques especiales del\nPokémon que las lleva, pero solo le permiten usar un\nmovimiento."
    ko: "기술을 구애받는 안경.\n지니게 하면 특수공격이 올라가지만\n같은 기술밖에 쓸 수 없다."
    zh_simp: "有点讲究的眼镜。\n虽然携带后特攻会提高，\n但只能使出相同的招式。"
    zh_trad: "有點講究的眼鏡。\n雖然攜帶後特攻會提高，\n但只能使出相同的招式。"
chople_berry:
  names:
    jp_kana: ヨプのみ
    jp_kanji: ヨプのみ
    en: Chople Berry
    fr: Baie Pomroz
    it: Baccarosmel
    de: Rospelbeere
    es: Baya Pomaro
    ko: 로플열매
    zh_simp: 莲蒲果
    zh_trad: 蓮蒲果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　かくとう　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　かくとう技を\n受けたとき　威力が　弱まる。"
    en: "If held by a Pokémon, this Berry will lessen the\ndamage taken from one supereffective\nFighting-type attack."
    fr: "Tenue, cette Baie affaiblit une attaque ennemie\nsuper efficace de type Combat."
    it: "Se un Pokémon ha questa bacca, l’attacco\nsuperefficace di tipo Lotta del nemico\nviene indebolito."
    de: "Als getragenes Item schwächt diese Beere sehr effektive\ngegnerische Attacken vom Typ Kampf."
    es: "Si la lleva un Pokémon, debilita un ataque supereficaz\nde tipo Lucha de un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 굉장한 격투 기술로\n공격받았을 때 위력이 약해진다."
    zh_simp: "让宝可梦携带后，\n在受到效果绝佳的格斗属性招式\n攻击时，能令其威力减弱。"
    zh_trad: "讓寶可夢攜帶後，\n在受到效果絕佳的格鬥屬性招式\n攻擊時，能使其威力減弱。"
claw_fossil:
  names:
    jp_kana: ツメのカセキ
    jp_kanji: ツメのカセキ
    en: Claw Fossil
    fr: Fossile Griffe
    it: Fossilunghia
    de: Klauenfossil
    es: Fósil Garra
    ko: 발톱화석
    zh_simp: 爪子化石
    zh_trad: 爪子化石
  descriptions:
    jp_kana: "おおむかし　うみに　すんでいた\nこだい　ポケモンの　カセキ。\nツメの　いちぶ　らしい。"
    jp_kanji: "大昔　海に　すんでいた\n古代ポケモンの　カセキ。\nツメの　一部らしい。"
    en: "A fossil from a prehistoric Pokémon that once lived\nin the sea. It appears to be a fragment of a claw."
    fr: "Le fossile d’un ancien Pokémon aquatique.\nOn dirait un morceau de griffe."
    it: "Fossile di un Pokémon preistorico che viveva in\nmare. Sembra essere parte di un artiglio."
    de: "Das Fossil eines uralten Pokémon, das in der Tiefsee\nlebte. Es sieht wie eine Klaue aus."
    es: "Fósil de un Pokémon prehistórico que vivía en el fondo\ndel mar. Parece ser parte de una garra."
    ko: "오랜 옛날 바다에 살았던\n고대 포켓몬의 화석.\n발톱의 일부인 듯하다."
    zh_simp: "很久以前栖息在海里的\n古代宝可梦的化石。\n好像是爪子的一部分。"
    zh_trad: "很久以前棲息在海裡的\n古代寶可夢的化石。\n好像是爪子的一部分。"
cleanse_tag:
  names:
    jp_kana: きよめのおふだ
    jp_kanji: きよめのおふだ
    en: Cleanse Tag
    fr: Rune Purifiante
    it: Velopuro
    de: Schutzband
    es: Amuleto
    ko: 순결의부적
    zh_simp: 洁净之符
    zh_trad: 潔淨之符
  descriptions:
    jp_kana: "いちばん　まえの　ポケモンに\nもたせると　やせいポケモンが\nでて　きにくくなる。"
    jp_kanji: "１番　前の　ポケモンに\n持たせると　野生ポケモンが\nでて　きにくくなる。"
    en: "An item to be held by a Pokémon. It helps keep\nwild Pokémon away if the holder is the head of\nthe party."
    fr: "Objet à tenir. Aide à repousser les Pokémon sauvages\nsi le porteur est le premier Pokémon de l’équipe."
    it: "Strumento da dare a un Pokémon.\nSe chi ce l’ha è il primo della squadra, aiuta\nad allontanare i Pokémon selvatici."
    de: "Ein Item zum Tragen. Reduziert Begegnungen mit\nwilden Pokémon, wenn der Träger an der Spitze deines\nTeams steht."
    es: "Si lo lleva el primer Pokémon del equipo, se reduce la\nprobabilidad de que se acerquen Pokémon salvajes."
    ko: "맨 앞의 포켓몬에게\n지니게 하면 야생 포켓몬이\n나타날 확률이 낮아진다."
    zh_simp: "让排在最前面的宝可梦携带后，\n野生宝可梦就会不容易出现。"
    zh_trad: "讓排在最前面的寶可夢\n攜帶後，野生寶可夢\n會變得不容易出現。"
clear_bell:
  names:
    jp_kana: とうめいなスズ
    jp_kanji: とうめいなスズ
    en: Clear Bell
    fr: Glas Transparent
    it: Campana Chiara
    de: Klarglocke
    es: Cascabel Claro
    ko: 크리스탈방울
    zh_simp: 透明铃铛
    zh_trad: 透明鈴鐺
  descriptions:
    jp_kana: "こころ　やすまる　ねいろが　きける\nとても　ふるめかしい　スズ。"
    jp_kanji: "こころ　やすまる　音色が　きける\nとても　ふるめかしい　スズ。"
    en: "A very old-fashioned bell that makes a gentle\nringing sound."
    fr: Une cloche antique au tintement apaisant.
    it: "Una campana antica. Produce un suono che dona pace\nal cuore."
    de: "Eine altehrwürdige Glocke, deren Läuten alle\nbesänftigt, die es hören."
    es: "Cascabel de aspecto antiguo que emite un sonido\nque calma el espíritu."
    ko: "마음이 편안해지는 음색이 들리는\n아주 고풍스러운 방울."
    zh_simp: "能发出静心宁神音色的，\n非常古旧的铃铛。"
    zh_trad: "能發出使人心情平靜音色的，\n非常古老的鈴鐺。"
clefairy_candy:
  names:
    jp_kana: ピッピのアメ
    jp_kanji: ピッピのアメ
    en: Clefairy Candy
    fr: Bonbon Mélofée
    it: Caramella Clefairy
    de: Piepi-Bonbon
    es: Caramelo Clefairy
    ko: 삐삐의사탕
    zh_simp: 皮皮的糖果
    zh_trad: 皮皮的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
clever_feather:
  names:
    jp_kana: せいしんのハネ
    jp_kanji: せいしんのハネ
    en: Clever Feather
    fr: Plume Mental
    it: Piumintuito
    de: Espritfeder
    es: Pluma Mente
    ko: 정신력날개
    zh_simp: 精神之羽
    zh_trad: 精神之羽
  descriptions:
    jp_kana: "ポケモンに　つかう　どうぐ。\nポケモン　１ひきの　とくぼうの\nきそポイントを　ちょっと　あげる。"
    jp_kanji: "ポケモンに　使う　道具。\nポケモン　１匹の　特防の\n基礎ポイントを　ちょっと　あげる。"
    en: "An item for use on a Pokémon. It slightly increases\nthe Sp. Def base points of a single Pokémon."
    fr: "Objet à utiliser sur un Pokémon pour un peu augmenter\nsa Défense Spéciale de base."
    it: "Strumento da usare su un Pokémon.\nNe aumenta di poco i punti base della Difesa\nSpeciale."
    de: "Wendet man dieses Item auf ein Pokémon an, wird\ndessen Spezial-Verteidigungs-Basiswert dauerhaft\nerhöht."
    es: "Pluma que aumenta un poco la Defensa Especial de\nbase de un Pokémon."
    ko: "포켓몬에게 사용하는 도구.\n포켓몬 1마리의 특수방어\n기초 포인트를 조금 올린다."
    zh_simp: "用于宝可梦的道具。\n能稍微提高１只宝可梦的\n特防的基础点数。"
    zh_trad: "用於寶可夢的道具。\n能稍微提高１隻寶可夢的\n特防的基礎點數。"
clothing_trunk:
  names:
    jp_kana: おきがえトランク
    jp_kanji: おきがえトランク
    en: Clothing Trunk
    fr: Malle à Costumes
    it: Valigia vestiti
    de: Klamottenkoffer
    es: Maleta
    ko: 옷갈아입기트렁크
    zh_simp: 换装箱
    zh_trad: 換裝箱
  descriptions:
    jp_kana: "ポケモンや　トレーナーの\nきがえを　いれられる\nとても　かるい　トランク。"
    jp_kanji: "ポケモンや　トレーナーの\n着替えを　入れられる\nとても　軽い　トランク。"
    en: "A very light trunk that can carry clothing for you\nand your Pokémon."
    fr: "Une malle très légère qui contient vos costumes\net ceux de votre partenaire."
    it: "Una valigia leggerissima che può contenere tutti i capi\nd’abbigliamento di un Allenatore e del suo compagno\nd’avventura."
    de: "Ein überraschend leichter Koffer, in dem verschiedene\nKleidungsstücke und Accessoires für Trainer und\nPokémon verstaut werden können."
    es: "Una maleta muy ligera en la que puedes guardar ropa\no accesorios para ti o tu Pokémon."
    ko: "포켓몬이나 트레이너의\n의상을 넣을 수 있는\n매우 가벼운 트렁크."
    zh_simp: "非常轻的箱子。\n能塞入宝可梦或\n训练家的替换衣物。"
    zh_trad: "十分輕便的行李箱。\n裡面可以放寶可夢和\n訓練家的替換衣物。"
clover_sweet:
  names:
    jp_kana: よつばアメざいく
    jp_kanji: よつばアメざいく
    en: Clover Sweet
    fr: Trèfle en Sucre
    it: Bonbonfoglio
    de: Zucker-Kleeblatt
    es: Confite Trébol
    ko: 네잎사탕공예
    zh_simp: 幸运草糖饰
    zh_trad: 幸運草糖飾
  descriptions:
    jp_kana: "よつばの　かたちを　した　アメざいく。\nマホミルに　もたせてあげると\nくるくる　まわって　よろこぶ。"
    jp_kanji: "よつばの　形を　した　アメ細工。\nマホミルに　持たせてあげると\nくるくる　回って　喜ぶ。"
    en: "A clover-shaped sweet. When a Milcery\nholds this, it spins around happily."
    fr: "Un bonbon en forme de trèfle.\nQuand on le donne à un Crèmy, il danse de bonheur."
    it: "Bonbon a forma di quadrifoglio. Se dato a Milcery,\nil Pokémon farà le piroette per la felicità."
    de: "Zuckerwerk in Form eines Kleeblattes. Gibt man es\nHokumil zum Tragen, dreht es sich vor Freude im Kreis."
    es: "Figura de caramelo con forma de trébol. Al dárselo a\nMilcery, se pone a girar rebosante de alegría."
    ko: "네잎클로버 모양의 사탕공예.\n마빌크에게 지니게 하면\n빙빙 돌며 기뻐한다."
    zh_simp: "四叶草形状的工艺糖果。\n让小仙奶携带的话，\n会高兴地转圈圈。"
    zh_trad: "四葉草形狀的工藝糖果。\n讓小仙奶攜帶的話，\n牠會高興得轉圈圈。"
coba_berry:
  names:
    jp_kana: バコウのみ
    jp_kanji: バコウのみ
    en: Coba Berry
    fr: Baie Cobaba
    it: Baccababa
    de: Kobabeere
    es: Baya Kouba
    ko: 바코열매
    zh_simp: 棱瓜果
    zh_trad: 稜瓜果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　ひこう　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　ひこう技を\n受けたとき　威力が　弱まる。"
    en: "If held by a Pokémon, this Berry will lessen the\ndamage taken from one supereffective\nFlying-type attack."
    fr: "Tenue, cette Baie affaiblit une attaque ennemie\nsuper efficace de type Vol."
    it: "Se un Pokémon ha questa bacca, l’attacco\nsuperefficace di tipo Volante del nemico\nviene indebolito."
    de: "Als getragenes Item schwächt diese Beere sehr effektive\ngegnerische Attacken vom Typ Flug."
    es: "Si la lleva un Pokémon, debilita un ataque supereficaz\nde tipo Volador de un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 굉장한 비행 기술로\n공격받았을 때 위력이 약해진다."
    zh_simp: "让宝可梦携带后，\n在受到效果绝佳的飞行属性招式\n攻击时，能令其威力减弱。"
    zh_trad: "讓寶可夢攜帶後，\n在受到效果絕佳的飛行屬性招式\n攻擊時，能使其威力減弱。"
coconut_milk:
  names:
    jp_kana: ヤシのミルク
    jp_kanji: ヤシのミルク
    en: Coconut Milk
    fr: Lait de Coco
    it: Latte di cocco
    de: Kokosmilch
    es: Leche de Coco
    ko: 야자밀크
    zh_simp: 椰奶
    zh_trad: 椰奶
  descriptions:
    jp_kana: "キャンプの　りょうりに　つかう\nしょくざいの　いっしゅ。ココナッツの\nじょうひんな　あまさの　ミルクが　にんき。"
    jp_kanji: "キャンプの　料理に　使う\n食材の　一種。ココナッツの\n上品な　甘さの　ミルクが　人気。"
    en: "One of the many ingredients that can be used for\ncooking at your camp. The refined sweetness of this\ncoconut milk makes it quite popular."
    fr: "Un ingrédient de cuisine pour le camping.\nLa douceur incomparable de cette boisson\nà la noix de coco lui vaut un grand succès."
    it: "Uno degli ingredienti che puoi usare per cucinare\nin campeggio. La sua raffinata dolcezza lo rende\nmolto popolare."
    de: "Eine Zutat für PokéCamping-Mahlzeiten. Die feine Süße\nder Kokosnuss verhilft dieser Milch zu sehr großer\nBeliebtheit."
    es: "Un ingrediente para cocinar en el campamento. Muy\npopular por el dulzor refinado que aporta al plato."
    ko: "캠프 요리에 사용되는\n식재료 중 하나. 고급스러운 단맛이 나는\n코코넛 밀크가 인기다."
    zh_simp: "在露营营地制作料理时会使用的\n一种食材。椰奶那种与众不同的\n清甜滋味非常受欢迎。"
    zh_trad: "製作露營料理時使用的食材之一。\n帶著椰子特有清甜滋味的\n椰奶很受歡迎。"
coin_case:
  names:
    jp_kana: コインケース
    jp_kanji: コインケース
    en: Coin Case
    fr: Boîte Jetons
    it: Salvadanaio
    de: Münzkorb
    es: Monedero
    ko: 동전케이스
    zh_simp: 代币盒
    zh_trad: 代幣盒
  descriptions:
    jp_kana: "ゲームコーナーで　てにいれた\nコインを　５００００まい　まで\nいれることが　できる　ケース。"
    jp_kanji: "ゲームコーナーで　てにいれた\nコインを　５００００枚まで\nいれることが　できる　ケース。"
    en: "A case for holding coins obtained at the\nGame Corner. It can hold up to 50,000 coins."
    fr: "Une boîte pour conserver les Jetons obtenus\nà la salle d’arcade. Peut contenir jusqu’à 50 000 Jetons."
    it: "Contenitore ottenuto al Casinò che può contenere\nfino a 50.000 Gettoni."
    de: "Im Korb finden bis zu 50 000 Münzen des\nGamer-Paradieses Platz."
    es: "Puedes obtenerlo en la Sala de Juegos. Tiene capacidad\npara 50 000 fichas."
    ko: "게임코너에서 손에 넣은\n동전을 50000개 까지\n넣을 수 있는 케이스."
    zh_simp: "可以存放代币的盒子。\n最多能放入５００００枚\n在游戏城获得的代币。"
    zh_trad: "最多可以放入５００００枚\n在遊戲城獲得的代幣的盒子。"
colbur_berry:
  names:
    jp_kana: ナモのみ
    jp_kanji: ナモのみ
    en: Colbur Berry
    fr: Baie Lampou
    it: Baccaxan
    de: Burleobeere
    es: Baya Dillo
    ko: 마코열매
    zh_simp: 刺耳果
    zh_trad: 刺耳果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　あく　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　あく技を\n受けたとき　威力が　弱まる。"
    en: "If held by a Pokémon, this Berry will lessen the\ndamage taken from one supereffective\nDark-type attack."
    fr: "Tenue, cette Baie affaiblit une attaque ennemie\nsuper efficace de type Ténèbres."
    it: "Se un Pokémon ha questa bacca, l’attacco\nsuperefficace di tipo Buio del nemico\nviene indebolito."
    de: "Als getragenes Item schwächt diese Beere sehr effektive\ngegnerische Attacken vom Typ Unlicht."
    es: "Si la lleva un Pokémon, debilita un ataque supereficaz\nde tipo Siniestro de un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 굉장한 악 기술로\n공격받았을 때 위력이 약해진다."
    zh_simp: "让宝可梦携带后，\n在受到效果绝佳的恶属性招式\n攻击时，能令其威力减弱。"
    zh_trad: "讓寶可夢攜帶後，\n在受到效果絕佳的惡屬性招式\n攻擊時，能使其威力減弱。"
colress_machine:
  names:
    jp_kana: アクロママシーン
    jp_kanji: アクロママシーン
    en: Colress Machine
    fr: Nikodule
    it: Acrocongegno
    de: Achromat
    es: Acromáquina
    ko: 아크로마머신
    zh_simp: 阿克罗玛机器
    zh_trad: 阿克羅瑪機器
  descriptions:
    jp_kana: "ポケモンの　のうりょくを　むりやり\nめざめさせる　とくしゅな　そうち。\nだが　しさくひんのため　ふかんぜん。"
    jp_kanji: "ポケモンの　能力を　無理やり\n目覚めさせる　特殊な　装置。\nだが　試作品のため　不完全。"
    en: "A special device that wrings out the potential of\nPokémon. It’s an imperfect prototype."
    fr: "Un appareil spécial qui permet d’éveiller de force\nla puissance des Pokémon. Mais il ne s’agit que\nd’un prototype."
    it: "Prototipo imperfetto di un dispositivo speciale\nideato per risvegliare in modo forzato le capacità\ndei Pokémon."
    de: "Eine Vorrichtung, die verborgene Kräfte in den\nPokémon weckt. Es handelt sich dabei um einen\nunfertigen Prototyp."
    es: "Dispositivo que permite aumentar forzadamente las\ncaracterísticas de los Pokémon. Es un prototipo\nimperfecto."
    ko: "포켓몬의 능력을 강제로\n눈뜨게 만드는 특수 장치.\n그러나 시작품이기에 불완전하다."
    zh_simp: "能强行让宝可梦的能力\n觉醒的特殊装置。\n但由于是试制品，功能尚未完善。"
    zh_trad: "能強行讓寶可夢的能力\n覺醒的特殊裝置。\n但由於是試作品，功能還不完全。"
comet_shard:
  names:
    jp_kana: すいせいのかけら
    jp_kanji: すいせいのかけら
    en: Comet Shard
    fr: Morceau Comète
    it: Pezzo Cometa
    de: Kometstück
    es: Fragmento Cometa
    ko: 혜성조각
    zh_simp: 彗星碎片
    zh_trad: 彗星碎片
  descriptions:
    jp_kana: "すいせいが　ちかづいたとき\nちひょうに　おちた　かけら。\nショップで　たかく　うれる。"
    jp_kanji: "すい星が　近づいたとき\n地表に　落ちた　かけら。\nショップで　高く　売れる。"
    en: "A shard that fell to the ground when a comet\napproached. It can be sold at a high price\nto shops."
    fr: "Un fragment de comète, tombé au sol quand\nelle traversait l’atmosphère. Peut être vendu à bon prix\nen magasin."
    it: "Scheggia di cometa caduta al suolo. Si può vendere\na un prezzo piuttosto alto nei negozi."
    de: "Ein Kometensplitter, der aus dem All herabgefallen ist.\nEr ist von großem Wert."
    es: "Fragmento de un cometa caído al suelo al atravesar la\natmósfera. Se puede vender a buen precio en las\ntiendas."
    ko: "혜성이 가까워졌을 때\n지표면에 떨어진 조각.\n상점에서 비싸게 팔린다."
    zh_simp: "彗星临近时，\n掉落到地表上的碎片。\n可以在商店高价出售。"
    zh_trad: "彗星接近時，\n掉落到地表上的碎片。\n可以在商店高價出售。"
common_stone:
  names:
    jp_kana: ありふれたいし
    jp_kanji: ありふれたいし
    en: Common Stone
    fr: Pierre Ordinaire
    it: Sasso qualsiasi
    de: Normaler Stein
    es: Piedra Común
    ko: 흔해빠진돌
    zh_simp: 常见石
    zh_trad: 常見石
  descriptions:
    jp_kana: "みる　ひとに　よっては\nきちょう　かもしれない\nでも　ふつうの　いし。"
    jp_kanji: "みる　人に　よっては\n貴重　かもしれない\nでも　普通の　石。"
    en: "A perfectly normal stone that might appear to be\nvaluable to some. It’s all in the eye of the beholder."
    fr: "Une pierre assez banale qui pourrait avoir de la valeur\npour certains."
    it: "Un sasso qualsiasi che qualcuno potrebbe\nritenere di valore."
    de: "Ein Stein, der für manche vielleicht wertvoll aussieht,\ntatsächlich aber nur ein gewöhnlicher Stein ist."
    es: "Una piedra de aspecto normal que a algunos les puede\nparecer de gran valor."
    ko: "보는 사람에 따라서는\n귀중할지도 모르는\n평범한 돌."
    zh_simp: "在有些人看来\n可能会觉得它十分贵重。\n但其实是块普通的石头。"
    zh_trad: "在某些人眼裡\n可能會覺得它十分貴重。\n但其實是塊普通的石頭。"
contest_costume:female:
  names:
    jp_kana: ライブドレス
    jp_kanji: ライブドレス
    en: Contest Costume
    fr: Robe Live
    it: Vestito Live
    de: Live-Kleid
    es: Vestido de Gala
    ko: 라이브드레스
    zh_simp: 演出礼裙
    zh_trad: 演出禮裙
  descriptions:
    jp_kana: "コンテストライブで　きる\nとっても　かわいい　ドレス。"
    jp_kanji: "コンテストライブで　着る\nとっても　可愛い　ドレス。"
    en: "A very cute dress to be worn during the\nContest Spectacular."
    fr: "Une robe très mignonne portée pour le Concours\nPokémon Live !"
    it: "Grazioso vestito da indossare durante le\nGare Live."
    de: "Ein niedliches Kleidchen, das bei\nPokémon-Wettbewerb Live! getragen werden kann."
    es: "Vestido de lo más espectacular para lucir en el Gran\nConcurso."
    ko: "콘테스트 라이브에서 입는\n아주 귀여운 드레스다."
    zh_simp: "在华丽现场大赛上演出时穿的\n非常可爱的礼裙。"
    zh_trad: "在華麗現場大賽上演出時穿的\n非常可愛的禮裙。"
contest_costume:male:
  names:
    jp_kana: ライブスーツ
    jp_kanji: ライブスーツ
    en: Contest Costume
    fr: Costume Live
    it: Costume Live
    de: Live-Anzug
    es: Traje de Gala
    ko: 라이브슈트
    zh_simp: 演出礼服
    zh_trad: 演出禮服
  descriptions:
    jp_kana: "コンテストライブで　きる\nとっても　カッコいい　スーツ。"
    jp_kanji: "コンテストライブで　着る\nとっても　格好良い　スーツ。"
    en: "A very cool suit to be worn during the\nContest Spectacular."
    fr: "Un costume très rock porté pour le Concours\nPokémon Live !"
    it: "Elegante costume da indossare durante le\nGare Live."
    de: "Ein schicker Anzug, der bei Pokémon-Wettbewerb Live!\ngetragen werden kann."
    es: "Traje de lo más espectacular para lucir en el Gran\nConcurso."
    ko: "콘테스트 라이브에서 입는\n아주 멋있는 슈트다."
    zh_simp: "在华丽现场大赛上演出时穿的\n非常帅气的礼服。"
    zh_trad: "在華麗現場大賽上演出時穿的\n非常帥氣的禮服。"
contest_pass:
  names:
    jp_kana: コンテストパス
    jp_kanji: コンテストパス
    en: Contest Pass
    fr: Passe Concours
    it: Tessera Gare
    de: Wettbewerbskarte
    es: Pase Concurso
    ko: 콘테스트패스
    zh_simp: 华丽大赛参加证
    zh_trad: 華麗大賽參加證
  descriptions:
    jp_kana: "もっていれば　ポケモンコンテストに\nさんか　することが　できる。\nきねんリボンが　かかれている。"
    jp_kanji: "持っていれば　ポケモンコンテストに\n参加することが　できる。\n記念リボンが　描かれている。"
    en: "A pass required for entering Pokémon Contests.\nIt has a drawing of an award ribbon on its front."
    fr: "La carte requise pour participer aux Concours Pokémon.\nIl y a un ruban dessiné dessus."
    it: "Tessera necessaria per partecipare alle\nGare Pokémon. Riporta il disegno di un fiocco."
    de: "Ausweis zur Teilnahme an Pokémon-Wettbewerben.\nDie Zeichnung eines Bandes ist aufgedruckt."
    es: "Es necesario para participar en Concursos Pokémon.\nTiene una cinta de ganador dibujada."
    ko: "지니고 있으면 포켓몬 콘테스트에\n참가할 수 있다.\n기념리본이 그려져 있다."
    zh_simp: "拿着它就可以参加宝可梦华丽大赛。\n上面印有纪念奖章。"
    zh_trad: "拿著它就可以參加\n寶可夢華麗大賽。\n上面印有紀念獎章。"
cornn_berry:
  names:
    jp_kana: モコシのみ
    jp_kanji: モコシのみ
    en: Cornn Berry
    fr: Baie Siam
    it: Baccavena
    de: Saimbeere
    es: Baya Mais
    ko: 수숙열매
    zh_simp: 玉黍果
    zh_trad: 玉黍果
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。\nふかふかのつちに　うめると\nモコシが　そだつ。"
    jp_kanji: "ポフィンの　材料。\nふかふかの土に　埋めると\nモコシが　育つ。"
    en: "A Poffin ingredient. Bury it in soft soil to grow a\nCornn Berry plant."
    fr: "Un ingrédient entrant dans la confection de Poffins.\nPlantez cette Baie dans un sol meuble et fertile\npour faire pousser un arbre à Baies Siam."
    it: "Si usa per fare i poffin. Seminala nella terra soffice\nper far crescere una pianta di Baccavena."
    de: "Eine Knursp-Zutat. Pflanze sie in weichen Lehmboden\nein, damit neue Saimbeeren wachsen."
    es: "Ingrediente para pokochos. Si se planta en tierra suelta,\nsaldrá una planta de Mais."
    ko: "포핀의 재료.\n푹신푹신한 땅에 심으면\n수숙이 자란다."
    zh_simp: "宝芬的材料。\n埋在松软的土地里\n可以培育出玉黍。"
    zh_trad: "製作寶芬的材料。\n埋進鬆軟的泥土裡，\n長成後會結出玉黍。"
coupon_1:
  names:
    jp_kana: ひきかえけん１
    jp_kanji: ひきかえけん１
    en: Coupon 1
    fr: Bon 1
    it: Coupon 1
    de: Coupon 1
    es: Cupón 1
    ko: 교환권1
    zh_simp: 兑换券１
    zh_trad: 兌換券１
  descriptions:
    jp_kana: "ポケモンウォッチ　ちぢめて\nポケッチを　もらうために　ひつような\nひきかえけん。　３まい　ひつよう。"
    jp_kanji: "ポケモンウォッチ　ちぢめて\nポケッチを　もらうために　必要な\nひきかえけん。　３枚必要。"
    en: "A coupon to be exchanged for a Pokémon Watch—\nPokétch for short. Three coupons are needed."
    fr: Un des trois bons à échanger contre une Pokémontre.
    it: "Coupon da scambiare con un PokéKron.\nNe servono tre."
    de: "Einer der drei Coupons, die du für den Pokétch\nbenötigst."
    es: "Uno de los tres cupones que sirve para obtener un\nPoké Reloj."
    ko: "포켓몬 워치, 줄여서 포켓치를\n받는 데 필요한 교환권.\n3장이 필요하다."
    zh_simp: "获取宝可梦手表，简称宝可表时\n所需的兑换券。需要３张。"
    zh_trad: "欲取得寶可夢手錶，簡稱寶可錶時\n所需的兌換券。需要３張。"
coupon_2:
  names:
    jp_kana: ひきかえけん２
    jp_kanji: ひきかえけん２
    en: Coupon 2
    fr: Bon 2
    it: Coupon 2
    de: Coupon 2
    es: Cupón 2
    ko: 교환권2
    zh_simp: 兑换券２
    zh_trad: 兌換券２
  descriptions:
    jp_kana: "ポケモンウォッチ　ちぢめて\nポケッチを　もらうために　ひつような\nひきかえけん。　３まい　ひつよう。"
    jp_kanji: "ポケモンウォッチ　ちぢめて\nポケッチを　もらうために　必要な\nひきかえけん。　３枚必要。"
    en: "A coupon to be exchanged for a Pokémon Watch—\nPokétch for short. Three coupons are needed."
    fr: Un des trois bons à échanger contre une Pokémontre.
    it: "Coupon da scambiare con un PokéKron.\nNe servono tre."
    de: "Einer der drei Coupons, die du für den Pokétch\nbenötigst."
    es: "Uno de los tres cupones que sirve para obtener un\nPoké Reloj."
    ko: "포켓몬 워치, 줄여서 포켓치를\n받는 데 필요한 교환권.\n3장이 필요하다."
    zh_simp: "获取宝可梦手表，简称宝可表时\n所需的兑换券。需要３张。"
    zh_trad: "欲取得寶可夢手錶，簡稱寶可錶時\n所需的兌換券。需要３張。"
coupon_3:
  names:
    jp_kana: ひきかえけん３
    jp_kanji: ひきかえけん３
    en: Coupon 3
    fr: Bon 3
    it: Coupon 3
    de: Coupon 3
    es: Cupón 3
    ko: 교환권3
    zh_simp: 兑换券３
    zh_trad: 兌換券３
  descriptions:
    jp_kana: "ポケモンウォッチ　ちぢめて\nポケッチを　もらうために　ひつような\nひきかえけん。　３まい　ひつよう。"
    jp_kanji: "ポケモンウォッチ　ちぢめて\nポケッチを　もらうために　必要な\nひきかえけん。　３枚必要。"
    en: "A coupon to be exchanged for a Pokémon Watch—\nPokétch for short. Three coupons are needed."
    fr: Un des trois bons à échanger contre une Pokémontre.
    it: "Coupon da scambiare con un PokéKron.\nNe servono tre."
    de: "Einer der drei Coupons, die du für den Pokétch\nbenötigst."
    es: "Uno de los tres cupones que sirve para obtener un\nPoké Reloj."
    ko: "포켓몬 워치, 줄여서 포켓치를\n받는 데 필요한 교환권.\n3장이 필요하다."
    zh_simp: "获取宝可梦手表，简称宝可表时\n所需的兑换券。需要３张。"
    zh_trad: "欲取得寶可夢手錶，簡稱寶可錶時\n所需的兌換券。需要３張。"
courage_candy:
  names:
    jp_kana: こころのアメ
    jp_kanji: こころのアメ
    en: Courage Candy
    fr: Bonbon Mental S
    it: Caramella intuito S
    de: Mentalbonbon
    es: Caramelo Mente
    ko: 마음의사탕
    zh_simp: 心灵糖果
    zh_trad: 心靈糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nポケモンの　とくぼうを　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\nポケモンの　とくぼうを　上げる。"
    en: "A candy that is packed with energy. When given to\na Pokémon, it will increase that Pokémon’s Sp. Def stat."
    fr: "Un bonbon plein d’énergie.\nIl augmente la Défense Spéciale d’un Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta la Difesa Speciale di un Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\ndie Spezial-Verteidigung eines Pokémon."
    es: "Caramelo energético que aumenta la Defensa Especial\ndel Pokémon."
    ko: "에너지가 가득한 사탕.\n포켓몬의 특수방어를 올린다."
    zh_simp: "充满能量的糖果。\n能提高宝可梦的特防。"
    zh_trad: "充滿能量的糖果。\n能提高寶可夢的特防。"
courage_candy_l:
  names:
    jp_kana: こころのアメＬ
    jp_kanji: こころのアメＬ
    en: Courage Candy L
    fr: Bonbon Mental M
    it: Caramella intuito M
    de: Mentalbonbon+
    es: Caramelo Mente +
    ko: 마음의사탕L
    zh_simp: 心灵糖果Ｌ
    zh_trad: 心靈糖果Ｌ
  descriptions:
    jp_kana: "エネルギーの　つまった　おおきい　アメ。\nレベル３０　いじょうの　ポケモンの\nとくぼうを　あげる。"
    jp_kanji: "エネルギーの　つまった　大きい　アメ。\nレベル３０　以上の　ポケモンの\nとくぼうを　上げる。"
    en: "A big candy that is packed with energy. When given to\na Pokémon at Lv. 30 or higher, it will increase that\nPokémon’s Sp. Def stat."
    fr: "Un gros bonbon plein d’énergie.\nIl augmente la Défense Spéciale d’un Pokémon\nde niveau 30 ou supérieur."
    it: "Una caramella piena zeppa di energia.\nAumenta la Difesa Speciale di un Pokémon\ndi livello 30 o superiore."
    de: "Ein großes Bonbon, das voller Energie steckt.\nErhöht dauerhaft die Spezial-Verteidigung eines\nPokémon ab Level 30."
    es: "Caramelo energético grande que aumenta la Defensa\nEspecial de un Pokémon de Nv. 30 o superior."
    ko: "에너지가 가득한 큰 사탕.\n레벨 30 이상인 포켓몬의\n특수방어를 올린다."
    zh_simp: "充满能量的大糖果。\n能让等级３０以上的\n宝可梦的特防上升。"
    zh_trad: "充滿能量的大糖果。\n能提高等級在３０以上的\n寶可夢的特防。"
courage_candy_xl:
  names:
    jp_kana: こころのアメＸＬ
    jp_kanji: こころのアメＸＬ
    en: Courage Candy XL
    fr: Bonbon Mental L
    it: Caramella intuito L
    de: Mentalbonbon++
    es: Caramelo Mente ++
    ko: 마음의사탕XL
    zh_simp: 心灵糖果ＸＬ
    zh_trad: 心靈糖果ＸＬ
  descriptions:
    jp_kana: "エネルギーの　つまった　とくだいの　アメ。\nレベル６０　いじょうの　ポケモンの\nとくぼうを　あげる。"
    jp_kanji: "エネルギーの　つまった　特大の　アメ。\nレベル６０　以上の　ポケモンの\nとくぼうを　上げる。"
    en: "A huge candy that is packed with energy. When given\nto a Pokémon at Lv. 60 or higher, it will increase that\nPokémon’s Sp. Def stat."
    fr: "Un énorme bonbon plein d’énergie.\nIl augmente la Défense Spéciale d’un Pokémon\nde niveau 60 ou supérieur."
    it: "Una caramella piena zeppa di energia.\nAumenta la Difesa Speciale di un Pokémon\ndi livello 60 o superiore."
    de: "Ein riesiges Bonbon, das voller Energie steckt.\nErhöht dauerhaft die Spezial-Verteidigung eines\nPokémon ab Level 60."
    es: "Caramelo energético enorme que aumenta la Defensa\nEspecial de un Pokémon de Nv. 60 o superior."
    ko: "에너지가 가득한 매우 큰 사탕.\n레벨 60 이상인 포켓몬의\n특수방어를 올린다."
    zh_simp: "充满能量的超大糖果。\n能让等级６０以上的\n宝可梦的特防上升。"
    zh_trad: "充滿能量的特大糖果。\n能提高等級在６０以上的\n寶可夢的特防。"
cover_fossil:
  names:
    jp_kana: ふたのカセキ
    jp_kanji: ふたのカセキ
    en: Cover Fossil
    fr: Fossile Plaque
    it: Fossiltappo
    de: Schildfossil
    es: Fósil Tapa
    ko: 덮개화석
    zh_simp: 背盖化石
    zh_trad: 背蓋化石
  descriptions:
    jp_kana: "おおむかし　うみに　すんでいた\nこだい　ポケモンの　カセキ。\nせなかの　いちぶ　らしい。"
    jp_kanji: "大昔　海に　すんでいた\n古代ポケモンの　カセキ。\nせなかの　一部らしい。"
    en: "A fossil from a prehistoric Pokémon that once lived\nin the sea. It appears as though it could be part of\nits back."
    fr: "Le fossile d’un ancien Pokémon aquatique.\nIl semble que ce soit une partie de son dos."
    it: "Fossile di un Pokémon preistorico che viveva\nnel mare. Sembra essere parte del suo dorso."
    de: "Das Fossil eines uralten Pokémon, das in der Tiefsee\nlebte. Offenbar handelt es sich um einen Teil des\nRückens."
    es: "Fósil de un Pokémon prehistórico que vivía en el fondo\ndel mar. Parece ser un fragmento de caparazón."
    ko: "오랜 옛날 바다에 살았던\n고대 포켓몬의 화석.\n등의 일부인 듯하다."
    zh_simp: "很久以前栖息在海里的\n古代宝可梦的化石。\n好像是后背的一部分。"
    zh_trad: "很久以前棲息在海裡的\n古代寶可夢的化石。\n好像是後背的一部分。"
cracked_pot:
  names:
    jp_kana: われたポット
    jp_kanji: われたポット
    en: Cracked Pot
    fr: Théière Fêlée
    it: Teiera rotta
    de: Rissige Kanne
    es: Tetera Agrietada
    ko: 깨진포트
    zh_simp: 破裂的茶壶
    zh_trad: 破裂的茶壺
  descriptions:
    jp_kana: "ある　とくていの　ポケモンを\nしんかさせる　ふしぎな　ポット。\nわれているが　おちゃは　おいしくなる。"
    jp_kanji: "ある　特定の　ポケモンを\n進化させる　不思議な　ポット。\n割れているが　お茶は　おいしくなる。"
    en: "A peculiar teapot that can make a certain species of\nPokémon evolve. It may be cracked, but tea poured\nfrom it is delicious."
    fr: "Un récipient mystérieux pouvant faire évoluer un certain\nPokémon. Il est abîmé, mais on y fait du bon thé."
    it: "Teiera particolare che fa evolvere determinate\nspecie di Pokémon. È rotta, ma il tè che contiene\nè davvero ottimo."
    de: "Diese spezielle Kanne löst bei einem bestimmten\nPokémon die Entwicklung aus. Sie weist zwar Risse auf,\naber das wirkt sich nicht negativ auf den Tee aus."
    es: "Curiosa tetera que hace evolucionar a determinadas\nespecies de Pokémon. Pese a estar agrietada, sirve un\nté exquisito."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 포트.\n깨졌지만 차는 맛있어진다."
    zh_simp: "这个神奇的茶壶\n可以使特定的宝可梦进化。\n虽然有破损，但泡出来的茶依旧清香。"
    zh_trad: "可以讓特定的寶可夢\n進化的神奇茶壺。\n雖然有裂痕，但茶會變得美味。"
crown_pass:
  names:
    jp_kana: カンムリパス
    jp_kanji: カンムリパス
    en: Crown Pass
    fr: Pass Couronneige
    it: Pass Corona
    de: Kronenpass
    es: Pase Corona
    ko: 왕관패스
    zh_simp: 王冠车票
    zh_trad: 王冠車票
  descriptions:
    jp_kana: "カンムリせつげんに　いくための　パス。\nブラッシータウンの　えきで\nえきいんさんに　みせよう。"
    jp_kanji: "カンムリ雪原に　行くための　パス。\nブラッシータウンの　駅で\n駅員さんに　見せよう。"
    en: "A pass to go to the Crown Tundra. Show it to the rail\nstaff at Wedgehurst Station."
    fr: "Un pass pour se rendre à Couronneige.\nMontrez-le à l’employé de la Gare de Brasswick."
    it: "Un pass necessario per raggiungere la Landa Corona.\nMostralo al personale della Stazione di Brassbury."
    de: "Ein Pass, mit dem du zu den Kronen-Schneelanden\ngelangst. Zeige ihn dem Personal am Brassbury-Bahnhof."
    es: "Un pase que permite viajar hasta las Nieves de la\nCorona. Hay que mostrárselo al empleado de la\nestación de Pueblo Par."
    ko: "왕관설원에 갈 수 있는 패스.\n브래시마을역에 있는\n역무원에게 보여 주자."
    zh_simp: "前往王冠雪原的车票。\n在木杆镇的车站，\n把它出示给站务员看吧。"
    zh_trad: "前往王冠雪原的車票。\n在木桿鎮的車站\n把它出示給站務員看吧。"
cubone_candy:
  names:
    jp_kana: カラカラのアメ
    jp_kanji: カラカラのアメ
    en: Cubone Candy
    fr: Bonbon Osselait
    it: Caramella Cubone
    de: Tragosso-Bonbon
    es: Caramelo Cubone
    ko: 탕구리의사탕
    zh_simp: 卡拉卡拉的糖果
    zh_trad: 卡拉卡拉的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
custap_berry:
  names:
    jp_kana: イバンのみ
    jp_kanji: イバンのみ
    en: Custap Berry
    fr: Baie Chérim
    it: Baccacrela
    de: Eipfelbeere
    es: Baya Chiri
    ko: 애슈열매
    zh_simp: 释陀果
    zh_trad: 釋陀果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nピンチのとき　いちどだけ\nこうどうが　はやくなる。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　１度だけ\n行動が　早くなる。"
    en: "A Berry to be consumed by Pokémon. If a Pokémon\nholds one, it will be able to move first just once\nwhen it’s in a pinch."
    fr: "Tenue, cette Baie permet d’utiliser une capacité\nen priorité une fois en cas de besoin."
    it: "Se il Pokémon che ha questa bacca si trova\nin difficoltà, sferra la sua mossa per primo.\nFunziona una sola volta."
    de: "Als getragenes Item ermöglicht diese Beere dem Träger\nin einer Notlage den Erstschlag."
    es: "El Pokémon que la lleva puede actuar en primer lugar\nuna vez cuando se encuentra en un momento de apuro."
    ko: "포켓몬에게 지니게 하면\n위급할 때 한 번만\n행동이 빨라진다."
    zh_simp: "让宝可梦携带后，危机时，\n行动仅会变快１次。"
    zh_trad: "讓寶可夢攜帶後，\n危機時，行動會僅\n變快１次。"
damp_mulch:
  names:
    jp_kana: じめじめこやし
    jp_kanji: じめじめこやし
    en: Damp Mulch
    fr: Fertihumide
    it: Fertilidro
    de: Feuchtmulch
    es: Abono Lento
    ko: 축축이비료
    zh_simp: 湿湿肥
    zh_trad: 濕濕肥
  descriptions:
    jp_kana: "きのみを　そだてるときの　ひりょう。\nしかし　ホウエンちほうの　つちには\nまるで　なじまないので　こうかが　ない。"
    jp_kanji: "きのみを　育てるときの　肥料。\nしかし　ホウエン地方の　土には\nまるで　なじまないので　効果が　ない。"
    en: "A fertilizer for growing Berries. However, it appears\nto be unsuitable for the soil in the Hoenn region and\nhas no effect."
    fr: "Un engrais à utiliser sur un sol meuble.\nIl n’est cependant pas adapté aux terres de Hoenn\net n’y a aucun effet."
    it: "Fertilizzante usato per coltivare le bacche.\nTuttavia, non ha effetto a Hoenn, perché\nnon è adatto al terreno della regione."
    de: "Mulch zur Nutzung auf Beerenfeldern. Durch seine\nUnverträglichkeit mit den Böden in Hoenn bleibt sein\nEinsatz dort ohne Wirkung."
    es: "Un fertilizante usado para el cultivo de bayas. Parece\nque no se asienta bien en el suelo de Hoenn, por lo\nque no tiene efecto en esta región."
    ko: "나무열매를 키울 때 사용하는 비료.\n그러나 호연지방의 흙에는\n전혀 맞지 않기에 효과가 없다."
    zh_simp: "培育树果时的肥料。\n但完全不适合丰缘地区的土壤，\n所以没什么效果。"
    zh_trad: "培育樹果時的肥料。\n但完全不適合豐緣地區的土壤，\n所以沒什麼效果。"
damp_rock:
  names:
    jp_kana: しめったいわ
    jp_kanji: しめったいわ
    en: Damp Rock
    fr: Roche Humide
    it: Rocciaumida
    de: Nassbrocken
    es: Roca Lluvia
    ko: 축축한바위
    zh_simp: 潮湿岩石
    zh_trad: 潮濕岩石
  descriptions:
    jp_kana: "もたせた　ポケモンが　あまごいを\nつかうと　いつもより　あめの\nじかんが　ながくなる。"
    jp_kanji: "持たせた　ポケモンが　あまごいを\n使うと　いつもより　あめの\n時間が　長くなる。"
    en: "An item to be held by a Pokémon. It extends the\nduration of the move Rain Dance when used by\nthe holder."
    fr: "Objet à tenir. Prolonge la durée de la capacité\nDanse Pluie utilisée par le porteur."
    it: "Strumento da dare a un Pokémon.\nAllunga la durata della mossa Pioggiadanza."
    de: "Ein Item zum Tragen. Verlängert die Dauer von\nRegentanz, wenn der Träger diese Attacke einsetzt."
    es: "Prolonga la duración del movimiento Danza Lluvia que\nuse el Pokémon que la lleva."
    ko: "지니게 한 포켓몬이 비바라기를\n쓰면 여느 때보다 비 내리는\n시간이 길어진다."
    zh_simp: "携带它的宝可梦使出求雨的话，\n下雨的时间就会比平时更长。"
    zh_trad: "攜帶它的寶可夢\n使出求雨的話，\n下雨的時間就會比平時更長。"
dark_gem:
  names:
    jp_kana: あくのジュエル
    jp_kanji: あくのジュエル
    en: Dark Gem
    fr: Joyau Ténèbres
    it: Bijoubuio
    de: Unlichtjuwel
    es: Gema Siniestra
    ko: 악주얼
    zh_simp: 恶之宝石
    zh_trad: 惡之寶石
  descriptions:
    jp_kana: "あくの　タイプの　ジュエル。\nもたせると　いちどだけ　あくの\nわざの　いりょくが　つよまる。"
    jp_kanji: "あくの　タイプの　ジュエル。\n持たせると　１度だけ　あくの\n技の　威力が　強まる。"
    en: "A gem with an essence of darkness. When held, it\nstrengthens the power of a Dark-type move\none time."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Ténèbres."
    it: "Strumento da dare a un Pokémon.\nGioiello che potenzia una sola volta le mosse\ndi tipo Buio."
    de: "Ein Juwel vom Typ Unlicht. Es erhöht einmalig die\nStärke einer Attacke vom Typ Unlicht."
    es: "Joya de un solo uso que potencia los movimientos de\ntipo Siniestro. Debe llevarla un Pokémon."
    ko: "악타입의 주얼.\n지니게 하면 한 번만 악\n기술의 위력이 강해진다."
    zh_simp: "恶属性的宝石。\n携带后，恶属性的\n招式威力仅会增强１次。"
    zh_trad: "惡屬性的寶石。\n攜帶後，惡屬性招式的\n威力會僅增強１次。"
dark_memory:
  names:
    jp_kana: ダークメモリ
    jp_kanji: ダークメモリ
    en: Dark Memory
    fr: ROM Ténèbres
    it: ROM Buio
    de: Unlicht-Disc
    es: Disco Siniestro
    ko: 다크메모리
    zh_simp: 黑暗存储碟
    zh_trad: 黑暗記憶碟
  descriptions:
    jp_kana: "あくタイプの　データが　はいった\nメモリ。　とくていの　ポケモンが\nもつと　タイプが　かわる。"
    jp_kanji: "あくタイプの　データが　入った\nメモリ。　特定の　ポケモンが　持つと\nタイプが　変わる。"
    en: "A memory disc that contains Dark-type data.\nIt changes the type of the holder if held by\na certain species of Pokémon."
    fr: "Une carte mémoire contenant des données sur\nle type Ténèbres. Un certain Pokémon peut changer\nde type en l’équipant."
    it: "ROM contenente dati sul tipo Buio in formato\ndigitale. Permette a un certo Pokémon di cambiare\ntipo."
    de: "Eine Disc mit Daten zum Typ Unlicht. Sie löst bei einem\nbestimmten Pokémon einen Typenwechsel aus."
    es: "Disco de datos que contiene información relativa al tipo\nSiniestro. Permite cambiar de tipo a cierto Pokémon."
    ko: "악타입의 데이터가 들어 있는\n메모리. 특정 포켓몬이\n지니면 타입이 바뀐다."
    zh_simp: "装有恶属性数据的存储碟。\n特定宝可梦携带后，\n属性就会发生变化。"
    zh_trad: "裝有惡屬性資料的記憶碟。\n特定寶可夢攜帶後，\n就會產生屬性的變化。"
dark_stone:
  names:
    jp_kana: ダークストーン
    jp_kanji: ダークストーン
    en: Dark Stone
    fr: Galet Noir
    it: Scurolite
    de: Dunkelstein
    es: Orbe Oscuro
    ko: 다크스톤
    zh_simp: 黑暗石
    zh_trad: 黑闇石
  descriptions:
    jp_kana: "ゼクロムの　にくたいが　ほろび\nへんかした　すがた。えいゆうの\nとうじょうを　まっていると　される。"
    jp_kanji: "ゼクロムの　肉体が　滅び\n変化した　姿。　英雄の\n登場を　待っていると　される。"
    en: "Zekrom’s body was destroyed and changed into\nthis stone. It is said to be waiting for the\nemergence of a hero."
    fr: "Ce sont les derniers restes du corps de Zekrom.\nOn dit qu’ils attendent l’apparition d’un héros."
    it: "Pietra in cui si è tramutato Zekrom quando\nha perso la sua forma corporea.\nAttende la venuta di un eroe."
    de: "Nach dem Zerfall seines Körpers nahm Zekrom diese\nGestalt an. Man sagt, es warte auf die Ankunft eines\nHelden."
    es: "Forma que adoptó Zekrom al perder su cuerpo.\nEspera la llegada de un nuevo héroe."
    ko: "제크로무의 육체가 허물어져\n변화한 모습. 영웅의\n등장을 기다린다고 여겨진다."
    zh_simp: "捷克罗姆的肉体\n毁灭后变成的样子。\n据说它在等待着英雄的到来。"
    zh_trad: "捷克羅姆的肉體\n毀滅後變成的樣子。\n據說它在等待著英雄的到來。"
darkinium_z:bag:
  names:
    jp_kana: アクＺ
    jp_kanji: アクＺ
    en: Darkinium Z
    fr: Ténébrozélite
    it: Obscurium Z
    de: Noctium Z
    es: Nictostal Z
    ko: 악Z
    zh_simp: 恶Ｚ
    zh_trad: 惡Ｚ
  descriptions:
    jp_kana: "あくタイプの　わざを\nＺワザに　グレードアップする\nＺパワーの　けっしょうを　つくりだす。"
    jp_kanji: "あくタイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nDark-type moves to Dark-type Z-Moves."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise son porteur à transformer ses capacités\nde type Ténèbres en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono ai Pokémon di trasformare le mosse\ndi tipo Buio in mosse Z."
    de: "Kristallisierte Z-Kraft, die Unlicht-Attacken zu\nZ-Attacken aufstuft. Wird bei Bedarf automatisch\nvervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a los\nportadores convertir sus movimientos de tipo Siniestro\nen movimientos Z."
    ko: "악타입 기술을\nZ기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将恶属性招式升级成\nＺ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把惡屬性招式\n升級為Ｚ招式的Ｚ力量結晶。"
darkinium_z:held:
  names:
    jp_kana: アクＺ
    jp_kanji: アクＺ
    en: Darkinium Z
    fr: Ténébrozélite
    it: Obscurium Z
    de: Noctium Z
    es: Nictostal Z
    ko: 악Z
    zh_simp: 恶Ｚ
    zh_trad: 惡Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　けっしょう。\nあくタイプの　わざを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nあくタイプの　技を\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Dark-type moves to Z-Moves."
    fr: "Une cristallisation de la Force Z, permettant\nde transformer les capacités de type Ténèbres\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare le mosse di tipo Buio\nin mosse Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft\nUnlicht-Attacken zu Z-Attacken auf."
    es: "Cristal que confiere el Poder Z a los movimientos\nde tipo Siniestro."
    ko: "Z파워의 결정.\n악타입 기술을\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将恶属性的招式\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把惡屬性的招式\n升級為Ｚ招式。"
data_card_01:
  names:
    jp_kana: データカード０１
    jp_kanji: データカード０１
    en: Data Card 01
    fr: Carte Mémo01
    it: Scheda Dati 01
    de: Datenkarte01
    es: Tarjeta Datos 01
    ko: 데이터카드01
    zh_simp: 数据卡０１
    zh_trad: 資料卡０１
  descriptions:
    jp_kana: "ポケスロンの　きろくが　はいっている。\nゆうしょう　かいすうが\nきろくされた　カード。"
    jp_kanji: "ポケスロンの　記録が　はいっている。\n優勝　回数が\n記録された　カード。"
    en: "It holds Pokéathlon records. It is a card that shows\nhow many victories you have had in\nthe Pokéathlon."
    fr: "Contient vos données du Pokéathlon.\nSur cette carte est inscrit votre nombre de victoires\nau Pokéathlon."
    it: "Contiene i tuoi dati Pokéathlon.\nSu questa Scheda è registrato il numero totale\ndi vittorie."
    de: "Speichert deine Pokéathlon-Rekorde. Die Karte zeigt,\nwie oft du ein Turnier gewonnen hast."
    es: "Contiene los datos del Pokéathlon con el número de\nvictorias."
    ko: "포켓슬론의 기록이 들어 있다.\n우승 횟수가\n기록된 카드."
    zh_simp: "ー\nー\nー"
    zh_trad: "ー\nー\nー"
data_card_02:
  names:
    jp_kana: データカード０２
    jp_kanji: データカード０２
    en: Data Card 02
    fr: Carte Mémo02
    it: Scheda Dati 02
    de: Datenkarte02
    es: Tarjeta Datos 02
    ko: 데이터카드02
    zh_simp: 数据卡０２
    zh_trad: 資料卡０２
  descriptions:
    jp_kana: "ポケスロンの　きろくが　はいっている。\nビリになった　かいすうが\nきろくされた　カード。"
    jp_kanji: "ポケスロンの　記録が　はいっている。\nビリになった　回数が\n記録された　カード。"
    en: "It holds Pokéathlon records. It is a card that shows\nhow many losses you have had in the Pokéathlon."
    fr: "Contient vos données du Pokéathlon.\nSur cette carte est inscrit le nombre de fois\noù vous avez fini en dernier."
    it: "Contiene i tuoi dati Pokéathlon.\nSu questa Scheda è registrato il numero di\nultimi posti."
    de: "Speichert deine Pokéathlon-Rekorde. Die Karte zeigt,\nwie oft du bei einem Turnier Letzter geworden bist."
    es: "Contiene los datos del Pokéathlon con el número de\nveces que se ha quedado en último lugar."
    ko: "포켓슬론의 기록이 들어 있다.\n꼴찌가 된 횟수가\n기록된 카드."
    zh_simp: "ー\nー\nー"
    zh_trad: "ー\nー\nー"
data_card_03:
  names:
    jp_kana: データカード０３
    jp_kanji: データカード０３
    en: Data Card 03
    fr: Carte Mémo03
    it: Scheda Dati 03
    de: Datenkarte03
    es: Tarjeta Datos 03
    ko: 데이터카드03
    zh_simp: 数据卡０３
    zh_trad: 資料卡０３
  descriptions:
    jp_kana: "ポケスロンの　きろくが　はいっている。\nポケモンの　ダッシュした　かいすうが\nきろくされた　カード。"
    jp_kanji: "ポケスロンの　記録が　はいっている。\nポケモンの　ダッシュした　回数が\n記録された　カード。"
    en: "It holds Pokéathlon records. It is a card that shows\nhow many times your Pokémon dashed in\nthe Pokéathlon."
    fr: "Contient vos données du Pokéathlon.\nSur cette carte est inscrit le nombre de sprints\nde vos Pokémon."
    it: "Contiene i tuoi dati Pokéathlon.\nSu questa Scheda è registrato il numero di sprint\ndei tuoi Pokémon."
    de: "Speichert deine Pokéathlon-Rekorde. Die Karte zeigt,\nwie viele Sprints du schon hinter dir hast."
    es: "Contiene los datos del Pokéathlon con el número de\nsprints de los Pokémon."
    ko: "포켓슬론의 기록이 들어 있다.\n포켓몬이 대시한 횟수가\n기록된 카드."
    zh_simp: "ー\nー\nー"
    zh_trad: "ー\nー\nー"
data_card_04:
  names:
    jp_kana: データカード０４
    jp_kanji: データカード０４
    en: Data Card 04
    fr: Carte Mémo04
    it: Scheda Dati 04
    de: Datenkarte04
    es: Tarjeta Datos 04
    ko: 데이터카드04
    zh_simp: 数据卡０４
    zh_trad: 資料卡０４
  descriptions:
    jp_kana: "ポケスロンの　きろくが　はいっている。\nポケモンの　ジャンプした　かいすうが\nきろくされた　カード。"
    jp_kanji: "ポケスロンの　記録が　はいっている。\nポケモンの　ジャンプした　回数が\n記録された　カード。"
    en: "It holds Pokéathlon records. It is a card that shows\nhow many times your Pokémon jumped in\nthe Pokéathlon."
    fr: "Contient vos données du Pokéathlon.\nSur cette carte est inscrit le nombre de sauts\nde vos Pokémon."
    it: "Contiene i tuoi dati Pokéathlon.\nSu questa Scheda è registrato il numero di salti\ndei tuoi Pokémon."
    de: "Speichert deine Pokéathlon-Rekorde. Die Karte zeigt,\nwie oft du gesprungen bist."
    es: "Contiene los datos del Pokéathlon con el número de\nsaltos de los Pokémon."
    ko: "포켓슬론의 기록이 들어 있다.\n포켓몬이 점프한 횟수가\n기록된 카드."
    zh_simp: "ー\nー\nー"
    zh_trad: "ー\nー\nー"
