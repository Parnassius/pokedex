dawn_stone:
  names:
    jp_kana: めざめいし
    jp_kanji: めざめいし
    en: Dawn Stone
    fr: Pierre Aube
    it: Pietralbore
    de: Funkelstein
    es: Piedra Alba
    ko: 각성의돌
    zh_simp: 觉醒之石
    zh_trad: 覺醒之石
  descriptions:
    jp_kana: "ある　とくていの　ポケモンを\nしんかさせる　ふしぎな　いし。\nひとみのように　まばゆい。"
    jp_kanji: "ある　特定の　ポケモンを\n進化させる　不思議な　石。\nひとみのように　まばゆい。"
    en: "A peculiar stone that can make certain species of\nPokémon evolve. It sparkles like a glittering eye."
    fr: "Une pierre étrange qui fait évoluer certaines espèces\nde Pokémon. Elle brille comme un œil."
    it: "Pietra particolare che fa evolvere determinate\nspecie di Pokémon. È luccicante come gli occhi."
    de: "Dieser besondere, glitzernde Stein hilft manchen\nPokémon bei ihrer Entwicklung."
    es: "Una piedra peculiar que hace evolucionar a algunos\nPokémon. Brilla como un lucero."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 돌.\n눈동자처럼 아름답다."
    zh_simp: "能让某些特定宝可梦\n进化的神奇石头。\n像眼眸一般光彩动人。"
    zh_trad: "能讓特定寶可夢\n進化的神奇石頭。\n像眼眸一般光彩動人。"
decidium_z:bag:
  names:
    jp_kana: ジュナイパーＺ
    jp_kanji: ジュナイパーＺ
    en: Decidium Z
    fr: Archézélite
    it: Deciduenium Z
    de: Silvarronium Z
    es: Dueyestal Z
    ko: 모크나이퍼Z
    zh_simp: 狙射树枭Ｚ
    zh_trad: 狙射樹梟Ｚ
  descriptions:
    jp_kana: "ジュナイパーの　かげぬいを\nとくべつな　Ｚワザに　グレードアップする\nＺパワーの　けっしょうを　つくりだす。"
    jp_kanji: "ジュナイパーの　かげぬいを\n特別な　Ｚワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nDecidueye’s Spirit Shackle to an exclusive Z-Move."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise l’Archéduc qui le tient à transformer\nson Tisse Ombre en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono a Decidueye di trasformare la mossa\nCucitura d’Ombra in una mossa Z."
    de: "Kristallisierte Z-Kraft, die Silvarros Attacke\nSchattenfessel zu einer Z-Attacke aufstuft.\nWird bei Bedarf automatisch vervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a\nDecidueye convertir su Puntada Sombría en un\nmovimiento Z."
    ko: "모크나이퍼의 그림자꿰매기를\n특별한 Z기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将狙射树枭的缝影\n升级成特殊Ｚ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把狙射樹梟的縫影\n升級為特殊Ｚ招式的Ｚ力量結晶。"
decidium_z:held:
  names:
    jp_kana: ジュナイパーＺ
    jp_kanji: ジュナイパーＺ
    en: Decidium Z
    fr: Archézélite
    it: Deciduenium Z
    de: Silvarronium Z
    es: Dueyestal Z
    ko: 모크나이퍼Z
    zh_simp: 狙射树枭Ｚ
    zh_trad: 狙射樹梟Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　けっしょう。\nジュナイパーの　かげぬいを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nジュナイパーの　かげぬいを\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Decidueye’s Spirit Shackle to a Z-Move."
    fr: "Une cristallisation de la Force Z, permettant\nde transformer le Tisse Ombre d’un Archéduc\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare la mossa Cucitura d’Ombra\ndi Decidueye in una mossa Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft Silvarros\nAttacke Schattenfessel zu einer Z-Attacke auf."
    es: "Cristal que confiere el Poder Z al movimiento Puntada\nSombría de Decidueye."
    ko: "Z파워의 결정.\n모크나이퍼의 그림자꿰매기를\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将狙射树枭的缝影\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把狙射樹梟的縫影\n升級為Ｚ招式。"
deep_sea_scale:
  names:
    jp_kana: しんかいのウロコ
    jp_kanji: しんかいのウロコ
    en: Deep Sea Scale
    fr: Écaille Océan
    it: Squamabissi
    de: Abyssplatte
    es: Escama Marina
    ko: 심해의비늘
    zh_simp: 深海鳞片
    zh_trad: 深海鱗片
  descriptions:
    jp_kana: "パールルに　もたせると\nとくぼうが　あがる　ウロコ。\nうすい　ピンクいろに　ひかる。"
    jp_kanji: "パールルに　持たせると\n特防が　あがる　ウロコ。\nうすい　ピンク色に　光る。"
    en: "An item to be held by Clamperl. This scale shines\nwith a faint pink and raises the holder’s\nSp. Def stat."
    fr: "Objet à faire tenir à Coquiperl.\nUne écaille de couleur rose qui augmente\nsa Défense Spéciale."
    it: "Strumento da dare a Clamperl.\nSquama dai bagliori rosei che aumenta\nla Difesa Speciale."
    de: "Ein Item, das von Perlu getragen werden kann.\nEs schimmert pink und hebt die Spezial-Verteidigung."
    es: "Tiene un débil brillo rosado y debe llevarla Clamperl.\nSube la Defensa Especial."
    ko: "진주몽에게 지니게 하면\n특수방어가 올라가는 비늘.\n연한 분홍색으로 빛난다."
    zh_simp: "让珍珠贝携带后，\n特防就会提高的鳞片。\n散发着淡淡的粉红色光芒。"
    zh_trad: "讓珍珠貝攜帶後，\n特防就會提高的鱗片。\n散發著淡淡的粉紅色光芒。"
deep_sea_tooth:
  names:
    jp_kana: しんかいのキバ
    jp_kanji: しんかいのキバ
    en: Deep Sea Tooth
    fr: Dent Océan
    it: Dente Abissi
    de: Abysszahn
    es: Diente Marino
    ko: 심해의이빨
    zh_simp: 深海之牙
    zh_trad: 深海之牙
  descriptions:
    jp_kana: "パールルに　もたせると\nとくこうが　あがる　キバ。\nするどく　ぎんいろに　ひかる。"
    jp_kanji: "パールルに　持たせると\n特攻が　あがる　キバ。\n鋭く　銀色に　光る。"
    en: "An item to be held by Clamperl. This fang gleams a\nsharp silver and raises the holder’s Sp. Atk stat."
    fr: "Objet à faire tenir à Coquiperl.\nUne dent de couleur argent qui augmente\nson Attaque Spéciale."
    it: "Strumento da dare a Clamperl.\nDente dai bagliori argentei che aumenta\nl’Attacco Speciale."
    de: "Ein Item, das von Perlu getragen werden kann.\nEs schimmert silbern und hebt den Spezial-Angriff."
    es: "Tiene el brillo afilado de la plata y debe llevarlo\nClamperl. Sube el Ataque Especial."
    ko: "진주몽에게 지니게 하면\n특수공격이 올라가는 이빨.\n날카롭고 은색으로 빛난다."
    zh_simp: "让珍珠贝携带后，\n特攻就会提高的牙齿。\n散发着闪亮的银光。"
    zh_trad: "讓珍珠貝攜帶後，\n特攻就會提高的牙齒。\n散發著銳利的銀色光芒。"
destiny_knot:
  names:
    jp_kana: あかいいと
    jp_kanji: あかいいと
    en: Destiny Knot
    fr: Nœud Destin
    it: Destincomune
    de: Fatumknoten
    es: Lazo Destino
    ko: 빨간실
    zh_simp: 红线
    zh_trad: 紅線
  descriptions:
    jp_kana: "ほそくて　ながい　まっかな　いと。\nもたせると　メロメロに　なったとき\nあいても　メロメロに　できる。"
    jp_kanji: "細くて　長い　真っ赤な　糸。\n持たせると　メロメロに　なったとき\n相手も　メロメロに　できる。"
    en: "An item to be held by a Pokémon. If the holder\nbecomes infatuated, the opposing Pokémon will\nbe, too."
    fr: "Un long fil rouge vif à faire tenir à un Pokémon.\nSi le porteur tombe amoureux, l’ennemi aussi."
    it: "Gomitolo di filo rosso sottile da dare a un Pokémon.\nSe il Pokémon rimane infatuato, contagia anche\nil nemico."
    de: "Ein Item zum Tragen. Wird der Träger betört, gilt dies\nauch für den Angreifer."
    es: "Un hilo largo y delgado de color rojo que transmite el\nenamoramiento del Pokémon que lo lleva a su objetivo."
    ko: "가늘고 긴 새빨간 실.\n지니게 하면 자신이 헤롱헤롱해졌을 때\n상대도 헤롱헤롱해지게 된다."
    zh_simp: "长长的鲜红色细线。\n携带后，在自己着迷时\n能让对手也着迷。"
    zh_trad: "長長的大紅色細線。\n攜帶後，陷入著迷狀態時，\n也能使對手陷入著迷狀態。"
devon_parts:
  names:
    jp_kana: デボンのにもつ
    jp_kanji: デボンのにもつ
    en: Devon Parts
    fr: Pack Devon
    it: Merce Devon
    de: Devon-Waren
    es: Piezas Devon
    ko: 데봉화물
    zh_simp: 得文的物品
    zh_trad: 得文的物品
  descriptions:
    jp_kana: "デボンで　つくられた\nなにかの　パーツが\nはいっている　にもつ。"
    jp_kanji: "デボンで　つくられた\n何かの　パーツが\n入っている　にもつ。"
    en: "A case that contains mechanical parts of some sort\nmade by the Devon Corporation."
    fr: "Une valise qui contient des pièces mécaniques\nfabriquées par la société Devon."
    it: "Questa valigetta contiene pezzi meccanici\nprodotti dalla Devon."
    de: "Ein Metallkoffer mit irgendwelchen Bauteilen, die von\nder Devon Corporation angefertigt wurden."
    es: Contiene piezas de algo fabricado por Devon S. A.
    ko: "데봉에서 만들어진\n무언가의 파츠가\n들어 있는 화물."
    zh_simp: "此物品里面放着的是\n得文制造的某种零件。"
    zh_trad: "裡面放有得文製造的\n某種零件的物品。"
devon_scope:
  names:
    jp_kana: デボンスコープ
    jp_kanji: デボンスコープ
    en: Devon Scope
    fr: Devon Scope
    it: Devonscopio
    de: Devon-Scope
    es: Detector Devon
    ko: 데봉스코프
    zh_simp: 得文侦测镜
    zh_trad: 得文偵測鏡
  descriptions:
    jp_kana: "みえない　ポケモンに\nはんのうして　おとをだす\nデボンの　とくせいひん。"
    jp_kanji: "見えない　ポケモンに\n反応して　音をだす\nデボンの　特製品。"
    en: "A special device made by Devon Corporation that\nsignals the presence of any unseen Pokémon."
    fr: "Ce produit en série limitée de Devon émet un signal\nsonore pour signaler la présence de Pokémon invisibles."
    it: "Congegno prodotto dalla Devon che rileva\nla presenza di Pokémon nascosti emettendo\nun segnale sonoro."
    de: "Ein von der Devon Corporation hergestelltes Gerät,\ndas mit einem Signalton auf unsichtbare Pokémon\nreagiert."
    es: "Artilugio creado por Devon S. A. que reacciona a la\npresencia de Pokémon invisibles emitiendo sonidos."
    ko: "보이지 않는 포켓몬에\n반응하여 소리를 내는\n데봉의 특제품."
    zh_simp: "会对看不见的宝可梦起反应，\n并发出声音的得文特制产品。"
    zh_trad: "會對看不見的寶可夢起反應，\n並發出聲音的得文特製產品。"
devon_scuba_gear:
  names:
    jp_kana: デボンボンベ
    jp_kanji: デボンボンベ
    en: Devon Scuba Gear
    fr: Plongeur Devon
    it: Maschera Devon
    de: Devon-Atemgerät
    es: Bombona Devon
    ko: 데봉봄베
    zh_simp: 得文潜水装备
    zh_trad: 得文潛水裝備
  descriptions:
    jp_kana: "ダイビング　ちゅうに　みにつける\nさんそ　ほきゅうよう　マスク。\nデボンで　つくられた。"
    jp_kanji: "ダイビング中に　身につける\n酸素補給用の　マスク。\nデボンで　つくられた。"
    en: "A device made by Devon Corporation that provides\noxygen to users during the use of Dive."
    fr: "Un masque à oxygène fabriqué par la société Devon\net utilisé pour la plongée sous-marine."
    it: "Maschera di ossigeno prodotta dalla Devon,\nutile durante le immersioni."
    de: "Eine von der Devon Corporation hergestellte Maske,\ndie Taucher unter Wasser mit ausreichend Sauerstoff\nversorgt."
    es: "Máscara que surte de oxígeno durante las inmersiones\nen el agua. Producto de Devon S. A."
    ko: "다이빙할 때 몸에 착용하는\n산소 호흡용 마스크.\n데봉에서 만들어졌다."
    zh_simp: "潜水时装备在身上\n用来呼吸氧气的面罩。\n得文制造。"
    zh_trad: "潛水時裝備在身上\n用來呼吸氧氣的面罩。\n得文製造。"
diancite:
  names:
    jp_kana: ディアンシナイト
    jp_kanji: ディアンシナイト
    en: Diancite
    fr: Diancite
    it: Diancite
    de: Diancienit
    es: Diancita
    ko: 디안시나이트
    zh_simp: 蒂安希进化石
    zh_trad: 蒂安希進化石
  descriptions:
    jp_kana: "ディアンシーに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "ディアンシーに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Diancie hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Diancie, elle lui permet de méga-évoluer\ndurant un combat."
    it: "Una delle misteriose Megapietre.\nData a Diancie, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Diancie getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Diancie en combate."
    ko: "디안시에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让蒂安希携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓蒂安希攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
digger_drill:
  names:
    jp_kana: あなほりドリル
    jp_kanji: あなほりドリル
    en: Digger Drill
    fr: Foreuse
    it: Trivella
    de: Einwegbohrer
    es: Taladro
    ko: 구멍파기드릴
    zh_simp: 挖洞钻
    zh_trad: 挖洞鑽
  descriptions:
    jp_kana: "かべに　あなをあけて　ひみつきちを\nつくれる　つかいきりの　ドリル。"
    jp_kanji: "壁に　穴を開けて　秘密基地を\n作れる　使い切りの　ドリル。"
    en: "A single-use drill to bore a hole in the wall for your\nSecret Base."
    fr: "Une foreuse à usage unique qui permet de construire\nune Base Secrète en perçant un mur."
    it: Trapano monouso per creare la tua Base Segreta.
    de: "Ein Einwegbohrer, mit dem du ein Loch in eine Wand\nbohren kannst, um eine Geheimbasis zu errichten."
    es: "Taladro de un solo uso que sirve para perforar un muro\ny construir una Base Secreta en su interior."
    ko: "벽에 구멍을 내어 비밀기지를\n만들 수 있는 일회용 드릴."
    zh_simp: "能够在墙上钻洞，\n以建造秘密基地的一次性钻头。"
    zh_trad: "能在牆壁上開洞，\n建造秘密基地的拋棄式鑽錐。"
diglett_candy:
  names:
    jp_kana: ディグダのアメ
    jp_kanji: ディグダのアメ
    en: Diglett Candy
    fr: Bonbon Taupiqueur
    it: Caramella Diglett
    de: Digda-Bonbon
    es: Caramelo Diglett
    ko: 디그다의사탕
    zh_simp: 地鼠的糖果
    zh_trad: 地鼠的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
dire_hit:
  names:
    jp_kana: クリティカット
    jp_kanji: クリティカット
    en: Dire Hit
    fr: Muscle +
    it: Supercolpo
    de: Angriffplus
    es: Crítico X
    ko: 크리티컬커터
    zh_simp: 要害攻击
    zh_trad: 要害攻擊
  descriptions:
    jp_kana: "きゅうしょりつが　おおきく　あがる。\nいちどしか　つかうことが　できない。\nひっこめると　もとに　もどる。"
    jp_kanji: "急所率が　大きく　あがる。\n１度しか　使うことが　できない。\nひっこめると　元に　戻る。"
    en: "An item that greatly raises the critical-hit ratio of\na Pokémon during a battle. It can be used only once\nand wears off if the Pokémon is withdrawn."
    fr: "Augmente fortement le taux de critiques.\nUtilisable une seule fois.\nL’effet disparaît si le Pokémon est retiré."
    it: "Aumenta di molto la probabilità di sferrare brutti colpi.\nSi può usare una sola volta e l’effetto svanisce\nse il Pokémon è sostituito."
    de: "Hebt einmalig die Volltrefferquote des Pokémon im\nKampf stark an. Die Wirkung endet mit dem Austausch\ndes Pokémon."
    es: "Aumenta mucho la probabilidad de asestar un golpe\ncrítico en combate. Solo se puede usar una vez y,\nal cambiar de Pokémon, el efecto desaparece."
    ko: "급소 명중률이 크게 올라간다.\n한 번밖에 쓸 수 없다. 포켓몬을 볼에\n넣어 버리면 원래대로 되돌아간다."
    zh_simp: "击中要害的几率会大幅提高。\n只能使用１次。\n离场后，效果便会消失。"
    zh_trad: "擊中要害的機率會大大提高。\n只能使用１次。\n離場後，效果便會消失。"
dire_hit_2:
  names:
    jp_kana: クリティカット２
    jp_kanji: クリティカット２
    en: Dire Hit 2
    fr: Muscle 2
    it: Supercolpo 2
    de: Angriffplus2
    es: Crítico X 2
    ko: 크리티컬커터2
    zh_simp: 要害攻击２
    zh_trad: 要害攻擊２
  descriptions:
    jp_kana: "きゅうしょりつが　あがる。\nつかうたびに　こうかが　アップする。\nひっこめると　もとに　もどる。"
    jp_kanji: "急所率が　あがる。\n使うたびに　効果が　アップする。\nひっこめると　元に　戻る。"
    en: "It can be used many times to raise the critical-hit\nratio of one Pokémon. It wears off if the Pokémon\nis withdrawn."
    fr: "Augmente le taux de critiques.\nPlus efficace à chaque utilisation.\nL’effet se dissipe si le Pokémon est retiré."
    it: "Aumenta la probabilità di sferrare brutti colpi.\nSe usato più volte, l’effetto si somma, ma svanisce\nse il Pokémon è sostituito."
    de: "Erhöht die Volltrefferquote. Effektiver bei mehrfacher\nAnwendung. Wirksam, bis das Pokémon ausgewechselt\nwird."
    es: "Aumenta la probabilidad de asestar un golpe crítico. Al\ncambiar de Pokémon, el efecto desaparece."
    ko: "급소 명중률이 올라간다. 사용할 때마다\n효과가 올라간다. 포켓몬을 볼에\n넣어 버리면 원래대로 되돌아간다."
    zh_simp: "击中要害的几率会提高。\n每次使用效果都会提升。\n离场后，效果便会消失。"
    zh_trad: "擊中要害的機率會提高。\n每次使用效果都會提升。\n離場後，效果便會消失。"
dire_hit_3:
  names:
    jp_kana: クリティカット３
    jp_kanji: クリティカット３
    en: Dire Hit 3
    fr: Muscle 3
    it: Supercolpo 3
    de: Angriffplus3
    es: Crítico X 3
    ko: 크리티컬커터3
    zh_simp: 要害攻击３
    zh_trad: 要害攻擊３
  descriptions:
    jp_kana: "きゅうしょりつが　おおきく　あがる。\nつかうたびに　こうかが　アップする。\nひっこめると　もとに　もどる。"
    jp_kanji: "急所率が　大きく　あがる。\n使うたびに　効果が　アップする。\nひっこめると　元に　戻る。"
    en: "It can be used many times to greatly raise a\nPokémon’s critical-hit ratio. It wears off if the\nPokémon is withdrawn."
    fr: "Augmente fortement le taux de critiques.\nPlus efficace à chaque utilisation.\nL’effet se dissipe si le Pokémon est retiré."
    it: "Aumenta di molto la probabilità di sferrare brutti colpi.\nL’effetto si può sommare, ma svanisce se il Pokémon\nè sostituito."
    de: "Erhöht die Volltrefferquote stark. Bei mehrfachem\nGebrauch effektiver. Wirkt, bis das Pokémon\nausgewechselt wird."
    es: "Aumenta mucho la probabilidad de asestar un golpe\ncrítico. Al cambiar de Pokémon, su efecto desaparece."
    ko: "급소 명중률이 크게 올라간다. 사용할\n때마다 효과가 올라간다. 포켓몬을\n볼에 넣어 버리면 원래대로 되돌아간다."
    zh_simp: "击中要害的几率会大幅提高。\n每次使用效果都会提升。\n离场后，效果便会消失。"
    zh_trad: "擊中要害的機率會大大提高。\n每次使用效果都會提升。\n離場後，效果便會消失。"
discount_coupon:
  names:
    jp_kana: バーゲンチケット
    jp_kanji: バーゲンチケット
    en: Discount Coupon
    fr: Bon Réduction
    it: Buono sconto
    de: Rabattmarke
    es: Vale Descuento
    ko: 바겐세일티켓
    zh_simp: 折价券
    zh_trad: 折價券
  descriptions:
    jp_kana: "ブティックで　アイテムを　かうとき\nいつもより　やすくなる　チケット。"
    jp_kanji: "ブティックで　アイテムを　買うとき\nいつもより　安くなる　チケット。"
    en: "This special coupon allows you to buy items at a\ndiscount when you are shopping at a boutique."
    fr: "Un ticket donnant droit à une réduction dans\nles boutiques de vêtements."
    it: "Buono che permette di avere uno sconto sugli\nacquisti nei negozi di abbigliamento."
    de: "Ein Coupon, mit dem du in Boutiquen günstiger\neinkaufen kannst."
    es: "Con este vale te harán jugosos descuentos cuando\nvayas de compras a una boutique."
    ko: "부티크에서 아이템을 살 때\n평소보다 저렴해지는 티켓."
    zh_simp: "在时装店买道具时，\n能以比平时更低的\n价格购买的券。"
    zh_trad: "在時裝店買物品時，\n能以比平時更低的\n價格購買的券。"
discovery_slate:
  names:
    jp_kana: みちびきのせきばん
    jp_kanji: みちびきのせきばん
    en: Discovery Slate
    fr: Tablette Guides
    it: Piastra degli esordi
    de: Weisungsplatte
    es: Losa Inicio
    ko: 인도의석판
    zh_simp: 引导石板
    zh_trad: 引導石板
  descriptions:
    jp_kana: "ふしぎな　ちからに　あふれる　せきばん。\nハマナスパークの　みちびきのへやと\nふかい　つながりを　かんじる。"
    jp_kanji: "不思議な　力に　あふれる　石板。\nハマナスパークの　導きの部屋と\n深い　つながりを　感じる。"
    en: "A slate overflowing with enigmatic energy. You can feel\na strong connection between it and the Discovery Room\nat Ramanas Park."
    fr: "Une tablette qui regorge d’une étrange énergie.\nElle semble intimement liée à la Salle des Guides\ndu Parc Rosa Rugosa."
    it: "Lastra di pietra che emana una misteriosa energia.\nSembra profondamente connessa alla Stanza degli\nesordi del Parco Rosa Rugosa."
    de: "Eine Platte, die vor rätselhafter Energie strotzt.\nMan kann eine starke Verbindung zwischen ihr und der\nWeisungskammer im Hamanasu-Park spüren."
    es: "Una losa rebosante de una misteriosa energía.\nParece estrechamente relacionada con la Sala\ndel Inicio del Parque Hansa."
    ko: "신비한 힘이 넘치는 석판.\n해당화파크의 인도의 방과\n깊은 연관이 있는 것 같다."
    zh_simp: "充满了神秘力量的石板。\n感觉它与玫瑰公园的引导之厅\n有着很深的关联。"
    zh_trad: "充滿神奇力量的石板。\n感覺它和玫瑰公園的引導之廳\n有很深的關係。"
distortion_slate:
  names:
    jp_kana: やぶれたせきばん
    jp_kanji: やぶれたせきばん
    en: Distortion Slate
    fr: Tablette Distorsion
    it: Piastra distorta
    de: Zerrplatte
    es: Losa Distorsión
    ko: 깨어진석판
    zh_simp: 毁坏石板
    zh_trad: 毀壞石板
  descriptions:
    jp_kana: "ふしぎな　ちからに　あふれる　せきばん。\nハマナスパークの　やぶれたへやと\nふかい　つながりを　かんじる。"
    jp_kanji: "不思議な　力に　あふれる　石板。\nハマナスパークの　破れた部屋と\n深い　つながりを　感じる。"
    en: "A slate overflowing with enigmatic energy. You can feel\na strong connection between it and the Distortion Room\nat Ramanas Park."
    fr: "Une tablette qui regorge d’une étrange énergie.\nElle semble intimement liée à la Salle de la Distorsion\ndu Parc Rosa Rugosa."
    it: "Lastra di pietra che emana una misteriosa energia.\nSembra profondamente connessa alla Stanza distorta\ndel Parco Rosa Rugosa."
    de: "Eine Platte, die vor rätselhafter Energie strotzt.\nMan kann eine starke Verbindung zwischen ihr und der\nZerrkammer im Hamanasu-Park spüren."
    es: "Una losa rebosante de una misteriosa energía.\nParece estrechamente relacionada con la Sala\nde la Distorsión del Parque Hansa."
    ko: "신비한 힘이 넘치는 석판.\n해당화파크의 깨어진 방과\n깊은 연관이 있는 것 같다."
    zh_simp: "充满了神秘力量的石板。\n感觉它与玫瑰公园的毁坏之厅\n有着很深的关联。"
    zh_trad: "充滿神奇力量的石板。\n感覺它和玫瑰公園的毀壞之廳\n有很深的關係。"
ditto_candy:
  names:
    jp_kana: メタモンのアメ
    jp_kanji: メタモンのアメ
    en: Ditto Candy
    fr: Bonbon Métamorph
    it: Caramella Ditto
    de: Ditto-Bonbon
    es: Caramelo Ditto
    ko: 메타몽의사탕
    zh_simp: 百变怪的糖果
    zh_trad: 百變怪的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de cierto Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
dive_ball:
  names:
    jp_kana: ダイブボール
    jp_kanji: ダイブボール
    en: Dive Ball
    fr: Scuba Ball
    it: Sub Ball
    de: Tauchball
    es: Buceo Ball
    ko: 다이브볼
    zh_simp: 潜水球
    zh_trad: 潛水球
  descriptions:
    jp_kana: "みずの　せかいで　くらしている\nポケモンが　つかまえやすくなる\nちょっと　かわった　ボール。"
    jp_kanji: "水の　世界で　暮らしている\nポケモンが　捕まえやすくなる\nちょっと　変わった　ボール。"
    en: "A somewhat different Poké Ball that works\nespecially well when catching Pokémon that\nlive underwater."
    fr: "Une Poké Ball un peu spéciale qui fonctionne\nparticulièrement bien sur les Pokémon aquatiques."
    it: "Poké Ball un po’ diversa. Risulta particolarmente\nefficace sui Pokémon che vivono in acqua."
    de: "Ein Ball, mit dem sich Pokémon, die im Wasser leben,\nbesser fangen lassen."
    es: "Es algo distinta a las demás. Funciona especialmente\nbien con los Pokémon que viven bajo el agua."
    ko: "물의 세계에서 사는\n포켓몬을 잡기 쉬워지는\n조금 특이한 볼."
    zh_simp: "有点与众不同的球。\n能很容易地捕捉\n生活在水世界里的宝可梦。"
    zh_trad: "有點與眾不同的球。\n能更容易地捉到\n生活在水中世界的寶可夢。"
dna_splicers:fuse:
  names:
    jp_kana: いでんしのくさび
    jp_kanji: いでんしのくさび
    en: DNA Splicers
    fr: Pointeau ADN
    it: Cuneo DNA
    de: DNS-Keil
    es: Punta ADN
    ko: 유전자쐐기
    zh_simp: 基因之楔
    zh_trad: 基因之楔
  descriptions:
    jp_kana: "もとは　ひとつだったと　いわれる\nキュレムと　あるポケモンを\nがったいさせる　いっついの　くさび。"
    jp_kanji: "元は　ひとつだったと　いわれる\nキュレムと　あるポケモンを\n合体させる　一対の　くさび。"
    en: "A splicer that fuses Kyurem and a certain Pokémon.\nThey are said to have been one in the beginning."
    fr: "Un outil qui permet la fusiorption de Kyurem\net d’un autre Pokémon avec lequel il ne faisait\nqu’un à l’origine."
    it: "Cuneo che permette di fondere Kyurem con il\nPokémon al quale era unito in origine."
    de: "Ein Keil, der Kyurem und ein gewisses anderes\nPokémon, die vermeintlich einst eins gewesen sind,\nvereinigt."
    es: "Punta que permite fusionar a Kyurem con cierto\nPokémon con el que, originariamente, formaba un solo\nser."
    ko: "원래는 하나였다고 전해지는\n큐레무와 어떤 포켓몬을\n합체시키는 한 쌍의 쐐기."
    zh_simp: "据说是能让原本为一体的\n酋雷姆和某宝可梦\n合体的一对楔子。"
    zh_trad: "能讓據說原是一體的酋雷姆和\n某寶可夢合體的一對楔子。"
dna_splicers:separate:
  names:
    jp_kana: いでんしのくさび
    jp_kanji: いでんしのくさび
    en: DNA Splicers
    fr: Pointeau ADN
    it: Cuneo DNA
    de: DNS-Keil
    es: Punta ADN
    ko: 유전자쐐기
    zh_simp: 基因之楔
    zh_trad: 基因之楔
  descriptions:
    jp_kana: "がったいした　キュレムと\nあるポケモンを　もとどおりに\nぶんりさせる　いっついの　くさび。"
    jp_kanji: "合体した　キュレムと\nあるポケモンを　元通りに\n分離させる　一対の　くさび。"
    en: "A splicer that separates Kyurem and a certain\nPokémon when they have been fused."
    fr: "Un outil qui permet de séparer Kyurem et le Pokémon\navec lequel il a fusiorbé."
    it: "Cuneo che permette di separare Kyurem\ndal Pokémon con cui era fuso."
    de: "Ein Keil, der Kyurem und ein gewisses anderes\nPokémon, die vereinigt wurden, voneinander trennt."
    es: "Punta que permite separar a Kyurem del Pokémon con\nel que se ha fusionado."
    ko: "합체한 큐레무와\n어떤 포켓몬을 원래대로\n분리시키는 한 쌍의 쐐기."
    zh_simp: "能让合体后的\n酋雷姆和某宝可梦\n分离成原状的一对楔子。"
    zh_trad: "能讓合體後的\n酋雷姆和某寶可夢\n分離至原狀的一對楔子。"
doduo_candy:
  names:
    jp_kana: ドードーのアメ
    jp_kanji: ドードーのアメ
    en: Doduo Candy
    fr: Bonbon Doduo
    it: Caramella Doduo
    de: Dodu-Bonbon
    es: Caramelo Doduo
    ko: 두두의사탕
    zh_simp: 嘟嘟的糖果
    zh_trad: 嘟嘟的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
dome_fossil:
  names:
    jp_kana: こうらのカセキ
    jp_kanji: こうらのカセキ
    en: Dome Fossil
    fr: Fossile Dôme
    it: Domofossile
    de: Domfossil
    es: Fósil Domo
    ko: 껍질화석
    zh_simp: 甲壳化石
    zh_trad: 甲殼化石
  descriptions:
    jp_kana: "おおむかし　うみに　すんでいた\nこだい　ポケモンの　カセキ。\nこうらの　いちぶ　らしい。"
    jp_kanji: "大昔　海に　すんでいた\n古代ポケモンの　カセキ。\nこうらの　一部らしい。"
    en: "A fossil from a prehistoric Pokémon that once lived\nin the sea. It could be a shell or carapace."
    fr: "Le fossile d’un ancien Pokémon aquatique.\nOn dirait un morceau de carapace."
    it: "Fossile di un Pokémon preistorico che viveva in\nmare. Sembra essere parte di una corazza."
    de: "Das Fossil eines uralten Pokémon, das in der Tiefsee\nlebte. Es sieht wie eine Muschelschale oder ein\nRückenschild aus."
    es: "Fósil de un Pokémon prehistórico que vivía en el fondo\ndel mar. Parece ser un fragmento de caparazón."
    ko: "오랜 옛날 바다에 살았던\n고대 포켓몬의 화석.\n등껍질의 일부인 듯하다."
    zh_simp: "很久以前栖息在海里的\n古代宝可梦的化石。\n好像是甲壳的一部分。"
    zh_trad: "很久以前棲息在海裡的\n古代寶可夢的化石。\n好像是甲殼的一部分。"
douse_drive:
  names:
    jp_kana: アクアカセット
    jp_kanji: アクアカセット
    en: Douse Drive
    fr: Module Aqua
    it: Idromodulo
    de: Aquamodul
    es: HidroROM
    ko: 아쿠아카세트
    zh_simp: 水流卡带
    zh_trad: 水流卡帶
  descriptions:
    jp_kana: "ゲノセクトに　もたせると\nテクノバスターという　わざが\nみずタイプになる　カセット。"
    jp_kanji: "ゲノセクトに　持たせると\nテクノバスターという　技が\nみずタイプになる　カセット。"
    en: "A cassette to be held by Genesect. It changes\nGenesect’s Techno Blast move so it becomes\nWater type."
    fr: "Tenu par Genesect, ce module change la capacité\nTechno-Buster en une capacité de type Eau."
    it: "Modulo da dare a Genesect.\nTrasforma Tecnobotto in una mossa di tipo Acqua."
    de: "Gibt man es Genesect zum Tragen, wandelt es den Typ\nder Attacke Techblaster in Wasser um."
    es: "Cartucho que convierte Tecno Shock de Genesect en un\nmovimiento de tipo Agua."
    ko: "게노세크트에게 지니게 하면\n테크노버스터라는 기술이\n물타입으로 바뀌는 카세트."
    zh_simp: "这是让盖诺赛克特携带的卡带。\n携带后，高科技光炮这招式\n就会变为水属性。"
    zh_trad: "讓蓋諾賽克特攜帶的卡帶。\n攜帶後，招式高科技光炮\n會變為水屬性。"
dowsing_machine:
  names:
    jp_kana: ダウジングマシン
    jp_kanji: ダウジングマシン
    en: Dowsing Machine
    fr: Cherch’Objet
    it: Ricerca strum.
    de: Itemradar
    es: Zahorí
    ko: 다우징머신
    zh_simp: 探宝器
    zh_trad: 探寶器
  descriptions:
    jp_kana: "みえない　どうぐに　はんのうして\nばしょを　おしえてくれる　さいしんの\nきかい。あたまに　つけて　つかう。"
    jp_kanji: "みえない　道具に　反応して\n場所を　教えてくれる　最新の　機械。\n頭に　つけて　使う。"
    en: "A high-tech machine that shows the location of\ninvisible items. It’s attached to the head when\nin use."
    fr: "Un appareil high-tech qui indique l’emplacement\ndes objets invisibles. Il se porte sur la tête."
    it: "Dispositivo ultramoderno che rileva la presenza\ndi strumenti non visibili a occhio nudo.\nSi indossa sulla testa."
    de: "Scannt die Umgebung nach unsichtbaren Items und\nzeigt an, wo diese sich befinden. Es wird auf dem\nKopf getragen."
    es: "Aparato de precisión que reacciona ante objetos que no\nse ven. Para usarlo, es necesario colocárselo en la\ncabeza."
    ko: "보이지 않는 도구에 반응해서\n장소를 가르쳐 주는 최신 기계.\n머리에 쓰고 사용한다."
    zh_simp: "会对看不见的道具起反应，\n并将它的位置告诉你的最尖端机器。\n戴在头上使用。"
    zh_trad: "會對看不見的道具起反應，\n並將它的位置告訴你的最尖端機器。\n戴在頭上使用。"
draco_plate:
  names:
    jp_kana: りゅうのプレート
    jp_kanji: りゅうのプレート
    en: Draco Plate
    fr: Plaque Draco
    it: Lastradrakon
    de: Dracotafel
    es: Tabla Draco
    ko: 용의플레이트
    zh_simp: 龙之石板
    zh_trad: 龍之石板
  descriptions:
    jp_kana: "ドラゴンの　タイプの　せきばん。\nもたせると　ドラゴンタイプの\nわざの　いりょくが　つよまる。"
    jp_kanji: "ドラゴンの　タイプの　石盤。\n持たせると　ドラゴンタイプの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon. It’s a stone tablet\nthat boosts the power of Dragon-type moves."
    fr: "Objet à tenir. Une tablette en pierre augmentant\nla puissance des capacités de type Dragon."
    it: "Strumento da dare a un Pokémon. Lastra di pietra che\npotenzia le mosse di tipo Drago."
    de: "Ein Item zum Tragen. Diese Steintafel verstärkt\nAttacken vom Typ Drache."
    es: "Tabla de piedra que potencia los movimientos de tipo\nDragón. Debe llevarla un Pokémon."
    ko: "드래곤타입의 석판.\n지니게 하면 드래곤타입\n기술의 위력이 강해진다."
    zh_simp: "龙属性的石板。\n携带后，龙属性的\n招式威力就会增强。"
    zh_trad: "龍屬性的石板。\n攜帶後，龍屬性的\n招式威力就會增強。"
dragon_fang:
  names:
    jp_kana: りゅうのキバ
    jp_kanji: りゅうのキバ
    en: Dragon Fang
    fr: Croc Dragon
    it: Dentedidrago
    de: Drachenzahn
    es: Colmillo Dragón
    ko: 용의이빨
    zh_simp: 龙之牙
    zh_trad: 龍之牙
  descriptions:
    jp_kana: "かたくて　するどい　キバ。\nもたせると　ドラゴンタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "硬くて　鋭い　キバ。\n持たせると　ドラゴンタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon. This hard and\nsharp fang boosts the power of\nDragon-type moves."
    fr: "Objet à tenir. Un croc dur et pointu qui augmente\nla puissance des capacités de type Dragon."
    it: "Strumento da dare a un Pokémon.\nDente duro e affilato che potenzia le mosse\ndi tipo Drago."
    de: "Ein Item zum Tragen. Ein harter und scharfer Reißzahn,\nder Attacken vom Typ Drache verstärkt."
    es: "Colmillo de gran dureza que refuerza los movimientos\nde tipo Dragón. Debe llevarlo un Pokémon."
    ko: "단단하고 날카로운 이빨.\n지니게 하면 드래곤타입\n기술의 위력이 올라간다."
    zh_simp: "坚硬锐利的牙齿。\n携带后，龙属性的\n招式威力就会提高。"
    zh_trad: "堅硬銳利的牙齒。\n攜帶後，龍屬性的\n招式威力就會提高。"
dragon_gem:
  names:
    jp_kana: ドラゴンジュエル
    jp_kanji: ドラゴンジュエル
    en: Dragon Gem
    fr: Joyau Dragon
    it: Bijoudrago
    de: Drakojuwel
    es: Gema Dragón
    ko: 드래곤주얼
    zh_simp: 龙之宝石
    zh_trad: 龍之寶石
  descriptions:
    jp_kana: "ドラゴンの　タイプの　ジュエル。\nもたせると　いちどだけ　ドラゴンの\nわざの　いりょくが　つよまる。"
    jp_kanji: "ドラゴンの　タイプの　ジュエル。\n持たせると　１度だけ　ドラゴンの\n技の　威力が　強まる。"
    en: "A gem with a draconic essence. When held, it\nstrengthens the power of a Dragon-type move\none time."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Dragon."
    it: "Strumento da dare a un Pokémon.\nGioiello che potenzia una sola volta le mosse\ndi tipo Drago."
    de: "Ein Juwel vom Typ Drache. Es erhöht einmalig die\nStärke einer Attacke vom Typ Drache."
    es: "Joya de un solo uso que potencia los movimientos de\ntipo Dragón. Debe llevarla un Pokémon."
    ko: "드래곤타입의 주얼.\n지니게 하면 한 번만 드래곤\n기술의 위력이 강해진다."
    zh_simp: "龙属性的宝石。\n携带后，龙属性的\n招式威力仅会增强１次。"
    zh_trad: "龍屬性的寶石。\n攜帶後，龍屬性招式的\n威力會僅增強１次。"
dragon_memory:
  names:
    jp_kana: ドラゴンメモリ
    jp_kanji: ドラゴンメモリ
    en: Dragon Memory
    fr: ROM Dragon
    it: ROM Drago
    de: Drachen-Disc
    es: Disco Dragón
    ko: 드래곤메모리
    zh_simp: 龙存储碟
    zh_trad: 龍記憶碟
  descriptions:
    jp_kana: "ドラゴンタイプの　データが　はいった\nメモリ。　とくていの　ポケモンが\nもつと　タイプが　かわる。"
    jp_kanji: "ドラゴンタイプの　データが　入った\nメモリ。　特定の　ポケモンが　持つと\nタイプが　変わる。"
    en: "A memory disc that contains Dragon-type data.\nIt changes the type of the holder if held by\na certain species of Pokémon."
    fr: "Une carte mémoire contenant des données sur\nle type Dragon. Un certain Pokémon peut changer\nde type en l’équipant."
    it: "ROM contenente dati sul tipo Drago in formato\ndigitale. Permette a un certo Pokémon di cambiare\ntipo."
    de: "Eine Disc mit Daten zum Typ Drache. Sie löst bei einem\nbestimmten Pokémon einen Typenwechsel aus."
    es: "Disco de datos que contiene información relativa al tipo\nDragón. Permite cambiar de tipo a cierto Pokémon."
    ko: "드래곤타입의 데이터가 들어 있는\n메모리. 특정 포켓몬이\n지니면 타입이 바뀐다."
    zh_simp: "装有龙属性数据的存储碟。\n特定宝可梦携带后，\n属性就会发生变化。"
    zh_trad: "裝有龍屬性資料的記憶碟。\n特定寶可夢攜帶後，\n就會產生屬性的變化。"
dragon_scale:
  names:
    jp_kana: りゅうのウロコ
    jp_kanji: りゅうのウロコ
    en: Dragon Scale
    fr: Écaille Draco
    it: Squama Drago
    de: Drachenhaut
    es: Escama Dragón
    ko: 용의비늘
    zh_simp: 龙之鳞片
    zh_trad: 龍之鱗片
  descriptions:
    jp_kana: "かたくて　じょうぶな　ウロコ。\nドラゴンタイプの　ポケモンが\nもっていることが　ある。"
    jp_kanji: "硬くて　丈夫な　ウロコ。\nドラゴンタイプの　ポケモンが\n持っていることが　ある。"
    en: "A very tough and inflexible scale. Dragon-type\nPokémon may be holding this item when caught."
    fr: "Une écaille épaisse et dure, parfois tenue par\nles Pokémon de type Dragon quand ils sont attrapés."
    it: "Squama spessa e dura.\nPuò averla un Pokémon di tipo Drago quando\nviene catturato."
    de: "Eine dicke und starke Haut. Drachen-Pokémon tragen\ndieses Item gern bei sich."
    es: "Una gruesa y resistente escama que pueden llevar los\nPokémon de tipo Dragón cuando son capturados."
    ko: "단단하고 튼튼한 비늘.\n드래곤타입의 포켓몬이\n지니고 있는 경우가 있다."
    zh_simp: "又硬又坚固的鳞片。\n龙属性宝可梦有时会携带它。"
    zh_trad: "又硬又結實的鱗片。\n有時龍屬性寶可夢\n會攜帶著它。"
dragon_skull:
  names:
    jp_kana: ドラゴンのホネ
    jp_kanji: ドラゴンのホネ
    en: Dragon Skull
    fr: Crâne Dragon
    it: Teschio
    de: Drakoschädel
    es: Cráneo Dragón
    ko: 드래곤의뼈
    zh_simp: 龙之骨
    zh_trad: 龍之骨
  descriptions:
    jp_kana: "あれくるう　うみを　ものともせず\nじゆうに　とびまわっていたと　される\nポケモンの　あたまの　ホネ。"
    jp_kanji: "荒れ狂う　海を　ものともせず\n自由に　とびまわっていたと　される\nポケモンの　頭の　ホネ。"
    en: "A skull of a Pokémon that was said to have braved\nthe angry waters to fly around the world."
    fr: "Le crâne d’un Pokémon qui aurait survolé librement\nla mer déchaînée."
    it: "Teschio di un Pokémon che sorvolava libero i mari\nsenza temere neanche le più forti tempeste."
    de: "Der Schädel eines Pokémon, das einst wütendem\nSeegang zum Trotz frei um die Welt flog."
    es: "Cráneo de un Pokémon. Se dice que este Pokémon\ncruzó mares embravecidos."
    ko: "성난 바다 위를 개의치 않고\n자유롭게 날아다녔다는\n포켓몬의 머리뼈."
    zh_simp: "据说是能在狂风暴雨的\n大海上随意翱翔的宝可梦的头骨。"
    zh_trad: "據說是能在狂風暴雨的\n大海上任意翱翔的\n寶可夢的頭骨。"
dragonium_z:bag:
  names:
    jp_kana: ドラゴンＺ
    jp_kanji: ドラゴンＺ
    en: Dragonium Z
    fr: Dracozélite
    it: Draconium Z
    de: Dracium Z
    es: Dracostal Z
    ko: 드래곤Z
    zh_simp: 龙Ｚ
    zh_trad: 龍Ｚ
  descriptions:
    jp_kana: "ドラゴンタイプの　わざを\nＺワザに　グレードアップする\nＺパワーの　けっしょうを　つくりだす。"
    jp_kanji: "ドラゴンタイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nDragon-type moves to Dragon-type Z-Moves."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise son porteur à transformer ses capacités\nde type Dragon en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono ai Pokémon di trasformare le mosse\ndi tipo Drago in mosse Z."
    de: "Kristallisierte Z-Kraft, die Drachen-Attacken zu\nZ-Attacken aufstuft. Wird bei Bedarf automatisch\nvervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a los\nportadores convertir sus movimientos de tipo Dragón\nen movimientos Z."
    ko: "드래곤타입 기술을\nZ기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将龙属性招式升级成\nＺ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把龍屬性招式\n升級為Ｚ招式的Ｚ力量結晶。"
dragonium_z:held:
  names:
    jp_kana: ドラゴンＺ
    jp_kanji: ドラゴンＺ
    en: Dragonium Z
    fr: Dracozélite
    it: Draconium Z
    de: Dracium Z
    es: Dracostal Z
    ko: 드래곤Z
    zh_simp: 龙Ｚ
    zh_trad: 龍Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　けっしょう。\nドラゴンタイプの　わざを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nドラゴンタイプの　技を\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Dragon-type moves to Z-Moves."
    fr: "Une cristallisation de la Force Z, permettant\nde transformer les capacités de type Dragon\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare le mosse di tipo Drago\nin mosse Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft\nDrachen-Attacken zu Z-Attacken auf."
    es: "Cristal que confiere el Poder Z a los movimientos\nde tipo Dragón."
    ko: "Z파워의 결정.\n드래곤타입 기술을\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将龙属性的招式\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把龍屬性的招式\n升級為Ｚ招式。"
dratini_candy:
  names:
    jp_kana: ミニリュウのアメ
    jp_kanji: ミニリュウのアメ
    en: Dratini Candy
    fr: Bonbon Minidraco
    it: Caramella Dratini
    de: Dratini-Bonbon
    es: Caramelo Dratini
    ko: 미뇽의사탕
    zh_simp: 迷你龙的糖果
    zh_trad: 迷你龍的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
dread_plate:
  names:
    jp_kana: こわもてプレート
    jp_kanji: こわもてプレート
    en: Dread Plate
    fr: Plaque Ombre
    it: Lastratimore
    de: Furchttafel
    es: Tabla Oscura
    ko: 공포플레이트
    zh_simp: 恶颜石板
    zh_trad: 惡顏石板
  descriptions:
    jp_kana: "あくの　タイプの　せきばん。\nもたせると　あくタイプの\nわざの　いりょくが　つよまる。"
    jp_kanji: "あくの　タイプの　石盤。\n持たせると　あくタイプの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon. It’s a stone tablet\nthat boosts the power of Dark-type moves."
    fr: "Objet à tenir. Une tablette en pierre augmentant\nla puissance des capacités de type Ténèbres."
    it: "Strumento da dare a un Pokémon. Lastra di pietra che\npotenzia le mosse di tipo Buio."
    de: "Ein Item zum Tragen. Diese Steintafel verstärkt\nAttacken vom Typ Unlicht."
    es: "Tabla de piedra que potencia los movimientos de tipo\nSiniestro. Debe llevarla un Pokémon."
    ko: "악타입의 석판.\n지니게 하면 악타입\n기술의 위력이 강해진다."
    zh_simp: "恶属性的石板。\n携带后，恶属性的\n招式威力就会增强。"
    zh_trad: "惡屬性的石板。\n攜帶後，惡屬性的\n招式威力就會增強。"
dream_ball:
  names:
    jp_kana: ドリームボール
    jp_kanji: ドリームボール
    en: Dream Ball
    fr: Rêve Ball
    it: Dream Ball
    de: Traumball
    es: Ensueño Ball
    ko: 드림볼
    zh_simp: 梦境球
    zh_trad: 夢境球
  descriptions:
    jp_kana: "ねむり　じょうたいの\nポケモンが　つかまえやすくなる\nちょっと　かわった　ボール。"
    jp_kanji: "ねむり　状態の\nポケモンが　捕まえやすくなる\nちょっと　変わった　ボール。"
    en: "A somewhat different Poké Ball that makes it easier to\ncatch wild Pokémon while they’re asleep."
    fr: "Une Poké Ball un peu spéciale qui fonctionne\nparticulièrement bien sur les Pokémon endormis."
    it: "Poké Ball speciale che funziona particolarmente\nbene con i Pokémon addormentati."
    de: "Ein Ball, mit dem sich schlafende Pokémon leichter\nfangen lassen."
    es: "Es algo distinta a las demás. Funciona especialmente\nbien con los Pokémon dormidos."
    ko: "잠듦 상태의\n포켓몬을 잡기 쉬워지는\n조금 특이한 볼."
    zh_simp: "有点与众不同的球。\n能很容易地捕捉\n睡眠状态的宝可梦。"
    zh_trad: "有點與眾不同的球。\n能更容易地捉到\n睡眠狀態的寶可夢。"
dropped_item:boy:
  names:
    jp_kana: わすれもの
    jp_kanji: わすれもの
    en: Dropped Item
    fr: Objet Trouvé
    it: Oggetto perso
    de: Fundsache
    es: Objeto Perdido
    ko: 잊은물건
    zh_simp: 遗忘物
    zh_trad: 遺忘物
  descriptions:
    jp_kana: "ライモンシティの　ゆうえんちで\nひろった　ライブキャスター。\nおとしぬしは　おとこのこ　らしい。"
    jp_kanji: "ライモンシティの　遊園地で\n拾った　ライブキャスター。\n落とし主は　男の子らしい。"
    en: "The Xtransceiver found at the Nimbasa City\namusement park. It seems it belongs to a boy."
    fr: "Un Vokit trouvé au parc d’attractions de Méanville.\nC’est un modèle pour garçons."
    it: "Interpoké rinvenuto nel parco giochi di Sciroccopoli.\nPare che appartenga a un ragazzo."
    de: "Ein Viso-Caster, der im Vergnügungspark von\nRayono City gefunden wurde. Er scheint einem\nJungen zu gehören."
    es: "Videomisor encontrado en el parque de atracciones de\nCiudad Mayólica. Parece que pertenece a un chico."
    ko: "뇌문시티의 유원지에서\n주운 라이브캐스터.\n잃어버린 사람은 남자인 것 같다."
    zh_simp: "在雷文市的游乐园里\n捡到的即时通讯器。\n失主好像是个男孩子。"
    zh_trad: "在雷文市的遊樂園裡\n撿到的即時通訊器。\n失主好像是個男孩子。"
dropped_item:girl:
  names:
    jp_kana: わすれもの
    jp_kanji: わすれもの
    en: Dropped Item
    fr: Objet Trouvé
    it: Oggetto perso
    de: Fundsache
    es: Objeto Perdido
    ko: 잊은물건
    zh_simp: 遗忘物
    zh_trad: 遺忘物
  descriptions:
    jp_kana: "ライモンシティの　ゆうえんちで\nひろった　ライブキャスター。\nおとしぬしは　おんなのこ　らしい。"
    jp_kanji: "ライモンシティの　遊園地で\n拾った　ライブキャスター。\n落とし主は　女の子らしい。"
    en: "The Xtransceiver found at the Nimbasa City\namusement park. It seems it belongs to a girl."
    fr: "Un Vokit trouvé au parc d’attractions de Méanville.\nC’est un modèle pour filles."
    it: "Interpoké rinvenuto nel parco giochi di Sciroccopoli.\nPare che appartenga a una ragazza."
    de: "Ein Viso-Caster, der im Vergnügungspark von\nRayono City gefunden wurde. Er scheint einem\nMädchen zu gehören."
    es: "Videomisor encontrado en el parque de atracciones de\nCiudad Mayólica. Parece que pertenece a una chica."
    ko: "뇌문시티의 유원지에서\n주운 라이브캐스터.\n잃어버린 사람은 여자인 것 같다."
    zh_simp: "在雷文市的游乐园里\n捡到的即时通讯器。\n失主好像是个女孩子。"
    zh_trad: "在雷文市的遊樂園裡\n撿到的即時通訊器。\n失主好像是個女孩子。"
drowzee_candy:
  names:
    jp_kana: スリープのアメ
    jp_kanji: スリープのアメ
    en: Drowzee Candy
    fr: Bonbon Soporifik
    it: Caramella Drowzee
    de: Traumato-Bonbon
    es: Caramelo Drowzee
    ko: 슬리프의사탕
    zh_simp: 催眠貘的糖果
    zh_trad: 催眠貘的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
ds_sounds:
  names:
    jp_kana: ＤＳプレイヤー
    jp_kanji: ＤＳプレイヤー
    en: DS Sounds
    fr: Lecteur DS
    it: Lettore DS
    de: DS-Player
    es: Reproductor DS
    ko: DS플레이어
    zh_simp: ＤＳ播放器
    zh_trad: ＤＳ播放器
  descriptions:
    jp_kana: "なつかしい　きょくが　きける\nおんがく　プレイヤー。\nスイッチ　ひとつで　きりかえられる。"
    jp_kanji: "懐かしい　曲が　聞ける\n音楽　プレイヤー。\nスイッチ　一つで　切り替えられる。"
    en: "A music player that allows you to listen to nostalgic\nsongs. It’s operated with the flip of a single switch."
    fr: "Un lecteur de musique qui permet de se plonger\ndans une atmosphère rétro. Une pression suffit\npour changer de mode."
    it: "Lettore di musica che permette di immergersi\nin atmosfere rétro.\nFunziona con un solo tasto."
    de: "Ein Abspielgerät, das Musik aus einer längst\nvergangenen Zeit spielt. Lässt sich durch simplen\nKnopfdruck bedienen."
    es: "Reproductor con el que se pueden escuchar aquellas\ncanciones tan nostálgicas. Se cambia de canción con\nun solo botón."
    ko: "그리운 곡을 들을 수 있는\n음악 플레이어.\n스위치 하나로 전환할 수 있다."
    zh_simp: "可以听到怀旧歌曲的音乐播放器。\n可用一个开关切换歌曲。"
    zh_trad: "可以聽到懷舊歌曲的\n音樂播放機。\n可一鍵切換歌曲。"
dubious_disc:
  names:
    jp_kana: あやしいパッチ
    jp_kanji: あやしいパッチ
    en: Dubious Disc
    fr: CD Douteux
    it: Dubbiodisco
    de: Dubiosdisc
    es: Disco Extraño
    ko: 괴상한패치
    zh_simp: 可疑补丁
    zh_trad: 可疑修正檔
  descriptions:
    jp_kana: "なかに　あやしい　じょうほうが\nつまった　とうめいな　きかい。\nせいさくしゃは　ふめい。"
    jp_kanji: "なかに　怪しい　情報が\nつまった　透明な　機械。\n製作者は　不明。"
    en: "A transparent device overflowing with dubious\ndata. Its producer is unknown."
    fr: "Un appareil transparent rempli de données douteuses.\nSon fabricant n’est pas connu."
    it: "Dispositivo trasparente strapieno di dati di dubbia\norigine. Non se ne conosce il produttore."
    de: "Eine Scheibe mit seltsamen Daten. Ihr Ursprung ist\nunbekannt."
    es: "Dispositivo transparente que contiene datos\nmisteriosos. Es de fabricante desconocido."
    ko: "안에 괴상한 정보가\n가득한 투명한 기계다.\n제작자 불명."
    zh_simp: "内部储存了奇怪信息的透明机器。\n制造者不明。"
    zh_trad: "內部儲存了可疑\n資訊的透明機器。\n製造者不明。"
durin_berry:
  names:
    jp_kana: ドリのみ
    jp_kanji: ドリのみ
    en: Durin Berry
    fr: Baie Durin
    it: Baccadurian
    de: Durinbeere
    es: Baya Rudion
    ko: 두리열매
    zh_simp: 金枕果
    zh_trad: 金枕果
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。\nふかふかのつちに　うめると\nドリが　そだつ。"
    jp_kanji: "ポフィンの　材料。\nふかふかの土に　埋めると\nドリが　育つ。"
    en: "A Poffin ingredient. Bury it in soft soil to grow a\nDurin Berry plant."
    fr: "Un ingrédient entrant dans la confection de Poffins.\nPlantez cette Baie dans un sol meuble et fertile\npour faire pousser un arbre à Baies Durin."
    it: "Si usa per fare i poffin. Seminala nella terra soffice\nper far crescere una pianta di Baccadurian."
    de: "Eine Knursp-Zutat. Pflanze sie in weichen Lehmboden\nein, damit neue Durinbeeren wachsen."
    es: "Ingrediente para pokochos. Si se planta en tierra suelta,\nsaldrá una planta de Rudion."
    ko: "포핀의 재료.\n푹신푹신한 땅에 심으면\n두리가 자란다."
    zh_simp: "宝芬的材料。\n埋在松软的土地里\n可以培育出金枕。"
    zh_trad: "製作寶芬的材料。\n埋進鬆軟的泥土裡，\n長成後會結出金枕。"
dusk_ball:
  names:
    jp_kana: ダークボール
    jp_kanji: ダークボール
    en: Dusk Ball
    fr: Sombre Ball
    it: Scuro Ball
    de: Finsterball
    es: Ocaso Ball
    ko: 다크볼
    zh_simp: 黑暗球
    zh_trad: 黑暗球
  descriptions:
    jp_kana: "よるや　どうくつなど　くらいところで\nポケモンが　つかまえやすくなる\nちょっと　かわった　ボール。"
    jp_kanji: "夜や　どうくつなど　暗いところで\nポケモンが　捕まえやすくなる\nちょっと　変わった　ボール。"
    en: "A somewhat different Poké Ball that makes it\neasier to catch wild Pokémon at night or in dark\nplaces such as caves."
    fr: "Une Poké Ball efficace de nuit ou dans les endroits\nsombres, tels que les grottes."
    it: "Poké Ball un po’ diversa che rende più facile\ncatturare Pokémon selvatici di notte o in luoghi\nbui come le grotte."
    de: "Ein mysteriöser Ball, geeignet für Einsätze in der Nacht\noder an dunklen Orten."
    es: "Es algo particular. Hace que sea más fácil capturar a los\nPokémon salvajes por la noche o en lugares oscuros."
    ko: "밤이나 동굴 등 어두운 곳에서\n포켓몬을 잡기 쉬워지는\n조금 특이한 볼."
    zh_simp: "有点与众不同的球。\n能很容易地在夜晚或洞窟等\n阴暗的地方捕捉宝可梦。"
    zh_trad: "有點與眾不同的球。\n容易在夜晚或洞窟等陰暗的地方\n捉到寶可夢。"
dusk_stone:
  names:
    jp_kana: やみのいし
    jp_kanji: やみのいし
    en: Dusk Stone
    fr: Pierre Nuit
    it: Neropietra
    de: Finsterstein
    es: Piedra Noche
    ko: 어둠의돌
    zh_simp: 暗之石
    zh_trad: 暗之石
  descriptions:
    jp_kana: "ある　とくていの　ポケモンを\nしんかさせる　ふしぎな　いし。\nやみのように　くらい。"
    jp_kanji: "ある　特定の　ポケモンを\n進化させる　不思議な　石。\nやみのように　暗い。"
    en: "A peculiar stone that can make certain species of\nPokémon evolve. It holds shadows as dark as\ncan be."
    fr: "Une pierre étrange qui fait évoluer certaines espèces\nde Pokémon. Elle est sombre comme une nuit sans lune."
    it: "Pietra particolare che fa evolvere determinate\nspecie di Pokémon. È scura come le tenebre."
    de: "Dieser besondere, düstere Stein hilft manchen Pokémon\nbei ihrer Entwicklung."
    es: "Una piedra peculiar que hace evolucionar a algunos\nPokémon. Es oscura como la noche."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 돌.\n칠흑처럼 어둡다."
    zh_simp: "能让某些特定宝可梦\n进化的神奇石头。\n像黑夜一般漆黑。"
    zh_trad: "能讓特定寶可夢\n進化的神奇石頭。\n像黑暗一般漆黑。"
dynamax_band:
  names:
    jp_kana: ダイマックスＢ
    jp_kanji: ダイマックスＢ
    en: Dynamax Band
    fr: Poignet Dynamax
    it: Polsino Dynamax
    de: Dynamax-Band
    es: Maximuñequera
    ko: 다이맥스 밴드
    zh_simp: 极巨腕带
    zh_trad: 極巨腕帶
  descriptions:
    jp_kana: "ねがいぼしが　くみこまれており\nパワースポットに　いると　ひかりだして\nポケモンを　ダイマックス　させる。"
    jp_kanji: "ねがいぼしが　組みこまれており\nパワースポットに　いると　光りだして\nポケモンを　ダイマックス　させる。"
    en: "A Wishing Star has been affixed to it. It lets out a light\nthat allows Pokémon to Dynamax when at a Power Spot."
    fr: "Quand elle se trouve près d’une Source d’Énergie,\nl’Étoile Vœu sertie dans ce poignet brille, ce qui\npermet de donner à un Pokémon sa forme Dynamax."
    it: "Contiene una Desiostella e quando si trova vicino\na un punto energetico emette una luce che permette\nai Pokémon di dynamaxizzarsi."
    de: "Wenn man sich in der Nähe einer Energiequelle aufhält,\nleuchtet der darin eingearbeitete Wunschstern auf und\nermöglicht die Dynamaximierung von Pokémon."
    es: "Si lleva engarzada una Estrella Deseo y el portador se\nhalla junto a un nodo energético, reacciona emitiendo\nuna luz y permite dinamaxizar Pokémon."
    ko: "소원의별이 박혀 있으며\n파워스폿에 있으면 빛이 나고\n포켓몬을 다이맥스시킬 수 있다."
    zh_simp: "内部嵌入了许愿星，\n在能量点就会发出光芒，\n使宝可梦极巨化。"
    zh_trad: "嵌入了許願星，\n當位處能量點時會發光，\n讓寶可夢極巨化。"
dynamax_candy:
  names:
    jp_kana: ダイマックスアメ
    jp_kanji: ダイマックスアメ
    en: Dynamax Candy
    fr: Bonbon Dynamax
    it: Caram. Dynamax
    de: Dynamax-Bonbon
    es: Caramelo Dinamax
    ko: 다이맥스사탕
    zh_simp: 极巨糖果
    zh_trad: 極巨糖果
  descriptions:
    jp_kana: "エネルギーが　つまった　アメ。　あたえると\nダイマックスレベルが　１あがる。レベルが\nたかいと　ダイマックスの　ＨＰが　ふえる。"
    jp_kanji: "エネルギーが　つまった　アメ。　与えると\nダイマックスレベルが　１あがる。レベルが\n高いと　ダイマックスの　ＨＰが　増える。"
    en: "A candy that is packed with energy. When consumed, it\nwill raise the Dynamax Level of a single Pokémon by\none. A higher level means higher HP when Dynamaxed."
    fr: "Un bonbon plein d’énergie qui fait monter le niveau\nDynamax d’un Pokémon d’un point. Plus ce dernier\nest élevé, plus les PV sous forme Dynamax augmentent."
    it: "Caramella altamente energetica che aumenta di un\npunto il Livello Dynamax. Più alto è il livello, più\naumentano i PS del Pokémon quando si dynamaxizza."
    de: "Ein Bonbon, das voller Energie steckt. Beim Verzehr\nsteigt der Dynamax-Level eines Pokémon um 1 Stufe an.\nDies erhöht seine KP nach der Dynamaximierung."
    es: "Caramelo energético que sube el nivel Dinamax de un\nPokémon. Cuanto más alto sea el nivel, más aumentarán\nsus PS al dinamaxizarse."
    ko: "에너지가 가득한 사탕.\n먹이면 다이맥스 레벨이 1 올라간다.\n레벨이 높으면 다이맥스 시의 HP가 늘어난다."
    zh_simp: "充满能量的糖果。\n给予宝可梦后，极巨化等级能够提高１。\n当极巨化等级提高时，ＨＰ会增加。"
    zh_trad: "充滿能量的糖果。\n餵給寶可夢後，能讓極巨化等級提升１級。\n當等級變高，極巨化時ＨＰ將會增加。"
dynamax_crystal_and15:
  names:
    jp_kana: ★And15
    jp_kanji: ★And15
    en: ★And15
    fr: ★And15
    it: ★And15
    de: ★And15
    es: ★And15
    ko: ★And15
    zh_simp: ★And15
    zh_trad: ★And15
  descriptions:
    jp_kana: "つかった　ひに　ワイルドエリアの\nみはりとうのダイすあな　から\n\nが　あらわれる。"
    jp_kanji: "使った　日に　ワイルドエリアの\n見張り塔のダイ巣穴　から\n\nが　現れる。"
    en: "An item that causes \n\n to appear from\nthe Watchtower Lair in the Wild Area until the end of\nthe day."
    fr: "Un objet faisant apparaître un \n\n\ndans l’antre géant de la Tour en ruines\ndes Terres Sauvages jusqu’à la fin de la journée."
    it: "Strumento che fa apparire \n\n nella\ndynatana della Torre Diroccata, nelle Terre Selvagge,\nfino alla fine del giorno in cui viene usato."
    de: "Dieses Item bewirkt, dass im Wachturm-Nest in der\nNaturzone ein \n\n bis zum Ende des Tages\nerscheint, an dem das Item eingesetzt wurde."
    es: "Posibilita la aparición de \n\n en el nido\nDinamax de la Atalaya del Área Silvestre hasta finalizar\nel día en que se ha usado."
    ko: "사용한 당일에만 와일드에리어에 있는\n감시탑의 다이맥스굴에서\n\n\n 나타난다."
    zh_simp: "使用后的当天，\n旷野地带的瞭望塔巨巢中\n会出现\n\n。"
    zh_trad: "使用後的當天，\n\n會出現在\n曠野地帶的瞭望塔巨巢。"
