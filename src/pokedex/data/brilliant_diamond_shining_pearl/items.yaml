aguav_berry:
  names:
    jp_kana: バンジのみ
    jp_kanji: バンジのみ
    en: Aguav Berry
    fr: Baie Gowav
    it: Baccaguava
    de: Gauvebeere
    es: Baya Guaya
    ko: 아바열매
    zh_simp: 乐芭果
    zh_trad: 樂芭果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nピンチのとき　ＨＰを　かいふくする。\nきらいな　あじだと　こんらん　する。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　ＨＰを　回復する。\nきらいな味だと　混乱する。"
    en: "If held by a Pokémon, it restores the user’s HP in a\npinch, but it will cause confusion if the user hates\nthe taste."
    fr: "Tenue, cette Baie restaure des PV en cas de besoin,\nmais rend le Pokémon confus si son goût lui déplaît."
    it: "Se un Pokémon in difficoltà ha questa bacca,\nrecupera dei PS. Se al Pokémon non piace\nil suo sapore, può causare confusione."
    de: "Als getragenes Item füllt die Beere im Notfall die KP\neines Pokémon auf, doch ihr Aroma verwirrt jene,\ndie es nicht mögen."
    es: "Los Pokémon pueden llevarla o usarla para restaurar\nalgunos PS. Su sabor puede causar confusión si no les\ngusta."
    ko: "포켓몬에게 지니게 하면\n위급할 때 HP를 회복한다.\n싫어하는 맛이면 혼란에 빠진다."
    zh_simp: "让宝可梦携带后，\n危机时可以回复ＨＰ。\n如果讨厌这味道就会混乱。"
    zh_trad: "讓寶可夢攜帶後，\n危機時可以回復ＨＰ。\n如果討厭這味道就會混亂。"
air_balloon:
  names:
    jp_kana: ふうせん
    jp_kanji: ふうせん
    en: Air Balloon
    fr: Ballon
    it: Palloncino
    de: Luftballon
    es: Globo Helio
    ko: 풍선
    zh_simp: 气球
    zh_trad: 氣球
  descriptions:
    jp_kana: "ポケモンに　もたせると\nポケモンが　ちゅうに　うく。\nこうげきを　うけると　われてしまう。"
    jp_kanji: "ポケモンに　持たせると\nポケモンが　宙に　浮く。\n攻撃を　受けると　割れてしまう。"
    en: "An item to be held by a Pokémon. The holder will\nfloat in the air until hit. Once the holder is hit, this item\nwill burst."
    fr: "Objet à tenir. Permet au porteur de flotter dans les airs.\nIl éclate quand le porteur encaisse une attaque."
    it: "Permette al Pokémon che ha questo strumento\ndi fluttuare in aria. Scoppia se il Pokémon\nè colpito da un attacco."
    de: "Gibt man ihn einem Pokémon zum Tragen, fängt es an\nzu schweben. Wird es getroffen, platzt der Luftballon."
    es: "El Pokémon que lo lleve flotará en el aire. Si recibe un\ngolpe, estallará."
    ko: "포켓몬에게 지니게 하면\n포켓몬이 허공에 뜬다.\n공격을 받으면 터져 버린다."
    zh_simp: "让宝可梦携带后，\n宝可梦会浮在空中。\n受到攻击就会破裂。"
    zh_trad: "讓寶可夢攜帶後，\n寶可夢會浮在空中。\n受到攻擊就會破裂。"
alakazite:
