kangaskhanite:
  names:
    jp_kana: ガルーラナイト
    jp_kanji: ガルーラナイト
    en: Kangaskhanite
    fr: Kangourexite
    it: Kangaskhanite
    de: Kangamanit
    es: Kangaskhanita
    ko: 캥카나이트
    zh_simp: 袋兽进化石
    zh_trad: 袋獸進化石
  descriptions:
    jp_kana: "ガルーラに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "ガルーラに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Kangaskhan hold it, and this stone will enable\nit to Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Kangourex, elle lui permet de\nméga-évoluer durant un combat."
    it: "Un esemplare delle misteriose Megapietre.\nData a Kangaskhan, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Kangama getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Kangaskhan en combate."
    ko: "캥카에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让袋兽携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓袋獸攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
kanto_slate:
  names:
    jp_kana: カントーのせきばん
    jp_kanji: カントーのせきばん
    en: Kanto Slate
    fr: Tablette Kanto
    it: Piastra di Kanto
    de: Kanto-Platte
    es: Losa Kanto
    ko: 관동의석판
    zh_simp: 关都石板
    zh_trad: 關都石板
  descriptions:
    jp_kana: "ふしぎな　ちからに　あふれる　せきばん。\nハマナスパークの　カントーのへやと\nふかい　つながりを　かんじる。"
    jp_kanji: "不思議な　力に　あふれる　石板。\nハマナスパークの　カントーの部屋と\n深い　つながりを　感じる。"
    en: "A slate overflowing with enigmatic energy. You can feel\na strong connection between it and the Kanto Room at\nRamanas Park."
    fr: "Une tablette qui regorge d’une étrange énergie.\nElle semble intimement liée à la Salle de Kanto\ndu Parc Rosa Rugosa."
    it: "Lastra di pietra che emana una misteriosa energia.\nSembra profondamente connessa alla Stanza di Kanto\ndel Parco Rosa Rugosa."
    de: "Eine Platte, die vor rätselhafter Energie strotzt.\nMan kann eine starke Verbindung zwischen ihr und der\nKanto-Kammer im Hamanasu-Park spüren."
    es: "Una losa rebosante de una misteriosa energía.\nParece estrechamente relacionada con la Sala\nde Kanto del Parque Hansa."
    ko: "신비한 힘이 넘치는 석판.\n해당화파크의 관동의 방과\n깊은 연관이 있는 것 같다."
    zh_simp: "充满了神秘力量的石板。\n感觉它与玫瑰公园的关都之厅\n有着很深的关联。"
    zh_trad: "充滿神奇力量的石板。\n感覺它和玫瑰公園的關都之廳\n有很深的關係。"
kasib_berry:
  names:
    jp_kana: カシブのみ
    jp_kanji: カシブのみ
    en: Kasib Berry
    fr: Baie Sédra
    it: Baccacitrus
    de: Zitarzbeere
    es: Baya Drasi
    ko: 수불열매
    zh_simp: 佛柑果
    zh_trad: 佛柑果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　ゴースト　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　ゴースト技を\n受けたとき　威力が　弱まる。"
    en: "If held by a Pokémon, this Berry will lessen the\ndamage taken from one supereffective\nGhost-type attack."
    fr: "Tenue, cette Baie affaiblit une attaque ennemie\nsuper efficace de type Spectre."
    it: "Se un Pokémon ha questa bacca, l’attacco\nsuperefficace di tipo Spettro del nemico\nviene indebolito."
    de: "Als getragenes Item schwächt diese Beere sehr effektive\ngegnerische Attacken vom Typ Geist."
    es: "Si la lleva un Pokémon, debilita un ataque supereficaz\nde tipo Fantasma de un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 굉장한 고스트 기술로\n공격받았을 때 위력이 약해진다."
    zh_simp: "让宝可梦携带后，\n在受到效果绝佳的幽灵属性招式\n攻击时，能令其威力减弱。"
    zh_trad: "讓寶可夢攜帶後，\n在受到效果絕佳的幽靈屬性招式\n攻擊時，能使其威力減弱。"
kebia_berry:
  names:
    jp_kana: ビアーのみ
    jp_kanji: ビアーのみ
    en: Kebia Berry
    fr: Baie Kébia
    it: Baccakebia
    de: Grarzbeere
    es: Baya Kebia
    ko: 으름열매
    zh_simp: 通通果
    zh_trad: 通通果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　どく　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　どく技を\n受けたとき　威力が　弱まる。"
    en: "If held by a Pokémon, this Berry will lessen the\ndamage taken from one supereffective\nPoison-type attack."
    fr: "Tenue, cette Baie affaiblit une attaque ennemie\nsuper efficace de type Poison."
    it: "Se un Pokémon ha questa bacca, l’attacco\nsuperefficace di tipo Veleno del nemico\nviene indebolito."
    de: "Als getragenes Item schwächt diese Beere sehr effektive\ngegnerische Attacken vom Typ Gift."
    es: "Si la lleva un Pokémon, debilita un ataque supereficaz\nde tipo Veneno de un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 굉장한 독 기술로\n공격받았을 때 위력이 약해진다."
    zh_simp: "让宝可梦携带后，\n在受到效果绝佳的毒属性招式\n攻击时，能令其威力减弱。"
    zh_trad: "讓寶可夢攜帶後，\n在受到效果絕佳的毒屬性招式\n攻擊時，能使其威力減弱。"
kee_berry:
  names:
    jp_kana: アッキのみ
    jp_kanji: アッキのみ
    en: Kee Berry
    fr: Baie Éka
    it: Baccalighia
    de: Akibeere
    es: Baya Biglia
    ko: 악키열매
    zh_simp: 亚开果
    zh_trad: 亞開果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nぶつりわざを　うけたとき\nじぶんの　ぼうぎょが　あがる。"
    jp_kanji: "ポケモンに　持たせると\n物理技を　受けたとき\n自分の　防御が　あがる。"
    en: "If held by a Pokémon, this Berry will increase the\nholder’s Defense if it’s hit with a physical move."
    fr: "Tenue, cette Baie augmente la Défense du Pokémon\nlorsqu’il est touché par une capacité physique."
    it: "Se un Pokémon ha questa bacca, aumenta\nla propria Difesa quando subisce una mossa\nfisica."
    de: "Als getragenes Item erhöht diese Beere die\nVerteidigung des Trägers, wenn dieser von physischen\nAttacken getroffen wird."
    es: "Si la lleva un Pokémon, aumenta su Defensa tras recibir\nun ataque físico."
    ko: "포켓몬에게 지니게 하면\n물리 기술로 공격받았을 때\n자신의 방어가 올라간다."
    zh_simp: "让宝可梦携带后，\n在受到物理招式攻击时，\n自己的防御就会提高。"
    zh_trad: "讓寶可夢攜帶後，\n在受到物理招式攻擊時，\n自己的防禦就會提高。"
kelpsy_berry:
  names:
    jp_kana: ネコブのみ
    jp_kanji: ネコブのみ
    en: Kelpsy Berry
    fr: Baie Alga
    it: Baccalga
    de: Setangbeere
    es: Baya Algama
    ko: 시마열매
    zh_simp: 藻根果
    zh_trad: 藻根果
  descriptions:
    jp_kana: "ポケモンに　あげると\nとても　なかよく　なりやすくなるが\nこうげきの　きそポイントは　さがる。"
    jp_kanji: "ポケモンに　あげると\nとても　なかよく　なりやすくなるが\n攻撃の　基礎ポイントは　さがる。"
    en: "A Berry to be consumed by Pokémon. Using it on a\nPokémon makes it more friendly but lowers its\nAttack base points."
    fr: "Une Baie qui rend les Pokémon plus amicaux,\nmais baisse leur Attaque de base."
    it: "Usata su un Pokémon, ne aumenta il livello di amicizia,\nma ne diminuisce i punti base dell’Attacco."
    de: "Isst ein Pokémon diese Beere, stärkt dies seine\nZutraulichkeit, verringert aber seinen Angriffs-Basiswert."
    es: "Al usarla con un Pokémon, se gana su amistad, pero\ntambién reduce su Ataque de base."
    ko: "포켓몬에게 주면\n매우 친밀해지기 쉬워지지만\n공격의 기초 포인트가 떨어진다."
    zh_simp: "如果把它交给宝可梦，\n宝可梦就会变得非常容易和训练家亲密，\n但攻击的基础点数会降低。"
    zh_trad: "如果把它餵給寶可夢，\n寶可夢會非常容易和訓練家變得友好，\n但攻擊的基礎點數會降低。"
key_stone:
  names:
    jp_kana: キーストーン
    jp_kanji: キーストーン
    en: Key Stone
    fr: Gemme Sésame
    it: Pietrachiave
    de: Schlüssel-Stein
    es: Piedra Activadora
    ko: 키스톤
    zh_simp: 钥石
    zh_trad: 鑰石
  descriptions:
    jp_kana: "メガストーンを　もったまま　たたかう\nポケモンを　メガシンカさせる\nみちのパワーを　ひめた　いし。"
    jp_kanji: "メガストーンを　持ったまま　戦う\nポケモンを　メガシンカさせる\n未知のパワーを　秘めた　石。"
    en: "A stone filled with an unexplained power. It makes\nPokémon that battle with a Mega Stone\nMega Evolve."
    fr: "Une pierre aux pouvoirs mystérieux permettant\nà un Pokémon tenant la Méga-Gemme adéquate\nde méga-évoluer."
    it: "Pietra dotata di un misterioso potere.\nDurante la lotta, può innescare la megaevoluzione\ndei Pokémon che hanno una Megapietra."
    de: "Ein Stein mit unbekannten Kräften. Er kann im Kampf\nbei Pokémon, die einen Mega-Stein tragen, eine\nMega-Entwicklung auslösen."
    es: "Piedra de singulares poderes que permite\nmegaevolucionar en combate a un Pokémon que lleve\nconsigo una Megapiedra."
    ko: "메가스톤을 지닌 채로 싸우는\n포켓몬을 메가진화시키는\n미지의 힘을 가진 돌."
    zh_simp: "蕴藏着未知力量的石头。\n能让携带着超级石战斗的\n宝可梦进行超级进化。"
    zh_trad: "隱藏著未知力量的石頭。\n能讓攜帶著超級石戰鬥的\n寶可夢進行超級進化。"
key_to_room_1:
  names:
    jp_kana: １ごうしつのカギ
    jp_kanji: １ごうしつのカギ
    en: Key to Room 1
    fr: Clé Salle 1
    it: Chiave stanza 1
    de: R1-Schlüssel
    es: Ll. Habitación 1
    ko: 1호실열쇠
    zh_simp: １号客房的钥匙
    zh_trad: １號客房的鑰匙
  descriptions:
    jp_kana: "シーキンセツの　へやに\nはいる　ための　カギ。"
    jp_kanji: "シーキンセツの　部屋に\n入るための　カギ。"
    en: A key that opens a door inside Sea Mauville.
    fr: La clé d’une salle de Lavandia Sea.
    it: "Chiave per accedere a una delle stanze\ndi Ciclamare."
    de: "Ein Schlüssel, der in das Schloss eines Raumes auf\nSeewoge Malvenfroh passt."
    es: Llave de acceso a una de las habitaciones de Malvamar.
    ko: "씨보라의 방으로\n들어가기 위한 열쇠."
    zh_simp: "进入海紫堇的房间时\n所需的钥匙。"
    zh_trad: "用於進入\n海紫菫的房間的鑰匙。"
