    jp_kanji: メンバーズカード
    en: Member Card
    fr: Carte Membre
    it: Scheda Soci
    de: Mitgliedskarte
    es: Carné Socio
    ko: 멤버스카드
    zh_simp: 会员卡
    zh_trad: 會員卡
  descriptions:
    jp_kana: "ミオシティの　やどやに　はいれる\nカード。　なぜか　５０ねんほどまえの\nひづけが　きざまれている。"
    jp_kanji: "ミオシティの　宿屋に　はいれる\nカード。　なぜか　５０年ほど前の\n日付が　刻まれている。"
    en: "A card needed for entering the inn in Canalave City.\nOddly, the last date marked on it was\n50 years ago."
    fr: "Une carte nécessaire pour entrer à l’auberge\nde Joliberges. Le dernier tampon date d’il y a 50 ans !"
    it: "Scheda che permette di entrare nella locanda\ndi Canalipoli. L’ultimo timbro risale a 50 anni fa."
    de: "Eine Eintrittskarte für den Gasthof in Fleetburg.\nSie ist über 50 Jahre alt..."
    es: "Necesario para entrar en la posada de Ciudad Canal. Es\nextraño, pero la última fecha registrada es de hace 50\naños."
    ko: "운하시티의 여관에 들어갈 수 있는\n카드. 어찌된 일인지 50년 정도 전의\n날짜가 새겨져 있다."
    zh_simp: "可以进入水脉市旅馆的卡片。\n不知为何，上面刻有\n５０年前左右的日期。"
    zh_trad: "可以進入水脈市旅館的卡片。\n不知為何，上面刻有\n５０年前左右的日期。"
mental_herb:
  names:
    jp_kana: メンタルハーブ
    jp_kanji: メンタルハーブ
    en: Mental Herb
    fr: Herbe Mental
    it: Mentalerba
    de: Mentalkraut
    es: Hierba Mental
    ko: 멘탈허브
    zh_simp: 心灵香草
    zh_trad: 心靈香草
  descriptions:
    jp_kana: "もたせた　ポケモンが　じゆうに\nわざを　だせなくなったときに\nいちどだけ　かいふくする。"
    jp_kanji: "持たせた　ポケモンが　自由に\n技を　だせなくなったときに\n１度だけ　回復する。"
    en: "An item to be held by a Pokémon. The holder\nshakes off move-binding effects to move freely.\nIt can be used only once."
    fr: "Objet à tenir. Guérit de certaines attaques limitant\nle choix des capacités.\nNe peut être utilisé qu’une fois."
    it: "Strumento monouso che guarisce il Pokémon\ndalle condizioni che gli impediscono di usare\nle sue mosse."
    de: "Ein Item, das von einem Pokémon getragen werden\nkann. Befreit den Träger einmalig von Effekten, die ihn\nvom Einsatz von Attacken abhalten."
    es: "El Pokémon que la lleva se libera del efecto de\nmovimientos que restringen sus acciones. Solo puede\nusarse una vez."
    ko: "지니게 한 포켓몬은\n헤롱헤롱 상태가 되었을 때\n한 번만 회복한다."
    zh_simp: "当携带它的宝可梦\n无法自由使出招式时，\n仅会回复１次。"
    zh_trad: "當攜帶它的寶可夢\n無法自由使出招式時，\n會僅回復１次。"
meowth_candy:
  names:
    jp_kana: ニャースのアメ
    jp_kanji: ニャースのアメ
    en: Meowth Candy
    fr: Bonbon Miaouss
    it: Caramella Meowth
    de: Mauzi-Bonbon
    es: Caramelo Meowth
    ko: 나옹의사탕
    zh_simp: 喵喵的糖果
    zh_trad: 喵喵的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
metagrossite:
  names:
    jp_kana: メタグロスナイト
    jp_kanji: メタグロスナイト
    en: Metagrossite
    fr: Métalossite
    it: Metagrossite
    de: Metagrossnit
    es: Metagrossita
    ko: 메타그로스나이트
    zh_simp: 巨金怪进化石
    zh_trad: 巨金怪進化石
  descriptions:
    jp_kana: "メタグロスに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "メタグロスに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Metagross hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Métalosse, elle lui permet\nde méga-évoluer durant un combat."
    it: "Una delle misteriose Megapietre.\nData a Metagross, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Metagross getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Metagross en combate."
    ko: "메타그로스에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让巨金怪携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓巨金怪攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
metal_coat:
  names:
    jp_kana: メタルコート
    jp_kanji: メタルコート
    en: Metal Coat
    fr: Peau Métal
    it: Metalcoperta
    de: Metallmantel
    es: Revest. Metálico
    ko: 금속코트
    zh_simp: 金属膜
    zh_trad: 金屬膜
  descriptions:
    jp_kana: "とくしゅな　きんぞくの　まく。\nもたせると　はがねタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "特殊な　金属の　膜。\n持たせると　はがねタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon. It’s a special\nmetallic film that can boost the power of\nSteel-type moves."
    fr: "Objet à tenir. Une pellicule métallique spéciale\nqui augmente la puissance des capacités de type Acier."
    it: "Strumento da dare a un Pokémon.\nSpeciale rivestimento metallico che potenzia le mosse\ndi tipo Acciaio."
    de: "Ein Item, das einem Pokémon zum Tragen gegeben\nwerden kann. Es verstärkt Attacken vom Typ Stahl."
    es: "Película metálica que fortalece los ataques de tipo\nAcero. Debe llevarlo un Pokémon."
    ko: "특수한 금속 장막.\n지니게 하면 강철타입\n기술의 위력이 올라간다."
    zh_simp: "特殊的金属膜。\n携带后，钢属性的\n招式威力就会提高。"
    zh_trad: "特殊的金屬膜。\n攜帶後，鋼屬性的\n招式威力就會提高。"
metal_powder:
  names:
    jp_kana: メタルパウダー
    jp_kanji: メタルパウダー
    en: Metal Powder
    fr: Poudre Métal
    it: Metalpolvere
    de: Metallstaub
    es: Polvo Metálico
    ko: 금속파우더
    zh_simp: 金属粉
    zh_trad: 金屬粉
  descriptions:
    jp_kana: "メタモンに　もたせると　ぼうぎょが\nあがる　ふしぎなこな。\nとても　こまかくて　かたい。"
    jp_kanji: "メタモンに　持たせると　防御が\nあがる　不思議な粉。\nとても　こまかくて　硬い。"
    en: "An item to be held by Ditto. Extremely fine yet\nhard, this odd powder boosts the Defense stat."
    fr: "Objet à faire tenir à Métamorph.\nCette poudre étrange, très fine mais résistante,\naugmente sa Défense."
    it: "Strumento da dare a Ditto.\nStrana polvere finissima e al tempo stesso dura\nche migliora la Difesa."
    de: "Ein Item, das Ditto zum Tragen gegeben werden kann.\nFein und doch hart, erhöht es den Verteidigungs-Wert."
    es: "Debe llevarlo Ditto. Es un polvo muy fino, pero a la vez\npoderoso, que aumenta su Defensa."
    ko: "메타몽에게 지니게 하면\n방어가 올라가는 이상한 가루.\n매우 잘고 단단하다."
    zh_simp: "让百变怪携带后，\n防御就会提高的神奇粉末。\n非常细腻坚硬。"
    zh_trad: "讓百變怪攜帶後，\n防禦就會提高的神奇粉末。\n非常細緻堅硬。"
meteorite:hoenn:
  names:
    jp_kana: いんせき
    jp_kanji: いんせき
    en: Meteorite
    fr: Météorite
    it: Meteorite
    de: Meteorit
    es: Meteorito
    ko: 운석
    zh_simp: 陨石
    zh_trad: 隕石
  descriptions:
    jp_kana: "もともとは　りゅうせいのたきに\nおちていた　いんせき。\nえんとつやまで　てにいれた。"
    jp_kanji: "元々は　流星の滝に\n落ちていた　いんせき。\nえんとつ山で　手に入れた。"
    en: "A Meteorite originally found at Meteor Falls.\nYou got it at Mt. Chimney."
    fr: "Une météorite qui s’est écrasée sur le Site Météore,\ntrouvée au Mont Chimnée."
    it: "Meteorite proveniente dalle Cascate Meteora.\nPuoi ottenerlo sul Monte Camino."
    de: "Ein Meteorit, der ursprünglich bei den Meteorfällen\neingeschlagen ist. Du hast ihn beim Schlotberg erhalten."
    es: "Meteorito obtenido en el Monte Cenizo que antes se\nencontraba en la Cascada Meteoro."
    ko: "원래는 유성의 폭포에\n떨어져 있던 운석이다.\n굴뚝산에서 손에 넣었다."
    zh_simp: "原本是落入流星瀑布里的陨石。\n是在烟囱山获得的。"
    zh_trad: "原為墜落在\n流星瀑布裡的隕石。\n在煙囪山得到了它。"
meteorite:hoenn_2:
  names:
    jp_kana: いんせき
    jp_kanji: いんせき
    en: Meteorite
    fr: Météorite
    it: Meteorite
    de: Meteorit
    es: Meteorito
    ko: 운석
    zh_simp: 陨石
    zh_trad: 隕石
  descriptions:
    jp_kana: "えんとつやまで　てにいれた　いんせき。\nほのかに　かがやきを　はなっている。"
    jp_kanji: "えんとつ山で　手に入れた　いんせき。\nほのかに　輝きを　放っている。"
    en: "A Meteorite that you got at Mt. Chimney. It gives off\na faint glow."
    fr: "Une météorite trouvée au Mont Chimnée.\nElle émet une légère lueur."
    it: "Meteorite ottenuto sul Monte Camino.\nEmette una debole luminescenza."
    de: "Ein Meteorit, den du beim Schlotberg erhalten hast.\nVom ihm geht ein schwaches Leuchten aus."
    es: "Meteorito obtenido en el Monte Cenizo. Desprende un\ntenue brillo."
    ko: "굴뚝산에서 손에 넣은 운석.\n은은하게 빛을 발하고 있다."
    zh_simp: "在烟囱山上获得的陨石。\n隐约散发着光辉。"
    zh_trad: "在煙囪山上獲得的隕石。\n隱約散發著光芒。"
meteorite:hoenn_3:
  names:
    jp_kana: いんせき
    jp_kanji: いんせき
    en: Meteorite
    fr: Météorite
    it: Meteorite
    de: Meteorit
    es: Meteorito
    ko: 운석
    zh_simp: 陨石
    zh_trad: 隕石
  descriptions:
    jp_kana: "えんとつやまで　てにいれた　いんせき。\nほのかな　ひかりを　はなちつづけている。\nふれると　じんわり　あたたかい。"
    jp_kanji: "えんとつ山で　手に入れた　いんせき。\nほのかな　光を　放ち続けている。\n触れると　じんわり　暖かい。"
    en: "A Meteorite that you got at Mt. Chimney.\nIt continues to give off a faint glow and is slightly\nwarm to the touch."
    fr: "Une météorite trouvée au Mont Chimnée.\nElle émet une faible lueur de façon continue,\net est légèrement tiède au toucher."
    it: "Meteorite ottenuto sul Monte Camino.\nEmette una debole luminescenza.\nToccandolo, si avverte un certo calore."
    de: "Ein Meteorit, den du beim Schlotberg erhalten hast.\nVon ihm geht ein schwaches Licht aus. Wenn man ihn\nberührt, wird er warm."
    es: "Meteorito obtenido en el Monte Cenizo. Sigue\ndesprendiendo un tenue brillo y es ligeramente cálido\nal tacto."
    ko: "굴뚝산에서 손에 넣은 운석.\n은은한 빛을 계속해서 발하고 있다.\n만지면 은근히 따뜻하다."
    zh_simp: "在烟囱山上获得的陨石。\n持续散发着微光。\n摸上去隐约有点暖暖的。"
    zh_trad: "在煙囪山上獲得的隕石。\n持續散發著微微光芒。\n摸起來有點暖暖的。"
meteorite:hoenn_4:
  names:
    jp_kana: いんせき
    jp_kanji: いんせき
    en: Meteorite
    fr: Météorite
    it: Meteorite
    de: Meteorit
    es: Meteorito
    ko: 운석
    zh_simp: 陨石
    zh_trad: 隕石
  descriptions:
    jp_kana: "えんとつやまで　てにいれた　いんせき。\nなにかの　もんようが　うかびあがり\nなないろの　ひかりが　あふれだす。"
    jp_kanji: "えんとつ山で　手に入れた　いんせき。\nなにかの　文様が　浮かび上がり\n七色の　光が　あふれだす。"
    en: "A Meteorite that you got at Mt. Chimney.\nSome sort of pattern has risen to the surface,\nand it’s shining with seven colors of light."
    fr: "Une météorite trouvée au Mont Chimnée.\nUn étrange symbole est gravé à sa surface,\net luit des sept couleurs de l’arc-en-ciel."
    it: "Meteorite ottenuto sul Monte Camino.\nSulla superficie è visibile un motivo in rilievo\nche brilla dei colori dell’arcobaleno."
    de: "Ein Meteorit, den du beim Schlotberg erhalten hast.\nEr ist seltsam gemustert und aus seinem Inneren strahlt\nein regenbogenfarbenes Licht."
    es: "Meteorito obtenido en el Monte Cenizo. Presenta unos\npeculiares grabados e irradia una luz con los siete\ncolores del arcoíris."
    ko: "굴뚝산에서 손에 넣은 운석.\n어떤 문양이 드러나며\n일곱 색깔의 빛이 넘쳐 난다."
    zh_simp: "在烟囱山上获得的陨石。\n上面浮现着某些花纹，\n并散发着七色光芒。"
    zh_trad: "在煙囪山上獲得的隕石。\n上面浮現出某種花紋，\n並流瀉著七色光芒。"
meteorite_shard:
  names:
    jp_kana: いんせきのかけら
    jp_kanji: いんせきのかけら
    en: Meteorite Shard
    fr: Éclat Météorite
    it: Framm. meteorite
    de: Meteoritenstück
    es: Frag. Meteorito
    ko: 운석조각
    zh_simp: 陨石碎片
    zh_trad: 隕石碎片
  descriptions:
    jp_kana: "いしのどうくつに　おちていた\nいんせきのかけらの　ひとつ。\nふれると　ほのかに　あたたかい。"
    jp_kanji: "石の洞窟に　落ちていた\nいんせきのかけらの　ひとつ。\n触れると　ほのかに　暖かい。"
    en: "One of the fragments of a Meteorite from\nGranite Cave. It’s faintly warm to the touch."
    fr: "L’un des fragments de météorite tombés dans\nla Grotte Granite. Il est légèrement tiède au toucher."
    it: "Frammento di meteorite trovato nella Grotta\nPietrosa. Toccandolo, si avverte un certo calore."
    de: "Eines der Meteoritenstücke aus der Granithöhle.\nWenn man es berührt, wird es ein bisschen warm."
    es: "Trozo de meteorito encontrado en el suelo de la\nCueva Granito. Es ligeramente cálido al tacto."
    ko: "바위 동굴에 떨어진\n운석조각 중의 하나.\n만지면 은근히 따뜻하다."
    zh_simp: "掉落在石之洞窟里的\n陨石碎片之一。\n摸上去有一点点暖暖的。"
    zh_trad: "掉落在石之洞窟裡的\n隕石碎片之一。\n摸起來有點暖暖的。"
metronome:
  names:
    jp_kana: メトロノーム
    jp_kanji: メトロノーム
    en: Metronome
    fr: Métronome
    it: Plessimetro
    de: Metronom
    es: Metrónomo
    ko: 메트로놈
    zh_simp: 节拍器
    zh_trad: 節拍器
  descriptions:
    jp_kana: "もたせると　おなじわざを　れんぞくで\nつかったとき　いりょくが　あがる。\nやめると　いりょくは　もどる。"
    jp_kanji: "持たせると　同じ技を　連続で\n使ったとき　威力が　あがる。\nやめると　威力は　もどる。"
    en: "An item to be held by a Pokémon. It boosts moves\nused consecutively but only until a different move\nis used."
    fr: "Objet à tenir. Booste une capacité utilisée à répétition.\nL’effet s’annule si une autre capacité est utilisée."
    it: "Strumento da dare a un Pokémon.\nPotenzia una mossa usata più volte di seguito.\nIl potenziamento svanisce al cambio di mossa."
    de: "Ein Item zum Tragen. Verstärkt eine Attacke, je öfter sie\nin Folge ausgeführt wird."
    es: "Potencia un movimiento que se use de forma\nconsecutiva. Pero el efecto se pierde si se emplea otro\nmovimiento."
    ko: "지니게 하면 똑같은 기술을 연속으로\n사용했을 때 위력이 올라간다.\n그만두면 위력이 되돌아간다."
    zh_simp: "携带后，连续使出相同招式时，\n威力就会提高。不再使出\n相同招式时，威力就会复原。"
    zh_trad: "攜帶後，連續使出相同招式時，\n威力就會提高。停止時，\n威力就會復原。"
mew_candy:
  names:
    jp_kana: ミュウのアメ
    jp_kanji: ミュウのアメ
    en: Mew Candy
    fr: Bonbon Mew
    it: Caramella Mew
    de: Mew-Bonbon
    es: Caramelo Mew
    ko: 뮤의사탕
    zh_simp: 梦幻的糖果
    zh_trad: 夢幻的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de cierto Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
mewnium_z:bag:
  names:
    jp_kana: ミュウＺ
    jp_kanji: ミュウＺ
    en: Mewnium Z
    fr: Mewzélite
    it: Mewnium Z
    de: Mewnium Z
    es: Mewstal Z
    ko: 뮤Z
    zh_simp: 梦幻Ｚ
    zh_trad: 夢幻Ｚ
  descriptions:
    jp_kana: "ミュウの　サイコキネシスを\nとくべつな　Ｚワザに　グレードアップする\nＺパワーの　けっしょうを　つくりだす。"
    jp_kanji: "ミュウの　サイコキネシスを\n特別な　Ｚワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nMew’s Psychic to an exclusive Z-Move."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise le Mew qui le tient à transformer\nson Psyko en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono a Mew di trasformare la mossa\nPsichico in una mossa Z."
    de: "Kristallisierte Z-Kraft, die Mews Attacke\nPsychokinese zu einer Z-Attacke aufstuft.\nWird bei Bedarf automatisch vervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a\nMew convertir su Psíquico en un movimiento Z."
    ko: "뮤의 사이코키네시스를\n특별한 Z기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将梦幻的精神强念\n升级成特殊Ｚ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把夢幻的精神強念\n升級為特殊Ｚ招式的Ｚ力量結晶。"
