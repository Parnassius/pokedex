kangaskhan_candy:
  names:
    jp_kana: ガルーラのアメ
    jp_kanji: ガルーラのアメ
    en: Kangaskhan Candy
    fr: Bonbon Kangourex
    it: Caramella Kangaskhan
    de: Kangama-Bonbon
    es: Caramelo Kangaskhan
    ko: 캥카의사탕
    zh_simp: 袋兽的糖果
    zh_trad: 袋獸的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
