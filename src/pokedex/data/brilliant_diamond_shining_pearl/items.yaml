  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nあたえると　ポケモン　１ひきの\nけいけんちが　ほんのすこし　ふえる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n与えると　ポケモン　１匹の\n経験値が　ほんの少し　増える。"
    en: "A candy that is packed with energy. When consumed, it\nwill grant a single Pokémon a very small amount of\nExp. Points."
    fr: "Un bonbon plein d’énergie.\nIl permet à un Pokémon de gagner un petit peu\nde Points d’Expérience."
    it: "Caramella altamente energetica che aumenta di\npochissimo i Punti Esperienza di un Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Beim Verzehr\nerhält das Pokémon eine sehr geringe Menge an\nErfahrungspunkten."
    es: "Caramelo energético que aumenta ligerísimamente los\nPuntos de Experiencia de un Pokémon."
    ko: "에너지가 가득한 사탕.\n먹이면 포켓몬 1마리의\n경험치가 아주 조금 올라간다."
    zh_simp: "充满能量的糖果。\n交给１只宝可梦后，\n可以为它增加一点点经验值。"
    zh_trad: "充滿能量的糖果。\n餵給寶可夢後，\n能讓１隻寶可夢增加些微經驗值。"
exp_charm:
  names:
    jp_kana: けいけんおまもり
    jp_kanji: けいけんおまもり
    en: Exp. Charm
    fr: Charme Exp
    it: Esperienzamuleto
    de: EP-Pin
    es: Amuleto Exp
    ko: 경험부적
    zh_simp: 经验护符
    zh_trad: 經驗護符
  descriptions:
    jp_kana: "もっていると　ポケモンが　えられる\nけいけんちが　ふえる　おまもり。\nきかいのような　ものが　はいっている。"
    jp_kanji: "持っていると　ポケモンが　得られる\n経験値が　増える　おまもり。\n機械のような　ものが　入っている。"
    en: "A charm that increases the Exp. Points that Pokémon\ncan get. A machine-like object is inside the charm."
    fr: "Un charme permettant aux Pokémon de gagner\ndavantage de Points d’Expérience. Il renferme\nune espèce de mécanisme."
    it: "Un amuleto che fa aumentare i Punti Esperienza\nche i Pokémon possono ottenere.\nPare che contenga dei componenti meccanici."
    de: "Ein Glücksbringer, der Pokémon mehr Erfahrungspunkte\nerhalten lässt. Im Inneren scheint eine Art Maschine zu\nstecken."
    es: "Amuleto que aumenta los Puntos de Experiencia que\nreciben los Pokémon. Su interior contiene una especie\nde mecanismo."
    ko: "지니고 있으면 포켓몬이 받는\n경험치가 늘어나는 부적.\n기계 같은 것이 들어 있다."
    zh_simp: "训练家拥有这个护符后，\n宝可梦获得的经验值就会增加。\n里面装有类似于机器的部件。"
    zh_trad: "只要擁有這個護符，\n寶可夢能獲得的經驗值就會增加。\n內部有類似機械的東西。"
exp_share:
  names:
    jp_kana: がくしゅうそうち
    jp_kanji: がくしゅうそうち
    en: Exp. Share
    fr: Multi Exp
    it: Condividi esp.
    de: EP-Teiler
    es: Repartir Exp
    ko: 학습장치
    zh_simp: 学习装置
    zh_trad: 學習裝置
  descriptions:
    jp_kana: "スイッチを　いれると\nてもちの　ポケモン　すべてが\nけいけんちを　もらえる　そうち。"
    jp_kanji: "スイッチを　いれると\n手持ちの　ポケモン　すべてが\n経験値を　もらえる　装置。"
    en: "Turning on this special device will allow all the Pokémon\non your team to receive Exp. Points from battles."
    fr: "Objet à activer. Permet de faire gagner des Points\nd’Expérience à tous les Pokémon de l’équipe,\nmême à ceux qui n’ont pas participé au combat."
    it: "Se attivato, tutti i Pokémon della squadra ricevono\nPunti Esperienza dalla lotta anche se non vi hanno\npartecipato."
    de: "Solange der EP-Teiler angeschaltet ist, erhält jedes\nTeam-Pokémon nach einem Sieg Erfahrungspunkte."
    es: "Al activar el dispositivo, todos los Pokémon de tu\nequipo ganan Puntos de Experiencia tras los combates,\naunque no salgan a luchar."
    ko: "스위치를 켜면\n지닌 포켓몬 모두가\n경험치를 받을 수 있는 장치."
    zh_simp: "打开开关后，\n能让同行的所有宝可梦\n获得经验值的装置。"
    zh_trad: "打開開關後，\n同行的所有寶可夢\n都可獲得經驗值的裝置。"
expert_belt:
  names:
    jp_kana: たつじんのおび
    jp_kanji: たつじんのおび
    en: Expert Belt
    fr: Ceinture Pro
    it: Abilcintura
    de: Expertengurt
    es: Cinta Experto
    ko: 달인의띠
    zh_simp: 达人带
    zh_trad: 達人帶
  descriptions:
    jp_kana: "つかいこまれた　くろい　おび。\nもたせると　こうかばつぐんの　とき\nわざの　いりょくが　すこし　あがる。"
    jp_kanji: "使いこまれた　黒い　帯。\n持たせると　効果バツグンの　とき\n技の　威力が　少し　あがる。"
    en: "An item to be held by a Pokémon. It’s a well-worn\nbelt that slightly boosts the power of\nsupereffective moves."
    fr: "Objet à tenir. Une ceinture usée qui augmente\nlégèrement la puissance des capacités super efficaces."
    it: "Strumento da dare a un Pokémon.\nCintura consumata che potenzia di poco\nle mosse superefficaci."
    de: "Ein Item zum Tragen. Dieser alte Gürtel verstärkt\nsehr effektive Attacken."
    es: "Potencia ligeramente los movimientos supereficaces.\nDebe llevarla un Pokémon."
    ko: "오래 사용한 까만 띠.\n지니게 하면 효과가 굉장할 때\n기술의 위력이 조금 올라간다."
    zh_simp: "用惯了的黑色带子。\n携带后，效果绝佳时的\n招式威力就会少量提高。"
    zh_trad: "用慣了的黑色帶子。\n攜帶後，效果絕佳時的\n招式威力就會少量提高。"
explorer_kit:
  names:
    jp_kana: たんけんセット
    jp_kanji: たんけんセット
    en: Explorer Kit
    fr: Explorakit
    it: Esplorokit
    de: Erkundungs-Set
    es: Kit Explorador
    ko: 탐험세트
    zh_simp: 探险套装
    zh_trad: 探險組合
  descriptions:
    jp_kana: "たんけんに　やくだつ　べんりな\nどうぐが　はいった　ふくろ。\nちかだいどうくつに　はいれる。"
    jp_kanji: "探検に　役立つ　便利な\n道具が　はいった　ふくろ。\n地下大洞窟に　はいれる。"
    en: "A bag filled with convenient tools for exploring.\nIt provides access to the Grand Underground."
    fr: "Un sac contenant des objets utiles à l’exploration.\nPermet d’entrer dans les Grands Souterrains."
    it: "Utilissimo kit contenente strumenti per l’esplorazione.\nPermette di accedere ai Grandi Sotterranei."
    de: "Ein Sack voller hilfreicher Items für Erkundungsgänge.\nErmöglicht den Zugang zu den Untergrundhöhlen."
    es: "Una saca donde guardar los objetos útiles para la\nexploración. Permite acceder a las Grutas del Subsuelo."
    ko: "탐험에 도움이 되는 편리한\n도구가 들어 있는 주머니.\n지하대동굴에 들어갈 수 있다."
    zh_simp: "装着有助于探险且\n方便使用的道具的袋子。\n有了它就可以进入地下大洞窟。"
    zh_trad: "裝著探險時可派上用場的\n好用道具的袋子。\n可以進入地下大洞窟。"
fairium_z:bag:
  names:
    jp_kana: フェアリーＺ
    jp_kanji: フェアリーＺ
    en: Fairium Z
    fr: Nymphézélite
    it: Follectium Z
    de: Sylphium Z
    es: Feeristal Z
    ko: 페어리Z
    zh_simp: 妖精Ｚ
    zh_trad: 妖精Ｚ
  descriptions:
    jp_kana: "フェアリータイプの　わざを\nＺワザに　グレードアップする\nＺパワーの　けっしょうを　つくりだす。"
    jp_kanji: "フェアリータイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nFairy-type moves to Fairy-type Z-Moves."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise son porteur à transformer ses capacités\nde type Fée en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono ai Pokémon di trasformare le mosse\ndi tipo Folletto in mosse Z."
    de: "Kristallisierte Z-Kraft, die Feen-Attacken zu Z-Attacken\naufstuft. Wird bei Bedarf automatisch vervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a los\nportadores convertir sus movimientos de tipo Hada en\nmovimientos Z."
    ko: "페어리타입 기술을\nZ기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将妖精属性招式升级成\nＺ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把妖精屬性招式\n升級為Ｚ招式的Ｚ力量結晶。"
fairium_z:held:
  names:
    jp_kana: フェアリーＺ
    jp_kanji: フェアリーＺ
    en: Fairium Z
    fr: Nymphézélite
    it: Follectium Z
    de: Sylphium Z
    es: Feeristal Z
    ko: 페어리Z
    zh_simp: 妖精Ｚ
    zh_trad: 妖精Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　けっしょう。\nフェアリータイプの　わざを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nフェアリータイプの　技を\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Fairy-type moves to Z-Moves."
    fr: "Une cristallisation de la Force Z, permettant\nde transformer les capacités de type Fée\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare le mosse di tipo Folletto\nin mosse Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft\nFeen-Attacken zu Z-Attacken auf."
    es: "Cristal que confiere el Poder Z a los movimientos\nde tipo Hada."
    ko: "Z파워의 결정.\n페어리타입 기술을\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将妖精属性的招式\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把妖精屬性的招式\n升級為Ｚ招式。"
fairy_gem:
  names:
    jp_kana: ようせいジュエル
    jp_kanji: ようせいジュエル
    en: Fairy Gem
    fr: Joyau Fée
    it: Bijoufolletto
    de: Feenjuwel
    es: Gema Hada
    ko: 페어리주얼
    zh_simp: 妖精宝石
    zh_trad: 妖精寶石
  descriptions:
    jp_kana: "フェアリーの　タイプの　ジュエル。\nもたせると　いちどだけ　フェアリーの\nわざの　いりょくが　つよまる。"
    jp_kanji: "フェアリーの　タイプの　ジュエル。\n持たせると　１度だけ　フェアリーの\n技の　威力が　強まる。"
    en: "A gem with an essence of the fey. When held, it\nstrengthens the power of a Fairy-type move\none time."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Fée."
    it: "Strumento da dare a un Pokémon.\nGioiello che potenzia una sola volta le mosse\ndi tipo Folletto."
    de: "Ein Juwel vom Typ Fee. Es erhöht einmalig die Stärke\neiner Attacke vom Typ Fee."
    es: "Joya de un solo uso que potencia los movimientos de\ntipo Hada. Debe llevarla un Pokémon."
    ko: "페어리타입의 주얼.\n지니게 하면 한 번만 페어리\n기술의 위력이 강해진다."
    zh_simp: "妖精属性的宝石。\n携带后，妖精属性的\n招式威力会仅增强１次。"
    zh_trad: "妖精屬性的寶石。\n攜帶後，妖精屬性的\n招式威力會僅增強１次。"
fairy_memory:
  names:
    jp_kana: フェアリーメモリ
    jp_kanji: フェアリーメモリ
    en: Fairy Memory
    fr: ROM Fée
    it: ROM Folletto
    de: Feen-Disc
    es: Disco Hada
    ko: 페어리메모리
    zh_simp: 妖精存储碟
    zh_trad: 妖精記憶碟
  descriptions:
    jp_kana: "フェアリータイプの　データが　はいった\nメモリ。　とくていの　ポケモンが\nもつと　タイプが　かわる。"
    jp_kanji: "フェアリータイプの　データが　入った\nメモリ。　特定の　ポケモンが　持つと\nタイプが　変わる。"
    en: "A memory disc that contains Fairy-type data.\nIt changes the type of the holder if held by\na certain species of Pokémon."
    fr: "Une carte mémoire contenant des données sur\nle type Fée. Un certain Pokémon peut changer\nde type en l’équipant."
    it: "ROM contenente dati sul tipo Folletto in formato\ndigitale. Permette a un certo Pokémon di cambiare\ntipo."
    de: "Eine Disc mit Daten zum Typ Fee. Sie löst bei einem\nbestimmten Pokémon einen Typenwechsel aus."
    es: "Disco de datos que contiene información relativa al tipo\nHada. Permite cambiar de tipo a cierto Pokémon."
    ko: "페어리타입의 데이터가 들어 있는\n메모리. 특정 포켓몬이\n지니면 타입이 바뀐다."
    zh_simp: "装有妖精属性数据的存储碟。\n特定宝可梦携带后，\n属性就会发生变化。"
    zh_trad: "裝有妖精屬性資料的記憶碟。\n特定寶可夢攜帶後，\n就會產生屬性的變化。"
fancy_apple:
  names:
    jp_kana: とくせんリンゴ
    jp_kanji: とくせんリンゴ
    en: Fancy Apple
    fr: Pomme Juteuse
    it: Mela prelibata
    de: Luxusapfel
    es: Manzana Selecta
    ko: 특선사과
    zh_simp: 特选苹果
    zh_trad: 特選蘋果
  descriptions:
    jp_kana: "キャンプの　りょうりに　つかう\nしょくざいの　いっしゅ。えらびぬかれた\nリンゴは　かたちもよく　ひかりかがやく。"
    jp_kanji: "キャンプの　料理に　使う\n食材の　一種。選び抜かれた\nリンゴは　形もよく　光り輝く。"
    en: "One of the many ingredients that can be used for\ncooking at your camp. An apple chosen above others.\nIt has spectacular form and a brilliant sheen."
    fr: "Un ingrédient de cuisine pour le camping.\nCette pomme a été spécialement sélectionnée\npour sa forme et sa peau brillante."
    it: "Uno degli ingredienti che puoi usare per cucinare\nin campeggio. Queste mele sono selezionate\ncon cura in base alla forma e alla lucentezza."
    de: "Eine Zutat für PokéCamping-Mahlzeiten. Diese\nhandverlesenen Exemplare sind formschön und\nglänzen wunderbar."
    es: "Un ingrediente para cocinar en el campamento. Es\nbrillante y tiene una forma perfecta."
    ko: "캠프 요리에 사용되는\n식재료 중 하나. 엄선된 사과는\n모양도 예쁘고 윤기가 돈다."
    zh_simp: "在露营营地制作料理时会使用的\n一种食材。历经千挑万选的苹果\n不仅形状饱满，表皮更是亮泽鲜艳。"
    zh_trad: "製作露營料理時使用的食材之一。\n經過嚴格挑選的蘋果，\n不但形狀漂亮，而且充滿光澤。"
farfetchd_candy:
  names:
    jp_kana: カモネギのアメ
    jp_kanji: カモネギのアメ
    en: Farfetch’d Candy
    fr: Bonbon Canarticho
    it: Caramella Farfetch’d
    de: Porenta-Bonbon
    es: Caramelo Farfetch’d
    ko: 파오리의사탕
    zh_simp: 大葱鸭的糖果
    zh_trad: 大蔥鴨的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de cierto Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
fashion_case:
  names:
    jp_kana: アクセサリーいれ
    jp_kanji: アクセサリーいれ
    en: Fashion Case
    fr: Coffret Mode
    it: Scatola Chic
    de: Modekoffer
    es: Caja Corazón
    ko: 액세서리상자
    zh_simp: 饰品盒
    zh_trad: 飾品盒
  descriptions:
    jp_kana: "ミュージカルで　ポケモンに　つける\nいろとりどりの　グッズを　たくさん\nしまえる　きれいで　すてきなケース。"
    jp_kanji: "ミュージカルで　ポケモンに　つける\nいろとりどりの　グッズを　たくさん\nしまえる　きれいで　すてきなケース。"
    en: "A lovely case to store colorful Props for your\nPokémon to wear in a musical."
    fr: "Une boîte permettant de ranger les Parures pour\nhabiller les Pokémon au Music-Hall."
    it: "Scatola bella ed elegante per conservare i gadget\nusati per agghindare i Pokémon durante\nil Pokémon Musical."
    de: "Ein schicker Koffer mit Platz für alle im Musical\nbenötigten Deko-Objekte deiner Pokémon.\nDa knittert nichts."
    es: "Una bonita cajita donde guardar todos los\nComplementos para vestir a tus Pokémon en el Teatro\nMusical."
    ko: "뮤지컬에서 포켓몬에게 다는\n각양각색의 굿즈를 많이\n넣을 수 있는 아름답고 멋진 케이스."
    zh_simp: "漂亮精美的盒子。\n可以存放宝可梦出演音乐剧时\n用来装扮自己的多种小物件。"
    zh_trad: "漂亮精美的盒子。\n可以存放多種用來裝扮\n出演音樂劇的寶可夢的小飾品。"
fast_ball:
  names:
    jp_kana: スピードボール
    jp_kanji: スピードボール
    en: Fast Ball
    fr: Speed Ball
    it: Rapid Ball
    de: Turboball
    es: Rapid Ball
    ko: 스피드볼
    zh_simp: 速度球
    zh_trad: 速度球
  descriptions:
    jp_kana: "にげあしの　はやい　ポケモンが\nつかまえやすくなる\nちょっと　かわった　ボール。"
    jp_kanji: "にげあしの　はやい　ポケモンが\n捕まえやすくなる\nちょっと　変わった　ボール。"
    en: "A Poké Ball that makes it easier to catch Pokémon\nthat are usually very quick to run away."
    fr: "Une Poké Ball un peu spéciale qui fonctionne\nparticulièrement bien sur les Pokémon qui ont\ntendance à fuir."
    it: "Poké Ball un po’ diversa che funziona particolarmente\nbene con i Pokémon bravi a scappare."
    de: "Ein Ball, der sich besonders gut eignet, um Pokémon\nzu fangen, die schnell weglaufen."
    es: "Poké Ball algo distinta, especialmente indicada para\ncapturar Pokémon evasivos."
    ko: "도주가 빠른 포켓몬이\n잡기 쉬워지는\n조금 특이한 볼."
    zh_simp: "有点与众不同的球。\n能很容易地捕捉\n逃跑速度很快的宝可梦。"
    zh_trad: "有點與眾不同的球。\n能更容易地捉到\n逃跑速度很快的寶可夢。"
favored_mail:
  names:
    jp_kana: だいすきメール
    jp_kanji: だいすきメール
    en: Favored Mail
    fr: Lettre Fan
    it: Messaggio TVB
    de: Faiblebrief
    es: Carta Favoritos
    ko: 애호메일
    zh_simp: 喜爱邮件
    zh_trad: 喜愛郵件
  descriptions:
    jp_kana: "すきなものを　つたえる　メールが\nかきやすい　びんせん。\nポケモンに　もたせて　つかう。"
    jp_kanji: "好きなものを　伝える　メールが\n書きやすい　レターペーパー。\nポケモンに　持たせて　使う。"
    en: "Stationery designed to make it easier to write about\nyour favorite things. Have a Pokémon hold it\nfor delivery."
    fr: "Un papier à lettres idéal pour parler de ce que\nl’on aime. Peut être tenu et livré par un Pokémon."
    it: "Carta da lettere ideale per parlare di ciò che\nsi ama.\nSi può dare a un Pokémon affinché la consegni."
    de: "Briefpapier, mit dem man jemandem verraten kann,\nwas man gern mag. Gib es einem Pokémon zum Tragen."
    es: "Carta para escribir sobre tus cosas favoritas. Haz que la\nentregue un Pokémon."
    ko: "좋아하는 것을 전하는 메일을\n쉽게 쓸 수 있는 편지지.\n포켓몬에게 지니게 해서 쓴다."
    zh_simp: "方便写表达自己喜好这类邮件的信纸。\n使用该道具时，\n需要让宝可梦携带着来用。"
    zh_trad: "方便寫表達自己喜好這類郵件的信紙。\n需讓寶可夢攜帶使用。"
festival_ticket:
  names:
    jp_kana: フェスチケット
    jp_kanji: フェスチケット
    en: Festival Ticket
    fr: Festicket
    it: Festicket
    de: Festival-Ticket
    es: Festicupón
    ko: 페스티켓
    zh_simp: 圆庆票
    zh_trad: 圓慶票
  descriptions:
    jp_kana: "フェスサークルで　アトラクションを\nひらくことが　できる。"
    jp_kanji: "フェスサークルで　アトラクションを\n開くことが　できる。"
    en: "A ticket that allows you to host a mission in\nFestival Plaza."
    fr: "Permet de commencer une mini-quête\nsur la Place Festival."
    it: "Biglietto che permette di dare inizio a un minigioco\nnel Festiplaza."
    de: "Ein Ticket, mit dem man auf dem Festival-Plaza\nSpektakel veranstalten kann."
    es: "Se puede canjear para organizar minijuegos en la\nFesti Plaza."
    ko: "페스서클에서 어트랙션을\n개최할 수 있다."
    zh_simp: "可以在圆庆广场\n开启游乐项目。"
    zh_trad: "可以在圓慶廣場\n開啟遊樂項目。"
fighting_gem:
  names:
    jp_kana: かくとうジュエル
    jp_kanji: かくとうジュエル
    en: Fighting Gem
    fr: Joyau Combat
    it: Bijoulotta
    de: Kampfjuwel
    es: Gema Lucha
    ko: 격투주얼
    zh_simp: 格斗宝石
    zh_trad: 格鬥寶石
  descriptions:
    jp_kana: "かくとうの　タイプの　ジュエル。\nもたせると　いちどだけ　かくとうの\nわざの　いりょくが　つよまる。"
    jp_kanji: "かくとうの　タイプの　ジュエル。\n持たせると　１度だけ　かくとうの\n技の　威力が　強まる。"
    en: "A gem with an essence of combat. When held, it\nstrengthens the power of a Fighting-type move\none time."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Combat."
    it: "Strumento da dare a un Pokémon.\nGioiello che potenzia una sola volta le mosse\ndi tipo Lotta."
    de: "Ein Juwel vom Typ Kampf. Es erhöht einmalig die Stärke\neiner Attacke vom Typ Kampf."
    es: "Joya de un solo uso que potencia los movimientos de\ntipo Lucha. Debe llevarla un Pokémon."
    ko: "격투타입의 주얼.\n지니게 하면 한 번만 격투\n기술의 위력이 강해진다."
    zh_simp: "格斗属性的宝石。\n携带后，格斗属性的\n招式威力仅会增强１次。"
    zh_trad: "格鬥屬性的寶石。\n攜帶後，格鬥屬性招式的\n威力會僅增強１次。"
fighting_memory:
  names:
    jp_kana: ファイトメモリ
    jp_kanji: ファイトメモリ
    en: Fighting Memory
    fr: ROM Combat
    it: ROM Lotta
    de: Kampf-Disc
    es: Disco Lucha
    ko: 파이팅메모리
    zh_simp: 战斗存储碟
    zh_trad: 戰鬥記憶碟
  descriptions:
    jp_kana: "かくとうタイプの　データが　はいった\nメモリ。　とくていの　ポケモンが\nもつと　タイプが　かわる。"
    jp_kanji: "かくとうタイプの　データが　入った\nメモリ。　特定の　ポケモンが　持つと\nタイプが　変わる。"
    en: "A memory disc that contains Fighting-type data.\nIt changes the type of the holder if held by\na certain species of Pokémon."
    fr: "Une carte mémoire contenant des données sur\nle type Combat. Un certain Pokémon peut changer\nde type en l’équipant."
    it: "ROM contenente dati sul tipo Lotta in formato\ndigitale. Permette a un certo Pokémon di cambiare\ntipo."
    de: "Eine Disc mit Daten zum Typ Kampf. Sie löst bei einem\nbestimmten Pokémon einen Typenwechsel aus."
    es: "Disco de datos que contiene información relativa al tipo\nLucha. Permite cambiar de tipo a cierto Pokémon."
    ko: "격투타입의 데이터가 들어 있는\n메모리. 특정 포켓몬이\n지니면 타입이 바뀐다."
    zh_simp: "装有格斗属性数据的存储碟。\n特定宝可梦携带后，\n属性就会发生变化。"
    zh_trad: "裝有格鬥屬性資料的記憶碟。\n特定寶可夢攜帶後，\n就會產生屬性的變化。"
fightinium_z:bag:
  names:
    jp_kana: カクトウＺ
    jp_kanji: カクトウＺ
    en: Fightinium Z
    fr: Combazélite
    it: Luctium Z
    de: Battalium Z
    es: Lizastal Z
    ko: 격투Z
    zh_simp: 格斗Ｚ
    zh_trad: 格鬥Ｚ
  descriptions:
    jp_kana: "かくとうタイプの　わざを\nＺワザに　グレードアップする\nＺパワーの　けっしょうを　つくりだす。"
    jp_kanji: "かくとうタイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nFighting-type moves to Fighting-type Z-Moves."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise son porteur à transformer ses capacités\nde type Combat en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono ai Pokémon di trasformare le mosse\ndi tipo Lotta in mosse Z."
    de: "Kristallisierte Z-Kraft, die Kampf-Attacken zu\nZ-Attacken aufstuft. Wird bei Bedarf automatisch\nvervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a los\nportadores convertir sus movimientos de tipo Lucha en\nmovimientos Z."
    ko: "격투타입 기술을\nZ기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将格斗属性招式升级成\nＺ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把格鬥屬性招式\n升級為Ｚ招式的Ｚ力量結晶。"
fightinium_z:held:
  names:
    jp_kana: カクトウＺ
    jp_kanji: カクトウＺ
    en: Fightinium Z
    fr: Combazélite
    it: Luctium Z
    de: Battalium Z
    es: Lizastal Z
    ko: 격투Z
    zh_simp: 格斗Ｚ
    zh_trad: 格鬥Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　けっしょう。\nかくとうタイプの　わざを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nかくとうタイプの　技を\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Fighting-type moves to Z-Moves."
    fr: "Une cristallisation de la Force Z, permettant\nde transformer les capacités de type Combat\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare le mosse di tipo Lotta\nin mosse Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft\nKampf-Attacken zu Z-Attacken auf."
    es: "Cristal que confiere el Poder Z a los movimientos\nde tipo Lucha."
    ko: "Z파워의 결정.\n격투타입 기술을\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将格斗属性的招式\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把格鬥屬性的招式\n升級為Ｚ招式。"
figy_berry:
  names:
    jp_kana: フィラのみ
    jp_kanji: フィラのみ
    en: Figy Berry
    fr: Baie Figuy
    it: Baccafico
    de: Giefebeere
    es: Baya Higog
    ko: 무화열매
    zh_simp: 勿花果
    zh_trad: 勿花果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nピンチのとき　ＨＰを　かいふくする。\nきらいな　あじだと　こんらん　する。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　ＨＰを　回復する。\nきらいな味だと　混乱する。"
    en: "If held by a Pokémon, it restores the user’s HP in a\npinch, but it will cause confusion if the user hates\nthe taste."
    fr: "Tenue, cette Baie restaure des PV en cas de besoin,\nmais rend le Pokémon confus si son goût lui déplaît."
    it: "Se un Pokémon in difficoltà ha questa bacca,\nrecupera dei PS. Se al Pokémon non piace\nil suo sapore, può causare confusione."
    de: "Als getragenes Item füllt die Beere im Notfall die KP\neines Pokémon auf, doch ihr Aroma verwirrt jene,\ndie es nicht mögen."
    es: "Los Pokémon pueden llevarla o usarla para restaurar\nalgunos PS. Su sabor puede causar confusión si no les\ngusta."
    ko: "포켓몬에게 지니게 하면\n위급할 때 HP를 회복한다.\n싫어하는 맛이면 혼란에 빠진다."
    zh_simp: "让宝可梦携带后，\n危机时可以回复ＨＰ。\n如果讨厌这味道就会混乱。"
    zh_trad: "讓寶可夢攜帶後，\n危機時可以回復ＨＰ。\n如果討厭這味道就會混亂。"
fire_gem:
  names:
    jp_kana: ほのおのジュエル
    jp_kanji: ほのおのジュエル
    en: Fire Gem
    fr: Joyau Feu
    it: Bijoufuoco
    de: Feuerjuwel
    es: Gema Fuego
    ko: 불꽃주얼
    zh_simp: 火之宝石
    zh_trad: 火之寶石
  descriptions:
    jp_kana: "ほのおの　タイプの　ジュエル。\nもたせると　いちどだけ　ほのおの\nわざの　いりょくが　つよまる。"
    jp_kanji: "ほのおの　タイプの　ジュエル。\n持たせると　１度だけ　ほのおの\n技の　威力が　強まる。"
    en: "A gem with an essence of fire. When held, it\nstrengthens the power of a Fire-type move\none time."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Feu."
    it: "Strumento da dare a un Pokémon.\nGioiello che potenzia una sola volta le mosse\ndi tipo Fuoco."
    de: "Ein Juwel vom Typ Feuer. Es erhöht einmalig die Stärke\neiner Attacke vom Typ Feuer."
    es: "Joya de un solo uso que potencia los movimientos de\ntipo Fuego. Debe llevarla un Pokémon."
    ko: "불꽃타입의 주얼.\n지니게 하면 한 번만 불꽃\n기술의 위력이 강해진다."
    zh_simp: "火属性的宝石。\n携带后，火属性的\n招式威力仅会增强１次。"
    zh_trad: "火屬性的寶石。\n攜帶後，火屬性招式的\n威力會僅增強１次。"
fire_memory:
  names:
    jp_kana: ファイヤーメモリ
    jp_kanji: ファイヤーメモリ
    en: Fire Memory
    fr: ROM Feu
    it: ROM Fuoco
    de: Feuer-Disc
    es: Disco Fuego
    ko: 파이어메모리
    zh_simp: 火焰存储碟
    zh_trad: 火焰記憶碟
  descriptions:
    jp_kana: "ほのおタイプの　データが　はいった\nメモリ。　とくていの　ポケモンが\nもつと　タイプが　かわる。"
    jp_kanji: "ほのおタイプの　データが　入った\nメモリ。　特定の　ポケモンが　持つと\nタイプが　変わる。"
    en: "A memory disc that contains Fire-type data.\nIt changes the type of the holder if held by\na certain species of Pokémon."
    fr: "Une carte mémoire contenant des données sur\nle type Feu. Un certain Pokémon peut changer\nde type en l’équipant."
    it: "ROM contenente dati sul tipo Fuoco in formato\ndigitale. Permette a un certo Pokémon di cambiare\ntipo."
    de: "Eine Disc mit Daten zum Typ Feuer. Sie löst bei einem\nbestimmten Pokémon einen Typenwechsel aus."
    es: "Disco de datos que contiene información relativa al tipo\nFuego. Permite cambiar de tipo a cierto Pokémon."
    ko: "불꽃타입의 데이터가 들어 있는\n메모리. 특정 포켓몬이\n지니면 타입이 바뀐다."
    zh_simp: "装有火属性数据的存储碟。\n特定宝可梦携带后，\n属性就会发生变化。"
    zh_trad: "裝有火屬性資料的記憶碟。\n特定寶可夢攜帶後，\n就會產生屬性的變化。"
fire_stone:
  names:
    jp_kana: ほのおのいし
    jp_kanji: ほのおのいし
    en: Fire Stone
    fr: Pierre Feu
    it: Pietrafocaia
    de: Feuerstein
    es: Piedra Fuego
    ko: 불꽃의돌
    zh_simp: 火之石
    zh_trad: 火之石
  descriptions:
    jp_kana: "ある　とくていの　ポケモンを\nしんかさせる　ふしぎな　いし。\nだいだいいろを　している。"
    jp_kanji: "ある　特定の　ポケモンを\n進化させる　不思議な　石。\nだいだい色を　している。"
    en: "A peculiar stone that can make certain species of\nPokémon evolve. The stone has a fiery orange heart."
    fr: "Une pierre étrange qui fait évoluer certaines espèces\nde Pokémon. Elle est jaune et orange."
    it: "Pietra particolare che fa evolvere determinate\nspecie di Pokémon. È gialla e arancione."
    de: "Dieser spezielle Stein löst bei bestimmten Pokémon\ndie Entwicklung aus. Er schimmert in den Farben\nOrange und Gelb."
    es: "Curiosa piedra que hace evolucionar a determinadas\nespecies de Pokémon. Es amarilla con una marca\nnaranja."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 돌.\n주황색을 띠고 있다."
    zh_simp: "能让某些特定宝可梦\n进化的神奇石头。\n看上去是橙黄色的。"
    zh_trad: "能讓特定寶可夢\n進化的神奇石頭。\n看起來是橙黃色的。"
firium_z:bag:
  names:
    jp_kana: ホノオＺ
    jp_kanji: ホノオＺ
    en: Firium Z
    fr: Pyrozélite
    it: Pirium Z
    de: Pyrium Z
    es: Pirostal Z
    ko: 불꽃Z
    zh_simp: 火Ｚ
    zh_trad: 火Ｚ
  descriptions:
    jp_kana: "ほのおタイプの　わざを\nＺワザに　グレードアップする\nＺパワーの　けっしょうを　つくりだす。"
    jp_kanji: "ほのおタイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nFire-type moves to Fire-type Z-Moves."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise son porteur à transformer ses capacités\nde type Feu en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono ai Pokémon di trasformare le mosse\ndi tipo Fuoco in mosse Z."
    de: "Kristallisierte Z-Kraft, die Feuer-Attacken zu Z-Attacken\naufstuft. Wird bei Bedarf automatisch vervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a los\nportadores convertir sus movimientos de tipo Fuego en\nmovimientos Z."
    ko: "불꽃타입 기술을\nZ기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将火属性招式升级成\nＺ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把火屬性招式\n升級為Ｚ招式的Ｚ力量結晶。"
firium_z:held:
  names:
    jp_kana: ホノオＺ
    jp_kanji: ホノオＺ
    en: Firium Z
    fr: Pyrozélite
    it: Pirium Z
    de: Pyrium Z
    es: Pirostal Z
    ko: 불꽃Z
    zh_simp: 火Ｚ
    zh_trad: 火Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　けっしょう。\nほのおタイプの　わざを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nほのおタイプの　技を\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Fire-type moves to Z-Moves."
    fr: "Une cristallisation de la Force Z, permettant\nde transformer les capacités de type Feu\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare le mosse di tipo Fuoco\nin mosse Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft\nFeuer-Attacken zu Z-Attacken auf."
    es: "Cristal que confiere el Poder Z a los movimientos\nde tipo Fuego."
    ko: "Z파워의 결정.\n불꽃타입 기술을\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将火属性的招式\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把火屬性的招式\n升級為Ｚ招式。"
fishing_rod:
  names:
    jp_kana: つりざお
    jp_kanji: つりざお
    en: Fishing Rod
    fr: Canne à Pêche
    it: Amo
    de: Angel
    es: Caña
    ko: 낚싯대
    zh_simp: 钓竿
    zh_trad: 釣竿
  descriptions:
    jp_kana: "みずの　ある　ばしょで　つかうと\nいろんな　ポケモンが　つれる。"
    jp_kanji: "水の　ある　場所で　使うと\nいろんな　ポケモンが　つれる。"
    en: Use it by the water to fish up various kinds of Pokémon.
    fr: "Une canne qui permet de pêcher divers Pokémon\nsauvages dans les points d’eau."
    it: "Permette di pescare varie specie di Pokémon\nin qualsiasi specchio d’acqua."
    de: "Setzt man sie in der Nähe von Gewässern ein, kann man\ndamit unterschiedliche Pokémon angeln."
    es: "Sirve para pescar Pokémon salvajes en todo tipo de\ncuerpos de agua."
    ko: "물이 있는 장소에서 사용하면\n다양한 포켓몬을 낚을 수 있다."
    zh_simp: "在有水的地方使用，\n就能钓到各种各样的宝可梦。"
    zh_trad: "在有水的地方使用，\n就能釣到各式各樣的寶可夢。"
fishing_rod:alola:
  names:
    jp_kana: つりざお
    jp_kanji: つりざお
    en: Fishing Rod
    fr: Canne à Pêche
    it: Amo
    de: Angel
    es: Caña
    ko: 낚싯대
    zh_simp: 钓竿
    zh_trad: 釣竿
  descriptions:
    jp_kana: "キャプテン　スイレンが　つくった\nつりざお。　いわかげに　むかって\nつかうと　ポケモンが　つれる。"
    jp_kanji: "キャプテン　スイレンが　作った\nつりざお。　岩陰に　向かって\n使うと　ポケモンが　つれる。"
    en: "A fishing rod made by Captain Lana. Cast a line\nover piles of underwater rocks to fish for wild\naquatic Pokémon."
    fr: "Une Canne à Pêche fabriquée par la Capitaine Néphie.\nPermet de pêcher les Pokémon cachés dans\nles rochers immergés."
    it: "Canna da pesca con un Amo realizzato dal\nCapitano Suiren. Permette di pescare i Pokémon\nche si nascondono sott’acqua tra le rocce."
    de: "Eine Angel, die von Captain Tracy hergestellt wurde.\nWenn sie bei Felsen im Wasser benutzt wird, kann man\ndamit Pokémon angeln."
    es: "Caña fabricada por la Capitana Nereida. Permite pescar\nlos Pokémon escondidos en las rocas sumergidas."
    ko: "캡틴 수련이 만든 낚싯대.\n바위그늘을 향해서\n사용하면 포켓몬을 낚을 수 있다."
    zh_simp: "水莲队长制作的钓竿。\n如果向着岩石阴影那边使用，\n就能钓到宝可梦。"
    zh_trad: "水蓮隊長製作的釣竿。\n如果向著岩石陰影那邊使用，\n就可以釣到寶可夢。"
fist_plate:
  names:
    jp_kana: こぶしのプレート
    jp_kanji: こぶしのプレート
    en: Fist Plate
    fr: Plaque Poing
    it: Lastrapugno
    de: Fausttafel
    es: Tabla Fuerte
    ko: 주먹플레이트
    zh_simp: 拳头石板
    zh_trad: 拳頭石板
  descriptions:
    jp_kana: "かくとうの　タイプの　せきばん。\nもたせると　かくとうタイプの\nわざの　いりょくが　つよまる。"
    jp_kanji: "かくとうの　タイプの　石盤。\n持たせると　かくとうタイプの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon. It’s a stone tablet\nthat boosts the power of Fighting-type moves."
    fr: "Objet à tenir. Une tablette en pierre augmentant\nla puissance des capacités de type Combat."
    it: "Strumento da dare a un Pokémon. Lastra di pietra che\npotenzia le mosse di tipo Lotta."
    de: "Ein Item zum Tragen. Diese Steintafel verstärkt\nAttacken vom Typ Kampf."
    es: "Tabla de piedra que potencia los movimientos de tipo\nLucha. Debe llevarla un Pokémon."
    ko: "격투타입의 석판.\n지니게 하면 격투타입\n기술의 위력이 강해진다."
    zh_simp: "格斗属性的石板。\n携带后，格斗属性的\n招式威力就会增强。"
    zh_trad: "格鬥屬性的石板。\n攜帶後，格鬥屬性的\n招式威力就會增強。"
flame_orb:
  names:
    jp_kana: かえんだま
    jp_kanji: かえんだま
    en: Flame Orb
    fr: Orbe Flamme
    it: Fiammosfera
    de: Heiß-Orb
    es: Llamasfera
    ko: 화염구슬
    zh_simp: 火焰宝珠
    zh_trad: 火焰寶珠
  descriptions:
    jp_kana: "さわると　ねつをだす　ふしぎなたま。\nもたせると　せんとうちゅうに\nやけどの　じょうたいに　なる。"
    jp_kanji: "触ると　熱をだす　不思議な玉。\n持たせると　戦闘中に\nやけどの　状態に　なる。"
    en: "An item to be held by a Pokémon. It’s a bizarre orb\nthat will afflict the holder with a burn during battle."
    fr: "Objet à tenir. Un orbe bizarre qui brûle son porteur\ndurant le combat."
    it: "Strumento da dare a un Pokémon.\nSfera bizzarra che procura una scottatura\na chi l’ha con sé in una lotta."
    de: "Ein Item zum Tragen. Dieser bizarre Orb fügt seinem\nTräger Verbrennungen zu."
    es: "Extraña esfera que causa quemaduras al Pokémon que\nla lleva en combate."
    ko: "만지면 열을 내는 이상한 구슬.\n지니게 하면 배틀 중에\n화상 상태가 된다."
    zh_simp: "触碰后会放出热量的神奇宝珠。\n携带后，在战斗时会变成灼伤状态。"
    zh_trad: "觸碰後會放出熱量的神奇寶珠。\n攜帶後，在戰鬥時\n會變成灼傷狀態。"
flame_plate:
  names:
    jp_kana: ひのたまプレート
    jp_kanji: ひのたまプレート
    en: Flame Plate
    fr: Plaque Flamme
    it: Lastrarogo
    de: Feuertafel
    es: Tabla Llama
    ko: 불구슬플레이트
    zh_simp: 火球石板
    zh_trad: 火球石板
  descriptions:
    jp_kana: "ほのおの　タイプの　せきばん。\nもたせると　ほのおタイプの\nわざの　いりょくが　つよまる。"
    jp_kanji: "ほのおの　タイプの　石盤。\n持たせると　ほのおタイプの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon. It’s a stone tablet\nthat boosts the power of Fire-type moves."
    fr: "Objet à tenir. Une tablette en pierre augmentant\nla puissance des capacités de type Feu."
    it: "Strumento da dare a un Pokémon. Lastra di pietra che\npotenzia le mosse di tipo Fuoco."
    de: "Ein Item zum Tragen. Diese Steintafel verstärkt\nAttacken vom Typ Feuer."
    es: "Tabla de piedra que potencia los movimientos de tipo\nFuego. Debe llevarla un Pokémon."
    ko: "불꽃타입의 석판.\n지니게 하면 불꽃타입\n기술의 위력이 강해진다."
    zh_simp: "火属性的石板。\n携带后，火属性的\n招式威力就会增强。"
    zh_trad: "火屬性的石板。\n攜帶後，火屬性的\n招式威力就會增強。"
float_stone:
  names:
    jp_kana: かるいし
    jp_kanji: かるいし
    en: Float Stone
    fr: Pierrallégée
    it: Pietralieve
    de: Leichtstein
    es: Piedra Pómez
    ko: 가벼운돌
    zh_simp: 轻石
    zh_trad: 輕石
  descriptions:
    jp_kana: "とても　かるい　いし。\nもたせると　ポケモンの\nたいじゅうが　かるくなる。"
    jp_kanji: "とても　軽い　石。\n持たせると　ポケモンの\n体重が　軽くなる。"
    en: "An item to be held by a Pokémon. This very light\nstone reduces the weight of a Pokémon when held."
    fr: "Objet à tenir. Une pierre très légère qui réduit le poids\ndu Pokémon qui la tient."
    it: "Pietra leggerissima che riduce il peso del\nPokémon che l’ha con sé."
    de: "Ein federleichter Stein, der das Gewicht des Trägers\nverringert."
    es: "Piedra muy ligera que reduce el peso del Pokémon que\nla lleve."
    ko: "매우 가벼운 돌.\n지니게 하면 포켓몬의\n체중이 가벼워진다."
    zh_simp: "非常轻的石头。\n携带后，宝可梦的体重会变轻。"
    zh_trad: "非常輕的石頭。\n攜帶後，寶可夢的\n體重會變輕。"
flower_sweet:
  names:
    jp_kana: おはなアメざいく
    jp_kanji: おはなアメざいく
    en: Flower Sweet
    fr: Fleur en Sucre
    it: Bonbonfiore
    de: Zucker-Blume
    es: Confite Flor
    ko: 꽃사탕공예
    zh_simp: 花朵糖饰
    zh_trad: 花朵糖飾
  descriptions:
    jp_kana: "おはなの　かたちを　した　アメざいく。\nマホミルに　もたせてあげると\nくるくる　まわって　よろこぶ。"
    jp_kanji: "おはなの　形を　した　アメ細工。\nマホミルに　持たせてあげると\nくるくる　回って　喜ぶ。"
    en: "A flower-shaped sweet. When a Milcery\nholds this, it spins around happily."
    fr: "Un bonbon en forme de fleur.\nQuand on le donne à un Crèmy, il danse de bonheur."
    it: "Bonbon a forma di fiore. Se dato a Milcery,\nil Pokémon farà le piroette per la felicità."
    de: "Zuckerwerk in Form einer Blume. Gibt man es Hokumil\nzum Tragen, dreht es sich vor Freude im Kreis."
    es: "Figura de caramelo con forma de flor. Al dárselo a\nMilcery, se pone a girar rebosante de alegría."
    ko: "꽃 모양의 사탕공예.\n마빌크에게 지니게 하면\n빙빙 돌며 기뻐한다."
    zh_simp: "花朵形状的工艺糖果。\n让小仙奶携带的话，\n会高兴地转圈圈。"
    zh_trad: "花朵形狀的工藝糖果。\n讓小仙奶攜帶的話，\n牠會高興得轉圈圈。"
fluffy_tail:
  names:
    jp_kana: エネコのシッポ
    jp_kanji: エネコのシッポ
    en: Fluffy Tail
    fr: Queue Skitty
    it: Coda Skitty
    de: Eneco-Rute
    es: Cola Skitty
    ko: 에나비꼬리
    zh_simp: 向尾喵的尾巴
    zh_trad: 向尾喵的尾巴
  descriptions:
    jp_kana: "ポケモンの　きを　ひかせる　どうぐ。\nやせいポケモンとの　せんとうから\nぜったいに　にげられる。"
    jp_kanji: "ポケモンの　気をひかせる　道具。\n野生ポケモンとの　戦闘から\n絶対に　逃げられる。"
    en: "A toy that attracts the attention of a Pokémon.\nIt guarantees escape from any battle with\nwild Pokémon."
    fr: "Un objet qui attire les Pokémon.\nPermet de s’enfuir d’un combat contre\nun Pokémon sauvage."
    it: "Strumento che attrae i Pokémon. È utile per fuggire\ndalla lotta con Pokémon selvatici."
    de: "Ein hübsches Item. Es ermöglicht die Flucht im Kampf\ngegen wilde Pokémon."
    es: "Un objeto que atrae a los Pokémon. Es útil para huir de\nun combate contra un Pokémon salvaje."
    ko: "포켓몬의 관심을 끄는 도구.\n야생 포켓몬과의 배틀에서\n반드시 도망칠 수 있다."
    zh_simp: "能吸引宝可梦注意的道具。\n在和野生宝可梦的\n战斗中绝对可以逃走。"
    zh_trad: "能吸引寶可夢注意的道具。\n在和野生寶可夢的\n戰鬥中絕對可以逃走。"
flying_gem:
  names:
    jp_kana: ひこうのジュエル
    jp_kanji: ひこうのジュエル
    en: Flying Gem
    fr: Joyau Vol
    it: Bijouvolante
    de: Flugjuwel
    es: Gema Voladora
    ko: 비행주얼
    zh_simp: 飞行宝石
    zh_trad: 飛行寶石
  descriptions:
    jp_kana: "ひこうの　タイプの　ジュエル。\nもたせると　いちどだけ　ひこうの\nわざの　いりょくが　つよまる。"
    jp_kanji: "ひこうの　タイプの　ジュエル。\n持たせると　１度だけ　ひこうの\n技の　威力が　強まる。"
    en: "A gem with an essence of air. When held, it\nstrengthens the power of a Flying-type move\none time."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Vol."
    it: "Strumento da dare a un Pokémon.\nGioiello che potenzia una sola volta le mosse\ndi tipo Volante."
    de: "Ein Juwel vom Typ Flug. Es erhöht einmalig die Stärke\neiner Attacke vom Typ Flug."
    es: "Joya de un solo uso que potencia los movimientos de\ntipo Volador. Debe llevarla un Pokémon."
    ko: "비행타입의 주얼.\n지니게 하면 한 번만 비행\n기술의 위력이 강해진다."
    zh_simp: "飞行属性的宝石。\n携带后，飞行属性的\n招式威力仅会增强１次。"
    zh_trad: "飛行屬性的寶石。\n攜帶後，飛行屬性招式的\n威力會僅增強１次。"
flying_memory:
  names:
    jp_kana: フライングメモリ
    jp_kanji: フライングメモリ
    en: Flying Memory
    fr: ROM Vol
    it: ROM Volante
    de: Flug-Disc
    es: Disco Volador
    ko: 플라잉메모리
    zh_simp: 飞翔存储碟
    zh_trad: 飛翔記憶碟
  descriptions:
    jp_kana: "ひこうタイプの　データが　はいった\nメモリ。　とくていの　ポケモンが\nもつと　タイプが　かわる。"
    jp_kanji: "ひこうタイプの　データが　入った\nメモリ。　特定の　ポケモンが　持つと\nタイプが　変わる。"
    en: "A memory disc that contains Flying-type data.\nIt changes the type of the holder if held by\na certain species of Pokémon."
    fr: "Une carte mémoire contenant des données sur\nle type Vol. Un certain Pokémon peut changer\nde type en l’équipant."
    it: "ROM contenente dati sul tipo Volante in formato\ndigitale. Permette a un certo Pokémon di cambiare\ntipo."
    de: "Eine Disc mit Daten zum Typ Flug. Sie löst bei einem\nbestimmten Pokémon einen Typenwechsel aus."
    es: "Disco de datos que contiene información relativa al tipo\nVolador. Permite cambiar de tipo a cierto Pokémon."
    ko: "비행타입의 데이터가 들어 있는\n메모리. 특정 포켓몬이\n지니면 타입이 바뀐다."
    zh_simp: "装有飞行属性数据的存储碟。\n特定宝可梦携带后，\n属性就会发生变化。"
    zh_trad: "裝有飛行屬性資料的記憶碟。\n特定寶可夢攜帶後，\n就會產生屬性的變化。"
flyinium_z:bag:
  names:
    jp_kana: ヒコウＺ
    jp_kanji: ヒコウＺ
    en: Flyinium Z
    fr: Aérozélite
    it: Volantium Z
    de: Aerium Z
    es: Aerostal Z
    ko: 비행Z
    zh_simp: 飞行Ｚ
    zh_trad: 飛行Ｚ
  descriptions:
    jp_kana: "ひこうタイプの　わざを\nＺワザに　グレードアップする\nＺパワーの　けっしょうを　つくりだす。"
    jp_kanji: "ひこうタイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nFlying-type moves to Flying-type Z-Moves."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise son porteur à transformer ses capacités\nde type Vol en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono ai Pokémon di trasformare le mosse\ndi tipo Volante in mosse Z."
    de: "Kristallisierte Z-Kraft, die Flug-Attacken zu Z-Attacken\naufstuft. Wird bei Bedarf automatisch vervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a los\nportadores convertir sus movimientos de tipo Volador\nen movimientos Z."
    ko: "비행타입 기술을\nZ기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将飞行属性招式升级成\nＺ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把飛行屬性招式\n升級為Ｚ招式的Ｚ力量結晶。"
flyinium_z:held:
  names:
    jp_kana: ヒコウＺ
    jp_kanji: ヒコウＺ
    en: Flyinium Z
    fr: Aérozélite
    it: Volantium Z
    de: Aerium Z
    es: Aerostal Z
    ko: 비행Z
    zh_simp: 飞行Ｚ
    zh_trad: 飛行Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　けっしょう。\nひこうタイプの　わざを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nひこうタイプの　技を\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Flying-type moves to Z-Moves."
    fr: "Une cristallisation de la Force Z, permettant\nde transformer les capacités de type Vol\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare le mosse di tipo Volante\nin mosse Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft\nFlug-Attacken zu Z-Attacken auf."
    es: "Cristal que confiere el Poder Z a los movimientos\nde tipo Volador."
    ko: "Z파워의 결정.\n비행타입 기술을\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将飞行属性的招式\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把飛行屬性的招式\n升級為Ｚ招式。"
focus_band:
  names:
    jp_kana: きあいのハチマキ
    jp_kanji: きあいのハチマキ
    en: Focus Band
    fr: Bandeau
    it: Bandana
    de: Fokusband
    es: Cinta Focus
    ko: 기합의머리띠
    zh_simp: 气势头带
    zh_trad: 氣勢頭帶
  descriptions:
    jp_kana: "もたせると　ひんしに　なりそうな\nわざを　うけても　ＨＰを　１だけ\nのこして　たえることが　ある。"
    jp_kanji: "持たせると　ひんしに　なりそうな\n技を　受けても　ＨＰを　１だけ\n残して　耐えることが　ある。"
    en: "An item to be held by a Pokémon. The holder may\nendure a potential KO attack, leaving it with just\n1 HP."
    fr: "Objet à tenir pouvant parfois empêcher d’être mis K.O.,\nne laissant qu’un seul PV."
    it: "Strumento da dare a un Pokémon.\nChi ce l’ha può evitare un potenziale KO e rimanere\ncon un solo PS."
    de: "Ein Item, das die Kampfunfähigkeit verhindern kann,\nda dem Träger 1 KP bleibt."
    es: "El Pokémon que la lleva puede resistir un golpe que\npotencialmente lo dejaría KO y se queda con 1 PS."
    ko: "지니게 하면\n기절할 듯한 기술로 공격받아도\nHP를 1 남겨서 견디기도 한다."
    zh_simp: "携带后，即便受到\n可能会导致昏厥的招式，\n有时也能仅以１ＨＰ撑过去。"
    zh_trad: "攜帶後，即便受到\n可能會導致瀕死的招式，\n有時也能僅以１ＨＰ撐過去。"
focus_sash:
  names:
    jp_kana: きあいのタスキ
    jp_kanji: きあいのタスキ
    en: Focus Sash
    fr: Ceinture Force
    it: Focalnastro
    de: Fokusgurt
    es: Banda Focus
    ko: 기합의띠
    zh_simp: 气势披带
    zh_trad: 氣勢披帶
  descriptions:
    jp_kana: "もたせると　ＨＰが　まんたんのとき\nひんしになりそうな　わざを　うけても\nＨＰ１で　いちどだけ　たえる。"
    jp_kanji: "持たせると　ＨＰが　満タンのとき\nひんしになりそうな　技を　受けても\nＨＰ１で　１度だけ　耐える。"
    en: "An item to be held by a Pokémon. If the holder has\nfull HP, it will endure a potential KO attack with\n1 HP. The item then disappears."
    fr: "Objet à tenir. S’il a encore tous ses PV, le porteur\npourra éviter d’être mis K.O. en un coup.\nIl ne conservera alors qu’un seul PV."
    it: "Strumento da dare a un Pokémon.\nSe il Pokémon ha tutti i PS, eviterà un\npotenziale KO, rimanendo con un PS."
    de: "Ein Item zum Tragen. Bei vollen KP bleibt der Träger\nnach einer K.O.-Attacke einmalig mit 1 KP im Kampf."
    es: "Si el Pokémon que la lleva tiene los PS al máximo,\npuede resistir un golpe que lo dejaría KO y se queda\ncon 1 PS."
    ko: "지니게 하면 HP가 꽉 찼을 때\n기절할 듯한 기술로 공격받아도\nHP 1로 한 번은 버틴다."
    zh_simp: "携带后，在ＨＰ全满时，\n即便受到可能会导致昏厥的招式，\n也能仅以１ＨＰ撑过去１次。"
    zh_trad: "攜帶後，在ＨＰ全滿時，\n即使受到可能導致瀕死的招式攻擊，\n也能以１ＨＰ撐過１次。"
forage_bag:
  names:
    jp_kana: ざいりょうぶくろ
    jp_kanji: ざいりょうぶくろ
    en: Forage Bag
    fr: Sac Ingrédients
    it: Portaingredienti
    de: Zutatenbeutel
    es: Zurrón
    ko: 재료주머니
    zh_simp: 材料袋
    zh_trad: 材料袋
  descriptions:
    jp_kana: "ジャングルで　あつめた\nざいりょうを　まとめておく　ふくろ。\nマオのしれんで　つかう。"
    jp_kanji: "ジャングルで　集めた\n材料を　まとめておく　ふくろ。\nマオの試練で　使う。"
    en: "A bag to carry ingredients gathered during Mallow’s\ntrial in the jungle."
    fr: "Un sac pour mettre les ingrédients récoltés dans\nla jungle, utilisé dans l’Épreuve de Barbara."
    it: "Sacchetto in cui mettere gli ingredienti trovati nella\nGiungla Ombrosa, necessari per la prova di Ibis."
    de: "Ein Beutel zum Aufbewahren der Zutaten, die man im\nDschungel sammelt. Er wird bei Mahos Prüfung benutzt."
    es: "Saco para guardar ingredientes, indispensable en la\nJungla Umbría para superar la prueba de Lulú."
    ko: "정글에서 모은\n재료를 모아 두는 주머니.\n마오의 시련에서 사용한다."
    zh_simp: "将丛林里收集到的材料\n装在一起的袋子。\n在玛奥的考验中使用。"
    zh_trad: "把叢林裡收集到的材料\n放在一起的袋子。\n會在瑪奧的考驗中使用。"
fossilized_bird:
  names:
    jp_kana: カセキのトリ
    jp_kanji: カセキのトリ
    en: Fossilized Bird
    fr: Fossile Oiseau
    it: Ornitofossile
    de: Vogelfossil
    es: Ornitofósil
    ko: 화석새
    zh_simp: 化石鸟
    zh_trad: 化石鳥
  descriptions:
    jp_kana: "おおむかし　そらを　とんでいた\nこだい　ポケモンの　カセキの　いちぶ。\nどんな　すがた　だったのかは　なぞ。"
    jp_kanji: "大昔　空を　飛んでいた\n古代　ポケモンの　カセキの一部。\nどんな　姿　だったのかは　謎。"
    en: "The fossil of an ancient Pokémon that once soared\nthrough the sky. What it looked like is a mystery."
    fr: "Un morceau du fossile d’un ancien Pokémon volant.\nNul ne sait à quoi il ressemblait."
    it: "Parte del fossile di un Pokémon preistorico che solcava\ni cieli. Nessuno sa quale fosse il suo aspetto."
    de: "Teilstück des Fossils eines urzeitlichen Pokémon,\ndas in grauer Vorzeit durch die Lüfte flog. Wie es\nzu Lebzeiten aussah, ist ein Rätsel."
    es: "Parte del fósil de un Pokémon prehistórico que surcaba\nlos cielos. Su apariencia sigue siendo una incógnita."
    ko: "오랜 옛날 하늘을 날던\n고대 포켓몬 화석의 일부.\n어떤 모습이었는지는 수수께끼다."
    zh_simp: "远古时代的宝可梦化石残片。\n它曾翱翔于天空，\n本来面目至今仍是未解之谜。"
    zh_trad: "很久以前曾翱翔天際的\n古代寶可夢的化石碎片。\n本來面目至今仍是個謎。"
fossilized_dino:
  names:
    jp_kana: カセキのクビナガ
    jp_kanji: カセキのクビナガ
    en: Fossilized Dino
    fr: Fossile Aileron
    it: Plesiofossile
    de: Paddelfossil
    es: Plesiofósil
    ko: 화석긴목
    zh_simp: 化石海兽
    zh_trad: 化石海獸
  descriptions:
    jp_kana: "おおむかし　うみに　すんでいた\nこだい　ポケモンの　カセキの　いちぶ。\nどんな　すがた　だったのかは　なぞ。"
    jp_kanji: "大昔　海に　すんでいた\n古代　ポケモンの　カセキの一部。\nどんな　姿　だったのかは　謎。"
    en: "The fossil of an ancient Pokémon that once lived in the\nsea. What it looked like is a mystery."
    fr: "Un morceau du fossile d’un ancien Pokémon aquatique.\nNul ne sait à quoi il ressemblait."
    it: "Parte del fossile di un Pokémon preistorico che viveva\nin mare. Nessuno sa quale fosse il suo aspetto."
    de: "Teilstück des Fossils eines urzeitlichen Pokémon,\ndas in grauer Vorzeit im Meer lebte. Wie es zu\nLebzeiten aussah, ist ein Rätsel."
    es: "Parte del fósil de un Pokémon prehistórico que habitaba\nen el mar. Su apariencia sigue siendo una incógnita."
    ko: "오랜 옛날 바다에 살았던\n고대 포켓몬 화석의 일부.\n어떤 모습이었는지는 수수께끼다."
    zh_simp: "远古时代的宝可梦化石残片。\n它曾栖息于大海，\n本来面目至今仍是未解之谜。"
    zh_trad: "很久以前棲息在海裡的\n古代寶可夢的化石碎片。\n本來面目至今仍是個謎。"
fossilized_drake:
  names:
    jp_kana: カセキのリュウ
    jp_kanji: カセキのリュウ
    en: Fossilized Drake
    fr: Fossile Dragon
    it: Dracofossile
    de: Drachenfossil
    es: Dracofósil
    ko: 화석용
    zh_simp: 化石龙
    zh_trad: 化石龍
  descriptions:
    jp_kana: "おおむかし　りくに　すんでいた\nこだい　ポケモンの　カセキの　いちぶ。\nどんな　すがた　だったのかは　なぞ。"
    jp_kanji: "大昔　陸に　すんでいた\n古代　ポケモンの　カセキの一部。\nどんな　姿　だったのかは　謎。"
    en: "The fossil of an ancient Pokémon that once roamed the\nland. What it looked like is a mystery."
    fr: "Un morceau du fossile d’un ancien Pokémon terrestre.\nNul ne sait à quoi il ressemblait."
    it: "Parte del fossile di un Pokémon preistorico che viveva\nsulla terraferma. Nessuno sa quale fosse il suo aspetto."
    de: "Teilstück des Fossils eines urzeitlichen Pokémon,\ndas in grauer Vorzeit das Land bevölkerte. Wie es\nzu Lebzeiten aussah, ist ein Rätsel."
    es: "Parte del fósil de un Pokémon prehistórico que habitaba\nen tierra firme. Su aspecto sigue siendo una incógnita."
    ko: "오랜 옛날 육지에 살았던\n고대 포켓몬 화석의 일부.\n어떤 모습이었는지는 수수께끼다."
    zh_simp: "远古时代的宝可梦化石残片。\n它曾栖息于陆地，\n本来面目至今仍是未解之谜。"
    zh_trad: "很久以前棲息在陸地的\n古代寶可夢的化石碎片。\n本來面目至今仍是個謎。"
fossilized_fish:
  names:
    jp_kana: カセキのサカナ
    jp_kanji: カセキのサカナ
    en: Fossilized Fish
    fr: Fossile Poisson
    it: Ittiofossile
    de: Fischfossil
    es: Ictiofósil
    ko: 화석물고기
    zh_simp: 化石鱼
    zh_trad: 化石魚
  descriptions:
    jp_kana: "おおむかし　うみに　すんでいた\nこだい　ポケモンの　カセキの　いちぶ。\nどんな　すがた　だったのかは　なぞ。"
    jp_kanji: "大昔　海に　すんでいた\n古代　ポケモンの　カセキの一部。\nどんな　姿　だったのかは　謎。"
    en: "The fossil of an ancient Pokémon that once lived in the\nsea. What it looked like is a mystery."
    fr: "Un morceau du fossile d’un ancien Pokémon aquatique.\nNul ne sait à quoi il ressemblait."
    it: "Parte del fossile di un Pokémon preistorico che viveva\nin mare. Nessuno sa quale fosse il suo aspetto."
    de: "Teilstück des Fossils eines urzeitlichen Pokémon,\ndas in grauer Vorzeit im Meer lebte. Wie es zu\nLebzeiten aussah, ist ein Rätsel."
    es: "Parte del fósil de un Pokémon prehistórico que habitaba\nen el mar. Su apariencia sigue siendo una incógnita."
    ko: "오랜 옛날 바다에 살았던\n고대 포켓몬 화석의 일부.\n어떤 모습이었는지는 수수께끼다."
    zh_simp: "远古时代的宝可梦化石残片。\n它曾栖息于大海，\n本来面目至今仍是未解之谜。"
    zh_trad: "很久以前棲息在海裡的\n古代寶可夢的化石碎片。\n本來面目至今仍是個謎。"
fresh_cream:
  names:
    jp_kana: しんせんクリーム
    jp_kanji: しんせんクリーム
    en: Fresh Cream
    fr: Crème Fraîche
    it: Panna da cucina
    de: Frische Sahne
    es: Nata Fresca
    ko: 신선한크림
    zh_simp: 鲜鲜奶油
    zh_trad: 鮮鮮奶油
  descriptions:
    jp_kana: "キャンプの　りょうりに　つかう\nしょくざいの　いっしゅ。からい　カレーに\nホイップを　たすことで　あまくする。"
    jp_kanji: "キャンプの　料理に　使う\n食材の　一種。辛い　カレーに\nホイップを　足すことで　甘くする。"
    en: "One of the many ingredients that can be used for\ncooking at your camp. Add some whipped cream to a\nspicy curry to give it some sweetness."
    fr: "Un ingrédient de cuisine pour le camping.\nEn fouettant cette crème, elle peut être ajoutée\nà un curry pour y apporter de la douceur."
    it: "Uno degli ingredienti che puoi usare per cucinare\nin campeggio. Si può aggiungere a un curry\npiccante per renderlo più dolce."
    de: "Eine Zutat für PokéCamping-Mahlzeiten. Gibt man in\nein pikantes Curry ein bisschen Schlagsahne, wird es\ndadurch cremig und süß."
    es: "Un ingrediente para cocinar en el campamento. La nata\nda un toque dulce a la salsa picante del curri."
    ko: "캠프 요리에 사용되는\n식재료 중 하나. 매운 카레에\n휘핑크림을 넣으면 달콤해진다."
    zh_simp: "在露营营地制作料理时会使用的\n一种食材。在辣味的咖喱中\n加入奶油，使滋味变得香甜可口。"
    zh_trad: "製作露營料理時使用的食材之一。\n辛辣的咖哩中加入鮮奶油，\n能使味道變得香甜。"
fresh_water:
  names:
    jp_kana: おいしいみず
    jp_kanji: おいしいみず
    en: Fresh Water
    fr: Eau Fraîche
    it: Acqua fresca
    de: Tafelwasser
    es: Agua Fresca
    ko: 맛있는물
    zh_simp: 美味之水
    zh_trad: 美味之水
  descriptions:
    jp_kana: "ミネラル　たっぷりの　みず。\nポケモン　１ひきの　ＨＰを\n３０だけ　かいふくする。"
    jp_kanji: "ミネラル　たっぷりの　水。\nポケモン　１匹の　ＨＰを\n３０だけ　回復する。"
    en: "Water with high mineral content. It can be used to\nrestore 30 HP to a single Pokémon."
    fr: "Une eau riche en minéraux.\nRestaure 30 PV d’un Pokémon."
    it: "Acqua ricca di sostanze minerali.\nRestituisce 30 PS a un Pokémon."
    de: "Ein stilles Wasser mit hohem Mineralienanteil, das die\nKP eines Pokémon um 30 Punkte auffüllt."
    es: "Agua de alto contenido mineral que restaura 30 PS de\nun Pokémon."
    ko: "미네랄이 가득한 물.\n포켓몬 1마리의 HP를\n30만큼 회복한다."
    zh_simp: "富含矿物质的水。\n能让１只宝可梦\n回复３０ＨＰ。"
    zh_trad: "含有豐富礦物質的水。\n能讓１隻寶可夢\n回復３０ＨＰ。"
fried_food:
  names:
    jp_kana: フライもりあわせ
    jp_kanji: フライもりあわせ
    en: Fried Food
    fr: Fritures
    it: Fritto misto
    de: Frittiertes
    es: Frituras
    ko: 모둠튀김
    zh_simp: 炸物拼盘
    zh_trad: 炸物拼盤
  descriptions:
    jp_kana: "キャンプの　りょうりに　つかう\nしょくざいの　いっしゅ。あげてから\nじかんがたつので　すこし　あぶらっこい。"
    jp_kanji: "キャンプの　料理に　使う\n食材の　一種。揚げてから\n時間がたつので　少し　油っこい。"
    en: "One of the many ingredients that can be used for\ncooking at your camp. It’s been a while since it was\nfried, so it’s gotten greasy."
    fr: "Un ingrédient de cuisine pour le camping.\nCes fritures sont sorties de la friteuse depuis\nun moment déjà, et l’huile a commencé à couler."
    it: "Uno degli ingredienti che puoi usare per cucinare\nin campeggio. È passato del tempo dal momento\ndella frittura, per cui è un po’ untuoso."
    de: "Eine Zutat für PokéCamping-Mahlzeiten. Diese Beilagen\nsind recht fettig, da sie schon vor einer Weile aus der\nFritteuse geholt wurden."
    es: "Un ingrediente para cocinar en el campamento. A\nmedida que pasa el tiempo se van volviendo más\naceitosas."
    ko: "캠프 요리에 사용되는\n식재료 중 하나. 튀기고\n시간이 좀 지나서 살짝 느끼하다."
    zh_simp: "在露营营地制作料理时会使用的\n一种食材。炸完出锅后\n放置了一段时间，所以稍稍有些油腻。"
    zh_trad: "製作露營料理時使用的食材之一。\n已經炸好一段時間，\n所以有點油膩。"
friend_ball:
  names:
    jp_kana: フレンドボール
    jp_kanji: フレンドボール
    en: Friend Ball
    fr: Copain Ball
    it: Friend Ball
    de: Freundesball
    es: Amigo Ball
    ko: 프렌드볼
    zh_simp: 友友球
    zh_trad: 友友球
  descriptions:
    jp_kana: "つかまえた　やせいポケモンが\nすぐに　なついて　くれる\nちょっと　かわった　ボール。"
    jp_kanji: "捕まえた　野生ポケモンが\nすぐに　なついて　くれる\nちょっと　変わった　ボール。"
    en: "A strange Poké Ball that will make the wild\nPokémon caught with it more friendly toward\nyou immediately."
    fr: "Une Poké Ball un peu spéciale qui permet de rendre\nrapidement amicaux les Pokémon sauvages attrapés\navec celle-ci."
    it: "Poké Ball un po’ diversa che fa sì che i Pokémon\nselvatici con essa catturati si affezionino\npiù rapidamente."
    de: "Ein besonderer Ball, der die Sympathie von\ngefangenen Pokémon sofort ansteigen lässt."
    es: "Poké Ball algo distinta que hace más amistosos a los\nPokémon salvajes que se capturan con ella."
    ko: "잡은 야생 포켓몬이\n바로 친밀해지는\n조금 특이한 볼."
    zh_simp: "有点与众不同的球。\n捉到的野生宝可梦会立刻\n变得和训练家亲密起来。"
    zh_trad: "有點與眾不同的球。\n捉到的野生寶可夢會立刻\n和訓練家變得親密。"
fruit_bunch:
  names:
    jp_kana: フサパック
    jp_kanji: フサパック
    en: Fruit Bunch
    fr: Fruits
    it: Frutti
    de: Früchte
    es: Fruta Tropical
    ko: 송이팩
    zh_simp: 袋装果实
    zh_trad: 袋裝果實
  descriptions:
    jp_kana: "キャンプの　りょうりに　つかう\nしょくざいの　いっしゅ。トロトロに　なった\nフサが　トロピカルきぶんに　させてくれる。"
    jp_kanji: "キャンプの　料理に　使う\n食材の　一種。トロトロに　なった\nフサが　トロピカル気分に　させてくれる。"
    en: "One of the many ingredients that can be used for\ncooking at your camp. The syrupy fruits give off a strong\ntropical feel."
    fr: "Un ingrédient de cuisine pour le camping.\nLes fruits écrasés donnent un parfum tropical\nà toute préparation."
    it: "Uno degli ingredienti che puoi usare per cucinare\nin campeggio. La loro polpa conferisce alle pietanze\nun sapore tropicale."
    de: "Eine Zutat für PokéCamping-Mahlzeiten. Die weichen\nFrüchte verleihen dem Essen eine tropische Note."
    es: "Un ingrediente para cocinar en el campamento. La\njugosa fruta aporta un toque tropical al plato."
    ko: "캠프 요리에 사용되는\n식재료 중 하나. 걸쭉해진 송이가\n열대지방의 기분을 느끼게 해 준다."
    zh_simp: "在露营营地制作料理时会使用的\n一种食材。煮得粘稠浓厚的水果，\n能为料理增添一份热带风情。"
    zh_trad: "製作露營料理時使用的食材之一。\n煮得黏糊糊的果實能為料理\n帶來一份熱帶風情。"
full_heal:
  names:
    jp_kana: なんでもなおし
    jp_kanji: なんでもなおし
    en: Full Heal
    fr: Total Soin
    it: Cura totale
    de: Hyperheiler
    es: Cura Total
    ko: 만병통치제
    zh_simp: 万灵药
    zh_trad: 萬靈藥
  descriptions:
    jp_kana: "スプレーしきの　くすり。\nポケモン　１ひきの　じょうたいの\nいじょうを　すべて　かいふくする。"
    jp_kanji: "スプレー式の　薬。\nポケモン　１匹の　状態の\n異常を　すべて　回復する。"
    en: "A spray-type medicine that is broadly effective.\nIt can be used to heal all the status conditions\nof a single Pokémon."
    fr: "Un médicament sous forme de spray.\nSoigne toutes les altérations de statut d’un Pokémon."
    it: "Rimedio spray.\nCura tutti i problemi di stato di un Pokémon."
    de: "Ein Spray, das alle Statusprobleme eines Pokémon\nbehebt."
    es: "Medicina en espray que cura todos los problemas de\nestado de un Pokémon."
    ko: "스프레이식의 약.\n포켓몬 1마리의\n상태 이상을 모두 회복한다."
    zh_simp: "喷雾式药水。\n能治愈１只宝可梦的\n所有异常状态。"
    zh_trad: "噴霧式藥水。\n能治癒１隻寶可夢的\n所有異常狀態。"
full_incense:
  names:
    jp_kana: まんぷくおこう
    jp_kanji: まんぷくおこう
    en: Full Incense
    fr: Encens Plein
    it: Gonfioaroma
    de: Lahmrauch
    es: Incienso Lento
    ko: 만복향로
    zh_simp: 饱腹薰香
    zh_trad: 飽腹薰香
  descriptions:
    jp_kana: "ふしぎな　かおりの　おこう。\nもたせた　ポケモンは　いつもより\nこうどうが　おそくなる。"
    jp_kanji: "不思議な　香りの　御香。\n持たせた　ポケモンは　いつもより\n行動が　遅くなる。"
    en: "An item to be held by a Pokémon.\nThis exotic-smelling incense makes the\nholder bloated and slow moving."
    fr: "Objet à tenir. Un encens au parfum exotique\nqui fait enfler son porteur et le fait se déplacer\nlentement."
    it: "Strumento da dare a un Pokémon.\nIncenso dal profumo esotico che rende gonfi e lenti."
    de: "Ein Item zum Tragen. Dieses exotische Duftkraut\nmacht den Träger benommen und langsam."
    es: "Incienso de exótico aroma que hace que el Pokémon\nque lo lleve esté aturdido y se mueva más despacio."
    ko: "이상한 향기의 향로.\n지니게 한 포켓몬은 여느 때보다\n행동이 느려진다."
    zh_simp: "有着神奇香气的薰香。\n携带后，宝可梦的行动\n会比平时更加迟缓。"
    zh_trad: "有著神奇香氣的薰香。\n攜帶它的寶可夢\n行動會比平時更加緩慢。"
full_restore:
  names:
    jp_kana: かいふくのくすり
    jp_kanji: かいふくのくすり
    en: Full Restore
    fr: Guérison
    it: Ricarica totale
    de: Top-Genesung
    es: Restaurar Todo
    ko: 회복약
    zh_simp: 全复药
    zh_trad: 全復藥
  descriptions:
    jp_kana: "ポケモン　１ひきの　ＨＰと\nじょうたい　いじょうを　すべて\nかいふくする。"
    jp_kanji: "ポケモン　１匹の　ＨＰと\n状態異常を　すべて\n回復する。"
    en: "A spray-type medicine that can be used to fully restore\nthe HP of a single Pokémon and heal any status\nconditions it has."
    fr: "Un médicament qui restaure tous les PV d’un Pokémon\net soigne toutes ses altérations de statut."
    it: "Rimedio che restituisce tutti i PS a un Pokémon\ne cura i suoi problemi di stato."
    de: "Dieses Item stellt alle KP eines Pokémon wieder her\nund behebt alle Statusprobleme."
    es: "Medicina que restaura todos los PS y cura todos los\nproblemas de estado de un Pokémon."
    ko: "포켓몬 1마리의 HP와\n상태 이상을 모두\n회복한다."
    zh_simp: "能回复１只宝可梦的\n所有ＨＰ并治愈所有异常状态。"
    zh_trad: "能回復１隻寶可夢的\n所有ＨＰ並治癒所有\n異常狀態。"
galactic_key:
  names:
    jp_kana: ギンガだんのカギ
    jp_kanji: ギンガだんのカギ
    en: Galactic Key
    fr: Clé Galaxie
    it: Chiave Galassia
    de: G-Schlüssel
    es: Llave Galaxia
    ko: 갤럭시단의열쇠
    zh_simp: 银河队钥匙
    zh_trad: 銀河隊鑰匙
  descriptions:
    jp_kana: "ギンガだんアジトの　セキュリティを\nかいじょ　するための　カードキー。\nなくすと　おしおき　されるらしい。"
    jp_kanji: "ギンガ団アジトの　セキュリティを\n解除するための　カードキー。\nなくすと　おしおき　されるらしい。"
    en: "A card key for disengaging the security systems in\nthe Galactic HQ. Losing it can result in\npunishment, apparently."
    fr: "Une clé magnétique servant à désactiver les systèmes\nde sécurité du QG de la Team Galaxie. La perdre\nsemble entraîner une lourde punition."
    it: "Chiave a scheda per disattivare i sistemi di sicurezza\nnel Covo del Team Galassia. Se la si perde, si viene\npuniti."
    de: "Diese Schlüsselkarte deaktiviert die Sicherheitssysteme\nin der Galaktik-Zentrale. Wer sie verliert, muss mit einer\nStrafe rechnen."
    es: "Desactiva los sistemas de seguridad de la Base Galaxia.\nPor lo visto, perder esta tarjeta se castiga severamente."
    ko: "갤럭시단아지트의 보안을\n해제하기 위한 카드키다.\n잃어버리면 벌을 받는 듯하다."
    zh_simp: "用于解除银河队基地\n安全防范系统的钥匙卡。\n弄丢了的话，好像会受到惩罚。"
    zh_trad: "用於解除銀河隊基地\n保全系統的鑰匙卡。\n弄丟了的話，好像會受到懲罰。"
galarica_cuff:
  names:
    jp_kana: ガラナツブレス
    jp_kanji: ガラナツブレス
    en: Galarica Cuff
    fr: Bracelet Galanoa
    it: Fascia Galarnoce
    de: Galarnuss-Reif
    es: Brazal Galanuez
    ko: 가라두구팔찌
    zh_simp: 伽勒豆蔻手环
    zh_trad: 伽勒荳蔻手環
  descriptions:
    jp_kana: "ガラナツのえだを　あみこんだ　ブレスレット。\nガラルちほうの　ヤドンに\nつけてあげると　よろこぶ。"
    jp_kanji: "ガラナツのえだを　編み込んだ　ブレスレット。\nガラル地方の　ヤドンに\nつけてあげると　喜ぶ。"
    en: "A cuff made from woven-together Galarica Twigs.\nGiving it to Galarian Slowpoke makes the\nPokémon very happy."
    fr: "Un bracelet confectionné à partir de Branches Galanoa.\nLes Ramoloss de Galar adorent en porter."
    it: "Un bracciale ottenuto intrecciando Rami Galarnoce.\nGli Slowpoke di Galar amano indossarlo."
    de: "Ein Armreif, der aus Galarnuss-Zweigen gewoben wird.\nGalar-Flegmon freuen sich, wenn sie diesen anlegen\ndürfen."
    es: "Un brazalete hecho de Ramas de Galanuez trenzadas.\nLos Slowpoke de Galar se ponen contentísimos si lo\nreciben como regalo."
    ko: "가라두구가지를 엮어서 만든 팔찌.\n가라르지방의 야돈에게 채워 주면 기뻐한다."
    zh_simp: "用伽勒豆蔻枝编织的手环。\n给伽勒尔地区的呆呆兽戴上，\n它就会很开心。"
    zh_trad: "用伽勒荳蔻枝編成的手環。\n幫伽勒爾地區的呆呆獸戴上，\n牠就會很高興。"
galarica_twig:
  names:
    jp_kana: ガラナツのえだ
    jp_kanji: ガラナツのえだ
    en: Galarica Twig
    fr: Branche Galanoa
    it: Ramo Galarnoce
    de: Galarnuss-Zweig
    es: Rama de Galanuez
    ko: 가라두구가지
    zh_simp: 伽勒豆蔻枝
    zh_trad: 伽勒荳蔻枝
  descriptions:
    jp_kana: "ガラルちほうの　いちぶに　はえる\nガラナツという　きの　えだ。　とある　ポケモンの\nアクセサリーの　ざいりょうとして　つかわれる。"
    jp_kanji: "ガラル地方の　一部に　生える\nガラナツという　木の枝。　とある　ポケモンの\nアクセサリーの　材料として　使われる。"
    en: "A twig from a species of tree called Galarica that grows\nin certain areas around the Galar region. It’s a material\nfor an accessory for a certain Pokémon."
    fr: "Une branche de Galanoa, un arbre qui pousse dans\ncertains endroits de Galar. Elle sert à fabriquer\ndes accessoires pour un Pokémon en particulier."
    it: "Un ramo di Galarnoce, un albero che cresce in alcune\nzone di Galar. Viene usato per realizzare accessori\nper un certo Pokémon."
    de: "Ein Zweig eines Baumes namens Galarnuss, der in\nTeilen der Galar-Region wächst. Er dient als Material zur\nHerstellung von Schmuck für ein bestimmtes Pokémon."
    es: "Una rama de un árbol llamado Galanuez, que crece en\ndeterminadas zonas de Galar. Con ella se pueden crear\naccesorios para cierto Pokémon."
    ko: "가라르지방의 일부 지역에서 자라는\n가라두구라는 나무의 가지.\n어떤 포켓몬의 액세서리 재료로 쓰인다."
    zh_simp: "伽勒尔部分地区生长的\n伽勒豆蔻这种植物的枝条。\n可以用来制作某种宝可梦的饰品。"
    zh_trad: "生長在伽勒爾部分地區的\n伽勒荳蔻的嫩枝。\n常被用來製成某種寶可夢的飾品。"
galarica_wreath:
  names:
    jp_kana: ガラナツリース
    jp_kanji: ガラナツリース
    en: Galarica Wreath
    fr: Couronne Galanoa
    it: Corona Galarnoce
    de: Galarnuss-Kranz
    es: Corona Galanuez
    ko: 가라두구머리장식
    zh_simp: 伽勒豆蔻花圈
    zh_trad: 伽勒荳蔻花圈
  descriptions:
    jp_kana: "ガラナツのえだを　あみこんだ　かんむり。\nガラルちほうの　ヤドンに\nかぶせてあげると　よろこぶ。"
    jp_kanji: "ガラナツのえだを　編み込んだ　冠。\nガラル地方の　ヤドンに\nかぶせてあげると　喜ぶ。"
    en: "A wreath made from woven-together Galarica Twigs.\nPlacing it on the head of a Galarian Slowpoke makes\nthe Pokémon very happy."
    fr: "Une couronne confectionnée à partir de Branches\nGalanoa. Les Ramoloss de Galar adorent en porter."
    it: "Una corona ottenuta intrecciando Rami Galarnoce.\nGli Slowpoke di Galar amano indossarla."
    de: "Ein Kranz, der aus Galarnuss-Zweigen gewoben wurde.\nGalar-Flegmon freuen sich, wenn sie diesen tragen\ndürfen."
    es: "Una corona hecha de Ramas de Galanuez trenzadas.\nLos Slowpoke de Galar se ponen contentísimos cuando\nla llevan puesta."
    ko: "가라두구가지를 엮어서 만든 머리 장식.\n가라르지방의 야돈에게 씌워 주면 기뻐한다."
    zh_simp: "用伽勒豆蔻枝编织的花环头饰。\n给伽勒尔地区的呆呆兽戴上这种头饰，\n它就会很开心。"
    zh_trad: "用伽勒荳蔻枝編成的花冠。\n給伽勒爾地區的呆呆獸戴上它，\n呆呆獸就會很開心。"
galladite:
  names:
    jp_kana: エルレイドナイト
    jp_kanji: エルレイドナイト
    en: Galladite
    fr: Gallamite
    it: Galladite
    de: Galagladinit
    es: Galladita
    ko: 엘레이드나이트
    zh_simp: 艾路雷朵进化石
    zh_trad: 艾路雷朵進化石
  descriptions:
    jp_kana: "エルレイドに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "エルレイドに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Gallade hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Gallame, elle lui permet de méga-évoluer\ndurant un combat."
    it: "Una delle misteriose Megapietre.\nData a Gallade, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Galagladi getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Gallade en combate."
    ko: "엘레이드에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让艾路雷朵携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓艾路雷朵攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
ganlon_berry:
  names:
    jp_kana: リュガのみ
    jp_kanji: リュガのみ
    en: Ganlon Berry
    fr: Baie Lingan
    it: Baccalongan
    de: Linganbeere
    es: Baya Gonlan
    ko: 용아열매
    zh_simp: 龙睛果
    zh_trad: 龍睛果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nピンチのとき　じぶんの\nぼうぎょが　あがる。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　自分の\n防御が　あがる。"
    en: "A Berry to be consumed by Pokémon. If a Pokémon\nholds one, its Defense stat will increase when it’s in\na pinch."
    fr: "Tenue, cette Baie augmente la Défense en cas\nde besoin."
    it: "Se il Pokémon che ha questa bacca si trova\nin difficoltà, la sua Difesa aumenta."
    de: "Als getragenes Item erhöht diese Beere den\nVerteidigungs-Wert eines Pokémon, sobald es in einer\nNotlage steckt."
    es: "Si la lleva un Pokémon, le sube la Defensa en un\nmomento de apuro."
    ko: "포켓몬에게 지니게 하면\n위급할 때 자신의\n방어가 올라간다."
    zh_simp: "让宝可梦携带后，危机时，\n自己的防御就会提高。"
    zh_trad: "讓寶可夢攜帶後，\n危機時，自己的\n防禦就會提高。"
garchompite:
  names:
    jp_kana: ガブリアスナイト
    jp_kanji: ガブリアスナイト
    en: Garchompite
    fr: Carchacrokite
    it: Garchompite
    de: Knakracknit
    es: Garchompita
    ko: 한카리아스나이트
    zh_simp: 烈咬陆鲨进化石
    zh_trad: 烈咬陸鯊進化石
  descriptions:
    jp_kana: "ガブリアスに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "ガブリアスに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Garchomp hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Carchacrok, elle lui permet de\nméga-évoluer durant un combat."
    it: "Un esemplare delle misteriose Megapietre.\nData a Garchomp, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Knakrack getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Garchomp en combate."
    ko: "한카리아스에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让烈咬陆鲨携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓烈咬陸鯊攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
gardevoirite:
  names:
    jp_kana: サーナイトナイト
    jp_kanji: サーナイトナイト
    en: Gardevoirite
    fr: Gardevoirite
    it: Gardevoirite
    de: Guardevoirnit
    es: Gardevoirita
    ko: 가디안나이트
    zh_simp: 沙奈朵进化石
    zh_trad: 沙奈朵進化石
  descriptions:
    jp_kana: "サーナイトに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "サーナイトに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Gardevoir hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Gardevoir, elle lui permet de\nméga-évoluer durant un combat."
    it: "Un esemplare delle misteriose Megapietre.\nData a Gardevoir, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Guardevoir getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Gardevoir en combate."
    ko: "가디안에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让沙奈朵携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓沙奈朵攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
gastly_candy:
  names:
    jp_kana: ゴースのアメ
    jp_kanji: ゴースのアメ
    en: Gastly Candy
    fr: Bonbon Fantominus
    it: Caramella Gastly
    de: Nebulak-Bonbon
    es: Caramelo Gastly
    ko: 고오스의사탕
    zh_simp: 鬼斯的糖果
    zh_trad: 鬼斯的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
gb_sounds:
  names:
    jp_kana: ＧＢプレイヤー
    jp_kanji: ＧＢプレイヤー
    en: GB Sounds
    fr: Lecteur GB
    it: Lettore GB
    de: GB-Player
    es: Lector GB
    ko: GB플레이어
    zh_simp: ＧＢ播放器
    zh_trad: ＧＢ播放器
  descriptions:
    jp_kana: "なつかしい　きょくが　きける\nおんがく　プレイヤー。\nスイッチ　ひとつで　きりかえられる。"
    jp_kanji: "なつかしい　曲が　きける\n音楽プレイヤー。\nスイッチ　ひとつで　きりかえられる。"
    en: "A music player that allows you to listen to nostalgic\nsongs. It’s operated with the flip of a single switch."
    fr: "Un lecteur de musique qui permet de se plonger\ndans une atmosphère rétro. Une pression suffit\npour changer de mode."
    it: "Lettore di musica che permette di immergersi\nin atmosfere rétro.\nFunziona con un solo tasto."
    de: "Ein Abspielgerät, das Musik aus einer längst\nvergangenen Zeit spielt. Lässt sich durch simplen\nKnopfdruck bedienen."
    es: "Lector con el que se pueden escuchar aquellas\ncanciones tan nostálgicas. Se cambia con un solo\ninterruptor."
    ko: "그리운 곡을 들을 수 있는\n음악 플레이어.\n스위치 하나로 전환할 수 있다."
    zh_simp: "可以听到怀旧歌曲的音乐播放器。\n可用一个开关切换歌曲。"
    zh_trad: "可以聽到懷舊歌曲的\n音樂播放機。\n可一鍵切換歌曲。"
gengarite:
  names:
    jp_kana: ゲンガナイト
    jp_kanji: ゲンガナイト
    en: Gengarite
    fr: Ectoplasmite
    it: Gengarite
    de: Gengarnit
    es: Gengarita
    ko: 팬텀나이트
    zh_simp: 耿鬼进化石
    zh_trad: 耿鬼進化石
  descriptions:
    jp_kana: "ゲンガーに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "ゲンガーに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Gengar hold it, and this stone will enable it to\nMega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Ectoplasma, elle lui permet de\nméga-évoluer durant un combat."
    it: "Un esemplare delle misteriose Megapietre.\nData a Gengar, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Gengar getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Gengar en combate."
    ko: "팬텀에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让耿鬼携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓耿鬼攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
genius_feather:
  names:
    jp_kana: ちりょくのハネ
    jp_kanji: ちりょくのハネ
    en: Genius Feather
    fr: Plume Esprit
    it: Piumingegno
    de: Geniefeder
    es: Pluma Intelecto
    ko: 지력날개
    zh_simp: 智力之羽
    zh_trad: 智力之羽
  descriptions:
    jp_kana: "ポケモンに　つかう　どうぐ。\nポケモン　１ひきの　とくこうの\nきそポイントを　ちょっと　あげる。"
    jp_kanji: "ポケモンに　使う　道具。\nポケモン　１匹の　特攻の\n基礎ポイントを　ちょっと　あげる。"
    en: "An item for use on a Pokémon. It slightly increases\nthe Sp. Atk base points of a single Pokémon."
    fr: "Objet à utiliser sur un Pokémon pour un peu augmenter\nson Attaque Spéciale de base."
    it: "Strumento da usare su un Pokémon.\nNe aumenta di poco i punti base dell’Attacco\nSpeciale."
    de: "Wendet man dieses Item auf ein Pokémon an, wird\ndessen Spezial-Angriffs-Basiswert dauerhaft erhöht."
    es: "Pluma que aumenta un poco el Ataque Especial de base\nde un Pokémon."
    ko: "포켓몬에게 사용하는 도구.\n포켓몬 1마리의 특수공격\n기초 포인트를 조금 올린다."
    zh_simp: "用于宝可梦的道具。\n能稍微提高１只宝可梦的\n特攻的基础点数。"
    zh_trad: "用於寶可夢的道具。\n能稍微提高１隻寶可夢的\n特攻的基礎點數。"
genome_slate:
  names:
    jp_kana: いでんしのせきばん
    jp_kanji: いでんしのせきばん
    en: Genome Slate
    fr: Tablette Génétique
    it: Piastra del gene
    de: Genplatte
    es: Losa Genética
    ko: 유전자의석판
    zh_simp: 基因石板
    zh_trad: 基因石板
  descriptions:
    jp_kana: "ふしぎな　ちからに　あふれる　せきばん。\nハマナスパークの　いでんしのへやと\nふかい　つながりを　かんじる。"
    jp_kanji: "不思議な　力に　あふれる　石板。\nハマナスパークの　遺伝子の部屋と\n深い　つながりを　感じる。"
    en: "A slate overflowing with enigmatic energy. You can feel\na strong connection between it and the Genome Room\nat Ramanas Park."
    fr: "Une tablette qui regorge d’une étrange énergie.\nElle semble intimement liée à la Salle de la Génétique\ndu Parc Rosa Rugosa."
    it: "Lastra di pietra che emana una misteriosa energia.\nSembra profondamente connessa alla Stanza del gene\ndel Parco Rosa Rugosa."
    de: "Eine Platte, die vor rätselhafter Energie strotzt.\nMan kann eine starke Verbindung zwischen ihr und der\nGenkammer im Hamanasu-Park spüren."
    es: "Una losa rebosante de una misteriosa energía.\nParece estrechamente relacionada con la Sala\nde la Genética del Parque Hansa."
    ko: "신비한 힘이 넘치는 석판.\n해당화파크의 유전자의 방과\n깊은 연관이 있는 것 같다."
    zh_simp: "充满了神秘力量的石板。\n感觉它与玫瑰公园的基因之厅\n有着很深的关联。"
    zh_trad: "充滿神奇力量的石板。\n感覺它和玫瑰公園的基因之廳\n有很深的關係。"
gentle_mint:
  names:
    jp_kana: おとなしいミント
    jp_kanji: おとなしいミント
    en: Gentle Mint
    fr: Aromate Gentil
    it: Menta Gentile
    de: Zart-Minze
    es: Menta Amable
    ko: 얌전민트
    zh_simp: 温顺薄荷
    zh_trad: 溫順薄荷
  descriptions:
    jp_kana: "ポケモンに　かおりを　かがせると\nとくぼうが　あがりやすく　なるが\nぼうぎょは　あがりにくくなる　ミント。"
    jp_kanji: "ポケモンに　香りを　かがせると\n特防が　上がりやすく　なるが\n防御は　上がりにくくなる　ミント。"
    en: "When a Pokémon smells this mint, its Sp. Def will grow\nmore easily, but its Defense will grow more slowly."
    fr: "Si un Pokémon hume cet aromate, sa Défense Spéciale\nmontera plus facilement, mais sa Défense\nse développera plus lentement."
    it: "Quando un Pokémon ne sente il profumo,\nla sua Difesa Speciale aumenta più facilmente\na scapito della Difesa."
    de: "Lässt man ein Pokémon an dieser Minze schnuppern,\nsteigt seine Spezial-Verteidigung schneller, aber seine\nVerteidigung umso langsamer."
    es: "Cuando un Pokémon percibe su aroma, aumenta con\nmás facilidad su Defensa Especial, en detrimento de su\nDefensa."
    ko: "포켓몬에게 향기를 맡게 하면\n특수방어가 오르기 쉬워지지만\n방어가 오르기 어려워지는 민트."
    zh_simp: "宝可梦闻了这种薄荷之后，\n会令特防容易提高，\n而防御则难以提高。"
    zh_trad: "讓寶可夢聞這種薄荷的氣味，\n會令特防變得容易提高，\n但防禦則難以提高。"
geodude_candy:
  names:
    jp_kana: イシツブテのアメ
    jp_kanji: イシツブテのアメ
    en: Geodude Candy
    fr: Bonbon Racaillou
    it: Caramella Geodude
    de: Kleinstein-Bonbon
    es: Caramelo Geodude
    ko: 꼬마돌의사탕
    zh_simp: 小拳石的糖果
    zh_trad: 小拳石的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
ghost_gem:
  names:
    jp_kana: ゴーストジュエル
    jp_kanji: ゴーストジュエル
    en: Ghost Gem
    fr: Joyau Spectre
    it: Bijouspettro
    de: Geisterjuwel
    es: Gema Fantasma
    ko: 고스트주얼
    zh_simp: 幽灵宝石
    zh_trad: 幽靈寶石
  descriptions:
    jp_kana: "ゴーストの　タイプの　ジュエル。\nもたせると　いちどだけ　ゴーストの\nわざの　いりょくが　つよまる。"
    jp_kanji: "ゴーストの　タイプの　ジュエル。\n持たせると　１度だけ　ゴーストの\n技の　威力が　強まる。"
    en: "A gem with a spectral essence. When held, it\nstrengthens the power of a Ghost-type move\none time."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Spectre."
    it: "Strumento da dare a un Pokémon.\nGioiello che potenzia una sola volta le mosse\ndi tipo Spettro."
    de: "Ein Juwel vom Typ Geist. Es erhöht einmalig die Stärke\neiner Attacke vom Typ Geist."
    es: "Joya de un solo uso que potencia los movimientos de\ntipo Fantasma. Debe llevarla un Pokémon."
    ko: "고스트타입의 주얼.\n지니게 하면 한 번만 고스트\n기술의 위력이 강해진다."
    zh_simp: "幽灵属性的宝石。\n携带后，幽灵属性的\n招式威力仅会增强１次。"
    zh_trad: "幽靈屬性的寶石。\n攜帶後，幽靈屬性招式的\n威力會僅增強１次。"
ghost_memory:
  names:
    jp_kana: ゴーストメモリ
    jp_kanji: ゴーストメモリ
    en: Ghost Memory
    fr: ROM Spectre
    it: ROM Spettro
    de: Geister-Disc
    es: Disco Fantasma
    ko: 고스트메모리
    zh_simp: 幽灵存储碟
    zh_trad: 幽靈記憶碟
  descriptions:
    jp_kana: "ゴーストタイプの　データが　はいった\nメモリ。　とくていの　ポケモンが\nもつと　タイプが　かわる。"
    jp_kanji: "ゴーストタイプの　データが　入った\nメモリ。　特定の　ポケモンが　持つと\nタイプが　変わる。"
    en: "A memory disc that contains Ghost-type data.\nIt changes the type of the holder if held by\na certain species of Pokémon."
    fr: "Une carte mémoire contenant des données sur\nle type Spectre. Un certain Pokémon peut changer\nde type en l’équipant."
    it: "ROM contenente dati sul tipo Spettro in formato\ndigitale. Permette a un certo Pokémon di cambiare\ntipo."
    de: "Eine Disc mit Daten zum Typ Geist. Sie löst bei einem\nbestimmten Pokémon einen Typenwechsel aus."
    es: "Disco de datos que contiene información relativa al tipo\nFantasma. Permite cambiar de tipo a cierto Pokémon."
    ko: "고스트타입의 데이터가 들어 있는\n메모리. 특정 포켓몬이\n지니면 타입이 바뀐다."
    zh_simp: "装有幽灵属性数据的存储碟。\n特定宝可梦携带后，\n属性就会发生变化。"
    zh_trad: "裝有幽靈屬性資料的記憶碟。\n特定寶可夢攜帶後，\n就會產生屬性的變化。"
ghostium_z:bag:
  names:
    jp_kana: ゴーストＺ
    jp_kanji: ゴーストＺ
    en: Ghostium Z
    fr: Spectrozélite
    it: Spectrium Z
    de: Phantomium Z
    es: Espectrostal Z
    ko: 고스트Z
    zh_simp: 幽灵Ｚ
    zh_trad: 幽靈Ｚ
  descriptions:
    jp_kana: "ゴーストタイプの　わざを\nＺワザに　グレードアップする\nＺパワーの　けっしょうを　つくりだす。"
    jp_kanji: "ゴーストタイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nGhost-type moves to Ghost-type Z-Moves."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise son porteur à transformer ses capacités\nde type Spectre en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono ai Pokémon di trasformare le mosse\ndi tipo Spettro in mosse Z."
    de: "Kristallisierte Z-Kraft, die Geister-Attacken zu\nZ-Attacken aufstuft. Wird bei Bedarf automatisch\nvervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a los\nportadores convertir sus movimientos de tipo Fantasma\nen movimientos Z."
    ko: "고스트타입 기술을\nZ기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将幽灵属性招式升级成\nＺ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把幽靈屬性招式\n升級為Ｚ招式的Ｚ力量結晶。"
ghostium_z:held:
  names:
    jp_kana: ゴーストＺ
    jp_kanji: ゴーストＺ
    en: Ghostium Z
    fr: Spectrozélite
    it: Spectrium Z
    de: Phantomium Z
    es: Espectrostal Z
    ko: 고스트Z
    zh_simp: 幽灵Ｚ
    zh_trad: 幽靈Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　けっしょう。\nゴーストタイプの　わざを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nゴーストタイプの　技を\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Ghost-type moves to Z-Moves."
    fr: "Une cristallisation de la Force Z, permettant\nde transformer les capacités de type Spectre\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare le mosse di tipo Spettro\nin mosse Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft\nGeister-Attacken zu Z-Attacken auf."
    es: "Cristal que confiere el Poder Z a los movimientos\nde tipo Fantasma."
    ko: "Z파워의 결정.\n고스트타입 기술을\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将幽灵属性的招式\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把幽靈屬性的招式\n升級為Ｚ招式。"
gigantamix:
  names:
    jp_kana: キョダイパウダー
    jp_kanji: キョダイパウダー
    en: Gigantamix
    fr: Poudre Gigamax
    it: Gigaspezia
    de: Giga-Pulver
    es: Especias Gigamax
    ko: 거대파우더
    zh_simp: 超极粉
    zh_trad: 超極粉
  descriptions:
    jp_kana: "キャンプ　りょうりの　しょくざい。\nひとふりで　カレーを　きょだいに　する\nふしぎな　スパイス。"
    jp_kanji: "キャンプ　料理の　食材。\n一振りで　カレーを　巨大に　する\n不思議な　スパイス。"
    en: "One of the many ingredients that can be used for\ncooking at your camp. A mysterious spice. Even a tiny\nsprinkle is sure to make a curry gigantic."
    fr: "Un ingrédient de cuisine pour le camping.\nUne simple pincée de cette épice mystérieuse\npermet de donner une taille démesurée au curry."
    it: "Uno degli ingredienti per cucinare in campeggio.\nBasta un pizzico di questa spezia misteriosa per\ningigantire qualsiasi curry."
    de: "Eine Zutat für PokéCamping-Mahlzeiten. Dieses\ngeheimnisvolle Gewürz macht Currygerichte auf\neinen Schlag gigantisch."
    es: "Un ingrediente para cocinar en el campamento. Una\npizca de esta extraña especia basta para elaborar un\ncurri gigantesco."
    ko: "캠프 요리의 식재료.\n조금만 넣어도 카레를 거대하게 만드는\n신기한 향신료."
    zh_simp: "在露营营地制作料理时会使用的食材。\n只要把这种神奇的香辛料往咖喱上\n轻轻一撒，咖喱就会变得巨大无比。"
    zh_trad: "製作露營料理時使用的食材。\n神奇的香料，輕輕一撒就能\n讓咖哩變得巨大無比。"
glalitite:
  names:
    jp_kana: オニゴーリナイト
    jp_kanji: オニゴーリナイト
    en: Glalitite
    fr: Oniglalite
    it: Glalite
    de: Firnontornit
    es: Glalita
    ko: 얼음귀신나이트
    zh_simp: 冰鬼护进化石
    zh_trad: 冰鬼護進化石
  descriptions:
    jp_kana: "オニゴーリに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "オニゴーリに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Glalie hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Oniglali, elle lui permet de méga-évoluer\ndurant un combat."
    it: "Una delle misteriose Megapietre.\nData a Glalie, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Firnontor getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Glalie en combate."
    ko: "얼음귀신에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让冰鬼护携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓冰鬼護攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
go_goggles:
  names:
    jp_kana: ゴーゴーゴーグル
    jp_kanji: ゴーゴーゴーグル
    en: Go-Goggles
    fr: Lunettes Sable
    it: Occhialoni
    de: Wüstenbrille
    es: Gafas Aislantes
    ko: 고고고글
    zh_simp: ＧＯＧＯ护目镜
    zh_trad: ＧＯＧＯ護目鏡
  descriptions:
    jp_kana: "さばくの　すなあらしから\nめを　まもって　くれる\nすてきな　ゴーグル。"
    jp_kanji: "砂漠の　すなあらしから\n目を　守ってくれる\nすてきな　ゴーグル。"
    en: "Nifty goggles to protect eyes from\ndesert sandstorms."
    fr: "Une paire de lunettes bien pratique qui protège\nles yeux en cas de tempête de sable dans le désert."
    it: "Occhiali indispensabili per proteggersi dalle\ntempeste di sabbia."
    de: "Eine schicke Brille, die deine Augen vor Sandstürmen\nschützt."
    es: "Gafas idóneas para protegerte los ojos de las tormentas\nde arena del desierto."
    ko: "사막의 모래바람으로부터\n눈을 보호해 주는\n근사한 고글."
    zh_simp: "能在沙漠的沙暴中\n保护眼睛的出色护目镜。"
    zh_trad: "能在沙漠的沙暴中\n保護眼睛的出色護目鏡。"
gold_bottle_cap:
  names:
    jp_kana: きんのおうかん
    jp_kanji: きんのおうかん
    en: Gold Bottle Cap
    fr: Capsule d’Or
    it: Tappo d’oro
    de: Goldkronkorken
    es: Chapa Dorada
    ko: 금왕관
    zh_simp: 金色王冠
    zh_trad: 金色王冠
  descriptions:
    jp_kana: "きんいろの　きれいな　おうかん。\nぎんのおうかんより　めずらしい。\nわたすと　よろこぶ　ひともいる。"
    jp_kanji: "金色の　きれいな　王冠。\nぎんのおうかんより　珍しい。\n渡すと　よろこぶ　人もいる。"
    en: "A beautiful bottle cap that gives off a golden gleam.\nSome people are happy to receive one."
    fr: "Une jolie capsule en or, encore plus rare\nque la Capsule d’Argent.\nCertaines personnes adorent en recevoir."
    it: "Un bel tappo a corona color oro, più raro del\nTappo d’argento. Alcuni lo apprezzano molto."
    de: "Ein hübscher goldener Kronkorken. Er ist noch seltener\nals ein Silberkronkorken. Es gibt Leute, die sich sehr\ndarüber freuen würden!"
    es: "Una bonita chapa de color dorado, menos común que\nsu equivalente plateada. Hay gente que las aprecia\nmucho."
    ko: "금색의 아름다운 왕관.\n은왕관보다 진귀하다.\n받으면 좋아하는 사람도 있다."
    zh_simp: "金色的美丽王冠。\n比银色王冠珍贵。\n有些人收到它会很高兴。"
    zh_trad: "金色的美麗王冠。\n比銀色王冠更珍貴。\n有些人收到它會很高興。"
gold_leaf:
  names:
    jp_kana: きんのはっぱ
    jp_kanji: きんのはっぱ
    en: Gold Leaf
    fr: Feuille Dorée
    it: Fogliadoro
    de: Goldblatt
    es: Hoja de Oro
    ko: 금빛잎사귀
    zh_simp: 金色叶子
    zh_trad: 金色葉子
  descriptions:
    jp_kana: "きんいろの　ふしぎな　はっぱ。\nこの　はっぱを　つける　きは\nみつかって　いない。"
    jp_kanji: "金色の　不思議な　はっぱ。\nこの　はっぱを　つける　木は\n見つかって　いない。"
    en: "A mysterious gold leaf. No trees with this leaf have\nbeen found yet."
    fr: "Une feuille dorée mystérieuse. Elle ne semble\nappartenir à aucun arbre connu."
    it: "Una strana foglia dorata. Nessuno sa da che albero\nprovenga."
    de: "Ein rätselhaftes Blatt mit goldener Färbung. Bisher hat\nman noch keinen Baum entdeckt, an dem solche Blätter\nwachsen."
    es: "Extraña hoja de color dorado. Se desconoce de qué\nárbol procede."
    ko: "금빛의 신비한 나뭇잎.\n이 나뭇잎이 자라는 나무는\n아직 발견되지 않았다."
    zh_simp: "神奇的金色叶子。\n至今仍未发现能长出\n这种叶子的树木。"
    zh_trad: "不可思議的金色葉子。\n至今還未發現\n長有這種葉子的樹。"
gold_teeth:
  names:
    jp_kana: きんのいれば
    jp_kanji: きんのいれば
    en: Gold Teeth
    fr: Dentier en Or
    it: Denti d’oro
    de: Goldenes Gebiss
    es: Dentadura de Oro
    ko: 금틀니
    zh_simp: 金假牙
    zh_trad: 金假牙
  descriptions:
    jp_kana: "サファリゾーンの　えんちょうが\nおとした　きんいろの　いれば。\nわらうと　とても　まぶしい。"
    jp_kanji: "サファリゾーンの　園長が\n落とした　金色の　入れ歯。\n笑うと　とても　まぶしい。"
    en: "A set of golden false teeth lost by the Safari Zone’s\nwarden. They make his smile sparkle."
    fr: "Un dentier en or perdu par le directeur du Parc Safari.\nIl lui donne un sourire étincelant."
    it: "Dentiera dorata persa dal guardiano della Zona Safari.\nRende il suo sorriso davvero scintillante."
    de: "Ein vergoldeter Zahnersatz, den der Direktor der\nSafari-Zone verlegt hat. Setzt er ihn ein, verleiht er ihm\nbuchstäblich ein goldiges Lächeln."
    es: "Unos dientes de oro que perdió el Guarda de la Zona\nSafari con los que tiene una sonrisa deslumbrante."
    ko: "사파리존의 원장이\n떨어뜨린 금색 틀니.\n웃으면 매우 눈부시다."
    zh_simp: "狩猎地带的园长遗失的金假牙。\n装上它后，笑起来十分耀眼。"
    zh_trad: "狩獵地帶的園長\n遺失的金色假牙。\n裝上它之後笑起來非常耀眼。"
goldeen_candy:
  names:
    jp_kana: トサキントのアメ
    jp_kanji: トサキントのアメ
    en: Goldeen Candy
    fr: Bonbon Poissirène
    it: Caramella Goldeen
    de: Goldini-Bonbon
    es: Caramelo Goldeen
    ko: 콘치의사탕
    zh_simp: 角金鱼的糖果
    zh_trad: 角金魚的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
golden_nanab_berry:
  names:
    jp_kana: きんのナナのみ
    jp_kanji: きんのナナのみ
    en: Golden Nanab Berry
    fr: Baie Nanab dorée
    it: Baccabana dorata
    de: Goldene Nanabbeere
    es: Baya Latano Dorada
    ko: 황금 나나열매
    zh_simp: 金色蕉香果
    zh_trad: 金色蕉香果
  descriptions:
    jp_kana: "ポケモンを　つかまえる　ときに\nあたえると　かなり　おちつく　きのみ。"
    jp_kanji: "ポケモンを　捕まえる　ときに\nあたえると　かなり　落ち着く　きのみ。"
    en: "A Berry that calms wild Pokémon you’re trying to catch\ndrastically when given to them."
    fr: "Une Baie à donner à un Pokémon sauvage au moment\nde la capture pour le calmer durablement."
    it: "Bacca che calma molto il Pokémon selvatico\na cui viene data."
    de: "Gibst du diese Beere einem Pokémon zu essen,\nwird es während des Fangversuchs viel ruhiger."
    es: "Una baya que puedes lanzar a un Pokémon salvaje\npara tranquilizarlo mucho."
    ko: "포켓몬을 잡을 때 주면\n상당히 얌전해지는 나무열매."
    zh_simp: "捕捉宝可梦时，\n把这树果交给宝可梦\n就能有效地平复对方的情绪。"
    zh_trad: "在捕捉時把這個樹果餵給寶可夢，\n就能讓牠們的情緒大幅穩定下來。"
golden_pinap_berry:
  names:
    jp_kana: きんのパイルのみ
    jp_kanji: きんのパイルのみ
    en: Golden Pinap Berry
    fr: Baie Nanana dorée
    it: Baccananas dorata
    de: Goldene Sananabeere
    es: Baya Pinia Dorada
    ko: 황금 파인열매
    zh_simp: 金色凰梨果
    zh_trad: 金色凰梨果
  descriptions:
    jp_kana: "ポケモンに　あたえると\nつかまえた　ときに　どうぐが\nかなり　てにはいり　やすくなる　きのみ。"
    jp_kanji: "ポケモンに　あたえると\n捕まえた　ときに　道具が\nかなり　手にはいり　やすくなる　きのみ。"
    en: "A Berry that makes you drastically more likely\nto get an item when given to Pokémon you’re\ntrying to catch."
    fr: "Une Baie à donner à un Pokémon sauvage pour avoir\nbeaucoup plus de chances d’obtenir un objet après\nl’avoir capturé."
    it: "Bacca che rende molto più facile ottenere strumenti\nquando catturi il Pokémon a cui l’hai data."
    de: "Gibst du diese Beere einem Pokémon zu essen, wird die\nChance, bei einem erfolgreichen Fangversuch ein Item\nzu erhalten, stark erhöht."
    es: "Una baya que puedes lanzar a un Pokémon salvaje\npara aumentar mucho las probabilidades de conseguir\nun objeto tras capturarlo."
    ko: "포켓몬에게 주면\n잡았을 때 도구를 손에 넣기\n상당히 쉬워지는 나무열매."
    zh_simp: "如果把这树果交给宝可梦，\n那么接下来捉住该宝可梦时，\n会非常容易获得道具。"
    zh_trad: "把這個樹果餵給寶可夢，\n在捕捉成功後，\n會非常容易獲得道具。"
golden_razz_berry:
  names:
    jp_kana: きんのズリのみ
    jp_kanji: きんのズリのみ
    en: Golden Razz Berry
    fr: Baie Framby dorée
    it: Baccalampon dorata
    de: Goldene Himmihbeere
    es: Baya Frambu Dorada
    ko: 황금 라즈열매
    zh_simp: 金色蔓莓果
    zh_trad: 金色蔓莓果
  descriptions:
    jp_kana: "ポケモンに　あたえると\nかなり　つかまえ　やすくなる　きのみ。"
    jp_kanji: "ポケモンに　あたえると\nかなり　捕まえ　やすくなる　きのみ。"
    en: "A Berry that makes it drastically easier to catch\nPokémon when given to them."
    fr: "Une Baie à donner à un Pokémon sauvage pour pouvoir\nl’attraper beaucoup plus facilement."
    it: "Bacca che facilita di molto la cattura del Pokémon\nselvatico a cui viene data."
    de: "Gibst du diese Beere einem Pokémon zu essen,\nlässt es sich viel leichter fangen."
    es: "Una baya que puedes lanzar a un Pokémon salvaje\npara que resulte mucho más fácil capturarlo."
    ko: "포켓몬에게 주면\n상당히 잡기 쉬워지는 나무열매."
    zh_simp: "把这树果交给宝可梦后，\n宝可梦就会变得十分容易捕捉。"
    zh_trad: "把這個樹果餵給寶可夢，\n就能讓牠們變得十分容易捕捉。"
good_rod:
  names:
    jp_kana: いいつりざお
    jp_kanji: いいつりざお
    en: Good Rod
    fr: Super Canne
    it: Amo Buono
    de: Profiangel
    es: Caña Buena
    ko: 좋은낚싯대
    zh_simp: 好钓竿
    zh_trad: 好釣竿
  descriptions:
    jp_kana: "あたらしくて　いい　つりざお。\nみずの　ある　ばしょで　つかうと\nポケモンが　つれる。"
    jp_kanji: "あたらしくて　いい　つりざお。\n水の　ある　場所で　使うと\nポケモンが　つれる。"
    en: "A new, good-quality fishing rod. Use it at any body\nof water to fish for wild aquatic Pokémon."
    fr: "Une canne neuve et de bonne qualité.\nUtilisez-la pour pêcher des Pokémon sauvages\ndans les points d’eau."
    it: "Amo nuovo e di qualità. Si usa per pescare\nPokémon selvatici in qualsiasi specchio d’acqua."
    de: "Eine recht gute Angel. Damit kannst du in jedem\nGewässer nach Pokémon angeln."
    es: "Caña de pescar nuevecita y de gran calidad. Pesca\nPokémon salvajes en todo tipo de aguas."
    ko: "새로 나온 좋은 낚싯대.\n물이 있는 장소에서 사용하면\n포켓몬을 낚을 수 있다."
    zh_simp: "不错的新钓竿。\n在有水的地方使用的话，\n可以钓到宝可梦。"
    zh_trad: "不錯的新釣竿。\n在有水的地方使用的話，\n可以釣到寶可夢。"
gooey_mulch:
  names:
    jp_kana: ねばねばこやし
    jp_kanji: ねばねばこやし
    en: Gooey Mulch
    fr: Fertiglu
    it: Fertilcolla
    de: Neumulch
    es: Abono Brote
    ko: 끈적끈적비료
    zh_simp: 粘粘肥
    zh_trad: 黏黏肥
  descriptions:
    jp_kana: "きのみを　そだてるときの　ひりょう。\nしかし　ホウエンちほうの　つちには\nまるで　なじまないので　こうかが　ない。"
    jp_kanji: "きのみを　育てるときの　肥料。\nしかし　ホウエン地方の　土には\nまるで　なじまないので　効果が　ない。"
    en: "A fertilizer for growing Berries. However, it appears\nto be unsuitable for the soil in the Hoenn region and\nhas no effect."
    fr: "Un engrais à utiliser sur un sol meuble.\nIl n’est cependant pas adapté aux terres de Hoenn\net n’y a aucun effet."
    it: "Fertilizzante usato per coltivare le bacche.\nTuttavia, non ha effetto a Hoenn, perché\nnon è adatto al terreno della regione."
    de: "Mulch zur Nutzung auf Beerenfeldern. Durch seine\nUnverträglichkeit mit den Böden in Hoenn bleibt sein\nEinsatz dort ohne Wirkung."
    es: "Un fertilizante usado para el cultivo de bayas. Parece\nque no se asienta bien en el suelo de Hoenn, por lo\nque no tiene efecto en esta región."
    ko: "나무열매를 키울 때 사용하는 비료.\n그러나 호연지방의 흙에는\n전혀 맞지 않기에 효과가 없다."
    zh_simp: "培育树果时的肥料。\n但完全不适合丰缘地区的土壤，\n所以没什么效果。"
    zh_trad: "培育樹果時的肥料。\n但完全不適合豐緣地區的土壤，\n所以沒什麼效果。"
gracidea:
  names:
    jp_kana: グラシデアのはな
    jp_kanji: グラシデアのはな
    en: Gracidea
    fr: Gracidée
    it: Gracidea
    de: Gracidea
    es: Gracídea
    ko: 그라시데아꽃
    zh_simp: 葛拉西蒂亚花
    zh_trad: 葛拉西蒂亞花
  descriptions:
    jp_kana: "たんじょうびや　きねんび　などに\nかんしゃの　きもちを　つたえるため\nブーケにして　おくることが　ある。"
    jp_kanji: "誕生日や　記念日などに\n感謝の　気持ちを　伝えるため\nブーケにして　贈ることが　ある。"
    en: "A flower sometimes bundled in bouquets to convey\ngratitude on special occasions, such as birthdays."
    fr: "Une fleur que l’on offre en gage de reconnaissance,\nnotamment à l’occasion d’un anniversaire."
    it: "Un fiore, a volte offerto in bouquet, che\nesprime gratitudine in occasioni particolari,\ncome i compleanni."
    de: "Mit dieser Blume, manchmal auch als Teil eines\nBouquets, kann man an speziellen Tagen seine\nDankbarkeit ausdrücken."
    es: "Una flor que se suele regalar en ramos para expresar\nagradecimiento en ocasiones especiales, como\ncumpleaños."
    ko: "생일이나 기념일 등에\n감사의 마음을 전하기 위해\n부케로 만들어 보내는 일이 있다."
    zh_simp: "在生日或纪念日等日子里，\n为了表达感激之情，\n有时会将其扎成花束送出。"
    zh_trad: "在生日或紀念日等日子裡，\n為了表達感激之情，\n有時會將其紮成花束送出。"
gram_1:
  names:
    jp_kana: はいたつぶつ１
    jp_kanji: はいたつぶつ１
    en: Gram 1
    fr: Courrier 1
    it: Missiva 1
    de: Briefpost 1
    es: Envío 1
    ko: 배달물1
    zh_simp: 配送物品１
    zh_trad: 配送物品１
  descriptions:
    jp_kana: "キャモメが　はいたつ　している\nたいせつな　てがみ。"
    jp_kanji: "キャモメが　配達している\nたいせつな　手紙。"
    en: An important letter that Wingull delivers.
    fr: Un courrier important transporté par un Goélise.
    it: Un’importante lettera che Wingull deve consegnare.
    de: Eine wichtige Briefpost, überbracht von Wingull.
    es: Carta importante que entrega Wingull.
    ko: "갈모매가 배달하는\n소중한 편지."
    zh_simp: "长翅鸥投递的\n重要信件。"
    zh_trad: "長翅鷗投遞的\n重要信件。"
