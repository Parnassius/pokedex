  descriptions:
    jp_kana: "エスパーの　タイプの　せきばん。\nもたせると　エスパータイプの\nわざの　いりょくが　つよまる。"
    jp_kanji: "エスパーの　タイプの　石盤。\n持たせると　エスパータイプの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon. It’s a stone tablet\nthat boosts the power of Psychic-type moves."
    fr: "Objet à tenir. Une tablette en pierre augmentant\nla puissance des capacités de type Psy."
    it: "Strumento da dare a un Pokémon. Lastra di pietra che\npotenzia le mosse di tipo Psico."
    de: "Ein Item zum Tragen. Diese Steintafel verstärkt\nAttacken vom Typ Psycho."
    es: "Tabla de piedra que potencia los movimientos de tipo\nPsíquico. Debe llevarla un Pokémon."
    ko: "에스퍼타입의 석판.\n지니게 하면 에스퍼타입\n기술의 위력이 강해진다."
    zh_simp: "超能力属性的石板。\n携带后，超能力属性的\n招式威力就会增强。"
    zh_trad: "超能力屬性的石板。\n攜帶後，超能力屬性的\n招式威力就會增強。"
miracle_seed:
  names:
    jp_kana: きせきのタネ
    jp_kanji: きせきのタネ
    en: Miracle Seed
    fr: Graine Miracle
    it: Miracolseme
    de: Wundersaat
    es: Semilla Milagro
    ko: 기적의씨
    zh_simp: 奇迹种子
    zh_trad: 奇跡種子
  descriptions:
    jp_kana: "せいめいが　やどる　タネ。\nもたせると　くさタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "生命が　宿る　タネ。\n持たせると　くさタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon. It’s a seed\nimbued with life-force that boosts the power of\nGrass-type moves."
    fr: "Objet à tenir. Une graine remplie de vie qui augmente\nla puissance des capacités de type Plante."
    it: "Strumento da dare a un Pokémon.\nSeme intriso di vita che potenzia le mosse\ndi tipo Erba."
    de: "Ein Item zum Tragen. Ein Samen voller Lebenskraft,\nder Attacken vom Typ Pflanze verstärkt."
    es: "Debe llevarla un Pokémon. La vitalidad de la semilla\nfortalece los movimientos de tipo Planta."
    ko: "생명이 깃든 씨앗.\n지니게 하면 풀타입\n기술의 위력이 올라간다."
    zh_simp: "孕育生命的种子。\n携带后，草属性的\n招式威力就会提高。"
    zh_trad: "蘊藏生命的種子。\n攜帶後，草屬性的\n招式威力就會提高。"
misty_seed:
  names:
    jp_kana: ミストシード
    jp_kanji: ミストシード
    en: Misty Seed
    fr: Graine Brume
    it: Nebbiaseme
    de: Nebel-Samen
    es: Semilla Bruma
    ko: 미스트시드
    zh_simp: 薄雾种子
    zh_trad: 薄霧種子
  descriptions:
    jp_kana: "ポケモンに　もたせると\nミストフィールドのときに　つかって\nとくぼうが　あがる。"
    jp_kanji: "ポケモンに　持たせると\nミストフィールドのときに　使って\n特防が　あがる。"
    en: "An item to be held by a Pokémon. It boosts Sp. Def\non Misty Terrain. It can only be used once."
    fr: "Objet à tenir. Augmente la Défense Spéciale lorsque\nle terrain est couvert d’un Champ Brumeux."
    it: "Strumento da dare a un Pokémon.\nFa aumentare la Difesa Speciale quando il terreno\ndi lotta è nello stato di Campo Nebbioso."
    de: "Gibst du den Samen einem Pokémon zum Tragen, setzt\nes ihn ein, wenn ein Nebelfeld aktiv ist, und erhöht\ndadurch seine Spezial-Verteidigung."
    es: "Aumenta la Defensa Especial del portador si se usa\ncuando el terreno está cubierto por un campo de\nniebla."
    ko: "포켓몬에게 지니게 하면\n미스트필드일 때 사용하여\n특수방어가 올라간다."
    zh_simp: "让宝可梦携带后，\n在薄雾场地上使用，\n特防就会提高。"
    zh_trad: "讓寶可夢攜帶後，\n在薄霧場地上使用，\n就會提高特防。"
mixed_mushrooms:
  names:
    jp_kana: キノコパック
    jp_kanji: キノコパック
    en: Mixed Mushrooms
    fr: Champignons
    it: Funghi
    de: Pilzmix
    es: Setas
    ko: 버섯팩
    zh_simp: 袋装蕈菇
    zh_trad: 袋裝蕈菇
  descriptions:
    jp_kana: "キャンプの　りょうりに　つかう\nしょくざいの　いっしゅ。いろんな　キノコの\nはごたえが　しょっかんを　かえてくれる。"
    jp_kanji: "キャンプの　料理に　使う\n食材の　一種。いろんな　キノコの\n歯応えが　食感を　変えてくれる。"
    en: "One of the many ingredients that can be used for\ncooking at your camp. The chewy texture of the\nmushrooms transforms any dish they’re added to."
    fr: "Un ingrédient de cuisine pour le camping.\nLa texture unique de chaque champignon\ninfluence la sensation en bouche du curry."
    it: "Uno degli ingredienti che puoi usare per cucinare\nin campeggio. La diversa consistenza dei vari tipi\ndi funghi dona al piatto un sapore ancora più ricco."
    de: "Eine Zutat für PokéCamping-Mahlzeiten. Die Konsistenz\nder verschiedenen Pilzsorten verleiht dem Curry eine\nbesondere Note."
    es: "Un ingrediente para cocinar en el campamento. Los\ndistintos tipos de setas aportan diferentes texturas al\ncurri."
    ko: "캠프 요리에 사용되는\n식재료 중 하나. 다양한 버섯의\n질감이 식감을 바꿔 준다."
    zh_simp: "在露营营地制作料理时会使用的\n一种食材。各种菌菇混在一起的嚼劲\n会为口感带来变化。"
    zh_trad: "製作露營料理時使用的食材之一。\n各種菇類的嚼勁\n會改變料理的口感。"
modest_mint:
  names:
    jp_kana: ひかえめミント
    jp_kanji: ひかえめミント
    en: Modest Mint
    fr: Aromate Modeste
    it: Menta Modesta
    de: Mäßig-Minze
    es: Menta Modesta
    ko: 조심민트
    zh_simp: 内敛薄荷
    zh_trad: 內斂薄荷
  descriptions:
    jp_kana: "ポケモンに　かおりを　かがせると\nとくこうが　あがりやすく　なるが\nこうげきは　あがりにくくなる　ミント。"
    jp_kanji: "ポケモンに　香りを　かがせると\n特攻が　上がりやすく　なるが\n攻撃は　上がりにくくなる　ミント。"
    en: "When a Pokémon smells this mint, its Sp. Atk will grow\nmore easily, but its Attack will grow more slowly."
    fr: "Si un Pokémon hume cet aromate, son Attaque Spéciale\nmontera plus facilement, mais son Attaque\nse développera plus lentement."
    it: "Quando un Pokémon ne sente il profumo,\nil suo Attacco Speciale aumenta più facilmente\na scapito dell’Attacco."
    de: "Lässt man ein Pokémon an dieser Minze schnuppern,\nsteigt sein Spezial-Angriff schneller, aber sein Angriff\numso langsamer."
    es: "Cuando un Pokémon percibe su aroma, aumenta con\nmás facilidad su Ataque Especial, en detrimento de su\nAtaque."
    ko: "포켓몬에게 향기를 맡게 하면\n특수공격이 오르기 쉬워지지만\n공격이 오르기 어려워지는 민트."
    zh_simp: "宝可梦闻了这种薄荷之后，\n会令特攻容易提高，\n而攻击则难以提高。"
    zh_trad: "讓寶可夢聞這種薄荷的氣味，\n會令特攻變得容易提高，\n但攻擊則難以提高。"
moltres_candy:
  names:
    jp_kana: ファイヤーのアメ
    jp_kanji: ファイヤーのアメ
    en: Moltres Candy
    fr: Bonbon Sulfura
    it: Caramella Moltres
    de: Lavados-Bonbon
    es: Caramelo Moltres
    ko: 파이어의사탕
    zh_simp: 火焰鸟的糖果
    zh_trad: 火焰鳥的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de cierto Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
moomoo_cheese:
  names:
    jp_kana: モーモーチーズ
    jp_kanji: モーモーチーズ
    en: Moomoo Cheese
    fr: Fromage Meumeu
    it: Formaggio Mumu
    de: Kuhmuh-Käse
    es: Queso Mu-mu
    ko: 튼튼치즈
    zh_simp: 哞哞乳酪
    zh_trad: 哞哞乳酪
  descriptions:
    jp_kana: "キャンプの　りょうりに　つかう\nしょくざいの　いっしゅ。とけた　チーズが\nカレーに　コクを　あたえてくれる。"
    jp_kanji: "キャンプの　料理に　使う\n食材の　一種。溶けた　チーズが\nカレーに　コクを　与えてくれる。"
    en: "One of the many ingredients that can be used for\ncooking at your camp. Melted cheese can really give a\ncurry some richness."
    fr: "Un ingrédient de cuisine pour le camping.\nUne fois fondu, il apporte une dose d’onctuosité\nau curry."
    it: "Uno degli ingredienti che puoi usare per cucinare\nin campeggio. Il formaggio fuso dona al curry\nun sapore intenso."
    de: "Eine Zutat für PokéCamping-Mahlzeiten. Dieser\nzartschmelzende Käse gibt dem Curry einen besonders\nvollen Geschmack."
    es: "Un ingrediente para cocinar en el campamento. El\nqueso derretido aporta intensidad a la salsa."
    ko: "캠프 요리에 사용되는\n식재료 중 하나. 녹아내린 치즈가\n카레의 감칠맛을 더해 준다."
    zh_simp: "在露营营地制作料理时会使用的\n一种食材。融化的芝士\n能为咖喱增添一份独特的浓郁。"
    zh_trad: "製作露營料理時使用的食材之一。\n融化的乳酪令咖哩的味道\n更有層次感。"
moomoo_milk:
  names:
    jp_kana: モーモーミルク
    jp_kanji: モーモーミルク
    en: Moomoo Milk
    fr: Lait Meumeu
    it: Latte Mumu
    de: Kuhmuh-Milch
    es: Leche Mu-mu
    ko: 튼튼밀크
    zh_simp: 哞哞鲜奶
    zh_trad: 哞哞鮮奶
  descriptions:
    jp_kana: "えいよう　まんてんの　ミルク。\nポケモン　１ひきの　ＨＰを\n１００だけ　かいふくする。"
    jp_kanji: "栄養満点の　ミルク。\nポケモン　１匹の　ＨＰを\n１００だけ　回復する。"
    en: "A bottle of highly nutritious milk. It can be used to\nrestore 100 HP to a single Pokémon."
    fr: "Un lait très nourrissant.\nRestaure 100 PV d’un Pokémon."
    it: "Latte ricco di sostanze nutrienti.\nRestituisce 100 PS a un Pokémon."
    de: "Eine äußerst nährstoffreiche Milch, die die KP eines\nPokémon um 100 Punkte auffüllt."
    es: "Leche de alto valor nutritivo que restaura 100 PS de un\nPokémon."
    ko: "영양 만점의 우유.\n포켓몬 1마리의 HP를\n100만큼 회복한다."
    zh_simp: "营养百分百的牛奶。\n能让１只宝可梦\n回复１００ＨＰ。"
    zh_trad: "營養滿分的鮮奶。\n能讓１隻寶可夢\n回復１００ＨＰ。"
moon_ball:
  names:
    jp_kana: ムーンボール
    jp_kanji: ムーンボール
    en: Moon Ball
    fr: Lune Ball
    it: Luna Ball
    de: Mondball
    es: Luna Ball
    ko: 문볼
    zh_simp: 月亮球
    zh_trad: 月亮球
  descriptions:
    jp_kana: "つきのいしで　しんかする　ポケモンが\nつかまえやすくなる\nちょっと　かわった　ボール。"
    jp_kanji: "つきのいしで　進化する　ポケモンが\n捕まえやすくなる\nちょっと　変わった　ボール。"
    en: "A Poké Ball that will make it easier to catch\nPokémon that can evolve using a Moon Stone."
    fr: "Une Poké Ball un peu spéciale qui fonctionne\nparticulièrement bien sur les Pokémon évoluant\navec une Pierre Lune."
    it: "Poké Ball un po’ diversa che funziona\nparticolarmente bene con i Pokémon\nche si evolvono con una Pietralunare."
    de: "Ein Ball, der sich besonders gut eignet, um Pokémon\nzu fangen, die sich durch einen Mondstein entwickeln."
    es: "Poké Ball algo distinta que atrapa con más facilidad los\nPokémon que evolucionan con la Piedra Lunar."
    ko: "달의돌로 진화하는 포켓몬이\n잡기 쉬워지는\n조금 특이한 볼."
    zh_simp: "有点与众不同的球。\n能很容易地捕捉\n使用月之石进化的宝可梦。"
    zh_trad: "有點與眾不同的球。\n能更容易地捉到\n使用月之石進化的寶可夢。"
moon_flute:
  names:
    jp_kana: つきのふえ
    jp_kanji: つきのふえ
    en: Moon Flute
    fr: Flûte de la Lune
    it: Flauto lunare
    de: Mondflöte
    es: Flauta Lunar
    ko: 달의피리
    zh_simp: 月亮之笛
    zh_trad: 月亮之笛
  descriptions:
    jp_kana: "つきの　でんせつポケモンに\nかんしゃの　きもちを　あらわすため\nねいろを　ささげていた　という。"
    jp_kanji: "月の　伝説ポケモンに\n感謝の　気持ちを　表すため\n音色を　捧げていた　という。"
    en: "It is said that the tones it produces were offered\nup as an expression of gratitude to the Legendary\nPokémon of the moon."
    fr: "Une flûte dont le timbre permettait d’exprimer\nsa reconnaissance au Pokémon légendaire de la lune."
    it: "Flauto il cui dolce suono esprime la riconoscenza\ndegli esseri umani verso il Pokémon leggendario\ndella luna."
    de: "Auf dieser Flöte soll eine Melodie gespielt worden sein,\num dem Legendären Mond-Pokémon Dank zu sagen."
    es: "Flauta que se hace sonar como muestra de gratitud\nhacia el Pokémon legendario de la luna."
    ko: "달의 전설포켓몬에게\n감사의 마음을 표현하기 위해\n음색을 바쳤다고 한다."
    zh_simp: "为了对月亮的\n传说的宝可梦表达感激之情，\n据说会用它来献上美乐。"
    zh_trad: "為了對月亮的\n傳說的寶可夢表達感激之情，\n據說會用它來獻上美樂。"
moon_stone:
  names:
    jp_kana: つきのいし
    jp_kanji: つきのいし
    en: Moon Stone
    fr: Pierre Lune
    it: Pietralunare
    de: Mondstein
    es: Piedra Lunar
    ko: 달의돌
    zh_simp: 月之石
    zh_trad: 月之石
  descriptions:
    jp_kana: "ある　とくていの　ポケモンを\nしんかさせる　ふしぎな　いし。\nよぞらのように　くろい。"
    jp_kanji: "ある　特定の　ポケモンを\n進化させる　不思議な　石。\n夜空のように　黒い。"
    en: "A peculiar stone that can make certain species of\nPokémon evolve. It is as black as the night sky."
    fr: "Une pierre étrange qui fait évoluer certaines espèces\nde Pokémon. Elle est sombre comme la nuit."
    it: "Pietra particolare che fa evolvere determinate\nspecie di Pokémon. È nera come la notte."
    de: "Dieser spezielle Stein löst bei bestimmten Pokémon\ndie Entwicklung aus. Er ist schwarz wie die Nacht."
    es: "Curiosa piedra que hace evolucionar a determinadas\nespecies de Pokémon. Es oscura como la noche."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 돌.\n밤하늘처럼 까맣다."
    zh_simp: "能让某些特定宝可梦\n进化的神奇石头。\n像夜空一样乌黑。"
    zh_trad: "能讓特定寶可夢\n進化的神奇石頭。\n像夜空一樣深黑。"
mr_mime_candy:
  names:
    jp_kana: バリヤードのアメ
    jp_kanji: バリヤードのアメ
    en: Mr. Mime Candy
    fr: Bonbon M. Mime
    it: Caramella Mr. Mime
    de: Pantimos-Bonbon
    es: Caramelo Mr. Mime
    ko: 마임맨의사탕
    zh_simp: 魔墙人偶的糖果
    zh_trad: 魔牆人偶的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de cierto Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
muscle_band:
  names:
    jp_kana: ちからのハチマキ
    jp_kanji: ちからのハチマキ
    en: Muscle Band
    fr: Bandeau Muscle
    it: Muscolbanda
    de: Muskelband
    es: Cinta Fuerte
    ko: 힘의머리띠
    zh_simp: 力量头带
    zh_trad: 力量頭帶
  descriptions:
    jp_kana: "ちからが　わいてくる　ハチマキ。\nもたせると　ぶつりわざの\nいりょくが　すこし　あがる。"
    jp_kanji: "ちからが　わいてくる　ハチマキ。\n持たせると　物理技の\n威力が　少し　あがる。"
    en: "An item to be held by a Pokémon. This headband\nexudes strength, slightly boosting the power of\nphysical moves."
    fr: "Objet à tenir. Un bandeau qui augmente légèrement\nla puissance des capacités physiques."
    it: "Strumento da dare a un Pokémon.\nFascia che potenzia di poco le mosse fisiche."
    de: "Ein Item zum Tragen. Dieses Stirnband verstärkt\nphysische Attacken etwas."
    es: "Cinta del pelo que aumenta ligeramente la potencia de\nlos ataques físicos. Debe llevarla un Pokémon."
    ko: "힘이 끓어오르는 머리띠.\n지니게 하면 물리 기술의\n위력이 조금 올라간다."
    zh_simp: "力如泉涌的头带。\n携带后，物理招式的\n威力就会少量提高。"
    zh_trad: "力如泉湧的頭帶。\n攜帶後，物理招式的\n威力就會少量提高。"
muscle_feather:
  names:
    jp_kana: きんりょくのハネ
    jp_kanji: きんりょくのハネ
    en: Muscle Feather
    fr: Plume Force
    it: Piumpotenza
    de: Kraftfeder
    es: Pluma Músculo
    ko: 근력날개
    zh_simp: 肌力之羽
    zh_trad: 肌力之羽
  descriptions:
    jp_kana: "ポケモンに　つかう　どうぐ。\nポケモン　１ひきの　こうげきの\nきそポイントを　ちょっと　あげる。"
    jp_kanji: "ポケモンに　使う　道具。\nポケモン　１匹の　攻撃の\n基礎ポイントを　ちょっと　あげる。"
    en: "An item for use on a Pokémon. It slightly increases\nthe Attack base points of a single Pokémon."
    fr: "Objet à utiliser sur un Pokémon pour un peu augmenter\nson Attaque de base."
    it: "Strumento da usare su un Pokémon.\nNe aumenta di poco i punti base dell’Attacco."
    de: "Wendet man dieses Item auf ein Pokémon an, wird\ndessen Angriffs-Basiswert dauerhaft erhöht."
    es: "Pluma que aumenta un poco el Ataque de base de un\nPokémon."
    ko: "포켓몬에게 사용하는 도구.\n포켓몬 1마리의 공격\n기초 포인트를 조금 올린다."
    zh_simp: "用于宝可梦的道具。\n能稍微提高１只宝可梦的\n攻击的基础点数。"
    zh_trad: "用於寶可夢的道具。\n能稍微提高１隻寶可夢的\n攻擊的基礎點數。"
mysterious_shard_l:
  names:
    jp_kana: なぞのかけらＬ
    jp_kanji: なぞのかけらＬ
    en: Mysterious Shard L
    fr: Éclat Étrange L
    it: Frammento insolito L
    de: Enigmafragment L
    es: Esquirla Extraña L
    ko: 수수께끼의조각L
    zh_simp: 谜之碎片Ｌ
    zh_trad: 謎之碎片Ｌ
  descriptions:
    jp_kana: "ふしぎな　ちからを　かんじる　おおきなかけら。\nかけらの　なかに　ハマナスの　はなの\nような　もようが　うかんでいる。"
    jp_kanji: "不思議な　力を　感じる　大きなかけら。\nかけらの　中に　ハマナスの　花の\nような　模様が　浮かんでいる。"
    en: "A large shard that emanates an enigmatic power.\nInside the shard, you can see a pattern that looks like\nRamanas roses."
    fr: "Un gros éclat qui dégage une étrange énergie.\nOn aperçoit à l’intérieur un motif qui rappelle\nla variété de fleurs Rosa rugosa."
    it: "Frammento di grandi dimensioni che emana un’energia\nmisteriosa. Al suo interno è visibile un motivo floreale\nche ricorda una rosa rugosa."
    de: "Ein großes Fragment, von dem eine rätselhafte Kraft\nausgeht. Die Musterung in seinem Inneren erinnert an\nHamanasu-Rosen."
    es: "Una gran esquirla de la que emana una misteriosa\nenergía y en cuyo interior se aprecia un motivo que\nrecuerda a una rosa rugosa Hansa."
    ko: "신비한 힘이 느껴지는 큰 조각.\n조각 안에 해당화 같은 무늬가 보인다."
    zh_simp: "能够感受到神秘力量的大碎片。\n碎片上浮现出了像玫瑰花一样的花纹。"
    zh_trad: "能感受到神奇力量的大碎片。\n碎片中浮現著像是玫瑰花的花紋。"
mysterious_shard_s:
  names:
    jp_kana: なぞのかけらＳ
    jp_kanji: なぞのかけらＳ
    en: Mysterious Shard S
    fr: Éclat Étrange S
    it: Frammento insolito S
    de: Enigmafragment S
    es: Esquirla Extraña S
    ko: 수수께끼의조각S
    zh_simp: 谜之碎片Ｓ
    zh_trad: 謎之碎片Ｓ
  descriptions:
    jp_kana: "ふしぎな　ちからを　かんじる　ちいさなかけら。\nかけらの　なかに　ハマナスの　はなの\nような　もようが　うかんでいる。"
    jp_kanji: "不思議な　力を　感じる　小さなかけら。\nかけらの　中に　ハマナスの　花の\nような　模様が　浮かんでいる。"
    en: "A small shard that emanates an enigmatic power.\nInside the shard, you can see a pattern that looks like\nRamanas roses."
    fr: "Un petit éclat qui dégage une étrange énergie.\nOn aperçoit à l’intérieur un motif qui rappelle\nla variété de fleurs Rosa rugosa."
    it: "Frammento di piccole dimensioni che emana un’energia\nmisteriosa. Al suo interno è visibile un motivo floreale\nche ricorda una rosa rugosa."
    de: "Ein kleines Fragment, von dem eine rätselhafte Kraft\nausgeht. Die Musterung in seinem Inneren erinnert an\nHamanasu-Rosen."
    es: "Una pequeña esquirla de la que emana una misteriosa\nenergía y en cuyo interior se aprecia un motivo que\nrecuerda a una rosa rugosa Hansa."
    ko: "신비한 힘이 느껴지는 작은 조각.\n조각 안에 해당화 같은 무늬가 보인다."
    zh_simp: "能够感受到神秘力量的小碎片。\n碎片上浮现出了像玫瑰花一样的花纹。"
    zh_trad: "能感受到神奇力量的小碎片。\n碎片中浮現著像是玫瑰花的花紋。"
mystery_egg:
  names:
    jp_kana: ふしぎなタマゴ
    jp_kanji: ふしぎなタマゴ
    en: Mystery Egg
    fr: Œuf Mystère
    it: Uovo Mistero
    de: Rätsel-Ei
    es: Huevo Misterioso
    ko: 이상한알
    zh_simp: 神奇蛋
    zh_trad: 神奇蛋
  descriptions:
    jp_kana: "ポケモンじいさんから　あずかった\nふしぎな　もようの　タマゴ。\nなんの　タマゴか　わからない。"
    jp_kanji: "ポケモンじいさんから　あずかった\n不思議な　もようの　タマゴ。\nなんの　タマゴか　わからない。"
    en: "A mysterious Egg obtained from Mr. Pokémon.\nWhat is in the Egg is unknown."
    fr: "Un Œuf étrange confié par M. Pokémon.\nPersonne ne sait ce qu’il contient."
    it: "Uovo dai disegni bizzarri che si riceve da\nMr. Pokémon. Non si sa che cosa contenga."
    de: "Ein seltsam gemustertes Ei, das du von Mr. Pokémon\nerhalten hast. Sein Inhalt liegt im Dunkeln."
    es: "Misterioso Huevo con dibujos que obtienes del\nSr. Pokémon. Nadie sabe qué contiene."
    ko: "포켓몬 할아버지로부터 받은\n이상한 모양의 알.\n어떤 알인지 모른다."
    zh_simp: "从宝可梦爷爷那里得到的\n有着神奇花纹的蛋。\n不知道是什么的蛋。"
    zh_trad: "從寶可夢爺爺那裡得到的\n有著神奇花紋的蛋。\n不知道是什麼的蛋。"
mystic_water:
  names:
    jp_kana: しんぴのしずく
    jp_kanji: しんぴのしずく
    en: Mystic Water
    fr: Eau Mystique
    it: Acqua Magica
    de: Zauberwasser
    es: Agua Mística
    ko: 신비의물방울
    zh_simp: 神秘水滴
    zh_trad: 神秘水滴
  descriptions:
    jp_kana: "しずくの　かたちの　ほうせき。\nもたせると　みずタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "しずくの　形の　宝石。\n持たせると　みずタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon.\nThis teardrop-shaped gem boosts the\npower of Water-type moves."
    fr: "Objet à tenir. Une gemme en forme de goutte d’eau\nqui augmente la puissance des capacités de type Eau."
    it: "Strumento da dare a un Pokémon.\nGemma a forma di goccia che potenzia le mosse\ndi tipo Acqua."
    de: "Ein Item zum Tragen. Ein tränenförmiger Edelstein,\nder Attacken vom Typ Wasser verstärkt."
    es: "Gema con forma de gota de agua que fortalece los\nmovimientos de tipo Agua. Debe llevarla un Pokémon."
    ko: "물방울 모양의 보석.\n지니게 하면 물타입\n기술의 위력이 올라간다."
    zh_simp: "水滴形状的宝石。\n携带后，水属性的\n招式威力就会提高。"
    zh_trad: "水滴形狀的寶石。\n攜帶後，水屬性的\n招式威力就會提高。"
n_lunarizer:fuse:
  names:
    jp_kana: ネクロプラスルナ
    jp_kanji: ネクロプラスルナ
    en: N-Lunarizer
    fr: Necroluna
    it: Necrolunix
    de: Necrolun
    es: Necroluna
    ko: 네크로플러스루나
    zh_simp: 奈克洛露奈合体器
    zh_trad: 奈克洛露奈合體器
  descriptions:
    jp_kana: "ひかりを　ひつようと　する\nネクロズマと　ルナアーラを\nがったい　させるための　マシン。"
    jp_kanji: "光を　必要と　する\nネクロズマと　ルナアーラを\n合体　させるための　マシン。"
    en: "A machine to fuse Necrozma, which needs light,\nand Lunala."
    fr: "Un appareil permettant à un Necrozma assoiffé\nde lumière de fusionner avec Lunala."
    it: "Dispositivo che permette a Necrozma di fondersi\ncon Lunala quando necessita di luce."
    de: "Necrozma, das Licht benötigt, kann mithilfe dieser\nMaschine mit Lunala fusioniert werden."
    es: "Artefacto que permite fusionar a Necrozma, ávido\nde luz, con Lunala."
    ko: "빛을 필요로 하는\n네크로즈마와 루나아라를\n합체시키기 위한 머신."
    zh_simp: "用来让需求光的奈克洛兹玛和\n露奈雅拉合体的机器。"
    zh_trad: "用來讓需要光的奈克洛茲瑪和\n露奈雅拉合體的機器。"
n_lunarizer:separate:
  names:
    jp_kana: ネクロプラスルナ
    jp_kanji: ネクロプラスルナ
    en: N-Lunarizer
    fr: Necroluna
    it: Necrolunix
    de: Necrolun
    es: Necroluna
    ko: 네크로플러스루나
    zh_simp: 奈克洛露奈合体器
    zh_trad: 奈克洛露奈合體器
  descriptions:
    jp_kana: "ひかりを　ひつようと　していた\nネクロズマと　ルナアーラを\nぶんり　させるための　マシン。"
    jp_kanji: "光を　必要と　していた\nネクロズマと　ルナアーラを\n分離　させるための　マシン。"
    en: "A machine to separate Necrozma, which needed\nlight, from Lunala."
    fr: "Un appareil permettant d’annuler la fusion\nd’un Necrozma assoiffé de lumière avec Lunala."
    it: "Dispositivo che permette a Necrozma di separarsi\nda Lunala quando non necessita più di luce."
    de: "Necrozma, das Licht benötigte, kann mithilfe dieser\nMaschine wieder von Lunala getrennt werden."
    es: "Artefacto que permite separar a Necrozma, ávido\nde luz, tras su fusión con Lunala."
    ko: "빛을 필요로 했던\n네크로즈마와 루나아라를\n분리시키기 위한 머신."
    zh_simp: "用来让曾需求过光的奈克洛兹玛和\n露奈雅拉分离的机器。"
    zh_trad: "用來讓需要光的奈克洛茲瑪和\n露奈雅拉分離的機器。"
n_solarizer:fuse:
  names:
    jp_kana: ネクロプラスソル
    jp_kanji: ネクロプラスソル
    en: N-Solarizer
    fr: Necrosol
    it: Necrosolix
    de: Necrosol
    es: Necrosol
    ko: 네크로플러스솔
    zh_simp: 奈克洛索尔合体器
    zh_trad: 奈克洛索爾合體器
  descriptions:
    jp_kana: "ひかりを　ひつようと　する\nネクロズマと　ソルガレオを\nがったい　させるための　マシン。"
    jp_kanji: "光を　必要と　する\nネクロズマと　ソルガレオを\n合体　させるための　マシン。"
    en: "A machine to fuse Necrozma, which needs light,\nand Solgaleo."
    fr: "Un appareil permettant à un Necrozma assoiffé\nde lumière de fusionner avec Solgaleo."
    it: "Dispositivo che permette a Necrozma di fondersi\ncon Solgaleo quando necessita di luce."
    de: "Necrozma, das Licht benötigt, kann mithilfe dieser\nMaschine mit Solgaleo fusioniert werden."
    es: "Artefacto que permite fusionar a Necrozma, ávido\nde luz, con Solgaleo."
    ko: "빛을 필요로 하는\n네크로즈마와 솔가레오를\n합체시키기 위한 머신."
    zh_simp: "用来让需求光的奈克洛兹玛和\n索尔迦雷欧合体的机器。"
    zh_trad: "用來讓需要光的奈克洛茲瑪和\n索爾迦雷歐合體的機器。"
n_solarizer:separate:
  names:
    jp_kana: ネクロプラスソル
    jp_kanji: ネクロプラスソル
    en: N-Solarizer
    fr: Necrosol
    it: Necrosolix
    de: Necrosol
    es: Necrosol
    ko: 네크로플러스솔
    zh_simp: 奈克洛索尔合体器
    zh_trad: 奈克洛索爾合體器
  descriptions:
    jp_kana: "ひかりを　ひつようと　していた\nネクロズマと　ソルガレオを\nぶんり　させるための　マシン。"
    jp_kanji: "光を　必要と　していた\nネクロズマと　ソルガレオを\n分離　させるための　マシン。"
    en: "A machine to separate Necrozma, which needed\nlight, from Solgaleo."
    fr: "Un appareil permettant d’annuler la fusion\nd’un Necrozma assoiffé de lumière avec Solgaleo."
    it: "Dispositivo che permette a Necrozma di separarsi\nda Solgaleo quando non necessita più di luce."
    de: "Necrozma, das Licht benötigte, kann mithilfe dieser\nMaschine wieder von Solgaleo getrennt werden."
    es: "Artefacto que permite separar a Necrozma, ávido\nde luz, tras su fusión con Solgaleo."
    ko: "빛을 필요로 했던\n네크로즈마와 솔가레오를\n분리시키기 위한 머신."
    zh_simp: "用来让曾需求过光的奈克洛兹玛和\n索尔迦雷欧分离的机器。"
    zh_trad: "用來讓需要光的奈克洛茲瑪和\n索爾迦雷歐分離的機器。"
naive_mint:
  names:
    jp_kana: むじゃきミント
    jp_kanji: むじゃきミント
    en: Naive Mint
    fr: Aromate Naïf
    it: Menta Ingenua
    de: Naiv-Minze
    es: Menta Ingenua
    ko: 천진난만민트
    zh_simp: 天真薄荷
    zh_trad: 天真薄荷
  descriptions:
    jp_kana: "ポケモンに　かおりを　かがせると\nすばやさが　あがりやすく　なるが\nとくぼうは　あがりにくくなる　ミント。"
    jp_kanji: "ポケモンに　香りを　かがせると\n素早さが　上がりやすく　なるが\n特防は　上がりにくくなる　ミント。"
    en: "When a Pokémon smells this mint, its Speed will grow\nmore easily, but its Sp. Def will grow more slowly."
    fr: "Si un Pokémon hume cet aromate, sa Vitesse\nmontera plus facilement, mais sa Défense Spéciale\nse développera plus lentement."
    it: "Quando un Pokémon ne sente il profumo,\nla sua Velocità aumenta più facilmente\na scapito della Difesa Speciale."
    de: "Lässt man ein Pokémon an dieser Minze schnuppern,\nsteigt seine Initiative schneller, aber seine\nSpezial-Verteidigung umso langsamer."
    es: "Cuando un Pokémon percibe su aroma, aumenta\ncon más facilidad su Velocidad, en detrimento de su\nDefensa Especial."
    ko: "포켓몬에게 향기를 맡게 하면\n스피드가 오르기 쉬워지지만\n특수방어가 오르기 어려워지는 민트."
    zh_simp: "宝可梦闻了这种薄荷之后，\n会令速度容易提高，\n而特防则难以提高。"
    zh_trad: "讓寶可夢聞這種薄荷的氣味，\n會令速度變得容易提高，\n但特防則難以提高。"
nanab_berry:
  names:
    jp_kana: ナナのみ
    jp_kanji: ナナのみ
    en: Nanab Berry
    fr: Baie Nanab
    it: Baccabana
    de: Nanabbeere
    es: Baya Latano
    ko: 나나열매
    zh_simp: 蕉香果
    zh_trad: 蕉香果
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。\nふかふかのつちに　うめると\nナナが　そだつ。"
    jp_kanji: "ポフィンの　材料。\nふかふかの土に　埋めると\nナナが　育つ。"
    en: "A Poffin ingredient. Bury it in soft soil to grow a\nNanab Berry plant."
    fr: "Un ingrédient entrant dans la confection de Poffins.\nPlantez cette Baie dans un sol meuble et fertile\npour faire pousser un arbre à Baies Nanab."
    it: "Si usa per fare i poffin. Seminala nella terra soffice\nper far crescere una pianta di Baccabana."
    de: "Eine Knursp-Zutat. Pflanze sie in weichen Lehmboden\nein, damit neue Nanabbeeren wachsen."
    es: "Ingrediente para pokochos. Si se planta en tierra suelta,\nsaldrá una planta de Latano."
    ko: "포핀의 재료.\n푹신푹신한 땅에 심으면\n나나가 자란다."
    zh_simp: "宝芬的材料。\n埋在松软的土地里\n可以培育出蕉香。"
    zh_trad: "製作寶芬的材料。\n埋進鬆軟的泥土裡，\n長成後會結出蕉香。"
naughty_mint:
  names:
    jp_kana: やんちゃミント
    jp_kanji: やんちゃミント
    en: Naughty Mint
    fr: Aromate Mauvais
    it: Menta Birbona
    de: Frech-Minze
    es: Menta Pícara
    ko: 개구쟁이민트
    zh_simp: 顽皮薄荷
    zh_trad: 頑皮薄荷
  descriptions:
    jp_kana: "ポケモンに　かおりを　かがせると\nこうげきが　あがりやすく　なるが\nとくぼうは　あがりにくくなる　ミント。"
    jp_kanji: "ポケモンに　香りを　かがせると\n攻撃が　上がりやすく　なるが\n特防は　上がりにくくなる　ミント。"
    en: "When a Pokémon smells this mint, its Attack will grow\nmore easily, but its Sp. Def will grow more slowly."
    fr: "Si un Pokémon hume cet aromate, son Attaque\nmontera plus facilement, mais sa Défense Spéciale\nse développera plus lentement."
    it: "Quando un Pokémon ne sente il profumo, il suo Attacco\naumenta più facilmente a scapito della Difesa Speciale."
    de: "Lässt man ein Pokémon an dieser Minze schnuppern,\nsteigt sein Angriff schneller, aber seine\nSpezial-Verteidigung umso langsamer."
    es: "Cuando un Pokémon percibe su aroma, aumenta con\nmás facilidad su Ataque, en detrimento de su Defensa\nEspecial."
    ko: "포켓몬에게 향기를 맡게 하면\n공격이 오르기 쉬워지지만\n특수방어가 오르기 어려워지는 민트."
    zh_simp: "宝可梦闻了这种薄荷之后，\n会令攻击容易提高，\n而特防则难以提高。"
    zh_trad: "讓寶可夢聞這種薄荷的氣味，\n會令攻擊變得容易提高，\n但特防則難以提高。"
nest_ball:
  names:
    jp_kana: ネストボール
    jp_kanji: ネストボール
    en: Nest Ball
    fr: Faiblo Ball
    it: Minor Ball
    de: Nestball
    es: Nido Ball
    ko: 네스트볼
    zh_simp: 巢穴球
    zh_trad: 巢穴球
  descriptions:
    jp_kana: "つかまえる　やせいの　ポケモンが\nよわいほど　つかまえやすくなる\nちょっと　かわった　ボール。"
    jp_kanji: "捕まえる　野生の　ポケモンが\n弱いほど　捕まえやすくなる\nちょっと　変わった　ボール。"
    en: "A somewhat different Poké Ball that becomes more\neffective the lower the level of the wild Pokémon."
    fr: "Une Poké Ball un peu spéciale qui fonctionne\nparticulièrement bien sur les Pokémon les plus faibles."
    it: "Poké Ball un po’ diversa. Risulta particolarmente\nefficace sui Pokémon selvatici più deboli."
    de: "Ein Ball, dessen Erfolgsquote besonders bei Pokémon\nmit niedrigem Level sehr hoch ist."
    es: "Es algo distinta a las demás. Funciona especialmente\nbien con los Pokémon salvajes de nivel bajo."
    ko: "잡으려는 야생 포켓몬이\n약할수록 잡기 쉬워지는\n조금 특이한 볼."
    zh_simp: "有点与众不同的球。\n捕捉的野生宝可梦越弱，\n就会越容易捕捉。"
    zh_trad: "有點與眾不同的球。\n捕捉的野生寶可夢越弱，\n就越容易捉到。"
net_ball:
  names:
    jp_kana: ネットボール
    jp_kanji: ネットボール
    en: Net Ball
    fr: Filet Ball
    it: Rete Ball
    de: Netzball
    es: Malla Ball
    ko: 넷트볼
    zh_simp: 捕网球
    zh_trad: 捕網球
  descriptions:
    jp_kana: "みずタイプと　むしタイプの\nポケモンが　つかまえやすくなる\nちょっと　かわった　ボール。"
    jp_kanji: "みずタイプと　むしタイプの\nポケモンが　捕まえやすくなる\nちょっと　変わった　ボール。"
    en: "A somewhat different Poké Ball that is more\neffective when attempting to catch Water- or\nBug-type Pokémon."
    fr: "Une Poké Ball un peu spéciale qui fonctionne\nparticulièrement bien sur les Pokémon Eau ou Insecte."
    it: "Poké Ball un po’ diversa. Risulta particolarmente\nefficace sui Pokémon di tipo Acqua e Coleottero."
    de: "Ein Ball, der sich besonders gut eignet, um Wasser-\nund Käfer-Pokémon zu fangen."
    es: "Es algo distinta a las demás. Funciona especialmente\nbien con los Pokémon de tipo Agua y Bicho."
    ko: "물타입과 벌레타입의\n포켓몬을 잡기 쉬워지는\n조금 특이한 볼."
    zh_simp: "有点与众不同的球。\n能很容易地捕捉\n水属性和虫属性的宝可梦。"
    zh_trad: "有點與眾不同的球。\n能更容易地捉到\n水屬性和蟲屬性寶可夢。"
never_melt_ice:
  names:
    jp_kana: とけないこおり
    jp_kanji: とけないこおり
    en: Never-Melt Ice
    fr: Glace Éternelle
    it: Gelomai
    de: Ewiges Eis
    es: Antiderretir
    ko: 녹지않는얼음
    zh_simp: 不融冰
    zh_trad: 不融冰
  descriptions:
    jp_kana: "ねつを　よせつけない　こおり。\nもたせると　こおりタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "熱を　よせつけない　氷。\n持たせると　こおりタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon. It’s a heat-\nrepelling piece of ice that boosts the power of\nIce-type moves."
    fr: "Objet à tenir. Un morceau de glace qui réfléchit\nla chaleur et augmente la puissance des capacités\nde type Glace."
    it: "Strumento da dare a un Pokémon.\nPezzo di ghiaccio che respinge il calore e potenzia\nle mosse di tipo Ghiaccio."
    de: "Ein Item zum Tragen. Ein Stück Eis, das Hitze fernhält\nund Attacken vom Typ Eis verstärkt."
    es: "Fragmento de hielo que repele el calor y fortalece los\nmovimientos de tipo Hielo. Debe llevarlo un Pokémon."
    ko: "열을 가까이하지 않게 하는 얼음.\n지니게 하면 얼음타입\n기술의 위력이 올라간다."
    zh_simp: "能隔绝热量的冰。\n携带后，冰属性的\n招式威力就会提高。"
    zh_trad: "隔絕熱的冰。\n攜帶後，冰屬性的\n招式威力就會提高。"
nidoran_f_candy:
  names:
    jp_kana: ニドラン♀のアメ
    jp_kanji: ニドラン♀のアメ
    en: Nidoran♀ Candy
    fr: Bonbon Nidoran♀
    it: Caramella Nidoran♀
    de: Nidoran♀-Bonbon
    es: Caramelo Nidoran♀
    ko: 니드런♀의사탕
    zh_simp: 尼多兰的糖果
    zh_trad: 尼多蘭的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
nidoran_m_candy:
  names:
    jp_kana: ニドラン♂のアメ
    jp_kanji: ニドラン♂のアメ
    en: Nidoran♂ Candy
    fr: Bonbon Nidoran♂
    it: Caramella Nidoran♂
    de: Nidoran♂-Bonbon
    es: Caramelo Nidoran♂
    ko: 니드런♂의사탕
    zh_simp: 尼多朗的糖果
    zh_trad: 尼多朗的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
nomel_berry:
  names:
    jp_kana: ノメルのみ
    jp_kanji: ノメルのみ
    en: Nomel Berry
    fr: Baie Tronci
    it: Baccalemon
    de: Tronzibeere
    es: Baya Monli
    ko: 노멜열매
    zh_simp: 檬柠果
    zh_trad: 檬檸果
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。\nふかふかのつちに　うめると\nノメルが　そだつ。"
    jp_kanji: "ポフィンの　材料。\nふかふかの土に　埋めると\nノメルが　育つ。"
    en: "A Poffin ingredient. Bury it in soft soil to grow a\nNomel Berry plant."
    fr: "Un ingrédient entrant dans la confection de Poffins.\nPlantez cette Baie dans un sol meuble et fertile\npour faire pousser un arbre à Baies Tronci."
    it: "Si usa per fare i poffin. Seminala nella terra soffice\nper far crescere una pianta di Baccalemon."
    de: "Eine Knursp-Zutat. Pflanze sie in weichen Lehmboden\nein, damit neue Tronzibeeren wachsen."
    es: "Ingrediente para pokochos. Si se planta en tierra suelta,\nsaldrá una planta de Monli."
    ko: "포핀의 재료.\n푹신푹신한 땅에 심으면\n노멜이 자란다."
    zh_simp: "宝芬的材料。\n埋在松软的土地里\n可以培育出檬柠。"
    zh_trad: "製作寶芬的材料。\n埋進鬆軟的泥土裡，\n長成後會結出檬檸。"
normal_gem:
  names:
    jp_kana: ノーマルジュエル
    jp_kanji: ノーマルジュエル
    en: Normal Gem
    fr: Joyau Normal
    it: Bijounormale
    de: Normaljuwel
    es: Gema Normal
    ko: 노말주얼
    zh_simp: 一般宝石
    zh_trad: 一般寶石
  descriptions:
    jp_kana: "ノーマルの　タイプの　ジュエル。\nもたせると　いちどだけ　ノーマルの\nわざの　いりょくが　つよまる。"
    jp_kanji: "ノーマルの　タイプの　ジュエル。\n持たせると　１度だけ　ノーマルの\n技の　威力が　強まる。"
    en: "A gem with an ordinary essence. When held, it\nstrengthens the power of a Normal-type move\none time."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Normal."
    it: "Strumento da dare a un Pokémon.\nGioiello che potenzia una sola volta le mosse\ndi tipo Normale."
    de: "Ein Juwel vom Typ Normal. Es erhöht einmalig die\nStärke einer Attacke vom Typ Normal."
    es: "Joya de un solo uso que potencia los movimientos de\ntipo Normal. Debe llevarla un Pokémon."
    ko: "노말타입의 주얼.\n지니게 하면 한 번만 노말\n기술의 위력이 강해진다."
    zh_simp: "一般属性的宝石。\n携带后，一般属性的\n招式威力仅会增强１次。"
    zh_trad: "一般屬性的寶石。\n攜帶後，一般屬性招式的\n威力會僅增強１次。"
normalium_z:bag:
  names:
    jp_kana: ノーマルＺ
    jp_kanji: ノーマルＺ
    en: Normalium Z
    fr: Normazélite
    it: Normium Z
    de: Normium Z
    es: Normastal Z
    ko: 노말Z
    zh_simp: 一般Ｚ
    zh_trad: 一般Ｚ
  descriptions:
    jp_kana: "ノーマルタイプの　わざを\nＺワザに　グレードアップする\nＺパワーの　けっしょうを　つくりだす。"
    jp_kanji: "ノーマルタイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nNormal-type moves to Normal-type Z-Moves."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise son porteur à transformer ses capacités\nde type Normal en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono ai Pokémon di trasformare le mosse\ndi tipo Normale in mosse Z."
    de: "Kristallisierte Z-Kraft, die Normal-Attacken zu\nZ-Attacken aufstuft. Wird bei Bedarf automatisch\nvervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a los\nportadores convertir sus movimientos de tipo Normal\nen movimientos Z."
    ko: "노말타입 기술을\nZ기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将一般属性招式升级成\nＺ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把一般屬性招式\n升級為Ｚ招式的Ｚ力量結晶。"
normalium_z:held:
  names:
    jp_kana: ノーマルＺ
    jp_kanji: ノーマルＺ
    en: Normalium Z
    fr: Normazélite
    it: Normium Z
    de: Normium Z
    es: Normastal Z
    ko: 노말Z
    zh_simp: 一般Ｚ
    zh_trad: 一般Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　けっしょう。\nノーマルタイプの　わざを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nノーマルタイプの　技を\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Normal-type moves to Z-Moves."
    fr: "Une cristallisation de la Force Z, permettant\nde transformer les capacités de type Normal\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare le mosse di tipo Normale\nin mosse Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft\nNormal-Attacken zu Z-Attacken auf."
    es: "Cristal que confiere el Poder Z a los movimientos\nde tipo Normal."
    ko: "Z파워의 결정.\n노말타입 기술을\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将一般属性的招式\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把一般屬性的招式\n升級為Ｚ招式。"
nugget:
  names:
    jp_kana: きんのたま
    jp_kanji: きんのたま
    en: Nugget
    fr: Pépite
    it: Pepita
    de: Nugget
    es: Pepita
    ko: 금구슬
    zh_simp: 金珠
    zh_trad: 金珠
  descriptions:
    jp_kana: "キラキラと　きんいろに　ひかる\nじゅんきん　せいの　たま。\nショップで　たかく　うれる。"
    jp_kanji: "キラキラと　金色に　光る\n純金製の　玉。\nショップで　高く　売れる。"
    en: "A nugget of the purest gold that gives off a lustrous\ngleam in direct light. It can be sold at a high price\nto shops."
    fr: "Une pépite d’or pur qui brille d’un éclat magnifique.\nPeut être vendue à bon prix en magasin."
    it: "Pepita d’oro puro dal luccichio sfavillante.\nSi può vendere a un prezzo piuttosto alto\nnei negozi."
    de: "Ein Nugget aus purem Gold, das einen schimmernden\nGlanz besitzt. Es ist von großem Wert."
    es: "Pepita de oro puro que desprende un brillo\nespectacular. Puede venderse a un precio muy alto en\nlas tiendas."
    ko: "금색으로 반짝반짝 빛나는\n순금으로 만들어진 구슬.\n상점에서 비싸게 팔린다."
    zh_simp: "闪着金光，\n以纯金制成的珠子。\n可以在商店高价出售。"
    zh_trad: "閃著金光的\n純金製珠子。\n可以在商店高價出售。"
oaks_letter:
  names:
    jp_kana: オーキドのてがみ
    jp_kanji: オーキドのてがみ
    en: Oak’s Letter
    fr: Lettre Chen
    it: Lettera Oak
    de: Eichs Brief
    es: Carta Prof. Oak
    ko: 오박사의편지
    zh_simp: 大木的信
    zh_trad: 大木的信
  descriptions:
    jp_kana: "オーキドはかせ　からの　てがみ。\nなかには　２２４ばんどうろに\nきてほしいと　かかれている。"
    jp_kanji: "オーキド博士からの　手紙。\n中には　２２４番道路に\n来てほしいと　書かれている。"
    en: "A letter from Professor Oak. Written in it is a\nrequest for you to go to Route 224."
    fr: "Une lettre du Professeur Chen vous demandant\nde vous rendre sur la Route 224."
    it: "Lettera del Professor Oak con la richiesta di dirigerti\nverso il Percorso 224."
    de: "Ein Brief von Professor Eich. Er bittet dich,\nzur Route 224 zu gehen."
    es: "Carta del Profesor Oak en la que se te pide que vayas a\nla Ruta 224."
    ko: "오박사의 편지다.\n안에는 224번도로로\n와 달라고 적혀 있다."
    zh_simp: "大木博士的来信。\n上面写着请来２２４号道路。"
    zh_trad: "來自大木博士的信。\n上面寫著請來\n２２４號道路。"
occa_berry:
  names:
    jp_kana: オッカのみ
    jp_kanji: オッカのみ
    en: Occa Berry
    fr: Baie Chocco
    it: Baccacao
    de: Koakobeere
    es: Baya Caoca
    ko: 오카열매
    zh_simp: 巧可果
    zh_trad: 巧可果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　ほのお　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　ほのお技を\n受けたとき　威力が　弱まる。"
    en: "If held by a Pokémon, this Berry will lessen the\ndamage taken from one supereffective\nFire-type attack."
    fr: "Tenue, cette Baie affaiblit une attaque ennemie\nsuper efficace de type Feu."
    it: "Se un Pokémon ha questa bacca, l’attacco\nsuperefficace di tipo Fuoco del nemico\nviene indebolito."
    de: "Als getragenes Item schwächt diese Beere sehr effektive\ngegnerische Attacken vom Typ Feuer."
    es: "Si la lleva un Pokémon, debilita un ataque supereficaz\nde tipo Fuego de un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 굉장한 불꽃 기술로\n공격받았을 때 위력이 약해진다."
    zh_simp: "让宝可梦携带后，\n在受到效果绝佳的火属性招式\n攻击时，能令其威力减弱。"
    zh_trad: "讓寶可夢攜帶後，\n在受到效果絕佳的火屬性招式\n攻擊時，能使其威力減弱。"
oceanic_slate:
  names:
    jp_kana: たいかいのせきばん
    jp_kanji: たいかいのせきばん
    en: Oceanic Slate
    fr: Tablette Océans
    it: Piastra dei mari
    de: Meeresplatte
    es: Losa Mar
    ko: 대해의석판
    zh_simp: 大海石板
    zh_trad: 大海石板
  descriptions:
    jp_kana: "ふしぎな　ちからに　あふれる　せきばん。\nハマナスパークの　たいかいのへやと\nふかい　つながりを　かんじる。"
    jp_kanji: "不思議な　力に　あふれる　石板。\nハマナスパークの　大海の部屋と\n深い　つながりを　感じる。"
    en: "A slate overflowing with enigmatic energy. You can feel\na strong connection between it and the Oceanic Room\nat Ramanas Park."
    fr: "Une tablette qui regorge d’une étrange énergie.\nElle semble intimement liée à la Salle des Océans\ndu Parc Rosa Rugosa."
    it: "Lastra di pietra che emana una misteriosa energia.\nSembra profondamente connessa alla Stanza dei mari\ndel Parco Rosa Rugosa."
    de: "Eine Platte, die vor rätselhafter Energie strotzt.\nMan kann eine starke Verbindung zwischen ihr und der\nMeereskammer im Hamanasu-Park spüren."
    es: "Una losa rebosante de una misteriosa energía.\nParece estrechamente relacionada con la Sala\ndel Mar del Parque Hansa."
    ko: "신비한 힘이 넘치는 석판.\n해당화파크의 대해의 방과\n깊은 연관이 있는 것 같다."
    zh_simp: "充满了神秘力量的石板。\n感觉它与玫瑰公园的大海之厅\n有着很深的关联。"
    zh_trad: "充滿神奇力量的石板。\n感覺它和玫瑰公園的大海之廳\n有很深的關係。"
odd_incense:
  names:
    jp_kana: あやしいおこう
    jp_kanji: あやしいおこう
    en: Odd Incense
    fr: Encens Bizarre
    it: Bizzoaroma
    de: Schrägrauch
    es: Incienso Raro
    ko: 괴상한향로
    zh_simp: 奇异薰香
    zh_trad: 奇異薰香
  descriptions:
    jp_kana: "ふしぎな　かおりの　おこう。\nもたせると　エスパータイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "不思議な　香りの　御香。\n持たせると　エスパータイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon.\nThis exotic-smelling incense boosts the\npower of Psychic-type moves."
    fr: "Objet à tenir. Un encens au parfum exotique\naugmentant la puissance des capacités de type Psy."
    it: "Strumento da dare a un Pokémon.\nIncenso dal profumo esotico che potenzia\nle mosse di tipo Psico."
    de: "Ein Item zum Tragen. Dieses exotische Duftkraut\nverstärkt Attacken vom Typ Psycho."
    es: "Incienso de exótico aroma que fortalece los\nmovimientos de tipo Psíquico. Debe llevarlo un\nPokémon."
    ko: "이상한 향기의 향로.\n지니게 하면 에스퍼타입\n기술의 위력이 올라간다."
    zh_simp: "有着神奇香气的薰香。\n携带后，超能力属性的\n招式威力就会提高。"
    zh_trad: "有著神奇香氣的薰香。\n攜帶後，超能力屬性的\n招式威力就會提高。"
odd_keystone:
  names:
    jp_kana: かなめいし
    jp_kanji: かなめいし
    en: Odd Keystone
    fr: Clé de Voûte
    it: Roccianima
    de: Spiritkern
    es: Piedra Espíritu
    ko: 쐐기돌
    zh_simp: 楔石
    zh_trad: 楔石
  descriptions:
    jp_kana: "これがないと　いしのとうが\nくずれてしまう　だいじないし。\nときどき　いしから　こえがきこえる。"
    jp_kanji: "これがないと　石の塔が\n崩れてしまう　大事な石。\nときどき　石から　声が聞こえる。"
    en: "A vital item that is needed to keep a stone tower\nfrom collapsing. Voices can be heard from\nit occasionally."
    fr: "Un objet très important qui empêche une tour en pierre\nde s’écrouler. Des voix en sortent parfois."
    it: "Strumento importante che impedisce il crollo\ndi una torre di pietra. A volte dal suo interno\nprovengono delle voci."
    de: "Ein wichtiges Item, mit dem ein Steinturm repariert\nwerden kann. Manchmal erklingen Stimmen aus seinem\nInneren."
    es: "Vital para impedir que una torre de piedra se derrumbe.\nA veces se oyen voces en su interior."
    ko: "이것이 없으면 돌탑이\n무너져 버리는 중요한 돌.\n가끔 돌에서 목소리가 들린다."
    zh_simp: "没有它，石塔就会\n崩塌的重要石头。\n有时能从石头里听到声音。"
    zh_trad: "沒有它，石塔就會\n崩塌的重要石頭。\n有時能從石頭裡聽到聲音。"
oddish_candy:
  names:
    jp_kana: ナゾノクサのアメ
    jp_kanji: ナゾノクサのアメ
    en: Oddish Candy
    fr: Bonbon Mystherbe
    it: Caramella Oddish
    de: Myrapla-Bonbon
    es: Caramelo Oddish
    ko: 뚜벅쵸의사탕
    zh_simp: 走路草的糖果
    zh_trad: 走路草的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
old_amber:
  names:
    jp_kana: ひみつのコハク
    jp_kanji: ひみつのコハク
    en: Old Amber
    fr: Vieil Ambre
    it: Ambra antica
    de: Altbernstein
    es: Ámbar Viejo
    ko: 비밀의호박
    zh_simp: 秘密琥珀
    zh_trad: 秘密琥珀
  descriptions:
    jp_kana: "こだい　ポケモンの　いでんしが\nとじこめられている　コハク。\nあかみを　おびて　すけている。"
    jp_kanji: "古代ポケモンの　遺伝子が\n閉じこめられている　コハク。\n赤みを　帯びて　透けている。"
    en: "A piece of amber that still contains the genetic\nmaterial of an ancient Pokémon. It’s clear with a\ntawny, reddish tint."
    fr: "Un morceau d’ambre contenant l’ADN d’un ancien\nPokémon. Il est de couleur jaune."
    it: "Pezzo di ambra che contiene il materiale genetico\ndi un Pokémon antico. È chiaro e di colore giallastro."
    de: "Ein Stück Bernstein, in dem die Gene eines uralten\nPokémon enthalten sind. Es ist durchsichtig."
    es: "Fragmento de ámbar que contiene información genética\nde un Pokémon prehistórico. Es de color amarillo."
    ko: "고대 포켓몬의 유전자가\n갇혀 있는 호박.\n붉은 기가 돌면서 약간 투명하다."
    zh_simp: "封存着古代宝可梦\n遗传基因的琥珀，\n透着点红色。"
    zh_trad: "封存著古代寶可夢\n遺傳基因的琥珀，\n透著點紅色。"
old_charm:
  names:
    jp_kana: こだいのおまもり
    jp_kanji: こだいのおまもり
    en: Old Charm
    fr: Vieux Grigri
    it: Amuleto antico
    de: Talisman
    es: Talismán
    ko: 고대의부적
    zh_simp: 古代护符
    zh_trad: 古代護符
  descriptions:
    jp_kana: "カンナギタウンの　ちょうろうに\nとどける　おおむかしの　おまもり。\nポケモンの　ホネで　つくられている。"
    jp_kanji: "カンナギタウンの　長老に\n届ける　大昔の　おまもり。\nポケモンの　ホネで　つくられている。"
    en: "An ancient good-luck charm made of Pokémon\nbones to be taken to the elder of Celestic Town."
    fr: "Un ancien porte-bonheur fait d’os de Pokémon\nà apporter à la doyenne de Célestia."
    it: "Antico portafortuna fatto di ossa di Pokémon\nda portare all’anziana di Memoride."
    de: "Ein antiker Glücksbringer. Soll der Ältesten in Elyses\nüberbracht werden."
    es: "Está hecho con huesos de Pokémon y trae buena suerte.\nHay que llevárselo a la anciana de Pueblo Caelestis."
    ko: "봉신마을의 장로에게\n전해 줄 오랜 옛날의 부적.\n포켓몬의 뼈로 만들어졌다."
    zh_simp: "要交给神和镇上长老的远古护符。\n由宝可梦的骨头制成。"
    zh_trad: "要交給神和鎮上長老的遠古護符。\n由寶可夢的骨頭製成。"
old_gateau:
  names:
    jp_kana: もりのヨウカン
    jp_kanji: もりのヨウカン
    en: Old Gateau
    fr: Vieux Gâteau
    it: Dolce Gateau
    de: Spezialität
    es: Barrita Plus
    ko: 숲의양갱
    zh_simp: 森之羊羹
    zh_trad: 森之羊羹
  descriptions:
    jp_kana: "ハクタイの　かくれた　めいぶつ。\nポケモン　１ひきの　じょうたいの\nいじょうを　すべて　かいふくする。"
    jp_kanji: "ハクタイの　隠れた　名物。\nポケモン　１匹の　状態の\n異常を　すべて　回復する。"
    en: "The Old Chateau’s hidden specialty. It can be used\nonce to heal all the status conditions of a Pokémon."
    fr: "Une spécialité du Vieux Château.\nSoigne toutes les altérations de statut d’un Pokémon."
    it: "Specialità segreta dell’Antico Château.\nCura tutti i problemi di stato di un Pokémon."
    de: "Eine gut versteckte Spezialität aus Ewigenau.\nSie behebt alle Statusprobleme eines Pokémon."
    es: "Especialidad de la Vieja Mansión. Cura todos los\nproblemas de estado de un Pokémon."
    ko: "영원시티의 숨은 명물.\n포켓몬 1마리의\n상태 이상을 모두 회복한다."
    zh_simp: "百代不为人知的特产。\n能治愈１只宝可梦的\n所有异常状态。"
    zh_trad: "百代不為人知的特產。\n能治癒１隻寶可夢的\n所有異常狀態。"
old_letter:
  names:
    jp_kana: ふるびたてがみ
    jp_kanji: ふるびたてがみ
    en: Old Letter
    fr: Lettre Jaunie
    it: Vecchia lettera
    de: Vergilbter Brief
    es: Carta Ajada
    ko: 낡은편지
    zh_simp: 陈旧的信
    zh_trad: 陳舊的信
  descriptions:
    jp_kana: "おんなのこ　から　あずかった　てがみ。\nあてさきは　おとこのこ。\nなぜだか　ふるびた　かんじが　する。"
    jp_kanji: "女の子　から　預かった　手紙。\n宛先は　男の子。\nなぜだか　古びた　感じが　する。"
    en: "A letter entrusted to you by a girl, to be delivered to\na boy. Strangely, it looks old to you."
    fr: "Une lettre confiée par une petite fille,\ndont le destinataire est un petit garçon.\nElle semble jaunie par le temps..."
    it: "Una lettera, indirizzata a un bambino, che ha\nl’aria di essere un po’ consumata dal tempo.\nL’hai ricevuta in consegna da una bambina."
    de: "Diesen Brief hast du von einem Mädchen erhalten, um\nihn einem Jungen zu übergeben. Aus irgendeinem\nGrund sieht er schon etwas älter und vergilbt aus."
    es: "Carta de aspecto desgastado entregada por una niña y\ncon un chico como destinatario."
    ko: "여자아이가 맡긴 편지.\n받는 이는 남자아이로 되어 있다.\n어째선지 낡아 보인다."
    zh_simp: "女孩子投递的书信\n收件人是男孩子。\n散发出一种怀旧的气息。"
    zh_trad: "一個女孩子託付的信。\n收信人是男孩子。\n不知為何感覺有點陳舊。"
old_rod:
  names:
    jp_kana: ボロのつりざお
    jp_kanji: ボロのつりざお
    en: Old Rod
    fr: Canne
    it: Amo Vecchio
    de: Angel
    es: Caña Vieja
    ko: 낡은낚싯대
    zh_simp: 破旧钓竿
    zh_trad: 破舊釣竿
  descriptions:
    jp_kana: "ふるくて　ボロい　つりざお。\nみずの　ある　ばしょで　つかうと\nポケモンが　つれる。"
    jp_kanji: "ふるくて　ボロい　つりざお。\n水の　ある　場所で　使うと\nポケモンが　つれる。"
    en: "An old and beat-up fishing rod. Use it at any body\nof water to fish for wild aquatic Pokémon."
    fr: "Une vieille canne usée.\nUtilisez-la pour pêcher des Pokémon sauvages\ndans les points d’eau."
    it: "Amo vecchio e rovinato. Si usa per pescare\nPokémon selvatici in qualsiasi specchio d’acqua."
    de: "Eine alte, abgenutzte Angel. Damit kannst du in\njedem Gewässer nach Pokémon angeln."
    es: "Caña de pescar bastante usada y desgastada. Pesca\nPokémon salvajes en todo tipo de aguas."
    ko: "낡고 조잡한 낚싯대.\n물이 있는 장소에서 사용하면\n포켓몬을 낚을 수 있다."
    zh_simp: "又破又旧的钓竿。\n在有水的地方使用的话，\n可以钓到宝可梦。"
    zh_trad: "又破又舊的釣竿。\n在有水的地方使用的話，\n可以釣到寶可夢。"
omanyte_candy:
  names:
    jp_kana: オムナイトのアメ
    jp_kanji: オムナイトのアメ
    en: Omanyte Candy
    fr: Bonbon Amonita
    it: Caramella Omanyte
    de: Amonitas-Bonbon
    es: Caramelo Omanyte
    ko: 암나이트의사탕
    zh_simp: 菊石兽的糖果
    zh_trad: 菊石獸的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
onix_candy:
  names:
    jp_kana: イワークのアメ
    jp_kanji: イワークのアメ
    en: Onix Candy
    fr: Bonbon Onix
    it: Caramella Onix
    de: Onix-Bonbon
    es: Caramelo Onix
    ko: 롱스톤의사탕
    zh_simp: 大岩蛇的糖果
    zh_trad: 大岩蛇的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de cierto Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
oran_berry:
  names:
    jp_kana: オレンのみ
    jp_kanji: オレンのみ
    en: Oran Berry
    fr: Baie Oran
    it: Baccarancia
    de: Sinelbeere
    es: Baya Aranja
    ko: 오랭열매
    zh_simp: 橙橙果
    zh_trad: 橙橙果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nＨＰを　１０だけ　かいふくする。"
    jp_kanji: "ポケモンに　持たせると\nＨＰを　１０だけ　回復する。"
    en: "A Berry to be consumed by Pokémon. If a Pokémon\nholds one, it can restore its own HP by 10 points\nduring battle."
    fr: "Une Baie qui restaure 10 PV lorsqu’elle est tenue\npar un Pokémon."
    it: Se un Pokémon ha questa bacca, recupera 10 PS.
    de: "Gibst du die Beere einem Pokémon zum Tragen,\nfüllt sie seine KP um 10 Punkte auf."
    es: "Los Pokémon pueden llevarla o usarla para restaurar\n10 PS."
    ko: "포켓몬에게 지니게 하면\nHP를 10만큼 회복한다."
    zh_simp: "让宝可梦携带后，\n可以回复１０ＨＰ。"
    zh_trad: "讓寶可夢攜帶後，\n可以回復１０ＨＰ。"
orange_petal:
  names:
    jp_kana: だいだいはなびら
    jp_kanji: だいだいはなびら
    en: Orange Petal
    fr: Pétale Orange
    it: Petalo arancione
    de: Oranges Blatt
    es: Pétalo Naranja
    ko: 주황꽃잎
    zh_simp: 橙色花瓣
    zh_trad: 橙色花瓣
  descriptions:
    jp_kana: "マツリカのしれんで　イリマから\nもらえる　はなびらの　おしばな。\n７しゅるい　あつめるのが　もくてき。"
    jp_kanji: "マツリカの試練で　イリマから\nもらえる　はなびらの　押し花。\n７種類　集めるのが　目的。"
    en: "A pressed flower petal you receive from Ilima\nduring Mina’s trial. The goal is to collect seven\ndifferent kinds of petals."
    fr: "Un pétale pressé qu’Althéo vous a remis lors\nde l’Épreuve d’Oléa. Il y en a sept à collectionner."
    it: "Petalo di fiore pressato ottenuto da Liam durante\nla prova di Rika. L’obiettivo è ricevere sette petali\ndiversi."
    de: "Ein gepresstes Blütenblatt, das man im Rahmen von\nMatsurikas Prüfung von Elima erhält. Ziel ist es,\nsieben verschiedene Blütenblätter zu sammeln."
    es: "Pétalo prensado recibido de manos de Liam durante la\nprueba de Rika. El objetivo es reunir siete distintos."
    ko: "말리화의 시련에서 일리마에게\n받을 수 있는 꽃잎의 압화.\n7종류 모으는 것이 목적."
    zh_simp: "在茉莉的考验中，\n能从伊利马那里得到的干花花瓣。\n目标是集齐７种。"
    zh_trad: "在茉莉的考驗中，\n從伊利馬那裡得到的壓花花瓣。\n目標是集滿７種花瓣。"
oval_charm:
  names:
    jp_kana: まるいおまもり
    jp_kanji: まるいおまもり
    en: Oval Charm
    fr: Charme Ovale
    it: Ovamuleto
    de: Ovalpin
    es: Amuleto Oval
    ko: 둥근부적
    zh_simp: 圆形护符
    zh_trad: 圓形護符
  descriptions:
    jp_kana: "もっていると　あずかりやさんで\nタマゴが　みつかりやすくなる\nふしぎで　とてもまるい　おまもり。"
    jp_kanji: "持っていると　預かり屋さんで\nタマゴが　みつかりやすくなる\n不思議で　とてもまるい　おまもり。"
    en: "An oval charm said to increase the chance of\nPokémon Eggs being found at the Nursery."
    fr: "Un mystérieux charme rond qui permet de trouver\nplus facilement des Œufs à la Garderie Pokémon."
    it: "Misterioso amuleto di forma ovoidale che aumenta\nla probabilità di trovare Uova nell’Ostello Pokémon."
    de: "Ein mysteriöser, ovaler Glücksbringer, der die\nWahrscheinlichkeit erhöht, im Hort Eier zu finden."
    es: "Misterioso amuleto ovalado que aumenta la posibilidad\nde encontrar Huevos en Cuidados Pokémon."
    ko: "지니고 있으면 맡기미집에서\n알을 발견하기 쉬워지는\n이상하고 매우 둥근 부적."
    zh_simp: "拥有它之后，在寄放屋里\n会更容易找到蛋的\n神奇浑圆护符。"
    zh_trad: "只要擁有它，便會變得\n更容易在寄放屋裡發現蛋的\n神奇渾圓護符。"
oval_stone:
  names:
    jp_kana: まんまるいし
    jp_kanji: まんまるいし
    en: Oval Stone
    fr: Pierre Ovale
    it: Pietraovale
    de: Ovaler Stein
    es: Piedra Oval
    ko: 동글동글돌
    zh_simp: 浑圆之石
    zh_trad: 渾圓之石
  descriptions:
    jp_kana: "ある　とくていの　ポケモンを\nしんかさせる　ふしぎな　いし。\nたまのように　まるい。"
    jp_kanji: "ある　特定の　ポケモンを\n進化させる　不思議な　石。\nたまのように　まるい。"
    en: "A peculiar stone that can make certain species of\nPokémon evolve. It’s as round as a Pokémon Egg."
    fr: "Une pierre étrange qui fait évoluer certaines espèces\nde Pokémon. Elle a la forme d’un œuf."
    it: "Pietra particolare che fa evolvere determinate\nspecie di Pokémon. È a forma di uovo."
    de: "Dieser besondere, eiförmige Stein hilft manchen\nPokémon bei ihrer Entwicklung."
    es: "Una piedra peculiar que hace evolucionar a algunos\nPokémon. Tiene forma de huevo."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 돌.\n구슬처럼 둥글다."
    zh_simp: "能让某些特定宝可梦\n进化的神奇石头。\n像珠子一般圆润。"
    zh_trad: "能讓特定寶可夢\n進化的神奇石頭。\n像珠子一般圓潤。"
pack_of_potatoes:
  names:
    jp_kana: ポテトパック
    jp_kanji: ポテトパック
    en: Pack of Potatoes
    fr: Pommes de Terre
    it: Patate
    de: Kartoffeln
    es: Patatas
    ko: 포테이토팩
    zh_simp: 袋装土豆
    zh_trad: 袋裝洋芋
  descriptions:
    jp_kana: "キャンプの　りょうりに　つかう\nしょくざいの　いっしゅ。ポテトが\nからさを　うちけし　マイルドにする。"
    jp_kanji: "キャンプの　料理に　使う\n食材の　一種。ポテトが\n辛さを　打ち消し　マイルドにする。"
    en: "One of the many ingredients that can be used for\ncooking at your camp. Potatoes help mellow out a spicy\ntaste, to make a dish more mild."
    fr: "Un ingrédient de cuisine pour le camping.\nCes féculents permettent d’atténuer le piquant\ndu curry pour le rendre plus doux."
    it: "Uno degli ingredienti che puoi usare per cucinare\nin campeggio. Smorzano i gusti piccanti donando\nal piatto un sapore più delicato."
    de: "Eine Zutat für PokéCamping-Mahlzeiten. Kartoffeln\nnehmen würzigen Speisen etwas von ihrer Schärfe und\nmachen sie milder."
    es: "Un ingrediente para cocinar en el campamento. Las\npatatas contrarrestan el picante y suavizan el plato."
    ko: "캠프 요리에 사용되는\n식재료 중 하나. 감자가 매운맛을\n잡아 주고 부드럽게 만들어 준다."
    zh_simp: "在露营营地制作料理时会使用的\n一种食材。土豆能中和辣味，\n使整道料理的滋味变得柔和。"
    zh_trad: "製作露營料理時使用的食材之一。\n洋芋能夠中和辣味，\n使料理的味道變得溫和。"
packaged_curry:
  names:
    jp_kana: レトルトカレー
    jp_kanji: レトルトカレー
    en: Packaged Curry
    fr: Curry Instantané
    it: Curry precotto
    de: Fertigcurry
    es: Curri de Bote
    ko: 레토르트카레
    zh_simp: 即食咖喱
    zh_trad: 即食咖哩
  descriptions:
    jp_kana: "キャンプの　りょうりに　つかう\nしょくざいの　いっしゅ。かんせい　された\nレトルトカレーを　つかって　ミスをふせぐ。"
    jp_kanji: "キャンプの　料理に　使う\n食材の　一種。完成　された\nレトルトカレーを　使って　ミスを防ぐ。"
    en: "One of the many ingredients that can be used for\ncooking at your camp. Using packaged curry helps\nmake sure there are no slipups when cooking."
    fr: "Un ingrédient de cuisine pour le camping.\nÀ ajouter au curry pour corriger les erreurs\nde préparation."
    it: "Uno degli ingredienti che puoi usare per cucinare\nin campeggio. Questo prodotto precotto permette\ndi andare a colpo sicuro ed evitare brutte sorprese."
    de: "Eine Zutat für PokéCamping-Mahlzeiten. Da bei einem\nFertigcurry der Name Programm ist, kann beim Kochen\nnichts schiefgehen."
    es: "Un ingrediente para cocinar en el campamento. Este\ncurri precocinado nunca falla."
    ko: "캠프 요리에 사용되는\n식재료 중 하나. 완성된 레토르트카레를\n사용해서 실패를 막는다."
    zh_simp: "在露营营地制作料理时会使用的\n一种食材。使用这种成品速食咖喱，\n可以有效预防失误。"
    zh_trad: "製作露營料理時使用的食材之一。\n使用現成的即食咖哩，\n可以避免失敗。"
pair_of_tickets:
  names:
    jp_kana: ペアチケット
    jp_kanji: ペアチケット
    en: Pair of Tickets
    fr: Ticket Duo
    it: Biglietto doppio
    de: Zweierticket
    es: Entrada para dos
    ko: 페어티켓
    zh_simp: 双人票
    zh_trad: 雙人票
  descriptions:
    jp_kana: "トクサネうちゅうセンターで\nひらかれている　てんたいショーの\nふたりぐみ　チケット。"
    jp_kanji: "トクサネ宇宙センターで　開かれている\n天体ショーの　２人組チケット。"
    en: "Tickets for two to the astronomical show being\nheld at the Mossdeep Space Center."
    fr: "Un ticket pour deux personnes pour le spectacle\nd’astronomie se déroulant au Centre Spatial d’Algatia."
    it: "Biglietto per due persone per lo spettacolo\nastronomico del Centro Spaziale di Verdeazzupoli."
    de: "Eine Eintrittskarte, mit der zwei Personen Zutritt zur\nAstronomie-Show des Raumfahrtzentrums von\nMoosbach City erhalten."
    es: "Pase de dos personas para asistir al espectáculo de\nastronomía que se celebra en el Centro Espacial de\nAlgaria."
    ko: "이끼 우주센터에서\n열리고 있는 천체쇼의\n2인용 티켓이다."
    zh_simp: "在绿岭宇宙中心举办的\n天体展览的双人票。"
    zh_trad: "在綠嶺宇宙中心舉辦的\n天體展覽的雙人票。"
pal_pad:
  names:
    jp_kana: ともだちてちょう
    jp_kanji: ともだちてちょう
    en: Pal Pad
    fr: Registre Ami
    it: Blocco Amici
    de: Adressbuch
    es: Bloc amigos
    ko: 친구수첩
    zh_simp: 朋友手册
    zh_trad: 朋友手冊
  descriptions:
    jp_kana: "ともだちを　とうろくしたり\nあそんだ　ことを　きろくする\nべんりな　てちょう。"
    jp_kanji: "友達を　登録したり\n遊んだことを　記録する\n便利な　手帳。"
    en: "A convenient notepad that is used to register your\nfriends and friend codes and keep a record of\nyour gameplay."
    fr: "Un carnet bien pratique pour enregistrer vos amis,\nleurs codes ami et des données de jeu."
    it: "Blocco appunti utile per registrare gli amici e\nil loro codice amico e per tenere un resoconto\ndell’esperienza di gioco."
    de: "In diesem praktischen Buch kannst du die\nFreundescodes deiner Freunde aufbewahren."
    es: "Un cuaderno muy práctico en el que puedes registrar\namigos, claves de amigo, etc."
    ko: "친구를 등록하거나\n친구와 놀았던 기록을 관리하는\n편리한 수첩."
    zh_simp: "使用方便的手册。\n可以添加朋友或\n记录游戏的内容。"
    zh_trad: "好用的手冊。\n可以新增朋友或\n記錄遊戲的內容。"
pamtre_berry:
  names:
    jp_kana: シーヤのみ
    jp_kanji: シーヤのみ
    en: Pamtre Berry
    fr: Baie Palma
    it: Baccapalma
    de: Pallmbeere
    es: Baya Plama
    ko: 자야열매
    zh_simp: 椰木果
    zh_trad: 椰木果
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。\nふかふかのつちに　うめると\nシーヤが　そだつ。"
    jp_kanji: "ポフィンの　材料。\nふかふかの土に　埋めると\nシーヤが　育つ。"
    en: "A Poffin ingredient. Bury it in soft soil to grow a\nPamtre Berry plant."
    fr: "Un ingrédient entrant dans la confection de Poffins.\nPlantez cette Baie dans un sol meuble et fertile\npour faire pousser un arbre à Baies Palma."
    it: "Si usa per fare i poffin. Seminala nella terra soffice\nper far crescere una pianta di Baccapalma."
    de: "Eine Knursp-Zutat. Pflanze sie in weichen Lehmboden\nein, damit neue Pallmbeeren wachsen."
    es: "Ingrediente para pokochos. Si se planta en tierra suelta,\nsaldrá una planta de Plama."
    ko: "포핀의 재료.\n푹신푹신한 땅에 심으면\n자야가 자란다."
    zh_simp: "宝芬的材料。\n埋在松软的土地里\n可以培育出椰木。"
    zh_trad: "製作寶芬的材料。\n埋進鬆軟的泥土裡，\n長成後會結出椰木。"
paralyze_heal:
  names:
    jp_kana: まひなおし
    jp_kanji: まひなおし
    en: Paralyze Heal
    fr: Anti-Para
    it: Antiparalisi
    de: Para-Heiler
    es: Antiparalizador
    ko: 마비치료제
    zh_simp: 解麻药
    zh_trad: 解麻藥
  descriptions:
    jp_kana: "スプレーしきの　くすり。\nポケモン　１ひきの　まひの\nじょうたいを　かいふくする。"
    jp_kanji: "スプレー式の　薬。\nポケモン　１匹の　まひの\n状態を　回復する。"
    en: "A spray-type medicine for treating paralysis. It can be\nused to free a single Pokémon that has been paralyzed."
    fr: "Un médicament sous forme de spray.\nSoigne un Pokémon de la paralysie."
    it: "Rimedio spray.\nCura un Pokémon dalla paralisi."
    de: Ein Spray, das ein Pokémon von Paralyse heilt.
    es: Medicina en espray que cura a un Pokémon paralizado.
    ko: "스프레이식의 약.\n포켓몬 1마리의\n마비 상태를 회복한다."
    zh_simp: "喷雾式药水。\n能治愈１只宝可梦的\n麻痹状态。"
    zh_trad: "噴霧式藥水。\n能治癒１隻寶可夢的\n麻痺狀態。"
paras_candy:
  names:
    jp_kana: パラスのアメ
    jp_kanji: パラスのアメ
    en: Paras Candy
    fr: Bonbon Paras
    it: Caramella Paras
    de: Paras-Bonbon
    es: Caramelo Paras
    ko: 파라스의사탕
    zh_simp: 派拉斯的糖果
    zh_trad: 派拉斯的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
parcel:kanto:
  names:
    jp_kana: おとどけもの
    jp_kanji: おとどけもの
    en: Parcel
    fr: Colis
    it: Pacco
    de: Paket
    es: Paquete
    ko: 전해줄물건
    zh_simp: 包裹
    zh_trad: 包裹
  descriptions:
    jp_kana: "トキワシティの　ショップ　から\nオーキドはかせに　とどけるよう\nたのまれた　にもつ。"
    jp_kanji: "トキワシティの　ショップ　から\nオーキド博士に　届けるよう\n頼まれた　荷物。"
    en: "A parcel to be delivered to Professor Oak from\nViridian City’s Poké Mart."
    fr: "Un paquet à livrer au Professeur Chen de la part\nde la Boutique Pokémon de Jadielle."
    it: "Un pacchetto per il Professor Oak dal Pokémon-Market\ndi Smeraldopoli."
    de: "Ein Paket für Professor Eich, das man dir im\nPokémon-Supermarkt von Vertania City anvertraut hat."
    es: "Un paquete para el Profesor Oak que te entregaron\nen la Tienda Pokémon de Ciudad Verde."
    ko: "상록시티의 숍에서\n오박사님에게 전달하도록\n부탁받은 물건."
    zh_simp: "这是常青市的商店\n托付给你的包裹。\n需要将它交给大木博士。"
    zh_trad: "在常青市的商店\n被拜託送到大木博士\n手上的包裹。"
parcel:sinnoh:
  names:
    jp_kana: おとどけもの
    jp_kanji: おとどけもの
    en: Parcel
    fr: Colis
    it: Pacco
    de: Paket
    es: Paquete
    ko: 전해줄물건
    zh_simp: 包裹
    zh_trad: 包裹
  descriptions:
    jp_kana: "フタバタウンから　たびだった\nおさななじみに　わたすように\nたのまれた　おとどけもの。"
    jp_kanji: "フタバタウンから　旅立った\n幼なじみに　渡すように\n頼まれた　おとどけもの。"
    en: "A parcel entrusted into your care. You’re supposed\nto deliver it to your childhood friend who left\nTwinleaf Town."
    fr: "Un paquet qu’on vous a confié.\nVous devez le remettre à votre ami d’enfance\nqui a quitté Bonaugure."
    it: "Pacchetto da consegnare al tuo amico d’infanzia\nche ha lasciato Duefoglie."
    de: "Ein Paket, das dir anvertraut wurde. Du sollst es deinem\nbesten Freund geben, der Zweiblattdorf verließ."
    es: "Paquete encomendado a tu cuidado que tienes que\nentregar a tu amigo de la infancia que dejó Pueblo\nHojaverde."
    ko: "떡잎마을에서 여행을 떠난\n소꿉친구에게 건네주도록\n부탁받은 물건."
    zh_simp: "这是别人托付给你的包裹。\n需要将它交给从双叶镇启程\n踏上旅途的青梅竹马。"
    zh_trad: "受人之託要交給從雙葉鎮\n啟程踏上旅途的\n青梅竹馬的包裹。"
park_ball:
  names:
    jp_kana: パークボール
    jp_kanji: パークボール
    en: Park Ball
    fr: Parc Ball
    it: Parco Ball
    de: Parkball
    es: Parque Ball
    ko: 파크볼
    zh_simp: 公园球
    zh_trad: 公園球
  descriptions:
    jp_kana: "ハマナスパークの　なかで\nつかう　とくべつな　ボール。"
    jp_kanji: "ハマナスパークの　なかで\n使う　特別な　ボール。"
    en: A special Poké Ball for Ramanas Park.
    fr: "Une Poké Ball spéciale utilisée dans le Parc Rosa\nRugosa."
    it: "Poké Ball speciale utilizzata all’interno del Parco\nRosa Rugosa."
    de: Ein Ball, der nur im Hamanasu-Park eingesetzt wird.
    es: Poké Ball que se utiliza dentro del Parque Hansa.
    ko: "해당화파크 내에서\n사용하는 특별한 볼."
    zh_simp: "在玫瑰公园里使用的\n特殊的球。"
    zh_trad: "在玫瑰公園裡使用的\n特殊的球。"
pass:
  names:
    jp_kana: リニアパス
    jp_kanji: リニアパス
    en: Pass
    fr: Passe Train
    it: Superpass
    de: Fahrschein
    es: Magnetopase
    ko: 리니어패스
    zh_simp: 磁浮列车自由票
    zh_trad: 磁浮列車自由票
  descriptions:
    jp_kana: "リニアカーに　のるときに　ひつような\nチケット。　いつでも　のりほうだい。"
    jp_kanji: "リニアカーに　乗るときに　必要な\nチケット。　いつでも　乗り放題。"
    en: "A pass required for riding the Magnet Train. It allows\nyou to ride whenever and however much you’d like."
    fr: "Un ticket nécessaire pour monter à bord\ndu Train Magnétique. Utilisable à volonté."
    it: "Biglietto necessario per viaggiare sul supertreno.\nUtilizzabile a volontà."
    de: "Eine Fahrkarte, die einem die Reise mit dem Magnetzug\nermöglicht. Gilt für beliebig viele Fahrten."
    es: "Billete necesario para poder montar todas las veces que\nse desee en el Magnetotrén."
    ko: "리니어 카를 탈 때 필요한\n티켓. 언제든지 무제한으로 이용 가능."
    zh_simp: "乘坐磁浮列车时所需的车票。\n可以随时自由乘坐。"
    zh_trad: "乘坐磁浮列車時所需的車票。\n可以隨時自由乘坐。"
pass_orb:
  names:
    jp_kana: デルダマ
    jp_kanji: デルダマ
    en: Pass Orb
    fr: Offrisphère
    it: Passabilia
    de: Transferorb
    es: Regalosfera
    ko: 딜구슬
    zh_simp: 释出之玉
    zh_trad: 釋出之玉
  descriptions:
    jp_kana: "デルパワーを　はっせいさせる\nときにつかう　イッシュの　パワーが\nとじこめられた　ふしぎな　たま。"
    jp_kanji: "デルパワーを　発生させる\nときに使う　イッシュの　パワーが\nとじこめられた　不思議な　玉。"
    en: "A mysterious orb containing the power of the\nUnova region, to be used when generating\nPass Power."
    fr: "Une sphère mystérieuse contenant l’Aura d’Unys\net permettant l’utilisation des Offri-Auras."
    it: "Bilia misteriosa che racchiude l’energia di Unima\ned è in grado di lanciare il Passapotere."
    de: "Ein mysteriöser Orb, der die Kraft der Einall-Region\nenthält und zur Erzeugung von Transferkraft dient."
    es: "Esfera misteriosa que contiene el poder de la región de\nTeselia y se utiliza para generar Poderes Regalo."
    ko: "딜파워를 발생시킬 때\n사용하는 하나지방의 파워가\n담긴 이상한 구슬."
    zh_simp: "在这块神奇的玉石里，\n封存着用于产生\n释出之力的合众之力。"
    zh_trad: "在這塊神奇的玉石裡，\n封存著用於產生\n釋出之力的合眾之力。"
passho_berry:
  names:
    jp_kana: イトケのみ
    jp_kanji: イトケのみ
    en: Passho Berry
    fr: Baie Pocpoc
    it: Baccapasflo
    de: Foepasbeere
    es: Baya Pasio
    ko: 꼬시개열매
    zh_simp: 千香果
    zh_trad: 千香果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　みず　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　みず技を\n受けたとき　威力が　弱まる。"
    en: "If held by a Pokémon, this Berry will lessen the\ndamage taken from one supereffective\nWater-type attack."
    fr: "Tenue, cette Baie affaiblit une attaque ennemie\nsuper efficace de type Eau."
    it: "Se un Pokémon ha questa bacca, l’attacco\nsuperefficace di tipo Acqua del nemico\nviene indebolito."
    de: "Als getragenes Item schwächt diese Beere sehr effektive\ngegnerische Attacken vom Typ Wasser."
    es: "Si la lleva un Pokémon, debilita un ataque supereficaz\nde tipo Agua de un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 굉장한 물 기술로\n공격받았을 때 위력이 약해진다."
    zh_simp: "让宝可梦携带后，\n在受到效果绝佳的水属性招式\n攻击时，能令其威力减弱。"
    zh_trad: "讓寶可夢攜帶後，\n在受到效果絕佳的水屬性招式\n攻擊時，能使其威力減弱。"
pasta:
  names:
    jp_kana: パスタ
    jp_kanji: パスタ
    en: Pasta
    fr: Pâtes
    it: Pasta
    de: Spaghetti
    es: Pasta
    ko: 파스타
    zh_simp: 通心粉
    zh_trad: 通心麵
  descriptions:
    jp_kana: "キャンプの　りょうりに　つかう\nしょくざいの　いっしゅ。こむぎこを　こねて\nつくった　めん。いがいと　カレーにあう。"
    jp_kanji: "キャンプの　料理に　使う\n食材の　一種。小麦粉を　こねて\n作った　麺。意外と　カレーに合う。"
    en: "One of the many ingredients that can be used for\ncooking at your camp. These flour noodles make\nfor a surprisingly good match with curry."
    fr: "Un ingrédient de cuisine pour le camping.\nFabriquées avec de la farine de blé, ces pâtes\nse marient étonnamment bien avec le curry."
    it: "Uno degli ingredienti che puoi usare per cucinare\nin campeggio. Questi spaghetti di grano duro\nsi sposano sorprendentemente bene con il curry."
    de: "Eine Zutat für PokéCamping-Mahlzeiten. Diese aus\nWeizenmehl hergestellten Nudeln passen überraschend\ngut zu Currygerichten aller Art."
    es: "Un ingrediente para cocinar en el campamento. Estos\nfideos de harina de trigo combinan inesperadamente\nbien con el curri."
    ko: "캠프 요리에 사용되는\n식재료 중 하나. 밀가루를 반죽해서\n만든 면이다. 의외로 카레와 잘 어울린다."
    zh_simp: "在露营营地制作料理时会使用的\n一种食材。是由小麦粉揉制的面条。\n搭配咖喱出乎意料地美味。"
    zh_trad: "製作露營料理時使用的食材之一。\n用麵粉揉成的麵條，\n意外地和咖哩很配。"
payapa_berry:
  names:
    jp_kana: ウタンのみ
    jp_kanji: ウタンのみ
    en: Payapa Berry
    fr: Baie Yapap
    it: Baccapayapa
    de: Pyapabeere
    es: Baya Payapa
    ko: 야파열매
    zh_simp: 福禄果
    zh_trad: 福祿果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　エスパー　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　エスパー技を\n受けたとき　威力が　弱まる。"
    en: "If held by a Pokémon, this Berry will lessen the\ndamage taken from one supereffective\nPsychic-type attack."
    fr: "Tenue, cette Baie affaiblit une attaque ennemie\nsuper efficace de type Psy."
    it: "Se un Pokémon ha questa bacca, l’attacco\nsuperefficace di tipo Psico del nemico\nviene indebolito."
    de: "Als getragenes Item schwächt diese Beere sehr effektive\ngegnerische Attacken vom Typ Psycho."
    es: "Si la lleva un Pokémon, debilita un ataque supereficaz\nde tipo Psíquico de un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 굉장한 에스퍼 기술로\n공격받았을 때 위력이 약해진다."
    zh_simp: "让宝可梦携带后，\n在受到效果绝佳的超能力属性招式\n攻击时，能令其威力减弱。"
    zh_trad: "讓寶可夢攜帶後，\n在受到效果絕佳的超能力屬性招式\n攻擊時，能使其威力減弱。"
pearl:
  names:
    jp_kana: しんじゅ
    jp_kanji: しんじゅ
    en: Pearl
    fr: Perle
    it: Perla
    de: Perle
    es: Perla
    ko: 진주
    zh_simp: 珍珠
    zh_trad: 珍珠
  descriptions:
    jp_kana: "きれいな　ぎんいろに　ひかる\nすこし　ちいさめの　しんじゅ。\nショップで　やすく　うれる。"
    jp_kanji: "きれいな　銀色に　光る\n少し　ちいさめの　真珠。\nショップで　安く　売れる。"
    en: "A rather small pearl that has a very nice silvery\nsheen to it. It can be sold at a low price to shops."
    fr: "Une petite perle qui brille d’une jolie couleur argent.\nPeut être vendue à bas prix en magasin."
    it: "Perla piuttosto piccola dai graziosi riflessi\nargentei. Si può vendere a un prezzo piuttosto\nbasso nei negozi."
    de: "Eine relativ kleine Perle, die in schönem Silber funkelt.\nSie ist von geringem Wert."
    es: "Brillante perla pequeña y plateada que no alcanza un\nbuen precio en las tiendas."
    ko: "예쁜 은색으로 빛나는\n자그마한 진주.\n상점에서 싸게 팔린다."
    zh_simp: "散发着美丽银辉\n且有点小的珍珠。\n可以在商店低价出售。"
    zh_trad: "散發著美麗銀輝的\n有點小的珍珠。\n可以在商店低價出售。"
pearl_string:
  names:
    jp_kana: おだんごしんじゅ
    jp_kanji: おだんごしんじゅ
    en: Pearl String
    fr: Perle Triple
    it: Trittiperla
    de: Triperle
    es: Sarta Perlas
    ko: 경단진주
    zh_simp: 丸子珍珠
    zh_trad: 丸子珍珠
  descriptions:
    jp_kana: "きれいな　ぎんいろに　ひかる\nとても　おおつぶの　しんじゅ。\nショップで　たかく　うれる。"
    jp_kanji: "きれいな　銀色に　光る\nとても　大粒の　真珠。\nショップで　高く　売れる。"
    en: "Very large pearls that sparkle in a pretty silver\ncolor. They can be sold at a high price to shops."
    fr: "Une grappe de perles brillant d’une jolie couleur argent.\nPeut être vendue à bon prix en magasin."
    it: "Grosse perle dai riflessi argentei. Si possono\nvendere a un prezzo piuttosto alto nei negozi."
    de: "Große Perlen, die in schönem Silber funkeln. Sie sind\nvon großem Wert."
    es: "Brillantes perlas plateadas de gran tamaño que pueden\nvenderse a buen precio en las tiendas."
    ko: "예쁜 은색으로 빛나는\n상당히 큰 낱알의 진주.\n상점에서 비싸게 팔린다."
    zh_simp: "散发着美丽银辉\n且非常大颗的珍珠。\n可以在商店高价出售。"
    zh_trad: "散發著美麗銀輝的\n非常大顆的珍珠。\n可以在商店高價出售。"
pecha_berry:
  names:
    jp_kana: モモンのみ
    jp_kanji: モモンのみ
    en: Pecha Berry
    fr: Baie Pêcha
    it: Baccapesca
    de: Pirsifbeere
    es: Baya Meloc
    ko: 복슝열매
    zh_simp: 桃桃果
    zh_trad: 桃桃果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nどくを　かいふくする。"
    jp_kanji: "ポケモンに　持たせると\n毒を　回復する。"
    en: "A Berry to be consumed by Pokémon. If a Pokémon\nholds one, it can recover from poisoning on its own\nin battle."
    fr: "Une Baie qui soigne l’empoisonnement\nlorsqu’elle est tenue par un Pokémon."
    it: "Se un Pokémon ha questa bacca, guarisce\ndall’avvelenamento."
    de: "Gibst du die Beere einem Pokémon zum Tragen,\nheilt diese es von Vergiftung."
    es: "Los Pokémon pueden llevarla o usarla para curarse\ndel envenenamiento."
    ko: "포켓몬에게 지니게 하면\n독을 회복한다."
    zh_simp: "让宝可梦携带后，\n可以治愈中毒。"
    zh_trad: "讓寶可夢攜帶後，\n可以治癒中毒。"
permit:
  names:
    jp_kana: きょかしょう
    jp_kanji: きょかしょう
    en: Permit
    fr: Permis
    it: Permesso
    de: Genehmigung
    es: Pase
    ko: 허가증
    zh_simp: 许可证
    zh_trad: 許可證
  descriptions:
    jp_kana: "わずかな　ひとしか　しらない\nしぜんほごくに　はいるために\nひつような　ライセンスカード。"
    jp_kanji: "わずかな　人しか　知らない\n自然保護区に　入るために\n必要な　ライセンスカード。"
    en: "A permit that is needed to enter the\nNature Preserve. Not many know about it."
    fr: "Un permis nécessaire pour pénétrer dans la Réserve\nNaturelle, lieu protégé des foules modernes."
    it: "Tessera che permette di accedere a una Riserva\nNaturale conosciuta da pochi."
    de: "Eine Genehmigung in Form einer Karte, die den Zutritt\nins Naturschutzgebiet ermöglicht. Nur wenige kennen\nden Ort."
    es: "Permiso necesario para acceder a la Reserva Natural,\nlugar que solo unos pocos conocen."
    ko: "소수의 사람밖에 모르는\n자연보호구역에 들어가기 위해\n필요한 라이선스 카드."
    zh_simp: "只有极少数人才知道的，\n进入自然保护区所需的授权卡。"
    zh_trad: "進入只有極少數人\n才知道的自然保護區時，\n所需的授權卡。"
persim_berry:
  names:
    jp_kana: キーのみ
    jp_kanji: キーのみ
    en: Persim Berry
    fr: Baie Kika
    it: Baccaki
    de: Persimbeere
    es: Baya Caquic
    ko: 시몬열매
    zh_simp: 柿仔果
    zh_trad: 柿仔果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこんらんを　かいふくする。"
    jp_kanji: "ポケモンに　持たせると\n混乱を　回復する。"
    en: "A Berry to be consumed by Pokémon. If a Pokémon\nholds one, it can recover from confusion on its own\nin battle."
    fr: "Une Baie qui soigne la confusion lorsqu’elle est tenue\npar un Pokémon."
    it: "Se un Pokémon ha questa bacca, guarisce\ndalla confusione."
    de: "Gibst du die Beere einem Pokémon zum Tragen,\nheilt diese es von Verwirrung."
    es: "Los Pokémon pueden llevarla o usarla para librarse de\nla confusión."
    ko: "포켓몬에게 지니게 하면\n혼란을 회복한다."
    zh_simp: "让宝可梦携带后，\n可以治愈混乱。"
    zh_trad: "讓寶可夢攜帶後，\n可以治癒混亂。"
petaya_berry:
  names:
    jp_kana: ヤタピのみ
    jp_kanji: ヤタピのみ
    en: Petaya Berry
    fr: Baie Pitaye
    it: Baccapitaya
    de: Tahaybeere
    es: Baya Yapati
    ko: 야타비열매
    zh_simp: 龙火果
    zh_trad: 龍火果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nピンチのとき　じぶんの\nとくこうが　あがる。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　自分の\n特攻が　あがる。"
    en: "A Berry to be consumed by Pokémon. If a Pokémon\nholds one, its Sp. Atk stat will increase when it’s in\na pinch."
    fr: "Tenue, cette Baie augmente l’Attaque Spéciale\nen cas de besoin."
    it: "Se il Pokémon che ha questa bacca si trova\nin difficoltà, il suo Attacco Speciale aumenta."
    de: "Als getragenes Item erhöht diese Beere den\nSpezial-Angriffs-Wert eines Pokémon, sobald es in\neiner Notlage steckt."
    es: "Si la lleva un Pokémon, le sube el Ataque Especial en\nun momento de apuro."
    ko: "포켓몬에게 지니게 하면\n위급할 때 자신의\n특수공격이 올라간다."
    zh_simp: "让宝可梦携带后，危机时，\n自己的特攻就会提高。"
    zh_trad: "讓寶可夢攜帶後，\n危機時，自己的\n特攻就會提高。"
pewter_crunchies:
  names:
    jp_kana: ニビあられ
    jp_kanji: ニビあられ
    en: Pewter Crunchies
    fr: Crok’Argenta
    it: Plumbeosalatini
    de: Marmoria-Kräcker
    es: Rokikos
    ko: 회색강정
    zh_simp: 深灰米果
    zh_trad: 深灰米果
  descriptions:
    jp_kana: "ニビめいぶつの　あられ。\nポケモン　１ひきの　じょうたいの\nいじょうを　すべて　かいふくする。"
    jp_kanji: "ニビ名物の　あられ。\nポケモン　１匹の　状態の\n異常を　すべて　回復する。"
    en: "Pewter City’s famous crunchy snack. They can be used\nto heal all status conditions of a single Pokémon."
    fr: "Une spécialité d’Argenta.\nSoigne toutes les altérations de statut d’un Pokémon."
    it: "I salatini tipici di Plumbeopoli. Curano tutti i problemi\ndi stato di un Pokémon."
    de: "Eine berühmte Knabberei aus Marmoria City.\nBehebt alle Statusprobleme eines Pokémon."
    es: "Tentempié típico de Ciudad Plateada. Cura todos los\nproblemas de estado de un Pokémon."
    ko: "회색시티의 명물인 강정.\n포켓몬 1마리의 상태 이상을\n모두 회복한다."
    zh_simp: "深灰特产的糕点。\n能治愈１只宝可梦的\n所有异常状态。"
    zh_trad: "深灰市特產的米果。\n能治癒１隻寶可夢的\n所有異常狀態。"
photo_album:
  names:
    jp_kana: フォトアルバム
    jp_kanji: フォトアルバム
    en: Photo Album
    fr: Album Photo
    it: Album
    de: Fotoalbum
    es: Álbum
    ko: 포토앨범
    zh_simp: 相册
    zh_trad: 相簿
  descriptions:
    jp_kana: "ぼうけんちゅうに　さつえいした\nきねんしゃしんを　かざる　アルバム。"
    jp_kanji: "冒険中に　撮影した\n記念写真を　飾る　アルバム。"
    en: "A nice photo album for storing all the photos taken\nalong your adventure."
    fr: "Un album décoré de photos souvenirs prises\npendant le voyage."
    it: "Album dove si possono sistemare le foto scattate\ndurante quest’avventura."
    de: "Ein Album, in dem du Erinnerungsfotos aufbewahren\nkannst, die du auf deinen Reisen geschossen hast."
    es: "Álbum que recoge las fotos que se toman a lo largo de\nla aventura."
    ko: "모험 중에 촬영한\n기념사진을 보관하는 앨범."
    zh_simp: "用来摆放在冒险中拍摄的\n纪念相片的相册。"
    zh_trad: "用來擺放在冒險中拍攝的\n紀念照片的相簿。"
pidgeotite:
  names:
    jp_kana: ピジョットナイト
    jp_kanji: ピジョットナイト
    en: Pidgeotite
    fr: Roucarnagite
    it: Pidgeotite
    de: Taubossnit
    es: Pidgeotita
    ko: 피죤투나이트
    zh_simp: 大比鸟进化石
    zh_trad: 大比鳥進化石
  descriptions:
    jp_kana: "ピジョットに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "ピジョットに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Pidgeot hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Roucarnage, elle lui permet\nde méga-évoluer durant un combat."
    it: "Una delle misteriose Megapietre.\nData a Pidgeot, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Tauboss getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Pidgeot en combate."
    ko: "피죤투에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让大比鸟携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓大比鳥攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
pidgey_candy:
  names:
    jp_kana: ポッポのアメ
    jp_kanji: ポッポのアメ
    en: Pidgey Candy
    fr: Bonbon Roucool
    it: Caramella Pidgey
    de: Taubsi-Bonbon
    es: Caramelo Pidgey
    ko: 구구의사탕
    zh_simp: 波波的糖果
    zh_trad: 波波的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
pikachu_candy:
  names:
    jp_kana: ピカチュウのアメ
    jp_kanji: ピカチュウのアメ
    en: Pikachu Candy
    fr: Bonbon Pikachu
    it: Caramella Pikachu
    de: Pikachu-Bonbon
    es: Caramelo Pikachu
    ko: 피카츄의사탕
    zh_simp: 皮卡丘的糖果
    zh_trad: 皮卡丘的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
pikanium_z:bag:
  names:
    jp_kana: ピカチュウＺ
    jp_kanji: ピカチュウＺ
    en: Pikanium Z
    fr: Pikazélite
    it: Pikacium Z
    de: Pikachium Z
    es: Pikastal Z
    ko: 피카츄Z
    zh_simp: 皮卡丘Ｚ
    zh_trad: 皮卡丘Ｚ
  descriptions:
    jp_kana: "ピカチュウの　ボルテッカーを\nとくべつな　Ｚワザに　グレードアップする\nＺパワーの　けっしょうを　つくりだす。"
    jp_kanji: "ピカチュウの　ボルテッカーを\n特別な　Ｚワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nPikachu’s Volt Tackle to an exclusive Z-Move."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise le Pikachu qui le tient à transformer\nson Électacle en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono a Pikachu di trasformare la mossa\nLocomovolt in una mossa Z."
    de: "Kristallisierte Z-Kraft, die Pikachus Attacke\nVolttackle zu einer Z-Attacke aufstuft.\nWird bei Bedarf automatisch vervielfacht."
    es: "Concentra el Poder Z en cristales que permiten\na Pikachu convertir su Placaje Eléctrico en un\nmovimiento Z."
    ko: "피카츄의 볼트태클을\n특별한 Z기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将皮卡丘的伏特攻击\n升级成特殊Ｚ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把皮卡丘的伏特攻擊\n升級為特殊Ｚ招式的Ｚ力量結晶。"
pikanium_z:held:
  names:
    jp_kana: ピカチュウＺ
    jp_kanji: ピカチュウＺ
    en: Pikanium Z
    fr: Pikazélite
    it: Pikacium Z
    de: Pikachium Z
    es: Pikastal Z
    ko: 피카츄Z
    zh_simp: 皮卡丘Ｚ
    zh_trad: 皮卡丘Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　けっしょう。\nピカチュウの　ボルテッカーを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nピカチュウの　ボルテッカーを\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Pikachu’s Volt Tackle to a Z-Move."
    fr: "Une cristallisation de la Force Z, permettant\nde transformer l’Électacle d’un Pikachu en\ncapacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare la mossa Locomovolt\ndi Pikachu in una mossa Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft Pikachus\nAttacke Volttackle zu einer Z-Attacke auf."
    es: "Cristal que confiere el Poder Z al movimiento\nPlacaje Eléctrico de Pikachu."
    ko: "Z파워의 결정.\n피카츄의 볼트태클을\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将皮卡丘的伏特攻击\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把皮卡丘的伏特攻擊\n升級為Ｚ招式。"
pikashunium_z:bag:
  names:
    jp_kana: サトピカＺ
    jp_kanji: サトピカＺ
    en: Pikashunium Z
    fr: Pikachazélite
    it: Ashpikacium Z
    de: Ash-Pikachium Z
    es: Ash-Pikastal Z
    ko: 지우피카Z
    zh_simp: 智皮卡Ｚ
    zh_trad: 智皮卡Ｚ
  descriptions:
    jp_kana: "キャップを　かぶった　ピカチュウの\n１０まんボルトを　Ｚワザに　かえる\nＺパワーの　けっしょうを　つくりだす。"
    jp_kanji: "キャップを　かぶった　ピカチュウの\n１０まんボルトを　Ｚワザに　変える\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\na Thunderbolt by Pikachu in a cap to an\nexclusive Z-Move."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise le Pikachu à casquette qui le tient\nà transformer son Tonnerre en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono a Pikachu con il berretto di trasformare\nla mossa Fulmine in una mossa Z."
    de: "Kristallisierte Z-Kraft, die die Attacke Donnerblitz\ndes Pikachus mit Kappe zu einer Z-Attacke\naufstuft. Wird bei Bedarf automatisch vervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a los\nPikachu que llevan gorra convertir su Rayo en un\nmovimiento Z."
    ko: "모자를 쓴 피카츄의\n10만볼트를 Z기술로 바꾸는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将戴着帽子的皮卡丘的十万伏特\n升级成特殊Ｚ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把戴著帽子的皮卡丘的十萬伏特\n升級為特殊Ｚ招式的Ｚ力量結晶。"
pikashunium_z:held:
  names:
    jp_kana: サトピカＺ
    jp_kanji: サトピカＺ
    en: Pikashunium Z
    fr: Pikachazélite
    it: Ashpikacium Z
    de: Ash-Pikachium Z
    es: Ash-Pikastal Z
    ko: 지우피카Z
    zh_simp: 智皮卡Ｚ
    zh_trad: 智皮卡Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　けっしょう。\nキャップを　かぶった　ピカチュウの\n１０まんボルトを　Ｚワザに　かえる。"
    jp_kanji: "Ｚパワーの　結晶。\nキャップを　かぶった　ピカチュウの\n１０まんボルトを　Ｚワザに　変える。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades a Thunderbolt by Pikachu in a cap to\na Z-Move."
    fr: "Une cristallisation de la Force Z, permettant\nde transformer le Tonnerre du Pikachu à casquette\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare la mossa Fulmine\ndi Pikachu con il berretto in una mossa Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft die Attacke\nDonnerblitz des Pikachus mit Kappe zu einer\nZ-Attacke auf."
    es: "Cristal que confiere el Poder Z al movimiento Rayo de\nlos Pikachu que llevan gorra."
    ko: "Z파워의 결정.\n모자를 쓴 피카츄의\n10만볼트를 Z기술로 바꾼다."
    zh_simp: "Ｚ力量的结晶。\n会将戴着帽子的皮卡丘的\n十万伏特升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把戴著帽子的皮卡丘的\n十萬伏特升級為Ｚ招式。"
pinap_berry:
  names:
    jp_kana: パイルのみ
    jp_kanji: パイルのみ
    en: Pinap Berry
    fr: Baie Nanana
    it: Baccananas
    de: Sananabeere
    es: Baya Pinia
    ko: 파인열매
    zh_simp: 凰梨果
    zh_trad: 凰梨果
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。\nふかふかのつちに　うめると\nパイルが　そだつ。"
    jp_kanji: "ポフィンの　材料。\nふかふかの土に　埋めると\nパイルが　育つ。"
    en: "A Poffin ingredient. Bury it in soft soil to grow a\nPinap Berry plant."
    fr: "Un ingrédient entrant dans la confection de Poffins.\nPlantez cette Baie dans un sol meuble et fertile\npour faire pousser un arbre à Baies Nanana."
    it: "Si usa per fare i poffin. Seminala nella terra soffice\nper far crescere una pianta di Baccananas."
    de: "Eine Knursp-Zutat. Pflanze sie in weichen Lehmboden\nein, damit neue Sananabeeren wachsen."
    es: "Ingrediente para pokochos. Si se planta en tierra suelta,\nsaldrá una planta de Pinia."
    ko: "포핀의 재료.\n푹신푹신한 땅에 심으면\n파인이 자란다."
    zh_simp: "宝芬的材料。\n埋在松软的土地里\n可以培育出凰梨。"
    zh_trad: "製作寶芬的材料。\n埋進鬆軟的泥土裡，\n長成後會結出凰梨。"
pink_apricorn:
  names:
    jp_kana: ももぼんぐり
    jp_kanji: ももぼんぐり
    en: Pink Apricorn
    fr: Noigrume Rose
    it: Ghicocca Rosa
    de: Aprikoko Pink
    es: Bonguri Rosa
    ko: 담홍규토리
    zh_simp: 粉球果
    zh_trad: 粉球果
  descriptions:
    jp_kana: "ももいろの　ぼんぐり。\nあまそうな　いい　においがする。"
    jp_kanji: "ももいろの　ぼんぐり。\nあまそうな　いい　においがする。"
    en: A pink Apricorn. It has a nice, sweet scent.
    fr: "Un Noigrume de couleur rose.\nIl dégage un arôme sucré."
    it: "Una ghicocca di colore rosa.\nEmana un profumo dolce."
    de: "Eine pinkfarbene Aprikoko. Sie duftet süß und\nappetitanregend."
    es: Bonguri de color rosa y aroma dulce.
    ko: "담홍색의 규토리.\n달콤한 듯한 좋은 향기가 난다."
    zh_simp: "粉红色的球果。\n有种甜甜的，好闻的香味。"
    zh_trad: "粉紅色的球果。\n有種甜甜的，好聞的香味。"
pink_nectar:
  names:
    jp_kana: うすもものミツ
    jp_kanji: うすもものミツ
    en: Pink Nectar
    fr: Nectar Rose
    it: Nettare rosa
    de: Rosa Nektar
    es: Néctar Rosa
    ko: 연분홍꿀
    zh_simp: 桃粉色花蜜
    zh_trad: 桃粉色花蜜
  descriptions:
    jp_kana: "ロイヤルアベニューの　かだんで\nてにいれた　はなのミツ。　とくていの\nポケモンの　すがたを　かえる。"
    jp_kanji: "ロイヤルアベニューの　花壇で\n手に入れた　花のミツ。　特定の\nポケモンの　姿を　変える。"
    en: "A flower nectar obtained from the flowering shrubs\non Royal Avenue.\nIt changes the form of certain species of Pokémon."
    fr: "Un nectar obtenu à partir des fleurs de la Rue\ndu Dôme Royal. Permet à un certain Pokémon\nde changer d’apparence."
    it: "Nettare ottenuto dai fiori delle aiuole di Viale\nRoyale. Fa cambiare forma a una determinata\nspecie di Pokémon."
    de: "Blütennektar von der Blumeninsel nahe der Avenue\nRoyale. Ein bestimmtes Pokémon kann damit seine\nForm ändern."
    es: "Néctar de ciertas flores de los parterres de la Avenida\nRoyale, capaz de hacer cambiar de forma a una\ndeterminada especie de Pokémon."
    ko: "로열 애버뉴 화단에서 손에 넣은\n꽃의 꿀. 특정 포켓몬의\n모습을 바꾼다."
    zh_simp: "在皇家大道的花园里获得的花蜜。\n可以改变特定宝可梦的样子。"
    zh_trad: "在皇家大道的花壇裡獲得的花蜜。\n可以改變特定寶可夢的樣子。"
pink_petal:
  names:
    jp_kana: ももいろはなびら
    jp_kanji: ももいろはなびら
    en: Pink Petal
    fr: Pétale Rose
    it: Petalo rosa
    de: Rosa Blatt
    es: Pétalo Rosa
    ko: 담홍꽃잎
    zh_simp: 粉红花瓣
    zh_trad: 粉紅花瓣
  descriptions:
    jp_kana: "マツリカのしれんで　マツリカから\nもらえる　はなびらの　おしばな。\n７しゅるい　あつめるのが　もくてき。"
    jp_kanji: "マツリカの試練で　マツリカから\nもらえる　はなびらの　押し花。\n７種類　集めるのが　目的。"
    en: "A pressed flower petal you receive from Mina\nduring Mina’s trial. The goal is to collect seven\ndifferent kinds of petals."
    fr: "Un pétale pressé qu’Oléa vous a remis lors\nde son Épreuve. Il y en a sept à collectionner."
    it: "Petalo di fiore pressato ottenuto da Rika\ndurante la sua prova. L’obiettivo è ricevere\nsette petali diversi."
    de: "Ein gepresstes Blütenblatt, das man im Rahmen von\nMatsurikas Prüfung von ihr erhält. Ziel ist es,\nsieben verschiedene Blütenblätter zu sammeln."
    es: "Pétalo prensado recibido de manos de Rika durante\nsu prueba. El objetivo es reunir siete distintos."
    ko: "말리화의 시련에서 말리화에게\n받을 수 있는 꽃잎의 압화.\n7종류 모으는 것이 목적."
    zh_simp: "在茉莉的考验中，\n能从茉莉那里得到的干花花瓣。\n目标是集齐７种。"
    zh_trad: "在茉莉的考驗中，\n從茉莉那裡得到的壓花花瓣。\n目標是集滿７種花瓣。"
pink_scarf:
  names:
    jp_kana: ピンクのバンダナ
    jp_kanji: ピンクのバンダナ
    en: Pink Scarf
    fr: Foulard Rose
    it: Fascia Rosa
    de: Rosa Schal
    es: Pañuelo Rosa
    ko: 분홍밴드
    zh_simp: 粉红头巾
    zh_trad: 粉紅頭巾
  descriptions:
    jp_kana: "もたせて　スーパーコンテストショー！に\nさんかすると　その　ポケモンは\nいつもより　かわいく　みられる。"
    jp_kanji: "持たせて　スーパーコンテストショー！に\n参加すると　その　ポケモンは\nいつもより　かわいく　みられる。"
    en: "An item to be held by a Pokémon. During a Super\nContest Show, it raises the Cuteness of the\nPokémon holding it."
    fr: "Objet à tenir. Augmente la Grâce d’un Pokémon\nlors du Super Show Concours."
    it: "Strumento da dare a un Pokémon. Ne aumenta\nla Grazia in una Super Gara-show."
    de: "Ein Item zum Tragen. Trainer erhöhen damit in der\nSuper-Wettbewerbs-Show die Putzigkeit ihres Pokémon."
    es: "Debe llevarlo un Pokémon. Aumenta la dulzura en las\nGalas Superconcurso."
    ko: "지니게 하여 슈퍼 콘테스트 쇼!에 참가하면\n그 포켓몬은 여느 때보다 귀엽게 보인다."
    zh_simp: "携带它去参加超级华丽大赛的\n宝可梦会比平时看上去更加可爱。"
    zh_trad: "攜帶它去參加超級華麗大賽的\n寶可夢會比平時看起來更加可愛。"
pinsir_candy:
  names:
    jp_kana: カイロスのアメ
    jp_kanji: カイロスのアメ
    en: Pinsir Candy
    fr: Bonbon Scarabrute
    it: Caramella Pinsir
    de: Pinsir-Bonbon
    es: Caramelo Pinsir
    ko: 쁘사이저의사탕
    zh_simp: 凯罗斯的糖果
    zh_trad: 凱羅斯的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de cierto Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
pinsirite:
  names:
    jp_kana: カイロスナイト
    jp_kanji: カイロスナイト
    en: Pinsirite
    fr: Scarabruite
    it: Pinsirite
    de: Pinsirnit
    es: Pinsirita
    ko: 쁘사이저나이트
    zh_simp: 凯罗斯进化石
    zh_trad: 凱羅斯進化石
  descriptions:
    jp_kana: "カイロスに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "カイロスに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Pinsir hold it, and this stone will enable it to\nMega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Scarabrute, elle lui permet de\nméga-évoluer durant un combat."
    it: "Un esemplare delle misteriose Megapietre.\nData a Pinsir, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Pinsir getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Pinsir en combate."
    ko: "쁘사이저에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让凯罗斯携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓凱羅斯攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
pixie_plate:
  names:
    jp_kana: せいれいプレート
    jp_kanji: せいれいプレート
    en: Pixie Plate
    fr: Plaque Pixie
    it: Lastraspiritello
    de: Feentafel
    es: Tabla Duende
    ko: 정령플레이트
    zh_simp: 妖精石板
    zh_trad: 妖精石板
  descriptions:
    jp_kana: "フェアリーの　タイプの　せきばん。\nもたせると　フェアリータイプの\nわざの　いりょくが　つよまる。"
    jp_kanji: "フェアリーの　タイプの　石盤。\n持たせると　フェアリータイプの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon. It’s a stone tablet\nthat boosts the power of Fairy-type moves."
    fr: "Objet à tenir. Une tablette en pierre augmentant\nla puissance des capacités de type Fée."
    it: "Strumento da dare a un Pokémon. Lastra di pietra che\npotenzia le mosse di tipo Folletto."
    de: "Ein Item zum Tragen. Diese Steintafel verstärkt Attacken\nvom Typ Fee."
    es: "Tabla de piedra que potencia los movimientos de tipo\nHada. Debe llevarla un Pokémon."
    ko: "페어리타입의 석판.\n지니게 하면 페어리타입\n기술의 위력이 강해진다."
    zh_simp: "妖精属性的石板。\n携带后，妖精属性的\n招式威力就会增强。"
    zh_trad: "妖精屬性的石板。\n攜帶後，妖精屬性的\n招式威力就會增強。"
plasma_card:
  names:
    jp_kana: プラズマカード
    jp_kanji: プラズマカード
    en: Plasma Card
    fr: Carte Plasma
    it: Carta Plasma
    de: Plasmakarte
    es: Tarjeta Plasma
    ko: 플라스마카드
    zh_simp: 等离子卡
    zh_trad: 等離子卡
  descriptions:
    jp_kana: "プラズマフリゲートの　せんないで\nパスワードを　にゅうりょくするときに\nひつようとなる　カードキー。"
    jp_kanji: "プラズマフリゲートの　船内で\nパスワードを　入力するときに\n必要となる　カードキー。"
    en: "A card key needed to enter the password inside\nthe Plasma Frigate."
    fr: "Une clé magnétique indispensable pour entrer\nle mot de passe sur la Frégate Plasma."
    it: "Carta magnetica necessaria per inserire\nla password sulla Fregata Plasma."
    de: "Eine Schlüsselkarte, die bei der Eingabe des Passworts\nan Bord der Plasma-Fregatte benötigt wird."
    es: "Tarjeta necesaria para introducir la contraseña en la\nFragata Plasma."
    ko: "플라스마 프리깃 배 안에서\n패스워드를 입력할 때\n필요한 카드키."
    zh_simp: "在等离子驱逐舰的\n船内输入密码时，\n需要用到的钥匙卡。"
    zh_trad: "在等離子驅逐艦的\n船內輸入密碼時，\n需要用到的鑰匙卡。"
plume_fossil:
  names:
    jp_kana: はねのカセキ
    jp_kanji: はねのカセキ
    en: Plume Fossil
    fr: Fossile Plume
    it: Fossilpiuma
    de: Federfossil
    es: Fósil Pluma
    ko: 날개화석
    zh_simp: 羽毛化石
    zh_trad: 羽毛化石
  descriptions:
    jp_kana: "とりポケモンの　そせんと　いわれる\nこだい　ポケモンの　カセキ。\nつばさの　いちぶ　らしい。"
    jp_kanji: "とりポケモンの　祖先と　いわれる\n古代ポケモンの　カセキ。\nつばさの　一部らしい。"
    en: "A fossil from a prehistoric Pokémon that once lived\nin the sky. It looks as if it could come from part of\nits wing."
    fr: "Le fossile d’un ancien Pokémon volant.\nIl semble que ce soit un morceau d’aile."
    it: "Fossile di un Pokémon preistorico che solcava\ni cieli. Sembra essere parte della sua ala."
    de: "Das Fossil eines uralten Pokémon, von dem man\nannimmt, dass es der Urahn der Vogel-Pokémon sei.\nEs handelt sich um einen Teil des Flügels."
    es: "Fósil de un Pokémon prehistórico que surcaba los\ncielos. Parece ser parte de una de sus alas."
    ko: "새포켓몬의 조상이라 불리는\n고대 포켓몬의 화석.\n날개의 일부인 듯하다."
    zh_simp: "据说是鸟宝可梦的祖先，\n古代宝可梦的化石。\n好像是翅膀的一部分。"
    zh_trad: "據說是鳥寶可夢祖先的\n古代寶可夢的化石。\n好像是翅膀的一部分。"
poffin_case:
  names:
    jp_kana: ポフィンケース
    jp_kanji: ポフィンケース
    en: Poffin Case
    fr: Boîte à Poffins
    it: Portapoffin
    de: Knurspbox
    es: Pokochera
    ko: 포핀케이스
    zh_simp: 宝芬盒
    zh_trad: 寶芬盒
  descriptions:
    jp_kana: "おりょうりで　つくった　ポフィンを\nほぞんする　いれもの。"
    jp_kanji: "お料理で　つくった　ポフィンを\n保存する　いれもの。"
    en: A case for storing Poffins cooked from Berries.
    fr: Une boîte pour ranger les Poffins faits à partir de Baies.
    it: "Contenitore per conservare i poffin cucinati\ncon le bacche."
    de: Eine Box für leckere Knurspe.
    es: "Caja en la que se transportan los pokochos elaborados\ncon bayas."
    ko: "요리로 만든 포핀을\n보존하는 용기."
    zh_simp: "用来保存烹饪好的\n宝芬的容器。"
    zh_trad: "用來存放做好的\n寶芬的容器。"
point_card:
  names:
    jp_kana: ポイントカード
    jp_kanji: ポイントカード
    en: Point Card
    fr: Carte à Points
    it: Scheda punti
    de: Punktekarte
    es: Tarjeta Puntos
    ko: 포인트카드
    zh_simp: 点数卡
    zh_trad: 點數卡
  descriptions:
    jp_kana: "かちとった　バトルポイントの　かずを\nみることが　できる　カード。"
    jp_kanji: "勝ち取った　バトルポイントの　数を\nみることが　できる　カード。"
    en: "A card that lists how many Battle Points you\nhave earned."
    fr: "Une carte indiquant le nombre de Points de Combat\nobtenus."
    it: "Scheda che su cui sono registrati i Punti Lotta\nche hai ottenuto."
    de: "Auf dieser Karte werden deine bisher gesammelten\nGewinnpunkte festgehalten."
    es: "Una tarjeta en la que se registran los Puntos de Batalla\nque has ganado."
    ko: "이겨서 받은 배틀포인트 수를\n볼 수 있는 카드."
    zh_simp: "可以查看赢得的\n对战点数的卡片。"
    zh_trad: "可以查看贏得的\n對戰點數的卡片。"
poison_barb:
  names:
    jp_kana: どくバリ
    jp_kanji: どくバリ
    en: Poison Barb
    fr: Pic Venin
    it: Velenaculeo
    de: Giftstich
    es: Flecha Venenosa
    ko: 독바늘
    zh_simp: 毒针
    zh_trad: 毒針
  descriptions:
    jp_kana: "どくのある　ちいさな　ハリ。\nもたせると　どくタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "どくのある　ちいさな　ハリ。\n持たせると　どくタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon. This small,\npoisonous barb boosts the power of\nPoison-type moves."
    fr: "Objet à tenir. Un petit pic empoisonné qui augmente\nla puissance des capacités de type Poison."
    it: "Strumento da dare a un Pokémon.\nAculeo piccolo e tossico che potenzia le mosse\ndi tipo Veleno."
    de: "Ein Item zum Tragen. Ein schmaler und giftiger\nWiderhaken, der Attacken vom Typ Gift verstärkt."
    es: "Flecha venenosa que refuerza los movimientos de tipo\nVeneno. Debe llevarla un Pokémon."
    ko: "독이 있는 작은 침.\n지니게 하면 독타입\n기술의 위력이 올라간다."
    zh_simp: "有毒的小针。\n携带后，毒属性的\n招式威力就会提高。"
    zh_trad: "有毒的小針。\n攜帶後，毒屬性的\n招式威力就會提高。"
poison_gem:
  names:
    jp_kana: どくのジュエル
    jp_kanji: どくのジュエル
    en: Poison Gem
    fr: Joyau Poison
    it: Bijouveleno
    de: Giftjuwel
    es: Gema Veneno
    ko: 독주얼
    zh_simp: 毒之宝石
    zh_trad: 毒之寶石
  descriptions:
    jp_kana: "どくの　タイプの　ジュエル。\nもたせると　いちどだけ　どくの\nわざの　いりょくが　つよまる。"
    jp_kanji: "どくの　タイプの　ジュエル。\n持たせると　１度だけ　どくの\n技の　威力が　強まる。"
    en: "A gem with an essence of poison. When held, it\nstrengthens the power of a Poison-type move\none time."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Poison."
    it: "Strumento da dare a un Pokémon.\nGioiello che potenzia una sola volta le mosse\ndi tipo Veleno."
    de: "Ein Juwel vom Typ Gift. Es erhöht einmalig die Stärke\neiner Attacke vom Typ Gift."
    es: "Joya de un solo uso que potencia los movimientos de\ntipo Veneno. Debe llevarla un Pokémon."
    ko: "독타입의 주얼.\n지니게 하면 한 번만 독\n기술의 위력이 강해진다."
    zh_simp: "毒属性的宝石。\n携带后，毒属性的\n招式威力仅会增强１次。"
    zh_trad: "毒屬性的寶石。\n攜帶後，毒屬性招式的\n威力會僅增強１次。"
poison_memory:
  names:
    jp_kana: ポイズンメモリ
    jp_kanji: ポイズンメモリ
    en: Poison Memory
    fr: ROM Poison
    it: ROM Veleno
    de: Gift-Disc
    es: Disco Veneno
    ko: 포이즌메모리
    zh_simp: 毒存储碟
    zh_trad: 毒記憶碟
  descriptions:
    jp_kana: "どくタイプの　データが　はいった\nメモリ。　とくていの　ポケモンが\nもつと　タイプが　かわる。"
    jp_kanji: "どくタイプの　データが　入った\nメモリ。　特定の　ポケモンが　持つと\nタイプが　変わる。"
    en: "A memory disc that contains Poison-type data.\nIt changes the type of the holder if held by\na certain species of Pokémon."
    fr: "Une carte mémoire contenant des données sur\nle type Poison. Un certain Pokémon peut changer\nde type en l’équipant."
    it: "ROM contenente dati sul tipo Veleno in formato\ndigitale. Permette a un certo Pokémon di cambiare\ntipo."
    de: "Eine Disc mit Daten zum Typ Gift. Sie löst bei einem\nbestimmten Pokémon einen Typenwechsel aus."
    es: "Disco de datos que contiene información relativa al tipo\nVeneno. Permite cambiar de tipo a cierto Pokémon."
    ko: "독타입의 데이터가 들어 있는\n메모리. 특정 포켓몬이\n지니면 타입이 바뀐다."
    zh_simp: "装有毒属性数据的存储碟。\n特定宝可梦携带后，\n属性就会发生变化。"
    zh_trad: "裝有毒屬性資料的記憶碟。\n特定寶可夢攜帶後，\n就會產生屬性的變化。"
poisonium_z:bag:
  names:
    jp_kana: ドクＺ
    jp_kanji: ドクＺ
    en: Poisonium Z
    fr: Toxizélite
    it: Venenium Z
    de: Toxium Z
    es: Toxistal Z
    ko: 독Z
    zh_simp: 毒Ｚ
    zh_trad: 毒Ｚ
  descriptions:
    jp_kana: "どくタイプの　わざを\nＺワザに　グレードアップする\nＺパワーの　けっしょうを　つくりだす。"
    jp_kanji: "どくタイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nPoison-type moves to Poison-type Z-Moves."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise son porteur à transformer ses capacités\nde type Poison en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono ai Pokémon di trasformare le mosse\ndi tipo Veleno in mosse Z."
    de: "Kristallisierte Z-Kraft, die Gift-Attacken zu Z-Attacken\naufstuft. Wird bei Bedarf automatisch vervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a los\nportadores convertir sus movimientos de tipo Veneno\nen movimientos Z."
    ko: "독타입 기술을\nZ기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将毒属性招式升级成\nＺ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把毒屬性招式\n升級為Ｚ招式的Ｚ力量結晶。"
poisonium_z:held:
  names:
    jp_kana: ドクＺ
    jp_kanji: ドクＺ
    en: Poisonium Z
    fr: Toxizélite
    it: Venenium Z
    de: Toxium Z
    es: Toxistal Z
    ko: 독Z
    zh_simp: 毒Ｚ
    zh_trad: 毒Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　けっしょう。\nどくタイプの　わざを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nどくタイプの　技を\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Poison-type moves to Z-Moves."
    fr: "Une cristallisation de la Force Z, permettant\nde transformer les capacités de type Poison\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare le mosse di tipo Veleno\nin mosse Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft\nGift-Attacken zu Z-Attacken auf."
    es: "Cristal que confiere el Poder Z a los movimientos\nde tipo Veneno."
    ko: "Z파워의 결정.\n독타입 기술을\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将毒属性的招式\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把毒屬性的招式\n升級為Ｚ招式。"
poke_ball:
  names:
    jp_kana: モンスターボール
    jp_kanji: モンスターボール
    en: Poké Ball
    fr: Poké Ball
    it: Poké Ball
    de: Pokéball
    es: Poké Ball
    ko: 몬스터볼
    zh_simp: 精灵球
    zh_trad: 精靈球
  descriptions:
    jp_kana: "やせいの　ポケモンに　なげて\nつかまえる　ための　ボール。\nカプセルしきに　なっている。"
    jp_kanji: "野生の　ポケモンに　投げて\n捕まえるための　ボール。\nカプセル式に　なっている。"
    en: "A device for catching wild Pokémon. It’s thrown like\na ball at a Pokémon, comfortably encapsulating\nits target."
    fr: "Un objet semblable à une capsule, qui capture\nles Pokémon sauvages. Il suffit pour cela de le lancer\ncomme une balle."
    it: "Strumento dotato di capsula usato per catturare\nPokémon selvatici. Si lancia contro il bersaglio\ncome una palla."
    de: "Damit fängst du wilde Pokémon. Du wirfst ihn wie einen\nnormalen Ball. Das Design ähnelt dem einer Kapsel."
    es: "Dispositivo con diseño capsular que atrapa Pokémon\nsalvajes. Se lanza como una bola contra el blanco."
    ko: "야생 포켓몬에게 던져서\n잡기 위한 볼.\n캡슐식으로 되어 있다."
    zh_simp: "用于投向野生宝可梦\n并将其捕捉的球。\n它是胶囊样式的。"
    zh_trad: "用於投向野生寶可夢\n並將其捕捉的球。\n它是膠囊樣式的。"
poke_doll:
  names:
    jp_kana: ピッピにんぎょう
    jp_kanji: ピッピにんぎょう
    en: Poké Doll
    fr: Poké Poupée
    it: Poké Bambola
    de: Poképuppe
    es: Poké Muñeco
    ko: 삐삐인형
    zh_simp: 皮皮玩偶
    zh_trad: 皮皮玩偶
  descriptions:
    jp_kana: "ポケモンの　きを　ひかせる　どうぐ。\nやせいポケモンとの　せんとうから\nぜったいに　にげられる。"
    jp_kanji: "ポケモンの　気をひかせる　道具。\n野生ポケモンとの　戦闘から\n絶対に　逃げられる。"
    en: "A doll that attracts the attention of a Pokémon.\nIt guarantees escape from any battle with\nwild Pokémon."
    fr: "Une poupée qui attire les Pokémon.\nPermet de s’enfuir d’un combat contre\nun Pokémon sauvage."
    it: "Strumento che attrae i Pokémon. È utile per fuggire\ndalla lotta con Pokémon selvatici."
    de: "Eine hübsche Puppe. Sie ermöglicht die Flucht im\nKampf gegen wilde Pokémon."
    es: "Un muñeco que atrae a los Pokémon. Es útil para huir\nde un combate contra un Pokémon salvaje."
    ko: "포켓몬의 관심을 끄는 도구.\n야생 포켓몬과의 배틀에서\n반드시 도망칠 수 있다."
    zh_simp: "能吸引宝可梦注意的道具。\n在和野生宝可梦的\n战斗中绝对可以逃走。"
    zh_trad: "能吸引寶可夢注意的道具。\n在和野生寶可夢的\n戰鬥中絕對可以逃走。"
poke_flute:
  names:
    jp_kana: ポケモンのふえ
    jp_kanji: ポケモンのふえ
    en: Poké Flute
    fr: Poké Flûte
    it: Poké Flauto
    de: Pokéflöte
    es: Poké Flauta
    ko: 포켓몬피리
    zh_simp: 宝可梦之笛
    zh_trad: 寶可夢之笛
  descriptions:
    jp_kana: "ねむっている　ポケモンも\nおもわず　めざめるほど　すばらしい\nねいろを　かなでる　ふえ。"
    jp_kanji: "眠っている　ポケモンも\n思わず　めざめるほど　すばらしい\n音色を　奏でる　ふえ。"
    en: "A flute that can play with such a beautiful tone that\neven sleeping Pokémon find themselves woken up."
    fr: "Une flûte au son si particulier qu’elle permet de\nréveiller les Pokémon les plus profondément endormis."
    it: "Flauto dal suono meraviglioso che risveglia anche\ni Pokémon profondamente addormentati."
    de: "Eine Flöte, die so wundervolle Töne spielen kann,\ndass selbst schlafende Pokémon aufwachen."
    es: "Una flauta con un timbre tan dulce y hermoso que\ndespierta hasta al Pokémon más profundamente\ndormido."
    ko: "잠자고 있는 포켓몬도\n무심코 잠에서 깨어날 정도로\n멋진 음색을 내는 피리."
    zh_simp: "能吹出让睡着的宝可梦\n都会情不自禁醒来的\n美妙音色的笛子。"
    zh_trad: "能吹出讓睡著的寶可夢\n都會情不自禁醒來的\n美妙音色的笛子。"
poke_radar:
  names:
    jp_kana: ポケトレ
    jp_kanji: ポケトレ
    en: Poké Radar
    fr: Poké Radar
    it: Poké Radar
    de: Pokéradar
    es: Poké Radar
    ko: 포켓트레
    zh_simp: 宝可追踪
    zh_trad: 寶可追蹤
  descriptions:
    jp_kana: "くさむらに　かくれている　ポケモンを\nさがしだせる　どうぐ。\nあるくと　でんちが　たまる。"
    jp_kanji: "くさむらに　隠れている　ポケモンを\n探しだせる　道具。\n歩くと　電池が　たまる。"
    en: "A tool that can search out Pokémon that are hiding\nin the tall grass. Its battery is recharged as\nyou walk."
    fr: "Un objet permettant de trouver les Pokémon\nqui se cachent dans les hautes herbes.\nSe recharge quand on marche."
    it: "Strumento con cui individuare i Pokémon\nnascosti nell’erba. La batteria si ricarica\nmentre cammini."
    de: "Spürt Pokémon im hohen Gras auf. Die Batterie wird\nbeim Reisen aufgeladen."
    es: "Busca Pokémon que se esconden en la hierba. La\nbatería se recarga mientras caminas."
    ko: "풀밭에 숨어 있는 포켓몬을\n찾아내는 도구.\n걸으면 전지가 충전된다."
    zh_simp: "能够将藏在草丛里的\n宝可梦找出来的道具。\n走路就能给电池充电。"
    zh_trad: "能夠將藏在草叢裡的\n寶可夢找出來的道具。\n走路就能給電池充電。"
poke_toy:
  names:
    jp_kana: ポケじゃらし
    jp_kanji: ポケじゃらし
    en: Poké Toy
    fr: Poké Plumet
    it: Pokégingillo
    de: Pokéwedel
    es: Pokéseñuelo
    ko: 포켓풀
    zh_simp: 宝可尾草
    zh_trad: 寶可尾草
  descriptions:
    jp_kana: "ポケモンの　きをひかせる　どうぐ。\nやせいポケモンとの　せんとうから\nぜったいに　にげられる。"
    jp_kanji: "ポケモンの　気をひかせる　道具。\n野生ポケモンとの　戦闘から\n絶対に　逃げられる。"
    en: "A toy that attracts the attention of a Pokémon.\nIt guarantees escape from any battle with\nwild Pokémon."
    fr: "Un objet qui attire les Pokémon.\nPermet de s’enfuir d’un combat contre\nun Pokémon sauvage."
    it: "Strumento che attrae i Pokémon. È utile per\nfuggire dalla lotta con Pokémon selvatici."
    de: "Ein Item, das wilde Pokémon vom Kampfgeschehen\nablenkt und garantiert die Flucht ermöglicht."
    es: "Un objeto que atrae a los Pokémon. Es útil para huir de\nun combate contra un Pokémon salvaje."
    ko: "포켓몬의 관심을 끄는 도구.\n야생 포켓몬과의 배틀에서\n반드시 도망칠 수 있다."
    zh_simp: "能吸引宝可梦注意的道具。\n在和野生宝可梦的\n战斗中绝对可以逃走。"
    zh_trad: "能吸引寶可夢注意的道具。\n在和野生寶可夢的\n戰鬥中絕對可以逃走。"
pokeblock_kit:
  names:
    jp_kana: ポロックキット
    jp_kanji: ポロックキット
    en: Pokéblock Kit
    fr: Kit Pokébloc
    it: Kit Pokémelle
    de: Pokériegel-Set
    es: Kit de Pokécubos
    ko: 포켓몬스넥키트
    zh_simp: 宝可方块套装
    zh_trad: 寶可方塊組合
  descriptions:
    jp_kana: "きのみから　ポロックを　つくる\nきのみブレンダーと　できたポロックを\nほぞんする　ポロックケースの　セット。"
    jp_kanji: "きのみから　ポロックを　作る\nきのみブレンダーと　できたポロックを\n保存する　ポロックケースの　セット。"
    en: "A set containing a Berry Blender for making\nPokéblocks and a Pokéblock Case for\nstoring Pokéblocks."
    fr: Boîte pour ranger le Mixeur à Baies et les Pokéblocs.
    it: "Kit composto da un Mixer bacche, usato per\npreparare le Pokémelle, e da un Portapokémelle,\nusato per conservarle."
    de: "Ein Set, das aus einem Beerenmixer für die Herstellung\nvon Pokériegeln und einer Pokériegelbox für deren\nLagerung besteht."
    es: "Kit consistente en una Licuabayas para preparar\nPokécubos a partir de bayas y un Tubo Pokécubos para\nguardarlos."
    ko: "나무열매로 포켓몬스넥을 만드는\n나무열매블렌더와 만들어진 포켓몬스넥을\n저장하는 포켓몬스넥케이스 세트."
    zh_simp: "这是树果混合器和宝可方块盒的套装。\n树果混合器可利用树果制作宝可方块，\n而做好的宝可方块可用宝可方块盒来保存。"
    zh_trad: "可由樹果製作寶可方塊的樹果混合器\n與存放用的寶可方塊盒之套裝。"
pokemon_box_link:
  names:
    jp_kana: ポケモンボックス
    jp_kanji: ポケモンボックス
    en: Pokémon Box Link
    fr: Boîte Pokémon
    it: Box Pokémon
    de: Pokémon-Box
    es: Caja de Pokémon
    ko: 포켓몬 박스
    zh_simp: 宝可梦盒
    zh_trad: 寶可夢盒
  descriptions:
    jp_kana: "いつでも　ポケモンセンターの\nパソコンの　ボックスに　アクセスして\nポケモンを　あずけたり　ひきだせる。"
    jp_kanji: "いつでも　ポケモンセンターの\nパソコンの　ボックスに　アクセスして\nポケモンを　預けたり　引きだせる。"
    en: "A device that allows you to access the Pokémon storage\nsystem. There are some places where it won’t work."
    fr: "Permet d’accéder aux Boîtes PC du Centre Pokémon\nà tout moment pour y déposer ou en retirer\ndes Pokémon."
    it: "Permette di accedere in qualsiasi momento ai Box\ndel PC del Centro Pokémon per depositare o ritirare\ni Pokémon."
    de: "Ermöglicht jederzeit Zugriff auf die PC-Boxen im\nPokémon-Center, um Pokémon abzulegen oder\nins Team aufzunehmen."
    es: "Permite acceder en todo momento a tus Cajas del PC\nde los Centros Pokémon para dejar o sacar Pokémon."
    ko: "언제든지 포켓몬센터에 있는\nPC의 박스에 접속해서\n포켓몬을 맡기거나 데려올 수 있다."
    zh_simp: "可以随时访问\n宝可梦中心电脑里的盒子，\n来寄放或领回需要的宝可梦。"
    zh_trad: "能隨時連線到\n寶可夢中心電腦裡的盒子，\n寄放或領出寶可夢。"
pokemon_box_link:lets_go:
  names:
    jp_kana: ポケモンボックス
    jp_kanji: ポケモンボックス
    en: Pokémon Box Link
    fr: Boîte Pokémon
    it: Box Pokémon
    de: Pokémon-Box
    es: Caja de Pokémon
    ko: 포켓몬 박스
    zh_simp: 宝可梦盒
    zh_trad: 寶可夢盒
  descriptions:
    jp_kana: "ー\nー\nー"
    jp_kanji: "ー\nー\nー"
    en: "-\n-\n-"
    fr: "-\n-\n-"
    it: "-\n-\n-"
    de: ー
    ko: "-\n-\n-"
    zh_simp: "ー\nー\nー"
    zh_trad: "ー\nー\nー"
polished_mud_ball:
  names:
    jp_kana: ピカピカだんご
    jp_kanji: ピカピカだんご
    en: Polished Mud Ball
    fr: Boulette de Boue
    it: Pallina di fango
    de: Glanzkugel
    es: Bola de Arcilla
    ko: 반짝반짝경단
    zh_simp: 光滑泥球
    zh_trad: 光滑泥球
  descriptions:
    jp_kana: "じかんを　かけて　みがきあげた\nひょうめんが　ツルツルに　ひかる\nどろで　できた　だんご。"
    jp_kanji: "時間を　かけて　磨きあげた\n表面が　ツルツルに　光る\n泥で　できた　団子。"
    en: "A ball made of mud. It had been polished for such\na long time that the surface is very shiny."
    fr: "Une boulette de boue si bien polie qu’elle brille\nde mille feux."
    it: "Una pallina di fango levigata con cura, tanto che\nla sua superficie è liscia e lucida."
    de: "Eine Kugel aus Schlamm, die so lange Zeit poliert\nwurde, dass ihre Oberfläche nun leuchtend glänzt."
    es: "Bola de barro que ha sido pulida durante tanto tiempo\nque su superficie ha quedado lisa y brillante."
    ko: "시간을 들여 빚어낸\n표면이 반질반질하게 빛나는\n진흙으로 만든 경단."
    zh_simp: "用泥土制作的丸子。\n花了大把时间打磨，\n表面油光水滑。"
    zh_trad: "花了不少時間\n把表面磨得\n非常光滑的泥球。"
poliwag_candy:
  names:
    jp_kana: ニョロモのアメ
    jp_kanji: ニョロモのアメ
    en: Poliwag Candy
    fr: Bonbon Ptitard
    it: Caramella Poliwag
    de: Quapsel-Bonbon
    es: Caramelo Poliwag
    ko: 발챙이의사탕
    zh_simp: 蚊香蝌蚪的糖果
    zh_trad: 蚊香蝌蚪的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
pomeg_berry:
  names:
    jp_kana: ザロクのみ
    jp_kanji: ザロクのみ
    en: Pomeg Berry
    fr: Baie Grena
    it: Baccagrana
    de: Granabeere
    es: Baya Grana
    ko: 유석열매
    zh_simp: 榴石果
    zh_trad: 榴石果
  descriptions:
    jp_kana: "ポケモンに　あげると\nとても　なかよく　なりやすくなるが\nＨＰの　きそポイントは　さがる。"
    jp_kanji: "ポケモンに　あげると\nとても　なかよく　なりやすくなるが\nＨＰの　基礎ポイントは　さがる。"
    en: "A Berry to be consumed by Pokémon. Using it on a\nPokémon makes it more friendly but lowers its\nHP base points."
    fr: "Une Baie qui rend les Pokémon plus amicaux,\nmais baisse leurs PV de base."
    it: "Usata su un Pokémon, ne aumenta il livello di amicizia,\nma ne diminuisce i punti base dei PS."
    de: "Isst ein Pokémon diese Beere, stärkt dies seine\nZutraulichkeit, verringert aber seinen KP-Basiswert."
    es: "Al usarla con un Pokémon, se gana su amistad, pero\ntambién reduce sus PS de base."
    ko: "포켓몬에게 주면\n매우 친밀해지기 쉬워지지만\nHP의 기초 포인트가 떨어진다."
    zh_simp: "如果把它交给宝可梦，\n宝可梦就会变得非常容易和训练家亲密，\n但ＨＰ的基础点数会降低。"
    zh_trad: "如果把它餵給寶可夢，\n寶可夢會非常容易和訓練家變得友好，\n但ＨＰ的基礎點數會降低。"
ponyta_candy:
  names:
    jp_kana: ポニータのアメ
    jp_kanji: ポニータのアメ
    en: Ponyta Candy
    fr: Bonbon Ponyta
    it: Caramella Ponyta
    de: Ponita-Bonbon
    es: Caramelo Ponyta
    ko: 포니타의사탕
    zh_simp: 小火马的糖果
    zh_trad: 小火馬的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
porygon_candy:
  names:
    jp_kana: ポリゴンのアメ
    jp_kanji: ポリゴンのアメ
    en: Porygon Candy
    fr: Bonbon Porygon
    it: Caramella Porygon
    de: Porygon-Bonbon
    es: Caramelo Porygon
    ko: 폴리곤의사탕
    zh_simp: 多边兽的糖果
    zh_trad: 多邊獸的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de cierto Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
