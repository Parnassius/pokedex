aloraichium_z:bag:
  names:
    jp_kana: アロライＺ
    jp_kanji: アロライＺ
    en: Aloraichium Z
    fr: Aloraïzélite
    it: Aloraicium Z
    de: A-Raichunium Z
    es: Alo-Raistal Z
    ko: 알로라이Z
    zh_simp: 阿罗雷Ｚ
    zh_trad: 阿羅雷Ｚ
  descriptions:
    jp_kana: "アローラちほうに　いる　ライチュウの\n１０まんボルトを　Ｚワザに　かえる\nＺパワーの　けっしょうを　つくりだす。"
    jp_kanji: "アローラ地方に　いる　ライチュウの\n１０まんボルトを　Ｚワザに　変える\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nAlolan Raichu’s Thunderbolt to an exclusive Z-Move."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise le Raichu de la région d’Alola qui\nle tient à transformer son Tonnerre en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono al Raichu di Alola di trasformare la\nmossa Fulmine in una mossa Z."
    de: "Kristallisierte Z-Kraft, die Alola-Raichus Attacke\nDonnerblitz zu einer Z-Attacke aufstuft.\nWird bei Bedarf automatisch vervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a\nlos Raichu de Alola convertir su Rayo en un\nmovimiento Z."
    ko: "알로라지방에 있는 라이츄의\n10만볼트를 Z기술로 바꾸는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将阿罗拉地区雷丘的十万伏特\n升级成特殊Ｚ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把阿羅拉地區雷丘的十萬伏特\n升級為特殊Ｚ招式的Ｚ力量結晶。"
aloraichium_z:held:
  names:
    jp_kana: アロライＺ
    jp_kanji: アロライＺ
    en: Aloraichium Z
    fr: Aloraïzélite
    it: Aloraicium Z
    de: A-Raichunium Z
    es: Alo-Raistal Z
    ko: 알로라이Z
    zh_simp: 阿罗雷Ｚ
    zh_trad: 阿羅雷Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　けっしょう。\nアローラちほうの　ライチュウの\n１０まんボルトを　Ｚワザに　かえる。"
    jp_kanji: "Ｚパワーの　結晶。\nアローラ地方の　ライチュウの\n１０まんボルトを　Ｚワザに　変える。"
    en: "This is a crystallized form of Z-Power. It upgrades\nAlolan Raichu’s Thunderbolt to a Z-Move."
    fr: "Une cristallisation de la Force Z, permettant\nde transformer le Tonnerre d’un Raichu de la région\nd’Alola en capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare la mossa Fulmine\ndel Raichu di Alola in una mossa Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft\nAlola-Raichus Attacke Donnerblitz zu einer\nZ-Attacke auf."
    es: "Cristal que confiere el Poder Z al movimiento Rayo\nde los Raichu de Alola."
    ko: "Z파워의 결정.\n알로라지방의 라이츄의\n10만볼트를 Z기술로 바꾼다."
    zh_simp: "Ｚ力量的结晶。\n会将阿罗拉地区雷丘的\n十万伏特升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把阿羅拉地區雷丘的\n十萬伏特升級為Ｚ招式。"
altarianite:
