    fr: Un bijou d’une civilisation vieille de plus de 3 000 ans.
    it: "Braccialetto forgiato circa 3.000 anni fa\nda un’antica civiltà."
    de: "Ein Armreif, angefertigt von einer gut 3 000 Jahre alten\nKultur."
    es: Brazalete de más de 3000 años de antigüedad.
    ko: "3000년 정도 된\n오랜 문명에서 만들어진 팔찌."
    zh_simp: "约３０００年前的\n文明制造的手镯。"
    zh_trad: "距今約３０００年前的\n文明裡製造的手鐲。"
