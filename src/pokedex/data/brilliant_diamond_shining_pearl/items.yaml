    es: Caramelo Exp. S
    ko: 경험사탕S
    zh_simp: 经验糖果Ｓ
    zh_trad: 經驗糖果Ｓ
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nあたえると　ポケモン　１ひきの\nけいけんちが　すこし　ふえる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n与えると　ポケモン　１匹の\n経験値が　少し　増える。"
    en: "A candy that is packed with energy. When consumed, it\nwill grant a single Pokémon a small amount of\nExp. Points."
    fr: "Un bonbon plein d’énergie.\nIl permet à un Pokémon de gagner un peu de Points\nd’Expérience."
    it: "Caramella altamente energetica che aumenta di poco\ni Punti Esperienza di un Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Beim Verzehr\nerhält das Pokémon eine geringe Menge an\nErfahrungspunkten."
    es: "Caramelo energético que aumenta ligeramente los\nPuntos de Experiencia de un Pokémon."
    ko: "에너지가 가득한 사탕.\n먹이면 포켓몬 1마리의\n경험치가 조금 올라간다."
    zh_simp: "充满能量的糖果。\n交给１只宝可梦后，\n可以为它增加少许经验值。"
    zh_trad: "充滿能量的糖果。\n餵給寶可夢後，\n能讓１隻寶可夢增加少量經驗值。"
exp_candy_xl:
  names:
    jp_kana: けいけんアメＸＬ
    jp_kanji: けいけんアメＸＬ
    en: Exp. Candy XL
    fr: Bonbon Exp. XL
    it: Caram. Esp. XL
    de: EP-Bonbon XL
    es: Caramelo Exp. XL
    ko: 경험사탕XL
    zh_simp: 经验糖果ＸＬ
    zh_trad: 經驗糖果ＸＬ
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nあたえると　ポケモン　１ひきの\nけいけんちが　とても　ふえる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n与えると　ポケモン　１匹の\n経験値が　とても　増える。"
    en: "A candy that is packed with energy. When consumed, it\nwill grant a single Pokémon a very large amount of\nExp. Points."
    fr: "Un bonbon plein d’énergie.\nIl permet à un Pokémon de gagner beaucoup\nde Points d’Expérience."
    it: "Caramella altamente energetica che aumenta\nmoltissimo i Punti Esperienza di un Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Beim Verzehr\nerhält das Pokémon eine sehr große Menge an\nErfahrungspunkten."
    es: "Caramelo energético que aumenta mucho los Puntos\nde Experiencia de un Pokémon."
    ko: "에너지가 가득한 사탕.\n먹이면 포켓몬 1마리의\n경험치가 매우 많이 올라간다."
    zh_simp: "充满能量的糖果。\n交给１只宝可梦后，\n可以为它增加大量经验值。"
    zh_trad: "充滿能量的糖果。\n餵給寶可夢後，\n能讓１隻寶可夢增加大量經驗值。"
exp_candy_xs:
  names:
