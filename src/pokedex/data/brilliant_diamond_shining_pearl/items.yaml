ability_capsule:
  names:
    jp_kana: とくせいカプセル
    jp_kanji: とくせいカプセル
    en: Ability Capsule
    fr: Pilule Talent
    it: Capsula abilità
    de: Fähigk.-Kapsel
    es: Cáps. Habilidad
    ko: 특성캡슐
    zh_simp: 特性胶囊
    zh_trad: 特性膠囊
  descriptions:
    jp_kana: "２しゅるいの　とくせいを　もつ\nポケモンに　つかうと　いまとはちがう\nとくせいに　かえられる　カプセル。"
    jp_kanji: "２種類の　特性を　持つ\nポケモンに　使うと　今とは違う\n特性に　変えられる　カプセル。"
    en: "A capsule that allows a Pokémon with two Abilities\nto switch between these Abilities when it is used."
    fr: "Une capsule permettant à un Pokémon pouvant\navoir deux talents de passer de l’un à l’autre."
    it: "Se usata su un Pokémon che può avere due abilità,\nquesta capsula permette di cambiare quella attiva."
    de: "Bei Anwendung auf ein Pokémon, das zwei\nverschiedene Fähigkeiten haben kann, wird seine\naktuelle Fähigkeit mit der anderen ausgewechselt."
    es: "Cápsula que les permite cambiar de habilidad a los\nPokémon que poseen dos."
    ko: "2종류의 특성을 가진\n포켓몬에게 사용하면 지금과는 다른\n특성으로 바꿀 수 있는 캡슐."
    zh_simp: "如果用于有着２种特性的宝可梦，\n就能令其现有特性变为另一种的胶囊。"
    zh_trad: "如果用於有著２種特性的\n寶可夢，就能使其特性\n變為另外一種的膠囊。"
ability_patch:
  names:
    jp_kana: とくせいパッチ
    jp_kanji: とくせいパッチ
    en: Ability Patch
    fr: Patch Talent
    it: Cerotto abilità
    de: Fähigk.-Pflaster
    es: Parche Habilidad
    ko: 특성패치
    zh_simp: 特性膏药
    zh_trad: 特性膏藥
  descriptions:
    jp_kana: "つうじょうの　とくせいを　もつ\nポケモンに　つかうと　めずらしい\nとくせいに　かえられる　パッチ。"
    jp_kanji: "通常の　特性を　持つ\nポケモンに　使うと　珍しい\n特性に　変えられる　パッチ。"
    en: "A patch that allows a Pokémon with a regular Ability\nto have a rare Ability."
    fr: "Un objet qui permet de remplacer le talent ordinaire\nd’un Pokémon par un talent rare."
    it: "Cerotto che permette a un Pokémon dotato\ndi un’abilità comune di cambiarla in una più rara."
    de: "Ein Pflaster, das es ermöglicht, die reguläre Fähigkeit\neines Pokémon zu einer seltenen Fähigkeit zu ändern."
    es: "Parche que permite cambiar la habilidad normal de un\nPokémon a otra menos común."
    ko: "일반적인 특성을 가진 포켓몬에게 사용하면\n희귀한 특성으로 바꿀 수 있는 패치."
    zh_simp: "可以改变宝可梦特性的膏药。\n给拥有常见特性的宝可梦使用后，\n其特性会转变为稀有特性。"
    zh_trad: "使用於擁有常見特性的寶可夢，\n就能把寶可夢的特性改變成\n稀有特性的膏藥。"
ability_urge:
  names:
    jp_kana: スキルコール
    jp_kanji: スキルコール
    en: Ability Urge
    fr: Appel Talent
    it: Chiamabilità
    de: Fähigk.-Appell
    es: Habilitador
    ko: 스킬콜
    zh_simp: ？？？
    zh_trad: ？？？
  descriptions:
    jp_kana: "つかうと　みかたの　ポケモンの\nとくせいを　はつどう　させる。"
    jp_kanji: "使うと　味方の　ポケモンの\n特性を　発動させる。"
    en: When used, it activates the Ability of an ally Pokémon.
    fr: Déclenche le talent d’un Pokémon allié.
    it: "Se usato su un Pokémon della squadra, ne attiva\nl’abilità."
    de: Aktiviert bei Gebrauch die Fähigkeit des Mitstreiters.
    es: "Al usarlo, activa la habilidad de un Pokémon de tu\nequipo."
    ko: "사용하면 같은 편 포켓몬의\n특성을 발동시킨다."
    zh_simp: "使用后，能令我方\n宝可梦的特性启动。"
    zh_trad: "使用後，能使我方\n寶可夢的特性發動。"
abomasite:
  names:
    jp_kana: ユキノオナイト
    jp_kanji: ユキノオナイト
    en: Abomasite
    fr: Blizzarite
    it: Abomasnowite
    de: Rexblisarnit
    es: Abomasnowita
    ko: 눈설왕나이트
    zh_simp: 暴雪王进化石
    zh_trad: 暴雪王進化石
  descriptions:
    jp_kana: "ユキノオーに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "ユキノオーに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Abomasnow hold it, and this stone will enable\nit to Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Blizzaroi, elle lui permet de\nméga-évoluer durant un combat."
    it: "Un esemplare delle misteriose Megapietre.\nData ad Abomasnow, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Rexblisar getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Abomasnow en combate."
    ko: "눈설왕에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让暴雪王携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓暴雪王攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
abra_candy:
  names:
    jp_kana: ケーシィのアメ
    jp_kanji: ケーシィのアメ
    en: Abra Candy
    fr: Bonbon Abra
    it: Caramella Abra
    de: Abra-Bonbon
    es: Caramelo Abra
    ko: 캐이시의사탕
    zh_simp: 凯西的糖果
    zh_trad: 凱西的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
absolite:
  names:
    jp_kana: アブソルナイト
    jp_kanji: アブソルナイト
    en: Absolite
    fr: Absolite
    it: Absolite
    de: Absolnit
    es: Absolita
    ko: 앱솔나이트
    zh_simp: 阿勃梭鲁进化石
    zh_trad: 阿勃梭魯進化石
  descriptions:
    jp_kana: "アブソルに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "アブソルに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Absol hold it, and this stone will enable it to\nMega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Absol, elle lui permet de\nméga-évoluer durant un combat."
    it: "Un esemplare delle misteriose Megapietre.\nData ad Absol, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Absol getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Absol en combate."
    ko: "앱솔에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让阿勃梭鲁携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓阿勃梭魯攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
absorb_bulb:
  names:
    jp_kana: きゅうこん
    jp_kanji: きゅうこん
    en: Absorb Bulb
    fr: Bulbe
    it: Bulbo
    de: Knolle
    es: Tubérculo
    ko: 구근
    zh_simp: 球根
    zh_trad: 球根
  descriptions:
    jp_kana: "つかいすての　きゅうこん。\nもたせて　みずの　わざを　うけると\nとくこうが　あがる。"
    jp_kanji: "使い捨ての　きゅうこん。\n持たせて　みずの　技を　受けると\n特攻が　あがる。"
    en: "An item to be held by a Pokémon. It boosts Sp. Atk\nif the holder is hit with a Water-type attack. It can only\nbe used once."
    fr: "Objet à tenir. Un bulbe jetable qui augmente\nl’Attaque Spéciale du porteur lorsqu’il encaisse\nune attaque de type Eau."
    it: "Bulbo monouso. Se il Pokémon che ha questo\nstrumento subisce una mossa di tipo Acqua,\nil suo Attacco Speciale aumenta."
    de: "Eine einmalig einsetzbare Knolle. Erhöht den\nSpezial-Angriff des Trägers, wenn ihn eine\nWasser-Attacke trifft."
    es: "Aumenta el Ataque Especial del portador si le alcanza\nun ataque de tipo Agua. Desaparece tras usarlo."
    ko: "단 한 번 쓰면 없어지는 구근.\n지니게 하고 물 기술로 공격받으면\n특수공격이 올라간다."
    zh_simp: "一次性使用的球根。\n携带它的宝可梦如果受到水属性\n招式的攻击，特攻就会提高。"
    zh_trad: "只能使用一次的球根。\n攜帶它的寶可夢如果受到水屬性\n招式的攻擊，特攻就會提高。"
acro_bike:
  names:
    jp_kana: ダートじてんしゃ
    jp_kanji: ダートじてんしゃ
    en: Acro Bike
    fr: Vélo Cross
    it: Bici da cross
    de: Kunstrad
    es: Bici Acrobática
    ko: 더트자전거
    zh_simp: 越野自行车
    zh_trad: 越野自行車
  descriptions:
    jp_kana: "ジャンプや　ウィリーの\nアクションが　できる\nおりたたみの　じてんしゃ。"
    jp_kanji: "ジャンプや　ウィリーの\nアクションが　できる\nおりたたみの　自転車。"
    en: "This folding bike allows you to perform actions\nsuch as wheelies and bunny hops."
    fr: "Un vélo pliable qui permet de bondir et de rouler\nsur la roue arrière."
    it: "Bici pieghevole con cui si possono fare acrobazie\ncome salti o impennate."
    de: "Ein Klapprad, mit dem du Kunststücke wie Sprünge\noder Wheelies ausführen kannst."
    es: "Bicicleta plegable capaz de correr sobre una sola rueda,\nrealizar saltos y otras acrobacias."
    ko: "점프나 윌리 액션을\n할 수 있는\n접이식 자전거다."
    zh_simp: "能做出跳跃或抬前轮动作的\n折叠式自行车。"
    zh_trad: "能做出跳躍或抬前輪動作的\n折疊式自行車。"
adamant_mint:
  names:
    jp_kana: いじっぱりミント
    jp_kanji: いじっぱりミント
    en: Adamant Mint
    fr: Aromate Rigide
    it: Menta Decisa
    de: Hart-Minze
    es: Menta Firme
    ko: 고집민트
    zh_simp: 固执薄荷
    zh_trad: 固執薄荷
  descriptions:
    jp_kana: "ポケモンに　かおりを　かがせると\nこうげきが　あがりやすく　なるが\nとくこうは　あがりにくくなる　ミント。"
    jp_kanji: "ポケモンに　香りを　かがせると\n攻撃が　上がりやすく　なるが\n特攻は　上がりにくくなる　ミント。"
    en: "When a Pokémon smells this mint, its Attack will grow\nmore easily, but its Sp. Atk will grow more slowly."
    fr: "Si un Pokémon hume cet aromate, son Attaque\nmontera plus facilement, mais son Attaque Spéciale\nse développera plus lentement."
    it: "Quando un Pokémon ne sente il profumo, il suo Attacco\naumenta più facilmente a scapito dell’Attacco Speciale."
    de: "Lässt man ein Pokémon an dieser Minze schnuppern,\nsteigt sein Angriff schneller, aber sein Spezial-Angriff\numso langsamer."
    es: "Cuando un Pokémon percibe su aroma, aumenta con\nmás facilidad su Ataque, en detrimento de su Ataque\nEspecial."
    ko: "포켓몬에게 향기를 맡게 하면\n공격이 오르기 쉬워지지만\n특수공격이 오르기 어려워지는 민트."
    zh_simp: "宝可梦闻了这种薄荷之后，\n攻击会易于提高，\n而特攻则难以提高。"
    zh_trad: "讓寶可夢聞這種薄荷的氣味，\n會令攻擊變得容易提高，\n但特攻則難以提高。"
adamant_orb:
  names:
    jp_kana: こんごうだま
    jp_kanji: こんごうだま
    en: Adamant Orb
    fr: Orbe Adamant
    it: Adamasfera
    de: Adamant-Orb
    es: Diamansfera
    ko: 금강옥
    zh_simp: 金刚宝珠
    zh_trad: 金剛寶珠
  descriptions:
    jp_kana: "ディアルガに　もたせると　ドラゴンと\nはがねタイプの　わざの　いりょくが\nあがる　ひかり　かがやく　たま。"
    jp_kanji: "ディアルガに　持たせると　ドラゴンと\nはがねタイプの　技の　威力が\nあがる　光り　輝く　珠。"
    en: "A brightly gleaming orb to be held by Dialga.\nIt boosts the power of Dragon- and Steel-type\nmoves when it is held."
    fr: "Un orbe très brillant destiné à Dialga.\nAugmente la puissance des capacités de types\nDragon et Acier."
    it: "Sfera molto luminosa da dare a Dialga.\nPotenzia le mosse di tipo Drago e Acciaio."
    de: "Ein hell leuchtender Orb. Verstärkt Attacken vom Typ\nDrache und Stahl, wenn Dialga ihn trägt."
    es: "Una esfera brillante que potencia los movimientos de\ntipo Acero y Dragón. Debe llevarla Dialga."
    ko: "디아루가에게 지니게 하면 드래곤과\n강철타입 기술의 위력이 올라가는\n반짝반짝 빛나는 구슬."
    zh_simp: "让帝牙卢卡携带的话，\n龙和钢属性的招式威力就会提高。\n散发着光辉的宝珠。"
    zh_trad: "讓帝牙盧卡攜帶的話，\n龍和鋼屬性的招式威力就會提高。\n散發著光輝的寶珠。"
adrenaline_orb:
  names:
    jp_kana: ビビリだま
    jp_kanji: ビビリだま
    en: Adrenaline Orb
    fr: Orbe Frousse
    it: Fifasfera
    de: Zitterorb
    es: Nerviosfera
    ko: 주눅구슬
    zh_simp: 胆怯球
    zh_trad: 膽怯球
  descriptions:
    jp_kana: "ポケモンに　もたせると\nいかくを　うけたとき\nすばやさが　あがる。"
    jp_kanji: "ポケモンに　持たせると\nいかくを　受けた時\nすばやさが　上がる。"
    en: "If held by a Pokémon, it boosts Speed\nwhen intimidated."
    fr: "Objet à tenir. Si le porteur subit une Intimidation,\nsa Vitesse augmente."
    it: "Data a un Pokémon, aumenta la Velocità se subisce\nPrepotenza."
    de: "Als getragenes Item erhöht er bei Pokémon, die unter\ndem Einfluss von Bedroher stehen, die Initiative."
    es: "Aumenta la Velocidad del portador si se siente\nintimidado."
    ko: "포켓몬에게 지니게 하면\n위협을 받았을 때\n스피드가 올라간다."
    zh_simp: "让宝可梦携带后，\n在受到威吓时速度会提高。"
    zh_trad: "讓寶可夢攜帶後，\n受到威嚇時速度就會提高。"
adventure_guide:
  names:
    jp_kana: たんけんこころえ
    jp_kanji: たんけんこころえ
    en: Adventure Guide
    fr: ABC Aventure
    it: Guida Avventura
    de: Abenteuerfibel
    es: Guía de Aventura
    ko: 탐험수칙
    zh_simp: 探险心得
    zh_trad: 探險心得
  descriptions:
    jp_kana: "トレーナーが　たびを　するときの\nアドバイスが　じどうで　ついかされて\nまとめられていく　こがたマシン。"
    jp_kanji: "トレーナーが　旅を　するときの\nアドバイスが　自動で　追加されて\nまとめられていく　小型マシン。"
    en: "A compact device that automatically collects and\nrecords advice when a Trainer is out on an adventure."
    fr: "Une petite machine qui enregistre automatiquement\nles conseils qu’un Dresseur reçoit au cours\nde ses aventures."
    it: "Piccolo congegno che raccoglie consigli utili per\ngli Allenatori in viaggio. Si aggiorna automaticamente."
    de: "Ein kompaktes Gerät, das automatisch nützliche\nInformationen zu allen Themen, die für einen Trainer\nauf Reisen von Belang sind, sammelt und verzeichnet."
    es: "Pequeño dispositivo que va añadiendo y compilando\nde forma automática consejos y pistas útiles para la\naventura de todo Entrenador."
    ko: "트레이너가 여행할 때 필요한\n어드바이스가 자동으로 추가되고\n정리되는 소형 머신."
    zh_simp: "一种小型装置。\n里面会自动追加和汇总\n训练家在旅行时所需要的各种建议。"
    zh_trad: "一種小型裝置。\n會自動追加和整合訓練家\n旅途中需要的各種建議。"
aerodactyl_candy:
  names:
    jp_kana: プテラのアメ
    jp_kanji: プテラのアメ
    en: Aerodactyl Candy
    fr: Bonbon Ptéra
    it: Caramella Aerodactyl
    de: Aerodactyl-Bonbon
    es: Caramelo Aerodactyl
    ko: 프테라의사탕
    zh_simp: 化石翼龙的糖果
    zh_trad: 化石翼龍的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de cierto Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
aerodactylite:
  names:
    jp_kana: プテラナイト
    jp_kanji: プテラナイト
    en: Aerodactylite
    fr: Ptéraïte
    it: Aerodactylite
