houndoominite:
  names:
    jp_kana: ヘルガナイト
    jp_kanji: ヘルガナイト
    en: Houndoominite
    fr: Démolossite
    it: Houndoomite
    de: Hundemonit
    es: Houndoomita
    ko: 헬가나이트
    zh_simp: 黑鲁加进化石
    zh_trad: 黑魯加進化石
  descriptions:
    jp_kana: "ヘルガーに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "ヘルガーに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Houndoom hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Démolosse, elle lui permet de\nméga-évoluer durant un combat."
    it: "Un esemplare delle misteriose Megapietre.\nData a Houndoom, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Hundemon getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Houndoom en combate."
    ko: "헬가에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让黑鲁加携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓黑魯加攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
hp_up:
  names:
    jp_kana: マックスアップ
    jp_kanji: マックスアップ
    en: HP Up
    fr: PV Plus
    it: PS-Su
    de: KP-Plus
    es: Más PS
    ko: 맥스업
    zh_simp: ＨＰ增强剂
    zh_trad: ＨＰ增強劑
  descriptions:
    jp_kana: "ポケモンの　えいようドリンク。\nポケモン　１ひきの　ＨＰの\nきそポイントを　あげる。"
    jp_kanji: "ポケモンの　栄養ドリンク。\nポケモン　１匹の　ＨＰの\n基礎ポイントを　あげる。"
    en: "A nutritious drink for Pokémon. When consumed,\nit raises the HP base points of a single Pokémon."
    fr: "Une boisson très nutritive qui augmente\nles PV de base d’un Pokémon."
    it: "Bevanda nutriente per Pokémon.\nAumenta i punti base dei PS."
    de: "Ein gehaltvolles Getränk, das den KP-Basiswert eines\nPokémon dauerhaft erhöht."
    es: "Nutritiva bebida que potencia los PS de base de\nun Pokémon."
    ko: "포켓몬의 영양 드링크.\n포켓몬 1마리의 HP\n기초 포인트를 올린다."
    zh_simp: "宝可梦的营养饮料。\n能提高１只宝可梦的\nＨＰ的基础点数。"
    zh_trad: "寶可夢的營養飲料。\n能提高１隻寶可夢的\nＨＰ的基礎點數。"
hyper_potion:
  names:
    jp_kana: すごいキズぐすり
    jp_kanji: すごいキズぐすり
    en: Hyper Potion
    fr: Hyper Potion
    it: Iperpozione
    de: Hypertrank
    es: Hiperpoción
    ko: 고급상처약
    zh_simp: 厉害伤药
    zh_trad: 厲害傷藥
  descriptions:
    jp_kana: "スプレーしきの　キズぐすり。\nポケモン　１ひきの　ＨＰを\n１２０だけ　かいふくする。"
    jp_kanji: "スプレー式の　キズぐすり。\nポケモン　１匹の　ＨＰを\n１２０だけ　回復する。"
    en: "A spray-type medicine for treating wounds. It can\nbe used to restore 120 HP to a single Pokémon."
    fr: "Un spray qui soigne les blessures.\nRestaure 120 PV d’un Pokémon."
    it: "Rimedio spray per le ferite.\nRestituisce 120 PS a un Pokémon."
    de: "Hilft bei Wunden. Füllt die KP eines Pokémon um\n120 Punkte auf."
    es: "Medicina en espray que cura heridas y restaura 120 PS\nde un Pokémon."
    ko: "스프레이식의 상처약.\n포켓몬 1마리의 HP를\n120만큼 회복한다."
    zh_simp: "喷雾式伤药。\n能让１只宝可梦\n回复１２０ＨＰ。"
    zh_trad: "噴霧式傷藥。\n能讓１隻寶可夢\n回復１２０ＨＰ。"
iapapa_berry:
  names:
    jp_kana: イアのみ
    jp_kanji: イアのみ
    en: Iapapa Berry
    fr: Baie Papaya
    it: Baccapaia
    de: Yapabeere
    es: Baya Pabaya
    ko: 파야열매
    zh_simp: 芭亚果
    zh_trad: 芭亞果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nピンチのとき　ＨＰを　かいふくする。\nきらいな　あじだと　こんらん　する。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　ＨＰを　回復する。\nきらいな味だと　混乱する。"
    en: "If held by a Pokémon, it restores the user’s HP in a\npinch, but it will cause confusion if the user hates\nthe taste."
    fr: "Tenue, cette Baie restaure des PV en cas de besoin,\nmais rend le Pokémon confus si son goût lui déplaît."
    it: "Se un Pokémon in difficoltà ha questa bacca,\nrecupera dei PS. Se al Pokémon non piace\nil suo sapore, può causare confusione."
    de: "Als getragenes Item füllt die Beere im Notfall die KP\neines Pokémon auf, doch ihr Aroma verwirrt jene,\ndie es nicht mögen."
    es: "Los Pokémon pueden llevarla o usarla para restaurar\nalgunos PS. Su sabor puede causar confusión si no les\ngusta."
    ko: "포켓몬에게 지니게 하면\n위급할 때 HP를 회복한다.\n싫어하는 맛이면 혼란에 빠진다."
    zh_simp: "让宝可梦携带后，\n危机时可以回复ＨＰ。\n如果讨厌这味道就会混乱。"
    zh_trad: "讓寶可夢攜帶後，\n危機時可以回復ＨＰ。\n如果討厭這味道就會混亂。"
ice_gem:
  names:
    jp_kana: こおりのジュエル
    jp_kanji: こおりのジュエル
    en: Ice Gem
    fr: Joyau Glace
    it: Bijoughiaccio
    de: Eisjuwel
    es: Gema Hielo
    ko: 얼음주얼
    zh_simp: 冰之宝石
    zh_trad: 冰之寶石
  descriptions:
    jp_kana: "こおりの　タイプの　ジュエル。\nもたせると　いちどだけ　こおりの\nわざの　いりょくが　つよまる。"
    jp_kanji: "こおりの　タイプの　ジュエル。\n持たせると　１度だけ　こおりの\n技の　威力が　強まる。"
    en: "A gem with an essence of ice. When held, it\nstrengthens the power of an Ice-type move\none time."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Glace."
    it: "Strumento da dare a un Pokémon.\nGioiello che potenzia una sola volta le mosse\ndi tipo Ghiaccio."
    de: "Ein Juwel vom Typ Eis. Es erhöht einmalig die Stärke\neiner Attacke vom Typ Eis."
    es: "Joya de un solo uso que potencia los movimientos de\ntipo Hielo. Debe llevarla un Pokémon."
    ko: "얼음타입의 주얼.\n지니게 하면 한 번만 얼음\n기술의 위력이 강해진다."
    zh_simp: "冰属性的宝石。\n携带后，冰属性的\n招式威力仅会增强１次。"
    zh_trad: "冰屬性的寶石。\n攜帶後，冰屬性招式的\n威力會僅增強１次。"
ice_heal:
  names:
    jp_kana: こおりなおし
    jp_kanji: こおりなおし
    en: Ice Heal
    fr: Antigel
    it: Antigelo
    de: Eisheiler
    es: Antihielo
    ko: 얼음상태치료제
    zh_simp: 解冻药
    zh_trad: 解凍藥
  descriptions:
    jp_kana: "スプレーしきの　くすり。\nポケモン　１ひきの　こおりの\nじょうたいを　かいふくする。"
    jp_kanji: "スプレー式の　薬。\nポケモン　１匹の　こおりの\n状態を　回復する。"
    en: "A spray-type medicine for treating freezing. It can be\nused to thaw out a single Pokémon that has been\nfrozen solid."
    fr: "Un médicament sous forme de spray.\nRéchauffe un Pokémon gelé."
    it: "Rimedio spray.\nCura un Pokémon dal congelamento."
    de: Ein Spray, das ein eingefrorenes Pokémon auftaut.
    es: Medicina en espray que descongela a un Pokémon.
    ko: "스프레이식의 약.\n포켓몬 1마리의\n얼음 상태를 회복한다."
    zh_simp: "喷雾式药水。\n能治愈１只宝可梦的\n冰冻状态。"
    zh_trad: "噴霧式藥水。\n能治癒１隻寶可夢的\n冰凍狀態。"
ice_memory:
  names:
    jp_kana: アイスメモリ
    jp_kanji: アイスメモリ
    en: Ice Memory
    fr: ROM Glace
    it: ROM Ghiaccio
    de: Eis-Disc
    es: Disco Hielo
    ko: 아이스메모리
    zh_simp: 冰雪存储碟
    zh_trad: 冰雪記憶碟
  descriptions:
    jp_kana: "こおりタイプの　データが　はいった\nメモリ。　とくていの　ポケモンが\nもつと　タイプが　かわる。"
    jp_kanji: "こおりタイプの　データが　入った\nメモリ。　特定の　ポケモンが　持つと\nタイプが　変わる。"
    en: "A memory disc that contains Ice-type data.\nIt changes the type of the holder if held by\na certain species of Pokémon."
    fr: "Une carte mémoire contenant des données sur\nle type Glace. Un certain Pokémon peut changer\nde type en l’équipant."
    it: "ROM contenente dati sul tipo Ghiaccio in formato\ndigitale. Permette a un certo Pokémon di cambiare\ntipo."
    de: "Eine Disc mit Daten zum Typ Eis. Sie löst bei einem\nbestimmten Pokémon einen Typenwechsel aus."
    es: "Disco de datos que contiene información relativa al tipo\nHielo. Permite cambiar de tipo a cierto Pokémon."
    ko: "얼음타입의 데이터가 들어 있는\n메모리. 특정 포켓몬이\n지니면 타입이 바뀐다."
    zh_simp: "装有冰属性数据的存储碟。\n特定宝可梦携带后，\n属性就会发生变化。"
    zh_trad: "裝有冰屬性資料的記憶碟。\n特定寶可夢攜帶後，\n就會產生屬性的變化。"
ice_stone:
  names:
    jp_kana: こおりのいし
    jp_kanji: こおりのいし
    en: Ice Stone
    fr: Pierre Glace
    it: Pietragelo
    de: Eisstein
    es: Piedra Hielo
    ko: 얼음의돌
    zh_simp: 冰之石
    zh_trad: 冰之石
  descriptions:
    jp_kana: "ある　とくていの　ポケモンを\nしんかさせる　ふしぎな　いし。\nゆきの　もようが　ある。"
    jp_kanji: "ある　特定の　ポケモンを\n進化させる　不思議な　石。\n雪の　模様が　ある。"
    en: "A peculiar stone that can make certain species of\nPokémon evolve. It has an unmistakable\nsnowflake pattern."
    fr: "Une pierre étrange qui fait évoluer certaines espèces\nde Pokémon. Un flocon de neige semble dessiné dessus."
    it: "Pietra particolare che fa evolvere determinate\nspecie di Pokémon. Si intravede l’immagine di\nun fiocco di neve."
    de: "Dieser spezielle Stein löst bei bestimmten Pokémon\ndie Entwicklung aus. Er hat ein Schneeflockenmuster."
    es: "Una piedra peculiar que hace evolucionar a algunos\nPokémon. Presenta motivos que recuerdan a los\ncristales de hielo."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 돌.\n눈송이 무늬가 있다."
    zh_simp: "能让某些特定宝可梦\n进化的神奇石头。\n有着雪花般的花纹。"
    zh_trad: "能讓特定寶可夢\n進化的神奇石頭。\n有著雪花般的花紋。"
iceroot_carrot:
  names:
    jp_kana: つめたいにんじん
    jp_kanji: つめたいにんじん
    en: Iceroot Carrot
    fr: Carotte Gelée
    it: Carota algida
    de: Polarkarotte
    es: Zanahoria Nívea
    ko: 차가운당근
    zh_simp: 冰萝卜
    zh_trad: 冰蘿蔔
  descriptions:
    jp_kana: "ほうじょうのおうの　あいばが\nこのんで　たべる　さくもつ。\nゆきぶかい　はたけで　そだった。"
    jp_kanji: "豊穣の王の　愛馬が\n好んで　食べる　作物。\n雪深い　畑で　育った。"
    en: "Produce that the King of Bountiful Harvests’ beloved\nsteed likes to eat. It grew in a field covered in snow."
    fr: "Un légume très apprécié du fidèle destrier\ndu Seigneur des récoltes. Il a été cultivé\ndans un champ entouré d’une neige épaisse."
    it: "Un ortaggio molto apprezzato dal fedele destriero\ndel Re dell’abbondanza. Cresce in campi coperti\ndi neve."
    de: "Eine Karotte, die auf einem tief verschneiten Feld\nheranwuchs. Das treue Ross des Königs der reichen\nErnte mag sie besonders gern."
    es: "Una zanahoria cultivada en un huerto rebosante de\nnieve. Es la hortaliza preferida del amado corcel del\nRey de las Cosechas."
    ko: "풍요의 왕의 애마가\n즐겨 먹는 작물.\n눈 덮인 밭에서 자랐다."
    zh_simp: "丰饶之王的爱马\n喜欢吃的农作物。\n生长于白雪皑皑的田地。"
    zh_trad: "豐饒之王的愛馬喜歡吃的農作物。\n生長在積雪深厚的田地。"
icicle_plate:
  names:
    jp_kana: つららのプレート
    jp_kanji: つららのプレート
    en: Icicle Plate
    fr: Plaque Glace
    it: Lastragelo
    de: Frosttafel
    es: Tabla Helada
    ko: 고드름플레이트
    zh_simp: 冰柱石板
    zh_trad: 冰柱石板
  descriptions:
    jp_kana: "こおりの　タイプの　せきばん。\nもたせると　こおりタイプの\nわざの　いりょくが　つよまる。"
    jp_kanji: "こおりの　タイプの　石盤。\n持たせると　こおりタイプの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon. It’s a stone tablet\nthat boosts the power of Ice-type moves."
    fr: "Objet à tenir. Une tablette en pierre augmentant\nla puissance des capacités de type Glace."
    it: "Strumento da dare a un Pokémon. Lastra di pietra che\npotenzia le mosse di tipo Ghiaccio."
    de: "Ein Item zum Tragen. Diese Steintafel verstärkt\nAttacken vom Typ Eis."
    es: "Tabla de piedra que potencia los movimientos de tipo\nHielo. Debe llevarla un Pokémon."
    ko: "얼음타입의 석판.\n지니게 하면 얼음타입\n기술의 위력이 강해진다."
    zh_simp: "冰属性的石板。\n携带后，冰属性的\n招式威力就会增强。"
    zh_trad: "冰屬性的石板。\n攜帶後，冰屬性的\n招式威力就會增強。"
icium_z:bag:
  names:
    jp_kana: コオリＺ
    jp_kanji: コオリＺ
    en: Icium Z
    fr: Cryozélite
    it: Glacium Z
    de: Glacium Z
    es: Criostal Z
    ko: 얼음Z
    zh_simp: 冰Ｚ
    zh_trad: 冰Ｚ
  descriptions:
    jp_kana: "こおりタイプの　わざを\nＺワザに　グレードアップする\nＺパワーの　けっしょうを　つくりだす。"
    jp_kanji: "こおりタイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nIce-type moves to Ice-type Z-Moves."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise son porteur à transformer ses capacités\nde type Glace en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono ai Pokémon di trasformare le mosse\ndi tipo Ghiaccio in mosse Z."
    de: "Kristallisierte Z-Kraft, die Eis-Attacken zu Z-Attacken\naufstuft. Wird bei Bedarf automatisch vervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a los\nportadores convertir sus movimientos de tipo Hielo en\nmovimientos Z."
    ko: "얼음타입 기술을\nZ기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将冰属性招式升级成\nＺ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把冰屬性招式\n升級為Ｚ招式的Ｚ力量結晶。"
icium_z:held:
  names:
    jp_kana: コオリＺ
    jp_kanji: コオリＺ
    en: Icium Z
    fr: Cryozélite
    it: Glacium Z
    de: Glacium Z
    es: Criostal Z
    ko: 얼음Z
    zh_simp: 冰Ｚ
    zh_trad: 冰Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　けっしょう。\nこおりタイプの　わざを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nこおりタイプの　技を\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Ice-type moves to Z-Moves."
    fr: "Une cristallisation de la Force Z, permettant\nde transformer les capacités de type Glace\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare le mosse di tipo Ghiaccio\nin mosse Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft\nEis-Attacken zu Z-Attacken auf."
    es: "Cristal que confiere el Poder Z a los movimientos\nde tipo Hielo."
    ko: "Z파워의 결정.\n얼음타입 기술을\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将冰属性的招式\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把冰屬性的招式\n升級為Ｚ招式。"
icy_rock:
  names:
    jp_kana: つめたいいわ
    jp_kanji: つめたいいわ
    en: Icy Rock
    fr: Roche Glace
    it: Rocciafredda
    de: Eisbrocken
    es: Roca Helada
    ko: 차가운바위
    zh_simp: 冰冷岩石
    zh_trad: 冰冷岩石
  descriptions:
    jp_kana: "もたせた　ポケモンが　あられを\nつかうと　いつもより　あられの\nじかんが　ながくなる。"
    jp_kanji: "持たせた　ポケモンが　あられを\n使うと　いつもより　あられの\n時間が　長くなる。"
    en: "An item to be held by a Pokémon. It extends the\nduration of the move Hail when used by\nthe holder."
    fr: "Objet à tenir. Prolonge la durée de la capacité Grêle\nutilisée par le porteur."
    it: "Strumento da dare a un Pokémon.\nAllunga la durata della mossa Grandine."
    de: "Ein Item zum Tragen. Verlängert die Dauer von\nHagelsturm, wenn der Träger diese Attacke einsetzt."
    es: "Prolonga la duración del movimiento Granizo que use el\nPokémon que la lleva."
    ko: "지니게 한 포켓몬이 싸라기눈을\n쓰면 여느 때보다 싸라기눈의\n시간이 길어진다."
    zh_simp: "携带它的宝可梦使出冰雹的话，\n冰雹的时间就会比平时更长。"
    zh_trad: "攜帶它的寶可夢\n使出冰雹的話，\n冰雹的時間就會比平時更長。"
ilimas_normalium_z:
  names:
    jp_kana: イリマノーマルＺ
    jp_kanji: イリマノーマルＺ
    en: Ilima Normalium Z
    fr: Cristal Z Althéo
    it: Normium Z Liam
    de: Elimas Normium Z
    es: Cristal Z (Liam)
    ko: 일리마의 노말Z
    zh_simp: 伊利马一般Ｚ
    zh_trad: 伊利馬一般Ｚ
  descriptions:
    jp_kana: "イリマから　あずかった　ノーマルＺ。\nしげみのどうくつ　おくにある\nだいざに　おくよう　たのまれた。"
    jp_kanji: "イリマから　預かった　ノーマルＺ。\n茂みの洞窟　奥にある\n台座に　置くよう　頼まれた。"
    en: "The Normalium Z you were entrusted with by Ilima.\nYou were asked to place it on the pedestal at\nthe back of Verdant Cavern."
    fr: "Une Normazélite qu’Althéo vous a confiée.\nIl vous a demandé de la déposer sur le piédestal\nqui se trouve au fond de la Grotte Verdoyante."
    it: "Normium Z ricevuto da Liam. Devi porlo\nsul piedistallo dentro la Grotta Sottobosco."
    de: "Das Normium Z, das Elima dir anvertraut hat. Er hat\ndich gebeten, es in den Sockel in der Vegetationshöhle\nzu legen."
    es: "Normastal Z que te entrega Liam para que lo deposites\nsobre el altar situado al fondo de la Cueva Sotobosque."
    ko: "일리마에게 받은 노말Z.\n우거진 동굴 안쪽에 있는\n대좌에 두도록 부탁받았다."
    zh_simp: "伊利马交给你保管的一般Ｚ。\n受人嘱托要把它放到\n葱郁洞窟深处的台座上。"
    zh_trad: "伊利馬交給你的一般Ｚ。\n有人拜託你把它放到\n蔥鬱洞窟深處的台座上。"
impish_mint:
  names:
    jp_kana: わんぱくミント
    jp_kanji: わんぱくミント
    en: Impish Mint
    fr: Aromate Malin
    it: Menta Scaltra
    de: Pfiffig-Minze
    es: Menta Agitada
    ko: 장난꾸러기민트
    zh_simp: 淘气薄荷
    zh_trad: 淘氣薄荷
  descriptions:
    jp_kana: "ポケモンに　かおりを　かがせると\nぼうぎょが　あがりやすく　なるが\nとくこうは　あがりにくくなる　ミント。"
    jp_kanji: "ポケモンに　香りを　かがせると\n防御が　上がりやすく　なるが\n特攻は　上がりにくくなる　ミント。"
    en: "When a Pokémon smells this mint, its Defense will grow\nmore easily, but its Sp. Atk will grow more slowly."
    fr: "Si un Pokémon hume cet aromate, sa Défense\nmontera plus facilement, mais son Attaque Spéciale\nse développera plus lentement."
    it: "Quando un Pokémon ne sente il profumo, la sua Difesa\naumenta più facilmente a scapito dell’Attacco Speciale."
    de: "Lässt man ein Pokémon an dieser Minze schnuppern,\nsteigt seine Verteidigung schneller, aber sein\nSpezial-Angriff umso langsamer."
    es: "Cuando un Pokémon percibe su aroma, aumenta con\nmás facilidad su Defensa, en detrimento de su Ataque\nEspecial."
    ko: "포켓몬에게 향기를 맡게 하면\n방어가 오르기 쉬워지지만\n특수공격이 오르기 어려워지는 민트."
    zh_simp: "宝可梦闻了这种薄荷之后，\n会令防御容易提高，\n而特攻则难以提高。"
    zh_trad: "讓寶可夢聞這種薄荷的氣味，\n會令防禦變得容易提高，\n但特攻則難以提高。"
incinium_z:bag:
  names:
    jp_kana: ガオガエンＺ
    jp_kanji: ガオガエンＺ
    en: Incinium Z
    fr: Félinozélite
    it: Incineronium Z
    de: Fuegronium Z
    es: Incinostal Z
    ko: 어흥염Z
    zh_simp: 炽焰咆哮虎Ｚ
    zh_trad: 熾焰咆哮虎Ｚ
  descriptions:
    jp_kana: "ガオガエンの　ＤＤラリアットを\nとくべつな　Ｚワザに　グレードアップする\nＺパワーの　けっしょうを　つくりだす。"
    jp_kanji: "ガオガエンの　ＤＤラリアットを\n特別な　Ｚワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nIncineroar’s Darkest Lariat to an exclusive Z-Move."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise le Félinferno qui le tient à transformer\nson Dark Lariat en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono a Incineroar di trasformare la mossa\nBraccioteso in una mossa Z."
    de: "Kristallisierte Z-Kraft, die Fuegros Attacke\nDark Lariat zu einer Z-Attacke aufstuft.\nWird bei Bedarf automatisch vervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a\nIncineroar convertir su Lariat Oscuro en un\nmovimiento Z."
    ko: "어흥염의 DD래리어트를\n특별한 Z기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将炽焰咆哮虎的ＤＤ金勾臂\n升级成特殊Ｚ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把熾焰咆哮虎的ＤＤ金勾臂\n升級為特殊Ｚ招式的Ｚ力量結晶。"
incinium_z:held:
  names:
    jp_kana: ガオガエンＺ
    jp_kanji: ガオガエンＺ
    en: Incinium Z
    fr: Félinozélite
    it: Incineronium Z
    de: Fuegronium Z
    es: Incinostal Z
    ko: 어흥염Z
    zh_simp: 炽焰咆哮虎Ｚ
    zh_trad: 熾焰咆哮虎Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　けっしょう。\nガオガエンの　ＤＤラリアットを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nガオガエンの　ＤＤラリアットを\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Incineroar’s Darkest Lariat to a Z-Move."
    fr: "Une cristallisation de la Force Z, permettant\nde transformer le Dark Lariat d’un Félinferno\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare la mossa Braccioteso\ndi Incineroar in una mossa Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft Fuegros\nAttacke Dark Lariat zu einer Z-Attacke auf."
    es: "Cristal que confiere el Poder Z al movimiento Lariat\nOscuro de Incineroar."
    ko: "Z파워의 결정.\n어흥염의 DD래리어트를\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将炽焰咆哮虎的ＤＤ金勾臂\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把熾焰咆哮虎的ＤＤ金勾臂\n升級為Ｚ招式。"
inquiry_mail:
  names:
    jp_kana: しつもんメール
    jp_kanji: しつもんメール
    en: Inquiry Mail
    fr: Lettre Demande
    it: Messaggio Chiedi
    de: Fragebrief
    es: Carta Pregunta
    ko: 질문메일
    zh_simp: 询问邮件
    zh_trad: 詢問郵件
  descriptions:
    jp_kana: "あいてへの　しつもんの　メールが\nかきやすい　びんせん。\nポケモンに　もたせて　つかう。"
    jp_kanji: "相手への　質問の　メールが\n書きやすい　レターペーパー。\nポケモンに　持たせて　使う。"
    en: "Stationery designed to make it easier to pose a\nquestion about something. Have a Pokémon hold it\nfor delivery."
    fr: "Un papier à lettres idéal pour poser des questions.\nPeut être tenu et livré par un Pokémon."
    it: "Carta da lettere ideale per scrivere una domanda.\nSi può dare a un Pokémon affinché la consegni."
    de: "Briefpapier, mit dem man jemandem eine Frage stellen\nkann. Gib es einem Pokémon zum Tragen."
    es: "Carta para preguntar a un compañero. Haz que la\nentregue un Pokémon."
    ko: "상대에게 질문하는 메일을\n쉽게 쓸 수 있는 편지지.\n포켓몬에게 지니게 해서 쓴다."
    zh_simp: "方便写询问对方这类邮件的信纸。\n使用该道具时，\n需要让宝可梦携带着来用。"
    zh_trad: "方便寫詢問對方這類郵件的信紙。\n需讓寶可夢攜帶使用。"
insect_plate:
  names:
    jp_kana: たまむしプレート
    jp_kanji: たまむしプレート
    en: Insect Plate
    fr: Plaque Insecte
    it: Lastrabaco
    de: Käfertafel
    es: Tabla Bicho
    ko: 비단벌레플레이트
    zh_simp: 玉虫石板
    zh_trad: 玉蟲石板
  descriptions:
    jp_kana: "むしの　タイプの　せきばん。\nもたせると　むしタイプの\nわざの　いりょくが　つよまる。"
    jp_kanji: "むしの　タイプの　石盤。\n持たせると　むしタイプの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon. It’s a stone tablet\nthat boosts the power of Bug-type moves."
    fr: "Objet à tenir. Une tablette en pierre augmentant\nla puissance des capacités de type Insecte."
    it: "Strumento da dare a un Pokémon. Lastra di pietra che\npotenzia le mosse di tipo Coleottero."
    de: "Ein Item zum Tragen. Diese Steintafel verstärkt\nAttacken vom Typ Käfer."
    es: "Tabla de piedra que potencia los movimientos de tipo\nBicho. Debe llevarla un Pokémon."
    ko: "벌레타입의 석판.\n지니게 하면 벌레타입\n기술의 위력이 강해진다."
    zh_simp: "虫属性的石板。\n携带后，虫属性的\n招式威力就会增强。"
    zh_trad: "蟲屬性的石板。\n攜帶後，蟲屬性的\n招式威力就會增強。"
instant_noodles:
  names:
    jp_kana: レトルトめん
    jp_kanji: レトルトめん
    en: Instant Noodles
    fr: Nouilles
    it: Noodle precotti
    de: Fertignudeln
    es: Fideos de Bote
    ko: 레토르트면
    zh_simp: 即食面
    zh_trad: 即食麵
  descriptions:
    jp_kana: "キャンプの　りょうりに　つかう\nしょくざいの　いっしゅ。ジャンクフードの\nテイストが　いがいと　マッチする。"
    jp_kanji: "キャンプの　料理に　使う\n食材の　一種。ジャンクフードの\nテイストが　意外と　マッチする。"
    en: "One of the many ingredients that can be used for\ncooking at your camp. It has a junk-food sort of taste,\nbut it goes well with curry."
    fr: "Un ingrédient de cuisine pour le camping.\nLa saveur de cet ingrédient, somme toute banal,\nse marie étonnamment bien avec le curry."
    it: "Uno degli ingredienti che puoi usare per cucinare\nin campeggio. Il tipico gusto da cibo spazzatura\nsi abbina sorprendentemente bene con il curry."
    de: "Eine Zutat für PokéCamping-Mahlzeiten. Das Aroma\ndieses Fertiggerichts passt überraschend gut zu Curry."
    es: "Un ingrediente para cocinar en el campamento. El\nsabor reconfortante de estos fideos casa\ninesperadamente bien con la salsa de curri."
    ko: "캠프 요리에 사용되는\n식재료 중 하나. 인스턴트 음식의\n맛이 의외로 잘 어울린다."
    zh_simp: "在露营营地制作料理时会使用的\n一种食材。没想到加入速食食品，\n滋味也出乎意料地和谐。"
    zh_trad: "製作露營料理時使用的食材之一。\n速食食品的味道\n意外地和料理很配。"
intriguing_stone:
  names:
    jp_kana: すごそうないし
    jp_kanji: すごそうないし
    en: Intriguing Stone
    fr: Pierre Insolite
    it: Sasso suggestivo
    de: Kurioser Stein
    es: Piedra Insólita
    ko: 대단할듯한돌
    zh_simp: 似珍石
    zh_trad: 似珍石
  descriptions:
    jp_kana: "みる　ひとに　よっては\nきちょう　かもしれない\nかなり　かわった　いし。"
    jp_kanji: "みる　人に　よっては\n貴重　かもしれない\nかなり　変わった　石。"
    en: "A rather curious stone that might appear valuable\nto some. It’s all in the eye of the beholder."
    fr: "Une pierre assez étrange qui pourrait avoir de la valeur\npour certains."
    it: "Un sasso piuttosto singolare che qualcuno\npotrebbe ritenere di valore."
    de: "Ein ungewöhnlicher Stein, dessen Wert je nach\nBetrachter unterschiedlich eingeschätzt wird."
    es: "Una curiosa piedra que a algunos les puede parecer de\ngran valor."
    ko: "보는 사람에 따라서는\n귀중할지도 모르는\n꽤 특이한 돌."
    zh_simp: "在有些人看来\n可能会觉得它十分贵重。\n非常与众不同的石头。"
    zh_trad: "在某些人眼裡\n可能會覺得它十分貴重。\n頗與眾不同的石頭。"
iron:
  names:
    jp_kana: ブロムヘキシン
    jp_kanji: ブロムヘキシン
    en: Iron
    fr: Fer
    it: Ferro
    de: Eisen
    es: Hierro
    ko: 사포닌
    zh_simp: 防御增强剂
    zh_trad: 防禦增強劑
  descriptions:
    jp_kana: "ポケモンの　えいようドリンク。\nポケモン　１ひきの　ぼうぎょの\nきそポイントを　あげる。"
    jp_kanji: "ポケモンの　栄養ドリンク。\nポケモン　１匹の　防御の\n基礎ポイントを　あげる。"
    en: "A nutritious drink for Pokémon. When consumed, it\nraises the Defense base points of a single Pokémon."
    fr: "Une boisson très nutritive qui augmente\nla Défense de base d’un Pokémon."
    it: "Bevanda nutriente per Pokémon.\nAumenta i punti base della Difesa."
    de: "Ein gehaltvolles Getränk, das den\nVerteidigungs-Basiswert eines Pokémon\ndauerhaft erhöht."
    es: "Nutritiva bebida que potencia la Defensa de base de un\nPokémon."
    ko: "포켓몬의 영양 드링크.\n포켓몬 1마리의 방어\n기초 포인트를 올린다."
    zh_simp: "宝可梦的营养饮料。\n能提高１只宝可梦的\n防御的基础点数。"
    zh_trad: "寶可夢的營養飲料。\n能提高１隻寶可夢的\n防禦的基礎點數。"
iron_ball:
  names:
    jp_kana: くろいてっきゅう
    jp_kanji: くろいてっきゅう
    en: Iron Ball
    fr: Balle Fer
    it: Ferropalla
    de: Eisenkugel
    es: Bola Férrea
    ko: 검은철구
    zh_simp: 黑色铁球
    zh_trad: 黑色鐵球
  descriptions:
    jp_kana: "もたせると　すばやさが　さがる。\nひこうタイプや　ふゆう　ポケモンは\nじめんわざが　あたって　しまう。"
    jp_kanji: "持たせると　素早さが　さがる。\nひこうタイプや　ふゆう　ポケモンは\nじめん技が　当たってしまう。"
    en: "An item to be held by a Pokémon. It lowers Speed\nand allows Ground-type moves to hit Flying types\nand holders that are levitating."
    fr: "Objet à tenir. Réduit la Vitesse. Rend les porteurs\nde type Vol, ainsi que ceux en lévitation,\nsensibles aux capacités de type Sol."
    it: "Riduce la Velocità e rende vulnerabili alle mosse\ndi tipo Terra se chi ce l’ha è di tipo Volante\no ha l’abilità Levitazione."
    de: "Ein Item zum Tragen. Macht Pokémon des Typs\nFlug oder mit der Fähigkeit Schwebe anfällig für\nBoden-Attacken. Senkt den Initiative-Wert."
    es: "Reduce la Velocidad. Los Pokémon que levitan y los de\ntipo Volador se tornan sensibles a movimientos de tipo\nTierra."
    ko: "지니게 하면 스피드가 떨어진다.\n비행타입이나 부유포켓몬은\n땅 기술에 맞아 버린다."
    zh_simp: "携带后，速度会降低。\n飞行属性以及飘浮宝可梦\n会被地面招式击中。"
    zh_trad: "攜帶後，速度會降低。\n飛行屬性以及飄浮特性的\n寶可夢會被地面招式擊中。"
iron_plate:
  names:
    jp_kana: こうてつプレート
    jp_kanji: こうてつプレート
    en: Iron Plate
    fr: Plaque Fer
    it: Lastraferro
    de: Eisentafel
    es: Tabla Acero
    ko: 강철플레이트
    zh_simp: 钢铁石板
    zh_trad: 鋼鐵石板
  descriptions:
    jp_kana: "はがねの　タイプの　せきばん。\nもたせると　はがねタイプの\nわざの　いりょくが　つよまる。"
    jp_kanji: "はがねの　タイプの　石盤。\n持たせると　はがねタイプの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon. It’s a stone tablet\nthat boosts the power of Steel-type moves."
    fr: "Objet à tenir. Une tablette en pierre augmentant\nla puissance des capacités de type Acier."
    it: "Strumento da dare a un Pokémon. Lastra di pietra che\npotenzia le mosse di tipo Acciaio."
    de: "Ein Item zum Tragen. Diese Steintafel verstärkt\nAttacken vom Typ Stahl."
    es: "Tabla de piedra que potencia los movimientos de tipo\nAcero. Debe llevarla un Pokémon."
    ko: "강철타입의 석판.\n지니게 하면 강철타입\n기술의 위력이 강해진다."
    zh_simp: "钢属性的石板。\n携带后，钢属性的\n招式威力就会增强。"
    zh_trad: "鋼屬性的石板。\n攜帶後，鋼屬性的\n招式威力就會增強。"
item_drop:
  names:
    jp_kana: アイテムドロップ
    jp_kanji: アイテムドロップ
    en: Item Drop
    fr: Jette Objet
    it: Lascioggetto
    de: Itemabwurf
    es: Tiraobjeto
    ko: 아이템드롭
    zh_simp: ？？？
    zh_trad: ？？？
  descriptions:
    jp_kana: "つかうと　みかたの　ポケモンが\nもっている　どうぐを　なくす。"
    jp_kanji: "使うと　味方の　ポケモンが\n持っている　道具を　なくす。"
    en: "When used, it causes an ally Pokémon to drop a\nheld item."
    fr: Retire tout objet tenu par un Pokémon allié.
    it: "Usandolo, un Pokémon della squadra lascerà\nil proprio strumento."
    de: "Der Mitstreiter lässt bei Gebrauch das von ihm\ngetragene Item fallen."
    es: "Cuando se usa, un Pokémon de tu equipo pierde su\nobjeto."
    ko: "사용하면 같은 편 포켓몬이\n지니고 있는 도구를 잃어버린다."
    zh_simp: "使用后，能立刻丢弃\n我方宝可梦携带的道具。"
    zh_trad: "使用後，我方寶可夢\n能立刻丟棄攜帶的道具。"
item_urge:
  names:
    jp_kana: アイテムコール
    jp_kanji: アイテムコール
    en: Item Urge
    fr: Appel Objet
    it: Chiamoggetto
    de: Itemappell
    es: Activaobjeto
    ko: 아이템콜
    zh_simp: ？？？
    zh_trad: ？？？
  descriptions:
    jp_kana: "つかうと　みかたの　ポケモンが\nもっている　どうぐを　すぐつかう。"
    jp_kanji: "使うと　味方の　ポケモンが\n持っている　道具を　すぐ使う。"
    en: "When used, it causes an ally Pokémon to use its\nheld item."
    fr: "Permet d’utiliser immédiatement l’objet tenu\npar un Pokémon allié."
    it: "Usandolo, un Pokémon della squadra userà\nimmediatamente il proprio strumento."
    de: "Der Mitstreiter setzt bei Gebrauch sofort das von ihm\ngetragene Item ein."
    es: "Cuando se usa, un Pokémon de tu equipo utiliza su\nobjeto inmediatamente."
    ko: "사용하면 같은 편 포켓몬이\n지니고 있는 도구를 바로 쓴다."
    zh_simp: "使用后，能立刻使用\n我方宝可梦携带的道具。"
    zh_trad: "使用後，我方寶可夢\n能立刻使用攜帶的道具。"
jaboca_berry:
  names:
    jp_kana: ジャポのみ
    jp_kanji: ジャポのみ
    en: Jaboca Berry
    fr: Baie Jaboca
    it: Baccajaba
    de: Jabocabeere
    es: Baya Jaboca
    ko: 자보열매
    zh_simp: 嘉珍果
    zh_trad: 嘉珍果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nぶつりわざを　うけたとき\nあいてにも　ダメージを　あたえる。"
    jp_kanji: "ポケモンに　持たせると\n物理技を　受けたとき\n相手にも　ダメージを　あたえる。"
    en: "A Berry to be consumed by Pokémon. If a physical\nattack hits the Pokémon holding it, the attacker will\nalso be hurt."
    fr: "Tenue, cette Baie inflige des dégâts à l’attaquant\ns’il utilise une capacité physique qui atteint sa cible."
    it: "Se un Pokémon ha questa bacca, chi attacca\nsubirà danni se la sua mossa fisica va a segno."
    de: "Als getragenes Item bewirkt diese Beere Schaden bei\njenen, die den Träger mit einer physischen Attacke\ntreffen."
    es: "Si la lleva un Pokémon cuando otro lanza un ataque\nfísico, este último también recibe daño."
    ko: "포켓몬에게 지니게 하면\n물리 기술로 공격받았을 때\n상대에게도 데미지를 준다."
    zh_simp: "让宝可梦携带后，\n在受到物理招式攻击时，\n能给予对手伤害。"
    zh_trad: "讓寶可夢攜帶後，\n在受到物理招式攻擊時，\n也能給予對手傷害。"
jade_orb:
  names:
    jp_kana: もえぎいろのたま
    jp_kanji: もえぎいろのたま
    en: Jade Orb
    fr: Orbe Vert
    it: Sfera Verde
    de: Grüne Kugel
    es: Esfera Verde
    ko: 연둣빛구슬
    zh_simp: 草绿色宝珠
    zh_trad: 草綠色寶珠
  descriptions:
    jp_kana: "ホウエンちほうの　でんせつと\nふかい　かかわりが　あると　いわれる\nみどりいろに　かがやく　たま。"
    jp_kanji: "ホウエン地方の　伝説と\n深い　関わりが　あると　いわれる\nみどりいろに　かがやく　たま。"
    en: "A shiny green orb that is said to have a legend tied\nto it. It’s known to have a deep connection with the\nHoenn region."
    fr: "Un orbe viride dont on dit qu’il a un lien très étroit\navec les légendes de Hoenn."
    it: "Sfera con riflessi verdi, che pare essere\nstrettamente legata alle leggende della regione\ndi Hoenn."
    de: "Eine grün schimmernde Kugel, von der in den\nLegenden der Hoenn-Region berichtet wird."
    es: "Esfera glauca de la que se dice que guarda una\nestrecha relación con las leyendas de Hoenn."
    ko: "호연지방의 전설과\n깊은 연관이 있다고 전해지는\n초록색으로 빛나는 구슬."
    zh_simp: "散发着绿色光辉的宝珠。\n据说和丰缘地区的传说渊源颇深。"
    zh_trad: "散發著綠色光輝的寶珠。\n據說和豐緣地區的傳說\n有著很深的淵源。"
jaw_fossil:
  names:
    jp_kana: アゴのカセキ
    jp_kanji: アゴのカセキ
    en: Jaw Fossil
    fr: Fossile Mâchoire
    it: Fossilmascella
    de: Kieferfossil
    es: Fósil Mandíbula
    ko: 턱화석
    zh_simp: 颚之化石
    zh_trad: 顎之化石
  descriptions:
    jp_kana: "おおむかし　ちじょうで　くらした\nこだい　ポケモンの　カセキ。\nおおきな　アゴの　いちぶ　らしい。"
    jp_kanji: "大昔　地上で　暮らした\n古代ポケモンの　カセキ。\n大きな　アゴの　一部らしい。"
    en: "A fossil from a prehistoric Pokémon that once lived\non the land. It looks as if it could be a piece of a\nlarge jaw."
    fr: "Le fossile d’un Pokémon préhistorique terrestre.\nOn dirait un morceau de mâchoire."
    it: "Fossile di un Pokémon preistorico che viveva\nsulla terraferma. Sembra far parte di una grossa\nmascella."
    de: "Das Fossil eines uralten Pokémon, das an Land lebte.\nEs sieht wie ein Kieferknochen aus."
    es: "Fósil de un Pokémon prehistórico terrestre. Parece ser\nparte de una mandíbula."
    ko: "오랜 옛날 지상에서 살았던\n고대 포켓몬의 화석.\n커다란 턱의 일부인 듯하다."
    zh_simp: "很久以前生活在地上的\n古代宝可梦的化石。\n好像是很大的颚的一部分。"
    zh_trad: "很久以前生活在地上的\n古代寶可夢的化石。\n好像是很大的顎的一部分。"
jigglypuff_candy:
  names:
    jp_kana: プリンのアメ
    jp_kanji: プリンのアメ
    en: Jigglypuff Candy
    fr: Bonbon Rondoudou
    it: Caramella Jigglypuff
    de: Pummeluff-Bonbon
    es: Caramelo Jigglypuff
    ko: 푸린의사탕
    zh_simp: 胖丁的糖果
    zh_trad: 胖丁的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
johto_slate:
  names:
    jp_kana: ジョウトのせきばん
    jp_kanji: ジョウトのせきばん
    en: Johto Slate
    fr: Tablette Johto
    it: Piastra di Johto
    de: Johto-Platte
    es: Losa Johto
    ko: 성도의석판
    zh_simp: 城都石板
    zh_trad: 城都石板
  descriptions:
    jp_kana: "ふしぎな　ちからに　あふれる　せきばん。\nハマナスパークの　ジョウトのへやと\nふかい　つながりを　かんじる。"
    jp_kanji: "不思議な　力に　あふれる　石板。\nハマナスパークの　ジョウトの部屋と\n深い　つながりを　感じる。"
    en: "A slate overflowing with enigmatic energy. You can feel\na strong connection between it and the Johto Room at\nRamanas Park."
    fr: "Une tablette qui regorge d’une étrange énergie.\nElle semble intimement liée à la Salle de Johto\ndu Parc Rosa Rugosa."
    it: "Lastra di pietra che emana una misteriosa energia.\nSembra profondamente connessa alla Stanza di Johto\ndel Parco Rosa Rugosa."
    de: "Eine Platte, die vor rätselhafter Energie strotzt.\nMan kann eine starke Verbindung zwischen ihr und der\nJohto-Kammer im Hamanasu-Park spüren."
    es: "Una losa rebosante de una misteriosa energía.\nParece estrechamente relacionada con la Sala\nde Johto del Parque Hansa."
    ko: "신비한 힘이 넘치는 석판.\n해당화파크의 성도의 방과\n깊은 연관이 있는 것 같다."
    zh_simp: "充满了神秘力量的石板。\n感觉它与玫瑰公园的城都之厅\n有着很深的关联。"
    zh_trad: "充滿神奇力量的石板。\n感覺它和玫瑰公園的城都之廳\n有很深的關係。"
jolly_mint:
  names:
    jp_kana: ようきミント
    jp_kanji: ようきミント
    en: Jolly Mint
    fr: Aromate Jovial
    it: Menta Allegra
    de: Froh-Minze
    es: Menta Alegre
    ko: 명랑민트
    zh_simp: 爽朗薄荷
    zh_trad: 爽朗薄荷
  descriptions:
    jp_kana: "ポケモンに　かおりを　かがせると\nすばやさが　あがりやすく　なるが\nとくこうは　あがりにくくなる　ミント。"
    jp_kanji: "ポケモンに　香りを　かがせると\n素早さが　上がりやすく　なるが\n特攻は　上がりにくくなる　ミント。"
    en: "When a Pokémon smells this mint, its Speed will grow\nmore easily, but its Sp. Atk will grow more slowly."
    fr: "Si un Pokémon hume cet aromate, sa Vitesse\nmontera plus facilement, mais son Attaque Spéciale\nse développera plus lentement."
    it: "Quando un Pokémon ne sente il profumo,\nla sua Velocità aumenta più facilmente\na scapito dell’Attacco Speciale."
    de: "Lässt man ein Pokémon an dieser Minze schnuppern,\nsteigt seine Initiative schneller, aber sein Spezial-Angriff\numso langsamer."
    es: "Cuando un Pokémon percibe su aroma, aumenta\ncon más facilidad su Velocidad, en detrimento de su\nAtaque Especial."
    ko: "포켓몬에게 향기를 맡게 하면\n스피드가 오르기 쉬워지지만\n특수공격이 오르기 어려워지는 민트."
    zh_simp: "宝可梦闻了这种薄荷之后，\n会令速度容易提高，\n而特攻则难以提高。"
    zh_trad: "讓寶可夢聞這種薄荷的氣味，\n會令速度變得容易提高，\n但特攻則難以提高。"
jynx_candy:
  names:
    jp_kana: ルージュラのアメ
    jp_kanji: ルージュラのアメ
