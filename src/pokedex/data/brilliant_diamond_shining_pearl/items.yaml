    jp_kanji: "戦闘中の　ポケモンの\n命中を　ものすごく　あげる。\nひっこめると　元に　戻る。"
    en: "It raises the accuracy of a Pokémon in battle\nimmensely. It wears off if the Pokémon\nis withdrawn."
    fr: "Augmente fortement la Précision pendant un combat.\nL’effet se dissipe si le Pokémon est retiré."
    it: "Aumenta incredibilmente la precisione di un\nPokémon in una lotta. L’effetto svanisce se il\nPokémon è sostituito."
    de: "Hebt die Genauigkeit eines Pokémon im Kampf\nenorm an. Die Wirkung endet mit dem Austausch des\nPokémon."
    es: "Aumenta mucho la Precisión en combate. Al cambiar de\nPokémon, el efecto desaparece."
    ko: "배틀 중인 포켓몬의 명중률을\n엄청나게 올린다. 포켓몬을 볼에\n넣어 버리면 원래대로 되돌아간다."
    zh_simp: "能极大提高战斗中\n宝可梦的命中。\n离场后，效果便会消失。"
    zh_trad: "能極大幅提高戰鬥中\n寶可夢的命中。\n離場後，效果便會消失。"
x_attack:
  names:
    jp_kana: プラスパワー
    jp_kanji: プラスパワー
    en: X Attack
    fr: Attaque +
    it: Attacco X
    de: X-Angriff
    es: Ataque X
    ko: 플러스파워
    zh_simp: 力量强化
    zh_trad: 力量強化
  descriptions:
    jp_kana: "せんとうちゅうの　ポケモンの\nこうげきを　おおきく　あげる　どうぐ。\nひっこめると　もとに　もどる。"
    jp_kanji: "戦闘中の　ポケモンの\n攻撃を　大きく　あげる　道具。\nひっこめると　元に　戻る。"
    en: "An item that sharply boosts the Attack stat of a\nPokémon during a battle. It wears off once the\nPokémon is withdrawn."
    fr: "Augmente beaucoup l’Attaque pendant un combat.\nL’effet disparaît si le Pokémon est retiré."
    it: "Aumenta di molto l’Attacco di un Pokémon in una\nlotta. L’effetto svanisce se il Pokémon è sostituito."
    de: "Hebt den Angriffs-Wert eines Pokémon im Kampf\nstark an. Die Wirkung wird mit dem Austausch des\nPokémon beendet."
    es: "Aumenta mucho el Ataque en combate. Al cambiar de\nPokémon, el efecto desaparece."
    ko: "배틀 중인 포켓몬의 공격을 크게 올리는\n도구. 포켓몬을 볼에 넣어 버리면\n원래대로 되돌아간다."
    zh_simp: "大幅提高战斗中\n宝可梦攻击的道具。\n离场后，效果便会消失。"
    zh_trad: "大大提高戰鬥中\n寶可夢攻擊的道具。\n離場後，效果便會消失。"
