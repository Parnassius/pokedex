        jp_kana:
          diamond: "ミノムッチから　しんかしたとき\nミノが　からだの　いちぶに　なった。\nいっしょう　ミノを　ぬぐことはない。"
          pearl: "しんかした　ばしょによって　すがたが\nかわる。みぢかにある　ざいりょうが\nからだの　いちぶに　なるのだ。"
        en:
          diamond: "When BURMY evolved, its cloak\nbecame a part of this Pokémon’s\nbody. The cloak is never shed."
          pearl: "Its appearance changes depending\non where it evolved. The materials\non hand become a part of its body."
        fr:
          diamond: "Quand CHENITI a évolué, sa\ncape a fusionné avec son corps.\nCHENISELLE ne s’en sépare jamais."
          pearl: "Son apparence varie selon le lieu\nd’évolution. Son corps est façonné\navec les matériaux à disposition."
        it:
          diamond: "Con l’evoluzione, il manto di BURMY\ndiventa parte del corpo di questo\nPokémon. Non se ne separa mai."
          pearl: "Il suo aspetto dipende dal luogo in\ncui si evolve. Tutto ciò che ha in-\ntorno va a costituire il suo corpo."
        de:
          diamond: "Als sich BURMY entwickelte,\nwurde sein Umhang Teil des Körpers.\nEs legt den Umhang niemals ab."
          pearl: "Die Umgebung, in der es sich ent-\nwickelt, bestimmt sein Aussehen.\nDinge dort werden zu Körperteilen."
        es:
          diamond: "Cuando BURMY evolucionó,\nsu caparazón pasó a formar parte\nde este Pokémon."
          pearl: "Su apariencia varía según dónde\nevolucione. Los materiales que haya\npasan a formar parte de su cuerpo."
        ko:
          diamond: "도롱충이로부터 진화할 때\n도롱이가 몸의 일부가 되었다.\n일생 도롱이를 벗는 일은 없다."
