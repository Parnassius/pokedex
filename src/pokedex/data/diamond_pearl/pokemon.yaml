        fr:
          diamond: "Ce Pokémon aime ce qui est rond et\nblanc et transporte un caillou en\nforme d’œuf pour imiter LEVEINARD."
          pearl: "PTIRAVI transporte un caillou rond\nen forme d’œuf dans sa poche\nventrale pour l’offrir à ses amis."
        it:
          diamond: "Ama gli oggetti bianchi e tondi.\nImita CHANSEY trasportando una\nroccia a forma di uovo."
          pearl: "Trasporta una roccia a forma\ndi uovo nella sua tasca ventrale\ne poi la offre ai suoi amici."
        de:
          diamond: "Es liebt runde, weiße Dinge. Es\nträgt einen eiförmigen Stein bei\nsich, und imitiert damit CHANEIRA."
          pearl: "In seinem Beutel trägt es einen\nrunden, eiförmigen Stein, den\nes Freunden gibt."
        es:
          diamond: "Le encantan las cosas blancas y\nredondas. Imita a CHANSEY llevando\nuna roca con forma de huevo."
          pearl: "Les da a sus amigos una roca con\nforma de huevo que transporta\nen la bolsa de su panza."
        ko:
          diamond: "하얗고 둥근 물건을 매우 좋아한다.\n럭키를 흉내 내어 알과\n똑 닮은 돌을 껴안고 있다."
          pearl: "알을 닮은 둥근 돌을\n배의 주머니에 넣고 있다.\n좋아하는 상대에게 돌을 준다."
