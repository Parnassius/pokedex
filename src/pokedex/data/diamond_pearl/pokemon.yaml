        jp_kana:
          diamond: "きょうれつな　ずつきの　こうげきは\nどんなに　がんじょうな　ものでも\nいちげきで　ふんさいする　いりょく。"
          pearl: "てつのように　かたい　ずがいこつ。\nジャングルの　きぎを　なぎたおし\nえものを　とらえる　あばれんぼう。"
        en:
          diamond: "Its powerful head butt has enough\npower to shatter even the most\ndurable things upon impact."
          pearl: "Its skull is as hard as iron. It is\na brute that tears down jungle\ntrees while catching prey."
        fr:
          diamond: "Son violent coup de tête est\nassez puissant pour pulvériser\nles matériaux les plus résistants."
          pearl: "Son crâne est dur comme du fer.\nCette brute abat des arbres quand\nelle chasse sa proie dans la jungle."
        it:
          diamond: "Tira testate talmente potenti da\nfrantumare anche oggetti durissimi."
          pearl: "Il suo cranio è duro come il ferro.\nÈ violento e abbatte gli alberi della\ngiungla mentre va a caccia di prede."
        de:
          diamond: "Sein kräftiger Kopfstoß hat genug\nKraft, um selbst die stabilsten\nDinge zu zerschmettern."
          pearl: "Sein Schädel ist hart wie Eisen. Es\nreißt Dschungelbäume nieder,\nwährend es seine Beute jagt."
        es:
          diamond: "Su potente cabezazo puede\nhacer añicos cualquier cosa."
          pearl: "Su cráneo es duro como el hierro.\nEs tan bruto que destroza la\njungla cuando persigue presas."
        ko:
          diamond: "강력한 박치기 공격은\n아무리 튼튼한 것이라도\n일격에 분쇄하는 위력을 가지고 있다."
          pearl: "철처럼 단단한 두개골이다.\n정글의 나무들을 넘어뜨려서\n먹이를 잡는 난동꾼이다."
