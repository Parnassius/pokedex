          pearl: "かんそうした　ばしょを　このむ。\nめ　から　みずを　だして　からだの\nすいぶんを　ちょうせつする。"
        en:
          diamond: "It looks as if it is always crying.\nIt is actually adjusting its body’s\nfluid levels by eliminating excess."
          pearl: "It prefers arid environments. It\nleaks water from its eyes to\nadjust its body’s fluid levels."
        fr:
          diamond: "On dirait qu’il pleure constamment.\nEn fait, il régule ses fluides\ncorporels en éliminant le surplus."
          pearl: "Il préfère les sols arides. Il \névacue l’eau par ses yeux pour\nréguler ses fluides corporels."
        it:
          diamond: "Sembra che pianga tutto il tempo.\nIn realtà regola il livello dei fluidi\ndel corpo eliminando gli eccessi."
          pearl: "Preferisce le terre aride. Rilascia\nacqua dagli occhi per regolare il\nlivello dei suoi fluidi corporei."
        de:
          diamond: "Es sieht aus, als würde es immer\nweinen. Dabei reguliert es nur\nseinen Wasserhaushalt."
          pearl: "Es bevorzugt trockene Gebiete. Es\ngibt über die Augen Wasser ab, um\nden Wasserhaushalt zu regulieren."
        es:
          diamond: "Parece que siempre está llorando,\npero en realidad está eliminando\nel exceso de fluidos corporales."
          pearl: "Prefiere entornos áridos. Sus\nojos expulsan agua para ajustar\nlos niveles de fluido corporal."
        ko:
          diamond: "항상 우는 것처럼 보이지만\n체내의 수분을 밖으로\n내어 조절하고 있는 것이다."
          pearl: "건조한 장소를 좋아한다.\n눈에서 물을 내어 몸의\n수분을 조절한다."
