        jp_kana:
          diamond: "まるめた　みみを　いきおいよく\nのばして　あいてに　たたきつける。\nおとなでも　とびあがるほど　いたい。"
          pearl: "きけんを　かんじとると　りょうみみを\nたてて　けいかいする。さむい　よるは\nけがわに　かおを　うずめて　ねむる。"
        en:
          diamond: "It slams foes by sharply uncoiling\nits rolled ears. It stings enough\nto make a grown-up cry in pain."
          pearl: "When it senses danger, it perks up\nits ears. On cold nights, it sleeps\nwith its head tucked into its fur."
        fr:
          diamond: "Il frappe l’ennemi en déroulant\nviolemment ses oreilles. Cela\npeut faire pleurer un adulte."
          pearl: "Il dresse les oreilles quand il sent\nun danger. Il dort la tête dans sa\nfourrure pendant les nuits froides."
        it:
          diamond: "Sbaraglia i nemici dispiegando con\nforza le orecchie arrotolate. Fa\npiangere di dolore anche gli adulti."
          pearl: "Drizza le orecchie quando avverte\nun pericolo. Nelle notti fredde,\ndorme con la testa nella pelliccia."
        de:
          diamond: "Es entrollt seine Ohren sehr\nschnell, um seine Gegner\nschmerzhaft zu schlagen."
          pearl: "Nimmt es Gefahr wahr, richtet es\nseine Ohren auf. In kalten Nächten\nvergräbt es den Kopf in seinem Fell."
        es:
          diamond: "Ataca a sus enemigos con un\ngolpe rápido de sus orejas. Sus\npicotazos son muy dolorosos."
          pearl: "Cuando siente peligro, levanta las\norejas. En noches frías, duerme\ncon la cabeza metida en el pelaje."
        ko:
          diamond: "말고 있던 귀를 기세 좋게\n뻗어서 상대를 힘껏 친다.\n어른이라도 펄쩍 뛸 만큼 아프다."
          pearl: "위험을 느끼면 양쪽 귀를\n세워서 경계한다. 추운 밤에는\n털에 얼굴을 묻고 잠잔다."
