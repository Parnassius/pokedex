          pearl: "つばさと　あしの　きんにくが　つよく\nちいさな　ポケモンを　つかんだまま\nらくらくと　とぶことが　できる。"
        en:
          diamond: "It has a savage nature. It will\ncourageously challenge foes that\nare much larger."
          pearl: "The muscles in its wings and legs\nare strong. It can easily fly while\ngripping a small Pokémon."
        fr:
          diamond: "Un Pokémon sauvage qui a le\ncourage de défier des ennemis\nbeaucoup plus grands que lui."
          pearl: "Ses ailes et ses pattes ont des\nmuscles développés. Il peut voler\nen agrippant un petit Pokémon."
        it:
          diamond: "Ha un’indole selvaggia. Sfida\ncoraggiosamente i nemici più\ngrossi di lui."
          pearl: "I muscoli di ali e zampe sono molto\nsviluppati. Vola senza fatica anche\nportando un piccolo Pokémon."
        de:
          diamond: "Es hat ein wildes Wesen. Mutig\nfordert es immer wieder Gegner\nheraus, die viel größer sind."
          pearl: "Die Muskeln in seinen Flügeln und\nBeinen sind stark. Es kann im Flug\nsogar ein anderes PKMN tragen."
        es:
          diamond: "Tiene un carácter salvaje.\nNo duda en desafiar a rivales\nmucho mayores."
          pearl: "Sus alas y sus patas son muy\nfuertes. Puede llevarse volando\nPokémon pequeños."
        ko:
          diamond: "사나운 성격의 포켓몬이다.\n자신보다도 몸이 큰\n상대에게도 과감하게 도전한다."
          pearl: "날개와 발의 근육이 강해\n작은 포켓몬을 붙잡은 채로\n너끈히 날 수 있다."
