        jp_kana:
          diamond: "きけんを　かんじると　ぜんしんの\nたいもうが　ひかる。あいてが　めを\nくらませている　あいだに　にげる。"
          pearl: "きんにくの　うごきで　でんきを\nつくる　しくみを　まえあしに　もつ。\nピンチになると　ぜんしんが　ひかる。"
        en:
          diamond: "All of its fur dazzles if danger is\nsensed. It flees while the foe is\nmomentarily blinded."
          pearl: "Its forelegs have a muscle-based\nsystem of generating electricity.\nIts body shines if endangered."
        fr:
          diamond: "Sa fourrure étincelle en cas de\ndanger. Il profite du fait que \nl’ennemi est aveuglé pour s’enfuir."
          pearl: "Les muscles de ses pattes avant\nproduisent de l’électricité. Son\ncorps s’illumine en cas de danger."
        it:
          diamond: "In caso di pericolo, la sua pelliccia\nsi illumina. Il nemico rimane acceca-\nto e lui ne approfitta per fuggire."
          pearl: "È in grado di generare elettricità\ncon i muscoli delle zampe anteriori.\nIl suo corpo brilla se è in pericolo."
        de:
          diamond: "In Gefahr blendet es seinen Gegner\nmit seinem Fell und flieht, während\nder Gegner einen Moment blind ist."
          pearl: "Ihre Vorderbeine stellen über die\nMuskeln Elektrizität her. Bei\nGefahr leuchtet ihr Körper."
        es:
          diamond: "Si siente peligro, todo su pelaje\nbrilla. Aprovecha la ceguera\ntemporal de su rival para huir."
          pearl: "Los músculos de sus patas\ndelanteras generan electricidad.\nSi está en peligro, brilla."
        ko:
          diamond: "위험을 느끼면 전신의 털이\n빛난다. 그로 인해 상대가 앞을\n보지 못하는 동안 도망친다."
          pearl: "근육의 움직임으로 전기를 만드는\n구조를 앞 발에 가지고 있다.\n위급해지면 전신이 빛난다."
