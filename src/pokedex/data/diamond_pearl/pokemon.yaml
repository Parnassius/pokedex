          pearl: "あいての　はっする　はどうを\nキャッチすることで　かんがえや\nうごきを　よみとることが　できる。"
        en:
          diamond: "It has the ability to sense the\nauras of all things.\nIt understands human speech."
          pearl: "By catching the aura emanating\nfrom others, it can read their\nthoughts and movements."
        fr:
          diamond: "Il ressent les auras de tout. Il \ncomprend le langage humain."
          pearl: "Il peut deviner les pensées et les\nmouvements des autres en\nanalysant leur aura."
        it:
          diamond: "È in grado di avvertire l’aura di\ntutte le cose.\nComprende il linguaggio umano."
          pearl: "Riesce a leggere i pensieri e i\nmovimenti del nemico decifrando\nl’aura che questo emette."
        de:
          diamond: "Es besitzt die Fähigkeit, die Aura\naller Dinge zu spüren. Es versteht\ndie menschliche Sprache."
          pearl: "Es nimmt die Aura seines Gegners\nwahr. So kann es dessen Gedanken\nund Bewegungen erkennen."
        es:
          diamond: "Puede sentir el aura de todas\nlas cosas. Comprende el\nlenguaje humano."
          pearl: "Puede leer los pensamientos y\nmovimientos de su adversario\na través de su aura."
        ko:
          diamond: "모든 것이 발하는 파동을\n포착하는 능력을 가지고 있다.\n사람의 말을 이해할 수 있다."
          pearl: "상대가 발하는 파동을\n감지하여 생각이나\n움직임을 간파할 수 있다."
hippopotas:
