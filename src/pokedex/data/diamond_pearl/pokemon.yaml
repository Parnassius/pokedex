          diamond: "Il imite ses ennemis. Une fois\nimités, ils ne peuvent plus\nquitter ce Pokémon des yeux."
          pearl: "Il aime les endroits bondés. Il\nimite l’ennemi pour le \ndéstabiliser avant de s’enfuir."
        it:
          diamond: "Imita i movimenti dei nemici. Quando\nun nemico viene imitato, non riesce\npiù a distogliere lo sguardo da lui."
          pearl: "Ama i luoghi affollati. Imita\ni nemici per confonderli, poi\nne approfitta per fuggire."
        de:
          diamond: "Es ahmt seinen Gegner nach. Der\nkann den Blick danach nicht von\nihm abwenden."
          pearl: "Es mag Orte, an denen viele Leute\nzusammenkommen. Es ahmt seine\nGegner nach, um sie zu verwirren."
        es:
          diamond: "Suele imitar a sus enemigos.\nCuando lo hace, su rival no\npuede apartar los ojos de él."
          pearl: "Le gustan los sitios donde se\nreúne gente. Imita a sus rivales\npara confundirlos y huir."
        ko:
          diamond: "상대의 움직임을 흉내 내는\n습성이 있다. 모방을 당한 상대는\n눈을 뗄 수 없게 된다고 한다."
          pearl: "사람이 모이는 장소를 좋아한다.\n상대의 움직임을 똑같이 흉내를 내\n당황하게 한다. 그 틈에 도망친다."
