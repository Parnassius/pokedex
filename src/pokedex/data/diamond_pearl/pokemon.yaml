          pearl: "Wird es von MUSCHAS gebissen, wird\nes so intelligent, dass es sich mit\nNobelpreisträgern messen kann."
        es:
          diamond: "Al ser mordido por un SHELLDER\ndesarrolló una inteligencia propia\nde un ganador del premio Nobel."
          pearl: "Al ser mordido por un SHELLDER\ndesarrolló una inteligencia propia\nde un ganador del premio Nobel."
        ko:
          diamond: "셀러에 물린 것을 계기로\n노벨상을 수상한\n과학자 수준의 지능을 얻었다."
          pearl: "셀러에 물린 것을 계기로\n노벨상을 수상한\n과학자 수준의 지능을 얻었다."
