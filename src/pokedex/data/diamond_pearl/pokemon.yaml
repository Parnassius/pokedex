      egg_groups:
        - field
      abilities:
        - stench
        - aftermath
      held_items:
        rare: pecha_berry
      descriptions:
        jp_kana:
          diamond: "しっぽの　さきから　ひどい　においの\nえきたいを　とばして　こうげきする。\nひきょりは　５０メートルいじょう。"
          pearl: "しっぽから　くさい　しるを　とばす。\nおなかで　じゅくせいさせる　じかんが\nながいほど　においが　ひどくなる。"
        en:
          diamond: "It sprays a vile-smelling fluid\nfrom the tip of its tail to attack.\nIts range is over 160 feet."
          pearl: "It sprays a stinky fluid from its\ntail. The fluid smells worse the\nlonger it is allowed to fester."
        fr:
          diamond: "Il attaque en projetant un\nliquide fétide du bout de sa queue.\nIl peut tirer à 50 mètres."
          pearl: "Sa queue projette un fluide puant.\nPlus on le laisse s’écouler et plus\nson odeur est insoutenable."
        it:
          diamond: "Attacca spruzzando un fluido\npuzzolente dalla coda. Ha un\nraggio d’azione di oltre 50 metri."
          pearl: "Spruzza un fluido puzzolente dalla\ncoda. Quest’odore diventa\ninsopportabile se fatto suppurare."
        de:
          diamond: "Über seine Schweifspitze versprüht\nes eine übelriechende Substanz. Die\nReichweite liegt bei über 50 Metern."
          pearl: "Es spritzt eine stinkende Substanz\naus seinem Schweif. Hat sie lange\ngegärt, stinkt sie stärker."
        es:
          diamond: "Para atacar, emite un fluido\nmaloliente por la punta de su cola\nque puede llegar a más de 50 m."
          pearl: "Emite un fluido apestoso por\nla cola. Cuanto más tiempo\npasa, peor huele."
        ko:
          diamond: "꼬리 끝에서 심한 냄새가 나는\n액체를 뿌려 공격한다.\n사정거리는 50m 이상이다."
          pearl: "꼬리에서 역한 분비액을 날린다.\n배에서 숙성된 시간이\n길수록 냄새가 심해진다."
