          pearl: "あつめた　ミツを　すみかに　はこぶ。\nよるには　たくさんの　ミツハニーが　\nかさなって　はちのすになり　ねむる。"
        en:
          diamond: "A Pokémon formed by three others.\nIt busily carries sweet floral\nhoney to VESPIQUEN."
          pearl: "It collects and delivers honey to\nits colony. At night, they cluster\nto form a beehive and sleep."
        fr:
          diamond: "Un Pokémon qui en regroupe trois\nautres. Il est toujours occupé à\napporter du nectar à APIREINE."
          pearl: "Il récolte le nectar et l’amène à \nla colonie. La nuit, ils s’assemblent\npour bâtir une ruche et s’endormir."
        it:
          diamond: "Pokémon formato da altri tre.\nÈ sempre impegnato a portare il\nnettare dei fiori a VESPIQUEN."
          pearl: "Porta il nettare raccolto dai suoi\nsimili. Di notte si riuniscono per\nformare un alveare e dormire."
        de:
          diamond: "Ein PKMN, geformt aus 3 einzelnen\nPKMN. Fleißig bringt es Blütenhonig\nzu HONWEISEL."
          pearl: "Es sammelt Honig und bringt ihn in\nseine Kolonie. Nachts bilden sie\neinen Bienenstock und schlafen."
        es:
          diamond: "Está formado por otros tres\nPokémon. Le lleva miel floral\na VESPIQUEN."
          pearl: "Almacenan miel en su colonia.\nPor la noche, se apiñan para\nformar una colmena y dormir."
        ko:
          diamond: "3마리가 하나가 된 포켓몬이다.\n비퀸을 위해서 부지런히\n꽃의 달콤한 꿀을 나른다."
          pearl: "모은 꿀을 거처로 운반한다.\n밤에는 많은 세꿀버리가\n겹쳐져 벌집이 되어 잠잔다."
