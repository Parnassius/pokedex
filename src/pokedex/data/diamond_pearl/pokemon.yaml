          pearl: "するどい　めつきで　あいてを　かるい\nさいみん　じょうたいに　してしまう。\nとても　きまぐれな　ポケモン。"
        en:
          diamond: "It claws if displeased and purrs\nwhen affectionate. Its fickleness\nis very popular among some."
          pearl: "With its sharp glare, it puts\nfoes in a mild hypnotic state.\nIt is a very fickle Pokémon."
        fr:
          diamond: "Il griffe quand il est en colère et\nronronne quand il est heureux. \nCertains aiment ce côté lunatique."
          pearl: "Son regard plonge l’ennemi dans\nune hypnose légère. C’est un\nPokémon très lunatique."
        it:
          diamond: "Se disturbato, tira fuori gli arti-\ngli; se soddisfatto, fa le fusa. La\nsua incostanza piace a molti."
          pearl: "Con il suo sguardo riesce a\nipnotizzare leggermente il nemico.\nÈ un Pokémon molto lunatico."
        de:
          diamond: "Es schlägt mit Krallen zu oder\nschnurrt, je nachdem, ob es gerade\nwütend oder zutraulich ist."
          pearl: "Durch seinen scharfen Blick fallen\nseine Gegner in eine leichte\nHypnose. Es ist sehr launenhaft."
        es:
          diamond: "Araña cuando está enfadado y\nronronea cuando está cariñoso.\nSu imprevisibilidad es famosa."
          pearl: "Hipnotiza ligeramente a sus\nenemigos con su mirada fija.\nEs impredecible."
        ko:
          diamond: "마음에 안 들면 발톱을 세우지만\n가끔 울음소리로 응석을 부리는\n성격이 일부에게 매우 인기가 있다."
          pearl: "날카로운 눈초리로 상대를 가벼운\n최면 상태로 만들어 버린다.\n매우 변덕스러운 포켓몬이다."
