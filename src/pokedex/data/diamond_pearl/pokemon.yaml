          pearl: "つばさの　いちげきは　きょうれつ。\nたいぼくも　ボキリと　おれるほどだ。\nこおりの　うみで　えものを　さがす。"
        en:
          diamond: "It lives alone, away from others.\nApparently, every one of them\nbelieves it is the most important."
          pearl: "Its wings deliver wicked blows that\nsnap even the thickest of trees.\nIt searches for prey in icy seas."
        fr:
          diamond: "Il vit seul, à l’écart de ses pairs.\nChaque individu est convaincu\nd’être meilleur que les autres."
          pearl: "Les coups violents de ses ailes\ntranchent le bois le plus dur.\nIl chasse dans les eaux glacées."
        it:
          diamond: "Vive da solo lontano dagli altri.\nApparentemente ogni esemplare\ncrede di essere il più importante."
          pearl: "Il battito delle ali è tanto potente\nda abbattere gli alberi più robusti.\nCerca le prede nei mari ghiacciati."
        de:
          diamond: "Es lebt allein, entfernt von\nanderen. Jedes von ihnen denkt, es\nsei das bedeutendste unter ihnen."
          pearl: "Seine Flügel schlagen so kräftig zu,\ndass es sogar Bäume umknicken\nkann. Im Eismeer sucht es Beute."
        es:
          diamond: "Vive solo, alejado de los demás.\nCada uno piensa que es el\nmás importante."
          pearl: "Los golpes de sus alas pueden\npartir los árboles más gruesos.\nBusca sus presas en aguas heladas."
        ko:
          diamond: "무리를 만들지 않고 혼자 생활한다.\n어떤 팽태자라도 자신이 제일\n훌륭하다고 생각하는 듯하다."
          pearl: "날개의 일격은 강렬하다.\n큰 나무도 뚝하고 부러질 정도다.\n얼음 바다에서 먹이를 찾는다."
