          pearl: "すんだ　いけの　ほとりに　せいそく。\nはげしい　くしゃみと　はなみずを\nひきおこす　かふんを　ばらまく。"
        en:
          diamond: "Over the winter, it closes its bud\nand endures the cold. In spring,\nthe bud opens and releases pollen."
          pearl: "It lives alongside clear ponds.\nIt scatters pollen that induces\nharsh sneezing and runny noses."
        fr:
          diamond: "En hiver, son bourgeon se referme\npour résister au froid. Il s’ouvre\nau printemps et libère du pollen."
          pearl: "Il vit près des mares d’eau claire.\nSon pollen provoque des rhumes\net fait couler le nez."
        it:
          diamond: "D’inverno chiude la sua gemma e\nresiste al freddo. In primavera la\ngemma si riapre e rilascia polline."
          pearl: "Vive sulle rive di stagni puliti.\nIl suo polline fa starnutire e\ncolare il naso."
        de:
          diamond: "Im Winter schließt es die Knospe.\nIm Frühjahr öffnet es die Knospe\nund gibt Pollen ab."
          pearl: "Es lebt an sauberen Seen. Es\nsondert Pollen ab, die für eine\nlaufende Nase und Niesen sorgen."
        es:
          diamond: "En invierno cierra su capullo para\nprotegerse del frío. En primavera,\nel capullo se abre y esparce polen."
          pearl: "Vive junto a los estanques de\nagua clara. Esparce polen que\nprovoca estornudos."
        ko:
          diamond: "겨울 동안 봉오리를 닫고\n추위를 견딘다. 봄이 되면\n봉오리를 펴서 꽃가루를 날린다."
          pearl: "맑은 연못 주위에 서식한다.\n세찬 재채기와 콧물을\n일으키는 꽃가루를 흩뿌린다."
