          pearl: "こぶんの　ヤミカラスに　エサを\nはこばせる。じぶんは　すみかで\nけづくろいに　じかんを　ついやす。"
        en:
          diamond: "Becoming active at night, it is\nknown to swarm with numerous\nMURKROW in tow."
          pearl: "It makes its MURKROW cronies\nbring it food. It idles its time\naway, grooming itself in its nest."
        fr:
          diamond: "Ce Pokémon nocturne évolue en\ngrandes volées escortées par des\nCORNEBRE."
          pearl: "Il demande à ses amis CORNEBRE de\nlui apporter à manger. Il passe son\ntemps à se pomponner dans son nid."
        it:
          diamond: "Diventa attivo di notte e lo si vede\nspesso in compagnia di numerosi\nMURKROW."
          pearl: "Si fa portare il cibo dai suoi amici\nMURKROW, mentre lui passa il tempo\na lisciarsi le penne nel nido."
        de:
          diamond: "Ein nachtaktives PKMN, das sich in\nSchwärmen mit KRAMURX durch die\nNacht bewegt."
          pearl: "Es lässt sich von KRAMURX Essen\nbringen. Es vertrödelt seine Zeit\nund liegt den ganzen Tag im Nest."
        es:
          diamond: "Está activo por la noche y\npulula arrastrando a\nnumerosos MURKROW."
          pearl: "Sus amigos MURKROW le traen\ncomida. Se dedica a holgazanear\ny acicalarse en su nido."
        ko:
          diamond: "밤이 되면 활동을 시작한다.\n많은 니로우들을 거느리고\n무리를 만든다고 알려져 있다."
          pearl: "부하 니로우에게 먹이를\n운반하게 한다. 자신은 거처에서\n털다듬기에 시간을 보낸다."
