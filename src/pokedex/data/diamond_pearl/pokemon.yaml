          pearl: "ジェットスキーに　まけない　そくどで\nおよぐ。つばさの　へりは　するどく\nりゅうひょうを　せつだんする。"
        en:
          diamond: "The three horns that extend from\nits beak attest to its power. The\nleader has the biggest horns."
          pearl: "It swims as fast as a jet boat.\nThe edges of its wings are sharp\nand can slice apart drifting ice."
        fr:
          diamond: "Les trois cornes de son bec sont le\nsymbole de sa force. Celles du chef\nsont plus grosses que les autres."
          pearl: "Il nage aussi vite qu’un hors-bord.\nLe tranchant de ses ailes peut\nfendre un bloc de glace à la dérive."
        it:
          diamond: "I tre corni che si allungano dal suo\nbecco attestano la sua forza. Il\ncapogruppo ha i corni più grossi."
          pearl: "Nuota veloce come una moto\nd’acqua. Le estremità delle ali sono\naguzze, spaccano anche il ghiaccio."
        de:
          diamond: "Die 3 Hörner, die aus dem Schnabel\nwachsen, stehen für Kraft. Ein\nAnführer hat die größten Hörner."
          pearl: "Es schwimmt so schnell wie ein Renn-\nboot. Seine Flügel haben scharfe\nSeiten u. können Packeis schneiden."
        es:
          diamond: "Los tres cuernos de su pico son\nmuestra de su fuerza. El líder\ntiene los cuernos más grandes."
          pearl: "Nada tan rápido como un\nfueraborda. Con los afilados bordes\nde sus alas puede cortar el hielo."
        ko:
          diamond: "부리에서 늘어난 3개의 뿔은\n강하다는 것을 증명한다.\n리더의 뿔이 제일 크다."
          pearl: "제트스키와 맞먹는 속도로\n헤엄친다. 날개 가장자리는\n날카롭게 유빙을 절단한다."
