          pearl: "ひのひかりで　あかく　いろづく。\nえいようぶんが　すわれて　ちいさい\nたまが　しぼむと　しんかが　ちかい。"
        en:
          diamond: "The small ball holds the nutrients\nneeded for evolution. Apparently,\nit is very sweet and tasty."
          pearl: "Sunlight colors it red. When the\nsmall ball is drained of nutrients,\nit shrivels to herald evolution."
        fr:
          diamond: "La petite boule renferme les\ndélicieux nutriments sucrés\ndont il a besoin pour évoluer."
          pearl: "Il rougit au soleil. Quand la petite\nboule est à court de nutriments,\nelle fane en signe d’évolution."
        it:
          diamond: "La pallina contiene i nutrimenti\nnecessari per l’evoluzione. Dicono\nche sia molto dolce e deliziosa."
          pearl: "La luce solare lo tinge di rosso. Se\nla pallina esaurisce i nutrimenti, si\navvizzisce indicando l’evoluzione."
        de:
          diamond: "Das kleine Bällchen enthält alles,\nwas es für die Entwicklung\nbraucht. Es ist süß und lecker."
          pearl: "Sonnenlicht färbt es rot. Verliert\ndas kleine Bällchen Nährstoffe,\nwelkt es u. die Entwicklung beginnt."
        es:
          diamond: "La pequeña esfera, dulce y\nsabrosa, contiene los nutrientes\nnecesarios para evolucionar."
          pearl: "Bajo la luz solar es rojo. La esfera\npequeña pierde sus nutrientes y\nse seca para anunciar la evolución."
        ko:
          diamond: "진화에 필요한 영양분이\n작은 구슬에 모여 있다.\n매우 달고 맛있는 듯하다."
          pearl: "햇빛으로 빨갛게 물들었다.\n영양분이 흡수되어 작은 구슬이\n시들면 곧 진화한다는 뜻이다."
