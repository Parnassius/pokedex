          pearl: "てきに　おそわれた　ときは\nかおの　たてで　ぼうへきを　つくり\nむれの　こどもたちを　まもる。"
        en:
          diamond: "Any frontal attack is repulsed.\nIt is a docile Pokémon that\nfeeds on grass and berries."
          pearl: "When attacked, they form a wall\nwith their shieldlike faces to\nprotect their young."
        fr:
          diamond: "Il résiste à toute attaque\nfrontale. C’est un Pokémon docile\nqui se nourrit d’herbe et de Baies."
          pearl: "En cas d’attaque, ils forment un\nmur avec leur visage en forme de\nbouclier pour protéger les petits."
        it:
          diamond: "Respinge qualsiasi attacco\nfrontale. È un Pokémon docile\nche si nutre di erba e di bacche."
          pearl: "Se più esemplari vengono attaccati,\nformano un muro protettivo con i\nloro musi per proteggere i cuccioli."
        de:
          diamond: "Jeder Frontalangriff wird abge-\nschmettert. Dieses friedliche PKMN\nernährt sich von Gras und Beeren."
          pearl: "Werden sie angegriffen, bilden sie\neinen Schutzwall mit ihren Köpfen,\num ihre Jungen zu schützen."
        es:
          diamond: "Repele cualquier ataque frontal.\nEs muy dócil y se alimenta de\nhierba y bayas."
          pearl: "Cuando son atacados, forman una\nbarrera con el escudo de sus\ncaras para proteger a sus crías."
        ko:
          diamond: "정면에서의 공격은 전부 물리친다.\n풀이나 나무열매를 먹는\n얌전한 성격이다."
          pearl: "상대에게 습격당했을 때는\n얼굴을 방패로 방벽을 만들어\n무리의 새끼들을 지킨다."
