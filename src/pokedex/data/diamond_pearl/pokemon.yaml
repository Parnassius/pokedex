          pearl: "おばねを　メトロノームのように\nさゆうに　ふって　リズムを　きざむ。\nひとの　ことばを　くちまねする。"
        en:
          diamond: "It can learn and speak human\nwords. If they gather, they all\nlearn the same saying."
          pearl: "It keeps rhythm by flicking its\ntail feathers like a metronome.\nIt imitates human speech."
        fr:
          diamond: "On peut lui enseigner quelques\nmots. S’il s’agit d’un groupe, ils\nretiendront les mêmes phrases."
          pearl: "Il imite le langage humain. Il garde\nle rythme en balançant les plumes\nde sa queue comme un métronome."
        it:
          diamond: "Può imparare il linguaggio umano.\nSe un gruppo si raduna, tutti\nimparano le stesse parole."
          pearl: "Mantiene il ritmo muovendo le piume\ndella coda come un metronomo.\nImita il linguaggio umano."
        de:
          diamond: "Es kann die menschliche Sprache\nlernen. Versammeln sie sich,\nbringen sie sich alle dasselbe bei."
          pearl: "Es hält den Takt, indem es seine\nSchwanzfedern wie ein Metronom be-\nwegt. Ahmt menschl. Sprache nach."
        es:
          diamond: "Pueden aprender y hablar lenguas\nhumanas. Si se juntan, todos\naprenden las mismas palabras."
          pearl: "Mantiene el compás agitando las\nplumas de su cola como un\nmetrónomo. Imita el habla humana."
        ko:
          diamond: "사람의 말을 기억해서 운다.\n동료가 한 장소에 모이면\n모두 똑같은 말을 기억한다."
          pearl: "꽁지를 메트로놈처럼\n좌우로 흔들어 리듬을 기억한다.\n사람의 말을 흉내 낸다."
