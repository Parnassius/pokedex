      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 2
      types:
        - normal
      egg_groups:
        - field
      abilities:
        - technician
        - pickup
      descriptions:
        jp_kana:
          diamond: "２ほんの　しっぽで　きのみの　からを\nきように　むいて　たべる。ほんものの\nうでは　ほとんど　つかわなくなった。"
          pearl: "おおぜいの　むれで　こうどうする。\nしっぽを　つなぎあわせて　わっかを\nつくる。ゆうじょうの　しるしらしい。"
        en:
          diamond: "To eat, it deftly shucks nuts\nwith its two tails. It rarely uses\nits arms now."
          pearl: "They work in large colonies and\nmake rings by linking their\ntails, apparently in friendship."
        fr:
          diamond: "Il se nourrit de noix qu’il épluche\navec ses deux queues habiles. Il\nutilise de moins en moins ses bras."
          pearl: "Ils travaillent en grandes colonies\net relient leurs queues pour former\nun anneau en signe d’amitié."
        it:
          diamond: "Si nutre di nocciole che sbuccia con\nle due code. Raramente usa le sue\nvere braccia."
          pearl: "Vivono in colonie numerose e\nformano anelli legando le loro\ncode in segno di amicizia."
        de:
          diamond: "Wenn es hungrig ist, knackt es\nNüsse mit seinen beiden Schweifen.\nNur selten verwendet es die Arme."
          pearl: "Sie arbeiten in großen Kolonien und\nverbinden ihre Schweife in\nFreundschaft."
        es:
          diamond: "Para comer, rompe nueces\ncon sus dos colas. Raras\nveces utiliza sus brazos."
          pearl: "Trabajan en grandes colonias y\nforman anillos uniendo sus colas,\naparentemente en signo de amistad."
        ko:
          diamond: "2개의 꼬리로 나무열매 껍질을\n솜씨 좋게 벗겨 먹는다. 진짜\n팔은 거의 쓰지 않게 되었다."
          pearl: "많은 무리로 행동한다.\n꼬리를 맞잡아 원을 만든다.\n우정의 표시인 듯하다."
drifloon:
  species_id: 425
  names:
    jp_kana: フワンテ
    en: DRIFLOON
    fr: BAUDRIVE
    it: DRIFLOON
    de: DRIFTLON
    es: DRIFLOON
    ko: 흔들풍손
