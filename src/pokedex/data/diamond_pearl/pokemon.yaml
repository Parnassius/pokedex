        jp_kana:
          diamond: "まよなか　はいごから　ちかづき\nなきさけぶような　なきごえを　あげて\nおどろかせては　よろこぶ　ポケモン。"
          pearl: "こわがる　こころを　あかい　たまで\nきゅうしゅうして　えいようにする。\nひるまは　くらがりで　ねむっている。"
        en:
          diamond: "It loves to sneak up on people\nlate at night, then startle them\nwith its shrieklike cry."
          pearl: "It gets nourishment from fear\nthat it absorbs into its red orbs.\nIn daytime, it sleeps in darkness."
        fr:
          diamond: "Il adore se faufiler derrière les\ngens la nuit pour les effrayer\navec son cri strident."
          pearl: "Il se nourrit de la peur absorbée\npar ses orbes rouges. Il somnole\nà l’ombre en journée."
        it:
          diamond: "Ama avvicinarsi alle persone in\npiena notte per terrorizzarle con\nil suo urlo stridulo."
          pearl: "Si nutre delle preoccupazioni che\nassorbe con le sue sfere rosse.\nDi giorno dorme nell’oscurità."
        de:
          diamond: "Es liebt es, sich nachts an andere\nheranzuschleichen und sie mit einem\nschrillen Schrei zu erschrecken."
          pearl: "Es nährt sich von der Angst\nanderer Wesen und nimmt diese in\nroten Kugeln auf. Schläft am Tage."
        es:
          diamond: "Le encanta sorprender a la gente\nde noche y asustarla con sus\nestridentes gritos."
          pearl: "Se deleita con el miedo, que\nabsorbe con sus esferas rojas.\nPor el día, duerme en la oscuridad."
        ko:
          diamond: "한밤중 등 뒤에서 다가와\n울부짖는 울음소리를 내어 놀라게\n하고는 즐거워하는 포켓몬이다."
          pearl: "무서워하는 마음을 빨간 구슬로\n흡수해 영양분으로 만든다. 낮에는\n어두운 곳에서 잠자고 있다."
