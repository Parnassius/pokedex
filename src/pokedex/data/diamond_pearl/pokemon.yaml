      descriptions:
        jp_kana:
          diamond: "こだいぶんめいの　もじに　にている。\nもじが　さきか　アンノーンが　さきか\nせかいの　７ふしぎの　ひとつ。"
          pearl: "テレパシーを　つかい　なかまどうしで\nいしそつうを　しているらしい。\nいつも　かべに　はりついている。"
        en:
          diamond: "Shaped like ancient writing, it is\na huge mystery whether\nlanguage or UNOWN came first."
          pearl: "They seem to communicate among\neach other telepathically. They\nare always found stuck on walls."
        fr:
          diamond: "Il rappelle une écriture ancienne.\nReste à savoir qui du langage ou de\nZARBI est apparu en premier."
          pearl: "Ils semblent unis par un lien\ntélépathique. On les voit\ntoujours collés sur un mur."
        it:
          diamond: "È a forma di lettera di un antico\nalfabeto. È un mistero chi sia ap-\nparso prima, l’alfabeto o UNOWN."
          pearl: "Comunica con i suoi simili telepati-\ncamente. Se ne trovano spesso\nesemplari attaccati alle pareti."
        de:
          diamond: "Seine Form sieht aus wie antike\nSchrift. Was war zuerst da? Die\nSprache oder ICOGNITO?"
          pearl: "Es scheint, als ob diese PKMN per\nTelepathie miteinander\nkommunizieren. Sie sitzen in Wänden."
        es:
          diamond: "Tienen forma de letras antiguas.\nSe desconoce qué fue antes: si\nla escritura o los UNOWN."
          pearl: "Parecen comunicarse entre\nellos telepáticamente. Siempre\nestán pegados a las paredes."
        ko:
          diamond: "고대문명의 문자와 닮았다.\n문자가 먼저인지 안농이 먼저인지\n세계 7대 불가사의의 하나다."
          pearl: "텔레파시를 써서 동료들과\n의사소통을 하는 듯하다.\n항상 벽에 달라붙어 있다."
