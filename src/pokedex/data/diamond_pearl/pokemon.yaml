          pearl: "ながい　からだの　けの　したに\nたべものを　かくす　しゅうせい。\nかくしたことを　わすれてしまう。"
        en:
          diamond: "It wolfs down its weight in food\nonce a day, swallowing food whole\nwith almost no chewing."
          pearl: "It hides food under its long body\nhair. However, it forgets it has\nhidden the food."
        fr:
          diamond: "Il avale son poids en nourriture\nchaque jour. Il avale tout sans \nprendre le temps de mâcher."
          pearl: "Il cache de la nourriture sous\nles grands poils de son corps,\nmais il finit souvent par l’oublier."
        it:
          diamond: "Divora quotidianamente una quantità\ndi cibo pari al suo peso mandandolo\ngiù quasi senza masticare."
          pearl: "Nasconde il cibo sotto i lunghi\npeli del suo corpo. Tuttavia,\nfinisce spesso per dimenticarlo."
        de:
          diamond: "Einmal am Tag verschlingt es eine\nNahrungsmenge, die seinem Gewicht\nentspricht. Und das ohne zu kauen."
          pearl: "Unter seinem langen Fell versteckt\nes Nahrung. Aber es vergisst, dass\nes sie dort versteckt hat."
        es:
          diamond: "Engulle su peso en comida una\nvez al día. Se lo traga todo\nsin apenas masticar."
          pearl: "Esconde comida bajo el largo\npelo de su cuerpo, pero más\ntarde lo olvida."
        ko:
          diamond: "하루에 한 번 체중과 같은\n양의 먹이를 한 번에 먹는다.\n거의 씹지 않고 통째로 삼킨다."
          pearl: "몸의 긴 털 밑에\n먹이를 숨기는 습성이 있다.\n숨긴 것을 잊어버린다."
