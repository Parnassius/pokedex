          pearl: "からだを　おおきく　みせて　あいてを\nいあつするため　ふたまたの　しっぽで\nウエストを　ぎゅっと　しぼっている。"
        en:
          diamond: "It is a brazen brute that barges\nits way into another Pokémon’s\nnest and claims it as its own."
          pearl: "To make itself appear intimidatingly\nbeefy, it tightly cinches its waist\nwith its twin tails."
        fr:
          diamond: "Cette brute arrogante n’hésite pas\nà voler le nid d’autres Pokémon\npour s’y installer."
          pearl: "Il ceinture sa taille de ses \nqueues jumelles pour paraître\nplus imposant."
        it:
          diamond: "Si introduce sfacciatamente\nnelle tane degli altri Pokémon\nrivendicandole poi come proprie."
          pearl: "Si stringe la vita con le sue due\ncode per apparire più imponente\ne minaccioso."
        de:
          diamond: "Dieses PKMN ist ein Grobian, der\nsich in die Nester anderer PKMN ein-\nnistet und sie sich damit aneignet."
          pearl: "Damit es bedrohlicher und größer\naussieht, umschlingt es seine Taille\nfest mit seinen beiden Schweifen."
        es:
          diamond: "Es un bruto descarado que\nentra en el nido de cualquier\nPokémon y se lo apropia."
          pearl: "Para intimidar y parecer más\ncorpulento, se aprieta la cintura\ncon sus colas gemelas."
        ko:
          diamond: "다른 포켓몬의 거처라 할지라도\n아무렇지 않게 들어가서\n쿨쿨 잘 정도로 뻔뻔하다."
          pearl: "몸을 크게 보여서 상대를\n위압하기 위해 두 갈래의 꼬리로\n허리를 꼭 쥐고 있다."
