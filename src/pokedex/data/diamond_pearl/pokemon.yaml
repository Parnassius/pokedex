          diamond: "なくときは　ナイフのような　うでを\nむねの　まえで　こうささせる。\nそっきょうで　メロディを　つくる。"
          pearl: "かんじょうを　メロディで　あらわす。\nメロディの　ほうそくせいを\nがくしゃたちが　けんきゅうしている。"
        en:
          diamond: "It crosses its knifelike arms in\nfront of its chest when it cries.\nIt can compose melodies ad lib."
          pearl: "It signals its emotions with its\nmelodies. Scientists are studying\nthese melodic patterns."
        fr:
          diamond: "Il croise ses bras affûtés devant\nson torse pour crier. Il compose\ntout un tas de mélodies."
          pearl: "Il exprime ses émotions par des\nmélodies. Les scientifiques étudient\nactuellement leur structure."
        it:
          diamond: "Quando canta tiene le zampe\nincrociate al petto.\nSa improvvisare melodie."
          pearl: "Esprime le proprie emozioni con\nmelodie, che sono oggetto di studio\ndi molti scienziati."
        de:
          diamond: "Wenn es ruft, verschränkt es seine\nmesserartigen Arme vor der Brust.\nEs komponiert aus dem Stegreif."
          pearl: "Über seine Melodien teilt es seine\nGefühle mit. Wissenschaftler unter-\nsuchen das Muster der Melodien."
        es:
          diamond: "Cuando llora, cruza sus brazos\ncon forma de cuchillo. Puede\nimprovisar melodías."
          pearl: "Los científicos tratan de estudiar\nsus melodías, que son reflejo de\nsus emociones."
        ko:
          diamond: "울 때는 나이프 같은 팔을\n가슴 앞에서 교차시킨다.\n즉흥으로 멜로디를 만든다."
          pearl: "감정을 멜로디로 나타낸다.\n멜로디의 법칙성을\n학자들이 연구하고 있다."
