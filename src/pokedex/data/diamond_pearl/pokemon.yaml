        jp_kana:
          diamond: "けいかいしんの　つよい　ポケモン。\nきけんを　かんじると　ふわふわした\nみみさきの　けで　からだを　つつむ。"
          pearl: "いつも　みみさきを　けづくろいして\nていれを　おこたらない　きれいずき。\nかろやかに　とびはねて　はしる。"
        en:
          diamond: "An extremely cautious Pokémon.\nIt cloaks its body with its fluffy\near fur when it senses danger."
          pearl: "It is very conscious of its looks\nand never fails to groom its ears.\nIt runs with sprightly jumps."
        fr:
          diamond: "Un Pokémon extrêmement prudent.\nIl couvre son corps de ses oreilles\npelucheuses en cas de danger."
          pearl: "Il est très coquet et n’oublie\njamais de toiletter ses oreilles.\nIl avance en bonds énergiques."
        it:
          diamond: "Pokémon molto cauto. Se percepisce\nun pericolo, si avvolge nelle sue\norecchie morbide e pelose."
          pearl: "È molto pulito e non dimentica\nmai di lisciarsi le orecchie. Corre\nsaltando molto energicamente."
        de:
          diamond: "Ein sehr vorsichtiges PKMN. Nimmt\nes Gefahr wahr, schützt es seinen\nKörper mit seinen weichen Ohren."
          pearl: "Es ist sehr bedacht auf sein\nÄußeres und vergisst nie, seine\nOhren zu kämmen."
        es:
          diamond: "Es un Pokémon muy precavido.\nSi siente peligro, se envuelve con\nel pelaje de sus orejas."
          pearl: "Se preocupa de su imagen y\nsiempre se arregla las orejas.\nCorre con saltos enérgicos."
        ko:
          diamond: "경계심이 강한 포켓몬이다.\n위험을 느끼면 푹신푹신한\n귀 끝의 털로 몸을 감싼다."
          pearl: "항상 귀 끝의 털을 다듬고 손질을\n게을리하지 않는 깔끔쟁이다.\n가뿐하게 뛰어올라 달린다."
mismagius:
