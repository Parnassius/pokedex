          pearl: "ピンチになると　６つの　すあなから\nこどもが　とびだし　はんげきする。\nむれに　ビークインは　１ぴきだけ。"
        en:
          diamond: "Its abdomen is a honeycomb for\ngrubs. It raises its grubs on\nhoney collected by COMBEE."
          pearl: "When endangered, grubs from its\nsix-cell honeycomb strike back.\nThere is only one in a colony."
        fr:
          diamond: "Son abdomen est un rayon où\nvivent ses larves, élevées avec\nle nectar récolté par APITRINI."
          pearl: "En cas de danger, les larves de son\nrayon de 6 alvéoles ripostent. Il\nn’y en a qu’un dans chaque colonie."
        it:
          diamond: "Il suo addome funge da rifugio per\nle larve, che nutre con il nettare\nraccolto da COMBEE."
          pearl: "Se in pericolo, le larve attaccano\ndalle sei celle dell’alveare. In ogni\ncolonia esiste un solo esemplare."
        de:
          diamond: "Ihr Bauch ist die Wabe für die\nLarven. Sie füttert ihre Larven mit\ndem Honig, den WADRIBIE sammelt."
          pearl: "Wird es angegriffen, wehren sich\nihre Larven im Bau. Es gibt nur\neine pro Kolonie."
        es:
          diamond: "Su abdomen es un panal de larvas\nque alimenta con la miel recogida\npor COMBEE."
          pearl: "Si está en peligro, ataca con\nlarvas de su panal de seis celdas.\nSolo hay uno por colonia."
        ko:
          diamond: "몸통이 새끼들의 둥지로\n되어 있다. 세꿀버리가 모은\n꿀로 새끼들을 키운다."
          pearl: "위급해지면 6개의 둥지에서\n새끼가 뛰쳐나와 반격한다.\n무리의 비퀸은 1마리뿐이다."
