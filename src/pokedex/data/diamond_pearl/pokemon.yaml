          pearl: "しなやかで　きょうじんな　からだ。\n３つの　やまと　２つの　たにを\nひとばんで　こえることが　できる。"
        en:
          diamond: "The aura that emanates from its\nbody intensifies to alert others\nif it is afraid or sad."
          pearl: "Its body is lithe yet powerful.\nIt can crest three mountains and\ncross two canyons in one night."
        fr:
          diamond: "Son aura s’intensifie pour\nprévenir son entourage quand\nil a peur ou qu’il est triste."
          pearl: "Son corps est frêle mais puissant.\nIl peut traverser trois montagnes\net deux canyons en une nuit."
        it:
          diamond: "L’aura che emana si intensifica\nper comunicare agli altri se è\ntriste o spaventato."
          pearl: "È snello ma forte. Può scalare tre\nmontagne e attraversare due\ncanyon in una sola notte."
        de:
          diamond: "Die Aura, die dieses PKMN umgibt,\nverstärkt sich, wenn es zeigen will,\ndass es ängstlich oder traurig ist."
          pearl: "Sein Körper ist schlank, aber\nkräftig. Es kann in einer Nacht 3\nBerge und 2 Täler durchqueren."
        es:
          diamond: "Su aura se intensifica para alertar\na otros cuando está triste o tiene\nmiedo."
          pearl: "Su cuerpo es ágil pero fuerte.\nPuede subir tres montañas y\ncruzar dos cañones en una noche."
        ko:
          diamond: "몸에서 발산되는 파동은\n무서울 때나 슬플 때에 강해져\n동료에게 위기를 알린다."
          pearl: "부드럽고 강인한 몸이다.\n3개의 산과 2개의 골짜기를\n하룻밤 사이에 넘을 수 있다."
