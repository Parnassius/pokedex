          pearl: "てんてきに　みつからないように\nむねの　２まいの　ひれを　つかい\nかいていを　はって　いどうする。"
        en:
          diamond: "It lives on the deep-sea floor.\nIt attracts prey by flashing the\npatterns on its four tail fins."
          pearl: "To avoid detection by predators,\nit crawls along the seafloor using\nthe two fins on its chest."
        fr:
          diamond: "Il vit au plus profond de l’océan.\nIl attire sa proie en illuminant les\nmotifs de ses 4 nageoires."
          pearl: "Pour éviter de se faire voir par ses\nennemis, il rampe au fond de l’eau\ngrâce aux nageoires sur son torse."
        it:
          diamond: "Vive negli abissi marini.\nAttira le prede illuminando i\nmotivi delle sue quattro pinne."
          pearl: "Per non farsi scoprire dai nemici,\nsi muove lentamente sui fondali\nmarini con le due pinne pettorali."
        de:
          diamond: "Es lebt tief auf dem Meeresboden.\nDas blinkende Muster auf seinen\nvier Rückenflossen zieht Beute an."
          pearl: "Um nicht von Fressfeinden entdeckt\nzu werden, krabbelt es auf zwei\nBrustflossen am Meeresboden."
        es:
          diamond: "Vive en las profundidades marinas.\nAtrae a sus presas con parpadeos\ndel dibujo de sus cuatro aletas."
          pearl: "Para que los depredadores no lo\ndetecten, se arrastra por el fondo\nmarino con las aletas del pecho."
        ko:
          diamond: "깊은 바다의 밑바닥에서 산다.\n4개의 지느러미 무늬를 반짝거려\n먹이를 끌어들인다."
          pearl: "천적에 발견되지 않도록\n가슴에 있는 2개의 지느러미로\n해저에 붙어서 이동한다."
