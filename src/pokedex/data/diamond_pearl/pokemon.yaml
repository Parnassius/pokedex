        jp_kana:
          diamond: "じゅもんのような　なきごえを　だして\nみみにした　あいてを\nずつうや　げんかくで　くるしめる。"
          pearl: "じゅもんを　となえる　ポケモン。\nあいてを　くるしめるもの　だけでなく\nしあわせにする　じゅもんも　ある。"
        en:
          diamond: "Its cries sound like incantations.\nThose hearing it are tormented\nby headaches and hallucinations."
          pearl: "It chants incantations. While they\nusually torment targets, some\nchants bring happiness."
        fr:
          diamond: "Son cri rappelle une incantation.\nCeux qui l’entendent souffrent\nde migraines et d’hallucinations."
          pearl: "Il psalmodie des incantations. Ce\nsont souvent des malédictions,\nmais certaines apportent la joie."
        it:
          diamond: "I suoi versi sembrano incantesimi.\nChi li sente è tormentato da\nemicranie e allucinazioni."
          pearl: "Recita incantesimi che tormentano\nil nemico. Tuttavia, alcune formule\nportano felicità."
        de:
          diamond: "Seine Rufe klingen wie Beschwö-\nrungen. Die, die sie hören, kriegen\nKopfschmerzen und Halluzinationen."
          pearl: "Es spricht Beschwörungen. Viele\nlösen Schmerzen aus, manche aber\nbringen Glück."
        es:
          diamond: "Sus gritos parecen cánticos.\nLos que los escuchan padecen\nmigrañas y alucinaciones."
          pearl: "Recita cánticos. Algunos de ellos\natormentan a sus rivales, mientras\nque otros producen felicidad."
        ko:
          diamond: "주문 같은 울음소리를 내어\n소리를 들은 상대를\n두통이나 환각으로 괴롭힌다."
          pearl: "주문을 외는 포켓몬이다.\n상대를 고통스럽게 하는 것뿐만\n아니라 행복하게 하는 주문도 있다."
