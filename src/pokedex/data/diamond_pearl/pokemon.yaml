          pearl: "からだの　こうぞうを　しらべようと\nレントゲンで　さつえいしたが\nけっきょく　なにも　うつらなかった。"
        en:
          diamond: "Implements shaped like it were\ndiscovered in ancient tombs. It is\nunknown if they are related."
          pearl: "X-ray photos were taken to check\nits body structure. Nothing\nappeared, however."
        fr:
          diamond: "Il rappelle des objets trouvés\ndans des sépultures anciennes.\nNul ne sait s’ils sont liés."
          pearl: "On a voulu étudier sa structure\naux rayons X, mais les radios\nne montraient absolument rien."
        it:
          diamond: "Il suo aspetto ricorda alcuni\noggetti ritrovati in antiche tombe,\nma non si sa se ci sia una relazione."
          pearl: "Gli esami ai raggi X, fatti per\nstudiarne la morfologia, non\nhanno dato alcun risultato."
        de:
          diamond: "Sein Körper sieht aus, als seien\nTeile davon in alten Gräbern\ngefunden worden."
          pearl: "Man hat Röntgenaufnahmen gemacht,\num die Körperstruktur dieses PKMN\nzu untersuchen. Ohne Ergebnis."
        es:
          diamond: "Se descubrieron herramientas con\nsu forma en tumbas antiguas, pero\nse desconoce si tiene relación."
          pearl: "Se intentó comprobar su\nestructura corporal mediante\nrayos X, pero no apareció nada."
        ko:
          diamond: "고대 무덤에서 동미러와\n똑 닮은 도구가 발굴되었지만\n관계는 알 수 없다."
          pearl: "몸의 구조를 조사하려고\nX선으로 촬영했지만\n결국 아무것도 찍히지 않았다."
