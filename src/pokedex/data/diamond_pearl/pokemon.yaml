          pearl: "まえあしで　なかまの　からだに\nふれる。ツメから　ながす　でんきの\nリズムで　きもちを　つたえるのだ。"
        en:
          diamond: "Its claws loose electricity with\nenough amperage to cause fainting.\nThey live in small groups."
          pearl: "It rests its forelegs on others to\ncommunicate with rhythmic electric\npulses from its claws."
        fr:
          diamond: "L’électricité libérée par ses\ngriffes peut assommer l’ennemi.\nIl vit en petits groupes."
          pearl: "Il pose ses pattes avant sur ses\npairs et émet des impulsions avec\nses griffes pour communiquer."
        it:
          diamond: "Dagli artigli rilascia un’elettricità\ntalmente intensa da mandare KO il\nnemico. Vive in piccoli gruppi."
          pearl: "Comunica mediante gli impulsi elet-\ntrici ritmici emessi dagli artigli\nanteriori, che posa sui suoi simili."
        de:
          diamond: "Seine Krallen geben Elektrizität ab,\ndie stark genug ist, jemanden\nbewusstlos zu machen."
          pearl: "Es legt seine Vorderbeine auf\nandere, um mit elektr. Impulsen\naus den Krallen zu kommunizieren."
        es:
          diamond: "Sus garras emiten electricidad\nque puede debilitar a sus rivales.\nViven en grupos pequeños."
          pearl: "Para comunicarse, se tocan con\nlas patas delanteras y transmiten\npulsos eléctricos con las garras."
        ko:
          diamond: "발톱에서는 한 방에 적을 기절시킬\n정도로 강한 전류가 흐른다.\n여러 마리가 그룹을 이루어 산다."
          pearl: "앞발로 동료의 몸에 접촉한다.\n발톱에서 흐르는 전기의 리듬으로\n자신의 기분을 전달한다."
