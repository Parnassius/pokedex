        jp_kana:
          diamond: "つめたい　こがらしを　ふせぐため\nこえだや　おちばを　ざいりょうに\nミノを　つくり　からだを　おおう。"
          pearl: "たたかいで　ミノが　こわれてしまうと\nちかくにある　ざいりょうで\nミノを　すぐに　つくりなおす。"
        en:
          diamond: "To shelter itself from cold, wintry\nwinds, it covers itself with a cloak\nmade of twigs and leaves."
          pearl: "If its cloak is broken in battle,\nit quickly remakes the cloak with\nmaterials nearby."
        fr:
          diamond: "Pour se protéger des vents glacés\nde l’hiver, il s’est tissé une cape\nde feuilles et de brindilles."
          pearl: "S’il perd sa cape au combat, il\nen tisse rapidement une nouvelle\navec ce qui lui tombe sous la main."
        it:
          diamond: "Per ripararsi dal freddo e dai venti\ninvernali si copre con un manto\nfatto di rami e foglie."
          pearl: "Se il suo manto si rompe mentre\nlotta, lo rifà velocemente con ciò\nche trova attorno a sé."
        de:
          diamond: "Um sich vor dem eisigen Winterwind\nzu schützen, legt es sich unter\neinen Umhang aus Ästen und Laub."
          pearl: "Wird sein Umhang im Kampf zerstört,\nmacht es sich schnell aus dem, was\nes findet, einen neuen."
        es:
          diamond: "Para protegerse de los vientos\nfríos invernales, se cubre con un\ncaparazón de ramas y hojas."
          pearl: "Si su caparazón se rompe en\ncombate, lo rehace rápidamente\ncon lo que tenga a mano."
        ko:
          diamond: "차가운 초겨울바람을 막으려고\n작은 가지나 낙엽을 재료로\n도롱이를 만들어 몸을 감싼다."
          pearl: "싸움으로 도롱이가 부서져 버리면\n가까이 있는 재료로\n도롱이를 바로 만들어 고친다."
