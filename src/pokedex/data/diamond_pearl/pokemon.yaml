          pearl: "すいちゅうの　えものを　おいかける\nうちに　うきぶくろが　はったつした。\nゴムボートのように　ひとを　のせる。"
        en:
          diamond: "It floats using its well-developed\nflotation sac. It assists in the\nrescues of drowning people."
          pearl: "Its flotation sac developed as a\nresult of pursuing aquatic prey.\nIt can double as a rubber raft."
        fr:
          diamond: "Il flotte grâce à sa bouée très\ndéveloppée. Il vole au secours\ndes gens sur le point de se noyer."
          pearl: "Il a développé une bouée pour\npoursuivre ses proies aquatiques.\nElle fait office de canot gonflable."
        it:
          diamond: "Nuota con il suo grosso galleg-\ngiante e aiuta a soccorrere\nchi sta per annegare."
          pearl: "Il suo galleggiante, che funge da\ngommone, si è sviluppato perché\ncaccia le prede nell’acqua."
        de:
          diamond: "Es treibt mithilfe einer Art\nRettungsring auf dem Wasser und\nhilft dem, der zu ertrinken droht."
          pearl: "Da es seit jeher Beute im\nWasser jagt, entwickelte es\neinen Rettungsring."
        es:
          diamond: "Nada gracias a su flotador.\nAyuda en los rescates de\ngente que se está ahogando."
          pearl: "Su flotador se desarrolló a raíz\nde perseguir presas acuáticas.\nTambién sirve como balsa."
        ko:
          diamond: "발달한 부낭으로 뜬다.\n물에 빠진 사람을 구조하는 것을\n돕는 포켓몬이다."
          pearl: "수중의 먹이를 쫓아가는\n사이에 부낭이 발달했다.\n고무보트처럼 사람을 태운다."
