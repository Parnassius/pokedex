        de:
          diamond: "Sein Aussehen ist von Region zu\nRegion unterschiedlich. In Sinnoh\nfinden sich zwei Arten."
          pearl: "Es lebt in der Nähe von Wasser.\nSeine Körperform hat sich seiner\nUmgebung angepasst."
        es:
          diamond: "El color y la forma varían según\nla región. En Sinnoh, hay dos\ntipos confirmados."
          pearl: "Vive cerca del agua. La forma\nde su cuerpo ha cambiado para\nadaptarse al hábitat."
        ko:
          diamond: "서식지에 따라 다른 모양과\n색깔을 띠고 있다. 신오지방에는\n2종류가 확인되어 있다."
