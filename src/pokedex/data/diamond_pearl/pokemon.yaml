      form_id: 0
      base_stats:
        hp: 44
        attack: 58
        defense: 44
        special_attack: 58
        special_defense: 44
        speed: 61
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - fire
      egg_groups:
        - field
        - human_like
      abilities:
        - blaze
      descriptions:
        jp_kana:
          diamond: "だんがいぜっぺきを　みがるに　のぼり\nいわやまの　うえで　せいかつする。\nほのおを　けして　ねむる。"
          pearl: "おしりの　ほのおは　おなかで\nつくられた　ガスが　ねんりょう。\nあめに　ぬれても　きえない。"
        en:
          diamond: "It agilely scales sheer cliffs to\nlive atop craggy mountains. Its\nfire is put out when it sleeps."
          pearl: "Its fiery rear end is fueled by\ngas made in its belly. Even rain\ncan’t extinguish the fire."
        fr:
          diamond: "Il escalade prestement les falaises\nescarpées et vit sur les sommets.\nSa flamme s’éteint quand il dort."
          pearl: "La flamme de sa queue est alimentée\npar un gaz de son estomac. Même\nla pluie ne saurait l’éteindre."
        it:
          diamond: "Scala agilmente le rocce scoscese\ne vive in cima ai monti. Prima\ndi dormire spegne le fiamme."
          pearl: "Le fiamme sulla coda, alimentate dai\ngas della pancia, non si spengono\nneppure quando piove."
        de:
          diamond: "Es klettert behände steile Felsen\nhinauf, um auf Bergen zu leben. Sein\nFeuer ist aus, wenn es schläft."
          pearl: "Das Feuer an seinem Hinterteil wird\ndurch Gase im Bauch genährt.\nSelbst Regen löscht es nicht."
        es:
          diamond: "Escala acantilados escarpados con\nagilidad. Vive en las montañas y\nsu fuego se apaga cuando duerme."
          pearl: "El gas de su panza alimenta el\nfuego de su parte trasera, que\nni la lluvia puede extinguir."
        ko:
          diamond: "낭떠러지 절벽을 민첩하게 올라\n바위산의 위에서 생활한다. \n불꽃을 끄고 잠잔다."
          pearl: "엉덩이의 불꽃은 배에서\n만들어진 가스가 연료다.\n비에 젖어도 꺼지지 않는다."
monferno:
  species_id: 391
  names:
    jp_kana: モウカザル
    en: MONFERNO
    fr: CHIMPENFEU
    it: MONFERNO
    de: PANPYRO
    es: MONFERNO
    ko: 파이숭이
  forms:
    monferno:
      form_id: 0
      base_stats:
        hp: 64
        attack: 78
        defense: 52
        special_attack: 78
        special_defense: 52
        speed: 81
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 1
        special_defense: 0
        speed: 1
      types:
        - fire
        - fighting
      egg_groups:
        - field
        - human_like
      abilities:
        - blaze
      descriptions:
        jp_kana:
          diamond: "しっぽの　ほのおを　ながく　のばして\nからだを　おおきく　みせることで\nおそってきた　てきを　こわがらせる。"
          pearl: "てんじょうや　かべを　りようして\nくうちゅうさっぽうを　くりだす。\nしっぽの　ほのおも　ぶきの　ひとつ。"
        en:
          diamond: "To intimidate attackers, it\nstretches the fire on its tail\nto make itself appear bigger."
          pearl: "It uses ceilings and walls to\nlaunch aerial attacks. Its fiery\ntail is but one weapon."
        fr:
          diamond: "Pour intimider ses agresseurs, il\ngonfle les flammes de sa queue\npour paraître plus grand."
          pearl: "Il attaque en prenant appui sur les\nmurs et les plafonds. Sa queue\nardente n’est pas son seul atout."
        it:
          diamond: "Per intimorire i nemici che\nattaccano, intensifica le fiamme\nsulla coda per apparire più grande."
          pearl: "Attacca la preda lanciandosi da \nsoffitti e pareti. Le fiamme sulla\ncoda sono solo una delle sue armi."
        de:
          diamond: "Um Angreifer abzuschrecken,\nverstärkt es das Feuer auf seinem\nSchweif, wodurch es größer wirkt."
          pearl: "Es stürzt sich von Decken und\nWänden auf Beute. Sein feuriger\nSchweif ist nur eine seiner Waffen."
        es:
          diamond: "Intimida a sus enemigos\ndesplegando el fuego de su\ncola para parecer más grande."
          pearl: "Utiliza techos y paredes para\nlanzar ataques aéreos. También\nemplea su cola ígnea como arma."
        ko:
          diamond: "꼬리의 불꽃을 길게 늘여\n몸을 커 보이게 해서\n습격해온 적에게 겁을 준다."
          pearl: "천장이나 벽을 이용하여\n공중 내리찍기를 날린다.\n꼬리의 불꽃도 무기의 하나이다."
infernape:
  species_id: 392
  names:
    jp_kana: ゴウカザル
    en: INFERNAPE
