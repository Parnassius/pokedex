          pearl: "ダンサーのような　みのこなしで\nどくの　トゲが　びっしりと　ならんだ\nムチを　あやつり　こうげきする。"
        en:
          diamond: "It attracts prey with a sweet\naroma, then downs it with\nthorny whips hidden in its arms."
          pearl: "With the movements of a dancer,\nit strikes with whips that are\ndensely lined with poison thorns."
        fr:
          diamond: "Il attire ses proies avec son doux\nparfum et les achève grâce aux\nfouets d’épines de ses bras."
          pearl: "Gracieux comme un danseur,\nil abat ses fouets ornés \nd’épines empoisonnées."
        it:
          diamond: "Attira la preda con un dolce aroma,\npoi l’abbatte con le fruste spinose\ncelate fra i bouquet delle braccia."
          pearl: "Con i movimenti di una ballerina,\ncolpisce con le fruste, piene di\nspine velenose."
        de:
          diamond: "Mit einem süßen Duft lockt es Beute\nan, die es dann mit den dornigen\nRanken in seinen Armen schlägt."
          pearl: "Mit den Bewegungen eines Tänzers\nholt es aus und schlägt mit Ranken\num sich, die giftige Dornen haben."
        es:
          diamond: "Atrae a las presas con un dulce\naroma y las derrota con los\nlátigos espinosos de sus brazos."
          pearl: "Se mueve como un bailarín y\ngolpea con látigos repletos de\npúas venenosas."
        ko:
          diamond: "달콤한 향기로 유인하여\n양팔의 꽃다발 속에 있는 가시의\n채찍으로 꼼짝 못하게 한다."
          pearl: "댄서 같은 재빠른 몸놀림으로\n독가시가 빽빽이 늘어선\n채찍을 조종하여 공격한다."
