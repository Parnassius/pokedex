          pearl: "どくぶくろで　つくられた　もうどくは\nうでの　くだを　とおって\nこぶしの　トゲに　おくられるのだ。"
        en:
          diamond: "Its knuckle claws secrete a toxin\nso vile that even a scratch could\nprove fatal."
          pearl: "The toxin made in its poison sacs\nis pumped to the knuckle claws\nthrough tubes down its arms."
        fr:
          diamond: "Les griffes de ses poings sécrètent\nune toxine si atroce qu’une simple\négratignure peut s’avérer fatale."
          pearl: "La toxine produite par ses glandes\nde poison passe par les tubes de\nses bras pour imbiber ses griffes."
        it:
          diamond: "I suoi artigli secernono una tossina\ncosì velenosa che persino un\ngraffio può essere letale."
          pearl: "La tossina prodotta dalle sacche\nvelenose viene pompata negli artigli\nattraverso gli arti superiori."
        de:
          diamond: "Die Gelenke an seinen Klauen geben\nein so starkes Gift ab, dass selbst\nein kleiner Kratzer fatal ist."
          pearl: "Das Gift aus seinen Backentaschen\nwird über zwei Venen in seinen Armen\nzu den Fingergelenken gepumpt."
        es:
          diamond: "Sus garras segregan una toxina\ntan potente que un simple\narañazo puede ser mortal."
          pearl: "Sus bolsas venenosas almacenan\nuna toxina que le llega a las garras\npor unos tubos en los brazos."
        ko:
          diamond: "주먹의 가시는 긁히기만 해도\n생명을 잃을 정도의 맹독을\n분비하고 있다."
          pearl: "독주머니에서 만들어진 맹독은\n팔의 관을 통해서\n주먹의 가시에 보내진다."
carnivine:
