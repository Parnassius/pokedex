          pearl: "たいぼくの　みきに　こすりつけて\nかたい　かおを　みがく　しゅうせい。\nうしろからの　こうげきに　よわい。"
        en:
          diamond: "A Pokémon that lived in jungles\naround 100 million years ago. Its\nfacial hide is extremely hard."
          pearl: "It habitually polishes its face by\nrubbing it against tree trunks. It\nis weak to attacks from behind."
        fr:
          diamond: "Un Pokémon qui vivait dans la jungle\nil y a 100 millions d’années. Son\nvisage est très dur."
          pearl: "Il a l’habitude de polir son visage\nen le frottant contre un tronc. Il\ncraint les attaques dans le dos."
        it:
          diamond: "Pokémon che viveva nella giungla\ncirca 100 milioni di anni fa. Il suo\nmuso è molto resistente."
          pearl: "Si pulisce il muso strofinandolo\ncontro i tronchi degli alberi. È\ndebole agli attacchi alle spalle."
        de:
          diamond: "Vor über 100 Millionen Jahren lebte\nes in den Dschungeln. Seine\nGesichtshaut ist extrem hart."
          pearl: "Es reibt sein Gesicht an Baum-\nstämmen, um es zu polieren. Es ist\nleicht, es von hinten anzugreifen."
        es:
          diamond: "Vivía en la jungla hace unos 100\nmillones de años. Su protección\nfacial es tremendamente dura."
          pearl: "Se abrillanta la cara frotándola\ncontra los árboles. Es vulnerable\na los ataques por la espalda."
        ko:
          diamond: "약 1억 년 전에\n밀림에서 살고 있었던 포켓몬이다.\n얼굴의 피부가 매우 단단하다."
          pearl: "큰 나무의 줄기에 비벼서\n단단한 얼굴을 닦는 습성이 있다.\n뒤로부터의 공격에 약하다."
