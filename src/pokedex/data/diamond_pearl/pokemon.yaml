          pearl: "はねるたび　リリンと　おとを　だす。\nたかい　しゅうはすうの　なきごえで\nあいての　みみを　きこえなくする。"
        en:
          diamond: "It emits cries by agitating an orb\nat the back of its throat.\nIt moves with flouncing hops."
          pearl: "Each time it hops, it makes a\nringing sound. It deafens foes by\nemitting high-frequency cries."
        fr:
          diamond: "Il émet des cris en agitant\nl’orbe à l’arrière de sa gorge. Il\navance par bonds désordonnés."
          pearl: "Il produit un bruit de sonnerie à\nchaque bond. Il assourdit l’ennemi\navec ses cris à haute fréquence."
        it:
          diamond: "Emette versi muovendo la sfera\nche ha nella gola.\nSi muove saltellando agilmente."
          pearl: "Ad ogni salto produce un suono che\nsembra uno squillo. I suoi versi ad\nalta frequenza assordano i nemici."
        de:
          diamond: "Es ruft, indem es eine Kugel in\nseiner Kehle bewegt. Es bewegt sich\nmit eiligen Hopsern fort."
          pearl: "Jedes Mal, wenn es hüpft, entsteht\nein klingender Laut. Seine hohen\nSchreie machen die Gegner taub."
        es:
          diamond: "Emite chillidos al agitar la esfera\nde su garganta. Se mueve con\nenérgicos saltos."
          pearl: "Emite un zumbido cada vez que\nsalta. Ensordece a sus rivales\ncon sonidos de alta frecuencia."
        ko:
          diamond: "목 속의 둥근 구슬을\n떨게 하여 울음소리를 낸다.\n두둥실 떠서 이동한다."
          pearl: "뛸 때마다 딸랑딸랑 소리를 낸다.\n높은 주파수의 울음소리로\n상대의 귀를 들리지 않게 한다."
