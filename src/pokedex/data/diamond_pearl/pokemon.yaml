          pearl: "ジェットせんとうきに　まけない\nスピードで　そらを　とぶ。\nねらった　えものは　にがさない。"
        en:
          diamond: "When it folds up its body and\nextends its wings, it looks like a\njet plane. It flies at sonic speed."
          pearl: "It flies at speeds equal to a jet\nfighter plane. It never allows its\nprey to escape."
        fr:
          diamond: "Quand il se recroqueville et étend\nses ailes, on dirait un chasseur.\nSa vitesse est supersonique."
          pearl: "Il vole à la vitesse d’un avion à\nréaction et ne lâche jamais\nsa proie."
        it:
          diamond: "Quando si piega e distende le ali,\nsembra un jet. Vola a una velocità\nsupersonica."
          pearl: "Vola alla velocità di un aereo da\ncombattimento a reazione. Non\nlascia mai fuggire la preda."
        de:
          diamond: "Spannt es seinen Körper und seine\nFlügel, sieht es aus wie ein Jet.\nEs fliegt mit Schallgeschwindigkeit."
          pearl: "Es fliegt mit der Geschwindigkeit\neines Kampfjets. Es lässt nicht zu,\ndass ihm seine Beute entkommt."
        es:
          diamond: "Cuando despliega su cuerpo y sus\nalas, parece un avión a reacción.\nVuela a velocidad sónica."
          pearl: "Vuela tan rápido como un avión\na reacción. Nunca se le escapa\nuna presa."
        ko:
          diamond: "몸을 접고 날개를\n펼치면 마치 제트기 같다.\n음속으로 날 수 있다."
          pearl: "제트기와 맞먹는\n스피드로 하늘을 난다.\n노린 먹이는 놓치지 않는다."
munchlax:
