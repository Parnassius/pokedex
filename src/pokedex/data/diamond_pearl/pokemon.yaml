          diamond: "ガバイトの　ウロコから　つくった\nくすりが　ふじのやまいを　なおすと\nふるくから　しんじられてきた。"
          pearl: "ほりだした　ほうせきを　すみかに\nあつめる　しゅうせい。それを　ねらう\nどろぼうが　あとをたたない。"
        en:
          diamond: "There is a long-held belief that\nmedicine made from its scales will\nheal even incurable illnesses."
          pearl: "It habitually digs up and hoards\ngems in its nest. Its loot is\nconstantly targeted by thieves."
        fr:
          diamond: "Selon une croyance ancienne, on\npeut utiliser ses écailles pour\nguérir les maladies incurables."
          pearl: "Il creuse en quête de gemmes\ndont il décore son nid. Bien des\nvoleurs convoitent son butin."
        it:
          diamond: "Molti credono che le medicine\nfatte con le sue scaglie\ncurino anche i mali incurabili."
          pearl: "È solito scavare per cercare\ngemme, che conserva nella tana. I\nladri tentano spesso di rubargliele."
        de:
          diamond: "Es gibt einen uralten Glauben, dass\nMedizin, die aus seinen Schuppen\ngewonnen wird, alles heilen kann."
          pearl: "Es gräbt Edelsteine aus und hortet\nsie in seinem Nest. Daher ist dieses\nein beliebtes Ziel mancher Diebe."
        es:
          diamond: "Existe la arraigada creencia de\nque una medicina hecha de sus\nescamas puede curarlo todo."
          pearl: "Suele buscar y acumular gemas\nen su nido. Su botín es objetivo\nconstante de ladrones."
        ko:
          diamond: "한바이트의 비늘로부터 만든\n약은 불치의 병을 고친다고\n오래전부터 믿어져 왔다."
          pearl: "캐낸 보석을 거처에 모으는\n습성이 있다. 그것을 노리는\n도둑이 끊이질 않는다."
garchomp:
