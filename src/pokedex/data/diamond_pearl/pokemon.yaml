          pearl: "いつも　たいぼくや　いしを　かじって\nじょうぶな　まえばを　けずっている。\nみずべに　すを　つくり　くらす。"
        en:
          diamond: "With nerves of steel, nothing can\nperturb it. It is more agile and\nactive than it appears."
          pearl: "It constantly gnaws on logs and\nrocks to whittle down its front\nteeth. It nests alongside water."
        fr:
          diamond: "Rien ne peut perturber ses nerfs\nd’acier. Il est plus agile et\nénergique qu’il n’y paraît."
          pearl: "Il ronge constamment des troncs\net des pierres pour se faire les\nincisives. Il niche le long de l’eau."
        it:
          diamond: "Ha i nervi d’acciaio e niente può\nturbarlo. È più agile e attivo di\nquanto sembri."
          pearl: "Rosicchia continuamente legno e\nrocce per affilare i denti anteriori.\nNidifica vicino all’acqua."
        de:
          diamond: "Es hat Nerven wie Drahtseile,\nnichts kann es erschüttern. Es ist\nagiler und aktiver, als es scheint."
          pearl: "Es knabbert ständig an Holz und\nSteinen, um seine Vorderzähne zu\nkürzen. Es nistet am Wasser."
        es:
          diamond: "Tiene nervios de acero y nada\npuede perturbarlo. Es más ágil\ny activo de lo que aparenta."
          pearl: "Roe constantemente los troncos\ny las rocas para limarse los \ndientes. Anida cerca del agua."
        ko:
          diamond: "어떤 것에도 동요하지 않는\n대담한 신경의 소유자다.\n보기 보다는 기민하게 활동한다."
          pearl: "항상 큰 나무나 돌을 갉아서\n튼튼한 앞니를 갈아내고 있다.\n물가에 둥지를 만들어 산다."
