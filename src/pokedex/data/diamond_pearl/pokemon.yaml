          pearl: "てっきゅうの　ような　かせきから\nふっかつした　こだいの　ポケモン。\nずつきで　えものを　しとめた。"
        en:
          diamond: "It lived in jungles around 100\nmillion years ago. Its skull is as\nhard as iron."
          pearl: "It was resurrected from an iron\nball-like fossil. It downs prey with\nits head butts."
        fr:
          diamond: "Il vivait dans la jungle il y a \nenviron 100 millions d’années. Son\ncrâne est dur comme du fer."
          pearl: "On l’a ressuscité à partir d’un\nfossile de fer en forme de balle. Il\nabat ses proies à coups de tête."
        it:
          diamond: "Viveva nella giungla circa 100\nmilioni di anni fa. Il suo cranio\nè duro come il ferro."
          pearl: "È stato fatto rivivere da un fossile\ndi ferro simile a una palla. Abbatte\nle prede con le punte sulla testa."
        de:
          diamond: "Vor über 100 Millionen Jahren lebte\nes in den Dschungeln. Sein Schädel\nist hart wie Eisen."
          pearl: "Es wurde aus einem ballartigen,\neisernen Fossil geschaffen. Es\nschlägt Beute mit einem Kopfstoß."
        es:
          diamond: "Vivía en la jungla hace unos 100\nmillones de años. Su cráneo es\ntan duro como el hierro."
          pearl: "Fue recreado a partir de un fósil\ncon forma esférica. Derriba a\nlas presas a cabezazos."
        ko:
          diamond: "약 1억 년 전에\n고대의 밀림에서 살고 있었다.\n두개골이 철처럼 단단하다."
          pearl: "철구 같은 화석에서\n부활한 고대 포켓몬이다.\n박치기로 먹이를 꼼짝 못하게 한다."
