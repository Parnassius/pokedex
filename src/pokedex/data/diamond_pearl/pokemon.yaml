          pearl: "Ce timide bourgeon devient une\nfleur joyeuse. Il reprend sa forme\nde bourgeon au coucher du soleil."
        it:
          diamond: "Sboccia quando fa caldo e cerca\ndi godersi fino all’ultimo ogni mo-\nmento che può passare al sole."
          pearl: "È un timido germoglio che si rallegra\nquando fiorisce. Al calar del sole,\ntorna ad essere germoglio."
        de:
          diamond: "In Zeiten mit viel Sonnenschein\nblüht es auf. Es holt nach, was ihm\nals Knospe verwehrt blieb."
          pearl: "Es ist sanft als Knospe und fröhlich\nals Blüte. Lässt das Sonnenlicht\nnach, wird es wieder zur Knospe."
        es:
          diamond: "Florece en épocas de mucha\nluz solar. Intenta compensar\nlo que soportó como capullo."
          pearl: "Es muy dócil como capullo y alegre\ncuando florece. Si la luz solar\nmengua, se transforma en capullo."
        ko:
          diamond: "햇살이 강해지면 꽃이 핀다.\n봉오리일 때에 참고 견딘\n울분을 한번에 푸는 것이다."
          pearl: "봉오리일 때는 얌전하지만\n꽃이 피면 항상 생글생글 한다.\n해가 지면 봉오리로 되돌아간다."
