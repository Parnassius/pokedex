        - storm_drain
      descriptions:
        jp_kana:
          diamond: "ホネがなく　グニャグニャの　からだ。\nからだの　いちぶが　ちぎれても\nすぐに　さいせいされて　もとどおり。"
          pearl: "おおむかしは　じょうぶな　カラで\nからだを　まもっていたらしい。\nうみの　あさせに　せいそくする。"
        en:
          diamond: "It has a pliable body without any\nbones. If any part of its body is\ntorn off, it grows right back."
          pearl: "It apparently had a huge shell for\nprotection in ancient times.\nIt lives in shallow tidal pools."
        fr:
          diamond: "Son corps pliable est dépourvu\nd’os. Lorsqu’on tranche un de ses\nmembres, il repousse immédiatement."
          pearl: "Jadis, il semble qu’il portait une\ngrande carapace pour se protéger.\nIl hante les eaux peu profondes."
        it:
          diamond: "Ha un corpo flessibile e senza ossa.\nQualsiasi parte del corpo che gli\nvenga lacerata ricresce subito."
          pearl: "Pare che in passato il suo corpo\nfosse protetto da un enorme cara-\npace. Vive in bacini poco profondi."
        de:
          diamond: "Es hat einen biegsamen Körper ohne\neinen Knochen. Wird ein Körperteil\nabgetrennt, wächst er nach."
          pearl: "In Urzeiten muss es einen großen\nSchutzpanzer besessen haben. Es\nlebt in kleinen Wasserstellen."
        es:
          diamond: "Posee un cuerpo flexible sin\nhuesos. Si pierde alguna parte,\nle vuelve a crecer."
          pearl: "Al parecer, hace mucho tiempo\ntenía una gran concha protectora.\nVive en aguas poco profundas."
        ko:
          diamond: "뼈가 없이 흐물흐물한 몸이다.\n몸 일부가 조각나도 바로\n재생되어 원래대로 되돌아온다."
          pearl: "아주 옛날에는 튼튼한 껍질로\n몸을 보호하고 있었던 듯하다.\n바다의 얕은 곳에서 서식한다."
