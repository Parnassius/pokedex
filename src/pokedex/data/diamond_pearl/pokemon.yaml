        en:
          diamond: "It lives on snowy mountains.\nHaving had little contact with\nhumans, it is boldly inquisitive."
          pearl: "In the spring, it grows berries\nwith the texture of frozen treats\naround its belly."
        fr:
          diamond: "Il vit sur les monts enneigés.\nIgnorant des coutumes humaines,\nil lui arrive d’être très indiscret."
          pearl: "Au printemps, il fait pousser\ndes Baies pareilles à des crèmes\nglacées autour de son ventre."
        it:
          diamond: "Vive sui monti innevati. Ha avuto\npochi contatti con gli umani, quindi\nè molto curioso nei loro confronti."
          pearl: "In primavera, attorno al ventre\ngli crescono delle bacche simili\na dolci ghiaccioli."
        de:
          diamond: "Es lebt im Schnee der Berge. Es\nhatte bisher kaum Kontakt zu Men-\nschen und ist daher sehr neugierig."
          pearl: "Im Frühjahr wachsen Beeren, die wie\ngefrorene Süßigkeiten aussehen, um\nseinen Bauch herum."
        es:
          diamond: "Vive en montañas nevadas.\nApenas tiene contacto con los\nhumanos y es muy curioso."
          pearl: "En primavera, le crecen bayas\ncon apariencia de helado\nalrededor de la panza."
        ko:
          diamond: "설산에서 살고 있다.\n거의 만날 일 없는 인간을 보면\n신기해하면서 다가온다."
          pearl: "봄이 되면 아이스캔디와\n같은 촉감의 나무열매가\n배의 주위에 열린다."
