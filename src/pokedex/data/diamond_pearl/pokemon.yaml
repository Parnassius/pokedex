          pearl: "どくぶくろを　おおきく　ふくらませて\nゴボゴボと　ぶきみな　おとを　だす。\nあいてを　いかくするためだ。"
        en:
          diamond: "Its cheeks hold poison sacs.\nIt tries to catch foes off guard\nto jab them with toxic fingers."
          pearl: "Inflating its poison sacs, it\nmakes an eerie blubbering sound\nfor intimidation."
        fr:
          diamond: "Ses joues contiennent des glandes\ntoxiques. Il attaque par surprise\net utilise son toucher empoisonné."
          pearl: "Il émet un gargouillis étrange en\ngonflant ses glandes de poison\npour intimider l’ennemi."
        it:
          diamond: "Le sacche delle guance contengono\nveleno. Infilza i nemici con le sue\nunghie avvelenate."
          pearl: "Gonfiando le sacche di veleno,\nemette dei gargarismi misteriosi\nche intimoriscono il nemico."
        de:
          diamond: "In seinen Backen sammelt sich Gift.\nEs versucht, Beute zu überraschen\nund mit Giftfingern zu schnappen."
          pearl: "Wenn es seine giftigen Backen\naufbläst, hört man ein unheimliches\nGeräusch, welches Gegner ängstigt."
        es:
          diamond: "Tiene bolsas venenosas en las\nmejillas. Pilla desprevenidos\na sus rivales para pincharles."
          pearl: "Cuando infla sus bolsas\nvenenosas, emite un fuerte\nsonido para intimidar."
        ko:
          diamond: "볼에 독주머니를 가지고 있다.\n상대의 틈을 노려 맹독이\n배인 손가락을 꿰찌른다."
          pearl: "독주머니를 크게 부풀려서\n쿨렁쿨렁 으스스한 소리를 낸다.\n상대를 위협하기 위해서다."
