          pearl: "ふかい　もりへ　さそいこもうと\nたびびとの　ちかくに　あつまる。\nふこうを　はこぶと　いわれている。"
        en:
          diamond: "It is believed that seeing this\nPokémon at night will bring\nabout ominous occurrences."
          pearl: "It appears near travelers to lure\nthem into deep forests. It is said\nto carry misfortune."
        fr:
          diamond: "On dit que rencontrer\nun CORNEBRE la nuit est\nsigne de mauvais augure."
          pearl: "Il apparaît près des voyageurs\npour les attirer en pleine forêt.\nOn prétend qu’il porte malheur."
        it:
          diamond: "Si dice che l’incontro notturno\ncon questo Pokémon sia un\npresagio infausto."
          pearl: "Attira gli ignari viaggiatori in\nfitte foreste.\nSi dice che porti sfortuna."
        de:
          diamond: "Sieht man dieses PKMN bei Nacht,\nsollen merkwürdige Dinge passieren."
          pearl: "Es lockt Wanderer tief in den Wald.\nMan sagt, es bringe Unglück."
        es:
          diamond: "Se dice que ver a este Pokémon\npor la noche es señal de que van\na ocurrir cosas terribles."
          pearl: "Aparece cerca de los viajeros y los\natrae a lo más profundo del bosque.\nSe dice que porta mala fortuna."
        ko:
          diamond: "밤에 그 모습을 보게 되면\n불길한 일이 일어난다고\n여겨지고 있는 포켓몬이다."
          pearl: "깊은 숲 속으로 끌어들이려고\n여행자 근처로 모여든다.\n불행을 가져다준다고 전해진다."
