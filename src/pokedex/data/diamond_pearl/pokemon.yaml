        jp_kana:
          diamond: "かんそうした　とちで　くらす。\nあせの　かわりに　すなつぶを\nからだから　ぶんぴつする　ポケモン。"
          pearl: "ぜんしんに　すなを　まとうことで\nばいきんから　からだを　まもる。\nみずに　ぬれることが　にがて。"
        en:
          diamond: "It lives in arid places. Instead\nof perspiration, it expels grainy\nsand from its body."
          pearl: "It enshrouds itself with sand to\nprotect itself from germs.\nIt does not enjoy getting wet."
        fr:
          diamond: "Il vit dans des endroits arides.\nIl exsude du sable granuleux\nau lieu de transpirer."
          pearl: "Il se recouvre de sable pour se\nprotéger des microbes. Il n’aime\npas l’eau."
        it:
          diamond: "Vive in territori aridi. Invece del\nsudore, espelle dal corpo sabbia\ngranulosa."
          pearl: "Si ricopre di sabbia per proteggersi\ndai germi. Non ama bagnarsi."
        de:
          diamond: "Es lebt in ausgetrockneten\nGebieten. Statt zu schwitzen,\nsondert sein Körper Sand ab."
          pearl: "Es bedeckt sich mit Sand, um sich\nvor Keimen zu schützen. Es mag es\ngar nicht, wenn es nass wird."
        es:
          diamond: "Vive en zonas áridas. En lugar\nde sudar, su cuerpo expulsa\ngranos de arena."
          pearl: "Se embadurna de arena para\nprotegerse de los gérmenes.\nNo le gusta mojarse."
        ko:
          diamond: "건조한 땅에서 산다.\n땀 대신 모래알을\n몸에서 분비하는 포켓몬이다."
          pearl: "전신에 모래를 둘러서\n세균으로부터 몸을 보호한다.\n물에 젖는 것을 싫어한다."
hippowdon:
