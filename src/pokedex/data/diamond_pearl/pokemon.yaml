        fr:
          diamond: "Il construit des barrages de boue\net d’écorce le long des fleuves. \nC’est un ouvrier de renom."
          pearl: "Même s’il est plutôt pataud sur la\nterre ferme, ce Pokémon nage\naussi vite que BARPAU."
        it:
          diamond: "Sbarra il corso dei fiumi con cor-\nteccia e fango per farsi la tana. È\nnoto come lavoratore instancabile."
          pearl: "Fuori dall’acqua si muove molto\nlentamente, ma riesce a nuotare\npiù velocemente di qualsiasi FEEBAS."
        de:
          diamond: "Es baut sein Nest, indem es in\nFlüssen Dämme aus Schlamm und\nÄsten baut. Ein fleißiger Arbeiter."
          pearl: "Seine Bewegungen an Land sind\nunbeholfen. Im Wasser aber ist es\nso schnell wie ein BARSCHWA."
        es:
          diamond: "Para anidar, crea presas en los\nríos con maderas y barro.\nTiene fama de trabajador."
          pearl: "Fuera del agua es muy lento,\npero puede nadar tan rápido\ncomo un FEEBAS."
        ko:
          diamond: "강을 나무열매나 진흙의 댐으로\n막아서 거처를 만든다.\n부지런한 일꾼으로 알려져 있다."
          pearl: "지상에서의 동작은 느리지만\n헤엄치는 스피드는\n빈티나와 호각을 이룬다."
