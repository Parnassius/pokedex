        es:
          diamond: "Se caracterizan por su aspecto\nendeble. Se agrupan en gran\nnúmero en lugares muy concretos."
          pearl: "Come de todo, por lo que puede\nvivir en aguas contaminadas.\nNadie le presta atención."
        ko:
          diamond: "볼품없는 모습으로 유명하다.\n서식 수는 많지만\n한군데 모여있는 습성이 있다."
          pearl: "무엇이든 먹기 때문에 더러운\n강이나 호수에서도 살 수 있다.\n누구도 주목하지 않는 포켓몬이다."
