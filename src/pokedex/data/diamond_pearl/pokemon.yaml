          pearl: "きたぐにの　かいがんせんで　くらす。\nおよぎが　とくい。１０ぷん　いじょう\nうみに　もぐって　エサを　とる。"
        en:
          diamond: "Because it is very proud, it hates\naccepting food from people. Its\nthick down guards it from cold."
          pearl: "It lives along shores in northern\ncountries. A skilled swimmer, it\ndives for over 10 minutes to hunt."
        fr:
          diamond: "Il est fier et déteste accepter\nla nourriture qu’on lui offre. Son\npelage épais le protège du froid."
          pearl: "Il vit sur les côtes des régions\nnordiques. C’est un nageur doué,\nqui peut plonger durant 10 minutes."
        it:
          diamond: "È molto orgoglioso e odia accettare\ncibo dalla gente. Le fitte piume lo\nproteggono dal freddo."
          pearl: "Vive lungo le coste nei paesi del\nnord. Abile nuotatore, per cacciare\nsi immerge per oltre 10 minuti."
        de:
          diamond: "Es ist sehr stolz und nimmt daher\nkein Futter von anderen an. Seine\ndicken Daunen schützen vor Kälte."
          pearl: "Es lebt an den Küsten der nörd-\nlichen Länder. Es kann über 10\nMinuten unter Wasser bleiben."
        es:
          diamond: "Es muy orgulloso, por lo que odia\naceptar comida de la gente. Su\ngrueso plumón le protege del frío."
          pearl: "Vive en las costas de los países\nnórdicos. Es un gran nadador y\npuede bucear más de 10 minutos."
        ko:
          diamond: "자존심이 강해서 사람에게\n먹이를 얻는 것을 싫어한다.\n긴 솜털이 추위를 막는다."
          pearl: "북쪽 나라의 해안선에서 산다.\n수영이 특기이다. 10분 이상\n바다에 잠수해서 먹이를 잡는다."
