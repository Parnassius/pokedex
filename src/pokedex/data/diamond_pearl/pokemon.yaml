          diamond: "Il se protège en expulsant un \nfluide nocif par son derrière. \nLa puanteur dure 24 heures."
          pearl: "Son derrière projette un fluide \npuant et fétide qu’il utilise\npour repousser l’ennemi."
        it:
          diamond: "Si protegge spruzzando un\nfluido puzzolente dal posteriore.\nIl tanfo permane per 24 ore."
          pearl: "Spruzza un fluido puzzolente e\ndisgustoso dal posteriore\nper allontanare i nemici."
        de:
          diamond: "Um sich zu schützen, versprüht es\neine Substanz aus seinem\nHinterleib, die 24 Stunden stinkt."
          pearl: "Es versprüht eine übel stinkende\nFlüssigkeit aus seinem Hinterleib,\num Angreifer zu verjagen."
        es:
          diamond: "Se protege expulsando un fluido\nnocivo por su parte trasera.\nEl hedor dura 24 horas."
          pearl: "Para repeler ataques, produce\nun fluido maloliente en su\nparte posterior."
        ko:
          diamond: "엉덩이에서 강렬한 구린내의\n액체를 날려서 몸을 지킨다.\n냄새가 24시간 사라지지 않는다."
          pearl: "코를 틀어막을 정도로 심한 냄새가\n나는 액체를 엉덩이에서 뿜어내어\n습격해온 적을 쫓아 버린다."
