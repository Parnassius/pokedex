          pearl: "２ほんの　しっぽを　スクリューの\nように　まわして　およぐ。もぐる\nときは　うきぶくろが　しぼむ。"
        en:
          diamond: "It has a flotation sac that is\nlike an inflatable collar. It floats\non water with its head out."
          pearl: "It swims by rotating its two tails\nlike a screw. When it dives, its\nflotation sac collapses."
        fr:
          diamond: "Sa bouée est pareille à un\ncollier gonflable. Quand il flotte,\nil garde la tête à l’air libre."
          pearl: "Il nage en faisant tournoyer ses\ndeux queues comme une hélice.\nSa bouée s’affaisse quand il plonge."
        it:
          diamond: "Ha un collare che funge da galleg-\ngiante. Quando nuota, la sua testa\nrimane sempre fuori dall’acqua."
          pearl: "Nuota roteando le due code come\nfossero viti. Quando si immerge,\nil suo galleggiante si sgonfia."
        de:
          diamond: "Es hat eine Art Rettungsring um\nden Hals. Wenn es schwimmt, gerät\nsein Kopf niemals unter Wasser."
          pearl: "Es schwimmt, indem es seine beiden\nSchweife wie eine Schiffsschraube\nrotieren lässt."
        es:
          diamond: "Posee un flotador en forma de\ncollar hinchable. Flota en el\nagua con la cabeza fuera."
          pearl: "Nada rotando sus dos colas a\nmodo de tornillo. Cuando bucea,\nel flotador se pliega."
        ko:
          diamond: "목에 있는 부낭에 공기를\n모으면 튜브처럼 부푼다.\n수면에 얼굴을 내밀고 뜬다."
          pearl: "2개의 꼬리를 스크루처럼\n돌려서 헤엄친다. 잠수할 때는\n공기주머니가 오그라든다."
