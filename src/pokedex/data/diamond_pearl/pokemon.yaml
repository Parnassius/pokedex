          pearl: "かんそうした　とちに　せいそく。\nすなちに　あなを　ほり　もぐりこみ\nかくれて　えものを　まちつづける。"
        en:
          diamond: "It grips prey with its tail claws\nand injects poison. It tenaciously\nhangs on until the poison takes."
          pearl: "It lives in arid lands. It buries\nitself in sand and lies in wait for\nunsuspecting prey."
        fr:
          diamond: "Il saisit sa proie avec les pinces de\nsa queue, lui injecte un poison et\nla retient jusqu’à ce qu’il agisse."
          pearl: "Il vit sur les terres arides. Il\ns’enfouit dans le sable dans\nl’attente d’une proie imprudente."
        it:
          diamond: "Afferra le prede con gli artigli\ndella coda e non si allontana finché\nil veleno che inietta non agisce."
          pearl: "Vive in terre aride. Si seppellisce\nnella sabbia e aspetta l’arrivo di\nuna preda ignara del pericolo."
        de:
          diamond: "Es greift seine Beute mit den\nKrallen an seinem Schweif und ver-\ngiftet sie. Dann wartet es ab..."
          pearl: "Es lebt in trockenen Gegenden. Es\nvergräbt sich im Sand und wartet\ndann auf ahnungslose Beute."
        es:
          diamond: "Agarra a sus presas con las garras\nde la cola y les inyecta veneno.\nEspera hasta que hace efecto."
          pearl: "Vive en zonas áridas. Se entierra\nen la arena y espera a que pase\nuna presa confiada."
        ko:
          diamond: "꼬리의 발톱으로 먹이를 집어\n독을 주입한다. 독이 퍼질 때까지\n절대 놓치지 않는 집념이 있다."
          pearl: "건조한 땅에 서식한다.\n모래땅에 구멍을 파고들어\n숨어서 먹이를 계속 기다린다."
