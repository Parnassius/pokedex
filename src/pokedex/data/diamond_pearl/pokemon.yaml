          pearl: "ふだんは　むれで　くらしているが\n１ぴきに　なると　めだたなくなる。\nなきごえが　とても　やかましい。"
        en:
          diamond: "They flock in great numbers.\nThough small, they flap their\nwings with great power."
          pearl: "Usually with a large flock, it is\nbarely noticeable when alone.\nIts cries are very strident."
        fr:
          diamond: "Ils volent en nombre. Bien que\nminuscule, il bat des ailes avec\nune vigueur impressionnante."
          pearl: "Il est difficile à repérer lorsqu’il\nn’évolue pas au sein d’une grande\nvolée. Ses cris sont stridents."
        it:
          diamond: "Si muove in grandi gruppi. Anche\nse piccolo, batte le ali in maniera\nmolto energica."
          pearl: "Di solito si muove in gruppi nume-\nrosi. È raro trovarlo da solo.\nEmette versi estremamente acuti."
        de:
          diamond: "Ihr Schwarm ist stets groß. Obwohl\nes kleine PKMN sind, schwingen sie\nihre Flügel mit enormer Kraft."
          pearl: "Normalerweise ist es immer im\nSchwarm unterwegs. Sein Ruf ist\näußerst durchdringend."
        es:
          diamond: "Viaja en grandes bandadas.\nAunque es pequeño, agita\nlas alas con gran fuerza."
          pearl: "Suele volar en bandadas, pero\npasa desapercibido cuando está\nsolo. Chilla de forma estridente."
        ko:
          diamond: "많은 수가 무리를 이루어\n행동한다. 몸은 작지만\n날개 치는 힘은 매우 강하다."
          pearl: "평소에는 무리로 살고 있지만\n1마리가 되면 눈에 띄지 않는다.\n울음소리가 무척 시끄럽다."
