      descriptions:
        jp_kana:
          diamond: "りょううでの　ツメは　じどうしゃを\nスクラップにする　はかいりょく。\nツメの　さきから　どくを　だす。"
          pearl: "ぜんしんが　がんじょうな　こうらで\nおおわれている。あたまが　１８０ど\nかいてんするので　しかくが　ない。"
        en:
          diamond: "It has the power in its clawed\narms to make scrap of a car. The\ntips of its claws release poison."
          pearl: "Its body is encased in a sturdy\nshell. Its head rotates 180\ndegrees, eliminating blind spots."
        fr:
          diamond: "Il peut réduire une voiture en \npièces avec ses pinces. Le bout\nde ses pinces contient du poison."
          pearl: "Il porte une coquille robuste. Sa\ntête peut pivoter à 180 degrés\npour couvrir les angles morts."
        it:
          diamond: "Con le zampe può accartocciare una\nmacchina. Le punte degli artigli\nsono velenose."
          pearl: "Ha il corpo incassato in un robusto\ncarapace. Ruota la testa di 180° \ne riesce a vedere tutto."
        de:
          diamond: "In seinen Armen steckt so viel\nKraft, dass es mit seinen giftigen\nKrallen Autos zerquetschen kann."
          pearl: "Sein Körper ist von einem robusten\nPanzer umgeben. Es kann den Kopf\num 180 Grad drehen. Es sieht alles."
        es:
          diamond: "Sus brazos tienen fuerza para\ndestrozar un coche. La punta\nde sus zarpas segrega veneno."
          pearl: "Está dentro de una fuerte coraza.\nSu cabeza rota 180 grados para\npoder ver en todas direcciones."
        ko:
          diamond: "양팔의 발톱은 자동차를\n동강 내는 파괴력이 있다.\n발톱의 끝에서 독을 뿌린다."
          pearl: "전신이 튼튼한 등껍질로\n덮여 있다. 머리가 180도\n회전하므로 사각이 없다."
