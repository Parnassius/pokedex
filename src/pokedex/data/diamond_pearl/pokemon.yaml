          pearl: "ちょっけい　２メートルの　おおぐち。\nじどうしゃを　ペシャンコに\nつぶしてしまう　はかいりょくだ。"
        en:
          diamond: "It blasts internally stored sand\nfrom ports on its body to create\na towering twister for attack."
          pearl: "Its huge mouth is almost seven\nfeet across. It has enough power\nto completely crush a car."
        fr:
          diamond: "Il emmagasine du sable qu’il\nexpulse en tornades par les\npores de sa peau pour attaquer."
          pearl: "Sa grande gueule fait quasiment\n2 m. Il a assez de force pour\nécraser une voiture."
        it:
          diamond: "Immagazzina sabbia all’interno del\ncorpo e l’espelle con violenza dai\npori, formando enormi vortici."
          pearl: "La sua bocca enorme misura\nquasi 2 metri. È tanto forte da\npoter demolire un’automobile."
        de:
          diamond: "Es wirbelt im Körper gespeicherten\nSand durch Öffnungen und generiert\nso einen Sandwirbelsturm."
          pearl: "Sein Maul ist fast 2 m breit. Es hat\ngenügend Kraft, um ein Auto\nzu zermalmen."
        es:
          diamond: "Cuando ataca, expulsa arena\nalmacenada en su interior\npara crear un gran tornado."
          pearl: "Su enorme boca mide casi 2 m.\nEs tan fuerte que puede aplastar\nun coche por completo."
        ko:
          diamond: "체내에 모아둔 모래를 몸의\n구멍에서 뿜어 올려 거대한\n회오리를 만들어 공격한다."
          pearl: "직경 2m의 큰 입이다.\n자동차를 납작하게\n찌그러뜨려 버리는 파괴력이다."
skorupi:
