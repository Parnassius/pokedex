          pearl: "Il fut emprisonné dans la fissure\nd’une clé de voûte étrange en\nguise de punition il y a 500 ans."
        it:
          diamond: "Pokémon formato da 108 spiriti. È\nstato imprigionato nella fessura di\nuna Roccianima."
          pearl: "500 anni fa fu imprigionato nella\nfessura di una Roccianima come\npunizione."
        de:
          diamond: "Ein PKMN, das aus 108 Geistern\nbesteht. Es ist an einen Spalt in\neinem mysteriösen Stein gebunden."
          pearl: "Es wurde in einen Spalt eines Steins\ngebannt, als Sühne für Untaten, die\nes vor 500 Jahren begangen hatte."
        es:
          diamond: "Se formó a partir de 108 espíritus.\nEstá unido a la fisura de una\npiedra angular mística."
          pearl: "Como castigo por una fechoría 500\naños atrás, está unido a la fisura\nde una piedra angular mística."
        ko:
          diamond: "108개의 영혼이 모여서\n태어난 포켓몬이다. 쐐기돌의\n균열과 연결되어 있다."
          pearl: "500년 전에 나쁜 짓을 했기 때문에\n쐐기돌의 균열에\n몸이 연결되어 갇혀 버렸다."
