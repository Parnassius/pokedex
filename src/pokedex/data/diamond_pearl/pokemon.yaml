          pearl: "あたまで　もえる　ほのおの　ように\nはげしい　せいかくの　ポケモン。\nすばやさでは　だれにも　まけない。"
        en:
          diamond: "It uses a special kind of martial\narts involving all its limbs.\nIts fire never goes out."
          pearl: "Its crown of fire is indicative of\nits fiery nature. It is beaten by\nnone in terms of quickness."
        fr:
          diamond: "Il pratique un art martial spécial\nqui utilise tous ses membres.\nSa flamme ne s’éteint jamais."
          pearl: "Sa couronne de feu trahit son\ntempérament bouillant. Sa\nvitesse est inégalée."
        it:
          diamond: "Usa un tipo speciale di arte marzia-\nle che coinvolge tutti gli arti. Le\nsue fiamme non si estinguono mai."
          pearl: "La sua criniera di fuoco è indice\ndella sua natura violenta. Nessuno\npuò batterlo in velocità."
        de:
          diamond: "Es kämpft auf besondere Art, indem\nes alle Gliedmaßen einsetzt. Sein\nFeuer erlischt nie."
          pearl: "Seine Krone aus Feuer ist Zeichen\nseines feurigen Wesens. Niemand ist\nschneller im Kampf als dieses PKMN."
        es:
          diamond: "Utiliza un tipo especial de artes\nmarciales con todos sus miembros.\nSu fuego nunca se extingue."
          pearl: "Su corona de fuego demuestra\nsu naturaleza ígnea. Nadie le\ngana en velocidad."
        ko:
          diamond: "양팔 양쪽 다리를 활용한\n특수한 격투 기술을 사용한다.\n불꽃은 평생 꺼지지 않는다."
          pearl: "머리에서 타오르는 불꽃처럼\n과격한 성격의 포켓몬이다.\n스피드는 누구에게도 지지 않는다."
