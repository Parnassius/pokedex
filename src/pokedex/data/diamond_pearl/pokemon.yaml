        special_defense: 0
        speed: 0
      types:
        - ghost
        - flying
      egg_groups:
        - amorphous
      abilities:
        - aftermath
        - unburden
      descriptions:
        jp_kana:
          diamond: "ひとや　ポケモンの　たましいが\nかたまって　うまれた　ポケモン。\nジメジメした　きせつが　だいすき。"
          pearl: "あのよへ　つれていこうとして\nこどもの　てを　ひっぱろうとするが\nはんたいに　ふりまわされてしまう。"
        en:
          diamond: "A Pokémon formed by the spirits\nof people and Pokémon. It loves\ndamp, humid seasons."
          pearl: "It tugs on the hands of children\nto steal them away. However, it\ngets pulled around instead."
        fr:
          diamond: "Un Pokémon né de l’esprit des gens\net des Pokémon. Il aime les saisons\nchaudes et humides."
          pearl: "Il tire sur les mains des enfants\npour les kidnapper. Mais il finit\ntoujours par se faire entraîner."
        it:
          diamond: "Pokémon formato dalle anime di\npersone e Pokémon. Ama le\nstagioni umide."
          pearl: "Cerca di portare via i bambini\ntirandoli per le mani, ma finisce\nper essere trascinato da loro."
        de:
          diamond: "Ein PKMN, entstanden aus den\nGefühlen von Menschen und PKMN.\nEs mag feuchte Jahreszeiten."
          pearl: "Es zieht Kinder an den Händen, um\nsie mitzunehmen. Doch stets wird es\ndabei durch die Gegend gezogen."
        es:
          diamond: "Está formado por los espíritus de\npersonas y Pokémon. Le encantan\nlas estaciones húmedas."
          pearl: "Agarra las manos de los niños\npara llevárselos, pero siempre\nacaba siendo arrastrado."
        ko:
          diamond: "사람이나 포켓몬의 영혼이\n한데 모여 태어난 포켓몬이다.\n습기 많은 계절을 매우 좋아한다."
          pearl: "저승으로 데려가려고\n아이의 손을 끌어당기지만\n반대로 자기가 끌려다닌다."
drifblim:
  species_id: 426
  names:
    jp_kana: フワライド
    en: DRIFBLIM
    fr: GRODRIVE
    it: DRIFBLIM
    de: DRIFZEPELI
    es: DRIFBLIM
    ko: 둥실라이드
  forms:
    drifblim:
      form_id: 0
      base_stats:
        hp: 150
        attack: 80
        defense: 44
        special_attack: 90
        special_defense: 54
        speed: 80
      evs_yield:
        hp: 2
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ghost
        - flying
      egg_groups:
        - amorphous
      abilities:
        - aftermath
        - unburden
      descriptions:
        jp_kana:
          diamond: "ひるまは　ねぼけて　うかんでいるが\nゆうがた　たいぐんで　とんでいく。\nいきさきは　だれも　しらない。"
          pearl: "ひとや　ポケモンを　のせて　とぶが\nかぜに　ながされているだけなので\nどこへ　とんでいくか　わからない。"
        en:
          diamond: "It’s drowzy in daytime, but flies\noff in the evening in big groups.\nNo one knows where they go."
          pearl: "It carries people and Pokémon\nwhen it flies. But since it only\ndrifts, it can end up anywhere."
        fr:
          diamond: "Il somnole la journée et s’envole\nen grands groupes le soir venu. Nul\nne sait où ils vont."
          pearl: "Il peut embarquer des gens et des\nPokémon, mais nul ne sait où il va\natterrir car il ne fait que flotter."
        it:
          diamond: "Di giorno fluttua con aria\nsonnolenta, ma di notte vola via\nin gruppo. Nessuno sa dove vada."
          pearl: "Vola trascinando persone e\nPokémon. Poiché si fa portare dal\nvento, non si sa dove vada a finire."
        de:
          diamond: "Tagsüber treibt es faul vor sich\nhin, nachts fliegt es mit anderen\numher. Niemand weiß wohin."
          pearl: "Es trägt Menschen und PKMN im Flug.\nAber da es sich vom Wind nur tragen\nlässt, weiß man nie, wo es hingeht."
        es:
          diamond: "Durante el día está somnoliento,\npero por la noche sale volando en\ngrupo, aunque nadie sabe adónde."
          pearl: "Transporta a gente y a Pokémon\nvolando pero, como se deja llevar,\npuede acabar en cualquier sitio."
        ko:
          diamond: "낮에는 잠이 덜 깨어 떠 있지만\n저녁 무렵에는 큰 무리를 지어\n날아간다. 목적지는 아무도 모른다."
          pearl: "사람이나 포켓몬을 태우고 날지만\n바람에 떠밀려 다닐 뿐이므로\n어디로 날아갈지 모른다."
