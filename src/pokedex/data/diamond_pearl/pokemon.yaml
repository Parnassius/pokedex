          pearl: "きまった　すみかを　もたない。\nこうぶつの　はなの　ミツを　さがして　\nのやまを　こえて　とびつづける。"
        en:
          diamond: "It loves the honey of flowers\nand steals honey collected by\nCOMBEE."
          pearl: "It does not keep a nest. It flies\nover fields and mountains in\nconstant search of floral honey."
        fr:
          diamond: "Il aime le nectar des fleurs et\nn’hésite pas à voler celui\nque récupère APITRINI."
          pearl: "Il n’a pas de nid. Il survole les\nchamps et les montagnes en\nquête de nectar floral."
        it:
          diamond: "Ama il nettare dei fiori. Ruba e\nmangia il nettare raccolto da \nCOMBEE."
          pearl: "Non ha una tana fissa. Vola\nsu campi e monti in perenne\nricerca del nettare dei fiori."
        de:
          diamond: "Es liebt Honig und stiehlt den\nHonig, der von WADRIBIE\ngesammelt wurde."
          pearl: "Es baut sich kein Nest. Es fliegt\nüber Felder und Wiesen in der\nständigen Suche nach Honig."
        es:
          diamond: "Le encanta la miel de las\nflores y roba la que recoge\nCOMBEE."
          pearl: "No tiene nido. Vuela sobre los\ncampos y las montañas en busca\nde miel floral."
        ko:
          diamond: "꽃의 꿀을 매우 좋아한다.\n세꿀버리가 모아둔 꿀을\n가로채어 먹어 버린다."
          pearl: "정해진 거처를 갖지 않는다.\n좋아하는 꽃의 꿀을 찾아서\n산과 들을 넘어 날아다닌다."
