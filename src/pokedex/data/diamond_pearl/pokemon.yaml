turtwig:
  species_id: 387
  names:
    jp_kana: ナエトル
    en: TURTWIG
    fr: TORTIPOUSS
    it: TURTWIG
    de: CHELAST
    es: TURTWIG
    ko: 모부기
  forms:
    turtwig:
      form_id: 0
      base_stats:
        hp: 55
        attack: 68
        defense: 64
        special_attack: 45
        special_defense: 55
        speed: 31
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - grass
      egg_groups:
        - monster
        - grass
      abilities:
        - overgrow
      descriptions:
        jp_kana:
          diamond: "つちで　できた　せなかの　こうらは\nみずを　のむと　さらに　かたくなる。\nみずうみの　ほとりで　くらしている。"
          pearl: "ぜんしんで　こうごうせいを　して\nさんそを　つくる。のどが　かわくと\nあたまの　はっぱが　しおれてしまう。"
        en:
          diamond: "Made from soil, the shell on its\nback hardens when it drinks water.\nIt lives along lakes."
          pearl: "It undertakes photosynthesis with\nits body, making oxygen. The leaf\non its head wilts if it is thirsty."
        fr:
          diamond: "La coquille sur son dos est faite\nde terre. Elle durcit lorsqu’il \ns’abreuve. Il vit le long des lacs."
          pearl: "Son corps produit de l’oxygène par\nphotosynthèse. La feuille sur sa\ntête flétrit quand il a soif."
        it:
          diamond: "Il suo guscio, che è fatto di terra,\ns’indurisce quando il Pokémon beve.\nVive sulle rive dei laghi."
          pearl: "È in grado di svolgere la fotosin-\ntesi e di produrre ossigeno. La sua\nfoglia appassisce se ha sete."
        de:
          diamond: "Es besteht aus Erdreich. Trinkt es\nWasser, verhärtet sich der Panzer\nauf seinem Rücken. Es lebt an Seen."
          pearl: "Sein Körper lebt von der Photosyn-\nthese, die Sauerstoff freisetzt.\nIst es durstig, welkt sein Blatt."
        es:
          diamond: "La concha de su espalda es de\ntierra y se endurece cuando bebe\nagua. Vive cerca de los lagos."
          pearl: "Realiza la fotosíntesis para\nobtener oxígeno. Si tiene sed, las\nhojas de la cabeza se marchitan."
        ko:
          diamond: "흙으로 만들어진 등껍질은\n물을 먹으면 한층 단단해진다.\n호수 근처에서 살고 있다."
          pearl: "전신으로 광합성을 하여\n산소를 만든다. 목이 마르면\n머리의 잎사귀가 시들어 버린다."
grotle:
  species_id: 388
  names:
    jp_kana: ハヤシガメ
    en: GROTLE
    fr: BOSKARA
    it: GROTLE
    de: CHELCARAIN
    es: GROTLE
    ko: 수풀부기
  forms:
    grotle:
      form_id: 0
      base_stats:
        hp: 75
        attack: 89
        defense: 85
        special_attack: 55
        special_defense: 65
        speed: 36
      evs_yield:
        hp: 0
        attack: 1
        defense: 1
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - grass
      egg_groups:
        - monster
        - grass
      abilities:
        - overgrow
      descriptions:
        jp_kana:
          diamond: "もりの　なかの　みずべで　くらす。\nひるまは　もりの　そとに　でて\nこうらの　きに　ひかりを　あてる。"
          pearl: "こうらは　つちが　かたまった　もの。\nじゅもくに　なった　みを　ついばみに\nやってくる　ポケモンも　いる。"
        en:
          diamond: "It lives along water in forests. In\nthe daytime, it leaves the forest\nto sunbathe its treed shell."
          pearl: "The shell is hardened soil. Some\nPokémon come to peck the berries\ngrowing on the trees on its back."
        fr:
          diamond: "Il vit en forêt près de l’eau.\nEn journée, il la quitte pour dorer\nsa carapace feuillue au soleil."
          pearl: "Sa carapace est faite de terre \ndurcie. Certains Pokémon picorent\nles Baies des arbres sur son dos."
        it:
          diamond: "Vive nelle foreste vicino all’acqua,\nma esce di giorno per far pren-\ndere sole alle piante sul guscio."
          pearl: "Il suo guscio è terra indurita. Le\nbacche delle piante sul suo dorso\nsono molto amate da altri Pokémon."
        de:
          diamond: "Es lebt in der Nähe von Wasser in\nWäldern. Tagsüber verlässt es\ndiese, um ein Sonnenbad zu nehmen."
          pearl: "Seine Schale ist harter Lehm.\nPKMN naschen von den Beeren\nin den Bäumen auf seinem Rücken."
        es:
          diamond: "Vive en los bosques cerca del\nagua. Por el día, sale a que les dé\nel sol a las plantas de su espalda."
          pearl: "Su concha es tierra dura. Algunos\nPokémon picotean las bayas\nque crecen en su espalda."
        ko:
          diamond: "숲 속의 물가에서 산다.\n낮에는 숲 밖으로 나와서\n등껍질의 나무에 빛을 쬔다."
          pearl: "등껍질은 흙이 굳어진 것이다.\n수목에 열린 나무열매를 쪼려고\n오는 포켓몬도 있다."
torterra:
  species_id: 389
  names:
    jp_kana: ドダイトス
    en: TORTERRA
    fr: TORTERRA
    it: TORTERRA
    de: CHELTERRAR
    es: TORTERRA
    ko: 토대부기
  forms:
    torterra:
      form_id: 0
      base_stats:
        hp: 95
        attack: 109
        defense: 105
        special_attack: 75
        special_defense: 85
        speed: 56
      evs_yield:
        hp: 0
        attack: 2
        defense: 1
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - grass
        - ground
      egg_groups:
        - monster
        - grass
      abilities:
        - overgrow
      descriptions:
        jp_kana:
          diamond: "ちいさな　ポケモンたちが　あつまり\nうごかない　ドダイトスの　せなかで\nすづくりを　はじめることがある。"
          pearl: "いどうする　もりの　しょうたいは\nみずを　さがして　すみかを　うつす\nドダイトスの　むれだ。"
        en:
          diamond: "Small Pokémon occasionally gather\non its unmoving back to begin\nbuilding their nests."
          pearl: "Groups of this Pokémon migrating\nin search of water have been\nmistaken for “moving forests.”"
        fr:
          diamond: "Il arrive que de petits Pokémon\nse rassemblent sur son dos \nimmobile pour y faire leur nid."
          pearl: "Certains groupes migrant pour\ntrouver de l’eau ont été confondus\navec des “forêts vivantes”."
        it:
          diamond: "Piccoli Pokémon si radunano\ntalvolta sul suo dorso immobile\nper costruirvi la loro tana."
          pearl: "Gruppi di questi Pokémon che\nmigrano in cerca di acqua sono stati\nscambiati per “Foreste viventi”."
        de:
          diamond: "Kleine PKMN fangen manchmal an,\nauf dem bewegungslosen Rücken\nNester zu bauen."
          pearl: "Gruppen dieser PKMN, die auf der\nSuche nach Wasser umherlaufen,\nwerden “Wandernder Wald” genannt."
        es:
          diamond: "Algunos Pokémon pequeños\nse juntan en su espalda\npara hacer sus nidos."
          pearl: "Muchos confunden los grupos de\nTORTERRA que migran en busca\nde agua con bosques vivientes."
        ko:
          diamond: "작은 포켓몬들이 모여\n움직이지 않는 토대부기의 등에서\n둥지를 만들려고 하는 경우가 있다."
          pearl: "이동하는 숲의 정체는\n물을 찾아서 거처를 옮기는\n토대부기의 무리다."
chimchar:
  species_id: 390
  names:
    jp_kana: ヒコザル
    en: CHIMCHAR
    fr: OUISTICRAM
    it: CHIMCHAR
    de: PANFLAM
    es: CHIMCHAR
    ko: 불꽃숭이
  forms:
