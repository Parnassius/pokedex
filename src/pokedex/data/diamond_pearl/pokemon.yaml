          pearl: "ほっぺの　でんきぶくろで　つくった\nでんきを　しっぽから　うちだす。\nきの　うえで　せいかつしている。"
        en:
          diamond: "It makes fur balls that crackle\nwith static electricity. It stores\nthem with berries in tree holes."
          pearl: "It makes electricity with pouches\nin its cheeks and shoots charges\nfrom its tail. It lives atop trees."
        fr:
          diamond: "Il roule des boules de poils pleines\nd’électricité statique et les range\ndans des souches avec des Baies."
          pearl: "Les poches de ses joues produisent\nde l’électricité et sa queue envoie\ndes éclairs. Il vit dans les arbres."
        it:
          diamond: "Forma delle palle di pelo cariche\nelettrostaticamente e le conserva\nnegli alberi insieme alle bacche."
          pearl: "Nelle sacche sulle guance si forma\nelettricità, che rilascia poi dalla\ncoda. Vive in cima agli alberi."
        de:
          diamond: "Es bildet ein Fellknäuel, der vor\nstatischer Energie knistert. Es\nspeichert die Energie in Bäumen."
          pearl: "In seinen Backentaschen produziert\nes Elektrizität u. entlädt sie über\nden Schweif. Es lebt in Baumwipfeln."
        es:
          diamond: "Crea bolas de pelo que crepitan\ncon electricidad estática. Las\nalmacena en agujeros de árboles."
          pearl: "Genera electricidad con las bolsas\nde sus mejillas y suelta descargas\ncon su cola. Vive en los árboles."
        ko:
          diamond: "정전기가 모여 톡톡 튀는 솜털을\n자신이 좋아하는 나무열매와 함께\n나무줄기의 구멍에 숨긴다."
          pearl: "볼의 전기 주머니에서 만든\n전기를 꼬리로 내보낸다.\n나무 위에서 생활하고 있다."
