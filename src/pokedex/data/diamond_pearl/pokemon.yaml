          pearl: "もりや　そうげんに　せいそく。\nグループが　でくわすと　なわばりを\nかけた　あらそいが　はじまる。"
        en:
          diamond: "It flies around forests and fields\nin search of bug Pokémon.\nIt stays within a huge flock."
          pearl: "It lives in forests and fields.\nSquabbles over territory occur\nwhen flocks collide."
        fr:
          diamond: "Il survole les forêts et les champs\nen quête de Pokémon Insecte.\nIls forment de grandes volées."
          pearl: "Il peuple les champs et les forêts.\nLorsque deux volées se croisent,\nelles luttent pour le territoire."
        it:
          diamond: "Vola nelle foreste e nei campi\nin cerca di Pokémon coleottero.\nSi muove in grandi gruppi."
          pearl: "Vive nelle foreste e nei campi. Se\nalcuni gruppi si scontrano, danno\ninizio alla lotta per il territorio."
        de:
          diamond: "Auf der Suche nach Käfer-PKMN\nfliegt es über Wiesen und Wälder. Es\nbleibt in einem großen Schwarm."
          pearl: "Es lebt in Wäldern und auf Wiesen.\nTreffen Schwärme aufeinander,\nstreiten sie sich um das Revier."
        es:
          diamond: "Vuela por bosques y campos en\nbusca de Pokémon de tipo Bicho.\nSiempre va en bandadas."
          pearl: "Vive en bosques y campos.\nSi dos bandadas se encuentran,\npelean por el territorio."
        ko:
          diamond: "벌레 포켓몬을 노리고\n숲이나 초원을 날아다닌다.\n큰 무리를 이루어 행동한다."
          pearl: "숲이나 초원에 서식한다.\n그룹이 마주치면 영역을 건\n분쟁이 시작된다."
