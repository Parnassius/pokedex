          pearl: "２まいの　おびれを　はばたかせて\nおよぐ　すがたから　べつめい\nうみの　アゲハントと　よばれている。"
        en:
          diamond: "After long exposure to sunlight,\nthe patterns on its tail fins shine\nvividly when darkness arrives."
          pearl: "The way its two tail fins flutter\nwhile it swims has earned it the\nnickname “BEAUTIFLY of the Sea.”"
        fr:
          diamond: "Après une longue exposition au\nsoleil, les motifs de ses nageoires\ncaudales luisent à la nuit tombée."
          pearl: "Le mouvement de ses deux \nnageoires caudales lui a valu le \nsurnom de “CHARMILLON des mers”."
        it:
          diamond: "Dopo una lunga esposizione al sole,\ni motivi sulle sue pinne brillano\nvividamente al calar dell’oscurità."
          pearl: "Il modo in cui agita le sue due pinne\nnuotando gli è valso il soprannome\ndi “BEAUTIFLY dei mari”."
        de:
          diamond: "Wurden die Flossen lange dem\nSonnenlicht ausgesetzt, leuchten\nsie in der Dunkelheit."
          pearl: "Seine beiden Flossen bewegen sich,\nals ob es fliegen würde. Man nennt\nes auch “Schmetterling der Meere”."
        es:
          diamond: "Si se expone mucho al sol, los\ndibujos de sus aletas brillan\nen la oscuridad."
          pearl: "Se le llama el “BEAUTIFLY del mar”\npor la forma en que se balancean\nsus dos aletas cuando nada."
        ko:
          diamond: "햇볕을 잔뜩 쬔 꼬리지느러미의\n무늬는 어두워지면 선명한 색으로\n반짝이기 시작한다."
          pearl: "2개의 꼬리지느러미를 쳐서\n헤엄치는 모습 때문에 별명은\n바다의 뷰티플라이라고 불린다."
