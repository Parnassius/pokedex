        it:
          diamond: "Nidifica in piccole cavità orizzontali\nnelle pareti delle grotte. Si avven-\nta sulle prede che si avvicinano."
          pearl: "Un tempo viveva ai tropici. Per\nevitare il freddo, vive in grotte\nriscaldate dal calore geotermico."
        de:
          diamond: "Es nistet in kleinen Löchern in\nHöhlenwänden. Es springt Beute, die\nsich zu nah heranwagt, an."
          pearl: "Einst lebte es in den Tropen. Um\nder Kälte zu entgehen, lebt es in\nHöhlen, in der es Erdwärme gibt."
        es:
          diamond: "Anida en pequeños agujeros en las\nparedes de cuevas. Cuando una\npresa pasa cerca, salta hacia ella."
          pearl: "Antes vivía en el trópico. Para\nevitar el frío, habita en cuevas\ncalentadas por calor geotérmico."
        ko:
          diamond: "동굴의 조그만 구멍을\n보금자리로 쓴다. 먹이가 다가오면\n재빠르게 뛰쳐나가 붙잡는다."
          pearl: "일찍이 열대의 땅에 있었다.\n추위를 피하기 위해 지열로\n따뜻한 동굴에서 산다."
gabite:
