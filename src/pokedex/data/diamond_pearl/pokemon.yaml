          pearl: "つぼみの　ときは　おとなしいが\nはなが　ひらくと　いつも　ニコニコ。\nひが　かげると　つぼみに　もどる。"
        en:
          diamond: "It blooms during times of strong\nsunlight. It tries to make up for\neverything it endured as a bud."
          pearl: "It is docile as a bud, but turns\ncheerful when it blooms. It folds\nback into a bud if sunlight wanes."
        fr:
          diamond: "Il fleurit lorsque le soleil est au\nbeau fixe. Il cherche à prendre sa\nrevanche sur une vie de bourgeon."
