        de:
          diamond: "18 Stunden am Tag schläft es. Und\nwenn es wach ist, teleportiert es\nsich, während es sitzen bleibt."
          pearl: "Selbst im Schlaf ist sein telepa-\nthisches Radar aktiv. Bei Gefahr\nteleportiert es sich."
        es:
          diamond: "Duerme 18 horas al día. Cuando\nestá despierto no se levanta ni\npara teletransportarse."
          pearl: "Su radar telepático funciona\nincluso cuando duerme. Si se ve\namenazado, se teletransporta."
