          pearl: "あまぐもを　よび　あめを　ふらせる\nわざを　もつ。ほうさくの　かみさまと\nむかしの　ひとびとは　まつっていた。"
        en:
          diamond: "One caused a news sensation when\nit was dug up at a construction\nsite after a 2,000-year sleep."
          pearl: "It can summon rain clouds.\nPeople long ago revered it as the\nbringer of plentiful harvests."
        fr:
          diamond: "La découverte d’un de ces Pokémon\nsur un site de fouilles après 2 000 \nans de sommeil a fait sensation."
          pearl: "Il peut créer des nuages pluvieux.\nJadis, il était vénéré comme le\npatron des bonnes moissons."
        it:
          diamond: "Il suo ritrovamento in un cantiere\ndopo un sonno di 2000 anni fece a\nsuo tempo molto scalpore."
          pearl: "Può invocare delle nubi cariche di\npioggia. Un tempo era venerato\ncome patrono dei buoni raccolti."
        de:
          diamond: "Dieses PKMN fand man bei Grabungen\nauf einer Baustelle, an deren Ort\nes 2 000 Jahre geschlafen hatte."
          pearl: "Es kann Regenwolken beschwören.\nVor langer Zeit wurde es verehrt,\nda es so für gute Ernten sorgte."
        es:
          diamond: "Se produjo un gran revuelo cuando\nencontraron uno en una obra\ndespués de 2000 años durmiendo."
          pearl: "Puede conjurar nubes de lluvia.\nHace tiempo, la gente creía\nque traía buenas cosechas."
        ko:
          diamond: "2000년 이상 잠자고 있던\n동탁군이 공사현장에서\n발굴되어 빅뉴스가 되었다."
          pearl: "비구름을 불러 비를 내리는 기술을\n가지고 있다. 풍작의 신이라고\n옛날 사람들은 받들어 모셨다."
