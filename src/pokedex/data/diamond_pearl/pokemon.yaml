          diamond: "It desperately tries to keep its\nblack tail hidden. It is said to be\nproof the tail hides a secret."
          pearl: "It desperately tries to keep its\nblack tail hidden. It is said to be\nproof the tail hides a secret."
        fr:
          diamond: "Il cherche désespérément à cacher\nsa queue noire. Certains pensent\nqu’elle renferme un secret."
          pearl: "Il cherche désespérément à cacher\nsa queue noire. Certains pensent\nqu’elle renferme un secret."
        it:
          diamond: "Cerca di tenere nascosta la sua\ncoda nera ad ogni costo. Pare\nche essa celi un segreto."
          pearl: "Cerca di tenere nascosta la sua\ncoda nera ad ogni costo. Pare\nche essa celi un segreto."
        de:
          diamond: "Verzweifelt versucht es, seinen\nschwarzen Schweif zu verstecken.\nEr soll ein Geheimnis enthalten."
          pearl: "Verzweifelt versucht es, seinen\nschwarzen Schweif zu verstecken.\nEr soll ein Geheimnis enthalten."
        es:
          diamond: "Siempre intenta ocultar su cola,\npor lo que muchos creen que\ncontiene un secreto."
          pearl: "Siempre intenta ocultar su cola,\npor lo que muchos creen que\ncontiene un secreto."
        ko:
          diamond: "까만 꼬리를 필사적으로\n숨기는 것은 꼬리에 비밀이 있다는\n증거라고 의심받고 있다."
