          pearl: "どんかんな　ポケモン。\nおよいでいるとき　いわや　ふなぞこに\nあたまを　ぶつけても　きにしない。"
        en:
          diamond: "It has a sluggish nature. It lies\nat the river’s bottom, waiting for\nprey to stray into its mouth."
          pearl: "A dim-witted Pokémon. It doesn’t\ncare if it bumps its head into\nboats or rocks while swimming."
        fr:
          diamond: "C’est un grand paresseux qui \nattend au fond de la rivière qu’une\nproie lui tombe dans le bec."
          pearl: "Un Pokémon simple d’esprit. Il ne\nse soucie pas des pierres ou des\nbateaux qu’il percute en nageant."
        it:
          diamond: "È pigro per natura. Sta sul fondo\ndei fiumi con la bocca aperta in\nattesa di afferrare la preda."
          pearl: "Pokémon poco astuto. Non si\nscompone se sbatte la testa contro\nle barche o le rocce mentre nuota."
        de:
          diamond: "Ein träges PKMN, das auf dem Grund\ndes Flusses liegt und wartet, dass\nihm Beute ins Maul schwimmt."
          pearl: "Ein begriffsstutziges PKMN. Stößt\nes sich den Kopf beim Schwimmen,\nmacht ihm das gar nichts aus."
        es:
          diamond: "Es un Pokémon bastante perezoso.\nPara pescar permanece en el fondo\ndel río con la boca abierta."
          pearl: "Es un Pokémon poco avispado.\nNo le importa chocarse de\ncabeza contra barcos o rocas."
        ko:
          diamond: "느긋한 성격이다.\n강바닥에서 입을 벌려 먹이가\n들어오는 것을 한결같이 기다린다."
          pearl: "둔감한 포켓몬이다.\n헤엄치다가 바위나 배에\n부딪혀도 신경쓰지 않는다."
