          pearl: "とくちょうてきな　せなかの　もようは\nすむ　ちいきによって　ちがうことが\nがくしゃの　けんきゅうで　わかった。"
        en:
          diamond: "A friendly Pokémon that captures\nthe subtle flows of seawater using\nits two antennae."
          pearl: "Scientists discovered that the\ndistinctive patterns on its back\ndiffer by region."
        fr:
          diamond: "Un Pokémon amical qui analyse\nles mouvements subtils de l’eau de\nmer grâce à ses deux antennes."
          pearl: "Les scientifiques ont découvert\nque les motifs sur son dos varient\nselon les régions."
        it:
          diamond: "Pokémon amichevole che con le\nantenne è in grado di avvertire\nanche minime correnti marine."
          pearl: "Gli scienziati hanno scoperto che i\nmotivi caratteristici del suo dorso\nvariano da regione a regione."
        de:
          diamond: "Ein freundliches PKMN, das mit\nseinen zwei Antennen die\nStrömungen des Meeres erkennt."
          pearl: "Wissenschaftler haben entdeckt,\ndass die Muster auf dem Rücken sich\nvon Region zu Region unterscheiden."
        es:
          diamond: "Un Pokémon amable que captura\nlos débiles flujos de agua marina\ncon sus dos antenas."
          pearl: "Los científicos descubrieron que\nel característico diseño de su\nespalda varía según la región."
        ko:
          diamond: "2개의 더듬이로 해수의\n미묘한 움직임을 포착한다.\n사람을 잘 따르는 포켓몬이다."
          pearl: "학자의 연구에 따르면\n등에 있는 특징적인 무늬는\n사는 지역에 따라 다르다고 한다."
