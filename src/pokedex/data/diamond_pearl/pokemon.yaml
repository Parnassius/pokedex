          pearl: "しょくしゅを　きのえだに　まきつけて\nうごかなければ　まるで　しょくぶつ。\nおおぐちを　あけて　えものを　まつ。"
        en:
          diamond: "It attracts prey with its sweet-\nsmelling saliva, then chomps down.\nIt takes a whole day to eat prey."
          pearl: "Hanging from branches using its\ntentacles, it looks like a plant.\nIt awaits prey, mouth wide open."
        fr:
          diamond: "Il attire sa proie avec sa salive\nodorante avant de la croquer. Il\nlui faut une journée pour l’avaler."
          pearl: "On dirait une plante, pendu aux\nbranches avec ses tentacules. Il\nattend sa proie la bouche ouverte."
        it:
          diamond: "Attira le prede con il dolce aroma\ndella saliva e poi le ingoia. Impiega\nun giorno per mangiare una preda."
          pearl: "Appeso ai rami con i tentacoli, può\nsembrare una pianta. Aspetta la\npreda con la bocca aperta."
        de:
          diamond: "Sein süßlich riechender Speichel\nzieht Beute an, die es frisst. Es\nbraucht einen Tag, sie zu fressen."
          pearl: "Es hängt mit seinen Tentakeln an\nÄsten u. wirkt wie eine Pflanze. Mit\noffenem Maul wartet es auf Beute."
        es:
          diamond: "Atrae a sus presas con saliva de\nolor dulce y las mastica. Tarda\ntodo un día en comérselas."
          pearl: "Se cuelga de las ramas con sus\ntentáculos y espera a sus\npresas con la boca abierta."
        ko:
          diamond: "달콤한 냄새의 타액으로 먹이를\n끌어들여 큰 턱으로 꿀꺽한다.\n하루에 걸쳐 먹이를 먹는다."
          pearl: "촉수를 나뭇가지에 휘감아서\n움직이지 않으면 마치 식물 같다.\n큰 입을 열어 먹이를 기다린다."
