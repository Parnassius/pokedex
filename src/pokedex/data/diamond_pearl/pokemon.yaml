          pearl: "ひとみが　きんいろに　ひかるとき\nカベの　むこうに　かくれている\nえものを　みつけることが　できる。"
        en:
          diamond: "It has eyes that can see through\nanything. It spots and captures\nprey hiding behind objects."
          pearl: "When its eyes gleam gold, it can\nspot hiding prey--even those\ntaking shelter behind a wall."
        fr:
          diamond: "Ses yeux voient à travers tout. Il\nrepère les proies cachées derrière\nun objet pour les capturer."
          pearl: "Quand ses yeux se dorent, il\npeut repérer une proie cachée,\nmême si elle est derrière un mur."
        it:
          diamond: "Vede attraverso qualsiasi cosa.\nIndividua e cattura le prede che\nsi nascondono dietro gli oggetti."
          pearl: "Se i suoi occhi sono dorati, può\nindividuare le prede, anche quelle\nche si nascondono dietro i muri."
        de:
          diamond: "Mit seinen Augen kann es durch\nalles hindurch sehen. So findet es\nauch Beute, die sich versteckt hat."
          pearl: "Leuchten seine Augen golden auf,\nkann es Beute, die sich versteckt,\nsehen. Es kann durch Wände sehen."
        es:
          diamond: "Sus ojos pueden ver a través\nde todo. Localiza a las presas\ndetrás de objetos y las captura."
          pearl: "Cuando sus ojos brillan como el\noro, puede ver presas escondidas,\nincluso detrás de un muro."
        ko:
          diamond: "모든 것을 투시해 버리는 눈을\n가지고 있다. 보이지 않는 곳에\n숨은 먹이를 찾아서 잡는다."
          pearl: "눈동자가 금색으로 빛날 때\n벽의 저편에 숨어 있는\n먹이를 찾아낼 수 있다."
