          pearl: "しょっかくを　ぶつけあって　ならす\nおとで　なかまと　かいわをする。\nねいろは　あきの　よの　ふうぶつし。"
        en:
          diamond: "It shakes its head back to front,\ncausing its antennae to hit each\nother and sound like a xylophone."
          pearl: "It chats with others using the\nsounds of its colliding antennae.\nThese sounds are fall hallmarks."
        fr:
          diamond: "Quand il bascule sa tête d’avant \nen arrière, ses antennes se\nheurtent dans un son de xylophone."
          pearl: "Il communique au son de ses\nantennes qui s’entrechoquent. Ce\nson marque l’arrivée de l’automne."
        it:
          diamond: "Muove la testa avanti e indietro\ne le antenne, scontrandosi, produ-\ncono un suono simile allo xilofono."
          pearl: "Comunica con il suono prodotto\ndallo scontro delle sue antenne.\nEsso indica l’arrivo dell’autunno."
        de:
          diamond: "Es schüttelt seinen Kopf, so dass\ndie beiden Antennen sich berühren\nund wie ein Xylophon klingen."
          pearl: "Diese PKMN unterhalten sich, indem\nsie ihre Antennen aneinanderschla-\ngen. Der Ton ist ihr Kennzeichen."
        es:
          diamond: "Al agitar la cabeza de atrás hacia\ndelante, sus antenas chocan\ny suenan como un xilófono."
          pearl: "Hablan entre sí chocando las\nantenas. Los sonidos producidos\nson muy característicos."
        ko:
          diamond: "머리를 전후로 흔들어\n더듬이를 서로 부딪치며\n실로폰 같은 소리를 낸다."
          pearl: "더듬이를 서로 부딪쳐 내는\n소리로 동료와 대화한다. 음색은\n가을 밤의 정취를 잘 나타낸다."
