        jp_kana:
          sword: "なんごくに　おおく　せいそくする。\nおどるとき　はなびらが　ふれあい\nここちよい　おとが　なりひびく。"
          shield: "ときおり　キレイハナが　あつまって\nおどるような　しぐさを　みせる。\nたいようをよぶ　ぎしき　といわれる。"
        jp_kanji:
          sword: "南国に　多く　生息する。\n踊るとき　花びらが　触れあい\n心地よい　音が　鳴り響く。"
          shield: "ときおり　キレイハナが　集まって\n踊るような　しぐさを　みせる。\n太陽を呼ぶ　儀式と　言われる。"
        en:
          sword: "Plentiful in the tropics. When it dances, its petals\nrub together and make a pleasant ringing sound."
          shield: "Bellossom gather at times and appear to dance.\nThey say that the dance is a ritual to summon\nthe sun."
        fr:
          sword: "Ce Pokémon vit en nombre dans les tropiques.\nQuand il danse, ses pétales frottent les uns\ncontre les autres et émettent un son mélodieux."
          shield: "Les Joliflor se réunissent parfois pour danser.\nOn pense que c’est un rituel pour invoquer\nle soleil."
        it:
          sword: "Molto comune ai tropici. Quando danza, i petali\nsfregano uno contro l’altro producendo un\npiacevole suono."
          shield: "A volte i Bellossom si riuniscono ed eseguono\nuna specie di danza. Si dice che sia un rito\nper invocare il sole."
        de:
          sword: "Es lebt in den Tropen. Beim Tanzen reiben seine\nBlüten aneinander und erzeugen ein wohliges\nGeräusch."
          shield: "Von Zeit zu Zeit kommen Blubella zusammen,\num zu tanzen. Man sagt, ihr Tanz sei ein Ritual,\num die Sonne herbeizurufen."
        es:
          sword: "Abunda en los trópicos. Al bailar, sus pétalos se\nrozan y emiten un agradable sonido."
          shield: "Los Bellossom se reúnen en ocasiones para\nejecutar una especie de danza, considerada\nun ritual para invocar al sol."
        ko:
          sword: "남국에 널리 분포하여 서식하고 있다.\n춤출 때 꽃잎끼리 서로 부딪혀서\n기분 좋은 소리가 울려 퍼진다."
          shield: "가끔 아르코가 모여서\n춤을 추는 듯한 동작을 한다.\n태양을 부르는 의식이라 전해진다."
        zh_simp:
          sword: "在南国大量生活着。\n跳舞时花瓣会互相碰触，\n发出悦耳的声音。"
          shield: "有时能看到美丽花聚在一起\n做着像是跳舞一样的动作。\n据说这是呼唤太阳的仪式。"
        zh_trad:
          sword: "在南國大量生活著。\n跳舞時花瓣會互相碰觸，\n發出悅耳的聲音。"
          shield: "有時美麗花們會聚在一起，\n做出像是跳舞的動作。\n據說這是呼喚太陽的儀式。"
