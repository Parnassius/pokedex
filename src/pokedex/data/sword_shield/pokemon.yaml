          shield: "ぜつめつした　こだいのポケモン。\n１０ぽんのあしで　みずを　かき\nただようように　およぐ。"
        jp_kanji:
          sword: "復元されたあと　逃げだしたり\n逃がしてしまう　ものが　いるため\n問題に　なりつつあるのだ。"
          shield: "絶滅した　古代のポケモン。\n１０本の脚で　水を　かき\n漂うように　泳ぐ。"
        en:
          sword: "Because some Omanyte manage to escape after\nbeing restored or are released into the wild by\npeople, this species is becoming a problem."
          shield: "This Pokémon is a member of an ancient, extinct\nspecies. Omanyte paddles through water with its\n10 tentacles, looking like it’s just drifting along."
        fr:
          sword: "Ce Pokémon commence à poser problème,\ncar certains spécimens se sont enfuis ou\nont été relâchés après avoir été ressuscités."
          shield: "Un Pokémon préhistorique aujourd’hui disparu.\nIl semble flotter lorsqu’il nage en brassant l’eau\navec ses dix tentacules."
        it:
          sword: "Questo Pokémon si sta rivelando un problema\nperché a volte fugge o viene liberato dopo\nessere stato rigenerato."
          shield: "È un antico Pokémon ormai estinto. Quando\nnuota usando i suoi dieci tentacoli sembra\nfluttuare nell’acqua."
        de:
          sword: "Diese Pokémon entwickeln sich allmählich zu\neinem Problem, da einige wiederbelebte\nExemplare fliehen oder freigelassen werden."
          shield: "Ein einst ausgestorbenes Urzeit-Pokémon. Wenn\nes mit seinen zehn Tentakeln paddelnd durch das\nWasser gleitet, meint man, es würde schweben."
        es:
          sword: "Varios ejemplares han escapado o bien han sido\nliberados tras su restauración, lo que comienza a\nsuscitar una serie de problemas."
          shield: "Un Pokémon de la era prehistórica, ahora\nextinto. Solía nadar moviendo sus diez tentáculos\npara desplazarse por el agua como si flotara."
        ko:
          sword: "복원된 후 도망치거나\n놓쳐버리는 경우가 생겨서\n문제시되고 있다."
          shield: "멸종한 고대의 포켓몬이다.\n10개의 다리로 물을 가르며\n떠다니듯 헤엄친다."
        zh_simp:
          sword: "从化石被复原后有些逃了出去，\n有些则被人放走。这些散逸在外\n的菊石兽越来越成问题了。"
          shield: "已经灭绝的古代宝可梦。\n依靠１０只脚来划水，\n在水中轻盈地游曳。"
        zh_trad:
          sword: "從化石復原後有些菊石獸\n會逃走，有些則被放生。\n近來這個問題越來越明顯。"
          shield: "一度滅絕的古代寶可夢。\n會使用１０隻腳划水，\n在水中一漂一浮地游動。"
