      descriptions:
        jp_kana:
          sword: "かなしみを　のりこえて　たくましく\nしんかした。　ホネを　ぶきにして\nゆうかんに　てきと　わたりあう。"
          shield: "しんかして　かぶっていた　ははおやの\nホネが　いったいかして　そのうえ\nきょうぼうな　せいかくに　かわった。"
        jp_kanji:
          sword: "悲しみを　乗りこえて　たくましく\n進化した。　骨を　武器にして\n勇敢に　敵と　渡り合う。"
          shield: "進化して　被っていた　母親の　骨が\n一体化して　そのうえ\n凶暴な　性格に　変わった。"
        en:
          sword: "This Pokémon overcame its sorrow to evolve a\nsturdy new body. Marowak faces its opponents\nbravely, using a bone as a weapon."
          shield: "When this Pokémon evolved, the skull of its\nmother fused to it. Marowak’s temperament also\nturned vicious at the same time."
        fr:
          sword: "Il s’est endurci et a évolué depuis qu’il a réussi\nà surmonter sa peine. Il utilise son os en guise\nd’arme et affronte ses ennemis avec bravoure."
          shield: "En évoluant, il est devenu violent, et le crâne\nde sa mère qu’il portait a fusionné avec sa tête."
        it:
          sword: "Si è evoluto dopo essersi temprato e aver\nsuperato il lutto. Usa l’osso come un’arma\ne lotta valorosamente contro i nemici."
          shield: "Evolvendosi è diventato tutt’uno con il teschio\ndella madre che prima indossava e ha acquisito\nun temperamento violento."
        de:
          sword: "Als es seine Trauer überwand, entwickelte es sich\nund wurde stärker. Mit seinem Knochen als Waffe\nstellt sich Knogga mutig seinen Feinden."
          shield: "Durch die Entwicklung wurde der Schädel seiner\nMutter, den es stets trug, zu einem Teil von ihm\nund es bekam einen aggressiven Charakter."
        es:
          sword: "Ha evolucionado tras fortalecerse y superar\nsu pena. Ahora lucha con arrojo blandiendo\nsu hueso a modo de arma."
          shield: "Al evolucionar, se ha fusionado con el cráneo de\nsu madre y, además, ha adquirido un carácter\nagresivo."
        ko:
          sword: "슬픔을 극복하고 늠름하게\n진화했다. 뼈를 무기 삼아\n용감하게 적과 맞서 싸운다."
          shield: "진화로 인해 쓰고 있던\n어미의 뼈는 일체화되었고\n성격은 더욱 난폭해졌다."
        zh_simp:
          sword: "摆脱悲伤后，进化得\n更加强壮。以骨头为武器，\n勇敢地与敌人进行交锋。"
          shield: "进化后，与原本戴在头上的\n母亲头骨完全融为一体，\n而且性格也变得十分凶暴。"
        zh_trad:
          sword: "克服了傷痛後進化得\n更強更壯。會把骨頭當作\n武器，勇敢地與敵人交鋒。"
          shield: "進化時，原本戴在頭上的母親\n頭骨化為了牠身體的一部份。\n不但如此，性格也變得很凶暴。"
    marowak_alolan_form:
