          sword: "ゴムまりのように　はずむ　しっぽの\nたまには　せいちょうに　ひつような\nえいようが　たっぷり　つまっている。"
          shield: "おとなしい　ポケモンだが　おこると\nしっぽの　おおきな　たまを　ぶんぶん\nふりまわして　たたきつけてくるぞ。"
        jp_kanji:
          sword: "ゴムまりのように　弾む　しっぽの\n玉には　成長に　必要な　栄養が\nたっぷり　詰まっている。"
          shield: "おとなしい　ポケモンだが　怒ると\nしっぽの　大きな　玉を　ぶんぶん\n振りまわして　叩きつけてくるぞ。"
        en:
          sword: "The ball on Azurill’s tail bounces like a rubber\nball, and it’s full of the nutrients the Pokémon\nneeds to grow."
          shield: "Although Azurill are normally docile, an angry\none will swing around the big ball on its tail and\ntry to smash its opponents."
        fr:
          sword: "La boule située au bout de sa queue rebondit\ntelle une balle de caoutchouc. Elle regorge des\nnutriments nécessaires à la croissance d’Azurill."
          shield: "C’est un Pokémon docile, mais si on l’énerve,\nil n’hésite pas à frapper en faisant tournoyer\nla grosse boule au bout de sa queue."
        it:
          sword: "Nella sfera all’estremità della coda, che rimbalza\ncome una palla, sono conservate le sostanze\nnutritive necessarie per la crescita del Pokémon."
          shield: "È un Pokémon docile, ma se si arrabbia attacca\nagitando la grossa palla che ha sulla coda."
        de:
          sword: "Die Kugel an seinem Schweif kann wie ein\nGummiball hüpfen und steckt voller Nährstoffe,\ndie Azurill zum Wachsen braucht."
          shield: "Dieses Pokémon ist zwar sanftmütig, doch wenn\nes wütend wird, schwingt es die große Kugel an\nseinem Schweif und schlägt damit zu."
        es:
          sword: "La bola que tiene en la cola rebota como una\npelota de goma y está repleta de los nutrientes\nque este Pokémon necesita para crecer."
          shield: "Es un Pokémon tranquilo, pero, si se le hace\nenfadar, atacará utilizando la enorme bola que\ntiene en la cola."
        ko:
          sword: "고무공처럼 튀는 꼬리의 구슬에는\n성장에 필요한 영양분이\n가득 들어 있다."
          shield: "얌전한 포켓몬이지만\n화가 나면 꼬리의 큰 공을 붕붕\n휘두르다 세차게 내리친다."
        zh_simp:
          sword: "球形的尾巴拥有如同\n橡胶球一般的弹性，里面\n贮满了它成长所需的营养。"
          shield: "虽然是种性情温顺的宝可梦，\n但生起气来，便会嗖嗖地挥舞起\n尾巴上的大球来猛烈击打对手。"
        zh_trad:
          sword: "尾巴的球狀部分能像皮球\n那樣彈跳，裡面滿滿都是\n牠在成長時所需的營養。"
          shield: "雖然是個性溫順的寶可夢，\n但生氣時就會大力揮甩\n尾巴上的大球來擊打對手。"
