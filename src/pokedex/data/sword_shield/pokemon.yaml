        jp_kana:
          sword: "ぶじんと　よばれる　ポケモン。\nなにかを　まもるためで　なければ\nひじの　かたなは　つかわない。"
          shield: "たすけを　もとめる　かんじょうを\nびんかんに　キャッチ。　あいての\nもとへ　はせさんじ　かせいするぞ。"
        jp_kanji:
          sword: "武人と　呼ばれる　ポケモン。\nなにかを　守るためで　なければ\n肘の　刀は　使わない。"
          shield: "助けを　求める　感情を\n敏感に　キャッチ。　相手の\nもとへ　馳せ参じ　加勢するぞ。"
        en:
          sword: "True to its honorable-warrior image, it uses\nthe blades on its elbows only in defense of\nsomething or someone."
          shield: "Sharply attuned to others’ wishes for help, this\nPokémon seeks out those in need and aids them\nin battle."
        fr:
          sword: "Ce Pokémon, que l’on surnomme « l’escrimeur »,\nne se sert de ses coudes en forme de lames\nque s’il doit défendre quelque chose."
          shield: "Ses sens aiguisés lui indiquent lorsque quelqu’un\nest en danger. Il accourt alors à la rescousse."
        it:
          sword: "Viene soprannominato “il guerriero”. Si serve\ndelle lame sui gomiti solo a scopo difensivo."
          shield: "È in grado di captare con estrema sensibilità\nlo stato d’animo di chi si trova nei guai e può\ncosì accorrere subito in suo aiuto."
        de:
          sword: "Dieses Pokémon wird als Krieger angesehen.\nDie Klingen an seinen Ellbogen benutzt es nur,\num etwas zu beschützen."
          shield: "Es spürt sofort, wenn jemand in Not ist, und eilt\nihm unverzüglich zu Hilfe."
        es:
          sword: "Este Pokémon es considerado todo un justiciero.\nSolo utiliza las espadas que le salen de los codos\nsi tiene una causa que defender."
          shield: "Es capaz de percibir al instante cuando alguien\nestá en un aprieto y corre raudo a su lado para\nprestarle ayuda."
        ko:
          sword: "무사라 불리는 포켓몬.\n무언가를 지킬 때가 아니면\n팔꿈치의 칼날을 사용하지 않는다."
          shield: "도움을 구하는 감정을 민감하게\n캐치해서 상대가 있는 곳으로\n급히 달려가 가세한다."
        zh_simp:
          sword: "被称为武神的宝可梦。\n只有在为了保护什么的时候\n才会去使用自己的肘刀。"
          shield: "能够敏锐地感知到\n寻求帮助的感情，\n并且火速赶去援助对方。"
        zh_trad:
          sword: "被稱為武神的寶可夢。\n只有在為了保護什麼的時候，\n才會去使用自己的肘刀。"
          shield: "能夠敏銳地感知到\n尋求幫助的感情，\n並且火速趕去援助對方。"
dusknoir:
  species_id: 477
  names:
    jp_kana: ヨノワール
    jp_kanji: ヨノワール
    en: Dusknoir
    fr: Noctunoir
    it: Dusknoir
    de: Zwirrfinst
    es: Dusknoir
    ko: 야느와르몽
    zh_simp: 黑夜魔灵
    zh_trad: 黑夜魔靈
  forms:
    dusknoir:
      form_id: 0
      base_stats:
        hp: 45
        attack: 100
        defense: 135
        special_attack: 65
        special_defense: 135
        speed: 45
      evs_yield:
        hp: 0
        attack: 0
        defense: 1
        special_attack: 0
        special_defense: 2
        speed: 0
      types:
        - ghost
      egg_groups:
        - amorphous
      abilities:
        - pressure
      hidden_ability: frisk
      held_items:
        rare: spell_tag
      descriptions:
        jp_kana:
          sword: "いしが　あるのか　わかっていない。\nれいかいからの　でんぱに　したがい\nひとや　ポケモンを　つれさるのだ。"
          shield: "ねらった　あいてを　はらのくちで\nまるのみ。　たましいだけを　くい\nにくたいは　はきだし　さっていく。"
        jp_kanji:
          sword: "意思が　あるのか　わかっていない。\n霊界からの　電波に　従い\n人や　ポケモンを　連れ去るのだ。"
          shield: "狙った　相手を　腹の口で\n丸飲み。　魂だけを　食い\n肉体は　吐き出し　去っていく。"
        en:
          sword: "At the bidding of transmissions from the spirit\nworld, it steals people and Pokémon away.\nNo one knows whether it has a will of its own."
          shield: "With the mouth on its belly, Dusknoir swallows its\ntarget whole. The soul is the only thing eaten—\nDusknoir disgorges the body before departing."
        fr:
          sword: "Nul ne sait s’il est doté d’une volonté propre.\nLes ondes du monde des esprits le poussent\nà conduire humains et Pokémon vers l’au-delà."
          shield: "Il dévore l’âme de ses ennemis en les\nengloutissant dans sa bouche ventrale.\nIl recrache ensuite leur enveloppe corporelle."
        it:
          sword: "Non si sa se abbia una volontà propria. Segue le\nonde che provengono dal mondo degli spiriti e\nvi conduce persone e Pokémon."
          shield: "Divora la preda in un boccone con la bocca che\nha sulla pancia, si nutre del suo spirito e ne sputa\nfuori il corpo."
        de:
          sword: "Niemand weiß, ob es einen eigenen Willen hat.\nÜber Radiowellen empfängt es Befehle aus dem\nJenseits, Menschen und Pokémon zu entführen."
          shield: "Es verschluckt Beute im Ganzen mit dem Maul\nan seinem Bauch, verspeist aber nur ihre Seele.\nDen Körper spuckt es wieder aus."
        es:
          sword: "Se desconoce si posee voluntad propia. Capta\nondas de otra dimensión que le incitan a llevarse\nallí a humanos y Pokémon."
          shield: "Engulle a los rivales con la boca del estómago y,\ntras haber devorado el alma, escupe el cuerpo."
        ko:
          sword: "의지가 있는 것인지 알 수 없다.\n영계로부터의 전파에 따라\n사람이나 포켓몬을 데리고 간다."
          shield: "노린 상대를 배의 입으로\n통째로 삼킨다. 영혼만 먹은 뒤\n육체는 뱉어내고 떠난다."
        zh_simp:
          sword: "没人知道它是否拥有意识。\n会从来自灵界的电波中接受指示，\n将人和宝可梦带走。"
          shield: "用腹部的嘴将猎物整个吞下。\n只会吃掉对方的魂魄，\n离去时会把肉体吐出来。"
        zh_trad:
          sword: "沒人知道牠是否擁有意識。\n會從來自靈界的電波中接受指示，\n將人和寶可夢帶走。"
          shield: "用腹部的嘴將獵物整個吞下。\n只會吃掉對方的魂魄，\n離去時會把肉體吐出來。"
froslass:
  species_id: 478
  names:
    jp_kana: ユキメノコ
    jp_kanji: ユキメノコ
    en: Froslass
    fr: Momartik
    it: Froslass
    de: Frosdedje
    es: Froslass
    ko: 눈여아
    zh_simp: 雪妖女
    zh_trad: 雪妖女
  forms:
    froslass:
      form_id: 0
      base_stats:
        hp: 70
        attack: 80
        defense: 70
        special_attack: 80
        special_defense: 70
        speed: 110
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 2
      types:
        - ice
        - ghost
      egg_groups:
        - fairy
        - mineral
      abilities:
        - snow_cloak
      hidden_ability: cursed_body
      descriptions:
        jp_kana:
          sword: "ゆきやまで　なくなった　おんなの\nむねんから　うまれた　ポケモン。\nこおらせた　たましいが　こうぶつ。"
          shield: "マイナス５０どの　れいきを　はき\nこおらせた　えものを　すみかに\nもちかえり　きれいに　ならべる。"
        jp_kanji:
          sword: "雪山で　亡くなった　女の\n無念から　生まれた　ポケモン。\n凍らせた　魂が　好物。"
          shield: "マイナス５０度の　冷気を　吐き\n凍らせた　獲物を　すみかに\n持ち帰り　きれいに　並べる。"
        en:
          sword: "After a woman met her end on a snowy mountain,\nher regrets lingered on. From them, this Pokémon\nwas born. Its favorite food is frozen souls."
          shield: "It spits out cold air of nearly −60 degrees\nFahrenheit to freeze its quarry. It brings frozen\nprey back to its lair and neatly lines them up."
        fr:
          sword: "Ce Pokémon est né des regrets d’une femme\ndisparue dans les pics enneigés.\nIl raffole des âmes gelées."
          shield: "Il gèle ses proies avec son souffle à - 50 °C,\nles amène dans son antre, puis les y aligne\navec soin."
        it:
          sword: "Pokémon nato dal rammarico di una donna\nscomparsa tra le montagne innevate. Si nutre di\nspiriti congelati."
          shield: "Congela le prede con un alito glaciale a -50 ºC,\npoi le porta nella sua tana e le allinea con cura."
        de:
          sword: "Es ist aus dem Gram einer Frau entstanden, die\nauf schneebedeckten Bergen umgekommen ist.\nAm liebsten isst es gefrorene Seelen."
          shield: "Es friert seine Beute mit -50 ºC kalter Luft ein,\nnimmt sie dann in seinen Unterschlupf mit und\nreiht sie dort fein säuberlich auf."
        es:
          sword: "Nació del resentimiento de mujeres fallecidas en\nmontañas nevadas. Su manjar predilecto son las\nalmas congeladas."
          shield: "Expulsa un vaho gélido a -50 °C con el que\ncongela a sus presas para luego llevarlas a su\nmorada y colocarlas como adorno."
        ko:
          sword: "설산에서 죽은 여자의\n원념에서 태어난 포켓몬.\n얼린 영혼을 즐겨 먹는다."
          shield: "마이너스 50도의 냉기를 뿜어\n먹이를 얼린 뒤 거처로\n가져가서 가지런히 나열한다."
        zh_simp:
          sword: "从在雪山遇难的女性的\n遗恨让这宝可梦诞生。\n它最喜欢冻成冰的灵魂。"
          shield: "会吐出零下５０度的冷气\n冻住猎物，并把它们带回\n自己的巢穴，整齐地摆成一排。"
        zh_trad:
          sword: "在雪山中遇難的女性的\n遺恨讓這隻寶可夢誕生。\n牠最喜歡凍成冰的靈魂。"
          shield: "會吐出零下５０度的冷氣\n凍住獵物，並把牠們帶回\n自己的巢穴，整齊地擺成一排。"
