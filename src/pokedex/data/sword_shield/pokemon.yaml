          shield: "くうきちゅうの　マイナスイオンを\nすいこんで　やく１００００ボルトの\nでんきを　はきだすことができる。"
        jp_kanji:
          sword: "怒ったり　驚いたりすると\n全身の　毛が　針の　ように\n逆立って　相手を　つらぬく。"
          shield: "空気中の　マイナスイオンを\n吸いこんで　約１００００ボルトの\n電気を　吐き出すことがある。"
        en:
          sword: "If it is angered or startled, the fur all over its\nbody bristles like sharp needles that pierce foes."
          shield: "It accumulates negative ions in the atmosphere to\nblast out 10,000-volt lightning bolts."
        fr:
          sword: "S’il est irrité ou surpris, toute la fourrure\nde son corps se dresse comme des aiguilles\npour percer ses ennemis."
          shield: "Il se charge d’ions négatifs contenus dans l’air\npour envoyer des décharges d’environ\n10 000 volts."
        it:
          sword: "Se si arrabbia o è sorpreso, tutti i peli del corpo\ngli si rizzano trasformandosi in aghi che infilzano\nil nemico."
          shield: "Accumula gli ioni negativi presenti nell’atmosfera\nper lanciare scariche elettriche da 10.000 volt."
        de:
          sword: "Wenn es erschrickt oder wütend wird, stellt sich\nsein Fell auf wie scharfe Nadeln und sticht den\nGegner."
          shield: "Dieses Pokémon entzieht der Atmosphäre Ionen\nund kann dann Blitze von 10 000 V Stärke aus\nseinem Maul abfeuern."
        es:
          sword: "Si se enfada o asusta, se le eriza el pelaje. Cada\nuno de sus pelos se convierte en una afilada púa\nque hace trizas al rival."
          shield: "Acumula iones negativos de la atmósfera para\nlanzar rayos de 10 000 V de potencia."
        ko:
          sword: "화가 나거나 놀라면\n전신의 털이 바늘처럼\n곤두서서 상대를 꿰뚫는다."
          shield: "공기 중의 마이너스 이온을\n빨아들여 약 10000볼트의\n전기를 내뱉을 수 있다."
        zh_simp:
          sword: "当雷伊布生气或是吃惊时，\n它全身的体毛会像针一样\n竖起来刺穿对手。"
          shield: "能够吸入空气中的负离子，\n有时会吐出大约有\n１００００伏特的高压电。"
        zh_trad:
          sword: "當雷伊布生氣或是吃驚時，\n牠全身的體毛會像針一樣\n豎起來刺穿對手。"
          shield: "有時會吸入空氣中\n的負離子，吐出大約\n１００００伏特的高壓電。"
