        - swift_swim
        - hydration
      hidden_ability: water_absorb
      descriptions:
        jp_kana:
          sword: "ずつうを　おこすほどの　おんぱで\nえものを　じゅうぶん　よわらせて\nネバネバした　ベロで　からめとる。"
          shield: "きれいな　こえで　なくこともある。\nからだの　とっきが　おおきいほど\nひろい　おんいきで　なけるのだ。"
        jp_kanji:
          sword: "頭痛を　起こすほどの　音波で\n獲物を　じゅうぶん　弱らせて\nネバネバした　ベロで　絡めとる。"
          shield: "きれいな　声で　鳴くこともある。\n体の　突起が　大きいほど\n広い　音域で　鳴けるのだ。"
        en:
          sword: "It weakens its prey with sound waves intense\nenough to cause headaches, then entangles\nthem with its sticky tongue."
          shield: "On occasion, their cries are sublimely pleasing to\nthe ear. Palpitoad with larger lumps on their\nbodies can sing with a wider range of sounds."
        fr:
          sword: "Il affaiblit ses proies en émettant des ondes\nsi fortes qu’elles leur donnent la migraine.\nEnsuite, il les saisit avec sa langue gluante."
          shield: "Il lui arrive de pousser des cris ravissants.\nPlus ses protubérances sont grosses,\nplus le son porte loin."
        it:
          sword: "Indebolisce la preda con onde sonore in grado\ndi causare emicranie e poi la cattura con la sua\nlingua appiccicosa."
          shield: "A volte emette un canto di notevole bellezza.\nPiù grandi sono i bernoccoli che ha sul corpo,\npiù ampio è il registro dei suoni che produce."
        de:
          sword: "Es schwächt seine Beute mit Kopfschmerzen\nerregenden Schallwellen und umschlingt\nsie anschließend mit seiner klebrigen Zunge."
          shield: "Gelegentlich singt es sehr schön. Je größer die\nFortsätze an seinem Körper ausgebildet sind,\ndesto ausgeprägter fällt sein Stimmumfang aus."
        es:
          sword: "Las ondas sonoras que emite pueden provocar\ndolor de cabeza. Con ellas debilita a sus presas\npara luego atraparlas con su lengua viscosa."
          shield: "A veces emiten un bello canto. Cuanto mayores\nson las protuberancias del cuerpo, más extenso\nes su registro vocal."
        ko:
          sword: "두통을 일으킬 정도의 음파로\n먹이를 충분히 약하게 만든 뒤\n끈적끈적한 혀로 포박한다."
          shield: "고운 목소리로 울 때도 있다.\n몸의 돌기가 클수록\n넓은 음역으로 울 수 있다."
        zh_simp:
          sword: "通过发出足以造成头痛的\n音波来充分削弱猎物之后，\n用黏糊糊的舌头将其捉住。"
          shield: "有时也会发出悦耳的叫声。\n身上突起物越大的蓝蟾蜍\n越能在更广的音域来鸣叫。"
        zh_trad:
          sword: "透過發出足以造成頭痛的\n音波來充分削弱獵物之後，\n用黏糊糊的舌頭將其捉住。"
          shield: "有時也會發出悅耳的叫聲。\n身上突起物越大的藍蟾蜍\n越能以更廣的音域來鳴叫。"
seismitoad:
