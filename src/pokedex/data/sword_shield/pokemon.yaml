      descriptions:
        jp_kana:
          sword: "せなかの　ながい　けで　かみなりや\nでんきポケモンの　でんげきを　うけて\nでんきぶくろに　じゅうでんする。"
          shield: "ピンチになると　からだを　まるめて\nせなかの　とげとげを　さかだてると\nでたらめに　でんげきを　うちまくる。"
        jp_kanji:
          sword: "背中の　長い　毛で　雷や\nでんきポケモンの　電撃を　受けて\n電気袋に　充電する。"
          shield: "ピンチになると　体を　丸めて\n背中の　とげとげを　逆立てると\nでたらめに　電撃を　撃ちまくる。"
        en:
          sword: "With the long hairs on its back, this Pokémon\ntakes in electricity from other electric Pokémon.\nIt stores what it absorbs in an electric sac."
          shield: "When it’s in trouble, it curls up into a ball, makes\nits fur spikes stand on end, and then discharges\nelectricity indiscriminately."
        fr:
          sword: "Grâce à sa longue épine dorsale, il capte\nle tonnerre et les attaques des Pokémon Électrik,\npuis stocke leur courant dans sa poche électrique."
          shield: "En cas de danger, il se roule en boule,\ndresse ses épines dorsales et lance\ndes décharges électriques au hasard."
        it:
          sword: "Si serve della lunga spina che ha sulla schiena\nper attirare e incamerare l’energia elettrica\ndei fulmini e dei Pokémon di tipo Elettro."
          shield: "In caso di pericolo si appallottola, drizza\nle spine sulla schiena e scarica energia elettrica\nall’impazzata."
        de:
          sword: "Der Schweif an seinem Rücken absorbiert Blitze\nund Angriffe von Elektro-Pokémon. Es speichert\nden so gewonnenen Strom in Elektrotaschen."
          shield: "Bei Gefahr rollt es sich zusammen, stellt seine\nRückenstacheln auf und schießt willkürlich mit\nElektrizität um sich."
        es:
          sword: "Utiliza el apéndice de la cabeza para absorber\nlos rayos o los ataques de los Pokémon de tipo\nEléctrico para recargar su bolsa."
          shield: "Cuando se encuentra en peligro, se hace una\nbola, eriza las púas del lomo y propina descargas\neléctricas a diestro y siniestro."
        ko:
          sword: "등에 난 긴 털로 번개나\n전기포켓몬의 전격을 받아\n전기 주머니에 충전한다."
          shield: "위기에 처하면 몸을 둥글게 말고\n등의 가시를 곤두세워\n마구잡이로 전격을 쏘아댄다."
        zh_simp:
          sword: "用背上的长毛来接收\n闪电和电气宝可梦释放的电击，\n然后将之储存在电囊中。"
          shield: "在危急时刻会把身体卷成一团，\n倒竖起背上的尖刺，\n不分青红皂白地发出电击。"
        zh_trad:
          sword: "用背上的長毛來接收\n閃電和電氣寶可夢釋放的電擊，\n然後將之儲存在電囊中。"
          shield: "在危急時刻會把身體捲成一團、\n倒豎起背上的尖刺，\n不分青紅皂白地發出電擊。"
