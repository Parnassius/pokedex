          sword: "ほとんど　うごかず　なきもせず\nじっとするのは　かこと　みらいを\nみているからだと　しんじられている。"
          shield: "かこと　みらいを　みとおせる。\nまいにち　たいようの　うごきを\nみつづけている　ふしぎな　ポケモン。"
        jp_kanji:
          sword: "ほとんど　動かず　鳴きもせず\nじっとするのは　過去と　未来を\n見ているからだと　信じられている。"
          shield: "過去と　未来を　見通せる。\n毎日　太陽の　動きを\n見続けている　不思議な　ポケモン。"
        en:
          sword: "They say that it stays still and quiet because it is\nseeing both the past and future at the same time."
          shield: "This odd Pokémon can see both the past and\nthe future. It eyes the sun’s movement all day."
        fr:
          sword: "On dit qu’il reste immobile et silencieux parce\nqu’il observe simultanément le passé et le futur."
          shield: "Capable de voir le passé et l’avenir, ce Pokémon\nmystérieux consacre toutes ses journées\nà observer la course du soleil."
        it:
          sword: "Si dice che se ne stia immobile e in silenzio\nperché sta osservando passato e futuro allo\nstesso tempo."
          shield: "Pokémon enigmatico che vede il passato e\nprevede il futuro osservando il sole tutto\nil giorno."
        de:
          sword: "Man sagt, es sei so still und in sich gekehrt,\nweil es die Zukunft und die Vergangenheit\nparallel sieht."
          shield: "Dieses kuriose Pokémon kann die Vergangenheit\nund die Zukunft sehen. Es beobachtet täglich den\nLauf der Sonne."
        es:
          sword: "Dicen que se mantiene prácticamente inmóvil y\nen silencio porque observa el pasado y el futuro\nal mismo tiempo."
          shield: "Este extraño Pokémon puede ver el pasado y el\nfuturo. Se pasa el día mirando al sol."
        ko:
          sword: "움직이거나 울음소리를 내지 않고\n가만히 있는 것은 과거와 미래를\n보고 있기 때문이라고 여겨진다."
          shield: "과거와 미래를 내다볼 수 있다.\n매일 태양의 움직임을\n관찰하는 이상한 포켓몬이다."
        zh_simp:
          sword: "人们相信它之所以会几乎一动不动，\n也不鸣叫，就那么呆着，\n是因为它在注视着过去和未来。"
          shield: "能够看穿过去和未来。\n日复一日注视着太阳\n动向的奇异宝可梦。"
        zh_trad:
          sword: "人們相信牠之所以幾乎\n不動也不叫地靜靜待著，\n是因為牠正注視著過去和未來。"
          shield: "能夠看穿過去和未來。\n日復一日注視著太陽\n動向的奇異寶可夢。"
bellossom:
