      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - rock
        - ground
      egg_groups:
        - monster
      abilities:
        - guts
      hidden_ability: sand_veil
      descriptions:
        jp_kana:
          sword: "ちてい　おくふかくで　うまれる。\nまわりの　つちを　たいらげると\nちじょうに　あらわれ　サナギになる。"
          shield: "つちを　たべて　いきている。\nおおきな　やまひとつ　たべおわると\nせいちょうのため　ねむりはじめる。"
        jp_kanji:
          sword: "地底　奥深くで　生まれる。\nまわりの　土を　たいらげると\n地上に　現われ　サナギになる。"
          shield: "土を　食べて　生きている。\n大きな　山ひとつ　食べ終わると\n成長のため　眠りはじめる。"
        en:
          sword: "Born deep underground, it comes\naboveground and becomes a pupa once it\nhas finished eating the surrounding soil."
          shield: "It feeds on soil. After it has eaten a large\nmountain, it will fall asleep so it can grow."
        fr:
          sword: "Il naît dans les profondeurs du sol.\nAprès avoir englouti toute la terre qui l’entoure,\nil fait surface et se change en chrysalide."
          shield: "Il vit en se nourrissant de terre.\nAprès avoir dévoré une montagne, il s’endort\net entame sa croissance."
        it:
          sword: "Nasce nelle profondità del sottosuolo.\nDopo aver divorato la terra circostante\nemerge in superficie e diventa crisalide."
          shield: "Si nutre di terra. Dopo aver divorato una\nmontagna intera, si addormenta per poter\ncrescere."
        de:
          sword: "Sie schlüpfen tief unter der Erde und fressen sich\ndurch das Erdreich bis zur Oberfläche durch,\nwo sie sich verpuppen."
          shield: "Es ernährt sich von Erde. Nachdem es einen Berg\nverspeist hat, schläft es ein, um zu wachsen."
        es:
          sword: "Nace en el subsuelo a gran profundidad. Tras\ningerir la tierra que lo rodea, emerge a la\nsuperficie y se convierte en pupa."
          shield: "Se alimenta de tierra. Después de devorar el\nequivalente a una montaña, se duerme y empieza\na crecer."
        ko:
          sword: "땅속 깊은 곳에서 태어난다.\n주변의 흙을 다 먹으면\n지상으로 올라와 번데기가 된다."
          shield: "흙을 먹으며 살고 있다.\n큰 산 하나를 다 먹으면\n성장을 위해 잠자기 시작한다."
        zh_simp:
          sword: "诞生于地底深处。\n把周围的土都吃光后，\n就会出现在地上变成蛹。"
          shield: "以吃土为生。\n吃掉一座大山后，\n就会为了成长而开始沉睡。"
        zh_trad:
          sword: "誕生於地底深處。\n把周圍的泥土都吃光後，\n就會出現在地上變成蛹。"
          shield: "靠吃泥土維生。\n吃掉一座大山後，\n就會為了成長而開始沉睡。"
