        jp_kana:
          sword: "オレンジいろの　けっしょうが\nひかりだしたら　きをつけろ。\nエネルギーを　うちだしてくるぞ。"
          shield: "おとで　まわりの　ようすを　さぐる。\nおこらせると　からだの　むきを\nかえないまま　おってくる。"
        jp_kanji:
          sword: "オレンジ色の　結晶が\n光りだしたら　気をつけろ。\nエネルギーを　撃ちだしてくるぞ。"
          shield: "音で　まわりの　様子を　探る。\n怒らせると　体の　向きを\n変えないまま　追ってくる。"
        en:
          sword: "If you see its orange crystals start to glow, be\nwary. It’s about to fire off bursts of energy."
          shield: "It relies on sound in order to monitor what’s in its\nvicinity. When angered, it will attack without ever\nchanging the direction it’s facing."
        fr:
          sword: "Mieux vaut rester sur ses gardes quand ses cristaux\norange se mettent à briller, car cela indique\nqu’il va déchaîner son énergie pour frapper."
          shield: "Il sonde les environs grâce au son. Lorsqu’un\nimportun le met en colère, il se lance à sa\npoursuite sans changer l’orientation de son corps."
        it:
          sword: "Quando i cristalli arancioni cominciano a brillare,\nè bene fare attenzione perché è segno che\nil Pokémon sta per emettere energia."
          shield: "Perlustra la zona intorno a sé servendosi dei\nrumori. Se irritato, insegue chi lo ha importunato\nsenza cambiare orientamento del corpo."
        de:
          sword: "Wenn die orangen Kristalle anfangen zu leuchten,\nist Vorsicht vor spontanen Energieentladungen\ngeboten."
          shield: "Es nimmt die Umgebung über akustische Reize\nwahr. Ärgerliche Störenfriede kann es verfolgen,\nohne sich ihnen zuwenden zu müssen."
        es:
          sword: "Cuando sus cristales anaranjados comienzan a\nbrillar, conviene tener cuidado, pues es señal de\nque está a punto de liberar energía."
          shield: "Se vale del sonido para percibir el entorno. Si\nalguien despierta su ira, lo perseguirá sin cambiar\nla orientación del cuerpo."
        ko:
          sword: "오렌지색 결정이\n빛나기 시작하면 조심해야 한다.\n에너지를 쏘아대기 때문이다."
          shield: "소리로 주위 상황을 살핀다.\n화나게 하면 몸의 방향을\n바꾸지 않은 채로 쫓아온다."
        zh_simp:
          sword: "橙色的结晶开始发光的时候，\n一定特别小心，因为它\n马上就会射出能量。"
          shield: "通过声音来探测四周。\n要是惹它生气了，它会连\n身体方向也不转就朝你追来。"
        zh_trad:
          sword: "橘色的結晶開始發光的時候，\n一定要特別小心，因為牠\n馬上就會射出能量。"
          shield: "透過聲音來探測四周。\n要是惹牠生氣了，牠會連\n身體方向也不轉就朝你追來。"
