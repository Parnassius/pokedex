          shield: "ちじょう　１４００メートル　まで\nハネを　つかって　とぶことができる。\nこうねつの　ほのおを　はく。"
        jp_kanji:
          sword: "岩石も　焼けるような\n灼熱の　炎を　吐いて\n山火事を　起こすことが　ある。"
          shield: "地上　１４００メートル　まで\n羽を　使って　飛ぶことができる。\n高熱の　炎を　吐く。"
        en:
          sword: "It spits fire that is hot enough to melt boulders.\nIt may cause forest fires by blowing flames."
          shield: "Its wings can carry this Pokémon close to an\naltitude of 4,600 feet. It blows out fire at very\nhigh temperatures."
        fr:
          sword: "Son souffle brûlant peut faire fondre la roche.\nIl est parfois la cause d’incendies de forêt."
          shield: "Ses ailes lui permettent de voler à plus de\n1 400 m d’altitude. Ce Pokémon crache du feu\nà des températures très élevées."
        it:
          sword: "Sputa fiamme incandescenti in grado di fondere\nle rocce. A volte causa incendi boschivi."
          shield: "Grazie alle possenti ali può volare fino a\n1.400 m d’altezza. Le fiamme che sputa\npossono raggiungere temperature altissime."
        de:
          sword: "Dieses Pokémon kann mit seinem Feueratem\nFelsen schmelzen. Es verursacht ab und zu\nWaldbrände."
          shield: "Dieses Pokémon kann mit seinen Flügeln eine\nHöhe von bis zu 1 400 m erreichen. Es spuckt\nsehr heißes Feuer."
        es:
          sword: "Escupe un fuego tan caliente que funde las rocas.\nCausa incendios forestales sin querer."
          shield: "Sus potentes alas le permiten volar a una altura\nde 1400 m. Escupe llamaradas que llegan a\nalcanzar temperaturas elevadísimas."
        ko:
          sword: "암석도 태워버릴 정도로\n작열하는 화염을 뿜어\n산불을 일으킬 때가 있다."
          shield: "지상 1400m까지\n날개를 사용해 날 수 있다.\n고열의 불꽃을 내뿜는다."
        zh_simp:
          sword: "能够喷出猛烈的火焰，\n仿佛连岩石都能烤焦。\n有时会引发森林火灾。"
          shield: "能用翅膀飞到距地面\n１４００米的高度。\n会吐出高温火焰。"
        zh_trad:
          sword: "會噴出彷彿連岩石\n都能燒焦的灼熱火焰。\n有時會引發森林火災。"
          shield: "能用翅膀飛到距離地面\n１４００公尺的高度。\n會吐出高溫的火焰。"
  gmax_forms:
    charizard_gigantamax:
      form_id: 999
      names:
        jp_kana: キョダイマックス
        jp_kanji: キョダイマックス
        en: Gigantamax
        fr: Gigamax
        it: Gigamax
        de: Gigadynamax
        es: Gigamax
        ko: 거다이맥스
        zh_simp: 超极巨化
        zh_trad: 超極巨化
      descriptions:
        jp_kana:
          sword: "キョダイマックスの　パワーによって\nほのおの　つばさを　もつ　きょだいな\nリザードンの　すがたが　つくられた。"
          shield: "せっし２０００どの　ほのおが\nたいないで　うずまく。　ほえると\nかりょくが　さらに　あがる。"
        jp_kanji:
          sword: "キョダイマックスの　パワーによって\n炎の　翼を　持つ　巨大な\nリザードンの　姿が　つくられた。"
          shield: "摂氏２０００度の　炎が\n体内で　渦巻く。　吠えると\n火力が　さらに　上がる。"
        en:
          sword: "This colossal, flame-winged figure of a Charizard\nwas brought about by Gigantamax energy."
          shield: "The flame inside its body burns hotter than\n3,600 degrees Fahrenheit. When Charizard\nroars, that temperature climbs even higher."
        fr:
          sword: "Grâce au phénomène Gigamax, il a pris la forme\nd’un Dracaufeu géant doté d’ailes de feu."
          shield: "Des flammes, dont la température atteint\nles 2 000 °C, dansent à l’intérieur de son corps.\nQuand il rugit, leur puissance augmente."
        it:
          sword: "L’energia del fenomeno Gigamax lo ha\ntrasformato in un Charizard gigante dalle\nali di fuoco."
          shield: "All’interno del suo corpo turbina il fuoco a una\ntemperatura di 2.000 ºC. Quando ruggisce, la\nsua energia termica aumenta ulteriormente."
        de:
          sword: "Durch die Gigadynamax-Energie ist dieses\ngigantische Glurak entstanden, das über Flügel\naus Flammen verfügt."
          shield: "In seinem Inneren wirbeln 2 000 ºC heiße\nFlammen umher. Wenn es brüllt, steigt die\nFeuerkraft noch weiter an."
        es:
          sword: "La energía del fenómeno Gigamax ha dotado a\neste Charizard de alas flamígeras y un enorme\ntamaño."
          shield: "Las llamas del interior de su cuerpo forman un\ntorbellino que alcanza los 2000 °C. Al rugir\naumenta todavía más su energía térmica."
        ko:
          sword: "거다이맥스의 파워에 의해\n불꽃의 날개를 가진 거대한\n리자몽의 모습이 만들어졌다."
          shield: "섭씨 2000도의 불꽃이\n체내에서 소용돌이친다.\n울부짖으면 화력이 더 올라간다."
        zh_simp:
          sword: "超极巨化之力不仅让喷火龙\n变得更加巨大，还让它\n获得了熊熊燃烧的翅膀。"
          shield: "２０００度的火焰在体内形成\n了漩涡。当它咆哮的时候，\n火力还会进一步上升。"
        zh_trad:
          sword: "超極巨化之力不僅讓\n噴火龍變得更加巨大，\n還讓牠獲得了熊熊燃燒的翅膀。"
          shield: "攝氏２０００度的火焰在體內\n形成了旋渦。當牠咆哮的時候，\n火力還會進一步提升。"
squirtle:
