        jp_kana:
          sword: "じめんに　つくった　すあなに　すむ。\nかたい　きのみを　キバで　くだいて\nなかまと　ちからを　くらべあう。"
          shield: "おおきな　キバを　うちつけ　なかまと\nじゃれあう。　キバは　おれても\nすぐ　はえてくるから　へっちゃらだ。"
        jp_kanji:
          sword: "地面に　つくった　巣穴に　棲む。\n硬い　木の実を　キバで　砕いて\n仲間と　力を　比べあう。"
          shield: "大きな　キバを　打ちつけ　仲間と\nじゃれあう。　キバは　折れても\nすぐ　生えてくるから　へっちゃらだ。"
        en:
          sword: "These Pokémon nest in the ground and use their\ntusks to crush hard berries. Crushing berries is\nalso how they test each other’s strength."
          shield: "They play with each other by knocking their large\ntusks together. Their tusks break sometimes, but\nthey grow back so quickly that it isn’t a concern."
        fr:
          sword: "Il vit dans des terriers qu’il creuse à même le sol,\net organise des concours avec ses camarades\npour voir qui peut briser la Baie la plus dure."
          shield: "Il joue avec ses congénères à se donner de grands\ncoups de crocs. Peu importe s’ils se cassent :\nils repousseront aussitôt."
        it:
          sword: "Vive nelle tane che costruisce nel terreno.\nFa a gara con i suoi compagni a chi riesce a\nfrantumare con i denti le bacche più dure."
          shield: "Giocano tra di loro facendo cozzare le zanne.\nSe si spezzano non è un problema, perché\nricrescono subito."
        de:
          sword: "Sie wohnen in Löchern, die sie selbst graben.\nAb und an veranstalten sie mit harten Beeren\nWettbewerbe, wer die stärksten Fangzähne hat."
          shield: "Sie rammen sich spielerisch mit ihren Fangzähnen.\nBrechen diese ab, wachsen sie sofort nach."
        es:
          sword: "Viven en madrigueras que construyen bajo tierra.\nCompiten entre ellos para ver quién logra abrir\ncon los colmillos las bayas más duras."
          shield: "Juega con sus congéneres chocando sus enormes\ncolmillos con la tranquilidad de saber que, si se\nle rompen, se regenerarán enseguida."
        ko:
          sword: "땅속에 만든 굴에 산다.\n딱딱한 나무열매를 어금니로\n부수는 것을 통해 동료와 힘을 겨룬다."
          shield: "커다란 어금니를 부딪치며 동료와\n장난친다. 어금니는 부러져도\n바로 자라나서 걱정 없다."
        zh_simp:
          sword: "在地面上筑巢居住。\n用牙齿粉碎坚硬的树果，\n和伙伴比拼力气。"
          shield: "会和伙伴们一起互撞牙齿来玩。\n折断的牙齿会马上长出来，\n所以丝毫都不会去在意。"
        zh_trad:
          sword: "在地面上築巢居住。\n用牙齒粉碎堅硬的樹果，\n和夥伴比拼力氣。"
          shield: "會和夥伴們一起互撞牙齒來玩。\n折斷的牙齒會馬上長出來，\n所以絲毫都不會在意。"
