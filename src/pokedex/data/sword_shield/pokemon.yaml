      types:
        - grass
        - poison
      egg_groups:
        - grass
      abilities:
        - chlorophyll
      hidden_ability: run_away
      held_items:
        rare: absorb_bulb
      descriptions:
        jp_kana:
          sword: "つきのひかりを　あびて　うごきだす。\nよるのあいだに　タネを　あちこちに\nばらまくため　あるきまわる。"
          shield: "ひるまは　たいようを　さけるため\nつめたい　じめんに　もぐっている。\nつきのひかりを　あびて　そだつ。"
        jp_kanji:
          sword: "月の光を　浴びて　動きだす。\n夜のあいだに　タネを　あちこちに\nばらまくため　歩きまわる。"
          shield: "昼間は　太陽を　避けるため\n冷たい　地面に　もぐっている。\n月の光を　浴びて　育つ。"
        en:
          sword: "If exposed to moonlight, it starts to move.\nIt roams far and wide at night to scatter its seeds."
          shield: "During the day, it stays in the cold underground\nto avoid the sun. It grows by bathing in moonlight."
        fr:
          sword: "Il ne bouge que lorsqu’il est exposé aux rayons\nde la lune. Il se déplace alors pour disséminer\nses graines."
          shield: "Pendant la journée, il reste en sous-sol et évite\nle soleil. Il grandit en se baignant au clair de lune."
        it:
          sword: "Inizia a muoversi quando è illuminato dalla luce\nlunare. Di notte se ne va in giro a spargere semi."
          shield: "Di giorno vive nel freddo sottosuolo per\nevitare la luce del sole. Cresce assorbendo\nla luce lunare."
        de:
          sword: "Wird es vom Mondschein getroffen, bewegt es\nsich. Nachts wandert es weite Wege, um seine\nSamen zu verstreuen."
          shield: "Tagsüber versteckt es sich in der kalten Erde,\num die Sonne zu meiden. Es wächst im\nMondschein."
        es:
          sword: "Se mueve al exponerse a la luz de la luna.\nMerodea por la noche para esparcir sus semillas."
          shield: "Durante el día, se agazapa en el frío subsuelo\nhuyendo del sol. La luz de la luna le hace crecer."
        ko:
          sword: "달빛을 받아 움직인다.\n밤중에 씨앗을 여기저기\n뿌리기 위해 돌아다닌다."
          shield: "낮에는 태양을 피하기 위해\n차가운 땅속에 들어가 있다.\n달빛을 쬐어 성장한다."
        zh_simp:
          sword: "沐浴月光就会开始活动。\n为了四处散播种子\n会在夜晚到处走动。"
          shield: "白天会为躲避太阳\n而钻入凉爽的地下。\n会通过沐浴月光成长。"
        zh_trad:
          sword: "沐浴月光就會開始活動。\n為了四處散播種子，\n會在夜晚到處走動。"
          shield: "白天為了躲避太陽，\n會鑽進涼爽的地下。\n藉由沐浴月光來成長。"
