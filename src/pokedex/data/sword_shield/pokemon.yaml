      egg_groups:
        - flying
      abilities:
        - keen_eye
        - unnerve
      hidden_ability: big_pecks
      descriptions:
        jp_kana:
          sword: "あしで　こいしを　つかんで　なげたり\nロープを　てきに　まきつけるなど\nどうぐを　あつかう　ちえを　もつ。"
          shield: "きびしい　たたかいを　くぐりぬけて\nあいての　りきりょうを　せいかくに\nはんだんする　ちからが　みについた。"
        jp_kanji:
          sword: "足で　小石を　つかんで　投げたり\nロープを　敵に　巻きつけるなど\n道具を　あつかう　知恵を　もつ。"
          shield: "厳しい　戦いを　くぐり抜けて\n相手の　力量を　正確に\n判断する　力が　身についた。"
        en:
          sword: "Smart enough to use tools in battle, these\nPokémon have been seen picking up rocks and\nflinging them or using ropes to wrap up enemies."
          shield: "The lessons of many harsh battles have taught it\nhow to accurately judge an opponent’s strength."
        fr:
          sword: "Il est capable d’utiliser des objets avec ses serres :\nil peut par exemple saisir et lancer des pierres\nou même enrouler une corde autour d’un ennemi."
          shield: "Après avoir surmonté tant de rudes combats,\nil a appris à déterminer avec précision\nla puissance de ses adversaires."
        it:
          sword: "È in grado di adoperare oggetti. Ad esempio,\nsa afferrare e scagliare pietre con le zampe\no avvolgere il nemico con una corda."
          shield: "Avendo affrontato lotte molto ardue, ha\nimparato a valutare con precisione la forza\ndel nemico."
        de:
          sword: "Es weiß Objekte geschickt einzusetzen. So greift\nund wirft es zum Beispiel kleine Steine mit seinen\nKrallen oder wickelt Seile um Gegner."
          shield: "Es hat viele heftige Kämpfe überstanden und\ndabei gelernt, die Stärke seiner Gegner stets\nkorrekt einzuschätzen."
        es:
          sword: "Su inteligencia le permite servirse de objetos. Por\nejemplo, recoge y lanza piedras con las patas, o\nutiliza cuerdas para atrapar a su oponente."
          shield: "Tras haber librado combates muy duros, ha\ndesarrollado la habilidad de determinar con\nprecisión la fuerza de su adversario."
        ko:
          sword: "발로 돌멩이를 쥐어서 던지거나\n로프를 상대에게 휘감는 등\n도구를 다루는 지혜를 가졌다."
          shield: "혹독한 싸움을 헤쳐 나와\n상대의 역량을 정확히\n판단하는 힘을 습득했다."
        zh_simp:
          sword: "头脑聪明，懂得使用工具。\n会用爪子抓起小石头投向敌人，\n或是用绳子把敌人捆住。"
          shield: "经历无数次艰难的战斗后，\n它学会了该如何正确地\n判断敌人的力量。"
        zh_trad:
          sword: "頭腦聰明，懂得使用工具。\n會用爪子抓起小石頭投向敵人，\n或是用繩子把敵人綑住。"
          shield: "歷經無數次艱難的戰鬥後，\n牠學會了該如何正確地\n判斷敵人的力量。"
