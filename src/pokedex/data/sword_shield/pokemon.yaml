          sword: "さゆうの　みみを　まるめているときは\nからだや　こころの　ふちょうが\nげんいんなので　ケアが　ひつよう。"
          shield: "まるめた　みみを　のばす　いきおいで\nこうげきする　わざは　トレーニングを\nするほど　いりょくが　ましていく。"
        jp_kanji:
          sword: "左右の　耳を　丸めているときは\n体や　心の　不調が\n原因なので　ケアが　必要。"
