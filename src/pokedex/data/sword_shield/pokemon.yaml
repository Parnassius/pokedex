        - rivalry
      hidden_ability: sheer_force
      descriptions:
        jp_kana:
          sword: "あばれると　てが　つけられなくなるが\nながねん　つれそった　ニドクインの\nまえでは　おだやかな　かおに　なる。"
          shield: "ちからじまんの　ポケモン。　ふとい\nしっぽと　ダイヤをも　くだく　ツノを\nくしして　ごうかいに　たたかう。"
        jp_kanji:
          sword: "暴れると　手が　つけられなくなるが\n長年　連れ添った　ニドクインの\n前では　穏やかな　顔に　なる。"
          shield: "力自慢の　ポケモン。　太い　尻尾と\nダイヤをも　砕く　ツノを　駆使して\n豪快に　戦う。"
        en:
          sword: "When it goes on a rampage, it’s impossible to\ncontrol. But in the presence of a Nidoqueen it’s\nlived with for a long time, Nidoking calms down."
          shield: "Nidoking prides itself on its strength. It’s forceful\nand spirited in battle, making use of its thick tail\nand diamond-crushing horn."
        fr:
          sword: "Lorsqu’il s’énerve, il devient incontrôlable,\nmais il retrouve son calme face à Nidoqueen,\nsa compagne de longue date."
          shield: "Très fier de sa force, il se bat vigoureusement\nà l’aide de sa queue robuste et de sa corne\ncapable de briser le diamant."
        it:
          sword: "Quando si scatena non c’è modo di fermarlo,\nma davanti a Nidoqueen, la sua compagna\ndi lunga data, ritrova la calma."
          shield: "Si dà vanto della propria forza e lotta con\nvigore sfruttando la coda robusta e il corno\nin grado di frantumare il diamante."
        de:
          sword: "Gerät es in Rage, ist es nur schwer aufzuhalten.\nDoch vor einem Nidoqueen, mit dem es schon\nviele Jahre verbracht hat, zeigt es sich friedlich."
          shield: "Nidoking ist stolz auf seine Kraft und kämpft sehr\ngeschickt mit seinem dicken Schweif und seinem\nHorn, das selbst Diamanten zertrümmern kann."
        es:
          sword: "Una vez que se desboca, no hay quien lo pare.\nSolo se calma ante Nidoqueen, su compañera de\ntoda la vida."
          shield: "Presume de su hercúlea fuerza y combate\nvigorosamente con su robusta cola y su cuerno,\ncon el que hasta puede pulverizar diamantes."
        ko:
          sword: "날뛰기 시작하면 손쓸 수 없게 되지만\n긴 세월 함께 지낸 니드퀸\n앞에서는 온순해진다."
          shield: "힘이 센 포켓몬이다.\n굵은 꼬리와 다이아몬드도\n부수는 뿔로 호쾌하게 싸운다."
        zh_simp:
          sword: "虽然一旦大闹起来便会令人\n束手无措，但在长年一起生活\n的尼多后面前却会露出温和的一面。"
          shield: "以力量为傲的宝可梦。\n用自己的粗尾巴和连钻石\n都能击碎的角，豪爽地战斗。"
        zh_trad:
          sword: "一旦大鬧起來就無人能擋，\n但在長年相伴的尼多后面前\n則會露出溫和的表情。"
          shield: "以力氣為傲的寶可夢。\n會善用粗壯的尾巴和連鑽石\n也能擊碎的角，豪邁地戰鬥。"
