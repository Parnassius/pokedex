        jp_kana:
          sword: "シャワーズの　ぜんしんの　ひれが\nこきざみに　ふるえはじめるのは\nすうじかんごに　あめがふる　しるし。"
          shield: "からだの　さいぼうの　つくりが\nみずの　ぶんしと　にている。\nみずに　とけると　みえなくなる。"
        jp_kanji:
          sword: "シャワーズの　全身の　ひれが\n小刻みに　震えはじめるのは\n数時間後に　雨が降る　しるし。"
          shield: "体の　細胞の　つくりが\n水の　分子と　似ている。\n水に　溶けると　見えなくなる。"
        en:
          sword: "When Vaporeon’s fins begin to vibrate, it is a\nsign that rain will come within a few hours."
          shield: "Its body’s cellular structure is similar to the\nmolecular composition of water. It can melt\ninvisibly in water."
        fr:
          sword: "Quand ses nageoires se mettent à vibrer,\nc’est le signe qu’il va pleuvoir dans les heures\nqui suivent."
          shield: "Sa structure cellulaire est similaire à la composition\nmoléculaire de l’eau. Une fois dans cet élément,\nil devient indétectable à l’œil nu."
        it:
          sword: "Se le pinne di Vaporeon iniziano a vibrare,\nvuol dire che pioverà nel giro di poche ore."
          shield: "La sua composizione cellulare è simile\na quella delle molecole d’acqua, in cui\nsi può dissolvere diventando invisibile."
        de:
          sword: "Wenn seine Flossen beginnen zu vibrieren,\nist das ein sicheres Zeichen dafür, dass in den\nnächsten Stunden Regen aufziehen wird."
          shield: "Seine Zellstruktur ähnelt der molekularen\nZusammensetzung von Wasser, weshalb es sich\nin Gewässern unsichtbar machen kann."
        es:
          sword: "Cuando las aletas de Vaporeon comienzan a\nvibrar, significa que lloverá en las próximas\nhoras."
          shield: "La composición celular de su cuerpo es tan\nsimilar a la estructura molecular del agua que\nse vuelve invisible al fundirse en ella."
        ko:
          sword: "샤미드의 모든 지느러미가\n조금씩 떨리기 시작했다면\n몇 시간 뒤에 비가 내린다는 표시다."
          shield: "몸의 세포 구조가\n물 분자와 닮았다.\n물에 녹으면 보이지 않는다."
        zh_simp:
          sword: "当水伊布开始微微颤动\n它全身上下的鳍，就表示\n几个小时之后要下雨了。"
          shield: "身体细胞的结构与水分子相似。\n它能和水融为一体，\n让别人无法看见它。"
        zh_trad:
          sword: "當水伊布開始微微顫動\n牠全身上下的鰭，就表示\n幾個小時之後要下雨了。"
          shield: "身體細胞的結構與水分子相似。\n牠能和水融為一體，\n讓別人無法看見牠。"
