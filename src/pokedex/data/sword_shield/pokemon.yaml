      types:
        - normal
        - dragon
      egg_groups:
        - monster
        - dragon
      abilities:
        - berserk
        - sap_sipper
      hidden_ability: cloud_nine
      held_items:
        rare: persim_berry
      descriptions:
        jp_kana:
          sword: "ひょうこう３０００メートルを　こえる\nやまで　くらす。　まれに　まちへ\nやってきて　こどもたちと　あそぶ。"
          shield: "ひとなつっこく　こころやさしいが\nひとたび　おこると　きょうふうを\nまきおこし　すべてを　なぎたおす。"
        jp_kanji:
          sword: "標高３０００メートルを　超える\n山で　暮らす。　まれに　街へ\nやって来て　子どもたちと　遊ぶ。"
          shield: "人懐っこく　心優しいが\nひとたび　怒ると　強風を\n巻き起こし　すべてを　なぎ倒す。"
        en:
          sword: "The mountains it calls home are nearly two miles\nin height. On rare occasions, it descends to play\nwith the children living in the towns below."
          shield: "Drampa is a kind and friendly Pokémon—up until\nit’s angered. When that happens, it stirs up a\ngale and flattens everything around."
        fr:
          sword: "Il vit dans les montagnes culminant à plus\nde 3 000 m d’altitude. Il se rend parfois en ville\npour jouer avec les petits enfants."
          shield: "Il est d’un naturel sociable et aimable, mais quand\nil se met en colère, il déchaîne des bourrasques\nqui emportent tout sur leur passage."
        it:
          sword: "Vive su montagne che superano i 3.000 metri\ndi altezza. Qualche volta scende in città per\ngiocare con i bambini."
          shield: "È socievole e di indole gentile ma quando\nsi arrabbia provoca venti dalla terribile\nforza distruttiva."
        de:
          sword: "Es lebt auf Bergen, die mehr als 3 000 m hoch\nsind. Ganz selten zeigt es sich auch in Städten,\nwo es vergnügt mit den Kindern spielt."
          shield: "Ein zutrauliches und gutmütiges Pokémon. Wird\nes jedoch wütend, beschwört es heftige Stürme\nherauf, die alles und jeden davonfegen."
        es:
          sword: "Habita en montañas de más de 3000 m de\naltura. En ocasiones se acerca a los pueblos\npara jugar con los niños."
          shield: "Es de naturaleza mansa y amable, pero, si se\nenfurece, puede desatar fuertes vientos capaces\nde llevarse cualquier cosa por delante."
        ko:
          sword: "해발 3000m가 넘는\n산에 산다. 드물게 마을로\n내려와 아이들과 논다."
          shield: "사람을 잘 따르고 마음이 착하지만\n한번 화가 나면 강풍을 일으켜\n모든 것을 쓰러뜨려 버린다."
        zh_simp:
          sword: "住在标高超过３０００米的山上。\n偶尔也会来到城镇，\n与住在那里的孩子们一起玩耍。"
          shield: "心地善良爱亲近人，\n但只要生气就会\n刮起强风吹倒一切。"
        zh_trad:
          sword: "住在海拔超過３０００公尺的山上。\n偶爾也會來到城鎮，\n與住在那裡的孩子們一起玩耍。"
          shield: "心地善良愛親近人，\n但只要生氣就會\n颳起強風吹倒一切。"
dhelmise:
  species_id: 781
  names:
    jp_kana: ダダリン
    jp_kanji: ダダリン
    en: Dhelmise
    fr: Sinistrail
    it: Dhelmise
    de: Moruda
    es: Dhelmise
    ko: 타타륜
    zh_simp: 破破舵轮
    zh_trad: 破破舵輪
  forms:
    dhelmise:
      form_id: 0
      base_stats:
        hp: 70
        attack: 131
        defense: 100
        special_attack: 86
        special_defense: 90
        speed: 40
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ghost
        - grass
      egg_groups:
        - mineral
      abilities:
        - steelworker
      descriptions:
        jp_kana:
          sword: "かいていを　ただよう　もくずが\nちんぼつせんの　ぶひんを　とりこんで\nゴーストポケモンに　うまれかわった。"
          shield: "うみに　いかりを　おろして　えものを\nまちぶせ。　おおものの　ホエルオーを\nつかまえて　せいきを　すいとる。"
        jp_kanji:
          sword: "海底を　漂う　藻屑が\n沈没船の　部品を　取りこんで\nゴーストポケモンに　生まれ変わった。"
          shield: "海に　錨を　下して　獲物を\n待ち伏せ。　大物の　ホエルオーを\n捕まえて　生気を　吸い取る。"
        en:
          sword: "After a piece of seaweed merged with debris\nfrom a sunken ship, it was reborn as this\nghost Pokémon."
          shield: "After lowering its anchor, it waits for its prey. It\ncatches large Wailord and drains their life-force."
        fr:
          sword: "Ce Pokémon Spectre naît lorsque les algues\ndérivant au fond de l’océan se fixent sur\ndes morceaux d’épaves de navire."
          shield: "Il tend des guets-apens à ses proies en larguant\nson ancre dans la mer. Il peut absorber l’énergie\nvitale de grosses proies comme Wailord."
        it:
          sword: "Alcune alghe, impigliandosi a dei pezzi di relitti\nsul fondo del mare, si sono tramutate in questo\nPokémon di tipo Spettro."
          shield: "Cattura le prede calando la sua ancora in mare.\nRiesce ad assorbire l’energia vitale persino\ndi Pokémon enormi come Wailord."
        de:
          sword: "Dieses Geister-Pokémon entstand, als sich\nvom Meeresgrund stammendes Seegras auf\nBruchstücken eines Schiffswracks ablagerte."
          shield: "Im Meer wirft es seinen Anker aus und legt sich\nauf die Lauer. Es fängt sich möglichst große Beute\nwie Wailord und saugt ihr die Lebensenergie aus."
        es:
          sword: "Este Pokémon de tipo Fantasma no es sino la\nreencarnación de las algas que flotan a la deriva\ny arrastran consigo vestigios de barcos hundidos."
          shield: "Acecha a su presa hundiendo el ancla en el mar.\nEs capaz de drenar la vitalidad incluso de presas\ndel tamaño de un Wailord."
        ko:
          sword: "해저를 떠도는 해초가\n침몰선의 부품을 거두어들여서\n고스트포켓몬으로 다시 태어났다."
          shield: "바다에 닻을 내려 먹이를\n기다린다. 몸집이 큰 고래왕을\n잡아 생기를 빨아들인다."
        zh_simp:
          sword: "在海底飘荡的海藻\n吸收了沉船的零件后\n转生而成的幽灵宝可梦。"
          shield: "把锚抛到海里，伏击猎物。\n会去捕捉巨大的吼鲸王，\n吸取它们的精气。"
        zh_trad:
          sword: "在海底飄蕩的海藻\n吸收了沉船的零件後\n轉生而成的幽靈寶可夢。"
          shield: "把錨拋到海裡，伏擊獵物。\n會去捕捉巨大的吼鯨王，\n吸取牠們的精氣。"
jangmo_o:
  species_id: 782
  names:
    jp_kana: ジャラコ
    jp_kanji: ジャラコ
    en: Jangmo-o
    fr: Bébécaille
    it: Jangmo-o
    de: Miniras
    es: Jangmo-o
    ko: 짜랑꼬
    zh_simp: 心鳞宝
    zh_trad: 心鱗寶
  forms:
    jangmo_o:
      form_id: 0
      base_stats:
        hp: 45
        attack: 55
        defense: 65
        special_attack: 45
        special_defense: 45
        speed: 45
      evs_yield:
        hp: 0
        attack: 0
        defense: 1
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - dragon
      egg_groups:
        - dragon
      abilities:
        - bulletproof
        - soundproof
      hidden_ability: overcoat
      held_items:
        rare: razor_claw
      descriptions:
        jp_kana:
          sword: "あたまの　ウロコを　なかまどうしで\nぶつけあい　たたかいかたを　まなぶ。\nわざと　きもちが　きたえられる。"
          shield: "たいもうが　きんぞくのように　かたく\nなった　ウロコを　うちならして\nなかまと　コミュニケーションする。"
        jp_kanji:
          sword: "頭の　ウロコを　仲間同士で\nぶつけ合い　戦い方を　学ぶ。\n技と　気持ちが　鍛えられる。"
          shield: "体毛が　金属のように　硬く\nなった　ウロコを　打ち鳴らして\n仲間と　コミュニケーションする。"
        en:
          sword: "They learn to fight by smashing their head scales\ntogether. The dueling strengthens both their skills\nand their spirits."
          shield: "Jangmo-o strikes its scales to communicate with\nothers of its kind. Its scales are actually fur that’s\nbecome as hard as metal."
        fr:
          sword: "Il apprend à se battre en entrechoquant l’écaille\nqu’il a sur la tête avec celle de ses congénères,\nce qui renforce sa technique et son esprit."
          shield: "Il communique avec ses congénères en faisant\ncliqueter ses écailles dures comme du métal."
        it:
          sword: "Impara a lottare facendo cozzare la squama che\nha sulla testa con quella dei suoi simili. In questo\nmodo affina le sue mosse e tempra il suo spirito."
          shield: "Comunica con i suoi simili scuotendo le squame\ndure come il metallo."
        de:
          sword: "Durch Aneinanderschlagen ihrer Kopfschuppen\nbringen sie einander das Kämpfen bei. Dadurch\nverbessern sich ihre Attacken und ihre Stimmung."
          shield: "Es kommuniziert mit Artgenossen, indem es mit\nseinen Schuppen rasselt, die aus erhärtetem Fell\nbestehen und eine metallartige Konsistenz haben."
        es:
          sword: "Aprende a luchar haciendo chocar la escama de\nsu cabeza con la de sus congéneres. Así fortalece\ntanto la mente como sus movimientos."
          shield: "Se comunica con sus congéneres mediante los\nsonidos que produce al golpear sus escamas,\nduras como el acero."
        ko:
          sword: "머리의 비늘을 동료끼리\n부딪히며 싸우는 법을 배운다.\n이를 통해 기술과 정신을 단련한다."
          shield: "털이 금속처럼 단단해져서 생긴\n비늘을 부딪쳐서 소리를 내고\n동료와 소통한다."
        zh_simp:
          sword: "和伙伴们互相撞击头上的鳞片，\n学习战斗的方法。这样做可以\n锻炼它们的技术和心志。"
          shield: "体毛变成了像金属一般\n坚硬的鳞片。通过敲击\n鳞片来和伙伴交流。"
        zh_trad:
          sword: "和夥伴們互相撞擊頭上的鱗片，\n學習戰鬥的方法。這樣做可以\n鍛鍊牠們的技術和心志。"
          shield: "體毛變成了像金屬一般\n堅硬的鱗片。透過敲響\n鱗片來和夥伴溝通。"
