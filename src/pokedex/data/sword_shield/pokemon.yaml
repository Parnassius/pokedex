        - sniper
      hidden_ability: moody
      descriptions:
        jp_kana:
          sword: "あなに　はいりたがる　せいしつで\nほかの　ポケモンが　つくった\nすあなを　よこどりして　ねむる。"
          shield: "がんじょうな　いしあたま。\nきゅうばんつきの　あしを　からませ\nひたすら　あたまで　うちすえる。"
        jp_kanji:
          sword: "穴に　入りたがる　性質で\nほかの　ポケモンが　作った\n巣穴を　横取りして　眠る。"
          shield: "頑丈な　石頭。\n吸盤つきの　脚を　絡ませ\nひたすら　頭で　打ちすえる。"
        en:
          sword: "It has a tendency to want to be in holes. It\nprefers rock crags or pots and sprays ink from\nthem before attacking."
          shield: "It traps enemies with its suction-cupped\ntentacles, then smashes them with its\nrock-hard head."
        fr:
          sword: "Il adore se cacher dans des trous. Il n’hésite\npas à s’approprier les trous creusés par d’autres\nPokémon pour y dormir."
          shield: "Il capture ses ennemis avec ses tentacules\net les écrase ensuite avec sa tête dure comme\nla pierre."
        it:
          sword: "Ama nascondersi nei buchi. Spesso ruba le tane\ndi altri Pokémon per dormirvi."
          shield: "Cattura i nemici con le ventose dei tentacoli per\npoi colpirli con il suo capo duro come pietra."
        de:
          sword: "Es fühlt sich instinktiv in Löchern am wohlsten und\nschläft auch am liebsten in solchen, wobei es\nmitunter die Schlafplätze von anderen einnimmt."
          shield: "Es umschlingt Beute mit seinen Tentakeln und\nverpasst ihr dann eine beherzte Kopfnuss mit\nseinem steinharten Schädel."
        es:
          sword: "Tiene querencia por los agujeros, hasta el punto\nde ocupar los que han hecho otros para anidar y\ndormir en ellos."
          shield: "Atrapa a sus enemigos con los tentáculos y\ndespués los golpea con su dura cabeza."
        ko:
          sword: "구멍에 들어가고 싶어하는\n성질이 있어 다른 포켓몬이 만든\n굴을 빼앗고 그곳에서 잠을 잔다."
          shield: "머리가 돌처럼 단단하다.\n빨판이 붙어 있는 다리를 휘감아\n끊임없이 머리로 세게 때린다."
        zh_simp:
          sword: "有着爱钻洞的习性。\n会抢夺其他宝可梦筑的\n巢穴，在里面睡觉。"
          shield: "有着结实的坚硬脑袋。\n会用带吸盘的脚缠住对手，\n然后再一个劲地用头猛撞。"
        zh_trad:
          sword: "有著愛鑽洞的習性。\n會搶奪其他寶可夢築的\n巢穴，在裡面睡覺。"
          shield: "有著堅硬結實的腦袋。\n會用帶有吸盤的腳纏住對手，\n然後不停地用頭猛撞。"
delibird:
  species_id: 225
  names:
