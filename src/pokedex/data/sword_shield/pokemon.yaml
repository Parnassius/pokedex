      descriptions:
        jp_kana:
          sword: "いつも　いっしょの　３びきだけど\nそれぞれの　はなのミツの\nこのみは　びみょうに　ちがう。"
          shield: "よあけから　ひぐれまで　ミツを\nあつめつづける。　すべては\nむれと　ビークインの　ためだ。"
        jp_kanji:
          sword: "いつも　一緒の　３匹だけど\nそれぞれの　花の　蜜の\n好みは　微妙に　違う。"
          shield: "夜明けから　日暮れまで　蜜を\n集めつづける。　すべては\n群れと　ビークインの　ためだ。"
        en:
          sword: "The members of the trio spend all their time\ntogether. Each one has a slightly different taste\nin nectar."
          shield: "It ceaselessly gathers nectar from sunrise to\nsundown, all for the sake of Vespiquen and\nthe swarm."
        fr:
          sword: "Ce trio est inséparable et pourtant, leur goût\npour le nectar diffère légèrement."
          shield: "Du lever du soleil à la tombée de la nuit,\nil récolte du nectar pour Apireine et sa colonie."
        it:
          sword: "I tre componenti non si separano mai.\nIn fatto di nettare, ognuno ha gusti\nleggermente diversi."
          shield: "Raccoglie nettare dal tramonto all’alba\nper il bene del gruppo e di Vespiquen."
        de:
          sword: "Dieses Trio ist immer zusammen, aber jedes\nvon ihnen hat leicht andere Vorlieben, was\nBlütenhonig angeht."
          shield: "Sie sammeln von der Morgendämmerung bis zum\nSonnenuntergang unentwegt Blütenhonig für\nHonweisel und die Kolonie."
        es:
          sword: "Este trío no se separa jamás, pero cada uno tiene\nsus propios gustos en cuanto a néctar se refiere."
          shield: "Recolecta néctar de sol a sol para entregarlo a la\ncolonia y a Vespiquen."
        ko:
          sword: "언제나 3마리가 같이 있지만\n좋아하는 꽃의 꿀은\n저마다 미묘하게 다르다."
          shield: "새벽부터 저녁때까지 꿀을\n계속 모은다. 모든 것은\n무리와 비퀸을 위해서다."
        zh_simp:
          sword: "３只一直都在一起，\n但每一只对花蜜的\n喜好却略有不同。"
          shield: "从早到晚都在采集花蜜。\n这一切都是为了\n自己的族群和蜂女王。"
        zh_trad:
          sword: "３隻一直都在一起，\n但每一隻對花蜜的\n喜好卻略有不同。"
          shield: "從早到晚都在採集花蜜。\n這一切都是為了\n自己的族群和蜂女王。"
