        jp_kana:
          sword: "からだの　ほとんどが　すいぶん。\nかんそうすると　ひからびてしまう\nさいじゃくの　ドラゴンポケモン。"
          shield: "ツノは　すぐれた　かんかくきかん。\nてきの　けはいを　かんじとり　すぐに\nかくれる　ことで　いきのこってきた。"
        jp_kanji:
          sword: "体の　ほとんどが　水分。\n乾燥すると　干からびてしまう\n最弱の　ドラゴンポケモン。"
          shield: "ツノは　優れた　感覚器官。\n敵の　気配を　感じ取り　すぐに\n隠れる　ことで　生き残ってきた。"
        en:
          sword: "Because most of its body is water, it will dry up if\nthe weather becomes too arid. It’s considered\nthe weakest dragon Pokémon."
          shield: "Their horns are powerful sensors. As soon as\nGoomy pick up any sign of enemies, they go into\nhiding. This is how they’ve survived."
        fr:
          sword: "Son corps est principalement composé d’eau.\nS’il se déshydrate, il devient tout rabougri.\nC’est le plus faible des Pokémon Dragon."
          shield: "Ses cornes sont des organes sensoriels qui lui\npermettent de se cacher quand il détecte des\nennemis. C’est grâce à cela qu’il vit toujours."
        it:
          sword: "Il suo corpo è composto quasi esclusivamente\ndi acqua. Se si secca, avvizzisce. È il più debole\ndei Pokémon di tipo Drago."
          shield: "I suoi corni sono degli straordinari organi\nsensoriali. Riesce a sopravvivere nascondendosi\nnon appena percepisce la presenza del nemico."
        de:
          sword: "Sein Körper besteht vorwiegend aus Wasser und\nverschrumpelt daher völlig, wenn es austrocknet.\nEs ist das schwächste aller Drachen-Pokémon."
          shield: "Seine Fühler sind hochentwickelte Sinnesorgane.\nDa es dank ihnen Feinde sofort spüren und sich\nverstecken kann, hat es bis heute überlebt."
        es:
          sword: "Su cuerpo se compone casi exclusivamente de\nagua, por lo que se debilitaría si se deshidratase.\nEs el Pokémon de tipo Dragón más débil."
          shield: "Sus antenas son órganos sensoriales sumamente\ndesarrollados. Poder esconderse nada más\ndetectar enemigos le ha permitido sobrevivir."
        ko:
          sword: "몸의 대부분이 수분이다.\n건조해지면 바싹 말라버리는\n가장 약한 드래곤포켓몬."
          shield: "뿔은 뛰어난 감각 기관이다.\n적의 기척을 느끼면 바로\n숨어들어 살아남아 왔다."
        zh_simp:
          sword: "身体几乎都是水分。\n只要环境干燥身体就会变干，\n是最弱的龙宝可梦。"
          shield: "它的触角是优秀的感觉器官。\n只要感觉到有敌人就会立刻\n藏起来，以此存活到了现在。"
        zh_trad:
          sword: "身體幾乎都是水分。\n只要環境乾燥身體就會變乾，\n是最弱的龍寶可夢。"
          shield: "牠的觸角是優秀的感覺器官。\n只要感覺到有敵人就會立刻\n躲起來，以此存活到了現在。"
