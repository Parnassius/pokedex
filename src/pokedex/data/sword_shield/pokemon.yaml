          shield: "ふさふさの　みみと　しっぽを\nたくみに　あやつって　すいちゅうでの\nバランスを　たもつ。"
        jp_kanji:
          sword: "長生きの　シンボルと　されている。\n甲羅に　苔が　ついているのは\nとくに　長生きの　カメールだ。"
          shield: "ふさふさの　耳と　しっぽを\nたくみに　操って　水中での\nバランスを　たもつ。"
        en:
          sword: "It is recognized as a symbol of longevity. If its\nshell has algae on it, that Wartortle is very old."
          shield: "It cleverly controls its furry ears and tail to\nmaintain its balance while swimming."
        fr:
          sword: "Il est considéré comme un symbole de longévité.\nOn reconnaît les spécimens les plus âgés\nà la mousse qui pousse sur leur carapace."
          shield: "Il se sert habilement de sa queue et de ses\noreilles touffues pour garder son équilibre\nsous l’eau."
        it:
          sword: "È considerato un simbolo di longevità.\nSe c’è del muschio sul suo guscio, significa\nche è molto anziano."
          shield: "Controlla abilmente le orecchie e la coda\ncoperte di pelo, mantenendo l’assetto\nmentre nuota."
        de:
          sword: "Es gilt als Symbol für Langlebigkeit. Sehr alte\nExemplare erkennt man daran, dass ihr Panzer\nmit Algen übersät ist."
          shield: "Es balanciert geschickt mit seinen buschigen\nOhren und dem Schweif, während es im Wasser\nschwimmt."
        es:
          sword: "Se lo considera un símbolo de longevidad. Los\nejemplares más ancianos tienen musgo sobre el\ncaparazón."
          shield: "Utiliza hábilmente sus peludas orejas y la cola\npara mantener el equilibrio al nadar."
        ko:
          sword: "장수의 상징으로 여겨진다.\n등껍질에 이끼가 붙어 있는 것은\n특히 장수한 어니부기다."
          shield: "탐스러운 귀와 꼬리를\n능숙하게 다뤄서 수중에서의\n밸런스를 유지한다."
        zh_simp:
          sword: "被视为长寿的象征。\n如果卡咪龟的壳上长着苔藓，\n代表它已经活了非常久了。"
          shield: "会灵巧地摆动自己\n毛茸茸的耳朵和尾巴，\n借此在水中保持平衡。"
        zh_trad:
          sword: "被視為長壽的象徵。\n如果卡咪龜的殼上長著苔蘚，\n那就代表牠已經活了非常久。"
          shield: "會靈巧地擺動自己\n毛茸茸的耳朵和尾巴，\n藉此在水中保持平衡。"
