          sword: "あいてが　おおきいほど　からだが\nはれつする　げんかいまで　みずを\nのみこみ　からだを　ふくらませる。"
          shield: "ぜんしんの　ちいさな　ハリは\nうろこが　へんかしたもの。\nささると　どくで　きをうしなう。"
        jp_kanji:
          sword: "相手が　大きいほど　体が\n破裂する　限界まで　水を\n飲みこみ　体を　膨らませる。"
          shield: "全身の　小さな　針は\nウロコが　変化したもの。\n刺さると　毒で　気を失う。"
        en:
          sword: "When faced with a larger opponent, it swallows\nas much water as it can to match the\nopponent’s size."
          shield: "The small spikes covering its body developed\nfrom scales. They inject a toxin that causes fainting."
        fr:
          sword: "Lorsqu’il est confronté à plus gros que lui,\nil avale autant d’eau que possible pour égaler\nle gabarit de son adversaire."
          shield: "Ses petites épines étaient autrefois des écailles.\nElles sécrètent des toxines pouvant faire\nperdre connaissance."
        it:
          sword: "Se incontra un nemico più grande, ingoia acqua\ngonfiando il corpo fino quasi a scoppiare."
          shield: "I piccoli aculei che coprono il suo corpo si sono\nformati dalle squame. Contengono una tossina\nche fa svenire."
        de:
          sword: "Sieht es sich einem größeren Feind gegenüber,\nschluckt es massenweise Wasser, um seinen\nKörper aufzublähen und größer zu wirken."
          shield: "Die kleinen Stacheln an seinem Körper sind aus\nSchuppen entstanden. Damit injiziert es Gift,\ndas zu Ohnmacht führt."
        es:
          sword: "Cuando su rival es mayor que él, infla el cuerpo\nbebiendo agua hasta casi reventar para lograr\nigualarlo en tamaño."
          shield: "Las pequeñas púas que cubren su cuerpo eran\nescamas. Inyectan una toxina que hace perder\nel conocimiento."
        ko:
          sword: "상대가 크면 클수록 몸이\n터지기 직전까지 물을\n들이마셔서 몸을 부풀린다."
          shield: "전신의 작은 바늘은\n비늘이 변화한 것이다.\n찔리면 독 때문에 정신을 잃게 된다."
        zh_simp:
          sword: "对手的体型越是巨大，它就会\n喝下越多的水使身体膨胀，\n仿佛马上就要破裂一般。"
          shield: "全身上下的小针都是由鳞片\n变化而来的。如果被刺中的话，\n就会因中毒而昏迷。"
        zh_trad:
          sword: "對手的體型越是巨大，牠就會\n喝下越多的水使身體膨脹，\n彷彿馬上就要破裂一般。"
          shield: "全身上下的小針是由鱗片\n變化而來的。如果被刺中的話，\n就會中毒並陷入昏迷。"
