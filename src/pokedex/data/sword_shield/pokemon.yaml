          shield: "シェルダーに　かまれた　ショックで\nにそくほこうになった。　シェルダーが\nはなれると　ヤドンに　もどるらしい。"
        jp_kanji:
          sword: "シェルダーに　しっぽを　噛まれて\n進化。　シェルダーは　しっぽから\nにじみ出る　甘味に　夢心地だ。"
          shield: "シェルダーに　噛まれた　ショックで\n二足歩行になった。　シェルダーが\n離れると　ヤドンに　戻るらしい。"
        en:
          sword: "Slowpoke became Slowbro when a Shellder bit\non to its tail. Sweet flavors seeping from the tail\nmake the Shellder feel as if its life is a dream."
          shield: "Being bitten by a Shellder shocked this Pokémon\ninto standing on two legs. If the Shellder lets go,\nit seems Slowbro will turn back into a Slowpoke."
        fr:
          sword: "Il a évolué après qu’un Kokiyas lui a mordu\nla queue. Celle-ci sécrète une substance sucrée\nqui enchante particulièrement les Kokiyas."
          shield: "La morsure du Kokiyas l’a tellement surpris\nqu’il est devenu bipède. Il paraît qu’il redevient\nun Ramoloss si le Kokiyas lâche prise."
        it:
          sword: "Si è evoluto in seguito al morso di uno Shellder.\nGli Shellder sono inebriati dalla dolce linfa\nsecreta dalla coda."
          shield: "Ha assunto una postura eretta per lo shock\ncausato dal morso di uno Shellder. Pare che torni\na essere uno Slowpoke se lo Shellder si stacca."
        de:
          sword: "Es entwickelte sich, als ein Muschas in seine Rute\nbiss. Das süße Aroma, das aus der Rute strömt,\nhat Muschas in eine Art Trance versetzt."
          shield: "Der Schock, den Muschas’ Biss verursachte,\nließ es auf zwei Beinen stehen. Löst das Muschas\nsich von ihm, wird es wieder zu einem Flegmon."
        es:
          sword: "Ha evolucionado después de que lo mordiera\nun Shellder, al cual le embelesa la sustancia que\nsecreta por la cola."
          shield: "Se volvió bípedo por el impacto que le causó la\nmordedura del Shellder. Si este se desprende,\nvuelve a convertirse en un Slowpoke."
        ko:
          sword: "셀러에게 꼬리를 물려서 진화했다.\n셀러는 꼬리에서 배어 나오는\n단맛에 황홀한 기분이다."
          shield: "셀러에게 물린 충격으로 두 발로\n걸을 수 있게 되었다. 셀러가 떨어지면\n야돈으로 돌아간다고 한다."
        zh_simp:
          sword: "被大舌贝咬住尾巴而\n进化。尾巴里渗出的\n甜味让大舌贝心醉神迷。"
          shield: "因为被大舌贝咬住而受到的刺激使它\n变得能够两足直立行走。当大舌贝\n离开后，它似乎就会变回呆呆兽。"
        zh_trad:
          sword: "被大舌貝咬住尾巴而進化。\n大舌貝陶醉在尾巴滲出的\n甜味裡，彷彿置身夢境。"
          shield: "被大舌貝狠狠咬下的衝擊讓牠\n變得能用兩腳行走。如果大舌貝\n脫落了，牠似乎就會變回呆呆獸。"
