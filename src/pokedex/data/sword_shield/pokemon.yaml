      egg_groups:
        - field
      abilities:
        - snow_cloak
      hidden_ability: slush_rush
      held_items:
        rare: grip_claw
      descriptions:
        jp_kana:
          sword: "おおきな　カギヅメで　ふかい　ゆきを\nかきわけ　はしる。　ゆきやまでは\nどの　ポケモンよりも　はやいのだ。"
          shield: "こおりの　トゲが　あさひを　あびて\nかがやく　すがたを　みたいと　おもい\nゆきやまを　のぼる　ひとは　おおい。"
        jp_kanji:
          sword: "大きな　カギヅメで　深い　雪を\nかき分け　走る。　雪山では\nどの　ポケモンよりも　速いのだ。"
          shield: "氷の　トゲが　朝日を　浴びて\n輝く　姿を　見たいと　思い\n雪山に　登る　人は　多い。"
        en:
          sword: "It uses large, hooked claws to cut a path through\ndeep snow as it runs. On snowy mountains, this\nSandslash is faster than any other Pokémon."
          shield: "Many people climb snowy mountains, hoping to\nsee the icy spikes of these Pokémon glistening\nin the light of dawn."
        fr:
          sword: "Il court en se frayant un passage dans la neige\nde ses grandes griffes. Sur les monts enneigés,\naucun Pokémon ne surpasse sa vitesse."
          shield: "Nombreux sont ceux qui escaladent les monts\nenneigés pour admirer les reflets du soleil levant\ndans ses épines de glace."
        it:
          sword: "Corre piantando saldamente nella neve i suoi\ngrandi artigli. Ciò lo rende il Pokémon più veloce\nsui monti innevati."
          shield: "Molti appassionati scalano le montagne innevate\nin cui vive per ammirare lo splendore dei suoi\naculei di ghiaccio illuminati dal sole del mattino."
        de:
          sword: "Mit seinen großen Krallen gräbt es sich flink\ndurch den Schnee. In verschneiten Gebirgen\nist es schneller als jedes andere Pokémon."
          shield: "Viele Menschen erklimmen verschneite Berge\nin der Hoffnung, die Eisstacheln dieser Pokémon\nin der Morgensonne glitzern zu sehen."
        es:
          sword: "Sus enormes garras le permiten abrirse camino\npor la nieve que cubre su hábitat y recorrerlo a\nmayor velocidad que ningún otro Pokémon."
          shield: "Mucha gente escala las montañas solo para\npoder admirar el hermoso brillo que despiden\nsus púas de hielo bañadas por el sol matutino."
        ko:
          sword: "커다란 갈고리발톱으로 높이 쌓인\n눈을 헤치며 달린다. 설산에서는\n어떤 포켓몬보다 빠르다."
          shield: "얼음 가시가 아침 햇살을 받으며\n빛나는 모습을 보고자\n설산을 오르는 사람이 많다."
        zh_simp:
          sword: "会用大大的钩爪铲开\n厚厚的积雪奔跑。在雪山，\n它的速度比任何宝可梦都快。"
          shield: "有许多人攀登雪山就是为了\n一睹它那冰针在朝阳的\n沐浴下晶莹闪耀的样子。"
        zh_trad:
          sword: "奔跑時會用大大的鉤爪\n撥開厚雪。在雪山中的速度\n比任何寶可夢都還要快。"
          shield: "有許多人攀登雪山\n就是為了一睹牠的冰針\n在朝陽下閃耀的樣子。"
nidoran_f:
  species_id: 29
  names:
    jp_kana: ニドラン♀
    jp_kanji: ニドラン♀
    en: Nidoran♀
    fr: Nidoran♀
    it: Nidoran♀
    de: Nidoran♀
    es: Nidoran♀
    ko: 니드런♀
    zh_simp: 尼多兰
    zh_trad: 尼多蘭
  forms:
    nidoran_f:
      form_id: 0
      base_stats:
        hp: 55
        attack: 47
        defense: 52
        special_attack: 40
        special_defense: 40
        speed: 41
      evs_yield:
        hp: 1
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - poison
      egg_groups:
        - monster
        - field
      abilities:
        - poison_point
        - rivalry
      hidden_ability: hustle
      descriptions:
        jp_kana:
          sword: "オスよりも　においに　びんかん。\nヒゲで　かざむきを　かくにんしながら\nかざしもで　エサを　さがすのだ。"
          shield: "かたい　まえばで　きのみを　くだいて\nたべる。　ツノの　さきは　オスより\nすこし　まるみを　おびている。"
        jp_kanji:
          sword: "オスよりも　匂いに　敏感。\nヒゲで　風向きを　確認しながら\n風下で　エサを　探すのだ。"
          shield: "硬い　前歯で　木の実を　砕いて　食べる。\nツノの　先は　オスより　少し\n丸みを　帯びている。"
        en:
          sword: "Females are more sensitive to smells than males.\nWhile foraging, they’ll use their whiskers to check\nwind direction and stay downwind of predators."
          shield: "It uses its hard incisor teeth to crush and eat\nberries. The tip of a female Nidoran’s horn is a\nbit more rounded than the tip of a male’s horn."
        fr:
          sword: "Son odorat est plus développé que celui du mâle.\nQuand Nidoran♀ cherche à manger, il reste dans\nle sens du vent, qu’il détecte avec ses vibrisses."
          shield: "Ce Pokémon se nourrit de Baies en les ouvrant\navec ses incisives. Le bout de sa corne est plus\narrondi que celui du mâle."
        it:
          sword: "È più sensibile agli odori rispetto ai maschi.\nCapta le correnti d’aria con le vibrisse e si\nposiziona sottovento per cercare le prede."
          shield: "Mangia le bacche frantumandole con i robusti\nincisivi. La punta del corno è leggermente più\narrotondata rispetto a quella del maschio."
        de:
          sword: "Sie sind geruchsempfindlicher als Nidoran♂.\nAuf Nahrungssuche folgen sie der Windrichtung,\ndie sie mit ihren Tasthaaren ermitteln."
          shield: "Mit ihren harten Vorderzähnen zerteilen sie\nBeeren, bevor sie diese essen. Die Spitze ihres\nHorns ist etwas abgerundeter als bei Männchen."
        es:
          sword: "Posee un olfato más fino que los Nidoran♂. Usa\nlos bigotes para percibir la dirección del viento y\nbuscar comida a sotavento de sus depredadores."
          shield: "Parte las bayas con sus duros incisivos para\ncomérselas. La punta del cuerno de las hembras\nes más redondeada que la de los machos."
        ko:
          sword: "수컷보다 냄새에 민감하다.\n수염으로 바람의 방향을 확인하면서\n흘러온 냄새로 먹이를 찾는다."
          shield: "단단한 앞니로 나무열매를\n깨물어 먹는다. 뿔의 끝은\n수컷보다 조금 둥그스름하다."
        zh_simp:
          sword: "对于气味比雄性更敏感。\n会一边用胡须确认风向，\n一边在下风处寻找食物。"
          shield: "用坚硬的门牙咬碎\n树果吃。和雄性相比，\n角的尖端稍圆一些。"
        zh_trad:
          sword: "對氣味比雄性還要敏感。\n會一邊用鬍鬚確認風向，\n一邊在下風處尋找食物。"
          shield: "會用堅硬的門牙咬碎\n樹果後吃下。角的尖端\n會比雄性還要圓一些。"
