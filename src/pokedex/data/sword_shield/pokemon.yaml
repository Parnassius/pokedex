      types:
        - water
      egg_groups:
        - water_1
        - field
      abilities:
        - damp
        - cloud_nine
      hidden_ability: swift_swim
      descriptions:
        jp_kana:
          sword: "いつも　ずつうに　なやんでいる。\nふしぎな　ちからを　ばくはつさせると\nしばらく　いたみは　おさまるようだ。"
          shield: "ストレスが　たまると　ずつうが\nエスカレート。　きょうりょくな\nねんりきで　まわりを　あっとうする。"
        jp_kanji:
          sword: "いつも　頭痛に　悩んでいる。\n不思議な　力を　爆発させると\nしばらく　痛みは　治まるようだ。"
          shield: "ストレスが　溜まると　頭痛が\nエスカレート。　強力な　念力で\nまわりを　圧倒する。"
        en:
          sword: "Psyduck is constantly beset by headaches. If the\nPokémon lets its strange power erupt, apparently\nthe pain subsides for a while."
          shield: "As Psyduck gets stressed out, its headache gets\nprogressively worse. It uses intense psychic\nenergy to overwhelm those around it."
        fr:
          sword: "Il a toujours la migraine, mais la douleur semble\ns’atténuer momentanément s’il laisse exploser\nson pouvoir mystérieux."
          shield: "Sa migraine s’intensifie à mesure que son stress\nmonte. Il libère une force psychique puissante\nqui terrasse tous ceux qui l’entourent."
        it:
          sword: "È costantemente tormentato dal mal di testa,\nma se lascia esplodere il suo misterioso potere\npare che trovi temporaneamente sollievo."
          shield: "Più è stressato, più il suo mal di testa si fa\nintenso. Con i suoi incredibili poteri psicocinetici\ntravolge chiunque nelle vicinanze."
        de:
          sword: "Enton leidet permanent unter Kopfschmerzen.\nWenn es seine geheimnisvollen Kräfte freisetzt,\nsollen die Schmerzen für eine Weile nachlassen."
          shield: "Wenn es sehr gestresst ist, verstärken sich seine\nKopfschmerzen. Mit seinen Psycho-Kräften kann\nes alles in der Umgebung überwältigen."
        es:
          sword: "Siempre padece dolores de cabeza. Tras desatar\nsus misteriosos poderes, la jaqueca remite unos\ninstantes."
          shield: "Sus dolores de cabeza empeoran a medida que\naumenta su nivel de estrés. Su increíble poder\npsíquico puede causar estragos a su alrededor."
        ko:
          sword: "언제나 두통에 시달린다.\n신비한 힘을 폭발시키면\n잠시 통증이 진정되는 듯하다."
          shield: "스트레스가 쌓이면\n두통이 심해진다. 강력한\n염동력으로 주위를 압도한다."
        zh_simp:
          sword: "总是因为头痛而烦恼。\n让神秘的力量爆发后，\n疼痛似乎就会暂时得到缓解。"
          shield: "头痛会随着压力逐渐累积\n而不断加剧。会用强大的\n念力击垮周围的一切。"
        zh_trad:
          sword: "總是因為頭痛而煩惱著。\n當牠讓神奇的力量爆發後，\n似乎就能暫時舒緩疼痛。"
          shield: "頭痛會隨著壓力累積而\n更加劇烈。會用強大的\n念力壓倒周圍的一切。"
