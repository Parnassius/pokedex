        - normal
      egg_groups:
        - field
      abilities:
        - cheek_pouch
      hidden_ability: gluttony
      held_items:
        rare: sitrus_berry
      descriptions:
        jp_kana:
          sword: "しっぽに　きのみを　ためこむ。\nためこみすぎて　ポロポロ　こぼすが\nにぶいので　きがつかない。"
          shield: "どんなに　かたい　きのみの　からも\nじまんの　はで　ボリボリ　かじる。\nガラルでは　よく　みる　ポケモン。"
        jp_kanji:
          sword: "しっぽに　木の実を　溜めこむ。\n溜めこみすぎて　ポロポロ　こぼすが\n鈍いので　気がつかない。"
          shield: "どんなに　硬い　木の実の　殻も\n自慢の　歯で　ボリボリ　齧る。\nガラルでは　よく　見る　ポケモン。"
        en:
          sword: "It stashes berries in its tail—so many berries that\nthey fall out constantly. But this Pokémon is a bit\nslow-witted, so it doesn’t notice the loss."
          shield: "Common throughout the Galar region, this\nPokémon has strong teeth and can chew\nthrough the toughest of berry shells."
        fr:
          sword: "Il amasse tellement de Baies dans sa queue\nqu’elles tombent les unes après les autres, mais\nil est si étourdi qu’il ne s’en rend pas compte."
          shield: "On rencontre souvent ce Pokémon à Galar.\nAucune coquille de Baie ne résiste à ses incisives,\ndont il est très fier."
        it:
          sword: "Conserva talmente tante bacche nella coda\nche le perde una dopo l’altra, ma non essendo\nmolto perspicace non se ne rende conto."
          shield: "Un Pokémon che si incontra spesso a Galar.\nHa denti eccezionali, con i quali rosicchia anche\nle bacche più dure."
        de:
          sword: "Es hortet in seinem Schweif Beeren. Versucht es,\nzu viele unterzubringen, fallen sie heraus. Da es\njedoch nicht allzu clever ist, bemerkt es das nicht."
          shield: "Diesem Pokémon begegnet man häufig in Galar.\nEs ist sehr stolz auf seine Zähne, mit denen es\njede noch so harte Beerenschale knacken kann."
        es:
          sword: "Se obceca tanto en acumular bayas en la cola\nque no se da ni cuenta de cuando tiene\ndemasiadas y se le acaban cayendo."
          shield: "Sus incisivos, de fuerza y dureza extraordinarias,\nle permiten mordisquear incluso las bayas más\nduras. Es un Pokémon muy común en Galar."
        ko:
          sword: "꼬리에 나무열매를 모아둔다.\n너무 많이 모아둬서 툭툭 흘리지만\n둔감해서 눈치채지 못한다."
          shield: "아무리 단단한 나무열매 껍질도\n이빨로 아작아작 갉아 먹는다.\n가라르에서 쉽게 볼 수 있는 포켓몬이다."
        zh_simp:
          sword: "在尾巴里囤积树果。\n虽然囤过头了就会掉出来，\n但是迟钝的它不会发现。"
          shield: "无论多么坚硬的树果壳\n都能用引以为傲的大牙咬碎。\n在伽勒尔是很常见的宝可梦。"
        zh_trad:
          sword: "在尾巴裡囤積樹果。\n雖然囤過頭了就會掉出來，\n但遲鈍的牠不會發現。"
          shield: "無論多麼堅硬的樹果殼\n都能用引以為傲的大牙咬碎。\n在伽勒爾是很常見的寶可夢。"
rookidee:
  species_id: 821
  names:
