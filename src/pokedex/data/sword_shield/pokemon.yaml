        - iron_fist
      descriptions:
        jp_kana:
          sword: "じゅみょうが　つきると　からだが\nさびて　くずれる。　やがて　ちいさな\nはへんが　メルタンに　ふっかつする。"
          shield: "えんしんりょくで　はずみを　つけて\nくりだす　おもい　ナットの　パンチは\nポケモン　さいきょうと　いわれる。"
        jp_kanji:
          sword: "寿命が　尽きると　体が\n錆びて　崩れる。　やがて　小さな\n破片が　メルタンに　復活する。"
          shield: "遠心力で　弾みを　つけて\n繰りだす　重い　ナットの　パンチは\nポケモン　最強と　いわれる。"
        en:
          sword: "At the end of its life-span, Melmetal will rust and\nfall apart. The small shards left behind will\neventually be reborn as Meltan."
          shield: "Centrifugal force is behind the punches of\nMelmetal’s heavy hex-nut arms. Melmetal is said\nto deliver the strongest punches of all Pokémon."
        fr:
          sword: "En fin de vie, son corps rouille et se brise\nen mille morceaux. Ces derniers renaissent\nensuite sous forme de Meltan."
          shield: "On dit que, grâce à la force centrifuge, les coups\nde poing qu’il assène avec ses lourds écrous\nseraient les plus dévastateurs parmi les Pokémon."
        it:
          sword: "Alla fine della sua esistenza, si arrugginisce e\ncade a pezzi. Dopo un po’ di tempo, i resti del\nsuo corpo tornano in vita sotto forma di Meltan."
          shield: "Sferra pugni con i suoi dadi metallici sfruttando la\nforza centrifuga. Si dice che nessun altro Pokémon\nsia capace di sferrarne di altrettanto potenti."
        de:
          sword: "Geht sein Leben dem Ende zu, rostet sein Körper\nund fällt auseinander. Kurz darauf erwachen die\nverbliebenen Fragmente als Meltan zum Leben."
          shield: "Es holt mit Fliehkraft Schwung, um mit seinen\nschweren Muttern Hiebe auszuteilen, die stärker\nsein sollen als die aller anderen Pokémon."
        es:
          sword: "Al final de su vida, su cuerpo se oxida y se hace\npedazos. Poco tiempo después, estos fragmentos\nque quedan dan vida a varios Meltan."
          shield: "Gracias a la inercia y la fuerza centrífuga, los\npuñetazos que propina con sus pesadas tuercas\nson los más potentes del mundo Pokémon."
        ko:
          sword: "수명이 다하면 몸이 녹슬고\n붕괴한다. 이윽고 작은 파편이\n멜탄으로 부활한다."
          shield: "원심력으로 힘을 더해서\n날리는 묵직한 너트 펀치는\n포켓몬 중 최강이라고 전해진다."
        zh_simp:
          sword: "寿命快到尽头的时候，\n身体就会生锈解体。到最后\n细小的碎片会复活为美录坦。"
          shield: "美录梅塔利用离心力带动\n沉重的螺帽挥出的拳击\n被认为是宝可梦界之最。"
        zh_trad:
          sword: "壽命快到盡頭的時候，\n身體就會生鏽解體。到最後\n細小的碎片會復活為美錄坦。"
          shield: "美錄梅塔利用離心力帶動\n沉重的螺帽揮出的拳擊\n被認為是寶可夢界之最。"
  gmax_forms:
    melmetal_gigantamax:
      form_id: 999
      names:
        jp_kana: キョダイマックス
        jp_kanji: キョダイマックス
        en: Gigantamax
        fr: Gigamax
        it: Gigamax
        de: Gigadynamax
        es: Gigamax
        ko: 거다이맥스
        zh_simp: 超极巨化
        zh_trad: 超極巨化
      descriptions:
        jp_kana:
          sword: "とおい　ちほうの　しんわに　のこる\nひとつめのきょじんは　メルメタルが\nキョダイマックスした　すがただった。"
          shield: "おなかの　あなから　だいでんりょくの\nビームを　はっしゃして　いちげきで\nあいてを　じょうはつさせる。"
        jp_kanji:
          sword: "遠い　地方の　神話に　残る\n一つ目の巨人は　メルメタルが\nキョダイマックスした　姿だった。"
          shield: "お腹の　穴から　大電力の\nビームを　発射して　一撃で\n相手を　蒸発させる。"
        en:
          sword: "In a distant land, there are legends about a\ncyclopean giant. In fact, the giant was a Melmetal\nthat was flooded with Gigantamax energy."
          shield: "It can send electric beams streaking out from the\nhole in its belly. The beams’ tremendous energy\ncan vaporize an opponent in one shot."
        fr:
          sword: "Dans la mythologie d’une région lointaine, celui\nque l’on considérait comme le premier géant était\nen réalité un Melmetal sous sa forme Gigamax."
          shield: "Il peut tirer un rayon électrique capable\nde faire disparaître un ennemi d’un seul coup\ndepuis le centre de son abdomen."
        it:
          sword: "I ciclopi di cui si parla nella mitologia di una\nregione lontana altro non erano che dei\nMelmetal Gigamax."
          shield: "Dall’apertura nell’addome spara raggi elettrici\nad alto voltaggio che fanno evaporare il nemico\nall’istante."
        de:
          sword: "Legenden aus einer fernen Region berichten von\neinäugigen Riesen. Heute weiß man, dass es sich\ndabei um Gigadynamax-Melmetal handelte."
          shield: "Aus dem Loch in seinem Bauch feuert es einen\nHochspannungsstrahl ab, der seine Gegner auf\neinen Schlag vaporisiert."
        es:
          sword: "Existen leyendas en tierras remotas que hablan\nde cíclopes que, según se cree, eran Melmetal\nbajo los efectos del fenómeno Gigamax."
          shield: "El rayo de alto voltaje que emite por la abertura\ndel abdomen puede vaporizar al instante el\ncuerpo de su contrincante."
        ko:
          sword: "먼 지방의 신화에 남아 있는\n외눈 거인은 멜메탈이\n거다이맥스한 모습이었다."
          shield: "배의 구멍에서 큰 전력의\n빔을 발사해서 일격에\n상대를 증발시켜 버린다."
        zh_simp:
          sword: "遥远地区的神话中所描述的\n独眼巨人其实就是美录梅塔\n超极巨化之后的样子。"
          shield: "会从腹部的孔洞里发出\n电力强大的光束，只需\n一击就能让对手蒸发。"
        zh_trad:
          sword: "遙遠地區的神話中所描述的\n獨眼巨人其實就是美錄梅塔\n超極巨化之後的樣子。"
          shield: "會從腹部的孔洞裡發出\n電力強大的光束，只需\n一擊就能讓對手蒸發。"
