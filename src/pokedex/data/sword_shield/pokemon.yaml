          shield: "おおきなアゴは　がんせきをも　かみ\nくだく。　サダイジャから　タマゴを\nまもるため　むれで　たたかう。"
        jp_kanji:
          sword: "巣の　奥深くに　タマゴを　産む。\nクイタランに　襲われると　大きな\n顎で　噛みついて　反撃。"
          shield: "大きな顎は　岩石をも　かみ砕く。\nサダイジャから　タマゴを\n守るため　群れで　戦う。"
        en:
          sword: "They lay their eggs deep inside their nests.\nWhen attacked by Heatmor, they retaliate\nusing their massive mandibles."
          shield: "With their large mandibles, these Pokémon can\ncrunch their way through rock. They work\ntogether to protect their eggs from Sandaconda."
        fr:
          sword: "Il dépose ses Œufs tout au fond de son terrier.\nLorsqu’un Aflamanoir l’attaque, il se défend\nà l’aide de ses mandibules."
          shield: "Sa grande mâchoire réduit même les rochers\nen miettes. Il se bat avec sa colonie pour protéger\nses Œufs des attaques des Dunaconda."
        it:
          sword: "Depone le Uova nei recessi più interni del suo\nnido. Se un Heatmor lo attacca, si difende\nmordendolo con le grandi mandibole."
          shield: "Le grandi mandibole possono frantumare anche\nla roccia. Lotta con la colonia per proteggere\nle sue Uova da Sandaconda."
        de:
          sword: "Es legt seine Eier im hintersten Winkel des Nests.\nWenn es von Furnifraß bedroht wird, wehrt es\nsich mit seinen kräftigen Kiefern."
          shield: "Ihre mächtigen Kiefer können Felsen zerbeißen.\nSie rotten sich zu Gruppen zusammen, um ihre\nEier vor Sanaconda zu beschützen."
        es:
          sword: "Deposita sus huevos en la parte más profunda\ndel nido. Si un Heatmor lo ataca, se defiende\nmordiéndolo con sus enormes mandíbulas."
          shield: "Con sus grandes mandíbulas puede destrozar\nincluso rocas. Lucha en grupo para proteger sus\nlarvas del ataque de los Sandaconda."
        ko:
          sword: "굴속 깊은 곳에 알을 낳는다.\n앤티골에게 공격받으면 커다란\n턱으로 물어서 반격한다."
          shield: "큰 턱은 암석도 깨물어 부순다.\n사다이사로부터 알을\n지키기 위해 무리 지어 싸운다."
        zh_simp:
          sword: "在巢穴的深处产卵。\n受到熔蚁兽的袭击时会用\n大大的颚部咬住对方进行反击。"
          shield: "巨大的颚部能咬碎岩石。\n为了不让沙螺蟒把蛋抢走，\n会和其他同类一起并肩战斗。"
        zh_trad:
          sword: "在巢穴的深處產卵。\n受到熔蟻獸的襲擊時會用\n大大的顎部咬住對方進行反擊。"
          shield: "巨大的顎部能咬碎岩石。\n為了不讓沙螺蟒把蛋搶走，\n會和其他同類一起並肩戰鬥。"
