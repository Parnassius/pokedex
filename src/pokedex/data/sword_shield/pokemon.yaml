        jp_kanji:
          sword: "キバは　折れると　二度と　生えない。\n戦いが　終わると　河原の\n岩で　丁寧に　研ぐ。"
          shield: "鎧の　ように　硬い　皮膚。\n体当たりと　同時に　キバを\n突き刺す　戦法が　得意　だぞ。"
        en:
          sword: "After battle, this Pokémon carefully sharpens its\ntusks on river rocks. It needs to take care of its\ntusks—if one breaks, it will never grow back."
          shield: "Its skin is as hard as a suit of armor. Fraxure’s\nfavorite strategy is to tackle its opponents,\nstabbing them with its tusks at the same time."
        fr:
          sword: "Une fois cassés, ses crocs ne repoussent pas.\nAprès les combats, il les aiguise avec soin\nsur les pierres d’un ruisseau."
          shield: "Son épiderme est dur comme une armure.\nIl est passé maître dans l’art de charger l’ennemi\ntout en le transperçant de ses crocs."
        it:
          sword: "Se le sue zanne si spezzano, non ricrescono più.\nFinita la lotta le affila diligentemente con pietre\ndi fiume."
          shield: "La sua pelle è dura quanto una corazza.\nLa sua specialità è lanciarsi sull’avversario\ne infilzarlo con le zanne."
        de:
          sword: "Da seine Hauer nicht mehr nachwachsen, wetzt\nes sie nach einem Kampf behutsam an einem\ngeeigneten Felsen eines Flussbettes."
          shield: "Seine harte Haut schützt es wie eine Rüstung.\nEine seiner besten Taktiken besteht darin, Gegner\nbeim Tackle mit seinen Hauern zu durchbohren."
        es:
          sword: "Sus colmillos no vuelven a crecer, por lo que,\nal término de cada combate, los afila\ncuidadosamente con cantos de río."
          shield: "Su piel es dura como una coraza. Su técnica\npredilecta consiste en embestir al rival para\nhincarle los colmillos."
        ko:
          sword: "어금니는 부러지면 다시 나지 않는다.\n싸움이 끝나면 강가에 있는\n바위로 정성껏 손질한다."
          shield: "갑옷처럼 딱딱한 피부를 가졌다.\n몸통박치기와 동시에 어금니로\n찌르는 전법이 특기다."
        zh_simp:
          sword: "牙齿一旦折断就不会再次生长。\n战斗结束之后会用河滩上的\n岩石仔细地磨牙。"
          shield: "皮肤像盔甲一样坚硬。\n非常擅长在撞击的同时\n用牙齿猛刺的战法。"
        zh_trad:
          sword: "牙齒一旦折斷就不會再次生長。\n戰鬥結束之後會用河灘上的\n岩石仔細地磨牙。"
          shield: "皮膚像盔甲一樣堅硬。\n非常擅長在撞擊的同時\n用牙齒猛刺的戰法。"
haxorus:
  species_id: 612
  names:
    jp_kana: オノノクス
    jp_kanji: オノノクス
    en: Haxorus
    fr: Tranchodon
    it: Haxorus
    de: Maxax
    es: Haxorus
    ko: 액스라이즈
    zh_simp: 双斧战龙
    zh_trad: 雙斧戰龍
  forms:
    haxorus:
      form_id: 0
      base_stats:
        hp: 76
        attack: 147
        defense: 90
        special_attack: 60
        special_defense: 70
        speed: 97
      evs_yield:
        hp: 0
        attack: 3
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - dragon
      egg_groups:
        - monster
        - dragon
      abilities:
        - rivalry
        - mold_breaker
      hidden_ability: unnerve
      descriptions:
        jp_kana:
          sword: "がんじょうな　おおキバが　じまん。\nきょうどを　たもつため　つちを\nなめて　ミネラルを　ほきゅうする。"
          shield: "おんこうな　せいしつだが　おこると\nこわい。　てっこつをも　きりさく\nじまんの　キバを　おみまい　するぞ。"
        jp_kanji:
          sword: "頑丈な　大キバが　自慢。\n強度を　保つため　土を\n舐めて　ミネラルを　補給する。"
          shield: "温厚な　性質だが　怒ると\n怖い。　鉄骨をも　切り裂く\n自慢の　キバを　おみまい　するぞ。"
        en:
          sword: "Its resilient tusks are its pride and joy. It licks up\ndirt to take in the minerals it needs to keep its\ntusks in top condition."
          shield: "While usually kindhearted, it can be terrifying if\nangered. Tusks that can slice through steel beams\nare how Haxorus deals with its adversaries."
        fr:
          sword: "Ses longs crocs robustes sont sa plus grande\nfierté. Il lèche le sol pour en absorber\nles minéraux et ainsi renforcer sa dentition."
          shield: "D’un naturel doux, il est cependant redoutable\nlorsqu’il se fâche. Il est très fier de ses crocs\nqui peuvent même découper des poutres d’acier."
        it:
          sword: "Va fiero delle sue zanne grandi e robuste,\ne assorbe i minerali necessari a mantenerle\nin ottime condizioni leccando la terra."
          shield: "È di natura mite, ma se si arrabbia sono guai.\nLe zanne, di cui va fiero, possono fare a pezzi\nanche il cemento armato."
        de:
          sword: "Seine riesigen, robusten Hauer sind sein größter\nStolz. Es hält sie kräftig und gesund, indem es\nan Erde leckt, um Mineralstoffe aufzunehmen."
          shield: "Es ist von Natur aus sanftmütig, aber wehe dem,\nder es wütend macht. Seine Stoßzähne reißen\nselbst Stahlträger in Stücke."
        es:
          sword: "Su mayor baza son sus colmillos, de gran tamaño\ny robustez. Lame la tierra en busca de minerales\npara mantenerlos fuertes y resistentes."
          shield: "Amable por naturaleza, infunde auténtico pavor\nal enfadarse. Su mayor baza son los colmillos,\ncon los que puede cortar un armazón de acero."
        ko:
          sword: "튼튼하고 큰 어금니가 특징이다.\n강도를 유지하기 위해 흙을\n핥아서 미네랄을 보충한다."
          shield: "온화한 성격이지만 화가 나면\n무섭다. 철골도 베어 가르는\n튼튼한 어금니를 보여 줄 것이다."
        zh_simp:
          sword: "坚固的大牙是它的骄傲。\n为了保持牙齿的强度，\n会舔泥土来补充矿物质。"
          shield: "性格温和，但生起气来非常恐怖。\n会用自己那引以为傲，可以\n削铁如泥的牙齿攻击敌人。"
        zh_trad:
          sword: "堅固的大牙是牠的驕傲。\n為了保持牙齒的強度，\n會舔泥土來補充礦物質。"
          shield: "性情溫和，但生起氣來非常恐怖。\n會用自己那引以為傲，可以\n削鐵如泥的牙齒攻擊敵人。"
cubchoo:
  species_id: 613
  names:
    jp_kana: クマシュン
    jp_kanji: クマシュン
    en: Cubchoo
    fr: Polarhume
    it: Cubchoo
    de: Petznief
    es: Cubchoo
    ko: 코고미
    zh_simp: 喷嚏熊
    zh_trad: 噴嚏熊
  forms:
    cubchoo:
      form_id: 0
      base_stats:
        hp: 55
        attack: 70
        defense: 40
        special_attack: 60
        special_defense: 40
        speed: 40
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ice
      egg_groups:
        - field
      abilities:
        - snow_cloak
        - slush_rush
      hidden_ability: rattled
      descriptions:
        jp_kana:
          sword: "たいちょうが　いいと　はなみずの\nねばりけが　ます。　いやな　あいてに\nはなみずを　ぺとりと　なすりつける。"
          shield: "わざを　だすまえに　はなを　すする。\nはなみずに　ふくまれる　つよい\nれいきが　こおりの　わざの　もとだ。"
        jp_kanji:
          sword: "体調が　いいと　鼻水の\n粘り気が　増す。　嫌な　相手に\n鼻水を　ぺとりと　なすりつける。"
          shield: "技を　出す前に　鼻を　すする。\n鼻水に　含まれる　強い\n冷気が　氷の　技の　もとだ。"
        en:
          sword: "When this Pokémon is in good health, its snot\nbecomes thicker and stickier. It will smear its snot\non anyone it doesn’t like."
          shield: "It sniffles before performing a move, using its\nfrosty snot to provide an icy element to any\nmove that needs it."
        fr:
          sword: "Quand il est en forme, sa goutte au nez devient\nencore plus visqueuse. Il n’hésite pas à s’essuyer\nle nez sur un adversaire qui lui déplaît."
          shield: "Il renifle avant d’utiliser une capacité.\nLe froid intense contenu dans sa morve\nlui permet de lancer les capacités de type Glace."
        it:
          sword: "Se è in buona salute, la viscosità della goccia\nche gli fuoriesce dal naso aumenta. Se qualcuno\nnon gli va a genio, lo imbratta con il suo muco."
          shield: "Prima di sferrare una mossa, tira su con il naso.\nIl freddo intenso contenuto nel suo muco è alla\nbase delle sue mosse di tipo Ghiaccio."
        de:
          sword: "Fühlt es sich wohl, erhöht sich die Klebrigkeit\nseines Nasenschleims. Wer es verärgert, wird\ndamit angeschmiert."
          shield: "Es zieht vor jeder Attacke die Nase hoch. Die\nextreme Kälte in seinem Nasenschleim liefert\ndie Energie für seine Eis-Attacken."
        es:
          sword: "La pegajosidad de sus mocos aumenta cuando\ndisfruta de buena salud. Si alguien no le gusta,\nlo embadurna de mocos."
          shield: "Antes de ejecutar un movimiento, se sorbe los\nmocos. El frío intenso de estos constituye la base\nde sus movimientos de tipo Hielo."
        ko:
          sword: "컨디션이 좋으면 콧물의 점성이\n더해진다. 싫어하는 상대에게는\n콧물을 슥 문지른다."
          shield: "기술을 사용하기 전에 코를 훌쩍인다.\n콧물에 포함된 강한 냉기가\n얼음 기술의 근원이다."
        zh_simp:
          sword: "健康时鼻涕的粘度会变强。\n只要遇到自己讨厌的对手，\n就会把鼻涕擦到对方身上。"
          shield: "使出招式前会先倒吸鼻涕。\n鼻涕里所含有的强烈冷气\n是冰属性招式的能量来源。"
        zh_trad:
          sword: "健康時鼻涕的黏度會變強。\n只要遇到自己討厭的對手，\n就會把鼻涕擦到對方身上。"
          shield: "使出招式前會先倒吸鼻涕。\n鼻涕裡所含有的強烈冷氣\n是冰屬性招式的能量來源。"
beartic:
  species_id: 614
  names:
    jp_kana: ツンベアー
    jp_kanji: ツンベアー
    en: Beartic
    fr: Polagriffe
    it: Beartic
    de: Siberio
    es: Beartic
    ko: 툰베어
    zh_simp: 冻原熊
    zh_trad: 凍原熊
  forms:
    beartic:
      form_id: 0
      base_stats:
        hp: 95
        attack: 130
        defense: 80
        special_attack: 70
        special_defense: 80
        speed: 50
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ice
      egg_groups:
        - field
      abilities:
        - snow_cloak
        - slush_rush
      hidden_ability: swift_swim
      descriptions:
        jp_kana:
          sword: "といきを　こおらせ　つくった　キバは\nはがねより　かたい。　さむい　うみを\nエサを　さがして　およぎまわる。"
          shield: "つめたい　うみを　げんきに　およぐ。\nつかれたときは　といきで　かいすいを\nこおらせて　そのうえで　やすむぞ。"
        jp_kanji:
          sword: "吐息を　凍らせ　つくった　キバは\n鋼より　硬い。　寒い　海を\nエサを　探して　泳ぎまわる。"
          shield: "冷たい　海を　元気に　泳ぐ。\n疲れたときは　吐息で　海水を\n凍らせて　その上で　休むぞ。"
        en:
          sword: "It swims through frigid seas, searching for prey.\nFrom its frozen breath, it forms icy fangs that\nare harder than steel."
          shield: "It swims energetically through frigid seas.\nWhen it gets tired, it freezes the seawater\nwith its breath so it can rest on the ice."
        fr:
          sword: "Les crocs qu’il façonne en gelant son souffle\nsont plus durs que l’acier. Il sillonne les eaux\ndes mers glaciales à la recherche de nourriture."
          shield: "Il sillonne les mers glaciales avec aisance.\nQuand il est fatigué, il gèle l’eau de mer\nd’un souffle et se repose sur l’iceberg improvisé."
        it:
          sword: "Le zanne che crea congelando il suo respiro\nsono più dure dell’acciaio. Nuota nelle acque\ngelide del mare in cerca di cibo."
          shield: "Nuota tranquillo nelle acque gelide del mare.\nSe è stanco, congela l’acqua con il suo soffio\nglaciale creando una piattaforma su cui riposare."
        de:
          sword: "Die Reißzähne, die es aus gefrorenem Atem\nerzeugt hat, sind härter als Stahl. Es schwimmt\nauf der Suche nach Futter durch die Eismeere."
          shield: "Es schwimmt fröhlich durch kalte Meere. Wenn\nes müde wird, gefriert es mit seinem Eisatem die\nWasseroberfläche und ruht sich darauf aus."
        es:
          sword: "Congela su aliento y crea colmillos de hielo más\nduros que el acero. Nada en mares de aguas frías\nen busca de alimento."
          shield: "Nada plácidamente en mares fríos. Cuando se\ncansa, congela el agua con su aliento y reposa\nsobre el hielo."
        ko:
          sword: "숨결을 얼려서 만든 송곳니는\n강철보다도 단단하다. 먹이를 찾아\n추운 바다를 헤엄쳐 다닌다."
          shield: "차가운 바다에서 씩씩하게 헤엄친다.\n지치면 한숨을 내쉬어 바다를\n얼린 뒤 그 위에서 쉰다."
        zh_simp:
          sword: "吐出的气息冻结而成的冰牙\n比钢铁还硬。为了寻找食物，\n会在寒冷的海里游动徘徊。"
          shield: "在冰冷的大海里精力十足地游泳。\n感到疲劳的时候会吐出气息\n冻结海水，在冰面上休息。"
        zh_trad:
          sword: "吐出的氣息凍結而成的冰牙\n比鋼鐵還硬。為了尋找食物，\n會在寒冷的海裡游動徘徊。"
          shield: "在冰冷的大海裡精力十足地游泳。\n感到疲勞的時候會吐出氣息\n凍結海水，在冰面上休息。"
