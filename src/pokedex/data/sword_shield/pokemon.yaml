        - swift_swim
        - water_veil
      hidden_ability: lightning_rod
      held_items:
        rare: mystic_water
      descriptions:
        jp_kana:
          sword: "あきになると　プロポーズのため\nからだに　あぶらが　のってきて\nとても　きれいないろに　へんかする。"
          shield: "ツノで　かわぞこの　いわを　くりぬき\nすをつくるのは　うみつけた　タマゴが\nながされないように　するためだ。"
        jp_kanji:
          sword: "秋になると　プロポーズのため\n体に　脂が　のってきて\nとても　きれいな色に　変化する。"
          shield: "ツノで　川底の　岩を　くりぬき\n巣をつくるのは　産みつけた　タマゴが\n流されないように　するためだ。"
        en:
          sword: "In autumn, its body becomes more fatty in\npreparing to propose to a mate. It takes on\nbeautiful colors."
          shield: "Using its horn, it bores holes in riverbed\nboulders, making nests to prevent its eggs from\nwashing away."
        fr:
          sword: "En automne, à la saison des amours, il fait\ndes réserves de graisse et arbore des couleurs\nchatoyantes."
          shield: "S’il fait des trous dans les rochers avec sa corne\npour bâtir son nid, c’est pour éviter que ses Œufs\nne soient emportés par les flots."
        it:
          sword: "In autunno ingrassa in previsione della stagione\ndegli amori e assume colori sgargianti."
          shield: "Perfora con il suo corno le rocce sul letto dei\nfiumi, costruendo tane che proteggono le Uova\ndalla corrente."
        de:
          sword: "Im Herbst legt es an Gewicht zu und erscheint\nin prächtigen Farben, um so einen Partner\nanzulocken."
          shield: "Es laicht in Löchern, die es mit seinem Horn in\nFelsen des Flussbettes gebohrt hat, damit seine\nEier nicht vom Wasser fortgespült werden."
        es:
          sword: "En otoño gana algo de peso para atraer a\nposibles parejas y se cubre de llamativos colores."
          shield: "Perfora las piedras del lecho del río con su\ncuerno para hacer un nido y que la corriente\nno arrastre sus huevos."
        ko:
          sword: "가을이 되면 짝짓기를 위해\n몸에 윤기가 돌게 되며\n매우 아름다운 색으로 변화한다."
          shield: "뿔로 강바닥의 바위를 파헤쳐\n둥지를 만드는 이유는 낳은 알이\n떠내려가지 않도록 하기 위함이다."
        zh_simp:
          sword: "到了秋天，体内的脂肪\n会因为要去求偶而增加，\n颜色也会变得非常漂亮。"
          shield: "金鱼王之所以会用角挖穿\n河底的岩石来筑巢，是为了\n防止产下的卵被水流冲走。"
        zh_trad:
          sword: "到了秋天，體內的脂肪\n會因為要求偶而增加，\n體色也會變得非常漂亮。"
          shield: "金魚王之所以會用角挖穿\n河底的岩石來築巢，是為了\n防止產下的卵被水流沖走。"
staryu:
  species_id: 120
  names:
