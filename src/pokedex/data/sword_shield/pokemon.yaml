          shield: "ぜんしんを　よろいのような　ひふで\nまもっている。　２０００どの\nマグマの　なかでも　いきられる。"
        jp_kanji:
          sword: "進化して　後ろ足だけで\n立つようになった。　ツノで　突くと\n岩石にも　穴を　開けてしまう。"
          shield: "全身を　よろいのような　皮膚で\n守っている。　２０００度の\nマグマの　中でも　生きられる。"
        en:
          sword: "It begins walking on its hind legs after evolution.\nIt can punch holes through boulders with its horn."
          shield: "Protected by an armor-like hide, it is capable of\nliving in molten lava of 3,600 degrees Fahrenheit."
        fr:
          sword: "L’évolution a permis à ce Pokémon de marcher\nsur ses pattes postérieures. Il peut faire des trous\ndans les rochers en utilisant sa corne."
          shield: "Son épiderme est si épais qu’il lui permet même\nde survivre dans du magma d’une température\nde 2 000 °C."
        it:
          sword: "Dopo l’evoluzione inizia a muoversi sulle zampe\nposteriori. Con il corno può perforare la roccia."
          shield: "La sua pelle, simile a un’armatura, lo protegge\nconsentendogli di vivere nel magma a 2.000 ºC."
        de:
          sword: "Nach seiner Entwicklung geht es aufrecht auf\nseinen Hinterbeinen. Mit seinem Horn kann es\nLöcher in Felsen bohren."
          shield: "Sein ganzer Körper ist von einer panzerähnlichen\nHaut geschützt. Es kann sogar in bis zu 2 000 ºC\nheißer Lava leben."
        es:
          sword: "Cuando evoluciona, comienza a andar con las\npatas traseras. Es capaz de horadar rocas con el\ncuerno que tiene."
          shield: "La piel le sirve de escudo protector. Puede vivir\nen lava líquida a 2000 °C."
        ko:
          sword: "진화하여 뒷다리만으로\n서게 되었다. 뿔로 찌르면\n암석에도 구멍이 뚫리고 만다."
          shield: "전신을 갑옷 같은 피부로\n보호하고 있다. 2000도의\n마그마 속에서도 살 수 있다."
        zh_simp:
          sword: "进化后会变得仅用后脚就能站立。\n如果被它的角刺中，\n就连岩石也会被开个洞。"
          shield: "全身被铠甲般的皮肤保护着。\n甚至能在２０００度的熔岩里生存。"
        zh_trad:
          sword: "進化後變得只用後腳就能站立。\n如果被牠的角刺中，\n就連岩石也會被開出洞來。"
          shield: "全身被鎧甲般的皮膚\n保護著。甚至能在\n２０００度的熔岩中生存。"
