      descriptions:
        jp_kana:
          sword: "つきの　みちかけと　パワーの\nぞうげんが　かんけい　しているらしく\nまんげつの　よる　かっぱつになる。"
          shield: "４０ねんまえに　いんせきの　おちた\nばしょで　はじめて　みつかった。\nにらむ　だけで　てきを　ねむらせる。"
        jp_kanji:
          sword: "月の　満ち欠けと　パワーの\n増減が　関係　しているらしく\n満月の　夜　活発になる。"
          shield: "４０年前に　隕石の　落ちた\n場所で　初めて　見つかった。\nにらむ　だけで　敵を　眠らせる。"
        en:
          sword: "The phase of the moon apparently has some\neffect on its power. It’s active on the night of\na full moon."
          shield: "It was discovered at the site of a meteor strike\n40 years ago. Its stare can lull its foes to sleep."
        fr:
          sword: "Sa force est liée au cycle lunaire.\nIl est surtout actif les soirs de pleine lune."
          shield: "Il a été découvert dans le cratère d’une météorite\nil y a 40 ans. Un simple regard de sa part\nendort ses ennemis."
        it:
          sword: "La sua forza sembra aumentare o diminuire\na seconda delle fasi lunari. È più attivo nelle\nnotti di luna piena."
          shield: "Fu scoperto 40 anni fa nella zona d’impatto\ndi un meteorite. Può addormentare il nemico\ncon il solo sguardo."
        de:
          sword: "Anscheinend steht die Zunahme seiner Kraft mit\nden Mondphasen in Verbindung, da es bei\nVollmond aktiv wird."
          shield: "Es wurde erstmals vor 40 Jahren bei einem\nMeteoritenkrater entdeckt. Gegner versetzt es\nallein mit seinem Blick in Schlaf."
        es:
          sword: "Se piensa que las fases lunares tienen relación\ncon la fluctuación de su poder. Se vuelve activo\nlas noches de luna llena."
          shield: "Fue descubierto hace 40 años en el lugar donde\nhabía caído un meteorito. Le basta fulminar a sus\nenemigos con la mirada para dormirlos."
        ko:
          sword: "달의 차고 기욺과 힘의\n증감이 관계하고 있는 듯\n보름달 밤에 활발해진다."
          shield: "40년 전에 운석이 떨어진\n장소에서 처음 발견되었다.\n노려보기만 해도 적을 잠들게 한다."
        zh_simp:
          sword: "月亮的盈缺似乎会\n影响它力量的增减。\n每到满月之夜就会变得活跃。"
          shield: "第一次发现它是在\n４０年前陨石坠落的地方。\n只要注视敌人就能使其入睡。"
        zh_trad:
          sword: "月亮的盈虧似乎會\n影響牠力量的增減。\n每到滿月之夜就會變得活躍。"
          shield: "在４０年前隕石墜落的\n地點第一次被發現。\n瞪一眼就能使敵人沉睡。"
solrock:
