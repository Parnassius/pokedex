        jp_kana:
          sword: "いつか　そらを　とぶために　まいにち\nがけから　とびおりて　からだを\nきたえる　くんれんを　つづけている。"
          shield: "むれを　つくらず　１ぴきで　くらす。\nいちげきで　かたい　がんせきを\nまっぷたつにする　いしあたまをもつ。"
        jp_kanji:
          sword: "いつか　空を　飛ぶために　毎日\n崖から　飛び降りて　体を\n鍛える　訓練を　続けている。"
          shield: "群れを　つくらず　１匹で　暮らす。\n一撃で　硬い　岩石を\n真っ二つにする　石頭をもつ。"
        en:
          sword: "Bagon jumps off cliffs every day, trying to\ngrow stronger so that someday it will be able\nto fly."
          shield: "Bagon is a solitary Pokémon that doesn’t form\ngroups with others of its kind. It also has a head\nhard enough to cleave a boulder in one strike."
        fr:
          sword: "Tous les jours, il se jette du haut d’une falaise\npour renforcer son corps, dans l’espoir de\npouvoir voler un jour."
          shield: "La tête de ce Pokémon solitaire est si solide\nqu’il est capable de fendre en deux un rocher\nd’un seul coup."
        it:
          sword: "Tempra il suo corpo ogni giorno gettandosi\nin un precipizio, nella speranza di riuscire\na volare, prima o poi."
          shield: "Vive in solitudine senza formare branchi.\nÈ dotato di una testa così dura da poter spaccare\nin due rocce granitiche con un solo colpo."
        de:
          sword: "In der Hoffnung, eines Tages fliegen zu können,\nstürzt es sich täglich von Klippen, um seinen\nKörper zu stählen."
          shield: "Es lebt in Einsamkeit, ohne Gruppen zu bilden.\nSein steinharter Schädel kann mit einem Schlag\neinen massiven Felsen entzweihauen."
        es:
          sword: "En su afán por volar, fortalece su cuerpo a diario\nsaltando desde acantilados."
          shield: "Vive en solitario, sin formar manadas, y posee\nuna cabeza dura como la piedra que le permite\nhacer añicos rocas enormes de un solo golpe."
        ko:
          sword: "언젠가 하늘을 날기 위해\n매일같이 절벽에서 뛰어내리며\n몸을 단련하는 훈련을 계속하고 있다."
          shield: "무리를 짓지 않고 혼자서 지낸다.\n단단한 화석을 단 일격으로\n두 동강 내버리는 돌머리를 가졌다."
        zh_simp:
          sword: "为了有一天能翱翔天空，\n每天都从悬崖上跳下来，\n坚持训练锻炼身体。"
          shield: "不会成群结队，喜欢单独生活。\n脑袋很硬，只要猛地一撞，\n就能把坚硬的岩石一分为二。"
        zh_trad:
          sword: "為了有朝一日能在天空翱翔，\n牠每天都會從懸崖上跳下來，\n藉此不斷地鍛鍊自己的身體。"
          shield: "不集結成群，而是單獨生活。\n擁有硬得不得了的頭部，能夠\n一擊就把堅硬的岩石撞成兩半。"
