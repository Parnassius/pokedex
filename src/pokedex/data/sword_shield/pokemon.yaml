        - amorphous
      abilities:
        - weak_armor
      hidden_ability: cursed_body
      descriptions:
        jp_kana:
          sword: "アンティークの　ポットに　すみつく。\nほとんどが　がんさくだが　ごくまれに\nしんさくが　みつかる　ことも。"
          shield: "のこされた　こうちゃを　みかけると\nじぶんの　からだを　そそぎこむ。\nその　こうちゃは　ポットデスになる。"
        jp_kanji:
          sword: "アンティークの　ポットに　棲みつく。\nほとんどが　贋作だが　ごくまれに\n真作が　見つかる　ことも。"
          shield: "残された　紅茶を　見かけると\n自分の　体を　注ぎこむ。\nその　紅茶は　ポットデスになる。"
        en:
          sword: "This species lives in antique teapots.\nMost pots are forgeries, but on rare occasions,\nan authentic work is found."
          shield: "Leaving leftover black tea unattended is asking\nfor this Pokémon to come along and pour itself\ninto it, turning the tea into a new Polteageist."
        fr:
          sword: "Il élit domicile dans des théières antiques.\nLa plupart sont des contrefaçons, mais il lui arrive\ndans de très rares cas de trouver des originaux."
          shield: "Dès qu’il voit un reste de thé noir, il se verse\ndedans pour donner naissance à un Polthégeist."
        it:
          sword: "Prende dimora in una teiera antica. Quelle\nin circolazione sono quasi tutte contraffatte,\nma a volte ne trova una autentica."
          shield: "Se trova una tazza di tè abbandonata, ci versa\ndentro un po’ del suo corpo per far nascere\nun Polteageist."
        de:
          sword: "Sie lassen sich in alten Teekannen nieder. Die\nmeisten dieser Kannen sind billige Fälschungen,\naber es gibt auch ein paar sehr seltene Originale."
          shield: "Entdeckt es zurückgelassenen Schwarztee, so\ngießt es seinen Körper hinein. Der Tee wird dann\nzu einem Mortipot."
        es:
          sword: "Se hospeda en teteras dignas de un anticuario.\nLas originales son escasísimas, pero existe un\ngran número de burdas falsificaciones."
          shield: "Si avista una taza de té abandonada a su suerte,\nla rellena vertiendo parte de su propio cuerpo\npara generar otro Polteageist."
        ko:
          sword: "앤티크한 찻주전자에 산다.\n대부분 위작이지만 매우 드물게\n진품이 발견되기도 한다."
          shield: "남겨진 홍차를 발견하면\n자신의 몸을 흘러 들어가게 한다.\n그 홍차는 포트데스가 된다."
        zh_simp:
          sword: "住在古董茶壶里。\n虽然大多数都是赝品，\n但偶尔也能发现真货。"
          shield: "每当发现喝剩的红茶，\n它就会把自己的身体倒进去，\n让那壶红茶变成怖思壶。"
        zh_trad:
          sword: "住在古董茶壺裡。\n雖然大多數都是贗品，\n但偶爾也能發現真貨。"
          shield: "每當發現喝剩的紅茶，\n牠就會把自己的身體倒進去，\n讓那壺紅茶變成怖思壺。"
    polteageist_antique_form:
      form_id: 1
      base_stats:
        hp: 60
        attack: 65
        defense: 65
        special_attack: 134
        special_defense: 114
        speed: 70
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 2
        special_defense: 0
        speed: 0
      types:
        - ghost
      egg_groups:
        - mineral
        - amorphous
      abilities:
        - weak_armor
      hidden_ability: cursed_body
      descriptions:
        jp_kana:
          sword: "とても　どくとくな　あじと　かおり。\nしんらいする　トレーナーには　すこし\nだけ　あじみを　ゆるして　くれる。"
          shield: "おこると　おちゃの　からだを　あいての\nくち　めがけて　とばす。　のみこむと\nはげしい　おかんに　おそわれるぞ。"
        jp_kanji:
          sword: "とても　独特な　味と　香り。\n信頼する　トレーナーには　すこし\nだけ　味見を　ゆるして　くれる。"
          shield: "怒ると　お茶の　体を　相手の\n口　めがけて　飛ばす。　飲みこむと\nはげしい　悪寒に　襲われるぞ。"
        en:
          sword: "Trainers Polteageist trusts will be allowed to\nexperience its distinctive flavor and aroma\nfirsthand by sampling just a tiny bit of its tea."
          shield: "When angered, it launches tea from its body\nat the offender’s mouth. The tea causes\nstrong chills if swallowed."
        fr:
          sword: "Son goût et son parfum sont très particuliers.\nSeuls les Dresseurs en lesquels il a entièrement\nconfiance sont autorisés à en boire une gorgée."
          shield: "Quand il s’énerve, il se jette corps et thé\ndans la bouche de son ennemi. Si ce dernier\nl’avale, il sera pris de terribles tremblements."
        it:
          sword: "Ha un gusto e un profumo molto particolari.\nSe si fida del suo Allenatore, gli concede un\npiccolo assaggio."
          shield: "Quando si arrabbia, lancia il suo corpo fatto\ndi tè mirando alla bocca dell’avversario. Chi lo\ningerisce è scosso da violenti brividi di febbre."
        de:
          sword: "Es schmeckt und riecht sehr markant. Wenn es\nseinem Trainer vertraut, lässt es ihn manchmal\nein klitzekleines Schlückchen probieren."
          shield: "Ist es wütend, schießt es seinen Körper aus Tee in\nden Mund des Gegners. Verschluckt ihn dieser,\nwird er von schlimmem Schüttelfrost heimgesucht."
        es:
          sword: "Tiene un sabor y un aroma sumamente singulares.\nSi su Entrenador se hace pleno merecedor de su\nconfianza, le permite catarlo ligeramente."
          shield: "Si se enfada, el té que conforma su cuerpo se\nlanza a la boca del rival. El desdichado que lo\ningiera sufrirá violentos escalofríos."
        ko:
          sword: "매우 독특한 맛과 향을 가졌다.\n신뢰하는 트레이너에게는\n살짝 맛볼 기회를 준다."
          shield: "화가 나면 차로 된 몸을\n상대의 입으로 날린다.\n마신 상대는 격렬한 오한에 휩싸인다."
        zh_simp:
          sword: "口感和香味十分独特。\n会让自己信赖的训练家\n稍稍地品尝一下味道。"
          shield: "生气时会朝对方的嘴里\n喷射自己茶一样的身体。\n一旦喝下便会遭到恶寒侵袭。"
        zh_trad:
          sword: "口感和香味十分獨特。\n會讓自己信賴的訓練家\n稍稍品嚐一下味道。"
          shield: "生氣時會朝對方的嘴裡\n噴射自己茶一樣的身體。\n一旦喝下便會遭到惡寒侵襲。"
hatenna:
  species_id: 856
  names:
    jp_kana: ミブリム
    jp_kanji: ミブリム
    en: Hatenna
    fr: Bibichut
    it: Hatenna
    de: Brimova
    es: Hatenna
    ko: 몸지브림
    zh_simp: 迷布莉姆
    zh_trad: 迷布莉姆
  forms:
    hatenna:
      form_id: 0
      base_stats:
        hp: 42
        attack: 30
        defense: 45
        special_attack: 56
        special_defense: 53
        speed: 39
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 1
        special_defense: 0
        speed: 0
      types:
        - psychic
      egg_groups:
        - fairy
      abilities:
        - healer
        - anticipation
      hidden_ability: magic_bounce
      descriptions:
        jp_kana:
          sword: "あたまの　とっきで　せいぶつの\nきもちを　かんじとる。　おだやかな\nものにしか　こころを　ひらかない。"
          shield: "ひとけの　ない　ばしょが　すき。\nつよい　かんじょうを　かんじとると\nいちもくさんに　にげだしてしまう。"
        jp_kanji:
          sword: "頭の　突起で　生物の\n気持ちを　感じとる。　穏やかな\nものにしか　心を　開かない。"
          shield: "人気の　ない　場所が　好き。\n強い　感情を　感じとると\n一目散に　逃げ出してしまう。"
        en:
          sword: "Via the protrusion on its head, it senses other\ncreatures’ emotions. If you don’t have a calm\ndisposition, it will never warm up to you."
          shield: "If this Pokémon senses a strong emotion, it\nwill run away as fast as it can. It prefers areas\nwithout people."
        fr:
          sword: "La protubérance sur sa tête lui permet\nde percevoir les émotions des êtres vivants.\nIl n’accorde sa confiance qu’aux gens calmes."
          shield: "Il aime les lieux inhabités.\nS’il perçoit des émotions trop fortes,\nil s’enfuit aussi vite que possible."
        it:
          sword: "Percepisce lo stato d’animo degli esseri viventi\ntramite la protuberanza sulla testa. Apre il suo\ncuore solo alle persone di indole pacifica."
          shield: "Gli piacciono i luoghi disabitati. Se percepisce\nla presenza di emozioni forti, se la dà a gambe\nlevate."
        de:
          sword: "Mit dem Fortsatz an seinem Kopf kann es die\nGefühle von Lebewesen wahrnehmen. Es öffnet\nnur geruhsam veranlagten Leuten sein Herz."
          shield: "Es liebt Orte, wo sonst niemand ist. Nimmt es\nstarke Emotionen wahr, macht es sich so schnell\nes kann aus dem Staub."
        es:
          sword: "Percibe los sentimientos de los seres vivos con la\nprotuberancia de la cabeza. Solo abre su corazón\na quienes muestren un carácter sosegado."
          shield: "Siente predilección por los lugares despoblados.\nSi percibe una emoción intensa, emprende la\nhuida a toda prisa."
        ko:
          sword: "머리의 돌기로 생물의\n기분을 감지한다. 온화한\n자에게만 마음을 연다."
          shield: "인적이 드문 곳을 좋아한다.\n강한 감정이 느껴지면\n쏜살같이 도망쳐버린다."
        zh_simp:
          sword: "通过头部的突起物\n来感应生物的情感。\n只对温和的人敞开心扉。"
          shield: "喜欢没有人烟的地方。\n一旦感觉到强烈的感情，\n就会一溜烟地逃走。"
        zh_trad:
          sword: "透過頭部的突起物\n來感應生物的情感。\n只對溫和的人敞開心扉。"
          shield: "喜歡沒有人煙的地方。\n一旦感覺到強烈的情感，\n就會一溜煙地逃走。"
hattrem:
  species_id: 857
  names:
    jp_kana: テブリム
    jp_kanji: テブリム
    en: Hattrem
    fr: Chapotus
    it: Hattrem
    de: Brimano
    es: Hattrem
    ko: 손지브림
    zh_simp: 提布莉姆
    zh_trad: 提布莉姆
  forms:
    hattrem:
      form_id: 0
      base_stats:
        hp: 57
        attack: 40
        defense: 65
        special_attack: 86
        special_defense: 73
        speed: 49
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 2
        special_defense: 0
        speed: 0
      types:
        - psychic
      egg_groups:
        - fairy
      abilities:
        - healer
        - anticipation
      hidden_ability: magic_bounce
      descriptions:
        jp_kana:
          sword: "つよい　かんじょうを　もつ　ものは\nそれが　だれであれ　だまらせる。\nそのしゅだんは　じつに　らんぼう。"
          shield: "あたまのフサで　あいてを　なぐり\nだまらせる。　プロボクサーさえ\nいっぱつ　ＫＯの　はかいりょく。"
        jp_kanji:
          sword: "強い　感情を　もつ　ものは\nそれが　誰であれ　黙らせる。\nその手段は　じつに　乱暴。"
          shield: "頭の房で　相手を　殴り\n黙らせる。　プロボクサーさえ\n一発　ＫＯの　破壊力。"
        en:
          sword: "No matter who you are, if you bring strong\nemotions near this Pokémon, it will silence\nyou violently."
          shield: "Using the braids on its head, it pummels foes to\nget them to quiet down. One blow from those\nbraids would knock out a professional boxer."
        fr:
          sword: "S’il ressent des émotions trop fortes, il en fera\ntaire la source, quelle qu’elle soit, en utilisant\ndes méthodes assez violentes."
          shield: "Il frappe ses ennemis avec ses tresses pour les\nfaire taire. Sa puissance est telle qu’il peut mettre\nK.O. un boxeur professionnel d’un seul coup."
        it:
          sword: "Se qualcuno esterna emozioni troppo forti,\nlo affronta immediatamente e lo mette a\ntacere senza tanti convenevoli."
          shield: "Zittisce gli avversari colpendoli con le nappe che\nha ai lati della testa. È così forte da mandare KO\ncon un colpo anche un pugile professionista."
        de:
          sword: "Empfindet jemand starke Emotionen, bringt es\nihn auf gewaltsame Art zum Schweigen, egal,\num wen es sich dabei handelt."
          shield: "Ein Schlag mit den Quasten an seinem Kopf\nbringt Gegner zum Schweigen. Ein Treffer genügt,\num einen Profiboxer auf die Bretter zu schicken."
        es:
          sword: "Silencia a cualquiera que muestre una emoción\nintensa sin importar de quién se trate y recurre\npara ello a métodos a cuál más violento."
          shield: "Silencia al objetivo atizándole con los mechones.\nDespliega una potencia devastadora capaz de\nnoquear a un boxeador profesional."
        ko:
          sword: "강한 감정을 품은 자라면\n누가 됐든 조용하게 만드는데\n그 수단이 매우 난폭하다."
          shield: "머리의 술로 상대를 때려\n꼼짝 못 하게 한다. 프로복서조차\n한 방에 KO되는 파괴력이다."
        zh_simp:
          sword: "遇到情绪激昂的对手时，\n无论对方是谁，都会用\n粗暴的方式使其沉默。"
          shield: "会用头上的辫子攻击对手，\n让对方安静下来。破坏力\n强到能一击ＫＯ职业拳击手。"
        zh_trad:
          sword: "遇到情緒激昂的對手時，\n無論對方是誰，都會用\n粗暴的方式使其沉默。"
          shield: "會用頭上的辮子攻擊對手，\n讓對方安靜下來。破壞力\n強到能一擊ＫＯ職業拳擊手。"
hatterene:
  species_id: 858
  names:
    jp_kana: ブリムオン
    jp_kanji: ブリムオン
    en: Hatterene
    fr: Sorcilence
    it: Hatterene
    de: Silembrim
    es: Hatterene
    ko: 브리무음
    zh_simp: 布莉姆温
    zh_trad: 布莉姆溫
