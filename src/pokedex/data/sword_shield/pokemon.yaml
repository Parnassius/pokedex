      descriptions:
        jp_kana:
          sword: "たさいな　きのうを　かくしもつ。\nゆびから　みずを　ふんしゃして\nせなかの　ひまくで　かぜに　のる。"
          shield: "ゆびさきから　はなつ　みずでっぽうは\nマッハ３の　はやさ。　しゅんまくで\nきゅうしょを　みぬいて　うちぬくぞ。"
        jp_kanji:
          sword: "多彩な　機能を　隠し持つ。\n指から　水を　噴射して\n背中の　皮膜で　風に　乗る。"
          shield: "指先から　放つ　水鉄砲は\nマッハ３の　速さ。　瞬膜で\n急所を　見抜いて　撃ちぬくぞ。"
        en:
          sword: "It has many hidden capabilities, such as fingertips\nthat can shoot water and a membrane on its back\nthat it can use to glide through the air."
          shield: "Its nictitating membranes let it pick out foes’\nweak points so it can precisely blast them with\nwater that shoots from its fingertips at Mach 3."
        fr:
          sword: "Il a plus d’un tour dans son sac : il peut tirer\ndes gerbes d’eau du bout de ses doigts et planer\ndans les airs grâce à ses membranes dorsales."
          shield: "Il repère le point faible de l’ennemi grâce à sa\nmembrane nictitante, puis il transperce sa cible en\ntirant des jets d’eau à Mach 3 du bout des doigts."
        it:
          sword: "Ha vari assi nella manica. Emette getti d’acqua\ndalle dita e si fa trasportare dal vento grazie\nalla membrana che ha sulla schiena."
          shield: "Spara getti d’acqua dalla punta delle dita a una\nvelocità di Mach 3. Grazie alle sue membrane\nnittitanti individua i punti deboli del nemico."
        de:
          sword: "Zu seinen vielen geheimen Talenten gehört es,\nWasser aus den Fingern zu schießen und mit der\nMembran am Rücken durch die Lüfte zu segeln."
          shield: "Die Wasserschüsse aus seinen Fingern erreichen\nGeschwindigkeiten von bis zu Mach 3. Mit seiner\nNickhaut erkennt es Schwachpunkte des Gegners."
        es:
          sword: "Esconde algunos trucos bajo la manga: puede\ndisparar agua por los dedos o planear con las\nmembranas de su espalda."
          shield: "Dispara chorros de agua por la punta de los\ndedos a 3 mach de velocidad. Con su membrana\nnictitante puede ver los puntos débiles del rival."
        ko:
          sword: "다채로운 기능을 숨기고 있다.\n손끝에서 물을 분사하고\n등에 있는 피막으로 바람을 탄다."
          shield: "손가락 끝에서 마하3의 스피드로\n물대포를 쏜다. 눈의 얇은 막으로\n급소를 간파해 꿰뚫어버린다."
        zh_simp:
          sword: "身上隐藏着多种特殊能力，\n例如从手指喷射水流，\n以及用背部的翼膜滑翔等等。"
          shield: "能从指尖射出速度高达３马赫\n的水枪。它的瞬膜能帮助它看穿\n敌人的弱点，准确地击中要害。"
        zh_trad:
          sword: "身上隱藏著多種特殊能力，\n例如從手指噴射水流，\n以及用背部的翼膜滑翔等等。"
          shield: "能從指尖射出速度高達３馬赫\n的水槍。牠的瞬膜能幫助牠看穿\n敵人的弱點，準確地擊中要害。"
