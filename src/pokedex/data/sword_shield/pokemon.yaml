          sword: "いいつけを　まもらない　こどもを\nみつけると　よなかに　どこかへ\nつれて　いくと　いわれている。"
          shield: "すがたを　とうめいに　して　そっと\nえものに　ちかよる。　あつい　カベを\nとおりぬける　のうりょくを　もつ。"
        jp_kanji:
          sword: "いいつけを　守らない　子供を\n見つけると　夜中に　どこかへ\n連れていくと　いわれている。"
          shield: "姿を　透明に　して　そっと\n獲物に　近寄る。　厚い　壁を\n通りぬける　能力を　もつ。"
        en:
          sword: "If it finds bad children who won’t listen to their\nparents, it will spirit them away—or so it’s said."
          shield: "Making itself invisible, it silently sneaks up to\nprey. It has the ability to slip through thick walls."
        fr:
          sword: "On dit que ce Pokémon emporte les enfants\ndésobéissants à la nuit tombée."
          shield: "Ce Pokémon devient invisible pour se rapprocher\nfurtivement de ses proies.\nIl a le pouvoir de traverser les murs."
        it:
          sword: "Si racconta che questo Pokémon porti via nella\nnotte i bambini che sono stati disobbedienti."
          shield: "Si avvicina alla preda rendendosi invisibile.\nHa la capacità di passare attraverso spesse\npareti."
        de:
          sword: "Man sagt, es suche sich unartige Kinder und\nverschleppe sie nachts an einen unbekannten Ort."
          shield: "Es macht sich unsichtbar, um sich an seine Beute\nanzuschleichen. Außerdem kann es durch dicke\nWände gehen."
        es:
          sword: "Corre el rumor de que, por las noches, se lleva a\nlos niños que no son obedientes."
          shield: "Se vuelve invisible para acercarse sigilosamente\na su presa. Es capaz de atravesar anchos muros."
        ko:
          sword: "말을 잘 안 듣는 아이를\n발견하면 한밤중에 어딘가로\n데려간다고 전해진다."
          shield: "모습을 투명하게 하고 몰래\n먹잇감에 다가간다. 두꺼운 벽을\n통과하는 능력을 지녔다."
        zh_simp:
          sword: "据说，一旦发现不听话的孩子，\n就会在深夜将其带去某个地方。"
          shield: "会让身体变透明，\n然后偷偷地靠近猎物。\n拥有穿过厚墙壁的能力。"
        zh_trad:
          sword: "據說一旦發現不聽話的孩子，\n牠就會在深夜裡把那個孩子\n帶去某個不知名的地方。"
          shield: "會讓身體變透明，\n然後偷偷地靠近獵物。\n擁有穿過厚牆壁的能力。"
dusclops:
