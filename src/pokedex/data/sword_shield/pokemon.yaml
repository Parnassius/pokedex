      descriptions:
        jp_kana:
          sword: "おなかで　はつでんした　でんきを\nおおきな　アゴで　しゅうそくさせて\nだいしゅつりょくの　ビームを　うつ。"
          shield: "よびバッテリーとして　デンヂムシを\nかかえて　とべば　だいでんりょくの\nでんじビームを　れんしゃ　できる。"
        jp_kanji:
          sword: "お腹で　発電した　電気を\n大きな　顎で　収束させて\n大出力の　ビームを　撃つ。"
          shield: "予備バッテリーとして　デンヂムシを\n抱えて　飛べば　大電力の\n電磁ビームを　連射できる。"
        en:
          sword: "It builds up electricity in its abdomen, focuses it\nthrough its jaws, and then fires the electricity off\nin concentrated beams."
          shield: "If it carries a Charjabug to use as a spare battery,\na flying Vikavolt can rapidly fire high-powered\nbeams of electricity."
        fr:
          sword: "L’électricité qu’il produit dans son ventre\ns’accumule dans ses larges mandibules.\nIl la libère sous forme d’un rayon puissant."
          shield: "S’il emporte un Chrysapile en tant que batterie\nde secours, il peut tirer une salve de rayons\nélectriques extrêmement puissants en plein vol."
        it:
          sword: "Concentra nelle grandi mandibole l’elettricità\ngenerata nella pancia per colpire l’avversario\ncon un raggio ad altissima potenza."
          shield: "Quando vola portando con sé un Charjabug\ncome batteria di riserva, può sparare una raffica\ndi potentissimi raggi elettromagnetici."
        de:
          sword: "In seinem Bauch erzeugt es Elektrizität, die es in\nseinem großen Kiefer sammelt und dann als\nHochleistungsstrahlen abfeuern kann."
          shield: "Wenn es ein Akkup als Reservebatterie trägt,\nkann es im Flug eine Salve aus extrem starken\nElektrostrahlen abfeuern."
        es:
          sword: "Acumula en sus enormes mandíbulas la carga\neléctrica que genera en su abdomen y la libera\nen forma de rayos de alto voltaje."
          shield: "Cuando vuela llevando consigo un Charjabug\na modo de batería adicional, puede liberar\npotentes descargas electromagnéticas."
        ko:
          sword: "복부에서 만든 전기를\n커다란 턱에 집중시켜서\n고출력의 빔을 쏜다."
          shield: "예비 배터리로서 전지충이를\n안고 날면 높은 전력의\n전자빔을 연사할 수 있다."
        zh_simp:
          sword: "用腹部发电，\n并把电力集中至大大的颚部，\n释放出能量惊人的光束。"
          shield: "如果它在飞翔时把虫电宝抱住\n当作备用电池，就能连续发射\n电力超高的电磁光束。"
        zh_trad:
          sword: "用腹部發電，\n並把電力集中在大大的顎部，\n釋放出能量驚人的光束。"
          shield: "如果牠在飛行時把蟲電寶抱住\n當作備用電池，就能連續發射\n電力超高的電磁光束。"
