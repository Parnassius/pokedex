      descriptions:
        jp_kana:
          sword: "いつも　おなかを　すかせている。\nポケットの　ような　ふくろに　いれた\nタネを　たべて　でんきを　つくる。"
          shield: "どんなに　たべても　すぐに　おなかが\nすく。　でんきで　ローストした\nタネを　たいせつに　もちあるく。"
        jp_kanji:
          sword: "いつも　お腹を　すかせている。\nポケットの　ような　袋に　入れた\nタネを　食べて　電気を　つくる。"
          shield: "どんなに　食べても　すぐに　お腹が\nすく。　電気で　ローストした\nタネを　大切に　持ち歩く。"
        en:
          sword: "As it eats the seeds stored up in its pocket-like\npouches, this Pokémon is not just satisfying its\nconstant hunger. It’s also generating electricity."
          shield: "It carries electrically roasted seeds with it as if\nthey’re precious treasures. No matter how much\nit eats, it always gets hungry again in short order."
        fr:
          sword: "Il a toujours un petit creux. Il grignote les graines\nqu’il a mises dans ses sortes de poches\npour produire de l’électricité."
          shield: "Il a beau manger, il a tout le temps faim.\nIl a toujours des graines grillées à l’électricité\nsur lui."
        it:
          sword: "Ha costantemente fame. Si nutre dei semi che\ntiene nelle sue tasche per produrre elettricità."
          shield: "Indipendentemente da quanto mangia, è sempre\naffamato. Tiene molto ai semi che ha arrostito\ncon l’elettricità e li porta sempre con sé."
        de:
          sword: "Dieses immerzu hungrige Pokémon frisst Samen,\ndie es in seinen beutelartigen Taschen verwahrt,\nund produziert so Elektrizität."
          shield: "Egal, wie viel es auch frisst, es wird sofort wieder\nhungrig. Es röstet Samen mit seiner Elektrizität\nund trägt diese dann vorsichtig mit sich herum."
        es:
          sword: "Siempre tiene hambre. Se nutre de las semillas\nque guarda en una suerte de bolsillos para\ngenerar electricidad."
          shield: "Siempre tiene apetito, sin importar lo mucho que\ncoma. Lleva con sumo cuidado las semillas que\nha tostado con su propia electricidad."
        ko:
          sword: "항상 배가 고프다.\n호주머니같이 생긴 주머니에 넣어둔\n씨앗을 먹어서 전기를 만든다."
          shield: "아무리 먹어도 금방 배가 고프다.\n전기로 구운 씨앗을\n소중히 갖고 다닌다."
        zh_simp:
          sword: "总是饿着肚子。\n会吃掉装在像口袋一样的\n袋子里的种子来发电。"
          shield: "无论怎么吃都会马上肚子饿。\n十分珍爱自己用电烘烤过的\n种子，随时都带在身上。"
        zh_trad:
          sword: "總是餓著肚子。\n會吃掉裝在像口袋一樣的\n袋子裡的種子來發電。"
          shield: "無論怎麼吃都會馬上肚子餓。\n十分珍愛自己用電烘烤過的\n種子，隨時都帶在身上。"
    morpeko_hangry_mode:
