        - cloud_nine
      hidden_ability: swift_swim
      descriptions:
        jp_kana:
          sword: "ながれの　おだやかな　かわに　すむ。\nながい　てあしで　みずを　かきわけ\nゆうがな　およぎを　みせる。"
          shield: "かわを　よごした　にんげんを\nすいちゅうに　ひきこみ　つれさる\nむかしばなしが　のこされている。"
        jp_kanji:
          sword: "流れの　穏やかな　川に　棲む。\n長い　手足で　水を　掻きわけ\n優雅な　泳ぎを　みせる。"
          shield: "川を　汚した　人間を\n水中に　引き込み　連れ去る\n昔話が　残されている。"
        en:
          sword: "This Pokémon lives in gently flowing rivers. It\npaddles through the water with its long limbs,\nputting its graceful swimming skills on display."
          shield: "Old tales tell of Golduck punishing those that\ndefiled its river. The guilty were dragged into\nthe water and taken away."
        fr:
          sword: "Vivant dans les rivières au cours tranquille,\nil se sert de ses longs membres pour nager\navec élégance."
          shield: "D’après de vieilles légendes, ce Pokémon\nentraînait au fond de l’eau tous ceux\nqui osaient souiller sa rivière."
        it:
          sword: "Vive in fiumi dalle acque placide. Si serve\ndei suoi lunghi arti per nuotare con eleganza."
          shield: "Secondo antichi racconti, Golduck trascina\nin acqua gli esseri umani che inquinano il fiume\nportandoli via con sé."
        de:
          sword: "Dieses Pokémon lebt in sanft fließenden Flüssen.\nMit seinen langen Gliedmaßen schwimmt es\nvoller Eleganz durch das Wasser."
          shield: "Alten Legenden zufolge werden jene Menschen,\ndie es wagen, seinen Fluss zu verschmutzen,\nvon Entoron ins Wasser gezerrt und entführt."
        es:
          sword: "Habita en ríos de aguas plácidas. Sus largas\nextremidades le permiten nadar con gracilidad."
          shield: "Cuenta una antigua leyenda que los Golduck\narrastraban a quienes contaminaran sus ríos al\nfondo de las aguas."
        ko:
          sword: "잔잔히 흐르는 강에 산다.\n긴 팔다리로 물을 헤치며\n우아하게 헤엄친다."
          shield: "강을 더럽힌 사람을 물속으로\n끌어들여 데려간다는\n옛날이야기가 전해져 오고 있다."
        zh_simp:
          sword: "生活在水流平稳的河里。\n会用长长的手脚划水，\n展现自己优雅的泳姿。"
          shield: "古老的故事中说，\n它会把污染河水的\n人类拖进水中带走。"
        zh_trad:
          sword: "生活在水流平穩的河川裡。\n會用長長的手腳划水，\n展現自己優雅的泳姿。"
          shield: "民間故事裡相傳，\n牠會把弄髒河川的\n人類拖進水裡帶走。"
