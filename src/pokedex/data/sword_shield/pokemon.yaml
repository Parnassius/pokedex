        jp_kana:
          sword: "あたまの　たいもうが　こうしつかして\nてつの　ヘルメットのように　なった。\nとても　こうせんてきな　せいしつ。"
          shield: "たたかいに　あけくれて　しんかした\nけっか　のばすと　たんけんに　かわる\nぶっそうな　ツメを　てにいれた。"
        jp_kanji:
          sword: "頭の　体毛が　硬質化して\n鉄の　ヘルメットのように　なった。\nとても　好戦的な　性質。"
          shield: "戦いに　明け暮れて　進化した\n結果　伸ばすと　短剣に　変わる\n物騒な　ツメを　手に入れた。"
        en:
          sword: "What appears to be an iron helmet is actually\nhardened hair. This Pokémon lives for the thrill\nof battle."
          shield: "After many battles, it evolved dangerous\nclaws that come together to form daggers\nwhen extended."
        fr:
          sword: "La fourrure sur sa tête s’est endurcie\net a pris la forme d’un casque en fer.\nIl est de nature très bagarreuse."
          shield: "Il s’est tant adonné au combat qu’il a évolué :\nil est désormais doté de griffes redoutables\nqui prennent la forme de dagues en s’allongeant."
        it:
          sword: "La pelliccia sulla testa si è indurita ed è\ndiventata simile a un elmetto di ferro.\nHa una natura molto combattiva."
          shield: "Si è evoluto dopo aver passato giorni interi\na lottare e ha sviluppato degli artigli che,\nuna volta sfoderati, diventano temibili pugnali."
        de:
          sword: "Die Haare auf seinem Kopf haben sich zu etwas\nverhärtet, das an einen eisernen Helm erinnert.\nEs ist von Natur aus kriegerisch veranlagt."
          shield: "Es entwickelte sich nach einer langen Zeit voller\nKämpfe. Nun kann es seine Krallen ausfahren,\num sie als Dolche zu nutzen."
        es:
          sword: "El pelo de la cabeza se le ha endurecido hasta\nel punto de parecer un yelmo de hierro. Posee\nun temperamento muy combativo."
          shield: "Su devoción por la lucha ha propiciado que\nevolucionara y le ha conferido unas peligrosas\ngarras que se convierten en dagas al extenderse."
        ko:
          sword: "머리의 털이 단단해져서\n철로 된 헬멧처럼 되었다.\n매우 호전적인 성질을 가졌다."
          shield: "싸움에 열중해 진화한 결과\n펴면 단검으로 변하는\n위험한 발톱을 얻었다."
        zh_simp:
          sword: "有着十分好战的性格。\n头上像铁头盔一样的东西\n其实是它硬化后的体毛。"
          shield: "在日复一日的战斗中得以进化。\n进化的结果是那危险的指甲，\n留长后能当作短剑来用。"
        zh_trad:
          sword: "有著十分好戰的性格。\n頭上像鐵頭盔一樣的東西\n其實是牠硬化後的體毛。"
          shield: "在日復一日的戰鬥中得以進化。\n進化的結果是那危險的指甲，\n留長後能當作短劍來用。"
cursola:
  species_id: 864
  names:
    jp_kana: サニゴーン
    jp_kanji: サニゴーン
    en: Cursola
    fr: Corayôme
    it: Cursola
    de: Gorgasonn
    es: Cursola
    ko: 산호르곤
    zh_simp: 魔灵珊瑚
    zh_trad: 魔靈珊瑚
  forms:
    cursola:
      form_id: 0
      base_stats:
        hp: 60
        attack: 95
        defense: 50
        special_attack: 145
        special_defense: 130
