        - wonder_skin
        - magic_guard
      hidden_ability: tinted_lens
      descriptions:
        jp_kana:
          sword: "サイコパワーで　そらを　とぶ。\nこだいとしの　まもりがみ　とも\nそのつかいとも　いわれている。"
          shield: "シンボラーが　とぶ　さばくのしたを\nちょうさすると　こだいの　としと\nおもわれる　なごりが　みつかった。"
        jp_kanji:
          sword: "サイコパワーで　空を　飛ぶ。\n古代都市の　守り神　とも\nその遣いとも　いわれている。"
          shield: "シンボラーが　飛ぶ　砂漠の下を\n調査すると　古代の　都市と\n思われる　名残りが　見つかった。"
        en:
          sword: "Psychic power allows these Pokémon to fly. Some\nsay they were the guardians of an ancient city.\nOthers say they were the guardians’ emissaries."
          shield: "A discovery was made in the desert where\nSigilyph fly. The ruins of what may have been\nan ancient city were found beneath the sands."
        fr:
          sword: "Il vole grâce à ses pouvoirs psychiques.\nCertains disent qu’il était le dieu protecteur\nd’une ville antique, d’autres, son messager."
          shield: "En fouillant sous le sable du désert survolé\npar Cryptéro, on a retrouvé les vestiges\nde ce que l’on croit être une ville antique."
        it:
          sword: "Vola grazie ai suoi poteri psichici. Si dice che\nfosse lo spirito custode di un’antica città o il suo\nmessaggero."
          shield: "Nella zona desertica sorvolata da questi\nPokémon sono stati disseppelliti i resti\ndi un’antica città."
        de:
          sword: "Es fliegt mithilfe seiner Psycho-Kräfte. Einige\nsagen, es war einst der Wächter einer Stadt aus\nuralten Zeiten. Andere sagen, es war sein Bote."
          shield: "In den Wüsten, in denen man Symvolara fliegen\nsieht, wurden Ruinen gefunden, die man für die\nÜberreste einer Stadt aus uralten Zeiten hält."
        es:
          sword: "Vuela gracias a sus poderes psíquicos. Dicen que\nhabía sido la deidad protectora de una antigua\nciudad, si bien otros creen que era su mensajero."
          shield: "Explorando la zona desértica que sobrevuela,\nse han descubierto los vestigios de lo que parece\nser una antigua ciudad."
        ko:
          sword: "사이코 파워로 하늘을 난다.\n고대 도시의 수호신 또는\n수호신의 사자로 일컬어진다."
          shield: "심보러가 나는 사막 아래를\n조사해 보니 고대 도시로\n여겨지는 자취가 발견되었다."
        zh_simp:
          sword: "利用精神力量在空中飞翔，\n被称为古代都市的守护神。\n也有人认为它是守护神的使者。"
          shield: "人们在象征鸟飞过的沙漠\n的地下调查，结果在那里\n发现了疑似古代都市的遗迹。"
        zh_trad:
          sword: "利用精神力量在空中飛翔，\n被稱為古代都市的守護神。\n也有人認為牠是守護神的使者。"
          shield: "人們在象徵鳥飛過的沙漠\n地下進行調查，結果在那裡\n發現了疑似古代都市的遺跡。"
yamask:
