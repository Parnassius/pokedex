        special_defense: 0
        speed: 0
      types:
        - grass
        - steel
      egg_groups:
        - grass
        - mineral
      abilities:
        - iron_barbs
      held_items:
        rare: sticky_barb
      descriptions:
        jp_kana:
          sword: "トゲを　とばして　みを　まもる。\nねらった　ほうこうに　とばすには\nたくさんの　くんれんが　ひつよう。"
          shield: "こけむした　どうくつを　このむ。\nこけが　ふくむ　こうそが　トゲを\nおおきく　じょうぶに　はぐくむのだ。"
        jp_kanji:
          sword: "棘を　飛ばして　身を　守る。\n狙った　方向に　飛ばすには\nたくさんの　訓練が　必要。"
          shield: "苔むした　洞窟を　好む。\n苔が　含む　酵素が　棘を\n大きく　丈夫に　育むのだ。"
        en:
          sword: "It defends itself by launching spikes, but its\naim isn’t very good at first. Only after a lot of\npractice will it improve."
          shield: "Mossy caves are their preferred dwellings.\nEnzymes contained in mosses help Ferroseed’s\nspikes grow big and strong."
        fr:
          sword: "Il se protège en projetant ses épines,\nmais il lui faut beaucoup d’entraînement\npour réussir à tirer dans une direction précise."
          shield: "Il aime les grottes pleines de mousse.\nLes enzymes contenues dans ces plantes l’aident\nà obtenir des épines grandes et solides."
        it:
          sword: "Si protegge sparando i suoi aculei, ma per\nriuscire a orientarli con precisione verso\nil bersaglio ha bisogno di allenarsi a lungo."
          shield: "Predilige le grotte in cui cresce il muschio,\ni cui enzimi aiutano i suoi aculei a crescere\ngrandi e forti."
        de:
          sword: "Es schützt sich, indem es Dornen verschießt. Ein\nKastadur muss jahrelang trainieren, um präzise\nzielen zu können."
          shield: "Es fühlt sich in moosbewachsenen Höhlen wohl.\nDie im Moos enthaltenen Enzyme lassen seine\nStacheln besonders groß und kräftig werden."
        es:
          sword: "Se defiende lanzando púas, pero para poder\napuntar con precisión a su objetivo necesita\ningentes sesiones de práctica."
          shield: "Prefiere las cuevas de paredes musgosas, ya que\nlas enzimas contenidas en el musgo le permiten\ndesarrollar unas púas grandes y robustas."
        ko:
          sword: "가시를 날려서 몸을 지킨다.\n원하는 방향으로 날리기 위해서는\n많은 훈련이 필요하다."
          shield: "이끼 낀 동굴을 좋아한다.\n이끼에 함유된 효소가 가시를\n크고 튼튼하게 만들어준다."
        zh_simp:
          sword: "会发射尖刺来保护自己。\n需要反复训练才能将\n尖刺准确地射中目标。"
          shield: "偏爱长着青苔的洞窟。\n青苔中所含的酶能使它的\n尖刺成长得又大又结实。"
        zh_trad:
          sword: "會發射尖刺來保護自己。\n需要反覆訓練才能將\n尖刺準確地射中目標。"
          shield: "偏愛長著青苔的洞窟。\n青苔中所含的酵素能使牠的\n尖刺成長得又大又結實。"
