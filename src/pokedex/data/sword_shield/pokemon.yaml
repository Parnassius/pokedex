          shield: "タマザラシや　モンスターボールなど\nまるい　ものなら　なんでも　はなの\nうえで　まわしてしまう　しゅうせい。"
        jp_kanji:
          sword: "流氷の　上で　生活。\n泳ぎながら　獲物の　匂いを\n嗅ぎわけて　見つけだし　捕まえる。"
          shield: "タマザラシや　モンスターボールなど\n丸い　ものなら　なんでも　鼻の\n上で　回してしまう　習性。"
        en:
          sword: "Sealeo live on top of drift ice. They go swimming\nwhen they’re on the hunt, seeking out their prey\nby scent."
          shield: "This Pokémon has a habit of spinning round\nthings on its nose, whether those things are\nPoké Balls or Spheal."
        fr:
          sword: "Cet habitant de la banquise attrape ses proies\nen les repérant à l’odeur quand il nage."
          shield: "Il ne peut pas s’empêcher de faire tourner sur\nson museau tout ce qui a une forme sphérique,\ncomme les Obalie ou les Poké Balls."
        it:
          sword: "Vive su banchi di ghiaccio alla deriva. Individua\nle prede fiutandone l’odore mentre nuota."
          shield: "È solito giocare facendo ruotare sulla punta\ndel naso qualsiasi cosa rotonda gli capiti a tiro,\ncompresi Spheal e Poké Ball."
        de:
          sword: "Seejong lebt auf Eisschollen. Wittert es beim\nSchwimmen Beute, spürt es sie auf und schnappt\nsie sich."
          shield: "Seejong balanciert gerne Pokébälle, Seemops\nund alles, was sonst noch rund ist, auf seiner\nNasenspitze."
        es:
          sword: "Vive sobre placas de hielo. Detecta el olor de\nsus presas mientras nada."
          shield: "Tiene la costumbre de hacer girar en la punta del\nmorro cualquier objeto redondeado, ya sea una\nPoké Ball o un Spheal."
        ko:
          sword: "유빙 위에서 생활한다.\n헤엄치다가 먹이의 냄새를\n맡고는 찾아내서 잡는다."
          shield: "대굴레오나 몬스터볼 등\n둥근 것이라면 뭐든지 코 위에\n올려놓고 돌리는 습성이 있다."
        zh_simp:
          sword: "在浮冰上生活。能一边游泳\n一边分辨猎物的味道，找到\n对方的位置并将其捕获。"
          shield: "不管是海豹球还是精灵球，\n只要是圆的物体都会\n顶在鼻子上转来转去。"
        zh_trad:
          sword: "在浮冰上生活。能夠一邊\n游泳一邊嗅出獵物的氣味，\n把對方找出來獵捕。"
          shield: "牠只要看見了圓形的東西，\n不論那是海豹球或是精靈球，\n都會把它頂在鼻子上轉轉看。"
