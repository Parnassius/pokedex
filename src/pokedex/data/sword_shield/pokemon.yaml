        jp_kana:
          sword: "なかまと　みとめると　あいじょうを\nしめすために　だきしめようと　するが\nほねを　くだかれるので　きけん。"
          shield: "かくとうか　かおまけの　わざで\nしとめた　えものを　りょうわきに\nかかえて　すみかへ　もちかえる。"
        jp_kanji:
          sword: "仲間と　認めると　愛情を\n示すために　抱きしめようとするが\n骨を　砕かれるので　危険。"
          shield: "格闘家　顔負けの　技で\n仕留めた　獲物を　両脇に\n抱えて　すみかへ　持ち帰る。"
        en:
          sword: "Once it accepts you as a friend, it tries to show\nits affection with a hug. Letting it do that is\ndangerous—it could easily shatter your bones."
          shield: "The moves it uses to take down its prey would\nmake a martial artist jealous. It tucks subdued\nprey under its arms to carry them to its nest."
        fr:
          sword: "Il serre fort contre lui ceux qu’il considère\ncomme ses compagnons, mais ses câlins sont\nassez puissants pour broyer les os."
          shield: "Il abat ses proies à l’aide de techniques à faire\npâlir d’envie des combattants professionnels,\npuis les emporte sous les bras dans sa tanière."
        it:
          sword: "Cerca di abbracciare chi considera suo amico in\nsegno di affetto, ma bisogna guardarsi dalla sua\nstretta, talmente potente da frantumare le ossa."
          shield: "Dopo aver abbattuto le prede con mosse che\nfarebbero impallidire i lottatori più esperti, se le\ncarica una per zampa e se ne torna alla tana."
        de:
          sword: "Es drückt seine Zuneigung durch Umarmungen\naus. Das ist ebenso sympathisch wie gefährlich,\nda diese zu Knochenbrüchen führen können."
          shield: "Es schlägt seine Beute mit Attacken nieder, die\nProfikampfsportler erblassen lassen. Danach trägt\nes sie unter seinen beiden Armen in sein Versteck."
        es:
          sword: "Expresa su afecto abrazando a quien considera\nsu amigo. Una costumbre peligrosa, ya que su\nfuerza puede romperle los huesos a cualquiera."
          shield: "Después de abatir a su presa con movimientos\nque harían palidecer a un luchador profesional,\nla carga en brazos y se la lleva a su madriguera."
        ko:
          sword: "동료로 인정하면 애정을\n표현하기 위해 껴안으려 하지만\n뼈가 으스러질 수 있으므로 위험하다."
          shield: "격투가가 무색할 정도의 기술로\n먹이를 잡아 양쪽 겨드랑이에\n끼우고 거처로 갖고 간다."
        zh_simp:
          sword: "如果它认定你是它的伙伴，\n便会要来拥抱你来表示喜爱。\n但这会弄碎你的骨头，非常危险。"
          shield: "会用令格斗家都无地自容的技术\n把逮住的猎物夹在腋下，\n带回自己的住处。"
        zh_trad:
          sword: "如果牠認定你是牠的夥伴，\n便會試著擁抱你來表示喜愛。\n但這會弄碎你的骨頭，非常危險。"
          shield: "會用令格鬥家都無地自容的技術\n把逮住的獵物夾在腋下，\n帶回自己的住處。"
bounsweet:
  species_id: 761
  names:
    jp_kana: アマカジ
    jp_kanji: アマカジ
    en: Bounsweet
    fr: Croquine
    it: Bounsweet
    de: Frubberl
    es: Bounsweet
    ko: 달콤아
    zh_simp: 甜竹竹
    zh_trad: 甜竹竹
  forms:
    bounsweet:
      form_id: 0
      base_stats:
        hp: 42
        attack: 30
        defense: 38
        special_attack: 30
        special_defense: 38
        speed: 32
      evs_yield:
        hp: 1
        attack: 0
        defense: 0
