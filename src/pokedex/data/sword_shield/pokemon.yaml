          sword: "ツチニンが　しんかする　ときに\nいつの　まにか　モンスターボールに\nはいっている　ふしぎな　ポケモンだ。"
          shield: "ハネを　うごかさずに　とびまわる。\nからだの　なかは　からっぽで\nいきを　しない　ふしぎな　ポケモン。"
        jp_kanji:
          sword: "ツチニンが　進化する　ときに\nいつの間にか　モンスターボールに\n入っている　不思議な　ポケモンだ。"
          shield: "ハネを　動かさずに　飛びまわる。\n体の　中は　空っぽで\n息を　しない　不思議な　ポケモン。"
        en:
          sword: "A most peculiar Pokémon that somehow appears\nin a Poké Ball when a Nincada evolves."
          shield: "A strange Pokémon—it flies without moving its\nwings, has a hollow shell for a body, and does\nnot breathe."
        fr:
          sword: "Un Pokémon étrange que l’on trouve dans\nune Poké Ball après l’évolution d’un Ningale."
          shield: "Cet étrange Pokémon, dont le corps\nest comme une coquille vide, ne respire pas\net peut voler sans battre des ailes."
        it:
          sword: "È un Pokémon molto particolare. Appare\nmisteriosamente in una Poké Ball dopo\nl’evoluzione di un Nincada."
          shield: "Svolazza in giro senza muovere le ali.\nÈ un Pokémon strano: è vuoto all’interno\ne non respira."
        de:
          sword: "Ein äußerst sonderbares Pokémon, das plötzlich\nauf rätselhafte Weise in einem Pokéball\nauftaucht, wenn Nincada sich entwickelt."
          shield: "Ninjatom ist ein äußerst sonderbares Pokémon.\nEs fliegt umher, ohne seine Flügel zu bewegen,\nsein Körper ist hohl und es atmet nicht."
        es:
          sword: "Es un Pokémon muy peculiar; aparece de repente\nen una Poké Ball cuando Nincada evoluciona."
          shield: "Es un Pokémon muy peculiar: revolotea sin batir\nlas alas, no respira y su cuerpo está hueco por\ndentro."
        ko:
          sword: "토중몬이 진화할 때\n어느샌가 몬스터볼에\n들어와 있는 신기한 포켓몬이다."
          shield: "날개를 움직이지 않고 날아다닌다.\n몸속이 텅 비어 있고\n숨을 쉬지 않는 이상한 포켓몬이다."
        zh_simp:
          sword: "它是一种在土居忍士进化时，\n会神不知鬼不觉地出现在\n精灵球里的神奇宝可梦。"
          shield: "不拍动翅膀也能四处飞行。\n身体里面空空的，是一种\n不呼吸的奇妙宝可梦。"
        zh_trad:
          sword: "牠是一種在土居忍士進化時，\n會神不知鬼不覺地出現在\n精靈球裡的神奇寶可夢。"
          shield: "不拍動翅膀也能四處飛行。\n身體裡面空空的，是一種\n不呼吸的奇妙寶可夢。"
whismur:
  species_id: 293
