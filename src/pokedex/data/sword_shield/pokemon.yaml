bulbasaur:
  species_id: 1
  names:
    jp_kana: フシギダネ
    jp_kanji: フシギダネ
    en: Bulbasaur
    fr: Bulbizarre
    it: Bulbasaur
    de: Bisasam
    es: Bulbasaur
    ko: 이상해씨
    zh_simp: 妙蛙种子
    zh_trad: 妙蛙種子
  forms:
    bulbasaur:
      form_id: 0
      base_stats:
        hp: 45
        attack: 49
        defense: 49
        special_attack: 65
        special_defense: 65
        speed: 45
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 1
        special_defense: 0
        speed: 0
      types:
        - grass
        - poison
      egg_groups:
        - monster
        - grass
      abilities:
        - overgrow
      hidden_ability: chlorophyll
      descriptions:
        jp_kana:
          sword: "うまれたときから　せなかに\nしょくぶつの　タネが　あって\nすこしずつ　おおきく　そだつ。"
          shield: "うまれて　しばらくの　あいだ\nせなかの　タネに　つまった\nえいようを　とって　そだつ。"
        jp_kanji:
          sword: "生まれたときから　背中に\n植物の　タネが　あって\n少しずつ　大きく　育つ。"
          shield: "生まれて　しばらくの　あいだ\n背中の　タネに　つまった\n栄養を　とって　育つ。"
        en:
          sword: "There is a plant seed on its back right from the\nday this Pokémon is born. The seed slowly\ngrows larger."
          shield: "While it is young, it uses the nutrients that are\nstored in the seed on its back in order to grow."
        fr:
          sword: "Il y a une graine sur son dos depuis sa naissance.\nElle grossit un peu chaque jour."
          shield: "Quand il est jeune, il absorbe les nutriments\nconservés dans son dos pour grandir\net se développer."
        it:
          sword: "Fin dalla nascita questo Pokémon ha sulla schiena\nun seme che cresce lentamente."
          shield: "Appena nato, trae nutrimento dalle sostanze\ncontenute nel seme sul dorso."
        de:
          sword: "Dieses Pokémon trägt von Geburt an einen\nSamen auf dem Rücken, der im Laufe der Zeit\nkeimt und wächst."
          shield: "Nach der Geburt nimmt es für eine Weile\nNährstoffe über den Samen auf seinem\nRücken auf."
        es:
          sword: "Este Pokémon nace con una semilla en el lomo,\nque brota con el paso del tiempo."
          shield: "Desde que nace, crece alimentándose de los\nnutrientes que contiene la semilla de su lomo."
        ko:
          sword: "태어났을 때부터 등에\n식물의 씨앗이 있으며\n조금씩 크게 자란다."
          shield: "태어나서 얼마 동안\n등의 씨앗에 담긴\n영양을 섭취하며 자란다."
        zh_simp:
          sword: "从出生的时候开始，\n背上就有一颗植物种子。\n这颗种子会渐渐地长大。"
          shield: "在出生后的一段时间内，\n它会吸收背上种子里\n储存着的营养成长。"
        zh_trad:
          sword: "從出生的時候開始\n背上就有一顆植物種子。\n這顆種子會漸漸地長大。"
          shield: "在出生後的一段時間內，\n牠會吸收背上種子裡\n儲存著的營養成長。"
ivysaur:
  species_id: 2
  names:
    jp_kana: フシギソウ
    jp_kanji: フシギソウ
    en: Ivysaur
    fr: Herbizarre
    it: Ivysaur
    de: Bisaknosp
    es: Ivysaur
    ko: 이상해풀
    zh_simp: 妙蛙草
    zh_trad: 妙蛙草
  forms:
    ivysaur:
      form_id: 0
      base_stats:
        hp: 60
        attack: 62
        defense: 63
        special_attack: 80
        special_defense: 80
        speed: 60
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 1
        special_defense: 1
        speed: 0
      types:
        - grass
        - poison
      egg_groups:
        - monster
        - grass
      abilities:
        - overgrow
      hidden_ability: chlorophyll
      descriptions:
        jp_kana:
          sword: "せなかの　つぼみが　おおきく\nそだってくると　２ほんあしで\nたつことが　できなくなるらしい。"
          shield: "たいようの　ひかりを　あびるほど\nからだに　ちからが　わいて　せなかの\nつぼみが　そだっていく。"
        jp_kanji:
          sword: "背中の　つぼみが　大きく\n育ってくると　２本脚で\n立つことが　できなくなるらしい。"
          shield: "太陽の　光を　浴びるほど\n体に　力が　わいて　背中の\nつぼみが　育っていく。"
        en:
          sword: "When the bulb on its back grows large, it\nappears to lose the ability to stand on its\nhind legs."
          shield: "Exposure to sunlight adds to its strength.\nSunlight also makes the bud on its back\ngrow larger."
        fr:
          sword: "Son bulbe dorsal est devenu si gros qu’il ne peut\nplus se tenir sur ses pattes postérieures."
          shield: "La lumière du soleil le rend plus fort et vigoureux.\nLe bulbe sur son dos grossit en conséquence."
        it:
          sword: "Il bulbo sulla schiena è cresciuto così tanto\nda impedirgli di alzarsi in piedi sulle zampe\nposteriori."
          shield: "L’esposizione alla luce solare lo rafforza\ne fa crescere il bocciolo che ha sul dorso."
        de:
          sword: "Sobald die Knospe auf seinem Rücken groß wird,\nkann Bisaknosp nicht mehr auf zwei Beinen\nstehen."
          shield: "Die Sonne macht es stärker. Die Knospe auf\nseinem Rücken wächst unter dem Einfluss von\nSonnenlicht."
        es:
          sword: "Cuando le crece bastante el bulbo del lomo,\npierde la capacidad de erguirse sobre las patas\ntraseras."
          shield: "La luz del sol lo fortalece y hace que le crezca el\ncapullo que tiene en el lomo."
        ko:
          sword: "등에 있는 봉오리가 크게\n자라면 두 다리로\n설 수 없게 되는 듯하다."
          shield: "햇빛을 받을수록\n몸에 힘이 솟아나\n등의 꽃봉오리가 자라난다."
        zh_simp:
          sword: "当背上的花苞长大之后，\n它似乎就无法再用两只脚\n站立起来了。"
          shield: "沐浴在阳光下越久，\n身体内会涌出越多力量，\n背上的花苞也会渐渐成长。"
        zh_trad:
          sword: "當背上的花苞長大之後，\n牠似乎就無法再用兩隻腳\n站立起來了。"
          shield: "沐浴在陽光下越久，\n身體內會湧出越多力量，\n背上的花苞也會漸漸成長。"
venusaur:
  species_id: 3
  names:
    jp_kana: フシギバナ
    jp_kanji: フシギバナ
    en: Venusaur
    fr: Florizarre
    it: Venusaur
    de: Bisaflor
    es: Venusaur
    ko: 이상해꽃
    zh_simp: 妙蛙花
    zh_trad: 妙蛙花
  forms:
    venusaur:
      form_id: 0
      base_stats:
        hp: 80
        attack: 82
        defense: 83
        special_attack: 100
        special_defense: 100
        speed: 80
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 2
        special_defense: 1
        speed: 0
      types:
        - grass
        - poison
      egg_groups:
        - monster
        - grass
      abilities:
        - overgrow
      hidden_ability: chlorophyll
      descriptions:
        jp_kana:
          sword: "たいようエネルギーを　えいようにして\nおおきなハナが　ひらく。　ひなたに\nひきよせられるように　いどうする。"
          shield: "はなから　うっとりする　かおりが\nただよい　たたかうものの　きもちを\nなだめてしまう。"
        jp_kanji:
          sword: "太陽エネルギーを　栄養にして\n大きな花が　開く。　日なたに\n引き寄せられるように　移動する。"
          shield: "花から　うっとりする　香りが\nただよい　戦うものの　気持ちを\nなだめてしまう。"
        en:
          sword: "Its plant blooms when it is absorbing solar\nenergy. It stays on the move to seek sunlight."
          shield: "A bewitching aroma wafts from its flower.\nThe fragrance becalms those engaged\nin a battle."
        fr:
          sword: "Sa plante donne une grosse fleur quand\nelle absorbe les rayons du soleil. Il est toujours\nà la recherche des endroits les plus ensoleillés."
          shield: "Une douce senteur émane de sa plante.\nCette fragrance calme tous ceux qui sont\nengagés dans un combat."
        it:
          sword: "Il fiore sboccia assorbendo energia solare.\nSi muove continuamente in cerca di luce."
          shield: "Il suo fiore emana una fragranza inebriante\ncapace di placare l’animo di chi è impegnato\nnella lotta."
        de:
          sword: "Es nutzt Solarenergie als Nahrung und bringt so\nseine große Blume zum Blühen. Es geht dorthin,\nwo die Sonne scheint."
          shield: "Die Blume verströmt einen zauberhaften Duft.\nEr beschwichtigt erhitzte Kämpfer."
        es:
          sword: "La planta florece cuando absorbe energía solar,\nlo cual le obliga a buscar siempre la luz del sol."
          shield: "La flor que tiene en el lomo libera un delicado\naroma, que tiene un efecto relajante en combate."
        ko:
          sword: "태양에너지를 양분으로\n큰 꽃을 피운다. 양지를 향해\n이끌려가듯이 이동한다."
          shield: "꽃에서 황홀한 향기가\n퍼져 나와 싸우는 자의\n기분을 달래준다."
        zh_simp:
          sword: "把太阳的能源当成养分，\n开出硕大的花朵。总是\n朝着有阳光的地方移动。"
          shield: "花朵散发出的迷人香味\n能安抚激动的心情，\n甚至消弭斗争。"
        zh_trad:
          sword: "把太陽的能源當成養分，\n開出碩大的花朵。總是\n朝著有陽光的地方移動。"
          shield: "花朵散發出的迷人香味，\n能安撫激動的心情，\n甚至消弭鬥爭。"
  gmax_forms:
    venusaur_gigantamax:
      form_id: 999
      names:
        jp_kana: キョダイマックス
        jp_kanji: キョダイマックス
        en: Gigantamax
        fr: Gigamax
        it: Gigamax
        de: Gigadynamax
        es: Gigamax
        ko: 거다이맥스
        zh_simp: 超极巨化
        zh_trad: 超極巨化
      descriptions:
        jp_kana:
          sword: "２ほんの　ふとい　ツルを　ふりまわし\nたたかう。　１０かいだての　ビルを\nかるく　なぎたおすほど　パワフルだ。"
          shield: "やまの　ふんかのような　いきおいで\nばらまく　たいりょうの　かふんは\nすいこみすぎると　きを　うしなうぞ。"
        jp_kanji:
          sword: "２本の　ふとい　ツルを　振りまわし\n戦う。　１０階建ての　ビルを\nかるく　なぎ倒すほど　パワフルだ。"
          shield: "山の　噴火のような　勢いで\nばらまく　大量の　花粉は\n吸いこみすぎると　気を　失うぞ。"
        en:
          sword: "In battle, this Pokémon swings around two thick\nvines. If these vines slammed into a 10-story\nbuilding, they could easily topple it."
          shield: "Huge amounts of pollen burst from it with the\nforce of a volcanic eruption. Breathing in too\nmuch of the pollen can cause fainting."
        fr:
          sword: "Il se bat en manipulant ses deux énormes lianes,\nassez puissantes pour détruire sans effort\nun immeuble de 10 étages."
          shield: "Le pollen qu’il expulse en grande quantité\navec la force d’un volcan en éruption fait\nperdre connaissance si l’on en respire trop."
        it:
          sword: "Lotta agitando due spesse liane. È così forte\nda abbattere con facilità un edificio di 10 piani."
          shield: "Sparge enormi quantità di polline con la violenza\ndi un vulcano in eruzione. Se inalato in grandi\nquantità, questo polline fa perdere i sensi."
        de:
          sword: "Es kämpft, indem es seine zwei dicken Ranken\nso kraftvoll umherpeitscht, dass sie selbst ein\nzehnstöckiges Gebäude niederreißen könnten."
          shield: "Es verstreut Unmengen an Pollen mit der Kraft\neines Vulkanausbruchs. Atmet man zu viele davon\nein, kann man das Bewusstsein verlieren."
        es:
          sword: "Lucha blandiendo sus dos gruesas lianas. Tiene\nfuerza como para derribar fácilmente un edificio\nde diez plantas."
          shield: "Esparce cantidades ingentes de polen con la\nfuerza de una erupción volcánica. Inhalado en\nexceso, puede provocar vahídos."
        ko:
          sword: "2개의 굵은 덩굴을 휘둘러서\n싸운다. 10층 빌딩을 가볍게\n넘어뜨릴 정도로 파워풀하다."
          shield: "산이 분화하는 듯한 기세로\n흩뿌리는 대량의 꽃가루를\n많이 들이마시면 정신을 잃는다."
        zh_simp:
          sword: "通过挥舞２根粗壮的藤蔓来战斗。\n其力量强到就连１０层高的\n大楼都能轻易撂倒。"
          shield: "会用火山喷发般的气势\n播撒大量的花粉。如果吸入\n过多花粉，可是会昏倒的。"
        zh_trad:
          sword: "透過揮舞２根粗大的藤蔓來戰鬥。\n力道之強，甚至能夠輕輕鬆鬆\n揮倒１０層樓高的大廈。"
          shield: "會像火山噴發般猛烈地散播\n大量的花粉。要是吸進太多\n花粉是會昏倒的。"
charmander:
  species_id: 4
  names:
    jp_kana: ヒトカゲ
    jp_kanji: ヒトカゲ
    en: Charmander
    fr: Salamèche
    it: Charmander
    de: Glumanda
    es: Charmander
    ko: 파이리
    zh_simp: 小火龙
    zh_trad: 小火龍
  forms:
    charmander:
      form_id: 0
      base_stats:
        hp: 39
        attack: 52
        defense: 43
        special_attack: 60
        special_defense: 50
        speed: 65
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - fire
      egg_groups:
        - monster
        - dragon
      abilities:
        - blaze
      hidden_ability: solar_power
      descriptions:
        jp_kana:
          sword: "あついものを　このむ　せいかく。\nあめにぬれると　しっぽの　さきから\nけむりが　でるという。"
          shield: "うまれたときから　しっぽに　ほのおが\nともっている。　ほのおが　きえたとき\nその　いのちは　おわって　しまう。"
        jp_kanji:
          sword: "熱いものを　好む　性格。\n雨に濡れると　しっぽの　先から\n煙が　出るという。"
          shield: "生まれたときから　しっぽに　炎が\nともっている。　炎が　消えたとき\nその　命は　終わって　しまう。"
        en:
          sword: "It has a preference for hot things. When it rains,\nsteam is said to spout from the tip of its tail."
          shield: "From the time it is born, a flame burns at the tip\nof its tail. Its life would end if the flame were to\ngo out."
        fr:
          sword: "Il préfère ce qui est chaud.\nEn cas de pluie, de la vapeur se forme autour\nde sa queue."
          shield: "Depuis sa naissance, une petite flamme brûle\nau bout de sa queue. Si cette flamme s’éteint,\nla vie de ce Pokémon s’éteindra elle aussi."
        it:
          sword: "Ama le cose calde. Si dice che quando piove\ngli esca vapore dalla punta della coda."
          shield: "Una fiamma gli arde sulla punta della coda\nfin dalla nascita. Se si spegnesse, per lui\nsarebbe la fine."
        de:
          sword: "Dieses Pokémon bevorzugt heiße Dinge.\nBei Regen soll seine Schwanzspitze dampfen."
          shield: "Von Geburt an brennt die Flamme auf seiner\nSchwanzspitze. Sobald sie verglimmt, erlischt\nauch sein Lebenslicht."
        es:
          sword: "Prefiere las cosas calientes. Dicen que cuando\nllueve le sale vapor de la punta de la cola."
          shield: "Este Pokémon nace con una llama en la punta de\nla cola. Si se le apagara, fallecería."
        ko:
          sword: "뜨거운 것을 좋아하는 성격이다.\n비에 젖으면 꼬리 끝에서\n연기가 난다고 한다."
          shield: "태어날 때부터 꼬리에 불꽃이\n타오르고 있다. 불꽃이 꺼지면\n생명도 다하고 만다."
        zh_simp:
          sword: "天生喜欢热热的东西。\n据说当它被雨淋湿的时候，\n尾巴的末端会冒出烟来。"
          shield: "生下来的时候，\n尾巴上就有火焰在燃烧。\n火焰熄灭时，它的生命也会结束。"
        zh_trad:
          sword: "天生喜歡熱熱的東西。\n據說當牠被雨淋濕的時候，\n尾巴的末端會冒出煙來。"
          shield: "從出生時開始尾巴上\n就有火焰在燃燒。\n火焰熄滅時，生命也會結束。"
charmeleon:
  species_id: 5
  names:
    jp_kana: リザード
    jp_kanji: リザード
    en: Charmeleon
    fr: Reptincel
    it: Charmeleon
    de: Glutexo
    es: Charmeleon
    ko: 리자드
    zh_simp: 火恐龙
    zh_trad: 火恐龍
  forms:
    charmeleon:
      form_id: 0
      base_stats:
        hp: 58
        attack: 64
        defense: 58
        special_attack: 80
        special_defense: 65
        speed: 80
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 1
        special_defense: 0
        speed: 1
      types:
        - fire
      egg_groups:
        - monster
        - dragon
      abilities:
        - blaze
      hidden_ability: solar_power
      descriptions:
        jp_kana:
          sword: "もえる　しっぽを　ふりまわし\nするどい　ツメで　あいてを\nきりさく　あらあらしい　せいかく。"
          shield: "たたかいで　きもちが　たかぶると\nしゃくねつの　ほのおを　ふきながら\nあたりを　もやしてまわる。"
        jp_kanji:
          sword: "燃える　しっぽを　振りまわし\nするどい　ツメで　相手を\n切り裂く　荒々しい　性格。"
          shield: "戦いで　気持ちが　たかぶると\n灼熱の　炎を　吹きながら\nあたりを　燃やしてまわる。"
        en:
          sword: "It has a barbaric nature. In battle, it whips its\nfiery tail around and slashes away with sharp claws."
          shield: "If it becomes agitated during battle, it spouts\nintense flames, incinerating its surroundings."
        fr:
          sword: "Il est très brutal. En combat, il se sert de\nses griffes acérées et de sa queue enflammée\npour mettre en pièces ses adversaires."
          shield: "S’il s’excite pendant un combat, il crache\nde grandes flammes, brûlant tout ce qui\nse trouve aux alentours."
        it:
          sword: "Ha un’indole feroce. Usa la coda fiammeggiante\ncome una frusta e lacera l’avversario con gli\nartigli affilati."
          shield: "Se s’infervora nella lotta, sputa potenti fiamme\nche inceneriscono l’area circostante."
        de:
          sword: "Es ist brutal veranlagt. Im Kampf schlägt es mit\nseinem brennenden Schweif um sich und schlitzt\nGegner mit seinen scharfen Klauen auf."
          shield: "Steigert es sich in einen Kampf hinein, spuckt es\nFlammen, die alles in seiner Umgebung\nniederbrennen."
        es:
          sword: "Este Pokémon de naturaleza agresiva ataca en\ncombate con su cola llameante y hace trizas al\nrival con sus afiladas garras."
          shield: "Si se exalta en combate, expulsa intensas\nllamaradas que incineran todo a su alrededor."
        ko:
          sword: "불타는 꼬리를 휘두르며\n날카로운 발톱으로 상대를\n베어 가르는 몹시 거친 성격이다."
          shield: "싸움으로 기분이 고조되면\n작열하는 불꽃을 뿜으며\n주변을 태워버린다."
        zh_simp:
          sword: "挥动燃烧着火焰的尾巴，\n用锋利的爪子撕裂对手。\n性格十分粗暴。"
          shield: "如果它在战斗中亢奋起来，\n就会喷出灼热的火焰，\n把周围的东西烧得一干二净。"
        zh_trad:
          sword: "揮動燃燒著火焰的尾巴，\n用鋒利的爪子撕裂對手。\n性情十分粗暴。"
          shield: "如果牠在戰鬥中亢奮起來，\n就會噴出灼熱的火焰，\n把周圍的東西燒得一乾二淨。"
charizard:
