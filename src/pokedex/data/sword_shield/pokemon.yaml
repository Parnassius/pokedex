          sword: "くうきを　きりさく　パンチ。\nかすっただけで　やけどに　なるほど\nパンチの　スピードは　はやいのだ。"
          shield: "くうきをも　きりさく　パンチ。\nだが　３ぷんかん　こうげきすると\nひとやすみ　したくなるらしい。"
        jp_kanji:
          sword: "空気を　切り裂く　パンチ。\nかすっただけで　火傷に　なるほど\nパンチの　スピードは　速いのだ。"
          shield: "空気をも　切り裂く　パンチ。\nだが　３分間　攻撃すると\nひと休み　したくなるらしい。"
        en:
          sword: "Its punches slice the air. They are launched at\nsuch high speed, even a slight graze could cause\na burn."
          shield: "Its punches slice the air. However, it seems to\nneed a short break after fighting for three minutes."
        fr:
          sword: "Ses poings fendent l’air. Ils sont si rapides\nqu’un simple frôlement peut causer une brûlure."
          shield: "Ses poings fendent l’air, mais il se fatigue au bout\nde trois minutes à enchaîner les coups."
        it:
          sword: "I suoi pugni fendono l’aria a una tale velocità\nche basta venire sfiorati per riportare\nuna scottatura."
          shield: "Fende l’aria con i suoi pugni. Tuttavia, dopo\ntre minuti di lotta deve riprendere fiato."
        de:
          sword: "Seine Fäuste zerschneiden regelrecht die Luft.\nSie sind so schnell, dass selbst die geringste\nBerührung Verbrennungen verursacht."
          shield: "Seine Fäuste zerschneiden die Luft. Es muss\njedoch alle drei Minuten eine kurze Pause\neinlegen."
        es:
          sword: "Sus puñetazos cortan el aire. Son tan veloces que\nel mínimo roce podría causar una quemadura."
          shield: "Sus puñetazos son capaces incluso de cortar el\naire, aunque parece necesitar un descanso tras\nestar luchando durante 3 min."
        ko:
          sword: "주변의 공기를 가르는 펀치.\n스치기만 해도 화상을 입을 정도로\n펀치 스피드가 매우 빠르다."
          shield: "공기마저 베어 가르는 펀치.\n하지만 3분간 공격하면\n잠시 쉬고 싶어하는 것 같다."
        zh_simp:
          sword: "使出的拳击能劈开空气。\n出拳的速度极为迅速，\n即使只是擦过都会造成灼伤。"
          shield: "打出的拳击甚至能劈开空气。\n但攻击３分钟后，\n它似乎就会想休息一下。"
        zh_trad:
          sword: "使出的拳擊能劈開空氣。\n出拳的速度極為迅速，\n即便只是擦過都會造成灼傷。"
          shield: "打出的拳擊甚至能劈開空氣。\n但連續攻擊３分鐘後，\n牠似乎就會想休息一下。"
lickitung:
