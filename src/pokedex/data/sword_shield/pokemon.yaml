        jp_kana:
          sword: "たたかいを　かさねるごとに　カマの\nきれあじは　あがる。　たいぼくも\nいっとうりょうだんに　きりさくぞ。"
          shield: "もりの　なかで　たくさんの　きが\nきりたおされた　ばしょを　みつけたら\nそこは　ストライクの　ナワバリだ。"
        jp_kanji:
          sword: "戦いを　重ねるごとに　鎌の\n切れ味は　上がる。\n大木も　一刀両断に　切り裂くぞ。"
          shield: "森の中で　たくさんの　木が\n切り倒された　場所を　見つけたら\nそこは　ストライクの　縄張りだ。"
        en:
          sword: "As Scyther fights more and more battles, its\nscythes become sharper and sharper. With a\nsingle slice, Scyther can fell a massive tree."
          shield: "If you come across an area in a forest where a lot\nof the trees have been cut down, what you’ve\nfound is a Scyther’s territory."
        fr:
          sword: "Ses faux deviennent plus aiguisées à mesure\nqu’il se bat. Il peut trancher un grand arbre\nd’un seul coup."
          shield: "Si l’on voit un grand nombre d’arbres abattus au\nmême endroit dans une forêt, cela signifie que\nl’on se trouve sur le territoire d’un Insécateur."
        it:
          sword: "Ad ogni lotta che affronta le sue falci diventano\npiù affilate. Può tranciare in due grossi tronchi\ncon un solo colpo."
          shield: "Se ci si imbatte in una zona della foresta con\nmolti alberi abbattuti, si tratta del territorio\ndi uno Scyther."
        de:
          sword: "Mit jedem Kampf werden seine Sicheln schärfer.\nEs kann selbst einen massiven Baumstamm mit nur\neinem Schnitt zerteilen."
          shield: "Entdeckt man im Wald ein Gebiet, in dem\nbesonders viele Bäume gefällt wurden,\nbefindet man sich im Revier eines Sichlors."
        es:
          sword: "Sus guadañas se vuelven más afiladas con cada\ncombate. Es capaz de rebanar troncos gruesos\nde un tajo."
          shield: "El territorio de un Scyther se identifica fácilmente\npor el gran número de árboles talados de forma\nindiscriminada en una misma zona del bosque."
        ko:
          sword: "싸움을 거듭하면서 낫은\n점점 더 날카로워진다. 거목도\n일도양단으로 베어 가른다."
          shield: "숲속에서 많은 나무가 베인 채\n쓰러져 있는 장소를 발견했다면\n그곳은 스라크의 영역이다."
        zh_simp:
          sword: "战斗的次数越多，镰刀\n就变得越锋利。就算是\n大树也能一刀劈成两段。"
          shield: "如果在森林中发现某个地方\n有大量树木被砍倒，就说明\n那里是飞天螳螂的领地。"
        zh_trad:
          sword: "隨著牠歷經越多的對戰，\n鐮刀也就會變得越鋒利。\n連大樹也能一刀劈成兩半。"
          shield: "如果在森林裡發現了\n有很多樹被砍倒的地方，\n那就是飛天螳螂的地盤。"
