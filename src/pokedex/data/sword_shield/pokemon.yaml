          shield: "こどもの　いない　ガルーラが\nそうなんした　にんげんの　こを\nそだてていたという　きろくがある。"
        jp_kanji:
          sword: "腹の　袋に　子どもが　いるが\nフットワークは　とても　軽い。\n素早いジャブで　相手を　威嚇。"
          shield: "子どもの　いない　ガルーラが\n遭難した　人間の　子を\n育てていたという　記録がある。"
        en:
          sword: "Although it’s carrying its baby in a pouch on\nits belly, Kangaskhan is swift on its feet. It\nintimidates its opponents with quick jabs."
          shield: "There are records of a lost human child being\nraised by a childless Kangaskhan."
        fr:
          sword: "Porter son petit dans sa poche ventrale ne\nl’empêche pas d’avoir un bon jeu de jambes.\nSes coups rapides intimident ses ennemis."
          shield: "Certains documents certifient que les Kangourex\nsans progéniture élevaient des enfants humains\nen détresse."
        it:
          sword: "Ha un agile gioco di gambe, nonostante si porti\nappresso il cucciolo nel marsupio ventrale.\nIntimidisce gli avversari con jab velocissimi."
          shield: "Alcuni documenti parlano di Kangaskhan\nsenza cuccioli che hanno allevato bambini\numani dispersi."
        de:
          sword: "Obwohl es sein Junges im Beutel trägt, bewegt\nsich dieses Pokémon äußerst leichtfüßig. Gegner\nschreckt Kangama mit blitzschnellen Schlägen ab."
          shield: "Es liegen Berichte vor, laut denen Kangama ohne\neigenen Nachwuchs stattdessen Menschenkinder\nin Not aufgezogen haben."
        es:
          sword: "Aunque lleve una cría en el marsupio, su juego\nde pies no pierde ligereza. Abruma al rival con\nráfagas de ágiles puñetazos."
          shield: "Se han documentado casos de Kangaskhan sin\ncrías que han adoptado bebés humanos cuyos\npadres habían sido víctimas de accidentes."
        ko:
          sword: "배의 주머니에 새끼가 있지만\n발놀림은 매우 가볍다.\n재빠른 잽으로 상대를 위협한다."
          shield: "새끼가 없는 캥카가\n조난한 사람의 아이를\n길렀다는 기록이 있다."
        zh_simp:
          sword: "虽然腹部的袋子里装着\n宝宝，步法却极为轻盈。\n会用快速的刺拳威吓对手。"
          shield: "据记载，曾有没孩子的\n袋兽将遇难人类的\n小孩抚养长大。"
        zh_trad:
          sword: "腹部的袋子裡裝著孩子，\n但是步法非常輕盈。\n會用高速的刺拳威嚇對手。"
          shield: "紀錄中記載著，\n曾經有沒孩子的袋獸\n養育了遇難的人類孩子。"
