      descriptions:
        jp_kana:
          sword: "あたたかい　あさせで　くらす。\nてきに　であうと　たいないきかんを\nくちから　だして　なぐりつける。"
          shield: "ほしつこうかに　すぐれた　ねんえきが\nひふを　おおっているので　なんにちも\nりくちに　いても　ひからびない。"
        jp_kanji:
          sword: "温かい　浅瀬で　暮らす。\n敵に　出会うと　体内器官を\n口から　出して　殴りつける。"
          shield: "保湿効果に　優れた　粘液が\n皮膚を　被っているので　何日も\n陸地に　いても　干からびない。"
        en:
          sword: "It lives in warm, shallow waters. If it encounters a\nfoe, it will spit out its internal organs as a means\nto punch them."
          shield: "It’s covered in a slime that keeps its skin moist,\nallowing it to stay on land for days without\ndrying up."
        fr:
          sword: "Il vit dans les eaux chaudes des hauts-fonds.\nS’il croise un ennemi, il l’attaque en lui crachant\nses organes internes au visage."
          shield: "Le fluide visqueux qui le recouvre garde sa peau\nbien hydratée, ce qui lui permet de vivre plusieurs\njours sur la terre ferme sans se dessécher."
        it:
          sword: "Vive vicino alle spiagge in acque calde e poco\nprofonde. Quando si imbatte in un nemico, lo\nattacca espellendo gli organi interni dalla bocca."
          shield: "Il muco di cui è ricoperto mantiene stabile\nl’umidità della sua pelle. Può rimanere fuori\ndall’acqua per giorni senza seccarsi."
        de:
          sword: "Es lebt in warmen Küstengewässern. Trifft es auf\neinen Gegner, öffnet es den Mund und lässt zum\nAngriff seine Organe hervorschnellen."
          shield: "Seine Schleimschicht hydriert seine Haut so\neffizient, dass es mehrere Tage an Land leben\nkann, ohne auszutrocknen."
        es:
          sword: "Vive en los cálidos bajíos de las playas. Si se\ntopa con un enemigo, ataca golpeándolo sin\ncesar con las entrañas que expulsa por la boca."
          shield: "La formidable mucosidad que envuelve su piel\nlo mantiene hidratado y le permite permanecer\nen tierra firme varios días sin secarse."
        ko:
          sword: "따뜻하고 얕은 여울에 산다.\n상대와 마주치면 체내 기관을\n입으로 뿜어서 때려눕힌다."
          shield: "보습 효과가 뛰어난 점액이\n피부를 감싸고 있어 며칠을\n육지에 있어도 마르지 않는다."
        zh_simp:
          sword: "栖息于温暖的浅滩。\n遇到敌人时，会从嘴里\n吐出内脏来攻击对方。"
          shield: "覆盖着皮肤的粘液\n具有出众的保湿效果，\n即使在陆地上待好几天也不会干掉。"
        zh_trad:
          sword: "棲息在溫暖的淺灘。\n遇到敵人時，會從嘴裡\n吐出內臟來攻擊對方。"
          shield: "覆蓋著皮膚的黏液\n具有出眾的保濕效果，\n即使在陸地上待好幾天也不會乾掉。"
