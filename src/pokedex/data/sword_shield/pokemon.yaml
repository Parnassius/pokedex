      descriptions:
        jp_kana:
          sword: "５トンの　にもつを　もっても\nへいきな　ちからもち　ポケモン。\nはなを　つかって　つちを　ほる。"
          shield: "ちからしごとなら　おまかせ。\nどうの　からだは　あめで　さび\nあざやかな　みどりに　かわる。"
        jp_kanji:
          sword: "５トンの　荷物を　もっても\n平気な　力持ち　ポケモン。\n鼻を　使って　土を　掘る。"
          shield: "力仕事なら　お任せ。\n銅の　体は　雨で　錆び\n鮮やかな　緑に　変わる。"
        en:
          sword: "It digs up the ground with its trunk. It’s also very\nstrong, being able to carry loads of over\nfive tons without any problem at all."
          shield: "If a job requires serious strength, this Pokémon\nwill excel at it. Its copper body tarnishes in the\nrain, turning a vibrant green color."
        fr:
          sword: "Ce Pokémon est assez costaud pour porter\ndes charges de cinq tonnes sans problème.\nIl utilise sa trompe pour creuser le sol."
          shield: "Les travaux physiques, c’est son affaire.\nSon corps de cuivre rouille sous la pluie\net prend une vive couleur verte."
        it:
          sword: "È un Pokémon molto forte, capace di trasportare\nfacilmente carichi di cinque tonnellate. Usa la\nproboscide per scavare la terra."
          shield: "I lavori pesanti sono il suo pane quotidiano.\nIl suo corpo di rame si ossida con la pioggia\ncolorandosi di un verde intenso."
        de:
          sword: "Dieses Pokémon verfügt über eine Stärke, mit der\nes problemlos fünf Tonnen stemmen kann. Es\nnutzt seinen Rüssel, um in der Erde zu graben."
          shield: "Harte Knochenarbeit kann man problemlos ihm\nüberlassen. Sein Körper aus Kupfer rostet im\nRegen und nimmt eine leuchtend grüne Farbe an."
        es:
          sword: "Su constitución fornida le permite transportar\nsin inmutarse cargas de 5 toneladas. Utiliza la\ntrompa para excavar la tierra."
          shield: "Realiza tareas que requieren de esfuerzo físico,\nes su fuerte. Con la lluvia, su cuerpo de cobre se\noxida y adquiere una tonalidad verde intensa."
        ko:
          sword: "5톤의 짐을 실어도 문제없는\n힘이 장사인 포켓몬.\n코를 이용해서 땅을 판다."
          shield: "힘쓰는 일에 강하다.\n동으로 된 몸체는 비에 녹슬어\n선명한 녹색으로 변한다."
        zh_simp:
          sword: "能轻松举起重达５吨的\n货物的大力士宝可梦。\n会用鼻子挖地。"
          shield: "擅长需要力气的工作。\n铜质的身体会因雨水而生锈，\n转变成鲜艳的绿色。"
        zh_trad:
          sword: "能輕鬆舉起重達５噸的\n貨物的大力士寶可夢。\n會用鼻子挖地。"
          shield: "擅長需要力氣的工作。\n銅質的身體會因雨水而生鏽，\n轉變成鮮豔的綠色。"
copperajah:
