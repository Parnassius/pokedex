          shield: "ほんらいの　ちからを　ときはなつ\nさいごの　ファクターは　しんらいする\nトレーナーとの　きずな　だった。"
        jp_kanji:
          sword: "パートナーとの　強い　絆により\n秘めた　能力が　覚醒した。\n自在に　タイプを　変えられる。"
          shield: "本来の　力を　解き放つ\n最後の　ファクターは　信頼する\nトレーナーとの　絆　だった。"
        en:
          sword: "A solid bond of trust between this Pokémon and\nits Trainer awakened the strength hidden within\nSilvally. It can change its type at will."
          shield: "The final factor needed to release this\nPokémon’s true power was a strong bond\nwith a Trainer it trusts."
        fr:
          sword: "Un lien fort avec son Dresseur lui a permis\nde libérer tout son potentiel.\nIl peut changer de type à volonté."
          shield: "La relation de confiance qui le lie à son Dresseur\nest le facteur décisif qui lui permet de libérer\ntout son potentiel."
        it:
          sword: "Lo stretto legame con il suo Allenatore ha\nrisvegliato il suo potere nascosto.\nPuò cambiare tipo a suo piacimento."
          shield: "Il fattore decisivo che permette di liberare la sua\nvera potenza è il legame di fiducia che lo unisce\nal suo Allenatore."
        de:
          sword: "Seine wahren Kräfte wurden durch eine starke\nBindung zu seinem Trainer erweckt. Es kann\nseinen Typ nach Belieben wechseln."
          shield: "Der entscheidende Faktor, durch den es seine\nwahren Kräfte freisetzen kann, ist die enge\nBindung zu einem Trainer, dem es vertraut."
        es:
          sword: "Gracias a los fuertes vínculos que lo unen a su\nEntrenador, ha despertado todo su potencial.\nEs capaz de cambiar de tipo a voluntad."
          shield: "El factor decisivo que le ha permitido liberar\ntoda su fuerza ha sido el estrecho vínculo y la\nconfianza que profesa a su Entrenador."
        ko:
          sword: "파트너와의 강한 유대에 의해\n숨겨진 능력을 각성했다.\n자유자재로 타입을 바꿀 수 있다."
          shield: "본래의 힘을 해방하게 하는\n마지막 요소는 신뢰하는\n트레이너와의 유대였다."
        zh_simp:
          sword: "与伙伴间深厚的牵绊让\n蕴藏在自己体内的力量觉醒。\n可以随意改变属性。"
          shield: "与所信赖的训练家之间的牵绊\n是解放它真正力量的\n最后一个要素。"
        zh_trad:
          sword: "與夥伴間深厚的牽絆讓\n蘊藏在自己體內的力量覺醒。\n可以隨意改變屬性。"
          shield: "與所信賴的訓練家之間的牽絆\n是解放牠真正力量的\n最後一個要素。"
