      types:
        - ground
        - dark
      egg_groups:
        - field
      abilities:
        - intimidate
        - moxie
      hidden_ability: anger_point
      held_items:
        rare: black_glasses
      descriptions:
        jp_kana:
          sword: "さばくの　よるは　ひえるので\nすなの　おくふかくに　もぐり\nひが　でるまで　ねむって　すごす。"
          shield: "ちいさいが　あしこしの　ちからは\nつよい。　すなを　かきわけて\nさばくを　およぐように　いどう。"
        jp_kanji:
          sword: "砂漠の　夜は　冷えるので\n砂の　奥深くに　潜り\n陽が　出るまで　眠って　過ごす。"
          shield: "小さいが　足腰の　力は　強い。\n砂を　かき分けて\n砂漠を　泳ぐように　移動。"
        en:
          sword: "The desert gets cold at night, so when the sun\nsets, this Pokémon burrows deep into the sand\nand sleeps until sunrise."
          shield: "Sandile is small, but its legs and lower body are\npowerful. Pushing sand aside as it goes, Sandile\nmoves through the desert as if it’s swimming."
        fr:
          sword: "Il se protège du froid qui sévit la nuit dans\nle désert en s’enfouissant profondément dans\nle sable, où il dort jusqu’au lever du soleil."
          shield: "Malgré son petit gabarit, il a beaucoup de force\ndans les pattes arrière. Il parcourt le désert\ncomme s’il nageait dans le sable."
        it:
          sword: "Affronta le fredde notti del deserto rintanandosi\nin profondità sotto la sabbia e dormendo fino al\nsorgere del sole."
          shield: "Nonostante la corporatura minuta, ha zampe\nrobuste. Si fa strada nel deserto come nuotando\nnella sabbia."
        de:
          sword: "Da die Wüste nachts abkühlt, vergräbt es sich tief\nim Sand und schläft dort, bis die Sonne wieder\naufgeht."
          shield: "Ganovil ist zwar klein, verfügt aber über kräftige\nBeine, mit denen es sich durch den Wüstensand\nfortbewegt, als würde es schwimmen."
        es:
          sword: "En las frías noches del desierto se oculta a mucha\nprofundidad en la arena y duerme hasta que sale\nel sol."
          shield: "Es pequeño, pero cuenta con un tren inferior\nfuerte. Se desplaza por el desierto abriéndose\npaso entre la arena, como si nadase."
        ko:
          sword: "사막의 밤은 기온이 낮기 때문에\n모래 깊숙이 파고들어\n해가 뜰 때까지 잠을 자면서 생활한다."
          shield: "작지만 하체의 힘은 세다.\n모래를 헤치며 사막을\n헤엄치듯 이동한다."
        zh_simp:
          sword: "沙漠到了夜里会比较冷，\n因此它会潜伏到沙子深处，\n睡到太阳出来为止。"
          shield: "个头虽小，腰腿却很有力。\n会拨开沙子，在沙漠里\n犹如游泳般地自在移动。"
        zh_trad:
          sword: "沙漠的夜晚比較寒冷，\n因此牠會潛到沙子深處，\n一直睡到太陽出來。"
          shield: "體型雖小，但下盤很有力。\n會撥開沙子，在沙漠中\n像是游泳般地自在移動。"
krokorok:
  species_id: 552
  names:
    jp_kana: ワルビル
    jp_kanji: ワルビル
    en: Krokorok
    fr: Escroco
    it: Krokorok
    de: Rokkaiman
    es: Krokorok
    ko: 악비르
    zh_simp: 混混鳄
    zh_trad: 混混鱷
  forms:
    krokorok:
      form_id: 0
      base_stats:
        hp: 60
        attack: 82
        defense: 45
        special_attack: 45
        special_defense: 45
        speed: 74
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ground
        - dark
      egg_groups:
        - field
      abilities:
        - intimidate
        - moxie
      hidden_ability: anger_point
      held_items:
        rare: black_glasses
      descriptions:
        jp_kana:
          sword: "くらやみでも　みえる　とくしゅな\nりょうめの　おかげで　まよなかでも\nまよわず　かりが　できるのだ。"
          shield: "くらやみでも　みえる　とくしゅな\nりょうめを　もつが　さばくのよるは\nさむいので　あまり　うごかない。"
        jp_kanji:
          sword: "暗闇でも　見える　特殊な\n両目の　おかげで　真夜中でも\n迷わず　狩りが　できるのだ。"
          shield: "暗闇でも　見える　特殊な\n両目を　もつが　砂漠の夜は\n寒いので　あまり　動かない。"
        en:
          sword: "Krokorok has specialized eyes that enable it to\nsee in the dark. This ability lets Krokorok hunt in\nthe dead of night without getting lost."
          shield: "Although this Pokémon has specialized eyes that\nallow it to see in the dark, Krokorok won’t move\nmuch at night—the desert gets cold after sunset."
        fr:
          sword: "Il chasse de nuit sans difficulté grâce à\nses yeux particuliers qui lui permettent\nde voir dans l’obscurité."
          shield: "Bien que ses yeux particuliers lui permettent\nde voir dans l’obscurité, les nuits sont si froides\ndans le désert qu’il ne se déplace presque pas."
        it:
          sword: "È in grado di cacciare nel pieno della notte senza\ndifficoltà, grazie agli occhi particolari che gli\npermettono di vedere anche al buio."
          shield: "È dotato di occhi particolari che gli permettono\ndi vedere anche al buio, ma poiché le notti nel\ndeserto sono fredde non è molto attivo di notte."
        de:
          sword: "Da es dank seiner besonderen Augen selbst im\nDunkeln gut sieht, kann es auch nachts auf die\nJagd gehen, ohne sich zu verirren."
          shield: "Obwohl es dank seiner besonderen Augen auch\nim Dunkeln gut sehen kann, bewegt es sich nachts\nnur selten, da die Wüste dann abkühlt."
        es:
          sword: "Es capaz de cazar en plena noche sin perderse\ngracias a sus ojos especiales, que le permiten\nver en la oscuridad."
          shield: "Tiene unos ojos especiales que le permiten ver\nen la oscuridad, pero suele permanecer inmóvil\nen las frías noches del desierto."
        ko:
          sword: "어둠 속에서도 볼 수 있는 특수한\n두 눈 덕분에 한밤중에도\n거침없이 사냥할 수 있다."
          shield: "어둠 속에서도 볼 수 있는 특수한\n눈을 가졌지만 사막의 밤은\n춥기 때문에 잘 움직이지 않는다."
        zh_simp:
          sword: "多亏了那双能在黑暗中看清\n四周的特殊眼睛，即使在深夜里\n它也能精准地进行捕猎。"
          shield: "虽然拥有能在黑暗中看清事物的\n特殊双眼，但由于沙漠的夜晚寒冷，\n所以一般不怎么活动。"
        zh_trad:
          sword: "有一雙在漆黑環境也能看見\n四周的特殊眼睛，讓牠即使\n在半夜也能不受影響地去打獵。"
          shield: "雖然有一雙在漆黑環境也能看見\n四周的特殊眼睛，但因為沙漠的\n夜晚較寒冷，所以牠不太會活動。"
