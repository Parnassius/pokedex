          shield: "最新の　科学技術を　使い\n岩の　体を　調べたが　脳や\n心臓を　見つけられなかった。"
        en:
          sword: "Every bit of Regirock’s body is made of stone.\nAs parts of its body erode, this Pokémon sticks\nrocks to itself to repair what’s been lost."
          shield: "Cutting-edge technology was used to study\nthe internals of this Pokémon’s rock body, but\nnothing was found—not even a brain or a heart."
        fr:
          sword: "Il est entièrement composé de pierre.\nSi jamais une partie de son corps s’effrite,\nil la répare en y collant des rochers."
          shield: "Bien que son corps de pierre ait été examiné\navec les technologies les plus modernes, nulle\ntrace de cerveau ou de cœur n’a été trouvée."
        it:
          sword: "Le varie parti del suo corpo sono costituite da\nrocce. Nel caso in cui si sgretoli, può ricomporre\nil suo organismo con nuove pietre."
          shield: "Il suo corpo roccioso è stato analizzato usando\nle più moderne tecnologie, ma non si è trovata\ntraccia di organi come cervello o cuore."
        de:
          sword: "Sein Körper besteht vollständig aus Steinen.\nWenn Teile davon abbröckeln, ersetzt Regirock\ndiese einfach durch neue Steine."
          shield: "Selbst mit modernster Technologie konnten bei\nder Analyse seines Steinkörpers weder Herz noch\nGehirn gefunden werden."
        es:
          sword: "Todo su cuerpo está hecho de roca. Si alguna\nparte se erosiona, la recompone con más rocas."
          shield: "Su cuerpo rocoso ha sido examinado con las\ntécnicas científicas más avanzadas, pero no se\nhan encontrado ni su cerebro ni su corazón."
        ko:
          sword: "몸의 모든 부분이 바위로 되어 있다.\n몸이 깎이더라도\n스스로 바위를 붙여서 치료한다."
          shield: "최신 과학 기술을 구사하여\n바위 몸을 조사했지만\n뇌나 심장을 찾지 못했다."
        zh_simp:
          sword: "身上任何一个部分都由\n岩石构成。即使身体磨损了\n也会自己用岩石去修补。"
          shield: "人们通过最新的科学技术\n对它的岩石身体做了调查，\n但是并未发现大脑和心脏。"
        zh_trad:
          sword: "全身所有部分都是由岩石\n構成。即使身體有磨損，\n也能自己補上岩石修復。"
          shield: "有人利用最新的科學技術\n調查了牠的岩石身體，但\n卻找不到牠的大腦或心臟。"
