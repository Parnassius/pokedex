      types:
        - poison
      egg_groups:
        - monster
        - field
      abilities:
        - poison_point
        - rivalry
      hidden_ability: hustle
      descriptions:
        jp_kana:
          sword: "ダイヤモンドより　かたい　ツノで\nがんせきを　くだいて　まわる。\nつきのいしを　さがして　いるのだ。"
          shield: "しんけいしつで　けんかっぱやい。\nたいないの　アドレナリンが　ふえると\nどくその　のうども　たかまるぞ。"
        jp_kanji:
          sword: "ダイヤモンドより　硬い　ツノで\n岩石を　砕いて　まわる。\nつきのいしを　探しているのだ。"
          shield: "神経質で　喧嘩っ早い。\n体内の　アドレナリンが　増えると\n毒素の　濃度も　高まるぞ。"
        en:
          sword: "With a horn that’s harder than diamond, this\nPokémon goes around shattering boulders as it\nsearches for a moon stone."
          shield: "It’s nervous and quick to act aggressively.\nThe potency of its poison increases along with\nthe level of adrenaline present in its body."
        fr:
          sword: "Il erre à la recherche d’une Pierre Lune,\nbrisant tous les rochers sur son passage\navec sa corne plus solide qu’un diamant."
          shield: "D’un naturel nerveux, il est prompt à se battre.\nLorsqu’il a une montée d’adrénaline,\nla concentration de son poison augmente."
        it:
          sword: "Vaga alla ricerca di una Pietralunare frantumando\nrocce con il suo corno più duro del diamante."
          shield: "È irritabile e sempre pronto a battersi. Quando\nil livello di adrenalina nel suo corpo si alza,\naumenta anche la concentrazione di tossine."
        de:
          sword: "Auf der Suche nach einem Mondstein zerstört es\nFelsen mit seinem Horn, das härter ist als ein\nDiamant."
          shield: "Es ist nervös und wird schnell aggressiv. Steigt\nsein Adrenalinspiegel, erhöht sich gleichzeitig\nauch die Konzentration seines Gifts."
        es:
          sword: "Dondequiera que va, parte rocas con su cuerno,\nmás duro que un diamante, en busca de una\nPiedra Lunar."
          shield: "Es nervioso y agresivo por naturaleza. Cuando\nsuben sus niveles de adrenalina, la concentración\nde toxinas en su veneno aumenta."
        ko:
          sword: "다이아몬드보다 단단한 뿔로\n암석을 부수며 다닌다.\n달의돌을 찾고 있는 것이다."
          shield: "신경질적이고 호전적이다.\n체내의 아드레날린이 증가하면\n독소의 농도도 높아진다."
        zh_simp:
          sword: "见着岩石，就会用自己比\n钻石还硬的角将其弄碎。\n它这么做是为了寻找月之石。"
          shield: "神经敏感，动不动就打架。\n体内的肾上腺素一增加，\n毒素的浓度也会提高。"
        zh_trad:
          sword: "會用比鑽石還要堅硬\n的角到處擊碎岩石，\n藉此尋找月之石。"
          shield: "神經質且容易發脾氣打架。\n當體內的腎上腺素增加時，\n毒素的濃度也會提升。"
nidoking:
