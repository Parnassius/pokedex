        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - grass
        - flying
      egg_groups:
        - flying
      abilities:
        - overgrow
      hidden_ability: long_reach
      descriptions:
        jp_kana:
          sword: "ひこうしながら　きれあじ　するどい\nはねを　とばし　きんきょりでは\nきょうれつな　キックを　たたきこむ。"
          shield: "ひるまは　こうごうせいで　ちからを\nたくわえ　よるに　なると　はおとを\nたてずに　とんで　えものを　さがす。"
        jp_kanji:
          sword: "飛行しながら　切れ味　鋭い\n羽根を　飛ばし　近距離では\n強烈な　キックを　叩きこむ。"
          shield: "昼間は　光合成で　力を\n蓄え　夜に　なると　羽音を\n立てずに　飛んで　獲物を　探す。"
        en:
          sword: "At a distance, it launches its sharp feathers while\nflying about. If the enemy gets too close, Rowlet\nswitches tactics and delivers vicious kicks."
          shield: "During the day, it builds up energy via\nphotosynthesis. At night, it flies silently\nthrough the sky, on the prowl for prey."
        fr:
          sword: "En vol, il attaque en lançant ses plumes aiguisées\ncomme des lames. Au corps à corps, il se bat\nen donnant de violents coups de patte."
          shield: "Pendant la journée, il emmagasine de l’énergie\npar photosynthèse. La nuit, il plane\nsilencieusement à la recherche de proies."
        it:
          sword: "In volo attacca lanciando piume affilate\ncome lame, mentre a distanza ravvicinata\ntira poderosi calci con le zampe robuste."
          shield: "Accumula energia durante il giorno grazie alla\nfotosintesi e di notte vola senza fare alcun\nrumore in cerca di prede."
        de:
          sword: "Während es durch die Lüfte fliegt, schleudert es\nscharfe Federn auf seine Ziele. Wenn Gegner ihm\nzu nahe kommen, greift es mit heftigen Tritten an."
          shield: "Tagsüber sammelt es per Photosynthese Kräfte,\num nachts lautlos durch die Lüfte zu fliegen und\nnach Beute zu suchen."
        es:
          sword: "En pleno vuelo, ataca arrojando sus plumas\nafiladas como cuchillas y, a corta distancia,\ncastiga al rival propinando poderosas patadas."
          shield: "Durante el día acumula energía mediante la\nfotosíntesis y, al caer la noche, vuela sin hacer\nruido en busca de presas."
        ko:
          sword: "비행하면서 날카로운\n깃털을 날리고 근거리가 되면\n강렬한 킥을 날린다."
          shield: "낮 동안에는 광합성으로\n힘을 비축하고 밤이 되면\n소리 없이 날며 먹이를 찾는다."
        zh_simp:
          sword: "一边飞行一边射出\n刀刃般锐利的羽毛，\n距离近时会使出猛烈的踢击。"
          shield: "白天利用光合作用积蓄力量，\n到了晚上则会悄无声息地\n在空中飞翔，寻找猎物。"
        zh_trad:
          sword: "一邊飛行一邊射出\n刀刃般銳利的羽毛，\n距離近時會使出猛烈的踢擊。"
          shield: "白天利用光合作用積蓄力量，\n到了晚上則會悄無聲息地\n在空中飛翔，尋找獵物。"
dartrix:
  species_id: 723
  names:
    jp_kana: フクスロー
    jp_kanji: フクスロー
    en: Dartrix
    fr: Efflèche
    it: Dartrix
    de: Arboretoss
    es: Dartrix
    ko: 빼미스로우
    zh_simp: 投羽枭
    zh_trad: 投羽梟
  forms:
