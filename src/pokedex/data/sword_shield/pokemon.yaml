      descriptions:
        jp_kana:
          sword: "せかいいち　おおきな　はなびらは\nあるくたびに　ゆれて　たいりょうの\nどくかふんを　ばらまいてしまう。"
          shield: "はなびらが　おおきいほど　たくさん\nかふんを　だすが　あたまが\nおもたくて　つかれてしまうという。"
        jp_kanji:
          sword: "世界一　大きな　花びらは\n歩くたびに　揺れて　大量の\n毒花粉を　ばらまいてしまう。"
          shield: "花びらが　大きいほど\nたくさん　花粉を　出すが\n頭が　重たくて　疲れてしまうという。"
        en:
          sword: "It has the world’s largest petals. With every step,\nthe petals shake out heavy clouds of toxic pollen."
          shield: "The larger its petals, the more toxic pollen it\ncontains. Its big head is heavy and hard to hold up."
        fr:
          sword: "Il possède les plus gros pétales au monde,\nqui sèment d’épais nuages de pollen toxique\nà chacun de ses pas."
          shield: "Plus ses pétales sont grands, plus il produit\nde pollen toxique. Toutefois, le poids de sa tête\nle fatigue."
        it:
          sword: "Ha i petali più grandi del mondo. Ad ogni\nsuo passo, liberano fitte nubi di polline tossico."
          shield: "Più grandi sono i petali, maggiore è la quantità\ndi polline tossico che contengono. La testa, però,\ndiventa molto pesante e fa fatica a sostenerla."
        de:
          sword: "Es besitzt die größten Blütenblätter der Welt.\nBei jedem Schritt streut es große Mengen an\nGiftpollen zu Boden."
          shield: "Je größer die Blütenblätter, desto mehr giftige\nPollen enthält die Blüte. Aber es ist auch umso\nerschöpfter, da sein Kopf so schwer wird."
        es:
          sword: "Tiene los pétalos más grandes del mundo. Al\ncaminar, de ellos se desprenden densas nubes\nde polen tóxico."
          shield: "Cuanto mayores son sus pétalos, más tóxico es su\npolen. Le pesa la cabeza y le cuesta mantenerla\nerguida."
        ko:
          sword: "세계에서 제일 큰 꽃잎은\n걸을 때마다 흔들려 대량의\n독 꽃가루를 흩뿌린다."
          shield: "꽃잎이 클수록 많은 꽃가루를\n만들어 내지만 머리가\n무거워서 지쳐버린다고 한다."
        zh_simp:
          sword: "它有着世界上最大的花瓣。\n每走一步，花瓣都会跟着摇动，\n同时撒出大量的毒花粉。"
          shield: "虽然花瓣越大，\n就能放出越多的花粉，\n但这样脑袋会变沉，容易疲倦。"
        zh_trad:
          sword: "身上那些全世界最大的花瓣\n會隨著牠的每個步伐搖動，\n散播大量的毒花粉。"
          shield: "雖然花瓣越大就能放出\n越多的花粉，但頭部也會\n隨之變重而容易疲倦。"
diglett:
  species_id: 50
  names:
