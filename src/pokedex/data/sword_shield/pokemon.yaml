        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - dragon
        - ice
      egg_groups:
        - undiscovered
      abilities:
        - teravolt
      descriptions:
        jp_kana:
          sword: "みらいに　じつげんする　ポケモンと\nにんげんの　りそうの　せかいを\nまもるため　たたかうと　いわれる。"
          shield: "おなじ　いでんしを　もつ　ゼクロムを\nきゅうしゅうして　でんきと　こおりの\nエネルギーを　つかえるようになった。"
        jp_kanji:
          sword: "未来に　実現する　ポケモンと\n人間の　理想の　世界を\n守るため　戦うと　いわれる。"
          shield: "同じ　遺伝子を　もつ　ゼクロムを\n吸収して　電気と　氷の\nエネルギーを　使えるようになった。"
        en:
          sword: "It’s said that this Pokémon battles in order to\nprotect the ideal world that will exist in the\nfuture for people and Pokémon."
          shield: "The sameness of Zekrom’s and Kyurem’s genes\nallowed Kyurem to absorb Zekrom. Kyurem can\nnow use the power of both electricity and ice."
        fr:
          sword: "On dit qu’il se bat pour défendre un monde Idéal\ndans lequel Pokémon et humains cohabiteront."
          shield: "En absorbant Zekrom, avec qui il partage\nle même ADN, il est devenu capable d’utiliser\nà la fois l’énergie de l’électricité et de la glace."
        it:
          sword: "Si dice che lotti per la futura realizzazione di\nun mondo ideale per Pokémon ed esseri umani."
          shield: "Assorbendo Zekrom, che possiede il suo stesso\nDNA, ha acquisito la capacità di usare l’energia\ndell’elettricità e del ghiaccio."
        de:
          sword: "Man sagt, es kämpfe dafür, dass in Zukunft eine\nWelt der Wünsche für Menschen und Pokémon\nzur Realität werden kann."
          shield: "Nachdem es Zekrom, das über identische Gene\nverfügt, absorbiert hat, kann es nun sowohl\nElektro- als auch Eis-Energie einsetzen."
        es:
          sword: "Se dice que lucha con el objetivo de defender\nel mundo ideal para humanos y Pokémon que\nse hará realidad en el futuro."
          shield: "Tras la fusión con Zekrom, con el que comparte\nel ADN, puede absorber y controlar la energía\neléctrica y la energía del hielo."
        ko:
          sword: "미래에 만들어질 포켓몬과\n인간의 이상적인 세계를\n지키기 위해 싸웠다고 전해진다."
          shield: "같은 유전자를 가진 제크로무를\n흡수해서 전기와 얼음의\n에너지를 사용할 수 있게 되었다."
        zh_simp:
          sword: "传说它是为了保护宝可梦\n与人类之间那将在未来实现\n的理想世界而战斗。"
          shield: "吸收了与自己拥有\n相同基因的捷克罗姆，\n因此能使用电与冰的能量。"
        zh_trad:
          sword: "傳說牠是為了保護寶可夢\n與人類之間那將在未來實現\n的理想世界而戰鬥。"
          shield: "吸收了與自己擁有\n相同基因的捷克羅姆，\n因此能使用電與冰的能量。"
