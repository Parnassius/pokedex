        - flying
      egg_groups:
        - flying
      abilities:
        - big_pecks
        - super_luck
      hidden_ability: rivalry
      descriptions:
        jp_kana:
          sword: "そらをとぶ　はやさは　そこそこ。\nどんな　とおく　はなれても　あるじと\nじぶんの　すを　おぼえている。"
          shield: "かしこく　ものおぼえが　いい。\nはいたついんが　パートナーに\nえらぶことが　おおいらしい。"
        jp_kanji:
          sword: "空を飛ぶ　速さは　そこそこ。\nどんな　遠く　離れても　主と\n自分の　巣を　憶えている。"
          shield: "賢く　物覚えが　いい。\n配達員が　パートナーに\n選ぶことが　多いらしい。"
        en:
          sword: "It can fly moderately quickly. No matter how far\nit travels, it can always find its way back to its\nmaster and its nest."
          shield: "These bright Pokémon have acute memories.\nApparently delivery workers often choose them\nas their partners."
        fr:
          sword: "Il vole relativement vite et peut parcourir\ndes kilomètres sans oublier où se trouvent\nson Dresseur et son nid."
          shield: "Il est intelligent et possède une bonne mémoire.\nOn raconte que les livreurs le choisissent souvent\ncomme partenaire."
        it:
          sword: "È abbastanza veloce nel volo. Per quanto lontano\nsi spinga, riesce sempre a ritrovare il proprio\nnido e il proprio Allenatore."
          shield: "Pokémon intelligente, dotato di una memoria\ndi ferro. Sembra che molti fattorini lo scelgano\ncome compagno."
        de:
          sword: "Navitaub kann einigermaßen schnell fliegen. Es\nfindet immer zu seinem Trainer und seinem Nest\nzurück, egal, wie weit entfernt es von ihnen ist."
          shield: "Es ist clever und hat ein gutes Gedächtnis.\nAnscheinend wird es von vielen Lieferanten als\nPartner ausgewählt."
        es:
          sword: "Posee una velocidad de vuelo nada desdeñable.\nPor más que se aleje, siempre recuerda el camino\nde regreso a su nido o hasta su Entrenador."
          shield: "Posee una mente ágil y muy buena memoria.\nTal vez por eso muchos repartidores lo eligen\ncomo compañero."
        ko:
          sword: "하늘을 나는 속도는 그저 그렇다.\n아무리 멀리 떨어져 있어도 주인과\n자신의 둥지를 기억하고 있다."
          shield: "영리하고 기억력이 좋다.\n배달원이 파트너로\n선택하는 경우가 많다."
        zh_simp:
          sword: "飞行速度不可小觑。\n无论飞到多远的地方，\n都会记得自己的主人和巢。"
          shield: "头脑聪明而且记性很好。\n似乎有许多快递员\n将它选为自己的搭档。"
        zh_trad:
          sword: "飛行速度不可小覷。\n無論飛到多遠的地方，\n都會記得自己的主人和巢。"
          shield: "頭腦聰明且記性很好。\n似乎有許多快遞員\n將牠選為自己的搭檔。"
