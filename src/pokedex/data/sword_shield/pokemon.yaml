          shield: "３つの　あたまが　いちがんと　なって\nうつ　サイコパワーは　きょうりょく。\nそらが　くもると　うごきが　にぶる。"
        jp_kanji:
          sword: "３つの　頭は　べつのことを\n考えている。　自分以外は\nあまり　興味がない　ようだ。"
          shield: "３つの　頭が　一丸となって\n撃つ　サイコパワーは　強力。\n空が　曇ると　動きが　鈍る。"
        en:
          sword: "Each of Exeggutor’s three heads is thinking\ndifferent thoughts. The three don’t seem to be\nvery interested in one another."
          shield: "When they work together, Exeggutor’s three\nheads can put out powerful psychic energy.\nCloudy days make this Pokémon sluggish."
        fr:
          sword: "Chacune de ses trois têtes pense de manière\nautonome. Elles ne semblent s’intéresser\nqu’à elles-mêmes."
          shield: "Les attaques psychiques lancées par ses trois\ntêtes à l’unisson sont très puissantes. Par temps\nnuageux, ses mouvements sont plus lents."
        it:
          sword: "Le sue tre teste ragionano in modo indipendente.\nSembra che ciascuna pensi solo a sé."
          shield: "I poteri psichici che le sue tre teste scatenano\nall’unisono sono travolgenti. Quando il cielo\nsi rannuvola, i suoi movimenti si fanno lenti."
        de:
          sword: "Jeder der drei Köpfe hat einen eigenen Willen\nund scheint sich nur für sich selbst zu\ninteressieren."
          shield: "Seine drei Köpfe setzen mächtige Psycho-Kräfte\nfrei, wenn sie als Einheit agieren. Zieht sich der\nHimmel zu, bewegt es sich nur noch schwerfällig."
        es:
          sword: "Cada una de las tres cabezas piensa de forma\nindependiente y apenas muestra interés por el\nresto."
          shield: "Puede lanzar ataques psíquicos de gran potencia\nsi sus tres cabezas se ponen de acuerdo. Cuando\nse nubla el cielo, sus movimientos se ralentizan."
        ko:
          sword: "3개의 머리는 서로 다른\n생각을 하고 있다. 자신 외에는\n별로 흥미가 없는 듯하다."
          shield: "3개의 머리가 똘똘 뭉쳐서 쏘는\n사이코 파워는 강력하다.\n날씨가 흐리면 움직임이 둔하다."
        zh_simp:
          sword: "３个脑袋分别在想不同的事。\n似乎对自己以外的事物\n没有什么兴趣。"
          shield: "３个脑袋联合起来\n能使出强大的精神力量。\n天气变阴时动作会变得迟钝。"
        zh_trad:
          sword: "３顆頭都想著不同的事。\n對自己以外的事情\n似乎都沒什麼興趣。"
          shield: "３顆頭團結一致發出的\n精神力量威力強大。天氣\n變陰時動作就會變得遲緩。"
