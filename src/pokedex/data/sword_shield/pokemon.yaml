        jp_kana:
          sword: "てきに　であうと　しっぽの　ウロコを\nうちならし　いかく。　おじけづかない\nつわものだけを　あいてに　たたかう。"
          shield: "ジャラランガの　ウロコで　つくった\nヨロイを　みに　まとった　こだいの\nせんしが　いせきに　えがかれている。"
        jp_kanji:
          sword: "敵に　出会うと　しっぽの　ウロコを\n打ち鳴らし　威嚇。　怖気づかない\n強者だけを　相手に　戦う。"
          shield: "ジャラランガの　ウロコで　つくった\n鎧を　身に　まとった　古代の\n戦士が　遺跡に　描かれている。"
        en:
          sword: "It clatters its tail scales to unnerve opponents.\nThis Pokémon will battle only those who stand\nsteadfast in the face of this display."
          shield: "Certain ruins have paintings of ancient warriors\nwearing armor made of Kommo-o scales."
        fr:
          sword: "Quand il rencontre un ennemi, il fait sonner les\nécailles de sa queue pour l’intimider. Il n’affronte\nque ceux qui ne se laissent pas impressionner."
          shield: "Dans les ruines, on trouve parfois des fresques\nreprésentant des guerriers antiques qui portent\ndes armures faites avec ses écailles."
        it:
          sword: "Quando si imbatte in un nemico, fa risuonare\nle squame della coda per spaventarlo. Lotta solo\ncontro chi non si lascia intimorire."
          shield: "In antiche rovine sono stati rinvenuti dipinti\nraffiguranti guerrieri con armature fatte\ndi squame di Kommo-o."
        de:
          sword: "Trifft es auf einen Gegner, rasselt es drohend mit\nseinen Schwanzschuppen. Nur wenn dieser davon\nunbeeindruckt bleibt, kämpft es mit ihm."
          shield: "In Ruinen finden sich uralte Abbildungen von\nKriegern, die Rüstungen aus Grandiras-Schuppen\ntragen."
        es:
          sword: "Al encontrarse con un enemigo, hace sonar las\nescamas de su cola para intimidarlo. Solamente\nlucha contra aquellos que no se acobardan."
          shield: "Se han descubierto antiguas representaciones\npictóricas de guerreros que lucían armaduras\nconfeccionadas con escamas de Kommo-o."
        ko:
          sword: "상대와 마주치면 꼬리의 비늘로\n소리를 내어 위협한다. 이에 겁먹지 않은\n강자만을 상대로 싸운다."
          shield: "짜랑고우거의 비늘로 만든\n갑옷을 두른 고대의 전사가\n유적에 그려져 있다."
        zh_simp:
          sword: "遇到敌人便会敲响尾部的\n鳞片来威吓对方。只会与\n不畏惧自己的强者战斗。"
          shield: "遗迹壁画中古代战士\n身上穿着的盔甲是用\n杖尾鳞甲龙的鳞片制成的。"
        zh_trad:
          sword: "遇到敵人便會敲響尾部的\n鱗片來威嚇對方。只會與\n不畏懼自己的強者戰鬥。"
          shield: "遺跡壁畫中古代戰士\n身上穿著的盔甲是用\n杖尾鱗甲龍的鱗片製成的。"
