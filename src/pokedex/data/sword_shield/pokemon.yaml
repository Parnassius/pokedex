      descriptions:
        jp_kana:
          sword: "あしで　すいほうを　とばして\nえものを　つつみこみ　おぼれさせる。\nじかんを　かけて　あじわうのだ。"
          shield: "あたまの　すいほうの　なかに\nシズクモを　いれて　えさの　のこりを\nたべさせながら　せわを　するのだ。"
        jp_kanji:
          sword: "脚で　水泡を　飛ばして\n獲物を　包みこみ　溺れさせる。\n時間を　かけて　味わうのだ。"
          shield: "頭の　水泡の　中に\nシズクモを　入れて　エサの　残りを\n食べさせながら　世話を　するのだ。"
        en:
          sword: "It launches water bubbles with its legs, drowning\nprey within the bubbles. This Pokémon can then\ntake its time to savor its meal."
          shield: "It acts as a caretaker for Dewpider, putting them\ninside its bubble and letting them eat any\nleftover food."
        fr:
          sword: "Il piège ses proies dans des bulles qu’il lance\navec ses pattes. Une fois qu’elles se sont noyées,\nil prend son temps pour les déguster."
          shield: "Il prend soin de petits Araqua en les abritant\ndans sa bulle et en les laissant grignoter\nles restes de ses repas."
        it:
          sword: "Con le zampe lancia bolle d’acqua contro\nla preda per farla annegare. Dopo averla\ncatturata, se la gusta senza fretta."
          shield: "Tiene un Dewpider nella bolla e se ne prende\ncura lasciando che si nutra dei suoi avanzi."
        de:
          sword: "Mit seinen Beinen verschießt es Wasserblasen,\num Beute darin einzuschließen und zu ertränken.\nDann verspeist es sie in aller Ruhe."
          shield: "Es lässt Araqua in der Wasserblase um seinen\nKopf Platz nehmen und kümmert sich um es,\nindem es ihm Futterreste überlässt."
        es:
          sword: "Usa las patas para lanzar burbujas de agua con\nlas que atrapa y ahoga a sus presas. Luego se\ntoma su tiempo para saborearlas."
          shield: "Cuida de pequeños Dewpider acogiéndolos en\nsu burbuja de agua y dejando que se alimenten\nde los restos de las presas que ha ingerido."
        ko:
          sword: "다리로 수포를 날려서\n먹이를 감싼 다음 익사시킨다.\n그리고는 시간을 들여 천천히 음미한다."
          shield: "머리의 수포 안에\n물거미를 넣어 남은 먹이를\n먹이면서 돌봐준다."
        zh_simp:
          sword: "会用脚发射水泡，\n包住猎物让其溺水，\n然后花时间慢慢品尝。"
          shield: "把滴蛛放进头上的水泡里，\n一边喂它吃剩的食物，\n一边照顾它。"
        zh_trad:
          sword: "會用腳發射水泡，\n包住獵物讓其溺水，\n然後花時間慢慢品嚐。"
          shield: "把滴蛛放進頭上的水泡裡，\n一邊餵牠吃剩的食物，\n一邊照顧牠。"
