          shield: "くうきの　ながれを　りようして\nはばたかずに　そらへ　まいあがる。\nうみべの　がけに　すを　つくる。"
        jp_kanji:
          sword: "切り立った　崖に　巣を　つくり\n海風を　利用して　広い空を\n上昇し　滑空　するのだ。"
          shield: "空気の　流れを　利用して\n羽ばたかずに　空へ　舞い上がる。\n海辺の　崖に　巣を　つくる。"
        en:
          sword: "It makes its nest on sheer cliffs. Riding the sea\nbreeze, it glides up into the expansive skies."
          shield: "It soars on updrafts without flapping its wings.\nIt makes a nest on sheer cliffs at the sea’s edge."
        fr:
          sword: "Il construit son nid le long des falaises et utilise\nles courants ascendants pour planer en altitude."
          shield: "Il niche dans les falaises.\nEn utilisant les courants d’air, il peut voler\nsans battre des ailes."
        it:
          sword: "Costruisce il nido a ridosso dei precipizi.\nSfrutta la brezza marina per levarsi alto in cielo."
          shield: "Sfrutta le correnti ascensionali per volteggiare\nnel cielo senza sbattere le ali. Fa il nido nelle\nscogliere lungo la costa."
        de:
          sword: "Es baut sein Nest an Steilhängen und nutzt die\nSeebrise, um beim Gleiten am weiten Himmel\nan Höhe zu gewinnen."
          shield: "Es nistet an Steilküsten und nutzt die Luftströme,\num im Gleitflug in den Himmel emporzusteigen."
        es:
          sword: "Construye sus nidos en acantilados escarpados.\nAprovecha la brisa marina para elevarse hacia el\ninmenso cielo y planear."
          shield: "Aprovecha las corrientes de aire para ganar\naltura sin necesidad de batir las alas. Anida\nen acantilados costeros."
        ko:
          sword: "깎아지른 절벽에 둥지를 만들고\n바닷바람을 이용하여\n넓은 하늘 위로 올라 활공한다."
          shield: "공기의 흐름을 이용하여\n날갯짓하지 않고 하늘로 날아오른다.\n해변의 절벽에 둥지를 만든다."
        zh_simp:
          sword: "在陡峭的岩壁上筑巢，\n会借助海风，飞升到\n广阔的天空中滑翔。"
          shield: "利用气流，\n不拍打翅膀就能飞上天空。\n会在海边的岩壁上筑巢。"
        zh_trad:
          sword: "在陡峭的岩壁上築巢，\n會藉助海風，飛升到\n廣闊的天空中滑翔。"
          shield: "利用氣流，\n不拍打翅膀就能飛上天空。\n會在海邊的岩壁上築巢。"
