          sword: "よわった　ポケモンを　みつけると\nじぶんの　タマゴを　わけあたえ\nなおるまで　かんびょうを　つづける。"
          shield: "しあわせが　つまった　ふしぎな\nタマゴを　うむ。　たべた　ひとは\nだれにでも　やさしく　なれるという。"
        jp_kanji:
          sword: "弱った　ポケモンを　見つけると\n自分の　タマゴを　分け与え\n治るまで　看病を　続ける。"
          shield: "幸せが　詰まった　不思議な\nタマゴを　産む。　食べた　人は\n誰にでも　優しくなれるという。"
        en:
          sword: "Whenever a Blissey finds a weakened Pokémon,\nit will share its egg and offer its care until the\nother Pokémon is all better."
          shield: "Blissey lays mysterious eggs that are filled with\nhappiness. It’s said that anyone who eats a\nBlissey egg will start acting kindly to all others."
        fr:
          sword: "Lorsqu’il croise un Pokémon affaibli, il partage\nson œuf avec ce dernier et lui prodigue des soins\njusqu’à ce qu’il soit rétabli."
          shield: "Il pond d’étranges œufs remplis de bonheur.\nOn raconte que quiconque en mange un\ndevient aimable envers tout le monde."
        it:
          sword: "Quando incontra un Pokémon indebolito,\ncondivide con lui il proprio uovo e lo accudisce\nfino alla completa guarigione."
          shield: "Le sue uova sono un magico concentrato\ndi felicità. Si dice che rendano gentile\nchiunque le mangia."
        de:
          sword: "Stößt Heiteira auf geschwächte Pokémon, teilt es\nsein Ei mit ihnen und pflegt sie wieder gesund."
          shield: "Es legt mysteriöse Eier, die voller Glück stecken.\nWer davon isst, soll anderen gegenüber sorgsam\nund höflich werden."
        es:
          sword: "Si se encuentra un Pokémon enfermo, comparte\nsu huevo con él y lo cuida hasta que se recupera."
          shield: "Pone unos extraños huevos llenos de felicidad.\nDicen que aquellos que los prueban se vuelven\namables con todo el mundo."
        ko:
          sword: "약해진 포켓몬을 발견하면\n자신의 알을 나눠주고\n치료될 때까지 병간호한다."
          shield: "행복이 가득 찬 신비한\n알을 낳는다. 먹은 사람은\n누구에게나 친절해진다고 한다."
        zh_simp:
          sword: "发现虚弱的宝可梦时\n就会把自己的蛋分给它，\n并一直精心照顾它直到痊愈。"
          shield: "会生下装满幸福的奇妙之蛋。\n据说，吃下它的蛋的人，\n能够对所有人都温柔相待。"
        zh_trad:
          sword: "發現虛弱的寶可夢時就會\n把自己的蛋分給牠，並且\n一直照顧對方直到牠痊癒。"
          shield: "會生下飽含幸福的神奇的蛋。\n據說吃下蛋的人，就能夠\n對任何人都很溫和相待。"
