      descriptions:
        jp_kana:
          sword: "まだまだ　あかちゃん　だけれど\nリボンに　にた　しょっかくに　ためた\nサイコパワーで　たたかうこともある。"
          shield: "だれもいないのに　ボソッと　なく。\nゴチムにしか　みえていない\nなにかと　はなしている　らしい。"
        jp_kanji:
          sword: "まだまだ　赤ちゃん　だけれど\nリボンに　似た　触角に　溜めた\nサイコパワーで　戦うこともある。"
          shield: "誰もいないのに　ボソッと　鳴く。\nゴチムにしか　見えていない\nなにかと　話している　らしい。"
        en:
          sword: "Though they’re still only babies, there’s psychic\npower stored in their ribbonlike feelers, and\nsometimes they use that power to fight."
          shield: "Even when nobody seems to be around, Gothita\ncan still be heard making a muted cry. Many believe\nit’s speaking to something only it can see."
        fr:
          sword: "Il n’est encore qu’un enfant, mais il lui arrive\nde se battre avec l’énergie psychique concentrée\ndans ses antennes en forme de rubans."
          shield: "Parfois, ce Pokémon chuchote alors qu’il n’y a\npersonne aux alentours. On raconte qu’il parle\nà une entité que personne ne peut voir."
        it:
          sword: "Nonostante sia ancora piccolo, può lottare\nusando i poteri psichici accumulati nelle antenne\na forma di fiocchetti."
          shield: "A volte emette versi anche se non c’è nessuno\nnei paraggi. Per questo si dice che parli con\nesseri che nessun altro può vedere."
        de:
          sword: "Es ist zwar noch ein Baby, aber es weiß sich mit\nden Psycho-Kräften, die seinen schleifenförmigen\nFühlern innewohnen, durchaus zu wehren."
          shield: "Manchmal stößt es Rufe aus, obwohl niemand da\nist. Man vermutet, dass es sich mit irgendetwas\nunterhält, das für niemanden sonst sichtbar ist."
        es:
          sword: "Pese a ser todavía un bebé, puede luchar con\nel poder psíquico que acumula en las antenitas\nen forma de lazos."
          shield: "A veces susurra aunque no haya nadie alrededor.\nPor eso se cree que tal vez hable con alguien o\nalgo imperceptible para los demás."
        ko:
          sword: "아직 아기지만\n리본을 닮은 더듬이에 모아둔\n사이코 파워로 싸울 때도 있다."
          shield: "아무도 없는데 나직이 운다.\n고디탱에게만 보이는\n뭔가와 이야기하는 듯하다."
        zh_simp:
          sword: "虽然还是宝宝，有时也会\n用储存在像蝴蝶结一样的\n触角里的精神力量来战斗。"
          shield: "哥德宝宝会在看似无人的地方\n轻声地叫。它好像是在与某种\n只有它才看得见的东西说话。"
        zh_trad:
          sword: "雖然還是寶寶，有時也會\n用儲存在像蝴蝶結一樣的\n觸角裡的精神力量來戰鬥。"
          shield: "哥德寶寶會在看似無人的地方\n輕聲地叫。牠好像是在與某種\n只有牠才看得見的東西說話。"
