        jp_kana:
          sword: "ちいさくても　おとなを　ビリビリ\nさせるほどの　でんげきを　はなてる。\nただし　じぶんも　おどろいてしまう。"
          shield: "ほほの　でんきぶくろは　ちいさく\nちょっとでも　でんきが　あふれると\nじぶんじしんが　しびれてしまう。"
        jp_kanji:
          sword: "小さくても　大人を　ビリビリ\nさせるほどの　電撃を　放てる。\nただし　自分も　驚いてしまう。"
          shield: "頬の　電気袋は　小さく\nちょっとでも　電気が　あふれると\n自分自身が　痺れてしまう。"
        en:
          sword: "Despite its small size, it can zap even adult\nhumans. However, if it does so, it also\nsurprises itself."
          shield: "The electric sacs in its cheeks are small. If even a\nlittle electricity leaks, it becomes shocked."
        fr:
          sword: "Malgré sa petite taille, il peut électrocuter\nde grandes personnes, ce qui le surprend\négalement."
          shield: "Les poches électriques de ses joues sont\ntrès petites. Lorsqu’elles sont surchargées,\nil s’électrocute lui-même."
        it:
          sword: "Nonostante sia minuto, può folgorare anche\nuna persona adulta... ma quando lo fa,\nsi sorprende da solo."
          shield: "Le sacche elettriche sulle sue guance sono molto\npiccole e, se fuoriesce anche solo un po’\ndi elettricità, resta fulminato."
        de:
          sword: "Obwohl es so klein ist, kann es genug Elektrizität\nfreisetzen, um sogar einen Erwachsenen zu\nüberwältigen. Tritt dies ein, ist es selbst erstaunt."
          shield: "Tritt auch nur eine geringe Menge Elektrizität aus\nseinen kleinen Backentaschen aus, bekommt es\neinen Schlag."
        es:
          sword: "A pesar de su pequeño tamaño, puede soltar\ndescargas capaces de electrocutar a un adulto,\nsi bien él también acaba sobresaltado."
          shield: "Las bolsas de electricidad de sus mejillas son muy\npequeñas y, a poco que se desborden, recibe\nuna fuerte descarga."
        ko:
          sword: "작아도 어른을 찌릿찌릿\n감전시킬 정도의 전기를 낸다.\n단, 자신도 놀라 어찌할 줄 모른다."
          shield: "볼의 전기 주머니가 작아서\n조금이라도 전기가 넘치게 되면\n자기 자신이 감전되어 버린다."
        zh_simp:
          sword: "身体小巧，却能够释放出\n足以让成年人麻痹的电击，\n但是连它自己也会吓一跳。"
          shield: "脸颊上的电囊还很小，\n如果囊里的电太多了，\n就会漏出来电到自己。"
        zh_trad:
          sword: "身形小巧，卻能夠釋放出\n足以讓成年人麻痺的電擊，\n但是連牠自己也會嚇一跳。"
          shield: "臉頰上的電囊還很小，\n如果囊裡的電太多了，\n就會漏出來電到自己。"
cleffa:
