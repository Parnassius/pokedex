          shield: "かいめん　すれすれを　とんで\nおおきな　くちばしで　かいすいごと\nエサを　すくいとって　はこぶのだ。"
        jp_kanji:
          sword: "口の中に　小さなポケモンや\nタマゴを入れて　安全な　場所に\n届けてくれる　空の　運び屋。"
          shield: "海面　すれすれを　飛んで\n大きな　くちばしで　海水ごと\nエサを　すくい取って　運ぶのだ。"
        en:
          sword: "It is a messenger of the skies, carrying small\nPokémon and eggs to safety in its bill."
          shield: "Skimming the water’s surface, it dips its large bill\nin the sea, scoops up food and water, and\ncarries it."
        fr:
          sword: "Ce messager du ciel transporte les petits\nPokémon et les Œufs dans son bec pour\nles conduire en lieu sûr."
          shield: "Avec son grand bec, il transporte de la nourriture\nqu’il a récoltée en volant la bouche ouverte\nau ras de la mer, gobant de l’eau au passage."
        it:
          sword: "È un corriere dei cieli che trasporta Uova e\npiccoli Pokémon nel suo enorme becco per\ncondurli in un luogo sicuro."
          shield: "Si libra a pelo dell’acqua del mare pescando\nil suo cibo e trasportandolo via con il suo grande\nbecco."
        de:
          sword: "Ein Bote der Lüfte. Es bringt Eier und kleine\nPokémon in seinem Schnabel in Sicherheit."
          shield: "Es schnappt sich seine Beute, indem es beim\nFliegen mit seinem großen Schnabel das Wasser\nstreift."
        es:
          sword: "Transporta a pequeños Pokémon y Huevos en su\npico hasta lugares seguros."
          shield: "Vuela a ras de la superficie marina para llenar\nsu inmenso pico de agua y comida, que se lleva\nconsigo."
        ko:
          sword: "입속에 작은 포켓몬이나\n알을 넣고 안전한 장소로\n운반해주는 하늘의 배달꾼."
          shield: "해면 아주 가까이 날아\n큰 부리로 해수와 함께\n먹이를 건져 나른다."
        zh_simp:
          sword: "把小型宝可梦和蛋放进嘴里，\n并运送到安全地方的空中运送员。"
          shield: "会贴着海面飞行，\n用大大的鸟嘴连着海水一起\n把食物捞起来带走。"
        zh_trad:
          sword: "把小型寶可夢和蛋\n放進嘴裡，並運送到\n安全地方的空中送貨員。"
          shield: "會貼著海面飛行，\n用大大的鳥嘴連著海水一起\n把食物撈起來帶走。"
