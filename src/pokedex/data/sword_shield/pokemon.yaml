        - flash_fire
        - flame_body
      hidden_ability: infiltrator
      descriptions:
        jp_kana:
          sword: "ほのおで　ねっせられた　からだは\nほんのり　あたたかい。　まいごの\nてを　ひき　れいかいへと　いざなう。"
          shield: "すいとる　いのちが　わかければ\nわかいほど　あたまの　ほのおは\nおおきく　あやしく　もえあがる。"
        jp_kanji:
          sword: "炎で　熱せられた　体は\nほんのり　温かい。　迷子の\n手を　引き　霊界へと　誘う。"
          shield: "吸い取る　命が　若ければ\n若いほど　頭の　炎は\n大きく　妖しく　燃え上がる。"
        en:
          sword: "The flame on its head keeps its body slightly\nwarm. This Pokémon takes lost children by the\nhand to guide them to the spirit world."
          shield: "The younger the life this Pokémon absorbs,\nthe brighter and eerier the flame on its\nhead burns."
        fr:
          sword: "Son corps est tiède, réchauffé par sa flamme.\nIl prend les personnes égarées par la main\net les guide vers le monde des esprits."
          shield: "Plus les victimes dont il aspire l’énergie vitale\nsont jeunes, plus sa flamme grandit et luit\nlugubrement."
        it:
          sword: "La sua fiamma gli riscalda il corpo rendendolo\nleggermente tiepido. Prende per mano chi si\nè smarrito per condurlo nel mondo degli spiriti."
          shield: "Più giovane è la vittima da cui ha assorbito\nl’energia vitale, più grande e sinistra è la\nfiamma che gli brilla sul capo."
        de:
          sword: "Seine Flamme wärmt seinen Körper leicht.\nWer vom Weg abkommt, wird von ihm an der\nHand genommen und ins Jenseits gelockt."
          shield: "Je jünger das Opfer, dem es die Lebensenergie\nentzieht, desto höher und unheimlicher brennt\ndie Flamme auf seinem Kopf."
        es:
          sword: "El calor de la llama hace que su cuerpo esté\nalgo tibio. Toma de la mano a quien se pierde\npara llevárselo a su mundo de espíritus."
          shield: "Cuanto más joven sea la energía vital que ha\nabsorbido, mayor tamaño tendrá la llama de\nla cabeza y más siniestro será su brillo."
        ko:
          sword: "불꽃으로 뜨거워진 몸은\n약간 따뜻하다. 미아의\n손을 잡고 영계로 데리고 간다."
          shield: "흡수하는 생명이 젊으면\n젊을수록 머리의 불꽃은\n크고 괴이하게 타오른다."
        zh_simp:
          sword: "头上燃烧着的烛光让它的身体\n保持微热。会拉着迷路孩子的手，\n将他们带向灵界。"
          shield: "吸取到的灵魂越年轻，\n头上的烛光就会\n燃烧得越旺越诡异。"
        zh_trad:
          sword: "頭上燃燒著的燭光讓牠的身體\n保持微熱。會拉著迷路孩子的手，\n將他們帶向靈界。"
          shield: "吸取到的靈魂越年輕，\n頭上的燭光就會\n燃燒得越旺越詭異。"
lampent:
