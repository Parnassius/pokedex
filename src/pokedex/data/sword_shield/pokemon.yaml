      descriptions:
        jp_kana:
          sword: "みどりのひふは　みずにも　つよい。\nむかし　ほかのとちから　やってきて\nひとと　いっしょに　はたらいた。"
          shield: "むれを　つくって　くらしている。\nはなの　あくりょくは　おおいわも\nこなごなに　くだくほど　つよい。"
        jp_kanji:
          sword: "緑の皮膚は　水にも　強い。\n昔　ほかの土地から　やってきて\n人と　いっしょに　働いた。"
          shield: "群れを　つくって　暮らしている。\n鼻の　握力は　大岩も\n粉々に　砕くほど　強い。"
        en:
          sword: "They came over from another region long\nago and worked together with humans.\nTheir green skin is resistant to water."
          shield: "These Pokémon live in herds. Their trunks have\nincredible grip strength, strong enough to crush\ngiant rocks into powder."
        fr:
          sword: "Sa peau verte résiste bien à l’eau.\nIl s’est installé dans la région il y a longtemps\net a travaillé en coopération avec les Hommes."
          shield: "Ces Pokémon vivent en troupeau.\nL’étreinte de leur trompe est si forte qu’elle suffit\nà réduire un rocher en poussière."
        it:
          sword: "La sua pelle verde è resistente all’acqua.\nOriginario di un’altra regione, è giunto a Galar\nin passato per lavorare insieme agli esseri umani."
          shield: "Vive in gruppo. La stretta della sua proboscide\nè così forte da mandare in frantumi anche le\nrocce più grandi."
        de:
          sword: "Seine grüne Haut ist wasserresistent. Es kam\nvor langer Zeit aus einer anderen Region und\nverrichtete mit den Menschen Arbeiten."
          shield: "Diese Pokémon leben in Herden. Drücken sie mit\nihren kräftigen Rüsseln zu, können sie selbst\nmassive Felsen zu Staub zermahlen."
        es:
          sword: "Su piel verdosa es resistente al agua. Proviene\nde tierras lejanas y presta ayuda a las personas\nen la realización de ciertos trabajos."
          shield: "Viven en manadas. La fuerza prensil de su trompa\nes tan extraordinaria que le permite hacer añicos\nincluso grandes rocas."
        ko:
          sword: "녹색 피부는 물에도 강하다.\n오래전에 다른 지방에서 오게 되어\n사람과 함께 일했다."
          shield: "무리를 지어 생활한다.\n코의 악력은 큰 바위도\n산산이 부술 정도로 강하다."
        zh_simp:
          sword: "绿色的皮肤非常耐水。\n在很久以前从其他地区过来，\n之后便一直与人类一起工作。"
          shield: "群居的宝可梦。\n鼻子的握力十分强劲，\n甚至能把大石头弄得粉碎。"
        zh_trad:
          sword: "綠色的皮膚非常耐水。\n在很久以前從其他地區過來，\n之後便一直與人類一起工作。"
          shield: "群居的寶可夢。\n鼻子的握力十分強勁，\n甚至能把大石頭弄得粉碎。"
  gmax_forms:
    copperajah_gigantamax:
      form_id: 999
      names:
        jp_kana: キョダイマックス
        jp_kanji: キョダイマックス
        en: Gigantamax
        fr: Gigamax
        it: Gigamax
        de: Gigadynamax
        es: Gigamax
        ko: 거다이맥스
        zh_simp: 超极巨化
        zh_trad: 超極巨化
      descriptions:
        jp_kana:
          sword: "はなの　なかに　みっちり　つまった\nエネルギーを　ふんしゃさせると\nやまが　ふきとび　ちけいが　かわる。"
          shield: "キョダイマックスした　きょだいな\nはなは　きょだい　けんぞうぶつも\nいちげきで　かいたいしてしまう。"
        jp_kanji:
          sword: "鼻の　中に　みっちり　詰まった\nエネルギーを　噴射させると\n山が　吹き飛び　地形が　変わる。"
          shield: "キョダイマックスした　巨大な\n鼻は　巨大建造物も\n一撃で　解体してしまう。"
        en:
          sword: "So much power is packed within its trunk that if it\nwere to unleash that power, the resulting blast\ncould level mountains and change the landscape."
          shield: "After this Pokémon has Gigantamaxed, its\nmassive nose can utterly demolish large\nstructures with a single smashing blow."
        fr:
          sword: "Lorsqu’il propulse l’énergie qu’il a accumulée\ndans sa trompe, les montagnes s’envolent,\ndéfigurant à jamais le paysage."
          shield: "Lorsqu’il bénéficie de la puissance du Gigamax,\nil peut mettre en pièces de grands bâtiments\nd’un seul coup de son énorme trompe."
        it:
          sword: "Liberando l’energia accumulata nella proboscide\nè in grado di spazzare via persino le montagne,\ncambiando la topografia di intere regioni."
          shield: "Con la proboscide, cresciuta a dismisura grazie\nal fenomeno Gigamax, può demolire edifici\nenormi in un colpo solo."
        de:
          sword: "In seinem Rüssel sammelt sich so viel Energie an,\ndass es Berge wegfegt und die ganze Landschaft\nverändert, wenn es sie freisetzt."
          shield: "Nach der Gigadynamaximierung ist sein Rüssel\nso gigantisch, dass ein Stoß damit genügt, um\nriesige Bauten abzureißen."
        es:
          sword: "Cuando proyecta la intensa energía acumulada\nen su trompa, puede cambiar la topografía\nhaciendo añicos las montañas."
          shield: "La energía del fenómeno Gigamax ha agigantado\nsu trompa de tal forma que puede derrumbar un\nrascacielos de un solo golpe."
        ko:
          sword: "콧속에 가득 찬\n에너지를 분사하면\n산이 날아가고 지형이 바뀐다."
          shield: "거다이맥스한 거대한\n코는 거대한 건축물도\n일격에 부숴버린다."
        zh_simp:
          sword: "鼻子里储存着满满的能量。\n一旦将能量喷射出去，\n甚至能推平山岳，改变地形。"
          shield: "超极巨化后，只要用\n巨大的象鼻攻击一次，\n就能拆毁高大的建筑。"
        zh_trad:
          sword: "鼻子裡儲存著滿滿的能量。\n一旦將能量噴射出去，\n甚至能推平山岳，改變地形。"
          shield: "超極巨化後，只要用\n巨大的象鼻攻擊一次，\n就能拆毀高大的建築。"
dracozolt:
  species_id: 880
  names:
    jp_kana: パッチラゴン
    jp_kanji: パッチラゴン
    en: Dracozolt
    fr: Galvagon
    it: Dracozolt
    de: Lectragon
    es: Dracozolt
    ko: 파치래곤
    zh_simp: 雷鸟龙
    zh_trad: 雷鳥龍
  forms:
    dracozolt:
      form_id: 0
      base_stats:
        hp: 90
        attack: 100
        defense: 90
        special_attack: 80
        special_defense: 70
        speed: 75
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - electric
        - dragon
      egg_groups:
        - undiscovered
      abilities:
        - volt_absorb
        - hustle
      hidden_ability: sand_rush
      descriptions:
        jp_kana:
          sword: "こだいでは　たくましい　かはんしんで\nむてきだったが　エサの　しょくぶつを\nたべつくしてしまい　ぜつめつした。"
          shield: "しっぽの　たくましい　きんにくで\nはつでんする。　かはんしんに　くらべ\nじょうはんしんが　ちいさすぎる。"
        jp_kanji:
          sword: "古代では　たくましい　下半身で\n無敵だったが　餌の　植物を\n食べつくしてしまい　絶滅した。"
          shield: "しっぽの　たくましい　筋肉で\n発電する。　下半身に　くらべ\n上半身が　小さすぎる。"
        en:
          sword: "In ancient times, it was unbeatable thanks to its\npowerful lower body, but it went extinct anyway\nafter it depleted all its plant-based food sources."
          shield: "The powerful muscles in its tail generate its\nelectricity. Compared to its lower body,\nits upper half is entirely too small."
        fr:
          sword: "Jadis, la partie inférieure de son corps musclé\nle rendait invincible, mais il s’est éteint après avoir\nmangé toutes les plantes dont il se nourrissait."
          shield: "Il envoie des décharges avec les muscles puissants\nde sa queue. La partie supérieure de son corps\nest trop petite par rapport à la partie inférieure."
        it:
          sword: "Nell’antichità era invincibile grazie alla possente\nparte inferiore del corpo, ma si è estinto perché\nha mangiato tutte le piante di cui si nutriva."
          shield: "Produce elettricità con i possenti muscoli della\ncoda. La parte superiore del suo corpo è troppo\npiccola se paragonata a quella inferiore."
        de:
          sword: "Dank seines kräftigen Unterkörpers war es in\nder Urzeit unbesiegbar, doch es fraß seine\nPflanzennahrung restlos auf und starb daher aus."
          shield: "Mit den kräftigen Muskeln in seinem Schwanz\nerzeugt es Elektrizität. Sein Oberkörper ist im\nVergleich zu seinem Unterkörper zu klein."
        es:
          sword: "La robustez de su tren inferior lo hacía invencible\nen la antigüedad, pero se extinguió tras comerse\ntodas las plantas de las que se nutría."
          shield: "Produce electricidad con la robusta musculatura\nde la cola. El tamaño de la parte superior del\ncuerpo palidece en comparación con la inferior."
        ko:
          sword: "고대에는 튼튼한 하반신 덕분에\n무적이었으나 먹이인 식물을\n모두 먹어버려서 멸종했다."
          shield: "꼬리의 억센 근육으로\n발전한다. 하반신에 비해\n상반신이 너무 작다."
        zh_simp:
          sword: "在远古时代曾凭借自己强大的\n下半身而所向无敌，但因吃光了\n赖以为生的植物而灭绝了。"
          shield: "会用尾部结实的肌肉\n发电。与下半身相比，\n上半身真的太小了。"
        zh_trad:
          sword: "在遠古時代曾憑藉自己強大的\n下半身而所向無敵，但因吃光了\n賴以為生的植物而滅絕了。"
          shield: "會用尾部結實的肌肉\n發電。與下半身相比，\n上半身真的太小了。"
arctozolt:
  species_id: 881
  names:
    jp_kana: パッチルドン
    jp_kanji: パッチルドン
    en: Arctozolt
    fr: Galvagla
    it: Arctozolt
    de: Lecryodon
    es: Arctozolt
    ko: 파치르돈
    zh_simp: 雷鸟海兽
    zh_trad: 雷鳥海獸
  forms:
    arctozolt:
      form_id: 0
      base_stats:
        hp: 90
        attack: 100
        defense: 90
        special_attack: 90
        special_defense: 80
        speed: 55
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - electric
        - ice
      egg_groups:
        - undiscovered
      abilities:
        - volt_absorb
        - static
      hidden_ability: slush_rush
      descriptions:
        jp_kana:
          sword: "こおりづけの　じょうはんしんが\nふるえると　でんきが　つくられる。\nあるくことが　ひじょうに　にがて。"
          shield: "こだいの　うみべで　くらし　エサを\nからだの　こおりで　ほぞん　できたが\nうごきが　にぶいため　ぜつめつした。"
        jp_kanji:
          sword: "氷漬けの　上半身が\n震えると　電気が　つくられる。\n歩くことが　非常に　苦手。"
          shield: "古代の　海辺で　暮らし　餌を\n体の　氷で　保存できたが\n動きが　鈍いため　絶滅した。"
        en:
          sword: "The shaking of its freezing upper half is what\ngenerates its electricity. It has a hard time\nwalking around."
          shield: "This Pokémon lived on prehistoric seashores and\nwas able to preserve food with the ice on its\nbody. It went extinct because it moved so slowly."
        fr:
          sword: "Quand la partie supérieure de son corps, couverte\nde glace, frissonne, il produit de l’électricité.\nIl éprouve de grandes difficultés à marcher."
          shield: "Autrefois, il vivait en bord de mer et conservait\nsa nourriture dans la glace de son corps,\nmais il s’est éteint, car il avait du mal à se déplacer."
        it:
          sword: "La parte superiore del suo corpo è ghiacciata\ne quando trema produce elettricità. Cammina\ncon estrema difficoltà."
          shield: "Anticamente viveva in riva al mare conservando\nil cibo grazie al ghiaccio del suo corpo, ma si è\nestinto a causa della sua estrema lentezza."
        de:
          sword: "Durch das Zittern seines gefrorenen Oberkörpers\nentsteht Elektrizität. Das Laufen fällt ihm äußerst\nschwer."
          shield: "In der Urzeit lebte es am Strand und konnte mit\nseinem kalten Körper Futter haltbar machen.\nEs starb wegen seiner trägen Bewegungen aus."
        es:
          sword: "La parte superior del cuerpo está congelada y,\nal temblar, genera electricidad. Camina con suma\ndificultad."
          shield: "Antiguamente vivía en el mar y usaba el hielo del\ncuerpo para conservar los alimentos. Su extrema\nlentitud, sin embargo, lo condenó a la extinción."
        ko:
          sword: "꽁꽁 언 상반신이 진동하면\n전기가 만들어진다.\n걷는 것이 매우 서툴다."
          shield: "고대의 해변에 살며 먹이를\n몸의 얼음으로 보존시켰지만\n움직임이 둔해 멸종하였다."
        zh_simp:
          sword: "它冻成冰的上半身\n在颤抖后可以产生电能。\n非常不擅长走路。"
          shield: "曾经生活在古代的海边，\n能用身体的冰来保存食物，\n但由于动作太迟缓而灭绝了。"
        zh_trad:
          sword: "牠凍成冰的上半身\n在顫抖時可以產生電能。\n非常不擅長走路。"
          shield: "曾經生活在古代的海邊，\n能用身體的冰來保存食物，\n但由於動作太遲緩而滅絕了。"
