        jp_kana:
          sword: "たいしゅうから　こころと　からだの\nちょうしを　かぎとる。　いりょうへの\nおうようが　きたいされている。"
          shield: "たいもうに　たくさん　くうきを\nふくんでいるので　さわりごこちは\nやわらかく　みためより　かるい。"
        jp_kanji:
          sword: "体臭から　心と　体の\n調子を　嗅ぎとる。　医療への\n応用が　期待されている。"
          shield: "体毛に　たくさん　空気を\n含んでいるので　触り心地は\n柔らかく　見た目より　軽い。"
        en:
          sword: "By taking in a person’s scent, it can sniff out their\nmental and physical condition. It’s hoped that\nthis skill will have many medical applications."
          shield: "Slurpuff’s fur contains a lot of air, making it soft\nto the touch and lighter than it looks."
        fr:
          sword: "Il peut diagnostiquer l’état de santé mentale et\nphysique de quelqu’un rien qu’à l’odorat. Un tel\ndon pourrait avoir des applications en médecine."
          shield: "Sa fourrure est si aérée qu’elle le rend très doux\net très agréable au toucher, et bien plus léger\nqu’il en a l’air."
        it:
          sword: "È in grado di comprendere lo stato fisico e\nmentale altrui dall’odore. Questa capacità\npotrebbe essere molto utile in campo medico."
          shield: "La grande quantità d’aria contenuta nella sua\npelliccia la rende soffice al tatto. È più leggero\ndi quanto possa sembrare."
        de:
          sword: "Es kann die körperliche und seelische Verfassung\nanderer anhand ihres Körpergeruchs erkennen.\nDies versucht man für die Medizin zu nutzen."
          shield: "Da in seinem Fell eine Menge Luft eingeschlossen\nist, fühlt es sich unheimlich weich an und ist\nleichter, als es auf den ersten Blick aussieht."
        es:
          sword: "Puede percibir el estado físico y mental de\nalguien solo con olerlo, lo que podría tener\naplicaciones útiles en el campo de la medicina."
          shield: "La gran cantidad de aire acumulada en su pelaje\nle confiere un tacto aterciopelado y un peso muy\ninferior al que aparenta."
        ko:
          sword: "체취로 몸과 마음의 상태를\n알아낸다. 의료계에서 응용될\n것으로 기대되고 있다."
          shield: "털에 많은 공기를 담고 있어\n촉감이 부드럽고\n보기보다 가볍다."
        zh_simp:
          sword: "能从人们身上的气味里\n嗅出他们的身心状态。\n在医疗领域的实际应用备受瞩目。"
          shield: "因为体毛里富含空气，\n所以摸起来十分柔软，\n重量也比看起来要轻。"
        zh_trad:
          sword: "能從人們身上的氣味裡\n嗅出他們的身心狀態。\n在醫療領域的實際應用備受矚目。"
          shield: "因為體毛裡富含空氣，\n所以摸起來十分柔軟，\n重量也比看起來要輕。"
