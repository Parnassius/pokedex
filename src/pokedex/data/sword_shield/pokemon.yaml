      types:
        - water
      egg_groups:
        - water_1
        - amorphous
      abilities:
        - sticky_hold
        - storm_drain
      hidden_ability: sand_force
      descriptions:
        jp_kana:
          sword: "エサで　すがたが　かわるとも\nいわれるが　ただしいことは\nまだまだ　わかっていないのだ。"
          shield: "かんきょうで　すがたが　かわる。\nすいおんが　つめたい　うみでは\nこのすがたに　なるという　せつも。"
        jp_kanji:
          sword: "エサで　姿が　変わるとも\nいわれるが　正しいことは\nまだまだ　わかっていないのだ。"
          shield: "環境で　姿が　変わる。\n水温が　冷たい　海では\nこの姿に　なるという　説も。"
        en:
          sword: "There’s speculation that its appearance is\ndetermined by what it eats, but the truth\nremains elusive."
          shield: "Its appearance changes depending on the\nenvironment. One theory suggests that living\nin cold seas causes Shellos to take on this form."
        fr:
          sword: "Certains disent que sa forme diffère en fonction\nde son alimentation, mais cette théorie\nn’a pas encore été prouvée."
          shield: "Son apparence diffère en fonction de son\nenvironnement. Selon une théorie, il prendrait\ncette forme dans les mers froides."
        it:
          sword: "Il motivo del suo cambiamento di forma\nè ancora oggetto di studio. Secondo alcuni,\nè dovuto all’alimentazione."
          shield: "Cambia aspetto in base all’ambiente.\nSecondo alcuni, assume questa forma nei mari\nin cui la temperatura dell’acqua è bassa."
        de:
          sword: "Welche Form es annimmt, hängt angeblich von\nseinem Futter ab. Ob das tatsächlich der Fall ist,\nwurde aber noch nicht endgültig geklärt."
          shield: "Seine Form ist abhängig von seiner Umgebung.\nEiner Theorie zufolge nimmt es diese Gestalt an,\nwenn es sich in kaltem Meerwasser aufhält."
        es:
          sword: "Se dice que su aspecto cambia según el tipo de\nalimentación, aunque la veracidad de esta teoría\naún está por comprobar."
          shield: "Su aspecto cambia en función de su entorno.\nEn teoría, esta es la forma que adopta cuando\nhabita en mares de aguas heladas."
        ko:
          sword: "먹이에 따라 모습이\n변한다고도 전해지지만\n진실은 아직 밝혀지지 않았다."
          shield: "환경에 따라 모습이 변한다.\n수온이 차가운 바다에서는\n이 모습으로 변한다는 설도 있다."
        zh_simp:
          sword: "虽然也有人认为它的样子\n是因吃下的食物而变化的，\n不过至今仍未得到证实。"
          shield: "样子会随环境而改变。\n也有人认为它在水温冰冷\n的大海里会变成这个样子。"
        zh_trad:
          sword: "雖然也有人認為牠的樣子\n是因吃下的食物而變化的，\n不過至今仍未得到證實。"
          shield: "樣子會隨環境而改變。\n也有人認為牠在水溫冰冷\n的大海裡會變成這個樣子。"
gastrodon:
