      descriptions:
        jp_kana:
          sword: "タップダンスの　たつじん。\nこおりで　できた　ステッキを　ふり\nかろやかな　ステップを　ひろうする。"
          shield: "ユーモラスな　うごきで　みんなの\nにんきもの。　おなかの　もようから\nサイコパワーを　ほうしゅつする。"
        jp_kanji:
          sword: "タップダンスの　達人。\n氷で　できた　ステッキを　振り\n軽やかな　ステップを　披露する。"
          shield: "ユーモラスな　動きで　みんなの\n人気者。　お腹の　模様から\nサイコパワーを　放出する。"
        en:
          sword: "It’s highly skilled at tap-dancing. It waves its cane\nof ice in time with its graceful movements."
          shield: "Its amusing movements make it very popular.\nIt releases its psychic power from the pattern\non its belly."
        fr:
          sword: "Véritable virtuose des claquettes, il se donne\nen spectacle en dansant d’un pas léger\ntout en jonglant avec sa canne de glace."
          shield: "Ses gestes hilarants le rendent très populaire.\nIl peut libérer ses pouvoirs psychiques depuis\nle motif sur son ventre."
        it:
          sword: "È un maestro del tip tap. Fa roteare il suo\nbastone di ghiaccio mentre si esibisce\nin leggiadri passi di danza."
          shield: "Le sue comiche movenze lo rendono simpatico\na tutti. Emette poteri psichici dal motivo che ha\nsul ventre."
        de:
          sword: "Dieser begnadete Stepptänzer schwingt einen\naus Eis geformten Gehstock und gibt mit\nleichtem Fuß seinen Tanz zum Besten."
          shield: "Dank seiner unterhaltsamen Bewegungen ist es\nallseits sehr beliebt. Von dem Muster auf seinem\nBauch sendet es Psycho-Kräfte aus."
        es:
          sword: "Es un bailarín consumado de claqué. Agita su\nbastón de hielo mientras exhibe su destreza con\ngráciles pasos."
          shield: "Se ha granjeado la simpatía de todo el mundo\npor sus cómicos movimientos. Emite poderes\npsíquicos por el motivo de su barriga."
        ko:
          sword: "탭 댄스의 달인이다.\n얼음으로 만든 지팡이를 휘두르며\n경쾌한 스텝을 선보인다."
          shield: "유머러스한 움직임으로 모두에게\n인기가 높다. 배의 무늬에서\n사이코 파워를 방출한다."
        zh_simp:
          sword: "踢踏舞的达人。\n会挥动手中的冰杖，\n向观众表演轻快的舞步。"
          shield: "幽默的动作使它获得了\n众人的喜爱。能从腹部的\n图案释放出精神力量。"
        zh_trad:
          sword: "踢踏舞的達人。\n會揮動手中的冰杖，\n向觀眾表演輕快的舞步。"
          shield: "幽默的動作使牠獲得了\n眾人的喜愛。能從腹部的\n圖案釋放出精神力量。"
