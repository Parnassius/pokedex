          sword: "どくを　ふくんだ　かふんを　まく。\nきれいな　みずで　そだてるほど\nどくの　せいぶんは　たかまる。"
          shield: "きおんの　へんかに　びんかん。\nつぼみが　ひらきはじめたら\nはるの　おとずれは　もうすぐだ。"
        jp_kanji:
          sword: "毒を　含んだ　花粉を　まく。\nきれいな　水で　育てるほど\n毒の　成分は　高まる。"
          shield: "気温の　変化に　敏感。\nつぼみが　開きはじめたら\n春の　訪れは　もうすぐだ。"
        en:
          sword: "The pollen it releases contains poison. If this\nPokémon is raised on clean water, the poison’s\ntoxicity is increased."
          shield: "This Pokémon is highly sensitive to temperature\nchanges. When its bud starts to open, that means\nspring is right around the corner."
        fr:
          sword: "Plus l’eau dont il se nourrit est pure, plus le niveau\nde toxicité du pollen qu’il répand est élevé."
          shield: "Il est sensible aux variations de température.\nQuand son bourgeon commence à s’ouvrir,\nl’arrivée du printemps est imminente."
        it:
          sword: "Più pulita è l’acqua con cui è a contatto durante\nla crescita, più aumentano i componenti tossici\ndel polline velenoso che sparge."
          shield: "È sensibile agli sbalzi di temperatura.\nQuando le sue gemme si schiudono\nè segno che la primavera è vicina."
        de:
          sword: "Es verstreut giftigen Pollen. Je sauberer das\nWasser war, mit dem es gegossen wurde, desto\nstärker ist der Giftstoff."
          shield: "Es hat ein feines Gespür für die kleinsten\nTemperaturveränderungen. Wenn sich seine\nKnospe öffnet, bricht bald der Frühling an."
        es:
          sword: "Conforme más pura y cristalina sea el agua de\nsu entorno, más venenoso resulta el polen que\nesparce."
          shield: "Es muy sensible a los cambios de temperatura.\nAnuncia la llegada inminente de la primavera\ncuando florece."
        ko:
          sword: "독을 품고 있는 꽃가루를 뿌린다.\n맑은 물을 줘서 키울수록\n독성은 더욱 강해진다."
          shield: "기온 변화에 민감하다.\n봉오리가 피기 시작하면\n곧 봄이 온다."
        zh_simp:
          sword: "会散布带有毒素的花粉。\n培育时所用的水越干净，\n所含有的毒性就越高。"
          shield: "对气温的变化很敏感。\n当它开始打开花苞，\n便是冬去春来之时。"
        zh_trad:
          sword: "會散佈帶有毒素的花粉。\n培育時所用的水越乾淨，\n所含有的毒性就越高。"
          shield: "對氣溫的變化很敏感。\n當牠開始打開花苞，\n便是冬去春來之時。"
roserade:
