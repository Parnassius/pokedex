      descriptions:
        jp_kana:
          sword: "どくガスで　パンパンの　からだ。\nなまゴミの　くさった　においを\nもとめ　ゴミすてばに　やってくる。"
          shield: "きたない　くうきが　ごちそう。\nむかしの　ガラルちほうには　いまより\nたくさんの　ドガースが　いたという。"
        jp_kanji:
          sword: "毒ガスで　パンパンの　体。\n生ゴミの　腐った　においを\n求め　ゴミ捨て場に　やってくる。"
          shield: "汚い　空気が　ごちそう。\nむかしの　ガラル地方には　いまより\nたくさんの　ドガースが　いたという。"
        en:
          sword: "Its body is full of poisonous gas. It floats into\ngarbage dumps, seeking out the fumes of raw,\nrotting trash."
          shield: "It adores polluted air. Some claim that Koffing\nused to be more plentiful in the Galar region\nthan they are now."
        fr:
          sword: "Son corps est gonflé de gaz toxique.\nIl se rend dans les décharges, attiré par l’odeur\ndes déchets alimentaires en décomposition."
          shield: "On raconte qu’il y a longtemps, ces Pokémon\namateurs d’air pollué étaient beaucoup plus\nnombreux à Galar."
        it:
          sword: "Il suo corpo è gonfio di gas velenosi.\nVa nelle discariche attratto dall’odore\ndi rifiuti putrescenti."
          shield: "È ghiotto di aria inquinata.\nSi dice che in passato a Galar ci fossero\nmolti più Koffing rispetto a ora."
        de:
          sword: "Sein Körper ist zum Bersten voll mit Giftgas.\nAngelockt vom fauligen Geruch verrottender\nAbfälle, lungert es auf Müllhalden herum."
          shield: "Angeblich waren diese nach verpesteter Luft\ngierenden Pokémon früher weitaus häufiger\nin der Galar-Region anzutreffen als heute."
        es:
          sword: "Su cuerpo está lleno a rebosar de gas venenoso.\nAcude a los vertederos atraído por el putrefacto\nolor que emana de los desperdicios."
          shield: "Se nutre de aire contaminado. Al parecer, antaño\neran mucho más numerosos en Galar."
        ko:
          sword: "독가스로 몸 안이 가득 차 있다.\n음식물 쓰레기의 악취에\n이끌려 쓰레기장을 찾아간다."
          shield: "오염된 공기를 좋아한다.\n옛날 가라르지방에는 지금보다\n많은 또가스가 있었다고 한다."
        zh_simp:
          sword: "身体里充满了毒气。\n会为了寻求湿垃圾腐烂的\n气味而来到垃圾场。"
          shield: "污浊的空气是它的美味大餐。\n据说在昔日的伽勒尔地区\n曾经存在着更多的瓦斯弹。"
        zh_trad:
          sword: "身體裡充滿了毒氣。\n會為了尋求廚餘垃圾的\n腐敗氣味而來到垃圾場。"
          shield: "污濁的空氣是牠的美味大餐。\n據說在昔日的伽勒爾地區\n曾經存在著更多的瓦斯彈。"
weezing:
