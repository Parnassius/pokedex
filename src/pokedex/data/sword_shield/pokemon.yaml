        - cute_charm
        - technician
      hidden_ability: skill_link
      descriptions:
        jp_kana:
          sword: "チリひとつ　ゆるせない　けっぺき。\nからだ　から　しみでる　あぶらを\nすに　ぬりつけ　コーティングする。"
          shield: "とくべつな　あぶらの　しみた　けは\nこうげきを　うけながす。　あぶらは\nたかねで　とりひき　されている。"
        jp_kanji:
          sword: "塵ひとつ　許せない　潔癖。\n体から　染み出る　油を\n巣に　塗りつけ　コーティングする。"
          shield: "特別な　油の　染みた　毛は\n攻撃を　受け流す。　油は\n高値で　取り引き　されている。"
        en:
          sword: "Its body secretes oil that this Pokémon spreads\nover its nest as a coating to protect it from dust.\nCinccino won’t tolerate even a speck of the stuff."
          shield: "A special oil that seeps through their fur helps\nthem avoid attacks. The oil fetches a high price\nat market."
        fr:
          sword: "Il ne supporte pas de voir le moindre grain\nde poussière. Il utilise l’huile qu’il sécrète pour\nrecouvrir son nid d’un revêtement protecteur."
          shield: "La sécrétion huileuse de ses poils lui permet\nde dévier les attaques. Elle s’arrache à prix d’or\nsur les marchés."
        it:
          sword: "È un maniaco della pulizia e non sopporta la vista\nneanche di un granello di polvere. Riveste la tana\ndel grasso che trasuda dal suo corpo."
          shield: "Il grasso speciale che ricopre la sua pelliccia\npuò deviare gli attacchi ed è venduto\na caro prezzo sul mercato."
        de:
          sword: "Es ist sehr reinlich und duldet nicht mal das\nkleinste Staubkorn. Es beschichtet sein Nest mit\ndem Öl, das sein Körper absondert."
          shield: "Sein Fell ist mit einem körpereigenen Öl bedeckt,\ndas Attacken abwehren kann. Öl von Chillabell ist\nwertvoll und wird zu hohen Preisen gehandelt."
        es:
          sword: "Es tan sumamente pulcro que no puede ver ni\nuna mota de polvo. La grasa que exuda por el\ncuerpo le sirve de película protectora."
          shield: "Su pelaje está recubierto por una grasa especial\nque repele los ataques enemigos y por la que se\nllegan a pagar auténticas fortunas."
        ko:
          sword: "먼지 한 톨도 용납하지 않는 결벽증.\n몸에서 나오는 기름을\n둥지에 발라서 코팅한다."
          shield: "특별한 기름이 스며든 털은\n공격을 받아넘긴다. 기름은\n높은 가격에 거래되고 있다."
        zh_simp:
          sword: "洁癖使它连一丝灰尘都\n无法容忍，会把自己身上\n渗出的油涂在巢上保持清洁。"
          shield: "覆盖着特别油脂的毛发\n可以挡住攻击。这种油\n以高价在市场上流通。"
        zh_trad:
          sword: "潔癖使得牠連一絲灰塵都\n無法容忍，會把自己身上\n滲出的油塗在巢上保持清潔。"
          shield: "覆蓋著特別油脂的毛髮\n可以擋住攻擊。這種油\n以高價在市場上流通。"
gothita:
