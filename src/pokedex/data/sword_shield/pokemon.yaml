        special_defense: 2
        speed: 0
      types:
        - grass
      egg_groups:
        - grass
      abilities:
        - cotton_down
        - regenerator
      hidden_ability: effect_spore
      descriptions:
        jp_kana:
          sword: "わたげの　タネは　えいようまんてん。\nかぜに　のせて　とばして　くさきや\nポケモンたちを　げんきにさせる。"
          shield: "あたまの　わたげで　つくった　いとは\nこうたくがあり　とても　うつくしい。\nガラルちほうの　めいさんひん。"
        jp_kanji:
          sword: "綿毛の　種は　栄養満点。\n風に　乗せて　飛ばして　草木や\nポケモンたちを　元気にさせる。"
          shield: "頭の　綿毛で　つくった　糸は\n光沢があり　とても　美しい。\nガラル地方の　名産品。"
        en:
          sword: "The seeds attached to its cotton fluff are full of\nnutrients. It spreads them on the wind so that\nplants and other Pokémon can benefit from them."
          shield: "The cotton on the head of this Pokémon can be\nspun into a glossy, gorgeous yarn—a Galar\nregional specialty."
        fr:
          sword: "Les graines de son duvet sont remplies\nde nutriments. Elles sont emportées par le vent\net redonnent vitalité aux plantes et aux Pokémon."
          shield: "Les fils tissés à partir du duvet sur sa tête sont\nsatinés et absolument somptueux. Le textile ainsi\ncréé est typique de la région de Galar."
        it:
          sword: "I suoi semi lanuginosi, ricchi di sostanze nutritive,\nvengono trasportati dal vento e donano nuova\nenergia a piante e Pokémon."
          shield: "I fili realizzati con la lanugine del suo capo sono\nparticolarmente belli e lucenti. Sono un prodotto\ntipico di Galar."
        de:
          sword: "Die Saat seines Wollflaums steckt voller\nNährstoffe. Es verstreut sie im Wind und heilt\ndamit Pflanzen und Pokémon."
          shield: "Aus dem Flaum auf seinem Kopf werden\nwunderschöne, glänzende Fäden gesponnen.\nDie Galar-Region ist bekannt für dieses Produkt."
        es:
          sword: "Las semillas que tiene entre la pelusa son muy\nnutritivas. Arrastradas por el viento, devuelven\nla vitalidad a la flora y a otros Pokémon."
          shield: "El hilo fabricado a partir de su algodón es muy\nbello y brillante; uno de los productos estrella\nde la región de Galar."
        ko:
          sword: "솜털이 붙은 씨는 영양 만점이다.\n씨를 바람에 날려서 초목과\n포켓몬들을 건강하게 만든다."
          shield: "머리의 솜털로 만든 실은\n윤이 나고 매우 아름답다.\n가라르지방의 특산품이다."
        zh_simp:
          sword: "棉絮的种子营养丰富。\n它会通过风散播种子，\n让草木和宝可梦变得活力十足。"
          shield: "用它头上的棉絮制成的线\n有着十分美丽动人的光泽，\n是伽勒尔地区的名产。"
        zh_trad:
          sword: "棉絮的種子營養豐富。\n牠會藉由風散播種子，\n讓草木和寶可夢變得活力十足。"
          shield: "用牠頭上的棉絮製成的線\n有著十分美麗動人的光澤，\n是伽勒爾地區的名產。"
