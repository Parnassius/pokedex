      types:
        - water
      egg_groups:
        - water_2
      abilities:
        - swift_swim
        - water_veil
      hidden_ability: lightning_rod
      held_items:
        rare: mystic_water
      descriptions:
        jp_kana:
          sword: "せびれ　むなびれ　おびれが\nゆうがに　たなびくので\nみずのおどりこ　とよばれる。"
          shield: "せビレ　むなビレが　きんにくのように\nはったつしており　すいちゅうを\n５ノットの　はやさで　およぐ。"
        jp_kanji:
          sword: "背びれ　胸びれ　尾びれが\n優雅に　たなびくので\n水の踊り子　と呼ばれる。"
          shield: "背びれ　胸びれが　筋肉のように\n発達しており　水中を\n５ノットの　速さで　泳ぐ。"
        en:
          sword: "Its dorsal, pectoral, and tail fins wave elegantly\nin water. That is why it is known as the Water Dancer."
          shield: "Its dorsal and pectoral fins are strongly developed\nlike muscles. It can swim at a speed of five knots."
        fr:
          sword: "Ses nageoires dorsales, pectorales et caudales\nondulent avec élégance. Il est surnommé\nle « danseur des flots »."
          shield: "Ses nageoires dorsales et pectorales sont très\ndéveloppées. Elles lui permettent de nager\nà une vitesse de cinq nœuds."
        it:
          sword: "Le pinne su dorso, petto e coda ondeggiano\ncon grazia. Perciò viene chiamato “danzatore\nd’acqua”."
          shield: "Le pinne dorsali e pettorali sono sviluppate\ncome potenti muscoli. Può raggiungere\nla velocità di 5 nodi."
        de:
          sword: "Seine Brust-, Rücken- und Schwanzflossen\nbewegen sich anmutig. Daher nennt man es\nden „Wassertänzer“."
          shield: "Seine Rücken- und Brustflossen sind muskelähnlich\nentwickelt. Es erreicht beim Schwimmen eine\nGeschwindigkeit von bis zu fünf Knoten."
        es:
          sword: "Sus aletas pectorales, caudal y dorsal ondean\ngráciles en el agua. Por eso se le llama el Bailarín\nAcuático."
          shield: "La aleta dorsal y las aletas pectorales están tan\ndesarrolladas que actúan como músculos. Puede\nnadar a una velocidad de cinco nudos."
        ko:
          sword: "등, 가슴, 꼬리지느러미가\n우아하게 나부끼기 때문에\n물의 무희라고 불린다."
          shield: "등지느러미와 가슴지느러미가\n근육처럼 발달하여 물속을\n5노트의 속도로 헤엄친다."
        zh_simp:
          sword: "会优雅地摇摆背鳍、\n胸鳍和尾鳍，\n所以被称之为水中的舞者。"
          shield: "背鳍和尾鳍像肌肉\n那样发达。能够以\n５节的速度在水中游泳。"
        zh_trad:
          sword: "會優雅地搖擺\n背鰭、胸鰭和尾鰭，\n所以被稱為水中的舞者。"
          shield: "背鰭和尾鰭像肌肉\n那樣發達。能夠以\n５節的速度在水中游泳。"
seaking:
  species_id: 119
