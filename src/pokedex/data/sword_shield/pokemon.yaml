          shield: "こだい　いせきで　はっけんされた。\nかいてん　しながら　いどう。　よる\nねむる　ときも　いっぽんあしだ。"
        jp_kanji:
          sword: "一本足で　回転しながら　移動する。\n逆さまに　なって\n回転する　ヤジロンも　見かける。"
          shield: "古代　遺跡で　発見された。\n回転　しながら　移動。　夜\n眠る　ときも　一本足だ。"
        en:
          sword: "It moves while spinning around on its single foot.\nSome Baltoy have been seen spinning on\ntheir heads."
          shield: "It was discovered in ancient ruins. While moving,\nit constantly spins. It stands on one foot even\nwhen asleep."
        fr:
          sword: "Il se déplace en tournoyant sur son pied.\nOn le voit parfois faire de même sur la tête."
          shield: "Ce Pokémon découvert dans des ruines anciennes\ntourne sur lui-même pour se déplacer. Il se tient\ntoujours sur un pied, même quand il dort."
        it:
          sword: "Si sposta piroettando sull’estremità inferiore\ndel proprio corpo. Alcuni Baltoy sono stati visti\npiroettare a testa in giù."
          shield: "Scoperto in antiche rovine. Si sposta girando\nsu se stesso e rimane bilanciato sull’estremità\ninferiore del suo corpo anche quando dorme."
        de:
          sword: "Es bewegt sich, indem es auf seinem Fuß kreiselt.\nVereinzelt sieht man auch Puppance, die dies\nkopfüber tun."
          shield: "Es wurde in antiken Ruinen entdeckt. Wenn es\nsich bewegt, dreht es sich. Auch im Schlaf steht\nes auf einem Bein."
        es:
          sword: "Se mueve girando una única extremidad. Se han\navistado algunos ejemplares capaces de hacerlo\ncabeza abajo."
          shield: "Fue hallado en unas ruinas antiguas. Se desplaza\ngirando sobre sí mismo y se mantiene sobre una\nextremidad incluso cuando duerme."
        ko:
          sword: "한 다리로 회전하면서\n이동한다. 거꾸로\n회전하는 오뚝군도 발견된다."
          shield: "고대 유적에서 발견되었다.\n회전하면서 이동한다.\n밤에 잘 때도 다리 하나로 서 있다."
        zh_simp:
          sword: "会用单脚旋转着移动。\n也能看到颠倒过来旋转的天秤偶。"
          shield: "在古代遗迹被发现。\n会一边旋转一边移动。\n晚上睡觉的时候也是单脚站着。"
        zh_trad:
          sword: "用單腳一邊旋轉一邊移動。\n有時候也能看到\n顛倒過來旋轉的天秤偶。"
          shield: "在古代遺跡被發現。\n會一邊旋轉一邊移動。\n晚上睡覺的時候也是單腳站著。"
