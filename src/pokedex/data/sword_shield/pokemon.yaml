        jp_kana:
          sword: "もりの　かみさまと　おそれられていた\nポケモン。　あいての　かんがえを　よみ\nさきまわりする　のうりょくを　もつ。"
          shield: "もりの　おくで　ひっそりと　くらす。\nおおきな　うちわを　あおぐと\nこがらしが　ふくと　いわれている。"
        jp_kanji:
          sword: "森の　神様と　恐れられていた\nポケモン。　相手の　考えを　読み\n先回りする　能力を　もつ。"
          shield: "森の　奥で　ひっそりと　暮らす。\n大きな　団扇を　あおぐと\n木枯らしが　吹くと　いわれている。"
        en:
          sword: "A Pokémon that was feared as a forest guardian.\nIt can read the foe’s mind and take\npreemptive action."
          shield: "It lives quietly in the deep forest. It is said to\ncreate chilly winter winds with the fans it holds."
        fr:
          sword: "Ce gardien des forêts inspirait la crainte.\nIl peut lire les pensées de ses ennemis et agir\nen conséquence."
          shield: "Il vit caché au fond des forêts.\nOn raconte qu’il fait souffler la bise\nlorsqu’il agite ses grands éventails."
        it:
          sword: "Un tempo era un temuto guardiano della foresta.\nSa leggere nella mente del nemico anticipandolo."
          shield: "Vive nella calma delle foreste. Si dice che sia\nin grado di creare raffiche di vento gelido\nagitando i suoi grandi ventagli."
        de:
          sword: "Dieses Pokémon wurde als „Wächter des Waldes“\ngefürchtet. Es kann die Gedanken des Gegners\nlesen und präventiv handeln."
          shield: "Es lebt in den einsamen Tiefen der Wälder. Man\nsagt, wenn es seine großen Fächer schwingt,\njagen eisige Windböen über das Land."
        es:
          sword: "Infundía temor por su condición de guardián de\nlos bosques. Es capaz de leer los pensamientos\ndel rival y actuar en consecuencia."
          shield: "Vive sigiloso en lo más profundo del bosque.\nSe dice que con sus abanicos puede generar\nvientos gélidos."
        ko:
          sword: "숲의 신이라고 여겨져 두려움의\n대상이었던 포켓몬. 상대의 생각을 읽고\n앞서 행동하는 능력을 지녔다."
          shield: "숲속에서 조용히 지낸다.\n큰 부채로 부치면\n쌀쌀한 바람이 분다고 한다."
        zh_simp:
          sword: "过去被敬畏为森林之神的宝可梦。\n有着读取对手想法并\n抢先一步行动的能力。"
          shield: "在森林深处静静地生活。\n据说当它扇动大大的团扇，\n就会刮起冬日寒风。"
        zh_trad:
          sword: "過去被視為森林之神而受到畏懼的\n寶可夢。有著讀取對手想法並\n搶先一步行動的能力。"
          shield: "在森林深處靜靜地生活。\n據說當牠搧動大大的團扇，\n就會刮起冬日寒風。"
