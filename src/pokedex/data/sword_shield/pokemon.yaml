        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ice
      egg_groups:
        - field
      abilities:
        - hustle
      hidden_ability: inner_focus
      descriptions:
        jp_kana:
          sword: "ゆきぶかい　とちで　くらすうち\nほのおぶくろは　ひえきり　たいか。\nれいきを　つくる　きかんが　できた。"
          shield: "からだが　ひえるほど　げんき。\nといきを　こおらせて　つくった\nゆきだまを　なげあって　あそぶ。"
        jp_kanji:
          sword: "雪深い　土地で　暮らすうち\n炎袋は　冷えきり　退化。\n冷気を　つくる　器官が　できた。"
          shield: "体が　冷えるほど　元気。\n吐息を　凍らせて　つくった\n雪玉を　投げ合って　遊ぶ。"
        en:
          sword: "It lived in snowy areas for so long that its fire sac\ncooled off and atrophied. It now has an organ\nthat generates cold instead."
          shield: "The colder they get, the more energetic they are.\nThey freeze their breath to make snowballs,\nusing them as ammo for playful snowball fights."
        fr:
          sword: "En vivant sur des terres enneigées, sa poche\nà flammes s’est atrophiée à cause du froid, mais\nil a développé un organe qui produit un air glacé."
          shield: "Plus leur corps est froid, plus ils sont en forme.\nIls s’amusent en faisant des batailles de boules de\nneige, qu’ils créent en refroidissant leur souffle."
        it:
          sword: "Poiché vive in lande innevate, la sua sacca ignea\nsi è congelata e atrofizzata, ma ha sviluppato\nun organo capace di produrre aria gelida."
          shield: "Più il suo corpo è freddo, più è in forma.\nGioca con i suoi simili lanciando palle di neve\nche crea congelando il suo alito."
        de:
          sword: "Seit es in kälteren Gefilden lebt, hat sich sein\ninnerer Flammensack zurückgebildet. Stattdessen\nwuchs ein Organ heran, das eiskalte Luft erzeugt."
          shield: "Je kälter ihr Körper ist, desto wohler fühlen sie\nsich. Sie lassen ihren Atem zu Schneebällen\ngefrieren, um sich damit gegenseitig abzuwerfen."
        es:
          sword: "La adaptación a entornos nevados ha atrofiado y\ncongelado su saca de fuego, pero ha propiciado\nel desarrollo de un órgano generador de frío."
          shield: "Cuanto menor es su temperatura corporal, mejor\nse siente. Juega a lanzar las bolas de nieve que\ncrea congelando el aliento."
        ko:
          sword: "눈이 많이 쌓인 곳에 사는 동안\n불꽃 주머니가 차가워져서 퇴화했다.\n그리고 냉기를 만드는 기관이 생겼다."
          shield: "몸이 차가울수록 건강하다.\n한숨을 얼려 만든\n눈덩이를 던지며 논다."
        zh_simp:
          sword: "由于居住在积雪深厚的地域，\n火囊也因受到冷却而退化了。\n取而代之的是制造冷气的器官。"
          shield: "身体越冷就越有活力。\n会把呼出来的气冻起来\n做成雪球和伙伴互相扔着玩。"
        zh_trad:
          sword: "由於居住在積雪深厚的地域，\n火囊也因受到冷卻而退化了。\n取而代之的是製造冷氣的器官。"
          shield: "身體越冷就越有活力。\n會把呼出來的氣凍起來\n做成雪球和夥伴互相扔著玩。"
darmanitan:
