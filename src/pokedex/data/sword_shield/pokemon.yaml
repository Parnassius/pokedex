        jp_kana:
          sword: "あまい　じゅえきが　だいこうぶつ。\n２ほんの　しょっかくで　においを\nたよりに　もりを　さがしまわる。"
          shield: "じぶんの　たいじゅうの　１００ばいの\nおもさでも　かるがる　もちあげる\nかいりき　じまんの　ポケモン。"
        jp_kanji:
          sword: "甘い　樹液が　大好物。\n２本の　触角で　匂いを　頼りに\n森を　探しまわる。"
          shield: "自分の　体重の　１００倍の　重さでも\n軽がる　持ち上げる\n怪力　自慢の　ポケモン。"
        en:
          sword: "Heracross loves sweet sap and will go looking\nthrough forests for it. The Pokémon uses its two\nantennae to pick up scents as it searches."
          shield: "This Pokémon takes pride in its strength, which\nallows it to lift things 100 times heavier than\nitself with no trouble at all."
        fr:
          sword: "Il raffole de la sève sucrée dont il détecte\nle parfum à l’aide de ses deux antennes\nlorsqu’il parcourt la forêt."
          shield: "Ce Pokémon est fier de sa force colossale\nqui lui permet de soulever cent fois son propre\npoids avec facilité."
        it:
          sword: "È ghiotto della dolce linfa degli alberi.\nPerlustra la foresta alla sua ricerca, sfruttando\nle antenne per percepire gli odori."
          shield: "Questo Pokémon va molto fiero della sua forza\nerculea, che gli permette di sollevare senza fatica\noggetti 100 volte più pesanti di lui."
        de:
          sword: "Skaraborn verspeist am liebsten süßen Baumsaft.\nMit seinen zwei Antennen nimmt es die Witterung\nauf, während es den Wald danach absucht."
          shield: "Dieses Pokémon ist stolz auf seine Stärke. Es kann\nmit Leichtigkeit das Hundertfache seines eigenen\nKörpergewichts stemmen."
        es:
          sword: "Adora la savia dulce de los árboles. Recorre\nel bosque en su busca y se sirve de las antenas\npara detectar su olor."
          shield: "Este Pokémon muestra una fuerza hercúlea, que\nle permite levantar cien veces su propio peso sin\ninmutarse."
        ko:
          sword: "달콤한 수액을 매우 좋아한다.\n2개의 더듬이로 냄새를 따라\n숲을 찾아다닌다."
          shield: "자신 몸무게의 100배에 달하는\n무게도 거뜬히 들어 올리는\n괴력을 자랑하는 포켓몬이다."
        zh_simp:
          sword: "用２只触角来感知气味，\n以此在整片森林中寻找\n自己超爱的甘甜树汁。"
          shield: "能轻轻松松地举起比自己\n体重还重１００倍的东西，\n是以一身怪力为傲的宝可梦。"
        zh_trad:
          sword: "非常喜歡甘甜的樹液。\n會用２隻觸角偵測氣味，\n在森林中四處覓食。"
          shield: "能夠輕輕鬆鬆舉起比自己\n體重還要重１００倍的物體，\n是以一身怪力為傲的寶可夢。"
