      descriptions:
        jp_kana:
          sword: "くびのツメで　えものを　つかむと\nそのまま　じめんに　たたきつけ\nどくのトゲを　つきたてるぞ。"
          shield: "なわばりを　めぐり　マルヤクデと\nはげしく　あらそう。　まけたほうは\nそのまま　えものに　なるのだ。"
        jp_kanji:
          sword: "首のツメで　獲物を　つかむと\nそのまま　地面に　叩きつけ\n毒のトゲを　突きたてるぞ。"
          shield: "縄張りを　めぐり　マルヤクデと\n激しく　争う。　負けたほうは\nそのまま　獲物に　なるのだ。"
        en:
          sword: "Scolipede latches on to its prey with the claws on\nits neck before slamming them into the ground\nand jabbing them with its claws’ toxic spikes."
          shield: "Scolipede engage in fierce territorial battles with\nCentiskorch. At the end of one of these battles,\nthe victor makes a meal of the loser."
        fr:
          sword: "Après avoir saisi sa proie à l’aide des griffes\nde son cou, il la plaque au sol puis la transperce\navec ses épines empoisonnées."
          shield: "Il défend son territoire avec acharnement contre\nson ennemi Scolocendre. Le perdant sert de dîner\nau vainqueur."
        it:
          sword: "Sbatte a terra la preda afferrandola con gli artigli\ndel collo per poi infilzarla con le punte velenose."
          shield: "Lotta ferocemente con Centiskorch per il\ncontrollo sul territorio. Il perdente diventa\npreda del vincitore."
        de:
          sword: "Kriegt es seine Beute mit den Krallen an seinem\nHals zu fassen, wirft es sie zu Boden und rammt\ndie giftigen Spitzen der Krallen in sie hinein."
          shield: "Es liefert sich erbitterte Revierkämpfe mit\nInfernopod. Wer den Kampf verliert, wird zur\nBeute des Siegers."
        es:
          sword: "Usa las garras que le sobresalen del cuello para\natrapar a su presa, golpearla contra el suelo y\nrematarla inoculando un potente veneno."
          shield: "Las disputas territoriales con Centiskorch son\nextremadamente violentas. El perdedor se\nconvierte en la presa del ganador."
        ko:
          sword: "목의 가시로 먹이를 잡은 채\n그대로 땅으로 내동댕이쳐서\n독가시를 꽂는다."
          shield: "영역을 두고 다태우지네와\n격렬하게 다툰다. 패배한 쪽이\n그대로 먹이가 된다."
        zh_simp:
          sword: "用颈部的爪子抓住猎物后，\n会直接将对方摔向地面，\n然后将带毒的尖刺猛戳进去。"
          shield: "会和焚焰蚣激烈地争夺\n领地。输掉的那一方\n会成为另一方的猎物。"
        zh_trad:
          sword: "用頸部的爪子夾住獵物後，\n會直接將對方摔到地上，\n然後用毒刺戳下去。"
          shield: "為了搶地盤，會和焚焰蚣\n激烈地爭鬥。輸掉的那一方\n會直接變成對手的獵物。"
cottonee:
  species_id: 546
  names:
    jp_kana: モンメン
    jp_kanji: モンメン
    en: Cottonee
    fr: Doudouvet
    it: Cottonee
    de: Waumboll
    es: Cottonee
    ko: 소미안
    zh_simp: 木棉球
    zh_trad: 木棉球
  forms:
    cottonee:
      form_id: 0
      base_stats:
        hp: 40
        attack: 27
        defense: 60
        special_attack: 37
        special_defense: 50
        speed: 66
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
