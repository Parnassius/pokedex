          shield: "This Pikachu is wearing its Trainer’s cap.\nThe cap is a precious symbol of a\nfateful encounter."
        fr:
          sword: "Il porte la casquette de son partenaire.\nElle lui rappelle leur première rencontre."
          shield: "Un Pikachu qui porte la casquette\nde son partenaire, souvenir inestimable\nd’une rencontre marquée par le sceau du destin."
        it:
          sword: "Indossa il cappello del suo inseparabile amico.\nÈ un prezioso ricordo del loro fatidico incontro."
          shield: "Indossa il cappello del suo amato Allenatore.\nÈ un prezioso ricordo del loro fatidico incontro."
        de:
          sword: "Die Kappe, die es trägt, gehört seinem Partner.\nSie steckt voller Erinnerungen an ihre erste\nBegegnung."
          shield: "Es trägt die Kappe seines Partners. Sie ist ein\nkostbares Andenken an ihre schicksalhafte erste\nBegegnung."
        es:
          sword: "La gorra que lleva pertenece a su compañero\ny le trae gratos recuerdos del momento en que\nse conocieron."
          shield: "Lleva puesta la gorra de su compañero. Es un\nvalioso recuerdo del día en el que el destino\ndecidió que sus caminos debían encontrarse."
        ko:
          sword: "쓰고 있는 것은 파트너의\n모자다. 만났을 당시의\n추억이 가득 담겨 있다."
          shield: "파트너의 모자를 쓰고 있다.\n운명적인 만남의\n소중한 증표다."
        zh_simp:
          sword: "戴着的是伙伴训练家的帽子。\n帽子上承载着许许多多\n与对方相遇时的回忆。"
          shield: "戴着搭档训练家的帽子。\n这顶帽子是与搭档\n命运般相遇的重要证明。"
        zh_trad:
          sword: "戴著的是夥伴訓練家的帽子。\n帽子上承載著許許多多\n與夥伴相遇時的回憶。"
          shield: "戴著搭檔訓練家的帽子。\n這頂帽子是與搭檔\n命運般相遇的重要證明。"
    pikachu_world_cap:
