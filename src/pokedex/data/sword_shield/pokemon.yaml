        jp_kana:
          sword: "ちょうきょうりょくな　おんぱを\nはなったあとは　つかれて\nしばらく　とべなくなるよ。"
          shield: "はなの　かたちが　おめでたいと\nこうふくを　よぶ　シンボルとして\nまつる　ちいきも　あるという。"
        jp_kanji:
          sword: "超強力な　音波を\n放ったあとは　疲れて\nしばらく　飛べなくなるよ。"
          shield: "鼻の　形が　おめでたいと\n幸福を　呼ぶ　シンボルとして\n祭る　地域も　あるという。"
        en:
          sword: "Emitting powerful sound waves tires it out.\nAfterward, it won’t be able to fly for a\nlittle while."
          shield: "The auspicious shape of this Pokémon’s nose\napparently led some regions to consider\nSwoobat a symbol of good luck."
        fr:
          sword: "Émettre des ondes sonores ultra-puissantes\nle fatigue tellement qu’il n’a plus de forces\npour voler."
          shield: "Certaines contrées le vénèrent et pensent\nque la forme de son nez est un symbole\nde chance et de bonheur."
        it:
          sword: "Dopo aver emesso delle potentissime onde\nsonore è così stanco da non poter volare per\nun po’."
          shield: "Si dice che in alcune regioni venga venerato\nper via della forma del suo naso, ritenuta\ndi buon auspicio."
        de:
          sword: "Hat es besonders starke Ultraschallwellen\nausgestoßen, wird es so müde, dass es für\neine Weile nicht fliegen kann."
          shield: "Es wird in manchen Regionen für seine Nasenform\nverehrt, die angeblich Glück bringen soll."
        es:
          sword: "Tras emitir sus potentísimas ondas, queda tan\nexhausto que es incapaz de volar durante un\ntiempo."
          shield: "En algunas regiones se venera a este Pokémon,\nya que consideran la forma de su nariz como un\nsímbolo de felicidad."
        ko:
          sword: "아주 강력한 음파를\n내보낸 후에는 지쳐서\n당분간 날 수 없게 된다."
          shield: "코의 모양이 복스럽다고\n행복을 부르는 상징으로\n여기는 지역도 있다고 한다."
        zh_simp:
          sword: "在发出极其强力的\n音波后会陷入疲劳，\n暂时无法飞行。"
          shield: "据说有些地区的人觉得\n它鼻子的形状很吉利，\n而把它当成幸福的象征来祭拜。"
        zh_trad:
          sword: "在發出極其強力的\n音波後會陷入疲勞，\n暫時無法飛行。"
          shield: "據說有些地區的人覺得\n牠鼻子的形狀很吉利，\n而把牠當成幸福的象徵來祭拜。"
