  names:
    jp_kana: ダゲキ
    jp_kanji: ダゲキ
    en: Sawk
    fr: Karaclée
    it: Sawk
    de: Karadonis
    es: Sawk
    ko: 타격귀
    zh_simp: 打击鬼
    zh_trad: 打擊鬼
  forms:
    sawk:
      form_id: 0
      base_stats:
        hp: 75
        attack: 125
        defense: 75
        special_attack: 30
        special_defense: 75
        speed: 85
