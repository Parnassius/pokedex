        jp_kana:
          sword: "うでの　かたちは　こだいの　ドラゴン\nポケモンの　あたまという　がくせつも\nあるが　しょうめいされていない。"
          shield: "ぜんしんが　ドラゴンエネルギーの\nけっしょう。　すべての　ドラゴン\nポケモンの　ちからを　もつらしい。"
        jp_kanji:
          sword: "腕の　形は　古代の　ドラゴン\nポケモンの　頭という　学説も\nあるが　証明されていない。"
          shield: "全身が　ドラゴンエネルギーの\n結晶。　すべての　ドラゴン\nポケモンの　力を　持つらしい。"
        en:
          sword: "An academic theory proposes that Regidrago’s\narms were once the head of an ancient dragon\nPokémon. The theory remains unproven."
          shield: "Its body is composed of crystallized dragon\nenergy. Regidrago is said to have the powers of\nevery dragon Pokémon."
        fr:
          sword: "Une théorie stipule que ses bras ont la forme\nde la tête d’un Pokémon Dragon des temps\nanciens, mais aucune preuve ne l’atteste."
          shield: "Son corps est entièrement composé de cristaux\nd’énergie draconique. Il possèderait les pouvoirs\nde tous les Pokémon Dragon."
        it:
          sword: "Si ipotizza che le sue braccia abbiano la forma\ndella testa di un antico Pokémon di tipo Drago,\nma non esistono prove certe."
          shield: "Il suo corpo è formato da energia Drago\ncristallizzata. Pare che possieda i poteri\ndi tutti i Pokémon di tipo Drago."
        de:
          sword: "Einer unbestätigten Theorie zufolge sind seine\nArme wie der Kopf eines urzeitlichen\nDrachen-Pokémon geformt."
          shield: "Sein ganzer Körper besteht aus kristallisierter\nDrachen-Energie. Es soll über die Kräfte aller\nDrachen-Pokémon verfügen."
        es:
          sword: "Cierta teoría afirma que la forma de sus brazos\nrepresenta la cabeza de un Pokémon dragón\nancestral, aunque esto no ha podido verificarse."
          shield: "Todo su cuerpo es una gema de energía dragón\ncristalizada. Se cree que posee los poderes de\ntodos los Pokémon dragón."
        ko:
          sword: "팔의 형태가 고대 드래곤포켓몬의\n머리라는 학설도 있지만\n증명된 바는 없다."
          shield: "온몸이 드래곤 에너지의\n결정체다. 모든 드래곤포켓몬의\n힘을 가지고 있는 듯하다."
        zh_simp:
          sword: "有一种未经证实的学术说法\n认为它手臂的形状\n是古代龙宝可梦的头，"
          shield: "整个身体是龙之能量的\n结晶。据说它拥有\n所有龙宝可梦的能力。"
        zh_trad:
          sword: "有學者認為牠的手臂是\n古代龍寶可夢頭部的形狀。\n但這個學說尚未被證實。"
          shield: "全身是由龍之能量的結晶\n打造而成。據說牠擁有\n所有的龍寶可夢的力量。"
