        jp_kana:
          sword: "しんの　きょうてきと　あうと\nみがるに　なるため　りょうての\nけを　かみちぎり　すててしまう。"
          shield: "めにも　とまらぬ　スピードで\nくりだす　けりは　きょだいな\nいわも　こっぱみじんに　くだく。"
        jp_kanji:
          sword: "真の　強敵と　会うと\n身軽に　なるため　両手の　毛を\n噛み千切り　捨ててしまう。"
          shield: "目にも　止まらぬ　スピードで\n繰りだす　蹴りは　巨大な　岩も\n木っ端みじんに　砕く。"
        en:
          sword: "When Mienshao comes across a truly challenging\nopponent, it will lighten itself by biting off the\nfur on its arms."
          shield: "Delivered at blinding speeds, kicks from this\nPokémon can shatter massive boulders into\ntiny pieces."
        fr:
          sword: "Lorsqu’il fait face à un adversaire vraiment\nredoutable, il coupe les poils de ses mains\navec les dents pour améliorer son agilité."
          shield: "Ses coups de pied ultrarapides et invisibles\nà l’œil nu peuvent réduire un énorme rocher\nen poussière."
        it:
          sword: "Se incontra un nemico veramente forte,\nsi strappa a morsi i peli degli arti per alleggerirsi\ne guadagnare in agilità."
          shield: "I suoi calci, talmente veloci da risultare invisibili,\nsono in grado di sbriciolare anche massi enormi."
        de:
          sword: "Begegnet es einem wahrhaft starken Gegner,\nbeißt es das Fell an seinen Armen ab, um an\nBeweglichkeit zu gewinnen."
          shield: "Seine mit atemberaubender Geschwindigkeit\nausgeführten Tritte können selbst riesige Felsen\nin winzige Stücke zerschmettern."
        es:
          sword: "Cuando se encuentra frente a un oponente de\ncategoría, se arranca parte del pelaje de los\nbrazos a mordiscos para ganar agilidad."
          shield: "Sus veloces patadas, que escapan al ojo humano,\nson capaces de reducir a escombros incluso rocas\nde gran tamaño."
        ko:
          sword: "진정한 강적과 만나면\n몸을 가볍게 하기 위해\n양손의 털을 물어뜯어 버린다."
          shield: "눈에 보이지 않을 정도의 스피드로\n구사하는 발차기는 거대한\n바위도 산산이 조각낸다."
        zh_simp:
          sword: "遇到真正的强敌时，\n为了让身体更加灵便，\n会咬断自己双手的毛扔掉。"
          shield: "以迅雷不及掩耳的速度\n使出踢击，即使是巨大的\n岩石也能击得粉碎。"
        zh_trad:
          sword: "當牠遇上真正的強敵時，\n會將雙臂的毛咬斷丟棄，\n讓自己的身體更加輕盈。"
          shield: "快到無法看清的踢腿\n非常強烈，即使是\n巨大的岩石也能粉碎。"
