          shield: "うみのギャングと　よばれ　せいそく\nかいいきに　はいりこんでしまった\nふねは　もれなく　おそわれてしまう。"
        jp_kanji:
          sword: "獲物の　匂いを　嗅ぎとると\nお尻から　海水を　噴射して\n時速１２０キロで　襲撃する。"
          shield: "海のギャングと　呼ばれ　生息\n海域に　入りこんでしまった\n船は　もれなく　襲われてしまう。"
        en:
          sword: "As soon as it catches the scent of prey, Sharpedo\nwill jet seawater from its backside, hurtling\ntoward the target to attack at 75 mph."
          shield: "This Pokémon is known as the Bully of the Sea.\nAny ship entering the waters Sharpedo calls\nhome will be attacked—no exceptions."
        fr:
          sword: "Dès qu’il détecte l’odeur d’une proie, il fonce\nsur elle à une vitesse de 120 km/h en propulsant\nde l’eau de mer par son postérieur."
          shield: "Surnommé le « tyran des mers », ce Pokémon\nattaque sans exception tous les navires\nqui osent s’aventurer sur son territoire."
        it:
          sword: "Se fiuta l’odore di una preda, la assale alla\nvelocità di 120 km/h, che raggiunge espellendo\nacqua marina dalla parte posteriore del corpo."
          shield: "Questo Pokémon, detto “Tiranno del mare”,\nassale qualsiasi nave si addentri nelle acque\nin cui dimora."
        de:
          sword: "Wittert es Beute, schießt es Wasser aus seinem\nHinterteil und jagt ihr mit einer Geschwindigkeit\nvon 120 km/h hinterher."
          shield: "Tohaido trägt den Spitznamen „Tyrann des\nMeeres“. Schiffe, die in sein Revier eindringen,\ngreift es ausnahmslos an."
        es:
          sword: "En cuanto detecta el olor de una presa, expele\nagua marina para propulsarse hacia delante y\natacar a una velocidad de 120 km/h."
          shield: "Conocido como el Terror de los Mares, ataca sin\nexcepción a todo barco que ose adentrarse en su\nterritorio oceánico."
        ko:
          sword: "먹이의 냄새를 맡으면\n엉덩이로 바닷물을 내뿜어서\n시속 120km의 속도로 습격한다."
          shield: "바다의 건달로 불리며\n서식하는 해역에 들어간\n배는 모조리 공격당한다."
        zh_simp:
          sword: "嗅到猎物的味道后，\n会从臀部喷射海水，\n以１２０公里的时速发动袭击。"
          shield: "被称为大海恶霸。\n进入它栖息海域的船只\n会无一例外地遭到袭击。"
        zh_trad:
          sword: "當牠嗅到獵物的氣味，\n就會從臀部噴射出海水，\n發動時速１２０公里的襲擊。"
          shield: "被稱為大海惡霸。船隻\n要是誤闖了牠的棲息海域，\n無一倖免地都會被襲擊。"
