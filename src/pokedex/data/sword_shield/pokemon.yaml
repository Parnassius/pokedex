          sword: "おぼれている　ひとや　ポケモンを\nみつけると　たすけずには　いられない\nこころ　やさしい　ポケモン。"
          shield: "うみの　けしんと　よばれる。\nカイリューがたの　ちょうぞうを\nへさきに　つける　ふねも　おおい。"
        jp_kanji:
          sword: "溺れている　人や　ポケモンを\n見つけると　助けずには　いられない\n心優しい　ポケモン。"
          shield: "海の　化身と　呼ばれる。\nカイリュー型の　彫像を\n舳先に　付ける　船も　多い。"
        en:
          sword: "It’s a kindhearted Pokémon. If it spots a drowning\nperson or Pokémon, Dragonite simply must\nhelp them."
          shield: "This Pokémon is known as the Sea Incarnate.\nFigureheads that resemble Dragonite decorate\nthe bows of many ships."
        fr:
          sword: "Sa gentillesse est telle que s’il voit un Pokémon\nou un être humain en train de se noyer, il n’hésite\npas à lui venir en aide."
          shield: "On l’appelle « l’avatar de la mer ». Nombreux\nsont les navires arborant une figure de proue\nen forme de Dracolosse."
        it:
          sword: "È un Pokémon dal cuore gentile. Se vede persone\no Pokémon che stanno affogando, non può fare\na meno di salvarli."
          shield: "Viene chiamato “Incarnazione del mare”.\nMolte navi hanno una statua di Dragonite\nsulla prua."
        de:
          sword: "Erspäht dieses gutherzige Pokémon ertrinkende\nMenschen oder Pokémon, so kann es gar nicht\nanders, als sie zu retten."
          shield: "Dragoran wird die „Inkarnation des Meeres“\ngenannt. Sein Ebenbild ziert den Bug vieler\nSchiffe als Galionsfigur."
        es:
          sword: "Un Pokémon bondadoso y compasivo al que le\nresulta imposible dar la espalda a Pokémon o\nhumanos que se encuentren a la deriva."
          shield: "Se lo conoce como el Avatar de la Mar. Muchos\nbarcos lucen una talla de Dragonite como\nmascarón de proa."
        ko:
          sword: "물에 빠진 사람이나 포켓몬을\n발견하면 반드시 도와주는\n마음 착한 포켓몬이다."
          shield: "바다의 화신이라고 불린다.\n망나뇽 형태의 조각상을\n뱃머리에 두는 배도 많다."
        zh_simp:
          sword: "只要发现溺水的人和宝可梦，\n就忍不住要去救助。\n是心地善良的宝可梦。"
          shield: "被称为大海的化身。\n很多船都会把快龙的\n雕像设置在船头。"
        zh_trad:
          sword: "心地善良的寶可夢。只要\n發現溺水的人或寶可夢，\n就會忍不住去救助對方。"
          shield: "人們稱牠為大海的化身。\n有許多船會在船頭設置\n快龍的雕像。"
