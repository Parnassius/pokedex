      types:
        - rock
      egg_groups:
        - undiscovered
      abilities:
        - sturdy
        - rock_head
      hidden_ability: rattled
      descriptions:
        jp_kana:
          sword: "あせと　なみだを　めから　ながす。\nあせは　ちょっぴり　しょっぱくて\nなみだは　ほんのり　にがい　あじだ。"
          shield: "かんそうした　いわばに　くらす。\nみどりの　たまは　かわくほど\nツヤツヤと　にぶく　かがやく。"
        jp_kanji:
          sword: "汗と　涙を　目から　流す。\n汗は　ちょっぴり　しょっぱくて\n涙は　ほんのり　苦い　味だ。"
          shield: "乾燥した　岩場に　暮らす。\n緑の　玉は　乾くほど\nツヤツヤと　鈍く　輝く。"
        en:
          sword: "It expels both sweat and tears from its eyes.\nThe sweat is a little salty, while the tears have\na slight bitterness."
          shield: "This Pokémon lives in dry, rocky areas. As its\ngreen spheres dry out, their dull luster increases."
        fr:
          sword: "Il évacue sa sueur et ses larmes par les yeux.\nSa sueur a un goût légèrement salé, tandis que\nses larmes ont un soupçon d’amertume."
          shield: "Il vit dans les zones rocheuses arides.\nQuand ses boules vertes sont sèches,\nelles se mettent à briller légèrement."
        it:
          sword: "Dagli occhi espelle sudore e lacrime.\nIl primo ha un gusto lievemente salato,\nle seconde sono leggermente amare."
          shield: "Vive in ambienti aridi e pietrosi. Quando sono\nsecche, le sue sfere verdi emettono un fioco\nbagliore."
        de:
          sword: "Es sondert sowohl Schweiß als auch Tränen über\nseine Augen ab. Sein Schweiß schmeckt leicht\nsalzig, seine Tränen ein bisschen bitter."
          shield: "Es lebt in trockenen Felsgebieten. Je trockener\nseine grünen Kugeln sind, desto matter ist ihr\nGlanz."
        es:
          sword: "Expulsa sudor y lágrimas por los ojos. El sudor\nes ligeramente salado y las lágrimas tienen un\nleve regusto amargo."
          shield: "Vive en entornos áridos y pedregosos. Cuanto\nmás se secan sus esferas verdes, más destaca\nsu sutil lustre."
        ko:
          sword: "땀과 눈물이 모두 눈에서 나온다.\n땀은 약간 짠맛이고\n눈물은 살짝 씁쓸한 맛이다."
          shield: "건조한 바위 밭에 산다.\n초록색 구슬은 마를수록\n반들반들 희미하게 빛난다."
        zh_simp:
          sword: "会从眼睛里排出汗和泪水。\n它的汗水有一点点咸，\n泪水则略微带着一些苦味。"
          shield: "栖息在空气干燥岩石裸露的地方。\n空气越是干燥，它身上的绿球\n就越是会泛出暗淡的光泽。"
        zh_trad:
          sword: "會從眼睛裡排出汗水和淚水。\n牠的汗水有一點點鹹，\n淚水則略微帶著一些苦味。"
          shield: "棲息在空氣乾燥岩石裸露的地方。\n空氣越是乾燥，牠身上的綠球\n就越是會泛出黯淡的光澤。"
