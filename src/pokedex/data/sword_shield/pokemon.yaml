      types:
        - ground
        - rock
      egg_groups:
        - monster
        - field
      abilities:
        - lightning_rod
        - solid_rock
      hidden_ability: reckless
      descriptions:
        jp_kana:
          sword: "ての　あなに　いわや　ダンゴロを\nつめて　はっしゃ。　そうてんできる\nかずは　かたうでに　つき　３つ。"
          shield: "プロテクターで　こうげきを　はじき\nあいてが　ひるんだ　ところを\nじまんの　ドリルで　つらぬく。"
        jp_kanji:
          sword: "手の　穴に　岩や　ダンゴロを\n詰めて　発射。　装填できる\n数は　片腕に　つき　３つ。"
          shield: "プロテクターで　攻撃を　弾き\n相手が　ひるんだ　ところを\n自慢の　ドリルで　つらぬく。"
        en:
          sword: "It can load up to three projectiles per arm into\nthe holes in its hands. What launches out of those\nholes could be either rocks or Roggenrola."
          shield: "It relies on its carapace to deflect incoming\nattacks and throw its enemy off balance. As soon\nas that happens, it drives its drill into the foe."
        fr:
          sword: "Il met des rochers ou des Nodulithe dans le creux\nde ses mains et les tire comme des obus.\nIl peut ainsi en charger trois par bras."
          shield: "Il repousse les attaques avec ses Protecteurs et\nprofite du moment où l’adversaire est déstabilisé\npour le transpercer avec sa vrille, dont il est fier."
        it:
          sword: "Inserisce delle rocce o dei Roggenrola nelle\ncavità dei suoi palmi e poi li lancia. Può caricarne\nfino a tre per braccio."
          shield: "Respinge gli attacchi con la sua Copertura\ne approfitta del momento di esitazione\ndell’avversario per perforarlo con il suo trapano."
        de:
          sword: "Es bestückt die Vertiefungen in seinen Händen\nmit Felsen oder Kiesling und feuert sie daraus ab.\nIn jeder Hand hat es Platz für drei Geschosse."
          shield: "Mit seinem Schützer wehrt es Angriffe ab und\ndurchsticht dann den verdutzten Gegner mit\nseinem Bohrer, auf den es sehr stolz ist."
        es:
          sword: "Introduce rocas o Roggenrola en las cavidades\nde las manos y los dispara con fuerza. Es capaz\nde cargar hasta tres proyectiles en cada brazo."
          shield: "Repele los ataques usando un Protector y\naprovecha el momento en que el rival baja\nla guardia para perforarlo con su taladro."
        ko:
          sword: "손에 난 구멍에 바위나 단굴을\n끼운 뒤 발사한다. 장전할 수 있는\n수는 한쪽 팔당 3개씩이다."
          shield: "프로텍터로 공격을 튕겨내고\n상대가 풀이 죽으면\n특징적인 드릴로 관통한다."
        zh_simp:
          sword: "会在手掌的洞里塞进岩石和\n石丸子发射出去，每只手里\n可以装填３个。"
          shield: "用护具弹开敌人的攻击，\n在对手畏缩时用自己\n引以为傲的钻头贯穿对方。"
        zh_trad:
          sword: "會在手掌的洞裡塞進岩石和\n石丸子發射出去，每隻手裡\n可以裝填３個。"
          shield: "用護具彈開敵人的攻擊，\n在對手畏縮時用自己\n引以為傲的鑽頭貫穿對方。"
tangrowth:
  species_id: 465
  names:
    jp_kana: モジャンボ
    jp_kanji: モジャンボ
    en: Tangrowth
    fr: Bouldeneu
    it: Tangrowth
    de: Tangoloss
    es: Tangrowth
    ko: 덩쿠림보
    zh_simp: 巨蔓藤
    zh_trad: 巨蔓藤
  forms:
    tangrowth:
      form_id: 0
      base_stats:
        hp: 100
        attack: 100
        defense: 125
        special_attack: 110
        special_defense: 50
        speed: 50
      evs_yield:
        hp: 0
        attack: 0
        defense: 2
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - grass
      egg_groups:
        - grass
      abilities:
        - chlorophyll
        - leaf_guard
      hidden_ability: regenerator
      descriptions:
        jp_kana:
          sword: "じざいに　のびる　２ほんの　うでは\nじつは　ツルが　たばになったものと\nさいきんの　けんきゅうで　わかった。"
          shield: "あたたかい　とちで　くらす　ものほど\nツルの　のびが　はやい。　のびると\nみずから　ちぎって　みじかくする。"
        jp_kanji:
          sword: "自在に　伸びる　２本の　腕は\nじつは　ツルが　束になったものと\n最近の　研究で　わかった。"
          shield: "暖かい　土地で　暮らす　ものほど\nツルの　伸びが　早い。　伸びると\n自ら　ちぎって　短くする。"
        en:
          sword: "Tangrowth has two arms that it can extend as it\npleases. Recent research has shown that these\narms are, in fact, bundles of vines."
          shield: "Vine growth is accelerated for Tangrowth living in\nwarm climates. If the vines grow long, Tangrowth\nshortens them by tearing parts of them off."
        fr:
          sword: "La science a récemment découvert que\nles deux bras qu’il peut allonger à volonté\nsont en fait des lianes entrelacées."
          shield: "Ses lianes poussent plus rapidement s’il vit\nsous un climat chaud. Quand elles deviennent\ntrop longues, il se les coupe."
        it:
          sword: "Può estendere le braccia a piacimento.\nIn seguito a recenti ricerche si è scoperto\nche sono in realtà fasci di liane."
          shield: "Più il territorio in cui vive è caldo, più le sue liane\ncrescono velocemente. Quando si allungano\ntroppo, le taglia per accorciarle."
        de:
          sword: "Jüngsten Erkenntnissen zufolge bestehen seine\nzwei Arme, die es beliebig verlängern kann,\naus gebündelten Ranken."
          shield: "Je wärmer sein Lebensraum ist, desto schneller\nwachsen seine Ranken. Werden sie zu lang,\nkürzt Tangoloss sie, indem es sie abreißt."
        es:
          sword: "Se ha descubierto recientemente que los dos\nbrazos que estira a voluntad son en realidad\nlianas enredadas entre sí."
          shield: "Las lianas le crecen más rápidamente si vive\nen regiones cálidas. Cuando alcanzan cierta\nlongitud, se las corta."
        ko:
          sword: "자유자재로 늘어나는 2개의 팔은\n덩굴이 뭉쳐진 것이었다는 사실이\n최근 연구로 밝혀졌다."
          shield: "따듯한 땅에서 살수록\n덩굴의 성장이 빠르다. 길어지면\n스스로 잘라내어 짧게 만든다."
        zh_simp:
          sword: "最近的研究表明，它那\n能够自由伸长的２个手臂\n其实是由藤蔓聚集而成的。"
          shield: "栖息的地域越是温暖，藤蔓\n生长得就越快。藤蔓变长后，\n它会亲手将其扯断使其变短。"
        zh_trad:
          sword: "最近的研究發現，牠這雙\n能夠自由伸縮的手臂其實\n是由成束的藤蔓形成的。"
          shield: "棲息的地方越溫暖，藤蔓就會\n長得越快。當藤蔓變得太長時，\n就會自己扯斷它來調整長度。"
