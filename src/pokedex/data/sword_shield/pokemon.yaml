          shield: "ブリザードを　まきおこす　ポケモン。\nおおきな　からだを　ゆすれば\nあたりいちめん　すぐに　まっしろだ。"
        jp_kanji:
          sword: "大きな　腕を　ハンマーの　ように\n振り下ろし　ユキカブリを　狙う\nダルマッカの　群れを　追い払う。"
          shield: "ブリザードを　巻き起こす　ポケモン。\n大きな　体を　揺すれば\nあたり一面　すぐに　真っ白だ。"
        en:
          sword: "If it sees any packs of Darumaka going after\nSnover, it chases them off, swinging its sizable\narms like hammers."
          shield: "This Pokémon is known to bring blizzards.\nA shake of its massive body is enough to\ncause whiteout conditions."
        fr:
          sword: "Il fait fuir les hordes de Darumarond qui s’en\nprennent aux Blizzi en se servant de ses grands\nbras comme de marteaux."
          shield: "Ce grand Pokémon déclenche des blizzards.\nLorsqu’il agite son corps, tout ce qui l’entoure\nse retrouve couvert de neige."
        it:
          sword: "Agitando le grosse braccia come dei martelli\nscaccia i gruppi di Darumaka che prendono\ndi mira gli Snover."
          shield: "Scatena bufere di neve. Se scuote il suo grosso\ncorpo, imbianca il terreno circostante in un\nattimo."
        de:
          sword: "Es schwingt seine großen Arme wie Hämmer und\nvertreibt damit Gruppen von Flampion, die es\nauf Shnebedeck abgesehen haben."
          shield: "Dieses Pokémon löst Blizzards aus. Wenn es\nseinen großen Körper schüttelt, wird in seiner\nUmgebung alles sofort schneeweiß."
        es:
          sword: "Usa sus enormes brazos como si fueran martillos\npara ahuyentar a los grupos de Darumaka que\nacechan a los Snover."
          shield: "Posee la capacidad de generar ventiscas. Si agita\nsu enorme cuerpo, el terreno circundante queda\ninmediatamente cubierto de nieve."
        ko:
          sword: "거대한 팔을 해머처럼\n내리쳐서 눈쓰개를 노리는\n달막화 무리를 내쫓는다."
          shield: "블리자드를 일으키는 포켓몬이다.\n커다란 몸을 흔들면\n부근 일대는 금세 새하얗게 된다."
        zh_simp:
          sword: "会像挥动锤子一样挥下自己\n大大的手臂，赶走要袭击\n雪笠怪的火红不倒翁群体。"
          shield: "会引发暴风雪的宝可梦。\n只要它摇动巨大的身体，\n周围立刻会变得一片雪白。"
        zh_trad:
          sword: "會像揮動鎚子般揮下自己\n大大的手臂，趕走要襲擊\n雪笠怪的火紅不倒翁群體。"
          shield: "會引發暴風雪的寶可夢。\n只要牠搖動巨大的身體，\n周圍立刻會變得一片雪白。"
