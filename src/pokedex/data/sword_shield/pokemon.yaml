          shield: "てから　うみだす　クリームは\nマホイップが　しあわせなとき\nあまみと　コクが　ふかまる。"
        jp_kanji:
          sword: "信頼する　トレーナーには\nクリームで　デコレーションした\n木の実を　ふるまって　くれるのだ。"
          shield: "手から　生みだす　クリームは\nマホイップが　幸せなとき\n甘味と　コクが　深まる。"
        en:
          sword: "When it trusts a Trainer, it will treat them to\nberries it’s decorated with cream."
          shield: "When Alcremie is content, the cream it\nsecretes from its hands becomes sweeter\nand richer."
        fr:
          sword: "Il offre aux Dresseurs auxquels il accorde\ntoute sa confiance des Baies décorées\navec de la crème."
          shield: "Quand il est heureux, la crème qu’il produit\navec ses mains devient plus sucrée\net plus onctueuse."
        it:
          sword: "Agli Allenatori di cui si fida regala bacche\ndecorate con la panna."
          shield: "La panna che Alcremie produce dalle mani\nè più dolce e gustosa quando è felice."
        de:
          sword: "Es macht einem Trainer, dem es vertraut, mit\nBeeren samt Sahnedekoration eine Freude."
          shield: "Die Sahne, die Pokusan aus seinen Händen\nhervorbringt, wird noch süßer und intensiver\nim Geschmack, wenn es glücklich ist."
        es:
          sword: "Obsequia bayas decoradas con nata a aquellos\nEntrenadores en los que confía."
          shield: "La nata que le brota de las manos es más dulce\ny sustanciosa cuando está feliz."
        ko:
          sword: "믿을 수 있는 트레이너에게는\n크림으로 데코레이션한\n나무열매를 대접한다."
          shield: "손에서 나오는 크림은\n마휘핑이 행복할 때\n단맛과 감칠맛이 깊어진다."
        zh_simp:
          sword: "它会把自己用鲜奶油\n装饰过的树果送给\n自己信任的训练家。"
          shield: "当它感到幸福的时候，\n手中产生出的鲜奶油\n会变得更加香浓甜美。"
        zh_trad:
          sword: "牠會把自己用鮮奶油\n裝飾過的樹果送給\n自己信任的訓練家。"
          shield: "當牠感到幸福的時候，\n手中產生出的鮮奶油\n會變得更加香濃甜美。"
