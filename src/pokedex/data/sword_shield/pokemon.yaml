      hidden_ability: inner_focus
      descriptions:
        jp_kana:
          sword: "からだの　なかで　もえる　ほのおが\nパワーの　みなもと。　ひが　ちいさく\nなると　たちまち　ねむってしまう。"
          shield: "ねているときは　おしても　ひいても\nけっして　たおれない。　えんぎものの\nモチーフとして　にんきが　たかい。"
        jp_kanji:
          sword: "体の　中で　燃える　炎が\nパワーの　源。　火が　小さく\nなると　たちまち　眠ってしまう。"
          shield: "寝ているときは　押しても　引いても\nけっして　倒れない。　縁起ものの\nモチーフとして　人気が　高い。"
        en:
          sword: "It derives its power from fire burning inside\nits body. If the fire dwindles, this Pokémon will\nimmediately fall asleep."
          shield: "This popular symbol of good fortune will never\nfall over in its sleep, no matter how it’s pushed\nor pulled."
        fr:
          sword: "La flamme qui brûle dans son corps est sa source\nd’énergie. Si le feu s’affaiblit, il s’endort\nsur-le-champ."
          shield: "On a beau le pousser ou le tirer, quand il dort,\nrien ne le fait vaciller. Cette qualité lui a valu\nde devenir un emblème pour les porte-bonheurs."
        it:
          sword: "La fiamma che brucia dentro il suo corpo è\nla fonte della sua potenza. Quando si affievolisce\nil Pokémon si addormenta all’istante."
          shield: "Quando dorme è impossibile buttarlo giù,\nper quanto lo si spinga. I portafortuna che\nlo rappresentano sono molto popolari."
        de:
          sword: "Das Feuer in seinem Inneren ist die Quelle seiner\nKraft. Wird die Flamme zu klein, schläft es auf\nder Stelle ein."
          shield: "Während es schläft, lässt es sich nicht mal mit\nGewalt umstoßen. Aus diesem Grund ist es ein\nbeliebtes Motiv für Glücksbringer."
        es:
          sword: "La llama que arde en su interior es la fuente\nde su poder. Si el fuego mengua, se sume en\nun estado de sopor de inmediato."
          shield: "Cuando duerme es imposible tumbarlo por más\nque lo zarandeen. Es muy popular como amuleto\nde la suerte."
        ko:
          sword: "몸 안에서 타오르는 불꽃이\n힘의 원천이다. 불꽃이 작아지면\n금세 잠들어 버린다."
          shield: "자고 있을 때는 밀어도 당겨도\n절대 쓰러지지 않는다.\n길조의 모티브로 인기가 높다."
        zh_simp:
          sword: "能量之源是体内的火焰。\n如果火焰变小了，\n它马上就会睡着。"
          shield: "在它睡觉的时候，\n无论是推是拉，它都不会倒下。\n因为象征着吉利而大受欢迎。"
        zh_trad:
          sword: "能量之源是體內的火焰。\n如果火焰變小了，\n牠馬上就會睡著。"
          shield: "在牠睡覺的時候，\n無論是推是拉，牠都不會倒下。\n因為象徵著吉利而大受歡迎。"
    darumaka_galarian_form:
      form_id: 1
      names:
        jp_kana: ガラルのすがた
        jp_kanji: ガラルのすがた
        en: Galarian Form
        fr: Forme de Galar
        it: Forma di Galar
        de: Galar-Form
        es: Forma de Galar
        ko: 가라르의 모습
        zh_simp: 伽勒尔的样子
        zh_trad: 伽勒爾的樣子
      base_stats:
