      descriptions:
        jp_kana:
          sword: "あつい　とちでは　くらせない。\nれいきを　はいて　ゆきを　ふらせ\nつもった　なかに　もぐって　ねむる。"
          shield: "つららから　うまれたと　いわれる。\nマイナス５０どの　れいきを　はいて\nあたりを　こおらせ　すみやすくする。"
        jp_kanji:
          sword: "暑い　土地では　暮らせない。\n冷気を　吐いて　雪を　降らせ\n積もった　中に　潜って　眠る。"
          shield: "氷柱から　生まれたと　いわれる。\nマイナス５０度の　冷気を　吐いて\nあたりを　凍らせ　棲みやすくする。"
        en:
          sword: "Unable to survive in hot areas, it makes itself\ncomfortable by breathing out air cold enough to\ncause snow. It burrows into the snow to sleep."
          shield: "Supposedly, this Pokémon was born from an\nicicle. It spews out freezing air at −58 degrees\nFahrenheit to make itself more comfortable."
        fr:
          sword: "Il ne peut pas vivre dans les contrées chaudes.\nIl souffle un air glacial pour faire tomber la neige,\npuis s’y plonge pour dormir."
          shield: "On raconte qu’il est né de stalactites.\nIl gèle les alentours en soufflant de l’air à - 50 °C\npour améliorer son confort."
        it:
          sword: "Non può vivere nei luoghi caldi. Fa nevicare\nesalando un alito gelido e poi si addormenta\nimmerso nella neve che si è accumulata."
          shield: "Si dice che sia nato da una stalattite di ghiaccio.\nPer crearsi un habitat adatto, congela l’ambiente\nintorno con il suo fiato a -50 ºC."
        de:
          sword: "Gelatini kann nicht an warmen Orten leben. Es\nerzeugt Schnee, indem es kalte Luft ausatmet,\nund vergräbt sich dann darin, um zu schlafen."
          shield: "Es entstand angeblich aus einem Eiszapfen und\nspeit -50 ºC kalte Luft aus, um die Umgebung\nauf seine Wohlfühltemperatur abzukühlen."
        es:
          sword: "No puede vivir en lugares muy cálidos. Provoca\nnevadas exhalando un vaho gélido y luego se\nacurruca en la nieve acumulada para dormir."
          shield: "Este Pokémon nació a partir de un carámbano.\nExhala un vaho a -50 °C con el que congela el\nambiente para adaptarlo a sus necesidades."
        ko:
          sword: "더운 곳에서는 살 수 없다.\n냉기를 뿜어 눈을 내리게 한 뒤\n쌓인 눈 속에 들어가 잠든다."
          shield: "고드름에서 태어났다고 전해진다.\n마이너스 50도의 냉기를 뿜어\n주변을 얼려 살기 좋게 만든다."
        zh_simp:
          sword: "无法在炎热的地方生存。\n会吐出冷气来降雪，\n然后窝在积雪里睡觉。"
          shield: "据说它是从冰柱中诞生的。\n为了能让自己生活得更舒适，\n会吐出零下５０度的冷气冻住四周。"
        zh_trad:
          sword: "無法在炎熱的地方生存。\n會吐出冷氣來降雪，\n然後窩在積雪裡睡覺。"
          shield: "據說牠是從冰柱中誕生的。\n為了能讓自己生活得更舒適，\n會吐出零下５０度的冷氣凍住四周。"
