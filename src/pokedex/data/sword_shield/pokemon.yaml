        jp_kana:
          sword: "からだに　ためた　かねんガスで\nはつねつ。　とくに　おなかの\nきいろい　ぶぶんが　あついのだ。"
          shield: "はつねつした　からだで　えものを\nしめあげる。　こんがり　やけたら\nむしゃむしゃ　いただくのだ。"
        jp_kanji:
          sword: "体に　溜めた　可燃ガスで\n発熱。　とくに　お腹の\n黄色い　部分が　熱いのだ。"
          shield: "発熱した　体で　獲物を\n締め上げる。　こんがり　焼けたら\nむしゃむしゃ　いただくのだ。"
        en:
          sword: "It stores flammable gas in its body and uses it to\ngenerate heat. The yellow sections on its belly\nget particularly hot."
          shield: "It wraps prey up with its heated body, cooking\nthem in its coils. Once they’re well-done, it will\nvoraciously nibble them down to the last morsel."
        fr:
          sword: "Il produit de la chaleur grâce au gaz inflammable\nqu’il emmagasine dans son corps. La partie jaune\nde son abdomen est particulièrement brûlante."
          shield: "Il enserre fermement ses proies avec son corps\nbrûlant et, quand elles sont bien grillées,\nil les dévore."
        it:
          sword: "Genera calore grazie ai gas combustibili\naccumulati nel suo corpo. Le parti gialle\ndel suo addome sono particolarmente calde."
          shield: "Stritola le prede con il suo corpo ardente e,\nquando sono belle abbrustolite, le divora."
        de:
          sword: "Mit dem entzündlichen Gas in seinem Körper\nerzeugt es Hitze. Die gelben Stellen an seinem\nBauch werden besonders heiß."
          shield: "Es nimmt Beute mit seinem aufgeheizten Körper\nin die Mangel. Sobald sie gut durchgebraten ist,\nfrisst es sie genüsslich."
        es:
          sword: "Genera calor consumiendo el gas inflamable que\nalmacena en su cuerpo. Los círculos amarillos del\nabdomen están particularmente calientes."
          shield: "Oprime a sus presas con su cuerpo candente.\nUna vez bien tostadas, las devora con fruición."
        ko:
          sword: "몸속에 모아둔 가연성 가스로\n열을 낸다. 특히 배 쪽의\n노란 부분이 뜨겁다."
          shield: "발열된 몸으로 먹이를\n세게 조른다. 알맞게 구워지면\n우적우적 먹어버린다."
        zh_simp:
          sword: "靠储存在体内的可燃气体\n来发热。热度最高的是\n腹部的黄色部分。"
          shield: "会用滚烫的身体勒紧猎物，\n等到烤得恰到好处之时，\n就把它们大口大口地吃掉。"
        zh_trad:
          sword: "靠儲存在體內的可燃氣體\n來發熱。熱度最高的是\n腹部的黃色部分。"
          shield: "會用滾燙的身體勒緊獵物，\n等到烤得恰到好處之時，\n就把牠們大口大口地吃掉。"
