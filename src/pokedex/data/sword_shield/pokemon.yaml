        jp_kana:
          sword: "サイコパワーで　ちゅうに　ういたまま\nねむる。　だんりょくに　すぐれた\nしっぽを　まくらがわりに　するぞ。"
          shield: "ねんりきの　いりょくは　ぜつだい。\nしんかに　そなえて　ひたいの　ほしに\nサイコパワーを　たくわえている。"
        jp_kanji:
          sword: "サイコパワーで　宙に　浮いたまま\n眠る。　弾力に　優れた　しっぽを\n枕がわりに　するぞ。"
          shield: "念力の　威力は　絶大。\n進化に　備えて　額の　星に\nサイコパワーを　蓄えている。"
        en:
          sword: "Using its psychic power, Kadabra levitates as it\nsleeps. It uses its springy tail as a pillow."
          shield: "This Pokémon’s telekinesis is immensely powerful.\nTo prepare for evolution, Kadabra stores up\npsychic energy in the star on its forehead."
        fr:
          sword: "Ses pouvoirs psychiques lui permettent de léviter\nen dormant. Il utilise alors sa queue très souple\ncomme un oreiller."
          shield: "Incroyablement doué en télékinésie, il concentre\nson énergie psychique dans l’étoile sur son front\nen prévision de son évolution."
        it:
          sword: "I suoi poteri psichici gli permettono di levitare\nmentre dorme. Come cuscino usa la sua coda\nstraordinariamente elastica."
          shield: "La potenza della sua psicocinesi è immensa.\nImmagazzina i suoi poteri psichici nella stella\nsulla fronte, preparandosi all’evoluzione."
        de:
          sword: "Kadabras Psycho-Kräfte ermöglichen es ihm,\nschwebend zu schlafen. Seinen äußerst\nelastischen Schweif nutzt es dabei als Kissen."
          shield: "Kadabra verfügt über enorme psychokinetische\nMacht. Als Vorbereitung für seine Entwicklung\nspeichert es im Stern auf der Stirn Psycho-Kräfte."
        es:
          sword: "Duerme suspendido en el aire gracias a sus\npoderes psíquicos. La cola, de una flexibilidad\nextraordinaria, hace las veces de almohada."
          shield: "La potencia de su telequinesis es inmensa.\nAcumula poder psíquico en la estrella de la\nfrente como preparativo de cara a su evolución."
        ko:
          sword: "사이코 파워로 공중에 떠서 잠든다.\n탄력이 뛰어난 꼬리를\n베개 대신으로 사용한다."
          shield: "염동력의 위력은 절대적이다.\n진화에 대비하여 이마에 있는 별에\n사이코 파워를 비축하고 있다."
        zh_simp:
          sword: "用精神力量浮在空中睡觉。\n会把弹力十足的\n尾巴当成枕头来用。"
          shield: "念力的威力大得惊人。\n会把精神力量储存在额头的\n星星里，以备进化之需。"
        zh_trad:
          sword: "會用精神力量浮在空中睡覺。\n牠還會把彈力十足的尾巴\n當成枕頭用喔。"
          shield: "念力的威力大得驚人。\n會把精神力量儲存在額頭\n的星星裡，以備進化所需。"
