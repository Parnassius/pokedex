      descriptions:
        jp_kana:
          sword: "ぜんしんの　コブを　ふるわせて\nじしんのような　ゆれを　おこす。\nグレッグルと　ちかい　しゅるい。"
          shield: "コブが　おこす　バイブレーションが\nマッサージに　よいと　ろうじんに\nだいにんきの　ポケモンだ。"
        jp_kanji:
          sword: "全身の　コブを　震わせて\n地震のような　揺れを　起こす。\nグレッグルと　近い　種類。"
          shield: "コブが　起こす　バイブレーションが\nマッサージに　良いと　老人に\n大人気の　ポケモンだ。"
        en:
          sword: "The vibrating of the bumps all over its body\ncauses earthquake-like tremors. Seismitoad and\nCroagunk are similar species."
          shield: "This Pokémon is popular among the elderly,\nwho say the vibrations of its lumps are great\nfor massages."
        fr:
          sword: "En faisant vibrer tous les pustules de son corps,\nil peut provoquer des secousses similaires à celles\nd’un séisme. Il est proche des Cradopaud."
          shield: "Ce Pokémon est un excellent masseur grâce\naux vibrations de ses pustules. Les personnes\nâgées l’apprécient particulièrement."
        it:
          sword: "Fa vibrare le protuberanze su tutto il corpo\nprovocando delle scosse simili a un terremoto.\nCome specie è affine ai Croagunk."
          shield: "Particolarmente amato dagli anziani per via\ndelle vibrazioni prodotte dalle protuberanze\nsui suoi pugni, perfette per fare massaggi."
        de:
          sword: "Die Beulen, die seinen ganzen Körper bedecken,\nkönnen Erschütterungen auf Erdbebenstärke\nerzeugen. Es ist artverwandt mit Glibunkel."
          shield: "Es erfreut sich großer Beliebtheit bei Senioren,\nseit bekannt wurde, dass sich seine vibrierenden\nBeulen zur Massagetherapie einsetzen lassen."
        es:
          sword: "Cuando hace vibrar los bultos de su cuerpo,\nprovoca sacudidas que parecen terremotos.\nEstá emparentado con los Croagunk."
          shield: "Las vibraciones de sus bultos resultan perfectas\npara dar masajes, lo que lo ha hecho muy\npopular entre la tercera edad."
        ko:
          sword: "전신의 혹을 진동시켜서\n지진과 같은 흔들림을 일으킨다.\n삐딱구리와 가까운 종이다."
          shield: "혹이 일으키는 바이브레이션이\n마사지에 좋다고 노인에게\n인기가 높은 포켓몬이다."
        zh_simp:
          sword: "通过震动全身的瘤，\n引发地震般的晃动。\n与不良蛙是相近的物种。"
          shield: "在老年人之间广受欢迎。\n因为他们觉得它身上的瘤\n发出的震动拿来按摩刚刚好。"
        zh_trad:
          sword: "透過震動全身的瘤\n來引發地震般的晃動。\n與不良蛙是相近的物種。"
          shield: "在老年人之間廣受歡迎。\n因為他們覺得牠身上的瘤\n發出的震動拿來按摩剛剛好。"
throh:
