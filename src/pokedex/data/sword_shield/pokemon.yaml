        jp_kana:
          sword: "どろで　かためた　あしは　いわよりも\nかたくなり　いちげきで　トラックを\nはかいする　いりょくを　うみだす。"
          shield: "１０トンを　こえる　にもつを　ひいて\nふみんふきゅうで　ガラルちほうを\nじゅうだんできる　じきゅうりょく。"
        jp_kanji:
          sword: "泥で　固めた　脚は　岩よりも\n硬くなり　一撃で　トラックを\n破壊する　威力を　生み出す。"
          shield: "１０トンを　超える　荷物を　引いて\n不眠不休で　ガラル地方を\n縦断できる　持久力。"
        en:
          sword: "Mud that hardens around a Mudsdale’s legs\nsets harder than stone. It’s so hard that it allows\nthis Pokémon to scrap a truck with a single kick."
          shield: "Mudsdale has so much stamina that it could carry\nover 10 tons across the Galar region without rest\nor sleep."
        fr:
          sword: "Il recouvre ses jambes d’une croûte de boue,\nles rendant ainsi plus dures que la pierre. Il peut\nalors détruire un camion d’un seul coup de jambe."
          shield: "Il a assez d’endurance pour arpenter tout Galar\nsans relâche en tirant des charges dépassant\nles dix tonnes."
        it:
          sword: "Il fango secco che ricopre le sue zampe è più\nduro della pietra. È così forte da fare a pezzi\nun camion con un calcio solo."
          shield: "È così resistente da poter attraversare l’intera\nregione di Galar trainando carichi di oltre\n10 tonnellate senza mai riposarsi."
        de:
          sword: "Durch Schlamm werden seine Beine härter als\nStein. Ein Angriff mit ihnen verfügt über genug\nWucht, um einen Lastwagen zu zerstören."
          shield: "Es verfügt über genügend Ausdauer, um eine\nüber zehn Tonnen schwere Last ohne Pause\ndurch die gesamte Galar-Region zu ziehen."
        es:
          sword: "Cuando el lodo que recubre sus patas se seca,\nestas se vuelven más duras que una roca. Puede\nreducir a chatarra un camión con una sola coz."
          shield: "Su resistencia le permitiría recorrer Galar de\npunta a punta sin un solo descanso portando\ncargas de más de diez toneladas."
        ko:
          sword: "진흙으로 굳힌 다리는 바위보다도\n단단해져서 일격에 트럭을\n파괴할 정도의 위력을 보인다."
          shield: "10톤이 넘는 짐을 끌고\n자지도 쉬지도 않고 가라르지방을\n종단할 수 있는 지구력이 있다."
        zh_simp:
          sword: "泥巴使它的蹄子变得比岩石\n还要坚硬，只要一击就能产生\n能够破坏卡车的威力。"
          shield: "拥有很强的耐力，\n可以不眠不休地拉着１０吨重的\n货物纵贯伽勒尔地区。"
        zh_trad:
          sword: "泥巴使牠的蹄變得比岩石\n還要堅硬，只要一擊就能\n產生足以破壞卡車的威力。"
          shield: "擁有很強的耐力，\n可以不眠不休地拉著１０噸重\n的貨物縱貫伽勒爾地區。"
dewpider:
