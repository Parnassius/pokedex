        - keen_eye
      hidden_ability: tinted_lens
      descriptions:
        jp_kana:
          sword: "いつも　いっぽんあしで　たっている。\nあしを　いれかえる　しゅんかんは\nすばやくて　なかなか　みられない。"
          shield: "いつも　きまった　じかんになると\nなきだすので　とけいがわりに\nつれてあるく　トレーナーもいる。"
        jp_kanji:
          sword: "いつも　一本足で　立っている。\n脚を　入れ替える　瞬間は\n素早くて　なかなか　見られない。"
          shield: "いつも　きまった　時間になると\n鳴きだすので　時計代わりに\n連れ歩く　トレーナーもいる。"
        en:
          sword: "It always stands on one foot. It changes feet so\nfast, the movement can rarely be seen."
          shield: "It begins to hoot at the same time every day.\nSome Trainers use them in place of clocks."
        fr:
          sword: "Il se tient toujours sur un pied. Il en change si vite\nqu’on peut à peine distinguer ce mouvement."
          shield: "Il hulule chaque jour aux mêmes moments.\nCertains Dresseurs s’en servent comme\nd’une montre."
        it:
          sword: "Sta sempre su una zampa sola. Cambia zampa\ncosì rapidamente che è quasi impossibile\nseguirne i movimenti."
          shield: "Emette il suo verso ogni giorno alla stessa ora.\nAlcuni Allenatori preferiscono affidarsi a questo\nPokémon anziché usare un orologio."
        de:
          sword: "Es steht immer auf einem Bein. Es wechselt sein\nStandbein so schnell, dass man es kaum sieht."
          shield: "Es stößt immer zur gleichen Uhrzeit seinen Ruf\naus. Einige Trainer nehmen es deswegen statt\neiner Armbanduhr mit."
        es:
          sword: "Se apoya en una sola pata y, cuando cambia de\nuna a otra, se mueve tan rápido que apenas se\npercibe."
          shield: "Todos los días empieza a ulular a la misma hora,\npor lo que algunos Entrenadores lo usan a modo\nde reloj."
        ko:
          sword: "항상 한 발로 서 있다.\n발을 교체하는 순간이\n빨라서 좀처럼 볼 수 없다."
          shield: "언제나 정해진 시간이 되면\n울음소리를 내어 시계 대용으로\n데리고 다니는 트레이너도 있다."
        zh_simp:
          sword: "一直用单脚站立。\n由于换脚的瞬间过快，\n基本上无法看清。"
          shield: "总是在固定的时间鸣叫，\n因此也有训练家\n拿它来代替钟表带出门。"
        zh_trad:
          sword: "總是用單腳站立。\n由於換腳的速度太快，\n很難用肉眼看清換腳的瞬間。"
          shield: "總是在固定的時間鳴叫，\n因此也有訓練家\n拿牠來代替鐘錶帶出門。"
noctowl:
