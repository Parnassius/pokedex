        jp_kana:
          sword: "ダンスの　ステップで　てきの　わざを\nかわしながら　バルーンを　つぎつぎと\nつくって　こうげきを　たたみかける。"
          shield: "なみの　おだやかな　よるになると\nリーダーの　アシレーヌの　うたごえに\nあわせて　なかまたちと　おどる。"
        jp_kanji:
          sword: "ダンスの　ステップで　敵の　技を\nかわしながら　バルーンを　次々と\nつくって　攻撃を　たたみかける。"
          shield: "波の　穏やかな　夜になると\nリーダーの　アシレーヌの　歌声に\n合わせて　仲間たちと　踊る。"
        en:
          sword: "As if dancing, it artfully dodges the attacks of its\nenemies. All the while, it’s busy forming a bunch\nof balloons to overwhelm its foes."
          shield: "On nights when the sea is calm, Brionne dance\nwith one another to the singing of the Primarina\nthat’s leading them."
        fr:
          sword: "Il esquive les attaques de ses adversaires\navec ses légers pas de danse, puis leur assène\nune rafale de coups avec ses ballons."
          shield: "Les soirs où la mer est calme, il danse\navec ses congénères au son des chants\nd’Oratoria, le chef du groupe."
        it:
          sword: "Evita le mosse del nemico con agili passi di danza\nper poi attaccarlo ripetutamente con una raffica\ndi palloncini."
          shield: "Nelle notti in cui il mare è tranquillo si uniscono\nal canto del Primarina a capo del gruppo e\ndanzano tutti insieme."
        de:
          sword: "Es weicht den Attacken seiner Gegner mithilfe\nvon Tanzschritten aus und erzeugt eine Blase nach\nder anderen, um sie in Bedrängnis zu bringen."
          shield: "In Nächten mit ruhigem Wellengang tanzt es mit\nseinen Artgenossen zusammen zu einem Lied,\ndas ihr Rudelführer, ein Primarene, vorsingt."
        es:
          sword: "Esquiva los ataques del rival con elegantes pasos\nde baile mientras lo presiona arrojando globos\nen rápida sucesión."
          shield: "Las noches en las que el mar está en calma, baila\njunto a sus congéneres al compás del canto de su\nlíder, Primarina."
        ko:
          sword: "댄스 스텝으로 상대의 기술을\n피하면서 벌룬을 계속해서 만들고\n공격을 펼쳐서 상대를 몰아붙인다."
          shield: "파도가 잔잔한 밤이 되면\n리더인 누리레느의 노랫소리에\n맞춰 동료와 함께 춤을 춘다."
        zh_simp:
          sword: "一边利用舞步躲避敌人的攻击，\n一边连续制作出气球，\n接连不断地攻击对方。"
          shield: "到了风平浪静的夜晚，\n会配合领队西狮海壬的歌声\n和伙伴们一起跳舞。"
        zh_trad:
          sword: "一邊用舞步躲避敵人的攻擊，\n一邊連續製造出氣球，\n接連不斷地攻擊對方。"
          shield: "到了風平浪靜的夜晚，\n會配合領隊西獅海壬的歌聲\n和夥伴們一起跳舞。"
primarina:
  species_id: 730
