      types:
        - dragon
        - fire
      egg_groups:
        - undiscovered
      abilities:
        - turboblaze
      descriptions:
        jp_kana:
          sword: "しっぽから　ほのおを　ふきだして\nジェットきのように　そらを　とぶ。\nせかいを　やきつくすと　いわれる。"
          shield: "ひとが　しんじつを　ないがしろにして\nよくに　まみれると　ほのおで　くにを\nやきつくすと　しんわに　えがかれた。"
        jp_kanji:
          sword: "しっぽから　炎を　噴き出して\nジェット機のように　空を　飛ぶ。\n世界を　焼きつくすと　いわれる。"
          shield: "人が　真実を　蔑ろにして\n欲に　まみれると　炎で　国を\n焼きつくすと　神話に　描かれた。"
        en:
          sword: "Flames spew from its tail as it flies through the\nsky like a jet airplane. It’s said that this Pokémon\nwill scorch the world."
          shield: "According to myth, if people ignore truth and\nlet themselves become consumed by greed,\nReshiram will arrive to burn their kingdoms down."
        fr:
          sword: "Il vole grâce à la propulsion générée\npar les flammes de sa queue.\nIl serait capable de réduire le monde en cendres."
          shield: "Selon un mythe, lorsque les gens ne font aucun\ncas de la Réalité et s’abandonnent à la cupidité,\nReshiram rase le pays entier avec ses flammes."
        it:
          sword: "Solca i cieli come un jet emettendo fiamme\ndalla coda. Si dice che abbia la capacità\ndi ridurre in cenere il mondo intero."
          shield: "Secondo le leggende, può incenerire un intero\npaese se i suoi abitanti oltraggiano la verità\ne sono accecati dalla cupidigia."
        de:
          sword: "Durch Feuerschübe aus seinem Schweif fliegt es\nschnell wie ein Düsenjet durch die Lüfte. Seine\nFlammen sollen die Welt einäschern können."
          shield: "Alte Mythen warnen, dass es alle Welt in Brand\nsetzen wird, wenn die Menschen die Wirklichkeit\nmissachten und der Gier verfallen."
        es:
          sword: "Surca los cielos cual cohete a reacción\nexpulsando llamas por la cola. Se cree que\npodría reducir a cenizas el mundo entero."
          shield: "Cuenta la leyenda que sus llamas reducirán a\ncenizas todo país cuyas gentes desprecien la\nverdad y estén mancilladas por la codicia."
        ko:
          sword: "꼬리에서 불꽃을 분출하여\n제트기처럼 하늘을 난다.\n세계를 불태울 것이라고 전해진다."
          shield: "사람이 진실을 모른 체하고\n욕심으로 가득 차면 불꽃으로\n나라를 태워버린다는 신화가 있다."
        zh_simp:
          sword: "从尾部喷出火焰，\n像喷气式飞机那样飞翔。\n据说它能让世界燃烧殆尽。"
          shield: "在神话的叙述里，如果人类\n蔑视真实、放纵欲望，它就会\n用火焰烧尽他们的王国。"
        zh_trad:
          sword: "從尾部噴出火焰，\n像噴射機那樣飛翔。\n據說牠能將世界燃燒殆盡。"
          shield: "在神話的敘述裡，如果人類\n蔑視真實、放縱欲望，牠就會\n用火焰燒盡他們的王國。"
