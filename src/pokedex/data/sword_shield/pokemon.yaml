        jp_kana:
          sword: "イワークが　１００ねん　いじょう\nいきると　からだの　せいぶんが\nダイヤのように　へんかする　という。"
          shield: "つちと　いっしょに　のみこんだ\nてつぶんが　たまっていって　からだが\nへんかしたとも　かんがえられる。"
        jp_kanji:
          sword: "イワークが　１００年　以上\n生きると　体の　成分が\nダイヤのように　変化する　という。"
          shield: "土と　一緒に　飲みこんだ\n鉄分が　溜まっていって　体が\n変化したとも　考えられる。"
        en:
          sword: "It is said that if an Onix lives for over 100 years,\nits composition changes to become diamond-like."
          shield: "It is thought its body transformed as a result of\niron accumulating internally from swallowing soil."
        fr:
          sword: "On raconte qu’il s’agit d’un Onix de plus\nde 100 ans dont la structure corporelle\ns’est rapprochée de celle du diamant."
          shield: "On pense que son corps s’est transformé à force\nd’avaler le fer contenu dans la terre en creusant."
        it:
          sword: "Un Onix vissuto più di 100 anni.\nIl suo corpo ha cambiato composizione\ned è diventato duro come il diamante."
          shield: "Si pensa che si sia trasformato a causa del\nferro contenuto nella terra che mangia."
        de:
          sword: "Es heißt, dass der Körper von Onix so hart wie\nein Diamant werde, wenn es mehr als 100 Jahre\nlebt."
          shield: "Man glaubt, dass sich sein Körper aufgrund des\nSchluckens von eisenhaltiger Erde verwandelt\nhabe."
        es:
          sword: "Según dicen, si un Onix vive más de 100 años,\nsu cuerpo adquiere una composición que\nrecuerda a la de los diamantes."
          shield: "Se cree que su cuerpo se ha ido transformando\npor el hierro acumulado en la tierra que ha\ningerido."
        ko:
          sword: "롱스톤이 100년 이상 살면\n몸의 성분이 다이아몬드처럼\n변한다고 전해진다."
          shield: "흙과 함께 삼킨 강철이\n축적되어 몸이 변화한 것이라\n여겨지고 있다."
        zh_simp:
          sword: "据说当大岩蛇活到了\n１００年以上，身体的成分\n就会变得如同钻石一般。"
          shield: "人们认为它的身体是因为\n堆积了很多和泥土一起吞下的\n铁元素，才会发生变化的。"
        zh_trad:
          sword: "據說當大岩蛇活到了\n１００年以上，身體的成分\n就會變得如同鑽石一般。"
          shield: "人們認為牠的身體是因為\n堆積了和泥土一起吞下的\n鐵質，才會發生變化的。"
