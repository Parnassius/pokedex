          shield: "あらゆる　しゅうはすうの　おんぱを\nあやつる。　ちょうおんぱを　あびると\nきょたいの　ポケモンも　たまらない。"
        jp_kanji:
          sword: "日が　暮れると　すみかの　洞窟を\n離れて　飛びまわり　完熟の\n果物を　超音波で　探す。"
