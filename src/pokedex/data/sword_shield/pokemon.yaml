      descriptions:
        jp_kana:
          sword: "おおきく　おもい　カラのせいで\nうごきが　にぶくなり　えものを\nとれずに　ぜつめつした　という。"
          shield: "するどいキバは　いわも　くだくが\nしょくしゅの　とどく　はんいの\nえものしか　おそえないのだ。"
        jp_kanji:
          sword: "大きく　重い　殻のせいで\n動きが　鈍くなり　獲物を　獲れずに\n絶滅した　という。"
          shield: "鋭いキバは　岩も　砕くが\n触手の　とどく　範囲の\n獲物しか　襲えないのだ。"
        en:
          sword: "Weighed down by a large and heavy shell,\nOmastar couldn’t move very fast. Some say it\nwent extinct because it was unable to catch food."
          shield: "Omastar’s sharp fangs could crush rock, but the\nPokémon can attack only the prey that come\nwithin reach of its tentacles."
        fr:
          sword: "Il se serait éteint à cause de la taille et du poids\nimportants de sa coquille, qui le ralentissait\nquand il chassait ses proies."
          shield: "Ses crocs sont capables de broyer la roche,\nmais il ne peut s’attaquer qu’aux proies\nà portée de ses tentacules."
        it:
          sword: "Si dice si sia estinto per via della conchiglia\ngrossa e pesante che, rendendo i suoi movimenti\nimpacciati, gli impediva di catturare le prede."
          shield: "Le sue zanne affilate possono frantumare\nanche le pietre, ma può attaccare solo le prede\na portata di tentacolo."
        de:
          sword: "Es starb wohl aus, weil seine Bewegungen durch\ndas große, schwere Gehäuse so langsam wurden,\ndass es keine Beute mehr fangen konnte."
          shield: "Mit seinen scharfen Zähnen ist es imstande,\nselbst Felsen zu zermalmen. Angreifen kann es\njedoch nur Beute in Reichweite seiner Tentakel."
        es:
          sword: "Se cree que se extinguió porque el excesivo\ntamaño y peso de su concha le impedían\nmoverse con rapidez para capturar presas."
          shield: "Posee unos colmillos afilados con los que puede\npartir piedras, pero solo ataca a presas que se\nhallan al alcance de sus tentáculos."
        ko:
          sword: "크고 무거운 껍질 때문에\n움직임이 둔해져서\n먹이를 잡지 못해 멸종했다고 한다."
          shield: "날카로운 이빨은 바위도 부수지만\n촉수가 닿는 범위 안의\n먹이만 공격할 수 있다."
        zh_simp:
          sword: "据说它是因为背上的壳又大又重，\n导致行动迟缓，无法捕捉到猎物，\n因此才会灭绝的。"
          shield: "拥有足以咬碎岩石的锋利牙齿，\n但是能够袭击的猎物仅限\n触手可以伸展的范围之内。"
        zh_trad:
          sword: "據說是又大又重的殼導致\n牠的行動變得遲緩到無法\n捕捉獵物，因此才會滅絕的。"
          shield: "尖銳的牙齒足以咬碎岩石，\n但能夠襲擊的獵物僅限在\n牠的觸手可及的範圍之內。"
