      descriptions:
        jp_kana:
          sword: "１ぴきでは　とても　ひよわなため\nむれることで　てきに　たちむかう\nのうりょくを　かくとくした。"
          shield: "きけんを　かんじると　めが　うるむ。\nなみだの　ひかりが　シグナルとなって\nたくさんの　なかまが　あつまるのだ。"
        jp_kanji:
          sword: "１匹では　とても　ひ弱なため\n群れることで　敵に　立ち向かう\n能力を　獲得した。"
          shield: "危険を　感じると　目が　潤む。\n涙の　光りが　シグナルとなって\nたくさんの　仲間が　集まるのだ。"
        en:
          sword: "Individually, they’re incredibly weak. It’s by\ngathering up into schools that they’re able\nto confront opponents."
          shield: "When it senses danger, its eyes tear up.\nThe sparkle of its tears signals other\nWishiwashi to gather."
        fr:
          sword: "Individuellement, ils sont très faibles. Ils ont donc\ndéveloppé une tactique de déplacement en banc\npour résister aux ennemis."
          shield: "Ses yeux se mouillent quand il sent le danger\napprocher. Le scintillement de ses larmes sert\nde signal pour que ses congénères se rassemblent."
        it:
          sword: "Presi singolarmente sono estremamente deboli.\nCiò li ha portati ad acquisire l’abilità di formare\nun banco quando affrontano il nemico."
          shield: "Quando percepisce un pericolo gli lacrimano\ngli occhi. Lo scintillio delle sue lacrime è un\nsegnale che indica ai suoi simili di radunarsi."
        de:
          sword: "Weil es alleine unheimlich schwach ist, hat es die\nFähigkeit erworben, einen Schwarm zu formen.\nSo kann es sich seinen Gegnern stellen."
          shield: "Wenn es Gefahr verspürt, tränen seine Augen.\nDas Leuchten der Tränen fungiert als Signal,\nmit dem es etliche Artgenossen zu sich ruft."
        es:
          sword: "Debido a su manifiesta debilidad cuando van\nsolos, han adquirido la capacidad de agruparse\nen bancos a la hora de enfrentarse a un enemigo."
          shield: "Al sentirse amenazado, le lloran los ojos. La luz\nque se refleja en sus lágrimas sirve de señal a sus\ncongéneres para agruparse en gran número."
        ko:
          sword: "1마리로는 너무나도 허약해서\n무리를 지어 상대에게 맞서는\n능력을 습득했다."
          shield: "위험을 느끼면 눈물을 글썽인다.\n눈물의 빛은 그들만의 신호로\n신호를 받고 많은 동료가 모인다."
        zh_simp:
          sword: "单独１只十分弱小，\n所以学会了通过群体行动\n来对抗敌人的能力。"
          shield: "感觉到危险时眼睛就会变得湿润。\n眼泪的光亮会成为召集伙伴的信号，\n让许多的弱丁鱼聚在一起。"
        zh_trad:
          sword: "單獨１隻十分弱小，\n所以學會了透過群體行動，\n來對抗敵人的能力。"
          shield: "感覺到危險時眼睛就會變得濕潤。\n眼淚的光亮會成為召集夥伴的信號，\n讓許多的弱丁魚聚在一起。"
    wishiwashi_school_form:
      form_id: 1
      names:
        jp_kana: むれたすがた
        jp_kanji: むれたすがた
        en: School Form
        fr: Forme Banc
        it: Forma Banco
        de: Schwarmform
        es: Forma Banco
        ko: 군집의 모습
        zh_simp: 鱼群的样子
        zh_trad: 魚群的樣子
      base_stats:
        hp: 45
        attack: 140
        defense: 130
        special_attack: 140
        special_defense: 135
        speed: 30
      evs_yield:
        hp: 1
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - water
      egg_groups:
        - water_2
      abilities:
        - schooling
      descriptions:
        jp_kana:
          sword: "１ぴきでは　ひよわでも　みんなで\nちからを　あわせれば　うみのまものと\nよばれる　そんざいに　なれるのだ。"
          shield: "じんけいを　くんで　つよい　てきに\nたちむかう。　たたかいで　キズつくと\nちりぢりになって　１ぴきに　もどる。"
        jp_kanji:
          sword: "１匹では　ひ弱でも　みんなで\n力を　合わせれば　海の魔物と\n呼ばれる　存在に　なれるのだ。"
          shield: "陣形を　組んで　強い　敵に\n立ち向かう。　戦いで　傷つくと\n散り散りになって　１匹に　もどる。"
        en:
          sword: "On their own, they’re very weak. But when\nWishiwashi pool their power together in a\nschool, they become a demon of the sea."
          shield: "When facing tough opponents, they get into\nformation. But if they get wounded in battle,\nthey’ll scatter and become solitary again."
        fr:
          sword: "Seul, il est vulnérable, mais quand il s’unit\nà ses congénères, il devient une créature\nque l’on surnomme le « démon des mers »."
          shield: "Il s’unit à d’autres spécimens pour faire face\naux ennemis puissants. En subissant des dégâts,\nle groupe se désagrège et il se retrouve tout seul."
        it:
          sword: "Presi singolarmente sono deboli, ma unendo le\nforze possono dare vita a una creatura chiamata\n“demone del mare”."
          shield: "I Wishiwashi affrontano i nemici più forti uniti\nin questa forma. Se si feriscono durante la lotta,\nil banco si disperde."
        de:
          sword: "Ein Lusardin allein mag schwach sein, aber\nzusammen bilden sie eine Einheit, die als\n„Ungeheuer der Meere“ gefürchtet wird."
          shield: "Diese Form nehmen Lusardin an, um starken\nGegnern zu trotzen. Werden sie im Kampf\nverletzt, zerstreuen sie sich wieder."
        es:
          sword: "Pese a la debilidad manifiesta de los Wishiwashi\nen solitario, al agruparse adquieren tal fuerza\nque hacen honor a su apodo, la Bestia del Mar."
          shield: "Los Wishiwashi se agrupan en bancos para\nenfrentarse a rivales fuertes. Si resultan heridos,\nse dispersan y vuelven a quedarse solos."
        ko:
          sword: "1마리는 아주 약하지만 다 같이\n힘을 합치면 바다의 마물이라\n불리는 존재가 된다."
          shield: "진형을 만들어 강한 적에 맞선다.\n싸움에서 상처를 입으면\n뿔뿔이 흩어져 1마리로 돌아간다."
        zh_simp:
          sword: "虽然单独１只十分弱小，\n只要大家聚在一起齐心协力，\n就能拥有堪称海之魔物的力量。"
          shield: "组成阵形来对抗强大的敌人。\n如果在战斗中受伤，\n便会散开回到一只一只的样子。"
        zh_trad:
          sword: "雖然單獨１隻十分弱小，\n只要大家聚在一起齊心協力，\n就能擁有堪稱海之魔物的力量。"
          shield: "組成陣形來對抗強大的敵人。\n如果在戰鬥中受傷，\n便會散開回到一隻一隻的樣子。"
mareanie:
  species_id: 747
  names:
    jp_kana: ヒドイデ
    jp_kanji: ヒドイデ
    en: Mareanie
    fr: Vorastérie
    it: Mareanie
    de: Garstella
    es: Mareanie
    ko: 시마사리
    zh_simp: 好坏星
    zh_trad: 好壞星
  forms:
    mareanie:
      form_id: 0
      base_stats:
        hp: 50
        attack: 53
        defense: 62
        special_attack: 43
        special_defense: 52
        speed: 45
      evs_yield:
        hp: 0
        attack: 0
        defense: 1
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - poison
        - water
      egg_groups:
        - water_1
      abilities:
        - merciless
        - limber
      hidden_ability: regenerator
      held_items:
        rare: poison_barb
      descriptions:
        jp_kana:
          sword: "トゲに　さされると　まず　しびれに\nおそわれ　やがて　かきむしりたくなる\nほどの　かゆみに　くるしむのだ。"
          shield: "アローラちほうの　ヒドイデと　ちがい\nガラルの　ヒドイデは　サニーゴの\nえだの　おいしさに　きづいていない。"
        jp_kanji:
          sword: "棘に　刺されると　まず　痺れに\n襲われ　やがて　掻きむしりたくなる\nほどの　痒みに　苦しむのだ。"
          shield: "アローラ地方の　ヒドイデと　違い\nガラルの　ヒドイデは　サニーゴの\n枝の　美味しさに　気づいていない。"
        en:
          sword: "The first symptom of its sting is numbness.\nThe next is an itching sensation so intense that it’s\nimpossible to resist the urge to claw at your skin."
          shield: "Unlike their Alolan counterparts, the Mareanie\nof the Galar region have not yet figured out\nthat the branches of Corsola are delicious."
        fr:
          sword: "Ses piqûres causent un engourdissement qui\nse mue en démangeaisons si terribles qu’elles\npoussent la victime à se gratter jusqu’au sang."
          shield: "Contrairement aux Vorastérie d’Alola,\nceux de Galar ne font pas grand cas\ndes cornes de Corayon."
        it:
          sword: "Chi viene punto dai suoi aculei viene colto\nda un formicolio che diventa presto un prurito\ninsopportabile."
          shield: "A differenza dei Mareanie di Alola, quelli\ndi Galar non sanno quanto siano deliziosi\ni coralli dei Corsola."
        de:
          sword: "Wird man von seinen Stacheln gestochen, setzt\nzunächst Taubheit ein, gefolgt von einem nahezu\nunerträglich starken Juckreiz."
          shield: "Im Gegensatz zu den Garstella in Alola haben\ndie der Galar-Region noch nicht bemerkt, wie\nköstlich die Arme von Corasonn sind."
        es:
          sword: "La picadura de sus aguijones provoca un\nhormigueo que no tarda en convertirse en\nuna picazón insoportable."
          shield: "A diferencia de sus congéneres de Alola, los\nejemplares de Galar aún no saben lo deliciosas\nque están las ramas de Corsola."
        ko:
          sword: "가시에 찔리면 먼저 저리기\n시작하며 이윽고 마구 긁고 싶을\n정도의 가려움에 고통받는다."
          shield: "알로라지방의 시마사리와 달리\n가라르의 시마사리는 코산호의\n가지의 맛을 아직 모른다."
        zh_simp:
          sword: "要是被它的毒刺给刺中，\n首先会发麻，接着会奇痒无比，\n让人恨不得把皮都给抓烂。"
          shield: "和阿罗拉的好坏星不同，\n伽勒尔的好坏星还没发现到\n太阳珊瑚的枝有多好吃。"
        zh_trad:
          sword: "要是被牠的毒刺給刺中，\n首先會發麻，接著會奇癢無比，\n讓人恨不得把皮都給抓爛。"
          shield: "和阿羅拉的好壞星不同，\n伽勒爾的好壞星還沒發現到\n太陽珊瑚的枝有多好吃。"
toxapex:
  species_id: 748
  names:
    jp_kana: ドヒドイデ
    jp_kanji: ドヒドイデ
    en: Toxapex
    fr: Prédastérie
    it: Toxapex
    de: Aggrostella
    es: Toxapex
    ko: 더시마사리
    zh_simp: 超坏星
    zh_trad: 超壞星
  forms:
    toxapex:
      form_id: 0
      base_stats:
        hp: 50
        attack: 63
        defense: 152
        special_attack: 53
        special_defense: 142
        speed: 35
      evs_yield:
        hp: 0
        attack: 0
        defense: 2
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - poison
        - water
      egg_groups:
        - water_1
      abilities:
        - merciless
        - limber
      hidden_ability: regenerator
      held_items:
        rare: poison_barb
      descriptions:
        jp_kana:
          sword: "ガラルちほうの　つめたい　すいおんに\nたえるため　あしで　ドームを　つくり\nないぶを　たいおんで　あたためる。"
          shield: "ホエルオーも　みっかみばん　くるしむ\nもうどくを　たいないの　どくぶくろに\nたっぷり　ためこんでいる。"
        jp_kanji:
          sword: "ガラル地方の　冷たい　水温に\n耐えるため　脚で　ドームを　つくり\n内部を　体温で　温める。"
          shield: "ホエルオーも　三日三晩　苦しむ\n猛毒を　体内の　毒袋に\nたっぷり　溜めこんでいる。"
        en:
          sword: "To survive in the cold waters of Galar, this\nPokémon forms a dome with its legs, enclosing\nits body so it can capture its own body heat."
          shield: "Within the poison sac in its body is a poison so\ntoxic that Pokémon as large as Wailord will still\nbe suffering three days after it first takes effect."
        fr:
          sword: "Pour endurer les températures peu clémentes\nde Galar, il forme un dôme hermétique avec\nses pattes pour conserver sa chaleur corporelle."
          shield: "Sa poche à venin interne regorge d’un poison\nsi violent que même un Wailord en souffrirait\npendant trois jours entiers."
        it:
          sword: "Per resistere alle basse temperature delle acque\ndi Galar, forma una cupola con i tentacoli e ne\nscalda l’area interna col calore del suo corpo."
          shield: "La sacca all’interno del suo corpo è piena\ndi un veleno così potente da far star male\npersino un Wailord per tre giorni e tre notti."
        de:
          sword: "Um dem kalten Wasser der Galar-Region zu\ntrotzen, bilden seine Beine eine Kuppel, deren\nInneres es mittels Körperwärme aufheizt."
          shield: "In dem Giftbeutel in seinem Inneren bewahrt es\ngroße Mengen eines Gifts auf, das selbst einem\nWailord drei Tage und Nächte lang stark zusetzt."
        es:
          sword: "Para resistir las bajas temperaturas de las aguas\nde Galar, forma una cúpula con las patas y\ncalienta el interior con el calor de su cuerpo."
          shield: "La bolsa de veneno en el interior de su cuerpo\ncontiene toxinas tan potentes que provocarían\ntres días de dolores intensos hasta a un Wailord."
        ko:
          sword: "가라르지방의 차가운 수온을\n견디기 위해 다리로 돔을 만든 뒤\n체온으로 내부를 덥힌다."
          shield: "고래왕도 사흘 밤낮 괴로워할 정도의\n맹독을 체내 독주머니에\n듬뿍 비축하고 있다."
        zh_simp:
          sword: "为了能承受住伽勒尔地区\n冰凉的水温，它用脚搭起圆顶，\n借助体温保持内部的温暖。"
          shield: "体内的毒囊中储存着\n满满的剧毒，毒性强到\n能让吼鲸王都痛苦三天三夜。"
        zh_trad:
          sword: "為了能承受住伽勒爾地區\n冰涼的水溫，牠用腳搭起圓頂，\n藉助體溫保持內部的溫暖。"
          shield: "體內的毒囊中儲存著\n滿滿的劇毒，毒性強到\n能讓吼鯨王都痛苦三天三夜。"
