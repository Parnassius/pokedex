          shield: "マホミルが　すがたを　みせた\nパティスリーは　だいはんじょうが\nやくそく　されると　いわれている。"
        jp_kanji:
          sword: "クリームで　できた　体を　もつ。\n空気中の　甘い　香りの\n成分が　集まって　生まれた。"
          shield: "マホミルが　姿を　みせた\nパティスリーは　大繁盛が\n約束されると　いわれている。"
        en:
          sword: "This Pokémon was born from sweet-smelling\nparticles in the air. Its body is made of cream."
          shield: "They say that any patisserie visited by Milcery\nis guaranteed success and good fortune."
        fr:
          sword: "Son corps de crème s’est composé à partir\nde particules au parfum sucré flottant dans l’air."
          shield: "Les pâtissiers connaissent tous ce vieil adage :\nQuand Crèmy apparaît, le succès est assuré."
        it:
          sword: "Il suo corpo è fatto di panna. È nato dall’unione\ndi particelle di profumo dolce disperse nell’aria."
          shield: "Si dice che le pasticcerie in cui è apparso\nun Milcery avranno un successo assicurato!"
        de:
          sword: "Sein Körper besteht aus Sahne. Es entstand\naus einer Ansammlung süßer Geruchspartikel\nin der Luft."
          shield: "Es heißt, dass den Konditoreien, in denen sich\nHokumil zeigt, großer Wohlstand verheißen sei."
        es:
          sword: "Su cremoso cuerpo surgió a partir de la unión\nde partículas odoríferas de dulces aromas\npresentes en el aire."
          shield: "Se dice que las pastelerías donde ha aparecido\nMilcery tienen casi todas las papeletas para\nsaborear las mieles del éxito."
        ko:
          sword: "크림으로 이루어진 몸을 가졌다.\n공기 중을 떠도는 달콤한 향기의\n성분이 모여서 태어났다."
          shield: "마빌크가 모습을 보인\n디저트 가게는 크게\n번창한다고 전해지고 있다."
        zh_simp:
          sword: "空气中甜甜香气的\n成分集中之后诞生。\n身体由鲜奶油构成。"
          shield: "据说有小仙奶\n现身过的蛋糕店\n保证能生意兴隆。"
        zh_trad:
          sword: "空氣中甜甜香氣的\n成分集中之後誕生。\n身體由鮮奶油構成。"
          shield: "據說有小仙奶\n現身的蛋糕店\n保證能生意興隆。"
