          sword: "あたまの　ツノで　あいての　きもちを\nかんじとる。　オスは　じゅうしゃの\nように　あるじのそばで　せわをやく。"
          shield: "ツノで　ちかくの　いきものの\nきもちを　かんじとる。　ポジティブな\nかんじょうが　ちからの　みなもと。"
        jp_kanji:
          sword: "頭の　ツノで　相手の　気持ちを\n感じとる。　オスは　従者の\nように　主のそばで　世話を焼く。"
          shield: "ツノで　近くの　生き物の\n気持ちを　感じとる。　ポジティブな\n感情が　力の　源。"
        en:
          sword: "It uses the horns on its head to sense the\nemotions of others. Males will act as valets for\nthose they serve, looking after their every need."
          shield: "Through its horns, it can pick up on the emotions\nof creatures around it. Positive emotions are the\nsource of its strength."
        fr:
          sword: "Il peut sentir les émotions d’autrui avec ses cornes.\nLe mâle reste aux côtés de son Dresseur pour\ns’occuper de lui, à l’image d’un domestique."
          shield: "Avec ses cornes, il peut percevoir les émotions\ndes êtres vivants alentour. Celles qui sont\npositives lui servent de source d’énergie."
        it:
          sword: "Le corna sulla testa gli permettono di percepire\nlo stato d’animo degli altri. Il maschio segue il\nsuo Allenatore ovunque e si prende cura di lui."
          shield: "Percepisce lo stato d’animo di chi gli sta intorno\ngrazie alle sue corna. I sentimenti positivi sono\nla sua fonte di energia."
        de:
          sword: "Mit den Hörnern auf seinem Kopf erfasst es die\nGefühle seines Gegenübers. Männchen kümmern\nsich wie Bedienstete um ihren Trainer."
          shield: "Mit seinen Hörnern erfasst es die Gefühle von\nLebewesen, die sich in seiner Nähe aufhalten.\nPositive Gefühle sind die Quelle seiner Kraft."
        es:
          sword: "Percibe las emociones del objetivo con los\ncuernos de la cabeza. Los machos están atentos\na cualquier cosa que necesite su Entrenador."
          shield: "Con sus cuernos percibe las emociones de los\nseres vivos que se hallen cerca. Los sentimientos\npositivos constituyen su fuente de energía."
        ko:
          sword: "머리에 달린 뿔로 상대의 기분을\n감지한다. 수컷은 집사처럼\n주인의 곁에서 시중을 든다."
          shield: "뿔로 가까이 있는 생명체의\n기분을 읽는다. 긍정적인\n감정이 힘의 원천이다."
        zh_simp:
          sword: "会用头上的角读取对方的心情。\n雄性就像管家一样，\n在主人的身边打理一切。"
          shield: "能通过自己的角去\n感受附近生物的情感。\n正面情绪是它的能量之源。"
        zh_trad:
          sword: "會用頭上的角讀取對方的心情。\n雄性就像管家一樣，\n在主人的身邊打理一切。"
          shield: "能透過自己的角去\n感受附近生物的情感。\n正面情緒是牠的能量之源。"
    indeedee_female:
