      types:
        - fighting
      egg_groups:
        - field
        - human_like
      abilities:
        - iron_fist
        - mold_breaker
      hidden_ability: scrappy
      held_items:
        rare: mental_herb
      descriptions:
        jp_kana:
          sword: "おやぶんと　したう　ゴロンダの\nまねを　する　ことで　たたかいかたや\nえものの　つかまえかたを　まなぶ。"
          shield: "なめられないように　いつも　あいてを\nにらみつけているが　きが　ゆるむと\nつい　わらいがおに　なってしまう。"
        jp_kanji:
          sword: "親分と　慕う　ゴロンダの\n真似を　する　ことで　戦い方や\n獲物の　捕まえ方を　学ぶ。"
          shield: "なめられないように　いつも　相手を\n睨みつけているが　気が　緩むと\nつい　笑い顔に　なってしまう。"
        en:
          sword: "It chooses a Pangoro as its master and then\nimitates its master’s actions. This is how it learns\nto battle and hunt for prey."
          shield: "Wanting to make sure it’s taken seriously,\nPancham’s always giving others a glare.\nBut if it’s not focusing, it ends up smiling."
        fr:
          sword: "C’est en copiant son mentor, Pandarbare,\nqu’il apprend toutes les ficelles du métier,\nde l’art du combat à la capture des proies."
          shield: "Il dévisage toujours ses adversaires d’un air\nrenfrogné pour être pris au sérieux, mais dès que\nla tension retombe, son sourire reprend le dessus."
        it:
          sword: "Considera Pangoro il suo capo e lo prende a\nmodello, imitandolo e imparando così a\nlottare e a cacciare le prede."
          shield: "Fa il duro e guarda tutti in cagnesco per\nessere preso sul serio, ma quando è\nrilassato gli sfugge sempre un sorriso."
        de:
          sword: "Es imitiert sein großes Vorbild Pandagro, wo es\nnur kann. So lernt es, wie man kämpft und jagt."
          shield: "Es starrt den Gegner finster an, um nicht\nunterschätzt zu werden, doch wenn es sich\nentspannt, muss es unwillkürlich grinsen."
        es:
          sword: "Sigue los pasos de Pangoro, a quien considera su\nmentor. A base de imitarlo, aprende a combatir y\na cazar presas."
          shield: "Siempre lanza una mirada fulminante al rival para\nque no lo menosprecie, pero en cuanto se relaja\nesboza sin querer una sonrisa."
        ko:
          sword: "형님처럼 따르는 부란다를\n따라 하면서 싸우는 법과\n먹이를 잡는 법을 배운다."
          shield: "얕잡아 보이지 않으려고 언제나\n상대를 노려보고 있지만 방심하면\n금방 웃는 얼굴이 되어버린다."
        zh_simp:
          sword: "会模仿自己敬为头头的\n霸道熊猫，向它学习战斗\n及捕捉猎物的方法。"
          shield: "为了不被小看而一直瞪着对手，\n然而绷紧的神经一旦稍有放松，\n它就会在无意中露出笑脸。"
        zh_trad:
          sword: "會模仿自己敬為頭領的\n流氓熊貓，向牠學習戰鬥\n及捕捉獵物的方法。"
          shield: "為了不被小看而一直瞪著對手，\n然而繃緊的神經一旦稍有放鬆，\n牠就會在無意中露出笑臉。"
pangoro:
  species_id: 675
  names:
    jp_kana: ゴロンダ
    jp_kanji: ゴロンダ
    en: Pangoro
    fr: Pandarbare
    it: Pangoro
    de: Pandagro
    es: Pangoro
    ko: 부란다
    zh_simp: 霸道熊猫
    zh_trad: 流氓熊貓
  forms:
    pangoro:
      form_id: 0
      base_stats:
        hp: 95
        attack: 124
        defense: 78
        special_attack: 69
        special_defense: 71
        speed: 58
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fighting
        - dark
      egg_groups:
        - field
        - human_like
      abilities:
        - iron_fist
        - mold_breaker
      hidden_ability: scrappy
      held_items:
        rare: mental_herb
      descriptions:
        jp_kana:
          sword: "きしょうが　あらく　わんりょくで\nだまらせる。　タチフサグマとの\nいっきうちに　とうしを　もやす。"
          shield: "はっぱで　あいての　うごきを　よむ。\nおおがた　ダンプカーを　いちげきで\nスクラップにする　パンチを　もつ。"
        jp_kanji:
          sword: "気性が　荒く　腕力で\n黙らせる。　タチフサグマとの\n一騎打ちに　闘志を　燃やす。"
          shield: "葉っぱで　相手の　動きを　読む。\n大型　ダンプカーを　一撃で\nスクラップにする　パンチを　もつ。"
        en:
          sword: "This Pokémon is quick to anger, and it has no\nproblem using its prodigious strength to get its\nway. It lives for duels against Obstagoon."
          shield: "Using its leaf, Pangoro can predict the moves of\nits opponents. It strikes with punches that can\nturn a dump truck into scrap with just one hit."
        fr:
          sword: "Ce Pokémon agressif a recours à la force\npour faire taire ceux qui le contrarient.\nIl adore combattre les Ixon."
          shield: "Il anticipe les mouvements de son adversaire\ngrâce à sa feuille. Ses coups de poing peuvent\nréduire un camion-benne en un tas de ferraille."
        it:
          sword: "Ha un’indole focosa e sistema ogni diatriba con\nla forza delle braccia. Il suo spirito combattivo\narde quando lotta con Obstagoon."
          shield: "Prevede i movimenti dei nemici dalle vibrazioni\ndella foglia che tiene in bocca. Con un pugno\npuò fare a pezzi un camion ribaltabile."
        de:
          sword: "Dieses aggressive Pokémon bringt Gegner mit\nseiner Muskelkraft zum Verstummen. Es liebt\nKämpfe gegen Barrikadax."
          shield: "Mit seinem Blatt erspürt es die Bewegungen des\nGegners. Seine Schläge sind so stark, dass es\nsogar Kipplaster zu Schrott verarbeiten kann."
        es:
          sword: "Este Pokémon de carácter agresivo lo soluciona\ntodo a golpes. Desata su espíritu combativo al\nenfrentarse a los Obstagoon."
          shield: "La hoja que lleva en la boca le permite predecir\nlos movimientos del rival. Puede reducir un\ncamión a chatarra de un solo puñetazo."
        ko:
          sword: "성질이 사나워서 완력으로 상대를\n조용하게 만든다. 가로막구리와의\n결투에 투지를 불태운다."
          shield: "잎사귀로 상대의 움직임을 읽는다.\n대형 덤프트럭을 일격에 고철로\n만들어버리는 펀치를 가졌다."
        zh_simp:
          sword: "性格暴躁，靠力气解决问题。\n为与堵拦熊一对一比拼\n而燃烧自己的斗志。"
          shield: "通过叶子来洞悉敌人的动向。\n只要使出一记拳击就能\n让大型翻斗车变成废铁。"
        zh_trad:
          sword: "性情暴躁，靠力氣解決問題。\n為與堵攔熊一對一比拼\n而燃燒自己的鬥志。"
          shield: "透過葉子來洞悉敵人的動向。\n只要使出一記拳擊就能\n讓大型砂石車變成廢鐵。"
espurr:
