          shield: "オスのほうが　なきごえが　おおきい。\nひくく　すごみのある　こえで　なく\nニョロトノが　メスに　すかれる。"
        jp_kanji:
          sword: "夜になると　池の　畔に　現れる。\n怒鳴るような　声で　鳴いて\n縄張りを　アピールするぞ。"
          shield: "オスのほうが　鳴き声が　大きい。\n低く　凄みのある　声で　鳴く\nニョロトノが　メスに　好かれる。"
        en:
          sword: "At nightfall, these Pokémon appear on the shores\nof lakes. They announce their territorial claims by\nletting out cries that sound like shouting."
          shield: "The cry of a male is louder than that of a female.\nMale Politoed with deep, menacing voices find\nmore popularity with the opposite gender."
        fr:
          sword: "Il apparaît sur les rives des étangs à la nuit\ntombée. Il marque son territoire en poussant\ndes hurlements."
          shield: "Le cri des mâles est plus puissant que celui\ndes femelles, qui préfèrent les voix fortes\net intimidantes."
        it:
          sword: "Appare di notte sulle sponde degli stagni.\nSegnala il proprio territorio gracidando\na squarciagola."
          shield: "Il gracidio del maschio è più forte.\nI Politoed con un verso basso e minaccioso\nsono molto apprezzati dalle femmine."
        de:
          sword: "Nachts erscheint Quaxo an Ufern von Teichen.\nMit seinem schallenden Ruf beansprucht es sein\nRevier."
          shield: "Die Rufe der Männchen sind besonders laut.\nQuaxo mit einer tiefen, bedrohlichen Stimme\nsind bei den Weibchen sehr beliebt."
        es:
          sword: "Aparece a orillas de las charcas al caer la noche.\nReclama su territorio profiriendo un fuerte grito\nque recuerda a un bramido."
          shield: "Los machos emiten gritos muy potentes. Las\nhembras sienten predilección por los de voz\ngrave e imponente."
        ko:
          sword: "밤이 되면 연못 근처에\n나타난다. 고함치는 듯한\n울음소리로 영역을 알린다."
          shield: "수컷의 울음소리가 더 크다.\n나지막하고 위협적인 목소리로 우는\n왕구리가 암컷에게 인기다."
        zh_simp:
          sword: "夜幕降临时便会出现在池塘边。\n会发出怒吼般的叫声\n来强调那是自己的地盘。"
          shield: "雄性的叫声更响亮。\n叫声低沉可怕的蚊香蛙皇\n更能受到雌性的欢迎。"
        zh_trad:
          sword: "天黑後就會出現在池子邊。\n會用怒吼般的聲音大叫，\n來強調那是自己的地盤喔。"
          shield: "雄性的叫聲比雌性更巨大。\n叫聲低沉有魄力的蚊香蛙皇\n更能受到雌性喜愛。"
