          shield: "ようじん　ぶかく　ずるがしこい。\nエサを　ぬすむと　しっぽで\nあしあとを　けしながら　にげるのだ。"
        jp_kanji:
          sword: "ほかの　ポケモンが　みつけた　餌を\n掠めて　暮らしている。　ふかふかの\n肉球は　足音を　たてない。"
          shield: "用心深く　ずる賢い。\nエサを　盗むと　しっぽで\n足跡を　消しながら　逃げるのだ。"
        en:
          sword: "Aided by the soft pads on its feet, it silently raids\nthe food stores of other Pokémon. It survives off\nits ill-gotten gains."
          shield: "Cunning and cautious, this Pokémon survives by\nstealing food from others. It erases its tracks with\nswipes of its tail as it makes off with its plunder."
        fr:
          sword: "Il vit en subtilisant la nourriture des autres\nPokémon. Grâce à ses coussinets moelleux,\nil ne fait aucun bruit quand il marche."
          shield: "Rusé et vigilant, il prend la poudre d’escampette\naprès avoir volé de la nourriture en prenant soin\nd’effacer ses traces de pas avec sa queue."
        it:
          sword: "Vive rubando il cibo trovato dagli altri Pokémon.\nI morbidi cuscinetti plantari rendono i suoi passi\nsilenziosi."
          shield: "È scaltro e molto prudente. Quando ruba\nil cibo, scappa cancellando le sue orme\ncon la coda."
        de:
          sword: "Es stibitzt Futter, das andere Pokémon gefunden\nhaben. Dank der samtweichen Ballen an seinen\nPfoten ist sein Gang lautlos."
          shield: "Es ist sehr vorsichtig und gerissen. Nachdem es\nFutter stibitzt hat, macht es sich davon und\nverwischt dabei seine Spuren mit seinem Schweif."
        es:
          sword: "Se sustenta con el alimento que roba a otros\nPokémon. Las almohadillas de sus patas son tan\nblandas que no hace ningún ruido al caminar."
          shield: "Prudente y astuto, borra con la cola las huellas\nque deja al huir tras robarle el alimento a otro\nPokémon."
        ko:
          sword: "다른 포켓몬이 발견한 먹이를\n훔치며 산다. 푹신푹신한\n볼록살 덕분에 발소리가 나지 않는다."
          shield: "조심성이 많고 교활하다.\n먹이를 훔치고는 꼬리로\n발자국을 지우며 도망간다."
        zh_simp:
          sword: "靠抢夺其他宝可梦找到的食物\n为生。脚上长着软乎乎的肉球，\n走路时不会发出丝毫声响。"
          shield: "性格谨慎且狡猾。\n在偷盗食物逃走的时候\n会用尾巴擦掉自己的足迹。"
        zh_trad:
          sword: "靠搶奪其他寶可夢找到的食物\n為生。腳上長著軟乎乎的肉球，\n走路時不會發出絲毫聲響。"
          shield: "性情謹慎且狡猾。\n在偷盜食物逃走的時候\n會用尾巴擦掉自己的足跡。"
thievul:
  species_id: 828
  names:
    jp_kana: フォクスライ
    jp_kanji: フォクスライ
    en: Thievul
    fr: Roublenard
    it: Thievul
    de: Gaunux
    es: Thievul
    ko: 폭슬라이
    zh_simp: 猾大狐
    zh_trad: 狐大盜
  forms:
    thievul:
      form_id: 0
      base_stats:
        hp: 70
