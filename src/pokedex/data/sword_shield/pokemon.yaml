        - soundproof
      hidden_ability: scrappy
      descriptions:
        jp_kana:
          sword: "むかしの　ひとは　とおく　はなれた\nまち　どうしの　れんらく　ほうほうに\nバクオングの　おおごえを　つかった。"
          shield: "おおごえ　だけじゃない。　からだの\nあなから　いろいろな　ねいろを　だし\nなかまと　いしそつうを　するのだ。"
        jp_kanji:
          sword: "昔の　人は　遠く　離れた\n街同士の　連絡方法に\nバクオングの　大声を　使った。"
          shield: "大声だけじゃない。　体の　穴から\nいろいろな　音色を　出し\n仲間と　意思疎通を　するのだ。"
        en:
          sword: "In the past, people would use the loud voices of\nthese Pokémon as a means of communication\nbetween distant cities."
          shield: "This Pokémon can do more than just shout. To\ncommunicate with others of its kind, it’ll emit all\nsorts of sounds from the holes in its body."
        fr:
          sword: "Autrefois, l’Homme se servait du cri puissant\nde ce Pokémon pour communiquer d’une ville\nà l’autre sur de longues distances."
          shield: "Pour communiquer avec ses semblables,\nil n’utilise pas que son cri puissant ; il émet\naussi des sons par les trous de son corps."
        it:
          sword: "Un tempo la potente voce di questo Pokémon\nveniva utilizzata come mezzo di comunicazione\ntra città distanti."
          shield: "Oltre a emettere potenti urla, grazie alle\naperture del suo corpo produce suoni di tonalità\ndiverse, che usa per comunicare con i suoi simili."
        de:
          sword: "Einst nutzten die Menschen das Gebrüll von\nKrawumms zur Kommunikation zwischen weit\nvoneinander entfernten Dörfern."
          shield: "Es nutzt nicht nur seine laute Stimme, sondern\nstößt auch über seine Körperöffnungen allerlei\nTöne aus, um mit Artgenossen zu kommunizieren."
        es:
          sword: "En la antigüedad, los bramidos de Exploud se\nutilizaban como medio de comunicación entre\npueblos alejados."
          shield: "Además de sus bramidos, es capaz de emitir\ndistintos tonos por los tubos de su cuerpo, que\nle permiten comunicarse con sus semejantes."
        ko:
          sword: "옛날 사람은 멀리 떨어진\n마을끼리 연락하는 방법으로\n폭음룡의 큰 목소리를 사용했다."
          shield: "큰 목소리만 가진 것이 아니다.\n몸의 구멍에서 다양한 소리를 내어\n동료와 의사소통을 한다."
        zh_simp:
          sword: "以前的人们曽利用\n爆音怪发出的巨响，\n与相隔遥远的城镇居民联系。"
          shield: "它不仅仅会大喊大叫。为了和\n伙伴相互传情达意，它会从\n身体的洞里发出各种各样的音色。"
        zh_trad:
          sword: "以前的人曾利用爆音怪的\n大吼聲，作為與遙遠城鎮\n彼此聯絡的方法。"
          shield: "不只會大吼，還會從\n身上的洞發出各種音色\n與夥伴們彼此溝通。"
