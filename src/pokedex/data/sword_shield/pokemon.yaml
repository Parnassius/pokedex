      descriptions:
        jp_kana:
          sword: "きれいな　はもんが　ひろがる\nみずの　したでは　オタマロが\nかんだかい　こえで　ないている。"
          shield: "おんぱで　なかまと　れんらくする。\nけいかいの　なきごえは　ひとや\nほかの　ポケモンには　きこえない。"
        jp_kanji:
          sword: "きれいな　波紋が　広がる\n水の　下では　オタマロが\n甲高い　声で　鳴いている。"
          shield: "音波で　仲間と　連絡する。\n警戒の　鳴き声は　人や\nほかの　ポケモンには　聞こえない。"
        en:
          sword: "Graceful ripples running across the water’s\nsurface are a sure sign that Tympole are singing\nin high-pitched voices below."
          shield: "It uses sound waves to communicate with\nothers of its kind. People and other Pokémon\nspecies can’t hear its cries of warning."
        fr:
          sword: "Lorsqu’un Tritonde pousse des cris aigus\nsous l’eau, des ondes ravissantes se propagent\nà la surface."
          shield: "Il communique avec ses compagnons en émettant\ndes ondes. Son cri d’alerte est inaudible\npour les humains et les autres Pokémon."
        it:
          sword: "Tympole canta sott’acqua con la sua voce acuta\nformando delicate increspature sulla superficie."
          shield: "Comunica con i suoi simili tramite onde sonore.\nIl suo grido d’allerta è impercettibile agli esseri\numani e agli altri Pokémon."
        de:
          sword: "Man sagt, wenn auf Wasseroberflächen schöne\nKräuselwellen zu sehen sind, liege das an\nSchallquap, die unter Wasser schrill rufen."
          shield: "Es kommuniziert mit seinen Artgenossen über\nSchallwellen. Seine Warnrufe sind für Menschen\nund andere Pokémon nicht hörbar."
        es:
          sword: "El agudo canto de los Tympole bajo el agua\ncrea hermosas ondas que se extienden por la\nsuperficie."
          shield: "Se comunica con los suyos mediante ondas\nsonoras. Su grito de alerta es imperceptible para\nlos humanos y el resto de los Pokémon."
        ko:
          sword: "아름다운 파문이 펼쳐지는\n물 아래에는 동챙이가\n날카로운 소리로 울고 있다."
          shield: "음파로 동료와 연락한다.\n경계하는 울음소리는 사람이나\n다른 포켓몬에게 들리지 않는다."
        zh_simp:
          sword: "如果水面上扩散开美丽的\n波纹，就代表有圆蝌蚪正在\n水下面用高昂的声音鸣叫。"
          shield: "通过音波来联系伙伴。\n人类和其他宝可梦都\n听不见它发出的警告声。"
        zh_trad:
          sword: "如果水面上擴散開美麗的\n波紋，就代表有圓蝌蚪正在\n水面下用高昂的聲音鳴叫。"
          shield: "透過音波來聯繫夥伴。\n人類和其他寶可夢都\n聽不見牠發出的警告聲。"
palpitoad:
  species_id: 536
  names:
    jp_kana: ガマガル
    jp_kanji: ガマガル
    en: Palpitoad
    fr: Batracné
    it: Palpitoad
    de: Mebrana
    es: Palpitoad
    ko: 두까비
    zh_simp: 蓝蟾蜍
    zh_trad: 藍蟾蜍
  forms:
    palpitoad:
      form_id: 0
      base_stats:
        hp: 75
        attack: 65
        defense: 55
        special_attack: 65
        special_defense: 55
        speed: 69
      evs_yield:
        hp: 2
        attack: 0
