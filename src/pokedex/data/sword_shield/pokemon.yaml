      descriptions:
        jp_kana:
          sword: "れきせんを　いきぬいた　ものが\nこのすがたに　しんかする。　ネギが\nかれるとき　せんじょうを　さる。"
          shield: "かたいネギの　はで　こうげきを\nいなし　するどい　クキで　はんげき。\nネギは　ぶぐで　あり　しょくざい。"
        jp_kanji:
          sword: "歴戦を　生き抜いた　ものが\nこの姿に　進化する。　ネギが\n枯れるとき　戦場を　去る。"
          shield: "硬いネギの　葉で　攻撃を\nいなし　鋭い　茎で　反撃。\nネギは　武具であり　食材。"
        en:
          sword: "Only Farfetch’d that have survived many battles\ncan attain this evolution. When this Pokémon’s\nleek withers, it will retire from combat."
          shield: "After deflecting attacks with its hard leaf shield,\nit strikes back with its sharp leek stalk. The leek\nstalk is both weapon and food."
        fr:
          sword: "Seuls les Canarticho ayant survécu à de nombreux\ncombats atteignent ce stade d’évolution. Si son\npoireau se flétrit, il se retire du champ de bataille."
          shield: "Il pare les attaques avec le tranchant de son\nsolide poireau, et contre-attaque avec la pointe\nde la tige. Son arme est également comestible."
        it:
          sword: "Gli esemplari con tante lotte alle spalle si\nevolvono assumendo questa forma. Se il suo\ngambo si secca, abbandona il campo di lotta."
          shield: "Devia gli attacchi usando la dura foglia del porro\ne contrattacca con il gambo affilato. Usa il porro\nsia come arma che come cibo."
        de:
          sword: "Porenta, die viele Schlachten überstanden haben,\nentwickeln sich zu Lauchzelot. Verwelkt seine\nLauchstange, zieht es sich vom Kämpfen zurück."
          shield: "Der Lauch dient ihm als Waffe und zur Abwehr,\naber viele essen ihn auch. Mit den harten Blättern\npariert es und mit der scharfen Stange kontert es."
        es:
          sword: "Los ejemplares que superan numerosos combates\nevolucionan y adoptan esta forma. Abandonan el\nterreno de combate en cuanto el puerro se seca."
          shield: "Repele ataques con las hojas de su duro puerro y\ncontraataca con su tallo afilado. El puerro que le\nsirve de armamento sigue siendo comestible."
        ko:
          sword: "많은 싸움에서 살아남은 자만이\n이 모습으로 진화한다.\n파가 시들면 전장을 떠난다."
          shield: "단단한 파잎으로 공격을 받아넘기고\n날카로운 줄기로 반격한다.\n파는 무기인 동시에 식재료다."
        zh_simp:
          sword: "只有经历过无数战斗的\n大葱鸭才能进化成这个样子。\n当大葱枯萎了就会离开战场。"
          shield: "会用坚硬的葱叶抵挡攻击，\n接着用锋利的茎反击。\n它的葱既是武器也是食材。"
        zh_trad:
          sword: "只有歷經過無數戰鬥的\n大蔥鴨才能進化成這個樣子。\n當大蔥枯萎了就會離開戰場。"
          shield: "會用堅硬的蔥葉抵擋攻擊，\n接著用鋒利的莖反擊。\n牠的蔥既是武器也是食材。"
