        jp_kana:
          sword: "からだの　ほとんどが　かいすいと\nおなじ　せいぶんで　できている。\nちんぼつせんを　ねじろにする。"
          shield: "まんげつに　なると　むれを　ひきつれ\nかいめんに　すがたを　みせる。\nえものが　くるのを　まっているのだ。"
        jp_kanji:
          sword: "体の　ほとんどが　海水と\n同じ　成分で　できている。\n沈没船を　根城にする。"
          shield: "満月に　なると　群れを　引き連れ\n海面に　姿を　見せる。\n獲物が　来るのを　待っているのだ。"
        en:
          sword: "Most of this Pokémon’s body composition is\nidentical to sea water. It makes sunken ships\nits lair."
          shield: "Whenever a full moon hangs in the night sky,\nschools of Jellicent gather near the surface of\nthe sea, waiting for their prey to appear."
        fr:
          sword: "Son corps est composé presque entièrement\nd’une substance identique à l’eau de mer.\nLes épaves de navires sont ses bastions."
          shield: "Les nuits de pleine lune, ils se réunissent\nà la surface de la mer pour attendre leurs proies."
        it:
          sword: "Il suo corpo è costituito per la maggior parte\ndagli stessi elementi che compongono l’acqua\nmarina. Si serve dei relitti delle navi come tana."
          shield: "Nelle notti di luna piena emergono in massa,\nrendendosi visibili sulla superficie del mare,\nin attesa di prede."
        de:
          sword: "Sein Körper besteht zum größten Teil aus den\ngleichen Elementen wie Meerwasser. Es nutzt\nversunkene Schiffe als Basis."
          shield: "Bei Vollmond treiben Apoquallyp in Schwärmen\nan die Meeresoberfläche und lauern dort ihrer\nBeute auf."
        es:
          sword: "Su cuerpo está compuesto en su mayor parte\nde agua salada. Crea su guarida con navíos\nhundidos."
          shield: "Las noches de luna llena, bancos enteros de\nJellicent emergen a la superficie y aguardan la\nllegada de alguna presa incauta."
        ko:
          sword: "몸의 대부분이 바닷물과\n같은 성분으로 이루어져 있다.\n침몰선을 거처로 삼는다."
          shield: "보름달이 뜨면 무리를 거느리고\n해수면에 모습을 드러낸다.\n먹이가 오기를 기다리는 것이다."
        zh_simp:
          sword: "身体的绝大部分都由\n与海水相同的成分组成。\n会把沉船当成自己的城堡。"
          shield: "每到满月时，胖嘟嘟会\n成群结队地来到海面上。\n这么做是为了等待猎物上门。"
        zh_trad:
          sword: "身體的絕大部分都由\n與海水相同的成分組成。\n會把沉船當成自己的城堡。"
          shield: "每到滿月時，胖嘟嘟會\n成群結隊地來到海面上。\n這麼做是為了等待獵物上門。"
