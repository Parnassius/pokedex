      types:
        - dark
        - fairy
      egg_groups:
        - fairy
        - human_like
      abilities:
        - prankster
        - frisk
      hidden_ability: pickpocket
      descriptions:
        jp_kana:
          sword: "どげざして　あやまる　ふりをして\nやりのように　とがった　うしろがみで\nつきさしてくる　せんぽうを　つかう。"
          shield: "わるぢえを　つかって　よるの　もりに\nさそいこもうとする。　のうさくもつを\nそだてる　ちからを　もつらしい。"
        jp_kanji:
          sword: "土下座して　謝る　振りをして\n槍のように　尖った　後ろ髪で\n突き刺してくる　戦法を　使う。"
          shield: "悪知恵を　使って　夜の　森に\n誘い込もうとする。　農作物を\n育てる　力を　もつらしい。"
        en:
          sword: "When it gets down on all fours as if to beg for\nforgiveness, it’s trying to lure opponents in so\nthat it can stab them with its spear-like hair."
          shield: "With sly cunning, it tries to lure people into the\nwoods. Some believe it to have the power to\nmake crops grow."
        fr:
          sword: "Sa technique de combat consiste à faire semblant\nde se prosterner devant son adversaire\npour le transpercer avec ses cheveux aiguisés."
          shield: "La nuit, il ruse pour attirer ses proies dans la forêt.\nOn raconte qu’il a le pouvoir de faire pousser\nles cultures agricoles."
        it:
          sword: "Nella lotta si prostra fingendo di chiedere pietà e\ninfilza il nemico con il ciuffo di capelli appuntito\ncome una lancia che gli parte dalla nuca."
          shield: "Attira le prede nel bosco di notte con l’astuzia.\nSembra che abbia il potere di far crescere ogni\ntipo di prodotto agricolo."
        de:
          sword: "Es nutzt eine Taktik, bei der es sich niederwirft\nund vorgibt, sich zu entschuldigen, nur um dann\nmit seinem speerartigen Haar zuzustoßen."
          shield: "Es hat einen Hang zur Verschlagenheit und\nversucht, nachts seine Beute in den Wald zu\nlocken. Angeblich kann es Äcker gedeihen lassen."
        es:
          sword: "Su estrategia consiste en postrarse ante el rival y\nfingir una disculpa para ensartarlo con el mechón\nque tiene en la espalda, afilado cual lanza."
          shield: "De noche, atrae con astucia a su objetivo hasta\nel bosque. Al parecer, tiene la capacidad de\nhacer crecer productos agrícolas."
        ko:
          sword: "납작 엎드려서 사과하는 척하다가\n창처럼 뾰족한 뒷머리로\n찌르는 전법을 구사한다."
          shield: "못된 꾀를 내어 밤에 숲으로\n꾀어내려 한다. 농작물을\n키우는 힘을 갖고 있는 듯하다."
        zh_simp:
          sword: "会先装成要下跪道歉的样子，\n然后用后脑勺尖如长矛的\n头发刺向对手。"
          shield: "喜欢动歪脑筋，把人们\n引诱到深夜的森林中。\n似乎拥有培育农作物的能力。"
        zh_trad:
          sword: "會先裝成要下跪道歉的樣子，\n然後用後腦勺尖如長矛的\n頭髮刺向對手。"
          shield: "喜歡動歪腦筋，把人們\n引誘到深夜的森林中。\n似乎擁有培育農作物的能力。"
