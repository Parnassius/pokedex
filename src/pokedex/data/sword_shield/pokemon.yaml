        jp_kana:
          sword: "ときを　こえる　ちからを　もつ。\nもりの　かみさまとして　さまざまな\nじだいに　きろくが　のこされている。"
          shield: "みらいから　ときを　わたって\nやってきた。　きずを　いやし\nくさきに　ちからを　わけあたえる。"
        jp_kanji:
          sword: "時を　超える　力を　もつ。\n森の　神様として　さまざまな\n時代に　記録が　残されている。"
          shield: "未来から　時を　渡って\nやって来た。　キズを　癒し\n草木に　力を　分け与える。"
        en:
          sword: "This Pokémon has the ability to move through\ntime. Records describing it as a forest deity can\nbe found from many different eras."
          shield: "This Pokémon traveled through time to come\nfrom the future. It bolsters grass and trees with\nits own strength, and it can heal wounds, too."
        fr:
          sword: "Il possède le pouvoir de voyager dans le temps.\nIl a été considéré comme une divinité sylvestre\nà différentes époques."
          shield: "Ce Pokémon venu du futur soigne les blessures\net donne de la force aux plantes."
        it:
          sword: "Ha il potere di viaggiare nel tempo. Documenti\ndi epoche diverse lo descrivono come divinità\ndelle foreste."
          shield: "È giunto dal futuro, viaggiando nel tempo.\nCura le ferite e dona vigore alla vegetazione."
        de:
          sword: "Es kann durch die Zeit reisen und findet in\nAufzeichnungen aus verschiedenen Zeitaltern\nals „Hüter des Waldes“ Erwähnung."
          shield: "Dieses Pokémon kommt aus der Zukunft und ist\ndurch die Zeit gereist. Es heilt Wunden und\nspendet Pflanzen Kraft."
        es:
          sword: "Es capaz de viajar en el tiempo. Su condición de\nguardián del bosque ha quedado constatada en\ndocumentos conservados de diversas épocas."
          shield: "Vino del futuro haciendo un viaje en el tiempo.\nAdemás de curar las heridas, posee la capacidad\nde revitalizar la hierba y los árboles."
        ko:
          sword: "시간을 이동하는 힘을 가졌다.\n숲의 신으로서 여러 시대에\n기록이 남겨져 있다."
          shield: "미래에서 시간을 건너\n찾아왔다. 상처를 치료하고\n초목에 힘을 나누어준다."
        zh_simp:
          sword: "拥有能够穿越时光的力量。\n在许多时代都留下了\n将它视为森林之神的记录。"
          shield: "从未来穿越时光而来。\n能够治愈伤痛，\n也会把自己的力量分给草木。"
        zh_trad:
          sword: "擁有能夠穿越時光的力量。\n在許多時代都留下了\n將牠視為森林之神的紀錄。"
          shield: "從未來穿越時光而來。\n能夠治癒傷痛，\n也會把自己的力量分給草木。"
