      egg_groups:
        - water_1
        - dragon
      abilities:
        - swift_swim
        - oblivious
      hidden_ability: adaptability
      descriptions:
        jp_kana:
          sword: "みためが　わるいので　にんきはないが\nきょういの　せいめいりょくが　あり\nけんきゅうたいしょうには　なっている。"
          shield: "みすぼらしく　みにくい　ポケモンだが\nしぶとい　せいめいりょくを　もち\nわずかな　みずだけでも　いきのびる。"
        jp_kanji:
          sword: "見た目が　悪いので　人気はないが\n脅威の　生命力が　あり\n研究対象には　なっている。"
          shield: "みすぼらしく　醜い　ポケモンだが\nしぶとい　生命力を　もち\nわずかな　水だけでも　生き延びる。"
        en:
          sword: "Although unattractive and unpopular, this\nPokémon’s marvelous vitality has made it a\nsubject of research."
          shield: "It is a shabby and ugly Pokémon. However, it is\nvery hardy and can survive on little water."
        fr:
          sword: "Comme il est tout de même franchement laid,\nce Pokémon a un succès très mitigé. Sa grande\nvitalité fait néanmoins l’objet de moult études."
          shield: "Ce Pokémon a peut-être un physique disgracieux,\nmais il est robuste et peut survivre dans très peu\nd’eau."
        it:
          sword: "È un Pokémon poco popolare per via del suo\nmisero aspetto. Tuttavia, la sua prodigiosa\nvitalità ha attirato l’interesse dei ricercatori."
          shield: "È un Pokémon dall’aspetto brutto e misero.\nTuttavia, è molto resistente e può sopravvivere\nanche in pochissima acqua."
        de:
          sword: "Sein unvorteilhaftes Aussehen macht es zwar\nunbeliebt, doch seine erstaunliche Lebenskraft\nhat das Interesse der Forscher an ihm geweckt."
          shield: "Ein schäbiges, ja sogar hässliches Pokémon.\nDafür ist es abgehärtet und überlebt auch mit\nwenig Wasser."
        es:
          sword: "Su aspecto poco agraciado hace que no sea muy\npopular, pero su gran vitalidad resulta de gran\ninterés para la ciencia."
          shield: "Su apariencia deja bastante que desear, pero es\nmuy resistente y puede sobrevivir con poca agua."
        ko:
          sword: "겉모습이 좋지 않아 인기는 없지만\n경이로운 생명력을 지니고 있어\n연구 대상이 되고 있다."
          shield: "볼품없고 못생긴 포켓몬이지만\n강인한 생명력을 가져\n약간의 물만 있어도 살아남는다."
        zh_simp:
          sword: "外表丑陋，所以不受欢迎。\n拥有惊人的生命力，\n因而成为了研究对象。"
          shield: "虽然外表丑陋，\n但拥有顽强的生命力，\n只要少量的水就能存活。"
        zh_trad:
          sword: "外表醜陋，所以不受歡迎。\n擁有驚人的生命力，\n因而成為了研究對象。"
          shield: "雖然看起來弱小又醜陋，\n但擁有頑強的生命力，\n只要少量的水就能存活。"
milotic:
