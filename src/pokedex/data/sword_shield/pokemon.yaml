        en:
          sword: "The ice covering this Pokémon’s face has\nshattered, revealing a slightly worried expression\nthat many people are enamored with."
          shield: "The hair on its head connects to the surface of its\nbrain. When this Pokémon has something on its\nmind, its hair chills the air around it."
        fr:
          sword: "C’est son apparence lorsque la glace sur sa tête\na fondu. Nombreux sont les gens qui sont captivés\npar son air tourmenté."
          shield: "Le cheveu sur sa tête est directement\nrelié à son cerveau. Quand il réfléchit,\nil répand de l’air glacial."
        it:
          sword: "Assume questa forma quando il ghiaccio che\nricopre il suo volto va in frantumi. Molti vanno\nmatti per la sua buffa espressione corrucciata."
          shield: "Il pelo che ha sul capo è collegato direttamente\nal suo cervello. Quando si mette a pensare\ngenera una corrente di aria fredda."
        de:
          sword: "Nun, da der Eisblock um seinen Kopf zerbrochen\nist, kommt sein verdrossener Gesichtsausdruck\nzum Vorschein, der viele Menschen bezaubert."
          shield: "Das Haar auf seinem Kopf ist mit der Oberfläche\nseines Gehirns verbunden. Immer wenn es über\netwas nachgrübelt, erzeugt es eine Kältewelle."
        es:
          sword: "El hielo de la cabeza se ha deshecho y ha\nrevelado un rostro apenado que cautiva a\nnumerosas personas."
          shield: "El pelo de la cabeza está directamente\nconectado con su cerebro. Cuando piensa,\ngenera corrientes de aire frío."
        ko:
          sword: "얼굴의 얼음이 부서져 버린 모습.\n안절부절못하는 표정에\n매료된 사람도 많다."
          shield: "머리털은 뇌의 표면과\n이어져 있다. 생각을\n하면 냉기가 발생한다."
        zh_simp:
          sword: "脸上的冰块碎掉的样子。\n它那一脸惆怅的表情\n让许多人为之着迷。"
          shield: "头上的毛连接着大脑的\n表层，一旦开始动脑思考\n就会产生冷气。"
        zh_trad:
          sword: "臉上的冰塊碎掉的樣子。\n牠那一臉惆悵的表情\n讓許多人為之著迷。"
          shield: "頭上的毛連接著大腦的\n表層，一旦開始動腦思考\n就會產生冷氣。"
