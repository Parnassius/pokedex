          shield: "まいにち　けんめいに　れんしゅうして\nようやく　おおきくて　こうせいのうな\nバルーンを　つくれるようになるのだ。"
        jp_kanji:
          sword: "弾力があり　破裂した　ときの\n衝撃で　相手を　痛めつける\n特別な　バルーンを　作る。"
          shield: "毎日　懸命に　練習して\nようやく　大きくて　高性能な\nバルーンを　つくれるようになるのだ。"
        en:
          sword: "It creates special bouncy balloons to send at its\nopponents. When the balloons pop, the sheer\nforce of their bursting is what deals damage."
          shield: "If Popplio want to create big, powerful balloons,\nthey must be persistent. It takes daily practice for\nthese Pokémon to develop their skills."
        fr:
          sword: "Il fabrique des ballons élastiques pour se battre.\nIls blessent l’ennemi en explosant à son contact."
          shield: "Il s’entraîne sans relâche tous les jours pour\nréussir à créer de gros ballons de bonne qualité."
        it:
          sword: "Produce dei palloncini speciali dalla superficie\nelastica, che esplodendo feriscono l’avversario."
          shield: "Si allena con impegno tutti i giorni fino a quando\nnon è in grado di produrre palloncini d’acqua\nabbastanza grandi e utili ai suoi scopi."
        de:
          sword: "Es kann besondere, elastische Blasen erschaffen,\ndie seine Gegner verletzen, wenn sie platzen."
          shield: "Es trainiert jeden Tag fleißig, um irgendwann\neine Blase zu erschaffen, welche die perfekte\nForm und Größe vorweist."
        es:
          sword: "Crea unos globos especiales muy elásticos que\nhieren al rival al estallar."
          shield: "Entrena con ahínco a diario hasta que por fin es\ncapaz de crear globos de un tamaño y eficacia\nadecuados."
        ko:
          sword: "탄력이 있어 터졌을 때의\n충격으로 상대에게 타격을 주는\n특별한 벌룬을 만든다."
          shield: "매일 열심히 연습하면\n결국에는 커다랗고 성능 좋은\n벌룬을 만들 수 있게 된다."
        zh_simp:
          sword: "能吹出特别的气球。\n靠富有弹力的气球破裂时\n产生的冲击力来痛击对手。"
          shield: "每天拼命地练习，\n才终于能够制造出\n又大又好用的气球。"
        zh_trad:
          sword: "能吹出特別的氣球。\n靠富有彈力的氣球破裂時\n產生的衝擊力來痛擊對手。"
          shield: "每天拼命地練習，\n才終於能夠製造出\n又大又好用的氣球。"
