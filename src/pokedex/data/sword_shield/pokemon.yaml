        jp_kana:
          sword: "とりあえず　まず　かみついてみる\nしゅうせい。　おいしかった　ものは\nにおいを　ちゃんと　おぼえるという。"
          shield: "めが　みえないので　てあたりしだい\nかみついて　じぶんの　まわりの\nじょうきょうを　はあく　している。"
        jp_kanji:
          sword: "とりあえず　まず　噛みついてみる\n習性。　美味しかった　ものは\nにおいを　ちゃんと　憶えるという。"
          shield: "目が　見えないので　手あたりしだい\n噛みついて　自分の　まわりの\n状況を　把握　している。"
        en:
          sword: "When it encounters something, its first urge is\nusually to bite it. If it likes what it tastes, it will\ncommit the associated scent to memory."
          shield: "Because it can’t see, this Pokémon is constantly\nbiting at everything it touches, trying to keep\ntrack of its surroundings."
        fr:
          sword: "Il mord d’abord et réfléchit ensuite.\nOn dit qu’il n’oublie jamais l’odeur\nde la nourriture qu’il aime."
          shield: "Comme il ne voit rien, il se repère en mâchouillant\ntout ce qui se trouve autour de lui."
        it:
          sword: "Ha l’abitudine di mordere tutto quello che\ntrova. Si dice che ricordi con precisione\nil profumo di ciò che ha trovato delizioso."
          shield: "È cieco e si orienta mordicchiando\ntutto ciò che ha intorno."
        de:
          sword: "Es hat die Angewohnheit, in alles zu beißen,\nwas es findet. Stellt sich etwas als lecker heraus,\nprägt es sich den Geruch davon gut ein."
          shield: "Da es nichts sehen kann, beißt es zur\nOrientierung in alles hinein, was sich in seiner\nUmgebung befindet."
        es:
          sword: "Muestra cierta tendencia a morder todo lo que\nencuentra. Se cree que recuerda perfectamente\nel olor de lo que encuentra delicioso."
          shield: "Al no poder ver, su forma de orientarse y percibir\nel entorno consiste en chocarse a diestro y\nsiniestro, mordiendo todo lo que se encuentra."
        ko:
          sword: "무엇이든 일단 물고 보는\n습성을 가졌다. 맛있었던 것은\n냄새를 확실히 기억한다고 한다."
          shield: "눈이 보이지 않아 닥치는 대로\n물면서 본인 주위의\n상황을 파악한다."
        zh_simp:
          sword: "不管遇到什么都习惯先咬再说。\n据说如果咬起来味道不错，\n它就会牢牢记住那种气味。"
          shield: "因为眼睛看不见，\n所以会又撞又咬，\n来判断四周的状况。"
        zh_trad:
          sword: "不管遇到什麼都習慣先咬再說。\n據說如果咬起來味道不錯，\n牠就會牢牢記住那種氣味。"
          shield: "因為眼睛看不見，\n所以會又撞又咬，\n來判斷四周的狀況。"
