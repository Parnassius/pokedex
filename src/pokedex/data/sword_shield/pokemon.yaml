          shield: "せなかの　トゲの　すきまに　こどもを\nのせて　あやす。　そのときに　どくが\nでることは　けっして　ないのだ。"
        jp_kanji:
          sword: "攻めるよりも　守るほうが　得意。\n鎧のような　ウロコで　いかなる\n攻撃からも　子どもを　守る。"
          shield: "背中の　棘の　隙間に　子どもを\n乗せて　あやす。　そのときに　毒が\n出ることは　けっして　ないのだ。"
        en:
          sword: "Nidoqueen is better at defense than offense.\nWith scales like armor, this Pokémon will shield\nits children from any kind of attack."
          shield: "It pacifies offspring by placing them in the gaps\nbetween the spines on its back. The spines will\nnever secrete poison while young are present."
        fr:
          sword: "Il est plus doué pour se défendre que pour\nattaquer. Grâce à son blindage d’écailles,\nil protège ses petits de toute agression."
          shield: "Ce Pokémon calme les petits de son espèce\nen les plaçant entre ses épines dorsales.\nDans ce cas, elles ne libèrent pas de poison."
        it:
          sword: "Più abile nella difesa che nell’attacco,\nprotegge i cuccioli da qualunque attacco\ngrazie alla corazza di squame."
          shield: "Coccola i cuccioli mettendoseli sulla schiena\nnegli spazi fra gli aculei, che in quei momenti\nsmettono di secernere veleno."
        de:
          sword: "Sie sind eher defensiv als offensiv veranlagt.\nMit ihren panzerartigen Schuppen schützen sie\nihre Jungen vor jeglichen Angriffen."
          shield: "Es beruhigt seine Jungen, indem es diese\nzwischen den Stacheln auf seinem Rücken reiten\nlässt. Die Stacheln sondern derweil kein Gift ab."
        es:
          sword: "Su defensa destaca sobre la capacidad ofensiva.\nUsa las escamas del cuerpo como una coraza\npara proteger a su prole de cualquier ataque."
          shield: "Para mecer a sus crías, las coloca en los huecos\nque tiene entre las púas dorsales, momento\ndurante el cual no secretan veneno."
        ko:
          sword: "공격보다는 방어가 특기다.\n갑옷 같은 비늘로 어떠한\n공격에도 새끼를 지킨다."
          shield: "등의 가시 틈에 새끼를\n태우고 달랜다. 이때는 독이\n절대 나오지 않는다."
        zh_simp:
          sword: "比起进攻更擅长防守。\n会用铠甲般的鳞片保护\n孩子免受任何攻击的伤害。"
          shield: "把孩子放在背上刺与刺的\n空隙里来哄它们。在这时\n绝对不会释放毒素。"
        zh_trad:
          sword: "比起攻擊更擅於防守。\n會用像鎧甲般的堅硬鱗片\n保護孩子不被任何攻擊傷害。"
          shield: "會把孩子放在背上的\n刺與刺之間來哄牠們。\n這時候絕對不會釋放毒素。"
nidoran_m:
