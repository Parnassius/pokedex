      types:
        - psychic
      egg_groups:
        - amorphous
      abilities:
        - overcoat
        - magic_guard
      hidden_ability: regenerator
      descriptions:
        jp_kana:
          sword: "２つの　のうみその　いけんが\nいっちしたときの　ねんりきは\nしゅうい１キロに　およぶと　いう。"
          shield: "ぶんれつした　２つの　のうみその\nかんがえは　ほぼ　いっちせず\nまるで　こうどうが　よめない。"
        jp_kanji:
          sword: "２つの　脳みその　意見が\n一致したときの　念力は\n周囲１キロに　およぶと　いう。"
          shield: "分裂した　２つの　脳みその\n考えは　ほぼ　一致せず\nまるで　行動が　読めない。"
        en:
          sword: "Its psychic power can supposedly cover a range\nof more than half a mile—but only if its two\nbrains can agree with each other."
          shield: "Its brain has split into two, and the two\nhalves rarely think alike. Its actions are\nutterly unpredictable."
        fr:
          sword: "On prétend que lorsque ses deux cerveaux\nagissent à l’unisson, la portée de sa force mentale\npeut s’étendre sur un rayon d’un kilomètre."
          shield: "Étant donné que ses deux cerveaux sont rarement\nsur la même longueur d’onde, il est impossible\nde prédire son comportement."
        it:
          sword: "Quando i suoi due cervelli pensano la stessa\ncosa, la sua forza psichica si propaga nel\nraggio di 1 km."
          shield: "È un Pokémon piuttosto imprevedibile.\nI suoi due cervelli, separati e indipendenti,\nraramente sono sulla stessa lunghezza onda."
        de:
          sword: "Die gewaltigen Psycho-Kräfte, die entstehen,\nwenn seine zwei Denkapparate einer Meinung\nsind, sollen im Umkreis von 1 km zu spüren sein."
          shield: "Weil die beiden Hälften seines gespaltenen\nDenkapparates fast nie einer Meinung sind,\nist es auf gewisse Weise unberechenbar."
        es:
          sword: "Dicen que, cuando las dos partes de su cerebro\npiensan lo mismo, el alcance de su telequinesia\naumenta hasta abarcar un radio de 1 km."
          shield: "Las dos partes de su cerebro casi nunca piensan\nlo mismo, por lo que es imposible predecir sus\nintenciones."
        ko:
          sword: "2개의 뇌가 의견 일치했을 때의\n염동력은 주변 1km까지\n영향을 미친다고 한다."
          shield: "분열한 2개의 뇌는\n생각이 거의 일치하지 않아\n전혀 행동을 예측할 수 없다."
        zh_simp:
          sword: "据称说它的２个大脑\n意见一致时，发出的念力\n可以覆盖方圆１公里的范围。"
          shield: "由于它一分为二的大脑\n思考的内容几乎完全不同，\n导致它的行动非常难以预测。"
        zh_trad:
          sword: "據說當牠的２個大腦\n意見一致時，發出的念力\n可以覆蓋方圓１公里的範圍。"
          shield: "由於牠一分為二的大腦\n思考的內容幾乎完全不同，\n導致牠的行動非常難以預測。"
