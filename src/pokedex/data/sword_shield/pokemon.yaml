        jp_kana:
          sword: "こだいの　うみに　すんでいた。\nはいずることしか　できないが\nえもののために　りくにも　あがる。"
          shield: "おおくの　かめポケモンの　せんぞと\nかんがえられている　ポケモン。\nかせきから　ふくげん　された。"
        jp_kanji:
          sword: "古代の　海に　棲んでいた。\n這いずることしか　できないが\n獲物のために　陸にも　上がる。"
          shield: "多くの　かめポケモンの　先祖と\n考えられている　ポケモン。\n化石から　復元された。"
        en:
          sword: "This Pokémon inhabited ancient seas. Although\nit can only crawl, it still comes up onto land in\nsearch of prey."
          shield: "Tirtouga is considered to be the ancestor of\nmany turtle Pokémon. It was restored to life\nfrom a fossil."
        fr:
          sword: "Il vivait dans la mer pendant l’ère préhistorique.\nIl lui arrive de s’aventurer sur la terre ferme pour\nchasser, bien qu’il ne puisse que ramper."
          shield: "Ancêtre présumé de nombreuses espèces\nde Pokémon tortues, il a été restauré à partir\nd’un fossile."
        it:
          sword: "Nell’antichità viveva nei mari. Pur essendo solo\nin grado di strisciare, sale anche sulla terraferma\nin cerca di prede."
          shield: "Si ritiene sia l’antenato di molti Pokémon con\ncarapace. È stato rigenerato da un fossile."
        de:
          sword: "Dieser Meeresbewohner der Urzeit kann sich\naußerhalb der See nur kriechend fortbewegen,\naber für seine Beute kommt es trotzdem an Land."
          shield: "Man vermutet, Galapaflos sei der Vorfahr vieler\nSchildkröten-Pokémon. Es wurde aus einem\nurzeitlichen Fossil wieder zum Leben erweckt."
        es:
          sword: "Vivía en los mares de hace millones de años. Sale\na tierra para buscar presas, aunque solo se pueda\ndesplazar reptando."
          shield: "Se piensa que es el antepasado de numerosos\nPokémon tortuga. Fue regenerado a partir de un\nfósil."
        ko:
          sword: "고대의 바다에 살았다.\n기어 다니는 것만 가능하지만\n먹이를 위해서는 육지에 오르기도 한다."
          shield: "많은 거북포켓몬의 선조로\n여겨지고 있는 포켓몬이다.\n화석에서 복원되었다."
        zh_simp:
          sword: "曾经栖息于古代的海洋。\n虽然只会爬着走，但为了\n寻找猎物也会到陆地上来。"
          shield: "由化石复活的宝可梦。\n人们认为它是很多\n龟宝可梦的祖先。"
        zh_trad:
          sword: "曾經棲息在古代的海洋裡。\n雖然只能爬行，但是為了\n尋找獵物也會到陸地上來。"
          shield: "從化石復原的寶可夢。\n被認為是許多的\n龜寶可夢的祖先。"
