      types:
        - water
      egg_groups:
        - monster
        - water_1
      abilities:
        - strong_jaw
        - shell_armor
      hidden_ability: swift_swim
      descriptions:
        jp_kana:
          sword: "めのまえの　ものに　すぐに　かみつく\nしゅうせい。　はえかけの　まえばが\nかゆいので　かみついてしまうらしい。"
          shield: "あたまの　ツノは　いわの　かたさ。\nツノで　たたかい　ひるんだ　すきに\nパクリと　かみつき　はなさない。"
        jp_kanji:
          sword: "目の前の　ものに　すぐに　噛みつく\n習性。　生えかけの　前歯が\n痒いので　噛みついてしまうらしい。"
          shield: "頭の　ツノは　岩の　硬さ。\nツノで　戦い　ひるんだ　隙に\nパクリと　噛みつき　離さない。"
        en:
          sword: "Apparently the itch of its teething impels it to\nsnap its jaws at anything in front of it."
          shield: "It starts off battles by attacking with its rock-hard\nhorn, but as soon as the opponent flinches, this\nPokémon bites down and never lets go."
        fr:
          sword: "Il a pour habitude de mordre tout ce qui lui passe\nsous les yeux. On raconte qu’il fait cela parce que\nses incisives qui poussent le démangent."
          shield: "La corne sur sa tête est aussi dure que la roche.\nIl s’en sert pour se battre et lorsque l’ennemi\nflanche, il le mord et ne le lâche plus."
        it:
          sword: "Addenta tutto ciò che gli capita davanti. Sembra\nche lo faccia d’istinto, a causa del prurito\nprovocato dagli incisivi che stanno crescendo."
          shield: "Per attaccare usa il corno sulla testa, che è duro\ncome la pietra. Quando il nemico è indebolito,\nlo morde e non molla più la presa."
        de:
          sword: "Es schnappt sofort nach allem, was ihm\nunterkommt. Der Grund dafür ist anscheinend,\ndass seine wachsenden Vorderzähne jucken."
          shield: "Im Kampf greift es mit dem steinharten Horn auf\nseinem Kopf an. Schreckt der Gegner zurück,\nschnappt es zu und lässt nicht wieder los."
        es:
          sword: "Muerde todo lo que se le ponga por delante.\nAl parecer, lo hace para aliviar el dolor que\nsiente cuando le crecen los incisivos."
          shield: "El cuerno que tiene en la cabeza es duro como\nuna roca. Lo usa para atacar al rival y, cuando\neste baja la guardia, lo muerde y no lo suelta."
        ko:
          sword: "눈앞에 있는 것은 바로 물어버리는\n습성을 가졌다. 나고 있는 앞니가\n근질거려서 물게 된다는 듯하다."
          shield: "머리 뿔은 바위처럼 단단하다.\n뿔로 싸우다가 풀이 죽은 틈에\n덥석 물고 놓지 않는다."
        zh_simp:
          sword: "有着不管看到什么都会咬上去\n的习性。这似乎是因为长门牙\n的时候会痒的缘故。"
          shield: "会用头上硬如岩石的角攻击敌人。\n趁其不备之时大口咬住对方，\n一旦咬住便再也不会松口。"
        zh_trad:
          sword: "有著不管看到什麼都會咬上去\n的習性。這似乎是因為長門牙\n的時候會癢的緣故。"
          shield: "會用頭上硬如岩石的角攻擊敵人。\n趁其不備之時大口咬住對方，\n一旦咬住便再也不會鬆口。"
drednaw:
