      descriptions:
        jp_kana:
          sword: "ウロコが　はがれた　きずだらけの\nからだは　きょうしゃの　あかし。\nたおした　あいてに　みせつける。"
          shield: "ウロコを　うちならし　おたけびを\nあげてから　あいてに　いどみかかり\nするどい　ツメで　ずたずたに　する。"
        jp_kanji:
          sword: "ウロコが　はがれた　傷だらけの\n体は　強者の　証し。\n倒した　相手に　見せつける。"
          shield: "ウロコを　打ち鳴らし　雄叫びを\nあげてから　相手に　挑みかかり\n鋭い　ツメで　ずたずたに　する。"
        en:
          sword: "The scaleless, scarred parts of its body are\nsigns of its strength. It shows them off to\ndefeated opponents."
          shield: "Before attacking its enemies, it clashes its\nscales together and roars. Its sharp claws\nshred the opposition."
        fr:
          sword: "Ses écailles arrachées et son corps couvert de\ncicatrices sont la preuve de sa puissance. Il les\nmontre à son adversaire vaincu en se pavanant."
          shield: "Après avoir fait tinter ses écailles et poussé\nun terrible cri de guerre, il charge ses ennemis\net les lacère de ses griffes acérées."
        it:
          sword: "Come prova della sua forza, mostra orgoglioso\nall’avversario sconfitto le ferite sul suo corpo\ne le squame mancanti."
          shield: "Fa risuonare le squame ed emette un possente\nurlo, per poi lanciarsi sull’avversario e farlo a\nfettine con i suoi artigli affilati."
        de:
          sword: "Für sie sind zerschmetterte Schuppen und Narben\nTrophäen, die sie besiegten Gegnern nach dem\nKampf voller Stolz zeigen."
          shield: "Bevor es angreift, rasselt es mit den Schuppen\nund stößt einen Kampfschrei aus. Dann reißt es\nden Gegner mit seinen scharfen Klauen in Stücke."
        es:
          sword: "Como prueba de su fuerza, muestra orgulloso\na quienes vence las cicatrices de su cuerpo\ndonde ya no tiene escamas."
          shield: "Tras hacer sonar sus escamas y proferir su grito\nde guerra, carga contra el enemigo y lo hace\ntrizas con sus afiladas garras."
        ko:
          sword: "비늘이 떨어진 상처투성이인\n몸은 강자라는 증표다.\n상대를 쓰러뜨린 후 상처를 보여준다."
          shield: "비늘을 부딪쳐 우렁찬 소리를\n낸 후 상대에게 덤벼들어\n날카로운 손톱으로 갈기갈기 찢는다."
        zh_simp:
          sword: "会向输给自己的对手展示自己\n鳞片脱落、满是伤痕的身体，\n来证明自己的强者地位。"
          shield: "敲响鳞片，发出吼声，\n接着向对手发起挑战，\n并用锋利的爪子撕裂对手。"
        zh_trad:
          sword: "會向輸給自己的對手展示自己\n鱗片脫落、滿是傷痕的身體，\n來證明自己的強者地位。"
          shield: "敲響鱗片、發出吼聲，\n接著向對手發起挑戰，\n並用鋒利的爪子撕裂對手。"
