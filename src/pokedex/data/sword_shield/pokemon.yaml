      descriptions:
        jp_kana:
          sword: "はねで　もつ　クキを　かたなのように\nあやつり　てきを　きりすてる。\nいざと　いうときは　エサに　する。"
          shield: "しょくぶつの　クキで　たたかう。\nクキの　ふりかたには　いくつかの\nりゅうはの　ようなものが　ある。"
        jp_kanji:
          sword: "羽で　もつ　茎を　刀のように\n操り　敵を　切り捨てる。\nいざと　いうときは　エサに　する。"
          shield: "植物の　茎で　戦う。\n茎の　振り方には　いくつかの\n流派の　ようなものが　ある。"
        en:
          sword: "The stalk this Pokémon carries in its wings serves\nas a sword to cut down opponents. In a dire\nsituation, the stalk can also serve as food."
          shield: "They use a plant stalk as a weapon, but not all\nof them use it in the same way. Several distinct\nstyles of stalk fighting have been observed."
        fr:
          sword: "Il tranche ses adversaires avec sa tige, qu’il manie\ncomme une épée. Quand la situation l’exige,\nil s’en nourrit."
          shield: "Il se bat à l’aide de sa tige. Il existe plusieurs\nécoles quant à son maniement."
        it:
          sword: "Colpisce gli avversari con un gambo, che\nbrandisce con l’ala come se fosse una spada.\nIn caso di necessità, può anche mangiarselo."
          shield: "Affronta i nemici usando il gambo di una\npianta, brandendolo secondo stili diversi\nin base alla scuola di lotta che segue."
        de:
          sword: "Unter seinem Flügel trägt es eine Lauchstange,\ndie es wie ein Schwert gegen Feinde einsetzt und\nwelche ihm im Bedarfsfall auch als Nahrung dient."
          shield: "Im Kampf verwendet es eine Lauchstange als\nWaffe. Es gibt verschiedene Meinungen dazu,\nwie diese korrekt zu schwingen sei."
        es:
          sword: "Blande el puerro que sujeta con un ala como si se\ntratase de una espada para rebanar a su rival. En\ncaso de necesidad, se lo come para nutrirse."
          shield: "Combate empuñando un puerro como arma. La\nforma de blandirlo es tan variada que ha llegado\na generar sus propias escuelas."
        ko:
          sword: "날개로 쥐고 있는 파 줄기를\n칼처럼 휘둘러 상대를 베어버린다.\n몹시 허기질 때는 먹기도 한다."
          shield: "식물의 줄기로 싸운다.\n줄기를 휘두르는 방식에 따라\n몇 종류의 유파가 있는 듯하다."
        zh_simp:
          sword: "会将翅膀拿着的茎状植物\n当成剑一般去劈砍对手。\n在非常时期会拿它当作食物。"
          shield: "用植物的茎来战斗。\n茎的挥舞方式存在着\n好几种不同的流派。"
        zh_trad:
          sword: "會將翅膀所拿的莖狀植物\n當成劍一般去劈砍對手。\n在非常時期會拿它當作食物。"
          shield: "用植物的莖來戰鬥。\n莖的揮舞方式存在著\n好幾種不同的流派。"
    farfetchd_galarian_form:
      form_id: 1
      names:
        jp_kana: ガラルのすがた
        jp_kanji: ガラルのすがた
        en: Galarian Form
        fr: Forme de Galar
        it: Forma di Galar
        de: Galar-Form
        es: Forma de Galar
        ko: 가라르의 모습
        zh_simp: 伽勒尔的样子
        zh_trad: 伽勒爾的樣子
      base_stats:
        hp: 52
        attack: 95
        defense: 55
        special_attack: 58
        special_defense: 62
