        - synchronize
      hidden_ability: magic_bounce
      descriptions:
        jp_kana:
          sword: "くうきの　ながれを　よみとることで\nこれからの　てんきや　あいての\nうごきなどを　すべて　あててしまう。"
          shield: "ひたいの　たまから　サイコパワーを\nほうしゃして　たたかう。　パワーが\nつきると　たまの　いろが　くすむ。"
        jp_kanji:
          sword: "空気の　流れを　読みとることで\nこれからの　天気や　相手の\n動きなどを　すべて　当ててしまう。"
          shield: "額の　珠から　サイコパワーを\n放射して　戦う。　パワーが\nつきると　珠の　色が　くすむ。"
        en:
          sword: "By reading air currents, it can predict things such\nas the weather or its foe’s next move."
          shield: "It unleashes psychic power from the orb on its\nforehead. When its power is exhausted, the orb\ngrows dull and dark."
        fr:
          sword: "En analysant les courants aériens, il peut prédire\nla météo ou même les mouvements de son ennemi."
          shield: "Le joyau sur le front de Mentali projette\ndes ondes psychiques en combat, et s’obscurcit\nquand il est à bout de force."
        it:
          sword: "Analizza le correnti d’aria per predire le\ncondizioni atmosferiche o la prossima\nmossa del nemico."
          shield: "Lotta emettendo poteri psichici dalla sfera\nche ha sulla fronte, che diventa più scura\nman mano che le sue energie diminuiscono."
        de:
          sword: "Es analysiert Luftströmungen und kann dadurch\ndas Wetter oder die nächste Attacke des\nGegners vorhersehen."
          shield: "Über die Kugel an seiner Stirn feuert es\nPsycho-Kräfte ab. Geht ihm die Kraft aus,\nverliert die Farbe der Kugel an Glanz."
        es:
          sword: "Basándose en las corrientes de aire, predice\ncosas como el tiempo atmosférico o la próxima\nacción del enemigo."
          shield: "Lucha con los poderes psíquicos que brotan de\nla esfera de su frente, que se oscurece cuando\nsu energía disminuye."
        ko:
          sword: "공기의 흐름을 읽어내서\n앞으로의 날씨와 상대의\n움직임 등을 모두 맞혀버린다."
          shield: "이마의 구슬에서 사이코 파워를\n방사해서 싸운다. 파워가\n다하면 구슬의 색이 흐려진다."
        zh_simp:
          sword: "能通过感受空气的流动，\n准确地预测出接下来的\n天气和对手的行动等等。"
          shield: "从额头的珠子放射出精神力量\n进行战斗。当力量用尽时，\n珠子的颜色也会褪去。"
        zh_trad:
          sword: "能透過感受空氣的流動，\n準確地預測出接下來的\n天氣和對手的行動等等。"
          shield: "從額頭的珠子放射出精神力量\n進行戰鬥。當力量用盡時，\n珠子的顏色也會褪去。"
