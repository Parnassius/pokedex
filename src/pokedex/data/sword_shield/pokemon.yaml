      types:
        - dragon
        - ground
      egg_groups:
        - monster
        - dragon
      abilities:
        - sand_veil
      hidden_ability: rough_skin
      descriptions:
        jp_kana:
          sword: "ちねつで　あたためられた　どうくつの\nせまい　よこあなを　このむ。　そとが\nふぶいていても　こごえずにすむのだ。"
          shield: "うごくものを　みさかいなしに　おそい\nねぐらの　よこあなに　ひきずりこむ。\nおおぐちだが　いぶくろは　ちいさめ。"
        jp_kanji:
          sword: "地熱で　暖められた　洞窟の\n狭い　横穴を　好む。　外が\n吹雪いていても　凍えずにすむのだ。"
          shield: "動くものを　見境なしに　襲い\nねぐらの　横穴に　引きずりこむ。\n大口だが　胃袋は　小さめ。"
        en:
          sword: "Gible prefers to stay in narrow holes in the sides\nof caves heated by geothermal energy. This way,\nGible can stay warm even during a blizzard."
          shield: "Gible attacks anything that moves, and it drags\nwhatever it catches into the crevice that is its lair.\nDespite the big mouth, Gible’s stomach is small."
        fr:
          sword: "Il aime les cavités étroites dans les grottes\nchauffées par géothermie. Elles le tiennent au\nchaud lorsque le blizzard souffle à l’extérieur."
          shield: "Il attaque et entraîne dans son antre tout ce qui\nbouge, sans distinction. Sa gueule est immense,\nmais son estomac est relativement petit."
        it:
          sword: "Ama le strette nicchie nelle pareti delle grotte\nscaldate dal calore geotermico. Non ha freddo\nneanche se all’esterno ci sono tormente di neve."
          shield: "Attacca indiscriminatamente qualunque cosa\nsi muova, per poi trascinarla nella tana. La bocca\nha dimensioni notevoli ma lo stomaco è piccolo."
        de:
          sword: "Es mag enge Löcher in Höhlenwänden, die der\nErdwärme ausgesetzt sind. Selbst wenn draußen\nein Schneesturm wütet, friert es dort nicht."
          shield: "Es greift alles an, was sich bewegt, und zerrt es\nin sein Versteck. Kaumalat verfügt zwar über ein\ngroßes Maul, aber sein Magen ist relativ klein."
        es:
          sword: "Vive en pequeños agujeros de cuevas calentadas\npor la energía geotérmica, por lo que no pasa\nfrío ni aunque fuera se desate una ventisca."
          shield: "Ataca indiscriminadamente a cualquier cosa que\nse mueva y la arrastra a su agujero. Pese a tener\nuna boca enorme, su estómago es pequeño."
        ko:
          sword: "지열로 데워진 동굴의 좁은\n구멍을 좋아한다. 밖에 눈보라가\n쳐도 얼어붙지 않고 견딜 수 있다."
          shield: "움직이는 것은 무조건 공격해서\n보금자리 굴로 데려간다.\n입은 크지만 위는 작은 편이다."
        zh_simp:
          sword: "喜欢因地热而温暖的\n狭窄横洞，这样一来就算\n外面刮暴风雪也不会冻着了。"
          shield: "遇到会动的东西就会扑上去\n将其拉回到自己住的横洞内。\n虽然嘴很大，但胃口却比较小。"
        zh_trad:
          sword: "喜歡住在被地熱加溫的洞窟\n的小窄洞。這樣即使外面\n刮著暴風雪，牠也不會受凍。"
          shield: "會不分青紅皂白地襲擊會動的東西，\n將對方拖進自己睡覺的小洞裡。\n雖然嘴巴很大，但胃卻算是小的。"
gabite:
  species_id: 444
  names:
    jp_kana: ガバイト
    jp_kanji: ガバイト
    en: Gabite
    fr: Carmache
