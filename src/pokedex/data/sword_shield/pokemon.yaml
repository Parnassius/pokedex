          sword: "しっぽの　あなから　くうきを\nとりこみ　ほのおを　もやす。　あなを\nふさがれると　ぐあいが　わるくなる。"
          shield: "ほのおを　ベロの　ように　つかう。\nアイアントの　かたい　がいこっかくを\nじわじわと　とかし　いただくのだ。"
        jp_kanji:
          sword: "しっぽの　穴から　空気を\n取りこみ　炎を　燃やす。　穴を\n塞がれると　具合が　悪くなる。"
          shield: "炎を　ベロの　ように　使う。\nアイアントの　硬い　外骨格を\nじわじわと　溶かし　いただくのだ。"
        en:
          sword: "There’s a hole in its tail that allows it to draw in\nthe air it needs to keep its fire burning. If the\nhole gets blocked, this Pokémon will fall ill."
          shield: "A flame serves as its tongue, melting through the\nhard shell of Durant so that Heatmor can devour\ntheir insides."
        fr:
          sword: "Il aspire de l’air par le bout de sa queue\net produit ainsi sa fameuse langue de feu.\nSi on lui bouche la queue, il se sent mal."
          shield: "Il se sert de sa flamme comme d’une langue.\nIl fait fondre peu à peu l’exosquelette des Fermite\npour se délecter de leur chair."
        it:
          sword: "Aspira aria dal foro nella coda per produrre\ndelle fiamme. Se il foro viene tappato, inizia\na sentirsi male."
          shield: "Usa la fiamma a mo’ di lingua. Liquefà il duro\nesoscheletro dei Durant e poi ne fa un sol\nboccone."
        de:
          sword: "Es saugt über das Loch in seinem Schweif Luft für\nseine Flammen ein. Eine Verstopfung des Lochs\nschlägt Furnifraß sofort auf die Gesundheit."
          shield: "Es nutzt eine Flamme als Zunge. Damit bringt es\ndie Panzer von Fermicula zum Schmelzen und\nverspeist im Anschluss ihr Inneres."
        es:
          sword: "Absorbe aire por el orificio de la cola para\nprender las llamas que expulsa. Si la abertura\nse obstruye, enferma."
          shield: "Usa llamas a modo de lengua para derretir\nel duro exoesqueleto de los Durant antes de\ndevorarlos."
        ko:
          sword: "꼬리의 구멍을 통해 공기를\n빨아들여 불꽃을 태운다.\n구멍이 막히면 상태가 나빠진다."
          shield: "불꽃을 혀처럼 사용한다.\n아이앤트의 단단한 외골격을\n조금씩 녹여 먹어 치운다."
        zh_simp:
          sword: "从尾部的孔洞吸入空气，\n燃起火焰。如果孔洞被\n堵住了，身体就会不舒服。"
          shield: "将火焰当成舌头来使用。\n会一点一点地熔化铁蚁\n坚硬的外骨骼，然后把它吃掉。"
        zh_trad:
          sword: "從尾部的孔洞吸入空氣，\n燃起火焰。如果孔洞被\n堵住了，身體就會不舒服。"
          shield: "將火焰當成舌頭來使用。\n會一點一點地熔化鐵蟻\n堅硬的外骨骼，然後把牠吃掉。"
