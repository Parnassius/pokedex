      descriptions:
        jp_kana:
          sword: "まるい　しっぽは　うきわの　かわり。\nたまの　なかには　あぶらに　かえた\nえいようが　たっぷり　つまっている。"
          shield: "よく　みずを　はじく　たいもうは\nつめたい　うみから　あがったときでも\nすぐに　かわいて　さむくないのだ。"
        jp_kanji:
          sword: "丸い　しっぽは　浮き輪の　かわり。\n球の　中には　脂に　変えた\n栄養が　たっぷり　詰まっている。"
          shield: "よく　水を　弾く　体毛は\n冷たい　海から　上がったときでも\nすぐに　乾いて　寒くないのだ。"
        en:
          sword: "This Pokémon uses its round tail as a float. The\nball of Marill’s tail is filled with nutrients that\nhave been turned into an oil."
          shield: "Even after Marill swims in a cold sea, its water-\nrepellent fur dries almost as soon as Marill leaves\nthe water. That’s why this Pokémon is never cold."
        fr:
          sword: "Sa queue ronde lui sert de bouée.\nLa boule au bout de celle-ci est remplie\nde nutriments qui se sont changés en huile."
          shield: "Sa fourrure est hydrophobe, si bien qu’elle\nsèche en un instant. Il n’a donc jamais froid,\nmême lorsqu’il sort d’une mer glaciale."
        it:
          sword: "La coda rotonda funge da salvagente. All’interno\ndella palla sono conservate sostanze nutritive\nsotto forma di grasso."
          shield: "Non soffre il freddo nemmeno quando emerge\ndai mari gelidi, grazie alla pelliccia idrorepellente\nche si asciuga subito."
        de:
          sword: "Marills runde Schweifspitze dient ihm als eine Art\nSchwimmring. Sie ist mit Nährstoffen gefüllt,\ndie in Fett umgewandelt wurden."
          shield: "Sein wasserabweisendes Fell trocknet sofort und\nhält Marill warm, selbst wenn es aus kaltem\nMeerwasser auftaucht."
        es:
          sword: "La punta redonda de su cola hace las veces de\nflotador. En ella almacena abundantes nutrientes\nen forma de aceite."
          shield: "Su pelaje repele el agua, lo que evita que pase\nfrío al salir de mares gélidos porque se seca al\nmomento."
        ko:
          sword: "둥근 꼬리는 튜브 대용이다.\n그 안에는 영양으로 가득 찬\n기름이 들어 있다."
          shield: "물을 잘 튕겨내는 털은\n차가운 바다에 있다가 나와도\n금방 말라서 춥지 않다."
        zh_simp:
          sword: "圆圆的尾巴拥有\n救生圈的功能。球里满是\n转变为了油脂的营养。"
          shield: "体毛的防水性能很好，\n就算是从冰冷的海里上岸，\n身体也会立刻干掉，一点都不冷。"
        zh_trad:
          sword: "圓圓的尾巴能用來代替\n救生圈。球裡面滿滿都是\n轉換成油脂的營養。"
          shield: "很能彈開水的體毛就算是\n從寒冷的海裡上岸時也能\n立刻乾掉，一點都不冷。"
