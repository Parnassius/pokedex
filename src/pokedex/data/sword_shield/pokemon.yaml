      descriptions:
        jp_kana:
          sword: "２まいの　ハネを　こうそくで\nしんどうさせて　だす　ちょうおんぱは\nはげしい　ずつうを　ひきおこす。"
          shield: "ハネを　せいちょう　させるために\nまいにち　たいりょうの　えものを\nしょうかえきで　とかして　すする。"
        jp_kanji:
          sword: "２枚の　ハネを　高速で\n振動させて　だす　超音波は\n激しい　頭痛を　ひきおこす。"
          shield: "ハネを　成長　させるために\n毎日　大量の　獲物を\n消化液で　溶かして　すする。"
        en:
          sword: "The ultrasonic waves it generates by rubbing its\ntwo wings together cause severe headaches."
          shield: "To help make its wings grow, it dissolves\nquantities of prey in its digestive juices and\nguzzles them down every day."
        fr:
          sword: "Ses violents battements d’ailes génèrent\ndes vagues d’ultrasons qui donnent\ndes migraines intenses."
          shield: "Pour aider ses ailes à pousser, il se nourrit chaque\njour d’un grand nombre de proies qu’il dissout\nen projetant de l’acide."
        it:
          sword: "Fa vibrare velocemente le ali generando\nonde ultrasoniche che provocano dei\nforti mal di testa."
          shield: "Per far sviluppare le ali, si nutre ogni giorno\ndi una grande quantità di prede, che succhia\ndopo averle sciolte con il proprio acido."
        de:
          sword: "Die Schallwellen, die es durch seine hohe\nFlügelschlagfrequenz erzeugt, verursachen\nheftige Kopfschmerzen."
          shield: "Um das Wachstum seiner Flügel zu fördern,\nschlürft es täglich große Mengen an Beute,\ndie es zuvor in Magensäure aufgelöst hat."
        es:
          sword: "Al agitar sus alas a gran velocidad, emite ondas\nultrasónicas que provocan fuertes dolores de\ncabeza."
          shield: "Para terminar de desarrollar sus alas, se nutre\na diario de un gran número de presas, a las que\ndisuelve con ácido antes de devorarlas."
        ko:
          sword: "2장의 날개를 고속으로\n진동시켜서 내는 초음파는\n격렬한 두통을 불러일으킨다."
          shield: "날개를 성장시키기 위해\n매일 대량의 먹잇감을\n소화액으로 녹여 마신다."
        zh_simp:
          sword: "２根翅膀高速振动产生的\n超音波会引起剧烈的头痛。"
          shield: "为了让翅膀成长，\n每天要用消化液溶化\n并吸食大量的猎物。"
        zh_trad:
          sword: "２片翅膀高速振動\n產生的超音波會\n引起劇烈的頭痛。"
          shield: "為了讓翅膀成長，\n每天要用消化液溶化\n並吸食大量的獵物。"
