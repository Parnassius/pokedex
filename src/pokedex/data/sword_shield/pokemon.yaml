      descriptions:
        jp_kana:
          sword: "パーマの　かかった　たいもうは\nたかい　クッションせいが　ある。\nがけから　おちても　へっちゃら。"
          shield: "けが　のびすぎると　うごけない。\nウールーの　たいもうで　おられた\nぬのは　おどろくほど　じょうぶ。"
        jp_kanji:
          sword: "パーマの　かかった　体毛は\n高い　クッション性が　ある。\n崖から　落ちても　へっちゃら。"
          shield: "毛が　伸びすぎると　動けない。\nウールーの　体毛で　織られた\n布は　驚くほど　丈夫。"
        en:
          sword: "Its curly fleece is such an effective cushion that\nthis Pokémon could fall off a cliff and stand right\nback up at the bottom, unharmed."
          shield: "If its fleece grows too long, Wooloo won’t be\nable to move. Cloth made with the wool of this\nPokémon is surprisingly strong."
        fr:
          sword: "Son pelage frisé est doux et rebondi comme\nun coussin. Une telle toison le protègerait\nmême s’il chutait d’une falaise."
          shield: "Si ses poils poussent trop, il ne peut plus bouger.\nLes étoffes tissées avec son pelage\nsont étonnamment solides."
        it:
          sword: "Il suo vello riccioluto gli fornisce una perfetta\nimbottitura. Non si farebbe nulla nemmeno\ncadendo da un precipizio."
          shield: "Se gli cresce troppo il pelo, non riesce più a\nmuoversi. Il tessuto fatto con la sua lana è\nsorprendentemente resistente."
        de:
          sword: "Sein stark gelocktes Fell hat eine sehr polsternde\nWirkung. Selbst eine Klippe hinunterzufallen\nmacht ihm nichts aus."
          shield: "Werden seine Haare zu lang, kann es sich nicht\nmehr bewegen. Der aus Wollys Wolle gewobene\nStoff ist unglaublich robust."
        es:
          sword: "Su lana rizada es tan acolchada que no se hace\ndaño ni aunque se caiga por un precipicio."
          shield: "Si le crece el pelo demasiado, no puede\nmoverse. Las telas confeccionadas con lana de\nWooloo son sorprendentemente resistentes."
        ko:
          sword: "곱슬곱슬한 털은\n훌륭한 쿠션 역할을 한다.\n절벽에서 떨어져도 아무렇지도 않다."
          shield: "털이 많이 자라면 움직이지 못한다.\n우르의 털로 짠 천은\n놀라울 정도로 튼튼하다."
        zh_simp:
          sword: "卷卷的体毛弹性十足。\n就算从悬崖上掉下去，\n也不会受伤。"
          shield: "要是身上的毛长得太长就会\n不能动弹。用毛辫羊的体毛\n织成的布结实得让人吃惊。"
        zh_trad:
          sword: "捲捲的體毛彈性十足。\n就算從懸崖上掉下去，\n也不會受傷。"
          shield: "要是身上的毛長得太長就會\n不能動彈。用毛辮羊的體毛\n織成的布結實得讓人吃驚。"
