      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - steel
      egg_groups:
        - undiscovered
      abilities:
        - magnet_pull
      descriptions:
        jp_kana:
          sword: "きんぞくを　とかして　たべてしまう。\nえきたいきんぞくを　じゅんかんさせて\nたいないで　エネルギーを　つくる。"
          shield: "むれになって　せいかつするが　ときが\nくると　１ぴきの　つよい　メルタンが\nなかまたちを　とりこみ　しんかする。"
        jp_kanji:
          sword: "金属を　溶かして　食べてしまう。\n液体金属を　循環させて\n体内で　エネルギーを　つくる。"
          shield: "群れになって　生活するが　時が\nくると　１匹の　強い　メルタンが\n仲間たちを　取りこみ　進化する。"
        en:
          sword: "It dissolves and eats metal. Circulating liquid\nmetal within its body is how it generates energy."
          shield: "They live as a group, but when the time comes,\none strong Meltan will absorb all the others\nand evolve."
        fr:
          sword: "Il se nourrit du métal qu’il fait fondre,\net produit de l’énergie en faisant circuler\ndu métal liquide dans son corps."
          shield: "Les Meltan vivent en groupe. Quand l’heure\nde l’évolution a sonné, le plus fort d’entre eux\nabsorbe ses camarades pour changer de forme."
        it:
          sword: "Fonde il metallo per cibarsene, e lo fa circolare\nnel suo corpo per produrre energia."
          shield: "Vive in gruppo, ma quando giunge il momento\nl’esemplare più forte ingloba i compagni\ne si evolve."
        de:
          sword: "Es schmilzt Metall ein und frisst es. In seinem\nKörper wandelt es das flüssig gewordene Metall\nin Energie um."
          shield: "Sie leben in Gruppen. Doch wenn die Zeit reif\nist, nimmt ein starkes Meltan seine Artgenossen\nin sich auf und entwickelt sich."
        es:
          sword: "Funde metales para ingerirlos. Una vez licuados,\nlos hace circular por el interior de su cuerpo para\ngenerar energía."
          shield: "Viven en grupos, pero, llegado el momento,\nel ejemplar más fuerte absorbe a sus camaradas\ny evoluciona."
        ko:
          sword: "금속을 녹여서 먹어버린다.\n액체 금속을 순환시켜서\n체내에서 에너지를 만든다."
          shield: "무리 지어 생활하지만\n때가 되면 1마리의 강한 멜탄이\n동료들을 흡수해 진화한다."
        zh_simp:
          sword: "会溶解金属然后吃掉。\n通过让液态金属在体内\n循环来制造能量。"
          shield: "美录坦们虽然聚在一起生活，\n但当时机到来，会由最强的那１只\n吸收其他的伙伴来进化。"
        zh_trad:
          sword: "會溶解金屬然後吃掉。\n透過讓液體金屬在體內\n循環來製造能量。"
          shield: "美錄坦們雖然聚在一起生活，\n但當時機到來，會由最強的那１隻\n吸收其他的夥伴來進化。"
