      descriptions:
        jp_kana:
          sword: "くった　ゴミが　たいないで　どくに\nへんかする。　くう　ゴミ　しだいで\nどくの　しゅせいぶんも　かわる。"
          shield: "みぎうでから　だす　どくえきは\nよわった　せいぶつが　あびれば\nそくしするほど　きけんな　シロモノ。"
        jp_kanji:
          sword: "食った　ゴミが　体内で　毒に\n変化する。　食う　ゴミ　しだいで\n毒の　主成分も　変わる。"
          shield: "右腕から　出す　毒液は\n弱った　生物が　浴びれば\n即死するほど　危険な　シロモノ。"
        en:
          sword: "This Pokémon eats trash, which turns into poison\ninside its body. The main component of the\npoison depends on what sort of trash was eaten."
          shield: "The toxic liquid it launches from its right arm\nis so virulent that it can kill a weakened\ncreature instantly."
        fr:
          sword: "Il produit du poison dans son corps à partir\ndes ordures qu’il ingurgite. Selon ce qu’il mange,\nla composition des toxines diffère."
          shield: "Le liquide qu’il projette de son bras droit\nest si toxique que si une créature fragile\nen est aspergée, elle succombe sur-le-champ."
        it:
          sword: "Mangia spazzatura e la trasforma in un veleno\nla cui composizione cambia a seconda di cosa\nha ingurgitato."
          shield: "Il veleno che spruzza dall’arto destro è talmente\ntossico da risultare istantaneamente letale\nper le creature già debilitate."
        de:
          sword: "Es frisst Müll und verdaut ihn in seinem Inneren\nzu Gift. Je nach Art des Mülls, den es verzehrt,\nändern sich die Hauptbestandteile des Giftes."
          shield: "Die toxische Flüssigkeit aus seinem rechten Arm\nist sehr gefährlich. Angeschlagene Lebewesen\nkommen bei Kontakt sofort ums Leben."
        es:
          sword: "Su cuerpo transforma la inmundicia que engulle\nen un veneno cuya composición cambia según la\nbasura ingerida."
          shield: "El veneno líquido que brota de su brazo derecho\nes tan nocivo que puede acabar con una criatura\nya débil al menor contacto."
        ko:
          sword: "먹은 쓰레기가 체내에서 독으로\n변화한다. 먹은 쓰레기에 따라\n독의 주성분도 바뀐다."
          shield: "오른팔에서 내보내는 독액은\n약한 생물이 맞으면\n즉사할 정도로 위험하다."
        zh_simp:
          sword: "吃掉的垃圾会在体内\n转化为毒素。毒素的成分\n会随着吃掉的垃圾而不同。"
          shield: "从右臂喷出的毒液十分危险，\n虚弱的生物只要一沾到，\n立刻就会丢掉性命。"
        zh_trad:
          sword: "吃掉的垃圾會在體內\n轉化為毒素。毒素的成分\n會隨著吃掉的垃圾而不同。"
          shield: "從右臂噴出的毒液十分危險，\n虛弱的生物只要一沾到，\n立刻就會丟掉性命。"
  gmax_forms:
    garbodor_gigantamax:
      form_id: 999
      names:
        jp_kana: キョダイマックス
        jp_kanji: キョダイマックス
        en: Gigantamax
        fr: Gigamax
        it: Gigamax
        de: Gigadynamax
        es: Gigamax
        ko: 거다이맥스
        zh_simp: 超极巨化
        zh_trad: 超極巨化
      descriptions:
        jp_kana:
          sword: "キョダイマックスの　パワーによって\nこくなった　どくガスが　すてられた\nおもちゃの　かたちに　かたまった。"
          shield: "くちや　ゆびさきから　ふんしゃする\nどくガスを　あびると　ほねのずいまで\nどくに　おかされてしまう。"
        jp_kanji:
          sword: "キョダイマックスの　パワーによって\n濃くなった　毒ガスが　捨てられた\nおもちゃの　形に　固まった。"
          shield: "口や　指先から　噴射する\n毒ガスを　浴びると　骨の髄まで\n毒に　侵されてしまう。"
        en:
          sword: "Due to Gigantamax energy, this Pokémon’s toxic\ngas has become much thicker, congealing into\nmasses shaped like discarded toys."
          shield: "It sprays toxic gas from its mouth and fingers. If\nthe gas engulfs you, the toxins will seep in all the\nway down to your bones."
        fr:
          sword: "La force du Gigamax a densifié ses gaz toxiques\net les a remodelés en forme de vieux jouets\nabandonnés."
          shield: "Quiconque entre en contact avec le gaz toxique\nqui jaillit de sa bouche et de ses doigts sera\nempoisonné jusqu’aux os."
        it:
          sword: "L’energia del fenomeno Gigamax ha fatto\naddensare i suoi gas velenosi, che si sono\nsolidificati sotto forma di giocattoli abbandonati."
          shield: "I gas tossici che emette dalla bocca e dalle dita\npenetrano fino al midollo."
        de:
          sword: "Durch die Gigadynamax-Energie hat sich sein\ngiftiges Gas weiter verdichtet und die Form von\nentsorgtem Spielzeug angenommen."
          shield: "Wer mit dem giftigen Gas, das es über das Maul\nund die Fingerspitzen versprüht, in Kontakt tritt,\nerleidet schwere Vergiftungen."
        es:
          sword: "Debido a la energía del fenómeno Gigamax,\nsus emisiones tóxicas se han solidificado y han\nadoptado la forma de juguetes abandonados."
          shield: "Al entrar en contacto con el gas tóxico que emite\npor la boca y los dedos, el veneno penetra hasta\nla médula."
        ko:
          sword: "거다이맥스의 파워에 의해\n진해진 독가스가 버려진\n장난감의 형태로 굳었다."
          shield: "입과 손가락 끝에서 분사하는\n독가스를 맞으면\n뼛속까지 독에 감염된다."
        zh_simp:
          sword: "受超极巨化之力的影响，\n浓度上升的毒气凝固\n成了被丢弃的玩具的形状。"
          shield: "如果沾到它从嘴和手指\n喷射出来的毒气，毒素会\n蔓延到你的骨髓里。"
        zh_trad:
          sword: "受超極巨化之力的影響，\n濃度上升的毒氣凝固\n成了被丟棄的玩具的形狀。"
          shield: "如果沾到牠從嘴和手指\n噴射出來的毒氣，毒素會\n蔓延到你的骨髓裡。"
