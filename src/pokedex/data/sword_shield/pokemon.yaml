          shield: "ぜつめつした　こだいの　ポケモン。\nこおりづけの　じょうたいで\nはっけんされることも　あるぞ。"
        jp_kanji:
          sword: "化石から　復元が　成功。\n敵の　少ない　寒い土地で\n群れを　つくり　暮らしていた。"
          shield: "全滅した　古代の　ポケモン。\n氷漬けの　状態で\n発見されることも　あるぞ。"
        en:
          sword: "This Pokémon was successfully restored from a\nfossil. In the past, it lived with others of its kind\nin cold lands where there were fewer predators."
          shield: "Amaura is an ancient Pokémon that has gone\nextinct. Specimens of this species can sometimes\nbe found frozen in ice."
        fr:
          sword: "Ce Pokémon a été ressuscité à partir d’un fossile.\nJadis, il vivait en meute dans des terres froides,\noù peu de ses prédateurs résidaient."
          shield: "Un Pokémon ancien qui s’est éteint. On trouve\nparfois des spécimens conservés dans la glace."
        it:
          sword: "È stato rigenerato da un fossile.\nViveva in gruppo in regioni fredde, dove\ni predatori scarseggiavano."
          shield: "Pokémon dell’antichità ormai estinto. A volte\nne vengono scoperti esemplari conservatisi\nall’interno di blocchi di ghiaccio."
        de:
          sword: "Amarino wurde erfolgreich aus einem Fossil\nreanimiert. Einst lebte es gruppenweise in kalten\nGebieten, wo nur wenige Feinde lauerten."
          shield: "Ein ausgestorbenes Pokémon aus der Urzeit.\nManchmal werden im Eis erhalten gebliebene\nExemplare entdeckt."
        es:
          sword: "Este Pokémon ha sido regenerado a partir de\nun fósil. Habitaba en manadas en lugares fríos\ndonde los depredadores escaseaban."
          shield: "Un Pokémon prehistórico extinto. Se han hallado\nalgunos ejemplares conservados bajo el hielo."
        ko:
          sword: "화석으로부터 복원에 성공했다.\n적이 적은 추운 땅에서\n무리 지어 살았다."
          shield: "멸종한 고대의 포켓몬이다.\n얼어붙은 상태로\n발견되기도 한다."
        zh_simp:
          sword: "从化石中成功复原。\n曾经在没什么天敌的\n寒冷地区群居。"
          shield: "已经灭绝的古代宝可梦。\n有时候它还会以冰封的\n状态被发现喔。"
        zh_trad:
          sword: "從化石復原成功的\n寶可夢。曾經群居在\n天敵不多的寒冷地區。"
          shield: "已經滅絕的古代寶可夢。\n有時候還會以冰封狀態\n被發現喔。"
