      descriptions:
        jp_kana:
          sword: "ながい　あいだ　ちちゅうで　くらして\nいたため　めは　ほとんど　みえない。\nしょっかくで　ようすを　さぐる。"
          shield: "１０ねん　いじょう　つちの　なかで\nくらす　ことも　ある。　じゅもくの\nねっこから　えいようを　すいとる。"
        jp_kanji:
          sword: "長い　あいだ　地中で　暮らして\nいたため　目は　ほとんど　見えない。\n触角で　様子を　探る。"
          shield: "１０年以上　土の　中で\n暮らす　ことも　ある。　樹木の\n根っこから　栄養を　吸い取る。"
        en:
          sword: "Because it lived almost entirely underground,\nit is nearly blind. It uses its antennae instead."
          shield: "It can sometimes live underground for more than\n10 years. It absorbs nutrients from the roots\nof trees."
        fr:
          sword: "Parce qu’il a longtemps vécu sous terre,\nil est presque aveugle et utilise ses antennes\npour se repérer."
          shield: "Il peut passer plus de dix ans sous terre.\nLes racines des arbres constituent son régime\nalimentaire."
        it:
          sword: "Poiché passa quasi tutta l’esistenza sottoterra,\nè quasi cieco. Usa le antenne per sondare ciò\nche lo circonda."
          shield: "Gli capita di restare anche più di dieci anni\nsottoterra. Assorbe le sostanze nutritive\ndalle radici degli alberi."
        de:
          sword: "Da es fast sein gesamtes Leben unter der Erde\nverbracht hat, ist es nahezu blind. Es setzt daher\nals Augenersatz seine Fühler ein."
          shield: "Manche Nincada leben mehr als zehn Jahre unter\nder Erde und saugen Nährstoffe aus den Wurzeln\nvon Bäumen."
        es:
          sword: "Vivir bajo tierra durante tanto tiempo lo ha\ndejado prácticamente ciego. Las antenas que\ntiene le ayudan a orientarse."
          shield: "Pueden pasar más de diez años bajo tierra.\nAbsorben nutrientes de las raíces de los árboles."
        ko:
          sword: "긴 시간 동안 땅속에서 살았기 때문에\n눈이 거의 보이지 않는다.\n더듬이로 주변 상황을 살핀다."
          shield: "10년 이상 땅속에서\n지내는 경우도 있다. 수목의\n뿌리에서 영양을 흡수한다."
        zh_simp:
          sword: "因为长时间生活在地下，\n所以眼睛几乎什么都看不到。\n会靠触角来探察周围的情况。"
          shield: "有时能在土里生活１０年以上。\n会从树木的根部那里吸取营养。"
        zh_trad:
          sword: "因為長時間生活在地底下，\n所以眼睛幾乎什麼都看不到。\n會靠觸角來探察周圍的狀況。"
          shield: "有時會在土裡生活\n１０年以上。會從樹木\n的根部吸取營養。"
