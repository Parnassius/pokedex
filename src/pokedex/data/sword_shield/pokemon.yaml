      types:
        - steel
        - rock
      egg_groups:
        - monster
      abilities:
        - sturdy
        - rock_head
      hidden_ability: heavy_metal
      held_items:
        rare: hard_stone
      descriptions:
        jp_kana:
          sword: "てっこうせきや　たまに　てつどうの\nレールを　たべて　からだを　まもる\nはがねの　よろいが　つくられる。"
          shield: "しんかのとき　はがねの　よろいが\nはがれおちる。　むかしの　ひとは\nひろって　せいかつに　やくだてた。"
        jp_kanji:
          sword: "鉄鉱石や　たまに　鉄道の　レールを\n食べて　体を　守る\n鋼の　鎧が　つくられる。"
          shield: "進化のとき　鋼の　鎧が\n剥がれ落ちる。　昔の　人は\n拾って　生活に　役立てた。"
        en:
          sword: "It eats iron ore—and sometimes railroad tracks—\nto build up the steel armor that protects its body."
          shield: "When Aron evolves, its steel armor peels off. In\nancient times, people would collect Aron’s shed\narmor and make good use of it in their daily lives."
        fr:
          sword: "Il se nourrit de minerai de fer et parfois même\nde rails pour se fabriquer une armure d’acier\nqui protège son corps."
          shield: "Quand il évolue, il perd son armure d’acier.\nAutrefois, les gens la ramassaient pour\nen faire usage dans leur vie quotidienne."
        it:
          sword: "Si ciba di minerali ferrosi e talvolta di rotaie,\nche vanno poi a costituire l’armatura d’acciaio\nche protegge il suo corpo."
          shield: "Quando si evolve, l’armatura d’acciaio si stacca.\nIn passato, gli esseri umani la raccoglievano per\nutilizzarla in attività quotidiane."
        de:
          sword: "Es frisst Eisenerz und manchmal auch Bahngleise.\nSo bildet es einen Panzer aus Stahl, der seinen\nKörper schützt."
          shield: "Stollunior wirft seinen Stahlpanzer ab, wenn es\nsich entwickelt. Früher sammelten Menschen\ndiesen auf und nutzten ihn für Alltagszwecke."
        es:
          sword: "Se alimenta de minerales de hierro o, en\nocasiones, de vías de tren para producir la\ncoraza de acero que le protege el cuerpo."
          shield: "Antiguamente se recogía la coraza de acero\nque este Pokémon desprende al evolucionar\ny se empleaba para distintos usos."
        ko:
          sword: "철광석을 먹거나 가끔은\n철도의 레일을 먹고\n몸을 지키는 강철 갑옷을 만든다."
          shield: "진화할 때 강철의 갑옷이\n떨어진다. 옛날 사람들은 주워서\n일상생활에서 유용하게 사용했다."
        zh_simp:
          sword: "食用铁矿石，偶尔也会吃\n铁路的轨道，从而打造出\n保护身体的钢铁盔甲。"
          shield: "进化的时候，钢铁盔甲会\n全部脱落。人们曾经\n将其捡来活用于生活。"
        zh_trad:
          sword: "保護牠身體的鋼鐵盔甲，\n是由牠吃下的鐵礦石以及\n偶爾吃下的鐵軌所製成的。"
          shield: "進化時身上的鋼鐵盔甲\n會脫落。以前的人會把\n它撿起來用在生活上。"
lairon:
  species_id: 305
  names:
    jp_kana: コドラ
    jp_kanji: コドラ
    en: Lairon
    fr: Galegon
    it: Lairon
    de: Stollrak
    es: Lairon
    ko: 갱도라
    zh_simp: 可多拉
    zh_trad: 可多拉
  forms:
    lairon:
      form_id: 0
      base_stats:
        hp: 60
        attack: 90
        defense: 140
        special_attack: 50
        special_defense: 50
        speed: 40
      evs_yield:
        hp: 0
        attack: 0
        defense: 2
        special_attack: 0
        special_defense: 0
