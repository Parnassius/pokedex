        - electric
      egg_groups:
        - field
      abilities:
        - rivalry
        - intimidate
      hidden_ability: guts
      descriptions:
        jp_kana:
          sword: "とうしのうりょくを　もつ　ポケモン。\nあつい　かべの　むこうに　かくれる\nえものを　たちまち　みつけだす。"
          shield: "とうしは　でんきエネルギーを　ひどく\nしょうもうするため　ちょうじかん\nねむり　エネルギーを　たくわえる。"
        jp_kanji:
          sword: "透視能力を　もつ　ポケモン。\n厚い　壁の　向こうに　隠れる\n獲物を　たちまち　見つけだす。"
          shield: "透視は　電気エネルギーを　ひどく\n消耗するため　長時間　眠り\nエネルギーを　蓄える。"
        en:
          sword: "Luxray can see through solid objects. It will\ninstantly spot prey trying to hide behind walls,\neven if the walls are thick."
          shield: "Seeing through solid objects uses up a lot of\nLuxray’s electricity, so the Pokémon sleeps for\nlong periods of time to store up energy."
        fr:
          sword: "Sa capacité à voir à travers la matière lui\npermet de repérer en un instant des proies\ncachées derrière un mur épais."
          shield: "Il dort beaucoup pour récupérer la quantité\nd’énergie électrique énorme qu’il consomme\nafin de voir à travers la matière."
        it:
          sword: "Grazie all’abilità radioscopica di cui è dotato,\npuò individuare all’istante le prede nascoste\noltre spesse pareti."
          shield: "La sua visione radioscopica consuma enormi\nquantità di energia elettrica, che Luxray recupera\ndormendo per lunghi periodi."
        de:
          sword: "Dieses Pokémon verfügt über einen Röntgenblick.\nSo kann es im Nu Beute aufspüren, selbst wenn\nsich diese hinter dicken Wänden versteckt."
          shield: "Der Einsatz seines Röntgenblicks verbraucht sehr\nviel Elektrizität. Luxtra gewinnt diese zurück,\nindem es lange schläft."
        es:
          sword: "Tiene la capacidad de ver a través de cualquier\ncosa. Encuentra enseguida su presa, aunque se\noculte tras una pared de gran grosor."
          shield: "Duerme durante largos períodos para recuperar\nla enorme cantidad de electricidad que consume\nal usar su capacidad para ver a través de objetos."
        ko:
          sword: "투시 능력을 가진 포켓몬.\n두꺼운 벽 반대편에 숨어 있는\n먹이를 순식간에 찾아낸다."
          shield: "투시는 전기 에너지를 매우 많이\n소모하기 때문에 오랜 시간\n수면을 취해서 에너지를 비축한다."
        zh_simp:
          sword: "拥有透视能力的宝可梦。\n能够立刻发现身处于\n厚厚墙壁另一侧的猎物。"
          shield: "由于透视需要消耗\n大量的电能，因此它会\n睡很长时间来积蓄能量。"
        zh_trad:
          sword: "擁有透視能力的寶可夢。\n能夠在眨眼間就發現躲在\n厚厚牆壁另一側的獵物。"
          shield: "由於透視會消耗極大量的\n電能，因此牠會花很長的\n時間睡覺，藉此儲存能量。"
