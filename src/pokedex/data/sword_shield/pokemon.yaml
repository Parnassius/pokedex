        special_attack: 3
        special_defense: 0
        speed: 0
      types:
        - psychic
        - ghost
      egg_groups:
        - undiscovered
      abilities:
        - shadow_shield
      descriptions:
        jp_kana:
          sword: "つきを　さそいし　けもの　という\nなまえを　もつ。　あらゆる　ひかりを\nエネルギーに　かえて　いきている。"
          shield: "しゅういの　ひかりを　すべて　うばい\nみずからは　まんげつの　すがたとなり\nやみよに　ひかりを　はなつ。"
        jp_kanji:
          sword: "月を　誘いし　獣　という\n名前を　もつ。　あらゆる　光を\nエネルギーに　変えて　生きている。"
          shield: "周囲から　光を　すべて　奪い\n自らは　満月の　姿となり\n闇夜に　光を　放つ。"
        en:
          sword: "Known as the Beast That Calls the Moon, this\nPokémon lives by taking in any and all light and\nconverting it into its own energy."
          shield: "It steals the light from its surroundings and then\nbecomes the full moon, showering its own light\nacross the night sky."
        fr:
          sword: "Il a pour surnom « celui qui invite la lune ».\nIl vit en transformant toutes sortes de lumière\nen énergie."
          shield: "Il capture toute la lumière qui l’entoure pour\nprendre la forme de la pleine lune et éclairer\nles ténèbres nocturnes."
        it:
          sword: "Viene chiamato “la creatura che evoca la luna”.\nConverte qualsiasi tipo di luce in energia\nper sostentarsi."
          shield: "Assorbe tutta la luce che lo circonda\nper assumere la forma di una splendente\nluna piena che illumina l’oscurità notturna."
        de:
          sword: "Ihm wurde der Name „Mondbringer“ verliehen.\nSolange es lebt, wandelt es jedes Licht in\nEnergie um."
          shield: "Es raubt seiner Umgebung all ihr Licht und nimmt\ndie Gestalt des Vollmondes an. So leuchtet es in\nder Dunkelheit der Nacht."
        es:
          sword: "Lo llaman la Criatura que Invoca a la Luna.\nConvierte cualquier forma de luz en energía\npara sustentarse."
          shield: "Devora toda la luz que haya a su alrededor y\nadopta la forma de una luna llena que ilumina la\noscura noche."
        ko:
          sword: "달을 현혹하는 짐승이라는\n이름을 가졌다. 모든 빛을\n에너지로 변환해서 살고 있다."
          shield: "주위의 빛을 모두 빼앗아\n자신 스스로 만월의 모습이 되어\n밤하늘에 빛을 발산한다."
        zh_simp:
          sword: "被称为邀引月亮之兽。\n通过将一切的光转化为\n能量来维持生命。"
          shield: "夺走四周所有的光，\n自己则变身为满月的模样，\n在黑夜中散发出光芒。"
        zh_trad:
          sword: "被稱為邀引月亮之獸。\n透過將一切的光轉化為\n能量來維持生命。"
          shield: "奪走四周所有的光，\n自己則變身為滿月的模樣，\n在黑夜中散發出光芒。"
