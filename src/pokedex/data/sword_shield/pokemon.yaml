          shield: "せかいの　どこかには　メレシーが\nたくさん　ねむる　こうみゃくがあり\nむれの　じょおうも　いるという。"
        jp_kanji:
          sword: "体に　埋まっている　宝石から\n高エネルギーの　ビームを　放ち\n襲いかかる　敵を　一掃する。"
          shield: "世界の　どこかには　メレシーが\nたくさん　眠る　鉱脈があり\n群れの　女王も　いるという。"
        en:
          sword: "When beset by attackers, Carbink wipes them all\nout by firing high-energy beams from the gems\nembedded in its body."
          shield: "It’s said that somewhere in the world, there’s\na mineral vein housing a large pack of slumbering\nCarbink. It’s also said that this pack has a queen."
        fr:
          sword: "Ce Pokémon élimine les ennemis qui l’attaquent\nen projetant un laser d’énergie généré par\nles pierres précieuses incrustées dans son corps."
          shield: "On raconte qu’il existerait quelque part dans\nle monde un filon regorgeant de Strassie,\nqui abriterait également leur reine."
        it:
          sword: "Le gemme incastonate nel suo corpo\nemettono potenti raggi energetici con cui\nspazza via i nemici che lo attaccano."
          shield: "Si dice che da qualche parte nel mondo c’è\nuna miniera in cui i Carbink dormono assieme\nalla loro regina."
        de:
          sword: "Es feuert hochenergetische Strahlen aus den\nEdelsteinen ab, mit denen sein Körper besetzt\nist, und erledigt so angreifende Gegner."
          shield: "Es heißt, irgendwo auf der Welt gäbe es eine\nGesteinsader aus schlafenden Rocara. Dort soll\nman auch ihre Königin antreffen können."
        es:
          sword: "Fulmina a sus enemigos con potentes rayos de\nenergía que dispara por las gemas que tiene\nincrustadas en el cuerpo."
          shield: "Se cree que en algún lugar de este mundo existe\nun filón rebosante de Carbink que viven bajo las\nórdenes de una reina."
        ko:
          sword: "몸에 묻어 있는 보석에서\n강한 에너지 빔을 쏘아 덤벼드는\n적을 한꺼번에 날려버린다."
          shield: "세상 어딘가에는 멜리시가\n많이 잠들어 있는 광맥이 있고\n무리의 여왕도 있다고 한다."
        zh_simp:
          sword: "从体内埋藏的宝石中发射出\n高能量的光线，将所有\n来袭的敌人都一扫而尽。"
          shield: "据说在世界上的某处，有个\n沉睡着许多小碎钻的矿脉，\n它们的女王也在那里。"
        zh_trad:
          sword: "會從嵌在身體的寶石\n發射出高能量的光線，\n將來襲的敵人一掃而盡。"
          shield: "據說在世界的某處，有個\n沉睡著許多小碎鑽的礦床，\n群體的女王也在那裡。"
goomy:
