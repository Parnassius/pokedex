          sword: "１日に　食べ物を　４００キロ\n食べないと　気がすまない。\n食べ終わると　眠ってしまう。"
          shield: "頑丈な　胃袋は　カビの\n生えたものや　腐ったものを\n食べても　壊れることはない。"
        en:
          sword: "It is not satisfied unless it eats over 880 pounds\nof food every day. When it is done eating, it\ngoes promptly to sleep."
          shield: "This Pokémon’s stomach is so strong, even eating\nmoldy or rotten food will not affect it."
        fr:
          sword: "Ronflex n’est pas satisfait tant qu’il n’a pas avalé\nses 400 kg de nourriture quotidienne. Dès qu’il\na fini, il commence une sieste pour digérer."
          shield: "L’estomac de ce Pokémon est si résistant\nqu’il peut même digérer de la nourriture avariée."
        it:
          sword: "Dopo aver trangugiato i suoi immancabili 400 kg\ndi cibo quotidiani, cade in un sonno profondo."
          shield: "Ha uno stomaco così resistente che può\ningerire anche cibo ammuffito o avariato."
        de:
          sword: "Es muss über 400 kg Nahrung am Tag fressen,\num satt zu werden. Ist es mit dem Essen fertig,\nschläft es sofort ein."
          shield: "Der Magen dieses Pokémon ist so resistent,\ndass es sogar Verschimmeltes oder Verdorbenes\nessen kann."
        es:
          sword: "No se encuentra satisfecho hasta haber ingerido\n400 kg de comida cada día. Cuando acaba de\ncomer, se queda dormido."
          shield: "Este Pokémon tiene un estómago a prueba de\nbomba, por lo que es capaz de ingerir incluso\ncomida podrida o mohosa."
        ko:
          sword: "하루에 400kg의 음식을\n먹지 않으면 성에 차지 않는다.\n다 먹으면 잠이 들어 버린다."
          shield: "위장이 튼튼해서\n곰팡이가 피거나 썩은 것을\n먹어도 배탈이 나지 않는다."
        zh_simp:
          sword: "每天不吃上４００公斤的食物\n心里就不畅快。\n吃饱了就会开始睡觉。"
          shield: "拥有一个结实的胃，\n即使吃了发霉腐烂的东西，\n也完全不会吃坏肚子。"
        zh_trad:
          sword: "每天不吃下４００公斤的食物\n絕不會善罷甘休。\n吃飽了就會開始睡覺。"
          shield: "擁有一個結實的胃，\n即使吃了發霉腐爛的東西，\n也完全不會吃壞肚子。"
  gmax_forms:
    snorlax_gigantamax:
      form_id: 999
      names:
        jp_kana: キョダイマックス
        jp_kanji: キョダイマックス
        en: Gigantamax
        fr: Gigamax
        it: Gigamax
        de: Gigadynamax
        es: Gigamax
        ko: 거다이맥스
        zh_simp: 超极巨化
        zh_trad: 超極巨化
      descriptions:
        jp_kana:
          sword: "キョダイマックス　パワーで　おなかに\nたべこぼした　タネや　からみついた\nこいし　までも　おおきくなったぞ。"
          shield: "おそろしいほどの　かいりきを　もつ。\nゆうだいな　そのすがたも　ほとんど\nうごかざること　やまの　ごとしだ。"
        jp_kanji:
          sword: "キョダイマックス　パワーで　お腹に\n食べこぼした　種や　絡みついた\n小石　までも　大きくなったぞ。"
          shield: "恐ろしいほどの　怪力を　もつ。\n雄大な　その姿も　ほとんど\n動かざること　山の　如しだ。"
        en:
          sword: "Gigantamax energy has affected stray seeds and\neven pebbles that got stuck to Snorlax, making\nthem grow to a huge size."
          shield: "Terrifyingly strong, this Pokémon is the size of\na mountain—and moves about as much as one\nas well."
        fr:
          sword: "L’énergie du Gigamax a fait pousser les graines\net les restes tombés sur son ventre, et a même\nfait grossir les cailloux pris dans son pelage."
          shield: "Il possède une force terrifiante. Son corps\ngigantesque et son inertie presque totale\nle rendent comparable à une montagne."
        it:
          sword: "L’energia del fenomeno Gigamax ha ingigantito\nperfino i semi avanzati dai suoi pasti e le\npietruzze rimaste impigliate sulla sua pancia."
          shield: "Possiede una forza fisica spaventosa.\nL’imponenza di questa forma e la sua scarsa\nmobilità lo rendono simile a una montagna."
        de:
          sword: "Die Gigadynamax-Energie ließ selbst Saatgut,\ndas ihm beim Essen auf den Bauch gepurzelt ist,\nund in seinem Fell verhedderte Kiesel wachsen."
          shield: "Es ist unheimlich stark. Seinen gewaltigen Körper\nzu bewegen, ist nahezu aussichtslos und gleicht\ndem Versuch, einen Berg zu versetzen."
        es:
          sword: "La energía del fenómeno Gigamax ha hecho que\nlas semillas y los guijarros enredados en los pelos\nde su panza alcancen grandes dimensiones."
          shield: "Posee una fuerza aterradora. Su imponente\naspecto y proverbial indolencia hacen que sea\nfácil confundirlo con una montaña."
        ko:
          sword: "거다이맥스의 파워로\n먹다가 배에 흘린 씨앗이나\n붙어 있던 돌멩이까지도 거대해졌다."
          shield: "무서울 정도의 괴력을 가졌다.\n웅대한 자태도 거의 움직이지\n않는다는 점도 마치 산과 같다."
        zh_simp:
          sword: "在超极巨化之力的影响下，\n吃东西时掉在肚子上的种子和\n黏在身上的小石子也一起变大了。"
          shield: "拥有骇人的力量。\n体型像山一样巨大，\n而且不动如山。"
        zh_trad:
          sword: "在超極巨化之力的影響下，\n吃東西時掉在肚子上的種子和\n黏在身上的小石子也一起變大了。"
          shield: "擁有駭人的力量。\n體型像山一樣巨大，\n而且不動如山。"
articuno:
  species_id: 144
  names:
    jp_kana: フリーザー
    jp_kanji: フリーザー
    en: Articuno
    fr: Artikodin
    it: Articuno
    de: Arktos
    es: Articuno
    ko: 프리져
    zh_simp: 急冻鸟
    zh_trad: 急凍鳥
  forms:
    articuno:
      form_id: 0
      base_stats:
        hp: 90
        attack: 85
        defense: 100
        special_attack: 95
        special_defense: 125
        speed: 85
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 3
        speed: 0
      types:
        - ice
        - flying
      egg_groups:
        - undiscovered
      abilities:
        - pressure
      hidden_ability: snow_cloak
      descriptions:
        jp_kana:
          sword: "あおく　うつくしい　はねは　こおりで\nできていると　いわれている。　ながい\nおを　たなびかせ　ゆきやまを　とぶ。"
          shield: "こおりを　じざいに　あやつる\nちからを　もつ。　えいきゅうとうどの\nゆきやまに　すんでいると　いう。"
        jp_kanji:
          sword: "青く　美しい　羽根は　氷で\nできていると　言われている。　長い\n尾を　たなびかせ　雪山を　飛ぶ。"
          shield: "氷を　自在に　操る　力を　もつ。\n永久凍土の　雪山に\n棲んでいるという。"
        en:
          sword: "It’s said that this Pokémon’s beautiful blue wings\nare made of ice. Articuno flies over snowy\nmountains, its long tail fluttering along behind it."
          shield: "This Pokémon can control ice at will. Articuno\nis said to live in snowy mountains riddled\nwith permafrost."
        fr:
          sword: "On raconte que ses belles plumes bleues sont\nfaites de glace. Sa longue queue flotte au vent\nlorsqu’il vole au-dessus des monts enneigés."
          shield: "Il possède le pouvoir de contrôler la glace.\nSelon les dires, il vivrait sur les sommets\nrecouverts de neiges éternelles."
        it:
          sword: "Si dice che le sue splendide ali azzurre siano\ncomposte di ghiaccio. Vola fra le montagne\ninnevate facendo ondeggiare la sua lunga coda."
          shield: "È in grado di controllare il ghiaccio a suo\npiacimento. Si dice che viva sulle montagne\ninnevate nelle aree coperte da permafrost."
        de:
          sword: "Seine wunderschönen blauen Flügel sollen aus Eis\nbestehen. Es fliegt über schneebedeckte Berge,\nwährend sein langer Schweif hinter ihm flattert."
          shield: "Arktos ist imstande, Eis zu manipulieren.\nMan sagt, es lebe in schneebedeckten Bergen,\nwo ewiger Winter herrscht."
        es:
          sword: "Se dice que sus bellas alas azules se componen\nde hielo. Vuela en torno a las montañas nevadas\ncon su larga cola al viento."
          shield: "Posee el poder de controlar el hielo a su antojo.\nSe dice que este Pokémon habita en montañas\nde nieves perpetuas."
        ko:
          sword: "푸르고 아름다운 날개는 얼음으로\n되어 있다고 전해진다. 긴 꼬리를\n나부끼며 설산 위를 난다."
          shield: "얼음을 자유자재로 조종하는 힘을\n가졌다. 영구 동토의 설산에\n살고 있다고 한다."
        zh_simp:
          sword: "据说它那蓝色的美丽羽毛\n是由冰构成的。会飘曳着\n长尾巴飞过茫茫雪山。"
          shield: "拥有能够自由操纵冰\n的能力。据说它栖息在\n永久冻土的雪山。"
        zh_trad:
          sword: "藍色的美麗羽毛據說是\n由冰構成的。會搖曳著\n長長的尾巴飛過雪山。"
          shield: "擁有能自在操縱冰的\n能力。據說是棲息在\n永凍之地的雪山中。"
    articuno_galarian_form:
      form_id: 1
      names:
        jp_kana: ガラルのすがた
        jp_kanji: ガラルのすがた
        en: Galarian Form
        fr: Forme de Galar
        it: Forma di Galar
        de: Galar-Form
        es: Forma de Galar
        ko: 가라르의 모습
        zh_simp: 伽勒尔的样子
        zh_trad: 伽勒爾的樣子
      base_stats:
        hp: 90
        attack: 85
        defense: 85
        special_attack: 125
        special_defense: 100
        speed: 95
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 3
        special_defense: 0
        speed: 0
      types:
        - psychic
        - flying
      egg_groups:
        - undiscovered
      abilities:
        - competitive
      descriptions:
        jp_kana:
          sword: "サイコパワーで　つくった　はねの\nかたちの　やいばは　ぶあつい\nてっぱんも　かみのように　きりさく。"
          shield: "こおりついたかのように　からだの\nじゆうを　うばう　ビームを　うちだす\nフリーザーの　なを　もつ　ポケモン。"
        jp_kanji:
          sword: "サイコパワーで　つくった　羽根の\n形の　刃は　ぶ厚い\n鉄板も　紙のように　切り裂く。"
          shield: "凍りついたかのように　体の\n自由を　奪う　ビームを　撃ちだす\nフリーザーの　名を　もつ　ポケモン。"
        en:
          sword: "Its feather-like blades are composed of psychic\nenergy and can shear through thick iron sheets as\nif they were paper."
          shield: "Known as Articuno, this Pokémon fires beams that\ncan immobilize opponents as if they had been\nfrozen solid."
        fr:
          sword: "Les lames en forme de plumes qu’il crée grâce\nà ses pouvoirs psychiques peuvent trancher une\népaisse plaque de fer comme si c’était du papier."
          shield: "Artikodin est le nom qui a été choisi pour\nce Pokémon capable de projeter un rayon\nqui immobilise sa cible comme s’il la gelait."
        it:
          sword: "Le lame a forma di piuma che crea con i suoi\npoteri psichici sono in grado di trinciare spesse\nlastre di metallo come se fossero di carta."
          shield: "È conosciuto con il nome di Articuno.\nEmette un raggio che limita i movimenti del\nbersaglio, come se lo congelasse."
        de:
          sword: "Seine mit Psycho-Kräften erschaffenen Klingen,\ndie wie Federn geformt sind, können dicke\nEisenplatten zerschneiden, als wären sie Papier."
          shield: "Dieses als Arktos bekannte Pokémon feuert einen\nStrahl ab, der seinen Gegner bewegungsunfähig\nmacht, als wäre er zu Eis erstarrt."
        es:
          sword: "Las gruesas cuchillas en forma de pluma creadas\na partir de energía psíquica son capaces de\ncortar una lámina de acero como si fuera papel."
          shield: "Su nombre evoca el frío ártico, tal vez por los\nrayos que emite y que inmovilizan a sus rivales\ncomo si estuvieran congelados."
        ko:
          sword: "사이코 파워로 만들어진\n깃털 형태의 칼날은 두꺼운 철판도\n종잇장처럼 베어버린다."
          shield: "얼어붙은 듯 몸의 자유를\n빼앗는 빔을 쏘는 프리져라는\n이름을 가진 포켓몬이다."
        zh_simp:
          sword: "用精神力量制作出的\n羽毛形刀刃能像裁纸般\n轻松地劈开厚厚的铁板。"
          shield: "拥有急冻鸟之名的宝可梦。\n发射出的光束能让对方的\n身体像结冰一样失去自由。"
        zh_trad:
          sword: "用精神力量製作的羽毛狀\n利刃，就連厚厚的鐵板都\n能像紙片般割開。"
          shield: "擁有急凍鳥之名的寶可夢。\n射出的光束會讓對方的\n身體像結凍似地失去自由。"
