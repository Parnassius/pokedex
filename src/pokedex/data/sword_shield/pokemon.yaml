          sword: "ちょっとでも　かおが　よごれると\nみずあび。　からだの　よごれは\nあまり　きに　していないみたい。"
          shield: "こうきしんおうせいな　ポケモン。\nなんでも　くちびるで　ふれてみて\nすきか　きらいかを　きめている。"
        jp_kanji:
          sword: "ちょっとでも　顔が　汚れると\n水浴び。　体の　汚れは\nあまり　気にしていないみたい。"
          shield: "好奇心旺盛な　ポケモン。\nなんでも　唇で　触れてみて\n好きか　嫌いかを　決めている。"
        en:
          sword: "If its face gets even slightly dirty, Smoochum will\nbathe immediately. But if its body gets dirty,\nSmoochum doesn’t really seem to care."
          shield: "This is a very curious Pokémon. Smoochum\ndecides what it likes and dislikes by touching\nthings with its lips."
        fr:
          sword: "Quand il s’aperçoit que son visage est sale,\nil le lave à l’eau, mais la propreté du reste\nde son corps ne semble pas le préoccuper."
          shield: "Ce Pokémon très curieux touche tout et n’importe\nquoi avec ses lèvres pour déterminer ce qu’il aime\net ce qu’il déteste."
        it:
          sword: "Si sciacqua il volto alla minima traccia\ndi sporcizia. Pare non presti la stessa\nattenzione al resto del corpo."
          shield: "È un Pokémon traboccante di curiosità.\nStabilisce cosa gli piace e cosa no\nappoggiandovi le labbra."
        de:
          sword: "Wird Kussillas Gesicht auch nur ein bisschen\nschmutzig, wäscht es sich sofort. Schmutz am\nRest seines Körpers scheint es nicht zu stören."
          shield: "Ein äußerst neugieriges Pokémon, das alles mit\nseinen Lippen berührt, um herauszufinden, ob es\netwas mag oder nicht."
        es:
          sword: "En cuanto se le ensucia la cara, aunque sea un\npoco, se la lava con agua. En el resto del cuerpo,\nla suciedad no parece importarle mucho."
          shield: "Este Pokémon rebosante de curiosidad lo toca\ntodo con los labios para determinar qué cosas\nle gustan y cuáles no."
        ko:
          sword: "조금이라도 얼굴이 지저분해지면\n물로 씻는다. 몸은 지저분해져도\n별로 신경 쓰지 않는 듯하다."
          shield: "호기심이 왕성한 포켓몬이다.\n뭐든지 입술에 대보고\n좋은지 싫은지 판단한다."
        zh_simp:
          sword: "只要稍微弄脏了脸\n就会立刻去洗干净。\n身上脏了倒是不太在意。"
          shield: "好奇心旺盛的宝可梦。\n不管是什么都会试着用\n嘴唇去触碰，确认是否喜欢。"
        zh_trad:
          sword: "只要稍微弄髒了臉，就會\n馬上去用水沖乾淨。但對於\n身體的髒污似乎就不太在意。"
          shield: "好奇心旺盛的寶可夢。對於\n任何東西都會先用嘴唇去觸碰，\n再決定是喜歡還是討厭這東西。"
