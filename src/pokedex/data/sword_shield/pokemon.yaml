necrozma:
  species_id: 800
  names:
    jp_kana: ネクロズマ
    jp_kanji: ネクロズマ
    en: Necrozma
    fr: Necrozma
    it: Necrozma
    de: Necrozma
    es: Necrozma
    ko: 네크로즈마
    zh_simp: 奈克洛兹玛
    zh_trad: 奈克洛茲瑪
  forms:
    necrozma:
      form_id: 0
      base_stats:
        hp: 97
        attack: 107
        defense: 101
        special_attack: 127
        special_defense: 89
        speed: 79
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 2
        special_defense: 0
        speed: 0
      types:
        - psychic
      egg_groups:
        - undiscovered
      abilities:
        - prism_armor
      descriptions:
        jp_kana:
          sword: "ひかりを　エネルギーに　いきている。\nちかで　ねむっていたため　たいないに\nたまった　ふじゅんぶつで　くろずむ。"
          shield: "いきるために　ひかりを　もとめて\nあばれまわる。　レーザーこうせんを\nはなち　あらゆるものを　きりきざむ。"
        jp_kanji:
          sword: "光を　エネルギーに　生きている。\n地下で　眠っていたため　体内に\n溜まった　不純物で　黒ずむ。"
          shield: "生きるために　光を　求めて\n暴れまわる。　レーザー光線を\n放ち　あらゆるものを　切り刻む。"
        en:
          sword: "It survives by absorbing light. After a long time\nspent slumbering underground, impurities\naccumulated within it, causing its body to darken."
          shield: "It needs light to survive, and it goes on a\nrampage seeking it out. Its laser beams will\ncut anything to pieces."
        fr:
          sword: "La lumière est sa source d’énergie. Les impuretés\nque son corps a accumulées en dormant sous terre\nlui ont donné cette couleur noire."
          shield: "Sa quête de lumière, sa source de vie, le rend\nviolent. Il détruit tout sur son passage avec\nses rayons laser."
        it:
          sword: "La luce è la sua fonte d’energia. Deve il colore\nnero del corpo alle impurità accumulatesi al suo\ninterno mentre giaceva addormentato sottoterra."
          shield: "Cerca con furia la luce di cui si nutre,\ndistruggendo ogni cosa al suo passaggio\ncon i suoi micidiali raggi laser."
        de:
          sword: "Es zieht seine Lebensenergie aus Licht. Weil es in\nder Erde ruhte, haben sich in seinem Körper\nUnreinheiten angesammelt und es wurde schwarz."
          shield: "Auf der Suche nach Licht, das es zum Überleben\nbenötigt, wütet es umher. Es setzt Laserstrahlen\nfrei, die alles zerteilen."
        es:
          sword: "La luz es su fuente de energía. Se volvió negro\ndebido a las impurezas acumuladas en su cuerpo\nmientras yacía en el interior de la tierra."
          shield: "Con sus rayos láser destruye todo a su paso en\nbusca de luz para sustentarse."
        ko:
          sword: "빛을 에너지원으로 하여 살고 있다.\n지하에 잠들어 있었기 때문에 체내에\n쌓인 불순물에 의해 검게 변했다."
          shield: "살기 위해 빛을 찾아 날뛰며\n돌아다닌다. 레이저 광선을 쏘아\n온갖 것을 산산조각 낸다."
        zh_simp:
          sword: "光芒是它维持生命的能量。\n由于一直沉睡于地下，身体\n因积存在体内的杂质而发黑。"
          shield: "为生存而发狂般地寻找着光。\n会发射出激光，\n将所有东西切成碎片。"
        zh_trad:
          sword: "光芒是牠維持生命的能量。\n由於一直沉睡在地下，身體\n因積存在體內的雜質而發黑。"
          shield: "為生存而發狂般地尋找著光。\n會發射出雷射光，\n將所有東西切成碎片。"
    necrozma_dusk_mane:
      form_id: 1
      names:
        jp_kana: たそがれのたてがみ
        jp_kanji: たそがれのたてがみ
        en: Dusk Mane
        fr: Crinière du Couchant
        it: Criniera del Vespro
        de: Abendmähne
        es: Melena Crepuscular
        ko: 황혼의 갈기
        zh_simp: 黄昏之鬃
        zh_trad: 黃昏之鬃
      base_stats:
        hp: 97
        attack: 157
        defense: 127
        special_attack: 113
        special_defense: 109
        speed: 77
      evs_yield:
        hp: 0
        attack: 3
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - psychic
        - steel
      egg_groups:
        - undiscovered
      abilities:
        - prism_armor
      descriptions:
        jp_kana:
          sword: "ソルガレオを　しはいした　すがた。\nどうもうで　せなかと　ししの　ツメで\nえものを　やつざきにする。"
          shield: "ソルガレオに　とりつき　むじんぞうに\nわきあがる　エネルギーを　むりやり\nきゅうしゅうして　あばれまわる。"
        jp_kanji:
          sword: "ソルガレオを　支配した　姿。\n獰猛で　背中と　四肢の　ツメで\n獲物を　八つ裂きにする。"
          shield: "ソルガレオに　とりつき　無尽蔵に\n湧きあがる　エネルギーを　無理やり\n吸収して　暴れまわる。"
        en:
          sword: "When it dominates Solgaleo, it takes on this\nform. It’s a vicious Pokémon, mangling prey with\nits many claws—including those on its back."
          shield: "Necrozma has attached itself to Solgaleo.\nIt siphons away its host’s limitless energy,\nexploiting that energy to fuel a rampage."
        fr:
          sword: "C’est la forme qu’il prend quand il absorbe\nSolgaleo. Féroce, il tranche ses proies\navec les griffes qui sont sur son dos et ses pattes."
          shield: "Il a pris possession du corps de Solgaleo\net absorbe de force son énergie incommensurable\ntout en semant la terreur autour de lui."
        it:
          sword: "Assume questa forma quando controlla Solgaleo.\nMolto feroce, fa a brandelli le prede con gli\nartigli che ha sulla schiena e sulle zampe."
          shield: "Si impossessa di Solgaleo e assorbe la sua\ninesauribile energia con la forza, seminando\novunque caos e distruzione."
        de:
          sword: "In dieser Form wird Solgaleo von Necrozma\nkontrolliert. Es reißt Gegner mit den Krallen an\nseinen Pfoten und auf seinem Rücken in Stücke."
          shield: "Necrozma kontrolliert Solgaleo und verzehrt\nmaßlos dessen unerschöpfliche Energiemassen.\nDiese bringen es dazu, wild umherzuwüten."
        es:
          sword: "Forma que adopta tras someter a Solgaleo. Se\nlanza sobre su rival y lo desgarra sin piedad con\nlas garras de sus patas y las que salen del lomo."
          shield: "Tras someter a Solgaleo, Necrozma absorbe por\nla fuerza su energía ilimitada y siembra el caos y\nla destrucción por doquier."
        ko:
          sword: "솔가레오를 지배한 모습.\n매우 사나워서 등과 사지에 있는 발톱으로\n먹이를 갈가리 찢는다."
          shield: "솔가레오를 장악해서\n끝없이 끓어오르는 에너지를\n강제로 흡수하고 날뛴다."
        zh_simp:
          sword: "支配着索尔迦雷欧的样子。\n性格残暴，会用背部与四肢的\n爪子将猎物大卸八块。"
          shield: "附在索尔迦雷欧身上，\n强行吸取它无限涌出的\n能量，四处造成破坏。"
        zh_trad:
          sword: "支配著索爾迦雷歐的樣子。\n性情凶猛，會用背部與四肢\n的爪子將獵物大卸八塊。"
          shield: "附在索爾迦雷歐身上，\n強行吸取牠無限湧出的\n能量，四處造成破壞。"
    necrozma_dawn_wings:
      form_id: 2
      names:
        jp_kana: あかつきのつばさ
        jp_kanji: あかつきのつばさ
        en: Dawn Wings
        fr: Ailes de l’Aurore
        it: Ali dell’Aurora
        de: Morgenschwingen
        es: Alas del Alba
        ko: 새벽의 날개
        zh_simp: 拂晓之翼
        zh_trad: 拂曉之翼
      base_stats:
        hp: 97
        attack: 113
        defense: 109
        special_attack: 157
        special_defense: 127
        speed: 77
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 3
        special_defense: 0
        speed: 0
      types:
        - psychic
        - ghost
      egg_groups:
        - undiscovered
      abilities:
        - prism_armor
      descriptions:
        jp_kana:
          sword: "ルナアーラの　すべてを　しはいして\nひかりエネルギーを　きょうせいてきに\nほうしゅつさせて　すいとっている。"
          shield: "ルナアーラに　とりついた　すがた。\nきょうぼうになり　すべてを　てきと\nみなして　レーザーで　やきつくす。"
        jp_kanji:
          sword: "ルナアーラの　すべて　支配して\n光エネルギーを　強制的に\n放出させて　吸い取っている。"
          shield: "ルナアーラに　とりついた　姿。\n狂暴になり　すべてを　敵と\nみなして　レーザーで　焼きつくす。"
        en:
          sword: "Necrozma has subjugated Lunala entirely, forcing\nthe unfortunate Pokémon to emit its light energy\nfor Necrozma to consume."
          shield: "When Necrozma latches on to Lunala, it becomes\nvicious, seeing enemies everywhere it looks.\nIt will burn the world with lasers."
        fr:
          sword: "Il contrôle désormais entièrement Lunala,\net l’oblige à libérer toute sa lumière afin\nde l’absorber."
          shield: "Il prend cette forme après avoir absorbé Lunala.\nFurieux, il considère tous les êtres autour de lui\ncomme des ennemis et les brûle avec son laser."
        it:
          sword: "Controlla totalmente Lunala e lo costringe\na rilasciare energia luminosa per assorbirla."
          shield: "Assume questa forma quando si impossessa di\nLunala. Si scatena considerando chiunque come\nsuo nemico e incenerendolo con i raggi laser."
        de:
          sword: "In dieser Form unterliegt Lunala vollständig der\nKontrolle von Necrozma. Es zwingt Lunala dazu,\nLichtenergie freizusetzen, um sie zu absorbieren."
          shield: "Necrozma kontrolliert in dieser Form Lunala.\nIn seiner Wut sieht es alle als Feinde und feuert\nseinen einäschernden Laser wahllos auf sie ab."
        es:
          sword: "Tras someter a Lunala, Necrozma lo obliga a\nliberar su energía luminosa para absorberla."
          shield: "Tras someter a Lunala, Necrozma ve enemigos a\ndiestro y siniestro. Iracundo, lanza sus rayos láser\npara fulminarlo todo de forma indiscriminada."
        ko:
          sword: "루나아라의 모든 것을 지배해서\n빛 에너지를 강제로\n방출시킨 다음 흡수하고 있다."
          shield: "루나아라를 장악한 모습이다.\n흉포해져 모든 것을 적으로\n간주하고 레이저로 태워버린다."
        zh_simp:
          sword: "将露奈雅拉完全支配，\n强行让它释放出光能，\n并把光能吸收。"
          shield: "附在露奈雅拉身上的样子。\n变得更加凶暴，将万物视为\n敌人，会用激光烧尽一切。"
        zh_trad:
          sword: "將露奈雅拉完全支配，\n強行讓牠釋放出光能，\n並把光能吸收。"
          shield: "附在露奈雅拉身上的樣子。\n變得更加凶暴，將萬物視為\n敵人，會用雷射燒盡一切。"
