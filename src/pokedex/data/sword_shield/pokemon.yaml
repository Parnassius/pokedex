        en:
          sword: "While hunting for prey, Zweilous wanders its\nterritory, its two heads often bickering over\nwhich way to go."
          shield: "Their two heads will fight each other over a\nsingle piece of food. Zweilous are covered in\nscars even without battling others."
        fr:
          sword: "Il cherche des proies en arpentant son territoire.\nSes deux têtes se disputent souvent pour savoir\nquelle direction prendre."
          shield: "Ses deux têtes se disputent la même proie.\nIl est toujours couvert de blessures, même\ns’il n’a affronté personne."
        it:
          sword: "Perlustra il suo territorio in cerca di cibo. Le due\nteste si trovano spesso in disaccordo quando\ndevono decidere in che direzione andare."
          shield: "Le due teste si rubano il cibo a vicenda.\nÈ sempre ricoperto di ferite, anche se non\nha lottato con nessuno."
        de:
          sword: "Es durchstreift sein Revier auf der Suche nach\nBeute. Die zwei Köpfe streiten sich oft darüber,\nwelche Richtung sie einschlagen sollten."
          shield: "Sein Körper weist immer Narben auf, selbst wenn\nes gar nicht gekämpft hat. Die beiden Köpfe\nnehmen sich ständig gegenseitig das Futter weg."
        es:
          sword: "Rastrea su territorio en busca de alimento.\nA menudo sus dos cabezas son incapaces de\nacordar hacia qué dirección avanzar."
          shield: "Las dos cabezas se disputan la comida con\nbrutalidad. Por eso siempre está cubierto de\nheridas, aunque no haya combatido contra nadie."
        ko:
          sword: "영역을 돌아다니며\n먹이를 찾는다. 2개의 머리는\n어느 쪽으로 갈지로 자주 다툰다."
          shield: "1개의 먹이를 2개의 머리가\n서로 뺏는다. 누구랑 싸운 것도\n아닌데 언제나 상처투성이다."
        zh_simp:
          sword: "在自己的领地走来走去，\n寻找食物。２个头时常会\n为了前进的方向而争吵。"
          shield: "２个头会争抢同一个食物。\n明明没有去和别人战斗，\n却总是遍体鳞伤。"
        zh_trad:
          sword: "在自己的領地走來走去，\n尋找食物。２個頭時常會\n為了前進的方向而爭吵。"
          shield: "２個頭會爭搶同一個食物。\n明明沒有去和別人戰鬥，\n卻總是遍體鱗傷。"
