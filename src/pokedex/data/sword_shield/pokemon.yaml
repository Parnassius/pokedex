        special_defense: 0
        speed: 0
      types:
        - ground
        - ghost
      egg_groups:
        - mineral
        - amorphous
      abilities:
        - wandering_spirit
      descriptions:
        jp_kana:
          sword: "のろいが　きざまれた　ねんどばんが\nデスマスに　とりついた。　おんねん\nパワーを　すいとっていると　いう。"
          shield: "つよい　うらみを　もつ　たましいに\nこだいの　ねんどばんが　ひきよせられ\nポケモンに　なったと　いわれる。"
        jp_kanji:
          sword: "呪いが　刻まれた　粘土板が\nデスマスに　憑りついた。　怨念\nパワーを　吸いとっていると　いう。"
          shield: "強い　恨みを　もつ　魂に\n古代の　粘土板が　引き寄せられ\nポケモンに　なったと　いわれる。"
        en:
          sword: "A clay slab with cursed engravings took\npossession of a Yamask. The slab is said\nto be absorbing the Yamask’s dark power."
          shield: "It’s said that this Pokémon was formed when an\nancient clay tablet was drawn to a vengeful spirit."
        fr:
          sword: "Tutafeh a pris possession d’une tablette en argile\noù est gravée une malédiction. On dit qu’il aspire\nla rancune des autres pour en faire sa force."
          shield: "On pense que ce Pokémon est né d’une âme\nvengeresse aspirée par une ancienne tablette\nd’argile."
        it:
          sword: "Una tavoletta d’argilla su cui è incisa una\nmaledizione si è impossessata di lui. Si dice\nche assorba energia dal rancore."
          shield: "Si dice che questo Pokémon sia nato da un’antica\ntavoletta di argilla che si è impossessata di\nun’anima tormentata dal rancore."
        de:
          sword: "Eine Tontafel, auf der ein Fluch eingeritzt wurde,\nhat Besitz von diesem Makabaja ergriffen. Man\nsagt, es ziehe seine Kraft aus dem Groll anderer."
          shield: "Es heißt, dieses Pokémon sei entstanden, als eine\nverbitterte Seele Besitz von einer uralten Tontafel\nergriff."
        es:
          sword: "Yamask ha sido poseído por una tabla de arcilla\nsobre la que pesa una maldición. Se dice que\nabsorbe y se nutre de rencor e inquina."
          shield: "Se dice que este Pokémon no es sino un alma\nlastrada por un intenso rencor, atraída por una\nantigua tabla de arcilla."
        ko:
          sword: "저주가 새겨진 점토판이\n데스마스에 씌었다. 원념의\n파워를 흡수했다고 전해진다."
          shield: "강한 원한을 가진 영혼이\n고대의 점토판에 깃들어\n포켓몬이 되었다고 전해진다."
        zh_simp:
          sword: "刻有诅咒的黏土板\n附在了哭哭面具上。\n据说会吸收怨念的能量。"
          shield: "据说它是古代黏土板\n被带有强烈怨念的灵魂\n吸引后诞生的宝可梦。"
        zh_trad:
          sword: "刻有詛咒的黏土板\n附在了哭哭面具上。\n據說會吸收怨念的能量。"
          shield: "據說牠是古代黏土板\n被帶有強烈怨念的靈魂\n吸引後誕生的寶可夢。"
