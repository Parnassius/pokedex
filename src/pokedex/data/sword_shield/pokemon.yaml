      descriptions:
        jp_kana:
          sword: "いっちゅうやで　１００００キロの\nきょりを　かけぬける　すがたは\nおおくの　ひとを　みりょうしてきた。"
          shield: "むかしから　おおくの　ひとを\nとりこにした　うつくしい　ポケモン。\nとぶように　かろやかに　はしる。"
        jp_kanji:
          sword: "一昼夜で　１００００キロの\n距離を　駆けぬける　姿は\n多くの　人を　魅了してきた。"
          shield: "昔から　多くの　人を\n虜にした　美しい　ポケモン。\n飛ぶように　軽やかに　走る。"
        en:
          sword: "The sight of it running over 6,200 miles\nin a single day and night has captivated\nmany people."
          shield: "A Pokémon that has long been admired for its\nbeauty. It runs agilely as if on wings."
        fr:
          sword: "De nombreuses personnes ont été charmées\nà la vue de ce Pokémon parcourant 10 000 km\nen 24 heures."
          shield: "Ce Pokémon est admiré depuis toujours pour\nsa beauté. Il court avec tellement de légèreté\nqu’on dirait qu’il vole."
        it:
          sword: "Sono molte le persone affascinate dalla capacità\ndi questo Pokémon di correre per una distanza\ndi 10.000 km in 24 ore."
          shield: "Da sempre ammirato per la sua bellezza,\ncorre veloce come se avesse le ali."
        de:
          sword: "Viele Trainer sind davon fasziniert, dass dieses\nPokémon innerhalb eines Tages 10 000 km\nzurücklegen kann."
          shield: "Dieses Pokémon verzaubert die Menschen seit\nUrzeiten mit seiner Schönheit. Obendrein ist es\nschnell und sehr wendig."
        es:
          sword: "Es capaz de correr 10 000 km al día, lo que deja\nembelesados a todos los que lo ven pasar."
          shield: "Muchos han quedado cautivados por su belleza\ndesde la antigüedad. Corre ágilmente como si\ntuviera alas."
        ko:
          sword: "하루 만에 10000km의\n거리를 달리는 모습은\n많은 사람을 매료시켜 왔다."
          shield: "옛날부터 많은 사람의 마음을\n사로잡은 아름다운 포켓몬이다.\n마치 나는 것처럼 경쾌하게 달린다."
        zh_simp:
          sword: "只需要一昼夜时间就能\n跑完１００００公里的身影\n令许多人为之沉醉。"
          shield: "从古时候起就是俘获了\n众多人心的美丽宝可梦。\n能像飞一样轻巧地奔跑。"
        zh_trad:
          sword: "只需要一晝夜時間就能\n跑完１００００公里的身影\n令許多人為之沉醉。"
          shield: "從古時候起就是擄獲\n眾多人心的美麗寶可夢。\n能像飛一樣輕盈地奔跑。"
poliwag:
  species_id: 60
  names:
