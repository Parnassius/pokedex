        jp_kana:
          sword: "ピカピカの　おうごんの　からだ。\nもはや　にんげんだった　ことは\nおもいだすことは　ないと　いう。"
          shield: "ふるい　おはかの　かべに　おうさまの\nとみの　しょうちょう　として\nえがかれて　いることが　おおい。"
        jp_kanji:
          sword: "ピカピカの　黄金の　体。\nもはや　人間だった　ことは\n思い出すことは　ないと　いう。"
          shield: "古い　お墓の　壁に　王様の\n富の　象徴　として\n描かれて　いることが　多い。"
        en:
          sword: "This Pokémon has a body of sparkling gold.\nPeople say it no longer remembers that it was\nonce human."
          shield: "There are many depictions of Cofagrigus\ndecorating ancient tombs. They’re symbols\nof the wealth that kings of bygone eras had."
        fr:
          sword: "Son corps en or brille de mille feux.\nOn raconte qu’il ne se souvient désormais plus\nde l’époque où il était un être humain."
          shield: "On le voit souvent représenté sur les murs\ndes vieilles sépultures des rois en tant que\nsymbole de leur richesse."
        it:
          sword: "È ricoperto di oro scintillante. Si dice che ormai\nnon ricordi più di essere stato un essere umano."
          shield: "Viene spesso raffigurato sulle pareti di antichi\nsepolcri come simbolo dell’opulenza dei re."
        de:
          sword: "Echnatoll haben einen Körper aus glitzerndem\nGold. Man geht davon aus, dass sie sich nicht\nmehr an ihr Leben als Menschen erinnern können."
          shield: "Darstellungen von Echnatoll auf den Wänden\nalter Königsgräber sind ein Zeichen dafür, dass\nder dort begrabene Regent wohlhabend war."
        es:
          sword: "Su cuerpo es de rutilante oro. Se dice que ya no\nrecuerda nada de su pasado como humano."
          shield: "Aparece representado en los muros de antiguas\nsepulturas como símbolo de riqueza de reyes de\nantaño."
        ko:
          sword: "황금으로 된 반짝거리는 몸.\n자신이 인간이었다는 사실을\n이제는 기억하지 못할 것이다."
          shield: "오래된 묘지의 벽을 보면\n왕의 부를 드러내고자\n그려져 있는 경우가 많다."
        zh_simp:
          sword: "拥有闪亮亮的黄金之躯。\n据说它已再也无法记起\n自己曾是人类。"
          shield: "迭失棺象征着国王的财富，\n因此许多古墓里\n都有它的壁画。"
        zh_trad:
          sword: "擁有閃亮亮的黃金身軀。\n據說牠已再也無法記起\n自己曾經是人類。"
          shield: "死神棺象徵著國王的財富，\n因此許多古墓裡\n都有牠的壁畫。"
