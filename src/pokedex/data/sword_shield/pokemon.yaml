        jp_kana:
          sword: "ラッキーの　まねをして　タマゴに\nそっくりな　まるい　いしを　おなかの\nふくろに　いれて　だいじにしている。"
          shield: "なかよくなった　あいてには　だいじな\nまるい　いしを　かしてあげる。\nかえさないと　なきだし　おおあばれ。"
        jp_kanji:
          sword: "ラッキーの　真似をして　タマゴに\nそっくりな　まるい　石を　お腹の\n袋に　入れて　大事にしている。"
          shield: "仲良くなった　相手には　大事な\n丸い　石を　貸してあげる。\n返さないと　泣きだし　大暴れ。"
        en:
          sword: "Mimicking Chansey, Happiny will place an egg-\nshaped stone in its belly pouch. Happiny will\ntreasure this stone."
          shield: "Happiny’s willing to lend its precious round stone\nto those it’s friendly with, but if the stone isn’t\nreturned, Happiny will cry and throw a tantrum."
        fr:
          sword: "Pour imiter Leveinard, il conserve un caillou\nen forme d’œuf dans sa poche ventrale et\nen prend grand soin."
          shield: "Il prête volontiers son caillou rond à ceux\nqu’il apprécie, mais éclate en sanglots et\nse met en colère si on ne le lui rend pas."
        it:
          sword: "Imita Chansey trasportando con cura nella tasca\nventrale un sasso rotondo identico a un uovo."
          shield: "Dà in prestito il suo amato sasso a chi considera\nsuo amico, ma se non gli viene restituito piange\ne si scatena."
        de:
          sword: "Es imitiert Chaneira und legt einen eiförmigen\nStein in den Beutel an seinem Bauch. Dieser Stein\nist sein größter Schatz."
          shield: "Seinen kostbaren, runden Stein leiht Wonneira\nnur denjenigen, die es mag. Bekommt es diesen\nnicht zurück, tobt es und weint bitterlich."
        es:
          sword: "Lleva en la bolsa de su panza una roca con forma\nde huevo que cuida con esmero, imitando a\nChansey."
          shield: "Les deja su preciada roca redonda a aquellos\ncon los que se lleva bien. Si no se la devuelven,\nse echa a llorar, presa de una rabieta."
        ko:
          sword: "럭키를 흉내 내어 알처럼 생긴\n둥근 돌을 배의 주머니에 넣고\n소중히 보관한다."
          shield: "친해진 상대에게는 소중하게 여기는\n둥근 돌을 빌려준다. 돌려주지\n않으면 울고불고하다가 난폭해진다."
        zh_simp:
          sword: "模仿吉利蛋，把很像蛋的\n浑圆石头放入腹部的\n袋子中用心保管着。"
          shield: "会把自己珍贵的浑圆石头\n借给关系变得很要好的对象。\n如果不还给它，它便会大哭大闹。"
        zh_trad:
          sword: "會模仿吉利蛋的樣子，\n把很像蛋的渾圓石頭放\n在腹部的袋子裡寶貝著。"
          shield: "會把寶貝的渾圓石頭借給\n變得友好的對象。如果不\n還給牠的話，就會哭著大鬧。"
