        - illusion
      descriptions:
        jp_kana:
          sword: "なかまおもいの　ポケモン。\nおそろしい　まぼろしを　みせて\nすみかや　むれを　まもるのだ。"
          shield: "こどくなトレーナーは　ゾロアークに\nまぼろしを　みせるように　めいじて\nひとりの　さみしさを　まぎらわす。"
        jp_kanji:
          sword: "仲間想いの　ポケモン。\n恐ろしい　幻を　見せて\nすみかや　群れを　守るのだ。"
          shield: "孤独なトレーナーは　ゾロアークに\n幻を　見せるように　命じて\nひとりの　さみしさを　紛らわす。"
        en:
          sword: "This Pokémon cares deeply about others of its\nkind, and it will conjure terrifying illusions to\nkeep its den and pack safe."
          shield: "Seeking to ease the burden of their solitude,\nlonely Trainers tell Zoroark to show illusions\nto them."
        fr:
          sword: "Doté d’un grand sens de la camaraderie,\nce Pokémon peut créer des illusions effrayantes\npour protéger son habitat et ses congénères."
          shield: "Les Dresseurs en manque de compagnie\nordonnent à Zoroark de leur montrer\nune illusion pour tromper leur solitude."
        it:
          sword: "Tiene molto ai suoi simili e protegge la tana\ne il branco creando miraggi spaventosi."
          shield: "Gli Allenatori tristi e soli chiedono a Zoroark\ndi mostrare loro dei miraggi che allevino\nla loro solitudine."
        de:
          sword: "Seine Artgenossen liegen ihm sehr am Herzen.\nZoroark beschützt sein Revier und sein Rudel,\nindem es furchteinflößende Illusionen erzeugt."
          shield: "Trainer, denen es an Gesellschaft fehlt, weisen\nZoroark manchmal dazu an, ihnen eine Illusion zu\nzeigen, um sich von ihrer Einsamkeit abzulenken."
        es:
          sword: "Cuida de sus semejantes. Provoca ilusiones\nterroríficas para proteger tanto su guarida\ncomo a su manada de sus adversarios."
          shield: "Los Entrenadores solitarios le piden a Zoroark\nque les muestre ilusiones con las que combatir\nla desazón de la soledad."
        ko:
          sword: "동료애가 깊은 포켓몬이다.\n무서운 환상을 보게 만들어서\n거처나 무리를 지킨다."
          shield: "고독한 트레이너는 조로아크에게\n환상을 보여주도록 명령하여\n혼자만의 외로움을 달랜다."
        zh_simp:
          sword: "时刻为伙伴着想的宝可梦。\n为保护自己的栖息地和族群，\n会让敌人看到恐怖的幻象。"
          shield: "孤独的训练家会命令\n索罗亚克为自己展现幻像，\n借以排遣孤身一人的寂寞。"
        zh_trad:
          sword: "是時刻為夥伴著想的寶可夢。\n為了保護棲息地和族群的安全，\n會讓敵人看到恐怖的幻影。"
          shield: "孤獨的訓練家會命令\n索羅亞克讓他看見幻影，\n藉此紓解一個人的寂寞。"
minccino:
