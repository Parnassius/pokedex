      descriptions:
        jp_kana:
          sword: "ゆうもうで　ほこりたかい　ポケモン。\nその　ゆうしを　たたえ　エンブレムの\nモチーフとして　にんきが　たかい。"
          shield: "ちのけが　おおく　あらっぽいので\nガラルの　はこびやの　ざは\nアーマーガアに　うばわれた。"
        jp_kanji:
          sword: "勇猛で　誇り高い　ポケモン。\nその　雄姿を　称え　エンブレムの\nモチーフとして　人気が　高い。"
          shield: "血の気が　多く　荒っぽいので\nガラルの　運び屋の　座は\nアーマーガアに　奪われた。"
        en:
          sword: "Known for its bravery and pride, this majestic\nPokémon is often seen as a motif for various\nkinds of emblems."
          shield: "Because this Pokémon is hotheaded and\nbelligerent, it’s Corviknight that’s taken\nthe role of transportation in Galar."
        fr:
          sword: "C’est un Pokémon fier et vaillant.\nSa bravoure lui vaut d’être souvent utilisé\ncomme emblème sur les blasons."
          shield: "Son caractère agressif et violent lui a valu\nde perdre son rôle de transporteur à Galar\nau profit de Corvaillus."
        it:
          sword: "È un Pokémon intrepido e orgoglioso.\nAppare spesso come motivo araldico per via\ndel suo eroismo."
          shield: "A causa del suo carattere irruente e violento\nha perso il posto di corriere a Galar, che gli è\nstato rubato da Corviknight."
        de:
          sword: "Es ist ein furchtloses und stolzes Pokémon,\ndas als Symbol des Mutes häufig auf Wappen\nabgebildet wird."
          shield: "Da es hitzköpfig und aggressiv ist, hat es den\nPosten als Kurier in Galar an Krarmor verloren."
        es:
          sword: "Un Pokémon osado y orgulloso, cuyo majestuoso\nporte lo convierte en un motivo heráldico muy\npopular."
          shield: "Su carácter agresivo e irascible le ha hecho\nperder su puesto como transportista en Galar\nen favor de los Corviknight."
        ko:
          sword: "용맹하고 긍지 높은 포켓몬.\n그 용감한 모습 때문에\n엠블럼의 모티브로 인기가 많다."
          shield: "혈기왕성하고 거칠어서\n가라르의 배달부 자리는\n아머까오에게 뺏겼다."
        zh_simp:
          sword: "勇猛高傲的宝可梦。\n英勇的身姿使得它成为人们\n设计纹章时的热门题材。"
          shield: "性格粗暴、血气方刚，\n因此被钢铠鸦夺走了\n伽勒尔运送员的地位。"
        zh_trad:
          sword: "勇猛高傲的寶可夢。\n英勇的身姿使得牠成為人們\n設計紋章時的熱門題材。"
          shield: "性情粗暴、血氣方剛，\n因此被鋼鎧鴉奪走了\n伽勒爾運送員的地位。"
