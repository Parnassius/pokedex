turtonator:
  species_id: 776
  names:
    jp_kana: バクガメス
    jp_kanji: バクガメス
    en: Turtonator
    fr: Boumata
    it: Turtonator
    de: Tortunator
    es: Turtonator
    ko: 폭거북스
    zh_simp: 爆焰龟兽
    zh_trad: 爆焰龜獸
  forms:
    turtonator:
      form_id: 0
      base_stats:
        hp: 60
        attack: 78
        defense: 135
        special_attack: 91
        special_defense: 85
        speed: 36
      evs_yield:
        hp: 0
        attack: 0
        defense: 2
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fire
        - dragon
      egg_groups:
        - monster
        - dragon
      abilities:
        - shell_armor
      held_items:
        rare: charcoal
      descriptions:
        jp_kana:
          sword: "ばくやくで　コーティングされた\nこうらを　せおう。　こうげきしてきた\nてきを　だいばくはつで　かえりうち。"
          shield: "かざんで　くらし　たべた　いおうが\nこうらの　ばくやくの　もとになる。\nフンも　ばくはつする　きけんぶつ。"
        jp_kanji:
          sword: "爆薬で　コーティングされた\n甲羅を　背負う。　攻撃してきた\n敵を　大爆発で　返り討ち。"
          shield: "火山で　暮らし　食べた　硫黄が\n甲羅の　爆薬の　もとになる。\nフンも　爆発する　危険物。"
        en:
          sword: "Explosive substances coat the shell on its back.\nEnemies that dare attack it will be blown away\nby an immense detonation."
          shield: "Eating sulfur in its volcanic habitat is what causes\nexplosive compounds to develop in its shell.\nIts droppings are also dangerously explosive."
        fr:
          sword: "Il s’abrite derrière une carapace couverte\nd’explosifs. Lorsqu’un ennemi l’attaque,\nil riposte à grands coups de déflagrations."
          shield: "Il vit dans les volcans. Le soufre dont il se nourrit\nrend sa carapace explosive. Même ses selles\nsont dangereuses, car elles sont instables."
        it:
          sword: "Il carapace sulla schiena è rivestito di esplosivo.\nRespinge gli attacchi nemici con un potente\nscoppio."
          shield: "Vive nei vulcani. Lo zolfo di cui si nutre rende\nesplosivo il suo carapace e i suoi escrementi.\nQuesti ultimi sono molto pericolosi."
        de:
          sword: "Sein Panzer ist mit einer explosiven Schicht\nüberzogen. Gegnerische Angriffe quittiert es\nmit gewaltigen Explosionen."
          shield: "Da es in Vulkanen lebt, nimmt es mit der Nahrung\nviel Schwefel auf, was seinen Panzer und seinen\nKot explosiv macht. Letzterer ist ein Gefahrengut."
        es:
          sword: "Su caparazón está recubierto de un material\nexplosivo. Responde con un gran estallido a\ntodo aquel que lo ataque."
          shield: "El material explosivo de su caparazón está\ncompuesto por el azufre del que se alimenta.\nSus excrementos explosivos son muy peligrosos."
        ko:
          sword: "폭약으로 코팅된 등껍질을\n짊어지고 있다. 공격하는\n상대에게 대폭발로 반격한다."
          shield: "화산에서 살며 먹은 유황이\n등껍질에 있는 폭약의 원료가 된다.\n위험하게도 배설물 역시 폭발물이다."
        zh_simp:
          sword: "背上的甲壳上敷了炸药。\n会用大爆炸去回击\n来攻击自己的敌人。"
          shield: "在火山上生活，吃下的硫磺\n就是甲壳上炸药的原料。\n连粪便也会爆炸，十分危险。"
        zh_trad:
          sword: "背上的甲殼上敷了炸藥。\n會用大爆炸去回擊\n來攻擊自己的敵人。"
          shield: "在火山上生活，吃下的硫磺\n就是甲殼上炸藥的原料。\n連糞便也會爆炸，十分危險。"
