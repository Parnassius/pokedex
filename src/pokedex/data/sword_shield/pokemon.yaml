          sword: "Its muscular body is so powerful, it must wear a\npower-save belt to be able to regulate\nits motions."
          shield: "Its formidable body never gets tired. It helps\npeople by doing work such as the moving of\nheavy goods."
        fr:
          sword: "Son corps est si puissant qu’il lui faut une ceinture\npour maîtriser sa force."
          shield: "Son corps robuste ne se fatigue jamais.\nIl n’hésite pas à aider les gens lorsqu’il s’agit\nde soulever des objets très lourds."
        it:
          sword: "Il suo corpo muscoloso è così forte che usa\nuna cintura per contenere la sua potenza."
          shield: "Ha un fisico vigoroso e instancabile. Aiuta\nle persone a trasportare carichi e a svolgere\naltri lavori pesanti."
        de:
          sword: "Dieses Pokémon ist superstark. Es kann sich nur\nmit einem kraftregulierenden Gürtel bewegen."
          shield: "Sein durchtrainierter Körper wird nie müde.\nEs hilft den Menschen, indem es schwere\nSachen trägt."
        es:
          sword: "Su musculoso cuerpo es tan fuerte que usa un\ncinto antifuerza para controlar sus movimientos."
          shield: "Tiene una complexión tan fuerte que nunca se\ncansa. Suele ayudar a la gente a cargar objetos\npesados."
        ko:
          sword: "엄청나게 강한 육체를 지녔기 때문에\n파워 세이브 벨트를 차서\n힘을 제어하고 있다."
          shield: "지치지 않는 강인한\n육체를 가졌다. 무거운 물건을\n옮기는 등의 일을 돕는다."
        zh_simp:
          sword: "因为肉体非常强韧，\n所以戴着力量限制腰带\n来控制力量。"
          shield: "有着不会疲劳的强韧肉体。\n会去帮助人类完成例如\n搬运沉重行李之类的工作。"
        zh_trad:
          sword: "因為肉體非常強韌，\n所以戴著力量限制腰帶\n來控制力量。"
          shield: "有著不會疲勞的強韌肉體。\n會去幫助人類完成例如\n搬運沉重行李之類的工作。"
