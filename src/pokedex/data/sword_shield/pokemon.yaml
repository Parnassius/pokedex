          sword: "あしが　みじかく　あゆみは　おそいが\nくびと　しょくしゅが　３ばい　のびて\nとおくにいる　えものを　つかまえる。"
          shield: "しょくしゅで　えものを　つかまえると\nそのまま　しょうかえきで　とかして\nえいようぶんを　きゅうしゅうする。"
        jp_kanji:
          sword: "脚が　短く　歩みは　遅いが\n首と　触手が　３倍　伸びて\n遠くにいる　獲物を　捕まえる。"
          shield: "触手で　獲物を　捕まえると\nそのまま　消化液で　溶かして\n栄養分を　吸収する。"
        en:
          sword: "It has short legs and can’t walk very fast, but its\nneck and tentacles can extend to over three\ntimes their usual length to nab distant prey."
          shield: "Once Cradily catches prey in its tentacles,\nit digests them whole and absorbs their nutrients."
        fr:
          sword: "Il se déplace lentement avec ses petites pattes,\nmais il peut tripler la longueur de son cou et\nde ses tentacules pour capturer ses proies."
          shield: "Il attrape ses proies à l’aide de ses tentacules,\npuis les dissout immédiatement avec ses sucs\ndigestifs pour en absorber les nutriments."
        it:
          sword: "Il suo passo è lento a causa delle corte zampe,\nma può triplicare la lunghezza del collo e dei\ntentacoli per catturare le prede."
          shield: "Cattura le prede con i tentacoli e le scioglie\ncon un fluido digestivo, assorbendone così\nle sostanze nutritive."
        de:
          sword: "Durch die kurzen Beine läuft Wielie nur langsam,\ndoch um ferne Beute zu fangen, kann es Hals und\nTentakel auf die dreifache Länge ausstrecken."
          shield: "Sobald es mit seinen Tentakeln Beute erfasst hat,\nlöst es diese mit seiner Verdauungsflüssigkeit auf\nund absorbiert ihre Nährstoffe."
        es:
          sword: "Sus cortas patas le impiden desplazarse con\nrapidez, pero puede triplicar la longitud de sus\ntentáculos y cuello para atrapar a presas lejanas."
          shield: "Atrapa a sus presas con los tentáculos y\nenseguida las disuelve con sus jugos gástricos\npara absorber los nutrientes."
        ko:
          sword: "다리가 짧아 걸음이 느리지만\n목과 촉수가 3배로 늘어나서\n멀리 있는 먹이를 잡는다."
          shield: "촉수로 먹이를 잡은 후\n그대로 소화액으로 녹여\n영양분을 흡수한다."
        zh_simp:
          sword: "虽然脚很短走得慢，\n但脖子和触手能伸长３倍，\n因此能捉到远处的猎物。"
          shield: "用触手将猎物缠住后，\n会用消化液将其溶化，\n然后吸收其中的养分。"
        zh_trad:
          sword: "雖然腳短且走得慢，但\n脖子和觸手能伸長３倍\n去捕捉在遠處的獵物。"
          shield: "用觸手捕捉到獵物時，\n會直接用消化液溶解\n獵物然後吸收養分。"
