          shield: "すいこんだ　くうきの　いちぶは\nたいないの　ほのおぶくろに　おくられ\n１７００どの　ほのおに　なる。"
        jp_kanji:
          sword: "体内に　炎が　溜まると\nブースターの　体温も　最高\n９００度　まで　上がっていく。"
          shield: "吸いこんだ　空気の　一部は\n体内の　炎袋に　送られ\n１７００度の　炎に　なる。"
        en:
          sword: "Once it has stored up enough heat, this\nPokémon’s body temperature can reach up to\n1,700 degrees Fahrenheit."
          shield: "It stores some of the air it inhales in its internal\nflame pouch, which heats it to over\n3,000 degrees Fahrenheit."
        fr:
          sword: "Après avoir emmagasiné suffisamment de chaleur,\nsa température corporelle peut monter\njusqu’à 900 °C."
          shield: "Il emmagasine de l’air dans sa poche de flammes\net le chauffe à une température de 1 700 °C."
        it:
          sword: "Quando immagazzina abbastanza calore,\nla sua temperatura corporea può salire fino\na 900 ºC."
          shield: "Parte dell’aria che inala finisce in una sacca\ninterna, dove brucia raggiungendo una\ntemperatura di 1.700 ºC."
        de:
          sword: "Wenn die Flamme in seinem Körper heiß genug\nbrennt, kann seine Körpertemperatur bis zu\n900 ºC erreichen."
          shield: "Ein Teil der von ihm eingeatmeten Luft wird\nin einem Flammensack in seinem Körper\ngespeichert und dort auf 1 700 ºC erhitzt."
        es:
          sword: "Una vez que ha almacenado el calor suficiente,\npuede alcanzar una temperatura de 900 °C."
          shield: "Almacena parte del aire que inhala en la saca de\nfuego de su interior, que llega a calentarse a más\nde 1700 °C."
        ko:
          sword: "체내에 불꽃이 쌓이면\n부스터의 체온도 최고\n900도까지 오른다."
          shield: "들이마신 공기 중 일부는\n체내의 불꽃 주머니로 보내져\n1700도의 불꽃이 된다."
        zh_simp:
          sword: "当火焰在体内积蓄时，\n火伊布的体温也会随之\n上升到最高９００度。"
          shield: "会将吸入的空气的一部分\n传送到自己体内的火囊里，\n制造出１７００度的火焰。"
        zh_trad:
          sword: "當火焰在體內積蓄時，\n火伊布的體溫也會隨之\n上升到最高９００度。"
          shield: "會將吸入的空氣的一部分\n傳送到自己體內的火囊裡，\n製造出１７００度的火焰。"
