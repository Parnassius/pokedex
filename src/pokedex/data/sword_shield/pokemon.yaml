      descriptions:
        jp_kana:
          sword: "やく１おくねんまえの　ポケモン。\nきょうぼうだが　どうどうとした\nふるまいは　おうじゃの　ふうかく。"
          shield: "おおあごは　ひとかみするだけで\nじどうしゃも　こなごなに　する。\nこだいの　せかいの　おうじゃ。"
        jp_kanji:
          sword: "約１億年前の　ポケモン。\n凶暴だが　堂々とした　ふるまいは\n王者の　風格。"
          shield: "大顎は　ひと噛みするだけで\n自動車も　粉々に　する。\n古代の　世界の　王者。"
        en:
          sword: "This Pokémon is from about 100,000,000\nyears ago. It has the presence of a king, vicious\nbut magnificent."
          shield: "A single bite of Tyrantrum’s massive jaws will\ndemolish a car. This Pokémon was the king of the\nancient world."
        fr:
          sword: "Ce Pokémon a vécu il y a 100 millions d’années.\nIl est très violent, mais sa contenance noble lui\ndonne des airs de royauté."
          shield: "Ce Pokémon peut réduire une voiture en miettes\nd’un seul coup de mâchoire. Il était considéré\ncomme le roi du monde préhistorique."
        it:
          sword: "Questo Pokémon è esistito 100 milioni d’anni fa.\nÈ molto feroce, ma il suo atteggiamento solenne\nrivela una personalità degna di un re."
          shield: "Grazie alla sua mandibola può ridurre in frantumi\nun’auto con un morso solo. Regnava incontrastato\nnell’era preistorica."
        de:
          sword: "Es lebte vor 100 Millionen Jahren. Sein brutales,\naber imposantes Verhalten verleiht ihm eine\nkönigliche Ausstrahlung."
          shield: "Ein Biss seines starken Kiefers reicht, um ein Auto\nzu zermalmen. Dieses Pokémon war der Regent\nder Urzeit."
        es:
          sword: "Este Pokémon vivió hace cien millones de años.\nA pesar de su ferocidad, posee una firmeza y una\npresencia dignas de un rey."
          shield: "Puede hacer trizas un coche de un solo mordisco\ngracias a sus potentes mandíbulas. Antaño era\nconsiderado un rey."
        ko:
          sword: "약 1억 년 전의 포켓몬이다.\n난폭하지만 당당하게 행동하는 모습은\n마치 왕의 품격을 지닌 듯하다."
          shield: "큰 턱은 살짝 물기만 해도\n자동차를 산산조각 낸다.\n고대 세계의 왕이다."
        zh_simp:
          sword: "大约１亿年前的宝可梦。\n虽然凶暴，堂堂正正的\n举止却略显王者之风。"
          shield: "如果被它的大颚咬到，\n连汽车都会变得粉碎。\n是古代世界的王者。"
        zh_trad:
          sword: "大約１億年前的寶可夢。\n雖然凶暴，但威風堂堂，\n有王者的風範。"
          shield: "只要牠的大顎一咬，\n就連汽車也會被粉碎。\n是古代世界的王者。"
