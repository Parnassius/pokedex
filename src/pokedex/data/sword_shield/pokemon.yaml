      descriptions:
        jp_kana:
          sword: "ねらった　エモノは　こっそり\nマーキング。　においを　たどって\nゆだん　したころ　ぬすみに　くるぞ。"
          shield: "みがるな　からだと　するどい　ツメで\nエサや　タマゴを　ぬすんで　まわる。\nパルスワンが　てんてき。"
        jp_kanji:
          sword: "狙った　獲物は　こっそり\nマーキング。　においを　辿って\n油断　したころ　盗みに　来るぞ。"
          shield: "身軽な　体と　鋭い　ツメで\nエサや　タマゴを　盗んで　まわる。\nパルスワンが　天敵。"
        en:
          sword: "It secretly marks potential targets with a scent.\nBy following the scent, it stalks its targets\nand steals from them when they least expect it."
          shield: "With a lithe body and sharp claws, it goes\naround stealing food and eggs. Boltund\nis its natural enemy."
        fr:
          sword: "Il marque sa victime pour la suivre à l’odeur.\nSitôt qu’elle est distraite, il s’empresse de lui\nvoler ses biens."
          shield: "Grâce à son corps leste et ses griffes acérées,\nil va et vient en dérobant Œufs et nourriture.\nSon ennemi juré est Fulgudog."
        it:
          sword: "Marca di nascosto le prede interessanti, ne segue\nl’odore per rintracciarle e approfitta di una loro\ndistrazione per rubare nelle loro tane."
          shield: "Se ne va in giro rubando Uova e cibo grazie\nal suo corpo agile e alle unghie affilate.\nIl suo nemico naturale è Boltund."
        de:
          sword: "Es markiert heimlich die Beute, auf die es ein\nAuge geworfen hat. Dann folgt es dem Geruch\nund stiehlt sie, wenn sich die Gelegenheit bietet."
          shield: "Dank seines agilen Körpers und seiner scharfen\nKlauen ist es ihm ein Leichtes, überall Futter und\nEier zu stehlen. Bellektro ist sein Erzfeind."
        es:
          sword: "Marca a su presa sin ser advertido. Sigue el olor\ny, cuando el otro Pokémon baja la guardia,\naprovecha para robarle."
          shield: "Un Pokémon ágil y de afiladas garras que se\nalimenta de huevos y comida robados. Los\nBoltund son su enemigo natural."
        ko:
          sword: "목표로 한 먹잇감에 슬쩍 마킹을\n해둔다. 냄새를 따라가다 먹이의\n주인이 방심하고 있을 때 훔치려 든다."
          shield: "가벼운 몸과 날카로운 발톱으로\n먹이나 알을 훔치며 돌아다닌다.\n펄스멍이 천적이다."
        zh_simp:
          sword: "会偷偷在看中的猎物身上\n留下标记，追踪目标的气味，\n在对方放松警戒时偷盗。"
          shield: "靠着轻盈的身体和锐利的\n爪子到处去偷食物和蛋。\n逐电犬是它的天敌。"
        zh_trad:
          sword: "會偷偷在看中的獵物身上\n留下標記，追蹤目標的氣味，\n在對方放鬆警戒時偷盜。"
          shield: "靠著輕盈的身體和銳利的\n爪子到處去偷食物和蛋。\n逐電犬是牠的天敵。"
gossifleur:
  species_id: 829
  names:
    jp_kana: ヒメンカ
    jp_kanji: ヒメンカ
    en: Gossifleur
    fr: Tournicoton
    it: Gossifleur
    de: Cottini
    es: Gossifleur
    ko: 꼬모카
    zh_simp: 幼棉棉
    zh_trad: 幼棉棉
  forms:
    gossifleur:
      form_id: 0
      base_stats:
        hp: 40
        attack: 40
        defense: 60
        special_attack: 40
        special_defense: 60
        speed: 10
      evs_yield:
        hp: 0
        attack: 0
