      descriptions:
        jp_kana:
          sword: "はつでんりょうは　しんぱくすうと\nひれいする。　たたかいになると\nいっきに　ボルテージが　あがるのだ。"
          shield: "はつでんりょうは　でんきポケモン\nさいこうクラス。　しっぽの　さきから\nこうあつでんりゅうを　ほうでんする。"
        jp_kanji:
          sword: "発電量は　心拍数と　比例する。\n戦いになると　一気に\nボルテージが　上がるのだ。"
          shield: "発電量は　電気ポケモン\n最高クラス。　しっぽの　先から\n高圧電流を　放電する。"
        en:
          sword: "The amount of electrical energy this Pokémon\nproduces is proportional to the rate of its pulse.\nThe voltage jumps while Electivire is battling."
          shield: "In terms of electrical-energy output, Electivire\nis one of the best among all Electric Pokémon.\nIt discharges high-voltage currents from its tails."
        fr:
          sword: "La quantité d’électricité qu’il génère est\nproportionnelle à son pouls. Quand il livre\nun combat, son voltage augmente aussitôt."
          shield: "La quantité d’électricité qu’il génère est énorme,\nmême pour un Pokémon Électrik. Il inflige de\nfortes décharges du bout de ses queues."
        it:
          sword: "Produce una quantità di elettricità direttamente\nproporzionale alla sua frequenza cardiaca.\nDurante la lotta il voltaggio si alza all’istante."
          shield: "È uno dei Pokémon di tipo Elettro che\nproducono più elettricità. Rilascia scariche\nad alto voltaggio dalla punta delle code."
        de:
          sword: "Wie viel Strom es erzeugt, ist abhängig von\nseinem Puls. Im Kampf steigt Elevolteks\nelektrische Spannung schlagartig an."
          shield: "Elevoltek gehört zu jenen Elektro-Pokémon, die\nden meisten Strom erzeugen können. Mit seinen\nSchweifspitzen entlädt es Starkstrom."
        es:
          sword: "La cantidad de electricidad que genera es\nproporcional a su pulso. Al enzarzarse en\ncombate, su voltaje aumenta drásticamente."
          shield: "Es de los Pokémon de tipo Eléctrico que más\nelectricidad producen. Genera una corriente\nde alta tensión desde las puntas de las colas."
        ko:
          sword: "발전량은 심박 수에 비례한다.\n싸움이 시작되면\n단숨에 전압이 올라간다."
          shield: "발전량은 전기포켓몬 중에서도\n손꼽히는 수준이다. 꼬리 끝에서\n고압 전류를 방전한다."
        zh_simp:
          sword: "发电量和心率成比例。\n一到战斗的时候，\n电压就会急速上升。"
          shield: "发电量在电气宝可梦当中\n属于最高级别。可以从\n尾巴尖端释放高压电流。"
        zh_trad:
          sword: "發電量與心跳數成正比。\n當牠面臨戰鬥的時候，\n電壓就會急速飆升。"
          shield: "發電量在電氣寶可夢中是\n屬於最頂級的。會從尾巴的\n前端放出高壓電流。"
