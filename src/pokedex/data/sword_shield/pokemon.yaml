      descriptions:
        jp_kana:
          sword: "でんきエネルギーの　かたまり。\nからだの　リングを　はずすと　ひめた\nちからが　ときはなたれるらしい。"
          shield: "ぜんしんが　でんきエネルギーを\nつくる　きかん。　ガラルぜんどの\nでんきを　つくりだすことができる。"
        jp_kanji:
          sword: "電気エネルギーの　塊。\n体の　リングを　外すと　秘めた\n力が　解き放たれるらしい。"
          shield: "全身が　電気エネルギーを\n作る　器官。　ガラル全土の\n電気を　作りだすことができる。"
        en:
          sword: "This Pokémon is a cluster of electrical energy.\nIt’s said that removing the rings on Regieleki’s\nbody will unleash the Pokémon’s latent power."
          shield: "Its entire body is made up of a single organ that\ngenerates electrical energy. Regieleki is capable\nof creating all Galar’s electricity."
        fr:
          sword: "Son corps est un véritable concentré d’énergie\nélectrique. On raconte que si on lui retire\nses anneaux, sa puissance cachée se libère."
          shield: "Son corps est entièrement composé d’organes\ngénérant de l’électricité. Il peut produire\nassez d’énergie pour alimenter tout Galar."
        it:
          sword: "È un agglomerato di energia elettrica. Si dice\nche rimuovere gli anelli che ha attorno al corpo\nliberi la sua potenza latente."
          shield: "Il suo corpo è costituito interamente da un\norgano che produce energia elettrica.\nFornisce corrente all’intera regione di Galar."
        de:
          sword: "Es besteht aus gebündelter elektrischer Energie.\nWerden die Ringe an seinem Körper entfernt,\nsetzt das angeblich seine verborgenen Kräfte frei."
          shield: "Sein Körper besteht aus einem Organ, das\nelektrische Energie erzeugt. Regieleki kann genug\nStrom produzieren, um ganz Galar zu versorgen."
        es:
          sword: "Su cuerpo entero es energía eléctrica. Por lo\nvisto, quitarle los anillos que lleva libera su\npoder oculto."
          shield: "Todo su cuerpo es un órgano electrógeno, cuya\npotencia sería suficiente para abastecer la región\nde Galar por completo."
        ko:
          sword: "전기 에너지 덩어리다.\n몸에 있는 링을 해제하면\n숨겨진 힘이 해방된다고 한다."
          shield: "온몸이 전기 에너지를 만드는 기관이다.\n가라르 전 지역에서 사용하는 양의\n전기를 만들어 낼 수 있다."
        zh_simp:
          sword: "由电能聚集而成。\n据说在解开身上的圆环后\n会释放出隐藏的力量。"
          shield: "整个身体是制造电能的\n器官。可以制造出\n伽勒尔全域所需的电力。"
        zh_trad:
          sword: "由電能凝聚而成的寶可夢。\n據說拿下牠身上的圓環後，\n就會解放牠潛藏的力量。"
          shield: "全身都是能發電的器官。\n牠製造的電能可以滿足\n伽勒爾全域的電力需求。"
