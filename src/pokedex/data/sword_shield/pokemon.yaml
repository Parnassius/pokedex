          sword: "２ひきの　ダンバルが　じりょくで\nくっついた。　２つの　のうみそにより\nサイコパワーは　２ばいに　きょうか。"
          shield: "じりょくで　そらを　とぶ。　けわしい\nさんがくを　ぬうように　こうそくで\nひこうして　えものを　おいつめる。"
        jp_kanji:
          sword: "２匹の　ダンバルが　磁力で\nくっついた。　２つの　脳みそにより\nサイコパワーは　２倍に　強化。"
          shield: "磁力で　空を　飛ぶ。　険しい\n山岳を　縫うように　高速で\n飛行して　獲物を　追いつめる。"
        en:
          sword: "Two Beldum have become stuck together via\ntheir own magnetic forces. With two brains, the\nresulting Metang has doubled psychic powers."
          shield: "Using magnetic forces to stay aloft, this Pokémon\nflies at high speeds, weaving through harsh\nmountain terrain in pursuit of prey."
        fr:
          sword: "Composé de deux Terhal réunis par l’attraction\nmagnétique, ce Pokémon a vu sa puissance\npsychique doubler grâce aux deux cerveaux."
          shield: "Ce Pokémon vole par magnétisme.\nIl poursuit ses proies en slalomant\nà toute allure entre les pics escarpés."
        it:
          sword: "Due Beldum si sono uniti tramite\nl’attrazione magnetica, raddoppiando\ni loro poteri psichici grazie ai due cervelli."
          shield: "Levita sfruttando la forza magnetica. Si fa strada\nfra i picchi scoscesi volando a grande velocità\nmentre insegue le prede."
        de:
          sword: "Durch Magnetismus verschmolzen zwei Tanhel\nmiteinander. Da es nun zwei Gehirne besitzt,\nhaben sich seine Psycho-Kräfte verdoppelt."
          shield: "Mithilfe von Magnetismus kann Metang fliegen.\nAuf der Jagd nach Beute manövriert es so mit\nhoher Geschwindigkeit durch schroffes Gebirge."
        es:
          sword: "Está formado por la fusión magnética de dos\nBeldum. Al tener dos cerebros, sus poderes\npsíquicos se ven duplicados."
          shield: "Levita gracias al magnetismo. Es capaz de sortear\nescarpadas montañas mientras vuela a altas\nvelocidades en pos de su presa."
        ko:
          sword: "2마리의 메탕이 자력으로\n합체했다. 2개의 두뇌로 인해\n사이코 파워가 2배로 강화되었다."
          shield: "자력으로 하늘을 난다. 험준한\n산들을 누비듯이 고속으로\n비행하여 먹이를 쫓는다."
        zh_simp:
          sword: "２只铁哑铃因磁力结合\n起来了。因为有了２个大脑，\n精神力量也强化到了２倍。"
          shield: "依靠磁力飞行。能够在空中\n以高速穿过险峻的山岳，\n让追捕的猎物无处可逃。"
        zh_trad:
          sword: "由２隻鐵啞鈴以磁力結合\n而成。因為有２個大腦，\n精神力量也強化成２倍了。"
          shield: "會以磁力在空中飛行。\n能在險峻的山岳中高速\n穿梭，將獵物逼入絕境。"
