      descriptions:
        jp_kana:
          sword: "レシラムと　ゼクロムを　しのぐほどの\nちからを　もつが　きょくていおんの\nれいきで　ふうじられてしまっている。"
          shield: "さいぼうそしきを　あんていさせるため\nじぶんで　はっせいさせた　れいきで\nからだを　こおりつかせているらしい。"
        jp_kanji:
          sword: "レシラムと　ゼクロムを　凌ぐほどの\n力を　もつが　極低温の\n冷気で　封じられてしまっている。"
          shield: "細胞組織を　安定させるため\n自分で　発生させた　冷気で\n体を　凍りつかせているらしい。"
        en:
          sword: "Dwelling within it is a power even greater than\nthat of Reshiram or Zekrom, but the extreme\ncold keeps that power bound."
          shield: "It appears that this Pokémon uses its powers over\nice to freeze its own body in order to stabilize its\ncellular structure."
        fr:
          sword: "Il possède une puissance qui dépasse celle\nde Reshiram et de Zekrom, mais il a scellé\nson corps grâce à son souffle glacé."
          shield: "Il se serait congelé lui-même avec son souffle\nglacé pour stabiliser sa structure cellulaire."
        it:
          sword: "La sua forza supera quella di Reshiram e\nZekrom, ma è sigillata dalla temperatura\nglaciale del suo corpo."
          shield: "Sembra che abbia finito con il congelarsi\nproducendo un soffio gelido al fine di\nstabilizzare la sua struttura cellulare."
        de:
          sword: "Seine Kraft übertrifft die von Reshiram und\nZekrom, doch sie wird durch die extreme Kälte,\ndie in seinem Körper herrscht, versiegelt."
          shield: "Es erzeugt Kälteenergie, mit der es seinen Körper\ngefroren hält. Damit verfolgt es offenbar das\nZiel, seine Zellstruktur zu stabilisieren."
        es:
          sword: "Su poder supera al de Reshiram y Zekrom,\npero permanece sellado por el frío extremo\nque genera."
          shield: "Mantiene su cuerpo congelado con la intensa\nenergía gélida que él mismo produce para\nestabilizar su estructura celular."
        ko:
          sword: "레시라무와 제크로무를 능가할 정도의\n힘을 가졌으나 극저온의\n냉기에 봉인되어 있다."
          shield: "세포 조직을 안정시키기 위해\n자신이 발생시킨 냉기로\n몸을 얼어붙게 한 듯하다."
        zh_simp:
          sword: "虽然拥有凌驾于莱希拉姆和\n捷克罗姆之上的力量，但是那\n力量已被极低温冷气封印住了。"
          shield: "为了稳定细胞组织，\n它似乎用自己制造出\n的冷气冰冻着身体。"
        zh_trad:
          sword: "雖然擁有凌駕於萊希拉姆和\n捷克羅姆之上的力量，但是那\n力量已被極低溫冷氣封住了。"
          shield: "為了穩定細胞組織，\n牠似乎用自己製造出\n的冷氣冰凍著身體。"
    kyurem_white:
      form_id: 1
      names:
        jp_kana: ホワイトキュレム
        jp_kanji: ホワイトキュレム
        en: White Kyurem
        fr: Kyurem Blanc
        it: Kyurem Bianco
        de: Weißes Kyurem
        es: Kyurem Blanco
        ko: 화이트큐레무
        zh_simp: 焰白酋雷姆
        zh_trad: 焰白酋雷姆
      base_stats:
        hp: 125
        attack: 120
        defense: 90
        special_attack: 170
        special_defense: 100
        speed: 95
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 3
        special_defense: 0
        speed: 0
      types:
        - dragon
        - ice
      egg_groups:
        - undiscovered
      abilities:
        - turboblaze
      descriptions:
        jp_kana:
          sword: "おなじ　いでんしを　もつ　レシラムを\nきゅうしゅうして　ほのおと　こおりの\nエネルギーを　つかえるようになった。"
          shield: "ポケモンと　にんげんの　しんじつの\nせかいが　くることを　みとおしていて\nその　みらいを　まもろうとしている。"
        jp_kanji:
          sword: "同じ　遺伝子を　もつ　レシラムを\n吸収して　炎と　氷の\nエネルギーを　使えるようになった。"
          shield: "ポケモンと　人間の　真実の\n世界が　来ることを　見通していて\nその　未来を　守ろうとしている。"
        en:
          sword: "The sameness of Reshiram’s and Kyurem’s genes\nallowed Kyurem to absorb Reshiram. Kyurem can\nnow use the power of both fire and ice."
          shield: "It has foreseen that a world of truth will arrive\nfor people and Pokémon. It strives to protect\nthat future."
        fr:
          sword: "En absorbant Reshiram, avec qui il partage\nle même ADN, il est devenu capable d’utiliser\nà la fois l’énergie du feu et de la glace."
          shield: "Il a prédit un futur où humains et Pokémon\nvivront dans un monde où la Réalité prévaut.\nIl fait tout son possible pour protéger cet avenir."
        it:
          sword: "Assorbendo Reshiram, che possiede il suo stesso\nDNA, ha acquisito la capacità di usare l’energia\ndel fuoco e del ghiaccio."
          shield: "Ha profetizzato l’avvento di un mondo di verità\nper Pokémon ed esseri umani ed è deciso a\nfare di tutto perché ciò si avveri."
        de:
          sword: "Nachdem es Reshiram, das über identische Gene\nverfügt, absorbiert hat, kann es nun sowohl\nFeuer- als auch Eis-Energie einsetzen."
          shield: "Es sah voraus, dass die Welt der Wirklichkeit für\nMenschen und Pokémon zur Realität wird, und\nversucht nun, diese Zukunft eintreten zu lassen."
        es:
          sword: "Tras la fusión con Reshiram, con el que comparte\nel ADN, puede absorber y controlar las energías\ndel fuego y el hielo."
          shield: "Como heraldo del mundo verdadero que ha de\nllegar para humanos y Pokémon, ha asumido la\nmisión de protegerlo."
        ko:
          sword: "같은 유전자를 가진 레시라무를\n흡수해서 불꽃과 얼음의\n에너지를 사용할 수 있게 되었다."
          shield: "포켓몬과 사람 사이에 진실한 세계가\n도래할 것으로 예측하고 있으며\n그 미래를 지키려고 한다."
        zh_simp:
          sword: "吸收了与自己拥有\n相同基因的莱希拉姆，\n因此能使用火与冰的能量。"
          shield: "已经看出宝可梦和人类\n之间的真实世界将会到来，\n它试图去保护这样的未来。"
        zh_trad:
          sword: "吸收了與自己擁有\n相同基因的萊希拉姆，\n因此能使用火與冰的能量。"
          shield: "已經看出寶可夢和人類\n之間的真實世界將會到來，\n牠試圖去保護這樣的未來。"
    kyurem_black:
