        jp_kana:
          sword: "まんげつのよる　かげが　かってに\nうごきだして　わらうのは\nゲンガーの　しわざに　ちがいない。"
          shield: "やまで　そうなんしたとき\nいのちを　うばいに　くらやみから\nあらわれることが　あるという。"
        jp_kanji:
          sword: "満月の夜　影が　勝手に\n動きだして　笑うのは\nゲンガーの　しわざに　違いない。"
          shield: "山で　遭難したとき\n命を　奪いに　暗闇から\n現れることが　あるという。"
        en:
          sword: "On the night of a full moon, if shadows move on\ntheir own and laugh, it must be Gengar’s doing."
          shield: "It is said to emerge from darkness to steal the\nlives of those who become lost in mountains."
        fr:
          sword: "Un soir de pleine lune, si une ombre se met\nà bouger et éclate de rire, c’est sûrement\nl’œuvre d’un Ectoplasma."
          shield: "On dit qu’Ectoplasma surgit parfois des ténèbres\npour prendre la vie des personnes égarées\nen montagne."
        it:
          sword: "Se in una notte di luna piena le ombre iniziano\na muoversi e a ridere, è senza dubbio opera\ndi Gengar."
          shield: "Si dice che emerga dall’oscurità per sottrarre\nla vita di chi si è perso tra le montagne."
        de:
          sword: "Wenn Schatten bei Vollmond plötzlich anfangen,\nsich zu bewegen und zu lachen, steckt zweifellos\nGengar dahinter."
          shield: "Man sagt, es sei aus Dunkelheit entstanden, um\ndenjenigen, die sich in den Bergen verirrt haben,\ndas Leben zu rauben."
        es:
          sword: "Las noches de luna llena, a este Pokémon le\ngusta imitar las sombras de la gente y burlarse\nde sus miedos."
          shield: "Dicen que sale de la oscuridad para robarles el\nalma a los que se pierden por las montañas."
        ko:
          sword: "보름달이 뜬 밤에 그림자가\n멋대로 움직이면서 웃는다면\n팬텀의 소행임이 틀림없다."
          shield: "산에서 조난하면 목숨을\n빼앗기 위해 어둠 속에서\n나타난다고 한다."
        zh_simp:
          sword: "满月的夜晚，如果影子\n自己动起来并露出笑容，\n那肯定是耿鬼搞的鬼。"
          shield: "据说它会为了夺取\n山中遇难者的生命\n而从黑暗中出现。"
        zh_trad:
          sword: "滿月的夜晚，如果影子\n自己動起來並露出笑容，\n那肯定是耿鬼搞的鬼。"
          shield: "據說牠會為了奪取\n山中遇難者的生命\n而從黑暗中出現。"
  gmax_forms:
    gengar_gigantamax:
      form_id: 999
      names:
        jp_kana: キョダイマックス
        jp_kanji: キョダイマックス
        en: Gigantamax
        fr: Gigamax
        it: Gigamax
        de: Gigadynamax
        es: Gigamax
        ko: 거다이맥스
        zh_simp: 超极巨化
        zh_trad: 超極巨化
      descriptions:
        jp_kana:
          sword: "のろいの　エネルギーに　みちている。\nきょだいな　くちの　むこうがわは\nあのよへと　つづいているという。"
          shield: "いのちを　ねらい　ワナを　はる。\nくちのまえに　たつと　たいせつな\nひとが　よぶ　こえが　きこえる。"
        jp_kanji:
          sword: "呪いの　エネルギーに　満ちている。\n巨大な　口の　向こう側は\nあの世へと　続いているという。"
          shield: "命を　狙い　罠を　張る。\n口の前に　立つと　大切な\n人が　呼ぶ　声が　聞こえる。"
        en:
          sword: "Rumor has it that its gigantic mouth leads not\ninto its body, filled with cursed energy, but\ninstead directly to the afterlife."
          shield: "It lays traps, hoping to steal the lives of those it\ncatches. If you stand in front of its mouth, you’ll\nhear your loved ones’ voices calling out to you."
        fr:
          sword: "Son corps est rempli d’énergie négative.\nSa bouche gigantesque est un portail\nqui débouche sur l’autre monde."
          shield: "Il tend des pièges fatals : ses victimes entendent\nles voix de personnes qu’elles aiment les inciter\nà approcher lorsqu’elles sont devant sa bouche."
        it:
          sword: "Trabocca di energia negativa. Si dice che\nl’enorme bocca sia un portale che conduce\nall’aldilà."
          shield: "Tende trappole mortali. Se ci si trova davanti\nalla sua bocca, si sentirà la voce di una persona\ncara che chiama."
        de:
          sword: "Sein Körper steckt voller verfluchter Energie.\nMan sagt, sein gewaltiger Schlund führe direkt\nins Jenseits."
          shield: "Aus seinem Schlund vermeint man, die Rufe von\nseinen Liebsten zu hören. Doch dies ist eine\nFalle, mit der es Leuten das Leben rauben will."
        es:
          sword: "Exuda energía negativa. Se dice que su colosal\nboca es un portal que conduce al otro mundo."
          shield: "Tiende trampas mortales: quienes osan acercarse\na su boca escuchan la llamada de sus seres\nqueridos."
        ko:
          sword: "저주의 에너지로 넘치고 있다.\n거대한 입의 저편은\n저세상과 이어져 있다고 한다."
          shield: "생명을 노리고 함정을 판다.\n입 앞에 서면 소중한\n사람이 부르는 소리가 들린다."
        zh_simp:
          sword: "身体里填满了诅咒的能量。\n据说它巨大嘴巴的另一端\n连接着死后的世界。"
          shield: "会设下致命的陷阱。如果站在\n它的嘴巴前面，就会听见\n心爱之人呼唤自己的声音。"
        zh_trad:
          sword: "身體裡填滿了詛咒的能量。\n據說牠巨大嘴巴的另一端\n連接著死後的世界。"
          shield: "會設下致命的陷阱。如果站在\n牠的嘴巴前面，就會聽見\n心愛之人呼喚自己的聲音。"
