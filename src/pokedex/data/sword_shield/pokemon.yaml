      types:
        - grass
        - fairy
      egg_groups:
        - grass
        - fairy
      abilities:
        - prankster
        - infiltrator
      hidden_ability: chlorophyll
      held_items:
        rare: absorb_bulb
      descriptions:
        jp_kana:
          sword: "ワタを　とばして　みを　まもる。\nたいふうの　かぜに　ながされ\nちきゅうの　うらがわに　いくことも。"
          shield: "モンメンと　ワタシラガの　ワタを\nまぜて　おった　きじは　うつくしく\nこうきゅうブランドで　つかわれる。"
        jp_kanji:
          sword: "綿を　飛ばして　身を　守る。\n台風の　風に　流され\n地球の　裏側に　いくことも。"
          shield: "モンメンと　ワタシラガの　綿を\n混ぜて　織った　生地は　美しく\n高級ブランドで　使われる。"
        en:
          sword: "It shoots cotton from its body to protect itself.\nIf it gets caught up in hurricane-strength winds,\nit can get sent to the other side of the Earth."
          shield: "Weaving together the cotton of both Cottonee\nand Eldegoss produces exquisite cloth that’s\nhighly prized by many luxury brands."
        fr:
          sword: "Il sème du coton pour se protéger. Il lui arrive\nd’être emporté par une tempête à l’autre bout\ndu monde."
          shield: "Les marques de luxe utilisent les étoffes\nsplendides issues du mélange des cotons\nde Doudouvet et de Blancoton."
        it:
          sword: "Si difende creando una nuvola di cotone.\nA volte viene trasportato fino all’altro capo\ndel mondo dai tifoni."
          shield: "Le case di alta moda utilizzano pregiati tessuti\nrealizzati con il cotone prodotto da Cottonee\ned Eldegoss."
        de:
          sword: "Sie schützen sich, indem sie Watte verstreuen.\nManche werden vom Wind bis ans andere Ende\nder Welt getragen."
          shield: "Luxusmarken verwenden oft feine Stoffe, die aus\nMischwolle von Waumboll und Cottomi\nbestehen, für ihre Produkte."
        es:
          sword: "Lanza bolas de algodón para defenderse. A\nveces, la fuerza de un tifón llega a arrastrarlo\nhasta el otro extremo del mundo."
          shield: "Combinando los algodones de los Cottonee y\nEldegoss se obtiene una tela exquisita, que usan\nlas marcas más exclusivas."
        ko:
          sword: "솜을 날려 몸을 지킨다.\n태풍의 바람에 휩쓸려\n지구 반대편까지 갈 때도 있다."
          shield: "소미안과 백솜모카의 솜을\n섞어 짠 천은 아름다워서\n고급 브랜드에 사용된다."
        zh_simp:
          sword: "会喷出棉花保护身体。\n有时会被台风吹到\n地球的另一边。"
          shield: "将木棉球和白蓬蓬的棉花\n混合后编织出的布料极其精致，\n因此常被高级品牌选用。"
        zh_trad:
          sword: "會噴出棉花保護身體。\n有時會被颱風吹到\n地球的另一邊。"
          shield: "將木棉球和白蓬蓬的棉花\n混合後編織出的布料極其精緻，\n因此常被高級品牌選用。"
