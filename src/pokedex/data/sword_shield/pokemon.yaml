      descriptions:
        jp_kana:
          sword: "ガラルちほうの　そらでは　てきなし。\nくろびかりする　はがねの　すがたは\nあいてを　いあつし　おそれさせる。"
          shield: "ひこう　のうりょくに　すぐれていて\nとても　かしこいため　ガラルちほうで\nそらの　タクシーとして　かつやく。"
        jp_kanji:
          sword: "ガラル地方の　空では　敵なし。\n黒光りする　鋼の　姿は\n相手を　威圧し　恐れさせる。"
          shield: "飛行能力に　優れていて\nとても　賢いため　ガラル地方で\n空の　タクシーとして　活躍。"
        en:
          sword: "This Pokémon reigns supreme in the skies of the\nGalar region. The black luster of its steel body\ncould drive terror into the heart of any foe."
          shield: "With their great intellect and flying skills, these\nPokémon very successfully act as the Galar\nregion’s airborne taxi service."
        fr:
          sword: "Il n’a aucun rival dans le ciel de Galar.\nL’aspect intimidant de son corps d’acier noir\net lustré inspire la crainte chez ses ennemis."
          shield: "Grâce à son adresse remarquable en vol\net sa grande intelligence, il travaille comme\ntaxi volant de Galar."
        it:
          sword: "Nei cieli di Galar non ha rivali. La vista del suo\ncorpo di acciaio nero e lucente intimorisce\ni suoi avversari."
          shield: "È dotato di eccellenti capacità di volo e di\ngrande intelligenza. Nella regione di Galar si\nrende utile come taxi del cielo."
        de:
          sword: "Niemand wagt es, ihm den Himmel über Galar\nstreitig zu machen. Sein schwarz glänzendes,\nstählernes Äußeres schüchtert jeden Gegner ein."
          shield: "Aufgrund seiner unübertroffenen Flugfertigkeiten\nund seiner hohen Intelligenz ist es in der\nGalar-Region als Flugtaxi im Einsatz."
        es:
          sword: "No tiene rival en los cielos de Galar. El acero\nnegro y lustroso de su cuerpo intimida a\ncualquier adversario."
          shield: "Debido a su excelente capacidad de vuelo y a su\ngran inteligencia, ejerce de taxi volador en Galar."
        ko:
          sword: "가라르지방의 하늘에는 적수가 없다.\n검고 윤이 나는 강철의 자태는\n상대에게 위압감을 주어 겁먹게 만든다."
          shield: "비행 능력이 뛰어나고\n매우 영리해 가라르지방에서\n하늘의 택시로 활약한다."
        zh_simp:
          sword: "在伽勒尔地区的空中所向披靡。\n它那黑得发亮的钢铁之躯\n有着让敌人畏惧的威慑力。"
          shield: "拥有优秀飞行能力和极度\n聪明头脑的它在伽勒尔地区\n从事飞翔出租车的工作。"
        zh_trad:
          sword: "在伽勒爾地區的空中所向無敵。\n牠那黑得發亮的鋼鐵之軀\n有著讓敵人畏懼的威懾力。"
          shield: "擁有優秀飛行能力和\n極度聰明頭腦的牠在伽勒爾地區\n從事飛翔計程車的工作。"
  gmax_forms:
    corviknight_gigantamax:
      form_id: 999
      names:
        jp_kana: キョダイマックス
        jp_kanji: キョダイマックス
        en: Gigantamax
        fr: Gigamax
        it: Gigamax
        de: Gigadynamax
        es: Gigamax
        ko: 거다이맥스
        zh_simp: 超极巨化
        zh_trad: 超極巨化
      descriptions:
        jp_kana:
          sword: "キョダイマックスの　パワーで\nはばたくと　ハリケーンを　しのぐ\nきょうふうが　すべてを　ふきとばす。"
          shield: "ブレードバードと　よばれる　せなかの\n８まいの　はねは　ほんたいを　はなれ\nどくりつして　てきに　おそいかかる。"
        jp_kanji:
          sword: "キョダイマックスの　パワーで\n羽ばたくと　ハリケーンを　凌ぐ\n強風が　すべてを　吹きとばす。"
          shield: "ブレードバードと　呼ばれる　背中の\n８枚の　羽根は　本体を　離れ\n独立して　敵に　襲いかかる。"
        en:
          sword: "Imbued with Gigantamax energy, its wings can\nwhip up winds more forceful than any a hurricane\ncould muster. The gusts blow everything away."
          shield: "The eight feathers on its back are called blade\nbirds, and they can launch off its body to attack\nfoes independently."
        fr:
          sword: "Grâce au pouvoir du Gigamax, il déclenche\nde terribles ouragans qui emportent tout\nsur leur passage quand il bat des ailes."
          shield: "Les huit plumes de son dos, aussi appelées\n« oiseaux-lames », se sont séparées de son corps\net attaquent ses ennemis de manière autonome."
        it:
          sword: "Grazie all’energia del fenomeno Gigamax,\nquando sbatte le ali causa venti più forti di\nun uragano, che spazzano via qualunque cosa."
          shield: "Le otto penne che ha sul dorso, dette\n“aviolame”, si staccano dal corpo e\nattaccano il nemico in modo indipendente."
        de:
          sword: "Durch die Gigadynamax-Energie lösen seine\nFlügelschläge Sturmböen aus, die sogar stärker\nals Orkane sind und alles wegfegen können."
          shield: "Auf seinem Rücken befinden sich acht Federn,\ndie man „Klingenvögel“ nennt. Sie können sich\nvon ihm lösen und Feinde eigenständig angreifen."
        es:
          sword: "Gracias al fenómeno Gigamax, le basta batir\nlas alas para levantar vientos más fuertes que\nun huracán, capaces de arrasarlo todo."
          shield: "Las ocho plumas que tiene en el lomo, llamadas\nornitofilos, pueden separarse del cuerpo y atacar\nal rival de forma independiente."
        ko:
          sword: "거다이맥스의 파워로\n날갯짓하면 허리케인을 능가하는\n강풍이 모든 것을 날려버린다."
          shield: "블레이드 버드로 불리는 등에 있는\n8장의 날개는 본체와 떨어져\n단독으로 적을 습격한다."
        zh_simp:
          sword: "在超极巨化之力的影响之下，\n只要拍打翅膀，就能制造出\n不逊于飓风的强风，吹走一切。"
          shield: "能让背部被称为“刃鸟”的\n８根羽毛脱离身体，\n各自独立去袭击敌人。"
        zh_trad:
          sword: "在超極巨化之力的影響之下，\n只要拍打翅膀，就能製造出\n不遜於颶風的強風，吹走一切。"
          shield: "能讓背部被稱為「刃鳥」的\n８根羽毛脫離身體，\n各自獨立去襲擊敵人。"
blipbug:
  species_id: 824
  names:
    jp_kana: サッチムシ
    jp_kanji: サッチムシ
    en: Blipbug
    fr: Larvadar
    it: Blipbug
    de: Sensect
    es: Blipbug
    ko: 두루지벌레
    zh_simp: 索侦虫
    zh_trad: 索偵蟲
  forms:
    blipbug:
      form_id: 0
      base_stats:
        hp: 25
        attack: 20
        defense: 20
        special_attack: 25
        special_defense: 45
        speed: 45
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 1
        speed: 0
      types:
        - bug
      egg_groups:
        - bug
      abilities:
        - swarm
        - compound_eyes
      hidden_ability: telepathy
      descriptions:
        jp_kana:
          sword: "いつも　せっせと　じょうほうを\nあつめているので　かしこい。\nただし　ちからは　いまいちだ。"
          shield: "はたけで　よくみかける　ポケモン。\nからだに　はえた　けで　まわりで\nおきていることを　かんじとる。"
        jp_kanji:
          sword: "いつも　せっせと　情報を\n集めているので　賢い。\nただし　力は　いまいちだ。"
          shield: "畑で　よく見かける　ポケモン。\n体に　生えた　毛で　まわりで\n起きていることを　感じとる。"
        en:
          sword: "A constant collector of information, this Pokémon\nis very smart. Very strong is what it isn’t."
          shield: "Often found in gardens, this Pokémon has hairs\non its body that it uses to assess its surroundings."
        fr:
          sword: "Comme il passe tout son temps à recueillir des\ninformations, son intelligence est très développée,\nmais sa force physique laisse à désirer."
          shield: "On le voit souvent dans les champs.\nLes poils de son corps lui servent à capter\nce qu’il se passe autour de lui."
        it:
          sword: "Sempre impegnato a raccogliere informazioni,\nha sviluppato molto la sua intelligenza, ma non\nha una grande forza."
          shield: "Si incontra spesso nei campi. Le setole che\ncrescono sul suo corpo gli permettono di\npercepire ciò che accade attorno a lui."
        de:
          sword: "Sensect ist ein schlaues Pokémon, da es immer\nfleißig Informationen sammelt. Seine Stärke lässt\njedoch zu wünschen übrig."
          shield: "Dieses Pokémon trifft man oft auf Feldern an.\nMit den Haaren, die an seinem Körper wachsen,\nspürt es, was in der Umgebung vor sich geht."
        es:
          sword: "Siempre está recopilando información, por lo\nque es muy inteligente, aunque su fuerza deja\nbastante que desear."
          shield: "Es habitual verlo en el campo. Los pelos que\ntiene son sensores con los que percibe lo que\nocurre a su alrededor."
        ko:
          sword: "언제나 부지런히 정보를\n모으기 때문에 똑똑하다.\n단, 힘은 그저 그렇다."
          shield: "밭에서 자주 보이는 포켓몬이다.\n몸에 난 털로 주위에서\n일어나는 일을 감지한다."
        zh_simp:
          sword: "总是孜孜不倦地收集情报，\n所以头脑相当地聪明，\n但力量方面就差了一些。"
          shield: "经常出现在田地里的宝可梦。\n会通过长在身体上的毛\n来感应周围发生的事。"
        zh_trad:
          sword: "總是孜孜不倦地收集情報，\n所以頭腦相當地聰明，\n但是力量方面就差了一些。"
          shield: "經常出現在田地裡的寶可夢。\n會透過長在身體上的毛\n來感應周圍發生的事。"
dottler:
  species_id: 825
  names:
    jp_kana: レドームシ
    jp_kanji: レドームシ
    en: Dottler
    fr: Coléodôme
    it: Dottler
    de: Keradar
    es: Dottler
    ko: 레돔벌레
    zh_simp: 天罩虫
    zh_trad: 天罩蟲
  forms:
    dottler:
      form_id: 0
      base_stats:
        hp: 50
        attack: 35
        defense: 80
        special_attack: 50
        special_defense: 90
        speed: 30
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 2
        speed: 0
      types:
        - bug
        - psychic
      egg_groups:
        - bug
      abilities:
        - swarm
        - compound_eyes
      hidden_ability: telepathy
      held_items:
        rare: psychic_seed
      descriptions:
        jp_kana:
          sword: "ほぼ　うごかないが　いきている。\nのまずくわずで　からに　こもるうち\nちょうのうりょくに　めざめたらしい。"
          shield: "からの　なかで　せいちょうちゅう。\nサイコパワーで　そとの　ようすを\nうかがい　しんかに　そなえている。"
        jp_kanji:
          sword: "ほぼ　動かないが　生きている。\n飲まず食わずで　殻に　こもるうち\n超能力に　目覚めたらしい。"
          shield: "殻の　中で　成長中。\nサイコパワーで　外の　様子を\nうかがい　進化に　備えている。"
        en:
          sword: "It barely moves, but it’s still alive. Hiding in its\nshell without food or water seems to have\nawakened its psychic powers."
          shield: "As it grows inside its shell, it uses its psychic\nabilities to monitor the outside world and\nprepare for evolution."
        fr:
          sword: "Il ne bouge presque pas, mais il est bien vivant.\nOn dit qu’il aurait découvert ses pouvoirs\npsychiques à force de jeûner dans sa coquille."
          shield: "Il se développe dans sa coquille et se prépare\nà évoluer en sondant les alentours grâce\nà ses pouvoirs psychiques."
        it:
          sword: "Si muove appena, ma è vivo. Sembra che sviluppi\npoteri paranormali mentre se ne sta rintanato nel\nsuo guscio senza bere né mangiare."
          shield: "Continua a crescere dentro il suo guscio.\nIn attesa dell’evoluzione, percepisce il mondo\nesterno grazie ai suoi poteri psichici."
        de:
          sword: "Obwohl es sich fast nie bewegt, ist es am Leben.\nEs sollen Psycho-Kräfte in ihm erwacht sein, als\nes ohne Nahrung in seinem Panzer ausharrte."
          shield: "Im Inneren seines Panzers wächst es. Während es\nsich auf die Entwicklung vorbereitet, prüft es mit\nseinen Psycho-Kräften, was im Freien geschieht."
        es:
          sword: "Apenas se mueve, pero está vivo. Se cree que\nadquiere poderes psíquicos mientras permanece\nrecluido en su caparazón sin comer ni beber."
          shield: "Está en constante crecimiento dentro del\ncaparazón. Mientras se prepara para evolucionar,\nexamina el exterior con sus poderes psíquicos."
        ko:
          sword: "거의 움직이지 않지만 살아 있다.\n식음을 전폐하고 껍질에 은둔하는 동안\n초능력에 눈을 뜬 모양이다."
          shield: "껍질 안에서 성장 중이다.\n사이코 파워로 밖의 상태를\n살피며 진화에 대비하고 있다."
        zh_simp:
          sword: "虽然几乎从来不动但还是活着的。\n它的超能力似乎是在缩在壳里\n不吃不喝的过程中觉醒的。"
          shield: "正在壳里成长着。\n用精神力量掌握外界的\n状况，做好进化的准备。"
        zh_trad:
          sword: "雖然幾乎從來不動但還是活著的。\n牠的超能力似乎是在縮在殼裡\n不吃不喝的過程中覺醒的。"
          shield: "正在殼裡成長著。\n用精神力量掌握外界的\n狀況，做好進化的準備。"
orbeetle:
