      descriptions:
        jp_kana:
          sword: "ガスじょうの　したで　なめられると\nからだの　ふるえが　とまらなくなり\nやがては　し　に　いたるという。"
          shield: "くらやみで　だれもいないのに\nみられているような　きがしたら\nそこに　ゴーストが　いるのだ。"
        jp_kanji:
          sword: "ガス状の　舌で　なめられると\n体の　震えが　止まらなくなり\nやがては　死　に　いたるという。"
          shield: "暗闇で　だれもいないのに\n見られているような　気がしたら\nそこに　ゴーストが　いるのだ。"
        en:
          sword: "Its tongue is made of gas. If licked, its victim\nstarts shaking constantly until death\neventually comes."
          shield: "If you get the feeling of being watched in darkness\nwhen nobody is around, Haunter is there."
        fr:
          sword: "On raconte que quiconque est léché par sa langue\nfaite de gaz est pris de tremblements jusqu’à\nce que mort s’ensuive."
          shield: "On dit que lorsque quelqu’un a l’impression\nd’être surveillé dans le noir, c’est sûrement\nqu’un Spectrum se trouve dans les parages."
        it:
          sword: "Chi viene leccato dalla sua lingua gassosa\nsoccombe in breve tempo scosso da tremiti\nirrefrenabili."
          shield: "Se da soli, al buio, si ha l’impressione di essere\nosservati da qualcuno, si tratta di Haunter."
        de:
          sword: "Seine Zunge besteht aus Gas. Schleckt es seine\nOpfer damit ab, zittern diese unentwegt, bis sie\nschließlich entschlafen."
          shield: "Falls du im Dunkeln das Gefühl hast, beobachtet\nzu werden, und niemand ist zu sehen, ist es\nbestimmt Alpollo."
        es:
          sword: "Su lengua está hecha de gas. Si lame a su víctima,\nesta sufrirá constantes temblores hasta fallecer."
          shield: "Cuando se tiene la sensación de ser observado\nen la oscuridad sin que haya nadie alrededor,\nseguro que es porque un Haunter anda cerca."
        ko:
          sword: "가스로 된 혀에 닿게 되면\n몸의 떨림이 멈추지 않게 되어\n결국에는 죽음에 이른다고 전해진다."
          shield: "어둠 속에서 아무도 없는데도\n누군가가 보고 있다는 느낌이 들면\n그곳에 고우스트가 있는 것이다."
        zh_simp:
          sword: "据说如果被它气体状的舌头舔到，\n身体就会无法停止颤抖，\n最终将会导致死亡。"
          shield: "如果黑暗中空空如也，\n但你却感觉被什么盯上了，\n那么鬼斯通一定就在那里。"
        zh_trad:
          sword: "據說如果被牠氣體狀的舌頭舔到，\n身體就會無法停止顫抖，\n最終將會導致死亡。"
          shield: "如果黑暗中空無一人，\n但你卻感覺被什麼盯上了，\n那麼鬼斯通一定就在那裡。"
gengar:
