        fr:
          sword: "L’exposition aux rayons éblouissants du soleil\na révélé sa véritable apparence et son potentiel\nréel."
          shield: "Ses pouvoirs psychiques se sont affaiblis,\nmais la tête sur sa queue sonde les alentours\nen émettant de faibles ondes télépathiques."
        it:
          sword: "L’esposizione a intensi raggi solari ha risvegliato\nl’aspetto e il potere originari di questo Pokémon."
          shield: "I suoi poteri psichici si sono indeboliti. La testa\nsulla punta della coda sonda l’area circostante\ntramite tenui onde telepatiche."
        de:
          sword: "Durch starke Sonneneinstrahlung wurden seine\neigentlichen Kräfte und seine wahre Gestalt\nfreigesetzt."
          shield: "Seine Psycho-Kräfte haben nachgelassen,\ndoch der Kopf an seinem Schweif überwacht\ndie Umgebung mittels schwacher Telepathie."
        es:
          sword: "Los intensos rayos solares que bañan su hábitat\nle han conferido un poder y aspecto que muchos\nconsideran su forma original."
          shield: "Su poder psíquico se ha debilitado. Aun así, la\ncabeza de la cola percibe el entorno mediante\ntelepatía de baja intensidad."
        ko:
          sword: "쨍쨍 내리쬐는 태양 빛을\n받은 결과 본래의\n모습과 능력이 각성되었다."
          shield: "에스퍼 능력은 약해졌다.\n꼬리의 머리가 미약한\n텔레파시로 주위를 살핀다."
        zh_simp:
          sword: "在炽热阳光的暴晒下，\n椰蛋树原本的样子\n和能力觉醒了。"
          shield: "拥有的超能力有所减弱。\n尾巴上的头会通过微弱的\n心灵感应来探查周围的状况。"
        zh_trad:
          sword: "在火辣辣的陽光照射下，\n椰蛋樹的能力覺醒了，\n長成了原本該有的樣子。"
          shield: "相較於進化前，超能力減弱了。\n尾巴上的頭會用微弱的\n心靈感應探查四周的狀況。"
cubone:
  species_id: 104
  names:
    jp_kana: カラカラ
    jp_kanji: カラカラ
    en: Cubone
    fr: Osselait
    it: Cubone
    de: Tragosso
    es: Cubone
    ko: 탕구리
    zh_simp: 卡拉卡拉
    zh_trad: 卡拉卡拉
  forms:
    cubone:
      form_id: 0
      base_stats:
        hp: 50
        attack: 50
        defense: 95
        special_attack: 40
        special_defense: 50
        speed: 35
      evs_yield:
        hp: 0
