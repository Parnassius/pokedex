        jp_kana:
          sword: "およいで　スピードが　のってくると\nなみのうえに　とびだし　そのまま\n１００メートルも　かっくう　する。"
          shield: "ゆうぜんと　うみを　およぐ。\nたべのこしを　ねらった　テッポウオが\nくっついていても　きにしていない。"
        jp_kanji:
          sword: "泳いで　スピードが　のってくると\n波の上に　飛びだし　そのまま\n１００メートルも　滑空　する。"
          shield: "悠然と　海を　泳ぐ。\n食べ残しを　狙った　テッポウオが\nくっついていても　気にしていない。"
        en:
          sword: "If it builds up enough speed swimming, it\ncan jump out above the waves and glide\nfor over 300 feet."
          shield: "As it majestically swims, it doesn’t care if\nRemoraid attach to it to scavenge for its leftovers."
        fr:
          sword: "Il peut planer au-dessus des vagues sur plus\nde 100 m en prenant son élan dans la mer."
          shield: "Il nage paisiblement, sans se soucier des Rémoraid\nqui s’agrippent à lui pour lui voler ses restes."
        it:
          sword: "Prende velocità nuotando e, quando è pronto,\nusa le onde come trampolini per saltare,\nplanando poi anche per 100 m."
          shield: "Nuota placidamente nel mare. Non si cura\ndei Remoraid che gli si attaccano addosso\nper cibarsi dei suoi avanzi."
        de:
          sword: "Schwimmt es schnell genug, kann es über die\nWellen springen und bis zu 100 m durch die\nLüfte gleiten."
          shield: "Es schwimmt erhaben durch die Meere und\nduldet dabei etwaige Remoraid, die sich in der\nHoffnung auf Futterreste an es heften."
        es:
          sword: "Tras ganar velocidad nadando, aprovecha las olas\npara proyectarse y recorrer planeando hasta\n100 m de distancia."
          shield: "Mientras nada plácidamente, no le importa que\nlos Remoraid se aferren a él para comerse sus\nsobras."
        ko:
          sword: "헤엄쳐서 스피드가 빨라지면\n파도 위로 뛰어올라\n그대로 100m나 활공한다."
          shield: "여유롭게 바다를 헤엄친다.\n먹다 남은 음식을 노린 총어가\n달라붙어 있어도 신경 쓰지 않는다."
        zh_simp:
          sword: "游动时速度上来后，\n甚至会从波浪上起飞，\n然后就这样滑翔１００米。"
          shield: "悠然地畅游在大海中。\n就算有觊觎食物残渣的铁炮鱼\n吸附在自己身上也毫不在意。"
        zh_trad:
          sword: "游動時速度上來後，\n甚至會從波浪上飛起來，\n然後就這樣滑翔１００公尺。"
          shield: "悠然地暢游在大海中。\n就算有覬覦食物殘渣的鐵炮魚\n吸附在自己身上也毫不在意。"
skarmory:
