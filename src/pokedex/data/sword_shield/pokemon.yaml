      names:
        jp_kana: ブレードフォルム
        jp_kanji: ブレードフォルム
        en: Blade Forme
        fr: Forme Assaut
        it: Forma Spada
        de: Klingenform
        es: Forma Filo
        ko: 블레이드폼
        zh_simp: 刀剑形态
        zh_trad: 刀劍形態
      base_stats:
        hp: 60
        attack: 140
        defense: 50
