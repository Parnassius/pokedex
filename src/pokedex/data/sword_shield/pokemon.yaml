        fr: Gigamax
        it: Gigamax
        de: Gigadynamax
        es: Gigamax
        ko: 거다이맥스
        zh_simp: 超极巨化
        zh_trad: 超極巨化
      descriptions:
        jp_kana:
          sword: "みずでっぽうの　そくどは　マッハ７。\nあたまの　とさかで　かぜや　きおんを\nかんちしながら　ねらいを　さだめる。"
          shield: "そげきの　うでまえは　バツグン。\n１５キロさきに　ころがる　きのみを\nうちぬくのも　あさめしまえだ。"
        jp_kanji:
          sword: "水鉄砲の　速度は　マッハ７。\n頭の　とさかで　風や　気温を\n感知しながら　狙いを　定める。"
          shield: "狙撃の　腕前は　抜群。\n１５キロ先に　転がる　木の実を\n撃ち抜くのも　朝飯前だ。"
        en:
          sword: "Gigantamax Inteleon’s Water Gun move fires at\nMach 7. As the Pokémon takes aim, it uses the\ncrest on its head to gauge wind and temperature."
          shield: "It has excellent sniping skills. Shooting a berry\nrolling along over nine miles away is a piece of\ncake for this Pokémon."
        fr:
          sword: "Les jets d’eau qu’il tire atteignent Mach 7.\nAu moment de viser, il se sert de la crête sur\nsa tête pour jauger le vent et la température."
          shield: "Pour ce tireur d’élite au talent exceptionnel,\ntoucher une Baie qui roule au sol à 15 km\nde distance est un véritable jeu d’enfant."
        it:
          sword: "Il suo getto d’acqua raggiunge la velocità\ndi Mach 7. Aggiusta la mira sfruttando la cresta\nper rilevare il vento e la temperatura."
          shield: "La sua abilità di tiratore è ineguagliabile.\nCentra in pieno una bacca a 15 km di distanza\ncome se nulla fosse."
        de:
          sword: "Sein Wasserstrahl erreicht ein Tempo von Mach 7.\nBeim Anvisieren des Zieles bestimmt es Wind und\nTemperatur mit dem Kamm auf seinem Kopf."
          shield: "Dieser ausgezeichnete Scharfschütze kann eine\nrollende Beere problemlos aus 15 km Entfernung\ntreffen."
        es:
          sword: "Los chorros de agua que dispara alcanzan una\nvelocidad de 7 mach. Fija el blanco evaluando\nel viento y la temperatura con la cresta."
          shield: "Posee una puntería extraordinaria. Para este\nPokémon, acertar a una baya que rueda a 15 km\nde distancia es pan comido."
        ko:
          sword: "물대포의 속도는 마하7이다.\n머리의 볏으로 바람과 기온을\n감지하면서 조준을 맞춘다."
          shield: "저격 실력이 굉장하다. 15km 떨어진\n곳에 굴러다니는 나무열매를\n관통하는 것도 누워서 떡 먹기다."
        zh_simp:
          sword: "水枪的速度达到了７马赫。\n能够一边通过头上的冠感知\n风和气温，一边锁定目标。"
          shield: "狙击技巧超群。打穿掉落在\n１５公里以外地面上的树果\n对它来说也是小菜一碟。"
        zh_trad:
          sword: "水槍的速度可達音速的７倍。\n能一邊利用頭上的冠感測風\n和氣溫，一邊瞄準目標。"
          shield: "狙擊的技術出類拔萃。\n要射穿掉落在１５公里外\n的樹果也是小事一樁。"
skwovet:
  species_id: 819
  names:
    jp_kana: ホシガリス
    jp_kanji: ホシガリス
    en: Skwovet
    fr: Rongourmand
    it: Skwovet
    de: Raffel
    es: Skwovet
    ko: 탐리스
    zh_simp: 贪心栗鼠
    zh_trad: 貪心栗鼠
  forms:
    skwovet:
      form_id: 0
      base_stats:
        hp: 70
        attack: 55
        defense: 55
        special_attack: 35
        special_defense: 35
