          shield: "ちじょうを　あるくときは　ひふが\nかんそう　しないように　どくの\nねんまくで　からだを　おおっている。"
        jp_kanji:
          sword: "冷たい　水の中で　生活。\nあたりが　涼しくなると　エサを\n探しに　地上にも　現れる。"
          shield: "地上を　歩くときは　皮膚が\n乾燥　しないように　毒の\n粘膜で　体を　被っている。"
        en:
          sword: "This Pokémon lives in cold water. It will leave the\nwater to search for food when it gets cold outside."
          shield: "When walking on land, it covers its body with a\npoisonous film that keeps its skin from dehydrating."
        fr:
          sword: "Ce Pokémon vit en eaux froides. Si la température\nextérieure est assez basse, il lui arrive de\nse rendre sur la terre ferme pour se nourrir."
          shield: "Lorsqu’il est sur la terre ferme, il couvre\nson corps d’un voile toxique qui le protège\nde la déshydratation."
        it:
          sword: "Vive nell’acqua fredda. Quando la temperatura\nesterna è abbastanza fresca, si spinge sulla\nterraferma in cerca di cibo."
          shield: "Quando si avventura sulla terraferma, ricopre\nil suo corpo di una sostanza velenosa che\nlo mantiene idratato."
        de:
          sword: "Dieses Pokémon lebt in kaltem Wasser. Wenn die\nTemperaturen an Land tief genug fallen, verlässt\nes das Wasser und sucht dort nach Futter."
          shield: "An Land bedeckt es seine Haut mit einer giftigen\nSchicht, die es vor dem Austrocknen bewahrt."
        es:
          sword: "Este Pokémon vive en aguas frías. Sale del agua\npara buscar comida cuando refresca el ambiente."
          shield: "Cuando se desplaza en tierra firme, cubre su\ncuerpo con una membrana mucosa y venenosa\npara mantener hidratada la piel."
        ko:
          sword: "차가운 물속에서 생활한다.\n근처가 선선해지면 먹이를\n찾으러 지상에도 나타난다."
          shield: "지상에서 걸을 때는 피부가\n건조해지지 않도록 독성분의\n점막으로 몸을 감싸고 있다."
        zh_simp:
          sword: "在冰冷的水中生活。\n附近天气变凉之后，\n也会来到地上觅食。"
          shield: "为了在地面上行走时\n不让皮肤干燥，会用\n有毒的粘膜覆盖身体。"
        zh_trad:
          sword: "在冰冷的水中生活。\n當周遭的天氣變涼時，\n也會來到陸地上覓食。"
          shield: "為了在地面上行走時\n不讓皮膚乾燥，會用\n有毒的黏膜覆蓋身體。"
quagsire:
