        jp_kana:
          sword: "ベールの　ような　てあしで　エモノを\nだきかかえ　８０００メートルの\nしんかいへと　ひきずりこむ。"
          shield: "かいていに　しずんだ　こだいとしの\nじゅうみんが　ポケモンに　なったと\nいう　いいつたえが　のこされている。"
        jp_kanji:
          sword: "ベールの　ような　手足で　獲物を\n抱きかかえ　８０００メートルの\n深海へと　引きずり込む。"
          shield: "海底に　沈んだ　古代都市の\n住民が　ポケモンに　なったと\nいう　言い伝えが　残されている。"
        en:
          sword: "It envelops its prey in its veillike arms and draws\nit down to the deeps, five miles below the\nocean’s surface."
          shield: "Legend has it that the residents of a sunken\nancient city changed into these Pokémon."
        fr:
          sword: "Il utilise ses membres en forme de voiles\npour enlacer ses proies et les entraîner à 8 000 m\nde profondeur sous la surface de l’eau."
          shield: "Certaines légendes racontent que les Viskuse\nsont les habitants d’une ancienne cité engloutie\nqui ont été changés en Pokémon."
        it:
          sword: "Agguanta la preda con i suoi tentacoli a forma di\nvelo e poi la trascina a 8.000 m sotto il livello\ndel mare."
          shield: "La leggenda narra che i Frillish siano in realtà gli\nabitanti di un’antica città sommersa che si sono\ntrasformati in Pokémon."
        de:
          sword: "Es hält seine Beute mit seinen schleierartigen\nArmen fest und zerrt sie 8 000 m tief ins Meer."
          shield: "Einer Sage nach sind Quabbel in Wirklichkeit\nBewohner einer uralten, im Meer versunkenen\nStadt, die zu Pokémon wurden."
        es:
          sword: "Atenaza a las presas con sus tentáculos en forma\nde velo y las sumerge a 8000 m de profundidad."
          shield: "Cuenta la leyenda que los Frillish son en realidad\nlos habitantes de una antigua ciudad sumergida\nconvertidos en Pokémon."
        ko:
          sword: "베일과도 같은 손발로 먹이를\n끌어안아 8000m 아래의\n심해로 끌고 들어간다."
          shield: "해저에 가라앉은 고대 도시의\n주민이 포켓몬이 되었다는\n전설이 남아 있다."
        zh_simp:
          sword: "会用薄纱般的手脚\n缠住猎物，将对手拖进\n８０００米深的海中。"
          shield: "据流传至今的传说里所述，\n它是由沉没到海底的古代都市\n的居民变成的宝可梦。"
        zh_trad:
          sword: "會用薄紗般的手腳\n纏住獵物，將對手拖進\n８０００公尺深的海中。"
          shield: "據流傳至今的傳說所述，\n牠是由沉沒到海底的古代都市\n的居民變成的寶可夢。"
