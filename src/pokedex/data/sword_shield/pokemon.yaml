      descriptions:
        jp_kana:
          sword: "あたまの　さゆうの　とっきから\nちょうおんぱを　だして　まっくらな\nほらあなの　ようすを　しらべるのだ。"
          shield: "すみかの　どうくつには　ほうせきを\nまいぞうするが　はいりこんだとたんに\nツメと　キバで　ズタズタにされる。"
        jp_kanji:
          sword: "頭の　左右の　突起から\n超音波を　出して　真っ暗な\n洞穴の　様子を　調べるのだ。"
          shield: "すみかの　洞窟には　宝石を\n埋蔵するが　入りこんだとたんに\nツメと　キバで　ズタズタにされる。"
        en:
          sword: "This Pokémon emits ultrasonic waves from a\nprotrusion on either side of its head to probe\npitch-dark caves."
          shield: "Jewels are buried in the caves these Pokémon\nnest in, but you’ll be torn apart by claws and\nfangs the moment you enter one of these caves."
        fr:
          sword: "Il émet des ultrasons avec les deux appendices\nsur sa tête pour sonder les grottes obscures."
          shield: "Il cache des pierres précieuses dans le sol\nde sa grotte, et accueille à coups de griffes\net de crocs quiconque ose y pénétrer."
        it:
          sword: "Emette ultrasuoni dalle protuberanze sulla testa\nper esaminare le grotte anche nel buio più fitto."
          shield: "Accumula pietre preziose nella grotta in cui vive.\nFa a pezzi con gli artigli e le zanne chiunque\nvi si intrufoli."
        de:
          sword: "Aus den Fortsätzen an beiden Seiten seines\nKopfes stößt es Ultraschallwellen aus, um sich\nin stockfinsteren Höhlen zurechtzufinden."
          shield: "In der Höhle, die Knarksel als Nest dient,\nvergräbt es Edelsteine. Wer sie betritt, wird\nsofort von seinen Krallen und Zähnen zerfetzt."
        es:
          sword: "Explora las más oscuras cuevas utilizando ondas\nultrasónicas que emite desde las protuberancias\na ambos lados de la cabeza."
          shield: "Entierra gemas en la cueva que le sirve de nido y\nhace trizas con sus garras y colmillos a cualquier\nintruso."
        ko:
          sword: "머리의 좌우 돌기에서\n초음파를 내보내 캄캄한\n동굴의 상황을 살핀다."
          shield: "거처인 동굴에 보석을 매장하는데\n그곳에 침입자가 들어가면 즉시\n발톱과 이빨로 갈기갈기 찢어버린다."
        zh_simp:
          sword: "会从头部左右两边的\n突起物发出超音波，\n观察漆黑洞窟中的状况。"
          shield: "会把宝石埋藏在栖息的洞窟内。\n入侵者闯入洞窟后，会立刻\n被它用爪子和牙齿撕碎。"
        zh_trad:
          sword: "會從頭部左右兩側的突起處\n發出超音波，藉此調查漆黑\n洞窟裡的狀況。"
          shield: "會把寶石埋藏在自己棲息的\n洞窟裡。但只要入侵牠的洞窟，\n就會立刻被牠的爪子和牙齒撕碎。"
garchomp:
