        - fighting
      egg_groups:
        - flying
        - field
      abilities:
        - steadfast
      hidden_ability: scrappy
      held_items:
        common: leek
      descriptions:
        jp_kana:
          sword: "ガラルに　すむ　カモネギの　すがた。\nふとく　たくましい　ネギを　ふるい\nゆうかんに　たたかう　せんし。"
          shield: "ふとく　ながい　ガラルの　ネギを\nつかいこなす　うちに　どくじの\nすがたに　へんかした　カモネギ。"
        jp_kanji:
          sword: "ガラルに　棲む　カモネギの　姿。\n太く　たくましい　ネギを　振るい\n勇敢に　戦う　戦士。"
          shield: "太く　長い　ガラルの　ネギを\n使いこなす　うちに　独自の\n姿に　変化した　カモネギ。"
        en:
          sword: "The Farfetch’d of the Galar region are brave\nwarriors, and they wield thick, tough leeks\nin battle."
          shield: "The stalks of leeks are thicker and longer in the\nGalar region. Farfetch’d that adapted to these\nstalks took on a unique form."
        fr:
          sword: "Il s’agit de la Forme de Galar de Canarticho.\nC’est un guerrier courageux qui brandit un large\net imposant poireau."
          shield: "Les Canarticho ont pris cette forme à force\nde manier les poireaux de Galar, qui sont plus\nlongs et plus larges que ceux des autres régions."
        it:
          sword: "È la forma assunta dai Farfetch’d che vivono\na Galar, che lottano con coraggio brandendo\nun porro grosso e robusto."
          shield: "Farfetch’d ha assunto questa forma singolare\nimparando a utilizzare i particolari porri lunghi\ne grossi di Galar."
        de:
          sword: "Dies ist die in Galar ansässige Form von Porenta.\nDieser tapfere Krieger schwingt im Kampf eine\ndicke, robuste Lauchstange."
          shield: "Diese besondere Form nahm Porenta an,\nnachdem es über lange Zeit die dicken, langen\nLauchstangen Galars verwendet hatte."
        es:
          sword: "Este es el aspecto de los Farfetch’d que habitan\nen Galar. Son guerreros fieros y osados que\nluchan blandiendo un puerro grueso y firme."
          shield: "Los Farfetch’d de Galar han adoptado esta forma\nde tanto blandir los puerros típicos de la región,\nque son gruesos y largos."
        ko:
          sword: "가라르에 사는 파오리의 모습.\n굵고 튼튼한 파를 휘두르며\n용감하게 싸우는 전사다."
          shield: "굵고 긴 가라르의 파를\n자유자재로 구사하는 과정에서\n독자적인 모습으로 변화한 파오리."
        zh_simp:
          sword: "生活在伽勒尔的大葱鸭\n挥舞着又粗又壮的大葱，\n是英勇奋战的战士。"
          shield: "在不断活用又粗又长的\n伽勒尔大葱的过程中，\n大葱鸭演化成了独特的样子。"
        zh_trad:
          sword: "生活在伽勒爾的大蔥鴨。\n揮舞著又粗又壯的大蔥，\n是英勇奮戰的戰士。"
          shield: "在不斷活用又粗又長的\n伽勒爾大蔥的過程中，\n大蔥鴨演化成了獨特的樣子。"
