          shield: "きょうてきを　あいてにすると\nせんとういよくの　たかまりと　ともに\nほのおのすずの　かりょくも　あがる。"
        jp_kanji:
          sword: "首の　付け根の　炎袋は\n戦いに　なると　火力が\n上がり　鈴のような　音を　出す。"
          shield: "強敵を　相手にすると\n戦闘意欲の　高まりと　ともに\n炎の鈴の　火力も　上がる。"
        en:
          sword: "In the midst of battle, the fire pouch on\nTorracat’s neck rings like a bell and produces\nstronger flames than usual."
          shield: "When facing a powerful enemy, Torracat’s\nfighting spirit gets pumped up, and its fire bell\nblazes hotter."
        fr:
          sword: "La poche à feu située à la base de son cou\ngagne en température pendant les combats\net émet un bruit semblable à un grelot."
          shield: "Quand il fait face à un adversaire redoutable,\nil redouble de combativité et la puissance\ncalorifère de sa clochette augmente."
        it:
          sword: "Durante la lotta, la sacca alla base del collo\naumenta la produzione di energia termica ed\nemette un tintinnio simile a un sonaglio."
          shield: "Quando affronta un nemico molto forte\nil suo spirito combattivo e l’energia termica\nprodotta dal sonaglio infuocato aumentano."
        de:
          sword: "Die Flammendrüse an seinem Hals heizt sich im\nKampf immer weiter auf und erzeugt so Töne,\ndie denen eines Glöckchens gleichen."
          shield: "Wenn es sich einem starken Gegner stellt, steigt\nnicht nur sein Kampfeswille, sondern auch die\nHeizkraft seines feurigen Glöckchens."
        es:
          sword: "La saca de fuego que luce al cuello arde con\nmayor intensidad durante el combate y emite\nun tintineo que recuerda al de un cascabel."
          shield: "Enfrentarse a un adversario formidable aviva\ntanto su espíritu combativo como la energía\ntérmica de su cascabel."
        ko:
          sword: "목덜미에 있는 불꽃 주머니는\n싸움에 들어가면 화력이 올라\n방울 소리 같은 소리를 낸다."
          shield: "강적을 상대하게 되면\n전투 의욕이 높아지고 동시에\n불꽃 방울의 화력도 올라간다."
        zh_simp:
          sword: "脖子根部的火囊在进入战斗\n状态后火力就会上升，\n并发出铃铛般的声音。"
          shield: "如果敌人实力强劲，\n它便会更有战斗的欲望，\n火焰铃铛的火力也会随之上升。"
        zh_trad:
          sword: "脖子根部的火囊在進入戰鬥\n狀態後火力就會上升，\n並發出像鈴鐺般的聲音。"
          shield: "如果敵人實力強勁，\n牠便會更有戰鬥的欲望，\n火焰鈴鐺的火力也會隨之上升。"
