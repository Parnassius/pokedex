          shield: "りっぱに　のびた　ツノは　いせいに\nアピールするために　はえている。\nぶきとして　つかうことはない。"
        jp_kanji:
          sword: "弾力の　ある　毛で　織った\nカーペットは　トランポリンみたいで\n乗れば　ピョンピョン　跳ねるのだ。"
          shield: "立派に　伸びた　ツノは　異性に\nアピールするために　生えている。\n武器として　使うことはない。"
        en:
          sword: "Weave a carpet from its springy wool, and you end\nup with something closer to a trampoline. You’ll\nstart to bounce the moment you set foot on it."
          shield: "Its majestic horns are meant only to impress the\nopposite gender. They never see use in battle."
        fr:
          sword: "La texture de sa laine est si élastique que\nla surface des tapis fabriqués avec ce matériau\nest aussi rebondissante que celle d’un trampoline."
          shield: "Ses splendides cornes lui servent à attirer\nles membres de l’autre sexe.\nIl ne s’en sert jamais pour se battre."
        it:
          sword: "I tappeti realizzati con i suoi peli sono talmente\nelastici che saltandoci sopra si rimbalza come\nsu un trampolino."
          shield: "Le sue magnifiche corna hanno la funzione\ndi attirare gli individui di sesso opposto.\nNon le usa mai per attaccare."
        de:
          sword: "Spannt man einen aus den elastischen Haaren\nvon Zwollock gewobenen Teppich auf, kann man\ndarauf hüpfen wie auf einem Trampolin."
          shield: "Seine prächtig gewachsenen Hörner dienen dazu,\ndem anderen Geschlecht zu imponieren. Es nutzt\nsie nicht als Waffe."
        es:
          sword: "Su lana es muy flexible. Las alfombras tejidas con\nella adoptan una textura similar a la de las camas\nelásticas."
          shield: "Sus espléndidos cuernos sirven de reclamo para\natraer al sexo opuesto. No los utiliza como arma."
        ko:
          sword: "탄력 있는 털로 짜낸\n카펫은 트램펄린 같아서\n올라가면 통통 튀어 오르게 된다."
          shield: "늠름하게 자란 뿔은 이성에게\n어필하기 위한 것이다.\n무기로는 사용하지 않는다."
        zh_simp:
          sword: "用它那弹力十足的毛\n织成的地毯就像是弹簧垫，\n可以站上去蹦蹦跳。"
          shield: "长得长长的角是为了\n向异性求爱而存在的。\n它从不会把角当做武器。"
        zh_trad:
          sword: "用牠那彈力十足的毛\n織成的地毯就像是彈簧墊，\n可以站上去蹦蹦跳。"
          shield: "長得長長的角是為了\n向異性求愛而存在的。\n牠從不會把角當作武器。"
chewtle:
  species_id: 833
  names:
    jp_kana: カムカメ
    jp_kanji: カムカメ
    en: Chewtle
    fr: Khélocrok
    it: Chewtle
    de: Kamehaps
    es: Chewtle
    ko: 깨물부기
    zh_simp: 咬咬龟
    zh_trad: 咬咬龜
  forms:
    chewtle:
      form_id: 0
      base_stats:
        hp: 50
        attack: 64
        defense: 50
        special_attack: 38
        special_defense: 38
        speed: 44
      evs_yield:
        hp: 0
        attack: 1
