        hp: 0
        attack: 0
        defense: 0
        special_attack: 1
        special_defense: 0
        speed: 1
      types:
        - electric
        - grass
      egg_groups:
        - amorphous
      abilities:
        - levitate
      descriptions:
        jp_kana:
          sword: "とくしゅな　モーターで　うごく\nしばかりきに　はいっている。\nかりとった　くさを　まきちらす。"
          shield: "そだてた　おはなを　かりとる。\nくさに　かんする　わるさを\nたのしむ　ロトムの　すがた。"
        jp_kanji:
          sword: "特殊な　モーターで　動く\n芝刈り機に　入っている。\n刈り取った　草を　まき散らす。"
          shield: "育てた　お花を　刈り取る。\n草に　関する　悪さを\n楽しむ　ロトムの　姿。"
        en:
          sword: "This is Rotom after it’s seized control of a lawn\nmower that has a special motor. As it mows\ndown grass, it scatters the clippings everywhere."
          shield: "In this form, Rotom focuses its antics on plants.\nAny flowers you were growing are going to\nget mowed down."
        fr:
          sword: "Il a pris possession d’une tondeuse munie\nd’un moteur spécial. Il éparpille les brins d’herbe\nqu’il a tondus."
          shield: "Sous cette forme, Motisma adore utiliser\nles plantes pour faire des bêtises, comme arracher\nles fleurs cultivées avec amour."
        it:
          sword: "È entrato in un tagliaerba azionato da un motore\nspeciale. Sparge dappertutto l’erba tagliata."
          shield: "Sotto questa forma si diverte a tagliare i fiori\ncoltivati con cura o combina altre malefatte\ncon la vegetazione."
        de:
          sword: "Es ist in einen Rasenmäher eingedrungen, der\nvon einem besonderen Motor betrieben wird.\nDas von ihm gemähte Gras verstreut es wahllos."
          shield: "Diese Form von Rotom liebt es, mit Pflanzen für\nChaos zu sorgen. Es mäht mühsam gepflegte\nBlumen ohne Gnade nieder."
        es:
          sword: "Ha tomado posesión de un cortacésped que\nfunciona con un motor especial. Esparce por\ntodos lados la hierba que ha cortado."
          shield: "Asume esta forma para cometer fechorías\nrelacionadas con las plantas, tales como cortar\nlas flores que alguien ha cuidado con esmero."
        ko:
          sword: "특수한 모터로 움직이는\n잔디깎이에 들어갔다.\n깎은 잔디를 여기저기 흩뿌린다."
          shield: "잘 자란 꽃을 베어 버린다.\n풀을 이용한 장난을\n즐기는 로토무의 모습."
        zh_simp:
          sword: "钻进由特殊马达驱动的\n割草机里的洛托姆。\n会把割下的草到处乱撒。"
          shield: "会割掉你种好的花。\n喜欢与草有关的\n恶作剧的洛托姆。"
        zh_trad:
          sword: "鑽進由特殊馬達驅動的\n割草機裡的洛托姆。\n會把割下的草到處亂撒。"
          shield: "會割掉你種好的花。\n喜歡與草有關的\n惡作劇的洛托姆。"
