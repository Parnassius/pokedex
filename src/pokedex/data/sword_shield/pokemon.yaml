      descriptions:
        jp_kana:
          sword: "いかりが　ちょうてんに　たっすると\nふぶきを　ふきだして　てきも\nみかたも　こおりづけに　する。"
          shield: "たいおんは　マイナス６ど　ぜんご。\n２ひきの　バニリッチが　くっつき\nうまれたと　いわれている。"
        jp_kanji:
          sword: "怒りが　頂点に　達すると\n吹雪を　噴き出して　敵も\n味方も　氷漬けに　する。"
          shield: "体温は　マイナス６度　前後。\n２匹の　バニリッチが　くっつき\n生まれたと　いわれている。"
        en:
          sword: "When its anger reaches a breaking point, this\nPokémon unleashes a fierce blizzard that freezes\nevery creature around it, be they friend or foe."
          shield: "People believe this Pokémon formed when two\nVanillish stuck together. Its body temperature is\nroughly 21 degrees Fahrenheit."
        fr:
          sword: "Lorsqu’il a les nerfs en boule, il provoque\nun blizzard qui gèle tout le monde, alliés\ncomme adversaires."
          shield: "La température de son corps est d’environ\n- 6 °C. On raconte que ce Pokémon naît\nlorsque deux Sorboul se collent l’un à l’autre."
        it:
          sword: "Quando è furibondo, scatena una tormenta\ndi neve che congela sia alleati che nemici."
          shield: "La sua temperatura corporea si aggira intorno\nai -6 ºC. Si dice che sia nato dall’unione di due\nVanillish."
        de:
          sword: "Wenn es in Rage gerät, erzeugt es gewaltige\nEisböen, die sowohl Freund als auch Feind\nzu Eisklötzen gefrieren lassen."
          shield: "Seine Körpertemperatur beträgt circa -6 ºC.\nAngeblich ist es aus der Verschmelzung von\nzwei Gelatroppo hervorgegangen."
        es:
          sword: "Cuando su rabia alcanza el punto máximo,\ngenera una ventisca que congela tanto a amigos\ncomo a enemigos."
          shield: "Su temperatura corporal ronda los -6 °C. Se dice\nque nace de la fusión de dos Vanillish."
        ko:
          sword: "분노가 정점에 달하면\n눈보라를 불게 하여 적도\n아군도 꽁꽁 얼려버린다."
          shield: "체온은 마이너스 6도 전후이다.\n2마리의 바닐리치가 붙어서\n태어났다고 한다."
        zh_simp:
          sword: "当愤怒达到极限时，\n就会喷出暴风雪，\n把敌人和伙伴都冻成冰块。"
          shield: "体温在零下６度左右。\n据说是由２只多多冰\n贴在一起而诞生的。"
        zh_trad:
          sword: "當憤怒達到極限時，\n就會噴出暴風雪，\n把敵人和夥伴都凍成冰塊。"
          shield: "體溫在零下６度左右。\n據說是由２隻多多冰\n黏在一起而誕生的。"
