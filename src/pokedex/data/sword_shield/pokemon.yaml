          shield: "じひびきを　ならしながら　あるくと\nおおきな　やまでさえ　くずれ\nまわりの　ちけいは　かわってしまう。"
        jp_kanji:
          sword: "どんな　攻撃にも　びくともしない\n体を　もっているため\nどんどん　勝負を　仕掛けてくる。"
          shield: "地響きを　鳴らしながら　歩くと\n大きな　山でさえ　崩れ\nまわりの　地形は　変わってしまう。"
        en:
          sword: "Its body can’t be harmed by any sort of attack,\nso it is very eager to make challenges\nagainst enemies."
          shield: "The quakes caused when it walks make even\ngreat mountains crumble and change\nthe surrounding terrain."
        fr:
          sword: "Son corps est invulnérable à toutes les attaques,\nc’est pourquoi il aime tant mettre ses forces\nà l’épreuve."
          shield: "Son pas est si lourd qu’il fait trembler le sol\net s’écrouler même les plus grandes montagnes,\nce qui altère la topographie de la zone."
        it:
          sword: "Il suo corpo non è scalfito da alcun attacco,\nperciò sfida un avversario dietro l’altro senza\nesitazione."
          shield: "Può camminare a passi così pesanti da far\ncrollare perfino le montagne più grosse,\ntrasformando così il paesaggio circostante."
        de:
          sword: "Dank seines starken Körpers fürchtet es sich vor\nkeiner Form von Angriff. Deshalb zettelt es\nununterbrochen Kämpfe an."
          shield: "Seine Schritte erzeugen Erdbeben, die selbst\ngroße Berge plätten und die Form ganzer\nLandstriche verändern."
        es:
          sword: "Casi ningún ataque hace mella en su cuerpo, por\nlo que le encanta desafiar a sus enemigos."
          shield: "Sus estrepitosos pasos derrumban montañas\ny hacen que el terreno a su alrededor cambie\ndrásticamente."
        ko:
          sword: "어떤 공격에도 꿈쩍도 하지 않는\n몸을 가졌기 때문에\n자꾸 승부를 걸어온다."
          shield: "지축을 울리면서 걸으면\n큰 산조차 무너지며\n주변의 지형은 변해버린다."
        zh_simp:
          sword: "拥有无论遭到任何攻击\n都能毫发无伤的身体，\n因此会不断向对手挑战。"
          shield: "当它带着巨大轰鸣声迈开脚步，\n就连大山都会为之崩裂，\n周围的地形也会因此改变。"
        zh_trad:
          sword: "擁有無論遭受任何攻擊\n都能毫髮無傷的身體，\n因此會不斷向對手挑戰。"
          shield: "當牠帶著巨大轟鳴聲邁開腳步，\n就連大山都會為之崩裂，\n周遭的地形也會因而改變。"
