          sword: "おおぞらを　ゆったりと　とびながら\nみみにした　ものを　うっとりさせる\nうつくしい　ハミングを　かなでる。"
          shield: "やさしい　せいしつだが　おこらせると\nするどい　なきごえで　いかくして\nようしゃない　こうげきを　くわえる。"
        jp_kanji:
          sword: "大空を　ゆったりと　飛びながら\n耳にした　者を　うっとりさせる\n美しい　ハミングを　奏でる。"
          shield: "優しい　性質だが　怒らせると\n鋭い　鳴き声で　威嚇して\n容赦ない　攻撃を　くわえる。"
        en:
          sword: "As it flies in a calm and relaxed manner, Altaria\nperforms a humming song that would enrapture\nany audience."
          shield: "This Pokémon has a kind disposition, but if it’s\nprovoked, it will threaten opponents with shrill\ncries before attacking them without mercy."
        fr:
          sword: "Il vole doucement dans le ciel et fredonne\nde magnifiques mélodies qui enchantent\ntous ceux qui les entendent."
          shield: "Il est de nature aimable, mais si on le met en\ncolère, il intimide son adversaire en poussant\nun cri strident et l’attaque sans pitié."
        it:
          sword: "Mentre si libra elegante in cielo, intona un canto\nsoave che ammalia chi lo sente."
          shield: "Ha un carattere gentile, ma se lo si fa arrabbiare\nemette un verso minaccioso, per poi attaccare\nsenza pietà."
        de:
          sword: "Es schwebt gemächlich durch die Lüfte und\nlässt dabei ein wunderschönes Summen ertönen,\ndas alle in seinen Bann zieht, die es hören."
          shield: "Altaria ist von sanfter Natur, doch wird es\nverärgert, stößt es zur Einschüchterung schrilles\nGeschrei aus und greift dann gnadenlos an."
        es:
          sword: "Mientras vuela pausadamente, emite un bello\ntrino que cautiva a todo el que lo oye."
          shield: "Es de carácter amable, pero, si monta en cólera,\nintimidará al oponente con estridentes chillidos\ny atacará sin piedad."
        ko:
          sword: "넓은 하늘을 유유히 날면서\n듣는 이를 사로잡는\n아름다운 콧노래를 부른다."
          shield: "온순한 성질이지만 화나게 하면\n날카로운 울음소리로 위협하며\n가차 없이 공격한다."
        zh_simp:
          sword: "一边舒适地在天空中飞翔，\n一边发出优美的哼唱，\n让听到之人都为之沉醉。"
          shield: "虽然性情温顺，但如果被惹怒，\n就会用尖锐的叫声威吓对方，\n并且毫不留情地发动进攻。"
        zh_trad:
          sword: "會一邊在天空中悠然飛翔，\n一邊哼唱出令人心醉神迷\n的美妙旋律。"
          shield: "性情溫柔，但一旦被激怒，\n就會用尖銳的叫聲威嚇對方，\n並且毫不留情地施加攻擊。"
