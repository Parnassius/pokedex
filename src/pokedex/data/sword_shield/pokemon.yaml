      descriptions:
        jp_kana:
          sword: "おおきな　アゴは　ふとい　えだを\nへしおる　いりょく。　てんてきの\nココガラも　たまらず　にげだす。"
          shield: "おおきな　アゴで　もりの　じめんを\nほって　すあなを　つくる。\nあまい　じゅえきが　だいこうぶつ。"
        jp_kanji:
          sword: "大きな　顎は　太い　枝を\nへし折る　威力。　天敵の\nココガラも　たまらず　逃げだす。"
          shield: "大きな　顎で　森の　地面を\n掘って　巣穴を　つくる。\n甘い　樹液が　大好物。"
        en:
          sword: "Its natural enemies, like Rookidee, may\nflee rather than risk getting caught in its large\nmandibles that can snap thick tree branches."
          shield: "It uses its big jaws to dig nests into the forest\nfloor, and it loves to feed on sweet tree sap."
        fr:
          sword: "Ses mandibules peuvent briser de très grosses\nbranches. Même Minisange, son ennemi naturel,\ns’enfuit à tire-d’aile devant lui."
          shield: "Il creuse son terrier dans le sol de la forêt\navec ses grandes mandibules.\nIl raffole de la sève sucrée."
        it:
          sword: "Può spezzare grossi rami con le robuste\nmandibole, che mettono in fuga persino il suo\nnemico naturale, Rookidee."
          shield: "Si crea una tana scavando nel terreno\ncon le grandi mandibole. Va matto per la\ndolce linfa degli alberi."
        de:
          sword: "Sein großer Kiefer ist stark genug, um selbst\ndicke Äste zu zerbrechen. Damit treibt es auch\nseinen natürlichen Feind Meikro in die Flucht."
          shield: "Mit seinem großen Kiefer gräbt es sich seinen\nBau im Waldboden. Zu seinen Leibspeisen\ngehört süßer Baumsaft."
        es:
          sword: "Con sus potentes mandíbulas puede hacer trizas\nlas ramas más gruesas y ahuyentar incluso a los\nRookidee, su enemigo natural."
          shield: "Cava su madriguera en el lecho boscoso con sus\ngrandes mandíbulas. Le encanta la savia dulce de\nlos árboles."
        ko:
          sword: "커다란 턱은 굵은 가지를 부러뜨릴\n정도의 위력을 가졌다. 천적인\n파라꼬도 견디지 못하고 도망친다."
          shield: "커다란 턱으로 숲에서\n땅을 파고 굴을 만든다.\n달콤한 수액을 매우 좋아한다."
        zh_simp:
          sword: "强颚鸡母虫大大的颚部\n拥有能够折断粗壮树枝的威力。\n连天敌稚山雀都会因此逃跑。"
          shield: "会用巨大的颚部\n在森林中挖地制造巢穴。\n最喜欢甜甜的树汁。"
        zh_trad:
          sword: "強顎雞母蟲大大的顎部\n擁有能夠折斷粗壯樹枝的威力。\n連天敵稚山雀都會因此逃跑。"
          shield: "會用巨大的顎部\n在森林中挖地製造巢穴。\n最喜歡甜甜的樹汁。"
charjabug:
