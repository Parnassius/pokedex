      evs_yield:
        hp: 2
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - water
        - ground
      egg_groups:
        - water_1
        - amorphous
      abilities:
        - sticky_hold
        - storm_drain
      hidden_ability: sand_force
      descriptions:
        jp_kana:
          sword: "むらさきの　しるを　だし　てきを\nいかく。　どくは　ないが　いちど\nつくと　なかなか　とれないぞ。"
          shield: "ヌメヌメのえきで　おおわれている。\nかんそうには　よわいので　りくで\nかつどうできる　じかんは　わずか。"
        jp_kanji:
          sword: "紫の　汁を　出して　敵を\n威嚇。　毒は　ないが　いちど\n付くと　なかなか　取れないぞ。"
          shield: "ヌメヌメの液で　おおわれている。\n乾燥には　弱いので　陸で\n活動できる　時間は　わずか。"
        en:
          sword: "It secretes a purple fluid to deter enemies.\nThis fluid isn’t poisonous—instead, it’s super\nsticky, and once it sticks, it’s very hard to unstick."
          shield: "Its body is covered in a sticky slime. It’s very\nsusceptible to dehydration, so it can’t spend\ntoo much time on land."
        fr:
          sword: "Il sécrète un liquide mauve pour intimider\nson adversaire. Celui-ci n’est pas toxique,\nmais il est difficile de s’en défaire."
          shield: "Il est couvert d’une substance visqueuse.\nIl ne peut rester trop longtemps sur la terre\nferme, sous peine de se déshydrater."
        it:
          sword: "Tiene alla larga i nemici emettendo un liquido\nviola. Non è velenoso, ma è quasi impossibile\nda rimuovere."
          shield: "È ricoperto da un liquido viscido. Non può\nrimanere a lungo sulla terraferma, perché\nrischia di disidratarsi."
        de:
          sword: "Es stößt ein lila Sekret aus, mit dem es seine\nGegner abschreckt. Dieses ist zwar nicht giftig,\nlässt sich aber nur sehr schwer wieder entfernen."
          shield: "Sein Körper wird von einem schleimigen Film\numhüllt. Da dieser leicht austrocknet, kann es\nsich nur für sehr kurze Zeit an Land aufhalten."
        es:
          sword: "Segrega un líquido morado para intimidar a sus\noponentes. No es venenoso, pero es muy difícil\nquitárselo de encima una vez adherido."
          shield: "Lo recubre una sustancia viscosa. Se resiente\ncuando se seca, de modo que no puede\npermanecer mucho tiempo en tierra firme."
        ko:
          sword: "보라색 액체를 내뿜어서 상대를\n위협한다. 독은 없지만 한번\n묻으면 좀처럼 지워지지 않는다."
          shield: "미끈미끈한 액체로 둘러싸여 있다.\n건조한 환경에 약하므로 육지에서\n활동 가능한 시간은 얼마 안 된다."
        zh_simp:
          sword: "会喷出紫色的汁去威吓敌人。\n虽然汁里并没有毒，但是\n一旦沾到就很难清掉。"
          shield: "全身包裹着滑溜溜的液体。\n因为害怕干燥，所以能在\n陆地上活动的时间非常短。"
        zh_trad:
          sword: "會噴出紫色的汁去威嚇敵人。\n雖然汁裡並沒有毒，但是\n一旦沾到就很難清掉。"
          shield: "全身包裹著滑溜溜的液體。\n因為害怕乾燥，所以能在\n陸地上活動的時間非常短。"
drifloon:
  species_id: 425
  names:
    jp_kana: フワンテ
    jp_kanji: フワンテ
    en: Drifloon
    fr: Baudrive
    it: Drifloon
    de: Driftlon
    es: Drifloon
    ko: 흔들풍손
    zh_simp: 飘飘球
    zh_trad: 飄飄球
  forms:
    drifloon:
      form_id: 0
      base_stats:
        hp: 90
        attack: 50
        defense: 34
        special_attack: 60
        special_defense: 44
        speed: 70
      evs_yield:
        hp: 1
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ghost
        - flying
      egg_groups:
        - amorphous
      abilities:
        - aftermath
        - unburden
      hidden_ability: flare_boost
      descriptions:
        jp_kana:
          sword: "なかまが　ほしいのか　こどもに\nちかづくが　いいように　あそばれ\nにげていくことも　すくなくない。"
          shield: "たましいが　あつまり　うまれた。\nしっけの　おおい　きせつには\nたいりょうに　あらわれることも。"
        jp_kanji:
          sword: "仲間が　欲しいのか　子どもに\n近づくが　いいように　遊ばれ\n逃げていくことも　少なくない。"
          shield: "魂が　集まり　生まれた。\n湿気の　多い　季節には\n大量に　現れることも。"
        en:
          sword: "Perhaps seeking company, it approaches children.\nHowever, it often quickly runs away again when\nthe children play too roughly with it."
          shield: "The gathering of many souls gave rise to this\nPokémon. During humid seasons, they seem to\nappear in abundance."
        fr:
          sword: "Pour se faire des amis, il s’approche des enfants,\nmais ces derniers le malmènent souvent,\nce qui le pousse à s’enfuir."
          shield: "Nés d’une concentration d’âmes, ces Pokémon\npeuvent apparaître en grand nombre les jours\noù le taux d’humidité est élevé."
        it:
          sword: "Si avvicina ai bambini in cerca di compagnia,\nma spesso è costretto a fuggire perché viene\ntrattato senza troppi riguardi."
          shield: "È nato dall’aggregazione di diverse anime.\nNelle stagioni umide possono apparirne\nnumerosi esemplari."
        de:
          sword: "Es nähert sich oft Kindern, womöglich auf der\nSuche nach Freunden. Wenn diese zu wild\nspielen, ergreift es aber die Flucht."
          shield: "Sie sind aus einer Ansammlung an Seelen\nentstanden. In feuchten Jahreszeiten erscheinen\nsie in rauen Mengen."
        es:
          sword: "Se acerca a los niños en busca de compañía,\npero lo tratan como un juguete y a menudo\ntiene que salir huyendo."
          shield: "Está formado por una aglomeración de espíritus.\nSuele aparecer en grandes números durante las\nestaciones húmedas."
        ko:
          sword: "동료가 필요한지 아이에게\n다가가지만 거칠게 다뤄져서\n도망가 버리는 경우도 적지 않다."
          shield: "영혼들이 모여 탄생했다.\n습기가 많은 계절에는\n대량으로 나타나기도 한다."
        zh_simp:
          sword: "也许是因为渴望拥有伙伴，\n它会去接近孩子们。但也经常\n因为被孩子们戏耍而逃跑。"
          shield: "因魂魄聚集在一起而诞生。\n到了湿气大的季节\n就有可能大量出现。"
        zh_trad:
          sword: "也許是因為渴望擁有夥伴，\n牠會去接近小孩子。但也經常\n因為被孩子們戲耍而逃跑。"
          shield: "因魂魄聚集在一起而誕生。\n到了濕氣重的季節\n就有可能大量出現。"
