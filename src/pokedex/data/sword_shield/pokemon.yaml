        jp_kana:
          sword: "きれいな　みずを　のんで　こおりの\nからだを　おおきくする。　てんきの\nよい　ひは　あまり　みかけない。"
          shield: "マイナス１００どの　れいきで\nてきを　こおらせるが　いのちまでは\nうばわない　やさしい　きしつ。"
        jp_kanji:
          sword: "きれいな　水を　飲んで　氷の\n体を　大きくする。　天気の\n良い　日は　あまり　見かけない。"
          shield: "マイナス１００度の　冷気で\n敵を　凍らせるが　命までは\n奪わない　優しい　気質。"
        en:
          sword: "By drinking pure water, it grows its icy body.\nThis Pokémon can be hard to find on days with\nwarm, sunny weather."
          shield: "It blasts enemies with cold air reaching −148\ndegrees Fahrenheit, freezing them solid. But it\nspares their lives afterward—it’s a kind Pokémon."
        fr:
          sword: "Il boit de l’eau pure pour gonfler son corps\nde glace. On le voit rarement les jours ensoleillés."
          shield: "Bien qu’il gèle ses ennemis en soufflant de l’air\nà - 100 °C, sa gentillesse l’empêche de leur ôter\nla vie."
        it:
          sword: "Beve acqua pura per ingrandire il suo corpo\ndi ghiaccio. Non si fa vedere in giro nei giorni\ndi bel tempo."
          shield: "Congela i nemici con il suo fiato a -100 ºC,\nma la sua indole gentile gli impedisce\ndi infliggere loro danni letali."
        de:
          sword: "Es vergrößert seinen Eiskörper, indem es klares\nWasser trinkt. Bei gutem Wetter ist es eher selten\nanzutreffen."
          shield: "Dieses Pokémon ist gutmütig. Es friert zwar\nGegner mit kalter Luft von -100 ºC ein, raubt\nihnen aber nie das Leben."
        es:
          sword: "Bebe agua pura para agrandar su cuerpo de\nhielo. Apenas se ven ejemplares durante los\ndías soleados."
          shield: "Congela a sus enemigos con un vaho a -100 °C,\npero no llega a arrebatarles la vida debido a su\ncarácter benévolo."
        ko:
          sword: "깨끗한 물을 마셔서 얼음으로 된\n몸을 크게 만든다. 날씨가 맑은\n날에는 잘 발견되지 않는다."
          shield: "마이너스 100도의 냉기로\n적을 얼리지만 목숨은\n뺏지 않는 상냥한 기질을 가졌다."
        zh_simp:
          sword: "通过喝下干净的水\n来让自己的冰雪身躯成长。\n天气好的时候很少看到它。"
          shield: "性格和善，虽然会用\n零下１００度的冷气冻住敌人，\n但并不会伤及它们的性命。"
        zh_trad:
          sword: "透過喝下乾淨的水\n來讓自己的冰雪身軀成長。\n天氣好的時候很少看到牠。"
          shield: "性情和善，雖然會用\n零下１００度的冷氣凍住敵人，\n但並不會傷及牠們的性命。"
