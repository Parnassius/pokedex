      descriptions:
        jp_kana:
          sword: "おおきな　てのひらは　パントマイムを\nするために　はったつ　したと\nかんがえる　がくしゃも　おおい。"
          shield: "パントマイムが　とくい。　ゆびから\nだした　はどうで　かべを　つくり\nあまたの　こうげきから　みをまもる。"
        jp_kanji:
          sword: "大きな　手のひらは　パントマイムを\nするために　発達　したと\n考える　学者も　多い。"
          shield: "パントマイムが　得意。　指から\n出した　波動で　壁を　つくり\nあまたの　攻撃から　身を守る。"
        en:
          sword: "The broadness of its hands may be no\ncoincidence—many scientists believe its palms\nbecame enlarged specifically for pantomiming."
          shield: "It’s known for its top-notch pantomime skills.\nIt protects itself from all sorts of attacks by\nemitting auras from its fingers to create walls."
        fr:
          sword: "De nombreux savants pensent que ses mains\nse sont développées pour faire de la pantomime."
          shield: "Son talent pour le mime est indéniable.\nIl émet des ondes du bout des doigts pour créer\nun mur qui le protège de nombreuses attaques."
        it:
          sword: "Molti studiosi ritengono che abbia sviluppato\nmani così grandi perché gli sono utili per\nla mimica."
          shield: "È un ottimo mimo. Con le onde che emette\ndalle dita può creare una barriera che lo\nprotegge da molti attacchi."
        de:
          sword: "Viele Forscher glauben, seine Hände hätten nur\ndeshalb so eine beachtliche Größe angenommen,\ndamit es Pantomime praktizieren kann."
          shield: "Es ist für die Pantomime geboren. Zur Abwehr\nunterschiedlichster Angriffe erzeugt es mit einem\nKraftfeld aus seinen Fingerspitzen Schutzwände."
        es:
          sword: "Muchos estudiosos sostienen que el desarrollo\nde sus enormes manos se debe a su afán por\npracticar la pantomima."
          shield: "Domina con maestría la pantomima. La barrera\ngenerada con las ondas que emite por los dedos\nle permite protegerse de numerosos ataques."
        ko:
          sword: "커다란 손바닥은 팬터마임을\n하기 위해 발달했다고\n생각하는 학자도 많다."
          shield: "팬터마임이 특기다. 손가락에서\n내보내는 파동으로 벽을 만들어\n갖은 공격으로부터 몸을 지킨다."
        zh_simp:
          sword: "有很多学者认为，\n它大大的手掌是因为要\n表演默剧而发达起来的。"
          shield: "擅长表演默剧。\n用手指放出的波动制造墙壁，\n保护自己免于大多数攻击。"
        zh_trad:
          sword: "有很多學者認為\n牠大大的手掌是因為要\n表演默劇而發達起來的。"
          shield: "擅長表演默劇。\n用手指放出的波動製造牆壁，\n保護自己免於大多數的攻擊。"
    mr_mime_galarian_form:
      form_id: 1
      names:
        jp_kana: ガラルのすがた
        jp_kanji: ガラルのすがた
        en: Galarian Form
        fr: Forme de Galar
        it: Forma di Galar
        de: Galar-Form
        es: Forma de Galar
        ko: 가라르의 모습
        zh_simp: 伽勒尔的样子
        zh_trad: 伽勒爾的樣子
      base_stats:
        hp: 50
        attack: 65
        defense: 65
        special_attack: 90
        special_defense: 90
        speed: 100
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 2
      types:
        - ice
        - psychic
      egg_groups:
        - human_like
      abilities:
        - vital_spirit
        - screen_cleaner
      hidden_ability: ice_body
      descriptions:
        jp_kana:
          sword: "タップダンスが　とくい。　れいきで\nつくった　こおりの　ゆかを　けりあげ\nバリヤーの　ごとく　みを　まもる。"
          shield: "あしの　うらから　れいきを　だす。\nこおらせた　ゆかの　うえで　いちにち\nタップダンスに　はげんでいる。"
        jp_kanji:
          sword: "タップダンスが　得意。　冷気で\nつくった　氷の　床を　蹴り上げ\nバリヤーの　ごとく　身を　守る。"
          shield: "足の　裏から　冷気を　出す。\n凍らせた　床の　上で　１日\nタップダンスに　励んでいる。"
        en:
          sword: "Its talent is tap-dancing. It can also manipulate\ntemperatures to create a floor of ice, which this\nPokémon can kick up to use as a barrier."
          shield: "It can radiate chilliness from the bottoms of its\nfeet. It’ll spend the whole day tap-dancing on a\nfrozen floor."
        fr:
          sword: "Les claquettes sont sa spécialité.\nEn tapant contre le sol qu’il a gelé,\nil crée des barrières pour se protéger."
          shield: "Il produit de l’air glacial par les pieds.\nAprès avoir fait geler le sol, il danse dessus\ntoute la journée en faisant des claquettes."
        it:
          sword: "Il tip tap è la sua specialità. Crea un pavimento\ndi ghiaccio e lo percuote coi piedi per sollevare\nuna specie di barriera con cui si protegge."
          shield: "Emette aria gelida dalle piante dei piedi.\nSi esercita tutto il giorno nel tip tap su un\npavimento appositamente congelato."
        de:
          sword: "Dieser begabte Stepptänzer erzeugt am Boden\nmit kalter Luft eine Barriere aus Eis und richtet\nsie zu seinem Schutz mit den Füßen auf."
          shield: "Es erzeugt mit seinen Sohlen kalte Luft, die am\nBoden gefriert. Auf dieser Eisschicht übt es den\nganzen Tag lang seinen Stepptanz."
        es:
          sword: "El claqué es su especialidad. Genera una capa\nde hielo bajo sus pies, sobre la que taconea para\ncrear barreras con las que protegerse."
          shield: "Emite un aire glacial por las plantas de los pies.\nBaila claqué con entusiasmo sobre las superficies\nque ha congelado."
        ko:
          sword: "탭 댄스가 특기다. 냉기로\n만든 얼음 바닥을 차올려서\n배리어처럼 몸을 지킨다."
          shield: "발바닥에서 냉기를 내뿜는다.\n얼린 바닥 위에서 온종일\n탭 댄스에 열중한다."
        zh_simp:
          sword: "擅长踢踏舞。会用冷气\n制造出冰之地板并将其踢起，\n以此作为保护自己的障壁。"
          shield: "会从脚底释放出冷气。\n一整天都会在自己冻住的\n地板上努力练习踢踏舞。"
        zh_trad:
          sword: "擅長踢踏舞。會用冷氣\n製造出冰之地板並將其踢起，\n以此作為保護自己的障壁。"
          shield: "會從腳底釋放出冷氣。\n一整天都會在自己凍住的\n地板上努力練習踢踏舞。"
scyther:
