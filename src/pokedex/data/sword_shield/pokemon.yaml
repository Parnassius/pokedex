          sword: "こいしを　リフティングして　ほのおの\nサッカーボールを　つくる。　するどい\nシュートで　あいてを　もやす。"
          shield: "こうしゅに　すぐれ　おうえんされると\nさらに　もえるが　スタンドプレイに\nはしり　ピンチを　まねくこともある。"
        jp_kanji:
          sword: "小石を　リフティングして　炎の\nサッカーボールを　つくる。　するどい\nシュートで　相手を　燃やす。"
          shield: "攻守に　優れ　応援されると\nさらに　燃えるが　スタンドプレイに\n走り　ピンチを　招くこともある。"
        en:
          sword: "It juggles a pebble with its feet, turning it into a\nburning soccer ball. Its shots strike opponents\nhard and leave them scorched."
          shield: "It’s skilled at both offense and defense, and it\ngets pumped up when cheered on. But if it starts\nshowboating, it could put itself in a tough spot."
        fr:
          sword: "Il drible avec des pierres pour en faire\ndes ballons enflammés, avant de tirer\nsur ses adversaires pour les brûler."
          shield: "Exceptionnel en attaque comme en défense,\nil s’exalte quand on l’encourage, mais il lui\narrive de se mettre en danger en jouant solo."
        it:
          sword: "Crea un pallone da calcio infuocato palleggiando\ncon un sasso e poi tira una cannonata contro\nil nemico per abbrustolirlo."
          shield: "Eccelle in attacco e in difesa. Se sente il tifo, a\nvolte si fa prendere dall’entusiasmo e inizia a\ndare spettacolo, finendo per trovarsi in difficoltà."
        de:
          sword: "Es jongliert kleine Steine mit den Füßen und\nerschafft daraus einen Flammenfußball. Seine\nGegner verbrennt es mit scharfen Schüssen."
          shield: "Jubel für besonders gelungene Spielzüge schüren\nseinen Enthusiasmus. Spielt es aber zu sehr für die\nPublikumswirkung, geht dies oft nach hinten los."
        es:
          sword: "Convierte piedras en balones de fuego dándoles\ntoques y, luego, chuta con fuerza hacia el rival\npara chamuscarlo."
          shield: "Destaca tanto en ataque como en defensa. Se\ncrece cuando recibe una ovación, pero a veces\nse luce tanto que termina viéndose en apuros."
        ko:
          sword: "작은 돌을 리프팅해서 불꽃의\n축구공을 만들고 날카로운\n슛으로 상대를 태워버린다."
          shield: "공수에 뛰어나고 응원을 받으면\n더 뜨겁게 타오르지만 스탠드 플레이를\n하다가 위기에 처하는 경우도 있다."
        zh_simp:
          sword: "会将小石头像足球般用脚挑起，\n制造出缠绕着火焰的足球。\n会用猛烈的踢射来燃烧对手。"
          shield: "拥有熟练的进攻和防守技巧。\n只要得到声援就会更有冲劲，\n但有时会为了出风头而弄巧成拙。"
        zh_trad:
          sword: "會將小石頭像足球般用腳挑起，\n製造出纏繞著火焰的足球。\n會用猛烈的踢射來燃燒對手。"
          shield: "擁有熟練的進攻和防守技巧。\n只要得到聲援就會更有衝勁，\n但有時會為了出風頭而弄巧成拙。"
  gmax_forms:
    cinderace_gigantamax:
      form_id: 999
      names:
        jp_kana: キョダイマックス
        jp_kanji: キョダイマックス
        en: Gigantamax
        fr: Gigamax
        it: Gigamax
        de: Gigadynamax
        es: Gigamax
        ko: 거다이맥스
        zh_simp: 超极巨化
        zh_trad: 超極巨化
      descriptions:
        jp_kana:
          sword: "エースバーンの　もえる　とうしが\nのりうつった　キョダイかえんボールは\nあいてを　のがさず　まるやきにする。"
          shield: "キョダイマックスの　パワーによって\nかえんの　ボールは　ちょっけい\n１００メートルを　こえることもある。"
        jp_kanji:
          sword: "エースバーンの　燃える　闘志が\n乗り移った　キョダイ火炎ボールは\n相手を　逃さず　丸焼きにする。"
          shield: "キョダイマックスの　パワーによって\n火炎の　ボールは　直径\n１００メートルを　超えることもある。"
        en:
          sword: "Infused with Cinderace’s fighting spirit, the\ngigantic Pyro Ball never misses its targets and\ncompletely roasts opponents."
          shield: "Gigantamax energy can sometimes cause the\ndiameter of this Pokémon’s fireball to exceed\n300 feet."
        fr:
          sword: "Incapables d’échapper aux ballons de feu animés\npar sa combativité ardente, tous les adversaires\nde Pyrobut finissent consumés."
          shield: "Grâce au pouvoir du Gigamax, ses ballons de feu\ndépassent parfois les 100 mètres de diamètre."
        it:
          sword: "La gigantesca palla infuocata, infusa dell’ardente\nspirito combattivo di Cinderace, incenerisce\nl’avversario senza lasciargli scampo."
          shield: "Grazie al potere del Gigamax, la sua palla\ninfuocata può superare i 100 m di diametro."
        de:
          sword: "Der gigantische Feuerball, der von Liberlos\nloderndem Kampfgeist erfüllt ist, verfehlt nie\nsein Ziel und heizt diesem ordentlich ein."
          shield: "Durch die Gigadynamax-Energie vergrößert sich\nder Durchmesser seines Flammenballs manchmal\nauf über 100 m."
        es:
          sword: "Imbuido del espíritu de lucha de Cinderace, su\ngigantesco balón de fuego jamás yerra el blanco\ny dejará chamuscado al rival de forma irremisible."
          shield: "La energía del fenómeno Gigamax ha hecho que\nsu balón de fuego llegue a superar los 100 m de\ndiámetro."
        ko:
          sword: "에이스번의 타오르는\n투지가 담긴 거대 화염볼은\n상대를 놓치지 않고 불살라버린다."
          shield: "거다이맥스 파워로 인해\n화염 볼의 직경은\n100m 이상이 되기도 한다."
        zh_simp:
          sword: "闪焰王牌熊熊燃烧的斗志\n转移到了超极巨火焰球上，\n使其能够百发百中地将敌人烧焦。"
          shield: "因着超极巨化的力量，\n火焰球的直径有时\n甚至会超过１００米。"
        zh_trad:
          sword: "超極巨火焰球會載著\n閃焰王牌熊熊燃燒的鬥志，\n百發百中地將對手烤焦。"
          shield: "超極巨化的力量會讓牠的\n火焰球變大，有時甚至\n超過直徑１００公尺。"
