        en:
          sword: "Spirits that wander this world are placed into\nPumpkaboo’s body. They’re then moved on to\nthe afterlife."
          shield: "The light that streams out from the holes in the\npumpkin can hypnotize and control the people\nand Pokémon that see it."
        fr:
          sword: "Les âmes errantes de ce monde s’introduisent\ndans son corps pour rejoindre l’au-delà."
          shield: "Il peut manipuler les humains et les Pokémon\nen les hypnotisant grâce à la lumière qui filtre\npar les trous de son ventre en forme de citrouille."
        it:
          sword: "Le anime che vagano in questo mondo entrano\nnel suo corpo per iniziare il loro viaggio\nverso l’aldilà."
          shield: "Con la luce che emana dai buchi nella zucca\nipnotizza esseri umani e Pokémon e ne assume\nil controllo."
        de:
          sword: "Verlorene Seelen, die in der Welt der Lebenden\ngefangen sind, finden in seinem Körper Platz,\num ihre Reise ins Jenseits anzutreten."
          shield: "Blicken Menschen und Pokémon in das Licht, das\naus den Löchern seines Kürbisses dringt, werden\nsie hypnotisiert und von Irrbis kontrolliert."
        es:
          sword: "Las almas errantes de este mundo se introducen\nen su cuerpo e inician así su viaje al más allá."
          shield: "La luz que emite por los orificios de la calabaza\nhipnotiza a humanos y Pokémon y los deja bajo\nsu control."
        ko:
          sword: "이승을 떠도는 영혼은\n호바귀의 몸속에\n들어간 뒤 저승으로 떠난다."
          shield: "호박의 구멍에서 나오는\n빛을 본 사람과 포켓몬을\n최면상태로 만들어 조종한다."
        zh_simp:
          sword: "在这个世界游荡的灵魂\n会被装到南瓜精的身体里，\n启程前往另一个世界。"
          shield: "南瓜的洞里发出的光\n会催眠并控制\n看到它的人和宝可梦。"
        zh_trad:
          sword: "在這個世界遊蕩的靈魂\n會被裝到南瓜精的身體裡，\n啟程前往另一個世界。"
          shield: "南瓜的洞裡發出的光\n會催眠並控制\n看到牠的人和寶可夢。"
