          sword: "ツルを　つかって　はなを　つみ\nじぶんを　かざる。　からだに\nついた　はなは　なぜか　かれない。"
          shield: "とても　よいかおりがする　ポケモン。\nみにつける　はなが　ちがうので\nキュワワーごとに　かおりは　ちがう。"
        jp_kanji:
          sword: "ツルを　使って　花を　摘み\n自分を　飾る。　体に　ついた\n花は　なぜか　枯れない。"
          shield: "とても　良い香りがする　ポケモン。\n身につける　花が　違うので\nキュワワーごとに　香りは　違う。"
        en:
          sword: "Comfey picks flowers with its vine and decorates\nitself with them. For some reason, flowers won’t\nwither once they’re attached to a Comfey."
          shield: "These Pokémon smell very nice. All Comfey wear\ndifferent flowers, so each of these Pokémon has\nits own individual scent."
        fr:
          sword: "Il orne son corps de fleurs qu’il cueille avec\nsa liane. Mystérieusement, celles-ci ne se\nfanent jamais."
          shield: "Ce Pokémon dégage un parfum agréable\nqui varie d’un spécimen à l’autre, car chaque\nGuérilande s’habille de fleurs différentes."
        it:
          sword: "Coglie fiori con la sua liana e li usa per decorare\nil proprio corpo. Non si sa come mai, ma i fiori\nche ha addosso non appassiscono."
          shield: "Questo Pokémon emette un profumo davvero\ndelizioso. Ogni esemplare ha una fragranza\ndiversa a seconda dei fiori che ha addosso."
        de:
          sword: "Mit seiner Ranke pflückt es Blumen und schmückt\ndann seinen Körper mit ihnen. Aus irgendeinem\nGrund verwelken diese nie."
          shield: "Dieses Pokémon riecht äußerst angenehm.\nDa jedes Curelei andere Blumen trägt,\nunterscheiden sie sich in ihrem Duft."
        es:
          sword: "Prende flores en su tallo para decorar su propio\ncuerpo y, misteriosamente, no se marchitan\nnunca."
          shield: "Este Pokémon libera una agradable fragancia,\nque varía de individuo a individuo debido a que\ncada uno se engalana con flores diferentes."
        ko:
          sword: "덩굴을 사용해 꽃을 따서 자신을\n꾸민다. 몸에 붙은 꽃은 무슨\n이유에서인지 시들지 않는다."
          shield: "매우 좋은 향기가 나는 포켓몬이다.\n몸에 붙이는 꽃이 달라서\n큐아링마다 향이 다르다"
        zh_simp:
          sword: "用藤蔓摘花来打扮自己。\n不知为何，附在它身上\n的花不会枯萎。"
          shield: "散发着迷人香气的宝可梦。\n由于每只花疗环环身上的花都\n不一样，所以香味也各不相同。"
        zh_trad:
          sword: "會用藤蔓摘花來裝飾自己。\n不知為何，黏在牠身上的\n花朵都不會枯萎。"
          shield: "飄散著迷人香氣的寶可夢。\n由於黏在身上的花朵不一樣，\n每隻花療環環的香味也都不同。"
