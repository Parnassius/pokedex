        jp_kana:
          sword: "ゆきぶかい　やまにくらす。　ゆきに\nあしを　つきさして　すいぶんと\nれいきを　きゅうしゅう　するぞ。"
          shield: "おなかに　みのる　アイス　みたいな\nきのみは　ガラルに　くらす\nダルマッカたちの　だいこうぶつ。"
        jp_kanji:
          sword: "雪深い　山に暮らす。　雪に\n脚を　突き刺して　水分と\n冷気を　吸収　するぞ。"
          shield: "お腹に　実る　アイス　みたいな\n木の実は　ガラルに　暮らす\nダルマッカたちの　大好物。"
        en:
          sword: "It lives on snowy mountains. It sinks its legs into\nthe snow to absorb water and keep its own\ntemperature down."
          shield: "The berries that grow around its belly are like\nice pops. Galarian Darumaka absolutely love\nthese berries."
        fr:
          sword: "Il plante ses pieds dans la neige des montagnes\noù il vit pour absorber l’air froid et l’humidité."
          shield: "Les Baies en forme de crèmes glacées qui\npoussent sur son ventre sont le mets favori\ndes Darumarond vivant à Galar."
        it:
          sword: "Vive sulle montagne innevate. Infila i piedi\nnella neve e assorbe acqua e freddo a volontà."
          shield: "Le bacche simili a ghiaccioli che gli crescono\nattorno al ventre sono il cibo preferito dei\nDarumaka che vivono a Galar."
        de:
          sword: "Es lebt auf verschneiten Bergen und steckt seine\nFüße in den Schnee, um über sie Wasser und\nKälte zu absorbieren."
          shield: "Die an Speiseeis erinnernden Beeren, die an\nseinem Bauch wachsen, sind bei den Flampion\nGalars ein sehr beliebter Snack."
        es:
          sword: "Viven en montañas perennemente nevadas.\nHunden las piernas en la nieve y absorben tanto\nhumedad como aire frío."
          shield: "Las bayas con aspecto de helado que le crecen\nalrededor de la barriga son la comida favorita\nde los Darumaka que habitan en Galar."
        ko:
          sword: "눈이 많이 쌓인 산에 산다.\n눈에 다리를 찔러 넣어\n수분과 냉기를 흡수한다."
          shield: "배에 열리는 아이스크림 같은\n나무열매는 가라르에 사는\n달막화들이 매우 좋아한다."
        zh_simp:
          sword: "生活在积雪深厚的山上。\n会通过把脚踩进积雪中\n来吸收水分和冷气。"
          shield: "雪笠怪肚子上结出来的\n口感好似冰棍的树果\n是伽勒尔的火红不倒翁们的最爱。"
        zh_trad:
          sword: "生活在積雪深厚的山上。\n會透過把腳踩進積雪中\n來吸收水分和冷氣。"
          shield: "雪笠怪肚子上結出來的\n樹果口感彷如冰棒，\n是伽勒爾的火紅不倒翁們的最愛。"
