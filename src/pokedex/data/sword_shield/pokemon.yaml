      descriptions:
        jp_kana:
          sword: "つよい　のろいを　こめて　かかれた\nこだいの　えが　デスマスの\nたましいを　とりこみ　うごきだした。"
          shield: "かげの　ような　からだに　ふれては\nいけない。　えに　きざまれた\nおそろしい　きおくを　みせられるぞ。"
        jp_kanji:
          sword: "強い　呪いを　こめて　描かれた\n古代の　絵が　デスマスの\n魂を　取り込み　動きだした。"
          shield: "影の　ような　体に　触れては\nいけない。　絵に　刻まれた\n恐ろしい　記憶を　見せられるぞ。"
        en:
          sword: "A powerful curse was woven into an ancient\npainting. After absorbing the spirit of a Yamask,\nthe painting began to move."
          shield: "Never touch its shadowlike body, or you’ll be\nshown the horrific memories behind the picture\ncarved into it."
        fr:
          sword: "Les motifs antiques qui ont été gravés\nen y incorporant une puissante malédiction\nont aspiré l’âme de Tutafeh avant de prendre vie."
          shield: "Quiconque touchera son corps semblable\nà une ombre devra endurer la vision des souvenirs\neffroyables gravés dans ses motifs."
        it:
          sword: "Un antico disegno afflitto da una potente\nmaledizione ha preso vita, imprigionando\nl’anima di Yamask."
          shield: "Non bisogna toccare il suo corpo simile a\nun’ombra, o si vedranno i propri ricordi più\nterribili imprigionati nel suo motivo."
        de:
          sword: "Eine antike Malerei, die mit einem mächtigen\nFluch versehen wurde, nahm die Seele eines\nMakabaja auf und erwachte zum Leben."
          shield: "Man sollte seinen schattenhaften Körper nicht\nberühren, sonst zeigt es einem die schauerlichen\nErinnerungen, die in sein Bild eingraviert wurden."
        es:
          sword: "Una poderosa maldición pesa sobre esta antigua\nimagen grabada, que ha cobrado vida tras\nadueñarse del alma de Yamask."
          shield: "Su cuerpo, similar a una sombra, no debe tocarse\nbajo ningún concepto o se visualizarán los\nhorribles recuerdos impregnados en la imagen."
        ko:
          sword: "강한 저주를 담아 그린\n고대의 그림이 데스마스의 영혼을\n흡수해서 움직이기 시작했다."
          shield: "그림자 같은 몸을 만지면 안 된다.\n그림에 새겨진 무서운 기억을\n보게 되기 때문이다."
        zh_simp:
          sword: "被注入了强烈诅咒的古代绘画\n在吸进哭哭面具的灵魂后\n就开始动起来了。"
          shield: "绝对不能触摸它影子般的\n身体，否则它会让你看到\n印刻在它画中的恐怖记忆。"
        zh_trad:
          sword: "被注入了強烈詛咒的古代繪畫\n在吸進哭哭面具的靈魂後\n就開始動起來了。"
          shield: "絕對不能觸摸牠影子般的\n身體，否則牠會讓你看到\n印刻在牠畫中的恐怖記憶。"
