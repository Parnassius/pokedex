      descriptions:
        jp_kana:
          sword: "シェルダーに　かみつかれた　しげきと\nたいないの　スパイスが　かがくてきに\nはんのうして　どくタイプになった。"
          shield: "かみついている　シェルダーの　ベロを\nにぎると　まきがいの　せんたんから\nもうどくの　えきたいを　うちだす。"
        jp_kanji:
          sword: "シェルダーに　噛みつかれた　刺激と\n体内の　スパイスが　化学的に\n反応して　どくタイプになった。"
          shield: "噛みついている　シェルダーの　ベロを\n握ると　巻貝の　先端から\n猛毒の　液体を　撃ちだす。"
        en:
          sword: "A Shellder bite set off a chemical reaction with\nthe spices inside Slowbro’s body, causing\nSlowbro to become a Poison-type Pokémon."
          shield: "If this Pokémon squeezes the tongue of the\nShellder biting it, the Shellder will launch a toxic\nliquid from the tip of its shell."
        fr:
          sword: "Le stimulus de la morsure du Kokiyas a déclenché\nune réaction chimique des épices retenues dans\nle corps de Flagadoss, lui donnant le type Poison."
          shield: "S’il serre la langue du Kokiyas qui l’a mordu,\nce dernier projette un liquide très toxique\ndepuis l’extrémité de sa coquille."
        it:
          sword: "Lo stimolo dato dal morso di uno Shellder ha\ninnescato una reazione chimica con le spezie\nnel suo organismo, rendendolo di tipo Veleno."
          shield: "Stringendo la lingua dello Shellder che gli si è\nattaccato addosso, può sparare un liquido molto\nvelenoso dall’estremità della sua conchiglia."
        de:
          sword: "Durch den Schock von Muschas’ Biss kam es zu\neiner chemischen Reaktion der Gewürzpartikel\nin seinem Körper. So erlangte es den Typ Gift."
          shield: "Packt es die Zunge des festgebissenen Muschas,\nfeuert dieses eine hochgiftige Flüssigkeit aus der\nSpitze seiner Spiralmuschel ab."
        es:
          sword: "La impresión del mordisco del Shellder provocó\nuna reacción química con las especias que había\ningerido, tras lo cual adquirió el tipo Veneno."
          shield: "Si estruja la lengua del Shellder que lo muerde,\neste expulsa un líquido altamente tóxico por la\npunta de la caracola."
        ko:
          sword: "셀러에게 물렸을 때의 자극과\n체내의 향신료가 화학 반응을\n일으켜 독타입이 되었다."
          shield: "물고 있는 셀러의 혀를 꼭 쥐면\n고둥의 끝부분에서 맹독을 띠는\n액체가 분사된다."
        zh_simp:
          sword: "由于被大舌贝咬住时的刺激\n和体内的香料发生化学反应，\n而变成了毒属性。"
          shield: "如果去捏咬着它的大舌贝的\n舌头，它就会从螺的尖端\n喷出含有剧毒的液体。"
        zh_trad:
          sword: "被大舌貝咬住的刺激和\n體內的香料發生化學反應，\n讓牠變成了毒屬性。"
          shield: "當牠捏住咬著自己的大舌貝的舌頭，\n螺旋狀的貝殼尖端就會\n噴射出有劇毒的液體。"
magnemite:
  species_id: 81
  names:
    jp_kana: コイル
    jp_kanji: コイル
    en: Magnemite
    fr: Magnéti
    it: Magnemite
    de: Magnetilo
    es: Magnemite
    ko: 코일
    zh_simp: 小磁怪
    zh_trad: 小磁怪
  forms:
    magnemite:
      form_id: 0
      base_stats:
        hp: 25
        attack: 35
        defense: 70
        special_attack: 95
        special_defense: 55
        speed: 45
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 1
        special_defense: 0
        speed: 0
      types:
        - electric
        - steel
      egg_groups:
        - mineral
      abilities:
        - magnet_pull
        - sturdy
      hidden_ability: analytic
      held_items:
        rare: metal_coat
      descriptions:
        jp_kana:
          sword: "たいないの　でんきが　きれて\nじめんに　ころがっていることもある。\nでんちを　あげると　うごきだすよ。"
          shield: "でんきを　くって　いきている。\nさゆうの　ユニットから　でんじはを\nほうしゃ　しながら　そらを　とぶ。"
        jp_kanji:
          sword: "体内の　電気が　切れて\n地面に　転がっていることもある。\n電池を　あげると　動きだすよ。"
          shield: "電気を　食って　生きている。\n左右の　ユニットから　電磁波を\n放射しながら　空を　飛ぶ。"
        en:
          sword: "At times, Magnemite runs out of electricity and\nends up on the ground. If you give batteries to a\ngrounded Magnemite, it’ll start moving again."
          shield: "It subsists on electricity. As Magnemite flies, it\nemits electromagnetic waves from the units on\neach side of its body."
        fr:
          sword: "Il lui arrive d’être à court d’électricité\net de tomber au sol, mais il suffit de\nlui donner une batterie pour le ranimer."
          shield: "Il se nourrit d’électricité et flotte dans les airs\nen libérant des ondes électromagnétiques avec\nles aimants situés de part et d’autre de son corps."
        it:
          sword: "Gli capita di esaurire la sua riserva di elettricità\ne di cadere al suolo. Se gli viene data una\nbatteria, torna a muoversi."
          shield: "Vive cibandosi di elettricità. Fluttua in aria\nrilasciando onde elettromagnetiche dagli\nelementi laterali."
        de:
          sword: "Manchmal geht die Elektrizität in seinem Körper\nzur Neige, woraufhin es zu Boden fällt. Eine\nBatterie bringt es wieder in Bewegung."
          shield: "Es ernährt sich von Strom und segelt durch die\nLuft, indem es mit den Magneten an seinem\nKörper elektromagnetische Wellen aussendet."
        es:
          sword: "A veces se desploman al suelo tras agotar su\nsuministro eléctrico interno, pero basta una\npequeña batería para reanimarlos."
          shield: "Se nutre de electricidad. Puede flotar en el aire\ngracias a las ondas electromagnéticas que emite\na través de las unidades de sus extremidades."
        ko:
          sword: "체내의 전기가 끊겨\n땅에서 뒹굴기도 한다.\n전지를 주면 움직이기 시작한다."
          shield: "전기를 먹으며 살아간다.\n좌우의 유닛에서 전기자석파를\n방사하며 하늘을 난다."
        zh_simp:
          sword: "有时也会因为体内的电力\n消耗完了而掉到地面上。\n给它电池它就会动起来。"
          shield: "靠吃电来维持生命。\n会一边从左右两边的组件\n放射电磁波一边在空中飞行。"
        zh_trad:
          sword: "有時也會因為耗盡了體內的\n電力而掉落在地面上。給牠\n電池，牠就會再次動起來喔。"
          shield: "靠吞食電力維持生命。\n會一邊從左右的組件放射\n出電磁波，一邊在空中飛。"
