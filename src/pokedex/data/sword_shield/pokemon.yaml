      descriptions:
        jp_kana:
          sword: "ボスの　しじに　したがい　みごとな\nチームプレイで　こうぶつの　きのみを\nさがして　なかまどうし　たすけあう。"
          shield: "２０ぴきほどの　グループで　くらす。\nきまった　やくわりを　こなすことで\nきびしい　しぜんを　いきぬいてきた。"
        jp_kanji:
          sword: "ボスの　指示に　従い　見事な\nチームプレイで　好物の　木の実を\n探して　仲間同士　助け合う。"
          shield: "２０匹ほどの　グループで　暮らす。\n決まった　役割を　こなすことで\n厳しい　自然を　生き抜いてきた。"
        en:
          sword: "Displaying amazing teamwork, they follow the\norders of their boss as they all help out in the\nsearch for their favorite berries."
          shield: "Passimian live in groups of about 20, with\neach member performing an assigned role.\nThrough cooperation, the group survives."
        fr:
          sword: "Ils obéissent à leur chef au doigt et à l’œil,\net travaillent en équipe pour dénicher\nleurs Baies favorites."
          shield: "Ils vivent en groupes de vingt individus où chacun\na un rôle précis, ce qui leur a permis de survivre\ndans un environnement impitoyable."
        it:
          sword: "Seguono fedelmente gli ordini del capo e si\naiutano sempre fra loro per cercare le bacche di\ncui sono ghiotti con un perfetto gioco di squadra."
          shield: "Vivono in gruppi di circa 20 individui. Riescono\na sopravvivere in ambienti naturali ostili\nsvolgendo ognuno un ruolo specifico."
        de:
          sword: "Bei der Beerensuche stellen sie ihre legendäre\nTeamfähigkeit unter Beweis, indem sie als\nGruppe die Befehle des Anführers befolgen."
          shield: "Sie bilden Gruppen von 20 Exemplaren. Durch\nklare Aufgabenteilung haben sie den Gefahren\nder Natur getrotzt und bis heute überlebt."
        es:
          sword: "Bajo la tutela del líder, hacen gala de una gran\ncapacidad de trabajo en equipo para buscar sus\nbayas predilectas y ayudarse los unos a los otros."
          shield: "Viven en grupos de unos veinte ejemplares.\nCada individuo tiene un rol definido, lo que les\npermite sobrevivir en entornos hostiles."
        ko:
          sword: "보스의 지시를 따라 훌륭한\n팀플레이로 좋아하는 나무열매를\n찾기 위해 동료와 협동한다."
          shield: "20마리 정도가 무리 지어 생활한다.\n정해진 역할을 해내면서\n혹독한 자연에서 꿋꿋하게 살아남았다."
        zh_simp:
          sword: "听从老大的指挥互相帮助，\n通过完美的团队合作\n来寻找最爱的树果。"
          shield: "２０几只形成团队来生活。\n靠着每个成员明确的分工，\n在严苛的大自然中生存下来。"
        zh_trad:
          sword: "聽從老大的指揮互相幫助，\n透過完美的團隊合作\n來尋找最愛的樹果。"
          shield: "２０幾隻形成團隊來生活。\n靠著每個成員明確的分工，\n在嚴苛的大自然中生存下來。"
wimpod:
  species_id: 767
  names:
    jp_kana: コソクムシ
    jp_kanji: コソクムシ
    en: Wimpod
    fr: Sovkipou
    it: Wimpod
    de: Reißlaus
    es: Wimpod
    ko: 꼬시레
    zh_simp: 胆小虫
    zh_trad: 膽小蟲
  forms:
    wimpod:
      form_id: 0
      base_stats:
        hp: 25
        attack: 35
        defense: 40
        special_attack: 20
        special_defense: 30
        speed: 80
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - bug
        - water
      egg_groups:
        - bug
        - water_3
      abilities:
        - wimp_out
      descriptions:
        jp_kana:
          sword: "くさったものや　ゴミでも　なんでも\nたべまわる　しぜんの　そうじや。\nすの　まわりは　いつも　きれい。"
          shield: "むれで　かたまり　つねに　まわりを\nけいかいしている。　てきの　けはいを\nかんじると　ちりぢりに　にげだす。"
        jp_kanji:
          sword: "腐ったものや　ゴミでも　なんでも\n食べまわる　自然の　掃除屋。\n巣の　まわりは　いつも　きれい。"
          shield: "群れで　かたまり　つねに　まわりを\n警戒している。　敵の　気配を\n感じると　散り散りに　逃げ出す。"
        en:
          sword: "It’s nature’s cleaner—it eats anything and\neverything, including garbage and rotten things.\nThe ground near its nest is always clean."
          shield: "Wimpod gather in swarms, constantly on the\nlookout for danger. They scatter the moment\nthey detect an enemy’s presence."
        fr:
          sword: "Ce véritable nettoyeur de la nature mange tout,\nmême la nourriture avariée et les déchets.\nLes environs de son nid sont toujours impeccables."
          shield: "Ils se déplacent en groupe, toujours en alerte.\nDès qu’ils détectent une présence ennemie,\nils s’enfuient dans toutes les directions."
        it:
          sword: "Poiché mangia di tutto, anche immondizia e\nsostanze putrescenti, è detto lo spazzino della\nnatura. Attorno alla sua tana regna la pulizia."
          shield: "Si muovono in gruppo e stanno sempre sul chi\nva là. Non appena percepiscono la presenza\ndel nemico scappano in ogni direzione."
        de:
          sword: "Sie sind natürliche Reinigungskräfte und fressen\nalles, inklusive vergammeltem Essen und Müll.\nIn der Nähe ihrer Nester ist es immer sauber."
          shield: "Sie schließen sich zu Schwärmen zusammen und\nhalten stets Ausschau nach Gefahr. Sichten sie\neinen Feind, nehmen sie in alle Winde Reißaus."
        es:
          sword: "Hace de barrendero natural al ir devorándolo\ntodo, basura y podredumbre incluidas. Alrededor\nde su nido reina siempre la mayor pulcritud."
          shield: "Forman colonias y permanecen siempre alerta.\nEn cuanto perciben a un enemigo, salen huyendo\nen todas direcciones."
        ko:
          sword: "상한 것이든 쓰레기든 닥치는 대로\n먹어 치우는 자연의 청소부.\n둥지 주변은 언제나 깨끗하다."
          shield: "무리가 모여 다니며 항상\n주위를 경계한다. 적의 기척을\n느끼면 뿔뿔이 흩어져 도망간다."
        zh_simp:
          sword: "无论是腐烂的东西还是垃圾\n都能吃光光，是大自然的清道夫。\n巢穴附近总是保持干净。"
          shield: "成群聚集，随时提高警惕。\n只要察觉到有敌人，\n就会分散开来四处逃窜。"
        zh_trad:
          sword: "無論是腐爛的東西還是垃圾\n都能吃光光，是大自然的清道夫。\n巢穴附近總是保持乾淨。"
          shield: "成群聚集，隨時保持警惕。\n只要察覺到有敵人，\n就會分散開來四處逃竄。"
golisopod:
  species_id: 768
  names:
    jp_kana: グソクムシャ
    jp_kanji: グソクムシャ
    en: Golisopod
    fr: Sarmuraï
    it: Golisopod
    de: Tectass
    es: Golisopod
    ko: 갑주무사
    zh_simp: 具甲武者
    zh_trad: 具甲武者
  forms:
    golisopod:
      form_id: 0
      base_stats:
        hp: 75
        attack: 125
        defense: 140
        special_attack: 60
        special_defense: 90
        speed: 40
      evs_yield:
        hp: 0
        attack: 0
        defense: 2
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - bug
        - water
      egg_groups:
        - bug
        - water_3
      abilities:
        - emergency_exit
      descriptions:
        jp_kana:
          sword: "かつためには　しゅだんを　とわない。\nあいての　すきを　ついて　まえあしの\nちいさな　ツメで　とどめを　さす。"
          shield: "かいていの　あなや　ちんぼつせんが\nすみか。　オトスパスと　たたかい\nまけた　ほうが　エサになるのだ。"
        jp_kanji:
          sword: "勝つためには　手段を　問わない。\n相手の　隙を　ついて　前脚の\n小さな　ツメで　とどめを　刺す。"
          shield: "海底の　穴や　沈没船が\nすみか。　オトスパスと　戦い\n負けた　ほうが　エサになるのだ。"
        en:
          sword: "It will do anything to win, taking advantage of\nevery opening and finishing opponents off with\nthe small claws on its front legs."
          shield: "They live in sunken ships or in holes in the\nseabed. When Golisopod and Grapploct\nbattle, the loser becomes the winner’s meal."
        fr:
          sword: "Il ne recule devant rien pour gagner. Il profite de\nl’inattention de son adversaire pour lui administrer\nun coup décisif de ses petites griffes antérieures."
          shield: "Il vit dans des trous ou des épaves au fond\nde l’océan. Il se bat souvent contre Krakos,\net le perdant sert de repas au gagnant."
        it:
          sword: "È disposto a tutto per vincere. Colpisce\nl’avversario quando abbassa la guardia e lo\nfinisce con i piccoli artigli degli arti anteriori."
          shield: "Vive sul fondo del mare, nelle buche o nei relitti.\nSi scontra sempre con Grapploct.\nIl perdente diventa il cibo del vincitore."
        de:
          sword: "Es schreckt vor nichts zurück, um zu gewinnen.\nSieht es eine Chance, schlägt es zu und gibt dem\nOpfer mit seinen Klauen schließlich den Rest."
          shield: "Tectass leben in Tiefseehöhlen und versunkenen\nSchiffswracks. Sie liefern sich Kämpfe mit Kaocto,\nnach denen der Sieger den Verlierer verspeist."
        es:
          sword: "Hace lo que sea por conseguir la victoria. Si el\nrival se descuida, aprovecha para asestarle un\ngolpe letal con sus pequeñas garras frontales."
          shield: "Vive en cavernas del fondo marino o en barcos\nhundidos. Lucha contra los Grapploct y el que\npierde se convierte en una suculenta presa."
        ko:
          sword: "이기기 위해서는 수단을 가리지 않는다.\n상대의 빈틈을 찌른 뒤 앞발의\n작은 발톱으로 마무리한다."
          shield: "해저의 굴이나 침몰선이\n거처다. 케오퍼스와 싸워서\n진 쪽이 먹이가 된다."
        zh_simp:
          sword: "为了胜利会不择手段。\n看准敌人疏忽的时机，\n用前脚上的小爪子解决对方。"
          shield: "生活在海底的洞窟或沉船里。\n会去和八爪武师决战，\n输掉的一方便会成为对方的食物。"
        zh_trad:
          sword: "為了勝利不擇手段。\n會看準敵人疏忽的時機，\n用前腳上的小爪子解決對方。"
          shield: "生活在海底的洞窟或沉船裡。\n會去和八爪武師決戰，\n輸掉的一方便會成為對方的食物。"
sandygast:
