        - plus
      hidden_ability: technician
      descriptions:
        jp_kana:
          sword: "むねの　とっきを　かきむしり\nでんきを　おこすとき　あたりに\nギターのような　おとが　ひびく。"
          shield: "ケンカごしで　きが　みじかい。\nよどんだ　みずを　ガブのみして\nすいちゅうの　どくそを　とりこむ。"
        jp_kanji:
          sword: "胸の　突起を　掻きむしり\n電気を　起こすとき　あたりに\nギターのような　音が　響く。"
          shield: "ケンカ腰で　気が　短い。\nよどんだ　水を　がぶ飲みして\n水中の　毒素を　取りこむ。"
        en:
          sword: "When this Pokémon sounds as if it’s strumming a\nguitar, it’s actually clawing at the protrusions on\nits chest to generate electricity."
          shield: "This short-tempered and aggressive Pokémon\nchugs stagnant water to absorb any toxins it\nmight contain."
        fr:
          sword: "Lorsqu’il gratte l’excroissance sur son ventre\npour produire de l’électricité, on peut entendre\nun son similaire à celui d’une guitare."
          shield: "Impatient et bagarreur, ce Pokémon avale\nde grandes gorgées d’eau croupie pour\nen absorber toute la toxicité."
        it:
          sword: "Quando produce energia elettrica strofinando\nle protuberanze che ha sul petto, tutt’intorno\nriverbera un suono simile a quello di una chitarra."
          shield: "È litigioso e irascibile. Ingurgita acqua stagnante\nin grandi quantità per assorbire le tossine in essa\ncontenute."
        de:
          sword: "Wenn es am Fortsatz an seiner Brust kratzt und\ndadurch Strom erzeugt, dann erklingt in der\nUmgebung ein Ton wie von einer Gitarre."
          shield: "Dieses streitsüchtige und leicht reizbare Pokémon\nkippt abgestandenes Wasser in sich hinein und\nnimmt die darin enthaltenen Giftstoffe in sich auf."
        es:
          sword: "Cuando rasga las protuberancias del pecho para\ngenerar energía eléctrica, emite un sonido similar\nal de una guitarra, que reverbera en el entorno."
          shield: "Posee un carácter belicoso e irascible. Bebe una\ngran cantidad de agua estancada para absorber\nsus toxinas."
        ko:
          sword: "가슴에 난 돌기를 긁으면\n전기가 일어나며 주위에\n기타와 비슷한 소리가 울려퍼진다."
          shield: "호전적이며 성미가 급하다.\n고인 물을 벌컥벌컥 마셔서\n물속의 독소를 흡수한다."
        zh_simp:
          sword: "当它用力抓挠胸部的突起物\n来制造电力时，四周会响起\n如同吉他演奏般的声音。"
          shield: "气势汹汹的急性子。\n会大口喝下浑浊的水，\n吸收其中所含的毒素。"
        zh_trad:
          sword: "當牠用力抓撓胸部的突起物\n來製造電力時，四周會響起\n如同吉他演奏般的聲音。"
          shield: "氣勢洶洶的急性子。\n會大口喝下混濁的水，\n吸收其中所含的毒素。"
