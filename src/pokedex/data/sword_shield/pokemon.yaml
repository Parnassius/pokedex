        - steel
      egg_groups:
        - mineral
      abilities:
        - plus
        - minus
      hidden_ability: clear_body
      descriptions:
        jp_kana:
          sword: "２つの　からだは　ふたごよりも\nちかい。　べつの　からだどうしだと\nいまいち　うまく　かみあわない。"
          shield: "おおむかしに　ギアルを　みた\nにんげんが　はぐるまの　こうぞうを\nおもいついたと　いわれている。"
        jp_kanji:
          sword: "２つの　体は　双子よりも\n近い。　べつの　体同士だと\nいまいち　うまく　噛み合わない。"
          shield: "大昔に　ギアルを　見た\n人間が　歯車の　構造を\n思いついたと　いわれている。"
        en:
          sword: "The two minigears that compose this Pokémon\nare closer than twins. They mesh well only with\neach other."
          shield: "It’s suspected that Klink were the inspiration\nbehind ancient people’s invention of the\nfirst gears."
        fr:
          sword: "Ses deux rouages sont plus soudés que des\njumeaux. Si on essaie de les combiner à d’autres\nrouages, ils ne s’entendent pas très bien."
          shield: "Les humains auraient inventé les mécanismes\nà engrenages il y a fort longtemps, en observant\nce Pokémon."
        it:
          sword: "I due ingranaggi che lo compongono sono più\nuniti di una coppia di gemelli. Se combinati con\ningranaggi diversi, non combaciano bene."
          shield: "Si dice che gli uomini del passato abbiano\ninventato gli ingranaggi dopo aver visto\nquesto Pokémon."
        de:
          sword: "Seine zwei Teile stehen einander näher als\nZwillinge. Eine andere Kombination würde\nnicht halb so gut ineinandergreifen."
          shield: "Man sagt, dass vor langer Zeit ein Mensch das\nZahnrad erfand, weil er so von der Begegnung\nmit diesem Pokémon inspiriert wurde."
        es:
          sword: "Los dos cuerpos que lo componen están más\nunidos que unos gemelos. Si intentaran acoplarse\na otros, no lograrían encajar."
          shield: "Se dice que en tiempos remotos los seres\nhumanos se inspiraron en este Pokémon para\ninventar el mecanismo de engranaje."
        ko:
          sword: "2개의 몸은 쌍둥이보다도\n가깝다. 다른 몸과 있으면\n제대로 맞물리지 못한다."
          shield: "먼 옛날에 기어르를 본\n사람이 톱니바퀴의 구조를\n고안했다고 전해진다."
        zh_simp:
          sword: "２个身体比双胞胎还要亲近。\n要是换成别的齿轮儿。\n就没有办法好好咬合。"
          shield: "据说在很久以前，\n是看到了齿轮儿的人\n发明了齿轮的构造。"
        zh_trad:
          sword: "２個身體比雙胞胎還要親近。\n要是換成別的齒輪兒，\n就沒有辦法好好咬合。"
          shield: "據說在很久以前，\n是看到了齒輪兒的人\n發明了齒輪的構造。"
