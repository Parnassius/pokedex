          shield: "ほしの　かがやく　ばんに　もっとも\nサイコパワーが　たかまるらしい。\nうちゅうとの　かんけいは　ふめい。"
        jp_kanji:
          sword: "星が　輝く　夜に　眠った\n子どもたちを　連れ去ると　言われ\n制裁の魔女　とも　呼ばれる。"
          shield: "星の　輝く　晩に　もっとも\nサイコパワーが　高まるらしい。\n宇宙との　関係は　不明。"
        en:
          sword: "It’s said that when stars shine in the night sky,\nthis Pokémon will spirit away sleeping children.\nSome call it the Witch of Punishment."
          shield: "On nights when the stars shine, this Pokémon’s\npsychic power is at its strongest. It’s unknown just\nwhat link Gothorita has to the greater universe."
        fr:
          sword: "On raconte qu’il enlève les enfants endormis\npendant les nuits étoilées. Cela lui vaut\nd’être considéré comme un démon punisseur."
          shield: "Ses pouvoirs psychiques semblent atteindre\nleur paroxysme pendant les nuits étoilées,\nmais nul ne sait s’il a un rapport avec l’espace."
        it:
          sword: "Si dice che nelle notti stellate porti via con sé\ni bambini addormentati. Per questo è chiamato\nanche “strega del castigo”."
          shield: "Si dice che accumuli energia psichica soprattutto\nnelle notti stellate, ma la sua connessione con\nl’universo rimane un mistero."
        de:
          sword: "In sternklaren Nächten entführt es angeblich\nschlafende Kinder aus ihren Betten. Man nennt\nes auch die „Hexe der Bestrafung“."
          shield: "An sternklaren Abenden erreicht es angeblich\nden Höhepunkt seiner Psycho-Kräfte. Seine\ngenaue Verbindung zum Weltraum ist unklar."
        es:
          sword: "Corre el rumor de que en las noches estrelladas\nse lleva consigo a los niños dormidos, por lo que\nrecibe el sobrenombre de Bruja Castigadora."
          shield: "Sus poderes psíquicos alcanzan su apogeo en las\nnoches estrelladas, aunque su posible vínculo con\nel espacio está envuelto en misterio."
        ko:
          sword: "별이 빛나는 밤에 잠이 든\n아이들을 데려간다고 전해져\n심판의 마녀라고도 불린다."
          shield: "별이 빛나는 밤에 가장\n사이코 파워가 높아지는 듯하다.\n우주와의 관계는 불명확하다."
        zh_simp:
          sword: "据说会在星光闪耀的夜晚\n把睡着的孩子们带走。\n也有人称它为惩罚魔女。"
          shield: "哥德小童的精神力量似乎会\n在星光闪耀的夜晚达到最高点。\n它与宇宙的关系至今不明。"
        zh_trad:
          sword: "據說會在星光閃耀的夜裡\n把睡著的孩子們帶走。\n也有人稱牠為制裁魔女。"
          shield: "哥德小童的精神力量似乎會\n在星光閃耀的夜晚達到最高點。\n牠與宇宙的關係至今不明。"
gothitelle:
