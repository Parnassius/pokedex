          shield: "あしの　さきから　ほそい　ねっこを\nのばして　もりの　きぎと　むすびつき\nじざいに　あやつる　ちからを　もつ。"
        jp_kanji:
          sword: "森の　木を　伐り倒す　人間を\n食べると　恐れられているが　森で\n暮らす　ポケモンたちには　優しい。"
          shield: "足の　先から　細い　根っこを\n伸ばして　森の　木々と　結びつき\n自在に　操る　力を　もつ。"
        en:
          sword: "People fear it due to a belief that it devours any\nwho try to cut down trees in its forest, but to the\nPokémon it shares its woods with, it’s kind."
          shield: "Small roots that extend from the tips of this\nPokémon’s feet can tie into the trees of the\nforest and give Trevenant control over them."
        fr:
          sword: "Les bûcherons qui viennent couper des arbres\nen forêt ont peur d’être dévorés par Desséliande.\nIl est gentil avec les Pokémon habitant les bois."
          shield: "Il étire les fines racines de ses pieds pour établir\nune connexion avec les autres arbres de la forêt\net ainsi les contrôler."
        it:
          sword: "Gli esseri umani lo temono perché mangia\nchi abbatte gli alberi. Tuttavia è sempre gentile\ncon i Pokémon che vivono nei boschi."
          shield: "Ha il potere di controllare gli altri alberi della\nforesta connettendosi a loro grazie alle radici\nsottili che si dipartono dalla punta dei suoi piedi."
        de:
          sword: "Es wird dafür gefürchtet, Menschen zu fressen,\ndie Bäume im Wald fällen. Zu den Pokémon,\ndie den Wald bewohnen, ist es aber stets nett."
          shield: "Es streckt die dünnen Wurzeln an seinen Beinen\naus, um sich so mit den Bäumen im Wald zu\nverbinden und sie nach Belieben zu kontrollieren."
        es:
          sword: "Los humanos lo temen porque devora a quienes\nosen talar los árboles, pero es amable con los\nPokémon que habitan en el bosque."
          shield: "Puede extender las finas raíces que le brotan de\nlas extremidades inferiores para conectarse con\nel resto de los árboles y controlarlos a voluntad."
        ko:
          sword: "숲에서 나무를 베는 인간을\n잡아먹는다는 공포의 대상이지만\n숲속에 사는 포켓몬들에게는 상냥하다."
          shield: "발끝에서 가느다란 뿌리를 뻗고\n숲의 나무들과 결속하여\n자유자재로 조종하는 힘을 가졌다."
        zh_simp:
          sword: "人们惧怕它，因为它据说会\n吃掉砍倒森林里树木的人。\n但它对住在森林里的宝可梦很亲切。"
          shield: "脚尖伸出来的根须\n能连结森林中的树木，\n并且自由自在地加以操纵。"
        zh_trad:
          sword: "人們懼怕牠，因為牠據說會\n吃掉砍倒森林裡樹木的人。\n但牠對住在森林裡的寶可夢很親切。"
          shield: "腳尖伸出來的根鬚\n能連結森林中的樹木，\n並且自由自在地加以操縱。"
