      descriptions:
        jp_kana:
          sword: "こころやさしい　ひとの　まえに\nしあわせを　もたらすため\nすがたを　あらわすと　いわれている。"
          shield: "やさしいひとの　そばに　いないと\nげんきが　でなくなってしまう。\nはねをうごかさずに　そらにうかべる。"
        jp_kanji:
          sword: "心優しい　人の　前に\n幸せを　もたらすため\n姿を　現すと　言われている。"
          shield: "優しい人の　そばに　いないと\n元気が　でなくなってしまう。\n羽を動かさずに　空に浮かべる。"
        en:
          sword: "They say that it will appear before kindhearted,\ncaring people and shower them with happiness."
          shield: "It grows dispirited if it is not with kind people.\nIt can float in midair without moving its wings."
        fr:
          sword: "On dit qu’il se montre aux personnes dotées\nd’un cœur pur pour leur apporter joie et bonheur."
          shield: "Ce Pokémon est capable de léviter sans battre\ndes ailes. Il est vite démoralisé s’il n’est pas\nen compagnie de gens sympathiques."
        it:
          sword: "Si dice che appaia alle persone buone\ne premurose, inondandole di felicità."
          shield: "S’intristisce se non ha persone gentili\nal suo fianco. Può restare sospeso in aria\nsenza dover muovere le ali."
        de:
          sword: "Man sagt, es zeige sich nur gutherzigen und\neinfühlsamen Menschen und überschütte sie\ndann mit Freude."
          shield: "Es kann, ohne mit den Flügeln zu schlagen, in der\nLuft schweben. Ein Mangel an gutherzigen\nMenschen in seiner Nähe schlägt ihm aufs Gemüt."
        es:
          sword: "Dicen que se le aparece a la gente de buen\ncorazón y la inunda de felicidad."
          shield: "Si no está con gente amable, se entristece.\nPuede flotar en el aire sin mover las alas."
        ko:
          sword: "마음 착한 사람에게\n행복을 가져다주기 위해\n모습을 드러낸다고 전해진다."
          shield: "상냥한 사람 곁에 있지 않으면\n기운을 내지 못한다.\n날개를 움직이지 않고도 공중에 뜰 수 있다."
        zh_simp:
          sword: "据说它是为了将幸福带给\n性格温柔的人而现身的。"
          shield: "不待在温柔的人身边\n就会变得没有精神。\n不挥动翅膀也能浮在空中。"
        zh_trad:
          sword: "據說牠會為了將\n幸福帶給心地善良\n的人而現身。"
          shield: "不待在溫柔的人身邊\n就會變得沒有精神。\n不揮動翅膀也能浮在空中。"
natu:
