          sword: "てきに　おそわれると　カラの　フタを\nがっちり　しめて　みを　まもる。\nただし　カブルモには　あけられる。"
          shield: "でんき　エネルギーに　はんのうする\nふしぎな　たいしつ。　カブルモと\nともに　いると　なぜか　しんかする。"
        jp_kanji:
          sword: "敵に　襲われると　殻の　蓋を\nがっちり　閉めて　身を　守る。\nただし　カブルモには　開けられる。"
          shield: "電気　エネルギーに　反応する\n不思議な　体質。　カブルモと\nともに　いると　なぜか　進化する。"
        en:
          sword: "When attacked, it tightly shuts the lid of its shell.\nThis reaction fails to protect it from Karrablast,\nhowever, because they can still get into the shell."
          shield: "It has a strange physiology that responds to\nelectricity. When together with Karrablast,\nShelmet evolves for some reason."
        fr:
          sword: "Il se recroqueville dans sa carapace en fermant\nla visière lorsque des ennemis approchent.\nCarabing peut néanmoins en forcer l’entrée."
          shield: "Il a l’étrange faculté de réagir à l’énergie\nélectrique. On ne sait trop pourquoi, mais quand\nil se trouve aux côtés de Carabing, il évolue."
        it:
          sword: "Quando viene attaccato, si rinchiude nella\nconchiglia sigillando la visiera per proteggersi.\nSolo Karrablast riesce a superare queste difese."
          shield: "Il suo corpo reagisce misteriosamente all’energia\nelettrica. Pare che si evolva se si trova in\npresenza di Karrablast."
        de:
          sword: "Wird es angegriffen, schließt es, so fest es kann,\ndas Visier seiner Muschel. Gegen Laukaps erweist\nsich dieser Schutz allerdings als nutzlos."
          shield: "Sein Körper reagiert unerklärlicherweise auf\nElektrizität. Es heißt, die Anwesenheit von\nLaukaps löse bei ihm die Entwicklung aus."
        es:
          sword: "Cierra a cal y canto la visera de su caparazón al\nser atacado. Solo los Karrablast pueden abrirla."
          shield: "Debido a su peculiar constitución, reacciona\nante la energía eléctrica. Por alguna misteriosa\nrazón, evoluciona en presencia de Karrablast."
        ko:
          sword: "상대에게 공격받으면 껍질의 뚜껑을\n꽉 닫아서 몸을 지킨다.\n단, 딱정곤에게는 열리고 만다."
          shield: "전기 에너지에 반응하는 신비한\n체질을 지녔다. 딱정곤과 함께\n있으면 무슨 이유인지 진화한다."
        zh_simp:
          sword: "一旦被敌人袭击，\n便会关上壳盖保护自己。\n不过盖盖虫能打得开。"
          shield: "有着会对电能产生反应\n的奇异体质。不知为何，\n和盖盖虫待在一起就会进化。"
        zh_trad:
          sword: "一旦被敵人襲擊，\n便會關上殼蓋保護自己。\n不過蓋蓋蟲能打得開。"
          shield: "有著會對電能產生反應\n的奇異體質。不知為何，\n和蓋蓋蟲待在一起就會進化。"
accelgor:
  species_id: 617
  names:
    jp_kana: アギルダー
    jp_kanji: アギルダー
    en: Accelgor
    fr: Limaspeed
    it: Accelgor
    de: Hydragil
    es: Accelgor
    ko: 어지리더
    zh_simp: 敏捷虫
    zh_trad: 敏捷蟲
  forms:
    accelgor:
      form_id: 0
      base_stats:
        hp: 80
        attack: 70
        defense: 40
        special_attack: 100
        special_defense: 60
        speed: 145
      evs_yield:
        hp: 0
        attack: 0
