      hidden_ability: clear_body
      descriptions:
        jp_kana:
          sword: "ほんきの　ときは　でかギアの　そとの\nはぐるまと　ちびギアが　がっち。\nかいてんそくどが　ひやく　するのだ。"
          shield: "こうぎょうぎじゅつの　シンボルとして\nおおくの　ガラルの　かいしゃで\nきぎょうロゴに　さいよう　される。"
        jp_kanji:
          sword: "本気の　ときは　でかギアの　外の\n歯車と　ちびギアが　合致。\n回転速度が　飛躍　するのだ。"
          shield: "工業技術の　シンボルとして\n多くの　ガラルの　会社で\n企業ロゴに　採用　される。"
        en:
          sword: "When Klang goes all out, the minigear links up\nperfectly with the outer part of the big gear, and\nthis Pokémon’s rotation speed increases sharply."
          shield: "Many companies in the Galar region choose\nKlang as their logo. This Pokémon is considered\nthe symbol of industrial technology."
        fr:
          sword: "Quand le combat devient sérieux, la partie\nextérieure du grand rouage s’aligne parfaitement\navec le petit pour accélérer leur rotation."
          shield: "Ce Pokémon symbolisant la technologie\nindustrielle est souvent utilisé dans le logo\ndes entreprises de Galar."
        it:
          sword: "Quando fa sul serio, la parte esterna\ndell’ingranaggio grande si unisce a quello\npiccolo e iniziano a girare all’impazzata."
          shield: "Molte imprese di Galar lo usano come logo\nin quanto simbolo della tecnologia industriale."
        de:
          sword: "Macht es Ernst, greift das kleine äußere Rad in\ndas große Rad, was die Drehgeschwindigkeit\nmerklich erhöht."
          shield: "Da es symbolisch für die Industriebranche steht,\nist es im Logo unzähliger Firmen Galars\nabgebildet."
        es:
          sword: "Cuando se pone en serio, la parte externa de la\nrueda dentada grande se acopla a la pequeña y\naumenta su velocidad de rotación."
          shield: "Muchas empresas de Galar usan su imagen en sus\nlogotipos como símbolo de tecnología industrial."
        ko:
          sword: "전력을 다할 때는 왕기어의\n바깥쪽 톱니와 꼬마기어가 맞물린다.\n회전 속도를 빠르게 하기 위함이다."
          shield: "공업 기술의 상징으로\n많은 가라르의 회사에서\n기업 로고로 채용하고 있다."
        zh_simp:
          sword: "如果认真起来，大齿轮外圈的\n齿轮会和小齿轮完全接合。\n此时转速将会大幅提升。"
          shield: "被认为是工业技术的象征。\n有许多伽勒尔当地的公司\n选择它作为企业的标志。"
        zh_trad:
          sword: "如果認真起來，大齒輪外圈的\n齒輪會和小齒輪完全接合。\n此時轉速將會大幅提升。"
          shield: "被認為是工業技術的象徵。\n有許多伽勒爾當地的公司\n選擇牠作為企業的標誌。"
