      descriptions:
        jp_kana:
          sword: "まだまだ　ちいさく　おくびょう。\nこうふんしたり　びっくりすると\nはなや　くちから　ひが　もれる。"
          shield: "かざんの　まわりに　すんでいる。\nいちにちの　おわりには　マグマに\nつかり　つかれを　いやしている。"
        jp_kanji:
          sword: "まだまだ　小さく　臆病。\n興奮したり　びっくりすると\n鼻や　口から　火が　もれる。"
          shield: "火山の　まわりに　棲んでいる。\n１日の　終わりには　マグマに　浸かり\n疲れを　癒している。"
        en:
          sword: "This Pokémon is still small and timid.\nWhenever Magby gets excited or surprised,\nflames leak from its mouth and its nose."
          shield: "This Pokémon makes its home near volcanoes.\nAt the end of the day, Magby soaks in magma,\nresting and recovering from the day’s fatigue."
        fr:
          sword: "Ce n’est encore qu’un petit Pokémon craintif.\nLorsqu’il est excité ou étonné, du feu s’échappe\nde son nez ou de sa bouche."
          shield: "Il vit près des volcans. À la fin de la journée,\nil se détend dans un bon bain de magma."
        it:
          sword: "È ancora piccolo e si intimorisce facilmente.\nQuando si emoziona o si spaventa, emette fuoco\ndalla bocca o dal naso."
          shield: "Vive nei pressi dei vulcani. Dopo una faticosa\ngiornata, si gode un rilassante bagno nel magma."
        de:
          sword: "Es ist noch klein und furchtsam. Wenn es sich\naufregt oder erschrickt, entweichen Flammen aus\nseinem Mund und seiner Nase."
          shield: "Es lebt in der Nähe von Vulkanen. Nach einem\nanstrengenden Tag badet es in Magma und\nschöpft so neue Energie."
        es:
          sword: "Como todavía es pequeño, se asusta fácilmente.\nCuando se emociona o se sorprende, se le\nescapa fuego por la nariz y por la boca."
          shield: "Vive en los alrededores de los volcanes.\nAl final del día, se baña en magma para\naliviar el cansancio."
        ko:
          sword: "아직은 작고 겁이 많다.\n흥분하거나 놀라면\n코나 입에서 불꽃이 새어 나온다."
          shield: "화산 주위에 살고 있다.\n하루를 마칠 때에는\n마그마에 잠겨 피로를 푼다."
        zh_simp:
          sword: "不但身材很小，而且还很胆小。\n每次感到兴奋或是吃惊的时候，\n都会从嘴巴和鼻子里冒出火花。"
          shield: "栖息在火山地带。\n会浸泡在岩浆中，\n疗愈一整天的疲劳。"
        zh_trad:
          sword: "體型還很小，且性情膽小。\n興奮或吃驚的時候，就會\n從鼻子和嘴巴裡冒出火焰。"
          shield: "棲息在火山的周圍。\n在一天結束時，會泡進\n熔岩中讓身體舒緩疲勞。"
miltank:
  species_id: 241
