        jp_kana:
          sword: "たのしい　おんがくの　リズムが\nルンパッパの　さいぼうを　かっせいか\nさせて　パワーを　はっきするのだ。"
          shield: "ようきな　リズムに　あわせて\nからだを　うごかす　ことで\nパワーを　ぞうふくさせて　いるのだ。"
        jp_kanji:
          sword: "楽しい　音楽の　リズムが\nルンパッパの　細胞を　活性化\nさせて　パワーを　発揮するのだ。"
          shield: "陽気な　リズムに　あわせて\n体を　動かす　ことで\nパワーを　増幅させて　いるのだ。"
        en:
          sword: "The rhythm of bright, festive music activates\nLudicolo’s cells, making it more powerful."
          shield: "If it hears festive music, it begins moving in\nrhythm in order to amplify its power."
        fr:
          sword: "Les cellules de Ludicolo s’activent s’il entend\nune musique entraînante, le rendant encore\nplus puissant."
          shield: "Il bouge son corps sur un rythme entraînant\npour décupler ses forces."
        it:
          sword: "Le sue cellule sono sollecitate dalla musica\nfestosa, che lo rende più potente."
          shield: "Aumenta la propria forza danzando al ritmo\ndi una musica giocosa."
        de:
          sword: "Der Rhythmus von fröhlicher Musik aktiviert die\nZellen von Kappalores und macht es so stärker."
          shield: "Es bewegt seinen Körper zu fröhlichen Rhythmen.\nAuf diese Weise erhöht es seine Kraft."
        es:
          sword: "El ritmo de la música alegre estimula sus células\ny aumenta su fuerza."
          shield: "Mover su cuerpo al ritmo de música festiva\npuede hacer que aumente su fuerza."
        ko:
          sword: "즐거운 음악의 리듬이\n로파파의 세포를 활성화시켜\n파워를 발휘한다."
          shield: "경쾌한 리듬에 맞춰\n몸을 움직여서\n파워를 증폭시키고 있다."
        zh_simp:
          sword: "快乐的音乐节奏会让\n乐天河童的细胞活性化，\n使其发挥出强大的力量。"
          shield: "乐天河童会跟着\n欢快的音乐摇摆身体，\n从而增强自己的力量。"
        zh_trad:
          sword: "快樂的音樂節奏會讓\n樂天河童的細胞活性化，\n使牠發揮出強大的力量。"
          shield: "樂天河童會跟著\n歡快的音樂搖擺身體，\n藉而增強自己的力量。"
seedot:
