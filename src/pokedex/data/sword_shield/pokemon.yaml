        jp_kana:
          sword: "ぜんしんが　きんにくの　かたまり。\nさむい　うみでも　たくましい　うでで\nりゅうひょうを　くだき　つきすすむ。"
          shield: "およぎ　だけでなく　かくとうぎも\nとくい。　きたえあげた　うでから\nごうかいな　パンチを　くりだす。"
        jp_kanji:
          sword: "全身が　筋肉の　塊。\n寒い　海でも　たくましい　腕で\n流氷を　砕き　突き進む。"
          shield: "泳ぎ　だけでなく　格闘技も　得意。\n鍛えあげた　腕から\n豪快な　パンチを　繰りだす。"
        en:
          sword: "Its body is solid muscle. When swimming through\ncold seas, Poliwrath uses its impressive arms to\nsmash through drift ice and plow forward."
          shield: "Poliwrath is skilled at both swimming and martial\narts. It uses its well-trained arms to dish out\npowerful punches."
        fr:
          sword: "Cette véritable montagne de muscles peut\nse frayer un chemin même dans les eaux glaciales\nen éclatant la banquise avec ses bras robustes."
          shield: "Aussi habile à la nage qu’au combat, il peut\ndonner de vigoureux coups de poing avec\nses bras musclés."
        it:
          sword: "Il suo corpo è un ammasso di muscoli. Nuota\nanche nei mari più freddi frantumando il ghiaccio\nfluttuante con le braccia vigorose per farsi strada."
          shield: "È abile sia nel nuoto che nella lotta corpo\na corpo. Sferra pugni vigorosi grazie alle sue\nbraccia allenate."
        de:
          sword: "Sein ganzer Körper besteht fast nur aus Muskeln.\nIn kalten Meeren zerschlägt es mit seinen starken\nArmen Treibeis, um voranzukommen."
          shield: "Es ist sowohl ein begnadeter Schwimmer als auch\nKampfsportler. Mit seinen durchtrainierten Armen\nteilt es kräftige Schläge aus."
        es:
          sword: "Su cuerpo es puro músculo. Logra abrirse paso\npor aguas gélidas partiendo el hielo con sus\nfornidos brazos."
          shield: "No solo es un experto nadador, sino que también\ndomina las artes marciales. Propina enérgicos\npuñetazos gracias a sus musculosos brazos."
        ko:
          sword: "전신이 근육 덩어리다.\n추운 바다에서도 늠름한 팔로\n유빙을 부수며 힘차게 나아간다."
          shield: "헤엄뿐만 아니라 격투기도\n특기다. 단련한 팔로\n호쾌하게 펀치를 날린다."
        zh_simp:
          sword: "全身都是肌肉。即使是在\n寒冷的大海中也能用健壮的\n手臂击碎浮冰，奋勇前进。"
          shield: "除了游泳还擅长格斗技。\n能用经过锻炼的手臂\n使出豪迈强力的拳击。"
        zh_trad:
          sword: "全身都是肌肉。即使是在\n寒冷的大海也能用結實的手臂\n擊碎浮冰，奮勇前進。"
          shield: "除了游泳之外，也擅長使用\n格鬥技。完美鍛鍊的手臂\n可以使出豪邁的拳擊。"
