          shield: "あしが　じゆうに　のびちぢみして\nとおく　はなれている　ばあいでも\nあいてを　けりあげることが　できる。"
        jp_kanji:
          sword: "見事な　バランス感覚。\nどんな　姿勢でも　連続で\nキックを　放てる　すごい　やつ。"
          shield: "脚が　自由に　伸び縮みして\n遠く　離れている　場合でも\n相手を　蹴り上げることが　できる。"
        en:
          sword: "This amazing Pokémon has an awesome sense of\nbalance. It can kick in succession from any position."
          shield: "The legs freely contract and stretch. The stretchy\nlegs allow it to hit a distant foe with a rising kick."
        fr:
          sword: "Il possède un fantastique sens de l’équilibre,\net peut donner des rafales de coups de pied\ndans toutes les positions."
          shield: "Kicklee peut rétracter et étendre ses jambes\nà sa guise. La formidable allonge dont il dispose\nlui permet de frapper des adversaires éloignés."
        it:
          sword: "Questo straordinario Pokémon ha un grande\nequilibrio. Può tirare raffiche di calci da qualsiasi\nposizione."
          shield: "Può accorciare o allungare le gambe a piacere.\nIn questo modo riesce a colpire con i calci anche\ngli avversari distanti."
        de:
          sword: "Dieses Pokémon besitzt einen formidablen\nGleichgewichtssinn. Es kann in jeder Position\npausenlos zutreten."
          shield: "Es kann seine Beine nach Belieben ausfahren und\neinziehen und so auch entfernte Gegner treffen."
        es:
          sword: "Este Pokémon tiene un sentido del equilibrio\nincreíble. Puede dar patadas desde cualquier\nposición."
          shield: "Encoge y estira las piernas a su antojo. De hecho,\nhasta puede propinar una patada a un rival que\nse encuentre lejos."
        ko:
          sword: "훌륭한 밸런스 감각으로\n어떤 자세라도 연속\n킥을 날리는 대단한 녀석이다."
          shield: "다리를 자유자재로 늘이고 줄인다.\n상대가 멀리 떨어져 있어도\n다리를 늘여서 차올릴 수 있다."
        zh_simp:
          sword: "拥有卓越的平衡感。\n无论处于什么姿势都可以\n连续施展踢击的厉害角色。"
          shield: "腿能自由地伸缩，\n即使离得很远，\n也能把对手踢飞。"
        zh_trad:
          sword: "擁有卓越的平衡感。\n無論處於什麼姿勢都可以\n連續施展踢擊的厲害角色。"
          shield: "雙腿能夠自由伸縮，\n即使離得很遠也能\n把對手一腳踢飛。"
