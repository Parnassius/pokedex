      descriptions:
        jp_kana:
          sword: "むかし　アローラちほうの　おうぞくと\nぜいたくな　くらしを　していたため\nエサの　えりごのみが　はげしい。"
          shield: "プライドと　ちのうが　たかい。\nずるがしこく　たちまわり　あいての\nじゃくてんを　しつように　せめる。"
        jp_kanji:
          sword: "むかし　アローラ地方の　王族と\n贅沢な　暮らしを　していたため\nエサの　選り好みが　激しい。"
          shield: "プライドと　知能が　高い。\nずる賢く　立ちまわり　相手の\n弱点を　執拗に　攻める。"
        en:
          sword: "It’s accustomed to luxury because it used to live\nwith Alolan royalty. As a result, it’s very picky\nabout food."
          shield: "Deeply proud and keenly smart, this Pokémon\nmoves with cunning during battle and relentlessly\nattacks enemies’ weak points."
        fr:
          sword: "Par le passé, il menait une vie de luxe auprès\nde la famille royale d’Alola, et il en a gardé\ndes goûts alimentaires très sélectifs."
          shield: "Un Pokémon aussi fier qu’intelligent.\nIl a recours à la ruse pour attaquer sans relâche\nle point faible de ses ennemis."
        it:
          sword: "In passato viveva nel lusso assieme alla famiglia\nreale della regione di Alola. Per questo è molto\nschizzinoso riguardo al cibo."
          shield: "È molto orgoglioso ed estremamente intelligente.\nAgisce con furbizia attaccando con ostinazione\ni punti deboli del nemico."
        de:
          sword: "Vor langer Zeit führte es bei einer Dynastie der\nAlola-Region ein luxuriöses Leben, wodurch es\nin Bezug auf sein Futter sehr wählerisch wurde."
          shield: "Dieses sehr stolze, intelligente Pokémon kämpft\nmit listigen Manövern und bearbeitet hartnäckig\ndie Schwachpunkte seines Gegners."
        es:
          sword: "Antaño disfrutó de los lujos de la familia real de\nAlola, por lo que tiene un paladar muy refinado\ny no come cualquier cosa."
          shield: "Es un Pokémon muy orgulloso e inteligente.\nSe vale de su astucia en combate para atacar los\npuntos débiles de sus enemigos con obstinación."
        ko:
          sword: "과거 알로라지방의 왕족과\n사치스러운 생활을 했기 때문에\n먹이의 취향이 상당히 까다롭다."
          shield: "프라이드와 지능이 높다.\n교활하고 약삭빠르게 행동하여\n상대의 약점을 집요하게 공격한다."
        zh_simp:
          sword: "过去曾经和阿罗拉的王族\n一起享受奢侈浮华的生活，\n所以对食物十分挑剔。"
          shield: "自尊心和智商都很高。\n会狡猾地应战，\n反复攻击敌人的弱点。"
        zh_trad:
          sword: "過去曾經和阿羅拉的王族\n一起享受奢侈浮華的生活，\n所以對食物十分挑剔。"
          shield: "自尊心和智商都很高。\n會狡猾地應戰，\n反覆攻擊敵人的弱點。"
    meowth_galarian_form:
      form_id: 2
      names:
        jp_kana: ガラルのすがた
        jp_kanji: ガラルのすがた
        en: Galarian Form
        fr: Forme de Galar
        it: Forma di Galar
        de: Galar-Form
        es: Forma de Galar
        ko: 가라르의 모습
        zh_simp: 伽勒尔的样子
        zh_trad: 伽勒爾的樣子
      base_stats:
        hp: 50
        attack: 65
        defense: 55
        special_attack: 40
        special_defense: 40
        speed: 40
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - steel
      egg_groups:
        - field
      abilities:
        - pickup
        - tough_claws
      hidden_ability: unnerve
      descriptions:
        jp_kana:
          sword: "せんとうてきな　かいようみんぞくと\nくらすうちに　きたえられ　からだの\nあちこちが　くろがねに　へんかした。"
          shield: "ひたいの　こばんは　より　くろいほど\nかたく　なかまから　そんけいされる。\nゆうもうで　おそれを　しらない。"
        jp_kanji:
          sword: "戦闘的な　海洋民族と\n暮らすうちに　鍛えられ　体の\nあちこちが　黒鉄に　変化した。"
          shield: "額の　小判は　より　黒いほど\n硬く　仲間から　尊敬される。\n勇猛で　恐れを　知らない。"
        en:
          sword: "Living with a savage, seafaring people has\ntoughened this Pokémon’s body so much that\nparts of it have turned to iron."
          shield: "These daring Pokémon have coins on their\nforeheads. Darker coins are harder, and harder\ncoins garner more respect among Meowth."
        fr:
          sword: "Après avoir longtemps vécu avec une tribu de\nbarbares des mers, il est devenu plus musclé,\net des éléments métalliques lui ont poussé ici et là."
          shield: "Plus la pièce de son front est sombre, plus elle\nest dure et inspire le respect à ses congénères.\nIl est aguerri et ne connaît pas la peur."
        it:
          sword: "Parte del suo corpo si è trasformata in ferro\ndopo un lungo soggiorno e continui allenamenti\ncon un battagliero popolo del mare."
          shield: "Più è nera la moneta sulla sua fronte, più è\nrispettato dai suoi simili. È intrepido e non\nconosce la paura."
        de:
          sword: "Das Leben bei einem kriegerischen Seefahrervolk\nhat es stärker gemacht. Manche Stellen an seinem\nKörper wandelten sich dabei zu Eisen."
          shield: "Je dunkler die Münze an seiner Stirn, desto fester\nist sie und desto mehr Respekt hat seine Gruppe\nvor ihm. Es ist tapfer und kennt keine Angst."
        es:
          sword: "Algunas partes de su cuerpo se volvieron\nmetálicas tras una larga convivencia con\naguerrida gente del mar."
          shield: "Cuanto más oscura es la moneda de su frente,\nmayor respeto inspira en sus congéneres. Es\nmuy osado y no conoce el miedo."
        ko:
          sword: "전투적인 해양 민족과\n지내는 동안 단련되어\n몸 여기저기가 강철로 변화했다."
          shield: "이마의 금화는 검을수록\n단단하고 동료에게 존경받는다.\n용맹하고 두려움을 모른다."
        zh_simp:
          sword: "和好战的海洋民族一起生活，\n久而久之身体的各个地方\n就都变成了黑铁。"
          shield: "额头上的金币越黑就越硬，\n也越能受到伙伴的尊敬。\n性格勇猛，什么都不怕。"
        zh_trad:
          sword: "和好戰的海洋民族一起生活，\n久而久之身體的各個地方\n就都變成了黑鐵。"
          shield: "額頭上的金幣越黑就越硬，\n也越能受到夥伴的尊敬。\n性情勇猛，什麼都不怕。"
  gmax_forms:
    meowth_gigantamax:
      form_id: 999
      names:
        jp_kana: キョダイマックス
        jp_kanji: キョダイマックス
        en: Gigantamax
        fr: Gigamax
        it: Gigamax
        de: Gigadynamax
        es: Gigamax
        ko: 거다이맥스
        zh_simp: 超极巨化
        zh_trad: 超極巨化
      descriptions:
        jp_kana:
          sword: "ひたいの　おおばんに　うかびあがった\nもようは　ダイマックスの　ひみつを\nとく　カギと　かんがえられている。"
          shield: "キョダイマックスの　パワーにより\nどうたいは　のびに　のびて　ひたいの\nこばんは　おおばんに　かわった。"
        jp_kanji:
          sword: "額の　大判に　浮かびあがった\n模様は　ダイマックスの　秘密を\n解く　カギと　考えられている。"
          shield: "キョダイマックスの　パワーにより\n胴体は　伸びに　伸びて　額の\n小判は　大判に　変わった。"
        en:
          sword: "The pattern that has appeared on its giant coin\nis thought to be the key to unlocking the secrets\nof the Dynamax phenomenon."
          shield: "Its body has grown incredibly long and the coin\non its forehead has grown incredibly large—all\nthanks to Gigantamax power."
        fr:
          sword: "On pense que le motif qui apparaît sur la grande\npièce ornant son front permettrait de comprendre\nle phénomène Dynamax."
          shield: "La puissance du Gigamax a fait pousser son torse\nde façon démesurée, et la pièce sur son front\na encore gagné en valeur."
        it:
          sword: "Si pensa che il motivo sulla moneta che ha\nsulla fronte sia la chiave per comprendere\nil fenomeno Dynamax."
          shield: "L’energia del fenomeno Gigamax ne ha allungato\nil busto e ingrandito la moneta sulla fronte."
        de:
          sword: "Das Muster, das auf der riesigen Münze an seiner\nStirn erscheint, wird als Schlüssel zum Geheimnis\ndes Dynamax-Phänomens angesehen."
          shield: "Durch die Gigadynamax-Energie hat sich sein\nOberkörper immer weiter in die Länge gestreckt.\nSelbst die Münze an seiner Stirn ist gewachsen."
        es:
          sword: "Se cree que el grabado de la gran moneda que\nornamenta su frente contiene la clave para\ndescifrar el secreto del fenómeno Dinamax."
          shield: "Debido al fenómeno Gigamax, tanto la moneda\nde su frente como su torso han crecido de forma\ndescomunal."
        ko:
          sword: "이마의 큰 금화에 나타난\n무늬는 다이맥스의 비밀을\n밝혀낼 열쇠로 여겨지고 있다."
          shield: "거다이맥스의 파워로\n몸이 늘어나고 늘어나서\n이마의 금화가 대형 금화가 되었다."
        zh_simp:
          sword: "人们认为它额头上金币\n浮现出的纹路中蕴藏着\n解开极巨化之谜的关键。"
          shield: "受超极巨化之力的影响，\n身体越长越高，额头上的\n金币也变成了大金币。"
        zh_trad:
          sword: "人們認為牠額頭上金幣\n浮現出的紋路中蘊藏著\n解開極巨化之謎的關鍵。"
          shield: "受超極巨化之力的影響，\n身體越長越高，額頭上的\n金幣也變成了大金幣。"
persian:
  species_id: 53
  names:
    jp_kana: ペルシアン
    jp_kanji: ペルシアン
    en: Persian
    fr: Persian
    it: Persian
    de: Snobilikat
    es: Persian
    ko: 페르시온
    zh_simp: 猫老大
    zh_trad: 貓老大
