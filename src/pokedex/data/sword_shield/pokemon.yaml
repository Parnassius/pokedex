      descriptions:
        jp_kana:
          sword: "はっぱから　ただよう　クセのある\nかおりは　ガラルじんの　このみ。\nこうすいに　かこうされ　にんき。"
          shield: "シッポは　するどく　やいばのよう。\nたいぼくも　まっぷたつに　する\nばつぐんの　きれあじを　ほこる。"
        jp_kanji:
          sword: "葉っぱから　漂う　クセのある\n香りは　ガラル人の　好み。\n香水に　加工され　人気。"
          shield: "しっぽは　鋭く　刃のよう。\n大木も　真っ二つに　する\n抜群の　切れ味を　誇る。"
        en:
          sword: "Galarians favor the distinctive aroma that drifts\nfrom this Pokémon’s leaves. There’s a popular\nperfume made using that scent."
          shield: "This Pokémon’s tail is blade sharp, with a\nfantastic cutting edge that can slice right\nthough large trees."
        fr:
          sword: "Les habitants de Galar adorent l’odeur unique\nqui se dégage de ses feuilles, aussi entrent-elles\ndans la composition d’un parfum très populaire."
          shield: "Grâce à sa queue aussi effilée qu’une lame, il est\ncapable de fendre en deux des arbres immenses."
        it:
          sword: "La singolare fragranza emanata dalle sue foglie\nè molto apprezzata a Galar e i profumi che se\nne ricavano sono molto popolari."
          shield: "Va molto fiero della sua coda affilata come\nuna lama, con cui può tranciare in due persino\nun grosso albero."
        de:
          sword: "Die Bewohner Galars mögen den eigentümlichen\nGeruch, den seine Blätter verströmen. Als Parfüm\nist er sehr beliebt."
          shield: "Sein Schweif ist scharf wie eine Klinge. Es ist stolz\ndarauf, dass es damit selbst einen großen Baum\nsauber zweiteilen kann."
        es:
          sword: "El peculiar aroma que desprenden sus hojas es\nmuy apreciado por los habitantes de Galar y se\nusa en la elaboración de codiciados perfumes."
          shield: "Se siente muy orgulloso de su cola afilada como\nuna espada, con la que es capaz de cortar en dos\nel tronco de un árbol grueso."
        ko:
          sword: "잎사귀에서 나는 독특한 향기는\n가라르인들의 취향에 맞다.\n향수로 가공되어 인기가 높다."
          shield: "꼬리는 날카로운 칼날 같다.\n큰 나무도 두 동강 내는\n탁월한 예리함을 자랑한다."
        zh_simp:
          sword: "伽勒尔人对它叶片散发出的\n独特香气情有独钟。用这种\n香气加工出的香水非常受欢迎。"
          shield: "尾巴好似锐利的刀刃，\n锋利得无与伦比，\n连大树都能一斩为二。"
        zh_trad:
          sword: "伽勒爾人對牠的葉片散發出的\n獨特香氣情有獨鍾。用這種\n香氣加工出的香水非常受歡迎。"
          shield: "尾巴如同銳利的刀刃，\n鋒利得無與倫比，\n連大樹都能一刀兩斷。"
