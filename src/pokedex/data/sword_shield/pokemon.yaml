        zh_trad: 超極巨化
      descriptions:
        jp_kana:
          sword: "すなぶくろも　ちょうきょだいに。\nからだの　まわりに　うずまく\nすなは　１００まんトンを　こえる。"
          shield: "からだの　まわりを　こうそくで\nかいてんする　すなは　こうそうビルも\nこなごなに　なる　はかいりょく。"
        jp_kanji:
          sword: "砂袋も　超巨大に。\n体の　まわりに　渦巻く\n砂は　１００万トンを　超える。"
          shield: "体の　まわりを　高速で\n回転する　砂は　高層ビルも\n粉々に　なる　破壊力。"
        en:
          sword: "Its sand pouch has grown to tremendous\nproportions. More than 1,000,000 tons of sand\nnow swirl around its body."
          shield: "Sand swirls around its body with such speed and\npower that it could pulverize a skyscraper."
        fr:
          sword: "Sa poche a pris des proportions démesurées.\nAutour de lui gravite plus d’un million de tonnes\nde sable."
          shield: "Le sable qui gravite à grande vitesse autour\nde lui tourne si violemment qu’il peut réduire\nun gratte-ciel en poussière."
        it:
          sword: "La sua sacca di sabbia è diventata anch’essa\ngigantesca. Il vortice di sabbia che lo circonda\nha un peso di oltre un milione di tonnellate."
          shield: "La sabbia che turbina ad alta velocità attorno\nal suo corpo ha una potenza distruttiva tale\nda polverizzare anche i grattacieli."
        de:
          sword: "Sein Sandbeutel ist auf eine gigantische Größe\nherangewachsen. Der Wirbel aus Sand, der es\numgibt, wiegt mehr als eine Million Tonnen."
          shield: "Der Sand, der seinen Körper mit unfassbarer\nGeschwindigkeit umwirbelt, könnte sogar ein\nHochhaus pulverisieren."
        es:
          sword: "Su bolsa de arena también se ha agigantado.\nEl torbellino arenoso que lo rodea supera el\nmillón de toneladas."
          shield: "La arena que gira vertiginosamente en torno a su\ncuerpo posee suficiente capacidad destructiva\npara reducir a escombros un rascacielos."
        ko:
          sword: "모래주머니도 매우 거대해졌다.\n몸 주변에 소용돌이치는\n모래는 100만 톤을 넘는다."
          shield: "몸 주위를 고속으로\n회전하는 모래는 고층 빌딩도\n산산조각낼 정도의 파괴력이다."
        zh_simp:
          sword: "沙囊也变得巨大无比。\n围绕在身上的沙土\n重量超过１００万吨。"
          shield: "在它身体四周高速旋转着的\n沙子拥有极强的破坏力，\n甚至连高楼大厦都能粉碎。"
        zh_trad:
          sword: "沙囊也變得巨大無比。\n圍繞在身上的沙土\n重量超過１００萬噸。"
          shield: "在牠身體四周高速旋轉著的\n沙子擁有極強的破壞力，\n甚至連高樓大廈都能粉碎。"
cramorant:
  species_id: 845
  names:
    jp_kana: ウッウ
    jp_kanji: ウッウ
    en: Cramorant
    fr: Nigosier
    it: Cramorant
    de: Urgl
    es: Cramorant
    ko: 윽우지
    zh_simp: 古月鸟
    zh_trad: 古月鳥
  forms:
    cramorant:
      form_id: 0
      base_stats:
        hp: 70
        attack: 85
        defense: 55
        special_attack: 85
        special_defense: 95
        speed: 85
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 2
        speed: 0
      types:
        - flying
        - water
      egg_groups:
        - water_1
        - flying
      abilities:
        - gulp_missile
      descriptions:
        jp_kana:
          sword: "あいてを　いちげきで　うちまかすほど\nパワフルだが　わすれっぽいので\nたたかっている　あいてを　わすれる。"
          shield: "くいしんぼうで　エサの　サシカマスを\nまるのみするが　たまに　まちがえて\nほかの　ポケモンに　くらいつく。"
        jp_kanji:
          sword: "相手を　一撃で　打ち負かすほど\nパワフルだが　忘れっぽいので\n戦っている　相手を　忘れる。"
          shield: "食いしん坊で　エサの　サシカマスを\n丸飲みするが　たまに　間違えて\nほかの　ポケモンに　食らいつく。"
        en:
          sword: "It’s so strong that it can knock out some\nopponents in a single hit, but it also may\nforget what it’s battling midfight."
          shield: "This hungry Pokémon swallows Arrokuda whole.\nOccasionally, it makes a mistake and tries to\nswallow a Pokémon other than its preferred prey."
        fr:
          sword: "Il est assez puissant pour terrasser un ennemi\nd’un seul coup, mais il est tellement nigaud\nqu’il oublie contre qui il se bat."
          shield: "Très glouton, il avale les Embrochet d’une seule\nbouchée, mais il lui arrive de se tromper\net de tenter de gober un autre Pokémon."
        it:
          sword: "È così potente che può sconfiggere l’avversario\nin un colpo solo, ma è talmente smemorato che\nsi dimentica perfino con chi stava lottando."
          shield: "È molto ingordo e ingoia tutti interi gli Arrokuda\ndi cui si nutre. A volte ingoia anche altri\nPokémon per sbaglio."
        de:
          sword: "Es ist so stark, dass es seine Gegner mit einem\nAngriff vernichten könnte, aber zerstreut wie es\nist, vergisst es öfters, wen es gerade bekämpft."
          shield: "Es ist ein Vielfraß, der seine Beute, Pikuda,\nim Ganzen verschlingt. Manchmal erwischt es\njedoch irrtümlicherweise ein anderes Pokémon."
        es:
          sword: "Su colosal potencia le permite machacar al rival\nde un solo golpe, aunque su carácter despistado\nlo lleva a olvidarse de su presencia."
          shield: "Traga Arrokuda enteros debido a su glotonería,\ntan notable que en ocasiones ingiere hasta otros\nPokémon sin querer."
        ko:
          sword: "상대를 일격에 쓰러뜨릴 정도로\n파워풀하지만 건망증이 심해서\n싸우고 있는 상대를 잊어버린다."
          shield: "먹보이다. 먹이인 찌로꼬치를\n통째로 삼키지만 가끔 실수로\n다른 포켓몬을 먹어버린다."
        zh_simp:
          sword: "虽然拥有一击定胜负的威力，\n由于记性实在太差，\n对战还没结束就会忘记对手是谁。"
          shield: "非常贪吃，会把刺梭鱼整只\n吞进嘴里。偶尔也会搞错对象\n去咬其他的宝可梦。"
        zh_trad:
          sword: "雖然擁有一擊定勝負的威力，\n但因為記性實在太差，\n對戰還沒結束就會忘記對手是誰。"
          shield: "非常貪吃，會把刺梭魚整隻\n吞進嘴裡。偶爾也會搞錯對象\n去咬其他的寶可夢。"
    cramorant_gulping_form:
      form_id: 1
      names:
        jp_kana: うのみのすがた
        jp_kanji: うのみのすがた
        en: Gulping Form
        fr: Forme Gobe-Tout
        it: Forma Inghiottitutto
        de: Schlingform
        es: Forma Tragatodo
        ko: 그대로 삼킨 모습
        zh_simp: 一口吞的样子
        zh_trad: 一口吞的樣子
      base_stats:
        hp: 70
        attack: 85
        defense: 55
        special_attack: 85
        special_defense: 95
        speed: 85
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 2
        speed: 0
      types:
        - flying
        - water
      egg_groups:
        - water_1
        - flying
      abilities:
        - gulp_missile
      descriptions:
        jp_kana:
          sword: "おおぐらいなので　まるまる　ふとった\nサシカマスを　のみこもうとして\nのどに　つまらせてしまった。"
          shield: "のどに　つまらせた　サシカマスを\nすこしの　しょうげきで　いきおいよく\nはきだして　しまうことも　あるのだ。"
        jp_kanji:
          sword: "大食らいなので　まるまる　太った\nサシカマスを　飲み込もうとして\n喉に　詰まらせてしまった。"
          shield: "喉に　詰まらせた　サシカマスを\nすこしの　衝撃で　勢いよく\n吐き出して　しまうことも　あるのだ。"
        en:
          sword: "Cramorant’s gluttony led it to try to swallow an\nArrokuda whole, which in turn led to Cramorant\ngetting an Arrokuda stuck in its throat."
          shield: "The slightest shock is sometimes enough to get\nthis Pokémon to spit out the Arrokuda\nlodged in its throat."
        fr:
          sword: "Ce glouton a essayé d’avaler tout rond\nun Embrochet bien gras, mais ce dernier\nest resté coincé dans sa gorge."
          shield: "Au moindre choc, il est susceptible de violemment\npropulser l’Embrochet coincé dans sa gorge."
        it:
          sword: "Nella sua ingordigia, ha cercato di mangiare\nun Arrokuda enorme, ma gli è rimasto\nincastrato in gola."
          shield: "Può bastare un piccolo spavento per fargli\nsputare con forza l’Arrokuda che ha\nincastrato in gola."
        de:
          sword: "Seine Fressgier verleitete es dazu, ein besonders\ngroßes Pikuda mit einem Happs zu vertilgen,\nwelches ihm leider im Hals stecken blieb."
          shield: "Manchmal führt schon ein kleiner Schreck dazu,\ndass es das Pikuda, das in seinem Hals feststeckt,\nim hohem Bogen ausspuckt."
        es:
          sword: "Debido a su insaciable apetito, intentó engullir\nun enorme Arrokuda y se le quedó atravesado\nen el gaznate."
          shield: "A veces basta un ligero golpe para que escupa\ncon fuerza el Arrokuda que se le ha atragantado."
        ko:
          sword: "대식가이기 때문에 통통하게 살이 찐\n찌로꼬치를 삼키려 하다\n목구멍에 걸리고 말았다."
          shield: "목에 걸린 찌로꼬치를\n약한 충격으로 세차게\n토해버리는 경우도 있다."
        zh_simp:
          sword: "因为特别贪吃，所以想把\n肉滚滚的刺梭鱼整只吞下，\n结果却把它卡在了喉咙里。"
          shield: "有时会因为很小的冲击\n就把卡在喉咙里的\n刺梭鱼猛然吐出来。"
        zh_trad:
          sword: "因為很貪吃，想把整隻\n肥嘟嘟的刺梭魚吞下去，\n結果卻卡在了喉嚨裡。"
          shield: "有時會因為很小的衝擊\n就把卡在喉嚨裡的\n刺梭魚猛然吐出來。"
    cramorant_gorging_form:
      form_id: 2
      names:
        jp_kana: まるのみのすがた
        jp_kanji: まるのみのすがた
        en: Gorging Form
        fr: Forme Gobe-Chu
        it: Forma Inghiottintero
        de: Stopfform
        es: Forma Engulletodo
        ko: 통째로 삼킨 모습
        zh_simp: 大口吞的样子
        zh_trad: 大口吞的樣子
      base_stats:
        hp: 70
        attack: 85
        defense: 55
        special_attack: 85
        special_defense: 95
        speed: 85
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 2
        speed: 0
      types:
        - flying
        - water
      egg_groups:
        - water_1
        - flying
      abilities:
        - gulp_missile
      descriptions:
        jp_kana:
          sword: "うっかり　ピカチュウに　くらいついて\nしまった。　のどに　つまらせてしまい\nくるしいが　あまり　きにしていない。"
          shield: "のみこまれかけている　ピカチュウは\nびっくりして　おとなしく　しているが\nはんげきする　すきを　ねらっている。"
        jp_kanji:
          sword: "うっかり　ピカチュウに　食らいついて\nしまった。　喉に　詰まらせてしまい\n苦しいが　あまり　気にしていない。"
          shield: "飲み込まれかけている　ピカチュウは\nびっくりして　おとなしく　しているが\n反撃する　隙を　狙っている。"
        en:
          sword: "This Cramorant has accidentally gotten a Pikachu\nlodged in its gullet. Cramorant is choking a little,\nbut it isn’t really bothered."
          shield: "The half-swallowed Pikachu is so startled that\nit isn’t struggling yet, but it’s still looking for a\nchance to strike back."
        fr:
          sword: "Il s’est coincé un Pikachu dans la gorge par erreur.\nIl a du mal à respirer, mais cela ne le dérange\npas vraiment."
          shield: "Encore sous le choc d’avoir failli se faire gober\ntout rond, le Pikachu se tient tranquille, mais\nen réalité, il attend le bon moment pour riposter."
        it:
          sword: "Ha cercato per sbaglio di mangiare un Pikachu,\nche gli è rimasto incastrato in gola.\nÈ un po’ doloroso, ma non ci fa troppo caso."
          shield: "Il Pikachu che ha incastrato in gola è ancora\nsotto shock. Se ne sta immobile, ma attende\nil momento giusto per passare all’azione."
        de:
          sword: "Es verschluckte versehentlich ein Pikachu, das ihm\nin der Kehle stecken blieb und nun das Schlucken\nerschwert. Allerdings stört Urgl das nur wenig."
          shield: "Das feststeckende Pikachu wehrt sich vor Schreck\nnicht, wartet aber bereits auf den richtigen\nMoment für einen Gegenangriff."
        es:
          sword: "Intentando engullir un Pikachu por accidente,\nse le quedó atragantado, aunque no parece\nimportarle mucho."
          shield: "El Pikachu que tiene atragantado parece inmóvil\nde la conmoción, pero en realidad espera el\nmomento adecuado para contraatacar."
        ko:
          sword: "실수로 피카츄를 삼키고 말았다.\n목구멍에 걸려서 고통스럽지만\n크게 신경 쓰지는 않는다."
          shield: "목에 걸려 있는 피카츄는\n놀라서 얌전히 있지만\n반격할 틈을 노리고 있다."
        zh_simp:
          sword: "不小心吞下了皮卡丘。\n虽然卡住了喉咙不太舒服，\n但它并不是特别在意。"
          shield: "即将被吞进进肚的皮卡丘\n虽然因为受到惊吓而没有挣扎，\n但它其实正在等待反击的时机。"
        zh_trad:
          sword: "不小心吞下了皮卡丘。\n雖然卡住了喉嚨不太舒服，\n但牠並不是特別在意。"
          shield: "即將被吞進肚裡的皮卡丘\n雖然因為受到驚嚇而沒有掙扎，\n但牠其實正在等待反擊的時機。"
arrokuda:
  species_id: 846
  names:
    jp_kana: サシカマス
    jp_kanji: サシカマス
    en: Arrokuda
    fr: Embrochet
    it: Arrokuda
    de: Pikuda
    es: Arrokuda
    ko: 찌로꼬치
    zh_simp: 刺梭鱼
    zh_trad: 刺梭魚
  forms:
    arrokuda:
      form_id: 0
      base_stats:
        hp: 41
        attack: 63
        defense: 40
        special_attack: 40
        special_defense: 30
        speed: 66
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - water
      egg_groups:
        - water_2
      abilities:
        - swift_swim
      hidden_ability: propeller_tail
      descriptions:
        jp_kana:
          sword: "するどく　とがった　あごが　じまん。\nすこしでも　うごくものを　みつけると\nいっちょくせんに　とつげきする。"
          shield: "はらいっぱいで　きょくたんに\nうごきが　にぶった　ところを\nウッウに　まるのみに　される。"
        jp_kanji:
          sword: "鋭く　尖った　顎が　自慢。\n少しでも　動くものを　見つけると\n一直線に　突撃する。"
          shield: "腹一杯で　極端に\n動きが　鈍った　ところを\nウッウに　丸飲みに　される。"
        en:
          sword: "If it sees any movement around it, this Pokémon\ncharges for it straightaway, leading with its\nsharply pointed jaw. It’s very proud of that jaw."
          shield: "After it’s eaten its fill, its movements become\nextremely sluggish. That’s when Cramorant\nswallows it up."
        fr:
          sword: "Sa mâchoire fine et aiguisée fait sa fierté.\nÀ peine voit-il le moindre mouvement\nqu’il fonce dans sa direction."
          shield: "Lorsqu’il a le ventre plein, il a beaucoup\nplus de mal à se déplacer, et c’est à ce moment\nprécis qu’il se fait gober par les Nigosier."
        it:
          sword: "Va orgoglioso della sua mandibola appuntita.\nAppena nota il minimo movimento, parte subito\nall’attacco."
          shield: "Quando ha la pancia piena i suoi movimenti\nsi fanno estremamente lenti e rischia di finire\ninghiottito da un Cramorant."
        de:
          sword: "Sein spitz zulaufender Kiefer ist sein ganzer Stolz.\nErblickt es etwas, das sich auch nur ein bisschen\nbewegt, setzt es geradewegs zum Stoßangriff an."
          shield: "Seine Bewegungsfreiheit ist stark eingeschränkt,\nwenn es vollgefressen ist. So wird es zu leichter\nBeute für Urgl, das es im Ganzen verschlingt."
        es:
          sword: "Se siente muy orgulloso de su afilada mandíbula.\nEn cuanto detecta el más mínimo movimiento,\nva directo al objetivo para cargar contra él."
          shield: "Cuando tiene el estómago lleno, le cuesta\nmoverse y corre el riesgo de ser engullido por\nalgún Cramorant."
        ko:
          sword: "날카롭고 뾰족한 턱을 자랑한다.\n조금이라도 움직이는 것을 발견하면\n일직선으로 돌격한다."
          shield: "배가 불러서 현저히\n움직임이 둔해지면\n윽우지가 통째로 삼켜버린다."
        zh_simp:
          sword: "尖锐的下巴是它的骄傲。\n只要发现周围有什么小动作，\n就会一直线冲过去。"
          shield: "吃饱了之后动作会变得\n极度迟缓，于是就被\n古月鸟整只吞了下去。"
        zh_trad:
          sword: "尖銳的下巴是牠的驕傲。\n只要發現周圍有什麼小動作，\n就會一直線衝過去。"
          shield: "吃飽了之後動作會變得\n極度遲緩，於是就被\n古月鳥整隻吞了下去。"
barraskewda:
  species_id: 847
  names:
    jp_kana: カマスジョー
    jp_kanji: カマスジョー
    en: Barraskewda
    fr: Hastacuda
    it: Barraskewda
    de: Barrakiefa
    es: Barraskewda
    ko: 꼬치조
    zh_simp: 戽斗尖梭
    zh_trad: 戽斗尖梭
  forms:
    barraskewda:
      form_id: 0
      base_stats:
        hp: 61
        attack: 123
        defense: 60
        special_attack: 60
        special_defense: 50
        speed: 136
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 2
      types:
        - water
      egg_groups:
        - water_2
      abilities:
        - swift_swim
      hidden_ability: propeller_tail
      descriptions:
        jp_kana:
          sword: "やりの　ように　とがった　あごは\nはがねの　かたさ。　その　みは\nおどろくほど　おいしい　らしい。"
          shield: "おびれを　かいてんさせ　いっきに\nとつげき。　１００ノットを　こえる\nそくどで　えものを　つらぬくぞ。"
        jp_kanji:
          sword: "槍のように　尖った　顎は\n鋼の　硬さ。　その　身は\n驚くほど　美味しいらしい。"
          shield: "尾びれを　回転させ　一気に\n突撃。　１００ノットを　超える\n速度で　獲物を　つらぬくぞ。"
        en:
          sword: "This Pokémon has a jaw that’s as sharp as a spear\nand as strong as steel. Apparently Barraskewda’s\nflesh is surprisingly tasty, too."
          shield: "It spins its tail fins to propel itself, surging\nforward at speeds of over 100 knots before\nramming prey and spearing into them."
        fr:
          sword: "Sa mâchoire pointue comme une lance est aussi\ndure que l’acier, et sa chair serait, contre toute\nattente, succulente."
          shield: "Il charge d’un coup en faisant tourner sa nageoire\ncaudale. Il peut transpercer ses proies\nà une vitesse dépassant les 100 nœuds."
        it:
          sword: "La sua mandibola è appuntita come una lancia\ne dura come l’acciaio. Sembra che le sue carni\nsiano incredibilmente deliziose."
          shield: "Fa girare rapidamente la coda e carica a tutta\nforza, trafiggendo le sue prede a una velocità\ndi 100 nodi."
        de:
          sword: "Sein Kiefer ist spitz wie ein Speer und hart wie\nStahl. Außerdem soll Barrakiefa überraschend\ndeliziös sein."
          shield: "Es lässt seine Schwanzflosse rotieren und stößt\nmit einem Mal zu. Es durchsticht seine Beute mit\neiner Geschwindigkeit von über 100 Knoten."
        es:
          sword: "Su mandíbula es tan puntiaguda como una lanza\ny tan dura como el acero. Al parecer, su carne es\nsorprendentemente deliciosa."
          shield: "Hace girar su aleta caudal para impulsarse y\narremeter contra la presa, a la que ensarta a\nuna velocidad que supera los 100 nudos."
        ko:
          sword: "창처럼 뾰족한 턱은 강철과 같은\n단단함을 자랑한다. 살코기는\n깜짝 놀랄 정도로 맛있다는 듯하다."
          shield: "꼬리지느러미를 회전시켜 단번에\n돌격한다. 100노트를 넘는\n속도로 먹이를 관통한다."
        zh_simp:
          sword: "像长矛一样尖锐的下巴\n拥有钢铁般的硬度。\n据说它的肉好吃得惊人。"
          shield: "会旋转着自己的尾鳍\n一口气突击。能够以超过\n１００节的速度贯穿猎物。"
        zh_trad:
          sword: "像長矛一樣尖銳的下巴\n擁有鋼鐵般的硬度。\n據說牠的肉好吃得驚人。"
          shield: "會旋轉著自己的尾鰭\n一口氣突擊。能夠以超過\n１００節的速度貫穿獵物。"
toxel:
  species_id: 848
  names:
    jp_kana: エレズン
    jp_kanji: エレズン
    en: Toxel
    fr: Toxizap
    it: Toxel
    de: Toxel
    es: Toxel
    ko: 일레즌
    zh_simp: 电音婴
    zh_trad: 毒電嬰
  forms:
    toxel:
      form_id: 0
      base_stats:
        hp: 40
        attack: 38
        defense: 35
        special_attack: 54
        special_defense: 35
        speed: 40
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 1
        special_defense: 0
        speed: 0
      types:
        - electric
        - poison
      egg_groups:
        - undiscovered
      abilities:
        - rattled
        - static
      hidden_ability: klutz
      descriptions:
        jp_kana:
          sword: "たいないの　どくぶくろに　ためた\nどくそを　ひふから　ぶんぴつ。\nさわると　ピリピリと　しびれる。"
          shield: "どくそを　かがくへんか　させて\nでんきを　だす。　でんりょくは\nよわいが　ビリビリと　しびれる。"
        jp_kanji:
          sword: "体内の　毒袋に　溜めた\n毒素を　皮膚から　分泌。\n触ると　ピリピリと　痺れる。"
          shield: "毒素を　化学変化　させて\n電気を　出す。　電力は\n弱いが　ビリビリと　痺れる。"
        en:
          sword: "It stores poison in an internal poison sac and\nsecretes that poison through its skin. If you touch\nthis Pokémon, a tingling sensation follows."
          shield: "It manipulates the chemical makeup of its poison\nto produce electricity. The voltage is weak, but it\ncan cause a tingling paralysis."
        fr:
          sword: "Sa peau sécrète les toxines accumulées\ndans sa poche de poison interne.\nQuand on le touche, on se fait électrocuter."
          shield: "Par un procédé chimique, il change son poison\nen électricité. L’intensité du courant est faible,\nmais peut engourdir un ennemi."
        it:
          sword: "Secerne dalla pelle le tossine contenute nella\nsua sacca di veleno interna. Provoca a chi lo\ntocca una sensazione di bruciore."
          shield: "Produce elettricità grazie a una reazione chimica\ndelle sue tossine. Il voltaggio è debole, ma può\nintorpidire il nemico."
        de:
          sword: "Das Gift aus dem Giftsack in seinem Körper\nsondert es über die Haut ab. Berührt man es,\nbekommt man einen lähmenden Schock verpasst."
          shield: "Es ändert sein Toxin auf chemischer Ebene,\num Strom zu erzeugen. Dieser ist zwar schwach,\nkann aber einen lähmenden Schlag verursachen."
        es:
          sword: "Secreta toxinas por la piel y las almacena\nen una bolsa de veneno interna. Tocarlo da\ncalambre."
          shield: "Provoca una reacción química para generar\nenergía eléctrica con sus toxinas. Aunque de\nbajo voltaje, puede causar entumecimiento."
        ko:
          sword: "체내의 독주머니에 저장하고 있는\n독소를 피부를 통해 분비한다.\n건드리면 찌릿하고 마비된다."
          shield: "독소를 화학 변화시켜\n전기를 만들어 낸다. 전력은\n약하지만 찌릿찌릿 마비된다."
        zh_simp:
          sword: "会从皮肤把体内的毒囊里\n储存着的毒素分泌出来。\n一旦触碰它就会感到麻麻的。"
          shield: "通过让自身的毒素产生\n化学反应来发电。电力\n虽然弱，却能造成麻痹。"
        zh_trad:
          sword: "會從皮膚把體內的毒囊裡\n儲存著的毒素分泌出來。\n一旦觸碰牠就會感到麻麻的。"
          shield: "透過讓自身的毒素產生\n化學反應來發電。電力\n雖然弱，卻能造成麻痺。"
toxtricity:
