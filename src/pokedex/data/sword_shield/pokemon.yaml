        - bug
        - mineral
      abilities:
        - sturdy
        - shell_armor
      hidden_ability: weak_armor
      held_items:
        rare: hard_stone
      descriptions:
        jp_kana:
          sword: "かんそうした　ばしょを　このみ\nあめのひは　いわから　でない。\nなわばりいしきが　つよいぞ。"
          shield: "ふとい　ツメが　さいだいの　ぶき。\nドサイドンの　プロテクターにさえ\nひびを　いれるほど　かたいぞ。"
        jp_kanji:
          sword: "乾燥した　場所を　好み\n雨の日は　岩から　出ない。\n縄張り意識が　強いぞ。"
          shield: "太い　ツメが　最大の　武器。\nドサイドンの　プロテクターにさえ\nひびを　入れるほど　硬いぞ。"
        en:
          sword: "This highly territorial Pokémon prefers dry\nclimates. It won’t come out of its boulder on\nrainy days."
          shield: "Its thick claws are its greatest weapons.\nThey’re mighty enough to crack\nRhyperior’s carapace."
        fr:
          sword: "Il préfère les endroits secs, et rentre dans\nson rocher quand il pleut.\nIl défend farouchement son territoire."
          shield: "Ses meilleures armes sont ses pinces.\nElles sont si dures qu’elles peuvent ébrécher\nles Protecteurs de Rhinastoc."
        it:
          sword: "Predilige i luoghi aridi e nei giorni di pioggia\nnon esce dalla sua roccia. È molto territoriale."
          shield: "Le spesse chele sono la sua arma più potente.\nSono talmente dure da poter perfino aprire\nbrecce nella Copertura dei Rhyperior."
        de:
          sword: "Dieses Pokémon mag trockene Gebiete und\nverkriecht sich bei Regen unter seinem Felsen.\nEs zeigt stark ausgeprägtes Territorialverhalten."
          shield: "Seine kräftigen Scheren sind robuste Waffen.\nSie sind hart genug, um selbst in den Schützern\nvon Rihornior Risse zu hinterlassen."
        es:
          sword: "Este Pokémon posee un fuerte instinto territorial\ny prefiere los entornos áridos. Los días de lluvia\npermanece en el interior de su roca."
          shield: "Su arma más potente son sus gruesas pinzas, tan\nduras que pueden abrir una brecha incluso en el\nProtector de Rhyperior."
        ko:
          sword: "건조한 곳을 좋아하며\n비가 내리는 날에는 바위에서 나오지 않는다.\n자기 영역에 대한 의식이 강하다."
          shield: "두꺼운 발톱이 최고의 무기다.\n거대코뿌리의 프로텍터조차\n금이 갈 정도로 딱딱하다."
        zh_simp:
          sword: "喜欢干燥的地方，\n下雨时不会从岩石里出来。\n有着很强的地盘意识。"
          shield: "厚实的钳子是它最大的武器。\n硬度高到甚至能让\n超甲狂犀的护具裂开。"
        zh_trad:
          sword: "喜歡乾燥的地方，\n下雨時不會從岩石裡出來。\n有著很強的地盤意識。"
          shield: "厚實的鉗子是牠最大的武器。\n硬度高到甚至能讓\n超甲狂犀的護具裂開。"
