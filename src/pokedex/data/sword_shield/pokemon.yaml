      descriptions:
        jp_kana:
          sword: "うたを　うたうことが　だいすき。\nマシュマロのような　からだからは\nほんのり　あまい　においが　するぞ。"
          shield: "やわらかい　からだで　はずむように\nうごきまわる。　たいおんが　あがると\nからだは　こい　ピンクいろに　なる。"
        jp_kanji:
          sword: "歌を　歌うことが　大好き。\nマシュマロのような　体からは\nほんのり　甘い　匂いが　するぞ。"
          shield: "柔らかい　体で　弾むように\n動きまわる。　体温が　上がると\n体は　濃い　ピンク色になる。"
        en:
          sword: "Igglybuff loves to sing. Its marshmallow-like body\ngives off a faint sweet smell."
          shield: "Taking advantage of the softness of its body,\nIgglybuff moves as if bouncing. Its body turns a\ndeep pink when its temperature rises."
        fr:
          sword: "Il adore chanter. Son corps semblable à de\nla guimauve dégage une légère odeur sucrée."
          shield: "Il se déplace en faisant rebondir son corps\ntout mou. Lorsque sa température corporelle\naugmente, il devient rose foncé."
        it:
          sword: "Adora cantare. Il suo corpo simile al\nmarshmallow emana una lieve e dolce fragranza."
          shield: "Si sposta facendo rimbalzare il suo corpo\nmorbido. Quando la sua temperatura corporea\nsi alza, si colora di un rosa intenso."
        de:
          sword: "Dieses Pokémon singt liebend gern. Von seinem\nKörper, der an ein Marshmallow erinnert, geht\nein leicht süßlicher Duft aus."
          shield: "Dank seines weichen Körpers bewegt es sich stets\nhüpfend fort. Wenn Fluffeluffs Temperatur steigt,\nändert sich seine Farbe zu einem intensiven Pink."
        es:
          sword: "Le apasiona cantar. Su cuerpo suave y esponjoso\ndesprende un aroma ligeramente dulce."
          shield: "Se desplaza dando botes con su cuerpo mullido.\nCuando aumenta su temperatura corporal, se va\nponiendo de un color rosa cada vez más intenso."
        ko:
          sword: "노래 부르기를 굉장히 좋아한다.\n마시멜로 같은 몸에서는\n은은하게 달콤한 냄새가 난다."
          shield: "부드러운 몸으로 통통 튀며\n움직인다. 체온이 오르면\n몸은 짙은 핑크색이 된다."
        zh_simp:
          sword: "最喜欢唱歌。\n像棉花糖一样的身体\n会散发出微甜的香气。"
          shield: "用柔软的身体弹跳著移动。\n当它的体温上升时，\n身体会变成深粉红色。"
        zh_trad:
          sword: "很喜歡唱歌。\n像是棉花糖的身體會\n散發出微甜的氣味喔。"
          shield: "會用柔軟的身體一彈一跳地\n四處移動。體溫上升時，\n身體就會變成深粉紅色。"
