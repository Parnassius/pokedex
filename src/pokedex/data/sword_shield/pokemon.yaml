          shield: "りょううでの　はなびらは　うすく\nきれあじは　するどい。　ひかりを\nあつめて　ビームも　はなてるぞ。"
        jp_kanji:
          sword: "美しい　花の　ポケモン。\nうまく　育った　ラランテスは\n素晴らしい　あざやかさを　もつ。"
          shield: "両腕の　花びらは　薄く\n切れ味は　鋭い。　光を　集めて\nビームも　放てるぞ。"
        en:
          sword: "This Pokémon resembles a beautiful flower.\nA properly raised Lurantis will have gorgeous,\nbrilliant colors."
          shield: "The petals on this Pokémon’s arms are thin and\nsuper sharp, and they can fire laser beams if\nLurantis gathers light first."
        fr:
          sword: "Un magnifique Pokémon qui ressemble\nà une fleur. Les Floramantis bien entraînés\narborent une couleur très vive."
          shield: "Les pétales sur ses deux bras sont fins, mais\ntrès tranchants. Ils peuvent également absorber\nla lumière pour la renvoyer sous forme de laser."
        it:
          sword: "Questo Pokémon assomiglia a un bel fiore.\nGli esemplari migliori possiedono dei colori\nincredibilmente sgargianti."
          shield: "I petali delle sue braccia sono sottili e affilati.\nLi usa per assorbire la luce ed emettere raggi\nenergetici."
        de:
          sword: "Dieses Pokémon gleicht einer schönen Blume.\nTrainiert man es richtig, erstrahlt Mantidea\nzudem in überaus prächtigen Farben."
          shield: "Die Blütenblätter an seinen Armen sind dünn und\nscharfkantig. Mantidea absorbiert mit ihnen Licht,\ndas es in Form von Strahlen abschießen kann."
        es:
          sword: "Un magnífico Pokémon con aspecto de flor.\nLos Lurantis bien cuidados poseen un color\nvivo y resplandeciente."
          shield: "Los pétalos de sus brazos son finos y afilados.\nAbsorbe la luz solar y la concentra para lanzar\npoderosos rayos."
        ko:
          sword: "아름다운 꽃 포켓몬이다.\n잘 자란 라란티스는\n훌륭하고 선명한 빛을 띤다."
          shield: "양팔의 꽃잎은\n얇고 예리하다. 빛을\n모아 빔을 쏘기도 한다."
        zh_simp:
          sword: "美丽的花之宝可梦。\n茁壮成长的兰螳花\n会变得极为鲜艳。"
          shield: "双臂的花瓣既薄\n又锋利。还能够\n积蓄阳光发射光束。"
        zh_trad:
          sword: "美麗的花之寶可夢。\n長得很好的蘭螳花\n會鮮豔得令人瞠目。"
          shield: "雙臂上的花瓣既輕薄\n又鋒利。而且還能夠\n收集光線來射出光束。"
morelull:
  species_id: 755
  names:
    jp_kana: ネマシュ
    jp_kanji: ネマシュ
    en: Morelull
    fr: Spododo
    it: Morelull
    de: Bubungus
    es: Morelull
    ko: 자마슈
    zh_simp: 睡睡菇
    zh_trad: 睡睡菇
  forms:
    morelull:
      form_id: 0
      base_stats:
        hp: 40
