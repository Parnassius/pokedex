      descriptions:
        jp_kana:
          sword: "からだを　かいてん　させると\nたいようの　ような　ひかりを　はなち\nてきの　めを　くらませる。"
          shield: "たいようエネルギーが　パワーの\nみなもと　なので　ひるまは　つよい。\nかいてんすると　からだが　ひかる。"
        jp_kanji:
          sword: "体を　回転　させると\n太陽の　ような　光を　放ち\n敵の　目を　眩ませる。"
          shield: "太陽エネルギーが　パワーの\n源　なので　昼間は　強い。\n回転すると　体が　光る。"
        en:
          sword: "When it rotates itself, it gives off light similar to\nthe sun, thus blinding its foes."
          shield: "Solar energy is the source of its power, so it is\nstrong during the daytime. When it spins, its\nbody shines."
        fr:
          sword: "Il produit une lumière aussi aveuglante\nque le soleil quand il se met à tournoyer."
          shield: "Tirant sa force de l’énergie solaire, il est\nparticulièrement puissant pendant la journée.\nIl s’illumine quand il tourne."
        it:
          sword: "Ruota vorticosamente su se stesso per emanare\nuna luce abbagliante che acceca il nemico."
          shield: "L’energia solare è la fonte della sua potenza,\nper cui è più forte di giorno. Emana luce quando\nruota su se stesso."
        de:
          sword: "Es rotiert um die eigene Achse und strahlt dabei\nsonnengleiches Licht aus, mit dem es den Gegner\nblendet."
          shield: "Da es seine Energie aus Sonnenlicht gewinnt,\nist es tagsüber am stärksten. Wenn es sich dreht,\nleuchtet es."
        es:
          sword: "Al girar emite una luz como la del sol, con la que\nconsigue deslumbrar a sus enemigos."
          shield: "Usa el sol como fuente de energía, por lo que es\nmás poderoso de día. Brilla al rotar."
        ko:
          sword: "몸을 회전시키면\n태양과 같은 빛을 발산해\n적의 눈을 멀게 한다."
          shield: "태양 에너지가 파워의\n근원이라서 낮에는 강하다.\n회전하면 몸이 빛난다."
        zh_simp:
          sword: "当它旋转自己的身体时，\n会发出太阳般的光芒，\n让敌人的眼睛暂时失明。"
          shield: "太阳能量是其力量之源，\n所以白天会很强。\n旋转时身体会发光。"
        zh_trad:
          sword: "當牠旋轉自己的身體時，\n會發出太陽般的光芒，\n讓敵人的眼睛暫時失明。"
          shield: "太陽能量是力量的來源，\n所以在白天裡很強。\n旋轉時身體會發光。"
barboach:
  species_id: 339
  names:
