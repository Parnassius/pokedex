          shield: "３つの　ギアを　こうそくかいてん。\nあらたに　ふえた　トゲの　ついた\nギアは　いきものでは　ないのだ。"
        jp_kanji:
          sword: "棘の　先から　強い　電撃を\n発射。　赤いコアに　たくさんの\nエネルギーを　蓄えている。"
          shield: "３つの　ギアを　高速回転。\n新たに　増えた　棘の　ついた\nギアは　生き物では　ないのだ。"
        en:
          sword: "From its spikes, it launches powerful blasts of\nelectricity. Its red core contains an enormous\namount of energy."
          shield: "The three gears that compose this Pokémon\nspin at high speed. Its new spiked gear isn’t\na living creature."
        fr:
          sword: "Il peut envoyer de terribles décharges électriques\nde la pointe de ses pics. Il accumule de grandes\nquantités d’énergie dans son noyau rouge."
          shield: "Bien que son nouveau rouage à pointes\nne soit pas doué de vie, il parvient à le faire\ntourner à grande vitesse avec les deux autres."
        it:
          sword: "Emette una forte scarica elettrica dall’estremità\ndei suoi spuntoni. Il nucleo rosso contiene\nun’enorme quantità di energia."
          shield: "I suoi tre ingranaggi girano ad altissima velocità.\nQuello con gli spuntoni, apparso dopo\nl’evoluzione, è inanimato."
        de:
          sword: "Die Stachelspitzen können starke Elektrizität\nabfeuern. Im roten Zentralbestandteil sind\nUnmengen von Energie gespeichert."
          shield: "Dieses Pokémon besteht aus drei schnell\nrotierenden Zahnrädern. Das neue dritte Rad\nmit den Stacheln ist unbelebt."
        es:
          sword: "Emite fuertes descargas eléctricas por la punta\nde las púas. Acumula una gran cantidad de\nenergía en su núcleo rojo."
          shield: "Las tres ruedas dentadas giran a gran velocidad.\nEl aro metálico dotado de púas no es materia\nviva."
        ko:
          sword: "가시 끝에서 강한 전격을\n발사한다. 빨간 코어에 많은\n에너지를 비축하고 있다."
          shield: "3개의 기어가 고속 회전한다.\n가시가 달려 있는 새로 생긴\n기어는 생물이 아니다."
        zh_simp:
          sword: "会从尖刺的前端发出强力\n电击。红色核心里填充着\n非常多的能量。"
          shield: "让３个齿轮高速旋转。\n新增出来的那个带着\n尖刺的齿轮并不是生物。"
        zh_trad:
          sword: "會從尖刺的前端發出強力\n電擊。紅色核心裡填充著\n非常多的能量。"
          shield: "讓３個齒輪高速旋轉。\n新增出來的那個帶著\n尖刺的齒輪並不是生物。"
