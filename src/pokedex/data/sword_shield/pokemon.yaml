      descriptions:
        jp_kana:
          sword: "かんきょうで　すがたが　かわる。\nすいおんが　あたたかい　うみでは\nこのすがたに　なるという　せつも。"
          shield: "つよく　ふれると　むらさきいろの\nナゾの　しるを　だす。　がいは\nないけれど　ネバネバするよ。"
        jp_kanji:
          sword: "環境で　姿が　変わる。\n水温が　温かい　海では\nこの姿に　なるという　説も。"
          shield: "強く　触れると　紫色の\n謎の　汁を　出す。　害は\nないけれど　ネバネバするよ。"
        en:
          sword: "This Pokémon’s habitat shapes its physique.\nAccording to some theories, life in warm ocean\nwaters causes this variation to develop."
          shield: "Subjecting this Pokémon to a strong force\ncauses it to secrete a strange purple fluid.\nThough harmless, the fluid is awfully sticky."
        fr:
          sword: "Son apparence change selon son environnement.\nOn raconte qu’il adopte celle-ci dans les mers\nchaudes."
          shield: "Si on le caresse trop fort, il sécrète un étrange\nliquide mauve qui est inoffensif, mais dont\nla texture est très gluante."
        it:
          sword: "Il suo aspetto cambia in base all’habitat.\nSecondo alcune teorie, assume questa forma\nnei mari più caldi."
          shield: "Se premuto con forza secerne un misterioso\nliquido viola molto appiccicoso, ma non nocivo."
        de:
          sword: "Sein Aussehen hängt von seiner Umgebung ab.\nMan geht davon aus, dass es diese Form in\nwarmen Meeren annimmt."
          shield: "Wenn man es fest drückt, sondert es eine\nseltsame lilafarbene Flüssigkeit ab. Diese ist\nzwar nicht schädlich, aber sehr schleimig."
        es:
          sword: "Su aspecto cambia según el entorno. Al parecer,\nesta es la forma que adopta en mares de aguas\ncálidas."
          shield: "Si se le aprieta muy fuerte, secreta un misterioso\nfluido morado que, aunque inofensivo, resulta\ndesagradable por su viscosidad."
        ko:
          sword: "환경에 따라 모습이 바뀐다.\n수온이 따뜻한 바다에서는\n이 모습이 된다는 설도 있다."
          shield: "세게 만지면 보라색의\n정체 모를 액체를 내보낸다.\n해롭지는 않지만 끈적거린다."
        zh_simp:
          sword: "样子会因环境不同而改变。\n也有人说它到了温暖的\n海里就会变成这个样子。"
          shield: "如果用力按住它，\n它就会分泌出神秘的紫色液体。\n虽然液体无害，不过黏糊糊的。"
        zh_trad:
          sword: "樣子會因環境不同而改變。\n也有人說牠到了溫暖的\n海裡就會變成這個樣子。"
          shield: "如果用力按住牠，\n牠就會分泌出神秘的紫色液體。\n雖然液體無害，不過黏糊糊的。"
    shellos_east_sea:
      form_id: 1
      names:
        jp_kana: ひがしのうみ
        jp_kanji: ひがしのうみ
        en: East Sea
        fr: Mer Orient
