      types:
        - normal
      egg_groups:
        - field
      abilities:
        - vital_spirit
        - pickup
      hidden_ability: run_away
      descriptions:
        jp_kana:
          sword: "ゆうかん　かつ　しんちょう。\nかおを　おおう　やわらかい　けで\nまわりの　じょうほうを　キャッチ。"
          shield: "なみの　こども　よりも　ずっと\nりこう。　うけた　あいじょうも\nされた　しうちも　わすれないのだ。"
        jp_kanji:
          sword: "勇敢　かつ　慎重。\n顔を　覆う　柔らかい　毛で\nまわりの　情報を　キャッチ。"
          shield: "並みの　子ども　よりも　ずっと\n利口。　受けた　愛情も\nされた　仕打ちも　忘れないのだ。"
        en:
          sword: "This Pokémon is courageous but also cautious.\nIt uses the soft fur covering its face to collect\ninformation about its surroundings."
          shield: "This Pokémon is far brighter than the average\nchild, and Lillipup won’t forget the love it\nreceives or any abuse it suffers."
        fr:
          sword: "Ce Pokémon est courageux, mais prudent.\nLes poils doux qui recouvrent son visage\nlui permettent de sonder les alentours."
          shield: "Ce Pokémon est plus intelligent que la plupart\ndes enfants. Il n’oublie ni l’affection qu’il a reçue\nni les mauvais traitements qu’il a pu subir."
        it:
          sword: "Coraggioso e al contempo prudente. Capta\ninformazioni sull’ambiente circostante grazie\nai morbidi peli che gli ricoprono il muso."
          shield: "È molto più intelligente di un bambino. Non\nscorda né l’affetto ricevuto né i maltrattamenti\nsubiti."
        de:
          sword: "Es ist zwar tapfer, aber auch vorsichtig. Mit dem\nweichen Fell, das sein Gesicht bedeckt, nimmt\nYorkleff Informationen über seine Umgebung auf."
          shield: "Yorkleff ist deutlich intelligenter als die meisten\nKinder und vergisst nie, wenn man ihm Zuneigung\nentgegenbringt oder es schlecht behandelt."
        es:
          sword: "Es valiente pero cauto. Usa el suave pelaje que le\nrecubre el rostro para obtener información sobre\nsu entorno."
          shield: "Muestra una inteligencia muy superior a la media\nde los niños humanos. No olvida ni el amor ni los\nmalos tratos que recibe."
        ko:
          sword: "용감하고 신중하다.\n얼굴을 덮고 있는 부드러운 털로\n주변의 정보를 캐치한다."
          shield: "또래의 아이보다 훨씬\n영리하다. 사랑받은 것도\n혼난 것도 잊지 않는다."
        zh_simp:
          sword: "勇敢而慎重。\n用覆盖着脸部的软毛\n来获取周围的信息。"
          shield: "比普通的小孩子还要\n聪明许多。对于得到的关爱\n和受到的伤害都不会忘怀。"
        zh_trad:
          sword: "個性勇敢且慎重。\n會用覆蓋著臉部的軟毛\n獲取周遭的資訊。"
          shield: "比一般的小孩子都還要聰明。\n對於自己得到的關愛，\n或是受到的傷害牠都不會忘記。"
herdier:
