        jp_kana:
          sword: "かぜも　ないのに　ゆれている　きを\nみかけたら　それが　ウソッキー。\nあめのひは　すがたを　かくすという。"
          shield: "おそわれないように　きのまねをする。\nみずがにがてで　あめが　ふりだすと\nいつのまにか　すがたを　けす。"
        jp_kanji:
          sword: "風も　ないのに　揺れている　木を\n見かけたら　それが　ウソッキー。\n雨の日は　姿を　隠すという。"
          shield: "襲われないように　木のまねをする。\n水が　苦手で　雨が　降り出すと\nいつの間にか　姿を　消す。"
        en:
          sword: "If a tree branch shakes when there is no wind, it’s\na Sudowoodo, not a tree. It hides from the rain."
          shield: "It disguises itself as a tree to avoid attack. It hates\nwater, so it will disappear if it starts raining."
        fr:
          sword: "Si une branche remue alors qu’il n’y a pas de vent,\nc’est qu’il s’agit d’un Simularbre.\nOn n’en croise jamais les jours de pluie."
          shield: "Il se déguise en arbre pour éviter de se faire\nattaquer. Il déteste l’eau et se cache par temps\nde pluie."
        it:
          sword: "Se si nota un albero ondeggiare anche se non c’è\nvento, probabilmente è un Sudowoodo. Si dice\nche nelle giornate piovose se ne stia nascosto."
          shield: "Fa finta di essere un albero per evitare di essere\nattaccato. Poiché odia l’acqua, scompare appena\ninizia a piovere."
        de:
          sword: "Bewegt ein Baum bei Windstille einen Ast,\nist das kein Baum, sondern ein Mogelbaum.\nAn Regentagen hält es sich versteckt."
          shield: "Es tarnt sich als Baum, um nicht angegriffen zu\nwerden. Nur bei Regen sucht es das Weite, da es\nWasser nicht leiden kann."
        es:
          sword: "Quien vea agitarse un árbol sin que sople el\nviento habrá encontrado un Sudowoodo.\nEn los días lluviosos, sin embargo, se esconde."
          shield: "Finge ser un árbol para evitar que lo ataquen.\nOdia tanto el agua que desaparecerá si empieza\na llover."
        ko:
          sword: "바람도 불지 않는데 흔들리는 나무를\n발견했다면 그게 바로 꼬지모다.\n비가 오는 날에는 모습을 감춘다고 한다."
          shield: "습격당하지 않도록 나무 흉내를 낸다.\n물에 약하기 때문에 비가 내리면\n어느 틈에 모습을 감춰버린다."
        zh_simp:
          sword: "如果在没风的日子看见\n树在摇摆，那就是树才怪。\n据说在下雨时会躲起来。"
          shield: "为了不被袭击会模仿树的样子。\n很讨厌水，所以下雨后，\n不知什么时候就会消失。"
        zh_trad:
          sword: "如果在沒風的日子看見\n樹在搖擺，那就是樹才怪。\n據說在下雨時會躲起來。"
          shield: "為了不被襲擊而模仿樹的樣子。\n很討厭水，所以一開始下雨\n就會在不知不覺間消失無蹤。"
