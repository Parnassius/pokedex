      descriptions:
        jp_kana:
          sword: "いじげん　くうかんに　ではいりできる\nプログラムを　ついかしたところ\nきょどうが　ふあんていになった。"
          shield: "ついか　プログラムで　しんかしたと\nいわれるが　ほんとうに　しんかなのか\nがっかいでも　いけんが　わかれる。"
        jp_kanji:
          sword: "異次元　空間に　出入りできる\nプログラムを　追加したところ\n挙動が　不安定になった。"
          shield: "追加　プログラムで　進化したと\n言われるが　ほんとうに　進化なのか\n学会でも　意見が　分かれる。"
        en:
          sword: "Porygon-Z had a program installed to allow it to\nmove between dimensions, but the program also\ncaused instability in Porygon-Z’s behavior."
          shield: "Some say an additional program made this\nPokémon evolve, but even academics can’t agree\non whether Porygon-Z is really an evolution."
        fr:
          sword: "Depuis qu’on lui a ajouté un programme\npermettant de voyager entre les dimensions,\nson comportement est devenu instable."
          shield: "On dit qu’un nouveau programme l’a fait évoluer,\nmais les avis des scientifiques divergent quant à\nsavoir s’il s’agit réellement d’une évolution."
        it:
          sword: "Da quando gli è stato installato un programma\nche gli permette di viaggiare in altre dimensioni,\nmostra un comportamento instabile."
          shield: "Pare che si sia evoluto in seguito all’installazione\ndi un programma, ma la comunità scientifica non\nè concorde nel definire ciò un’evoluzione."
        de:
          sword: "Seit eine neue Software installiert wurde, die es\nzu interdimensionalen Reisen befähigen sollte,\nwurde sein Verhalten instabil."
          shield: "Es heißt, es habe sich durch eine neue Software\nentwickelt, doch Wissenschaftler sind sich nicht\neinig, ob Porygon-Z wirklich eine Entwicklung ist."
        es:
          sword: "Se le instaló un software que le permite entrar\ny salir de otras dimensiones, pero que provocó\nque su comportamiento se volviese inestable."
          shield: "Se dice que evolucionó con la instalación de un\nnuevo software, pero la comunidad científica\nestá dividida respecto a si es o no una evolución."
        ko:
          sword: "다른 공간에 드나들 수 있는\n프로그램을 추가한 결과\n움직임이 불안정해졌다."
          shield: "추가 프로그램으로 진화했다고\n전해지지만 정말 진화인 건지\n학회에서도 의견이 나뉜다."
        zh_simp:
          sword: "在追加了能够进出\n异次元空间的程序之后，\n运行状况就不稳定了。"
          shield: "有人说它是通过追加程序进化的，\n但关于它的改变是否真是进化，\n在学会中也存在着意见分歧。"
        zh_trad:
          sword: "在追加了能夠自由進出\n異次元空間的程式後，\n動作就變得不穩定了。"
          shield: "據說是在追加程式後進化了，\n但牠的改變是否真的是進化，\n在學術界也是意見分歧。"
