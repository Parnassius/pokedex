    jp_kanji: ヒトデマン
    en: Staryu
    fr: Stari
    it: Staryu
    de: Sterndu
    es: Staryu
    ko: 별가사리
    zh_simp: 海星星
    zh_trad: 海星星
  forms:
    staryu:
      form_id: 0
      base_stats:
        hp: 30
        attack: 45
        defense: 55
        special_attack: 70
        special_defense: 55
        speed: 85
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
