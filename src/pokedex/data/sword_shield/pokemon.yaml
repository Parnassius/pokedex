          shield: "ガラルの　ジグザグマが　ほかの\nちいきに　てきおうした　すがた。\nさがしものを　みつけるのが　とくい。"
        jp_kanji:
          sword: "硬い　体毛を　木に　こすりつけ\n縄張りの　印を　付ける。\nガラルの　ジグザグマより　温厚。"
          shield: "ガラルの　ジグザグマが　ほかの\n地域に　適応した　姿。\n探し物を　見つけるのが　得意。"
        en:
          sword: "It marks its territory by rubbing its bristly fur on\ntrees. This variety of Zigzagoon is friendlier and\ncalmer than the kind native to Galar."
          shield: "Zigzagoon that adapted to regions outside\nGalar acquired this appearance. If you’ve lost\nsomething, this Pokémon can likely find it."
        fr:
          sword: "Il frotte son pelage dur sur les arbres pour\nmarquer son territoire. Il est plus docile\nque son cousin de Galar."
          shield: "Le Zigzaton de Galar a adopté cette forme\ndans les autres régions.\nIl est très doué pour dénicher des choses."
        it:
          sword: "Strofina la sua pelliccia ispida contro i tronchi\ndegli alberi per delimitare il suo territorio. Ha un\ncarattere più pacifico dello Zigzagoon di Galar."
          shield: "Lo Zigzagoon di Galar ha assunto questo aspetto\nnegli altri territori in cui si è diffuso. Ritrovare\ngli oggetti smarriti è la sua specialità."
        de:
          sword: "Sie markieren ihr Revier, indem sie ihr hartes Fell\nan Bäumen reiben. Sie sind weniger aggressiv als\ndie Zigzachs der Galar-Region."
          shield: "Diese Form nahmen die Zigzachs Galars an, um\nsich an andere Regionen anzupassen. Sie haben\nein Talent dafür, Dinge aufzuspüren."
        es:
          sword: "Frota su pelo hirsuto contra los árboles con el fin\nde marcar su territorio. Tiene un carácter más\nafable que el Zigzagoon de Galar."
          shield: "El Zigzagoon de Galar desarrolló este aspecto\ntras adaptarse a otras regiones. Muestra una gran\nhabilidad a la hora de encontrar cosas."
        ko:
          sword: "뻣뻣한 털을 나무에 문질러서\n영역을 표시한다.\n가라르의 지그제구리보다 온순하다."
          shield: "가라르의 지그제구리가\n다른 지역에 적응한 모습이다.\n물건을 찾는 게 특기다."
        zh_simp:
          sword: "会用背上的硬毛摩擦树木，\n留下代表自己地盘的标记。\n性情比伽勒尔的蛇纹熊温驯。"
          shield: "伽勒尔的蛇纹熊适应了\n其他地区环境后的样子。\n十分擅长找东西。"
        zh_trad:
          sword: "會用背上的硬毛摩擦樹木，\n留下代表自己地盤的標記。\n性情比伽勒爾的蛇紋熊溫馴。"
          shield: "伽勒爾的蛇紋熊適應了\n其他地區環境後的樣子。\n十分擅長找東西。"
    zigzagoon_galarian_form:
      form_id: 1
      names:
        jp_kana: ガラルのすがた
