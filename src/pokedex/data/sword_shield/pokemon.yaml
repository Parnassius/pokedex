        jp_kana:
          sword: "あらそいごとや　もめごとが　おこる\nばしょには　すがたを　みせない。\nちかごろは　ほとんど　みかけない。"
          shield: "めぐみを　あたえる　そんざいと\nいわれており　おおむかしから\nえんぎものに　えがかれてきた。"
        jp_kanji:
          sword: "争い事や　もめ事が　起こる\n場所には　姿を　見せない。\n近ごろは　ほとんど　見かけない。"
          shield: "恵みを　与える　存在と\n言われており　大昔から\n縁起物に　描かれてきた。"
        en:
          sword: "These Pokémon are never seen anywhere near\nconflict or turmoil. In recent times, they’ve hardly\nbeen seen at all."
          shield: "Known as a bringer of blessings, it’s\nbeen depicted on good-luck charms\nsince ancient times."
        fr:
          sword: "Il ne se montre jamais en temps de guerre\nou de conflit. Ces derniers temps, il est rare\nde le croiser."
          shield: "On dit que ce Pokémon dispense ses bienfaits,\nce qui explique pourquoi il est représenté\nsur les porte-bonheurs depuis fort longtemps."
        it:
          sword: "Non appare dove è in corso un conflitto o un\nlitigio. Di recente non si vede quasi mai."
          shield: "Si dice che doni prosperità, e per questo viene\nrappresentato nei portafortuna fin dall’antichità."
        de:
          sword: "Es zeigt sich nie an Orten, wo Streit und\nZwietracht herrschen. In letzter Zeit wird es\nkaum noch gesehen."
          shield: "Man sagt, es verteile Wohltaten. Aus diesem\nGrund wird sein Abbild seit Urzeiten für\nGlücksbringer verwendet."
        es:
          sword: "Este Pokémon jamás se muestra en lugares donde\nreine la discordia y la disensión. Últimamente\napenas se avistan ejemplares."
          shield: "Se dice que es portador de buena suerte.\nPor ello, su imagen aparece representada en\ntalismanes y amuletos desde la antigüedad."
        ko:
          sword: "분쟁이나 다툼이 일어나는\n장소에는 모습을 드러내지 않는다.\n최근에는 거의 보이지 않는다."
          shield: "은총을 베푸는 존재로\n전해지고 있으며 먼 옛날부터\n길조로 묘사되어 왔다."
        zh_simp:
          sword: "不会出现在发生\n争端和纷乱的地方。\n近来几乎见不到它的身影。"
          shield: "被称为会带来恩惠的宝可梦，\n从很久很久以前开始，\n人们就视它为吉祥之物。"
        zh_trad:
          sword: "不會出現在發生\n爭端和紛亂的地方。\n近來幾乎見不到牠的身影。"
          shield: "被稱為帶來恩惠的寶可夢，\n從很久很久以前開始，\n人們就視牠為吉祥之物。"
