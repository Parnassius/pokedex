          shield: "たたかう　じゅんびが　ととのうと\nはなの　あたまと　あしの　うらの\nにくきゅうが　こうねつを　はっする。"
        jp_kanji:
          sword: "走りまわって　体温を　上げると\n炎エネルギーが　体を　巡り\n本来の　力を　発揮できる。"
          shield: "戦う　準備が　整うと\n鼻の　頭と　足の　裏の\n肉球が　高熱を　発する。"
        en:
          sword: "A warm-up of running around gets fire energy\ncoursing through this Pokémon’s body. Once that\nhappens, it’s ready to fight at full power."
          shield: "It has special pads on the backs of its feet, and\none on its nose. Once it’s raring to fight, these\npads radiate tremendous heat."
        fr:
          sword: "Il court pour augmenter sa température et faire\ncirculer l’énergie incandescente dans son corps.\nIl peut ainsi déployer toute sa puissance."
          shield: "Quand il est prêt à se battre, la partie\nqui surmonte son museau ainsi que les coussinets\nde ses pattes postérieures émettent de la chaleur."
        it:
          sword: "Quando corre, la sua temperatura corporea sale\npervadendolo di un’energia infuocata che gli\npermette di scatenare la sua vera potenza."
          shield: "Quando si prepara a lottare, la punta del naso\ne i cuscinetti sotto le zampe irradiano calore."
        de:
          sword: "Erhöht es durch Rennen seine Körpertemperatur,\nströmt Feuer-Energie durch seinen Körper. Dann\nkann es seine wahre Kraft entfesseln."
          shield: "Ist es kampfbereit, verströmt es von seiner\nNasenspitze und von den Ballen an seinen\nLäufen Hitze."
        es:
          sword: "Se pone a correr para elevar su temperatura\ncorporal y propagar la energía ígnea por todo\nel cuerpo. Desata así su verdadera fuerza."
          shield: "Cuando se prepara para combatir, irradia calor\npor la punta de la nariz y el pelo que le recubre\nlas patas."
        ko:
          sword: "뛰어다니며 체온을 높이면\n불꽃 에너지가 몸 안에 맴돌아\n본래의 힘을 발휘할 수 있다."
          shield: "싸울 준비가 되면\n코끝과 발바닥의\n볼록살에서 고열을 낸다."
        zh_simp:
          sword: "不断奔跑使体温升高后，\n火之能量会在它身体循环，\n促使它发挥出真正的力量。"
          shield: "一旦做好了战斗的准备，\n它鼻头上和脚底的肉球\n就会发出极度的高温。"
        zh_trad:
          sword: "不斷奔跑使體溫升高後，\n火之能量會在牠體內循環，\n促使牠發揮出真正的力量。"
          shield: "一旦做好了戰鬥的準備，\n牠鼻頭上和腳底的肉球\n就會散發出極度的高溫。"
raboot:
