          shield: "ちかの　マントルの　なかで　うまれて\nおよそ　１まんねんまえに　ちじょうに\nでてきたと　うわさされている。"
        jp_kanji:
          sword: "伸び縮みする　柔らかさも　あるが\nどんな　金属よりも　頑丈な\n不思議な　物質で　できている。"
          shield: "地下の　マントルの　中で　生まれて\nおよそ　１万年前に　地上に\n出てきたと　噂されている。"
        en:
          sword: "Registeel’s body is made of a strange material\nthat is flexible enough to stretch and shrink but\nalso more durable than any metal."
          shield: "It’s rumored that this Pokémon was born deep\nunderground in the planet’s mantle and that it\nemerged onto the surface 10,000 years ago."
        fr:
          sword: "Il est fait d’une matière mystérieuse plus solide\nque n’importe quel métal, mais assez souple\npour pouvoir s’étirer ou se rétrécir."
          shield: "Il paraît qu’il est né dans le manteau terrestre\net qu’il en a émergé il y a environ 10 000 ans."
        it:
          sword: "È composto da un materiale misterioso più\nresistente di qualsiasi metallo, ma al contempo\nabbastanza morbido da essere elastico."
          shield: "Si dice che sia nato nel mantello terrestre e\nche sia salito in superficie circa 10.000 anni fa."
        de:
          sword: "Es besteht aus einer seltsamen Substanz, die\nrobuster als jedes Metall, jedoch zugleich auch\nweich und elastisch ist."
          shield: "Gerüchten zufolge wurde dieses Pokémon tief\nim Mantel des Planeten geboren und kam vor\netwa 10 000 Jahren an die Oberfläche."
        es:
          sword: "Está hecho de una misteriosa sustancia que, pese\na ser más dura que cualquier metal, se contrae y\ndilata con facilidad."
          shield: "Dicen que se formó en el manto terrestre y\nascendió a la superficie hace aproximadamente\ndiez mil años."
        ko:
          sword: "늘었다 줄었다 하는 유연함도 갖췄지만\n어떤 금속보다도 튼튼한\n신비한 물질로 이루어져 있다."
          shield: "땅속 맨틀에서 태어나\n약 1만 년 전에 지상으로\n올라왔다는 이야기가 있다."
        zh_simp:
          sword: "虽然也拥有能伸能缩的柔软性，\n但它其实是由比任何金属\n都要结实的神秘物质构成的。"
          shield: "据说诞生于地幔之中，\n在距今约１万年前\n现身于地面之上。"
        zh_trad:
          sword: "構成牠身體的神奇物質\n具有能夠伸縮的柔軟性，\n但卻比任何金屬都還要堅韌。"
          shield: "據說牠誕生於地底的\n地幔中，並且在大約\n１萬年前出現在地表。"
