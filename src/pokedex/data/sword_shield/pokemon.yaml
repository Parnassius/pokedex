          shield: "とにかく　どでかいので　にんき。\nホエルオーウォッチングは　かくちで\nにんきの　かんこうプラン　なのだ。"
        jp_kanji:
          sword: "大きな　体を　波の上で\nジャンプさせ　衝撃を　生みだし\n相手を　気絶　させることがある。"
          shield: "とにかく　どでかいので　人気。\nホエルオーウォッチングは　各地で\n人気の　観光プラン　なのだ。"
        en:
          sword: "It can sometimes knock out opponents\nwith the shock created by breaching and\ncrashing its big body onto the water."
          shield: "Its immense size is the reason for its popularity.\nWailord watching is a favorite sightseeing\nactivity in various parts of the world."
        fr:
          sword: "L’énorme fracas causé par ses sauts par-dessus\nles vagues peut faire perdre connaissance\nà ses adversaires."
          shield: "Sa taille fait de lui un Pokémon fascinant.\nLes sites touristiques proposant d’observer\nles Wailord ont toujours beaucoup de succès."
        it:
          sword: "Con l’impatto creato dal suo enorme corpo\nquando salta sulle onde è perfino in grado di far\nperdere i sensi all’avversario."
          shield: "È molto amato per la sua enorme stazza.\nIl Wailord watching è un’attività turistica\npopolare in tutto il mondo."
        de:
          sword: "Springt es mit seinem gewaltigen Körper von\neiner Welle ab, kann es Gegner allein mit der\nWucht des Aufpralls besiegen."
          shield: "Es ist allein schon aufgrund seiner schieren Größe\nsehr beliebt. Wailord-Watching gilt vielerorts als\nbeliebte Touristenattraktion."
        es:
          sword: "Puede dejar fuera de combate a sus oponentes\ncon el impacto de su enorme cuerpo al caer en\nel agua tras uno de sus saltos."
          shield: "Su descomunal tamaño lo convierte en un\nPokémon muy popular. Los enclaves turísticos\ndonde se avistan Wailord son todo un éxito."
        ko:
          sword: "커다란 몸으로 파도 위에서\n점프해서 그 충격으로\n상대를 기절시킬 때가 있다."
          shield: "엄청나게 거대해서 인기가 있다.\n고래왕 워칭은 각지에서\n인기 있는 관광 코스다."
        zh_simp:
          sword: "有时会让大大的身体在波浪上跳跃，\n并以此来产生冲击让对手昏迷。"
          shield: "总之，因为超级巨大而受欢迎。\n观看吼鲸王在各地都是\n非常受欢迎的游览项目。"
        zh_trad:
          sword: "有時會讓大大的身體\n在波浪上跳躍，藉此\n製造出衝擊讓對手昏迷。"
          shield: "因為無比巨大而受歡迎。\n觀看吼鯨王的生態在各地都是\n非常受歡迎的遊覽項目。"
