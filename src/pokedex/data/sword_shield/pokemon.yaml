      egg_groups:
        - field
      abilities:
        - snow_cloak
      hidden_ability: snow_warning
      held_items:
        rare: snowball
      descriptions:
        jp_kana:
          sword: "ゆきに　とざされた　かみさまの　いる\nやまで　くらしていたため　むかしは\nかみのけしんと　うやまわれていた。"
          shield: "ゆきやまの　そうなんしゃを　ふもとへ\nみちびき　たすけるが　やまを　あらす\nふとどきものには　ようしゃしない。"
        jp_kanji:
          sword: "雪に　閉ざされた　神様の　いる\n山で　暮らしていたため　昔は\n神の化身と　敬われていた。"
          shield: "雪山の　遭難者を　ふもとへ\n導き　助けるが　山を　荒らす\n不届き者には　容赦しない。"
        en:
          sword: "A deity resides in the snowy mountains where this\nPokémon lives. In ancient times, it was worshiped\nas that deity’s incarnation."
          shield: "While it will guide travelers who get lost on a\nsnowy mountain down to the mountain’s base,\nit won’t forgive anyone who harms nature."
        fr:
          sword: "Parce qu’il vivait dans une montagne enneigée\nqui abritait une divinité, on le considérait jadis\ncomme un avatar de cette dernière."
          shield: "Il guide les humains perdus dans les pics neigeux\nvers le pied de la montagne, mais se montre sans\npitié envers ceux qui dégradent l’environnement."
        it:
          sword: "In passato viveva su un impenetrabile monte\ninnevato, dimora di una divinità di cui era\nconsiderato l’incarnazione."
          shield: "Aiuta chi si trova in difficoltà sui monti innevati\nportandolo a valle, ma non ha pietà per i\ndelinquenti che vandalizzano le montagne."
        de:
          sword: "Einst lebte es auf einem schneebedeckten Berg,\nder auch die Heimat einer Gottheit war, weshalb\nes als deren Verkörperung verehrt wurde."
          shield: "Leuten, die auf verschneiten Bergen in Not sind,\nweist es den Weg ins Tal. Doch mit Halunken, die\ndas Gebirge verwüsten, kennt es keine Gnade."
        es:
          sword: "Antaño lo veneraban como la encarnación de una\ndeidad que se creía que moraba en las montañas\nnevadas."
          shield: "Ayuda y guía a los que sufren algún percance en\nlas montañas nevadas, pero no muestra piedad\nalguna hacia los maleantes que las mancillan."
        ko:
          sword: "눈으로 폐쇄된 신이 사는\n산에 살았기 때문에 과거에는\n신의 화신으로 숭상받아왔다."
          shield: "설산의 조난자를 산기슭으로\n인도해 구해주지만 산을 황폐케 하는\n못된 자들은 용서하지 않는다."
        zh_simp:
          sword: "由于它生活在被冰雪封闭，\n有着神明居住的山上，\n在过去被人们敬仰为神的化身。"
          shield: "会引导在雪山遇险的人下山，\n但绝对不会轻饶不守规矩、\n破坏雪山环境的家伙。"
        zh_trad:
          sword: "由於牠生活在被冰雪封閉，\n有著神明居住的山上，\n在過去被人們敬仰為神的化身。"
          shield: "會引導在雪山遇險的人下山，\n但絕對不會輕饒不守規矩、\n破壞雪山環境的傢伙。"
