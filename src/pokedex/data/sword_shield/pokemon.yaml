        - cotton_down
        - regenerator
      hidden_ability: effect_spore
      descriptions:
        jp_kana:
          sword: "いっぽんあしを　じめんに　さして\nひのひかりを　たっぷり　あびると\nはなびらが　あざやかに　いろづく。"
          shield: "そよかぜで　くるくる　まわりながら\nたのしそうに　うたう　あいらしさに\nみせられ　そだてる　ひとが　おおい。"
        jp_kanji:
          sword: "一本足を　地面に　刺して\n陽の光を　たっぷり　浴びると\n花びらが　鮮やかに　色づく。"
          shield: "そよ風で　くるくる　回りながら\n楽しそうに　歌う　愛らしさに\n魅せられ　育てる　人が　多い。"
        en:
          sword: "It anchors itself in the ground with its single leg,\nthen basks in the sun. After absorbing enough\nsunlight, its petals spread as it blooms brilliantly."
          shield: "It whirls around in the wind while singing a joyous\nsong. This delightful display has charmed many\ninto raising this Pokémon."
        fr:
          sword: "Quand il plante son unique pied pour absorber\nla lumière du soleil, ses pétales prennent\nune couleur éclatante."
          shield: "Nombreux sont ceux qui ont décidé d’en élever\nun après avoir été charmés par sa manière\nde chanter en virevoltant au gré de la brise."
        it:
          sword: "Quando conficca il suo piede nel terreno e\nassorbe luce solare in abbondanza, il colore\ndei suoi petali diventa più intenso."
          shield: "Canta felice girando su se stesso mentre si lascia\ntrasportare dal vento. Molti ne allenano uno\nsemplicemente perché lo trovano adorabile."
        de:
          sword: "Steckt es sein Beinchen fest in den Boden und\nbadet dann ausgiebig im Sonnenlicht, nimmt\nseine Blüte eine kräftigere Farbe an."
          shield: "Viele Leute werden ihre Trainer, weil sie es\nniedlich finden, wie diese Pokémon in sanften\nBrisen herumwirbeln und voller Freude singen."
        es:
          sword: "Si planta su única extremidad inferior en la tierra\ny se expone a abundante luz solar, sus pétalos\ncobran un color vivo."
          shield: "Muchos los crían tras quedar prendados de lo\nadorables que resultan cuando cantan dando\nvueltas empujados por la brisa."
        ko:
          sword: "다리 하나를 땅에 꽂은 채\n햇빛을 잔뜩 받으면\n꽃잎이 선명한 색을 띠게 된다."
          shield: "산들바람에 빙글빙글 돌면서\n즐겁게 노래하는 귀여운 모습에\n반해서 키우는 사람이 많다."
        zh_simp:
          sword: "当它把单脚扎进地面里，\n并且沐浴充分的阳光，\n花瓣就会染上鲜艳的颜色。"
          shield: "会随着微风一边转圈圈一边\n愉快地唱歌。许多人因为喜欢\n这可爱的模样而培育它。"
        zh_trad:
          sword: "當牠把單腳紮進地面裡，\n並且沐浴充分的陽光，\n花瓣就會染上鮮豔的顏色。"
          shield: "會隨著微風一邊轉圈圈一邊\n愉快地唱歌。許多人因為喜歡\n這可愛的模樣而培育牠。"
