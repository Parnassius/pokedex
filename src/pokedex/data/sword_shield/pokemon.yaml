          shield: "むれで　こうどうする　しゅうせい。\nねむる　ときは　どうくつの　なかで\nなかまたちと　からだを　よせあう。"
        jp_kanji:
          sword: "大勢の　仲間と　行動する。\nおしくらまんじゅうで　我慢強い\n根性を　鍛えるのだ。"
          shield: "群れで　行動する　習性。\n眠る　ときは　洞窟の　中で\n仲間たちと　体を　寄せあう。"
        en:
          sword: "It tends to move in a pack. Individuals squash\nagainst one another to toughen their spirits."
          shield: "It tends to move in a pack with others.\nThey cluster in a tight group to sleep in a cave."
        fr:
          sword: "Il fait toutes ses activités en groupe.\nL’une d’elles consiste à se bousculer mutuellement\nafin de s’endurcir."
          shield: "Ces Pokémon adorent se déplacer en groupe.\nIls se blottissent les uns contre les autres\ndans des cavernes pour dormir."
        it:
          sword: "I Wynaut fanno tutto in gruppo. Giocando\na darsi spintoni, si tengono sempre allenati."
          shield: "Hanno l’abitudine di spostarsi in gruppo.\nQuando è ora di dormire, si radunano in\nuna grotta e riposano stretti l’uno all’altro."
        de:
          sword: "Isso bleiben immer im Rudel und schubsen\neinander spielerisch, um ihre Ausdauer zu\ntrainieren."
          shield: "Sie ziehen normalerweise im Rudel umher. Zum\nSchlafen drängen sie sich ganz eng in einer Höhle\nzusammen."
        es:
          sword: "Suelen ir en grupo. Templan su paciencia jugando\na empujarse los unos a los otros."
          shield: "Suelen ir en grupo y, a la hora de dormir, se\npegan unos a otros para descansar resguardados\nen cuevas."
        ko:
          sword: "많은 동료와 함께 행동한다.\n밀어내기 놀이로 인내심과\n근성을 강하게 단련한다."
          shield: "무리를 지어 행동하는 습성이 있다.\n잠들 때는 동굴 안에서\n동료들과 서로 몸을 붙인다."
        zh_simp:
          sword: "和大群伙伴一起行动，\n通过和伙伴彼此推挤\n来锻炼自己的忍耐力。"
          shield: "具有集体行动的习性。\n睡觉的时候会聚集在洞窟中，\n和伙伴们把身体挨在一起。"
        zh_trad:
          sword: "和大群夥伴一起行動，\n透過和夥伴彼此推擠\n來鍛鍊自己的忍耐力。"
          shield: "具有集體行動的習性。\n睡覺的時候會在洞窟中\n和夥伴們把身體挨在一起。"
