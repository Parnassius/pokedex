        en:
          sword: "If both of Buneary’s ears are rolled up, something\nis wrong with its body or mind. It’s a sure sign the\nPokémon is in need of care."
          shield: "Buneary can attack by rolling up their ears and\nthen striking with the force created by unrolling\nthem. This attack becomes stronger with training."
        fr:
          sword: "Quand ses deux oreilles sont repliées, c’est\nsigne qu’il ne se sent pas bien physiquement\nou mentalement et qu’il a besoin de soins."
          shield: "Plus il s’entraîne, plus les coups qu’il assène\nen déroulant vigoureusement ses oreilles\ngagnent en puissance."
        it:
          sword: "Se arrotola entrambe le orecchie significa che è\nafflitto da qualche disturbo fisico o emotivo.\nÈ segno che bisogna prendersi cura di lui."
          shield: "Attacca estendendo con impeto l’orecchio\narrotolato. Più si allena, più la potenza\ndei suoi attacchi aumenta."
        de:
          sword: "Sind seine beiden Ohren aufgerollt, deutet das\ndarauf hin, dass es ihm körperlich oder psychisch\nnicht gut geht und es Zuwendung braucht."
          shield: "Es greift an, indem es seine Ohren aufrollt und\nmit viel Schwung wieder entrollt. Durch Training\nkann Haspiror die Kraft dieser Attacke steigern."
        es:
          sword: "Cuando enrolla ambas orejas, es señal de que\ntiene algún tipo de malestar físico o emocional\ny necesita cuidados."
          shield: "Ataca estirando con un fuerte impulso las\norejas enrolladas. Cuanto más entrena esta\ntécnica, con más potencia la ejecuta."
        ko:
          sword: "양쪽 귀를 말고 있을 때는\n몸이나 마음이 좋지 않다는 뜻이므로\n관리가 필요하다."
          shield: "말고 있던 귀를 뻗는 힘으로\n공격하는 기술은 트레이닝을\n할수록 위력이 커진다."
        zh_simp:
          sword: "若看到它卷起左右两只耳朵，\n就说明它此时身体和心理\n状态不佳，需要呵护。"
          shield: "会利用把卷卷的耳朵伸直\n时产生的威力进行攻击。\n越训练，这一招式的威力就越强。"
        zh_trad:
          sword: "將左右兩耳都捲起來時，\n就代表牠的身體或心情\n狀況不佳，需要照顧。"
          shield: "會利用把捲成團的耳朵伸直\n時的威力來使出攻擊招式。\n越訓練，招式威力就會越大。"
