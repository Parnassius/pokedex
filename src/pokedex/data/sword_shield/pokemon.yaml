      descriptions:
        jp_kana:
          sword: "かせきから　ふくげんに　せいこう。\nけんきゅうの　とおり　とべないが\nジャンプは　とくいな　ポケモンだ。"
          shield: "とりポケモンの　そせんと　いわれる。\nきのうえで　くらし　きのみや\nむしポケモンを　くっていた。"
        jp_kanji:
          sword: "化石から　復元に　成功。\n研究の　とおり　飛べないが\nジャンプは　得意な　ポケモンだ。"
          shield: "鳥ポケモンの　祖先と　言われる。\n木の上で　暮らし　木の実や\n虫ポケモンを　食っていた。"
        en:
          sword: "This Pokémon was successfully restored from a\nfossil. As research suggested, Archen is unable\nto fly. But it’s very good at jumping."
          shield: "Archen is said to be the ancestor of bird\nPokémon. It lived in treetops, eating berries\nand bug Pokémon."
        fr:
          sword: "Les recherches ont montré que ce Pokémon\nrestauré à partir d’un fossile ne pouvait pas\nvoler, mais qu’il était très doué en saut."
          shield: "On dit que c’est l’ancêtre des Pokémon oiseaux.\nIl vivait à la cime des arbres et se nourrissait de\nBaies et de Pokémon Insecte."
        it:
          sword: "È stato rigenerato da un fossile.\nCome mostrato dalle ricerche, non può volare,\nma è molto abile nei salti."
          shield: "Si dice sia l’antenato dei Pokémon alati. Viveva\nsugli alberi, nutrendosi di bacche e Pokémon\ndi tipo Coleottero."
        de:
          sword: "Es wurde aus einem Fossil zurückverwandelt.\nWie von Forschern vermutet, kann Flapteryx zwar\nnicht fliegen, dafür aber umso besser springen."
          shield: "Flapteryx wird oft als Urahn der Vogel-Pokémon\nbezeichnet. Es lebte in Baumwipfeln und ernährte\nsich von Beeren und Käfer-Pokémon."
        es:
          sword: "Fue regenerado a partir de un fósil. Tal y como\napuntaban las investigaciones, no puede volar,\npero los saltos son su punto fuerte."
          shield: "Se dice que es el antepasado de los Pokémon\npájaro. Vivía en las copas de los árboles y se\nalimentaba de bayas y Pokémon insecto."
        ko:
          sword: "화석으로부터 복원에 성공했다.\n연구한 것처럼 날지는 못하지만\n점프는 특기인 포켓몬이다."
          shield: "새포켓몬의 선조로 불린다.\n나무 위에서 살며 나무열매나\n벌레포켓몬을 먹는다."
        zh_simp:
          sword: "从化石中成功复原。\n正如研究所说，它虽然不会飞，\n但却是擅长跳跃的宝可梦。"
          shield: "被称为鸟宝可梦的祖先。\n栖息在树上，以树果和\n虫宝可梦为食。"
        zh_trad:
          sword: "從化石成功復原的寶可夢。\n正如研究所指出的，雖然\n牠不會飛，但卻擅於跳躍。"
          shield: "被稱作是鳥寶可夢的祖先。\n棲息在樹上，以樹果和\n蟲寶可夢為食。"
archeops:
  species_id: 567
  names:
    jp_kana: アーケオス
    jp_kanji: アーケオス
    en: Archeops
    fr: Aéroptéryx
    it: Archeops
    de: Aeropteryx
    es: Archeops
    ko: 아케오스
    zh_simp: 始祖大鸟
    zh_trad: 始祖大鳥
  forms:
    archeops:
      form_id: 0
      base_stats:
        hp: 75
        attack: 140
        defense: 65
        special_attack: 112
        special_defense: 65
        speed: 110
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - rock
        - flying
      egg_groups:
        - flying
        - water_3
      abilities:
        - defeatist
      descriptions:
        jp_kana:
          sword: "とびたつために　じょそうする。\nその　きょりは　およそ　４キロ。\nはしるはやさは　じそく４０キロ。"
          shield: "とぶことも　できるが　ちじょうで\nえものを　かることの　ほうが\nずっと　とくい　だったようだ。"
        jp_kanji:
          sword: "飛び立つために　助走する。\nその　距離は　およそ　４キロ。\n走る速さは　時速４０キロ。"
          shield: "飛ぶことも　できるが　地上で\n獲物を　狩ることの　ほうが\nずっと　得意だったようだ。"
        en:
          sword: "It needs a running start to take off. If Archeops\nwants to fly, it first needs to run nearly 25 mph,\nbuilding speed over a course of about 2.5 miles."
          shield: "Though capable of flight, Archeops was\napparently better at hunting on the ground."
        fr:
          sword: "Pour s’envoler, il doit d’abord prendre son élan\nsur 4 km à une vitesse de 40 km/h."
          shield: "Il savait voler, mais il semble qu’il était beaucoup\nplus doué pour chasser ses proies sur la terre\nferme."
        it:
          sword: "Prende la rincorsa per volare, percorrendo\ncirca 4 km a una velocità di 40 km/h."
          shield: "Si sa che questo Pokémon era in grado di volare,\nma pare che fosse molto più abile nel cacciare\nle prede a terra."
        de:
          sword: "Um abheben zu können, muss es circa 4 km\nAnlauf nehmen und dabei eine Geschwindigkeit\nvon 40 km/h erreichen."
          shield: "Es konnte zwar auch fliegen, schien aber sehr viel\ngeschickter darin zu sein, am Boden Jagd auf\nBeute zu machen."
        es:
          sword: "Coge carrerilla durante aproximadamente 4 km\na una velocidad de 40 km/h para poder levantar\nel vuelo."
          shield: "Si bien era capaz de volar, parece ser que se le\ndaba mucho mejor cazar presas en tierra firme\nque en el aire."
        ko:
          sword: "날아오르기 위해 도움닫기를 하는데\n그 거리는 약 4km다.\n도움닫기의 속도는 시속 40km다."
          shield: "비행도 가능하지만\n지상에서 먹이를 사냥하는\n일을 훨씬 더 잘하는 듯하다."
        zh_simp:
          sword: "会为了飞翔而助跑。\n助跑的距离大约为４公里，\n跑步的速度为每小时４０公里。"
          shield: "虽然也会飞行，\n但是似乎更擅长在\n地面上捕捉猎物。"
        zh_trad:
          sword: "必須靠助跑才能飛起來。\n助跑的距離大約是４公里，\n奔跑的速度是時速４０公里。"
          shield: "雖然能夠飛行，\n但牠似乎更擅於\n在地上捕捉獵物。"
trubbish:
  species_id: 568
  names:
    jp_kana: ヤブクロン
    jp_kanji: ヤブクロン
    en: Trubbish
    fr: Miamiasme
    it: Trubbish
    de: Unratütox
    es: Trubbish
    ko: 깨봉이
    zh_simp: 破破袋
    zh_trad: 破破袋
  forms:
    trubbish:
      form_id: 0
      base_stats:
        hp: 50
        attack: 50
        defense: 62
        special_attack: 40
        special_defense: 62
        speed: 65
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - poison
      egg_groups:
        - mineral
      abilities:
        - stench
        - sticky_hold
      hidden_ability: aftermath
      held_items:
        rare: silk_scarf
      descriptions:
        jp_kana:
          sword: "ふえいせいな　ばしょが　すき。\nゴミで　よごしたまま　ほうっておくと\nへやにも　あらわれて　すみつく。"
          shield: "ゴミの　つまった　ゴミぶくろから\nうまれた。　はきだす　どくガスは\nガラルの　マタドガスの　こうぶつ。"
        jp_kanji:
          sword: "不衛生な　場所が　好き。\nゴミで　汚したまま　放っておくと\n部屋にも　現れて　棲みつく。"
          shield: "ゴミの　詰まった　ゴミ袋から\n生まれた。　吐き出す　毒ガスは\nガラルの　マタドガスの　好物。"
        en:
          sword: "Its favorite places are unsanitary ones. If you\nleave trash lying around, you could even find\none of these Pokémon living in your room."
          shield: "This Pokémon was born from a bag stuffed with\ntrash. Galarian Weezing relish the fumes belched\nby Trubbish."
        fr:
          sword: "Il raffole des endroits sales. Si on laisse traîner\ndes ordures dans une pièce trop longtemps,\nil finit par en faire son domicile."
          shield: "Il est né d’un sac poubelle rempli d’ordures.\nLe gaz empoisonné qu’il exhale est très apprécié\ndes Smogogo de Galar."
        it:
          sword: "Predilige luoghi insalubri. Sbuca fuori nelle case\ndove è stata lasciata spazzatura in giro e vi si\nstabilisce."
          shield: "È nato da un sacchetto pieno di spazzatura.\nI Weezing di Galar sono ghiotti del gas tossico\nche esala."
        de:
          sword: "Es liebt schmutzige Orte. Angeblich zieht es auch\nin menschliche Behausungen ein, wenn man zu\nviel Müll herumliegen lässt."
          shield: "Es ist aus einer überfüllten Mülltüte entstanden.\nDie Smogmog der Galar-Region sind verrückt\nnach den giftigen Gasen, die es ausstößt."
        es:
          sword: "Le gustan los lugares insalubres. Puede llegar a\nestablecerse en las casas de aquellas personas\nque no hagan la limpieza con regularidad."
          shield: "Nació a partir de una rebosante bolsa de basura.\nLos gases nocivos que eructa son un manjar para\nlos Weezing de Galar."
        ko:
          sword: "비위생적인 장소를 좋아한다.\n쓰레기를 어질러놓은 채 내버려 두면\n방에 나타나 그대로 눌러앉는다."
          shield: "쓰레기가 가득 담긴 쓰레기봉투에서\n태어났다. 내뿜는 독가스는\n가라르의 또도가스가 매우 좋아한다."
        zh_simp:
          sword: "喜欢不卫生的地方。\n如果不及时清理家里的垃圾，\n破破袋就会过来居住。"
          shield: "诞生于塞满垃圾的垃圾袋里。\n它嘴里喷出的毒气\n是伽勒尔双弹瓦斯的最爱。"
        zh_trad:
          sword: "喜歡不衛生的地方。\n如果不及時清理家裡的垃圾，\n破破袋就會過來居住。"
          shield: "誕生自塞滿垃圾的垃圾袋裡。\n牠嘴裡噴出的毒氣\n是伽勒爾雙彈瓦斯的最愛。"
