          shield: "ひろった　ホネで　みを　かざる。\nまとう　ホネの　かたちには\nりゅうこうが　あるらしい。"
        jp_kanji:
          sword: "荒っぽい　性質だが　迷子の\nバルチャイを　見かけると　巣立つまで\n大切に　面倒を　みる。"
          shield: "拾った　骨で　身を　飾る。\nまとう　骨の　形には\n流行が　あるらしい。"
        en:
          sword: "Although it’s a bit of a ruffian, this Pokémon will\ntake lost Vullaby under its wing and care for them\ntill they’re ready to leave the nest."
          shield: "They adorn themselves with bones. There seem\nto be fashion trends among them, as different\nbones come into and fall out of popularity."
        fr:
          sword: "Malgré son naturel brutal, il recueille volontiers\nles Vostourno égarés et prend soin d’eux\njusqu’à ce qu’ils soient en âge de quitter le nid."
          shield: "Il se pare d’ossements qu’il a ramassés.\nIl semblerait qu’il choisisse la forme des os\nqu’il porte selon les dernières tendances."
        it:
          sword: "Ha un’indole violenta, ma se trova un Vullaby\nche si è smarrito lo accudisce con amore fino\na quando non è pronto a lasciare il nido."
          shield: "Raccoglie ossa con cui adorna il suo corpo.\nSembra che la forma di queste decorazioni\ncambi a seconda della moda del momento."
        de:
          sword: "Grypheldis sind ziemliche Grobiane. Begegnet\nihnen ein verirrtes Skallyk, kümmern sie sich aber\nliebevoll um es, bis es das Nest verlassen kann."
          shield: "Es schmückt sich mit Knochen. Man kann wohl\nTrends beobachten, was für Knochenformen bei\nihnen gerade besonders angesagt sind."
        es:
          sword: "A pesar de su carácter violento, si avista un\nVullaby perdido, lo acoge en su nido y lo cuida\ncon esmero hasta que está listo para partir."
          shield: "Se engalana con los huesos que va recogiendo.\nAl parecer, la elección no es casual, sino que\nobedece a los dictados de la moda."
        ko:
          sword: "성질이 난폭하지만 미아가 된\n벌차이를 발견하면 둥지를\n떠날 때까지 정성껏 돌봐준다."
          shield: "주운 뼈로 몸을 장식한다.\n몸에 두르는 뼈의 모양은\n유행이 있는 듯하다."
        zh_simp:
          sword: "虽然性情粗暴，如果遇到了\n迷路的秃鹰丫头，便会精心\n照顾它，直到它长大离巢。"
          shield: "把捡来的骨头装饰在身上。\n在骨头形状这方面\n似乎也是有流行趋势的。"
        zh_trad:
          sword: "雖然性情粗暴，如果遇到了\n迷路的禿鷹丫頭，便會細心\n照顧牠，直到牠長大離巢。"
          shield: "把撿來的骨頭裝飾在身上。\n在骨頭形狀這方面\n似乎也是有流行趨勢的。"
