      descriptions:
        jp_kana:
          sword: "ネバネバした　だえきに　ふれたまま\nほうっておくと　ものすごい　かゆみが\nはじまり　とまらなくなるぞ。"
          shield: "むしポケモンが　おもな　エサ。\nながい　したで　あいてを　なめて\nしびれた　ところを　まるのみにする。"
        jp_kanji:
          sword: "ネバネバした　唾液に　触れたまま\n放っておくと　ものすごい　痒みが\nはじまり　とまらなくなるぞ。"
          shield: "虫ポケモンが　おもな　エサ。\n長い　舌で　相手を　舐めて\n痺れた　ところを　丸飲みにする。"
        en:
          sword: "If this Pokémon’s sticky saliva gets on you and\nyou don’t clean it off, an intense itch will set in.\nThe itch won’t go away, either."
          shield: "Bug Pokémon are Lickitung’s main food source.\nThis Pokémon paralyzes its prey with a lick from\nits long tongue, then swallows the prey whole."
        fr:
          sword: "Si sa salive gluante entre en contact avec la peau\net qu’on ne l’essuie pas bien, elle provoque de\nterribles démangeaisons qui ne s’arrêtent jamais."
          shield: "Excelangue se nourrit essentiellement de Pokémon\nInsecte. Il lèche ses ennemis avec sa longue langue\npour les paralyser, puis les avale tout rond."
        it:
          sword: "La sua saliva appiccicosa provoca un prurito\nterribile che non dà tregua se le parti leccate\nnon vengono ripulite."
          shield: "Si nutre principalmente di Pokémon Coleottero.\nParalizza le prede leccandole con la lunga lingua\ne le inghiotte in un boccone."
        de:
          sword: "Wäscht man sich nach der Berührung mit seinem\nklebrigen Speichel nicht, setzt bald ein starker\nJuckreiz ein, der nicht mehr zu stoppen ist."
          shield: "Es ernährt sich vorwiegend von Käfer-Pokémon.\nHat es diese mit der langen Zunge abgeschleckt\nund dadurch gelähmt, verschlingt es sie im Nu."
        es:
          sword: "Si sus lametones no se tratan a tiempo, su saliva\npegajosa y urticante puede provocar picores\npersistentes."
          shield: "Se nutre principalmente de Pokémon insecto,\na los que paraliza primero lamiéndolos con su\nlarga lengua y luego engulle de un bocado."
        ko:
          sword: "끈적끈적한 타액에 접촉한 후\n그대로 방치하면 굉장히 가렵고\n급기야 멈출 수 없게 된다."
          shield: "벌레포켓몬이 주된 먹이다.\n긴 혀로 상대를 핥아\n마비시킨 후 통째로 삼킨다."
        zh_simp:
          sword: "据说如果碰到了它黏糊糊的\n唾液却放任不管的话，就会\n变得奇痒无比，停不下来。"
          shield: "主要以虫宝可梦为食。\n会用长长的舌头舔对手，\n等对手麻痹后将其整个吞下。"
        zh_trad:
          sword: "沾到牠黏糊糊的唾液後\n如果放著不管，就會變得\n奇癢無比，而且癢個不停。"
          shield: "蟲寶可夢是牠主要的食物。\n會用長長的舌頭去把對方\n舔麻痺，然後趁機一口吞下。"
koffing:
