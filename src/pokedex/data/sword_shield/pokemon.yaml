      descriptions:
        jp_kana:
          sword: "あたまの　かさは　とても　おいしい。\nもりの　ポケモンたちに　たべられるが\nひとばんで　さいせいする。"
          shield: "ひるまでも　くらい　もりで　くらす。\nてんめつしながら　ひかる　ほうしを\nばらまいて　てきを　ねむらせる。"
        jp_kanji:
          sword: "頭の　傘は　とても　美味しい。\n森の　ポケモンたちに　食べられるが\n一晩で　再生する。"
          shield: "昼間でも　暗い　森で　暮らす。\n点滅しながら　光る　胞子を\nばらまいて　敵を　眠らせる。"
        en:
          sword: "Pokémon living in the forest eat the\ndelicious caps on Morelull’s head.\nThe caps regrow overnight."
          shield: "Morelull live in forests that stay dark even\nduring the day. They scatter flickering spores\nthat put enemies to sleep."
        fr:
          sword: "Ses chapeaux sont délicieux, et les Pokémon\nde la forêt s’en délectent. Heureusement pour lui,\nses couvre-chefs repoussent en une nuit."
          shield: "Il vit dans les forêts sombres même en plein jour.\nIl dissémine des spores clignotantes pour\nendormir ses ennemis."
        it:
          sword: "I cappelli sul suo capo sono molto gustosi e\ni Pokémon che vivono nei boschi se ne cibano.\nPer fortuna, ricrescono nel giro di una notte."
          shield: "Vive nei boschi perennemente ombrosi. Sparge\ntutto intorno spore che emettono una luce\nintermittente con cui addormenta i nemici."
        de:
          sword: "Sein Pilzhut ist sehr schmackhaft. Er wird zwar\nhäufig von den Pokémon des Waldes verspeist,\nwächst aber über Nacht wieder nach."
          shield: "Auch die hellsten Tage verbringt Bubungus in\ndunklen Wäldern. Es streut blinkende Sporen\naus, um seine Gegner in den Schlaf zu lullen."
        es:
          sword: "Sus sombrerillos tienen un sabor delicioso.\nAunque los Pokémon del bosque se los coman,\nles vuelven a crecer al día siguiente."
          shield: "Vive en bosques umbríos. Esparce a su alrededor\nesporas titilantes que adormecen a sus enemigos."
        ko:
          sword: "머리의 갓은 매우 맛있다.\n숲속의 포켓몬들에게 먹히지만\n하룻밤 만에 재생한다."
          shield: "낮에도 어두운 숲에서 생활한다.\n점멸하면서 빛나는 포자를\n흩뿌려 적을 잠들게 한다."
        zh_simp:
          sword: "头上的蘑菇伞非常好吃，\n虽然会被森林中的宝可梦吃掉，\n但是过了一晚上就会再生。"
          shield: "白天也生活在昏暗的森林里。\n会一边闪烁一边散播发光的孢子\n来让敌人陷入沉睡。"
        zh_trad:
          sword: "頭上的蘑菇傘非常好吃，\n雖然會被森林中的寶可夢吃掉，\n但是過了一晚上就會再生。"
          shield: "白天也生活在昏暗的森林裡。\n會一邊閃爍一邊散播發著光的孢子\n來讓敵人陷入沉睡。"
shiinotic:
  species_id: 756
  names:
    jp_kana: マシェード
    jp_kanji: マシェード
    en: Shiinotic
    fr: Lampignon
    it: Shiinotic
    de: Lamellux
    es: Shiinotic
    ko: 마셰이드
    zh_simp: 灯罩夜菇
    zh_trad: 燈罩夜菇
  forms:
    shiinotic:
      form_id: 0
      base_stats:
        hp: 60
        attack: 45
        defense: 80
        special_attack: 90
        special_defense: 100
        speed: 30
      evs_yield:
        hp: 0
        attack: 0
