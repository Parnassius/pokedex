      abilities:
        - sheer_force
      hidden_ability: zen_mode
      descriptions:
        jp_kana:
          sword: "けっきさかんな　ポケモン。\nふとい　うでから　くりだす　パンチは\nダンプカーも　こなごなに　するぞ。"
          shield: "たいないの　ほのおが　もえさかるほど\nパワーが　たかまる。　その　おんどは\n１４００どを　こえる　ことも。"
        jp_kanji:
          sword: "血気　盛んな　ポケモン。\n太い　腕から　繰りだす　パンチは\nダンプカーも　粉々に　するぞ。"
          shield: "体内の　炎が　燃え盛るほど\nパワーが　高まる。　その　温度は\n１４００度を　超える　ことも。"
        en:
          sword: "The thick arms of this hot-blooded Pokémon\ncan deliver punches capable of obliterating a\ndump truck."
          shield: "This Pokémon’s power level rises along with the\ntemperature of its fire, which can reach 2,500\ndegrees Fahrenheit."
        fr:
          sword: "Véritable tête brûlée, il possède assez de force\ndans ses gros bras pour réduire en poussière\nun camion-benne à coups de poing."
          shield: "Sa puissance augmente à mesure que la flamme\nde son corps s’intensifie. La température\nde celle-ci peut parfois dépasser les 1 400 °C."
        it:
          sword: "Pokémon dal sangue caldo. I pugni che sferra\ncon i suoi massicci arti superiori possono\nridurre in polvere anche un autocarro."
          shield: "La sua fiamma interna può raggiungere\ntemperature di oltre 1.400 ºC. Più intensamente\narde, più la potenza del Pokémon aumenta."
        de:
          sword: "Dieses Pokémon ist ausgesprochen energisch. Ein\neinziger Hieb mit seinen gewaltigen Armen macht\nselbst Lastwagen dem Erdboden gleich."
          shield: "Je heißer das Feuer in ihm brennt, desto mehr\nKraft steht ihm zur Verfügung. Seine innere\nTemperatur erreicht mitunter mehr als 1 400 ºC."
        es:
          sword: "Un Pokémon sumamente enérgico. Tiene tanta\nfuerza en los brazos que es capaz de destrozar\nun camión a base de puñetazos."
          shield: "Su fuerza aumenta cuanto más se aviva su fuego\ninterior, que puede alcanzar temperaturas\nsuperiores a los 1400 °C."
        ko:
          sword: "혈기왕성한 포켓몬.\n굵직한 팔에서 날리는 펀치는\n덤프트럭도 가루로 만들어버린다."
          shield: "체내의 불꽃이 타오를수록\n파워가 올라간다. 그 온도는\n1400도를 넘기도 한다."
        zh_simp:
          sword: "总是热血沸腾的宝可梦。\n它厚重的手臂使出的拳击\n甚至能把翻斗车打得粉碎。"
          shield: "体内的火焰燃得越旺，\n力量就越大。火焰的温度\n有时甚至能超过１４００度。"
        zh_trad:
          sword: "總是熱血沸騰的寶可夢。\n牠厚重的手臂使出的拳擊\n甚至能把砂石車打得粉碎。"
          shield: "體內的火焰燃得越旺，\n力量就越大。火焰的溫度\n有時甚至能超過１４００度。"
    darmanitan_zen_mode:
      form_id: 1
      names:
        jp_kana: ダルマモード
        jp_kanji: ダルマモード
