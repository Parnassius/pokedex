        jp_kana:
          sword: "みがるさを　いかした　せんぽうで\nあいての　たいりょくを　うばってから\nかれいな　おおわざを　きめる。"
          shield: "とどめの　おおわざを　だす　まえは\nかならず　ポーズを　きめる。　その\nすきに　はんげきされる　こともある。"
        jp_kanji:
          sword: "身軽さを　活かした　戦法で\n相手の　体力を　奪ってから\n華麗な　大技を　決める。"
          shield: "とどめの　大技を　出す　前は\nかならず　ポーズを　決める。　その\n隙に　反撃される　こともある。"
        en:
          sword: "It drives its opponents to exhaustion with its agile\nmaneuvers, then ends the fight with a flashy\nfinishing move."
          shield: "It always strikes a pose before going for its\nfinishing move. Sometimes opponents take\nadvantage of that time to counterattack."
        fr:
          sword: "Il utilise des tactiques basées sur son agilité\npour fatiguer son adversaire, et termine\nle combat par une magnifique frappe décisive."
          shield: "Il prend toujours la pose avant de donner le coup\nde grâce à son adversaire. Certains en profitent\npour contre-attaquer."
        it:
          sword: "Sfrutta la sua agilità per indebolire l’avversario,\ne conclude la lotta dandogli il colpo di grazia\ncon una mossa grandiosa."
          shield: "Assume sempre una posa speciale prima di\nsferrare il colpo finale. A volte i nemici\napprofittano di questo istante per contrattaccare."
        de:
          sword: "Durch flinke Angriffsmanöver raubt es seinen\nGegnern ihre Kraft, um sie dann mit prachtvollen\nSpezialtechniken niederzuringen."
          shield: "Bevor es seinem Gegner mit einer Spezialtechnik\nein Ende setzt, posiert es stets. Diesen Moment\nnutzt so mancher für einen Gegenangriff."
        es:
          sword: "Se vale de su agilidad para minar las fuerzas del\nrival y, una vez extenuado, remata el combate\nejecutando una técnica formidable."
          shield: "Siempre se exhibe con alguna pose justo antes\nde propinar el golpe de gracia, momento que\nalgunos rivales aprovechan para contraatacar."
        ko:
          sword: "경쾌한 몸놀림을 활용한 전법으로\n상대의 체력을 빼앗은 뒤\n화려한 큰 기술을 먹인다."
          shield: "끝을 내는 결정적인 기술을 쓰기 전에\n반드시 포즈를 취한다.\n그 틈에 반격당하기도 한다."
        zh_simp:
          sword: "利用发挥轻盈体型优势的战法，\n在消耗了对手的体力之后\n使用华丽的绝招分出胜负。"
          shield: "在使出致命的绝招之前\n一定要先摆出华丽的姿势。\n有时也会在这一刻遭到反击。"
        zh_trad:
          sword: "利用發揮輕盈體型優勢的戰法，\n在消耗了對手的體力之後\n使用華麗的絕招分出勝負。"
          shield: "在使出致命的絕招之前\n一定要先擺出華麗的姿勢。\n有時也會在這一刻遭到反擊。"
