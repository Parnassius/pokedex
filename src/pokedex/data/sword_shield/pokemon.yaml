        jp_kanji: オリジナルキャップ
        en: Original Cap
        fr: Casquette Originale
        it: Berretto Originale
        de: Original-Kappe
        es: Gorra Original
        ko: 오리지널캡
        zh_simp: 初始帽子
        zh_trad: 初始帽子
      base_stats:
