      descriptions:
        jp_kana:
          sword: "じぶんより　つよくて　おおきな\nあいてにも　おそれずに　たちむかう\nゆうかんで　たのもしい　せいかく。"
          shield: "ちゅうじつな　せいかくで　おやの\nトレーナーを　まもるため　ひっしに\nあいてに　ほえかかる。"
        jp_kanji:
          sword: "自分より　強くて　大きな　相手にも\n恐れずに　立ち向かう\n勇敢で　頼もしい　性格。"
          shield: "忠実な　性格で　親の\nトレーナーを　守るため　必死に\n相手に　吠えかかる。"
        en:
          sword: "It has a brave and trustworthy nature. It fearlessly\nstands up to bigger and stronger foes."
          shield: "Extremely loyal, it will fearlessly bark at any\nopponent to protect its own Trainer from harm."
        fr:
          sword: "Il est courageux et fiable. Il se dresse vaillamment\ndevant ses ennemis même s’ils sont plus puissants."
          shield: "Très fidèle, il aboie de toutes ses forces pour\nprotéger son Dresseur d’Origine quand un danger\nle guette."
        it:
          sword: "Coraggioso e fedele, si oppone senza paura\nanche a nemici più grandi e forti di lui."
          shield: "Di indole molto leale, abbaia furiosamente\ncontro chiunque minacci di attaccare il suo\nAllenatore."
        de:
          sword: "Es ist von Natur aus tapfer und vertrauenswürdig\nund scheut auch vor Gegnern nicht zurück, die\ngrößer und stärker sind als es selbst."
          shield: "Es ist sehr loyal und bellt jeden Gegner furchtlos\nan, um seinen Trainer vor Schaden zu bewahren."
        es:
          sword: "De naturaleza valiente y honrada, se enfrenta sin\nmiedo a enemigos más grandes y fuertes."
          shield: "Extremadamente fiel, ladrará furioso a cualquiera\nque suponga una amenaza para su Entrenador\ncon tal de defenderlo."
        ko:
          sword: "자신보다 강하고 큰\n상대라도 겁 없이 맞서는\n용감하고 믿음직스런 성격이다."
          shield: "충직한 성격으로\n자신의 트레이너를 지키기 위해\n필사적으로 상대방에게 짖어댄다."
        zh_simp:
          sword: "能毫无畏惧地去对抗\n比自己更强更大的对手。\n性格勇敢非常可靠。"
          shield: "性格忠诚。\n为了保护自己的训练家，\n会拼命地朝对手狂吠。"
        zh_trad:
          sword: "能毫不畏懼地去對抗\n比自己更強更大的對手。\n性格非常勇敢可靠。"
          shield: "性格忠誠。\n為了保護自己的訓練家，\n會拼命地朝對手狂吠。"
