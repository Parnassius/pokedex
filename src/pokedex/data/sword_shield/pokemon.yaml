      descriptions:
        jp_kana:
          sword: "ねながら　ちょうのうりょくを\nあやつる。　ゆめの　ないようが\nつかう　ちからに　えいきょうする。"
          shield: "ねむったまま　テレポート　できる。\nねむりが　ふかいほど　はなれた\nばしょに　いどうする　という。"
        jp_kanji:
          sword: "寝ながら　超能力を　操る。\n夢の　内容が　使う　力に　影響する。"
          shield: "眠ったまま　テレポート　できる。\n眠りが　深いほど　離れた　場所に\n移動する　という。"
        en:
          sword: "This Pokémon uses its psychic powers while it\nsleeps. The contents of Abra’s dreams affect the\npowers that the Pokémon wields."
          shield: "Abra can teleport in its sleep. Apparently\nthe more deeply Abra sleeps, the farther its\nteleportations go."
        fr:
          sword: "Le contenu de ses rêves influe sur les pouvoirs\npsychiques qu’il utilise dans son sommeil."
          shield: "Il peut se téléporter en dormant. On dit que plus\nson sommeil est profond, plus il se téléporte loin."
        it:
          sword: "Il contenuto dei suoi sogni influisce sui suoi\npoteri psichici, che può utilizzare anche\nmentre dorme."
          shield: "È in grado di teletrasportarsi mentre dorme.\nSi dice che più profondo sia il suo sonno, più\npossa spostarsi lontano."
        de:
          sword: "Es setzt seine Psycho-Kräfte selbst im Schlaf ein.\nDer Inhalt seiner Träume hat Einfluss auf die\nKräfte, die es verwendet."
          shield: "Es kann sich im Schlaf teleportieren. Je tiefer\nAbra schläft, desto weiter entfernt soll der Ort\nsein, an den es sich teleportiert."
        es:
          sword: "Es capaz de usar sus poderes psíquicos aun\nestando dormido. Al parecer, el contenido del\nsueño influye en sus facultades."
          shield: "Puede teletransportarse mientras duerme. Se\ndice que, cuanto más profundo sea su sueño,\nmayor será la distancia a la que se desplace."
        ko:
          sword: "자면서 초능력을 구사한다.\n꿈의 내용이\n사용하는 힘에 영향을 준다."
          shield: "잠이 든 상태에서 순간이동이\n가능하다. 깊이 잠들수록\n먼 곳으로 이동한다고 한다."
        zh_simp:
          sword: "会一边睡觉一边操纵\n超能力。梦的内容会\n影响它使用的能力。"
          shield: "能够在睡梦中使出瞬间移动。\n据说它睡得越熟，就能\n移动到越遥远的地方。"
        zh_trad:
          sword: "會一邊睡覺一邊操控超能力。\n夢的內容會影響牠使用的能力。"
          shield: "就算在睡夢中也能使用瞬間移動。\n據說當牠睡得越熟，\n瞬間移動的距離就會越遠。"
