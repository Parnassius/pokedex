        jp_kana:
          sword: "なにかに　ばける　のうりょくを\nみに　つけたのは　おくびょうな\nせいしつの　えいきょう　らしい。"
          shield: "エサを　もとめて　ひとに　ばけ\nまちに　あらわれることも　あるぞ。\nおもに　こどもに　ばけている。"
        jp_kanji:
          sword: "なにかに　化ける　能力を\n身に　つけたのは　臆病な\n性質の　影響らしい。"
          shield: "エサを　もとめて　人に　化け\n町に　現れることも　あるぞ。\nおもに　子どもに　化けている。"
        en:
          sword: "Zorua is a timid Pokémon. This disposition seems\nto be what led to the development of Zorua’s\nability to take on the forms of other creatures."
          shield: "Zorua sometimes transforms into a person and\ngoes into cities to search for food. When Zorua\ndoes this, it usually takes on the form of a child."
        fr:
          sword: "À cause de sa timidité, il aurait développé\nla capacité de changer son apparence."
          shield: "Il lui arrive de se changer en être humain,\nsurtout en enfant, pour venir chercher\nde la nourriture en ville."
        it:
          sword: "Pare che abbia sviluppato l’abilità di alterare le\nsue sembianze per via della sua natura timorosa."
          shield: "Quando è in cerca di cibo, capita persino che\nappaia in città assumendo sembianze umane.\nSi trasforma principalmente in bambini."
        de:
          sword: "Durch seine furchtsame Natur lernte es wohl,\nseine Gestalt zu ändern."
          shield: "Auf der Suche nach Nahrung verschlägt es Zorua\nmanchmal auch in Städte. Dort tarnt es sich\nüblicherweise als Menschenkind."
        es:
          sword: "Al parecer, fue su carácter miedoso lo que le\nllevó a desarrollar la capacidad de transformarse."
          shield: "Suele transformarse en personas, sobre todo en\nniños, y se adentra en pueblos buscando comida."
        ko:
          sword: "무언가로 둔갑하는 능력을\n익힌 것은 겁이 많은\n성질의 영향인 듯하다."
          shield: "먹이를 찾아 사람으로 둔갑하여\n마을에 나타나기도 한다.\n주로 아이로 둔갑한다."
        zh_simp:
          sword: "之所以学会了幻化成\n其他东西的能力，似乎是\n因为它的性格比较胆小。"
          shield: "为了寻找食物，有时甚至会\n幻化成人类出现在城镇里。\n多数情况下会幻化成小孩。"
        zh_trad:
          sword: "似乎是因為性情膽小，\n因此學會了幻化成\n其他模樣的能力。"
          shield: "為了尋找食物，有時還會\n幻化成人類出現在城鎮裡。\n通常都會變成小孩子。"
zoroark:
  species_id: 571
  names:
    jp_kana: ゾロアーク
    jp_kanji: ゾロアーク
