          shield: "みずのなかと　くらべて　うごきは\nにぶいが　えものを　さがしもとめ\nりくじょうでも　かつどうするぞ。"
        jp_kanji:
          sword: "獲物の　殻や骨も　残さず\nきれいに　たいらげるので　甲羅は\nぶ厚く　硬く　成長する。"
          shield: "水の中と　くらべて　動きは\n鈍いが　獲物を　探し求め\n陸上でも　活動するぞ。"
        en:
          sword: "Carracosta completely devours its prey—bones,\nshells, and all. Because of this, Carracosta’s own\nshell grows thick and sturdy."
          shield: "This Pokémon emerges from the water in search\nof prey despite the fact that it moves more\nslowly on land."
        fr:
          sword: "Il dévore les os et la coquille de ses proies,\nce qui épaissit et renforce sa propre carapace."
          shield: "Bien qu’il soit moins à l’aise sur terre que dans\nl’eau, il s’aventure sur le rivage pour se nourrir."
        it:
          sword: "Consuma le sue prede senza lasciare nemmeno\nossa e gusci, favorendo così la formazione di\nun carapace duro e spesso."
          shield: "Quando va in cerca di prede sale anche sulla\nterraferma, nonostante i suoi movimenti siano\npiù impacciati rispetto a quando è in acqua."
        de:
          sword: "Karippas verschlingt seine Beute mitsamt Schale\nund Knochen, wodurch sein Panzer besonders\ndick und widerstandsfähig wird."
          shield: "Obwohl es sich außerhalb des Wassers langsamer\nfortbewegt, kommt es an Land, um nach Beute\nzu suchen."
        es:
          sword: "Devora incluso los huesos y caparazones de sus\npresas, por lo que el suyo propio se vuelve duro\ny grueso."
          shield: "Aunque se mueva con mayor lentitud sobre la\nsuperficie terrestre que en el agua, emerge a\ntierra en busca de presas."
        ko:
          sword: "먹이의 껍질과 뼈까지 남김없이\n깨끗하게 먹어 치워서 등껍질은\n두껍고 단단하게 성장한다."
          shield: "물속과 비교하면 움직임이\n둔하지만 먹이를 찾아\n육지에서도 활동한다."
        zh_simp:
          sword: "连猎物的壳和骨头也都会\n干干净净地吃得一丝不剩，\n所以甲壳成长得又厚又坚硬。"
          shield: "虽然和在水中相比动作\n会变得迟缓，但是为了寻找\n猎物也会登上陆地活动。"
        zh_trad:
          sword: "由於會將獵物的硬殼和骨頭\n也都吃得乾乾淨淨一點不剩，\n所以牠的甲殼長得又厚又堅硬。"
          shield: "雖然和水中相比動作會變得\n比較遲緩，但為了尋找獵物\n牠還是會在陸地上活動。"
archen:
  species_id: 566
  names:
    jp_kana: アーケン
