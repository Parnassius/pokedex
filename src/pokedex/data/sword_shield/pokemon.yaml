        - steel
        - rock
      egg_groups:
        - monster
      abilities:
        - sturdy
        - rock_head
      hidden_ability: heavy_metal
      held_items:
        rare: hard_stone
      descriptions:
        jp_kana:
          sword: "ぶあつい　てっぱんを　つらぬくほどの\nするどい　ツノを　たいあたりとともに\nくらわせて　てきを　しとめる。"
          shield: "おおむかし　ボスゴドラの　つよさに\nあやかり　あたまの　かたちを　もした\nかぶとを　かぶる　おうさまが　いた。"
        jp_kanji:
          sword: "ぶ厚い　鉄板を　貫くほどの\n鋭い　ツノを　体当たりとともに\nくらわせて　敵を　しとめる。"
          shield: "大昔　ボスゴドラの　強さに\nあやかり　頭の　形を　模した\nかぶとを　被る　王様が　いた。"
        en:
          sword: "Aggron has a horn sharp enough to perforate\nthick iron sheets. It brings down its opponents by\nramming into them horn first."
          shield: "Long ago, there was a king who wore a helmet\nmeant to resemble the head of an Aggron. He\nwas trying to channel the Pokémon’s strength."
        fr:
          sword: "Il terrasse ses ennemis en chargeant et en donnant\ndes coups avec ses cornes acérées capables de\ntranspercer des plaques de fer épaisses."
          shield: "Il y a fort longtemps, un roi portait un casque\nà l’effigie de Galeking, pensant qu’il pourrait\nainsi s’approprier sa force."
        it:
          sword: "Abbatte i nemici caricandoli e speronandoli\ncon le sue corna, talmente affilate da perforare\nspesse lastre di metallo."
          shield: "In tempi antichi ci fu un re che, aspirando alla\nforza di Aggron, indossava un elmo ispirato\nalla testa di questo Pokémon."
        de:
          sword: "Mit seinen spitzen Hörnern, die selbst massive\nEisenplatten durchbohren können, rammt es seine\nGegner und macht ihnen so den Garaus."
          shield: "Einst gab es einen König, der einen Helm in Form\nvon Stolloss’ Kopf trug, in der Hoffnung, sich\ndadurch dessen Stärke aneignen zu können."
        es:
          sword: "Sus cuernos duros y afilados pueden perforar\nhasta las planchas de hierro más gruesas.\nDerriba a sus rivales cargando contra ellos."
          shield: "En la antigüedad, hubo un monarca que llevaba\nun casco hecho a imagen de Aggron para que le\notorgase fuerza."
        ko:
          sword: "두꺼운 철판을 꿰뚫을 정도로\n예리한 뿔을 몸통박치기와 함께\n찔러넣어 상대를 처리한다."
          shield: "먼 옛날 어떤 왕은 보스로라의\n강함을 선망하여 머리 모양을\n본떠 만든 투구를 쓰기도 했다."
        zh_simp:
          sword: "会用能够刺穿铁板的\n锐利尖角在撞击敌人的\n同时攻击对方。"
          shield: "很久以前，有位国王由于希望\n像波士可多拉一样强大而戴上了\n模仿它的头部制成的头盔。"
        zh_trad:
          sword: "在撞擊敵人的同時，會用\n能刺穿厚鐵板的銳利尖角\n給予對方致命的一擊。"
          shield: "古時候有位國王將自己的頭盔\n製作成波士可多拉頭部的樣子，\n期盼為自己帶來像牠的強大力量。"
