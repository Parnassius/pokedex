          sword: "どうくつを　みあげて　かべに\nハートがたの　あとが　あれば\nコロモリが　すんでいる　しょうこ。"
          shield: "ちょうおんぱを　はなちながら\nフラフラと　とびまわり　エサの\nむしポケモンを　さがしている。"
        jp_kanji:
          sword: "洞窟を　見上げて　壁に\nハート型の　跡が　あれば\nコロモリが　棲んでいる　証拠。"
          shield: "超音波を　放ちながら\nフラフラと　飛びまわり　エサの\n虫ポケモンを　探している。"
        en:
          sword: "While inside a cave, if you look up and see lots\nof heart-shaped marks lining the walls, it’s\nevidence that Woobat live there."
          shield: "It emits ultrasonic waves as it flutters about,\nsearching for its prey—bug Pokémon."
        fr:
          sword: "La présence de marques en forme de cœur\nsur les parois des grottes indique la présence\nde Chovsourir à l’intérieur."
          shield: "Il virevolte gaiement et émet des ultrasons\npour trouver des Pokémon Insecte à grignoter."
        it:
          sword: "Se alzando lo sguardo in una grotta si vedono\nimpronte a forma di cuore sulle pareti, è segno\nche vi abitano dei Woobat."
          shield: "Svolazza emettendo ultrasuoni in cerca\ndi Pokémon di tipo Coleottero, di cui si nutre."
        de:
          sword: "Herzförmige Flecken an der Decke einer Höhle\nsind ein sicheres Zeichen dafür, dass sie von\nFleknoil behaust wird."
          shield: "Es fliegt umher und sendet Ultraschallwellen aus,\num Käfer-Pokémon aufzuspüren, welche ihm als\nNahrung dienen."
        es:
          sword: "Si al alzar la vista en una cueva se ven marcas\ncon forma de corazón en las paredes, es señal\nde que Woobat la ha convertido en su guarida."
          shield: "Emite ultrasonidos mientras revolotea en busca\nde los Pokémon insecto con los que se sustenta."
        ko:
          sword: "동굴을 올려다봤을 때 벽에\n하트 모양 자국이 있다면\n또르박쥐가 살고 있다는 증거다."
          shield: "초음파를 발산하면서\n흔들흔들 날아다닌다.\n먹이인 벌레포켓몬을 찾고 있다."
        zh_simp:
          sword: "在洞窟中，如果抬头看到\n墙壁上留着心形的痕迹，\n就代表滚滚蝙蝠住在那里。"
          shield: "一边发出超音波，一边\n飞来飞去寻找虫宝可梦\n来填饱自己的肚子。"
        zh_trad:
          sword: "在洞窟中，如果抬頭看到\n牆壁上留著心形的痕跡，\n就代表滾滾蝙蝠住在那裡。"
          shield: "一邊發出超音波，一邊\n飛來飛去尋找蟲寶可夢\n來填飽自己的肚子。"
