          shield: "かたいカラは　どんな　こうげきも\nはねかえす。　ひらいた　ときに\nなかを　こうげき　されると　よわい。"
        jp_kanji:
          sword: "２枚の殻を　開けたり　閉じたり\nすることで　後ろ向きに　泳ぐ。\nそのスピードは　けっこう　速い。"
          shield: "硬い　殻は　どんな　攻撃も\n跳ねかえす。　開いたときに\n中を　攻撃されると　弱い。"
        en:
          sword: "It swims facing backward by opening and closing\nits two-piece shell. It is surprisingly fast."
          shield: "Its hard shell repels any kind of attack. It is\nvulnerable only when its shell is open."
        fr:
          sword: "Il nage vers l’arrière à grande vitesse en ouvrant\npuis refermant sa coquille."
          shield: "Sa coquille est si résistante qu’elle repousse\ntoutes les attaques. En revanche, il est vulnérable\nquand celle-ci s’ouvre."
        it:
          sword: "Nuota all’indietro aprendo e chiudendo le\ndue valve. È sorprendentemente rapido."
          shield: "La sua conchiglia dura respinge ogni tipo\ndi attacco. È vulnerabile solo quando apre\nle valve."
        de:
          sword: "Es schwimmt rückwärts, indem es seine Schale\nöffnet und schließt, und ist damit überraschend\nschnell."
          shield: "Eine harte Schale schützt dieses Pokémon.\nNur wenn es diese öffnet, wird es verwundbar."
        es:
          sword: "Nada hacia atrás abriendo y cerrando su concha.\nEs sorprendentemente rápido."
          shield: "La concha lo protege de cualquier tipo de\nataque. Solo es vulnerable cuando se abre."
        ko:
          sword: "2개의 껍질을 여닫아서\n뒤쪽으로 헤엄친다.\n그 스피드는 제법 빠르다."
          shield: "단단한 껍데기는 어떤 공격도\n튕겨낸다. 껍데기를 열었을 때\n안쪽을 공격당하는 것에는 약하다."
        zh_simp:
          sword: "通过２片贝壳的不断开合\n来向后方游动。\n游动的速度相当快。"
          shield: "坚硬的壳能反弹任何攻击。\n壳打开时，如果里面的部分\n受到攻击，就会变得很脆弱。"
        zh_trad:
          sword: "透過２片貝殼的不斷開合\n來向後方游動。\n游動的速度相當快。"
          shield: "堅硬的殼能反彈任何攻擊。\n如果在殼張開時被攻擊到內部，\n就會變得十分脆弱。"
