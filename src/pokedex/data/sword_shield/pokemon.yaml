      descriptions:
        jp_kana:
          sword: "すなやまに　ししゃの　おんねんが\nやどり　ポケモンに　なった。\nあたまの　スコップは　おきにいり。"
          shield: "すなはまが　おもな　すみか。\nくちのなかに　てをいれた　あいてを\nあやつり　じぶんを　おおきくする。"
        jp_kanji:
          sword: "砂山に　死者の　怨念が　宿り\nポケモンに　なった。\n頭の　スコップは　お気に入り。"
          shield: "砂浜が　おもな　棲み処。\n口の中に　手を入れた　相手を\n操り　自分を　大きくする。"
        en:
          sword: "Grudges of the dead have possessed a mound of\nsand and become a Pokémon. Sandygast is fond\nof the shovel on its head."
          shield: "Sandygast mainly inhabits beaches. It takes\ncontrol of anyone who puts their hand into its\nmouth, forcing them to make its body bigger."
        fr:
          sword: "Ce Pokémon est né lorsqu’une âme rancunière\ns’est incarnée dans un pâté de sable. Il tient\nénormément à la pelle sur sa tête."
          shield: "Il vit principalement sur les plages de sable et\npeut agrandir son corps en prenant le contrôle\ndes gens qui mettent la main dans sa gueule."
        it:
          sword: "È nato quando uno spirito rancoroso si è\nimpossessato di una montagna di sabbia.\nTiene molto alla paletta che ha sul capo."
          shield: "Vive principalmente in spiagge sabbiose.\nAumenta di dimensioni prendendo il controllo\ndi chiunque gli metta una mano in bocca."
        de:
          sword: "Es entstand aus einem Sandhaufen, in den der\nGroll eines Verstorbenen fuhr. Die Schaufel auf\nSankabuhs Kopf ist sein größter Schatz."
          shield: "Für gewöhnlich lebt es an Stränden. Es kann alle\nkontrollieren, die ihre Hand in sein Maul stecken,\nund bringt sie dazu, seinen Körper zu vergrößern."
        es:
          sword: "Nace de un montículo de arena poseído por el\nresentimiento de un difunto. Siente mucho apego\npor la pala de su cabeza."
          shield: "Suele habitar en playas. Aumenta de tamaño al\ntomar control de todo aquel que se atreva a\nintroducir la mano en su boca."
        ko:
          sword: "모래산에 죽은 자의 원념이\n깃들어 포켓몬이 되었다.\n머리의 삽을 마음에 들어 한다."
          shield: "주로 모래사장에 산다.\n입안에 손을 넣은 상대를\n조종하여 자신을 크게 만든다."
        zh_simp:
          sword: "死者的怨念附着在\n沙丘上，变成了宝可梦。\n很喜欢头上的小铲子。"
          shield: "主要栖息在沙滩上。\n操纵把手伸进自己嘴里的\n对手，从而让自己变得更大。"
        zh_trad:
          sword: "死者的怨念附在沙丘上，\n從而變成的寶可夢。\n很喜歡頭上的鏟子。"
          shield: "主要棲息在沙灘上。會操縱\n把手伸進自己嘴巴裡的對手，\n藉此讓自己的身體變得更大。"
palossand:
  species_id: 770
  names:
    jp_kana: シロデスナ
    jp_kanji: シロデスナ
    en: Palossand
    fr: Trépassable
    it: Palossand
    de: Colossand
    es: Palossand
    ko: 모래성이당
    zh_simp: 噬沙堡爷
    zh_trad: 噬沙堡爺
  forms:
    palossand:
      form_id: 0
      base_stats:
        hp: 85
        attack: 75
        defense: 110
        special_attack: 100
        special_defense: 75
        speed: 35
      evs_yield:
        hp: 0
        attack: 0
        defense: 2
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ghost
        - ground
      egg_groups:
        - amorphous
      abilities:
        - water_compaction
      hidden_ability: sand_veil
      held_items:
        rare: spell_tag
      descriptions:
        jp_kana:
          sword: "ビーチの　あくむとも　よばれる。\nすなを　あやつって　えものを\nしずめ　たましいを　すいとる。"
          shield: "ビーチに　すむが　みずが　きらい。\nはげしい　あめに　うたれると\nおしろの　かたちを　たもてない。"
        jp_kanji:
          sword: "ビーチの　悪夢とも　呼ばれる。\n砂を　操って　獲物を　沈め\n魂を　吸い取る。"
          shield: "ビーチに　棲むが　水が　嫌い。\n激しい　雨に　打たれると\nお城の　形を　保てない。"
        en:
          sword: "Palossand is known as the Beach Nightmare. It\npulls its prey down into the sand by controlling\nthe sand itself, and then it sucks out their souls."
          shield: "This Pokémon lives on beaches, but it hates\nwater. Palossand can’t maintain its castle-like\nshape if it gets drenched by a heavy rain."
        fr:
          sword: "On l’appelle aussi le « cauchemar des plages ».\nIl contrôle le sable pour ensevelir ses proies\net aspirer leur âme."
          shield: "Bien qu’il déteste l’eau, il vit sur les plages.\nQuand la pluie s’abat sur lui, il est incapable\nde conserver sa forme de château de sable."
        it:
          sword: "Viene chiamato anche “Incubo della spiaggia”.\nControlla la sabbia per far sprofondare la preda\ne assorbirne l’anima."
          shield: "Vive sulla spiaggia ma odia l’acqua.\nSotto una pioggia violenta, non riesce a\nmantenere la sua forma di castello di sabbia."
        de:
          sword: "Colossand wird auch als „Schrecken der Strände“\nbezeichnet. Es manipuliert Sand, um seine Beute\nzu begraben und sich ihre Seele einzuverleiben."
          shield: "Es lebt an Stränden, obwohl es Wasser hasst.\nWird es von starkem Regen erwischt, so kann es\nseine sandburgartige Form nicht aufrechterhalten."
        es:
          sword: "Lo apodan la Pesadilla de las Playas. Hunde a\nsus presas en la arena para luego absorberles la\nenergía vital."
          shield: "Habita en las playas, aunque odia el agua.\nCuando caen fuertes lluvias, no es capaz de\npreservar su forma de castillo."
        ko:
          sword: "해변의 악몽이라고도 불린다.\n모래를 조종하여 먹이를\n가라앉힌 뒤 영혼을 흡수한다."
          shield: "해변에 살지만 물을 싫어한다.\n세찬 비를 맞으면\n성의 형태를 유지하지 못한다."
        zh_simp:
          sword: "也被称为沙滩的噩梦。\n会操控沙子让猎物陷入沙中，\n然后吸取其灵魂。"
          shield: "虽然住在沙滩上，但是\n讨厌水。要是淋了大雨，\n就无法维持城堡的造型。"
        zh_trad:
          sword: "也被稱為「海灘惡夢」。\n會操控沙子淹沒獵物，\n然後吸取對方的靈魂。"
          shield: "雖然住在海灘上，但很討厭水。\n要是被激烈的大雨淋到，\n就沒辦法維持城堡的形狀。"
pyukumuku:
  species_id: 771
  names:
    jp_kana: ナマコブシ
    jp_kanji: ナマコブシ
    en: Pyukumuku
    fr: Concombaffe
    it: Pyukumuku
    de: Gufa
    es: Pyukumuku
    ko: 해무기
    zh_simp: 拳海参
    zh_trad: 拳海參
  forms:
    pyukumuku:
      form_id: 0
      base_stats:
        hp: 55
