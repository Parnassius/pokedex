      descriptions:
        jp_kana:
          sword: "トゲで　がんばんに　キズを　つけると\nしょくしゅの　せんたんを　あてて\nえいようを　きゅうしゅうする。"
          shield: "はがねより　かたい　トゲを　もつ。\nしょくしゅの　トゲを　つきさし\nいわかべを　はって　いどうする。"
        jp_kanji:
          sword: "トゲで　岩盤に　キズを　つけると\n触手の　先端を　あてて\n栄養を　吸収する。"
          shield: "鋼より　硬い　棘を　もつ。\n触手の　棘を　突き刺し\n岩壁を　這って　移動する。"
        en:
          sword: "This Pokémon scrapes its spikes across rocks,\nand then uses the tips of its feelers to absorb\nthe nutrients it finds within the stone."
          shield: "Its spikes are harder than steel. This Pokémon\ncrawls across rock walls by stabbing the spikes\non its feelers into the stone."
        fr:
          sword: "Il fissure la roche avec ses épines pour ensuite\nabsorber les nutriments qui s’y trouvent grâce\nà l’extrémité de ses tentacules."
          shield: "Ses épines sont plus solides que l’acier.\nIl plante celles de ses tentacules dans les parois\nrocheuses pour se déplacer."
        it:
          sword: "Scalfisce gli strati rocciosi con i suoi aculei\ne utilizza le estremità delle sue antenne per\nestrarne gli elementi di cui si nutre."
          shield: "I suoi aculei sono più duri dell’acciaio.\nQuelli che ha sulle antenne gli permettono di\nfar presa sulle pareti rocciose per spostarsi."
        de:
          sword: "Es kratzt mit seinen Dornen Kerben in Felswände\nund extrahiert dann mit den Dornenspitzen an\nseinen Schlingen Nährstoffe aus dem Gestein."
          shield: "Seine Dornen sind härter als Stahl. Es bewegt sich\nfort, indem es seine dornengespickten Schlingen\nin Felswänden verhakt und sich vorwärtszieht."
        es:
          sword: "Raya el lecho rocoso con las púas para luego\nabsorber nutrientes con el extremo de los\ntentáculos."
          shield: "Sus púas son más duras que el acero. Se aferra\ny desplaza por paredes rocosas usando las que\ntiene en los tentáculos como ganchos."
        ko:
          sword: "가시로 암반에 상처를 낸 다음\n촉수 끝을 이용해서\n영양분을 흡수한다."
          shield: "강철보다 견고한 가시를 갖고 있다.\n촉수 가시를 찔러서\n바위 벽을 기어 다니며 이동한다."
        zh_simp:
          sword: "用尖刺刺裂岩壁之后，\n它会用触手的尖端\n接触裂缝吸收营养。"
          shield: "拥有比钢铁还坚硬的尖刺。\n会利用触手上的尖刺\n攀附在岩壁上移动。"
        zh_trad:
          sword: "用尖刺刺裂岩壁之後，\n牠會用觸手的尖端\n接觸裂縫吸收營養。"
          shield: "擁有比鋼鐵還堅硬的尖刺。\n會利用觸手上的尖刺\n攀附在岩壁上移動。"
