          shield: "暑い　季節が　終わると　空気を\nたくさん　含んだ　体毛に\n生え変わり　寒さに　備える。"
        en:
          sword: "Lopunny is constantly monitoring its surroundings.\nIf danger approaches, this Pokémon responds\nwith superdestructive kicks."
          shield: "Once hot seasons are over, Lopunny’s coat will\nbe replaced with fur that holds a lot of insulating\nair in preparation for colder weather."
        fr:
          sword: "Constamment sur le qui-vive, il donne\ndes coups de pied particulièrement\ndévastateurs si une menace approche."
          shield: "À la fin de la saison chaude, il mue et se recouvre\nd’une fourrure épaisse et légère pour se préparer\nà affronter le froid hivernal."
        it:
          sword: "Presta sempre attenzione all’ambiente\ncircostante e in caso di pericolo sfodera calci\ndi straordinaria potenza distruttiva."
          shield: "Terminata la stagione calda, si prepara all’arrivo\ndel freddo coprendosi di una pelliccia soffice\ne vaporosa."
        de:
          sword: "Schlapor behält seine Umgebung stets im Auge.\nWenn Gefahr im Verzug ist, setzt es sich mit\nvernichtenden Tritten zur Wehr."
          shield: "Ist die heiße Jahreszeit vorbei, wechselt sein Fell\nzu einer Wollfaser, die viel Luft umschließt.\nSo schützt sich Schlapor gegen die Kälte."
        es:
          sword: "Está siempre atento a lo que ocurre a su\nalrededor. Si advierte peligro, se defenderá\ncon patadas de potencia devastadora."
          shield: "Cuando acaba la estación más tórrida, le crece\nun nuevo pelaje muy mullido que lo prepara para\nel frío."
        ko:
          sword: "주위 상황을 항상 신경 쓰고 있으며\n위험이 닥치면 무시무시한 파괴력을\n가진 킥을 날린다."
          shield: "더운 계절이 끝나면 공기를\n많이 머금은 털로 털갈이를 하여\n추위에 대비한다."
        zh_simp:
          sword: "一直注意着周围的状况，\n遇到危险时便会施展\n破坏力超群的踢击。"
          shield: "当高温的季节结束后，\n就会换上富含空气的\n体毛，准备抵御寒冷。"
        zh_trad:
          sword: "總是注意著周圍的狀況。\n危險逼近時，就會給對手\n奉上破壞力十足的踢腿。"
          shield: "炎熱的季節結束後，\n就會換上富含空氣的\n體毛以備寒天來臨。"
