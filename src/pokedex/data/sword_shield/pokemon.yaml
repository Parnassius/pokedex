          shield: "グレイシアが　はなつ　れいきは\nパウダースノーを　つくりだす。\nスキーじょうに　ひっぱりだこ。"
        jp_kanji:
          sword: "ダイヤモンドダストを　降らせる。\n美しさに　見惚れた　獲物は\n気づかぬうちに　凍りついている。"
          shield: "グレイシアが　放つ　冷気は\nパウダースノーを　つくりだし\nスキー場に　ひっぱりだこ。"
        en:
          sword: "Any who become captivated by the beauty of\nthe snowfall that Glaceon creates will be frozen\nbefore they know it."
          shield: "The coldness emanating from Glaceon causes\npowdery snow to form, making it quite a popular\nPokémon at ski resorts."
        fr:
          sword: "Totalement subjuguées par la beauté des cristaux\nde glace qu’il fait tomber, ses proies ne réalisent\nque trop tard qu’elles sont en train de geler."
          shield: "Ce Pokémon exhale un vent glacial qui crée\nune neige poudreuse. Sa présence est très\nappréciée dans les stations de ski."
        it:
          sword: "Crea dei meravigliosi cristalli di ghiaccio per\nammaliare le prede, che si ritrovano congelate\nsenza neanche rendersene conto."
          shield: "L’aria gelida emessa da Glaceon genera una\nneve molto sottile, perfetta per le piste da sci."
        de:
          sword: "Glaziola erzeugt ein Diamantstaubgestöber, um\nBeute mit seiner Schönheit so zu verzaubern,\ndass es sie unbemerkt einfrieren kann."
          shield: "Die kalte Luft, die Glaziola abgibt, erzeugt\nPulverschnee. In Skigebieten erfreut es sich\ndaher großer Beliebtheit."
        es:
          sword: "Desprende cristales de hielo. Sus presas\nse quedan congeladas sin darse cuenta,\nencandiladas por su belleza."
          shield: "El aire gélido que exhala crea una suerte de\ncristales de hielo que lo hace muy demandado\nen las estaciones de esquí."
        ko:
          sword: "다이아몬드더스트를 내리게 한다.\n그 아름다움에 현혹된 먹이는\n눈치채기도 전에 얼어붙어 버린다."
          shield: "글레이시아가 발산하는 냉기는\n가루눈을 만들어 내기 때문에\n스키장에서 인기가 높다."
        zh_simp:
          sword: "能够降下冰晶。\n被它的美貌迷住的猎物\n会在不知不觉间被冻住。"
          shield: "冰伊布释放出的冷气能\n制造出粉状的雪。这使它受到\n各个滑雪场的热烈欢迎。"
        zh_trad:
          sword: "能夠降下冰晶。\n被牠的美貌迷住的獵物\n會在不知不覺間被凍住。"
          shield: "冰伊布釋放出的冷氣能\n製造出粉狀的雪。這使牠受到\n各個滑雪場的熱烈歡迎。"
