        en:
          sword: "It quickly swings its four arms to rock its\nopponents with ceaseless punches and chops\nfrom all angles."
          shield: "With four arms that react more quickly than it\ncan think, it can execute many punches at once."
        fr:
          sword: "Il peut bouger ses quatre bras à grande vitesse\net frapper du poing ou du tranchant de la main\ndans toutes les directions sans se fatiguer."
          shield: "Il enchaîne les coups de poing avec ses quatre\nbras à une vitesse surprenante."
        it:
          sword: "Agita velocemente le quattro braccia\ntempestando gli avversari di pugni\ne colpi da ogni direzione."
          shield: "Muove le sue quattro braccia per riflesso prima\nancora di rendersene conto, sferrando pugni a\nraffica."
        de:
          sword: "Es verwendet seine vier Arme, um seine Gegner\nunermüdlich mit schnellen Schlägen aus allen\nWinkeln einzudecken."
          shield: "Seine vier Arme reagieren schneller, als es\ndenken kann. Daher ist es in der Lage, unzählige\nSchläge reflexartig auszuführen."
        es:
          sword: "Mueve rápidamente sus cuatro brazos para\nasestar incesantes golpes y puñetazos desde\ntodos los ángulos."
          shield: "Puede dar varios puñetazos de una sola vez\ngracias a sus cuatro brazos. Golpea más rápido\nde lo que piensa."
        ko:
          sword: "4개의 팔을 재빠르게 움직여서\n모든 각도에서 쉬지 않고\n펀치와 당수를 날린다."
          shield: "4개의 팔은 생각하는 것보다\n빠르게 반사적으로 움직이며\n여러 발의 펀치를 날린다."
        zh_simp:
          sword: "能够迅速活动４只手臂，\n从各个角度毫不停歇地\n使出拳击或手刀。"
          shield: "４只手臂在思考之前\n就会反射性地行动，\n使出多发拳击。"
        zh_trad:
          sword: "能夠迅速活動４隻手臂，\n從各種角度毫不停歇地\n使出拳擊或手刀。"
          shield: "４隻手臂在思考之前\n就會反射性地行動，\n使出多發拳擊。"
  gmax_forms:
    machamp_gigantamax:
      form_id: 999
      names:
        jp_kana: キョダイマックス
        jp_kanji: キョダイマックス
        en: Gigantamax
        fr: Gigamax
        it: Gigamax
        de: Gigadynamax
        es: Gigamax
        ko: 거다이맥스
        zh_simp: 超极巨化
        zh_trad: 超極巨化
      descriptions:
        jp_kana:
          sword: "キョダイマックス　パワーが　うでに\nみなぎり　ばくだんに　ひってきする\nはかいりょくの　パンチを　くりだす。"
          shield: "けたはずれに　アップした　かいりきで\nこまっている　おおがたせんを　かつぎ\nみなとまで　はこんだことが　ある。"
        jp_kanji:
          sword: "キョダイマックスの　パワーが　腕に\nみなぎり　爆弾に　匹敵する\n破壊力の　パンチを　繰りだす。"
          shield: "けた外れに　アップした　怪力で\n困っている　大型船を　担ぎ\n港まで　運んだことが　ある。"
        en:
          sword: "The Gigantamax energy coursing through its arms\nmakes its punches hit as hard as bomb blasts."
          shield: "One of these Pokémon once used its\nimmeasurable strength to lift a large ship that\nwas in trouble. It then carried the ship to port."
        fr:
          sword: "La puissance du Gigamax s’est concentrée\ndans ses bras, et ses coups de poing sont\nmaintenant aussi destructeurs que des bombes."
          shield: "Sa puissance démultipliée lui a un jour permis\nde soulever un paquebot en détresse pour\nle ramener jusqu’au port."
        it:
          sword: "L’energia del fenomeno Gigamax concentrata\nnelle sue braccia dà ai suoi pugni la potenza\ndistruttiva di una bomba."
          shield: "Grazie all’aumento vertiginoso della sua forza,\nin un’occasione ha sollevato di peso un’enorme\nnave in difficoltà e l’ha ricondotta nel porto."
        de:
          sword: "Gigadynamax-Energie durchströmt seine Arme.\nMit ihnen teilt es Schläge aus, die ähnlich\nzerstörerisch sind wie detonierende Bomben."
          shield: "Mit seiner ins Unermessliche gestiegenen Stärke\nhat es einst ein großes, in Seenot geratenes\nSchiff bis zum nächsten Hafen getragen."
        es:
          sword: "La energía del fenómeno Gigamax se concentra\nen sus brazos y le otorga una fuerza destructiva\ncomparable a la de una bomba."
          shield: "Gracias a su tremendo incremento de fuerza,\npuede cargar con embarcaciones de gran tamaño\nque estén en dificultades y llevarlas a puerto."
        ko:
          sword: "거다이맥스의 파워가 팔에\n넘쳐흘러 폭탄의 파괴력을 가진\n펀치를 날린다."
          shield: "월등히 높아진 괴력으로\n곤경에 처한 대형선을 이고\n항구까지 운반한 적이 있다."
        zh_simp:
          sword: "手臂里充斥着超极巨化之力，\n因此能施展出破坏力\n不亚于炸弹的拳击。"
          shield: "怪力提升到了惊人境界，\n甚至曾经把受困的大型\n船只整艘扛到了港口。"
        zh_trad:
          sword: "手臂裡充斥著超極巨化之力，\n因此能施展出破壞力\n不亞於炸彈的拳擊。"
          shield: "怪力提升到了驚人境界，\n甚至曾經把受困的大型\n船隻整艘扛到了港口。"
tentacool:
  species_id: 72
  names:
    jp_kana: メノクラゲ
    jp_kanji: メノクラゲ
    en: Tentacool
    fr: Tentacool
    it: Tentacool
    de: Tentacha
    es: Tentacool
    ko: 왕눈해
    zh_simp: 玛瑙水母
    zh_trad: 瑪瑙水母
  forms:
    tentacool:
      form_id: 0
      base_stats:
        hp: 40
        attack: 40
        defense: 35
        special_attack: 50
        special_defense: 100
        speed: 70
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 1
        speed: 0
      types:
        - water
        - poison
      egg_groups:
        - water_3
      abilities:
        - clear_body
        - liquid_ooze
      hidden_ability: rain_dish
      held_items:
        rare: poison_barb
      descriptions:
        jp_kana:
          sword: "およぐ　ちからは　つよくは　ない。\nあさい　うみの　みなもを\nただよいながら　エモノを　さがす。"
          shield: "ほとんどが　すいぶんで　できている\nからだは　うみの　なかでは　みずと\nどうかして　とても　みえづらいのだ。"
        jp_kanji:
          sword: "泳ぐ　力は　強くは　ない。\n浅い　海の　水面を\n漂いながら　獲物を　探す。"
          shield: "ほとんどが　水分で　できている。\n体は　海の中では　水と　同化して\nとても　見えづらいのだ。"
        en:
          sword: "Tentacool is not a particularly strong swimmer.\nIt drifts across the surface of shallow seas as it\nsearches for prey."
          shield: "This Pokémon is mostly made of water.\nA Tentacool out in the ocean is very hard to\nspot, because its body blends in with the sea."
        fr:
          sword: "Peu doué pour la natation, ce Pokémon\nse contente de flotter à la surface des eaux\npeu profondes pour chasser ses proies."
          shield: "Il est presque totalement composé d’eau.\nLorsqu’il s’immerge dans les flots, son corps se\nfond dans l’eau, ce qui le rend presque invisible."
        it:
          sword: "Non essendo molto abile a nuotare, va in cerca\ndi prede fluttuando in acque poco profonde."
          shield: "Il suo corpo composto quasi interamente\nd’acqua rende molto difficile individuarlo\nquando è in mare."
        de:
          sword: "Da Tentacha kein besonders guter Schwimmer ist,\ntreibt es in seichten Gewässern an der\nWasseroberfläche und sucht nach Beute."
          shield: "Tentacha besteht fast vollständig aus Wasser,\nwodurch man es im Meer nur sehr schwer\nerkennen kann."
        es:
          sword: "Sus facultades natatorias son más bien escasas,\npor lo que se limita a flotar a la deriva en aguas\npoco profundas en busca de alimento."
          shield: "Su cuerpo está compuesto casi por completo de\nagua, por lo que resulta muy difícil distinguirlo\ncuando está sumergido en el mar."
        ko:
          sword: "헤엄치는 힘은 강하지 않다.\n얕은 바다 수면을 떠다니면서\n먹이를 찾는다."
          shield: "몸의 대부분이 수분이어서\n바닷속에서는 물과\n동화되어 매우 구분하기 힘들다."
        zh_simp:
          sword: "游泳能力并不强。\n会漂浮在浅海的水面上\n寻找猎物。"
          shield: "身体的大部分由水组成。\n在海中，会和海水混为一体，\n非常难以发现。"
        zh_trad:
          sword: "游泳的力道並不強。\n會漂浮在淺海的水面上\n尋找獵物。"
          shield: "絕大部分都是由水組成的身體\n在海中會與海水同化，\n令其他生物很難看見牠。"
tentacruel:
  species_id: 73
  names:
    jp_kana: ドククラゲ
    jp_kanji: ドククラゲ
    en: Tentacruel
    fr: Tentacruel
    it: Tentacruel
    de: Tentoxa
    es: Tentacruel
    ko: 독파리
    zh_simp: 毒刺水母
    zh_trad: 毒刺水母
  forms:
    tentacruel:
      form_id: 0
      base_stats:
        hp: 80
        attack: 70
        defense: 65
        special_attack: 80
        special_defense: 120
        speed: 100
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 2
        speed: 0
      types:
        - water
        - poison
      egg_groups:
        - water_3
      abilities:
        - clear_body
        - liquid_ooze
      hidden_ability: rain_dish
      held_items:
        rare: poison_barb
      descriptions:
        jp_kana:
          sword: "あたまの　あかい　たまの　ひかりが\nつよくなったら　ようちゅうい。\nちょうおんぱを　はなつ　まえぶれだ。"
          shield: "８０ぽんの　しょくしゅは　のびちぢみ\nじゆう。　あみの　ように　ひろげて\nエモノを　とらえ　どくバリを　さす。"
        jp_kanji:
          sword: "頭の　赤い　玉の　光が\n強くなったら　要注意。\n超音波を　放つ　前触れだ。"
          shield: "８０本の　触手は　伸び縮み　自由。\n網のように　広げて\n獲物を　捕らえ　毒バリを　刺す。"
        en:
          sword: "When the red orbs on Tentacruel’s head glow\nbrightly, watch out. The Pokémon is about to\nfire off a burst of ultrasonic waves."
          shield: "Its 80 tentacles can stretch and shrink freely.\nTentacruel ensnares prey in a net of spread-out\ntentacles, delivering venomous stings to its catch."
        fr:
          sword: "Il faut faire attention lorsque les globes rouges\nsur sa tête se mettent à briller intensément,\ncar c’est qu’il s’apprête à émettre des ultrasons."
          shield: "Il peut allonger ses 80 tentacules à volonté et\nles utiliser comme un filet pour attraper sa proie\net la transpercer de ses pics empoisonnés."
        it:
          sword: "Meglio fare attenzione quando le sfere rosse\nche ha sulla testa brillano intensamente, perché\nvuol dire che sta per emettere ultrasuoni."
          shield: "Può allungare e accorciare a piacere i suoi 80\ntentacoli. Li estende a mo’ di rete per catturare\nle prede, che trafigge con aculei velenosi."
        de:
          sword: "Leuchten die roten Kugeln auf seinem Kopf stark\nauf, ist Vorsicht geboten, da es kurz danach\nUltraschallwellen ausstoßen wird."
          shield: "Tentoxa kann seine 80 Tentakel beliebig\nausfahren und einziehen. Es breitet sie netzartig\naus, um Beute zu fangen und dann zu vergiften."
        es:
          sword: "Si las esferas rojas que tiene a ambos lados de la\ncabeza brillan con intensidad, indica que está a\npunto de lanzar ondas ultrasónicas."
          shield: "Puede estirar y contraer con total libertad sus\n80 tentáculos. Con ellos atrapa a sus presas y\nles inyecta un veneno debilitante."
        ko:
          sword: "머리의 빨간 구슬이\n밝게 빛나면 주의가 필요하다.\n초음파를 발산하려는 전조다."
          shield: "80개의 촉수는 자유롭게 늘어났다가\n줄어든다. 그물처럼 펼쳐서\n먹이를 잡고 독바늘로 찌른다."
        zh_simp:
          sword: "如果看到它头上红色珠子\n发出的光变强了，就需要提高警惕。\n那是它即将释放超音波的前兆。"
          shield: "８０根触手伸缩自如。\n会像撒网那样伸开触手\n抓住猎物并刺入毒针。"
        zh_trad:
          sword: "當牠頭上紅色珠子的光芒\n變強時，就得提高警覺了。\n那是牠發射超音波的前兆。"
          shield: "能夠自由伸縮身上的８０根觸手。\n會像撒網般張開觸手捕捉獵物，\n並用毒針注入劇毒。"
ponyta:
  species_id: 77
  names:
    jp_kana: ポニータ
    jp_kanji: ポニータ
    en: Ponyta
    fr: Ponyta
    it: Ponyta
    de: Ponita
    es: Ponyta
    ko: 포니타
    zh_simp: 小火马
    zh_trad: 小火馬
  forms:
    ponyta:
      form_id: 0
      base_stats:
        hp: 50
        attack: 85
        defense: 55
        special_attack: 65
        special_defense: 65
        speed: 90
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - fire
      egg_groups:
        - field
      abilities:
        - run_away
        - flash_fire
      hidden_ability: flame_body
      descriptions:
        jp_kana:
          sword: "うまれたばかりは　はしるのが　へた。\nなかまと　かけっこを　するうちに\nあしこしが　つよく　そだっていく。"
          shield: "ポニータに　みとめられると\nもえる　たてがみに　さわっても\nふしぎと　あつくなくなるのだ。"
        jp_kanji:
          sword: "生まれたばかりは　走るのが　へた。\n仲間と　かけっこを　するうちに\n足腰が　強く　育っていく。"
          shield: "ポニータに　認められると\n燃える　たてがみに　触っても\n不思議と　熱くなくなるのだ。"
        en:
          sword: "It can’t run properly when it’s newly born.\nAs it races around with others of its kind,\nits legs grow stronger."
          shield: "If you’ve been accepted by Ponyta, its burning\nmane is mysteriously no longer hot to the touch."
        fr:
          sword: "À la naissance, il ne court pas très vite.\nC’est en faisant la course avec ses camarades\nqu’il se muscle les jambes."
          shield: "Il semblerait qu’une fois qu’un Dresseur a gagné\nla confiance de Ponyta, sa crinière enflammée\nne le brûle plus au toucher."
        it:
          sword: "Appena nato non è un buon corridore, ma col\ntempo irrobustisce le sue zampe rincorrendo\ni suoi simili."
          shield: "Una volta conquistata la fiducia di Ponyta,\nè possibile toccare la sua criniera infuocata\nsenza scottarsi."
        de:
          sword: "Nach der Geburt fällt ihm das Laufen schwer.\nDie Wettrennen, die es sich mit seinen Freunden\nliefert, stärken jedoch seine Beinmuskulatur."
          shield: "Hat man erst einmal das Vertrauen eines Ponitas\ngewonnen, kann man seltsamerweise sogar seine\nfeurige Mähne anfassen, ohne sich zu verbrennen."
        es:
          sword: "Al nacer es un poco lento, pero va fortaleciendo\nlas patas paulatinamente al disputar carreras con\nsus congéneres."
          shield: "Por extraño que parezca, una vez que alguien\nse ha hecho merecedor de su confianza, puede\ntocarle la ardiente crin sin quemarse."
        ko:
          sword: "갓 태어났을 때는 달리는 것이 서툴다.\n동료와 달리기 경주를 하는 사이에\n하반신이 튼튼하게 성장한다."
          shield: "포니타에게 인정받으면\n타오르는 갈기를 만져도\n뜨거움을 느끼지 않게 된다."
        zh_simp:
          sword: "刚出生的时候不擅长奔跑，\n但随着和伙伴们不断地赛跑，\n会逐渐锻炼出强健的脚力。"
          shield: "得到了小火马认可的人，\n在触摸它燃烧着的鬃毛时\n不会觉得烫手，真是不可思议。"
        zh_trad:
          sword: "剛出生的時候不擅長奔跑，\n但隨著和夥伴們不斷地賽跑，\n會逐漸鍛鍊出強健的腳力。"
          shield: "得到了小火馬認可的人，\n在觸摸牠燃燒著的鬃毛時\n不會覺得燙手，真是不可思議。"
    ponyta_galarian_form:
      form_id: 1
      names:
        jp_kana: ガラルのすがた
        jp_kanji: ガラルのすがた
        en: Galarian Form
        fr: Forme de Galar
        it: Forma di Galar
        de: Galar-Form
        es: Forma de Galar
        ko: 가라르의 모습
        zh_simp: 伽勒尔的样子
        zh_trad: 伽勒爾的樣子
      base_stats:
        hp: 50
        attack: 85
        defense: 55
        special_attack: 65
        special_defense: 65
        speed: 90
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - psychic
      egg_groups:
        - field
      abilities:
        - run_away
        - pastel_veil
      hidden_ability: anticipation
      descriptions:
        jp_kana:
          sword: "ちいさな　ツノに　いやしの　ちからを\nひめている。　ちょっとした　キズなら\nツノを　すりよせ　なおして　くれる。"
          shield: "ひとみを　のぞいて　こころを　よむ。\nよこしまな　きもちを　みつけると\nたちまち　すがたを　けしてしまう。"
        jp_kanji:
          sword: "小さな　ツノに　癒しの　力を\n秘めている。　ちょっとした　傷なら\nツノを　すり寄せ　治して　くれる。"
          shield: "瞳を　覗いて　心を　読む。\nよこしまな　気持ちを　見つけると\nたちまち　姿を　消してしまう。"
        en:
          sword: "Its small horn hides a healing power. With a few\nrubs from this Pokémon’s horn, any slight wound\nyou have will be healed."
          shield: "This Pokémon will look into your eyes and read\nthe contents of your heart. If it finds evil there,\nit promptly hides away."
        fr:
          sword: "Sa petite corne possède des vertus curatives.\nSi une blessure n’est pas trop grave, il n’a qu’à\nla toucher de sa corne pour qu’elle guérisse."
          shield: "Il peut lire l’esprit de n’importe qui en regardant\nla personne dans les yeux. S’il détecte une pensée\nimpure, il disparaît immédiatement."
        it:
          sword: "Il suo piccolo corno possiede poteri curativi.\nPuò guarire una ferita non troppo grave\nappoggiandovi sopra il corno."
          shield: "È in grado di leggere nel pensiero di chi ha\ndavanti guardandolo negli occhi. Se percepisce\nsentimenti malvagi, scompare all’istante."
        de:
          sword: "In seinem kleinen Horn stecken heilende Kräfte.\nEs heilt kleinere Wunden, indem es diese mit\nseinem Horn berührt."
          shield: "Ein Blick in die Augen seines Gegenübers reicht\nihm, um seine Absichten zu erkennen. Vor Leuten,\ndie böse Gedanken hegen, läuft es sofort davon."
        es:
          sword: "Su pequeño cuerno posee poderes curativos\ncapaces de sanar heridas no muy graves con\ntan solo un leve roce."
          shield: "Puede leerle la mente a cualquiera con tan solo\nmirarle a los ojos. Si detecta algún pensamiento\nruin, desaparece instantáneamente."
        ko:
          sword: "작은 뿔에 치유의 힘을\n숨기고 있다. 작은 상처라면\n뿔을 갖다 대서 치료해준다."
          shield: "눈동자를 들여다보고 마음을 읽는다.\n비뚤어진 마음을 발견하면\n홀연 모습을 감춰버린다."
        zh_simp:
          sword: "小小的角里蕴藏着治愈之力。\n如果只是一点小伤，它只要\n用角轻擦伤口就能治愈。"
          shield: "能从眼神中读取对方的内心。\n如果发现了邪恶的想法，\n就会在转眼间消失不见。"
        zh_trad:
          sword: "小小的角裡蘊藏著治癒之力。\n如果只是一點小傷，牠只要\n用角輕擦傷口就能治癒。"
          shield: "能從眼神中讀取對方的內心。\n如果發現了邪惡的想法，\n就會在轉眼間消失不見。"
rapidash:
  species_id: 78
  names:
    jp_kana: ギャロップ
    jp_kanji: ギャロップ
    en: Rapidash
    fr: Galopa
    it: Rapidash
    de: Gallopa
    es: Rapidash
    ko: 날쌩마
    zh_simp: 烈焰马
    zh_trad: 烈焰馬
  forms:
    rapidash:
      form_id: 0
      base_stats:
        hp: 65
        attack: 100
        defense: 70
        special_attack: 80
        special_defense: 80
        speed: 105
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 2
      types:
        - fire
      egg_groups:
        - field
      abilities:
        - run_away
        - flash_fire
      hidden_ability: flame_body
      descriptions:
        jp_kana:
          sword: "もえる　たてがみを　はためかせ\nじそく　２４０キロの　そくどで\nだいそうげんを　かけぬけるのだ。"
          shield: "いちばん　あしが　はやい　ものが\nリーダー。　むれが　いく　ばしょや\nはしる　そくどを　きめている。"
        jp_kanji:
          sword: "燃える　たてがみを　はためかせ\n時速　２４０キロの　速度で\n大草原を　駆けぬけるのだ。"
          shield: "いちばん　脚が　速い　ものが\nリーダー。　群れが　行く　場所や\n走る　速度を　決めている。"
        en:
          sword: "This Pokémon can be seen galloping through\nfields at speeds of up to 150 mph, its fiery mane\nfluttering in the wind."
          shield: "The fastest runner becomes the leader, and it\ndecides the herd’s pace and direction of travel."
        fr:
          sword: "Ce Pokémon traverse les plaines à plus\nde 240 km/h, sa crinière flamboyante flottant\nau vent."
          shield: "Au sein d’un troupeau, c’est le plus rapide qui\ndevient le chef. Il choisit les lieux où se rendre\net détermine la vitesse de galop."
        it:
          sword: "Sfreccia nelle praterie a una velocità di\n240 km/h, facendo sventolare la sua\ncriniera ardente."
          shield: "L’esemplare più veloce diventa il capo del\ngruppo e ne decide velocità e destinazione."
        de:
          sword: "Die lodernde Mähne dieses Pokémon flattert im\nWind, wenn es mit einer Geschwindigkeit von\n240 km/h über Felder und Wiesen galoppiert."
          shield: "Das schnellste Exemplar wird zum Anführer\nbestimmt und gibt als solcher den Zielort und\ndie Geschwindigkeit der Herde vor."
        es:
          sword: "Su ardiente crin ondea al viento mientras\natraviesa extensas praderas a una velocidad\nde 240 km/h."
          shield: "El ejemplar más rápido se convierte en el líder\nde la manada y decide tanto el ritmo de galope\ncomo su destino."
        ko:
          sword: "불타는 갈기를 휘날리며\n시속 240km의 속도로\n넓은 초원을 달려나간다."
          shield: "가장 발이 빠른 날쌩마가\n리더가 되어 무리가 갈 장소나\n달리는 속도를 정한다."
        zh_simp:
          sword: "任由燃烧的鬃毛随风飘扬，\n以每小时２４０公里的速度\n在大草原自由地驰骋。"
          shield: "奔跑速度最快的烈焰马\n会成为首领，决定族群\n前往的地点和奔跑速度。"
        zh_trad:
          sword: "任由燃燒的鬃毛隨風飄揚，\n以每小時２４０公里的速度\n在大草原上自在奔馳。"
          shield: "奔跑速度最快的烈焰馬\n會成為首領，決定族群\n前往的地點和奔跑速度。"
    rapidash_galarian_form:
      form_id: 1
      names:
        jp_kana: ガラルのすがた
        jp_kanji: ガラルのすがた
        en: Galarian Form
        fr: Forme de Galar
        it: Forma di Galar
        de: Galar-Form
        es: Forma de Galar
        ko: 가라르의 모습
        zh_simp: 伽勒尔的样子
        zh_trad: 伽勒爾的樣子
      base_stats:
        hp: 65
        attack: 100
        defense: 70
        special_attack: 80
        special_defense: 80
        speed: 105
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 2
      types:
        - psychic
        - fairy
      egg_groups:
        - field
      abilities:
        - run_away
        - pastel_veil
      hidden_ability: anticipation
      descriptions:
        jp_kana:
          sword: "ツノから　はなつ　サイコカッターは\nきょうりょく。　ぶあつい　てっぱんに\nあなを　あけるほどの　はかいりょく。"
          shield: "ゆうもうかかんで　ほこり　たかい。\nあしさきの　けに　サイコパワーを\nためて　かろやかに　もりを　かける。"
        jp_kanji:
          sword: "ツノから　放つ　サイコカッターは\n強力。　ぶ厚い　鉄板に\n穴を　開けるほどの　破壊力。"
          shield: "勇猛果敢で　誇り　高い。\n足先の　毛に　サイコパワーを\nためて　軽やかに　森を　駆ける。"
        en:
          sword: "Little can stand up to its psycho cut. Unleashed\nfrom this Pokémon’s horn, the move will punch\na hole right through a thick metal sheet."
          shield: "Brave and prideful, this Pokémon dashes airily\nthrough the forest, its steps aided by the psychic\npower stored in the fur on its fetlocks."
        fr:
          sword: "Sa corne lui permet d’utiliser la capacité Coupe\nPsycho de façon dévastatrice, et même de percer\ndes plaques d’acier renforcé."
          shield: "Un Pokémon très fier, à la bravoure sans limites.\nIl concentre ses pouvoirs psychiques dans\nses fanons pour traverser les forêts sans effort."
        it:
          sword: "La mossa Psicotaglio che può sferrare usando\nil corno è tanto potente da riuscire a perforare\nuna spessa lastra di ferro."
          shield: "È intrepido e orgoglioso. Corre leggiadro\nper i boschi concentrando i suoi poteri psichici\nnella peluria all’estremità delle zampe."
        de:
          sword: "Wenn es die Attacke Psychoklinge mit seinem\nHorn einsetzt, ist diese stark genug, um sogar\nLöcher in dicke Metallplatten zu bohren."
          shield: "Dieses kühne, stolze Pokémon speichert im Fell\nüber seinen Hufen Psycho-Kräfte, dank deren\nes leichtfüßig durch die Wälder galoppiert."
        es:
          sword: "El movimiento Psicocorte que realiza con su\ncuerno posee tal poder destructivo que hasta\npuede atravesar gruesas placas de metal."
          shield: "Es un Pokémon orgulloso y gallardo. Atraviesa\nbosques sin esfuerzo concentrando sus poderes\npsíquicos en el pelaje de las patas."
        ko:
          sword: "뿔에서 나오는 사이코커터는\n강력하다. 두꺼운 철판에\n구멍을 낼 정도의 파괴력을 가졌다."
          shield: "용맹하고 과감하며 자긍심이 높다.\n발끝의 털에 사이코 파워를\n모아 경쾌하게 숲을 달린다."
        zh_simp:
          sword: "会从犄角发射强力的精神利刃。\n那超群的破坏力甚至可以在\n厚厚的铁板上开出洞来。"
          shield: "勇猛果敢，自尊心强。\n会在蹄子上的毛里储存精神力量，\n在森林中轻快地奔跑。"
        zh_trad:
          sword: "會從角發射強力的精神利刃。\n那超群的破壞力甚至可以在\n厚厚的鐵板上開出洞來。"
          shield: "勇猛果敢，自尊心強。\n會在蹄上的毛裡儲存精神力量，\n在森林中輕快地奔跑。"
slowpoke:
  species_id: 79
  names:
    jp_kana: ヤドン
    jp_kanji: ヤドン
    en: Slowpoke
    fr: Ramoloss
    it: Slowpoke
    de: Flegmon
    es: Slowpoke
    ko: 야돈
    zh_simp: 呆呆兽
    zh_trad: 呆呆獸
  forms:
    slowpoke:
      form_id: 0
      base_stats:
        hp: 90
        attack: 65
        defense: 65
        special_attack: 40
        special_defense: 40
        speed: 15
      evs_yield:
        hp: 1
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - water
        - psychic
      egg_groups:
        - monster
        - water_1
      abilities:
        - oblivious
        - own_tempo
      hidden_ability: regenerator
      held_items:
        rare: lagging_tail
      descriptions:
        jp_kana:
          sword: "まぬけで　どんかん。　しっぽを\nたべられても　いたみを　かんじないし　\nはえかわったことにも　きづかない。"
          shield: "しっぽを　みずに　ひたすと　あまみが\nにじみでるので　それを　エサに\nポケモンを　おびきよせ　つりあげる。"
        jp_kanji:
          sword: "まぬけで　鈍感。　しっぽを\n食べられても　痛みを　感じないし\n生えかわったことにも　気づかない。"
          shield: "しっぽを　水に　浸すと　甘味が\nにじみ出るので　それを　エサに\nポケモンを　おびき寄せ　釣りあげる。"
        en:
          sword: "Slow-witted and oblivious, this Pokémon won’t\nfeel any pain if its tail gets eaten. It won’t notice\nwhen its tail grows back, either."
          shield: "When this Pokémon’s tail is soaked in water,\nsweetness seeps from it. Slowpoke uses this trait\nto lure in and fish up other Pokémon."
        fr:
          sword: "Il est si bête et si lent qu’il n’a pas mal lorsqu’on\nmange un morceau de sa queue. Il ne remarque\nmême pas quand elle repousse."
          shield: "Lorsqu’il trempe le bout de sa queue dans l’eau,\nune substance sucrée s’en dégage. Il s’en sert\npour appâter ses proies quand il pêche."
        it:
          sword: "Poco sveglio e privo di intuito. Se gli mangiano\nla coda non sente alcun dolore, e non si accorge\nnemmeno quando gli ricresce."
          shield: "Se immersa nell’acqua, la coda di Slowpoke\nsecerne una dolce linfa che il Pokémon usa\nper attirare altri Pokémon e pescarli."
        de:
          sword: "Es ist so träge und unempfindlich, dass es keinen\nSchmerz verspürt, wenn seine Rute gegessen wird.\nEs bemerkt nicht einmal, dass sie nachwächst."
          shield: "Taucht es seine Rute ins Wasser, strömt sie ein\nsüßes Aroma aus. Mit diesem Köder lockt es\nandere Pokémon an, die es dann an Land zieht."
        es:
          sword: "Es lento y abstraído. Aunque le devoren la cola,\nni siquiera se percata, ya que no siente ningún\ndolor. Tampoco nota cuando le vuelve a crecer."
          shield: "Hunde la cola en el agua y la usa cual caña de\npescar. La sustancia dulce que secreta le sirve\nde cebo para atraer a sus presas."
        ko:
          sword: "멍청하고 둔감하다.\n꼬리를 먹혀도 아픔을 느끼지 못하고\n꼬리가 다시 자라도 눈치채지 못한다."
          shield: "꼬리를 물에 담가두면\n단맛이 배어 나오기 때문에\n이를 미끼로 포켓몬을 유인해서 낚는다."
        zh_simp:
          sword: "又呆又迟钝。即使尾巴被吃了\n也感受不到疼痛，甚至不会\n注意到又长出了新尾巴。"
          shield: "把尾巴泡在水里后会有甜味渗出，\n因此它会以尾巴为诱饵\n吸引宝可梦并将其钓起。"
        zh_trad:
          sword: "呆頭呆腦而且遲鈍。尾巴\n被吃掉也不會感到疼痛，\n甚至不會發現它又長出來了。"
          shield: "尾巴浸在水裡時會滲出\n甜味，牠會以此當誘餌\n來吸引並且釣起寶可夢。"
    slowpoke_galarian_form:
      form_id: 1
      names:
        jp_kana: ガラルのすがた
        jp_kanji: ガラルのすがた
        en: Galarian Form
        fr: Forme de Galar
        it: Forma di Galar
        de: Galar-Form
        es: Forma de Galar
        ko: 가라르의 모습
        zh_simp: 伽勒尔的样子
        zh_trad: 伽勒爾的樣子
      base_stats:
        hp: 90
        attack: 65
        defense: 65
        special_attack: 40
        special_defense: 40
        speed: 15
      evs_yield:
        hp: 1
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - psychic
      egg_groups:
        - monster
        - water_1
      abilities:
        - gluttony
        - own_tempo
      hidden_ability: regenerator
      descriptions:
        jp_kana:
          sword: "いつも　ボーッとしているが　たまに\nかおつきが　ピリッと　ひきしまる。\nたべている　エサが　げんいんらしい。"
          shield: "ガラルちほうにだけ　せいそくする\nしょくぶつの　タネを　たべているため\nしっぽは　スパイシーな　あじわいだ。"
        jp_kanji:
          sword: "いつも　ボーッとしているが　たまに\n顔つきが　ピリッと　引き締まる。\n食べている　エサが　原因らしい。"
          shield: "ガラル地方にだけ　生息する\n植物の　タネを　食べているため\nしっぽは　スパイシーな　味わいだ。"
        en:
          sword: "Although this Pokémon is normally zoned out,\nits expression abruptly sharpens on occasion.\nThe cause for this seems to lie in Slowpoke’s diet."
          shield: "Because Galarian Slowpoke eat the seeds of a\nplant that grows only in Galar, their tails have\ndeveloped a spicy flavor."
        fr:
          sword: "Bien qu’il ait toujours l’air un peu absent,\nil arrive que son visage se crispe brusquement.\nSon alimentation serait à l’origine du phénomène."
          shield: "Son alimentation à base de graines\nde plantes endémiques de Galar\nconfère à sa queue un goût épicé."
        it:
          sword: "Ha sempre un’aria assente, ma a volte il suo viso\nsi contrae improvvisamente in una smorfia. Pare\nche questo sia dovuto alla sua alimentazione."
          shield: "Si nutre di semi di piante che crescono solo nella\nregione di Galar. La sua dieta conferisce un gusto\npiccante alla sua coda."
        de:
          sword: "Es blickt zwar stets geistesabwesend drein, doch\nhin und wieder wird sein Ausdruck einen Moment\nlang hart. Der Grund dafür soll sein Futter sein."
          shield: "Seine Nahrung aus Samen von Pflanzen, die nur\nin der Galar-Region wachsen, verleiht seiner Rute\neinen würzig-pikanten Geschmack."
        es:
          sword: "Siempre está distraído, pero, de vez en cuando,\nmuestra un extraño rictus en el rostro, tal vez\ndebido a su alimentación."
          shield: "Las semillas de ciertas plantas autóctonas de\nGalar que consume aportan a su cola un sabor\nespeciado."
        ko:
          sword: "항상 멍하니 있지만\n가끔 찌릿 하고 인상을 쓴다.\n먹고 있는 먹이가 원인이라는 듯하다."
          shield: "가라르지방에서만 자라는\n식물의 씨를 먹은 탓에\n꼬리가 매콤한 맛이 되었다."
        zh_simp:
          sword: "平时一直都在发呆，\n但偶尔会突然露出锐利的神色。\n据说这和它所吃的食物有关。"
          shield: "它以只生长于伽勒尔地区\n的植物的种子为食，\n因此尾巴是辣味的。"
        zh_trad:
          sword: "平時一直都在發呆，\n但偶爾會突然露出銳利的神色。\n據說這和牠所吃的食物有關。"
          shield: "牠以只生長在伽勒爾\n地區的植物的種子為食，\n因此尾巴是辣味的。"
