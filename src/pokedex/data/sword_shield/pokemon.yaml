          shield: "ふわふわの　体毛は　綿飴の\nように　甘い　におい。　べたつく\n糸を　出して　敵を　絡めとる。"
        en:
          sword: "It eats its own weight in sugar every day.\nIf it doesn’t get enough sugar, it becomes\nincredibly grumpy."
          shield: "The sweet smell of cotton candy perfumes\nSwirlix’s fluffy fur. This Pokémon spits out\nsticky string to tangle up its enemies."
        fr:
          sword: "Il mange son propre poids en sucre chaque jour.\nS’il n’a pas sa dose de sucreries, il devient\nhorriblement grognon."
          shield: "Sa douce fourrure possède une odeur sucrée\ncomme la barbe à papa. Il produit des filaments\ngluants pour empêtrer ses adversaires."
        it:
          sword: "Mangia ogni giorno una quantità di zucchero pari\nal peso del suo corpo. Quando il suo livello di\nglucosio cala troppo, diventa di cattivo umore."
          shield: "La sua soffice pelliccia emette un dolce\nprofumo di zucchero filato. Avvolge il nemico\ncon filamenti appiccicosi."
        de:
          sword: "Die Menge an Zucker, die es pro Tag verschlingt,\nentspricht seinem Körpergewicht. Bekommt es\nnicht genügend Zucker, wird es unausstehlich."
          shield: "Sein flauschiges Fell duftet süß wie Zuckerwatte.\nEs stößt klebrige Fäden aus, mit denen es seine\nGegner umwickelt."
        es:
          sword: "Ingiere diariamente una cantidad de azúcar\nequivalente a su peso corporal. De lo contrario,\nse pone de muy mal humor."
          shield: "Su esponjoso pelaje desprende un olor dulzón\ncomo el del algodón de azúcar. Escupe hebras\npegajosas con las que envuelve a sus enemigos."
        ko:
          sword: "하루에 자신의 체중만큼의\n설탕을 먹는다. 당분이\n부족하면 매우 기분이 나빠진다."
          shield: "푹신푹신한 털은 솜사탕처럼\n달콤한 냄새가 난다.\n끈끈한 실을 내어 상대를 묶어버린다."
        zh_simp:
          sword: "每天要吃掉与自己体重\n相同重量的砂糖，\n糖分不够就会闹脾气。"
          shield: "蓬松的体毛闻起来\n就像棉花糖一样甜甜的。\n会放出黏糊糊的丝缠住敌人。"
        zh_trad:
          sword: "每天要吃掉與自己體重\n相同重量的砂糖，\n糖分不夠就會鬧脾氣。"
          shield: "蓬鬆的體毛聞起來\n就像棉花糖一樣甜甜的。\n會放出黏答答的絲纏住敵人。"
