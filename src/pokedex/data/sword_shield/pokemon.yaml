      types:
        - ghost
        - poison
      egg_groups:
        - amorphous
      abilities:
        - levitate
      descriptions:
        jp_kana:
          sword: "ガスから　うまれた　せいめいたい。\nどくをふくんだ　ガスの　からだに\nつつまれると　だれでも　きぜつする。"
          shield: "うすい　ガスのような　からだで\nどこにでも　しのびこむが\nかぜが　ふくと　ふきとばされる。"
        jp_kanji:
          sword: "ガスから　生まれた　生命体。\n毒を含んだ　ガスの　体に\n包まれると　だれでも　気絶する。"
          shield: "薄い　ガスのような　体で\nどこにでも　忍びこむが\n風が　吹くと　吹きとばされる。"
        en:
          sword: "Born from gases, anyone would faint if engulfed\nby its gaseous body, which contains poison."
          shield: "With its gas-like body, it can sneak into any place\nit desires. However, it can be blown away by wind."
        fr:
          sword: "Le corps de ce Pokémon s’est formé à partir\nde gaz si toxiques qu’ils pourraient faire perdre\nconnaissance à n’importe qui."
          shield: "Son corps gazéiforme lui permet de se glisser\nn’importe où, mais au moindre coup de vent,\nil s’envole."
        it:
          sword: "Generato da sostanze gassose, fa perdere i sensi\na chiunque respiri i gas tossici di cui è costituito."
          shield: "Il suo corpo gassoso può infilarsi ovunque, ma\nun colpo di vento lo può spazzare via."
        de:
          sword: "Es ist aus Gasen entstanden. Wird jemand in\nseinen gasförmigen, giftigen Körper gehüllt,\nso fällt er in Ohnmacht."
          shield: "Aufgrund seines an Gas erinnernden Körpers\nkommt es an jeden Ort. Es kann jedoch vom\nWind davongeweht werden."
        es:
          sword: "Nació a partir de gases venenosos que asfixiarían\na cualquiera que se viera envuelto en ellos."
          shield: "Con su cuerpo gaseoso puede colarse por donde\nquiera, aunque con un golpe de viento sale\ndespedido."
        ko:
          sword: "가스에서 태어난 생명체다.\n독을 포함한 가스의 몸에\n둘러싸이면 누구든지 기절한다."
          shield: "몸은 옅은 가스로 되어 있어\n어디든지 숨어들어 가지만\n바람이 불면 날아가 버린다."
        zh_simp:
          sword: "从气体中诞生的生命体。\n如果被含毒的气体状身体裹住的话，\n不管是谁都会昏迷过去。"
          shield: "能用稀薄气体状的\n身体潜入任何地方，\n但只要起风就会被吹跑。"
        zh_trad:
          sword: "從氣體中誕生的生命體。\n若被牠那有毒氣體形成的身體裹住，\n不管是誰都會昏迷。"
          shield: "能用稀薄氣體狀的\n身體潛入任何地方，\n但只要起風就會被吹跑。"
haunter:
