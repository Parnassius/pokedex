      descriptions:
        jp_kana:
          sword: "はいかつりょうは　ポケモンかいでも\nトップクラス。　あいてが　ねむるまで\nこもりうたを　うたいつづけるぞ。"
          shield: "こえの　はちょうを　じざいに　かえて\nきくと　ぜったいに　ねむくなる\nふしぎな　メロディーを　うたう。"
        jp_kanji:
          sword: "肺活量は　ポケモン界でも\nトップクラス。　相手が　眠るまで\n子守唄を　歌いつづけるぞ。"
          shield: "声の　波長を　自在に　変えて\n聞くと　絶対に　眠くなる\n不思議な　メロディーを　歌う。"
        en:
          sword: "Jigglypuff has top-notch lung capacity, even by\ncomparison to other Pokémon. It won’t stop\nsinging its lullabies until its foes fall asleep."
          shield: "By freely changing the wavelength of its voice,\nJigglypuff sings a mysterious melody sure to\nmake any listener sleepy."
        fr:
          sword: "Il a une des meilleures capacités pulmonaires\nparmi les Pokémon. Il chante des berceuses à\nson adversaire jusqu’à ce que sommeil s’ensuive."
          shield: "Il module librement la longueur d’onde de\nsa voix pour chanter une étrange mélodie\nqui endort à tous les coups celui qui l’écoute."
        it:
          sword: "Dotato di una capacità polmonare fra le migliori\nnel mondo Pokémon, canta una ninnananna\nfinché il suo avversario non s’addormenta."
          shield: "Modulando a piacere la lunghezza d’onda della\nsua voce, canta una melodia misteriosa che fa\naddormentare immancabilmente chi la ascolta."
        de:
          sword: "Sein Lungenvolumen übersteigt das der meisten\nanderen Pokémon. Es singt so lange Schlaflieder,\nbis seine Gegner eingenickt sind."
          shield: "Es kann die Tonlage seiner Stimme beliebig\nvariieren, um eine mysteriöse Melodie zu singen,\ndie jeden in Schlaf versetzt, der sie hört."
        es:
          sword: "Su capacidad pulmonar es excepcional, incluso\npara un Pokémon. Es capaz de cantar nanas sin\ncesar hasta que su rival se duerma."
          shield: "Posee la capacidad de modular su voz a voluntad\ncambiando la longitud de onda para entonar una\nmelodía misteriosa que provoca adormecimiento."
        ko:
          sword: "폐활량은 포켓몬 중에서도\n톱클래스다. 상대가 잠들 때까지\n자장가를 계속 부른다."
          shield: "목소리 파장을 자유자재로 바꾸어\n들으면 반드시 잠드는\n신비한 멜로디를 노래한다."
        zh_simp:
          sword: "肺活量之大，在整个宝可梦界\n数一数二。会一直哼唱摇篮曲\n直到对方睡着。"
          shield: "能够随意改变声音的波长，\n唱出听了绝对会\n犯困的神奇旋律。"
        zh_trad:
          sword: "肺活量之大在寶可夢界\n數一數二。會不停唱搖籃曲\n直到對方睡著為止。"
          shield: "會自在地改變聲音的波長，\n唱出一聽見就絕對會\n昏昏欲睡的神奇旋律。"
