        special_defense: 0
        speed: 0
      types:
        - psychic
      egg_groups:
        - amorphous
      abilities:
        - overcoat
        - magic_guard
      hidden_ability: regenerator
      descriptions:
        jp_kana:
          sword: "テレパシーで　いしを　おくりあう。\nつよいショックを　うけると　からだを\nつつむ　えきたいが　もれだす。"
          shield: "とくしゅな　えきたいに　からだを\nつつんでいるので　うちゅうでも\nいきられるとも　いわれている。"
        jp_kanji:
          sword: "テレパシーで　意思を　送りあう。\n強いショックを　受けると　体を\n包む　液体が　漏れ出す。"
          shield: "特殊な　液体に　体を\n包んでいるので　宇宙でも\n生きられるとも　いわれている。"
        en:
          sword: "It communicates with others telepathically.\nIts body is encapsulated in liquid, but if it takes\na heavy blow, the liquid will leak out."
          shield: "Many say that the special liquid covering this\nPokémon’s body would allow it to survive in\nthe vacuum of space."
        fr:
          sword: "Ils communiquent entre eux par télépathie.\nS’ils subissent un choc physique violent,\nle fluide qui entoure leur corps se met à fuir."
          shield: "On raconte que le curieux fluide qui entoure\nle corps de ce Pokémon lui permet de survivre\ndans l’espace."
        it:
          sword: "Comunica con i suoi simili tramite la telepatia.\nSe subisce un impatto violento, il liquido\nspeciale in cui è immerso il suo corpo fuoriesce."
          shield: "Si dice che il liquido speciale in cui è immerso\nil suo corpo gli permetta di vivere persino\nnello spazio."
        de:
          sword: "Monozyto kommunizieren untereinander mittels\nTelepathie. Erfährt es eine starke Erschütterung,\nläuft die Flüssigkeit, die es umgibt, aus."
          shield: "Sein Körper ist von einer speziellen Flüssigkeit\numgeben. Es heißt, dass es dank dieser Blase\nsogar im Weltraum überleben könne."
        es:
          sword: "Se comunica mediante telepatía. Si recibe un\nfuerte golpe, la sustancia viscosa que lo envuelve\nse desparrama."
          shield: "Se cree que la sustancia viscosa que lo envuelve\nle permite sobrevivir en el espacio exterior."
        ko:
          sword: "텔레파시로 의사소통을 한다.\n강한 충격을 받으면 몸을\n둘러싸고 있는 액체가 흘러나온다."
          shield: "특수한 액체로 몸을\n둘러싸고 있어 우주에서도\n살 수 있다고 전해진다."
        zh_simp:
          sword: "通过心灵感应来与伙伴交流。\n如果受到了强烈的冲击，\n包裹着身体的液体就会漏出来。"
          shield: "身体被特殊的液体包裹着，\n许多人因此认为它\n即使在宇宙中也能存活。"
        zh_trad:
          sword: "透過心靈感應來與夥伴交流。\n如果受到了強烈的衝擊，\n包裹著身體的液體就會漏出來。"
          shield: "身體被特殊的液體包裹著，\n許多人因此認為牠\n即使在宇宙中也能存活。"
