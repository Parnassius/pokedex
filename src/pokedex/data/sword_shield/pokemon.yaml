        jp_kana:
          sword: "せっし２０００どを　こえる　ほのおを\nへそから　ふきだす。　ルールむようの\nらんぼうな　たたかいが　とくい。"
          shield: "らんぼうな　ふるまいも　めにつくが\nちいさい　ポケモンを　たすける\nやさしい　いちめんも　もっている。"
        jp_kanji:
          sword: "摂氏２０００度を　超える　炎を\nへそから　噴き出す。　ルール無用の\n乱暴な　戦いが　得意。"
          shield: "乱暴な　ふるまいも　目につくが\n小さい　ポケモンを　助ける\n優しい　一面も　もっている。"
        en:
          sword: "It excels at violent, no-holds-barred battles.\nThe temperature of the flames that issue from its\nnavel exceeds 3,600 degrees Fahrenheit."
          shield: "Incineroar’s rough and aggressive behavior is its\nmost notable trait, but the way it helps out small\nPokémon shows that it has a kind side as well."
        fr:
          sword: "Les flammes qui émanent de son nombril\ndépassent les 2 000 °C. Il n’est jamais aussi\nà l’aise que lorsque tous les coups sont permis."
          shield: "Bien qu’il soit parfois brutal, il sait aussi\nse montrer attentionné en venant en aide\naux petits Pokémon."
        it:
          sword: "Le fiamme che fuoriescono dal suo ombelico\nsuperano i 2.000 ºC. Dà il meglio nelle lotte\nfuriose e senza regole."
          shield: "Manifesta di solito un comportamento violento,\nma possiede un lato gentile che emerge quando\naiuta i Pokémon più piccoli."
        de:
          sword: "Aus seinem Bauchnabel schießt es über 2 000 ºC\nheißes Feuer. Seine Spezialität sind Kämpfe, bei\ndenen alle Regeln über Bord geworfen werden."
          shield: "Obwohl es sich auffällig rau und wild aufführt,\nhat es auch eine freundliche Seite an sich und\nhilft kleineren Pokémon aus Notlagen."
        es:
          sword: "Las llamas que libera por el ombligo superan los\n2000 °C. Su especialidad son los combates sin\nreglas ni restricciones."
          shield: "A pesar de que a menudo se comporta de forma\nviolenta, tiene un lado amable que se manifiesta\ncuando ayuda a Pokémon más pequeños."
        ko:
          sword: "섭씨 2000도가 넘는 불꽃을\n배꼽에서 뿜어낸다. 규칙이 없는\n난폭한 싸움을 잘 한다."
          shield: "난폭한 거동이 눈에 띄지만\n작은 포켓몬을 도와주는\n상냥한 일면도 있다."
        zh_simp:
          sword: "会从自己的肚脐喷出\n摄氏２０００度以上的火焰。\n擅长没有规则限制的粗暴战斗。"
          shield: "虽然行为举止十分粗野，\n却也有着会去帮助\n弱小宝可梦的温柔一面。"
        zh_trad:
          sword: "會從自己的肚臍噴出\n攝氏２０００度以上的火焰。\n擅長沒有規則限制的粗暴戰鬥。"
          shield: "雖然行為舉止十分粗野，\n卻也有著會去幫助\n弱小寶可夢的溫柔一面。"
