cosmog:
  species_id: 789
  names:
    jp_kana: コスモッグ
    jp_kanji: コスモッグ
    en: Cosmog
    fr: Cosmog
    it: Cosmog
    de: Cosmog
    es: Cosmog
    ko: 코스모그
    zh_simp: 科斯莫古
    zh_trad: 科斯莫古
  forms:
    cosmog:
      form_id: 0
      base_stats:
        hp: 43
        attack: 29
        defense: 31
        special_attack: 29
        special_defense: 31
        speed: 37
      evs_yield:
        hp: 1
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - psychic
      egg_groups:
        - undiscovered
      abilities:
        - unaware
      descriptions:
        jp_kana:
          sword: "べつの　うちゅう　から　やってきた。\nガスの　からだは　とても　かるく\nそよかぜにも　ながされてしまうほど。"
          shield: "むけいかいで　こうきしんが　つよく\nあぶない　めに　あうことも　おおい。\nピンチになると　ワープで　にげる。"
        jp_kanji:
          sword: "別の　宇宙から　やって来た。\nガスの　体は　とても　軽く\nそよ風にも　流れてしまうほどだ。"
          shield: "無警戒で　好奇心が　強く\n危ない　目に　あうことも　多い。\nピンチになると　ワープで　逃げる。"
        en:
          sword: "This Pokémon came from another universe.\nIts gaseous body is so light that even a gentle\nbreeze can blow it away."
          shield: "Cosmog is very curious but not very cautious,\noften placing itself in danger. If things start to\nlook dicey, it teleports away."
        fr:
          sword: "Il vient d’un autre univers. Son corps gazeux\nest si léger que la moindre brise peut l’emporter."
          shield: "De nature curieuse et peu méfiante, il se retrouve\nsouvent dans des situations dangereuses.\nIl peut se téléporter en cas de danger."
        it:
          sword: "Proviene da un altro universo. Il suo corpo fatto\ndi gas è talmente leggero che può volar via\nal minimo soffio di vento."
          shield: "Dotato di un’indole ingenua e curiosa, si caccia\nspesso nei guai. Quando le cose si mettono male,\nscappa teletrasportandosi."
        de:
          sword: "Es stammt aus einem anderen Universum. Sein\nKörper aus Gas ist so leicht, dass es sogar von\neiner sanften Brise weggeweht wird."
          shield: "Es ist sehr neugierig und handelt oft unüberlegt,\nweshalb es häufig in brenzlige Situationen gerät.\nWenn es in Gefahr ist, teleportiert es sich weg."
        es:
          sword: "Proviene de otro mundo. Su cuerpo gaseoso es\ntan liviano que hasta la brisa más suave es capaz\nde arrastrarlo."
          shield: "Su escasa prudencia y gran curiosidad lo llevan a\nmenudo a ponerse en peligro. En caso de apuro,\nse teletransporta para huir."
        ko:
          sword: "다른 우주에서 찾아왔다.\n가스로 된 몸은 매우 가벼워서\n산들바람에도 날아가 버릴 정도다."
          shield: "경계심이 없고 호기심이 왕성해\n위험한 상황에 맞닥뜨리는 경우가 많다.\n위기에 처하면 워프해서 도망친다."
        zh_simp:
          sword: "来自其他的宇宙。\n气体构成的身体十分轻盈，\n连微风都能把它吹走。"
          shield: "没有警戒心且好奇心强，\n所以经常会遇到麻烦。\n危急时会用瞬间移动来逃跑。"
        zh_trad:
          sword: "來自其他的宇宙。\n氣體構成的身體十分輕盈，\n連微風都能把牠吹走。"
          shield: "沒有警戒心且好奇心強，\n所以經常會遇到麻煩。\n危急時會用瞬間移動來逃跑。"
cosmoem:
  species_id: 790
  names:
    jp_kana: コスモウム
    jp_kanji: コスモウム
    en: Cosmoem
    fr: Cosmovum
    it: Cosmoem
    de: Cosmovum
    es: Cosmoem
    ko: 코스모움
    zh_simp: 科斯莫姆
    zh_trad: 科斯莫姆
  forms:
    cosmoem:
      form_id: 0
      base_stats:
        hp: 43
        attack: 29
        defense: 131
        special_attack: 29
        special_defense: 131
        speed: 37
      evs_yield:
        hp: 0
        attack: 0
        defense: 1
        special_attack: 0
        special_defense: 1
        speed: 0
      types:
        - psychic
      egg_groups:
        - undiscovered
      abilities:
        - sturdy
      descriptions:
        jp_kana:
          sword: "じんちを　こえた　かたさの　カラに\nつつまれている。　ほしの　ひかりを\nあびて　せいちょうする。"
          shield: "たいきの　チリを　すごい　いきおいで\nすいこみ　しんかの　エネルギーを\nコアで　けんめいに　つくっている。"
        jp_kanji:
          sword: "人知を　超えた　硬さの　殻に\n包まれている。　星の　光を\n浴びて　成長する。"
          shield: "大気の　塵を　すごい　勢いで\n吸いこみ　進化の　エネルギーを\nコアで　懸命に　つくっている。"
        en:
          sword: "The absorption of starlight fuels this Pokémon’s\ngrowth. The shell that encases it is harder than\nany known material."
          shield: "It sucks in dust from the air at an astounding rate,\nfrantically building up energy within its core as\npreparation for evolution."
        fr:
          sword: "La carapace qui le recouvre est plus dure\nque tout ce qui est connu par l’Homme.\nIl grandit en absorbant la lumière des étoiles."
          shield: "Il aspire avec force la poussière de l’atmosphère\net travaille sans relâche pour produire dans\nson noyau l’énergie nécessaire à son évolution."
        it:
          sword: "Il suo esoscheletro è più duro di qualunque\ncosa che gli esseri umani conoscano.\nCresce assorbendo la luce delle stelle."
          shield: "Aspira con forza il pulviscolo dell’atmosfera\ne produce alacremente l’energia necessaria\nalla propria evoluzione nel suo nucleo."
        de:
          sword: "Es wird von einer Schale umhüllt, deren Härte\nMenschen vor ein Rätsel stellt. Es wächst, indem\nes in Sternenlicht badet."
          shield: "Es zieht mit unglaublicher Wucht Staub aus der\nLuft und produziert damit in seinem Kern fleißig\nEnergie für seine Entwicklung."
        es:
          sword: "Está recubierto de un caparazón de una dureza\nque escapa al entendimiento humano. Crece al\nexponerse a la luz de las estrellas."
          shield: "Absorbe impetuoso polvo de la atmósfera y\npone todo su empeño en crear en su núcleo\nla energía necesaria para evolucionar."
        ko:
          sword: "인간의 지식을 뛰어넘는 강도를 가진\n껍질에 둘러싸여 있다.\n별의 빛을 받아서 성장한다."
          shield: "대기의 티끌을 굉장한 기세로\n빨아들여 진화 에너지를\n코어에서 열심히 만들고 있다."
        zh_simp:
          sword: "将它包裹起来的外壳拥有\n超越人类认知范围的硬度。\n通过沐浴星光而成长。"
          shield: "以惊人的气势吸入\n大气中的尘埃，努力用\n内核制造着进化的能源。"
        zh_trad:
          sword: "將牠包裹起來的外殼擁有\n超越人類認知範圍的硬度。\n透過沐浴星光而成長。"
          shield: "以驚人的氣勢吸入\n大氣中的塵埃，努力用\n內核製造著進化的能源。"
solgaleo:
