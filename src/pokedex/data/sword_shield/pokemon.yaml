      types:
        - water
        - grass
      egg_groups:
        - water_1
        - grass
      abilities:
        - swift_swim
        - rain_dish
      hidden_ability: own_tempo
      held_items:
        rare: mental_herb
      descriptions:
        jp_kana:
          sword: "ゆうぐれどきに　なると　かつどうを\nはじめる　やこうせいの　ポケモン。\nかわぞこの　みずごけを　たべる。"
          shield: "ひあたりの　よい　みずべに　すむ。\nひるまは　みずくさの　ベッドで\nねむり　ひが　くれると　うごきだす。"
        jp_kanji:
          sword: "夕暮れどきに　なると　活動を\nはじめる　夜行性の　ポケモン。\n川底の　水苔を　食べる。"
          shield: "日当たりの　良い　水辺に　棲む。\n昼間は　水草の　ベッドで　眠り\n日が　暮れると　動き出す。"
        en:
          sword: "It is nocturnal and becomes active at nightfall.\nIt feeds on aquatic mosses that grow\nin the riverbed."
          shield: "It lives at the water’s edge where it is sunny.\nIt sleeps on a bed of water grass by day and\nbecomes active at night."
        fr:
          sword: "Ce Pokémon nocturne s’active au crépuscule.\nIl se nourrit d’algues qui poussent au fond\ndes rivières."
          shield: "Il vit au bord de l’eau dans les endroits\nensoleillés. Il s’endort sur un tas d’algues\ndans la journée et ne se lève qu’à la nuit tombée."
        it:
          sword: "È un Pokémon notturno, che si sveglia dopo\nil crepuscolo. Si nutre di sfagno, che trova nei\nletti dei fiumi."
          shield: "Vive in riva a specchi d’acqua, in aree soleggiate.\nDi giorno dorme su di un letto di piante\nacquatiche, mentre la notte è attivo."
        de:
          sword: "Lombrero wird erst in der Abenddämmerung\naktiv. Es ernährt sich von Moos, das am Boden\nvon Flüssen gedeiht."
          shield: "Es lebt am Ufer, wo die Sonne scheint. Tagsüber\nschläft es in einem Bett aus Wasserpflanzen,\nnachts wird es dann aktiv."
        es:
          sword: "Este Pokémon nocturno entra en acción al caer\nla tarde. Se alimenta del musgo que crece en el\nlecho de los ríos."
          shield: "Vive en las riberas bañadas por el sol. De día\nduerme sobre un lecho de plantas acuáticas y de\nnoche entra en acción."
        ko:
          sword: "해질녘이 되면 활동을\n시작하는 야행성 포켓몬이다.\n강바닥의 이끼를 먹는다."
          shield: "햇볕이 잘 드는 물가에 산다.\n낮에는 수초로 된 침대에서 자고\n해가 지면 활동하기 시작한다."
        zh_simp:
          sword: "傍晚时开始活动的\n夜行性宝可梦。\n喜欢吃河底的水苔。"
          shield: "住在日照良好的水边。\n白天在水草做的床上睡觉，\n太阳下山后就会出来活动。"
        zh_trad:
          sword: "傍晚時開始活動的\n夜行性寶可夢。\n喜歡吃河底的水苔。"
          shield: "住在日照充足的水邊。\n白天在水草做的床上睡覺，\n太陽下山後就會出來活動。"
