          shield: "It can tell what people are thinking. Only Trainers\nwho have justice in their hearts can earn this\nPokémon’s trust."
        fr:
          sword: "Il chasse ses proies en se servant d’une force\nappelée aura, dont la puissance est telle qu’elle\nlui permet de réduire un rocher en poussière."
          shield: "Étant capable de lire ce que pensent les humains,\nce Pokémon ne s’attache qu’aux Dresseurs dotés\nd’un cœur pur."
        it:
          sword: "Caccia le prede usando un potere chiamato\naura, in grado di ridurre in frantumi anche\ngrossi macigni."
          shield: "È in grado di comprendere anche i pensieri\ndegli esseri umani. Per questo, si affeziona\nsolo agli Allenatori dall’animo onesto."
        de:
          sword: "Es jagt seine Beute, indem es eine Kraft\nmanipuliert, die Aura genannt wird. Dadurch\nkann es sogar große Felsen pulverisieren."
          shield: "Es kann die Gedanken von Menschen lesen.\nDeshalb lässt es sich nur auf Trainer ein, die\nihr Herz auf dem rechten Fleck haben."
        es:
          sword: "Caza a sus presas manipulando una energía,\ndenominada aura, cuya potencia es capaz incluso\nde hacer añicos rocas enormes."
          shield: "Puede leer los pensamientos de la gente, por\nlo que establece lazos afectivos únicamente con\nEntrenadores de corazón noble."
        ko:
          sword: "큰 바위도 산산조각 내는\n파동이라 불리는 힘을\n다뤄서 먹이를 사냥한다."
          shield: "사람이 생각하는 것도\n알 수 있기 때문에 정직한 마음을\n가진 트레이너만 따른다."
        zh_simp:
          sword: "操纵一种被称为波导的力量\n来进行狩猎。这种力量就连\n巨大的岩石也能击得粉碎。"
          shield: "他能理解人类的想法，\n因此只会去亲近\n内心端正的训练家。"
        zh_trad:
          sword: "操作一種被稱為波導的力量\n來進行狩獵。這種力量就連\n巨大的岩石也能擊得粉碎。"
          shield: "牠能理解人類的想法，\n因此只會去親近\n內心端正的訓練家。"
hippopotas:
  species_id: 449
  names:
    jp_kana: ヒポポタス
    jp_kanji: ヒポポタス
    en: Hippopotas
    fr: Hippopotas
    it: Hippopotas
    de: Hippopotas
    es: Hippopotas
    ko: 히포포타스
    zh_simp: 沙河马
    zh_trad: 沙河馬
  forms:
    hippopotas:
      form_id: 0
      base_stats:
        hp: 68
        attack: 72
        defense: 78
        special_attack: 38
        special_defense: 42
        speed: 32
      evs_yield:
        hp: 0
