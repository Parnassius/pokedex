        jp_kana:
          sword: "ハサミは　たたかいで　とれても\nさいせいされる。　ハサミの　なかみは\nガラルでは　ちんみとして　にんきだ。"
          shield: "みぎうでの　ハサミの　なかに　たまる\nガスの　ばくはつで　だんがんのように\nみずを　はっしゃし　てきを　たおす。"
        jp_kanji:
          sword: "ハサミは　戦いで　取れても\n再生される。　ハサミの　中身は\nガラルでは　珍味として　人気だ。"
          shield: "右腕の　ハサミの　中に　溜まる\nガスの　爆発で　弾丸のように\n水を　発射し　敵を　倒す。"
        en:
          sword: "Clauncher’s claws can fall off during battle, but\nthey’ll regenerate. The meat inside the claws is\npopular as a delicacy in Galar."
          shield: "By detonating gas that accumulates in its right\nclaw, this Pokémon launches water like a bullet.\nThis is how Clauncher defeats its enemies."
        fr:
          sword: "S’il perd ses pinces au combat, d’autres\nrepoussent à la place. La chair qu’elles\ncontiennent est un mets très apprécié à Galar."
          shield: "Il concentre du gaz dans sa pince droite et\nle fait exploser pour tirer une rafale d’eau\nsur ses ennemis, comme une balle de pistolet."
        it:
          sword: "Se le sue chele si staccano durante la lotta,\nricrescono. La polpa al loro interno\nè considerata una rara prelibatezza a Galar."
          shield: "Sconfigge i nemici con proiettili d’acqua che\nspara facendo esplodere il gas che accumula\nnella chela destra."
        de:
          sword: "Selbst wenn es seine Scheren im Kampf verlieren\nsollte, wachsen sie wieder nach. Das Innere seiner\nScheren ist in Galar eine beliebte Delikatesse."
          shield: "Scampisto erledigt seine Feinde, indem es durch\ndie Explosion von Gasen, die es in seiner rechten\nSchere speichert, Wasser wie Projektile abfeuert."
        es:
          sword: "Aunque pierda una pinza en combate, volverá\na crecerle. La carne del interior de sus pinzas es\nconsiderada un auténtico manjar en Galar."
          shield: "Acalla a sus enemigos con balas de agua que\ndispara haciendo explotar el gas de su pinza\nderecha."
        ko:
          sword: "집게발은 싸우다가 떨어져도\n재생된다. 집게 살은 가라르에서\n진미로 통하며 인기가 높다."
          shield: "오른팔의 집게 안에 담긴\n가스를 폭발시켜 탄환처럼\n물을 발사해서 상대를 쓰러뜨린다."
        zh_simp:
          sword: "钳子就算在战斗中掉落\n也还会再长出来。钳子里的肉是\n在伽勒尔广受欢迎的珍奇美食。"
          shield: "通过引爆积蓄在右臂钳子中的\n气体，像发射子弹般\n将水喷射出去，击倒敌人。"
        zh_trad:
          sword: "鉗子就算在戰鬥中脫落，也會\n重新長出來。鉗子裡面的肉在\n伽勒爾是很有人氣的珍奇美食。"
          shield: "右臂的鉗子能夠累積氣體，\n並且利用氣體爆炸噴射出\n像子彈般的水來打倒敵人。"
