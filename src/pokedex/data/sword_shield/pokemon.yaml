      types:
        - normal
        - flying
      egg_groups:
        - flying
      abilities:
        - big_pecks
      hidden_ability: gale_wings
      descriptions:
        jp_kana:
          sword: "うつくしい　さえずりは　いかく。\nなわばりに　はいった　ものは\nようしゃなく　つつきまくる。"
          shield: "こうふんすると　たいおんが\nグッと　あがる。　すでで　さわると\nヤケドすることも　あるほどだ。"
        jp_kanji:
          sword: "美しい　さえずりは　威嚇。\n縄張りに　入った　ものは\n容赦なく　突きまくる。"
          shield: "興奮すると　体温が\nグッと　上がる。　素手で　触ると\n火傷することも　あるほどだ。"
        en:
          sword: "Its melodious cries are actually warnings.\nFletchling will mercilessly peck at anything\nthat enters its territory."
          shield: "When this Pokémon gets excited, its body\ntemperature increases sharply. If you touch a\nFletchling with bare hands, you might get burned."
        fr:
          sword: "Son chant mélodieux est en fait une tentative\nd’intimidation. Il picore sans merci tout individu\nqui pénètre dans son territoire."
          shield: "Quand il est surexcité, sa température corporelle\naugmente d’un coup, à tel point qu’il est possible\nde se brûler en le touchant à mains nues."
        it:
          sword: "I suoi meravigliosi cinguettii sono in realtà\nversi minacciosi. Becca senza pietà chi invade\nil suo territorio."
          shield: "Quando si innervosisce, la sua temperatura\ncorporea sale di colpo, tanto da causare\nscottature a chi lo tocca a mani nude."
        de:
          sword: "Sein wunderschönes Zwitschern ist in Wirklichkeit\neine Warnung. Wer in sein Revier eindringt, wird\ngnadenlos von ihm gepickt."
          shield: "Ist es aufgeregt, steigt seine Körpertemperatur\nso stark an, dass man sich verbrennen kann,\nwenn man es mit bloßen Händen anfasst."
        es:
          sword: "Sus melodiosos gorjeos son en realidad un aviso.\nAcribilla a picotazos a todo el que ose invadir su\nterritorio."
          shield: "Su temperatura corporal aumenta de repente\ncuando se exalta y puede causar quemaduras\nal contacto con la piel."
        ko:
          sword: "아름답게 지저귀는 소리는 위협하고\n있다는 뜻이다. 영역에 들어온 자는\n용서 없이 콕콕 쪼아버린다."
          shield: "흥분하면 체온이 확 오른다.\n맨손으로 만지면\n화상을 입기도 할 정도다."
        zh_simp:
          sword: "它优美的鸣叫其实是威吓。\n对于进入自己领地的家伙，\n会毫不留情地啄个不停。"
          shield: "一旦兴奋体温就会\n急剧上升。赤手去摸\n甚至有可能会被灼伤。"
        zh_trad:
          sword: "婉轉的叫聲是在威嚇對方。\n對於闖入自己地盤的傢伙\n會毫不留情地啄個不停。"
          shield: "一旦興奮體溫就會\n急速上升。赤手去摸牠\n有時甚至會被灼傷。"
