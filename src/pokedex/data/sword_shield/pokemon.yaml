      descriptions:
        jp_kana:
          sword: "くちから　はっする　おんぱで　みずの\nバルーンを　あやつる。　おんぱは\nきよらかな　うたごえに　きこえる。"
          shield: "たたかいは　アシレーヌの　ステージ。\nうたと　バルーンの　まう　ようすは\nかんせんしゃたちを　みりょうする。"
        jp_kanji:
          sword: "口から　発する　音波で　水の\nバルーンを　操る。　音波は\n清らかな　歌声に　聞こえる。"
          shield: "戦いは　アシレーヌの　ステージ。\n歌と　バルーンの　舞う　様子は\n観戦者たちを　魅了する。"
        en:
          sword: "With its mouth, it makes sonic waves that sound\nlike beautiful singing. It uses the sonic waves to\ncontrol its water balloons."
          shield: "For Primarina, every battle’s a stage. Its singing\nand the dancing of its balloons will mesmerize\nthe audience."
        fr:
          sword: "Il manie ses ballons d’eau avec les ondes sonores\nqu’il émet. Celles-ci ressemblent à un chant\ncéleste et mélodieux."
          shield: "Les combats sont une véritable performance\nartistique, pour lui. Les spectateurs sont charmés\npar son chant et la danse de ses ballons."
        it:
          sword: "Controlla i palloncini d’acqua grazie alle onde\nsonore che emette dalla bocca e che risuonano\ncome un canto celestiale."
          shield: "Brilla nella lotta come su un palcoscenico.\nAmmalia gli spettatori con il suo canto e\ncon un turbinio di palloncini."
        de:
          sword: "Es kontrolliert Wasserblasen, indem es\nSchallwellen aus seinem Mund ausstößt,\ndie wie klarer Gesang klingen."
          shield: "Jeder Kampf ist für es wie eine Aufführung. Wer\nseinen Gesang und seinen Tanz mit den Blasen\nmiterleben darf, wird davon ganz verzaubert."
        es:
          sword: "Controla sus globos de agua emitiendo unas\nondas sonoras que podrían describirse como\nel canto de una voz pura y cristalina."
          shield: "Considera el terreno de combate un escenario\ndesde el que encandilar al público con su canto\ny la coreografía de sus globos."
        ko:
          sword: "입에서 나오는 음파로\n물의 벌룬을 조종한다. 음파는\n맑고 고운 노랫소리처럼 들린다."
          shield: "싸움은 누리레느의 스테이지다.\n노래와 벌룬이 흩날리는 모습은\n보는 이들을 매료시킨다."
        zh_simp:
          sword: "利用口中发出的音波\n来操纵水气球。这种音波\n听起来就像清澈的歌声。"
          shield: "对战就是西狮海壬的舞台。\n它那歌声和舞动气球的样子\n使观战的人们为之倾倒。"
        zh_trad:
          sword: "利用口中發出的音波來操縱\n水做的氣球。這種音波\n聽起來就像清澈的歌聲。"
          shield: "對戰就是西獅海壬的舞台。\n牠那歌聲和舞動氣球的樣子\n使觀戰的人們為之傾倒。"
grubbin:
