          shield: "りくちで　せいかつするが　およぎも\nとくい。　えものを　もとめて　うみに\nもぐり　するどい　ツメで　しとめる。"
        jp_kanji:
          sword: "進化して　陸地に　上がった。\n下半身が　強化され　しっぽの\n一撃は　すごい　破壊力だ。"
          shield: "陸地で　生活するが　泳ぎも　得意。\n獲物を　求めて　海に　潜り\n鋭い　ツメで　しとめる。"
        en:
          sword: "After evolution, this Pokémon emerged onto\nland. Its lower body has become stronger, and\nblows from its tail are devastating."
          shield: "Though it lives on land, it’s also a good swimmer.\nIt dives into the ocean in search of prey, using its\nsharp claws to take down its quarry."
        fr:
          sword: "Depuis son évolution, il vit sur la terre ferme.\nSes membres inférieurs se sont développés\net ses coups de queue sont dévastateurs."
          shield: "Bien que vivant sur la terre ferme, il est très\nbon nageur. Il plonge dans la mer à la recherche\nde proies et les abat avec ses pinces acérées."
        it:
          sword: "Dopo l’evoluzione, è salito sulla terraferma.\nLa parte inferiore del corpo si è rafforzata,\nrendendo i colpi della sua coda devastanti."
          shield: "Vive sulla terraferma, ma è un abile nuotatore.\nSi tuffa in mare alla ricerca di prede, che abbatte\ncon i suoi artigli affilati."
        de:
          sword: "Nach seiner Entwicklung ging es an Land, sodass\nsich sein Unterkörper verstärkte. Ein Hieb seines\nSchweifs besitzt gewaltige Zerstörungskraft."
          shield: "Es lebt an Land, kann aber auch gut schwimmen.\nZum Jagen taucht es ins Meer und erledigt Beute\nmit seinen scharfen Klauen."
        es:
          sword: "Tras evolucionar, pasó a vivir en tierra firme.\nPosee tal fuerza en la parte inferior del cuerpo\nque un solo coletazo puede resultar devastador."
          shield: "Vive en tierra firme, pero es un hábil nadador.\nSe zambulle en el agua en busca de presas y las\natrapa con sus afiladas pinzas."
        ko:
          sword: "진화해서 육지로 올라왔다.\n하반신이 강화되어 꼬리로 가하는\n일격은 굉장한 파괴력을 자랑한다."
          shield: "육지에서 생활하지만 헤엄도 잘 친다.\n먹이를 찾아 바다로 잠수해\n날카로운 발톱으로 꼼짝 못 하게 한다."
        zh_simp:
          sword: "进化之后登上了陆地。\n下半身得到了强化，\n尾巴的攻击破坏力极强。"
          shield: "栖息在陆地，但也擅长游泳。\n会潜入大海寻找猎物，\n用锋利的爪子给予致命一击。"
        zh_trad:
          sword: "進化後搬到了陸地上生活，\n且下半身獲得了強化。用尾巴\n使出的一擊破壞力十分驚人。"
          shield: "生活在陸地上，但也擅長游泳。\n會為了尋找獵物而潛入海中，\n用銳利的爪子解決對方。"
feebas:
