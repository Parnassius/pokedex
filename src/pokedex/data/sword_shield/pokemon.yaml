        rare: leftovers
      descriptions:
        jp_kana:
          sword: "とにかく　たくさん　たべることに\nむちゅう。　あじも　きにしないし\nくさっていても　へいき　なのだ。"
          shield: "たいもうのしたに　エサを　ためる。\nしんらいした　あいてには\nひとくちだけ　わけてくれることも。"
        jp_kanji:
          sword: "とにかく　たくさん　食べることに\n夢中。　味も　気にしないし\n腐っていても　平気　なのだ。"
          shield: "体毛の下に　エサを　貯める。\n信頼した　相手には\nひと口だけ　わけてくれることも。"
        en:
          sword: "Stuffing itself with vast amounts of food is its\nonly concern. Whether the food is rotten or\nfresh, yummy or tasteless—it does not care."
          shield: "It stores food beneath its fur. It might share\njust one bite, but only if it really trusts you."
        fr:
          sword: "Il ne pense qu’à manger énormément.\nIl n’a que faire du goût et n’hésite d’ailleurs\npas à engloutir de la nourriture avariée."
          shield: "Il conserve sa nourriture sous son épaisse fourrure.\nIl lui arrive d’en offrir un peu à ceux en qui\nil a confiance."
        it:
          sword: "Mangiare in quantità è la sua preoccupazione\nprincipale. Non bada al gusto e non si fa\nproblemi se il cibo è andato a male."
          shield: "Conserva il cibo sotto la pelliccia e talvolta ne\ncondivide un boccone con chi si è guadagnato\nla sua piena fiducia."
        de:
          sword: "Es ist völlig darauf fixiert, so viel wie möglich zu\nfressen. Der Geschmack spielt dabei keine Rolle.\nAuch verdorbene Nahrung macht ihm nichts aus."
          shield: "Es hortet Nahrung unter seinem Fell. Vertraut es\njemandem, gibt es ihm manchmal einen kleinen\nHappen ab, aber nicht mehr."
        es:
          sword: "Atiborrarse de comida es su fijación. Como no\nle hace ascos a nada, puede ingerir alimentos\npodridos sin inmutarse."
          shield: "Guarda alimentos bajo el pelaje. Compartirá un\npequeño bocado de vez en cuando con quien\nlogre ganarse su confianza."
        ko:
          sword: "일단 많이 먹고 보는 것에\n푹 빠져 있다. 맛은 상관하지 않으며\n상했어도 신경 쓰지 않는다."
          shield: "털 안에 먹이를 모은다.\n신뢰하는 상대에게는\n한 입 나눠주기도 한다."
        zh_simp:
          sword: "总之全神贯注地大吃大喝，\n完全不去讲究食物的味道，\n就算是腐烂的东西也照吃不误。"
          shield: "在体毛下面储存食物。\n如果是自己信赖的对象，\n也会把食物分给对方一口。"
        zh_trad:
          sword: "總是全神專注地大吃大喝，\n完全不去講究食物的味道，\n就算是腐爛的東西也照吃不誤。"
          shield: "在體毛下儲存食物。\n如果是自己信賴的對象，\n也會把食物分給對方一口。"
