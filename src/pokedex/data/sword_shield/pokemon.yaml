      descriptions:
        jp_kana:
          sword: "もうどくを　もつが　つかうことは\nまれ。　くるまも　たたきつぶす\nかいりきで　あばれまわる。"
          shield: "すなのあくま　と　よばれるほど\nどうもうだが　カバルドンには\nケンカも　うらず　おとなしい。"
        jp_kanji:
          sword: "猛毒を　もつが　使うことは\nまれ。　車も　叩きつぶす\n怪力で　暴れまわる。"
          shield: "砂の悪魔と　呼ばれるほど\n獰猛だが　カバルドンには\nケンカも　売らず　おとなしい。"
        en:
          sword: "Its poison is potent, but it rarely sees use. This\nPokémon prefers to use physical force instead,\ngoing on rampages with its car-crushing strength."
          shield: "It’s so vicious that it’s called the Sand Demon.\nYet when confronted by Hippowdon, Drapion\nkeeps a low profile and will never pick a fight."
        fr:
          sword: "Son poison est violent, mais il s’en sert très\nrarement. Il se déchaîne avec une telle force\nqu’il pourrait réduire une voiture en pièces."
          shield: "Sa férocité lui a valu le surnom de « démon\ndu désert », mais face à un Hippodocus, il est\nparfaitement docile et évite de le provoquer."
        it:
          sword: "Le sue tossine sono letali ma se ne serve di rado.\nSemina distruzione con la sua forza prodigiosa\nche gli permette di sfasciare persino automobili."
          shield: "È chiamato “demone della sabbia” per via della\nsua ferocia, ma in presenza di Hippowdon\nse ne sta tranquillo ed evita di provocarlo."
        de:
          sword: "Sein Gift ist stark, aber es setzt es nur selten ein.\nIst es richtig wütend, schlägt es mit einer Wucht\nzu, die selbst Autos zu Schrott verarbeitet."
          shield: "Es wird auch „Wüstendämon“ genannt, weil es so\ngrausam ist. Nur mit Hippoterus legt es sich nie\nan, sondern verhält sich ruhig."
        es:
          sword: "Posee un veneno muy potente, pero que usa muy\npoco. Con la extraordinaria fuerza que concentra\nal enfurecerse podría hacer añicos un coche."
          shield: "Su ferocidad le ha granjeado el sobrenombre\ndel Diablo de la Arena, pero en presencia de\nlos Hippowdon se muestra dócil y pacífico."
        ko:
          sword: "맹독을 지녔지만 사용하는 일은\n드물다. 자동차도 때려 부수는\n괴력으로 마구 날뛴다."
          shield: "사막의 악마라고 불릴 정도로\n사납지만 하마돈에게는\n싸움도 걸지 않고 얌전하다."
        zh_simp:
          sword: "虽然拥有剧毒，但只有在\n极少数的情况下才会使用。\n会用能敲烂汽车的怪力乱打一通。"
          shield: "虽然狰狞凶猛到被人们\n称为沙之恶魔，但在河马兽\n面前却表现得低调温顺。"
        zh_trad:
          sword: "雖然擁有劇毒，但只有在\n極少數的情況下才會使用。\n會用能敲爛汽車的怪力亂打一通。"
          shield: "雖然猙獰凶猛到被人們\n稱為沙之惡魔，但在河馬獸\n面前卻表現得低調溫順。"
