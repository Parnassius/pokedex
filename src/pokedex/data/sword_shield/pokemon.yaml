      descriptions:
        jp_kana:
          sword: "いつでも　げんきいっぱい。\nつよくなるため　まけても　まけても\nあいてに　たちむかっていく。"
          shield: "てごろな　あいてを　みつけると\nすぐに　なぐりかかってくるので\nちいさくても　ゆだんならない。"
        jp_kanji:
          sword: "いつでも　元気いっぱい。\n強くなるため　負けても　負けても\n相手に　立ち向かっていく。"
          shield: "手ごろな　相手を　見つけると\nすぐに　殴りかかってくるので\n小さくても　油断ならない。"
        en:
          sword: "It is always bursting with energy. To make itself\nstronger, it keeps on fighting even if it loses."
          shield: "Even though it is small, it can’t be ignored because\nit will slug any handy target without warning."
        fr:
          sword: "Ce Pokémon est débordant d’énergie.\nMême s’il perd encore et encore, il se relève\ntoujours pour devenir plus fort."
          shield: "Même s’il est petit, il vaut mieux ne pas l’ignorer :\nquand il trouve un adversaire à sa hauteur,\nil frappe fort et souvent sans prévenir."
        it:
          sword: "Sempre traboccante di energia. Per rinforzarsi\ncontinua a sfidare il suo avversario anche dopo\nessere stato ripetutamente sconfitto."
          shield: "Anche se è piccolo, non bisogna abbassare\nla guardia: quando trova un avversario che fa\nal caso suo, inizia subito a tempestarlo di colpi."
        de:
          sword: "Es strotzt vor Energie. Um stärker zu werden,\nfordert es seine Gegner immer wieder heraus,\nauch wenn es schon mehrmals verloren hat."
          shield: "Es ist zwar nicht groß, geht aber entschlossen\nzum Angriff über, sobald es einen angemessenen\nGegner sichtet. Vorsicht ist also geboten."
        es:
          sword: "Siempre está rebosante de energía. Por muchas\nderrotas que acumule, no deja de plantar cara a\nsus rivales con tal de fortalecerse."
          shield: "Su pequeño tamaño no debe ser motivo para\nsubestimarlo, ya que se liará de inmediato a\ngolpes con cualquier rival que estime oportuno."
        ko:
          sword: "항상 기운이 넘친다.\n강해지기 위해 지고 또 져도\n계속 상대에게 맞선다."
          shield: "만만한 상대를 발견하면\n바로 공격해오기 때문에\n몸집이 작아도 방심은 할 수 없다."
        zh_simp:
          sword: "永远都是精力充沛的样子。\n为了变强，就算输了一次又一次，\n也会不断地站起来迎战对手。"
          shield: "体型偏小却不可轻视，\n因为它只要发现合适的对手\n便会马上扑上去大打出手。"
        zh_trad:
          sword: "無論何時都充滿活力。\n為了變強，就算輸了一次又一次，\n也會不斷重新站起來迎戰對手。"
          shield: "體型雖小卻不可輕視，\n因為牠只要發現合適的對手，\n就會馬上撲上去大打出手。"
