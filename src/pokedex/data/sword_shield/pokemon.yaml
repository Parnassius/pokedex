          sword: "まよなか　あらわれる　ユキワラシは\nおおゆきを　ふらせると　いわれる。\nゆきや　こおりを　たべて　くらす。"
          shield: "さむい　とちでしか　いきられない。\nマイナス　１００どの　かんきょうでも\nげんきに　はねまわっているよ。"
        jp_kanji:
          sword: "真夜中　現れる　ユキワラシは\n大雪を　降らせると　いわれる。\n雪や　氷を　食べて　暮らす。"
          shield: "寒い　土地でしか　生きられない。\nマイナス　１００度の　環境でも\n元気に　跳ねまわっているよ。"
        en:
          sword: "It’s said that if they are seen at midnight, they’ll\ncause heavy snow. They eat snow and ice\nto survive."
          shield: "It can only survive in cold areas. It bounces\nhappily around, even in environments as cold as\n−150 degrees Fahrenheit."
        fr:
          sword: "Quand ce Pokémon apparaît la nuit, il provoque\nde fortes chutes de neige.\nIl se nourrit de glace et de neige."
          shield: "Il ne peut vivre que dans les plus froides contrées.\nIl s’accommode parfaitement de températures\natteignant les - 100 °C."
        it:
          sword: "Si dice che provochi forti nevicate se appare\nnel cuore della notte. Si nutre di neve e ghiaccio."
          shield: "Sopravvive solo nelle regioni fredde.\nSi trova perfettamente a suo agio anche\na una temperatura di -100 ºC."
        de:
          sword: "Erscheint es mitten in der Nacht, so sagt man,\nsteht starker Schneefall bevor. Es ernährt sich\nvon Eis und Schnee."
          shield: "Schneppke kann nur in besonders kalten\nGebieten leben. Selbst bei -100 ºC hopst es\nmunter umher."
        es:
          sword: "Dicen que, si aparece a medianoche, provoca\ngrandes nevadas. Se alimenta de nieve y hielo."
          shield: "Las regiones frías son su hábitat natural. Se\nencuentra a sus anchas incluso en lugares donde\nla temperatura alcanza los -100 °C."
        ko:
          sword: "한밤중에 나타나는 눈꼬마는\n큰 눈을 내리게 한다고 전해진다.\n눈과 얼음을 먹으며 지낸다."
          shield: "추운 땅에서만 살 수 있다.\n영하 100도의 환경에서도\n건강하게 뛰어다닌다."
        zh_simp:
          sword: "据说半夜出现的\n雪童子会带来大雪。\n靠吃雪和冰为生。"
          shield: "只能在寒冷的土地上生存。\n即使在零下１００度的环境下\n也能充满活力地到处蹦蹦跳跳。"
        zh_trad:
          sword: "據說半夜出現的\n雪童子會帶來大雪。\n靠吃雪和冰維生。"
          shield: "只能在寒冷的土地上生存。\n即使在零下１００度的環境下\n也能充滿活力地到處蹦蹦跳跳。"
