        jp_kana:
          sword: "きおんが　ひょうてんかになると\nじりょくが　つよまるので　ゆきやまに\nすむ　メタグロスは　とても　げんき。"
          shield: "２ひきの　メタングが　がったいした\nすがた。　スーパーコンピュータなみの\nずのうを　くしして　てきを　たおす。"
        jp_kanji:
          sword: "気温が　氷点下になると\n磁力が　強まるので　雪山に　棲む\nメタグロスは　とても　元気。"
          shield: "２匹の　メタングが　合体した　姿。\nスーパーコンピュータ並みの\n頭脳を　駆使して　敵を　倒す。"
        en:
          sword: "Because the magnetic powers of these Pokémon\nget stronger in freezing temperatures, Metagross\nliving on snowy mountains are full of energy."
          shield: "Metagross is the result of the fusion of two\nMetang. This Pokémon defeats its opponents\nthrough use of its supercomputer-level brain."
        fr:
          sword: "Les Métalosse vivant sur des pics enneigés sont\ntrès actifs, car leur force magnétique augmente\nlorsque la température est inférieure à zéro."
          shield: "Né de la fusion de deux Métang, il vient à bout\nde ses ennemis grâce à son cerveau qui est aussi\nperformant qu’un superordinateur."
        it:
          sword: "I Metagross che vivono sui monti innevati sono\nmolto vivaci, perché la loro forza magnetica\naumenta quando la temperatura va sottozero."
          shield: "È il risultato della fusione di due Metang.\nPer sconfiggere i nemici si serve del suo\ncervello, equiparabile a un supercomputer."
        de:
          sword: "Metagross, die auf verschneiten Bergen leben,\nsind besonders aktiv, da Temperaturen unter\ndem Gefrierpunkt ihren Magnetismus verstärken."
          shield: "Dieses Pokémon entstand aus der Fusion zweier\nMetang. Es bezwingt Gegner mithilfe seiner\nIntelligenz, die der eines Supercomputers gleicht."
        es:
          sword: "Su fuerza magnética se potencia en temperaturas\nbajo cero, por lo que los Metagross que habitan\nen montañas nevadas son especialmente vivaces."
          shield: "Formado a partir de la unión de dos Metang.\nEmplea su inteligencia, comparable a la de un\nsuperordenador, para derrotar a sus rivales."
        ko:
          sword: "기온이 영하로 내려가면\n자력이 강해지기 때문에 설산에 사는\n메타그로스는 매우 기운이 넘친다."
          shield: "2마리의 메탕구가 합체한\n모습이다. 슈퍼컴퓨터 수준의\n두뇌를 사용해 적을 쓰러뜨린다."
        zh_simp:
          sword: "由于当气温下降至０度\n以下时磁力会增强，栖息在\n雪山上的巨金怪特别有活力。"
          shield: "２只金属怪组合起来的样子。\n运用堪比超级计算机的\n头脑打败敌人。"
        zh_trad:
          sword: "當氣溫下降到低於冰點時，\n磁力就會變強。因此棲息在\n雪山裡的巨金怪非常有活力。"
          shield: "２隻金屬怪組合起來的\n樣子。會發揮堪比超級\n電腦的智能去打倒敵人。"
