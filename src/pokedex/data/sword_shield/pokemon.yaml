      descriptions:
        jp_kana:
          sword: "ぜんしんの　さいぼうを　くみかえて\nみたもの　そっくりに　へんしんするが\nちからが　ぬけると　もとにもどる。"
          shield: "メタモンどうし　であってしまうと\nあいてそっくりの　かたちに　なろうと\nいつもより　はげしく　うごく。"
        jp_kanji:
          sword: "全身の　細胞を　組み替えて\n見たもの　そっくりに　変身するが\n力が　抜けると　もとにもどる。"
          shield: "メタモン同士　出会ってしまうと\n相手そっくりの　形に　なろうと\nいつもより　激しく　動く。"
        en:
          sword: "It can reconstitute its entire cellular\nstructure to change into what it sees,\nbut it returns to normal when it relaxes."
          shield: "When it encounters another Ditto, it will move\nfaster than normal to duplicate that opponent exactly."
        fr:
          sword: "Il modifie sa structure cellulaire pour copier\nl’apparence de ce qu’il voit, mais au repos,\nil reprend sa forme normale."
          shield: "Quand il rencontre l’un de ses semblables,\nil s’agite avec plus de vivacité que d’habitude\npour adopter exactement la même forme que lui."
        it:
          sword: "Può modificare la sua struttura cellulare per\nassumere le sembianze di ciò che vede.\nRitorna se stesso quando è stanco."
          shield: "Quando incontra un altro Ditto, si muove più\nvelocemente del solito nel tentativo di assumere\nle sue sembianze."
        de:
          sword: "Es modifiziert seine Zellstruktur, um sich in alles\nzu verwandeln, was es sieht. Im entspannten\nZustand nimmt es wieder seine Ausgangsform an."
          shield: "Trifft es auf ein anderes Ditto, bewegt es sich\nschneller als gewöhnlich, um es exakt\nnachzuahmen."
        es:
          sword: "Redistribuye las células de su cuerpo para cobrar\nla apariencia de lo que ve, pero vuelve a la\nnormalidad al relajarse."
          shield: "Cuando se encuentra con otro Ditto, se mueve\nmás rápido de lo normal para intentar adoptar\nsu aspecto."
        ko:
          sword: "전신의 세포를 재구성해서\n본 것과 똑 닮게 변신하지만\n힘이 빠지면 원래대로 돌아간다."
          shield: "메타몽끼리 만나게 되면\n상대와 똑같은 모습이 되기 위해\n평소보다 격렬하게 움직인다."
        zh_simp:
          sword: "能够通过重组全身的细胞，\n变得与看到的东西一模一样，\n然而一旦放松就会变回原形。"
          shield: "当两只百变怪相遇的时候，\n为了能变成和对方相同的样子，\n它们动起来会比平常更加剧烈。"
        zh_trad:
          sword: "能夠藉由重組全身的細胞，\n變得與看到的東西一模一樣，\n然而一旦放鬆就會變回原形。"
          shield: "當兩隻百變怪相遇的時候，\n為了能變成和對方相同的樣子，\n牠們動起來會比平常更加劇烈。"
