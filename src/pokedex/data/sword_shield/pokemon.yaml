          shield: "ひとや　ポケモンを　つかんで\nそのまま　どこかへ　はこんでいく。\nいきさきは　だれも　しらない。"
        jp_kanji:
          sword: "無念の　死を　とげた　魂が\n集まった　姿とも　いわれる。\n宵闇を　音も　なく　漂う。"
          shield: "人や　ポケモンを　つかんで\nそのまま　どこかへ　運んでいく。\n行き先は　だれも　知らない。"
        en:
          sword: "Some say this Pokémon is a collection of souls\nburdened with regrets, silently drifting through\nthe dusk."
          shield: "It grabs people and Pokémon and carries them\noff somewhere. Where do they go?\nNobody knows."
        fr:
          sword: "Ce Pokémon, qui flotte silencieusement\nau crépuscule, serait né des âmes des défunts\nrongés par les regrets."
          shield: "Il attrape des personnes et des Pokémon pour\nles transporter vers une destination inconnue."
        it:
          sword: "Si dice che sia formato dall’aggregazione\ndi anime che hanno lasciato la vita con dei\nrimpianti. Fluttua silenzioso all’imbrunire."
          shield: "Afferra persone e Pokémon e li trascina via\ncon sé. Nessuno sa dove li porti."
        de:
          sword: "Man sagt, es bestehe aus den Seelen derer, die\nvoller Groll verstorben sind. Es treibt lautlos im\nZwielicht dahin."
          shield: "Es greift sich Menschen und Pokémon und trägt\nsie fort. Niemand weiß, wohin."
        es:
          sword: "Se dice que está formado por almas en pena.\nAl caer la noche, flota a la deriva en silencio\nsepulcral."
          shield: "Agarra a gente y a Pokémon para llevárselos a\nalgún sitio, aunque nadie sabe exactamente\nadónde."
        ko:
          sword: "억울하게 죽은 영혼이\n모인 모습으로도 일컬어진다.\n땅거미가 질 무렵 소리 없이 떠돈다."
          shield: "사람과 포켓몬을 붙잡아\n그대로 어딘가로 운반한다.\n행선지는 아무도 모른다."
        zh_simp:
          sword: "也有人说它是万念俱灰的\n灵魂聚在一起的样子。\n会在黑夜里静静地飘荡。"
          shield: "会抓住人和宝可梦，\n然后运到某个地方。\n没人知道那地方是哪里。"
        zh_trad:
          sword: "也有人說牠是萬念俱灰的\n靈魂聚在一起的樣子。\n會在黑夜裡靜靜地飄盪。"
          shield: "會抓住人和寶可夢，\n然後運到某個地方。\n沒人知道那地方是哪裡。"
