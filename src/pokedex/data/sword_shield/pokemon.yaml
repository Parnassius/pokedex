      descriptions:
        jp_kana:
          sword: "ひじょうに　きょうぼうな　せいかく。\nくちからだす　はかいこうせんは\nすべてのものを　やきつくす。"
          shield: "いちど　あばれだした　ギャラドスは\nあらしが　ふきすさんでいようとも\nどんなものでも　やきつくしてしまう。"
        jp_kanji:
          sword: "非常に　狂暴な　性格。\n口から出す　破壊光線は\nすべてのものを　焼きつくす。"
          shield: "一度　暴れだした　ギャラドスは\n嵐が　吹き荒んでいようとも\nどんなものでも　焼きつくしてしまう。"
        en:
          sword: "It has an extremely aggressive nature.\nThe Hyper Beam it shoots from its mouth\ntotally incinerates all targets."
          shield: "Once it begins to rampage, a Gyarados will burn\neverything down, even in a harsh storm."
        fr:
          sword: "Il est d’une nature très agressive.\nLes lasers qu’il tire de sa bouche sont capables\nde désintégrer n’importe quelle cible."
          shield: "Quand il se laisse emporter par la rage,\nmême la plus violente des tempêtes ne peut\nl’empêcher de détruire tout ce qui l’entoure."
        it:
          sword: "Pokémon estremamente aggressivo, incenerisce\nogni cosa con l’Iper Raggio che spara dalla\nbocca."
          shield: "Quando va su tutte le furie, incenerisce ogni\ncosa, anche nel mezzo di un violento temporale."
        de:
          sword: "Es ist von Natur aus sehr aggressiv.\nDer Hyperstrahl, den es aus seinem Maul\nverschießt, äschert seine Gegner ein."
          shield: "Wütet ein Garados, wird es alles niederbrennen.\nDies geschieht selbst während eines Sturms."
        es:
          sword: "Es exageradamente agresivo. El Hiperrayo que\nlanza por la boca reduce a cenizas todo lo que\nencuentra."
          shield: "Cuando monta en cólera, puede quemarlo todo,\nincluso en medio de la más violenta tormenta."
        ko:
          sword: "성격이 매우 흉포하다.\n입에서 나오는 파괴광선은\n모든 것을 태워버린다."
          shield: "한번 난동부리기 시작한 갸라도스는\n태풍이 사납게 휘몰아쳐도\n모든 것을 다 태워버린다."
        zh_simp:
          sword: "性格非常凶暴。\n从嘴里发出的破坏光线\n能够将一切燃烧殆尽。"
          shield: "就算是在狂风暴雨中，\n只要发狂的暴鲤龙出现，\n一切都会被它烧毁殆尽。"
        zh_trad:
          sword: "性情非常凶暴。\n從嘴裡發出的破壞光線\n能夠將一切燃燒殆盡。"
          shield: "就算是在狂風暴雨中，\n只要發狂的暴鯉龍出現，\n一切都會被牠燒毀殆盡。"
