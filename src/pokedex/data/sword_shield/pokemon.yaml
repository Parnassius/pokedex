      descriptions:
        jp_kana:
          sword: "まよなかに　どうたいから　ひびく\nぶきみな　なきごえは　あのよで\nくるしむ　ししゃの　なきごえらしい。"
          shield: "しんげつの　よる　げんかんの　ドアを\nパンプジンが　ノックする。　あけた\nひとを　あのよへ　つれていくのだ。"
        jp_kanji:
          sword: "真夜中に　胴体から　響く\n不気味な　鳴き声は　あの世で\n苦しむ　死者の　泣き声らしい。"
          shield: "新月の　夜　玄関の　ドアを\nパンプジンが　ノックする。　開けた\n人を　あの世へ　連れて行くのだ。"
        en:
          sword: "Eerie cries emanate from its body in the dead of\nnight. The sounds are said to be the wails of\nspirits who are suffering in the afterlife."
          shield: "In the darkness of a new-moon night, Gourgeist\nwill come knocking. Whoever answers the door\nwill be swept off to the afterlife."
        fr:
          sword: "Les lugubres lamentations nocturnes de\nson ventre seraient en fait les cris de souffrance\nd’âmes en peine, résonnant depuis l’au-delà."
          shield: "Les soirs de nouvelle lune, il frappe aux portes\ndes maisons. Si quelqu’un a le malheur de lui\nouvrir, il l’emporte aussitôt dans l’au-delà."
        it:
          sword: "Si dice che il lamento sinistro che fuoriesce dal\nsuo corpo a notte fonda sia la voce dei morti\nche soffrono nell’aldilà."
          shield: "Nelle notti di luna nuova bussa alle porte\ndelle case e porta nell’aldilà chi gli apre."
        de:
          sword: "Man sagt, der unheimliche Gesang, der nachts\naus dem Körper von diesem Pokémon dringt,\nsei das Wehklagen der Toten aus dem Jenseits."
          shield: "In Neumondnächten klopft Pumpdjinn an die\nEingangstüren der Häuser. Wer sie ihm öffnet,\nwird von ihm ins Jenseits entführt."
        es:
          sword: "Se dice que los espeluznantes alaridos que emite\nbien entrada la noche son los lamentos de almas\nen pena desde el más allá."
          shield: "Las noches de luna nueva llama a la puerta de las\ncasas y se lleva al otro mundo a quien abra."
        ko:
          sword: "한밤중에 몸속에서 들리는\n기분 나쁜 울음소리는 저세상에서\n고통받는 죽은 자의 울음소리라는 듯하다."
          shield: "초승달이 뜨는 밤이 되면 펌킨인이\n현관문을 노크한다. 그리고는 열어준\n사람을 저세상으로 데리고 간다."
        zh_simp:
          sword: "深夜时分，它身体里发出\n的诡异叫声似乎是死者\n在另一个世界里的痛苦哭声。"
          shield: "南瓜怪人会在朔月的夜里\n去别人家门口敲门。开了门的人\n会被它带往另一个世界。"
