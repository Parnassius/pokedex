        jp_kana:
          sword: "こどもたちを　じざいに　あやつり\nてきと　たたかう。　こどもたちは\nビークインのため　いのちを　かける。"
          shield: "フェロモンを　はなつ　りょうが\nおおい　ビークインほど　おおくの\nミツハニーを　したがえている。"
        jp_kanji:
          sword: "子どもたちを　自在に　操り\n敵と　戦う。　子どもたちは\nビークインのため　命を　かける。"
          shield: "フェロモンを　放つ　量が\n多い　ビークインほど　多くの\nミツハニーを　従えている。"
        en:
          sword: "It skillfully commands its grubs in battles with its\nenemies. The grubs are willing to risk their lives\nto defend Vespiquen."
          shield: "Vespiquen that give off more pheromones\nhave larger swarms of Combee attendants."
        fr:
          sword: "Ce Pokémon se bat en dirigeant ses petits.\nCes derniers sont prêts à se sacrifier pour\nleur Apireine."
          shield: "Plus la quantité de phéromones qu’il libère\nest élevée, plus le nombre d’Apitrini qu’il peut\ndiriger est grand."
        it:
          sword: "Attacca il nemico controllando a piacimento\nla sua progenie, che per Vespiquen è pronta\na sacrificare anche la propria vita."
          shield: "Maggiore è la quantità di feromoni rilasciati\nda Vespiquen, maggiore è il numero di Combee\nsotto il suo controllo."
        de:
          sword: "Es hat die Kontrolle über seine Nachkommen.\nDiese würden im Kampf ihr Leben aufs Spiel\nsetzen, um es vor Feinden zu schützen."
          shield: "Je mehr Pheromone ein Honweisel freisetzt,\ndesto mehr Wadribie kann es kontrollieren."
        es:
          sword: "Combate dirigiendo a sus larvas, que obedecen\na su reina sin rechistar y se sacrifican por ella si\nes necesario."
          shield: "Cuanto mayor sea la cantidad de feromonas que\nsegregue, mayor será el número de Combee que\npueda controlar."
        ko:
          sword: "새끼들을 자유자재로 조종하여\n상대와 싸운다. 새끼들은\n비퀸을 위해 목숨을 걸고 싸운다."
          shield: "페로몬을 발산하는 양이\n많은 비퀸일수록 많은\n세꿀버리를 거느리고 있다."
        zh_simp:
          sword: "自由自在地指挥孩子们\n与敌人战斗。孩子们会\n为了蜂女王而拼上性命。"
          shield: "能释放越多费洛蒙的蜂女王，\n就能让越多的三蜜蜂\n听从自己的指挥。"
        zh_trad:
          sword: "自由自在地指揮孩子們\n與敵人戰鬥。孩子們會\n為了蜂女王而拼上性命。"
          shield: "能釋放越多費洛蒙的蜂女王，\n就能讓越多的三蜜蜂\n聽從自己的指揮。"
