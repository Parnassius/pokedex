      types:
        - ghost
        - fire
      egg_groups:
        - amorphous
      abilities:
        - flash_fire
        - flame_body
      hidden_ability: infiltrator
      descriptions:
        jp_kana:
          sword: "ふるびた　ようかんに　すみつく。\nうでの　ほのおを　あやしく　ゆらし\nあいてを　さいみんに　かけるぞ。"
          shield: "シャンデラを　あかりの　かわりに\nしていた　やしきでは　そうしきが\nたえることが　なかった　という。"
        jp_kanji:
          sword: "古びた　洋館に　棲みつく。\n腕の　炎を　妖しく　揺らし\n相手を　催眠に　かけるぞ。"
          shield: "シャンデラを　灯りの　かわりに\nしていた　屋敷では　葬式が\n絶えることが　なかった　という。"
        en:
          sword: "This Pokémon haunts dilapidated mansions.\nIt sways its arms to hypnotize opponents with\nthe ominous dancing of its flames."
          shield: "In homes illuminated by Chandelure instead of\nlights, funerals were a constant occurrence—\nor so it’s said."
        fr:
          sword: "Il s’installe dans les résidences anciennes.\nPour hypnotiser son adversaire, il agite\nles flammes de ses bras de manière inquiétante."
          shield: "On raconte que dans les manoirs éclairés\npar des Lugulabre, les funérailles s’enchaînent\nsans discontinuer."
        it:
          sword: "Infesta vecchie case. Ipnotizza l’avversario\nfacendo tremolare le fiammelle sugli arti."
          shield: "Si dice che nelle ville in cui i Chandelure erano\nutilizzati al posto dei lampadari i funerali\nsi susseguissero senza sosta."
        de:
          sword: "Dieses Pokémon bewohnt gerne alte Anwesen. Es\nhypnotisiert seine Opfer, indem es die Flammen\nan seinen Armen auf unheimliche Weise schwenkt."
          shield: "Angeblich soll früher in Häusern, wo Skelabra zur\nBeleuchtung verwendet wurden, eine Beerdigung\nauf die andere gefolgt sein."
        es:
          sword: "Establece su morada en edificios antiguos.\nMece las llamas de los brazos de forma siniestra\npara hipnotizar a sus enemigos."
          shield: "Cuentan que, en las mansiones donde se usaba\npara la iluminación, los funerales se sucedían de\nforma incesante."
        ko:
          sword: "오래된 양옥집에 산다.\n팔의 불꽃을 이상하게 흔들어서\n상대에게 최면을 건다."
          shield: "샹델라를 등불 대용으로\n사용했던 저택에서는 장례식이\n끊이지 않았다고 한다."
        zh_simp:
          sword: "住在古老的洋楼里。\n诡异地摇晃手臂上的火焰，\n以此来催眠对手。"
          shield: "据说在用水晶灯火灵\n来充当照明设备的房子里，\n丧事会接连不断。"
        zh_trad:
          sword: "住在古老的洋樓裡。\n詭異地搖晃手臂上的火焰，\n以此來催眠對手。"
          shield: "據說在用水晶燈火靈\n來充當照明設備的房子裡，\n喪事會接連不斷。"
