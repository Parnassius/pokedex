          sword: "ひづめから　きょうりょくな　れいきを\nはなつ。　ほしいものは　なんでも\nちからずくで　うばう　あばれんぼう。"
          shield: "すさまじい　かいりきの　もちぬし。\nかおを　おおう　こおりの　マスクは\nダイヤモンドの　１００ばい　かたい。"
        jp_kanji:
          sword: "蹄から　強力な　冷気を\n放つ。　欲しいものは　なんでも\n力尽くで　奪う　暴れん坊。"
          shield: "凄まじい　怪力の　持ち主。\n顔を　覆う　氷の　マスクは\nダイヤモンドの　１００倍　硬い。"
        en:
          sword: "Glastrier emits intense cold from its hooves.\nIt’s also a belligerent Pokémon—anything it\nwants, it takes by force."
          shield: "Glastrier has tremendous physical strength, and\nthe mask of ice covering its face is 100 times\nharder than diamond."
        fr:
          sword: "Violent au point de s’emparer de tout ce qu’il\ndésire par la force, ce Pokémon est capable\nde libérer un puissant air glacial de ses sabots."
          shield: "Ce Pokémon à la force hors du commun porte\nun masque composé de glace cent fois plus\nsolide que le diamant."
        it:
          sword: "Rilascia una potente aria gelida dagli zoccoli.\nÈ impetuoso e prende con la forza tutto ciò\nche vuole."
          shield: "È dotato di una forza incommensurabile.\nLa maschera di ghiaccio che gli ricopre il muso\nè cento volte più dura del diamante."
        de:
          sword: "Aus seinen Hufen verströmt es eisige Kälte.\nDieses ungestüme Pokémon nimmt sich alles,\nwas es will, mit roher Gewalt."
          shield: "Das Gesicht dieses außergewöhnlich starken\nPokémon wird von einer Maske aus Eis bedeckt,\ndie hundertmal härter als Diamant ist."
        es:
          sword: "Libera un potente vaho gélido por las pezuñas.\nUn ser violento que no duda en tomar a la fuerza\ntodo cuanto desea."
          shield: "Cuenta con una fuerza física sobrecogedora.\nLa máscara de hielo que le cubre el rostro es\ncien veces más dura que el diamante."
        ko:
          sword: "발굽에서 강력한 냉기를 발산한다.\n원하는 것은 무엇이든\n힘으로 빼앗는 폭군."
          shield: "굉장한 괴력을 가졌다.\n얼굴을 덮는 얼음 마스크는\n다이아몬드보다 100배 단단하다."
        zh_simp:
          sword: "会从蹄子释放出强力的冷气。\n性格粗暴，只要是自己想要的\n东西，就会竭尽全力去抢夺。"
          shield: "拥有十分惊人的怪力。\n戴在脸上的冰之面罩\n硬度是钻石的１００倍"
        zh_trad:
          sword: "會從蹄子釋放出強烈的寒氣。\n性情暴躁，只要是自己想要\n的東西，就會強行去搶奪。"
          shield: "擁有十分驚人的怪力。\n遮住臉部的冰面罩比\n鑽石還要堅硬１００倍。"
