          shield: "かたいカラと　どくのトゲで　みを\nまもり　しんかに　ひつような\nエネルギーを　ためているのだ。"
        jp_kanji:
          sword: "高速で　回転し　相手に　突撃。\n最高時速は\nおよそ　１００キロに　達する。"
          shield: "硬い殻と　毒のトゲで　身を\n守り　進化に　必要な\nエネルギーを　溜めているのだ。"
        en:
          sword: "This Pokémon spins itself rapidly and charges into\nits opponents. Its top speed is just over 60 mph."
          shield: "Whirlipede protects itself with a sturdy shell and\npoisonous spikes while it stores up the energy it’ll\nneed for evolution."
        fr:
          sword: "Il se propulse sur ses ennemis en tournant\ntrès vite sur lui-même. Il peut ainsi atteindre\nune vitesse d’environ 100 km/h."
          shield: "Il se protège avec sa solide carapace et ses épines\nempoisonnées tandis qu’il rassemble l’énergie\nnécessaire à son évolution."
        it:
          sword: "Attacca l’avversario turbinando rapidamente\nsu se stesso. Può raggiungere una velocità\ndi circa 100 km/h."
          shield: "Mentre accumula l’energia necessaria per\nevolversi, si difende con il guscio resistente\ne le spine velenose."
        de:
          sword: "Rollum dreht sich mit hoher Geschwindigkeit\nund rammt seine Gegner. Dabei erreicht es\nGeschwindigkeiten von bis zu 100 km/h."
          shield: "Es schützt sich mit seinem harten Panzer und den\nGiftspitzen, um ungestört genügend Energie für\nseine Entwicklung zu sammeln."
        es:
          sword: "Gira a gran velocidad y carga contra sus rivales.\nPuede alcanzar los 100 km/h."
          shield: "Se defiende con su duro caparazón y sus\npúas venenosas mientras acumula la energía\nnecesaria para evolucionar."
        ko:
          sword: "고속으로 회전해 상대에게\n돌격한다. 최고 시속은\n약 100km에 달한다."
          shield: "단단한 껍질과 독가시로\n몸을 보호하면서 진화에 필요한\n에너지를 비축하고 있다."
        zh_simp:
          sword: "高速旋转突击对方。\n最高时速可以达到\n１００公里左右。"
          shield: "用坚硬的壳和带毒的刺\n保护自己的身体，\n积蓄进化所需的能量。"
        zh_trad:
          sword: "會高速旋轉去突擊對手。\n牠的最高時速可以達到\n大約１００公里。"
          shield: "用堅硬的殼和有毒的刺\n保護自己，同時累積\n進化所需的能量。"
scolipede:
