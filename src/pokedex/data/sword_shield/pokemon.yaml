      descriptions:
        jp_kana:
          sword: "カラに　おおわれているが　じゆうに\nとびまわれる。　かたさと　はやさを\nもつので　はかいりょく　ばつぐんだ。"
          shield: "さなぎだが　じっと　していない。\nがんじょうな　カラの　したでは\nすでに　てあしが　できている。"
        jp_kanji:
          sword: "殻に　被われているが　自由に\n飛びまわれる。　硬さと　速さを\nもつので　破壊力　抜群だ。"
          shield: "さなぎだが　じっと　していない。\n頑丈な　殻の　下では\nすでに　手足が　できている。"
        en:
          sword: "Even sealed in its shell, it can move freely.\nHard and fast, it has outstanding\ndestructive power."
          shield: "It will not stay still, even while it’s a pupa.\nIt already has arms and legs under its solid shell."
        fr:
          sword: "Il peut se déplacer même s’il est coincé\ndans sa coquille. Sa robustesse et sa vitesse\nlui confèrent un terrible pouvoir de destruction."
          shield: "Malgré son état de chrysalide, il ne reste pas\nimmobile. Sous sa solide carapace, ses pattes\nsortent déjà."
        it:
          sword: "Può muoversi liberamente anche se è chiuso\nnel guscio. Resistente e rapido, ha un enorme\npotere distruttivo."
          shield: "È una crisalide ma non sta mai fermo. Gli arti\nsono già formati sotto il duro guscio."
        de:
          sword: "Trotz seiner harten Schale kann es sich frei\nbewegen. Es ist flink und äußerst zerstörerisch."
          shield: "Obwohl es sich noch im Puppenstadium befindet,\nbewegt es sich rege. Es hat schon Arme und\nBeine unter seinem harten Panzer."
        es:
          sword: "Se mueve libremente aun encerrado en la coraza.\nSu enorme poder destructivo se une a su dureza\ny rapidez."
          shield: "No se está quieto ni aun siendo una pupa. Sus\nextremidades ya se han formado bajo su robusta\ncoraza."
        ko:
          sword: "껍질에 덮여 있지만 자유로이\n뛰어다닌다. 단단함과 스피드를\n지니고 있어서 파괴력이 대단하다."
          shield: "번데기지만 가만히 있지 않는다.\n단단한 껍질 안에는\n이미 팔다리가 만들어져 있다."
        zh_simp:
          sword: "被外壳覆盖，但能自由自在地\n跳来跳去。兼具硬度和速度，\n因此破坏力超群。"
          shield: "虽然是蛹却不会呆着不动。\n在坚硬的甲壳之下\n已经长出了手脚。"
        zh_trad:
          sword: "被外殼覆蓋，但能自由自在地\n跳來跳去。兼具硬度與速度，\n因此破壞力超群。"
          shield: "雖然是蛹卻不會呆著不動。\n在堅硬的甲殼之下\n已經長出了手腳。"
tyranitar:
