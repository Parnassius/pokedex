          shield: "まっくろな　シッポを　かくすため\nくらやみで　ひっそりと　いきている。\nじぶんからは　こうげき　しない。"
        jp_kanji:
          sword: "光や　ショックを　嫌う。\n攻撃されると　体が　ふくらみ\n反撃が　強力に　なる。"
          shield: "真っ黒な　尻尾を　隠すため\n暗闇で　ひっそりと　生きている。\n自分からは　攻撃しない。"
        en:
          sword: "It hates light and shock. If attacked, it inflates its\nbody to pump up its counterstrike."
          shield: "To keep its pitch-black tail hidden, it lives quietly\nin the darkness. It is never first to attack."
        fr:
          sword: "Il déteste la lumière et les chocs. S’il est attaqué,\nil se gonfle pour riposter violemment."
          shield: "Il vit discrètement dans l’obscurité pour cacher\nsa queue noire. Il n’attaque jamais en premier."
        it:
          sword: "Odia la luce e gli shock. Quando viene attaccato,\ngonfia il corpo per preparare il contrattacco."
          shield: "Vive nel silenzio e nell’oscurità per nascondere\nla coda nera come la pece. Non attacca mai\nper primo."
        de:
          sword: "Es hasst Licht und Schocks. Wird es angegriffen,\npumpt es sich auf, um einen Gegenschlag\nvorzubereiten."
          shield: "Es lebt in der Dunkelheit, um seinen schwarzen\nSchweif zu verstecken. Es greift nie zuerst an."
        es:
          sword: "Odia la luz y las sacudidas. Si le atacan, infla su\ncuerpo para contraatacar con más ímpetu."
          shield: "Para mantener oculta su negra cola, vive en\nsilencio en la oscuridad. Nunca ataca primero."
        ko:
          sword: "빛과 쇼크를 싫어한다.\n공격받으면 몸이 부풀어올라\n반격이 강력해진다."
          shield: "새까만 꼬리를 숨기기 위해\n어둠 속에서 은밀히 지내고 있다.\n자신이 먼저 공격하는 일은 없다."
        zh_simp:
          sword: "讨厌光和冲击。\n受到攻击时，身体就会膨胀，\n反击也会因此变强。"
          shield: "为了隐藏漆黑的尾巴\n而悄悄地生活在黑暗之中。\n不会主动发起攻击。"
        zh_trad:
          sword: "討厭光和衝擊。\n受到攻擊時身體會膨脹，\n反擊也會因此變強。"
          shield: "為了隱藏漆黑的尾巴\n而悄悄地生活在黑暗之中。\n不會主動發動攻擊。"
dunsparce:
