          sword: "すあなのなかに　ひのこを　とばし　\nおどろいて　でてきた　えものを\nするどい　ツメで　しとめるのだ。"
          shield: "なわばりいしきが　とても　つよく\nこうせんてき。　えさばを　めぐり\nヒノヤコマどうしで　あらそう。"
        jp_kanji:
          sword: "巣穴の中に　火の粉を　飛ばし\n驚いて　出てきた　獲物を\n鋭い　ツメで　しとめるのだ。"
          shield: "縄張り意識が　とても　強く\n好戦的。　餌場を　めぐり\nヒノヤコマ同士で　争う。"
        en:
          sword: "Fletchinder launches embers into the den of\nits prey. When the prey comes leaping out,\nFletchinder’s sharp talons finish it off."
          shield: "Fletchinder are exceedingly territorial and\naggressive. These Pokémon fight among\nthemselves over feeding grounds."
        fr:
          sword: "Il lance des étincelles dans le terrier de ses proies\npour les effrayer. Dès qu’elles en émergent,\nil les attaque à coups de serres."
          shield: "De nature belliqueuse, il dispose d’un fort\ninstinct territorial. Quand il chasse, il se dispute\nrégulièrement les proies avec ses congénères."
        it:
          sword: "Scaglia scintille nelle tane delle prede e attacca\ncon i suoi artigli affilati quelle che ne escono\nspaventate."
          shield: "È molto territoriale e aggressivo. Si contende\nil territorio di caccia con gli altri Fletchinder."
        de:
          sword: "Es speit Funken in Nisthöhlen und erlegt die\nerschrocken daraus hervorkommende Beute\nmit seinen scharfen Krallen."
          shield: "Dieses kriegerische Pokémon hat ein stark\nausgeprägtes Revierverhalten. Es kämpft mit\nanderen Dartignis um Futterplätze."
        es:
          sword: "Lanza chispas al interior de la guarida de su\npresa y, cuando esta sale despavorida, la ataca\npor sorpresa con sus afiladas garras."
          shield: "Defienden su territorio con suma agresividad.\nSe pelean entre sí por el control de las áreas de\ncaza."
        ko:
          sword: "굴 속에 불똥을 쏜 다음\n놀라서 빠져나온 먹이를\n날카로운 발톱으로 잡는다."
          shield: "영역에 대한 개념이 매우 강하고\n호전적이다. 먹이 먹는 장소를 두고\n불화살빈끼리 싸운다."
        zh_simp:
          sword: "会向猎物的巢穴中喷射火花，\n然后用锐利的爪子\n了结受惊而出的猎物。"
          shield: "领地意识很强，性格好战。\n火箭雀彼此之间会为了\n觅食的地方发生争斗。"
        zh_trad:
          sword: "會朝著獵物的巢穴中噴射火花，\n再用銳利的爪子解決掉\n受驚嚇而跑出來的獵物。"
          shield: "地盤意識很強，且性情好戰。\n火箭雀彼此之間也會為了\n爭奪覓食的地方而戰鬥。"
talonflame:
  species_id: 663
  names:
    jp_kana: ファイアロー
    jp_kanji: ファイアロー
    en: Talonflame
    fr: Flambusard
    it: Talonflame
    de: Fiaro
    es: Talonflame
    ko: 파이어로
    zh_simp: 烈箭鹰
    zh_trad: 烈箭鷹
  forms:
    talonflame:
      form_id: 0
      base_stats:
        hp: 78
