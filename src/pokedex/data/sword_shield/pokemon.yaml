      descriptions:
        jp_kana:
          sword: "あまい　りんごを　たべて　しんか。\nからだから　あまい　においを　だして\nエサの　むしポケモンを　ひきよせる。"
          shield: "あまい　みつで　からだが　おおわれ\nせなかの　かわは　とくに　あまく\nむかしは　こどもの　おやつだった。"
        jp_kanji:
          sword: "甘い　りんごを　食べて　進化。\n体から　甘い　においを　だして\n餌の　虫ポケモンを　引き寄せる。"
          shield: "甘い　蜜で　体が　おおわれ\n背中の　皮は　とくに　甘く\n昔は　子どもの　おやつだった。"
        en:
          sword: "Eating a sweet apple caused its evolution.\nA nectarous scent wafts from its body, luring in\nthe bug Pokémon it preys on."
          shield: "Its body is covered in sweet nectar, and the\nskin on its back is especially yummy. Children\nused to have it as a snack."
        fr:
          sword: "Il a évolué après avoir mangé une pomme sucrée.\nIl attire ses proies, les Pokémon Insecte,\nen dégageant un parfum mielleux."
          shield: "Son corps est recouvert de nectar.\nLa peau de son dos, particulièrement sucrée,\nconstituait jadis le goûter des enfants."
        it:
          sword: "Si è evoluto dopo aver mangiato una mela dolce.\nSi nutre di Pokémon Coleottero, che attira\nemanando un dolce profumo dal corpo."
          shield: "È ricoperto di una specie di sciroppo. La buccia\nsulla sua schiena, particolarmente dolce, una\nvolta veniva data ai bambini per merenda."
        de:
          sword: "Nach dem Verzehr eines süßen Apfels hat es sich\nentwickelt. Es verströmt einen süßen Duft und\nlockt damit sein Futter an: Käfer-Pokémon."
          shield: "Sein Körper wird von süßem Nektar bedeckt und\ndie Schale auf seinem Rücken ist besonders süß.\nFrüher war diese ein Leckerbissen für Kinder."
        es:
          sword: "Ha evolucionado tras ingerir una manzana dulce.\nDe ahí que el olor que emana para atraer a sus\npresas, los Pokémon insecto, sea tan agradable."
          shield: "Su cuerpo está recubierto de néctar. La piel de\nla espalda es tan dulce que los niños de antaño\nsolían tomarla como merienda."
        ko:
          sword: "달콤한 사과를 먹고 진화했다.\n몸에서 달콤한 향기를 내보내서\n먹이인 벌레포켓몬을 유인한다."
          shield: "달콤한 꿀로 몸이 둘러싸여 있다.\n등의 껍질은 특히 더 달콤해서\n옛날에는 어린이 간식이었다."
        zh_simp:
          sword: "啃果虫吃了甜苹果后进化而成。\n以虫宝可梦为食，会从体内发出\n甜甜的香味引诱它们上钩。"
          shield: "身体被甜甜的蜜汁包裹，\n背部的皮尤其甘甜，\n过去曾经是小孩的零食。"
        zh_trad:
          sword: "啃果蟲吃了甜蘋果後進化而成。\n以蟲寶可夢為食，會從體內發出\n甜甜的香味引誘牠們上鉤。"
          shield: "身體被甜甜的蜜汁包裹，\n背部的皮尤其甘甜，\n過去曾經是小孩的零食。"
  gmax_forms:
    appletun_gigantamax:
      form_id: 999
      names:
        jp_kana: キョダイマックス
        jp_kanji: キョダイマックス
        en: Gigantamax
        fr: Gigamax
        it: Gigamax
        de: Gigadynamax
        es: Gigamax
        ko: 거다이맥스
        zh_simp: 超极巨化
        zh_trad: 超極巨化
      descriptions:
        jp_kana:
          sword: "たいないの　みつを　たいりょうに\nふんしゃして　あびせかけ　べたべたの\nねんえきの　なかで　ちっそくさせる。"
          shield: "キョダイマックスの　パワーによって\nみつの　ねんどは　さらに　たかくなり\nダメージを　きゅうしゅうする。"
        jp_kanji:
          sword: "体内の　蜜を　大量に\n噴射して　浴びせかけ　べたべたの\n粘液の　中で　窒息させる。"
          shield: "キョダイマックスの　パワーによって\n蜜の　粘度は　さらに　高くなり\nダメージを　吸収する。"
        en:
          sword: "It blasts its opponents with massive amounts\nof sweet, sticky nectar, drowning them under\nthe deluge."
          shield: "Due to Gigantamax energy, this Pokémon’s\nnectar has thickened. The increased viscosity lets\nthe nectar absorb more damage than before."
        fr:
          sword: "Il fait jaillir par litres le nectar contenu dans\nson corps. Il asperge ses ennemis, qui suffoquent\nsous ce liquide visqueux."
          shield: "Grâce au pouvoir du Gigamax, son nectar\nest devenu encore plus visqueux et peut\nabsorber les chocs."
        it:
          sword: "Spruzza il nemico con un enorme fiotto\ndi sciroppo, cospargendolo di un liquido\nvischioso che lo fa soffocare."
          shield: "Il suo sciroppo, diventato ancora più viscoso\ngrazie all’energia del fenomeno Gigamax,\nattutisce i danni."
        de:
          sword: "Es feuert große Mengen an Nektar aus seinem\nKörper auf seine Gegner, damit diese unter dem\nklebrigen Schleim ersticken."
          shield: "Durch die Gigadynamax-Energie ist sein Nektar\nso zähflüssig geworden, dass er die Wucht\ngegnerischer Angriffe abfangen kann."
        es:
          sword: "Expulsa grandes chorros de néctar con los que\nrocía y cubre por completo al rival, que acaba\nasfixiado bajo el fluido viscoso."
          shield: "A causa del fenómeno Gigamax, su néctar se\nhace más viscoso y puede absorber gran parte\nde los ataques que recibe."
        ko:
          sword: "체내의 꿀을 대량으로 분사해서\n뒤집어쓰게 한 다음 끈적끈적한\n점액 속에서 질식하게 한다."
          shield: "거다이맥스의 파워에 의해\n꿀의 점성이 더 높아져\n데미지를 흡수한다."
        zh_simp:
          sword: "会向敌人大量喷射\n体内的蜜，让对方在\n黏糊糊的黏液里窒息。"
          shield: "在超极巨化之力的影响下，\n蜜汁的黏度进一步提升，\n能够吸收受到的伤害。"
        zh_trad:
          sword: "會向敵人大量噴射\n體內的蜜，讓對方在\n黏糊糊的黏液裡窒息。"
          shield: "在超極巨化之力的影響下，\n蜜汁的黏度進一步提升，\n能夠吸收受到的傷害。"
