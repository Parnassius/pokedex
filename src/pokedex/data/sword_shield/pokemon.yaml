        jp_kana:
          sword: "カギを　あつめつづける　ポケモン。\nだいじな　カギを　あずけると\nなにが　あっても　まもってくれる。"
          shield: "あたまのさきで　きんぞくイオンを\nすいとる。　カギに　にているのは\nすきすぎて　まねているかららしい。"
        jp_kanji:
          sword: "鍵を　集めつづける　ポケモン。\n大事な　鍵を　預けると\nなにが　あっても　守ってくれる。"
          shield: "頭の先で　金属イオンを　吸い取る。\n鍵に　似ているのは\n好きすぎて　まねているかららしい。"
        en:
          sword: "This Pokémon is constantly collecting keys.\nEntrust a Klefki with important keys, and the\nPokémon will protect them no matter what."
          shield: "Klefki sucks in metal ions with the horn topping\nits head. It seems this Pokémon loves keys so\nmuch that its head needed to look like one, too."
        fr:
          sword: "Ce Pokémon collectionne les clés.\nSi on lui en confie une particulièrement\nimportante, il la protègera coûte que coûte."
          shield: "Il absorbe les ions métalliques avec l’appendice\nsur sa tête. Il paraît qu’il ressemble à une clé\ncar il tient à imiter cet objet qu’il aime tant."
        it:
          sword: "Colleziona chiavi. Se gli si affida una chiave\nimportante, si può star sicuri che la proteggerà\na ogni costo."
          shield: "Assorbe gli ioni metallici con la sporgenza\nsulla testa. Si dice che abbia modificato il suo\naspetto per assomigliare alle sue amate chiavi."
        de:
          sword: "Dieses Pokémon sammelt unaufhörlich Schlüssel.\nVertraut man ihm einen besonders wichtigen an,\nbeschützt es diesen um jeden Preis."
          shield: "Mit dem Fortsatz an seinem Kopf saugt Clavion\nMetall-Ionen ein. Anscheinend liebt es Schlüssel\nso sehr, dass es sie mit seinem Aussehen imitiert."
        es:
          sword: "Un Pokémon coleccionista de llaves. Si alguien le\nconfía una muy importante, la protegerá como si\nle fuese la vida en ello."
          shield: "Según parece, absorbe iones metálicos por el\napéndice de la cabeza para adoptar una forma\nsimilar a la de sus amadas llaves."
        ko:
          sword: "열쇠를 계속 모으는 포켓몬이다.\n소중한 열쇠를 맡기면\n무슨 일이 있어도 지켜준다."
          shield: "머리끝으로 금속 이온을 흡수한다.\n열쇠를 너무 좋아한 나머지 흉내를 내서\n열쇠를 닮은 모습이 되었다고 한다."
        zh_simp:
          sword: "一直在收集钥匙的宝可梦。\n如果把重要的钥匙托付给它，\n无论发生什么它都会全力守护。"
          shield: "会用头的前端吸取金属离子。\n之所以长得像钥匙，据说是因为\n太过喜欢钥匙，情不自禁进行了模仿。"
        zh_trad:
          sword: "不斷收集鑰匙的寶可夢。\n如果把重要的鑰匙交給牠，\n無論發生什麼牠都會全力保管。"
          shield: "會用頭的前端吸取金屬離子。\n據說是因為愛鑰匙成癡，\n因此擬態成鑰匙的樣子。"
