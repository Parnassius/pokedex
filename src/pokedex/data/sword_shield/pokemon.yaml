      egg_groups:
        - monster
        - field
      abilities:
        - poison_point
        - rivalry
      hidden_ability: hustle
      descriptions:
        jp_kana:
          sword: "ひたいの　ツノには　もうどくがある。\nけいかいしんが　つよく　おおきな\nみみを　つねに　そばだてている。"
          shield: "こがらだが　いさましい　せいしつ。\nなかよしの　メスを　まもるため\nみを　ていして　かかんに　たたかう。"
        jp_kanji:
          sword: "額の　ツノには　猛毒がある。\n警戒心が　強く　大きな　耳を\nつねに　そばだてている。"
          shield: "小柄だが　勇ましい　性質。\n仲良しの　メスを　守るため\n身を　ていして　果敢に　戦う。"
        en:
          sword: "The horn on a male Nidoran’s forehead contains\na powerful poison. This is a very cautious\nPokémon, always straining its large ears."
          shield: "Small but brave, this Pokémon will hold its\nground and even risk its life in battle to protect\nthe female it’s friendly with."
        fr:
          sword: "Sa corne frontale contient un puissant poison.\nLes grandes oreilles de ce Pokémon très prudent\nsont constamment dressées."
          shield: "Malgré sa petite taille, il est très téméraire.\nAfin de protéger sa compagne, il est prêt à\nse battre et à risquer sa vie."
        it:
          sword: "Il corno sulla fronte è estremamente velenoso.\nDi indole circospetta, rizza costantemente le\nsue grandi orecchie."
          shield: "Impavido nonostante la corporatura minuta,\nlotta con coraggio per proteggere la femmina\na cui è affezionato, anche a costo della vita."
        de:
          sword: "Das Horn auf seiner Stirn enthält ein starkes Gift.\nDieses Pokémon ist sehr vorsichtig und stellt\nseine großen Ohren stets wachsam auf."
          shield: "Trotz seiner geringen Größe ist es sehr mutig.\nUm ein befreundetes Weibchen zu beschützen,\nriskiert es sein Leben und kämpft unerschrocken."
        es:
          sword: "Mantiene sus grandes orejas levantadas, siempre\nalerta. Si advierte peligro, ataca inoculando una\npotente toxina con su cuerno frontal."
          shield: "Pequeño pero valiente. Arriesgaría la vida en\ncombate con tal de proteger a su compañera."
        ko:
          sword: "이마의 뿔에는 맹독이 있다.\n경계심이 강해서 커다란\n귀를 늘 쫑긋 세우고 있다."
          shield: "몸집은 작지만 용맹한 성질을 지녔다.\n친한 암컷을 지키기 위해\n몸을 던져 과감히 싸운다."
        zh_simp:
          sword: "额头上的角含有剧毒。\n警戒心强，无论何时都\n竖着自己大大的耳朵。"
          shield: "身材虽小，却性格勇敢。\n为了保护相好的雌性，\n会不顾生命果敢地战斗。"
        zh_trad:
          sword: "額頭的角有劇毒。\n警戒心強，隨時都\n豎著大耳朵戒備著。"
          shield: "體型嬌小，但性情勇猛。\n為了保護感情好的雌性，\n會奮不顧身地勇敢戰鬥。"
nidorino:
