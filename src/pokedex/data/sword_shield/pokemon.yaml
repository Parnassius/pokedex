          shield: "ぜんしんが　こおりで　できている。\nひょうがじだいに　ぶあつい　こおりの\nしたで　うまれたと　いわれている。"
        jp_kanji:
          sword: "マイナス２００度まで　冷えこむ\n冷気を　操り　近づいたものを\nあっという間に　氷漬けにする。"
          shield: "全身が　氷で　できている。\n氷河時代に　ぶ厚い　氷の　下で\n生まれたと　いわれている。"
        en:
          sword: "With cold air that can reach temperatures as low\nas −328 degrees Fahrenheit, Regice instantly\nfreezes any creature that approaches it."
          shield: "This Pokémon’s body is made of solid ice. It’s\nsaid that Regice was born beneath thick ice in\nthe ice age."
        fr:
          sword: "Regice gèle quiconque s’approche de lui\nen un instant avec de l’air glacé pouvant\natteindre -200 °C."
          shield: "Ce Pokémon de l’ère glaciaire dont le corps\nest entièrement composé d’eau gelée serait\nné sous une épaisse couche de glace."
        it:
          sword: "Utilizza aria gelida fino a -200 ºC per congelare\nall’istante chiunque gli si avvicini."
          shield: "Il suo corpo è interamente costituito da ghiaccio.\nSi narra che nacque sotto un massiccio strato\ndi ghiaccio durante l’era glaciale."
        de:
          sword: "Regice kontrolliert bis zu -200 ºC kalte Luft,\nmit der es alles und jeden in seiner Nähe im\nHandumdrehen gefrieren lässt."
          shield: "Sein gesamter Körper besteht aus Eis. Man sagt,\nes wurde während der Eiszeit unter einer dicken\nEisschicht geboren."
        es:
          sword: "Usa corrientes de aire gélido de hasta -200 ºC\npara congelar en un instante a cualquiera que se\nle acerque."
          shield: "Todo su cuerpo está compuesto de hielo.\nSe dice que surgió bajo una gruesa placa\nde hielo durante alguna glaciación."
        ko:
          sword: "영하 200도까지 내려가는\n냉기를 조종해 다가오는 자를\n순식간에 얼려버린다."
          shield: "전신이 얼음으로 되어 있다.\n빙하 시대에 두꺼운 얼음\n아래에서 태어났다고 전해진다."
        zh_simp:
          sword: "会操控冰冷至零下２００度\n的冷气，将接近自己的\n家伙一下子冰镇起来。"
          shield: "拥有一副由冰构成的身体。\n据说是诞生于冰河时期\n冻得厚厚实实的冰块之下。"
        zh_trad:
          sword: "能操控降至零下２００度\n的寒氣，將靠近牠的東西\n都在一瞬間就冰封起來。"
          shield: "全身都是由冰塊構成。\n據說牠是在冰河時期\n誕生在厚實的冰層下。"
