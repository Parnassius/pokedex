      descriptions:
        jp_kana:
          sword: "２ほんの　スティックで　はげしい\nビートを　きざめる　バチンキーほど\nなかまたちの　そんけいを　あつめる。"
          shield: "はげしい　ビートを　きざむことに\nむちゅうになる　あまり　たたかいで\nあいてが　きぜつしても　きづかない。"
        jp_kanji:
          sword: "２本の　スティックで　激しい\nビートを　刻める　バチンキーほど\n仲間たちの　尊敬を　集める。"
          shield: "激しい　ビートを　刻むことに\n夢中になる　あまり　戦いで\n相手が　気絶しても　気づかない。"
        en:
          sword: "The faster a Thwackey can beat out a rhythm\nwith its two sticks, the more respect it wins from\nits peers."
          shield: "When it’s drumming out rapid beats in battle, it\ngets so caught up in the rhythm that it won’t even\nnotice that it’s already knocked out its opponent."
        fr:
          sword: "Les Badabouin qui parviennent à suivre le rythme\nle plus effréné avec leurs deux bâtons sont\nles plus respectés par leurs camarades."
          shield: "Il est tellement concentré à battre à un rythme\neffréné que même lorsque son adversaire\ntombe K.O., il ne s’en rend pas compte."
        it:
          sword: "I Thwackey più rispettati dai propri simili sono\nquelli in grado di produrre un ritmo forsennato\ncon le due bacchette."
          shield: "Durante la lotta si concentra così tanto nel tenere\nun ritmo febbrile che non si accorge nemmeno\nse il nemico va KO."
        de:
          sword: "Je wilder der Beat, den ein Chimstix mit seinen\nzwei Schlägeln erzeugt, desto mehr wird es von\nseinen Artgenossen respektiert."
          shield: "Verliert es sich im Kampf in seinem wilden Beat,\nbemerkt es ab und zu nicht mal, dass sein Gegner\nbereits zu Boden gegangen ist."
        es:
          sword: "Los Thwackey que marcan el ritmo más\ncontundente con sus dos baquetas son los\nmás respetados por sus congéneres."
          shield: "Se concentra tanto en marcar el ritmo que,\ncuando su rival se debilita en combate, no se\nda ni cuenta."
        ko:
          sword: "2개의 스틱으로 격렬한\n비트를 만드는 채키몽일수록\n동료들에게 존경받는다."
          shield: "격렬한 비트를 내는데\n열중한 나머지 싸움에서\n상대가 기절해도 모른다."
        zh_simp:
          sword: "越是能用２根木棒敲奏出\n激烈节拍的啪咚猴，\n越是能获得伙伴们的尊敬。"
          shield: "打着激烈的节拍战斗时，\n由于过于忘我，甚至不会\n意识到自己已经把对手打昏了。"
        zh_trad:
          sword: "越是能用２根木棒敲奏出\n激烈節拍的啪咚猴，越是\n能獲得夥伴們的尊敬。"
          shield: "打著激烈的節拍戰鬥時，\n由於過於忘我，甚至不會\n意識到自己已經把對手打昏了。"
