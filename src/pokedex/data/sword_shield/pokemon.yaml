        fr:
          sword: "Il y a fort longtemps, les gens croyaient que\nles Pyronille étaient tombés du soleil."
          shield: "La température de son corps est très élevée.\nIl projette des flammes du bout de ses cornes\npour intimider ses ennemis et ses proies."
        it:
          sword: "Anticamente si credeva che Larvesta fosse\ncaduto dal sole."
          shield: "Il suo corpo è molto caldo. Lancia fiamme\ndalle corna per intimidire i nemici e le prede."
        de:
          sword: "Vor langer Zeit glaubten die Menschen,\nIgnivor sei von der Sonne herabgefallen."
          shield: "Sein Körper ist ziemlich warm. Aus seinen\nHörnern feuert es Flammen ab, um Feinde und\nBeute einzuschüchtern."
        es:
          sword: "Antaño se creía que este Pokémon provenía del\nmismísimo sol."
          shield: "Su cuerpo es cálido. Expulsa llamaradas por los\ncuernos con el fin de intimidar a sus enemigos y\npresas."
        ko:
          sword: "먼 옛날 사람들은\n활화르바가 태양에서\n떨어진 것이라고 믿었다."
          shield: "전신이 제법 따뜻하다.\n뿔 끝에서 불꽃을 뿜어\n천적이나 먹이를 위협한다."
        zh_simp:
          sword: "很久很久以前，\n人们相信燃烧虫是\n从太阳上落下来的。"
          shield: "全身都相当温暖。\n会从角的尖端喷出火焰，\n借此威吓天敌或猎物。"
        zh_trad:
          sword: "遠古時代的人們\n相信燃燒蟲是從\n太陽上摔下來的。"
          shield: "全身都相當溫暖。\n會從角的尖端噴出火\n來威嚇天敵或獵物。"
