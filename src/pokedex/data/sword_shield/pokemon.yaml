          shield: "４ほんの　あしは　みじかいが\nヒヅメは　ひろく　ギザギザ　なので\nゆきのうえでも　すべらず　あるける。"
        jp_kanji:
          sword: "相手　めがけて　突進するとき\n背中の　体毛が　逆立つ。\n音に　ものすごく　敏感。"
          shield: "４本の　脚は　短いが\nひづめは　広く　ギザギザ　なので\n雪の上でも　滑らず　歩ける。"
        en:
          sword: "If it charges at an enemy, the hairs on its back\nstand up straight. It is very sensitive to sound."
          shield: "Although its legs are short, its rugged hooves\nprevent it from slipping, even on icy ground."
        fr:
          sword: "S’il charge un ennemi, les poils de son dos\nse dressent. Il est très sensible au bruit."
          shield: "Bien qu’il soit pourvu de pattes courtes,\nses sabots larges et pointus l’empêchent\nde glisser sur la glace."
        it:
          sword: "Quando carica il nemico, i peli gli si rizzano\nsul dorso. È molto sensibile ai suoni."
          shield: "Ha le zampe corte, ma grazie agli zoccoli ruvidi\nriesce a camminare sul ghiaccio senza scivolare."
        de:
          sword: "Beim Angriff auf einen Gegner stellen sich seine\nRückenhaare auf. Es hört außergewöhnlich gut."
          shield: "Obwohl es sehr kurze Beine hat, rutscht es auf\neisigen Flächen nicht aus, da seine gespaltenen\nHufe ihm genügend Halt bieten."
        es:
          sword: "Cuando carga contra un enemigo, se le erizan los\npelos del lomo. Es muy sensible al sonido."
          shield: "Aunque tiene las patas cortas, sus fuertes\npezuñas le permiten caminar por la nieve sin\nresbalar."
        ko:
          sword: "상대를 목표로 삼고 돌진할 때\n등에 있는 털이 곤두선다.\n소리에 매우 민감하다."
          shield: "4개의 다리는 짧지만\n발굽이 넓고 거칠거칠하므로\n눈 위도 미끄러지지 않고 걸을 수 있다."
        zh_simp:
          sword: "朝着对手冲过去时，\n背上的体毛会倒竖起来。\n对声音极度敏感。"
          shield: "虽然４只脚很短，\n但因为蹄子很宽很粗糙，\n所以就算在雪地上行走也不会打滑。"
        zh_trad:
          sword: "朝著對手衝過去時，\n背上的體毛會倒豎起來。\n對聲音極度敏感。"
          shield: "雖然４隻腳很短，\n但因為蹄很寬而且粗糙，\n所以就算在雪地上行走也不會打滑。"
