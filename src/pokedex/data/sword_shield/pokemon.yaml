          sword: "They use shells they’ve stolen from Shelmet\nto arm and protect themselves. They’re very\npopular Pokémon in the Galar region."
          shield: "It charges its enemies, lances at the ready.\nAn image of one of its duels is captured in a famous\npainting of Escavalier clashing with Sirfetch’d."
        fr:
          sword: "Il a volé la coquille d’Escargaume pour obtenir\nune armure parfaite. Il jouit d’une très grande\npopularité à Galar."
          shield: "Il charge ses ennemis en brandissant ses lances.\nIl existe un célèbre tableau représentant la joute\nentre un Lançargot et un Palarticho."
        it:
          sword: "Si appropria della conchiglia di Shelmet e la usa\nper proteggere tutto il suo corpo. È amatissimo\ndagli abitanti di Galar."
          shield: "Carica il nemico con le sue lance.\nUn famoso dipinto lo ritrae durante\nun duello con Sirfetch’d."
        de:
          sword: "In der Galar-Region ist es besonders beliebt.\nEs stiehlt die Muschel eines Schnuthelms und\nvollendet damit seine Ganzkörperrüstung."
          shield: "Es greift Gegner mit seinen Lanzen an. Auf einem\nberühmten Gemälde ist ein Duell zwischen ihm\nund Lauchzelot zu sehen."
        es:
          sword: "Le roba el caparazón a un Shelmet y lo usa como\narmadura. Este Pokémon es extremadamente\npopular en la región de Galar."
          shield: "Ataca a los enemigos con sus lanzas. Aparece\nrepresentado en pleno duelo contra un Sirfetch’d\nen un famoso cuadro."
        ko:
          sword: "쪼마리의 껍질을 빼앗아 완전히\n무장했다. 가라르지방에서는\n매우 인기가 높다."
          shield: "창을 겨누고 적에게 돌격한다.\n창파나이트와의 결투를\n그린 그림이 유명하다."
        zh_simp:
          sword: "抢走小嘴蜗的壳，将自己\n全副武装。在伽勒尔地区，\n骑士蜗牛非常受到人们喜爱。"
          shield: "会举起长矛突击敌人。\n有一幅名画描绘着\n它和葱游兵决斗的场景。"
        zh_trad:
          sword: "搶走小嘴蝸的殼，將自己\n全副武裝。在伽勒爾地區，\n騎士蝸牛非常受到人們喜愛。"
          shield: "會舉起長矛突擊敵人。\n有一幅名畫描繪著\n牠和蔥遊兵決鬥的場景。"
