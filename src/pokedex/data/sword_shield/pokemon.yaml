        jp_kana:
          sword: "ひとや　ポケモンの　かんじょうを\nびんかんに　キャッチ。　てきいを\nかんじると　ものかげに　かくれる。"
          shield: "あかいツノで　ひとや　ポケモンの\nあたたかな　きもちを　キャッチすると\nぜんしんが　ほのかに　あつくなる。"
        jp_kanji:
          sword: "人や　ポケモンの　感情を\n敏感に　キャッチ。　敵意を\n感じると　物陰に　隠れる。"
          shield: "赤いツノで　人や　ポケモンの\n温かな　気持ちを　キャッチすると\n全身が　ほのかに　熱くなる。"
        en:
          sword: "It is highly attuned to the emotions of people\nand Pokémon. It hides if it senses hostility."
          shield: "If its horns capture the warm feelings of people\nor Pokémon, its body warms up slightly."
        fr:
          sword: "Il est très sensible aux émotions des gens\net des Pokémon. Il se cache au moindre\nsigne d’hostilité."
          shield: "Quand ses cornes rouges captent les ondes\npositives d’un Pokémon ou d’un humain,\ntout son corps se réchauffe."
        it:
          sword: "È molto sensibile agli umori delle persone e\ndegli altri Pokémon. Se avverte ostilità, va a\nnascondersi."
          shield: "Se con le sue corna rosse avverte emozioni\npositive di persone o Pokémon, il suo corpo\nsi scalda leggermente."
        de:
          sword: "Es hat ein feines Gespür für die Gefühle der\nMenschen und Pokémon. Wenn es Feindseligkeit\nwahrnimmt, versteckt es sich."
          shield: "Wenn es mit seinen roten Hörnern freundliche\nGefühle von Menschen oder Pokémon erfasst,\nerwärmt sich sein ganzer Körper ein bisschen."
        es:
          sword: "Capta muy bien lo que sienten las personas y\nlos Pokémon. Cuando nota cierta hostilidad, se\nesconde."
          shield: "Si sus cuernos perciben emociones positivas de\npersonas o Pokémon, su cuerpo se calienta un\npoco."
        ko:
          sword: "사람이나 포켓몬의 감정을\n민감하게 캐치한다.\n적의가 느껴지면 그늘로 숨는다."
          shield: "빨간 뿔로 사람이나 포켓몬의\n따뜻한 마음을 캐치하면\n전신이 미약하게 뜨거워진다."
        zh_simp:
          sword: "能敏锐地捕捉人和宝可梦的感情。\n感受到敌意后就会躲进暗处。"
          shield: "用红色的角捕捉到\n人和宝可梦的温情后，\n全身也会稍稍变暖起来。"
        zh_trad:
          sword: "能敏銳地感知人和寶可夢\n的感情。一旦感受到敵意\n就會躲進暗處。"
          shield: "用紅色的角感知到\n人和寶可夢的溫情後，\n全身也會變得有點暖暖的。"
