          shield: "うまれると　りんごに　もぐりこむ。\nなかみを　たべながら　せいちょうし\nりんごの　あじが　しんかを　きめる。"
        jp_kanji:
          sword: "一生　りんごの　中で　暮らし\n天敵の　鳥ポケモンに　出会うと\nりんごの　振りをして　身を守る。"
          shield: "生まれると　りんごに　潜りこむ。\n中身を　食べながら　成長し\nりんごの　味が　進化を　決める。"
        en:
          sword: "It spends its entire life inside an apple. It hides\nfrom its natural enemies, bird Pokémon, by\npretending it’s just an apple and nothing more."
          shield: "As soon as it’s born, it burrows into an apple. Not\nonly does the apple serve as its food source, but\nthe flavor of the fruit determines its evolution."
        fr:
          sword: "Il vit toujours dans sa pomme. S’il croise\nun Pokémon oiseau, son prédateur naturel, il se\nfait passer pour un simple fruit pour se protéger."
          shield: "À la naissance, il s’installe dans une pomme\net grandit en se nourrissant de sa chair.\nSon évolution dépend de la saveur du fruit."
        it:
          sword: "Passa la vita all’interno di un pomo. Quando si\nimbatte in Pokémon alati, suoi nemici naturali,\nsi protegge fingendosi un semplice frutto."
          shield: "Quando nasce si intrufola in un pomo e cresce\nmangiandone la polpa. Si evolve in modo diverso\na seconda del gusto del frutto."
        de:
          sword: "Es verbringt sein ganzes Leben im Inneren eines\nApfels. Um sich vor Vogel-Pokémon, seinen\nFressfeinden, zu schützen, imitiert es einen Apfel."
          shield: "Nach der Geburt kriecht es sofort in einen Apfel\nund verspeist dessen Inneres, um zu wachsen.\nSeine Entwicklung hängt von dessen Aroma ab."
        es:
          sword: "Habita durante toda su vida en el interior de una\nmanzana. Finge ser una fruta para protegerse de\nlos Pokémon pájaro, sus enemigos naturales."
          shield: "Nada más nacer se refugia en una manzana, cuyo\ninterior va devorando a medida que crece. El\nsabor de la fruta determina la evolución."
        ko:
          sword: "평생을 사과 속에서 지내며\n천적인 새포켓몬과 마주치면\n사과인 척을 해서 몸을 지킨다."
          shield: "태어나면 사과 안으로 숨어든다.\n안을 파먹으면서 성장하고\n사과 맛이 진화를 결정한다."
        zh_simp:
          sword: "终其一生都在苹果里度过。\n遇到天敌鸟宝可梦时，\n会装成苹果保护自己。"
          shield: "一出生就躲进了苹果中。\n一边吃果肉一边成长。\n进化方向因苹果的味道而定。"
        zh_trad:
          sword: "終其一生都在蘋果裡度過。\n遇到天敵鳥寶可夢時，\n會裝成蘋果保護自己。"
          shield: "一出生就躲進了蘋果中，\n一邊吃果肉一邊成長。\n進化方向依蘋果的味道而定。"
flapple:
