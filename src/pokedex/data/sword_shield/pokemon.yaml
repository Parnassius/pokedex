      descriptions:
        jp_kana:
          sword: "みみは　スピーカーの　やくわり。\nいっけんやを　ふきとばす　いりょくの\nおんぱを　みみから　ほうしゃする。"
          shield: "おおごえは　ちょうかく　だけでなく\nくうきの　あつりょくとなり　てきを\nふきとばし　ダメージを　あたえる。"
        jp_kanji:
          sword: "耳は　スピーカーの　役割。\n一軒家を　吹きとばす　威力の\n音波を　耳から　放射する。"
          shield: "大声は　聴覚だけでなく\n空気の　圧力となり　敵を\n吹きとばし　ダメージを　与える。"
        en:
          sword: "Loudred’s ears serve as speakers, and they can\nput out sound waves powerful enough to blow\naway a house."
          shield: "The force of this Pokémon’s loud voice isn’t just\nthe sound—it’s also the wave of air pressure that\nblows opponents away and damages them."
        fr:
          sword: "Ses oreilles lui servant de haut-parleurs\npeuvent émettre des ondes sonores dont\nla puissance suffit à balayer une maison."
          shield: "Ses hurlements n’affectent pas seulement l’ouïe ;\nils provoquent aussi une onde de choc qui balaie\nles ennemis et leur inflige des dégâts."
        it:
          sword: "Le sue orecchie fungono da altoparlanti e sono\nin grado di emettere onde sonore talmente\npotenti da abbattere una casa."
          shield: "Oltre a colpire l’udito, la sua potente voce\nproduce anche delle onde d’urto con le quali\nspazza via e danneggia i nemici."
        de:
          sword: "Seine Ohren fungieren als Lautsprecher. Mit ihnen\nkann es starke Schallwellen ausstoßen, die ganze\nHäuser zum Einsturz bringen."
          shield: "Sein Brüllen ist nicht nur ein Angriff aufs Gehör,\nsondern erzeugt auch Schockwellen, durch die\nGegner weggefegt und verletzt werden."
        es:
          sword: "A través de las orejas, que le sirven de altavoces,\nemite ondas sonoras capaces de echar abajo una\ncasa."
          shield: "Su voz no afecta solo al oído. Sus ondas sonoras\nprovocan variaciones de presión en el aire que\nhacen que sus enemigos salgan despedidos."
        ko:
          sword: "귀는 스피커 역할을 한다.\n집 한 채를 날려버릴 위력의\n음파를 귀에서 내뿜는다."
          shield: "큰 목소리는 청각뿐만 아니라\n공기의 압력마저 변화시켜\n상대를 날려버리고 데미지를 준다."
        zh_simp:
          sword: "它的耳朵有着扬声器的功能。\n会从耳朵中发射出威力足以\n掀翻一整座房子的音波。"
          shield: "它发出的大叫声不仅会刺激听觉，\n还会压缩空气造成冲击波\n将敌人吹飞给予伤害。"
        zh_trad:
          sword: "耳朵具有擴音器的功能。\n會從耳朵發射出威力足以\n震飛一棟房子的音波。"
          shield: "巨大的叫聲不只會傷害聽覺，\n還會壓縮空氣造成衝擊波\n將對手震飛造成傷害。"
