          shield: "８枚の　ハネを　ボートの　オールの\nように　動かし　速く　泳げる。\n虫ポケモンの　祖先の　一種。"
        en:
          sword: "This Pokémon was restored from a fossil.\nAnorith lived in the ocean about 100,000,000\nyears ago, hunting with its pair of claws."
          shield: "Anorith can swim swiftly by pulling its eight wings\nthrough the water like oars on a boat. This\nPokémon is an ancestor of modern bug Pokémon."
        fr:
          sword: "Restauré à partir d’un fossile, ce Pokémon vivait\ndans l’océan il y a environ 100 millions d’années\net chassait ses proies avec ses deux pinces."
          shield: "Ce Pokémon peut nager très vite en agitant\nses huit ailes comme des rames de bateau.\nIl fait partie des ancêtres des Pokémon Insecte."
        it:
          sword: "Questo Pokémon è stato rigenerato da un fossile.\nViveva nei mari circa 100 milioni di anni fa e\nusava i suoi due artigli per cacciare."
          shield: "Nuota rapidamente utilizzando le sue otto ali\ncome fossero remi di una barca. È uno degli\nantenati dei Pokémon di tipo Coleottero."
        de:
          sword: "Es wurde aus einem Fossil wiederbelebt. Vor circa\n100 Millionen Jahren war es im Meer zu Hause,\nwo es mit seinen beiden Klauen auf Jagd ging."
          shield: "Anorith schwimmt sehr schnell, indem es seine\nacht Flügel wie die Ruder eines Bootes bewegt.\nEs ist einer der Vorfahren von Käfer-Pokémon."
        es:
          sword: "Este Pokémon se regeneró a partir de un fósil.\nHabitaba en los mares de hace cien millones de\naños. Atrapaba a sus presas con sus dos pinzas."
          shield: "Puede nadar rápidamente gracias a sus ocho\nalas que usa a modo de remo. Es uno de los\nantepasados de los Pokémon insecto."
        ko:
          sword: "화석에서 복원된 포켓몬.\n1억 년 전의 바다에 살며\n2개의 발톱으로 사냥을 했었다."
          shield: "8장의 날개를 배의 노처럼\n움직여 빠르게 헤엄친다.\n벌레포켓몬 선조의 일종이다."
        zh_simp:
          sword: "从化石复原而来的宝可梦。\n曾经生活在大约１亿年前的\n大海，用２只爪子捕捉猎物。"
          shield: "会把８根翅膀当做船桨划水，\n并且游泳的速度相当快。\n是虫宝可梦的一种祖先。"
        zh_trad:
