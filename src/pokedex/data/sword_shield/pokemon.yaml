      hidden_ability: long_reach
      descriptions:
        jp_kana:
          sword: "はばね　と　よばれる　ナイフのような\nはねを　たてつづけに　なげて　てきの\nきゅうしょを　かくじつに　つらぬく。"
          shield: "はねの　ていれを　おこたらない。\nみだしなみを　ととのえる　だけでなく\nはばねの　きれあじを　たもつためだ。"
        jp_kanji:
          sword: "刃羽根　と　呼ばれる　ナイフのような\n羽根を　立て続けに　投げて　敵の\n急所を　確実に　つらぬく。"
          shield: "羽の　手入れを　怠らない。\n身だしなみを　整える　だけでなく\n刃羽根の　切れ味を　保つためだ。"
        en:
          sword: "It throws one knifelike feather after another at its\nenemies, and each one precisely strikes a weak\npoint. These feathers are known as blade quills."
          shield: "It never slacks when it comes to the task of\ncleaning its feathers. Thorough preening keeps it\nlooking spiffy and its blade quills nice and sharp."
        fr:
          sword: "Il vise les points faibles de ses ennemis\net les frappe successivement de ses plumes\naffûtées comme des couteaux."
          shield: "Il prend grand soin de son plumage, s’assurant\nainsi d’avoir une apparence impeccable\net des plumes aiguisées à souhait."
        it:
          sword: "Bersaglia i nemici con le sue piume affilate\ncome coltelli, colpendo con precisione\ni loro punti deboli."
          shield: "Non trascura mai la cura delle proprie ali, non\nsolo perché tiene al proprio aspetto, ma anche\nper mantenere affilate le sue piume."
        de:
          sword: "Es bombardiert seine Feinde mit messerscharfen\nFedern, die man „Flügelklingen“ nennt, und trifft\nmit jedem Wurf zielsicher ihre Schwachstellen."
          shield: "Die Pflege seines Gefieders versäumt es nie.\nSo bewahrt es nicht nur ein gepflegtes Äußeres,\nsondern auch die Schärfe seiner Federn."
        es:
          sword: "Golpea con precisión los puntos vitales del\nenemigo arrojando sus plumas afiladas como\ncuchillos."
          shield: "Jamás desatiende el cuidado de sus alas, no solo\npor mera cuestión estética, sino también para\nmantener las plumas perfectamente afiladas."
        ko:
          sword: "칼날깃이라고 불리는 나이프처럼 생긴\n깃털을 연달아 날려서 상대의\n급소를 확실하게 꿰뚫는다."
          shield: "날개 손질을 게을리하지 않는다.\n몸가짐을 정돈하는 이유뿐만 아니라\n칼날깃의 날을 유지하기 위해서다."
        zh_simp:
          sword: "连续投出被称为是\n刃羽的刀般锐利羽毛，\n能精准地贯穿敌人要害。"
          shield: "对整理翅膀丝毫不会怠慢。\n这不单是因为它注重形象，\n也是为了让刃羽保持锐利。"
        zh_trad:
          sword: "連續投出被稱為是\n刃羽的刀般銳利羽毛，\n能精準地貫穿敵人要害。"
          shield: "對整理翅膀絲毫不會怠慢。\n這不單是因為牠注重形象，\n也是為了讓刃羽保持銳利。"
