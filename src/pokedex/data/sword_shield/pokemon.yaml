      descriptions:
        jp_kana:
          sword: "いきを　すえば　すうほど　ふくらむ。\nふきげんになると　からだを　おおきく\nふくらませて　あいてを　いあつする。"
          shield: "キメこまやかな　たいもうが　じまん。\nとくに　ひたいの　まきげは　てんにも\nのぼる　ごくじょうの　てざわり。"
        jp_kanji:
          sword: "息を　吸えば　吸うほど　膨らむ。\n不機嫌になると　体を　大きく\n膨らませて　相手を　威圧する。"
          shield: "きめ細やかな　体毛が　自慢。\nとくに　額の　巻き毛は\n天にも　昇る　極上の　手触り。"
        en:
          sword: "The more air it takes in, the more it inflates. If\nopponents catch it in a bad mood, it will inflate\nitself to an enormous size to intimidate them."
          shield: "It’s proud of its fur, which is fine and delicate.\nIn particular, the curl on its forehead has a\ntexture that’s perfectly heavenly."
        fr:
          sword: "Son corps gonfle à mesure qu’il inspire de l’air.\nIl se sert de cette particularité pour se grandir\net intimider son adversaire quand il est en colère."
          shield: "Sa fourrure soyeuse fait sa fierté. La touffe\nsur son front est si douce que la caresser\ndonne l’impression d’être sur un petit nuage."
        it:
          sword: "Più aria inala, più il suo corpo si gonfia.\nSe è di cattivo umore, si gonfia per intimidire\nl’avversario."
          shield: "Va molto fiero del suo manto soffice. Il ricciolo\nsulla fronte, in particolare, suscita una sensazione\nsublime al tatto."
        de:
          sword: "Je mehr Luft es einatmet, desto größer wird es.\nIst es verärgert, bläst es seinen Körper enorm auf\nund schüchtert so seine Gegner ein."
          shield: "Knuddeluffs weiches Fell ist sein ganzer Stolz.\nBesonders die Locke auf seiner Stirn fühlt sich\nherrlich an."
        es:
          sword: "Cuanto más aire inhala, más aumenta de tamaño.\nSi se enfada, hincha el cuerpo con el fin de\nintimidar a su oponente."
          shield: "Se enorgullece de su pelaje fino y sedoso. El rizo\nde la frente, en especial, posee un tacto sublime."
        ko:
          sword: "숨을 들이쉬면 쉴수록 몸이 부푼다.\n기분이 나빠지면 몸을 커다랗게\n부풀려 상대에게 위압을 가한다."
          shield: "얇고 고운 털을 가졌다.\n특히 이마에 동그랗게 말린 털은\n하늘을 날 듯한 최고의 감촉을 지녔다."
        zh_simp:
          sword: "吸越多气，身体就会胀得越大。\n要是心情不好了，就会\n把身体胀大来威吓对方。"
          shield: "以自己细腻的体毛为傲。\n尤其是额头上的卷毛，\n更是有着天堂般的极致触感。"
        zh_trad:
          sword: "越吸氣就越會膨脹。\n心情變壞時，會鼓氣撐大\n身體來威嚇對方。"
          shield: "以自己細緻的體毛為傲。\n尤其額頭上的捲毛，更是有著\n彷彿會一摸升天的極致觸感。"
zubat:
  species_id: 41
  names:
    jp_kana: ズバット
    jp_kanji: ズバット
    en: Zubat
    fr: Nosferapti
    it: Zubat
    de: Zubat
    es: Zubat
    ko: 주뱃
    zh_simp: 超音蝠
    zh_trad: 超音蝠
  forms:
    zubat:
      form_id: 0
      base_stats:
        hp: 40
        attack: 45
        defense: 35
        special_attack: 30
        special_defense: 40
        speed: 55
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - poison
        - flying
      egg_groups:
        - flying
      abilities:
        - inner_focus
      hidden_ability: infiltrator
      descriptions:
        jp_kana:
          sword: "くちから　だす　ちょうおんぱで\nまわりの　ようすを　さぐる。　せまい\nどうくつも　きように　とびまわる。"
          shield: "ひの　あたらない　どうくつに　すむ。\nあさになると　なかまで　あつまり\nからだを　あたためあいながら　ねる。"
        jp_kanji:
          sword: "口から　出す　超音波で\nまわりの　様子を　探る。\n狭い　洞窟も　器用に　飛びまわる。"
          shield: "陽の　当たらない　洞窟に　棲む。\n朝になると　仲間で　集まり\n体を　温めあいながら　寝る。"
        en:
          sword: "It emits ultrasonic waves from its mouth to check\nits surroundings. Even in tight caves, Zubat flies\naround with skill."
          shield: "Zubat live in caves, down where the sun’s light\nwon’t reach. In the morning, they gather together\nto keep each other warm as they sleep."
        fr:
          sword: "Il sonde les environs en émettant des ultrasons\navec sa bouche, et peut ainsi se frayer un chemin\nmême dans les grottes les plus étroites."
          shield: "Ils vivent dans les grottes où la lumière du jour\nne perce jamais. Le matin, ils se blottissent les uns\ncontre les autres pour se réchauffer et dormir."
        it:
          sword: "Sonda l’ambiente circostante emettendo\nultrasuoni dalla bocca. In questo modo riesce\na volteggiare agilmente anche in caverne strette."
          shield: "Vive in grotte mai rischiarate dalla luce del sole.\nQuando si fa giorno, si raggruppa con i suoi\nsimili per scaldarsi mentre dorme."
        de:
          sword: "Über den Mund stößt es Ultraschallwellen aus,\num seine Umgebung zu erkunden. So kann es\nselbst in engen Höhlen geschickt umherfliegen."
          shield: "Zubat leben tief in Höhlen, wo das Sonnenlicht\nsie nicht erreicht. Bei Tagesanbruch rücken sie\nzusammen, um sich im Schlaf zu wärmen."
        es:
          sword: "Emite ondas ultrasónicas por la boca para\nescrutar el entorno, lo que le permite volar con\npericia por cuevas angostas."
          shield: "Habitan en cuevas donde no llegan los rayos del\nsol. De día, se acurrucan unos junto a otros para\nentrar en calor mientras duermen."
        ko:
          sword: "입에서 내보내는 초음파로\n주위의 상황을 살핀다. 좁은\n동굴에서도 능숙하게 날아다닌다."
          shield: "볕이 들지 않는 동굴에 산다.\n아침이 되면 동료들끼리 모여\n서로의 온기를 나누면서 잔다."
        zh_simp:
          sword: "通过嘴里发出的超音波\n来探查周围的情况。就算在\n狭窄的洞窟里也能灵活地飞行。"
          shield: "栖息在晒不到阳光的洞窟里。\n到了早晨便会和同伴聚集起来，\n一边互相取暖一边睡觉。"
        zh_trad:
          sword: "會利用從口中發出的超音波\n探查周圍的狀況。在狹窄的\n洞窟裡也能靈巧地飛來飛去。"
          shield: "棲息在陽光照射不到的洞窟裡。\n到了早上就會和夥伴相聚，\n一邊互相取暖一邊睡覺。"
golbat:
  species_id: 42
  names:
    jp_kana: ゴルバット
    jp_kanji: ゴルバット
    en: Golbat
    fr: Nosferalto
    it: Golbat
    de: Golbat
    es: Golbat
    ko: 골뱃
    zh_simp: 大嘴蝠
    zh_trad: 大嘴蝠
  forms:
    golbat:
      form_id: 0
      base_stats:
        hp: 75
        attack: 80
        defense: 70
        special_attack: 65
        special_defense: 75
        speed: 90
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 2
      types:
        - poison
        - flying
      egg_groups:
        - flying
      abilities:
        - inner_focus
      hidden_ability: infiltrator
      descriptions:
        jp_kana:
          sword: "いきものの　けつえきが　こうぶつ。\nはらぺこの　なかまに　すった　ちを\nわけあたえることも　あるという。"
          shield: "ちいさな　あしで　きように　あるく。\nねている　エモノに　しのびより\nキバを　つきたて　ちを　すするのだ。"
        jp_kanji:
          sword: "生き物の　血液が　好物。\n腹ペコの　仲間に　吸った　血を\n分け与えることも　あるという。"
          shield: "小さな　脚で　器用に　歩く。\n寝ている　獲物に　忍びより\nキバを　突きたて　血を　すするのだ。"
        en:
          sword: "It loves to drink other creatures’ blood. It’s said\nthat if it finds others of its kind going hungry,\nit sometimes shares the blood it’s gathered."
          shield: "Its feet are tiny, but this Pokémon walks skillfully.\nIt sneaks up on sleeping prey before sinking in its\nfangs and slurping up blood."
        fr:
          sword: "Le sang des êtres vivants est son péché mignon.\nOn dit qu’il partage parfois ce précieux breuvage\navec ses congénères affamés."
          shield: "Il se déplace habilement sur ses petites pattes,\ns’approche silencieusement de sa proie endormie,\net lui suce le sang à l’aide de ses crocs."
        it:
          sword: "Va matto per il sangue di altre creature.\nSi dice che a volte lo condivida con i compagni\naffamati."
          shield: "Cammina agilmente con i piccoli piedi.\nSi avvicina di soppiatto alle prede addormentate\nper azzannarle e berne il sangue."
        de:
          sword: "Das Blut anderer Lebewesen ist seine Leibspeise.\nMan sagt, dass es das abgesaugte Blut manchmal\nmit hungrigen Artgenossen teilt."
          shield: "Golbat kann trotz seiner kleinen Beine geschickt\nlaufen. Es schleicht sich an schlafende Beute an,\nstößt seine Zähne in sie und schlürft ihr Blut."
        es:
          sword: "Le encanta chuparles la sangre a los seres vivos.\nEn ocasiones comparte la preciada colecta con\notros congéneres hambrientos."
          shield: "Camina con soltura sobre sus pequeñas patas. Se\nacerca con sigilo a su presa mientras esta duerme\ny le clava los colmillos para chuparle la sangre."
        ko:
          sword: "살아 있는 생물의 혈액을 좋아한다.\n굶주린 동료에게 빨아들인 피를\n나눠주기도 한다고 한다."
          shield: "작은 다리로 능숙하게 걷는다.\n자고 있는 먹이에게 살며시 다가가\n이빨을 꽂아 피를 빨아먹는다."
        zh_simp:
          sword: "喜欢吸食生物的血液。\n据说也会把自己吸到的血\n分给肚子饿扁了的伙伴。"
          shield: "用小而灵活的脚走路。\n会悄悄接近正在睡觉的猎物，\n用尖牙咬住对方吸取血液。"
        zh_trad:
          sword: "喜歡吸食生物的血液。\n據說還會將吸來的血\n分給空腹的夥伴。"
          shield: "能以小小的腳靈巧地步行。\n會無聲無息地靠近沉睡中的獵物，\n用獠牙咬住對方並且吸食血液。"
oddish:
