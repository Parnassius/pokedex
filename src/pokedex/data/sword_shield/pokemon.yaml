          shield: "じめんに　つもった　ゆきを　たべる。\nたくさん　たべれば　たべるほど\nせなかの　トゲは　りっぱに　そだつ。"
        jp_kanji:
          sword: "冷気の　混ざった　糸を　吐く。\n糸で　体を　枝に　巻きつけ\n氷柱の　振りをして　眠るのだ。"
          shield: "地面に　積もった　雪を　食べる。\nたくさん　食べれば　食べるほど\n背中の　棘は　立派に　育つ。"
        en:
          sword: "It spits out thread imbued with a frigid sort of\nenergy and uses it to tie its body to branches,\ndisguising itself as an icicle while it sleeps."
          shield: "It eats snow that piles up on the ground.\nThe more snow it eats, the bigger and more\nimpressive the spikes on its back grow."
        fr:
          sword: "Il crache un fil gelé qu’il utilise pour s’accrocher\nà une branche : il dort ainsi en imitant\nune stalactite."
          shield: "Il se nourrit de la neige entassée sur le sol.\nPlus il en mange, plus les épines sur son dos\ngrandissent."
        it:
          sword: "Si assicura a un ramo con il filo gelido che\nproduce dalla bocca e dorme fingendosi\nun ghiacciolo."
          shield: "Si nutre della neve accumulatasi sul terreno.\nPiù ne mangia, più gli aculei sul suo dorso\ndiventano grandi."
        de:
          sword: "Es spinnt einen eiskalten Faden, mit dem es sich\nan einen Ast hängt. Dabei tut es so, als wäre es\nein Eiszapfen, um in Ruhe schlafen zu können."
          shield: "Es frisst den Schnee, der sich am Boden\nangesammelt hat. Je mehr es frisst, desto größer\nwerden die Stacheln auf seinem Rücken."
        es:
          sword: "Teje un hilo gélido que le permite aferrarse a\nlas ramas y simula ser un carámbano mientras\nduerme."
          shield: "Se nutre de la nieve acumulada en el terreno.\nCuanta más ingiere, más imponentes se vuelven\nlas púas que presenta en el lomo."
        ko:
          sword: "냉기가 서린 실을 뿜는다.\n실로 몸을 가지에 휘감아서\n고드름인 척하고 잠든다."
          shield: "땅에 쌓인 눈을 먹는다.\n많이 먹으면 먹을수록\n등의 가시는 훌륭하게 자란다."
        zh_simp:
          sword: "能吐出带着冷气的丝。\n会用丝把自己挂在树枝上\n一边装成冰柱一边睡觉。"
          shield: "会吃地面上的积雪。\n吃得越多，背上的\n刺就会长得越挺拔。"
        zh_trad:
          sword: "能吐出帶著冷氣的絲。\n會用絲把自己掛在樹枝上，\n一邊裝成冰柱一邊睡覺。"
          shield: "會吃地面上的積雪。\n吃得越多，背上的\n刺就會長得越挺拔。"
