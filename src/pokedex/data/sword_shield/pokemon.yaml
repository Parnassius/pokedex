        en:
          sword: "As it digs through the ground, it absorbs many\nhard objects. This is what makes its body so solid."
          shield: "It rapidly bores through the ground at 50 mph by\nsquirming and twisting its massive, rugged body."
        fr:
          sword: "Il absorbe des éléments solides en creusant le sol,\nce qui le rend plus robuste."
          shield: "Il creuse dans le sol à une vitesse de 80 km/h\nen contorsionnant son immense corps de pierre."
        it:
          sword: "Scava nel terreno assorbendo gli oggetti più duri\nper irrobustire il suo corpo."
          shield: "Scava nel terreno a una velocità di 80 km/h\ncontorcendo e agitando il corpo grande\ne possente."
        de:
          sword: "Wenn es sich durch die Erde gräbt, nimmt es\nviele harte Gegenstände auf, die seinen Körper\nerhärten."
          shield: "Es bohrt sich mit 80 km/h durch das Erdreich,\nindem es seinen massiven, rauen Körper dreht\nund windet."
        es:
          sword: "Al abrirse paso bajo tierra, va absorbiendo todo\nlo que encuentra. Eso hace que su cuerpo sea\nasí de sólido."
          shield: "Perfora el suelo a una velocidad de 80 km/h\ngirando y retorciendo su robusto y enorme\ncuerpo."
        ko:
          sword: "땅속을 파고들면서 여러 가지\n단단한 것들을 집어삼켜서\n튼튼한 몸을 만든다."
          shield: "크고 튼튼한 몸을\n뒤틀고 꼬아서 시속 80km로\n힘차게 땅을 파나간다."
        zh_simp:
          sword: "会一边在地里挖掘前进，\n一边吸收各种坚硬的物体，\n以此让身体变得更加结实。"
          shield: "弯曲扭动巨大结实的身体，\n以时速８０公里的\n猛烈劲头向前挖进。"
        zh_trad:
          sword: "會一邊在地底挖掘前進，\n一邊吸收各種堅硬的物體，\n藉此讓身體變得更加結實。"
          shield: "彎曲扭動巨大結實的身體，\n以時速８０公里的\n猛烈勢頭挖掘前進。"
krabby:
  species_id: 98
  names:
    jp_kana: クラブ
    jp_kanji: クラブ
    en: Krabby
    fr: Krabby
    it: Krabby
