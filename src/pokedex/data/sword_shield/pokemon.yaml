        jp_kana:
          sword: "ほねと　おなじ　せいぶんで　できた\nかたい　カラで　からだを　つつむ。\nしんかの　エネルギーを　たくわえる。"
          shield: "エサを　たべず　くうふくに　たえる。\nためた　エネルギーを　つかいきると\nしんかが　はじまるらしい。"
        jp_kanji:
          sword: "骨と　同じ　成分で　できた\n硬い　殻で　体を　包む。\n進化の　エネルギーを　蓄える。"
          shield: "エサを　食べず　空腹に　耐える。\n溜めた　エネルギーを　使い切ると\n進化が　始まるらしい。"
        en:
          sword: "This Pokémon has covered its body in a hard\nshell that has the same composition as bone.\nShelgon stores energy for evolution."
          shield: "Shelgon ignores its hunger entirely, never eating\nany food. Apparently, Shelgon will evolve once\nall its energy stores are used up."
        fr:
          sword: "Ce Pokémon emmagasine l’énergie nécessaire\nà son évolution sous sa carapace dont\nla composition est identique à celles des os."
          shield: "Il se prive de nourriture, résistant à la faim.\nOn dit que son évolution commence lorsque\nses réserves d’énergie sont épuisées."
        it:
          sword: "Il suo corpo è protetto da una dura corazza\ncomposta di materiale osseo.\nAccumula energia per poi evolversi."
          shield: "Resta a digiuno, sopportando la fame.\nSembra che l’evoluzione si inneschi quando\nesaurisce l’energia accumulata."
        de:
          sword: "Es hüllt seinen Körper in eine harte Schale,\ndie Knochengewebe gleicht, und sammelt so\nEnergie für seine Entwicklung."
          shield: "Es ignoriert sein Hungergefühl und isst nichts.\nDraschels Entwicklung setzt anscheinend ein,\nwenn all seine Energiereserven aufgebraucht sind."
        es:
          sword: "Lo recubre una dura coraza de tejido óseo. En el\ninterior, acumula energía de cara a la evolución."
          shield: "Aguanta el hambre sin comer nada. Al parecer,\ninicia el proceso evolutivo cuando se agota toda\nla energía que tenía acumulada."
        ko:
          sword: "뼈와 같은 성분으로 만들어진\n단단한 껍질로 몸을 감쌌다.\n진화의 에너지를 비축하고 있다."
          shield: "먹이를 먹지 않고 공복으로 버틴다.\n모은 에너지를 다 사용하면\n진화가 시작되는 듯하다."
        zh_simp:
          sword: "覆盖着身体的硬壳\n成分和骨头相同。\n正在储备进化的能量。"
          shield: "可以不吃食物忍受饥饿。\n据说当它用尽积蓄的能量后，\n就会开始进化。"
        zh_trad:
          sword: "用成分與骨頭相同的硬殼\n覆蓋身體。體內蓄積著\n進化所需的能量。"
          shield: "忍耐飢餓，不吃任何食物。\n據說當牠用盡了儲存的\n能量後，就會開始進化。"
