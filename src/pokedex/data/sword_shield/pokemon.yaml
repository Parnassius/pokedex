      descriptions:
        jp_kana:
          sword: "ほしの　うごきから　みらいを　みる。\nすさまじい　サイコパワーを　もつが\nあらそいは　このまない　きしつ。"
          shield: "ゴチルゼルに　じぶんの　さいごを\nみせられた　あくにんは　そのひを\nさいごに　ゆくえを　たった。"
        jp_kanji:
          sword: "星の　動きから　未来を　見る。\nすさまじい　サイコパワーを　もつが\n争いは　好まない　気質。"
          shield: "ゴチルゼルに　自分の　最期を\n見せられた　悪人は　その日を\n最後に　行方を　絶った。"
        en:
          sword: "It has tremendous psychic power, but it dislikes\nconflict. It’s also able to predict the future based\non the movement of the stars."
          shield: "A criminal who was shown his fate by a Gothitelle\nwent missing that same day and was never\nseen again."
        fr:
          sword: "Il prédit l’avenir à partir du mouvement\ndes étoiles. Il dispose de grands pouvoirs\npsychiques, mais il n’est pas de nature hostile."
          shield: "Les criminels à qui Sidérella a révélé les derniers\ninstants de leur vie ont tous été portés disparus\nle jour même."
        it:
          sword: "Prevede il futuro osservando i moti delle stelle.\nPossiede terrificanti poteri psichici, ma per\nnatura non ama le ostilità."
          shield: "Pare che un malfattore non si sia più fatto\nvedere dopo che Gothitelle gli aveva rivelato\ni suoi ultimi momenti."
        de:
          sword: "Es liest die Zukunft aus Sternenkonstellationen.\nSeine Psycho-Kräfte sind gewaltig, aber es ist\nvon Natur aus konfliktscheu."
          shield: "Ein böser Mensch verschwand einst am selben\nTag, an dem ein Morbitesse ihm die letzten\nMomente seines Lebens gezeigt hatte."
        es:
          sword: "Predice el futuro observando el movimiento de\nlas estrellas. Posee un poder psíquico tremendo,\npero evita los conflictos por su buen carácter."
          shield: "Los malhechores a los que revela sus últimos\nmomentos pierden la vida el mismo día."
        ko:
          sword: "별의 움직임으로 미래를 본다.\n엄청난 사이코 파워를 가졌지만\n싸움을 좋아하지 않는 기질을 가졌다."
          shield: "고디모아젤을 통해 자신의 최후를\n보게 된 악인은 그날을\n마지막으로 종적을 감추었다."
        zh_simp:
          sword: "根据星星的动向预知未来。\n虽然拥有强大的精神力量，\n但生性并不喜好纷争。"
          shield: "从哥德小姐那里\n看到了自己下场的恶人\n在那之后便销声匿迹了。"
        zh_trad:
          sword: "根據星星的動向預知未來。\n雖然擁有強大的精神力量，\n但生性並不喜好紛爭。"
          shield: "從哥德小姐那裡\n看到了自己下場的惡人\n在那之後便銷聲匿跡了。"
solosis:
