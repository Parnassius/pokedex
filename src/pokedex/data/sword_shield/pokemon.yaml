          shield: "ツノで　えものを　はさみこみ\nそのまま　まっぷたつに　するか\nごういんに　なげとばしてしまう。"
        jp_kanji:
          sword: "ツノで　互いを　格付けする。\n太く　立派な　ツノを　持つ\nカイロスほど　異性に　人気。"
          shield: "ツノで　獲物を　挟みこみ\nそのまま　まっぷたつに　するか\n強引に　投げ飛ばしてしまう。"
        en:
          sword: "These Pokémon judge one another based on\npincers. Thicker, more impressive pincers make\nfor more popularity with the opposite gender."
          shield: "This Pokémon clamps its pincers down on its prey\nand then either splits the prey in half or flings\nit away."
        fr:
          sword: "Ses cornes déterminent son rang au sein\ndu groupe. Plus elles sont imposantes, plus\nles membres du sexe opposé l’apprécient."
          shield: "Une fois sa proie enserrée entre ses cornes,\ndeux choix s’offrent à lui : la couper en deux\nou la projeter au loin de toutes ses forces."
        it:
          sword: "I Pinsir si giudicano a vicenda in base alle corna.\nQuelli con corna grosse e imponenti hanno\npiù successo con gli esemplari dell’altro sesso."
          shield: "Afferra le prede con le corna e le trancia in due,\noppure le lancia via con violenza."
        de:
          sword: "Der Status eines Pinsirs hängt von seinen Hörnern\nab. Je dicker und stattlicher diese sind, desto\nbeliebter ist es beim anderen Geschlecht."
          shield: "Pinsir nimmt Beute mit seinen Hörnern in die\nZange, um sie anschließend entzweizureißen\noder mit Wucht fortzuschleudern."
        es:
          sword: "Los Pinsir se juzgan entre ellos por la robustez\nde la cornamenta. Cuanto más imponente sea,\nmás agradará a sus congéneres del sexo opuesto."
          shield: "Usa la cornamenta a modo de pinza para atrapar\na sus presas. Acto seguido, las parte por la mitad\no las arroja lejos."
        ko:
          sword: "뿔로 서로의 등급을 매긴다.\n굵고 훌륭한 뿔을 가진\n쁘사이저일수록 이성에게 인기다."
          shield: "뿔로 먹이를 찔러 넣어\n그대로 두 동강으로 만들거나\n강제로 던져버린다."
        zh_simp:
          sword: "同类之间以角的成色划分等级。\n一只凯罗斯的角越粗越结实，\n它就越受异性欢迎。"
          shield: "用角夹住猎物后，\n不是直接把对方切成两半，\n就是强行把对方扔飞。"
        zh_trad:
          sword: "會以角來判斷彼此的地位。\n凱羅斯的角越是粗壯氣派，\n就越能得到異性的愛戴。"
          shield: "會用角緊緊夾住獵物，\n就這樣把對方剪成兩半\n或是把牠硬扔到天邊去。"
