      descriptions:
        jp_kana:
          sword: "たくましいので　こうじげんばや\nさいくつじょうで　ダイオウドウや\nひとと　はたらいて　いることも。"
          shield: "はれた　ひに　しか　うてないが\nエネルギーだんの　はかいりょくは\nダンプカーも　ふきとばすほど。"
        jp_kanji:
          sword: "たくましいので　工事現場や\n採掘場で　ダイオウドウや\n人と　働いて　いることも。"
          shield: "晴れた　日に　しか　撃てないが\nエネルギー弾の　破壊力は\nダンプカーも　吹きとばすほど。"
        en:
          sword: "This hardy Pokémon can often be found on\nconstruction sites and in mines, working\nalongside people and Copperajah."
          shield: "Although its energy blasts can blow away\na dump truck, they have a limitation—\nthey can only be fired when the sun is out."
        fr:
          sword: "Sa robustesse lui vaut parfois de travailler\nsur les chantiers et dans les carrières\nen compagnie des Hommes et des Pachyradjah."
          shield: "Il est capable d’envoyer des boules d’énergie\nassez puissantes pour balayer un camion-benne,\nmais il ne peut tirer que les jours ensoleillés."
        it:
          sword: "È molto robusto e per questo a volte lavora\nassieme a uomini e Copperajah nell’edilizia\ne nell’estrazione mineraria."
          shield: "La potenza delle sue sfere di energia è tale da\nspazzare via un camion. Tuttavia, può spararle\nsolo nei giorni di sole."
        de:
          sword: "Aufgrund seiner Stärke arbeitet es zusammen mit\nMenschen und Patinaraja öfter mal als Aushilfe\nauf Baustellen oder in Bergwerken."
          shield: "Seine Energiekugeln können einen Lastwagen\ndurch die Luft schleudern. Diese kann es aber\nnur bei schönem Wetter abfeuern."
        es:
          sword: "Su robustez le permite colaborar con humanos\ny Copperajah en labores de construcción y\nminería."
          shield: "Las bolas de energía que lanza solo en días\nsoleados son tan potentes que pueden hacer\nsaltar un camión por los aires."
        ko:
          sword: "씩씩해서 공사 현장이나\n채굴장에서 대왕끼리동이나\n사람과 함께 일할 때도 있다."
          shield: "맑은 날에만 쏠 수 있지만\n에너지탄의 파괴력은\n덤프트럭도 날려버릴 정도다."
        zh_simp:
          sword: "由于拥有健壮的身体，\n有时可以在工地或采石场看到它\n和大王铜象还有人类一起工作。"
          shield: "它射出的能量弹具有\n可以击飞翻斗车的破坏力。\n不过只有在晴天才能射击。"
        zh_trad:
          sword: "由於擁有健壯的身體，\n有時可以在工地或採石場看到牠\n和大王銅象還有人類一起工作。"
          shield: "牠射出的能量彈具有\n能擊飛砂石車的破壞力。\n不過只有在晴天才能射擊。"
