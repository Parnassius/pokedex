        jp_kana:
          sword: "まわたのような　つばさは　くうきを\nふくんで　ふわふわの　さわりごこち。\nこまめな　ていれを　かかさない。"
          shield: "わたぐもに　みえるため　てきから\nみつかりにくい。　せだいを　かさねる\nうち　つばさが　しろくなったという。"
        jp_kanji:
          sword: "真綿のような　翼は　空気を　含んで\nふわふわの　触り心地。\nこまめな　手入れを　欠かさない。"
          shield: "綿雲に　見えるため　敵から\n見つかりにくい。　世代を　重ねるうち\n翼が　白くなったという。"
        en:
          sword: "Its cottony wings are full of air, making them light\nand fluffy to the touch. Swablu takes diligent care\nof its wings."
          shield: "Since Swablu looks like a cumulus cloud, foes can\nhave a hard time finding it. Apparently its wings\nturned white over many generations."
        fr:
          sword: "Ses ailes ressemblant à du coton contiennent de\nl’air, ce qui leur confère une texture duveteuse.\nElles nécessitent un entretien minutieux."
          shield: "Ses ailes en forme de nuage le dissimulent\naux yeux des ennemis. On raconte qu’elles sont\ndevenues blanches après plusieurs générations."
        it:
          sword: "Si prende meticolosamente cura delle sue ali\nsimili a batuffoli di cotone. Ha l’abitudine di\ngonfiarle rendendole soffici al tatto."
          shield: "Poiché sembra una nuvola, è difficile che i nemici\nlo individuino. Si dice che le ali siano diventate\nbianche con il passare delle generazioni."
        de:
          sword: "Seine watteartigen Flügel enthalten Luft und\nfühlen sich daher schön flauschig an. Wablu lässt\nkeine Gelegenheit aus, sie zu pflegen."
          shield: "Es sieht Schäfchenwolken sehr ähnlich, weshalb\nGegner es nur schwer entdecken. Seine Flügel\nwurden wohl über Generationen hinweg weiß."
        es:
          sword: "Sus alas algodonadas contienen aire, lo que les\naporta un tacto suave y esponjoso. Se las acicala\ncontinuamente."
          shield: "Sus alas parecen nubes algodonadas y lo ocultan\nde sus rivales. Se cree que se volvieron blancas\ncon el paso de las generaciones."
        ko:
          sword: "솜 같은 날개에는 공기가 들어 있어\n만지면 푹신푹신한 느낌이 든다.\n항상 꼼꼼하게 손질한다."
          shield: "솜구름처럼 보이기 때문에 적의\n눈에 잘 띄지 않는다. 세대를 거치면서\n날개가 하얗게 되었다고 한다."
        zh_simp:
          sword: "像丝绵一样的翅膀中含有\n空气，触感蓬松。绝不会\n忽视对翅膀精细地保养。"
          shield: "看起来像是一团棉花云，因此\n不易被敌人发现。据说翅膀是\n随着世代演进逐渐变白的。"
        zh_trad:
          sword: "絲綿般的翅膀會鎖住空氣，\n呈現蓬蓬鬆鬆的觸感。\n牠總是會細心地打理翅膀。"
          shield: "看起來就像是團綿雲，因此不易\n被敵人發現。據說牠的翅膀是\n在一代代的演變下成為白色的。"
