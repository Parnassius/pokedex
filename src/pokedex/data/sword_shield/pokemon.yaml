        jp_kana:
          sword: "ほぼ　ぜつめつした　ポケモン。\nみっかに　いちど　だっぴして\nカラを　どんどん　かたくする。"
          shield: "ぜつめつしたとも　いわれるが\nいちぶの　ちいきでは　けっこう\nふつうに　みかける　らしい。"
        jp_kanji:
          sword: "ほぼ　全滅した　ポケモン。\n３日に　一度　脱皮して\n殻を　どんどん　硬くする。"
          shield: "絶滅したとも　言われるが\n一部の　地域では　けっこう\n普通に　見かける　らしい。"
        en:
          sword: "This species is almost entirely extinct. Kabuto\nmolt every three days, making their shells harder\nand harder."
          shield: "While some say this species has gone extinct,\nKabuto sightings are apparently fairly common\nin some places."
        fr:
          sword: "Ce Pokémon au bord de l’extinction\nmue tous les trois jours et renforce\nainsi davantage sa carapace."
          shield: "On raconte qu’ils se seraient éteints,\nmais apparemment, on peut souvent\nen croiser dans une zone particulière."
        it:
          sword: "È un Pokémon sull’orlo dell’estinzione. Fa la\nmuta ogni tre giorni indurendo gradualmente\nil carapace."
          shield: "Si dice che si sia estinto, ma pare che in certe\nzone si possa avvistare con una certa facilità."
        de:
          sword: "Dieses Pokémon ist so gut wie ausgestorben.\nSein Panzer wird immer härter, indem es sich\nalle drei Tage häutet."
          shield: "Es heißt zwar, dass Kabuto ausgestorben sei,\ndoch in einer bestimmten Gegend trifft man es\nnoch relativ häufig an."
        es:
          sword: "Un Pokémon casi extinto. Cada tres días, muda\nel caparazón, que se va endureciendo de forma\nprogresiva."
          shield: "Se consideraba extinto, pero, al parecer, existen\ndeterminadas zonas en las que es posible hallar\nejemplares con facilidad."
        ko:
          sword: "거의 멸종된 포켓몬이다.\n3일에 1번 탈피하여\n껍질을 점점 단단하게 만든다."
          shield: "멸종되었다는 이야기가 있지만\n일부 지역에서는 제법\n많이 목격되는 듯하다."
        zh_simp:
          sword: "几乎已灭绝的宝可梦。\n每３天会脱一次皮，使自己\n的壳变得越来越坚硬。"
          shield: "虽然存在已经灭绝的说法，\n但据说在一部分地区\n还是经常能见到它的身影。"
        zh_trad:
          sword: "幾乎滅絕的寶可夢。\n每３天就會脫一次皮，\n讓殼變得越來越堅硬。"
          shield: "雖然有人說這種寶可夢\n已經滅絕，但牠在一部分\n地區似乎是相當常見的。"
