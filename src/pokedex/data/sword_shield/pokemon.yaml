          sword: "よくきたえられた　コジョフーは\n１ぷんで　１００かいを　こえる\nチョップを　うつことが　できる。"
          shield: "ちいさくても　きしょうは　あらい。\nゆだんして　ちかづく　あいてには\nかれいな　れんだを　おみまいする。"
        jp_kanji:
          sword: "よく鍛えられた　コジョフーは\n１分で　１００回を　超える\nチョップを　打つことが　できる。"
          shield: "小さくても　気性は　荒い。\n油断して　近づく　相手には\n華麗な　連打を　おみまいする。"
        en:
          sword: "In one minute, a well-trained Mienfoo can chop\nwith its arms more than 100 times."
          shield: "Though small, Mienfoo’s temperament is fierce.\nAny creature that approaches Mienfoo carelessly\nwill be greeted with a flurry of graceful attacks."
        fr:
          sword: "Les Kungfouine bien entraînés sont capables\nd’asséner plus de cent coups par minute\ndu tranchant de la main."
          shield: "De nature brutale malgré sa petite taille, il inflige\nune série de coups majestueux aux inconscients\nqui s’approchent trop près de lui."
        it:
          sword: "I Mienfoo più allenati sono in grado di sferrare\npiù di 100 colpi al minuto con il taglio\ndella mano."
          shield: "Ha un temperamento turbolento, malgrado\nle dimensioni ridotte. Sferra eleganti raffiche di\ncolpi contro chi gli si avvicina incautamente."
        de:
          sword: "Ein gut trainiertes Lin-Fu kann in einer Minute\nüber 100 Schläge ausführen."
          shield: "Lin-Fu ist klein, hat aber ein wildes Temperament.\nGegnern, die sich ihm unbedacht nähern, setzt es\nmit einer eleganten Schlagfolge zu."
        es:
          sword: "Un Mienfoo bien entrenado es capaz de\npropinar más de cien golpes por minuto."
          shield: "Su apariencia menuda contrasta con su carácter\npoco afable. Abruma a los rivales que se acercan\na él con gráciles oleadas de ataques sucesivos."
        ko:
          sword: "잘 단련된 비조푸는\n1분에 100회 이상\n촙 공격을 할 수 있다."
          shield: "작아도 기질은 거칠다.\n방심하고 다가간 상대에게\n화려한 연타를 먹인다."
        zh_simp:
          sword: "身经千锤百炼的功夫鼬\n可以在１分钟之内\n劈击１００次以上。"
          shield: "个头虽小脾气却很暴躁。\n面对疏忽大意接近自己的\n对手，会施展出华丽的连击。"
        zh_trad:
          sword: "千錘百鍊的功夫鼬\n能夠在１分鐘內使出\n超過１００次的劈擊。"
          shield: "個頭雖小，個性粗暴。\n對於漫不經心就靠近自己\n的對手會奉上華麗的連擊。"
