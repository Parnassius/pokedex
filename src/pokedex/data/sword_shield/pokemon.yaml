    en: Espurr
    fr: Psystigri
    it: Espurr
    de: Psiau
    es: Espurr
    ko: 냐스퍼
    zh_simp: 妙喵
    zh_trad: 妙喵
  forms:
    espurr:
      form_id: 0
      base_stats:
        hp: 62
        attack: 48
        defense: 54
        special_attack: 63
        special_defense: 60
        speed: 68
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - psychic
      egg_groups:
        - field
      abilities:
        - keen_eye
        - infiltrator
      hidden_ability: own_tempo
      descriptions:
        jp_kana:
          sword: "いつも　むひょうじょうだが　じつは\nきょうりょくな　サイコパワーが\nもれださないように　ひっしなのだ。"
          shield: "プロレスラーを　ふきとばす　ほどの\nサイコパワーを　うちに　ひめているが\nコントロールできずに　こまっている。"
        jp_kanji:
          sword: "いつも　無表情だが　じつは\n強力な　サイコパワーが\n漏れ出さないように　必死なのだ。"
          shield: "プロレスラーを　吹きとばす　ほどの\nサイコパワーを　内に　秘めているが\nコントロールできずに　困っている。"
        en:
          sword: "Though Espurr’s expression never changes,\nbehind that blank stare is an intense struggle to\ncontain its devastating psychic power."
          shield: "There’s enough psychic power in Espurr to send a\nwrestler flying, but because this power can’t be\ncontrolled, Espurr finds it troublesome."
        fr:
          sword: "Sous son masque inexpressif, il est en fait\nconstamment en train d’essayer de contenir\nses puissants pouvoirs psychiques."
          shield: "Il possède des pouvoirs psychiques si puissants\nqu’il peut faire valser un catcheur.\nMalheureusement, il a du mal à les contrôler."
        it:
          sword: "Il suo sguardo è inespressivo, ma in realtà sta\nfacendo uno sforzo enorme per tenere sotto\ncontrollo i suoi potentissimi poteri psichici."
          shield: "I suoi poteri psichici sono talmente forti da\nscaraventare in aria un lottatore di wrestling,\nma ha seri problemi nel controllarli."
        de:
          sword: "Sein Gesicht ist stets ausdruckslos. Grund dafür\nist die enorme Anstrengung, die es aufbringen\nmuss, um seine Psycho-Kräfte zu kontrollieren."
          shield: "Mit seinen Psycho-Kräften könnte es selbst\nProfi-Wrestler vom Platz fegen. Es fällt ihm aber\nschwer, diese Kräfte zu kontrollieren."
        es:
          sword: "Su inexpresividad aparente esconde una lucha\ntitánica por contener su inmenso poder psíquico."
          shield: "Es capaz de mandar por los aires a un luchador\nprofesional gracias a sus poderes psíquicos, pero\ntiene serios problemas para controlarlos."
        ko:
          sword: "언제나 무표정하지만 실제로는\n강력한 사이코 파워가\n새어 나가지 않게 하기 위해 필사적이다."
          shield: "프로레슬러를 날려 버릴 정도의\n사이코 파워를 속에 지니고 있지만\n컨트롤이 되지 않아 난처해하고 있다."
        zh_simp:
          sword: "虽然一直都面无表情，\n但是那其实是因为它在努力\n不让自己强力的精神力量漏出。"
          shield: "虽然拥有可以弹飞\n职业摔角手的精神力量，\n却因无法好好控制而感到烦恼。"
        zh_trad:
          sword: "雖然一直都面無表情，\n但是那其實是因為牠在努力\n不讓自己強大的精神力量漏出。"
          shield: "雖然擁有可以彈飛\n職業摔角選手的精神力量，\n卻因無法好好控制而感到煩惱。"
