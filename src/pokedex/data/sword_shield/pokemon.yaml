      descriptions:
        jp_kana:
          sword: "あまぐもをよぶ　かみと　いわれる。\nおこらせると　かねのねの　ような\nぶきみな　こえで　いかくする。"
          shield: "からだのもよう　から　ほんらい\nガラルには　いない　ポケモンと\nかんがえる　がくしゃも　おおい。"
        jp_kanji:
          sword: "雨雲を呼ぶ　神と　いわれる。\n怒らせると　鐘の音の　ような\n不気味な　声で　威嚇する。"
          shield: "体の模様　から　本来\nガラルには　いない　ポケモンと\n考える　学者も　多い。"
        en:
          sword: "Some believe it to be a deity that summons rain\nclouds. When angered, it lets out a warning cry\nthat rings out like the tolling of a bell."
          shield: "Many scientists suspect that this Pokémon\noriginated outside the Galar region, based on\nthe patterns on its body."
        fr:
          sword: "On dit qu’il appelle la pluie. Si on attise sa colère,\nil se met à gronder en émettant un son lugubre\nsemblable à celui d’une cloche."
          shield: "De nombreux savants pensent que ce Pokémon\nn’est pas originaire de Galar à cause des motifs\nqui ornent son corps."
        it:
          sword: "Si dice che sia una divinità portatrice di pioggia.\nSe si arrabbia, emette un suono inquietante\ne minaccioso simile a quello di una campana."
          shield: "Per via dei disegni sul corpo, molti studiosi\nritengono che non sia un Pokémon originario\ndi Galar."
        de:
          sword: "Man verehrt es als Regenmacher. Wird es wütend,\ndroht es mit einer unheimlichen Stimme, die wie\nder Ton einer Glocke klingt."
          shield: "Wegen seinem Muster denken viele Forscher,\ndass dieses Pokémon ursprünglich nicht aus Galar\nstammt."
        es:
          sword: "Antaño se lo consideraba una deidad que traía\nlas lluvias. Cuando se enfada, emite un sonido\nlúgubre que recuerda al tañido de una campana."
          shield: "Basándose en los motivos de su cuerpo, muchos\neruditos creen que este Pokémon no es originario\nde Galar."
        ko:
          sword: "비구름을 부르는 신이라 불린다.\n화나게 하면 종소리를 닮은\n불길한 소리로 위협한다."
          shield: "몸의 무늬 때문에 본래\n가라르에는 없던 포켓몬이라고\n생각하는 학자도 많다."
        zh_simp:
          sword: "被称为能召唤雨云的神明。\n生气时会用像钟声一般令人\n毛骨悚然的声音来威吓对手。"
          shield: "它身上的纹路让\n许多学者都认为它\n原本并不存在于伽勒尔。"
        zh_trad:
          sword: "被稱為能召喚雨雲的神明。\n生氣時會用像鐘聲一般令人\n毛骨悚然的聲音來威嚇對手。"
          shield: "牠身上的紋路讓\n許多學者認為牠\n原本並不存在於伽勒爾。"
bonsly:
