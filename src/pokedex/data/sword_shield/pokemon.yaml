          sword: "７ひきの　カメテテが　１ぴきぶんの\nからだを　つくっている。　あたまが\nてあしに　めいれいする　しくみ。"
          shield: "てのひらの　めだまが　ぜんごさゆうを\nみはる。　ピンチのときは　てあしが\nかってに　うごいて　てきを　たおす。"
        jp_kanji:
          sword: "７匹の　カメテテが　１匹分の\n体を　つくっている。　頭が\n手足に　命令する　仕組み。"
          shield: "手のひらの　目玉が　前後左右を\n見張る。　ピンチのときは　手足が\n勝手に　動いて　敵を　倒す。"
        en:
          sword: "Seven Binacle come together to form one\nBarbaracle. The Binacle that serves as the head\ngives orders to those serving as the limbs."
          shield: "Having an eye on each palm allows it to keep\nwatch in all directions. In a pinch, its limbs start\nto act on their own to ensure the enemy’s defeat."
        fr:
          sword: "Sept Opermine s’assemblent pour former\nun Golgopathe. La tête commande les autres\nmembres."
          shield: "Il scrute les environs avec les yeux de ses paumes.\nEn cas d’urgence, ses membres peuvent prendre\ndes initiatives pour triompher de l’ennemi."
        it:
          sword: "Il suo corpo è formato da sette Binacle.\nQuello che occupa la posizione della testa\ncoordina gli altri."
          shield: "Gli occhi sulle sue mani hanno una visuale a 360\ngradi. Quando è in difficoltà, i suoi arti agiscono\nautonomamente per sconfiggere il nemico."
        de:
          sword: "Sein Körper besteht aus sieben verschiedenen\nBithora, wobei der Kopf das Sagen über die\nanderen Gliedmaßen hat."
          shield: "Die Augen auf den Händen überwachen sein\ngesamtes Umfeld. In Notsituationen greifen\nArme und Beine eigenständig an."
        es:
          sword: "Su cuerpo está formado por siete Binacle. El\nsituado en la posición central a modo de cabeza\nsuele impartir las órdenes a las extremidades."
          shield: "Los ojos de las manos le permiten ver en todas\ndirecciones. En caso de apuro, sus extremidades\nse mueven solas para derribar al enemigo."
        ko:
          sword: "7마리의 거북손손이 1마리의\n몸을 이루고 있다. 머리가\n손발에 명령하는 구조다."
          shield: "손바닥의 눈동자가 전후좌우를\n감시한다. 위기에 처하면 손발이\n멋대로 움직여 적을 쓰러뜨린다."
        zh_simp:
          sword: "７只龟脚脚组成了１只\n龟足巨铠的身体。\n由头部对手脚发号施令。"
          shield: "用手掌上的眼珠来观察\n前后左右的状况。遇上危机时\n手脚会自己动起来打倒对手。"
        zh_trad:
          sword: "７隻龜腳腳組成了１隻\n龜足巨鎧的身體。\n由頭部對手腳發號施令。"
          shield: "用手掌上的眼珠來觀察\n前後左右的狀況。遇上危機時\n手腳會自己動起來打倒對手。"
