      descriptions:
        jp_kana:
          sword: "ディグダが　とおったあとの　だいちは\nほどよく　たがやされて\nさいこうの　はたけに　なる。"
          shield: "ちちゅうの　あさいところを　いどう。\nほりすすんだあとは　じめんが\nもりあがっているので　すぐわかる。"
        jp_kanji:
          sword: "ディグダが　通ったあとの　大地は\nほどよく　耕されて\n最高の　畑に　なる。"
          shield: "地中の　浅いところを　移動。\n掘り進んだあとは　地面が\n盛り上がっているので　すぐわかる。"
        en:
          sword: "If a Diglett digs through a field, it leaves the soil\nperfectly tilled and ideal for planting crops."
          shield: "It burrows through the ground at a shallow depth.\nIt leaves raised earth in its wake, making it easy\nto spot."
        fr:
          sword: "Si un Taupiqueur creuse un tunnel sous un champ,\nil retourne la terre et améliore les récoltes."
          shield: "Ce Pokémon creuse sous terre à faible profondeur.\nLa terre qu’il laisse dans son sillage le rend facile\nà repérer."
        it:
          sword: "Se Diglett attraversa un terreno nel corso dei\nsuoi scavi, lo lascia perfettamente lavorato e\npronto per la semina."
          shield: "Scava buche a bassa profondità. La terra\nsollevata che lascia al suo passaggio lo rende\nfacilmente individuabile."
        de:
          sword: "Bewegt sich ein Digda unterirdisch fort, pflügt es\ndabei den Erdboden gleich mit und bereitet so\nden Anbau von Feldfrüchten vor."
          shield: "Es gräbt sich in geringer Tiefe durch den\nErdboden. Da es dabei durchwühlte Erde an der\nOberfläche hinterlässt, ist es leicht zu finden."
        es:
          sword: "Si un Diglett excava un terreno, lo deja\nperfectamente arado y preparado para\nsembrarlo."
          shield: "Este Pokémon avanza horadando la tierra a poca\nprofundidad. Resulta fácil localizarlo por los\nmontículos que deja como rastro."
        ko:
          sword: "디그다가 지나간 뒤의\n대지는 알맞게 땅이 일궈져\n최고의 밭이 된다."
          shield: "얕은 땅속을 이동한다.\n굴을 파며 다닌 곳은 지면이\n솟아 있기 때문에 바로 알 수 있다."
        zh_simp:
          sword: "地鼠经过之后的土壤\n会得到适当的翻动，\n成为最适合耕种的田地。"
          shield: "在地下较浅的地方移动。\n被它挖掘过的地面会鼓起来，\n所以非常容易发现。"
        zh_trad:
          sword: "地鼠經過之後的土壤\n會得到適當的翻動，\n成為最適合耕種的田地。"
          shield: "在地下較淺的地方移動。\n被牠挖掘過的地面會鼓起來，\n所以非常容易發現。"
    diglett_alolan_form:
      form_id: 1
      names:
        jp_kana: アローラのすがた
        jp_kanji: アローラのすがた
        en: Alolan Form
        fr: Forme d’Alola
        it: Forma di Alola
        de: Alola-Form
        es: Forma de Alola
        ko: 알로라의 모습
        zh_simp: 阿罗拉的样子
        zh_trad: 阿羅拉的樣子
      base_stats:
        hp: 10
