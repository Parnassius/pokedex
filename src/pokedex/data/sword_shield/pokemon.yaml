      types:
        - bug
      egg_groups:
        - bug
      abilities:
        - shed_skin
      descriptions:
        jp_kana:
          sword: "しんかを　まっている　じょうたい。\nかたくなる　ことしか　できないので\nおそわれないよう　じっとしている。"
          shield: "かたい　カラに　つつまれているが\nなかみは　やわらかいので\nつよい　こうげきには　たえられない。"
        jp_kanji:
          sword: "進化を　待っている　状態。\n硬くなる　ことしか　できないので\n襲われないよう　じっとしている。"
          shield: "硬い　殻に　包まれているが\n中身は　軟らかいので\n強い　攻撃には　耐えられない。"
        en:
          sword: "It is waiting for the moment to evolve. At this\nstage, it can only harden, so it remains\nmotionless to avoid attack."
          shield: "Even though it is encased in a sturdy shell,\nthe body inside is tender. It can’t withstand a\nharsh attack."
        fr:
          sword: "En attendant sa prochaine évolution, il ne peut\nque durcir sa carapace et rester immobile\npour éviter de se faire attaquer."
          shield: "Bien que son corps soit entouré d’une carapace\nsolide, l’intérieur est si mou qu’il ne résisterait\npas à une attaque violente."
        it:
          sword: "In attesa di evolversi, l’unica cosa che può fare\nè indurire la sua corazza, quindi rimane immobile\nper evitare di essere attaccato."
          shield: "La corazza esterna è robusta ma l’interno\nè molle. Per questo non è in grado di resistere\nad attacchi particolarmente veementi."
        de:
          sword: "In diesem Zustand wartet es auf die Entwicklung.\nEs kann nur seinen Panzer erhärten, daher bewegt\nes sich nicht, um nicht angegriffen zu werden."
          shield: "In seiner harten Schale ist ein weicher Körper.\nEinem brutalen Angriff hat es nichts\nentgegenzusetzen."
        es:
          sword: "Como en este estado solo puede endurecer\nsu coraza, permanece inmóvil a la espera de\nevolucionar."
          shield: "Aunque cuenta con una coraza muy dura, tiene\nun cuerpo bastante blando. Un ataque violento\npuede acabar con él."
        ko:
          sword: "진화를 기다리고 있는 상태다.\n단단해지는 것밖에 할 수 없어서\n공격받지 않도록 꿈쩍 않고 있다."
          shield: "단단한 껍질로 둘러싸여 있지만\n안은 부드럽기 때문에\n강한 공격에는 버티지 못한다."
        zh_simp:
          sword: "正处于等待进化的状态。\n除了变硬之外什么都做不了，\n只能动也不动以免引来袭击。"
          shield: "虽然有坚硬的外壳，\n因为壳里的身体很软，\n所以无法抵抗强力的攻击。"
        zh_trad:
          sword: "正處於等待進化的狀態。\n除了變硬之外什麼都做不了，\n只能動也不動以免遭受攻擊。"
          shield: "雖然有堅硬的外殼，\n但因為殼裡的身體很軟，\n所以無法抵抗強力的攻擊。"
