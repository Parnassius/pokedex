        jp_kana:
          sword: "しっぽの　いっぽん　いっぽんに\nじんつうりきが　こめられている。\n１０００ねん　いきると　いわれる。"
          shield: "あたまがよくて　しゅうねんぶかい。\nふざけて　しっぽを　つかむと\n１０００ねん　たたられるという。"
        jp_kanji:
          sword: "しっぽの　１本　１本に\n神通力が　込められている。\n１０００年　生きると　言われる。"
          shield: "頭が良くて　執念深い。\nふざけて　しっぽを　つかむと\n１０００年　たたられるという。"
        en:
          sword: "It is said to live 1,000 years, and each of its tails\nis loaded with supernatural powers."
          shield: "Very smart and very vengeful. Grabbing one of\nits many tails could result in a 1,000-year curse."
        fr:
          sword: "On dit qu’il vit 1 000 ans et que chacune\nde ses queues a un pouvoir magique."
          shield: "Il est très intelligent et rancunier.\nQuiconque attrape une de ses queues se fera\nmaudire pour 1 000 ans."
        it:
          sword: "Dicono che viva un millennio. Ognuna delle sue\ncode è dotata di un potere magico."
          shield: "Molto intelligente e vendicativo. Chi gli afferra\nuna coda rischia una maledizione millenaria."
        de:
          sword: "Man sagt, es lebe 1 000 Jahre und jedem seiner\nSchweife wohnen übernatürliche Kräfte inne."
          shield: "Dieses Pokémon ist intelligent, aber rachsüchtig.\nWer zum Spaß einen seiner Schweife ergreift,\nkann sich einen tausendjährigen Fluch einhandeln."
        es:
          sword: "Cuentan que llega a vivir hasta mil años y que\ncada una de las colas posee poderes\nsobrenaturales."
          shield: "Muy inteligente y vengativo. Agarrar una de sus\ncolas podría traer 1000 años de mala suerte."
        ko:
          sword: "꼬리 하나하나에\n신통력이 담겨 있다.\n1000년을 산다고 한다."
          shield: "머리가 좋고 집념이 강하다.\n장난으로 꼬리를 잡으면\n1000년 동안 화를 입는다고 한다."
        zh_simp:
          sword: "每一根尾巴里都蕴含着\n神通力。据说它的寿命\n长达１０００年。"
          shield: "聪明伶俐，但爱记仇。\n据说如果敢乱抓它的尾巴，\n它就会缠着你作祟１０００年。"
        zh_trad:
          sword: "每一根尾巴裡都蘊含著\n神通力。據說牠的壽命\n長達１０００年。"
          shield: "聰明伶俐但很會記仇。\n據說如果敢亂抓牠的尾巴，\n牠就會纏著你作祟１０００年。"
    ninetales_alolan_form:
