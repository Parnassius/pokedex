        jp_kana:
          sword: "そらを　とぶことを　ねがいつづけた\nけっか　つばさを　もつ　からだに\nしんかできた　めずらしい　ポケモン。"
          shield: "おおぞらを　とぶ　よろこびに　ひたり\nじょうきげんだが　おこらせると\nてが　つけられない　らんぼうもの。"
        jp_kanji:
          sword: "空を　飛ぶことを　願い続けた　結果\n翼を　持つ　体に　進化できた\n珍しい　ポケモン。"
          shield: "大空を　飛ぶ　喜びに　浸り\n上機嫌だが　怒らせると\n手が　つけられない　乱暴者。"
        en:
          sword: "Salamence is an unusual Pokémon in that it\nwas able to evolve a body with wings just by\nconstantly wishing to be able to fly."
          shield: "While basking in the joy of flight generally keeps\nthis Pokémon in high spirits, Salamence turns into\nan uncontrollable menace if something angers it."
        fr:
          sword: "Ce Pokémon rare a tellement souhaité\nvoler qu’il s’est vu pousser des ailes\npendant son évolution."
          shield: "Heureux de pouvoir voler dans le ciel, il est\nsouvent de bonne humeur, mais il devient\nincontrôlable lorsqu’on le met en colère."
        it:
          sword: "Questo insolito Pokémon è riuscito a evolversi\nin una creatura dotata di ali in seguito al suo\nintenso desiderio di librarsi nel cielo."
          shield: "È generalmente di buon umore e traboccante\ndi gioia per essere riuscito a volare, ma se si\narrabbia diventa una furia incontrollabile."
        de:
          sword: "Diesem ungewöhnlichen Pokémon sind im Zuge\nseiner Entwicklung Flügel gewachsen, nur weil es\nden sehnlichen Wunsch hatte, fliegen zu können."
          shield: "Brutalanda freut sich ungemein darüber, endlich\nfliegen zu können, doch wenn es wütend wird,\ngerät es außer Kontrolle."
        es:
          sword: "Un Pokémon poco común que, tras desear\ncon todas sus fuerzas poder volar, consiguió\nun cuerpo alado al evolucionar."
          shield: "Feliz de ver cumplido su deseo, surca los cielos\ncon buen ánimo, pero, si se enfada, se vuelve\nviolento e incontrolable."
        ko:
          sword: "하늘을 나는 것을 꿈꿔온 결과\n날개를 가진 몸으로 진화하는 데\n성공한 희귀한 포켓몬."
          shield: "넓은 하늘을 나는 기쁨에\n크게 들떠 있지만 화나게 하면\n손 쓸 수 없을 정도로 난폭하다."
        zh_simp:
          sword: "一直渴望能飞上天空，\n进化后身体上终于长出了\n翅膀的珍奇宝可梦。"
          shield: "虽然在空中翱翔能够让它\n乐在其中，但是一旦被惹怒，\n就会大闹一番，不可收拾。"
        zh_trad:
          sword: "長久夢想著要飛上天，\n進化後身上終於長出了\n翅膀的稀奇寶可夢。"
          shield: "沉浸在翱翔天空的喜悅時，\n心情會非常好。但性情粗暴，\n一旦被激怒就會一發不可收拾。"
