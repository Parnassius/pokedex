          shield: "ツメで　ちちゅうを　ほりすすむので\nそだてた　やさいが　いたむと\nのうぎょうかんけいしゃは　きらう。"
        jp_kanji:
          sword: "両手の　ツメを　重ね合わせ\n体を　高速回転　させると\n獲物　めがけて　突っ込むのだ。"
          shield: "ツメで　地中を　掘り進むので\n育てた　野菜が　傷むと\n農業関係者は　嫌う。"
        en:
          sword: "It brings its claws together and whirls around at\nhigh speed before rushing toward its prey."
          shield: "It’s a digger, using its claws to burrow through the\nground. It causes damage to vegetable crops, so\nmany farmers have little love for it."
        fr:
          sword: "Il fonce sur ses proies en joignant ses griffes\net en tourbillonnant sur lui-même."
          shield: "Les cultivateurs le détestent, car il abîme leurs\nlégumes en creusant la terre avec ses griffes."
        it:
          sword: "Congiunge le unghie e si avvita su se stesso\na gran velocità per poi lanciarsi sulla preda."
          shield: "Non è ben visto dagli agricoltori per la sua\nabitudine di scavare cunicoli sottoterra\ncon le unghie, rovinando gli ortaggi."
        de:
          sword: "Es führt seine beiden Klauen zusammen, dreht\nsich rapide um die eigene Achse und stürzt sich\nauf seine Beute."
          shield: "Ein Pokémon, das sich bei Landwirten mäßiger\nBeliebtheit erfreut, da es beim Graben durchs\nErdreich gelegentlich ihre Ernten ruiniert."
        es:
          sword: "Tras juntar las garras, se abalanza sobre su presa\nhaciendo rotar el cuerpo a gran velocidad."
          shield: "Su costumbre de horadar túneles bajo tierra le\nha granjeado la antipatía de los agricultores,\nya que puede echar a perder cosechas enteras."
        ko:
          sword: "양손의 손톱을 서로 겹치고\n몸을 고속으로 회전시킨 뒤\n먹이를 향해 돌진한다."
          shield: "손톱으로 땅속을 파고 다니면서\n키우는 채소를 해치기 때문에\n농업 종사자들이 싫어한다."
        zh_simp:
          sword: "会将双掌上的爪子并拢，\n并让身体高速旋转，\n瞄准猎物冲过去。"
          shield: "会用爪子在地底挖掘前进。\n一些农民因为担心它会\n因此糟蹋蔬菜而讨厌它。"
        zh_trad:
          sword: "會將雙掌上的爪子併攏，\n並讓身體高速旋轉，\n瞄準獵物衝過去。"
          shield: "會用爪子在地底挖掘前進。\n一些農民因為擔心牠會\n因此糟蹋蔬菜而討厭牠。"
