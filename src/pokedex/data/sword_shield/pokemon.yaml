    fr: Sucreine
    it: Tsareena
    de: Fruyal
    es: Tsareena
    ko: 달코퀸
    zh_simp: 甜冷美后
    zh_trad: 甜冷美后
  forms:
    tsareena:
      form_id: 0
      base_stats:
        hp: 72
        attack: 120
        defense: 98
        special_attack: 50
        special_defense: 98
        speed: 72
      evs_yield:
        hp: 0
        attack: 3
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - grass
      egg_groups:
        - grass
      abilities:
        - leaf_guard
        - queenly_majesty
      hidden_ability: sweet_veil
      held_items:
        common: grassy_seed
      descriptions:
        jp_kana:
          sword: "すらりと　のびた　あしと　ざんにんな\nこころを　もち　おそれられている。\nてきを　ようしゃなく　ふみにじる。"
          shield: "かたく　とがった　つまさきで　けりを\nおみまいして　あいての　からだと\nこころに　きえない　きずを　のこす。"
        jp_kanji:
          sword: "すらりと　伸びた　脚と　残忍な\n心を　もち　恐れられている。\n敵を　容赦なく　踏みにじる。"
          shield: "硬く　尖った　つま先で　蹴りを\nおみまいして　相手の　体と\n心に　消えない　傷を　残す。"
        en:
          sword: "This feared Pokémon has long, slender legs and\na cruel heart. It shows no mercy as it stomps on\nits opponents."
          shield: "A kick from the hardened tips of this Pokémon’s\nlegs leaves a wound in the opponent’s body and\nsoul that will never heal."
        fr:
          sword: "Ce Pokémon au cœur cruel est redouté,\ncar il piétine ses ennemis avec ses longues\njambes sans aucune pitié."
          shield: "Ce Pokémon frappe violemment ses ennemis\nde la pointe dure de ses jambes, ce qui leur inflige\ndes dégâts irréversibles au corps et à l’âme."
        it:
          sword: "Ha gambe lunghe e snelle, ed è molto temuto\nper il suo cuore crudele. Calpesta i nemici\nsenza alcuna pietà."
          shield: "Tira calci all’avversario con la punta dura\ne appuntita dei piedi, lasciandogli cicatrici\nindelebili nel corpo e nell’animo."
        de:
          sword: "Seine langen Beine und sein grausames Herz\nwerden gefürchtet. Es tritt ohne Gnade auf seine\nGegner ein."
          shield: "Es tritt mit seinen harten Fußspitzen auf seine\nGegner ein und hinterlässt dabei sowohl\nkörperliche als auch seelische Narben."
        es:
          sword: "Sus piernas son tan esbeltas como cruel es su\ncorazón. Un temible Pokémon que pisotea sin\npiedad al rival."
          shield: "Propina patadas con sus duras y puntiagudas\npiernas, con las que deja heridas indelebles en\nel cuerpo y el corazón del adversario."
        ko:
          sword: "늘씬하게 뻗은 다리와 잔인한\n마음씨를 가진 공포의 대상.\n상대를 사정없이 짓밟는다."
          shield: "단단하고 뾰족한 발끝으로\n킥을 먹여서 상대의 몸과 마음에\n지워지지 않는 상처를 남긴다."
        zh_simp:
          sword: "让人畏惧的宝可梦。\n拥有苗条的双腿和残忍的心，\n会毫不留情地狠踩敌人。"
          shield: "用又尖又硬的脚尖施展脚踢，\n朝对手的身体和心灵\n留下无法磨灭的创伤。"
        zh_trad:
          sword: "讓人畏懼的寶可夢。\n擁有苗條的雙腿和殘忍的心，\n會毫不留情地狠踩敵人。"
          shield: "用又尖又硬的腳尖施展踢擊，\n朝對手的身體和心靈\n留下無法磨滅的創傷。"
