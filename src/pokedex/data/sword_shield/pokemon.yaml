        jp_kana:
          sword: "きれいな　みずべに　あらわれる。\nあたまの　はを　にだした　しるは\nむしよけに　つかわれることもある。"
          shield: "はの　いろが　こいほど　けんこう。\nていれの　いきとどいた　はたけや\nかだんに　すみつくことも　ある。"
        jp_kanji:
          sword: "きれいな　水辺に　現れる。\n頭の　葉を　煮だした　汁は\n虫よけに　使われることもある。"
          shield: "葉の　色が　濃いほど　健康。\n手入れの　行き届いた　畑や\n花壇に　棲みつくことも　ある。"
        en:
          sword: "Petilil appears around sources of clean water.\nBoiling leaves from this Pokémon’s head results in\na liquid that’s sometimes used as a bug repellent."
          shield: "The deeper the color of a Petilil’s leaves, the\nhealthier the Pokémon is. Petilil sometimes makes\nits home in a well-tended field or flowerbed."
        fr:
          sword: "Il apparaît non loin des eaux propres. On utilise\nparfois les infusions préparées avec les feuilles\nde sa tête pour éloigner les insectes."
          shield: "Plus ses feuilles sont foncées, plus il est en\nbonne santé. Il s’installe parfois dans les champs\nou les parterres de fleurs bien entretenus."
        it:
          sword: "Appare in prossimità di acque limpide. Il decotto\nottenuto dalle foglie che ha sulla testa a volte\nviene usato come repellente per gli insetti."
          shield: "Più il colore delle foglie è intenso, più è in salute.\nA volte si stabilisce in campi o aiuole ben curate."
        de:
          sword: "Lilminip hält sich unweit von sauberem Wasser\nauf. Ein Aufguss der Blätter auf seinem Kopf wird\nauch als Mittel gegen Käfer-Pokémon eingesetzt."
          shield: "Je kräftiger die Farbe seiner Blätter, desto\ngesünder ist es. Lilminip lässt sich zuweilen in gut\ngepflegten Blumenbeeten oder Feldern nieder."
        es:
          sword: "Aparece en lugares de aguas limpias.\nLa decocción de las hojas de su cabeza se\npuede utilizar como repelente de insectos."
          shield: "Cuanto más sano está este Pokémon, más intenso\nse vuelve el color de sus hojas. A veces se asienta\nen huertos o jardines de flores bien cuidados."
        ko:
          sword: "깨끗한 물가에 나타난다.\n머리의 잎을 우려낸 즙은\n벌레를 쫓는 데 사용하기도 한다."
          shield: "잎사귀의 색이 짙을수록 건강하다.\n잘 정돈된 밭이나 화단에\n자리잡고 살기도 한다."
        zh_simp:
          sword: "会出现在清澈的水边。\n用它头上的叶子煮出的汤\n有时会被作为驱虫剂使用。"
          shield: "叶子的颜色越深就越健康。\n有时也会在被精心照料过的\n田地或花坛里定居下来。"
        zh_trad:
          sword: "會出現在乾淨的水邊。\n用牠頭上的葉子熬出的汁\n有時會被當作除蟲劑使用。"
          shield: "葉子的顏色越深就越健康。\n有時也會在整理得很好的\n田地或花壇定居下來。"
