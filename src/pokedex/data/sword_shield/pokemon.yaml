          sword: "こうらに　きのみを　たくわえている。\nおそわれないように　いわの　したに\nこもって　じっとしている。"
          shield: "ツボのような　こうらの　なかに\nためこんだ　きのみは　いつのまにか\nドロドロの　ジュースに　かわる。"
        jp_kanji:
          sword: "甲羅に　木の実を　たくわえている。\n襲われないように　岩の　下に\nこもって　じっとしている。"
          shield: "ツボのような　甲羅の　中に\nためこんだ　木の実は　いつの間にか\nドロドロの　ジュースに　変わる。"
        en:
          sword: "It stores berries inside its shell. To avoid attacks,\nit hides beneath rocks and remains completely still."
          shield: "The berries stored in its vaselike shell eventually\nbecome a thick, pulpy juice."
        fr:
          sword: "Il garde des Baies dans sa carapace. Pour éviter\nde se faire attaquer, il s’immobilise sous un rocher."
          shield: "Les Baies qu’il conserve dans sa carapace\nen forme d’urne se changent en jus onctueux\naprès un certain temps."
        it:
          sword: "Nel guscio raccoglie delle bacche. Per evitare\ngli attacchi, si nasconde sotto le rocce e rimane\nimmobile senza fare alcun rumore."
          shield: "Il suo guscio è come un vaso nel quale conserva\nle bacche, che a un certo punto si trasformano\nin un denso succo."
        de:
          sword: "Es sammelt Beeren in seiner Schale. Um sich vor\nAttacken zu schützen, versteckt es sich unter\nSteinen und verharrt dort regungslos."
          shield: "In seinem vasenförmigen Panzer gelagerte Beeren\nverwandeln sich mit der Zeit zu einem\ndickflüssigen Saft."
        es:
          sword: "Almacena bayas dentro de su concha. Para evitar\nataques, se esconde inmóvil bajo las rocas."
          shield: "Las bayas que almacena en su caparazón con\nforma de vasija se convierten al final en un\nespeso zumo."
        ko:
          sword: "껍질 속에 열매가 비축되어 있다.\n공격받지 않도록 바위 밑에\n틀어박혀 꼼짝하지 않는다."
          shield: "항아리 같은 등껍질 속에\n모은 나무열매는 어느샌가\n걸쭉한 주스로 변한다."
        zh_simp:
          sword: "甲壳里储存着树果。\n为了避免受到袭击，\n它会一动不动地躲在岩石下面。"
          shield: "储存在壶形甲壳里的\n树果会在不知不觉间\n变成黏糊糊的果汁。"
        zh_trad:
          sword: "甲殼裡儲存著樹果。\n為了避免受到襲擊，\n會一動不動地躲在岩石下面。"
          shield: "儲存在壺形甲殼裡的\n樹果會在不知不覺間\n變成黏糊糊的果汁。"
heracross:
