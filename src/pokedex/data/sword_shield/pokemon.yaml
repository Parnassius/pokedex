        special_defense: 3
        speed: 0
      types:
        - dark
        - flying
      egg_groups:
        - undiscovered
      abilities:
        - berserk
      descriptions:
        jp_kana:
          sword: "れっかのごとき　じゃあくな　オーラに\nあてられると　せいこんが　つきはて\nまっしろに　もえつきて　しまうのだ。"
          shield: "じゃあくな　オーラを　ほのおのように\nもえあがらせる　その　すがたから\nファイヤーと　なづけられた。"
        jp_kanji:
          sword: "烈火のごとき　邪悪な　オーラに\n当てられると　精魂が　尽き果て\n真っ白に　燃えつきて　しまうのだ。"
          shield: "邪悪な　オーラを　炎のように\n燃え上がらせる　その　姿から\nファイヤーと　名づけられた。"
        en:
          sword: "This Pokémon’s sinister, flame-like aura will\nconsume the spirit of any creature it hits. Victims\nbecome burned-out shadows of themselves."
          shield: "The sinister aura that blazes like molten fire\naround this Pokémon is what inspired the\nname Moltres."
        fr:
          sword: "Son aura maléfique semblable à un brasier peut\nconsumer intégralement l’âme de quiconque en\nest la cible."
          shield: "Sulfura est le nom qui a été choisi pour\nce Pokémon dont l’aura maléfique brûle\nintensément."
        it:
          sword: "Chi viene in contatto con la sua aura maligna,\nsimile a fuoco ardente, perde ogni energia vitale,\nsbiancando."
          shield: "È conosciuto con il nome di Moltres.\nÈ avvolto da un’aura maligna che arde\ncome il fuoco."
        de:
          sword: "Seine lodernde, böse Aura verschlingt die Seele\nderjenigen, mit denen sie in Berührung kommt,\nund lässt sie vollkommen ausgebrannt zurück."
          shield: "Dieses als Lavados bekannte Pokémon ist von\neiner boshaften Aura umgeben, die wie Flammen\nauflodert."
        es:
          sword: "Su aura maligna con aspecto de llama ardiente\npuede calcinar el alma de quien la toca."
          shield: "Este Pokémon legendario emite un aura maligna\nque le rodea el cuerpo y que arde cual llama."
        ko:
          sword: "열화와 같은 사악한 오라에 닿으면\n기진맥진하게 되고 이윽고\n새하얗게 타버린다고 한다."
          shield: "사악한 오라를 불꽃처럼\n타오르게 하는 그 모습을 보고\n파이어라고 부르게 되었다."
        zh_simp:
          sword: "如果有谁接触到了它那\n如烈火般邪恶的气场，便会\n灵魂枯竭，烧得只剩白色灰烬。"
          shield: "能像燃起烈火一般燃起\n邪恶的气场。因为这样的\n外表而被命名为火焰鸟。"
        zh_trad:
          sword: "如果被牠烈火般的邪惡\n氣場掃到，就會精疲力竭，\n鬥志燒盡只剩下雪白的灰。"
          shield: "釋放著像火焰般燃起的\n邪惡氣場。這樣的外觀\n讓牠得到了火焰鳥之名。"
