        jp_kana:
          sword: "はねるように　てきに　ちかづくと\nどくのツメで　えぐるように　うつ！\nかすりキズでも　あいては　ＫＯだ。"
          shield: "えものを　しとめると　ゲロゲロと\nしょうりの　おたけびを　あげる。\nガマゲロゲと　しゅとして　ちかい。"
        jp_kanji:
          sword: "跳ねるように　敵に　近づくと\n毒のツメで　えぐるように　打つ！\nかすり傷でも　相手は　ＫＯだ。"
          shield: "獲物を　しとめると　ゲロゲロと\n勝利の　雄叫びを　あげる。\nガマゲロゲと　種として　近い。"
        en:
          sword: "It bounces toward opponents and gouges them\nwith poisonous claws. No more than a scratch\nis needed to knock out its adversaries."
          shield: "It booms out a victory croak when its prey\ngoes down in defeat. This Pokémon and\nSeismitoad are related species."
        fr:
          sword: "Il bondit sur ses adversaires pour les transpercer\navec ses griffes empoisonnées. Une simple\négratignure suffit à les mettre K.O."
          shield: "Il lance un coassement viril de victoire\nquand il parvient à terrasser sa proie.\nIl s’apparente aux Crapustule."
        it:
          sword: "Si avvicina a balzi al nemico e lo colpisce\ncon i suoi artigli avvelenati. Basta un graffio\nper mandare KO l’avversario."
          shield: "Quando abbatte la preda, lancia un alto gracidio\ndi vittoria. Come specie è affine ai Seismitoad."
        de:
          sword: "Es nähert sich springend seinem Gegner und\nbohrt seine giftigen Klauen in ihn hinein. Schon\nein kleiner Kratzer lässt den Gegner K.O. gehen."
          shield: "Wenn es seine Beute erlegt, quakt es seinen\nTriumph in die Welt hinaus. Es ist artverwandt\nmit Branawarz."
        es:
          sword: "Se abalanza sobre el rival y lo destroza con sus\ngarras venenosas. Basta un rasguño para debilitar\nal adversario."
          shield: "Cuando abate una presa, emite un croar de\nvictoria a pleno pulmón. Está emparentado con\nlos Seismitoad."
        ko:
          sword: "튀어 오르듯 상대에게 다가간 뒤\n독손톱으로 찌르듯이 공격한다!\n스치기만 해도 상대는 KO다."
          shield: "사냥감을 처리하면 개굴개굴하며\n승리를 자축하는 소리를 높인다.\n두빅굴과 가까운 종이다."
        zh_simp:
          sword: "一跃而起接近敌人，\n用有毒的爪子狠抓对方！\n光是擦伤就能将对手ＫＯ。"
          shield: "制服了猎物之后，\n便会呱呱地发出胜利的欢呼。\n与蟾蜍王是相近的物种。"
        zh_trad:
          sword: "一躍而起接近敵人，\n用有毒的爪子狠抓對方！\n光是擦傷就能將對手ＫＯ。"
          shield: "制服了獵物之後，\n便會呱呱地發出勝利的歡呼。\n與蟾蜍王是相近的物種。"
mantyke:
