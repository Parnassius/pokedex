        rare: moomoo_milk
      descriptions:
        jp_kana:
          sword: "えいよう　まんてんの　ミルクを　だす\nことから　ふるくから　にんげんと\nポケモンの　くらしを　ささえてきた。"
          shield: "まいにち　ミルクを　しぼらないと\nぐあいが　わるくなる。　ミルクの\nあじは　きせつに　よって　かわるぞ。"
        jp_kanji:
          sword: "栄養満点の　ミルクを　出すことから\n古くから　人間と　ポケモンの\n暮らしを　支えてきた。"
          shield: "毎日　ミルクを　搾らないと\n具合が　悪くなる。　ミルクの　味は\n季節によって　変わるぞ。"
        en:
          sword: "Miltank produces highly nutritious milk, so it’s\nbeen supporting the lives of people and other\nPokémon since ancient times."
          shield: "This Pokémon needs to be milked every day,\nor else it will fall ill. The flavor of Miltank milk\nchanges with the seasons."
        fr:
          sword: "Grâce à son lait très nutritif, Écrémeuh contribue\ndepuis longtemps au bien-être des humains\net des Pokémon."
          shield: "Sa santé décline si on ne le trait pas tous les jours.\nLe goût de son lait varie selon la saison."
        it:
          sword: "Il suo latte altamente nutriente contribuisce\nal sostentamento di persone e Pokémon\nda tempo immemore."
          shield: "Se non viene munto ogni giorno, la sua salute\nne risente. Il sapore del suo latte può variare\nin base alla stagione."
        de:
          sword: "Dank seiner äußerst nährstoffreichen Milch trägt\nMiltank seit langer Zeit zum Wohl von Menschen\nund Pokémon bei."
          shield: "Miltanks Gesundheit leidet darunter, wenn es\nnicht jeden Tag gemolken wird. Der Geschmack\nseiner Milch ändert sich je nach Jahreszeit."
        es:
          sword: "Debido a la nutritiva leche que produce, ha\ncontribuido al bienestar de humanos y Pokémon\ndesde tiempos inmemoriales."
          shield: "Si no se ordeña a Miltank a diario, enferma. El\nsabor de la leche que produce cambia según la\népoca del año."
        ko:
          sword: "영양 만점의 우유를 만들어내서\n옛날부터 사람과 포켓몬의\n삶을 지탱해왔다."
          shield: "매일 우유를 짜지 않으면\n컨디션이 나빠진다. 우유의\n맛은 계절에 따라 다르다."
        zh_simp:
          sword: "能挤出营养十足的鲜奶，\n因此从很久以前开始就一直\n支持着人类和宝可梦的生活。"
          shield: "如果不每天帮它挤鲜奶，\n它的身体就会不舒服。\n鲜奶的味道会随季节改变。"
        zh_trad:
          sword: "由於能生產營養滿分的\n鮮奶，自古以來支持著\n人類與寶可夢的生活。"
          shield: "如果沒有每天擠鮮奶，\n身體的狀況就會變糟。\n鮮奶的風味會隨季節改變。"
