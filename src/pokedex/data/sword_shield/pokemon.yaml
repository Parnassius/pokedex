          sword: "こどもだが　６ぽんの　しっぽが\nうつくしい。　せいちょうすると\nさらに　しっぽが　ふえる。"
          shield: "６ぽんの　しっぽは　そだつごとに\nけなみが　よくなり　うつくしくなる。\nだきしめると　ほんのり　あたたかい。"
        jp_kanji:
          sword: "子どもだが　６本の　しっぽが\n美しい。　成長すると　さらに\nしっぽが　増える。"
          shield: "６本の　しっぽは　育つごとに\n毛並みが　良くなり　美しくなる。\n抱きしめると　ほんのり　温かい。"
        en:
          sword: "While young, it has six gorgeous tails. When it\ngrows, several new tails are sprouted."
          shield: "As each tail grows, its fur becomes more lustrous.\nWhen held, it feels slightly warm."
        fr:
          sword: "Quand il est jeune, ce Pokémon a six queues\nmagnifiques. De nouvelles queues apparaissent\ntout au long de sa croissance."
          shield: "Avec l’âge, la fourrure de ses six queues devient\nde plus en plus belle et soyeuse.\nElle est chaude au toucher."
        it:
          sword: "Quando è giovane ha sei meravigliose code,\nche si moltiplicano durante la sua crescita."
          shield: "Man mano che cresce, le sue sei code diventano\nsempre più belle. La pelliccia di cui sono\nricoperte è calda al tatto."
        de:
          sword: "In seiner Jugend hat es sechs hinreißende\nSchweife. Während es wächst, kommen noch\nweitere neue Schweife hinzu."
          shield: "Sein Fell wird geschmeidiger, wenn seine sechs\nSchweife wachsen. Wenn man das Fell berührt,\nfühlt es sich leicht warm an."
        es:
          sword: "De pequeño, tiene seis colas de gran belleza.\nA medida que crece, le van saliendo más."
          shield: "Su pelaje se va volviendo más suave, lustroso\ny bello a medida que le crecen las seis colas.\nAl abrazarlo, emana una ligera calidez."
        ko:
          sword: "어리지만 6개의 꼬리가\n아름답다. 성장하면\n한층 꼬리 수가 늘어난다."
          shield: "6개의 꼬리는 자라면서\n털의 결이 좋아지며 아름다워진다.\n안으면 살짝 따듯하다."
        zh_simp:
          sword: "虽然还是幼崽，\n却有着６根美丽的尾巴。\n长大后，尾巴会变得更多。"
          shield: "随着身体的成长，\n６根尾巴的毛发也会变得更漂亮。\n紧紧抱着它时能感到微微的温暖。"
        zh_trad:
          sword: "雖然還是孩子，\n但已擁有美麗的６根尾巴。\n長大後尾巴會變得更多。"
          shield: "隨著身體的成長，\n６根尾巴的毛髮也會變得更漂亮。\n緊緊抱著牠時能感到微微的溫暖。"
    vulpix_alolan_form:
      form_id: 1
      names:
        jp_kana: アローラのすがた
        jp_kanji: アローラのすがた
        en: Alolan Form
        fr: Forme d’Alola
        it: Forma di Alola
        de: Alola-Form
        es: Forma de Alola
        ko: 알로라의 모습
        zh_simp: 阿罗拉的样子
        zh_trad: 阿羅拉的樣子
      base_stats:
