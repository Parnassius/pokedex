        special_defense: 0
        speed: 1
      types:
        - electric
        - flying
      egg_groups:
        - amorphous
      abilities:
        - levitate
      descriptions:
        jp_kana:
          sword: "だいじな　しょるいを　ふきとばす。\nかぜに　まかせた　わるさを\nたのしむ　ロトムの　すがた。"
          shield: "とくしゅな　モーターで　うごく\nせんぷうきに　はいっている。\nとっぷうで　てきを　ふきとばす。"
        jp_kanji:
          sword: "大事な　書類を　吹きとばす\n風に　まかせた　悪さを\n楽しむ　ロトムの　姿。"
          shield: "特殊な　モーターで　動く\n扇風機に　入っている。\n突風で　敵を　吹きとばす。"
        en:
          sword: "In this form, Rotom applies its new power over\nwind to its love of pranks. It will happily blow\naway any important documents it can find."
          shield: "This Rotom has taken over a fan that has\na special motor. Its gusts of wind blow its\nopponents away!"
        fr:
          sword: "Sous cette forme, Motisma adore utiliser le vent\npour faire des bêtises, comme éparpiller les piles\nde documents importants."
          shield: "Il a pris possession d’un ventilateur muni\nd’un moteur spécial. Il crée des bourrasques\npour balayer ses ennemis."
        it:
          sword: "Sotto questa forma si diverte a sparpagliare\ni documenti importanti o combina qualche\naltra malefatta usando il vento."
          shield: "È entrato in un ventilatore azionato da un motore\nspeciale. Scatena raffiche di vento con cui spazza\nvia i nemici."
        de:
          sword: "Diese Form von Rotom liebt es, mit Wind für\nChaos zu sorgen. Mit Windstößen bringt es\nwichtige Dokumente durcheinander."
          shield: "Es ist in einen Ventilator eingedrungen, der von\neinem besonderen Motor betrieben wird. Seine\nFeinde pustet es mit stürmischen Böen um."
        es:
          sword: "Asume esta forma cuando quiere usar el viento\npara hacer fechorías tales como esparcir por\ndoquier montañas de documentos importantes."
          shield: "Ha tomado posesión de un ventilador que\nfunciona con un motor especial. Lanza a sus\nrivales volando con fuertes ráfagas de aire."
        ko:
          sword: "중요한 서류를 날려버린다.\n바람을 이용해서 장난을\n즐기는 로토무의 모습."
          shield: "특수한 모터로 움직이는\n선풍기에 들어가 있다.\n돌풍으로 적을 날려버린다."
        zh_simp:
          sword: "会吹飞你重要的资料。\n喜欢利用刮风来\n恶作剧的洛托姆。"
          shield: "钻进由特殊马达驱动的\n电风扇里的洛托姆。\n会制造强风来吹飞敌人。"
        zh_trad:
          sword: "會吹走重要的資料。\n喜歡利用颳風來\n惡作劇的洛托姆。"
          shield: "鑽進由特殊馬達驅動的\n電風扇裡的洛托姆。\n會製造強風來吹飛敵人。"
    rotom_mow:
      form_id: 5
      names:
        jp_kana: カットロトム
        jp_kanji: カットロトム
        en: Mow Rotom
        fr: Motisma Tonte
        it: Rotom Taglio
        de: Schneid-Rotom
        es: Rotom Corte
        ko: 커트로토무
        zh_simp: 切割洛托姆
        zh_trad: 切割洛托姆
      base_stats:
        hp: 50
        attack: 65
        defense: 107
        special_attack: 105
        special_defense: 107
