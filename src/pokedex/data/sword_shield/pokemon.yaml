          sword: "１まんねんまえの　へきがにも\nえがかれている。　ぜつめつしたと\nかんがえられていた　じきもある。"
          shield: "みためどおりの　ちからもち。\nこおりのキバは　さむくなるほど\nふとく　ながく　りっぱに　なる。"
        jp_kanji:
          sword: "１万年前の　壁画にも\n描かれている。　絶滅したと\n考えられていた　時期もある。"
          shield: "見た目どおりの　力持ち。\n氷の牙は　寒くなるほど\n太く　長く　立派に　なる。"
        en:
          sword: "This Pokémon can be spotted in wall paintings\nfrom as far back as 10,000 years ago. For a\nwhile, it was thought to have gone extinct."
          shield: "It looks strong, and that’s exactly what it is.\nAs the weather grows colder, its ice tusks\ngrow longer, thicker, and more impressive."
        fr:
          sword: "On le retrouve dessiné sur des fresques murales\nvieilles de 10 000 ans. On a cru pendant un temps\nque son espèce s’était éteinte."
          shield: "Comme son physique le laisse deviner, il est très\nfort. La taille de ses défenses de glace augmente\nà mesure que la température baisse."
        it:
          sword: "Si trova raffigurato nelle pitture rupestri\ndi 10.000 anni fa. Per un periodo si riteneva\nche fosse estinto."
          shield: "È forte, proprio come il suo aspetto lascia\nintendere. Più freddo fa, più spesse e lunghe\ndiventano le sue zanne di ghiaccio."
        de:
          sword: "Sie sind schon auf 10 000 Jahre alten\nWandmalereien abgebildet. Es gab Zeiten,\nin denen man sie für ausgestorben hielt."
          shield: "Es ist so stark, wie es aussieht. Je kälter es ist,\ndesto dicker, länger und beeindruckender werden\nseine Stoßzähne aus Eis."
        es:
          sword: "Aparece representado en pinturas rupestres de\nhace 10 000 años. Hubo un tiempo en el que se\nlo consideró extinto."
          shield: "Es tan fuerte como parece. Cuanto más frío hace,\nmás gruesos, largos e imponentes se vuelven sus\ncolmillos de hielo."
        ko:
          sword: "1만 년 전의 벽화에도\n그려져 있다. 멸종되었다고\n여겨지던 시기도 있었다."
          shield: "생긴 것처럼 힘이 장사다.\n얼음으로 된 엄니는 추울수록\n굵고 길어지면서 늠름해진다."
        zh_simp:
          sword: "在1万年前的壁画上也能见到\n它的身影。曾有一段时期，\n人们认为它已经灭绝了。"
          shield: "它的力量就如外表那样强大。\n天气越是寒冷，它的冰牙\n就会长得越粗、越长、越结实。"
        zh_trad:
          sword: "在１萬年前的壁畫上也能見到\n牠的身影。曾有一段時期，\n人們認為牠已經滅絕了。"
          shield: "牠的力量就如外表那樣強大。\n天氣越是寒冷，牠的冰牙\n就會長得越粗、越長、越結實。"
