          sword: "Walrein form herds of 20 to 30 individuals.\nWhen a threat appears, the herd’s leader will\nprotect the group with its life."
          shield: "Walrein’s tusks keep growing throughout its life.\nTusks broken in battle will grow back to their\nusual impressive size in a year."
        fr:
          sword: "Ils vivent en groupes de 20 à 30 individus.\nSi un ennemi les attaque, le chef s’interpose\npour tous les protéger, au péril de sa vie."
          shield: "Ses défenses poussent tout au long de sa vie.\nSi l’une d’elles se brise au cours d’un combat,\nau bout d’un an, elle aura repoussé entièrement."
        it:
          sword: "Vive in branchi di 20-30 esemplari. In caso\ndi attacco nemico, il capo protegge il gruppo\na costo della vita."
          shield: "Le sue zanne continuano a crescere per tutta la\nvita. Se si spezzano mentre lotta, tornano\nforti e robuste nell’arco di un anno."
        de:
          sword: "Es bildet mit 20 bis 30 Artgenossen eine Herde.\nWird diese angegriffen, verteidigt der Anführer\nsie unter Einsatz seines Lebens."
          shield: "Die Stoßzähne wachsen sein Leben lang. Selbst,\nwenn sie im Kampf abbrechen, erreichen sie nach\nnur einem Jahr wieder ihre alte imposante Größe."
        es:
          sword: "Forman manadas de unos 20 o 30 individuos. Si\nel grupo se ve atacado por un enemigo, el líder\nse interpondrá para proteger al resto."
          shield: "Sus colmillos nunca dejan de crecer. Aunque los\npierda en un combate, al cabo de un año ya los\nhabrá regenerado por completo."
        ko:
          sword: "2, 30마리가 무리를 이룬다.\n적에게 공격받으면 리더는\n몸을 던져서 무리를 지킨다."
          shield: "이빨은 평생 자란다.\n싸우다 부러져도 1년이 지나면\n원래의 훌륭한 이빨로 복원된다."
        zh_simp:
          sword: "２、３０只一起群居。\n受到敌人袭击时，\n首领会拼命保护族群。"
          shield: "它的獠牙一生都会持续生长。\n即使在战斗中被折断也能逐渐恢复，\n只需要１年的时间便能完好如初。"
        zh_trad:
          sword: "會由２、３０隻群居生活。\n受到敵人攻擊時，首領會\n奮不顧身地保護群體。"
          shield: "獠牙會一輩子不停地成長。\n即使在戰鬥中折斷，也只需要\n１年的時間就又能長得巨大如初。"
relicanth:
  species_id: 369
  names:
    jp_kana: ジーランス
    jp_kanji: ジーランス
