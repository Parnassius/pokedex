          shield: "はなから　つくられる　せいゆは\nごくじょうの　かおりが　するが\nめが　とびでるほど　こうかだ。"
        jp_kanji:
          sword: "一流の　園芸家でも\n頭の　花を　咲かせるのは\n至難の業と　言われている。"
          shield: "花から　作られる　精油は\n極上の　香りが　するが\n目が　飛び出るほど　高価だ。"
        en:
          sword: "It’s believed that even first-rate gardeners have a\nhard time getting the flower on a Lilligant’s head\nto bloom."
          shield: "Essential oils made from Lilligant flowers\nhave a sublime scent, but they’re also\nstaggeringly expensive."
        fr:
          sword: "On raconte que même les meilleurs horticulteurs\nont énormément de mal à faire éclore sa fleur."
          shield: "L’huile essentielle extraite de sa fleur dégage\nun parfum exceptionnel, mais elle coûte\nextrêmement cher."
        it:
          sword: "Si dice che riuscire a far sbocciare il fiore sulla\nsua testa sia un’impresa ardua anche per\ni floricoltori più esperti."
          shield: "L’olio essenziale che si ottiene dal fiore ha un\nprofumo sublime, ma costa un occhio della testa."
        de:
          sword: "Man sagt, dass selbst erstklassige Gärtner\nSchwierigkeiten damit haben, die Blume auf\nDressellas Kopf zum Blühen zu bringen."
          shield: "Das aus seiner Blume gewonnene ätherische Öl\nverströmt den allerfeinsten Duft, doch es kostet\nein Vermögen."
        es:
          sword: "Se dice que conseguir que la flor de su cabeza\nflorezca es una empresa titánica incluso para los\nmejores jardineros."
          shield: "El aceite esencial que se extrae de su flor emana\nun aroma sublime, aunque su precio resulta\ndesorbitado."
        ko:
          sword: "일류 원예가라 하더라도\n머리의 꽃을 피우는 일은\n매우 어렵다고 전해진다."
          shield: "꽃으로 만든 정유는\n최고의 향을 내지만\n눈이 튀어나올 정도로 비싸다."
        zh_simp:
          sword: "据说即使对一流的园艺家\n来说，让它头上的花朵绽放\n也是一件极其困难的事。"
          shield: "用它的花朵制成的精油\n虽有着极致香气，但价格\n同时也贵得令人大跌眼镜。"
        zh_trad:
          sword: "據說即使是一流的園藝家，\n要讓牠的頭上綻放美麗花朵\n也是極為困難的事。"
          shield: "由牠的花朵提煉的精油有著\n極致的香氣，但價格同時也\n是貴得令人眼睛幾乎要掉出來。"
basculin:
  species_id: 550
  names:
    jp_kana: バスラオ
    jp_kanji: バスラオ
    en: Basculin
    fr: Bargantua
    it: Basculin
    de: Barschuft
    es: Basculin
    ko: 배쓰나이
    zh_simp: 野蛮鲈鱼
    zh_trad: 野蠻鱸魚
  forms:
    basculin_red_striped_form:
      form_id: 0
      names:
        jp_kana: あかすじのすがた
        jp_kanji: あかすじのすがた
        en: Red-Striped Form
        fr: Motif Rouge
        it: Forma Linearossa
        de: Rotlinige Form
        es: Forma Raya Roja
        ko: 적색근의 모습
        zh_simp: 红条纹的样子
        zh_trad: 紅條紋的樣子
      base_stats:
