      hidden_ability: sand_force
      descriptions:
        jp_kana:
          sword: "エサを　もとめて　りくにも　あがる。\nトリトドンが　はったあとには\nネバネバの　ねんえきが　のこる。"
          shield: "グニャグニャの　からだ　だけれど\nかなり　タフ。　やわらかさが\nしょうげきを　ぶんさんするのだ。"
        jp_kanji:
          sword: "エサを　求めて　陸にも　上がる。\nトリトドンが　這った跡には\nネバネバの　粘液が　残る。"
          shield: "グニャグニャの　体　だけれど\nかなり　タフ。　軟らかさが\n衝撃を　分散するのだ。"
        en:
          sword: "Its search for food sometimes leads it onto land,\nwhere it leaves behind a sticky trail of slime as it\npasses through."
          shield: "The softness of its body helps disperse the force\nof impacts, so although its body is uncommonly\nsquishy, it’s also surprisingly resilient."
        fr:
          sword: "Il peut rejoindre la terre ferme pour chercher\ndes proies. Il laisse une traînée de bave gluante\nderrière lui."
          shield: "Son corps est caoutchouteux, mais très résistant,\ncar la puissance des chocs qu’il subit se répand\nsur toute sa surface."
        it:
          sword: "Può salire sulla terraferma in cerca di cibo.\nQuando si sposta, lascia dietro di sé una scia\ndi bava appiccicosa."
          shield: "Il suo corpo molliccio è in grado di assorbire\ni colpi, rendendo questo Pokémon molto\nresistente."
        de:
          sword: "Auf der Suche nach Futter kommt es bisweilen\nauch an Land. Wo es entlangkriecht, hinterlässt\nes eine klebrige Schleimspur."
          shield: "Es ist weich, kann aber einiges einstecken, da\nsein biegsamer Körper die Wucht von Schlägen\nabsorbiert."
        es:
          sword: "Puede desplazarse también por tierra firme en\npos de su presa. Deja tras de sí, entonces, el\nrastro de una mucosidad pegajosa."
          shield: "Aunque blando, su cuerpo es tremendamente\nresistente, ya que dispersa cualquier impacto\nque recibe dada su flexibilidad."
        ko:
          sword: "먹이를 찾아 육지에도 올라온다.\n트리토돈이 지나간 자리에는\n끈적끈적한 점액이 남아 있다."
          shield: "흐물흐물한 몸이지만\n제법 튼튼하다. 부드러워서\n충격을 분산시킨다."
        zh_simp:
          sword: "为了觅食也会登上陆地。\n海兔兽经过的地方\n会留下黏糊糊的粘液。"
          shield: "身体软瘫瘫的但十分强韧。\n因为它身体的软度可以\n帮助分散它所受到的冲击。"
        zh_trad:
          sword: "為了覓食也會登上陸地。\n海兔獸經過的地方\n會留下黏糊糊的黏液。"
          shield: "身體軟綿綿的但十分強韌。\n因為牠身體的軟度可以\n幫助牠分散所受到的衝擊。"
    gastrodon_east_sea:
      form_id: 1
      names:
        jp_kana: ひがしのうみ
        jp_kanji: ひがしのうみ
        en: East Sea
        fr: Mer Orient
        it: Mare Est
        de: Östliches Meer
        es: Mar Este
        ko: 동쪽바다
        zh_simp: 东海
        zh_trad: 東海
      base_stats:
        hp: 111
        attack: 83
        defense: 68
        special_attack: 92
        special_defense: 82
