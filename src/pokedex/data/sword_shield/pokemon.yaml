        jp_kana:
          sword: "えいようの　つまった　たまは\nとりポケモンの　だいこうぶつ。\nついばまれないよう　にげまわる。"
          shield: "からだが　あかい　チェリンボほど\nえいようが　おおく　たまの　あじも\nあまくて　おいしいよ。"
        jp_kanji:
          sword: "栄養の　詰まった　玉は\n鳥ポケモンの　大好物。\nついばまれないよう　逃げまわる。"
          shield: "体が　赤い　チェリンボほど\n栄養が　多く　玉の　味も\n甘くて　おいしいよ。"
        en:
          sword: "It nimbly dashes about to avoid getting pecked\nby bird Pokémon that would love to make off\nwith its small, nutrient-rich storage ball."
          shield: "The deeper a Cherubi’s red, the more nutrients it\nhas stockpiled in its body. And the sweeter and\ntastier its small ball!"
        fr:
          sword: "Il s’enfuit à la vue des Pokémon oiseaux,\ndont le mets favori est sa petite boule remplie\nde nutriments."
          shield: "Plus son corps est rouge, plus la saveur\nde sa petite boule gorgée de nutriments\nest sucrée et délicieuse."
        it:
          sword: "Fugge dai Pokémon alati, ghiotti della\nsua pallina ricca di sostanze nutritive."
          shield: "Più è rosso, più è ricco di sostanze nutritive\ne più la sua pallina si fa dolce e gustosa."
        de:
          sword: "Sein nährstoffreiches Bällchen erfreut sich bei\nVogel-Pokémon großer Beliebtheit. Es ist ständig\nauf der Flucht, damit es nicht gefressen wird."
          shield: "Je stärker die Rotfärbung seines Körpers ist,\ndesto mehr Nährstoffe stecken in ihm und umso\nsüßer und besser schmeckt sein Bällchen."
        es:
          sword: "Se ve obligado a huir constantemente de los\nPokémon pájaro, pues su pequeña esfera repleta\nde nutrientes es su manjar predilecto."
          shield: "Cuanto más rojo sea su cuerpo, más dulce y\ndeliciosa será su pequeña esfera repleta de\nnutrientes."
        ko:
          sword: "영양이 듬뿍 담긴 구슬을\n새포켓몬들이 아주 좋아한다.\n쪼이지 않기 위해 도망 다닌다."
          shield: "몸이 빨간 체리버일수록\n영양이 많고 구슬의 맛도\n달고 맛있다."
        zh_simp:
          sword: "它营养丰富的小球\n是鸟宝可梦的最爱。\n为了不被啄到而四处逃跑。"
          shield: "身体越红的樱花宝\n含有的营养越丰富，\n味道也很甜很好吃。"
        zh_trad:
          sword: "牠營養豐富的小球\n是鳥寶可夢的最愛。\n為了不被啄到而四處逃跑。"
          shield: "身體越紅的櫻花寶\n含有的營養越豐富，\n味道也很甜很好吃。"
