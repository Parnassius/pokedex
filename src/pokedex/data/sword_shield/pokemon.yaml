      types:
        - dark
        - normal
      egg_groups:
        - field
      abilities:
        - pickup
        - gluttony
      hidden_ability: quick_feet
      descriptions:
        jp_kana:
          sword: "おちつきなく　はしりまわっている。\nほかの　ポケモンを　みつけると\nわざと　ぶつかって　ケンカを　うる。"
          shield: "このすがたが　いちばん　ふるい\nジグザグマの　すがた　らしい。\nジグザグうごいて　あたりを　あらす。"
        jp_kanji:
          sword: "落ち着きなく　走りまわっている。\nほかの　ポケモンを　見つけると\nわざと　ぶつかって　ケンカを　売る。"
          shield: "この姿が　いちばん　古い\nジグザグマの　姿　らしい。\nジグザグ動いて　あたりを　荒らす。"
        en:
          sword: "Its restlessness has it constantly running around.\nIf it sees another Pokémon, it will purposely run\ninto them in order to start a fight."
          shield: "Thought to be the oldest form of Zigzagoon,\nit moves in zigzags and wreaks havoc upon\nits surroundings."
        fr:
          sword: "Il court partout sans s’arrêter. Quand il rencontre\nun autre Pokémon, il fait exprès de lui rentrer\ndedans pour le provoquer."
          shield: "C’est l’apparence originelle de Zigzaton,\net donc la plus ancienne.\nIl sème le désordre en courant partout en zigzag."
        it:
          sword: "Corre qua e là senza sosta. Quando trova un\naltro Pokémon, gli va addosso di proposito per\nattaccare briga."
          shield: "Pare che questa sia la forma originaria\ndi Zigzagoon. Si muove a zig zag mettendo\na soqquadro tutto ciò che lo circonda."
        de:
          sword: "Es tollt rastlos umher. Begegnet es einem anderen\nPokémon, rempelt es dieses absichtlich an, um\neinen Streit anzuzetteln."
          shield: "Es hinterlässt überall ein riesiges Chaos, indem es\nsich im Zickzack bewegt. Hierbei handelt es sich\noffenbar um die älteste Form von Zigzachs."
        es:
          sword: "Corretea por doquier sin descanso. En cuanto\nve a otro Pokémon, se lanza contra él para\nprovocarlo y buscar pelea."
          shield: "Parece ser que esta es la forma primitiva de\nZigzagoon. Arma un alboroto tremendo a su\nalrededor cuando se mueve en zigzag."
        ko:
          sword: "정신없이 뛰어다닌다.\n다른 포켓몬을 발견하면\n일부러 부딪혀서 싸움을 건다."
          shield: "이 모습이 가장 오래된 지그제구리의\n모습인 듯하다. 지그재그로 움직이며\n주변을 엉망으로 만든다."
        zh_simp:
          sword: "一直在奔跑，永远静不下来。\n如果发现了其他的宝可梦，\n就会故意撞上去挑起事端。"
          shield: "这似乎是蛇纹熊最古老\n的样子。会之字形乱走，\n把周围弄得一团糟。"
        zh_trad:
          sword: "一直在奔跑，永遠靜不下來。\n如果發現了其他的寶可夢，\n就會故意撞上去挑起事端。"
          shield: "這似乎是蛇紋熊最古老\n的樣子。會之字形亂走，\n把周圍弄得一團糟。"
