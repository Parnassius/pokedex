        en:
          sword: "Watch your step when wandering areas oceans\nonce covered. What looks like a stone could be\nthis Pokémon, and it will curse you if you kick it."
          shield: "Sudden climate change wiped out this ancient\nkind of Corsola. This Pokémon absorbs others’\nlife-force through its branches."
        fr:
          sword: "Ce Pokémon est commun dans les lieux qui étaient\njadis submergés. Il maudit quiconque le prend\npour un caillou et le pousse du pied."
          shield: "Il s’agit d’un Corayon mort il y a longtemps à\ncause d’un changement brutal de l’environnement.\nIl vole l’essence vitale des gens avec ses branches."
        it:
          sword: "Spesso giace a terra in luoghi che in passato\nerano fondali oceanici. Se qualcuno lo calcia\nscambiandolo per un ciottolo, viene maledetto."
          shield: "È un antico Corsola morto a causa di repentini\ncambiamenti climatici. Risucchia la forza vitale\ndegli esseri umani attraverso i suoi rametti."
        de:
          sword: "Man findet es oft an Orten, die vor langer Zeit\nvom Meer bedeckt waren. Wer es mit einem\nStein verwechselt und herumkickt, wird verflucht."
          shield: "Es entstand aus einem Corasonn, das durch\nplötzliche Änderungen in seinem Habitat umkam.\nMit den Armen raubt es Leuten Lebensenergie."
        es:
          sword: "Es habitual hallarlos en lo que antaño fueron\nlechos oceánicos. Maldice a aquellos que le dan\nun puntapié confundiéndolo con un pedrusco."
          shield: "Perdió la vida hace miles de años debido a un\nrepentino cambio en su hábitat. Absorbe la\nvitalidad de la gente con sus ramas."
        ko:
          sword: "먼 옛날에 바다였던 곳에\n흔하게 굴러다닌다. 돌멩이로\n착각해서 걷어차면 화를 입는다."
          shield: "갑작스러운 환경 변화로\n죽은 태고의 코산호.\n가지로 사람의 생기를 빨아들인다."
        zh_simp:
          sword: "常出现在从前曾是大海的地方。\n如果不小心错把它当成石头踢，\n就会遭到它的诅咒。"
          shield: "它是因急遽环境变化\n而死去的远古太阳珊瑚。\n会用珊瑚枝吸取人的精气。"
        zh_trad:
          sword: "常出現在從前曾是大海的地方。\n如果不小心錯把牠當成石頭踢，\n就會遭到牠的詛咒。"
          shield: "牠是因急遽環境變化\n而死去的遠古太陽珊瑚。\n會用珊瑚枝吸取人的精氣。"
remoraid:
