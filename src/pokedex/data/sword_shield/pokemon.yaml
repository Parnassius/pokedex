          sword: "さばくに　つくられた　すあなは\nすりばちの　かたちを　しているので\nおちてしまうと　だっしゅつふかのう。"
          shield: "ぜったいに　だっしゅつ　ふかのうな\nすりばちじょうの　すあなを　つくって\nえものが　おちてくるのを　まつ。"
        jp_kanji:
          sword: "砂漠に　つくられた　巣穴は\nすり鉢の　形を　しているので\n落ちてしまうと　脱出不可能。"
          shield: "絶対に　脱出　不可能な\nすり鉢状の　巣穴を　つくって\n獲物が　落ちてくるのを　待つ。"
        en:
          sword: "Its nest is a sloped, bowl-like pit in the desert.\nOnce something has fallen in, there is no escape."
          shield: "It makes an inescapable conical pit and lies in\nwait at the bottom for prey to come\ntumbling down."
        fr:
          sword: "Il est impossible de s’échapper de son antre\nen forme de cône qu’il creuse dans le sable\ndu désert."
          shield: "Il creuse, puis attend ses proies dans son antre\nen forme de cône, dont il est impossible\nde s’échapper."
        it:
          sword: "Se si cade in una delle tane a forma di imbuto\nche scava nel deserto, è impossibile sfuggirne."
          shield: "Costruisce una tana a forma di imbuto dalla\nquale non si può scappare, aspettando poi\nche le prede cadano in trappola."
        de:
          sword: "Der Bau, den es sich in der Wüste errichtet, ist\ntrichterförmig. Fällt man einmal hinein, gibt es\nkein Entkommen."
          shield: "Es errichtet einen trichterförmigen Bau, aus dem\nes kein Entrinnen gibt, und wartet, bis Beute\nhineinfällt."
        es:
          sword: "Si una presa cae en las fosas cóncavas de arena\nque cava en el desierto, no podrá salir de ellas."
          shield: "Excava fosas cóncavas, de las cuales resulta\nimposible escapar, y espera a que una presa\ncaiga en su interior."
        ko:
          sword: "사막에 만들어진 둥지는\n깔때기 모양이므로\n떨어지면 탈출할 수 없다."
          shield: "절대 탈출 불가능한\n원뿔형의 둥지를 만들어\n먹이가 떨어지는 것을 기다린다."
        zh_simp:
          sword: "它在沙漠中建造的巢穴\n造型就像是研钵一样。\n一旦掉进去就再也逃不出来了。"
          shield: "建造了绝对无法逃脱的\n捣蒜钵状巢穴，并在巢穴里\n等着猎物自己掉进来。"
        zh_trad:
          sword: "牠在沙漠中建造的巢穴\n造型就像是研缽一樣。\n一旦掉進去就再也逃不出來了。"
          shield: "會建造絕對無法逃脫的\n缽狀巢穴，並在巢穴裡\n等著獵物自己掉進來。"
