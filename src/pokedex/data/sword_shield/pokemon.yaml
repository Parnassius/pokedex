      descriptions:
        jp_kana:
          sword: "すなに　からだを　うずめ　じっと\nえものを　まちつづけている。\nヤクデと　そせんが　ちかい。"
          shield: "どくのある　しっぽの　ツメで\nおそいかかる。　はさまれると\nどくが　しみて　うごけなくなる。"
        jp_kanji:
          sword: "砂に　体を　埋め　じっと\n獲物を　待ち続けている。\nヤクデと　祖先が　近い。"
          shield: "毒のある　しっぽの　ツメで\n襲いかかる。　挟まれると\n毒が　染みて　動けなくなる。"
        en:
          sword: "After burrowing into the sand, it waits patiently\nfor prey to come near. This Pokémon and\nSizzlipede share common descent."
          shield: "It attacks using the claws on its tail. Once locked\nin its grip, its prey is unable to move as this\nPokémon’s poison seeps in."
        fr:
          sword: "Il s’enfouit dans le sable et attend patiemment\nses proies. Il a des ancêtres en commun\navec Grillepattes."
          shield: "Il attaque avec les pinces empoisonnées\nde sa queue. Le venin se répand alors\ndans le corps de la victime et la paralyse."
        it:
          sword: "Si nasconde nella sabbia e aspetta immobile\nla preda. Lui e Sizzlipede hanno antenati\nin comune."
          shield: "Attacca la preda afferrandola con gli artigli\nvelenosi della coda, poi inietta il veleno per\nimmobilizzarla."
        de:
          sword: "Dieses Pokémon vergräbt sich im Sand und\nlauert dort regungslos seiner Beute auf. Es ist\nartverwandt mit Thermopod."
          shield: "Es schlägt mit den giftigen Krallen an seinem\nSchweif zu. Wer von ihnen gestochen wird,\nbekommt ein lähmendes Gift injiziert."
        es:
          sword: "Se entierra en la arena y aguarda inmóvil a sus\npresas. Sus antepasados están relacionados con\nlos de Sizzlipede."
          shield: "Ataca con las pinzas venenosas de la cola. Tras\nclavarlas, inyecta una toxina que inmoviliza a la\npresa."
        ko:
          sword: "모래에 몸을 파묻은 채\n가만히 먹이를 기다린다.\n태우지네와 조상이 가깝다."
          shield: "독이 있는 꼬리의 발톱으로\n덤벼든다. 집히면 독이 스며들어\n움직일 수 없게 된다."
        zh_simp:
          sword: "将自己的身体埋在沙子里，\n一声不响地等待猎物。\n祖先和烧火蚣的祖先是近亲。"
          shield: "用尾巴上带毒的钩爪袭击对手。\n一旦被夹住，毒素就会扩散开来，\n导致全身无法动弹。"
        zh_trad:
          sword: "將自己的身體埋在沙子裡，\n一聲不響地等待獵物。\n祖先和燒火蚣的祖先是近親。"
          shield: "用尾巴上帶毒的鉤爪襲擊對手。\n一旦被夾住，毒素就會擴散開來，\n導致全身無法動彈。"
