        jp_kana:
          sword: "はしる　ときに　しっぽの　ねもとから\nでんきを　うみだす。　ガラルでは\nぼくようけん　として　にんき。"
          shield: "おやつに　つられて　ひとの　しごとを\nてつだう　くいしんぼう。　パチパチと\nでんきを　まとって　ひたはしる。"
        jp_kanji:
          sword: "走る　ときに　しっぽの　根元から\n電気を　生み出す。　ガラルでは\n牧羊犬として　人気。"
          shield: "おやつに　釣られて　人の　仕事を\n手伝う　食いしん坊。　パチパチと\n電気を　まとって　ひた走る。"
        en:
          sword: "This Pokémon is very popular as a herding dog\nin the Galar region. As it runs, it generates\nelectricity from the base of its tail."
          shield: "This gluttonous Pokémon only assists people with\ntheir work because it wants treats. As it runs,\nit crackles with electricity."
        fr:
          sword: "Lorsqu’il court, on peut voir de l’électricité\nse former à la base de sa queue. Ce Pokémon\nest très populaire auprès des bergers de Galar."
          shield: "Ce glouton assiste les humains dans leur travail\nen échange de friandises. Il court sans arrêt,\nle corps enveloppé d’électricité."
        it:
          sword: "Quando corre produce elettricità dalla base\ndella coda. A Galar è apprezzato soprattutto\nper l’aiuto che fornisce ai pastori nei pascoli."
          shield: "È un golosone e aiuta gli uomini in cambio\ndi ghiottonerie. Corre di qua e di là\nemettendo scintille da tutto il corpo."
        de:
          sword: "Beim Rennen erzeugt es Elektrizität in seinem\nSchwanzansatz. In der Galar-Region erfreut es\nsich bei Hirten großer Beliebtheit."
          shield: "Im Austausch gegen Leckerlis hilft dieser kleine\nVielfraß Menschen bei der Arbeit. Beim Rennen\nwird es von knisternder Elektrizität umhüllt."
        es:
          sword: "Al correr, genera electricidad por la base de la\ncola. Es muy popular entre los pastores de Galar."
          shield: "Son muy glotones, por lo que ayudan a la gente\na cambio de comida. Echan chispas al correr."
        ko:
          sword: "달릴 때 꼬리가 시작되는 부분에서\n전기를 만들어 낸다. 가라르에서는\n양치기로 인기가 많다."
          shield: "간식에 끌려 사람의 일을\n돕는 먹보다. 탁탁 튀는\n전기를 두르고 계속 달린다."
        zh_simp:
          sword: "奔跑的时候会从尾巴的根部\n制造出电能。在伽勒尔\n是很受欢迎的牧羊犬。"
          shield: "因为想要得到零食而\n帮助人类工作的贪吃鬼。\n总是带着电火花跑来跑去。"
        zh_trad:
          sword: "奔跑的時候會從尾巴的根部\n製造出電能。在伽勒爾\n是很受歡迎的牧羊犬。"
          shield: "因為想要得到零食而\n幫助人類工作的貪吃鬼。\n總是帶著電火花跑來跑去。"
boltund:
