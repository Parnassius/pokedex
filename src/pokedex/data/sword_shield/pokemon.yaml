          shield: "なみまに　ただよい　うみの　ようすを\nさぐる。　えものを　はっけんすると\nむれの　トドゼルガに　しらせるのだ。"
        jp_kanji:
          sword: "ぶ厚い　脂肪に　包まれた\n見事に　まんまるな　体。\n歩くより　転がるほうが　速い。"
          shield: "波間に　漂い　海の　様子を　探る。\n獲物を　発見すると\n群れの　トドゼルガに　知らせるのだ。"
        en:
          sword: "This Pokémon’s body is covered in blubber and\nimpressively round. It’s faster for Spheal to roll\naround than walk."
          shield: "As it drifts among the waves, Spheal probes\nthe sea. As soon as it spots prey, it informs the\nWalrein in its herd."
        fr:
          sword: "Grâce à son corps composé d’une épaisse\ncouche de graisse qui lui donne sa forme ronde,\nil se déplace plus vite en roulant qu’en marchant."
          shield: "Il scrute la mer en se laissant porter par\nles vagues. Lorsqu’il repère des proies,\nil avertit les Kaimorse du groupe."
        it:
          sword: "Il suo corpo, avvolto in uno spesso strato\nlipidico, è perfettamente rotondo. Si sposta\npiù velocemente rotolando che camminando."
          shield: "Fluttua tra le onde ispezionando il mare.\nQuando individua una preda, avverte i Walrein\ndel suo gruppo."
        de:
          sword: "Der Körper von Seemops ist kugelrund und von\neiner dicken Speckschicht umgeben. Es kann\nschneller rollen als laufen."
          shield: "Seemops lässt sich von den Wellen treiben, um\ndas Meer zu erkunden. Entdeckt es Beute, setzt\nes die Walraisa seiner Herde davon in Kenntnis."
        es:
          sword: "La gruesa capa de grasa bajo la piel le confiere\nuna forma perfectamente esférica. Se desplaza\nmás rápido rodando que caminando."
          shield: "Flota entre las olas para examinar el océano.\nSi encuentra una presa, avisa enseguida a los\nWalrein de su manada."
        ko:
          sword: "두꺼운 지방에 둘러싸인\n완벽하게 둥근 몸을 가졌다.\n걷는 것보다 굴러가는 게 더 빠르다."
          shield: "파도에 떠다니며 바다의 상태를\n살핀다. 먹이를 발견하면\n무리의 씨카이저에게 알린다."
        zh_simp:
          sword: "圆溜溜的身体\n被厚厚的脂肪包裹着，\n滚起来比走路要快。"
          shield: "会漂浮在波浪当中观察\n大海的状况。一旦发现猎物，\n就会通知群体里的帝牙海狮。"
        zh_trad:
          sword: "身體被厚厚的脂肪包裹著，\n圓得令人讚嘆。用翻滾的\n方式移動反而比走路還要快。"
          shield: "會漂浮在波浪間探查\n周圍的狀況。一旦發現獵物，\n就會通知群體的帝牙海獅。"
