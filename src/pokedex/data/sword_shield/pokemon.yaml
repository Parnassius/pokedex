      descriptions:
        jp_kana:
          sword: "ねんどから　うみだされた　こだいの\nポケモン。　なぜか　おおいわを\nならべつづける　ものも　いる。"
          shield: "ねんどから　つくられた　ポケモン。\nなんぜんねんも　まえの　あるじの\nめいれいを　いまも　まもっている。"
        jp_kanji:
          sword: "粘土から　生み出された　古代の\nポケモン。　なぜか　大岩を\n並べ続ける　ものも　いる。"
          shield: "粘土から　つくられた　ポケモン。\n何千年も　前の　主の\n命令を　今も　守っている。"
        en:
          sword: "They were sculpted from clay in ancient times.\nNo one knows why, but some of them are driven\nto continually line up boulders."
          shield: "This Pokémon was created from clay. It received\norders from its master many thousands of years\nago, and it still follows those orders to this day."
        fr:
          sword: "Ce Pokémon très ancien a été façonné avec\nde l’argile. On ne sait pourquoi certains spécimens\nn’ont de cesse d’aligner de grosses pierres."
          shield: "Ce Pokémon fait d’argile continue de respecter\nles ordres que son maître lui a donnés il y a\nquelques millénaires."
        it:
          sword: "È un Pokémon antico creato dall’argilla. Non si\nsa perché, ma ad alcuni esemplari piace creare\nfile interminabili di grandi rocce."
          shield: "È stato creato modellando dell’argilla.\nSegue ancora gli ordini che il suo padrone\ngli ha impartito molti secoli or sono."
        de:
          sword: "Sie bestehen aus Lehm und existieren schon sehr\nlange. Einige von ihnen haben den unerklärlichen\nDrang, große Felsen aneinanderzureihen."
          shield: "Golbit wurde aus Lehm erschaffen. Es führt heute\nnoch Befehle aus, die ihm vor Jahrtausenden\nvon seinem Meister aufgetragen wurden."
        es:
          sword: "Un antiguo Pokémon creado a partir del barro.\nSe desconoce el motivo por el que algunos\nejemplares colocan rocas grandes en hileras."
          shield: "Fue creado a partir del barro para emplearlo\ncomo sirviente. Todavía acata las órdenes que\nle dio su amo hace milenios."
        ko:
          sword: "점토에서 만들어진 고대의\n포켓몬. 어째선지 큰 바위를\n늘어놓기만 하는 녀석도 있다."
          shield: "점토로 만들어진 포켓몬이다.\n수천 년 전 주인의 명령을\n지금도 따르고 있다."
        zh_simp:
          sword: "诞生自黏土的古代宝可梦。\n不知为何，有一些泥偶小人\n会不断地把大石头排列起来。"
          shield: "用黏土制成的宝可梦。\n即使现在也一直遵循着\n数千年前主人的命令。"
        zh_trad:
          sword: "誕生自黏土的古代寶可夢。\n不知為何，有一些泥偶小人\n會不斷地把大石頭排列起來。"
          shield: "用黏土製成的寶可夢。\n即使現在也一直遵循著\n數千年前主人的命令。"
golurk:
  species_id: 623
  names:
