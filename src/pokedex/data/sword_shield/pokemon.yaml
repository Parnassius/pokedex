      descriptions:
        jp_kana:
          sword: "マラカスの　ような　おとを　だす。\nようきな　リズムに　とりポケモンは\nおどろき　あわて　とびさっていく。"
          shield: "いちねんに　いちど　タネを　まく。\nはなの　タネは　えいようまんてんで\nさばくの　きちょうな　しょくりょう。"
        jp_kanji:
          sword: "マラカスの　ような　音を　だす。\n陽気な　リズムに　鳥ポケモンは\n驚き　慌て　飛び去っていく。"
          shield: "１年に　一度　種を　まく。\n花の　種は　栄養満点で\n砂漠の　貴重な　食料。"
        en:
          sword: "With noises that could be mistaken for the rattles\nof maracas, it creates an upbeat rhythm, startling\nbird Pokémon and making them fly off in a hurry."
          shield: "Once each year, this Pokémon scatters its seeds.\nThey’re jam-packed with nutrients, making them\na precious food source out in the desert."
        fr:
          sword: "Il produit un bruit de maracas. Quand il danse\nà un rythme enjoué, il surprend les Pokémon\noiseaux, qui s’enfuient alors à tire-d’aile."
          shield: "Il sème les graines de ses fleurs une fois par an.\nCelles-ci abondent en nutriments et représentent\nune denrée précieuse dans le désert."
        it:
          sword: "Emette un suono di maracas. Sfrutta il suo ritmo\nvivace per prendere alla sprovvista i Pokémon\nalati, che volano via in tutta fretta."
          shield: "Una volta all’anno i suoi fiori rilasciano semi\nricchissimi di sostanze nutritive, che li rendono\nun prezioso alimento nel deserto."
        de:
          sword: "Es erzeugt Laute, die dem Klang von Maracas\nähneln, und weiß sich Vogel-Pokémon mit flotten\nRhythmen vom Leib zu halten."
          shield: "Es verstreut ein Mal im Jahr Samen, die jede\nMenge Nährstoffe enthalten und in der Wüste\nals kostbares Nahrungsmittel gelten."
        es:
          sword: "Emite un sonido parecido a unas maracas. Se\nmueve con un ritmo marchoso para sorprender\na los Pokémon pájaro, que huyen espantados."
          shield: "Una vez al año, esparce sus semillas, cuyo alto\nvalor nutritivo las convierte en una inestimable\nfuente de alimento en el desierto."
        ko:
          sword: "마라카스 같은 소리를 낸다.\n리듬이 경쾌해서 새포켓몬은\n깜짝 놀라 허둥지둥 날아가버린다."
          shield: "일 년에 한 번 씨를 뿌린다.\n꽃의 씨는 영양이 매우 풍부해\n사막의 귀중한 식량이다."
        zh_simp:
          sword: "会发出沙铃般的声音。\n鸟宝可梦会因那轻快的\n节奏而受惊飞走。"
          shield: "一年散播一次种子。\n花的种子营养十足，\n是沙漠中贵重的食粮。"
        zh_trad:
          sword: "會發出沙鈴般的聲音。\n鳥寶可夢會因那輕快的\n節奏而受驚飛走。"
          shield: "一年散播一次種子。\n花的種子營養十足，\n是沙漠中貴重的食糧。"
dwebble:
