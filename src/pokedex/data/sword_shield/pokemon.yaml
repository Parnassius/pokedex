      descriptions:
        jp_kana:
          sword: "うつくしい　けなみと　スタイルに\nまどわされがちだが　きまぐれで\nきょうぼうな　ポケモンなのだ。"
          shield: "フォクスライと　なわばりを　めぐり\nあらそう。　おとひとつ　たてずに\nえものの　はいごに　しのびよる。"
        jp_kanji:
          sword: "美しい　毛並みと　スタイルに\n惑わされがちだが　気まぐれで\n狂暴な　ポケモンなのだ。"
          shield: "フォクスライと　縄張りを　めぐり\n争う。　音ひとつ　たてずに\n獲物の　背後に　忍び寄る。"
        en:
          sword: "Don’t be fooled by its gorgeous fur and elegant\nfigure. This is a moody and vicious Pokémon."
          shield: "This stealthy Pokémon sneaks up behind prey\nwithout making any sound at all. It competes with\nThievul for territory."
        fr:
          sword: "On se laisse facilement éblouir par son pelage\nmagnifique et son allure élégante, mais gare\nà son caractère imprévisible et agressif."
          shield: "Sans un bruit, il approche ses victimes\npar-derrière pour les frapper.\nIl dispute son territoire avec les Roublenard."
        it:
          sword: "Pokémon dalla magnifica pelliccia e dalle linee\naggraziate, dietro cui si nasconde un carattere\nvolubile e feroce."
          shield: "Si avvicina di soppiatto alla preda, attaccandola\nalle spalle all’improvviso. Spesso si contende\nil territorio con Thievul."
        de:
          sword: "Man wird schnell von seinem schönen Fell und\nseiner Anmut verleitet, aber es ist ein sehr\nlaunisches und gewalttätiges Pokémon."
          shield: "Dieses Pokémon schleicht sich völlig geräuschlos\nvon hinten an seine Beute heran. Es bestreitet\nRevierkämpfe mit Gaunux."
        es:
          sword: "Bajo su hermoso pelaje y cautivador estilo, que\npuede llevar fácilmente a engaño, se oculta un\ncarácter imprevisible y agresivo."
          shield: "Libra disputas territoriales con los Thievul. Se\nacerca a sus rivales por la espalda sin hacer el\nmenor ruido."
        ko:
          sword: "아름다운 털과 스타일에\n쉽게 매료되지만 변덕스럽고\n흉포한 포켓몬이다."
          shield: "폭슬라이와 영역을 두고\n다툰다. 소리를 전혀 내지 않고\n먹이의 배후에 접근한다."
        zh_simp:
          sword: "虽然人们容易被它美丽的\n毛发和身姿所迷惑，但它其实\n是一种善变而凶暴的宝可梦。"
          shield: "和猾大狐争抢地盘。\n能够悄无声息地\n从背后偷偷靠近猎物。"
        zh_trad:
          sword: "雖然人們容易被牠美麗的\n毛皮和姿態所迷惑，但牠其實\n是一種善變而凶暴的寶可夢。"
          shield: "和狐大盜爭搶地盤。\n能夠悄無聲息地\n從背後偷偷靠近獵物。"
