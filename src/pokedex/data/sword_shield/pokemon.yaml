      descriptions:
        jp_kana:
          sword: "たかい　ちのうを　もつ　ポケモン。\nなかまどうしで　ツノを　よせあい\nじょうほう　こうかんを　する。"
          shield: "かんしゃの　きもちを　あつめる　ため\nひとや　ポケモンに　よく　つくす。\nメスは　こもりを　とくいと　するよ。"
        jp_kanji:
          sword: "高い　知能を　もつ　ポケモン。\n仲間同士で　ツノを　寄せあい\n情報　交換を　する。"
          shield: "感謝の　気持ちを　集めるため\n人や　ポケモンに　よく　つくす。\nメスは　子守りを　得意とするよ。"
        en:
          sword: "These intelligent Pokémon touch horns with\neach other to share information between them."
          shield: "They diligently serve people and Pokémon\nso they can gather feelings of gratitude.\nThe females are particularly good at babysitting."
        fr:
          sword: "Ce Pokémon très intelligent presse ses cornes\ncontre celles de ses congénères pour échanger\ndes informations."
          shield: "Ils font l’impossible pour s’attirer la gratitude\ndes humains et des Pokémon. Les femelles\nsont d’excellentes gardiennes d’enfants."
        it:
          sword: "Pokémon estremamente intelligente, scambia\ninformazioni avvicinando le corna a quelle\ndei suoi simili."
          shield: "Aiuta spesso persone o Pokémon per ottenere\nquanta più gratitudine possibile. Le femmine\nsono eccellenti babysitter."
        de:
          sword: "Ein äußerst intelligentes Pokémon, das mit seinen\nArtgenossen kommuniziert, indem es die Hörner\neines anderen Exemplars mit seinen berührt."
          shield: "Es hilft gerne Menschen oder anderen Pokémon,\num Dankbarkeit zu ernten. Die Weibchen gelten\nals ausgezeichnete Babysitter."
        es:
          sword: "Este Pokémon muestra una inteligencia superior.\nSe comunica e intercambia información con sus\ncongéneres a través de los cuernos."
          shield: "Ayuda a humanos y Pokémon para que le\nestén agradecidos. A las hembras se les da\nespecialmente bien cuidar de niños pequeños."
        ko:
          sword: "높은 지능을 가진 포켓몬.\n동료끼리 뿔을 맞대어\n정보를 교환한다."
          shield: "감사의 마음을 모으기 위해\n사람과 포켓몬에게 정성을 쏟는다.\n암컷은 아이 돌보기가 특기다."
        zh_simp:
          sword: "拥有高度智能的宝可梦。\n能通过伙伴间角与角的互碰\n来彼此交换信息。"
          shield: "为了收集感谢之情而为\n人和宝可梦贴心服务。\n雌性十分擅长带孩子。"
        zh_trad:
          sword: "擁有高度智能的寶可夢，\n能透過夥伴間角與角的互碰\n來彼此交換訊息。"
          shield: "為了收集感謝之情而為\n人和寶可夢貼心服務。\n雌性十分擅長帶孩子。"
