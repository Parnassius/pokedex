        hp: 0
        attack: 2
        defense: 0
        special_attack: 1
        special_defense: 0
        speed: 0
      types:
        - steel
        - ghost
      egg_groups:
        - mineral
      abilities:
        - stance_change
      descriptions:
        jp_kana:
          sword: "こうげきに　とっかした　たいせい。\nはがねの　おもさと　きょうどを\nいかして　あいてを　たたきわる。"
          shield: "むかし　ギルガルドを　つれた　おうが\nくにを　しはい　していたが　やがて\nせいきを　すわれ　くにも　ほろびた。"
        jp_kanji:
          sword: "攻撃に　特化した　体勢。\n鋼の　重さと　強度を\n活かして　相手を　叩き割る。"
          shield: "昔　ギルガルドを　連れた　王が\n国を　支配　していたが　やがて\n生気を　吸われ　国も　滅びた。"
        en:
          sword: "This stance is dedicated to offense. It can cleave\nany opponent with the strength and weight of its\nsteel blade."
          shield: "Once upon a time, a king with an Aegislash\nreigned over the land. His Pokémon eventually\ndrained him of life, and his kingdom fell with him."
        fr:
          sword: "Sous cette forme, il excelle en attaque.\nIl utilise le poids et la puissance de l’acier\npour détruire ses adversaires."
          shield: "Un roi régnait jadis, un Exagide à ses côtés.\nL’absorption de l’énergie vitale du souverain\ncausa sa perte, ainsi que celle de son royaume."
        it:
          sword: "Questa forma è specializzata nell’attacco.\nSfrutta il peso e la durezza dell’acciaio\nper fare a pezzi il nemico."
          shield: "In passato, un re conquistò un paese affiancato\nda un Aegislash, ma la sua energia vitale\nvenne assorbita e il regno cadde in rovina."
        de:
          sword: "In dieser Form ist es auf Offensive spezialisiert.\nEs nutzt das Gewicht und die Härte von Stahl,\num seine Gegner zu vernichten."
          shield: "Einst regierte ein König mit einem Durengard an\nseiner Seite. Er und sein Königreich fielen jedoch,\nals ihm das Pokémon die Lebensenergie entzog."
        es:
          sword: "Al adoptar esta forma, centra su estrategia en la\nofensiva, aprovechando todo el peso y la fuerza\ndel acero para atacar al rival."
          shield: "Antiguamente, un rey logró conquistar un país\ncon la ayuda de este Pokémon, pero le costó\nla vida y condenó su nación a la ruina."
        ko:
          sword: "공격에 특화된 태세.\n강철의 무게와 강도를\n살려서 상대를 가른다."
          shield: "옛날에 킬가르도를 거느린 왕이\n나라를 지배했지만 머지않아\n생기를 뺏겨 나라도 멸망했다."
        zh_simp:
          sword: "特别强化了攻击的状态。\n会运用钢铁的重量和强度\n来击碎对手。"
          shield: "虽然带着坚盾剑怪的国王曾经\n支配了整个国家，最后却被它\n吸走了精气，国家也灭亡了。"
        zh_trad:
          sword: "特別強化了攻擊的狀態。\n會運用鋼鐵的重量和強度\n來擊碎對手。"
          shield: "雖然帶著堅盾劍怪的國王曾經\n支配了整個國家，最後卻被牠\n吸走了精氣，國家也滅亡了。"
