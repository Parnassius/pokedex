      descriptions:
        jp_kana:
          sword: "とりポケモンが　おもな　えもの。\nうもうの　あいだから　ひのこを\nふきだし　あいてを　いかくする。"
          shield: "じそく５００キロで　とつげき。\nえものが　にげるすきを　あたえずに\nきょうれつな　けりで　しとめる。"
        jp_kanji:
          sword: "鳥ポケモンが　おもな　獲物。\n羽毛の　あいだから　火の粉を\n噴き出し　相手を　威嚇する。"
          shield: "時速５００キロで　突撃。\n獲物が　逃げるすきを　与えずに\n強烈な　蹴りで　しとめる。"
        en:
          sword: "Talonflame mainly preys upon other bird\nPokémon. To intimidate opponents, it sends\nembers spewing from gaps between its feathers."
          shield: "Talonflame dives toward prey at speeds of up to\n310 mph and assaults them with powerful kicks,\ngiving the prey no chance to escape."
        fr:
          sword: "Flambusard chasse surtout les Pokémon oiseaux.\nIl intimide ses adversaires en produisant\ndes étincelles avec son plumage."
          shield: "Flambusard attaque à une vitesse de 500 km/h.\nIl achève ses proies d’un puissant coup de patte\nsans leur laisser la moindre chance de fuir."
        it:
          sword: "Caccia soprattutto Pokémon alati.\nIntimorisce il bersaglio sprizzando scintille\ndalle fessure che ha tra le piume."
          shield: "Piomba sulle prede a 500 km/h e le attacca\ncon calci potentissimi senza dargli via di scampo."
        de:
          sword: "Fiaro ernährt sich vor allem von Vogel-Pokémon.\nAus den Zwischenräumen seines Gefieders sprüht\nes Funken, um seine Gegner einzuschüchtern."
          shield: "Fiaro greift mit einer Geschwindigkeit von bis zu\n500 km/h an. Mit einem kräftigen Tritt erlegt es\nseine Beute und gibt ihr keine Chance zur Flucht."
        es:
          sword: "Su presa predilecta son los Pokémon pájaro.\nIntimida a sus rivales lanzando ascuas desde\nlos intersticios de su plumaje."
          shield: "Arremete contra sus presas a una velocidad de\n500 km/h y les asesta el golpe de gracia con una\npatada muy potente, sin dejarles escapatoria."
        ko:
          sword: "새포켓몬이 주요 먹이다.\n깃털 사이로 불똥을\n뿜어내며 상대를 위협한다."
          shield: "시속 500km로 돌격한다.\n먹이가 도망칠 틈을 주지 않고\n강렬한 발차기로 꼼짝 못 하게 한다."
        zh_simp:
          sword: "主要以鸟宝可梦为食。\n会从羽毛的缝隙里\n喷出火花来威吓对手。"
          shield: "会以５００公里的时速进行突击。\n不给猎物留下逃跑的机会，\n直接以猛烈的踢击将其解决。"
        zh_trad:
          sword: "主要的獵物是鳥寶可夢。\n會從羽毛的縫隙裡噴出\n火花威嚇對手。"
          shield: "會以時速５００公里的速度\n進行突擊。對手連逃跑都來不及\n就被牠猛烈的腳踢給解決了。"
pancham:
  species_id: 674
  names:
    jp_kana: ヤンチャム
    jp_kanji: ヤンチャム
    en: Pancham
    fr: Pandespiègle
    it: Pancham
    de: Pam-Pam
    es: Pancham
    ko: 판짱
    zh_simp: 顽皮熊猫
    zh_trad: 頑皮熊貓
  forms:
    pancham:
      form_id: 0
      base_stats:
        hp: 67
        attack: 82
        defense: 62
        special_attack: 46
        special_defense: 48
        speed: 43
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
