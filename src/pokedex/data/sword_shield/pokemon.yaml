        es: Forma Brío
        ko: 각오의 모습
        zh_simp: 觉悟的样子
        zh_trad: 覺悟的樣子
      base_stats:
        hp: 91
        attack: 72
        defense: 90
        special_attack: 129
        special_defense: 90
        speed: 108
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 3
        special_defense: 0
        speed: 0
      types:
        - water
        - fighting
      egg_groups:
        - undiscovered
      abilities:
        - justified
      descriptions:
        jp_kana:
          sword: "たたかう　かくごを　きめたことで\nぜんしんに　きりょくが　みなぎり\nケルディオの　すがたを　かえた。"
          shield: "からだの　おくそこで　ねむっていた\nちからを　ひたいの　ツノに　まとい\nすべてを　きりさく　つるぎとなった。"
        jp_kanji:
          sword: "戦う　覚悟を　決めたことで\n全身に　気力が　みなぎり\nケルディオの　姿を　変えた。"
          shield: "体の　奥底で　眠っていた\n力を　額の　ツノに　まとい\nすべてを　切り裂く　剣となった。"
        en:
          sword: "Keldeo has strengthened its resolve for battle,\nfilling its body with power and changing its form."
          shield: "The power that lay hidden in its body now covers\nits horn, turning it into a sword that can slice\nthrough anything."
        fr:
          sword: "Bien décidé à se battre, Keldeo a changé\nde forme grâce à l’énergie qui parcourt\nmaintenant tout son corps."
          shield: "Le pouvoir qui sommeillait au plus profond de\nlui s’est concentré dans sa corne, qui est devenue\nune lame capable de fendre n’importe quoi."
        it:
          sword: "La sua determinazione nella lotta ha infuso\nnel suo corpo un immenso vigore che ha\ndeterminato un cambiamento di forma."
          shield: "L’energia sopita dentro di lui ha pervaso il suo\ncorno trasformandolo in una spada in grado\ndi tagliare qualunque cosa."
        de:
          sword: "Durch seinen starken Kampfeswillen wurde sein\nKörper mit purer Willenskraft erfüllt, woraufhin\nes diese Form annehmen konnte."
          shield: "Die tief in ihm schlummernden Kräfte haben sich\nim Horn an seiner Stirn gebündelt. Dieses gleicht\nnun einer Klinge und kann alles zerschneiden."
        es:
          sword: "Su firme resolución combativa hace que todo su\ncuerpo rebose brío e incluso provoca un cambio\nde forma."
          shield: "Su poder latente se ha concentrado en el cuerno\nde la frente y lo ha convertido en una espada\nque todo lo corta."
        ko:
          sword: "싸울 각오를 다지고 난 후\n전신에 기력이 넘쳐흘러\n케르디오의 모습이 바뀌었다."
          shield: "몸 깊숙이 잠들어 있던 힘이\n이마의 뿔에 휘감겨\n모든 것을 베어 가르는 검이 되었다."
        zh_simp:
          sword: "通过下定战斗的决心，\n让自己全身充满力量，\n并改变了自己的样子。"
          shield: "沉睡在身体深处的力量\n包裹住了它额头上的角，\n形成了能撕裂一切的剑。"
        zh_trad:
          sword: "透過下定戰鬥的決心\n讓自己全身充滿力量，\n並改變了自己的樣子。"
          shield: "沉睡在身體深處的力量\n包裹住了牠額頭上的角，\n形成了能劈開一切的劍。"
