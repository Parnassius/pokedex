        ko:
          sword: "매우 추운 곳에서 흘러 흘러\n떠내려왔다. 항상 얼음으로\n얼굴을 식히고 있다."
          shield: "더위에 약해서 얼굴을 언제나\n얼음으로 식히고 있다. 머리의 털을\n바다에 늘어뜨리고 먹이를 낚는다."
        zh_simp:
