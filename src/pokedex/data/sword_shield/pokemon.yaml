      descriptions:
        jp_kana:
          sword: "どくぶくろで　つくった　たいえきを\nしっぽの　ほのおで　ねっして\nどくガスを　はっせいさせる　しくみ。"
          shield: "えものの　はいごに　しのびより\nきづかれる　まえに　どくガスを\nあびせて　うごけなくしてしまう。"
        jp_kanji:
          sword: "毒袋で　つくった　体液を\nしっぽの　炎で　熱して\n毒ガスを　発生させる　仕組み。"
          shield: "獲物の　背後に　忍び寄り\n気づかれる　前に　毒ガスを\n浴びせて　動けなくしてしまう。"
        en:
          sword: "Its venom sacs produce a fluid that this\nPokémon then heats up with the flame in its tail.\nThis process creates Salandit’s poisonous gas."
          shield: "This sneaky Pokémon will slink behind its prey\nand immobilize it with poisonous gas before the\nprey even realizes Salandit is there."
        fr:
          sword: "Il fait chauffer le liquide qu’il sécrète\ndans ses poches à venin avec la flamme\nde sa queue pour créer un gaz toxique."
          shield: "Il s’approche de ses proies par-derrière\net les asperge d’un gaz empoisonné avant qu’elles\nn’aient le temps de réagir, les clouant sur place."
        it:
          sword: "Con la fiamma della coda brucia i fluidi corporei\ngenerati dalle sue sacche di veleno, producendo\nun gas velenoso."
          shield: "Si avvicina alla preda da dietro senza farsi vedere\ne prima che possa rendersene conto le spruzza\naddosso un gas velenoso paralizzante."
        de:
          sword: "Es erhitzt die Körperflüssigkeit, die es in seinen\nGiftsäcken produziert, mit Flammen aus seiner\nRute. Dadurch wird Giftgas freigesetzt."
          shield: "Es schleicht sich von hinten an seine Beute heran.\nNoch bevor diese auf es aufmerksam wird, setzt\nes sie mit seinem Giftgas außer Gefecht."
        es:
          sword: "Produce un gas venenoso al quemar con las\nllamas de la cola el líquido secretado en sus\nbolsas de veneno."
          shield: "Se aproxima a su presa por la espalda y, antes\nde que pueda advertirlo, la inmoviliza con un\ngas venenoso."
        ko:
          sword: "독주머니에서 만든 체액을\n꼬리의 불꽃으로 가열해서\n독가스를 발생시키는 구조로 되어 있다."
          shield: "먹이의 뒤로 숨어들어서\n눈치채기 전에 독가스를\n퍼부어 움직이지 못하게 한다."
        zh_simp:
          sword: "用尾巴上的火焰燃烧\n毒囊里制出的体液，\n生成出毒气。"
          shield: "悄悄地从背后靠近猎物，\n在对方察觉之前释放毒气，\n让对方动弹不得。"
        zh_trad:
          sword: "用尾巴上的火焰燃燒\n毒囊裡製造出的體液，\n生成出毒氣。"
          shield: "悄悄地從背後靠近獵物，\n在對方察覺之前釋放毒氣，\n讓對方動彈不得。"
salazzle:
