        jp_kana:
          sword: "ふなぞこや　かわのいわに　あたまを\nぶつけまくっても　きにせず　きままに\nおよいでいる　のんきな　ポケモン。"
          shield: "からだは　いつも　ぬめっている。\nおよぐたびに　かわぞこに　あたまを\nぶつけているが　きに　していない。"
        jp_kanji:
          sword: "船底や　川の岩に　頭を\nぶつけまくっても　気にせず　気ままに\n泳いでいる　のんきな　ポケモン。"
          shield: "体は　いつも　ぬめっている。\n泳ぐたびに　川底に　頭を\nぶつけているが　気に　していない。"
        en:
          sword: "It has an easygoing nature. It doesn’t care if it\nbumps its head on boats and boulders\nwhile swimming."
          shield: "Its body is always slimy. It often bangs its head\non the river bottom as it swims but seems not\nto care."
        fr:
          sword: "Il a tendance à se cogner la tête contre la coque\ndes navires et les rochers, mais, imperturbable,\nil continue de nager comme si de rien n’était."
          shield: "Il est toujours gluant. Quand il nage, il se cogne\nsouvent la tête au fond des rivières, mais semble\ns’en moquer."
        it:
          sword: "È molto tranquillo per natura. Non si scompone\nse nuotando sbatte la testa contro lo scafo delle\nbarche o le rocce dei fiumi."
          shield: "Ha un corpo molto viscido. Spesso, nuotando,\nsbatte la testa sul letto dei fiumi, ma non\nse ne preoccupa."
        de:
          sword: "Es ist sehr unbekümmert und stört sich nicht\ndaran, wenn es während des Schwimmens an\nBoote oder Felsen stößt."
          shield: "Es hat einen äußerst glitschigen Körper. Beim\nSchwimmen stößt es sich regelmäßig den Kopf\nam Flussgrund, was ihm aber egal zu sein scheint."
        es:
          sword: "Es de naturaleza tranquila. Permanece impasible\ncuando, al nadar, choca de cabeza contra rocas\nde río o el casco de los barcos."
          shield: "Su cuerpo siempre resulta escurridizo al tacto.\nSuele chocarse contra el lecho del río al nadar,\npero no le importa demasiado."
        ko:
          sword: "배의 밑바닥이나 물가의 바위에\n머리를 부딪쳐도 신경 쓰지 않고\n헤엄치는 무사태평한 포켓몬이다."
          shield: "몸은 항상 미끄럽다.\n헤엄칠 때마다 강바닥에 머리를\n부딪치지만 신경 쓰지 않는다."
        zh_simp:
          sword: "就算脑袋撞上船底或河里的岩石，\n也完全不会去在意，悠然自在地\n游泳的悠闲宝可梦。"
          shield: "身体总是滑溜溜的。\n虽然游泳时头总会撞到河底，\n但它自己毫不在意。"
        zh_trad:
          sword: "就算腦袋撞上船底或河裡的岩石，\n也完全不會去在意，悠然自在地\n游泳的悠閒寶可夢。"
          shield: "身體總是滑溜溜的。\n雖然游泳時頭總會撞到河底，\n但牠自己毫不在意。"
espeon:
