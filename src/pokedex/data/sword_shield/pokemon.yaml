          shield: "ふあんていな　いでんしの　おかげで\nさまざまな　しんかの　かのうせいを\nひめている　とくしゅな　ポケモン。"
        jp_kanji:
          sword: "まわりの　環境に　合わせて\n体の　つくりを　変えていく\n能力の　持ち主。"
          shield: "不安定な　遺伝子の　おかげで\nさまざまな　進化の　可能性を\n秘めている　特殊な　ポケモン。"
        en:
          sword: "It has the ability to alter the composition of its\nbody to suit its surrounding environment."
          shield: "Thanks to its unstable genetic makeup, this\nspecial Pokémon conceals many different\npossible evolutions."
        fr:
          sword: "Il a la capacité de changer la composition de\nson corps pour s’adapter à son environnement."
          shield: "L’ADN de ce Pokémon très particulier recèle\nde nombreuses possibilités d’évolution."
        it:
          sword: "Ha la capacità di alterare la propria struttura\ncorporea per adattarsi all’ambiente circostante."
          shield: "È un Pokémon molto particolare. Dotato di un\ncorredo genetico instabile, serba in sé le più\nvarie possibilità evolutive."
        de:
          sword: "Es ist imstande, seinen Körper perfekt an die\njeweilige Umgebung anzupassen."
          shield: "Das Erbmaterial dieses besonderen Pokémon ist\ninstabil, weshalb es das Potenzial für viele\nverschiedene Entwicklungen in sich trägt."
        es:
          sword: "Es capaz de alterar la composición de su cuerpo\npara adaptarse al entorno."
          shield: "Su irregular estructura genética alberga el secreto\nde la capacidad que posee este Pokémon tan\nespecial para adoptar evoluciones muy variadas."
        ko:
          sword: "주위의 환경에 맞춰서\n몸의 구조를 바꿔나가는\n능력의 소유자다."
          shield: "불안정한 유전자 덕분에\n여러 가지 진화의 가능성을\n가지고 있는 특수한 포켓몬."
        zh_simp:
          sword: "伊布拥有能够为了\n适应周围环境而\n改变身体构造的能力。"
          shield: "由于不稳定的遗传基因，\n蕴含着各种各样进化\n可能性的特殊宝可梦。"
        zh_trad:
          sword: "伊布擁有著能夠為了\n適應周遭的環境而\n改變身體構造的能力。"
          shield: "由於不穩定的基因，\n蘊含著各式各樣進化\n可能性的特殊寶可夢。"
  gmax_forms:
    eevee_gigantamax:
      form_id: 999
      names:
        jp_kana: キョダイマックス
        jp_kanji: キョダイマックス
        en: Gigantamax
        fr: Gigamax
        it: Gigamax
        de: Gigadynamax
        es: Gigamax
        ko: 거다이맥스
        zh_simp: 超极巨化
        zh_trad: 超極巨化
      descriptions:
        jp_kana:
          sword: "キョダイマックス　パワーで　さらに\nもふもふした　くびまわりの　わたげで\nてきを　つつみこみ　とりこにする。"
          shield: "むじゃきさに　はくしゃが　かかった。\nどんな　あいてにも　じゃれつくが\nきょたい　ゆえに　おしつぶしてしまう。"
        jp_kanji:
          sword: "キョダイマックス　パワーで　さらに\nもふもふした　首まわりの　綿毛で\n敵を　包みこみ　とりこにする。"
          shield: "無邪気さに　拍車が　かかった。\nどんな　相手にも　じゃれつくが\n巨体　ゆえに　圧し潰してしまう。"
        en:
          sword: "Gigantamax energy upped the fluffiness of the\nfur around Eevee’s neck. The fur will envelop a\nfoe, capturing its body and captivating its mind."
          shield: "Having gotten even friendlier and more innocent,\nEevee tries to play with anyone around, only\nto end up crushing them with its immense body."
        fr:
          sword: "L’énergie du Gigamax a rendu le duvet autour\nde son cou encore plus épais, et il en recouvre\nses adversaires pour les désarmer."
          shield: "Son adorable innocence a pris des proportions\nXXL. Il cherche à jouer avec tout le monde, mais\nil est si grand qu’il écrase ses camarades de jeu."
        it:
          sword: "Intrappola il nemico usando la pelliccia intorno\nal collo, che è diventata ancora più vaporosa\ngrazie all’energia del fenomeno Gigamax."
          shield: "La sua ingenuità è cresciuta a dismisura assieme\na lui. Gioca con chiunque gli capiti davanti, ma\nfinisce con lo schiacciare i malcapitati."
        de:
          sword: "Durch die Gigadynamax-Energie wurde sein Fell\nnoch flauschiger. Es fängt Gegner, indem es sie\nin den Flaum um seinen Hals einhüllt."
          shield: "Es ist noch treuherziger als sonst und will mit\njedem spielen. Doch aufgrund seiner enormen\nGröße erdrückt es seine Spielkameraden dabei."
        es:
          sword: "Envuelve y atrapa a sus enemigos con el pelaje\nde su cuello que, gracias al fenómeno Gigamax,\nes ahora mucho más denso y esponjoso."
          shield: "Su ingenuidad ha alcanzado nuevas cotas.\nJuguetea inocentemente con cualquiera, pero\nes tan grande que acaba aplastándolo."
        ko:
          sword: "거다이맥스의 파워로\n더욱 복슬복슬해진 목 주변의 솜털로\n상대를 감싸서 사로잡는다."
          shield: "천진함이 배가되었다. 누구에게나\n친근하게 다가가서 장난치지만\n몸이 크기 때문에 뭉개버리고 만다."
        zh_simp:
          sword: "超极巨化之力使得颈部的绒毛\n变得更加地毛茸茸。会用绒毛\n包住敌人，同时掳获它的心。"
          shield: "性格变得更加天真无邪。\n不管遇到谁都会扑上去玩耍，\n但巨大的身体往往会把对方压垮。"
        zh_trad:
          sword: "超極巨化之力使得頸部的絨毛\n變得更加地毛茸茸。會用絨毛\n包住敵人，同時擄獲牠的心。"
          shield: "性情變得更加天真無邪。\n不管遇到誰都會撲上去玩耍，\n但巨大的身體往往會把對方壓垮。"
