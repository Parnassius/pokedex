      descriptions:
        jp_kana:
          sword: "なきごえは　１００デシベルを　こえる\nおんりょう。　ちかくで　なかれると\nいちにち　ずつうが　おさまらない。"
          shield: "なきはじめると　じぶんの　こえに\nおどろいて　さらに　はげしく　なく。\nなきつかれると　ねむってしまう。"
        jp_kanji:
          sword: "鳴き声は　１００デシベルを　超える\n音量。　近くで　鳴かれると\n一日　頭痛が　治まらない。"
          shield: "鳴きはじめると　自分の　声に\n驚いて　さらに　激しく　鳴く。\n鳴き疲れると　眠ってしまう。"
        en:
          sword: "The cry of a Whismur is over 100 decibels.\nIf you’re close to a Whismur when it lets out a\ncry, you’ll be stuck with an all-day headache."
          shield: "When Whismur cries, the sound of its own voice\nstartles it, making the Pokémon cry even louder.\nIt cries until it’s exhausted, then it falls asleep."
        fr:
          sword: "Le cri qu’il émet dépasse les 100 décibels et\ndonne une migraine qui dure toute la journée\nà quiconque se trouve à proximité."
          shield: "Quand il se met à crier, il se surprend lui-même\net hurle de plus belle. Il continue ainsi jusqu’à\nce qu’il se fatigue et tombe de sommeil."
        it:
          sword: "Il suo grido, che può superare i 100 decibel,\nfa venire mal di testa per tutta la giornata\na chiunque si trovi nelle vicinanze."
          shield: "Se inizia a gridare, si spaventa al suono della sua\nstessa voce e urla ancora di più. Quando si stanca\ndi urlare, va a dormire."
        de:
          sword: "Sein Schrei erreicht eine Lautstärke von über\n100 Dezibel. Hört man diesen aus der Nähe,\nleidet man den ganzen Tag unter Kopfschmerzen."
          shield: "Stößt Flurmel einen Schrei aus, so erschrickt es\nvor seiner eigenen Stimme und brüllt noch lauter,\nbis es erschöpft ist und sich schlafen legen muss."
        es:
          sword: "Su grito llega a superar los 100 decibelios y\nprovoca a quien lo oiga un dolor de cabeza\nque puede durar un día entero."
          shield: "Al chillar, se asusta con su propia voz, lo cual\nle lleva a gritar más fuerte todavía. Cuando\nse cansa, se echa a dormir."
        ko:
          sword: "울음소리는 100데시벨을 넘는\n음량이다. 가까이에서 울면\n온종일 두통에 시달린다."
          shield: "울음이 터지면 자신의 목소리에\n놀라 더 격렬하게 운다.\n울다 지치면 잠들어 버린다."
        zh_simp:
          sword: "叫声的音量超过了１００分贝。\n如果听到它在近处大叫，\n之后的一整天都会头痛不止。"
          shield: "一旦开始喊叫，就会被自己的声音\n惊吓到，然后以更大的声音\n大吼大叫起来。叫累了以后就会睡着，"
        zh_trad:
          sword: "叫聲的音量會超過１００分貝。\n要是被牠在近距離大叫，\n就會一整天都會頭痛不止。"
          shield: "一旦叫了起來，就會被自己的\n聲音嚇到，然後用更大的聲音\n大吼大叫。叫到累了就會睡著。"
loudred:
