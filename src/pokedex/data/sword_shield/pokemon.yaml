          sword: "はっぱと　たいもうで　つくった\nぐんばいを　ふって　ポケモンたちを\nいのままに　あやつることが　できる。"
          shield: "もりの　すみずみまで　しりつくし\nきずついた　ポケモンが　いると\nやくそうを　さがして　ちりょうする。"
        jp_kanji:
          sword: "葉っぱと　体毛で　つくった\n軍配を　振って　ポケモンたちを\n意のままに　操ることが　できる。"
          shield: "森の　隅々まで　知り尽くし\n傷ついた　ポケモンが　いると\n薬草を　探して　治療する。"
        en:
          sword: "With waves of its fan—made from leaves and its\nown fur—Oranguru skillfully gives instructions to\nother Pokémon."
          shield: "It knows the forest inside and out. If it comes\nacross a wounded Pokémon, Oranguru will\ngather medicinal herbs to treat it."
        fr:
          sword: "D’un mouvement de son éventail tissé avec\ndes feuilles et des poils, il peut manipuler\nles Pokémon et les forcer à agir selon sa volonté."
          shield: "Il connaît la forêt sur le bout des doigts.\nLorsqu’il trouve un Pokémon blessé, il cherche\ndes plantes médicinales pour le soigner."
        it:
          sword: "Sventolando il ventaglio fatto di foglie e ciuffi\ndi pelliccia assume il controllo degli altri\nPokémon, facendogli fare tutto ciò che vuole."
          shield: "Conosce alla perfezione ogni angolo della\nforesta e quando trova un Pokémon ferito cerca\nsubito una pianta medicinale per curarlo."
        de:
          sword: "Mit dem Fächer, den es aus Blättern und Fell\ngebaut hat, kommandiert es andere Pokémon\nherum. Er symbolisiert seine Befehlsgewalt."
          shield: "Es kennt jeden Winkel des Waldes. Trifft es ein\nverletztes Pokémon, findet es in Windeseile das\npassende Heilkraut und schreitet zur Behandlung."
        es:
          sword: "Cuando agita su abanico hecho de hojas y pelo,\npuede controlar a otros Pokémon y hacer que\ncumplan su voluntad."
          shield: "Conoce hasta el último rincón del bosque y, si\nencuentra un Pokémon herido, va en busca de\nhierbas medicinales para curarlo."
        ko:
          sword: "잎사귀와 털로 만든\n부채를 휘둘러 포켓몬들을\n마음대로 조종할 수 있다."
          shield: "숲 구석구석까지 파악하고 있어\n상처 입은 포켓몬이 있으면\n약초를 찾아 치료한다."
        zh_simp:
          sword: "智挥猩能够通过挥动\n由树叶和体毛所制成的扇子，\n随心所欲地指挥宝可梦。"
          shield: "对森林的各个角落都了如指掌。\n如果有宝可梦受伤了，\n就会去寻找药草为它们治疗。"
        zh_trad:
          sword: "智揮猩能夠透過揮動\n由樹葉和體毛所製成的扇子，\n隨心所欲地指揮寶可夢。"
          shield: "對森林的各個角落都瞭若指掌。\n如果有寶可夢受傷了，\n就會去尋找藥草為牠們治療。"
passimian:
  species_id: 766
  names:
    jp_kana: ナゲツケサル
    jp_kanji: ナゲツケサル
    en: Passimian
    fr: Quartermac
    it: Passimian
    de: Quartermak
    es: Passimian
    ko: 내던숭이
    zh_simp: 投掷猴
    zh_trad: 投擲猴
  forms:
    passimian:
      form_id: 0
      base_stats:
        hp: 100
        attack: 120
        defense: 90
        special_attack: 40
        special_defense: 60
