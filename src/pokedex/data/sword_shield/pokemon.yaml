          sword: "It burns coal inside its shell for energy. It blows\nout black soot if it is endangered."
          shield: "You find abandoned coal mines full of them.\nThey dig tirelessly in search of coal."
        fr:
          sword: "Il tire son énergie du charbon qu’il brûle\ndans sa carapace, et crache de la suie noire\nen cas de danger."
          shield: "Les Chartor vivent en grand nombre dans\nles mines abandonnées, où ils extraient\nle charbon avec ardeur."
        it:
          sword: "Genera energia bruciando carbone all’interno\ndella corazza. Se è in pericolo, emette fuliggine\nscura."
          shield: "Elegge a propria dimora miniere abbandonate,\ndove cerca carbone scavando con ardore."
        de:
          sword: "In seinem Panzer verbrennt es Kohle und gewinnt\ndaraus Energie. Bei Gefahr sondert es Ruß ab."
          shield: "Große Gruppen von Qurtel siedeln sich in\nstillgelegten Bergwerken an und graben dort\nemsig nach Kohle."
        es:
          sword: "Quema carbón en su caparazón para obtener\nenergía. Si se ve amenazado, despide un hollín\nnegro."
          shield: "Se junta con numerosos congéneres para\nestablecer su morada en minas abandonadas,\ndonde se afanan en localizar y extraer carbón."
        ko:
          sword: "등껍질 속에 석탄을 태워서\n에너지로 사용한다. 위급할\n때는 까만 매연을 뿜어낸다."
          shield: "사용할 수 없게 된 탄광에는\n많은 코터스가 살며\n석탄을 부지런히 캐고 있다."
        zh_simp:
          sword: "会在甲壳中燃烧煤炭产生能量。\n危急关头会喷出黑色的煤烟。"
          shield: "在弃用的煤矿中\n住着很多煤炭龟，\n它们会不停地挖掘煤炭。"
        zh_trad:
          sword: "會在甲殼中燃燒煤炭\n產生能量。遇到危機時\n會噴出黑色的煤煙。"
          shield: "在廢棄不用的煤礦坑中\n住著許多的煤炭龜。\n牠們會不停地挖掘煤炭。"
