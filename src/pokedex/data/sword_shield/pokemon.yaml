      descriptions:
        jp_kana:
          sword: "あなを　ほりながら　たべた　すなを\nくびの　ふくろに　ためている。\n８キロもの　すなが　はいるのだ。"
          shield: "はなの　あなから　すなを　ふんしゃ。\nてきの　めを　くらました　すきに\nちちゅうに　もぐって　みを　かくす。"
        jp_kanji:
          sword: "穴を　掘りながら　食べた　砂を\n首の　袋に　溜めている。\n８キロもの　砂が　入るのだ。"
          shield: "鼻の　穴から　砂を　噴射。\n敵の　目を　くらました　隙に\n地中に　潜って　身を　隠す。"
        en:
          sword: "As it digs, it swallows sand and stores it in its\nneck pouch. The pouch can hold more than\n17 pounds of sand."
          shield: "It spews sand from its nostrils. While the enemy\nis blinded, it burrows into the ground to hide."
        fr:
          sword: "Il amasse le sable qu’il avale en creusant\ndans la poche de son cou. Elle peut en contenir\njusqu’à huit kilos."
          shield: "En expulsant du sable par les narines, il aveugle\nson adversaire et en profite pour se cacher\nsous terre."
        it:
          sword: "Conserva nella sacca del collo la sabbia che\ningoia scavando buche. Può accumularne ben\n8 kg."
          shield: "Espelle sabbia dalle narici accecando il nemico\nper distrarlo e ne approfitta per nascondersi\nsottoterra."
        de:
          sword: "Den Sand, den es beim Graben von Löchern\nverzehrt, speichert es in einem Beutel in seinem\nHals. Dieser kann bis zu 8 kg Sand aufnehmen."
          shield: "Aus seinen Nasenlöchern verschießt es Sand.\nSobald der Feind dadurch nichts mehr sieht,\nversteckt es sich flugs unter der Erde."
        es:
          sword: "Almacena la arena que ingiere al perforar hoyos\nen la saca del cuello, cuya capacidad llega a\nalcanzar incluso los 8 kg."
          shield: "Expulsa arena por los orificios nasales. Una vez\nque aturde al enemigo, aprovecha la ocasión\npara ocultarse bajo tierra."
        ko:
          sword: "굴을 파면서 먹은 모래를\n목에 있는 주머니에 저장하는데\n8kg이나 되는 모래가 들어간다."
          shield: "콧구멍으로 모래를 분사한다.\n적의 눈을 속이고 그 틈에\n땅속으로 숨어들어 몸을 숨긴다."
        zh_simp:
          sword: "一边挖洞一边把吃掉的\n沙子储存在颈部的囊里。\n囊里面能装进８公斤的沙子。"
          shield: "会从鼻孔喷射出沙子，\n趁敌人看不清的时候\n躲进地底下藏身。"
        zh_trad:
          sword: "一邊挖洞一邊把吃掉的\n沙子儲存在頸部的囊裡。\n囊裡面能裝進８公斤的沙子。"
          shield: "會從鼻孔噴射出沙子，\n趁敵人看不清的時候\n躲進地底下藏身。"
