          sword: "At high latitudes, this Pokémon can be found\nwith clusters of Bergmite on its back as it swims\namong the icebergs."
          shield: "As Avalugg moves about during the day,\nthe cracks in its body deepen. The Pokémon’s\nbody returns to a pristine state overnight."
        fr:
          sword: "Il sillonne les eaux glacées des pôles en se mêlant\naux icebergs, une foule de Grelaçon collée\nà son dos."
          shield: "Les crevasses sur son dos s’approfondissent\nau cours de la journée, mais se comblent\nde nouveau pendant la nuit."
        it:
          sword: "Nuota nei freddi mari polari ospitando numerosi\nBergmite sulla schiena e confondendosi tra\ngli iceberg."
          shield: "Durante il giorno le crepe sul suo corpo\ndiventano più profonde, ma nel giro di una\nnotte si riempiono del tutto."
        de:
          sword: "Mit unzähligen Arktip auf dem Rücken schwimmt\nes wie ein Eisberg durch die kalten Meere hoher\nBreitengrade."
          shield: "Die Risse auf seinem Körper werden im Zuge\nseiner täglichen Aktivitäten tiefer. Ihm genügt\njedoch eine Nacht, um sie wieder zu schließen."
        es:
          sword: "Surca las aguas de mares gélidos, situados a altas\nlatitudes, llevando a varios Bergmite en el lomo y\nconfundiéndose entre los icebergs."
          shield: "Las fisuras de su cuerpo se agrandan durante\nel día, pero por la noche vuelven a cerrarse."
        ko:
          sword: "여러 마리의 꽁어름을 등에\n태우고 고위도의 차가운 바다를\n빙산 속에 섞여 헤엄친다."
          shield: "낮 동안의 활동으로 몸의 균열이\n깊어지지만 하룻밤 사이에\n균열이 없는 몸으로 돌아간다."
        zh_simp:
          sword: "把好几只冰宝驮在背上，\n混进众多冰山之间，\n在高纬度的寒冷大海里游动。"
          shield: "虽然身体的裂缝会因\n白天的活动而变大，\n但只要一晚就能全部长好。"
        zh_trad:
          sword: "把好幾隻冰寶馱在背上，\n混進眾多冰山之間，\n在高緯度的寒冷大海裡游動。"
          shield: "雖然身體的裂縫會因\n白天的活動而變大，\n但只要一晚就能全部長好。"
