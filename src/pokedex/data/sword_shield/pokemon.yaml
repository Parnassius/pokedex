      types:
        - fighting
      egg_groups:
        - human_like
      abilities:
        - sturdy
        - inner_focus
      hidden_ability: mold_breaker
      held_items:
        rare: black_belt
      descriptions:
        jp_kana:
          sword: "ひたすらに　つよさを　もとめる。\nやまで　しゅぎょうする　ダゲキを\nみたら　しずかに　たちさろう。"
          shield: "きたえに　きたえた　ダゲキが\nくりだす　ひっさつ　からてチョップは\nうみも　わるほどの　はかいりょく。"
        jp_kanji:
          sword: "ひたすらに　強さを　求める。\n山で　修行する　ダゲキを\n見たら　静かに　立ち去ろう。"
          shield: "鍛えに　鍛えた　ダゲキが\n繰りだす　必殺　空手チョップは\n海も　割るほどの　破壊力。"
        en:
          sword: "If you see a Sawk training in the mountains in its\nsingle-minded pursuit of strength, it’s best to\nquietly pass by."
          shield: "The karate chops of a Sawk that’s trained itself\nto the limit can cleave the ocean itself."
        fr:
          sword: "Il cherche à tout prix à devenir plus fort.\nIl est conseillé de ne pas le déranger quand\nil s’entraîne en montagne."
          shield: "Après avoir suivi un entraînement intensif,\nla puissance du tranchant de sa main est telle\nqu’il peut fendre la mer en deux."
        it:
          sword: "Cerca costantemente di diventare più forte.\nSe lo si incontra in montagna mentre si allena,\nè meglio svignarsela in silenzio."
          shield: "Grazie al suo intenso allenamento, può infliggere\nmicidiali colpi di karate capaci di dividere in due\nle acque dell’oceano."
        de:
          sword: "Es strebt unentwegt nach Stärke. Wer in den\nBergen ein Karadonis beim Training erblickt,\nsollte sich ganz leise aus dem Staub machen."
          shield: "Der Karateschlag eines perfekt durchtrainierten\nKaradonis’ hat genug Wucht, um selbst das Meer\nzu spalten."
        es:
          sword: "Viven obsesionados con hacerse más fuertes. Si se\nlos encuentra entrenando en la montaña, lo más\nrecomendable es alejarse en silencio."
          shield: "Cuando un Sawk ha entrenado duro, es capaz\nde separar las aguas del océano con la potencia\nde sus técnicas de kárate."
        ko:
          sword: "한결같이 강해지기를 추구한다.\n산에서 수행 중인 타격귀를\n발견한다면 조용히 물러나자."
          shield: "단련하고 단련한 타격귀가\n사용하는 필살 태권당수는\n바다도 가를 정도의 파괴력을 지녔다."
        zh_simp:
          sword: "不断地寻求强大的实力。\n要是看到了在山上修行的\n打击鬼，就静静地离开吧。"
          shield: "不断重复练习的打击鬼\n所使出的空手劈拥有\n足以劈开大海的破坏力。"
        zh_trad:
          sword: "不斷地尋求強大的實力。\n要是看到了在山上修行的\n打擊鬼，就靜靜地離開吧。"
          shield: "不斷重複練習的打擊鬼\n所使出的空手劈擁有\n足以劈開大海的破壞力。"
