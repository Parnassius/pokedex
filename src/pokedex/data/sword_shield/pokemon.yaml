        jp_kana:
          sword: "でんきエネルギーに　はんのうする\nふしぎな　たいしつ。　チョボマキと\nともに　いると　しんかする。"
          shield: "くちから　はきだす　えきたいで\nチョボマキの　からを　とかす。\nなかみ　だけを　いただくのだ。"
        jp_kanji:
          sword: "電気エネルギーに　反応する\n不思議な　体質。　チョボマキと\nともに　いると　進化する。"
          shield: "口から　吐き出す　液体で\nチョボマキの　殻を　溶かす。\n中身　だけを　いただくのだ。"
        en:
          sword: "Its strange physiology reacts to electrical energy\nin interesting ways. The presence of a Shelmet\nwill cause this Pokémon to evolve."
          shield: "It spits a liquid from its mouth to melt through\nShelmet’s shell. Karrablast doesn’t eat the shell—\nit eats only the contents."
        fr:
          sword: "Son corps étrangement structuré a la faculté\nde réagir à l’électricité.\nIl évolue lorsqu’il croise un Escargaume."
          shield: "Il crache un liquide qui dissout les coquilles\ndes Escargaume pour se régaler de leur contenu."
        it:
          sword: "Il suo corpo reagisce misteriosamente all’energia\nelettrica. Si evolve se si trova in presenza\ndi Shelmet."
          shield: "Scioglie la conchiglia di Shelmet con il liquido\nche spruzza dalla bocca e ne mangia il contenuto."
        de:
          sword: "Sein Körper reagiert unerklärlicherweise auf\nElektrizität. Die Anwesenheit von Schnuthelm\nlöst bei ihm die Entwicklung aus."
          shield: "Es nutzt die Flüssigkeit aus seinem Mund,\num die Muschel von Schnuthelm aufzulösen.\nDann verspeist es den Inhalt."
        es:
          sword: "Su misterioso cuerpo reacciona a la energía\neléctrica. Si se encuentra en presencia de un\nShelmet, evoluciona."
          shield: "Escupe un líquido corrosivo con el que disuelve\nel caparazón de los Shelmet para luego devorar\nel contenido."
        ko:
          sword: "전기 에너지에 반응하는\n이상한 체질을 지녔다.\n쪼마리와 함께 있으면 진화한다."
          shield: "입에서 내뿜는 액체로\n쪼마리의 껍질을 녹여서\n내용물만 먹어 치운다."
        zh_simp:
          sword: "有着会对电能产生反应的\n奇异体质。和小嘴蜗\n待在一起就会进化。"
          shield: "用嘴里吐出的液体\n来溶化小嘴蜗的壳，\n只会去吃里面的身体。"
        zh_trad:
          sword: "有著會對電能產生反應的\n奇異體質。和小嘴蝸\n待在一起就會進化。"
          shield: "用嘴裡吐出的液體\n來融化小嘴蝸的殼，\n只會去吃裡面的身體。"
