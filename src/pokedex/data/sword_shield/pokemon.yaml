          sword: "やるきの　なさげな　キックは\nローブシンの　もつ　コンクリートも\nくだくほどの　はかいりょく。"
          shield: "とても　あらっぽい　せいかくだが\nかぞくや　なかまや　なわばりは\nたいせつにする　ところがある。"
        jp_kanji:
          sword: "やる気の　なさげな　キックは\nローブシンの　もつ　コンクリートも\n砕くほどの　破壊力。"
          shield: "とても　荒っぽい　性格だが\n家族や　仲間や　縄張りは\n大切にする　ところがある。"
        en:
          sword: "As halfhearted as this Pokémon’s kicks may seem,\nthey pack enough power to shatter Conkeldurr’s\nconcrete pillars."
          shield: "While mostly known for having the temperament\nof an aggressive ruffian, this Pokémon takes very\ngood care of its family, friends, and territory."
        fr:
          sword: "Son coup de pied nonchalant possède une force\nde destruction si grande qu’il peut briser\nles piliers en béton de Bétochef."
          shield: "Il est de nature violente, mais au fond de lui,\nil tient à sa famille, à ses amis et à son territoire."
        it:
          sword: "Pur se tirati con aria svogliata, i suoi calci sono\ncosì distruttivi da sgretolare perfino i pilastri di\ncemento di Conkeldurr."
          shield: "Ha un’indole estremamente aggressiva, ma se\nsi tratta della sua famiglia, dei suoi compagni e\ndel suo territorio, diventa molto protettivo."
        de:
          sword: "Selbst seine halbherzigen Tritte sind stark\ngenug, um die Betonpfeiler eines Meistagrif\nzu zertrümmern."
          shield: "Es gibt sich gerne wild, aber seine Familie, seine\nKameraden und sein Revier liegen ihm sehr am\nHerzen."
        es:
          sword: "Las patadas que propina con aparente desgana\nposeen una fuerza capaz de destrozar incluso los\npilares de hormigón que llevan los Conkeldurr."
          shield: "A pesar de su carácter agresivo, se muestra muy\nprotector con sus allegados y su territorio."
        ko:
          sword: "의욕이 없어 보이는 킥은\n노보청이 들고 있는 콘크리트도\n부술 정도의 파괴력을 지녔다."
          shield: "매우 거친 성격이지만\n가족과 동료와 영역은\n소중히 여긴다."
        zh_simp:
          sword: "它看似无精打采的踢击\n其实拥有足以击碎修建老匠\n手中混凝土的破坏力。"
          shield: "虽然性格非常粗鲁，\n但也有重视家族、\n伙伴和领地的另一面。"
        zh_trad:
          sword: "牠看似無精打采的踢擊\n其實擁有足以擊碎修建老匠\n手中混凝土的破壞力。"
          shield: "雖然性情非常粗魯，\n但也有重視家族、\n夥伴和地盤的一面。"
sigilyph:
  species_id: 561
  names:
    jp_kana: シンボラー
    jp_kanji: シンボラー
    en: Sigilyph
    fr: Cryptéro
    it: Sigilyph
    de: Symvolara
    es: Sigilyph
    ko: 심보러
    zh_simp: 象征鸟
    zh_trad: 象徵鳥
  forms:
    sigilyph:
      form_id: 0
      base_stats:
        hp: 72
        attack: 58
        defense: 80
        special_attack: 103
        special_defense: 80
        speed: 97
      evs_yield:
        hp: 0
