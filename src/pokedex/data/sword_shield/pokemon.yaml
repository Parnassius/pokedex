        jp_kana:
          sword: "きょだいな　ハサミを　ふりまわす\nあばれもの。　そだてるのが　とても\nむずかしい　ポケモンと　いわれる。"
          shield: "たたかいを　このむ　せいかく。\nすみかに　ちかづく　あいてを\nようしゃなく　たたきのめす。"
        jp_kanji:
          sword: "巨大な　ハサミを　振りまわす\n暴れ者。　育てるのが　とても\n難しい　ポケモンと　いわれる。"
          shield: "戦いを　好む　性格。\nすみかに　近づく　相手を\n容赦なく　叩きのめす。"
        en:
          sword: "A rough customer that wildly flails its giant claws.\nIt is said to be extremely hard to raise."
          shield: "A brutish Pokémon that loves to battle. It will\ncrash itself into any foe that approaches its nest."
        fr:
          sword: "Ce Pokémon très coriace agite tout le temps\nses énormes pinces. Il faut beaucoup de patience\npour le dresser."
          shield: "Il adore se battre et frappe comme une brute\ntous ceux qui approchent de sa mare."
        it:
          sword: "Pokémon violento che flagella il nemico con\nle sue chele affilate. Sembra che sia molto\ndifficile allenarlo."
          shield: "Ama la lotta. Il malcapitato che si avvicina\nalla sua tana verrà brutalmente malmenato."
        de:
          sword: "Ein grobes Pokémon, das mit seinen riesigen\nScheren wild um sich schlägt. Man sagt, dass es\nsehr schwer zu trainieren sei."
          shield: "Es ist sehr rauflustig. Nähert sich ein Gegner\nseinem Unterschlupf, geht es gnadenlos auf\nihn los."
        es:
          sword: "Esta violenta criatura agita de forma salvaje las\ngigantes pinzas que tiene. Dicen que es muy\ndifícil criarlo."
          shield: "Le encanta pelear, debido a su naturaleza. Si\nalguien se acerca a su madriguera, le propinará\nuna paliza sin ningún tipo de miramiento."
        ko:
          sword: "거대한 집게를 휘두르는\n난폭한 포켓몬. 키우는 것이\n매우 어렵다고 전해진다."
          shield: "싸움을 좋아하는 성격.\n거처에 가까이 오는 상대를\n가차 없이 때려눕힌다."
        zh_simp:
          sword: "不停挥舞自己巨大的钳子，\n是个性格粗暴的家伙。\n被认为是很难培育的宝可梦。"
          shield: "有着热爱战斗的性格。\n当遇到靠近自己领地的对手，\n会毫不留情地将之打倒。"
        zh_trad:
          sword: "不停揮舞自己巨大的鉗子，\n是個性情粗暴的傢伙。\n被認為是很難培育的寶可夢。"
          shield: "有著熱愛戰鬥的性格。\n當遇到靠近自己領地的對手，\n會毫不留情地將之打倒。"
