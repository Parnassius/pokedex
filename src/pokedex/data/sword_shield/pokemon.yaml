          shield: "みがけば　ひかり　しんじつを\nうつしだすとも　いわれるが\nドーミラーは　とても　イヤがる。"
        jp_kanji:
          sword: "古い　遺跡に　現れる。\n体の　模様は　ガラルには\nない　文化の　もので　謎。"
          shield: "磨けば　光り　真実を\n映しだすとも　いわれるが\nドーミラーは　とても　嫌がる。"
        en:
          sword: "It appears in ancient ruins. The pattern on its\nbody doesn’t come from any culture in the\nGalar region, so it remains shrouded in mystery."
          shield: "Polishing Bronzor to a shine makes its surface\nreflect the truth, according to common lore.\nBe that as it may, Bronzor hates being polished."
        fr:
          sword: "Il apparaît dans les ruines. Les motifs qui ornent\nson corps sont mystérieux, car ils appartiennent\nà une culture étrangère à Galar."
          shield: "On raconte qu’il se met à briller et à refléter\nla vérité quand on le polit, mais il a horreur\nde cela."
        it:
          sword: "Appare fra le rovine antiche. Il disegno sul suo\ncorpo è un mistero irrisolto, perché non ha niente\na che fare con la cultura originaria di Galar."
          shield: "Si dice che si illumini e rifletta la verità se viene\nlucidato, ma a Bronzor dà molto fastidio."
        de:
          sword: "Es erscheint in alten Ruinen. Sein Muster ist ein\nRätsel, da es nicht aus einer in Galar\nbeheimateten Kultur stammt."
          shield: "Es heißt, wenn man es poliert, spiegelt sich die\nWahrheit in ihm wider. Bronzel mag es jedoch\nüberhaupt nicht, poliert zu werden."
        es:
          sword: "Puede encontrarse en ruinas antiguas. El dibujo\nque presenta en el cuerpo es un misterio, ya que\npertenece a una cultura ajena a Galar."
          shield: "Se dice que brilla y refleja la verdad al pulirlo,\naunque es algo que detesta."
        ko:
          sword: "오래된 유적에 나타난다.\n몸의 무늬는 가라르에 없는\n낯선 문화의 것이라 수수께끼이다."
          shield: "닦으면 빛이 나며 진실을\n비춘다고 전해지지만\n동미러는 닦이는 걸 매우 싫어한다."
        zh_simp:
          sword: "会在古老的遗迹出现。\n身上的纹路不属于伽勒尔文化，\n因此至今仍然谜团重重。"
          shield: "虽然人们说把铜镜怪打磨到发光，\n它就能映照出真相，\n但其实它非常讨厌被打磨。"
        zh_trad:
          sword: "會在古老的遺跡出現。\n身上的紋路不屬於伽勒爾文化，\n因此至今仍然謎團重重。"
          shield: "雖然人們說把銅鏡怪打磨到發光，\n牠就能映照出真相，\n但其實牠非常討厭被打磨。"
bronzong:
