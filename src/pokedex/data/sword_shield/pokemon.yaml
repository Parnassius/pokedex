        jp_kana:
          sword: "２ひきが　うみべの　てごろな　いわに\nくっついて　くらす。　まんちょうじ\nきょうりょくして　えさを　あつめる。"
          shield: "２ひきの　いきが　あわないと\nこうげき　ぼうぎょ　どちらも\nおろそかになり　いきのこれない。"
        jp_kanji:
          sword: "２匹が　海辺の　手ごろな　岩に\nくっついて　暮らす。　満潮時\n協力して　エサを　集める。"
          shield: "２匹の　息が　合わないと\n攻撃　防御　どちらも\nおろそかになり　生き残れない。"
        en:
          sword: "After two Binacle find a suitably sized rock, they\nadhere themselves to it and live together.\nThey cooperate to gather food during high tide."
          shield: "If the two don’t work well together, both their\noffense and defense fall apart. Without good\nteamwork, they won’t survive."
        fr:
          sword: "Ils vivent par groupes de deux sur un rocher\nqui leur convient en bord de mer. À marée haute,\nle duo coopère pour capturer des proies."
          shield: "Il faut que les deux bras travaillent bien ensemble\ns’ils souhaitent survivre, sinon leur défense\net leur attaque en souffrent grandement."
        it:
          sword: "Vivono in riva al mare attaccati a due a due su\nrocce adatte. Quando sale la marea, i membri\ndi ciascun duo collaborano per raccogliere cibo."
          shield: "Se non vanno d’accordo non riescono né ad\nattaccare né a difendersi efficacemente e la\nloro probabilità di sopravvivenza si riduce."
        de:
          sword: "Zwei Exemplare hängen sich an einen passenden\nFelsen in Küstennähe, um dort zu leben. Bei Flut\nsammeln sie gemeinsam Nahrung."
          shield: "Wenn die beiden Exemplare sich nicht gut\nverstehen, werden sie in Angriff und Verteidigung\nnachlässig und ihre Überlebenschancen sinken."
        es:
          sword: "Dos Binacle conviven adheridos a una misma\nroca a orillas del mar y colaboran para atrapar\na sus presas cuando sube la marea."
          shield: "Si no se llevan bien, no consiguen ni atacar ni\ndefenderse de forma eficaz y sus probabilidades\nde supervivencia se reducen."
        ko:
          sword: "2마리가 해변가의 적당한 바위에\n달라붙어서 지낸다. 만조가 되면\n협력해서 먹이를 모은다."
          shield: "2마리의 호흡이 맞지 않으면\n공격과 방어 어느 쪽도\n변변치 않게 되어 살아남지 못한다."
        zh_simp:
          sword: "２只龟脚脚会在海边找一块大小\n合适的岩石，附在上面一起生活。\n涨潮的时候会互相合作寻找食物。"
          shield: "如果２只龟脚脚配合得不好，\n不但无法有效地攻击和防御，\n甚至没办法生存下去。"
        zh_trad:
          sword: "２隻龜腳腳會在海邊找一塊大小\n合適的岩石，附在上面一起生活。\n漲潮的時候會互相合作尋找食物。"
          shield: "如果２隻龜腳腳配合得不好，\n不但無法有效地攻擊和防禦，\n甚至沒辦法生存下去。"
barbaracle:
