      descriptions:
        jp_kana:
          sword: "すばやい　うごきで　どくを　とばし\nたたかう。　アギルダーが　しゅやくの\nえいがや　マンガは　だいにんき。"
          shield: "カラを　ぬぎすて　みがるに　なった。\nおびじょうの　ねんまくを　からだに\nまきつけ　かんそうを　ふせぐ。"
        jp_kanji:
          sword: "素早い　動きで　毒を　飛ばし\n戦う。　アギルダーが　主役の\n映画や　マンガは　大人気。"
          shield: "殻を　脱ぎ捨て　身軽に　なった。\n帯状の　粘膜を　体に\n巻きつけ　乾燥を　防ぐ。"
        en:
          sword: "It moves with blinding speed and lobs poison at\nfoes. Featuring Accelgor as a main character is\na surefire way to make a movie or comic popular."
          shield: "Discarding its shell made it nimble. To keep\nitself from dehydrating, it wraps its body in\nbands of membrane."
        fr:
          sword: "Il se bat avec célérité en projetant du poison.\nIl est si cool qu’il est souvent le héros de films\nou de bandes dessinées à succès."
          shield: "Il est bien plus agile sans sa coquille.\nLa membrane en forme de bandelettes\nqui l’entoure l’empêche de se dessécher."
        it:
          sword: "Lotta spruzzando veleno con rapidi movimenti.\nÈ protagonista di fumetti e film che riscuotono\nun grandissimo successo."
          shield: "Si è liberato della conchiglia, diventando più\nleggero. Le membrane a forma di fasce che\nricoprono il suo corpo evitano che si secchi."
        de:
          sword: "Im Kampf spuckt es mit flinken Bewegungen Gift.\nFilme und Comics mit Hydragil in der Hauptrolle\nerfreuen sich großer Beliebtheit."
          shield: "Seit es seine Muschel abgestreift hat, ist es viel\nleichter und agiler. Es umhüllt sich mit einer\nSchleimhaut, die es vor dem Austrocknen schützt."
        es:
          sword: "Lucha escupiendo veneno y moviéndose a una\nvelocidad de vértigo. Ha protagonizado películas\ny cómics de gran éxito."
          shield: "Tras deshacerse del caparazón, su agilidad ha\naumentado. Las membranas que le recubren el\ncuerpo evitan que se deshidrate."
        ko:
          sword: "재빠른 움직임으로 독을 날려서\n싸운다. 어지리더가 주인공인\n영화나 만화는 인기가 많다."
          shield: "껍질을 벗어 몸이 가벼워졌다.\n띠 형태의 점막을 몸에 둘러\n건조해지는 것을 방지한다."
        zh_simp:
          sword: "行动迅速，会喷出毒液来战斗。\n敏捷虫担任主角的电影\n和漫画拥有极高的人气。"
          shield: "脱壳后变得更轻巧了。\n为了防止干燥，会将\n带状的粘膜裹在身上。"
        zh_trad:
          sword: "行動迅速，會噴出毒液來戰鬥。\n敏捷蟲擔綱主角的電影\n和漫畫擁有極高的人氣。"
          shield: "脫殼後變得更輕巧了。\n為了防止乾燥，會將\n帶狀的黏膜裹在身上。"
stunfisk:
