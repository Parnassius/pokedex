      descriptions:
        jp_kana:
          sword: "からだの　なんばいもの　ながさまで\nのびる　ふしぎな　ベロを　もつ。\nその　ふしぎは　みかいめいのまま。"
          shield: "にんげんの　てさきにも　まけないほど\nきような　ベロで　なんでも　できる。\nはんたいに　ゆびさきは　ぶきようだ。"
        jp_kanji:
          sword: "体の　何倍もの　長さまで\n伸びる　不思議な　ベロを　もつ。\nその　不思議は　未解明のまま。"
          shield: "人間の　手先にも　負けないほど\n器用な　ベロで　なんでも　できる。\n反対に　指先は　不器用だ。"
        en:
          sword: "Lickilicky’s strange tongue can stretch to many\ntimes the length of its body. No one has figured\nout how Lickilicky’s tongue can stretch so far."
          shield: "Lickilicky can do just about anything with its\ntongue, which is as dexterous as the human hand.\nIn contrast, Lickilicky’s use of its fingers is clumsy."
        fr:
          sword: "Sa langue a l’incroyable faculté de s’allonger et\nd’atteindre plusieurs fois la taille de son corps.\nCe mystère de la nature reste entier."
          shield: "Il est aussi habile avec sa langue que les êtres\nhumains le sont avec leurs mains. En revanche,\nil est maladroit quand il utilise ses doigts."
        it:
          sword: "La sua lingua può misteriosamente allungarsi\nfino a molte volte la lunghezza del corpo.\nAncora non si è capito come faccia."
          shield: "Può fare qualsiasi cosa con la sua lingua,\nagile quanto le mani di un essere umano.\nIn compenso, è maldestro nell’uso delle dita."
        de:
          sword: "Seine sonderbare Zunge kann sich bis auf ein\nVielfaches seiner Körpergröße ausdehnen.\nNiemand weiß, wie das möglich ist."
          shield: "Mit seiner Zunge kann es alles tun und ist damit\nso geschickt wie Menschen mit ihren Händen.\nDiese verwendet Schlurplek nur sehr unbeholfen."
        es:
          sword: "Su lengua es un misterio sin resolver: no se sabe\ncómo puede extenderla hasta alcanzar longitudes\nque superan varias veces la de su propio cuerpo."
          shield: "Es tan diestro con la lengua como un ser humano\ncon las manos. Por el contrario, muestra escasa\nmaña con los dedos."
        ko:
          sword: "몸의 몇 배의 길이로 늘어나는\n신비한 혀를 가졌다.\n그 비밀은 아직 밝혀지지 않았다."
          shield: "사람의 팔과 견줄 수 있을 정도의\n활용도 높은 혀로 뭐든지 한다.\n반대로 손은 무디다."
        zh_simp:
          sword: "拥有不可思议的舌头，\n全伸出来能有身体的数倍之长。\n其不可思议之谜至今仍未解开。"
          shield: "舌头的灵巧程度甚至不输给\n人手，没有它做不到的事。\n相反，手指却相当笨拙，"
        zh_trad:
          sword: "神奇的舌頭能夠伸到身高的\n好幾倍遠。至今沒人能解開\n為什麼它會這麼神奇。"
          shield: "舌頭靈巧得不輸人類的手，\n什麼事情都能用它來完成。\n相對地，手指倒是很笨拙。"
rhyperior:
  species_id: 464
  names:
    jp_kana: ドサイドン
    jp_kanji: ドサイドン
    en: Rhyperior
    fr: Rhinastoc
    it: Rhyperior
    de: Rihornior
    es: Rhyperior
    ko: 거대코뿌리
    zh_simp: 超甲狂犀
    zh_trad: 超甲狂犀
  forms:
    rhyperior:
      form_id: 0
      base_stats:
        hp: 115
        attack: 140
        defense: 130
        special_attack: 55
        special_defense: 55
        speed: 40
      evs_yield:
        hp: 0
        attack: 3
        defense: 0
        special_attack: 0
        special_defense: 0
