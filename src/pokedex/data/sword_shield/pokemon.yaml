      descriptions:
        jp_kana:
          sword: "おこると　ぜんしんの　けあなから\nどくその　まじった　あせを　ふきだし\nあいての　めを　ねらう。"
          shield: "まんげつの　よるや　こうふん\nしたとき　ぜんしんの　わっかもようは\nきいろく　ひかる。"
        jp_kanji:
          sword: "怒ると　全身の　毛穴から\n毒素の　混じった　汗を　噴き出し\n相手の　目を　狙う。"
          shield: "満月の　夜や　興奮\nしたとき　全身の　輪っか模様は\n黄色く　光る。"
        en:
          sword: "When this Pokémon becomes angry, its pores\nsecrete a poisonous sweat, which it sprays at\nits opponent’s eyes."
          shield: "On the night of a full moon, or when it gets\nexcited, the ring patterns on its body glow yellow."
        fr:
          sword: "Quand il s’énerve, ses pores sécrètent une sueur\nempoisonnée qu’il projette dans les yeux\nde ses ennemis."
          shield: "Les nuits de pleine lune, ou s’il est agité,\nles anneaux sur sa peau se mettent à briller."
        it:
          sword: "Quando si arrabbia, spruzza dai pori un sudore\nvelenoso mirando agli occhi del suo avversario."
          shield: "I cerchi sul corpo emettono un bagliore giallo\nquando è agitato o nelle notti di luna piena."
        de:
          sword: "Ist es wütend, feuert es giftigen Schweiß aus all\nseinen Poren auf die Augen seines Gegners ab."
          shield: "Bei Vollmond oder bei Aufregung leuchten die\nringförmigen Muster auf seinem Körper gelb auf."
        es:
          sword: "Cuando se enfurece, secreta un sudor venenoso\npor los poros que lanza a los ojos de sus\nenemigos."
          shield: "En las noches de luna llena, o cuando se exalta,\nle empiezan a brillar los anillos de color dorado."
        ko:
          sword: "화가 나면 전신의 모공으로부터\n독소가 섞인 땀을 뿜어내어\n상대의 눈을 노린다."
          shield: "보름달이 뜬 밤이나 흥분했을 때\n전신의 고리 무늬가\n노랗게 빛난다."
        zh_simp:
          sword: "发怒的时候会从全身的毛孔\n喷出混合了毒素的汗液，\n袭击对手的眼睛。"
          shield: "在满月之夜或是兴奋的时候，\n它身上圈圈一样的花纹\n就会发出金黄色的光。"
        zh_trad:
          sword: "發怒的時候會從全身的毛孔裡\n噴出混合了毒素的汗液，\n瞄準對手的眼睛發動攻擊。"
          shield: "在滿月之夜或是興奮的時候，\n牠身上圈圈一樣的花紋\n就會發出金黃色的光。"
