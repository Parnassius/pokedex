        - big_pecks
        - overcoat
      hidden_ability: weak_armor
      descriptions:
        jp_kana:
          sword: "ガイコツを　はき　おしりを　ガード。\nはきごこちの　いい　ガイコツを\nめぐり　なかまどうしで　こぜりあう。"
          shield: "すぐに　おおきく　そだつので\nおしりの　ガイコツは　すの　なかで\nおさがりとして　つかいまわされる。"
        jp_kanji:
          sword: "骸骨を　はき　お尻を　ガード。\nはき心地の　いい　骸骨を\nめぐり　仲間同士で　小競り合う。"
          shield: "すぐに　大きく　育つので\nお尻の　骸骨は　巣の　中で\nお下がりとして　使いまわされる。"
        en:
          sword: "It wears a bone to protect its rear.\nIt often squabbles with others of its kind over\nparticularly comfy bones."
          shield: "Vullaby grow quickly. Bones that have gotten too\nsmall for older Vullaby to wear often get passed\ndown to younger ones in the nest."
        fr:
          sword: "Ils protègent leur derrière en portant un crâne\ncomme couche. Ils se disputent les plus douillets\nd’entre eux."
          shield: "Il grandit vite. Au sein du nid, les petits Vostourno\nhéritent des couches en crâne de leurs aînés."
        it:
          sword: "Indossa il teschio per proteggere il suo bacino.\nSpesso litiga con i suoi consimili per accaparrarsi\nil teschio più comodo."
          shield: "Cresce così velocemente che il teschio gli va\npresto stretto. I teschi smessi restano nel nido\ne vengono usati dalle generazioni successive."
        de:
          sword: "Sie schützen ihren Bürzel mit einer Schädelwindel.\nUntereinander streiten sie sich um den Schädel\nmit dem höchsten Tragekomfort."
          shield: "Sie werden rasend schnell größer. Wenn sie aus\nSchädelwindeln herauswachsen, werden diese\nvon jüngeren Nestgefährten getragen."
        es:
          sword: "Usa una calavera para proteger sus posaderas.\nA menudo pelea con sus congéneres para\nhacerse con la más cómoda."
          shield: "Deja en el nido las calaveras que va descartando\na medida que crece con celeridad para que las\nreutilicen futuras generaciones."
        ko:
          sword: "해골을 입어서 엉덩이를 보호한다.\n착용감이 편안한 해골을 두고\n동료끼리 옥신각신한다."
          shield: "금방 크게 성장하므로\n엉덩이의 해골은 둥지 안에서\n대물림되어 계속 사용된다."
        zh_simp:
          sword: "穿上骸骨来保护屁股。\n会和伙伴互相争抢\n穿起来舒服的骸骨。"
          shield: "由于很快就会长大，\n屁股上的骸骨会接着传给\n巢里更小的秃鹰丫头用。"
        zh_trad:
          sword: "穿上骸骨來保護屁股。\n會和夥伴互相爭搶\n穿起來舒服的骸骨。"
          shield: "由於很快就會長大，\n屁股上的骸骨會接著傳給\n巢裡更小的禿鷹丫頭用。"
