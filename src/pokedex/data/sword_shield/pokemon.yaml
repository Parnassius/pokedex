          sword: "なかまの　はなつ　でんぱを　ヒゲで\nキャッチ。　エサや　でんきの\nありかを　みんなで　シェアするのだ。"
          shield: "でんきを　うみだす　ちからが\nよわいので　コンセントや　ほかの\nでんきポケモンから　ぬすむのだ。"
        jp_kanji:
          sword: "仲間の　放つ　電波を　ヒゲで\nキャッチ。　エサや　電気の　ありかを\nみんなで　シェアするのだ。"
          shield: "電気を　生みだす　力が　弱いので\nコンセントや　ほかの\n電気ポケモンから　盗むのだ。"
        en:
          sword: "A Dedenne’s whiskers pick up electrical waves\nother Dedenne send out. These Pokémon share\nlocations of food or electricity with one another."
          shield: "Since Dedenne can’t generate much electricity on\nits own, it steals electricity from outlets or other\nelectric Pokémon."
        fr:
          sword: "Il capte les ondes émises par ses congénères\navec ses moustaches. Cela lui permet de savoir\noù trouver de la nourriture ou de l’électricité."
          shield: "Puisqu’il a du mal à générer sa propre électricité,\nil en vole aux autres Pokémon Électrik ou via\nles prises de courant."
        it:
          sword: "Usa i baffi per captare le onde radio emesse\ndai suoi simili. Così condivide informazioni\nsu dove trovare cibo ed elettricità."
          shield: "Non riuscendo a produrre molta elettricità,\nla ruba dalle prese di corrente o da\naltri Pokémon di tipo Elettro."
        de:
          sword: "Mit den Schnurrhaaren empfangen sie elektrische\nWellen von Artgenossen. So teilen sie einander\nmit, wo Futter und Elektrizität zu finden sind."
          shield: "Dedenne selbst kann nur wenig Elektrizität\nerzeugen, weshalb es Strom von anderen\nElektro-Pokémon oder aus Steckdosen stiehlt."
        es:
          sword: "Se sirve de sus bigotes para captar las ondas que\nemiten sus compañeros, con las que se indican\ndónde encontrar sustento o electricidad."
          shield: "Su capacidad para producir electricidad es muy\nlimitada, de modo que tiene que robarla de las\ntomas de corriente o de otros Pokémon."
        ko:
          sword: "동료가 내뿜는 전파를 수염으로\n감지한다. 먹이나 전기의 위치를\n모두와 함께 공유한다."
          shield: "전기를 만들어내는 힘이\n약해서 콘센트나 다른\n전류포켓몬에게 훔친다."
        zh_simp:
          sword: "用胡子来感知伙伴发出\n的电波。它们通过这种方式\n告诉彼此哪里有食物和电。"
          shield: "由于发电的能力弱，\n会从插座或其他的\n电气宝可梦那里偷电。"
        zh_trad:
          sword: "能用鬍鬚接收來自夥伴們\n的電波，藉此向彼此分享\n哪裡有食物或電力。"
          shield: "由於發電的能力不強，\n因此會從插座或其他的\n電氣寶可夢那裡偷電。"
