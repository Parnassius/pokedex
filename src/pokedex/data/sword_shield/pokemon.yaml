        jp_kana:
          sword: "えものを　きりさき　たいえきを\nすする。　のこった　からだは\nほかのポケモンの　エサになる。"
          shield: "ぜつめつの　りゆうは　ふめい。\nあたたかい　うみに　くらしていた\nきょうぼうな　こだいのポケモン。"
        jp_kanji:
          sword: "獲物を　切り裂き　体液を　すする。\n残った　体は\nほかのポケモンの　エサになる。"
          shield: "絶滅の　理由は　不明。\n暖かい　海に　暮らしていた\n凶暴な　古代のポケモン。"
        en:
          sword: "Kabutops slices its prey apart and sucks out\nthe fluids. The discarded body parts become\nfood for other Pokémon."
          shield: "The cause behind the extinction of this species is\nunknown. Kabutops were aggressive Pokémon\nthat inhabited warm seas."
        fr:
          sword: "Il lacère sa proie pour boire ses fluides corporels,\npuis jette son corps en pâture à d’autres Pokémon."
          shield: "Nul ne sait pourquoi il s’est éteint.\nCe Pokémon préhistorique féroce\nvivait dans les mers chaudes."
        it:
          sword: "Lacera le prede e ne succhia i fluidi corporei.\nI resti diventano poi cibo per altri Pokémon."
          shield: "Questo feroce Pokémon dell’antichità viveva\nnei mari caldi. Le cause della sua estinzione\nsono ignote."
        de:
          sword: "Kabutops schlitzt seine Beute auf und saugt ihre\nKörpersäfte aus. Die Überreste dienen als\nNahrung für andere Pokémon."
          shield: "Es ist unklar, warum dieses brutale urzeitliche\nPokémon, das in warmen Meeren lebte,\nletztendlich ausstarb."
        es:
          sword: "Despedaza a las presas que atrapa para sorber\nsus fluidos y deja los restos para que otros\nPokémon den buena cuenta de ellos."
          shield: "Se desconoce el motivo de la extinción de este\nferoz Pokémon prehistórico que habitaba en los\ncálidos mares de antaño."
        ko:
          sword: "먹이를 베어 갈라 체액을\n빨아먹는다. 남은 몸은\n다른 포켓몬의 먹이가 된다."
          shield: "멸종한 이유는 불명확하다.\n따듯한 바다에 살고 있던\n난폭한 고대의 포켓몬이다."
        zh_simp:
          sword: "会将猎物撕裂并吸取体液。\n被它丢弃的残骸会成为\n其他宝可梦的食物。"
          shield: "灭绝的原因尚不明确。\n曾经栖息在温暖的大海，\n是性格残暴的古代宝可梦。"
        zh_trad:
          sword: "會切開獵物並且吸取對方\n的體液。獵物剩下的身體\n會成為其他寶可夢的食物。"
          shield: "沒有人知道牠為何會滅絕。\n過去曾棲息在溫暖的海域，\n是性情凶暴的古代寶可夢。"
