        jp_kana:
          sword: "きんぞくを　くさらせる　どくえきで\nなわばりに　はいりこんだ　タンカーを\nうみのもくずに　してしまう。"
          shield: "あたまの　カサを　かいめんから　だし\nたいようの　ひかりを　あびることで\nドラゴンエネルギーを　つくるのだ。"
        jp_kanji:
          sword: "金属を　腐らせる　毒液で\n縄張りに　入りこんだ　タンカーを\n海の藻屑に　してしまう。"
          shield: "頭の　笠を　海面から　出し\n太陽の　光を　浴びることで\nドラゴンエネルギーを　作るのだ。"
        en:
          sword: "Dragalge uses a poisonous liquid capable of\ncorroding metal to send tankers that enter its\nterritory to the bottom of the sea."
          shield: "Dragalge generates dragon energy by sticking\nthe plume on its head out above the ocean’s\nsurface and bathing it in sunlight."
        fr:
          sword: "Avec son poison capable de dissoudre le métal,\nil réduit à l’état d’épave les navires-citernes qui\npénètrent sur son territoire."
          shield: "Il sort la crête sur sa tête à la surface de l’eau\net l’expose à la lumière du soleil pour produire\nde l’énergie draconique."
        it:
          sword: "Con il suo liquido altamente corrosivo, capace\ndi sciogliere il metallo, riduce in rottami\nle petroliere che sconfinano nel suo territorio."
          shield: "Fa uscire la cresta che ha sulla testa fuori\ndall’acqua per assorbire la luce del sole\ne convertirla in energia Drago."
        de:
          sword: "Dringen Tankschiffe in sein Revier ein, versenkt\nes diese mithilfe eines Giftes, das selbst Metall\nzum Korrodieren bringt."
          shield: "Indem Tandrak seinen Kopfschmuck aus dem\nWasser reckt und ihn im Sonnenlicht badet,\nproduziert es Drachen-Energie."
        es:
          sword: "Utiliza su veneno capaz de corroer el metal\npara enviar a pique cualquier navío que ose\nadentrarse en las aguas que habita."
          shield: "Asoma la cresta de la cabeza sobre la superficie\ndel agua y transforma la luz que absorbe del sol\nen energía dragón."
        ko:
          sword: "금속을 녹슬게 하는 독액으로\n영역에 들어온 유조선을\n바다의 부스러기로 만들어 버린다."
          shield: "머리의 갓을 해면 위로 내밀고\n태양 빛을 받아\n드래곤 에너지를 만든다."
        zh_simp:
          sword: "将能够腐蚀金属的毒液\n喷向进入自己领地的油轮，\n使其化为碎屑，葬身海底。"
          shield: "会通过将头上的伞状部分\n伸出海面吸收阳光的方式，\n在体内制造龙之能量。"
        zh_trad:
          sword: "會用能夠腐蝕金屬的毒液\n將闖入自己地盤的油輪\n化為碎屑，沉入大海。"
          shield: "透過讓頭頂類似帽子的部分\n浮出海面吸收陽光，\n就能夠製造龍之能量。"
