      descriptions:
        jp_kana:
          sword: "くちから　ふきだす　すいりゅうは\n１００メートルさきで　うごく\nえものに　だって　めいちゅうする。"
          shield: "きゅうばんの　ように　へんかした\nせびれで　マンタインに　くっつき\nたべのこしを　わけてもらっている。"
        jp_kanji:
          sword: "口から　噴き出す　水流は\n１００メートル先で　動く\n獲物に　だって　命中する。"
          shield: "吸盤の　ように　変化した\n背びれで　マンタインに　くっつき\n食べ残しを　わけてもらっている。"
        en:
          sword: "The water they shoot from their mouths can hit\nmoving prey from more than 300 feet away."
          shield: "Using its dorsal fin as a suction pad, it clings to a\nMantine’s underside to scavenge for leftovers."
        fr:
          sword: "Son puissant jet d’eau ne manque jamais sa cible,\nmême à 100 m de distance."
          shield: "À l’aide de sa nageoire dorsale en forme\nde ventouse, il s’accroche sous un Démanta\npour récupérer ses restes."
        it:
          sword: "I getti d’acqua che spara dalla bocca riescono\na colpire una preda in movimento anche\na 100 m di distanza."
          shield: "Usando la pinna dorsale come una ventosa,\ns’attacca alla pancia di Mantine cibandosi\ndei suoi avanzi."
        de:
          sword: "Selbst aus 100 m Entfernung treffen die\nWassersalven, die es mit seinem Maul abfeuert,\nihr Ziel."
          shield: "Mit seiner Rückenflosse saugt es sich an der\nUnterseite eines Mantax’ fest und lebt von\ndessen Speiseresten."
        es:
          sword: "Los chorros de agua que escupe pueden alcanzar\na presas en movimiento a una distancia de hasta\n100 m."
          shield: "Usa su aleta dorsal a modo de ventosa para\naferrarse a un Mantine en busca de restos de\ncomida."
        ko:
          sword: "입에서 뿜어내는 수류는\n100m 앞에서 움직이는\n사냥감조차 명중시킨다."
          shield: "빨판처럼 변화한 등지느러미로\n만타인에게 달라붙어\n먹다 남은 것을 얻어먹고 있다."
        zh_simp:
          sword: "从嘴里喷出的水\n连１００米外的\n活动猎物都能命中。"
          shield: "会用变成吸盘状的背鳍\n吸附在巨翅飞鱼身上，\n让它分一点吃剩的东西给自己吃。"
        zh_trad:
          sword: "從嘴裡噴出的水\n連１００公尺外的\n活動獵物都能命中。"
          shield: "會用變成吸盤狀的背鰭\n吸附在巨翅飛魚身上，\n吃牠平常吃剩下的東西。"
octillery:
  species_id: 224
  names:
