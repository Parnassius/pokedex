        en:
          sword: "After using the feelers on its oversized claw to\ndetect the location of prey, Clawitzer launches\na cannonball of water at its target."
          shield: "Clawitzer’s right arm is a cannon that launches\nprojectiles made of seawater. Shots from a\nClawitzer’s cannon arm can sink a tanker."
        fr:
          sword: "Il projette des obus d’eau sur ses ennemis après\nles avoir localisés grâce aux antennes situées sur\nson énorme pince."
          shield: "Sa pince droite est un canon pouvant projeter\ndes obus d’eau assez puissants pour couler\nun navire-citerne."
        it:
          sword: "Individua la preda con le antenne della\nsua enorme chela e la attacca sparando\nproiettili d’acqua."
          shield: "L’arto destro è una sorta di cannone da cui\nspara proiettili d’acqua marina tanto potenti\nda affondare una petroliera."
        de:
          sword: "Mit den Antennen an seiner gigantischen Schere\nerfasst es, wo sich seine Beute aufhält, und feuert\ndann Wassergeschosse auf sie ab."
          shield: "Mit seiner rechten Schere, die ihm als Kanone\ndient, feuert es Geschosse aus Meerwasser ab,\ndie selbst Tankschiffe versenken können."
        es:
          sword: "Las antenas de su enorme pinza le permiten\ndetectar la posición de sus presas para luego\nacribillarlas a cañonazos con bolas de agua."
          shield: "Con el cañón de su brazo derecho dispara\nproyectiles de agua marina con tanta potencia\nque son capaces de hundir un petrolero."
        ko:
          sword: "거대한 집게의 더듬이로\n먹이가 있는 곳을 감지해\n물 폭탄을 발사한다."
          shield: "오른팔은 해수 포탄을\n발사하는 대포다. 유조선을\n가라앉게 할 정도의 위력이다."
        zh_simp:
          sword: "通过巨大钳子的触角\n感知猎物的位置，\n然后对其发射水炮弹。"
          shield: "右臂是能够喷射\n海水炮弹的大炮。\n威力大到足以击沉油轮。"
        zh_trad:
          sword: "能夠利用巨大鉗子的\n觸角探測獵物的位置，\n然後發射水砲彈。"
          shield: "右臂是能夠發射海水\n砲彈的大砲。威力之強，\n甚至能夠擊沉油輪。"
