      descriptions:
        jp_kana:
          sword: "きれいな　みずを　さがして　あるく。\nながい　じかん　みずを　のまないと\nあたまの　はっぱが　かれてしまう。"
          shield: "はっぱが　おおきく　なりすぎて\nおもくなって　しまったため　みずに\nうかんで　くらすように　なった。"
        jp_kanji:
          sword: "きれいな　水を　探して　歩く。\n長い　時間　水を　飲まないと\n頭の　葉っぱが　枯れてしまう。"
          shield: "葉っぱが　大きく　なりすぎて\n重くなって　しまったため　水に\n浮かんで　暮らすように　なった。"
        en:
          sword: "It searches about for clean water. If it does not\ndrink water for too long, the leaf on its\nhead wilts."
          shield: "Its leaf grew too large for it to live on land.\nThat is how it began to live floating in the water."
        fr:
          sword: "Il recherche toujours les endroits où coule\nde l’eau pure. S’il reste longtemps sans boire,\nla feuille sur sa tête commence à faner."
          shield: "Sa feuille est devenue si grande et si lourde\nqu’il doit vivre en flottant sur l’eau."
        it:
          sword: "Vaga alla ricerca di acqua pulita. Se non beve\nper parecchio tempo, la foglia che ha sul capo\nappassisce."
          shield: "La foglia che ha in testa, diventata\ntroppo grande e pesante, lo ha spinto\na vivere galleggiando a pelo d’acqua."
        de:
          sword: "Es sucht nach reinem Wasser. Wenn es für längere\nZeit kein Wasser trinkt, verwelkt das Blatt auf\nseinem Kopf."
          shield: "Da sein Blatt zu groß und schwer für das Leben\nan Land geworden ist, lebt es nun im Wasser\nschwimmend."
        es:
          sword: "Va buscando agua potable para beber. Si no la\nencuentra pasado bastante tiempo, la hoja de la\ncabeza se le marchita."
          shield: "El excesivo tamaño y peso de la hoja que tiene\nen la cabeza ha propiciado que viva flotando en\nel agua."
        ko:
          sword: "깨끗한 물을 찾아 걷는다.\n오랫동안 물을 마시지 않으면\n머리의 잎이 시들어 버린다."
          shield: "잎사귀가 너무 커서\n무거워졌기 때문에 물에\n떠서 생활하게 되었다."
        zh_simp:
          sword: "会走来走去寻找清水。\n如果长时间不饮水的话，\n头上的叶子就会枯萎。"
          shield: "因为叶子长得太大太重，\n所以才会改变习性，\n漂浮在水面上生活。"
        zh_trad:
          sword: "會為了尋找清水而走動。\n如果長時間不喝水的話，\n頭上的葉子就會枯萎。"
          shield: "因為葉子長得太大太重，\n所以才會改變習性，\n漂浮在水面上生活。"
