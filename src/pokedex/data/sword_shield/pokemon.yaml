          shield: "かいていの　いわに　はりつき\nえものが　ちかくにくると　はなびらの\nような　しょくしゅで　からめとる。"
        jp_kanji:
          sword: "化石から　復元した　ポケモン。\nおよそ　１億年前の　温かい\n海に　生息していた。"
          shield: "海底の　岩に　貼りつき\n獲物が　近くにくると　花びらのような\n触手で　絡めとる。"
        en:
          sword: "This Pokémon was restored from a fossil.\nLileep once lived in warm seas that existed\napproximately 100,000,000 years ago."
          shield: "Lileep clings to rocks on the seabed. When prey\ncomes close, this Pokémon entangles it with\npetallike tentacles."
        fr:
          sword: "Reconstitué à partir d’un fossile, ce Pokémon\nvivait dans les mers chaudes il y a environ\n100 millions d’années."
          shield: "Accroché aux rochers des profondeurs, il attend\nqu’une proie s’approche de lui pour l’attraper\navec ses tentacules en forme de pétales."
        it:
          sword: "Questo Pokémon è stato rigenerato da un fossile.\nViveva nei mari caldi circa 100 milioni di anni fa."
          shield: "Si attacca alle rocce dei fondali marini e usa\ni tentacoli simili a petali per catturare le prede\nche si avvicinano."
        de:
          sword: "Dieses Pokémon wurde aus einem Fossil\nwiederbelebt. Vor etwa 100 Millionen Jahren\nwar es in warmen Meeren zu Hause."
          shield: "Liliep heftet sich an Felsen am Meeresgrund.\nNähert sich Beute, fängt es diese mit seinen\nwie Blütenblätter geformten Tentakeln."
        es:
          sword: "Este Pokémon se regeneró a partir de un fósil.\nHabitaba en los mares cálidos hace unos cien\nmillones de años."
          shield: "Se ancla a una roca en el lecho marino y atrapa\na las presas que se le acercan con sus tentáculos\nen forma de pétalos."
        ko:
          sword: "화석에서 복원된 포켓몬.\n약 1억 년 전에 따뜻한 바다에\n서식했었다."
          shield: "해저 바위에 달라붙어\n먹이가 가까이 오면 꽃잎처럼\n생긴 촉수로 감아버린다."
        zh_simp:
          sword: "从化石复原而来的宝可梦。\n曾经生活在大约１亿年\n以前温暖的大海里。"
          shield: "会吸附在海底岩石上，\n用花瓣一样的触手\n缠住接近自己的猎物。"
        zh_trad:
          sword: "從化石復原而來的寶可夢。\n曾經棲息在大約１億年前\n的溫暖大海裡。"
          shield: "會吸附在海底的岩石上，\n並用花瓣般的觸手纏住\n接近自己的獵物。"
