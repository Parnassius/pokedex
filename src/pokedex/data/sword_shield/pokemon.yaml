        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - water
        - dragon
      egg_groups:
        - undiscovered
      abilities:
        - water_absorb
        - strong_jaw
      hidden_ability: sand_rush
      descriptions:
        jp_kana:
          sword: "ずばぬけた　きゃくりょくと　アゴの\nちからで　こだいでは　むてきだったが\nえものを　とりつくし　ぜつめつした。"
          shield: "じそく６０キロを　こえる　じまんの\nきゃくりょくで　はしれるが\nすいちゅうでしか　こきゅうできない。"
        jp_kanji:
          sword: "ずば抜けた　脚力と　顎の\n力で　古代では　無敵だったが\n獲物を　獲り尽くし　絶滅した。"
          shield: "時速６０キロを　超える　自慢の\n脚力で　走れるが\n水中でしか　呼吸できない。"
        en:
          sword: "Powerful legs and jaws made it the apex predator\nof its time. Its own overhunting of its prey was\nwhat drove it to extinction."
          shield: "Its mighty legs are capable of running at\nspeeds exceeding 40 mph, but this Pokémon\ncan’t breathe unless it’s underwater."
        fr:
          sword: "La force de ses pattes et de ses mâchoires\nle rendait presque invincible, mais à trop chasser\nses proies, celles-ci ont disparu, et lui avec."
          shield: "Ses pattes robustes lui permettent de courir\nà plus de 60 km/h, mais en revanche, il ne peut\nrespirer que sous l’eau."
        it:
          sword: "Anticamente era invincibile grazie all’incredibile\npotenza delle sue gambe e delle sue mascelle,\nma si è estinto dopo aver esaurito tutte le prede."
          shield: "Vanta gambe molto potenti che gli permettono\ndi correre a una velocità superiore a 60 km/h,\nma può respirare solo sott’acqua."
        de:
          sword: "Dank der enormen Kraft seiner Beine und seines\nKiefers war es in der Urzeit unbesiegbar, doch es\nfing seine Beute restlos weg und starb daher aus."
          shield: "Seine außergewöhnlich kräftigen Beine lassen es\nzwar über 60 km/h schnell laufen, doch atmen\nkann es nur unter Wasser."
        es:
          sword: "Su excelente capacidad motriz y la fuerza de su\nmandíbula lo hacían antaño invencible, pero dar\ncaza a todas sus presas propició su extinción."
          shield: "Exhibe con orgullo su inmensa capacidad motriz,\nque le permite superar los 60 km/h, pero solo\npuede respirar bajo el agua."
        ko:
          sword: "뛰어난 다리와 턱의 힘 덕분에\n고대에는 무적이었으나\n먹이를 모두 잡아먹어버려서 멸종했다."
          shield: "특유의 다릿심으로 시속 60km\n이상으로 달릴 수 있지만\n물속에서만 호흡할 수 있다."
        zh_simp:
          sword: "超乎寻常的脚力和颚力让它在\n古代所向无敌。但由于捕尽猎物，\n导致它们自己也灭绝了。"
          shield: "虽然能用自豪的脚力\n以６０公里的时速奔跑，\n但是只能在水中呼吸。"
        zh_trad:
          sword: "超乎尋常的腳力和顎力讓牠在\n古代所向無敵。但由於捕盡獵物，\n導致牠們自己也滅絕了。"
          shield: "雖然能用自豪的腳力\n以６０公里的時速奔跑，\n但是只能在水中呼吸。"
