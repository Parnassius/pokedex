      descriptions:
        jp_kana:
          sword: "ひがたが　すみか。　どろに　すむ\nさいきんに　よって　でんきを　つくる\nきかんが　はったつした。"
          shield: "からだの　きいろい　もようから\nつよい　でんきを　はなつとき\nなぜか　すこし　ほほえんでいる。"
        jp_kanji:
          sword: "干潟が　すみか。　泥に　棲む\n細菌に　よって　電気を　つくる\n器官が　発達した。"
          shield: "体の　黄色い　模様から\n強い　電気を　放つとき\nなぜか　すこし　微笑んでいる。"
        en:
          sword: "Thanks to bacteria that lived in the mud flats with\nit, this Pokémon developed the organs it uses to\ngenerate electricity."
          shield: "For some reason, this Pokémon smiles slightly\nwhen it emits a strong electric current from the\nyellow markings on its body."
        fr:
          sword: "Les vasières sont son habitat de prédilection.\nIl a développé un organe générant de l’électricité\ngrâce aux bactéries présentes dans la boue."
          shield: "Lorsque les parties jaunes de son corps envoient\nune puissante décharge électrique, il ébauche\nun sourire. Personne ne sait pourquoi."
        it:
          sword: "Abita i fondali che emergono durante la bassa\nmarea. Ha sviluppato un organo che produce\nelettricità grazie a un batterio che vive nel fango."
          shield: "Per qualche strano motivo accenna sempre\nun sorriso quando rilascia una forte scarica\nelettrica dai motivi gialli sul suo corpo."
        de:
          sword: "Dieses Pokémon lebt im Morast. Dank der\ndortigen Bakterien hat es ein Organ entwickelt,\nmit dem es Strom erzeugen kann."
          shield: "Es verteilt über das gelbe Muster auf seinem\nKörper starke Stromstöße. Immer wenn es Strom\nabsondert, grinst es. Niemand weiß, wieso."
        es:
          sword: "Vive en humedales costeros. Ha desarrollado un\nórgano que produce electricidad gracias a una\nbacteria que vive en el lodo."
          shield: "Se desconoce la razón, pero esboza una leve\nsonrisa al liberar potentes descargas eléctricas\na través de las zonas amarillentas de su cuerpo."
        ko:
          sword: "갯벌이 보금자리다.\n진흙 속에 사는 세균에 의해\n전기를 만드는 기관이 발달했다."
          shield: "몸의 노란 무늬에서\n강한 전기를 발산할 때\n무슨 이유인지 살짝 웃고 있다."
        zh_simp:
          sword: "潮间带便是它的巢穴。\n制造电的器官由于\n泥里的细菌而发达起来。"
          shield: "当从身上的黄色斑纹\n里释放出强大电流时，\n它会莫名地露出微笑。"
        zh_trad:
          sword: "潮間帶便是牠的巢穴。\n製造電的器官由於\n泥裡的細菌而發達起來。"
          shield: "當從身上的黃色斑紋\n裡釋放出強大電流時，\n牠會莫名地露出微笑。"
    stunfisk_galarian_form:
      form_id: 1
      names:
        jp_kana: ガラルのすがた
        jp_kanji: ガラルのすがた
        en: Galarian Form
        fr: Forme de Galar
        it: Forma di Galar
        de: Galar-Form
        es: Forma de Galar
        ko: 가라르의 모습
        zh_simp: 伽勒尔的样子
        zh_trad: 伽勒爾的樣子
      base_stats:
        hp: 109
        attack: 81
        defense: 99
        special_attack: 66
        special_defense: 84
