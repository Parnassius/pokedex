      descriptions:
        jp_kana:
          sword: "どんなに　みずが　よごれた\nかわでも　てきおうして　ふえていく\nタフな　せいめいりょくの　もちぬし。"
          shield: "がいこくから　やってきた　ポケモンが\nやせいかした。　どんなに　きたない\nかわでも　てきおうしてしまう。"
        jp_kanji:
          sword: "どんなに　水が　汚れた\n川でも　適応して　増えていく\nタフな　生命力の　持ち主。"
          shield: "外国から　やってきた　ポケモンが\n野生化した。　どんなに　汚い\n川でも　適応してしまう。"
        en:
          sword: "No matter how dirty the water in the river, it will\nadapt and thrive. It has a strong will to survive."
          shield: "It was originally a Pokémon from afar that escaped\nto the wild. It can adapt to the dirtiest river."
        fr:
          sword: "Sa nature robuste lui permet de prospérer\ndans n’importe quelles eaux, aussi polluées\nsoient-elles."
          shield: "Un Pokémon importé, retourné à l’état sauvage.\nIl s’adapte même aux rivières les plus polluées."
        it:
          sword: "La sua grande vitalità gli permette di adattarsi\ne proliferare anche nelle acque dei fiumi più\ninquinati."
          shield: "Importato dall’estero, si è successivamente\nrinselvatichito. Si adatta anche ai fiumi più\ninquinati."
        de:
          sword: "Egal, wie schmutzig der Fluss ist, in dem sie\nleben, sie passen sich daran an und vermehren\nsich. Sie sind hart im Nehmen."
          shield: "Es stammt eigentlich aus dem Ausland und\nverwilderte. Es passt sich auch an die dreckigsten\nFlüsse an."
        es:
          sword: "Por muy sucio o contaminado que esté el río, se\nadaptan rápido y se multiplican. Poseen una gran\nfuerza vital."
          shield: "Si bien procede del extranjero, ahora se halla en\nestado salvaje. Puede vivir hasta en los ríos más\nsucios."
        ko:
          sword: "심하게 오염된 강에서도\n적응해서 번식하는\n강인한 생명력의 소유자."
          shield: "외국에서 온 포켓몬이\n야생화했다. 아무리 더러운\n강이라도 적응해버린다."
        zh_simp:
          sword: "有着顽强生命力的宝可梦。\n不管河里的水有多脏，\n它都能适应并在那里繁衍生息。"
          shield: "来自于外国的宝可梦，\n现在已经回归了野生环境。\n不管多么污浊的河水都能适应。"
        zh_trad:
          sword: "有著頑強生命力的寶可夢。\n不論河裡的水有多髒\n都能適應並繁衍後代。"
          shield: "來自外國的寶可夢，\n現在已經回歸了野生環境。\n不管多麼污濁的河水都能適應。"
