          shield: "からだの　さいぼうは　じしゃくで\nできている。　けつえきの　かわりに\nじりょくが　ぜんしんを　めぐる。"
        jp_kanji:
          sword: "磁力を　お尻から　発生させ\n敵を　勢いよく　吸いよせて\n鋭い　ツメで　串刺しにする。"
          shield: "体の　細胞は　磁石で\nできている。　血液の　代わりに\n磁力が　全身を　巡る。"
        en:
          sword: "From its rear, Beldum emits a magnetic force that\nrapidly pulls opponents in. They get skewered on\nBeldum’s sharp claws."
          shield: "The cells in this Pokémon’s body are composed\nof magnetic material. Instead of blood, magnetic\nforces flow through Beldum’s body."
        fr:
          sword: "Ce Pokémon peut créer un champ magnétique\nderrière lui qui attire ses ennemis avec force.\nIl les embroche alors de ses griffes acérées."
          shield: "Les cellules de son corps sont composées\nd’aimants. Une force magnétique coule\ndans ses veines à la place du sang."
        it:
          sword: "Attira vigorosamente i nemici grazie alla potente\nforza magnetica generata dal didietro e li\ntrafigge con gli artigli affilati."
          shield: "Nel suo corpo, le cui cellule sono composte\nda calamite, scorre forza magnetica al posto\ndel sangue."
        de:
          sword: "Mit der Magnetkraft, die es an seinem Hinterteil\nerzeugt, zieht es Gegner ruckartig zu sich heran,\num sie mit seinen scharfen Krallen aufzuspießen."
          shield: "Die Zellen seines Körpers bestehen aus\nMagneten. Anstelle von Blut fließt magnetische\nEnergie durch Tanhel."
        es:
          sword: "Atrae con fuerza a sus enemigos debido al\nmagnetismo que emite por la parte trasera\ny les clava sus afilados ganchos."
          shield: "Las células de su cuerpo están hechas de imanes.\nEn lugar de sangre, una fuerza magnética recorre\nsu cuerpo."
        ko:
          sword: "엉덩이에서 자력을 발생시켜서\n상대를 기세 좋게 끌어들인 뒤\n날카로운 발톱으로 찔러버린다."
          shield: "몸의 세포가 자석으로\n되어 있다. 혈액 대신에\n자력이 온몸에 흐른다."
        zh_simp:
          sword: "从臀部发出磁力，猛地\n将敌人吸过来，然后用\n锐利的爪子把对方刺穿。"
          shield: "身体的细胞由磁铁构成。\n循环于全身的不是血液，\n而是磁力。"
        zh_trad:
          sword: "會從臀部放出磁力\n將敵人迅猛地吸到身邊，\n再以銳利的爪子刺穿對方。"
          shield: "身體的細胞都由磁鐵\n構成。在全身循環的\n不是血液，而是磁力。"
