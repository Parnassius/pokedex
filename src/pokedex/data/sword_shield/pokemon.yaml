          shield: "あぶなくなると　こうらに　てあしを\nひっこめて　みを　まもりながら\nくちから　みずを　ふきだしてくる。"
        jp_kanji:
          sword: "長い　首を　甲羅のなかに\n引っこめるとき　勢いよく\n水鉄砲を　発射する。"
          shield: "危なくなると　甲羅に　手足を\n引っこめて　身を　守りながら\n口から　水を　吹き出している。"
        en:
          sword: "When it retracts its long neck into its shell, it\nsquirts out water with vigorous force."
          shield: "When it feels threatened, it draws its limbs inside\nits shell and sprays water from its mouth."
        fr:
          sword: "Quand il rentre son cou dans sa carapace,\nil peut projeter de l’eau à haute pression."
          shield: "S’il se sent menacé, il rétracte ses pattes dans\nsa carapace pour se protéger et crache de l’eau."
        it:
          sword: "Quando ritrae il lungo collo dentro la corazza\nsputa un vigoroso getto d’acqua."
          shield: "Se si sente minacciato, ritira le zampe nel guscio\ne inizia a spruzzare acqua dalla bocca."
        de:
          sword: "Zieht es seinen langen Hals in seinen Panzer\nzurück, verspritzt es Wasser mit unbändiger Kraft."
          shield: "Fühlt es sich bedroht, verkriecht es sich in seinen\nPanzer und spuckt Wasser aus seinem Maul."
        es:
          sword: "Cuando retrae su largo cuello en el caparazón,\ndispara agua a una presión increíble."
          shield: "Cuando se siente en peligro, se esconde en su\ncaparazón y escupe chorros de agua por la boca."
        ko:
          sword: "기다란 목을 등껍질 속에\n감춘 다음 기세 좋게\n물대포를 발사한다."
          shield: "위험해지면 등껍질에 손발을\n감추고 몸을 지키면서\n입에서 물을 내뿜는다."
        zh_simp:
          sword: "当它把长长的脖子缩回\n壳里时，会顺势发射出\n力道强劲的水枪。"
          shield: "当它遇到危险的时候，\n会将四肢收回龟壳里保护自己，\n同时从嘴里喷出水来。"
        zh_trad:
          sword: "當牠把長長的脖子縮回\n殼裡時，會順勢發射\n力道強勁的水槍。"
          shield: "當牠遇到危險的時候，\n會將四肢收回甲殼裡保護自己，\n同時從嘴裡噴出水來。"
wartortle:
