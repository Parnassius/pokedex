      descriptions:
        jp_kana:
          sword: "ての　ひらから　でる　すいぶんを\nまるめて　つくった　みずの　たまを\nつかい　ずのうせんを　くりひろげる。"
          shield: "あたまが　よく　めんどうくさがり。\nナワバリに　てきが　ちかづかないよう\nそこかしこに　ワナを　しかけている。"
        jp_kanji:
          sword: "手のひらから　出る　水分を\n丸めて　つくった　水の　玉を\n使い　頭脳戦を　繰り広げる。"
          shield: "頭が　よく　面倒くさがり。\n縄張りに　敵が　近づかないよう\nそこかしこに　罠を　仕掛けている。"
        en:
          sword: "A clever combatant, this Pokémon battles using\nwater balloons created with moisture secreted\nfrom its palms."
          shield: "Highly intelligent but also very lazy,\nit keeps enemies out of its territory\nby laying traps everywhere."
        fr:
          sword: "Il crée des bombes à eau grâce au liquide\nqu’il sécrète avec la paume de ses mains.\nIl s’en sert dans les combats où la stratégie prime."
          shield: "Paresseux, mais malin, il parsème son territoire\nde pièges pour empêcher ses ennemis\nd’y pénétrer."
        it:
          sword: "Lotta in modo strategico servendosi di sfere\nche crea con l’acqua che fuoriesce dalle\nsue zampe."
          shield: "È intelligente ma svogliato. Dissemina di\ntrappole il suo territorio per tenere alla\nlarga i nemici."
        de:
          sword: "Das Sekret, das aus seinen Handflächen austritt,\nformt es zu Wasserkugeln. Diese nutzt es im\nKampf für taktisch ausgeklügelte Angriffe."
          shield: "Es ist intelligent, fühlt sich aber schnell von jeder\nKleinigkeit genervt. Damit kein Feind in sein\nRevier eindringt, stellt es überall Fallen auf."
        es:
          sword: "Crea bolas de agua con el líquido que segrega\npor las palmas de las manos y las usa en combate\nde forma estratégica."
          shield: "Es inteligente, pero no muestra especial interés\npor nada. Distribuye trampas por su territorio\npara mantener alejados a sus enemigos."
        ko:
          sword: "손바닥에서 나오는 수분을\n빚어서 만든 물구슬로\n두뇌 싸움을 펼친다."
          shield: "머리가 좋지만 귀찮음이 많다.\n영역에 적이 다가오지 못하게\n여기저기에 함정을 만들어 놓는다."
        zh_simp:
          sword: "很有战略头脑，\n会把手掌分泌出的水分\n做成水弹攻击敌人。"
          shield: "头脑聪明但是怕麻烦。\n为了不让敌人接近自己的地盘，\n在各个地方都设下了陷阱。"
        zh_trad:
          sword: "很有戰略頭腦，\n會把手掌分泌出的水分\n做成水彈攻擊敵人。"
          shield: "頭腦聰明但是很怕麻煩。\n為了不讓敵人接近自己的地盤，\n在各個地方都設下了陷阱。"
