      descriptions:
        jp_kana:
          sword: "よみがえった　こだいの　ポケモン。\nきしょうは　あらく　みがって。\nおおあごで　なんでも　かみくだく。"
          shield: "わがままだが　あまえんぼう。\nじゃれてるだけで　トレーナーに\nおおけがを　おわせてしまう。"
        jp_kanji:
          sword: "蘇った　古代の　ポケモン。\n気性は　荒く　身勝手。\n大顎で　なんでも　かみ砕く。"
          shield: "わがままだが　甘えん坊。\nじゃれてるだけで　トレーナーに\n大けがを　負わせてしまう。"
        en:
          sword: "This is an ancient Pokémon, revived in modern\ntimes. It has a violent disposition, and it’ll tear\napart anything it gets between its hefty jaws."
          shield: "This Pokémon is selfish and likes to be pampered.\nIt can also inflict grievous wounds on its Trainer\njust by playing around."
        fr:
          sword: "Ce Pokémon ancien a été ranimé à partir\nd’un fossile. Égoïste et violent, il peut détruire\nn’importe quoi avec son énorme mâchoire."
          shield: "Capricieux, il veut toujours être le centre\nde l’attention. Il peut gravement blesser\nson Dresseur en essayant de jouer avec lui."
        it:
          sword: "Un antico Pokémon rigenerato da un fossile.\nHa un’indole violenta ed egoista. Con la sua\nenorme mandibola fa a pezzi qualsiasi cosa."
          shield: "È capriccioso e ama farsi coccolare.\nQuando gioca con il suo Allenatore,\nrischia di ferirlo gravemente."
        de:
          sword: "Ein wiederbelebtes Pokémon aus der Urzeit.\nEs ist gewalttätig sowie egoistisch und zerbeißt\nalles mit seinem riesigen Kiefer."
          shield: "Es ist eigennützig und verzogen. Selbst wenn\nBalgoras nur spielen will, verletzt es dabei seinen\nTrainer manchmal schwer."
        es:
          sword: "Pokémon prehistórico recreado a partir de un\nfósil. De carácter violento y egoísta, sus enormes\nmandíbulas pueden triturar cualquier cosa."
          shield: "Un Pokémon un tanto egoísta y malcriado. Puede\nocasionar graves lesiones a su Entrenador incluso\njugando."
        ko:
          sword: "되살아난 고대의 포켓몬이다.\n거칠고 제멋대로인 기질을 지녔다.\n큰 턱으로 뭐든지 깨물어 부순다."
          shield: "제멋대로지만 응석꾸러기다.\n장난만 쳐도 트레이너에게\n큰 상처를 입히고 만다."
        zh_simp:
          sword: "复活而来的古代宝可梦。\n性格既粗野又任性，\n能用大颚咬碎任何东西。"
          shield: "又任性又爱撒娇。\n即使它只是闹着玩，\n也会让训练家受重伤。"
        zh_trad:
          sword: "復活的古代寶可夢。\n性情粗暴又任性。\n能用大顎咬碎任何東西。"
          shield: "任性且愛撒嬌。\n即使牠只是鬧著玩，\n也會讓訓練家受到重傷。"
