      descriptions:
        jp_kana:
          sword: "おびえると　タマネギ１００コぶんの\nさいるいせいぶんを　もつ　なみだを\nながして　もらいなき　させる。"
          shield: "ひふの　いろは　ぬれると　かわる。\nカモフラージュ　されたかの　ように\nすがたが　みえなく　なるのだ。"
        jp_kanji:
          sword: "怯えると　玉ねぎ１００個分の\n催涙成分を　もつ　涙を\n流して　もらい泣き　させる。"
          shield: "皮膚の　色は　濡れると　変わる。\nカモフラージュ　されたかの　ように\n姿が　見えなく　なるのだ。"
        en:
          sword: "When scared, this Pokémon cries. Its tears pack\nthe chemical punch of 100 onions, and attackers\nwon’t be able to resist weeping."
          shield: "When it gets wet, its skin changes color,\nand this Pokémon becomes invisible as if\nit were camouflaged."
        fr:
          sword: "Quand il a peur, il pleure des larmes contenant\nune substance lacrymogène d’une puissance\néquivalente à celle de cent oignons."
          shield: "Sa peau change de couleur et le rend invisible\nquand elle est mouillée, comme un camouflage."
        it:
          sword: "Se si spaventa, produce lacrime con un fattore\nlacrimogeno cento volte più potente di quello di\nuna cipolla per far piangere anche i nemici."
          shield: "Quando si bagna, la pelle cambia colore e lo\nrende invisibile, come se si fosse mimetizzato."
        de:
          sword: "Hat es Angst, vergießt es Tränen, die Reizstoffe\nenthalten, welche andere ebenfalls zum Weinen\nbringen. Sie sind so stark wie 100 Zwiebeln."
          shield: "Wird seine Haut feucht, ändert sich ihre Farbe.\nDies dient ihm zur Tarnung, da man es dann\nnicht mehr sehen kann."
        es:
          sword: "Cuando se espanta, libera unas lágrimas con un\nfactor lacrimógeno equivalente a 100 cebollas\npara hacer llorar también al rival."
          shield: "Al mojarse, su piel cambia de color y pasa a ser\ninvisible, como si se hubiese camuflado."
        ko:
          sword: "겁을 먹으면 양파 100개와 맞먹는\n최루 성분의 눈물을 흘려서\n상대도 덩달아 울게 만든다."
          shield: "젖으면 피부색이 변한다.\n위장한 것처럼\n모습이 보이지 않게 된다."
        zh_simp:
          sword: "害怕时流下的泪水中含有\n相当于１００颗洋葱的催泪成分，\n能让对手泪流不止。"
          shield: "皮肤在湿掉时会变色，\n仿佛像是隐身了一样，\n谁都看不见它的身影。"
        zh_trad:
          sword: "害怕時流下的淚水中含有\n相當於１００顆洋蔥的催淚成分，\n能讓對手淚流不止。"
          shield: "皮膚在濕掉時會變色，\n彷彿像是隱身了一樣，\n誰都看不見牠的身影。"
drizzile:
