        en:
          sword: "After nightfall, they emerge from the caves they\nnest in during the day. Using their ultrasonic\nwaves, they go on the hunt for ripened fruit."
          shield: "No wavelength of sound is beyond Noibat’s\nability to produce. The ultrasonic waves it\ngenerates can overcome much larger Pokémon."
        fr:
          sword: "À la tombée de la nuit, il quitte la grotte\noù il réside et s’envole à la recherche de fruits\nmûrs avec ses ultrasons."
          shield: "Il peut contrôler des ondes à n’importe quelle\nfréquence du spectre. Même les plus grands\nPokémon ne peuvent supporter ses ultrasons."
        it:
          sword: "La sera esce dalla grotta in cui vive e vola\nin cerca di frutti maturi, che individua grazie\nagli ultrasuoni."
          shield: "Controlla onde sonore di qualsiasi frequenza.\nNemmeno i Pokémon più grandi riescono a\nsopportare i suoi ultrasuoni."
        de:
          sword: "Bei Sonnenuntergang verlässt es seine Höhle und\ngeht mithilfe von Ultraschallwellen auf die Suche\nnach reifem Obst."
          shield: "Es kann Schallwellen verschiedenster Frequenzen\nfreisetzen. Selbst große Pokémon können seinem\nBeschuss mit Ultraschallwellen nicht standhalten."
        es:
          sword: "Al caer la noche, abandona su cueva y revolotea\nen busca de fruta madura, que localiza mediante\nondas ultrasónicas."
          shield: "Su registro vocal cubre todo el espectro de\nfrecuencias. Ni los Pokémon más grandes\nsoportan las ondas ultrasónicas que emite."
        ko:
          sword: "해가 지면 둥지인 동굴을\n나와 날아다니며 잘 익은\n과일을 초음파로 찾는다."
          shield: "온갖 주파수의 음파를 조종한다.\n초음파를 맞으면 거대한 몸집의\n포켓몬도 견디지 못한다."
        zh_simp:
          sword: "到了太阳落山时，\n它便会离开居住的洞窟四处飞行，\n用超音波寻找熟透的果实。"
          shield: "可以控制所有频率的音波。\n就算是体型巨大的宝可梦，\n也对它的超音波束手无策。"
        zh_trad:
          sword: "每到太陽下山時，\n牠便會離開居住的洞窟四處飛行，\n用超音波尋找熟透的果實。"
          shield: "可以控制所有頻率的音波。\n就算是體型巨大的寶可夢，\n也對牠的超音波束手無策。"
noivern:
