      descriptions:
        jp_kana:
          sword: "おおぜいの　コマタナを　したがえる。\nてしたたちが　うらぎらない　よう\nつねに　めを　ひからせている。"
          shield: "やいばを　とぐ　いしが　ある\nばしょを　めぐって　オノンドと\nはげしい　あらそいを　くりひろげる。"
        jp_kanji:
          sword: "大勢の　コマタナを　従える。\n手下たちが　裏切らない　よう\n常に　目を　光らせている。"
          shield: "刃を　研ぐ　石が　ある\n場所を　めぐって　オノンドと\n激しい　争いを　繰りひろげる。"
        en:
          sword: "It’s accompanied by a large retinue of Pawniard.\nBisharp keeps a keen eye on its minions, ensuring\nnone of them even think of double-crossing it."
          shield: "Violent conflicts erupt between Bisharp and\nFraxure over places where sharpening stones\ncan be found."
        fr:
          sword: "Il dirige des cohortes de Scalpion.\nIl garde constamment ses sous-fifres à l’œil\npour parer à toute velléité de mutinerie."
          shield: "Sa recherche des meilleurs endroits où trouver\ndes pierres pour affûter ses lames le conduit\nsouvent à affronter des Incisache."
        it:
          sword: "È sempre accompagnato da molti Pawniard.\nPer evitare che si verifichino ammutinamenti,\nli tiene sempre sotto stretta sorveglianza."
          shield: "Affronta spesso Fraxure in violenti scontri\nper il controllo dei territori in cui si trovano\nle pietre che usa per affilare le sue lame."
        de:
          sword: "Es hat stets ein Gefolge aus mehreren Gladiantri\nund achtet immer streng darauf, dass ihm keiner\nseiner Handlanger in den Rücken fällt."
          shield: "Sie streiten sich mit Sharfax aufs Heftigste um\ndas Vorrecht auf Orte mit Felsen, an denen\nsie ihre Klingen schärfen können."
        es:
          sword: "Siempre va acompañado por un nutrido séquito\nde Pawniard, a los que no pierde nunca de vista\npara evitar posibles motines."
          shield: "Libra encarnizados combates con los Fraxure por\nel control de los emplazamientos donde se hallan\nlas piedras con las que afila sus cuchillas."
        ko:
          sword: "많은 수의 자망칼을 거느리고 있다.\n부하들이 배신하지 못하도록\n항상 눈에 불을 켜고 있다."
          shield: "칼날을 가는 돌의\n장소를 두고 액슨도와\n격렬하게 싸움을 벌인다."
        zh_simp:
          sword: "率领着一大群驹刀小兵。\n为了防止手下们背叛自己，\n总是睁大着眼睛监视它们。"
          shield: "为了抢占能找到磨刀石\n的地方，和斧牙龙展开了\n激烈的斗争。"
        zh_trad:
          sword: "率領著一大群駒刀小兵。\n為了防止手下們背叛自己，\n總是睜大著眼睛監視牠們。"
          shield: "為了搶佔能找到磨刀石\n的地方，和斧牙龍展開了\n激烈的鬥爭。"
