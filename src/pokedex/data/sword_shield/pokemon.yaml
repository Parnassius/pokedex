          sword: "ガラルの　とある　ちいきでは\nこおりの　じょおうと　よんで\nルージュラを　おそれあがめていた。"
          shield: "ガラルの　ルージュラは　うつくしく\nせんさいな　なきごえを　もつものが\nおおく　ファンも　いるほど。"
        jp_kanji:
          sword: "ガラルの　とある　地域では\n氷の　女王と　呼んで\nルージュラを　恐れ崇めていた。"
          shield: "ガラルの　ルージュラは　美しく\n繊細な　鳴き声を　持つものが　多く\nファンも　いるほど。"
        en:
          sword: "In certain parts of Galar, Jynx was once feared\nand worshiped as the Queen of Ice."
          shield: "The Jynx of Galar often have beautiful and\ndelicate voices. Some of these Pokémon have\neven gathered a fan base."
        fr:
          sword: "Dans une certaine zone de Galar, Lippoutou\nétait craint et vénéré par la population qui l’avait\nsurnommé la « reine des glaces »."
          shield: "Les Lippoutou vivant à Galar sont souvent dotés\nd’une belle voix cristalline, ce qui leur vaut\nd’attirer des fans."
        it:
          sword: "In una certa zona di Galar, Jynx era temuto\ne venerato dagli abitanti, che lo chiamavano\n“Regina dei ghiacci”."
          shield: "La maggior parte dei Jynx di Galar hanno\nuna voce talmente incantevole e delicata\nda avere addirittura dei fan."
        de:
          sword: "In einer bestimmten Gegend von Galar wurde\nRossana einst als „Königin des Eises“\ngleichermaßen gefürchtet wie verehrt."
          shield: "Viele Rossana in Galar verfügen über solch eine\nschöne und zarte Stimme, dass sie sogar eine\nFangemeinde haben."
        es:
          sword: "En cierta parte de Galar se conocía a Jynx como\nla Reina del Hielo y se reverenciaba con cierto\ntemor."
          shield: "Los ejemplares que habitan en Galar poseen\nuna voz tan delicada y hermosa que incluso\ncuentan con su propio grupo de admiradores."
        ko:
          sword: "가라르의 어느 지역에서는\n얼음의 여왕이라고 부르며\n루주라를 두려워하며 받들었다."
          shield: "가라르에는 아름답고 섬세한\n울음소리를 가진 루주라가\n많아서 팬도 있을 정도다."
        zh_simp:
          sword: "在伽勒尔的某些地方，\n迷唇姐被称作冰之女王，\n受到人们的畏惧与崇拜。"
          shield: "伽勒尔的迷唇姐外表靓丽，\n拥有纤细叫声的也不在少数，\n甚至有为其着迷的粉丝。"
        zh_trad:
          sword: "在伽勒爾的某個地區，\n人們稱迷唇姐為冰之女王，\n並且敬畏崇拜牠。"
          shield: "許多伽勒爾的迷唇姐擁有\n美麗又纖細的聲音，甚至\n有一批對牠們著迷的粉絲。"
