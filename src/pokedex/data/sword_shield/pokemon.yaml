          shield: "しっぽの　さきから　とばす　しるの\nにおいは　きょうれつ。　じめんに\nあなを　ほって　すあなを　つくる。"
        jp_kanji:
          sword: "お腹に　溜めこんだ　臭い　汁を\n尻尾から　飛ばして　戦う。\nにおいは　食べ物で　変わるのだ。"
          shield: "尻尾の　先から　飛ばす　汁の\nにおいは　強烈。　地面に\n穴を　掘って　巣穴を　つくる。"
        en:
          sword: "In its belly, it reserves stinky fluid that it shoots\nfrom its tail during battle. As this Pokémon’s diet\nvaries, so does the stench of its fluid."
          shield: "It digs holes in the ground to make its nest.\nThe stench of the fluid it lets fly from the tip\nof its tail is extremely potent."
        fr:
          sword: "Il se bat en projetant avec sa queue un liquide\nnauséabond qu’il stocke dans son ventre.\nL’odeur varie selon ce qu’il mange."
          shield: "Ce Pokémon, qui creuse son terrier dans le sol,\npeut projeter un liquide à l’odeur infecte avec\nle bout de sa queue."
        it:
          sword: "Lotta spruzzando dalla coda il liquido puzzolente\naccumulato nel ventre. L’odore cambia a\nseconda del cibo di cui si è nutrito."
          shield: "Il fluido che spruzza dalla punta della coda\nha un odore tremendo. Costruisce la tana\nscavando un buco nel terreno."
        de:
          sword: "In seinem Magen speichert es eine stinkende\nFlüssigkeit, die es im Kampf aus seinem Schweif\nsprüht. Ihr Geruch hängt von seiner Nahrung ab."
          shield: "Die Flüssigkeit, die es aus seinem Schweif sprüht,\nhat einen sehr starken Geruch. Es errichtet seinen\nBau, indem es Löcher in den Boden gräbt."
        es:
          sword: "Ataca expulsando por la cola un fluido apestoso\nque almacena en el vientre y cuyo hedor es\ndistinto en función de su dieta."
          shield: "El fluido que expulsa por la punta de la cola\nemana una hediondez insoportable. Construye\nsus madrigueras cavando hoyos en la tierra."
        ko:
          sword: "배 안에 모아둔 역한 분비액을\n꼬리에서 뿜어서 싸운다.\n냄새는 먹은 것에 따라 달라진다."
          shield: "꼬리 끝에서 날리는 분비액의\n냄새는 강렬하다.\n땅에 구멍을 파서 굴을 만든다."
        zh_simp:
          sword: "会在肚子里囤满臭液，\n从尾巴喷出臭液攻击敌人。\n臭味会因吃下的东西而不同。"
          shield: "从尾巴尖端喷出的液体\n带有强烈的恶臭。\n会在地面上挖洞建造巢穴。"
        zh_trad:
          sword: "會在肚子裡囤滿臭液，\n從尾巴噴出臭液攻擊敵人。\n臭味會依吃下的東西而不同。"
          shield: "從尾巴尖端噴出的液體\n帶有強烈的惡臭。\n會在地面上挖洞建造巢穴。"
