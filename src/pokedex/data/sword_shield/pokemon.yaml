          shield: "まんかいの　はなびら　から\nただよう　かすかな　かおりが\nむしポケモンを　あつめる。"
        jp_kanji:
          sword: "太陽の　光を　浴びて\n元気いっぱいの　姿。\n日暮れまでは　活発だ。"
          shield: "満開の　花びら　から\nただよう　かすかな　香りが\n虫ポケモンを　集める。"
        en:
          sword: "After absorbing plenty of sunlight, Cherrim takes\nthis form. It’s full of energy while it’s like this,\nand its liveliness will go on until sundown."
          shield: "The faint scent that emanates from its full\nblossom entices bug Pokémon to it."
        fr:
          sword: "Il prend cette forme lorsqu’il a fait le plein\nde soleil. Il déborde alors d’énergie et reste\ntrès actif jusqu’au crépuscule."
          shield: "Les pétales de sa fleur épanouie émettent\nune odeur délicate qui attire les Pokémon Insecte."
        it:
          sword: "Assume questa forma dopo essersi esposto\nalla luce solare e aver fatto il pieno di energia.\nResta vivace fino al crepuscolo."
          shield: "Il profumo delicato emanato dai suoi petali\nin piena fioritura attira i Pokémon di tipo\nColeottero."
        de:
          sword: "Diese Form nimmt Kinoso an, wenn es viel Sonne\ngetankt und dadurch seine Energie aufgefüllt hat.\nEs bleibt bis zum Sonnenuntergang aktiv."
          shield: "Wenn es in voller Blüte steht, strömt es einen\nzarten Duft aus, der Käfer-Pokémon anlockt."
        es:
          sword: "Adopta esta forma cuando lo bañan los rayos\ndel sol. Siempre está rebosante de energía y se\nmantiene activo hasta el ocaso."
          shield: "Cuando abre sus pétalos, libera una sutil\nfragancia que atrae a los Pokémon insecto."
        ko:
          sword: "태양의 빛을 받아\n기운이 넘치는 모습.\n해가 지기 전까지는 활발하다."
          shield: "만개한 꽃잎에서\n감도는 희미한 향기가\n벌레포켓몬을 끌어모은다."
        zh_simp:
          sword: "充分沐浴到阳光后\n活力满满的样子。\n会一直活泼到日落。"
          shield: "盛开的花瓣中散发出\n的微微的香气会吸引\n虫宝可梦聚集而来。"
        zh_trad:
          sword: "充分沐浴到陽光後\n活力滿滿的樣子。\n會一直活潑到日落。"
          shield: "盛開的花瓣中散發出\n的微微香氣會吸引\n蟲寶可夢聚集而來。"
