  gmax_forms:
    alcremie_gigantamax:
      form_id: 999
      names:
        jp_kana: キョダイマックス
        jp_kanji: キョダイマックス
        en: Gigantamax
        fr: Gigamax
        it: Gigamax
        de: Gigadynamax
        es: Gigamax
        ko: 거다이맥스
        zh_simp: 超极巨化
        zh_trad: 超極巨化
      descriptions:
        jp_kana:
          sword: "むげんに　あふれだす　クリームの\nからだは　うける　しょうげきが\nつよいほど　かたく　かたまるのだ。"
          shield: "１ぱつ　１０まん　キロカロリーの\nクリームの　ミサイルを　らんしゃ。\nあびると　あたまが　クラクラするぞ。"
        jp_kanji:
          sword: "無限に　溢れだす　クリームの\n体は　受ける　衝撃が\n強いほど　硬く　固まるのだ。"
          shield: "１発　１０万　キロカロリーの\nクリームの　ミサイルを　乱射。\n浴びると　頭が　クラクラするぞ。"
        en:
          sword: "Cream pours endlessly from this Pokémon’s body.\nThe cream stiffens when compressed by an\nimpact. A harder impact results in harder cream."
          shield: "It launches swarms of missiles, each made of\ncream and loaded with 100,000 kilocalories.\nGet hit by one of these, and your head will swim."
        fr:
          sword: "Plus on le frappe fort, plus son corps,\nqui dégouline toujours de crème, se raffermit."
          shield: "Un seul tir de ses missiles à la crème ne contient\npas moins de 100 000 kilocalories.\nLes ennemis touchés sont pris de vertige."
        it:
          sword: "Il suo corpo, dal quale trabocca panna senza\nsosta, diventa tanto più duro quanto più\nforti sono gli attacchi che subisce."
          shield: "Lancia missili di panna dall’apporto calorico\ndi 100.000 chilocalorie l’uno. Chi viene colpito\nè preso da fortissimi giramenti di testa."
        de:
          sword: "Aus seinem Körper strömt unaufhörlich Sahne,\ndie umso steifer wird, je mehr starke Attacken\nes einsteckt."
          shield: "Es feuert Raketen aus Sahne ab, die jeweils\n100 000 kcal enthalten. Wer diese Sahnedusche\nabbekommt, dem schwirrt der Kopf."
        es:
          sword: "Su cuerpo rezuma nata sin cesar. Cuanto más\npotentes sean los ataques que recibe, más\nconsistente se vuelve."
          shield: "Los proyectiles de nata que dispara tienen un\naporte energético de 100 000 kcal y provocan\nfuertes mareos a quienes alcanzan."
        ko:
          sword: "무한히 넘쳐흐르는 크림으로 된 몸은\n받는 충격이 강할수록\n단단하게 굳어진다."
          shield: "1발에 10만kcal의\n크림 미사일을 난사한다.\n맞으면 머리가 어질어질하다."
        zh_simp:
          sword: "身体会溢出无限的鲜奶油。\n受到的冲击越大，鲜奶油\n就会变得越坚硬。"
          shield: "会胡乱发射１发１０万\n千卡的鲜奶油飞弹。\n如果被其中就会头昏眼花。"
        zh_trad:
          sword: "身體會溢出無限的鮮奶油。\n受到的衝擊越大，鮮奶油\n就會變得越堅硬。"
          shield: "會胡亂發射１發熱量高達\n１０萬大卡的鮮奶油飛彈。\n如果被擊中就會頭昏眼花。"
