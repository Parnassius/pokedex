        jp_kana:
          sword: "おなかの　うずは　ずっと　みていると\nねむくなる。　こもりうた　がわりに\nこどもを　ねつかせるのにも　つかう。"
          shield: "ぬめぬめとした　ねんえきじょうの\nあせを　かく。　てきに　つかまっても\nぬるりと　すりぬけ　にげるのだ。"
        jp_kanji:
          sword: "お腹の　渦は　ずっと　見ていると\n眠くなる。　子守唄がわりに\n子どもを　寝つかせるのにも　使う。"
          shield: "ぬめぬめとした　粘液状の\n汗を　かく。　敵に　捕まっても\nぬるりと　すり抜け　逃げるのだ。"
        en:
          sword: "Staring at the swirl on its belly causes drowsiness.\nThis trait of Poliwhirl’s has been used in place of\nlullabies to get children to go to sleep."
          shield: "This Pokémon’s sweat is a slimy mucus. When\ncaptured, Poliwhirl can slither from its enemies’\ngrasp and escape."
        fr:
          sword: "Il suffit de fixer la spirale sur son ventre pour\ns’assoupir. On se sert parfois de lui à la place\nd’une berceuse pour endormir les enfants."
          shield: "Il sécrète une sorte de mucus huileux qui lui\npermet d’échapper aux ennemis qui tentent\nde l’attraper."
        it:
          sword: "Chi fissa a lungo il disegno spiraliforme sul ventre\nsi assopisce, tant’è che Poliwhirl lo utilizza al\nposto della ninnananna per far dormire i piccoli."
          shield: "Secerne un sudore viscido simile a muco,\ngrazie al quale riesce a fuggire sgusciando\nvia dalla presa dei nemici."
        de:
          sword: "Wer länger auf seine Bauchspirale blickt, wird\nschläfrig. Manche Leute nutzen dies anstelle\neines Schlaflieds, damit ihre Kinder einschlafen."
          shield: "Quaputzi schwitzt glitschigen Schleim, dank dem\nes leicht der Umklammerung eines Feindes\nentkommen kann."
        es:
          sword: "Mirar fijamente la espiral de su vientre provoca\nsomnolencia, por lo que puede usarse como\nalternativa a las nanas para dormir a los niños."
          shield: "Secreta un sudor viscoso que le sirve para\nescurrirse y escapar del agarre de sus enemigos."
        ko:
          sword: "배의 소용돌이를 계속 보다 보면\n잠이 온다. 자장가 대용으로\n아이를 재울 때도 사용한다."
          shield: "미끈미끈한 점액 형태의\n땀을 흘린다. 적에게 붙잡혀도\n스르륵 빠져나와 도망친다."
        zh_simp:
          sword: "如果一直盯着它腹部的旋涡看，\n就会变得很困。它会利用这花纹\n来代替摇篮曲去哄孩子睡觉。"
          shield: "流出的汗是黏滑的粘液状。\n即使被敌人捉住，\n也能哧溜一下滑走逃脱。"
        zh_trad:
          sword: "一直盯著牠肚子上的漩渦看，\n就會想睡覺。牠會利用這花紋\n來代替搖籃曲去哄孩子睡覺。"
          shield: "流的汗是又黏又滑的黏液狀。\n即使被敵人捉住，\n也能滑溜溜地輕易逃脫。"
