      types:
        - psychic
        - fairy
      egg_groups:
        - fairy
      abilities:
        - healer
        - anticipation
      hidden_ability: magic_bounce
      descriptions:
        jp_kana:
          sword: "ずつうになるほどの　サイコパワーを\nしゅういに　はなって　ほかの\nせいぶつを　とおざけているのだ。"
          shield: "べつめいは　もりの　まじょ。\nさわぎたてると　しょくしゅのツメで\nひきさかれるかも　しれないぞ。"
        jp_kanji:
          sword: "頭痛になるほどの　サイコパワーを\n周囲に　放って　ほかの\n生物を　遠ざけているのだ。"
          shield: "別名は　森の　魔女。\n騒ぎたてると　触手のツメで\n引き裂かれるかも　しれないぞ。"
        en:
          sword: "It emits psychic power strong enough to cause\nheadaches as a deterrent to the approach\nof others."
          shield: "If you’re too loud around it, you risk being torn\napart by the claws on its tentacle. This Pokémon\nis also known as the Forest Witch."
        fr:
          sword: "Il éloigne les autres êtres vivants en émettant\ndes ondes psychiques pouvant donner\ndes maux de tête épouvantables."
          shield: "On l’appelle aussi la « sorcière de la forêt ».\nCe Pokémon lacère quiconque fait trop de bruit\navec les griffes de son tentacule."
        it:
          sword: "Tiene alla larga gli esseri viventi che si trovano\nnei paraggi emettendo onde psichiche così forti\nda far venire il mal di testa."
          shield: "È conosciuto anche come “maga del bosco”.\nSe qualcuno fa troppo chiasso rischia di essere\nfatto a pezzettini dagli artigli sul suo tentacolo."
        de:
          sword: "Die starken Psycho-Kräfte, die es ausstrahlt,\nrufen Kopfschmerzen hervor. So hält es andere\nLebewesen von sich fern."
          shield: "Es wird auch „Hexe des Waldes“ genannt. Wer\nLärm veranstaltet, wird unter Umständen von der\nKlaue an seinem Fühler auseinandergenommen."
        es:
          sword: "Para mantener alejados a los demás seres vivos,\nemana a su alrededor ondas psíquicas cuya\npotencia es capaz de provocar jaquecas."
          shield: "Recibe el apodo de Hechicera del Bosque.\nQuienes arman demasiado barullo se exponen a\nser despedazados por las garras de su tentáculo."
        ko:
          sword: "두통이 생길 정도의 사이코 파워를\n주위에 발산해서 다른 생물이\n접근하지 못하게 한다."
          shield: "숲의 마녀라는 별명을 가졌다.\n소란을 피우면 촉수의 손톱에\n찢겨질지도 모른다."
        zh_simp:
          sword: "由于会朝四周释放足以\n引起头痛的精神力量，\n其他生物都躲得远远的。"
          shield: "又被称为森林魔女。\n如果有人大吵大闹，可能会\n被它用触手上的爪子撕碎。"
        zh_trad:
          sword: "由於會朝四周釋放足以\n引起頭痛的精神力量，\n其他生物都躲得遠遠的。"
          shield: "又被稱為森林魔女。\n如果有人大吵大鬧，可能會\n被牠用觸手上的爪子撕碎。"
  gmax_forms:
