      descriptions:
        jp_kana:
          sword: "たいないで　せきたんを　つくりだす。\nむかしの　ガラルでは　おとした\nせきたんを　せいかつに　りようした。"
          shield: "あしを　こうそくで　かいてんさせて\nじそく３０キロで　はしる。　せっし\n１０００どの　ほのおを　ふきだす。"
        jp_kanji:
          sword: "体内で　石炭を　つくりだす。\n昔の　ガラルでは　落とした\n石炭を　生活に　利用した。"
          shield: "脚を　高速で　回転させて\n時速３０キロで　走る。　摂氏\n１０００度の　炎を　噴き出す。"
        en:
          sword: "It forms coal inside its body. Coal dropped by\nthis Pokémon once helped fuel the lives of\npeople in the Galar region."
          shield: "By rapidly rolling its legs, it can travel at over\n18 mph. The temperature of the flames it\nbreathes exceeds 1,800 degrees Fahrenheit."
        fr:
          sword: "Il produit du charbon dans son corps. Jadis, les\nhabitants de Galar ramassaient ce charbon au sol\net s’en servaient pour leurs besoins quotidiens."
          shield: "Il peut faire tourner ses pattes très vite\npour se déplacer à une vitesse de 30 km/h.\nIl peut aussi souffler des flammes à 1 000 °C."
        it:
          sword: "Gli antichi abitanti di Galar usavano il carbone\nprodotto da questo Pokémon all’interno del suo\ncorpo per le loro necessità quotidiane."
          shield: "Corre a 30 km/h facendo girare velocemente\nle zampe. Emette fiamme a 1.000 ºC."
        de:
          sword: "Es produziert Steinkohle in seinem Körper.\nDie von ihm abfallende Kohle wurde früher in\nder Galar-Region fürs tägliche Leben genutzt."
          shield: "Es dreht seine Füße mit hoher Geschwindigkeit\nund kann sich dadurch bis zu 30 km/h schnell\nbewegen. Es speit 1 000 ºC heiße Flammen."
        es:
          sword: "Forma carbón en el interior de su cuerpo. Los\nantiguos habitantes de Galar lo aprovechaban\npara sus labores diarias."
          shield: "Gira las patas a gran velocidad para correr a\nunos 30 km/h. Emite llamas a una temperatura\nde 1000 °C."
        ko:
          sword: "체내에서 석탄을 만들어 낸다.\n과거의 가라르에서는 떨어뜨린\n석탄을 생활에 이용했다."
          shield: "다리를 고속으로 회전시켜\n시속 30km로 달린다.\n섭씨 1000도의 불꽃을 내뿜는다."
        zh_simp:
          sword: "能在体内制造煤炭。\n在过去，伽勒尔人曾经用\n它身上掉下来的煤炭生活。"
          shield: "能通过高速旋转自己的脚，\n以３０公里的时速奔跑。\n能喷出１０００度的火焰。"
        zh_trad:
          sword: "能在體內製造煤炭。\n在過去，伽勒爾人曾經用\n牠身上掉下來的煤炭生活。"
          shield: "能透過高速旋轉自己的腳，\n以３０公里的時速奔跑。\n能噴出攝氏１０００度的火焰。"
coalossal:
