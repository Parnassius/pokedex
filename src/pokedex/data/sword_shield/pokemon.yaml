          shield: "まだ　でんきを　ためるのが　へた。\nでんきを　たべるために　みんかに\nしのびこみ　コンセントを　さがす。"
        jp_kanji:
          sword: "嵐が　近づくと　落ち着きが\nなくなる。　雷の　音が　聞こえると\nたまらず　騒ぎだす。"
          shield: "まだ　電気を　溜めるのが　下手。\n電気を　食べるために　民家に\n忍びこみ　コンセントを　探す。"
        en:
          sword: "When a storm approaches, this Pokémon gets\nrestless. Once Elekid hears the sound of thunder,\nit gets full-on rowdy."
          shield: "It’s not good at storing electricity yet. This\nPokémon sneaks into people’s homes, looking\nfor electrical outlets to eat electricity from."
        fr:
          sword: "Il ne tient plus en place quand un orage\napproche. Lorsqu’il entend le tonnerre\ngronder, il devient tout excité."
          shield: "Il a encore du mal à emmagasiner l’électricité.\nPour s’en nourrir, il se faufile dans les maisons\nà la recherche de prises électriques."
        it:
          sword: "Quando si sta per scatenare una tempesta perde\nil controllo. Si fa prendere dall’agitazione\nse sente il rombo dei tuoni."
          shield: "Non è ancora abile nell’immagazzinare elettricità.\nSi intrufola nelle abitazioni in cerca di prese\ndi corrente, che sfrutta per nutrirsi."
        de:
          sword: "Nähert sich ein Sturm, wird Elekid unruhig.\nSobald es Donnergrollen hört, ist es nicht\nmehr zu halten und fängt an zu toben."
          shield: "Es kann Elektrizität noch nicht so gut speichern.\nUm sich diese einzuverleiben, schleicht es sich\nauf der Suche nach Steckdosen in fremde Häuser."
        es:
          sword: "Cuando se acerca una tormenta, pierde la\ncompostura. Si oye el sonido de un trueno,\nno se puede contener y monta un revuelo."
          shield: "No se le da bien acumular electricidad, por lo\nque se cuela en las casas en busca de enchufes\npara alimentarse."
        ko:
          sword: "폭풍우가 다가오면 안절부절못한다.\n천둥소리가 들리면\n참지 못하고 동요하기 시작한다."
          shield: "아직 전기를 모으는 게 서툴다.\n전기를 먹기 위해 민가에\n숨어들어 콘센트를 찾는다."
        zh_simp:
          sword: "一旦暴风雨将至\n就会变得非常浮躁。\n听到雷鸣便会难掩兴奋。"
          shield: "储存电力的本领还不到家。\n为了吸取电力，会偷偷\n潜入民宅寻找插座。"
        zh_trad:
          sword: "暴風雨靠近時就會變得\n坐立難安。一聽到打雷聲，\n就會按捺不住地吵鬧起來。"
          shield: "還不擅長儲存電力。\n為了吸食電力，會偷偷\n潛入民宅尋找插座。"
magby:
  species_id: 240
  names:
    jp_kana: ブビィ
    jp_kanji: ブビィ
    en: Magby
    fr: Magby
    it: Magby
    de: Magby
    es: Magby
    ko: 마그비
    zh_simp: 鸭嘴宝宝
    zh_trad: 鴨嘴寶寶
  forms:
    magby:
      form_id: 0
      base_stats:
        hp: 45
        attack: 75
        defense: 37
        special_attack: 70
        special_defense: 55
        speed: 83
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
