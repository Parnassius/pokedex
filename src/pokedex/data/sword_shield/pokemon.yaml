      descriptions:
        jp_kana:
          sword: "するどいツメを　ゆびの　なかに\nかくしている。　いきなり　のばして\nおそってきた　あいてを　ひるませる。"
          shield: "ずるがしこく　どうもうな　せいしつ。\nおやが　いない　スキに　すあなに\nしんにゅう。　タマゴを　ぬすみだす。"
        jp_kanji:
          sword: "鋭いツメを　指の　中に\n隠している。　いきなり　伸ばして\n襲ってきた　相手を　ひるませる。"
          shield: "ずる賢く　獰猛な　性質。\n親が　いない　隙に　巣穴に\n侵入。　タマゴを　盗みだす。"
        en:
          sword: "Its paws conceal sharp claws. If attacked, it\nsuddenly extends the claws and startles\nits enemy."
          shield: "It has a cunning yet savage disposition.\nIt waits for parents to leave their nests,\nand then it sneaks in to steal their eggs."
        fr:
          sword: "Ses griffes acérées sont cachées dans ses doigts.\nS’il se fait attaquer, il les sort pour effrayer\nson agresseur."
          shield: "Un Pokémon aussi cruel que fourbe.\nIl se glisse dans le nid des autres Pokémon\nen leur absence pour dérober leurs Œufs."
        it:
          sword: "Intimidisce l’avversario sfoderando all’improvviso\ngli affilati artigli nascosti nelle sue zampe."
          shield: "È furbo e feroce. Si intrufola nei nidi incustoditi\nper rubare le Uova mentre i genitori sono assenti."
        de:
          sword: "In seinen Pfoten stecken scharfe Krallen. Es fährt\nsie blitzschnell aus, um Gegner zu überraschen."
          shield: "Dieses durchtriebene und gewissenlose Pokémon\nbeobachtet Nester, bis die Eltern ausgeflogen\nsind, und stiehlt dann deren Eier."
        es:
          sword: "Sus patas ocultan garras sumamente afiladas,\nque extiende de repente para intimidar al\nenemigo en caso de amenaza."
          shield: "Es un Pokémon de naturaleza astuta y fiera. Se\ncuela en los nidos de otros Pokémon cuando no\nestán y roba sus huevos."
        ko:
          sword: "예리한 손톱을 손가락 안에\n감추고 있다. 갑자기 뻗어서\n습격해온 상대를 풀죽게 만든다."
          shield: "교활하고 사나운 성질을 가졌다.\n부모가 없는 틈에\n둥지로 침입해서 알을 훔친다."
        zh_simp:
          sword: "手指中藏有锋利的爪子。\n会突然伸出那利爪，\n让袭击过来的对手心生怯意。"
          shield: "狡黠凶恶的性格。\n趁着双亲不在就侵入巢穴，\n将蛋盗出。"
        zh_trad:
          sword: "手指中藏有鋒利的爪子。\n會突然伸出利爪，\n讓襲擊自己的對手心生怯意。"
          shield: "性格狡猾且凶猛。\n會趁著雙親不在時\n侵入巢穴把蛋盜走。"
