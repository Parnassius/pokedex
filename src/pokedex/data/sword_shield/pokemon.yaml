      descriptions:
        jp_kana:
          sword: "しせんが　あったら　キケン！\nあいてを　えらばず　ずつきで\nおそってくる　やっかいものだ。"
          shield: "じょうぶな　かわで　みを　まもる。\nかわが　のびきるとき　しんかを\nむかえると　いわれる。"
        jp_kanji:
          sword: "視線が　合ったら　危険！\n相手を　選ばず　頭突きで\n襲ってくる　厄介者だ。"
          shield: "丈夫な　皮で　身を　守る。\n皮が　伸びきるとき　進化を\n迎えると　いわれる。"
        en:
          sword: "If it locks eyes with you, watch out! Nothing and\nno one is safe from the reckless headbutts of this\ntroublesome Pokémon."
          shield: "It protects itself with its durable skin. It’s thought\nthat this Pokémon will evolve once its skin has\ncompletely stretched out."
        fr:
          sword: "C’est un Pokémon dangereux qui distribue\ndes coups de tête à quiconque ose croiser\nson regard."
          shield: "Il se protège grâce à sa peau robuste.\nOn dit que quand celle-ci ne peut plus s’étirer\ndavantage, c’est qu’il est sur le point d’évoluer."
        it:
          sword: "È molto molesto e prende a testate chiunque\ngli capiti a tiro, perciò incrociare il suo sguardo\npuò essere molto pericoloso."
          shield: "Il suo corpo è protetto da una pelle robustissima.\nSi dice che quando questa raggiunge il limite\ndell’elasticità, Scraggy sia sul punto di evolversi."
        de:
          sword: "Zurrokex deuten Blickkontakt als Einladung,\nihr Gegenüber mit Kopfnüssen anzugreifen.\nVorsicht ist also geboten."
          shield: "Es hat besonders robuste Haut, die seinen Körper\nschützt. Es heißt, wenn sich die Haut nicht weiter\ndehnen lässt, steht die Entwicklung bevor."
        es:
          sword: "No tiene reparos en liarse a cabezazos con quien\nse le ponga por delante, por lo que es peligroso\ncruzar la mirada con él."
          shield: "Su robusta piel le sirve de protección. Cuando\nya no puede estirarse más, es señal de que va\na evolucionar pronto."
        ko:
          sword: "눈이 마주치면 위험하다!\n상대를 가리지 않고 박치기로\n공격해오는 성가신 포켓몬이다."
          shield: "튼튼한 가죽으로 몸을 지킨다.\n가죽이 다 늘어나면 진화할 때가\n되었다고 한다."
        zh_simp:
          sword: "与它视线交汇是很危险的！\n不管对手是谁，它都会用\n头锤招呼，是个难搞的家伙。"
          shield: "用结实的皮保护身体。\n据说在皮伸展到极限时，\n它就会开始进化。"
        zh_trad:
          sword: "與牠視線交會是很危險的！\n不管對手是誰，牠都會用\n頭錘招呼，是個難搞的傢伙。"
          shield: "用結實的皮保護身體。\n據說在皮伸展到極限時，\n牠就會開始進化。"
