          shield: "さかだちを　することで　あいての\nタイミングを　くるわせ　そのすきに\nはでな　キックわざを　おみまいする。"
        jp_kanji:
          sword: "くるくる　回って　キックをはなつ。\n高速で　回っていると\nそのまま　地面に　潜っていく。"
          shield: "逆立ちを　することで　相手の\nタイミングを　狂わせ　そのすきに\n派手な　キック技を　おみまいする。"
        en:
          sword: "It launches kicks while spinning. If it spins at high\nspeed, it may bore its way into the ground."
          shield: "After doing a handstand to throw off the\nopponent’s timing, it presents its fancy kick moves."
        fr:
          sword: "Il assène des coups de pied tout en tournant\nsur lui-même. Il va parfois si vite qu’il commence\nà s’enfoncer dans le sol."
          shield: "Après avoir effectué un poirier visant\nà désorienter son adversaire, il lui assène\ndes coups de pied furieux."
        it:
          sword: "Gira su se stesso tirando calci. Se gira molto\nvelocemente può scavare una fossa nel terreno."
          shield: "Prima esegue una verticale per spiazzare il\nnemico, poi parte con i suoi calci spettacolari."
        de:
          sword: "Es dreht sich um sich selbst und verteilt Tritte.\nGewinnt es ausreichend an Schwung, bohrt es\nsich dabei in den Boden."
          shield: "Im Kampf bringt dieses Pokémon seine Gegner\nmit einem Handstand aus dem Takt und lehrt sie\ndann mit schwungvollen Tritten das Fürchten."
        es:
          sword: "Lanza patadas mientras gira. Si alcanza mucha\nvelocidad, puede cavar un hoyo en la tierra."
          shield: "Tras hacer el pino para desconcertar a su rival,\ncomienza a propinar sus espectaculares patadas."
        ko:
          sword: "빙글빙글 돌며 킥을 날린다.\n고속으로 돌다 보면\n그대로 지면을 파고들어 간다."
          shield: "물구나무를 서서 상대의\n타이밍을 흐트러뜨리고 그 틈에\n화려한 발차기를 먹인다."
        zh_simp:
          sword: "会旋转身体使出踢击。\n当它高速旋转身体时，\n会直接钻进地底下。"
          shield: "会通过倒立来扰乱\n对方的节奏，然后\n趁隙施展华丽的踢击。"
        zh_trad:
          sword: "會旋轉身體使出踢擊。\n當牠高速旋轉身體時，\n會直接鑽進地底下。"
          shield: "會透過倒立來擾亂\n對方的節奏，然後\n趁隙施展華麗的踢擊。"
