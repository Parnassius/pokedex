      egg_groups:
        - undiscovered
      abilities:
        - leaf_guard
      descriptions:
        jp_kana:
          sword: "むれを　はなれ　にんげんの　こどもを\nそだてる。　こどもが　なきやむ\nにおいの　ついた　ぬのを　まく。"
          shield: "あかんぼうの　ころから　そだてている\nにんげんの　ひろいごを　おもう\nきもちが　とくべつな　ちからとなる。"
        jp_kanji:
          sword: "群れを　離れ　人間の　子どもを\n育てる。　子どもが　泣き止む\n匂いの　ついた　布を　巻く。"
          shield: "赤ん坊の　ころから　育てている\n人間の　拾い子を　想う\n気持ちが　特別な　力となる。"
        en:
          sword: "This Zarude left its pack to raise a human child.\nThe cloth Zarude would wrap the child with has a\ncomforting scent that calmed the child’s crying."
          shield: "This Zarude’s special strength stems from its love\nand care for an orphaned human child that the\nPokémon has raised since the child’s infancy."
        fr:
          sword: "Ce Pokémon a quitté les siens pour élever\nun petit être humain. Il porte une étoffe\ndont l’odeur calme le bébé lorsqu’il pleure."
          shield: "L’affection qu’il porte au petit être humain\nqu’il a recueilli et élevé depuis son plus\njeune âge lui confère une force particulière."
        it:
          sword: "Si è allontanato dai suoi simili per allevare un\npiccolo umano. Il panno con cui si avvolge ha\nun odore che calma il pianto del bambino."
          shield: "Ha cresciuto un piccolo orfano umano fin\nda quando era un bebè. L’affetto che nutre\nper lui gli dona una forza speciale."
        de:
          sword: "Dieses Zarude hat seine Gruppe verlassen, um\nein Menschenkind aufzuziehen. Es trägt ein Tuch,\ndessen Geruch das Kind beruhigt, wenn es weint."
          shield: "Es hat ein menschliches Findelkind von klein auf\ngroßgezogen. Die Zuneigung, die es zu ihm\nempfindet, verleiht Zarude besondere Kräfte."
        es:
          sword: "Ha abandonado la manada para criar a un bebé\nhumano. Lleva una manta impregnada de un olor\nque calma el llanto del retoño."
          shield: "El afecto que siente por un humano huérfano al\nque crio desde que era un bebé le ha otorgado\nuna fuerza especial."
        ko:
          sword: "무리를 떠나 사람의 아이를 기른다.\n아이의 울음을 그치게 하는\n냄새가 나는 천을 두르고 있다."
          shield: "아기 때부터 길러 온\n고아를 생각하는 마음이\n특별한 힘을 만들어낸다."
        zh_simp:
          sword: "离开族群去抚养人类的孩子。\n身上披着的布散发着\n能让孩子停止哭泣的气味。"
          shield: "对于由自己捡来并抚养长大的\n人类小孩怀有深厚的感情。\n这份感情带给它一种特别的力量。"
        zh_trad:
          sword: "為了養育人類的小孩而離開了\n自己的群體。身上披的布帶有\n能讓孩子停止哭泣的氣味。"
          shield: "撿到了人類的嬰兒，並將他\n撫養長大。對這孩子的關心\n會帶給牠特別的力量。"
