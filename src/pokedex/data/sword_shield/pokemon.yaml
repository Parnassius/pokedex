          shield: "The spores released from this Pokémon’s hands\nare highly poisonous, but when thoroughly dried,\nthe spores can be used as stomach medicine."
        fr:
          sword: "On ignore toujours l’origine ou la signification\nde sa forte ressemblance avec une Poké Ball."
          shield: "Les spores qu’il libère de ses mains sont\ntrès toxiques, mais si on les sèche bien,\nelles peuvent soulager les maux de ventre."
        it:
          sword: "A tutt’oggi nessuno è a conoscenza\ndel significato o dell’origine del motivo simile\na una Poké Ball che sfoggia."
          shield: "Le spore che rilascia dalle mani sono molto\nvelenose, ma se sono essiccate pare che possano\nessere usate come farmaco gastrointestinale."
        de:
          sword: "Bis heute kann niemand genau sagen, wieso\nTarnpignon ein Pokéball-Muster aufweisen und\nwelchen Zweck dies erfüllt."
          shield: "Die Sporen, die es aus seinen zwei Gliedmaßen\nversprüht, sind sehr giftig. In getrockneter Form\neignen sie sich jedoch als Magenmedizin."
        es:
          sword: "Todavía no se ha encontrado ninguna explicación\nni razón para su gran parecido a las Poké Balls."
          shield: "Las esporas que expulsa por las extremidades\nson altamente tóxicas, pero, si se secan bien,\nsirven como remedio estomacal."
        ko:
          sword: "몬스터볼을 많이 닮았는데\n그 의미와 이유는\n아직 아무도 모른다."
          shield: "양손에서 내뿜는 포자는\n맹독이지만 잘 말리면\n복통약이 된다고 한다."
        zh_simp:
          sword: "关于它酷似精灵球的\n花纹的意义和理由，\n至今都无人知晓。"
          shield: "从双手喷出的孢子虽然\n含有剧毒，但据说彻底干燥后\n可以用作治疗肠胃的药。"
        zh_trad:
          sword: "酷似精靈球的花紋\n究竟有什麼意義和理由，\n至今仍沒有人能了解。"
          shield: "從雙臂噴出的孢子是劇毒，\n但據說在徹底乾燥之後，\n可以作為腸胃藥使用。"
amoonguss:
