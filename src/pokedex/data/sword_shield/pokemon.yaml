        jp_kana:
          sword: "かぐわしい　はなの　かおりで\nあいてを　まどわせ　いばらの\nムチで　はげしく　うちつける。"
          shield: "みぎての　どくは　そっこうせい。\nひだりての　どくは　ちこうせい。\nどちらも　いのちに　かかわるぞ。"
        jp_kanji:
          sword: "かぐわしい　花の　香りで\n相手を　惑わせ　いばらの\nムチで　激しく　打ちつける。"
          shield: "右手の　毒は　即効性。\n左手の　毒は　遅効性。\nどちらも　命に　かかわるぞ。"
        en:
          sword: "After captivating opponents with its sweet scent,\nit lashes them with its thorny whips."
          shield: "The poison in its right hand is quick acting.\nThe poison in its left hand is slow acting.\nBoth are life threatening."
        fr:
          sword: "Après avoir troublé les sens de ses adversaires\navec le parfum exquis de ses fleurs, il les frappe\nviolemment avec ses fouets ornés d’épines."
          shield: "Sa main gauche administre un poison lent,\net la droite, un poison foudroyant.\nLes deux peuvent être fatals."
        it:
          sword: "Stordisce l’avversario con il profumo intenso\ndei suoi fiori e lo colpisce con le sue fruste\npiene di spine."
          shield: "Il veleno nel bouquet destro ha effetto\nistantaneo, quello nel sinistro ha effetto\nritardato. Entrambi possono essere letali."
        de:
          sword: "Mit dem süßlichen Duft seiner Blüten betört es\nseine Gegner, bevor es sie mit dornigen Ranken\nheftig auspeitscht."
          shield: "Das Gift aus seiner rechten Hand wirkt sofort,\ndas aus seiner linken langsam. Beide Gifte\nkönnen tödlich sein."
        es:
          sword: "Aturde a los rivales con la fragancia de sus flores\npara luego azotarlos sin piedad con sus cepas\nespinosas."
          shield: "Las toxinas de la mano derecha son de efecto\ninmediato, y las de la izquierda, retardado. No\nobstante, ambas pueden ser letales."
        ko:
          sword: "향긋한 꽃향기로\n상대를 혼란스럽게 한 다음\n가시 채찍으로 세차게 때린다."
          shield: "오른손의 독은 즉효성이고\n왼손의 독은 지효성을 띠고 있다.\n양쪽 모두 생명에 지장을 준다."
        zh_simp:
          sword: "会用馥郁芬芳的花香\n迷惑敌人，并用荆棘上\n的鞭子猛力抽打对方。"
          shield: "右手的毒是速效的，\n左手的毒则是慢性的。\n无论哪边的毒性都能致命。"
        zh_trad:
          sword: "會用馥郁芬芳的花香\n迷惑敵人，並用荊棘上\n的鞭子猛力抽打對方。"
          shield: "右手的毒是速效的，\n左手的毒則是慢性的。\n無論哪邊的毒性都能致命。"
