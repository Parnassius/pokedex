      descriptions:
        jp_kana:
          sword: "１にち　ずっと　エサをはこんでる。\nそうなんした　ひとが　デリバードの\nエサで　たすかった　はなしもある。"
          shield: "じぶんの　エサを　ひとや　ポケモンに\nわける　しゅうせいが　あるため\nいつも　エサを　さがしまわっている。"
        jp_kanji:
          sword: "１日　ずっと　エサを運んでいる。\n遭難した　人が　デリバードの\nエサで　助かった　話もある。"
          shield: "自分の　エサを　人や　ポケモンに\nわける　習性が　あるため\nいつも　エサを　探しまわっている。"
        en:
          sword: "It carries food all day long. There are tales about\nlost people who were saved by the food it had."
          shield: "It has a generous habit of sharing its food with\npeople and Pokémon, so it’s always scrounging\naround for more food."
        fr:
          sword: "Il transporte de la nourriture toute la journée.\nSes réserves de vivres auraient sauvé la vie\nde nombreuses personnes en péril."
          shield: "Ce Pokémon partage facilement son repas avec\nd’autres Pokémon et avec des humains, ce qui\nl’oblige à constamment courir après la nourriture."
        it:
          sword: "Trasporta cibo per tutto il giorno. Si racconta\nche diverse persone disperse o in difficoltà\nsi siano salvate grazie al suo cibo."
          shield: "È sempre alla ricerca di cibo, che ama\ncondividere con esseri umani e Pokémon."
        de:
          sword: "Es trägt immer Lebensmittel bei sich. Man sagt,\ndass viele Menschen in Not nur dank seiner\nNotration überlebt hätten."
          shield: "Es hat die Angewohnheit, seine eigene Nahrung\nmit Menschen und Pokémon zu teilen, und ist\ndeshalb stets unterwegs auf Futtersuche."
        es:
          sword: "Transporta comida durante todo el día. Según\ndicen, muchos desaparecidos han sobrevivido\ngracias a ella."
          shield: "Tiene la costumbre de compartir su comida con\ntodo el mundo, sea humano o Pokémon, por lo\nque está constantemente en busca de alimento."
        ko:
          sword: "온종일 먹이를 운반한다.\n조난당한 사람이 딜리버드의\n먹이로 살아났다는 이야기도 있다."
          shield: "자신의 먹이를 사람이나 포켓몬에게\n나눠주는 습성이 있어\n언제나 먹이를 찾아다닌다."
        zh_simp:
          sword: "一整天都在搬运食物。\n据说曾有遇险的人因为\n信使鸟的食物而得救。"
          shield: "因为有跟人类及宝可梦\n分享自己食物的习性，\n所以一直都在到处寻找食物。"
        zh_trad:
          sword: "一整天都在搬運食物。\n據說曾經有遇難的人因為\n信使鳥的食物而得救。"
          shield: "因為有跟人類及寶可夢\n分享自己食物的習性，\n所以一直都在到處尋找食物。"
