      descriptions:
        jp_kana:
          sword: "すさまじい　せいりょうを　もつ。\nシャウトとともに　いかくするさまは\nブロッキングと　よばれている。"
          shield: "ケンカを　くりかえし　しんか。\nうでをクロスし　さけぶ　おたけびは\nどんな　あいても　ひるませるぞ。"
        jp_kanji:
          sword: "凄まじい　声量を　もつ。\nシャウトとともに　威嚇するさまは\nブロッキングと　呼ばれている。"
          shield: "ケンカを　繰り返し　進化。\n腕をクロスし　叫ぶ　雄叫びは\nどんな　相手も　怯ませるぞ。"
        en:
          sword: "Its voice is staggering in volume. Obstagoon\nhas a tendency to take on a threatening posture\nand shout—this move is known as Obstruct."
          shield: "It evolved after experiencing numerous fights.\nWhile crossing its arms, it lets out a shout that\nwould make any opponent flinch."
        fr:
          sword: "Il possède une puissance vocale remarquable.\nOn appelle Blocage sa technique qui consiste\nà intimider l’ennemi avec son cri guttural."
          shield: "Il a évolué après avoir enchaîné de nombreux\ncombats. Le cri qu’il pousse lorsqu’il fait un « X »\navec ses bras ébranle n’importe quel ennemi."
        it:
          sword: "Ha una potenza vocale impressionante. Quando\nassume la tipica posa intimidatoria e si mette a\nurlare, si dice che sta facendo “sbarramento”."
          shield: "Si è evoluto a forza di lottare. L’urlo di guerra\nche lancia mentre mette le braccia a X è in\ngrado di terrorizzare qualsiasi avversario."
        de:
          sword: "Es verfügt über eine beeindruckende Stimmkraft.\nSein von Schreien begleitetes Drohverhalten\nnennt man auch „Abblocker“."
          shield: "Durch das Austragen unzähliger Kämpfe hat es\nsich entwickelt. Formt es mit den Armen ein „X“\nund stößt einen Schrei aus, verschreckt das jeden."
        es:
          sword: "La potencia de su voz es realmente pasmosa. La\ntécnica que usa para intimidar al rival mientras\ngrita recibe el nombre de Obstrucción."
          shield: "Evoluciona tras haber librado numerosas peleas.\nEl grito de guerra que profiere mientras pone los\nbrazos en cruz atemoriza a cualquier rival."
        ko:
          sword: "엄청난 성량을 가졌다.\n샤우팅하며 위협하는 모습은\n블로킹이라 불린다."
          shield: "싸움을 반복하면서 진화한다.\n팔을 크로스하고 우렁차게 외치면\n어떤 상대라도 풀죽게 된다."
        zh_simp:
          sword: "能够发出惊人的音量。\n它在大叫的同时威吓对手\n的样子被称为“拦堵”。"
          shield: "在不断的斗争中得到了进化。\n它交叉着双臂发出的怒吼\n能让一切对手都为之胆怯。"
        zh_trad:
          sword: "能夠發出驚人的音量。\n牠在大叫的同時威嚇對手\n的樣子被稱為「攔堵」。"
          shield: "在不斷的鬥爭中得到了進化。\n牠交叉著雙臂發出的怒吼\n能讓一切對手都為之膽怯。"
perrserker:
  species_id: 863
  names:
    jp_kana: ニャイキング
