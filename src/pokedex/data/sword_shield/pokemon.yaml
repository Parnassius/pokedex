        jp_kanji:
          sword: "周囲を　凍りつかせて　獲物を\n捕まえるが　口が　頭の\n上に　あるので　食べづらい。"
          shield: "どんな　攻撃にも　傷つかない\n面の皮を　もつが　呼吸が\n不自由だったため　絶滅した。"
        en:
          sword: "Though it’s able to capture prey by freezing its\nsurroundings, it has trouble eating the prey\nafterward because its mouth is on top of its head."
          shield: "The skin on its face is impervious to attack, but\nbreathing difficulties made this Pokémon go\nextinct anyway."
        fr:
          sword: "Il gèle les alentours pour capturer ses proies,\nmais comme sa bouche est sur le dessus de\nsa tête, il a beaucoup de mal à les manger."
          shield: "Aucune attaque ne pouvait égratigner la peau\nde son visage, mais il s’est éteint, car il avait\ndu mal à respirer."
        it:
          sword: "Cattura le prede congelando l’ambiente\ncircostante, ma avendo la bocca sopra\nla testa fatica a inghiottirle."
          shield: "Nessun attacco poteva scalfire la pelle del suo\nmuso, ma si è estinto perché aveva difficoltà\na respirare."
        de:
          sword: "Es fängt seine Beute, indem es seine Umgebung\neinfriert, doch da sich sein Maul oben auf seinem\nKopf befindet, ist Fressen für es sehr umständlich."
          shield: "Kein Angriff konnte seine Gesichtshaut verletzen,\ndoch es war in seiner Atmung eingeschränkt und\nstarb daher aus."
        es:
          sword: "Atrapa a sus presas congelando su entorno, pero\nla ubicación de la boca encima de la cabeza le\ngenera dificultades para deglutirlas."
          shield: "Aunque la piel de su rostro era capaz de resistir\ncualquier ataque, su dificultad para respirar\nacabó provocando su extinción."
        ko:
          sword: "주변을 꽁꽁 얼려서 먹이를\n잡지만 입이 머리 윗부분에\n있어서 먹기 힘들다."
          shield: "어떤 공격에도 상처 입지 않는\n얼굴 가죽을 가졌지만 호흡이\n자유롭지 않았던 탓에 멸종하였다."
        zh_simp:
          sword: "虽然能通过冻结四周来捕捉猎物，\n但由于嘴长在头顶上，\n所以吃起东西来不太方便。"
          shield: "面部的皮肤无论受到什么攻击\n都不会受伤，但由于呼吸起来\n不方便而灭绝了。"
        zh_trad:
          sword: "雖然能透過凍結四周來捕捉獵物，\n但由於嘴長在頭頂上，\n所以吃起東西來不太方便。"
          shield: "面部的皮膚無論受到什麼攻擊\n都不會受傷，但由於呼吸起來\n不方便而滅絕了。"
duraludon:
  species_id: 884
