          shield: "りんごの　かわの　つばさで　とんで\nきょうさんせいの　だえきを　とばす。\nりんごの　かたちに　へんけいする。"
        jp_kanji:
          sword: "すっぱい　りんごを　食べて　進化。\n火傷する　ほど　強酸性の\n液体を　頬袋に　溜める。"
          shield: "りんごの　皮の　翼で　飛んで\n強酸性の　唾液を　飛ばす。\nりんごの　形に　変形する。"
        en:
          sword: "It ate a sour apple, and that induced its\nevolution. In its cheeks, it stores an acid\ncapable of causing chemical burns."
          shield: "It flies on wings of apple skin and spits a\npowerful acid. It can also change its shape\ninto that of an apple."
        fr:
          sword: "Il a évolué après avoir mangé une pomme acide.\nIl concentre dans ses joues un liquide si corrosif\nqu’il peut provoquer des brûlures."
          shield: "Il vole avec ses ailes faites de pelures de pomme\net crache une substance très acide.\nIl peut aussi prendre la forme de ce fruit."
        it:
          sword: "Si è evoluto dopo aver mangiato una mela aspra.\nLe sacche sulle guance contengono un liquido\nestremamente acido che può provocare ustioni."
          shield: "Vola usando la buccia del pomo a mo’ di ali e\nsputa una saliva altamente acida. Può assumere\nl’aspetto di una mela."
        de:
          sword: "Nach dem Verzehr eines sauren Apfels hat es sich\nentwickelt. In den Backentaschen speichert es\neine saure Substanz, die zu Verbrennungen führt."
          shield: "Dieses Pokémon fliegt mit seinen Flügeln aus\nApfelschale und spuckt extrem sauren Speichel\naus. Es nimmt die Gestalt eines Apfels an."
        es:
          sword: "Ha evolucionado tras ingerir una manzana ácida.\nLas bolsas de las mejillas albergan un fluido cuya\nextrema acidez llega a provocar quemaduras."
          shield: "Escupe una saliva sumamente ácida y vuela con\nsus alas compuestas por piel de manzana, cuyo\naspecto es capaz de adoptar."
        ko:
          sword: "새콤한 사과를 먹고 진화했다.\n화상을 입을 정도로 강한 산성을 띠는\n액체를 볼주머니에 저장하고 있다."
          shield: "사과 껍질로 된 날개로 날며\n강산성의 타액을 뱉는다.\n사과의 형태로 변형한다."
        zh_simp:
          sword: "啃果虫吃了酸苹果后进化\n而成。颊囊里储存着足以\n造成灼伤的强酸性液体。"
          shield: "会用苹果皮的翅膀飞翔，\n并吐出强酸性的唾液。\n可以变成苹果的形状。"
        zh_trad:
          sword: "啃果蟲吃了酸蘋果後進化\n而成。頰囊裡儲存著足以\n造成灼傷的強酸性液體。"
          shield: "會用蘋果皮的翅膀飛翔，\n並吐出強酸性的唾液。\n能變成蘋果的形狀。"
  gmax_forms:
    flapple_gigantamax:
      form_id: 999
      names:
        jp_kana: キョダイマックス
        jp_kanji: キョダイマックス
        en: Gigantamax
        fr: Gigamax
        it: Gigamax
        de: Gigadynamax
        es: Gigamax
        ko: 거다이맥스
        zh_simp: 超极巨化
        zh_trad: 超極巨化
      descriptions:
        jp_kana:
          sword: "キョダイマックスの　パワーが　みつを\nぞうりょうさせた　けっか　きょだいな\nりんごの　すがたに　へんぼうした。"
          shield: "くびを　のばすと　もうれつに　あまい\nみつの　においが　あふれだし　かいだ\nポケモンを　きぜつさせてしまう。"
        jp_kanji:
          sword: "キョダイマックスの　パワーが　蜜を\n増量させた　結果　巨大な\nりんごの　姿に　変貌した。"
          shield: "首を　伸ばすと　猛烈に　甘い\n蜜の　においが　溢れだし　嗅いだ\nポケモンを　気絶させてしまう。"
        en:
          sword: "Under the influence of Gigantamax energy, it\nproduces much more sweet nectar, and its shape\nhas changed to resemble a giant apple."
          shield: "If it stretches its neck, the strong aroma of its\nnectar pours out. The scent is so sickeningly\nsweet that one whiff makes other Pokémon faint."
        fr:
          sword: "Sous l’influence du pouvoir du Gigamax, le nectar\nafflue en masse dans son corps, qui prend alors\nla forme d’une pomme gigantesque."
          shield: "Lorsqu’il allonge le cou, un parfum de nectar\nextrêmement sucré se répand, et les Pokémon\nqui le hument tombent tous dans les pommes."
        it:
          sword: "L’energia del fenomeno Gigamax ha fatto\naumentare la quantità di sciroppo nel suo corpo\ndandogli l’aspetto di una mela enorme."
          shield: "Quando allunga il collo, spande il dolce profumo\ndel suo sciroppo, così intenso da far perdere\ni sensi ai Pokémon che lo annusano."
        de:
          sword: "Durch die Gigadynamax-Energie hat sich die\nMenge seines Nektars vervielfacht. Seine Gestalt\nähnelt nun einem gigantischen Apfel."
          shield: "Streckt es seinen Hals, strömt der überwältigend\nsüße Duft seines Nektars aus. Pokémon, die ihn\nerschnuppern, verlieren das Bewusstsein."
        es:
          sword: "La energía del fenómeno Gigamax ha acelerado\nla producción de néctar y le ha conferido el\naspecto de una manzana gigantesca."
          shield: "Al estirar el cuello, su néctar emana un olor de\nun dulzor tan intenso que todo Pokémon que lo\nhuele pierde el sentido."
        ko:
          sword: "거다이맥스의 파워에 의해\n당도가 높아진 결과 거대한\n사과의 모습으로 변모했다."
          shield: "목을 길게 늘이면 강렬하게 달콤한\n꿀 냄새가 흘러넘쳐 이 냄새를\n맡은 포켓몬을 기절시켜버린다."
        zh_simp:
          sword: "超极巨化之力使它的\n蜜量增加，最后外貌\n变成了巨大的苹果。"
          shield: "当它把脖子伸长时，\n会散发出强烈的蜜汁甜味，\n让闻到的宝可梦失去知觉。"
        zh_trad:
          sword: "超極巨化之力使牠的\n蜜量增加，最後外貌\n變成了巨大的蘋果。"
          shield: "當牠把脖子伸長時，\n會散發出強烈的蜜汁甜味，\n讓聞到的寶可夢失去知覺。"
