        - water
      egg_groups:
        - water_2
      abilities:
        - reckless
        - adaptability
      hidden_ability: mold_breaker
      descriptions:
        jp_kana:
          sword: "タフな　ファイトが　つりびとに\nだいにんき。　むだんで　いけに\nはなすので　どんどん　ふえる。"
          shield: "むかしは　しょくたくに　のぼった。\nあかすじの　バスラオの　みは\nあぶらが　おおく　わかものむき。"
        jp_kanji:
          sword: "タフな　ファイトが　釣り人に\n大人気。　無断で　池に\n放すので　どんどん　増える。"
          shield: "むかしは　食卓に　のぼった。\n赤筋の　バスラオの　身は\n脂が　多く　若者むき。"
        en:
          sword: "Anglers love the fight this Pokémon puts up on\nthe hook. And there are always more to catch—\nmany people release them into lakes illicitly."
          shield: "In the past, it often appeared on the dinner\ntable. The meat of red-striped Basculin is on the\nfatty side, and it’s more popular with the youth."
        fr:
          sword: "Le capturer est un défi que les Pêcheurs aiment\nrelever. Ils vont jusqu’à en libérer illégalement\ndans les lacs, ce qui conduit à leur prolifération."
          shield: "On l’utilisait autrefois en cuisine.\nLa chair grasse des Bargantua à motif rouge\nétait plutôt destinée aux jeunes."
        it:
          sword: "È popolare tra i pescatori per le sue lotte audaci.\nContinua a proliferare perché numerosi esemplari\nvengono rilasciati nei laghi senza permesso."
          shield: "Utilizzati in passato in cucina, i Basculin Forma\nLinearossa erano ritenuti adatti ai giovani\nper la loro carne ad alto contenuto di grassi."
        de:
          sword: "Sie sind bei Anglern beliebt, weil sie ihnen harte\nKämpfe liefern. Sie werden oft illegal in Teichen\nausgesetzt, wodurch sie sich schneller verbreiten."
          shield: "Früher standen sie oft auf dem Speiseplan. Das\nFleisch rotliniger Exemplare war wegen seines\nhohen Fettanteils bei jungen Leuten sehr beliebt."
        es:
          sword: "Muy popular entre los Pescadores por su fiereza.\nHa proliferado debido a la introducción ilegal de\nejemplares en los lagos."
          shield: "Un alimento básico de la dieta de antaño. A los\njóvenes se les daba Basculin de raya roja por su\nalto contenido en ácidos grasos."
        ko:
          sword: "힘이 세기 때문에 낚시꾼들에게\n인기가 많다. 무단으로 연못에 놓아줘서\n점점 개체 수가 늘어나고 있다."
          shield: "옛날에는 식탁에 올랐다.\n적색근 배쓰나이의 살코기는\n기름이 많아 젊은 층이 좋아한다."
        zh_simp:
          sword: "它上钩时顽强的抵抗深受垂钓者\n的喜爱。由于人们擅自把它们\n放生到池塘里，数量越来越多。"
          shield: "从前也曾经登上餐桌。\n红条纹野蛮鲈鱼的肉脂肪含量高，\n适合年轻人食用。"
        zh_trad:
          sword: "牠上鉤時頑強的抵抗深受釣魚者\n喜愛。由於人們擅自把牠們\n放生到池塘裡，數量越來越多。"
          shield: "從前也曾經登上餐桌。\n紅條紋野蠻鱸魚的肉脂肪含量高，\n適合年輕人食用。"
    basculin_blue_striped_form:
      form_id: 1
      names:
        jp_kana: あおすじのすがた
        jp_kanji: あおすじのすがた
        en: Blue-Striped Form
        fr: Motif Bleu
        it: Forma Lineablu
        de: Blaulinige Form
        es: Forma Raya Azul
        ko: 청색근의 모습
        zh_simp: 蓝条纹的样子
        zh_trad: 藍條紋的樣子
      base_stats:
        hp: 70
        attack: 92
        defense: 65
        special_attack: 80
        special_defense: 55
        speed: 98
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 2
      types:
        - water
      egg_groups:
        - water_2
      abilities:
        - rock_head
        - adaptability
      hidden_ability: mold_breaker
      descriptions:
        jp_kana:
          sword: "かつては　よく　たべられていた。\nあおすじの　バスラオの　みは\nたんぱくで　たべやすいらしい。"
          shield: "らんぼうで　ゆうめいな　ポケモン。\nいちばんの　ケンカあいては\nあかすじの　バスラオの　むれ。"
        jp_kanji:
          sword: "かつては　よく　食べられていた。\n青筋の　バスラオの　身は\n淡白で　食べやすいらしい。"
          shield: "乱暴で　有名な　ポケモン。\n一番の　ケンカ相手は\n赤筋の　バスラオの　群れ。"
        en:
          sword: "Blue-striped Basculin used to be a common food\nsource. They apparently have an inoffensive,\nlight flavor."
          shield: "Known for their violence, these Pokémon\nhave the most fights with schools of red-\nstriped Basculin."
        fr:
          sword: "On le mangeait souvent, jadis.\nIl paraît que sa chair est légère et tendre."
          shield: "Connus pour leur violence, ils se battent\nle plus souvent contre les bancs\nde Bargantua Motif Rouge."
        it:
          sword: "In passato veniva usato spesso in cucina.\nPare che le carni dei Basculin Forma Lineablu\nfossero più leggere e delicate."
          shield: "Noti per la loro ferocia, spesso attaccano briga\ncon i banchi di Basculin Forma Linearossa."
        de:
          sword: "Früher landeten sie oft auf dem Mittagstisch.\nOffenbar ist das Fleisch blau gestreifter\nExemplare besonders leicht und bekömmlich."
          shield: "Sie sind für ihre brutale Natur bekannt. Besonders\nhäufig kriegen sie sich mit ganzen Schwärmen von\nrot gestreiften Exemplaren in die Haare."
        es:
          sword: "Antaño formaba parte de la dieta habitual.\nAl parecer, los ejemplares de raya azul son\nmás ligeros y digestivos."
          shield: "Este Pokémon es conocido por su ferocidad. Le\nencanta batirse en combate, sobre todo contra\nbancos de ejemplares de raya roja."
        ko:
          sword: "과거에는 자주 식재료로 쓰였다.\n청색근 배쓰나이의 살코기는\n담백하고 먹기 쉽다는 듯하다."
          shield: "난폭하기로 유명한 포켓몬이다.\n제일 많이 싸우는 상대는\n적색근의 배쓰나이 무리다."
        zh_simp:
          sword: "从前经常被拿来食用。\n据说蓝条纹野蛮鲈鱼的肉\n滋味清淡，容易入口。"
          shield: "凶暴出了名的宝可梦。\n它们最常和红条纹的\n野蛮鲈鱼打群架。"
        zh_trad:
          sword: "從前經常被拿來食用。\n據說藍條紋野蠻鱸魚的肉\n滋味清淡，容易入口。"
          shield: "凶暴出了名的寶可夢。\n牠們最常和紅條紋\n野蠻鱸魚打群架。"
sandile:
  species_id: 551
  names:
    jp_kana: メグロコ
    jp_kanji: メグロコ
    en: Sandile
    fr: Mascaïman
    it: Sandile
    de: Ganovil
    es: Sandile
    ko: 깜눈크
    zh_simp: 黑眼鳄
    zh_trad: 黑眼鱷
  forms:
    sandile:
      form_id: 0
      base_stats:
        hp: 50
        attack: 72
        defense: 35
        special_attack: 35
        special_defense: 35
        speed: 65
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
