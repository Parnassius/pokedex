        jp_kana:
          sword: "けたはずれの　パワーの　もちぬし。\nちいさな　ポケモンを　いじめる\nあいては　とことん　たたきのめす。"
          shield: "ポケモンを　まもるため　にんげんに\nたたかいを　いどんだ　でんせつが\nイッシュちほうに　のこされている。"
        jp_kanji:
          sword: "けた外れの　パワーの　持ち主。\n小さな　ポケモンを　いじめる\n相手は　とことん　叩きのめす。"
          shield: "ポケモンを　守るため　人間に\n戦いを　挑んだ　伝説が\nイッシュ地方に　残されている。"
        en:
          sword: "It has phenomenal power. It will mercilessly crush\nanyone or anything that bullies small Pokémon."
          shield: "In Unovan legend, Terrakion battled against\nhumans in an effort to protect other Pokémon."
        fr:
          sword: "Il possède un pouvoir incommensurable.\nIl se montre impitoyable envers ceux\nqui s’en prennent aux petits Pokémon."
          shield: "Selon une légende d’Unys, Terrakium se serait\njadis dressé contre les humains pour protéger\nles Pokémon."
        it:
          sword: "Possiede una forza straordinaria. Non ha\nalcuna pietà per quelli che se la prendono\ncon i Pokémon più piccoli di loro."
          shield: "Le leggende della regione di Unima narrano\ndelle sue lotte contro gli esseri umani per\nproteggere i Pokémon."
        de:
          sword: "Terrakium verfügt über unvergleichliche Kräfte.\nWer kleinere Pokémon bedroht oder schlecht\nbehandelt, wird von ihm zur Strecke gebracht."
          shield: "Eine Legende aus der Einall-Region handelt\ndavon, wie sich Terrakium gegen die Menschen\nstellte, um die Pokémon zu beschützen."
        es:
          sword: "Posee una fuerza extraordinaria, y combatirá sin\nmiramientos contra cualquier adversario que se\nmeta con Pokémon más pequeños y débiles."
          shield: "Las leyendas de Teselia narran la lucha que libró\ncontra los humanos para proteger a los Pokémon."
        ko:
          sword: "차원이 다른 파워의 소유자.\n작은 포켓몬을 괴롭히는\n상대는 철저히 때려눕힌다."
          shield: "포켓몬을 지키기 위해\n사람에게 승부를 걸었다는\n전설이 하나지방에 남아 있다."
        zh_simp:
          sword: "拥有异常强大的力量。\n会把欺负弱小宝可梦的\n对手打得再也站不起来。"
          shield: "代拉基翁为保护宝可梦\n而与人类作战的传说\n在合众地区广为流传。"
        zh_trad:
          sword: "擁有異常強大的力量。\n會把欺負弱小寶可夢的\n對手打到再也站不起來。"
          shield: "代拉基翁為保護寶可夢\n而與人類作戰的傳說\n在合眾地區廣為流傳。"
