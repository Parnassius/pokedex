          shield: "スティックの　れんだで　こうげき。\nすごい　スピードで　たたくうちに\nどんどん　テンションが　あがるのだ。"
        jp_kanji:
          sword: "特別な　スティックで　リズムを\n刻むと　草花を　元気にする\nパワーが　音波になって　広がる。"
          shield: "スティックの　連打で　攻撃。\nすごい　スピードで　叩くうちに\nどんどん　テンションが　上がるのだ。"
        en:
          sword: "When it uses its special stick to strike up a beat,\nthe sound waves produced carry revitalizing\nenergy to the plants and flowers in the area."
          shield: "It attacks with rapid beats of its stick.\nAs it strikes with amazing speed, it gets\nmore and more pumped."
        fr:
          sword: "Le rythme qu’il crée en tapant avec son bâton\ntrès spécial génère des ondes sonores\nqui ont le pouvoir de vivifier les plantes."
          shield: "Il attaque en frappant frénétiquement avec\nson bâton. Son enthousiasme grandit à mesure\nque le rythme s’accélère."
        it:
          sword: "Segnando il ritmo con la sua bacchetta speciale\ndiffonde onde sonore che hanno il potere\ndi rinvigorire fiori e piante."
          shield: "Attacca percuotendo il nemico con la sua\nbacchetta, con un entusiasmo che cresce\nall’aumentare del ritmo sfrenato con cui colpisce."
        de:
          sword: "Der Rhythmus, den es mit seinem besonderen\nSchlägel erzeugt, verbreitet Schallwellen, die\nPflanzen neue Vitalität verleihen können."
          shield: "Es greift an, indem es wiederholt seinen Schlägel\nschwingt. Diese rasanten Trommelbewegungen\nbringen es immer mehr in Fahrt."
        es:
          sword: "Al marcar el ritmo con su baqueta especial,\nproduce unas ondas sonoras capaces de devolver\nla vitalidad a la flora."
          shield: "Ataca golpeando sin cesar con su baqueta, con\nun entusiasmo que crece a medida que acelera\nel ritmo."
        ko:
          sword: "특별한 스틱으로 리듬을 타면\n화초를 생생하게 만드는 힘이\n음파가 되어 퍼진다."
          shield: "스틱으로 연타하여 공격한다.\n굉장한 속도로 치다 보면\n점점 텐션이 올라간다."
        zh_simp:
          sword: "当它用特别的木棒敲奏时，\n能够给予花草活力的力量\n就会变成音波扩散开来。"
          shield: "会用木棒连续击打来攻击。\n在以飞快的速度击打的同时，\n情绪也会变得越来越高涨。"
        zh_trad:
          sword: "當牠用特別的木棒敲奏時，\n能夠給予花草活力的力量\n就會變成音波擴散開來。"
          shield: "會用木棒連續擊打來攻擊。\n在以飛快的速度擊打的同時，\n情緒也會變得越來越高漲。"
thwackey:
  species_id: 811
  names:
