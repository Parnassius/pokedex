      descriptions:
        jp_kana:
          sword: "かぜのように　のやまを　かけぬける。\nゆみなりの　ツノは　しぜんさいがいの\nよちょうを　びんかんに　かんじとる。"
          shield: "きけんを　さっちする　のうりょくを\nもつがゆえに　ひとからは　わざわいを\nもたらす　ポケモンと　ごかいされた。"
        jp_kanji:
          sword: "風のように　野山を　駆けぬける。\n弓なりの　ツノは　自然災害の\n予兆を　敏感に　感じとる。"
          shield: "危険を　察知する　能力を\n持つがゆえに　人からは　災いを\nもたらす　ポケモンと　誤解された。"
        en:
          sword: "Swift as the wind, Absol races through fields and\nmountains. Its curved, bow-like horn is acutely\nsensitive to the warning signs of natural disasters."
          shield: "Because of this Pokémon’s ability to detect\ndanger, people mistook Absol as a bringer\nof doom."
        fr:
          sword: "Il court par monts et par vaux, rapide comme\nle vent. Sa corne arquée lui permet de percevoir\nles signes avant-coureurs des cataclysmes."
          shield: "Sa capacité à pressentir le danger lui a autrefois\nvalu la réputation de porter malheur."
        it:
          sword: "Corre veloce come il vento attraverso colline\ne campi. Il suo corno ricurvo è in grado di\nprevedere con precisione le calamità naturali."
          shield: "A causa della sua capacità di percepire i disastri\nè stato considerato erroneamente un Pokémon\nportatore di disgrazie."
        de:
          sword: "Schnell wie der Wind rauscht es über Felder\nund Berge. Sein gebogenes Horn ist sehr sensibel\ngegenüber herannahenden Naturkatastrophen."
          shield: "Absol kann Gefahr verspüren, weshalb Menschen\nirrtümlicherweise dachten, dieses Pokémon\nbringe ihnen Unheil."
        es:
          sword: "Corre por montañas y prados a la velocidad del\nviento. Su cuerno curvado tiene tal sensibilidad\nque puede predecir catástrofes naturales."
          shield: "Debido a su capacidad para predecir desastres,\nse lo ha considerado desacertadamente un\nPokémon portador de desgracias."
        ko:
          sword: "바람처럼 산과 들을 달려나간다.\n초승달 모양의 뿔은 자연재해의\n징조를 민감하게 감지한다."
          shield: "위험을 감지하는 능력이 있어\n사람들로부터 재앙을 불러오는\n포켓몬이라는 오해를 샀다."
        zh_simp:
          sword: "如风一般在山野中奔跑。\n能用它像弓一样的角\n来感知自然灾害的预兆。"
          shield: "由于拥有感知危险的能力，\n因此它被人们误解为是\n会招来灾祸的宝可梦。"
        zh_trad:
          sword: "如風般地奔馳在山野中。\n形狀如弓的角能夠敏銳\n感應到自然災害的預兆。"
          shield: "由於擁有察覺危險的能力，\n因此牠被人們誤解是\n會招來災禍的寶可夢。"
