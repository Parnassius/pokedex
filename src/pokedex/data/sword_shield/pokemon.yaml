        jp_kana:
          sword: "ひれが　へんかして　できた\nしょくしゅは　それぞれ　プラスと\nマイナスの　でんきが　ながれている。"
          shield: "くらい　かいていでは　いつも\nてんめつ　している　しょくしゅの\nあかり　だけが　つうしんしゅだん。"
        jp_kanji:
          sword: "ひれが　変化して　できた\n触手は　それぞれが　プラスと\nマイナスの　電気が　流れている。"
          shield: "暗い　海底では　いつも\n点滅している　触手の\n灯り　だけが　通信手段。"
        en:
          sword: "Its antennae, which evolved from a fin, have both\npositive and negative charges flowing through them."
          shield: "On the dark ocean floor, its only means of\ncommunication is its constantly flashing lights."
        fr:
          sword: "Ses antennes proviennent d’anciennes nageoires\net sont chargées d’énergies positive et négative."
          shield: "Au plus profond de l’océan, son seul moyen\nde communication est la lumière de ses antennes,\nqui clignotent constamment."
        it:
          sword: "Le sue antenne, evoluzione di pinne primitive,\nsono attraversate da energia elettrica, positiva\nin una e negativa nell’altra."
          shield: "Il suo unico mezzo di comunicazione negli oscuri\nfondali oceanici sono le luci delle sue antenne,\nche lampeggiano costantemente."
        de:
          sword: "Seine Antennen haben sich aus Flossen entwickelt\nund sind sowohl positiv als auch negativ geladen."
          shield: "Am dunklen Meeresgrund sind die ständig\nflackernden Lichter seiner Antennen sein\neinziges Kommunikationsmittel."
        es:
          sword: "Sus otrora dos aletas han evolucionado a las\nactuales antenas y ambas tienen carga positiva\ny negativa."
          shield: "En el oscuro fondo del océano, su único modo\nde comunicarse son las luces parpadeantes que\nemite por las antenas."
        ko:
          sword: "지느러미가 변해서 만들어진\n촉수는 각각 플러스와\n마이너스의 전기가 흐르고 있다."
          shield: "어두운 해저에서는 항상\n깜빡거리는 촉수의 빛이\n유일한 통신 수단이다."
        zh_simp:
          sword: "从鳍变化而来的触手\n之中，分别流通着\n正电以及负电。"
          shield: "在黑暗的海底，\n触手上不断闪烁着的光\n是它们唯一的通信手段。"
        zh_trad:
          sword: "從鰭變化而來的觸手\n之中，分別流通著\n正電以及負電。"
          shield: "在黑暗的海底，\n觸手上不斷閃爍的亮光\n是牠唯一的通訊手段。"
