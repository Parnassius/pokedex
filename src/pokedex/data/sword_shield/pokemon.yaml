        jp_kana:
          sword: "かつて　ほろびた　さばくの　くにで\nだいじに　されていた。　ざいほうと\nともに　ガラルちほうへ　やってきた。"
          shield: "えりまきを　ひろげて　たいようこうを\nあびると　だいとかいで　つかわれる\nでんきを　１ぴきで　はつでんする。"
        jp_kanji:
          sword: "かつて　滅びた　砂漠の　国で\n大事に　されていた。　財宝と\nともに　ガラル地方へ　やってきた。"
          shield: "襟巻を　広げて　太陽光を\n浴びると　大都会で　使われる\n電気を　１匹で　発電する。"
        en:
          sword: "A now-vanished desert culture treasured these\nPokémon. Appropriately, when Heliolisk came to\nthe Galar region, treasure came with them."
          shield: "One Heliolisk basking in the sun with its frill\noutspread is all it would take to produce enough\nelectricity to power a city."
        fr:
          sword: "Il était révéré dans un royaume des sables\naujourd’hui disparu. Il est arrivé à Galar\ndans une cargaison de pierres précieuses."
          shield: "Lorsqu’il déploie sa collerette pour emmagasiner\nla lumière du soleil, il génère à lui seul assez\nd’électricité pour alimenter une grande ville."
        it:
          sword: "Un tempo era tenuto in grande considerazione\nin un paese desertico ormai scomparso. È giunto\na Galar in casse contenenti tesori."
          shield: "L’energia prodotta da un Heliolisk quando apre\nil suo collare in un luogo soleggiato è sufficiente\na soddisfare il fabbisogno di una metropoli."
        de:
          sword: "Es wurde in einem Wüstenreich, das vor langer\nZeit unterging, sehr respektiert. Zusammen mit\ndessen Schätzen gelangte es in die Galar-Region."
          shield: "Stellt es seine kragenartigen Hautlappen auf und\nabsorbiert damit Sonnenlicht, kann ein Elezard\ngenug Strom für eine Großstadt produzieren."
        es:
          sword: "Venerado por una antigua civilización del\ndesierto, ahora desaparecida, llegó a Galar\njunto a sus tesoros y reliquias."
          shield: "Al extender su gorguera y exponerse a la luz\nsolar, genera la energía eléctrica suficiente para\ncubrir el consumo de una metrópoli entera."
        ko:
          sword: "과거에 멸망한 사막 나라에서\n소중하게 여겼었다. 보물과 함께\n가라르지방에 오게 됐다."
          shield: "깃을 펼쳐 태양광을 받으면\n대도시에서 사용할 수 있는\n전기를 혼자서 발전한다."
        zh_simp:
          sword: "在如今已灭亡的沙漠之国\n曾经是人们珍视的对象。\n和财宝一起来到了伽勒尔地区。"
          shield: "如果展开颈伞沐浴阳光，\n单凭１只光电伞蜥就能\n制造出大城市所需的电力。"
        zh_trad:
          sword: "在如今已滅亡的沙漠之國\n曾經是人們珍視的對象。\n和財寶一起來到了伽勒爾地區。"
          shield: "如果展開頸傘沐浴陽光，\n單憑１隻光電傘蜥就能\n製造出大城市所需的電力。"
