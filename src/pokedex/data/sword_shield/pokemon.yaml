      descriptions:
        jp_kana:
          sword: "ひとのおうと　ちからを　あわせ\nガラルを　すくった　ポケモン。\nきんぞくを　とりこみ　たたかう。"
          shield: "せきぞうの　ような　すがたで\nわすれさられるほどの　あいだ\nねむりに　ついていた　ポケモン。"
        jp_kanji:
          sword: "人の王と　力を　あわせ\nガラルを　救った　ポケモン。\n金属を　取り込み　戦う。"
          shield: "石像の　ような　姿で\n忘れ去られるほどの　あいだ\n眠りに　ついていた　ポケモン。"
        en:
          sword: "In times past, it worked together with a king of\nthe people to save the Galar region. It absorbs\nmetal that it then uses in battle."
          shield: "This Pokémon slept for aeons while in the form of\na statue. It was asleep for so long, people forgot\nthat it ever existed."
        fr:
          sword: "Ce Pokémon sauva autrefois Galar en joignant\nses forces à celles du roi des Hommes.\nIl absorbe du métal quand il passe au combat."
          shield: "Ce Pokémon, changé en statue, est resté pétrifié\nsi longtemps qu’il a failli tomber dans l’oubli."
        it:
          sword: "Ha salvato Galar unendo le forze con il re\ndegli uomini. Assorbe il metallo e se ne serve\nper lottare."
          shield: "Questo Pokémon è rimasto addormentato sotto\nforma di statua così a lungo da venire\ncompletamente dimenticato."
        de:
          sword: "Dieses Pokémon vereinte seine Kräfte mit einem\nMenschenkönig und rettete die Galar-Region.\nEs nimmt Metall in sich auf und kämpft damit."
          shield: "Dieses Pokémon fiel in Form einer Steinstatue\nin solch einen langen Schlaf, dass es in\nVergessenheit geraten ist."
        es:
          sword: "Este Pokémon se erigió en salvador de Galar,\ntras unir fuerzas con un rey de los hombres.\nAbsorbe el metal para utilizarlo en combate."
          shield: "Con la apariencia de una estatua de piedra, este\nPokémon se sumió en un letargo tan profundo\nque acabó cayendo en el olvido."
        ko:
          sword: "인간의 왕과 힘을 합쳐\n가라르를 구한 포켓몬.\n금속을 흡수해서 싸운다."
          shield: "석상 같은 모습으로\n잊혀질 정도의 세월 동안\n잠들어 있던 포켓몬이다."
        zh_simp:
          sword: "与众人之王协力\n拯救了伽勒尔的宝可梦。\n吸收金属来进行战斗。"
          shield: "以石像般的姿态陷入\n长久沉眠的宝可梦。\n几乎就要被人们所遗忘。"
        zh_trad:
          sword: "與眾人之王協力\n拯救了伽勒爾的寶可夢。\n吸收金屬來進行戰鬥。"
          shield: "以石像般的姿態陷入\n長久沉眠的寶可夢。\n幾乎就要被人們所遺忘。"
    zamazenta_crowned_shield:
      form_id: 1
      names:
        jp_kana: たてのおう
        jp_kanji: たてのおう
        en: Crowned Shield
        fr: Bouclier Suprême
        it: Re degli Scudi
        de: König des Schildes
        es: Escudo Supremo
        ko: 방패왕
        zh_simp: 盾之王
        zh_trad: 盾之王
      base_stats:
        hp: 92
        attack: 130
        defense: 145
        special_attack: 80
        special_defense: 145
        speed: 128
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 3
      types:
        - fighting
        - steel
      egg_groups:
        - undiscovered
      abilities:
        - dauntless_shield
      descriptions:
        jp_kana:
          sword: "いかなる　こうげきも　はじきかえす\nすがたは　かくとうおうのたて　と\nよばれ　おそれ　あがめられた。"
          shield: "ダイマックスポケモンの　いちげきも\nいとも　たやすく　うけとめる\nかんぜんぶそうした　すがた。"
        jp_kanji:
          sword: "いかなる　攻撃も　弾き返す\n姿は　格闘王の盾　と\n呼ばれ　恐れ　崇められた。"
          shield: "ダイマックスポケモンの　一撃も\nいとも　たやすく　受け止める\n完全武装した　姿。"
        en:
          sword: "Its ability to deflect any attack led to it being\nknown as the Fighting Master’s Shield.\nIt was feared and respected by all."
          shield: "Now that it’s equipped with its shield, it can\nshrug off impressive blows, including the attacks\nof Dynamax Pokémon."
        fr:
          sword: "Craint et respecté de tous, il était surnommé\nle « bouclier du roi guerrier », car il pouvait\nrepousser n’importe quelle attaque."
          shield: "Il est équipé d’une protection parfaite pouvant\naisément contrer toutes les attaques, même\nsi son ennemi bénéficie de la force du Dynamax."
        it:
          sword: "Quando assume questa forma, è detto “scudo\ndel re lottatore” in segno di timore e rispetto per\nla sua capacità di respingere qualsiasi attacco."
          shield: "Quando assume questa forma perfettamente\ncorazzata, può parare con estrema facilità\npersino gli attacchi dei Pokémon Dynamax."
        de:
          sword: "Weil es alles und jeden abwehren konnte, trug es\neinst den Namen „Kämpferkönigsschild“ und\nwurde gleichermaßen gefürchtet und verehrt."
          shield: "In dieser schwer gepanzerten Form kann es sogar\ndie Angriffe von Dynamax-Pokémon mit\nspielerischer Leichtigkeit abwehren."
        es:
          sword: "Esta forma, temida y venerada por igual, le ha\nvalido el nombre de Regio Escudo Guerrero por\nsu capacidad de repeler cualquier ataque."
          shield: "En esta forma, su capacidad defensiva es tal que\npuede bloquear con extrema facilidad incluso los\nataques de un Pokémon Dinamax."
        ko:
          sword: "어떤 공격도 튕겨내는 모습은\n격투왕의 방패라 불리며\n두려움과 공경의 대상이었다."
          shield: "다이맥스 포켓몬의 일격도\n매우 쉽게 막아내는\n완전무장한 모습이다."
        zh_simp:
          sword: "能够反弹一切的攻击，\n因此被称为格斗王之盾，\n受到人们的畏惧与尊崇。"
          shield: "全副武装的样子。\n即使是极巨化宝可梦\n的攻击也能轻易抵挡。"
        zh_trad:
          sword: "能夠反彈一切的攻擊，\n因此被稱為格鬥王之盾，\n受到人們的畏懼與尊崇。"
          shield: "全副武裝的樣子。\n即使是極巨化寶可夢\n的攻擊也能輕易抵擋。"
