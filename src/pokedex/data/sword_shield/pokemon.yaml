        - water
      egg_groups:
        - water_3
      abilities:
        - hyper_cutter
        - shell_armor
      hidden_ability: sheer_force
      descriptions:
        jp_kana:
          sword: "うみの　ちかくで　みつかる。\nおおきな　ハサミは　もぎとっても\nあとから　また　はえてくる。"
          shield: "きけんがせまると　くちから　はきだす\nあわで　ぜんしんを　つつんで\nからだを　おおきく　みせようとする。"
        jp_kanji:
          sword: "海の　近くで　見つかる。\n大きな　ハサミは　もぎとっても\nあとから　また　生えてくる。"
          shield: "危険がせまると　口から　吐きだす\n泡で　全身を　包んで\n体を　大きく　みせようとする。"
        en:
          sword: "It can be found near the sea. The large pincers\ngrow back if they are torn out of their sockets."
          shield: "If it senses danger approaching, it cloaks itself\nwith bubbles from its mouth so it will look bigger."
        fr:
          sword: "On trouve ce Pokémon près de la mer.\nSes grosses pinces peuvent repousser\nsi elles sont arrachées."
          shield: "S’il se sent menacé, il se cache derrière les bulles\némises par sa bouche pour paraître plus gros."
        it:
          sword: "Lo si può trovare vicino al mare. Le grandi chele,\nse si staccano, ricrescono."
          shield: "Se si sente in pericolo, emette bolle dalla bocca\ne se ne circonda per sembrare più grande."
        de:
          sword: "Es kommt vor allem nahe dem Meer vor.\nDie großen Scheren wachsen nach, wenn\nsie vom Körper abgetrennt wurden."
          shield: "Wittert es Gefahr, hüllt es sich in Blasen aus\nseinem Maul, um größer zu erscheinen."
        es:
          sword: "Es fácil encontrarlo cerca del mar. Las largas\npinzas que tiene vuelven a crecer si se las quitan\nde su sitio."
          shield: "Ante el peligro, se camufla con las burbujas que\ndesprende por la boca para parecer más grande."
        ko:
          sword: "바다 근처에서 발견된다.\n커다란 집게는 뜯겨도\n나중에 다시 자라난다."
          shield: "위험이 닥치면 입에서 뿜어내는\n거품으로 전신을 감싸서\n몸을 크게 보이려고 한다."
        zh_simp:
          sword: "能在海边上找到它。\n巨大的钳子即使断掉，\n今后也会再长出来。"
          shield: "如果危险逼近，\n就会从嘴里吐出泡沫包裹全身，\n让身体看起来更大。"
        zh_trad:
          sword: "能在海邊找到牠。\n巨大的鉗子即使斷掉\n也會再長出來。"
          shield: "如果危險逼近，\n就會從嘴裡吐出泡沫包裹全身，\n讓身體看起來更大。"
