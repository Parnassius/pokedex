      types:
        - fire
        - psychic
      egg_groups:
        - field
      abilities:
        - sheer_force
      hidden_ability: zen_mode
      descriptions:
        jp_kana:
          sword: "めいそう　することで　あらぶる\nこころを　しずめ　サイコパワーを\nふかく　とぎすませて　いる。"
          shield: "きずを　おうと　いわの　ように\nうごかなくなる。　もっこうして\nこころを　とぎすまして　いるのだ。"
        jp_kanji:
          sword: "瞑想　することで　荒ぶる\n心を　静め　サイコパワーを\n深く　研ぎ澄ませている。"
          shield: "傷を　負うと　岩の　ように\n動かなくなる。　黙考して\n心を　研ぎ澄まして　いるのだ。"
        en:
          sword: "Through meditation, it calms its raging spirit and\nhones its psychic powers."
          shield: "When wounded, it stops moving. It goes as\nstill as stone to meditate, sharpening its mind\nand spirit."
        fr:
          sword: "Entrer dans un état de méditation profonde\nlui permet de calmer son esprit et d’accroître\nla puissance de ses pouvoirs psychiques."
          shield: "Quand il est blessé, il devient aussi immobile\nque la pierre. Il est en fait en train d’aiguiser\nson esprit grâce à la méditation."
        it:
          sword: "Attraverso la meditazione, placa il suo animo\nimpetuoso e affina i suoi poteri psichici."
          shield: "Se subisce danni, diventa immobile come\nun sasso e medita per temprare lo spirito."
        de:
          sword: "Es meditiert, um seine wilden Impulse zu zügeln.\nDies hat zugleich eine beachtliche Steigerung\nseiner Psycho-Kräfte zur Folge."
          shield: "Nimmt es im Kampf Schaden, wird es hart wie\nStein und fällt in eine Trance, um seinen Verstand\nzu schärfen."
        es:
          sword: "Entra en un estado de meditación profunda\nque le permite reprimir su cólera y agudizar\nsus poderes psíquicos."
          shield: "Cuando resulta herido, se queda inmóvil como\nuna piedra y medita para agudizar la mente."
        ko:
          sword: "명상을 통해 난폭한 마음을\n가라앉히고 사이코 파워를\n더욱 갈고닦고 있다."
          shield: "상처를 입으면 바위처럼\n움직이지 않게 된다. 묵상으로\n정신을 수양하고 있는 것이다."
        zh_simp:
          sword: "它会通过冥想来\n镇静自己浮躁的心，\n以此磨练精神力量。"
          shield: "受伤之后会像岩石一样\n动也不动。那其实是它\n在用沉思来磨练内心。"
        zh_trad:
          sword: "牠會透過冥想來\n鎮靜自己浮躁的心，\n以此磨鍊精神力量。"
          shield: "受傷之後會像岩石一樣\n動也不動。那其實是牠\n在用沉思來磨鍊內心。"
