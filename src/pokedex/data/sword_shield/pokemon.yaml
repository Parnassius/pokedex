          shield: "ひとの　かんがえていることも\nわかるので　ただしい　こころの\nトレーナーにしか　なつかない。"
        jp_kanji:
          sword: "大岩も　粉々に　砕く\n波動と　呼ばれる　力を\n操って　獲物を　狩る。"
