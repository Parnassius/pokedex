          sword: "ほのおでも　とけない　こおりの\nからだ。　くうきちゅうの　すいぶんを\nいっしゅんで　こおらせてしまう。"
          shield: "くうきちゅうの　すいぶんを\nいっしゅんで　こおらせる　ちからで\nえものを　れいとうして　しまう。"
        jp_kanji:
          sword: "炎でも　溶けない　氷の\n体。　空気中の　水分を\n一瞬で　凍らせてしまう。"
          shield: "空気中の　水分を\n一瞬で　凍らせる　力で\n獲物を　冷凍して　しまう。"
        en:
          sword: "It has a body of ice that won’t melt, even with\nfire. It can instantly freeze moisture in\nthe atmosphere."
          shield: "It can instantly freeze moisture in the\natmosphere. It uses this power to freeze its foes."
        fr:
          sword: "Son corps constitué de glace ne peut pas fondre,\nmême s’il est exposé au feu. Il peut geler\nl’humidité contenue dans l’air instantanément."
          shield: "Il a le pouvoir de geler l’humidité ambiante\nen un instant et peut ainsi immobiliser ses proies."
        it:
          sword: "Neppure il fuoco riesce a sciogliere il suo corpo\ndi ghiaccio. Può congelare istantaneamente\nl’umidità dell’atmosfera."
          shield: "È capace di ghiacciare istantaneamente\nl’umidità dell’atmosfera. Sfrutta questo\npotere per congelare la preda."
        de:
          sword: "Seinen Eiskörper bringt nichts zum Schmelzen,\nauch Feuer nicht. Es kann Feuchtigkeit in der\nLuft sofort in Eis verwandeln."
          shield: "Es kann Feuchtigkeit in der Luft augenblicklich\nzum Gefrieren bringen und nutzt dies, um seine\nBeute zu Eis erstarren zu lassen."
        es:
          sword: "Ni siquiera el fuego puede derretir su cuerpo\nde hielo. Es capaz de congelar en un instante\nla humedad del ambiente."
          shield: "Congela a sus presas helando en un momento la\nhumedad contenida en el aire que lo rodea."
        ko:
          sword: "불꽃에도 녹지 않는 얼음으로 된 몸.\n공기 중의 수분을\n순식간에 얼려버린다."
          shield: "공기 중의 수분을\n단숨에 얼게 하는 힘으로\n먹이를 냉동시켜 버린다."
        zh_simp:
          sword: "拥有火焰也无法融化的\n冰之躯体。能让空气中的\n水分在一瞬间冻结。"
          shield: "用令空气中的水分\n瞬间冻结的力量，\n将猎物冰冻起来。"
        zh_trad:
          sword: "擁有火焰也無法融化的\n冰之軀體。能讓空氣中的\n水分在一瞬間凍結。"
          shield: "會用可讓空氣中的水分\n瞬間凍結的力量，\n將獵物冰凍起來。"
