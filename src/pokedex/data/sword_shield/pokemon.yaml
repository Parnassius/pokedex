      descriptions:
        jp_kana:
          sword: "まんげつのよる　ピッピが　あつまって\nダンスを　おどるようすを　みると\nしあわせに　なれると　いわれている。"
          shield: "あいくるしい　しぐさと　なきごえで\nかわいいと　だいにんきの　ポケモン。\nだが　めったに　みつからない。"
        jp_kanji:
          sword: "満月の夜　ピッピが　集まって\nダンスを　踊るようすを　見ると\nしあわせに　なれると　言われている。"
          shield: "愛くるしい　しぐさと　鳴き声で\nかわいいと　大人気の　ポケモン。\nだが　めったに　見つからない。"
        en:
          sword: "It is said that happiness will come to those who\nsee a gathering of Clefairy dancing under a\nfull moon."
          shield: "Its adorable behavior and cry make it highly popular.\nHowever, this cute Pokémon is rarely found."
        fr:
          sword: "On dit que ceux qui voient danser un groupe\nde Mélofée sous la pleine lune connaîtront\nun grand bonheur."
          shield: "Son comportement et son cri adorables font de\nlui un Pokémon très populaire. Malheureusement,\nil est difficile d’en croiser un spécimen."
        it:
          sword: "Si dice che vedere un gruppo di Clefairy ballare\ncon la luna piena sia di ottimo auspicio."
          shield: "Il suo verso e le sue movenze graziose rendono\nquesto adorabile Pokémon molto popolare.\nSfortunatamente, però, è molto raro."
        de:
          sword: "Eine Ansammlung von Piepi bei Vollmond tanzen\nzu sehen, soll ein glückliches Leben verheißen."
          shield: "Aufgrund seines reizenden Wesens und seines\nRufes erfreut sich dieses Pokémon großer\nBeliebtheit. Leider ist es auch sehr selten."
        es:
          sword: "Se dice que la felicidad llegará a quien vea un\ngrupo de Clefairy bailando a la luz de la luna\nllena."
          shield: "Su adorable grito y comportamiento lo hacen\nmuy popular. Sin embargo, raramente se avista."
        ko:
          sword: "보름달 밤에 삐삐가 모여\n춤을 추는 모습을 보면\n행복해진다고 전해진다."
          shield: "애교 있는 몸동작과 울음소리로\n귀엽다고 많은 인기를 누리는 포켓몬.\n그러나 좀처럼 눈에 띄지 않는다."
        zh_simp:
          sword: "据说在满月的夜晚，\n如果能看到皮皮们聚在一起跳舞，\n就能得到幸福。"
          shield: "因可爱的举止和叫声\n而广受欢迎的宝可梦。\n不过很少被人发现。"
        zh_trad:
          sword: "據說如果在滿月的夜晚\n看見皮皮們聚在一起跳舞，\n就能得到幸福。"
          shield: "因可愛的舉止和叫聲\n而廣受歡迎的寶可夢。\n不過很少被人發現。"
