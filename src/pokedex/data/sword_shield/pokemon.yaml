          shield: "にんげんの　こどもに　にた　こえで\nないて　おとなを　もりの　おくへ\nさそいこみ　まよわせて　しまうのだ。"
        jp_kanji:
          sword: "森で　さまよい　命を　落とした\n子どもの　魂が　切り株に\n宿り　ポケモンに　生まれ変わった。"
          shield: "人間の　子どもに　似た　声で\n鳴いて　大人を　森の　奥へ\n誘い込み　迷わせて　しまうのだ。"
        en:
          sword: "After a lost child perished in the forest, their\nspirit possessed a tree stump, causing the spirit’s\nrebirth as this Pokémon."
          shield: "With a voice like a human child’s, it cries out to\nlure adults deep into the forest, getting them lost\namong the trees."
        fr:
          sword: "Ce Pokémon prend vie lorsque l’âme d’un enfant\ndisparu en forêt prend possession d’une souche\nd’arbre."
          shield: "Il imite des cris d’enfants pour pousser les adultes\nà venir se perdre au plus profond de la forêt."
        it:
          sword: "Questo Pokémon è nato quando l’anima di\nun bambino smarritosi nel bosco è entrata\nnel ceppo di un albero."
          shield: "Emette un pianto simile a quello di un bambino\nper attirare gli adulti nel cuore della foresta\ne farli perdere."
        de:
          sword: "Die Seele eines Kindes, das sich im Wald verlief\nund dabei ums Leben kam, nistete sich in einem\nBaumstumpf ein und wurde zu diesem Pokémon."
          shield: "Es imitiert das Schluchzen eines Menschenkindes,\num Erwachsene tief in den Wald zu locken und\ndafür zu sorgen, dass diese sich verlaufen."
        es:
          sword: "Se dice que en realidad son almas de niños que\npasaron a mejor vida tras perderse en el bosque\ny se convirtieron en Pokémon al habitar un tocón."
          shield: "Imita el llanto de un niño con la intención de\nque algún adulto se adentre y se pierda en lo\nmás profundo del bosque."
        ko:
          sword: "숲속을 헤매다 목숨을 잃은\n아이의 영혼이 나무 그루터기에\n씌어 포켓몬으로 다시 태어났다."
          shield: "인간의 어린이를 닮은 목소리로\n울어 어른을 숲속으로\n유인하여 길을 잃게 한다."
        zh_simp:
          sword: "在森林中迷路死去的\n孩子的魂魄附在树桩上，\n转生成了宝可梦。"
          shield: "用类似人类小孩的声音鸣叫，\n把大人引到森林的深处，\n让他们在其中迷失方向。"
        zh_trad:
          sword: "在森林中迷路死去的\n孩子的魂魄附在樹樁上，\n轉生成了寶可夢。"
          shield: "用類似人類小孩的聲音鳴叫，\n把大人引到森林的深處，\n讓他們在其中迷失方向。"
