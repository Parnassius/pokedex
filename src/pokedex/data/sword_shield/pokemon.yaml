          shield: "ツメで　サインを　えがき　なかまと\nれんらく。　サインの　しゅるいは\n５００いじょう　あると　いう。"
        jp_kanji:
          sword: "群れを　成し　獲物を　襲う。\nチームプレーで　マンムーなどの\n大物も　たやすく　しとめる。"
          shield: "ツメで　サインを　描き　仲間と\n連絡。　サインの　種類は\n５００以上　あると　いう。"
        en:
          sword: "They attack their quarry in packs. Prey as large\nas Mamoswine easily fall to the teamwork of\na group of Weavile."
          shield: "With its claws, it leaves behind signs for its\nfriends to find. The number of distinct signs\nis said to be over 500."
        fr:
          sword: "Ils chassent en hordes. Grâce à leur bonne\ncoordination, ils peuvent aisément venir à bout\nde grands Pokémon comme Mammochon."
          shield: "Il communique avec ses semblables en gravant\ndes motifs avec ses griffes. Il existerait près\nde 500 signes différents."
        it:
          sword: "Caccia in gruppo. Grazie al lavoro di squadra\nriesce ad avere la meglio anche su prede di\ngrossa taglia come i Mamoswine."
          shield: "Comunica con i suoi simili tramite i segni che\ntraccia con le unghie. Si dice che esistano più\ndi 500 segni diversi."
        de:
          sword: "Sie jagen ihre Beute in Gruppen. Im Team\nerledigen sie selbst große Ziele wie Mamutel\nmit Leichtigkeit."
          shield: "Sie kommunizieren miteinander, indem sie\nZeichen mit ihren Krallen hinterlassen. Es soll\nüber 500 davon geben."
        es:
          sword: "Cazan en grupo, lo que les permite abatir con\nfacilidad presas de gran tamaño, como los\nMamoswine."
          shield: "Se comunican mediante marcas que tallan con\nsus garras. Se cree que tienen un repertorio de\nmás de 500."
        ko:
          sword: "무리를 지어 먹이를 공격한다.\n팀플레이로 맘모꾸리 같은\n큰 상대도 손쉽게 처리한다."
          shield: "발톱으로 사인을 그려\n동료와 연락한다. 사인의 종류는\n500가지가 넘는다고 한다."
        zh_simp:
          sword: "成群结队袭击猎物。\n通过团队合作，连象牙猪那样\n强大的对手也能轻松解决。"
          shield: "通过用爪子留下记号\n来与伙伴联络。据说记号\n的种类有５００种以上。"
        zh_trad:
          sword: "成群結隊襲擊獵物。\n透過團隊合作，連象牙豬那樣\n強大的對手也能輕鬆解決。"
          shield: "透過用爪子留下記號\n來與夥伴聯絡。據說記號\n的種類有５００種以上。"
