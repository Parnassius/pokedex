      descriptions:
        jp_kana:
          sword: "しっぽを　つなげて　なかまから\nでんきエネルギーを　わけてもらうと\nより　つよい　でんげきを　はなてる。"
          shield: "てきに　であうと　１００まんボルトの\nいりょくを　もつ　ツメを　あしから\nだして　たたかいに　そなえる。"
        jp_kanji:
          sword: "しっぽを　つなげて　仲間から\n電気エネルギーを　分けてもらうと\nより　強い　電撃を　放てる。"
          shield: "敵に　出会うと　１００万ボルトの\n威力を　もつ　ツメを　足から　だして\n戦いに　備える。"
        en:
          sword: "By joining its tail with that of another Luxio, this\nPokémon can receive some of the other Luxio’s\nelectricity and power up its own electric blasts."
          shield: "Upon encountering an opponent, this Pokémon\nprepares for battle by extending its claws, which\ncan put out 1,000,000 volts of electricity."
        fr:
          sword: "En reliant sa queue à celles de ses congénères,\nil peut recevoir leur énergie électrique et lancer\ndes décharges encore plus puissantes."
          shield: "Quand il croise un ennemi, il se prépare\nau combat en sortant ses griffes dont les coups\nont une puissance qui atteint un million de volts."
        it:
          sword: "Se collega la coda con quella dei suoi simili per\nricevere energia elettrica, può emettere scariche\nelettriche ancora più potenti."
          shield: "Se incontra un nemico, si prepara alla lotta\nestraendo gli artigli dotati di una potenza pari\na 1 milione di volt."
        de:
          sword: "Verbindet es seinen Schweif mit dem eines\nArtgenossen, absorbiert es einen Teil von dessen\nElektrizität und teilt stärkere Stromschläge aus."
          shield: "Sieht es Gegner, macht es sich kampfbereit,\nindem es die Krallen an den Pfoten ausfährt,\nwelche eine Million Volt austeilen können."
        es:
          sword: "Al unir la cola con otro congénere, este le\ntransmite electricidad, lo que aumenta la\npotencia de sus descargas eléctricas."
          shield: "Cuando encuentra a un adversario, se prepara\npara combatir sacando las garras, que emiten\nuna corriente eléctrica de un millón de voltios."
        ko:
          sword: "꼬리를 이어서 동료로부터\n전기 에너지를 나눠 받으면\n보다 강한 전격을 내보낼 수 있다."
          shield: "적을 만나면 100만 볼트의\n위력을 가진 발톱을\n드러내어 싸움에 대비한다."
        zh_simp:
          sword: "当把尾巴和伙伴连接在一起时，\n可以分享到对方的电能，\n从而释放出更加强力的电击。"
          shield: "遇到敌人时会从脚\n伸出有着百万伏特\n威力的爪子来迎战。"
        zh_trad:
          sword: "如果與夥伴尾巴牽尾巴，\n就能借用對方的電能，\n然後發出更強的電擊。"
          shield: "遇見敵人時會從腳伸出\n有百萬伏特威力的爪子，\n為對戰做好準備。"
