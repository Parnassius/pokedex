      descriptions:
        jp_kana:
          sword: "とくしゅな　モーターで　うごく\nオーブンレンジに　はいっている。\nほのおを　あやつるのが　とくい。"
          shield: "おきにいりの　ふくを　こがす。\nねつを　つかった　わるさを\nたのしむ　ロトムの　すがた。"
        jp_kanji:
          sword: "特殊な　モーターで　動く\nオーブンレンジに　入っている。\n炎を　操るのが　得意。"
          shield: "お気に入りの　服を　焦がす。\n熱を　使った　悪さを\n楽しむ　ロトムの　姿。"
        en:
          sword: "This Rotom has possessed a convection\nmicrowave oven that uses a special motor.\nIt also has a flair for manipulating flames."
          shield: "This form of Rotom enjoys making mischief by\nturning up the heat. It will gleefully burn your\nfavorite outfit."
        fr:
          sword: "Il a pris possession d’un four muni d’un moteur\nspécial. Il manipule les flammes avec brio."
          shield: "Sous cette forme, Motisma adore utiliser\nla chaleur pour faire des bêtises, comme brûler\nles vêtements favoris des gens."
        it:
          sword: "È entrato in un forno elettrico azionato da un\nmotore speciale. La sua specialità è controllare\nil fuoco."
          shield: "Sotto questa forma si diverte a carbonizzare\ni vestiti preferiti di qualche malcapitato o\ncombina altre malefatte usando il fuoco."
        de:
          sword: "Es ist in einen Mikrowellenherd eingedrungen,\nder von einem besonderen Motor betrieben wird.\nIm Umgang mit Feuer ist es sehr geschickt."
          shield: "Diese Form von Rotom liebt es, mit Hitze für\nChaos zu sorgen. Es verkohlt gerne die\nLieblingskleidung von Menschen."
        es:
          sword: "Ha tomado posesión de un horno eléctrico que\nfunciona con un motor especial. Controla el\nfuego con maña."
          shield: "Asume esta forma cuando quiere emplear\nel fuego para cometer fechorías tales como\nchamuscar la ropa favorita de la gente."
        ko:
          sword: "특수한 모터로 움직이는\n오븐레인지에 들어갔다.\n불꽃을 다루는 것이 특기다."
          shield: "마음에 드는 옷을 태운다.\n열을 이용해 장난을\n즐기는 로토무의 모습."
        zh_simp:
          sword: "钻进由特殊马达驱动的\n烤箱微波炉里的洛托姆。\n十分擅长控制火焰。"
          shield: "会烤焦你最爱的衣服。\n喜欢用加热来\n恶作剧的洛托姆。"
        zh_trad:
          sword: "鑽進由特殊馬達驅動的\n烤箱微波爐裡的洛托姆。\n十分擅長控制火焰。"
          shield: "會烤焦你最愛的衣服。\n喜歡用加熱來\n惡作劇的洛托姆。"
    rotom_wash:
