          shield: "とぶのが　ヘタな　ヒナを　ねらい\nとりポケモンの　すの　ちかくに\nでんきの　いとで　ワナを　はるぞ。"
        jp_kanji:
          sword: "電気を　帯びた　お腹の　毛を\n飛ばして　攻撃。　毛が　刺さると\n三日三晩　全身が　痺れる。"
          shield: "飛ぶのが　ヘタな　ヒナを　狙い\n鳥ポケモンの　巣の　近くに\n電気の　糸で　罠を　張るぞ。"
        en:
          sword: "It launches electrified fur from its abdomen as its\nmeans of attack. Opponents hit by the fur could\nbe in for three full days and nights of paralysis."
          shield: "It lays traps of electrified threads near the nests\nof bird Pokémon, aiming to snare chicks that are\nnot yet good at flying."
        fr:
          sword: "Il attaque en projetant les poils de son abdomen\nchargés en électricité. La victime reste alors\nparalysée pendant trois jours et trois nuits."
          shield: "Il piège les oisillons qui ne savent pas encore\nvoler en tissant une toile électrique près des nids\ndes Pokémon oiseaux."
        it:
          sword: "Attacca lanciando peli carichi di elettricità\ndall’addome. Chi viene colpito rimane\nparalizzato per tre giorni interi."
          shield: "Tesse trappole di fili elettrizzati vicino ai nidi\ndi Pokémon alati per catturare i piccoli che\nnon sanno ancora volare."
        de:
          sword: "Es schießt elektrisch geladene Haare von seinem\nAbdomen. Wer getroffen wird, ist drei Tage und\nNächte am ganzen Körper gelähmt."
          shield: "Es spinnt Fallen aus elektrischen Fäden nahe den\nNestern von Vogel-Pokémon, um vor allem jene\nJungen zu fangen, die nicht gut fliegen können."
        es:
          sword: "Ataca lanzando hilos electrificados por el\nabdomen, que inmovilizan por completo al\nenemigo durante tres días y tres noches."
          shield: "Teje una tela con hilo electrificado junto a los\nnidos de Pokémon pájaro para atrapar a los\npolluelos que aún no saben volar bien."
        ko:
          sword: "전기를 띤 배의 털을 날려서\n공격한다. 털에 찔리면\n삼 일 밤낮으로 전신이 마비된다."
          shield: "잘 날지 못하는 새끼를 노리고\n새포켓몬 둥지 가까이에\n전기로 된 실로 함정을 만든다."
        zh_simp:
          sword: "发射腹部带电的毛来攻击。\n要是被它的毛刺中，\n就会全身麻痹三天三夜。"
          shield: "为了捕捉不太会飞的幼鸟，\n会在鸟宝可梦的巢穴附近\n用带电的丝设下陷阱。"
        zh_trad:
          sword: "發射腹部帶電的毛來攻擊。\n要是被牠的毛刺中，\n就會全身麻痺三天三夜。"
          shield: "為了捕捉不太會飛的幼鳥，\n會在鳥寶可夢的巢穴附近\n用帶電的絲設下陷阱。"
