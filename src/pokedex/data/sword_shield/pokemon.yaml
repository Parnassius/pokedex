      descriptions:
        jp_kana:
          sword: "きんにくの　しゅうしゅくで　でんきを\nつくる。　むしゃぶるいは　はげしく\nはつでんしている　しょうこ。"
          shield: "たいもうが　でんきで　はっこうする。\nあかるく　ひかる　しっぽの　さきを\nふって　なかまに　サインを　おくる。"
        jp_kanji:
          sword: "筋肉の　収縮で　電気を　つくる。\n武者震いは　激しく\n発電している　証拠。"
          shield: "体毛が　電気で　発光する。\n明るく　光る　しっぽの　先を　振って\n仲間に　サインを　送る。"
        en:
          sword: "This Pokémon generates electricity by contracting\nits muscles. Excited trembling is a sign that Shinx\nis generating a tremendous amount of electricity."
          shield: "Electricity makes this Pokémon’s fur glow. Shinx\nsends signals to others of its kind by shaking the\ntip of its tail while the tail tip is shining brightly."
        fr:
          sword: "Il produit de l’électricité en contractant ses\nmuscles. S’il tremble d’excitation, c’est le signe\nqu’il est en train d’en générer en grande quantité."
          shield: "Sa fourrure s’illumine grâce à l’électricité.\nIl agite l’extrémité lumineuse de sa queue\npour envoyer des signes à ses congénères."
        it:
          sword: "Produce elettricità contraendo i muscoli.\nQuando è scosso da tremiti, è segno che\nne sta generando in notevole quantità."
          shield: "La sua pelliccia irradia luce per via\ndell’elettricità. Invia segnali ai suoi simili\nagitando la punta luminosa della coda."
        de:
          sword: "Durch Muskelkontraktionen erzeugt es Strom.\nHeftiges Zittern ist bei Sheinux ein Anzeichen\ndafür, dass es sehr viel Elektrizität generiert."
          shield: "Es bringt sein Fell mit Elektrizität zum Glühen.\nUm seinen Artgenossen Signale zu übermitteln,\nwedelt es mit seiner leuchtenden Schweifspitze."
        es:
          sword: "Produce energía eléctrica al contraer los\nmúsculos. Si tiembla de emoción, significa que\nestá generando gran cantidad de electricidad."
          shield: "Su pelaje brilla gracias a la electricidad. Envía\nseñales a sus semejantes agitando la punta\nluminosa de la cola."
        ko:
          sword: "근육을 수축해서 전기를 만든다.\n몸을 떠는 것은 격렬하게\n전기를 발생시키고 있다는 증거다."
          shield: "털이 전기로 빛난다.\n밝게 빛나는 꼬리 끝을 흔들어\n동료에게 신호를 보낸다."
        zh_simp:
          sword: "靠伸缩肌肉来制造电能。\n如果看到它兴奋地浑身颤抖，\n就说明它正在猛烈发电。"
          shield: "体毛通电后就会发光。\n会摇晃明亮发光的尾巴\n尖端来向伙伴发送信号。"
        zh_trad:
          sword: "能利用肌肉的伸縮來產生\n電流。當牠全身都在抖動時，\n就代表牠正在激烈地發電。"
          shield: "體毛通電就會發光。\n會揮動明亮發光的尾巴\n前端來向夥伴打信號。"
luxio:
