        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - normal
      egg_groups:
        - undiscovered
      abilities:
        - battle_armor
      descriptions:
        jp_kana:
          sword: "ごくひだった　けんきゅう　しりょうが\nぬすまれ　ガラルちほうで　あらたに\nつくりだされたと　うわさされている。"
          shield: "しんわの　ポケモンを　モデルに\nつくられたが　ちからの　ぼうそうを\nおさえる　マスクを　つけられている。"
        jp_kanji:
          sword: "極秘だった　研究資料が\n盗まれ　ガラル地方で　新たに\nつくりだされたと　噂されている。"
          shield: "神話の　ポケモンを　モデルに\nつくられたが　力の　暴走を\n抑える　マスクを　着けられている。"
        en:
          sword: "Rumor has it that the theft of top-secret research\nnotes led to a new instance of this Pokémon\nbeing created in the Galar region."
          shield: "It was modeled after a mighty Pokémon of myth.\nThe mask placed upon it limits its power in order\nto keep it under control."
        fr:
          sword: "On raconte qu’il aurait été recréé à Galar\nsuite à un vol de documents de recherche\nhautement confidentiels."
          shield: "Il a été créé artificiellement d’après un Pokémon\nmythique. Il est muni d’un masque afin de contenir\nsa puissance."
        it:
          sword: "Si dice che sia stato ricreato nuovamente a\nGalar sulla base di documenti top secret\ntrafugati."
          shield: "È stato creato sul modello di un Pokémon\nmitologico. È stato necessario dotarlo di una\nmaschera per tenere a freno la sua potenza."
        de:
          sword: "Gerüchte besagen, es sei in der Galar-Region\nmithilfe von gestohlenen, streng geheimen\nDokumenten komplett neu erschaffen worden."
          shield: "Typ:Null ist eine künstliche Nachbildung eines\nPokémon aus einer alten Sage. Die Maske dient\ndazu, seine Kräfte unter Kontrolle zu halten."
        es:
          sword: "Se rumorea que ha sido recreado en Galar a\npartir de documentos de investigación de alto\nsecreto robados."
          shield: "Fue creado a imagen de un Pokémon mitológico.\nLleva una máscara de contención para evitar que\nsu poder se descontrole."
        ko:
          sword: "극비였던 연구 자료가\n도난당한 뒤 가라르지방에서\n새로 만들어졌다는 소문이 있다."
          shield: "신화 속 포켓몬을 모델로\n만들었지만 힘이 폭주하는 것을\n억제하는 마스크를 쓰고 있다."
        zh_simp:
          sword: "传言说有人偷走了绝密\n研究资料，在伽勒尔地区\n创造出了新的“属性：空”。"
          shield: "以神话中的宝可梦为原型所\n创造出的宝可梦，被戴上了\n抑制力量失控的面罩。"
        zh_trad:
          sword: "傳言說有人偷走了機密\n研究資料，在伽勒爾地區\n創造出了新的「屬性：空」。"
          shield: "以神話中的寶可夢為原型所\n創造出的寶可夢，被戴上了\n抑制力量失控的面罩。"
