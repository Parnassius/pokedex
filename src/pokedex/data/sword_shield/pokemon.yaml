        jp_kana:
          sword: "からだの　なかは　からっぽ。\nくちを　あけると　ブラックホールの\nように　なんでも　すいこんでしまう。"
          shield: "さまよっている　ひとだまを　みつけ\nからっぽの　たいないに　すいこむ。\nすいこまれて　どうなるかは　なぞ。"
        jp_kanji:
          sword: "体の　中は　空っぽ。\n口を　開けると　ブラックホールの\nように　なんでも　吸いこんでしまう。"
          shield: "さまよっている　人魂を　見つけ\n空っぽの　体内に　吸いこむ。\n吸いこまれて　どうなるかは　謎。"
        en:
          sword: "Its body is entirely hollow. When it opens its\nmouth, it sucks everything in as if it were a\nblack hole."
          shield: "It seeks drifting will-o’-the-wisps and sucks them\ninto its empty body. What happens inside is\na mystery."
        fr:
          sword: "Son corps est complètement creux. Quand il ouvre\nla bouche, il aspire tout ce qui passe près de lui,\nà la façon d’un trou noir."
          shield: "Il cherche des feux follets pour les avaler.\nCe qu’il se passe alors à l’intérieur de son corps\nvide est un mystère."
        it:
          sword: "L’interno del suo corpo è completamente vuoto.\nApre la bocca per risucchiare qualsiasi cosa,\ncome un buco nero."
          shield: "Va in cerca di fuochi fatui e li risucchia nel\nsuo corpo vuoto. Cosa succeda all’interno\nè un mistero."
        de:
          sword: "Sein Körper ist vollkommen hohl. Wenn es sein\nMaul öffnet, saugt es wie ein schwarzes Loch\nalles in sich auf."
          shield: "Es sucht umherirrende Seelen und saugt sie in\nseinen leeren Körper. Was dann mit ihnen\npassiert, ist ein Rätsel."
        es:
          sword: "Está completamente hueco. Cuando abre la\nboca, es capaz de absorber cualquier cosa,\ncomo si fuera un agujero negro."
          shield: "Busca fuegos fatuos y los absorbe en su cuerpo\nhueco. Lo que pasa dentro luego es un misterio."
        ko:
          sword: "몸속은 텅 비어 있다.\n입을 열면 블랙홀처럼\n무엇이든 빨아들인다."
          shield: "떠도는 사람의 영혼을 찾아\n텅 빈 체내로 빨아들인다.\n그 후 영혼이 어떻게 되는지는 알 수 없다."
        zh_simp:
          sword: "身体内部是空的。\n只要一张开嘴就会像\n黑洞一样吸入所有东西"
          shield: "寻找游走的灵魂，吸入自己\n空洞的身体里。没人知道\n被吸入后会发生什么事。"
        zh_trad:
          sword: "身體內部是空的。\n只要一張開嘴就會像\n黑洞一樣吸入所有東西。"
          shield: "尋找遊盪的靈魂，吸入自己\n空洞的身體裡。沒人知道\n被吸入後會發生什麼事。"
absol:
