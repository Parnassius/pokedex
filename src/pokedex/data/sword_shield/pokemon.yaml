        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - poison
        - dragon
      egg_groups:
        - undiscovered
      abilities:
        - pressure
      descriptions:
        jp_kana:
          sword: "ローズの　しわざで　ガラルぜんどの\nエネルギーを　きゅうしゅうして\nオーバーロードしてしまった　すがた。"
          shield: "きょだいかした　コアから　むげんの\nパワーが　ほうしゅつされているため\nまわりの　じくうを　ゆがめている。"
        jp_kanji:
          sword: "ローズの　しわざで　ガラル全土の\nエネルギーを　吸収して\nオーバーロードしてしまった　姿。"
          shield: "巨大化した　コアから　無限の\nパワーが　放出されているため\nまわりの　時空を　歪めている。"
        en:
          sword: "As a result of Rose’s meddling, Eternatus\nabsorbed all the energy in the Galar region.\nIt’s now in a state of power overload."
          shield: "Infinite amounts of energy pour from\nthis Pokémon’s enlarged core, warping\nthe surrounding space-time."
        fr:
          sword: "Par la faute de Shehroz, il a absorbé l’énergie\nde la région de Galar tout entière, et il est\ndésormais en surcharge."
          shield: "Désormais immense, son noyau émet un pouvoir\ninfini qui déforme l’espace-temps autour de lui."
        it:
          sword: "Ha assunto questa forma dopo aver assorbito\nenergia da tutta la regione di Galar per opera di\nRose ed è in costante sovraccarico energetico."
          shield: "L’energia senza fine emessa dal suo nucleo\ncresciuto a dismisura distorce lo spazio-tempo\ntutto intorno."
        de:
          sword: "Angetrieben durch die Machenschaften von Rose,\nhat es die Energie von ganz Galar absorbiert und\nsich dadurch überladen."
          shield: "Die unendliche Energie, die aus seinem\ngigantischen Kern austritt, verzerrt das\nRaum-Zeit-Gefüge um es herum."
        es:
          sword: "Esta forma es el resultado de la sobrecarga que\nha recibido tras absorber gran cantidad de\nenergía de Galar por mediación de Rose."
          shield: "El poder ilimitado que emite su gigantesco\nnúcleo puede distorsionar el espacio-tiempo\na su alrededor."
        ko:
          sword: "로즈의 소행으로 인해\n가라르 전역의 에너지를\n흡수해서 과부하된 모습."
          shield: "거대해진 코어에서 무한한\n파워가 방출되기 때문에\n주위 시공을 일그러뜨린다."
        zh_simp:
          sword: "在洛兹的干涉之下\n吸收了伽勒尔全域能源后\n负荷超载的样子。"
          shield: "巨大化的核心\n释放出无限的能量，\n扭曲了周围的时空。"
        zh_trad:
          sword: "在洛茲的計畫下，\n吸收了伽勒爾全域能源後\n負荷超載的樣子。"
          shield: "巨大化的核心\n釋放出無限的能量，\n扭曲了周圍的時空。"
kubfu:
  species_id: 891
  names:
    jp_kana: ダクマ
    jp_kanji: ダクマ
    en: Kubfu
    fr: Wushours
    it: Kubfu
    de: Dakuma
    es: Kubfu
    ko: 치고마
    zh_simp: 熊徒弟
    zh_trad: 熊徒弟
  forms:
    kubfu:
      form_id: 0
      base_stats:
        hp: 60
        attack: 90
        defense: 60
        special_attack: 53
        special_defense: 50
        speed: 72
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fighting
      egg_groups:
        - undiscovered
      abilities:
        - inner_focus
      descriptions:
        jp_kana:
          sword: "きびしい　たんれんを　つみ　わざを\nみがく。　たいとくした　わざによって\nしんかしたときに　すがたが　かわる。"
          shield: "あたまの　しろく　ながい　たいもうを\nひっぱると　きあいが　たかまり\nたんでんから　パワーが　わきあがる。"
        jp_kanji:
          sword: "厳しい　鍛錬を　積み　技を\n磨く。　体得した　技によって\n進化したときの　姿が　変わる。"
          shield: "頭の　白く　長い　体毛を\n引っぱると　気合が　高まり\n丹田から　パワーが　湧きあがる。"
        en:
          sword: "Kubfu trains hard to perfect its moves. The moves\nit masters will determine which form it takes when\nit evolves."
          shield: "If Kubfu pulls the long white hair on its head,\nits fighting spirit heightens and power wells up\nfrom the depths of its belly."
        fr:
          sword: "Il suit un entraînement rigoureux pour parfaire\nses techniques. La forme de son évolution\ndépend des capacités qu’il a assimilées."
          shield: "Lorsqu’il tire sur les longs poils blancs\nsur sa tête, il devient plus combatif et\nde l’énergie jaillit de sous son nombril."
        it:
          sword: "Affina le sue mosse sottoponendosi a duri\nallenamenti. La forma assunta dopo l’evoluzione\ncambia a seconda delle mosse padroneggiate."
          shield: "Tira i lunghi ciuffi di pelo bianco che ha sulla\ntesta per incrementare il suo spirito combattivo,\nfacendo sgorgare energia dal ventre."
        de:
          sword: "Durch rigoroses Training perfektioniert es seine\nKampftechnik. Diese bestimmt, welche Form\nDakuma nach der Entwicklung annimmt."
          shield: "Zieht es an dem langen weißen Fell an seinem\nHinterkopf, steigert das seinen Kampfgeist und\naus seiner Körpermitte steigt Kraft empor."
        es:
          sword: "Perfecciona su técnica mediante una estricta\ndisciplina. Según la corriente marcial que siga,\nadoptará una forma u otra al evolucionar."
          shield: "Al tirar de los mechones blancos de la cabeza,\nacrecienta su espíritu luchador y empieza a\nacumular fuerza en el órgano de su bajo vientre."
        ko:
          sword: "혹독한 수련을 거듭하며 기술을\n갈고닦는다. 체득한 기술에 따라\n진화했을 때의 모습이 달라진다."
          shield: "머리의 하얗고 긴 털을\n잡아당기면 기세가 고조되어\n단전에서 파워가 끓어오른다."
        zh_simp:
          sword: "日积月累地进行艰苦锻炼，\n认真钻研招式。进化后的样子\n会根据所习得的招式不同而改变。"
          shield: "拉紧头上又白又长的体毛，\n就会变得斗气势高昂，\n并从丹田涌出力量。"
        zh_trad:
          sword: "藉由累積嚴苛的鍛鍊來\n磨練招式。進化後的樣子\n會根據牠領會的招式而不同。"
          shield: "拉緊頭上又白又長的體毛\n就會變得氣勢高昂，\n並且由丹田湧出力量。"
urshifu:
  species_id: 892
  names:
    jp_kana: ウーラオス
