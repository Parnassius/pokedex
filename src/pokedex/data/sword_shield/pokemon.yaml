      types:
        - water
      egg_groups:
        - water_1
      abilities:
        - water_absorb
        - damp
      hidden_ability: swift_swim
      descriptions:
        jp_kana:
          sword: "あるくよりも　およぐほうが　とくい。\nおなかの　うずまきもようは　すけて\nみえる　ないぞうの　いちぶだ。"
          shield: "ながれが　はやい　かわでは　ぶあつい\nくちびるを　きゅうばんのように\nいわに　くっつけて　しがみつく。"
        jp_kanji:
          sword: "歩くよりも　泳ぐほうが　得意。\nお腹の　渦巻き模様は\n透けて　見える　内臓の　一部だ。"
          shield: "流れが　速い　川では\nぶ厚い　唇を　吸盤のように\n岩に　くっつけて　しがみつく。"
        en:
          sword: "For Poliwag, swimming is easier than walking.\nThe swirl pattern on its belly is actually part of\nthe Pokémon’s innards showing through the skin."
          shield: "In rivers with fast-flowing water, this Pokémon will\ncling to a rock by using its thick lips, which act\nlike a suction cup."
        fr:
          sword: "Il est plus à l’aise dans l’eau que sur la terre ferme.\nLe motif de spirale sur son ventre est en fait une\npartie de ses organes visibles à travers la peau."
          shield: "Dans les rivières au courant puissant, il se sert\nde ses lèvres épaisses comme d’une ventouse\npour s’accrocher aux rochers."
        it:
          sword: "È più portato per il nuoto che per la corsa.\nIl motivo spiraliforme sul ventre è parte dei\nsuoi organi interni visibili in trasparenza."
          shield: "Nei fiumi dalla corrente impetuosa, si attacca\nalle rocce utilizzando le spesse labbra come\nuna ventosa."
        de:
          sword: "Quapsel kann besser schwimmen als laufen. Das\nSpiralmuster auf seinem Bauch ist ein Teil seiner\nInnereien, der durch die Haut sichtbar ist."
          shield: "In schnell fließenden Flüssen hält es sich mithilfe\nseiner dicken Lippen, die als Saugnapf fungieren,\nan Felsen fest."
        es:
          sword: "Es más ágil en el agua que en la tierra. La espiral\nde su vientre no es más que parte de sus vísceras\nque se ven a través de la piel."
          shield: "En ríos de aguas bravas, usa sus gruesos labios\na modo de ventosa para adherirse a las rocas."
        ko:
          sword: "걷기보다 헤엄치기가 특기다.\n배의 소용돌이 모양은\n내장의 일부가 비쳐 보이는 것이다."
          shield: "유속이 빠른 강에서는\n두꺼운 입술을 흡반처럼\n사용해 바위에 달라붙는다."
        zh_simp:
          sword: "比起走路更擅长游泳。\n腹部旋涡状的花纹其实是\n透过皮肤看到的部分内脏。"
          shield: "在水流湍急的河里，\n会把厚厚的嘴唇像吸盘那样\n紧紧吸在岩石上避免被冲走。"
        zh_trad:
          sword: "比起步行更擅長游泳。\n腹部的漩渦花紋是透過皮膚\n可以看到的部分內臟。"
          shield: "在水流湍急的河川裡，\n會把厚厚的嘴唇當作吸盤，\n吸附在岩石上避免被沖走。"
