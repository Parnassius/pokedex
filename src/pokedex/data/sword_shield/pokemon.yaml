    jp_kanji: スナバァ
    en: Sandygast
    fr: Bacabouh
    it: Sandygast
    de: Sankabuh
    es: Sandygast
    ko: 모래꿍
    zh_simp: 沙丘娃
    zh_trad: 沙丘娃
  forms:
    sandygast:
      form_id: 0
      base_stats:
        hp: 55
        attack: 55
        defense: 80
        special_attack: 70
        special_defense: 45
        speed: 15
      evs_yield:
        hp: 0
        attack: 0
        defense: 1
        special_attack: 0
        special_defense: 0
