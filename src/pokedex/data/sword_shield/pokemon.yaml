          shield: "はがれた　ウロコは　おうぞくへ\nけんじょうされるほど　じょうひんで\nふかみのある　かがやきを　もつ。"
        jp_kanji:
          sword: "嵐が来ると　海面に　姿を　見せる。\nカイリューに　出くわすと\n激しい　争いが　はじまる。"
          shield: "剥がれた　ウロコは　王族へ\n献上されるほど　上質で\n深みのある　輝きを　もつ。"
        en:
          sword: "With the arrival of a storm at sea, this Pokémon\nwill show itself on the surface. When a Kingdra\nand a Dragonite meet, a fierce battle ensues."
          shield: "Scales shed by this Pokémon have such a\nsplendorous gleam to them that they’ve been\ngiven to royalty as gifts."
        fr:
          sword: "Il apparaît à la surface de l’océan lorsqu’une\ntempête arrive. Dès qu’il croise un Dracolosse,\nun combat féroce s’ensuit."
          shield: "Les écailles qui se détachent de son corps\nbrillent d’un éclat si élégant et si intense\nqu’on les offre aux familles royales."
        it:
          sword: "Appare in superficie con l’arrivo delle tempeste.\nSe si imbatte in Dragonite, si lancia in una lotta\nferoce."
          shield: "Le scaglie che perde sono così pregiate\ne splendenti che vengono offerte in dono\nalle famiglie reali."
        de:
          sword: "Wenn ein Sturm aufzieht, schwimmt es an die\nMeeresoberfläche. Stößt es auf ein Dragoran,\nbricht ein erbitterter Kampf zwischen ihnen aus."
          shield: "Seine abgefallenen Schuppen tragen einen tiefen\nGlanz in sich und sind so hochwertig, dass selbst\nKönigshäuser mit ihnen beschenkt werden."
        es:
          sword: "Se deja ver en la superficie del mar cuando hay\ntormentas. Si se encuentra con Dragonite, tendrá\nlugar una violenta pelea."
          shield: "Las escamas que se le desprenden poseen una\ncalidad tan excelsa y un resplandor tan intenso\nque han sido ofrecidas a la realeza como regalos."
        ko:
          sword: "폭풍우가 휘몰아치면 해수면에\n모습을 드러낸다. 망나뇽과 맞닥뜨리면\n격렬한 싸움이 시작된다."
          shield: "떨어진 비늘은 왕족에게\n헌상될 정도의 최상품으로\n심오한 빛을 띤다."
        zh_simp:
          sword: "会在暴风雨袭来时出现在\n海面上。如果遇到快龙，\n便会开始激烈的争斗。"
          shield: "身上掉下的鳞片闪耀着\n高雅而有深度的光泽，\n甚至会被拿去进献给王族。"
        zh_trad:
          sword: "暴風雨來襲時會在海面上\n現身。如果撞見了快龍，\n就會展開激烈的爭鬥。"
          shield: "脫落的鱗片光澤高雅\n有深度，甚至被拿去\n獻給王族作為貢品。"
