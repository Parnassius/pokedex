      hidden_ability: infiltrator
      descriptions:
        jp_kana:
          sword: "りょうあしが　ハネに　へんか。\nおとを　たてずに　こうそくで　とび\nエモノの　うなじに　キバを　たてる。"
          shield: "４まいの　ハネを　じざいに　あやつり\nはばたく。　せまい　どうくつでも\nスピードを　おとさず　とびまわれる。"
        jp_kanji:
          sword: "両足が　羽に　変化。\n音を　たてずに　高速で　飛び\n獲物の　うなじに　キバを　たてる。"
          shield: "４枚の　羽を　自在に　操り\n羽ばたく。　狭い　洞窟でも\nスピードを　落とさず　飛びまわれる。"
        en:
          sword: "Both of its legs have turned into wings. Without a\nsound, Crobat flies swiftly toward its prey and\nsinks its fangs into the nape of its target’s neck."
          shield: "This Pokémon flaps its four wings skillfully.\nCrobat can fly through cramped caves without\nneeding to slow down."
        fr:
          sword: "Ses pattes sont devenues des ailes.\nIl fond sur sa proie furtivement puis\nplante ses crocs dans sa nuque."
          shield: "Il vole en contrôlant librement ses quatre ailes\net peut se déplacer sans avoir besoin de ralentir,\nmême dans les grottes étroites."
        it:
          sword: "Le due zampe si sono mutate in ali. Vola verso la\npreda ad alta velocità senza fare alcun rumore\ne le affonda le zanne nella nuca."
          shield: "Vola controllando indipendentemente le sue\nquattro ali. Non riduce la velocità nemmeno\nnelle caverne più anguste."
        de:
          sword: "Seine zwei Beine wurden zu Flügeln. Es fliegt\nschnell und lautlos zu seiner Beute, um ihr dann\ndie Zähne in den Nacken zu bohren."
          shield: "Seine vier Flügel können unabhängig voneinander\nschlagen. So vermag es auch in engen Höhlen\nohne Geschwindigkeitsverlust umherzufliegen."
        es:
          sword: "Sus patas se han convertido en alas. Se lanza\nsobre su presa en un vuelo silencioso a alta\nvelocidad y le clava los colmillos en la nuca."
          shield: "Controla de forma independiente cada una de\nsus cuatro alas. Puede revolotear por cuevas\nestrechas sin aminorar la velocidad."
        ko:
          sword: "양발이 날개로 변화했다.\n소리를 내지 않고 고속으로 날아\n먹이의 목덜미에 이빨을 꽂는다."
          shield: "4장의 날개를 자유자재로 움직이며\n날갯짓한다. 좁은 동굴에서도\n속도를 늦추지 않고 날아다닐 수 있다."
        zh_simp:
          sword: "双脚变成了翅膀。\n可以悄无声息地高速飞行，\n亮出牙齿咬向猎物的后颈。"
          shield: "可以自由地控制４根翅膀\n振翅而飞。即使在狭窄的\n洞窟内也能保持速度飞来飞去。"
        zh_trad:
          sword: "雙腳變成了翅膀。\n能夠無聲無息地高速飛行，\n用獠牙咬住獵物的後頸。"
          shield: "能夠自在地控制４隻翅膀\n振翅飛翔。即使是在狹窄的\n洞窟裡也能毫不減速地飛舞。"
