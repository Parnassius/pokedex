        jp_kana:
          sword: "どくの　ほうしを　ふきつける。\nはやく　あらいながさないと\nそこに　キノコが　はえてくるぞ。"
          shield: "ふだんは　あんまり　うごかない。\nおちている　モンスターボールの\nそばで　ただじっと　している。"
        jp_kanji:
          sword: "毒の　胞子を　噴きつける。\nはやく　洗い流さないと\nそこに　キノコが　生えてくるぞ。"
          shield: "ふだんは　あんまり　動かない。\n落ちている　モンスターボールの\nそばで　ただじっと　している。"
        en:
          sword: "This Pokémon puffs poisonous spores at its foes.\nIf the spores aren’t washed off quickly, they’ll\ngrow into mushrooms wherever they land."
          shield: "Amoonguss generally doesn’t move much. It\ntends to stand still near Poké Balls that have\nbeen dropped on the ground."
        fr:
          sword: "Si l’on ne nettoie pas rapidement les spores\nempoisonnées qu’il répand, celles-ci donnent\nnaissance à des champignons."
          shield: "Ce Pokémon a tendance à très peu se déplacer.\nQuand il voit une Poké Ball abandonnée au sol,\nil reste immobile à côté."
        it:
          sword: "Sparge spore velenose. Se non vengono lavate\nvia in fretta, nel luogo in cui si sono depositate\ncresceranno dei funghi."
          shield: "Generalmente non si muove molto. Di solito\nsi limita a stare immobile vicino a qualche\nPoké Ball caduta."
        de:
          sword: "Hutsassa versprüht Giftsporen. Wäscht man diese\nnicht sofort ab, wachsen dort, wo sie gelandet\nsind, Pilze."
          shield: "Die meiste Zeit über bewegt es sich kaum und\nsteht einfach nur regungslos neben Pokébällen,\ndie am Boden liegen."
        es:
          sword: "Expulsa esporas venenosas. Crecerán setas\nen cualquier superficie con la que entren en\ncontacto si no se lava de inmediato."
          shield: "Por lo general no se mueve demasiado. Suele\npermanecer quieto al lado de Poké Balls que\nhaya por el suelo."
        ko:
          sword: "독 포자를 내뿜는다.\n빨리 씻어내지 않으면\n그곳에 버섯이 자라난다."
          shield: "평상시에는 잘 움직이지 않는다.\n떨어져 있는 몬스터볼 옆에서\n그저 가만히 대기할 뿐이다."
        zh_simp:
          sword: "会喷出带毒的孢子。\n如果不马上把它洗掉，\n那里就会长出蘑菇来哦。"
          shield: "平常一般不太动。\n只是一动不动地待在\n掉落于地面的精灵球旁边。"
        zh_trad:
          sword: "會噴出帶有毒性的孢子。\n如果不盡快洗掉的話，\n就會從那裡長出蘑菇來喔。"
          shield: "平時不太會有動作。\n只是一動也不動地待在\n地上掉落的精靈球旁邊。"
