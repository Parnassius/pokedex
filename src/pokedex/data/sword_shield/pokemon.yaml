          sword: "つぼみの　あいだは　おとなしく\nほぼ　うごかない。　ひのひかりが\nでるのを　じっと　まっている。"
          shield: "たたんだ　はなびらは　かたい。\nとりポケモンに　つっつかれても\nぜんぜん　へいき　なのだ。"
        jp_kanji:
          sword: "つぼみの　あいだは　おとなしく\nほぼ　動かない。　日の光が\n出るのを　じっと　待っている。"
          shield: "畳んだ　花びらは　硬い。\n鳥ポケモンに　突っつかれても\nぜんぜん　平気　なのだ。"
        en:
          sword: "As a bud, it barely moves. It sits still, placidly\nwaiting for sunlight to appear."
          shield: "Its folded petals are pretty tough. Bird Pokémon\ncan peck at them all they want, and Cherrim\nwon’t be bothered at all."
        fr:
          sword: "Pendant sa période de bourgeonnement,\nil reste presque totalement immobile et attend\nque le soleil se lève."
          shield: "Lorsqu’il se ferme, ses pétales sont si durs qu’il\nne craint plus les attaques des Pokémon oiseaux."
        it:
          sword: "Quando è un bocciolo rimane pressoché\nimmobile in attesa che spunti il sole."
          shield: "I petali ripiegati sono molto duri e lo proteggono\ndalle beccate dei Pokémon alati."
        de:
          sword: "Als Knospe verhält es sich ruhig und bewegt sich\nkaum, während es geduldig auf Sonnenschein\nwartet."
          shield: "Die Blütenblätter, die es umschließen, sind hart.\nDeswegen macht es ihm absolut nichts aus, wenn\nVogel-Pokémon es mit ihren Schnäbeln angreifen."
        es:
          sword: "Permanece casi inmóvil cerrado en un capullo\na la espera de que lo bañen los rayos del sol."
          shield: "Al cerrarse, sus pétalos son tan duros que\nresultan inmunes a los picotazos de los Pokémon\npájaro."
        ko:
          sword: "봉오리일 때는 얌전하고\n거의 움직이지 않는다. 햇빛이\n들기를 가만히 기다리고 있다."
          shield: "겹쳐진 꽃잎은 딱딱하다.\n새포켓몬에게 쪼여도\n아무렇지도 않다."
        zh_simp:
          sword: "花苞形态时性格稳重，\n几乎不会动，只是静静地\n等待太阳光的出现。"
          shield: "盖起来的花瓣很硬。\n即使被鸟宝可梦啄到，\n也完全没问题。"
        zh_trad:
          sword: "花苞形態時性情穩重，\n幾乎不會動，只是靜靜地\n等待太陽光的出現。"
          shield: "闔起來的花瓣很硬。\n即使被鳥寶可夢啄到，\n也完全沒問題。"
