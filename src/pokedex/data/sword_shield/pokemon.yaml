          sword: "きように　きのみきを　かけのぼる。\nえださきに　できた　あたらしい\nきのめを　このんで　ついばむ。"
          shield: "はねが　そだちきって　おらず\nとびはねるようにして　いどうする。\nいつも　なにかを　みつめている。"
        jp_kanji:
          sword: "器用に　木の幹を　駆け登る。\n枝先に　できた　新しい\n木の芽を　好んで　ついばむ。"
          shield: "羽が　育ちきって　おらず\n飛び跳ねるようにして　移動する。\nいつも　なにかを　見つめている。"
        en:
          sword: "It is extremely good at climbing tree trunks and\nlikes to eat the new sprouts on the trees."
          shield: "Because its wings aren’t yet fully grown, it has to\nhop to get around. It is always staring\nat something."
        fr:
          sword: "Il est très doué pour grimper aux arbres et ainsi\nmanger les bourgeons dont il raffole."
          shield: "Ses ailes ne sont pas assez développées\ndonc il ne peut se déplacer qu’en sautillant.\nIl fixe toujours quelque chose du regard."
        it:
          sword: "È molto bravo ad arrampicarsi sui tronchi degli\nalberi per mangiare i germogli appena spuntati."
          shield: "Poiché le sue ali non sono ancora ben sviluppate,\nè costretto ad andarsene in giro saltellando.\nSembra sempre intento a fissare qualcosa."
        de:
          sword: "Es ist ein hervorragender Kletterer. Besonders\ngern steigt es auf Bäume und frisst die jungen\nTriebe ab."
          shield: "Da seine Flügel nicht voll ausgebildet sind,\nbewegt es sich hüpfend fort. Seinen Blick hat\nes stets starr auf ein Ziel gerichtet."
        es:
          sword: "Trepa con gran habilidad por el tronco de los\nárboles, donde aprovecha para picotear los\nbrotes nuevos."
          shield: "Se desplaza dando saltitos porque sus alas no\nhan crecido lo suficiente. Siempre está mirando\nalgo fijamente."
        ko:
          sword: "능숙하게 나무줄기를 타고 올라간다.\n가지 끝에 새로 자란\n나무순을 즐겨 먹는다."
          shield: "날개가 아직 잘 발달하지 못해서\n점프하듯 이동한다.\n항상 뭔가를 바라보고 있다."
        zh_simp:
          sword: "能够灵巧地跳上树干。\n喜欢在枝头上啄食\n新长出来的嫩芽。"
          shield: "由于羽翼未丰，\n所以会跳着移动。\n一直在注视着什么。"
        zh_trad:
          sword: "能夠靈巧地跳上樹幹。\n喜歡在枝頭上啄食\n新長出來的嫩芽。"
          shield: "翅膀還沒有完全長好，\n所以只能一跳一跳地移動。\n一直在注視著什麼。"
