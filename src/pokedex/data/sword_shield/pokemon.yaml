      types:
        - water
        - rock
      egg_groups:
        - monster
        - water_1
      abilities:
        - strong_jaw
        - shell_armor
      hidden_ability: swift_swim
      descriptions:
        jp_kana:
          sword: "きょうぼうな　せいしつ。　てつぼうを\nかみちぎる　ほどの　アゴの　ちからで\nえものに　ばくりと　かみつく。"
          shield: "くびが　のびちぢみする。　はなれた\nところから　くびを　いっきに　のばし\nするどい　キバで　てきを　しとめる。"
        jp_kanji:
          sword: "狂暴な　性質。　鉄棒を\n噛み千切る　ほどの　顎の　力で\n獲物に　ばくりと　噛みつく。"
          shield: "首が　伸び縮みする。　離れた\nところから　首を　一気に　伸ばし\n鋭い　キバで　敵を　しとめる。"
        en:
          sword: "With jaws that can shear through steel rods,\nthis highly aggressive Pokémon chomps down\non its unfortunate prey."
          shield: "This Pokémon rapidly extends its retractable neck\nto sink its sharp fangs into distant enemies and\ntake them down."
        fr:
          sword: "De nature très violente, il mord fermement\nses proies avec sa mâchoire, assez puissante\npour broyer une barre de fer."
          shield: "Son cou extensible lui permet d’atteindre\ndes ennemis éloignés en un instant pour leur\nporter un coup décisif avec ses crocs aiguisés."
        it:
          sword: "Ha una natura estremamente feroce e addenta\nle prede con la sua mascella, così potente da\npoter sbriciolare sbarre di ferro."
          shield: "Ha un collo retrattile. Tenendosi a distanza dal\nnemico, lo estende all’improvviso per dare\nil colpo di grazia con i denti aguzzi."
        de:
          sword: "Dieses von Natur aus aggressive Pokémon beißt\nseine Beute mit seinem kräftigen Kiefer, der\nselbst Eisenstangen zermalmen kann."
          shield: "Sein streckbarer Hals ermöglicht es ihm, auch\nentfernte Gegner zu erreichen, die es dann mit\nseinen scharfen Zähnen ausschaltet."
        es:
          sword: "Un Pokémon de temperamento feroz que\natenaza a su presa con sus fuertes mandíbulas,\ncapaces de destrozar una barra de hierro."
          shield: "Su cuello extensible le permite alcanzar a los\nrivales a distancia. Hundiendo sus afilados\ndientes, les da el golpe de gracia."
        ko:
          sword: "흉포한 성질을 가졌다. 철봉을\n물어뜯어 버릴 정도의 턱 힘으로\n먹이를 덥석 물어버린다."
          shield: "목을 자유자재로 늘이고 줄인다.\n떨어져 있는 곳에서 목을 단번에 늘여\n날카로운 이빨로 적의 숨통을 끊는다."
        zh_simp:
          sword: "性格凶暴的宝可梦。\n会用能咬断铁棍的颚部\n大口咬住猎物。"
          shield: "颈部可以伸缩。\n能从远处迅速伸长颈部，\n用锐利的牙齿解决对手。"
        zh_trad:
          sword: "性情凶暴的寶可夢。\n會用能咬斷鐵棍的顎部\n大口咬住獵物。"
          shield: "頸部可以伸縮。\n能從遠處迅速伸長頸部，\n用銳利的牙齒解決對手。"
  gmax_forms:
    drednaw_gigantamax:
      form_id: 999
      names:
        jp_kana: キョダイマックス
        jp_kanji: キョダイマックス
        en: Gigantamax
        fr: Gigamax
        it: Gigamax
        de: Gigadynamax
        es: Gigamax
        ko: 거다이맥스
        zh_simp: 超极巨化
        zh_trad: 超極巨化
      descriptions:
        jp_kana:
          sword: "キョダイマックスの　パワーによって\nうしろあしで　たちあがった。　てきに\nのしかかり　おおアゴで　しとめる。"
          shield: "おおむかし　いわやまを　かみくずして\nこうずいを　せきとめた　できごとが\nガラルちほうで　かたりつがれている。"
        jp_kanji:
          sword: "キョダイマックスの　パワーによって\n後ろ足で　立ち上がった。　敵に\nのしかかり　大顎で　しとめる。"
          shield: "大昔　岩山を　噛み崩して\n洪水を　せき止めた　できごとが\nガラル地方で　語り継がれている。"
        en:
          sword: "It responded to Gigantamax energy by becoming\nbipedal. First it comes crashing down on foes,\nand then it finishes them off with its massive jaws."
          shield: "In the Galar region, there’s a tale about\nthis Pokémon chewing up a mountain and\nusing the rubble to stop a flood."
        fr:
          sword: "Grâce au pouvoir du Gigamax, il se tient\ndésormais sur deux pattes. Il plaque ses ennemis\navant de les achever avec son énorme mâchoire."
          shield: "Les légendes de Galar racontent qu’il avait jadis\nréussi à endiguer des inondations en détruisant\ndes montagnes rocheuses avec sa mâchoire."
        it:
          sword: "Grazie all’energia del fenomeno Gigamax\nsi è sollevato sulle zampe posteriori. Si getta\nsui nemici e li finisce con l’enorme mascella."
          shield: "Si racconta che un tempo lontano questo\nPokémon abbia fermato un’inondazione\na Galar distruggendo una montagna a morsi."
        de:
          sword: "Durch die Gigadynamax-Energie steht es nun auf\nseinen Hinterbeinen. Es stürzt sich auf Gegner\nund zermalmt diese mit seinem riesigen Kiefer."
          shield: "In Galar erzählt man sich, dass dieses Pokémon\neinst eine Flut eingedämmt haben soll, indem es\neinen riesigen Berg zerbiss."
        es:
          sword: "Gracias al fenómeno Gigamax, puede erguirse\nsobre las patas posteriores. Embiste al enemigo\ny acaba con él con sus enormes mandíbulas."
          shield: "Cuenta la leyenda que hace tiempo contuvo una\ninundación arrancando rocas de una montaña a\nmordiscos."
        ko:
          sword: "거다이맥스의 파워에 의해\n뒷발로 일어서게 됐다. 상대를\n짓누른 뒤 큰 턱으로 마무리한다."
          shield: "먼 옛날 바위산을 깨물어 부숴\n홍수를 막은 일이\n가라르지방에 전해 내려오고 있다."
        zh_simp:
          sword: "超极巨化之力使它开始\n用后脚站立。会压住敌人，\n用巨大的颚部解决对方。"
          shield: "古时候它咬崩一座山\n阻止洪水漫延的故事\n在伽勒尔地区代代相传。"
        zh_trad:
          sword: "超極巨化之力使牠開始\n用後腳站立。會壓住敵人，\n用巨大的顎部解決對方。"
          shield: "古時候牠咬崩一座山\n阻止洪水蔓延的故事\n在伽勒爾地區代代相傳。"
