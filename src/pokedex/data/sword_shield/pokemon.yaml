        jp_kana:
          sword: "たいようの　ひかりを　あびると\nあまく　よいかおりが　するので\nむしポケモンたちが　よってくる。"
          shield: "ひるまは　ひの　ひかりを　あび\nすやすやと　ねむる。　よなかに\nめを　さまし　かつどうを　はじめる。"
        jp_kanji:
          sword: "太陽の　光を　浴びると\n甘く　よい香りが　するので\n虫ポケモンたちが　寄ってくる。"
          shield: "昼間は　陽の　光を　浴び\nすやすやと　眠る。　夜中に\n目を　覚まし　活動を　はじめる。"
        en:
          sword: "When bathed in sunlight, this Pokémon emits a\npleasantly sweet scent, which causes bug\nPokémon to gather around it."
          shield: "During the day, Fomantis basks in sunlight and\nsleeps peacefully. It wakes and moves around\nat night."
        fr:
          sword: "Il dégage une odeur délicieuse quand il prend\nle soleil, ce qui attire tous les Pokémon Insecte\ndes alentours."
          shield: "La journée, il dort tranquillement au soleil pour\nen absorber les rayons. La nuit, il se réveille et\nvaque à ses occupations."
        it:
          sword: "Quando è esposto alla luce del sole emette\nun dolce profumo che attrae i Pokémon di tipo\nColeottero."
          shield: "Trascorre le giornate a dormire tranquillo sotto\nil sole. Quando giunge la notte si sveglia e si\nmette in movimento."
        de:
          sword: "Wenn es im Sonnenlicht badet, gibt es einen\nlieblichen Duft ab, durch den Käfer-Pokémon\nangelockt werden."
          shield: "Tagsüber badet Imantis im Sonnenlicht und hält\nNickerchen. Nachts wacht es auf und wird aktiv."
        es:
          sword: "Cuando toma el sol, desprende un aroma muy\ndulce y agradable que atrae a multitud de\nPokémon insecto."
          shield: "De día duerme tranquilamente a la luz del sol y,\nal ocaso, despierta e inicia su actividad nocturna."
        ko:
          sword: "태양 빛을 받으면\n달콤하고 좋은 향기가 나서\n벌레포켓몬들이 모여든다."
          shield: "낮에는 햇빛을 받으며\n새근새근 잔다. 한밤중에\n잠에서 깨어 활동을 시작한다."
        zh_simp:
          sword: "由于沐浴阳光后\n会发出甜甜的香味，\n虫宝可梦会聚集过来。"
          shield: "白天沐浴阳光，\n呼呼大睡。到了半夜\n才醒来并开始活动。"
        zh_trad:
          sword: "沐浴陽光後就會\n散發出甘甜迷人的香味，\n因此蟲寶可夢會被吸引而來。"
          shield: "白天時會沐浴著陽光\n酣酣睡覺。到了半夜\n才會醒來活動。"
