    en: Marowak
    fr: Ossatueur
    it: Marowak
    de: Knogga
    es: Marowak
    ko: 텅구리
    zh_simp: 嘎啦嘎啦
    zh_trad: 嘎啦嘎啦
  forms:
    marowak:
      form_id: 0
