          sword: "Certains disent qu’il répand ses écailles ardentes\npour provoquer des incendies, d’autres,\npour sauver ceux qui souffrent du froid."
          shield: "Né d’un cocon enflammé, ce Pokémon apparaît\nsur d’anciennes fresques représenté comme\nune divinité du feu."
        it:
          sword: "Si dice che le scaglie infuocate sparse da\nVolcarona a volte causino incendi e altre volte\nsalvino chi soffre il freddo."
          shield: "È nato da un bozzolo infuocato. Nelle pitture\nrupestri dell’antichità viene raffigurato come\nuna divinità delle fiamme."
        de:
          sword: "Einige sagen, es verstreue glühenden Flügelstaub,\num Brände auszulösen. Andere meinen, es rette\ndadurch jene, die unter Kälte leiden."
          shield: "Ramoth wurde aus einem lodernden Kokon\ngeboren. In antiken Wandmalereien ist es als\nFeuergottheit abgebildet."
        es:
          sword: "Se dice que sus escamas flamígeras pueden tanto\ncausar incendios como amparar a aquellos que\nsufren las inclemencias del frío."
          shield: "Nace de una pupa envuelta en llamas. En algunas\npinturas rupestres aparece representado como\nuna deidad del fuego."
        ko:
          sword: "불꽃의 인분을 흩뿌려\n화재를 일으킴으로써 추위에\n고통받는 자들을 돕는다고도 한다."
          shield: "활활 타오르는 불의 고치에서\n태어났다. 고대의 벽화에\n불꽃의 신으로 그려져 있다."
        zh_simp:
          sword: "据说它会挥撒自己的火焰鳞粉，\n造成火灾。也有说法说它会\n拯救遭受寒冷之苦的生灵。"
          shield: "从熊熊燃烧的火焰之茧中\n诞生。在古代的壁画上\n被描绘为火之神。"
        zh_trad:
          sword: "據說牠會飛灑火焰鱗粉造成\n火災，也有說法說牠會去\n救助受寒冷所苦的生物。"
          shield: "從熊熊燃燒著火焰的\n繭中誕生。在古代的\n壁畫上被描繪為火神。"
cobalion:
  species_id: 638
  names:
