      descriptions:
        jp_kana:
          sword: "てんめつする　ほうしの　ひかりで\nえものを　おびきよせて　ねむらせる。\nゆびさきから　せいきを　すいとる。"
          shield: "まよなか　もりの　おくに　あかりを\nみつけても　ちかづいては　いけない。\nマシェードに　ねむらされてしまうぞ。"
        jp_kanji:
          sword: "点滅する　胞子の　光りで\n獲物を　おびき寄せて　眠らせる。\n指先から　生気を　吸い取る。"
          shield: "真夜中　森の　奥に　灯りを\n見つけても　近づいては　いけない。\nマシェードに　眠らされてしまうぞ。"
        en:
          sword: "Its flickering spores lure in prey and put them to\nsleep. Once this Pokémon has its prey snoozing,\nit drains their vitality with its fingertips."
          shield: "If you see a light deep in a forest at night,\ndon’t go near. Shiinotic will make you fall\nfast asleep."
        fr:
          sword: "Il attire ses proies et les endort grâce\nau clignotement de ses spores. Il aspire ensuite\nleur énergie vitale du bout de ses doigts."
          shield: "Il ne faut pas s’approcher des lumières qui luisent\nla nuit au fond des bois, sous peine de se faire\nendormir par un Lampignon."
        it:
          sword: "Attira a sé la preda con la luce intermittente\ndelle sue spore e l’addormenta. Poi ne succhia\nl’energia vitale con le estremità delle dita."
          shield: "Se di notte si scorge una luce nel cuore della\nforesta, meglio non avvicinarsi: si rischia di finire\nvittima delle spore soporifere di Shiinotic."
        de:
          sword: "Mit blinkenden Sporen lullt es seine Beute in\nden Schlaf und saugt ihr dann über seine\nFingerspitzen die Lebenskraft aus."
          shield: "Stößt man im nächtlichen Wald auf ein Leuchten,\nsollte man sich diesem nicht nähern. Sonst wird\nman nämlich von Lamellux in den Schlaf gelullt."
        es:
          sword: "Atrae y duerme a su presa con la luz parpadeante\nde sus esporas y luego le absorbe la energía vital\ncon la punta de los dedos."
          shield: "Conviene no acercarse si se avistan luces en la\nespesura del bosque en plena noche, ya que\npodrían ser las esporas soporíferas de Shiinotic."
        ko:
          sword: "깜빡이는 포자의 빛으로\n먹이를 유인해서 잠들게 한다.\n손끝으로 생기를 흡수한다."
          shield: "한밤중에 숲속에서 빛을\n발견하더라도 다가가면 안 된다.\n마셰이드가 잠들어 버리게 한다."
        zh_simp:
          sword: "用孢子闪烁着的光\n吸引猎物，让对方睡着。\n会从指尖吸收精气。"
          shield: "如果大半夜在森林的深处\n看见光亮，记住千万不要接近。\n灯罩夜菇会让你睡着的。"
        zh_trad:
          sword: "用孢子閃爍著的光\n吸引獵物，讓對方睡著。\n會從指尖吸收精氣。"
          shield: "如果半夜裡在森林的深處\n看見光亮，記住千萬不要接近。\n燈罩夜菇會讓你睡著的。"
