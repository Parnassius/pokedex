        jp_kana:
          sword: "はつねつじの　たいおんは　およそ\n８００ど。　からだを　ムチのように\nしならせて　とびかかってくるぞ。"
          shield: "こうげきてきな　せいしつ。\nやけた　からだも　きけんだが\nおおきな　キバも　するどいぞ。"
        jp_kanji:
          sword: "発熱時の　体温は　およそ\n８００度。　体を　鞭のように\nしならせて　跳びかかってくるぞ。"
          shield: "攻撃的な　性質。\n焼けた　体も　危険だが\n大きな　キバも　鋭いぞ。"
        en:
          sword: "When it heats up, its body temperature reaches\nabout 1,500 degrees Fahrenheit. It lashes its\nbody like a whip and launches itself at enemies."
          shield: "While its burning body is already dangerous on\nits own, this excessively hostile Pokémon also has\nlarge and very sharp fangs."
        fr:
          sword: "Quand il génère de la chaleur, sa température\nest d’environ 800 °C. Il se sert de son corps\ncomme d’un fouet pour sauter sur ses ennemis."
          shield: "Il est de nature agressive. Non seulement\nson corps brûlant est dangereux, mais il possède\nen plus d’énormes crocs très pointus."
        it:
          sword: "Quando genera calore, la temperatura del suo\ncorpo raggiunge gli 800 ºC. Si lancia all’attacco\nusando il corpo come una frusta."
          shield: "Ha una natura aggressiva. Il suo corpo\nincandescente lo rende molto pericoloso,\ncosì come le sue lunghe zanne appuntite."
        de:
          sword: "Wenn es Hitze erzeugt, beträgt seine Temperatur\netwa 800 ºC. Es bewegt seinen Körper wie eine\nPeitsche, um dann den Gegner anzuspringen."
          shield: "Es ist angriffslustig veranlagt. Sein entflammter\nKörper und sein großes, scharfes Mundwerkzeug\nstellen eine enorme Gefahr dar."
        es:
          sword: "Cuando genera calor, su temperatura corporal\nalcanza aproximadamente los 800 °C. Usa el\ncuerpo a modo de látigo para lanzarse al ataque."
          shield: "Posee una naturaleza agresiva. El peligro que\nentraña su cuerpo candente es considerable,\naunque sus afilados colmillos no le van a la zaga."
        ko:
          sword: "발열 시의 체온은 약 800도.\n몸을 채찍처럼 휘면서\n덤벼든다."
          shield: "공격적인 성질을 가졌다.\n탄 몸도 위험하지만\n큰 이빨도 날카롭다."
        zh_simp:
          sword: "发热时的体温大约有８００度。\n会像鞭子那样弯曲身体\n朝着敌人弹跳过去。"
          shield: "性格极具攻击性。\n危险的不只是它烧烫的身体，\n大大的獠牙也锐利无比。"
        zh_trad:
          sword: "發熱時的體溫大約有８００度。\n會像鞭子那樣彎曲身體，\n朝著敵人彈跳過去。"
          shield: "性情極具攻擊性。\n危險的不只是牠燒燙的身體，\n大大的獠牙也銳利無比。"
  gmax_forms:
    centiskorch_gigantamax:
      form_id: 999
      names:
        jp_kana: キョダイマックス
        jp_kanji: キョダイマックス
        en: Gigantamax
        fr: Gigamax
        it: Gigamax
        de: Gigadynamax
        es: Gigamax
        ko: 거다이맥스
        zh_simp: 超极巨化
        zh_trad: 超極巨化
      descriptions:
        jp_kana:
          sword: "キョダイマックスの　パワーによって\nたいおんは　せっし１０００どを　こえ\nねっぱで　あいてを　やきこがす。"
          shield: "キョダイマックスした　マルヤクデの\nほうしゃねつが　きりゅうを　みだして\nあらしを　まきおこす　ことがある。"
        jp_kanji:
          sword: "キョダイマックスの　パワーによって\n体温は　摂氏１０００度を　超え\n熱波で　相手を　焼き焦がす。"
          shield: "キョダイマックスした　マルヤクデの\n放射熱が　気流を　乱して\n嵐を　巻き起こす　ことがある。"
        en:
          sword: "Gigantamax energy has evoked a rise in its body\ntemperature, now reaching over 1,800 degrees\nFahrenheit. Its heat waves incinerate its enemies."
          shield: "The heat that comes off a Gigantamax\nCentiskorch may destabilize air currents.\nSometimes it can even cause storms."
        fr:
          sword: "Sous l’influence du Gigamax, sa température\ncorporelle dépasse les 1 000 °C. Il libère\ndes vagues de chaleur qui grillent ses ennemis."
          shield: "Sous sa forme Gigamax, la chaleur émise\npar Scolocendre perturbe parfois les courants\naériens au point de déclencher des tempêtes."
        it:
          sword: "L’energia del fenomeno Gigamax ha fatto salire\nla sua temperatura corporea a oltre 1.000 ºC.\nArrostisce i nemici con onde termiche."
          shield: "Il calore che emana per effetto del fenomeno\nGigamax è così forte da sconvolgere le correnti\natmosferiche causando tempeste."
        de:
          sword: "Durch die Gigadynamax-Energie wurde seine\nKörpertemperatur auf über 1 000 ºC erhitzt.\nMit seinen Hitzewellen röstet es seine Gegner."
          shield: "Durch die Gigadynamax-Energie strahlt es nun\nsolche Hitzewellen aus, dass es damit Luftströme\ndurcheinanderbringt und Stürme verursacht."
        es:
          sword: "La energía del fenómeno Gigamax ha elevado su\ntemperatura corporal hasta superar los 1000 °C.\nAchicharra al rival con ondas térmicas."
          shield: "Bajo los efectos del fenómeno Gigamax, el calor\nque irradia Centiskorch es tal que llega a alterar\nel clima y provocar tormentas."
        ko:
          sword: "거다이맥스의 파워에 의해\n체온이 섭씨 1000도를 넘어\n열파동으로 상대를 불태워버린다."
          shield: "거다이맥스한 다태우지네의\n방사열이 기류를 어지럽혀\n폭풍이 일어날 때가 있다."
        zh_simp:
          sword: "超极巨化之力使它的\n体温超过了１０００度。\n会用热浪烧焦对手。"
          shield: "超极巨化的焚焰蚣释放出的\n热辐射会扰乱气流，\n有时甚至还会引发暴风雨。"
        zh_trad:
          sword: "超極巨化之力使牠的體溫\n超過了攝氏１０００度。\n會用熱浪燒焦對手。"
          shield: "超極巨化的焚焰蚣釋放出的\n熱輻射會擾亂氣流，\n有時甚至還會引發暴風雨。"
clobbopus:
  species_id: 852
  names:
    jp_kana: タタッコ
    jp_kanji: タタッコ
    en: Clobbopus
    fr: Poulpaf
    it: Clobbopus
    de: Klopptopus
    es: Clobbopus
    ko: 때때무노
    zh_simp: 拳拳蛸
    zh_trad: 拳拳蛸
  forms:
    clobbopus:
      form_id: 0
      base_stats:
        hp: 50
        attack: 68
        defense: 60
        special_attack: 50
        special_defense: 50
        speed: 32
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fighting
      egg_groups:
        - water_1
        - human_like
      abilities:
        - limber
      hidden_ability: technician
      descriptions:
        jp_kana:
          sword: "えさを　もとめ　ちじょうに　あがる。\nこうきしんおうせいで　めにしたものは\nとりあえず　しょくしゅで　なぐる。"
          shield: "３さいじ　くらいの　かしこさ。\nしょくしゅは　よくちぎれるが\nさいせいするので　きにしない。"
        jp_kanji:
          sword: "餌を　求め　地上に　上がる。\n好奇心旺盛で　目にしたものは\nとりあえず　触手で　殴る。"
          shield: "３歳児　くらいの　賢さ。\n触手は　よくちぎれるが\n再生するので　気にしない。"
        en:
          sword: "It’s very curious, but its means of investigating\nthings is to try to punch them with its tentacles.\nThe search for food is what brings it onto land."
          shield: "Its tentacles tear off easily, but it isn’t alarmed\nwhen that happens—it knows they’ll grow back.\nIt’s about as smart as a three-year-old."
        fr:
          sword: "Il se rend sur la terre ferme pour se nourrir.\nTrès curieux, son premier réflexe est de frapper\ntout ce qu’il voit avec ses tentacules."
          shield: "Il a l’intelligence d’un enfant de trois ans.\nIl perd souvent ses tentacules, mais comme\nils repoussent, il ne s’en soucie guère."
        it:
          sword: "Si spinge sulla terraferma in cerca di cibo.\nÈ molto curioso e colpisce con i tentacoli tutto\nquello che entra nel suo campo visivo."
          shield: "Ha l’intelligenza di un bambino di 3 anni. Gli\nsi staccano spesso i tentacoli, ma poiché gli\nricrescono naturalmente non se ne preoccupa."
        de:
          sword: "Zur Futtersuche kommt es an Land. Es ist sehr\nneugierig, weshalb es alles, was es sieht,\nzunächst einmal mit seinen Tentakeln haut."
          shield: "Sein Verstand ist ungefähr auf dem Level eines\ndreijährigen Kindes. Es macht ihm nichts aus, dass\nseine Tentakel oft abreißen, da sie nachwachsen."
        es:
          sword: "Emerge a tierra firme en busca de alimento. Su\nextrema curiosidad lo induce a golpear con los\ntentáculos todo lo que entra en su campo visual."
          shield: "Su inteligencia es similar a la de un niño de tres\naños. Sus tentáculos se desprenden a menudo,\npero ni se inmuta, ya que se regeneran solos."
        ko:
          sword: "먹이를 찾아 지상으로 올라온다.\n호기심이 왕성해서 눈에 들어오는 것은\n일단 촉수로 때리고 본다."
          shield: "세 살 아이 정도의 지능을 가졌다.\n촉수는 잘 끊어지지만\n재생되기 때문에 신경 쓰지 않는다."
        zh_simp:
          sword: "会为了寻找食物而登上陆地。\n拥有旺盛的好奇心，不管看到什么，\n都会先用触手打一打再说。"
          shield: "智商大致相当于３岁的儿童。\n虽然触手经常断掉，但因为\n能再生，所以它并不在意。"
        zh_trad:
          sword: "會為了尋找食物而登上陸地。\n擁有旺盛的好奇心，不管看到什麼，\n都會先用觸手打一打再說。"
          shield: "智商大致相當於３歲的兒童。\n雖然觸手經常斷掉，但因為\n能再生，所以牠並不在意。"
grapploct:
  species_id: 853
  names:
    jp_kana: オトスパス
    jp_kanji: オトスパス
    en: Grapploct
    fr: Krakos
    it: Grapploct
    de: Kaocto
    es: Grapploct
    ko: 케오퍼스
    zh_simp: 八爪武师
    zh_trad: 八爪武師
  forms:
    grapploct:
      form_id: 0
      base_stats:
        hp: 80
        attack: 118
        defense: 90
        special_attack: 70
        special_defense: 80
        speed: 42
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fighting
      egg_groups:
        - water_1
        - human_like
      abilities:
        - limber
      hidden_ability: technician
      descriptions:
        jp_kana:
          sword: "ぜんしんが　きんにくの　かたまり。\nしょくしゅを　つかって　くりだす\nしめわざの　いりょくは　すさまじい。"
          shield: "おのれのうでを　ためすべく　りくに\nあがり　たいせんあいてを　さがす。\nたたかいおえると　うみに　かえる。"
        jp_kanji:
          sword: "全身が　筋肉の　塊。\n触手を　使って　繰りだす\n絞め技の　威力は　凄まじい。"
          shield: "おのれの腕を　試すべく　陸に\n上がり　対戦相手を　探す。\n戦い終えると　海に　帰る。"
        en:
          sword: "A body made up of nothing but muscle makes\nthe grappling moves this Pokémon performs with\nits tentacles tremendously powerful."
          shield: "Searching for an opponent to test its skills\nagainst, it emerges onto land. Once the battle\nis over, it returns to the sea."
        fr:
          sword: "Son corps est un amas de muscles.\nLa puissance des prises d’étranglement\nqu’il exécute avec ses tentacules est saisissante."
          shield: "Mû par le besoin de tester la force de ses bras,\nil se rend sur la terre ferme pour trouver\nun adversaire. Il retourne à l’eau après le combat."
        it:
          sword: "Il suo corpo è un ammasso di muscoli.\nÈ in grado di stritolare con una potenza\nformidabile grazie ai suoi tentacoli."
          shield: "Si spinge sulla terraferma in cerca di avversari\nda sfidare per mettere alla prova la propria\nforza. Terminata la lotta, ritorna in mare."
        de:
          sword: "Sein Körper besteht gänzlich aus Muskeln.\nDie schiere Stärke seines Würgegriffs, bei dem\nes seine Tentakel einsetzt, ist sagenhaft."
          shield: "Um sein Können zu testen, kommt es an Land\nund begibt sich auf die Suche nach Gegnern.\nSind die Kämpfe vorbei, kehrt es ins Meer zurück."
        es:
          sword: "Todo su cuerpo es una mole de puro músculo.\nUtiliza los tentáculos para ejecutar técnicas de\nestrangulamiento con una formidable potencia."
          shield: "Se aventura en tierra firme para buscar rivales\ncontra los que luchar para medir su valía. Tras\nterminar el combate, regresa al mar."
        ko:
          sword: "온몸이 근육덩어리다.\n촉수를 사용해서 펼치는\n조르기 기술의 위력은 무시무시하다."
          shield: "자신의 실력을 시험하기 위해\n육지로 올라가 대전 상대를 찾는다.\n싸움이 끝나면 바다로 돌아간다."
        zh_simp:
          sword: "全身都是肌肉。\n会用触手施展绞技，\n威力无与伦比。"
          shield: "会为了试自己的身手\n而登上陆地寻找对手。\n战斗结束后就会回到海里。"
        zh_trad:
          sword: "全身都是肌肉。\n會用觸手施展絞技，\n威力無與倫比。"
          shield: "會為了試自己的身手\n而登上陸地尋找對手。\n戰鬥結束後就會回到海裡。"
