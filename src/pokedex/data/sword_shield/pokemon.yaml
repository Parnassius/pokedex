        - healer
        - regenerator
      hidden_ability: klutz
      held_items:
        common: oran_berry
        rare: sitrus_berry
      descriptions:
        jp_kana:
          sword: "すぐれた　ちょうかくを　もっている。\n２キロさきで　ころがった　こいしの\nおとも　ききとることが　できる。"
          shield: "こころやさしい　ポケモン。\nしょっかくを　おしあて　あいての\nきもちや　たいちょうを　りかいする。"
        jp_kanji:
          sword: "優れた　聴覚を　持っている。\n2キロ先で　転がった　小石の\n音も　聴き取ることが　できる。"
          shield: "心優しい　ポケモン。\n触角を　押し当て　相手の\n気持ちや　体調を　理解する。"
        en:
          sword: "Audino’s sense of hearing is superb. Not even a\npebble rolling along over a mile away will escape\nAudino’s ears."
          shield: "This Pokémon has a kind heart. By touching with\nits feelers, Audino can gauge other creatures’\nfeelings and physical conditions."
        fr:
          sword: "Son ouïe est si fine qu’il est capable d’entendre\nun caillou tomber à 2 km."
          shield: "Ce Pokémon gentil est capable de deviner\nles émotions et l’état de santé des autres\nrien qu’en les touchant avec ses antennes."
        it:
          sword: "Possiede un udito eccellente, grazie al quale\nriesce a cogliere anche il suono di un sasso\nche rotola a 2 km di distanza."
          shield: "Questo Pokémon dal cuore tenero è in grado di\npercepire le condizioni fisiche e mentali\ndi chi tocca con le antenne."
        de:
          sword: "Dieses Pokémon verfügt über ein außerordentlich\ngutes Gehör. Es kann sogar das Kullern eines\nKiesels aus 2 km Entfernung vernehmen."
          shield: "Berührt dieses herzensgute Pokémon jemanden\nmit seinen Fühlern, kann es dessen körperliche\nVerfassung und Gemütszustand ertasten."
        es:
          sword: "Su sentido del oído es extraordinario. Puede\npercibir el sonido de una piedrecita rodando\na 2 km de distancia."
          shield: "Un Pokémon gentil que es capaz de comprender\nlos sentimientos y averiguar el estado de salud\nde todo aquel que toque con sus antenas."
        ko:
          sword: "뛰어난 청각을 가졌다.\n2km 떨어진 곳에서 구르는\n돌멩이 소리도 들을 수 있다."
          shield: "마음 착한 포켓몬이다.\n더듬이를 갖다 대어 상대의\n마음과 몸 상태를 파악한다."
        zh_simp:
          sword: "拥有敏锐的听觉。\n连２公里以外小石头\n滚动的声音都能听到。"
          shield: "心地善良的宝可梦。\n通过触角接触，就能了解\n对方的心情和身体状况。"
        zh_trad:
          sword: "擁有極為敏銳的聽覺。\n連２公里外有小石子\n滾動的聲音牠都能聽見。"
          shield: "心地善良的寶可夢。透過\n用觸角觸碰，就能了解\n對方的情緒和身體狀況。"
timburr:
  species_id: 532
  names:
    jp_kana: ドッコラー
    jp_kanji: ドッコラー
    en: Timburr
    fr: Charpenti
    it: Timburr
    de: Praktibalk
    es: Timburr
    ko: 으랏차
    zh_simp: 搬运小匠
    zh_trad: 搬運小匠
  forms:
    timburr:
      form_id: 0
      base_stats:
        hp: 75
        attack: 80
        defense: 55
        special_attack: 25
        special_defense: 35
        speed: 35
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fighting
      egg_groups:
        - human_like
      abilities:
        - guts
        - sheer_force
      hidden_ability: iron_fist
      descriptions:
        jp_kana:
          sword: "けんちくの　てつだいが　すき。\nあめで　こうじが　やすみの　ひは\nかくざいを　ふりまわし　あばれる。"
          shield: "じぶんの　３ばいくらいの　かくざいを\nもつように　なった　ドッコラーは\nしんかの　ひが　ちかい。"
        jp_kanji:
          sword: "建築の　手伝いが　好き。\n雨で　工事が　休みの　日は\n角材を　振りまわし　暴れる。"
          shield: "自分の　３倍くらいの　角材を\n持つように　なった　ドッコラーは\n進化の　日が　近い。"
        en:
          sword: "It loves helping out with construction projects.\nIt loves it so much that if rain causes work to halt,\nit swings its log around and throws a tantrum."
          shield: "Timburr that have started carrying logs that are\nabout three times their size are nearly ready\nto evolve."
        fr:
          sword: "Il aime donner un coup de main sur les chantiers.\nLorsque le travail cesse à cause de la pluie,\nil brandit sa poutre de colère."
          shield: "Lorsque Charpenti est capable de soulever\nune poutre faisant trois fois son poids,\nle jour de son évolution est proche."
        it:
          sword: "Gli piace dare una mano nei lavori edili, e\nquando vengono interrotti per la pioggia,\nsi sfoga facendo roteare la sua trave."
          shield: "Quando diventa capace di reggere travi di legno\ntre volte più grandi di lui, l’evoluzione è vicina."
        de:
          sword: "Es hilft gern auf Baustellen aus. Bleiben diese\nbei Regen geschlossen, macht es seinem Ärger\nLuft, indem es seinen Holzbalken schwingt."
          shield: "Man sagt, seine Entwicklung stehe dann kurz\nbevor, wenn es einen Holzbalken heben kann,\nder dreimal so groß und schwer ist wie es selbst."
        es:
          sword: "Le gusta ayudar en labores de construcción.\nCuando la lluvia obliga a interrumpir las obras,\nblande con furia su viga de madera."
          shield: "Cuando logra transportar una viga de madera\nque triplica su altura y peso, es señal de que va\na evolucionar."
        ko:
          sword: "건축 일을 돕는 것을 좋아한다.\n비가 내려서 공사를 쉬는 날에는\n각목을 휘두르며 날뛴다."
          shield: "자신의 3배 정도의 각목을\n들 수 있게 된 으랏차는\n머지않아 진화하게 된다."
        zh_simp:
          sword: "喜欢帮忙做建筑的工作。\n因为下雨而停工时，\n会乱挥木材大闹一番。"
          shield: "如果搬运小匠可以搬起\n自己体重３倍左右的方材，\n就代表它进化的日子要到了。"
        zh_trad:
          sword: "喜歡幫忙做建築的工作。\n因為下雨而停工時，\n會亂揮木材大鬧一番。"
          shield: "如果搬運小匠可以搬起\n自己體重３倍左右的木材，\n就代表牠進化的日子要到了。"
gurdurr:
