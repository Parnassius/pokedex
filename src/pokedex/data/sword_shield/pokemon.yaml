      descriptions:
        jp_kana:
          sword: "カラのなかに　しあわせが　たくさん\nつまっているらしく　やさしくされると\nこううんを　わけあたえる　という。"
          shield: "こううんの　シンボル。\nカラの　なかには　しあわせが\nたくさん　つまっている　という。"
        jp_kanji:
          sword: "殻の中に　幸せが　たくさん\nつまっているらしく　優しくされると\n幸運を　分け与える　という。"
          shield: "幸運の　シンボル。\n殻の　中には　幸せが\nたくさん　つまっている　という。"
        en:
          sword: "The shell seems to be filled with joy. It is said\nthat it will share good luck when treated kindly."
          shield: "It is considered to be a symbol of good luck.\nIts shell is said to be filled with happiness."
        fr:
          sword: "Sa coquille est remplie de joie.\nOn dit que s’il est bien traité, il porte chance."
          shield: "C’est un symbole de chance.\nOn dit que sa coquille est remplie de joie."
        it:
          sword: "Sembra che il suo guscio sia ricolmo di felicità.\nSi dice che porti fortuna se lo si tratta bene."
          shield: "Viene considerato un simbolo di buona fortuna.\nSi dice che il suo guscio sia ricolmo di felicità."
        de:
          sword: "Seine Schale ist voll von Freude. Es heißt,\nwenn man es freundlich und gut behandelt,\nteile es sein Glück."
          shield: "Es gilt als Glücksbringer. Man sagt, seine Schale\nsei voll von purer Freude."
        es:
          sword: "El cascarón parece estar lleno de alegría. Dicen\nque trae buena suerte si se le trata con cariño."
          shield: "Se lo considera un símbolo de buena suerte y,\nsegún se dice, su cascarón está lleno de alegría."
        ko:
          sword: "껍질 안에 행복이 가득 차 있어서\n상냥하게 대해준 사람에게\n행운을 나누어 준다고 한다."
          shield: "행운의 상징이다.\n껍질 안에는 행복이\n가득 담겨 있다고 한다."
        zh_simp:
          sword: "壳内好像塞满了很多幸福，\n据说如果能温柔对待它，\n它就会把幸运分给对方。"
          shield: "好运的象征。\n据说在它的壳里\n装着满满的幸福。"
        zh_trad:
          sword: "殼內好像塞滿了許多幸福，\n據說只要溫柔地對待牠，\n牠就會把幸運分給對方。"
          shield: "好運的象徵。\n據說在牠的殼裡\n裝著滿滿的幸福。"
togetic:
