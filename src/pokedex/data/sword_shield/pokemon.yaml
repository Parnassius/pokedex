          shield: "とくしゅな　えきたいを　のむと\nちえを　さずかると　いわれるが\nランクルスいがいには　もうどく。"
        jp_kanji:
          sword: "超能力を　使うよりも\n自慢の　腕を　ぶん回して\n殴り倒すのを　好んでいる。"
          shield: "特殊な　液体を　飲むと\n知恵を　授かると　いわれるが\nランクルス以外には　猛毒。"
        en:
          sword: "While it could use its psychic abilities in battle,\nthis Pokémon prefers to swing its powerful arms\naround to beat opponents into submission."
          shield: "It’s said that drinking the liquid surrounding\nReuniclus grants wisdom. Problem is, the liquid is\nhighly toxic to anything besides Reuniclus itself."
        fr:
          sword: "Fier d’avoir des bras, il préfère s’en servir\npour assommer ses adversaires plutôt que\nd’avoir recours à ses pouvoirs psychiques."
          shield: "S’il ne s’agissait pas d’un poison violent que seul\nSymbios peut boire, son curieux fluide pourrait,\nselon les dires, rendre plus intelligent."
        it:
          sword: "Piuttosto che usare i suoi poteri soprannaturali,\npreferisce sferrare colpi facendo roteare\nenergicamente le braccia, di cui va molto fiero."
          shield: "Si dice che il suo liquido speciale doni\nintelligenza a chi lo beve, ma è velenosissimo\nper tutti tranne che per Reuniclus."
        de:
          sword: "Es ist stolz auf seine beiden Arme und greift bei\nKämpfen lieber auf diese zurück, anstatt seine\nübernatürlichen Kräfte einzusetzen."
          shield: "Seine seltsame Flüssigkeit soll große Intelligenz\nverleihen, wenn man sie trinkt. Leider ist sie ein\ntödliches Gift für alle außer Zytomega."
        es:
          sword: "Prefiere derribar a los rivales haciendo girar sus\nfuertes brazos antes que valerse de sus poderes\nextrasensoriales."
          shield: "Al parecer, beber su líquido especial otorga un\nintelecto sin par, pero resulta muy venenoso,\nexcepto para los propios Reuniclus."
        ko:
          sword: "초능력을 사용하는 것보다는\n자랑거리인 팔을 휘둘러서\n때려눕히는 것을 선호한다."
          shield: "특수한 액체를 마시면\n지혜를 얻는다고 전해지지만\n란쿨루스 외에는 맹독이다."
        zh_simp:
          sword: "比起使用超能力，\n它更喜欢靠着挥动\n自傲的手臂来打倒对手。"
          shield: "虽然有人说只要喝掉它特殊的液体\n就能得到智慧，但对人造细胞卵\n以外来说，那其实是剧毒。"
        zh_trad:
          sword: "比起使用超能力，\n牠更喜歡靠著揮動\n自傲的手臂來打倒對手。"
          shield: "雖然有人說只要喝掉牠特殊的液體\n就能得到智慧，但對人造細胞卵\n以外來說，那其實是劇毒。"
vanillite:
