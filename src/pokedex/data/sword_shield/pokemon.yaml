        jp_kana:
          sword: "オスが　こどもを　そだてる。\nこそだてちゅうは　せなかの　トゲの\nどくそが　つよく　こくなるのだ。"
          shield: "ほそい　くちだが　きゅういんりょくは\nつよい。　くちより　おおきな　エサも\nいっしゅんで　すいこみ　たべるぞ。"
        jp_kanji:
          sword: "オスが　子どもを　育てる。\n子育て中は　背中の　トゲの　毒素が\n強く　濃くなるのだ。"
          shield: "細い　口だが　吸引力は　強い。\n口より　大きな　エサも\n一瞬で　吸いこみ　食べるぞ。"
        en:
          sword: "It’s the males that raise the offspring. While\nSeadra are raising young, the spines on their\nbacks secrete thicker and stronger poison."
          shield: "Seadra’s mouth is slender, but its suction power\nis strong. In an instant, Seadra can suck in food\nthat’s larger than the opening of its mouth."
        fr:
          sword: "Les mâles s’occupent des petits, et tant qu’ils en\nont à élever, le venin contenu dans leurs épines\ndorsales devient beaucoup plus fort."
          shield: "Sa puissance de succion est si forte qu’il peut\naspirer en un instant ses proies pour les manger,\nmême si elles sont plus grosses que sa bouche."
        it:
          sword: "Il maschio si occupa dei piccoli. Quando li alleva,\nil veleno degli aculei dorsali diventa denso e\npotente."
          shield: "Nonostante la misura ridotta, la sua bocca\nha un potere aspirante tale da permettergli di\nrisucchiare e inghiottire grosse prede all’istante."
        de:
          sword: "Männlichen Seemon obliegt es, den Nachwuchs\ngroßzuziehen. In diesem Zeitraum ist das Gift in\nihren Rückenstacheln stärker und dickflüssiger."
          shield: "Selbst Beute, die größer als sein kleiner Mund ist,\nkann es dank dessen starker Saugkraft im Nu\neinsaugen und verspeisen."
        es:
          sword: "En esta especie, es el macho quien se ocupa de\nla prole. Durante la época de cría, el veneno de\nlas púas de su espalda se vuelve más potente."
          shield: "Su estrecho morro posee tal fuerza de succión\nque es capaz de aspirar presas de mayor tamaño\ny engullirlas enteras."
        ko:
          sword: "수컷이 새끼를 기른다.\n새끼를 기르는 동안 등에 난\n가시의 독소는 강해지고 짙어진다."
          shield: "입은 가늘지만 흡인력은 강하다.\n입보다 큰 먹이도\n순식간에 빨아들여 먹는다."
        zh_simp:
          sword: "由雄性来抚育孩子。\n育儿时，背上刺的毒素\n浓度会增加，变得更烈。"
          shield: "嘴巴虽然细，吸引力却很强。\n就算是比嘴巴还大的猎物，\n也能一瞬间吸进嘴里吃掉。"
        zh_trad:
          sword: "是由雄性來養育孩子。\n在育兒時，背上刺的\n毒素會變得更強更濃。"
          shield: "嘴部雖然細，但吸力卻很強。\n就算是比嘴還要大的食物，\n也都能瞬間吸進口裡吃掉。"
