          sword: "ひじょうに　たかい　ちのうを　もつ。\nうまれてから　しぬまでの　できごとを\nすべて　おぼえている　という。"
          shield: "きょうりょくな　ちょうのうりょくを\nあやつる。　りょうての　スプーンは\nその　ちからで　つくりだしたという。"
        jp_kanji:
          sword: "非常に　高い　知能を　持つ。\n生まれてから　死ぬまでの　できごとを\nすべて　覚えている　という。"
          shield: "強力な　超能力を　操る。\n両手の　スプーンは\nその　力で　作りだしたという。"
        en:
          sword: "It has an incredibly high level of intelligence.\nSome say that Alakazam remembers everything\nthat ever happens to it, from birth till death."
          shield: "Alakazam wields potent psychic powers. It’s said\nthat this Pokémon used these powers to create\nthe spoons it holds."
        fr:
          sword: "Doué d’une intelligence hors du commun,\nce Pokémon serait capable de conserver tous\nses souvenirs, de sa naissance jusqu’à sa mort."
          shield: "Il dispose d’immenses pouvoirs psychiques.\nOn raconte qu’il s’en est servi afin de créer\nles cuillères qu’il tient dans chaque main."
        it:
          sword: "Possiede un intelletto estremamente elevato\ne si dice sia in grado di ricordare ogni evento\ndella sua vita, dalla nascita alla morte."
          shield: "Padroneggia potenti poteri psichici, con i quali\nsi dice abbia creato i cucchiai che tiene in mano."
        de:
          sword: "Es verfügt über extrem hohe Intelligenz und soll\nsich an alles erinnern können, was zwischen seiner\nGeburt und seinem Tod passiert."
          shield: "Simsala verfügt über extrem starke Psycho-Kräfte.\nMit ihnen soll es die Löffel erschaffen haben,\ndie es in seinen Händen hält."
        es:
          sword: "Posee una capacidad intelectual fuera de lo\ncomún que le permite recordar todo lo sucedido\ndesde el instante de su nacimiento."
          shield: "Posee unos poderes psíquicos extraordinarios\ncon los que, según se dice, creó las cucharas\nque lleva en las manos."
        ko:
          sword: "매우 높은 지능을 지녔다.\n태어나서 죽을 때까지 일어나는 일을\n모두 기억한다고 한다."
          shield: "강력한 초능력을 구사한다.\n양손에 든 숟가락은 그 힘으로\n만들어낸 것이라고 한다."
        zh_simp:
          sword: "拥有非常高的智力。\n据说它记得从生到死\n发生过的所有事情。"
          shield: "会操纵强大的超能力。\n据说它双手握着的汤勺\n就是用那力量制造出来的。"
        zh_trad:
          sword: "擁有非常高的智商。\n據說牠能記住從出生到死\n一輩子發生過的所有事情。"
          shield: "能操控強大的超能力。\n雙手中的湯匙據說就是\n用牠的力量創造出來的。"
