        - steel
        - rock
      egg_groups:
        - monster
      abilities:
        - sturdy
        - rock_head
      hidden_ability: heavy_metal
      held_items:
        rare: hard_stone
      descriptions:
        jp_kana:
          sword: "コドラが　くらす　やまは　わきみずと\nてっこうせきが　ほうふなので　ひとと\nあらそいに　なることも　おおかった。"
          shield: "からだを　ぶつけあって　なわばりを\nあらそう。　はがねの　よろいは　よく\nみると　きずや　へこみが　あるのだ。"
        jp_kanji:
          sword: "コドラが　暮らす　山は　湧き水と\n鉄鉱石が　豊富なので　人と\n争いに　なることも　多かった。"
          shield: "体を　ぶつけ合って　縄張りを\n争う。　鋼の　鎧は　よく\n見ると　傷や　へこみが　あるのだ。"
        en:
          sword: "Lairon live in mountains brimming with spring\nwater and iron ore, so these Pokémon often\ncame into conflict with humans in the past."
          shield: "During territorial disputes, Lairon fight by\nslamming into each other. Close inspection of\ntheir steel armor reveals scratches and dents."
        fr:
          sword: "Vivre au sein de montagnes riches en minerai\net abondantes en eau de source lui a souvent\nvalu d’entrer en conflit avec l’Homme."
          shield: "Les Galegon se disputent les territoires en luttant\nau corps à corps, comme le montrent les éraflures\nsur leur armure d’acier."
        it:
          sword: "I monti in cui vive sono ricchi di minerali ferrosi\ne sorgenti d’acqua. Per questo, spesso in passato\nquesto Pokémon si scontrava con gli esseri umani."
          shield: "I Lairon lottano per il territorio scagliandosi l’uno\ncontro l’altro. A un’osservazione attenta, la loro\narmatura d’acciaio mostra graffi e ammaccature."
        de:
          sword: "Stollrak leben in Bergen, die reich an Quellwasser\nund Eisenerz sind, weshalb sie oft mit Menschen\nin Konflikt gerieten."
          shield: "Bei Revierkämpfen prallen sie mit ihren Körpern\ngegeneinander. Betrachtet man die Stahlpanzer\ngenauer, entdeckt man Kratzer und Dellen."
        es:
          sword: "Habita en zonas ricas en hierro y con numerosos\nmanantiales, por lo que en el pasado las disputas\nterritoriales con los humanos eran frecuentes."
          shield: "Resuelven sus disputas territoriales embistiendo\ny golpeando con el cuerpo. En sus corazas de\nacero se pueden apreciar hendiduras y rasguños."
        ko:
          sword: "갱도라가 사는 산은\n샘물과 철광석이 풍부하여\n사람과 다투는 일도 잦았다."
          shield: "서로 몸을 부딪치며 영역\n싸움을 한다. 강철의 갑옷은\n잘 보면 흠집과 파인 곳이 있다."
        zh_simp:
          sword: "由于可多拉所栖息的山上\n有着丰富的泉水和铁矿石，\n因此经常会与人类发生争端。"
          shield: "会用钢铁之躯互相撞击\n来争夺地盘。仔细看会发现\n钢铁盔甲上有伤痕和凹陷。"
        zh_trad:
          sword: "可多拉棲息的山區有\n豐富的泉水和鐵礦石，\n因此常會與人類起紛爭。"
          shield: "會互相碰撞身體來爭奪地盤。\n仔細看牠的鋼鐵盔甲，就會\n發現有傷痕及凹痕。"
