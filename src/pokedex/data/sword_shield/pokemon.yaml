          shield: "２０ぴきていどの　むれで　くらす。\nむれを　うらぎった　バッフロンは\nなぜか　あたまの　けが　ぬける。"
        jp_kanji:
          sword: "頭突きだけで　車を　潰す。\n頭の　毛が　大きいほど\n群れでの　地位が　上がるのだ。"
          shield: "２０匹程度の　群れで　暮らす。\n群れを　裏切った　バッフロンは\nなぜか　頭の　毛が　抜ける。"
        en:
          sword: "These Pokémon can crush a car with no more\nthan a headbutt. Bouffalant with more hair on\ntheir heads hold higher positions within the herd."
          shield: "These Pokémon live in herds of about 20\nindividuals. Bouffalant that betray the herd will\nlose the hair on their heads for some reason."
        fr:
          sword: "Il peut détruire une voiture d’un coup de tête.\nPlus sa crinière est volumineuse, plus son rang\nau sein du troupeau est élevé."
          shield: "Les Frison vivent en troupeau d’une vingtaine\nd’individus. Pour une raison inconnue, si l’un\nd’eux trahit le groupe, il perd sa crinière."
        it:
          sword: "Può distruggere un’automobile a testate. Più\nla criniera è voluminosa, più prominente è la sua\nposizione nella mandria."
          shield: "Vive in mandrie di circa 20 esemplari.\nPer qualche motivo, i Bouffalant che tradiscono\nil gruppo perdono la chioma."
        de:
          sword: "Mit nur einem Kopfstoß kann es ein Auto\nzerstören. Je größer das Fellbüschel an Bisofanks\nKopf, desto höher ist sein Rang in der Herde."
          shield: "Es lebt in Gruppen von circa 20 Artgenossen.\nVerrät ein Bisofank seine Herde, fällt ihm aus\nunbekannten Gründen das Fell am Kopf aus."
        es:
          sword: "Puede destrozar un coche de un solo testarazo.\nCuanto más abundante sea su melena, mayor\nrango tendrá en la jerarquía de la manada."
          shield: "Forman manadas de unos veinte individuos. Se\ndesconoce el motivo, pero los que traicionan la\nconfianza del grupo pierden la melena."
        ko:
          sword: "박치기만으로 자동차를 부순다.\n머리의 털이 풍성할수록\n무리에서 지위가 올라간다."
          shield: "20마리 정도가 무리 지어 산다.\n무리를 배신한 버프론은\n어째서인지 머리털이 빠진다."
        zh_simp:
          sword: "仅凭头锤就能把汽车撞个\n粉碎。头上那团毛的体积越大，\n在族群中的地位就会越高。"
          shield: "会以约２０只的规模群居。\n不知为何，背叛了族群的\n爆炸头水牛脑袋上的毛会脱落。"
        zh_trad:
          sword: "只用頭錘就能壓扁汽車。\n頭部的那團毛越大一團，\n在群體裡的地位就會越高。"
          shield: "會組成約２０隻的群體一起生活。\n不知為何，背叛了群體的\n爆炸頭水牛頭上的毛會脫落。"
