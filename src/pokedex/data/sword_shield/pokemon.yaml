        jp_kanji:
          sword: "ギラギラと　照りつける　太陽の\n光を　浴びた　結果　本来の\n姿と　能力が　目覚めた。"
          shield: "エスパー能力は　弱まった。\nしっぽの　頭が　微弱な\nテレパシーで　周囲を　探る。"
