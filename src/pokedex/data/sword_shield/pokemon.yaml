        jp_kana:
          sword: "ぬるぬるの　からだは　つかみにくい。\nある　ちほうでは　どろが　かたまって\nドジョッチが　うまれたと　いわれる。"
          shield: "２ほんの　ながい　ヒゲで　にごった\nかわぞこを　さぐる。　ヌルヌルした\nねんまくが　からだを　まもっている。"
        jp_kanji:
          sword: "ぬるぬるの　体は　掴みにくい。\nある　地方では　泥が　固まって\nドジョッチが　生まれたと　いわれる。"
          shield: "２本の　長い　ヒゲで　濁った\n川底を　探る。　ヌルヌルした\n粘膜が　体を　守っている。"
        en:
          sword: "Its slimy body is hard to grasp. In one region, it is\nsaid to have been born from hardened mud."
          shield: "It probes muddy riverbeds with its two long\nwhiskers. A slimy film protects its body."
        fr:
          sword: "Son corps glissant est difficile à attraper.\nDans une certaine région, on raconte qu’il est né\nà partir de boue solidifiée."
          shield: "Il sonde les bords boueux des rivières\navec ses barbillons.\nUn film fin et visqueux protège tout son corps."
        it:
          sword: "Ha un corpo viscido e difficile da afferrare.\nIn una regione si dice che sia nato da fango\nindurito."
          shield: "Si serve dei lunghi baffi per saggiare i letti\nfangosi dei fiumi. Ha il corpo protetto da\nuna membrana viscida."
        de:
          sword: "Sein schleimiger Körper ist schwer zu greifen.\nIn einer Region sagt man, es sei aus gehärtetem\nSchlamm entstanden."
          shield: "Es untersucht schlammige Flussbetten mit seinen\nbeiden langen Schnurrhaaren. Sein Körper wird\nvon einem Schleimfilm geschützt."
        es:
          sword: "Su escurridizo cuerpo es difícil de agarrar. En\ncierta región se dice que ha nacido de barro\nendurecido."
          shield: "Examina los lechos lodosos de los ríos con los\nlargos bigotes que tiene. Está protegido por una\ncapa viscosa."
        ko:
          sword: "미끈미끈한 몸은 잡기 어렵다.\n어떤 지방에서는 진흙이 굳어져서\n미꾸리가 생겨났다고 전해진다."
          shield: "2개의 긴 수염으로 탁한\n강바닥을 더듬는다. 미끈미끈한\n점막으로 몸을 보호한다."
        zh_simp:
          sword: "身体滑溜溜的很难抓住。\n某个地区流传着泥泥鳅\n是由泥土凝结而成的说法。"
          shield: "会用２根长长的胡须\n探索浑浊的河底。\n用湿滑的粘膜保护着身体。"
        zh_trad:
          sword: "身體滑溜溜的很難抓住。\n某個地區流傳著泥泥鰍\n是由泥土凝結而成的說法。"
          shield: "會用２根長長的鬍鬚\n探索渾濁的河底。\n用濕滑的黏膜保護著身體。"
