      descriptions:
        jp_kana:
          sword: "タマゴのように　みえるが　りっぱな\nポケモン。　テレパシーで　なかまと\nこうしん　している　らしいぞ。"
          shield: "６ぴきで　いないと　おちつかない。\n１ぴきでも　いなくなると　とたんに\nにげごしに　なるのだ。"
        jp_kanji:
          sword: "タマゴのように　見えるが　立派な\nポケモン。　テレパシーで　仲間と\n交信している　らしいぞ。"
          shield: "６匹で　いないと　落ち着かない。\n１匹でも　いなくなると　とたんに\n逃げ腰に　なるのだ。"
        en:
          sword: "Though it may look like it’s just a bunch of eggs,\nit’s a proper Pokémon. Exeggcute communicates\nwith others of its kind via telepathy, apparently."
          shield: "These Pokémon get nervous when they’re not in a\ngroup of six. The minute even one member of the\ngroup goes missing, Exeggcute become cowardly."
        fr:
          sword: "Même s’il ressemble à un tas d’œufs, il s’agit bien\nd’un Pokémon. Il paraît qu’ils communiquent\nentre eux par télépathie."
          shield: "Il a besoin d’être constitué de ses six membres\npour rester calme. Sitôt qu’il en manque un,\nil lui prend soudainement l’envie de fuir."
        it:
          sword: "Somiglia a un mucchio di uova, ma è un Pokémon\na tutti gli effetti. Pare che comunichi con i suoi\nsimili telepaticamente."
          shield: "Se non sono presenti tutti e sei gli individui\nche lo compongono, non è tranquillo.\nAppena ne sparisce uno si prepara alla fuga."
        de:
          sword: "Owei mag zwar Eiern ähneln, ist aber ein echtes\nPokémon, das aus sechs Individuen besteht, die\nwohl telepathisch miteinander kommunizieren."
          shield: "Es muss immer aus sechs Mitgliedern bestehen,\nsonst herrscht Unruhe. Fehlt auch nur eines, steigt\nbei den anderen die Bereitschaft zur Flucht."
        es:
          sword: "Pese a su aspecto de mera piña de huevos, se\ntrata de un Pokémon. Al parecer, sus cabezas\nse comunican entre sí por telepatía."
          shield: "Necesita contar con la totalidad de sus seis\nmiembros para mantener la calma. Si desaparece\nuno siquiera, le entran ganas de salir huyendo."
        ko:
          sword: "알처럼 보이지만 엄연한\n포켓몬이다. 텔레파시로\n동료와 교신하는 듯하다."
          shield: "6마리가 아니면 진정하지 못한다.\n1마리라도 없어지면 바로\n도망태세가 된다."
        zh_simp:
          sword: "别看它看上去像蛋，其实是\n如假包换的宝可梦。据说它会\n用心灵感应来和伙伴通讯。"
          shield: "６只不在一起就不安心。\n哪怕只是少了１只，\n都会马上想要逃跑。"
        zh_trad:
          sword: "雖然看起來很像是蛋，但卻是\n如假包換的寶可夢。似乎會用\n心靈感應來與夥伴們交流喔。"
          shield: "非得湊齊６隻才會有安全感。\n那怕只是少了１隻，都會立刻\n變得很膽小，隨時想要逃跑。"
