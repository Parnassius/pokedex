        jp_kana:
          sword: "かんそうした　すなちで　すなあびを\nするのが　すき。　からだに　ついた\nよごれと　みずけを　おとすのだ。"
          shield: "じめんを　ほって　すあなを　つくる。\nちちゅうの　かたい　いわも　するどい\nツメで　くだいて　ほりすすむぞ。"
        jp_kanji:
          sword: "乾燥した　砂地で　砂浴びを\nするのが　好き。　体に　ついた\n汚れと　水気を　落とすのだ。"
          shield: "地面を　掘って　巣穴を　つくる。\n地中の　硬い　岩も　鋭い　ツメで\n砕いて　掘り進むぞ。"
        en:
          sword: "It loves to bathe in the grit of dry, sandy areas.\nBy sand bathing, the Pokémon rids itself of dirt\nand moisture clinging to its body."
          shield: "It burrows into the ground to create its nest. If\nhard stones impede its tunneling, it uses its sharp\nclaws to shatter them and then carries on digging."
        fr:
          sword: "Il aime se rouler dans le sable des zones\ndésertiques pour se débarrasser des traces\nde terre et d’humidité qui lui collent à la peau."
          shield: "Il creuse le sol pour construire sa tanière.\nRien n’arrête ses griffes acérées, pas même\nla roche la plus solide."
        it:
          sword: "Ama rotolarsi nella sabbia delle zone desertiche,\nper rimuovere ogni traccia di sporcizia e umidità\ndal suo corpo."
          shield: "Scava nel terreno per costruire la sua tana,\nfrantumando anche le rocce più dure con\ni suoi artigli affilati."
        de:
          sword: "Es badet sehr gern im trockenen Sand. Dadurch\nbefreit es seinen Körper von Schmutz und\nFeuchtigkeit."
          shield: "Es gräbt sich seinen Bau im Erdboden. Stößt es\ndabei auf harte Steine, zerstört es diese mit\nseinen scharfen Krallen und gräbt unbeirrt weiter."
        es:
          sword: "Le gusta revolcarse por la arena seca para\neliminar todo rastro de suciedad y humedad\nen la piel."
          shield: "Excava madrigueras profundas en las que vive.\nParte con sus afiladas garras cualquier roca, por\ndura que sea, que le entorpezca el camino."
        ko:
          sword: "건조한 모래땅에서 모래를 끼얹는 것을\n좋아한다. 몸에 붙은 지저분한 것들을\n떨어뜨리고 물기를 없애는 것이다."
          shield: "땅을 파서 굴을 만든다.\n땅속의 단단한 바위도 날카로운\n발톱으로 부수며 파고들어 간다."
        zh_simp:
          sword: "喜欢在干燥的沙地上\n滚来滚去，借此去掉\n身上的脏东西和水分。"
          shield: "会在地上挖洞建造巢穴。\n挖洞时，即便遇到地里的坚硬岩石，\n也能用尖锐的爪子弄碎后继续挖进。"
        zh_trad:
          sword: "喜歡在乾燥的沙地上\n滾來滾去，藉此去掉\n身體上的髒污和水分。"
          shield: "會在地面挖洞築巢。\n即使遇到地下堅硬的岩石，\n也會用銳利的爪子擊碎並向前挖進。"
