lycanroc:
  species_id: 745
  names:
    jp_kana: ルガルガン
    jp_kanji: ルガルガン
    en: Lycanroc
    fr: Lougaroc
    it: Lycanroc
    de: Wolwerock
    es: Lycanroc
    ko: 루가루암
    zh_simp: 鬃岩狼人
    zh_trad: 鬃岩狼人
  forms:
    lycanroc_midday_form:
      form_id: 0
      names:
        jp_kana: まひるのすがた
        jp_kanji: まひるのすがた
        en: Midday Form
        fr: Forme Diurne
        it: Forma Giorno
        de: Tagform
        es: Forma Diurna
        ko: 한낮의 모습
        zh_simp: 白昼的样子
        zh_trad: 白晝的樣子
      base_stats:
        hp: 75
        attack: 115
        defense: 65
        special_attack: 55
        special_defense: 65
        speed: 112
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - rock
      egg_groups:
        - field
      abilities:
        - keen_eye
        - sand_rush
      hidden_ability: steadfast
      descriptions:
        jp_kana:
          sword: "れいせい　かつ　しんちょう。　\nたてがみの　いわの　きれあじは\nかみそりのように　するどい。"
          shield: "すばやい　うごきで　えものを\nじわじわ　おいつめる。　キバは\nつねに　きゅうしょを　ねらっている。"
        jp_kanji:
          sword: "冷静　かつ　慎重。\nたてがみの　岩の　切れ味は\n剃刀のように　鋭い。"
          shield: "素早い　動きで　獲物を\nじわじわ　追いつめる。　キバは\nつねに　急所を　狙っている。"
        en:
          sword: "This Lycanroc is calm and cautious. The rocks\njutting from its mane are razor sharp."
          shield: "With swift movements, this Pokémon gradually\nbacks its prey into a corner. Lycanroc’s fangs are\nalways aimed toward opponents’ weak spots."
        fr:
          sword: "C’est un Pokémon calme et prudent.\nLes pierres dans sa crinière sont aussi\ntranchantes que des lames de rasoir."
          shield: "Il poursuit ses proies avec rapidité et patience.\nUne fois la cible acculée, il attaque toujours\nson point faible avec ses crocs."
        it:
          sword: "È un Pokémon calmo e prudente. Le rocce della\nsua criniera sono affilate come lame di un rasoio."
          shield: "Intrappola gradualmente la preda avvicinandosi\ncon movimenti rapidi. Le sue zanne mirano dritto\nai punti vitali."
        de:
          sword: "Ein ruhiges Pokémon, das stets mit Bedacht\nvorgeht. Seine Steinmähne ist rasiermesserscharf."
          shield: "Es treibt seine Beute mit schnellen Bewegungen\ngeduldig in die Enge. Dann stürzt es sich mit den\nFangzähnen auf deren Schwachpunkt."
        es:
          sword: "Un Pokémon tranquilo y prudente. Su melena\nde piedra es tan afilada como una cuchilla."
          shield: "Va acorralando pacientemente a su presa con\nmovimientos raudos para finalmente clavarle\nlos colmillos en sus puntos vitales."
        ko:
          sword: "냉정하며 신중하다.\n갈기의 바위는 잘 드는\n면도날처럼 날카롭다."
          shield: "빠른 움직임으로 먹이를\n차츰차츰 궁지에 몰아넣는다.\n이빨은 항상 급소를 노리고 있다."
        zh_simp:
          sword: "既冷静又慎重。\n鬃毛里的岩石像\n剃刀那样锋利。"
          shield: "会用敏捷的动作将猎物\n一点一点逼入绝境。\n利齿总是瞄准着对方的要害。"
        zh_trad:
          sword: "個性既冷靜又慎重。\n鬃毛裡的岩石就像\n剃刀那樣鋒利。"
          shield: "會用敏捷的動作將獵物\n一步步地逼入絕境。\n尖牙總是瞄準著對方的要害。"
    lycanroc_midnight_form:
      form_id: 1
      names:
        jp_kana: まよなかのすがた
        jp_kanji: まよなかのすがた
        en: Midnight Form
        fr: Forme Nocturne
        it: Forma Notte
        de: Nachtform
        es: Forma Nocturna
        ko: 한밤중의 모습
        zh_simp: 黑夜的样子
        zh_trad: 黑夜的樣子
      base_stats:
        hp: 85
        attack: 115
        defense: 75
        special_attack: 55
        special_defense: 75
        speed: 82
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - rock
      egg_groups:
        - field
      abilities:
        - keen_eye
        - vital_spirit
      hidden_ability: no_guard
      descriptions:
        jp_kana:
          sword: "むこうみずな　せいしつ。　じぶんが\nきずつくことも　まるで　きにせず\nあいてに　むかって　おそいかかる。"
          shield: "てきが　つよいほど　ちが　たかぶる。\nひっさつの　ずつきは　きょだいな\nおおいわも　こなごなに　くだく。"
        jp_kanji:
          sword: "向こう見ずな　性質。　自分が\n傷つくことも　まるで　気にせず\n相手に　むかって　襲いかかる。"
          shield: "敵が　強いほど　血が　たかぶる。\n必殺の　頭突きは　巨大な　大岩も\nこなごなに　砕く。"
        en:
          sword: "This form of Lycanroc is reckless. It charges\nheadlong at its opponents, attacking without any\ncare about what injuries it might receive."
          shield: "It’s invigorated by powerful opponents—the\nstronger the better. A full-force headbutt from\none of these Lycanroc can shatter giant boulders."
        fr:
          sword: "Ce Pokémon impétueux se jette sur son ennemi\nsans se soucier des blessures qu’il pourrait subir."
          shield: "Plus son adversaire est fort, plus il est combatif.\nSon coup de tête meurtrier peut réduire un rocher\nimmense en poussière."
        it:
          sword: "Ha un’indole temeraria e si lancia sull’avversario\nsenza badare alle ferite che potrebbe subire."
          shield: "Più il suo nemico è forte, più gli ribolle il sangue.\nCon le sue testate micidiali può polverizzare\nmacigni giganteschi."
        de:
          sword: "Es ist von Natur aus draufgängerisch und stürzt\nsich unerschrocken auf seine Gegner, wobei es\nselbst Verletzungen in Kauf nimmt."
          shield: "Je stärker sein Gegner, desto mehr kommt es in\nFahrt. Sein vernichtender Kopfstoß kann selbst\nriesige Felsen pulverisieren."
        es:
          sword: "Su osadía y temeridad son tales que ataca a sus\nadversarios siempre de frente, sin importarle las\nheridas que pueda recibir."
          shield: "Cuanto más fuerte es su rival, más se crece.\nPuede reventar una roca enorme de un cabezazo."
        ko:
          sword: "무모한 성질을 지녔다. 자신이\n상처 입는 것도 전혀 신경 쓰지 않고\n상대를 향해 덤벼든다."
          shield: "적이 강할수록 피가 끓어오른다.\n필살기인 박치기는 거대한\n바위도 산산조각으로 부숴버린다."
        zh_simp:
          sword: "性格冒失莽撞。会猛烈地\n扑向对手发动攻击，\n就算自己受伤也毫不在乎。"
          shield: "面对的的敌人越强，内心就越兴奋。\n所使出的一击必杀的头锤\n甚至能把大石头都撞得粉碎。"
        zh_trad:
          sword: "生性魯莽衝動。\n會毫不猶豫地襲擊對手，\n完全不在乎自己會受傷。"
          shield: "對手越強大，牠就越熱血沸騰。\n一擊必殺的頭錘攻擊甚至能將\n巨大的岩石撞得粉碎。"
    lycanroc_dusk_form:
