      types:
        - electric
      egg_groups:
        - undiscovered
      abilities:
        - volt_absorb
      descriptions:
        jp_kana:
          sword: "カミナリに　ひってきする　スピードで\nはしり　だいでんあつを　はっする\nツメで　てきを　やつざきにする。"
          shield: "てあしの　にくきゅうから　ほうでん。\nゼラオラが　かけぬけると　イナズマが\nひかり　らいめいが　とどろく。"
        jp_kanji:
          sword: "雷に　匹敵する　スピードで\n走り　大電圧を　発する\nツメで　敵を　八つ裂きにする。"
          shield: "手足の　肉球から　放電。\nゼラオラが　駆け抜けると　稲妻が\n光り　雷鳴が　轟く。"
        en:
          sword: "It runs as fast as lightning strikes, shredding its\nopponents with its high-voltage claws."
          shield: "Electricity sparks from the pads on its limbs.\nWherever Zeraora runs, lightning flashes and\nthunder echoes."
        fr:
          sword: "Il fonce sur ses ennemis à la vitesse de l’éclair\net les déchiquette à l’aide de ses griffes chargées\nà haute tension."
          shield: "Il envoie des décharges électriques avec\nles coussinets de ses pattes. Quand il court,\non peut voir des éclairs et entendre la foudre."
        it:
          sword: "Dotato di una velocità fulminea, fa a pezzi\nl’avversario con i suoi artigli carichi di elettricità\nad alta tensione."
          shield: "Emette scariche elettriche dai cuscinetti delle\nzampe. Sfreccia a tutta velocità accompagnato\nda saette e rombi di tuono."
        de:
          sword: "Es läuft so schnell wie der Blitz und reißt Gegner\nmit seinen Krallen, die mit Hochspannung\ngeladen sind, in Stücke."
          shield: "Über die Ballen an seinen Pfoten entlädt es\nElektrizität. Wenn Zeraora an einem vorbeirennt,\nzuckt ein Blitz auf und man hört Donnergrollen."
        es:
          sword: "Tan veloz como el rayo, hace trizas a cualquier\nrival con sus garras cargadas de electricidad de\nalto voltaje."
          shield: "Las almohadillas de sus patas desprenden\ndescargas eléctricas. Cuando corre, hace que\ncaigan rayos y reverberen los truenos."
        ko:
          sword: "번개에 필적하는 스피드로\n달려나가 고전압의 발톱으로\n상대를 갈가리 찢는다."
          shield: "손발의 볼록살에서 전기를 내보낸다.\n제라오라가 달려나가면 번개가\n치고 우렛소리가 울려 퍼진다."
        zh_simp:
          sword: "以媲美闪电的速度奔跑，\n用能释放高压电的爪子\n将敌人撕得粉碎。"
          shield: "从手脚的肉球放电。\n当捷拉奥拉奔驰而过时，\n周围将充斥着电闪雷鸣，"
        zh_trad:
          sword: "以媲美閃電的速度奔跑，\n用能釋放高壓電的爪子\n將敵人撕得粉碎。"
          shield: "從手腳的肉球放電。\n當捷拉奧拉奔馳而過時，\n周圍將充斥著電閃雷鳴。"
meltan:
  species_id: 808
  names:
    jp_kana: メルタン
    jp_kanji: メルタン
    en: Meltan
    fr: Meltan
    it: Meltan
    de: Meltan
    es: Meltan
