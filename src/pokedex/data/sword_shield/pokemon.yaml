          sword: "ランターンのだす　ひかりは\n５０００メートルの　ふかさ　からでも\nすいめんまで　とどくほど　あかるい。"
          shield: "つよい　ひかりを　はなち　えものの\nめを　くらませる。　スキが　できたら\nでんげきを　おみまいする。"
        jp_kanji:
          sword: "ランターンのだす　光は\n５０００メートルの　深さ　からでも\n水面まで　届くほど　明るい。"
          shield: "強い　光を　放ち　獲物の\n目を　眩ませる。　隙が　できたら\n電撃を　おみまいする。"
        en:
          sword: "The light it emits is so bright that it can illuminate\nthe sea’s surface from a depth of over three miles."
          shield: "This Pokémon flashes a bright light that blinds\nits prey. This creates an opening for it to deliver\nan electrical attack."
        fr:
          sword: "Sa lumière est si intense qu’on peut la voir\nà la surface de l’eau alors qu’il se trouve\nà 5 000 mètres de profondeur."
          shield: "Il dégage une vive lumière pour éblouir ses proies,\npuis leur inflige un choc électrique bien senti."
        it:
          sword: "Emette una luce così intensa da illuminare la\nsuperficie del mare da oltre 5 km di profondità."
          shield: "Acceca la preda con una luce intensa per poi\nattaccarla immediatamente con una scossa\nelettrica."
        de:
          sword: "Sein Licht ist so hell, dass es selbst aus 5 000 m\nTiefe an die Meeresoberfläche dringt."
          shield: "Es blendet seine Beute mit einem grellen Licht.\nSieht es eine Chance zuzuschlagen, greift es sie\nmit Elektrizität an."
        es:
          sword: "La luz que emite es tan brillante que puede\niluminar la superficie del mar desde unos 5 km\nde profundidad."
          shield: "Ciega a sus presas con una luz intensa. Si tiene la\nocasión, les propina una descarga eléctrica."
        ko:
          sword: "랜턴이 내는 빛은\n5000m의 깊이에서도\n수면까지 전해질 정도로 밝다."
          shield: "강한 빛을 발산해\n먹이의 눈을 멀게 한다.\n허점을 보이면 전격을 먹인다."
        zh_simp:
          sword: "电灯怪发出的光有着极高的\n亮度，甚至可以从５０００米\n深的水底照亮水面。"
          shield: "发出强光蒙住猎物的眼睛。\n抓住那一瞬间的空档，\n使其遭受电的攻击。"
        zh_trad:
          sword: "電燈怪發出的光有著極高的\n亮度，甚至可以從５０００公尺\n深的水底照亮水面。"
          shield: "發出強光讓獵物暫時失明。\n趁獵物露出破綻時，\n用電擊招呼對手。"
