      descriptions:
        jp_kana:
          sword: "ようせいの　なかまで　めったに\nひとまえに　でてこない。　けはいを\nかんじて　すぐ　にげてしまうようだ。"
          shield: "１キロさきに　おちた　はりの　おとも\nきこえるほど　みみが　いいので\nふだんは　しずかな　ところに　いる。"
        jp_kanji:
          sword: "妖精の　仲間で　めったに\n人前に　出てこない。　気配を\n感じて　すぐに　逃げてしまうようだ。"
          shield: "１キロ先に　落ちた　針の　音も\n聞こえるほど　耳が　いいので\nふだんは　静かな　ところに　いる。"
        en:
          sword: "A timid fairy Pokémon that is rarely seen, it will\nrun and hide the moment it senses people."
          shield: "Their ears are sensitive enough to hear a pin\ndrop from over a mile away, so they’re usually\nfound in quiet places."
        fr:
          sword: "Ce Pokémon s’apparente à une petite fée\nqui n’apparaît que rarement devant les humains.\nIl court se cacher dès qu’il ressent une présence."
          shield: "Capable d’entendre une aiguille tomber à plus\nd’un kilomètre, ce Pokémon préfère les endroits\ncalmes et isolés."
        it:
          sword: "Timido Pokémon Fata, molto raro a vedersi.\nScappa e si nasconde non appena avverte\nla presenza delle persone."
          shield: "Il loro udito è così acuto che sentono un ago\ncadere a 1 km di distanza. Per questo di solito\nvivono in luoghi molto silenziosi."
        de:
          sword: "Ein feenhaftes und scheues Pokémon,\ndas sofort die Flucht ergreift, wenn es\nMenschen wahrnimmt."
          shield: "Ihr Gehör erfasst das Geräusch einer fallenden\nNadel noch aus 1 km Entfernung. Sie bevorzugen\ndaher ruhige Orte."
        es:
          sword: "Este Pokémon de aspecto feérico, raramente\nvisto por los humanos, corre a esconderse en\ncuanto detecta que hay alguien cerca."
          shield: "Su oído es tan fino que puede percibir cómo cae\nuna aguja a 1 km de distancia. Por eso suele\nhabitar en lugares tranquilos."
        ko:
          sword: "요정의 동료로 좀처럼\n사람 앞에 나타나지 않는다. 기척을\n느끼면 바로 도망가는 듯하다."
          shield: "1km 앞에 떨어진 바늘 소리가\n들릴 정도로 귀가 좋아\n평소에는 조용한 곳에서 지낸다."
        zh_simp:
          sword: "妖精的一种，极少出现在人前。\n察觉到有人存在后，\n好像就会立刻逃走。"
          shield: "听觉灵敏，连１公里以外\n针落地的声音都听得见，\n因此平时会待在安静的地方。"
        zh_trad:
          sword: "妖精的一種。極少出現在\n人類面前。一感覺到有人\n就會立刻逃走。"
          shield: "聽覺靈敏，連１公里以外\n針落地的聲音都聽得見，\n因此平時會待在安靜的地方。"
vulpix:
  species_id: 37
