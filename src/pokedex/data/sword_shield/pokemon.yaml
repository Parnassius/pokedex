          shield: "たずねれば　どんな　なんだいでも\nかいけつしてくれるが　ヤドキングの\nことばは　だれも　りかいできない。"
        jp_kanji:
          sword: "シェルダーの　毒素が　ヤドンの\n脳みそを　駆けめぐり　奇跡的に\n秘めた　知能を　覚醒させた。"
          shield: "尋ねれば　どんな　難題でも\n解決してくれるが　ヤドキングの\n言葉は　だれも　理解できない。"
        en:
          sword: "Miraculously, this former Slowpoke’s latent\nintelligence was drawn out when Shellder poison\nraced through its brain."
          shield: "Slowking can solve any problem presented to it,\nbut no one can understand a thing Slowking says."
        fr:
          sword: "Les toxines du Kokiyas ont imprégné le cerveau\ndu Ramoloss, réveillant en lui une intelligence\ninsoupçonnée, comme par miracle."
          shield: "Il est capable de résoudre tous les problèmes\nqu’on lui présente, mais personne ne parvient\nà comprendre ce qu’il dit."
        it:
          sword: "Le tossine secrete da Shellder sono entrate in\ncircolo nel cervello di Slowpoke con il prodigioso\nrisultato di risvegliare capacità intellettive latenti."
          shield: "È in grado di risolvere qualsiasi problema\ngli venga sottoposto, ma nessuno riesce a\ncomprendere le sue parole."
        de:
          sword: "Das Gift von Muschas drang in Flegmons Gehirn\nein und erweckte dabei wie durch ein Wunder\nbisher verborgene Intelligenz in ihm."
          shield: "Bittet man es darum, löst es jedes noch so\nschwere Problem für einen. Jedoch ist niemand in\nder Lage, Laschokings Sprache zu verstehen."
        es:
          sword: "Las toxinas del Shellder impregnaron el cerebro\ndel anfitrión y despertaron el increíble intelecto\noculto que poseía Slowpoke."
          shield: "Es capaz de dar respuesta a cualquier cuestión\nque se le formule, pero, por desgracia, nadie\nlogra descifrar una sola palabra de lo que dice."
        ko:
          sword: "셀러의 독소가 야돈의\n뇌를 돌아다니면서 숨겨진 지능을\n기적적으로 각성시켰다."
          shield: "아무리 어려운 문제를 물어봐도\n모두 해결해주지만\n그 누구도 야도킹의 말을 이해하지 못한다."
        zh_simp:
          sword: "大舌贝的毒素流遍了\n呆呆兽的脑子，奇迹般地\n唤醒了它潜在的智慧。"
          shield: "虽然无论向呆呆王提出\n什么难题它都会帮忙解决，\n但是谁都无法理解它的语言。"
        zh_trad:
          sword: "大舌貝的毒素竄遍了\n呆呆獸的大腦，奇蹟似地\n使牠潛藏的智能覺醒了。"
          shield: "只要開口提問，任何難題\n牠都會幫忙解開，但是無人\n能夠理解呆呆王的語言。"
    slowking_galarian_form:
      form_id: 1
      names:
        jp_kana: ガラルのすがた
        jp_kanji: ガラルのすがた
        en: Galarian Form
        fr: Forme de Galar
        it: Forma di Galar
        de: Galar-Form
        es: Forma de Galar
        ko: 가라르의 모습
        zh_simp: 伽勒尔的样子
        zh_trad: 伽勒爾的樣子
      base_stats:
        hp: 95
        attack: 65
        defense: 80
        special_attack: 110
        special_defense: 110
        speed: 30
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 2
        speed: 0
      types:
        - poison
        - psychic
      egg_groups:
        - monster
        - water_1
      abilities:
        - curious_medicine
        - own_tempo
      hidden_ability: regenerator
      descriptions:
        jp_kana:
          sword: "しんかの　ショックと　どくそによって\nシェルダーの　ちのうが　あがりまくり\nヤドキングを　あやつるようになった。"
          shield: "あやしげな　じゅもんを　となえながら\nたべた　ものと　たいないの　どくそを\nまぜて　あやしい　くすりを　つくる。"
        jp_kanji:
          sword: "進化の　ショックと　毒素によって\nシェルダーの　知能が　上がりまくり\nヤドキングを　操るようになった。"
          shield: "妖しげな　呪文を　唱えながら\n食べた　ものと　体内の　毒素を\n混ぜて　怪しい　薬を　作る。"
        en:
          sword: "A combination of toxins and the shock of\nevolving has increased Shellder’s intelligence to\nthe point that Shellder now controls Slowking."
          shield: "While chanting strange spells, this Pokémon\ncombines its internal toxins with what it’s eaten,\ncreating strange potions."
        fr:
          sword: "Le choc de l’évolution et les toxines ont décuplé\nl’intelligence du Kokiyas, si bien qu’il contrôle\ndésormais le Roigada qu’il parasite."
          shield: "Il mélange ce qu’il ingère aux toxines produites\npar son corps, tout en récitant de mystérieuses\nincantations, afin de créer un étrange breuvage."
        it:
          sword: "Lo shock dell’evoluzione e le tossine hanno\nfavorito lo sviluppo dell’intelletto di Shellder,\nche ora è in grado di manipolare Slowking."
          shield: "Produce un misterioso farmaco miscelando ciò\nche ingerisce con le tossine nel suo corpo mentre\nrecita un sinistro sortilegio."
        de:
          sword: "Durch das Gift und den Schock der Entwicklung\nwurde Muschas’ Verstand immer schärfer, bis es\nLaschoking schließlich vollends kontrollierte."
          shield: "Es murmelt unheimliche Beschwörungen, während\nes seinen Mageninhalt mit körpereigenen Toxinen\nmischt, um eine sonderbare Arznei herzustellen."
        es:
          sword: "Debido al impacto de la evolución y las toxinas,\nel intelecto del Shellder ha aumentado hasta el\npunto de controlar totalmente al Slowking."
          shield: "Fabrica un extraño brebaje mezclando lo que\ningiere con sus propias toxinas mientras recita\nun ominoso encantamiento."
        ko:
          sword: "진화의 충격과 독소에 의해\n셀러의 지능이 크게 높아져서\n야도킹을 조종하게 되었다."
          shield: "괴상한 주문을 외면서\n먹은 것과 체내의 독소를 섞어\n괴상한 약을 만든다."
        zh_simp:
          sword: "受到进化的冲击和毒素的影响，\n大舌贝的智力飙升到了\n可以控制呆呆王的程度。"
          shield: "会一边咏唱诡异的咒语，\n一边混合吃掉的东西和\n体内的毒素来制造可疑的药。"
        zh_trad:
          sword: "受到進化的衝擊和毒素的影響，\n大舌貝的智力飆升到了\n可以控制呆呆王的程度。"
          shield: "會一邊吟唱詭怪的咒語，\n一邊混合吃進的東西和\n體內的毒素來製造可疑的藥。"
wobbuffet:
  species_id: 202
