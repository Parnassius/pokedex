          shield: "０．１びょうで　やばねを　つばさの\nつるに　つがえて　はなつ。　あいてが\nきづくまえに　きゅうしょを　いぬく。"
        jp_kanji:
          sword: "翼に　仕込まれた　矢羽根を\n弓矢のように　つがえて　放つ。\n狙った　的は　外さない。"
          shield: "０．１秒で　矢羽根を　翼の\n蔓に　つがえて　放つ。　相手が\n気づく前に　急所を　射貫く。"
        en:
          sword: "As if wielding a bow, it launches the arrow quills\nhidden among the feathers of its wings.\nDecidueye’s shots never miss."
          shield: "In a tenth of a second, it can nock and fire an\narrow quill, piercing an opponent’s weak point\nbefore they notice what’s happening."
        fr:
          sword: "Il décoche les plumes acérées de ses ailes\ncomme des flèches. Il ne rate jamais sa cible."
          shield: "Il décoche ses plumes acérées en un dixième\nde seconde. Sa victime n’a pas le temps de\nle voir agir qu’elle est déjà grièvement touchée."
        it:
          sword: "Scocca piume dalle sue ali come fossero frecce\nlanciate da un arco. Una volta presa la mira,\nnon manca mai il bersaglio."
          shield: "Può preparare e scoccare una delle sue piume\naffilate in 0,1 secondi. Trafigge l’avversario\nnei suoi punti vitali prima che se ne accorga."
        de:
          sword: "Dieses Pokémon kann die Federn seiner Flügel\nwie Pfeile abschießen. Hat es sein Ziel angepeilt,\ntrifft es garantiert."
          shield: "In 0,1 Sekunden spannt es eine Feder in seine\nFlügelranke und schießt sie wie einen Pfeil auf\ndie Schwachstellen seines ahnungslosen Ziels."
        es:
          sword: "Usa sus plumas como flechas para atacar a los\nrivales. Una vez que ha fijado el blanco, no falla\njamás."
          shield: "Tan solo le lleva una décima de segundo sacar\nuna pluma y disparar al rival, a quien acierta en\nun punto vital antes de que pueda darse cuenta."
        ko:
          sword: "날개에 숨겨진 살깃을\n활과 화살처럼 이용해서 쏜다.\n노린 표적은 빗나가지 않는다."
          shield: "0.1초 만에 화살깃을 날개에 달린\n시위에 메겨 발사한다. 상대가\n알아차리기 전에 급소를 꿰뚫어버린다."
        zh_simp:
          sword: "会像射箭那样射出\n藏在自己翅膀里的箭羽。\n只要瞄准目标就绝不会射偏。"
          shield: "只要０.１秒就可以在翅膀的\n藤蔓上搭好箭羽、射向敌人，\n并在敌人发现前贯穿其要害。"
        zh_trad:
          sword: "會像射箭那樣射出\n藏在自己翅膀裡的箭羽。\n只要瞄準目標就絕不會射偏。"
          shield: "只要０.１秒就可以在翅膀的\n藤蔓上搭好箭羽、射向敵人，\n並在敵人發現前貫穿其要害。"
litten:
