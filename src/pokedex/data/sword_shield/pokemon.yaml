      descriptions:
        jp_kana:
          sword: "とくしゅな　つくりの　りょうめは\nわずかな　ひかりさえ　あれば\nくらやみでも　ひるのように　みえる。"
          shield: "ものごとを　かんがえだすと\nくびを　１８０ど　かいてん　させて\nあたまの　はたらきを　たかめる。"
        jp_kanji:
          sword: "特殊な　つくりの　両目は\nわずかな　光さえ　あれば\n暗闇でも　昼のように　見える。"
          shield: "ものごとを　考えだすと\n首を　１８０度　回転　させて\n頭の　働きを　高める。"
        en:
          sword: "Its eyes are specially developed to enable it to\nsee clearly even in murky darkness and minimal light."
          shield: "When it needs to think, it rotates its head\n180 degrees to sharpen its intellectual power."
        fr:
          sword: "Ses yeux à la structure particulière sont capables\nde voir comme en plein jour même quand il fait\ntrès sombre."
          shield: "Quand il réfléchit, il tourne sa tête sur 180 degrés\npour optimiser son mode de pensée."
        it:
          sword: "Grazie alla speciale struttura dei suoi occhi,\ngli basta la luce più fioca per vedere anche\nnell’oscurità come fosse pieno giorno."
          shield: "Quando pensa ruota la testa di 180 gradi\nper potenziare le sue capacità intellettive."
        de:
          sword: "Seine Augen sind so gut entwickelt, dass es selbst\nin fast kompletter Dunkelheit so klar sehen kann,\nals wäre es Tag."
          shield: "Muss es nachdenken, dreht es seinen Kopf um\n180 Grad, um so seinen Intellekt zu schärfen."
        es:
          sword: "Tiene los ojos muy desarrollados y puede ver con\nincreíble claridad en la oscuridad más absoluta."
          shield: "Cuando necesita pensar, gira la cabeza 180°\npara agudizar su capacidad intelectual."
        ko:
          sword: "특수한 구조의 두 눈은\n약간의 빛만 있으면\n어둠 속에서도 낮처럼 볼 수 있다."
          shield: "무언가를 생각하기 시작하면\n목을 180도 회전시켜\n두뇌 회전을 높인다."
        zh_simp:
          sword: "双眼有着特殊的构造，只要有\n些微的光线，即使在黑暗中\n也能看得像白天一样清楚。"
          shield: "开始思考事情时，\n会将脖子旋转１８０度，\n以此提高大脑的工作效率。"
        zh_trad:
          sword: "雙眼有著特殊的構造，只要有\n些微的光線，即使在黑暗中\n也能看得像白天一樣清楚。"
          shield: "開始思考事情時，\n會將脖子旋轉１８０度，\n提高大腦的工作效率。"
crobat:
  species_id: 169
  names:
    jp_kana: クロバット
    jp_kanji: クロバット
    en: Crobat
    fr: Nostenfer
