          sword: "Volcarona scatters burning scales. Some say it\ndoes this to start fires. Others say it’s trying to\nrescue those that suffer in the cold."
          shield: "This Pokémon emerges from a cocoon formed of\nraging flames. Ancient murals depict Volcarona as\na deity of fire."
