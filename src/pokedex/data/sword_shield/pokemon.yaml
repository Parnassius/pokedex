      descriptions:
        jp_kana:
          sword: "ふかふかの　たいもうで　さむさに\nつよくなり　さらに　こうおんの\nほのおわざを　だせるようになった。"
          shield: "てを　つかわずに　きの　えだから\nきのみを　つみとり　リフティング。\nあしわざを　みがく　れんしゅう。"
        jp_kanji:
          sword: "ふかふかの　体毛で　寒さに\n強くなり　さらに　高温の\n炎技を　出せるようになった。"
          shield: "手を　使わずに　木の　枝から\n木の実を　摘み取り　リフティング。\n足技を　磨く　練習。"
        en:
          sword: "Its thick and fluffy fur protects it from the cold\nand enables it to use hotter fire moves."
          shield: "It kicks berries right off the branches of trees\nand then juggles them with its feet, practicing\nits footwork."
        fr:
          sword: "Son pelage épais lui permet de mieux résister\nau froid et d’augmenter la température\nde ses capacités Feu."
          shield: "Pour parfaire son jeu de jambes,\nil cueille des Baies puis drible avec,\nle tout sans se servir de ses mains."
        it:
          sword: "Grazie alla folta pelliccia resiste al freddo\ned è in grado di sferrare mosse infuocate\na temperature ancora più alte."
          shield: "Per perfezionare i suoi calci, si esercita\nprendendo le bacche dai rami degli alberi\ne palleggiando senza usare le mani."
        de:
          sword: "Sein flauschiges Fell schützt es vor Kälte und\nermöglicht es ihm, noch heißere Feuer-Attacken\nauszuteilen."
          shield: "Es pflückt Beeren von Ästen, ohne seine Hände\nzu benutzen, und jongliert sie mit den Füßen.\nDamit trainiert es seine Fußfertigkeiten."
        es:
          sword: "Su suave pelaje lo protege del frío y le permite\nincrementar todavía más la temperatura de sus\nmovimientos de tipo Fuego."
          shield: "Para mejorar su habilidad con los pies, toma\nbayas de las ramas de los árboles sin usar las\nmanos y juega a darles toques."
        ko:
          sword: "푹신푹신한 털 덕분에 추위에\n강해지고 더 높은 온도의\n불꽃 기술도 쓸 수 있게 되었다."
          shield: "손을 쓰지 않고 나뭇가지에서\n나무열매를 따내고 리프팅한다.\n발 기술을 연마하는 연습이다."
        zh_simp:
          sword: "蓬松的体毛帮助它增强了抵御\n寒冷的能力，也使它能够使出\n温度更高的火属性招式。"
          shield: "会用脚把树果从树木上\n踢落，用来练习颠球，\n借此锻炼自己的脚法。"
        zh_trad:
          sword: "蓬鬆的體毛幫助牠增強了抵禦\n寒冷的能力，也使牠能夠使出\n溫度更高的火屬性招式。"
          shield: "會用腳把樹果從樹木上\n踢落，用來練習挑球，\n藉此鍛鍊自己的腳法。"
cinderace:
