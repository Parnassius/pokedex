      descriptions:
        jp_kana:
          sword: "とくべつな　きりかぶの　パワーを\nドラミングで　コントロール。\nねっこを　あやつって　たたかう。"
          shield: "ドラムテクニックに　すぐれた　ものが\nボスになる。　おだやかな　きしょうで\nグループの　ちょうわを　おもんじる。"
        jp_kanji:
          sword: "特別な　切り株の　パワーを\nドラミングで　コントロール。\n根っこを　操って　戦う。"
          shield: "ドラムテクニックに　優れた　ものが\nボスになる。　穏やかな　気性で\nグループの　調和を　重んじる。"
        en:
          sword: "By drumming, it taps into the power of its special\ntree stump. The roots of the stump follow its\ndirection in battle."
          shield: "The one with the best drumming techniques\nbecomes the boss of the troop. It has a gentle\ndisposition and values harmony among its group."
        fr:
          sword: "Il contrôle le pouvoir de sa souche singulière\nen tapant en rythme dessus.\nIl se bat en manipulant des racines."
          shield: "Celui qui possède les meilleures techniques\nde percussion devient le chef. De nature calme,\nil privilégie l’harmonie du groupe."
        it:
          sword: "Controlla il potere del suo ceppo speciale\nusandolo come un tamburo e lotta servendosi\ndelle radici."
          shield: "Colui che ha una migliore tecnica di percussione\ndiventa il capo. Ha un carattere tranquillo e\ndà molta importanza all’armonia del gruppo."
        de:
          sword: "Es kontrolliert die Macht seines speziellen\nBaumstumpfes durch Trommeln. Im Kampf\nmanipuliert es damit Wurzeln."
          shield: "Wer die beste Trommeltechnik hat, wird zum\nAnführer. Da es ein ruhiges Gemüt hat, legt es\nviel Wert auf Harmonie in der Gruppe."
        es:
          sword: "Controla los poderes y las raíces de su singular\ntocón en combate golpeándolo como si fuera\nun tambor."
          shield: "El percusionista con la técnica más depurada se\nconvierte en líder. Son de carácter tranquilo y\ndan mucha importancia a la armonía del grupo."
        ko:
          sword: "특별한 그루터기의 파워를\n드럼 연주로 컨트롤한다.\n뿌리를 조종해서 싸운다."
          shield: "드럼 테크닉이 가장 뛰어난 자가\n보스가 된다. 천성이 온화해서\n그룹의 조화를 중히 여긴다."
        zh_simp:
          sword: "能够通过打鼓来控制\n特别的树桩中的力量，\n操纵树根进行战斗。"
          shield: "打鼓技巧最高超的那一只\n会成为首领。性情温和，\n重视族群的和谐相处。"
        zh_trad:
          sword: "能夠透過打鼓來控制\n特別的樹樁中的力量，\n操縱樹根進行戰鬥。"
          shield: "打鼓技巧最高超的那一隻\n會成為首領。性情溫和，\n重視族群的和諧相處。"
  gmax_forms:
    rillaboom_gigantamax:
      form_id: 999
      names:
        jp_kana: キョダイマックス
        jp_kanji: キョダイマックス
        en: Gigantamax
        fr: Gigamax
        it: Gigamax
        de: Gigadynamax
        es: Gigamax
        ko: 거다이맥스
        zh_simp: 超极巨化
        zh_trad: 超極巨化
      descriptions:
        jp_kana:
          sword: "キョダイマックスの　パワーによって\nきりかぶは　せいちょうして　まるで\nしんりんのような　ドラムに　なった。"
          shield: "ゴリランダーは　もりのドラムと\nひとつとなり　ガラルぜんどを　ゆらす\nドラムビートを　きざみつづける。"
        jp_kanji:
          sword: "キョダイマックスの　パワーによって\n切り株は　成長して　まるで\n森林のような　ドラムに　なった。"
          shield: "ゴリランダーは　森のドラムと\nひとつとなり　ガラル全土を　揺らす\nドラムビートを　刻みつづける。"
        en:
          sword: "Gigantamax energy has caused Rillaboom’s\nstump to grow into a drum set that resembles\na forest."
          shield: "Rillaboom has become one with its forest of\ndrums and continues to lay down beats that\nshake all of Galar."
        fr:
          sword: "Grâce au pouvoir du Gigamax, sa souche\ns’est développée pour devenir une véritable\nforêt d’instruments de percussion."
          shield: "Ne faisant plus qu’un avec sa forêt d’instruments\nde percussion, Gorythmic joue sans s’arrêter et\nses battements font vibrer tout Galar."
        it:
          sword: "Grazie al potere del Gigamax, il ceppo che\nusa come batteria è cresciuto a tal punto\nda diventare una foresta."
          shield: "Rillaboom diventa tutt’uno con la sua foresta\ndi tamburi, scandendo un ritmo che scuote\nl’intera Galar."
        de:
          sword: "Durch die Gigadynamax-Energie ist sein\nBaumstumpf zu einem waldähnlichen Schlagzeug\nangewachsen."
          shield: "Gortrom ist eins mit seinem Waldschlagzeug\ngeworden und versetzt nun rhythmisch trommelnd\nganz Galar in Bewegung."
        es:
          sword: "La energía del fenómeno Gigamax ha hecho\ncrecer el tocón hasta convertirlo en una especie\nde batería forestal."
          shield: "Tras fusionarse con su batería forestal, Rillaboom\nmarca ritmos atronadores que sacuden la región\nde Galar entera."
        ko:
          sword: "거다이맥스의 파워에 의해\n그루터기가 성장하여\n삼림과도 같은 드럼이 되었다."
          shield: "고릴타는 숲의 드럼과 하나가\n되어 가라르 전 지역을 뒤흔드는\n드럼 비트를 만들어 낸다."
        zh_simp:
          sword: "超极巨化之力使它的\n树桩急速成长，变成了\n仿佛森林一样的鼓。"
          shield: "轰擂金刚猩会与森林之鼓\n合而为一，不断击打出能\n撼动伽勒尔全境的节拍。"
        zh_trad:
          sword: "超極巨化的力量讓牠的\n樹樁急速生長，變成\n一套猶如森林的鼓。"
          shield: "轟擂金剛猩會與森林之鼓\n合而為一，不斷地擊打出\n震撼伽勒爾全境的節奏。"
scorbunny:
