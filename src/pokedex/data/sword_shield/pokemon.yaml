      descriptions:
        jp_kana:
          sword: "きれいな　うみや　みずうみに　すむ。\nてんこうを　あやつる　ちからで\nかぜに　のり　そらへと　のぼる。"
          shield: "しっぽの　たまに　ちからを　あつめて\nてんこうを　あやつる。　オーラを\nまとう　すがたは　しんぴてき。"
        jp_kanji:
          sword: "きれいな　海や　湖に　棲む。\n天候を　操る　力で\n風に　乗り　空へと　昇る。"
          shield: "尻尾の　玉に　力を　集めて\n天候を　操る。\nオーラを　まとう　姿は　神秘的。"
        en:
          sword: "This Pokémon lives in pristine oceans and lakes.\nIt can control the weather, and it uses this power\nto fly into the sky, riding on the wind."
          shield: "This Pokémon gathers power in the orbs on its\ntail and controls the weather. When enshrouded\nby an aura, Dragonair has a mystical appearance."
        fr:
          sword: "Il vit dans les mers et les lacs aux eaux claires.\nSa maîtrise de la météo lui permet de s’élever\ndans le ciel en se laissant porter par le vent."
          shield: "Il contrôle la météo en accumulant de l’énergie\ndans les orbes au bout de sa queue. Sa silhouette\nnimbée d’une aura lui confère un air mystique."
        it:
          sword: "Vive in mari e laghi dalle acque limpide.\nGrazie alla sua capacità di controllare il clima,\nsfrutta il vento per spiccare il volo."
          shield: "Accumula energia nelle sfere che ha sulla coda\ne controlla le condizioni atmosferiche. Avvolto\ndalla sua aura ha un aspetto misterioso."
        de:
          sword: "Dragonir lebt in klaren Meeren und Seen.\nMit seiner Gabe, das Wetter zu beeinflussen,\nschwingt es sich auf dem Wind in den Himmel."
          shield: "Mit der Kraft, die es in den Bällen an seinem\nSchweif sammelt, beeinflusst es das Wetter. Seine\nin eine Aura gehüllte Gestalt steckt voller Mystik."
        es:
          sword: "Vive en lagos y mares de aguas cristalinas. Su\npoder para controlar el clima le permite alzar el\nvuelo llevado por el viento."
          shield: "Acumula energía en las esferas de la cola para\ncontrolar el clima. La sutil aura que lo rodea le\nconfiere un aspecto misterioso y místico."
        ko:
          sword: "깨끗한 바다나 호수에 산다.\n날씨를 조종하는 힘으로\n바람을 타고 하늘로 오른다."
          shield: "꼬리의 구슬에 힘을 모아\n날씨를 조종한다. 오라에\n둘러싸인 모습은 신비롭다."
        zh_simp:
          sword: "栖息在美丽的大海或湖泊。\n可以通过操纵天气的力量\n驾风升上天空。"
          shield: "把力量集中在尾巴的\n珠子上操纵天气。\n散发气场的样子非常神秘。"
        zh_trad:
          sword: "棲息在清澈的海洋或湖泊。\n能利用操縱天氣的力量，\n乘著風升上天空。"
          shield: "能將力量集中在尾巴的珠子，\n藉此操縱天氣。全身散發著\n氣場的樣子非常神秘。"
