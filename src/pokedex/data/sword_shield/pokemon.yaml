      held_items:
        rare: light_ball
      descriptions:
        jp_kana:
          sword: "かぶっているのは　パートナーの\nぼうし。　さまざまな　ちほうの\nおもいでが　たくさん　つまっている。"
          shield: "あいぼうの　ぼうしを　かぶっている。\nたくさんの　ちほうを　いっしょに\nぼうけんした　あかしだ。"
        jp_kanji:
          sword: "かぶっているのは　パートナーの\n帽子。　さまざまな　地方の\n思い出が　たくさん　詰まっている。"
          shield: "相棒の　帽子を　かぶっている。\nたくさんの　地方を　いっしょに\n冒険した　あかしだ。"
        en:
          sword: "This Pikachu wears its partner’s cap, which is\nbrimming with memories of traveling through\nmany different regions."
          shield: "This Pikachu is wearing its Trainer’s cap.\nThe cap is proof that the two traveled\nacross many regions together."
        fr:
          sword: "Il porte la casquette de son partenaire.\nElle lui rappelle leurs aventures dans\nles nombreuses régions qu’ils ont traversées."
          shield: "Un Pikachu qui porte la casquette\nde son partenaire en souvenir des nombreuses\nrégions qu’ils ont traversées ensemble."
        it:
          sword: "Indossa il cappello del suo inseparabile amico.\nGli ricorda le avventure vissute durante i loro\nviaggi in varie regioni."
          shield: "Indossa il cappello del suo amato Allenatore\nin ricordo delle avventure vissute durante i loro\nviaggi in varie regioni."
        de:
          sword: "Die Kappe, die es trägt, gehört seinem Partner.\nSie steckt voller Erinnerungen an ihre Abenteuer\nin den verschiedensten Regionen."
          shield: "Es trägt die Kappe seines Partners. Sie zeugt\ndavon, dass sie in vielen Regionen zusammen\nAbenteuer erlebt haben."
        es:
          sword: "La gorra que lleva pertenece a su compañero\ny le trae gratos recuerdos de sus viajes por\nmultitud de regiones."
          shield: "Lleva puesta la gorra de su compañero, recuerdo\nde las innumerables aventuras que vivieron en\nmultitud de regiones."
        ko:
          sword: "쓰고 있는 것은 파트너의\n모자다. 여러 지방에서의\n추억이 가득 담겨 있다."
