      types:
        - dragon
        - ground
      egg_groups:
        - monster
        - dragon
      abilities:
        - sand_veil
      hidden_ability: rough_skin
      descriptions:
        jp_kana:
          sword: "かざんせいの　やまに　すみつく。\nジェットきに　まけない　はやさで\nそらを　とび　えものを　かりまくる。"
          shield: "ちじょうでも　うごきは　すばやく\nゆきやまで　からだが　ひえきるまえに\nえものを　しとめ　すみかに　もどる。"
        jp_kanji:
          sword: "火山性の　山に　すみつく。\nジェット機に　負けない　速さで\n空を　飛び　獲物を　狩りまくる。"
          shield: "地上でも　動きは　素早く\n雪山で　体が　冷えきるまえに\n獲物を　しとめ　すみかに　戻る。"
        en:
          sword: "Garchomp makes its home in volcanic mountains.\nIt flies through the sky as fast as a jet airplane,\nhunting down as much prey as it can."
          shield: "Garchomp is fast both underground and above.\nIt can bring down prey and return to its den\nbefore its body has chilled from being outside."
        fr:
          sword: "Vivant dans les massifs volcaniques, ce Pokémon\nchasse ses proies dans le ciel en volant aussi vite\nqu’un avion à réaction."
          shield: "Ce Pokémon très rapide même au sol capture\nses proies sur les monts enneigés et rentre vite\ndans son antre avant que son corps ne gèle."
        it:
          sword: "Vive in montagne di origine vulcanica. Caccia\nle prede solcando i cieli alla velocità di un jet."
          shield: "È veloce anche a terra. È in grado di abbattere\nle prede tra le montagne innevate e tornare\nnella sua tana prima di congelarsi."
        de:
          sword: "Knackrack lebt in vulkanischen Gebirgen. Es fliegt\nso schnell wie ein Jet durch die Lüfte und macht\ndabei unentwegt Jagd auf Beute."
          shield: "Auch am Boden bewegt es sich schnell. Es kann\nim verschneiten Gebirge Beute erlegen und in\nsein Nest bringen, bevor sein Körper auskühlt."
        es:
          sword: "Habita en montañas de origen volcánico. Vuela\ntan rápido como un avión a reacción en busca de\npresas."
          shield: "Se mueve a gran velocidad incluso por tierra. Es\ncapaz de cazar una presa en una montaña nevada\ny volver a su guarida sin llegar a pasar frío."
        ko:
          sword: "화산이 있는 산에 서식한다.\n제트기에도 지지 않는 속도로\n하늘을 날아 먹이를 사냥한다."
          shield: "지상에서도 움직임이 빠르다.\n설산에서는 체온이 떨어지기 전에\n먹이를 잡아 거처로 돌아간다."
        zh_simp:
          sword: "在火山区的山上栖息。\n会以不输给喷气式飞机的\n速度飞到天空中寻找猎物。"
          shield: "身手在陆地上也很矫捷，\n在雪山上会赶在身体冻僵前\n干掉猎物并返回住处。"
        zh_trad:
          sword: "棲息在火山區的山中。會以\n不遜於噴射戰鬥機的速度在\n天空飛行，盡情地獵取獵物。"
          shield: "在陸地上也能迅速行動。\n會在身體被寒冷的雪山凍僵\n之前了結獵物並返回住處。"
