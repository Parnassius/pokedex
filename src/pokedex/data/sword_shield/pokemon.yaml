      descriptions:
        jp_kana:
          sword: "つよくて　コシの　ある　たいもう。\nぬけげで　つくられた　シェービング\nブラシは　ちょうこうきゅうひん。"
          shield: "バツグンの　しゅんぱつりょくと\nするどいツメで　エモノを　しとめる。\nまがった　みちを　はしるのは　ヘタ。"
        jp_kanji:
          sword: "強くて　コシの　ある　体毛。\n抜け毛で　作られた　シェービング\nブラシは　超高級品。"
          shield: "抜群の　瞬発力と\nするどいツメで　獲物を　しとめる。\n曲がった　道を　走るのは　下手。"
        en:
          sword: "Its fur is strong and supple. Shaving brushes\nmade with shed Linoone hairs are highly prized."
          shield: "It uses its explosive speed and razor-sharp claws\nto bring down prey. Running along winding\npaths is not its strong suit."
        fr:
          sword: "Son pelage est à la fois solide et flexible.\nLes blaireaux conçus à partir des poils de sa mue\nsont des produits de très grand luxe."
          shield: "Il se sert de sa force de propulsion et de\nses griffes aiguisées pour achever ses proies.\nIl a du mal à courir sur les routes sinueuses."
        it:
          sword: "Ha un pelo forte e resistente. I pennelli da barba\nrealizzati con le setole perse da questo Pokémon\nsono molto pregiati."
          shield: "Si serve della sua straordinaria forza esplosiva\ne dei suoi artigli affilati per abbattere la preda.\nCorrere lungo strade tortuose non è il suo forte."
        de:
          sword: "Sein Fell ist kräftig und fest. Rasierpinsel, die aus\nseinen ausgefallenen Haaren hergestellt werden,\nsind absolute Luxusartikel."
          shield: "Es erlegt seine Beute mit schnellen Bewegungen\nund scharfen Klauen. Kurven zu nehmen bereitet\nihm aber große Schwierigkeiten."
        es:
          sword: "Posee un pelaje fuerte y firme. Las brochas de\nafeitar cuyas cerdas están hechas con el pelo\nque se le desprende son un producto de lujo."
          shield: "Abate a sus presas con su vertiginosa velocidad\ny sus afiladas garras. Los trayectos sinuosos\nmerman notablemente su capacidad para correr."
        ko:
          sword: "강하고 탄력 있는 털을 가졌다.\n빠진 털로 만든 면도솔은\n최고의 명품이다."
          shield: "뛰어난 순발력과 예리한\n발톱으로 먹이의 숨통을 끊는다.\n굽은 길을 달리는 게 서툴다."
        zh_simp:
          sword: "体毛拥有良好的韧度与质感。\n用它身上掉下来的毛制成的\n剃须刷是最上等的高级货。"
          shield: "用自己超群的爆发力\n和锐利的爪子来制服猎物。\n不擅长在弯曲的道路上奔跑。"
        zh_trad:
          sword: "體毛有著良好的韌度與質感。\n用牠身上掉下的毛製成的\n刮鬍刷是最上等的高級貨。"
          shield: "用自己超群的爆發力\n和銳利的爪子來制服獵物。\n不擅長在彎曲的道路上奔跑。"
    linoone_galarian_form:
      form_id: 1
      names:
        jp_kana: ガラルのすがた
        jp_kanji: ガラルのすがた
        en: Galarian Form
        fr: Forme de Galar
        it: Forma di Galar
        de: Galar-Form
