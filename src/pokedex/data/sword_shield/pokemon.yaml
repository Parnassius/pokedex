          shield: "どくを　うすめると　くすりに　なる。\nやくひんがいしゃの　マスコットに\nなって　にんきものに　なった。"
        jp_kanji:
          sword: "頬の　毒袋を　鳴らして\n敵を　威嚇。　ひるんだ　隙に\n毒突きを　おみまいする。"
          shield: "毒を　薄めると　薬に　なる。\n薬品会社の　マスコットに\nなって　人気者に　なった。"
        en:
          sword: "It makes frightening noises with its poison-filled\ncheek sacs. When opponents flinch, Croagunk\nhits them with a poison jab."
          shield: "Once diluted, its poison becomes medicinal.\nThis Pokémon came into popularity after a\npharmaceutical company chose it as a mascot."
        fr:
          sword: "Il intimide ses ennemis en faisant résonner\nles glandes toxiques de ses joues, puis leur\nporte un coup empoisonné par surprise."
          shield: "Dilué, son poison sert de remède. Cela lui a valu\nde devenir la mascotte populaire d’une entreprise\nde produits pharmaceutiques."
        it:
          sword: "Spaventa il nemico facendo risuonare le sacche\nsulle guance e lo avvelena approfittando del\nmomento di esitazione."
          shield: "Se diluito, il suo veleno ha proprietà medicinali.\nÈ diventato popolare da quando una casa\nfarmaceutica ne ha fatto la sua mascotte."
        de:
          sword: "Es schüchtert Gegner mit Geräuschen ein, die\nes mit seinen Giftbeuteln erzeugt. Gelingt ihm\ndies, erledigt es sein Ziel mit einem Giftangriff."
          shield: "Verdünnt man sein Gift, wird es zu Medizin. Seit\nes zum Maskottchen eines Pharmakonzerns\nwurde, hat es viele neue Fans gewonnen."
        es:
          sword: "Amenaza a los rivales haciendo sonar las bolsas\nvenenosas de sus mejillas y aprovecha su estupor\npara inyectarles toxinas."
          shield: "Su veneno posee propiedades medicinales si se\ndiluye. Se ha vuelto muy popular desde que una\nempresa farmacéutica lo adoptó como mascota."
        ko:
          sword: "볼에 있는 독주머니를 울려서\n상대를 위협한다. 풀이 죽은 틈을 타\n독찌르기 공격을 한다."
          shield: "독을 희석하면 약이 된다.\n제약 회사의 마스코트가\n된 후로 인기가 많아졌다."
        zh_simp:
          sword: "会从自己脸颊上的毒囊\n发出声音来威吓对手，\n趁对手畏惧的时间使出毒击。"
          shield: "毒素在稀释后能制成药品。\n它是制药公司的吉祥物，\n广受众人的欢迎。"
        zh_trad:
          sword: "會從自己臉頰上的毒囊\n發出聲音來威嚇對手，\n趁對手畏懼的時候使出毒擊。"
          shield: "毒素在稀釋後能製成藥品。\n牠是製藥公司的吉祥物，\n廣受眾人的歡迎。"
