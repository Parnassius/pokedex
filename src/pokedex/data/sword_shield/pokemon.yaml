      descriptions:
        jp_kana:
          sword: "せいでんきを　たいもうに　たくわえて\nほうでんする。　あらしが　ちかづくと\nぜんしんから　ひばなを　ちらす。"
          shield: "せいでんきを　たいもうに　ためる。\nくうきの　かんそうした　きせつには\nぜんしんから　ひばなを　ちらす。"
        jp_kanji:
          sword: "静電気を　体毛に　たくわえて\n放電する。　嵐が　近づくと\n全身から　火花を　散らす。"
          shield: "静電気を　体毛に　溜める。\n空気の　乾燥した　季節には\n全身から　火花を　散らす。"
        en:
          sword: "It stores static electricity in its fur for discharging.\nIt gives off sparks if a storm approaches."
          shield: "It stores electricity in its fur. It gives off sparks\nfrom all over its body in seasons when the air is dry."
        fr:
          sword: "Il émet des décharges à partir de l’électricité\nstatique accumulée dans sa fourrure. Il produit\ndes étincelles lorsque le temps devient orageux."
          shield: "L’électricité statique s’accumule dans sa fourrure.\nPar temps sec, elle dégage des étincelles."
        it:
          sword: "Accumula elettricità statica nella pelliccia e poi\nla rilascia. Se si avvicina una tempesta, emette\nscintille."
          shield: "Accumula elettricità statica nella pelliccia. Nella\nstagione secca, il suo corpo sprizza scintille."
        de:
          sword: "In seinem Fell speichert es statische Elektrizität\nfür spätere Entladungen. Braut sich ein Sturm\nzusammen, entlädt es Funken."
          shield: "Es speichert statische Elektrizität in seinem Fell.\nIn Jahreszeiten mit trockener Luft sprüht sein\nganzer Körper Funken."
        es:
          sword: "Acumula electricidad estática en el pelaje para\nlanzar descargas. Cuando va a haber tormenta,\nsuelta chispas por todo el cuerpo."
          shield: "Almacena electricidad estática en su pelaje.\nEn estaciones secas, suelta chispas por todo\nel cuerpo."
        ko:
          sword: "정전기를 털에 비축하여\n방전한다. 폭풍이 가까이 오면\n온몸에서 불꽃을 튀긴다."
          shield: "정전기를 털에 모은다.\n공기가 건조한 계절에는\n전신에서 스파크를 뿌린다."
        zh_simp:
          sword: "会将静电储存在体毛中进行放电。\n暴风雨临近时，会从全身散发出火花。"
          shield: "会在体毛中储存静电。\n在空气干燥的季节\n会从全身散发出火花。"
        zh_trad:
          sword: "會將靜電積蓄在體毛中後放電。\n當暴風雨來臨前，\n會從全身冒出火花。"
          shield: "會在體毛中儲存靜電。\n在空氣乾燥的季節\n會從全身散發出火花。"
