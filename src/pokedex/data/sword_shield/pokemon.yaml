      types:
        - water
      egg_groups:
        - water_3
      abilities:
        - illuminate
        - natural_cure
      hidden_ability: analytic
      held_items:
        common: stardust
        rare: star_piece
      descriptions:
        jp_kana:
          sword: "なつのおわりの　はまべに　いくと\nきそくてきな　リズムで　ひかる\nヒトデマンの　むれが　みられるよ。"
          shield: "さかなポケモンに　ついばまれるが\nからだが　ちぎれても　すぐに\nさいせいするので　きにしない。"
        jp_kanji:
          sword: "夏の終わりの　浜辺に　行くと\n規則的な　リズムで　光る\nヒトデマンの　群れが　見られるよ。"
          shield: "魚ポケモンに　ついばまれるが\n体が　ちぎれても\nすぐに　再生するので　気にしない。"
        en:
          sword: "If you visit a beach at the end of summer, you’ll\nbe able to see groups of Staryu lighting up in a\nsteady rhythm."
          shield: "Fish Pokémon nibble at it, but Staryu isn’t\nbothered. Its body regenerates quickly, even\nif part of it is completely torn off."
        fr:
          sword: "Lorsqu’on se rend en bord de mer à la fin\nde l’été, on peut voir des groupes de Stari\nclignoter à un rythme régulier."
          shield: "Il ne se soucie guère des Pokémon poissons\nqui viennent le grignoter, car même si son corps\nest déchiqueté, il se régénère aussitôt."
        it:
          sword: "Alla fine dell’estate, sui litorali è possibile\nosservare gruppi di Staryu che emettono luce\na un ritmo regolare."
          shield: "Viene mangiucchiato dai Pokémon acquatici,\nma non ci dà peso, perché le parti danneggiate\ndel suo corpo si rigenerano subito."
        de:
          sword: "Bei spätsommerlichen Strandbesuchen kann man\nGruppen von Sterndu begegnen, deren Kerne in\ngleichmäßigem Rhythmus aufblinken."
          shield: "Ihm macht es nichts aus, von Fisch-Pokémon\nangeknabbert zu werden, da sich sein Körper\nbei Verletzungen im Nu regeneriert."
        es:
          sword: "A finales de verano, se pueden ver grupos de\nStaryu en la orilla de la playa sincronizando el\nbrillo de sus núcleos a ritmo regular."
          shield: "No le importa que le mordisqueen el cuerpo los\nPokémon pez, ya que las partes desgarradas se\nregeneran casi al instante."
        ko:
          sword: "늦여름 해변에 가면\n규칙적인 리듬으로 빛나는\n별가사리의 무리를 볼 수 있다."
          shield: "물고기포켓몬에게 물리곤 하지만\n몸이 찢겨도 금방 재생되기 때문에\n신경 쓰지 않는다."
        zh_simp:
          sword: "夏季快结束时去海边，\n就能看到以有规律的节奏\n发光的海星星族群。"
          shield: "虽然会遭到鱼宝可梦的啄食，\n但身体即使被咬掉一块也能\n马上再生，所以完全不在意。"
        zh_trad:
          sword: "在夏天快結束時到海邊，\n就能看見成群的海星星\n有規律地一閃一閃發光。"
          shield: "會被魚寶可夢啄食，但是\n即使身體被咬斷也能很快就\n再生，所以一點都不在意。"
