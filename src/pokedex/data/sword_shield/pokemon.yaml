          sword: "しっぽの　ないぶが　モーターのように\nまわると　なんぼんもの　イナズマが\nはっせいして　しゅういを　つらぬく。"
          shield: "ひとが　ただしい　こころを　なくすと\nはげしい　いかずちを　おとし　くにを\nほろぼすと　しんわに　えがかれた。"
        jp_kanji:
          sword: "しっぽの　内部が　モーターのように\n回ると　何本もの　稲妻が\n発生して　周囲を　つらぬく。"
          shield: "人が　正しい　心を　なくすと\n激しい　雷を　落とし　国を\n亡ぼすと　神話に　描かれた。"
        en:
          sword: "When the interior part of its tail spins like a\nmotor, Zekrom can generate many bolts of\nlightning to blast its surroundings."
          shield: "Mythology tells us that if people lose the\nrighteousness in their hearts, their kingdoms\nwill be razed by Zekrom’s lightning."
        fr:
          sword: "Lorsque sa queue se met à tourner comme\nun réacteur, il produit des éclairs qui transpercent\ntout autour de lui."
          shield: "Selon la légende, lorsque les gens perdent tout\nsens de ce qui est juste, Zekrom réduit le pays\nentier en cendres avec de terribles éclairs."
        it:
          sword: "Quando l’interno della sua coda inizia a girare\ncome una turbina, emette lampi e saette che\nsquarciano l’aria tutta intorno."
          shield: "Secondo le leggende, può radere al suolo\nun intero paese con fulmini terribili se i suoi\nabitanti hanno perso il senso della giustizia."
        de:
          sword: "Rotiert das Innere seines Schweifs wie eine\nTurbine, werden dadurch unzählige Blitze\nerzeugt, welche die Umgebung durchzucken."
          shield: "Viele Mythen besingen den Donner, mit dem es\ndie Welt vernichten wird, wenn die Menschen\nden Sinn für die Gerechtigkeit verlieren."
        es:
          sword: "Cuando el interior de su cola comienza a girar\ncomo una turbina, es capaz de descargar rayos\nque lo destruyen todo a su alrededor."
          shield: "Según las leyendas, la furia de sus rayos\nfulminará todo país cuyas gentes hayan perdido\nel sentido de la justicia."
        ko:
          sword: "꼬리 내부가 모터처럼\n회전하면 여러 갈래의 번개가\n발생하여 주위를 관통한다."
          shield: "사람이 올바른 마음을 잃으면\n격렬한 천둥으로 나라를\n멸망시킨다는 신화가 있다."
        zh_simp:
          sword: "当尾巴的内部像马达那样\n旋转起来，就能制造出\n好几道闪电，穿透周围的一切。"
          shield: "在神话的描述里，如果人类\n失去了正义之心，它就会用\n狂暴的雷电毁灭他们的王国。"
        zh_trad:
          sword: "當尾巴的內部像馬達那樣\n旋轉起來，就能製造出\n好幾道閃電，穿透周圍的一切。"
          shield: "在神話的敘述裡，如果人類\n失去了正義之心，牠就會用\n狂暴的雷電毀滅他們的王國。"
