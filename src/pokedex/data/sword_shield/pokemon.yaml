    jp_kana: タブンネ
    jp_kanji: タブンネ
    en: Audino
    fr: Nanméouïe
    it: Audino
    de: Ohrdoch
    es: Audino
    ko: 다부니
    zh_simp: 差不多娃娃
    zh_trad: 差不多娃娃
  forms:
    audino:
      form_id: 0
      base_stats:
        hp: 103
