      descriptions:
        jp_kana:
          sword: "はがねの　からだと　れいりょくの\nバリアで　あらゆる　こうげきを\nよわめる　ぼうぎょの　たいせい。"
          shield: "きょうりょくな　れいりょくで　ひとや\nポケモンを　あやつり　ギルガルドに\nつごうの　よい　くにを　つくらせた。"
        jp_kanji:
          sword: "鋼の　体と　霊力の\nバリアで　あらゆる　攻撃を\n弱める　防御の　体勢。"
          shield: "強力な　霊力で　人や\nポケモンを　操り　ギルガルドに\n都合の　良い　国を　つくらせた。"
        en:
          sword: "In this defensive stance, Aegislash uses its steel\nbody and a force field of spectral power to\nreduce the damage of any attack."
          shield: "Its potent spectral powers allow it to manipulate\nothers. It once used its powers to force people\nand Pokémon to build a kingdom to its liking."
        fr:
          sword: "Grâce à son corps en acier et à sa barrière\npsychique, il peut se défendre en affaiblissant\ntoutes sortes d’attaques."
          shield: "Grâce à ses puissants pouvoirs spirituels,\nil a contrôlé des humains et des Pokémon\npour créer un pays conforme à ses idéaux."
        it:
          sword: "Con il suo corpo metallico e la sua barriera\npsichica può opporre una difesa in grado di\nindebolire qualsiasi tipo di attacco."
          shield: "Ha manipolato il pensiero di esseri umani e\nPokémon con il suo potere spettrale facendogli\ncostruire un paese adatto alle sue esigenze."
        de:
          sword: "Mit seinem stählernen Körper und der Barriere,\ndie es durch eine mysteriöse Kraft erzeugt,\nvermag es jegliche Angriffe abzuschwächen."
          shield: "Mithilfe seiner mysteriösen Kräfte kontrollierte es\nMenschen und Pokémon und ließ sie ein Land\nnach seinen Vorstellungen erschaffen."
        es:
          sword: "Gracias a su cuerpo de acero y a una barrera de\npoder espectral, crea una defensa que le permite\nmitigar prácticamente cualquier ataque."
          shield: "Mediante el control ejercido con su inmenso\npoder espectral, logró que humanos y Pokémon\nle forjaran un país a medida de sus necesidades."
        ko:
          sword: "강철로 된 몸과 영험한 힘을 가진\n배리어로 모든 공격을\n약하게 만드는 방어적인 태세."
          shield: "강력한 영력으로 사람과\n포켓몬을 조종해 킬가르도의\n입맛에 맞는 나라를 만들게 했다."
        zh_simp:
          sword: "处于防御状态时，\n会用钢之身体和灵力的屏障\n来减弱一切的攻击。"
          shield: "坚盾剑怪曾经用强大的灵力\n控制人和宝可梦，建立了\n适合自己生活的国家。"
        zh_trad:
          sword: "處於防禦狀態時，\n會用鋼之身體和靈力的屏障\n來減弱一切的攻擊。"
          shield: "堅盾劍怪曾經用強大的靈力\n控制人和寶可夢，建立了\n適合自己生活的國家。"
    aegislash_blade_forme:
