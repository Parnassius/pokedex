      descriptions:
        jp_kana:
          sword: "ひとばんじゅう　はしっていられる\nスタミナを　もつ。　かっぱつで\nさんぽの　あいては　たいへん。"
          shield: "あいての　かんじょう　だけでなく\nしぜんの　ようすも　はどう　という\nなみの　かたちで　かんじとる。"
        jp_kanji:
          sword: "一晩中　走っていられる\nスタミナを　もつ。　活発で\n散歩の　相手は　たいへん。"
          shield: "相手の　感情　だけでなく\n自然の　様子も　波動　という\n波の　形で　感じとる。"
        en:
          sword: "It’s exceedingly energetic, with enough stamina\nto keep running all through the night. Taking it\nfor walks can be a challenging experience."
          shield: "It can use waves called auras to gauge how\nothers are feeling. These same waves can also tell\nthis Pokémon about the state of the environment."
        fr:
          sword: "Il possède assez d’endurance pour passer\ndes nuits entières à courir. Il est difficile de partir\nen balade avec lui tant il déborde d’énergie."
          shield: "Il perçoit sous forme d’aura non seulement\nles sentiments des autres, mais aussi l’état\nde la nature."
        it:
          sword: "Ha una grande resistenza e una gran vitalità,\ntanto che può correre anche per una notte intera.\nDurante le passeggiate non è facile stargli dietro."
          shield: "Percepisce non solo le emozioni degli altri,\nma anche le condizioni dell’ambiente naturale\nsotto forma di onde definite “aura”."
        de:
          sword: "Es besitzt so viel Ausdauer, dass es die ganze\nNacht rennen könnte. Wer mit ihm spazieren\ngehen will, kann nur schwer mit ihm Schritt halten."
          shield: "Es erspürt nicht nur die Gefühle anderer, sondern\nauch den Zustand der Natur durch Wellen, die\nAura genannt werden."
        es:
          sword: "Su gran resistencia le permite correr durante toda\nuna noche sin problema, pero tanta energía hace\nque sea sumamente complicado seguirle el ritmo."
          shield: "Percibe los sentimientos de quienes lo rodean,\nasí como las condiciones del entorno, mediante\nunas ondas conocidas como auras."
        ko:
          sword: "밤새 달릴 수 있을 정도의\n체력을 가졌다. 활발해서\n같이 산책하는 상대에겐 고역이다."
          shield: "상대의 감정뿐만 아니라\n자연의 상태도 파동이라는\n파장의 형태로 느낀다."
        zh_simp:
          sword: "精力充沛，可以奔跑一整夜。\n由于它十分活泼，\n带它散步的人非常辛苦。"
          shield: "除了能读懂对手的感情，\n也能以“波导”这种形式的波\n来观察大自然的样子。"
        zh_trad:
          sword: "精力充沛，可以奔跑一整夜。\n由於牠十分活潑，\n帶牠散步的人非常辛苦。"
          shield: "除了能讀懂對手的感情，\n也能以「波導」這種形式的波\n來觀察大自然的樣子。"
