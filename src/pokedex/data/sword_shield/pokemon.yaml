      descriptions:
        jp_kana:
          sword: "じっと　うごかずに　いると　きのみと\nそっくり。　ついばみに　やってきた\nポケモンを　おどろかせて　あそぶ。"
          shield: "あたまの　さきを　えだに　くっつけて\nぶらさがる。　きょうふうに　あおられ\nおちてしまう　ことも　あるのだ。"
        jp_kanji:
          sword: "じっと　動かずに　いると　木の実と\nそっくり。　ついばみに　やって来た\nポケモンを　驚かせて　遊ぶ。"
          shield: "頭の　先を　枝に　くっつけて\nぶら下がる。　強風に　あおられ\n落ちてしまう　ことも　あるのだ。"
        en:
          sword: "If it remains still, it looks just like a real nut.\nIt delights in surprising foraging Pokémon."
          shield: "It attaches itself to a tree branch using the top of\nits head. Strong winds can sometimes make it fall."
        fr:
          sword: "S’il reste immobile, il a l’air d’une Baie.\nIl adore surprendre les Pokémon qui tentent\nde le picorer."
          shield: "Il se suspend aux branches par l’extrémité\nde sa tête. Il arrive qu’une bourrasque\nle fasse tomber."
        it:
          sword: "Quando è immobile è identico a una ghianda.\nSi diverte a sorprendere i Pokémon che si\navvicinano con l’intenzione di beccarlo."
          shield: "Si attacca ai rami degli alberi usando il picciolo\nche ha sul capo. Talvolta il vento lo fa cadere."
        de:
          sword: "Zeigt es sich regungslos, kann man es nicht von\nechten Nüssen unterscheiden. Es überrascht\nliebend gern Pokémon, die es aufpicken wollen."
          shield: "Mit dem Stiel auf seinem Kopf hängt es sich an\nÄste. Bei starkem Wind kann es durchaus mal\nherunterfallen."
        es:
          sword: "Cuando se queda inmóvil, parece una bellota\nde verdad. Le encanta sorprender a los Pokémon\nque se acercan a picotearlo."
          shield: "Se cuelga de las ramas con el extremo de la\ncabeza. A veces se cae cuando soplan vientos\nfuertes."
        ko:
          sword: "가만히 움직이지 않고 있으면\n나무열매와 똑같이 생겼다.\n먹으러 온 포켓몬을 놀라게 하면서 논다."
          shield: "머리끝을 가지에 붙여\n매달린다. 강풍이 불면\n떨어지기도 한다."
        zh_simp:
          sword: "在它一动不动的时候，\n看上去和树果没有分别。\n以吓唬来啄食自己的宝可梦为乐。"
          shield: "会将头顶粘在树枝上悬挂着。\n也有被大风吹落的时候。"
        zh_trad:
          sword: "在牠一動也不動的時候，\n看起來和樹果一模一樣，\n以嚇唬來啄食自己的寶可夢為樂。"
          shield: "會將頭頂黏在樹枝上\n懸掛著。也有被大風\n吹落的時候。"
nuzleaf:
