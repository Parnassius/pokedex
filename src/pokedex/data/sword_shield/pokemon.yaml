        - rock
      egg_groups:
        - field
      abilities:
        - tough_claws
      descriptions:
        jp_kana:
          sword: "ふだんは　ものしずかで　れいせい。\nひとたび　たたかいに　なると\nはげしい　とうしを　みせるのだ。"
          shield: "れいせい　かつ　どうもうな　きしつ。\nきむずかしいので　そだてるのが\nたいへんな　ポケモンの　いっしゅ。"
        jp_kanji:
          sword: "普段は　物静かで　冷静。\nひとたび　戦いに　なると\n激しい　闘志を　見せるのだ。"
          shield: "冷静　かつ　獰猛な　気質。\n気難しいので　育てるのが\nたいへんな　ポケモンの　一種。"
        en:
          sword: "This form of Lycanroc is normally calm and quiet.\nOnce a battle begins, however, this Pokémon\ndisplays a ferocious fighting spirit."
          shield: "These Pokémon have both calm and ferocious\nqualities. Their temperamental nature makes\nthem a difficult species to raise."
        fr:
          sword: "D’ordinaire calme et posé, ce Pokémon dévoile\ntoute son agressivité dès qu’il entame un combat."
          shield: "Ce Pokémon à l’attitude réfléchie sait\naussi être féroce. Il est difficile à satisfaire,\net donc compliqué à apprivoiser."
        it:
          sword: "In genere è calmo e controllato,\nma al momento di lottare sfodera\nun impetuoso spirito combattivo."
          shield: "Ha un temperamento controllato ma feroce.\nEssendo un Pokémon molto esigente,\nè problematico da allenare."
        de:
          sword: "Es ist meist ruhig und gelassen, doch sobald\nein Kampf ausbricht, zeigt sich sein großer\nKampfgeist."
          shield: "Es kann sowohl ruhig als auch ungestüm sein.\nDer komplizierte Charakter von diesem Pokémon\nmacht sein Training alles andere als einfach."
        es:
          sword: "Por lo general, muestra un carácter tranquilo,\npero, en cuanto entra en combate, se transforma\ny saca a relucir un feroz espíritu de lucha."
          shield: "Su carácter es a la vez fiero y sosegado. Este\ntemperamento difícil y voluble lo convierte en\nun Pokémon sumamente complicado de entrenar."
        ko:
          sword: "평소에는 침착하고 냉정하다.\n한번 싸움이 나면\n격렬한 투지를 보여준다."
          shield: "냉정하고 사나운 기질을 가졌다.\n성미가 까다롭기 때문에 키우기\n어려운 포켓몬 중 하나다."
        zh_simp:
          sword: "平时既稳重又冷静。\n但只要一开始战斗，\n就会展现出强烈的斗志。"
          shield: "有着冷静且凶恶的特质。\n性情喜怒无常，因此是一种\n培育起来很困难的宝可梦。"
        zh_trad:
          sword: "平時既沉穩又冷靜。\n但一旦進入戰鬥，\n就會展現強烈的鬥志。"
          shield: "性情既冷靜又凶猛。\n脾氣刁鑽，因此是一種\n培育起來很辛苦的寶可夢。"
wishiwashi:
  species_id: 746
  names:
    jp_kana: ヨワシ
    jp_kanji: ヨワシ
    en: Wishiwashi
    fr: Froussardine
    it: Wishiwashi
    de: Lusardin
    es: Wishiwashi
    ko: 약어리
    zh_simp: 弱丁鱼
    zh_trad: 弱丁魚
  forms:
    wishiwashi_solo_form:
      form_id: 0
      names:
        jp_kana: たんどくのすがた
        jp_kanji: たんどくのすがた
        en: Solo Form
        fr: Forme Solitaire
        it: Forma Individuale
        de: Einzelform
        es: Forma Individual
        ko: 단독의 모습
        zh_simp: 单独的样子
