          shield: "右手と　左手で　２種類の\n毒を　使いわけて　攻撃する。\n香りが　強いほど　元気だ。"
        en:
          sword: "Its flowers give off a relaxing fragrance.\nThe stronger its aroma, the healthier\nthe Roselia is."
          shield: "It uses the different poisons in each hand\nseparately when it attacks. The stronger its\naroma, the healthier it is."
        fr:
          sword: "Ses fleurs dégagent un parfum relaxant.\nPlus cet arôme est fort, meilleure est la santé\nde Rosélia."
          shield: "Ses mains sécrètent chacune un poison différent\ndont il se sert pour attaquer. Plus le parfum\nde Rosélia est intense, plus sa santé est bonne."
        it:
          sword: "Dai suoi fiori si diffonde una fragranza rilassante.\nPiù è intenso il suo profumo, più il Pokémon\nè in salute."
          shield: "Attacca usando abilmente i suoi arti, che\ncontengono veleni diversi. Più è forte la sua\nfragranza, più è in salute."
        de:
          sword: "Seine Blüten verströmen einen entspannenden\nDuft. Je stärker dieser Duft ist, desto gesünder\nist Roselia."
          shield: "Seine Hände scheiden beim Angriff jeweils ein\nanderes Gift aus. Je stärker Roselia duftet, desto\ngesünder ist es."
        es:
          sword: "Las flores que tiene emanan un aroma relajante.\nCuanto más intenso, mejor es su estado de salud."
          shield: "Ataca con sus manos, cada una de las cuales\ncontiene un tipo de veneno diferente. Cuanto\nmás intenso es su aroma, mejor salud tiene."
        ko:
          sword: "꽃향기를 맡으면 기분이\n편안해진다. 향이 강하면\n건강한 로젤리아라는 뜻이다."
          shield: "오른손과 왼손으로 2종류의\n독을 구별하여 공격한다.\n향기가 강할수록 기운이 넘친다."
        zh_simp:
          sword: "只要闻到它的花香，\n就能放松心情。浓郁的香味\n是毒蔷薇有活力的证明。"
          shield: "会用右手和左手分别放出\n２种不同的毒来进行攻击。\n香气越浓越有精神。"
        zh_trad:
          sword: "只要聞到牠的花香，\n就能放鬆心情。濃郁的香味\n是毒薔薇有活力的證明。"
          shield: "會用右手和左手分別施放\n２種不同的毒來進行攻擊。\n香氣越濃越有活力。"
carvanha:
