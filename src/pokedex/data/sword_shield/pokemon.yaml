      descriptions:
        jp_kana:
          sword: "みがきあげた　きんぞくの　ような\nからだは　かるいうえに　かたいが\nさびやすいのが　けってんなのだ。"
          shield: "とくしゅな　きんぞくの　からだは\nかるく　みのこなしは　ばつぐん。\nあめが　にがてで　どうくつに　すむ。"
        jp_kanji:
          sword: "磨きあげた　金属の　ような\n体は　軽いうえに　硬いが\n錆びやすいのが　欠点なのだ。"
          shield: "特殊な　金属の　体は\n軽く　身のこなしは　抜群。\n雨が　苦手で　洞窟に　棲む。"
        en:
          sword: "Its body resembles polished metal, and it’s both\nlightweight and strong. The only drawback is that\nit rusts easily."
          shield: "The special metal that composes its body is very\nlight, so this Pokémon has considerable agility.\nIt lives in caves because it dislikes the rain."
        fr:
          sword: "Son corps, semblable à du métal poli,\nallie légèreté et solidité.\nMalheureusement, il rouille facilement."
          shield: "Son corps, composé d’un métal spécial, est léger\net lui offre une excellente mobilité. Il est toutefois\nsensible à la pluie et vit donc dans les grottes."
        it:
          sword: "Il suo corpo simile a metallo lucidato è leggero\ne resistente, ma ha il difetto di arrugginire\nfacilmente."
          shield: "Il suo corpo fatto di un metallo speciale è\nleggero e gli conferisce un’andatura impeccabile.\nVive nelle grotte perché odia la pioggia."
        de:
          sword: "Sein an aufpoliertes Metall erinnernder Körper ist\nnicht nur leicht, sondern auch robust. Er hat\njedoch den Nachteil, schnell zu rosten."
          shield: "Es ist sehr beweglich, weil sein Körper aus einem\nspeziellen, leichten Metall besteht. Da es Regen\nnicht mag, lebt es in Höhlen."
        es:
          sword: "Su cuerpo, similar a un metal pulido, es tan ligero\ncomo robusto. Sin embargo, tiene el defecto de\nque se oxida con facilidad."
          shield: "Hace gala de una agilidad extraordinaria, ya que\nsu cuerpo está compuesto de un metal especial.\nDetesta la lluvia, por lo que habita en cuevas."
        ko:
          sword: "윤이 나는 금속과도 같은\n몸은 가벼우면서도 튼튼하지만\n녹슬기 쉽다는 것이 흠이다."
          shield: "금속으로 된 특수한 몸은\n가벼워서 몸놀림이 뛰어나다.\n비를 싫어해 동굴에 산다."
        zh_simp:
          sword: "身体犹如打磨过的金属，\n虽然轻而坚硬，却有着\n容易生锈的弱点。"
          shield: "由特殊金属构成的身体\n十分轻盈，能够灵活地活动。\n不喜欢下雨，所以住在洞窟里。"
        zh_trad:
          sword: "身體猶如打磨過的金屬，\n雖然輕而堅硬，卻有著\n容易生鏽的弱點。"
          shield: "由特殊金屬構成的身體\n十分輕盈，能夠靈活地活動。\n不喜歡下雨，所以住在洞窟裡。"
  gmax_forms:
    duraludon_gigantamax:
      form_id: 999
      names:
        jp_kana: キョダイマックス
        jp_kanji: キョダイマックス
        en: Gigantamax
        fr: Gigamax
        it: Gigamax
        de: Gigadynamax
        es: Gigamax
        ko: 거다이맥스
        zh_simp: 超极巨化
        zh_trad: 超極巨化
      descriptions:
        jp_kana:
          sword: "まてんろうの　ごとく　きょだいか。\nあふれる　エネルギーで　からだの\nいちぶが　はっこう　している。"
          shield: "さいぼうのこうどは　はがねタイプの\nポケモンの　なかでも　トップクラス。\nじしんにも　つよい　こうぞうなのだ。"
        jp_kanji:
          sword: "摩天楼の　ごとく　巨大化。\nあふれる　エネルギーで　体の\n一部が　発光している。"
          shield: "細胞の硬度は　鋼タイプの\nポケモンの　なかでも　トップクラス。\n地震にも　強い　構造なのだ。"
        en:
          sword: "It’s grown to resemble a skyscraper. Parts of\nits towering body glow due to a profusion\nof energy."
          shield: "The hardness of its cells is exceptional, even\namong Steel types. It also has a body structure\nthat’s resistant to earthquakes."
        fr:
          sword: "Il est devenu aussi immense qu’un gratte-ciel.\nL’énergie qui afflue dans son corps le fait briller\npar endroits."
          shield: "La solidité de sa structure cellulaire le classe\nparmi les Pokémon Acier les plus résistants :\nun séisme ne pourrait l’ébranler."
        it:
          sword: "È diventato grande come un grattacielo.\nLa sovrabbondanza di energia ha reso luminose\nalcune parti del suo corpo."
          shield: "La sua struttura cellulare, capace di resistere\nanche ai terremoti, è di una durezza eccezionale\nanche tra i Pokémon di tipo Acciaio."
        de:
          sword: "Durch seine gigantische Größe gleicht es nun\neinem Wolkenkratzer. Das Übermaß an Energie\nin ihm lässt einige Körperteile leuchten."
          shield: "Die Härte seiner Zellenstruktur übertrifft die der\nmeisten anderen Stahl-Pokémon, sodass es selbst\neinem Erdbeben standhalten könnte."
        es:
          sword: "Su tamaño se ha vuelto comparable al de un\nrascacielos. La energía que desborda hace que\npartes de su cuerpo sean luminiscentes."
          shield: "La solidez de su estructura celular, capaz de\nsoportar la fuerza de un terremoto, destaca\nincluso entre los Pokémon de tipo Acero."
        ko:
          sword: "마천루처럼 거대해졌다.\n넘쳐나는 에너지에\n몸의 일부가 발광하고 있다."
          shield: "세포의 강도는 강철타입\n포켓몬 중에서도 톱클래스다.\n지진에도 강한 구조이다."
        zh_simp:
          sword: "变得如同摩天大楼般高大。\n受到体内能量溢出的影响，\n身体的一部分会发出亮光。"
          shield: "细胞的硬度在钢属性\n宝可梦之中也是顶级的。\n拥有抗震的构造。"
        zh_trad:
          sword: "變得如同摩天大樓般高大。\n受到體內能量溢出的影響，\n身體的一部分會發出亮光。"
          shield: "細胞的硬度在鋼屬性\n寶可夢之中也是頂級的。\n擁有抗震的構造。"
dreepy:
  species_id: 885
  names:
    jp_kana: ドラメシヤ
    jp_kanji: ドラメシヤ
    en: Dreepy
    fr: Fantyrm
    it: Dreepy
    de: Grolldra
    es: Dreepy
    ko: 드라꼰
    zh_simp: 多龙梅西亚
    zh_trad: 多龍梅西亞
  forms:
    dreepy:
      form_id: 0
      base_stats:
        hp: 28
        attack: 60
        defense: 30
        special_attack: 40
        special_defense: 30
        speed: 82
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - dragon
        - ghost
      egg_groups:
        - amorphous
        - dragon
      abilities:
        - clear_body
        - infiltrator
      hidden_ability: cursed_body
      descriptions:
        jp_kana:
          sword: "こだいの　うみで　くらしていた。\nゴーストポケモンとして　よみがえり\nかつての　すみかを　さまよっている。"
          shield: "１ぴきでは　こどもにも　まけるくらい\nひりきだが　なかまの　きょうりょくで\nきたえられ　しんかして　つよくなる。"
        jp_kanji:
          sword: "古代の　海で　暮らしていた。\nゴーストポケモンとして　よみがえり\nかつての　すみかを　さまよっている。"
          shield: "１匹では　子どもにも　負けるくらい\n非力だが　仲間の　協力で\n鍛えられ　進化して　強くなる。"
        en:
          sword: "After being reborn as a ghost Pokémon,\nDreepy wanders the areas it used to inhabit\nback when it was alive in prehistoric seas."
          shield: "If this weak Pokémon is by itself, a mere child\ncould defeat it. But if Dreepy has friends to help\nit train, it can evolve and become much stronger."
        fr:
          sword: "Revenu à la vie sous forme de Pokémon Spectre,\nil erre au-dessus de la mer dans laquelle il vivait\nautrefois."
          shield: "Seul, il est si faible qu’il ne saurait rivaliser avec\nun enfant, mais en coopérant avec ses semblables,\nil peut devenir assez fort pour évoluer."
        it:
          sword: "Abitava i mari in tempi antichi. È rinato sotto\nforma di Pokémon di tipo Spettro e vaga per\nquella che un tempo era la sua dimora."
          shield: "Da solo è più debole di un bambino, ma se\nsi allena con l’aiuto dei suoi simili si evolve\ne diventa più forte."
        de:
          sword: "In der Urzeit lebte es im Meer. Nun ist es als\nGeister-Pokémon wiedererwacht und irrt rastlos\ndurch seinen früheren Lebensraum."
          shield: "Alleine ist es sogar gegen ein Kind machtlos,\ndoch mit der Hilfe seiner Gefährten trainiert es,\nentwickelt sich und wird so stärker."
        es:
          sword: "Habitaba los mares en tiempos inmemoriales. Ha\nrevivido en forma de Pokémon de tipo Fantasma\npara vagar por su antigua morada."
          shield: "En solitario es tan débil que no sería rival ni para\nun niño, pero, al entrenarse con sus congéneres,\nevoluciona y se vuelve más fuerte."
        ko:
          sword: "고대의 바다에 살았다.\n고스트포켓몬으로 되살아나\n과거의 보금자리를 떠돌고 있다."
          shield: "1마리로는 아이에게도 질 정도로\n힘이 약하지만 동료의 협력으로\n단련하고 진화하면 강해진다."
        zh_simp:
          sword: "曾经栖息在古代的大海。\n在重生为幽灵宝可梦后，\n会在昔日的住处徘徊。"
          shield: "虽然单独１只弱得甚至敌不过小孩，\n但会和伙伴合作一起锻炼，\n通过进化而变得更强。"
        zh_trad:
          sword: "曾經棲息在古代的大海。\n在重生為幽靈寶可夢後，\n會在昔日的住處徘徊。"
          shield: "雖然單獨１隻弱得甚至敵不過小孩，\n但會和夥伴合作一起鍛鍊，\n透過進化而變得更強。"
drakloak:
  species_id: 886
  names:
    jp_kana: ドロンチ
    jp_kanji: ドロンチ
    en: Drakloak
    fr: Dispareptil
    it: Drakloak
    de: Phandra
    es: Drakloak
    ko: 드래런치
    zh_simp: 多龙奇
    zh_trad: 多龍奇
  forms:
    drakloak:
      form_id: 0
      base_stats:
        hp: 68
        attack: 80
        defense: 50
        special_attack: 60
        special_defense: 50
        speed: 102
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 2
      types:
        - dragon
        - ghost
      egg_groups:
        - amorphous
        - dragon
      abilities:
        - clear_body
        - infiltrator
      hidden_ability: cursed_body
      descriptions:
        jp_kana:
          sword: "ひこう　そくどは　じそく２００キロ。\nドラメシヤと　いっしょに　たたかい\nぶじに　しんかするまで　せわをする。"
          shield: "せわをする　ドラメシヤを　あたまに\nのせていないと　おちつかないので\nほかの　ポケモンを　のせようとする。"
        jp_kanji:
          sword: "飛行速度は　時速２００キロ。\nドラメシヤと　いっしょに　戦い\n無事に　進化するまで　世話をする。"
          shield: "世話をする　ドラメシヤを　頭に\n乗せていないと　落ち着かないので\nほかの　ポケモンを　乗せようとする。"
        en:
          sword: "It’s capable of flying faster than 120 mph.\nIt battles alongside Dreepy and\ndotes on them until they successfully evolve."
          shield: "Without a Dreepy to place on its head and\ncare for, it gets so uneasy it’ll try to substitute\nany Pokémon it finds for the missing Dreepy."
        fr:
          sword: "Il vole à une vitesse de 200 km/h et se bat\naux côtés d’un Fantyrm, dont il prend soin\njusqu’à son évolution."
          shield: "Il prend soin du Fantyrm sur sa tête.\nQuand ce dernier n’est plus là, il panique\net tente de le remplacer par un autre Pokémon."
        it:
          sword: "Vola a una velocità di 200 km/h. Lotta assieme\na Dreepy e se ne prende cura fino a quando\nnon si evolve."
          shield: "Se non ha un Dreepy sulla testa di cui prendersi\ncura, non riesce a stare tranquillo e cerca\ndi sostituirlo con altri Pokémon."
        de:
          sword: "Beim Fliegen ist es bis zu 200 km/h schnell. Es\nkämpft gemeinsam mit Grolldra und kümmert\nsich bis zu dessen Entwicklung um es."
          shield: "Hat es kein Grolldra auf seinem Kopf, auf das es\naufpassen kann, wird es nervös. Dann versucht es,\nein anderes Pokémon auf seinen Kopf zu setzen."
        es:
          sword: "Vuela a una velocidad de 200 km/h. Lucha junto\na un Dreepy, al que cuida hasta el momento de\nsu evolución."
          shield: "Si no lleva un Dreepy del que cuidar encima de\nla cabeza, se intranquiliza y trata de sustituirlo\ncon otro Pokémon."
        ko:
          sword: "비행 속도는 시속 200km.\n드라꼰과 함께 싸우며\n무사히 진화할 때까지 돌본다."
          shield: "보살피는 드라꼰을 머리에\n태우지 않으면 진정하지 못하고\n다른 포켓몬을 태우려고 한다."
        zh_simp:
          sword: "飞行速度为每小时２００公里。\n与多龙梅西亚一起战斗，\n到它进化为止都会细心照顾。"
          shield: "要是没让自己在照顾的多龙梅西亚\n乘在头上就静不下心来，甚至会\n因此试图把别的宝可梦放到头上。"
        zh_trad:
          sword: "飛行速度為每小時２００公里。\n與多龍梅西亞一起戰鬥，\n到牠進化為止都會細心照顧。"
          shield: "要是沒讓自己在照顧的多龍梅西亞\n乘在頭上就靜不下心來，甚至會\n因此試圖把別的寶可夢放到頭上。"
dragapult:
  species_id: 887
  names:
    jp_kana: ドラパルト
    jp_kanji: ドラパルト
    en: Dragapult
    fr: Lanssorien
    it: Dragapult
    de: Katapuldra
    es: Dragapult
    ko: 드래펄트
    zh_simp: 多龙巴鲁托
    zh_trad: 多龍巴魯托
  forms:
    dragapult:
      form_id: 0
      base_stats:
        hp: 88
        attack: 120
