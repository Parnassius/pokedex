      descriptions:
        jp_kana:
          sword: "ちぎれても　むげんに　のびる\nツルの　おくの　しょうたいは\nいまだ　かいめいされていない。"
          shield: "ツルは　どくとくの　かおりがする。\nガラルの　いちぶの　ちいきでは\nハーブとして　つかわれている。"
        jp_kanji:
          sword: "ちぎれても　無限に　伸びる\nツルの　奥の　正体は\nいまだ　解明されていない。"
          shield: "ツルは　独特の　香りがする。\nガラルの　一部の　地域では\nハーブとして　使われている。"
        en:
          sword: "Hidden beneath a tangle of vines that grows\nnonstop even if the vines are torn off, this\nPokémon’s true appearance remains a mystery."
          shield: "The vines of a Tangela have a distinct scent.\nIn some parts of Galar, Tangela vines are used\nas herbs."
        fr:
          sword: "On ne sait toujours pas ce qui se cache\nsous ses lianes. Même si on les coupe,\nelles repoussent à l’infini."
          shield: "Ses lianes ont une odeur particulière.\nElles servent d’herbes aromatiques\ndans une certaine zone de Galar."
        it:
          sword: "Non è ancora chiaro quale sia il vero aspetto\ncelato dietro alle sue liane, che crescono\nall’infinito anche dopo essere state recise."
          shield: "Le sue liane emanano un odore peculiare.\nIn alcune zone di Galar vengono usate come\nerbe aromatiche."
        de:
          sword: "Seine wahre Gestalt ist weiterhin ein Mysterium,\nda sie von Ranken verdeckt wird, die unaufhörlich\nnachwachsen, selbst wenn sie abreißen."
          shield: "Seine Ranken verströmen einen eigentümlichen\nDuft, weshalb sie in bestimmten Gegenden von\nGalar als aromatische Kräuter verwendet werden."
        es:
          sword: "Sus lianas no dejan de crecer aunque se le\ndesprendan. Aún se desconoce qué aspecto\ntiene sin ellas."
          shield: "Sus lianas despiden una fragancia peculiar.\nEn cierta zona de Galar se usan como aderezo."
        ko:
          sword: "잘려도 잘려도 무한으로 늘어나는\n덩굴 속의 정체는\n아직 밝혀지지 않았다."
          shield: "덩굴은 독특한 향이 난다.\n가라르 일부 지역에서는\n허브로 사용되고 있다."
        zh_simp:
          sword: "藤蔓即使断了也能无限生长，\n里面的真面目是什么样子，\n直到今天也未被查明。"
          shield: "藤蔓有着独特的香气。\n在伽勒尔的部分地区\n被当做香草使用。"
        zh_trad:
          sword: "藤蔓即使斷了也會繼續\n無限地生長。藤蔓下的\n真面目至今仍是個謎。"
          shield: "藤蔓散發著獨特的香氣。\n在伽勒爾的部分地區\n會被當作香草使用。"
