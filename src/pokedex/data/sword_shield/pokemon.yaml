        - sand_stream
      hidden_ability: sand_force
      descriptions:
        jp_kana:
          sword: "くちを　あけて　いどうしながら\nすなごと　えものを　まるのみ。\nすなは　はなから　ふきだし　すてる。"
          shield: "おもに　ひるまに　かつどうする。\nさばくのよは　ひえるので　すなの\nおくふかくに　もぐって　ねむる。"
        jp_kanji:
          sword: "口を　開けて　移動しながら\n砂ごと　獲物を　丸飲み。\n砂は　鼻から　噴き出し　捨てる。"
          shield: "おもに　昼間に　活動する。\n砂漠の夜は　冷えるので　砂の\n奥深くに　潜って　眠る。"
        en:
          sword: "It moves through the sands with its mouth open,\nswallowing sand along with its prey. It gets rid of\nthe sand by spouting it from its nose."
          shield: "This Pokémon is active during the day and passes\nthe cold desert nights burrowed snugly into\nthe sand."
        fr:
          sword: "Il attrape ses proies en se déplaçant la gueule\nouverte. Il éjecte ensuite le sable qu’il a avalé\nau passage en l’expulsant par le nez."
          shield: "Il est principalement actif pendant la journée.\nIl s’enfouit profondément dans le sable pour\ndormir, car les nuits désertiques sont très froides."
        it:
          sword: "Si sposta con la bocca aperta inghiottendo\ncontemporaneamente sabbia e prede. Poi si\nlibera della sabbia soffiandola fuori dal naso."
          shield: "È attivo principalmente di giorno. Dato che nel\ndeserto la temperatura notturna è molto bassa,\nscava profonde buche nella sabbia per dormire."
        de:
          sword: "Es bewegt sich mit geöffnetem Maul und\nverschluckt seine Beute mit jeder Menge Sand,\nden es durch seine Nasenlöcher wieder ausstößt."
          shield: "Es ist hauptsächlich tagsüber aktiv. Die Nächte in\nder Wüste sind kalt, deswegen vergräbt es sich\nzum Schlafen tief im Sand."
        es:
          sword: "Se desplaza con la boca abierta engullendo tanto\npresas como arena por igual. Luego, expulsa la\narenilla por la nariz."
          shield: "Este Pokémon de hábitos diurnos se entierra en\nla arena para dormir cuando la temperatura en\nel desierto se desploma al caer la noche."
        ko:
          sword: "입을 벌리고 이동하면서\n모래째로 먹이를 꿀꺽 삼킨다.\n모래는 코로 뿜어내서 버린다."
          shield: "주로 낮에 활동한다.\n사막의 밤은 기온이 낮아져\n모래 깊숙이 들어가 잠을 잔다."
        zh_simp:
          sword: "张大嘴巴移动，连同沙子\n把对手一整个吞下去。\n会从鼻孔把沙子喷出来丢掉。"
          shield: "主要在白天活动。\n因为沙漠的夜晚会降温，\n所以会钻到沙子的深处睡觉。"
        zh_trad:
          sword: "張大嘴巴移動，連同沙子\n把對手一整個吞下去。\n會從鼻孔把沙子噴出來丟掉。"
          shield: "主要在白天活動。\n因為沙漠的夜晚會降溫，\n所以會鑽進沙子的深處睡覺。"
hippowdon:
  species_id: 450
  names:
    jp_kana: カバルドン
    jp_kanji: カバルドン
    en: Hippowdon
    fr: Hippodocus
    it: Hippowdon
    de: Hippoterus
    es: Hippowdon
    ko: 하마돈
    zh_simp: 河马兽
    zh_trad: 河馬獸
  forms:
    hippowdon:
      form_id: 0
      base_stats:
        hp: 108
        attack: 112
        defense: 118
        special_attack: 68
        special_defense: 72
        speed: 47
      evs_yield:
        hp: 0
        attack: 0
