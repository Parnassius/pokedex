    jp_kanji: ココガラ
    en: Rookidee
    fr: Minisange
    it: Rookidee
    de: Meikro
    es: Rookidee
    ko: 파라꼬
    zh_simp: 稚山雀
    zh_trad: 稚山雀
  forms:
    rookidee:
      form_id: 0
      base_stats:
        hp: 38
        attack: 47
        defense: 35
        special_attack: 33
        special_defense: 35
        speed: 57
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - flying
      egg_groups:
        - flying
      abilities:
        - keen_eye
        - unnerve
      hidden_ability: big_pecks
      descriptions:
        jp_kana:
          sword: "どんな　きょうてきにも　いどみかかる\nゆうかんな　せいしつ。　かえりうちに\nあいながらも　きたえられていく。"
          shield: "ちいさい　からだで　きびんに　とんで\nすきを　つく　せんぽうで　からだの\nおおきな　あいてを　てだまにとる。"
        jp_kanji:
          sword: "どんな　強敵にも　挑みかかる\n勇敢な　性質。　返り討ちに\n遭いながらも　鍛えられていく。"
          shield: "小さい　体で　機敏に　飛んで\n隙を　突く　戦法で　体の\n大きな　相手を　手玉に取る。"
        en:
          sword: "It will bravely challenge any opponent, no matter\nhow powerful. This Pokémon benefits from every\nbattle—even a defeat increases its strength a bit."
          shield: "Jumping nimbly about, this small-bodied\nPokémon takes advantage of even the slightest\nopportunity to disorient larger opponents."
        fr:
          sword: "Ce Pokémon brave affronte même les adversaires\nles plus redoutables. Il devient plus fort à mesure\nqu’il subit les contre-attaques."
          shield: "Son petit corps lui permet de se jouer d’ennemis\nbien plus grands que lui en volant à toute vitesse\npour les piquer où ils sont vulnérables."
        it:
          sword: "Ha un’indole temeraria che lo porta ad attaccare\nbriga anche con nemici molto forti. Diventa più\nforte a forza di subire contrattacchi."
          shield: "Sconfigge i nemici più grossi sfruttando le sue\npiccole dimensioni per volare con agilità attorno\na loro e colpirli nei punti deboli."
        de:
          sword: "Es ist von Natur aus sehr mutig und fordert daher\njeden noch so starken Feind heraus. Selbst wenn\nes den Kürzeren zieht, dient dies seinem Training."
          shield: "Mit seinem kleinen Körper kann es flink fliegen\nund so mithilfe von trickreichen Taktiken größere\nGegner überlisten."
        es:
          sword: "De naturaleza valiente, planta cara a cualquier\nrival, por muy fuerte que sea. Los contraataques\nque recibe le sirven para fortalecerse."
          shield: "Su pequeño cuerpo le permite volar a gran\nvelocidad para golpear los puntos débiles de\nrivales mucho más grandes que él."
        ko:
          sword: "아무리 강한 상대라도 덤벼드는\n용감한 성격을 가졌다. 도리어\n당하면서도 점점 단련되어 간다."
          shield: "작은 몸을 기민하게 날려\n틈을 노리는 전법으로\n몸집이 큰 상대를 농락한다."
        zh_simp:
          sword: "性格勇敢，无论多强的敌人\n都勇于挑战。即使在敌人的反击中\n被打败，也能从中得到锻炼。"
          shield: "娇小的体型让它能敏捷地飞翔。\n利用攻其不备的战法将体型\n巨大的对手玩弄于股掌之间。"
        zh_trad:
          sword: "性情勇敢，無論多強的敵人\n都勇於挑戰。即使在敵人的反擊中\n被打敗，也能從中得到鍛鍊。"
          shield: "嬌小的體型讓牠能敏捷地飛翔。\n攻其不備的戰法將體型巨大\n的對手玩弄於股掌之間。"
corvisquire:
