      descriptions:
        jp_kana:
          sword: "みみの　うちがわの　めだまもようから\nサイコパワーを　はなつが　ふだんは\nその　ちからを　かくしている。"
          shield: "オスは　ぼうえい　ほんのうが　つよく\nじぶんや　パートナーを　まもるときに\nさいだいきゅうの　パワーを　だす。"
        jp_kanji:
          sword: "耳の　内側の　目玉模様から\nサイコパワーを　放つが　普段は\nその　力を　隠している。"
          shield: "オスは　防衛本能が　強く\n自分や　パートナーを　守るときに\n最大級の　パワーを　出す。"
        en:
          sword: "Revealing the eyelike patterns on the insides of\nits ears will unleash its psychic powers. It normally\nkeeps the patterns hidden, however."
          shield: "The defensive instinct of the males is strong.\nIt’s when they’re protecting themselves or their\npartners that they unleash their full power."
        fr:
          sword: "Les motifs en forme d’yeux, à l’intérieur de ses\noreilles, sont la source de ses pouvoirs psychiques.\nLa plupart du temps, il cache ces pouvoirs."
          shield: "Le mâle a un instinct de défense très développé.\nIl n’hésite pas à lancer une attaque à pleine\npuissance pour protéger ses partenaires et lui."
        it:
          sword: "I motivi a forma di occhio all’interno delle\norecchie sono la fonte del suo potere psichico.\nDi solito tiene nascosti i suoi poteri."
          shield: "Il maschio ha un forte istinto protettivo.\nSe deve difendere se stesso o il suo Allenatore,\nattacca con una forza formidabile."
        de:
          sword: "Über das Augenmuster auf der Innenseite seiner\nOhren kann es seine Psycho-Kräfte freisetzen.\nFür gewöhnlich hält es sie aber verborgen."
          shield: "Männliche Psiaugon haben einen ausgeprägten\nBeschützerinstinkt. Sie sind dann am stärksten,\nwenn sie sich oder ihren Trainer verteidigen."
        es:
          sword: "Emite sus poderes psíquicos por las marcas en\nforma de ojos que tiene en las orejas, aunque,\npor lo general, las mantiene ocultas."
          shield: "El fuerte instinto protector de los machos los\nlleva a liberar todo su poder cuando se trata de\ndefenderse a sí mismos o a su Entrenador."
        ko:
          sword: "귀 안쪽의 눈알 모양에서\n사이코 파워를 내지만 평소에는\n그 힘을 숨기고 있다."
          shield: "수컷은 방어 본능이 강해서\n자신과 파트너를 지킬 때\n최대의 파워를 쓴다."
        zh_simp:
          sword: "会从耳朵内侧眼珠花纹的地方\n释放出精神力量，但平时\n会将那种力量隐藏起来。"
          shield: "雄性的防卫本能很强，\n在保护自己和伙伴时\n能发挥最大的威力。"
        zh_trad:
          sword: "會從耳朵內側眼珠花紋的地方\n釋放出精神力量，但平時\n會將那種力量隱藏起來。"
          shield: "雄性的防衛本能很強，\n在保護自己和夥伴時\n能發揮最大的威力。"
    meowstic_female:
      form_id: 1
      names:
        jp_kana: メスのすがた
        jp_kanji: メスのすがた
        en: Female
        fr: Femelle
        it: Femmina
        de: Weiblich
        es: Hembra
        ko: 암컷의 모습
        zh_simp: 雌性的样子
        zh_trad: 雌性的樣子
      base_stats:
        hp: 74
        attack: 48
        defense: 76
        special_attack: 83
        special_defense: 81
        speed: 104
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 2
      types:
        - psychic
      egg_groups:
        - field
      abilities:
        - keen_eye
        - infiltrator
      hidden_ability: competitive
      descriptions:
        jp_kana:
          sword: "オスに　くらべて　すこし　わがままで\nこうげきてき。　きげんを　そこねると\nサイコパワーで　いためつけられる。"
          shield: "サイコパワーを　むせいげんで　だすと\nタンカーを　ひきちぎる　いりょく。\nぶあいそうな　ところも　みりょく。"
        jp_kanji:
          sword: "オスに　比べて　すこし　わがままで\n攻撃的。　機嫌を　損ねると\nサイコパワーで　痛めつけられる。"
          shield: "サイコパワーを　無制限で　出すと\nタンカーを　引きちぎる　威力。\n不愛想な　ところも　魅力。"
        en:
          sword: "Females are a bit more selfish and aggressive\nthan males. If they don’t get what they want,\nthey will torment you with their psychic abilities."
          shield: "If it doesn’t hold back when it unleashes its\npsychic power, it can tear apart a tanker.\nIts unfriendliness is part of its charm."
        fr:
          sword: "Les femelles sont un peu plus agressives et\négoïstes que les mâles. Quand elles sont fâchées,\nelles se vengent avec leurs pouvoirs psychiques."
          shield: "Ses pouvoirs psychiques sont assez puissants pour\ndétruire un pétrolier s’il les utilise sans retenue.\nIl est grognon, mais c’est ce qui fait son charme."
        it:
          sword: "La femmina è un po’ più capricciosa e aggressiva\ndel maschio. Con i suoi poteri psichici concia\nper le feste i seccatori."
          shield: "Se sprigiona tutto il suo potere psichico, ha una\npotenza tale da distruggere una petroliera. Ha un\ncarattere scostante, ma fa parte del suo fascino."
        de:
          sword: "Weibliche Psiaugon sind etwas aggressiver und\neigensinniger als männliche. Wer ihnen die Laune\nverdirbt, bekommt ihre Psycho-Kräfte zu spüren."
          shield: "Setzen sie ihre Psycho-Kräfte ungezügelt frei,\nkönnen sie damit ganze Öltanker versenken.\nIhre mürrische Natur macht ihren Charme aus."
        es:
          sword: "Son ligeramente más agresivas y egoístas que\nlos machos. Castigan sin piedad con sus poderes\npsíquicos a quienes las enojen."
          shield: "Cuando libera todo su poder psíquico, su fuerza\npuede hacer trizas un petrolero. Su carácter\narisco forma parte de su encanto."
        ko:
          sword: "수컷보다 살짝 더 제멋대로이고\n공격적이다. 기분이 상하면\n사이코 파워로 괴롭힌다."
          shield: "사이코 파워를 무제한으로 내뿜으면\n유조선을 가를 정도의 위력을 낸다.\n무뚝뚝한 점도 매력이다."
        zh_simp:
          sword: "性格要比雄性更任性一些，\n而且也更具攻击性。要是惹得它不高兴，\n就会被它用精神力量狠狠教训。"
          shield: "如果它毫无顾忌地使用精神力量，\n就会产生能撕碎游轮的威力。\n对人冷淡的态度也是其魅力所在。"
        zh_trad:
          sword: "性格要比雄性更任性一些，\n而且也更具攻擊性。要是惹得牠不高興，\n就會被牠用精神力量狠狠教訓。"
          shield: "如果牠毫無顧忌地使用精神力量，\n就會產生能撕碎油輪的威力。\n對人冷淡的態度也是其魅力所在。"
honedge:
  species_id: 679
  names:
    jp_kana: ヒトツキ
    jp_kanji: ヒトツキ
    en: Honedge
    fr: Monorpale
    it: Honedge
    de: Gramokles
    es: Honedge
    ko: 단칼빙
    zh_simp: 独剑鞘
    zh_trad: 獨劍鞘
  forms:
    honedge:
      form_id: 0
      base_stats:
        hp: 45
        attack: 80
        defense: 100
        special_attack: 35
        special_defense: 37
        speed: 28
      evs_yield:
        hp: 0
        attack: 0
        defense: 1
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - steel
        - ghost
      egg_groups:
        - mineral
      abilities:
        - no_guard
      descriptions:
        jp_kana:
          sword: "おおむかし　この　つるぎに　よって\nころされた　にんげんの　たましいが\nヒトツキの　たましいに　なっている。"
          shield: "つるぎの　つばの　あおい　めだまが\nヒトツキの　ほんたい。　ふるびた\nぬので　ひとの　せいきを　すいとる。"
        jp_kanji:
          sword: "大昔　この　剣に　よって\n殺された　人間の　魂が\nヒトツキの　魂に　なっている。"
          shield: "剣の　鍔の　青い　目玉が\nヒトツキの　本体。　古びた\n布で　人の　生気を　吸い取る。"
        en:
          sword: "Honedge’s soul once belonged to a person who\nwas killed a long time ago by the sword that\nmakes up Honedge’s body."
          shield: "The blue eye on the sword’s handguard is the\ntrue body of Honedge. With its old cloth, it\ndrains people’s lives away."
        fr:
          sword: "L’âme de Monorpale est celle d’un humain\nqui a été tué il y a fort longtemps, par la même\nlame qui forme maintenant son corps."
          shield: "L’œil bleu sur la garde de la lame est le véritable\ncorps de Monorpale. Il aspire l’énergie vitale\ndes gens avec son étoffe usée par le temps."
        it:
          sword: "La sua anima è quella di un essere umano ucciso\ntanto tempo fa dalla spada che ora forma\nil suo corpo."
          shield: "L’occhio blu sull’elsa della spada è il suo\nvero corpo. Usa il drappo consunto per\nassorbire la forza vitale degli uomini."
        de:
          sword: "Seine Seele ist die eines Menschen, der vor\nlanger Zeit durch dieses Schwert getötet wurde."
          shield: "Das blaue Auge auf der Parierstange ist sein\nwahrer Körper. Mithilfe eines alten Tuchs\nabsorbiert es die Lebenskraft von Menschen."
        es:
          sword: "Su alma es la de un ser humano que poseyó la\nmisma espada que lo abatió en tiempos remotos."
          shield: "El ojo azul de la empuñadura es su verdadero\ncuerpo. Absorbe la energía vital de las personas\ncon su paño de aspecto andrajoso."
        ko:
          sword: "먼 옛날에 이 검에 의해\n죽은 인간의 영혼이\n단칼빙의 영혼이 되었다."
          shield: "검의 가드 부분에 있는 푸른 눈동자가\n단칼빙의 본체다. 낡은 천으로\n사람의 생기를 빨아들인다."
        zh_simp:
          sword: "很久以前因这把剑\n而丧命之人的灵魂\n成为了独剑鞘的灵魂。"
          shield: "独剑鞘剑格上的\n蓝色眼珠是它的本体。\n会用陈旧的布吸取人类的精气。"
        zh_trad:
          sword: "很久以前因這把劍\n而喪命之人的靈魂\n成為了獨劍鞘的靈魂。"
          shield: "獨劍鞘護手上的\n藍色眼珠是牠的本體。\n會用陳舊的布吸取人類的精氣。"
doublade:
  species_id: 680
  names:
    jp_kana: ニダンギル
    jp_kanji: ニダンギル
    en: Doublade
    fr: Dimoclès
    it: Doublade
    de: Duokles
    es: Doublade
    ko: 쌍검킬
    zh_simp: 双剑鞘
    zh_trad: 雙劍鞘
  forms:
    doublade:
      form_id: 0
      base_stats:
        hp: 59
        attack: 110
        defense: 150
        special_attack: 45
        special_defense: 49
        speed: 35
      evs_yield:
        hp: 0
        attack: 0
        defense: 2
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - steel
        - ghost
      egg_groups:
        - mineral
      abilities:
        - no_guard
      descriptions:
        jp_kana:
          sword: "しんかして　ふたごに　なった。\nやいばを　こすりあわせて　ならす\nきんぞくおんで　あいてを　いかく。"
          shield: "２ほんの　つるぎは　こうげきと\nぼうぎょが　めまぐるしく　いれかわる\nせんぽうで　えものを　しとめる。"
        jp_kanji:
          sword: "進化して　双子に　なった。\n刃を　擦り合わせて　鳴らす\n金属音で　相手を　威嚇。"
          shield: "２本の　剣は　攻撃と\n防御が　目まぐるしく　入れ替わる\n戦法で　獲物を　しとめる。"
        en:
          sword: "Honedge evolves into twins. The two blades\nrub together to emit a metallic sound that\nunnerves opponents."
          shield: "The two swords employ a strategy of rapidly\nalternating between offense and defense to\nbring down their prey."
        fr:
          sword: "Il s’est dédoublé en évoluant.\nIl intimide ses ennemis à grands coups de bruits\nmétalliques en entrechoquant ses deux lames."
          shield: "Ses deux lames abattent leurs proies\nen enchaînant les attaques et les parades\nà un rythme effréné."
        it:
          sword: "Si è duplicato con l’evoluzione. Minaccia\nl’avversario con il suono metallico che\nproduce sfregando le sue due lame."
          shield: "Le due spade abbattono la preda alternando\nmosse di attacco e di difesa a un ritmo\nvertiginoso."
        de:
          sword: "Bei der Entwicklung hat es sich verdoppelt. Es\nreibt seine Klingen aneinander, um Gegner mit\neinem metallenen Geräusch einzuschüchtern."
          shield: "Seine zwei Schwerter wechseln sich in einer\nhektischen Aufeinanderfolge von Angriff und\nVerteidigung ab, um seine Beute zu erlegen."
        es:
          sword: "Su espada se duplicó durante su proceso de\nevolución. Intimida a los rivales con el chirrido\nmetálico que produce al frotar ambas hojas."
          shield: "Su táctica para abatir a las presas consiste en\nalternar ataque y defensa de forma frenética\nentre ambas espadas."
        ko:
          sword: "진화해서 쌍둥이가 되었다.\n칼날을 맞부딪혀서 내는\n금속음으로 상대를 위협한다."
          shield: "2자루의 검이 공격과 방어를\n어지러울 정도로 빠르게 바꾸는\n전법으로 먹이의 숨통을 끊는다."
        zh_simp:
          sword: "进化之后变成了双胞胎。\n用互相摩擦剑刃发出的\n金属音来威吓对手。"
          shield: "２把剑会用令人眼花缭乱的\n速度不断交替攻击和防御，\n借以制服猎物。"
        zh_trad:
          sword: "進化之後變成了雙胞胎。\n用互相摩擦劍刃發出的\n聲音來威嚇對手。"
          shield: "２把劍會用令人眼花繚亂的\n速度不斷交替攻擊和防禦，\n藉以制服獵物。"
