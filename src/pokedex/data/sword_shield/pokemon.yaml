      held_items:
        common: star_piece
        rare: star_piece
      descriptions:
        jp_kana:
          sword: "１０００ねんに　いちど　きよらかな\nうたごえを　きくことで　７にちの\nあいだ　だけ　めを　さます。"
          shield: "１０００ねんの　ねむりから　めざめた\nとき　あたまの　たんざくに　かかれた\nねがいごとを　かなえる　という。"
        jp_kanji:
          sword: "１０００年に　一度　清らかな\n歌声を　聞くことで　７日の\nあいだ　だけ　目を　覚ます。"
          shield: "１０００年の　眠りから　目覚めた\nとき　頭の　短冊に　書かれた\n願い事を　かなえる　という。"
        en:
          sword: "Once every 1,000 years, the singing of a pure\nvoice will rouse this Pokémon from its near-\nperpetual slumber. It wakes for only seven days."
          shield: "It’s believed that when this Pokémon wakes from\nits 1,000-year slumber, it will grant any wishes\nwritten on the notes attached to its head."
        fr:
          sword: "Une fois tous les mille ans, le chant d’une voix\npure le tire de son sommeil pour sept jours\nseulement."
          shield: "On raconte que lorsqu’il se réveille de\nson sommeil millénaire, il exauce les vœux\nécrits sur les rubans de papier de sa tête."
        it:
          sword: "Una volta ogni mille anni, si sveglia per sette\ngiorni al canto di una voce pura e cristallina."
          shield: "Si dice che, al risveglio dal suo sonno millenario,\nrealizzi i desideri scritti sui bigliettini attaccati\nalla sua testa."
        de:
          sword: "Durch den Klang einer reinen Singstimme kann es\nein Mal alle 1 000 Jahre für genau sieben Tage\naus seinem Schlaf erwachen."
          shield: "Es heißt, wenn es aus seinem tausendjährigen\nSchlaf erwacht, erfüllt es die Wünsche, die auf\ndie Zettel an seinem Kopf geschrieben wurden."
        es:
          sword: "El son de un canto puro y cristalino puede\ndespertarlo de su sueño durante siete días\nuna vez cada mil años."
          shield: "Se dice que concederá los deseos escritos en\nlas notas de su cabeza cuando se despierte de\nsu sueño milenario."
        ko:
          sword: "1000년에 한 번 밝고 맑은\n노랫소리를 듣고\n7일 동안 눈을 뜬다."
          shield: "1000년의 잠에서 깨어났을 때\n머리의 종이에 쓰인 소원을\n이루어준다고 한다."
        zh_simp:
          sword: "每１０００年让它听一次\n清澈的歌声，就能让它\n维持７天的清醒。"
          shield: "传说当它从１０００年的\n沉睡中醒来时，会实现\n写在它头部许愿笺上的愿望。"
        zh_trad:
          sword: "每１０００年讓牠聽一次\n清澈的歌聲，就能讓牠\n維持７天的清醒。"
          shield: "傳說當牠從１０００年的\n沉睡中醒來時，會實現\n寫在牠頭部許願箋上的願望。"
shinx:
  species_id: 403
