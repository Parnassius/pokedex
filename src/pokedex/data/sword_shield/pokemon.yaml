      descriptions:
        jp_kana:
          sword: "しっぽで　じぶんの　からだを\nたたきだしたら　きけんだぞ。\nもうスピードで　つっこんでくる。"
          shield: "ガラルに　くらす　ケンタロスは\nきしょうが　あらく　にんげんが\nせに　のることを　ゆるさない。"
        jp_kanji:
          sword: "しっぽで　自分の　体を\n叩きだしたら　危険だぞ。\n猛スピードで　突っ込んでくる。"
          shield: "ガラルに　暮らす　ケンタロスは\n気性が　荒く　人間が\n背に　乗ることを　許さない。"
        en:
          sword: "When Tauros begins whipping itself with its tails,\nit’s a warning that the Pokémon is about to\ncharge with astounding speed."
          shield: "The Tauros of the Galar region are volatile in\nnature, and they won’t allow people to ride on\ntheir backs."
        fr:
          sword: "Il faut prendre garde quand un Tauros fouette\nson corps avec ses queues. Cela signifie qu’il\ns’apprête à charger à une vitesse démentielle."
          shield: "Les Tauros vivant à Galar ont un tempérament\nviolent et ne tolèrent pas que les êtres humains\nmontent sur leur dos."
        it:
          sword: "Quando comincia a frustarsi con le sue stesse\ncode è pericoloso, in quanto è segno che sta\nper partire alla carica a tutta velocità."
          shield: "I Tauros che vivono a Galar hanno un’indole\nviolenta e non tollerano che gli esseri umani\nsalgano loro in groppa."
        de:
          sword: "Peitscht es seinen Körper mit seinen Schweifen\naus, ist Vorsicht geboten, denn es steht kurz\ndavor, mit Karacho auf sein Ziel loszustürmen."
          shield: "Die Tauros in Galar haben ein ungestümes\nTemperament und gestatten es Menschen nicht,\nauf ihrem Rücken zu reiten."
        es:
          sword: "Conviene tener cuidado si empieza a fustigarse\ncon las colas, pues es señal de que va a cargar a\nmáxima velocidad."
          shield: "Los Tauros que habitan en la región de Galar son\nde temperamento irascible y no permiten que los\nhumanos monten en su lomo."
        ko:
          sword: "꼬리로 자신의 몸을\n때리기 시작하면 위험하다.\n맹렬한 스피드로 덤벼든다."
          shield: "가라르에 서식하는 켄타로스는\n기질이 거칠어서 사람이 등에\n올라타는 것을 허용하지 않는다."
        zh_simp:
          sword: "如果它开始用尾巴拍打\n自己的身体，那就危险了。\n它会以极快的速度猛撞过来。"
          shield: "栖息在伽勒尔的肯泰罗\n性格暴躁，决不允许\n人类骑在自己的背上。"
        zh_trad:
          sword: "如果牠開始用尾巴抽打\n自己的身體，那就危險了。\n牠會用驚人的速度猛衝過來喔。"
          shield: "棲息在伽勒爾的肯泰羅\n性格暴躁，絕不會允許\n人類騎到自己的背上。"
magikarp:
  species_id: 129
  names:
    jp_kana: コイキング
    jp_kanji: コイキング
    en: Magikarp
    fr: Magicarpe
    it: Magikarp
    de: Karpador
    es: Magikarp
    ko: 잉어킹
    zh_simp: 鲤鱼王
    zh_trad: 鯉魚王
  forms:
    magikarp:
      form_id: 0
      base_stats:
        hp: 20
        attack: 10
        defense: 55
        special_attack: 15
        special_defense: 20
        speed: 80
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - water
      egg_groups:
        - water_2
        - dragon
      abilities:
        - swift_swim
      hidden_ability: rattled
      descriptions:
        jp_kana:
          sword: "ちからも　スピードも　ほとんどダメ。\nせかいで　いちばん　よわくて\nなさけない　ポケモンだ。"
          shield: "ながれの　はやい　ところでは\nただ　ながされて　いくだけの\nひよわで　なさけない　ポケモン。"
        jp_kanji:
          sword: "力も　スピードも　ほとんどダメ。\n世界で　一番　弱くて\n情けない　ポケモンだ。"
          shield: "流れの　速い　ところでは\nただ　流されて　いくだけの\nひ弱で　情けない　ポケモン。"
        en:
          sword: "It is virtually worthless in terms of both power\nand speed. It is the most weak and pathetic\nPokémon in the world."
          shield: "This weak and pathetic Pokémon gets easily\npushed along rivers when there are strong currents."
        fr:
          sword: "Il manque totalement de vitesse et de force.\nC’est le Pokémon le plus pathétique au monde."
          shield: "Ce Pokémon est si faible que, dans les eaux\nà forts courants, il se contente de se laisser\nporter lamentablement."
        it:
          sword: "La sua forza e velocità sono praticamente nulle.\nSi può tranquillamente definire il più debole e\npatetico Pokémon del mondo."
          shield: "Un Pokémon debole e patetico: non fa che\nlasciarsi trascinare dove lo porta la corrente."
        de:
          sword: "Es ist nutzlos, was Kraft und Geschwindigkeit\nangeht. Dieses Pokémon ist das schwächste und\nerbärmlichste der Welt."
          shield: "Dieses Pokémon ist so schwach und erbärmlich,\ndass es sich in Gewässern mit starker Strömung\neinfach vom Wasser treiben lässt."
        es:
          sword: "Es el Pokémon más débil y patético que existe,\ncon una fuerza y velocidad prácticamente nulas."
          shield: "Este Pokémon débil y patético se limita a dejarse\nllevar por la corriente cuando esta tiene fuerza."
        ko:
          sword: "힘도 스피드도 거의 없다.\n세상에서 가장 약하고\n한심한 포켓몬이다."
          shield: "유속이 빠른 곳에서는\n그저 떠내려갈 뿐인\n약하고 한심한 포켓몬이다."
        zh_simp:
          sword: "力量和速度几乎都不行。\n是世界上最弱最可怜的宝可梦。"
          shield: "又弱又可怜的宝可梦。\n在水流比较快的地方\n只能任凭自己被水冲走。"
        zh_trad:
          sword: "力量和速度都不太行。\n是世界上最弱\n最可憐的寶可夢。"
          shield: "又弱又可憐的寶可夢。\n在水流比較快的地方，\n只能任憑自己被水沖走。"
gyarados:
