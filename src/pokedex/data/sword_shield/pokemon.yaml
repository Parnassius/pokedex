          shield: "鋼の　ツノが　変形して\nできた　大きな　アゴで\n相手に　がぶりと　噛みつくのだ。"
        en:
          sword: "It uses its docile-looking face to lull foes into\ncomplacency, then bites with its huge,\nrelentless jaws."
          shield: "It chomps with its gaping mouth. Its huge jaws are\nactually steel horns that have been transformed."
        fr:
          sword: "Trompés par son visage innocent, ses ennemis\nse font happer par ses énormes mâchoires\net ne peuvent plus s’échapper."
          shield: "Ses cornes d’acier forment une grande mâchoire\navec laquelle il mord férocement ses adversaires."
        it:
          sword: "Distrae i nemici con la sua faccia innocente,\nper poi azzannarli con le sue possenti mascelle.\nNon molla la presa a nessun costo."
          shield: "Le sue corna d’acciaio si sono trasformate in\nenormi mascelle, con cui morde i nemici."
        de:
          sword: "Mit seinem friedlichen Gesicht wiegt es Gegner\nin Sicherheit und beißt dann mit seinem riesigen\nKiefer zu. Danach gibt es kein Entkommen mehr."
          shield: "Sein riesiger Kiefer hat sich aus stählernen\nHörnern entwickelt. Mit ihm beißt es seine\nGegner."
        es:
          sword: "Con su cara inocente hace que el rival se confíe\ny, al bajar la guardia, le da un mordisco con sus\nenormes fauces del que no se puede liberar."
          shield: "Sus otrora cuernos de acero se han transformado\nen grandes fauces con las que muerde a sus\nenemigos."
        ko:
          sword: "얌전한 얼굴로 상대를 방심하게\n만들고 큰 턱으로 덥석 문다.\n한번 물면 절대로 놓지 않는다."
          shield: "강철의 뿔이 변형되어\n생긴 큰 턱으로\n상대를 덥석 문다."
        zh_simp:
          sword: "会用温顺的长相让对手大意，\n然后再用大颚一口咬住对手。\n咬住后就绝不会松口。"
          shield: "大嘴娃能用自己那由钢角\n变化而成的巨大颚部\n将对手一口紧紧咬住。"
        zh_trad:
          sword: "用溫順的長相讓對手大意，\n然後用大顎一口咬住對手。\n咬住後就絕不會鬆口。"
          shield: "大嘴娃能用自己那由鋼角\n變化而成的巨大顎部\n將對手一口緊緊咬住。"
aron:
  species_id: 304
  names:
    jp_kana: ココドラ
    jp_kanji: ココドラ
    en: Aron
    fr: Galekid
    it: Aron
    de: Stollunior
    es: Aron
    ko: 가보리
    zh_simp: 可可多拉
    zh_trad: 可可多拉
  forms:
    aron:
      form_id: 0
      base_stats:
        hp: 50
        attack: 70
        defense: 100
        special_attack: 40
        special_defense: 40
        speed: 30
      evs_yield:
        hp: 0
        attack: 0
        defense: 1
        special_attack: 0
        special_defense: 0
