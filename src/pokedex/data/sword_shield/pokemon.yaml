          sword: "かぶっているのは　パートナーの\nぼうし。　いろんな　せかいを　たびした\nおもいでが　たくさん　つまっている。"
          shield: "あいぼうの　ぼうしを　かぶっている。\nいろんな　せかいを　ともに　たびする\nたいせつな　あかし　なのだ。"
        jp_kanji:
          sword: "かぶっているのは　パートナーの\n帽子。　いろんな　せかいを　旅した\n思い出が　たくさん　詰まっている。"
          shield: "相棒の　帽子を　かぶっている。\nいろんな　世界を　ともに　旅する\nたいせつな　あかし　なのだ。"
        en:
          sword: "This Pikachu wears its partner’s cap, which is\nbrimming with memories of traveling through\ndifferent regions."
          shield: "This Pikachu is wearing its Trainer’s cap.\nThe cap is a precious symbol that travels across\ndifferent regions with Pikachu."
        fr:
          sword: "Il porte la casquette de son partenaire.\nElle lui rappelle leurs aventures dans\ndiverses régions."
          shield: "Un Pikachu qui porte la casquette\nde son partenaire, souvenir inestimable\nde leurs voyages dans diverses régions."
        it:
          sword: "Indossa il cappello del suo inseparabile amico.\nGli ricorda le avventure vissute durante i loro\nviaggi in varie regioni."
          shield: "Indossa il cappello del suo amato Allenatore\nin ricordo delle avventure vissute durante i loro\nviaggi in varie regioni."
        de:
          sword: "Die Kappe, die es trägt, gehört seinem Partner.\nSie steckt voller Erinnerungen an ihre Abenteuer\nin verschiedenen Regionen."
          shield: "Es trägt die Kappe seines Partners. Sie ist ein\nkostbares Andenken an die Abenteuer, die sie in\nverschiedenen Regionen zusammen erlebt haben."
        es:
          sword: "La gorra que lleva pertenece a su compañero\ny le trae gratos recuerdos de sus viajes por\nmultitud de regiones."
          shield: "Lleva puesta la gorra de su compañero, recuerdo\nde las innumerables aventuras que vivieron en\nmultitud de regiones."
        ko:
          sword: "쓰고 있는 것은 파트너의\n모자다. 세계 여러 곳을 여행한\n추억이 가득 담겨 있다."
          shield: "파트너의 모자를 쓰고 있다.\n여러 세계를 함께 여행하는\n소중한 증표다."
        zh_simp:
          sword: "戴着的是伙伴训练家的帽子。\n帽子上承载着许许多多\n在世界各地旅行时的回忆。"
          shield: "戴着搭档训练家的帽子。\n这顶帽子是与搭档一起在\n各种世界里游历的重要证明。"
        zh_trad:
          sword: "戴著的是夥伴訓練家的帽子。\n帽子上承載著許許多多\n在各種世界冒險的回憶。"
          shield: "戴著搭檔訓練家的帽子。\n這頂帽子是與搭檔一起\n在各種世界旅行的重要證明。"
  gmax_forms:
    pikachu_gigantamax:
      form_id: 999
      names:
        jp_kana: キョダイマックス
        jp_kanji: キョダイマックス
        en: Gigantamax
        fr: Gigamax
        it: Gigamax
        de: Gigadynamax
        es: Gigamax
        ko: 거다이맥스
        zh_simp: 超极巨化
        zh_trad: 超極巨化
      descriptions:
        jp_kana:
          sword: "ぼうちょうした　キョダイマックスの\nパワーによって　からだが　ふくれて\nそらまで　のびる　しっぽに　なった。"
          shield: "カミナリの　しっぽを　たたきつけると\nらくらいに　ひってきする　でんあつと\nでんりゅうが　あいてを　つらぬく。"
        jp_kanji:
          sword: "膨張した　キョダイマックスの\nパワーによって　体が　ふくれて\n空まで　伸びる　しっぽに　なった。"
          shield: "カミナリの　しっぽを　叩きつけると\n落雷に　匹敵する　電圧と\n電流が　相手を　つらぬく。"
        en:
          sword: "Its Gigantamax power expanded, forming its\nsupersized body and towering tail."
          shield: "When it smashes its opponents with its bolt-\nshaped tail, it delivers a surge of electricity\nequivalent to a lightning strike."
        fr:
          sword: "L’énergie du phénomène Gigamax l’a tellement\nfait grossir que sa queue touche le ciel."
          shield: "Un coup de sa queue en forme d’éclair donne\nà l’adversaire un choc électrique ayant l’intensité\net la tension de la foudre qui tombe."
        it:
          sword: "L’energia del fenomeno Gigamax ha ingigantito\nil suo corpo a tal punto che la sua coda arriva\nfino al cielo."
          shield: "Con un colpo della sua coda a forma di saetta\ntrasmette all’avversario una scarica elettrica\ndall’intensità e dal voltaggio di un fulmine."
        de:
          sword: "Durch die Gigadynamax-Energie ist sein Körper\nso stark gewachsen, dass sein Schweif nun bis in\nden Himmel ragt."
          shield: "Schlägt es mit seinem blitzförmigen Schweif zu,\nfahren die Elektrizität und die Spannung eines\neinschlagenden Blitzes durch den Gegner."
        es:
          sword: "La energía del fenómeno Gigamax ha hecho\nque su cuerpo se expanda y que su cola pueda\nestirarse hasta alcanzar el cielo."
          shield: "Un golpe con su cola en forma de rayo puede\npropinar al rival una descarga eléctrica con una\nintensidad comparable a la de un relámpago."
        ko:
          sword: "팽창한 거다이맥스의\n파워에 의해 몸이 부풀어서\n꼬리가 하늘까지 닿게 되었다."
          shield: "번개 꼬리를 세차게 내려치면\n낙뢰에 필적하는 전압과\n전류가 상대를 관통한다."
        zh_simp:
          sword: "膨胀的超极巨化之力\n使得它的身体变大，\n尾巴也变得高耸入云。"
          shield: "当它用闪电状的尾巴击中\n目标时，不亚于雷击的电压\n及电流便会贯穿对方的全身。"
        zh_trad:
          sword: "膨脹的超極巨化之力\n使得牠的身體變大，\n尾巴也變得高聳入雲。"
          shield: "當牠用閃電狀的尾巴擊中目標時，\n不亞於雷擊的電壓和電流\n便會貫穿對方的全身。"
raichu:
  species_id: 26
  names:
    jp_kana: ライチュウ
    jp_kanji: ライチュウ
    en: Raichu
    fr: Raichu
    it: Raichu
    de: Raichu
    es: Raichu
    ko: 라이츄
    zh_simp: 雷丘
    zh_trad: 雷丘
  forms:
    raichu:
      form_id: 0
      base_stats:
        hp: 60
        attack: 90
        defense: 55
        special_attack: 90
        special_defense: 80
        speed: 110
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 3
      types:
        - electric
      egg_groups:
        - field
        - fairy
      abilities:
        - static
      hidden_ability: lightning_rod
      descriptions:
        jp_kana:
          sword: "ながい　しっぽが　アースになって\nみを　まもるため　じぶんじしんは\nこうでんあつにも　しびれないのだ。"
          shield: "でんきぶくろが　からっぽに　なると\nしっぽを　まっすぐ　たてて\nくうきちゅうの　でんきを　あつめる。"
        jp_kanji:
          sword: "長い　しっぽが　アースになって\n身を　守るため　自分自身は\n高電圧にも　痺れないのだ。"
          shield: "電気袋が　空っぽに　なると\nしっぽを　まっすぐ　立てて\n空気中の　電気を　集める。"
        en:
          sword: "Its long tail serves as a ground to protect itself\nfrom its own high-voltage power."
          shield: "If its electric pouches run empty, it raises its tail\nto gather electricity from the atmosphere."
        fr:
          sword: "Sa longue queue agit comme une prise de terre\nqui l’empêche d’être affecté par le courant\nà haute tension accumulé dans son corps."
          shield: "Si ses joues sont à court d’énergie, il lève la queue\net capte l’électricité contenue dans l’atmosphère."
        it:
          sword: "La sua lunga coda serve da messa a terra per\nproteggerlo dalla sua stessa alta tensione."
          shield: "Quando le sacche elettriche sono scariche,\nrizza la coda per raccogliere elettricità\ndall’atmosfera."
        de:
          sword: "Sein langer Schweif dient ihm zur Erdung.\nSo bleibt es von der lähmenden Wirkung von\nHochspannung selbst verschont."
          shield: "Wenn der in seinen Backentaschen gespeicherte\nStrom leer ist, stellt es seinen Schweif auf, um\nElektrizität aus der Luft zu ziehen."
        es:
          sword: "Su larga cola le sirve como toma de tierra para\nprotegerse a sí mismo del alto voltaje que genera\nsu cuerpo."
          shield: "Cuando ha descargado las bolsas de las mejillas,\nlevanta la cola y absorbe la carga eléctrica que\nhay en el ambiente."
        ko:
          sword: "긴 꼬리가 어스가 되어\n몸을 지키기 때문에 자신은\n고전압에도 마비되지 않는다."
          shield: "전기 주머니가 텅 비면\n꼬리를 똑바로 세워서\n공기 중의 전기를 모은다."
        zh_simp:
          sword: "长长的尾巴能够像接地线\n一样保护自己，因此即使\n是高压电也不会让它麻痹。"
          shield: "如果电囊空了，\n它就会直直地竖起尾巴，\n收集空气中的电流。"
        zh_trad:
          sword: "長長的尾巴能夠像接地線\n一樣保護自己，因此即使\n是高壓電也不會讓牠麻痺。"
          shield: "如果電囊空了，\n牠就會直直地豎起尾巴，\n收集空氣中的電流。"
    raichu_alolan_form:
      form_id: 1
      names:
        jp_kana: アローラのすがた
        jp_kanji: アローラのすがた
        en: Alolan Form
        fr: Forme d’Alola
        it: Forma di Alola
        de: Alola-Form
        es: Forma de Alola
        ko: 알로라의 모습
        zh_simp: 阿罗拉的样子
        zh_trad: 阿羅拉的樣子
      base_stats:
        hp: 60
        attack: 85
        defense: 50
        special_attack: 95
        special_defense: 85
        speed: 110
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 3
      types:
        - electric
        - psychic
      egg_groups:
        - field
        - fairy
      abilities:
        - surge_surfer
      descriptions:
        jp_kana:
          sword: "アローラちほうの　きこうと　ふうどと\nエサが　げんいんで　この　すがたに\nしんかすると　かんがえられている。"
          shield: "しっぽに　のって　サイコパワーで\nふゆうしながら　ほしがたに　つくった\n１０まんボルトで　こうげきする。"
        jp_kanji:
          sword: "アローラ地方の　気候と　風土と\nエサが　原因で　この　姿に\n進化すると　考えられている。"
          shield: "しっぽに　乗って　サイコパワーで\n浮遊しながら　星形に　作った\n１０万ボルトで　攻撃する。"
        en:
          sword: "It’s believed that the weather, climate, and food\nof the Alola region all play a part in causing\nPikachu to evolve into this form of Raichu."
          shield: "This Pokémon rides on its tail while it uses\nits psychic powers to levitate. It attacks with\nstar-shaped thunderbolts."
        fr:
          sword: "Les chercheurs supposent qu’il a évolué ainsi\nà cause de la nourriture et du climat d’Alola."
          shield: "Il monte sur sa queue, qu’il fait léviter avec\nses pouvoirs psychiques, et lance de puissantes\nattaques électriques en forme d’étoile."
        it:
          sword: "Si pensa che la sua evoluzione in questa forma\nparticolare sia dovuta al cibo, all’ambiente e\nal clima della regione di Alola."
          shield: "Fluttua a mezz’aria sulla coda grazie ai suoi\npoteri psichici e attacca con fulmini a forma\ndi stella."
        de:
          sword: "Man vermutet, das Wetter, das Klima und die\nNahrungsmittel der Alola-Region seien der Grund\nfür diese Entwicklung."
          shield: "Dieses Pokémon steht auf seinem Schweif und\nnutzt seine Psycho-Kräfte, um zu schweben.\nEs greift mit sternförmigen Donnerblitzen an."
        es:
          sword: "Se cree que Raichu adoptó esta forma en Alola\ndebido a las distintas condiciones topográficas,\nmeteorológicas y alimentarias de la región."
          shield: "Se sube a su cola y usa sus poderes psíquicos\npara desplazarse flotando mientras ataca con\npoderosos rayos en forma de estrella."
        ko:
          sword: "알로라지방의 기후와 풍토\n그리고 먹이가 이런 모습으로\n진화하게 된 원인으로 여겨지고 있다."
          shield: "꼬리를 타고 사이코 파워로\n떠올라서 별 모양으로 만든\n10만볼트로 공격한다."
        zh_simp:
          sword: "人们认为，它会进化成这个样子，\n是受到了阿罗拉地区的气候、\n风土以及食物的影响。"
          shield: "它会站在自己的尾巴上，\n用精神力量飘浮在空中，同时用\n做成星形的十万伏特攻击对手。"
        zh_trad:
          sword: "人們認為，牠會進化成這個樣子，\n是受到了阿羅拉地區的氣候、\n風土以及食物的影響。"
          shield: "牠會站在自己的尾巴上，\n用精神力量飄浮在空中，同時用\n做成星形的十萬伏特攻擊對手。"
