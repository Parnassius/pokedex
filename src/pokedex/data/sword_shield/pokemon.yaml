      descriptions:
        jp_kana:
          sword: "みるもの　すべての　マネを　する。\nバリコオルの　かれいな　ステップを\nひたすら　マネして　れんしゅうする。"
          shield: "ダンスの　うまい　バリコオルに\nでしの　ように　つきしたがい\nステップを　けんめいに　マネする。"
        jp_kanji:
          sword: "見るもの　すべての　真似を　する。\nバリコオルの　華麗な　ステップを\nひたすら　真似して　練習する。"
          shield: "ダンスの　うまい　バリコオルに\n弟子の　ように　付き従い\nステップを　懸命に　真似する。"
        en:
          sword: "It mimics everyone it sees, but it puts extra\neffort into copying the graceful dance steps\nof Mr. Rime as practice."
          shield: "It looks for a Mr. Rime that’s a good dancer\nand carefully copies the Mr. Rime’s steps\nlike an apprentice."
        fr:
          sword: "Il mime tout ce qu’il voit, et s’entraîne beaucoup\npour reproduire les pas de danse élégants\ndes M. Glaquette."
          shield: "Il considère les meilleurs danseurs parmi\nles M. Glaquette comme ses maîtres\net s’évertue à mimer leurs mouvements."
        it:
          sword: "Imita chiunque veda. Si esercita con costanza\nimitando gli splendidi passi di danza di Mr. Rime."
          shield: "Considera Mr. Rime il proprio maestro\nper le sue doti di ballerino, e ne imita\ndiligentemente i passi di danza."
        de:
          sword: "Dieses Pokémon ahmt alles nach, was es sieht. Es\nübt, indem es fleißig die herrlichen Tanzschritte\nvon Pantifrost imitiert."
          shield: "Es folgt dem talentierten Tänzer Pantifrost wie\nein Schüler und imitiert seine Schritte."
        es:
          sword: "Imita todo lo que ve, especialmente los gráciles\npasos de baile de Mr. Rime, que practica con\ngran tesón."
          shield: "Su admiración por Mr. Rime, un consumado\ndanzarín, lo lleva a seguirlo para aprender de él\ne imitar con esmero sus pasos de baile."
        ko:
          sword: "보이는 모든 것을 흉내 낸다.\n마임꽁꽁의 화려한 스텝을\n끊임없이 흉내 내며 연습한다."
          shield: "춤을 잘 추는 마임꽁꽁의\n제자인 것마냥 따라다니며\n스텝을 열심히 흉내 낸다."
        zh_simp:
          sword: "会模仿一切进入眼帘的事物。\n一心一意模仿踏冰人偶\n华丽的舞步，不停地练习。"
          shield: "像徒弟一样跟随着\n擅长跳舞的踏冰人偶，\n拼命模仿它的舞步。"
        zh_trad:
          sword: "會模仿一切映入眼簾的事物。\n一心一意模仿踏冰人偶\n華麗的舞步，不停地練習。"
          shield: "像徒弟一樣跟隨著\n擅長跳舞的踏冰人偶，\n拼命模仿牠的舞步。"
