      descriptions:
        jp_kana:
          sword: "ワタを　まきちらし　イタズラする。\nみずを　かけると　おもくなって\nうごけなくなり　かんねんするぞ。"
          shield: "ひのひかりを　あびるたび　ワタが\nふくらんでいく。　ふくらみすぎると\nちぎって　あたりに　まきちらす。"
        jp_kanji:
          sword: "綿を　まき散らし　イタズラする。\n水を　かけると　重くなって\n動けなくなり　観念するぞ。"
          shield: "日の光を　浴びるたび　綿が\n膨らんでいく。　膨らみすぎると\nちぎって　あたりに　まき散らす。"
        en:
          sword: "It scatters cotton all over the place as a prank. If\nit gets wet, it’ll become too heavy to move and\nhave no choice but to answer for its mischief."
          shield: "As long as this Pokémon bathes in sunlight, its\ncotton keeps growing. If too much cotton fluff\nbuilds up, Whimsicott tears it off and scatters it."
        fr:
          sword: "Il joue de mauvais tours en répandant son coton.\nSi on le mouille, il s’alourdit et ne peut plus\nbouger, ce qui l’oblige à s’avouer vaincu."
          shield: "Son coton se met à gonfler sous les rayons\ndu soleil. Quand il est trop volumineux,\nil s’effiloche et se répand aux alentours."
        it:
          sword: "Si diverte a spargere cotone ovunque. Se gli si\nversa dell’acqua addosso, diventa troppo\npesante per muoversi e si arrende."
          shield: "Il cotone sul suo corpo si gonfia con la luce\ndel sole. Quando diventa eccessivamente\nvoluminoso, si stacca disperdendosi ovunque."
        de:
          sword: "Es verstreut Watte, um Leute zu ärgern. Es hört\ndamit auf, wenn es nass wird, weil es dann zu\nschwer ist und sich nicht mehr bewegen kann."
          shield: "Sonnenlicht lässt seine Wolle anwachsen. Wird\ndas Volumen zu groß, zupft es die Wolle ab und\nverstreut sie überall in der Gegend."
        es:
          sword: "Este travieso Pokémon se divierte esparciendo\nbolas de algodón. Al mojarlo, su peso aumenta\ntanto que no logra moverse y se da por vencido."
          shield: "Su algodón se expande cuando recibe los rayos\ndel sol, pero acaba desprendiéndose si se vuelve\ndemasiado voluminoso."
        ko:
          sword: "솜을 흩뿌리며 장난을 친다.\n물을 끼얹으면 무거워져서\n움직일 수 없게 되어 포기한다."
          shield: "햇빛을 받을수록 솜이\n부풀어 오른다. 너무 부풀면\n찢어져 주위로 흩어진다."
        zh_simp:
          sword: "喜欢到处撒棉花捣蛋。\n沾水之后就会变重而\n动弹不得，只能听天由命。"
          shield: "每当沐浴阳光，身上的棉花\n就会膨胀。如果膨胀过了头，\n它就会把棉花扯开到处乱撒。"
        zh_trad:
          sword: "喜歡到處撒棉花搗蛋。\n沾水之後就會變重而\n動彈不得，只能聽天由命。"
          shield: "每當沐浴陽光，身上的棉花\n就會膨脹。如果膨脹過了頭，\n牠就會把棉花扯開到處亂撒。"
