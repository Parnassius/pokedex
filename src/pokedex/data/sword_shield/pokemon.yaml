        jp_kana:
          sword: "ほのおで　えものを　しとめる。\nついつい　やきすぎて　くろコゲに\nしてしまい　こうかいする。"
          shield: "ぜんしんが　つねに　もえている。\nかじを　おこす　げんいんの\nひとつとして　おそれられる。"
        jp_kanji:
          sword: "炎で　獲物を　しとめる。\nついつい　焼きすぎて\n黒コゲに　してしまい　後悔する。"
          shield: "全身が　つねに　燃えている。\n火事を　起こす　原因の\nひとつとして　恐れられる。"
        en:
          sword: "Magmar dispatches its prey with fire. But it\nregrets this habit once it realizes that it has\nburned its intended prey to a charred crisp."
          shield: "These Pokémon’s bodies are constantly burning.\nMagmar are feared as one of the causes\nbehind fires."
        fr:
          sword: "Il achève ses proies avec ses flammes, mais\nil lui arrive de les calciner accidentellement,\nà son plus grand regret."
          shield: "Tout son corps est en combustion permanente.\nIl est craint, car on dit qu’il cause des incendies."
        it:
          sword: "Abbatte le sue prede con le fiamme, ma finisce\nper carbonizzarle accidentalmente, con suo\ngrande rammarico."
          shield: "Il suo corpo è perennemente in fiamme.\nViene considerato una delle cause degli incendi,\ne per questo è temuto."
        de:
          sword: "Magmar erlegt seine Beute mit Feuer. Manchmal\nröstet es diese zu seinem Bedauern so stark,\ndass sie versehentlich verkohlt."
          shield: "Sein Körper ist ständig in Flammen gehüllt,\nwodurch es als eine Ursache von Bränden\ngefürchtet wird."
        es:
          sword: "Abate a sus presas con las llamas que genera y\ncon frecuencia acaba reduciéndolas a carbonilla\npor accidente."
          shield: "Un Pokémon cuyo cuerpo está siempre envuelto\nen llamas. Es temido porque se lo considera un\ncausante potencial de incendios."
        ko:
          sword: "불꽃으로 먹이를 꼼짝 못 하게 한다.\n무의식중에 너무 오래 익혀서\n까맣게 태우고는 후회한다."
          shield: "온몸이 늘 불타고 있다.\n화재를 일으키는 원인 중 하나로\n두려움의 대상이 되고 있다."
        zh_simp:
          sword: "会用火焰终结猎物的性命。不过\n经常掌握不好火候，一不小心就\n把猎物烧得焦黑，让自己后悔莫及。"
          shield: "全身时刻都在燃烧。\n大家认为它是引发火灾的\n原因之一，非常惧怕它。"
        zh_trad:
          sword: "會用火焰解決獵物。\n但是一不留神就會把獵物\n燒得太焦，然後才後悔。"
          shield: "全身時時刻刻都在燃燒。\n人們認為牠是引起火災的\n原因之一，非常畏懼牠。"
