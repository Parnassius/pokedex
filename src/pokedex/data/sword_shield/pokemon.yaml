      descriptions:
        jp_kana:
          sword: "こまかく　はやく　はばたいたら\nもうどくの　りんぷんが\nかぜに　のって　とんでくるぞ。"
          shield: "まいにち　ミツを　あつめまわる。\nあしの　うぶげに　ミツを　ぬりこんで\nすに　もちかえる　しゅうせいをもつ。"
        jp_kanji:
          sword: "こまかく　速く　羽ばたいたら\n猛毒の　りんぷんが\n風に　のって　飛んでくるぞ。"
          shield: "毎日　ミツを　集めまわる。\n脚の　産毛に　ミツを　塗りこんで\n巣に　持ち帰る　習性をもつ。"
        en:
          sword: "In battle, it flaps its wings at great speed to\nrelease highly toxic dust into the air."
          shield: "It collects honey every day. It rubs honey onto\nthe hairs on its legs to carry it back to its nest."
        fr:
          sword: "En combat, il bat des ailes très rapidement pour\nprojeter de la poudre toxique sur ses ennemis."
          shield: "Il ramasse du nectar chaque jour et l’agglutine\nsur les poils de ses pattes pour le transporter\njusqu’à son nid."
        it:
          sword: "Sbatte le ali a gran velocità per liberare\nle sue polveri tossiche nell’aria."
          shield: "Raccoglie nettare tutti i giorni e lo spalma sulla\npeluria che ricopre le sue zampe per trasportarlo\nal nido."
        de:
          sword: "Wenn es sehr schnell mit den Flügeln schlägt,\nsetzt es hochgiftigen Flügelstaub frei."
          shield: "Es sammelt täglich Honig. Es reibt ihn in seine\nBeinhaare, um ihn in sein Nest zu transportieren."
        es:
          sword: "Aletea a gran velocidad para lanzar al aire sus\nescamas extremadamente tóxicas."
          shield: "Recoge néctar a diario y se lo adhiere al pelo de\nlas patas para llevarlo a su nido."
        ko:
          sword: "매우 빠르게 날갯짓하면\n맹독성의 인분이\n바람을 타고 날아간다."
          shield: "매일 꿀을 모으러 다닌다.\n다리의 솜털에 꿀을 발라\n둥지로 가지고 가는 습성이 있다."
        zh_simp:
          sword: "当它飞快地扑打翅膀，\n带有剧毒的鳞粉就会\n随着风向这里飘过来。"
          shield: "每天都忙着采集花蜜。\n习惯往腿部的细毛上涂满花蜜，\n然后带回巢穴里。"
        zh_trad:
          sword: "當牠飛快地拍動翅膀，\n帶有劇毒的鱗粉就會\n隨著風向這裡飄過來。"
          shield: "每天都忙著採集花蜜。\n習慣在腿部的細毛上塗滿花蜜，\n然後帶回巢穴裡。"
  gmax_forms:
    butterfree_gigantamax:
      form_id: 999
      names:
        jp_kana: キョダイマックス
        jp_kanji: キョダイマックス
        en: Gigantamax
        fr: Gigamax
        it: Gigamax
        de: Gigadynamax
        es: Gigamax
        ko: 거다이맥스
        zh_simp: 超极巨化
        zh_trad: 超極巨化
      descriptions:
        jp_kana:
          sword: "キョダイマックスの　パワーが\nけっしょうとなり　まばゆく　ひかる\nもうどくの　りんぷんに　なっている。"
          shield: "１０トントラックをも　ふきとばす\nたつまきに　まきこみつつ　もうどくの\nりんぷんで　とどめを　さす。"
        jp_kanji:
          sword: "キョダイマックスの　パワーが\n結晶となり　まばゆく　光る\n猛毒の　りんぷんに　なっている。"
          shield: "１０トントラックをも　吹きとばす\n竜巻に　巻きこみつつ　猛毒の\nりんぷんで　とどめを　刺す。"
        en:
          sword: "Crystallized Gigantamax energy makes up this\nPokémon’s blindingly bright and highly\ntoxic scales."
          shield: "Once it has opponents trapped in a tornado that\ncould blow away a 10-ton truck, it finishes them\noff with its poisonous scales."
        fr:
          sword: "La puissance du phénomène Gigamax se cristallise\net forme une nuée d’écailles toxiques émettant\nune lumière aveuglante."
          shield: "Il soulève ses ennemis en provoquant un ouragan\nà même d’emporter des camions de dix tonnes,\npuis les achève avec ses écailles toxiques."
        it:
          sword: "L’energia del fenomeno Gigamax si è\ncristallizzata formando scaglie velenosissime\ndalla lucentezza accecante."
          shield: "Travolge il nemico con un tornado in grado di\nfar volare via un camion di 10 tonnellate e lo\nfinisce con le sue scaglie altamente tossiche."
        de:
          sword: "Die Gigadynamax-Energie kristallisiert sich und\nwird zu blendend leuchtendem, hochgiftigem\nFlügelstaub."
          shield: "Es zieht Gegner in eine Windhose, die selbst 10 t\nschwere Laster wegpusten könnte, und gibt ihnen\ndann mit hochgiftigem Flügelstaub den Rest."
        es:
          sword: "La energía del fenómeno Gigamax se cristaliza\nformando unas escamas tóxicas que emiten un\nfulgor cegador."
          shield: "Envuelve a sus enemigos en un remolino capaz\nde lanzar por los aires un camión de diez\ntoneladas y los remata con sus escamas tóxicas."
        ko:
          sword: "거다이맥스의 파워가\n결정이 되어 눈부시게 빛나는\n맹독성의 인분을 갖게 되었다."
          shield: "10톤 트럭도 날려버리는\n회오리에 소용돌이치게 하여\n맹독의 인분으로 숨통을 끊는다."
        zh_simp:
          sword: "超极巨化之力\n结晶化之后，变成了\n闪闪发亮的剧毒鳞粉。"
          shield: "会将敌人卷入甚至能吹飞\n１０吨卡车的龙卷风里，同时\n用剧毒的鳞粉给予致命一击。"
        zh_trad:
          sword: "超極巨化之力\n結晶化之後，變成了\n閃閃發亮的劇毒鱗粉。"
          shield: "會將敵人捲入甚至能吹飛\n１０噸卡車的龍捲風裡，同時\n用劇毒的鱗粉給予致命一擊。"
