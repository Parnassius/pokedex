      descriptions:
        jp_kana:
          sword: "おなじ　せいぶんでも　ローブシンが\nまぜた　コンクリートの　ほうが\nずっと　かたく　じょうぶだ。"
          shield: "ほんきに　なると　コンクリートの\nはしらを　すてさり　こぶしひとつで\nあいてに　めがけ　とびかかる。"
        jp_kanji:
          sword: "同じ　成分でも　ローブシンが\n混ぜた　コンクリートの　ほうが\nずっと　硬く　丈夫だ。"
          shield: "本気に　なると　コンクリートの\n柱を　捨て去り　拳ひとつで\n相手に　めがけ　とびかかる。"
        en:
          sword: "Concrete mixed by Conkeldurr is much more\ndurable than normal concrete, even when the\ncompositions of the two materials are the same."
          shield: "When going all out, this Pokémon throws aside\nits concrete pillars and leaps at opponents to\npummel them with its fists."
        fr:
          sword: "Le béton préparé par Bétochef est bien plus\nsolide qu’un béton ordinaire, même si les mêmes\ningrédients sont utilisés."
          shield: "Quand il décide de passer aux choses sérieuses,\nil jette ses piliers de béton et saute sur\nson adversaire pour le frapper du poing."
        it:
          sword: "Il cemento preparato da Conkeldurr è molto più\nduro e resistente della media, anche se la sua\ncomposizione non ha nulla di diverso."
          shield: "Quando decide di fare sul serio, si sbarazza\ndei pilastri di cemento e si lancia sul nemico\narmato solo dei suoi pugni."
        de:
          sword: "Beton, der von Meistagrif angerührt wurde,\nist härter und robuster als jeder andere Beton,\nselbst wenn die Inhaltsstoffe identisch sind."
          shield: "Dreht es richtig auf, wirft es seine Betonpfeiler\nzur Seite und stürzt sich mit gezückter Faust auf\nden Gegner."
        es:
          sword: "El hormigón que preparan los Conkeldurr es\nmucho más duro y resistente que el ordinario,\naunque la composición sea la misma."
          shield: "Cuando decide ponerse en serio, suelta sus\npilares de hormigón y se abalanza sobre el rival\ncon solo un puño como arma."
        ko:
          sword: "같은 성분이라도 노보청이\n배합한 콘크리트가\n훨씬 견고하고 튼튼하다."
          shield: "정말 싸울 생각이면 콘크리트\n기둥을 버리고 주먹 하나로\n상대를 노리고 덤벼든다."
        zh_simp:
          sword: "即使成分相同，\n修建老匠搅拌的混凝土\n格外地坚硬结实。"
          shield: "要是认真起来就会\n扔掉手中的混凝土柱，\n赤手空拳地扑向敌人。"
        zh_trad:
          sword: "即使成分相同，\n修建老匠攪拌的混凝土\n格外地堅硬結實。"
          shield: "要是認真起來就會\n扔掉手中的混凝土柱，\n赤手空拳地撲向敵人。"
