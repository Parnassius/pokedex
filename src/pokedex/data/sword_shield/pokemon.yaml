      types:
        - poison
      egg_groups:
        - undiscovered
      abilities:
        - poison_point
        - rivalry
      hidden_ability: hustle
      descriptions:
        jp_kana:
          sword: "ひたいの　ツノは　こどもに　エサを\nあたえるときに　ささらないよう\nたいかしたと　かんがえられている。"
          shield: "むれに　キケンが　せまると　なかまで\nけっそくして　ちょうおんぱの\nだいがっしょうを　おみまいするぞ。"
        jp_kanji:
          sword: "額の　ツノは　子どもに　エサを\n与えるときに　刺さらないよう\n退化したと　考えられている。"
          shield: "群れに　危険が　せまると　仲間で\n結束して　超音波の　大合唱を\nおみまいするぞ。"
        en:
          sword: "The horn on its head has atrophied. It’s thought\nthat this happens so Nidorina’s children won’t get\npoked while their mother is feeding them."
          shield: "If the group is threatened, these Pokémon will\nband together to assault enemies with a chorus\nof ultrasonic waves."
        fr:
          sword: "On pense que sa corne frontale s’est atrophiée\npour lui permettre de nourrir ses petits sans\nles blesser."
          shield: "Si un danger menace le groupe, ces Pokémon\nse réunissent et l’affrontent en émettant\ndes ultrasons en chœur."
        it:
          sword: "Si pensa che il corno sulla fronte si sia atrofizzato\nper evitare che Nidorina punga i suoi cuccioli\nquando li nutre."
          shield: "Quando il branco è minacciato da un pericolo,\ni suoi membri uniscono le forze e dispiegano\nun coro di ultrasuoni."
        de:
          sword: "Man geht davon aus, dass sich das Horn auf\nihrem Kopf zurückgebildet hat, damit sie ihre\nJungen nicht beim Füttern verletzen."
          shield: "Nähert sich Gefahr, schließen sie sich mit anderen\nArtgenossen zusammen und begegnen der\nBedrohung mit einem Chor aus Ultraschallwellen."
        es:
          sword: "Se cree que el cuerno de la frente se le ha\natrofiado para evitar herir a sus crías al\nalimentarlas."
          shield: "Cuando el peligro se cierne sobre la manada,\nlos miembros unen fuerzas para defenderse\nemitiendo un coro de ondas ultrasónicas."
        ko:
          sword: "이마의 뿔은 새끼에게 먹이를\n줄 때 찌르지 않도록\n퇴화했다고 추측되고 있다."
          shield: "무리에 위험이 닥치면\n동료와 결속하여\n초음파로 크게 합창한다."
        zh_simp:
          sword: "人们认为它额头上的角\n是为了防止给孩子喂食时\n刺到它们而退化的。"
          shield: "如果族群遇到了危险，\n会和伙伴们团结起来，\n施展出超音波大合唱。"
        zh_trad:
          sword: "人們認為牠額頭上的角\n是為了避免在給孩子餵食時\n刺到孩子而退化的。"
          shield: "有危險逼近群體時，\n會與夥伴們團結一致地\n用超音波的大合唱來攻擊。"
