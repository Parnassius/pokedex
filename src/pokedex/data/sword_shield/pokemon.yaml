          shield: "あいての　きおくを　そうさできる。\nむぎばたけの　うえを　さまよう\nすがたが　ときおり　もくげきされる。"
        jp_kanji:
          sword: "オーベムが　現れた　牧場\nからは　いつの間にか　バイウールーが\n１匹　姿を　消してしまう。"
          shield: "相手の　記憶を　操作できる。\n麦畑の　上を　さまよう\n姿が　ときおり　目撃される。"
        en:
          sword: "Whenever a Beheeyem visits a farm,\na Dubwool mysteriously disappears."
          shield: "Sometimes found drifting above wheat fields,\nthis Pokémon can control the memories of\nits opponents."
        fr:
          sword: "À chaque fois que Neitram se matérialise\ndans une pâture, un Moumouflon disparaît\ndans des circonstances mystérieuses."
          shield: "Il peut manipuler les souvenirs de son adversaire\nà loisir. Parfois, on l’aperçoit en train de\nvagabonder au-dessus des champs de blé."
        it:
          sword: "Per qualche strano motivo, nelle fattorie in cui\ncompare un Beheeyem sparisce sempre\nun Dubwool."
          shield: "Può manipolare la memoria dell’avversario.\nA volte lo si vede vagare sopra i campi di grano."
        de:
          sword: "Jedes Mal, wenn ein Megalon auf einer Farm\nauftaucht, verschwindet bald darauf ein Zwollock\nunter mysteriösen Umständen."
          shield: "Es kann die Gedanken anderer manipulieren.\nManchmal wird es dabei beobachtet, wie es\nüber Weizenfelder gleitet."
        es:
          sword: "Por algún extraño motivo, siempre que se avista\nun Beheeyem en una granja desaparece un\nDubwool."
          shield: "Es capaz de manipular los recuerdos del rival.\nSe lo avista en ocasiones vagando por campos\nde trigo."
        ko:
          sword: "벰크가 나타난 목장에서는\n배우르 1마리가\n어느샌가 모습을 감춘다."
          shield: "상대의 기억을 조작할 수 있다.\n보리밭 위를 떠도는\n모습이 가끔 목격된다."
        zh_simp:
          sword: "如果大宇怪出现在牧场里，\n那么就会有１只毛毛角羊\n在不知不觉间消失。"
          shield: "能控制对方的记忆。\n经常有人看到它\n在麦田的上方徘徊。"
        zh_trad:
          sword: "如果大宇怪出現在牧場裡，\n那麼就會有１隻毛毛角羊\n在不知不覺間消失。"
          shield: "能控制對方的記憶。\n經常有人看到牠\n在麥田的上方徘徊。"
litwick:
