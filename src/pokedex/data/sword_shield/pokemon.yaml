        - ice
      egg_groups:
        - field
      abilities:
        - snow_cloak
      hidden_ability: snow_warning
      held_items:
        rare: snowball
      descriptions:
        jp_kana:
          sword: "アローラちほうの　まんねんゆきが\nつもる　やまで　ながねん　くらすうち\nこおりの　のうりょくを　てにいれた。"
          shield: "けんびきょうで　あたまや　しっぽの\nまきげを　かんさつすると　こおりの\nつぶが　わきだす　ようすが　わかる。"
        jp_kanji:
          sword: "アローラ地方の　万年雪が\n積もる　山で　長年　暮らすうち\n氷の　能力を　手に入れた。"
          shield: "顕微鏡で　頭や　しっぽの\n巻き毛を　観察すると　氷の\n粒が　わきだす　ようすが　わかる。"
        en:
          sword: "After long years in the ever-snowcapped\nmountains of Alola, this Vulpix has gained\npower over ice."
          shield: "If you observe its curly hairs through\na microscope, you’ll see small ice\nparticles springing up."
        fr:
          sword: "Après de longues années passées à vivre\ndans les névés des sommets d’Alola, ce Pokémon\na appris à canaliser le pouvoir de la glace."
          shield: "En examinant les touffes de poils de sa tête ou\nde sa queue au microscope, on réalise qu’elles\nproduisent de minuscules cristaux de glace."
        it:
          sword: "Ha imparato a utilizzare la potenza del ghiaccio\ndopo aver vissuto per anni sui monti coperti\nda nevi perenni della regione di Alola."
          shield: "Quando si osservano al microscopio i riccioli\nsulla testa e sulle code, si nota che producono\npiccoli cristalli di ghiaccio."
        de:
          sword: "Es hat lange in den allzeit schneebedeckten\nBergen Alolas gelebt und sich dort über die\nJahre die Kraft des Eises angeeignet."
          shield: "Betrachtet man die Locken an seinem Kopf oder\nseinen Schweifen durch ein Mikroskop, erkennt\nman, wie dort kleine Eispartikel entstehen."
        es:
          sword: "Aprendió a dominar el hielo tras habitar durante\naños las montañas de nieves eternas de la región\nde Alola."
          shield: "Al estudiar el pelaje de su cabeza o de su cola\na través de un microscopio, es posible observar\nlas minúsculas partículas de hielo que emite."
        ko:
          sword: "알로라지방의 만년설이\n쌓인 산에서 오랫동안 살면서\n얼음의 능력을 손에 넣었다."
          shield: "현미경으로 머리나 꼬리의\n곱슬한 털을 관찰하면 얼음\n알맹이가 생성되는 모습을 알 수 있다."
        zh_simp:
          sword: "长年在阿罗拉地区\n万年积雪的山上生活，\n使得六尾拥有了冰的能力。"
          shield: "如果用显微镜观察它头部\n和尾巴上卷毛，就能看到\n上面涌出冰粒的样子。"
        zh_trad:
          sword: "長年在阿羅拉地區\n萬年積雪的山上生活，\n使得六尾擁有了冰的能力。"
          shield: "如果用顯微鏡觀察牠頭部\n和尾巴上的捲毛，就能看到\n上面湧出冰粒的樣子。"
