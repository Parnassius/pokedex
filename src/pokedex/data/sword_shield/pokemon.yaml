        jp_kana:
          sword: "もくずに　まぎれて　うみを　ただよい\nかいそうを　たべにきた　ポケモンを\nしとめて　ごちそうに　するのだ。"
          shield: "くさった　かいそうに　にているので\nうみを　ただよう　もくずの　なかに\nかくれて　てきのめを　ごまかす。"
        jp_kanji:
          sword: "藻屑に　紛れて　海を　漂い\n海藻を　食べに来た　ポケモンを\nしとめて　ご馳走に　するのだ。"
          shield: "腐った　海藻に　似ているので\n海を　漂う　藻屑の　中に\n隠れて　敵の目を　ごまかす。"
        en:
          sword: "It drifts in the ocean, blending in with floating\nseaweed. When other Pokémon come to feast on\nthe seaweed, Skrelp feasts on them instead."
          shield: "Skrelp looks like a piece of rotten seaweed, so it\ncan blend in with seaweed drifting on the ocean\nand avoid being detected by enemies."
        fr:
          sword: "Il se mêle aux algues en décomposition flottant\nà la surface des océans afin de surprendre et de\ndévorer les Pokémon qui viennent s’en nourrir."
          shield: "Ressembler à une algue en décomposition lui\npermet d’échapper à ses ennemis en se cachant\nau milieu des résidus de plantes aquatiques."
        it:
          sword: "Galleggia nel mare mimetizzandosi fra le alghe\nfluttuanti e agguanta i Pokémon che si avvicinano\nper nutrirsi."
          shield: "Il suo aspetto simile a quello di alghe fluttuanti\nin decomposizione gli permette di mimetizzarsi\nper sfuggire allo sguardo del nemico."
        de:
          sword: "Es treibt versteckt zwischen Algen durchs Meer.\nNähert sich ein Pokémon, um diese zu essen,\nwird es von Algitt erledigt und verspeist."
          shield: "Da es wie verfaulter Seetang aussieht, versteckt\nes sich zwischen den im Meer treibenden Algen,\num sich den Blicken seiner Feinde zu entziehen."
        es:
          sword: "Vaga por el océano oculto entre las algas y da\nbuena cuenta de los Pokémon que se acercan\npara alimentarse de ellas."
          shield: "Su aspecto de alga podrida le permite ocultarse\nentre los restos que flotan a la deriva y pasar\ndesapercibido ante sus enemigos."
        ko:
          sword: "수초 찌꺼기 틈에서 바다를 떠다니다가\n해초를 먹으러 온 포켓몬을\n꼼짝 못 하게 한 후 잡아먹는다."
          shield: "썩은 해초를 닮아서\n바다를 떠도는 해초 더미 안에\n숨어 적의 눈을 속인다."
        zh_simp:
          sword: "与碎藻混杂在一起漂浮于海中。\n会瞄准来吃海藻的宝可梦，\n了结它的性命并美餐一顿。"
          shield: "看上去很像腐烂的海藻，\n因此会藏身于漂在海里的\n碎藻中，骗过敌人的眼睛。"
        zh_trad:
          sword: "會混在海藻屑裡漂浮在大海，\n並且捕獵來吃海藻的寶可夢，\n當作大餐飽吃一頓。"
          shield: "看起來像是腐爛的海藻，\n因此會躲在海裡漂浮的\n藻屑裡混淆敵人的耳目。"
dragalge:
