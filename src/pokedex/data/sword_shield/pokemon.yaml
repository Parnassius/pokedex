        jp_kana:
          sword: "つよそうな　ポケモンを　みると\nたたかいを　いどまずに　いられない。\nまけると　おおごえで　なきだす。"
          shield: "かたい　きのみも　こなごなに　くだく\nあくりょく。　ケンカっぱやく\nだれにでも　しょうぶを　しかける。"
        jp_kanji:
          sword: "強そうな　ポケモンを　見ると\n戦いを　挑まずに　いられない。\n負けると　大声で　泣きだす。"
          shield: "硬い　木の実も　粉々に　砕く\n握力。　喧嘩っ早く\n誰にでも　勝負を　仕掛ける。"
        en:
          sword: "If it spies a strong Pokémon, Rufflet can’t resist\nchallenging it to a battle. But if Rufflet loses,\nit starts bawling."
          shield: "A combative Pokémon, it’s ready to pick a fight\nwith anyone. It has talons that can crush\nhard berries."
        fr:
          sword: "Il ne peut pas s’empêcher de défier les Pokémon\nqui ont l’air forts. Lorsqu’il perd, il pousse un cri\nassourdissant."
          shield: "Sa poigne est telle qu’il peut réduire en miettes\nles plus dures des Baies. Belliqueux de nature,\nil n’hésite pas à défier tout le monde."
        it:
          sword: "Quando scorge un Pokémon che ha l’aria di\nessere forte, lo deve sfidare a tutti i costi. Se\nperde, piange più forte che può."
          shield: "La sua stretta riduce in frantumi anche le bacche\npiù dure. È un attaccabrighe e sfida chiunque\ngli capiti a tiro."
        de:
          sword: "Wenn es einen starken Gegner erblickt, kommt\nes nicht umhin, ihn anzugreifen. Verliert es den\nKampf, so fängt es an zu weinen."
          shield: "Seine starken Klauen können selbst harte Beeren\nzermalmen. Es ist so streitsüchtig, dass es jeden\nzum Kampf herausfordert, dem es begegnet."
        es:
          sword: "Cuando ve a un Pokémon de aspecto fuerte,\nno puede resistirse a desafiarlo en combate.\nSi pierde, llora y se lamenta a pleno pulmón."
          shield: "Es capaz de partir hasta la baya más dura gracias\na la fuerza de sus extremidades. Belicoso por\nnaturaleza, planta cara a cualquiera."
        ko:
          sword: "강해 보이는 포켓몬을 발견하면\n싸움을 걸지 않고는 못 배긴다.\n지면 큰 소리로 울어댄다."
          shield: "딱딱한 나무열매도 산산조각 내는\n악력을 가졌다. 쉽게 다투고\n아무에게나 승부를 건다."
        zh_simp:
          sword: "每当遇到看似强劲的宝可梦，\n都会忍不住去挑起战斗。\n如果输了则会放声大哭。"
          shield: "握力强，能把坚硬的树果\n弄得粉碎。性急爱吵架，\n无论对谁都会挑起战斗。"
        zh_trad:
          sword: "每當遇到看似強勁的寶可夢，\n都會忍不住去挑起戰鬥。\n如果輸了就會放聲大哭。"
          shield: "握力強，能把堅硬的樹果\n弄得粉碎。性急愛吵架，\n無論對誰都會挑起戰鬥。"
braviary:
