        it:
          sword: "Chi osserva troppo a lungo la luce dei motivi sul\nsuo corpo viene ipnotizzato e cade sotto il suo\ncontrollo."
          shield: "Si dice che il potere ipnotico di questo Pokémon\nabbia giocato un ruolo nei grandi avvenimenti\nche hanno cambiato il corso della storia."
        de:
          sword: "Blickt man in das Licht, das es mit seinem Körper\nerzeugt, wird man sofort hypnotisiert und steht\ndanach unter der Kontrolle von Calamanero."
          shield: "Man erzählt sich, dass die hypnotischen Kräfte\ndieses Pokémon mit einigen geschichtsträchtigen\nEreignissen in Verbindung stehen."
        es:
          sword: "Los destellos que emite sumen rápidamente en\nun estado hipnótico al observador, que queda\nbajo su control."
          shield: "Se dice que sus poderes hipnóticos han influido\nen grandes acontecimientos que han cambiado\nel curso de la historia."
        ko:
          sword: "발광체의 빛을 보면\n순식간에 최면 상태가 되어\n칼라마네로에게 조종당한다."
          shield: "역사를 바꿀 정도의 큰 사건은\n칼라마네로의 최면 능력과\n관련이 있다고 전해진다."
        zh_simp:
          sword: "要是盯着乌贼王的发光体看，\n就会马上陷入催眠状态，\n并且受到它的控制。"
          shield: "据说那些能够改变历史\n的重大事件其实都和\n乌贼王的催眠能力有关。"
        zh_trad:
          sword: "要是盯著牠的發光體看，\n就會馬上陷入催眠狀態，\n並且受到牠的控制。"
          shield: "據說那些能夠改變歷史\n的重大事件其實都和\n烏賊王的催眠能力有關。"
binacle:
  species_id: 688
  names:
    jp_kana: カメテテ
    jp_kanji: カメテテ
    en: Binacle
    fr: Opermine
    it: Binacle
