        jp_kana:
          sword: "しおの　ながれが　おだやかな　うみに\nすむ。　おそわれると　まっくろな\nスミをはいて　そのすきに　にげだす。"
          shield: "すいちゅうを　おどるように　およいで\nうずを　つくる。　なかまと　うずの\nおおきさを　きそって　あそぶ。"
        jp_kanji:
          sword: "潮の　流れが　穏やかな　海に　棲む。\n襲われると　真っ黒な　墨を吐いて\nその隙に　逃げだす。"
          shield: "水中を　踊るように　泳いで\n渦を　つくる。　仲間と　渦の\n大きさを　競って　遊ぶ。"
        en:
          sword: "Horsea makes its home in oceans with gentle\ncurrents. If this Pokémon is under attack, it spits\nout pitch-black ink and escapes."
          shield: "They swim with dance-like motions and cause\nwhirlpools to form. Horsea compete to see which\nof them can generate the biggest whirlpool."
        fr:
          sword: "Il vit dans les mers calmes. Quand on l’attaque,\nil crache de l’encre noire et profite de la diversion\npour s’enfuir."
          shield: "Hypotrempe crée des tourbillons en dansant\nsous l’eau. Il s’amuse à comparer la taille des\nremous qu’il fait avec ceux de ses congénères."
        it:
          sword: "Vive in mari dalle correnti tranquille. Quando\nviene attaccato spruzza inchiostro nero e ne\napprofitta per fuggire."
          shield: "Nuota come se danzasse nell’acqua creando\nmulinelli. Gioca con i suoi simili facendo a gara\na chi ne crea di più grandi."
        de:
          sword: "Es lebt in Meeren mit ruhigem Gezeitenstrom.\nWird es angegriffen, versprüht es tiefschwarze\nTinte und ergreift daraufhin die Flucht."
          shield: "Es schwimmt elegant wie ein Tänzer und erzeugt\ndabei Wasserstrudel. Mit Artgenossen wetteifert\nes darum, wer den größten Strudel formen kann."
        es:
          sword: "Habita en mares de aguas tranquilas. Si se siente\nen peligro, expulsará por la boca una densa tinta\nnegra para poder huir."
          shield: "Nada con la gracilidad de un bailarín, creando\nremolinos a su paso, y juega con sus congéneres\na ver quién forma el más grande."
        ko:
          sword: "잔잔하게 흐르는 고요한 바다에\n산다. 습격당하면 새까만\n먹물을 내뿜고 그 틈에 도망친다."
          shield: "물속에서 춤추듯이 헤엄쳐\n소용돌이를 만든다. 동료와\n소용돌이의 크기를 겨루며 논다."
        zh_simp:
          sword: "栖息在海浪平稳的海里。\n受到袭击时，会喷出漆黑墨汁\n并趁机逃跑。"
          shield: "会像跳舞一样在水中游动\n以制造漩涡。作为娱乐，\n会和伙伴比拼谁的漩涡更大。"
        zh_trad:
          sword: "棲息在海流平穩的海域。\n被襲擊時會吐出漆黑的\n墨汁，然後趁機逃走。"
          shield: "會在水中跳舞似地游動來\n製造漩渦。玩耍時會和夥伴\n比賽誰做出的漩渦比較大。"
