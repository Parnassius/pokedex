      descriptions:
        jp_kana:
          sword: "１０８この　たましいが　あつまり\nポケモンになったが　しょうわるの\nたましいが　まじってしまったらしい。"
          shield: "わるさばかりしていたら　ふしぎな\nじゅつを　つかう　たびびとによって\nかなめいしに　つながれてしまった。"
        jp_kanji:
          sword: "１０８個の　魂が　集まり\nポケモンになったが　性悪の\n魂が　混じってしまったらしい。"
          shield: "悪さばかりしていたら　不思議な\n術を　使う　旅人によって\n要石に　つながれてしまった。"
        en:
          sword: "Exactly 108 spirits gathered to become this\nPokémon. Apparently there are some ill-natured\nspirits in the mix."
          shield: "All Spiritomb’s mischief and misdeeds compelled\na traveler to use a mysterious spell to bind\nSpiritomb to an odd keystone."
        fr:
          sword: "Ce Pokémon est né de la fusion de 108 âmes,\nmais on raconte que certaines d’entre elles\nseraient de nature maléfique."
          shield: "Pour punir son comportement déplorable,\nun voyageur a utilisé un mystérieux sortilège\npour l’enchaîner à une Clé de Voûte."
        it:
          sword: "108 spiriti si sono riuniti dando vita a questo\nPokémon, e pare che fra questi ce ne fossero\ndi malvagi."
          shield: "A causa del suo comportamento molesto, è stato\nimprigionato in una Roccianima da un viandante\ntramite un incantesimo misterioso."
        de:
          sword: "Es besteht aus 108 Geistern. Allerdings scheinen\nsich auch einige bösartige daruntergemischt zu\nhaben."
          shield: "Aufgrund seiner ständigen Untaten wurde es von\neinem Reisenden mithilfe mysteriöser Künste an\neinen Spiritkern gebunden."
        es:
          sword: "Este Pokémon se formó a partir de 108 espíritus.\nDicen que entre ellos se mezclaron algunos de\nnaturaleza malvada."
          shield: "Un viajero utilizó un misterioso hechizo para\nunirlo a una Piedra Espíritu por sus constantes\nfechorías."
        ko:
          sword: "108개의 영혼이 모여\n포켓몬이 되었지만 성질이 나쁜\n영혼이 섞여버린 듯하다."
          shield: "나쁜 짓만 일삼다가 신비한\n술수를 사용하는 여행자에 의해\n쐐기돌에 속박당했다."
        zh_simp:
          sword: "由１０８个灵魂聚在一起\n变成了宝可梦，但似乎有\n性格恶劣的灵魂混在里面。"
          shield: "总是作恶多端，\n于是被使用神奇法术的\n旅人绑缚在楔石里。"
        zh_trad:
          sword: "１０８個靈魂聚集在一起\n成為了寶可夢，但其中\n似乎混進了壞心眼的靈魂。"
          shield: "總是作惡多端，不料有一天\n被使用神奇法術的旅人\n綁縛到了楔石上。"
gible:
  species_id: 443
  names:
