        - cute_charm
        - technician
      hidden_ability: skill_link
      descriptions:
        jp_kana:
          sword: "しっぽで　よごれを　はらいおとす。\nそうじを　するときに　たすかるが\nけっぺきしょう　なので　たいへん。"
          shield: "しっぽで　なであって　あいさつ。\nしっぽの　けが　おおきな　ほうが\nすこし　いばっているぞ。"
        jp_kanji:
          sword: "しっぽで　汚れを　払い落す。\n掃除を　するときに　助かるが\n潔癖症　なので　大変。"
          shield: "しっぽで　なであって　挨拶。\nしっぽの　毛が　大きな　ほうが\n少し　威張っているぞ。"
        en:
          sword: "The way it brushes away grime with its tail\ncan be helpful when cleaning. But its focus on\nspotlessness can make cleaning more of a hassle."
          shield: "They pet each other with their tails as a form of\ngreeting. Of the two, the one whose tail is fluffier\nis a bit more boastful."
        fr:
          sword: "Il époussette les saletés avec sa queue.\nIl est d’une aide précieuse pour faire le ménage,\nmais il est très tatillon sur la propreté."
          shield: "Les Chinchidou se saluent en se frottant la queue.\nCelui qui a la plus volumineuse en tire\nune certaine fierté."
        it:
          sword: "Con la coda rimuove ogni traccia di sporco.\nÈ di grande aiuto per le pulizie, ma la sua\npignoleria può diventare estenuante."
          shield: "Si salutano strofinando le proprie code tra loro.\nGli esemplari che ne hanno una particolarmente\nvoluminosa tendono a darsi delle arie."
        de:
          sword: "Es entfernt Schmutz mit seinem Schweif. Beim\nHausputz ist es eine große Hilfe, aber sein\nPutzfimmel kann auch anstrengend werden."
          shield: "Sie begrüßen sich, indem sie sich gegenseitig mit\nihren Schweifen streicheln. Das Picochilla mit\ndem buschigeren Schweif gibt damit oft an."
        es:
          sword: "Usa la cola para barrer la basurilla. Su extrema\npulcritud es tanto una ayuda en la limpieza del\nhogar como un incordio."
          shield: "Se saludan entre sí frotándose la cola. Cuanto\nmás voluminosa es, más orgullosos se muestran."
        ko:
          sword: "꼬리로 더러운 것을 떨어낸다.\n청소를 할 때는 도움이 되지만\n결벽증이 있어서 힘들기도 하다."
          shield: "꼬리로 쓰다듬으며 서로\n인사한다. 꼬리 털이\n많은 쪽이 조금 으스댄다."
        zh_simp:
          sword: "用尾巴来清扫灰尘。\n虽说能帮忙打扫是件好事，\n它的洁癖也会让人感到棘手。"
          shield: "用尾巴互相抚摸来打招呼。\n尾巴的毛比较蓬松的那一方\n会表现得稍微威风些。"
        zh_trad:
          sword: "用尾巴來清掃灰塵。\n雖說能幫忙打掃是件好事，\n但牠的潔癖也會讓人感到棘手。"
          shield: "用尾巴互相撫摸來打招呼。\n尾巴的毛比較蓬鬆的那一方\n會表現得稍微威風些。"
