        jp_kana:
          sword: "なんでも　とかしてしまう　ねんえきで\nほご　されているため　よわくても\nほしょくされず　いきのこってきた。"
          shield: "せなかの　とっきの　なかに　ちいさな\nのうみそが　ある。　えさと　てきから\nにげることしか　かんがえていない。"
        jp_kanji:
          sword: "なんでも　溶かしてしまう　粘液で\n保護されているため　弱くても\n捕食されず　生き残ってきた。"
          shield: "背中の　突起の　中に　小さな\n脳みそが　ある。　エサと　敵から\n逃げることしか　考えていない。"
        en:
          sword: "Although this Pokémon isn’t very strong, its body\nis coated in a caustic slime that can melt through\nanything, so predators steer clear of it."
          shield: "The lump on its back contains its tiny brain.\nIt thinks only of food and escaping its enemies."
        fr:
          sword: "Étant donné sa faiblesse, c’est uniquement\ngrâce à son fluide pouvant tout dissoudre\nqu’il a échappé à une extinction quasi certaine."
          shield: "Son petit cerveau est caché dans la bosse qui\nest sur son dos. Il ne pense pas à grand-chose,\nsi ce n’est à se nourrir et à fuir devant ses ennemis."
        it:
          sword: "È un Pokémon debole. Ha evitato l’estinzione\ngrazie al suo muco corrosivo."
          shield: "Nella protuberanza che ha sulla schiena si trova\nun piccolo cervello. Pensa solo a mangiare e a\nscappare dai nemici."
        de:
          sword: "Da sein alles zersetzender Schleim es schützt,\nkonnte es sich bis heute gegen seine Fressfeinde\nbehaupten, obwohl es recht schwach ist."
          shield: "In dem Fortsatz auf seinem Rücken befindet sich\nsein winziges Gehirn. Es kann nur ans Fressen\nund an die Flucht vor seinen Feinden denken."
        es:
          sword: "Segrega una mucosidad que corroe todo lo que\ntoca. Esto le ha permitido protegerse y evitar la\nextinción a pesar de su debilidad intrínseca."
          shield: "La protuberancia del lomo contiene su pequeño\ncerebro, que solo piensa en buscar comida y huir\nde los enemigos."
        ko:
          sword: "무엇이든 녹여버리는 점액으로\n몸을 보호하기 때문에 약하지만\n먹히지 않고 살아남을 수 있었다."
          shield: "등의 돌기 안에 작은 뇌가 있다.\n먹이에 대한 생각과\n적으로부터 도망치는 생각만 한다."
        zh_simp:
          sword: "虽然弱小，但它拥有可以\n融化一切的粘液来保护自己，\n因此未被捕食并得以存活至今。"
          shield: "背上的突起物里装着它\n小小的脑子，里面只想着\n吃饭和逃离敌人这两件事。"
        zh_trad:
          sword: "雖然弱小，但牠擁有可以\n融化一切的黏液來保護自己，\n因此未被捕食並得以存活至今。"
          shield: "背上的突起物裡裝著牠\n小小的腦子，裡面只想著\n吃飯和逃離敵人這兩件事。"
goodra:
