      descriptions:
        jp_kana:
          sword: "エンニュートは　メスしか　いない。\nフェロモンガスを　はっせいさせて\nオスの　ヤトウモリを　みりょうする。"
          shield: "エンニュートどうしの　あらそいは\nひきつれている　オスの　ヤトウモリの\nかずで　しょうはいが　きまるらしい。"
        jp_kanji:
          sword: "エンニュートは　メスしか　いない。\nフェロモンガスを　発生させて\nオスの　ヤトウモリを　魅了する。"
          shield: "エンニュート同士の　争いは\n引き連れている　オスの　ヤトウモリの\n数で　勝敗が　決まるらしい。"
        en:
          sword: "Only female Salazzle exist. They emit a gas laden\nwith pheromones to captivate male Salandit."
          shield: "The winner of competitions between Salazzle\nis decided by which one has the most male\nSalandit with it."
        fr:
          sword: "Il n’existe que des spécimens femelles.\nElles envoûtent les Tritox mâles grâce\nà leurs nuages de phéromones."
          shield: "Les conflits entre Malamandre seraient réglés\npar un simple calcul : le spécimen dont la suite\ncomporte le plus de Tritox l’emporte."
        it:
          sword: "Esistono solo esemplari femmina.\nProduce un gas ricco di feromoni con cui\nammalia i Salandit maschi."
          shield: "Sembra che nelle dispute tra Salazzle prevalga\nsempre l’esemplare che ha il maggior numero di\nSalandit maschi al seguito."
        de:
          sword: "Es existieren nur weibliche Exemplare. Sie stoßen\nPheromongase aus, mit denen sie sich männliche\nMolunk hörig machen."
          shield: "Kommt es unter ihnen zu Streitereien, setzt sich\noffenbar immer das Amfira durch, das von den\nmeisten männlichen Molunk verehrt wird."
        es:
          sword: "Solo hay hembras. Gracias a sus feromonas,\natrae a los Salandit macho y los somete a su\nvoluntad."
          shield: "Libran disputas con sus congéneres cuyo\nresultado, al parecer, se inclina por quien tenga\nun séquito de Salandit machos más numeroso."
        ko:
          sword: "염뉴트는 암컷만이 존재한다.\n페로몬 가스를 발생시켜서\n수컷 야도뇽을 매료시킨다."
          shield: "염뉴트들의 싸움은\n거느리고 있는 수컷 야도뇽의\n수로 승패가 정해지는 듯하다."
        zh_simp:
          sword: "焰后蜥只有雌性。\n会释放出费洛蒙气体，\n让雄性的夜盗火蜥为之着迷。"
          shield: "据说焰后蜥之间在争斗时，\n是通过比拼谁带着更多只\n雄性夜盗火蜥来定胜负的。"
        zh_trad:
          sword: "焰后蜥只有雌性。\n會釋放出費洛蒙氣體，\n讓雄性的夜盜火蜥為之著迷。"
          shield: "據說焰后蜥之間在爭鬥時，\n是透過比拼誰帶著更多隻\n雄性夜盜火蜥來定勝負的。"
