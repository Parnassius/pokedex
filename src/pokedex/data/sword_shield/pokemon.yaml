        jp_kana:
          sword: "はばたくと　つばさの　ほのおが\nあかく　うつくしく　きらめく\nでんせつの　とりポケモンの　１ぴき。"
          shield: "うつくしく　もえあがる　つばさで\nやまみちを　てらし　そうなんしゃを\nたすけたと　いいつたえられている。"
        jp_kanji:
          sword: "羽ばたくと　翼の　炎が\n赤く　美しく　きらめく\n伝説の　鳥ポケモンの　１匹。"
          shield: "美しく　燃えあがる　翼で\n山道を　照らし　遭難者を\n助けたと　言い伝えられている。"
        en:
          sword: "It’s one of the legendary bird Pokémon. When\nMoltres flaps its flaming wings, they glimmer with\na dazzling red glow."
          shield: "There are stories of this Pokémon using its\nradiant, flame-cloaked wings to light up paths\nfor those lost in the mountains."
        fr:
          sword: "Il s’agit d’un des Pokémon oiseaux légendaires.\nDes flammes rouges d’une grande beauté\nétincellent lorsqu’il bat des ailes."
          shield: "On raconte qu’il a sauvé des personnes perdues\nen montagne en illuminant les sentiers à l’aide\nde ses splendides ailes flamboyantes."
        it:
          sword: "Uno dei leggendari Pokémon alati. Quando\nsbatte le ali, le fiamme che le circondano\nbrillano di uno splendido rosso acceso."
          shield: "Si narra che abbia aiutato dei viandanti che si\nerano persi illuminando i sentieri montuosi con\nle splendide ali infuocate."
        de:
          sword: "Schlägt dieses Legendäre Vogel-Pokémon mit\nden Flügeln, so leuchten die Flammen an seinen\nSchwingen in einem bezaubernden Rot."
          shield: "Überlieferungen nach soll Lavados mit seinen\nwunderschön lodernden Flügeln Bergpfade\nerleuchtet und dadurch Verirrten geholfen haben."
        es:
          sword: "Una de las aves legendarias. Al batir las alas,\nlas llamas que las envuelven emiten un hermoso\nfulgor rojo."
          shield: "Se cuenta que alguna vez ha iluminado el camino\ncon sus alas flamígeras para rescatar a alguien\nque se había perdido en la montaña."
        ko:
          sword: "날갯짓을 하면 날개의 불꽃이\n빨갛고 아름답게 빛나는\n전설의 새포켓몬 중 1마리다."
          shield: "아름답게 타오르는 날개로\n산길을 비춰 조난자를\n도왔다고 전해져 오고 있다."
        zh_simp:
          sword: "只要拍动翅膀，羽毛就会\n闪现出红色的火焰，非常美丽。\n传说的鸟宝可梦中的１只。"
          shield: "相传它会用燃烧着的\n美丽翅膀照亮山道，\n救助在此遇险的人。"
        zh_trad:
          sword: "每當牠拍動翅膀，羽毛就會\n閃爍出美麗的赤紅火焰。\n是傳說的鳥寶可夢之一。"
          shield: "相傳牠會以美麗燃燒的\n翅膀照亮山路，救助在\n山中遇險的人。"
    moltres_galarian_form:
      form_id: 1
      names:
        jp_kana: ガラルのすがた
        jp_kanji: ガラルのすがた
        en: Galarian Form
        fr: Forme de Galar
        it: Forma di Galar
        de: Galar-Form
        es: Forma de Galar
        ko: 가라르의 모습
        zh_simp: 伽勒尔的样子
        zh_trad: 伽勒爾的樣子
      base_stats:
        hp: 90
