        - serene_grace
        - run_away
      hidden_ability: rattled
      descriptions:
        jp_kana:
          sword: "ちいさな　ハネを　もっていることから\nおおむかしは　そらを　とんでいたと\nしゅちょうする　がくしゃもいる。"
          shield: "めいろのような　すあなが　すみか。\nつちの　においで　じぶんの　ばしょが\nわかるので　ぜったいに　まよわない。"
        jp_kanji:
          sword: "小さな　ハネを　持っていることから\n大昔は　空を　飛んでいたと\n主張する　学者もいる。"
          shield: "迷路のような　巣穴が　すみか。\n土の　匂いで　自分の　場所が\nわかるので　ぜったいに　迷わない。"
        en:
          sword: "This Pokémon’s tiny wings have some scientists\nsaying that Dunsparce used to fly through the sky\nin ancient times."
          shield: "The nests Dunsparce live in are mazes of tunnels.\nThey never get lost in their own nests—they can\ntell where they are by the scent of the dirt."
        fr:
          sword: "Des savants affirment que ses petites ailes sont\nla preuve qu’il y a fort longtemps, il était capable\nde voler."
          shield: "Bien que son nid ressemble à un labyrinthe,\nil ne s’y perd jamais, car il se repère grâce\nà l’odeur de la terre."
        it:
          sword: "Secondo alcuni studiosi, le sue piccole ali sono\nla prova che in un lontano passato questo\nPokémon fosse in grado di volare."
          shield: "Costruisce tane simili a labirinti, ma poiché\nriesce a capire dove si trova in base all’odore\ndel terreno non si smarrisce mai."
        de:
          sword: "Da es kleine Flügel hat, behaupten manche\nWissenschaftler, dass es vor langer Zeit fliegen\nkonnte."
          shield: "Es lebt in einem labyrinthartigen Nestkomplex.\nAnhand des Geruchs der Erde weiß Dummisel\ngenau, wo es sich befindet und verirrt sich nie."
        es:
          sword: "Debido a que presenta pequeñas alas, algunos\ncientíficos sostienen que antiguamente era capaz\nde volar."
          shield: "Habita en madrigueras laberínticas. Gracias a su\ncapacidad para ubicarse por el olor de la tierra\nque lo rodea, nunca se pierde."
        ko:
          sword: "작은 날개를 갖고 있어서\n먼 옛날에는 하늘을 날았다고\n주장하는 학자도 있다."
          shield: "미로 같은 굴에 산다.\n흙냄새로 자신이 있는 곳을\n알 수 있어 절대 길을 잃지 않는다."
        zh_simp:
          sword: "因为长着小小的翅膀，\n有些学者认为它\n在很久以前是会飞的。"
          shield: "栖息在像迷宫一样的巢穴里。\n能通过土壤的气味来判断自己的\n位置，所以绝对不会迷路。"
        zh_trad:
          sword: "因為牠擁有小小的翅膀，\n有些學者主張很久以前\n牠曾是在天上飛的。"
          shield: "居住在像是迷宮的巢穴裡。\n能憑土壤的氣味知道自己的\n位置，所以絕對不會迷路。"
