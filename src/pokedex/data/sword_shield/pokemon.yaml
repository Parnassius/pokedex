      descriptions:
        jp_kana:
          sword: "がんじょうな　カラで　みを　まもる。\nアゴの　せんたんから　でんきを\nながして　はんげきする。"
          shield: "たべた　おちばを　しょうかするとき\nはつでんする　しくみ。　おなかの\nでんきぶくろに　じゅうでんされる。"
        jp_kanji:
          sword: "頑丈な　殻で　身を　守る。\n顎の　先端から　電気を\n流して　反撃する。"
          shield: "食べた　落ち葉を　消化するとき\n発電する　仕組み。　お腹の\n電気袋に　充電される。"
        en:
          sword: "While its durable shell protects it from attacks,\nCharjabug strikes at enemies with jolts of\nelectricity discharged from the tips of its jaws."
          shield: "Its digestive processes convert the leaves it eats\ninto electricity. An electric sac in its belly stores\nthe electricity for later use."
        fr:
          sword: "Il est bien protégé par sa robuste carapace,\net se défend en générant un courant électrique\nau bout de ses mandibules."
          shield: "Il possède une poche dans laquelle il emmagasine\nl’électricité qu’il produit en digérant des feuilles\nmortes."
        it:
          sword: "È protetto da un robusto esoscheletro.\nContrattacca con l’elettricità che rilascia\ndalle punte che ha sulla mandibola."
          shield: "Produce energia tramite la digestione delle\nfoglie morte di cui si nutre e la conserva\nnella sacca apposita che ha nel ventre."
        de:
          sword: "Es schützt sich mithilfe seines robusten Panzers.\nDurch die Spitzen an seinem Kiefer leitet es\nStrom, mit dem es sich gegen Angreifer wehrt."
          shield: "Gefressenes Laub verwandelt es während der\nVerdauung in elektrische Energie, die in einem\nStrombeutel in seinem Magen gespeichert wird."
        es:
          sword: "Se protege el cuerpo con un robusto caparazón.\nContraataca liberando corriente eléctrica por\nla punta de las mandíbulas."
          shield: "Al digerir la hojarasca de la que se alimenta,\ngenera energía eléctrica que almacena en la\nbolsa que posee para tal efecto."
        ko:
          sword: "튼튼한 껍질로 몸을 보호한다.\n턱의 끝부분에서 전기를\n흘려보내 반격한다."
          shield: "먹은 낙엽을 소화할 때 전기가\n발생하는 구조로 되어 있다.\n배의 전기 주머니에 충전된다."
        zh_simp:
          sword: "用结实的外壳保护自己。\n会从颚部的尖端\n放出电流反击对手。"
          shield: "虫电宝消化吃掉的落叶时\n会产生电能。它会把这些电能\n储存在自己肚子上的电囊中。"
        zh_trad:
          sword: "用結實的外殼保護自己。\n會從顎部的尖端\n放出電流反擊對手。"
          shield: "蟲電寶消化吃掉的落葉時\n會產生電能。牠會把這些電能\n儲存在自己肚子上的電囊中。"
