      descriptions:
        jp_kana:
          sword: "こわがられないように　ピカチュウに\nにせた　ボロぬのを　かぶっているが\nよけい　ぶきみに　なってしまった。"
          shield: "けんきゅうのため　ボロぬのの　なかを\nみてしまった　がくしゃが　なぞの\nびょうきで　いのちを　おとした。"
        jp_kanji:
          sword: "怖がられないように　ピカチュウに\n似せた　ボロ布を　かぶっているが\n余計に　不気味に　なってしまった。"
          shield: "研究のため　ボロ布の　中を\n見てしまった　学者が　謎の\n病気で　命を　落とした。"
        en:
          sword: "It wears a rag fashioned into a Pikachu costume\nin an effort to look less scary. Unfortunately,\nthe costume only makes it creepier."
          shield: "There was a scientist who peeked under\nMimikyu’s old rag in the name of research.\nThe scientist died of a mysterious disease."
        fr:
          sword: "Il se cache sous des guenilles en forme de Pikachu\npour avoir l’air moins effrayant, mais cela le rend\nencore plus inquiétant."
          shield: "Les malheureux chercheurs qui ont regardé\nsous son déguisement en lambeaux ont succombé\nà une mystérieuse maladie."
        it:
          sword: "Per non spaventare gli altri, cela il suo aspetto\nsotto a un panno che imita le fattezze di Pikachu,\nma questo lo rende ancor più inquietante."
          shield: "Uno scienziato che studiava questo Pokémon\nmorì di una misteriosa malattia dopo aver\nguardato sotto il suo panno."
        de:
          sword: "Es verbirgt sich unter einem Lumpen, der wie ein\nPikachu aussieht, damit niemand Angst vor ihm\nbekommt. Leider wird es dadurch noch gruseliger."
          shield: "Alle Wissenschaftler, die zu Forschungszwecken\neinen Blick unter seinen Lumpen gewagt haben,\nsind an einer rätselhaften Krankheit gestorben."
        es:
          sword: "Se cubre con un saco andrajoso con aspecto de\nPikachu para no resultar tan aterrador, aunque\neste le confiere un aspecto aún más terrorífico."
          shield: "Un investigador que miró dentro del saco para\nestudiar a este Pokémon perdió la vida a causa\nde una misteriosa enfermedad."
        ko:
          sword: "겁을 주지 않기 위해 피카츄와\n닮은 누더기를 쓰고 있지만\n오히려 더 으스스해졌다."
          shield: "연구를 위해 누더기 속을\n들여다본 학자가 알 수 없는\n병으로 목숨을 잃었다."
        zh_simp:
          sword: "为了让别人不要害怕自己，\n特意穿上了看似皮卡丘的破布，\n结果却变得更加令人毛骨悚然。"
          shield: "有一位学者为了研究\n而看了它的破布里面，\n结果患上怪病而离开人世。"
        zh_trad:
          sword: "為了讓別人不要害怕自己，\n特意穿上了看似皮卡丘的破布，\n結果卻變得更加令人毛骨悚然。"
          shield: "有一位學者為了研究\n而看了牠的破布裡面，\n結果患上怪病而離開人世。"
    mimikyu_busted_form:
      form_id: 1
      names:
        jp_kana: ばれたすがた
        jp_kanji: ばれたすがた
        en: Busted Form
        fr: Forme Démasquée
        it: Forma Smascherata
        de: Entlarvte Form
        es: Forma Descubierta
        ko: 들킨 모습
        zh_simp: 现形的样子
        zh_trad: 現形的樣子
      base_stats:
        hp: 55
        attack: 90
        defense: 80
        special_attack: 50
        special_defense: 105
        speed: 96
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 2
        speed: 0
      types:
        - ghost
        - fairy
      egg_groups:
        - amorphous
      abilities:
        - disguise
      descriptions:
        jp_kana:
          sword: "ピカチュウに　ばけていた　ことを\nばらした　ヤツは　ようしゃしない。\nさしちがえてでも　かならず　たおす。"
          shield: "ぬのの　ちからで　てきの　こうげきを\nうけながしたが　くびが　おれてしまい\nしょうたいが　ばれてしまった。"
        jp_kanji:
          sword: "ピカチュウに　化けていた　ことを\nばらした　ヤツは　容赦しない。\n刺し違えてでも　かならず　倒す。"
          shield: "布の　力で　敵の　攻撃を\n受け流したが　首が　折れてしまい\n正体が　ばれてしまった。"
        en:
          sword: "There will be no forgiveness for any who reveal\nthat it was pretending to be Pikachu. It will bring\nthe culprit down, even at the cost of its own life."
          shield: "Its disguise made from an old rag allowed it to\navoid an attack, but the impact broke the neck of\nthe disguise. Now everyone knows it’s a Mimikyu."
        fr:
          sword: "Il se montre sans merci envers ceux qui racontent\nqu’il est juste déguisé en Pikachu.\nIl éliminera ces gêneurs, quoi qu’il lui en coûte."
          shield: "Il a réussi à détourner une attaque,\nmais à présent, le cou brisé de son déguisement\ntrahit sa véritable apparence."
        it:
          sword: "Non perdona chi smaschera il suo travestimento\nda Pikachu e lo finisce anche a costo della sua\nstessa incolumità."
          shield: "Ha evitato l’attacco nemico grazie al potere\ndel panno, ma il collo del suo travestimento\nsi è rotto rivelando la sua vera identità."
        de:
          sword: "Wer auffliegen lässt, dass es sich nur als Pikachu\nverkleidet hat, dem verzeiht es niemals. Es wird\nsich an ihm rächen, koste es, was es wolle."
          shield: "Unglücklicherweise knickte sein Hals um, als es\nmit seinem Lumpen eine Attacke abfing, wodurch\nseine wahre Identität enthüllt wurde."
        es:
          sword: "Pobre de aquel que señale que está disfrazado\nde Pikachu. Acabará con él aunque sea lo último\nque haga."
          shield: "El saco le ha permitido eludir el ataque del rival,\npero, al rompérsele el cuello del disfraz, su\nverdadera identidad ha quedado al descubierto."
        ko:
          sword: "피카츄로 둔갑한 것을\n들키게 한 녀석은 용서하지 않는다.\n목숨과 바꿔서라도 반드시 쓰러뜨린다."
          shield: "천의 힘으로 적의 공격을\n받아넘겼지만 목이 꺾여\n정체를 들켜버렸다."
        zh_simp:
          sword: "绝不会原谅揭穿自己化形成\n皮卡丘这件事的家伙。\n即使牺牲自己也会将对方打倒。"
          shield: "虽然能用破布抵挡住\n敌人的攻击，但折断的\n脖子却让它现出原形。"
        zh_trad:
          sword: "絕不會原諒揭穿自己化形成\n皮卡丘這件事的傢伙。\n即使犧牲自己也會將對方打倒。"
          shield: "雖然能用破布抵擋住\n敵人的攻擊，但折斷的\n脖子卻讓牠現出原形。"
drampa:
  species_id: 780
  names:
    jp_kana: ジジーロン
    jp_kanji: ジジーロン
    en: Drampa
    fr: Draïeul
    it: Drampa
    de: Sen-Long
    es: Drampa
    ko: 할비롱
    zh_simp: 老翁龙
    zh_trad: 老翁龍
  forms:
    drampa:
      form_id: 0
      base_stats:
        hp: 78
        attack: 60
        defense: 85
        special_attack: 135
        special_defense: 91
        speed: 36
      evs_yield:
        hp: 0
        attack: 0
