        jp_kana:
          sword: "するどい　ハネは　つるぎに　まさる\nきれあじ。　ナワバリを　めぐって\nアーマーガアと　はげしく　あらそう。"
          shield: "ぬけおちた　ハネから　つるぎが\nつくられることから　もんしょうの\nずあんとして　にんきが　たかい。"
        jp_kanji:
          sword: "鋭い　羽根は　剣に　勝る　切れ味。\n縄張りを　めぐって\nアーマーガアと　激しく　争う。"
          shield: "抜け落ちた　羽根から　剣が\n作られることから　紋章の\n図案として　人気が　高い。"
        en:
          sword: "The pointed feathers of these Pokémon are\nsharper than swords. Skarmory and Corviknight\nfight viciously over territory."
          shield: "People fashion swords from Skarmory’s shed\nfeathers, so this Pokémon is a popular element\nin heraldic designs."
        fr:
          sword: "Ses plumes sont plus tranchantes que des lames.\nIl se dispute violemment son territoire avec\nles Corvaillus."
          shield: "Ce Pokémon orne souvent les blasons,\ncar les plumes qu’il perd sont utilisées\npour forger des épées."
        it:
          sword: "Le sue piume affilate sono più taglienti di una\nspada. Ha violenti scontri con Corviknight per\nil controllo del territorio."
          shield: "Le piume perse da Skarmory sono utilizzate per\nprodurre spade. Per questo è molto apprezzato\ncome motivo degli stemmi nobiliari."
        de:
          sword: "Seine spitzen Federn sind schärfer als jedes\nSchwert. Es liefert sich erbitterte Revierkämpfe\nmit Krarmor."
          shield: "Es wird gern als Vorlage für Wappenmotive\ngenutzt, da aus den Federn, die ihm ausfallen,\nSchwerter hergestellt werden."
        es:
          sword: "Sus afiladas plumas son más cortantes que el filo\nde una espada. Tiene disputas territoriales muy\nagresivas con Corviknight."
          shield: "Aparece a menudo en escudos heráldicos, pues\nse pueden forjar espadas a partir de las plumas\nque pierde."
        ko:
          sword: "날카로운 날개는 검보다\n예리하다. 영역을 두고\n아머까오와 격렬하게 싸운다."
          shield: "빠진 깃털로 검을\n만들 수 있어서 문장\n도안으로 인기가 많다."
        zh_simp:
          sword: "锐利的羽毛比剑还要锋利。\n与钢铠鸦为领地\n展开激烈的争斗。"
          shield: "由于它身上掉落下来的羽毛\n可以用来制剑，因此作为纹章\n的图案也很有人气。"
        zh_trad:
          sword: "尖銳的羽毛比劍還要\n更鋒利。會和鋼鎧鴉\n為了爭地盤而激烈爭鬥。"
          shield: "由於牠脫落下來的羽毛\n能夠製成劍，因此作為\n家徽的圖案也很有人氣。"
