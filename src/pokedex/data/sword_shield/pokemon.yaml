      descriptions:
        jp_kana:
          sword: "しにわかれた　ははおやを　おもいだし\nなくと　あたまに　かぶった　ホネの\nなかで　ものがなしく　ひびくのだ。"
          shield: "しんだ　ははおやの　ホネを　かぶる。\nゆめを　みて　なくことも　あるけれど\nなみだを　ながすたびに　つよくなる。"
        jp_kanji:
          sword: "死に別れた　母親を　思い出し\n泣くと　頭に　被った　骨の　中で\n物悲しく　響くのだ。"
          shield: "死んだ　母親の　骨を　被る。\n夢を　見て　泣くことも　あるけど\n涙を　流すたびに　強くなる。"
        en:
          sword: "When the memory of its departed mother brings\nit to tears, its cries echo mournfully within the\nskull it wears on its head."
          shield: "This Pokémon wears the skull of its deceased\nmother. Sometimes Cubone’s dreams make it cry,\nbut each tear Cubone sheds makes it stronger."
        fr:
          sword: "Lorsqu’il repense à sa mère défunte,\nses sanglots résonnent tristement sous\nle crâne qu’il porte sur la tête."
          shield: "Il porte sur sa tête le crâne de sa défunte mère.\nIl lui arrive de rêver d’elle et de pleurer, mais\nchaque larme qu’il verse le rend plus fort."
        it:
          sword: "Quando piange pensando alla madre defunta,\ni suoi lamenti riecheggiano tristemente all’interno\ndel teschio che ha in testa."
          shield: "Indossa il teschio della madre defunta. A volte\ncapita che pianga vedendola in sogno, ma a ogni\nlacrima versata diventa più forte."
        de:
          sword: "Denkt Tragosso an seine verstorbene Mutter,\nso weint es. Sein Schluchzen hallt dabei in dem\nSchädel auf seinem Kopf klagend wider."
          shield: "Es trägt den Schädel seiner verstorbenen Mutter.\nManchmal weint Tragosso, während es träumt,\ndoch jede vergossene Träne macht es stärker."
        es:
          sword: "Cuando llora al acordarse de su madre fallecida,\nsu llanto resuena en el cráneo que lleva en la\ncabeza."
          shield: "Lleva puesto el cráneo de su difunta madre.\nA veces llora en sueños, pero cada lágrima\nvertida le hace más fuerte."
        ko:
          sword: "죽은 어머니를 떠올리며 울면\n머리에 쓴 뼈 안에서\n울음소리가 구슬프게 퍼진다."
          shield: "죽은 어미의 뼈를 머리에 쓰고 있다.\n어미의 꿈을 꾸고 울기도 하지만\n눈물을 흘릴 때마다 강해진다."
        zh_simp:
          sword: "因想起与自己天人永隔的母亲\n而哭泣时，哀伤的哭声便会\n回荡在它头上戴着的头骨中。"
          shield: "它头上戴着死去母亲的头骨。\n虽然也会因悲伤的梦境而哭泣，\n但每流一次泪，都会变得更加坚强。"
        zh_trad:
          sword: "當牠想起與自己死別的\n母親而哭泣時，哭聲就會在\n頭上戴的骨頭中哀傷地迴盪。"
          shield: "頭上戴著死去母親的頭骨。\n雖然有時會因為作夢而哭泣，\n但每次流淚後都會變得更強。"
marowak:
