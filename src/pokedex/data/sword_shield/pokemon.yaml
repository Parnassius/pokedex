  species_id: 553
  names:
    jp_kana: ワルビアル
    jp_kanji: ワルビアル
    en: Krookodile
    fr: Crocorible
    it: Krookodile
    de: Rabigator
    es: Krookodile
    ko: 악비아르
    zh_simp: 流氓鳄
    zh_trad: 流氓鱷
