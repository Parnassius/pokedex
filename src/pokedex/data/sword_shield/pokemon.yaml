          shield: "ヒヒダルマが　げきこうした　すがた。\nいかりが　おさまるまで　からだが\nとけようとも　ほのおを　ふきまくる。"
        jp_kanji:
          sword: "退化したはずの　炎袋が\n怒りで　復活。　ところかまわず\n炎を　噴きまくり　暴れる。"
          shield: "ヒヒダルマが　激昂した　姿。\n怒りが　治まるまで　体が\n溶けようとも　炎を　噴きまくる。"
        en:
          sword: "Anger has reignited its atrophied flame sac.\nThis Pokémon spews fire everywhere as it\nrampages indiscriminately."
          shield: "Darmanitan takes this form when enraged.\nIt won’t stop spewing flames until its rage\nhas settled, even if its body starts to melt."
        fr:
          sword: "Sa colère a ravivé sa poche à flammes qui était\ncensée être atrophiée. Il crache du feu dans\ntous les sens sans faire attention aux alentours."
          shield: "C’est la forme courroucée de Darumacho.\nMême si son corps fond, il crache du feu dans\ntous les sens jusqu’à ce que sa colère s’apaise."
        it:
          sword: "La sua ira riattiva la sacca ignea che in condizioni\nnormali è atrofizzata. Sputa fiamme a destra e\na manca senza badare a ciò che lo circonda."
          shield: "Assume questa forma quando è infuriato.\nFinché non si calma sputa fiamme a destra\ne a manca, anche a costo di squagliarsi."
        de:
          sword: "Sein Zorn hat in seinem eigentlich verkümmerten\nFlammensack neues Feuer entfacht. Es speit wie\nwild Feuer und lässt seiner Wut freien Lauf."
          shield: "Diese Form nimmt Flampivian an, wenn es rasend\nvor Wut ist. Es speit so lange Feuer, bis es wieder\nruhig ist, obwohl sein Körper dabei schmilzt."
        es:
          sword: "La ira ha reactivado su saca de fuego, que se\nsuponía atrofiada. Emite llamaradas en todas\ndirecciones sin importarle nada a su alrededor."
          shield: "Adopta esta forma cuando monta en cólera y,\nhasta que esta remite, suelta llamaradas por\ndoquier aun a riesgo de derretirse a sí mismo."
        ko:
          sword: "퇴화했던 불꽃 주머니가\n분노에 의해 부활했다.\n사방팔방 불꽃을 내뿜으며 날뛴다."
          shield: "불비달마가 격앙된 모습이다.\n분노가 진정될 때까지 몸이\n녹아내리더라도 불꽃을 세차게 뿜는다."
        zh_simp:
          sword: "原本已经退化的火囊\n因愤怒而重生。在所到\n之处胡乱喷火大闹一番。"
          shield: "达摩狒狒情绪激昂的样子。\n在怒气平息之前，即使身体\n融化也会不断喷出火焰。"
        zh_trad:
          sword: "原本已經退化的火囊\n因憤怒而重生。在所到\n之處胡亂噴火大鬧一番。"
          shield: "達摩狒狒情緒激昂的樣子。\n在怒氣平息之前，即使身體\n融化也會不斷噴出火焰。"
maractus:
  species_id: 556
  names:
    jp_kana: マラカッチ
    jp_kanji: マラカッチ
    en: Maractus
    fr: Maracachi
    it: Maractus
    de: Maracamba
    es: Maractus
    ko: 마라카치
    zh_simp: 沙铃仙人掌
    zh_trad: 沙鈴仙人掌
  forms:
    maractus:
      form_id: 0
      base_stats:
        hp: 75
