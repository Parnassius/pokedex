      descriptions:
        jp_kana:
          sword: "かたい　ハサミは　１まんばりきの\nパワーを　もっているが　おおきすぎて\nうごきが　にぶい。"
          shield: "はかいりょく　ばつぐんの　おおきな\nハサミだが　おもすぎるので\nたたかわないときは　じゃまになる。"
        jp_kanji:
          sword: "硬い　ハサミは　１万馬力の\nパワーを　もっているが　大きすぎて\n動きが　鈍い。"
          shield: "破壊力　抜群の　大きな\nハサミだが　重すぎるので\n戦わないときは　じゃまになる。"
        en:
          sword: "Its large and hard pincer has 10,000-horsepower\nstrength. However, being so big, it is unwieldy\nto move."
          shield: "Its oversized claw is very powerful, but when it’s\nnot in battle, the claw just gets in the way."
        fr:
          sword: "Sa grosse pince est dotée d’une puissance\nincommensurable. Sa taille imposante la rend\ntoutefois difficile à utiliser."
          shield: "Sa pince gigantesque possède une puissance\ndestructrice phénoménale, mais hors combat,\nson poids devient un handicap."
        it:
          sword: "La chela più grande sprigiona una potenza\ndi 10.000 CV. Le dimensioni gli rendono\ndifficili gli spostamenti."
          shield: "La sua chela più grande ha una potenza\ndistruttiva fenomenale, ma fuori dalla lotta\ngli è d’impiccio per via del peso."
        de:
          sword: "Die Kraft seiner großen und harten Schere\nentspricht 10 000 PS. Durch die Größe ist sie\naber auch äußerst unhandlich und sperrig."
          shield: "Seine Riesenschere ist sehr stark, aber wenn es\nnicht kämpft, kommt sie ihm häufig in die Quere."
        es:
          sword: "La pinza tan grande que tiene posee una fuerza\nde 10 000 CV, pero le cuesta moverla por su\ngran tamaño."
          shield: "Su gran pinza posee una potencia devastadora,\npero su peso excesivo la convierte en un estorbo\nfuera del terreno de combate."
        ko:
          sword: "단단한 집게는 1만 마력의\n파워를 지녔지만\n너무 커서 움직임이 둔하다."
          shield: "큰 집게는 뛰어난 파괴력을\n지녔지만 너무 무거워서\n싸우지 않을 때는 거추장스럽다."
        zh_simp:
          sword: "虽然坚硬的钳子\n有着１万马力的力量，\n但因为太大而行动迟缓。"
          shield: "巨大的钳子破坏力十足，\n但是因为太过沉重，\n不战斗的时候就很碍事。"
        zh_trad:
          sword: "雖然堅硬的鉗子\n有著１萬馬力的力量，\n但尺寸太大讓牠行動遲緩。"
          shield: "巨大的鉗子破壞力十足，\n但是因為太過沉重，\n不戰鬥的時候就很礙事。"
  gmax_forms:
    kingler_gigantamax:
      form_id: 999
      names:
        jp_kana: キョダイマックス
        jp_kanji: キョダイマックス
        en: Gigantamax
        fr: Gigamax
        it: Gigamax
        de: Gigadynamax
        es: Gigamax
        ko: 거다이맥스
        zh_simp: 超极巨化
        zh_trad: 超極巨化
      descriptions:
        jp_kana:
          sword: "キョダイマックスの　パワーによって\nきょだいになった　ひだりの　はさみは\nなんでも　こなごなに　すりつぶす。"
          shield: "きょうアルカリせいの　あわを　だす。\nふきかけられた　あいての　からだを\nたちまち　とかしてしまう。"
        jp_kanji:
          sword: "キョダイマックスの　パワーによって\n巨大になった　左の　ハサミは\nなんでも　粉々に　すり潰す。"
          shield: "強アルカリ性の　泡を　だす。\n吹きかけられた　相手の　体を\nたちまち　溶かしてしまう。"
        en:
          sword: "The flow of Gigantamax energy has spurred this\nPokémon’s left pincer to grow to an enormous\nsize. That claw can pulverize anything."
          shield: "The bubbles it spews out are strongly alkaline.\nAny opponents hit by them will have their bodies\nquickly melted away."
        fr:
          sword: "Grâce à la puissance du Gigamax, sa pince\ngauche est devenue géante et peut réduire\nn’importe quoi en miettes."
          shield: "Il expulse de l’eau extrêmement alcaline\nsur ses adversaires, ce qui dissout leur corps\ninstantanément."
        it:
          sword: "La chela sinistra, diventata gigantesca per effetto\ndel fenomeno Gigamax, può ridurre in frantumi\nqualunque cosa."
          shield: "Emette dalla bocca una schiuma estremamente\nalcalina che scioglie all’istante il corpo del\nnemico."
        de:
          sword: "Durch die Gigadynamax-Energie hat seine linke\nSchere gewaltige Ausmaße angenommen. Mit ihr\nzermalmt es alles, was ihm in die Quere kommt."
          shield: "Es speit stark alkalische Blasen, die bei Berührung\nsofort eine ätzende Wirkung entfalten."
        es:
          sword: "Puede pulverizar cualquier cosa con su pinza\nizquierda, que ha adoptado dimensiones\ndescomunales gracias al fenómeno Gigamax."
          shield: "Expulsa una espuma tan alcalina y corrosiva que\nes capaz de disolver al instante el cuerpo de sus\nadversarios."
        ko:
          sword: "거다이맥스의 파워에 의해\n거대해진 왼쪽 집게는\n무엇이든 산산이 부숴버린다."
          shield: "강알칼리성의 거품을 내뿜는다.\n거품에 닿은 상대의 몸은\n순식간에 녹아버린다."
        zh_simp:
          sword: "受到超极巨化之力影响\n而变得巨大的左钳可以把\n任何东西都夹得粉碎。"
          shield: "会吐出强碱性的泡沫，\n对手一旦被泡沫沾上，\n身体就会立刻溶化。"
        zh_trad:
          sword: "受到超極巨化之力影響\n而變得巨大的左鉗可以把\n任何東西都夾得粉碎。"
          shield: "會吐出強鹼性的泡沫，\n對手一旦被泡沫沾上，\n身體就會立刻溶化。"
exeggcute:
  species_id: 102
  names:
    jp_kana: タマタマ
    jp_kanji: タマタマ
    en: Exeggcute
    fr: Noeunoeuf
    it: Exeggcute
    de: Owei
    es: Exeggcute
    ko: 아라리
    zh_simp: 蛋蛋
    zh_trad: 蛋蛋
  forms:
    exeggcute:
      form_id: 0
      base_stats:
        hp: 60
        attack: 40
        defense: 80
        special_attack: 60
        special_defense: 45
        speed: 40
      evs_yield:
        hp: 0
        attack: 0
