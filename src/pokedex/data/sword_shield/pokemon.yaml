        jp_kana:
          sword: "うみの　すいおんが　ひくいためか\nガラルちほうに　すむ　タマンタは\nやや　うごきが　にぶいらしい。"
          shield: "テッポウオの　むれに　まざって\nおよぐ。　てきに　おそわれると\nむれと　いっしょに　たたかうよ。"
        jp_kanji:
          sword: "海の　水温が　低いためか\nガラル地方に　棲む　タマンタは\nやや　動きが　鈍いらしい。"
          shield: "テッポウオの　群れに　混ざって\n泳ぐ。　敵に　襲われると\n群れと　いっしょに　戦うよ。"
        en:
          sword: "Mantyke living in Galar seem to be somewhat\nsluggish. The colder waters of the seas in this\nregion may be the cause."
          shield: "It swims along with a school of Remoraid, and\nthey’ll all fight together to repel attackers."
        fr:
          sword: "Les Babimanta vivant à Galar semblent un peu\nengourdis. Cela pourrait être dû à la basse\ntempérature de la mer."
          shield: "Il nage au sein des bancs de Rémoraid.\nLorsqu’un prédateur les attaque, il se bat\nà leurs côtés."
        it:
          sword: "I Mantyke che vivono a Galar si muovono\nlentamente, forse per via della temperatura\ndel mare relativamente bassa."
          shield: "Nuota in mezzo ai banchi di Remoraid\ne lotta assieme a loro quando vengono\nattaccati."
        de:
          sword: "Vielleicht liegt es an der niedrigen Temperatur\ndes Meeres, aber die Mantirps der Galar-Region\nbewegen sich etwas schwerfälliger als andere."
          shield: "Es mischt sich unter Remoraid-Schwärme und\nschwimmt mit ihnen. Werden diese angegriffen,\nkämpft es gemeinsam an ihrer Seite."
        es:
          sword: "Los Mantyke que habitan en los mares de Galar\nse mueven con lentitud, posiblemente por la baja\ntemperatura de las aguas de la región."
          shield: "Nada con los bancos de Remoraid y lucha junto\na ellos cuando los ataca un enemigo."
        ko:
          sword: "바다의 수온이 낮기 때문인지\n가라르지방에 사는 타만타는\n약간 움직임이 둔한 듯하다."
          shield: "총어 무리에 섞여서 헤엄친다.\n적에게 습격당하면\n무리와 함께 싸운다."
        zh_simp:
          sword: "也许是因为海水温度偏低，\n伽勒尔地区的小球飞鱼\n动作似乎有点迟缓。"
          shield: "混在铁炮鱼的大群里游泳。\n受到敌人袭击的时候，\n会和铁炮鱼们并肩作战。"
        zh_trad:
          sword: "也許是因為海水溫度偏低，\n伽勒爾地區的小球飛魚\n動作似乎有點遲緩。"
          shield: "混在鐵炮魚的大群裡游泳。\n受到敵人襲擊的時候，\n會和鐵炮魚們並肩作戰。"
