          shield: "おそろしい　ドラゴンポケモンを\nうつくしい　ニンフィアが　たいじする\nどうわが　ガラルちほうに　のこる。"
        jp_kanji:
          sword: "リボンのような　触角から\n敵意を　消す　波動を　発して\n争いを　やめさせる。"
          shield: "恐ろしい　ドラゴンポケモンを\n美しい　ニンフィアが　退治する\n童話が　ガラル地方に　残る。"
        en:
          sword: "By releasing enmity-erasing waves from its\nribbonlike feelers, Sylveon stops any conflict."
          shield: "There’s a Galarian fairy tale that describes\na beautiful Sylveon vanquishing a dreadful\ndragon Pokémon."
        fr:
          sword: "Grâce à ses antennes semblables à des rubans,\nil peut émettre des ondes neutralisant l’hostilité\net ainsi mettre fin aux querelles."
          shield: "Un conte de Galar relate la victoire d’un beau\nNymphali sur un terrible Pokémon Dragon."
        it:
          sword: "Fa cessare le lotte grazie alle antenne simili\na fiocchetti, che emettono onde in grado di\nplacare le ostilità."
          shield: "Una favola di Galar narra di un Sylveon di rara\nbellezza che sconfisse uno spaventoso Pokémon\ndi tipo Drago."
        de:
          sword: "Mit seinen bandförmigen Fühlern sendet es\nWellen aus, die feindselige Gefühle verklingen\nlassen. So legt es Streitereien bei."
          shield: "Ein in der Galar-Region überliefertes Märchen\nerzählt von einem bildhübschen Feelinara, das\nein grässliches Drachen-Pokémon bezwingt."
        es:
          sword: "Con sus apéndices sensoriales en forma de cinta,\npuede emitir ondas que neutralizan la hostilidad\ny detener así cualquier contienda."
          shield: "En un cuento infantil de Galar se narra la victoria\nde un Sylveon de extraordinaria belleza sobre un\ntemible Pokémon de tipo Dragón."
        ko:
          sword: "리본 모양의 더듬이로부터\n적의를 없애는 파동을 내보내\n싸움을 그만두게 한다."
          shield: "무서운 드래곤포켓몬을\n아름다운 님피아가 퇴치하는\n동화가 가라르지방에 남아 있다."
        zh_simp:
          sword: "会从蝴蝶结般的触角里\n释放能够消除敌意的波动，\n借此平息纷争。"
          shield: "伽勒尔地区的童话中有着\n美丽的仙子伊布击退了\n可怕的龙宝可梦的故事。"
        zh_trad:
          sword: "會從蝴蝶結般的觸角裡\n釋放能夠消除敵意的波動，\n藉此平息紛爭。"
          shield: "伽勒爾地區的童話中有著\n美麗的仙子伊布擊退了\n可怕的龍寶可夢的故事。"
