      descriptions:
        jp_kana:
          sword: "みずからが　まきおこす　すなあらしの\nちゅうしんに　いるので　めったに\nひとまえに　あらわれない　ポケモン。"
          shield: "はばたく　おとが　おんなのひとの\nうつくしい　うたごえに　にているため\nさばくのせいれい　と　よばれている。"
        jp_kanji:
          sword: "自らが　巻き起こす　砂嵐の\n中心に　いるので　滅多に\n人前に　現れない　ポケモン。"
          shield: "はばたく　音が　女の人の\n美しい　歌声に　似ているため\n砂漠の精霊　と　呼ばれている。"
        en:
          sword: "This Pokémon hides in the heart of sandstorms\nit creates and seldom appears where people\ncan see it."
          shield: "It is nicknamed the Desert Spirit because the\nflapping of its wings sounds like a woman singing."
        fr:
          sword: "Comme il est souvent caché au cœur des\ntempêtes de sable qu’il déclenche, ce Pokémon\nn’est que rarement aperçu par l’Homme."
          shield: "On l’appelle « l’esprit du désert », car ses\nbattements d’ailes résonnent comme une mélodie\nentonnée par une voix douce."
        it:
          sword: "Si nasconde nelle tempeste di sabbia che\ngenera sbattendo le ali. Raramente gli esseri\numani riescono a vederlo."
          shield: "Viene chiamato anche “spirito del deserto”,\npoiché il suono del suo battito d’ali ricorda\nun bellissimo canto di donna."
        de:
          sword: "Da es sich stets im Zentrum des von ihm\nentfachten Sandsturms aufhält, bekommen\nMenschen es so gut wie nie zu Gesicht."
          shield: "Sein Flügelschlag klingt wie wunderschöner\nFrauengesang. Daher nennt man es auch\n„Geist der Wüste“."
        es:
          sword: "Al batir las alas, provoca tormentas de arena que\nlo ocultan por completo, por lo que rara vez se\nha visto a este Pokémon."
          shield: "El batir de sus alas suena como un bello canto de\nmujer. Se lo conoce como el Alma del Desierto."
        ko:
          sword: "스스로 일으키는 모래바람의\n중심에 있어 좀처럼\n사람들 앞에 나타나지 않는 포켓몬이다."
          shield: "날갯짓하는 소리가 여성의\n아름다운 노랫소리와 닮아서\n사막의 정령이라고 불린다."
        zh_simp:
          sword: "因为位于自己卷起的沙暴中心，\n所以是很少现身于人前的宝可梦。"
          shield: "由于它挥动翅膀的声音\n好似女性优美的歌声，\n因此被称为沙漠精灵。"
        zh_trad:
          sword: "因為總是位於自己引發\n的沙暴中心，所以是極少\n現身於人前的寶可夢。"
          shield: "由於牠揮動翅膀的聲音\n好似女性優美的歌聲，\n因此被稱為沙漠精靈。"
