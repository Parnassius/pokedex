          shield: "おたがいの　しっぽを　くっつけて\n電気を　流しあうのが\nピカチュウ　同士の　挨拶だ。"
        en:
          sword: "Pikachu that can generate powerful electricity\nhave cheek sacs that are extra soft and\nsuper stretchy."
          shield: "When Pikachu meet, they’ll touch their tails\ntogether and exchange electricity through them\nas a form of greeting."
        fr:
          sword: "Plus la puissance électrique de Pikachu est élevée,\nplus les poches de ses joues sont extensibles."
          shield: "Les Pikachu se disent bonjour en se frottant\nla queue et en y faisant passer du courant\nélectrique."
        it:
          sword: "Più potente è l’energia elettrica prodotta dal\nPokémon, più le sacche sulle sue guance sono\nmorbide ed elastiche."
          shield: "I Pikachu si salutano fra loro unendo le code\ne facendovi passare elettricità attraverso."
        de:
          sword: "Je stärker die Elektrizität ist, die Pikachu\nproduziert, desto weicher und elastischer\nsind seine Backentaschen."
          shield: "Pikachu begrüßen einander, indem sie ihre\nSchweife aneinanderreiben und eine Ladung\nStrom durch diese gleiten lassen."
        es:
          sword: "Cuanto más potente es la energía eléctrica que\ngenera este Pokémon, más suaves y elásticas se\nvuelven las bolsas de sus mejillas."
          shield: "Los miembros de esta especie se saludan entre\nsí uniendo sus colas y transmitiéndose corriente\neléctrica."
        ko:
          sword: "만들어 내는 전기가 강력한\n피카츄일수록 볼의 주머니가\n부드럽고 잘 늘어난다."
          shield: "서로의 꼬리를 붙여서\n전기를 흐르게 하는 게\n피카츄 사이의 인사법이다."
        zh_simp:
          sword: "越是能制造出强大电流的\n皮卡丘，脸颊上的囊就越\n柔软，同时也越有伸展性。"
          shield: "皮卡丘们把尾巴\n贴在一起交换电流，\n其实是在互相打招呼。"
        zh_trad:
          sword: "越是能製造出強大電流的\n皮卡丘，臉頰上的囊就越\n柔軟，同時也越有伸展性。"
          shield: "皮卡丘們把尾巴\n貼在一起交換電流，\n其實是在互相打招呼。"
    pikachu_original_cap:
