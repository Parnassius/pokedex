          shield: "いわだらけの　あくろを　ものともせず\nいちりんしゃのように　はしりまわる。\nせきたんを　もやして　いきている。"
        jp_kanji:
          sword: "およそ４００年前に　炭鉱で\n見つかった。　体の　ほとんどが\n石炭と　同じ　成分。"
          shield: "岩だらけの　悪路を　ものともせず\n一輪車のように　走りまわる。\n石炭を　燃やして　生きている。"
        en:
          sword: "Most of its body has the same composition as\ncoal. Fittingly, this Pokémon was first discovered\nin coal mines about 400 years ago."
          shield: "It can race around like a unicycle, even on rough,\nrocky terrain. Burning coal sustains it."
        fr:
          sword: "On l’a découvert dans une mine il y a 400 ans.\nSon corps est presque entièrement composé\nd’une substance identique au charbon."
          shield: "Il parcourt sans difficulté les sentiers rocheux\naccidentés à la manière d’un monocycle.\nIl a besoin de brûler du charbon pour vivre."
        it:
          sword: "È stato scoperto più di 400 anni fa in una\nminiera. Il suo corpo è prevalentemente\ncomposto di una sostanza uguale al carbone."
          shield: "Corre in lungo e in largo come un monociclo\nanche sulle strade sassose più accidentate.\nVive grazie alla combustione del carbone."
        de:
          sword: "Es wurde vor circa 400 Jahren in einer Kohlemine\nentdeckt. Sein Körper besteht fast aus denselben\nKomponenten wie Steinkohle."
          shield: "Auch auf steinigen, schlecht befahrbaren Wegen\nfährt es problemlos, als wäre es ein Einrad.\nEs verbrennt Steinkohle, um zu überleben."
        es:
          sword: "Fue descubierto hace aproximadamente 400\naños en una mina. Casi la totalidad de su cuerpo\npresenta una composición igual a la del carbón."
          shield: "Recorre incluso los caminos más impracticables y\npedregosos como si de un monociclo se tratase.\nLa combustión de carbón es su fuente vital."
        ko:
          sword: "약 400년 전에 탄광에서\n발견되었다. 몸의 대부분이\n석탄과 같은 성분이다."
          shield: "바위투성이의 거친 길을 아무렇지도\n않게 일륜차처럼 달린다.\n석탄을 태워서 살고 있다."
        zh_simp:
          sword: "大约４００年前在煤矿坑中\n被人们发现。身体绝大部分\n的成分都和煤炭相同。"
          shield: "在满是岩石的崎岖之路上\n也能像独轮车那样自在移动。\n靠燃烧煤炭维持生命。"
        zh_trad:
          sword: "大約４００年前在煤礦坑中\n被人們發現。身體絕大部分\n的成分都和煤炭相同。"
          shield: "在滿是岩石的崎嶇路面上\n也能像獨輪車那樣自在移動。\n靠燃燒煤炭維持生命。"
carkol:
  species_id: 838
  names:
    jp_kana: トロッゴン
    jp_kanji: トロッゴン
    en: Carkol
    fr: Wagomine
    it: Carkol
