          shield: "まえあしを　じたばた　ふって　みを\nまもる　ようすは　かわいらしいが\nたいぼくを　へしおる　いりょくだ。"
        jp_kanji:
          sword: "ふわふわの　毛並みは　触り心地が\n抜群だが　うかつに　手を　だすと\n手痛い　反撃を　受けてしまう。"
          shield: "前脚を　じたばた　振って　身を\n守る　様子が　可愛らしいが\n大木を　へし折る　威力だ。"
        en:
          sword: "Its fluffy fur is a delight to pet, but carelessly\nreaching out to touch this Pokémon could result\nin painful retaliation."
          shield: "The way it protects itself by flailing its arms may\nbe an adorable sight, but stay well away. This is\nflailing that can snap thick tree trunks."
        fr:
          sword: "Sa fourrure duveteuse est très agréable à caresser,\nmais ceux qui la touchent sans prévenir s’exposent\nà une correction brutale."
          shield: "Sa façon de remuer les pattes pour se défendre\nsemble adorable, mais ce Pokémon est si puissant\nqu’il pourrait fendre un tronc de la sorte."
        it:
          sword: "Il suo soffice manto è molto piacevole da\naccarezzare, ma se lo si sfiora inavvertitamente\nsi rischia di venire attaccati."
          shield: "Quando cerca di difendersi agitando le zampe\nanteriori fa tenerezza, ma in realtà possiede\nuna forza tale da spezzare grossi alberi."
        de:
          sword: "Sein Pelz ist wunderbar flauschig. Wagt man es\njedoch, diesen zu berühren, setzt es sich ohne\nRücksicht auf Verluste zur Wehr."
          shield: "Strampelt es zum Schutz mit den Vorderbeinen,\nsieht das zwar niedlich aus, aber ein Treffer mit\nihnen ist stark genug, um große Bäume zu fällen."
        es:
          sword: "Su suave pelaje invita a acariciarlo, pero quien\ncometa semejante temeridad recibirá un severo\nescarmiento."
          shield: "Cuando patalea para tratar de defenderse\nresulta adorable, pero conviene no fiarse, ya\nque su fuerza sería capaz de derribar un árbol."
        ko:
          sword: "푹신푹신한 털은 감촉이\n뛰어나지만 섣불리 손을 댔다간\n호되게 반격을 당하고 만다."
          shield: "앞발을 바둥바둥 흔들어 몸을\n지키는 모습은 귀엽지만\n큰 나무도 꺾을 정도의 위력이 있다."
        zh_simp:
          sword: "毛茸茸的毛皮摸上去触感超群，\n但粗心大意地向它伸出手的人\n基本上都会遭到它的剧烈反击。"
          shield: "为了保护自己的身体而\n胡乱挥舞前脚的样子虽然可爱，\n威力却大到能将大树折断。"
        zh_trad:
          sword: "毛茸茸的毛皮摸起來觸感超群，\n但粗心大意地向牠伸出手的人\n基本上都會遭到牠的劇烈反擊。"
          shield: "為了保護自己的身體而\n胡亂揮舞前腳的樣子雖然可愛，\n威力卻大到能將大樹折斷。"
