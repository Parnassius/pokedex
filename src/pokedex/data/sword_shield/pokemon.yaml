        jp_kana:
          sword: "おしりで　すいほうを　ふくらませて\nあたまを　つつむ。　なかまどうしで\nすいほうの　おおきさを　くらべる。"
          shield: "ふだんは　みずの　なかで　せいかつ\nしているが　エサを　さがしに　りくに\nあがるときは　すいほうを　かぶる。"
        jp_kanji:
          sword: "お尻で　水泡を　膨らませて\n頭を　包む。　仲間同士で\n水泡の　大きさを　比べる。"
          shield: "普段は　水の　中で　生活\nしているが　エサを　探しに　陸に\n上がるときは　水泡を　かぶる。"
        en:
          sword: "It forms a water bubble at the rear of its body\nand then covers its head with it. Meeting another\nDewpider means comparing water-bubble sizes."
          shield: "Dewpider normally lives underwater. When it\ncomes onto land in search of food, it takes\nwater with it in the form of a bubble on its head."
        fr:
          sword: "Il enveloppe sa tête dans une bulle d’eau qu’il\na gonflée avec son abdomen. Il aime en comparer\nla taille avec celles de ses congénères."
          shield: "Il vit principalement dans l’eau, mais s’il a besoin\nde s’aventurer sur la terre ferme pour chasser\nses proies, il protège sa tête avec une bulle d’eau."
        it:
          sword: "Con l’addome gonfia una bolla d’acqua in cui\ntiene infilata la testa. Fa a gara con gli altri\nDewpider a chi ha la bolla più grande."
          shield: "Vive principalmente in acqua. Quando sale\nsulla terraferma in cerca di cibo ricopre la sua\ntesta con una bolla d’acqua."
        de:
          sword: "Mit dem Hinterleib füllt es eine Wasserblase auf\nund hüllt seinen Kopf darin ein. Trifft es andere\nAraqua, vergleichen sie ihre Wasserblasengröße."
          shield: "Es verlässt das Wasser nur selten. Wenn es auf\nFuttersuche an Land kommt, hüllt es seinen Kopf\nin eine Wasserblase."
        es:
          sword: "Crea una burbuja de agua con el abdomen y se\ncubre la cabeza con ella. Si dos ejemplares se\nencuentran, comparan el tamaño de sus burbujas."
          shield: "Vive bajo el agua y, cuando emerge a tierra firme\nen busca de presas, se recubre la cabeza con una\nburbuja."
        ko:
          sword: "엉덩이로 수포를 부풀려서\n머리를 감싼다. 동료끼리\n수포의 크기를 비교한다."
          shield: "평소에는 물속에서 생활하지만\n먹이를 찾으러 육지로\n올라올 때는 수포를 뒤집어쓴다."
        zh_simp:
          sword: "用臀部让水泡膨胀，\n并包裹住自己的头部。\n会和同类比拼水泡的大小。"
          shield: "平时生活在水中，\n也会戴上水泡去\n陆地上寻找食物。"
        zh_trad:
          sword: "用臀部讓水泡膨脹，\n並包裹住自己的頭部。\n會和同類比拼水泡的大小。"
          shield: "平時生活在水中，\n也會戴上水泡去\n陸地上尋找食物。"
