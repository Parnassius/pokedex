      types:
        - bug
        - psychic
      egg_groups:
        - bug
      abilities:
        - swarm
        - frisk
      hidden_ability: telepathy
      held_items:
        rare: psychic_seed
      descriptions:
        jp_kana:
          sword: "かしこい　ポケモンとして　ゆうめい。\nおおきな　のうみそは　きょうりょくな\nサイコパワーを　もつ　あかし。"
          shield: "サイコパワーを　はなち　しゅういを\nしらべている。　かんそくはんいは\nしゅうい　１０キロにも　たっするぞ。"
        jp_kanji:
          sword: "賢い　ポケモンとして　有名。\n大きな　脳みそは　強力な\nサイコパワーを　もつ　証し。"
          shield: "サイコパワーを　放ち　周囲を\n調べている。　観測範囲は\n周囲　１０キロにも　達するぞ。"
        en:
          sword: "It’s famous for its high level of intelligence, and\nthe large size of its brain is proof that it also\npossesses immense psychic power."
          shield: "It emits psychic energy to observe and study\nwhat’s around it—and what’s around it can\ninclude things over six miles away."
        fr:
          sword: "Il est renommé pour son intelligence.\nSon gros cerveau est un indicateur de la puissance\nde ses pouvoirs psychiques."
          shield: "Il déploie ses pouvoirs psychiques pour sonder\nles alentours, sur un rayon pouvant atteindre\n10 km."
        it:
          sword: "Questo Pokémon è famoso per la sua\nintelligenza. Il cervello molto sviluppato è\nuna spia dei suoi fenomenali poteri psichici."
          shield: "Grazie ai suoi poteri psichici è in grado di tenere\nsotto controllo la situazione in un’area di ben\n10 km attorno a lui."
        de:
          sword: "Es ist allseits als sehr schlaues Pokémon bekannt.\nSein großes Gehirn ist ein Indiz dafür, dass es\nüber mächtige Psycho-Kräfte verfügt."
          shield: "Indem es Psycho-Kräfte ausstrahlt, erfasst es die\nUmgebung. Seine Observation umfasst dabei\neinen beeindruckenden Umkreis von 10 km."
        es:
          sword: "Este Pokémon es conocido por su inteligencia.\nEl gran tamaño de su cerebro es un indicio de\nla magnitud de sus poderes psíquicos."
          shield: "Se sirve de sus poderes psíquicos, con los que\nes capaz de percibir lo que ocurre en un radio\nde 10 km, para examinar sus alrededores."
        ko:
          sword: "똑똑한 포켓몬으로 유명하다.\n커다란 두뇌는 강력한\n사이코 파워를 가졌다는 증거다."
          shield: "사이코 파워를 발산해 주위를\n조사한다. 관측 범위는\n주변 10km에 달한다."
        zh_simp:
          sword: "以头脑聪慧而闻名。\n大大的脑子是它拥有\n出众精神力量的证明。"
          shield: "释放出精神力量来调查\n周围的情况。它的侦测范围\n甚至可以达到方圆１０公里。"
        zh_trad:
          sword: "以頭腦聰慧而聞名。\n大大的腦子是牠擁有\n出眾精神力量的證明。"
          shield: "釋放出精神力量來調查\n周圍的情況。牠的偵測範圍\n甚至可以達到方圓１０公里。"
  gmax_forms:
    orbeetle_gigantamax:
      form_id: 999
      names:
        jp_kana: キョダイマックス
        jp_kanji: キョダイマックス
        en: Gigantamax
        fr: Gigamax
        it: Gigamax
        de: Gigadynamax
        es: Gigamax
        ko: 거다이맥스
        zh_simp: 超极巨化
        zh_trad: 超極巨化
      descriptions:
        jp_kana:
          sword: "のうを　ちゅうしんに　きょだいか。\nあっとうてき　ちのうと　ぼうだいな\nサイコエネルギーを　もっている。"
          shield: "パワーを　ふりしぼると　まわりに\nいる　すべての　ものの　こころを\nあやつることが　できるのだ。"
        jp_kanji:
          sword: "脳を　中心に　巨大化。\n圧倒的　知能と　膨大な\nサイコエネルギーを　もっている。"
          shield: "パワーを　ふり絞ると　まわりに\nいる　すべての　ものの　心を\n操ることが　できるのだ。"
        en:
          sword: "Its brain has grown to a gargantuan size, as has\nthe rest of its body. This Pokémon’s intellect and\npsychic abilities are overpowering."
          shield: "If it were to utilize every last bit of its power,\nit could control the minds of every living being\nin its vicinity."
        fr:
          sword: "Son corps est devenu gigantesque, à commencer\npar son cerveau. Il est doté d’une intelligence\nsupérieure et d’immenses pouvoirs psychiques."
          shield: "En concentrant son pouvoir, il peut manipuler\nl’esprit de tous les êtres qui l’entourent."
        it:
          sword: "Il suo cervello si è ingigantito, dotandolo di\nfacoltà mentali impressionanti e di un’enorme\nenergia psichica."
          shield: "Usando appieno i suoi poteri, è in grado\ndi controllare la mente di chiunque abbia\nintorno."
        de:
          sword: "Sein gigantisches Gehirn dominiert nun seinen\nKörper. Es verfügt über enorme Intelligenz und\nüberwältigende Psycho-Kräfte."
          shield: "Wenn es seinen Kräften freien Lauf lässt, kann es\nuneingeschränkte Kontrolle über jeden erlangen,\nder sich in seiner Umgebung befindet."
        es:
          sword: "Su cerebro se ha agigantado, por lo que ha\nadquirido una inteligencia abrumadora y una\ncolosal energía psíquica."
          shield: "Si despliega su máximo poder, es capaz de\ncontrolar la mente de todos cuantos se hallen\na su alrededor."
        ko:
          sword: "뇌를 중심으로 거대화했다.\n압도적인 지능과 방대한\n사이코 에너지를 지니고 있다."
          shield: "파워를 최대한으로 쥐어짜면\n주위에 있는 모두의 마음을\n조종할 수 있다."
        zh_simp:
          sword: "全身以大脑为中心巨大化。\n拥有无与伦比的智力，\n和庞大的精神能量。"
          shield: "在它竭尽全力时，\n能够操纵自己周围\n一切生物的心灵。"
        zh_trad:
          sword: "全身以大腦為中心巨大化。\n擁有無與倫比的智力，\n和龐大的精神能量。"
          shield: "在牠使盡全力時，\n能夠操縱自己周圍\n一切生物的心靈。"
