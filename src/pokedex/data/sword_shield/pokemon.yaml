        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ground
      egg_groups:
        - field
      abilities:
        - sand_stream
      hidden_ability: sand_force
      descriptions:
        jp_kana:
          sword: "からだの　あなには　たまに　いしが\nつまる。　いしを　とってくれるので\nイシズマイを　たいせつに　まもる。"
          shield: "おこらせると　かなり　きょうぼう。\nとりこんだ　すなを　ふきだして\nすなあらしを　まきおこす。"
        jp_kanji:
          sword: "体の　穴には　たまに　石が\n詰まる。　石を　取ってくれるので\nイシズマイを　大切に　守る。"
          shield: "怒らせると　かなり　狂暴。\n取りこんだ　砂を　噴き出して\n砂嵐を　巻き起こす。"
        en:
          sword: "Stones can get stuck in the ports on their bodies.\nDwebble help dislodge such stones, so\nHippowdon look after these Pokémon."
          shield: "When roused to violence by its rage, it spews out\nthe quantities of sand it has swallowed and\nwhips up a sandstorm."
        fr:
          sword: "Il prend grand soin des Crabicoque,\ncar ils l’aident à se débarrasser des cailloux\nqui obstruent parfois les orifices de son corps."
          shield: "Il entre dans une violente colère quand\non l’énerve : il expulse le sable qu’il a accumulé\npour provoquer de véritables tempêtes."
        it:
          sword: "Protegge con zelo i Dwebble, perché lo aiutano\na liberarsi delle pietre che a volte si incastrano\nnei pori che ha sul dorso."
          shield: "Quando si arrabbia diventa molto violento\ned espelle la sabbia che ha immagazzinato\nprovocando tempeste di sabbia."
        de:
          sword: "Manchmal bleiben in den Öffnungen in seinem\nKörper Steine stecken. Lithomith entfernen diese\nSteine, deswegen genießen sie seinen Schutz."
          shield: "Wenn man es wütend macht, wird es rabiat. Es\nstößt aufgenommenen Sand aus und verursacht\ndamit einen Sandsturm."
        es:
          sword: "Protege con celo a los Dwebble, ya que le\nayudan a liberarse de las piedras que a veces\nle obturan los orificios del lomo."
          shield: "Puede ser muy agresivo cuando se enfada.\nProvoca auténticas tempestades de arena al\nexpeler la que ha tragado."
        ko:
          sword: "몸에 난 구멍에는 가끔 돌이\n끼인다. 돌을 빼주기 때문에\n돌살이를 소중하게 지킨다."
          shield: "화나게 하면 굉장히 흉포해진다.\n들이마신 모래를 내뿜어\n모래바람을 일으킨다."
        zh_simp:
          sword: "偶尔会有石子卡在身体的孔洞里。\n因为石居蟹会帮忙把石子拿出来，\n所以会用心地保护它们。"
          shield: "生气的时候非常凶暴。\n会喷出储存在体内的\n沙子来引发沙尘暴。"
        zh_trad:
          sword: "偶爾會有石子卡在身體的孔洞裡。\n因為石居蟹會幫忙把石子拿出來，\n所以會用心地保護牠們。"
          shield: "生氣的時候非常凶暴。\n會噴出儲存在體內的\n沙子來引發沙塵暴。"
skorupi:
