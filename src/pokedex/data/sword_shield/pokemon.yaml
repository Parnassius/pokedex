      descriptions:
        jp_kana:
          sword: "たきつぼなど　ながれの　はげしい\nみずべで　くらしている。　だっぴを\nくりかえして　おおきく　そだつ。"
          shield: "ながく　まぼろしと　いわれていた。\nひたいにある　ちいさな　とっきは\nせいちょう　とちゅうの　ツノ。"
        jp_kanji:
          sword: "滝つぼなど　流れの　激しい\n水辺で　暮らしている。　脱皮を\n繰り返して　大きく　育つ。"
          shield: "ながく　幻と　言われていた。\n額にある　小さな　突起は\n成長途中の　ツノ。"
        en:
          sword: "Dratini dwells near bodies of rapidly flowing\nwater, such as the plunge pools of waterfalls.\nAs it grows, Dratini will shed its skin many times."
          shield: "This Pokémon was long considered to be no\nmore than a myth. The small lump on a Dratini’s\nforehead is actually a horn that’s still coming in."
        fr:
          sword: "Ce Pokémon vit près des courants d’eau\npuissants, comme au pied des cascades.\nIl grandit en opérant une succession de mues."
          shield: "On a longtemps douté de l’existence de\nce Pokémon. La petite bosse sur son front\nest en fait sa corne en pleine croissance."
        it:
          sword: "Vive vicino a correnti d’acqua impetuose, come\ncascate e simili. Cresce di dimensioni facendo\npiù volte la muta."
          shield: "È stato a lungo considerato un miraggio.\nLa piccola protuberanza sulla fronte è un corno\nin fase di crescita."
        de:
          sword: "Dratini lebt in der Nähe reißender Gewässer,\nwie etwa in tiefen Becken unter Wasserfällen.\nEs wächst, indem es sich immer wieder häutet."
          shield: "Es wurde lange an Dratinis Existenz gezweifelt.\nDer kleine Fortsatz an seiner Stirn ist ein\nheranwachsendes Horn."
        es:
          sword: "Habita en orillas junto a fuertes corrientes de\nagua, como bajo cascadas. Muda la piel una y\notra vez a medida que crece."
          shield: "Durante mucho tiempo se dudó de su existencia.\nLa pequeña protuberancia de la frente es en\nrealidad un cuerno incipiente."
        ko:
          sword: "폭포 아래와 같이 물살이 센\n물가에서 살고 있다. 탈피를\n반복하면서 크게 성장한다."
          shield: "오랫동안 환상이라고 불렸다.\n이마에 있는 작은 돌기는\n성장하고 있는 뿔이다."
        zh_simp:
          sword: "栖息在瀑布潭之类\n水流湍急的水边。\n通过反复蜕皮不断成长。"
          shield: "长久以来被认为只存在于\n幻想之中。额头小小的突起\n是正在发育的角。"
        zh_trad:
          sword: "棲息在瀑布潭等水流\n湍急的水邊。會藉由\n反覆蛻皮不斷地長大。"
          shield: "長久以來被認為只存在於\n幻想之中。額頭上小小的\n突起是正在成長的角。"
