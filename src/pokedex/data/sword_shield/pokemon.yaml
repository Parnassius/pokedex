      egg_groups:
        - dragon
        - monster
      abilities:
        - rough_skin
        - sheer_force
      hidden_ability: mold_breaker
      held_items:
        rare: dragon_fang
      descriptions:
        jp_kana:
          sword: "あなぐらに　すむ。　からだが\nひえると　うごけなくなるので\nにっこうよくは　かかさない。"
          shield: "きょうぼうで　ずるがしこい。\nほかの　ポケモンが　ほった\nすあなを　うばって　すみかにする。"
        jp_kanji:
          sword: "あなぐらに　棲む。　体が　冷えると\n動けなくなるので\n日光浴は　欠かさない。"
          shield: "凶暴で　ずる賢い。\nほかの　ポケモンが　掘った\n巣穴を　奪って　すみかにする。"
        en:
          sword: "Druddigon lives in caves, but it never skips\nsunbathing—it won’t be able to move if its body\ngets too cold."
          shield: "Druddigon are vicious and cunning. They take up\nresidence in nests dug out by other Pokémon,\ntreating the stolen nests as their own lairs."
        fr:
          sword: "Il vit sous terre, mais il doit impérativement\ns’exposer au soleil, car il devient incapable\nde bouger lorsque son corps se refroidit."
          shield: "Féroce et perfide, Drakkarmin s’approprie\nles terriers creusés par d’autres Pokémon\npour en faire son antre."
        it:
          sword: "Vive in cavità sotterranee, ma poiché non riesce\npiù a muoversi se il suo corpo si raffredda, non\npuò fare a meno dei bagni di sole."
          shield: "Brutale e scaltro, si appropria delle tane scavate\nda altri Pokémon facendone la propria dimora."
        de:
          sword: "Shardrago lebt in Grotten. Kühlt sein Körper ab,\nerstarrt es, weshalb es regelmäßig Sonnenbäder\nnehmen muss."
          shield: "Shardrago ist grausam und gerissen. Es nimmt die\nselbstgegrabenen Höhlen anderer Pokémon ein,\num sie zu seinem Unterschlupf zu machen."
        es:
          sword: "Habita en túneles. Pierde la movilidad si baja su\ntemperatura corporal, por lo que aprovecha la\nmenor oportunidad para tomar el sol."
          shield: "Posee una personalidad despiadada y ladina.\nSe apropia de los túneles excavados por otros\nPokémon y los habita."
        ko:
          sword: "토굴에 산다. 몸이 차가워지면\n움직이지 못하기 때문에\n일광욕을 거르지 않는다."
          shield: "난폭하고 교활하다.\n다른 포켓몬이 파낸\n굴을 빼앗아 거처로 삼는다."
        zh_simp:
          sword: "生活在地洞里。因为\n身体受凉就会无法动弹，\n所以日光浴必不可缺。"
          shield: "性情凶暴而狡猾。\n会把其他宝可梦挖出的巢穴\n抢来当做自己的住处。"
        zh_trad:
          sword: "居住在地洞裡。如果\n身體受涼就會無法動彈，\n因此一定會做日光浴。"
          shield: "性情凶暴且狡猾。會搶奪\n其他寶可夢挖好的巢穴，\n來當作是自己的窩。"
golett:
