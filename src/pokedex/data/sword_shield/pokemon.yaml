        - grass
      egg_groups:
        - grass
      abilities:
        - leaf_guard
        - oblivious
      hidden_ability: sweet_veil
      held_items:
        rare: grassy_seed
      descriptions:
        jp_kana:
          sword: "からだから　もれだす　かじつの\nあまい　においが　とりポケモンの\nしょくよくを　はげしく　しげきする。"
          shield: "おそわれた　ときに　ながす　あせは\nあまくて　おいしい。　その　かおりが\nさらに　てきを　ふやしてしまうのだ。"
        jp_kanji:
          sword: "体から　漏れ出す　果実の\n甘い　においが　鳥ポケモンの\n食欲を　激しく　刺激する。"
          shield: "襲われた　ときに　流す　汗は\n甘くて　美味しい。　その　香りが\nさらに　敵を　増やしてしまうのだ。"
        en:
          sword: "Its body gives off a sweet, fruity scent that is\nextremely appetizing to bird Pokémon."
          shield: "When under attack, it secretes a sweet\nand delicious sweat. The scent only calls\nmore enemies to it."
        fr:
          sword: "La douce odeur fruitée qui émane de son corps\nstimule énormément l’appétit des Pokémon\noiseaux."
          shield: "La sueur sucrée qu’il produit lorsqu’on l’attaque\nest délicieuse. L’odeur de celle-ci lui attire encore\nplus d’ennemis."
        it:
          sword: "Il dolce profumo fruttato che sprigiona il suo\ncorpo stimola notevolmente l’appetito dei\nPokémon alati."
          shield: "Quando viene attaccato produce un sudore\ndolce e delizioso, il cui profumo attira ulteriori\nnemici."
        de:
          sword: "Der fruchtig süße Duft, der von seinem Körper\nausgeht, lässt Vogel-Pokémon das Wasser im\nSchnabel zusammenlaufen."
          shield: "Wenn es angegriffen wird, sondert es einen\nköstlich süß duftenden Angstschweiß ab, der\nleider meist nur noch weitere Feinde anlockt."
        es:
          sword: "El dulce y afrutado aroma que desprende\nestimula sobremanera el apetito de los Pokémon\npájaro."
          shield: "Cuando lo atacan, produce un sudor dulce y\ndelicioso cuyo aroma atrae a más enemigos."
        ko:
          sword: "몸에서 나는 열매의\n달콤한 향기가 새포켓몬의\n식욕을 강하게 자극한다."
          shield: "습격당할 때 흘리는 땀은\n달콤하고 맛있다. 그 향기가\n적을 더 늘리고 만다."
        zh_simp:
          sword: "从它体内渗透出来的\n水果香气会强烈地\n刺激鸟宝可梦的食欲。"
          shield: "受到袭击时流下的汗水\n非常甜美可口。那种香气\n会吸引更多敌人的注意。"
        zh_trad:
          sword: "從牠體內滲透出來的\n水果香氣會強烈地\n刺激鳥寶可夢的食慾。"
          shield: "受到襲擊時流下的汗水\n非常甜美可口。那種香氣\n會吸引更多敵人的注意。"
steenee:
  species_id: 762
  names:
    jp_kana: アママイコ
    jp_kanji: アママイコ
    en: Steenee
    fr: Candine
    it: Steenee
    de: Frubaila
    es: Steenee
    ko: 달무리나
    zh_simp: 甜舞妮
    zh_trad: 甜舞妮
  forms:
    steenee:
      form_id: 0
      base_stats:
        hp: 52
        attack: 40
        defense: 48
        special_attack: 40
        special_defense: 48
        speed: 62
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 2
      types:
        - grass
      egg_groups:
        - grass
      abilities:
        - leaf_guard
        - oblivious
      hidden_ability: sweet_veil
      held_items:
        rare: grassy_seed
      descriptions:
        jp_kana:
          sword: "おどるように　ターンして　あまい\nかおりを　ふりまく。　その　においを\nかぐと　しあわせな　きもちになる。"
          shield: "つついてくる　アオガラスには\nあたまの　ヘタで　なぐりつけてから\nするどい　けりわざを　おみまいする。"
        jp_kanji:
          sword: "踊るように　ターンして　甘い\n香りを　ふりまく。　その　においを\n嗅ぐと　幸せな　気持ちになる。"
          shield: "突いてくる　アオガラスには\n頭の　ヘタで　殴りつけてから\n鋭い　蹴り技を　おみまいする。"
        en:
          sword: "As it twirls like a dancer, a sweet smell spreads\nout around it. Anyone who inhales the scent will\nfeel a surge of happiness."
          shield: "Any Corvisquire that pecks at this\nPokémon will be greeted with a smack from\nits sepals followed by a sharp kick."
        fr:
          sword: "Il danse en tournant sur lui-même et répand\nune douce odeur dans son sillage. Sentir celle-ci\nprovoque un profond sentiment de bonheur."
          shield: "Lorsqu’un Bleuseille le picore, il commence\npar se défendre avec son calice, et lui assène\nensuite de violents coups de pied."
        it:
          sword: "Gira su se stesso come in una danza spargendo\nnell’aria un dolce profumo. Chi lo annusa prova\nun sentimento di felicità."
          shield: "Quando un Corvisquire viene a stuzzicarlo,\nlo colpisce prima con i sepali che ha\nsulla testa e poi con calci violenti."
        de:
          sword: "Es dreht sich tänzerisch um sich selbst und\nverströmt einen süßen Duft, der jeden glücklich\nmacht, der ihn riecht."
          shield: "Nach ihm pickende Kranoviz greift es mit dem\nBlütenkelch auf seinem Kopf an, bevor es sie mit\nagilen Kicktechniken bearbeitet."
        es:
          sword: "Se mueve como si danzara, desprendiendo una\ndulce fragancia que provoca una sensación de\nfelicidad en quien la inhala."
          shield: "Si un Corvisquire viene a picotearlo, se defiende\ngolpeándolo con el cáliz de la cabeza y con\nfuertes patadas."
        ko:
          sword: "춤추듯이 회전해서 달콤한\n향기를 흩날린다. 그 향기를\n맡으면 행복한 기분이 든다."
          shield: "쪼아대는 파크로우를\n머리의 꼭지로 후려치고\n예리한 발차기를 먹인다."
        zh_simp:
          sword: "像跳舞那样转圈，\n释放出甜甜的香气。\n闻到那香气便会感到幸福。"
          shield: "会用头部的壳盖击打\n飞来啄食自己的蓝鸦，\n并且对它使出猛烈的踢击。"
        zh_trad:
          sword: "像跳舞那樣轉圈，\n釋放出甜甜的香氣。\n聞到那香氣便會感到幸福。"
          shield: "會用頭部的果蒂擊打\n飛來啄食自己的藍鴉，\n並且對牠使出猛烈的踢擊。"
tsareena:
  species_id: 763
  names:
