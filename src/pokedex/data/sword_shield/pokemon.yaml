          sword: "だいそうげんの　なかで　たたずみ\nひの　かたむきを　ながめて　くらす。\nダイナミックな　けりわざが　とくい。"
          shield: "１ねんに　いちど　きまった　にちじに\nどこから　ともなく　あつまり　わに\nなって　ならぶ　しゅうせいが　ある。"
        jp_kanji:
          sword: "大草原の　中で　たたずみ\n陽の　傾きを　眺めて　暮らす。\nダイナミックな　蹴り技が　得意。"
          shield: "１年に　一度　きまった　日時に\nどこから　ともなく　集まり　輪に\nなって　並ぶ　習性が　ある。"
        en:
          sword: "It stands in grasslands, watching the sun’s descent\nfrom zenith to horizon. This Pokémon has a talent\nfor delivering dynamic kicks."
          shield: "Once a year, on a specific date and at a specific\ntime, they gather out of nowhere and form up in\na circle."
        fr:
          sword: "Il se tient immobile au milieu des plaines\net passe son temps à observer la course du soleil\ndans le ciel. Son jeu de jambes est phénoménal."
          shield: "Tous les ans à la même date, ils arrivent\nde nulle part pour se réunir en cercle.\nC’est une de leurs coutumes."
        it:
          sword: "Trascorre le giornate nelle grandi praterie\nosservando immobile il passaggio del sole.\nLe mosse basate sui calci sono la sua specialità."
          shield: "Ogni anno, in un giorno stabilito, hanno l’usanza\ndi radunarsi giungendo da ogni dove per poi\ndisporsi in cerchio."
        de:
          sword: "Es verweilt auf weitläufigen Wiesen und\nbeobachtet den Lauf der Sonne. Dynamische\nTrittangriffe sind sein Spezialgebiet."
          shield: "Sie haben die Angewohnheit, sich einmal im Jahr\nzu einer bestimmten Zeit wie aus dem Nichts zu\nversammeln und in einem Kreis aufzustellen."
        es:
          sword: "Pasa el tiempo observando inmóvil el recorrido\ndel sol sobre las extensas praderas que habita.\nSe especializa en técnicas de ágiles patadas."
          shield: "Una vez al año y en una fecha concreta, tienen la\ncostumbre de aparecer de la nada para reunirse\ny formar un círculo."
        ko:
          sword: "넓은 초원 한복판에 우뚝 서서\n해가 기우는 것을 바라보며 지낸다.\n다이내믹한 발차기 기술이 특기다."
          shield: "1년에 1번 정해진 일시에\n어디선가 모여 둥글게\n늘어서는 습성이 있다."
        zh_simp:
          sword: "伫立在大草原里，\n每天眺望着日升日落。\n擅长强而有力的踢技。"
          shield: "每年会有一天，它们会在\n特定的时间突然出现，\n聚集在一起排成一个圈。"
        zh_trad:
          sword: "佇立在大草原上，\n每天眺望著日升日落。\n擅長強而有力的踢技。"
          shield: "每年會有一天，牠們會在\n特定的時間突然出現，\n聚集在一起排成一個圈。"
