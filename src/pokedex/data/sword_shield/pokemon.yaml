          shield: "とくしゅな　モーターで　うごく\nせんたくきに　はいっている。\nほうすいで　あいてを　いかく。"
        jp_kanji:
          sword: "部屋を　水浸しに　する。\n水を　活かした　悪さを\n楽しむ　ロトムの　姿。"
          shield: "特殊な　モーターで　動く\n洗濯機に　入っている。\n放水で　相手を　威嚇。"
        en:
          sword: "This form of Rotom enjoys coming up with water-\nbased pranks. Be careful with it if you don’t want\nyour room flooded."
          shield: "This Rotom has possessed a washing machine\nthat uses a special motor. It blasts out water to\nget enemies to back down."
        fr:
          sword: "Sous cette forme, Motisma adore utiliser de l’eau\npour faire des bêtises, comme complètement\ninonder les pièces à vivre."
          shield: "Il a pris possession d’une machine à laver munie\nd’un moteur spécial.\nIl intimide ses ennemis en les aspergeant d’eau."
        it:
          sword: "Sotto questa forma si diverte a inondare stanze\no combina qualche altra malefatta usando\nl’acqua."
          shield: "È entrato in una lavatrice azionata da un motore\nspeciale. Intimidisce gli avversari innaffiandoli."
        de:
          sword: "Diese Form von Rotom liebt es, mit Wasser für\nChaos zu sorgen. Es ist dafür bekannt, ganze\nRäume zu fluten."
          shield: "Es ist in eine Waschmaschine eingedrungen, die\nvon einem besonderen Motor betrieben wird.\nFeinde schreckt es mit Wassersalven ab."
        es:
          sword: "Asume esta forma cuando quiere utilizar el agua\npara hacer fechorías tales como inundar\nhabitaciones."
          shield: "Ha tomado posesión de una lavadora que\nfunciona con un motor especial. Intimida a sus\noponentes con potentes chorros de agua."
        ko:
          sword: "방을 물바다로 만들어버린다.\n물을 이용해서 장난을\n즐기는 로토무의 모습."
          shield: "특수한 모터로 움직이는\n세탁기에 들어가 있다.\n물을 세게 뿜어 상대를 위협한다."
        zh_simp:
          sword: "会让房间发大水。\n喜欢利用水来\n恶作剧的洛托姆。"
          shield: "钻进由特殊马达驱动的\n洗衣机里的洛托姆。\n会放水威吓对手。"
        zh_trad:
          sword: "會讓房間淹大水。\n喜歡利用水來\n惡作劇的洛托姆。"
          shield: "鑽進由特殊馬達驅動的\n洗衣機裡的洛托姆。\n會放水威嚇對手。"
    rotom_frost:
      form_id: 3
      names:
        jp_kana: フロストロトム
        jp_kanji: フロストロトム
        en: Frost Rotom
        fr: Motisma Froid
        it: Rotom Gelo
        de: Frost-Rotom
        es: Rotom Frío
        ko: 프로스트로토무
        zh_simp: 结冰洛托姆
        zh_trad: 結冰洛托姆
      base_stats:
        hp: 50
        attack: 65
        defense: 107
        special_attack: 105
        special_defense: 107
        speed: 86
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 1
        special_defense: 0
        speed: 1
      types:
        - electric
        - ice
      egg_groups:
        - amorphous
      abilities:
        - levitate
      descriptions:
        jp_kana:
          sword: "とくしゅな　モーターで　うごく\nれいぞうこに　はいっている。\nれいきを　はきだし　たたかう。"
          shield: "ためた　おふろを　こおらせる。\nれいき　ならではの　わるさを\nたのしむ　ロトムの　すがた。"
        jp_kanji:
          sword: "特殊な　モーターで　動く\n冷蔵庫に　入っている。\n冷気を　吐き出し　戦う。"
          shield: "溜めた　お風呂を　凍らせる。\n冷気　ならではの　悪さを\n楽しむ　ロトムの　姿。"
        en:
          sword: "Rotom assumes this form when it takes over a\nrefrigerator powered by a special motor.\nIt battles by spewing cold air."
          shield: "When it’s like this, Rotom likes to play pranks\nthat are freezing cold. You may find it’s turned\nthe bath you just filled to solid ice!"
        fr:
          sword: "Il a pris possession d’un réfrigérateur muni\nd’un moteur spécial. Il se bat en propulsant\ndes rafales d’air gelé."
          shield: "Sous cette forme, Motisma adore utiliser l’air froid\npour faire des bêtises, comme geler le bain chaud\nd’une personne avant qu’elle n’y mette le pied."
        it:
          sword: "È entrato in un frigorifero azionato da un motore\nspeciale. Lotta emanando aria gelida."
          shield: "Sotto questa forma si diverte a congelare\nl’acqua nella vasca da bagno o combina altre\nmalefatte usando l’aria gelida."
        de:
          sword: "Es ist in einen Kühlschrank eingedrungen, der von\neinem besonderen Motor betrieben wird. Im\nKampf setzt es sich mit eiskalter Luft zur Wehr."
          shield: "Diese Form von Rotom liebt es, mit kalter Luft für\nChaos zu sorgen. Hat man sich ein heißes Bad\neingelassen, lässt es das Wasser gefrieren."
        es:
          sword: "Ha tomado posesión de un frigorífico que\nfunciona con un motor especial. Se vale de\nsu aire gélido para combatir."
          shield: "Asume esta forma cuando quiere emplear su\naire gélido para cometer fechorías tales como\ncongelar el agua caliente de las bañeras."
        ko:
          sword: "특수한 모터로 움직이는\n냉장고에 들어갔다.\n냉기를 뿜으며 싸운다."
          shield: "목욕물을 얼린다.\n냉기를 이용해 장난을\n즐기는 로토무의 모습."
        zh_simp:
          sword: "钻进由特殊马达驱动的\n电冰箱里的洛托姆。\n会吐出冷气战斗。"
          shield: "会冻住浴缸里放好的水。\n喜欢用冷气来\n恶作剧的洛托姆。"
        zh_trad:
          sword: "鑽進由特殊馬達驅動的\n電冰箱裡的洛托姆。\n會吐出冷氣戰鬥。"
          shield: "會凍住浴缸裡放好的熱水。\n喜歡用冷氣來\n惡作劇的洛托姆。"
    rotom_fan:
      form_id: 4
      names:
        jp_kana: スピンロトム
        jp_kanji: スピンロトム
        en: Fan Rotom
        fr: Motisma Hélice
        it: Rotom Vortice
        de: Wirbel-Rotom
        es: Rotom Ventilador
        ko: 스핀로토무
        zh_simp: 旋转洛托姆
        zh_trad: 旋轉洛托姆
      base_stats:
