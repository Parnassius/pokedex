rowlet:
  species_id: 722
  names:
    jp_kana: モクロー
    jp_kanji: モクロー
    en: Rowlet
    fr: Brindibou
    it: Rowlet
    de: Bauz
    es: Rowlet
    ko: 나몰빼미
    zh_simp: 木木枭
    zh_trad: 木木梟
  forms:
    rowlet:
      form_id: 0
      base_stats:
        hp: 68
        attack: 55
        defense: 55
        special_attack: 50
        special_defense: 50
        speed: 42
      evs_yield:
