      names:
        jp_kana: キョダイマックス
        jp_kanji: キョダイマックス
        en: Gigantamax
        fr: Gigamax
        it: Gigamax
        de: Gigadynamax
        es: Gigamax
        ko: 거다이맥스
        zh_simp: 超极巨化
        zh_trad: 超極巨化
      descriptions:
        jp_kana:
          sword: "５０キロさきに　いる　せいぶつの\nきもちを　よみとる。　てきいを\nかんじしだい　こうげきを　はじめる。"
          shield: "しょくしゅ　から　いなずまの\nような　ビームを　ふりそそがせる。\nあらぶる　めがみ　とも　よばれる。"
        jp_kanji:
          sword: "５０キロ先に　いる　生物の\n気持ちを　読みとる。　敵意を\n感じしだい　攻撃を　始める。"
          shield: "触手から　稲妻の\nような　ビームを　降り注がせる。\n荒ぶる　女神　とも　呼ばれる。"
        en:
          sword: "This Pokémon can read the emotions of creatures\nover 30 miles away. The minute it senses hostility,\nit goes on the attack."
          shield: "Beams like lightning shoot down from its\ntentacles. It’s known to some as the\nRaging Goddess."
        fr:
          sword: "Il est capable de capter les émotions d’êtres\nvivants situés à une distance de 50 km.\nS’il ressent de l’animosité, il passe à l’attaque."
          shield: "Surnommé la « déesse déchaînée », ce Pokémon\nfait tomber des rayons similaires à la foudre\navec ses tentacules."
        it:
          sword: "È in grado di percepire le emozioni di ogni forma\ndi vita nel raggio di 50 km. Quando avverte\nostilità, parte immediatamente all’attacco."
          shield: "Dai suoi tentacoli può lanciare raggi simili\na fulmini. È soprannominato “dea selvaggia”."
        de:
          sword: "Es nimmt Gefühlsregungen von Lebewesen wahr,\ndie sich in einem Umkreis von 50 km befinden.\nSpürt es Feindseligkeit, geht es zum Angriff über."
          shield: "Mit seinen Tentakeln verschießt es blitzartige\nStrahlen. Es wird auch als „wilde Göttin“\nbezeichnet."
        es:
          sword: "Puede percibir los sentimientos de cualquier ser\nvivo en un radio de 50 km. En cuanto detecta\nhostilidad, inicia la ofensiva."
          shield: "De sus tentáculos brotan incesantemente rayos\nláser similares a relámpagos. Se lo conoce\ntambién como la Divinidad Iracunda."
        ko:
          sword: "50km 떨어져 있는 생물의\n기분을 감지한다. 적의를\n느끼면 바로 공격한다."
          shield: "촉수에서 번개 같은\n빔을 쏟아낸다.\n사나운 여신이라고 불린다."
        zh_simp:
          sword: "能够读取５０公里以外的\n生物的感情。只要感受到\n敌意，就会立刻开始攻击。"
          shield: "能从触手释放出\n如同闪电一般的光束。\n也被称为是狂暴的女神。"
        zh_trad:
          sword: "能夠讀取５０公里之外的\n生物的情感。只要感受到\n敵意，就會立刻開始攻擊。"
          shield: "能從觸手釋放出\n如同閃電一般的光束，\n也被稱為是狂暴的女神。"
impidimp:
  species_id: 859
  names:
    jp_kana: ベロバー
    jp_kanji: ベロバー
    en: Impidimp
    fr: Grimalin
    it: Impidimp
    de: Bähmon
    es: Impidimp
    ko: 메롱꿍
    zh_simp: 捣蛋小妖
    zh_trad: 搗蛋小妖
  forms:
    impidimp:
      form_id: 0
      base_stats:
        hp: 45
        attack: 45
        defense: 30
        special_attack: 55
        special_defense: 40
        speed: 50
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 1
        special_defense: 0
        speed: 0
      types:
        - dark
        - fairy
      egg_groups:
        - fairy
        - human_like
      abilities:
        - prankster
        - frisk
      hidden_ability: pickpocket
      descriptions:
        jp_kana:
          sword: "ひとや　ポケモンが　いやがる　ときに\nはっする　マイナスエネルギーを\nはなから　すいこみ　げんきになる。"
          shield: "みんかに　しのびこみ　ぬすみを\nはたらき　さらに　くやしがる　ひとの\nマイナスエネルギーも　いただくのだ。"
        jp_kanji:
          sword: "人や　ポケモンが　嫌がる　ときに\n発する　マイナスエネルギーを\n鼻から　吸いこみ　元気になる。"
          shield: "民家に　忍びこみ　盗みを\n働き　さらに　悔しがる　人の\nマイナスエネルギーも　いただくのだ。"
        en:
          sword: "Through its nose, it sucks in the emanations\nproduced by people and Pokémon when they\nfeel annoyed. It thrives off this negative energy."
          shield: "It sneaks into people’s homes, stealing things\nand feasting on the negative energy of the\nfrustrated occupants."
        fr:
          sword: "Pour se refaire une santé, il hume l’énergie\nnégative que les humains et les Pokémon\ndégagent quand ils sont irrités."
          shield: "Il se glisse dans les foyers pour commettre\nun larcin et en profite pour se nourrir de l’énergie\nnégative des habitants contrariés."
        it:
          sword: "Recupera le forze inalando dal naso l’energia\nnegativa emessa da persone e Pokémon quando\nsono irritati."
          shield: "Si intrufola nelle case, ruba, e come se non\nbastasse si nutre anche dell’energia negativa\ndei padroni di casa rattristati per il furto."
        de:
          sword: "Es wird kräftiger, indem es die von unzufriedenen\nMenschen und Pokémon ausgestoßene negative\nEnergie einatmet."
          shield: "Es schleicht sich in Häuser ein und geht dort auf\nDiebeszug. Zudem verleibt es sich die negative\nEnergie der deshalb verärgerten Menschen ein."
        es:
          sword: "Con el fin de revitalizarse, inhala por la nariz la\nenergía negativa que desprenden tanto personas\ncomo Pokémon cuando están descontentos."
          shield: "Se infiltra en las casas para hurtar a sus anchas y,\npor si fuera poco, nutrirse de la energía negativa\nque liberan sus contrariados habitantes."
        ko:
          sword: "사람이나 포켓몬이 싫어하는 감정을\n가질 때 발생시키는 마이너스 에너지를\n코로 빨아들여서 건강해진다."
          shield: "민가에 숨어들어 도둑질을\n하고 속상해하는 사람의\n마이너스 에너지도 얻는다."
        zh_simp:
          sword: "会用鼻子吸收人类或宝可梦\n情绪糟糕时产生的负能量，\n来为自己补充活力。"
          shield: "不但会溜进民宅偷盗，\n还会吸收人们悔恨时\n的负面能量。"
        zh_trad:
          sword: "會用鼻子吸收人類或寶可夢\n情緒糟糕時產生的負能量，\n來為自己補充活力。"
          shield: "不但會溜進民宅偷盜，\n還會吸收人們悔恨時\n的負面能量。"
morgrem:
  species_id: 860
  names:
    jp_kana: ギモー
    jp_kanji: ギモー
    en: Morgrem
    fr: Fourbelin
    it: Morgrem
    de: Pelzebub
    es: Morgrem
    ko: 쏘겨모
    zh_simp: 诈唬魔
    zh_trad: 詐唬魔
  forms:
    morgrem:
      form_id: 0
      base_stats:
        hp: 65
        attack: 60
        defense: 45
        special_attack: 75
        special_defense: 55
        speed: 70
      evs_yield:
        hp: 0
