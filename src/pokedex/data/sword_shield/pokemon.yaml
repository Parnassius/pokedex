        jp_kana:
          sword: "むれを　つくり　みつりんで　くらす。\nとても　こうげきてきで　もりにすむ\nポケモンたちから　おそれられている。"
          shield: "からだに　はえる　ツルは　ちぎれると\nつちの　えいようぶんとなって　もりの\nしょくぶつたちを　そだてるのだ。"
        jp_kanji:
          sword: "群れを　つくり　密林で　暮らす。\nとても　攻撃的で　森にすむ\nポケモンたちから　恐れられている。"
          shield: "体に　生える　ツルは　ちぎれると\n土の　栄養分となって　森の\n植物たちを　育てるのだ。"
        en:
          sword: "Within dense forests, this Pokémon lives in a pack\nwith others of its kind. It’s incredibly aggressive,\nand the other Pokémon of the forest fear it."
          shield: "Once the vines on Zarude’s body tear off, they\nbecome nutrients in the soil. This helps the plants\nof the forest grow."
        fr:
          sword: "Ils vivent en groupe dans la jungle, où les autres\nPokémon les craignent à cause de leur nature\nagressive."
          shield: "Lorsque ses lianes se détachent de son corps,\nelles fertilisent le sol et favorisent la croissance\ndes plantes de la forêt."
        it:
          sword: "Vive in branco nella giungla.\nÈ temuto dagli altri Pokémon della foresta\nperché estremamente aggressivo."
          shield: "Se si staccano, le liane del suo corpo diventano\nnutrimento per il suolo, favorendo lo sviluppo\ndelle piante della foresta."
        de:
          sword: "Zarude leben gruppenweise in dichten Wäldern\nund werden von den anderen Pokémon dort\ngefürchtet, da sie sehr aggressiv sind."
          shield: "Reißen die an seinem Körper wachsenden Ranken\nab, werden sie zu Nährstoffen für den Boden,\nwas den Pflanzen im Wald zum Wachstum verhilft."
        es:
          sword: "Viven en manada en la selva. Debido a su\nmarcada agresividad, son muy temidos por otros\nPokémon selváticos."
          shield: "Las lianas que le brotan del cuerpo nutren y\nfertilizan el mantillo del bosque cuando se le\ndesprenden."
        ko:
          sword: "무리 지어 밀림에 산다.\n매우 공격적이라 숲에 사는\n포켓몬들에게는 두려움의 대상이다."
          shield: "몸에 난 덩굴이 끊어지면\n토양에 영양분이 되어\n숲의 식물들을 성장시킨다."
        zh_simp:
          sword: "成群结队地在密林中生活。\n攻击性很强，森林中栖息的\n宝可梦都很怕它。"
          shield: "长在身上的藤蔓断掉之后\n会变成土壤的养分，\n帮助森林中的植物成长。"
        zh_trad:
          sword: "集結成群生活在密林裡。\n攻擊性很強，令棲息在\n森林的寶可夢們畏懼不已。"
          shield: "生長在身上的藤蔓斷落後\n會化為土壤的養分，\n孕育森林裡的各種植物。"
    zarude_dada:
      form_id: 1
      names:
        jp_kana: とうちゃん
        jp_kanji: とうちゃん
        en: Dada
        fr: Papa
        it: Papà
        de: Papa
