          shield: "みぎうでは　かいすいの　ほうだんを\nはっしゃする　たいほう。　タンカーを\nしずめてしまうほどの　いりょくだ。"
        jp_kanji:
          sword: "巨大な　ハサミの　触角で\n獲物の　居場所を　感知して\n水の　砲弾を　発射する。"
