      held_items:
        rare: spell_tag
      descriptions:
        jp_kana:
          sword: "よなよな　いせきを　さまよう。\nもっている　マスクは　ひと　だった\nころの　じぶんの　かお　だという。"
          shield: "こだいじんの　たましいが　ポケモンに\nなった。　じぶんの　かおを　しる\nひとを　さがし　いせきを　さまよう。"
        jp_kanji:
          sword: "夜な夜な　遺跡を　さまよう。\nもっている　マスクは　人　だった\nころの　自分の　顔　だという。"
          shield: "古代人の　魂が　ポケモンに\nなった。　自分の　顔を　知る\n人を　探し　遺跡を　さまよう。"
        en:
          sword: "It wanders through ruins by night, carrying a mask\nthat’s said to have been the face it had when it\nwas still human."
          shield: "The spirit of a person from a bygone age became\nthis Pokémon. It rambles through ruins, searching\nfor someone who knows its face."
        fr:
          sword: "Il passe ses nuits à errer dans les ruines.\nOn raconte que le masque qu’il porte représente\nson visage quand il était humain."
          shield: "Il est né de l’âme d’un être humain d’un peuple\nantique. Il erre dans les ruines à la recherche\nde quiconque reconnaîtra son visage."
        it:
          sword: "Si aggira tra i ruderi ogni notte. Si dice che\nla maschera che indossa sia il volto che\naveva quando era umano."
          shield: "Spirito di un uomo dell’antichità divenuto\nPokémon. Vaga tra le rovine in cerca di qualcuno\nche riconosca il suo volto."
        de:
          sword: "Makabaja irren Nacht für Nacht durch Ruinen.\nDie Masken, die sie umhertragen, sind angeblich\nihre ehemaligen Menschengesichter."
          shield: "Makabaja sind Seelen von Menschen aus uralten\nZeiten, die zu Pokémon wurden. Sie suchen in\nRuinen nach Leuten, die ihr Gesicht kennen."
        es:
          sword: "Merodea todas las noches entre ruinas. Se dice\nque la máscara que lleva replica su antiguo rostro\nhumano."
          shield: "Surgió del alma de una persona que vivió en\ntiempos remotos. Merodea por las ruinas en\nbusca de alguien que reconozca su rostro."
        ko:
          sword: "밤마다 유적을 떠돈다.\n가지고 있는 마스크는 자신이\n인간이던 시절의 얼굴이라고 한다."
          shield: "고대인의 영혼이 포켓몬이 되어\n태어났다. 자신의 얼굴을 아는\n사람을 찾아 유적을 떠돈다."
        zh_simp:
          sword: "每天夜里都在遗迹中徘徊。\n据说它拿着的面具\n是它还是人类时的脸。"
          shield: "古代人的灵魂变成了宝可梦。\n为了寻找认得自己长相的人\n而在遗迹里徘徊。"
        zh_trad:
          sword: "每天夜裡都在遺跡中徘徊。\n據說牠拿著的面具\n是牠還是人類時的臉。"
          shield: "古代人的靈魂變成了寶可夢。\n為了尋找認得自己長相的人\n而在遺跡裡徘徊。"
    yamask_galarian_form:
