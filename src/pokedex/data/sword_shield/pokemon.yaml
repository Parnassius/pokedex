        jp_kana:
          sword: "でんきを　ほとばしらせながら\nそらを　まうように　とぶ。\nかわいいが　やっかいなのだ。"
          shield: "あまい　きのみが　だいこうぶつ。\nほおぶくろに　エサを　ためすぎ\nうまく　とべないときも　ある。"
        jp_kanji:
          sword: "電気を　ほとばしらせながら\n空を　舞うように　飛ぶ。\n可愛いが　やっかいなのだ。"
          shield: "甘い　木の実が　大好物。\n頬袋に　エサを　溜めすぎ\nうまく　飛べないときも　ある。"
        en:
          sword: "As Emolga flutters through the air, it crackles\nwith electricity. This Pokémon is cute, but it can\ncause a lot of trouble."
          shield: "This Pokémon absolutely loves sweet berries.\nSometimes it stuffs its cheeks full of so much\nfood that it can’t fly properly."
        fr:
          sword: "Il virevolte dans le ciel en libérant des gerbes\nd’électricité. Son vol est gracieux, mais peut\ns’avérer dangereux."
          shield: "Les Baies sucrées sont son péché mignon.\nIl lui arrive d’en conserver beaucoup trop dans\nses bajoues, ce qui l’empêche de bien planer."
        it:
          sword: "Vola nei cieli come danzando mentre sprigiona\nelettricità. È molto grazioso, ma può creare dei\nfastidi."
          shield: "Va ghiotto di bacche dolci. A volte accumula\ntroppo cibo nelle guance e fa fatica a volare."
        de:
          sword: "Emolga fliegt anmutig durch die Lüfte und\nentlädt dabei Strom. Es ist zwar niedlich,\nkann aber auch für viel Ärger sorgen."
          shield: "Emolga liebt süße Beeren. Manchmal hortet es\nso viel Futter in seinen Backentaschen, dass es\nnicht mehr richtig fliegen kann."
        es:
          sword: "Planea por el aire, casi como si danzara, mientras\ndesprende electricidad. Resulta adorable, pero\npuede causar bastantes problemas."
          shield: "Le encantan las bayas dulces. A veces almacena\ntanta comida en los carrillos que no puede volar\nbien."
        ko:
          sword: "전기를 내뿜으며\n하늘을 춤추듯이 난다.\n귀엽지만 성가시다."
          shield: "달콤한 나무열매를 매우 좋아한다.\n볼주머니에 먹이를 너무 많이 넣어\n잘 날지 못할 때도 있다."
        zh_simp:
          sword: "一边放电一边如舞蹈般\n在空中飞翔。虽然很可爱，\n但是很难对付。"
          shield: "最喜欢甜甜的树果。有时也会\n因为在脸颊的袋子里囤了太多\n食物而无法好好飞行。"
        zh_trad:
          sword: "會一邊放電一邊像是\n在空中跳舞般地飛行。\n雖然可愛，但很難纏。"
          shield: "最喜歡甜甜的樹果。有時會\n因為在頰囊裡儲存了太多食物，\n結果讓自己無法好好飛行。"
