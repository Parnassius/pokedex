        - ground
        - steel
      egg_groups:
        - field
      abilities:
        - sand_veil
        - tangling_hair
      hidden_ability: sand_force
      held_items:
        rare: soft_sand
      descriptions:
        jp_kana:
          sword: "きんぞくせいぶんを　おおく　ふくむ\nちしつが　えいきょうして　はがねの\nひげが　あたまから　はえてきた。"
          shield: "３ぼんの　ひげは　かんじょうで\nかたちを　かえるので　なかまどうしの\nコミュニケーションに　やくだつ。"
        jp_kanji:
          sword: "金属成分を　多く　含む\n地質が　影響して　鋼の\nひげが　頭から　生えてきた。"
          shield: "３本の　ひげは　感情で\n形を　変えるので　仲間同士の\nコミュニケーションに　役立つ。"
        en:
          sword: "The metal-rich geology of this Pokémon’s habitat\ncaused it to develop steel whiskers on its head."
          shield: "Its three hairs change shape depending on\nDiglett’s mood. They’re a useful communication\ntool among these Pokémon."
        fr:
          sword: "À force d’être en contact avec des terres riches\nen métaux, des vibrisses en acier ont poussé\nsur le sommet de sa tête."
          shield: "Les trois vibrisses sur sa tête bougent en fonction\nde ses émotions. Il les utilise pour communiquer\navec ses congénères."
        it:
          sword: "Il terreno ricco di metalli gli ha fatto spuntare\ndei peli d’acciaio sulla testa."
          shield: "I tre capelli che ha sulla testa cambiano forma\na seconda dei sentimenti che prova. Se ne serve\nper comunicare con i suoi simili."
        de:
          sword: "Seine stählernen Haare auf dem Kopf sind ihm\ngewachsen, weil es sich in einem Boden mit\nhohem metallischen Anteil aufhielt."
          shield: "Da seine drei Haare je nach Gefühlslage ihre\nForm ändern, sind sie bei der Kommunikation\nmit seinen Artgenossen sehr nützlich."
        es:
          sword: "Debido al terreno rico en metales, le crecen en\nla cabeza unos filamentos metálicos."
          shield: "Se comunica con los suyos gracias a los tres\npelillos de la cabeza, que cambian de forma\nsegún su estado anímico."
        ko:
          sword: "금속 성분이 많이 포함된\n지질의 영향으로 강철\n수염이 머리에 났다."
          shield: "3개의 수염은 감정에 따라\n형태를 바꿀 수 있어 동료 사이의\n커뮤니케이션에 도움이 된다."
        zh_simp:
          sword: "受到富含金属成分的\n土质影响，它的头上\n长出了钢胡须。"
          shield: "３根胡须的形状\n会因自身的情绪而变化，\n对伙伴间的沟通很有帮助。"
        zh_trad:
          sword: "受到富含金屬成分的\n土質影響，牠的頭上\n長出了鋼鬍鬚。"
          shield: "３根鬍鬚的形狀\n會因自身的情緒而變化，\n對夥伴間的溝通很有幫助。"
dugtrio:
