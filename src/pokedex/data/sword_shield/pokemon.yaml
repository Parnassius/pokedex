      hidden_ability: zen_mode
      descriptions:
        jp_kana:
          sword: "あたまの　うえの　ゆきだまに　エサを\nしまって　もちかえる。　ふぶきの\nひは　ひとざとまで　おりてくる。"
          shield: "おんこうな　せいしつで　ちからもち。\nあたまの　ゆきだまを　いっきに\nこおらせて　ずつきを　くりだす。"
        jp_kanji:
          sword: "頭の　上の　雪玉に　エサを\nしまって　持ち帰る。　吹雪の\n日は　人里まで　降りてくる。"
          shield: "温厚な　性質で　力持ち。\n頭の　雪玉を　一気に\n凍らせて　頭突きを　繰りだす。"
        en:
          sword: "On days when blizzards blow through, it comes\ndown to where people live. It stashes food in the\nsnowball on its head, taking it home for later."
          shield: "Though it has a gentle disposition, it’s also very\nstrong. It will quickly freeze the snowball on its\nhead before going for a headbutt."
        fr:
          sword: "Il conserve sa nourriture dans la boule de neige\nsur sa tête. Les jours de blizzard, il descend\ndans les villages habités par les humains."
          shield: "Il est doux de nature, mais aussi très puissant.\nIl gèle la boule de neige sur sa tête en un instant\navant de donner des coups de boule."
        it:
          sword: "Conserva il cibo nella palla di neve che ha sulla\ntesta. Nei giorni di tormenta, scende fino alle\nzone abitate."
          shield: "Ha un carattere mite ma è molto forte.\nCongela la palla di neve che ha sulla testa\nper poi prendere a testate il nemico."
        de:
          sword: "Es lagert Futter in dem Schneeball auf seinem\nKopf und trägt es nach Hause. Bei Schneestürmen\nsteigt es zu den Siedlungen der Menschen hinab."
          shield: "Es ist sanftmütig, aber stark. Den Schneeball auf\nseinem Kopf kann es in Sekundenschnelle zu Eis\nerstarren lassen, um Kopfstöße zu verteilen."
        es:
          sword: "Transporta su alimento en la bola de nieve de la\ncabeza. Los días de ventisca desciende hasta las\nzonas habitadas por los humanos."
          shield: "Posee un carácter tranquilo, pero también mucha\nfuerza. Puede congelar al instante la bola de\nnieve que tiene en la cabeza y liarse a cabezazos."
        ko:
          sword: "머리 위에 있는 눈덩이에 먹이를\n보관해둔다. 눈보라가 치는 날에는\n사람이 사는 마을까지 내려온다."
          shield: "온화한 성질로 힘이 세다.\n머리의 눈덩이를 단번에\n얼려 박치기를 한다."
        zh_simp:
          sword: "会把食物装到头顶的雪球里\n带回家。在暴风雪的日子会\n下山来到人类居住的村落。"
          shield: "性格敦厚的大力士。\n会一口气冻住头上的雪球，\n然后用头锤撞击对手。"
        zh_trad:
          sword: "會把食物裝到頭頂的雪球裡\n帶回家。在暴風雪的日子會\n下山來到人類居住的村落。"
          shield: "性情敦厚的大力士。\n會一口氣凍住頭上的雪球，\n然後用頭錘撞擊對手。"
