        jp_kana:
          sword: "ヤクデは　しゅるいの　ちかい\nなかまだが　おたがいが　であうと\nおおげんかに　なるぞ。"
          shield: "キバに　もうどくを　もっている。\nくえそうな　えものを　みつけると\nあとさき　かんがえず　とびかかる。"
        jp_kanji:
          sword: "ヤクデは　種類の　近い\n仲間だが　おたがいが　出会うと\n大げんかに　なるぞ。"
          shield: "キバに　猛毒を　もっている。\n食えそうな　獲物を　見つけると\nあとさき　考えず　跳びかかる。"
        en:
          sword: "Venipede and Sizzlipede are similar species,\nbut when the two meet, a huge fight ensues."
          shield: "Its fangs are highly venomous. If this Pokémon\nfinds prey it thinks it can eat, it leaps for them\nwithout any thought of how things might turn out."
        fr:
          sword: "Bien qu’appartenant à des espèces similaires,\nles Venipatte et les Grillepattes se livrent\nà des conflits violents lorsqu’ils se croisent."
          shield: "Ses crocs sont extrêmement venimeux.\nDès qu’il voit une proie à son goût, il bondit\nsur elle sans penser aux conséquences."
        it:
          sword: "Appartiene a una specie simile a quella di\nSizzlipede, ma se le loro strade si incrociano\nsi scatena il finimondo."
          shield: "Le sue zanne contengono un potente veleno.\nSe trova una preda che pensa di poter mangiare,\nla assale senza pensare alle conseguenze."
        de:
          sword: "Es ist zwar artverwandt mit Thermopod, aber\njedes Mal, wenn sich die beiden über den Weg\nkrabbeln, streiten sie erbittert miteinander."
          shield: "In den Fangzähnen speichert es höchst potentes\nGift. Wenn Toxiped potenzielle Beute erspäht,\nstürzt es sich vollkommen unüberlegt auf diese."
        es:
          sword: "Aunque se trata de una especie emparentada\ncon los Sizzlipede, si se encuentran ejemplares\nde ambas, entablarán una lucha encarnizada."
          shield: "Sus colmillos contienen un veneno letal. Si\nencuentra una presa que parece comestible, se\nabalanza sobre ella sin pensárselo dos veces."
        ko:
          sword: "태우지네와는 종류가 다른\n동료지만 서로 만나면\n큰 싸움이 된다."
          shield: "이빨에 맹독을 지녔다.\n먹을 수 있는 먹이를 발견하면\n앞뒤를 가리지 않고 덤벼든다."
        zh_simp:
          sword: "虽然与烧火蚣是种类\n相近的伙伴，但是\n一见面就会大打一番。"
          shield: "牙齿上有剧毒。一旦\n发现看上去能吃的猎物，\n就会不假思索地扑上去。"
        zh_trad:
          sword: "雖然和燒火蚣屬於種類\n相近的夥伴，但是彼此\n撞見時就會大打一架喔。"
          shield: "牙齒有劇毒。一旦發現了\n看似能吃下肚的獵物，\n就會不加思索地撲上去。"
