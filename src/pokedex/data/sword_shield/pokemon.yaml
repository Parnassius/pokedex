        - levitate
      held_items:
        rare: never_melt_ice
      descriptions:
        jp_kana:
          sword: "こおりで　つくった　くさりを\nあやつって　であった　ものを\nこおらせ　どこかへ　つれさる。"
          shield: "あつくなると　すいじょうきに\nかわる。　なつばに　すがたを\nみることは　ほとんどない。"
        jp_kanji:
          sword: "氷で　作った　鎖を　操って\n出会った　ものを　凍らせ\nどこかへ　連れ去る。"
          shield: "暑くなると　水蒸気に　変わる。\n夏場に　姿を　見ることは\nほとんどない。"
        en:
          sword: "With its icy chains, Cryogonal freezes those it\nencounters. It then takes its victims away to\nsomewhere unknown."
          shield: "When the weather gets hot, these Pokémon turn\ninto water vapor. Cryogonal are almost never\nseen during summer."
        fr:
          sword: "Il gèle ceux qu’il croise à l’aide de ses chaînes\nfaites de givre, puis les emmène vers un lieu\ninconnu."
          shield: "Lorsqu’il fait trop chaud, il s’évapore, ce qui\nexplique pourquoi on ne le voit presque pas\nen été."
        it:
          sword: "Maneggia una catena di ghiaccio, con cui\ncongela e trascina via chiunque incontri."
          shield: "Quando fa caldo si dissolve in una nuvola\ndi vapore acqueo. Per questo è molto raro\nvederlo in estate."
        de:
          sword: "Mit seinen Ketten aus Eis friert es jeden ein,\nder ihm über den Weg läuft. Dann verschleppt\nes sein Opfer an einen unbekannten Ort."
          shield: "Bei Hitze wird es zu Wasserdampf. Im Sommer\nbekommt man es daher kaum zu Gesicht."
        es:
          sword: "Se vale de sus cadenas de hielo para congelar a\ntodo aquel que se cruza en su camino y llevárselo\na un lugar desconocido."
          shield: "Cuando aumenta su temperatura corporal, se\nconvierte en vapor, por lo que es muy difícil de\navistar durante el verano."
        ko:
          sword: "얼음으로 만든 사슬을\n조종하여 만나는 상대를 얼린 후\n어딘가로 데려간다."
          shield: "뜨거워지면 수증기로 변한다.\n여름철에 모습을\n볼 일은 거의 없다."
        zh_simp:
          sword: "操控用冰制成的锁，\n冻住遇到的猎物，\n并把它带去某个地方。"
          shield: "天气一热就会化为水蒸气。\n到了夏天几乎到处都\n看不到它的踪影。"
        zh_trad:
          sword: "會操縱用冰做成的鎖鏈\n凍住遇見的獵物，然後\n把牠帶去不知名的地方。"
          shield: "天氣一熱，就會變成\n水蒸氣。在夏天見到\n牠的機會少之又少。"
