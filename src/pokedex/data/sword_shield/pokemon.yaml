        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 2
      types:
        - electric
        - dark
      egg_groups:
        - field
        - fairy
      abilities:
        - hunger_switch
      descriptions:
        jp_kana:
          sword: "ほおぶくろの　でんきは　あくタイプの\nエネルギーに　へんか。　おなかが\nすきすぎて　とっても　きょうぼう。"
          shield: "くうふくホルモンで　せいしつが\nへんか。　おなかが　みたされるまで\nあくの　かぎりを　つくす。"
        jp_kanji:
          sword: "頬袋の　電気は　悪タイプの\nエネルギーに　変化。　お腹が\nすきすぎて　とっても　狂暴。"
          shield: "空腹ホルモンで　性質が\n変化。　お腹が　満たされるまで\n悪の　限りを　つくす。"
        en:
          sword: "Intense hunger drives it to extremes of violence,\nand the electricity in its cheek sacs has converted\ninto a Dark-type energy."
          shield: "Hunger hormones affect its temperament.\nUntil its hunger is appeased, it gets up to\nall manner of evil deeds."
        fr:
          sword: "L’énergie électrique dans ses joues a adopté\nle type Ténèbres. Il a tellement faim\nqu’il en devient extrêmement violent."
          shield: "Ses hormones de satiété ont modifié son\ncomportement. Tant qu’il ne sera pas rassasié,\nil enchaînera les mauvais tours."
        it:
          sword: "L’elettricità contenuta nelle guance si è\ntrasformata in energia di tipo Buio.\nLa fame lo ha reso molto aggressivo."
          shield: "L’ormone della fame causa un’alterazione del suo\ncarattere. Manifesta il suo lato oscuro finché\nnon si riempie lo stomaco."
        de:
          sword: "Es wandelt in seinen Backentaschen Elektrizität\nin Unlicht-Energie um. Wenn es der Hunger\nüberkommt, wird es rasend vor Wut."
          shield: "Appetithormone sind für seine wechselhafte\nPersönlichkeit verantwortlich. Es schreckt vor\nkeiner Schandtat zurück, um satt zu werden."
        es:
          sword: "El hambre lo ha vuelto agresivo y ha convertido\nla electricidad de sus carrillos en energía de tipo\nSiniestro."
          shield: "Las hormonas reguladoras del apetito le cambian\npor completo el carácter. Mostrará su lado más\nsiniestro hasta sentirse saciado."
        ko:
          sword: "볼주머니의 전기가 악타입의\n에너지로 변화했다.\n너무 배가 고파서 매우 흉포하다."
          shield: "공복 호르몬으로 성질이\n변한다. 배가 채워질 때까지\n온갖 못된 짓을 한다."
        zh_simp:
          sword: "颊囊中的电能转化成了\n恶属性的能量。因为肚子\n饿扁了，所以非常凶暴。"
          shield: "饥饿荷尔蒙改变了它的性情。\n它会做尽一切的坏事，\n直到把肚子填饱为止。"
        zh_trad:
          sword: "頰囊中的電能轉化成了\n惡屬性的能量。因為肚子\n餓扁了，所以非常凶暴。"
          shield: "饑餓荷爾蒙改變了牠的性情。\n牠會做盡一切的壞事，\n直到把肚子填飽為止。"
