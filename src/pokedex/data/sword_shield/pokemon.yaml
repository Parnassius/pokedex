          sword: "おおきな　ハサミは　たいじゅうの\n３ぶんの１の　おもさ。　ふりおろせば\nがんせきも　いっぱつで　こなごなだ。"
          shield: "からだは　ほそいが　こうげきりょくは\nすさまじい。　からだの　きんにくも\nきんぞくで　できているのだ。"
        jp_kanji:
          sword: "大きな　ハサミは　体重の\n３分の１の　重さ。　振り下ろせば\n岩石も　一発で　粉々だ。"
          shield: "体は　細いが　攻撃力は　凄まじい。\n体の　筋肉も\n金属で　できているのだ。"
        en:
          sword: "Bulky pincers account for one third of Scizor’s\nbody weight. A single swing of one of these\npincers will crush a boulder completely."
          shield: "Though its body is slim, Scizor has tremendous\nattacking power. Even Scizor’s muscles are made\nof metal."
        fr:
          sword: "Ses grandes pinces représentent un tiers de\nson poids. Un seul coup de l’une d’entre elles\npeut réduire un rocher en poussière."
          shield: "Malgré son corps fin, sa puissance de frappe\nest prodigieuse, car même ses muscles sont\ncomposés de métal."
        it:
          sword: "Le grandi chele costituiscono un terzo del suo\npeso corporeo. Agitandole può ridurre in polvere\nuna roccia con un colpo solo."
          shield: "Nonostante il corpo esile, è dotato di capacità\noffensive spaventose. Persino i suoi muscoli sono\nformati da metallo."
        de:
          sword: "Mit einer seiner großen Scheren, die ein Drittel\nseines Körpergewichts ausmachen, kann es Felsen\nmit einem einzigen Schlag zermalmen."
          shield: "Trotz seines dünnen Körpers verfügt Scherox\nüber eine gewaltige Angriffsstärke. Selbst seine\nMuskeln bestehen aus Metall."
        es:
          sword: "Sus grandes pinzas representan un tercio de su\npeso corporal. Basta el impacto de una de ellas\npara reducir a escombros una enorme roca."
          shield: "Su potencia de ataque, que asombra dada su\ndelgadez, se debe a que sus músculos están\nhechos de metal."
        ko:
          sword: "커다란 집게의 무게는\n체중의 3분의 1이다. 내리치면\n암석도 일격에 산산조각이 난다."
          shield: "몸은 가늘지만 공격력은\n무시무시하다. 몸의 근육도\n금속으로 되어 있다."
        zh_simp:
          sword: "大大的钳子占了身体\n重量的３分之１。就算是\n岩石也能一击砸个粉碎。"
          shield: "虽然身体纤细，却有着\n惊人的攻击力。身体的\n肌肉也是由金属构成的。"
        zh_trad:
          sword: "巨大的鉗子重達體重的\n３分之１。鉗子一揮，\n就連岩石都能一擊粉碎。"
          shield: "體型雖然纖細，攻擊力卻\n非常駭人。連身體的肌肉\n都是由金屬構成的。"
