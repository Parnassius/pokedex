      descriptions:
        jp_kana:
          sword: "じぶんの　すがたに　にせて\nポケモンを　つくった　でんせつが\nせかいじゅうに　のこされている。"
          shield: "さまざまな　ざいりょうで　ポケモンを\nつくってから　たいりくを　げんざいの\nばしょに　いどうさせたと　いわれる。"
        jp_kanji:
          sword: "自分の　姿に　似せて\nポケモンを　作った　伝説が\n世界中に　残されている。"
          shield: "さまざまな　材料で　ポケモンを\n作ってから　大陸を　現在の\n場所に　移動させたと　いわれる。"
        en:
          sword: "All over the world, there are legends that tell\nof Regigigas creating other Pokémon in its\nown image."
          shield: "It’s said that Regigigas created other Pokémon\nfrom many different materials before it moved\nthe continents to where they are today."
        fr:
          sword: "Plusieurs légendes à travers le monde\nracontent que Regigigas aurait créé\ndes Pokémon à son image."
          shield: "On raconte qu’après avoir créé des Pokémon\navec différentes matières, il aurait placé\nles continents à leur position actuelle."
        it:
          sword: "In tutto il mondo esistono leggende che narrano\ndi come Regigigas abbia creato dei Pokémon\nsimili a sé."
          shield: "Si narra che abbia spostato i continenti nella loro\nposizione attuale dopo aver creato dei Pokémon\ncon vari materiali."
        de:
          sword: "Überall auf der Welt kursieren Legenden, denen\nzufolge Regigigas Pokémon nach seinem Abbild\ngeschaffen habe."
          shield: "Man sagt, es habe aus verschiedenen Materialien\nPokémon erschaffen und dann die Kontinente an\nihren jetzigen Standort bewegt."
        es:
          sword: "Existen leyendas en todo el mundo que narran\ncomo Regigigas creó otros Pokémon a su imagen\ny semejanza."
          shield: "Dicen que creó a otros Pokémon a partir de\ndistintos materiales y que, después, colocó los\ncontinentes en su posición actual."
        ko:
          sword: "자신의 모습을 닮은\n포켓몬을 만들었다는 전설이\n온 세계에 남아 있다."
          shield: "다양한 재료로 포켓몬을\n만든 후 대륙을 지금의\n장소로 이동시켰다고 전해진다."
        zh_simp:
          sword: "在世上流传着的传说中，\n它曾模仿自己的样子\n创造出过宝可梦。"
          shield: "据说它用各种各样的材料\n制作了宝可梦后，把大陆\n移动到了现在的位置。"
        zh_trad:
          sword: "世界各地的傳說都有\n提到牠曾經模仿自己\n的樣子做出了寶可夢。"
          shield: "據說牠曾使用各種材料\n製作了寶可夢，然後把\n大陸移動到了現在的位置。"
