          sword: "くらやみで　なにも　できない　てきを\nねんいりに　いためつける。　ちのけが\nおおく　ざんにんな　せいしつ。"
          shield: "くらやみを　とびながら　いわをも\nくだく　ちょうおんぱで　いためつけ\nするどい　キバで　とどめを　さす。"
        jp_kanji:
          sword: "暗闇で　なにも　できない　敵を\n念入りに　痛めつける。　血の気が\n多く　残忍な　性質。"
          shield: "暗闇を　飛びながら　岩をも\n砕く　超音波で　痛めつけ\n鋭い　キバで　とどめを　刺す。"
        en:
          sword: "Aggressive and cruel, this Pokémon will ruthlessly\ntorment enemies that are helpless in the dark."
          shield: "Flying through the darkness, it weakens enemies\nwith ultrasonic waves that could crush stone.\nIts fangs finish the fight."
        fr:
          sword: "Il n’hésite pas à anéantir ses pauvres adversaires\nqui se retrouvent sans défense dans les ténèbres.\nIl est d’une nature cruelle et impulsive."
          shield: "Il plane dans les ténèbres, blessant ses ennemis\nà coups d’ultrasons pouvant briser des rochers\navant de les achever de ses crocs acérés."
        it:
          sword: "Non esita ad attaccare i nemici che vagano\nspaesati e indifesi nelle tenebre. Ha una natura\nimpetuosa e brutale."
          shield: "Vola nell’oscurità ferendo gli avversari con\nultrasuoni in grado di frantumare anche i massi,\nper poi finirli con i suoi denti affilati."
        de:
          sword: "Ein heißblütiges und brutales Pokémon. Es fügt\nseinen in der Dunkelheit wehrlosen Gegnern\ngnadenlos Verletzungen zu."
          shield: "Es fliegt durch die Dunkelheit und verletzt Feinde\nmit Ultraschallwellen, die auch Felsen zermalmen\nkönnen. Dann erledigt es sie mit spitzen Zähnen."
        es:
          sword: "Posee un carácter violento y cruel, por lo que no\nmuestra reparos en aprovechar la oscuridad para\natacar a enemigos indefensos."
          shield: "Vuela en la oscuridad atormentando al enemigo\ncon ondas ultrasónicas capaces de partir rocas\nantes de rematarlo con sus afilados colmillos."
        ko:
          sword: "어두워서 아무것도 할 수 없는 상대를\n무자비하게 공격한다. 혈기왕성하고\n잔인한 성질을 가졌다."
          shield: "어둠 속을 날아다니며 바위도\n부수는 초음파로 타격을 입힌 뒤\n예리한 이빨로 숨통을 끊는다."
        zh_simp:
          sword: "会对在黑暗中无计可施的\n对手痛加打击。\n好勇斗狠，性格残忍。"
          shield: "在黑暗中一边飞行一边发出\n能粉碎岩石的超音波痛击敌人，\n然后用利齿给予致命的一击。"
        zh_trad:
          sword: "會對在黑暗中無計可施的\n對手痛加打擊。\n好勇鬥狠，性情殘忍。"
          shield: "在黑暗中一邊飛行一邊發出\n能粉碎岩石的超音波痛擊敵人，\n然後用利齒給予致命的一擊。"
