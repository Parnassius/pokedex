        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fighting
      egg_groups:
        - human_like
      abilities:
        - guts
        - sheer_force
      hidden_ability: iron_fist
      descriptions:
        jp_kana:
          sword: "なかまや　ゴーリキーと　きんにくを\nじまん　しあう。　まけたほうは\nしばらく　すがたを　みせなくなる。"
          shield: "てっこつを　たくみに　あやつる。\nかいたいは　とくいだが　なにかを\nくみたてるのは　にがてなのだ。"
        jp_kanji:
          sword: "仲間や　ゴーリキーと　筋肉を\n自慢　しあう。　負けたほうは\nしばらく　姿を　見せなくなる。"
          shield: "鉄骨を　たくみに　操る。\n解体は　得意だが　なにかを\n組み立てるのは　苦手なのだ。"
        en:
          sword: "It shows off its muscles to Machoke and other\nGurdurr. If it fails to measure up to the other\nPokémon, it lies low for a little while."
          shield: "Gurdurr excels at demolition—construction is not\nits forte. In any case, there’s skill in the way this\nPokémon wields its metal beam."
        fr:
          sword: "Il participe à des concours de gonflette avec\nses congénères et les Machopeur. Le perdant ne\nse montre plus en public pendant quelque temps."
          shield: "Il manie la poutre métallique avec habileté.\nIl est doué pour démanteler une bâtisse, mais\npeu adroit lorsqu’il s’agit d’en construire une."
        it:
          sword: "Sfoggia i suoi muscoli facendo a gara con i suoi\nsimili e con Machoke. Chi perde sparisce dalla\ncircolazione per un po’."
          shield: "Manovra con abilità la sua trave d’acciaio.\nÈ particolarmente esperto nelle demolizioni,\nmentre costruire non è il suo forte."
        de:
          sword: "Strepoli und Maschock treffen sich regelmäßig\nzum Muskelvergleich. Wer schlecht abschneidet,\nlässt sich danach eine Weile nicht mehr blicken."
          shield: "Es ist gut im Tragen von Stahlträgern und im\nAbreißen von Häusern. Das Bauen dagegen\nliegt ihm nicht besonders."
        es:
          sword: "A menudo realiza competiciones de fuerza con\nsus congéneres y con los Machoke. El perdedor\ndebe pasar un tiempo sin dejarse ver."
          shield: "Blande vigas de acero con gran destreza, pero la\nconstrucción no se le da muy bien; de hecho, su\nespecialidad es la demolición."
        ko:
          sword: "동료나 근육몬과 서로\n근육을 자랑한다. 진 쪽은\n당분간 모습을 감춘다."
          shield: "철골을 자유자재로 다룬다.\n해체는 잘하지만 무언가를\n조립하는 것은 서툴다."
        zh_simp:
          sword: "与其他的伙伴还有豪力\n一起比拼肌肉。输掉的\n那一方会暂时躲起来。"
          shield: "能够灵巧地操纵工字钢。\n虽然对拆除得心应手，\n但却不太擅长组装。"
        zh_trad:
          sword: "與其他的夥伴還有豪力\n一起比拼肌肉。輸掉的\n那一方會暫時躲起來。"
          shield: "能夠靈巧地操縱鋼骨。\n雖然對拆除得心應手，\n但卻不太擅長組裝。"
