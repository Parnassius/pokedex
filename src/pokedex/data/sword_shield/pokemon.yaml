      types:
        - dark
        - fairy
      egg_groups:
        - fairy
        - human_like
      abilities:
        - prankster
        - frisk
      hidden_ability: pickpocket
      descriptions:
        jp_kana:
          sword: "かみのけを　ぜんしんに　まきつけると\nきんりょくが　アップ。　カイリキーを\nねじふせる　パワーを　はっきする。"
          shield: "かみのけは　きんにくせんいの　ように\nはたらき　ほどけると　しょくしゅの\nうごきで　あいてを　からめとる。"
        jp_kanji:
          sword: "髪の毛を　全身に　巻きつけると\n筋力が　アップ。　カイリキーを\nねじ伏せる　パワーを　発揮する。"
          shield: "髪の毛は　筋肉繊維の　ように\n働き　ほどけると　触手の\n動きで　相手を　絡めとる。"
        en:
          sword: "With the hair wrapped around its body helping to\nenhance its muscles, this Pokémon can overwhelm\neven Machamp."
          shield: "Its hairs work like muscle fibers. When its hairs\nunfurl, they latch on to opponents, ensnaring\nthem as tentacles would."
        fr:
          sword: "Il enroule ses cheveux autour de son corps pour\naugmenter sa masse musculaire, ce qui lui donne\nassez de force pour enserrer un Mackogneur."
          shield: "Ses cheveux sont comme des muscles filandreux\nqu’il peut détacher pour saisir ses adversaires,\ntels des tentacules."
        it:
          sword: "Se avvolge il corpo con i capelli, la sua potenza\nmuscolare aumenta. La sua forza gli permette\ndi immobilizzare a terra anche Machamp."
          shield: "I sui capelli svolgono una funzione simile a quella\ndelle fibre muscolari. Li può sciogliere e usare\ncome dei tentacoli per avvinghiare il nemico."
        de:
          sword: "Wickelt es seine Haare um den ganzen Körper,\nverstärkt dies seine Muskelkraft. Das macht es so\nstark, dass es sogar Machomei bezwingen könnte."
          shield: "Seine Haare funktionieren wie Muskelfasern.\nEs kann diese vom Körper lösen und wie Tentakel\nverwenden, um Gegner einzufangen."
        es:
          sword: "Cuando enrolla sus cabellos por todo el cuerpo,\naumenta su potencia muscular. Posee una fuerza\ncapaz de someter a Machamp."
          shield: "Su cabello desempeña una función similar a la de\nfibras musculares. Al soltárselo, su movimiento\ntentacular le permite reducir a su objetivo."
        ko:
          sword: "머리카락을 전신에 휘감아\n근력이 올랐다. 괴력몬을\n압도하는 파워를 발휘한다."
          shield: "머리카락은 근섬유의 역할을 하며\n매듭이 풀어지면 촉수와 같은\n움직임으로 상대를 묶어버린다."
        zh_simp:
          sword: "通过用头发裹住全身，\n让肌肉的力量向上提升。\n能发挥出足以压倒怪力的力量。"
          shield: "毛发能发挥肌肉纤维般的作用。\n伸展开来时会像触手那样\n把对手缠绕起来。"
        zh_trad:
          sword: "透過用頭髮裹住全身，\n讓肌肉的力量向上提升。\n能發揮出足以壓倒怪力的力量。"
          shield: "毛髮能發揮肌肉纖維般的作用。\n伸展開來時會像觸手那樣\n把對手纏繞起來。"
  gmax_forms:
    grimmsnarl_gigantamax:
      form_id: 999
      names:
        jp_kana: キョダイマックス
        jp_kanji: キョダイマックス
        en: Gigantamax
        fr: Gigamax
        it: Gigamax
        de: Gigadynamax
        es: Gigamax
        ko: 거다이맥스
        zh_simp: 超极巨化
        zh_trad: 超極巨化
      descriptions:
        jp_kana:
          sword: "あしの　たいもうを　へんけいさせて\nくりだす　ドリルキックは　ガラルの\nだいちに　おおあなを　あけてしまう。"
          shield: "キョダイマックスにより　ぜんしんの\nもうりょうが　アップ。　せかいいち\nたかい　ビルを　ジャンプで　こえる。"
        jp_kanji:
          sword: "脚の　体毛を　変形させて\n繰りだす　ドリルキックは　ガラルの\n大地に　大穴を　開けてしまう。"
          shield: "キョダイマックスにより　全身の\n毛量が　アップ。　世界一\n高い　ビルを　ジャンプで　越える。"
        en:
          sword: "By transforming its leg hair, this Pokémon delivers\npower-packed drill kicks that can bore huge\nholes in Galar’s terrain."
          shield: "Gigantamax energy has caused more hair to\nsprout all over its body. With the added strength,\nit can jump over the world’s tallest building."
        fr:
          sword: "Il modifie la forme des poils de ses jambes\net donne des coups de pied vrillés qui laissent\ndes trous béants dans les plaines de Galar."
          shield: "Grâce au pouvoir du Gigamax, son pelage\ns’est épaissi. Il peut désormais franchir d’un seul\nbond les plus hauts immeubles du monde."
        it:
          sword: "Modifica la forma dei peli che ricoprono le sue\ngambe per sferrare calci a trivella in grado di\ncreare enormi buchi nel suolo di Galar."
          shield: "L’energia del fenomeno Gigamax ha infoltito\ni peli in tutto il suo corpo. Può superare con\nun salto anche i grattacieli più alti del mondo."
        de:
          sword: "Es transformiert seine Beinhaare, um damit\nbohrende Tritte zu verteilen, die in der ganzen\nGalar-Region große Erdlöcher hinterlassen."
          shield: "Durch die Gigadynamax-Energie hat sich sein\ngesamtes Haarvolumen vervielfacht. Es kann\nselbst über die höchsten Gebäude springen."
        es:
          sword: "El pelo de sus piernas se ha transformado y ha\ndado aún más fuerza a sus patadas, capaces de\nabrir grandes agujeros en la tierra de Galar."
          shield: "Debido al fenómeno Gigamax, le ha crecido el\npelo de forma extraordinaria. Puede superar de\nun salto los rascacielos más altos del mundo."
        ko:
          sword: "다리털을 변형시켜서\n날리는 드릴킥은 가라르의\n대지에 큰 구멍을 내버린다."
          shield: "거다이맥스에 의해 전신의\n털의 양이 많아졌다. 세계에서\n가장 높은 빌딩을 점프로 넘는다."
        zh_simp:
          sword: "会通过让腿部的体毛变形来\n使出强力的钻踢，威力甚至\n能在伽勒尔的大地上钻出大洞来。"
          shield: "全身的毛因超极巨化而增多。\n即使是全世界最高的\n建筑也能一跃而过。"
        zh_trad:
          sword: "會透過讓腿部的體毛變形來\n使出強力的鑽踢，威力甚至\n能在伽勒爾的大地上鑽出大洞來。"
          shield: "全身的毛因超極巨化而增多。\n即使是全世界最高的\n建築也能一躍而過。"
