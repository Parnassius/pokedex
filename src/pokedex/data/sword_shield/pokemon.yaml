          sword: "ほうせきの　ひとみが　あやしく\nかがやくとき　ひとの　たましいを\nうばうと　おそれられる　ポケモン。"
          shield: "ほうせきの　けっしょうを　たべる。\nくらやみの　なかでは　りょうめが\nほうせきの　かがやきを　はなつ。"
        jp_kanji:
          sword: "宝石の　瞳が　怪しく\n輝くとき　人の　魂を\n奪うと　恐れられる　ポケモン。"
          shield: "宝石の　結晶を　食べる。\n暗闇の　中では　両目が\n宝石の　輝きを　放つ。"
        en:
          sword: "This Pokémon is feared. When its gemstone eyes\nbegin to glow with a sinister shine, it’s believed\nthat Sableye will steal people’s spirits away."
          shield: "It feeds on gemstone crystals. In darkness, its\neyes sparkle with the glitter of jewels."
        fr:
          sword: "Beaucoup de gens le craignent, car l’éclat\nde ses yeux précieux donne l’impression qu’il\ns’apprête à dérober l’âme de ceux qu’il regarde."
          shield: "Ce Pokémon se nourrit de pierres précieuses.\nDans les ténèbres, ses yeux brillent du reflet\ndes joyaux."
        it:
          sword: "È molto temuto perché si dice che rubi lo spirito\ndegli esseri umani con lo sguardo sinistro dei suoi\nocchi opalescenti."
          shield: "Si nutre di gemme. Nell’oscurità i suoi occhi\nbrillano come gioielli."
        de:
          sword: "Man sagt, es stehle die Seelen der Menschen,\nwenn seine Edelsteinaugen furchterregend\nfunkeln. Viele fürchten es deswegen."
          shield: "Es ernährt sich von Edelsteinen. Im Dunkeln\nfunkeln seine beiden Augen wie Juwelen."
        es:
          sword: "Se dice que, cuando las gemas de los ojos de\nestos Pokémon tan temidos brillan de manera\nsiniestra, están robándole el alma a alguien."
          shield: "Se alimenta de gemas. En la oscuridad, los ojos\nle brillan con el destello de las piedras preciosas."
        ko:
          sword: "보석 눈동자가 수상하게 빛날 때\n사람의 영혼을 빼앗는다며\n두려움의 대상이 된 포켓몬이다."
          shield: "보석의 결정을 먹는다.\n어둠 속에서는 두 눈이 \n보석의 빛을 낸다."
        zh_simp:
          sword: "宝石的眼睛发出诡异光芒时，\n就会摄取人的魂魄。\n是令人恐惧的宝可梦。"
          shield: "会去吃宝石的结晶。\n双眼在漆黑一片的地方\n会发出宝石的光芒。"
        zh_trad:
          sword: "寶石的眼睛發出詭異光芒時，\n就會攝取人的魂魄。\n是令人恐懼的寶可夢。"
          shield: "會去吃寶石的結晶。\n雙眼在漆黑一片的地方\n會發出寶石的光芒。"
