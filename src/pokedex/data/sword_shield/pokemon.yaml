        - ghost
      egg_groups:
        - water_1
        - water_3
      abilities:
        - weak_armor
      hidden_ability: perish_body
      descriptions:
        jp_kana:
          sword: "れいりょくが　たかまり　カラから\nときはなたれた。　れいたいで\nかくの　たましいを　まもっている。"
          shield: "たましいを　おおう　れいたいの\nからだには　ちゅうい。　ふれると\nいしのように　うごけなく　なるぞ。"
        jp_kanji:
          sword: "霊力が　高まり　殻から\n解き放たれた。　霊体で\n核の　魂を　守っている。"
          shield: "魂を　被う　霊体の\n体には　注意。　触れると\n石のように　動けなく　なるぞ。"
        en:
          sword: "Its shell is overflowing with its heightened\notherworldly energy. The ectoplasm serves as\nprotection for this Pokémon’s core spirit."
          shield: "Be cautious of the ectoplasmic body\nsurrounding its soul. You’ll become\nstiff as stone if you touch it."
        fr:
          sword: "Son énergie spectrale accrue s’est répandue\nhors de sa coquille. Il protège l’âme de son noyau\navec son corps spirituel."
          shield: "Ceux qui ont le malheur de toucher le corps\nspirituel qui protège son noyau se retrouveront\nimmobilisés, comme changés en pierre."
        it:
          sword: "Un accumulo di energia misteriosa lo ha separato\ndal suo guscio. Protegge l’anima contenuta nel\nsuo nucleo in una sorta di ectoplasma."
          shield: "Il corpo di ectoplasma che avvolge la sua anima\nè pericolosissimo: chi lo tocca si immobilizza\ncome se fosse stato tramutato in pietra."
        de:
          sword: "In ihm wuchs eine mysteriöse Kraft und so löste\nes sich von seinem Panzer los. Sein geisterhaftes\nEktoplasma schützt die Seele im Kern."
          shield: "Vor dem geisterhaften Ektoplasma, das seine\nSeele umhüllt, ist Vorsicht geboten. Berührt man\nes, erstarrt man wie zu Stein."
        es:
          sword: "Su energía espiritual ha aumentado hasta hacerlo\ndesprenderse de su base caliza. Protege el alma\ndel núcleo con su cuerpo espectral."
          shield: "Conviene tener cuidado con el cuerpo espectral\nque recubre su alma, pues quien lo toque podría\nacabar inerte como una piedra."
        ko:
          sword: "영력이 높아져서 껍질에서\n해방되었다. 영체로\n핵이 되는 영혼을 지킨다."
          shield: "혼을 감싸는 영체의 몸은\n주의가 필요하다. 만지면\n돌처럼 움직일 수 없게 된다."
        zh_simp:
          sword: "灵力增强之后从壳里\n被解放出来。用灵体\n保护着内核中的灵魂。"
          shield: "一定要小心它那包覆着\n灵魂的灵体。如果触摸到，\n就会像石头一样动弹不得。"
        zh_trad:
          sword: "靈力增強之後從殼裡\n被解放出來。用靈體\n保護著內核中的靈魂。"
          shield: "一定要小心牠那包覆著\n靈魂的靈體。如果觸摸到，\n就會像石頭一樣動彈不得。"
sirfetchd:
  species_id: 865
  names:
    jp_kana: ネギガナイト
    jp_kanji: ネギガナイト
    en: Sirfetch’d
    fr: Palarticho
    it: Sirfetch’d
    de: Lauchzelot
    es: Sirfetch’d
    ko: 창파나이트
    zh_simp: 葱游兵
    zh_trad: 蔥遊兵
  forms:
    sirfetchd:
      form_id: 0
      base_stats:
        hp: 62
        attack: 135
        defense: 95
        special_attack: 68
        special_defense: 82
