          shield: "The scents Aromatisse can produce range from\nsweet smells that bolster allies to foul smells\nthat sap an opponent’s will to fight."
        fr:
          sword: "Un parfum capiteux émane constamment\nde sa fourrure. Ce parfum est si fort qu’il peut\npriver son Dresseur d’odorat."
          shield: "Il peut émettre une puanteur si infâme qu’elle\nprive ses ennemis de leur combativité, ou un\nparfum si réconfortant qu’il encourage ses alliés."
        it:
          sword: "Il suo pelo emette un profumo così intenso\nda compromettere irrimediabilmente l’olfatto\ndel suo Allenatore."
          shield: "Può produrre un tanfo così tremendo da far\npassare ai nemici la voglia di lottare, e un\nprofumo così buono da incoraggiare gli alleati."
        de:
          sword: "Von seinem Fell strömt ein derart intensiver\nGeruch aus, dass die Nase seines Trainers\nirgendwann unweigerlich den Geist aufgibt."
          shield: "Es kann üblen Gestank verströmen, der seinen\nGegnern den Kampfeswillen raubt, oder wohlige\nDüfte erzeugen, die seinen Mitstreitern helfen."
        es:
          sword: "La fragancia que despide su pelaje es tan\npotente que puede dejar sin olfato a su\nEntrenador."
          shield: "Puede emanar tanto un olor desagradable para\ndesmotivar al rival como un dulce aroma para\nreconfortar a los aliados en combate."
        ko:
          sword: "털에서 항상 강렬한 향기를\n내보내기 때문에 파트너는\n후각이 둔해지게 된다."
          shield: "상대의 전의를 상실시키는\n악취와 같은 편을 돕는\n황홀한 향기를 만들어 낸다."
        zh_simp:
          sword: "由于它会不断从体毛里\n散发出强烈的香气，\n导致伙伴训练家的嗅觉失灵。"
          shield: "会发出恶臭让敌人丧失战意，\n或者发出芳香的味道\n来帮助自己的伙伴。"
        zh_trad:
          sword: "由於牠會不斷從體毛裡\n散發出強烈的香氣，\n導致夥伴訓練家的嗅覺失靈。"
          shield: "會發出惡臭讓敵人喪失戰意，\n或者發出芳香的味道\n來幫助自己的夥伴。"
