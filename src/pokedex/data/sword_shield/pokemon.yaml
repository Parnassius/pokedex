        jp_kana:
          sword: "もりの　おくふかくに　せいそく。\nあたまの　はっぱで　ふえを　つくり\nふあんに　させる　ねいろを　だす。"
          shield: "コノハナの　ふく　くさぶえの　おとは\nきいた　ものを　ふあんに　させる。\nたいぼくに　あいた　あなで　くらす。"
        jp_kanji:
          sword: "森の　奥深くに　生息。\n頭の　葉っぱで　笛を　作り\n不安に　させる　音色を　出す。"
          shield: "コノハナの　吹く　草笛の　音は\n聞いた　ものを　不安に　させる。\n大木に　開いた　穴で　暮らす。"
        en:
          sword: "It lives deep in forests. With the leaf on its head,\nit makes a flute whose song makes listeners uneasy."
          shield: "They live in holes bored in large trees. The sound\nof Nuzleaf’s grass flute fills listeners with dread."
        fr:
          sword: "Il vit au plus profond des forêts.\nSa flûte faite avec la feuille de sa tête\német un son inquiétant."
          shield: "Il vit dans les trous des grands arbres.\nLe sifflement qu’il produit avec sa feuille\nsuffit à remplir ses adversaires d’effroi."
        it:
          sword: "Vive nelle foreste più fitte. Con la foglia che ha\nin testa, crea un flauto dal suono inquietante."
          shield: "Vive in buchi scavati in grandi alberi. Il suono\ndel suo flauto di foglia inquieta chi lo ascolta."
        de:
          sword: "Es lebt tief im Wald. Aus dem Blatt auf seinem\nKopf kann es sich eine Flöte bauen, deren Klang\nUnruhe verbreitet."
          shield: "Sie leben in Löchern, die sie in große Bäume\ngebohrt haben. Der Ton ihrer Grasflöten erfüllt\nZuhörer mit Unruhe."
        es:
          sword: "Vive en lo más profundo del bosque. Utiliza la\nhoja de la cabeza como flauta para emitir un\nsonido perturbador."
          shield: "Vive en las oquedades de los árboles grandes.\nEl sonido que emite al usar la hoja de la cabeza\ncomo flauta asusta a quienes lo escuchan."
        ko:
          sword: "깊은 숲속에서 서식한다.\n머리의 이파리로 피리를 만들어\n불안하게 만드는 음색을 낸다."
          shield: "잎새코가 부는 풀피리 소리는\n듣는 이를 불안하게 만든다.\n큰 나무의 비어 있는 구멍에 산다."
        zh_simp:
          sword: "栖息于森林的深处。\n会用头上的叶子做成笛子，\n吹出令人感到不安的音色。"
          shield: "长鼻叶居住在大树上的洞穴里，\n它吹奏出的草笛声\n会让听到的人感到不安。"
        zh_trad:
          sword: "棲息在森林深處。\n會用頭上的葉子做成笛子，\n吹出令人感到不安的音色。"
          shield: "長鼻葉居住在大樹上的洞穴裡，\n牠吹奏出的草笛聲\n會讓聽到的人感到不安。"
shiftry:
