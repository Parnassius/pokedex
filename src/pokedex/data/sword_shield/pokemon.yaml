      descriptions:
        jp_kana:
          sword: "ひかりものを　あつめるのが　すき。\nきげんが　いいときは　トレーナーにも\nコレクションを　みせてくれるぞ。"
          shield: "ひたいの　こばんが　よごれないよう\nまめに　かおを　あらう。　ガラルの\nニャースとは　なかが　わるい。"
        jp_kanji:
          sword: "光り物を　集めるのが　好き。\n機嫌が　いいときは　トレーナーにも\nコレクションを　見せてくれるぞ。"
          shield: "額の　小判が　汚れないよう\nまめに　顔を　洗う。　ガラルの\nニャースとは　仲が　悪い。"
        en:
          sword: "It loves to collect shiny things. If it’s in a good\nmood, it might even let its Trainer have a look\nat its hoard of treasures."
          shield: "It washes its face regularly to keep the coin on\nits forehead spotless. It doesn’t get along with\nGalarian Meowth."
        fr:
          sword: "Il aime rassembler des objets brillants.\nS’il est de bonne humeur, il montre sa collection\nà son Dresseur."
          shield: "Tatillon sur la propreté de la pièce sur son front,\nil se lave la figure avec grand soin. Il ne s’entend\npas avec les Miaouss de Galar."
        it:
          sword: "Ama raccogliere oggetti luccicanti.\nQuando è di buon umore mostra la sua\ncollezione anche al suo Allenatore."
          shield: "Si lava regolarmente il muso per tenere pulita\nla moneta sulla fronte. Non va d’accordo con\nil Meowth di Galar."
        de:
          sword: "Es sammelt mit Vorliebe glänzende Gegenstände.\nIst es gut gelaunt, lässt es seinen Trainer einen\nBlick auf seine Sammlung werfen."
          shield: "Es wäscht sich regelmäßig das Gesicht, um die\nMünze auf seiner Stirn sauber zu halten. Es hat\nkein gutes Verhältnis zu den Mauzi aus Galar."
        es:
          sword: "Le encanta reunir objetos brillantes. Cuando está\nde buen humor, hasta le muestra la colección a\nsu Entrenador."
          shield: "Se lava cuidadosamente la cara para que no se le\nensucie la moneda de oro que tiene en la frente.\nNo se lleva nada bien con los Meowth de Galar."
        ko:
          sword: "빛나는 물건을 모으는 것을 좋아한다.\n기분이 좋을 때는 트레이너에게도\n컬렉션을 보여준다."
          shield: "이마의 금화가 더러워지지 않도록\n바지런히 얼굴을 씻는다.\n가라르의 나옹과는 사이가 나쁘다."
        zh_simp:
          sword: "喜欢收集亮晶晶的东西。\n当它心情好的时候，会让\n训练家一起欣赏自己的收藏。"
          shield: "为了不弄脏额头上的\n金币，会常常洗脸。\n和伽勒尔的喵喵关系不好。"
        zh_trad:
          sword: "喜歡收集亮晶晶的東西。\n當牠心情好的時候，會讓\n訓練家一起欣賞自己的收藏。"
          shield: "為了不弄髒額頭上的\n金幣，會常常洗臉。\n和伽勒爾的喵喵關係不好。"
