          sword: "みらいを　よちする　ちからを　もつ。\nトレーナーを　まもる　ときに\nさいだい　パワーを　はっきする。"
          shield: "トレーナーを　まもるためなら\nサイコパワーを　つかいきり　ちいさな\nブラックホールを　つくりだす。"
        jp_kanji:
          sword: "未来を　予知する　力を　もつ。\nトレーナーを　守る　ときに\n最大　パワーを　発揮する。"
          shield: "トレーナーを　守るためなら\nサイコパワーを　使いきり　小さな\nブラックホールを　つくりだす。"
        en:
          sword: "It has the power to predict the future. Its power\npeaks when it is protecting its Trainer."
          shield: "To protect its Trainer, it will expend all its psychic\npower to create a small black hole."
        fr:
          sword: "Gardevoir est capable de prédire l’avenir.\nIl déploie toute sa puissance quand il doit\nprotéger son Dresseur."
          shield: "Prêt à tout pour protéger son Dresseur,\nil peut aller jusqu’à épuiser sa force mentale\npour créer un mini trou noir."
        it:
          sword: "Ha la capacità di prevedere il futuro. Quando\ndeve proteggere il suo Allenatore, mette in\nmostra tutta la sua potenza."
          shield: "Quando il suo Allenatore è in pericolo, usa tutto\nil suo potere psichico per creare un piccolo buco\nnero."
        de:
          sword: "Es kann die Zukunft vorhersagen. Beschützt es\nseinen Trainer, erreicht seine Kraft ihren\nHöhepunkt."
          shield: "Wenn es seinen Trainer schützen will, nimmt es all\nseine Psycho-Kräfte zusammen, um so ein kleines\nschwarzes Loch zu erzeugen."
        es:
          sword: "Tiene la capacidad de predecir el futuro. Para\nproteger a su Entrenador, emplea hasta la última\ngota de su poder psíquico."
          shield: "Para proteger a su Entrenador, emplea todo su\npoder psíquico en crear un pequeño agujero\nnegro."
        ko:
          sword: "미래를 예지하는 힘을 가졌다.\n트레이너를 지킬 때\n최대 파워를 발휘한다."
          shield: "트레이너를 지키기 위해서라면\n사이코 파워를 모두 써서\n작은 블랙홀을 만들어 낸다."
        zh_simp:
          sword: "有着预知未来的能力。\n在保护训练家的时候，\n会发挥出最强的力量。"
          shield: "如果是为了保护训练家，\n它就会用尽自己的精神力量\n制造出小型黑洞。"
        zh_trad:
          sword: "有著預知未來的能力。\n在保護訓練家的時候，\n會發揮出最強的力量。"
          shield: "如果是為了保護訓練家，\n牠會不惜用盡自己的精神力量\n製造出小型黑洞。"
nincada:
