    es: Urshifu
    ko: 우라오스
    zh_simp: 武道熊师
    zh_trad: 武道熊師
  forms:
    urshifu_single_strike_style:
      form_id: 0
      names:
        jp_kana: いちげきのかた
        jp_kanji: いちげきのかた
        en: Single Strike Style
        fr: Style Poing Final
        it: Stile Singolcolpo
        de: Fokussierter Stil
        es: Estilo Brusco
        ko: 일격의 태세
        zh_simp: 一击流
        zh_trad: 一擊流
      base_stats:
        hp: 100
        attack: 130
        defense: 100
        special_attack: 63
        special_defense: 60
        speed: 97
      evs_yield:
        hp: 0
        attack: 3
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fighting
        - dark
      egg_groups:
        - undiscovered
      abilities:
        - unseen_fist
      descriptions:
        jp_kana:
          sword: "いちげきひっさつが　しんじょう。\nあいての　ふところに　とびこみ\nきたえられた　こぶしを　たたきこむ。"
          shield: "とおい　ちほうの　さんがくちたいで\nくらす。　だんがいぜっぺきを　はしり\nあしこしを　きたえ　わざを　みがく。"
        jp_kanji:
          sword: "一撃必殺が　信条。\n相手の　懐に　飛びこみ\n鍛えられた　拳を　叩きこむ。"
          shield: "遠い　地方の　山岳地帯で\n暮らす。　断崖絶壁を　走り\n足腰を　鍛え　技を　磨く。"
        en:
          sword: "This form of Urshifu is a strong believer in the\none-hit KO. Its strategy is to leap in close to foes\nand land a devastating blow with a hardened fist."
          shield: "Inhabiting the mountains of a distant region, this\nPokémon races across sheer cliffs, training its legs\nand refining its moves."
        fr:
          sword: "Adepte des techniques pouvant mettre K.O.\nen un seul coup, il se jette sur son adversaire\net le frappe de son poing robuste."
          shield: "Il vit dans une lointaine région montagneuse où\nil peaufine ses techniques et muscle ses jambes\nen courant le long des falaises abruptes."
        it:
          sword: "Il suo credo è sconfiggere l’avversario con un\ncolpo solo. Si lancia sul nemico e lo colpisce con\nun pugno potenziato al massimo dall’allenamento."
          shield: "Vive nelle zone montuose di una regione lontana.\nCorre sulle pareti dei dirupi, allenando gli arti\ninferiori e perfezionando le sue mosse."
        de:
          sword: "Es ist darauf spezialisiert, Gegner mit nur einem\nTreffer zu bezwingen, indem es sie schlagartig\nanfällt und einen fokussierten Hieb austeilt."
          shield: "Wulaosu lebt in den Bergen einer fernen Region.\nUm die Beine zu stählen und seine Kampftechnik\nzu verbessern, rennt es steile Klippen entlang."
        es:
          sword: "Su estilo de lucha se basa en abatir a sus rivales\nde un solo golpe. Se abalanza sobre ellos con su\npuño cincelado por el entrenamiento."
          shield: "Vive en zonas montañosas en áreas recónditas,\ndonde entrena corriendo por escarpados riscos\npara fortalecer sus piernas y refinar su técnica."
        ko:
          sword: "일격필살이 신조다.\n상대의 품으로 파고들어\n단련된 주먹을 질러 넣는다."
          shield: "먼 지방의 산악지대에 산다.\n낭떠러지 절벽을 달리며\n하체를 단련하고 기술을 연마한다."
        zh_simp:
          sword: "一击必杀是它的信条。\n飞冲到对方的怀中，用自己\n经过千锤百炼的拳头一拳击入。"
          shield: "生活在遥远地区的山岳地带。\n通过在断崖绝壁上奔跑\n来锻炼腰腿，磨炼招式。"
        zh_trad:
          sword: "一擊必殺是牠的信念。\n會衝進對手的懷裡，不留情地\n用千錘百煉的拳頭給予一擊。"
          shield: "棲息在遙遠地區的山岳地帶。\n會在斷崖絕壁上來回奔跑\n鍛鍊下盤，磨練招式。"
    urshifu_rapid_strike_style:
      form_id: 1
      names:
        jp_kana: れんげきのかた
        jp_kanji: れんげきのかた
        en: Rapid Strike Style
        fr: Style Mille Poings
        it: Stile Pluricolpo
        de: Fließender Stil
        es: Estilo Fluido
        ko: 연격의 태세
        zh_simp: 连击流
        zh_trad: 連擊流
      base_stats:
        hp: 100
        attack: 130
        defense: 100
        special_attack: 63
        special_defense: 60
        speed: 97
      evs_yield:
        hp: 0
        attack: 3
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fighting
        - water
      egg_groups:
        - undiscovered
      abilities:
        - unseen_fist
      descriptions:
        jp_kana:
          sword: "ときに　はげしく　ときに　おだやかな\nかわの　ながれから　かくとうわざの\nかたを　あみだしたと　いわれている。"
          shield: "たげきひっとうを　しんじょうとする。\nみずの　ながれのように　とぎれなく\nだげきわざを　あいてに　たたきこむ。"
        jp_kanji:
          sword: "ときに　激しく　ときに　穏やかな\n川の　流れから　格闘技の\n型を　編みだしたと　いわれている。"
          shield: "多撃必倒を　信条とする。\n水の　流れのように　途切れなく\n打撃技を　相手に　叩きこむ。"
        en:
          sword: "It’s believed that this Pokémon modeled its\nfighting style on the flow of a river—sometimes\nrapid, sometimes calm."
          shield: "This form of Urshifu is a strong believer in\ndefeating foes by raining many blows down on\nthem. Its strikes are nonstop, flowing like a river."
        fr:
          sword: "Tantôt violent, tantôt calme, ce Pokémon\naurait développé ses techniques de combat\nen s’inspirant du courant des rivières."
          shield: "Fervent adepte des techniques à coups multiples,\nil déverse sur ses adversaires une série d’attaques,\ntel un torrent."
        it:
          sword: "Si dice che abbia ideato il suo stile di lotta\nispirandosi alla corrente del fiume, a volte\nimpetuosa, a volte placida."
          shield: "Il suo credo è sconfiggere l’avversario a suon di\ncolpi. Sferra raffiche di attacchi che si abbattono\nsul nemico come un flusso d’acqua continuo."
        de:
          sword: "Man sagt, es habe den Stil seiner Kampftechnik\ndem Fließen eines Flusses nachempfunden:\nmanchmal ungestüm, manchmal ruhig."
          shield: "Es ist darauf spezialisiert, Gegner mit vielen\nTreffern zu besiegen, indem es wie ein reißender\nFluss Schläge auf sie niederprasseln lässt."
        es:
          sword: "Se considera que su estilo de lucha, a veces\nintenso y a veces comedido, se inspira en el\nfluir de la corriente de los ríos."
          shield: "Su estilo de combate se inspira en el flujo del\nagua y consiste en castigar al oponente de forma\nconstante e ininterrumpida."
        ko:
          sword: "때로는 격렬하고 때로는 잔잔한\n강물의 흐름에서 격투 기술의\n태세를 고안해냈다고 전해진다."
          shield: "많은 타격으로 반드시 쓰러뜨리는\n것이 신조다. 물 흐르듯 끊임없이\n타격 기술을 상대에게 날린다."
        zh_simp:
          sword: "据说，它是以时而湍急\n时而平稳的河水为灵感，\n创造出了格斗招式的形式。"
          shield: "把多击制胜作为自己的信条。\n会像水流一样毫不停息地\n用打击招式攻击对手。"
        zh_trad:
          sword: "據說牠是從時而湍急、\n時而平穩的河流獲得靈感，\n創造出了格鬥招式的流派。"
          shield: "以多擊必勝作為信念。\n會如流水般連續不斷地\n用打擊招式轟打對手。"
  gmax_forms:
    urshifu_single_strike_style_gigantamax:
      form_id: 999
      names:
        jp_kana: キョダイマックス
        jp_kanji: キョダイマックス
        en: Gigantamax
        fr: Gigamax
        it: Gigamax
        de: Gigadynamax
        es: Gigamax
        ko: 거다이맥스
        zh_simp: 超极巨化
        zh_trad: 超極巨化
      descriptions:
        jp_kana:
          sword: "いかりのけしん　と　よばれている。\nすさまじい　ぎょうそうと　おたけびで\nせかいの　じゃきを　はらうという。"
          shield: "こぶしから　はなたれた　エネルギーが\nしょうげきはとなり　ダイマックスした\nポケモンを　いちげきで　ふきとばす。"
        jp_kanji:
          sword: "怒りの化身　と　呼ばれている。\n凄まじい　形相と　雄叫びで\n世界の　邪気を　払うという。"
          shield: "拳から　放たれた　エネルギーが\n衝撃波となり　ダイマックスした\nポケモンを　一撃で　吹きとばす。"
        en:
          sword: "People call it the embodiment of rage. It’s said\nthat this Pokémon’s terrifying expression and\nshout will rid the world of malevolence."
          shield: "The energy released by this Pokémon’s fists forms\nshock waves that can blow away Dynamax\nPokémon in just one hit."
        fr:
          sword: "Il est surnommé « l’avatar de la colère ».\nOn raconte qu’il chasse les esprits maléfiques du\nmonde avec son apparence et son cri terrifiants."
          shield: "L’énergie qui émane de son poing provoque\nune onde de choc qui lui permet de balayer\nun Pokémon Dynamax d’un seul coup."
        it:
          sword: "Viene chiamato “Incarnazione dell’ira”.\nSi dice che spazzi via dal mondo la malvagità\ncon il suo aspetto e le sue urla terrificanti."
          shield: "L’energia rilasciata dai suoi pugni si tramuta\nin un’onda d’urto in grado di spazzare via\nin un colpo solo i Pokémon dynamaxizzati."
        de:
          sword: "Es wird die „Inkarnation des Zorns“ genannt. Sein\nfurchteinflößender Anblick und sein Kampfschrei\nsollen böse Geister aus dieser Welt vertreiben."
          shield: "Die aus seiner Faust freigesetzte Energie erzeugt\neine Schockwelle, die dynamaximierte Pokémon\nmit einem Schlag wegfegen kann."
        es:
          sword: "Lo llaman la Encarnación de la Furia. Se dice que\nahuyenta los espíritus malignos del mundo con su\nfuribundo semblante y su grito de guerra."
          shield: "La energía que libera por los puños forma ondas\nde choque capaces de lanzar por los aires incluso\na Pokémon Dinamax de un solo golpe."
        ko:
          sword: "분노의 화신이라 불린다.\n무시무시한 형상과 우렁찬 소리로\n세상의 악한 기운을 물리친다고 한다."
          shield: "주먹에서 발산되는 에너지가\n충격파가 되어 다이맥스한\n포켓몬을 일격에 날려버린다."
        zh_simp:
          sword: "被称为愤怒的化身。\n据说它会用自己可怕的外表\n和吼声祛除世上的邪气。"
          shield: "从拳头放出的能量\n变成了冲击波，能一击\n打飞极巨化的宝可梦。"
        zh_trad:
          sword: "被稱為憤怒的化身。\n據說牠會以駭人的表情與怒吼\n除淨世界上的邪氣。"
          shield: "從拳頭釋放出來的能量\n會成為衝擊波，一擊轟飛\n極巨化的寶可夢。"
    urshifu_rapid_strike_style_gigantamax:
      form_id: 998
      names:
        jp_kana: キョダイマックス
        jp_kanji: キョダイマックス
        en: Gigantamax
        fr: Gigamax
        it: Gigamax
        de: Gigadynamax
        es: Gigamax
        ko: 거다이맥스
        zh_simp: 超极巨化
        zh_trad: 超極巨化
      descriptions:
        jp_kana:
          sword: "かたあしだちの　かまえで　ぴくりとも\nうごかず　キョダイマックスパワーを\nばくはつさせる　ときを　まっている。"
          shield: "いかりを　ひめた　めで　にらまれた\nだけで　よこしまな　こころの　ものは\nいのちを　うばわれてしまうという。"
        jp_kanji:
          sword: "片足立ちの　構えで　ぴくりとも\n動かず　キョダイマックスパワーを\n爆発させる　時を　待っている。"
          shield: "怒りを　秘めた　目で　睨まれた\nだけで　よこしまな　心の　ものは\n命を　奪われてしまうという。"
        en:
          sword: "As it waits for the right moment to unleash its\nGigantamax power, this Pokémon maintains a\nperfect one-legged stance. It won’t even twitch."
          shield: "All it takes is a glare from this Pokémon to take\nthe lives of those with evil in their hearts—or so\nthey say."
        fr:
          sword: "Il reste debout sur une patte et patiente ainsi\nsans bouger d’un poil jusqu’à ce qu’il fasse\nexploser le pouvoir du Gigamax."
          shield: "On dit qu’il lui suffit de lancer un regard empli\nd’une colère sourde aux êtres maléfiques pour\nleur ôter la vie."
        it:
          sword: "Senza muoversi di un millimetro, aspetta in posa\nsu una gamba sola il momento per far esplodere\nil potere del Gigamax."
          shield: "Si narra che basti un suo solo sguardo\ncolmo d’ira per privare della vita chi possiede\nun animo malvagio."
        de:
          sword: "Auf einem Bein stehend wartet es vollkommen\nregungslos darauf, seine Gigadynamax-Energie\nzu entfesseln."
          shield: "Man sagt, einer seiner mit stillem Zorn erfüllten\nBlicke genüge, um jenen, die Böses im Herzen\ntragen, das Leben zu rauben."
        es:
          sword: "Se sostiene con una sola pata sin el menor atisbo\nde movimiento y aguarda el momento de liberar\nde golpe toda la energía Gigamax."
          shield: "Se dice que una sola mirada iracunda de este\nPokémon basta para arrebatarle la vida a quien\nposee un corazón perverso."
        ko:
          sword: "외발로 선 채로 꿈쩍하지 않고\n거다이맥스 파워를 폭발시킬 때를\n가만히 기다리고 있다."
          shield: "분노의 눈빛으로 노려보기만 해도\n마음이 부정한 자는\n생명을 빼앗긴다고 한다."
        zh_simp:
          sword: "单脚站立，纹丝不动，\n等待着让超极巨化之力\n爆发的那一刻。"
          shield: "据说内心邪恶的家伙\n只是被它暗藏愤怒的\n眼睛瞪着就会一命呜呼。"
        zh_trad:
          sword: "會以金雞獨立的姿勢\n一動也不動，靜靜等待\n讓超極巨化之力爆發的時機。"
          shield: "據說光是被牠含怒的\n眼神一瞪，內心邪惡的傢伙\n就會瞬間一命嗚呼。"
zarude:
