      form_id: 0
      base_stats:
        hp: 60
        attack: 45
        defense: 110
        special_attack: 80
        special_defense: 120
        speed: 90
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 3
