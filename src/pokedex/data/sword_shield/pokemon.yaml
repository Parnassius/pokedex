      descriptions:
        jp_kana:
          sword: "かふんと　みつを　まぜて　だんごを\nつくる。　ちょうごうする　しゅるいや\nりょうに　よって　こうかが　ちがう。"
          shield: "あめに　ぬれることが　だいきらい。\nくもりがちな　ガラルちほうでは\nすがたを　めったに　おがめない。"
        jp_kanji:
          sword: "花粉と　蜜を　混ぜて　団子を\nつくる。　調合する　種類や\n量に　よって　効果が　違う。"
          shield: "雨に　濡れることが　大嫌い。\n曇りがちな　ガラル地方では\n姿を　めったに　拝めない。"
        en:
          sword: "It makes pollen puffs from pollen and nectar.\nThe puffs’ effects depend on the type of\ningredients and how much of each one is used."
          shield: "Ribombee absolutely hate getting wet or\nrained on. In the cloudy Galar region,\nthey are very seldom seen."
        fr:
          sword: "Il mélange du nectar et du pollen pour créer\ndes boules qui ont divers effets, selon\nles quantités et les ingrédients utilisés."
          shield: "Il a horreur d’être trempé par la pluie.\nOn ne le voit que très rarement à Galar,\nrégion connue pour son temps couvert."
        it:
          sword: "Crea delle sfere di polline e nettare che hanno\neffetti diversi a seconda degli ingredienti\nusati e della loro quantità."
          shield: "Odia ritrovarsi madido di pioggia. È raro\nvederne uno nella regione di Galar, dove\nil tempo è spesso nuvoloso."
        de:
          sword: "Es rollt Blütenstaub und Honig zu Kugeln. Je nach\nZutaten und Menge, die es hineinmischt, weisen\nsie eine andere Wirkung auf."
          shield: "Bandelby hassen es, vom Regen nass zu werden.\nDa die Galar-Region zu bewölktem Wetter neigt,\nlassen sie sich nur selten blicken."
        es:
          sword: "Mezcla polen y néctar para elaborar unas bolas\ncuyo efecto varía en función de los ingredientes\nusados y de sus proporciones."
          shield: "Detesta verse empapado por la lluvia, por lo que\nrara vez se deja ver en la nubosa región de Galar."
        ko:
          sword: "꽃가루와 꿀을 섞어서 경단을\n만든다. 조합하는 종류와\n양에 따라 효과가 달라진다."
          shield: "비에 젖는 것을 매우 싫어한다.\n흐린 날이 많은 가라르지방에서는\n모습을 좀처럼 보기 힘들다."
        zh_simp:
          sword: "用花粉和花蜜制作团子。\n依调配的种类和剂量不同，\n团子的效果也不一样。"
          shield: "最讨厌雨水弄湿自己。\n因为伽勒尔地区阴天居多，\n所以很难见得到它的身影。"
        zh_trad:
          sword: "用花粉和花蜜製作團子。\n依調配的種類和劑量不同，\n團子的效果也不一樣。"
          shield: "最討厭雨水弄濕自己。\n因為伽勒爾地區陰天居多，\n所以很難見得到牠的身影。"
rockruff:
  species_id: 744
  names:
    jp_kana: イワンコ
    jp_kanji: イワンコ
    en: Rockruff
    fr: Rocabot
    it: Rockruff
    de: Wuffels
    es: Rockruff
    ko: 암멍이
    zh_simp: 岩狗狗
    zh_trad: 岩狗狗
  forms:
    rockruff:
      form_id: 0
      base_stats:
        hp: 45
        attack: 65
        defense: 40
        special_attack: 30
        special_defense: 40
        speed: 60
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - rock
      egg_groups:
        - field
      abilities:
        - keen_eye
        - vital_spirit
      hidden_ability: steadfast
      descriptions:
        jp_kana:
          sword: "よく　なつくが　かみぐせが\nあるので　ずっと　そだてるには\nなかなか　ほねが　おれるぞ。"
          shield: "くびのいわを　じめんに　うちつけ\nあいてを　いかく。　ひるんだ\nしゅんかんに　おそいかかるのだ。"
        jp_kanji:
          sword: "よく　懐くが　噛み癖が　あるので\nずっと　育てるには\nなかなか　骨が　折れるぞ。"
          shield: "首の岩を　地面に　打ちつけ\n相手を　威嚇。\n怯んだ　瞬間に　襲いかかるのだ。"
        en:
          sword: "This Pokémon can bond very strongly with its\nTrainer, but it also has a habit of biting. Raising\na Rockruff for a long time can be challenging."
          shield: "This Pokémon intimidates opponents by striking\nthe ground with the rocks on its neck. The\nmoment an opponent flinches, Rockruff attacks."
        fr:
          sword: "Ce Pokémon s’attache vite à son Dresseur,\nmais a une fâcheuse tendance à le mordre,\nce qui peut compliquer son entraînement."
          shield: "Il intimide ses ennemis en cognant les rochers\nautour de son cou contre le sol. Au premier\nsigne de faiblesse, il passe à l’assaut."
        it:
          sword: "Si affeziona facilmente, ma ha tendenza a\nmordere il suo Allenatore. Chi ne vuole allenare\nuno avrà di certo un bel daffare."
          shield: "Intimorisce l’avversario battendo a terra le rocce\nche ha sul collo e non appena lo vede esitare\nsi lancia all’attacco."
        de:
          sword: "Es ist zwar sehr zutraulich, aber wegen seiner\nAngewohnheit zu beißen wird sein Training mit\nder Zeit zu einer ziemlichen Herausforderung."
          shield: "Mit seinem steinernen Fellkragen schlägt Wuffels\nauf den Boden, um Gegner einzuschüchtern.\nSchrecken diese zurück, greift es sie sofort an."
        es:
          sword: "Se encariña con su Entrenador rápidamente, pero\nsu tendencia a dar mordiscos hace que dedicarse\na entrenarlo sea una ardua labor."
          shield: "Intimida a los rivales golpeando contra el suelo\nlas rocas que tiene en el cuello y, tan pronto\ncomo retroceden, se abalanza sobre ellos."
        ko:
          sword: "잘 따르지만 무는 버릇이\n있어 계속 기르기에는\n상당한 노력이 필요하다."
          shield: "목의 바위를 땅에 세게 부딪쳐서\n상대를 위협한다. 풀이 죽은\n순간에 덮친다."
        zh_simp:
          sword: "虽然很容易亲近，\n但是因为它喜欢乱咬，\n所以培育起来也很伤神。"
          shield: "将脖子上的岩石向地面\n发射，以此威吓对手。\n在对方畏缩的刹那发起袭击。"
        zh_trad:
          sword: "非常容易親近，但是卻喜歡\n東咬西咬，所以如果要一直\n培育牠的話會相當費勁。"
          shield: "會將脖子上的岩石\n射向地面來威嚇對手，\n趁對手畏縮的時候發起襲擊。"
