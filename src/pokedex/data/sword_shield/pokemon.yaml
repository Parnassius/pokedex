      descriptions:
        jp_kana:
          sword: "ある　しょうねんの　はつめいから\nロトムを　いかした　いろいろな\nきかいが　つくられはじめたのだ。"
          shield: "プラズマで　できた　からだで\nいろんな　きかいに　もぐりこむ。\nおどろかせるのが　だいすきだ。"
        jp_kanji:
          sword: "ある　少年の　発明から\nロトムを　活かした　いろいろな\n機械が　作られ始めたのだ。"
          shield: "プラズマで　できた　体で\nいろんな　機械に　潜りこむ。\n驚かせるのが　大好きだ。"
        en:
          sword: "One boy’s invention led to the development of\nmany different machines that take advantage of\nRotom’s unique capabilities."
          shield: "With a body made of plasma, it can inhabit all\nsorts of machines. It loves to surprise others."
        fr:
          sword: "L’invention d’un jeune homme a inspiré\nla création de machines permettant de profiter\ndes compétences de ce Pokémon."
          shield: "Son corps composé de plasma lui permet\nd’infiltrer diverses machines.\nIl adore surprendre les gens."
        it:
          sword: "L’invenzione di un ragazzo ha dato l’avvio\nalla fabbricazione di vari apparecchi che\nsfruttano le caratteristiche peculiari di Rotom."
          shield: "Si intrufola in diversi apparecchi con il suo corpo\ncomposto di plasma. Gli piace tanto sorprendere\nle persone."
        de:
          sword: "Die Erfindung eines jungen Tüftlers hat zu der\nHerstellung verschiedener Geräte geführt, die\ndas Potenzial von Rotom nutzen können."
          shield: "Mit seinem aus Plasma bestehenden Körper kann\nes in verschiedene Geräte schlüpfen. Es liebt es,\nandere zu erschrecken."
        es:
          sword: "Gracias a la inventiva de cierto joven, se ha\niniciado la fabricación de diversos artilugios\nque aprovechan todo el potencial de Rotom."
          shield: "Su cuerpo de plasma le permite infiltrarse en\ntoda clase de dispositivos electrónicos. Adora\nsobresaltar a la gente."
        ko:
          sword: "어떤 소년의 발명에 의해\n로토무를 활용한 다양한\n기계가 만들어지기 시작했다."
          shield: "플라스마로 된 몸으로\n다양한 기계에 숨는다.\n놀라게 하는 걸 매우 좋아한다."
        zh_simp:
          sword: "某位少年的发明\n促使人们开始制造\n各种活用洛托姆的机器 。"
          shield: "会用由离子构成的身体\n潜入各种各样的机器里。\n最喜欢恶作剧吓人。"
        zh_trad:
          sword: "某位少年的發明\n促使人們開始製造\n各種活用洛托姆的機器。"
          shield: "會用等離子構成的身體\n潛入各式各樣的機器裡。\n最喜歡惡作劇嚇人。"
    rotom_heat:
