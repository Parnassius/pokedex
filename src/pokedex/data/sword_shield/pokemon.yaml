          shield: "こうらの　ロケットほう　から\nふきだした　ジェットすいりゅうは\nぶあつい　てっぱんも　つらぬく。"
        jp_kanji:
          sword: "体が　重たく　のしかかって\n相手を　気絶させる。\nピンチの　ときは　殻に　隠れる。"
          shield: "甲羅の　ロケット砲　から\n噴き出した　ジェット水流は\nぶ厚い　鉄板も　つらぬく。"
        en:
          sword: "It crushes its foe under its heavy body to cause\nfainting. In a pinch, it will withdraw inside its shell."
          shield: "The rocket cannons on its shell fire jets of water\ncapable of punching holes through thick steel."
        fr:
          sword: "Il écrase ses adversaires de tout son poids\npour leur faire perdre connaissance.\nIl rentre dans sa carapace s’il se sent en danger."
          shield: "Les canons sur sa carapace tirent des jets d’eau\ncapables de percer même de l’acier trempé."
        it:
          sword: "Mette KO gli avversari schiacciandoli sotto\nil corpo possente. Se è in difficoltà, può ritrarsi\nnella corazza."
          shield: "I cannoni sul suo guscio sparano getti d’acqua\ncapaci di bucare l’acciaio."
        de:
          sword: "Es begräbt seine Gegner mit seinem enormen\nKörpergewicht. Wenn es in einer aussichtslosen\nLage steckt, zieht es sich in seinen Panzer zurück."
          shield: "Die Wassersalven, die es mit den Wasserdüsen\nin seinem Panzer abfeuert, durchdringen sogar\ndicke Stahlwände."
        es:
          sword: "Para acabar con su enemigo, lo aplasta con el\npeso de su cuerpo. En momentos de apuro, se\nesconde en el caparazón."
          shield: "Dispara chorros de agua a través de los cañones\nde su caparazón, capaces de agujerear incluso el\nacero."
        ko:
          sword: "무거운 몸으로 상대를\n덮쳐서 기절시킨다.\n위기에 처하면 등껍질에 숨는다."
          shield: "등껍질의 로켓포에서\n뿜어져 나오는 제트 수류는\n두꺼운 철판도 뚫는다."
        zh_simp:
          sword: "身体很重，压住对手后\n就能让对手昏厥。\n遇到危险时会躲进壳里。"
          shield: "从龟壳上的大炮里\n放出的喷射水流\n足以贯穿厚实的铁板。"
        zh_trad:
          sword: "會用重量驚人的身體\n壓住對手使其昏厥。\n遇到危險時會躲進殼裡。"
          shield: "從甲殼上的大炮裡\n放出的噴射水流\n足以貫穿厚實的鐵板。"
  gmax_forms:
    blastoise_gigantamax:
      form_id: 999
      names:
        jp_kana: キョダイマックス
        jp_kanji: キョダイマックス
        en: Gigantamax
        fr: Gigamax
        it: Gigamax
        de: Gigadynamax
        es: Gigamax
        ko: 거다이맥스
        zh_simp: 超极巨化
        zh_trad: 超極巨化
      descriptions:
        jp_kana:
          sword: "せいみつな　しゃげきは　ニガテ。\n３１もんの　たいほうで　うってうって\nうちまくる　スタイルで　せめるのだ。"
          shield: "まんなかの　しゅほうから　はなたれる\nみずでっぽうは　やまを　うちぬき\nあなを　あける　はかいりょくだ。"
        jp_kanji:
          sword: "精密な　射撃は　苦手。\n３１門の　大砲で　撃って撃って\n撃ちまくる　スタイルで　攻めるのだ。"
          shield: "真ん中の　主砲から　放たれる\n水鉄砲は　山を　撃ち抜き\n穴を　開ける　破壊力だ。"
        en:
          sword: "It’s not very good at precision shooting. When\nattacking, it just fires its 31 cannons over and\nover and over."
          shield: "Water fired from this Pokémon’s central main\ncannon has enough power to blast a hole into\na mountain."
        fr:
          sword: "La précision n’est pas son point fort.\nIl préfère sortir l’artillerie lourde et\ntirer à volonté avec ses 31 canons."
          shield: "Le jet d’eau qu’il projette avec son canon\ncentral est si puissant qu’il peut transpercer\nune montagne."
        it:
          sword: "I tiri di precisione non sono il suo forte.\nIl suo stile di lotta consiste nello sparare\na ripetizione con i suoi 31 cannoni."
          shield: "Il getto d’acqua che spara dal cannone centrale\nha una potenza distruttiva tale da perforare\nuna montagna."
        de:
          sword: "Präzises Schießen ist nicht seine Stärke. Wenn es\nangreift, feuert es einfach unaufhörlich seine\n31 Kanonen wahllos ab."
          shield: "Feuert es einen Wasserstrahl aus seiner mittleren\nHauptkanone ab, hat dieser so viel Kraft, dass es\ndamit ein Loch in einen Berg schießen kann."
        es:
          sword: "No es muy hábil con tiros de precisión. Su estilo\nconsiste más bien en disparar sus 31 cañones de\nforma indiscriminada."
          shield: "Los chorros de agua que dispara por el cañón\ncentral tienen la fuerza suficiente como para\nabrir un boquete en una montaña."
        ko:
          sword: "정밀하게 사격하지는 못한다.\n31개의 대포에서 포탄을 연달아\n쏘아대는 스타일로 공격한다."
          shield: "중앙의 주포에서 쏘는\n물대포는 산을 관통해서\n구멍을 낼 정도의 파괴력이다."
        zh_simp:
          sword: "不擅长精细的射击。\n使用３１门大炮连续不断地\n发射炮弹，才是它的攻击风格。"
          shield: "从正中间的主炮发射出的\n水枪破坏力极强，可以击穿\n一座山，在山体上开出洞来。"
        zh_trad:
          sword: "不擅長精準的射擊。\n使用３１門大砲射啊射啊\n射個不停，才是牠的攻擊風格。"
          shield: "從中央的主砲發射的水槍\n破壞力十足，能夠貫穿山體\n開出山洞。"
caterpie:
  species_id: 10
  names:
    jp_kana: キャタピー
    jp_kanji: キャタピー
    en: Caterpie
    fr: Chenipan
    it: Caterpie
    de: Raupy
    es: Caterpie
    ko: 캐터피
    zh_simp: 绿毛虫
    zh_trad: 綠毛蟲
  forms:
    caterpie:
      form_id: 0
