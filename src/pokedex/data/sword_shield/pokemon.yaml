        jp_kana:
          sword: "ぜんしんが　きんにくに　なっており\nこどもほどの　おおきさしかないのに\nおとな　１００にんを　なげとばせる。"
          shield: "いつも　パワフル。　たいりょくが\nありあまっているので　ひまつぶしに\nいわをもちあげ　さらに　つよくなる。"
        jp_kanji:
          sword: "全身が　筋肉になっており\n子どもほどの　大きさしかないのに\n大人　１００人を　投げ飛ばせる。"
          shield: "いつも　パワフル。　体力が\n有り余っているので　暇つぶしに\n岩を持ち上げ　さらに　強くなる。"
        en:
          sword: "Its whole body is composed of muscles.\nEven though it’s the size of a human child, it can\nhurl 100 grown-ups."
          shield: "Always brimming with power, it passes time by\nlifting boulders. Doing so makes it even stronger."
        fr:
          sword: "Son corps est essentiellement composé de\nmuscles. Même s’il fait la taille d’un petit enfant,\nil peut soulever 100 adultes avec ses bras."
          shield: "Il essaie de dépenser son énergie débordante\nen soulevant des rochers, ce qui le rend encore\nplus fort."
        it:
          sword: "Il suo corpo è formato interamente da muscoli.\nNon è più alto di un bambino, ma può sollevare\ne lanciare 100 adulti."
          shield: "Sempre traboccante di energia, passa il tempo\na sollevare massi. Così diventa ancora più forte."
        de:
          sword: "Sein ganzer Körper besteht aus Muskeln. Auch\nwenn es nur so groß wie ein Menschenkind ist,\nkann es 100 Erwachsene jonglieren."
          shield: "Da es vor Kraft strotzt, hebt es zum Zeitvertreib\nFelsen. Dadurch gewinnt es an zusätzlicher\nStärke."
        es:
          sword: "Es una masa de músculos y, pese a su pequeño\ntamaño, tiene fuerza de sobra para levantar en\nbrazos a 100 personas."
          shield: "Siempre rebosante de energía, pasa el tiempo\nlevantando piedras para hacerse aún más fuerte."
        ko:
          sword: "몸집은 어린아이만 하지만\n온몸이 근육으로 되어 있어서\n어른 100명은 날려 버릴 수 있다."
          shield: "언제나 파워풀하다.\n체력이 남아돌기 때문에 심심풀이로\n바위를 들어 올리며 더 강해진다."
        zh_simp:
          sword: "全身都是肌肉，\n虽然只有小孩那么大，\n却可以扔飞１００个成年人。"
          shield: "时时刻刻都充满力量。\n由于体力过剩而去举起岩石\n消磨时间，也因此变得更强。"
        zh_trad:
          sword: "全身都是肌肉，\n雖然體型只有小孩那麼大，\n卻可以扔飛１００個大人。"
          shield: "時時刻刻都充滿力量。\n由於體力過剩而去舉岩石\n消磨時間，也因此變得更強。"
