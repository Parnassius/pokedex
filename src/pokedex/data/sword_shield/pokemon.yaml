          sword: "ひょうてんか　１００どの　れいきで\nくうきちゅうの　すいぶんを　こおらせ\nこおりの　そうこうで　みを　まもる。"
          shield: "ごっかんの　ちいきに　せいそくする。\nクレベースの　せなかと　じぶんの\nあしを　こおりつかせて　こていする。"
        jp_kanji:
          sword: "氷点下　１００度の　冷気で\n空気中の　水分を　凍らせ\n氷の　装甲で　身を　守る。"
          shield: "極寒の　地域に　生息する。\nクレベースの　背中と　自分の\n足を　凍りつかせて　固定する。"
        en:
          sword: "They chill the air around them to −150 degrees\nFahrenheit, freezing the water in the air into ice\nthat they use as armor."
          shield: "This Pokémon lives in areas of frigid cold.\nIt secures itself to the back of an Avalugg\nby freezing its feet in place."
        fr:
          sword: "Grâce à son souffle glacé à - 100 °C, il peut\ngeler l’humidité dans l’air et se façonner\nune carapace de glace."
          shield: "Il vit dans les régions les plus froides, agrippé\naux Séracrawl. Il gèle ses pattes sur leur dos\npour se maintenir en place."
        it:
          sword: "Cristallizza l’umidità presente nell’aria con un\nsoffio ghiacciato a -100 ºC, creando una\ncorazza con cui protegge il proprio corpo."
          shield: "Abita le regioni più fredde. Si ancora alla schiena\ndi Avalugg congelando la base delle sue zampe."
        de:
          sword: "Mit -100 ºC kalter Luft lässt es Wassermoleküle\num sich herum gefrieren und erschafft sich so\neinen schützenden Eispanzer."
          shield: "Es lebt in extrem kalten Gebieten. Um sich an\nArktilas zu befestigen, lässt es seine Beine an\ndessen Rücken festfrieren."
        es:
          sword: "Congela la humedad del ambiente exhalando\nvaho a -100 °C para crear una coraza de hielo\ncon la que protege su cuerpo."
          shield: "Vive en regiones sumamente frías. Se aferra al\nlomo de los Avalugg congelando sus propias\nextremidades."
        ko:
          sword: "영하 100도의 냉기로\n공기 중의 수분을 얼려서\n얼음 갑옷으로 몸을 지킨다."
          shield: "혹한의 지역에 서식한다.\n크레베이스의 등에 자신의\n발을 얼어붙게 해 고정한다."
        zh_simp:
          sword: "用零下１００度的冷气\n冻住空气中的水分，\n用冰之装甲保护自身。"
          shield: "栖息在极其寒冷的地域。\n会把自己的脚冻在\n冰岩怪的背上固定起来。"
        zh_trad:
          sword: "用零下１００度的冷氣\n凍住空氣中的水分，\n用冰之裝甲保護自身。"
          shield: "棲息在極其寒冷的地域。\n會把自己的腳凍在\n冰岩怪的背上固定起來。"
