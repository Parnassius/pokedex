        jp_kana:
          sword: "チームワークに　すぐれた　みつごの\nディグダ。　ちか　１００キロまで\nほって　じしんを　おこすこともある。"
          shield: "ちか１００キロまで　ほりすすむ\nパワーをひめた　みつごの　ディグダ。\nじめんのしたは　だれも　しらない。"
        jp_kanji:
          sword: "チームワークに　すぐれた　三つ子の\nディグダ。　地下　１００キロまで\n掘って　地震を　起こすこともある。"
          shield: "地下１００キロまで　掘り進む。\nパワーを秘めた　三つ子の　ディグダ。\n地面の下は　だれも　知らない。"
        en:
          sword: "A team of Diglett triplets. It triggers huge\nearthquakes by burrowing 60 miles underground."
          shield: "These Diglett triplets dig over 60 miles below sea\nlevel. No one knows what it’s like underground."
        fr:
          sword: "Ces triplés forment une équipe de choc.\nIls causent parfois des séismes lorsqu’ils creusent\njusqu’à 100 km de profondeur."
          shield: "Ce trio de Taupiqueur est capable de creuser\njusqu’à 100 km sous terre, vers l’inconnu."
        it:
          sword: "Trio di Diglett che eccellono nel lavoro di\nsquadra. Scava fino a 100 km di profondità,\nprovocando a volte dei terremoti."
          shield: "Questo trio di Diglett può scavare fino a 100 km\ndi profondità. Nessuno ha mai visto la parte\nnascosta sotto terra."
        de:
          sword: "Diese Digda-Drillinge graben sich manchmal\nbis zu 100 km tief in den Erdboden und lösen\ndadurch Erdbeben aus."
          shield: "Diese kraftvollen Digda-Drillinge graben bis zu\n100 km tief. Keiner weiß, wie sie unter der Erde\naussehen."
        es:
          sword: "Un trío de Diglett. Causa enormes terremotos al\ncavar en el subsuelo a profundidades de hasta\n100 km."
          shield: "Estos trillizos cavan a una profundidad de hasta\n100 km. Se desconoce el aspecto de la parte de\nsus cuerpos que se oculta bajo tierra."
        ko:
          sword: "팀워크가 뛰어난 세쌍둥이 디그다.\n지하 100km까지 파고들어\n지진을 일으킬 때도 있다."
          shield: "지하 100km까지 파고들 수 있는\n파워를 간직한 세쌍둥이 디그다.\n땅 밑은 아무도 모른다."
        zh_simp:
          sword: "擅长团队合作的三胞胎地鼠。\n有时会挖掘到１００公里深的\n地底，甚至引发地震。"
          shield: "三胞胎的地鼠，拥有能够挖掘到\n地下１００公里深的潜力。没人知道\n它在地下的部分究竟长成什么样子。"
        zh_trad:
          sword: "擅長團隊合作的三胞胎地鼠。\n有時會挖掘到１００公里深的\n地底，甚至引發地震。"
          shield: "三胞胎的地鼠，擁有能夠挖掘到\n地下１００公里深的潛力。沒人知道\n牠在地下的部分究竟長成什麼樣子。"
    dugtrio_alolan_form:
      form_id: 1
      names:
        jp_kana: アローラのすがた
        jp_kanji: アローラのすがた
        en: Alolan Form
        fr: Forme d’Alola
        it: Forma di Alola
        de: Alola-Form
        es: Forma de Alola
        ko: 알로라의 모습
        zh_simp: 阿罗拉的样子
        zh_trad: 阿羅拉的樣子
      base_stats:
        hp: 35
        attack: 100
        defense: 60
        special_attack: 50
        special_defense: 70
        speed: 110
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ground
        - steel
      egg_groups:
        - field
      abilities:
        - sand_veil
        - tangling_hair
      hidden_ability: sand_force
      held_items:
        rare: soft_sand
      descriptions:
        jp_kana:
          sword: "うつくしい　きんぞくしつの　ひげは\nヘルメットのように　あたまを　ほごし\nかつ　こうどな　センサーでもある。"
          shield: "３びきは　とても　なかよし。\nばつぐんの　コンビネーションで\nきょうてきに　たちむかい　たおす。"
        jp_kanji:
          sword: "美しい　金属質の　ひげは\nヘルメットのように　頭を　保護し\nかつ　高度な　センサーでもある。"
          shield: "３匹は　とても　仲良し。\n抜群の　コンビネーションで\n強敵に　立ち向かい　倒す。"
        en:
          sword: "Their beautiful, metallic whiskers create a sort of\nprotective helmet on their heads, and they also\nfunction as highly precise sensors."
          shield: "The three of them get along very well.\nThrough their formidable teamwork, they\ndefeat powerful opponents."
        fr:
          sword: "Les magnifiques vibrisses métalliques\nsur ses têtes lui servent à la fois de casque\nprotecteur et de détecteur très précis."
          shield: "Ce trio s’entend à merveille. Leur synchronisation\nexceptionnelle leur permet de défier et même\nde vaincre des ennemis bien plus puissants qu’eux."
        it:
          sword: "Oltre a proteggerlo come un casco, le sue\nmeravigliose chiome metalliche fungono\nda sensori estremamente precisi."
          shield: "Le tre teste vanno d’amore e d’accordo.\nLottano con formidabile coordinazione\nsconfiggendo così anche i nemici più forti."
        de:
          sword: "Seine prächtigen, metallischen Haare schützen\nseine Köpfe wie ein Helm. Gleichzeitig dienen\nsie ihm als präzise Sensoren."
          shield: "Die drei verstehen sich blendend. Als starkes\nDreiergespann können sie auch Gegnern die\nStirn bieten, die weitaus mächtiger sind als sie."
        es:
          sword: "Las espléndidas melenas metálicas que cubren\nsus cabezas hacen las veces de casco protector\ny de sensor de gran precisión."
          shield: "Las tres cabezas se llevan de maravilla y están\nen perfecta sintonía, lo que les permite hacer\nfrente a enemigos más fuertes que ellos."
        ko:
          sword: "아름다운 금속질의 수염은\n헬멧처럼 머리를 보호하는 동시에\n고성능 센서이기도 하다."
          shield: "3마리는 매우 사이가 좋다.\n뛰어난 콤비네이션으로\n강적에 맞서 쓰러뜨린다."
        zh_simp:
          sword: "它漂亮的金属胡须不但\n像头盔一样保护着头部，\n同样也是灵敏的感应器。"
          shield: "３只的感情非常好。\n会用超群的团队默契\n打败所面临的强敌。"
        zh_trad:
          sword: "牠漂亮的金屬鬍鬚不但\n像頭盔一樣保護著頭部，\n同樣也是靈敏的感應器。"
          shield: "３隻的感情非常好。\n會用超群的團隊默契\n打敗所面臨的強敵。"
