      descriptions:
        jp_kana:
          sword: "ふだんは　おだやかだが　にんげんが\nこうざんを　あらすと　いかりくるい\n１５００どの　ほのおで　やきつくす。"
          shield: "たたかいになると　せきたんの　やまが\nまっかに　もえあがり　ひのこを\nまきちらして　しゅういを　こがす。"
        jp_kanji:
          sword: "普段は　穏やかだが　人間が\n鉱山を　荒らすと　怒りくるい\n１５００度の　炎で　焼きつくす。"
          shield: "戦いになると　石炭の　山が\n真っ赤に　燃え上がり　火の粉を\nまき散らして　周囲を　焦がす。"
        en:
          sword: "It’s usually peaceful, but the vandalism of mines\nenrages it. Offenders will be incinerated with\nflames that reach 2,700 degrees Fahrenheit."
          shield: "While it’s engaged in battle, its mountain of coal\nwill burn bright red, sending off sparks that\nscorch the surrounding area."
        fr:
          sword: "Il est d’une nature paisible, mais si les humains\ntentent de piller ses mines, il enrage et brûle\ntout avec des flammes à 1 500 °C."
          shield: "Lorsqu’il s’engage dans un combat, son tas\nde charbon brûle et vire au rouge, ce qui répand\nde petites étincelles qui calcinent ce qui l’entoure."
        it:
          sword: "Di solito è tranquillo, ma se gli esseri umani\ndanneggiano la sua miniera va su tutte le furie e\nbrucia tutto emettendo fiamme a 1.500 ºC."
          shield: "Quando lotta, la montagna di carbone brucia\ncon bagliori rossastri e sparge scintille che\nanneriscono tutta l’area circostante."
        de:
          sword: "Meist ist es friedfertig, aber wenn Menschen\neine Mine zugrunde richten, sieht es rot und\nverbrennt sie mit 1 500 ºC heißen Flammen."
          shield: "Kommt es zum Kampf, so lodert sein Kohleberg\ntiefrot auf und es sprüht glühende Funken, die\nseine Umgebung versengen."
        es:
          sword: "Aunque es de carácter sereno, monta en cólera\nsi ve a seres humanos dañando una mina y reduce\ntodo a cenizas con sus llamas a 1500 °C."
          shield: "Cuando se enzarza en un combate, la montaña\nde carbón arde al rojo vivo y esparce chispas\nque calcinan todo lo que le rodea."
        ko:
          sword: "평소에는 온화하지만 인간이\n광산을 훼손시키면 격분해서\n1500도의 불꽃으로 태워버린다."
          shield: "싸우게 되면 석탄으로 된 산이\n새빨갛게 타올라 불똥을\n흩뿌려 주위를 태운다."
        zh_simp:
          sword: "平时性情温和，但在人类\n破坏矿山时会大发雷霆，\n用１５００度的大火将他们烧尽。"
          shield: "进入战斗状态后，\n它会把煤炭山燃烧得通红，\n飞撒火花来烧焦四周。"
        zh_trad:
          sword: "平時性情溫和，但在人類\n破壞礦山時會大發雷霆，\n用１５００度的大火將他們燒盡。"
          shield: "進入戰鬥狀態後，\n牠會把煤炭山燃燒得通紅，\n飛撒火花來燒焦四周。"
  gmax_forms:
    coalossal_gigantamax:
      form_id: 999
      names:
        jp_kana: キョダイマックス
        jp_kanji: キョダイマックス
        en: Gigantamax
        fr: Gigamax
        it: Gigamax
        de: Gigadynamax
        es: Gigamax
        ko: 거다이맥스
        zh_simp: 超极巨化
        zh_trad: 超極巨化
      descriptions:
        jp_kana:
          sword: "どうたいは　きょだいな　かまど。\nキョダイマックス　パワーに　あおられ\n２０００どの　ほのおが　もえさかる。"
          shield: "かつて　だいかんぱに　おそわれたとき\nきょだいな　ストーブとなり　おおくの\nいのちを　すくったと　いわれている。"
        jp_kanji:
          sword: "胴体は　巨大な　かまど。\nキョダイマックス　パワーに　煽られ\n２０００度の　炎が　燃え盛る。"
          shield: "かつて　大寒波に　襲われたとき\n巨大な　ストーブとなり　多くの\n命を　救ったと　いわれている。"
        en:
          sword: "Its body is a colossal stove. With Gigantamax\nenergy stoking the fire, this Pokémon’s flame\nburns hotter than 3,600 degrees Fahrenheit."
          shield: "When Galar was hit by a harsh cold wave, this\nPokémon served as a giant heating stove and\nsaved many lives."
        fr:
          sword: "Son corps est devenu un immense fourneau.\nGrâce à la puissance du Gigamax, la température\nde ses flammes atteint 2 000 °C."
          shield: "On raconte qu’il y a longtemps, il a sauvé\nde nombreuses vies d’une vague de froid\nen se transformant en brasero géant."
        it:
          sword: "Il suo corpo è una fornace gigantesca in cui\nbruciano fiamme a 2.000 ºC alimentate\ndall’energia del fenomeno Gigamax."
          shield: "Si dice che in passato abbia salvato molte vite\ndurante un’ondata di gelo fungendo da stufa\ngigantesca."
        de:
          sword: "Sein Körper ist ein gigantischer Ofen. Durch die\nGigadynamax-Energie hat sich das Feuer in\nseinem Inneren auf 2 000 ºC erhitzt."
          shield: "Man erzählt sich, dass es einst unzählige Leben\nvor einer Kältewelle gerettet haben soll, indem\nes als Ofen von gigantischem Ausmaß fungierte."
        es:
          sword: "Su torso es una forja gigantesca donde arden\nllamas a 2000 °C avivadas por la energía del\nfenómeno Gigamax."
          shield: "Dicen que hace tiempo salvó incontables vidas\nde una cruenta ola de frío usando su cuerpo a\nmodo de estufa gigante."
        ko:
          sword: "몸체는 거대한 화덕이다.\n거다이맥스의 파워에 의해\n2000도의 불꽃이 활활 타오른다."
          shield: "과거에 큰 한파가 몰아쳤을 때\n거대한 스토브가 되어 많은\n생명을 구했다고 전해진다."
        zh_simp:
          sword: "身体是巨大的火炉。\n超极巨化之力激发它\n燃烧起了２０００度的炉火。"
          shield: "据说在大寒流席卷伽勒尔时，\n是它变成巨大的火炉\n拯救了许许多多的生命。"
        zh_trad:
          sword: "身體是巨大的火爐。\n超極巨化的力量激發牠\n燃燒起了２０００度的爐火。"
          shield: "據說在大寒流席捲伽勒爾時，\n是牠變成巨大的火爐\n拯救了許許多多的生命。"
