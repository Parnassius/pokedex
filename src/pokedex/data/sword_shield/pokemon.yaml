          shield: "そうびした　メモリによって　タイプが\nチェンジする　のうりょくを　もつ。\nかくとうタイプの　すがた。"
        jp_kanji:
          sword: "覚醒した　能力によって\n装備した　メモリに　合わせて\nかくとうタイプに　変化できる。"
          shield: "装備した　メモリによって　タイプが\nチェンジする　能力を　もつ。\nかくとうタイプの　姿。"
        en:
          sword: "Thanks to its awakened powers, it can change to\nthe Fighting type to match the memory it\nhas equipped."
          shield: "It has the ability to change its type based\non the memory it’s holding. This is its\nFighting-type form."
        fr:
          sword: "Maintenant que son potentiel s’est éveillé,\nil peut adopter le type Combat grâce à la ROM\ndont il est équipé."
          shield: "Il peut changer de type en fonction de la ROM\ndont il est équipé. Ceci est sa forme Combat."
        it:
          sword: "Ora che ha risvegliato il suo potere latente,\npuò assumere il tipo Lotta se è equipaggiato\ncon la ROM adatta."
          shield: "Ha la capacità di cambiare tipo in base alla ROM\nequipaggiata. Questa è la forma di tipo Lotta."
        de:
          sword: "Dank seiner erwachten Kräfte kann es den Typ\nKampf annehmen, sofern es mit den passenden\nSpeicherdaten ausgerüstet wurde."
          shield: "Je nachdem, mit welchen Speicherdaten es\nausgerüstet wurde, ändert es seinen Typ.\nIn dieser Form gehört es dem Typ Kampf an."
        es:
          sword: "Tras despertar su verdadero potencial, puede\ncambiar al tipo Lucha si está equipado con el\ndisco correspondiente."
          shield: "Posee la capacidad de cambiar de tipo en\nfunción del disco que lleve equipado. Esta\nes la forma correspondiente al tipo Lucha."
        ko:
          sword: "각성한 능력에 따라\n장비한 메모리에 맞춰\n격투타입으로 변화했다."
          shield: "장비한 메모리에 따라\n타입이 변하는 능력을 지녔다.\n격투타입의 모습이다."
        zh_simp:
          sword: "能够凭借觉醒后的能力，\n配合所装备的存储碟，\n让自己变化为格斗属性。"
          shield: "有着依所装备的存储碟\n改变自身属性的能力。\n这是它格斗属性的样子。"
        zh_trad:
          sword: "能夠憑藉覺醒後的能力，\n配合所裝備的記憶碟，\n讓自己變化為格鬥屬性。"
          shield: "有著依所裝備的記憶碟\n改變自身屬性的能力。\n這是牠格鬥屬性的樣子。"
