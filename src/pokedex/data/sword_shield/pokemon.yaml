      descriptions:
        jp_kana:
          sword: "コバルオン　テラキオン　ビリジオンに\nたたかいを　まなんだ。　せかいを\nかけめぐり　しゅぎょうを　つづける。"
          shield: "きびしい　たたかいを　くぐりぬけて\nひたいの　ツノが　きたえられると\nしんの　ちからが　めざめるという。"
        jp_kanji:
          sword: "コバルオン　テラキオン　ビリジオンに\n戦いを　学んだ。　世界を\n駆け巡り　修行を　続ける。"
          shield: "厳しい　戦いを　潜りぬけて\n額の　ツノが　鍛えられると\n真の　力が　目覚めるという。"
        en:
          sword: "Cobalion, Terrakion, and Virizion taught this\nPokémon how to fight. It dashes across the world,\nseeking more opportunities to further its training."
          shield: "They say that Keldeo must survive harsh battles\nand fully develop the horn on its forehead\nbefore this Pokémon’s true power will awaken."
        fr:
          sword: "Cobaltium, Terrakium et Viridium lui ont appris\nà se battre. Il poursuit son entraînement\nen parcourant le monde."
          shield: "Lorsqu’il livre un combat difficile, la corne\nsur son front se renforce et se développe,\nce qui éveillerait sa véritable puissance."
        it:
          sword: "Ha imparato a lottare da Cobalion, Terrakion\ne Virizion. Ora continua i suoi allenamenti\nin giro per il mondo."
          shield: "Si dice che quando supera difficili battaglie\nil corno sulla sua fronte si rafforzi e solo allora\nsi risvegli la sua vera forza."
        de:
          sword: "Kobalium, Terrakium und Viridium haben ihm das\nKämpfen beigebracht. Nun reist es um die Welt\nund setzt sein Training fort."
          shield: "Man sagt, wenn Keldeo schwere Kämpfe\nübersteht und das Horn an seiner Stirn stärker\nwird, erwache irgendwann seine wahre Kraft."
        es:
          sword: "Aprendió a luchar bajo la tutela de Cobalion,\nTerrakion y Virizion. Ahora recorre el mundo\nperfeccionando su destreza."
          shield: "A base de superar encarnizados combates, su\ncuerno se fortalece y, entonces, despierta su\nverdadero poder."
        ko:
          sword: "코바르온 테라키온 비리디온으로부터\n싸움을 배웠다. 세계를 돌아다니며\n수행을 거듭하고 있다."
          shield: "혹독한 싸움을 이겨내고\n이마의 뿔이 단련되면\n진정한 힘이 각성한다고 한다."
        zh_simp:
          sword: "从勾帕路翁、代拉基翁和\n毕力吉翁那里学会了战斗。\n驰骋全世界，不断修行。"
          shield: "据说当它挺过了艰难的战斗，\n额头上的角就能得到锻炼，\n从而激发出自己真正的力量。"
        zh_trad:
          sword: "從勾帕路翁、代拉基翁和\n畢力吉翁那裡學會了戰鬥。\n馳騁全世界，不斷修行。"
          shield: "據說當牠歷經艱難的戰鬥，\n藉此鍛鍊了額頭上的角之後，\n就能激發出自己真正的力量。"
