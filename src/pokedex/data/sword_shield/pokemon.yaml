      descriptions:
        jp_kana:
          sword: "ツノの　あなに　ドラメシヤを　いれて\nくらす。　たたかいになると　マッハの\nスピードで　ドラメシヤを　とばす。"
          shield: "ツノに　はいった　ドラメシヤは\nマッハの　スピードで　とばされるのを\nこころまちに　しているらしい。"
        jp_kanji:
          sword: "ツノの　穴に　ドラメシヤを　入れて\n暮らす。　戦いになると　マッハの\nスピードで　ドラメシヤを　飛ばす。"
          shield: "ツノに　入った　ドラメシヤは\nマッハの　スピードで　飛ばされるのを\n心待ちに　しているらしい。"
        en:
          sword: "When it isn’t battling, it keeps Dreepy in the\nholes on its horns. Once a fight starts, it launches\nthe Dreepy like supersonic missiles."
          shield: "Apparently the Dreepy inside Dragapult’s\nhorns eagerly look forward to being launched out\nat Mach speeds."
        fr:
          sword: "Il vit en compagnie de Fantyrm qui logent\ndans les trous de ses cornes. Quand il passe\nà l’attaque, il les propulse à la vitesse du son."
          shield: "Il paraît que les Fantyrm installés dans ses cornes\nattendent impatiemment le moment où ils seront\npropulsés à la vitesse du son."
        it:
          sword: "Vive assieme ai Dreepy, che ospita all’interno\ndei buchi sulle sue corna. Quando lotta\nli espelle alla velocità del suono."
          shield: "I Dreepy che vivono nelle sue corna attendono\nansiosamente di essere sparati alla velocità\ndel suono."
        de:
          sword: "Es transportiert Grolldra in den Löchern an\nseinen Hörnern. Kommt es zum Kampf, schießt\nes diese mit Mach-Geschwindigkeit ab."
          shield: "Die Grolldra, die in seinen Hörnern sitzen,\nwarten angeblich voller Spannung darauf, mit\nMach-Geschwindigkeit abgefeuert zu werden."
        es:
          sword: "Vive en compañía de Dreepy, a los que hospeda\nen el interior de sus cuernos. Los dispara a\nvelocidad supersónica en combate."
          shield: "Al parecer, los Dreepy que residen en sus\ncuernos esperan con ilusión el momento de ser\npropulsados a velocidad supersónica."
        ko:
          sword: "뿔에 있는 구멍에 드라꼰을 넣고\n지낸다. 싸움이 시작되면 마하의\n스피드로 드라꼰을 날린다."
          shield: "뿔에 들어간 드라꼰은\n마하의 속도로 날려지기를\n기대하고 있는 것 같다."
        zh_simp:
          sword: "让多龙梅西亚住在自己角上的\n洞里。战斗开始后会用音速\n将多龙梅西亚发射出去。"
          shield: "它角里的多龙梅西亚\n似乎满心期待着能被\n以音速发射出去。"
        zh_trad:
          sword: "讓多龍梅西亞住在自己角上的\n洞裡。戰鬥開始後會用音速\n將多龍梅西亞發射出去。"
          shield: "牠角裡的多龍梅西亞\n似乎滿心期待著能被\n以音速發射出去。"
