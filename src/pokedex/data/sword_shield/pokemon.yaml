        jp_kana:
          sword: "こまった　すがたを　みるために\nひとの　ものを　ぬすみだす。\nクスネとは　ライバルなのだ。"
          shield: "あいくるしい　しぐさで　ゆだんさせ\nよってきた　あいてを　いきなり\nツメで　ひっかいて　わらっている。"
        jp_kanji:
          sword: "困った　姿を　見るために\nひとの　ものを　盗みだす。\nクスネとは　ライバルなのだ。"
          shield: "愛くるしい　しぐさで　油断させ\n寄ってきた　相手を　いきなり\nツメで　ひっかいて　笑っている。"
        en:
          sword: "It steals things from people just to amuse itself\nwith their frustration. A rivalry exists between\nthis Pokémon and Nickit."
          shield: "Opponents that get drawn in by its adorable\nbehavior come away with stinging scratches from\nits claws and stinging pride from its laughter."
        fr:
          sword: "Il vole les biens des personnes rien que pour voir\nleur visage désemparé.\nSon plus grand rival est Goupilou."
          shield: "Malheur à qui se laisse berner par ses gestes\nadorables : une fois les gens à sa portée,\nil les griffe sans crier gare, en ricanant."
        it:
          sword: "Ruba le cose alle persone per vederle in\ndifficoltà. Nickit è il suo rivale."
          shield: "Lascia avvicinare il nemico distraendolo con\npose ammalianti, e poi all’improvviso lo graffia\nridendo."
        de:
          sword: "Es bestiehlt liebend gerne Leute, um sich an ihrer\nFrustration zu erfreuen. Mit Kleptifux verbindet\nes eine tiefe Rivalität."
          shield: "Es wiegt andere durch liebenswertes Verhalten in\nSicherheit, kratzt sie dann plötzlich und amüsiert\nsich prächtig darüber."
        es:
          sword: "Sustrae las pertenencias de las personas solo\npara verlas pasar apuros. Es un rival encarnizado\nde Nickit."
          shield: "Una vez que ha logrado distraer al rival mediante\nsus gestos adorables, lo araña de improviso con\nlas garras mientras muestra un semblante risueño."
        ko:
          sword: "곤란해하는 모습을 보기 위해\n사람의 물건을 훔친다.\n훔처우와는 라이벌 관계다."
          shield: "귀여운 동작으로 방심시키고\n상대가 다가오면 갑자기\n발톱으로 할퀴고는 웃는다."
        zh_simp:
          sword: "为了要看见人们困扰的样子\n而去偷盗他们的物品。\n和狡小狐是竞争对手。"
          shield: "会用可爱的动作让对手放下戒心，\n趁对方靠过来时冷不防地用爪子\n猛抓，然后得意地大笑。"
        zh_trad:
          sword: "為了要看見人們困擾的樣子\n而去偷盜他們的物品。\n和偷兒狐是競爭對手。"
          shield: "會用可愛的動作讓對手放下戒心，\n趁對方靠過來時冷不防用爪子\n猛抓，然後得意地大笑。"
