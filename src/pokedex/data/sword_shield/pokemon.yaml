      types:
        - dark
        - steel
      egg_groups:
        - human_like
      abilities:
        - defiant
        - inner_focus
      hidden_ability: pressure
      descriptions:
        jp_kana:
          sword: "するどい　やいばを　あやつり　てきを\nおいつめる。　かわらの　いしで\nからだの　やいばを　ていれする。"
          shield: "キリキザンを　ボスとした　むれを\nつくる。　むれを　ひきいる　ことを\nゆめみて　ひび　たんれんを　つむ。"
        jp_kanji:
          sword: "鋭い　刃を　操り　敵を\n追い詰める。　河原の　石で\n体の　刃を　手入れする。"
          shield: "キリキザンを　ボスとした　群れを\nつくる。　群れを　率いる　ことを\n夢見て　日々　鍛錬を　積む。"
        en:
          sword: "It uses river stones to maintain the cutting edges\nof the blades covering its body. These sharpened\nblades allow it to bring down opponents."
          shield: "A pack of these Pokémon forms to serve a\nBisharp boss. Each Pawniard trains diligently,\ndreaming of one day taking the lead."
        fr:
          sword: "Il accule ses ennemis en jouant de ses lames\nacérées, qu’il aiguise sur les pierres des berges."
          shield: "Il vit en meute, sous les ordres d’un Scalproie.\nIl s’entraîne sans relâche en rêvant du jour\noù il sera chef de meute à son tour."
        it:
          sword: "Incalza il nemico con le lame che ha sul corpo,\ne le mantiene sempre taglienti affilandole con\npietre di fiume."
          shield: "Con i suoi simili forma gruppi capeggiati da\nun Bisharp. Si allena quotidianamente sognando\nun giorno di diventare il capo del gruppo."
        de:
          sword: "Es treibt Gegner mit seinen scharfen Klingen in\ndie Ecke. Diese schärft es an den Felsen eines\nFlussbettes."
          shield: "Gladiantri bilden Gruppen mit einem Caesurio\nan der Spitze. Jedes von ihnen trainiert hart,\num irgendwann selbst Anführer zu werden."
        es:
          sword: "Acorrala a los enemigos con las cuchillas de su\ncuerpo, que afila usando cantos rodados a la\norilla del río."
          shield: "Forman grupos encabezados por un Bisharp. Se\nentrenan a diario soñando con llegar a liderar el\ngrupo algún día."
        ko:
          sword: "예리한 칼날을 다루어 상대를\n몰아넣는다. 강가에 있는 돌로\n몸에 있는 칼날을 손질한다."
          shield: "절각참을 보스로 둔 무리를\n만든다. 무리를 이끄는 날을\n꿈꾸며 날마다 단련을 계속한다."
        zh_simp:
          sword: "挥舞锐利的刀刃将敌人\n逼向绝境。会用河滩的\n石头来精心保养刀刃。"
          shield: "以劈斩司令为首领组成族群。\n目标是有朝一日能统领同类，\n所以每天都在不懈地锻炼。"
        zh_trad:
          sword: "揮舞銳利的刀刃將敵人\n逼向絕境。會用河灘的\n石頭來精心保養刀刃。"
          shield: "以劈斬司令為首領組成族群。\n目標是有朝一日能統領同類，\n所以每天都在不懈地鍛鍊。"
