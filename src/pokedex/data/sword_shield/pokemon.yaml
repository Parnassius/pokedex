        - intimidate
        - sand_rush
      hidden_ability: scrappy
      descriptions:
        jp_kana:
          sword: "ひとと　くらすのが　すきらしい。\nやせいで　つかまえても　みっかも\nたてば　ひとに　なつくようになる。"
          shield: "りっぱなヒゲが　じまんの　ポケモン。\nその　ながさで　なかまどうしの\nゆうれつが　きまると　いう。"
        jp_kanji:
          sword: "人と　暮らすのが　好きらしい。\n野生で　捕まえても　3日も\nたてば　人に　懐くようになる。"
          shield: "立派なヒゲが　自慢の　ポケモン。\nその　長さで　仲間同士の\n優劣が　決まると　いう。"
        en:
          sword: "These Pokémon seem to enjoy living with humans.\nEven a Stoutland caught in the wild will warm up\nto people in about three days."
          shield: "Stoutland is immensely proud of its impressive\nmoustache. It’s said that moustache length is what\ndetermines social standing among this species."
        fr:
          sword: "Il apprécierait tant la compagnie des êtres\nhumains qu’il ne faudrait pas plus de trois jours\npour apprivoiser un Mastouffe sauvage."
          shield: "Sa moustache remarquable fait sa fierté,\ncar sa longueur permettrait de déterminer\nla hiérarchie au sein de l’espèce."
        it:
          sword: "Sembra gli piaccia vivere con gli esseri umani.\nGli esemplari selvatici catturati si affezionano\nnel giro di tre giorni."
          shield: "Va molto fiero dei suoi splendidi baffi. Si dice\nche la loro lunghezza determini la sua\nsuperiorità o inferiorità rispetto ai suoi simili."
        de:
          sword: "Bissbark scheint gerne unter Menschen zu leben.\nWenn man ein wildes Exemplar fängt, dauert es\nnur etwa drei Tage, bis dieses zutraulich wird."
          shield: "Seinen üppigen Schnauzbart trägt es mit Stolz.\nAngeblich entscheidet dessen Länge über die\nRangordnung innerhalb dieser Pokémon-Art."
        es:
          sword: "Parece ser que le gusta vivir con personas. En tan\nsolo tres días ya le coge cariño a cualquiera que\nlo haya atrapado en estado salvaje."
          shield: "Sus impresionantes bigotes son su orgullo. Entre\nlos de su especie se establece una jerarquía\nsegún su longitud."
        ko:
          sword: "사람과 사는 것을 좋아하는 듯하다.\n야생에서 잡아도 3일만 지나면\n사람을 따르게 된다."
          shield: "훌륭한 수염이 특징인 포켓몬이다.\n그 길이로 동료들과\n우열을 가린다고 한다."
        zh_simp:
          sword: "似乎喜欢和人类一起生活。\n就算是野生的长毛狗，捕捉后\n只要过个三天就能和人亲近。"
          shield: "以自己气派的胡须为傲。\n据说，每只个体在族群中的地位，\n就是根据胡须长度来决定的。"
        zh_trad:
          sword: "似乎很喜歡和人類一起生活。\n即使是捕捉來的野生長毛狗，\n只要過個三天就會與人親近。"
          shield: "以氣派的鬍鬚為傲的寶可夢。\n據說在夥伴之間的階級地位\n就取決於鬍鬚的長度。"
