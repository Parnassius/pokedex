      types:
        - electric
        - flying
      egg_groups:
        - undiscovered
      abilities:
        - pressure
      hidden_ability: static
      descriptions:
        jp_kana:
          sword: "でんきを　じざいに　あやつる。\nまっくろな　かみなりぐもの　なかに\nすが　あると　いいつたえられている。"
          shield: "はねを　こすりあわせると　たちまち\nいかずちが　おちると　いわれている\nでんせつの　とりポケモン。"
        jp_kanji:
          sword: "電気を　自在に　操る。\n真っ黒な　雷雲の　中に\n巣があると　言い伝えられている。"
          shield: "羽根を　こすり合わせると　たちまち\n雷が　落ちると　言われている\n伝説の　鳥ポケモン。"
        en:
          sword: "This Pokémon has complete control over\nelectricity. There are tales of Zapdos nesting in\nthe dark depths of pitch-black thunderclouds."
          shield: "Zapdos is a legendary bird Pokémon. It’s said\nthat when Zapdos rubs its feathers together,\nlightning will fall immediately after."
        fr:
          sword: "On dit que ce Pokémon capable de contrôler\nla foudre installe son nid au creux des nuages\nd’orage noirs."
          shield: "On raconte que lorsque ce Pokémon oiseau\nlégendaire fait vibrer ses plumes, le frottement\nfait tomber la foudre instantanément."
        it:
          sword: "È in grado di controllare l’elettricità a suo\npiacimento. Secondo le leggende,\nfa il nido fra nere nubi temporalesche."
          shield: "Si dice che quando questo leggendario\nPokémon alato sfrega le ali fra loro,\ncada istantaneamente un fulmine."
        de:
          sword: "Zapdos kann Elektrizität manipulieren.\nÜberlieferungen nach soll sein Nest inmitten\npechschwarzer Gewitterwolken liegen."
          shield: "Es heißt, wenn dieses Legendäre Vogel-Pokémon\nseine Flügel aneinanderreibt, brechen\nunmittelbar danach Gewitter los."
        es:
          sword: "Posee el poder de controlar la electricidad a su\nantojo. Según la creencia popular, anida oculto\nen oscuros nubarrones de tormenta."
          shield: "Una de las aves legendarias. Dicen que, cuando\neste Pokémon frota las alas, cae al instante un\nrelámpago del cielo."
        ko:
          sword: "전기를 자유로이 조종한다.\n새까만 번개 구름 안에\n거처가 있다고 전해지고 있다."
          shield: "날개를 비비대면 바로\n천둥이 친다고 전해지는\n전설의 새포켓몬이다."
        zh_simp:
          sword: "能够随心所欲地操纵雷电。\n据传说，它的巢穴\n处在漆黑的雷云中。"
          shield: "传说的鸟宝可梦。\n据说只要它一摩擦翅膀，\n就会立刻发生落雷。"
        zh_trad:
          sword: "能夠自在地操縱雷電。\n相傳牠的巢穴就在\n烏黑的雷雲之中。"
          shield: "傳說的鳥寶可夢。\n據說只要牠磨蹭翅膀，\n立刻就會有雷電劈下。"
    zapdos_galarian_form:
      form_id: 1
      names:
        jp_kana: ガラルのすがた
        jp_kanji: ガラルのすがた
        en: Galarian Form
        fr: Forme de Galar
        it: Forma di Galar
        de: Galar-Form
        es: Forma de Galar
        ko: 가라르의 모습
        zh_simp: 伽勒尔的样子
        zh_trad: 伽勒爾的樣子
      base_stats:
        hp: 90
        attack: 125
        defense: 90
        special_attack: 85
        special_defense: 90
        speed: 100
      evs_yield:
        hp: 0
        attack: 3
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fighting
        - flying
      egg_groups:
        - undiscovered
      abilities:
        - defiant
      descriptions:
        jp_kana:
          sword: "うもうが　こすれるとき　バチバチと\nでんきのような　おとが　することから\nサンダーと　よばれてきた。"
          shield: "ひとけりで　ダンプカーを　こなごなに\nする　きゃくりょくを　もつ。　じそく\n３００キロで　やまを　かけるという。"
        jp_kanji:
          sword: "羽毛が　擦れるとき　バチバチと\n電気のような　音が　することから\nサンダーと　呼ばれてきた。"
          shield: "ひと蹴りで　ダンプカーを　粉々に\nする　脚力を　もつ。　時速\n３００キロで　山を　駆けるという。"
        en:
          sword: "When its feathers rub together, they produce a\ncrackling sound like the zapping of electricity.\nThat’s why this Pokémon is called Zapdos."
          shield: "One kick from its powerful legs will pulverize a\ndump truck. Supposedly, this Pokémon runs\nthrough the mountains at over 180 mph."
        fr:
          sword: "Électhor est le nom qui a été choisi pour\nce Pokémon dont les plumes produisent\ndes crépitements électriques si on les frotte."
          shield: "Ses pattes sont assez robustes pour pulvériser\nun camion-benne d’un seul coup. On dit qu’il\ncourt dans les montagnes à plus de 300 km/h."
        it:
          sword: "Viene chiamato Zapdos per via del crepitio\nelettrico generato dallo sfregamento delle sue\npiume."
          shield: "Ha zampe così possenti da riuscire a ridurre\nin frantumi con un calcio un camion ribaltabile.\nSi dice che sfrecci fra le montagne a 300 km/h."
        de:
          sword: "Es ist als Zapdos bekannt und erzeugt beim\nAneinanderreiben seiner Federn ein Geräusch,\ndas wie das Knistern von Elektrizität klingt."
          shield: "Seine Beine sind so stark, dass es mit einem Tritt\neinen Kipplaster pulverisieren kann. Angeblich\nsoll es mit 300 km/h durch Gebirge rennen."
        es:
          sword: "El origen de su nombre parece provenir del\nsonido que produce el roce de su plumaje, que\nrecuerda al estallido de un chispazo eléctrico."
          shield: "La fuerza de sus patas es tal que podría reducir\na chatarra un camión con una sola patada. Corre\npor las montañas a más de 300 km/h."
        ko:
          sword: "깃털이 마찰할 때 파직파직하는\n전기가 튀는 듯한 소리가 나서\n썬더라고 불렸다."
          shield: "한 번의 발차기로 덤프트럭을\n산산조각 내는 다릿심을 가지고 있다.\n시속 300km로 산을 달린다고 한다."
        zh_simp:
          sword: "羽毛相互摩擦时会发出\n像电一样的噼噼啪啪声，\n因此得到了闪电鸟这个名字。"
          shield: "脚力强劲，仅凭一脚就能\n把翻斗车踢得粉碎。据说能以\n３００公里的时速在山中奔驰。"
        zh_trad:
          sword: "由於羽毛相擦時會發出\n像電流般的劈哩啪啦聲，\n因此一直被稱為閃電鳥。"
          shield: "擁有能夠一腳踢毀砂石車的\n強勁腳力。據說能以時速\n３００公里在山中奔跑。"
