      descriptions:
        jp_kana:
          sword: "かしこく　こころやさしい　ポケモン。\nきれいな　うたごえを　ひびかせながら\nうみのうえを　およいで　いく。"
          shield: "さむさに　つよく　こおりの　うみも\nへいき。　ひふは　スベスベで\nすこしだけ　ひんやり　しているよ。"
        jp_kanji:
          sword: "賢く　心優しい　ポケモン。\nきれいな　歌声を　響かせながら\n海の上を　泳いで　いく。"
          shield: "寒さに　強く　氷の　海も\n平気。　皮膚は　スベスベで\n少しだけ　ひんやり　しているよ。"
        en:
          sword: "A smart and kindhearted Pokémon,\nit glides across the surface of the sea while\nits beautiful song echoes around it."
          shield: "Crossing icy seas is no issue for this\ncold-resistant Pokémon. Its smooth skin\nis a little cool to the touch."
        fr:
          sword: "C’est un Pokémon doux et intelligent.\nIl vogue sur la mer en émettant un chant\nmagnifique."
          shield: "Il résiste bien aux très basses températures\net peut nager dans des mers glaciales.\nSa peau est lisse et légèrement froide au toucher."
        it:
          sword: "È un Pokémon intelligente e dall’animo gentile.\nSolca i mari facendo riecheggiare il suo canto\ndolce e melodioso."
          shield: "Resiste molto bene al freddo e si trova\na suo agio anche nei mari ghiacciati.\nLa sua pelle è liscia e fresca."
        de:
          sword: "Ein intelligentes und herzensgutes Pokémon.\nWährend es auf dem Meer schwimmt, lässt es\nseinen herrlichen Gesang erklingen."
          shield: "Es kommt gut mit Kälte zurecht und kann auch\nin eisigen Meeren problemlos schwimmen.\nSeine Haut fühlt sich glatt und kühl an."
        es:
          sword: "Este Pokémon posee una notable inteligencia y\nun corazón de oro. Entona un canto melodioso\nmientras surca el mar."
          shield: "Nada sin problema en aguas heladas gracias a la\nsoberbia resistencia al frío que posee. Su tersa\npiel es ligeramente fría al tacto."
        ko:
          sword: "영리하고 마음 착한 포켓몬.\n아름다운 소리로 노래 부르며\n바다 위를 헤엄친다."
          shield: "추위에 강해서 얼음 바다에서도\n끄떡없다. 피부는 매끈매끈하고\n조금 차갑다."
        zh_simp:
          sword: "头脑聪慧，心地善良的宝可梦。\n会一边以优美的声音歌唱，\n一边畅游于大海之上。"
          shield: "十分耐寒，不畏冰海。\n皮肤滑滑的，\n摸上去会有点凉。"
        zh_trad:
          sword: "頭腦聰慧，心地善良的寶可夢。\n會一邊以優美的聲音歌唱，\n一邊暢游在大海之上。"
          shield: "十分耐寒，不畏冰海。\n皮膚滑滑的，\n摸起來會有點涼。"
  gmax_forms:
    lapras_gigantamax:
      form_id: 999
      names:
        jp_kana: キョダイマックス
        jp_kanji: キョダイマックス
        en: Gigantamax
        fr: Gigamax
        it: Gigamax
        de: Gigadynamax
        es: Gigamax
        ko: 거다이맥스
        zh_simp: 超极巨化
        zh_trad: 超極巨化
      descriptions:
        jp_kana:
          sword: "せなかの　こうらには　５０００にん\nいじょうの　にんげんを　のせられる。\nゆれも　なく　のりごこち　バツグン。"
          shield: "こおりのつぶが　あつまって　できた\nおおきな　リングで　ひょうざんを\nくだきながら　ゆうぜんと　およぐ。"
        jp_kanji:
          sword: "背中の　甲羅には　５０００人\n以上の　人間を　乗せられる。\n揺れも　なく　乗り心地　抜群。"
          shield: "氷の粒が　集まって　できた\n大きな　リングで　氷山を\n砕きながら　悠然と　泳ぐ。"
        en:
          sword: "Over 5,000 people can ride on its shell at once.\nAnd it’s a very comfortable ride, without the\nslightest shaking or swaying."
          shield: "It surrounds itself with a huge ring of gathered ice\nparticles. It uses the ring to smash any icebergs\nthat might impede its graceful swimming."
        fr:
          sword: "Plus de 5 000 êtres humains peuvent tenir\nsur la carapace de son dos. Ils ne ressentent pas\nle tangage et peuvent profiter de la croisière."
          shield: "S’il croise un iceberg, il crée un grand anneau\navec des cristaux de glace pour le détruire\net continuer sa croisière paisiblement."
        it:
          sword: "Sulla corazza comodissima e stabile che ha sul\ndorso può trasportare più di 5.000 persone."
          shield: "Nuota placidamente spaccando gli iceberg con\nun enorme anello formato da pezzi di ghiaccio\nuniti insieme."
        de:
          sword: "In seinem Rückenpanzer kann es mehr als 5 000\nMenschen tragen. Dabei schaukelt es kein Stück\nund bietet Reisenden den höchsten Komfort."
          shield: "Mit seinem großen Ring, der sich aus Eiskörnern\ngebildet hat, zertrümmert es beim Schwimmen\nseelenruhig Eisberge."
        es:
          sword: "Puede transportar a más de 5000 personas sobre\nsu caparazón y no se balancea con el oleaje, por\nlo que resulta un agradable crucero."
          shield: "Surca los mares tranquilamente y destroza los\nicebergs que encuentra a su paso formando a su\nalrededor un gran anillo de cristales de hielo."
        ko:
          sword: "등껍질에는 5000명 이상의\n사람을 태울 수 있다.\n흔들림도 없고 편안하다."
          shield: "얼음 알맹이가 모여 만들어진\n큰 링으로 빙산을 부수면서\n여유롭게 헤엄친다."
        zh_simp:
          sword: "可以让超过５０００个人\n乘在自己背部的甲壳上。\n完全不会摇晃，坐起来非常舒适。"
          shield: "冰粒集中在身体周围，形成\n巨大的圆环。会一边用圆环\n击碎冰山，一边悠然地游泳。"
        zh_trad:
          sword: "可以讓超過５０００個人\n乘坐在自己背部的甲殼上。\n完全不會搖晃，坐起來非常舒適。"
          shield: "冰粒集中在身體周圍，形成\n巨大的圓環。會一邊用圓環\n擊碎冰山，一邊悠然地游泳。"
