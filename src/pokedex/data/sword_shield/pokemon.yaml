        jp_kana:
          sword: "トレーナーが　よろこぶと　キルリアに\nエネルギーが　みちあふれ\nたのしそうに　くるくると　おどる。"
          shield: "サイコパワーを　あやつり　まわりの\nくうかんを　ねじまげる　ことで\nみらいを　みとおす　ことが　できる。"
        jp_kanji:
          sword: "トレーナーが　喜ぶと　キルリアに\nエネルギーが　満ちあふれ\n楽しそうに　くるくると　踊る。"
          shield: "サイコパワーを　操り　まわりの\n空間を　ねじ曲げる　ことで\n未来を　見通す　ことが　できる。"
        en:
          sword: "If its Trainer becomes happy, it overflows with\nenergy, dancing joyously while spinning about."
          shield: "It has a psychic power that enables it to distort\nthe space around it and see into the future."
        fr:
          sword: "Quand il ressent la joie de son Dresseur,\nil déborde d’énergie et se met à danser\nen tournant sur lui-même."
          shield: "Il peut distordre l’espace-temps grâce\nà ses pouvoirs psychiques et ainsi voir l’avenir."
        it:
          sword: "Quando il suo Allenatore si sente felice, trabocca\ndi energia e inizia a ballare girando su se stesso."
          shield: "Sfruttando i suoi poteri psichici può distorcere\nlo spazio circostante per prevedere l’avvenire."
        de:
          sword: "Wenn sich sein Trainer freut, tanzt es in einem\nSchwall von Energie fröhlich kreisend umher."
          shield: "Seine Psycho-Kräfte erlauben es ihm, den Raum\num sich selbst zu verformen und so in die Zukunft\nzu sehen."
        es:
          sword: "Si su Entrenador está contento, desborda energía\ny baila alegremente dando giros."
          shield: "Con sus poderes psíquicos puede deformar\nel espacio a su alrededor y predecir el futuro."
        ko:
          sword: "트레이너가 기뻐하면\n킬리아에게 에너지가 넘쳐나서\n기쁜 듯이 빙글빙글 춤춘다."
          shield: "사이코 파워를 조작해\n주변의 공간을 일그러뜨려\n미래를 내다볼 수 있다."
        zh_simp:
          sword: "当训练家高兴的时候，\n奇鲁莉安会充满能量，\n开心地转着圈跳舞。"
          shield: "可以通过操纵精神力量\n扭曲周围的空间来看清未来。"
        zh_trad:
          sword: "當訓練家高興的時候，\n奇魯莉安會充滿能量，\n開心地轉著圈跳舞。"
          shield: "能夠操縱精神力量\n來扭曲周圍的空間，\n讓自己看見未來。"
