      descriptions:
        jp_kana:
          sword: "でんせつの　えいゆうと　よばれる\nポケモン。　きんぞくを　とりこみ\nぶぐに　へんかさせ　たたかう。"
          shield: "ながい　ねむりに　ついていた\nザマゼンタの　あね　とも\nライバルとも　いわれる　ポケモン。"
        jp_kanji:
          sword: "伝説の　英雄と　呼ばれる\nポケモン。　金属を　取り込み\n武具に　変化させ　戦う。"
          shield: "長い　眠りに　ついていた\nザマゼンタの　姉　とも\nライバルとも　いわれる　ポケモン。"
        en:
          sword: "Known as a legendary hero, this Pokémon\nabsorbs metal particles, transforming them\ninto a weapon it uses to battle."
          shield: "This Pokémon has slumbered for many years.\nSome say it’s Zamazenta’s elder sister—others\nsay the two Pokémon are rivals."
        fr:
          sword: "Également surnommé « héros légendaire »,\nce Pokémon absorbe du métal et se change\nen arme pour se battre."
          shield: "On dit qu’il s’agit de la figure fraternelle\net du rival de Zamazenta, un Pokémon plongé\ndans un long sommeil."
        it:
          sword: "È conosciuto come “l’eroe della leggenda”.\nAssorbe il metallo e lo trasforma per armarsi\ndurante la lotta."
          shield: "Viene considerato una figura fraterna e allo\nstesso tempo un rivale per Zamazenta,\nun Pokémon rimasto a lungo addormentato."
        de:
          sword: "Dieses Pokémon gilt als legendärer Held.\nEs nimmt Metall auf, wandelt dies in eine Waffe\num und kämpft damit."
          shield: "Man sagt, es sei wie ein älteres Geschwisterteil,\naber auch wie ein Rivale zu Zamazenta, welches\nin einen langen Schlaf gefallen war."
        es:
          sword: "Este Pokémon está considerado como un héroe\nde leyenda. Absorbe el metal para transformarlo\ny emplearlo como armamento."
          shield: "Hay quien lo considera una suerte de figura\nfraterna a la par que rival de Zamazenta,\nun Pokémon sumido en un profundo letargo."
        ko:
          sword: "전설의 영웅이라고 불리는\n포켓몬. 금속을 흡수한 뒤\n무기로 변화시켜서 싸운다."
          shield: "오랜 세월 잠들어 있던\n자마젠타의 형제자매 또는\n라이벌로 불리는 포켓몬이다."
        zh_simp:
          sword: "被称为传说中的英雄。\n能够吸收金属，将之\n转化为武器来战斗。"
          shield: "这只宝可梦被认为是沉睡已久的\n藏玛然特的姐姐，也有人\n认为它们之间是劲敌关系。"
        zh_trad:
          sword: "被稱為傳說中的英雄。\n能夠吸收金屬，將之\n轉化為武器來戰鬥。"
          shield: "這隻寶可夢被認為是沉睡已久的\n藏瑪然特的姐姐，也有人\n認為牠們之間是勁敵關係。"
    zacian_crowned_sword:
      form_id: 1
      names:
        jp_kana: けんのおう
        jp_kanji: けんのおう
        en: Crowned Sword
        fr: Épée Suprême
        it: Re delle Spade
        de: König des Schwertes
        es: Espada Suprema
        ko: 검왕
        zh_simp: 剑之王
        zh_trad: 劍之王
      base_stats:
        hp: 92
        attack: 170
        defense: 115
        special_attack: 80
        special_defense: 115
        speed: 148
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 3
      types:
        - fairy
        - steel
      egg_groups:
        - undiscovered
      abilities:
        - intrepid_sword
      descriptions:
        jp_kana:
          sword: "かつての　えもので　ぶそうした。\nキョダイマックスポケモンも\nいっとうの　もとに　きりすてる。"
          shield: "あらゆるものを　きりすてるさまから\nようせいおうのつるぎ　と　よばれ\nてきみかたに　おそれあがめられた。"
        jp_kanji:
          sword: "かつての　得物で　武装した。\nキョダイマックスポケモンも\n一刀の　もとに　切り捨てる。"
          shield: "あらゆるものを　切り捨てるさまから\n妖精王の剣　と　呼ばれ\n敵味方に　恐れ崇められた。"
        en:
          sword: "Now armed with a weapon it used in ancient\ntimes, this Pokémon needs only a single strike\nto fell even Gigantamax Pokémon."
          shield: "Able to cut down anything with a single strike,\nit became known as the Fairy King’s Sword,\nand it inspired awe in friend and foe alike."
        fr:
          sword: "Il est équipé d’une arme antique avec laquelle\nil tranche d’un seul coup les Pokémon,\nmême ceux qui disposent du pouvoir du Gigamax."
          shield: "Craint et respecté de ses ennemis comme de ses\nalliés, il a reçu le nom de « lame du roi des fées »,\ncar rien ne peut résister à son tranchant."
        it:
          sword: "Armato della sua antica spada, è in grado di\nsconfiggere con un sol colpo anche i Pokémon\nGigamax."
          shield: "Temuto e rispettato da nemici e alleati, è\ndetto “spada del re folletto” per la sua\ncapacità di tranciare qualsiasi cosa."
        de:
          sword: "Es trägt nun eine Waffe, die es vor langer Zeit\neinmal führte. Selbst Gigadynamax-Pokémon\nbezwingt es damit auf einen Streich."
          shield: "Weil es alles und jeden vernichten konnte, trug es\neinst den Namen „Feenkönigsschwert“ und wurde\ngleichermaßen gefürchtet und verehrt."
        es:
          sword: "Esta forma había servido como arma en tiempos\nremotos. Es capaz de abatir de una sola estocada\nincluso a un Pokémon Gigamax."
          shield: "En esta forma, capaz de cortar cualquier cosa,\nes temido y respetado y se lo conoce como la\nRegia Espada Silvana."
        ko:
          sword: "과거의 무기로 무장했다.\n거다이맥스 포켓몬도\n단칼에 베어 버린다."
          shield: "온갖 것을 베어버리는 모습에서\n요정왕의 검이라고 불리며\n적과 같은 편에게 경외의 대상이 되었다."
        zh_simp:
          sword: "用过去使用的兵器武装自己。\n即使是超极巨化宝可梦，\n也能以一剑将之拿下。"
          shield: "能斩断世间万物，\n因此被称为妖精王之剑，\n让敌友都对其敬畏不已。"
        zh_trad:
          sword: "用過去使用的兵器武裝自己。\n即使是超極巨化寶可夢，\n也能以一劍將之拿下。"
          shield: "能斬斷世間萬物，\n因此被稱為妖精王之劍，\n讓敵友都對牠敬畏不已。"
