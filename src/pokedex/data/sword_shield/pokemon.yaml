      hidden_ability: technician
      descriptions:
        jp_kana:
          sword: "１５０００ボルトもの　でんきを\nはっせいさせることが　できる。\nどんな　あいても　なめている。"
          shield: "はつでんきかんが　むねに　ある。\nでんきが　つくられるとき\nベースのような　おとが　ひびく。"
        jp_kanji:
          sword: "１５０００ボルトもの　電気を\n発生させることが　できる。\nどんな　相手も　舐めている。"
          shield: "発電器官が　胸に　ある。\n電気が　つくられるとき\nベースのような　音が　響く。"
        en:
          sword: "Capable of generating 15,000 volts of\nelectricity, this Pokémon looks down on\nall that would challenge it."
          shield: "It has an electrical organ on its chest. While\ngenerating electricity, it fills its surroundings with\nwhat sounds like the strumming of a bass guitar."
        fr:
          sword: "Il peut libérer des décharges électriques\nde 15 000 volts. Il sous-estime souvent\nses adversaires, quels qu’ils soient."
          shield: "Son organe générant de l’électricité se trouve\nsur son torse. Quand il est actif, il émet un son\nsemblable à celui d’une basse."
        it:
          sword: "È in grado di produrre scariche elettriche fino\na 15.000 volt. Tende a sottovalutare qualunque\nnemico si trovi davanti."
          shield: "Quando produce elettricità dagli organi che ha\nnel petto, si sente un suono simile a quello\ndi un basso elettrico."
        de:
          sword: "Dieses Pokémon kann 15 000 V starke\nElektrizität generieren. Es nimmt keinen Gegner\nwirklich ernst."
          shield: "Wenn es mit speziellen Organen in seiner Brust\nElektrizität erzeugt, erklingen dabei Geräusche,\ndie an eine Bassgitarre erinnern."
        es:
          sword: "Puede liberar descargas eléctricas de hasta\n15 000 V. Se enfrenta a cualquier rival con\nla misma actitud chulesca."
          shield: "Posee un órgano en el pecho que genera\nelectricidad. Al hacerlo, emite un sonido que\nrecuerda al de un bajo eléctrico."
        ko:
          sword: "15000볼트나 되는 전기를\n발생시킬 수 있다.\n상대가 누구라도 깔본다."
          shield: "발전 기관이 가슴에 있다.\n전기가 만들어질 때\n베이스 기타 같은 소리가 울린다."
        zh_simp:
          sword: "它能够制造出\n１５０００伏特的电流，\n任何对手都不放在眼里。"
          shield: "发电器官长在胸部。\n当它制造出电力的时候，\n会发出贝斯般的声音。"
        zh_trad:
          sword: "牠能夠製造出\n１５０００伏特的電流，\n任何對手都不放在眼裡。"
          shield: "發電器官長在胸部。\n當牠製造出電力的時候，\n會發出貝斯般的聲音。"
  gmax_forms:
    toxtricity_gigantamax:
      form_id: 999
      names:
        jp_kana: キョダイマックス
        jp_kanji: キョダイマックス
        en: Gigantamax
        fr: Gigamax
        it: Gigamax
        de: Gigadynamax
        es: Gigamax
        ko: 거다이맥스
        zh_simp: 超极巨化
        zh_trad: 超極巨化
      descriptions:
        jp_kana:
          sword: "ありあまる　でんりょくが　ぶき。\nたくわえられた　でんきの　りょうは\nかみなりぐもを　しのぐほど。"
          shield: "どくが　のうまで　めぐり　ぼうそう。\nあばれるたび　どくの　あせが\nほとばしり　だいちを　けがす。"
        jp_kanji:
          sword: "有り余る　電力が　武器。\n蓄えられた　電気の　量は\n雷雲を　凌ぐほど。"
          shield: "毒が　脳まで　廻り　暴走。\n暴れるたびに　毒の　汗が\nほとばしり　大地を　汚す。"
        en:
          sword: "Its excessive electric energy is its weapon.\nThis Pokémon can build up more electricity\nthan any thundercloud."
          shield: "Out of control after its own poison penetrated its\nbrain, it tears across the land in a rampage,\ncontaminating the earth with toxic sweat."
        fr:
          sword: "Sa surcharge électrique est son arme.\nLa quantité d’énergie qu’il peut emmagasiner\ndépasse même celle d’un nuage de foudre."
          shield: "Son poison lui monte au cerveau et il perd tout\ncontrôle. À chaque excès de violence, il répand\ndes gouttes de sueur toxiques qui polluent le sol."
        it:
          sword: "Usa la sua sovrabbondante elettricità come arma.\nLe sue riserve di energia elettrica sono superiori\npersino a quelle di una nube temporalesca."
          shield: "Il suo veleno gli è arrivato al cervello, facendogli\nperdere del tutto il controllo. Quando si scatena\ngronda un sudore tossico che inquina il terreno."
        de:
          sword: "Es setzt seine schier unbegrenzte Elektroenergie\nals Waffe ein. In diesem Pokémon ist sogar mehr\nStrom gespeichert als in einer Gewitterwolke."
          shield: "Als sein eigenes Gift sein Gehirn erreichte, geriet\nes außer Kontrolle. Bei jedem Wutausbruch spritzt\ngiftiger Schweiß auf den Boden und verseucht ihn."
        es:
          sword: "Usa la electricidad que le sobra como arma. Sus\nreservas energéticas superan incluso la carga\neléctrica de un nubarrón de tormenta."
          shield: "Su propio veneno le afecta al cerebro y le hace\nperder el control. Cuando esto ocurre, transpira\nun sudor tóxico que contamina el terreno."
        ko:
          sword: "남아도는 전력이 무기다.\n비축된 전기의 양은\n번개 구름을 능가할 정도다."
          shield: "독이 뇌까지 퍼져 폭주하게 되었다.\n날뛸 때마다 독으로 된 땀이\n사방으로 퍼져 대지를 오염시킨다."
        zh_simp:
          sword: "过剩的电力是它的武器。\n它所储备的电量甚至\n凌驾于雷雨云之上。"
          shield: "因毒素蔓延到了大脑而\n失去控制。发狂的时候\n会排泄出毒汗污染大地。"
        zh_trad:
          sword: "過剩的電力是牠的武器。\n牠所儲備的電量甚至\n凌駕於雷雨雲之上。"
          shield: "因毒素蔓延到了大腦而\n失去控制。發狂的時候\n會排出毒汗污染大地。"
sizzlipede:
