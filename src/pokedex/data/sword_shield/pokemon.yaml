        rare: hard_stone
      descriptions:
        jp_kana:
          sword: "このみの　こいしに　あなを　あけて\nすみかに　する。　ダンゴロや\nタンドンに　とっては　てんてき。"
          shield: "いえに　ちょうどいい　こいしが\nみつからないと　カバルドンの\nあなに　すんでしまうことも。"
        jp_kanji:
          sword: "好みの　小石に　穴を　開けて\nすみかに　する。　ダンゴロや\nタンドンに　とっては　天敵。"
          shield: "家に　ちょうどいい　小石が\n見つからないと　カバルドンの\n穴に　棲んでしまうことも。"
        en:
          sword: "When it finds a stone appealing, it creates a hole\ninside it and uses it as its home. This Pokémon is\nthe natural enemy of Roggenrola and Rolycoly."
          shield: "It first tries to find a rock to live in, but if there\nare no suitable rocks to be found, Dwebble may\nmove in to the ports of a Hippowdon."
        fr:
          sword: "Quand il trouve un caillou qui lui plaît, il y creuse\nun trou et s’en sert comme d’une maison.\nC’est l’ennemi juré des Nodulithe et des Charbi."
          shield: "S’il ne trouve pas de bon caillou à creuser\npour s’y loger, il élit domicile dans un des trous\ndu corps d’Hippodocus."
        it:
          sword: "Scava un buco in una piccola pietra di suo\ngradimento per farne la sua dimora. È il nemico\nnaturale di Roggenrola e di Rolycoly."
          shield: "A volte, quando non riesce a trovare una pietra\nadatta, usa come sua dimora i pori\ndi Hippowdon."
        de:
          sword: "Lithomith sucht sich einen Stein, der ihm gefällt,\nund höhlt ihn aus, um darin zu wohnen. Es ist ein\nnatürlicher Feind von Kiesling und Klonkett."
          shield: "Wenn es keinen Stein findet, der sich als Haus\neignet, lässt es sich manchmal in den Öffnungen\nim Körper eines Hippoterus’ nieder."
        es:
          sword: "Cuando halla una piedra de su agrado, la horada\ny establece su morada. Es enemigo natural de los\nRoggenrola y los Rolycoly."
          shield: "Si no encuentra una piedra que sea idónea como\nmorada, se instala en los orificios de algún\nHippowdon."
        ko:
          sword: "마음에 드는 돌멩이에 구멍을 파서\n보금자리로 삼는다. 단굴이나\n탄동에게는 천적이다."
          shield: "집으로 삼기 딱 좋은 돌멩이를\n발견하지 못하면 하마돈의\n구멍에 살기도 한다."
        zh_simp:
          sword: "会在自己喜欢的石头上开洞\n当成住所。对石丸子还有\n小炭仔来说是天敌。"
          shield: "如果找不到大小合适\n的石头来当成自己的家，\n它也会住到河马兽的洞里。"
        zh_trad:
          sword: "會在自己喜歡的石頭上開洞\n當成住所。對石丸子還有\n小炭仔來說是天敵。"
          shield: "如果找不到大小合適\n的石頭來當成自己的家，\n牠也會住到河馬獸的洞裡。"
