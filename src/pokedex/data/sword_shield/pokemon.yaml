        jp_kana:
          sword: "タマゴは　えいようまんてんで\nあじも　ばつぐん。　こうきゅうな\nしょくざいとして　あつかわれる。"
          shield: "もともとは　うごきが　にぶかった。\nタマゴを　ねらうものから　まもるため\nにげあしが　はやくなった。"
        jp_kanji:
          sword: "タマゴは　栄養満点で　味も　抜群。\n高級な　食材として　扱われる。"
          shield: "もともとは　動きが　鈍かった。\nタマゴを　狙うものから　守るため\n逃げ足が　速くなった。"
        en:
          sword: "The egg Chansey carries is not only delicious\nbut also packed with nutrition. It’s used as a\nhigh-class cooking ingredient."
          shield: "This species was once very slow. To protect their\neggs from other creatures, these Pokémon\nbecame able to flee quickly."
        fr:
          sword: "Ses œufs sont si délicieux et nutritifs qu’on\nles considère comme des ingrédients de luxe."
          shield: "Ce Pokémon lent à l’origine a appris à fuir\nplus vite pour protéger ses œufs des voleurs."
        it:
          sword: "Il suo uovo è molto nutriente ed estremamente\nsaporito, tanto che viene considerato un\ningrediente di lusso."
          shield: "Sarebbe lento per natura, ma è diventato svelto\nnella fuga per difendersi da chi vuole rubare\nil suo uovo."
        de:
          sword: "Seine Eier sind äußerst nahrhaft und schmecken\nköstlich, weshalb sie als erlesene Kochzutat\ngelten."
          shield: "Dieses ursprünglich eher träge Pokémon hat\ngelernt, schnell davonzulaufen, um seine Eier vor\nRäubern schützen zu können."
        es:
          sword: "Los huevos que pone Chansey tienen un valor\nnutritivo altísimo y un sabor exquisito.\nSe consideran un manjar."
          shield: "Este Pokémon solía ser lento de reflejos, pero\nha desarrollado una gran velocidad para evitar\nque le roben sus preciados huevos."
        ko:
          sword: "알은 영양 만점에\n맛도 뛰어나다.\n고급 식재료로 취급된다."
          shield: "원래 움직임이 둔했지만\n알을 노리는 자들로부터\n지켜내기 위해 도주 속도가 빨라졌다."
        zh_simp:
          sword: "蛋不仅营养满分，\n还十分美味。\n被当做高级食材使用。"
          shield: "原本动作迟缓。\n为了保护蛋不被抢走，\n逃跑的速度才变快了。"
        zh_trad:
          sword: "牠的蛋不僅營養豐富，\n而且非常美味。因此\n被視為是高級的食材。"
          shield: "原本動作遲緩。但為了從\n盯上蛋的傢伙們手裡保護蛋，\n逃跑的速度就變快了。"
