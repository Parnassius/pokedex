      descriptions:
        jp_kana:
          sword: "しつどが　ひくい　とちで　くらす\nサンドパンほど　せなかの　トゲの\nてざわりは　かたく　なめらかになる。"
          shield: "するどい　ツメを　ひっかけて　きを\nのぼる。　したで　まつ　サンドたちに\nきのみを　おとし　わけあたえるのだ。"
        jp_kanji:
          sword: "湿度が　低い　土地で　暮らす\nサンドパンほど　背中の　棘の\n手触りは　硬く　滑らかになる。"
          shield: "鋭い　ツメを　ひっかけて　木を\n登る。　下で　待つ　サンドたちに\n木の実を　落とし　分け与えるのだ。"
        en:
          sword: "The drier the area Sandslash lives in, the harder\nand smoother the Pokémon’s spikes will feel\nwhen touched."
          shield: "It climbs trees by hooking on with its sharp claws.\nSandslash shares the berries it gathers, dropping\nthem down to Sandshrew waiting below the tree."
        fr:
          sword: "Plus son habitat est sec, plus ses épines\ndorsales deviennent dures et lisses."
          shield: "Il grimpe aux arbres grâce à ses griffes acérées\net fait tomber des Baies pour les Sabelette\nqui attendent au sol."
        it:
          sword: "Più secco è il territorio dove Sandslash vive,\npiù i suoi aculei dorsali diventano lisci e duri."
          shield: "Si arrampica sugli alberi utilizzando i suoi artigli\naffilati per poi condividere le bacche che trova\ncon i Sandshrew, che aspettano sotto."
        de:
          sword: "Je trockener das Gebiet ist, in dem Sandamer\nlebt, desto härter und glatter fühlen sich die\nStacheln an seinem Rücken an."
          shield: "Mit seinen scharfen Krallen klettert es auf Bäume\nund wirft unten wartenden Sandan Beeren zu,\ndie sie sich dann teilen."
        es:
          sword: "Cuanto más seco es el terreno en el que habita,\nmás duras y lisas se vuelven las púas que le\nrecubren la espalda."
          shield: "Trepa a los árboles con sus afiladas garras y deja\ncaer bayas para los Sandshrew que esperan\ndebajo."
        ko:
          sword: "습도가 낮은 땅에서 사는\n고지일수록 등에 난 가시의\n감촉은 단단하고 매끄럽다."
          shield: "날카로운 발톱으로 찍으며 나무에 오른다.\n아래에서 기다리는 모래두지들에게\n나무열매를 떨어뜨려 나눠준다."
        zh_simp:
          sword: "越是在湿度低的地方生活的\n穿山王，背上的尖刺摸起来\n就越是坚硬光滑。"
          shield: "会将锐利的爪子钩在树上爬树。\n这是为了设法使树果掉落，\n分给等在树下的穿山鼠们。"
        zh_trad:
          sword: "越是在濕度低的地方\n生活的穿山王，背上尖刺的\n觸感就會越堅硬光滑。"
          shield: "會用銳利的爪子當作鉤子來爬樹。\n這是為了將樹果擊落，\n分給在樹下等待的穿山鼠們。"
    sandslash_alolan_form:
      form_id: 1
      names:
        jp_kana: アローラのすがた
        jp_kanji: アローラのすがた
        en: Alolan Form
        fr: Forme d’Alola
        it: Forma di Alola
        de: Alola-Form
        es: Forma de Alola
        ko: 알로라의 모습
        zh_simp: 阿罗拉的样子
        zh_trad: 阿羅拉的樣子
      base_stats:
        hp: 75
