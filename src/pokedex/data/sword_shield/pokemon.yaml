        jp_kana:
          sword: "ひまさえあれば　なめて　けづくろい。\nおなかに　たまった　ぬけげに　ひを\nつけて　ほのおわざを　はなつ。"
          shield: "ニャビーに　しんらいされる　まえに\nなでようとすると　するどい　ツメで\nひどく　ひっかかれるので　ちゅうい。"
        jp_kanji:
          sword: "暇さえあれば　舐めて　毛づくろい。\nお腹に　たまった　抜け毛に　火を\nつけて　炎技を　放つ。"
          shield: "ニャビーに　信頼される　前に\n撫でようとすると　鋭い　ツメで\nひどく　ひっかかれるので　注意。"
        en:
          sword: "It spends even the smallest amount of downtime\ngrooming its fur with its tongue. Loose fur gathers\nin its stomach and serves as fuel for fiery moves."
          shield: "Trying to pet Litten before it trusts you will\nresult in a nasty scratch from its sharp claws.\nBe careful."
        fr:
          sword: "Dès qu’il a un instant, il fait sa toilette.\nIl déclenche ses attaques Feu en enflammant\nles poils qu’il a avalés en se léchant."
          shield: "Quiconque essaie de le caresser avant d’avoir\ngagné sa confiance s’expose à de sérieuses\ngriffures."
        it:
          sword: "Si liscia il pelo con la lingua ogni volta che può.\nIncendia le palle di pelo accumulate nella pancia\nper lanciare mosse di tipo Fuoco."
          shield: "Chi cerca di fargli le coccole prima di essersi\nguadagnato la sua fiducia si ritroverà addosso\ni suoi artigli affilati."
        de:
          sword: "Jede freie Minute verbringt es mit der Fellpflege.\nDie Haare, die sich dadurch im Bauch anhäufen,\nentzündet es, um Feuer-Attacken einzusetzen."
          shield: "Personen, denen es nicht vertraut, sollten sich\ndavor hüten, es zu streicheln. Mit seinen scharfen\nKrallen verteilt es nämlich üble Kratzwunden."
        es:
          sword: "Se acicala lamiéndose constantemente. Prende\nlas bolas de pelo acumuladas en el estómago y\nlas usa para ejecutar movimientos de tipo Fuego."
          shield: "Quien trate de acariciarlo antes de ganarse su\nplena confianza se arriesga a comprobar de\nprimera mano lo afiladas que están sus garras."
        ko:
          sword: "틈만 나면 털을 핥아서 정리한다.\n뱃속에 쌓인 빠진 털에 불을\n붙여서 불꽃 기술을 사용한다."
          shield: "냐오불에게 신뢰받기 전에\n쓰다듬으려고 하면 날카로운 발톱으로\n심하게 할퀴니 주의가 필요하다."
        zh_simp:
          sword: "一有时间就会去舔身体\n整理毛发。会燃烧积在腹中\n的落毛来使出火属性招式。"
          shield: "如果在得到火斑喵的\n信任前就想抚摸它的话，\n要小心它用尖锐的爪子抓你。"
        zh_trad:
          sword: "一有時間就會去舔身體\n整理毛髮。會燃燒積在腹中\n的落毛來使出火屬性招式。"
          shield: "如果在得到火斑喵的\n信任前就想撫摸牠的話，\n要小心牠用尖銳的爪子抓你。"
