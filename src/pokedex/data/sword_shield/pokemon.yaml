          sword: "Ce Pokémon sécrète son doux parfum grâce\nà un organe en forme de poche. S’il modifie\nson alimentation, l’odeur de son parfum change."
          shield: "Une douce odeur qui charme les gens émane\nde son corps. Les dames nobles raffolaient de lui."
        it:
          sword: "Questo Pokémon possiede un organo interno che\nproduce profumo. Il tipo di profumo cambia a\nseconda del cibo di cui si nutre."
          shield: "Il suo corpo emana un profumo irresistibile che\nammalia gli esseri umani. Era particolarmente\namato dalle nobildonne."
        de:
          sword: "Dieses Pokémon erzeugt Gerüche mithilfe einer\nDrüse in seinem Körper. Je nach Futter kann es\nunterschiedliche Düfte produzieren."
          shield: "Von seinem Körper geht ein süßer Duft aus, der\neinfach jeden bezaubert. Bei den vornehmen\nDamen des Adels war es besonders beliebt."
        es:
          sword: "Posee un órgano interno con el cual produce una\nfragancia que varía en función de los alimentos\nque ingiere."
          shield: "Su cuerpo emana una fragancia que embelesa a\nquien la huele. Llegó a ser muy apreciado entre\nlas damas de la nobleza."
        ko:
          sword: "체내에 있는 향기주머니로 향기를\n만들어 내는 포켓몬. 먹이가 바뀌면\n만들어 내는 향기도 바뀐다."
          shield: "사람을 매료하는 황홀한\n냄새를 몸에서 풍긴다.\n귀부인들에게 사랑받았다."
        zh_simp:
          sword: "用体内的香囊制造香气的宝可梦。\n如果更换喂给它的食物，\n制造出的香气也会随之改变。"
          shield: "身上飘出的香气\n能让人们神魂颠倒。\n贵妇们对它钟爱万分。"
        zh_trad:
          sword: "用體內的香囊製造香氣的寶可夢。\n如果更換餵給牠的食物，\n製造出的香氣也會隨之改變。"
          shield: "身上飄出的香氣\n能讓人們神魂顛倒。\n貴婦們對牠鍾愛萬分。"
