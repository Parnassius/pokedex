      egg_groups:
        - field
      abilities:
        - forewarn
        - synchronize
      hidden_ability: telepathy
      descriptions:
        jp_kana:
          sword: "しんや　まくらもとに　あらわれる。\nゆめを　たべているとき　からだの\nもようが　ぼんやりと　ひかる。"
          shield: "ゆめを　たべて　けむりを　はく。\nたのしい　ゆめなら　ピンクいろで\nあくむの　ときは　くろっぽいぞ。"
        jp_kanji:
          sword: "深夜　枕元に　現れる。\n夢を　食べているとき　体の\n模様が　ぼんやりと　光る。"
          shield: "夢を　食べて　煙を　吐く。\n楽しい　夢なら　ピンク色で\n悪夢の　ときは　黒っぽいぞ。"
        en:
          sword: "Late at night, it appears beside people’s pillows.\nAs it feeds on dreams, the patterns on its body\ngive off a faint glow."
          shield: "It eats dreams and releases mist. The mist is pink\nwhen it’s eating a good dream, and black when\nit’s eating a nightmare."
        fr:
          sword: "Il apparaît en pleine nuit, à côté de l’oreiller.\nQuand il se nourrit de rêves, les motifs\nde son corps luisent légèrement."
          shield: "Il se nourrit de songes et expire de la fumée\nqui prend la couleur rose si le rêve est joyeux,\nou noire s’il s’agit d’un cauchemar."
        it:
          sword: "Appare vicino al guanciale nel cuore della notte.\nQuando mangia i sogni, i motivi che ha sul\ncorpo si illuminano lievemente."
          shield: "Si nutre di sogni. Esala un fumo rosa se sono\nsogni piacevoli e nero se sono incubi."
        de:
          sword: "Tief in der Nacht erscheint es am Kopfende von\nBetten. Während es einen Traum frisst, schimmert\ndas Muster auf seinem Körper."
          shield: "Während es Träume frisst, stößt es Dunst aus.\nBei fröhlichen Träumen ist dieser rosafarben,\nbei Alpträumen schwärzlich."
        es:
          sword: "Aparece en plena noche junto a la almohada\nde la gente. Cuando devora los sueños, los\nmotivos de su cuerpo emiten una luz tenue."
          shield: "El humo que despide cambia de color en función\ndel sueño que haya consumido. Si es alegre, será\nrosa, o negruzco en el caso de una pesadilla."
        ko:
          sword: "깊은 밤중 머리맡에 나타난다.\n꿈을 먹는 동안 몸에 있는\n무늬가 어렴풋이 빛난다."
          shield: "꿈을 먹고 연기를 내뿜는다.\n즐거운 꿈이면 핑크색이고\n악몽이면 거무스름하다."
        zh_simp:
          sword: "会在深夜出现在枕头边。\n在吃梦的时候，\n身上的花纹会微微发亮。"
          shield: "在吃掉梦之后会吐出烟雾。\n吃了快乐的梦时，烟雾是粉红色的；\n如果是噩梦，烟雾则是黑灰色的。"
        zh_trad:
          sword: "會在深夜出現在枕頭邊。\n在吃夢的時候，\n身上的花紋會微微發亮。"
          shield: "在吃掉夢之後會吐出煙霧。\n吃了快樂的夢時，煙霧是粉紅色的；\n如果是惡夢，煙霧則是黑灰色的。"
musharna:
  species_id: 518
  names:
    jp_kana: ムシャーナ
    jp_kanji: ムシャーナ
    en: Musharna
    fr: Mushana
    it: Musharna
    de: Somnivora
    es: Musharna
    ko: 몽얌나
    zh_simp: 梦梦蚀
    zh_trad: 夢夢蝕
  forms:
    musharna:
      form_id: 0
      base_stats:
        hp: 116
        attack: 55
        defense: 85
        special_attack: 107
        special_defense: 95
        speed: 29
      evs_yield:
        hp: 2
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - psychic
      egg_groups:
        - field
      abilities:
        - forewarn
        - synchronize
      hidden_ability: telepathy
      descriptions:
        jp_kana:
          sword: "でてる　けむりが　くろっぽいときは\nちかづかないほうが　いいよ。\nあくむが　げんじつに　なるぞ。"
          shield: "いつも　まどろみ　ゆめを　みている。\nねおきは　とっても　ふきげんに\nなるので　そっとして　おこう。"
        jp_kanji:
          sword: "出てる　煙が　黒っぽいときは\n近づかないほうが　いいよ。\n悪夢が　現実に　なるぞ。"
          shield: "いつも　まどろみ　夢を　見ている。\n寝起きは　とっても　不機嫌に\nなるので　そっとして　おこう。"
        en:
          sword: "When dark mists emanate from its body, don’t\nget too near. If you do, your nightmares will\nbecome reality."
          shield: "It drowses and dreams all the time. It’s best to\nleave it be if it’s just woken up, as it’s a terrible\ngrump when freshly roused from sleep."
        fr:
          sword: "Il est recommandé de ne pas l’approcher quand\nla fumée qui sort de son front a une teinte noire,\nsinon son cauchemar risque de se matérialiser."
          shield: "Il est sans cesse assoupi, plongé dans ses rêves.\nIl vaut mieux éviter de le déranger, car il est\ntoujours mal luné au réveil."
        it:
          sword: "Meglio non avvicinarsi quando emette\nun fumo di colore scuro, perché gli incubi\ndiventano realtà."
          shield: "Sonnecchia costantemente, sognando.\nQuando si sveglia è di pessimo umore,\nquindi è meglio tenersi a debita distanza."
        de:
          sword: "Wenn es schwärzlichen Dunst ausströmt, sollte\nman sich ihm nicht nähern, denn sonst werden\nAlpträume wahr."
          shield: "Es schlummert und träumt immerzu. Wenn es\ngeweckt wird, bekommt es schlechte Laune.\nDeshalb sollte man es lieber in Ruhe lassen."
        es:
          sword: "Cuando el humo que desprende es de un color\nnegruzco, conviene no acercarse, ya que puede\nhacer realidad las pesadillas."
          shield: "Siempre está soñando o adormecido. Se pone de\nmuy mal humor al despertar, por lo que es mejor\nno perturbarlo."
        ko:
          sword: "뿜어내는 연기가 거무스름할 때는\n가까이 가지 않는 것이 좋다.\n악몽이 현실이 되기 때문이다."
          shield: "언제나 선잠을 자며 꿈을 꾼다.\n잠에서 깨면 매우 불쾌해하므로\n가만히 내버려 두자."
        zh_simp:
          sword: "在它冒出黑黑的烟雾时，\n还是不要接近它为妙，\n否则噩梦将会成真。"
          shield: "总是在打瞌睡做梦。\n刚睡醒的时候会闹脾气，\n所以最好别去招惹它。"
        zh_trad:
          sword: "在牠冒出黑黑的煙霧時，\n還是不要接近牠為妙，\n否則惡夢將會成真。"
          shield: "總是在打瞌睡作夢。\n剛睡醒的時候會鬧脾氣，\n所以最好別去招惹牠。"
pidove:
  species_id: 519
  names:
    jp_kana: マメパト
    jp_kanji: マメパト
    en: Pidove
    fr: Poichigeon
    it: Pidove
    de: Dusselgurr
    es: Pidove
    ko: 콩둘기
    zh_simp: 豆豆鸽
    zh_trad: 豆豆鴿
  forms:
    pidove:
      form_id: 0
      base_stats:
        hp: 50
        attack: 55
        defense: 50
        special_attack: 36
        special_defense: 30
        speed: 43
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - normal
        - flying
      egg_groups:
        - flying
      abilities:
        - big_pecks
        - super_luck
      hidden_ability: rivalry
      descriptions:
        jp_kana:
          sword: "ひとのすむ　ばしょに　あらわれる。\nエサを　まくと　なんびゃくひきでも\nあつまってくるので　ちゅういだぞ。"
          shield: "わすれっぽく　かしこくはないが\nひとなつっこくて　まじめなので\nかわいがる　トレーナーは　おおい。"
        jp_kanji:
          sword: "人の住む　場所に　現れる。\nエサを　まくと　何百匹でも\n集まってくるので　注意だぞ。"
          shield: "忘れっぽく　賢くはないが\n人懐っこくて　真面目なので\nかわいがる　トレーナーは　多い。"
        en:
          sword: "Where people go, these Pokémon follow.\nIf you’re scattering food for them, be careful—\nseveral hundred of them can gather at once."
          shield: "It’s forgetful and not very bright, but many\nTrainers love it anyway for its friendliness\nand sincerity."
        fr:
          sword: "On en trouve là où vivent les humains.\nMieux vaut éviter de les nourrir, sous peine\nd’en voir arriver des centaines."
          shield: "Il n’est pas très malin et un peu distrait,\nmais beaucoup de Dresseurs l’apprécient pour\nson caractère affectueux et sa bonne volonté."
        it:
          sword: "Appare dovunque vivano delle persone. Meglio\nessere prudenti quando gli si dà del cibo, perché\npotrebbero accorrere centinaia di esemplari."
          shield: "È un po’ smemorato e non molto sveglio.\nTuttavia è diligente e si affeziona facilmente,\ne per questo molti Allenatori lo adorano."
        de:
          sword: "Es taucht dort auf, wo Menschen leben. Beim\nFüttern muss man vorsichtig sein, da sich sonst\nschnell hunderte von ihnen versammeln können."
          shield: "Sie sind vergesslich und nicht besonders clever,\naber da sie sehr zutraulich und fleißig sind, haben\nviele Trainer sie ins Herz geschlossen."
        es:
          sword: "Aparece en lugares habitados por humanos.\nConviene tener cuidado al darles de comer, ya\nque esto podría atraer a cientos de ejemplares."
          shield: "Es muy olvidadizo y no demasiado avispado,\npero muchos Entrenadores le tienen simpatía\npor su carácter afable y sincero."
        ko:
          sword: "사람이 사는 곳에 나타난다.\n먹이를 뿌려주면 수백 마리가\n모여들기 때문에 주의해야 한다."
          shield: "건망증이 심하고 영리하지 않지만\n사람을 잘 따르고 착실해서\n귀여워하는 트레이너가 많다."
        zh_simp:
          sword: "会出现在人类生活的地方。\n一旦撒出饲料就会有好几百只\n豆豆鸽聚集而来，千万要小心。"
          shield: "虽然既健忘又不太聪明，\n因为性格认真且容易亲近人，\n所以受到了许多训练家的喜爱。"
        zh_trad:
          sword: "會出現在人類生活的地方。\n一旦撒出飼料就會有好幾百隻\n豆豆鴿聚集而來，千萬要小心。"
          shield: "雖然既健忘又不太聰明，\n因為性格認真且容易親近人，\n所以受到了許多訓練家的喜愛。"
