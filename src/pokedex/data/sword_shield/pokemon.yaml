          sword: "２まんねんまえの　こだいじんが\nつくった　ドロにんぎょうから\nうまれたらしい　ナゾの　ポケモン。"
          shield: "こだいじんの　どろにんぎょうから\nうまれたらしい。　ねんりきを　つかい\nくうちゅうに　ういて　いどうする。"
        jp_kanji:
          sword: "２万年前の　古代人が\nつくった　泥人形から\n生まれたらしい　謎の　ポケモン。"
          shield: "古代人の　泥人形から\n生まれたらしい。　念力を　使い\n空中に　浮いて　移動する。"
        en:
          sword: "This mysterious Pokémon started life as an ancient\nclay figurine made over 20,000 years ago."
          shield: "It appears to have been born from clay dolls\nmade by ancient people. It uses telekinesis to\nfloat and move."
        fr:
          sword: "Ce Pokémon mystérieux serait né d’une figurine\nd’argile vieille de près de 20 000 ans."
          shield: "Ce Pokémon aurait été créé à partir d’une poupée\nd’argile confectionnée par une ancienne\ncivilisation. Il se déplace en lévitant."
        it:
          sword: "Un Pokémon enigmatico nato da una statuetta\nd’argilla costruita dagli antichi 20.000 anni\nor sono."
          shield: "Pare che sia nato da un’antica bambola\ndi argilla. Si sposta levitando a mezz’aria\ngrazie alla telecinesi."
        de:
          sword: "Dieses rätselhafte Pokémon ist aus einer\nLehmpuppe entstanden, die vor 20 000 Jahren\nvon einem uralten Volk angefertigt wurde."
          shield: "Es scheint, sein Ursprung geht auf altertümliche\nLehmpuppen zurück. Durch Telekinese kann es\nschweben und sich bewegen."
        es:
          sword: "Al parecer, este misterioso Pokémon nació a\npartir de una figurilla de barro creada por una\ncivilización de hace más de 20 000 años."
          shield: "Dicen que surgió de una figurilla de barro hecha\npor una antigua civilización. Usa telequinesia\npara levitar y moverse."
        ko:
          sword: "2만 년 전 고대인이\n만든 진흙인형에서\n태어난 듯한 의문의 포켓몬."
          shield: "고대인의 진흙인형에서\n태어난 것 같다. 염력을\n사용해 공중을 떠다닌다."
        zh_simp:
          sword: "似乎是由２万年前的\n古代人制作的泥偶\n蜕变而来的谜之宝可梦。"
          shield: "似乎是从古代人做的\n泥偶诞生而来的宝可梦。\n能靠念力浮在空中移动。"
        zh_trad:
          sword: "似乎是由２萬年前的\n古代人製作的泥偶\n蛻變而來的謎之寶可夢。"
          shield: "似乎是從古代人做的\n泥偶誕生而來的寶可夢。\n能靠念力飄浮在空中移動。"
