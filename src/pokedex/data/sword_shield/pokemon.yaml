        en:
          sword: "It spins while making its luminescent spots flash.\nThese spots allow it to communicate with others\nby using different patterns of light."
          shield: "By exposing foes to the blinking of its\nluminescent spots, Inkay demoralizes them,\nand then it seizes the chance to flee."
        fr:
          sword: "Il fait clignoter son corps lumineux en tournoyant.\nIl communique avec ses congénères à l’aide\nde signaux de lumière."
          shield: "Il sape la combativité de son adversaire en faisant\nclignoter son corps lumineux, puis profite\nde cet instant de répit pour s’enfuir."
        it:
          sword: "Gira su se stesso facendo lampeggiare i motivi\nche ha sul corpo. Comunica con i suoi simili\nemettendo segnali luminosi."
          shield: "Fa perdere ai nemici lo spirito combattivo\ngrazie alla luce lampeggiante che emette\ndal suo corpo e ne approfitta per scappare."
        de:
          sword: "Es dreht sich und lässt dabei Punkte auf seinem\nKörper blinken. Durch bestimmte Lichtmuster\nkann es mit seinen Artgenossen kommunizieren."
          shield: "Es lässt die Punkte auf seinem Körper blinken,\num Gegnern den Kampfeswillen zu rauben.\nDiesen Moment nutzt es dann, um zu fliehen."
        es:
          sword: "Gira sobre sí mismo emitiendo luz intermitente\ncon la que crea señales para comunicarse con\nlos suyos."
          shield: "Los destellos de luz intermitente que emite\naplacan el ánimo de lucha del enemigo, tras lo\nque aprovecha para esconderse."
        ko:
          sword: "회전하면서 발광체를\n깜빡인다. 빛의 패턴으로\n동료와 의사소통한다."
          shield: "상대를 향해 발광체를 깜빡여서\n전의를 상실시킨다.\n그 틈에 도망간다."
        zh_simp:
          sword: "旋转着闪烁自己的发光体。\n通过改变闪烁的方式\n来和其他伙伴交流。"
          shield: "会让敌人看到自己闪烁的\n发光体来让对方丧失战意，\n然后趁机逃之夭夭。"
        zh_trad:
          sword: "旋轉著閃爍自己的發光體。\n透過改變閃爍的方式\n來和其他夥伴交流。"
          shield: "會讓敵人看到自己閃爍的\n發光體來讓對方喪失戰意，\n然後趁機逃之夭夭。"
