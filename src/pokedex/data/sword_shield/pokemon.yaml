      descriptions:
        jp_kana:
          sword: "こだいじんの　おしろの　かべには\nゴルーグが　ビームを　うつための\nほうだいの　ような　だいざが　ある。"
          shield: "たいないに　エネルギーを　うみだす\nえいきゅうきかんが　あると　いうが\nいまだ　かいめいは　されていない。"
        jp_kanji:
          sword: "古代人の　お城の　壁には\nゴルーグが　ビームを　撃つための\n砲台の　ような　台座が　ある。"
          shield: "体内に　エネルギーを　生み出す\n永久機関が　あると　いうが\n未だに　解明は　されていない。"
        en:
          sword: "Artillery platforms built into the walls of ancient\ncastles served as perches from which Golurk\ncould fire energy beams."
          shield: "There’s a theory that inside Golurk is a perpetual\nmotion machine that produces limitless energy,\nbut this belief hasn’t been proven."
        fr:
          sword: "Les murs des châteaux de jadis disposaient\nde créneaux, par lesquels les Golemastoc\npouvaient tirer leurs rayons d’énergie."
          shield: "Son énergie viendrait d’un mécanisme\nà mouvement perpétuel interne, mais jusqu’à\nprésent, personne n’en a la preuve."
        it:
          sword: "Nelle mura degli antichi castelli si trovano dei\nbasamenti, simili a quelli dei cannoni, dai quali\ni Golurk potevano sparare i loro raggi."
          shield: "Si dice che all’interno del corpo abbia un motore\nperpetuo che produce energia, ma a tutt’oggi\nnon è ancora chiaro se sia così."
        de:
          sword: "In uralten Festungen finden sich heute noch\nSockel, die Golgantes beim Abfeuern seiner\nStrahlen wohl als Halt dienen sollten."
          shield: "Man sagt, in seinem Körper befinde sich eine\nunerschöpfliche Energiequelle, doch bisher ist\nes niemandem gelungen, dies nachzuweisen."
        es:
          sword: "En los muros de antiguos castillos se hallan\nplataformas desde las que los Golurk podían\ndisparar sus rayos como si fueran cañones."
          shield: "Se dice que su cuerpo alberga un móvil perpetuo\nque genera energía, pero no se ha constatado la\nveracidad de tamaña afirmación."
        ko:
          sword: "고대인의 성벽에는\n골루그가 빔을 쏘기 위한\n포대와 같은 대좌가 있다."
          shield: "체내에 에너지를 생성하는\n영구 기관이 있다고 하지만\n아직도 밝혀지지 않았다."
        zh_simp:
          sword: "古代人城堡的墙壁里那\n像炮台一样的底座是为了\n让泥偶巨人发射光束而建的。"
          shield: "虽然有人认为它体内\n有着生成能量的永动机，\n但至今仍未得到证实。"
        zh_trad:
          sword: "古代人城堡的牆壁裡那\n像炮台一樣的底座是為了\n讓泥偶巨人發射光束而建的。"
          shield: "雖然有人認為牠體內\n有著生成能量的永動機，\n但至今仍未得到證實。"
pawniard:
