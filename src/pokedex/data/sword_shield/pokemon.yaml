        jp_kana:
          sword: "なきごえを　きき　つづけると\nずつうが　おさまらなくなる。\nみえない　ほどの　はやさで　うごく。"
          shield: "どんな　こうげきでも　よけてしまうと\nいわれるほど　すばやい　ポケモン。\nあまい　じゅえきが　だいこうぶつ。"
        jp_kanji:
          sword: "鳴き声を　聴き　つづけると\n頭痛が　治まらなくなる。\n見えない　ほどの　速さで　動く。"
          shield: "どんな　攻撃でも　避けてしまうと\nいわれるほど　素早い　ポケモン。\n甘い　樹液が　大好物。"
        en:
          sword: "Its cry leaves a lasting headache if heard for too\nlong. It moves so quickly that it is almost invisible."
          shield: "This Pokémon is so quick, it is said to be able to\navoid any attack. It loves to feed on tree sap."
        fr:
          sword: "Une écoute prolongée de son cri provoque\ndes maux de tête persistants.\nOn le perd facilement de vue tant il est vif."
          shield: "Ce Pokémon est tellement rapide qu’on le dit\ncapable d’éviter toutes les attaques.\nIl adore se nourrir de la sève sucrée des arbres."
        it:
          sword: "I suoi continui lamenti provocano atroci\nemicranie. Si sposta così velocemente che...\nnon si vede!"
          shield: "È così rapido che si dice sia in grado di schivare\nqualsiasi attacco. Ama nutrirsi della linfa degli\nalberi."
        de:
          sword: "Lauscht man längere Zeit seinem Gesang, löst er\ndauerhafte Kopfschmerzen aus. Es ist so schnell,\ndass es beinahe unsichtbar zu sein scheint."
          shield: "Dieses Pokémon ist so schnell, dass es jedem\nAngriff ausweichen kann. Es ernährt sich am\nliebsten von süßem Baumsaft."
        es:
          sword: "Escuchar su zumbido de forma continuada\nprovoca jaquecas persistentes. Se mueve con\ntanta rapidez que es casi imposible verlo."
          shield: "Este Pokémon es tan rápido que, según dicen,\npuede esquivar cualquier ataque. Le encanta\nalimentarse de la dulce savia de los árboles."
        ko:
          sword: "울음소리를 계속 들으면\n두통이 낫지 않게 된다.\n안 보일 정도의 스피드로 움직인다."
          shield: "어떤 공격이든 피할 수 있다고\n이야기될 정도로 빠른 포켓몬이다.\n달콤한 수액을 매우 좋아한다."
        zh_simp:
          sword: "如果一直听它的叫声，\n就会让人头痛不止。\n会以眼睛无法看清的速度移动。"
          shield: "行动十分迅速的宝可梦。\n说它无论什么攻击都能避开也不夸张。\n非常喜欢甘甜的树液。"
        zh_trad:
          sword: "一直聽牠的叫聲\n會讓人頭痛不止。\n會以肉眼無法看清的速度移動。"
          shield: "行動十分迅速的寶可夢。\n說牠無論什麼攻擊都能避開也不誇張。\n非常喜歡甘甜的樹液。"
