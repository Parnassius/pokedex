        jp_kana:
          sword: "ピィを　よく　みかける　ばしょは\nながれぼしが　おちた　ばしょと\nじもとでは　うわさ　されている。"
          shield: "おほしさまのような　シルエット。\nそのすがたから　ながれぼしにのって\nやってくると　しんじられている。"
        jp_kanji:
          sword: "ピィを　よく　見かける　場所は\n流れ星が　落ちた　場所と\n地元では　うわさ　されている。"
          shield: "お星さまのような　シルエット。\nその姿から　流れ星に乗って\nやって来ると　信じられている。"
        en:
          sword: "According to local rumors, Cleffa are often seen\nin places where shooting stars have fallen."
          shield: "Because of its unusual, starlike silhouette, people\nbelieve that it came here on a meteor."
        fr:
          sword: "On dit qu’il apparaît souvent là où se sont\nécrasées des météorites."
          shield: "Il ressemble un peu à une étoile. On suppose\nqu’il est venu sur terre accroché à une météorite."
        it:
          sword: "Si dice che sia facile incontrarlo dove sono\nprecipitate delle stelle cadenti."
          shield: "Per il suo aspetto bizzarro, che ricorda una stella,\nc’è chi crede che provenga da una stella cadente."
        de:
          sword: "Man erzählt sich, dass überall dort besonders\nhäufig Pii anzutreffen seien, wo einst eine\nSternschnuppe eingeschlagen ist."
          shield: "Aufgrund seiner ungewöhnlichen Sternform sagt\nman, es sei auf einem Meteor hierhergereist."
        es:
          sword: "Los lugareños rumorean que suele encontrarse\nen lugares donde han caído estrellas fugaces."
          shield: "Por su inusual forma estrellada, la gente cree que\nprocede de un meteorito que cayó a la tierra."
        ko:
          sword: "삐가 자주 보이는 장소는\n별똥별이 떨어진 장소라고\n그 고장에서 소문이 돈다."
          shield: "실루엣이 별 모양이다.\n그 때문에 별똥별을 타고\n온다고 여겨진다."
        zh_simp:
          sword: "根据当地的传说，\n皮宝宝经常出没的地方\n就是流星陨落之处。"
          shield: "有着星星一样的轮廓。\n由于那外形，人们相信\n它是乘着流星而来的。"
        zh_trad:
          sword: "根據當地的傳說，\n皮寶寶經常出沒的地方\n就是流星隕落之處。"
          shield: "有著如同星星一般的輪廓。\n因為這樣的外型，人們相信\n牠是乘著流星而來的。"
igglybuff:
