        - full_metal_body
      descriptions:
        jp_kana:
          sword: "ぜんしんから　ひかりを　はっして\nまるで　たいようの　すがたになると\nやみを　けして　せかいを　てらす。"
          shield: "たいようを　くらいし　けもの　と\nかつて　よばれた。　むじんぞうの\nひかりエネルギーを　ほうしゅつする。"
        jp_kanji:
          sword: "全身から　光を　発して\nまるで　太陽の　姿になると\n闇を　消して　世界を　照らす。"
          shield: "太陽を　食らいし　獣　と\nかつて　呼ばれた。　無尽蔵の\n光エネルギーを　放出する。"
        en:
          sword: "When light radiates from its body, this Pokémon\ncould almost appear to be the sun. It will dispel\nany darkness and light up the world."
          shield: "Solgaleo was once known as the Beast That\nDevours the Sun. Energy in the form of light\nradiates boundlessly from it."
        fr:
          sword: "Quand tout son corps émet de la lumière\net qu’il prend la forme du soleil, il peut repousser\nles ténèbres et illuminer le monde."
          shield: "Jadis, on le surnommait « celui qui dévore\nle soleil ». Une lumière inextinguible rayonne\nde son corps."
        it:
          sword: "Il suo corpo emette una luce abbagliante che,\nal pari del sole, è in grado di spazzare via\nle tenebre e illuminare il mondo."
          shield: "Un tempo veniva chiamato “la creatura che\nsi nutre di sole”. Emana dal corpo un’energia\nluminosa inesauribile."
        de:
          sword: "Wenn sein ganzer Körper Licht ausstrahlt, nimmt\nes eine sonnenähnliche Gestalt an, und kann so\ndas Dunkel vertreiben und die Welt erhellen."
          shield: "Einst wurde es „Sonnenverschlinger“ genannt.\nEs strahlt unerschöpfliche Lichtenergie aus."
        es:
          sword: "Es capaz de eliminar toda oscuridad e iluminar el\nmundo entero irradiando luz por todo el cuerpo\ncomo si de un sol se tratara."
          shield: "Antiguamente era conocido como la Criatura\nque se Nutre del Sol. Emite sin cesar una energía\nluminosa."
        ko:
          sword: "전신에서 빛을 발산해서\n마치 태양 같은 모습이 되면\n어둠을 물리치고 세상을 비춘다."
          shield: "태양을 삼키는 짐승이라고\n불렸다. 굉장한 양의\n빛 에너지를 방출한다."
        zh_simp:
          sword: "当它全身放出猛烈的光芒，\n变成如同太阳一般的身姿时，\n便会抹去黑暗，照亮世界。"
          shield: "曾经被称为\n吞食太阳之兽。\n能释放出无尽的光能。"
        zh_trad:
          sword: "當牠全身放出猛烈的光芒，\n變成如同太陽一般的身姿時，\n便會抹去黑暗，照亮世界。"
          shield: "曾經被稱為\n吞食太陽之獸。\n能釋放出無盡的光能。"
