      descriptions:
        jp_kana:
          sword: "２つの　からだで　ガスを　まぜる。\nむかしの　ガラルでは　そこらじゅうで\nすがたを　みかけたらしい。"
          shield: "ガラルの　マタドガスよりも　くうきを\nすいこむ　ちからは　すこし　よわいが\nつくりだす　どくそは　きょうりょく。"
        jp_kanji:
          sword: "２つの　体で　ガスを　混ぜる。\nむかしの　ガラルでは　そこらじゅうで\n姿を　見かけたらしい。"
          shield: "ガラルの　マタドガスよりも　空気を\n吸いこむ　力は　少し　弱いが\n作りだす　毒素は　強力。"
        en:
          sword: "It mixes gases between its two bodies.\nIt’s said that these Pokémon were seen\nall over the Galar region back in the day."
          shield: "It can’t suck in air quite as well as a Galarian\nWeezing, but the toxins it creates are more\npotent than those of its counterpart."
        fr:
          sword: "Il mélange des gaz dans ses deux corps.\nOn raconte qu’autrefois, on en voyait partout\ndans la région de Galar."
          shield: "Il ne peut pas aspirer autant d’air que le Smogogo\nde Galar, mais le poison qu’il produit est plus\npuissant."
        it:
          sword: "Si serve del suo duplice corpo per miscelare i\ngas. Sembra che in passato lo si potesse avvistare\nun po’ ovunque nella regione di Galar."
          shield: "La sua capacità di aspirare l’aria è leggermente\ninferiore rispetto al Weezing di Galar, ma è\nin grado di produrre tossine molto potenti."
        de:
          sword: "In seinen beiden Körpern vermischt es Gase.\nMan sagt, dass es früher überall in der\nGalar-Region anzutreffen gewesen sei."
          shield: "Es kann zwar nicht so viel Luft einsaugen wie die\nSmogmog aus Galar, dafür sind aber die Toxine,\ndie es produziert, umso stärker."
        es:
          sword: "Usa sus dos cuerpos para mezclar gases. Según\nparece, en el pasado podían hallarse ejemplares\npor todos los rincones de Galar."
          shield: "Posee una capacidad de succión inferior a la del\nWeezing de Galar, pero las toxinas que genera\nson más potentes."
        ko:
          sword: "2개의 몸에서 가스를 섞는다.\n과거의 가라르에서는 흔하게\n볼 수 있었다고 한다."
          shield: "가라르의 또도가스보다 공기를\n흡입하는 힘은 조금 약하지만\n내뿜는 독소는 강력하다."
        zh_simp:
          sword: "用２个身体来混合瓦斯。\n在往昔的伽勒尔似乎\n到处都能见到它们的身影。"
          shield: "虽然吸入空气的力量\n稍弱于伽勒尔的双弹瓦斯，\n制造出的毒素却更加强力。"
        zh_trad:
          sword: "用２個身體來混合瓦斯。\n在往昔的伽勒爾似乎到處\n都能見到牠們的身影。"
          shield: "雖然吸入空氣的力量\n稍弱於伽勒爾的雙彈瓦斯，\n製造出的毒素卻更加強力。"
    weezing_galarian_form:
      form_id: 1
      names:
        jp_kana: ガラルのすがた
        jp_kanji: ガラルのすがた
        en: Galarian Form
        fr: Forme de Galar
        it: Forma di Galar
        de: Galar-Form
        es: Forma de Galar
        ko: 가라르의 모습
        zh_simp: 伽勒尔的样子
        zh_trad: 伽勒爾的樣子
      base_stats:
        hp: 65
        attack: 90
        defense: 120
        special_attack: 85
        special_defense: 70
        speed: 60
      evs_yield:
        hp: 0
        attack: 0
        defense: 2
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - poison
        - fairy
      egg_groups:
        - amorphous
      abilities:
        - levitate
        - neutralizing_gas
      hidden_ability: misty_surge
      held_items:
        rare: misty_seed
      descriptions:
        jp_kana:
          sword: "たいきの　きたない　せいぶんを\nきゅうしゅうし　きれいな　くうきを\nフンの　かわりに　はきだしている。"
          shield: "こうじょうが　たちならび　くうきが\nよごれていた　むかし。　なぜか\nこのすがたに　へんかした。"
        jp_kanji:
          sword: "大気の　汚い　成分を\n吸収し　きれいな　空気を\nフンの　代わりに　吐き出している。"
          shield: "工場が　建ち並び　空気が\n汚れていた　むかし。　なぜか\nこの姿に　変化した。"
        en:
          sword: "This Pokémon consumes particles that contaminate\nthe air. Instead of leaving droppings, it expels\nclean air."
          shield: "Long ago, during a time when droves of factories\nfouled the air with pollution, Weezing changed\ninto this form for some reason."
        fr:
          sword: "Il aspire les particules polluantes dans l’air\net excrète de l’air purifié."
          shield: "À l’époque où il y avait des usines partout\net où l’air était très pollué, il a pris cette forme.\nPersonne ne sait pourquoi."
        it:
          sword: "Assorbe le particelle inquinanti dell’atmosfera e\nproduce aria pulita invece di escrementi."
          shield: "Ha assunto questa forma molto tempo fa,\nquando c’erano schiere di fabbriche e l’aria era\nmolto inquinata, tuttavia il motivo non è chiaro."
        de:
          sword: "Es saugt Schmutzpartikel aus der Atmosphäre und\nscheidet sie dann anstelle von Exkrementen in\nForm von sauberer Luft wieder aus."
          shield: "Als vor langer Zeit viele Fabriken die Luft mit\nIndustrieabgasen verpesteten, nahm es diese\nForm aus unbekannten Gründen das erste Mal an."
        es:
          sword: "Absorbe las partículas contaminantes de la\natmósfera y expulsa aire limpio."
          shield: "Se desconoce el motivo, pero adoptó esta forma\ntiempo atrás, cuando las numerosas chimeneas\nde las fábricas de la región contaminaban el aire."
        ko:
          sword: "대기 중의 오염된 성분을\n흡수하고 배설물 대신\n깨끗한 공기를 내보낸다."
          shield: "공장이 모여 있어 공기가 오염되었던\n과거에 무슨 이유에서인지\n이 모습으로 변했다."
        zh_simp:
          sword: "会吸收大气中的污染成分，\n然后吐出新鲜的空气，\n这就是它的排泄方式。"
          shield: "在往昔工厂林立，空气严重\n污染的时代，双弹瓦斯不知道\n为什么变成了这个样子。"
        zh_trad:
          sword: "會吸收大氣中的污染成分，\n然後吐出新鮮的空氣，\n這就是牠的排泄方式。"
          shield: "在往昔工廠林立、空氣嚴重\n污染的時代，雙彈瓦斯不知道\n為什麼變成了這個樣子。"
