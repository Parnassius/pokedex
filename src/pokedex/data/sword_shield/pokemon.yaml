      descriptions:
        jp_kana:
          sword: "なげわざの　うでは　いちりゅう。\nたたかいで　かいた　あせが　しみ\nおびの　いろが　こく　そまっていく。"
          shield: "５ひきの　むれで　けいこに　はげむ。\nけいこに　ついていけない　ものは\nおびを　すてて　むれを　さる。"
        jp_kanji:
          sword: "投げ技の　腕は　一流。\n戦いで　かいた　汗が　染み\n帯の　色が　濃く　染まっていく。"
          shield: "５匹の　群れで　稽古に　はげむ。\n稽古に　ついていけない　ものは\n帯を　捨てて　群れを　去る。"
        en:
          sword: "It performs throwing moves with first-rate skill.\nOver the course of many battles, Throh’s belt\ngrows darker as it absorbs its wearer’s sweat."
          shield: "They train in groups of five. Any member that\ncan’t keep up will discard its belt and leave\nthe group."
        fr:
          sword: "Ses techniques de projection sont sans égal.\nQuand il se bat, sa sueur coule sur sa ceinture\net lui donne une teinte plus foncée."
          shield: "Ils s’entraînent intensément par groupes de cinq.\nCeux qui ne peuvent pas suivre le rythme\nabandonnent leur ceinture et se retirent."
        it:
          sword: "È molto bravo nelle tecniche di lancio.\nIl sudore prodotto durante la lotta impregna\nla sua cintura da karate e la rende più scura."
          shield: "Si allenano in gruppi di cinque. Se uno di loro\nnon riesce a stare al passo con l’allenamento,\ngetta via la cintura e abbandona il gruppo."
        de:
          sword: "Es verfügt über ein exzellentes Repertoire an\nWurftechniken. Sein Gürtel färbt sich dunkler,\nje mehr Schweiß er bei Kämpfen in sich aufsaugt."
          shield: "Es trainiert stets in Fünferrudeln. Wer beim\nTraining nicht mithalten kann, entledigt sich\nseines Gürtels und verlässt das Rudel."
        es:
          sword: "Su técnica de lanzamiento es formidable. El\nsudor que exhala durante el combate impregna\nsu cinturón, cuyo color se vuelve más intenso."
          shield: "Entrenan en grupos de cinco individuos. Si alguno\nes incapaz de seguir el ritmo, arroja el cinturón y\nabandona la cuadrilla."
        ko:
          sword: "메치는 기술의 실력은 일류다.\n싸움으로 흘린 땀이 배어\n띠의 색이 진해져 간다."
          shield: "5마리의 무리가 수련한다.\n수련에 뒤떨어지면\n띠를 버리고 무리를 떠난다."
        zh_simp:
          sword: "能使出一流的投摔招式。\n带子被战斗时流下的汗水\n浸湿，颜色越变越深。"
          shield: "５只一组一起努力练习。\n在练习中掉队的投摔鬼\n会扔掉带子离开团队。"
        zh_trad:
          sword: "能使出一流的投摔招式。\n帶子被戰鬥時流下的汗水\n浸濕，顏色越變越深。"
          shield: "５隻一組一起努力練習。\n在練習中掉隊的投摔鬼\n會扔掉帶子離開團隊。"
sawk:
