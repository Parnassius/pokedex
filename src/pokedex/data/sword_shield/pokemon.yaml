        - water
        - psychic
      egg_groups:
        - water_3
      abilities:
        - illuminate
        - natural_cure
      hidden_ability: analytic
      held_items:
        common: stardust
        rare: star_piece
      descriptions:
        jp_kana:
          sword: "きょうれつな　サイコパワーを\nはなつとき　コアと　よばれる\nきかんが　なないろに　きらめく。"
          shield: "からだを　こうそくで　かいてんさせ\nうみを　およぎながら　ちいさな\nプランクトンを　きゅうしゅうする。"
        jp_kanji:
          sword: "強烈な　サイコパワーを　放つとき\nコアと　呼ばれる　器官が\n七色に　きらめく。"
          shield: "体を　高速で　回転させ\n海を　泳ぎながら\n小さな　プランクトンを　吸収する。"
        en:
          sword: "This Pokémon has an organ known as its core.\nThe organ glows in seven colors when Starmie is\nunleashing its potent psychic powers."
          shield: "Starmie swims by spinning its body at high speed.\nAs this Pokémon cruises through the ocean, it\nabsorbs tiny plankton."
        fr:
          sword: "S’il déchaîne son pouvoir psychique puissant,\nson organe appelé « cœur » se met à briller\nde sept couleurs."
          shield: "Il aspire du plancton quand il nage dans la mer\nen faisant tourner son corps à grande vitesse."
        it:
          sword: "Quando scatena i suoi poteri psichici, l’organo\ncentrale, detto nucleo, brilla di sette colori\ndiversi."
          shield: "Risucchia il plancton mentre nuota nel mare\nfacendo ruotare il suo corpo ad alta velocità."
        de:
          sword: "Das als Kern bezeichnete Organ dieses Pokémon\nerstrahlt in den sieben Farben des Regenbogens,\nwenn Starmie mächtige Psycho-Kräfte entfesselt."
          shield: "Starmie bewegt sich im Wasser fort, indem es\nseinen Körper mit hoher Geschwindigkeit rotieren\nlässt. Unterwegs absorbiert es winziges Plankton."
        es:
          sword: "Su órgano central, conocido como núcleo, brilla\ncon los colores del arcoíris cuando se dispone a\nliberar sus potentes poderes psíquicos."
          shield: "Starmie absorbe plancton al tiempo que nada\npor el mar haciendo girar su cuerpo a gran\nvelocidad."
        ko:
          sword: "강렬한 사이코 파워를 발산할 때\n코어라고 불리는 기관이\n일곱 색깔로 빛난다."
          shield: "몸을 고속으로 회전시켜\n바다를 헤엄치며\n작은 플랑크톤을 흡수한다."
        zh_simp:
          sword: "当它释放强烈的精神力量时，\n被称为核心的器官就会\n发出七彩的光芒，"
          shield: "会高速旋转着身体\n一边游泳一边吸收\n微小的浮游生物。"
        zh_trad:
          sword: "釋放強烈的精神力量時，\n被稱為核心的器官就會\n閃爍七彩光芒。"
          shield: "會高速旋轉著身體在\n海裡游泳，並且同時\n吸食微小的浮游生物。"
