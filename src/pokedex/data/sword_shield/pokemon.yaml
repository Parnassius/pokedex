      descriptions:
        jp_kana:
          sword: "きぐらいが　たかく　なつかせるのは\nたいへん。　きにくわない　ことが\nあると　すぐに　ツメを　たててくる。"
          shield: "ゆうがで　じょうひんな　みのこなし。\nやばんな　ニャイキングとは　そりが\nあわず　おたがいを　みくだしている。"
        jp_kanji:
          sword: "気位が　高く　なつかせるのは\nたいへん。　気に食わない　ことが\nあると　すぐに　ツメを　立ててくる。"
          shield: "優雅で　上品な　身のこなし。\n野蛮な　ニャイキングとは　そりが\nあわず　お互いを　見下している。"
        en:
          sword: "Getting this prideful Pokémon to warm up to you\ntakes a lot of effort, and it will claw at you the\nmoment it gets annoyed."
          shield: "Its elegant and refined behavior clashes with that\nof the barbaric Perrserker. The relationship\nbetween the two is one of mutual disdain."
        fr:
          sword: "Très fier, il est difficile à apprivoiser.\nDès que quelque chose ne lui plaît pas,\nil sort les griffes."
          shield: "Il se comporte avec grâce et élégance,\net ne s’entend pas avec les rustres Berserkatt :\nles deux espèces se méprisent."
        it:
          sword: "Conquistarsi il suo affetto è un’impresa ardua\nperché è molto altezzoso. Se qualcosa non gli\nva, tira subito fuori gli artigli."
          shield: "Ha un portamento elegante e distinto.\nNon gli va a genio la rozzezza di Perrserker\ne i due Pokémon si disprezzano a vicenda."
        de:
          sword: "Es ist sehr stolz, was es nicht leicht macht, mit\nihm Freundschaft zu schließen. Wenn ihm etwas\nmissfällt, fährt es unverzüglich die Krallen aus."
          shield: "Sein Auftreten ist anmutig und elegant. Es kommt\nmit Mauzingers grober Art nicht zurecht. Beide\nArten strafen sich gegenseitig mit Verachtung."
        es:
          sword: "Trabar amistad con este Pokémon es una ardua\ntarea debido a su enorme orgullo. Cuando algo\nno le place, saca las uñas de inmediato."
          shield: "Hace gala de un porte elegante y majestuoso.\nNo congenia con los toscos Perrserker y ambos\nse profesan un mutuo desprecio."
        ko:
          sword: "자존심이 세서 길들이기\n힘들다. 마음에 들지 않는 일이\n있으면 바로 발톱을 세운다."
          shield: "움직임은 우아하고 품위 있다.\n야만스러운 나이킹과는\n잘 맞지 않아 서로를 멸시한다."
        zh_simp:
          sword: "性情高傲，很难让它听话。\n只要遇到看不顺眼的事，\n就会马上竖起自己的爪子。"
          shield: "拥有优雅高贵的身姿。\n与野蛮的喵头目性格不合，\n互相看不起对方。"
        zh_trad:
          sword: "性情高傲，很難讓牠聽話。\n只要遇到看不順眼的事，\n就會馬上豎起自己的爪子。"
          shield: "擁有優雅高貴的身姿。\n與野蠻的喵頭目個性不合，\n互相看不起對方。"
    persian_alolan_form:
      form_id: 1
      names:
        jp_kana: アローラのすがた
        jp_kanji: アローラのすがた
        en: Alolan Form
        fr: Forme d’Alola
        it: Forma di Alola
        de: Alola-Form
        es: Forma de Alola
        ko: 알로라의 모습
        zh_simp: 阿罗拉的样子
        zh_trad: 阿羅拉的樣子
      base_stats:
        hp: 65
        attack: 60
        defense: 60
        special_attack: 75
        special_defense: 65
        speed: 115
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 2
      types:
        - dark
      egg_groups:
        - field
      abilities:
        - fur_coat
        - technician
      hidden_ability: rattled
      held_items:
        rare: quick_claw
      descriptions:
        jp_kana:
          sword: "アローラちほうでは　まるい　かおは\nとみの　しょうちょうと　かんがえて\nペルシアンを　たいせつに　あつかう。"
          shield: "たかい　しんたいのうりょくを　もつ\nうえに　ひれつな　たたかいかたを\nするので　てに　おえない　つよさ。"
        jp_kanji:
          sword: "アローラ地方では　まるい　顔は\n富の　象徴と　考えて\nペルシアンを　大切に　あつかう。"
          shield: "高い　身体能力を　もつ\nうえに　卑劣な　戦いかたを\nするので　手に負えない　強さ。"
        en:
          sword: "The round face of Alolan Persian is considered to\nbe a symbol of prosperity in the Alola region, so\nthese Pokémon are very well cared for."
          shield: "This Pokémon is one tough opponent. Not only\ndoes it have formidable physical abilities, but it’s\nalso not above fighting dirty."
        fr:
          sword: "À Alola, sa tête ronde est considérée comme\nun symbole de prospérité, aussi ce Pokémon\nest-il traité avec le plus grand respect."
          shield: "Son incroyable agilité associée à son goût\npour les stratégies déloyales fait de lui\nun adversaire très difficile à affronter."
        it:
          sword: "Nella regione di Alola le facce tonde sono\nconsiderate un simbolo di prosperità e per\nquesto Persian è trattato con molto riguardo."
          shield: "Le sue notevoli abilità fisiche e le sue meschine\nstrategie di lotta lo rendono un avversario\ndavvero temibile."
        de:
          sword: "Da runde Gesichter in der Alola-Region als\nSymbol für Wohlstand gelten, zollt man diesem\nPokémon dort großen Respekt."
          shield: "Es verfügt nicht nur über eine große physische\nStärke, sondern greift auch auf fiese Strategien\nzurück, was es zu einem harten Gegner macht."
        es:
          sword: "En Alola todos consideran la cara redonda de\nlos Persian un símbolo de buena fortuna, por lo\nque los tratan con mucho respeto."
          shield: "Posee una gran fortaleza física y emplea tácticas\nrastreras en combate, lo que lo convierte en un\nrival duro de roer."
        ko:
          sword: "알로라지방에서는 둥근 얼굴이\n부의 상징으로 여겨져\n페르시온을 소중하게 대한다."
          shield: "뛰어난 신체 능력을 갖추고 있으며\n비열한 방식으로 싸우기 때문에\n감당할 수 없을 정도로 강하다."
        zh_simp:
          sword: "由于在阿罗拉地区\n圆脸是富贵的象征，\n人们对猫老大呵护备至。"
          shield: "不但拥有优秀的体能，\n还擅长卑鄙的战斗方式，\n非常不好对付。"
        zh_trad:
          sword: "由於在阿羅拉地區\n圓臉是富貴的象徵，\n人們對貓老大呵護備至。"
          shield: "不但擁有優秀的體能，\n還擅長卑鄙的戰鬥方式，\n非常不好對付。"
psyduck:
  species_id: 54
  names:
    jp_kana: コダック
    jp_kanji: コダック
    en: Psyduck
    fr: Psykokwak
    it: Psyduck
    de: Enton
    es: Psyduck
    ko: 고라파덕
    zh_simp: 可达鸭
    zh_trad: 可達鴨
  forms:
    psyduck:
      form_id: 0
      base_stats:
        hp: 50
        attack: 52
        defense: 48
        special_attack: 65
        special_defense: 50
        speed: 55
      evs_yield:
        hp: 0
        attack: 0
