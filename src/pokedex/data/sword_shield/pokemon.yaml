        jp_kana:
          sword: "エサを　さがすため　はなを\nこすりあわせ　じめんを　ほっている。\nたまに　おんせんを　ほりあてる。"
          shield: "いい　においを　かぎつけると\nあとさき　かんがえず　においの\nほうこうへ　ダッシュしてしまう。"
        jp_kanji:
          sword: "エサを　探すため　鼻を\nこすり合わせ　地面を　掘っている。\nたまに　温泉を　掘り当てる。"
          shield: "いい　においを　かぎつけると\nあとさき　考えずに　においの\n方向へ　ダッシュしてしまう。"
        en:
          sword: "It rubs its snout on the ground to find and dig up\nfood. It sometimes discovers hot springs."
          shield: "If it smells something enticing, it dashes off\nheadlong to find the source of the aroma."
        fr:
          sword: "Il creuse le sol avec son groin pour y dénicher\nde la nourriture. Il trouve parfois des sources\nd’eau chaude."
          shield: "S’il sent une odeur attrayante, il fonce la tête\nla première pour trouver d’où elle vient."
        it:
          sword: "Scava con il muso nel terreno per scovare del\ncibo. Talvolta scopre sorgenti d’acqua calda."
          shield: "Appena avverte un profumo invitante, si fionda\nnella direzione da cui proviene senza la minima\nesitazione."
        de:
          sword: "Auf Nahrungssuche wühlt es sich mit der Nase\ndurch den Erdboden. Manchmal entdeckt es\ndabei auch heiße Quellen."
          shield: "Wenn es etwas Vielversprechendes erschnuppert,\nsprintet es Hals über Kopf darauf los, ohne\nnachzudenken."
        es:
          sword: "Frota el hocico contra el suelo para desenterrar\ncomida. A veces descubre aguas termales."
          shield: "Si percibe un aroma tentador, se lanza de cabeza\nsin pensárselo dos veces para hallar su origen."
        ko:
          sword: "먹이를 찾기 위해 코를\n바닥에 비벼 땅을 파고 있다.\n가끔 온천을 찾아낸다."
          shield: "좋은 냄새를 맡으면\n뒷일을 생각하지 않고 냄새 나는\n방향으로 대시해버린다."
        zh_simp:
          sword: "为了寻找食物，\n会用鼻子摩擦地面并进行挖掘。\n偶尔会挖到温泉。"
          shield: "嗅到诱人的香味时，\n便会不顾一切地朝着\n气味的方向飞奔过去。"
        zh_trad:
          sword: "為了尋找食物，\n會用鼻子摩擦地面來挖掘。\n偶爾會挖到溫泉。"
          shield: "一聞到誘人的香味時，\n就會不顧一切地\n朝香味傳來的方向飛奔而去。"
