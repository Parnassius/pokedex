          shield: "５０ねん　ほど　まえに　みつかった\nポケモン。　おおきく　はったつした\nのうで　サイコパワーを　あやつるぞ。"
        jp_kanji:
          sword: "テレビのそばに　いると　モニターに\n奇妙な　景色が　映る。\nリグレーの　故郷だと　いわれる。"
          shield: "５０年　ほど　前に　見つかった\nポケモン。　大きく　発達した\n脳で　サイコパワーを　操るぞ。"
        en:
          sword: "If this Pokémon stands near a TV, strange scenery\nwill appear on the screen. That scenery is said\nto be from its home."
          shield: "This Pokémon was discovered about 50 years\nago. Its highly developed brain enables it to\nexert its psychic powers."
        fr:
          sword: "S’il se tient près d’une télé, d’étranges panoramas\napparaissent à l’écran. On raconte qu’il s’agirait\nde paysages venus des terres natales de Lewsor."
          shield: "Ce Pokémon a été découvert il y a environ 50 ans.\nSon cerveau surdéveloppé lui permet d’utiliser\nses pouvoirs psychiques avec aisance."
        it:
          sword: "Quando si trova vicino a un televisore, sullo\nschermo appaiono paesaggi singolari. Si dice\nche siano vedute del luogo da cui proviene."
          shield: "È stato scoperto circa 50 anni fa. Il suo cervello\nmolto sviluppato gli permette di usare\npoteri psichici."
        de:
          sword: "Wenn es in der Nähe ist, beginnen Fernseher zu\nflackern und fremdartige Landschaften zu zeigen.\nDiese stellen angeblich seine Heimat dar."
          shield: "Ein Pokémon, das vor 50 Jahren entdeckt wurde.\nSein hochentwickeltes Gehirn verleiht ihm\nPsycho-Kräfte."
        es:
          sword: "Cuando se halla junto a un televisor, la pantalla\nmuestra imágenes de extraños paisajes. Se cree\nque corresponden a su lugar de origen."
          shield: "Fue descubierto hace aproximadamente 50 años.\nPosee un cerebro muy desarrollado que le otorga\npoderes psíquicos."
        ko:
          sword: "TV 근처에 있으면 모니터에\n기묘한 풍경이 비친다.\n리그레의 고향이라 여겨지고 있다."
          shield: "약 50년 전에 발견된\n포켓몬이다. 크게 발달한\n뇌로 사이코 파워를 조종한다."
        zh_simp:
          sword: "当它站在电视旁边时，\n画面上会出现奇怪的景色。\n据说那是小灰怪的故乡。"
          shield: "在大约５０年前被发现的宝可梦。\n会用又大又发达的大脑\n操纵精神力量。"
        zh_trad:
          sword: "當牠站在電視機旁邊時，\n畫面上會出現奇怪的景色。\n據說那是牠的故鄉。"
          shield: "在大約５０年前被發現的寶可夢。\n會用又大又發達的大腦\n來操縱精神力量。"
