          sword: "けんぽうの　たつじんの　かげに\nもぐって　うごきを　コピーしたため\nきゅうきょく　おうぎを　みにつけた。"
          shield: "あらゆる　かげの　なかに　もぐりこむ\nのうりょくを　もっているため　ながい\nあいだ　だれにも　みつからなかった。"
        jp_kanji:
          sword: "拳法の　達人の　影に\n潜って　動きを　コピーしたため\n究極奥義を　身につけた。"
          shield: "あらゆる　影の　中に　潜りこむ\n能力を　もっているため　長い\nあいだ　誰にも　見つからなかった。"
        en:
          sword: "By slipping into the shadow of a martial arts\nmaster and copying their movements, this\nPokémon learned the ultimate techniques."
          shield: "This Pokémon can conceal itself in any shadow,\nso it went undiscovered for a long time."
        fr:
          sword: "Il s’est glissé dans l’ombre d’un maître du kung-fu.\nIl s’est aussi approprié sa botte secrète ultime\nen copiant ses mouvements."
          shield: "Ce Pokémon ayant la capacité de se dissimuler\ndans les ombres, il est resté très longtemps\ncaché aux yeux du monde."
        it:
          sword: "Si è infiltrato nell’ombra di un maestro di arti\nmarziali e ne ha copiato i movimenti, carpendo\ncosì tutti i segreti."
          shield: "A causa della sua capacità di infiltrarsi in\nqualunque ombra, per lungo tempo nessuno è\nriuscito ad avvistarlo."
        de:
          sword: "Es schlüpfte in den Schatten eines Meisters des\nFaustkampfes und imitierte dessen Bewegungen.\nSo lernte es ultimative Geheimtechniken."
          shield: "Da es in der Lage ist, mit jedem Schatten zu\nverschmelzen, ist es lange Zeit unentdeckt\ngeblieben."
        es:
          sword: "Tras infiltrarse en la sombra de un maestro de\nartes marciales y copiar sus movimientos, es\ncapaz de utilizar su técnica secreta definitiva."
          shield: "Posee la extraordinaria capacidad de infiltrarse\nen cualquier sombra, por lo que nadie lo había\nvisto en mucho tiempo."
        ko:
          sword: "권법의 달인의 그림자에 숨어들어\n움직임을 복사했기 때문에\n궁극의 오의를 익힐 수 있었다."
          shield: "모든 그림자 안에 숨어들 수 있는\n능력을 갖고 있어 오랫동안\n누구에게도 발견되지 않았다."
        zh_simp:
          sword: "潜入拳法高手的影子里\n复制对方的动作，\n最后习得了究极的奥义。"
          shield: "拥有潜入一切影子里的能力，\n所以在很长一段时间里\n都没有任何人发现它。"
        zh_trad:
          sword: "潛入拳法高手的影子裡\n複製對方的動作，\n最後習得了究極的奧義。"
          shield: "擁有潛入一切影子裡的能力，\n所以在很長一段時間裡\n都沒有任何人發現牠。"
