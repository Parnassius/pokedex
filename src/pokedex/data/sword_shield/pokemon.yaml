        jp_kana:
          sword: "てつと　おんなじくらい　かたいが\nながく　みずに　つかっていると\nちょっと　やわらかくなるらしい。"
          shield: "おとに　はんのうし　うごきだす。\nエネルギーコアの　えいきょうで\nさわると　すこし　あったかい。"
        jp_kanji:
          sword: "鉄と　同じくらい　硬いが\n長く　水に　浸かっていると\nちょっと　軟らかくなるらしい。"
          shield: "音に　反応し　動きだす。\nエネルギーコアの　影響で\n触ると　すこし　温かい。"
        en:
          sword: "It’s as hard as steel, but apparently a long soak in\nwater will cause it to soften a bit."
          shield: "When it detects a noise, it starts to move.\nThe energy core inside it makes this Pokémon\nslightly warm to the touch."
        fr:
          sword: "Son corps est aussi dur que le fer,\nmais si on le laisse longtemps dans l’eau,\nil paraît qu’il ramollit légèrement."
          shield: "Il se déplace en réagissant aux sons environnants.\nSon noyau d’énergie rend son corps légèrement\nchaud au toucher."
        it:
          sword: "È duro quasi quanto l’acciaio, ma sembra che\nsi ammorbidisca leggermente se viene immerso\na lungo in acqua."
          shield: "Si muove reagendo ai rumori. È tiepido al tatto\nper via del nucleo di energia al suo interno."
        de:
          sword: "Sein Körper ist hart wie Stahl, aber nach einem\nlängeren Aufenthalt im Wasser weicht er wohl\nein wenig auf."
          shield: "Es bewegt sich stets auf Geräuschquellen zu.\nDank seines Energiekerns fühlt es sich immer\nleicht warm an, wenn man es berührt."
        es:
          sword: "Su cuerpo es casi tan duro como el acero, pero\nal parecer puede reblandecerse levemente si\npermanece sumergido en agua mucho tiempo."
          shield: "Se dirige hacia cualquier sonido que perciba.\nEs ligeramente cálido al tacto, debido al efecto\nde su núcleo energético."
        ko:
          sword: "철과 비슷하게 단단하지만\n오랫동안 물에 담가두면\n조금 부드러워진다고 한다."
          shield: "소리에 반응해 움직인다.\n에너지 코어의 영향으로\n만지면 조금 따듯하다."
        zh_simp:
          sword: "几乎和铁一样硬，\n但要是长时间浸在水里，\n似乎就会稍微变软一些。"
          shield: "会对声音产生反应而动起来。\n在能量核心的影响下，\n它摸起来暖暖的。"
        zh_trad:
          sword: "幾乎和鐵一樣堅硬，\n但要是長時間浸在水裡，\n似乎就會稍微變軟一些。"
          shield: "會對聲音產生反應而動起來。\n在能量核心的影響下，\n牠摸起來暖暖的。"
boldore:
