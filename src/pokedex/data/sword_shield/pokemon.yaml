      descriptions:
        jp_kana:
          sword: "でんきで　きんにくを　しげきするので\nすばやく　うごける。　きんにくつうも\nでんきで　ほぐすので　すぐ　なおる。"
          shield: "ひとまえには　めったに　すがたを\nみせない。　かみなりの　おちた\nばしょに　すみかが　あると　いう。"
        jp_kanji:
          sword: "電気で　筋肉を　刺激するので\n素早く　動ける。　筋肉痛も\n電気で　ほぐすので　すぐ　治る。"
          shield: "人前には　めったに　姿を\n見せない。　雷の　落ちた\n場所に　すみかが　あると　いう。"
        en:
          sword: "It stimulates its own muscles with electricity, so\nit can move quickly. It eases its soreness with\nelectricity, too, so it can recover quickly as well."
          shield: "It rarely appears before people. It is said to nest\nwhere lightning has fallen."
        fr:
          sword: "Il diffuse de l’électricité dans ses membres\npour augmenter sa vitesse. C’est également\nainsi qu’il apaise ses douleurs musculaires."
          shield: "Ce Pokémon évite de se montrer aux humains.\nOn raconte qu’il fait son nid aux endroits\noù la foudre s’est abattue."
        it:
          sword: "L’elettricità gli stimola i muscoli rendendolo più\nveloce e inoltre allevia i suoi dolori muscolari\nfacendolo tornare rapidamente in forma."
          shield: "Raramente si mostra agli umani. Si dice che\nviva nelle zone dove è caduto un fulmine."
        de:
          sword: "Da es seine Muskeln mit Elektrizität stimuliert,\nkann es sich sehr schnell bewegen. Auch\nMuskelkater heilt es sofort mit Strom."
          shield: "Es zeigt sich selten den Menschen. Man sagt,\ndass es sein Nest an Orten baut, wo ein Blitz\neingeschlagen hat."
        es:
          sword: "La electricidad estimula su musculatura para que\npueda moverse a gran velocidad y le ayuda a\nrecuperarse del dolor muscular rápidamente."
          shield: "Rara vez aparece ante la gente. Dicen que suele\ncolocar su madriguera donde caen rayos."
        ko:
          sword: "전기로 근육을 자극해서\n재빠르게 움직일 수 있다. 근육통도\n전기로 풀기 때문에 금방 낫는다."
          shield: "좀처럼 사람 앞에 모습을\n드러내지 않는다. 번개가 떨어진\n곳에 보금자리가 있다고 한다."
        zh_simp:
          sword: "用电刺激肌肉，所以能迅速行动。\n用电也能缓解肌肉疼痛，\n因此很快会治愈。"
          shield: "极少出现在人前。\n据说它的住所就在雷电落下的地方。"
        zh_trad:
          sword: "會用電流刺激肌肉，因此\n能迅速行動。電流也能讓\n肌肉放鬆並快速治癒酸痛。"
          shield: "極少在人們面前現身，\n據說牠的住所就在\n雷電落下的地方。"
