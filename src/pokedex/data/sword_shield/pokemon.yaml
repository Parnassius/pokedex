        - ice
        - steel
      egg_groups:
        - field
      abilities:
        - snow_cloak
      hidden_ability: slush_rush
      held_items:
        rare: grip_claw
      descriptions:
        jp_kana:
          sword: "ゆきに　とざされた　さんがくちたいで\nくらすうちに　はがねのように　かたい\nこおりの　からだを　てにいれた。"
          shield: "みなみの　しまの　ゆきやまに　すむ。\nふぶきになると　ゆきのなかで　ふせて\nとばされないように　じっと　たえる。"
        jp_kanji:
          sword: "雪に　閉ざされた　山岳地帯で\n暮らすうちに　鋼のように　硬い\n氷の　体を　手に入れた。"
          shield: "南の　島の　雪山に　棲む。\n吹雪になると　雪の中で　伏せて\n飛ばされないように　じっと　耐える。"
        en:
          sword: "Life on mountains covered with deep snow has\ngranted this Pokémon a body of ice that’s as hard\nas steel."
          shield: "It lives in snowy mountains on southern islands.\nWhen a blizzard rolls in, this Pokémon hunkers\ndown in the snow to avoid getting blown away."
        fr:
          sword: "À force de vivre au milieu des sommets enneigés,\nce Pokémon a développé une carapace de glace\ndure comme l’acier."
          shield: "Il vit dans les monts enneigés d’une île tropicale.\nLorsque le blizzard souffle, il s’enfonce dans\nla neige pour ne pas se faire emporter."
        it:
          sword: "Vivendo in zone montuose gelide e impenetrabili\nha sviluppato un corpo di ghiaccio duro come\nl’acciaio."
          shield: "Vive sulle montagne innevate di un’isola del sud.\nDurante le bufere resta immobile sotto la neve\nper non essere spazzato via dal vento."
        de:
          sword: "Da es in einer durch Schnee abgeschotteten\nBergregion lebt, hat es sich einen stahlharten\nKörper aus Eis angeeignet."
          shield: "Die verschneiten Berge einer südlichen Insel sind\nseine Heimat. Bei Schneestürmen verharrt es\nunter Schnee, um nicht weggeweht zu werden."
        es:
          sword: "Ha desarrollado un caparazón de hielo duro\ncomo el acero para adaptarse a las montañas\nde nieves perpetuas donde habita."
          shield: "Vive en las montañas nevadas de una isla sureña.\nSi se alza una ventisca, se protege ocultándose\nbajo la nieve hasta que amaina el temporal."
        ko:
          sword: "눈으로 봉쇄된 산악 지대에\n사는 동안 얼음으로 된\n강철처럼 단단한 몸을 갖게 되었다."
          shield: "남쪽 섬의 설산에 산다.\n눈보라가 칠 때는 눈 속에 웅크려\n휩쓸리지 않도록 가만히 버틴다."
        zh_simp:
          sword: "栖息于被雪包围着的\n山岳地带，因此获得了\n钢铁般坚硬的冰雪之躯。"
          shield: "栖息在南方海岛的雪山上。\n刮起暴风雪时，为了不被吹飞，\n会趴在雪里一动不动地忍耐。"
        zh_trad:
          sword: "長期住在冰天雪地的\n山岳地帶，因此獲得了\n像鋼鐵般堅硬的冰晶身體。"
          shield: "棲息在南方之島的雪山裡。\n颳起暴風雪時會趴在雪地上\n一動也不動，以免被吹飛。"
sandslash:
  species_id: 28
  names:
