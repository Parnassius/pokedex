        jp_kana:
          sword: "おしりから　あいての　かお　めがけて\nものすごく　くさい　しるを　とばす。\nしるは　５メートルさきまで　とどく。"
          shield: "しっぽを　あげて　おしりを　むけたら\nようちゅうい。　きぜつ　するほど\nくさい　しるを　とばす　まえぶれ。"
        jp_kanji:
          sword: "おしりから　相手の　顔を　めがけて\nものすごく　臭い　汁を　飛ばす。\n汁は　５メートル先まで　とどく。"
          shield: "尻尾を　あげて　お尻を　向けたら\n要注意。　気絶　するほど\n臭い　汁を　飛ばす　前触れ。"
        en:
          sword: "From its rear, it sprays a foul-smelling liquid at\nopponents. It aims for their faces, and it can hit\nthem from over 16 feet away."
          shield: "If it lifts its tail and points its rear at you, beware.\nIt’s about to spray you with a fluid stinky enough\nto make you faint."
        fr:
          sword: "Il propulse un liquide extrêmement nauséabond\nau visage de son adversaire depuis son derrière.\nIl peut atteindre une cible à cinq mètres."
          shield: "S’il lève la queue, c’est qu’il s’apprête à projeter\nun liquide tellement nauséabond qu’il peut faire\nperdre connaissance."
        it:
          sword: "Spruzza un fluido puzzolente dal posteriore\nmirando al muso dell’avversario. Lo spruzzo\npuò arrivare fino 5 m di distanza."
          shield: "Se mostra il posteriore alzando la coda, bisogna\nfare attenzione: sta per spruzzare un fluido così\nmaleodorante da far perdere i sensi."
        de:
          sword: "Aus seinem Hinterleib sprüht es Gegnern eine\nfürchterlich stinkende Flüssigkeit ins Gesicht.\nDabei hat es eine Reichweite von bis zu 5 m."
          shield: "Dreht es einem den Hinterleib zu und hebt seinen\nSchweif, versprüht es kurz darauf eine Flüssigkeit,\ndie so sehr stinkt, dass sie einem die Sinne raubt."
        es:
          sword: "Expulsa un líquido de olor nauseabundo por sus\ncuartos traseros con el que puede acertar a su\nenemigo en el rostro a 5 m de distancia."
          shield: "Si levanta la cola y apunta los cuartos traseros,\nes señal de que se dispone a expulsar un líquido\ncuyo hedor llega a provocar desmayos."
        ko:
          sword: "엉덩이를 상대의 얼굴에 겨냥해서\n엄청나게 역한 분비액을 뿜는다.\n분비액은 5m 떨어진 곳까지 닿는다."
          shield: "꼬리를 들고 엉덩이를 돌리면\n주의해야 한다. 기절할 정도로\n악취 나는 분비액을 날릴 전조인 것이다."
        zh_simp:
          sword: "瞄准对手的脸，从屁股\n喷出奇臭无比的液体。\n液体能喷到５米开外。"
          shield: "要是它翘起尾巴把屁股对准了你，\n请一定要小心。因为这表示它将要\n喷出足以让人窒息的臭液。"
        zh_trad:
          sword: "瞄準對手的臉，從屁股\n噴出奇臭無比的液體。\n液體能噴到５公尺外。"
          shield: "要是牠翹起尾巴把屁股對準了你，\n請一定要小心。因為這表示牠將要\n噴出足以讓人窒息的臭液。"
