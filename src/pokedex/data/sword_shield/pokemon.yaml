          shield: "つちを　たべて　つくった　どろを\nあしに　ぬりつけると　あくろでも\nすべらず　あるけるようになるのだ。"
        jp_kanji:
          sword: "体重の　５０倍の　荷物を\n軽々と　運ぶ　力持ち。\n泥の　扱いに　長けている。"
          shield: "土を　食べて　つくった　泥を\n脚に　塗りつけると　悪路でも\n滑らず　歩けるようになるのだ。"
        en:
          sword: "Loads weighing up to 50 times as much as its\nown body weight pose no issue for this Pokémon.\nIt’s skilled at making use of mud."
          shield: "It eats dirt to create mud and smears this mud all\nover its feet, giving them the grip needed to walk\non rough terrain without slipping."
        fr:
          sword: "Il est si fort qu’il peut aisément porter des charges\nallant jusqu’à 50 fois son poids.\nC’est un expert dans l’art d’utiliser la boue."
          shield: "Il mâche de la terre pour créer une boue dont\nil s’enduit les jambes. Celle-ci lui permet alors\nd’arpenter même les routes accidentées."
        it:
          sword: "È così forte da riuscire a trasportare carichi\n50 volte più pesanti del proprio corpo.\nEccelle nell’utilizzo del fango."
          shield: "Ricoprendosi le zampe con il fango che produce\nmasticando terra riesce a percorrere senza\nscivolare anche i sentieri più accidentati."
        de:
          sword: "Es ist kräftig genug, um problemlos das 50-fache\nseines Gewichts tragen zu können. Im Umgang\nmit Schlamm ist es sehr geschickt."
          shield: "Es frisst Erde und verwandelt sie in Schlamm, den\nes an seine Hufe schmiert. Damit kann es selbst\nunwegsames Gelände ohne Rutschen überqueren."
        es:
          sword: "Puede llevar sin dificultad cargas cuyo peso sea\n50 veces superior al suyo. Utiliza el lodo con\nsuma destreza."
          shield: "Tras recubrir sus patas con el lodo que crea\nmasticando tierra, puede recorrer los peores\ncaminos sin temor a resbalar."
        ko:
          sword: "체중의 50배에 달하는 짐을\n가볍게 운반할 정도로 힘이 장사다.\n진흙을 다루는 데에 능하다."
          shield: "흙을 먹어서 만든 진흙을\n다리에 바르면 험한 길에서도\n미끄러지지 않고 걸을 수 있게 된다."
        zh_simp:
          sword: "力气很大，能轻松搬运\n比自己重５０倍的货物。\n非常擅长使用泥巴。"
          shield: "在把自己吃土制造出的泥巴\n涂在脚上之后，无论走在路况\n多么差的路上都不会打滑。"
        zh_trad:
          sword: "力氣很大，能輕鬆搬運\n比自己重５０倍的貨物。\n非常擅長使用泥巴。"
          shield: "在把自己吃土製造出的泥巴\n塗在腳上之後，無論走在路況\n多麼差的路上都不會打滑。"
mudsdale:
  species_id: 750
  names:
    jp_kana: バンバドロ
    jp_kanji: バンバドロ
