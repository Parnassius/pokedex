      descriptions:
        jp_kana:
          sword: "ガラルの　いたるところに　いる。\nさゆうの　ほっぺに　きのみを\nたくわえていないと　ふあん。"
          shield: "つねに　きのみを　くっているので\nみかけいじょうに　タフ。　きのみを\nねらって　はたけに　あらわれる。"
        jp_kanji:
          sword: "ガラルの　いたるところに　いる。\n左右の　ほっぺに　木の実を\n蓄えていないと　不安。"
          shield: "つねに　木の実を　食っているので\n見かけ以上に　タフ。　木の実を\n狙って　畑に　現れる。"
        en:
          sword: "Found throughout the Galar region, this Pokémon\nbecomes uneasy if its cheeks are ever completely\nempty of berries."
          shield: "It eats berries nonstop—a habit that has made\nit more resilient than it looks. It’ll show up on\nfarms, searching for yet more berries."
        fr:
          sword: "On le trouve partout à Galar. S’il n’a pas de Baies\nen réserve dans ses deux joues, il devient anxieux."
          shield: "Comme il mange tout le temps des Baies, il est\nplus costaud qu’il n’en a l’air. Il parcourt les\nchamps à la recherche de sa précieuse denrée."
        it:
          sword: "Si trova ovunque a Galar. Se non ha una scorta\ndi bacche dentro le guance, si fa prendere\ndall’ansia."
          shield: "Per via dell’abitudine di mangiare senza sosta,\nè più forte di quanto possa sembrare. Fa incetta\ndi bacche nei campi coltivati."
        de:
          sword: "Es ist überall in der Galar-Region anzutreffen.\nHat es keine Beeren, die es in seinen beiden\nBacken horten kann, wird es unruhig."
          shield: "Da es unentwegt Beeren futtert, ist es zäher als\nes aussieht. Man sieht es oft auf Feldern, wo es\nnach Beeren sucht."
        es:
          sword: "Este Pokémon se encuentra por todo Galar.\nNo se queda tranquilo hasta que tiene ambos\ncarrillos atiborrados de bayas."
          shield: "Siempre están comiendo bayas, por lo que son\nmás robustos de lo que aparentan. Frecuentan\nlos huertos en busca de su preciado manjar."
        ko:
          sword: "가라르의 여기저기에 있다.\n양쪽 볼에 나무열매를\n비축해두지 않으면 불안해한다."
          shield: "항상 나무열매를 먹고 있어\n보기보다 튼튼하다. 나무열매를\n노리고 밭에 출몰한다."
        zh_simp:
          sword: "在伽勒尔随处可见。\n如果不往两边的颊囊里\n塞满树果，就会感到不安。"
          shield: "由于它无论何时都在吃树果，\n使得它比外表看起来还要顽强。\n会出现在田地里寻找树果。"
        zh_trad:
          sword: "在伽勒爾隨處可見。\n如果不往兩邊的頰囊裡\n塞滿樹果，就會感到不安。"
          shield: "由於牠無論何時都在吃樹果，\n使得牠比外表看起來還要頑強。\n會出現在田地裡尋找樹果。"
greedent:
  species_id: 820
  names:
    jp_kana: ヨクバリス
    jp_kanji: ヨクバリス
    en: Greedent
    fr: Rongrigou
    it: Greedent
    de: Schlaraffel
    es: Greedent
    ko: 요씽리스
    zh_simp: 藏饱栗鼠
    zh_trad: 藏飽栗鼠
  forms:
    greedent:
      form_id: 0
      base_stats:
        hp: 120
