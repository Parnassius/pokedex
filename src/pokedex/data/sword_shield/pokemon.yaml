        en:
          sword: "There are a slew of stories about villages that\nwere destroyed by Hydreigon. It bites anything\nthat moves."
          shield: "The three heads take turns sinking their teeth into\nthe opponent. Their attacks won’t slow until their\ntarget goes down."
        fr:
          sword: "Il dévore tout ce qui bouge. Bon nombre\nde légendes mentionnent des villages entiers\nrasés par un Trioxhydre."
          shield: "Chacune de ses trois têtes mord à tour de rôle.\nIl attaque ses adversaires sans relâche,\njusqu’à ce qu’ils s’écroulent."
        it:
          sword: "Azzanna tutto ciò che si muove. Sono molte\nle storie che narrano di villaggi rasi al suolo\nda questo Pokémon."
          shield: "Le sue tre teste si alternano nel mordere e\nnon cessa i suoi attacchi fino a quando\nl’avversario non ha più energie."
        de:
          sword: "Es beißt alles, was sich bewegt. In zahlreichen\nalten Sagen wird von Trikephalo berichtet, die\nganze Dörfer in Schutt und Asche gelegt haben."
          shield: "Im Kampf beißen die drei Köpfe abwechselnd zu\nund lassen nicht ab, bis ihr Opfer am Boden liegt."
        es:
          sword: "Ataca y devora todo lo que se mueve. Existen\nnumerosos relatos de pueblos enteros que fueron\narrasados por este Pokémon."
          shield: "Sus tres cabezas se alternan para dar mordiscos\ny no cejarán en su ataque hasta que el rival haya\ncaído redondo."
        ko:
          sword: "움직이는 모든 것을 먹어 치운다.\n삼삼드래에게 마을이 파괴되었다는\n이야기는 많이 전해 내려온다."
          shield: "3개의 머리로 번갈아 가며\n물어뜯는다. 상대가 쓰러질 때까지\n공격을 멈추지 않는다."
        zh_simp:
          sword: "会咬住一切会动的物体。\n有不少传说里都提到了\n三首恶龙毁灭村庄的故事。"
          shield: "３个头会轮流去咬敌人。\n在对方倒下之前，\n绝对不会停止攻击。"
        zh_trad:
          sword: "會咬住一切會動的物體。\n有不少傳說裡都提到了\n三首惡龍毀滅村莊的故事。"
          shield: "３個頭會輪流去咬敵人。\n在對方倒下之前，\n絕對不會停止攻擊。"
