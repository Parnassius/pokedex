          shield: "かざんの　かこうで　くらすうちに\nマグマだまりに　にた　きかんを　もつ\nかざんのような　からだに　なった。"
        jp_kanji:
          sword: "大きく　息を　吸いこむと　腹の\n中の　炎が　勢いを　増して\n摂氏２０００度に　達する。"
          shield: "火山の　火口で　暮らすうちに\nマグマだまりに　似た　器官を　持つ\n火山のような　体に　なった。"
        en:
          sword: "When Magmortar inhales deeply, the fire burning\nin its belly intensifies, rising in temperature to\nover 3,600 degrees Fahrenheit."
          shield: "Living in the crater of a volcano has caused this\nPokémon’s body to resemble its environment—\nit has an organ similar to a magma chamber."
        fr:
          sword: "Quand il inspire profondément, les flammes\ndans son ventre gagnent en intensité et\natteignent les 2 000 °C."
          shield: "Au fil du temps, son corps est devenu similaire\nà un volcan, et un de ses organes ressemble\ndésormais à une chambre magmatique."
        it:
          sword: "Quando respira profondamente, le fiamme\nall’interno del suo ventre aumentano d’intensità,\nraggiungendo i 2.000 ºC."
          shield: "Vivendo nei crateri il suo corpo è diventato\nsimile a un vulcano, sviluppando un organo\nanalogo a una camera magmatica."
        de:
          sword: "Holt es tief Luft, werden die Flammen in seinem\nBauch stärker und erreichen eine Temperatur von\n2 000 ºC."
          shield: "Durch das Leben in Vulkankratern ähnelt\nMagbrants Körper seinem Umfeld. Es besitzt\nein Organ, das einer Magmakammer gleicht."
        es:
          sword: "Al respirar profundamente, el fuego del interior\nde su vientre gana intensidad y puede alcanzar\nlos 2000 ºC."
          shield: "Al vivir en un cráter, su cuerpo ha adquirido un\naspecto similar al de un volcán y ha desarrollado\nun órgano parecido a una cámara magmática."
        ko:
          sword: "크게 숨을 들이쉬면 배 안의\n불꽃이 더욱 거세어져서\n섭씨 200도에 달하게 된다."
          shield: "화산의 화구에서 사는 동안\n마그마 덩어리 모양의 기관을 가진\n화산 같은 몸이 되었다."
        zh_simp:
          sword: "大口吸气之后腹中的\n火焰就会烧得更旺，\n达到摄氏２０００度。"
          shield: "由于栖息在火山口，因此\n身体逐渐变得像火山一样，\n还长着类似岩浆库的器官。"
        zh_trad:
          sword: "大口吸氣時，肚子裡的\n火焰就會燃燒得更旺盛，\n達到攝氏２０００度。"
          shield: "長久棲息在火山口，使得\n牠的身體變得像是一座火山，\n甚至擁有類似岩漿庫的器官。"
