bunnelby:
  species_id: 659
  names:
    jp_kana: ホルビー
    jp_kanji: ホルビー
    en: Bunnelby
    fr: Sapereau
    it: Bunnelby
    de: Scoppel
    es: Bunnelby
    ko: 파르빗
    zh_simp: 掘掘兔
    zh_trad: 掘掘兔
  forms:
    bunnelby:
      form_id: 0
      base_stats:
        hp: 38
        attack: 36
        defense: 38
        special_attack: 32
        special_defense: 36
        speed: 57
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - normal
      egg_groups:
        - field
      abilities:
        - pickup
        - cheek_pouch
      hidden_ability: huge_power
      descriptions:
        jp_kana:
          sword: "みみで　あなを　ほるのが　とくい。\nちか１０メートルに　とどく　すあなを\nひとばんで　つくってしまう。"
          shield: "きけんに　びんかん。　アーマーガアの\nはおとを　ききとると　あっというまに\nあなを　ほって　じめんに　もぐる。"
        jp_kanji:
          sword: "耳で　穴を　掘るのが　得意。\n地下１０メートルに　とどく　巣穴を\n一晩で　つくってしまう。"
          shield: "危険に　敏感。　アーマーガアの\n羽音を　聴きとると　あっという間に\n穴を　掘って　地面に　潜る。"
        en:
          sword: "It excels at digging holes. Using its ears, it can\ndig a nest 33 feet deep in one night."
          shield: "It’s very sensitive to danger. The sound of\nCorviknight’s flapping will have Bunnelby\ndigging a hole to hide underground in moments."
        fr:
          sword: "Il est très doué pour creuser avec ses oreilles.\nIl peut forer un terrier atteignant dix mètres\nde profondeur en une nuit."
          shield: "Il est sensible au danger. Lorsqu’il entend\nle battement d’ailes de Corvaillus, il creuse\nprestement un terrier et s’y cache."
        it:
          sword: "Usa abilmente le orecchie per scavare buche\nnel terreno. Gli basta una notte per scavare\nuna tana profonda 10 m."
          shield: "È sempre all’erta contro i pericoli. Se percepisce\nil battito d’ali di Corviknight scava una buca\ne si nasconde sotto terra."
        de:
          sword: "Mit den Ohren schaufelt es Löcher. Es braucht nur\neine Nacht, um einen 10 m tiefen Bau zu graben."
          shield: "Es ist permanent in Alarmbereitschaft. Sobald es\ndie Flügel eines Krarmors rascheln hört, gräbt es\nein Loch und verschwindet im Boden."
        es:
          sword: "Usa hábilmente las orejas para hacer hoyos. Es\ncapaz de excavar una madriguera a 10 m bajo\ntierra en una sola noche."
          shield: "Está en alerta permanente. En cuanto oye el batir\nde alas de un Corviknight, cava un agujero y se\noculta bajo tierra."
        ko:
          sword: "귀로 구멍을 파는 것이 특기다.\n지하 10m에 달하는 굴을\n하룻밤 만에 만들어버린다."
          shield: "위험에 민감하다. 아머까오의\n날갯소리를 들으면 눈 깜짝할 사이에\n구멍을 파고 땅으로 숨어든다."
        zh_simp:
          sword: "擅长用耳朵挖洞。\n只需一个晚上就能挖出\n深至地下１０米的巢穴。"
          shield: "对危险很敏感。只要听到\n钢铠鸦拍打翅膀的声音，\n就会马上挖洞钻进地下藏身。"
        zh_trad:
          sword: "擅長用耳朵挖洞。\n只需一個晚上就能挖出\n深至地下１０公尺的巢穴。"
          shield: "對危險很敏感。只要聽到\n鋼鎧鴉拍打翅膀的聲音，\n就會馬上挖洞鑽進地下藏身。"
diggersby:
  species_id: 660
  names:
    jp_kana: ホルード
    jp_kanji: ホルード
    en: Diggersby
    fr: Excavarenne
    it: Diggersby
    de: Grebbit
    es: Diggersby
    ko: 파르토
    zh_simp: 掘地兔
    zh_trad: 掘地兔
  forms:
    diggersby:
      form_id: 0
      base_stats:
        hp: 85
        attack: 56
        defense: 77
        special_attack: 50
        special_defense: 77
        speed: 78
      evs_yield:
        hp: 2
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - normal
        - ground
      egg_groups:
        - field
      abilities:
        - pickup
        - cheek_pouch
      hidden_ability: huge_power
      descriptions:
        jp_kana:
          sword: "ショベルカーに　まけない　パワーで\nかたい　がんばんも　ほりすすむ。\nトンネルこうじで　だいかつやく。"
          shield: "おなかの　たいもうは　ほおんせいに\nすぐれる。　むかしの　ひとは　ぬけた\nたいもうで　ぼうかんぎを　つくった。"
        jp_kanji:
          sword: "ショベルカーに　負けない　パワーで\n硬い　岩盤も　掘り進む。\nトンネル工事で　大活躍。"
          shield: "お腹の　体毛は　保温性に\n優れる。　昔の　人は　抜けた\n体毛で　防寒着を　つくった。"
        en:
          sword: "With power equal to an excavator, it can dig\nthrough dense bedrock. It’s a huge help during\ntunnel construction."
          shield: "The fur on its belly retains heat exceptionally\nwell. People used to make heavy winter clothing\nfrom fur shed by this Pokémon."
        fr:
          sword: "Aussi puissant qu’une pelleteuse, il peut venir\nà bout de la roche la plus dure. On fait souvent\nappel à lui pour forer des tunnels."
          shield: "La fourrure de son ventre est un excellent isolant\nthermique. Jadis, on fabriquait des vêtements\nchauds en se servant de sa mue."
        it:
          sword: "Riesce a scavare strati rocciosi durissimi grazie\nalla sua forza pari a quella di una scavatrice.\nÈ di grande aiuto nei lavori di scavo dei tunnel."
          shield: "La pelliccia sul suo addome lo mantiene caldo.\nGli antichi confezionavano abiti termici resistenti\nal freddo con il pelo raccolto dopo la sua muta."
        de:
          sword: "Seine Stärke gleicht der eines Baggers, sodass es\nsich durch harte Gesteinsschichten graben kann.\nEs leistet großartige Arbeit beim Tunnelbau."
          shield: "Das Fell an seinem Bauch hält es schön warm.\nFrüher haben die Menschen daraus Kleidung\ngefertigt, die sie vor Kälte schützte."
        es:
          sword: "Puede horadar incluso el duro sustrato rocoso\ncon la fuerza de una excavadora, por lo que su\nayuda resulta inestimable para construir túneles."
          shield: "El pelaje de su abdomen es un aislante térmico\nexcelente, tanto que antaño se usaba el que\nmudaba para confeccionar prendas de abrigo."
        ko:
          sword: "굴착기에 뒤지지 않는 파워로\n단단한 암반도 파고 들어간다.\n터널 공사에서 크게 활약한다."
          shield: "배의 털은 보온성이 뛰어나다.\n옛날 사람들은 파르토의 몸에서\n빠진 털로 방한복을 만들었다."
        zh_simp:
          sword: "力量不亚于挖掘机，\n连坚硬的岩盘也能挖掘。\n在隧道建设工程中十分活跃。"
          shield: "肚子上的体毛保温性能优秀。\n在过去，人们会用它的落毛\n来制作保暖服装。"
        zh_trad:
          sword: "力量不亞於挖掘機，\n連堅硬的岩盤也能挖掘。\n在隧道建設工程中十分活躍。"
          shield: "肚子上的體毛保溫性能優秀。\n在過去，人們會用牠掉落的毛\n來製作保暖服裝。"
fletchling:
  species_id: 661
  names:
    jp_kana: ヤヤコマ
    jp_kanji: ヤヤコマ
    en: Fletchling
    fr: Passerouge
    it: Fletchling
    de: Dartiri
    es: Fletchling
