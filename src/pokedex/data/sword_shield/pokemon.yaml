      descriptions:
        jp_kana:
          sword: "だれかが　しぬ　ちょくぜんに\nあらわれる　ことから　しにがみの\nつかい　として　おそれられている。"
          shield: "ランプの　ふりをして　まちなかに\nひそむ。　しきが　ちかい　ひとを\nみつけると　そっと　あとを　つける。"
        jp_kanji:
          sword: "誰かが　死ぬ　直前に\n現れる　ことから　死神の使い\nとして　恐れられている。"
          shield: "ランプの　ふりをして　町中に\n潜む。　死期が　近い　人を\n見つけると　そっと　後を　つける。"
        en:
          sword: "This Pokémon appears just before someone\npasses away, so it’s feared as an emissary\nof death."
          shield: "It lurks in cities, pretending to be a lamp.\nOnce it finds someone whose death is near,\nit will trail quietly after them."
        fr:
          sword: "Comme il apparaît dès qu’une personne\nest sur le point de trépasser, les gens le craignent\net le prennent pour un messager de la mort."
          shield: "Il se cache en ville en se faisant passer pour\nun lampadaire. Lorsqu’il repère une personne\ndont l’heure est proche, il la suit en catimini."
        it:
          sword: "Appare quando qualcuno sta per morire.\nPer questo motivo è considerato l’aiutante\ndella divinità della morte ed è molto temuto."
          shield: "Si mimetizza nel paesaggio cittadino fingendosi\nuna lampada. Quando incontra una persona\nprossima alla morte, la segue silenzioso."
        de:
          sword: "Es wird als Todesbote gefürchtet, da es oft in der\nNähe von Menschen auftaucht, deren Ende kurz\nbevorsteht."
          shield: "Es gibt sich als Lampe aus und lungert in Städten\nherum. Entdeckt es einen Menschen, dessen\nTodesstunde naht, folgt es ihm leise."
        es:
          sword: "Es considerado y temido como Pokémon de\nmal agüero, ya que aparece en los instantes\nprevios al fallecimiento de alguien."
          shield: "Se oculta en entornos urbanos haciéndose pasar\npor una lámpara corriente. Si se topa con alguien\nmoribundo, lo sigue en silencio."
        ko:
          sword: "누군가가 죽기 직전에\n나타나기 때문에 사신의 사자로\n여겨져 두려움의 대상이 되었다."
          shield: "램프인 척 마을 안으로\n숨어든다. 죽음이 다가온 사람을\n발견하면 조용히 뒤를 쫓는다."
        zh_simp:
          sword: "由于它会在人类临终时出现，\n人们认为它是死神的\n使者，对它畏惧不已。"
          shield: "伪装成灯的样子藏身在城镇里。\n一旦发现了临近死期的人，\n便会悄悄地跟在后面。"
        zh_trad:
          sword: "由於牠會在人類臨終時出現，\n人們因此認為牠是死神\n的使者，對牠畏懼不已。"
          shield: "偽裝成燈的樣子藏身在城鎮裡。\n一旦發現了臨近死期的人，\n便會悄悄地跟在後面。"
