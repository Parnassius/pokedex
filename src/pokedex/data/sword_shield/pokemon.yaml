          shield: "ＡＩ機能を　搭載した　結果\nポリゴン２　同士にしか　わからない\n謎の　言語を　話しはじめた。"
        en:
          sword: "This is a Porygon that was updated with special\ndata. Porygon2 develops itself by learning about\nmany different subjects all on its own."
          shield: "After artificial intelligence was implemented in\nPorygon2, the Pokémon began using a strange\nlanguage that only other Porygon2 understand."
        fr:
          sword: "Fruit de la mise à jour d’un Porygon avec\ndes données spéciales, il peut apprendre\net se développer de manière autonome."
          shield: "Depuis qu’on l’a doté d’une intelligence\nartificielle, il parle un langage mystérieux\nque seuls ses congénères comprennent."
        it:
          sword: "È un Porygon aggiornato con dei dati particolari.\nCresce imparando autonomamente svariate cose."
          shield: "Dopo essere stati dotati d’intelligenza artificiale,\ni Porygon2 hanno cominciato a parlare fra di loro\nutilizzando una lingua misteriosa."
        de:
          sword: "Durch ein Update mit besonderen Daten wurde\nPorygon zu Porygon2. Es erweitert sein Wissen,\nindem es selbstständig verschiedene Dinge lernt."
          shield: "Als es mit künstlicher Intelligenz ausgestattet\nwurde, begann es, eine rätselhafte Sprache zu\nsprechen, die nur andere Porygon2 verstehen."
        es:
          sword: "Se trata de una versión mejorada de Porygon\nmediante un software especial. Tiene capacidad\nde aprendizaje autónomo."
          shield: "Al dotarlo de inteligencia artificial, desarrolló un\nmisterioso lenguaje que solo los miembros de su\nespecie son capaces de comprender."
        ko:
          sword: "폴리곤을 특별한 데이터로\n업데이트했다. 다양한 것을\n스스로 배우고 성장한다."
          shield: "AI 기능을 탑재한 결과\n폴리곤2끼리만 통하는 수수께끼의\n언어로 말하기 시작했다."
        zh_simp:
          sword: "通过特别的数据使多边兽\n得以升级。能自己学会\n各种各样的事情实现成长。"
          shield: "在装载了ＡＩ功能后，\n多边兽２型便开始用只有彼此\n能懂的神秘语言互相交流了。"
        zh_trad:
          sword: "利用特別的數據升級了\n的多邊獸。會自己學習\n各式各樣的事物來成長。"
          shield: "搭載了ＡＩ功能後，開始\n說起了只有多邊獸Ⅱ彼此\n之間才能了解的神秘語言。"
