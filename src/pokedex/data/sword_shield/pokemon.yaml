          shield: "はげしい　いかりに　かられると\nもうれつな　れいきを　ふきだして\nあたりいちめんを　こおりづけにする。"
        jp_kanji:
          sword: "化石から　復元された。\nアマルルガが　吠えると　夜空に\nオーロラが　現れると　いう。"
          shield: "激しい　怒りに　かられると\n猛烈な　冷気を　噴き出して\nあたり一面を　氷漬けにする。"
        en:
          sword: "Aurorus was restored from a fossil. It’s said that\nwhen this Pokémon howls, auroras appear in the\nnight sky."
          shield: "When gripped by rage, Aurorus will emanate\nfreezing air, covering everything around it in ice."
        fr:
          sword: "Ce Pokémon a été ressuscité à partir d’un fossile.\nOn raconte qu’une aurore boréale apparaît dans\nle ciel nocturne quand il hurle à la lune."
          shield: "Lorsqu’il se laisse emporter par sa rage,\nil relâche des bourrasques glacées\nqui gèlent tout ce qui l’entoure."
        it:
          sword: "È stato rigenerato da un fossile. Si dice che\nquando Aurorus ulula, nel cielo notturno\ncompaia l’aurora boreale."
          shield: "Quando è in preda all’ira emette un getto\nviolento di aria gelida che congela tutto ciò\nche lo circonda."
        de:
          sword: "Es wurde aus einem Fossil zurückverwandelt.\nWenn es seinen Ruf erschallen lässt, sollen\nPolarlichter am Nachthimmel erscheinen."
          shield: "Wenn es von wildem Zorn erfüllt ist, entströmt\nihm gewaltige Kälte, die seine ganze Umgebung\neinfriert."
        es:
          sword: "Fue regenerado a partir de un fósil. Dicen que el\nrugido de Aurorus hace aparecer la aurora boreal\nen el cielo nocturno."
          shield: "Cuando se deja llevar por la ira, emite un vaho\nextremadamente gélido que lo congela todo a\nsu alrededor."
        ko:
          sword: "화석에서 복원됐다.\n아마루르가가 울부짖으면 밤하늘에\n오로라가 나타난다고 한다."
          shield: "격렬한 분노에 사로잡히면\n맹렬하게 냉기를 뿜어내\n주변을 모두 얼어붙게 한다."
        zh_simp:
          sword: "从化石复原而来。\n据说当冰雪巨龙吼叫时，\n夜空中就会出现极光。"
          shield: "当它被激怒时，\n就会喷出猛烈的冷气，\n把周围都冰封起来。"
        zh_trad:
          sword: "從化石復原的寶可夢。\n據說當冰雪巨龍吼叫時，\n夜空中就會出現極光。"
          shield: "當牠大大地被激怒時，\n就會噴出猛烈的冰氣\n讓周圍一帶全被冰封。"
