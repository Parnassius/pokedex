      descriptions:
        jp_kana:
          sword: "いわのように　かたい　ウロコと\nあぶらの　つまった　うきぶくろで\nしんかいの　すいあつに　たえる。"
          shield: "しんかいちょうさで　はっけんされた。\n１おくねんかん　すがたが　かわらず\nいきているかせき　と　よばれている。"
        jp_kanji:
          sword: "岩のように　硬い　ウロコと\n脂の　詰まった　浮袋で\n深海の　水圧に　耐える。"
          shield: "深海調査で　発見された。\n１億年間　姿が　変わらず\n生きている化石　と　呼ばれている。"
        en:
          sword: "Rock-hard scales and oil-filled swim bladders\nallow this Pokémon to survive the intense water\npressure of the deep sea."
          shield: "This Pokémon was discovered during deep-sea\nexploration. Its appearance hasn’t changed in\n100,000,000 years, so it’s called a living fossil."
        fr:
          sword: "Il peut supporter la pression des profondeurs\ngrâce à ses écailles aussi solides que le roc et\nà ses vessies natatoires remplies de graisse."
          shield: "Découvert lors d’une expédition dans les abysses,\nson apparence inchangée depuis 100 millions\nd’années lui a valu le surnom de « fossile vivant »."
        it:
          sword: "Riesce a sopportare la pressione degli abissi\nmarini grazie alle sue scaglie dure come la roccia\ne alle vesciche natatorie piene di grasso."
          shield: "Scoperto durante una perlustrazione degli abissi\nmarini, viene chiamato “fossile vivente” per via\ndel suo aspetto, immutato da 100 milioni di anni."
        de:
          sword: "Dank seiner steinharten Schuppen und mit\nFett gefüllten Schwimmblasen kann es dem\nWasserdruck der Tiefsee standhalten."
          shield: "Es wurde auf einer Tiefsee-Expedition entdeckt.\nMan nennt es ein „lebendes Fossil“, da es sich\nseit 100 Millionen Jahren nicht verändert hat."
        es:
          sword: "Es capaz de soportar la alta presión del fondo\nmarino gracias a sus escamas, duras como rocas,\ny a sus vejigas natatorias llenas de grasa."
          shield: "Fue descubierto durante una expedición marina.\nSe lo considera un fósil viviente, pues no ha\ncambiado en cien millones de años."
        ko:
          sword: "바위처럼 단단한 비늘과\n기름으로 가득 찬 부레로\n심해의 수압을 견딘다."
          shield: "심해 조사를 통해 발견되었다.\n1억 년 동안 모습이 변하지 않아\n살아 있는 화석이라고 불린다."
        zh_simp:
          sword: "如岩石般坚硬的鳞片\n和富含脂肪的浮囊使它\n能够耐得住深海的水压。"
          shield: "在深海调查中被发现的宝可梦。\n样子在１亿年间都没有任何变化，\n被人们称为活化石。"
        zh_trad:
          sword: "如岩石般堅硬的鱗片\n以及裝滿了油脂的鰾囊，\n讓牠能承受深海的水壓。"
          shield: "在深海調查中被發現的寶可夢。\n樣子在１億年之間都沒有變化，\n被人們稱為活化石。"
bagon:
  species_id: 371
  names:
    jp_kana: タツベイ
    jp_kanji: タツベイ
    en: Bagon
    fr: Draby
    it: Bagon
    de: Kindwurm
    es: Bagon
    ko: 아공이
    zh_simp: 宝贝龙
    zh_trad: 寶貝龍
  forms:
