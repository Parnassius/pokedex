      types:
        - dark
        - normal
      egg_groups:
        - field
      abilities:
        - pickup
        - gluttony
      hidden_ability: quick_feet
      descriptions:
        jp_kana:
          sword: "ながいしたで　えものを　ちょうはつ。\nおこった　あいてに　きょうれつな\nタックルを　おみまい　するぞ。"
          shield: "とても　こうせんてきな　せいしつ。\nじぶんより　かくうえの　あいてにも\nへいきで　いどむ　むこうみず。"
        jp_kanji:
          sword: "長い舌で　獲物を　挑発。\n怒った　相手に　強烈な\nタックルを　おみまい　するぞ。"
          shield: "とても　好戦的な　性質。\n自分より　格上の　相手にも\n平気で　挑む　むこうみず。"
        en:
          sword: "It uses its long tongue to taunt opponents.\nOnce the opposition is enraged, this Pokémon hurls\nitself at the opponent, tackling them forcefully."
          shield: "This very aggressive Pokémon will recklessly\nchallenge opponents stronger than itself."
        fr:
          sword: "Il provoque ses adversaires avec sa longue langue\npour les mettre en colère avant de les plaquer\nau sol avec un puissant tacle."
          shield: "Il a un caractère extrêmement bagarreur.\nIl provoque ses adversaires sur un coup de tête,\nmême s’ils sont bien plus grands et forts que lui."
        it:
          sword: "Provoca l’avversario con la sua lingua lunga\ne, dopo averlo mandato su tutte le furie,\nlo attacca con spintoni poderosi."
          shield: "Ha un’indole molto bellicosa. È così sconsiderato\nda affrontare avversari molto più forti di lui senza\npensarci due volte."
        de:
          sword: "Mit seiner langen Zunge provoziert es seine\nBeute, bis diese vor Wut kocht. Danach rammt\nes sie mit voller Wucht."
          shield: "Es ist sehr angriffslustig und schreckt auch nicht\ndavor zurück, sich mit Gegnern anzulegen, die\nihm haushoch überlegen sind."
        es:
          sword: "Provoca a sus presas con su larga lengua y\narremete con fuerza contra ellas cuando montan\nen cólera."
          shield: "Posee un carácter beligerante y temerario. Hace\nfrente impávidamente a oponentes mucho más\nfuertes que él."
        ko:
          sword: "긴 혀로 먹잇감을 도발한다.\n화가 난 상대에게\n강렬한 태클을 선사한다."
          shield: "매우 호전적인 성질을 가졌다.\n자신보다 강한 상대에게도\n개의치 않고 무모하게 덤빈다."
        zh_simp:
          sword: "会用长舌头挑衅猎物。\n一旦猎物被自己激怒，\n便会猛烈地冲撞上去。"
          shield: "有着十分好战的性情。\n即使是比自己强的对手\n也会鲁莽地发起挑战。"
        zh_trad:
          sword: "會用長舌頭挑釁獵物。\n一旦獵物被自己激怒，\n便會猛烈地衝撞上去。"
          shield: "有著十分好戰的性情。\n即使是比自己強的對手\n也會魯莽地發起挑戰。"
lotad:
