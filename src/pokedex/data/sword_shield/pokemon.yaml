        jp_kana:
          sword: "あたまは　わるいが　ちからが　つよく\nこうそうビルも　たいあたりで\nコナゴナに　ふんさいする。"
          shield: "ひとつの　ことしか　おぼえられない。\nとっしんを　はじめると　りゆうは\nどうでもよくなり　すぐに　わすれる。"
        jp_kanji:
          sword: "頭は　悪いが　力が　強く\n高層ビルも　体当たりで\nコナゴナに　粉砕する。"
          shield: "ひとつの　ことしか　覚えられない。\n突進を　はじめると　理由は\nどうでもよくなり　すぐに　忘れる。"
        en:
          sword: "Strong, but not too bright, this Pokémon can\nshatter even a skyscraper with its charging tackles."
          shield: "It can remember only one thing at a time. Once it\nstarts rushing, it forgets why it started."
        fr:
          sword: "Costaud, mais pas très intelligent, ce Pokémon\nest capable de détruire un immeuble entier\nen fonçant dessus."
          shield: "Il ne peut se souvenir que d’une chose à la fois.\nS’il se met à courir, il en oublie tout de suite\nla raison."
        it:
          sword: "È molto forte, benché non particolarmente\nbrillante. Se si scaglia contro un grattacielo\npuò raderlo al suolo."
          shield: "Non è in grado di ricordare più di una cosa\nalla volta. Quando parte alla carica\nne dimentica subito il motivo."
        de:
          sword: "Dieses Pokémon ist zwar nicht besonders klug,\naber dafür so stark, dass es durch Rammen sogar\nHochhäuser zum Einsturz bringen kann."
          shield: "Es kann sich immer nur eine Sache merken.\nSobald es losgestürmt ist, vergisst es\naugenblicklich den Auslöser dafür."
        es:
          sword: "Su inteligencia es limitada, aunque posee una\nfuerza tan considerable que le permite incluso\nderribar rascacielos con solo embestirlos."
          shield: "La cabeza no le da para retener más de una cosa.\nSi se pone a correr, se le olvida al instante por\nqué empezó a hacerlo."
        ko:
          sword: "머리는 나쁘지만 힘이 세서\n고층 빌딩도 몸통박치기로\n산산조각 낸다."
          shield: "한 가지만 기억할 수 있다.\n돌진하기 시작하면 이유가\n무엇이었든 금방 잊어버린다."
        zh_simp:
          sword: "虽然头脑很差但力气很大，\n可以用撞击把高楼大厦撞得粉粹。"
          shield: "脑子里只能记住一件事。\n一旦开始猛冲，不管理由是什么\n都会很快感到无所谓而忘掉。"
        zh_trad:
          sword: "頭腦很差但力氣很大，\n只要撞擊就能把\n高樓大廈撞得粉粹。"
          shield: "腦子裡只能記住一件事。\n一旦開始猛衝，不管理由是什麼\n都會很快感到無所謂而忘掉。"
