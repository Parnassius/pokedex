        jp_kana:
          sword: "あたまの　アンテナで　うちゅうからの\nでんぱを　じゅしんして　なにものかに\nコントロールされていると　いわれる。"
          shield: "とくしゅな　じばの　えいきょうで\nからだの　ぶんしこうぞうが　へんかし\nしんかしたと　かんがえられている。"
        jp_kanji:
          sword: "頭の　アンテナで　宇宙からの\n電波を　受信して　何者かに\nコントロールされていると　いわれる。"
          shield: "特殊な　磁場の　影響で\n体の　分子構造が　変化し\n進化したと　考えられている。"
        en:
          sword: "Some say that Magnezone receives signals from\nspace via the antenna on its head and that it’s\nbeing controlled by some mysterious being."
          shield: "It’s thought that a special magnetic field changed\nthe molecular structure of this Pokémon’s body,\nand that’s what caused the Pokémon’s evolution."
        fr:
          sword: "On raconte qu’il serait contrôlé par une entité\nextraterrestre grâce à des ondes qu’il capterait\navec l’antenne sur sa tête."
          shield: "On pense qu’il a évolué après avoir été exposé\nà un champ magnétique particulier qui a modifié\nla structure moléculaire de son corps."
        it:
          sword: "Si dice che venga controllato tramite onde\nelettromagnetiche provenienti dallo spazio,\nche capta con l’antenna posta sulla testa."
          shield: "Si pensa che la sua struttura molecolare sia\nmutata in seguito all’esposizione a uno speciale\ncampo magnetico, che ha innescato l’evoluzione."
        de:
          sword: "Man sagt, es werde von einem Wesen aus dem\nAll kontrolliert und mit der Antenne auf seinem\nKopf empfange es von ihm Signale."
          shield: "Man vermutet, es habe sich entwickelt, nachdem\nes einem besonderen Magnetfeld ausgesetzt war,\ndas seine Molekularstruktur veränderte."
        es:
          sword: "Se cree que con la antena que tiene en la cabeza\nrecibe señales del espacio enviadas por un ser\nque lo controla."
          shield: "Se piensa que estuvo expuesto a un campo\nmagnético especial que alteró su estructura\nmolecular e hizo que evolucionara."
        ko:
          sword: "머리의 안테나로 누군가가 보낸\n전파를 우주로부터 수신하여\n조종당하고 있다고 전해진다."
          shield: "특수한 자기장의 영향으로\n몸의 분자 구조가 변화해\n진화했다고 여겨지고 있다."
        zh_simp:
          sword: "据说它通过头部的天线\n接收来自宇宙的电波，\n受到未知对象的操控。"
          shield: "人们认为，它是因为受到特殊\n磁场的影响，身体的分子构造\n发生了变化，才进化成这样的。"
        zh_trad:
          sword: "據說牠頭上的天線會\n接收來自宇宙的電波，\n讓牠被未知的對象控制。"
          shield: "人們認為牠是受到特殊\n磁場的影響，導致身體的\n分子結構發生變化才進化的。"
lickilicky:
  species_id: 463
  names:
    jp_kana: ベロベルト
    jp_kanji: ベロベルト
    en: Lickilicky
    fr: Coudlangue
    it: Lickilicky
    de: Schlurplek
    es: Lickilicky
    ko: 내룸벨트
    zh_simp: 大舌舔
    zh_trad: 大舌舔
  forms:
    lickilicky:
      form_id: 0
      base_stats:
        hp: 110
        attack: 85
        defense: 95
        special_attack: 80
        special_defense: 95
        speed: 50
      evs_yield:
        hp: 3
        attack: 0
