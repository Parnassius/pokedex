      types:
        - bug
      egg_groups:
        - bug
      abilities:
        - shield_dust
      hidden_ability: run_away
      descriptions:
        jp_kana:
          sword: "あたまの　しょっかくから\nきょうれつな　においを　だして\nてきを　おいはらい　みをまもる。"
          shield: "あしは　みじかいが　きゅうばんに\nなっているので　さかでも　かべでも\nくたびれることなく　すすんでいく。"
        jp_kanji:
          sword: "頭の　触角から\n強烈な　においを　だして\n敵を　追いはらい　身を守る。"
          shield: "脚は　短いが　吸盤に\nなっているので　坂でも　壁でも\nくたびれることなく　進んでいく。"
        en:
          sword: "For protection, it releases a horrible stench from\nthe antenna on its head to drive away enemies."
          shield: "Its short feet are tipped with suction pads that\nenable it to tirelessly climb slopes and walls."
        fr:
          sword: "Pour se protéger, il émet par ses antennes\nune odeur nauséabonde qui fait fuir ses ennemis."
          shield: "Ses petites pattes munies de ventouses\nlui permettent de monter les pentes\net de grimper aux murs sans se fatiguer."
        it:
          sword: "Per proteggersi emette un puzzo terribile dalle\nantenne sul capo, con cui tiene lontani i nemici."
          shield: "Le ventose sulle sue corte zampe gli permettono\ndi affrontare ogni salita e di scalare senza fatica\nqualsiasi muro."
        de:
          sword: "Als Schutz vor Feinden sondert es einen übel\nriechenden Gestank mit seinen Antennen ab."
          shield: "Es hat Saugnäpfe an den Beinchen, mit denen es\nmühelos Steigungen und Mauern erklimmen kann."
        es:
          sword: "Para protegerse, despide un hedor horrible por\nlas antenas con el que repele a sus enemigos."
          shield: "Sus cortas patas están recubiertas de ventosas\nque le permiten subir incansable por muros y\ncuestas."
        ko:
          sword: "머리의 더듬이로부터\n강렬한 냄새를 내어\n적을 물리치고 몸을 보호한다."
          shield: "다리는 짧지만 빨판으로\n되어 있어 비탈길이나 벽에서도\n지치지 않고 나아간다."
        zh_simp:
          sword: "会从头部的触角中\n释放出强烈的臭气，\n以此来赶走敌人保护自己。"
          shield: "别看它的脚很短，\n因为是吸盘，所以无论是\n斜坡还是墙壁都能轻松前进。"
        zh_trad:
          sword: "會從頭部的觸角釋放出\n強烈的氣味來趕走敵人，\n藉此保護自己。"
          shield: "別看牠的腳很短，\n因為是吸盤，所以無論是\n斜坡還是牆壁都能輕鬆前進。"
metapod:
  species_id: 11
