          sword: "自然の　洞窟に　見えても\nドリュウズが　掘り荒らした　跡と\nいうことも　よくある　話だ。"
          shield: "別名　ドリルキング。\n地中を　掘り進む　速度は\n時速１５０キロに　達する。"
        en:
          sword: "It’s not uncommon for tunnels that appear to\nhave formed naturally to actually be a result\nof Excadrill’s rampant digging."
          shield: "Known as the Drill King, this Pokémon can\ntunnel through the terrain at speeds of over\n90 mph."
        fr:
          sword: "On confond souvent les cavernes creusées\npar les Minotaupe avec des grottes naturelles."
          shield: "On l’appelle le « roi de la vrille ». Il creuse la terre\nà une vitesse pouvant atteindre 150 km/h."
        it:
          sword: "Si dice che le grotte all’apparenza naturali siano\nin realtà spesso il risultato degli scavi forsennati\neffettuati da Excadrill."
          shield: "Conosciuto anche come “re delle trivelle”,\nquesto Pokémon è capace di scavare sottoterra\na una velocità di 150 km/h."
        de:
          sword: "Viele Tunnel, die aussehen, als wären sie natürlich\nentstanden, gehen wohl eigentlich auf Stalobor\nzurück, die sich durch die Erde gegraben haben."
          shield: "Es wird auch der „Bohrkönig“ genannt. Bei seinen\nBohrmanövern im Erdreich erreicht es eine\nSpitzengeschwindigkeit von 150 km/h."
        es:
          sword: "Se dice que muchas grutas que parecen naturales\nhan sido en realidad horadadas por los Excadrill."
          shield: "Se lo conoce como el Rey del Taladro. Puede\nhoradar túneles bajo tierra a una velocidad de\n150 km/h."
        ko:
          sword: "자연적으로 생긴 동굴로 보이지만\n사실은 몰드류가 파낸 흔적인\n경우는 흔히 있는 일이다."
          shield: "별명은 드릴킹이다.\n땅속을 파는 속도는\n시속 150km에 달한다."
        zh_simp:
          sword: "有许多看似自然形成的\n洞窟其实都是龙头地鼠\n一阵乱钻之后留下来的。"
          shield: "别名钻头王。在地底下\n挖掘前进的速度\n达到了每小时１５０公里。"
        zh_trad:
          sword: "有許多看似自然形成的\n洞窟其實都是龍頭地鼠\n一陣亂鑽之後留下來的。"
          shield: "別名鑽頭王。在地底下\n挖掘前進的速度\n高達每小時１５０公里。"
audino:
  species_id: 531
