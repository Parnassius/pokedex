          shield: "ながい　ツノを　のばす　いきおいで\nこうげき。　いりょくは　ヘビーきゅう\nボクサーの　パンチの　１００ばいだ。"
        jp_kanji:
          sword: "トレーナーの　指示が　理解できずに\nキョトンとする　ことが　たまに　あり\nその　様子が　かわいいと　人気。"
          shield: "長い　ツノを　伸ばす　勢いで\n攻撃。　威力は　ヘビー級\nボクサーの　パンチの　１００倍だ。"
        en:
          sword: "Sometimes it misunderstands instructions and\nappears dazed or bewildered. Many Trainers\ndon’t mind, finding this behavior to be adorable."
          shield: "Its form of offense is forcefully stretching out its\nhorns. The strikes land 100 times harder than any\nblow from a heavyweight boxer."
        fr:
          sword: "Il arrive qu’il ne comprenne pas les ordres\nde son Dresseur et qu’il le regarde d’un air ahuri.\nCette réaction adorable l’a rendu populaire."
          shield: "Il attaque à l’aide de ses longues cornes.\nSes coups sont cent fois plus puissants\nque ceux d’un champion poids lourds de boxe."
        it:
          sword: "A volte non capisce gli ordini del suo Allenatore\ne rimane immobile con un’aria stupita. Molti lo\ntrovano adorabile proprio per questo."
          shield: "Distende i suoi lunghi corni e si lancia all’attacco\ncon una potenza 100 volte superiore al pugno\ndi un peso massimo."
        de:
          sword: "Es kommt vor, dass es die Befehle seines Trainers\nnicht versteht und nur verblüfft dreinschaut.\nDieser putzige Anblick hat es beliebt gemacht."
          shield: "Es greift mit seinen ausfahrbaren Fühlern an,\nderen Durchschlagskraft hundertmal so stark wie\nder Faustschlag eines Schwergewichtsboxers ist."
        es:
          sword: "A veces no entiende las instrucciones de su\nEntrenador y se queda como abstraído, pero\nmucha gente encuentra este rasgo adorable."
          shield: "Ataca extendiendo sus largas antenas. La fuerza\nque despliega es 100 veces superior a la del\npuñetazo de un boxeador de peso pesado."
        ko:
          sword: "트레이너의 지시를 이해하지 못하고\n어리둥절해하는 경우가 가끔 있으며\n그 모습이 귀여워서 인기가 많다."
          shield: "긴 뿔을 기세 좋게 늘여서\n공격한다. 위력은 헤비급\n복서 펀치의 100배다."
        zh_simp:
          sword: "有时会因为无法理解\n训练家的指令而目瞪口呆。\n那可爱的举止让它深受欢迎。"
          shield: "用伸长角产生的力道来\n攻击对手，产生的威力比\n重量级拳击手的拳击还强１００倍。"
        zh_trad:
          sword: "有時會因為無法理解\n訓練家的指令而目瞪口呆。\n那可愛的舉止讓牠深受歡迎。"
          shield: "用伸長角產生的力道來\n攻擊對手，產生的威力比\n重量級拳擊手的拳擊還強１００倍。"
