          shield: "きんねんは　でんのう　くうかんで\nだいかつやく。　あやしい　データが　\nないか　チェックして　まわっている。"
        jp_kanji:
          sword: "最高の　科学力を　使い\n世界で　はじめて　プログラムにより\n作られた　人工の　ポケモン。"
          shield: "近年は　電脳空間で　大活躍。\n怪しい　データが　ないか\nチェックして　まわっている。"
        en:
          sword: "State-of-the-art technology was used to create\nPorygon. It was the first artificial Pokémon to be\ncreated via computer programming."
          shield: "In recent years, this species has been very helpful\nin cyberspace. These Pokémon will go around\nchecking to make sure no suspicious data exists."
        fr:
          sword: "C’est le premier Pokémon au monde à avoir\nété créé à partir de programmes informatiques,\ngrâce à une technologie de pointe."
          shield: "Ces dernières années, il s’est rendu très utile\ndans le cyberespace, qu’il arpente pour s’assurer\nqu’il n’y a aucune donnée suspecte."
        it:
          sword: "È il primo Pokémon della storia a essere stato\ncreato tramite programmi, grazie all’impiego\ndi tecnologie all’avanguardia."
          shield: "Negli ultimi anni ha assunto un ruolo di rilevanza\nnel cyberspazio, in cui si aggira per assicurarsi\nche non ci siano dati sospetti."
        de:
          sword: "Es ist weltweit das erste künstliche Pokémon,\ndas dank neuester Technologien mittels\nComputerprogrammen erschaffen wurde."
          shield: "In den letzten Jahren nahm es im Cyberspace\nbei der Suche nach verdächtigen Daten eine\naktive Rolle ein."
        es:
          sword: "Se trata del primer Pokémon del mundo creado\na partir de códigos de programación gracias al\nuso de tecnología de vanguardia."
          shield: "Durante los últimos años, ha estado muy activo\nen el ciberespacio comprobando que no haya\ndatos sospechosos."
        ko:
          sword: "최고의 과학 기술을 사용해\n세계에서 처음으로 프로그래밍되어\n만들어진 인공 포켓몬이다."
          shield: "근래에는 컴퓨터 공간에서\n대활약한다. 수상한 데이터가\n없는지 체크하며 돌아다닌다."
        zh_simp:
          sword: "它是世界上第一个\n由程序编成的人工宝可梦。\n运用最先进的科技制成。"
          shield: "近年来十分活跃于\n电脑空间。到处检查\n有没有可疑的数据。"
        zh_trad:
          sword: "牠是以最尖端的科學力量，\n首度在世上利用程式創造\n出來的人工寶可夢。"
          shield: "近年在電腦空間大展身手。\n會四處巡邏查看\n有沒有可疑的資料。"
