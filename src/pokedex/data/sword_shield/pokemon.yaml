          shield: "くうきが　つまった　あわを　つくる。\nルリリが　かわで　あそぶときは\nこの　あわで　つつんで　あげるのだ。"
        jp_kanji:
          sword: "１日の　ほとんどを　水中で　すごす。\n晴れた　日には　水面に　浮かんで\n日向ぼっこをする。"
          shield: "空気が　詰まった　泡を　作る。\nルリリが　川で　遊ぶときは\nこの　泡で　包んであげるのだ。"
        en:
          sword: "It spends most of its time in the water. On sunny\ndays, Azumarill floats on the surface of the water\nand sunbathes."
          shield: "These Pokémon create air-filled bubbles. When\nAzurill play in rivers, Azumarill will cover them\nwith these bubbles."
        fr:
          sword: "Il passe la majeure partie de la journée\ndans l’eau. Quand il fait beau, il flotte\nà la surface pour prendre un bain de soleil."
          shield: "Il crée des bulles d’air dont il enveloppe\ngentiment les Azurill venus jouer dans la rivière."
        it:
          sword: "Passa la maggior parte della giornata in acqua.\nSe è bel tempo galleggia in superficie per\nprendere il sole."
          shield: "Crea delle bolle d’aria con cui avvolge\ndolcemente gli Azurill che giocano nel fiume."
        de:
          sword: "Es verbringt fast den ganzen Tag im Wasser.\nBei schönem Wetter lässt sich Azumarill an der\nOberfläche treiben und badet im Sonnenschein."
          shield: "Azumarill kann mit Luft gefüllte Blasen erzeugen,\nin die es Azurill einhüllt, wenn diese im Fluss\nspielen."
        es:
          sword: "Pasa la mayor parte del tiempo en el agua. Los\ndías despejados, aprovecha para tomar el sol\nflotando en la superficie."
          shield: "Crea burbujas llenas de aire con las que cubre a\nlos Azurill cuando juegan en el río."
        ko:
          sword: "하루의 대부분을 물속에서\n지낸다. 맑은 날에는\n수면으로 올라와서 햇볕을 쬔다."
          shield: "공기로 가득 찬 거품을 만든다.\n루리리가 강에서 놀 때는\n이 거품으로 감싸준다."
        zh_simp:
          sword: "一天大部分的时间都在\n水中度过。天晴时会\n浮到水面上晒太阳。"
          shield: "会制作填满空气的泡泡。\n当露力丽在河里玩的时候，\n它就会用这个泡泡包住露力丽。"
        zh_trad:
          sword: "整天幾乎都是在水中\n度過。天氣晴朗時會\n浮在水面上曬太陽。"
          shield: "會製作填滿空氣的泡泡。\n當露力麗到河裡玩耍的時候，\n牠就會用泡泡把露力麗包起來。"
