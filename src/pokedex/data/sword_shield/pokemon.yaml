      descriptions:
        jp_kana:
          sword: "３びきの　コイルが　れんけつした。\nきょうりょくな　でんぱを　はなち\nまわりの　ようすを　かんそくする。"
          shield: "つよい　じりょくを　たえず　はなつ。\nレアコイルが　ちかづくと　たいていの\nコンピュータは　いじょうを　きたす。"
        jp_kanji:
          sword: "３匹の　コイルが　連結した。\n強力な　電波を　放ち\nまわりの　様子を　観測する。"
          shield: "強い　磁力を　たえず　放つ。\nレアコイルが　近づくと　大抵の\nコンピュータは　異常を　きたす。"
        en:
          sword: "This Pokémon is three Magnemite that have\nlinked together. Magneton sends out powerful\nradio waves to study its surroundings."
          shield: "This Pokémon is constantly putting out a powerful\nmagnetic force. Most computers go haywire when\na Magneton approaches."
        fr:
          sword: "La fusion de trois Magnéti a donné naissance\nà ce Pokémon. Il surveille les alentours en\nlibérant de puissantes ondes électriques."
          shield: "Il émet constamment une énergie magnétique\npuissante qui interfère avec la grande majorité\ndes ordinateurs dont il s’approche."
        it:
          sword: "È formato dall’unione di tre Magnemite.\nEsamina i dintorni emettendo potenti onde radio."
          shield: "Produce costantemente una potente carica\nmagnetica che causa malfunzionamenti\nnella maggior parte dei computer."
        de:
          sword: "Es entsteht durch den Zusammenschluss dreier\nMagnetilo und sendet starke Radiowellen aus,\num seine Umgebung zu untersuchen."
          shield: "Es sondert stetig seine starken Magnetkräfte ab,\nsodass bei den meisten Computern Störungen\nauftreten, wenn es sich in deren Nähe aufhält."
        es:
          sword: "Este Pokémon, surgido de la unión de tres\nMagnemite, genera potentes ondas de radio\ncon las que examina el entorno."
          shield: "Emite de forma constante una potente fuerza\nmagnética que causa estragos en prácticamente\ncualquier ordenador al que se acerque."
        ko:
          sword: "3마리의 코일이 연결되었다.\n강력한 전파를 발산해\n주위의 상황을 관측한다."
          shield: "강한 자력을 끊임없이 발산한다.\n레어코일이 접근하면 대부분의\n컴퓨터에 이상 현상이 발생한다."
        zh_simp:
          sword: "３只小磁怪连在了一起。\n会通过放出强力的电波\n来观测周围的状况。"
          shield: "会不断释放很强的的磁力。\n在三合一磁怪接近时，大多数\n电脑都会发生异常情况。"
        zh_trad:
          sword: "由３隻小磁怪連結而成。\n會發射出強烈的電波\n來觀測周圍的狀況。"
          shield: "隨時都釋放著很強的磁力。\n只要三合一磁怪一靠近，\n大多數的電腦都會出現異常。"
