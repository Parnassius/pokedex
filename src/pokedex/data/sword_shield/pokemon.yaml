        jp_kana:
          sword: "あたまの　ひだを　ひろげ　たいようの\nひかりで　はつでんすると　パワフルな\nでんきわざを　だせるようになる。"
          shield: "たいようはつでんの　しくみを　もつ。\nはつでんを　じゃま　されると\nストレスで　よわってしまう。"
        jp_kanji:
          sword: "頭の　ひだを　広げ　太陽の\n光で　発電すると　パワフルな\n電気技を　出せるようになる。"
          shield: "太陽発電の　仕組みを　もつ。\n発電を　じゃま　されると\nストレスで　弱ってしまう。"
        en:
          sword: "When spread, the frills on its head act like solar\npanels, generating the power behind this\nPokémon’s electric moves."
          shield: "The sun powers this Pokémon’s electricity\ngeneration. Interruption of that process\nstresses Helioptile to the point of weakness."
        fr:
          sword: "Il absorbe les rayons du soleil en dépliant la peau\nde sa tête pour produire l’électricité nécessaire\nà ses puissantes capacités Électrik."
          shield: "Il peut générer de l’électricité grâce au soleil.\nSi on le dérange en pleine production d’énergie,\ncela le stresse et l’affaiblit."
        it:
          sword: "Distende le pieghe sulla testa per raccogliere la\nluce solare e produrre energia elettrica che\nusa per sferrare potenti mosse di tipo Elettro."
          shield: "Possiede un organo con cui genera energia\nelettrica fotovoltaica. Se viene disturbato mentre\nla produce, si stressa e si indebolisce."
        de:
          sword: "Es breitet die Hautlappen an seinem Kopf aus,\num mithilfe des Sonnenlichts Strom zu erzeugen\nund mächtige Elektro-Attacken einzusetzen."
          shield: "Es kann aus Sonnenlicht Elektrizität erzeugen.\nUnterbricht man es jedoch bei diesem Prozess,\nverliert es vor lauter Stress all seine Kraft."
        es:
          sword: "Extiende los pliegues de la cabeza para absorber\nla luz del sol y convertirla en electricidad, con la\nque realiza potentes ataques de tipo Eléctrico."
          shield: "Es capaz de generar electricidad a partir de la\nluz del sol. Si lo interrumpen en pleno proceso,\nse pone nervioso y pierde las fuerzas."
        ko:
          sword: "머리에 있는 주름을 펼쳐서\n태양의 빛으로 발전하면 파워풀한\n전기 기술을 쓸 수 있게 된다."
          shield: "태양광 발전 구조를 가졌다.\n발전을 방해하면\n스트레스를 받아서 약해진다."
        zh_simp:
          sword: "当它张开头部的褶边\n用太阳光发电，就能使出\n威力强大的电属性招式。"
          shield: "拥有太阳能发电的结构。\n如果有人打扰它发电，\n它就会因心理压力而衰弱。"
        zh_trad:
          sword: "當牠張開頭部的褶邊\n用太陽光發電，就能使出\n威力強大的電屬性招式。"
          shield: "擁有太陽能發電的結構。\n如果有人打擾牠發電，\n牠就會因心理壓力而衰弱。"
heliolisk:
