      evs_yield:
        hp: 0
        attack: 3
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ground
        - dark
      egg_groups:
        - field
      abilities:
        - intimidate
        - moxie
      hidden_ability: anger_point
      held_items:
        common: black_glasses
      descriptions:
        jp_kana:
          sword: "すなの　ギャングとも　よばれる。\nきょうりょくな　アゴで　ぶあつい\nてっぱんも　たやすく　くいちぎる。"
          shield: "きょうぼうだが　えものの　ために\nすなのなかで　なんにちも　まつ\nにんたいづよさも　もっているぞ。"
        jp_kanji:
          sword: "砂の　ギャングとも　呼ばれる。\n強力な　顎で　ぶ厚い\n鉄板も　たやすく　食いちぎる。"
          shield: "凶暴だが　獲物の　ために\n砂の中で　何日も　待つ\n忍耐強さも　もっているぞ。"
        en:
          sword: "This Pokémon is known as the Bully of the Sands.\nKrookodile’s mighty jaws can bite through heavy\nplates of iron with almost no effort at all."
          shield: "While terribly aggressive, Krookodile also has\nthe patience to stay hidden under sand for days,\nlying in wait for prey."
        fr:
          sword: "Il peut broyer d’épaisses plaques de fer\nd’un simple coup de mâchoire. On l’appelle\nle « tyran des sables »."
          shield: "Il aime la violence, mais sait aussi se montrer\npatient lorsqu’il doit passer plusieurs jours\ndans le sable à attendre une proie."
        it:
          sword: "Viene chiamato “Tiranno del deserto”. Grazie\nalle possenti mascelle è in grado di fare a pezzi\nspesse lastre di metallo senza sforzo."
          shield: "È un Pokémon molto feroce. Quando si tratta\ndi catturare le prede è in grado di aspettare\npazientemente nella sabbia per giorni."
        de:
          sword: "Es wird auch als „Tyrann der Wüste“ bezeichnet.\nMit seinem mächtigen Kiefer durchbeißt es selbst\ndicke Eisenplatten mit Leichtigkeit."
          shield: "Rabigator ist zwar aggressiv, doch wenn es bei\nder Jagd nach Beute auf der Lauer liegt, kann es\nauch mehrere Tage geduldig im Sand ausharren."
        es:
          sword: "Se lo conoce como el Terror de las Arenas. Con\nsus fuertes mandíbulas es capaz de destrozar a\nmordiscos una plancha de hierro fácilmente."
          shield: "Es de naturaleza violenta, pero también tiene\nla paciencia necesaria para esperar a su presa\noculto en la arena durante varios días."
        ko:
          sword: "모래의 건달이라고도 불린다.\n강력한 턱으로 두꺼운\n철판도 쉽게 물어뜯는다."
          shield: "난폭하지만 먹이를 잡기 위해\n모래 속에서 며칠이든 기다리는\n강한 인내력도 갖고 있다."
        zh_simp:
          sword: "被称为沙之恶霸。\n就连厚厚的铁板也能\n用强力的颚轻松咬断。"
          shield: "虽然凶暴，但也有擅长忍耐的一面。\n为了捕获猎物，可以在\n沙子里静静等上好几天。"
        zh_trad:
          sword: "又被稱為沙之惡霸。\n就連厚厚的鐵板也能被牠\n用強力的下顎輕鬆咬爛。"
          shield: "雖然凶暴，但同時也具有\n很強的忍耐力。為了捕捉\n獵物能在沙子裡等上很多天。"
darumaka:
  species_id: 554
  names:
    jp_kana: ダルマッカ
