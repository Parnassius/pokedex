      types:
        - ghost
      egg_groups:
        - mineral
        - amorphous
      abilities:
        - weak_armor
      hidden_ability: cursed_body
      descriptions:
        jp_kana:
          sword: "のこされ　ひえきった　こうちゃに\nさみしがりやな　たましいが　やどり\nポケモンに　なったと　いわれている。"
          shield: "すみかに　している　ティーカップは\nゆうめいな　アンティークの　しょっき。\nおおくの　がんさくが　でまわっている。"
        jp_kanji:
          sword: "残され　冷えきった　紅茶に\nさみしがりやな　魂が　宿り\nポケモンに　なったと　いわれている。"
          shield: "すみかに　している　ティーカップは\n有名な　アンティークの　食器。\n多くの　贋作が　出回っている。"
        en:
          sword: "This Pokémon is said to have been born when\na lonely spirit possessed a cold, leftover cup\nof tea."
          shield: "The teacup in which this Pokémon makes its\nhome is a famous piece of antique tableware.\nMany forgeries are in circulation."
        fr:
          sword: "On raconte que ce Pokémon est né lorsqu’une\nâme esseulée a plongé dans un reste de thé noir\nfroid."
          shield: "Il élit domicile dans des tasses de thé anciennes\nde grand renom. Parmi celles-ci se trouvent\nde nombreuses contrefaçons."
        it:
          sword: "Si dice che questo Pokémon sia nato quando\nun’anima solitaria si è impossessata di una\ntazza dimenticata piena di tè ormai freddo."
          shield: "La tazza da tè in cui vive è un vero pezzo\ndi antiquariato di cui circolano molte copie\ncontraffatte."
        de:
          sword: "Es heißt, eine einsame Seele habe Besitz von\neiner abgestellten, kalten Tasse Schwarztee\nergriffen und sei zu diesem Pokémon geworden."
          shield: "Die Teetasse, die es bewohnt, ist eine berühmte\nAntiquität. Es befinden sich allerdings auch viele\nFälschungen im Umlauf."
        es:
          sword: "Según se dice, este Pokémon surgió de un alma\nsolitaria que poseyó una taza abandonada llena\nde un té ya frío."
          shield: "La taza de té donde se hospeda forma parte de\nuna antigua y valiosa vajilla, de la que circulan\nnumerosas falsificaciones."
        ko:
          sword: "차게 식은 남은 홍차에\n외로움을 타는 영혼이 깃들어\n포켓몬이 되었다고 전해진다."
          shield: "거처로 삼고 있는 찻잔은\n유명한 골동품 식기다.\n위작이 많이 나돌고 있다."
        zh_simp:
          sword: "据说这只宝可梦是因为\n害怕寂寞的灵魂住进了\n凉透的喝剩红茶而诞生的。"
          shield: "被它当成住处的茶杯\n是有名的古董餐具。\n市面上有很多赝品。"
        zh_trad:
          sword: "據說這隻寶可夢是因為\n害怕寂寞的靈魂住進了\n涼透的喝剩紅茶而誕生的。"
          shield: "被牠當成住處的茶杯\n是有名的古董餐具。\n市面上有很多贗品。"
    sinistea_antique_form:
      form_id: 1
      base_stats:
        hp: 40
        attack: 45
        defense: 45
        special_attack: 74
        special_defense: 54
        speed: 50
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 1
        special_defense: 0
        speed: 0
      types:
        - ghost
      egg_groups:
        - mineral
        - amorphous
      abilities:
        - weak_armor
      hidden_ability: cursed_body
      descriptions:
        jp_kana:
          sword: "からだの　うずまきが　じゃくてん。\nかきまぜられると　かたちが　くずれ\nめまいを　おこして　しまうのだ。"
          shield: "のみこんだ　あいての　せいきを　すう。\nだれかに　のまれるのを　まっているが\nマズいので　すぐに　はきだされる。"
        jp_kanji:
          sword: "体の　渦巻が　弱点。\nかき混ぜられると　形が　崩れ\nめまいを　起こして　しまうのだ。"
          shield: "飲みこんだ　相手の　生気を　吸う。\nだれかに　飲まれるのを　待っているが\n不味いので　すぐに　吐き出される。"
        en:
          sword: "The swirl pattern in this Pokémon’s body is\nits weakness. If it gets stirred, the swirl loses\nits shape, and Sinistea gets dizzy."
          shield: "It absorbs the life-force of those who drink it.\nIt waits patiently, but opportunities are fleeting—\nit tastes so bad that it gets spat out immediately."
        fr:
          sword: "La spirale sur son corps est son point faible.\nSi on la touille, elle perd sa forme,\nce qui lui donne des vertiges."
          shield: "Il attend que quelqu’un le boive pour aspirer\nsa force vitale, mais il a si mauvais goût\nque sa victime le recrache aussitôt."
        it:
          sword: "La spirale al centro del suo corpo è il suo punto\ndebole. Se viene mescolato, perde integrità\ned è colto da vertigini."
          shield: "Assorbe l’energia vitale di chi lo beve. Attende\npazientemente di essere bevuto, ma a causa del\nsuo cattivo sapore molti lo sputano subito."
        de:
          sword: "Der Wirbel auf seinem Körper aus Tee ist seine\nSchwachstelle. Rührt man diesen um, verliert er\nseine Form, wodurch Fatalitee schwindlig wird."
          shield: "Es saugt jenen, die es trinken, die Lebensenergie\naus. Es hofft, getrunken zu werden, aber da es\nwiderlich schmeckt, wird es sofort ausgespuckt."
        es:
          sword: "La espiral de su cuerpo líquido es su punto débil.\nSi se remueve, su complexión se desestabiliza y\nsiente vértigo."
          shield: "Espera a que algún incauto intente bebérselo\npara absorber su energía vital, pero suelen\nescupirlo enseguida debido a su mal sabor."
        ko:
          sword: "몸에 있는 소용돌이가 약점이다.\n휘저으면 형태가 무너져서\n현기증을 느끼고 만다."
          shield: "삼켜버린 상대의 생기를 빨아들인다.\n누군가에게 삼켜지기를 기다리지만\n맛이 없어서 바로 뱉어지곤 한다."
        zh_simp:
          sword: "弱点是身上的漩涡。\n如果把漩涡搅乱了，\n它就会头晕目眩。"
          shield: "会吸走饮用者的精气。虽然它会\n等待着别人来喝自己，但大家都会\n因为它太难喝而马上把它吐出来。"
        zh_trad:
          sword: "弱點是身上的漩渦。\n如果把漩渦攪亂了，\n牠就會頭暈目眩。"
          shield: "會吸走飲用者的精氣。雖然牠會\n等待著別人來喝自己，但大家都會\n因為牠太難喝而馬上把牠吐出來。"
polteageist:
  species_id: 855
  names:
    jp_kana: ポットデス
    jp_kanji: ポットデス
    en: Polteageist
    fr: Polthégeist
    it: Polteageist
    de: Mortipot
    es: Polteageist
    ko: 포트데스
    zh_simp: 怖思壶
    zh_trad: 怖思壺
  forms:
    polteageist_phony_form:
      form_id: 0
      base_stats:
        hp: 60
        attack: 65
        defense: 65
        special_attack: 134
        special_defense: 114
