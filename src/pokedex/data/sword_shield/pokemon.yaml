          sword: "ポケモンの　からだに　くっついて\nせいでんきを　すいとる。　じぶんでは\nでんきを　つくることが　できない。"
          shield: "ほかの　ポケモンに　とりついて\nせいでんきを　すいとる。　ワンパチの\nおしりに　よく　くっついている。"
        jp_kanji:
          sword: "ポケモンの　体に　くっついて\n静電気を　吸い取る。　自分では\n電気を　つくることが　できない。"
          shield: "ほかの　ポケモンに　とりついて\n静電気を　吸い取る。　ワンパチの\nお尻に　よく　くっついている。"
        en:
          sword: "Joltik can be found clinging to other Pokémon.\nIt’s soaking up static electricity because it can’t\nproduce a charge on its own."
          shield: "Joltik latch on to other Pokémon and suck out\nstatic electricity. They’re often found sticking to\nYamper’s hindquarters."
        fr:
          sword: "Il s’accroche au corps des autres Pokémon pour\nabsorber leur électricité statique. Il est incapable\nd’en produire tout seul."
          shield: "Il s’accroche aux autres Pokémon pour aspirer\nleur électricité statique. On en trouve souvent\ncollés au postérieur de Voltoutou."
        it:
          sword: "Si aggrappa al corpo di altri Pokémon e ne\nassorbe l’energia elettrostatica. Non può\nprodurre elettricità da sé."
          shield: "Si attacca ad altri Pokémon per assorbirne\nl’energia elettrostatica. Non è raro trovarne\nuno sul posteriore di Yamper."
        de:
          sword: "Wattzapf heftet sich an andere Pokémon und\nsaugt ihnen statische Elektrizität ab. Es selbst\nkann keinen Strom produzieren."
          shield: "Es heftet sich an andere Pokémon und saugt\nihnen statische Elektrizität aus. Häufig wird es\nan Hinterteilen von Voldi gesichtet."
        es:
          sword: "No puede generar electricidad por sí mismo,\nasí que se encarama a otros Pokémon y absorbe\nsu energía estática."
          shield: "Se agarra a otros Pokémon para absorber su\nelectricidad estática. Es muy común verlo\naferrado a las posaderas de un Yamper."
        ko:
          sword: "포켓몬의 몸에 들러붙어\n정전기를 흡수한다.\n스스로는 전기를 만들 수 없다."
          shield: "다른 포켓몬에게 달라붙어\n정전기를 빨아들인다. 멍파치의\n엉덩이에 자주 달라붙어 있다."
        zh_simp:
          sword: "会附在宝可梦的身上\n吸取静电。自身并没有\n制造电的能力。"
          shield: "会附在其他宝可梦身上\n吸取静电。经常会把自己\n贴在来电汪的屁股上。"
        zh_trad:
          sword: "會附在寶可夢的身上\n吸收靜電。自身並沒有\n製造電的能力。"
          shield: "會附在其他寶可夢身上\n吸取靜電。經常會把自己\n貼在來電汪的屁股上。"
