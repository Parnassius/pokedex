      descriptions:
        jp_kana:
          sword: "もっとも　うつくしい　ポケモンとも\nよばれ　おおくの　げいじゅつかに\nインスピレーションを　あたえてきた。"
          shield: "ミロカロスの　うつくしい　すがたを\nみた　ものは　すさんだ　こころが\nいやされると　いわれている。"
        jp_kanji:
          sword: "もっとも　美しい　ポケモンとも\n呼ばれ　多くの　芸術家に\nインスピレーションを　与えてきた。"
          shield: "ミロカロスの　美しい　姿を\n見た　者は　荒んだ　心が\n癒されると　いわれている。"
        en:
          sword: "Milotic has provided inspiration to many artists.\nIt has even been referred to as the most\nbeautiful Pokémon of all."
          shield: "It’s said that a glimpse of a Milotic and its beauty\nwill calm any hostile emotions you’re feeling."
        fr:
          sword: "Célébré comme l’un des plus beaux Pokémon,\nil sert souvent de modèle et d’inspiration\naux plus grands artistes."
          shield: "On dit que la beauté de ce Pokémon est telle\nqu’elle apaise l’esprit de ceux qui le voient."
        it:
          sword: "È considerato il Pokémon più bello del mondo\ned è fonte d’ispirazione per tantissimi artisti."
          shield: "Si dice che la sua bellezza sia in grado\ndi alleviare qualsiasi dolore nel cuore di chi\nlo ammira."
        de:
          sword: "Milotic soll das schönste aller Pokémon sein.\nEs hat schon so manchem Künstler als Quelle\nder Inspiration gedient."
          shield: "Es heißt, der Anblick seiner wunderschönen\nGestalt könne selbst das verrohteste Herz\nerweichen."
        es:
          sword: "Se dice que es el Pokémon más bello. Ha sido\nla fuente de inspiración de un sinnúmero de\nartistas."
          shield: "Se dice que su hermosa figura puede apaciguar\nel corazón de aquellos que tengan el ánimo\nalterado."
        ko:
          sword: "가장 아름다운 포켓몬으로\n불리며 많은 예술가에게\n영감을 주고 있다."
          shield: "밀로틱의 아름다운 모습을\n본 자는 황폐해진 마음이\n치유된다고 한다."
        zh_simp:
          sword: "也被称为最美的宝可梦，\n一直给予许多艺术家灵感。"
          shield: "据说目睹了美纳斯美丽\n身姿的人，心中一切的\n愤恨都能得到抚慰。"
        zh_trad:
          sword: "也被稱為是最美的寶可夢。\n一直以來為無數的\n藝術家提供了靈感。"
          shield: "據說目睹了美納斯美麗\n身姿的人，心中一切的\n憤恨都能得到撫慰。"
duskull:
