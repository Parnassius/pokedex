          sword: "たかい　ひこうのうりょくを　もち\nメスは　じきゅうりょくに　すぐれる。\nひこうスピードは　オスが　まさる。"
          shield: "かしこいぶん　プライドも　たかい。\nケンホロウの　トレーナーに　なれば\nみんなに　いちもく　おかれるよ。"
        jp_kanji:
          sword: "高い　飛行能力を　もち\nメスは　持久力に　優れる。\n飛行スピードは　オスが　勝る。"
          shield: "賢いぶん　プライドも　高い。\nケンホロウの　トレーナーに　なれば\nみんなに　一目　置かれるよ。"
        en:
          sword: "Unfezant are exceptional fliers. The females\nare known for their stamina, while the males\noutclass them in terms of speed."
          shield: "This Pokémon is intelligent and intensely proud.\nPeople will sit up and take notice if you become\nthe Trainer of one."
        fr:
          sword: "Ce Pokémon a une excellente technique de vol.\nLes femelles ont plus d’endurance que les mâles,\nmais ces derniers peuvent voler plus vite."
          shield: "Ce Pokémon est aussi intelligent qu’il est arrogant.\nLes Dresseurs de Déflaisan sont tenus en haute\nestime."
        it:
          sword: "Eccelle nel volo. La femmina è particolarmente\nresistente, ma il maschio la batte in velocità."
          shield: "È tanto intelligente quanto orgoglioso.\nDiventare Allenatori di questo Pokémon equivale\na guadagnarsi il rispetto e l’ammirazione di tutti."
        de:
          sword: "Sie verfügen über exzellente Flugfertigkeiten.\nWeibchen können länger fliegen, aber dafür\nerreichen Männchen ein höheres Flugtempo."
          shield: "Es ist schlau, aber auch sehr stolz. Seine Trainer\ngenießen daher generell großen Respekt."
        es:
          sword: "Hacen gala de una soberbia destreza al volar.\nLa hembra posee una mayor resistencia, mientras\nque el macho la supera en velocidad."
          shield: "Es un Pokémon muy inteligente y orgulloso.\nSe tiene en alta estima a aquellos que se\nconvierten en sus Entrenadores."
        ko:
          sword: "높은 비행 능력을 가졌다.\n암컷은 지구력이 뛰어나며\n수컷은 비행 속도가 뛰어나다."
          shield: "영리한 만큼 프라이드도 높다.\n켄호로우의 트레이너가 되면\n모두에게 실력을 인정받는다."
        zh_simp:
          sword: "拥有高度的飞行能力。\n雌性擅于持久，\n雄性擅长速度。"
          shield: "头脑聪明，所以自尊心也强。\n如果能成为高傲雉鸡的训练家，\n所有人都会对你刮目相看。"
        zh_trad:
          sword: "擁有高度的飛行能力。\n雌性擅於持久，\n雄性擅長速度。"
          shield: "頭腦聰明，所以自尊心也強。\n如果能成為高傲雉雞的訓練家，\n所有人都會對你刮目相看。"
