        - water
        - ground
      egg_groups:
        - water_2
      abilities:
        - oblivious
        - anticipation
      hidden_ability: hydration
      descriptions:
        jp_kana:
          sword: "ぬまの　そこに　すみかを　つくる。\nいきものなら　すききらい　なく\nなんでも　たべてしまう　おおぐらい。"
          shield: "おおきな　ぬまを　なわばりにする。\nてきが　ちかづくと　おおあばれして\nおおきな　じしんを　おこすのだ。"
        jp_kanji:
          sword: "沼の　底に　すみかを　つくる。\n生き物なら　好き嫌いなく\nなんでも　食べてしまう　大食らい。"
          shield: "大きな　沼を　縄張りにする。\n敵が　近づくと　大暴れして\n大きな　地震を　起こすのだ。"
        en:
          sword: "It makes its nest at the bottom of swamps. It will\neat anything—if it is alive, Whiscash will eat it."
          shield: "It claims a large swamp to itself. If a foe comes\nnear it, it sets off tremors by thrashing around."
        fr:
          sword: "Il fait son nid au fond des marais.\nIl ne se pose pas de question et avale\ntoutes les créatures qui passent près de lui."
          shield: "Il a besoin d’un marais entier pour vivre.\nSi un ennemi s’approche, il s’énerve et déclenche\nun séisme."
        it:
          sword: "Nidifica nel letto delle paludi. Incredibilmente\nvorace, mangia qualunque essere vivente senza\ndistinzione di sorta."
          shield: "Stabilisce il suo territorio nelle grandi paludi.\nSe un nemico si avvicina, si scatena provocando\ngrossi terremoti."
        de:
          sword: "Dieses Pokémon baut sein Nest am Grund von\nSümpfen. Es ist ein Vielfraß und verspeist\nLebewesen aller Art."
          shield: "Sein Revier hat es im Sumpfland. Nähert sich\nein Feind, zappelt es wie wild und erzeugt so\nErdbeben."
        es:
          sword: "Construye su nido en el fondo de los pantanos.\nEs tan voraz que no le hace ascos a ningún tipo\nde comida, siempre que se trate de seres vivos."
          shield: "Habita en grandes pantanos. Si se acerca un\nenemigo, monta en cólera y causa temblores\nmonumentales."
        ko:
          sword: "늪 바닥에 거처를 만든다.\n살아 있는 것이라면 가리지 않고\n뭐든 먹어버리고 마는 대식가다."
          shield: "큰 늪을 영역으로 한다.\n적이 가까이 오면 크게 난동부려서\n큰 지진을 일으킨다."
        zh_simp:
          sword: "会在沼泽底部筑巢。\n只要是活物就来者不拒，\n是什么都吃的大胃王。"
          shield: "会将大沼泽划为自己的领地。\n如果有敌人接近的话，它就会狂暴起来，\n并引发大地震。"
        zh_trad:
          sword: "會在沼澤底部建造居所。\n只要是活著的東西都會吃下肚，\n是個不挑食的大胃王。"
          shield: "把大沼澤當成自己的地盤。\n敵人一旦接近就會變得十分粗暴，\n並引起大地震。"
