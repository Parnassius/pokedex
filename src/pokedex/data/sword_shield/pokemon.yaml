          shield: "すばやい　みのこなしで　つむじかぜの\nように　てきを　ほんろうし　するどい\nツノで　ようしゃなく　きりきざむ。"
        jp_kanji:
          sword: "コバルオン　テラキオンと　ともに\nイッシュ地方の　ポケモンたちを\n守り続けた　伝説が　残る。"
          shield: "素早い　身のこなしで　つむじ風の\nように　敵を　翻弄し　鋭い\nツノで　容赦なく　切り刻む。"
        en:
          sword: "A legend tells of this Pokémon working\ntogether with Cobalion and Terrakion to\nprotect the Pokémon of the Unova region."
          shield: "It darts around opponents with a flurry of quick\nmovements, slicing them up with its horns."
        fr:
          sword: "Selon la légende, il aurait combattu aux côtés\nde Cobaltium et de Terrakium pour protéger\nles Pokémon d’Unys."
          shield: "Rapide comme le vent, il s’abat tel un tourbillon\nsur ses ennemis avant de les transpercer sans pitié\nde ses cornes acérées."
        it:
          sword: "Secondo la leggenda, ha lottato fino all’ultimo\nassieme a Cobalion e Terrakion per proteggere\ni Pokémon di Unima."
          shield: "Si abbatte sui nemici rapido come un turbine e li\nfa a pezzi senza pietà con le sue corna affilate."
        de:
          sword: "Eine Legende berichtet davon, wie Viridium einst\nmit Kobalium und Terrakium unermüdlich die\nPokémon Einalls vor den Menschen beschützte."
          shield: "Es täuscht seine Gegner mit flinken Bewegungen,\num sie dann blitzartig anzugreifen und ohne jede\nGnade mit seinen Hörnern aufzuschlitzen."
        es:
          sword: "Según una leyenda, luchó con valentía junto\na Cobalion y Terrakion para proteger a los\nPokémon de Teselia."
          shield: "Confunde a los enemigos con sus movimientos\nrelampagueantes y luego los rebana sin piedad\ncon sus afilados cuernos."
        ko:
          sword: "코바르온 테라키온과 함께\n하나지방의 포켓몬들을\n수호했다는 전설이 남아 있다."
          shield: "회오리바람처럼 재빠른 몸동작으로\n적을 농락하고 예리한 뿔로\n가차 없이 베어버린다."
        zh_simp:
          sword: "与勾帕路翁和代拉基翁\n并肩保护合众地区宝可梦\n的传说一直流传至今。"
          shield: "以敏捷的身手像旋风一般将敌人\n玩弄于股掌之中，会用锋利的角\n毫不留情地切斩对手。"
        zh_trad:
          sword: "與勾帕路翁和代拉基翁\n並肩保護合眾地區寶可夢\n的傳說一直流傳至今。"
          shield: "以敏捷的身手像旋風一般將敵人\n玩弄於股掌之中，會用鋒利的角\n毫不留情地斬斷對手。"
