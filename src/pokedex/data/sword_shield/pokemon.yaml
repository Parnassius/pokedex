        jp_kana:
          sword: "えものを　みつけても　１ぴきのときは\nおそわない。　なかまが　くるのを\nまって　しゅうだんで　おそいかかる。"
          shield: "するどい　キバと　たくましい　アゴを\nもつ。　ふなのりたちは　キバニアの\nすみかには　けっして　ちかづかない。"
        jp_kanji:
          sword: "獲物を　見つけても　１匹のときは\n襲わない。　仲間が　来るのを　待って\n集団で　襲いかかる。"
          shield: "鋭い　キバと　たくましい　顎を\nもつ。　船乗りたちは　キバニアの\nすみかには　けっして　近づかない。"
        en:
          sword: "It won’t attack while it’s alone—not even if it\nspots prey. Instead, it waits for other Carvanha to\njoin it, and then the Pokémon attack as a group."
          shield: "These Pokémon have sharp fangs and powerful\njaws. Sailors avoid Carvanha dens at all costs."
        fr:
          sword: "Il ne s’attaque jamais à une proie tout seul,\npréférant attendre l’arrivée de ses congénères\npour lancer l’assaut."
          shield: "Il possède une mâchoire puissante garnie de\ndents acérées. Les marins ne s’approchent\njamais des eaux habitées par les Carvanha."
        it:
          sword: "Se è da solo, non assale la preda.\nPreferisce aspettare i suoi compagni\nper attaccare in gruppo."
          shield: "È dotato di denti affilati e mascelle robuste.\nChi viaggia per mare si tiene accuratamente\nalla larga dalle tane di Carvanha."
        de:
          sword: "Kanivanha jagt Beute nicht im Alleingang,\nsondern wartet auf seine Artgenossen, um mit\nihnen im Schwarm anzugreifen."
          shield: "Es verfügt über äußerst spitze Zähne und kräftige\nKiefer. Seefahrer meiden die Lebensräume von\nKanivanha um jeden Preis."
        es:
          sword: "Nunca aborda a su presa en solitario, sino que\nespera a que lleguen sus semejantes para atacar\nen grupo."
          shield: "Los marineros evitan por completo las zonas\ndonde habita este Pokémon de afilados colmillos\ny fuertes mandíbulas."
        ko:
          sword: "먹이를 발견해도 혼자일 때는\n공격하지 않는다. 동료가 오는 것을\n기다린 다음 집단으로 공격한다."
          shield: "날카로운 이빨과 튼튼한 턱을\n갖고 있다. 선원들은 샤프니아\n거처에 결코 가까이 가지 않는다."
        zh_simp:
          sword: "即使发现猎物也不会单独\n发起攻击。会等待伙伴的\n到来，发动集体攻击。"
          shield: "拥有锋利的牙齿和\n结实的下颚。水手们绝不会\n主动靠近利牙鱼的栖息地。"
        zh_trad:
          sword: "只有１隻時即使發現了獵物\n也不會發動攻擊。會等到\n夥伴來之後，再結隊襲擊。"
          shield: "擁有銳利的牙齒和結實的\n下巴。船員們絕對不會去\n靠近利牙魚棲息的地方。"
