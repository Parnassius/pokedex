          shield: "あたたかい　うみで　くらす。\nたいこは　ガラルきんかい　にも\nかずおおく　せいそく　していた。"
        jp_kanji:
          sword: "頭に　生えた　枝は　折れても\nまた　生えてくる。　きれいな　ものは\n安産の　お守りに　されるよ。"
          shield: "温かい　海で　暮らす。\n太古は　ガラル近海　にも\n数多く　生息していた。"
        en:
          sword: "It will regrow any branches that break off its\nhead. People keep particularly beautiful Corsola\nbranches as charms to promote safe childbirth."
          shield: "These Pokémon live in warm seas.\nIn prehistoric times, many lived in the\noceans around the Galar region as well."
        fr:
          sword: "Ses branches repoussent si elles sont brisées.\nLes plus belles sont offertes aux futures mamans\ncomme porte-bonheurs."
          shield: "Ces Pokémon habitués des mers chaudes\nse trouvaient autrefois en masse sur les côtes\nde Galar."
        it:
          sword: "Se i coralli che ha sulla testa si spezzano\ncrescono nuovamente. Quelli più belli vengono\nusati come portafortuna per il parto."
          shield: "Vive nei mari più caldi. Anticamente, numerosi\nesemplari di questo Pokémon vivevano anche\nlungo le coste di Galar."
        de:
          sword: "Die Äste auf seinem Kopf wachsen nach, wenn\nsie abbrechen. Besonders schöne abgebrochene\nÄste gelten als Glücksbringer für Geburten."
          shield: "Es lebt in warmen Meeren. Vor langer Zeit konnte\nman große Scharen dieses Pokémon auch an den\nKüsten Galars antreffen."
        es:
          sword: "Las ramas que le brotan de la cabeza se\nregeneran si se rompen. Las más bellas se\nemplean como amuleto en los partos."
          shield: "Habita en mares cálidos. Antiguamente vivían en\nlas aguas costeras de Galar un gran número de\nejemplares."
        ko:
          sword: "머리에 난 가지는 부러져도\n다시 자란다. 예쁜 것은\n순산을 기원하는 부적으로 쓰인다."
          shield: "따뜻한 바다에 서식한다.\n태고에는 가라르 근해에서도\n많은 수가 서식했었다."
        zh_simp:
          sword: "头顶上的珊瑚枝即使折断了\n也会再长出来。人们会把漂亮的\n珊瑚枝当成保佑孕妇的护身符。"
          shield: "在温暖的大海里生活。\n也曾经大量栖息于\n上古时期的伽勒尔近海。"
        zh_trad:
          sword: "頭頂上的珊瑚枝即使折斷了\n也會再長出來。人們會把漂亮的\n珊瑚枝當成保佑孕婦的護身符。"
          shield: "在溫暖的大海裡生活。\n也曾經大量棲息於\n上古時期的伽勒爾近海。"
