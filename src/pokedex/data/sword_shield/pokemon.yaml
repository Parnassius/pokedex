      descriptions:
        jp_kana:
          sword: "めしべが　はなつ　とてつもなく\nくさい　においは　２キロさきまで\nとどき　きを　うしなわせる。"
          shield: "よだれのように　みえる　あまいミツ。\nとても　ねばねば　しており　ふれると\nいつまでも　まとわりつく。"
        jp_kanji:
          sword: "めしべが　放つ　とてつもなく\n臭い　においは　２キロ先まで\nとどき　気を　失わせる。"
          shield: "よだれのように　見える　甘い蜜。\nとても　ねばねば　しており　触れると\nいつまでも　まとわりつく。"
        en:
          sword: "Its pistils exude an incredibly foul odor.\nThe horrid stench can cause fainting at a distance\nof 1.25 miles."
          shield: "What appears to be drool is actually sweet honey.\nIt is very sticky and clings stubbornly if touched."
        fr:
          sword: "Ses pistils sécrètent une odeur incroyablement\nfétide qui fait perdre connaissance à\nses adversaires jusqu’à 2 km à la ronde."
          shield: "Ce qui semble être sa bave est en fait du nectar\ntrès collant. Si on le touche, il est très difficile\nde s’en dépêtrer."
        it:
          sword: "I pistilli emanano un puzzo orribile, capace\ndi far svenire chiunque nel raggio di 2 km."
          shield: "Ciò che sembra bava è in realtà dolce nettare.\nÈ molto viscoso: si appiccica appena lo si sfiora."
        de:
          sword: "Sein Stempel sondert einen unglaublich faulen\nGestank ab. Dieser stechende Geruch kann selbst\nbis zu 2 km entfernte Gegner bewusstlos machen."
          shield: "Was wie Speichel aussieht, ist eigentlich Honig.\nEr ist sehr klebrig und wenn man ihn berührt,\nbekommt man ihn nicht mehr ab."
        es:
          sword: "Libera un fétido olor por los pistilos. El fuerte\nhedor hace perder el conocimiento a cualquiera\nque se encuentre en un radio de 2 km."
          shield: "Lo que parece baba es realmente un néctar muy\npegajoso que se adhiere sin remisión al tocarlo."
        ko:
          sword: "암술에서 내뿜는 지독하게\n구린 냄새는 2km 떨어진 곳까지\n퍼져 정신을 잃게 만든다."
          shield: "침처럼 보이는 달콤한 꿀은\n매우 끈적거려서\n묻으면 좀처럼 떨어지지 않는다."
        zh_simp:
          sword: "雌蕊会散发一种\n极其强烈的恶臭，\n能让２公里远的人昏倒。"
          shield: "看似口水的东西其实是\n甜甜的蜜。非常黏稠，\n只要碰到就会一直黏住。"
        zh_trad:
          sword: "雌蕊會散發一種\n極其強烈的惡臭，\n能讓２公里外的人昏倒。"
          shield: "看似口水的東西其實是\n甜甜的蜜。非常黏稠，\n只要碰到就會一直黏住。"
vileplume:
