        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ground
        - steel
      egg_groups:
        - water_1
        - amorphous
      abilities:
        - mimicry
      descriptions:
        jp_kana:
          sword: "てつぶん　たっぷりの　どろの　なかで\nせいそくしていたため　がんじょうな\nはがねの　からだに　へんかした。"
          shield: "どろに　かくれて　めだつ　くちびるで\nえものを　おびきよせる。　ギザギザの\nはがねの　ヒレで　がっちり　はさむ。"
        jp_kanji:
          sword: "鉄分　たっぷりの　泥の　中で\n生息していたため　頑丈な\n鋼の　体に　変化した。"
          shield: "泥に　隠れて　目立つ　唇で\n獲物を　おびき寄せる。　ギザギザの\n鋼の　ヒレで　がっちり　挟む。"
        en:
          sword: "Living in mud with a high iron content has given it\na strong steel body."
          shield: "Its conspicuous lips lure prey in as it lies in wait in\nthe mud. When prey gets close, Stunfisk clamps\nits jagged steel fins down on them."
        fr:
          sword: "À force de vivre dans de la boue riche en fer,\nson corps s’est transformé en acier très solide."
          shield: "Il se cache dans la boue et attire l’attention de\nses proies avec son étrange bouche. Il les coince\nensuite dans ses nageoires d’acier dentelées."
        it:
          sword: "Ha sviluppato un corpo di solido acciaio\nvivendo in luoghi fangosi ricchi di ferro."
          shield: "Si nasconde nel fango e si serve delle labbra\nappariscenti per attirare la preda, poi la\nagguanta con le pinne d’acciaio seghettate."
        de:
          sword: "Das Leben inmitten von stark eisenhaltigem\nSchlamm führte dazu, dass es einen robusten\nKörper aus Stahl entwickelte."
          shield: "Es versteckt sich im Schlamm, lockt mit seinen\nauffälligen Lippen Beute an und lässt dann seine\ngezackten Flossen wie eine Falle zuschnappen."
        es:
          sword: "Al vivir en lodo rico en hierro, su cuerpo ha\nalcanzado la dureza del acero."
          shield: "Atrae a su presa con los labios, que destacan al\nocultar su cuerpo en el lodo, y la aferra con sus\naletas serradas y duras como el acero."
        ko:
          sword: "철분이 풍부한 진흙 속에서\n서식하다 보니 튼튼한\n강철의 몸으로 변화했다."
          shield: "진흙에 숨어 눈에 띄는 입술로\n먹이를 유인한다. 들쭉날쭉한\n강철 지느러미로 단단히 잡는다."
        zh_simp:
          sword: "栖息于富含铁质的\n泥巴里，因此获得了\n结实坚固的钢铁身躯。"
          shield: "会藏在泥巴里，用显眼的嘴唇\n吸引猎物接近自己，接着用\n锯齿般的钢鳍紧紧将对手夹住。"
        zh_trad:
          sword: "棲息在富含鐵質的\n泥巴裡，因此獲得了\n結實堅固的鋼鐵身軀。"
          shield: "會藏在泥巴裡，用顯眼的嘴唇\n吸引獵物接近自己，接著用\n鋸齒般的鋼鰭將對手緊緊夾住。"
