          shield: "てきに　はっこうたいの　てんめつを\nあびせて　せんいを　なくしてしまう。\nその　すきに　にげだすのだ。"
        jp_kanji:
          sword: "回転しながら　発光体を\n点滅。　光の　パターンで\n仲間と　コミュニケーションする。"
