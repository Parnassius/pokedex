      egg_groups:
        - monster
      abilities:
        - cursed_body
        - lightning_rod
      hidden_ability: rock_head
      held_items:
        rare: thick_club
      descriptions:
        jp_kana:
          sword: "てにした　ホネに　ほのおを　ともし\nなかまを　とむらう　おどりを\nよどおし　おどり　つづける。"
          shield: "ホネに　ともった　のろいの　ほのおは\nいつまでも　なおらない　いたみを\nからだと　こころに　のこすという。"
        jp_kanji:
          sword: "手にした　骨に　炎を　灯し\n仲間を　弔う　踊りを\n夜通し　踊りつづける。"
          shield: "骨に　灯った　呪いの　炎は\nいつまでも　治らない　痛みを\n体と　心に　残すという。"
        en:
          sword: "This Pokémon sets the bone it holds on fire and\ndances through the night as a way to mourn its\nfallen allies."
          shield: "The cursed flames that light up the bone carried\nby this Pokémon are said to cause both mental\nand physical pain that will never fade."
        fr:
          sword: "Le soir venu, il enflamme son os, puis se met\nà danser jusqu’au petit matin, à la mémoire\nde ses compagnons disparus."
          shield: "Les flammes maudites qui brûlent au bout de\nson os infligent des blessures inguérissables\nà la fois au corps et à l’âme de l’adversaire."
        it:
          sword: "Trascorre le sue notti danzando in memoria\ndei compagni perduti mentre impugna un osso\ninfuocato alle estremità."
          shield: "Si dice che le fiamme maledette che ardono alle\nestremità del suo osso causino un dolore eterno\nal corpo e allo spirito."
        de:
          sword: "Es entzündet die Enden des Knochens in seiner\nHand und führt die ganze Nacht einen Trauertanz\nzu Ehren seiner verstorbenen Artgenossen auf."
          shield: "Die verfluchten Flammen, die an seinem Knochen\nbrennen, sollen einen seelischen und körperlichen\nSchmerz hinterlassen, der niemals erlischt."
        es:
          sword: "Al caer la noche, prende los extremos del hueso\nque porta y baila sin descanso para honrar y\nllorar a sus compañeros caídos."
          shield: "Se dice que las llamas malditas del hueso que\nporta pueden herir de forma incurable el cuerpo\ny el alma de quien entre en contacto con ellas."
        ko:
          sword: "손에 든 뼈에 불을 붙여\n동료를 추모하는 춤을\n밤새도록 춘다."
          shield: "뼈에서 불타고 있는 저주의 불꽃은\n영원히 치유되지 않는 아픔을\n몸과 마음에 남긴다고 한다."
        zh_simp:
          sword: "点燃手中的骨头，\n为吊慰伙伴\n而通宵舞蹈。"
          shield: "据说，它手中的骨头上燃烧的\n诅咒之火，会给它的身心留下\n永远无法治愈的痛楚。"
        zh_trad:
          sword: "會點燃手上的骨頭，\n通宵達旦地跳著\n憑弔夥伴的舞蹈。"
          shield: "據說骨頭上點燃的\n詛咒之火，會在身心烙下\n永遠無法治癒的痛楚。"
