          shield: "つかれることのない　きょうじんな\nにくたいを　もつ。　おもい　にもつの\nうんぱんなどの　しごとを　てつだう。"
        jp_kanji:
          sword: "すごく　強靭な　肉体なので\nパワーセーブ　ベルトを　つけて\n強さを　制御している。"
          shield: "疲れることのない　強靭な\n肉体を　もつ。　重い　荷物の\n運搬などの　仕事を　手伝う。"
