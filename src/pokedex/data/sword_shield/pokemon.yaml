          shield: "てきが　はっする　オーラから　つぎの\nこうどうを　よそくする。　こうげきを\nひらりと　かわして　はんげきする。"
        jp_kanji:
          sword: "花粉や　蜜が　大好物。\nヒメンカの　花粉を　狙って\nアブリーが　近くを　飛びまわる。"
          shield: "敵が　発する　オーラから　つぎの\n行動を　予測する。　攻撃を\nひらりと　かわして　反撃する。"
        en:
          sword: "Nectar and pollen are its favorite fare. You can\nfind Cutiefly hovering around Gossifleur, trying\nto get some of Gossifleur’s pollen."
          shield: "An opponent’s aura can tell Cutiefly what that\nopponent’s next move will be. Then Cutiefly can\nglide around the attack and strike back."
        fr:
          sword: "Ce Pokémon raffole du pollen et du nectar.\nIl volette souvent près des Tournicoton\npour collecter leur pollen."
          shield: "Il perçoit l’aura de son ennemi et anticipe\nses mouvements. Il parvient ainsi à éviter\nles attaques et à riposter dans la foulée."
        it:
          sword: "Adora il nettare e il polline. Svolazza vicino\na Gossifleur attirato dal suo polline."
          shield: "Prevede la prossima mossa del nemico\npercependone l’aura. Schiva agilmente\ni suoi colpi e poi contrattacca."
        de:
          sword: "Es liebt Blütenstaub und Nektar. Hat ein Wommel\nes auf den Blütenstaub von Cottini abgesehen,\nschwirrt es in dessen Nähe herum."
          shield: "Es nimmt die Aura seiner Feinde wahr und erahnt\nihren nächsten Zug. So kann es Angriffen\ngeschickt ausweichen und zurückschlagen."
        es:
          sword: "Le fascinan el néctar y el polen. Suele revolotear\nalrededor de los Gossifleur, atraído por su polen."
          shield: "Al percibir el aura del rival, puede predecir sus\nmovimientos y esquivarlos sin problema mientras\nlanza su contraataque."
        ko:
          sword: "꽃가루와 꿀을 아주 좋아한다.\n꼬모카의 꽃가루를 노리고\n에블리가 주변을 날아다닌다."
          shield: "상대가 내뿜는 오라로\n다음 행동을 예측한다.\n공격을 가볍게 피하고 반격한다."
        zh_simp:
          sword: "花粉和花蜜是萌虻的最爱。\n为了采集幼棉棉的花粉，\n萌虻会在它们附近飞来飞去。"
          shield: "从敌人散发出的气场\n来判断对方下一步的行动。\n能轻盈地躲开攻击并进行反击。"
        zh_trad:
          sword: "花粉和花蜜是萌虻的最愛。\n為了採集幼棉棉的花粉，\n萌虻會在牠們附近飛來飛去。"
          shield: "從敵人散發出的氣場\n來判斷對方下一步的行動。\n能輕盈地躲開攻擊並進行反擊。"
ribombee:
  species_id: 743
  names:
    jp_kana: アブリボン
    jp_kanji: アブリボン
    en: Ribombee
    fr: Rubombelle
    it: Ribombee
    de: Bandelby
    es: Ribombee
    ko: 에리본
    zh_simp: 蝶结萌虻
    zh_trad: 蝶結萌虻
  forms:
    ribombee:
      form_id: 0
      base_stats:
        hp: 60
        attack: 55
        defense: 60
        special_attack: 95
        special_defense: 70
        speed: 124
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
