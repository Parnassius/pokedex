        es:
          sword: "A los Pumpkaboo Tamaño Pequeño les encanta\nguiar las almas de los niños al otro mundo."
          shield: "Se atribuye su pequeño tamaño al hecho de\nhaber vivido en un lugar donde no abundaban\nlas almas errantes."
        ko:
          sword: "작은 사이즈의 호바귀는\n아이의 영혼을 저세상으로\n데려가는 것을 좋아한다."
          shield: "떠도는 영혼이 적은\n토지에서 살았기 때문에\n작은 몸이 되었다고 한다."
        zh_simp:
          sword: "小尺寸的南瓜精\n喜欢把小孩子的灵魂\n带往另一个世界。"
          shield: "据说是因为生活在\n游荡的灵魂不太多的地方，\n所以身体变小了。"
        zh_trad:
          sword: "小尺寸的南瓜精\n喜歡把小孩子的靈魂\n帶往另一個世界。"
          shield: "據說是因為生活在\n遊蕩的靈魂不多的地方，\n所以身體變小了。"
