      descriptions:
        jp_kana:
          sword: "しかく　いがいの　ごかんを　つかい\nようすを　さぐる。　けられたものは\nたましいを　ぬかれてしまうという。"
          shield: "やみよを　かけぬけ　ねているものの\nせいめいエネルギーを　すいとる。\nこどくと　せいじゃくを　このむ。"
        jp_kanji:
          sword: "視覚　以外の　五感を　使い\n様子を　探る。　蹴られたものは\n魂を　抜かれてしまうという。"
          shield: "闇夜を　駆けぬけ　寝ているものの\n生命エネルギーを　吸い取る。\n孤独と　静寂を　好む。"
        en:
          sword: "It probes its surroundings with all its senses save\none—it doesn’t use its sense of sight. Spectrier’s\nkicks are said to separate soul from body."
          shield: "As it dashes through the night, Spectrier absorbs\nthe life-force of sleeping creatures. It craves\nsilence and solitude."
        fr:
          sword: "Il se sert de tous ses sens pour se repérer, sauf\ncelui de la vue. Un coup de ses sabots suffirait\nà séparer l’âme du corps de sa cible."
          shield: "Ce Pokémon friand de silence et de solitude\ngalope à travers les ténèbres nocturnes\net aspire l’énergie vitale des êtres endormis."
        it:
          sword: "Sonda l’area circostante con tutti i suoi sensi,\nesclusa la vista. Si narra che chi subisce i suoi\ncalci venga privato dell’anima."
          shield: "Galoppa nelle notti buie assorbendo l’energia\nvitale delle creature addormentate.\nAma la solitudine e la quiete."
        de:
          sword: "Um sein Umfeld zu erkunden, nutzt es all seine\nSinne – bis auf den Sehsinn. Wer von Phantoross\ngetreten wird, verliert angeblich seine Seele."
          shield: "Es galoppiert durch die finstere Nacht und\nabsorbiert die Lebensenergie der Schlafenden.\nPhantoross bevorzugt Einsamkeit und Stille."
        es:
          sword: "Examina su entorno con todos los sentidos, salvo\nla vista. Se dice que sus coces son capaces de\nrobarle el alma a quien las recibe."
          shield: "Amante de la quietud y la soledad, galopa por\nlas tinieblas nocturnas absorbiendo la energía\nvital de toda criatura que esté durmiendo."
        ko:
          sword: "시각 이외의 오감을 사용해서\n동태를 살핀다. 발에 차인 자는\n영혼이 빠져나가 버린다고 한다."
          shield: "어두운 밤을 달리며 잠든 자의\n생명 에너지를 흡수한다.\n고독과 정적을 좋아한다."
        zh_simp:
          sword: "使用视觉以外的五感探索\n周围的情况。据说如果\n被它踢到，就会灵魂出窍。"
          shield: "在黑暗的夜晚中奔跑，吸取\n正在睡觉的生物的生命能量。\n喜欢孤独和静寂。"
        zh_trad:
          sword: "會利用視覺之外的感官\n去探測周圍的狀況。據說\n被牠踢到時靈魂就會出竅。"
          shield: "在漆黑的夜裡奔馳，吸取\n正在睡覺的生物的生命能量。\n喜愛孤獨與寂靜。"
calyrex:
  species_id: 898
  names:
    jp_kana: バドレックス
    jp_kanji: バドレックス
    en: Calyrex
    fr: Sylveroy
    it: Calyrex
    de: Coronospa
    es: Calyrex
    ko: 버드렉스
    zh_simp: 蕾冠王
    zh_trad: 蕾冠王
  forms:
    calyrex:
      form_id: 0
      base_stats:
        hp: 100
        attack: 80
        defense: 80
        special_attack: 80
        special_defense: 80
        speed: 80
      evs_yield:
        hp: 3
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - psychic
        - grass
      egg_groups:
        - undiscovered
      abilities:
        - unnerve
      descriptions:
        jp_kana:
          sword: "いやしと　めぐみの　ちからを　もつ\nじあいに　みちた　ポケモン。　はるか\nむかし　ガラルに　くんりんしていた。"
          shield: "おおむかしの　ガラルを　すべていた\nでんせつの　おう。　こころを　いやし\nくさきを　めぶかせる　ちからがある。"
        jp_kanji:
          sword: "癒しと　恵みの　力を　もつ\n慈愛に　満ちた　ポケモン。　はるか\nむかし　ガラルに　君臨していた。"
          shield: "大昔の　ガラルを　統べていた\n伝説の　王。　心を　癒し\n草木を　芽吹かせる　力がある。"
        en:
          sword: "Calyrex is a merciful Pokémon, capable of\nproviding healing and blessings. It reigned over\nthe Galar region in times of yore."
          shield: "Calyrex is known in legend as a king that ruled\nover Galar in ancient times. It has the power to\ncause hearts to mend and plants to spring forth."
        fr:
          sword: "Doté de pouvoirs de guérison et d’abondance,\nce Pokémon miséricordieux régnait sur Galar\nil y a fort longtemps."
          shield: "Ce roi légendaire qui a régné sur Galar il y a fort\nlongtemps possède le pouvoir d’apaiser les cœurs\net de faire germer les plantes."
        it:
          sword: "Portatore di rigogliosità e dotato di poteri\ncurativi, questo Pokémon compassionevole\nregnò su Galar in tempi antichi."
          shield: "Il re delle leggende che dominò su Galar in un\nlontano passato. È in grado di calmare gli animi\ne far germogliare la vegetazione."
        de:
          sword: "Ein warmherziges Pokémon, das über heilende\nund segnende Kräfte verfügt. In längst\nvergangenen Zeiten herrschte es über Galar."
          shield: "Ein legendärer König, der einst Galar regierte.\nCoronospa besitzt die Macht, Herzen zu\nbesänftigen und Pflanzen gedeihen zu lassen."
        es:
          sword: "Un Pokémon muy compasivo agraciado con el\npoder de la curación. Reinó en Galar en tiempos\nremotos."
          shield: "Legendario monarca del antiguo Galar. Posee el\npoder de sanar el espíritu y de hacer brotar la\nvegetación."
        ko:
          sword: "치유와 은총의 힘을 가진\n자애로운 포켓몬.\n먼 옛날 가라르에 군림했었다."
          shield: "먼 옛날 가라르를 지배했던\n전설의 왕. 마음을 치유하고\n초목을 싹 트게 하는 능력이 있다."
        zh_simp:
          sword: "拥有治愈与恩泽之力，\n满腹慈爱之心的宝可梦。\n在很久以前曾统治伽勒尔。"
          shield: "曾经在很久以前统治着\n伽勒尔的传说之王。拥有\n治愈心灵和让草木发芽的能力。"
        zh_trad:
          sword: "擁有治癒與賜恩之力，\n且滿懷慈愛的寶可夢。\n在遠古時代曾統治伽勒爾。"
          shield: "曾在很久以前統治伽勒爾的\n傳說之王。擁有治癒心靈，\n讓草木發芽的力量。"
    calyrex_ice_rider:
      form_id: 1
      names:
        jp_kana: はくばじょうのすがた
        jp_kanji: はくばじょうのすがた
        en: Ice Rider
        fr: Cavalier du Froid
        it: Cavaliere Glaciale
        de: Schimmelreiter
        es: Jinete Glacial
        ko: 백마 탄 모습
        zh_simp: 骑白马的样子
        zh_trad: 騎白馬的樣子
      base_stats:
        hp: 100
        attack: 165
        defense: 150
        special_attack: 85
        special_defense: 130
        speed: 50
      evs_yield:
        hp: 0
        attack: 3
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - psychic
        - ice
      egg_groups:
        - undiscovered
      abilities:
        - as_one:glastrier
      descriptions:
        jp_kana:
          sword: "みちを　はばむものには　ようしゃ\nしないが　たたかいの　あとは　てきの\nきずでも　かまわず　いやしたという。"
          shield: "こうだいな　もりと　そこに　すむ\nいきものを　ひとばんにして　べつの\nばしょに　うつしかえたと　いわれる。"
        jp_kanji:
          sword: "道を　阻むものには　容赦\nしないが　戦いの　あとは　敵の\n傷でも　かまわず　癒したという。"
          shield: "広大な　森と　そこに　棲む\n生き物を　一晩にして　べつの\n場所に　移し替えたと　いわれる。"
        en:
          sword: "According to lore, this Pokémon showed no\nmercy to those who got in its way, yet it would\nheal its opponents’ wounds after battle."
          shield: "It’s said that this Pokémon once moved a large\nforest—and all the Pokémon living there—to a\nnew location overnight."
        fr:
          sword: "On raconte qu’il était sans pitié envers ceux qui\nlui barraient la route, mais qu’il n’hésitait pas\nà soigner leurs blessures après le combat."
          shield: "On raconte qu’en l’espace d’une nuit, il parvint\nà déplacer une forêt immense ainsi que toutes\nles créatures qui y vivaient."
        it:
          sword: "Si racconta che non mostrava alcuna pietà per chi\nostacolava il suo cammino, ma che dopo la lotta\nguariva le ferite dei suoi avversari."
          shield: "Si racconta che in una sola notte abbia trasferito\naltrove un’immensa foresta e tutte le creature\nche ci vivevano."
        de:
          sword: "Es zeigte jenen, die sich ihm in den Weg stellten,\nkeine Gnade. Nach dem Kampf soll es allerdings\ndie Wunden seiner Gegner geheilt haben."
          shield: "Erzählungen zufolge hat es in einer einzigen\nNacht einen weitläufigen Wald samt seiner\nBewohner an einen anderen Standort verlegt."
        es:
          sword: "No tenía piedad con quienes se interponían en\nsu camino, pero se sabe también que curaba a\nsus rivales tras enfrentarse a ellos en combate."
          shield: "Cuentan que le bastó una sola noche para llevar\na un nuevo emplazamiento un vasto bosque y a\ntodos los que en él habitaban."
        ko:
          sword: "길을 가로막는 자에게는 자비가 없지만\n싸운 뒤에는 적의 상처라도\n개의치 않고 치료해준다고 한다."
          shield: "광대한 숲과 그곳에 사는 생물을\n하룻밤 사이에 다른 곳으로\n옮겨 놓았다고 전해진다."
        zh_simp:
          sword: "据说它虽然对挡路之徒手下\n毫不留情，但在战斗结束后\n却会不计前嫌地帮敌人疗伤。"
          shield: "据说它用一个晚上把广阔的\n森林和栖息在其中的生物\n转移到了其他的地方。"
        zh_trad:
          sword: "據說牠對於擋路之徒是\n毫不留情，但戰鬥結束後\n會不計前嫌地幫敵方療傷。"
          shield: "據說牠曾在一夕之間，\n將遼闊的森林和棲息其中\n的生物一併移動到了別處。"
    calyrex_shadow_rider:
      form_id: 2
      names:
        jp_kana: こくばじょうのすがた
        jp_kanji: こくばじょうのすがた
        en: Shadow Rider
        fr: Cavalier d’Effroi
        it: Cavaliere Spettrale
        de: Rappenreiter
        es: Jinete Espectral
        ko: 흑마 탄 모습
        zh_simp: 骑黑马的样子
        zh_trad: 騎黑馬的樣子
      base_stats:
        hp: 100
        attack: 85
        defense: 80
        special_attack: 165
        special_defense: 100
        speed: 150
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 3
        special_defense: 0
        speed: 0
      types:
        - psychic
        - ghost
      egg_groups:
        - undiscovered
      abilities:
        - as_one:spectrier
      descriptions:
        jp_kana:
          sword: "あれちを　みどりに　するために\nきずなで　むすばれた　ポケモンと\nガラルを　かけめぐったと　いわれる。"
          shield: "かこ　みらい　すべての　できごとを\nみとおす　ちからで　いんせきから\nもりの　いきものを　すくったらしい。"
        jp_kanji:
          sword: "荒れ地を　緑に　するため\n絆で　結ばれた　ポケモンと\nガラルを　駆けめぐったと　いわれる。"
          shield: "過去　未来　すべての　できごとを\n見通す　力で　隕石から\n森の　生き物を　救ったらしい。"
        en:
          sword: "It’s said that Calyrex and a Pokémon that had\nbonded with it ran all across the Galar region to\nbring green to the wastelands."
          shield: "Legend says that by using its power to see all\nevents from past to future, this Pokémon saved\nthe creatures of a forest from a meteorite strike."
        fr:
          sword: "On raconte qu’il a parcouru la région de Galar\navec un Pokémon auquel il était uni pour\nrevitaliser les terres en friche."
          shield: "On raconte que grâce à son aptitude à voir\nle passé et le futur, il a sauvé les créatures\nd’une forêt de la chute d’une météorite."
        it:
          sword: "Si narra che abbia percorso l’intera Galar insieme\na un Pokémon a cui era profondamente legato\nper rendere fertili le terre sterili della regione."
          shield: "Si dice che grazie alla sua capacità di vedere\nogni avvenimento passato e futuro abbia salvato\nda un meteorite le creature di un’intera foresta."
        de:
          sword: "Laut Erzählungen reiste es mit einem Pokémon,\nmit dem es im Bunde stand, durch ganz Galar,\num wüstes Land zu begrünen."
          shield: "Mit seiner Kraft, alles von der Vergangenheit bis\nzur Zukunft zu sehen, soll es die Bewohner eines\nWaldes vor einem Meteoriten bewahrt haben."
        es:
          sword: "Cuenta la leyenda que recorrió Galar junto a un\nPokémon al que le unía un fuerte vínculo para\nconvertir todo páramo en un frondoso vergel."
          shield: "Cuentan que salvó a las criaturas del bosque del\nimpacto de un meteorito gracias a su capacidad\npara ver todo acontecimiento pasado y futuro."
        ko:
          sword: "황무지를 초록으로 물들이기 위해\n유대로 맺어진 포켓몬과\n가라르를 뛰어다녔다고 한다."
          shield: "과거와 미래의 전부를 꿰뚫어보는\n힘으로 운석의 위험으로부터\n숲의 생물을 구했다고 한다."
        zh_simp:
          sword: "据说它曾为了让不毛之地重现\n绿意，与牵绊深厚的宝可梦\n一起驰骋于伽勒尔大地。"
          shield: "据说它用能够看透过去与未来\n所有事件的能力从陨石掉落的\n危机中拯救了森林中的生物。"
        zh_trad:
          sword: "據說牠為了讓荒地長出綠意，\n曾與牽絆深厚的寶可夢\n一同馳騁在伽勒爾的大地。"
          shield: "據說牠曾利用能夠看穿過去和\n未來所有事情的能力，在隕石\n掉落時拯救了森林的生物。"
