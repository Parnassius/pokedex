      descriptions:
        jp_kana:
          sword: "テラキオン　ビリジオンと　ともに\nイッシュちほうの　ポケモンを　まもり\nひとと　たたかった　でんせつがある。"
          shield: "うまれながら　リーダーの　ふうかくを\nみにつける。　きょうぼうな　あいても\nコバルオンの　まえでは　おとなしい。"
        jp_kanji:
          sword: "テラキオン　ビリジオンと　ともに\nイッシュ地方の　ポケモンを　守り\n人と　戦った　伝説がある。"
          shield: "生まれながら　リーダーの　風格を\n身につける。　狂暴な　相手も\nコバルオンの　前では　おとなしい。"
        en:
          sword: "This Pokémon appears in a legend alongside\nTerrakion and Virizion, fighting against humans in\ndefense of the Unova region’s Pokémon."
          shield: "From the moment it’s born, this Pokémon\nradiates the air of a leader. Its presence will\ncalm even vicious foes."
        fr:
          sword: "Selon la légende, il aurait défié les Hommes,\naux côtés de Terrakium et de Viridium,\npour protéger les Pokémon d’Unys."
          shield: "Dès la naissance, il a un air de chef.\nMême le plus terrible des adversaires file doux\nface à lui."
        it:
          sword: "La leggenda narra che abbia lottato assieme\na Terrakion e Virizion contro gli esseri umani\nper proteggere i Pokémon di Unima."
          shield: "È un leader nato. Al suo cospetto anche\ni Pokémon più feroci assumono un\natteggiamento reverenziale."
        de:
          sword: "Legenden zufolge kämpfte es einst zusammen mit\nTerrakium und Viridium gegen die Menschen, um\ndie Pokémon der Einall-Region zu beschützen."
          shield: "Kobalium ist der geborene Anführer. Selbst die\ngefährlichsten Gegner unterwerfen sich ihm."
        es:
          sword: "Cuenta una leyenda que combatió contra los\nhumanos junto a Terrakion y Virizion para\nproteger a los Pokémon de Teselia."
          shield: "Un líder nato. Incluso los Pokémon más agresivos\nse muestran dóciles en su presencia."
        ko:
          sword: "테라키온 비리디온과 함께\n하나지방의 포켓몬을 지키기 위해\n인간에 맞서 싸웠다는 전설이 있다."
          shield: "태어나면서부터 리더의 품격을\n몸에 지녔다. 흉포한 상대도\n코바르온의 앞에서는 온순하다."
        zh_simp:
          sword: "传说它曾经与代拉基翁和\n毕力吉翁一起，为了保护\n合众地区的宝可梦而与人类作战。"
          shield: "生来就具有领导风范。\n即使是性格狂暴的宝可梦，\n在勾帕路翁面前也会变得温顺。"
        zh_trad:
          sword: "傳說牠曾經與代拉基翁和\n畢力吉翁一起，為了保護\n合眾地區的寶可夢而與人類作戰。"
          shield: "生來就具有領導風範。\n即使是性情狂暴的寶可夢，\n在勾帕路翁面前也會變得溫順。"
