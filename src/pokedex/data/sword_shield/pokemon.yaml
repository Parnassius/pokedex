        jp_kana:
          sword: "カラが　ひじょうに　かたく\nナパームだんでも　こわせない。\nこうげきするときだけ　ひらく。"
          shield: "いちど　カラを　とじてしまうと\nどんな　かいりきの　もちぬしでも\nあけることは　ふかのうだ。"
        jp_kanji:
          sword: "殻が　非常に　硬く\nナパーム弾でも　壊せない。\n攻撃するときだけ　開く。"
          shield: "いちど　殻を　閉じてしまうと\nどんな　怪力の　持ち主でも\n開けることは　不可能だ。"
        en:
          sword: "Its shell is extremely hard. It cannot be shattered,\neven with a bomb. The shell opens only when it\nis attacking."
          shield: "Once it slams its shell shut, it is impossible to\nopen, even by those with superior strength."
        fr:
          sword: "Sa coquille est tellement résistante que rien\nne peut la détruire, pas même une déflagration.\nIl ne l’ouvre que lorsqu’il attaque."
          shield: "Quand il referme sa coquille, il est impossible de\nla rouvrir, même avec une force hors du commun."
        it:
          sword: "Neppure una bomba può scalfire il suo duro\nguscio, che apre soltanto quando sta attaccando."
          shield: "Quando richiude il guscio nessuno può aprirlo,\nneppure chi è dotato di una forza straordinaria."
        de:
          sword: "Seine Schale ist extrem hart und kann nicht\neinmal durch eine Bombe zerschmettert werden.\nSie öffnet sich nur, wenn es angreift."
          shield: "Ist seine Schale erst geschlossen, ist es selbst mit\nviel Kraft nicht mehr möglich, diese zu öffnen."
        es:
          sword: "La concha que lo cubre es extremadamente dura,\nhasta el punto de que ni siquiera una bomba\npuede destrozarla. Solo se abre cuando ataca."
          shield: "Una vez que ha cerrado la concha, es imposible\nabrirla, independientemente de la fuerza que se\nejerza."
        ko:
          sword: "껍데기가 상당히 단단하여\n네이팜탄으로도 부술 수 없다.\n공격할 때만 연다."
          shield: "한번 껍질을 닫아버리면\n어떤 괴력의 소유자도\n여는 것은 불가능하다."
        zh_simp:
          sword: "贝壳非常坚硬，\n连燃烧弹都无法破坏。\n只有攻击的时候才会张开。"
          shield: "一旦它把壳闭上，\n无论是拥有什么样怪力的人\n都无法将其打开。"
        zh_trad:
          sword: "貝殼非常堅硬，\n連凝固汽油彈都無法破壞。\n只有攻擊的時候才會張開。"
          shield: "一旦牠把殼閉上，\n無論是擁有什麼樣怪力的人\n都無法將其打開。"
gastly:
  species_id: 92
