          shield: "のこぎりの　ような　キバは\nはがねポケモンの　ひふ　さえ\nズタズタに　きりさいて　しまう。"
        jp_kanji:
          sword: "古代の　獰猛な　ポケモン。\n完璧な　復元は\nいまの　科学でも　不可能らしい。"
          shield: "のこぎりの　ような　キバは\nはがねポケモンの　皮膚さえ\nズタズタに　切り裂いてしまう。"
        en:
          sword: "This is a ferocious Pokémon from ancient times.\nApparently even modern technology is incapable\nof producing a perfectly restored specimen."
          shield: "Aerodactyl’s sawlike fangs can shred skin to\ntatters—even the skin of Steel-type Pokémon."
        fr:
          sword: "On raconte qu’aujourd’hui encore, il est\nimpossible de restaurer à la perfection\nce Pokémon féroce de l’ère préhistorique."
          shield: "Sa dentition semblable à une scie peut même\nbroyer la peau des Pokémon Acier."
        it:
          sword: "È un feroce Pokémon dell’antichità. Pare che\ncon la tecnologia odierna non sia possibile\nrigenerarlo perfettamente."
          shield: "Le sue zanne simili a lame sono in grado di fare\na brandelli persino la pelle dei Pokémon di tipo\nAcciaio."
        de:
          sword: "Selbst mit moderner Technologie scheint es\nunmöglich, ein perfektes Exemplar von diesem\nwilden urzeitlichen Pokémon zu reproduzieren."
          shield: "Mit seinen Zähnen, die Sägeblättern gleichen,\nkann es selbst die Haut von Stahl-Pokémon\nzerfetzen."
        es:
          sword: "Un feroz Pokémon de la época prehistórica al\nque no bastan todos los avances tecnológicos\nactuales para regenerar a la perfección."
          shield: "Sus colmillos, afilados como sierras, pueden\nhacer trizas incluso la piel de Pokémon de tipo\nAcero."
        ko:
          sword: "고대의 거칠고 사나운 포켓몬이다.\n완벽한 복원은 현대의\n과학으로도 불가능하다고 한다."
          shield: "톱 같은 이빨은\n강철포켓몬의 피부도\n갈기갈기 베어 가른다."
        zh_simp:
          sword: "它是一种古代的凶猛宝可梦。\n据说，就算运用当今最先进的\n科技，也无法将其完美复原。"
          shield: "长着锯子般的牙齿。\n甚至连钢属性宝可梦的皮肤\n都会被它的牙齿撕成碎片。"
        zh_trad:
          sword: "古代的凶猛寶可夢。\n據說即使是當今的科學，\n也無法將牠完美地復原。"
          shield: "擁有像鋸子般的牙齒，\n就連鋼屬性寶可夢的\n皮膚都能撕裂成碎片。"
