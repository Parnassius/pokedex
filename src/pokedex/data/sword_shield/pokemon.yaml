        jp_kana:
          sword: "でんきを　ねらう　エレブーの\nたいさくに　じめんポケモンを\nおく　はつでんしょは　おおい。"
          shield: "あらしが　くると　たかい　きの\nまわりに　あつまり　かみなりが\nおちるのを　じっと　まちつづける。"
        jp_kanji:
          sword: "電気を　狙う　エレブーの　対策に\nじめんポケモンを　置く\n発電所は　多い。"
          shield: "嵐が　来ると　高い　木の\nまわりに　集まり　雷が　落ちるのを\nじっと　待ち続ける。"
        en:
          sword: "Many power plants keep Ground-type Pokémon\naround as a defense against Electabuzz that\ncome seeking electricity."
          shield: "With the coming of a storm, many of these\nPokémon will gather under tall trees and sit there\nwaiting for lightning to strike."
        fr:
          sword: "De nombreuses centrales électriques gardent\ndes Pokémon Sol à proximité afin d’empêcher\nles Élektek de leur voler de l’électricité."
          shield: "Quand un orage approche, ils se réunissent\ntous autour d’un grand arbre et attendent\npatiemment que la foudre s’abatte."
        it:
          sword: "Molte centrali elettriche utilizzano Pokémon\ndi tipo Terra per difendersi dagli Electabuzz\na caccia di elettricità."
          shield: "All’arrivo di un temporale questi Pokémon si\nraggruppano intorno agli alberi alti, aspettando\nimmobili che cada un fulmine."
        de:
          sword: "In vielen Elektrizitätswerken werden Pokémon\nvom Typ Boden eingesetzt, um Elektek davon\nabzuhalten, den dortigen Strom anzuzapfen."
          shield: "Bei Gewittern versammeln sich Elektek in der\nNähe von hohen Bäumen, wo sie regungslos auf\nBlitzeinschläge warten."
        es:
          sword: "Es habitual que las centrales eléctricas cuenten\ncon Pokémon de tipo Tierra para hacer frente a\nlos Electabuzz ávidos de electricidad."
          shield: "Al desatarse una tormenta, se reúnen en torno\na los árboles de mayor altura y esperan inmóviles\na que caiga algún rayo."
        ko:
          sword: "전기를 노리는 에레브를\n퇴치하고자 땅포켓몬을 두는\n발전소도 많다."
          shield: "폭풍이 치면 높은 나무\n주위에 모여 번개가\n떨어지기를 가만히 기다린다."
        zh_simp:
          sword: "很多发电站为了防止\n电击兽来偷电，会放一些\n地面属性的宝可梦对付它们。"
          shield: "暴风雨来临时，它们就会\n集结在高高的大树周围，\n耐心地等待落雷。"
        zh_trad:
          sword: "很多發電廠會用地面屬性的\n寶可夢當守衛，藉以對抗\n想伺機偷吃電力的電擊獸。"
          shield: "暴風雨來臨時，牠們會\n聚集在高大的樹周圍，\n靜靜地一直等待落雷。"
