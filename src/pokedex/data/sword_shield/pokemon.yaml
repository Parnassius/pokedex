          shield: "かいすいを　たくさん　のみこむと\nからだが　ボールの　ように　はずむ。\nまいにち　１トンの　エサを　たべる。"
        jp_kanji:
          sword: "飲みこんだ　海水を　目の　上の\n鼻の　穴から　噴き出し　アピール。\n毎日　１トンの　ヨワシを　食う。"
          shield: "海水を　たくさん　飲みこむと\n体が　ボールの　ように　弾む。\n毎日　１トンの　エサを　食べる。"
        en:
          sword: "It shows off by spraying jets of seawater from\nthe nostrils above its eyes. It eats a solid ton of\nWishiwashi every day."
          shield: "When it sucks in a large volume of seawater,\nit becomes like a big, bouncy ball. It eats a ton\nof food daily."
        fr:
          sword: "Il aime faire le beau en recrachant par son évent\nl’eau qu’il a avalée.\nIl gobe une tonne de Froussardine chaque jour."
          shield: "Il ressemble à un énorme ballon quand il avale\nde très grandes quantités d’eau de mer.\nIl dévore une tonne de nourriture par jour."
        it:
          sword: "Gioca spruzzando l’acqua di mare dalle narici\nsituate sopra gli occhi. Mangia una tonnellata\ndi Wishiwashi al giorno."
          shield: "Se inghiotte molta acqua diventa una specie\ndi palla rimbalzante. Ha bisogno di una\ntonnellata di cibo al giorno."
        de:
          sword: "Es prustet Meerwasser aus den Nasenlöchern,\ndie über seinen Augen liegen. Außerdem frisst\nes täglich eine Tonne Lusardin."
          shield: "Verschluckt es eine große Menge Meerwasser,\nwird sein Körper elastisch wie ein Ball. Es frisst\ntäglich eine Tonne Nahrung."
        es:
          sword: "Wailmer se come una tonelada de Wishiwashi\ncada día. Le gusta llamar la atención expulsando\nchorros de agua marina por su espiráculo."
          shield: "Cuando traga una gran cantidad de agua marina,\nse hincha hasta parecer una pelota. Necesita una\ntonelada de alimento al día."
        ko:
          sword: "들이마신 바닷물을 눈 위의\n콧구멍으로 뿜어내어 어필한다.\n매일 1톤의 약어리를 먹는다."
          shield: "바닷물을 많이 마시면\n몸이 공처럼 튄다.\n매일 1톤의 먹이를 먹는다."
        zh_simp:
          sword: "把喝入的海水从眼睛上方的\n鼻孔中喷出来吸引他人。\n每天要吃１吨弱丁鱼。"
          shield: "喝入大量的海水之后，\n身体会鼓成像球一样。\n每天要吃掉１吨的食物。"
        zh_trad:
          sword: "把喝入的海水從眼睛上方的\n鼻孔中噴出來吸引他人。\n每天要吃１噸弱丁魚。"
          shield: "喝入大量的海水之後，\n身體會鼓成像球一樣。\n每天要吃掉１噸的食物。"
