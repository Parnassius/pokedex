      descriptions:
        jp_kana:
          sword: "とても　かしこく　よく　なつく。\nはじめて　ひとのパートナーに　なった\nポケモンと　いう　せつも　あるのだ。"
          shield: "からだを　おおう　くろい　けは\nぶあつく　だんりょくが　ある。\nするどい　キバも　はじきかえすぞ。"
        jp_kanji:
          sword: "とても　賢く　よく　懐く。\nはじめて　人のパートナーに　なった\nポケモンと　いう　説も　あるのだ。"
          shield: "体を　覆う　黒い　毛は\nぶ厚く　弾力が　ある。\nするどい　キバも　弾き返すぞ。"
        en:
          sword: "Herdier is a very smart and friendly Pokémon.\nSo much so that there’s a theory that Herdier was\nthe first Pokémon to partner with people."
          shield: "The black fur that covers this Pokémon’s body\nis dense and springy. Even sharp fangs bounce\nright off."
        fr:
          sword: "Ce Pokémon est très intelligent et affectueux.\nUne théorie avance qu’il aurait été le premier\nà devenir le partenaire d’un être humain."
          shield: "Les poils sombres qui recouvrent son dos sont\nsi épais et si souples qu’ils peuvent même\nrepousser des crocs acérés."
        it:
          sword: "È molto intelligente e si affeziona con facilità.\nSecondo alcune teorie sarebbe stato il primo\nPokémon a diventare il compagno degli umani."
          shield: "La pelliccia scura che ricopre il suo corpo è\nspessa ed elastica, al punto da respingere\nanche delle zanne affilate."
        de:
          sword: "Es ist sehr intelligent und zutraulich. Einer Theorie\nzufolge soll Terribark das erste Pokémon gewesen\nsein, das an der Seite von Menschen gelebt hat."
          shield: "Das dunkle Fell, das seinen Körper bedeckt,\nist sehr dicht und federnd. Selbst Angriffe mit\nscharfen Fangzähnen prallen davon ab."
        es:
          sword: "Es muy inteligente y cariñoso. Existen ciertas\nteorías que lo consideran el primer Pokémon\nque se convirtió en compañero de los humanos."
          shield: "El pelaje negro que lo recubre es tan denso y\nelástico que puede repeler incluso los colmillos\nmás afilados."
        ko:
          sword: "매우 영리하고 금방 친해진다.\n인간의 파트너가 된\n첫 포켓몬이라는 설도 있다."
          shield: "몸을 뒤덮은 검은 털은\n두껍고 탄력이 있다.\n날카로운 이빨도 튕겨낸다."
        zh_simp:
          sword: "十分聪明，容易亲近。\n也有人认为它是第一种\n成为人类同伴的宝可梦。"
          shield: "覆盖在身上的黑色体毛\n既厚又有弹性，甚至能\n把尖锐的牙齿也反弹回去。"
        zh_trad:
          sword: "非常聰明，容易與人親近。\n甚至有人說，牠是最先\n成為人類同伴的寶可夢。"
          shield: "覆蓋身體的黑色體毛\n既厚實又有彈性，就連\n銳利的獠牙也會被反彈。"
stoutland:
  species_id: 508
  names:
    jp_kana: ムーランド
    jp_kanji: ムーランド
    en: Stoutland
    fr: Mastouffe
    it: Stoutland
    de: Bissbark
    es: Stoutland
    ko: 바랜드
    zh_simp: 长毛狗
    zh_trad: 長毛狗
