          leaf_green: "ジャングルの　おくちに　ウツボット\nばかり　いる　ちたいが　あって\nいったら　２どと　かえってこれない。"
        en:
          fire_red: "Lures prey into its mouth with a honeylike\naroma. The helpless prey is melted with\na dissolving fluid."
          leaf_green: "Said to live in huge colonies deep in\njungles, although no one has ever\nreturned from there."
        fr:
          fire_red: "L’odeur mielleuse qu’il propage lui\npermet d’attirer ses proies jusqu’à\nsa bouche. La proie piégée est alors\ndigérée grâce à un fluide très acide."
          leaf_green: "Il vit en colonie dans la jungle mais\npersonne n’en est jamais revenu vivant."
        it:
          fire_red: "Attira la preda verso la bocca servendosi\ndi un aroma simile al miele, per poi\ndissolverla con un solvente."
          leaf_green: "Pare che viva in grandi colonie nel cuore\ndella giungla, ma nessuno è mai tornato\nda lì per raccontarlo."
        de:
          fire_red: "Es lockt Beute mit honigartigem Aroma\nin seinen Mund. Die hilflose Beute\nwird in seiner Flüssigkeit rückstandslos\naufgelöst."
          leaf_green: "Dieses POKéMON soll in großen Kolonien\ntief im Dschungel leben, doch niemand kann\ndies bestätigen."
        es:
          fire_red: "Deja que su presa se le acerque a la\nboca, atraída por el aroma a miel. Una\nvez dentro, la disuelve con un fluido."
          leaf_green: "Dicen que vive en grandes colonias\nen el interior de las junglas, aunque\nnadie ha podido verificarlo."
tentacool:
  species_id: 72
