        special_defense: 0
        speed: 0
      types:
        - grass
        - psychic
      egg_groups:
        - grass
      abilities:
        - chlorophyll
      descriptions:
        jp_kana:
          fire_red: "あるく　ねったいうりん　とよばれる。\nみの　ひとつひとつに　かおがあって\nそれぞれ　いしを　もっている。"
          leaf_green: "ごくまれに　あたまの　どれか\nひとつが　じめんに　おちると\nタマタマになって　うごきだすという。"
        en:
          fire_red: "It is called “The Walking Tropical\nRainforest.” Each of the nuts has\na face and a will of its own."
          leaf_green: "It is said that on rare occasions, one\nof its heads will drop off and continue on\nas an EXEGGCUTE."
        fr:
          fire_red: "On le surnomme «La forêt tropicale\nambulante». Chacune de ses noix\npossède un visage et un tempérament\nqui lui sont propres."
          leaf_green: "On raconte que si une de ses têtes\nse détache, elle se transforme en un\nNOEUNOEUF."
        it:
          fire_red: "Viene chiamato la “foresta con le\ngambe”. Ognuna delle noci che\nlo compongono ha una propria volontà."
          leaf_green: "La leggenda narra che in rari casi una\ndelle sue teste si stacca per formare\nun EXEGGCUTE."
        de:
          fire_red: "Man nennt es „Wandelnder\nRegenwald“. Jede der\nNüsse hat ein eigenes Gesicht und\neinen eigenen Willen."
          leaf_green: "In seltenen Fällen spaltet sich ein Teil\ndieses POKéMON ab und lebt als OWEI\nweiter."
        es:
          fire_red: "Suelen referirse a él como la “vegetación\ndel trópico con patas”. Cada una de sus\ncabezas tiene autonomía."
          leaf_green: "Dice la leyenda que en raras ocasiones\nuna de sus cabezas cae y sobrevive\ncomo un EXEGGCUTE."
cubone:
  species_id: 104
