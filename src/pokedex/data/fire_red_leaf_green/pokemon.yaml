      descriptions:
        jp_kana:
          fire_red: "ひとを　しんじこませるのが　うまい。\nパントマイムで　つくったカベが\nほんとうに　あらわれるという。"
          leaf_green: "パントマイムの　じゃまを　すると\nとつぜん　おおきな　てのひらで\nおうふくビンタを　してくるという。"
        en:
          fire_red: "It is adept at conning people. It is said\nto be able to create walls out of thin\nair by miming."
          leaf_green: "If interrupted while it is miming, it will\nsuddenly DOUBLESLAP the offender with its\nbroad hands."
        fr:
          fire_red: "Il adore imiter les gens. On le dit\ncapable de créer de véritables murs\njuste en les mimant."
          leaf_green: "Dérangez-le pendant qu’il mime et il\nse battra en distribuant des volées\nde claques."
        it:
          fire_red: "Si diletta ad imbrogliare la gente. Si\ndice che sia in grado di creare pareti\nd’aria servendosi della mimica."
          leaf_green: "Se interrotto durante la mimica,\nschiaffeggia ripetutamente il nemico con\nuna DOPPIASBERLA."
        de:
          fire_red: "Es ist geschickt darin, Menschen\nzu beeinflussen. Man sagt, es könne dünne\nWände aus Luft nur durch Mimen\nentstehen lassen."
          leaf_green: "Stört man dieses POKéMON beim Mienenspiel,\nso setzt es mit seinen großen Händen\nDUPLEXHIEB ein."
        es:
          fire_red: "Dicen que puede hacer un muro a partir\ndel aire mediante la pantomima.\nEs experto en crear ilusiones ópticas."
          leaf_green: "Si alguien lo interrumpe mientras excava,\nse pondrá a darle bofetadas con las\nenormes manos que tiene."
scyther:
  species_id: 123
  names:
