          leaf_green: "だれかに　みられると\nシッポで　じめんを　ほって\nうしろむきに　にげだすのだ。"
        en:
          fire_red: "If spotted, it escapes by burrowing with\nits tail. It can hover just slightly using\nits wings."
          leaf_green: "When spotted, this POKéMON escapes\nbackward by furiously boring into the\nground with its tail."
        fr:
          fire_red: "S’il est repéré, il fuit en creusant avec\nsa queue. Il peut léviter avec ses ailes."
          leaf_green: "Si un ennemi le repère, il creuse\nfurieusement dans la terre avec sa\nqueue pour s’échapper."
        it:
          fire_red: "Se lo scoprono, fugge scavando con la\ncoda. Le ali non gli permettono che\npiccoli voli."
          leaf_green: "Se lo si scopre, questo POKéMON fugge\nall’indietro scavando furiosamente nel\nterreno con la coda."
        de:
          fire_red: "Wird es entdeckt, gräbt es sich ins\nErdreich, um zu fliehen. Setzt es seine\nFlügel ein, kann es schweben."
          leaf_green: "Wird es entdeckt, flüchtet dieses POKéMON,\nindem es sich mit seinem Schwanz in den\nBoden gräbt."
        es:
          fire_red: "Si se siente amenazado, escapa cavando\ncon la cola. Puede flotar ligeramente\nusando las alas."
          leaf_green: "Este POKéMON escapa perforando\nel suelo con la cola y enterrándose\nde espaldas, si es descubierto."
gligar:
