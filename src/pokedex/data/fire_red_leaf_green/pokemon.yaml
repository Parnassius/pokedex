        jp_kana:
          fire_red: "おおきな　りょうめで　３６０ど\nあらゆる　ほうこうを　みわたして\nエサとなる　ムシを　さがしている。"
          leaf_green: "こうそくで　ハネを　はばたかせると\nしょうげきは　が　はっせいして\nまわりの　まどガラスが　われていく。"
        en:
          fire_red: "Its large eyes can scan 360 degrees.\nIt looks in all directions to seek out\ninsects as its prey."
          leaf_green: "If it flaps its wings really fast, it can\ngenerate shock waves that will shatter\nwindows in the area."
        fr:
          fire_red: "Ses yeux immenses peuvent voir à\n360 degrés. Il regarde partout pour\ntrouver des insectes à avaler."
          leaf_green: "En battant des ailes très vite, il peut\ngénérer une onde de choc très violente."
        it:
          fire_red: "I suoi grandi occhi vedono a 360 gradi,\ncercando in ogni direzione insetti da\ncatturare."
          leaf_green: "Se agita le ali ad altissima velocità può\ngenerare onde che distruggono i vetri\ndelle finestre nella zona."
        de:
          fire_red: "Seine riesigen Augen verfügen über einen\nBlickwinkel von 360 Grad. Es erspäht mit\nihnen Beutetiere."
          leaf_green: "Schlägt es schnell mit den Flügeln,\nerzeugt es Schockwellen, durch die sogar\nFenster zerbersten."
        es:
          fire_red: "Sus grandes ojos pueden girar 360 grados.\nMira en todas direcciones en busca de\ninsectos como presa."
          leaf_green: "Si agita muy rápido las alas, genera\nondas expansivas capaces de hacer\nañicos las ventanas que haya cerca."
