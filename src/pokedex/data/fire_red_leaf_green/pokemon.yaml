          leaf_green: "あたまのハッパから　ほのかに　あまい\nかおりが　ただよう。おとなしくて\nひざしを　あびるのが　だいすき。"
        en:
          fire_red: "Its pleasantly aromatic leaf has the\nability to check the humidity and\ntemperature."
          leaf_green: "A sweet aroma gently wafts from the leaf\non its head. It is docile and loves to\nsoak up the sun’s rays."
        fr:
          fire_red: "Sa feuille à l’arôme agréable a le\npouvoir de déterminer la température\net le niveau d’humidité."
          leaf_green: "Un doux parfum émane de la feuille\nplacée sur sa tête. Il est très doux et\nil aime dormir au soleil."
        it:
          fire_red: "La sua foglia piacevolmente profumata\nha il potere di rilevare l’umidità e la\ntemperatura."
          leaf_green: "Un dolce profumo si diffonde dalla sua\nfoglia sulla testa. È docile e ama\nscaldarsi al sole."
        de:
          fire_red: "Mit seinem aromatischem Blatt ist es in\nder Lage die Temperatur und die\nLuftfeuchtigkeit zu messen."
          leaf_green: "Ein süßer Duft geht von dem Blatt auf\nseinem Kopf aus. Es ist ruhig und liegt\ngerne in der Sonne."
        es:
          fire_red: "Sus hojas aromáticas son capaces de medir\nla humedad y la temperatura."
          leaf_green: "La hoja de la cabeza desprende\nun dulce aroma. Es dócil y le encanta\nabsorber rayos de sol."
