        jp_kana:
          fire_red: "いばらの　なかに　すをつくる。\nトゲで　きずつきながら　そだてられた\nひなの　ハネは　かたくなる。"
          leaf_green: "じょうぶな　ハネは　おもそうだが\nホネのなかは　くうどうで　かるく\nじゆうに　おおぞらを　とびまわる。"
        en:
          fire_red: "After nesting in bramble bushes, the wings\nof its chicks grow hard from scratches by\nthorns."
          leaf_green: "Its sturdy wings look heavy, but its bones\nare hollow and light, allowing it to fly\nfreely in the sky."
        fr:
          fire_red: "Comme il fait son nid dans les ronces,\nses petits s’endurcissent à force d’être\nsans cesse éraflés."
          leaf_green: "Ses ailes sont en fait légères et creuses.\nIl vole facilement et peut atteindre de\ntrès hautes altitudes."
        it:
          fire_red: "Facendo il nido tra i rovi, le ali dei suoi\npiccoli si rinforzano per i graffi causati\ndalle spine."
          leaf_green: "Le imponenti ali sembrano pesanti, ma in\nrealtà sono vuote e leggere, e lo fanno\nvolare libero nel cielo."
        de:
          fire_red: "Die dornigen Zweige seines Nests bewirken,\ndass die Flügel seiner Jungen fest und\nhart werden."
          leaf_green: "Seine robusten Flügel scheinen schwer zu\nsein. Aber sie sind hohl und es kann frei\nempor fliegen."
        es:
          fire_red: "Después de anidar en zarzas, las alas de\nsus polluelos crecen fortalecidas por los\nrasguños."
          leaf_green: "Sus fuertes alas parecen pesadas, aunque\nson huecas y ligeras, y le permiten volar\nlibremente."
houndour:
  species_id: 228
  names:
    jp_kana: デルビル
