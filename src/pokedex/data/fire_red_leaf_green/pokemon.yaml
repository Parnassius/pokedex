      descriptions:
        jp_kana:
          fire_red: "きしょうが　はげしく　しっぽを\nまっすぐ　たてたら　よう　ちゅうい。\nとびかかって　かみつく　まえぶれだ。"
          leaf_green: "けなみが　うつくしく　ペットに\nしたがる　ひとも　おおいが　すぐ\nひっかいたり　するので　てごわいぞ。"
        en:
          fire_red: "Has a vicious temperament. Beware if it\nraises its tail straight up. It is a signal\nthat it is about to pounce and bite."
          leaf_green: "Although its fur has many admirers, it is\ntough to raise as a pet because of its\nfickle meanness."
        fr:
          fire_red: "Ce POKéMON a un comportement sournois.\nS’il lève la queue, cela signifie qu’il\ns’apprête à vous mordre."
          leaf_green: "Très apprécié pour sa fourrure, il est\ndifficile à apprivoiser en raison de son\ncaractère rétif."
        it:
          fire_red: "POKéMON piuttosto malvagio. Se rizza la\ncoda, meglio stargli alla larga: significa\nche sta per attaccare."
          leaf_green: "Sebbene molto amato per il suo pelo, è\ndifficile addomesticarlo per la volubile\ncrudeltà."
        de:
          fire_red: "Es ist aufbrausend. Nimm dich in Acht,\nwenn es seinen Schweif aufrichtet.\nDas ist ein Anzeichen, dass es\nzuschlägt und beißt."
          leaf_green: "Dieses POKéMON hat sehr schönes Fell.\nEs ist jedoch ein schwer erziehbares\nHaustier."
        es:
          fire_red: "Tiene un carácter muy fuerte. Cuando\nva a propinar un golpe y morder al rival,\nsuele estirar y levantar la cola."
          leaf_green: "Aunque es muy admirado por el pelo,\nes difícil de entrenar como mascota,\nporque es un poco travieso."
psyduck:
  species_id: 54
  names:
    jp_kana: コダック
    en: PSYDUCK
