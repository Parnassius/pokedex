        jp_kana:
          fire_red: "シッポの　あかりは　とおくまで\nとどくので　むかしより　かがりび\nとして　だいじに　されている。"
          leaf_green: "シッポのさきが　ひかりかがやく。\nひかりは　はるか　とおくまで　とどき\nまよったものの　みちしるべとなる。"
        en:
          fire_red: "The bright light on its tail can be seen\nfar away. It has been treasured since\nancient times as a beacon."
          leaf_green: "The tail’s tip shines brightly and can be\nseen from far away. It acts as a beacon\nfor lost people."
        fr:
          fire_red: "La lumière vive sur sa queue peut être\nvue de loin. Il a longtemps été vénéré\net utilisé comme un phare."
          leaf_green: "Le bout de sa queue brille si fort qu’il\npeut être vu de très loin. Il sert de\nbalise aux personnes égarées."
        it:
          fire_red: "La forte luce che ha sulla coda è\nvisibile da molto lontano. Da sempre è un\nriferimento per chi si perde."
          leaf_green: "La punta della coda è molto luminosa,\nvisibile da grandi distanze. Fa da segnale\nper chi si è perso."
        de:
          fire_red: "Das helle Licht an seinem Schwanzende ist\nvon Weitem zu sehen. Es gilt seit der\nAntike als Leuchtfeuer."
          leaf_green: "Seine Schwanzspitze ist so hell, dass\nviele Verschollene es als\nOrientierungspunkt benutzen."
        es:
          fire_red: "El brillo de la cola es visible desde\nlejos. En la antigüedad se usaba mucho\ncomo faro."
          leaf_green: "La punta de la cola brilla y se puede\nver desde lejos. Suele usarse como\nfaro."
bellossom:
  species_id: 182
  names:
    jp_kana: キレイハナ
