          leaf_green: "ふかい　じめんの　したで\nあっしゅく　された　からだは\nダイヤモンドよりも　かたいのだ。"
        en:
          fire_red: "It is said that if an ONIX lives for over\n100 years, its composition changes to\nbecome diamond-like."
          leaf_green: "Its body has been compressed deep under\nthe ground. As a result, it is even harder\nthan diamond."
        fr:
          fire_red: "On raconte que si un ONIX vit plus de\n100 ans, sa composition change pour\ndevenir similaire à celle du diamant."
          leaf_green: "Son corps a été comprimé par la\npression du sol. Il est devenu plus\nrésistant que le diamant."
        it:
          fire_red: "Sembra che se ONIX vive per più di 100\nanni, cambi la composizione per diventare\nduro come il diamante."
          leaf_green: "Il suo corpo, compresso a grandissime\nprofondità, è diventato più duro del\ndiamante."
        de:
          fire_red: "Man sagt, dass ein ONIX, das über 100\nJahre alt ist, hart wie ein Diamant sein\nsoll."
          leaf_green: "Es wurde tief in der Erde derartig\nzusammengestaucht, dass sein Körper\nhärter als ein Diamant wurde."
        es:
          fire_red: "Dicen que si ONIX viviera más de 100\naños, su composición sería la del\ndiamante, como STEELIX."
          leaf_green: "Su cuerpo ha sido comprimido en el\ninterior de la tierra, y por eso es hasta\nmás duro que el diamante."
snubbull:
