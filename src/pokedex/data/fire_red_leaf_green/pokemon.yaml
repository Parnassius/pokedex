        jp_kana:
          fire_red: "どんな　においも　かぎわける。\nじめんふかくに　うまっている\nたべものも　のこらず　みつけだす。"
          leaf_green: "きのぼりも　とくいだが\nまえあしで　ふといみきを　へしおって\nおちてきた　きのみを　たべる。"
        en:
          fire_red: "With its ability to distinguish any smell,\nit unfailingly finds all food buried deep\nunderground."
          leaf_green: "Although it is a good climber, it prefers\nto snap stout trees with its forelegs and\neat fallen BERRIES."
        fr:
          fire_red: "Doté d’un odorat hypersensible, il\ntrouve immanquablement toute\nnourriture enfouie dans le sol."
          leaf_green: "Même s’il grimpe bien aux arbres,\nil préfère les secouer avec ses pattes\npour faire tomber des BAIES."
        it:
          fire_red: "Grazie al suo fenomenale olfatto, trova\ncibo nel terreno anche a grandi\nprofondità."
          leaf_green: "È un buon scalatore, ma preferisce\nraccogliere BACCHE scrollando gli alberi\ncon le zampe anteriori."
        de:
          fire_red: "Da es alle Gerüche perfekt unterscheiden\nkann, findet es sogar Nahrung, die tief im\nErdreich ist."
          leaf_green: "Obwohl es gut klettern kann, stößt es mit\nden Pranken gegen die Bäume und isst die\nBEEREN vom Boden."
        es:
          fire_red: "Capaz de percibir cualquier tipo de\naroma, encuentra sin problemas todo\nalimento enterrado bajo tierra."
          leaf_green: "Aunque trepa muy bien, prefiere agitar\nlos árboles con sus patas y comer las\nBAYAS que caen."
slugma:
  species_id: 218
  names:
    jp_kana: マグマッグ
