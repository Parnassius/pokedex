      descriptions:
        jp_kana:
          fire_red: "きかがくてきな　ボディーから\nうちゅうせいぶつ　ではないかと\nじもとでは　うたがわれている。"
          leaf_green: "まんなかの　コアとよばれる　ぶぶんは\nなないろに　かがやく。これを\nほうせきにする　ひとも　いるという。"
        en:
          fire_red: "This POKéMON has a geometric body.\nBecause of its body, the locals suspect\nthat it is an alien creature."
          leaf_green: "Its central core glows with the seven\ncolors of the rainbow. Some people value\nthe core as a gem."
        fr:
          fire_red: "Le corps de ce POKéMON a une forme\ngéométrique. A cause de cette\nparticularité, les pêcheurs racontent que\nce POKéMON vient d’une autre planète."
          leaf_green: "Son cœur brille des couleurs de\nl’arc-en-ciel. On raconte que c’est\nune pierre précieuse."
        it:
          fire_red: "A causa del corpo geometrico, la gente\ncrede che si tratti di una creatura\naliena."
          leaf_green: "Nel suo nucleo brillano i sette colori\ndell’arcobaleno. Qualcuno lo considera una\npietra preziosa."
        de:
          fire_red: "Dieses POKéMON hat einen geo-\nmetrischen Körper. Aufgrund seines Körpers\nvermuten die Einheimischen, es sei\naußerirdischen Ursprungs."
          leaf_green: "Der Kern dieses POKéMON leuchtet in den\nFarben des Regenbogens. Sein Kern gilt\nals Edelstein."
        es:
          fire_red: "Este POKéMON tiene un cuerpo geométrico\nque le da un aspecto extraterrestre."
          leaf_green: "Su núcleo central brilla con los 7\ncolores del arco iris. Para algunos\ntiene el valor de una gema."
mr_mime:
