          leaf_green: "あたまに　でっぱりが　あって\nひじょうに　かたい。ずつきで\nひょうざんを　わって　すすむ。"
        en:
          fire_red: "Covered with light blue fur, its hide is\nthick and tough. It is active in bitter\ncold of minus 40 degrees Fahrenheit."
          leaf_green: "The protruding horn on its head is very\nhard. It is used for bashing through thick\nicebergs."
        fr:
          fire_red: "Sa peau épaisse et dure est recouverte\nd’une fourrure bleu clair. Elle permet\nà ce POKéMON de résister aux\ntempératures les plus glaciales."
          leaf_green: "La corne sur son front est très\nrésistante. Elle lui sert à détruire\nles blocs de glace."
        it:
          fire_red: "Sotto la pelliccia azzurra ha una pelle\nspessa e dura. Può resistere ad una\ntemperatura di - 40 ºC."
          leaf_green: "Il corno che gli sporge dalla testa è\nmolto duro. Lo usa per fendere lastroni\ndi ghiaccio."
        de:
          fire_red: "Unter seinem hellblauen Pelz liegt eine\ndicke und feste Haut. Es ist bei frostigen\nminus 40 Grad Celsius noch aktiv."
          leaf_green: "Dieses POKéMON verfügt über ein sehr\nhartes Horn, um damit dicke Eisschichten\nzu durchbrechen."
        es:
          fire_red: "Está recubierto de un pelaje de color\nazul, y tiene una piel gruesa y tosca.\nSe mantiene activo a 40 grados bajo 0."
          leaf_green: "El cuerno que sobresale de su cabeza es\nmuy duro. Suele usarlo para romper el\nhielo."
dewgong:
