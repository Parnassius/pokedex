      descriptions:
        jp_kana:
          fire_red: "かざんの　かこうちかくで\nみつかった。くちから　ほのおをはく。\nたいおんは　１２００ど　もある。"
          leaf_green: "みずから　オレンジいろに　もえていて\nほのおの　なかに　かくれると\nまったく　みわけが　つかなくなる。"
        en:
          fire_red: "Found near the mouth of a volcano.\nThis fire-breather’s body temperature is\nnearly 2,200 degrees Fahrenheit."
          leaf_green: "Its body always burns with an orange glow\nthat enables it to hide perfectly amidst\nflames."
        fr:
          fire_red: "On trouve ce POKéMON près des\nbouches de volcans. Son corps\nincandescent atteint 1 200 degrés."
          leaf_green: "Son corps en fusion brûle d’une flamme\norangée, le rendant invisible dans le feu."
        it:
          fire_red: "È stato trovato presso il cratere di un\nvulcano. La sua temperatura corporea\nsi aggira sui 1.200 ºC."
          leaf_green: "Il suo corpo arde con bagliori arancio\nche gli consentono una mimesi perfetta\ntra le fiamme."
        de:
          fire_red: "Es wurde in der Nähe eines Vulkans\ngefunden. Die Körpertemperatur dieses\nFeuerspuckers liegt bei fast 1200 Grad\nCelsius."
          leaf_green: "Dieses POKéMON kann sich dank seines\norangefarbenen Körpers perfekt im Feuer\nverstecken."
        es:
          fire_red: "A este POKéMON se lo encontraron cerca\nde un volcán. Esta criatura ígnea tiene\nuna temperatura corporal de unos 1.200º."
          leaf_green: "Su cuerpo siempre arde con un brillo\nnaranja, con el que se oculta entre las\nllamas."
pinsir:
  species_id: 127
  names:
    jp_kana: カイロス
