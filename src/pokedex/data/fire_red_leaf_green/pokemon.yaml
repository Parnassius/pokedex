      descriptions:
        jp_kana:
          fire_red: "ひるまは　むやみやたらと　げんきに\nうごきまわるが　ひが　しずむと\nばったり　うごかなくなる。"
          leaf_green: "ひざしを　エネルギーに　かえる。\nたいようが　しずみ　くらくなると\nはなびらを　とじて　たたずんでいる。"
        en:
          fire_red: "In the daytime, it rushes about in a\nhectic manner, but it comes to a complete\nstop when the sun sets."
          leaf_green: "It converts sunlight into energy. In the\ndarkness after sunset, it closes its petals\nand becomes still."
        fr:
          fire_red: "La journée, il court dans tous les sens,\nmais à la tombée de la nuit, il s’arrête\ncomplètement."
          leaf_green: "Il convertit la lumière du soleil en\nénergie. Quand la nuit tombe, ses\npétales se referment."
        it:
          fire_red: "Di giorno si muove freneticamente, ma\nquando cala il sole si ferma e interrompe\nogni attività."
          leaf_green: "Converte la luce solare in energia.\nDopo il tramonto, nell’oscurità,\nrichiude i petali, acquietandosi."
        de:
          fire_red: "Tagsüber rennt es hektisch umher, aber\nsobald die Sonne untergegangen ist, wird\nes bewegungslos."
          leaf_green: "Es wandelt Sonnenlicht in Energie. Nach\nSonnenuntergang schließt es seine Blüten\nund wird still."
        es:
          fire_red: "De día, corre de forma incontrolada\nde un lado a otro, pero cuando se pone\nel Sol, se detiene por completo."
          leaf_green: "Convierte la luz solar en energía. En la\noscuridad, tras el atardecer, cierra los\npétalos y se queda inmóvil."
yanma:
