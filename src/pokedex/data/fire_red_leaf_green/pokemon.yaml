          leaf_green: "３つの　あたまで　こうどな\nさくせんを　あやつる。ねるときも\nどれか　１つは　おきているという。"
        en:
          fire_red: "An odd species that is rarely found.\nThe three heads respectively represent\njoy, sadness, and anger."
          leaf_green: "Uses its three brains to execute complex\nplans. While two heads sleep, one head is\nsaid to stay awake."
        fr:
          fire_red: "Une espèce étrange que l’on trouve\nrarement. Les trois têtes représentent\nla joie, la tristesse et la colère."
          leaf_green: "Il élabore des plans complexes avec ses\ntrois cerveaux. Une de ses têtes reste\ntoujours éveillée."
        it:
          fire_red: "POKéMON raro e bizzarro. Le sue tre\nteste rappresentano rispettivamente la\ngioia, la tristezza e la rabbia."
          leaf_green: "Per tessere piani complessi usa i suoi 3\ncervelli. Mentre due teste dormono, la\nterza resta sveglia."
        de:
          fire_red: "Ein seltsames Exemplar, das nur selten\ngefunden wird. Die drei Köpfe\nrepräsentieren Freude, Trauer und Wut."
          leaf_green: "Dieses POKéMON verfügt über drei separate\nGehirne. Zwei Köpfe können schlafen,\nwährend der dritte wacht."
        es:
          fire_red: "Pertenece a una rara especie difícil de\nencontrar. Las tres cabezas simbolizan\nla alegría, la tristeza y la ira."
          leaf_green: "Para tramar sus planes usa sus tres\ncerebros. Cuando dos cabezas\nduermen, la otra sigue despierta."
seel:
