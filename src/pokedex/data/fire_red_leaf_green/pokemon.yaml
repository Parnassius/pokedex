          leaf_green: "あなを　ほって　きのねっこを　すう。\nせなかの　キノコは　からだから\nエキスを　もらい　せいちょうする。"
        en:
          fire_red: "Growing out of the bug’s back are\nmushrooms called tochukaso. The mushrooms\ngrow with the bug host."
          leaf_green: "Burrows to suck tree roots. The mushrooms\non its back grow by drawing nutrients from\nthe bug host."
        fr:
          fire_red: "Sur le dos de ce POKéMON se trouvent\ndes champignons appelés tochukaso.\nIls se développent au même rythme que\nleur hôte."
          leaf_green: "Les champignons sur son dos se nourrissent\ndes nutriments de leur hôte insectoïde."
        it:
          fire_red: "Sul dorso di questo POKéMON nascono\nfunghi chiamati tochukaso, che crescono\ninsieme a lui."
          leaf_green: "Scava per bere dalle radici degli alberi.\nI funghi sulla sua schiena sono parassiti."
        de:
          fire_red: "Auf seinem Rücken wachsen Pilze,\ndie man Tochukaso nennt. Die\nPilze wachsen mit ihrem Wirt."
          leaf_green: "Dieses POKéMON ernährt sich von\nBaumwurzeln. Die Pilze auf dem Rücken\nnutzen es als Wirtstier."
        es:
          fire_red: "Lleva en el lomo dos setas parásitas\nllamadas tochukaso, que crecen con él."
          leaf_green: "Cava para chupar las raíces de los\nárboles. Las setas del lomo crecen\ncon él."
