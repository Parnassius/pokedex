          leaf_green: "かみついたら　さいご。しぬほど\nちを　すいまくるので　おもたくなって\nじぶんで　とべなくなることもある。"
        en:
          fire_red: "It clamps down on its prey with needle-\nsharp fangs and drains over 10 ounces of\nblood in one gulp."
          leaf_green: "Once it bites, it will not stop draining\nenergy from the victim even if it gets too\nheavy to fly."
        fr:
          fire_red: "Une fois ses dents pointues plantées\ndans le corps de son adversaire, il est\ncapable de lui retirer un quart de litre\nde sang en une seule gorgée."
          leaf_green: "Il mord son adversaire et absorbe toute\nson énergie, même s’il devient trop lourd\npour voler."
        it:
          fire_red: "Affonda nella preda i denti affilati,\nriuscendo a succhiare 300 cc di\nsangue alla volta."
          leaf_green: "Quando attacca, non smette di succhiare\nl’energia della vittima, fino a diventare\ntroppo pesante per volare."
        de:
          fire_red: "Es beißt sich mit seinen messerscharfen\nReißzähnen in seinen Opfern fest und\nsaugt mehr als 0,3 Liter Blut in einem\nSchluck."
          leaf_green: "Dieses POKéMON saugt dem Gegner selbst\ndann noch Energie ab, wenn es zu schwer\nzum Fliegen wird."
        es:
          fire_red: "Se lanza sobre su presa con los afilados\ncolmillos que tiene y puede chuparle\nhasta 300 cc de sangre de una vez."
          leaf_green: "Cuando ataque, seguirá chupando energía\nde su víctima, aunque pese tanto que ya\nno pueda volar."
oddish:
