          leaf_green: "ひろい　なわばりを　もっており\nしんにゅうする　じゃまものは\nてっていてきに　つつかれてしまう。"
        en:
          fire_red: "The claws on its feet are well developed.\nIt can carry prey such as an EXEGGCUTE\nto its nest over 60 miles away."
          leaf_green: "Very protective of its sprawling\nterritorial area, this POKéMON will\nfiercely peck at any intruder."
        fr:
          fire_red: "Grâce à ses griffes très puissantes,\nil est capable de transporter des\nNOEUNOEUF vers un nid éloigné\nde plus de 100 km."
          leaf_green: "Il protège son territoire avec ardeur et\nrepousse à coups de bec tout intrus."
        it:
          fire_red: "Grazie ai potenti artigli può trasportare\nuna preda delle dimensioni di un\nEXEGGCUTE per oltre 100 km."
          leaf_green: "Strenuo difensore del suo ampio\nterritorio, becca ferocemente ogni intruso."
        de:
          fire_red: "Die Krallen an seinen Füßen sind sehr\nausgeprägt. Es kann sogar ein OWEI zu\nseinem Nest in 100 km Entfernung tragen."
          leaf_green: "Dieses POKéMON verteidigt sein\nabgegrenztes Areal sorgsam gegen alle\nEindringlinge."
        es:
          fire_red: "Tiene unas garras desarrolladas. Puede\natrapar un EXEGGCUTE y transportarlo\ndesde una distancia de casi 100 km."
          leaf_green: "Muy protector de su amplio territorio,\neste POKéMON picoteará ferozmente\na los intrusos."
