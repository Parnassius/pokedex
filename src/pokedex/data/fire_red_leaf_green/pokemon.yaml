          leaf_green: "うごきが　のろく　まぬけ。\nたたかれても　５びょう　たってから\nいたさを　かんじるほどだ。"
        en:
          fire_red: "It is always vacantly lost in thought, but\nno one knows what it is thinking about.\nIt is good at fishing with its tail."
          leaf_green: "Incredibly slow and dopey. It takes five\nseconds for it to feel pain when under\nattack."
        fr:
          fire_red: "RAMOLOSS semble toujours perdu\ndans ses pensées, mais personne ne\nsait vraiment à quoi il pense. Il adore\npêcher en utilisant sa queue."
          leaf_green: "Très lent et endormi, il lui faut 5\nsecondes pour ressentir la douleur\nd’une attaque."
        it:
          fire_red: "È sempre assorto, ma nessuno sa a cosa\nstia pensando. Si serve della coda per\npescare."
          leaf_green: "Incredibilmente lento e tonto, ci mette 5\nsecondi a percepire il dolore dopo\nl’attacco."
        de:
          fire_red: "Es ist stets in Gedanken versunken und\nniemand weiß, worüber es nachdenkt.\nEs kann mit seiner Rute gut angeln."
          leaf_green: "Ein unglaublich träges POKéMON. Wenn es\nverletzt wird, bemerkt es den Schmerz\nerst Sekunden später."
        es:
          fire_red: "Está siempre en su mundo, pero nadie sabe\nen qué piensa.\nSuele pescar con la cola."
          leaf_green: "Increíblemente lento y torpe. Tarda 5\nsegundos en sentir dolor si lo atacan."
slowbro:
