          leaf_green: "ふきそくな　いでんしを　もつ。\nいしからでる　ほうしゃせんによって\nからだが　とつぜんへんいを　おこす。"
        en:
          fire_red: "An extremely rare POKéMON that may\nevolve in a number of different ways\ndepending on stimuli."
          leaf_green: "Its genetic code is irregular. It may\nmutate if it is exposed to radiation from\nelement STONES."
        fr:
          fire_red: "Un POKéMON extrêmement rare\ncapable d’évoluer de différentes\nfaçons en fonction du stimulus."
          leaf_green: "Ses gènes atypiques lui permettent\nd’évoluer s’il est exposé aux radiations\nd’une pierre."
        it:
          fire_red: "POKéMON rarissimo, che si può\nevolvere in modo diverso secondo\ngli stimoli che riceve."
          leaf_green: "Il suo codice genetico mutevole può\ncambiare se esposto alle radiazioni delle\nPIETRE elemento."
        de:
          fire_red: "Ein sehr seltenes POKéMON, das\nsich - je nach Anreiz -\nmannigfaltig entwickeln kann."
          leaf_green: "Der Gen-Code von EVOLI ist uneinheitlich.\nDie Strahlung von Element-STEINEN lässt\nes mutieren."
        es:
          fire_red: "Es un POKéMON rarísimo que puede\nevolucionar de mil formas distintas\nsegún las circunstancias."
          leaf_green: "De irregular código genético, puede mutar\nsi se le expone a la radiación de los\nelementos ROCA."
vaporeon:
