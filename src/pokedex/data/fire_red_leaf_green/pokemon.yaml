          leaf_green: "しょくしゅは　ふだん　みじかくて\nえものを　さすときに　ながく\nのびて　からみつくのだ。"
        en:
          fire_red: "It has 80 tentacles that move about\nfreely. They can sting, causing poisoning\nand sharp, stabbing pain."
          leaf_green: "The tentacles are normally kept short.\nOn hunts, they are extended to ensnare\nand immobilize prey."
        fr:
          fire_red: "Les 80 tentacules que TENTACRUEL\nlaisse s’agiter lui permettent d’injecter\ndu poison dans le corps de ses\nennemis mais aussi de les trancher."
          leaf_green: "Ses tentacules sont rétractés au repos.\nEn situation de chasse, ils s’allongent\npour prendre ses proies au piège."
        it:
          fire_red: "Il contatto con i suoi 80 tentacoli, che\nsi muovono liberamente, avvelena la\nvittima e causa un dolore lancinante."
          leaf_green: "I corti tentacoli si estendono durante la\ncaccia per catturare e immobilizzare la\npreda."
        de:
          fire_red: "Es verfügt über 80 Tentakel, die es\nfrei bewegen kann. Damit kann es zustechen\nund so Vergiftung und starke Schmerzen \nverursachen."
          leaf_green: "Dieses POKéMON kann die Tentakel bei der\nJagd ausfahren, um die Beute leichter zu\nfangen."
        es:
          fire_red: "Tiene 80 tentáculos que se mueven a su\naire. Con ellos, pica, envenena y causa\nun dolor agudo e intenso."
          leaf_green: "Cuando caza, extiende los cortos\ntentáculos que tiene para atrapar\ne inmovilizar a su presa."
geodude:
