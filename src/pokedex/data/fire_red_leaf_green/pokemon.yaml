        jp_kana:
          fire_red: "あいじょう　ひょうげんで　はなを\nぶつけてくるが　ちからが　あるので\nきをつけないと　ふっとばされる。"
          leaf_green: "じゃれている　つもりで\nはなを　ふりまわしてくるが\nかなりの　ちからなので　あぶない。"
        en:
          fire_red: "As a sign of affection, it bumps with its\nsnout. However, it is so strong, it may\nsend you flying."
          leaf_green: "It swings its long snout around playfully,\nbut because it is so strong, this can be\ndangerous."
        fr:
          fire_red: "Il se cogne sur celui ou celle qu’il\napprécie. Mais il est si fort qu’il\nfait souvent mal à ceux qu’il aime."
          leaf_green: "Il balance sa trompe pour s’amuser,\nmais il est si fort que cela peut être\ndangereux."
        it:
          fire_red: "Dà colpi con il muso in segno di affetto,\nma è così forte da far volare la gente."
          leaf_green: "Agita la proboscide per gioco, ma è così\nforte che può essere pericoloso."
        de:
          fire_red: "Als Zeichen seiner Zuneigung stupst es\ndich mit dem Rüssel, was dich aber\nbuchstäblich umwerfen könnte."
          leaf_green: "Es wirft seinen langen Rüssel im Spiel wild\numher. Da es so stark ist, könnte dies\ngefährlich werden."
        es:
          fire_red: "Como muestra de afecto, da golpes\ncon la trompa. Aunque es tan fuerte\nque te mandará lejos."
          leaf_green: "Mueve la larga trompa para jugar,\npero como es tan fuerte, a veces\npuede resultar peligroso."
donphan:
