        jp_kana:
          fire_red: "おそわれないように　きのまねをする。\nみずがにがてで　あめが　ふりだすと\nいつのまにか　すがたを　けす。"
          leaf_green: "いつも　きのふりを　している。\nからだの　つくりは　しょくぶつより\nいしや　いわなどに　ちかいようだ。"
        en:
          fire_red: "It disguises itself as a tree to avoid\nattack. It hates water, so it will\ndisappear if it starts raining."
          leaf_green: "Although it always pretends to be a tree,\nits composition appears to be closer to a\nrock than a plant."
        fr:
          fire_red: "Il se déguise en arbre pour éviter les\nproblèmes. Il déteste l’eau et se cache\npar temps de pluie."
          leaf_green: "Il fait semblant d’être un arbre. Sa\ncomposition est en fait plus proche de\nla pierre."
        it:
          fire_red: "Si traveste da albero per evitare gli\nattacchi. Odiando l’acqua, scompare\nappena inizia a piovere."
          leaf_green: "Sebbene finga di essere un albero, la sua\ncomposizione sembra più simile a quella\ndi una roccia."
        de:
          fire_red: "Es tarnt sich als Baum, um nicht\nangegriffen zu werden. Es hasst Wasser,\ndarum läuft es bei Regen weg."
          leaf_green: "Obwohl es vorgibt, ein Baum zu sein,\nkommt seine Verfassung einem Stein näher\nals einer Pflanze."
        es:
          fire_red: "Se disfraza de árbol para no ser atacado.\nOdia el agua, por lo que desaparecerá si\nempieza a llover."
          leaf_green: "Aunque pretende ser un árbol, en su\ncomposición se parece más a una roca\nque a una planta."
politoed:
  species_id: 186
