      descriptions:
        jp_kana:
          fire_red: "あしにも　ハネが　はったつしたので\nこうそくで　とべるように　なったが\nとまって　やすむのは　へたになった。"
          leaf_green: "４まいに　ふえた　つばさで\nくらやみを　しずかに　とんでいく。\nとなりを　とおられても　きづかない。"
        en:
          fire_red: "The development of wings on its legs\nenables it to fly fast but also makes it\ntough to stop and rest."
          leaf_green: "It flies so silently through the dark on\nits four wings that it may not be noticed\neven when nearby."
        fr:
          fire_red: "Les ailes qui ont poussé sur ses pattes\nlui permettent de voler très vite."
          leaf_green: "Il vole en silence dans l’obscurité à\nl’aide de ses quatre ailes. Même très\nproche, on ne l’entend pas."
        it:
          fire_red: "Le ali sviluppatissime lo fanno volare\nveloce, ma gli rendono anche difficile\nfermarsi e riposarsi."
          leaf_green: "È così silenzioso quando vola nel buio\ncon le sue quattro ali, che è difficile\nnotarlo anche se è vicino."
        de:
          fire_red: "Durch die Bildung von Flügeln an seinen\nBeinen fliegt es schnell, hat aber\nProbleme bei der Landung."
          leaf_green: "Mit seinen vier Flügeln fliegt es so\ngeräuschlos durch die Nacht, dass man es\nnicht bemerkt."
        es:
          fire_red: "Las alas de las patas le permiten volar\nrápidamente, pero también le dificultan\npararse y descansar."
          leaf_green: "Es tan silencioso cuando vuela en la\noscuridad con sus cuatro alas, que\ncuesta percibirlo cuando se acerca."
chinchou:
  species_id: 170
