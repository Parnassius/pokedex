          leaf_green: "ふとい　しっぽを　ふりまわして\nあいてを　しめつける。そして\nせぼねを　へしおって　しまう。"
        en:
          fire_red: "It is recognized by its rock-hard hide\nand its extended horn. Be careful with\nthe horn as it contains venom."
          leaf_green: "It uses its powerful tail in battle to\nsmash, constrict, then break the prey’s\nbones."
        fr:
          fire_red: "On le reconnaît facilement grâce à sa\npeau dure comme de la pierre ainsi qu’à\nsa grosse corne pleine de poison."
          leaf_green: "Sa queue est une arme redoutable, il s’en\nsert pour attraper sa proie et lui broyer\nles os."
        it:
          fire_red: "Lo si riconosce dalla pelle durissima\ne dal corno particolarmente allungato,\nche contiene sostanze velenose."
          leaf_green: "In lotta usa la potente coda per colpire\ne stritolare la preda, poi le rompe le\nossa."
        de:
          fire_red: "Seine steinharte Haut und sein ausge-\nprägtes Horn sind seine Markenzeichen.\nAchte auf das Horn, denn es enthält Gift."
          leaf_green: "Dieses POKéMON benutzt im Kampf seinen\nkräftigen Schwanz, um damit Gegner K.O.\nzu schlagen."
        es:
          fire_red: "Es fácil reconocerlo por tener una dura\npiel y un gran cuerno lleno de\npeligrosísimo veneno."
          leaf_green: "Usa la potente cola en combate para\naplastar y oprimir a su presa. Después\nle rompe los huesos."
