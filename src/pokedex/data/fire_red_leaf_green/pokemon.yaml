        jp_kana:
          fire_red: "ちちゅうを　ほりすすんで\nあいてが　ゆだんしているところを\nべつの　ばしょから　こうげきする。"
          leaf_green: "チームワークに　すぐれた　３つごの\nディグダ。ちか　１００キロまで\nほって　じしんを　おこすこともある。"
        en:
          fire_red: "In battle, it digs through the ground and\nstrikes the unsuspecting foe from an\nunexpected direction."
          leaf_green: "A team of DIGLETT triplets. It triggers\nhuge earthquakes by burrowing 60 miles\nunderground."
        fr:
          fire_red: "Au combat, il s’enfouit sous terre pour\npouvoir frapper ses adversaires depuis\nn’importe quelle direction."
          leaf_green: "Un groupe de TAUPIQUEUR. Il crée des\nséismes en creusant à plus de 100 km\nde profondeur."
        it:
          fire_red: "Nella lotta, scava tunnel nel terreno\nper sorprendere il nemico attaccandolo\nda una direzione imprevedibile."
          leaf_green: "Trio di DIGLETT. Provoca terribili\nterremoti scavando 100 km sotto terra."
        de:
          fire_red: "Im Kampf gräbt es sich ein und\nattackiert den Gegner aus einer\nunvorhersehbaren Richtung."
          leaf_green: "Drei DIGDA bilden dieses POKéMON. Es\ngräbt sich bis zu 100 km tief in die Erde,\num Erdbeben auszulösen."
        es:
          fire_red: "En combate, cava la tierra, se esconde y\nsale de repente para golpear a su rival.\nNunca se sabe por dónde puede aparecer."
          leaf_green: "Un trío de DIGLETT. Causa enormes\nterremotos al cavar 100 km por debajo\ndel suelo."
meowth:
  species_id: 52
  names:
    jp_kana: ニャース
