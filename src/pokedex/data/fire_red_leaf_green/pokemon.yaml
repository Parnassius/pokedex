          leaf_green: "なんびきかが　あつまっていると\nそこに　もうれつな　でんきが　たまり\nいなずまが　おちることがあるという。"
        en:
          fire_red: "It has small electric sacs on both its\ncheeks. If threatened, it looses electric\ncharges from the sacs."
          leaf_green: "When several of these POKéMON gather,\ntheir electricity can build and cause\nlightning storms."
        fr:
          fire_red: "PIKACHU a de petites poches pleines\nd’électricité sur ses joues. S’il se\nsent menacé, il laisse s’échapper\ndes décharges électriques."
          leaf_green: "Quand plusieurs de ces POKéMON\nse réunissent, ils provoquent de\ngigantesques orages."
        it:
          fire_red: "Se spaventato, perde scariche elettriche\ndalle due sacche che ha sulle guance."
          leaf_green: "Quando vari POKéMON di questa specie si\nradunano, la loro energia può causare\nforti tempeste."
        de:
          fire_red: "Es hat kleine Backentaschen, die mit\nElektrizität gefüllt sind. Bei Gefahr\nentlädt es sie."
          leaf_green: "Wenn sich mehrere dieser POKéMON\nversammeln, kann ihre Energie Blitzgewitter\nerzeugen."
        es:
          fire_red: "Las bolsas de las mejillas están llenas\nde electricidad, que libera cuando se\nsiente amenazado."
          leaf_green: "Cuando varios de estos POKéMON se juntan,\nsu energía puede causar fuertes\ntormentas."
