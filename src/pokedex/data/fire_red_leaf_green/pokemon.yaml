      descriptions:
        jp_kana:
          fire_red: "スベスベした　くろいひふは　うすく\nしめっている。ないぞうの　いちぶが\nすけて　うずまきじょうに　みえる。"
          leaf_green: "まだ　あしが　はえた　ばかりで\nうまく　あるけない。みずの　なかを\nおよいでる　ほうが　すきなようだ。"
        en:
          fire_red: "Its slick black skin is thin and damp.\nA part of its internal organs can be seen\nthrough the skin as a spiral pattern."
          leaf_green: "Its newly grown legs prevent it from\nwalking well. It appears to prefer\nswimming over walking."
        fr:
          fire_red: "Sa peau est humide, lisse et surtout très\nfine. La forme en spirale sur son ventre\nest en fait une partie de ses organes\ninternes que l’on peut apercevoir."
          leaf_green: "Il est tellement mal à l’aise sur ses\nnouvelles pattes qu’il préfère la nage\nà la marche."
        it:
          fire_red: "Dalla pelle nera, lucida, umida e sottile\nsi intravedono gli organi interni, che\nformano una spirale."
          leaf_green: "Le sue zampe poco sviluppate gli\nimpediscono di correre. Per questo\nmotivo preferisce nuotare."
        de:
          fire_red: "Seine glatte, schwarze Haut ist dünn\nund feucht. Teilweise sind seine\nInnereien als spiralförmige\nMuster sichtbar."
          leaf_green: "Die kurzen Beine dieses POKéMON sind zum\nLaufen kaum geeignet. Es bewegt sich\ndaher schwimmend fort."
        es:
          fire_red: "Tiene una piel extraordinaria, fina y\nhúmeda, que deja entrever las vísceras\nque tiene dispuestas en espiral."
          leaf_green: "Sus nuevas y pequeñas patas no le dejan\ncorrer. Parece que prefiere nadar a estar\nde pie."
poliwhirl:
