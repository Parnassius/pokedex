      descriptions:
        jp_kana:
          fire_red: "ながい　くびを　こうらのなかに\nひっこめるとき　いきおいよく\nみずでっぽうを　はっしゃする。"
          leaf_green: "うまれたあと　せなかが　ふくらんで\nかたい　こうらが　できる。くちから\nきょうりょくな　あわを　だす。"
        en:
          fire_red: "When it retracts its long neck into its\nshell, it squirts out water with vigorous\nforce."
          leaf_green: "After birth, its back swells and hardens\ninto a shell. It powerfully sprays foam \nfrom its mouth."
        fr:
          fire_red: "Quand il rentre son cou dans sa\ncarapace, CARAPUCE peut projeter\nde l’eau à haute pression."
          leaf_green: "Son dos se gonfle et durcit avec l’âge\npour former une carapace très résistante.\nIl peut cracher des jets d’écume."
        it:
          fire_red: "Mentre ritrae il lungo collo dentro la\ncorazza sputa un vigoroso getto\nd’acqua."
          leaf_green: "Dopo la nascita la schiena gli si\ntrasforma in una corazza. Sputa potente\nschiuma dalla bocca."
        de:
          fire_red: "Zieht es seinen langen Hals in seinen\nPanzer zurück, verspritzt es Wasser mit \nunbändiger Kraft."
          leaf_green: "Nach der Geburt bildet sich auf SCHIGGYs\nRücken ein Panzer. Es attackiert mit\nSprühschaum."
        es:
          fire_red: "Cuando se esconde en el caparazón,\ndispara agua a una presión increíble."
          leaf_green: "Tras nacer, se le hincha el lomo\ny se le forma un caparazón.\nEcha potente espuma por la boca."
wartortle:
