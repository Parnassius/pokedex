        special_defense: 80
        speed: 60
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 1
        special_defense: 1
        speed: 0
      types:
        - grass
        - poison
      egg_groups:
        - monster
        - grass
      abilities:
        - overgrow
      descriptions:
        jp_kana:
          fire_red: "つぼみが　せなかに　ついていて\nようぶんを　きゅうしゅうしていくと\nおおきな　はなが　さくという。"
          leaf_green: "せなかの　つぼみが　おおきく\nそだってくると　２ほんあしで\nたつことが　できなくなるらしい。"
        en:
          fire_red: "There is a plant bulb on its back.\nWhen it absorbs nutrients, the bulb is said\nto blossom into a large flower."
          leaf_green: "When the bulb on its back grows large, it\nappears to lose the ability to stand on\nits hind legs."
        fr:
          fire_red: "Il y a un bulbe sur son dos. On dit que\ns’il absorbe assez de nutriments, ce\nbulbe se transforme en une jolie fleur."
          leaf_green: "Son bulbe dorsal devient si gros\nqu’il ne peut plus se tenir sur ses\npattes arrières."
        it:
          fire_red: "Dopo aver assorbito sufficienti\nsostanze nutrienti, il bulbo sulla schiena\nsboccia in un magnifico fiore."
          leaf_green: "Quando gli cresce il bulbo sulla schiena,\nsembra non riuscire più a stare in\nposizione eretta."
        de:
          fire_red: "Es trägt eine Knospe auf seinem Rücken.\nNimmt es Nahrung zu sich, soll aus der\nKnospe eine große blühende Blume werden."
          leaf_green: "Sobald die Knospe auf seinem Rücken\naufgeht, kann BISAKNOSP nicht mehr auf\nzwei Beinen stehen."
        es:
          fire_red: "Este POKéMON tiene un bulbo en el lomo.\nDicen que, al absorber nutrientes, el\nbulbo se transforma en una flor grande."
          leaf_green: "Cuando el bulbo del lomo crece,\nle cuesta un poco ponerse de pie\nsobre las patas traseras."
venusaur:
  species_id: 3
