      descriptions:
        jp_kana:
          fire_red: "ひろい　うみを　じゆうに　およぐ。\nスピードが　のってくると　そのまま\nなみのうえに　とびだしてしまう。"
          leaf_green: "ゆうぜんと　うみを　およぐ。\nたべのこしを　ねらった　テッポウオが\nくっついていても　きにしていない。"
        en:
          fire_red: "Swimming freely in open seas, it may fly\nout of the water and over the waves if it\nbuilds up enough speed."
          leaf_green: "As it majestically swims, it doesn’t care\nif REMORAID attach to it to scavenge\nfor its leftovers."
        fr:
          fire_red: "Vivant en pleine mer, il peut jaillir hors\nde l’eau et planer au-dessus des vagues\ns’il a suffisamment de vitesse."
          leaf_green: "Il nage avec majesté. Si un REMORAID\nest attaché à son corps, il s’en moque."
        it:
          fire_red: "Nuotando libero in mare aperto, se\nacquista velocità può uscire dall’acqua\nvolando sulle onde."
          leaf_green: "Nuotando maestosamente, neppure si\naccorge se un REMORAID gli sta attaccato\nper mangiarne gli avanzi."
        de:
          fire_red: "Auf offener See kann es so schnell\nwerden, dass es nach oben schwimmt und\nüber den Wellen fliegt."
          leaf_green: "Da es so majestätisch schwimmt, schert es\nsich nicht um REMORAID, das seine\nEssensreste vertilgt."
        es:
          fire_red: "Nada libremente en mar abierto. Si va lo\nbastante rápido, volará sobre las olas\ndel mar."
          leaf_green: "Mientras nada majestuosamente, no le\nimporta que REMORAID le siga para\ncomerse sus sobras."
skarmory:
  species_id: 227
  names:
    jp_kana: エアームド
