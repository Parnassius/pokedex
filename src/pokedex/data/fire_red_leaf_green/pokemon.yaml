        jp_kana:
          fire_red: "くらい　かいていでは　いつも\nてんめつ　している　しょくしゅの\nあかり　だけが　つうしんしゅだん。"
          leaf_green: "２つの　しょくしゅの　さきから\nプラスと　マイナスの　でんきを\nながして　あいてを　しびれさせる。"
        en:
          fire_red: "On the dark ocean floor, its only means\nof communication is its constantly\nflashing lights."
          leaf_green: "It shoots positive and negative\nelectricity between the tips of its two\nantennae and zaps its enemies."
        fr:
          fire_red: "Au plus profond de l’océan, son seul\nmoyen de communication est la lumière\nqu’il fait clignoter constamment."
          leaf_green: "Il émet avec ses antennes des impulsions\npositives et négatives qui peuvent\nélectrocuter ses ennemis."
        it:
          fire_red: "Negli oscuri fondali oceanici il suo unico\nmezzo di comunicazione sono le luci\nsempre lampeggianti."
          leaf_green: "Tra le punte delle due antenne scorre\nelettricità positiva e negativa, di cui si\nserve per colpire i nemici."
        de:
          fire_red: "Am Meeresgrund kann es sich nur durch\nständiges Flackern seiner Lichter der\nUmgebung kundtun."
          leaf_green: "Es verfügt über negative und positive\nLadungen zwischen seinen Antennen,\num seine Feinde zu erlegen."
        es:
          fire_red: "En el oscuro fondo del océano, su único\nmodo de comunicarse es emitiendo luces\nparpadeantes."
          leaf_green: "Libera cargas positivas y negativas\nentre las puntas de las dos antenas\nque tiene, y electrocuta al enemigo."
lanturn:
  species_id: 171
