        speed: 0
      types:
        - fighting
      egg_groups:
        - human_like
      abilities:
        - keen_eye
      descriptions:
        jp_kana:
          fire_red: "プロボクサーの　たましいが\nのりうつっている。パンチのスピードは\nしんかんせんよりも　はやい。"
          leaf_green: "なんにも　してない　ようでも\nみえない　スピードで　パンチを\nだしまくってるから　きを　つけろ。"
        en:
          fire_red: "The spirit of a pro boxer has infused this\nPOKéMON. It throws punches that are\nfaster than a bullet train."
          leaf_green: "While apparently doing nothing, it fires\npunches in lightning-fast volleys that are\nimpossible to see."
        fr:
          fire_red: "TYGNON possède l’esprit combatif\ndes plus grands champions de boxe.\nSes coups de poing partent plus vite\nqu’un boulet de canon."
          leaf_green: "Il distribue des séries de coups de poing\nrapides comme l’éclair et invisibles à\nl’œil nu."
        it:
          fire_red: "Questo POKéMON ha lo spirito di un\npugile professionista. I suoi pugni sono\npiù rapidi di un treno superveloce."
          leaf_green: "Può sferrare serie di pugni così\nrapide da essere invisibili. Così, il\nPOKéMON sembra immobile."
        de:
          fire_red: "Der Geist eines Profi-Boxers hat dieses\nPOKéMON inspiriert. Seine Faustschläge\nsind schneller als ein Hochgeschwin-\ndigkeitszug."
          leaf_green: "Die Schlagtechnik dieses POKéMON ist\nschneller als das Licht. Es ist unmöglich,\ndie Schläge zu sehen."
        es:
          fire_red: "Dicen que tiene el alma de un boxeador\nprofesional. Da puñetazos a la velocidad\ndel rayo."
          leaf_green: "Aunque parezca que no hace nada, sus\nrápidos puñetazos-voleas son imposibles\nde ver."
lickitung:
  species_id: 108
  names:
    jp_kana: ベロリンガ
