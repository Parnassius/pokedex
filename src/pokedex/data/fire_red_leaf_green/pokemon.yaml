          leaf_green: "ほとんど　うごかず　なきもせず\nじっとするのは　かこと　みらいを\nみているからだと　しんじられている。"
        en:
          fire_red: "In South America, it is said that its right\neye sees the future and its left eye\nviews the past."
          leaf_green: "They say that it stays still and quiet\nbecause it is seeing both the past and\nfuture at the same time."
        fr:
          fire_red: "Il paraît que son œil gauche peut voir\nle passé et que son œil droit est\ncapable de voir l’avenir."
          leaf_green: "On dit qu’il est calme et tranquille car\nil peut voir en permanence le passé et\nle futur."
        it:
          fire_red: "In Sudamerica si dice che il suo occhio\ndestro veda il futuro, e quello sinistro il\npassato."
          leaf_green: "Si dice che sia così quieto perché sta\nosservando passato e futuro allo stesso\ntempo."
        de:
          fire_red: "In Südamerika glaubt man, dass sein\nrechtes Auge die Zukunft und das Linke\ndie Vergangenheit sieht."
          leaf_green: "Man sagt, es sei so still und in sich\ngekehrt, weil es die Zukunft und die\nVergangenheit parallel sieht."
        es:
          fire_red: "Dicen en Sudamérica que con el ojo\nderecho ve el futuro; y con el izquierdo,\nel pasado."
          leaf_green: "Dicen que se mantiene quieto y en silencio\nporque observa el pasado y el futuro al\nmismo tiempo."
mareep:
