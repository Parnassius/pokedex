      descriptions:
        jp_kana:
          fire_red: "ユメを　たべるという　でんせつの　\nいきもの　バクの　しそん。\nさいみんじゅつが　とくいだ。"
          leaf_green: "ねむらせては　ユメを　たべるが　\nわるい　ユメばかり　たべてると\nおなかを　こわすことが　あるらしい。"
        en:
          fire_red: "A descendent of the legendary animal\nbaku, which is said to eat dreams. It is\nskilled at hypnotism."
          leaf_green: "Puts enemies to sleep, then eats their\ndreams. Occasionally gets sick from eating\nonly bad dreams."
        fr:
          fire_red: "Ce POKéMON est le descendant d’un animal\nlégendaire qui dévorerait les rêves de\nses victimes. Il est capable d’hypnotiser\nses ennemis."
          leaf_green: "Il endort ses ennemis et dévore leurs\nsonges. S’il mange trop de cauchemars,\nil fait une indigestion."
        it:
          fire_red: "Discende dal leggendario animale\nbaku, che era considerato un mangiatore\ndi sogni. Grande conoscitore dell’ipnosi."
          leaf_green: "Addormenta i suoi nemici e poi si nutre\ndei loro sogni. A volte fa indigestione di\nincubi."
        de:
          fire_red: "Ein Nachfahre des legendären Tieres\nBaku, das der Legende nach Träume\nfraß. Dieses POKéMON ist ein\nbegnadeter Hypnotiseur."
          leaf_green: "TRAUMATO versetzt Gegner in den Schlaf\nund frisst deren Träume. Von Alpträumen\nwird ihm aber übel."
        es:
          fire_red: "Desciende del legendario animal baku,\ndel que se dice que come sueños.\nTiene grandes habilidades hipnóticas."
          leaf_green: "Adormece a sus enemigos y se come sus\nsueños. A veces se pone enfermo si come\npesadillas."
hypno:
  species_id: 97
  names:
    jp_kana: スリーパー
