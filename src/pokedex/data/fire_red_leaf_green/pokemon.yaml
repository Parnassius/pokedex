          leaf_green: "おなかの　おそろしい　もようは\nちいきに　よって　なんしゅるいか\nパターンが　あるという　ウワサだ。"
        en:
          fire_red: "The pattern on its belly appears to be a\nfrightening face. Weak foes will flee just\nat the sight of the pattern."
          leaf_green: "It is rumored that the ferocious warning\nmarkings on its belly differ from area to\narea."
        fr:
          fire_red: "Les motifs sur son corps ressemblent\nà un visage menaçant. Les adversaires\nles plus craintifs fuient à la seule vue\nde ce POKéMON."
          leaf_green: "Les motifs féroces peints sur son corps\nvarient selon la région où il se trouve."
        it:
          fire_red: "Il disegno sulla pancia rappresenta una\nfaccia spaventosa, capace di far fuggire\ni nemici più pavidi."
          leaf_green: "Si dice che i feroci disegni sulla\npancia varino da zona a zona."
        de:
          fire_red: "Das Muster auf seinem Bauch ähnelt einer\nFratze. Schwache Gegner nehmen bereits\nbeim Anblick Reißaus."
          leaf_green: "Die Zeichnung auf der Haut dieses wilden\nPOKéMON unterscheidet sich von Region\nzu Region."
        es:
          fire_red: "El dibujo que tiene en la panza\naterroriza. Los rivales más débiles\nsalen huyendo al verlo."
          leaf_green: "Se dice que las feroces señales de alerta\nde la panza difieren de un área a otra."
