          leaf_green: "じまんのツノを　あいての　おなかの\nしたに　ねじこみ　いっきに　もちあげ\nぶんなげてしまう　ちからもち。"
        en:
          fire_red: "Usually docile, but if disturbed while\nsipping honey, it chases off the intruder\nwith its horn."
          leaf_green: "This powerful POKéMON thrusts its prized\nhorn under its enemies’ bellies, then lifts\nand throws them."
        fr:
          fire_red: "Le plus souvent docile, il chasse les\nintrus avec sa corne s’il est attaqué\nquand il mange du miel."
          leaf_green: "Ce POKéMON puissant enfonce sa\ncorne sous le ventre de ses ennemis\npour ensuite les soulever."
        it:
          fire_red: "È pacifico, ma se lo si disturba mentre\ngusta il miele scaccia l’intruso con il suo\ncorno."
          leaf_green: "Questo potente POKéMON infilza con il\ncorno la pancia del nemico, sollevandolo\ne lanciandolo lontano."
        de:
          fire_red: "Es ist ruhig. Wird es aber beim\nHonignaschen gestört, verjagt es den\nStörenfried mit seinem Horn."
          leaf_green: "Dieses kräftige POKéMON rammt sein\nprämiertes Horn unter den Rumpf des\nGegners und wirft ihn um."
        es:
          fire_red: "Suele ser dócil, pero si se le molesta\nmientras succiona miel, perseguirá\ncon su cuerno al intruso."
          leaf_green: "Este fuerte POKéMON clava su preciado\ncuerno en la tripa del enemigo, lo eleva\ny luego lo arroja."
