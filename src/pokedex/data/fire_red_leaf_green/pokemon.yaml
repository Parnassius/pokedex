        jp_kana:
          fire_red: "まぶしい　ひかりを　はなって\nあいての　めを　くらませ　うごけない\nあいだに　まるのみに　してしまう。"
          leaf_green: "ランターンのだす　ひかりは\n５０００メートルの　ふかさ　からでも\nすいめんまで　とどくほど　あかるい。"
        en:
          fire_red: "It blinds prey with an intense burst of\nlight, then swallows the immobilized prey\nin a single gulp."
          leaf_green: "The light it emits is so bright that it can\nilluminate the sea’s surface from a depth\nof over three miles."
        fr:
          fire_red: "Il aveugle sa proie avec une lumière\nintense, puis l’avale d’un seul trait une\nfois celle-ci immobilisée."
          leaf_green: "Sa brillance est si forte qu’il peut\nilluminer les fonds marins à 5 000 mètres\nde profondeur."
        it:
          fire_red: "Acceca la preda con un’intensa ondata di\nluce, immobilizzandola, per poi ingoiarla\nin un sol boccone."
          leaf_green: "Emette una luce così intensa che può\nilluminare la superficie del mare da oltre\n5 km di profondità."
        de:
          fire_red: "Es blendet seine Beute mit einem starken\nBlitz und verschlingt die gelähmte Beute\nmit einem Schluck."
          leaf_green: "Sein Licht ist so hell, dass es selbst vom\nMeeresgrund aus 5000 Metern Tiefe an die\nOberfläche dringt."
        es:
          fire_red: "Ciega a su presa con una luz intensa, y\nluego se la traga de un solo bocado."
          leaf_green: "La luz que emite es tan brillante que\npuede iluminar la superficie del mar\ndesde unos 5 km de profundidad."
pichu:
  species_id: 172
  names:
    jp_kana: ピチュー
