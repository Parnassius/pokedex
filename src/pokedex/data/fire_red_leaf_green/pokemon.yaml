        - intimidate
      descriptions:
        jp_kana:
          fire_red: "くるくる　まわって　キックをはなつ。\nこうそくで　まわっていると\nそのまま　じめんに　もぐっていく。"
          leaf_green: "おどるように　かれいで　なめらかな\nキックわざに　みとれていると\nきつい　いちげきを　おみまいされる。"
        en:
          fire_red: "It launches kicks while spinning. If it\nspins at high speed, it may bore its way\ninto the ground."
          leaf_green: "If you become enchanted by its smooth,\nelegant, dance-like kicks, you may get\ndrilled hard."
        fr:
          fire_red: "Il donne des coups de pied tout en\ntournant. Il tourne si vite qu’il peut\nainsi creuser le sol."
          leaf_green: "Si vous êtes fasciné par sa danse de\ncoups de pied, vous risquez vite de le\nregretter en les prenant dans le nez."
        it:
          fire_red: "Gira su se stesso tirando calci. Se gira\nmolto velocemente può scavare una fossa\nnel terreno."
          leaf_green: "Se ci si fa incantare dall’elegante danza\ndei suoi calci, si rischia di ricevere una\nbella lezione."
        de:
          fire_red: "Es dreht sich um sich selbst und verteilt\nTritte. Ist es schnell genug, bohrt es\nsich in den Boden."
          leaf_green: "Lässt du dich von seinen eleganten,\nanmutigen und tanzartigen Tritten betören,\nwirst du vermöbelt."
        es:
          fire_red: "Lanza patadas mientras gira. Si alcanza\nmucha velocidad, puede cavar un hoyo\nen la tierra."
          leaf_green: "Si te quedas embobado con las suaves,\nelegantes y danzarinas patadas que da,\npuedes acabar lleno de magulladuras."
smoochum:
  species_id: 238
