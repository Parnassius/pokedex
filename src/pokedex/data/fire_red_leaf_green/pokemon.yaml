      descriptions:
        jp_kana:
          fire_red: "しょうたい　ふめいの　いきもの。\nいやなおとを　だしたり　とつぜん\nじばくする　ことも　あるという。"
          leaf_green: "はつでんしょなどに　あらわれる。\nモンスターボールと　まちがえて\nさわって　しびれるひとが　おおい。"
        en:
          fire_red: "A life-form whose identity is unknown.\nIt is said to SCREECH or suddenly\nSELFDESTRUCT."
          leaf_green: "Usually found in power plants. Easily\nmistaken for a POKé BALL, it has\nzapped many people."
        fr:
          fire_red: "Cette forme de vie est d’origine inconnue.\nOn sait que ce POKéMON utilise\nGRINCEMENT ou DESTRUCTION."
          leaf_green: "Vivant près des centrales électriques,\nce POKéMON survolté est souvent\nconfondu avec une POKé BALL."
        it:
          fire_red: "Forma vivente di identità sconosciuta.\nPare che usi STRIDIO, oppure, quando uno\nmeno se l’aspetta, AUTODISTRUZIONE."
          leaf_green: "Di solito vive nelle centrali elettriche.\nSe confuso con una POKé BALL, può essere\nfatale."
        de:
          fire_red: "Eine Lebensform, deren Ursprung\nungeklärt ist. Man sagt, es setzt\nKREIDESCHREI oder plötzlich\nFINALE ein."
          leaf_green: "Dieses POKéMON wird oftmals mit einem\nPOKéBALL verwechselt. Es lebt vorwiegend\nin Kraftwerken."
        es:
          fire_red: "La procedencia de esta forma de vida no\nestá muy clara. Dicen que usa CHIRRIDO\no AUTODESTRUCCIÓN."
          leaf_green: "Suele vivir en centrales de energía.\nMucha gente acaba muy mal al\nconfundirlo con una POKé BALL."
electrode:
