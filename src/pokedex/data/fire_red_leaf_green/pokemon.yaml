        - monster
        - water_1
      abilities:
        - torrent
      descriptions:
        jp_kana:
          fire_red: "からだが　おもたく　のしかかって\nあいてを　きぜつさせる。\nピンチの　ときは　カラに　かくれる。"
          leaf_green: "こうらに　ふんしゃこうが　あって\nロケットのような　いきおいで\nつっこんでくる　すごい　やつだ。"
        en:
          fire_red: "It crushes its foe under its heavy body\nto cause fainting. In a pinch, it will\nwithdraw inside its shell."
          leaf_green: "The pressurized water jets on this brutal\nPOKéMON’s shell are used for high-\nspeed tackles."
        fr:
          fire_red: "Il écrase ses adversaires de tout\nson poids pour leur faire perdre\nconnaissance. Il rentre dans sa\ncarapace s’il se sent en danger."
          leaf_green: "Ce POKéMON brutal est armé de canons\nhydrauliques. Ses puissants jets d’eau\nsont dévastateurs."
        it:
          fire_red: "Mette KO gli avversari schiacciandoli\nsotto il corpo possente. Se è in\ndifficoltà, può ritrarsi nella corazza."
          leaf_green: "POKéMON brutale che lancia getti\nd’acqua ad alta pressione dalla corazza.\nUsato per attacchi rapidi."
        de:
          fire_red: "Es begräbt seine Gegner mit seinem\nenormen Körpergewicht. Wenn es in\neiner aussichtslosen Lage steckt, zieht\nes sich in seinen Panzer zurück."
          leaf_green: "Ein mächtiges und schnelles POKéMON, das\nauf dem Rücken zwei Hochdruckwasserwerfer\nträgt."
        es:
          fire_red: "Para acabar con su enemigo, lo aplasta\ncon el peso de su cuerpo. En momentos\nde apuro, se esconde en el caparazón."
          leaf_green: "Es un POKéMON violento. Tiene\nreactores de agua en el caparazón,\nque le sirven para atacar con fuerza."
caterpie:
