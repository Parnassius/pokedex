      descriptions:
        jp_kana:
          fire_red: "くさちなどに　おおく　せいそくする。\nしたを　チロチロ　させて　まわりの\nきけんを　かんじとる。"
          leaf_green: "まったく　けはいを　かんじさせずに\nいどうする。ポッポや　オニスズメの\nたまごを　まるのみ　してしまう。"
        en:
          fire_red: "A very common sight in grassland, etc.\nIt flicks its tongue in and out to sense\ndanger in its surroundings."
          leaf_green: "Moving silently and stealthily, it eats\nthe eggs of birds, such as PIDGEY\nand SPEAROW, whole."
        fr:
          fire_red: "On le croise très souvent dans les\nhautes herbes. Il agite rapidement \nsa langue pour percevoir le danger."
          leaf_green: "Il se déplace en silence pour dévorer des\nœufs de ROUCOOL ou de PIAFABEC."
        it:
          fire_red: "Molto comune, soprattutto nelle praterie.\nI movimenti repentini della lingua gli\nservono a rilevare eventuali pericoli."
          leaf_green: "Si muove in modo silenzioso e furtivo.\nSi nutre di uova di uccelli come PIDGEY\ne SPEAROW, che ingoia intere."
        de:
          fire_red: "Ein POKéMON, das in hohem Gras weit\nverbreitet ist. Es schnellt mit seiner\nZunge vor und zurück, um etwaige\nGefahr in seiner Umgebung wahrzunehmen."
          leaf_green: "Dieses POKéMON kann sich lautlos bewegen.\nSeine Nahrung sind die Eier von VOGEL-\nPOKéMON."
        es:
          fire_red: "Es fácil encontrarlo en praderas y zonas\nsimilares. A este POKéMON le basta con\nsacar la lengua para detectar el peligro."
          leaf_green: "Es muy silencioso y cauteloso.\nCome huevos de pájaros como\nlos de PIDGEY y SPEAROW."
