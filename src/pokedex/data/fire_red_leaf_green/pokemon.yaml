      descriptions:
        jp_kana:
          fire_red: "ペットとして　にんきが　たかい。\nまた　けで　おおわれた　しっぽは\nながいきする　シンボルだ。"
          leaf_green: "しばしば　すいちゅうに　かくれ\nえものを　ねらう。はやく　およぐとき\nみみを　うごかして　バランスをとる。"
        en:
          fire_red: "This POKéMON is very popular as a pet.\nIts fur-covered tail is a symbol of its\nlongevity."
          leaf_green: "It often hides in water to stalk unwary\nprey. For fast swimming, it moves its\nears to maintain balance."
        fr:
          fire_red: "Ce POKéMON est très apprécié comme\nanimal de compagnie. La fourrure sur sa\nqueue est le symbole de sa longévité."
          leaf_green: "Il se cache au fond de l’eau pour\nguetter sa proie. Ses oreilles sont\ndes gouvernails."
        it:
          fire_red: "Molti ne tengono uno in casa, come\ncompagnia. La coda ricoperta\ndi pelliccia è simbolo di longevità."
          leaf_green: "Si avvicina alla preda ignara\nnascondendosi nell’acqua. Nuota \nveloce bilanciandosi con le orecchie."
        de:
          fire_red: "Dieses POKéMON ist als Haustier sehr\nbeliebt. Sein mit Fell überzogener \nSchwanz ist ein Beweis seiner\nLanglebigkeit."
          leaf_green: "Dieses POKéMON lauert im Wasser auf\nBeute. Die Ohren dienen beim Schwimmen\nzur Orientierung."
        es:
          fire_red: "Es el POKéMON que se suele tener como\nmascota. La cola tan larga y peluda que\nposee simboliza lo longevo que es."
          leaf_green: "Se oculta en el agua para cazar a sus\npresas. Al nadar rápidamente mueve\nlas orejas para nivelarse."
blastoise:
