          leaf_green: "ハピナスが　うんだ　タマゴを\nひとくちでも　たべた　ひとは\nだれにでも　やさしく　なれる。"
        en:
          fire_red: "It has a very compassionate nature. If it\nsees a sick POKéMON, it will nurse the\nsufferer back to health."
          leaf_green: "Anyone who takes even one bite of\nBLISSEY’s egg becomes unfailingly caring\nand pleasant to everyone."
        fr:
          fire_red: "Il est d’une nature protectrice. S’il voit\nun POKéMON malade, il le soignera\njusqu’à ce qu’il guérisse."
          leaf_green: "Celui qui mange un peu de l’œuf de\nLEUPHORIE devient aimable et plaisant\navec tout le monde."
        it:
          fire_red: "È di natura molto compassionevole. Se\ntrova un POKéMON ammalato lo accudisce\nper farlo guarire."
          leaf_green: "Basta anche solo assaggiare un uovo di\nBLISSEY per diventare gentili e premurosi\ncon chiunque."
        de:
          fire_red: "Es ist sehr mitfühlend. Wenn es ein krankes\nPOKéMON sieht, pflegt es dieses wieder\ngesund."
          leaf_green: "Jeder, der einen Bissen von dem Ei, das\nHEITEIRA hält, nimmt, wird gegenüber\nanderen sorgsam und höflich."
        es:
          fire_red: "Es de naturaleza compasiva. Si ve a un\nPOKéMON enfermo, lo cuidará hasta\nque se recupere."
          leaf_green: "Cualquiera que pruebe un poco de huevo\nde BLISSEY, se volverá más amable y\nagradable con todos."
raikou:
  species_id: 243
  names:
    jp_kana: ライコウ
