      descriptions:
        jp_kana:
          fire_red: "どんなに　はげしい　あらしでも\nかみなりが　なっていれば\nたのしそうに　あそびまわる。"
          leaf_green: "うでを　ぐるぐるまわして　でんきを\nはっせいさせるが　すぐ　つかれるので\nすこししか　でんきが　ためられない。"
        en:
          fire_red: "Even in the most vicious storm, this\nPOKéMON plays happily if thunder rumbles\nin the sky."
          leaf_green: "It rotates its arms to generate\nelectricity, but it tires easily, so it\ncharges up only a little bit."
        fr:
          fire_red: "Ce POKéMON joue toujours gaiement,\nmême dans le plus violent des orages,\nau milieu de terribles éclairs."
          leaf_green: "Il fait pivoter ses bras pour créer de\nl’énergie, mais il ne se charge qu’un\npeu car il se fatigue vite."
        it:
          fire_red: "Anche durante le tempeste più impetuose\nquesto POKéMON gioca allegramente se\node il rombo di un tuono in cielo."
          leaf_green: "Genera elettricità ruotando gli arti\nsuperiori, ma non fa mai una ricarica\ncompleta perché si stanca presto."
        de:
          fire_red: "Im schlimmsten Sturm, mit Blitzen und\nDonnergetöse, fühlt sich dieses POKéMON\nam wohlsten."
          leaf_green: "Es rotiert mit den Armen, um Elektrizität\nzu erzeugen. Da es sehr schnell müde\nwird, erzeugt es nur wenig."
        es:
          fire_red: "Incluso en la peor de las tormentas, este\nPOKéMON juega feliz si un trueno cruza\nel cielo."
          leaf_green: "Gira los brazos para generar electricidad,\npero se agota rápido, así que sólo se\nrecarga un poco."
magby:
