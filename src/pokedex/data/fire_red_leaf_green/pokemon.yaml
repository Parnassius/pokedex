          leaf_green: "めったに　すがたを　あらわさないが\nひとたび　あばれだすと　おおきな\nとしが　かいめつする　ときもある。"
        en:
          fire_red: "It has an extremely aggressive nature.\nThe HYPER BEAM it shoots from its mouth\ntotally incinerates all targets."
          leaf_green: "Rarely seen in the wild. Huge and vicious,\nit is capable of destroying entire cities\nin a rage."
        fr:
          fire_red: "Il est d’une nature très agressive.\nL’ULTRALASER qu’il tire de sa bouche\nest capable de désintégrer n’importe\nquelle cible."
          leaf_green: "Gigantesque et maléfique, il est capable\nde raser une ville entière dans un accès\nde rage."
        it:
          fire_red: "POKéMON estremamente aggressivo,\nincenerisce ogni cosa con l’IPER RAGGIO\nche spara dalla bocca."
          leaf_green: "Poco comune allo stato selvatico.\nEnorme e cattivo, può distruggere\nintere città con un solo attacco."
        de:
          fire_red: "Es ist von Natur aus sehr aggressiv.\nDer HYPERSTRAHL, den es aus\nseinem Maul verschießt, äschert\nseine Gegner ein."
          leaf_green: "Ein gigantisches, sehr kraftvolles\nPOKéMON. Es ist fähig, ganze Städte zu\nzerstören."
        es:
          fire_red: "Es exageradamente agresivo. Lanza\nHIPERRAYO por la boca para achicharrar\na su rival."
          leaf_green: "No es frecuente verlo en su medio.\nEs enorme y malvado, y capaz de\ndestruir ciudades enteras de un ataque."
lapras:
