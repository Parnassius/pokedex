          leaf_green: "みずべに　すむが　しっぽには\nさかなのような　ひれが　のこっていて\nにんぎょと　まちがう　ひともいる。"
        en:
          fire_red: "Its body’s cellular structure is similar to\nthe molecular composition of water.\nIt can melt invisibly in water."
          leaf_green: "Lives close to water. Its long tail is\nridged with a fin which is often mistaken\nfor a mermaid’s."
        fr:
          fire_red: "Sa structure cellulaire est similaire à\nla composition moléculaire de l’eau.\nUne fois dans l’eau, il devient\nindétectable à l’œil nu."
          leaf_green: "Il vit au bord de l’eau. Sa queue lui\ndonne l’apparence d’une sirène."
        it:
          fire_red: "La sua struttura cellulare è simile alla\ncomposizione molecolare dell’acqua, dove\npuò sciogliersi diventando invisibile."
          leaf_green: "Vive vicino all’acqua. Sulla punta della\ncoda ha una pinna rugosa simile a\nquella di una sirena."
        de:
          fire_red: "Die Zellstruktur seines Körpers ähnelt\nder molekularen Zusammensetzung\nvon Wasser. Daher kann es mit Wasser\nverschmelzen und wird so unsichtbar."
          leaf_green: "Dieses POKéMON lebt nahe an Gewässern.\nSeine Schwanzflosse ähnelt der einer\nMeerjungfrau."
        es:
          fire_red: "La composición celular de su cuerpo\nes tan similar a la estructura molecular\ndel agua que se confunde con ella."
          leaf_green: "Vive cerca del agua. La larga cola\nque tiene termina en una aleta muy\nparecida a la de una sirena."
jolteon:
