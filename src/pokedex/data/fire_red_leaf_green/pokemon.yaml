          leaf_green: "こうふんすると　からだじゅうの\nけあなから　どくその　まじった\nあせを　ふきとばし　みをまもる。"
        en:
          fire_red: "When darkness falls, the rings on its body\nbegin to glow, striking fear in the hearts\nof anyone nearby."
          leaf_green: "When agitated, this POKéMON protects\nitself by spraying poisonous sweat from its\npores."
        fr:
          fire_red: "Quand la nuit tombe, les anneaux sur son\ncorps se mettent à luire, terrorisant ceux\nqui sont proches."
          leaf_green: "Pour se défendre ce POKéMON émet un\ngaz toxique par les pores de sa peau."
        it:
          fire_red: "Nell’oscurità, i cerchi sul suo corpo\nbrillano, terrorizzando chi si trova nelle\nvicinanze."
          leaf_green: "Quando è nervoso, questo POKéMON si\ndifende spruzzando sudore velenoso dai\nsuoi pori."
        de:
          fire_red: "Bei Einbruch der Dunkelheit leuchten die\nRinge auf seinem Körper und verängstigen\nalle in seiner Nähe."
          leaf_green: "Fühlt es sich bedroht, sondert es\ntödlichen Giftschweiß aus seinen Poren ab,\num sich zu schützen."
        es:
          fire_red: "Cuando oscurece, los anillos de su cuerpo\ncomienzan a brillar, asustando a\ncualquiera que se acerque."
          leaf_green: "Cuando se siente amenazado, este POKéMON\nse protege lanzando sudor venenoso\npor todos sus poros."
murkrow:
