        - insomnia
      descriptions:
        jp_kana:
          fire_red: "ふりこのようなものを　もちあるく。\nこどもに　さいみんじゅつを　かけて\nどこかへ　つれさるじけんが　あった。"
          leaf_green: "あいてと　めが　あったときに\nさいみんじゅつなど　かずかずの\nちょうのうりょくを　つかうという。"
        en:
          fire_red: "It carries a pendulum-like device. There\nonce was an incident in which it took \naway a child it hypnotized."
          leaf_green: "When it locks eyes with an enemy, it will\nuse a mix of PSI moves such as HYPNOSIS\nand CONFUSION."
        fr:
          fire_red: "Il transporte toujours un petit pendule.\nOn raconte qu’il aurait un jour enlevé\nun enfant après l’avoir hypnotisé."
          leaf_green: "Quand il regarde fixement son\nadversaire, c’est qu’il va l’attaquer\navec des attaques PSY comme\nHYPNOSE et CHOC MENTAL."
        it:
          fire_red: "Ha con sé una sorta di pendolo. Una\nvolta, per errore, si è portato via un\nbambino che aveva ipnotizzato."
          leaf_green: "Quando cattura lo sguardo del nemico usa\nun mix di mosse di tipo PSICO come\nIPNOSI o CONFUSIONE."
        de:
          fire_red: "Es trägt ein Pendel. Man berichtet von\neinem Vorfall, bei dem es ein Kind\nmitnahm, das es zuvor hypnotisierte."
          leaf_green: "Blickt dieses POKéMON einem Gegner ins\nAuge, greift es mit einem Mix von\nPSY-Energie, bestehend aus HYPNOSE\nund KONFUSION, an."
        es:
          fire_red: "Lleva un péndulo en la mano.\nUna vez, hizo desaparecer a un niño\nal que había hipnotizado."
          leaf_green: "Cuando mira al enemigo, usa una mezcla\nde movimientos PSÍQUICOS como\nHIPNOSIS y CONFUSIÓN."
krabby:
  species_id: 98
  names:
    jp_kana: クラブ
