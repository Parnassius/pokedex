        jp_kana:
          fire_red: "はっぱの　うらがわに　たまった\nあさつゆ　だけを　のんで　くらす。\nほかには　なにも　たべないという。"
          leaf_green: "あるあさ　とつぜん　ふってくる。\nオニスズメに　おそわれると　はっぱを\nはげしく　ふって　おいはらう。"
        en:
          fire_red: "It lives by drinking only dewdrops from\nunder the leaves of plants. It is said\nthat it eats nothing else."
          leaf_green: "It may drop out of the sky suddenly.\nIf attacked by a SPEAROW, it will\nviolently shake its leaves."
        fr:
          fire_red: "Il vit en buvant la rosée sur les\nfeuilles. On dit qu’il ne peut rien\nmanger d’autre."
          leaf_green: "Il peut tomber du ciel sans crier gare.\nS’il est attaqué par un PIAFABEC, il\nsecoue violemment ses feuilles."
        it:
          fire_red: "Vive nutrendosi delle gocce di rugiada\nche cadono dalle foglie delle piante.\nPare che non mangi altro."
          leaf_green: "Piomba dall’alto improvvisamente. Se è\nattaccato da uno SPEAROW, agita\nviolentemente le foglie."
        de:
          fire_red: "Es ernährt sich ausschließlich von den\nTautropfen, die von den Blättern über ihm\nhinabfallen."
          leaf_green: "Manchmal fällt es plötzlich vom Himmel.\nWird es von HABITAK angegriffen, schüttelt\nes seine Blätter."
        es:
          fire_red: "Se alimenta del rocío que hay sobre las\nhojas de las plantas. Dicen que no come\nnada más."
          leaf_green: "Puede caer del cielo de repente.\nSi le ataca un SPEAROW, moverá\nviolentamente las hojas."
sunflora:
  species_id: 192
