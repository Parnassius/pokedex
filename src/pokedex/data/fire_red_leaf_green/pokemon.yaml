        speed: 0
      types:
        - fighting
      egg_groups:
        - field
      abilities:
        - vital_spirit
      descriptions:
        jp_kana:
          fire_red: "いつも　もうれつに　おこっており\nにげても　にげても\nどこまでも　おいかけてくる。"
          leaf_green: "なぜか　もうれつに　おこって\nにげても　にげても　どこまでも\nおいかけてくる　せいかくだ。"
        en:
          fire_red: "It is always outrageously furious. If it\ngives chase, it will tenaciously track the\ntarget no matter how far."
          leaf_green: "Always furious and tenacious to boot.\nIt will not abandon chasing its quarry\nuntil it catches up."
        fr:
          fire_red: "Ce POKéMON est constamment en rogne.\nS’il traque une proie, il la pourchassera\npeu importe jusqu’où elle pourra aller."
          leaf_green: "Agressif et teigneux, il poursuit son\ngibier jusqu’à épuisement complet."
        it:
          fire_red: "Va facilmente su tutte le furie. Se\ninsegue una preda, non si dà per vinto\nfinché non l’ha catturata."
          leaf_green: "Sempre furioso e tenace, perseguita\nla sua preda finché non l’ha catturata."
        de:
          fire_red: "Es ist immer außerordentlich wütend.\nNimmt es die Verfolgung auf, bleibt es\ndem Opfer hartnäckig auf den Fersen,\negal wie weit oder wie lange."
          leaf_green: "Dieses POKéMON ist sehr wild und\nausdauernd. Es verfolgt seine Beute, bis\nes sie gefangen hat."
        es:
          fire_red: "Siempre está tremendamente enfadado.\nCuando se empeña en una presa, no hay\ndistancia para él."
          leaf_green: "Siempre furioso y tenaz con sus patadas.\nPerseguirá a su presa hasta que la\natrape."
growlithe:
  species_id: 58
  names:
    jp_kana: ガーディ
