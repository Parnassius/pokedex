          leaf_green: "さかみちを　ころがりながら　いどう。\nじゃまな　ものは　どんどん\nおしつぶして　すすんでいく。"
        en:
          fire_red: "Be careful while hiking on mountain trails.\nGRAVELER may come rolling down the path\nwithout slowing."
          leaf_green: "Rolls down slopes to move. It rolls over\nany obstacle without slowing or changing\nits direction."
        fr:
          fire_red: "Faites attention pendant vos balades\nen montagne. Des GRAVALANCH\npeuvent dévaler des chemins sans\nmême ralentir!"
          leaf_green: "Pour se déplacer, il dégringole le\nlong des pentes. Il pulvérise tous\nles obstacles qui se trouvent sur\nson passage."
        it:
          fire_red: "Camminando in montagna, si potrebbe\nessere sorpresi da un GRAVELER che\nrotola giù per un sentiero."
          leaf_green: "Si lancia in discesa, rotolando su\nogni ostacolo senza frenare o mutare\ndirezione."
        de:
          fire_red: "Gib Acht, wenn du in den Bergen wanderst.\nGEOROK könnte den Berg herunter-\nrollen, ohne zu bremsen."
          leaf_green: "Dieses POKéMON bewegt sich nur rollend\nfort. Kein Hindernis kann es vom Kurs\nabbringen."
        es:
          fire_red: "Este POKéMON es un peligro. Suele bajar\nrodando las montañas a toda velocidad por\nlos caminos reservados para el senderismo."
          leaf_green: "Se mueve rodando cuesta abajo y sobre\ncualquier obstáculo, sin frenar ni cambiar\nde dirección."
golem:
