        jp_kana:
          fire_red: "ちからも　スピードも　ほとんどダメ。\nせかいで　いちばん　よわくて\nなさけない　ポケモンだ。"
          leaf_green: "おおむかしは　まだ　もうすこし\nつよかったらしい。しかし　いまは\nかなしい　くらいに　よわいのだ。"
        en:
          fire_red: "It is virtually worthless in terms of both\npower and speed. It is the most weak and\npathetic POKéMON in the world."
          leaf_green: "In the distant past, it was somewhat\nstronger than the horribly weak\ndescendants that exist today."
        fr:
          fire_red: "MAGICARPE manque totalement de\nvitesse et de force. C’est le POKéMON\nle plus pathétique sur terre."
          leaf_green: "La puissance de cette créature a\nbeaucoup régressé au fil des siècles."
        it:
          fire_red: "La sua forza e velocità sono praticamente\nnulle. Si può tranquillamente definire il\npiù debole e patetico POKéMON del mondo."
          leaf_green: "Anticamente era molto più forte\ndell’odierno discendente, che è\ndebolissimo."
        de:
          fire_red: "Es ist nutzlos, was Kraft und\nGeschwindigkeit angeht. Dieses\nist das schwächste und erbärm-\nlichste POKéMON der Welt."
          leaf_green: "Die urzeitlichen Vorfahren dieses POKéMON\nwaren sehr viel stärker als ihre heutigen\nNachkommen."
        es:
          fire_red: "No es precisamente rápido ni fuerte.\nEs el POKéMON más debilucho y simplón\nde todos los que hay."
          leaf_green: "En un pasado lejano, era más fuerte que\nsus horribles descendientes de hoy en\ndía."
gyarados:
