          leaf_green: "こうそくで　とんでくると　りょうてと\nおしりにある　おおきな　どくばりを\nつかって　あいてを　せめる。"
        en:
          fire_red: "May appear in a swarm. Flies at violent\nspeeds, all the while stabbing with the\ntoxic stinger on its rear."
          leaf_green: "It flies at high speed and attacks using \nthe large venomous stingers on its\nforelegs and tail."
        fr:
          fire_red: "On le voit souvent voler dans un essaim.\nIl vole très rapidement, piquant sans\ncesse ses adversaires de son dard\ntoxique."
          leaf_green: "Il vole à très grande vitesse. Il se bat\navec les dards empoisonnés de ses bras."
        it:
          fire_red: "Si può trovare anche in sciami. Vola ad\nincredibili velocità, colpendo con il\nvelenoso pungiglione sulla coda."
          leaf_green: "Vola velocemente e attacca usando i suoi\ngrandi e velenosi pungiglioni sulla coda e\nsulle zampe anteriori."
        de:
          fire_red: "Es kann in Schwärmen auftauchen.\nWährend seines rasanten Fluges sticht\nes, mit dem Giftstachel an seinem\nHinterteil, zu."
          leaf_green: "Dieses POKéMON ist sehr schnell. Es\nverfügt an den Vorderbeinen und am\nSchwanz über Giftstacheln."
        es:
          fire_red: "Puede aparecer en enjambres volando\na gran velocidad. Suele usar el venenoso\naguijón inferior para atacar."
          leaf_green: "Vuela muy deprisa y ataca con los\nvenenosos y grandes aguijones de la cola\ny las patas delanteras."
