          leaf_green: "とても　やわらかい　からだ。\nいちど　ころがると　はずみまくって\nぜんぜん　とまれなくなる。"
        en:
          fire_red: "Its extremely flexible and elastic body\nmakes it bounce continuously--anytime,\nanywhere."
          leaf_green: "It has a very soft body. If it starts to\nroll, it will bounce all over and be\nimpossible to stop."
        fr:
          fire_red: "Son corps est très élastique, ce qui lui\npermet de rebondir tout le temps et là\noù il veut."
          leaf_green: "Son corps est tout mou. Quand il\ncommence à rebondir, il est impossible\nde l’arrêter."
        it:
          fire_red: "Il corpo molto flessibile ed elastico lo\nfa rimbalzare da ogni parte continuamente."
          leaf_green: "Il suo corpo è morbidissimo. Se inizia a\nrotolare, rimbalza così tanto che è\nimpossibile fermarlo."
        de:
          fire_red: "Aufgrund seines extrem flexiblen und\nelastischen Körpers springt es ständig\nüberall umher."
          leaf_green: "Sein Körper ist sehr weich. Kommt es ins\nRollen, hüpft es herum und man kann es\nnicht aufhalten."
        es:
          fire_red: "Su cuerpo realmente flexible y elástico\nle permite rebotar cuando sea y donde\nsea."
          leaf_green: "Su cuerpo es muy blando.\nCuando se pone a rodar, rebota contra\ntodo y es imposible de parar."
togepi:
  species_id: 175
  names:
    jp_kana: トゲピー
