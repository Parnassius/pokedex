          leaf_green: "ぜんしんが　かいそうのような\nツルに　おおわれていて\nあるくたびに　ゆらゆら　ゆれる。"
        en:
          fire_red: "Blue plant vines cloak the POKéMON’s\nidentity in a tangled mass. It entangles\nanything that gets close."
          leaf_green: "The whole body is swathed with wide vines\nthat are similar to seaweed. The vines\nsway as it walks."
        fr:
          fire_red: "Une grande masse de lianes bleues\ncache l’identité de ce POKéMON. Sans\npitié, il attrape tout ce qui passe à sa\nportée."
          leaf_green: "Son corps est recouvert de lianes\nsimilaires à des algues. Elles bougent\nquand il marche."
        it:
          fire_red: "Si nasconde sotto un groviglio di liane\nblu, avviluppando tutto ciò con cui viene\na contatto."
          leaf_green: "Ha il corpo tutto coperto di grosse liane,\nsimili ad alghe marine, che ondeggiano\nquando cammina."
        de:
          fire_red: "Blaue Lianen verdecken die wahre\nIdentität dieses POKéMON. Es\nverheddert alles, was ihm zu\nnahe kommt."
          leaf_green: "Der Körper dieses POKéMON ist mit\nalgenähnlichen Ranken übersät, die beim\nLaufen mitwippen."
        es:
          fire_red: "Las cintas de tipo alga que tiene a modo\nde tentáculos le dan su identidad. Es una\nmasa que todo lo enreda."
          leaf_green: "Tiene el cuerpo cubierto con anchas\ncintas del tipo alga que se mueven\ncuando camina."
kangaskhan:
