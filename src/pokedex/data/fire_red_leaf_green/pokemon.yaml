        jp_kana:
          fire_red: "いわあなに　もぐりこむ　せいしつの\nもちぬしで　ねむくなると　ほかの\nオクタンの　すあなを　うばう。"
          leaf_green: "がんじょうな　いしあたま。\nきゅうばんつきの　あしを　からませ\nひたすら　あたまで　うちすえる。"
        en:
          fire_red: "It instinctively sneaks into rocky holes.\nIf it gets sleepy, it steals the nest of a\nfellow OCTILLERY."
          leaf_green: "It traps enemies with its suction-cupped\ntentacles, then smashes them with its\nrock-hard head."
        fr:
          fire_red: "Il s’introduit furtivement dans les\nrochers. S’il est fatigué, il prend le\nnid d’un autre OCTILLERY."
          leaf_green: "Il capture ses ennemis avec ses\ntentacules et les écrase ensuite avec\nsa tête dure comme la pierre."
        it:
          fire_red: "S’introduce istintivamente in buchi nella\nroccia. Se ha sonno occupa la tana di un\naltro OCTILLERY."
          leaf_green: "Cattura i nemici con le ventose dei\ntentacoli per poi colpirli con il suo capo\nduro come pietra."
        de:
          fire_red: "Es verkriecht sich instinktiv in Felshöhlen.\nWird es müde, raubt es das Versteck eines\nfremden OCTILLERY."
          leaf_green: "Beim Beutefang setzt es seine Tentakel\nein. Es zermalmt seine Beute mit seinem\nsteinharten Kopf."
        es:
          fire_red: "Instintivamente se escabulle entre las\nrocas. Si le entra sueño, robará la\nguarida de otro OCTILLERY."
          leaf_green: "Atrapa a los enemigos con los tentáculos,\ny después los golpea con la dura cabeza."
