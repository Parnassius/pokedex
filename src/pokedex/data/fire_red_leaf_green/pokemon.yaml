          leaf_green: "ようせいの　なかまで　めったに\nひとまえに　でてこない。けはいを\nかんじて　すぐ　にげてしまうようだ。"
        en:
          fire_red: "It has an acute sense of hearing. It can\neasily hear a pin being dropped nearly\n1,100 yards away."
          leaf_green: "A timid fairy POKéMON that is rarely seen,\nit will run and hide the moment it senses\npeople."
        fr:
          fire_red: "Ce POKéMON a l’ouïe très développée.\nIl peut facilement entendre une épingle\ntomber à 1 km de distance."
          leaf_green: "Ce POKéMON est une sorte de petite\nfée très rare. Il court vite se cacher\ns’il aperçoit un être humain."
        it:
          fire_red: "Dotato di un udito particolarmente\nsviluppato, è in grado di sentir cadere\nuno spillo a un chilometro di distanza."
          leaf_green: "Timido POKéMON fata, molto raro a\nvedersi. Scappa e si nasconde non\nappena avverte la presenza umana."
        de:
          fire_red: "Es besitzt ein exzellentes Hörvermögen.\nDarum kann es eine Nadel fallen hören,\nselbst wenn sie 1 km entfernt ist."
          leaf_green: "Ein feenhaftes und scheues POKéMON, das\nsofort die Flucht ergreift, wenn es\nMenschen wittert."
        es:
          fire_red: "Tiene un agudísimo sentido del oído.\nEs capaz de oír la caída de un alfiler\na 1 km de distancia."
          leaf_green: "Un encantador y tímido POKéMON muy raro\nde ver. Corre y se oculta en cuanto\nsiente que viene gente."
