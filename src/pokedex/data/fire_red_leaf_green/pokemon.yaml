          leaf_green: "かたいカラは　どんな　こうげきも\nはねかえす。ひらいた　ときに\nなかを　こうげき　されると　よわい。"
        en:
          fire_red: "It is encased in a shell that is harder\nthan diamond. Inside, however, it is\nsurprisingly tender."
          leaf_green: "Its hard shell repels any kind of attack.\nIt is vulnerable only when its shell is\nopen."
        fr:
          fire_red: "Il est protégé par une coquille aussi\ndure que du diamant. Il est par contre\nextrêmement tendre à l’intérieur."
          leaf_green: "Protégé par une carapace très résistante,\nil est vulnérable quand celle-ci s’ouvre."
        it:
          fire_red: "La conchiglia esterna è più dura del\ndiamante. L’interno, invece, è\nsorprendentemente morbido."
          leaf_green: "La sua conchiglia dura respinge ogni tipo\ndi attacco. È vulnerabile solo quando\napre il guscio."
        de:
          fire_red: "Sein Panzer ist härter als Diamant. Im\nInneren ist es jedoch überraschend\nweich."
          leaf_green: "Eine harte Schale schützt dieses POKéMON.\nNur wenn es diese öffnet, wird es\nverwundbar."
        es:
          fire_red: "Está metido en una concha sólida\ncomo el diamante, pero tiene un cuerpo\nmuy blando."
          leaf_green: "La concha lo protege de cualquier tipo\nde ataque. Sólo es vulnerable cuando\nse abre."
cloyster:
