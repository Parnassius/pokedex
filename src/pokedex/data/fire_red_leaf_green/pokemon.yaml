        jp_kana:
          fire_red: "おとなになると　なかまから\nせなかに　あしあとの　マークを\nつけられる　しゅうせいを　もつ。"
          leaf_green: "シッポの　さきから　ぶんぴつする\nえきたいを　あちこちに　ぬりつけて\nじぶんの　なわばりを　アピールする。"
        en:
          fire_red: "Once it becomes an adult, it has a\ntendency to let its comrades plant\nfootprints on its back."
          leaf_green: "A special fluid oozes from the tip of its\ntail. It paints the fluid everywhere to\nmark its territory."
        fr:
          fire_red: "Arrivé à l’âge adulte, il laisse ses\ncamarades poser leur empreinte\nde patte sur son dos."
          leaf_green: "Un liquide coule du bout de sa queue.\nIl peint avec ce fluide pour marquer son\nterritoire."
        it:
          fire_red: "Quando è adulto tende a farsi stampare\nsul dorso le orme delle zampe dei propri\ncompagni."
          leaf_green: "Sulla coda ha un fluido speciale, che\nlascia ovunque per marcare il suo\nterritorio."
        de:
          fire_red: "Ist es erwachsen, lässt es sich gern von\nseinen Kameraden Fußabdrücke auf den\nRücken setzen."
          leaf_green: "Eine spezielle Flüssigkeit tritt an seiner\nSchwanzspitze aus, mit der es sein Revier\nmarkiert."
        es:
          fire_red: "Cuando llega a adulto, suele dejar que\nsus camaradas dejen sus huellas sobre\nel lomo."
          leaf_green: "La punta de la cola rezuma un fluido\nespecial. Lo pinta todo con este líquido\npara marcar su terreno."
tyrogue:
  species_id: 236
  names:
    jp_kana: バルキー
