          leaf_green: "エサを　さがすとき　すいめん\nすれすれを　すべるように　とんで\nコイキングなどを　わしづかみにする。"
        en:
          fire_red: "It spreads its gorgeous wings widely to\nintimidate enemies. It races through the\nskies at Mach-2 speed."
          leaf_green: "When hunting, it skims the surface of\nwater at high speed to pick off unwary\nprey such as MAGIKARP."
        fr:
          fire_red: "ROUCARNAGE déploie ses ailes\nmajestueuses pour effrayer ses\nennemis. Il peut voler à Mach 2."
          leaf_green: "Il survole la surface de l’eau pour\nrepérer une proie et plonge en piqué\npour l’attraper."
        it:
          fire_red: "Intimidisce i nemici spiegando le\npossenti ali. In volo raggiunge la\nvelocità di Mach 2."
          leaf_green: "Quando caccia, vola velocissimo sul pelo\ndell’acqua e cattura ignare prede come\nMAGIKARP."
        de:
          fire_red: "Es breitet seine betörenden Schwingen aus,\num den Gegner einzuschüchtern. Seine \nFluggeschwindigkeit liegt bei Mach 2."
          leaf_green: "Dieses POKéMON schnellt bei der Jagd\nblitzschnell unter Wasser, um seine\nahnungslose Beute zu fangen."
        es:
          fire_red: "Para intimidar a su enemigo, extiende las\nincreíbles alas que tiene. Este POKéMON\nvuela a una velocidad increíble."
          leaf_green: "Cuando caza, vuela muy deprisa a ras del\nagua, y sorprende a inocentes presas como\nMAGIKARP."
rattata:
  species_id: 19
  names:
    jp_kana: コラッタ
