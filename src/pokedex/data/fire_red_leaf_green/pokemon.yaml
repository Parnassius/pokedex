          leaf_green: "つぼのような　こうらの　なかに\nたくわえられた　きのみは　とけて\nドロドロの　えきたいに　なるという。"
        en:
          fire_red: "It stores BERRIES inside its shell.\nTo avoid attacks, it hides beneath rocks\nand remains completely still."
          leaf_green: "The BERRIES it stores in its vaselike\nshell decompose and become a gooey\nliquid."
        fr:
          fire_red: "Il garde des BAIES dans sa coquille. Pour\néviter les attaques, il s’immobilise sous\nles rochers."
          leaf_green: "Les BAIES qu’il stocke dans sa coquille\nse décomposent et deviennent un liquide\ngluant."
        it:
          fire_red: "Nel guscio raccoglie BACCHE. Per evitare\nattacchi, si nasconde sotto le rocce e non\nfa alcun rumore."
          leaf_green: "Le BACCHE che raccoglie nel guscio fatto\na vaso marciscono, trasformandosi in\nliquido vischioso."
        de:
          fire_red: "Es sammelt BEEREN in seiner Schale. Um\nsich vor Attacken zu schützen, versteckt\nes sich unter Steinen."
          leaf_green: "Die BEEREN, die es in seinem Inneren\nlagert, verrotten und daraus entsteht ein\ndickflüssiger Saft."
        es:
          fire_red: "Almacena BAYAS dentro del caparazón.\nPara evitar ataques, se esconde inmóvil\nbajo las rocas."
          leaf_green: "Las BAYAS que almacena en el\ncaparazón se descomponen en\nun líquido pegajoso."
heracross:
