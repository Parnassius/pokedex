          leaf_green: "のんびりとした　せいかくで\nきままに　およいでは　いつも\nふなぞこに　あたまを　ぶつけている。"
        en:
          fire_red: "Due to its relaxed and carefree attitude,\nit often bumps its head on boulders and\nboat hulls as it swims."
          leaf_green: "This carefree POKéMON has an easygoing\nnature. While swimming, it always bumps\ninto boat hulls."
        fr:
          fire_red: "Il est si distrait que quand il nage, il se\ncogne souvent la tête sur les rochers\nou les coques de bateau."
          leaf_green: "Ce POKéMON est très insouciant. Quand\nil nage, il fonce tête la première dans\nla coque des bateaux."
        it:
          fire_red: "Con il suo atteggiamento rilassato e\ndisinvolto, mentre nuota scontra spesso\ni massi e gli scafi delle barche."
          leaf_green: "Questo POKéMON sbarazzino non si fa\ngrossi problemi: nuotando urta sempre gli\nscafi delle barche."
        de:
          fire_red: "Aufgrund seiner gleichgültigen Einstellung\nrammt es seinen Kopf oft gegen Felsen\noder Schiffsrümpfe."
          leaf_green: "Dieses genügsame POKéMON ist sehr\numgänglich. Beim Schwimmen stößt es immer\nwieder gegen Schiffe."
        es:
          fire_red: "Debido a su despreocupada actitud,\na menudo golpea su cabeza contra\nrocas o barcos al nadar."
          leaf_green: "Este despreocupado POKéMON es de\nnaturaleza tranquila. Siempre que nada,\nse choca con los barcos."
espeon:
