      descriptions:
        jp_kana:
          fire_red: "しにわかれた　ははおやの　ほねを\nあたまに　かぶっている。さびしいとき\nおおごえで　なくという。"
          leaf_green: "あたまに　ほねの　ヘルメットを\nかぶって　いるので　ほんとうの\nかおを　みたものは　いない。"
        en:
          fire_red: "It wears the skull of its dead mother on\nits head. When it becomes lonesome, it is\nsaid to cry loudly."
          leaf_green: "Because it never removes its skull helmet,\nno one has ever seen this POKéMON’s real\nface."
        fr:
          fire_red: "Ce POKéMON porte le crâne de sa\ndéfunte mère sur sa tête. On raconte\nqu’il se met à pleurer dès qu’il se\nretrouve seul."
          leaf_green: "Il ne retire jamais son casque en os.\nPersonne n’a jamais vu le visage de ce\nPOKéMON."
        it:
          fire_red: "Indossa il teschio della madre morta come\nun casco. Quando si sente solo lancia\nurla strazianti."
          leaf_green: "Poiché non si leva mai il suo\ncasco-teschio, nessuno ha mai\nvisto il suo vero muso."
        de:
          fire_red: "Es trägt den Schädel seiner ver-\nstorbenen Mutter auf seinem Kopf.\nFühlt es sich einsam, soll es\nlaut weinen."
          leaf_green: "Dieses POKéMON trägt immer eine\nSchädelmaske. Niemand hat bisher sein\nwahres Gesicht gesehen."
        es:
          fire_red: "Lleva puesto el cráneo de su madre.\nCuando se siente solo se pone a gritar\nmuy fuerte."
          leaf_green: "Como no se quita nunca el cráneo que\nlleva puesto, nadie le ha visto la cara\na este POKéMON."
marowak:
  species_id: 105
  names:
