          leaf_green: "もりに　おおく　ハッパを　たべる。\nあたまに　するどい　ハリをもち\nさされると　どくに　おかされる。"
        en:
          fire_red: "Often found in forests and grasslands.\nIt has a sharp, toxic barb of around two\ninches on top of its head."
          leaf_green: "Often found in forests, eating leaves.\nIt has a sharp stinger on its head that\ninjects poison."
        fr:
          fire_red: "On trouve souvent ce POKéMON\ndans les forêts et les hautes herbes.\nL’aiguillon de 5 cm sur sa tête\ncontient un venin très toxique."
          leaf_green: "Il vit dans les forêts et se nourrit\nessentiellement de feuilles. L’aiguillon\nsur sa tête est empoisonné."
        it:
          fire_red: "Vive soprattutto nei boschi e nei prati.\nSul capo ha un affilato e velenoso\npungiglione lungo cinque centimetri."
          leaf_green: "Spesso presente nei boschi, si nutre di\nfoglie. Ha un velenoso pungiglione sulla\ntesta."
        de:
          fire_red: "Es lebt bevorzugt in Wäldern und in hohem\nGras. Auf dem Kopf trägt es einen circa\n5 cm langen, spitzen, giftigen Stachel."
          leaf_green: "Dieses POKéMON lebt in Wäldern und\nernährt sich von Blättern. Es trägt einen\ngiftigen Stachel."
        es:
          fire_red: "Suele habitar bosques y praderas.\nTiene un afilado y venenoso aguijón\nde unos 5 cm encima de la cabeza."
          leaf_green: "Fácil de ver por los bosques comiendo\nhojas. Tiene un aguijón venenoso en la\ncabeza."
kakuna:
