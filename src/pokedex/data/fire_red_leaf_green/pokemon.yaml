        - static
      descriptions:
        jp_kana:
          fire_red: "たいもうは　どんどん　のびる。\nなつになると　ぜんぶ　ぬけおちるが\nいっしゅうかんで　もとどおりになる。"
          leaf_green: "からだに　せいでんきが　たまると\nたいもうが　いつもの　２ばいほどに\nふくらむ。さわると　しびれる。"
        en:
          fire_red: "Its fleece grows continually. In the\nsummer, the fleece is fully shed, but it\ngrows back in a week."
          leaf_green: "If static electricity builds in its body,\nits fleece doubles in volume. Touching\nit will shock you."
        fr:
          fire_red: "Sa toison pousse constamment. En été,\non le tond complètement, mais sa laine\nrepousse en moins d’une semaine."
          leaf_green: "Son corps produit de l’électricité\nstatique. Quand il est bien chargé, son\npoil double de volume."
        it:
          fire_red: "Il manto lanoso gli ricresce di continuo.\nIn estate lo perde completamente, ma\nsi riforma nel giro di una settimana."
          leaf_green: "Se il suo corpo si riempie d’elettricità,\nil volume della lana raddoppia. Il\ncontatto causa uno shock."
        de:
          fire_red: "Sein Fell wächst ständig. Im Sommer wird\nes geschoren, aber sein Fell wächst binnen\neiner Woche nach."
          leaf_green: "Lädt es sich statisch auf, verdoppelt sich\nsein Umfang. Wer es berührt, erhält einen\nElektroschock."
        es:
          fire_red: "Su lana crece continuamente. En verano\nla pierde toda, pero le vuelve a salir\nen una semana."
          leaf_green: "Cuando almacena electricidad en su\norganismo, duplica su volumen.\nTócalo y recibirás una descarga."
flaaffy:
