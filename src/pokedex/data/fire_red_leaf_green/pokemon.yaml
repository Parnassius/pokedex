          leaf_green: "くさむらの　むしなどを　たべる。\nはねが　みじかいために　いつも\nいそがしく　はばたいている。"
        en:
          fire_red: "It busily flits around here and there.\nEven if it is frail, it can be a tough\nfoe that uses MIRROR MOVE."
          leaf_green: "Eats bugs in grassy areas. It has to flap\nits short wings at high speed to stay\nairborne."
        fr:
          fire_red: "Il vole activement çà et là. Même s’il\nsemble frêle, sa MIMIQUE fait de lui\nun adversaire redoutable."
          leaf_green: "Il chasse les insectes dans les hautes\nherbes. Ses petites ailes lui permettent\nde voler très vite."
        it:
          fire_red: "Saltella in continuazione. È fragile, ma\ncomunque piuttosto insidioso, anche\ngrazie all’uso di SPECULMOSSA."
          leaf_green: "Mangia insetti nell’erba alta. Per restare\nin aria deve sbattere le corte ali molto\nvelocemente."
        de:
          fire_red: "Es fliegt geschäftig umher. Auch wenn es \nschwach erscheint, kann es ein starker\nGegner sein, der SPIEGELTRICK einsetzt."
          leaf_green: "Es ernährt sich von Insekten, die es im\nGras findet. Ein starker Flügelschlag hält\nes in der Luft."
        es:
          fire_red: "Va siempre revoloteando de aquí para\nallá. Aunque frágil, puede ser un duro\nrival cuando usa MOVIMIENTO ESPEJO."
          leaf_green: "Come bichos en zonas de hierba. Agita sus\ncortas alas muy rápido para mantenerse en\nel aire."
