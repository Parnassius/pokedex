          leaf_green: "ヒゲで　からだの　バランスを\nとっているので　もし　きられると\nうごきが　のろく　なるらしい。"
        en:
          fire_red: "Its rear feet have three toes each.\nThey are webbed, enabling it to swim\nacross rivers."
          leaf_green: "It uses its whiskers to maintain its\nbalance. It apparently slows down if\nthey are cut off."
        fr:
          fire_red: "Ses pattes arrières ont trois doigts\nchacune. Elles sont palmées pour\nlui permettre de se déplacer dans\nles rivières."
          leaf_green: "Si ses moustaches sont coupées, il perd\nle sens de l’équilibre et devient moins\nrapide."
        it:
          fire_red: "Le zampe posteriori, a tre dita, sono\npalmate. Ciò gli permette di attraversare\ni fiumi a nuoto."
          leaf_green: "Usa i baffi per mantenersi in equilibrio.\nSembra diventare più lento se gli vengono\ntagliati."
        de:
          fire_red: "An seinen Hinterläufen hat es je drei\nZehen. Da sie mit Häuten überzogen\nsind, kann es mühelos Flüsse durch-\nqueren."
          leaf_green: "Dieses POKéMON orientiert sich mit seinen\nBarthaaren. Fehlen diese, bewegt es sich\nlangsamer."
        es:
          fire_red: "Cada pata trasera tiene tres dedos\npalmeados que le permiten nadar\npor los ríos."
          leaf_green: "Utiliza los bigotes para equilibrarse.\nParece que si se los cortan va más\ndespacio."
spearow:
