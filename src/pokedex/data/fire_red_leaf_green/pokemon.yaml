      descriptions:
        jp_kana:
          fire_red: "とても　かるい　からだ。\nふきとばされないよう　しっかり\nじめんを　ふみしめている。"
          leaf_green: "ハネッコどうし　あつまって　かぜに\nふきとばされないように　している。\nでも　そよかぜに　ふかれるのはすき。"
        en:
          fire_red: "Its body is so light, it must grip the\nground firmly with its feet to keep from\nbeing blown away."
          leaf_green: "To keep from being blown away by the\nwind, they gather in clusters. They do\nenjoy gentle breezes, though."
        fr:
          fire_red: "Son corps est si léger qu’il doit\ns’agripper au sol pour éviter de \nse faire emporter par le vent."
          leaf_green: "Pour éviter d’être balayés par les vents,\nils se rassemblent en petits groupes.\nIl n’empêche qu’ils aiment la brise\nlégère."
        it:
          fire_red: "Ha un corpo così leggero che deve\naggrapparsi saldamente al suolo per non\nvolare via."
          leaf_green: "Si stringono fra di loro per resistere\nal vento. Al contrario, amano la brezza\nleggera."
        de:
          fire_red: "Sein Körper ist so leicht, dass es seine\nFüße im Boden verankert, damit es nicht\ndavongeweht wird."
          leaf_green: "Um nicht vom Wind davongeweht zu werden,\ntreten sie stets in Gruppen auf. Eine Brise\ngefällt ihnen."
        es:
          fire_red: "Su cuerpo es tan ligero que debe\nagarrarse bien al suelo con las patas\npara no irse con el viento."
          leaf_green: "Para evitar ser arrastrados por el viento,\nse reúnen en grupos, aunque adoran las\nbrisas suaves."
skiploom:
  species_id: 188
