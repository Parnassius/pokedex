          leaf_green: "すぐに　おこって　たたかおうとする。\nしかも　あたまの　ツノは　ささると\nきょうれつな　どくそをだす　しくみ。"
        en:
          fire_red: "It is easily angered. By swinging its well-\ndeveloped horn wildly, it can even punch\nthrough diamond."
          leaf_green: "An aggressive POKéMON that is quick to\nattack. The horn on its head secretes a\npowerful venom."
        fr:
          fire_red: "Il se met très facilement en colère. S’il\ncharge avec sa corne imposante, ce\nPOKéMON peut même briser du diamant."
          leaf_green: "Très agressif, il est prompt à répondre à\nla violence. La corne sur sa tête est\nvenimeuse."
        it:
          fire_red: "Si inquieta facilmente. Il possente\ncorno può distruggere persino\nil diamante."
          leaf_green: "POKéMON aggressivo sempre pronto\nall’attacco, secerne un veleno potente dal\ncorno sulla testa."
        de:
          fire_red: "Es kann leicht wütend werden. Durch\nkräftiges Drehen seines ausgeprägten\nHorns kann es sogar durch Diamanten\nbohren."
          leaf_green: "Ein aggressives POKéMON, das sehr flink\nangreift. Das Horn auf dem Kopf sondert\nstarkes Gift ab."
        es:
          fire_red: "Se enfada con facilidad y es capaz de\nromper un diamante con el potente\ncuerno que tiene."
          leaf_green: "Un POKéMON agresivo, siempre listo para\natacar. El cuerno de la cabeza segrega\nun potente veneno."
