          leaf_green: "Un POKéMON marin extrêmement rare. On dit\nqu’il est aussi intelligent que l’homme."
        it:
          fire_red: "Nonostante la stazza, è in grado\ndi volare. Può compiere il giro del\nmondo in 16 ore."
          leaf_green: "POKéMON visto molto raramente. Si\ndice che sia intelligente come l’uomo."
        de:
          fire_red: "Trotz seines wuchtigen und massiven\nKörpers kann es fliegen. Es umrundet\nden Erdball in nur 16 Stunden."
          leaf_green: "Es stellt die Inkarnation des Meeres dar.\nMan sagt, seine Intelligenz entspräche\nder eines Menschen."
        es:
          fire_red: "A pesar del tamaño que tiene y de lo\npesado que es, puede volar. Es capaz de\ndar la vuelta al mundo en sólo 16 horas."
          leaf_green: "Es un POKéMON marino muy raro de\nver. Dicen que es tan inteligente como\nlos humanos."
