      descriptions:
        jp_kana:
          fire_red: "ひるまは　ねてばかりいる。\nよるになると　めが　かがやき\nなわばりを　あるきまわる。"
          leaf_green: "まるいものが　だいすき。よなよな\nでかけては　おちている　コインを\nひろい　あつめて　かえってくる。"
        en:
          fire_red: "All it does is sleep during the daytime.\nAt night, it patrols its territory with its\neyes aglow."
          leaf_green: "Adores round objects. It wanders the\nstreets on a nightly basis to look for\ndropped loose change."
        fr:
          fire_red: "Il passe ses journées à dormir.\nLa nuit venue, il patrouille sur\nson territoire en utilisant ses\nyeux brillants."
          leaf_green: "Il adore les pièces de monnaie. Il hante\nles rues à la recherche de pièces\noubliées par les passants."
        it:
          fire_red: "Di giorno non fa che dormire, mentre\nla notte perlustra il territorio con i suoi\nocchi luccicanti."
          leaf_green: "Ama gli oggetti rotondi. Di notte vaga per\nle vie in cerca di monetine perdute."
        de:
          fire_red: "Es schläft den ganzen Tag. Nachts\npatrouilliert es sein Gebiet mit\nglühenden Augen."
          leaf_green: "Dieses POKéMON bewundert runde Objekte.\nEs sucht nachts auf den Straßen nach\nverlorenen Münzen."
        es:
          fire_red: "Durante el día se dedica a dormir, y de\nnoche vigila su territorio. Tiene unos\nojos muy sensibles a todo lo que brilla."
          leaf_green: "Adora los objetos redondos.\nDe noche, camina por las calles\nen busca de monedas perdidas."
persian:
  species_id: 53
  names:
    jp_kana: ペルシアン
