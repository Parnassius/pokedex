      egg_groups:
        - bug
      abilities:
        - shield_dust
      descriptions:
        jp_kana:
          fire_red: "みどりの　ひふに　おおわれている。\nだっぴして　せいちょうすると\nいとを　かけて　サナギに　かわる。"
          leaf_green: "あしは　みじかいが　きゅうばんに\nなっているので　さかでも　かべでも\nくたびれることなく　すすんでいく。"
        en:
          fire_red: "It is covered with a green skin. When it\ngrows, it sheds the skin, covers itself\nwith silk, and becomes a cocoon."
          leaf_green: "Its short feet are tipped with suction\npads that enable it to tirelessly climb\nslopes and walls."
        fr:
          fire_red: "Il est recouvert d’une peau toute verte.\nQuand il fait sa mue, il s’enroule dans\nun fil de  soie pour s’enfermer dans\nun cocon."
          leaf_green: "Ses petites pattes sont équipées de\nventouses, lui permettant de grimper\naux murs."
        it:
          fire_red: "Quando perde la pellicola verde in cui è\navvolto, questo POKéMON si ricopre di uno\nstrato di seta, diventando un bozzolo."
          leaf_green: "Le sue zampe cortissime sono ricoperte di\nventose che gli permettono di scalare\nqualsiasi muro o salita."
        de:
          fire_red: "Seine Haut ist grün. Beim Wachsen\nstreift es sie ab und verpuppt sich in\neinen Seidenkokon."
          leaf_green: "Dieses POKéMON trägt Saugnäpfe an den\nBeinchen. Es kann mühelos Steigungen und\nMauern erklimmen."
        es:
          fire_red: "Tiene la piel de color verde. Cuando la\nmuda, se recubre de seda y se convierte\nen capullo."
          leaf_green: "Sus cortas patas están recubiertas de\nventosas que le permiten subir incansable\npor muros y cuestas."
