      descriptions:
        jp_kana:
          fire_red: "するどいカマで　えものを　きりさき\nいきのねを　とめる。ごくまれに\nハネをつかって　とぶ。"
          leaf_green: "ニンジャの　ような　すばやさ。\nあまりに　はやく　うごいたときは\nなんびきも　いるように　みえる。"
        en:
          fire_red: "It tears and shreds prey with its wickedly\nsharp scythes. It very rarely spreads its\nwings to fly."
          leaf_green: "With ninja-like agility and speed, it can\ncreate the illusion that there is more\nthan one of itself."
        fr:
          fire_red: "Il déchiquette ses proies à l’aide de\nses bras tranchants comme des faux.\nIl n’utilise ses ailes pour voler que\ntrès rarement."
          leaf_green: "Rapide et agile comme un ninja, il se\ndéplace si vite qu’il crée l’illusion\nd’être en groupe."
        it:
          fire_red: "Fa a pezzi le prede con gli artigli\nspaventosamente affilati. Solo raramente\nspiega le ali per alzarsi in volo."
          leaf_green: "Con l’agilità e la velocità di un ninja,\ncrea l’illusione ottica che ce ne siano\npiù di uno."
        de:
          fire_red: "Es zerreißt und zerkleinert seine Beute\nmit seinen unglaublich scharfen\nSicheln. Selten breitet es seine\nFlügel aus, um zu fliegen."
          leaf_green: "Dieses POKéMON ist schnell und wendig wie\nein Ninja. Man glaubt, mehrere Gegner zu\nsehen."
        es:
          fire_red: "Destroza a su presa con las guadañas\nque tiene.\nNo es común que use las alas para volar."
          leaf_green: "Con una agilidad y velocidad de ninja,\npuede hacer creer que hay más de\nuno."
jynx:
