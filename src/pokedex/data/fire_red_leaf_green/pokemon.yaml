      descriptions:
        jp_kana:
          fire_red: "ながれぼしが　おおい　よる。\nふしぎと　ピィの　すがたを\nみかけることが　おおくなる。"
          leaf_green: "おほしさまのような　シルエット。\nそのすがたから　ながれぼしにのって\nやってくると　しんじられている。"
        en:
          fire_red: "When numerous meteors illuminate the\nnight sky, sightings of CLEFFA strangely\nincrease."
          leaf_green: "Because of its unusual, starlike\nsilhouette, people believe that it came\nhere on a meteor."
        fr:
          fire_red: "Quand de nombreux météores illuminent le\nciel, on arrive à voir plus de MELO que\nd’habitude."
          leaf_green: "Il ressemble un peu à une étoile.\nOn suppose qu’il est venu sur terre\naccroché à une météorite."
        it:
          fire_red: "Quando molte meteore illuminano il cielo\nnotturno, stranamente si avvistano molti\npiù CLEFFA."
          leaf_green: "Per il suo aspetto bizzarro, a forma di\nstella, c’è chi crede che provenga da\nuna meteora."
        de:
          fire_red: "Erleuchten viele Meteore den Nachthimmel,\nkann man PII seltsamerweise viel\nöfter begegnen."
          leaf_green: "Aufgrund seiner ungewöhnlichen Sternform\nsagt man, es sei auf einem Meteor hierher\ngereist."
        es:
          fire_red: "Cuando varios meteoros iluminan el cielo\nnocturno, la vista de CLEFFA mejora de\nforma extraña."
          leaf_green: "Por su inusual forma estrellada, la gente\ncree que procede de un meteorito que\ncayó a la tierra."
igglybuff:
  species_id: 174
  names:
    jp_kana: ププリン
    en: IGGLYBUFF
