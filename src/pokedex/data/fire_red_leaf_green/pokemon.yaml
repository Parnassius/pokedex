          leaf_green: "からだが　プログラムで　できている。\nでんしくうかんを　じゆうじざいに\nいどうできる　のうりょくをもつ。"
        en:
          fire_red: "Using the most advanced technologies,\nscientists finally succeeded in making the\nfirst artificial POKéMON."
          leaf_green: "A POKéMON that consists entirely of\nprogramming code. It is capable of moving\nfreely in cyberspace."
        fr:
          fire_red: "En utilisant les dernières avancées\ntechnologiques, des scientifiques ont\nréussi à créer PORYGON, le premier\nPOKéMON artificiel."
          leaf_green: "Ce POKéMON est fait de programmes et\nd’algorithmes. Il peut survivre en milieu\nvirtuel."
        it:
          fire_red: "Le tecnologie più avanzate hanno\nfinalmente permesso agli scienziati\ndi creare il primo POKéMON artificiale."
          leaf_green: "Formato per intero da codici\nprogrammatici, può muoversi\nliberamente nel ciberspazio."
        de:
          fire_red: "Unter Einsatz der neuesten Technolo-\ngie ist es Forschern endlich gelungen,\ndas erste künstliche POKéMON zu\nerschaffen."
          leaf_green: "PORYGON besteht komplett aus\nComputerdaten. Es kann sich frei in\nvirtuellen Welten bewegen."
        es:
          fire_red: "Es obra de unos científicos que usaron\nla tecnología más punta para crearlo."
          leaf_green: "Un POKéMON formado por códigos de\nprogramación. Se mueve libre por el\nciberespacio."
omanyte:
