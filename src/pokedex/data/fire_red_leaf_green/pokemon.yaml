      descriptions:
        jp_kana:
          fire_red: "つよい　でんきが　だいこうぶつで\nおおきな　はつでんしょ　などに　\nしばしば　あらわれる。"
          leaf_green: "はつでんしょ　ふきんから　すがたを\nけしたとき　まちに　だいていでんが\nおこると　いわれている。"
        en:
          fire_red: "It loves to feed on strong electricity.\nIt occasionally appears around large\npower plants and so on."
          leaf_green: "Normally found near power plants, they\ncan wander away and cause major\nblackouts in cities."
        fr:
          fire_red: "Il adore se nourrir d’électricité. Il \napparaît occasionnellement près des\ngrandes centrales électriques."
          leaf_green: "Vivant près des centrales électriques,\nil provoque des pannes de courant quand\nil se promène en ville."
        it:
          fire_red: "Ama nutrirsi di elettricità ad alta\ntensione. È possibile trovarlo vicino a\ngrandi centrali elettriche."
          leaf_green: "Normalmente vive vicino a centrali\nelettriche e se si allontana può causare\nblackout gravi in città."
        de:
          fire_red: "Es konsumiert am liebsten Elek-\ntrizität. Gelegentlich sieht man\nes in der Nähe von\nKraftwerken."
          leaf_green: "Dieses POKéMON lebt in der Nähe von\nKraftwerken. In Städten kann es\nStromausfälle verursachen."
        es:
          fire_red: "Le encanta alimentarse de alta tensión.\nA veces, aparece cerca de centrales\neléctricas y zonas similares."
          leaf_green: "Suelen andar por las centrales eléctricas,\npero también merodean por otras zonas\ny causan grandes apagones."
magmar:
