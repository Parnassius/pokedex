          leaf_green: "がんめん　めがけて　とんでくる。\nはりつかれた　えものが　おどろく\nあいだに　どくバリを　さしこむ。"
        en:
          fire_red: "It usually clings to cliffs. When it spots\nits prey, it spreads its wings and glides\ndown to attack."
          leaf_green: "It flies straight at its target’s face,\nthen clamps down on the startled\nvictim to inject poison."
        fr:
          fire_red: "Il s’accroche souvent aux falaises.\nUne fois sa proie repérée, il plane\nvers elle pour l’attaquer."
          leaf_green: "Il vole droit vers le visage de sa cible\neffrayée et s’y accroche pour lui injecter\nson poison."
        it:
          fire_red: "Di solito sta attaccato agli scogli.\nAttacca la preda spalancando le ali e\nplanando."
          leaf_green: "Atterrisce il nemico volando direttamente\nverso il suo volto, per poi afferrarlo e\niniettargli il suo veleno."
        de:
          fire_red: "Es hängt meist an Klippen. Erspäht es\nBeute, spreizt es seine Flügel und greift\ndiese sofort an."
          leaf_green: "Es fliegt direkt auf das Gesicht seiner\nFeinde zu und injiziert ihnen eine\nÜberdosis tödlichen Gifts."
        es:
          fire_red: "A veces se sujeta a los precipicios.\nCuando divisa una presa, despliega\nlas alas y planea para atacar."
          leaf_green: "Vuela directo a la cara de su aterrada\nvíctima, y acaba con ella inyectándole\nveneno."
steelix:
