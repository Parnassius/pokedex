          fire_red: "ヤドンが　うみへ　エサを\nとりにいったとき　シェルダーに\nしっぽをかまれ　ヤドランになった。"
          leaf_green: "くっついている　シェルダーは\nヤドンの　たべのこした　ものを\nエサにして　いきているという。"
        en:
          fire_red: "When a SLOWPOKE went hunting in the sea,\nits tail was bitten by a SHELLDER. That\nmade it evolve into SLOWBRO."
          leaf_green: "The SHELLDER that latches onto\nSLOWPOKE’s tail is said to feed on the\nhost’s leftover scraps."
        fr:
          fire_red: "Un KOKIYAS s’est un jour accroché\nà la queue d’un RAMOLOSS qui pêchait\net l’a fait évoluer en FLAGADOSS."
          leaf_green: "Le KOKIYAS accroché à la queue du\nRAMOLOSS se nourrit des restes de son\nhôte."
        it:
          fire_red: "Uno SLOWPOKE che si trovava in\nmare in cerca di cibo fu morso da uno\nSHELLDER, evolvendosi in SLOWBRO."
          leaf_green: "Si dice che lo SHELLDER attaccato alla\ncoda di SLOWPOKE si nutra degli avanzi di\nquesto."
        de:
          fire_red: "Als FLEGMON im Wasser jagen ging,\nbiss ihn ein MUSCHAS. Dadurch\nentwickelte es sich zu LAHMUS."
          leaf_green: "Am Schwanz dieses POKéMON hat sich ein\nMUSCHAS festgesaugt. FLEGMON fungiert für\nes als Wirt."
        es:
          fire_red: "Según parece, cuando SLOWPOKE fue\na pescar al río, le mordió un SHELLDER\nen la cola y así se convirtió en SLOWBRO."
          leaf_green: "Dicen que el SHELLDER pegado a la cola\nde SLOWPOKE se nutre de los residuos del\nanfitrión."
magnemite:
