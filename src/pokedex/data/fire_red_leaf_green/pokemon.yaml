        jp_kana:
          fire_red: "ちいさいながらも　あばれんぼう。\nめのまえで　うごくものが　あれば\nとにかく　かみついてくる。"
          leaf_green: "はったつした　あごは　パワフルで\nなんでも　かみくだいて　しまうので\nおやのトレーナーでも　ようちゅうい。"
        en:
          fire_red: "It is small but rough and tough. It won’t\nhesitate to take a bite out of anything\nthat moves."
          leaf_green: "Its well-developed jaws are powerful and\ncapable of crushing anything. Even its\nTRAINER must be careful."
        fr:
          fire_red: "Petit mais costaud, il n’hésite pas à\nmordre tout ce qui passe à portée de\ncrocs."
          leaf_green: "Sa mâchoire surdéveloppée est capable\nde tout broyer. Même son DRESSEUR\ndoit s’en méfier."
        it:
          fire_red: "È piccolo, ma forte e deciso. Non esita\nad avventarsi su qualsiasi cosa si muova."
          leaf_green: "Le sue potenti mandibole possono\nfrantumare qualsiasi cosa. Anche\nl’ALLENATORE dev’essere cauto."
        de:
          fire_red: "Es ist klein, aber zäh und stark. Es\nzögert nicht, jeden anzugreifen, der\nihm zu nahe kommt."
          leaf_green: "Seine starken Kiefer können alles\nzermalmen. Selbst sein Trainer muss sich\nvor ihm in Acht nehmen."
        es:
          fire_red: "Es pequeño, pero violento. No dudará en\nmorder cualquier cosa que se mueva\ncerca."
          leaf_green: "Sus desarrolladas y potentes mandíbulas\npueden romper cualquier cosa.\nSu ENTRENADOR debe tener cuidado."
croconaw:
  species_id: 159
