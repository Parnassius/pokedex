        jp_kana:
          fire_red: "キメ　こまかく　しなやかな\nたいもうは　うっとりするほど。\nけがわは　こうきゅうひんだ。"
          leaf_green: "ボディーに　だんりょくせいが　あり\nおこらせると　いきを　すいこんで\nどんどん　おおきく　ふくらむ。"
        en:
          fire_red: "Its fur is extremely fine, dense, and\nsupple. The exquisitely pleasant fur\nconveys an image of luxury."
          leaf_green: "The body is soft and rubbery. When\nangered, it will suck in air and inflate\nitself to an enormous size."
        fr:
          fire_red: "Sa fourrure est fine, dense et souple à\nla fois. Très agréable au toucher, elle\ndonne envie de le dorloter."
          leaf_green: "En cas de danger, il gonfle d’air son\ncorps doux et potelé dans des proportions\ngigantesques."
        it:
          fire_red: "La pelliccia, estremamente pregiata,\nmorbida e folta, ha un aspetto\nparticolarmente elegante."
          leaf_green: "Il suo corpo è morbido e gommoso. Se si\narrabbia, aspira aria e si gonfia\nenormemente."
        de:
          fire_red: "Sein Fell ist äußerst fein, dicht und\ngeschmeidig. Das ausgesprochen\nangenehme Fell vermittelt ein\nBild von Luxus."
          leaf_green: "Der Körper dieses POKéMON ist sehr\nelastisch. Bei Gefahr bläht es sich zu\nenormer Körpergröße auf."
        es:
          fire_red: "Tiene un pelaje excepcional, muy fino,\npero tupido y suave. Resulta único y\nllamativo."
          leaf_green: "Su cuerpo es blando y gomoso.\nCuando se enfada, traga aire y\nse hincha muchísimo."
zubat:
