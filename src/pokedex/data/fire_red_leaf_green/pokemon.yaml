          leaf_green: "すいめんから　いきおいよく　スミを\nはっしゃして　とんでいる　ムシを\nうちおとす　ことが　あるという。"
        en:
          fire_red: "It maintains balance using its tail, which\nis wound up like a coil. It may spray ink\nfrom its mouth."
          leaf_green: "Known to shoot down flying bugs with\nprecision blasts of ink from the surface\nof the water."
        fr:
          fire_red: "Ce POKéMON maintient son équilibre\nen balançant sa queue qui se termine\nen boucle. Il peut cracher de l’encre\navec sa bouche."
          leaf_green: "Il abat les insectes volants en leur\ntirant un jet d’encre depuis la surface\nde l’eau. Ses tirs sont toujours précis."
        it:
          fire_red: "Si mantiene in equilibrio grazie alla coda\navvolta a spirale. Può sputare inchiostro\ndalla bocca."
          leaf_green: "È noto per i suoi attacchi ai volatili con\ngetti d’inchiostro dalla superficie\ndell’acqua."
        de:
          fire_red: "Es hält mit Hilfe seines Schwanzes das\nGleichgewicht, da er aufgewickelt ist.\nEs verspuckt Tinte."
          leaf_green: "Dieses POKéMON schießt mit Tinte auf über\nder Wasseroberfläche fliegende Insekten."
        es:
          fire_red: "Tiene enrollada la cola y la usa para\nmantener el equilibrio. En ocasiones echa\ntinta por la boca."
          leaf_green: "Es famoso por derribar a bichos\nvoladores lanzando tinta desde\nla superficie del agua."
