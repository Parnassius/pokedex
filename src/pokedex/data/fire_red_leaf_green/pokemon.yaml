          leaf_green: "じぶんでは　ほとんど　うごけないが\nあぶないときは　かたくなって\nみを　まもっているようだ。"
        en:
          fire_red: "This POKéMON is in a temporary stage\nwhile making its body. It is almost\ncompletely unable to move on its own."
          leaf_green: "Almost incapable of moving, this POKéMON\ncan only harden its shell to protect\nitself when it is in danger."
        fr:
          fire_red: "Ce POKéMON a pris cette forme\ntransitoire le temps de développer sa\nforme véritable. Il est quasiment\nincapable de se déplacer tout seul."
          leaf_green: "Incapable de se déplacer de lui-même,\nil se défend en durcissant sa carapace."
        it:
          fire_red: "Poiché il suo corpo è ancora in via di\nformazione, questo POKéMON è quasi\ntotalmente incapace di muoversi."
          leaf_green: "Quasi incapace di muoversi, questo\nPOKéMON può solo indurire il proprio\nguscio per proteggersi."
        de:
          fire_red: "Dieses POKéMON befindet sich in einer\nMetamorphose und bildet seinen Körper\nnoch. Es kann sich kaum aus freien\nStücken bewegen."
          leaf_green: "Dieses POKéMON kann sich kaum bewegen.\nBei drohender Gefahr verhärtet es seinen\nPanzer."
        es:
          fire_red: "Este POKéMON permanece inmóvil mientras\ndesarrolla internamente su organismo. Es\nprácticamente incapaz de moverse solo."
          leaf_green: "Casi incapaz de moverse, este POKéMON\nsólo puede endurecer su caparazón para\nprotegerse."
beedrill:
