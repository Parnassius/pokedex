          leaf_green: "よる　すがたを　みかけると\nふきつなことが　おきると　しんじられ\nいみきらわれている　ポケモン。"
        en:
          fire_red: "It is said that when chased, it lures its\nattacker onto dark mountain trails where\nthe foe will get lost."
          leaf_green: "Feared and loathed by many, it is\nbelieved to bring misfortune to all those\nwho see it at night."
        fr:
          fire_red: "Il paraît que s’il est pourchassé,\nil attire son ennemi dans la montagne\npour qu’il s’y perde."
          leaf_green: "Craint et peu aimé, il paraît qu’il porte\nmalheur à ceux qui croisent son\nchemin la nuit."
        it:
          fire_red: "Si dice che quando è inseguito attiri il\nnemico verso oscuri sentieri di\nmontagna, per farlo perdere."
          leaf_green: "Molti lo temono e lo detestano credendo\nche porti sfortuna a tutti quelli che\nincontra di notte."
        de:
          fire_red: "Wird es von einem Gegner verfolgt, lockt\nes ihn auf dunkle Bergpfade, wo sein\nGegner sich verläuft."
          leaf_green: "Viele verabscheuen und hassen es, da sie\nglauben, es bringe Verderben, wenn sie ihm\nnachts begegnen."
        es:
          fire_red: "Dicen que al ser perseguido, atrae al\natacante hacia los caminos de la oscura\nmontaña, donde se perderá."
          leaf_green: "Temido y odiado por muchos, dicen que\ntrae la desgracia a todos aquellos que lo\nven por la noche."
slowking:
  species_id: 199
  names:
    jp_kana: ヤドキング
    en: SLOWKING
    fr: ROIGADA
    it: SLOWKING
    de: LASCHOKING
    es: SLOWKING
  forms:
    slowking:
      form_id: 0
      base_stats:
        hp: 95
        attack: 75
        defense: 80
        special_attack: 100
        special_defense: 110
        speed: 30
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 3
        speed: 0
      types:
        - water
        - psychic
      egg_groups:
        - monster
        - water_1
      abilities:
        - oblivious
        - own_tempo
      held_items:
        rare: kings_rock
      descriptions:
        jp_kana:
          fire_red: "かまれたとき　あたまに　しみこんだ\nどくそに　よって　ただならない\nのうりょくに　めざめた　ヤドン。"
          leaf_green: "すごい　ちせいと　ひらめきを\nもっている。どんなときでも　あわてず\nさわがず　のんびりとしている。"
        en:
          fire_red: "When its head was bitten, toxins entered\nSLOWPOKE’s head and unlocked an\nextraordinary power."
          leaf_green: "It has incredible intellect and intuition.\nWhatever the situation, it remains calm\nand collected."
        fr:
          fire_red: "Une fois sa tête mordue, des toxines ont\nenvahi RAMOLOSS et lui ont conféré des\npouvoirs immenses."
          leaf_green: "D’une grande intelligence, il sait rester\ncalme dans les situations les plus\nstressantes."
        it:
          fire_red: "Quando la testa di SLOWPOKE fu morsa, vi\npenetrarono delle tossine che produssero\nun enorme potere."
          leaf_green: "Dotato di incredibile intelligenza e\nintuito, sa restare calmo e padrone\ndi sé in ogni situazione."
        de:
          fire_red: "Als FLEGMON in den Kopf gebissen wurde,\nfloss Gift in seinen Kopf und setzte eine\ngewaltige Kraft frei."
          leaf_green: "Seine Vorahnungen und sein Intellekt\nzeichnen es aus. Es bleibt in jeder\nSituation gelassen und besonnen."
        es:
          fire_red: "Al ser mordido en la cabeza, SLOWPOKE\nabsorbió unas toxinas que liberaron su\noculto poder."
          leaf_green: "Su intelecto e intuición son increíbles.\nNo pierde la compostura en ninguna\nsituación."
misdreavus:
  species_id: 200
  names:
    jp_kana: ムウマ
    en: MISDREAVUS
    fr: FEUFOREVE
    it: MISDREAVUS
    de: TRAUNFUGIL
    es: MISDREAVUS
  forms:
    misdreavus:
      form_id: 0
      base_stats:
        hp: 60
        attack: 60
        defense: 60
        special_attack: 85
        special_defense: 85
        speed: 85
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 1
        special_defense: 1
        speed: 0
      types:
        - ghost
      egg_groups:
        - amorphous
      abilities:
        - levitate
      held_items:
        rare: spell_tag
      descriptions:
        jp_kana:
          fire_red: "いきなり　うしろがみに　かみつき\nひっぱっては　ひとの　おどろく\nすがたをみて　よろこんでいる。"
          leaf_green: "よなかに　ひとの　なきさけぶような\nなきごえを　だして　みんなを\nおどろかせる　いたずらずき。"
        en:
          fire_red: "It loves to bite and yank people’s hair\nfrom behind without warning, just to see\ntheir shocked reactions."
          leaf_green: "It likes playing mischievous tricks such as\nscreaming and wailing to startle people at\nnight."
        fr:
          fire_red: "Il adore mordre et tirer les cheveux des\ngens par surprise, juste pour voir leur\nréaction."
          leaf_green: "La nuit, il aime faire des farces\npour effrayer les gens."
        it:
          fire_red: "Gli piace mordere e tirare i capelli delle\npersone all’improvviso, tanto per vederle\nspaventate."
          leaf_green: "Si diverte a fare brutti scherzi, come\ngridare e lamentarsi in piena notte\nspaventando la gente."
        de:
          fire_red: "Es liebt, Menschen zu beißen und sie an\nden Haaren zu ziehen, nur um ihre\nReaktionen zu sehen."
          leaf_green: "Es liebt Streiche und erschreckt nachts\nMenschen, indem es heult oder ihnen im\nDunkeln auflauert."
        es:
          fire_red: "Le gusta morder y tirar del pelo a la\ngente desde atrás sin avisar, sólo para\nver su reacción."
          leaf_green: "Le gusta hacer travesuras como gritar\ny aullar por la noche, para asustar a la\ngente."
unown:
  species_id: 201
  names:
    jp_kana: アンノーン
    en: UNOWN
    fr: ZARBI
    it: UNOWN
    de: ICOGNITO
    es: UNOWN
  forms:
    unown_a:
      form_id: 0
      base_stats:
        hp: 48
        attack: 72
        defense: 48
        special_attack: 72
        special_defense: 48
        speed: 48
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 1
        special_defense: 0
        speed: 0
      types:
        - psychic
      egg_groups:
        - undiscovered
      abilities:
        - levitate
      descriptions:
        jp_kana:
          fire_red: "からだじたいは　うすっぺらく\nいつも　かべに　はりついている。\nかたちに　なにか　いみがあるらしい。"
          leaf_green: "すがたかたちが　むかしの　せきばんに\nしるされた　もじに　にており\nかんけいあるのではと　ウワサされる。"
        en:
          fire_red: "Its flat, thin body is always stuck on\nwalls. Its shape appears to have some\nmeaning."
          leaf_green: "Their shapes look like hieroglyphs on\nancient tablets. It is said that the two\nare somehow related."
        fr:
          fire_red: "Son corps plat et fin est toujours collé\naux murs. On pense que sa forme a une\nsignification."
          leaf_green: "Ils ressemblent aux hiéroglyphes\ninscrits sur les tablettes anciennes.\nIl semble y avoir un lien."
        it:
          fire_red: "Spesso appoggia ai muri il corpo\npiatto e sottile. Pare che la sua\nforma abbia un preciso significato."
          leaf_green: "La loro forma è simile a geroglifici su\nantiche tavole. Si pensa che non sia una\ncoincidenza."
        de:
          fire_red: "Sein flacher, dünner Körper hängt immer an\nWänden. Seine Form scheint eine Bedeutung\nzu haben."
          leaf_green: "Ihr Äußeres erinnert an Hieroglyphen auf\nantiken Steinplatten. Man sagt, es gäbe\neinen Zusammenhang."
        es:
          fire_red: "Su cuerpo fino y plano aparece siempre en\nlos muros. Su forma parece tener algún\nsignificado."
          leaf_green: "Tienen forma de jeroglíficos sobre lápidas\nantiguas. Dicen que ambos están\nrelacionados."
