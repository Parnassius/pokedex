          leaf_green: "かたい　うろこで　こうげきから\nみを　まもる。かんろくの　ある\nボディから　おおわざを　くりだす。"
        en:
          fire_red: "The body is covered by stiff, needle-\nlike scales. If it becomes excited,\nthe needles bristle outwards."
          leaf_green: "Its hard scales provide strong protection.\nIt uses its hefty bulk to execute\npowerful moves."
        fr:
          fire_red: "Son corps est recouvert d’écailles en\nforme de pointes. Quand ce POKéMON\ns’énerve, ses pointes se dressent de\nfaçon menaçante."
          leaf_green: "Ses écailles très résistantes la protègent.\nSon corps massif lui permet d’exécuter des\nattaques dévastatrices."
        it:
          fire_red: "Il corpo è ricoperto di dure squame\nappuntite che gli si rizzano quando\nsi inquieta."
          leaf_green: "È protetto dalle sue dure squame. Usa\nl’enorme mole per eseguire movimenti\nvigorosi."
        de:
          fire_red: "Sein Körper ist mit massiven, nadelartigen\nSchuppen überzogen. Wenn es erregt ist,\nschießen die Nadeln hervor."
          leaf_green: "Dieses POKéMON besitzt einen harten\nPanzer. Im Kampf nutzt es außerdem seine\nenorme Größe."
        es:
          fire_red: "Tiene el cuerpo recubierto de duras\ny cortantes escamas. Cuando se pone\nnervioso, las usa para defenderse."
          leaf_green: "Está protegido por duras escamas. Usa su\ngran corpulencia para ejecutar potentes\nmovimientos."
