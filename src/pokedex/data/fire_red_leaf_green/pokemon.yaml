        jp_kana:
          fire_red: "みみが　おおきく　とおくの　おとを\nきくとき　はばたくように　うごく。\nおこると　どくばりを　だす。"
          leaf_green: "みみを　たてて　きけんを\nかんじとる。からだの　とげが\nおおきいほど　つよい　どくをだす。"
        en:
          fire_red: "Its large ears are flapped like wings\nwhen it is listening to distant sounds.\nIt extends toxic barbs when angered."
          leaf_green: "It stiffens its ears to sense danger.\nThe larger its horns, the more \npowerful its secreted venom."
        fr:
          fire_red: "Ce POKéMON agite ses oreilles comme\npour entendre tout ce qui se passe\nau loin. Il déploie des aiguillons\ntoxiques quand il est en colère."
          leaf_green: "Son ouïe très fine l’avertit du danger.\nPlus ses cornes sont grandes, plus son\npoison est mortel."
        it:
          fire_red: "Solleva le orecchie come ali per captare\nrumori in lontananza. Quando è adirato,\nestende i baffi velenosi."
          leaf_green: "Per captare il pericolo aguzza le\norecchie. Più grande è il corno,\npiù potente il suo veleno."
        de:
          fire_red: "Seine großen Ohren schlagen wie Flügel,\nwenn es Geräusche in weiter Entfernung\nhört. Es fährt giftige Stacheln aus, wenn\nes verärgert ist."
          leaf_green: "Die großen Ohren bemerken Gefahren\nfrühzeitig. Die großen Hörner enthalten\nein starkes Gift."
        es:
          fire_red: "Cambia la orientación de las grandes\norejas que tiene para oír mejor. Si se\nenfada, sus venenosos cuernos crecen."
          leaf_green: "Estira las orejas para sentir el peligro.\nCuanto mayores sean los cuernos,\nmás fuerte será su veneno."
