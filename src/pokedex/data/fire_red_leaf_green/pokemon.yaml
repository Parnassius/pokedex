      descriptions:
        jp_kana:
          fire_red: "かみなりが　おちたときのような\nなきごえで　ほえながら\nだいちを　かけめぐる　ポケモン。"
          leaf_green: "あまぐもを　せおっているので\nどんなときでも　かみなりを　だせる。\nかみなりとともに　おちてきたという。"
        en:
          fire_red: "This POKéMON races across the\nland while barking a cry that sounds\nlike crashing thunder."
          leaf_green: "The rain clouds it carries let it fire\nthunderbolts at will. They say that it\ndescended with lightning."
        fr:
          fire_red: "Un POKéMON qui parcourt les plaines\navec un aboiement proche d’un coup de\ntonnerre."
          leaf_green: "Le nuage de pluie qu’il porte lui\npermet d’invoquer la foudre. On dit\nde lui qu’il est venu avec l’orage."
        it:
          fire_red: "Corre in lungo e in largo lanciando un\nverso che sembra il rombo di un tuono."
          leaf_green: "Grazie alle nubi di pioggia che ha con sé\nlancia fulmini a volontà. Pare che sia\narrivato con un lampo."
        de:
          fire_red: "Dieses POKéMON jagt über das Land und\nstößt dabei ein Gebrüll aus, das wie\nkrachender Donner klingt."
          leaf_green: "Die Regenwolken, die es trägt, ermöglichen\nihm Gewitter zu erzeugen. Es strotzt vor\nBlitzen."
        es:
          fire_red: "Un POKéMON que corre por el campo\nmientras lanza un grito que recuerda al\ntrueno."
          leaf_green: "Las nubes de lluvia que lleva le permiten\nlanzar rayos a voluntad. Dicen que\napareció con un rayo."
entei:
  species_id: 244
  names:
    jp_kana: エンテイ
