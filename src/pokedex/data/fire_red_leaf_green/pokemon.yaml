        - fire
      egg_groups:
        - field
      abilities:
        - intimidate
        - flash_fire
      held_items:
        common: rawst_berry
      descriptions:
        jp_kana:
          fire_red: "ちゅうごくの　いいつたえにある\nでんせつの　ポケモン。ものすごい\nスピードで　はしるという。"
          leaf_green: "むかしから　おおくの　ひとを\nとりこにした　うつくしい　ポケモン。\nとぶように　かろやかに　はしる。"
        en:
          fire_red: "A POKéMON that is described in Chinese\nlegends. It is said to race at an\nunbelievable speed."
          leaf_green: "A POKéMON that has long been admired\nfor its beauty. It runs agilely as if\non wings."
        fr:
          fire_red: "On parle de ce POKéMON dans les\nlégendes chinoises. Il paraît qu’il peut\ncourir à des vitesses incroyables."
          leaf_green: "Un POKéMON très recherché pour sa\ngrâce légendaire. Il court avec tellement\nd’agilité qu’on dirait qu’il vole."
        it:
          fire_red: "Questo POKéMON è citato nelle leggende\ncinesi. Si dice che possa correre a\nvelocità inaudite."
          leaf_green: "Da sempre ammirato per la sua bellezza,\ncorre veloce come se avesse le ali."
        de:
          fire_red: "Ein POKéMON, das in chinesischen\nLegenden beschrieben wird. Man\nsagt, es bewegt sich mit schier\nunglaublicher Geschwindigkeit."
          leaf_green: "Dieses POKéMON trägt ein wunderschönes\nFell. Es ist obendrein schnell und sehr\nwendig."
        es:
          fire_red: "Las leyendas chinas hablan de este\nPOKéMON. Se dice que es capaz de correr\na velocidades inimaginables."
          leaf_green: "Un POKéMON muy admirado desde la\nantigüedad por su belleza. Corre\nágilmente como si tuviera alas."
poliwag:
  species_id: 60
  names:
    jp_kana: ニョロモ
    en: POLIWAG
