          leaf_green: "さいぼうそしきを　いっしゅんで\nコピーして　あいて　そっくりに\nへんしんする　のうりょくがある。"
        en:
          fire_red: "It can freely recombine its own cellular\nstructure to transform into other life-\nforms."
          leaf_green: "Capable of copying an opponent’s genetic\ncode to instantly transform itself into a\nduplicate of the enemy."
        fr:
          fire_red: "METAMORPH peut modifier sa structure\ncellulaire à sa guise pour se transformer\nen n’importe quelle forme vivante."
          leaf_green: "Il est capable de copier le code\ngénétique d’un ennemi pour se transformer\nen son double."
        it:
          fire_red: "Può ricombinare a piacere la propria\nstruttura cellulare per trasformarsi in\naltri esseri viventi."
          leaf_green: "Può copiare il codice genetico del suo\nnemico e trasformarsi nella sua copia\nperfetta."
        de:
          fire_red: "Es kann seine eigene Zellstruktur\nfrei zusammensetzen und sich\nin jede andere Lebensform\nverwandeln."
          leaf_green: "Dieses POKéMON kann die Gene von Gegnern\nkopieren und sich sofort in deren Ebenbild\nverwandeln."
        es:
          fire_red: "Tiene la capacidad de reorganizar su\nestructura celular para convertirse\nen otras formas de vida."
          leaf_green: "Puede copiar el código genético de un\nenemigo y transformarse en una réplica\ndel mismo."
