          leaf_green: "うみの　あさい　ところを　ただよう。\nつりびとが　まちがって　つりあげ\nさされる　ことが　おおいと　きく。"
        en:
          fire_red: "Its eyes are as transparent as crystals.\nFrom them, it shoots mysterious\nbeams of light."
          leaf_green: "Drifts in shallow seas. Anglers who hook\nthem by accident are often punished by\ntheir stingers."
        fr:
          fire_red: "Ses yeux sont aussi transparents que\ndu cristal. Grâce à eux, il peut tirer\nde puissants rayons lumineux."
          leaf_green: "Il vit en bord de mer. Les pêcheurs\nse font souvent arroser d’acide quand\nils en accrochent un."
        it:
          fire_red: "Ha occhi trasparenti come il cristallo,\ndai quali lancia misteriosi raggi di luce."
          leaf_green: "Va alla deriva in acque poco profonde.\nSe pescato per sbaglio, colpisce con\ngli aculei pungenti."
        de:
          fire_red: "Seine Augen sind durchsichtige Kristalle.\nAus ihnen schießt es geheimnisvolle\nLichtstrahlen."
          leaf_green: "Dieses POKéMON findet man in flachen\nGewässern. Unachtsame Gegner empfängt es\nmit brennendem Gift."
        es:
          fire_red: "Tiene unos ojos transparentes como\nel cristal, que disparan misteriosos rayos."
          leaf_green: "Va a la deriva a poca profundidad. Si es\npescado por accidente, el castigo será su\npunzante ácido."
tentacruel:
