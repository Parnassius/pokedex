          leaf_green: "スーパー　パワフルな　パンチを\nくらった　ものは　ちへいせんまで\nふっとんで　いってしまうという。"
        en:
          fire_red: "Its four ruggedly developed arms can\nlaunch a flurry of 1,000 punches in just\ntwo seconds."
          leaf_green: "Its superpowerful punches are said to\nknock the victim flying clear over the\nhorizon."
        fr:
          fire_red: "Ses deux paires de bras permettent\nà MACKOGNEUR d’envoyer une série\nde 1 000 coups de poing en 2 secondes."
          leaf_green: "Ses coups de poing sont si puissants\nqu’ils font voler ses adversaires jusqu’à\nl’horizon."
        it:
          fire_red: "Le braccia eccezionalmente sviluppate\nsono in grado di assestare 1.000 pugni\nin soli due secondi."
          leaf_green: "Con i suoi muscoli poderosi, sferra pugni\ntali da poter lanciare la vittima oltre\nl’orizzonte."
        de:
          fire_red: "Seine markigen Arme können innerhalb\nvon nur zwei Sekunden 1000 Schläge\nverteilen."
          leaf_green: "Dieses POKéMON kann durch seine kräftigen\nMuskeln Gegner bis zum Horizont\nschleudern."
        es:
          fire_red: "Tiene cuatro brazos tan bien desarrollados\nque puede dar una serie de 1.000\npuñetazos en cuestión de dos segundos."
          leaf_green: "Usa los fuertes músculos que tiene\npara lanzar bestiales puñetazos\ny enviar muy lejos a su víctima."
bellsprout:
  species_id: 69
