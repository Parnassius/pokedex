        jp_kana:
          fire_red: "いい　においを　かぎつけると\nあとさき　かんがえず　においの\nほうこうへ　ダッシュしてしまう。"
          leaf_green: "エサを　さがすため　はなを\nこすりあわせ　じめんを　ほっている。\nたまに　おんせんを　ほりあてる。"
        en:
          fire_red: "If it smells something enticing, it dashes\noff headlong to find the source of the\naroma."
          leaf_green: "It rubs its snout on the ground to find\nand dig up food. It sometimes discovers\nhot springs."
        fr:
          fire_red: "S’il sent une odeur attrayante, il\nfonce tête la première pour trouver\nd’où elle vient."
          leaf_green: "Il renifle le sol avec sa truffe pour y\ndénicher de la nourriture. Il trouve\nparfois des sources d’eau chaude."
        it:
          fire_red: "Appena avverte un profumo invitante,\ncerca subito di capire la provenienza di\nquell’odore."
          leaf_green: "Sfrega il muso sul terreno per scovare\ndel cibo. Talvolta scopre sorgenti d’acqua\ncalda."
        de:
          fire_red: "Wenn es etwas Vielversprechendes\nerschnuppert, dann stürzt es in Windeseile\ndarauf zu."
          leaf_green: "Auf Nahrungssuche schnüffelt es am Boden\nentlang. Es entdeckt dabei manchmal auch\nheiße Quellen."
        es:
          fire_red: "Si percibe un aroma tentador, se tira de\ncabeza para encontrar el origen de dicho\nolor."
          leaf_green: "Frota el hocico contra el suelo para\ndesenterrar comida. A veces, descubre\naguas termales."
piloswine:
  species_id: 221
