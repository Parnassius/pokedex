          leaf_green: "えものに　ねらいを　つけると\nしっぽで　からだを　たたきながら\nまっすぐ　つっこんでくる。"
        en:
          fire_red: "When it is about to TACKLE, it whips\nits body repeatedly with its three\nlong tails."
          leaf_green: "When it targets an enemy, it charges\nfuriously while whipping its body with its\nlong tails."
        fr:
          fire_red: "Juste avant d’utiliser CHARGE, ce\nPOKéMON agite frénétiquement ses\ntrois grandes queues."
          leaf_green: "Une fois sa cible en vue, il la charge\nfurieusement en fouettant l’air de sa\ntriple queue."
        it:
          fire_red: "Prima di usare AZIONE si frusta il corpo\nripetutamente con le tre lunghe code."
          leaf_green: "Quando punta un nemico, carica\nfuriosamente frustando il suo corpo\ncon le lunghe code."
        de:
          fire_red: "Wenn es TACKLE einsetzt,\ngeißelt es mit seinen drei Schwänzen\nwiederholt seinen Körper."
          leaf_green: "Sieht TAUROS einen Gegner, so stürmt er\nwutschnaubend los und benutzt seine\nSchweife als Peitschen."
        es:
          fire_red: "Cuando va a usar PLACAJE se azota\nrepetidas veces con las tres colas que\ntiene."
          leaf_green: "Cuando ve a un enemigo, carga ferozmente\ncon todo el cuerpo, azotándose con las\nlargas colas que tiene."
magikarp:
