          leaf_green: "するどい　キバと　しょくしゅを\nもちながら　カラが　おおきすぎて\nエサを　とれず　ぜつめつしたらしい。"
        en:
          fire_red: "Its tentacles are highly developed as if\nthey are hands and feet. As soon as it\nensnares prey, it bites."
          leaf_green: "Despite having strong fangs and tentacles,\nit went extinct when its heavy shell made\nit unable to catch prey."
        fr:
          fire_red: "Ses tentacules sont développés comme\ns’il s’agissait de bras ou de jambes. Dès\nqu’il attrape une proie, il la mord."
          leaf_green: "Un POKéMON préhistorique qui disparut\nquand sa coquille devint trop lourde à\ndéplacer."
        it:
          fire_red: "Ha tentacoli molto sviluppati,\nparagonabili ad arti umani. Appena\nirretisce la preda, la morde."
          leaf_green: "POKéMON preistorico, dotato di denti\ne tentacoli poderosi. Si è estinto a causa\ndella conchiglia troppo pesante."
        de:
          fire_red: "Seine Tentakel sind hoch entwickelt\nund es setzt sie ähnlich Händen und\nFüßen ein. Sobald es Beute ergriffen\nhat, beißt es zu."
          leaf_green: "Dieses URZEIT-POKéMON ist ausgestorben.\nDer schwere Panzer behinderte es bei der\nJagd."
        es:
          fire_red: "Tiene los tentáculos tan desarrollados\nque le sirven de manos y pies. Con ellos\natrapa a su presa y le da un bocado."
          leaf_green: "Un prehistórico POKéMON que se\nextinguió porque su pesada concha\nle impedía atrapar a sus presas."
