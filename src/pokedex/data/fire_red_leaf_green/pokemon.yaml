        jp_kana:
          fire_red: "かざんの　ふんかこうで　みつかる。\nたいおんは　６００ども　あるので\nこがらだが　あなどれない。"
          leaf_green: "いきを　すったり　はいたり\nするたびに　くちと　はなから\nひのこが　もれてしまう。"
        en:
          fire_red: "It is found in volcanic craters. Its body\nheat exceeds 1,100 degrees Fahrenheit,\nso don’t underestimate it."
          leaf_green: "Each and every time it inhales and\nexhales, hot embers dribble out of its\nmouth and nostrils."
        fr:
          fire_red: "On le trouve dans le cratère des volcans.\nSa température dépasse les 600 degrés,\nalors faites attention!"
          leaf_green: "A chaque fois qu’il respire, des braises\nbrûlantes sortent de sa bouche et de ses\nnarines."
        it:
          fire_red: "Si trova nei crateri dei vulcani e la sua\ntemperatura corporea supera i\n600 ºC. Non va sottovalutato."
          leaf_green: "Ogni volta che inspira ed espira, brace\nardente gli esce dalla bocca e dalle\nnarici."
        de:
          fire_red: "Zu finden ist es in Vulkankratern. Seine\nKörpertemperatur erreicht über 600 Grad.\nVergiss das nicht!"
          leaf_green: "Bei jedem Atemzug springen glühende\nKohlenstücke aus seinem Mund und aus\nseinen Nasenlöchern."
        es:
          fire_red: "Aparece en los cráteres de los volcanes.\nPuede alcanzar los 600 grados de\ntemperatura, así que no lo subestimes."
          leaf_green: "Cada vez que inspira y expira, lanza\nascuas por la boca y por las fosas\nnasales."
