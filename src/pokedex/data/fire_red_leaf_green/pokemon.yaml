          leaf_green: "わくせい　かいはつが　できるよう\nポリゴンを　バージョンアップしたが\nまだ　そらも　とべない。"
        en:
          fire_red: "Further research enhanced its abilities.\nSometimes, it may exhibit motions that\nwere not programmed."
          leaf_green: "This upgraded version of PORYGON is\ndesigned for space exploration. However,\nit can’t even fly."
        fr:
          fire_red: "Des recherches poussées ont amélioré\nses capacités. Il a appris de nouveaux\nmouvements."
          leaf_green: "Cette version améliorée de PORYGON a été\ncréée pour l’exploration de l’espace."
        it:
          fire_red: "Ricerche avanzate hanno potenziato le sue\ncapacità. Ora può fare movimenti che non\nerano programmati."
          leaf_green: "Questa evoluzione di PORYGON è adatta\nalle esplorazioni nello spazio. Tuttavia\nnon sa volare."
        de:
          fire_red: "Seine Fähigkeiten wurden verbessert. Es\nzeigt manchmal sogar Handlungen, die nicht\neinprogrammiert sind."
          leaf_green: "Diese verbesserte PORYGON-Version wurde\nfür den Einsatz im Weltall gebaut. Es kann\naber nicht fliegen."
        es:
          fire_red: "La investigación mejoró sus habilidades.\nA veces, puede actuar de forma no\nprogramada."
          leaf_green: "Esta versión mejorada de PORYGON fue\ncreada para explorar el espacio, aunque\nno puede volar."
stantler:
