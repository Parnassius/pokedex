          leaf_green: "ひとりの　かがくしゃが　なんねんも\nおそろしい　いでんし　けんきゅうを\nつづけた　けっか　たんじょうした。"
        en:
          fire_red: "A POKéMON whose genetic code was\nrepeatedly recombined for research.\nIt turned vicious as a result."
          leaf_green: "It was created by a scientist after years\nof horrific gene-splicing and DNA-\nengineering experiments."
        fr:
          fire_red: "Le caractère malfaisant de ce POKéMON\nest le résultat de nombreuses expériences\nqui visaient à modifier son code\ngénétique."
          leaf_green: "Il est le fruit de nombreuses expériences\ngénétiques horribles et malsaines."
        it:
          fire_red: "Il codice genetico di questo POKéMON\nè stato ripetutamente ricombinato a scopo\ndi ricerca. Ciò l’ha reso malvagio."
          leaf_green: "Creato da uno scienziato dopo anni di\norribili esperimenti di ingegneria genetica."
        de:
          fire_red: "Der genetische Code dieses POKéMON\nwurde wiederholt aus Forschungs-\ngründen umstrukturiert. Daher ist\nes so bösartig."
          leaf_green: "Dieses POKéMON ist das Resultat eines\njahrelangen und skrupellosen Experimentes."
        es:
          fire_red: "Su código genético se recombinó\nrepetidas veces por motivos científicos\ny el resultado fue este curioso POKéMON."
          leaf_green: "Fue creado por un científico tras años\nde horribles experimentos de ingeniería\ngenética."
