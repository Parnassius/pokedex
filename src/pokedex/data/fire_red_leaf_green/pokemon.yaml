          leaf_green: "そうげんや　やまに　せいそくする。\nいしころに　にていて　きがつかずに\nふんだり　つまずいたり　してしまう。"
        en:
          fire_red: "Its round form makes it easy to pick up.\nSome people have used them to hurl\nat each other in a snowball fight."
          leaf_green: "Found in fields and mountains. Mistaking\nthem for boulders, people often step or\ntrip on them."
        fr:
          fire_red: "Sa forme ronde le rend facile à ramasser.\nCertaines personnes les utilisent dans\nles combats de boules de neige."
          leaf_green: "Il vit dans les plaines ou les montagnes.\nOn le confond souvent avec un petit\ncaillou."
        it:
          fire_red: "La forma arrotondata lo rende facilmente\nafferrabile, come una palla di neve da\nlanciare contro gli amici."
          leaf_green: "Si trova nei campi e in montagna. Se\nconfuso con una roccia, può succedere di\ninciamparvi."
        de:
          fire_red: "Aufgrund seiner runden Form kann\nman es leicht aufheben. Manche\nMenschen haben es auf andere\nin einer Schneeballschlacht geworfen."
          leaf_green: "Wanderer stolpern in den Bergen häufig\nüber dieses POKéMON, da es wie ein Stein\naussieht."
        es:
          fire_red: "Es fácil atraparlo por la forma redonda\nque tiene. Cuando hay batallas de bolas\nde nieve, la gente lo usa para lanzarlo."
          leaf_green: "Aparecen en llanos y montañas.\nComo parecen rocas, la gente\nse tropieza con ellos o los pisa."
graveler:
