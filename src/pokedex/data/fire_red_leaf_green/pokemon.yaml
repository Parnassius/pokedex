      descriptions:
        jp_kana:
          fire_red: "ふかふかの　たいもうは　でんきを\nためやすいが　ゴムのような　ひふの\nおかげで　じぶんは　しびれない。"
          leaf_green: "でんきを　たくわえすぎた　けっか\nからだの　ひょうめんに　うぶげすら\nはえない　ぶぶんが　できてしまった。"
        en:
          fire_red: "Its fluffy fleece easily stores\nelectricity. Its rubbery hide keeps it\nfrom being electrocuted."
          leaf_green: "As a result of storing too much\nelectricity, it developed patches where\neven downy wool won’t grow."
        fr:
          fire_red: "Sa douce laine stocke facilement\nl’électricité. Sa peau caoutchouteuse\nle protège de l’électrocution."
          leaf_green: "Il stocke tellement d’électricité que son\npoil ne peut plus repousser à certains\nendroits de son corps."
        it:
          fire_red: "La soffice pelliccia raccoglie elettricità.\nNon si fulmina grazie ad uno strato di\npelle gommosa."
          leaf_green: "Avendo immagazzinato troppa elettricità,\nsu intere parti del corpo non cresce\nneppure la lanugine."
        de:
          fire_red: "Sein flauschiges Fell speichert\nElektrizität. Seine Gummihaut schützt es\nvor Stromstößen."
          leaf_green: "Da es zuviel Elektrizität gespeichert hat,\nhat es Flecken, an denen nicht einmal\nfeine Wolle wächst."
        es:
          fire_red: "Su esponjosa lana almacena electricidad.\nSu piel gomosa evita que sea\nelectrocutado."
          leaf_green: "Como almacena tanta electricidad,\nha desarrollado parches donde\nno crece ni la lana."
ampharos:
