          leaf_green: "ぜんしんの　どくばりを　とばすため\n１０リットルの　みずを　いっきに\nのみこみ　からだを　ふくらませる。"
        en:
          fire_red: "The small spikes covering its body\ndeveloped from scales. They inject a\ntoxin that causes fainting."
          leaf_green: "To fire its poison spikes, it must inflate\nits body by drinking over 2.6 gallons of \nwater all at once."
        fr:
          fire_red: "Son corps est recouvert de piques qui\nproviennent de ses écailles. Elles\nsécrètent un poison étourdissant."
          leaf_green: "Pour tirer ses dards empoisonnés, il\ngonfle son corps en buvant 10 litres\nd’eau subitement."
        it:
          fire_red: "I piccoli aculei che coprono il suo corpo\nsono nati dalle squame. Contengono una\ntossina che fa svenire."
          leaf_green: "Per sparare gli aculei velenosi, gonfia il\ncorpo bevendo più di 10 litri d’acqua in\nuna volta."
        de:
          fire_red: "Die kleinen Stacheln an seinem Körper sind\naus Schuppen entstanden. Damit injiziert\nes Gift."
          leaf_green: "Um seine Giftstacheln abzufeuern, muss es\nseinen Körper aufpumpen, indem es 10 Liter\nWasser trinkt."
        es:
          fire_red: "Las pequeñas púas que cubren su cuerpo\neran escamas. Inyectan una toxina que\ndebilita."
          leaf_green: "Para arrojar sus venenosas púas, se infla\nbebiendo hasta 10 litros de agua de una\nsola vez."
