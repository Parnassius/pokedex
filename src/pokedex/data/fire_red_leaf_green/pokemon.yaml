          leaf_green: "すごく　きょうじんな　にくたいなので\nパワーセーブ　ベルトを　つけて\nつよさを　せいぎょしている。"
        en:
          fire_red: "Its formidable body never gets tired.\nIt helps people by doing work such as\nthe moving of heavy goods."
          leaf_green: "Its muscular body is so powerful, it must\nwear a power-save belt to be able to\nregulate its motions."
        fr:
          fire_red: "Son corps incroyable ne se fatigue\njamais. Il n’hésite pas à aider les gens\nlorsqu’il s’agit de soulever des objets\ntrès lourds."
          leaf_green: "Son corps est si puissant qu’il lui faut\nune ceinture de force pour équilibrer ses\nmouvements."
        it:
          fire_red: "Ha un fisico eccezionale, instancabile.\nGli piace rendersi utile alle persone,\nper esempio aiutandole nei traslochi."
          leaf_green: "Il suo corpo muscoloso è così forte che\nusa una cintura antiforza per regolare i\nsuoi movimenti."
        de:
          fire_red: "Sein durchtrainierter Körper wird nie\nmüde. Es hilft den Menschen, indem\nes schwere Sachen trägt."
          leaf_green: "Dieses POKéMON ist superstark. Es kann\nsich nur mit einem Kraft regulierenden\nGürtel bewegen."
        es:
          fire_red: "Tiene una complexión tan fuerte que\nnunca se cansa. Suele ayudar a la gente\na cargar objetos pesados."
          leaf_green: "Su musculoso cuerpo es tan fuerte que\nusa un cinto anti-fuerza para controlar\nsus movimientos."
machamp:
