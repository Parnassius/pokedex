          leaf_green: "スーパーコンピュータより　すばやく\nけいさんする　ずのうを　もつ。\nちのうしすうは　だいたい５０００。"
        en:
          fire_red: "It does not like physical attacks very \nmuch. Instead, it freely uses extra-\nsensory powers to defeat foes."
          leaf_green: "Its brain can outperform a supercomputer.\nIts IQ (intelligence quotient) is said to\nbe around 5,000."
        fr:
          fire_red: "Ce POKéMON n’apprécie pas vraiment\nles attaques physiques. Il utilise ses\npouvoirs extrasensoriels pour vaincre\nses ennemis."
          leaf_green: "Son cerveau hors du commun peut\neffectuer des opérations à la vitesse\nd’un ordinateur. Il a un Q.I. de 5 000."
        it:
          fire_red: "Non ama gli attacchi fisici. Preferisce\nattaccare i nemici servendosi dei suoi\npoteri extrasensoriali."
          leaf_green: "Il suo cervello può superare un\nsupercomputer. Il suo quoziente\nintellettivo è di 5.000."
        de:
          fire_red: "Es mag physische Attacken nicht\nbesonders. Vielmehr bevorzugt es\nseine zusätzlichen sensorischen\nKräfte, um Gegner zu besiegen."
          leaf_green: "Das Gehirn dieses POKéMON ist\nleistungsfähiger als ein Computer. Sein IQ\nsoll bei etwa 5000 liegen."
        es:
          fire_red: "No le gustan los ataques físicos. Este\nPOKéMON prefiere hacer uso de sus\npoderes extrasensoriales cuando lucha."
          leaf_green: "Su cerebro puede ganar al de un\nordenador de alta gama. Tiene\nun coeficiente intelectual de 5.000."
machop:
