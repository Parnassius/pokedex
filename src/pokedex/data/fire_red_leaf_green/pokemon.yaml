          leaf_green: "あたまがよくて　しゅうねんぶかい。\nふざけて　しっぽを　つかむと\n１０００ねん　たたられるという。"
        en:
          fire_red: "It has nine long tails and fur that \ngleams gold. It is said to live for \n1,000 years."
          leaf_green: "Very smart and very vengeful. Grabbing\none of its many tails could result in a\n1,000-year curse."
        fr:
          fire_red: "Il a neuf longues queues et une fourrure\nqui brille comme de l’or. On dit qu’il peut\nvivre 1 000 ans."
          leaf_green: "Il est très intelligent et rancunier.\nAttrapez-lui une de ses queues et il\nvous maudira pour 1 000 ans."
        it:
          fire_red: "Dotato di nove code e di una pelliccia\ndorata, si dice che viva 1.000 anni."
          leaf_green: "Molto elegante e vendicativo. Chi gli\nafferra una coda rischia una maledizione\nmillenaria."
        de:
          fire_red: "Es hat neun lange Schweife und sein\nFell glänzt gülden. Man sagt, es soll\n1000 Jahre alt werden."
          leaf_green: "Dieses POKéMON ist intelligent, aber\nrachsüchtig. Sein Schweif kann einen\nschweren Fluch übertragen."
        es:
          fire_red: "Tiene nueve colas y un pelaje de color\ndorado. Dicen que este POKéMON llega\na vivir 1.000 años."
          leaf_green: "Muy inteligente y vengativo. Agarrar una\nde sus colas podría traer 1.000 años\nde mala suerte."
jigglypuff:
