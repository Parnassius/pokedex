      descriptions:
        jp_kana:
          fire_red: "ひとなつこく　せいじつな　せいかく。\nてきには　ほえて　かみつき\nおいはらおう　とする。"
          leaf_green: "なわばり　いしきが　とても　つよい。\nゆだんして　ちかづくと　ほえられ\nかみつかれ　いたいめに　あう。"
        en:
          fire_red: "Very friendly and faithful to people.\nIt will try to repel enemies by barking\nand biting."
          leaf_green: "It is very protective of its territory.\nIt will bark and bite to repel intruders\nfrom its space."
        fr:
          fire_red: "Ce POKéMON est particulièrement\naffectueux et loyal. Il aboie et il mord\npour se débarrasser de ses adversaires."
          leaf_green: "Pour protéger son territoire il aboie et\nmord jusqu’à ce que les intrus s’enfuient."
        it:
          fire_red: "Molto amichevole e fedele verso le\npersone. Allontana i nemici abbaiando\ne mordendoli."
          leaf_green: "Strenuo difensore del suo territorio,\nabbaia e morde per respingere gli intrusi."
        de:
          fire_red: "Es ist sehr freundlich und bleibt den\nMenschen treu. Durch Bellen und\nBeißen versucht es, Gegner zu\nverscheuchen."
          leaf_green: "Dieses POKéMON schützt seinen Lebensraum\nbellend und beißend vor Eindringlingen."
        es:
          fire_red: "Es muy agradable y leal. Para\nahuyentar al enemigo, se pone a\nladrar y a dar bocados."
          leaf_green: "Gran defensor de su territorio. Ladrará y\nmorderá para echar a los intrusos de su\nespacio."
arcanine:
  species_id: 59
  names:
    jp_kana: ウインディ
    en: ARCANINE
    fr: ARCANIN
    it: ARCANINE
    de: ARKANI
    es: ARCANINE
  forms:
    arcanine:
      form_id: 0
      base_stats:
        hp: 90
        attack: 110
        defense: 80
        special_attack: 100
        special_defense: 80
