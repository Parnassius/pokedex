        fr:
          fire_red: "La femelle a un tempérament doux.\nElle émet des cris ultrasoniques\ncapables de déstabiliser ses ennemis."
          leaf_green: "Les cornes de la femelle poussent\nlentement. Elle préfère griffer ou\nmordre pour attaquer."
        it:
          fire_red: "La femmina ha un temperamento mite.\nLancia ultrasuoni capaci di incantare\ni nemici."
          leaf_green: "Il corno della femmina cresce lentamente.\nAma gli attacchi fisici come graffi e\nmorsi."
        de:
          fire_red: "Das Weibchen ist ausgeglichener. Es stößt\nSchreie im Ultraschallwellenbereich aus,\ndie den Gegner verwirren können."
          leaf_green: "Dieses POKéMON zieht kraftvolle Attacken\ndem Einsatz seines relativ kleinen\nGifthorns vor."
        es:
          fire_red: "Las hembras tienen una agradable\ntemperatura. Emiten ondas ultrasónicas\npara confundir al enemigo."
          leaf_green: "El cuerno de la hembra crece lentamente.\nPrefiere ataques físicos como arañar y\nmorder."
