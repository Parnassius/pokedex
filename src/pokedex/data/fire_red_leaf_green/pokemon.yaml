          leaf_green: "ほねが　じょうぶで　にんげんの\n１０００ばい　かたい。たいあたりで\nおおがたトレーラーも　ふっとばす。"
        en:
          fire_red: "Strong, but not too bright, this POKéMON\ncan shatter even a skyscraper with its\ncharging TACKLES."
          leaf_green: "Its massive bones are 1,000 times harder\nthan human bones. Its TACKLE can knock a\nsemitrailer flying."
        fr:
          fire_red: "Costaud mais pas très intelligent, ce\nPOKéMON est capable de détruire un\nimmeuble entier en utilisant sa CHARGE."
          leaf_green: "Avec une ossature 1 000 fois plus\nrésistante que celle de l’homme, ses\ncharges sont dévastatrices."
        it:
          fire_red: "Potente, benché non particolarmente\nbrillante, con AZIONE può distruggere\nanche un grattacielo."
          leaf_green: "Le sue ossa sono 1.000 volte più dure di\nquelle umane. Con AZIONE può far\nvolare un rimorchio."
        de:
          fire_red: "Stark, aber nicht allzu klug, kann\ndieses POKéMON sogar Hochhäuser\nmit seinem TACKLE-Angriff zum\nEinsturz bringen."
          leaf_green: "Der Knochenbau dieses POKéMON ist\ntausendmal härter als der eines Menschen.\nMit seinem Tackle-Angriff kann es sogar\nAnhänger durch die Luft wirbeln."
        es:
          fire_red: "Es muy fuerte, pero no especialmente\nlisto. Es capaz de derribar rascacielos\nusando PLACAJE varias veces."
          leaf_green: "Tiene unos huesos 1.000 veces más\nmacizos que los de las personas.\nEs famoso por su gran fuerza."
rhydon:
