      descriptions:
        jp_kana:
          fire_red: "さむくなると　あちこちから\nレディバが　たくさん　あつまって\nよりそいあい　あたためあう。"
          leaf_green: "むれを　つくらないと　ふあんで\nうごけなくなるほど　おくびょうだが\nなかまがいると　かっぱつに　うごく。"
        en:
          fire_red: "When the weather turns cold, numerous\nLEDYBA gather from everywhere to cluster\nand keep each other warm."
          leaf_green: "It is very timid. It will be afraid to\nmove if it is alone. But it will be active\nif it is in a group."
        fr:
          fire_red: "Quand le temps se rafraîchit, de\nnombreux COXY se réunissent pour\nse tenir mutuellement chaud."
          leaf_green: "De nature timide, il a peur de sortir\nseul. Il est beaucoup plus à l’aise\nquand il est en groupe."
        it:
          fire_red: "Quando inizia a far freddo, i LEDYBA si\nriuniscono da ogni luogo per scaldarsi tra\nloro."
          leaf_green: "È timidissimo. Ha sempre paura di muoversi\nda solo. Ma in gruppo sa diventare molto\nattivo."
        de:
          fire_red: "Wird es kalt, versammeln sich viele\nLEDYBAs von nah und fern, um sich\ngegenseitig Wärme zu schenken."
          leaf_green: "Es ist sehr scheu. Es hat Angst sich zu\nbewegen, wenn es alleine ist. In Gruppen\nist es sehr aktiv."
        es:
          fire_red: "Cuando llega el frío, se reúnen muchos\nLEDYBA de todas partes para darse calor."
          leaf_green: "Es muy tímido. Tiene miedo de moverse\ncuando va solo. Pero si va en grupo, se\nvuelve muy activo."
ledian:
  species_id: 166
  names:
    jp_kana: レディアン
