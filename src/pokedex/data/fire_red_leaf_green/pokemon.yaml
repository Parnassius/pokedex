        hp: 80
        attack: 82
        defense: 83
        special_attack: 100
        special_defense: 100
        speed: 80
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 2
        special_defense: 1
        speed: 0
      types:
        - grass
        - poison
      egg_groups:
        - monster
        - grass
      abilities:
        - overgrow
      descriptions:
        jp_kana:
          fire_red: "はなから　うっとりする　かおりが\nただよい　たたかうものの\nきもちを　なだめてしまう。"
          leaf_green: "たいようエネルギーを　えいようにして\nおおきなハナが　ひらく。ひなたに\nひきよせられるように　いどうする。"
        en:
          fire_red: "A bewitching aroma wafts from its flower.\nThe fragrance becalms those engaged in\na battle."
          leaf_green: "Its plant blooms when it is absorbing\nsolar energy. It stays on the move to\nseek sunlight."
        fr:
          fire_red: "Une douce senteur émane de sa plante.\nCette fragrance calme tous ceux qui sont\nengagés dans un combat."
          leaf_green: "Sa plante donne des fleurs quand elle\nabsorbe les rayons du soleil. Il migre\nsouvent vers les endroits ensoleillés."
        it:
          fire_red: "Dal suo fiore si dipana una fragranza\ncapace di placare gli animi di chi è\nimpegnato nella lotta."
          leaf_green: "La pianta fiorisce assorbendo energia\nsolare. È sempre in movimento in cerca\ndi luce."
        de:
          fire_red: "Die Blume verströmt einen zauberhaften\nDuft. Er beschwichtigt erhitzte Kämpfer."
          leaf_green: "Dieses POKéMON folgt der Sonne. Die\nPflanze auf seinem Rücken absorbiert\nSolarenergie."
        es:
          fire_red: "La flor que tiene en el lomo libera un\ndelicado aroma. En combate, este aroma\ntiene un efecto relajante."
          leaf_green: "La planta florece cuando absorbe\nenergía solar, por eso le obliga a buscar\nluz del Sol."
charmander:
  species_id: 4
  names:
    jp_kana: ヒトカゲ
