        jp_kana:
          fire_red: "めしべが　はなつ　とてつもなく\nくさい　においは　２キロさきまで\nとどき　きを　うしなわせる。"
          leaf_green: "すこしずつ　しみだしてくるのは\nよだれではない。みつのようなしるで\nえものを　おびきよせているのだ。"
        en:
          fire_red: "Its pistils exude an incredibly foul odor.\nThe horrid stench can cause fainting at a\ndistance of 1.25 miles."
          leaf_green: "The fluid that oozes from its mouth isn’t\ndrool. It is a nectar that is used to\nattract prey."
        fr:
          fire_red: "Ses pistils sécrètent une odeur\nincroyablement fétide. Cette senteur\népouvantable peut faire perdre\nconnaissance à ses adversaires."
          leaf_green: "Ce n’est pas de la bave qui s’écoule de\nsa bouche, mais un nectar qu’il utilise\npour appâter sa proie."
        it:
          fire_red: "I pistilli emanano un puzzo orribile,\ncapace di fare svenire chi si trova\nin un raggio di due chilometri."
          leaf_green: "Il fluido che gli esce dalla bocca non è\nbava. È un nettare usato per attirare le\nprede."
        de:
          fire_red: "Sein Stempel sondert einen unglaublich\nfaulen Gestank ab. Dieser stechende\nGestank kann Gegner in bis zu 2 km\nEntfernung bewusstlos machen."
          leaf_green: "Dieses POKéMON sabbert nicht. Es sondert\neinen speziellen Nektar ab, um seine Beute\nanzulocken."
        es:
          fire_red: "Libera un fétido olor por los pistilos.\nEl fuerte hedor acaba con cualquier rival\nque se encuentre a 2 km de distancia."
          leaf_green: "El fluido que le cae de la boca no es\nla saliva, sino un néctar que usa para\natraer a su presa."
vileplume:
  species_id: 45
