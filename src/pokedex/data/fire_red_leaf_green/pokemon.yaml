        jp_kana:
          fire_red: "りょうほうの　めが　そんざいしない。\nくちから　ちょうおんぱを　だして\nくらやみを　とびまわる。"
          leaf_green: "くらい　ばしょに　しゅうだんで\nはっせいする。ちょうおんぱを　だして\nターゲットに　ちかづいていく。"
        en:
          fire_red: "It has no eyes. Instead, it relies on\nits ultrasonic cries for echo location to\nflit about in darkness."
          leaf_green: "It forms colonies in perpetually dark \nplaces and uses ultrasonic waves to  \nidentify and approach targets."
        fr:
          fire_red: "Comme il ne possède pas d’yeux, il\nn’utilise que ses ultrasons pour se\ndéplacer dans les ténèbres."
          leaf_green: "Il vit en colonie dans les régions\npeu éclairées. Il s’oriente grâce aux\nultrasons."
        it:
          fire_red: "Non ha occhi, ma si sposta agilmente nella\nnotte emettendo ultrasuoni la cui eco\nlo avverte degli ostacoli."
          leaf_green: "Forma colonie in luoghi oscuri. Usa\nultrasuoni per identificare e avvicinarsi\nai suoi obiettivi."
        de:
          fire_red: "Es hat keine Augen. Zur Orientierung\nnutzt es seine Ultraschallwellen-Schreie,\num in der Dunkelheit zu fliegen."
          leaf_green: "Dieses POKéMON lebt in Kolonien an dunklen\nOrten. Es identifiziert und ortet Ziele mit\nUltraschall."
        es:
          fire_red: "No tiene ojos. Se guía por las ondas\nultrasónicas que emite. El eco le indica\npor dónde tiene que ir en la oscuridad."
          leaf_green: "Forma colonias en lugares oscuros. Usa\nultrasonido para identificar y acercarse\na los objetivos."
golbat:
