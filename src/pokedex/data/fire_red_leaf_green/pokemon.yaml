      abilities:
        - swift_swim
        - water_veil
      descriptions:
        jp_kana:
          fire_red: "ドリルのように　とがっている\nツノで　いわはだを　くりぬき\nじぶんの　すを　つくっている。"
          leaf_green: "あきが　くると　さんらんの　ために\nながれに　さからって　ちからづよく\nかわを　およぐ　すがたが　みられる。"
        en:
          fire_red: "The horn on its head is sharp like a\ndrill. It bores a hole in a boulder to\nmake its nest."
          leaf_green: "In the autumn spawning season, they can\nbe seen swimming powerfully up rivers and\ncreeks."
        fr:
          fire_red: "La corne sur sa tête est plus dure\nque le foret d’une perceuse. Avec cette\ncorne, il fait des trous dans les rochers\npour y faire son nid."
          leaf_green: "Pendant la saison des amours, on peut le\nvoir nager dans les rivières et les lacs."
        it:
          fire_red: "Il corno sul capo è acuminato come la\npunta di un trapano. Per fare il nido\nscava un buco nella roccia."
          leaf_green: "In autunno, quando si riproduce, può\nessere visto risalire impetuoso fiumi e\ntorrenti."
        de:
          fire_red: "Das Horn an seinem Kopf ist so\nscharf wie ein Bohrer. Damit bohrt\nes ein Loch in einen Felsen und\nmacht darin sein Nest."
          leaf_green: "Im Herbst, zur Paarungszeit, sieht man\ndiese POKéMON kraftvoll Bäche und Flüsse\nhinaufschwimmen."
        es:
          fire_red: "El cuerno que tiene en la cabeza está\ntan afilado como un taladro. Suele usarlo\npara horadar rocas y construir su nido."
          leaf_green: "En otoño, cuando se reproducen, se les\npuede ver nadando con energía por ríos\ny arroyos."
staryu:
  species_id: 120
