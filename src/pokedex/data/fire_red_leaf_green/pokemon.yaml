          leaf_green: "Quand il est furieux, il devient si chaud\nque tout ce qui le touche s’enflamme\ninstantanément."
        it:
          fire_red: "Ha una devastante mossa segreta. Può\nsfregare la pelliccia infuocata causando\nforti esplosioni."
          leaf_green: "Quando è davvero arrabbiato diventa così\ncaldo che qualsiasi cosa tocchi va subito\na fuoco."
        de:
