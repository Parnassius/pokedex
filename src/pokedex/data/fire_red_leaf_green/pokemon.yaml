      descriptions:
        jp_kana:
          fire_red: "べつめい　アルキメンデス。\nよるに　なると　２ほんの　ねっこで\n３００メートルも　あるくという。"
          leaf_green: "ひるまは　かおを　じめんに　うめて\nあまり　うごかない。よるに　なると\nたねを　まきながら　あるきまわる。"
        en:
          fire_red: "Its scientific name is “Oddium Wanderus.”\nAt night, it is said to walk nearly 1,000\nfeet on its two roots."
          leaf_green: "During the day, it keeps its face buried\nin the ground. At night, it wanders around\nsowing its seeds."
        fr:
          fire_red: "Son nom scientifique est «Oddium\nWanderus». Lorsqu’il fait nuit,\nil se déplace à l’aide de ses racines\npour disséminer ses graines."
          leaf_green: "Pendant la journée il se cache sous\nterre. Il erre dehors toute la nuit pour\nplanter ses graines."
        it:
          fire_red: "Nome scientifico: “Oddium Viandantis”.\nPercorre fino a 300 m in una notte\nsulle due radici fatte a piede."
          leaf_green: "Di giorno tiene la testa sotto terra. Di\nnotte vaga spargendo le sue sementi."
        de:
          fire_red: "Sein wissenschaftlicher Name lautet:\n„Oddium Wanderus“.\nNachts soll es knapp 300 Meter auf\nseinen zwei Wurzeln zurücklegen."
          leaf_green: "Dieses POKéMON verbringt den Tag unter\nder Erde. Nachts wandert es umher und sät\nSamen aus."
        es:
          fire_red: "Su nombre científico es “Oddium\nWanderus”. Dicen que usa las raíces para\ndesplazarse. Llega a hacerse 300 m."
          leaf_green: "Durante el día, entierra la cara en\nel suelo, y de noche, va plantando\nsemillas por ahí."
gloom:
