          leaf_green: "クロールや　バタフライが　とくいで\nオリンピックの　せんしゅでも　\nぐんぐんと　おいぬいていく。"
        en:
          fire_red: "An adept swimmer, it knows the front\ncrawl, butterfly, and more. It is faster\nthan the best human swimmers."
          leaf_green: "A swimmer adept at both the front crawl\nand breaststroke. Easily overtakes the\nbest human swimmers."
        fr:
          fire_red: "Il passe tout son temps à nager. Il\nconnaît le crawl, la nage papillon et\nbien d’autres nages. Il est plus rapide\nque les plus grands champions humains."
          leaf_green: "Excellent nageur, il pratique le crawl ou\nla nage papillon mieux qu’un champion\nolympique."
        it:
          fire_red: "Nuotatore provetto, conosce diversi stili,\ntra cui il crawl e la farfalla. È più\nrapido dei migliori nuotatori umani."
          leaf_green: "Esperto nuotatore di rana, crawl e altri\nstili, supera facilmente i migliori\nnuotatori umani."
        de:
          fire_red: "Ein formidabler Schwimmer. Es kann\nBrustschwimmen, Freistil und\nSchmetterling. Kein Mensch kann\nschneller schwimmen."
          leaf_green: "Dieses POKéMON ist ein meisterhafter\nSchwimmer. Seine Techniken schlagen selbst\nOlympiasieger."
        es:
          fire_red: "Es un nadador nato. Sabe nadar a crol\ny a mariposa entre otros estilos, y es más\nrápido que los nadadores profesionales."
          leaf_green: "Experto nadador tanto a braza como a\ncrol. Gana fácilmente a los nadadores\nprofesionales."
