        jp_kana:
          fire_red: "あいて　めがけて　とっしんするとき\nせなかの　たいもうが　さかだつ。\nおとに　ものすごく　びんかん。"
          leaf_green: "ながい　たいもうに　おおわれて\nめのまえの　ようすが　わからず\nひたすらに　とっしんを　くりかえす。"
        en:
          fire_red: "If it charges at an enemy, the hairs on\nits back stand up straight. It is very\nsensitive to sound."
          leaf_green: "Because the long hair all over its body\nobscures its sight, it just keeps charging\nrepeatedly."
        fr:
          fire_red: "S’il charge un ennemi, les poils de son\ndos se dressent. Il est très sensible au\nbruit."
          leaf_green: "Ses yeux sont masqués par ses longs\npoils. Il ne voit rien et se déplace en\nchargeant."
        it:
          fire_red: "Quando carica il nemico, i peli gli si\nrizzano sul dorso. È molto sensibile ai\nsuoni."
          leaf_green: "Poiché il lungo pelo sul suo corpo gli\nimpedisce di vedere, non fa che caricare\nil nemico senza tregua."
        de:
          fire_red: "Beim Angriff auf einen Gegner stellen sich\nseine Rückenhaare auf. Es hört\naußergewöhnlich gut."
          leaf_green: "Da sein haariges Fell seine Sicht enorm\nbeeinträchtigt, greift es ständig an, um\nden Gegner zu treffen."
        es:
          fire_red: "Si carga contra un enemigo,\nlos pelos del lomo se le erizarán.\nEs muy sensible al ruido."
          leaf_green: "Como su largo vello corporal le impide\nver con claridad, sigue atacando\nrepetidamente."
corsola:
  species_id: 222
  names:
