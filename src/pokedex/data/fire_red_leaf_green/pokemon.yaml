          leaf_green: "つぶらな　ひとみが　ゆれるとき\nねむたくなるような　ふしぎで\nきもちのいい　うたを　うたう。"
        en:
          fire_red: "It captivates foes with its huge, round\neyes, then lulls them to sleep by singing\na soothing melody."
          leaf_green: "When its huge eyes waver, it sings a\nmysteriously soothing melody that lulls\nits enemies to sleep."
        fr:
          fire_red: "Il hypnotise ses ennemis grâce à ses\ngrands yeux avant de les plonger dans\nun profond sommeil en chantant une\ndouce mélopée."
          leaf_green: "Quand ses yeux s’illuminent, il chante une\nmystérieuse berceuse pour endormir ses\nennemis."
        it:
          fire_red: "Cattura l’attenzione dei nemici grazie agli\nenormi occhi rotondi, per poi farli\naddormentare con una dolce ninnananna."
          leaf_green: "Se i suoi occhi si illuminano, canta una\nmelodia misteriosa che addormenta i suoi\nnemici."
        de:
          fire_red: "Es fesselt die Gegner mit seinen\ngroßen, runden Augen und versetzt\nsie in Schlaf, indem es eine\nberuhigende Melodie singt."
          leaf_green: "Wenn seine Augen aufleuchten, dann singt\ndieses POKéMON ein Lied, das seine Gegner\nin Schlaf versetzt."
        es:
          fire_red: "Cautiva con la mirada a su enemigo y hace\nque se quede profundamente dormido\nmientras entona una dulce melodía."
          leaf_green: "Cuando sus ojos se iluminan, canta una\nsecreta melodía con la que duerme a sus\nenemigos."
