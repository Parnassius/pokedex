        jp_kana:
          fire_red: "シッポの　さきっぽが　うきぶくろの\nやくわりを　はたすので　はげしい\nながれでも　おぼれたりしない。"
          leaf_green: "しっぽの　さきには　みずよりも\nかるい　あぶらが　つまっているから\nおぼれることなく　かわをすすめる。"
        en:
          fire_red: "The end of its tail serves as a buoy that\nkeeps it from drowning, even in a vicious\ncurrent."
          leaf_green: "The tip of its tail, which contains oil\nthat is lighter than water, lets it swim\nwithout drowning."
        fr:
          fire_red: "Le bout de sa queue lui sert de bouée,\nl’empêchant de se noyer même par fort\ncourant."
          leaf_green: "Le bout de sa queue est rempli d’une\nhuile plus légère que l’eau, ce qui lui\npermet de ne pas couler."
        it:
          fire_red: "La punta della coda funge da boa,\nimpedendogli di affogare anche\ntra correnti fortissime."
          leaf_green: "La punta della coda contiene un olio più\nleggero dell’acqua, che gli permette di\nnuotare senza affogare."
        de:
          fire_red: "Da es am Schwanzende eine Art Boje trägt,\nkann es selbst bei der stärksten Strömung\nnicht ertrinken."
          leaf_green: "Da seine Schwanzspitze Öl enthält, das\nleichter als Wasser ist, kann es schwimmen,\nohne unterzugehen."
        es:
          fire_red: "Usa el extremo de su cola como boya,\nasí no se ahoga aunque lo arrastre\nuna fuerte corriente."
          leaf_green: "La punta de la cola, que contiene aceite,\nle permite nadar sin miedo a ahogarse."
azumarill:
