        - chlorophyll
      descriptions:
        jp_kana:
          fire_red: "なにかの　たまごの　ようだが\nじつは　しょくぶつの　タネにちかい\nいきもの　であることが　わかった。"
          leaf_green: "たまごだと　おもって　さわると\nなかまが　どんどん　あつまってきて\nしゅうだん　こうげきに　あう。"
        en:
          fire_red: "Even though it appears to be eggs of\nsome sort, it was discovered to be a life-\nform more like plant seeds."
          leaf_green: "It is often mistaken for eggs. When\ndisturbed, they quickly gather and attack\nin swarms."
        fr:
          fire_red: "Même s’il ressemble à des œufs,\nce POKéMON appartient à la famille\ndes végétaux."
          leaf_green: "Souvent pris pour des œufs, ils ont\ntendance à se regrouper pour attaquer."
        it:
          fire_red: "Nonostante sia formato da uova, si è\nscoperto che la sua struttura è più\nsimile a quella dei semi."
          leaf_green: "Molto simili alle uova, se disturbati si\nraggruppano in fretta attaccando\nall’unisono."
        de:
          fire_red: "Auch wenn sein Erscheinungsbild eher\nEiern ähnelt, wurde entdeckt, dass es\nmehr mit pflanzenähnlichen Wurzeln\nin Zusammenhang steht."
          leaf_green: "Diese POKéMON werden oftmals für Eier\ngehalten. Bei Gefahr bilden sie Rudel, die\nattackieren."
        es:
          fire_red: "Aunque los huevos que lo constituyen\nparecen de verdad, se ha visto que son\ncomo semillas."
          leaf_green: "Son muy parecidos a los huevos. Cuando\nse les molesta, se agrupan y atacan todos\njuntos."
exeggutor:
  species_id: 103
  names:
    jp_kana: ナッシー
    en: EXEGGUTOR
    fr: NOADKOKO
    it: EXEGGUTOR
    de: KOKOWEI
