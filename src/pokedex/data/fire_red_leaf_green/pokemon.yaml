          leaf_green: "くうきちゅうの　マイナスイオンを\nすいこんで　やく１００００ボルトの\nでんきを　はきだすことができる。"
        en:
          fire_red: "If it is angered or startled, the fur all\nover its body bristles like sharp needles\nthat pierce foes."
          leaf_green: "It accumulates negative ions in the\natmosphere to blast out 10,000-volt\nlightning bolts."
        fr:
          fire_red: "S’il est irrité ou attaqué, toute la\nfourrure de son corps se dresse comme\ndes aiguilles pour percer ses ennemis."
          leaf_green: "Il se charge d’électricité statique pour\nenvoyer des décharges de 10 000 volts."
        it:
          fire_red: "Se si arrabbia o è sorpreso, la pelliccia\ngli si rizza trasformandosi in aghi che\ninfilzano il nemico."
          leaf_green: "Accumula ioni negativi nell’atmosfera per\nlanciare saette da 10.000 volt."
        de:
          fire_red: "Wenn es wütend oder perplex ist,\nähnelt sein Fell scharfen Nadeln, die\nGegner stechen."
          leaf_green: "Dieses POKéMON entzieht der Atmosphäre\nIonen, die es in Blitze von 10 000 Volt\nStärke umwandelt."
        es:
          fire_red: "Si se le enfada o asusta, se le eriza\nel pelaje. Cada pelo se le convierte en\nuna afilada púa que hace trizas al rival."
          leaf_green: "Acumula iones negativos de la atmósfera\npara lanzar rayos de 10.000 voltios de\npotencia."
flareon:
