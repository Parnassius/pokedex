          leaf_green: "ツノの　まがりぐあいが　まわりの\nくうきの　ながれを　びみょうにかえ\nふしぎな　くうかんを　つくりだす。"
        en:
          fire_red: "Those who stare at its antlers will\ngradually lose control of their senses\nand be unable to stand."
          leaf_green: "Its curved antlers subtly change the flow\nof air to create a strange space where\nreality is distorted."
        fr:
          fire_red: "Ceux qui observent ses bois perdront\nprogressivement leurs sens et ne\npourront plus se tenir debout."
          leaf_green: "Ses bois tordus changent le flot de l’air\net créent une distorsion spatiale dans le\nmonde réel."
        it:
          fire_red: "Chi osserva le sue corna ramificate perde\ngradualmente i sensi e la capacità di\nstare in piedi."
          leaf_green: "Le corna ramificate modificano le correnti\nd’aria, creando una strana zona di\ndistorsione della realtà."
        de:
          fire_red: "Der Anblick seines Geweihs lässt den\nBetrachter ohnmächtig werden und zu Boden\nsinken."
          leaf_green: "Sein gebogenes Geweih generiert via\nLuftänderung einen Raum, in dem die\nWirklichkeit verzerrt wird."
        es:
          fire_red: "Todo aquél que se quede mirando su\ncornamenta, perderá el control y el\nequilibrio."
          leaf_green: "Su cornamenta cambia el flujo del aire\npara crear un espacio de realidad\ndistorsionada."
