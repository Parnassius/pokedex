          fire_red: "たかい　きの　うえで　くらしている。\nえだから　えだへ　とびうつるとき\nシッポで　たくみに　バランスをとる。"
          leaf_green: "ちからづよい　シッポだけで\nきの　えだに　ぶらさがって\nからだを　ささえることが　できる。"
        en:
          fire_red: "It lives atop tall trees. When leaping\nfrom branch to branch, it deftly uses its\ntail for balance."
          leaf_green: "Its tail is so powerful that it can use it\nto grab a tree branch and hold itself up\nin the air."
        fr:
          fire_red: "Il vit sur les plus hautes cimes. Sautant\nde branche en branche, sa queue lui\nassure un bon équilibre."
          leaf_green: "Sa queue est si forte qu’il peut l’utiliser\npour se suspendre aux branches des\narbres."
        it:
          fire_red: "Vive sugli alberi alti. Usando abilmente\nla coda, mantiene l’equilibrio quando\nsalta di ramo in ramo."
          leaf_green: "La sua coda è così forte che può\nappendersi ad un albero e rimanere\nsospeso."
        de:
          fire_red: "Es lebt in den Kronen großer Bäume. Es\nhüpft von Ast zu Ast und balanciert mit\nseinem Schwanz."
          leaf_green: "Sein Schweif ist so kräftig, dass es sich\nstundenlang damit an einem Ast in der Luft\nhalten kann."
        es:
          fire_red: "Vive en lo alto de los árboles. Cuando\nsalta de rama en rama, usa la cola para\nequilibrarse."
          leaf_green: "Tiene una cola tan potente que puede\nusarla para agarrarse a la rama de un\nárbol y no caerse."
sunkern:
