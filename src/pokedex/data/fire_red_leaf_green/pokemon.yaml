          leaf_green: "たいないに　いろいろな　どくガスが\nたまっているため　ときどき\nだいばくはつを　おこすことも。"
        en:
          fire_red: "Its thin, balloon-like body is inflated by\nhorribly toxic gases. It reeks when it is\nnearby."
          leaf_green: "Because it stores several kinds of toxic\ngases in its body, it is prone to\nexploding without warning."
        fr:
          fire_red: "Son corps très fin en forme de ballon\nest rempli d’un horrible gaz toxique.\nEssayez de respirer par la bouche si\nvous vous trouvez près de lui."
          leaf_green: "Son corps, constitué de divers gaz\ntoxiques et instables, peut exploser\nà tout instant."
        it:
          fire_red: "Il suo corpo fatto a pallone è pieno di\norribili sostanze gassose, che emanano\nun puzzo disgustoso."
          leaf_green: "Siccome accumula vari tipi di gas tossici\nnel suo corpo, può esplodere senza\npreavviso."
        de:
          fire_red: "Sein dünner, ballonartiger Körper\nist mit schrecklichem Giftgas gefüllt.\nEs verbreitet einen heftigen\nGestank, wenn es in der Nähe ist."
          leaf_green: "Der Körper dieses POKéMON enthält viele\nGase. Es neigt dazu, ohne Vorwarnung zu\nexplodieren."
        es:
          fire_red: "Tiene forma de globo y es muy ligero.\nEstá compuesto por gases tóxicos, y\napesta."
          leaf_green: "Como encierra varios tipos de gases\ntóxicos en su cuerpo, suele explosionar\nsin previo aviso."
weezing:
