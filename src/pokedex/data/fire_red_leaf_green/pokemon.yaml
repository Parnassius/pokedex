        jp_kana:
          fire_red: "かっぱつで　あそびずきな　せいかく。\nなついてくれるので　いっしょに\nあそびたがる　じょせいも　おおい。"
          leaf_green: "こわい　かおつきだが　こころねは\nとても　やさしく　じょせいにも\nだいにんきの　ポケモン。"
        en:
          fire_red: "It has an active, playful nature. Many\nwomen like to frolic with it because of\nits affectionate ways."
          leaf_green: "Although it looks frightening, it is\nactually kind and affectionate. It is very\npopular among women."
        fr:
          fire_red: "Il est d’une nature joviale. De nombreuses\nfemmes l’apprécient pour sa gentillesse."
          leaf_green: "Bien qu’il ait l’air menaçant, il est gentil\net très affectueux. Il est très populaire\nchez les femmes."
        it:
          fire_red: "Ha uno spirito attivo e giocoso. Per i\nsuoi modi affettuosi, è apprezzato\nsoprattutto dalle donne."
          leaf_green: "Nonostante l’aspetto spaventoso è in\nrealtà caro e affettuoso. È molto\npopolare tra le donne."
        de:
          fire_red: "Es ist von Natur aus verspielt. Es tollt\nmit vielen Frauen herum, da es ihnen\nzugeneigt ist."
          leaf_green: "Obwohl es Angst einflößend aussieht, ist\nes sehr liebevoll und bei Frauen sehr\nbeliebt."
        es:
          fire_red: "Muy travieso por naturaleza, a muchas\nmujeres les gusta jugar con él porque\nes muy cariñoso."
          leaf_green: "Aunque parezca aterrador, en realidad es\namable y afectuoso. Es muy popular entre\nlas mujeres."
