          leaf_green: "ハネと　しっぽを　すばやく　うごかし\nまえを　むいたまま　うしろへ\nおよぐことも　できる　ポケモン。"
        en:
          fire_red: "Its body bristles with sharp spikes.\nCarelessly trying to touch it could cause\nfainting from the spikes."
          leaf_green: "It is capable of swimming backwards by\nrapidly flapping its winglike pectoral fins\nand stout tail."
        fr:
          fire_red: "Son corps est recouvert de pointes\ntranchantes. Il faut la plus grande\nattention pour le saisir, sous peine\nde se faire piquer."
          leaf_green: "Il peut nager à l’envers en agitant\nses petites nageoires pectorales."
        it:
          fire_red: "Ha il corpo ispido di aculei pungenti.\nUn contatto fortuito può causare\nuno svenimento."
          leaf_green: "Capace di nuotare all’indietro agitando\nrapidamente le pinne pettorali e la\nrobusta coda."
        de:
          fire_red: "Sein Körper ist mit scharfen Stacheln\ngespickt. Wenn man sorglos ist und es\nberührt, kann man durch die Stacheln\nbewusstlos werden."
          leaf_green: "Dieses POKéMON kann rückwärts schwimmen,\nindem es Flügel und Schwanz als Flossen\neinsetzt."
        es:
          fire_red: "Las afiladas púas que le recubren\nel cuerpo se le erizan y pueden causar\nel debilitamiento con sólo tocarlo."
          leaf_green: "Puede nadar hacia atrás moviendo\nrápidamente las aletas pectorales\ny la robusta cola que tiene."
goldeen:
