      descriptions:
        jp_kana:
          fire_red: "なかまだけで　わかりあえる\nなきごえで　おたがいの　いちを\nたしかめながら　えものをおいつめる。"
          leaf_green: "なかまに　れんらく　するときと\nえものを　おいつめるときでは\nなきごえの　しゅるいが　ちがうのだ。"
        en:
          fire_red: "To corner prey, they check each other’s\nlocation using barks that only they can\nunderstand."
          leaf_green: "It uses different kinds of cries for\ncommunicating with others of its kind and\nfor pursuing prey."
        fr:
          fire_red: "Pour attraper leur proie, ils vérifient la\nposition de chacun par des aboiements\nqu’eux seuls comprennent."
          leaf_green: "Il émet toutes sortes de cris pour\ncommuniquer avec ses semblables\nou pour chasser une proie."
        it:
          fire_red: "Per circondare la preda, si coordinano\ncomunicando con guaiti che solo\nloro possono decifrare."
          leaf_green: "Usa versi differenti per comunicare con\naltri della sua specie e per inseguire la\npreda."
        de:
          fire_red: "Sie treiben ihre Beute in die Enge und\norientieren sich dabei anhand ihres\nBellens, das nur sie verstehen."
          leaf_green: "Sein Ruf bei der Beutejagd unterscheidet\nsich von dem Ruf, wenn es mit Artgenossen\nkommuniziert."
        es:
          fire_red: "Para arrinconar a su presa, comprueban\nsus posiciones con ladridos que sólo ellos\nentienden."
          leaf_green: "Usa diferentes tipos de gritos para\ncomunicarse con los de su especie\no para seguir a su presa."
houndoom:
