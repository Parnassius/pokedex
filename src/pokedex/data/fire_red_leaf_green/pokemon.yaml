      descriptions:
        jp_kana:
          fire_red: "キバは　ながくて　するどい。\nいっしょう　のびつづけるので\nかたい　モノを　かじって　けずる。"
          leaf_green: "なんでも　かじって　こうげき。\nちいさいうえに　うごきが　すばやく\nいろんな　ところに　しゅつぼつする。"
        en:
          fire_red: "Its fangs are long and very sharp.\nThey grow continuously, so it gnaws on\nhard things to whittle them down."
          leaf_green: "Bites anything when it attacks. Small and\nvery quick, it is a common sight in many\nplaces."
        fr:
          fire_red: "Les dents de RATTATA sont longues\net tranchantes. Comme elles poussent\nsans arrêt, il doit ronger tout ce qu’il\ntrouve pour pouvoir les tailler."
          leaf_green: "Sa morsure est très puissante. Petit et\nrapide, on en voit un peu partout."
        it:
          fire_red: "I denti affilati gli continuano a crescere,\ncostringendolo a limarseli\nmordicchiando oggetti molto duri."
          leaf_green: "Quando attacca morde tutto. Piccolo e\nveloce si vede comunemente in molti\nluoghi."
        de:
          fire_red: "Seine Reißzähne sind lang und scharf.\nDa sie ständig wachsen, nagt es immerzu\nan etwas, um sie abzuwetzen."
          leaf_green: "Ein kleines, sehr wendiges und bissiges\nPOKéMON, welches in vielen Gegenden\nheimisch ist."
        es:
          fire_red: "Tiene unos largos y afilados colmillos\nque no dejan de crecer. Le resultan\nmuy útiles para destruir cosas."
          leaf_green: "Cuando ataca lo muerde todo. Pequeño y\nmuy rápido, es muy fácil de ver en muchos\nsitios."
raticate:
  species_id: 20
  names:
