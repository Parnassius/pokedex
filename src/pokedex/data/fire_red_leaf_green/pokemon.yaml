      types:
        - fighting
      egg_groups:
        - human_like
      abilities:
        - limber
      descriptions:
        jp_kana:
          fire_red: "あしが　じゆうに　のびちぢみして\nとおく　はなれている　ばあいでも\nあいてを　けりあげることが　できる。"
          leaf_green: "いそいで　はしるとき　だんだん\nあしが　のびていって　ものすごい\nおおまたに　なって　すすむ。"
        en:
          fire_red: "The legs freely contract and stretch.\nThe stretchy legs allow it to hit a\ndistant foe with a rising kick."
          leaf_green: "When in a hurry, its legs lengthen\nprogressively. It runs smoothly with\nextra-long, loping strides."
        fr:
          fire_red: "KICKLEE peut rétracter et allonger ses\njambes à sa guise. La formidable allonge\ndont il dispose lui donne souvent\nl’avantage en plein combat."
          leaf_green: "S’il est pressé, ses jambes s’allongent\nprogressivement. Il court alors très\nrapidement."
        it:
          fire_red: "Le zampe gli si accorciano e allungano a\npiacere. Con le gambe allungate, con un\ncalcio può colpire anche nemici distanti."
          leaf_green: "Quando è di fretta gli si allungano le\nzampe. Corre agilmente con falcate\nmorbide e lunghissime."
        de:
          fire_red: "Die Beine ziehen und strecken sich\nunabhängig voneinander. Mit seinen\ndehnbaren Beinen kann es einen\nentfernten Gegner treffen."
          leaf_green: "Wenn dieses POKéMON in Eile ist, werden\nseine Beine länger. Es läuft mit weiten\nSchritten."
        es:
          fire_red: "Encoge y estira las patas a su antojo.\nCuando las estira, es capaz de propinar\nuna buena patada al enemigo."
          leaf_green: "Cuando tiene prisa, extiende las patas.\nCorre suavemente dando enormes\nzancadas."
hitmonchan:
  species_id: 107
  names:
    jp_kana: エビワラー
