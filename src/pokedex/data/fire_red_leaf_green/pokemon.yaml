      base_stats:
        hp: 39
        attack: 52
        defense: 43
        special_attack: 60
        special_defense: 50
        speed: 65
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - fire
      egg_groups:
        - monster
        - dragon
      abilities:
        - blaze
      descriptions:
        jp_kana:
          fire_red: "うまれたときから　しっぽに　ほのおが\nともっている。ほのおが　きえたとき\nその　いのちは　おわって　しまう。"
          leaf_green: "あついものを　このむ　せいかく。\nあめに　ぬれると　しっぽの　さきから\nけむりが　でるという。"
        en:
          fire_red: "From the time it is born, a flame burns\nat the tip of its tail. Its life would end\nif the flame were to go out."
          leaf_green: "It has a preference for hot things.\nWhen it rains, steam is said to spout from\nthe tip of its tail."
        fr:
          fire_red: "Depuis sa naissance, une petite flamme\nbrûle au bout de sa queue. Si cette\nflamme s’éteint, la vie de ce POKéMON\ns’éteindra elle aussi."
          leaf_green: "Il préfère les endroits chauds. En cas\nde pluie, de la vapeur se forme autour\nde sa queue."
        it:
          fire_red: "Dalla nascita una fiamma gli arde sulla\npunta della coda. Se si spegnesse,\nper lui sarebbe la fine."
          leaf_green: "Ama i luoghi caldi. Si dice che quando\npiove gli esca vapore dalla punta della\ncoda."
        de:
          fire_red: "Von Geburt an brennt die Flamme auf\nseiner Schwanzspitze. Sobald sie\nerlischt, erlischt auch sein Lebenslicht."
          leaf_green: "Dieses POKéMON bevorzugt heiße\nLebensräume. Bei Regen dampft die\nSchwanzspitze von GLUMANDA."
        es:
          fire_red: "Este POKéMON nace con una llama en la\npunta de la cola. Si la llama se apagara,\nel POKéMON se debilitaría."
          leaf_green: "Prefiere los sitios cálidos. Dicen que\ncuando llueve le sale vapor de la punta\nde la cola."
charmeleon:
  species_id: 5
