          leaf_green: "まんげつのよる　かげが　かってに\nうごきだして　わらうのは\nゲンガーの　しわざに　ちがいない。"
        en:
          fire_red: "It is said to emerge from darkness to\nsteal the lives of those who become lost\nin mountains."
          leaf_green: "On the night of a full moon, if shadows\nmove on their own and laugh, it must be\nGENGAR’s doing."
        fr:
          fire_red: "On dit que les ECTOPLASMA surgissent\ndes ténèbres pour prendre la vie des\npersonnes égarées en montagne."
          leaf_green: "Les nuits de pleine lune, il imite l’ombre\ndes passants et se moque de leur effroi."
        it:
          fire_red: "Si dice che emerga dall’oscurità per\nsottrarre la vita di chi si è perso tra\nle montagne."
          leaf_green: "Se in una notte di luna piena si scorgono\nombre che danzano e ridono, si tratta\ndi GENGAR."
        de:
          fire_red: "Man sagt, es ist aus Dunkelheit\nentstanden, um denjenigen, die sich in\nden Bergen verirrt haben, das Leben\nzu rauben."
          leaf_green: "Dieses POKéMON erschreckt bei Vollmond\ngerne Passanten mit Furcht erregenden\nSchattenspielen."
        es:
          fire_red: "Dicen que sale de la oscuridad para\nrobarle el alma a los que se pierden\npor las montañas."
          leaf_green: "En luna llena, a este POKéMON le gusta\nimitar las sombras de la gente y burlarse\nde sus miedos."
onix:
  species_id: 95
