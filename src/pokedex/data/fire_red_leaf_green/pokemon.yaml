      descriptions:
        jp_kana:
          fire_red: "とおくまで　みれるように　シッポを\nつかってたつ。てきを　みつけると\nおおごえで　なかまに　しらせる。"
          leaf_green: "シッポを　たてて　すこしでも\nとおくの　ようすを　しらべている\nけいかいしんが　つよい　ポケモン。"
        en:
          fire_red: "It stands on its tail so it can see a long\nway. If it spots an enemy, it cries loudly\nto warn its kind."
          leaf_green: "A very cautious POKéMON, it raises itself\nup using its tail to get a better view of\nits surroundings."
        fr:
          fire_red: "Il se tient dressé sur sa queue pour\nvoir les ennemis arriver de loin. Au\nmoindre danger, il crie pour avertir\nses semblables."
          leaf_green: "C’est un POKéMON très prudent, il se\ndresse sur sa queue pour mieux observer\nles environs."
        it:
          fire_red: "Ritto sulla coda, guarda lontano. Se nota\nun nemico lancia forti grida per avvertire\ni suoi simili."
          leaf_green: "È un POKéMON molto cauto, che si alza da\nterra con la coda per scrutare i dintorni."
        de:
          fire_red: "Es stellt sich auf den Schwanz, um weiter\nzu blicken. Erspäht es einen Feind,\nschreit es laut auf."
          leaf_green: "Ein sehr vorsichtiges POKéMON, es stellt\nsich auf seinen Schweif, um die Umgebung\nzu überblicken."
        es:
          fire_red: "Se apoya sobre la cola para ver a mucha\ndistancia. Si divisa a un enemigo, dará la\nalarma a gritos."
          leaf_green: "Es un POKéMON muy precavido. Se\nlevanta apoyándose en la cola para tener\nuna mejor vista de los alrededores."
furret:
  species_id: 162
  names:
