      egg_groups:
        - bug
      abilities:
        - hyper_cutter
      descriptions:
        jp_kana:
          fire_red: "２ほんの　ながい　ツノは　パワフル。\nいちど　はさまれて　しまったら\nちぎれるまで　はなさない。"
          leaf_green: "ツノに　はさんでも　ちぎれない\nばあいは　はさんだまま　ふりまわし\nなげとばす　せんぽうを　つかう。"
        en:
          fire_red: "Its two long pincer horns are powerful.\nOnce they grip an enemy, they won’t\nrelease until the foe is torn."
          leaf_green: "If it fails to crush the foe in its\npincers, it will swing around and toss\nthe opponent."
        fr:
          fire_red: "Ses deux grandes cornes lui servent\nde pinces. Une fois qu’il tient une proie,\nil ne la lâche pas avant de l’avoir\ndéchiquetée."
          leaf_green: "S’il n’arrive pas à écraser sa proie avec\nses pinces, il la secoue et l’envoie dans\nles airs."
        it:
          fire_red: "Ha potenti chele sul capo. Se afferra un\nnemico, non lo rilascia prima di averlo\nsquarciato."
          leaf_green: "Se non riesce a stritolare la vittima con\nle chele, la sbatte e la scaglia via con\nviolenza."
        de:
          fire_red: "Seine zwei langen Kneifzangen sind\nkräftig. Haben sie erst einen Gegner\ngegriffen, lassen sie nicht los, bis\ndieser zerfetzt wurde."
          leaf_green: "Dieses POKéMON vermag mit seinen\nmächtigen Kneifzangen Gegner zu\nzermalmen."
        es:
          fire_red: "Los cuernos que tiene a modo de pinzas\nson infalibles. Cuando atrapan al rival,\nno lo sueltan hasta que no acaban con él."
          leaf_green: "Si no consigue triturar a su víctima con\nsus pinzas, le dará vueltas y la arrojará\nlejos."
tauros:
  species_id: 128
  names:
