      descriptions:
        jp_kana:
          fire_red: "せビレ　むなビレが　きんにくのように\nはったつしており　すいちゅうを\n５ノットの　はやさで　およぐ。"
          leaf_green: "およぐとき　おビレが　ドレスのように\nしなやかに　ゆれるので\nすいちゅうの　じょおうと　よばれる。"
        en:
          fire_red: "Its dorsal and pectoral fins are strongly\ndeveloped like muscles. It can swim at a\nspeed of five knots."
          leaf_green: "Its tail fin billows like an elegant\nballroom dress, giving it the nickname of\n“The Water Queen.”"
        fr:
          fire_red: "Ses nageoires dorsales et pectorales\nsont très développées. Grâce à elles,\nPOISSIRENE peut nager à 5 nœuds."
          leaf_green: "Sa queue ondule gracieusement telle une\nsirène qui se déhanche. C’est pourquoi on\nl’appelle «La Reine des Océans»."
        it:
          fire_red: "Le pinne dorsali e pettorali sono\nsviluppate come potenti muscoli. Può\nraggiungere la velocità di cinque nodi."
          leaf_green: "La pinna sulla coda si gonfia come un\nelegante vestito da ballo, da cui il nome\n“regina delle acque”."
        de:
          fire_red: "Seine Rücken- und Bauchflossen sind\nmuskelähnlich entwickelt. Es erreicht\nbeim Schwimmen eine Geschwindig-\nkeit von bis zu fünf Knoten."
          leaf_green: "Weil die Schwanzflosse dieses POKéMON\nbauschig wie ein Ballkleid ist, nennt man\nes „Die Wasserkönigin“."
        es:
          fire_red: "Las aletas dorsales están tan\ndesarrolladas que actúan como músculos.\nPuede nadar a casi 10 km por hora."
          leaf_green: "La aleta de la cola se infla como\nun elegante traje de baile. \nLe llaman Reina del agua."
seaking:
  species_id: 119
