          leaf_green: "ぐうたらで　たべては　ねるだけ。\nだから　どんどん　ふとっていき\nますます　なまけてしまうらしい。"
        en:
          fire_red: "It is not satisfied unless it eats over 880\npounds of food every day. When it is done\neating, it goes promptly to sleep."
          leaf_green: "Very lazy. Just eats and sleeps. As its\nrotund bulk builds, it becomes steadily\nmore slothful."
        fr:
          fire_red: "RONFLEX n’est pas satisfait tant qu’il\nn’a pas avalé ses 400 kilos de nourriture\nquotidienne. Dès qu’il a fini de manger, il\ncommence une sieste pour digérer."
          leaf_green: "Très paresseux, il ne fait que manger et\ndormir. Plus il grossit, plus il devient\nfainéant."
        it:
          fire_red: "Dopo aver trangugiato i suoi immancabili\n400 chili di cibo quotidiani, cade in un\nsonno profondo."
          leaf_green: "Molto pigro, non fa che mangiare e\ndormire. Con l’aumento della sua\nmole diventa sempre più indolente."
        de:
          fire_red: "Es ist erst satt, wenn es über 400 kg\nNahrung am Tag gefressen hat. Ist\nes mit dem Essen fertig, schläft\nes sofort ein."
          leaf_green: "Ein sehr faules POKéMON, welches nur\nschläft und frisst. Je größer es wird,\ndesto mehr schläft es."
        es:
          fire_red: "No se encuentra satisfecho hasta que no\nse come 400 kg de comida cada día.\nCuando acaba de comer, se queda dormido."
          leaf_green: "Es muy vago. Sólo come y duerme.\nA medida que engorda se vuelve cada\nvez más perezoso."
