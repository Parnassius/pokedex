        jp_kana:
          fire_red: "１にち　１８じかんは　ねている。\nねむってる　あいだでも　さまざまな\nちょうのうりょくを　つかう。"
          leaf_green: "あいての　かんがえてる　ことを\nよみとって　ピンチに　なるまえに\nテレポートで　にげてしまう。"
        en:
          fire_red: "It sleeps for 18 hours a day. It uses a\nvariety of extrasensory powers even\nwhile asleep."
          leaf_green: "Using its ability to read minds, it will\nsense impending danger and TELEPORT to\nsafety."
        fr:
          fire_red: "Il dort 18 heures par jour. Il peut\nutiliser de nombreux pouvoirs psy,\nmême pendant son sommeil."
          leaf_green: "Son don de télépathie lui permet de\nsentir le danger et de se TELEPORTER\nen un lieu sûr."
        it:
          fire_red: "Dorme 18 ore al giorno. Anche da\naddormentato utilizza una serie di\npoteri extrasensoriali."
          leaf_green: "Con la capacità di leggere nella mente,\nprevede i pericoli e si TELETRASPORTA in\nun luogo sicuro."
        de:
          fire_red: "Es schläft 18 Stunden am Tag.\nWährenddessen setzt es eine Vielzahl\nzusätzlicher sensorischer Kräfte ein."
          leaf_green: "Dieses POKéMON kann Gedanken lesen. Droht\nihm Gefahr, so teleportiert es sich in\nSicherheit."
        es:
          fire_red: "Duerme 18 horas al día y mientras\nlo hace es capaz de usar una serie\nde poderes extrasensoriales."
          leaf_green: "Con su capacidad de leer la mente,\ndetecta cualquier peligro y se\nTELETRANSPORTA a un lugar seguro."
kadabra:
