      descriptions:
        jp_kana:
          fire_red: "ぜんしんが　きんにくに　なっており\nこどもほどの　おおきさしかないのに\nおとな　１００にんを　なげとばせる。"
          leaf_green: "きんにくを　きたえるのが　だいすきで\nさまざまな　かくとうぎに　いどみ\nますます　つよく　そだっていく。"
        en:
          fire_red: "Its whole body is composed of muscles.\nEven though it’s the size of a human\nchild, it can hurl 100 grown-ups."
          leaf_green: "Loves to build its muscles. It trains in\nall styles of martial arts to become even\nstronger."
        fr:
          fire_red: "Son corps est essentiellement composé\nde muscles. Même s’il a la taille d’un\npetit enfant, il peut soulever 100 adultes\navec ses bras."
          leaf_green: "Il adore la musculation. Il pratique\nles arts martiaux pour devenir encore\nplus fort."
        it:
          fire_red: "Il suo corpo è formato interamente da\nmuscoli. Non è più alto di un bambino, ma\npuò sollevare e lanciare 100 adulti."
          leaf_green: "Ama essere muscoloso. Si allena in ogni\narte marziale per essere sempre più forte."
        de:
          fire_red: "Sein ganzer Körper besteht aus\nMuskeln. Auch wenn es nur so\ngroß wie ein Menschenkind ist,\nkann es 100 Erwachsene jonglieren."
          leaf_green: "Dieses POKéMON stählt sorgsam seine\nMuskeln. Es trainiert sehr viele\nKampfsportarten."
        es:
          fire_red: "Es una masa de músculos y, aunque\nes pequeño, tiene fuerza de sobra para\ntomar en brazos a 100 personas."
          leaf_green: "Le encanta ser musculoso. Se entrena en\ntodo tipo de arte marcial para ser aún\nmás fuerte."
