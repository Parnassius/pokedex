          fire_red: "あるあさのこと。　ちょうのうりょく\nしょうねんが　ベッドから　めざめると\nユンゲラーに　へんしん　していた。"
          leaf_green: "からだから　とくべつな　アルファはが\nでていて　そばに　ちかよるだけで\nあたまが　いたくなってくる。"
        en:
          fire_red: "It happened one morning - a boy with\nextrasensory powers awoke in bed\ntransformed into KADABRA."
          leaf_green: "It emits special alpha waves from its\nbody that induce headaches just by being\nclose."
        fr:
          fire_red: "Selon les rumeurs, KADABRA serait\nun petit garçon aux pouvoirs psy qui\nse serait réveillé un jour sous cette\napparence."
          leaf_green: "Son corps émet des ondes alpha\nqui donnent la migraine à ceux\nqui se trouvent à proximité."
        it:
          fire_red: "Un giorno accadde che un bambino dotato\ndi poteri sensoriali si trasformasse in\nKADABRA."
          leaf_green: "Il suo corpo emette speciali onde alfa\nche causano mal di testa a chi gli si\navvicina."
        de:
          fire_red: "Es geschah eines Morgens: Ein\nJunge mit zusätzlichen sensorischen\nKräften erwachte in seinem Bett und\nwurde zu KADABRA."
          leaf_green: "Dieses POKéMON sendet spezielle\nAlphawellen aus, die bei Gegnern\nKopfschmerzen auslösen."
        es:
          fire_red: "Cuentan que una mañana, un niño que tenía\npoderes extrasensoriales, se despertó\nconvertido en KADABRA."
          leaf_green: "Emite ondas alfa especiales que causan\njaquecas a todo el que se le acerca."
alakazam:
