bulbasaur:
  species_id: 1
  names:
    jp_kana: フシギダネ
    en: BULBASAUR
    fr: BULBIZARRE
    it: BULBASAUR
    de: BISASAM
    es: BULBASAUR
  forms:
    bulbasaur:
      form_id: 0
      base_stats:
        hp: 45
        attack: 49
        defense: 49
        special_attack: 65
        special_defense: 65
        speed: 45
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 1
        special_defense: 0
        speed: 0
      types:
        - grass
        - poison
      egg_groups:
        - monster
        - grass
      abilities:
        - overgrow
      descriptions:
        jp_kana:
          fire_red: "うまれたときから　せなかに\nしょくぶつの　タネが　あって\nすこしずつ　おおきく　そだつ。"
          leaf_green: "うまれたときから　せなかに\nふしぎな　タネが　うえてあって\nからだと　ともに　そだつという。"
        en:
          fire_red: "There is a plant seed on its back right\nfrom the day this POKéMON is born.\nThe seed slowly grows larger."
          leaf_green: "A strange seed was planted on its back at\nbirth. The plant sprouts and grows with\nthis POKéMON."
        fr:
          fire_red: "Il y a une étrange graine sur son\ndos depuis le jour de sa naissance.\nElle devient chaque jour un peu\nplus grosse."
          leaf_green: "Il a une étrange graine plantée sur son\ndos. Elle grandit avec lui depuis sa\nnaissance."
        it:
          fire_red: "Da quando è nato, questo POKéMON\nha un seme sulla schiena, che cresce\nlentamente."
          leaf_green: "Un seme raro gli è stato piantato sulla\nschiena alla nascita. La pianta sboccia e\ncresce con lui."
        de:
          fire_red: "Von Geburt an hat dieses POKéMON\neinen Samen auf dem Rücken, welcher\nlangsam wächst."
          leaf_green: "Dieses POKéMON trägt von Geburt an einen\nSamen auf dem Rücken, der mit ihm keimt\nund wächst."
        es:
          fire_red: "Este POKéMON nace con una semilla\nen el lomo.\nCon el tiempo, la semilla brota."
          leaf_green: "Una rara semilla le fue plantada en el\nlomo al nacer. La planta brota y crece\ncon este POKéMON."
ivysaur:
  species_id: 2
