        jp_kana:
          fire_red: "ちからを　たくわえるため　ふかい\nかいていで　ねむっているらしい。\nめざめると　たつまきに　なるという。"
          leaf_green: "ふだんは　かいていどうくつに\nみを　ひそめているらしい。あくびで\nうずしおを　はっせいさせる。"
        en:
          fire_red: "It sleeps deep on the ocean floor to\nbuild its energy. It is said to cause\ntornadoes as it wakes."
          leaf_green: "It is said that it usually hides in\nunderwater caves. It can create\nwhirlpools by yawning."
        fr:
          fire_red: "Il dort au plus profond de l’océan pour\naccumuler de l’énergie. Son réveil cause\ndes tornades."
          leaf_green: "On dit qu’il se cache dans les grottes\nsous-marines. Il peut créer des\ntourbillons rien qu’en bâillant."
        it:
          fire_red: "Dorme sul fondo dell’oceano per\nricaricarsi di energia. Si dice che causi\nuragani quando si sveglia."
          leaf_green: "Si dice che si nasconda in grotte\nsottacqua. Il suo sbadiglio può\nprovocare dei vortici."
        de:
          fire_red: "Tief unten am Meeresboden tankt es Energie\nim Schlaf. Wacht es auf, kann es Tornados\nauslösen."
          leaf_green: "Man sagt, es hause in Unterwasserhöhlen.\nEs kann mächtige Strudel generieren, wenn\nes gähnt."
        es:
          fire_red: "Duerme en el fondo del océano para\nrecargarse de energía. Dicen que causa\ntornados cuando se levanta."
          leaf_green: "Dicen que suele esconderse en cuevas\nsubmarinas. Puede crear torbellinos al\nbostezar."
