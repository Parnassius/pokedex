          leaf_green: "ほそながい　からだの　かたちに\nあわせた　すを　つくり　ほかの\nポケモンは　はいれなくしている。"
        en:
          fire_red: "There is no telling where its tail begins.\nDespite its short legs, it is quick at\nhunting RATTATA."
          leaf_green: "It makes a nest to suit its long and skinny\nbody. The nest is impossible for other\nPOKéMON to enter."
        fr:
          fire_red: "Il est impossible de déterminer où sa\nqueue commence. Malgré ses petites\npattes, il est aussi bon chasseur qu’un\nRATTATA."
          leaf_green: "Il fait un nid qui convient à son\ncorps très fin. Il est le seul à\npouvoir y pénétrer."
        it:
          fire_red: "Impossibile dire dove inizi la coda.\nNonostante le zampe corte, è veloce a\ncacciare i RATTATA."
          leaf_green: "Il suo nido è adatto al corpo lungo e\nmagro. Gli altri POKéMON non riescono ad\nentrarci."
        de:
          fire_red: "Niemand weiß, wo sein Schwanz beginnt.\nTrotz seiner kurzen Beine jagt es\nRATTFRATZ schnell nach."
          leaf_green: "Sein Nest ist seinem schmalen und dünnen\nKörper angepasst. Kein anderes POKéMON\nkommt hinein."
        es:
          fire_red: "No se sabe dónde comienza su cola. A\npesar de sus cortas patas, es rápido en\ncazar a RATTATA."
          leaf_green: "Construye un nido donde introducir\nel largo y delgado cuerpo que tiene,\npara protegerse de otros POKéMON."
hoothoot:
