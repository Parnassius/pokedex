          leaf_green: "ぜんしんの　こまかな　たいもうで\nくうきの　ながれを　かんじとり\nあいての　こうどうを　よそくする。"
        en:
          fire_red: "By reading air currents, it can predict\nthings such as the weather or its foe’s\nnext move."
          leaf_green: "It uses the fine hair that covers its body\nto sense air currents and predict its\nenemy’s actions."
        fr:
          fire_red: "En analysant les déplacements du vent,\nil peut prédire le climat ou même les\nmouvements de son adversaire."
          leaf_green: "Son fin pelage enregistre les courants\nd’air provoqués par les déplacements de\nses ennemis."
        it:
          fire_red: "Legge le correnti d’aria per predire le\ncondizioni atmosferiche o la prossima\nmossa del nemico."
          leaf_green: "Il pelo sottile che ricopre il suo corpo\nanalizza le correnti d’aria e predice le\nmosse del nemico."
        de:
          fire_red: "Es liest die Luftströmungen und kann\ndadurch das Wetter oder den Angriff des\nGegners vorhersehen."
          leaf_green: "Mit seinen Körperhaaren nimmt es\nLuftströmungen wahr. Dadurch sagt es\ngegnerische Attacken voraus."
        es:
          fire_red: "Basándose en las corrientes de aire\npredice cosas como el clima o el próximo\nataque del enemigo."
          leaf_green: "Está recubierto por un corto pelaje\nque le permite sentir el viento\ny predecir las acciones enemigas."
umbreon:
