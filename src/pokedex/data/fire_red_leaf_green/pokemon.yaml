          leaf_green: "からだは　ちいさくても　どくばりを\nもつため　ちゅういが　ひつようだ。\nメスのほうが　ツノが　ちいさい。"
        en:
          fire_red: "Though small, it must be treated with\ncaution because of its powerfully toxic\nbarbs. The female has smaller horns."
          leaf_green: "Although small, its venomous barbs render\nthis POKéMON dangerous. The female has\nsmaller horns."
        fr:
          fire_red: "Bien qu’il soit très petit, ce POKéMON\ndoit être traité avec prudence à cause\nde ses dards toxiques. Les femelles\nont des cornes plus petites."
          leaf_green: "Ce POKéMON est hérissé de dards\nempoisonnés. Les femelles ont des\ncornes plus petites."
        it:
          fire_red: "Nonostante sia piuttosto minuto, i baffi\nvelenosi lo rendono piuttosto pericoloso.\nLe femmine hanno un corno più piccolo."
          leaf_green: "Sebbene piccolo, i suoi baffi velenosi\nsono molto pericolosi. La femmina ha\nun corno più minuto."
        de:
          fire_red: "Obwohl es klein ist, darf man es nicht\nunterschätzen. Es verfügt über stark\ngiftige Stacheln. Das Weibchen hat\nkleinere Hörner."
          leaf_green: "Dieses POKéMON ist sehr klein, verfügt\naber über starke Gifte. Das Weibchen hat\nkleinere Hörner."
        es:
          fire_red: "No es grande, pero tampoco inofensivo.\nLas tóxicas púas que tiene son peligrosas.\nLa hembra tiene cuernos pequeños."
          leaf_green: "Aunque pequeñas, sus venenosas púas son\nmuy peligrosas. La hembra tiene pequeños\ncuernos."
