        special_attack: 1
        special_defense: 0
        speed: 1
      types:
        - fire
      egg_groups:
        - monster
        - dragon
      abilities:
        - blaze
      descriptions:
        jp_kana:
          fire_red: "シッポを　ふりまわして　あいてを\nなぎたおし　するどい　ツメで\nズタズタに　ひきさいてしまう。"
          leaf_green: "もえる　シッポを　ふりまわすと\nまわりの　おんどが　どんどん\nあがって　あいてを　くるしめる。"
        en:
          fire_red: "It lashes about with its tail to knock\ndown its foe. It then tears up the fallen\nopponent with sharp claws."
          leaf_green: "When it swings its burning tail, it\nelevates the air temperature to \nunbearably high levels."
        fr:
          fire_red: "Il se sert de sa queue pour faire tomber\nses adversaires. Une fois qu’ils sont au\nsol, il les lacère de ses griffes acérées."
          leaf_green: "En agitant sa queue, il peut élever la\ntempérature à un niveau incroyable."
        it:
          fire_red: "Fa cadere a terra il nemico colpendolo\ncon la coda, per poi finirlo con gli\nartigli affilati."
          leaf_green: "Quando agita la sua coda infuocata porta\nla temperatura a livelli insostenibili."
        de:
          fire_red: "Es schlägt im Kampf mit seinem Schwanz\nnach seinen Gegnern. Anschließend zerfetzt\nes die Gegner mit seinen scharfen Klauen."
          leaf_green: "Wenn GLUTEXO mit seinem Schwanz schwingt,\nsteigt die Temperatur ins Unermessliche."
        es:
          fire_red: "Suele usar la cola para derribar a su\nrival. Cuando lo tira, se vale de sus\nafiladas garras para acabar con él."
          leaf_green: "Cuando balancea la ardiente cola, eleva\nla temperatura a niveles muy altos."
charizard:
