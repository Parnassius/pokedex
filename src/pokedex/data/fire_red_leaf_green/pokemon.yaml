          leaf_green: "Le légendaire oiseau des glaces. On dit\nqu’il apparaît aux gens perdus dans les\nsommets."
        it:
          fire_red: "POKéMON uccello leggendario. Vederlo\nvolare con la lunga coda ondulante dietro\ndi sé è uno spettacolo grandioso."
          leaf_green: "Uccello leggendario, si dice appaia per\natterrire chi si smarrisce sui ghiacciai."
        de:
          fire_red: "Eines der legendären Vogel-POKéMON.\nAufgrund seines langen Schweifs, den\nes hinterherzieht, ist sein Flugstil\nhinreißend."
          leaf_green: "Ein legendäres VOGEL-POKéMON, das\nangeblich in Gletschern verirrten\nWanderern den Weg weist."
        es:
          fire_red: "Es uno de los legendarios pájaros\nPOKéMON. Vuela con la cola al viento\nhaciendo gala de su magnificencia."
          leaf_green: "Es un legendario pájaro POKéMON.\nSe aparece a la gente que se ha\nperdido en las heladas montañas."
