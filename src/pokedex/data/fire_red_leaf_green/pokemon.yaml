        jp_kana:
          fire_red: "キバが　ながくて　おおきいほど\nむれのなかでの　ランクが　たかい。\nキバがのびるには　じかんがかかる。"
          leaf_green: "するどく　かたい　キバと\nさらに　がんじょうな　ひふでの\nたいあたりは　いえをも　こわすほど。"
        en:
          fire_red: "The longer and bigger its tusks, the\nhigher its rank in its herd. The tusks take\na long time to grow."
          leaf_green: "It has sharp, hard tusks and a rugged\nhide. Its TACKLE is strong enough to\nknock down a house."
        fr:
          fire_red: "Plus grandes sont ses défenses, plus\nhaut est son rang dans le troupeau.\nSes défenses poussent lentement."
          leaf_green: "Il a des défenses aiguisées et une peau\népaisse. Ses CHARGES peuvent détruire\nune maison."
        it:
          fire_red: "Più grandi sono le zanne, più alto è il\nsuo rango nel branco. Le zanne crescono\nlentamente."
          leaf_green: "Ha zanne dure e affilate e la pelle\ngrinzosa. La sua AZIONE è così forte\nda abbattere una casa."
        de:
          fire_red: "Je größer und länger die Stoßzähne, desto\nhöher ist ihr Rang in der Herde. Doch sie\nwachsen langsam."
          leaf_green: "Aufgrund seiner scharfen Stoßzähne und\nseiner rauen Haut, könnte es mit TACKLE\nein Haus niederreißen."
        es:
          fire_red: "Cuanto más grandes son los colmillos,\nmayor es su estatus en la manada.\nLos colmillos tardan mucho en crecer."
          leaf_green: "Tiene afilados y duros colmillos, y una\ngruesa piel. Su PLACAJE es tan fuerte\nque puede derribar una casa."
porygon2:
