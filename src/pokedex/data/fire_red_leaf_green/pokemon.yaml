        jp_kana:
          fire_red: "カラが　ひじょうに　かたく\nナパームだんでも　こわせない。\nこうげきするときだけ　ひらく。"
          leaf_green: "こうげきを　うけると　ひょうめんの\nトゲが　つぎつぎと　とんでくる。\nないぶの　しょうたいは　ふめい。"
        en:
          fire_red: "Its shell is extremely hard. It cannot be\nshattered, even with a bomb. The shell\nopens only when it is attacking."
          leaf_green: "When attacked, it launches its horns in\nquick volleys. Its innards have never been\nseen."
        fr:
          fire_red: "Sa coquille est extrêmement résistante.\nRien ne peut la détruire, pas même une\nbombe. Il ne l’ouvre que lorsqu’il\nattaque."
          leaf_green: "Une fois menacé, il envoie de rapides\nvolées de dards. On ignore ce qui se\ntrouve à l’intérieur de sa carapace."
        it:
          fire_red: "Neppure una bomba può scalfire il suo\nduro guscio, che apre soltanto quando\nsta attaccando."
          leaf_green: "Se attaccato, scaglia rapide raffiche di\ncorna. Non è mai stato visto internamente."
        de:
          fire_red: "Sein Panzer ist extrem hart. Es kann\nnicht zerschmettert werden, auch nicht\ndurch eine Bombe. Der Panzer öffnet\nsich nur, wenn es angreift."
          leaf_green: "Niemand weiß, wie AUSTOS ohne Schale\naussieht. Zur Verteidigung attackiert es\nmit den Hörnern."
        es:
          fire_red: "La concha que lo cubre es extremadamente\ndura. No es posible causarle rasguños\ny sólo se abre si lo atacan."
          leaf_green: "Cuando es atacado, lanza sus cuernos\ncon gran rapidez. Sus entrañas jamás\nhan sido vistas."
gastly:
  species_id: 92
  names:
    jp_kana: ゴース
    en: GASTLY
    fr: FANTOMINUS
    it: GASTLY
    de: NEBULAK
