          leaf_green: "なきごえが　ひびきわたると\nあちこちから　ニョロモや\nニョロゾたちが　あつまってくる。"
        en:
          fire_red: "Whenever three or more of these get\ntogether, they sing in a loud voice that\nsounds like bellowing."
          leaf_green: "If POLIWAG and POLIWHIRL hear its\nechoing cry, they respond by gathering\nfrom far and wide."
        fr:
          fire_red: "Quand trois TARPAUD ou plus se\nréunissent, ils chantent d’une voix\nressemblant à un beuglement."
          leaf_green: "Si PTITARD et TETARTE entendent\nson cri, ils se rassemblent pour venir\nle rencontrer."
        it:
          fire_red: "Quando si trovano in tre o più iniziano a\ncantare ad alta voce, producendo una\nsorta di gracchio."
          leaf_green: "I suoi versi rimbombanti richiamano\nPOLIWAG e POLIWHIRL anche da\ngrandi distanze."
        de:
          fire_red: "Sind drei oder mehr von ihnen zusammen,\nsingen sie so laut, dass man an\nHundegebell erinnert wird."
          leaf_green: "Hören QUAPUTZI und QUAPSEL seinen Ruf,\nantworten sie, indem sie sich von nah und\nfern versammeln."
        es:
          fire_red: "Cuando tres o más de éstos se juntan,\nemiten un sonido muy fuerte parecido\na un bramido."
          leaf_green: "Si POLIWAG y POLIWHIRL oyen su grito,\nresponderán y se reunirán estén donde\nestén."
hoppip:
  species_id: 187
  names:
    jp_kana: ハネッコ
