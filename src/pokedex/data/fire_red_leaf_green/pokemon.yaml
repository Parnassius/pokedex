          leaf_green: "あしの　ヒヅメは　ダイヤモンドの\n１０ばい　かたい。どんな　ものでも　\nペチャンコに　ふみつぶしてしまう。"
        en:
          fire_red: "Its body is light, and its legs are\nincredibly powerful. It can clear\nAyers Rock in one leap."
          leaf_green: "Its hooves are ten times harder than\ndiamond. It can trample anything\ncompletely flat in little time."
        fr:
          fire_red: "PONYTA est très léger mais ses pattes\nsont incroyablement puissantes. Il peut\nfranchir des montagnes d’un seul saut."
          leaf_green: "Ses sabots sont plus résistants que le\ndiamant. Il peut aplatir n’importe quoi\nen le piétinant."
        it:
          fire_red: "Ha un corpo leggero su zampe\nestremamente potenti. Con un salto,\npuò oltrepassare Ayers Rock."
          leaf_green: "Un suo zoccolo è 10 volte più duro del\ndiamante. Può schiacciare qualsiasi cosa\nin pochissimo tempo."
        de:
          fire_red: "Sein Körper ist leicht und seine Beine\nextrem kräftig. Es kommt mit einem\nSprung über den Ayers Rock."
          leaf_green: "Die Hufe dieses POKéMON sind zehnmal\nhärter als Diamanten. Sie trampeln alles\nnieder."
        es:
          fire_red: "Tiene un cuerpo ligero, pero unas patas\ntremendamente fuertes. Es capaz de\ndestrozar un peñón de una patada."
          leaf_green: "Sus cascos son 10 veces más duros que el\ndiamante. Puede pisotear cualquier cosa\nen poco tiempo."
rapidash:
  species_id: 78
