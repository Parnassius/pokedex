          leaf_green: "ふしぎで　かわいいので　おおくの\nファンがいる。ただし　せいそくちが\nかぎられ　みつけるのが　たいへん。"
        en:
          fire_red: "Its adorable appearance makes it popular\nas a pet. However, it is rare and\ndifficult to find."
          leaf_green: "With its magical and cute appeal, it has \nmany admirers. It is rare and found only\nin certain areas."
        fr:
          fire_red: "Son apparence adorable donne envie\nde le prendre dans ses bras. Il est\nrare et difficile à trouver."
          leaf_green: "Très recherché pour son aura mystique,\nil est très rare et ne vit que dans des\nendroits précis."
        it:
          fire_red: "Grazie all’aspetto, è particolarmente\napprezzato come POKéMON da compagnia,\nbenché sia piuttosto difficile da trovare."
          leaf_green: "Molti amano il suo aspetto magico e\ntenero. È raro e si trova solo in certe\nzone."
        de:
          fire_red: "Sein possierliches Aussehen macht\nes zu einem beliebten Haustier. Es ist\njedoch sehr selten und schwer zu\nfinden."
          leaf_green: "Dieses seltene POKéMON hat durch sein\nniedliches und zauberhaftes\nErscheinungsbild viele Bewunderer."
        es:
          fire_red: "Es una de las mascotas preferidas de\ntodo el mundo por el aspecto tan dulce\nque tiene. Pero no es fácil dar con él."
          leaf_green: "Su mágico y adorable aspecto atrae a la\ngente. Es raro y sólo aparece en ciertas\náreas."
