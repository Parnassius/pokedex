      types:
        - fire
      egg_groups:
        - amorphous
      abilities:
        - magma_armor
        - flame_body
      descriptions:
        jp_kana:
          fire_red: "かざんちたいに　おおく　はっせい。\nあたたかい　ところを　さがして\nのろのろ　はいずりまわっている。"
          leaf_green: "じっとしていると　ようがんで　できた\nからだが　ひえて　かたまるから\nねむることなく　うごきまわっている。"
        en:
          fire_red: "A common sight in volcanic areas, it\nslowly slithers around in a constant\nsearch for warm places."
          leaf_green: "It never sleeps. It has to keep moving\nbecause if it stopped, its magma body\nwould cool and harden."
        fr:
          fire_red: "Il vit dans les régions volcaniques et\nse déplace sans cesse pour trouver\ndes endroits chauds."
          leaf_green: "Il ne dort jamais. Il doit toujours se\ndéplacer, car s’il reste immobile, son\ncorps de lave se refroidit et durcit."
        it:
          fire_red: "Si aggira di frequente nelle zone\nvulcaniche, sempre alla ricerca\ndi luoghi caldi."
          leaf_green: "Non dorme mai. Deve essere sempre in\nmovimento, o il suo corpo di magma si\nraffredda e si secca."
        de:
          fire_red: "Es hält sich ständig bei Vulkanen auf und\nist stets kriechend auf der Suche nach\nwarmen Aufenthaltsorten."
          leaf_green: "Es schläft nie. Es muss in Bewegung\nbleiben, da sein Magma-Körper sonst\nabkühlen und erhärten würde."
        es:
          fire_red: "Asiduo a las zonas volcánicas, se desliza\nlentamente en busca de lugares calientes."
          leaf_green: "No duerme nunca. Tiene que seguir\nmoviéndose porque si se detiene, su\ncuerpo de lava podría enfriarse."
magcargo:
  species_id: 219
