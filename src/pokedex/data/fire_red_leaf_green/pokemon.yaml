      descriptions:
        jp_kana:
          fire_red: "とつぜんへんいで　みつかった\nふたつの　あたまを　もつ　ポケモン。\nじそく　１００キロで　はしる。"
          leaf_green: "とぶのは　にがてだが　はしるのは　\nはやく　きょだいな　あしあとを\nのこして　だいちを　かけぬける。"
        en:
          fire_red: "A two-headed POKéMON that was discovered\nas a sudden mutation. It runs at a pace\nof over 60 miles per hour."
          leaf_green: "A bird that makes up for its poor flying\nwith its fast foot speed. Leaves giant\nfootprints."
        fr:
          fire_red: "Ce POKéMON à deux têtes a été\ndécouvert après une soudaine mutation.\nIl peut courir jusqu’à 100 km/h."
          leaf_green: "Cet oiseau vole très mal mais court très\nvite. Il laisse de gigantesques empreintes\nde pas."
        it:
          fire_red: "POKéMON a due teste, scoperto a seguito\ndi un’improvvisa mutazione. Può correre a\n100 km/h."
          leaf_green: "Uccello incapace di volare, ma eccellente\ncorridore. Lascia orme enormi."
        de:
          fire_red: "Dieses zweiköpfige POKéMON gilt als\nplötzliche Mutation. Es rennt bis zu\n100 km/h schnell."
          leaf_green: "Dieses POKéMON gleicht mangelnde\nFlugfähigkeit durch ein hohes Tempo beim\nLaufen aus."
        es:
          fire_red: "Este POKéMON de dos cabezas es el\nresultado de una mutación. Cuando corre,\npuede alcanzar casi 100 km por hora."
          leaf_green: "Un pájaro que compensa su pobre vuelo\ncaminando muy rápidamente. Deja enormes\nhuellas."
dodrio:
