          leaf_green: "ぜんしんを　よろいのような　ひふで\nまもっている。２０００どの\nマグマの　なかでも　いきられる。"
        en:
          fire_red: "It begins walking on its hind legs after\nevolution. It can punch holes through\nboulders with its horn."
          leaf_green: "Protected by an armor-like hide, it is\ncapable of living in molten lava of 3,600\ndegrees Fahrenheit."
        fr:
          fire_red: "L’évolution a permis à ce POKéMON de\nmarcher sur ses pattes arrières. Il peut\nfacilement faire des trous dans les\nrochers en utilisant sa corne."
          leaf_green: "Son épiderme très épais lui permet de\nsurvivre dans un environnement où il\nfait plus de 2 000 degrés."
        it:
          fire_red: "Dopo l’evoluzione inizia a muoversi sulle\nzampe posteriori. Con il corno può\nperforare la roccia."
          leaf_green: "Protetto da una pelle-armatura, può\nvivere nella lava liquida a 2.000 ºC."
        de:
          fire_red: "Nach seiner Entwicklung geht es\naufrecht auf seinen Hinterfüßen. Mit\nseinem Horn kann es Löcher in\nFelsen bohren."
          leaf_green: "Durch seine panzerähnliche Körperhülle\nkann es in bis zu 2000 Grad heißer Lava\nleben."
        es:
          fire_red: "Cuando evoluciona, comienza a andar\ncon las patas traseras. Es capaz de\nhoradar rocas con el cuerno que tiene."
          leaf_green: "La piel le sirve de escudo protector.\nPuede vivir en lava líquida a 2.000\ngrados de temperatura."
