        jp_kana:
          fire_red: "こどもが　うまれたときに\nしぼられた　ミルクには　いつもより\nえいようが　たっぷり　つまっている。"
          leaf_green: "ミルクは　えいようまんてん。\nおとしよりや　びょうきの　ひとに\nとって　さいこうの　のみもの。"
        en:
          fire_red: "If it has just had a baby, the milk it\nproduces contains much more nutrition than\nusual."
          leaf_green: "Its milk is packed with nutrition, making\nit the ultimate beverage for the sick or\nweary."
        fr:
          fire_red: "Si un ECREMEUH vient d’avoir un petit,\nson lait est beaucoup plus nutritif que\nd’ordinaire."
          leaf_green: "Son lait est plein d’énergie nutritive.\nC’est une boisson parfaite pour les\ngens malades ou fatigués."
        it:
          fire_red: "Se ha appena avuto un piccolo, il latte\nche produce è molto più nutriente del\nnormale."
          leaf_green: "Il suo latte è ricco di sostanze\nnutritive, che ne fanno il miglior rimedio\nper chi è stanco o ammalato."
        de:
          fire_red: "Wenn es gerade ein Junges hat, dann\nenthält seine Milch mehr Nährstoffe als\ngewöhnlich."
          leaf_green: "Aufgrund der vielen Nährstoffe stellt\nseine Milch das ideale Getränk für Kranke\nund Schwache dar."
        es:
          fire_red: "Si sólo tiene una cría, la leche que\nproduce contiene muchos más nutrientes\nde lo normal."
          leaf_green: "Su leche, rica en nutrientes, es la mejor\nbebida contra el cansancio y las\nenfermedades."
blissey:
  species_id: 242
