          leaf_green: "めだまもようの　ついた　はさみを\nふりあげて　あいてを　いかくすると\nあたまが　３つ　あるように　みえる。"
        en:
          fire_red: "Its wings are not used for flying.\nThey are flapped at high speed to adjust\nits body temperature."
          leaf_green: "It swings its eye-patterned pincers up to\nscare its foes. This makes it look like it\nhas three heads."
        fr:
          fire_red: "Ses ailes ne sont pas utilisées pour\nvoler. Il bat des ailes à grande\nvitesse pour réguler sa température\ninterne."
          leaf_green: "Il effraie l’ennemi en agitant ses pinces\nen forme d’œil et donne ainsi l’impression\nd’avoir 3 têtes."
        it:
          fire_red: "Non usa le ali per volare, ma per\nregolare la temperatura corporea\nsbattendole molto velocemente."
          leaf_green: "Agita le chele, su cui sono disegnati\nocchi, per spaventare i nemici. Così\npare avere tre teste."
        de:
          fire_red: "Es benutzt seine Flügel nicht zum Fliegen,\nsondern reguliert durch emsiges\nSchlagen die Körpertemperatur."
          leaf_green: "Es hält seine mit Augen besetzten Scheren\nnach oben, um seine Feinde dadurch\nabzuschrecken."
        es:
          fire_red: "No usa las alas para volar. Las agita\na gran velocidad para regular su\ntemperatura."
          leaf_green: "Mueve sus pinzas para asustar al\nenemigo. Por los dibujos de su cuerpo\nparece tener 3 cabezas."
