      descriptions:
        jp_kana:
          fire_red: "たいないに　ほのおぶくろが　あり\nふかく　いきを　すいこんだあと\n１７００ど　の　ひを　はく。"
          leaf_green: "からだに　ほのおを　ためてるとき\nたいおんが　９００ど　いじょうに\nあがるので　ひじょうに　きけん。"
        en:
          fire_red: "It has a flame bag inside its body. After\ninhaling deeply, it blows out flames of\nnearly 3,100 degrees Fahrenheit."
          leaf_green: "When storing thermal energy in its body,\nits temperature can soar to over 1,600\ndegrees Fahrenheit."
        fr:
          fire_red: "PYROLI a une poche de feu à l’intérieur\nde son corps. Après une bonne inspiration,\nil est capable de recracher des flammes\nà 1 700 degrés."
          leaf_green: "Il peut accumuler suffisamment de\nchaleur pour atteindre des températures\nsupérieures à 900 degrés."
        it:
          fire_red: "Nel corpo ha una tasca infuocata. Dopo\naver inspirato profondamente, sputa\nfiamme alla temperatura di 1.700 ºC."
          leaf_green: "Quando accumula energia termica, la\ntemperatura corporea può salire fino a\n900 ºC."
        de:
          fire_red: "In seinem Körper hat es eine Flam-\nmentasche. Wenn es tief eingeatmet\nhat, kann es Flammen von bis zu\n1700 Grad Celsius spucken."
          leaf_green: "Dieses POKéMON speichert Energie in seinem\nKörper. Seine Temperatur steigt so auf bis\nzu 900 Grad."
        es:
          fire_red: "Almacena llamas en el interior de su\ncuerpo. Tras inhalar profundamente, las\nlanza a una temperatura de 1.700º."
          leaf_green: "Cuando almacena energía térmica en su\ncuerpo, su temperatura puede subir a más\nde 900 grados."
porygon:
