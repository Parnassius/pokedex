          leaf_green: "おくびょうで　いつも　からだを\nまるめている。おそわれると　せなかの\nほのおを　もえあがらせ　みをまもる。"
        en:
          fire_red: "It usually stays hunched over. If it is\nangry or surprised, it shoots flames out\nof its back."
          leaf_green: "It is timid and always curls itself up in\na ball. If attacked, it flares up its back\nfor protection."
        fr:
          fire_red: "Il reste en général courbé. S’il est en\ncolère ou surpris, des flammes jaillissent\nde son dos."
          leaf_green: "Il est timide et se met en boule pour\nse protéger. S’il est attaqué, il enflamme\nson dos pour riposter."
        it:
          fire_red: "Di solito sta raggomitolato. Se ha paura\no è sorpreso, lancia fiamme dal dorso."
          leaf_green: "È timido: spesso se ne sta appallottolato.\nSe è attaccato, si difende infuocando il\ndorso."
        de:
          fire_red: "Es ist immer gebeugt. Wird es angegriffen\noder ist es überrascht, schießen Flammen\naus seinem Rücken."
          leaf_green: "Es ist ruhig und kugelt sich stets\nzusammen. Zum Schutz entflammt es seinen\nRücken."
        es:
          fire_red: "Suele estar acurrucado. Si se enfada o\nasusta, lanzará llamas por el lomo."
          leaf_green: "Es tímido y siempre se enrosca como una\npelota. Si es atacado, enciende el lomo\npara protegerse."
