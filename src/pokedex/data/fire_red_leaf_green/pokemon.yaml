          leaf_green: "ぜつめつした　ポケモンだが　まれに\nかせきが　はっけんされ　そこから\nいきかえらせることが　できる。"
        en:
          fire_red: "A prehistoric POKéMON that lived in the\nprimordial sea, it swims by twisting its\n10 tentacles about."
          leaf_green: "Although long extinct, in rare cases, it\ncan be genetically regenerated from\nfossils."
        fr:
          fire_red: "Un POKéMON préhistorique qui vivait\ndans les profondeurs marines. Il se\ndéplace en agitant ses 10 tentacules."
          leaf_green: "Disparu depuis longtemps, il peut être\nréanimé génétiquement à partir d’anciens\nfossiles."
        it:
          fire_red: "POKéMON preistorico, che viveva nel\nmare primordiale. Nuota facendo oscillare\ni suoi dieci tentacoli."
          leaf_green: "Sebbene estinto, in rari casi può essere\ngeneticamente resuscitato dai fossili."
        de:
          fire_red: "Ein prähistorisches POKéMON, das zur\nUrzeit im Wasser lebte. Es schwimmt,\nindem es seine zehn Tentakel bewegt."
          leaf_green: "Dieses POKéMON ist ausgestorben. In\nseltenen Fällen kann man es aus Fossilien\nwieder beleben."
        es:
          fire_red: "POKéMON prehistórico que vivió en el\nocéano primordial. Para nadar se valía\nde sus 10 tentáculos."
          leaf_green: "Aunque extinto, en algunas ocasiones\npuede ser recuperado genéticamente\na partir de los fósiles."
