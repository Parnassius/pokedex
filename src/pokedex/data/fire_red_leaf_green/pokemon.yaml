      descriptions:
        jp_kana:
          fire_red: "やさしいひとの　そばに　いないと\nげんきが　でなくなってしまう。\nはねをうごかさずに　そらにうかべる。"
          leaf_green: "こころやさしい　ひとの　まえに\nしあわせを　もたらすため\nすがたを　あらわすと　いわれている。"
        en:
          fire_red: "It grows dispirited if it is not with kind\npeople. It can float in midair without\nmoving its wings."
          leaf_green: "They say that it will appear before\nkindhearted, caring people and shower\nthem with happiness."
        fr:
          fire_red: "Il se déprime vite s’il n’est pas entouré\nde gens sympathiques. Il peut léviter\nsans battre des ailes."
          leaf_green: "On dit qu’il n’apparaît qu’aux cœurs purs.\nIl apporte la joie et le bonheur à son\nmaître."
        it:
          fire_red: "S’intristisce se non si trova con persone\ngentili. Può veleggiare in aria senza\nbisogno di muovere le ali."
          leaf_green: "Si dice che appaia alle persone buone e\npremurose, inondandole di felicità."
        de:
          fire_red: "Es wird entmutigt, wenn es unter\nunfreundlichen Menschen ist. Es kann ohne\nFlügel niedrig schweben."
          leaf_green: "Man sagt, es zeigt sich nur gutherzigen\nund einfühlsamen Menschen. Es überschüttet\nsie mit Freude."
        es:
          fire_red: "Si no está con gente amable, se\nentristece. Puede flotar en el aire\nsin mover las alas."
          leaf_green: "Dicen que aparece entre gentes cuidadosas\ny de buen corazón, a quienes inunda de\nfelicidad."
natu:
  species_id: 177
  names:
    jp_kana: ネイティ
