          leaf_green: "きたない　ばしょに　あらわれる。\nこうじょうが　ながす　ヘドロ\nはいえきを　のんで　いきている。"
        en:
          fire_red: "Sludge exposed to X rays from the moon\ntransformed into GRIMER. It loves feeding\non filthy things."
          leaf_green: "Appears in filthy areas. It thrives by\nsucking up polluted sludge that is pumped\nout of factories."
        fr:
          fire_red: "TADMORV est né d’un tas de déchets\nexposé aux rayons X lunaires. Ce \nPOKéMON adore se nourrir de choses\ndégoûtantes."
          leaf_green: "Vivant dans des tas d’ordures, il se\nnourrit des déchets polluants rejetés\npar les usines."
        it:
          fire_red: "GRIMER è nato da fango esposto ai raggi X\nprovenienti dalla luna. Ama nutrirsi di\nsostanze sudice."
          leaf_green: "Prospera in zone paludose. Cresce\nnutrendosi dei liquami di scarico\ndelle fabbriche."
        de:
          fire_red: "Schlamm, der Röntgenstrahlung vom\nMond ausgesetzt war, wurde zu\nSLEIMA. Es isst am liebsten dreckige\nDinge."
          leaf_green: "Dieses POKéMON lebt vorwiegend in\nschmutzigen Gebieten und ernährt sich von\nIndustrieabfällen."
        es:
          fire_red: "Nace de lodo alterado al filtrarse en el\nagua los rayos X reflejados por la Luna.\nSe alimenta de sustancias desagradables."
          leaf_green: "Aparece en zonas asquerosas. Crece\nabsorbiendo los residuos tóxicos\nexpulsados por las fábricas."
