      descriptions:
        jp_kana:
          fire_red: "おおぐちを　あけて　こうげき。\nかみついたとき　ぬけた　キバは\nつぎからつぎに　はえてくる。"
          leaf_green: "キバは　ぬけても　つぎから　つぎに\nはえてくる。いつも　くちのなかには\n４８ぽんの　キバが　そろっている。"
        en:
          fire_red: "It opens its huge jaws wide when\nattacking. If it loses any fangs while\nbiting, they grow back in."
          leaf_green: "If it loses a fang, a new one grows back\nin its place. There are always 48 fangs\nlining its mouth."
        fr:
          fire_red: "Il ouvre en grand ses mâchoires\nquand il attaque. Si ses crocs se\ncassent, ils repoussent très vite."
          leaf_green: "Quand il perd un croc, un autre repousse\naussitôt. Sa bouche en comporte donc\n48 en permanence."
        it:
          fire_red: "Quando attacca, spalanca le grandi\nmascelle. Se morsicando perde un dente,\ngli ricresce."
          leaf_green: "Se perde un dente gliene ricresce un\naltro. La sua bocca contiene sempre 48\ndenti."
        de:
          fire_red: "Beim Angriff reißt es sein Maul auf.\nVerliert es dabei einen Zahn, wächst\ndieser schnell wieder nach."
          leaf_green: "Verliert es einen seiner Zähne, wächst ein\nneuer nach. Es hat immer 48 Zähne in\nseinem Kiefer."
        es:
          fire_red: "Abre sus grandes fauces cuando le atacan.\nSi pierde algún colmillo al morder, le\nvuelve a crecer."
          leaf_green: "Si pierde un colmillo, le crecerá otro\nen su lugar. Siempre tiene 48 colmillos\nen la boca."
feraligatr:
  species_id: 160
  names:
    jp_kana: オーダイル
