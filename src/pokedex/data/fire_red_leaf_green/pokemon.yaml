      descriptions:
        jp_kana:
          fire_red: "にんげんのような　ことばを　はなすが\nまだ　なにをいっているか　ふめいで\nげんざい　けんきゅうされている。"
          leaf_green: "こしを　ふるように　あるいている。\nゆだんをすると　おもわず　つられて\nおどってしまうという。"
        en:
          fire_red: "It speaks using a language that sounds\nhuman. Research is under way to determine\nwhat is being said."
          leaf_green: "It seductively wiggles its hips as it\nwalks. It can cause people to dance in\nunison with it."
        fr:
          fire_red: "Il communique en utilisant un langage qui\nsemble être humain. Des recherches sont\nen cours pour déterminer ce qu’il dit."
          leaf_green: "Il ondule ses hanches en marchant et\nentraîne les gens dans des danses\nfrénétiques."
        it:
          fire_red: "Parla usando un linguaggio simile a quello\numano. Sono in corso studi per riuscire\nad interpretarlo."
          leaf_green: "Camminando ancheggia in modo seducente.\nPuò indurre la gente a seguirlo nella sua\ndanza."
        de:
          fire_red: "Es spricht und benutzt dabei eine\nSprache, die der des Menschen\nsehr ähnelt. Noch wird erforscht,\nwas es wirklich spricht."
          leaf_green: "Der beschwingte Gang dieses POKéMON\nbezaubert Zuschauer und lässt sie im Takt\ndazu tanzen."
        es:
          fire_red: "Habla emitiendo sonidos que parecen\nhumanos. Se está intentando descifrar\nlo que dice cuando habla."
          leaf_green: "Camina moviendo las caderas de\nforma llamativa. Puede hacer que\nla gente baile con él a su ritmo."
electabuzz:
