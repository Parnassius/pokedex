          leaf_green: "ハネを　おおっている　りんぷんは　\nいろの　ちがいに　よって　さまざまな\nどくを　もっている　らしい。"
        en:
          fire_red: "The wings are covered with dustlike\nscales. Every time it flaps its wings, it\nlooses highly toxic dust."
          leaf_green: "The dustlike scales covering its wings\nare color-coded to indicate the kinds of\npoison it has."
        fr:
          fire_red: "Ses ailes sont couvertes d’écailles\npoudreuses. A chaque battement d’ailes,\nil laisse tomber de la poudre hautement\ntoxique."
          leaf_green: "La couleur des écailles poudreuses\nqui recouvrent ses ailes change en\nfonction de son type de poison."
        it:
          fire_red: "Le ali sono ricoperte di polvere velenosa,\nche libera nell’aria ad ogni batter d’ali."
          leaf_green: "La polvere che copre le sue ali è di\ncolore diverso a seconda del tipo di\nveleno in essa contenuto."
        de:
          fire_red: "Seine Flügel sind mit staubähnlichen\nSchuppen überzogen. Mit jedem\nFlügelschlag verliert es hochgiftigen\nStaub."
          leaf_green: "Die bunte Flügelzeichnung dieses POKéMON\ndient als Warnung vor den Giften, die es\nverwendet."
        es:
          fire_red: "Tiene las alas cubiertas de un polvillo\nde escamas que esparce cada vez que\nlas bate."
          leaf_green: "El polvillo que cubre sus alas es de\ndistinto color según el tipo de veneno\nque lleve."
