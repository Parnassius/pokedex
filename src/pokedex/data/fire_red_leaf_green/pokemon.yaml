          leaf_green: "じっと　みみを　すますと\nはげしい　ながれの　かわの　なかに\nなにが　いるのか　ききわけられる。"
        en:
          fire_red: "When it plays in water, it rolls up its\nelongated ears to prevent their insides\nfrom getting wet."
          leaf_green: "By keeping still and listening intently, it\ncan even tell what is in wild, fast-moving\nrivers."
        fr:
          fire_red: "Quand il joue dans l’eau, il met ses\noreilles en boule pour éviter de\nles mouiller."
          leaf_green: "En ne bougeant plus et en écoutant, il\npeut discerner ce qui se passe au fond\ndes fleuves."
        it:
          fire_red: "Quando gioca in acqua arrotola le lunghe\norecchie per evitare che si bagnino\nall’interno."
          leaf_green: "Se resta in silenzio e si concentra può\npersino percepire rumori provenienti\nda torrenti impetuosi."
        de:
          fire_red: "Spielt es im Wasser, rollt es seine langen\nOhren zusammen, um zu verhindern, dass\nWasser eindringt."
          leaf_green: "Verhält es sich regungslos und lauscht,\nhört es, was sich in wilden und reißenden\nFlüssen abspielt."
        es:
          fire_red: "Cuando juega en el agua, enrolla las\nalargadas orejas que tiene, para evitar\nque le entre agua."
          leaf_green: "Guardando silencio y prestando mucha\natención puede saber lo que hay en los\nrápidos y salvajes ríos."
sudowoodo:
  species_id: 185
