          leaf_green: "もりや　はやしに　おおく　ぶんぷ。\nちじょうでも　はげしく　はばたいて\nすなを　かけたりする。"
        en:
          fire_red: "Does not like to fight. It hides in\ntall grass and so on, foraging for food\nsuch as small bugs."
          leaf_green: "A common sight in forests and woods.\nIt flaps its wings at ground level to kick\nup blinding sand."
        fr:
          fire_red: "Ce POKéMON n’aime pas se battre,\nil se cache dans les hautes herbes à\nla recherche de petits insectes pour\nse nourrir."
          leaf_green: "On l’aperçoit souvent dans les forêts. Il\nbrasse l’air de ses ailes près du sol pour\nprojeter du sable."
        it:
          fire_red: "POKéMON pacifico, che passa la maggior\nparte del tempo nell’erba alta alla\nricerca di cibo, tra cui piccoli insetti."
          leaf_green: "Molto comune in boschi e foreste, sbatte\nle ali a livello del suolo per sollevare\nsabbia accecante."
        de:
          fire_red: "Es verschmäht den Kampf und verbirgt sich\ndaher gerne im hohen Gras, wo es nach\nNahrung in Form von kleinen Käfern\nAusschau hält."
          leaf_green: "Ein vorwiegend in Wäldern lebendes\nPOKéMON, das zur Verteidigung mit den\nFlügeln Sand aufwirbelt."
        es:
          fire_red: "A este POKéMON no le gusta luchar. Suele\npermanecer escondido en zonas de hierba\nalta. Se alimenta de pequeños insectos."
          leaf_green: "Muy común en bosques y selvas. Aletea al\nnivel del suelo para levantar la gravilla."
pidgeotto:
