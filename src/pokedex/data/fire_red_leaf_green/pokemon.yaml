      descriptions:
        jp_kana:
          fire_red: "あたらしい　かざんが　できるたび\nうまれてくると　つたえられる\nだいちを　かけめぐる　ポケモン。"
          leaf_green: "ほえると　かざんが　ふんかする。\nみなぎる　ちからを　おさえきれず\nみちという　みちを　かけめぐる。"
        en:
          fire_red: "A POKéMON that races across the land.\nIt is said that one is born every time a\nnew volcano appears."
          leaf_green: "Volcanoes erupt when it barks. Unable to\nrestrain its extreme power, it races\nheadlong around the land."
        fr:
          fire_red: "Un POKéMON qui parcourt les plaines.\nA chaque fois qu’un volcan apparaît,\nun ENTEI vient au monde."
          leaf_green: "Les volcans entrent en éruption quand il\nrugit. Il doit courir sans cesse pour\ncontrôler sa puissance."
        it:
          fire_red: "Ama correre in lungo e in largo.\nSi dice che nasca ogni volta che si forma\nun nuovo vulcano."
          leaf_green: "Se abbaia, fa eruttare i vulcani. Sfoga\nla sua incontenibile potenza correndo\ndappertutto."
        de:
          fire_red: "Dieses POKéMON jagt über das Land und\nman sagt, in jedem neuen Vulkan wird ein\nENTEI geboren."
          leaf_green: "Sein Bellen löst Eruptionen aus. Es kann\nseine Kraft nicht zügeln und es streift\nrastlos durchs Land."
        es:
          fire_red: "Un POKéMON que corre por la tierra. Dicen\nque siempre nace uno cuando aparece un\nnuevo volcán."
          leaf_green: "Cuando ladra, los volcanes entran en\nerupción. Como no puede controlar su\npoder, corre siempre en cabeza."
