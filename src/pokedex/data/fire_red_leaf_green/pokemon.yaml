      descriptions:
        jp_kana:
          fire_red: "いつも　ずつうに　なやまされている。\nこの　ずつうが　はげしくなると\nふしぎな　ちからを　つかいはじめる。"
          leaf_green: "ボーッとした　かおに　ゆだんすると\nすかさず　ねんりきや　かなしばりを\nつかってくる　あなどれない　やつだ。"
        en:
          fire_red: "It is constantly wracked by a headache.\nWhen the headache turns intense, it begins\nusing mysterious powers."
          leaf_green: "While lulling its enemies with its vacant\nlook, this wily POKéMON will use\npsychokinetic powers."
        fr:
          fire_red: "Ce POKéMON a tout le temps la\nmigraine. Quand la douleur devient\ninsupportable, il se met à utiliser\nses pouvoirs psy."
          leaf_green: "Il distrait ses ennemis avec des grimaces\ndébiles et les attaque ensuite avec ses\npouvoirs psy."
        it:
          fire_red: "È costantemente tormentato dal mal di\ntesta, che, quando si fa particolarmente\nintenso, gli conferisce strani poteri."
          leaf_green: "Mentre calma il nemico con il suo sguardo\nvacuo, questo POKéMON astuto usa poteri\npsicocinetici."
        de:
          fire_red: "Es wird permanent von Kopfschmerzen\ngeplagt. Wird der Schmerz stärker,\nsetzt es geheimnisvolle Kräfte ein."
          leaf_green: "Dieses POKéMON lullt Gegner mit\nhypnotisierendem Blick ein, bevor es\nPSYKRAFT einsetzt."
        es:
          fire_red: "Padece continuamente dolores de cabeza.\nCuando son muy fuertes, empieza a usar\nmisteriosos poderes."
          leaf_green: "Mientras calma al enemigo con su vacía\nmirada, este POKéMON usa poderes\npsicoquinéticos."
golduck:
  species_id: 55
