          leaf_green: "はなびら　から　はっさんされる\nにおいには　あらそう　きもちを\nしずめる　せいぶんが　ふくまれる。"
        en:
          fire_red: "MEGANIUM’s breath has the power to revive\ndead grass and plants. It can make them\nhealthy again."
          leaf_green: "The aroma that rises from its petals\ncontains a substance that calms aggressive\nfeelings."
        fr:
          fire_red: "Le souffle de MEGANIUM a le pouvoir de\nredonner la santé aux plantes malades ou\nmortes."
          leaf_green: "L’arôme qui émane de ses pétales contient\nune substance qui calme les pulsions\nagressives."
        it:
          fire_red: "Il respiro di MEGANIUM può far riprendere\nl’erba e le piante morte, che ricrescono\nrigogliose."
          leaf_green: "L’aroma che si spande dai suoi petali\ncontiene una sostanza che placa gli istinti\naggressivi."
        de:
          fire_red: "MEGANIE kann mit seinem Atem abgestorbene\nGräser und Pflanzen reanimieren. Sie sind\ndann wieder gesund."
          leaf_green: "Das Aroma aus seiner Blüte enthält Stoffe,\ndie jegliche Aggressivität schwinden\nlassen."
        es:
          fire_red: "El aliento de MEGANIUM tiene el poder\nde revivir los rastrojos, además de\nregenerarlos."
          leaf_green: "El olor que desprenden sus pétalos\ncontiene una sustancia que calma\nel instinto agresivo."
