          leaf_green: "れんけつした　タイプの　コイルは\nたいようの　こくてんが　おおいとき\nたくさん　あらわれると　いわれる。"
        en:
          fire_red: "A linked cluster formed of several\nMAGNEMITE. It discharges powerful\nmagnetic waves at high voltage."
          leaf_green: "Formed by several MAGNEMITE linked\ntogether. They frequently appear when\nsunspots flare up."
        fr:
          fire_red: "Ce POKéMON est composé de plusieurs\nMAGNETI. Il est capable de projeter\nde puissantes décharges magnétiques\nà haute tension."
          leaf_green: "Constitué de MAGNETI reliés les uns\naux autres, il apparaît souvent quand\nle soleil brille."
        it:
          fire_red: "Formato da vari MAGNEMITE, è in grado\ndi lanciare onde magnetiche ad alto\nvoltaggio."
          leaf_green: "Formato da vari MAGNEMITE uniti, compare\nspesso quando si infiammano le macchie\nsolari."
        de:
          fire_red: "Schließen sich mehrere MAGNETILO\nzusammen, entsteht dieses POKéMON.\nEs entlädt kräftige Hochspannungs-\nmagnetwellen."
          leaf_green: "Mehrere MAGNETILOs bilden dieses\nPOKéMON. Es erscheint, wenn\nSonnenflecken auflodern."
        es:
          fire_red: "Lo constituye un grupo de MAGNEMITE.\nDescarga potentes ondas magnéticas de\nalto voltaje."
          leaf_green: "Están formados por MAGNEMITE unidos.\nSuelen aparecer cuando arden las manchas\nsolares."
farfetchd:
