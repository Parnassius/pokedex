        special_defense: 0
        speed: 0
      types:
        - fire
        - flying
      egg_groups:
        - monster
        - dragon
      abilities:
        - blaze
      descriptions:
        jp_kana:
          fire_red: "ちじょう　１４００メートル　まで\nハネを　つかって　とぶことができる。\nこうねつの　ほのおを　はく。"
          leaf_green: "がんせきも　やけるような　\nしゃくねつの　ほのおを　はいて\nやまかじを　おこすことが　ある。"
        en:
          fire_red: "Its wings can carry this POKéMON close to\nan altitude of 4,600 feet. It blows out\nfire at very high temperatures."
          leaf_green: "It spits fire that is hot enough to melt\nboulders. It may cause forest fires by\nblowing flames."
        fr:
          fire_red: "Ses ailes peuvent le faire voler à\nplus de 1 400 mètres d’altitude.\nCe POKéMON crache du feu à\ndes températures très élevées."
          leaf_green: "Il peut fondre la roche de son souffle\nbrûlant. Il est souvent la cause de\nnombreux incendies de forêt."
        it:
          fire_red: "Grazie alle possenti ali può volare fino a\n1.400 metri d’altezza. Sputa fuoco ad\nuna temperatura impressionante."
          leaf_green: "Sputa fuoco in grado di fondere le rocce.\nCausa incendi boschivi senza averne\nl’intenzione."
        de:
          fire_red: "Dieses POKéMON kann mit seinen Flügeln\neine Höhe von bis zu 1400 Metern\nerreichen. Es verspuckt sehr heißes Feuer."
          leaf_green: "Dieses POKéMON kann mit seinem Feueratem\nFelsen schmelzen. Es verursacht ab und zu\nWaldbrände."
        es:
          fire_red: "Con las alas que tiene puede alcanzar\nuna altura de casi 1.400 m. Suele\nescupir fuego por la boca."
          leaf_green: "Escupe fuego tan caliente que funde las\nrocas. Causa incendios forestales sin\nquerer."
squirtle:
