        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - poison
      egg_groups:
        - amorphous
      abilities:
        - stench
        - sticky_hold
      descriptions:
        jp_kana:
          fire_red: "ふだんは　じめんに　まざっていて\nわからない。からだに　さわると\nもうどくに　おかされる。"
          leaf_green: "きたない　ヘドロが　ぜんしんに\nまとわりつく。あしあとに\nさわっただけで　どくに　おかされる。"
        en:
          fire_red: "It is usually undetectable because it\nblends in with the ground. Touching it can\ncause terrible poisoning."
          leaf_green: "Thickly covered with a filthy, vile\nsludge. It is so toxic, even its footprints\ncontain poison."
        fr:
          fire_red: "Ce POKéMON est très dur à repérer\ncar il se liquéfie souvent sur le sol.\nIl suffit de le toucher pour être\ngravement empoisonné."
          leaf_green: "Il est recouvert d’une épaisse couche\ntoute sale. Il est si toxique que même\nses traces de pas sont empoisonnées."
        it:
          fire_red: "Spesso è invisibile perché si mimetizza\ncon il terreno. Il contatto può causare\nun terribile avvelenamento."
          leaf_green: "Coperto di melma ripugnante, è così\ntossico che persino le sue impronte sono\nvelenose."
        de:
          fire_red: "Normalerweise kann man es nicht\naufspüren, da es mit dem Untergrund\nverschmilzt. Berührt man es, kann das\nzu heftigen Vergiftungen führen."
          leaf_green: "Der Schleim dieses POKéMON ist so\ntoxisch, dass selbst seine Schleimspuren\nGift enthalten."
        es:
          fire_red: "Normalmente pasa desapercibido porque\nse mezcla con lo que haya en el suelo.\nAl contacto resulta tóxico."
          leaf_green: "Está cubierto por un repugnante lodo. Es\ntan tóxico que hasta sus huellas son\nvenenosas."
shellder:
