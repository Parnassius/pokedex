          leaf_green: "みずけの　すくない　ばしょに\nふかい　あなを　ほって　かくれる。\nえものを　ねらうときは　でてくる。"
        en:
          fire_red: "It burrows and lives underground.\nIf threatened, it curls itself up into a\nball for protection."
          leaf_green: "Burrows deep underground in arid locations\nfar from water. It only emerges to hunt\nfor prey."
        fr:
          fire_red: "Il s’enterre et vit dans les sous-sols.\nS’il se sent menacé, il se met en boule\npour se protéger."
          leaf_green: "Il s’enterre dans les régions arides et\ndésertiques. Il émerge seulement pour\nchasser."
        it:
          fire_red: "Vive sottoterra, scavando buche.\nSe minacciato, si protegge\nraggomitolandosi."
          leaf_green: "Si nasconde sotto terra in zone aride\nlontano dall’acqua. Risale solo per\ncercare cibo."
        de:
          fire_red: "Es gräbt und lebt im Erdboden. Bei Gefahr\nrollt es sich zum Schutz zu einem Ball\nzusammen."
          leaf_green: "Dieses POKéMON lebt in trockenen Gebieten\nunter der Erde. Es jagt jedoch an der\nErdoberfläche."
        es:
          fire_red: "Este POKéMON permanece bajo tierra.\nSi se siente amenazado, se enrosca\npara defenderse."
          leaf_green: "Se oculta bajo tierra, en zonas áridas y\nalejadas del agua. Sólo emerge para\ncazar su comida."
sandslash:
