          leaf_green: "ながい　しっぽが　アースになって\nみを　まもるため　じぶんじしんは\nこうでんあつにも　しびれないのだ。"
        en:
          fire_red: "Its electric charges can reach even\n100,000 volts. Careless contact can cause\neven an Indian elephant to faint."
          leaf_green: "Its long tail serves as a ground to\nprotect itself from its own high-voltage\npower."
        fr:
          fire_red: "Ce POKéMON peut accumuler jusqu’à\n100 000 volts. Il peut ainsi assommer\nun éléphant juste en le touchant."
          leaf_green: "Il doit garder sa queue en contact avec\nle sol pour éviter toute électrocution."
        it:
          fire_red: "Le sue scariche elettriche, che\nraggiungono i 100.000 volt, potrebbero\nfar svenire persino un elefante indiano."
          leaf_green: "La sua lunga coda serve da messa a terra\nper proteggerlo dalla sua stessa alta\ntensione."
        de:
          fire_red: "Seine elektrischen Ladungen können bis\nzu 100 000 Volt erreichen. Unvorsichtiger\nKontakt kann sogar einem indischen\nElefanten das Bewusstsein nehmen."
          leaf_green: "Der lange Schweif dieses POKéMON dient\nals Erdung zum Schutz vor der\nkörpereigenen Hochspannung."
        es:
          fire_red: "Suelta descargas eléctricas de hasta\n100.000 voltios, con lo que es capaz\nde derribar al mayor de los POKéMON."
          leaf_green: "La larga cola que tiene le sirve para\nprotegerse a sí mismo de su potente\ny alto voltaje."
