          leaf_green: "Un POKéMON préhistorique qui attaque son\nennemi à la gorge avec ses crocs acérés."
        it:
          fire_red: "Rigenerato dal materiale organico di un\ndinosauro ritrovato nell’ambra. Emette\nversi acuti mentre vola."
          leaf_green: "Feroce POKéMON preistorico, che\nattacca il nemico alla gola con le sue\nzanne affilate come una sega."
        de:
          fire_red: "In Bernstein eingeschlossenes gene-\ntisches Material eines Dinosauriers\nwar der Ursprung dieses POKéMON.\nBeim Fliegen schreit es schrill."
          leaf_green: "Ein wildes URZEIT-POKéMON, das sich mit\ngezackten Reißzähnen auf seine Beute\nherabstürzt."
        es:
          fire_red: "Se regeneró a partir de material genético\nde un dinosaurio, encontrado en ámbar.\nCuando vuela emite escandalosos alaridos."
          leaf_green: "Un prehistórico y feroz POKéMON que\nse lanza con los colmillos a la garganta\ndel enemigo."
