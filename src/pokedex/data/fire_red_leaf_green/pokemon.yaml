        - bug
        - steel
      egg_groups:
        - bug
      abilities:
        - sturdy
      descriptions:
        jp_kana:
          fire_red: "きに　くっついたまま　うごかない。\nかたいカラの　はへんを　ばらまいて\nちかづくものを　おいはらう。"
          leaf_green: "こうてつのように　かたい　カラで\nぜんしんを　おおっている。\nなかの　しょうたいは　ふめい。"
        en:
          fire_red: "It remains immovably rooted to its tree.\nIt scatters pieces of its hard shell to\ndrive its enemies away."
          leaf_green: "Its entire body is shielded by a steel-\nhard shell. What lurks inside the armor is\na total mystery."
        fr:
          fire_red: "Il est totalement fixé à son arbre. Il\nlance des morceaux de sa carapace\npour faire fuir son ennemi."
          leaf_green: "Son corps est protégé par une énorme\ncarapace. Ce qui se trouve sous cette\narmure est un mystère."
        it:
          fire_red: "Rimane saldamente attaccato al suo\nalbero. Tiene lontani i nemici lanciando\npezzi del duro guscio."
          leaf_green: "L’intero corpo è protetto da un guscio\nduro come acciaio. Nessuno sa cosa si\ntrovi sotto il guscio."
        de:
          fire_red: "Es bleibt stets bei seinem Baum. Es\nverstreut Teile seiner Schale, um so seine\nFeinde zu verjagen."
          leaf_green: "Sein gesamter Körper steckt in einer\nstahlharten Schale. Sein Inneres bleibt\nein Geheimnis."
        es:
          fire_red: "Permanece inmóvil agarrado a su árbol.\nDispara trozos de su dura concha para\nalejar al enemigo."
          leaf_green: "Todo su cuerpo está protegido por una\nconcha de metal. Lo que esconde la\nconcha es un misterio."
