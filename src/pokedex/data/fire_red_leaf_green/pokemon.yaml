          leaf_green: "うまれたとき　しっぽは　まっしろで\n１ぽんしかない。そだつと　やがて\nさきが　わかれて　しっぽが　ふえる。"
        en:
          fire_red: "While young, it has six gorgeous tails.\nWhen it grows, several new tails are\nsprouted."
          leaf_green: "When it is born, it has just one snow-\nwhite tail. The tail splits from its tip as\nit grows older."
        fr:
          fire_red: "Quand il est jeune, ce POKéMON a\nsix queues magnifiques. De nouvelles\nqueues apparaissent tout au long de\nsa croissance."
          leaf_green: "Il n’a qu’une seule queue à la naissance.\nSa queue se divise à la pointe au fil\ndes ans."
        it:
          fire_red: "Quando è giovane ha sei meravigliose\ncode, che si moltiplicano durante la\nsua crescita."
          leaf_green: "Alla nascita ha solo una coda, che con il\npassare del tempo sviluppa diverse\ndiramazioni."
        de:
          fire_red: "In seiner Jugend hat es sechs hin-\nreißende Schweife. Während es wächst,\nkommen noch weitere neue Schweife\nhinzu."
          leaf_green: "Dieses POKéMON hat bei seiner Geburt nur\neinen Schweif, der sich mit zunehmendem\nAlter aufspaltet."
        es:
          fire_red: "De pequeño, tiene seis colas increíbles.\nA medida que crece, le van saliendo más."
          leaf_green: "Cuando nace sólo tiene una cola, pero a\nmedida que crece, ésta se va dividiendo\ndesde la punta."
