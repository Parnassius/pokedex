        en:
          fire_red: "This POKéMON is fully covered by\nnonflammable fur. It can withstand any\nkind of fire attack."
          leaf_green: "Be careful if it turns its back during\nbattle. It means that it will attack with\nthe fire on its back."
        fr:
          fire_red: "Ce POKéMON est couvert de fourrure\nignifugée. Il résiste à toute attaque\nde type feu."
          leaf_green: "Attention! Quand il tourne le dos dans un\ncombat, c’est qu’il va attaquer avec ses\nflammes dorsales."
        it:
          fire_red: "Un POKéMON completamente ricoperto da\nuna pelliccia non infiammabile. Può\nresistere a qualsiasi attacco col fuoco."
          leaf_green: "Se mostra il dorso al nemico, significa\nche sta per attaccarlo con le fiamme\nche si trovano proprio sulla schiena."
        de:
          fire_red: "Das Fell dieses POKéMON ist nicht\nentflammbar. Es ist gegen jegliche\nFeuerattacken immun."
          leaf_green: "Dreht es dir im Kampf den Rücken zu, wird\nes dich mit den Flammen seines Rückens\nangreifen."
        es:
          fire_red: "El pelaje de este POKéMON es ignífugo.\nPuede soportar cualquier ataque de\nfuego."
          leaf_green: "Ten cuidado si te da la espalda en\ncombate. Significa que te va a atacar\ncon el lomo en llamas."
