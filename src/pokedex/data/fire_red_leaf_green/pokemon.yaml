      types:
        - electric
      egg_groups:
        - mineral
      abilities:
        - soundproof
        - static
      descriptions:
        jp_kana:
          fire_red: "すこしの　しげきに　はんのうして\nばくはつする。バクダンボールという\nあだなで　こわがられて　いる。"
          leaf_green: "ぼうだいな　エレクトン　エネルギーを\nためこんでおり　ちょっとした\nしげきで　だいばくはつを　おこす。"
        en:
          fire_red: "It explodes in response to even minor\nstimuli. It is feared, with the nickname\nof “The Bomb Ball.”"
          leaf_green: "It stores electric energy under very high\npressure. It often explodes with little or\nno provocation."
        fr:
          fire_red: "Il explose au moindre choc. Son seul\nsurnom de «Bomb Ball» suffit\nà effrayer ses adversaires."
          leaf_green: "Il emmagasine des quantités énormes de\ncourant électrique sous pression pouvant\nexploser."
        it:
          fire_red: "Può esplodere anche alla minima\nprovocazione. Lo chiamano\n“Bomba Ball”."
          leaf_green: "Accumula energia elettrica ad alta\npressione. Può esplodere alla minima\nprovocazione."
        de:
          fire_red: "Es explodiert schon bei kleinsten\nReizen. Sein Spitzname „Die\nBombenkugel“ spiegelt\ndie Furcht der Menschen wider."
          leaf_green: "Dieses POKéMON speichert große Mengen\nStrom. Es explodiert oftmals ohne äußeren\nEinfluss."
        es:
          fire_red: "Explotan a la mínima. Por eso se les\ntiene mucho miedo. Estos POKéMON\nreciben el mote de “Bomba Ball”."
          leaf_green: "Almacena energía eléctrica a gran\npresión. Suele explotar a la mínima\nprovocación."
exeggcute:
  species_id: 102
