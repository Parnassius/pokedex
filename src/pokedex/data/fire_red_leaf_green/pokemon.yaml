          leaf_green: "りょうめは　とくしゅな　つくり。\nわずかな　ひかりを　あつめては\nくらやみでも　まわりを　みわける。"
        en:
          fire_red: "When it needs to think, it rotates its head\n180 degrees to sharpen its intellectual\npower."
          leaf_green: "Its eyes are specially adapted. They\nconcentrate even faint light and enable it\nto see in the dark."
        fr:
          fire_red: "Quand il réfléchit, il tourne sa tête sur\n180 degrés pour optimiser son mode de\npensée."
          leaf_green: "Ses yeux ont la particularité de\npouvoir filtrer la lumière faible, c’est\npourquoi il voit parfaitement dans\nl’obscurité."
        it:
          fire_red: "Quando pensa ruota la testa di\n180 gradi per potenziare le sue\ncapacità intellettive."
          leaf_green: "Ha degli occhi speciali con cui concentra\nanche la luce più fioca per poter vedere\nal buio."
        de:
          fire_red: "Muss es nachdenken, dreht es seinen Kopf\num 180 Grad, um so seinen Intellekt zu\nschärfen."
          leaf_green: "Sein Sehvermögen ist hervorragend. Selbst\nbei schwachem Licht kann es jedes Detail\nerkennen."
        es:
          fire_red: "Cuando necesita pensar, gira su cabeza\n180 grados para agudizar su capacidad\nintelectual."
          leaf_green: "Sus ojos se adaptan muy bien a la\noscuridad; cuando hay poca\nluz, la condensan para poder ver."
ledyba:
