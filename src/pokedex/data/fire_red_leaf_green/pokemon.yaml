      descriptions:
        jp_kana:
          fire_red: "せなかの　ほしもようは\nよぞらの　ほしのかずに　はんのうして\nおおきくなったり　ちいさくなる。"
          leaf_green: "よぞらに　ほしが　またたくとき\nかがやく　こなを　ふりまきながら\nひらひらと　とんでいく。"
        en:
          fire_red: "The star patterns on its back grow larger\nor smaller depending on the number of\nstars in the night sky."
          leaf_green: "When the stars flicker in the night sky, it\nflutters about, scattering a glowing\npowder."
        fr:
          fire_red: "Les étoiles sur son dos deviennent plus\ngrandes ou plus petites selon le nombre\nd’étoiles dans le ciel."
          leaf_green: "Quand les étoiles brillent dans le ciel,\nil volette partout en semant derrière lui\nune poudre brillante."
        it:
          fire_red: "Le stelle disegnate sul dorso sono più\ngrandi o più piccole secondo il numero di\nstelle nel cielo."
          leaf_green: "Si aggira nella notte stellata lasciando\ncadere una scia di polvere incandescente."
        de:
          fire_red: "Die Größe des Sternenmusters hängt direkt\nmit der Anzahl der Sterne am Firmament\nzusammen."
          leaf_green: "Leuchten die Sterne am Nachthimmel,\nschwirrt es umher und verstreut einen\nstrahlenden, leuchtenden Puder."
        es:
          fire_red: "Las estrellas que tiene en el lomo crecen\ny decrecen dependiendo de las estrellas\ndel cielo nocturno."
          leaf_green: "Cuando parpadean las estrellas en el\ncielo nocturno, se mece desprendiendo\nun polvo brillante."
spinarak:
  species_id: 167
  names:
    jp_kana: イトマル
