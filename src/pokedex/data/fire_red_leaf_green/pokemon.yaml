      descriptions:
        jp_kana:
          fire_red: "てのひらが　みずかきに　なっていて\nおよぐのが　とくい。みずうみなどで\nゆうがな　すがたが　みかけられる。"
          leaf_green: "ゆうがた　みずうみの　ほとりを\nかれいに　およぐ　すがたを\nカッパと　まちがえる　ひとがいる。"
        en:
          fire_red: "The forelegs are webbed, helping to make\nit an adept swimmer. It can be seen\nswimming elegantly in lakes, etc."
          leaf_green: "Often seen swimming elegantly by\nlakeshores. It is often mistaken for the\nJapanese monster Kappa."
        fr:
          fire_red: "Ses pattes arrières palmées font de\nce POKéMON un excellent nageur.\nOn peut souvent le voir nager \nélégamment dans les lacs."
          leaf_green: "Il nage avec élégance le long des côtes.\nOn le confond souvent avec Kappa, le\nmonstre japonais."
        it:
          fire_red: "Le zampe anteriori palmate ne fanno un\nelegante nuotatore, che si può incontrare\nnei laghi e in altri specchi d’acqua."
          leaf_green: "Visto spesso nuotare nei laghi\nelegantemente, è a volte confuso con\nKappa, mostro giapponese."
        de:
          fire_red: "Seine Vorderbeine besitzen Schwimm-\nhäute, um es perfekt ans Wasser an-\nzupassen. Daher schwimmt es\nelegant in Flüssen."
          leaf_green: "Man findet dieses POKéMON meist in\nKüstengewässern. Viele verwechseln es mit\nKappa, einem Monster."
        es:
          fire_red: "Las patas traseras palmípedas le permiten\nnadar. Es común verlo chapotear con\nestilo en lagos y otras zonas acuáticas."
          leaf_green: "Suele ser visto nadando de forma\nelegante por los lagos. Es confundido\ncon el monstruo japonés, Kappa."
mankey:
  species_id: 56
  names:
    jp_kana: マンキー
