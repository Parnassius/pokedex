          fire_red: "みなみの　うみの　くにでは\nサニーゴの　しゅうだんの　うえで\nひとびとが　せいかつ　している。"
          leaf_green: "どんどん　そだっては　はえかわる\nあたまの　さきは　きれいなので\nたからもの　として　にんきがたかい。"
        en:
          fire_red: "In a south sea nation, the people live in\ncommunities that are built on groups of\nthese POKéMON."
          leaf_green: "It continuously sheds and grows. The tip\nof its head is prized as a treasure for\nits beauty."
        fr:
          fire_red: "Dans les îles du Sud, les gens vivent\ndans des communautés qui sont formées\nsur des groupes de ces POKéMON."
          leaf_green: "Il grandit en permanence. Le bout de sa\ntête est très recherché, en témoignage de\nsa beauté."
        it:
          fire_red: "A sud, vi è un popolo di mare che vive in\nvillaggi costruiti su gruppi di questi\nPOKéMON."
          leaf_green: "Muta la pelle e cresce di continuo. La\npunta che ha sul capo è un simbolo della\nsua bellezza."
        de:
          fire_red: "Sie schließen sich in Gruppen zusammen\nund bilden Inseln, auf denen im Südmeer\nMenschen leben."
          leaf_green: "Es häutet sich immer und wächst. Seine\nKopfspitze wird aufgrund ihrer\nSchönheit als Schatz bewertet."
        es:
          fire_red: "En un país costero del sur, la gente vive\nen comunidades sobre grupos de este\nPOKéMON."
          leaf_green: "Crece y muda continuamente. La parte\nsuperior de la cabeza es muy apreciada\npor su belleza."
remoraid:
  species_id: 223
  names:
    jp_kana: テッポウオ
