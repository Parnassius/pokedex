      descriptions:
        jp_kana:
          fire_red: "かたい　ハサミは　１まんばりきの\nパワーを　もっているが\nおおきすぎて　うごきが　にぶい。"
          leaf_green: "ハサミは　１まんばりきの\nスーパーパワーを　ひめているのだが\nおおきすぎて　うまく　うごかない。"
        en:
          fire_red: "Its large and hard pincer has 10,000-\nhorsepower strength. However, being so\nbig, it is unwieldy to move."
          leaf_green: "The large pincer has 10,000-horsepower\ncrushing force. However, its huge size\nmakes it unwieldy to use."
        fr:
          fire_red: "Sa grosse pince développe une\npuissance de 10 000 CV. Toutefois,\nsa taille imposante la rend difficile\nà utiliser."
          leaf_green: "Son énorme pince développe une\npuissance de 10 000 CV. Mais elle\nest très encombrante."
        it:
          fire_red: "Le chela più grande sprigiona una\npotenza di 10.000 CV. Le dimensioni\ngli rendono difficili gli spostamenti."
          leaf_green: "La chela più grande ha una potenza\ndistruttrice di 10.000 CV, ma le dimensioni\nla rendono poco maneggevole."
        de:
          fire_red: "Die Kraft seiner großen und harten\nSchere entspricht 10 000 PS. Durch\ndie Größe ist sie aber auch äußerst\nunhandlich und sperrig."
          leaf_green: "Die Kraft der großen Schere entspricht \n10 000 PS. Sie ist jedoch aufgrund\nihrer Größe sehr unpraktisch."
        es:
          fire_red: "La pinza tan grande que tiene posee una\nfuerza de 10.000 caballos de potencia.\nPero, por su gran tamaño, cuesta moverla."
          leaf_green: "La pinza más grande tiene una enorme\npotencia, pero su gran tamaño la hace\npoco manejable."
voltorb:
