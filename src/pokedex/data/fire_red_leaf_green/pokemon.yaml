          leaf_green: "せいそくすうが　とても　すくない。\nつかまえた　ひとには　しあわせを\nもたらすと　いわれている。"
        en:
          fire_red: "It lays several eggs a day. The eggs are\napparently rich in nutrients and extremely\ndelicious."
          leaf_green: "A rare and elusive POKéMON that is said\nto bring happiness to those who manage to\ncatch one."
        fr:
          fire_red: "Il peut pondre plusieurs œufs par jour.\nSes œufs sont très riches en nutriments\net vraiment délicieux."
          leaf_green: "Un POKéMON rare et difficile à capturer\nqui porte chance et bonheur à son\npossesseur."
        it:
          fire_red: "Ogni giorno depone diverse uova, che\nsembrano essere deliziose e molto\nnutrienti."
          leaf_green: "Questo POKéMON raro e sfuggente si dice\nche porti la felicità a chiunque riesca a\ncatturarlo."
        de:
          fire_red: "Es legt mehrere Eier am Tag. Sie\nsind sehr nahrhaft und außerordentlich\nschmackhaft."
          leaf_green: "Ein schwer zu fangendes, seltenes\nPOKéMON. Es bereitet seinem Fänger sehr\nviel Freude."
        es:
          fire_red: "Pone varios huevos al día. Según parece\nson muy nutritivos y están riquísimos."
          leaf_green: "Un raro y evasivo POKéMON que, según\ndicen, lleva la felicidad a quienes lo\natrapan."
