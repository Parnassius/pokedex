          leaf_green: "かつて　たくさん　つかまえたため\nぜつめつ　すんぜんに　なっている。\nせなかに　ひとをのせて　すすむ。"
        en:
          fire_red: "Its high intelligence enables it to\nunderstand human speech. It likes to ferry\npeople on its back."
          leaf_green: "A POKéMON that has been overhunted\nalmost to extinction. It can ferry people\non its back."
        fr:
          fire_red: "Son intelligence lui permet de comprendre\nle langage des humains. Il adore promener\nles gens sur son dos."
          leaf_green: "Ce POKéMON en voie d’extinction peut\ntransporter des passagers sur son dos\npar-delà les océans."
        it:
          fire_red: "La sua intelligenza gli permette di\ncomprendere il linguaggio degli umani, che\nama trasportare sul suo dorso."
          leaf_green: "Cacciato quasi fino all’estinzione, questo\nPOKéMON può traghettare la gente\nsull’acqua."
        de:
          fire_red: "Aufgrund seiner hohen Intelligenz\nkann es die menschliche Sprache\nverstehen. Es mag es, Menschen\nauf seinem Rücken zu transportieren."
          leaf_green: "Dieses POKéMON wurde von Jägern fast\nausgerottet. Es kann Personen über das\nWasser transportieren."
        es:
          fire_red: "Tiene un coeficiente intelectual tan alto\nque puede entender el lenguaje humano.\nLe encanta llevar a gente sobre el lomo."
          leaf_green: "Un POKéMON que ha sido cazado\ncasi hasta la extinción. Puede llevar\na la gente por el agua."
