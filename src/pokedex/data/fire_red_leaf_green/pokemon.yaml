          leaf_green: "すがたを　みたひとは　すくないが\nじつざいする　うみのけしん。ちのうも\nにんげんに　ひってき　するらしい。"
        en:
          fire_red: "It can fly in spite of its big and bulky\nphysique. It circles the globe in just\n16 hours."
          leaf_green: "Only a very few people ever see this\nPOKéMON. Its intelligence is said to\nmatch that of humans."
        fr:
