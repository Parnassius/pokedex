      descriptions:
        jp_kana:
          fire_red: "きゅうばんの　ように　へんかした\nせびれで　マンタインに　くっつき\nたべのこしを　わけてもらっている。"
          leaf_green: "ねらいは　せいかく。ふきだす　みずは\n１００メートルさきで　うごく\nえものに　かならず　めいちゅうする。"
        en:
          fire_red: "Using its dorsal fin as a suction pad, it\nclings to a MANTINE’s underside to\nscavenge for leftovers."
          leaf_green: "It has superb accuracy. The water it\nshoots out can strike even moving prey\nfrom more than 100 yards."
        fr:
          fire_red: "Se servant de sa nageoire dorsale, il\ns’accroche sous un DEMANTA pour\nrécupérer ses restes."
          leaf_green: "Il est très précis quand il crache ses\njets d’eau. Il peut toucher une cible\nmouvante à 100 mètres."
        it:
          fire_red: "Usando la pinna dorsale come una ventosa,\ns’attacca alla pancia di un MANTINE\ncibandosi dei suoi avanzi."
          leaf_green: "Precisissimo, con i suoi getti d’acqua può\ncolpire una preda in movimento ad oltre\n100 metri di distanza."
        de:
          fire_red: "Mit seiner Rückenflosse saugt es sich an\nder Unterseite eines MANTAX fest und lebt\nvon Speiseresten."
          leaf_green: "Es ist äußerst präzise. Es kann mit seinem\nWasserschuss Beute erlegen, die 100 Meter\nentfernt ist."
        es:
          fire_red: "Usando su aleta dorsal para succionar,\nse une a un MANTINE para buscar restos\nde comida."
          leaf_green: "Tiene muy buena puntería. Dispara agua\na sus presas, hasta cuando se mueven,\na más de 100 metros."
octillery:
  species_id: 224
  names:
