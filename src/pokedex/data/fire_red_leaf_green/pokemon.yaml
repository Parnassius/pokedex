          leaf_green: "はんじゅうりょくで　ういてるらしい。\nどこから　ともなく　あらわれて\nでんじはなどを　ほうしゃする。"
        en:
          fire_red: "It moves while constantly hovering.\nIt discharges THUNDER WAVE and so on\nfrom the units at its sides."
          leaf_green: "Uses antigravity to stay suspended.\nAppears without warning and uses THUNDER\nWAVE and similar moves."
        fr:
          fire_red: "Il reste constamment en sustentation\npour se déplacer. Ce POKéMON peut\nenvoyer de l’électricité par les aimants\nsitués sur ses côtés."
          leaf_green: "Il contrôle la gravité pour pouvoir\nvoler. Il surgit de nulle part pour\nattaquer avec des CAGE-ECLAIR."
        it:
          fire_red: "Si sposta restando sempre sollevato da\nterra. Si serve dei due elementi laterali\nper lanciare TUONONDA e attacchi simili."
          leaf_green: "Usa l’antigravità per mantenersi in aria.\nCompare senza preavviso usando TUONONDA\ne mosse simili."
        de:
          fire_red: "Es bewegt sich schwebend. Seine\nMagnete an den Seiten entladen eine\nDONNERWELLE nach der nächsten."
          leaf_green: "Dieses POKéMON überlistet die Schwerkraft,\num zu schweben. Es taucht meist\nüberraschend auf."
        es:
          fire_red: "Está suspendido en el aire y no para\nde moverse. A través de las extremidades\nlaterales dispara ONDA TRUENO."
          leaf_green: "Anula la gravedad para mantenerse\nen el aire. Sin previo aviso usa\nONDA TRUENO y parecidos."
