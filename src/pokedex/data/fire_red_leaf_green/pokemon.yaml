      types:
        - normal
      egg_groups:
        - monster
      abilities:
        - own_tempo
        - oblivious
      descriptions:
        jp_kana:
          fire_red: "したが　しんちょうの　２ばいもある。\nエサをとったり　こうげきをしたりと\nまるで　てのように　うごかせる。"
          leaf_green: "ベロが　カメレオン　みたいに\nぐんぐん　のびていく。なめられると\nなぜか　ピリピリ　しびれてくる。"
        en:
          fire_red: "Its tongue is twice the length of its\nbody. It can be moved like an arm for\ngrabbing food and attacking."
          leaf_green: "Its tongue can be extended like a\nchameleon’s. It leaves a tingling\nsensation when it licks enemies."
        fr:
          fire_red: "Sa langue fait deux fois la taille\nde son corps. Il l’utilise comme un\nbras pour saisir de la nourriture mais\naussi pour attaquer."
          leaf_green: "Il peut projeter sa langue comme un\ncaméléon. Si un ennemi reçoit un\ncoup de langue, il aura une sensation\nde picotement."
        it:
          fire_red: "La sua lingua è lunga il doppio del\ncorpo. La usa come un braccio per\nafferrare cibo e attaccare."
          leaf_green: "Gli si allunga la lingua come a un\ncamaleonte. Le sue leccate provocano\nprurito e irritazioni."
        de:
          fire_red: "Seine Zunge ist doppelt so lang wie\nsein Körper. Es kann sie wie einen Arm\nbewegen, um damit Nahrung zu\ngreifen oder zu attackieren."
          leaf_green: "Dieses POKéMON verfügt über eine sehr\nlange Zunge. Ihre Berührung führt zu\nschweren Hautirritationen."
        es:
          fire_red: "La lengua es tan larga que duplica\nsu altura. Es útil porque puede\nmoverla para agarrar comida y atacar."
          leaf_green: "Su lengua se extiende como la de un\ncamaleón. Cuando lame a sus enemigos,\nse estremecen."
koffing:
