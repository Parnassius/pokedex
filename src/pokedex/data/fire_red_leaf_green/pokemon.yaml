          leaf_green: "もっている　クキは　たいせつな\nぶきでもあり　かたなを　ふるように\nいろんなものを　きることが　できる。"
        en:
          fire_red: "It always walks about with a plant stalk\nclamped in its beak. The stalk is used for\nbuilding its nest."
          leaf_green: "The plant stalk it holds is its weapon.\nThe stalk is used like a sword to cut all\nsorts of things."
        fr:
          fire_red: "Ce POKéMON se promène toujours\nen tenant un artichaut dans son bec.\nIl l’utilise pour faire son nid."
          leaf_green: "Il utilise l’artichaut qu’il a dans la\nbouche comme s’il s’agissait d’une épée."
        it:
          fire_red: "Si sposta sempre tenendo un gambo con\nil becco. Gli serve per costruire il nido."
          leaf_green: "Il verde gambo di porro che brandisce\nè la sua arma, che usa come spada."
        de:
          fire_red: "Es läuft stets mit einer Lauchstange in\nseinem Schnabel umher. Damit baut\nes sein Nest."
          leaf_green: "Dieses POKéMON nutzt eine Lauch-\nstange als Waffe. Es setzt sie wie ein\nSchwert ein."
        es:
          fire_red: "Siempre lleva una ramita en el pico,\ncon la que construye su nido."
          leaf_green: "La ramita que lleva es su mejor arma.\nSuele usarla como espada para cortar\ncosas."
