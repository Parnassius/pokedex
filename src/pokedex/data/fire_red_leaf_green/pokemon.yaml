      descriptions:
        jp_kana:
          fire_red: "たいないの　じかんの　かんかくは\nどんなときでも　せいかくで\nきまった　リズムで　くびをかしげる。"
          leaf_green: "いつも　いっぽんあしで　たっている。\nあしを　いれかえる　しゅんかんは\nすばやくて　なかなか　みられない。"
        en:
          fire_red: "It has a perfect sense of time. Whatever\nhappens, it keeps rhythm by precisely\ntilting its head in time."
          leaf_green: "It always stands on one foot. It changes\nfeet so fast, the movement can rarely be\nseen."
        fr:
          fire_red: "Il a un sens du timing parfait. Il reste\ntoujours en rythme en balançant sa tête."
          leaf_green: "Il se tient toujours sur un pied. Il\nchange de pied si vite qu’on peut à\npeine distinguer ce mouvement."
        it:
          fire_red: "Ha un eccezionale senso del ritmo. Tiene\nil tempo piegando la testa a intervalli\nregolari."
          leaf_green: "Sta sempre su un piede solo. Cambia piede\ncosì rapidamente che è raro vederlo\nmentre lo fa."
        de:
          fire_red: "Sein Zeitgefühl ist perfekt. Was auch\nimmer passiert, es behält den Rhythmus,\nindem es mit dem Kopf wackelt."
          leaf_green: "Es steht immer auf einem Bein. Es wechselt\nsein Standbein so schnell, dass man es\nkaum sieht."
        es:
          fire_red: "Su percepción del tiempo es exacta.\nOcurra lo que ocurra, lleva el ritmo\nmoviendo la cabeza."
          leaf_green: "Se apoya en una sola pata y cuando\nhace el cambio, se mueve tan rápido\nque apenas se nota."
noctowl:
  species_id: 164
