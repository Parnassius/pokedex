      descriptions:
        jp_kana:
          fire_red: "ねている　トゲピーを　うまく\nたたせることが　できれば　しあわせに\nなれるとの　いいつたえがある。"
          leaf_green: "カラのなかに　しあわせが　たくさん\nつまっているらしく　やさしくされると\nこううんを　わけあたえる　という。"
        en:
          fire_red: "A proverb claims that happiness will come\nto anyone who can make a sleeping TOGEPI\nstand up."
          leaf_green: "The shell seems to be filled with joy.\nIt is said that it will share good luck\nwhen treated kindly."
        fr:
          fire_red: "Il y a un proverbe qui dit que le bonheur\ntouchera celui qui peut faire tenir debout\nun TOGEPI endormi."
          leaf_green: "Sa coquille est remplie de joie. On dit\nque s’il est bien traité, il est porteur\nde chance."
        it:
          fire_red: "Un proverbio dice che chi riuscirà a far\nalzare un TOGEPI dormiente sarà baciato\ndalla felicità."
          leaf_green: "Il suo guscio sembra ricolmo di gioia. Si\ndice che porti fortuna se lo si tratta\nbene."
        de:
          fire_red: "Ein Sprichwort besagt, dass Glück dem\nwiderfährt, dem es gelingt, ein\nschlafendes TOGEPI zu wecken."
          leaf_green: "Seine Schale ist voll von Freude. Es teilt\nsein Glück, wenn man es freundlich und gut\nbehandelt."
        es:
          fire_red: "Dice el proverbio que quien despierte a\nun TOGEPI de su sueño, alcanzará la\nfelicidad."
          leaf_green: "El cascarón parece estar lleno de\nalegría. Dicen que trae buena suerte\nsi se le trata con cariño."
togetic:
  species_id: 176
  names:
    jp_kana: トゲチック
