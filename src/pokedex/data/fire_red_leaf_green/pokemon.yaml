        special_defense: 0
        speed: 1
      types:
        - ice
        - flying
      egg_groups:
        - water_1
        - field
      abilities:
        - vital_spirit
        - hustle
      descriptions:
        jp_kana:
          fire_red: "きりたった　がけの　さきにある\nすで　まつ　ヒナたちのため\n１にちじゅう　えさを　はこんでいる。"
          leaf_green: "１にち　ずっと　えさをはこんでる。\nそうなんした　ひとが　デリバードの\nえさで　たすかった　はなしもある。"
        en:
          fire_red: "It nests at the edge of sharp cliffs.\nIt spends all day carrying food to its\nawaiting chicks."
          leaf_green: "It carries food all day long. There are\ntales about lost people who were saved\nby the food it had."
        fr:
          fire_red: "Il fait son nid au bord des falaises\nabruptes. Il passe sa journée à\nnourrir ses petits."
          leaf_green: "Il transporte de la nourriture toute la\njournée. Ses stocks de vivres auraient\nsauvé de nombreuses personnes."
        it:
          fire_red: "Fa la tana sugli spigoli di scogli aguzzi.\nPassa il giorno a portare cibo ai piccoli\naffamati."
          leaf_green: "Trasporta cibo per tutto il giorno. Si\nracconta che molti dispersi si siano\nsalvati con il suo cibo."
        de:
          fire_red: "Sein Nest baut es an scharfkantigen\nFelsklippen. Es ist den ganzen Tag auf\nFuttersuche für seine Jungen."
          leaf_green: "Es trägt immer Lebensmittel bei sich. Man\nsagt, dass Verschollene nur wegen ihm\nüberlebten."
        es:
          fire_red: "Anida en el borde de escarpados\nacantilados. Se pasa todo el día llevando\ncomida a sus polluelos."
          leaf_green: "Siempre lleva comida. Dicen que hay\nmuchos desaparecidos que sobrevivieron\ngracias a ésta."
mantine:
  species_id: 226
