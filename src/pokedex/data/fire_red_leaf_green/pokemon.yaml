        jp_kana:
          fire_red: "ハッパの　ぶぶんは　カッターになって\nあいてを　きりさく。くちからは\nなんでも　とかす　えきたいを　はく。"
          leaf_green: "まず　どくのこなを　はき　あいての\nうごきを　とめて　しまってから　\nようかいえきで　とどめを　さす。"
        en:
          fire_red: "The leafy parts act as cutters for\nslashing foes. It spits a fluid that\ndissolves everything."
          leaf_green: "It spits out POISONPOWDER to immobilize\nthe enemy and then finishes it with a\nspray of ACID."
        fr:
          fire_red: "Ses membres en forme de feuilles\npermettent à BOUSTIFLOR de trancher\nses adversaires. Il crache un fluide\ncapable de tout dissoudre."
          leaf_green: "Il crache de la POUDRE TOXIK pour\nimmobiliser sa proie et il l’achève\navec de l’ACIDE."
        it:
          fire_red: "Si serve delle foglie laterali come lame\ncontro i nemici. Il fluido che secerne\ndalla bocca scioglie qualsiasi cosa."
          leaf_green: "Sputa VELENPOLVERE per immobilizzare il\nnemico e poi lo finisce con il suo ACIDO."
        de:
          fire_red: "Die Blätter werden eingesetzt, um\nGegner aufzuschlitzen. Dieses\nPOKéMON verspuckt eine\nFlüssigkeit, die alles auflöst."
          leaf_green: "Dieses POKéMON lähmt den Gegner mit\nGIFTPUDER, bevor es ihn mit SÄURE\nerledigt."
        es:
          fire_red: "Las hojas que tiene actúan como\ncuchillas en combate. Otra de sus armas\nes el corrosivo fluido que expulsa."
          leaf_green: "Escupe POLVO VENENO para envenenar\nal enemigo, y luego lo liquida con ÁCIDO."
victreebel:
