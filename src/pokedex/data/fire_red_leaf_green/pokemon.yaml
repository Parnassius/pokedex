      descriptions:
        jp_kana:
          fire_red: "ふだんは　ちじょうで　エサをさがすが\nごくたまに　きのえだに　とびのって\nきのめを　ついばんだりする。"
          leaf_green: "はねが　そだちきって　おらず\nとびはねるようにして　いどうする。\nいつも　なにかを　みつめている。"
        en:
          fire_red: "It usually forages for food on the ground\nbut may, on rare occasions, hop onto\nbranches to peck at shoots."
          leaf_green: "Because its wings aren’t yet fully grown,\nit has to hop to get around. It is always\nstaring at something."
        fr:
          fire_red: "Il cherche sa nourriture par terre, mais\nil grimpe quelquefois aux arbres pour\nmanger."
          leaf_green: "Ses ailes ne sont pas encore assez\ndéveloppées. Il ne peut que planer\npéniblement. Il a toujours le regard fixe."
        it:
          fire_red: "Di solito cerca il cibo per terra, ma in\nrare occasioni può saltare sui rami alla\nricerca di germogli."
          leaf_green: "Poiché le sue ali non sono ancora ben\nsviluppate, deve saltellare. Sembra\nfissare sempre qualcosa."
        de:
          fire_red: "Gewöhnlich sucht es am Boden nach Futter,\naber manchmal springt es auch auf Äste,\num dort zu suchen."
          leaf_green: "Da seine Flügel nicht voll ausgebildet\nsind, bewegt es sich hüpfend. Es starrt\nimmer etwas an."
        es:
          fire_red: "Normalmente busca comida por el suelo.\nEn raras ocasiones, salta a las ramas\npara picotear brotes."
          leaf_green: "Va dando saltitos porque sus alas no han\ncrecido lo suficiente. Siempre está\npendiente de algo."
xatu:
  species_id: 178
  names:
    jp_kana: ネイティオ
