        jp_kana:
          fire_red: "たべものが　へる　ふゆのまえに\nあちこちに　たべものを　かくす\nしゅうせいを　もっている。"
          leaf_green: "ミツをみつけると　みかづきもようが\nかがやく。あまいミツが　しみこんだ\nてのひらを　いつも　なめている。"
        en:
          fire_red: "Before food becomes scarce in wintertime,\nits habit is to hoard food in many hidden\nlocations."
          leaf_green: "If it finds honey, its crescent mark glows.\nIt always licks its paws because they are\nsoaked with honey."
        fr:
          fire_red: "Il se fait des réserves de nourriture dans\ndes cachettes avant l’arrivée de l’hiver."
          leaf_green: "Quand il trouve du miel, sa marque en\nforme de lune brille. Il passe son temps\nà lécher ses pattes couvertes de miel."
        it:
          fire_red: "Per prepararsi all’inverno, è sua abitudine\naccumulare il cibo in diversi nascondigli."
          leaf_green: "Se trova del miele, la sua mezzaluna\ndiventa più grande. Si lecca le zampe\nintrise di miele."
        de:
          fire_red: "Steht der Winter vor der Türe, hortet es\nNahrung an vielen verschiedenen nur ihm\nbekannten Orten."
          leaf_green: "Findet es Honig, leuchtet die Sichel auf\nseinem Kopf. Es leckt oft seine mit Honig\nbedeckten Pfoten."
        es:
          fire_red: "Antes de que la comida escasee en\ninvierno, tiene por costumbre ocultar\ncomida en lugares secretos."
          leaf_green: "Cuando encuentra miel, le brilla la marca\nque tiene en la frente. Si se llena las\ngarras de miel, se las lame."
ursaring:
  species_id: 217
  names:
    jp_kana: リングマ
