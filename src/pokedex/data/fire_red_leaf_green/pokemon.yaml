        - sand_veil
        - arena_trap
      descriptions:
        jp_kana:
          fire_red: "ちちゅうの　あさいところを　いどう。\nほりすすんだあとは　じめんが\nもりあがっているので　すぐわかる。"
          leaf_green: "ちか１メートルくらいを　ほりすすみ\nきのねっこなどを　かじって　いきる。\nたまに　ちじょうに　かおをだす。"
        en:
          fire_red: "It burrows through the ground at a\nshallow depth. It leaves raised earth in\nits wake, making it easy to spot."
          leaf_green: "Lives about one yard underground where it\nfeeds on plant roots. It sometimes appears\naboveground."
        fr:
          fire_red: "Ce POKéMON creuse sous terre à faible\nprofondeur. La terre qu’il laisse dans son\nsillage le rend facile à repérer."
          leaf_green: "Il vit à un mètre sous la terre et se\nnourrit de racines. Il apparaît rarement\nà la surface."
        it:
          fire_red: "Scava buche a bassa profondità. La terra\nsollevata che lascia al suo passaggio\nlo rende facilmente individuabile."
          leaf_green: "Vive un metro sotto terra, dove si nutre\ndi radici. Talvolta compare in superficie."
        de:
          fire_red: "Es gräbt sich in geringer Tiefe durch\nden Erdboden, dadurch hinterlässt es\ndurchwühlte Erde und ist somit leicht\nzu finden."
          leaf_green: "Dieses POKéMON lebt einen Meter unter der\nErde. Es frisst Wurzeln und kommt selten\nan die Oberfläche."
        es:
          fire_red: "Este POKéMON se entierra a gran\nprofundidad, pero como levanta tierra\nal cavar, es fácil localizarlo."
          leaf_green: "Vive un metro por debajo del suelo,\ndonde se alimenta de raíces. También\naparece en la superficie."
dugtrio:
  species_id: 51
  names:
