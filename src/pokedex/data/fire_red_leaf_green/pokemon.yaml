      descriptions:
        jp_kana:
          fire_red: "うすい　ガスじょうの　せいめいたい。\nガスに　つつまれると\nインドぞうも　２びょうで　たおれる。"
          leaf_green: "すがたが　ほとんど　みえない。\nしらない　あいだに　ガスに\nおかされて　きを　うしなう。"
        en:
          fire_red: "A being that exists as a thin gas. It can\ntopple an Indian elephant by enveloping\nthe prey in two seconds."
          leaf_green: "Almost invisible, this gaseous POKéMON\ncloaks the target and puts it to sleep\nwithout notice."
        fr:
          fire_red: "Ce POKéMON est constitué seulement\nde gaz. Il peut renverser un éléphant en\ndeux secondes juste en l’enveloppant de\nson corps gazeux."
          leaf_green: "Ce POKéMON gazeux plonge ses victimes\ndans un profond sommeil sans qu’elles ne\ns’en aperçoivent."
        it:
          fire_red: "Essere gassoso, capace di far cadere\nun elefante indiano avvolgendolo nel giro\ndi due secondi."
          leaf_green: "Quasi invisibile, questo POKéMON gassoso\navvolge il nemico e lo addormenta senza\npreavviso."
        de:
          fire_red: "Ein Wesen, das aus Gas besteht. Es\nkann einen indischen Elefanten um-\nstoßen, indem es ihn innerhalb von\nzwei Sekunden einhüllt."
          leaf_green: "Dieses nahezu unsichtbare POKéMON hüllt\nden Gegner unbemerkt ein und versetzt ihn\nin Tiefschlaf."
        es:
          fire_red: "Está compuesto prácticamente de un gas\nligero con el que es capaz de asfixiar al\nmayor de los POKéMON en dos segundos."
          leaf_green: "Casi invisible, este gaseoso POKéMON\ncubre al enemigo y lo adormece sin\nprevio aviso."
haunter:
  species_id: 93
  names:
    jp_kana: ゴースト
