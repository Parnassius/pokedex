        jp_kana:
          fire_red: "からだも　ちいさく　もともと　\nよわかった。ホネを　つかうようになり\nせいかくが　きょうぼうか　した。"
          leaf_green: "ほねは　だいじな　ぶき　である。\nブーメランの　ように　なげて\nえものに　ぶつけ　きぜつ　させる。"
        en:
          fire_red: "It is small and was originally very weak.\nIts temperament turned ferocious when it\nbegan using bones."
          leaf_green: "The bone it holds is its key weapon.\nIt throws the bone skillfully like a\nboomerang to KO targets."
        fr:
          fire_red: "Ce petit POKéMON était à l’origine\ntrès faible. Il est devenu redoutable le\njour où il a appris à se servir de ses os."
          leaf_green: "L’os qu’il tient dans la main est son\narme la plus efficace. Il s’en sert comme\nd’un boomerang pour assommer sa proie."
        it:
          fire_red: "Di piccole dimensioni, un tempo era del\ntutto innocuo. È diventato più aggressivo\nbrandendo un osso come arma."
          leaf_green: "L’osso che impugna è la sua arma. Lo\nscaglia come un boomerang per mettere\nKO i suoi avversari."
        de:
          fire_red: "Es ist klein und war ursprünglich sehr\nschwach. Erst als es anfing Knochen\neinzusetzen, wurde es wild."
          leaf_green: "Der Knochen, den dieses POKéMON hält, ist\nseine Primärwaffe. Es wirft ihn wie einen\nBumerang."
        es:
          fire_red: "Es pequeño y siempre ha sido muy débil.\nCuando empezó a usar huesos, se volvió\nmás violento."
          leaf_green: "El hueso que lleva es su gran arma. Lo\nlanza hábilmente como un bumerán\ny deja a todos fuera de combate."
hitmonlee:
  species_id: 106
  names:
    jp_kana: サワムラー
