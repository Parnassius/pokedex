      descriptions:
        jp_kana:
          fire_red: "いつも　くちづけ　するかのように\nゆったりとした　リズムで\nくびを　ぜんごに　ゆらしている。"
          leaf_green: "くちびるが　いちばん　びんかん。\nなんでも　まず　くちびるで　ふれて\nどんなものか　かくにんする。"
        en:
          fire_red: "It always rocks its head slowly backwards\nand forwards as if it is trying to kiss\nsomeone."
          leaf_green: "Its lips are the most sensitive parts on\nits body. It always uses its lips first to\nexamine things."
        fr:
          fire_red: "Il balance sa tête d’avant en arrière et\ndonne l’impression d’essayer d’embrasser\nquelqu’un."
          leaf_green: "Ses lèvres sont la partie la plus\nsensible de son corps. Il les utilise\npour examiner les objets."
        it:
          fire_red: "Fa dei piccoli movimenti avanti e indietro\ncon il capo, come se provasse a\nbaciare qualcuno."
          leaf_green: "Le labbra sono la parte più sensibile del\ncorpo, il primo organo con cui analizza\nnuovi oggetti."
        de:
          fire_red: "Es wippt mit dem Kopf langsam vor und\nzurück, als versuche es, jemanden zu\nküssen."
          leaf_green: "Die Lippen sind sein empfindlichster\nKörperteil. Neue Dinge untersucht es\nzuerst damit."
        es:
          fire_red: "Siempre mueve la cabeza hacia delante\ny hacia atrás como si quisiera besar a\nalguien."
          leaf_green: "La parte más sensible de su cuerpo\nson los labios. Siempre los usa para\nexaminar las cosas."
elekid:
