          leaf_green: "はやく　うごく　ぶったいを　みると\nきょうそう　したくなり　もうれつな\nスピードで　おいかけ　はじめる。"
        en:
          fire_red: "It can gallop at a top speed of 150\nmiles per hour. It can race as fast as a\nbullet train while ablaze."
          leaf_green: "Very competitive, this POKéMON will chase\nanything that moves fast in the hopes of\nracing it."
        fr:
          fire_red: "Ce POKéMON peut galoper jusqu’à\n240 km/h. Si vous pensez voir une\nboule de feu au loin, il s’agit peut-être\nd’un GALOPA en pleine course."
          leaf_green: "Doté d’un esprit de compétition, il\npoursuit toute créature rapide pour\nfaire la course."
        it:
          fire_red: "Raggiunge la velocità di 240 km/h.\nQuando è in fiamme può competere\ncon un treno superveloce."
          leaf_green: "POKéMON molto competitivo, rincorre\ntutto ciò che si muove veloce, sperando\ndi superarlo."
        de:
          fire_red: "Beim Galoppieren erreicht es eine\nHöchstgeschwindigkeit von 240 km/h.\nIst es entflammt, rennt es so schnell\nwie ein Hochgeschwindigkeitszug."
          leaf_green: "Dieses POKéMON verfolgt schnelle Objekte\nin der Hoffnung, ein Wettrennen gegen sie\nzu gewinnen."
        es:
          fire_red: "Al galope puede alcanzar los 240 km por\nhora. Impresiona verlo con sus llameantes\nmelenas, a la velocidad del rayo."
          leaf_green: "Muy competitivo, este POKéMON perseguirá\na todo lo que se mueva rápido e intentará\nsalir airoso."
slowpoke:
