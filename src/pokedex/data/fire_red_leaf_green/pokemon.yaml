        jp_kana:
          fire_red: "ぶきみな　とおぼえを　きいた\nポケモンは　ふるえ　いちもくさんに\nじぶんの　すに　もどる。"
          leaf_green: "くちから　ふきだす　ほのおで\nやけどすると　いつまでたっても\nキズぐちが　うずいてしまう。"
        en:
          fire_red: "Upon hearing its eerie howls, other\nPOKéMON get the shivers and head straight\nback to their nests."
          leaf_green: "If you are burned by the flames it shoots\nfrom its mouth, the pain will never go\naway."
        fr:
          fire_red: "En entendant ses hurlements sinistres, les\nautres POKéMON prennent peur et fuient\nvers leur nid."
          leaf_green: "Les blessures provoquées par son souffle\nde flammes sont permanentes et la douleur\nne s’en va jamais."
        it:
          fire_red: "Udendo i loro spaventosi latrati, gli altri\nPOKéMON iniziano a tremare e si\nprecipitano nelle loro tane."
          leaf_green: "Se si è bruciati dalle fiamme che sputa\ndalla bocca, il dolore rimarrà per\nsempre."
        de:
          fire_red: "Wenn andere POKéMON sein gruseliges\nGeheul hören, erschauern sie und\nverstecken sich schleunigst."
          leaf_green: "Wirst du von den Flammen getroffen, die\naus seinem Mund schießen, wirst du für\nimmer gebrandmarkt sein."
        es:
          fire_red: "Al oír sus siniestros aullidos, los otros\nPOKéMON se estremecen y se guarecen."
          leaf_green: "Si te quemas con las llamas que lanza por\nla boca, el dolor no desaparecerá nunca."
kingdra:
