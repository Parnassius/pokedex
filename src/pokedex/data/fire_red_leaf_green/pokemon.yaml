      types:
        - dark
        - ice
      egg_groups:
        - field
      abilities:
        - inner_focus
        - keen_eye
      descriptions:
        jp_kana:
          fire_red: "どうもうな　せいかく。\nおやの　ポッポを　おいはらい\nすに　のこされた　タマゴをたべる。"
          leaf_green: "するどいツメを　ゆびの　なかに\nかくしている。いきなり　のばして\nおそってきた　あいてを　ひるませる。"
        en:
          fire_red: "Vicious in nature, it drives PIDGEY from\ntheir nests and feasts on the eggs that\nare left behind."
          leaf_green: "Its paws conceal sharp claws.\nIf attacked, it suddenly extends the\nclaws and startles its enemy."
        fr:
          fire_red: "De nature agressive, il chasse les\nROUCOOL de leurs nids et dévore\nles œufs abandonnés."
          leaf_green: "Ses griffes sont cachées dans ses pattes.\nS’il est attaqué, il les sort pour frapper\nses ennemis."
        it:
          fire_red: "Di spirito malevolo, spinge i PIDGEY a\nlasciare il proprio nido per poi avventarsi\nsulle uova incustodite."
          leaf_green: "Le zampe nascondono artigli affilati. Se è\nattaccato, sfodera gli artigli spaventando\ni nemici."
        de:
          fire_red: "Es besitzt ein grausames Wesen. Es\nverjagt TAUBSIs von deren Nestern\nund labt sich an den Eiern."
          leaf_green: "In seinen Pfoten stecken scharfe Krallen.\nEs fährt sie blitzschnell aus, um die\nGegner zu überraschen."
        es:
          fire_red: "Es malvado por naturaleza. Saca a los\nPIDGEY de sus nidos para devorar sus\nhuevos."
          leaf_green: "Tiene ocultas unas garras muy afiladas.\nSi le atacan, las extiende para asustar\nal enemigo."
teddiursa:
  species_id: 216
