        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fighting
      egg_groups:
        - field
      abilities:
        - vital_spirit
      descriptions:
        jp_kana:
          fire_red: "みのこなしが　かるく　きょうぼうな\nせいかく。おこって　あばれると\nてが　つけられなくなる。"
          leaf_green: "ふだんは　きげんが　よくても\nちょっとした　ことで　いきなり\nあばれだすから　こわいのだ。"
        en:
          fire_red: "Light and agile on its feet, and ferocious\nin temperament. When angered, it flies into\nan uncontrollable frenzy."
          leaf_green: "Extremely quick to anger. It could be\ndocile one moment, then thrashing away \nthe next instant."
        fr:
          fire_red: "Ce POKéMON est léger, très agile sur\nses pieds mais surtout doté d’un\ntempérament hargneux. Quand il\ns’énerve, plus rien ne peut le calmer."
          leaf_green: "Il se met en colère très vite. Calme ou\nfurieux, son humeur change d’une seconde\nà l’autre."
        it:
          fire_red: "POKéMON agile particolarmente feroce,\ncade spesso vittima di incontrollabili\naccessi d’ira."
          leaf_green: "Molto iracondo, può passare dalla docilità\nall’ira nell’arco di un solo istante."
        de:
          fire_red: "Leichtfüßig, beschwingt und ungezügelt ist\ndieses POKéMON. Wenn es wütend ist,\nverfällt es in unkontrollierbare Raserei."
          leaf_green: "Ein reizbares und unberechenbares\nPOKéMON, dessen Gemütszustand binnen\nSekunden wechselt."
        es:
          fire_red: "Es muy ligero y ágil, y también violento.\nCuando se enfada, no hay quien controle\nel estado de furia en el que entra."
          leaf_green: "Se enfada muy fácilmente. Puede pasar\nde la tranquilidad a la ira en apenas un\nsegundo."
primeape:
  species_id: 57
  names:
    jp_kana: オコリザル
    en: PRIMEAPE
    fr: COLOSSINGE
    it: PRIMEAPE
    de: RASAFF
    es: PRIMEAPE
