          leaf_green: "Le légendaire oiseau du feu. Une pluie de\nflammes surgit à chaque battement de ses\nailes."
        it:
          fire_red: "POKéMON uccello leggendario. Chi lo vede\nresta sgomento di fronte alle sue ali\narancione che sembrano infuocate."
          leaf_green: "Noto come uccello leggendario del fuoco,\nquando sbatte le ali crea scintillanti\nlingue infuocate."
        de:
          fire_red: "Eines der legendären Vogel-POKéMON.\nWer es zu Gesicht bekommt, ist ob\nseiner orangefarbenen Schwingen,\ndie zu brennen scheinen, überwältigt."
          leaf_green: "Dieses POKéMON ist der legendäre\nFeuervogel. Sein Flügelschlag entfacht\nein helles Feuermeer."
        es:
          fire_red: "Es uno de los legendarios pájaros\nPOKéMON. Quien lo ve se queda embobado\ncon las alas que tiene; parece que arden."
          leaf_green: "Es más conocido como el legendario\npájaro de fuego. Con cada aleteo\ncrea brillantes llamas."
