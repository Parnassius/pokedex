          leaf_green: "オーラに　つつまれる　しんせいな\nいきものらしい。てんきを　かえる　\nちからを　もつと　いわれている。"
        en:
          fire_red: "It is said to live in seas and lakes.\nEven though it has no wings, it has been\nseen flying occasionally."
          leaf_green: "A mystical POKéMON that exudes a gentle\naura. It is said to have the ability to\nchange the weather."
        fr:
          fire_red: "On dit que ce POKéMON vit dans les\nmers et les lacs. Même s’il n’a pas\nd’ailes, certaines personnes disent\nl’avoir déjà vu voler."
          leaf_green: "Un POKéMON légendaire plein de charme.\nIl peut contrôler les variations\nclimatiques."
        it:
          fire_red: "Sembra vivere nel mare e nei laghi.\nSebbene non abbia ali, c’è chi l’ha\nvisto volare."
          leaf_green: "POKéMON etereo che emana un’aura mite e\nha la capacità di mutare il clima."
        de:
          fire_red: "Man sagt, es lebe im Meer und in Seen.\nAuch wenn es keine Flügel hat, sah\nman es bereits fliegen."
          leaf_green: "Ein mysteriöses POKéMON mit einer sehr\nfreundlichen Ausstrahlung. Es kann das\nKlima beeinflussen."
        es:
          fire_red: "Dicen que habita ríos y mares. Aunque no\ntiene alas, a veces se le ha visto volar."
          leaf_green: "Es un POKéMON misterioso.\nEstá rodeado de una sutil aura y tiene\nla capacidad de cambiar el clima."
dragonite:
