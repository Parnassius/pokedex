          leaf_green: "やせてるので　およぐのが　はやい。\nえものを　カマで　きりさき\nたいえきを　のこらず　すいだす。"
        en:
          fire_red: "It swims freely through water. It catches\nprey with its scythe-like arms and drains\nthe victim’s fluids."
          leaf_green: "Its sleek shape is perfect for swimming.\nIt slashes prey with its claws and drains\ntheir fluids."
        fr:
          fire_red: "Il peut nager librement dans l’eau. Il\nlacère ses ennemis à l’aide de ses bras\ntranchants et absorbe ensuite leur\nénergie vitale."
          leaf_green: "Sa forme pure et lisse lui permet de\nnager rapidement. Il lacère sa proie\navant d’en absorber la vie."
        it:
          fire_red: "Si muove liberamente nell’acqua. Dopo\naver catturato la preda con le due falci,\nne assorbe i fluidi."
          leaf_green: "Ha una fisionomia da perfetto nuotatore.\nTaglia la preda con le sue falci e ne\nbeve il sangue."
        de:
          fire_red: "Es bewegt sich behände im Wasser.\nMit seinen sichelartigen Armen fängt\nes Beute und entzieht ihr\nKörpersäfte."
          leaf_green: "Dieses POKéMON ist ein sehr guter\nSchwimmer. Mit seinen großen Klauen\nattackiert es Beutetiere."
        es:
          fire_red: "Le gusta nadar a su aire. Cuando atrapa\na su presa con las garras, le absorbe\ntodos los fluidos."
          leaf_green: "Con su impecable forma es un gran\nnadador. Corta a su presa con las garras\ny absorbe sus fluidos."
