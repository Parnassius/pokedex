      descriptions:
        jp_kana:
          fire_red: "つねに　おしりから　でている\nとくべつな　いっぽんの　いとを\nたどっていくと　すにつながっている。"
          leaf_green: "おしりからだけでなく　くちからも\nいとを　だすので　みただけでは\nどっちが　あたまか　わからない。"
        en:
          fire_red: "A single strand of a special string is\nendlessly spun out of its rear. The string\nleads back to its nest."
          leaf_green: "It spins string not only from its rear but\nalso from its mouth. It is hard to tell\nwhich end is which."
        fr:
          fire_red: "Il crée en permanence un fil très solide\nqui relie son corps directement à son nid."
          leaf_green: "Il peut produire des fils de soie par\nla queue ou par la bouche. Il est\ndifficile de différencier ces deux\norganes."
        it:
          fire_red: "Dalla sua parte posteriore si sviluppa un\nfilo ininterrotto. Seguendo il filo si\nraggiunge il nido di questo POKéMON."
          leaf_green: "Tesse un filo sia dalla bocca, sia\ndall’estremità opposta. È dura\ndistinguere l’inizio e la fine."
        de:
          fire_red: "Es spinnt nur einen endlosen Faden aus\nseinem Hinterleib. Folgt man ihm, gelangt\nman in sein Nest."
          leaf_green: "Es spinnt die Fäden sowohl mit dem\nHinterleib, als auch mit dem Mund. Das\nEnde ist schwer zu sehen."
        es:
          fire_red: "Una hebra de un hilo especial es tejida\nsin fin desde su parte trasera. El hilo\nacaba en su nido."
          leaf_green: "Teje su telaraña desde su parte\ntrasera y con la boca. Es muy difícil\nlocalizar de dónde sale cada hebra."
crobat:
  species_id: 169
