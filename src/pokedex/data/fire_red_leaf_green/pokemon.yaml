          leaf_green: "さむさに　かつため　からだの　なかに\nねつ　エネルギーを　たくわえる。\nさむい　うみも　８ノットで　すすむ。"
        en:
          fire_red: "Its body is covered with a pure white\nfur. The colder the weather, the more\nactive it becomes."
          leaf_green: "It stores thermal energy in the body.\nIt swims at a steady eight knots even in\nintensely cold waters."
        fr:
          fire_red: "Son corps est recouvert d’une fourrure\nd’un blanc pur. Plus il fait froid, et\nplus ce POKéMON est actif."
          leaf_green: "Il emmagasine la chaleur dans son corps.\nIl peut nager dans l’eau glacée à plus de\n8 nœuds."
        it:
          fire_red: "Ha il corpo ricoperto da una candida\npelliccia bianca. Più fa freddo, più\nquesto POKéMON è attivo."
          leaf_green: "Accumula energia termica nel suo corpo.\nNuota a 8 nodi costanti anche in acque\nmolto fredde."
        de:
          fire_red: "Sein Körper ist mit reinem, weißem Fell\nüberzogen. Je kälter es wird, desto\naktiver wird dieses POKéMON."
          leaf_green: "Der Körper dieses POKéMON speichert\nWärme. Selbst in eiskaltem Wasser schwimmt\nes acht Knoten schnell."
        es:
          fire_red: "Está recubierto de un luminoso pelaje\nblanco. Este POKéMON aumenta su\nactividad cuando bajan las temperaturas."
          leaf_green: "Guarda energía térmica en su cuerpo.\nNada a 15 km por hora sin parar hasta\nen aguas muy frías."
grimer:
