          fire_red: "せかいいち　おおきい　はなびらから\nアレルギーを　おこす　かふんを\nオニの　ように　ばらまく。"
          leaf_green: "はなびらが　おおきいほど　たくさん\nかふんを　だすが　あたまが\nおもたくて　つかれてしまうという。"
        en:
          fire_red: "Its petals are the largest in the world.\nIt fiendishly scatters allergy-causing\npollen from its petals."
          leaf_green: "The larger its petals, the more toxic\npollen it contains. Its big head is heavy\nand hard to hold up."
        fr:
          fire_red: "Ses pétales sont les plus grands au\nmonde. A cause du pollen qu’ils\nlibèrent, ce POKéMON peut causer\nde terribles allergies."
          leaf_green: "Plus ses pétales sont grands, plus ils\ncontiennent de pollen toxique."
        it:
          fire_red: "Dai suoi petali, che pare siano i più\ngrandi del mondo, si diffonde un\npolline che causa allergie."
          leaf_green: "Più grandi sono i petali, maggiore è la\nquantità di polline tossico che\ncontengono. La testa è molto pesante."
        de:
          fire_red: "Es hat die größten Blütenblätter auf der\nWelt. Allergie verursachende Pollen\nwerden auf verschlagene Art von\nihnen verstreut."
          leaf_green: "Je größer die Blütenblätter, desto mehr\ngiftige Pollen sind in der Blüte enthalten."
        es:
          fire_red: "Tiene unos pétalos inmensos.\nLibera con la mejor sonrisa un polen\nque provoca agudos ataques de alergia."
          leaf_green: "Cuanto mayores son sus pétalos, más\ntóxico es su polen. Le pesa la cabeza\ny le cuesta mantenerla erguida."
