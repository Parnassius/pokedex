          leaf_green: "ムシの　からだより　おおきくなった\nキノコの　いしで　かつどうする。\nしめった　ばしょを　このむという。"
        en:
          fire_red: "It scatters toxic spores from the\nmushroom cap. In China, the spores are\nused as herbal medicine."
          leaf_green: "A host-parasite pair in which the parasite\nmushroom has taken over the host bug.\nPrefers damp places."
        fr:
          fire_red: "Il dégage des spores toxiques depuis\nson chapeau en forme de champignon.\nEn Chine, ces spores sont utilisées\ncomme des herbes médicinales."
          leaf_green: "Ce POKéMON résulte de la symbiose entre\nun parasite et un insecte. Le champignon a\npris le contrôle de son hôte."
        it:
          fire_red: "Diffonde spore tossiche, che in Cina si\nutilizzano come erba medicinale."
          leaf_green: "Una coppia ospite-parassita dove il\nsecondo sovrasta l’organismo ospitante.\nAma gli ambienti umidi."
        de:
          fire_red: "Es verstreut giftige Sporen aus seinem\nPilzhut. In China wird aus den Sporen\nKräutermedizin gewonnen."
          leaf_green: "Dieses POKéMON besteht aus einem Wirt und\neinem Parasiten. Es bevorzugt feuchte\nUmgebungen."
        es:
          fire_red: "Libera esporas tóxicas a través de la\nseta que lo cubre. En China, las esporas\nse usan como remedios medicinales."
          leaf_green: "Una pareja de parásitos en la que la seta\ndomina al bicho.\nPrefieren los sitios húmedos."
