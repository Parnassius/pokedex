      descriptions:
        jp_kana:
          fire_red: "うみの　ちかくで　みつかる。\nおおきな　ハサミは　もぎとっても\nあとから　また　はえてくる。"
          leaf_green: "ハサミは　きょうりょくな　ぶきであり\nよこに　あるくとき　からだの\nバランスをとる　やくめも　はたす。"
        en:
          fire_red: "It can be found near the sea. The large\npincers grow back if they are torn out of\ntheir sockets."
          leaf_green: "Its pincers are not only powerful weapons,\nthey are used for balance when walking\nsideways."
        fr:
          fire_red: "On trouve ce POKéMON près de la mer.\nSes grosses pinces peuvent repousser\nsi elles se font arracher."
          leaf_green: "Ses pinces sont des armes très\npuissantes. Elles lui servent aussi\nà garder l’équilibre."
        it:
          fire_red: "Si trova vicino al mare. Le grandi\nchele, se asportate, ricrescono."
          leaf_green: "Le sue chele, potenti armi, lo mantengono\nin equilibrio quando cammina lateralmente."
        de:
          fire_red: "Es kommt vor allem nahe des Meeres\nvor. Die großen Scheren wachsen nach,\nwenn sie vom Körper abgetrennt\nwurden."
          leaf_green: "KRABBY setzt seine Scheren nicht nur als\nWaffen ein. Es hält damit beim Gehen die\nBalance."
        es:
          fire_red: "Es fácil encontrarlo cerca del mar.\nLas largas pinzas que tiene vuelven\na crecer si se las quitan de su sitio."
          leaf_green: "Usa las pinzas como potentes armas\ny para equilibrarse cuando camina\nde lado."
kingler:
  species_id: 99
  names:
    jp_kana: キングラー
