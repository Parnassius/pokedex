      descriptions:
        jp_kana:
          fire_red: "てごろな　あいてを　みつけると\nすぐに　なぐりかかってくるので\nちいさくても　ゆだんならない。"
          leaf_green: "いつでも　げんきいっぱい。\nつよくなるため　まけても　まけても\nあいてに　たちむかっていく。"
        en:
          fire_red: "Even though it is small, it can’t be\nignored because it will slug any handy\ntarget without warning."
          leaf_green: "It is always bursting with energy. To make\nitself stronger, it keeps on fighting even\nif it loses."
        fr:
          fire_red: "Même s’il est petit, il vaut mieux ne pas\nl’ignorer: il frappe fort et souvent sans\nprévenir."
          leaf_green: "Il déborde d’énergie. Il se bat tout\nle temps pour être plus fort, quitte\nà perdre un combat."
        it:
          fire_red: "È piccolo, ma non passa inosservato,\nperché colpisce senza preavviso qualsiasi\noggetto nelle vicinanze."
          leaf_green: "È sempre traboccante di energia. Per\nrinforzarsi continua a combattere anche\ndopo aver perso."
        de:
          fire_red: "Es ist zwar nicht groß, aber dennoch\nunübersehbar, denn es schlägt jederzeit\nohne Vorwarnung zu."
          leaf_green: "Es strotzt vor Energie. Um noch stärker zu\nwerden, kämpft es weiter, auch wenn es\nverloren hat."
        es:
          fire_red: "Aunque es pequeño, es mejor no ignorarlo\nporque atacará cualquier objetivo sin\nprevio aviso."
          leaf_green: "Ataca siempre con mucha energía. Para\nfortalecerse a sí mismo, sigue luchando\naunque pierda."
hitmontop:
