          leaf_green: "いまでも　まぼろしの　ポケモンと\nいわれる。そのすがたを　みたものは\nぜんこくでも　ほとんど　いない。"
        en:
          fire_red: "A POKéMON of South America that was\nthought to have been extinct. It is very\nintelligent and learns any move."
          leaf_green: "So rare that it is still said to be a\nmirage by many experts. Only a few people\nhave seen it worldwide."
        fr:
          fire_red: "On pensait que ce POKéMON originaire\nd’Amérique du Sud avait disparu. Il\nest très intelligent et peut apprendre\nn’importe quelle capacité."
          leaf_green: "Unique et rare, son existence est remise\nen cause par les experts. Peu nombreux\nsont ceux qui l’ont vu."
        it:
          fire_red: "POKéMON sudamericano che a lungo si\nè creduto estinto. Molto intelligente, può\napprendere qualsiasi mossa."
          leaf_green: "È così raro che molti esperti sostengono\nsia un’illusione. Pochi al mondo l’hanno\nvisto."
        de:
          fire_red: "Ein POKéMON aus Südamerika, das\nals ausgestorben galt. Es ist sehr\nintelligent und kann jede Attacke\nlernen."
          leaf_green: "Viele Experten bezweifeln die Existenz\ndieses POKéMON. Nur wenige Personen haben\nes gesehen."
        es:
          fire_red: "Procede de Sudamérica y se pensaba que\nse había extinguido. Es muy inteligente y\ncapaz de aprender cualquier movimiento."
          leaf_green: "Es tan raro que muchos expertos opinan\nque es sólo una ilusión. Sólo unos pocos\nlo han visto."
