          leaf_green: "２つの　どくガスの　せいぶんが\nながい　じかん　ふきだまる　ばしょで\nふたごの　ドガースが　でるらしい。"
        en:
          fire_red: "Very rarely, a sudden mutation can result\nin two small KOFFING twins becoming\nconjoined as a WEEZING."
          leaf_green: "Where two kinds of poison gases meet, two\nKOFFING can fuse into a WEEZING over\nmany years."
        fr:
          fire_red: "Il peut arriver que deux SMOGO\nmutent et s’associent pour former un\nSMOGOGO, mais c’est très rare."
          leaf_green: "Deux SMOGO peuvent se combiner en un\nSMOGOGO en mélangeant leurs gaz."
        it:
          fire_red: "Una rarissima mutazione può trasformare\ndue KOFFING gemelli in un WEEZING."
          leaf_green: "Quando due tipi di gas velenosi vengono a\ncontatto, due KOFFING possono fondersi\nin un WEEZING."
        de:
          fire_red: "Sehr selten führt eine plötzliche\nMutation eines Zwillings-SMOGON\nzu einer Verbindung zu SMOGMOG."
          leaf_green: "Dieses POKéMON entwickelt sich im Lauf der\nJahre, wenn sich zwei SMOGON vermischen."
        es:
          fire_red: "En ocasiones, puede mutar y originar\ndos KOFFING pequeños idénticos que,\nal unirse, forman el WEEZING."
          leaf_green: "Donde se junten 2 tipos de gases\nvenenosos, 2 KOFFING podrán fusionarse\ny convertirse en un WEEZING."
rhyhorn:
  species_id: 111
