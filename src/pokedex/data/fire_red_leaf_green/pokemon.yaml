        special_defense: 0
        speed: 0
      types:
        - water
      egg_groups:
        - monster
        - water_1
      abilities:
        - torrent
      descriptions:
        jp_kana:
          fire_red: "ちじょうでは　からだを　ささえるのが\nつらいので　よつんばいだが\nとても　すばやく　いどうできる。"
          leaf_green: "おおきく　ちからづよい　あごで\nかみつくと　そのまま　くびをふって\nあいてを　ずたずたに　ひきちぎる。"
        en:
          fire_red: "It is hard for it to support its own\nweight out of water, so it gets down on\nall fours. But it moves fast."
          leaf_green: "When it bites with its massive and\npowerful jaws, it shakes its head and\nsavagely tears up its victim."
        fr:
          fire_red: "Il a du mal à se mouvoir hors de l’eau,\nalors il marche à quatre pattes. Il reste\ntrès rapide."
          leaf_green: "Quand il mord avec sa puissante mâchoire,\nil secoue sa tête pour déchiqueter sa\npauvre victime."
        it:
          fire_red: "Non potendo reggere il suo grande peso\nfuori dall’acqua, si muove a quattro\nzampe, ma è molto rapido."
          leaf_green: "Mordendo con le grandi e potenti\nmandibole, agita il capo riducendo la\nvittima in brandelli."
        de:
          fire_red: "Aufgrund seines Gewichts verlässt es das\nWasser nur selten. Daher läuft es an Land\nauf allen Vieren."
          leaf_green: "Wenn es mit seinem kräftigen Kiefer\nzubeißt, schüttelt es seinen Kopf und\nreißt seine Opfer in Stücke."
        es:
          fire_red: "Le cuesta soportar su propio peso fuera\ndel agua, así que va a cuatro patas. Aun\nasí es rápido."
          leaf_green: "Al morder con sus feroces fauces, mueve\nla cabeza para despedazar salvajemente\na su víctima."
sentret:
  species_id: 161
  names:
    jp_kana: オタチ
