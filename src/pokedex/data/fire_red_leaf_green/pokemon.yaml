          leaf_green: "がんせきのような　かたい　からだで\nできている。ダイナマイトで\nばくはしても　ダメージを　うけない。"
        en:
          fire_red: "It is enclosed in a hard shell that is as\nrugged as slabs of rock. It sheds skin\nonce a year to grow larger."
          leaf_green: "Its boulder-like body is extremely hard.\nIt can easily withstand dynamite blasts\nwithout taking damage."
        fr:
          fire_red: "GROLEM est entouré d’une carapace\naussi rugueuse que la roche. Il s’en\ndébarrasse une fois par an pendant\nsa mue pour pouvoir grandir."
          leaf_green: "Son corps de pierre est indestructible.\nIl peut supporter des explosions de\ndynamite."
        it:
          fire_red: "È avvolto in un guscio duro e ruvido\ncome la roccia. Ogni anno muta\nquesta scorza, crescendo."
          leaf_green: "Il suo durissimo corpo roccioso resiste\nad esplosioni dinamitarde senza subire\nalcun danno."
        de:
          fire_red: "Es ist von einem harten Panzer\numgeben, der aus Steintafeln besteht.\nEs häutet sich jährlich, um zu wachsen."
          leaf_green: "Der Körper dieses POKéMON ist steinhart.\nEr hält sogar einer Dynamit-Explosion\nstand."
        es:
          fire_red: "Está encerrado en un duro caparazón\nformado por escamas de piedra. Para\nfortalecerse, lo muda una vez al año."
          leaf_green: "Su cuerpo rocoso es superduro. Soporta\nexplosiones de dinamita sin sufrir daño."
ponyta:
