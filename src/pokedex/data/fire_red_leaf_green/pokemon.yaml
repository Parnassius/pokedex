          leaf_green: "カラが　かたくなるまえに\nつよい　しょうげきを　うけると\nなかみが　でてしまうので　ちゅうい。"
        en:
          fire_red: "Even though it is encased in a sturdy\nshell, the body inside is tender.\nIt can’t withstand a harsh attack."
          leaf_green: "This POKéMON is vulnerable to attack\nwhile its shell is soft, exposing its weak\nand tender body."
        fr:
          fire_red: "Bien qu’il soit entouré d’une carapace\nsolide, le reste de son corps est si\nmou qu’il ne résisterait pas à une\nattaque violente."
          leaf_green: "Il est vulnérable aux attaques tant\nque sa carapace est molle, car il\nexpose son corps tendre et mou."
        it:
          fire_red: "Il corpo all’interno del guscio è fragile\ne non può resistere ad attacchi\nparticolarmente veementi."
          leaf_green: "Quando la sua corazza è morbida, il corpo\nfragile di questo POKéMON è più\nvulnerabile agli attacchi."
        de:
          fire_red: "In seiner harten Schale ist ein weicher\nKörper. Einem brutalen Angriff hat es\nnichts entgegenzusetzen."
          leaf_green: "Während der Panzer dieses POKéMON sehr\nweich ist, bietet er keinen großen Schutz\nvor Attacken."
        es:
          fire_red: "Aunque tiene una coraza muy dura,\nel cuerpo del POKéMON es blando.\nUn ataque violento puede acabar con él."
          leaf_green: "Este POKéMON es vulnerable al ataque\ncuando su coraza es blanda y no lo\nprotege del todo."
butterfree:
