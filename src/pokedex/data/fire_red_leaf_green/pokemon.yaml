        jp_kana:
          fire_red: "せなかの　カラは　くずれやすいが\nときどき　たいないを　めぐっている\nこうねつの　ほのおが　ふきだす。"
          leaf_green: "せなかのカラは　ひふが　ひえて\nかたまっただけ。なにかが\nふれただけで　かんたんに　くずれる。"
        en:
          fire_red: "Its brittle shell occasionally spouts\nintense flames that circulate throughout\nits body."
          leaf_green: "The shell on its back is just skin that\nhas cooled and hardened. It breaks easily\nwith a slight touch."
        fr:
          fire_red: "Sa coquille, très fragile, projette\nrégulièrement des flammes qui\ncirculent dans tout son corps."
          leaf_green: "La coquille sur son dos est une partie de\nsa peau qui s’est refroidie et solidifiée.\nElle est très fragile."
        it:
          fire_red: "A volte, intense fiamme scaturiscono dal\nfragile guscio, circolando lungo tutto il\nsuo corpo."
          leaf_green: "Il guscio sul dorso è pelle raffreddata e\nsecca. Si rompe facilmente al minimo\ntocco."
        de:
          fire_red: "Aus seinem porösen Schneckengehäuse\nsprudeln Feuerfontänen, die seinen Körper\ndurchfluten."
          leaf_green: "Das Haus auf seinem Rücken ist\nausgehärtete Haut. Es zerbricht schon\nbei der geringsten Berührung."
        es:
          fire_red: "En ocasiones, lanza por la resbaladiza\ncoraza que tiene intensas llamaradas\nque recorren todo su cuerpo."
          leaf_green: "La concha que tiene en el lomo son\nrestos de piel enfriada y endurecida,\nque se rompe con sólo tocarla."
swinub:
  species_id: 220
  names:
