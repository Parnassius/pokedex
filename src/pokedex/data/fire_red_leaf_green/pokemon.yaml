      descriptions:
        jp_kana:
          fire_red: "ひとの　かおのような　ツボミから\nでんせつの　マンドラゴラの　いっしゅ\nではないかと　ささやかれている。"
          leaf_green: "ちいさい　むしを　とらえて　たべる。\nあしの　ねっこを　つかい　すいぶんを\nほきゅうすることも　あるらしい。"
        en:
          fire_red: "Its bud looks like a human face. Because\nof the bud, it is rumored to be a type of\nlegendary mandrake plant."
          leaf_green: "A carnivorous POKéMON that traps and eats\nbugs. It appears to use its root feet to\nreplenish moisture."
        fr:
          fire_red: "Son bourgeon ressemble à un visage\nhumain. Selon la légende, CHETIFLOR\nserait un type de mandragore légendaire."
          leaf_green: "Un POKéMON carnivore qui se nourrit de\npetits insectes. Il se désaltère en puisant\nde l’eau par les racines de ses pieds."
        it:
          fire_red: "Il bocciolo somigliante ad un volto\numano fa ritenere che si tratti di un\nleggendario esemplare di mandragola."
          leaf_green: "POKéMON carnivoro che caccia e si nutre\ndi insetti. Usa le radici per assorbire\nl’umidità."
        de:
          fire_red: "Seine Knospe ähnelt einem Menschen-\ngesicht. Man sagt, dass es mit der\nlegendären Mandragora verwandt ist."
          leaf_green: "Dieses POKéMON ernährt sich von kleinen\nInsekten. Mit den Wurzeln zieht es Wasser\naus dem Boden."
        es:
          fire_red: "Tiene cara de persona. Por el aspecto\nque tiene se ha comentado que podría\nser algún tipo de mandrágora legendaria."
          leaf_green: "Un POKéMON carnívoro que caza insectos.\nUsa sus raíces para absorber humedad."
weepinbell:
