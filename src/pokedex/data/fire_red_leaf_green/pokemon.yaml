          leaf_green: "あたまのうえに　さいた　ハナは\nきおんに　よって　ひらいたり\nとじたりする　せいしつを　もつ。"
        en:
          fire_red: "It spreads its petals to absorb sunlight.\nIt also floats in the air to get closer to\nthe sun."
          leaf_green: "The bloom on top of its head opens and\ncloses as the temperature fluctuates up\nand down."
        fr:
          fire_red: "Il étend ses pétales pour absorber la\nlumière du soleil. Il flotte pour se\nrapprocher du soleil."
          leaf_green: "Le bourgeon sur sa tête s’ouvre et se\nferme en fonction des fluctuations de la\ntempérature ambiante."
        it:
          fire_red: "Spalanca i petali per assorbire la luce\nsolare. Fluttua nell’aria per essere più\nvicino al sole."
          leaf_green: "Il fiore sul capo si apre e si chiude con\nil mutare della temperatura."
        de:
          fire_red: "Es öffnet seine Blüte, um Sonnenlicht\naufzunehmen. Es schwebt in der Luft, um\nder Sonne näher zu sein."
          leaf_green: "Temperaturschwankungen veranlassen es,\ndie Blüte auf seinem Kopf immer zu öffnen\noder zu schließen."
        es:
          fire_red: "Abre los pétalos para absorber la luz\nsolar. También flota en el aire para estar\nmás cerca del Sol."
          leaf_green: "La flor que tiene en la cabeza\nse abre y cierra según suba o baje\nla temperatura."
jumpluff:
  species_id: 189
