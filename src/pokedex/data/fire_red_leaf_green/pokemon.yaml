      descriptions:
        jp_kana:
          fire_red: "ちいさくても　おとなを　ビリビリ\nさせるほどの　でんげきを　はなてる。\nただし　じぶんも　おどろいてしまう。"
          leaf_green: "まだまだ　でんきを　ためるのがへた。\nおどろいたり　わらったりすると\nすぐに　ほうでん　してしまう。"
        en:
          fire_red: "Despite its small size, it can zap even\nadult humans. However, if it does so, it\nalso surprises itself."
          leaf_green: "It is not yet skilled at storing\nelectricity. It may send out a jolt if\namused or startled."
        fr:
          fire_red: "Malgré sa petite taille, il peut\nélectrocuter des adultes. Il se\nsurprend lui-même en le faisant."
          leaf_green: "Il ne sait pas encore stocker\nl’électricité. Il envoie des décharges\nquand il veut jouer ou quand il a peur."
        it:
          fire_red: "Nonostante sia minuto può abbattere anche\nuna persona adulta. Ma se lo fa,\nsorprende persino se stesso."
          leaf_green: "Non è ancora bravo ad immagazzinare\nelettricità. Se si emoziona o è divertito\nne perde un po’."
        de:
          fire_red: "Obwohl es so klein ist, kann es sogar\nErwachsene überwältigen. Tritt dies ein,\nist es selbst erstaunt."
          leaf_green: "Es kann noch nicht mit Elektrizität\numgehen. Es wirft Blitze, wenn es sich\nfreut oder erstaunt ist."
        es:
          fire_red: "A pesar de su pequeño tamaño, ataca\nincluso a los humanos, algo que le\nsorprende hasta a él."
          leaf_green: "Todavía no domina el almacenamiento\nde electricidad, y descarga rayos\ncuando se divierte o se asusta."
cleffa:
  species_id: 173
  names:
    jp_kana: ピィ
    en: CLEFFA
    fr: MELO
    it: CLEFFA
    de: PII
    es: CLEFFA
