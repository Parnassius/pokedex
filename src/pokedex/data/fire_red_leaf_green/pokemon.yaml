        - chlorophyll
      descriptions:
        jp_kana:
          fire_red: "なんごくに　おおく　せいそくする。\nおどるとき　はなびらが　ふれあい\nここちよい　おとが　なりひびく。"
          leaf_green: "ときおり　キレイハナが　あつまって\nおどるような　しぐさを　みせる。\nたいようをよぶ　ぎしき　といわれる。"
        en:
          fire_red: "Plentiful in the tropics. When it dances,\nits petals rub together and make a\npleasant ringing sound."
          leaf_green: "BELLOSSOM gather at times and appear to\ndance. They say that the dance is a\nritual to summon the sun."
        fr:
          fire_red: "Ils vivent en masse dans les\ntropiques. Quand ils dansent, leurs\npétales se frottent en créant un son\nmélodieux."
          leaf_green: "JOLIFLOR danse la majorité du temps.\nCertains pensent que c’est un rituel pour\nappeler le soleil."
        it:
          fire_red: "Molto comune ai tropici. Quando danza,\nsfrega i petali producendo un piacevole\ntintinnio."
          leaf_green: "A volte gruppi di BELLOSSOM sembrano\ndanzare. Si dice che sia un rito per\ninvocare il sole."
        de:
          fire_red: "Es lebt in den Tropen. Beim Tanzen reiben\nseine Blüten aneinander und erzeugen ein\nwohliges Geräusch."
          leaf_green: "BLUBELLAs kommen zusammen, um zu tanzen.\nMan sagt, dieser Tanz sei ein Ritual, um\nder Sonne zu huldigen."
        es:
          fire_red: "Abundan en los trópicos. Cuando baila,\nsus pétalos se rozan creando un agradable\ntintineo."
          leaf_green: "Los BELLOSSOM suelen reunirse para\nbailar. Dicen que sus danzas son un ritual\npara invocar al Sol."
marill:
  species_id: 183
