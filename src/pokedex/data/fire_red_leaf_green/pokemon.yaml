      descriptions:
        jp_kana:
          fire_red: "きせつふうに　ながされつつ\nしそんを　ふやすため　わたほうしを\nせかいの　あちこちに　ばらまく。"
          leaf_green: "いちど　かぜに　のってしまうと\nわたほうしを　たくみに　あやつって\nせかいいっしゅう　だってしてしまう。"
        en:
          fire_red: "It drifts on seasonal winds and spreads\nits cotton-like spores all over the world \nto make more offspring."
          leaf_green: "Once it catches the wind, it deftly\ncontrols its cotton-puff spores to float,\neven around the world."
        fr:
          fire_red: "Il se laisse porter par le vent et répand\nses spores duveteuses dans le monde\npour se multiplier."
          leaf_green: "Quand il est pris dans le vent, il utilise\nses appendices de coton pour voler\nautour du monde."
        it:
          fire_red: "Sospinto dai venti stagionali, sparge\novunque i semi simili al cotone\nper moltiplicarsi."
          leaf_green: "Sospinto dal vento, controlla con abilità\ni semi a batuffolo di cotone per volare\npersino intorno al mondo."
        de:
          fire_red: "Es lässt sich von Winden tragen und\nverstreut auf diese Weise seinen Samen\nüber die ganze Welt."
          leaf_green: "Wenn es einmal vom Wind erfasst wurde,\nwird es mit seinen Fallschirmchen um den\nganzen Erdball getragen."
        es:
          fire_red: "Se desplaza con los vientos estacionales\ny suelta sus esporas por todo el mundo\npara reproducirse."
          leaf_green: "Si es llevado por el viento, podría dar\nla vuelta al mundo controlando el vuelo\ncon sus esporas."
aipom:
