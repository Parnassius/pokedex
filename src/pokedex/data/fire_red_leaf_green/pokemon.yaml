          leaf_green: "くびの　まわりから　だされる\nスパイシーな　かおりを　かいでいると\nなぜだか　たたかいたくなる。"
        en:
          fire_red: "A spicy aroma emanates from around its\nneck. The aroma acts as a stimulant to\nrestore health."
          leaf_green: "The scent of spices comes from around\nits neck. Somehow, sniffing it makes you\nwant to fight."
        fr:
          fire_red: "Un arôme épicé émane de son cou. Cet\narôme agit comme un stimulant pour lui\nfaire récupérer son énergie."
          leaf_green: "Une odeur épicée provient de son cou. Si\non la respire, cette odeur donne envie de\nse battre."
        it:
          fire_red: "Dal suo collo si propaga un profumo\nvivace. È un profumo che stimola la\nguarigione."
          leaf_green: "Dal suo collo si spande un profumo di\nspezie, che spinge alla lotta chi lo\navverte."
        de:
          fire_red: "Ein würziges Aroma geht von seinen\nBlättern aus. Das Aroma soll\ngesundheitsfördernd sein."
          leaf_green: "Die Blätter um seinen Hals verbreiten\neinen würzigen Duft, der beim Einatmen den\nKampfgeist anregt."
        es:
          fire_red: "Emana por el cuello un intenso aroma,\nque actúa como estimulante para\nrecuperar salud."
          leaf_green: "Su cuello huele a especias. Dicen que,\npor alguna razón, su simple olor incita\na luchar."
