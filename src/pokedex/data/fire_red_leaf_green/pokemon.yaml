          leaf_green: "ほんとうは　おくびょうで　こわがり。\nおそわれると　ひっしに　てあしを\nふって　てきを　おいはらおうとする。"
        en:
          fire_red: "Because its fangs are too heavy, it\nalways keeps its head tilted down.\nHowever, its BITE is powerful."
          leaf_green: "It is actually timid and easily spooked.\nIf attacked, it flails about to fend off\nits attacker."
        fr:
          fire_red: "Ses crocs sont trop lourds, ce qui lui\nfait pencher la tête. Attention à sa\nMORSURE."
          leaf_green: "Il est du genre timide et peureux. S’il\nest attaqué, il s’agite dans tous les\nsens pour repousser son agresseur."
        it:
          fire_red: "Sta sempre con il capo piegato in avanti\nperché ha zanne troppo pesanti. Il suo\nMORSO è potente."
          leaf_green: "È timido e facile da spaventare. Se è\nattaccato, inizia ad agitarsi per tenere\nlontano il nemico."
        de:
          fire_red: "Weil seine Reißzähne so schwer sind, ist\nsein Kopf gesenkt. Sein BISS ist jedoch\nschmerzhaft."
          leaf_green: "Es ist sehr scheu und ängstlich.\nAttackiert man es, fuchtelt es wild herum,\num den Gegner abzuschütteln."
        es:
          fire_red: "Como le pesan mucho los colmillos,\nse le va la cabeza hacia adelante.\nSu MORDISCO es muy potente."
          leaf_green: "Es muy tímido y asustadizo. Si se siente\natacado, se moverá para evitar al\nenemigo."
