          leaf_green: "つめたい　みずのなかで　せいかつ。\nあたりが　すずしくなると　エサを\nさがしに　ちじょうにも　あらわれる。"
        en:
          fire_red: "When it walks around on the ground,\nit coats its body with a slimy, poisonous\nfilm."
          leaf_green: "This POKéMON lives in cold water. It will\nleave the water to search for food when\nit gets cold outside."
        fr:
          fire_red: "Quand il marche sur la terre ferme, il\nrépand une fine couche de poison tout le\nlong de son corps."
          leaf_green: "Ce POKéMON vit en eau froide. Il sort de\nl’eau pour se nourrir quand il fait froid à\nl’extérieur."
        it:
          fire_red: "Quando cammina sulla terraferma, ricopre\nil corpo di una pellicola vischiosa e\nvelenosa."
          leaf_green: "È un POKéMON che vive nell’acqua fredda.\nQuando si abbassa la temperatura, esce\ndall’acqua alla ricerca di cibo."
        de:
          fire_red: "Bewegt es sich an Land, bedeckt es seinen\ngesamten Körper mit einem schleimigen\nGiftfilm."
          leaf_green: "Dieses POKéMON lebt in Eiswasser. Wird es\nan Land kalt, verlässt es das Wasser und\nsucht nach Futter."
        es:
          fire_red: "Cuando camina por el suelo, se envuelve\nen una película suave y venenosa."
          leaf_green: "Este POKéMON vive en aguas frías.\nY cuando refresca, sale del agua\npara buscar comida."
quagsire:
