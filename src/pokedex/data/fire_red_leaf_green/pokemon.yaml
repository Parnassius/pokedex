          leaf_green: "からだの　いちぶを　きりとられても\nじこさいせいして　もとに　もどる\nなぞの　おおい　いきものだ。"
        en:
          fire_red: "It appears in large numbers by seashores.\nAt night, its central core flashes with a\nred light."
          leaf_green: "An enigmatic POKéMON that can effortlessly\nregenerate any appendage it loses in\nbattle."
        fr:
          fire_red: "On peut voir des STARI en grand nombre\nprès des côtes. La nuit, le centre de son\ncorps clignote d’une lumière rouge."
          leaf_green: "Ce POKéMON mystérieux peut\nrégénérer ses appendices\nsectionnés lors d’un combat."
        it:
          fire_red: "Se ne trovano molti in riva al mare.\nDi notte, il nucleo al centro del corpo\nlampeggia di una luce rossa."
          leaf_green: "Molto enigmatico, è in grado di rigenerare\nsenza fatica qualsiasi appendice persa\nlottando."
        de:
          fire_red: "Es taucht in großer Anzahl an Ufern auf.\nNachts leuchtet der Kern in seiner Mitte\nrot auf."
          leaf_green: "Ein seltsames POKéMON, das seine Kräfte\nnach einem Kampf mühelos regeneriert."
        es:
          fire_red: "Suele aparecer en grupos en la orilla\nde la playa. Por la noche, el órgano\ncentral que tiene brilla con una luz roja."
          leaf_green: "Un enigmático POKéMON que puede\nregenerar con facilidad todo apéndice\nque pierda luchando."
starmie:
