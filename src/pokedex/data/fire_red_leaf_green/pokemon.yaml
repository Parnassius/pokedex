          leaf_green: "こどもは　ははおやの　おなかにある\nふくろから　ほとんど　でてこない。\nやく３ねんで　おやばなれする。"
        en:
          fire_red: "The female raises its offspring in a pouch\non its belly. It is skilled at attacking\nusing COMET PUNCH."
          leaf_green: "The infant rarely ventures out of its\nmother’s protective pouch until it is\nthree years old."
        fr:
          fire_red: "La femelle élève sa progéniture dans\nune poche abdominale. Ce POKéMON\nadore utiliser le POING COMETE."
          leaf_green: "Son enfant ne quitte la poche ventrale\nprotectrice qu’à l’âge de 3 ans."
        it:
          fire_red: "La femmina tiene i cuccioli nel marsupio\nche ha sulla pancia. Molto abile nell’uso\ndi COMETAPUGNO."
          leaf_green: "Normalmente il cucciolo non esce dal\nmarsupio protettivo della madre fino\nall’età di 3 anni."
        de:
          fire_red: "Das Weibchen zieht seinen Nachwuchs\nin seiner Bauchtasche auf. Auch im\nAngriff ist es talentiert und setzt\nKOMETENHIEB ein."
          leaf_green: "Das Junge verlässt den schützenden Beutel\nder Mutter erst im Alter von drei Jahren."
        es:
          fire_red: "La hembra cría a sus pequeños en la\nbolsa que tiene en la panza. Es muy buena\nusando PUÑO COMETA."
          leaf_green: "El bebé no suele salir de la segura bolsa\nde su madre hasta que cumple los tres\naños."
