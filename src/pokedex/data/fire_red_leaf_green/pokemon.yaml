        en:
          fire_red: "This POKéMON was regenerated from the\nfossil of an ancient creature. It protects\nitself with a hard shell."
          leaf_green: "A POKéMON that was regenerated from a\nfossil found in what was once the ocean\nfloor long ago."
        fr:
          fire_red: "Ce POKéMON a été reconstitué à partir\ndu fossile d’une ancienne créature. Il\nse protège à l’aide de sa carapace."
          leaf_green: "Un POKéMON reconstitué à partir d’un\nfossile trouvé dans un site préhistorique."
        it:
          fire_red: "Questo POKéMON è stato rigenerato dal\nfossile di un’antica creatura. È protetto\nda un guscio coriaceo."
          leaf_green: "POKéMON rigenerato da un fossile\nrinvenuto in quello che un tempo era il\nfondo oceanico."
        de:
          fire_red: "Dieses POKéMON wurde aus dem\nFossil einer altertümlichen Kreatur\ngeschaffen. Es schützt sich mittels\neines harten Panzers."
          leaf_green: "Ein aus einem Fossil wieder belebtes\nURZEIT-POKéMON, welches vor Äonen auf\ndem Meeresgrund lebte."
        es:
          fire_red: "Es un POKéMON regenerado a partir\nde un fósil de una criatura ancestral.\nEstá protegido por un duro caparazón."
          leaf_green: "Un POKéMON recuperado a partir\nde un fósil encontrado en lo que hace\naños fue el fondo oceánico."
