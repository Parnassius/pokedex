      descriptions:
        jp_kana:
          fire_red: "くらやみで　だれもいないのに\nみられているような　きがしたら\nそこに　ゴーストが　いるのだ。"
          leaf_green: "ブロックの　かべも　すりぬけるので\nいじげん　くうかんの　じゅうにん\nではないかと　うわさに　なっている。"
        en:
          fire_red: "If you get the feeling of being watched\nin darkness when nobody is around,\nHAUNTER is there."
          leaf_green: "Because of its ability to slip through\nblock walls, it is said to be from another\ndimension."
        fr:
          fire_red: "Si vous avez l’impression d’être\nsurveillé dans le noir, c’est sûrement\nqu’un SPECTRUM est dans le coin."
          leaf_green: "Parce qu’il peut traverser les murs,\non raconte que ce POKéMON vient\nd’une autre dimension."
        it:
          fire_red: "Se da soli, al buio, si ha l’impressione\ndi essere osservati da qualcuno, si\ntratta di HAUNTER."
          leaf_green: "Per l’abilità di sgattaiolare via\nattraverso i muri, si pensa venga\nda un’altra dimensione."
        de:
          fire_red: "Falls du im Dunkeln das Gefühl hast,\nbeobachtet zu werden und niemand ist\nzu sehen, ist es bestimmt ALPOLLO."
          leaf_green: "Dieses POKéMON stammt angeblich aus einer\nanderen Dimension, da es durch Wände\ngehen kann."
        es:
          fire_red: "Cuando tienes la sensación de que te\nestán observando, seguro que es porque\nHAUNTER está cerca."
          leaf_green: "Por su habilidad para atravesar muros\nde piedra, se dice que viene de otra\ndimensión."
gengar:
  species_id: 94
  names:
    jp_kana: ゲンガー
    en: GENGAR
