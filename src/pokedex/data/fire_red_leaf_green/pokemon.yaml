          leaf_green: "いっしゅんで　きたなく　にごった\nみずも　きよめる　ちからをもつ。\nきたかぜの　うまれかわり　という。"
        en:
          fire_red: "This POKéMON races across the land.\nIt is said that north winds will somehow\nblow whenever it appears."
          leaf_green: "Said to be the reincarnation of north\nwinds, it can instantly purify filthy,\nmurky water."
        fr:
          fire_red: "Un POKéMON qui parcourt les plaines.\nLe vent du Nord souffle à chaque fois\nqu’il apparaît."
          leaf_green: "Il serait la réincarnation du vent du\nNord. Il peut purifier instantanément\nles eaux polluées."
        it:
          fire_red: "Ama correre in lungo e in largo.\nSi dice che ogni volta che appare,\nsoffino i venti del nord."
          leaf_green: "Si dice che sia la reincarnazione dei\nventi nordici. Può purificare all’istante\nl’acqua torbida e putrida."
        de:
          fire_red: "Dieses POKéMON jagt über das Land und\nman sagt, der kalte Nordwind begleitet es\nauf seinen Wegen."
          leaf_green: "Man sagt, es sei die Wiedergeburt des\nNordwindes. Es kann verschmutztes Wasser\nim Nu reinigen."
        es:
          fire_red: "Este POKéMON corre por la tierra. Dicen\nque siempre que aparece, soplan vientos\ndel norte."
          leaf_green: "Conocido como la reencarnación de los\nvientos del norte, puede purificar aguas\nturbias y sucias."
