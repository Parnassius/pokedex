        jp_kana:
          fire_red: "２ほんの　あしは　はったつしており　\nちじょうで　くらせるのに　なぜか\nすいちゅう　せいかつが　すき。"
          leaf_green: "りくでも　すいちゅうでも　くらせる。\nちじょうでは　いつも　あせをかき\nひふを　ぬめぬめ　させている。"
        en:
          fire_red: "Its two legs are well developed.\nEven though it can live on the ground,\nit prefers living in water."
          leaf_green: "It can live in or out of water. When out\nof water, it constantly sweats to keep its\nbody slimy."
        fr:
          fire_red: "Ses deux jambes sont très développées.\nBien qu’il puisse se déplacer sur la terre\nferme, ce POKéMON préfère vivre sous\nl’eau."
          leaf_green: "Ce POKéMON amphibie transpire\ncontinuellement quand il est hors de\nl’eau afin d’hydrater son corps."
        it:
          fire_red: "Ha arti inferiori molto sviluppati. Può\nvivere anche sulla terraferma, ma\npreferisce l’acqua."
          leaf_green: "Capace di vivere dentro o fuori\ndall’acqua. Sulla terraferma suda\nper mantenere il suo corpo unto."
        de:
          fire_red: "Seine beiden Beine sind gut entwickelt.\nAuch wenn es an Land leben kann,\nbevorzugt es das Leben im Wasser."
          leaf_green: "Dieses POKéMON kann im Wasser und auch an\nLand leben. An Land schwitzt es sich den\nKörper nass."
        es:
          fire_red: "Tiene unas extremidades inferiores\nmuy desarrolladas. Aunque puede vivir\nen tierra, prefiere el medio acuático."
          leaf_green: "Capaz de vivir dentro o fuera del agua.\nFuera del agua suda para mantener\nbaboso su cuerpo."
poliwrath:
