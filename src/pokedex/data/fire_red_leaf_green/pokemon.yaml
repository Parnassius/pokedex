        jp_kana:
          fire_red: "くらやみでも　めが　レーダーの\nやくわりをして　かつどうできる。\nめから　ビームを　はっしゃする。"
          leaf_green: "おおきな　きのしたに　すんでいて\nむしなどを　たべて　いるらしい。\nよるは　あかりのそばに　やってくる。"
        en:
          fire_red: "Its eyes act as radar, enabling it to be\nactive in darkness. The eyes can also\nshoot powerful beams."
          leaf_green: "Lives in the shadows of tall trees where\nit eats bugs. It is attracted by light\nat night."
        fr:
          fire_red: "Ses yeux fonctionnent comme des radars\net lui permettent de voir dans l’obscurité.\nIls peuvent également envoyer des rayons\ntrès puissants."
          leaf_green: "Il vit à l’ombre des grands arbres où il\nse nourrit d’insectes. Il est attiré par la\nlumière."
        it:
          fire_red: "Usa gli occhi come radar per spostarsi\nnel buio, oltre a servirsene per lanciare\npotenti raggi."
          leaf_green: "Vive all’ombra di alberi alti, dove si\nnutre di insetti. Di notte è attirato dalla\nluce."
        de:
          fire_red: "Seine Augen setzt es als Radar ein, damit\nes im Dunkeln sehen kann. Aus ihnen\nkann es auch kräftige Strahlen\nschießen."
          leaf_green: "Dieses POKéMON lebt im Schatten großer\nBäume. Es frisst Insekten und wird von\nLicht angezogen."
        es:
          fire_red: "Los ojos le funcionan como radar.\nGracias a ellos puede moverse en la\noscuridad y disparar potentes rayos."
          leaf_green: "Vive entre las sombras de árboles altos,\ndonde come insectos. Por la noche,\nle atrae la luz."
