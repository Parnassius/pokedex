          leaf_green: "せなかを　まるめると　トゲトゲの\nボールみたいだ。そのまま　ころがって\nぶつかってきたり　にげたりする。"
        en:
          fire_red: "It is adept at attacking with the spines\non its back and its sharp claws while\nquickly scurrying about."
          leaf_green: "Curls up into a spiny ball when\nthreatened. It can roll while curled up\nto attack or escape."
        fr:
          fire_red: "Lorsqu’il fuit en tournoyant sur lui-même,\nil utilise les piques sur son dos ainsi que\nses griffes acérées pour blesser ses\nennemis."
          leaf_green: "Il se roule en boule hérissée de piques\ns’il est menacé. Il peut ainsi s’enfuir ou\nattaquer."
        it:
          fire_red: "Attacca con gli aculei sul dorso e\ngli artigli affilati, per poi fuggire\nrapidamente."
          leaf_green: "Se in pericolo si chiude a riccio. In\nquesta forma può rotolare, attaccare\ne scappare."
        de:
          fire_red: "Es greift gerne mit den Stacheln an seinem\nRücken und seinen scharfen Klauen an,\nwährend es schnell umherrennt."
          leaf_green: "Bei Gefahr igelt sich dieses POKéMON ein.\nZusammengerollt kann es angreifen oder\nfliehen."
        es:
          fire_red: "Suele hacerse una bola y rodar a toda\nvelocidad al tiempo que va clavándole\nlas púas y las garras al enemigo."
          leaf_green: "Ante el peligro, se acurruca en un\nespinoso ovillo. De esta forma puede\nrodar para atacar o escapar."
