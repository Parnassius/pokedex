      descriptions:
        jp_kana:
          fire_red: "ほそくて　じょうぶな　いとを\nはりめぐらして　わなを　しかけると\nえものが　かかるのを　ひたすらまつ。"
          leaf_green: "えものが　ちかくを　とおりかかるまで\nじぶんの　すで　なんにちも　おなじ\nかっこうで　じっと　まちつづける。"
        en:
          fire_red: "It spins a web using fine--but durable--\nthread. It then waits patiently for prey\nto be trapped."
          leaf_green: "It lies still in the same pose for days\nin its web, waiting for its unsuspecting\nprey to wander close."
        fr:
          fire_red: "Il tisse une toile en utilisant un\nfil fin mais solide, puis il attend\ntranquillement sa proie."
          leaf_green: "Il reste immobile dans sa toile pendant\ndes jours. Il attend que sa proie se\nrapproche pour la capturer."
        it:
          fire_red: "Tesse la tela con un filo sottile ma\nforte. Poi attende paziente che una preda\nci finisca dentro."
          leaf_green: "Può rimanere immobile nella tela per\ngiorni, attendendo che s’avvicini un’ignara\npreda."
        de:
          fire_red: "Es spinnt ein Netz aus feinem, aber\nreißfestem Faden. Dann wartet es auf\nBeute, die im Netz zappelt."
          leaf_green: "Es sitzt tagelang regungslos in seinem\nNetz und lauert unvorsichtiger Beute auf,\ndie ihm zu nahe kommt."
        es:
          fire_red: "Teje su telaraña con hilo fino pero\nresistente. Espera pacientemente a que\ncaiga su presa."
          leaf_green: "Mantiene la misma postura en su telaraña\ndurante días, esperando a que se acerque\nuna presa inocente."
