          leaf_green: "せいちょうすると　からだの\nがんせきせいぶんが　へんかして\nくろい　ダイヤモンドのようになる。"
        en:
          fire_red: "It usually lives underground. It searches\nfor food while boring its way through the\nground at 50 miles per hour."
          leaf_green: "As it grows, the stone portions of its\nbody harden to become similar to\nblack-colored diamonds."
        fr:
          fire_red: "ONIX vit généralement sous terre.\nIl cherche de la nourriture en\ncreusant à plus de 80 km/h."
          leaf_green: "Les parties en pierre de son corps\ndurcissent et prennent l’aspect\nd’une sorte de diamant noir."
        it:
          fire_red: "Di solito vive sottoterra. Cerca cibo\nscavando cunicoli nel terreno alla\nvelocità di 80 km/h."
          leaf_green: "Crescendo, la parte rocciosa del suo\ncorpo si indurisce diventando simile a un\ndiamante nero."
        de:
          fire_red: "Es lebt gewöhnlich unter der Erde.\nWährend es sich mit 80 km/h durchs\nErdreich bohrt, sucht es nach Nahrung."
          leaf_green: "Die Steinglieder dieses POKéMON werden mit\nder Zeit hart wie Diamanten und färben\nsich schwarz."
        es:
          fire_red: "Suele vivir bajo tierra. Va buscando\ncomida a medida que se va abriendo\ncamino a 80 km por hora."
          leaf_green: "Cuando crece, las partes rocosas de su\ncuerpo se endurecen. Acaba pareciéndose\na un diamante negro."
drowzee:
  species_id: 96
  names:
