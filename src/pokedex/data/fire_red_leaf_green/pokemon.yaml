          leaf_green: "おおきな　つばさで　おおぞらを\nとびつづけることが　できる。\n１かいも　おりなくても　へいきだ。"
        en:
          fire_red: "Its huge and magnificent wings can keep it\naloft in the sky. It can remain flying a\nwhole day without landing."
          leaf_green: "With its huge and magnificent wings, it can\nkeep aloft without ever having to land\nfor rest."
        fr:
          fire_red: "Ses ailes gigantesques lui permettent\nde planer très haut dans le ciel. Il peut\nrester toute une journée en l’air sans\navoir besoin de se poser."
          leaf_green: "Ses ailes géantes lui permettent de voler\nsur de longues distances sans qu’il ait\nbesoin de se reposer."
        it:
          fire_red: "Grazie alle magnifiche ali, può librarsi\nnel cielo restando in volo anche per\nun’intera giornata."
          leaf_green: "Con le sue enormi e magnifiche ali, è in\ngrado di volare senza mai atterrare\nper riposarsi."
        de:
          fire_red: "Seine riesigen und beeindruckenden\nSchwingen halten es hoch oben am\nHimmel. Es kann einen Tag, ohne zu\nlanden, fliegen."
          leaf_green: "Mit seinen riesigen Flügeln kann dieses\nPOKéMON nahezu pausenlos in der Luft\nbleiben."
        es:
          fire_red: "Gracias a sus espléndidas alas puede\nalcanzar una gran altura y volar durante\nun día entero sin tener que parar."
          leaf_green: "Con sus enormes y magníficas alas, puede\nseguir volando sin tener que aterrizar\npara descansar."
