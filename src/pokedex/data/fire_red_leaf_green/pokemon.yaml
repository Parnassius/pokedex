          leaf_green: "こまかく　はやく　はばたいたら\nもうどくの　りんぷんが\nかぜに　のって　とんでくるぞ。"
        en:
          fire_red: "The wings are protected by rain-repellent\ndust. As a result, this POKéMON can fly\nabout even in rain."
          leaf_green: "In battle, it flaps its wings at great\nspeed to release highly toxic dust into\nthe air."
        fr:
          fire_red: "Ses ailes sont recouvertes d’une\npoudre les protégeant de la pluie.\nCe POKéMON peut donc voler\npendant de grosses averses."
          leaf_green: "En combat, il bat des ailes très\nrapidement pour projeter des poudres\ntoxiques sur ses ennemis."
        it:
          fire_red: "Una polvere idrorepellente gli ricopre\nle ali, permettendogli di volare anche\nsotto la pioggia."
          leaf_green: "In lotta sbatte le ali a gran velocità per\nliberare le sue polveri tossiche nell’aria."
        de:
          fire_red: "Seine Flügel sind mit Wasser abweisendem\nStaub überzogen. Daher kann dieses\nPOKéMON auch bei Regen fliegen."
          leaf_green: "Im Kampf schlägt dieses POKéMON sehr\nschnell mit den Flügeln, um giftigen Staub\nfreizusetzen."
        es:
          fire_red: "Tiene las alas protegidas con una capa\nimpermeable, de ahí que pueda volar\ntambién cuando llueve."
          leaf_green: "En combate, aletea a gran velocidad para\nlanzar al aire sus tóxicos polvillos."
weedle:
