wobbuffet:
  species_id: 202
  names:
    jp_kana: ソーナンス
    en: WOBBUFFET
    fr: QULBUTOKE
    it: WOBBUFFET
    de: WOINGENAU
    es: WOBBUFFET
  forms:
    wobbuffet:
      form_id: 0
      base_stats:
        hp: 190
        attack: 33
        defense: 58
        special_attack: 33
        special_defense: 58
        speed: 33
      evs_yield:
        hp: 2
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - psychic
      egg_groups:
        - amorphous
      abilities:
        - shadow_tag
      descriptions:
        jp_kana:
          fire_red: "まっくろな　シッポを　かくすため\nくらやみで　ひっそりと　いきている。\nじぶんからは　こうげき　しない。"
          leaf_green: "ひかりや　ショックを　きらう。\nこうげきされると　からだが　ふくらみ\nはんげきが　きょうりょくに　なる。"
        en:
          fire_red: "To keep its pitch-black tail hidden, it\nlives quietly in the darkness. It is never\nfirst to attack."
          leaf_green: "It hates light and shock. If attacked,\nit inflates its body to pump up its\ncounterstrike."
        fr:
          fire_red: "Pour cacher sa queue noire, il vit\ndiscrètement dans l’obscurité. Il n’attaque\njamais le premier."
          leaf_green: "Il déteste la lumière. S’il est attaqué,\nil se gonfle pour riposter avec plus\nde violence."
        it:
          fire_red: "Vive rintanato nell’oscurità per\nnascondere la coda nera come la pece.\nNon attacca mai per primo."
          leaf_green: "Odia la luce e gli shock. Se è attaccato,\ngonfia il corpo per preparare il\ncontrattacco."
        de:
          fire_red: "Es lebt in der Dunkelheit, um seinen\nschwarzen Schwanz zu verstecken. Es\ngreift nie zuerst an."
          leaf_green: "Es hasst Licht und Schläge. Wird es\nangegriffen, pumpt es sich auf, um einen\nGegenschlag vorzubereiten."
        es:
          fire_red: "Para mantener oculta la negra cola que\ntiene, vive en silencio en la oscuridad.\nNunca ataca primero."
          leaf_green: "Odia la luz y las sacudidas. Si le\natacan, se infla para aumentar la\nfuerza del contraataque."
girafarig:
  species_id: 203
  names:
    jp_kana: キリンリキ
    en: GIRAFARIG
    fr: GIRAFARIG
    it: GIRAFARIG
    de: GIRAFARIG
    es: GIRAFARIG
  forms:
    girafarig:
      form_id: 0
      base_stats:
        hp: 70
        attack: 80
        defense: 65
        special_attack: 90
        special_defense: 65
        speed: 85
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 2
        special_defense: 0
        speed: 0
      types:
        - normal
        - psychic
      egg_groups:
        - field
      abilities:
        - inner_focus
        - early_bird
      held_items:
        rare: persim_berry
      descriptions:
        jp_kana:
          fire_red: "シッポにも　ちいさな　のう　がある。\nにおいに　つられて　かってに\nシッポが　かみついてくることもある。"
          leaf_green: "シッポにも　ちいさな　のうがある。\nちかよると　においに　はんのうして\nかみついて　くるので　ちゅうい。"
        en:
          fire_red: "Its tail, which also contains a small\nbrain, may bite on its own if it notices an\nalluring smell."
          leaf_green: "Its tail has a small brain of its own.\nBeware! If you get close, it may react\nto your scent and bite."
        fr:
          fire_red: "Sa queue, qui contient également un petit\ncerveau, peut mordre d’elle-même."
          leaf_green: "Sa queue possède un cerveau. Si vous\nvous en approchez, il vous sentira et\nvous mordra."
        it:
          fire_red: "La coda, provvista di un piccolo\ncervello, morde di propria volontà se\navverte un profumo allettante."
          leaf_green: "La coda possiede un cervello autonomo.\nSe ci si avvicina può fiutare una presenza\ne mordere."
        de:
          fire_red: "Sein Schwanz, der auch ein Gehirn hat,\nbeißt manchmal von alleine zu, wenn er\neinen Duft wahrnimmt."
          leaf_green: "Sein Schwanz hat ein eigenes Gehirn.\nAchtung! Kommst du ihm zu nahe, kann es\ndich riechen und beißt."
        es:
          fire_red: "La cola, que también tiene un pequeño\ncerebro, muerde por su cuenta si nota\nun olor seductor."
          leaf_green: "Tiene un pequeño cerebro en la cola.\n¡Cuidado! Si te acercas, puede olerte\ny morderte."
pineco:
  species_id: 204
  names:
    jp_kana: クヌギダマ
    en: PINECO
    fr: POMDEPIK
    it: PINECO
    de: TANNZA
    es: PINECO
  forms:
    pineco:
      form_id: 0
      base_stats:
        hp: 50
        attack: 65
        defense: 90
        special_attack: 35
        special_defense: 35
        speed: 15
      evs_yield:
        hp: 0
        attack: 0
        defense: 1
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - bug
      egg_groups:
        - bug
      abilities:
        - sturdy
      descriptions:
        jp_kana:
          fire_red: "ぶらさがったまま　エサとなる\nムシが　とんでくるのを　まっている。\nじぶんじしんは　あまり　うごかない。"
          leaf_green: "きの　かわを　かさねあわせて\nカラを　ぶあつくするのが　だいすき。\nおもくなっても　きにしない。"
        en:
          fire_red: "It hangs and waits for flying-insect prey\nto come near. It does not move about\nmuch on its own."
          leaf_green: "It likes to make its shell thicker by\nadding layers of tree bark. The extra\nweight doesn’t bother it."
        fr:
          fire_red: "Il se suspend et attend qu’un insecte\nvole à proximité. Il ne bougera pas de\nlui-même."
          leaf_green: "Il renforce sa carapace en y ajoutant\ndes écorces d’arbre. Il devient alors\nplus lourd."
        it:
          fire_red: "Sta appeso in attesa di catturare gli\ninsetti che si avvicinano in volo. Non ama\nmolto muoversi."
          leaf_green: "Ispessisce il guscio aggiungendo strati di\ncorteccia. Non lo impensierisce l’aumento\ndi peso."
        de:
          fire_red: "Es lauert vorbeifliegender Beute auf, die\nin seine Nähe kommt. Daher bewegt es sich\nnur sehr selten."
          leaf_green: "Es fügt seiner Schale schichtenweise\nBaumrinde hinzu. Die zusätzliche Belastung\nist ihm gleich."
        es:
          fire_red: "Se cuelga y espera a los insectos que\npasan cerca. No suele moverse mucho\npor su cuenta."
          leaf_green: "Le gusta engrosar su coraza añadiendo\ncortezas de árbol. El aumento de peso\nno le molesta."
