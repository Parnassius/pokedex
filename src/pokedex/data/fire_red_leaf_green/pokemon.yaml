          leaf_green: "On l’a longtemps considéré comme une\ncréature légendaire, mais une colonie a\nrécemment été découverte dans les océans."
        it:
          fire_red: "Già da cucciolo può superare la\nlunghezza di due metri. Cresce\ncambiando continuamente la pelle."
          leaf_green: "A lungo considerato mitico, recentemente\nse ne è trovata un’esigua colonia\nsottomarina."
        de:
          fire_red: "Selbst noch nicht ausgewachsene\nExemplare können eine Länge von\n2 Metern erreichen. Es wächst,\nindem es sich häutet."
          leaf_green: "Dieses POKéMON war lange Zeit Legende,\nbis man eine Kolonie unter Wasser gefunden\nhat."
        es:
          fire_red: "Las crías pueden medir más de 2 m\ny crecen más mudando muchas veces\nla piel."
          leaf_green: "Durante años se dudó de su existencia,\nhasta que se encontró una colonia\nsubmarina."
