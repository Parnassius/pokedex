absorb:
  names:
    jp_kana: すいとる
    en: ABSORB
    fr: VOL-VIE
    it: ASSORBIMENTO
    de: ABSORBER
    es: ABSORBER
  descriptions:
    jp_kana: "ようぶんを　すいとって\nこうげきする。\nあいてに　あたえた\nダメージの　はんぶん\nＨＰが　かいふくする。"
    en: "An attack that\nabsorbs half the\ndamage it inflicted\nto restore HP."
    fr: "Une attaque\nqui convertit les\ndégâts infligés\nen PV."
    it: "Assorbe metà dei PS\nsottratti al nemico."
    de: "Attacke, die die\nHälfte des\nSchadens\nabsorbiert."
    es: "Absorbe la\nmitad del daño\nproducido."
acid:
  names:
    jp_kana: ようかいえき
    en: ACID
    fr: ACIDE
    it: ACIDO
    de: SÄURE
    es: ÁCIDO
  descriptions:
    jp_kana: "つよい　さんを　かけて\nひふを　とかして\nこうげきする。\nあいての　ぼうぎょを\nさげることが　ある。"
    en: "The foe is sprayed\nwith a harsh, hide-\nmelting acid that\nmay lower DEFENSE."
    fr: "Pulvérise un acide.\nPeut baisser la\nDEFENSE ennemie."
    it: "Acido corrosivo\nche può ridurre\nla DIFESA."
    de: "Versprüht ätzende\nFlüssigkeit, die\nevtl. die VERT.\nsenkt."
    es: "Rocía corrosivo\nácido. Puede bajar\nla DEFENSA."
acid_armor:
  names:
    jp_kana: とける
    en: ACID ARMOR
    fr: ACIDARMURE
    it: SCUDO ACIDO
    de: SÄUREPANZER
    es: ARMAD. ÁCIDA
  descriptions:
    jp_kana: "さいぼうを　へんかさせ\nからだを　とかして\nえきじょうに　なり\nじぶんの　ぼうぎょを\nグーンと　あげる。"
    en: "The user alters its\ncells to liquefy\nitself and sharply\nraise DEFENSE."
    fr: "Liquéfie le corps\ndu lanceur et\nbooste sa DEFENSE."
    it: "Chi la usa diventa\nliquido: sale di\nmolto la DIFESA."
    de: "Verflüssigt Körper-\nzellen des Anwen-\nders. Erhöht die\nVERT."
    es: "Te hace líquido\ny aumenta\nbastante\ntu DEFENSA."
aerial_ace:
  names:
    jp_kana: つばめがえし
    en: AERIAL ACE
    fr: AEROPIQUE
    it: AEROASSALTO
    de: AERO-ASS
    es: GOLPE AÉREO
  descriptions:
    jp_kana: "すばやい　うごきで\nあいてを　ほんろうして\nこうげきする。\nあいては　ぜったいに\nよけられない。"
    en: "An extremely fast\nattack against one\ntarget. It can’t be\nevaded."
    fr: "Attaque très\nrapide et\nimparable."
    it: "Attacco\nestremamente\nrapido e\ninevitabile."
    de: "Eine extrem\nschnelle und\nunausweichbare\nAttacke."
    es: "Ataque tremenda-\nmente rápido\ne ineludible."
aeroblast:
  names:
    jp_kana: エアロブラスト
    en: AEROBLAST
    fr: AEROBLAST
    it: AEROCOLPO
    de: LUFTSTOSS
    es: AEROCHORRO
  descriptions:
    jp_kana: "くうきの　うずを\nあいてに　はっしゃして\nこうげきする。\nきゅうしょに　あたる\nかくりつが　たかい。"
    en: "A vortex of air is\nshot at the foe.\nIt has a high\ncritical-hit ratio."
    fr: "Implosion à taux de\ncritiques élevé."
    it: "Vuoto d’aria con\nuna forte\nprobabilità di\nbrutti colpi."
    de: "Erzeugt Luftstrudel\ngegen Gegner.\nHohe Volltreffer-\nquote."
    es: "Lanza un chorro\nde aire que suele\ndar un golpe\ncrítico."
agility:
  names:
    jp_kana: こうそくいどう
    en: AGILITY
    fr: HATE
    it: AGILITÀ
    de: AGILITÄT
    es: AGILIDAD
  descriptions:
    jp_kana: "ちからを　ぬいて\nからだを　かるくし\nこうそくで　うごいて\nじぶんの　すばやさを\nグーンと　あげる。"
    en: "The user relaxes\nand lightens its\nbody to sharply\nboost its SPEED."
    fr: "Relaxation du\ncorps pour\nbooster la\nVITESSE."
    it: "Il corpo si rilassa\ne sale di molto la\nVELOCITÀ."
    de: "Entspannt den\nKörper, um\nINIT.-Wert\nzu steigern."
    es: "Relaja el cuerpo\npara ganar\nVELOCIDAD."
air_cutter:
  names:
    jp_kana: エアカッター
    en: AIR CUTTER
    fr: TRANCH’AIR
    it: AERASOIO
    de: WINDSCHNITT
    es: AIRE AFILADO
  descriptions:
    jp_kana: "するどい　かぜで\nてきを　きりつけて\nこうげきする。\nきゅうしょに　あたる\nかくりつが　たかい。"
    en: "The foe is hit with\nrazor-like wind.\nIt has a high\ncritical-hit ratio."
    fr: "Déclenche un vent\ntranchant. Taux de\ncritiques élevé."
    it: "Un vento falciante.\nProbabile brutto\ncolpo."
    de: "Greift mit rasier-\nklingenartigem\nWind an. Hohe\nVolltrefferquote."
    es: "Viento cortante\nque azota.\nSuele ser\nun golpe crítico."
amnesia:
  names:
    jp_kana: ドわすれ
    en: AMNESIA
    fr: AMNESIE
    it: AMNESIA
    de: AMNESIE
    es: AMNESIA
  descriptions:
    jp_kana: "あたまを　からにして\nいっしゅん　なにかを\nわすれる　ことで\nじぶんの　とくぼうを\nグーンと　あげる。"
    en: "Forgets about\nsomething and\nsharply raises\nSP. DEF."
    fr: "Oublie quelque\nchose et\nbooste la\nDEF. SPE."
    it: "Vuoto di memoria\nche aumenta la\nDIFESA\nSPECIALE."
    de: "Gedächtnisverlust,\nder die SP. \nVER. deutlich\nerhöht."
    es: "Olvida algo\ny aumenta mucho\nla DEFENSA ESP."
ancient_power:
  names:
    jp_kana: げんしのちから
    en: ANCIENTPOWER
    fr: POUV.ANTIQUE
    it: FORZANTICA
    de: ANTIK-KRAFT
    es: PODER PASADO
  descriptions:
    jp_kana: "げんしの　ちからで\nこうげきする。\nどうじに　じぶんの\nすべての　のうりょくが\nあがることが　ある。"
    en: "An ancient power is\nused to attack. It\nmay also raise all\nthe user’s stats."
    fr: "Une attaque\npouvant augmenter\ntoutes les stats."
    it: "Attacco che può\naumentare tutte\nle statistiche."
    de: "Angriff mit antiker\nKraft, der alle\nStatus-Werte\nerhöhen kann."
    es: "Puede subir\ntodas las\ncaracterísticas."
arm_thrust:
  names:
    jp_kana: つっぱり
    en: ARM THRUST
    fr: COGNE
    it: SBERLETESE
    de: ARMSTOSS
    es: EMPUJÓN
  descriptions:
    jp_kana: "ひらいた　りょうてで\nあいてを　つっぱって\nこうげきする。\n２ー５かい　れんぞくで\nダメージを　あたえる。"
    en: "A quick flurry of\nstraight-arm\npunches that hit\ntwo to five times."
    fr: "Coups de poing\narrêtés qui\nfrappent 2 à\n5 fois."
    it: "Da 2 a 5 schiaffi a\nbraccio teso."
    de: "Schläge mit\ngeradem Arm, die\nden Gegner 2 - 5-\nmal treffen."
    es: "Se dan puñetazos\ndirectos de 2\na 5 turnos."
aromatherapy:
  names:
    jp_kana: アロマセラピー
    en: AROMATHERAPY
    fr: AROMATHERAPI
    it: AROMATERAPIA
    de: AROMAKUR
    es: AROMATERAPIA
  descriptions:
    jp_kana: "やすらぐ　ここちよい\nかおりを　かがせて\nみかた　ぜんいんの\nじょうたい　いじょうを\nかいふくする。"
    en: "A soothing scent is\nreleased to heal\nall status problems\nin the user’s party."
    fr: "Parfum apaisant\nsoignant les\nchangements de\nstatut."
    it: "Un dolce profumo\nrisolve tutti i\nproblemi di stato\ndella squadra."
    de: "Heilt alle Status-\nprobleme des\nTeams mit be-\nruhigendem Duft."
    es: "Cura todos los\nproblemas de\nestado con\nun suave aroma."
assist:
  names:
    jp_kana: ねこのて
    en: ASSIST
    fr: ASSISTANCE
    it: ASSISTENTE
    de: ZUSCHUSS
    es: AYUDA
  descriptions:
    jp_kana: "みかたの　ポケモンが\nおぼえている　わざの\nなかから　どれか\n１つを　くりだす。"
    en: "The user randomly\npicks and uses a\nmove of an allied\nPOKéMON."
    fr: "Attaque au hasard\navec un coup d’un\ndes partenaires."
    it: "Attacca usando una\na caso delle mosse\ndella squadra."
    de: "Greift zufällig mit\neiner Attacke eines\nTeampartners an."
    es: "Ataque elegido\nal azar de un\nmiembro del equipo."
astonish:
  names:
    jp_kana: おどろかす
    en: ASTONISH
    fr: ETONNEMENT
    it: SGOMENTO
    de: ERSTAUNER
    es: IMPRESIONAR
  descriptions:
    jp_kana: "おおきな　こえなどで\nきゅうに　おどろかせて\nこうげきする。\nあいてを　ひるませる\nことが　ある。"
    en: "An attack using a\nstartling shout.\nIt also may make\nthe foe flinch."
    fr: "Une attaque qui\npeut choquer et\napeurer l’ennemi."
    it: "Può sbalordire il\nnemico facendolo\ntentennare."
    de: "Angriff, der Gegner\nevtl. zurück-\nschrecken lässt."
    es: "Impresiona tanto\nque puede\nhacer retroceder\nal rival."
attract:
  names:
    jp_kana: メロメロ
    en: ATTRACT
    fr: ATTRACTION
    it: ATTRAZIONE
    de: ANZIEHUNG
    es: ATRACCIÓN
  descriptions:
    jp_kana: "せいべつの　ちがう\nあいてを　ゆうわくして\nメロメロに　する。\nその　あいては　わざが\nだしにくく　なる。"
    en: "If it is the other\ngender, the foe is\nmade infatuated and\nunlikely to attack."
    fr: "Le genre opposé\na moins de\nchances d’attaquer."
    it: "Nemici del sesso\nopposto attaccano\nmeno facilmente."
    de: "Angriff des anderen\nGeschlechts\nunwahrscheinlich."
    es: "Reduce la\nposibilidad de que\nel enemigo ataque."
aurora_beam:
  names:
    jp_kana: オーロラビーム
    en: AURORA BEAM
    fr: ONDE BOREALE
    it: RAGGIAURORA
    de: AURORASTRAHL
    es: RAYO AURORA
  descriptions:
    jp_kana: "にじいろに　ひかる\nビームを　はっしゃして\nこうげきする。\nあいての　こうげきを\nさげることが　ある。"
    en: "A rainbow-colored\nattack beam.\nIt may lower the\nfoe’s ATTACK stat."
    fr: "Envoie un rayon\narc-en-ciel\npouvant baisser\nl’ATTAQUE."
    it: "Un raggio color\ndell’iride che può\nridurre l’ATTACCO."
    de: "Regenbogen-\nfarbener Strahl,\nder evtl. den\nANGR.-Wert senkt."
    es: "Rayo multicolor\nque puede reducir\nel ATAQUE."
barrage:
  names:
    jp_kana: たまなげ
    en: BARRAGE
    fr: PILONNAGE
    it: ATT. PIOGGIA
    de: STAKKATO
    es: PRESA
  descriptions:
    jp_kana: "まるい　ものを\nあいてに　なげつけて\nこうげきする。\n２ー５かい　れんぞくで\nダメージを　あたえる。"
    en: "Round objects are\nhurled at the foe\nto strike two to\nfive times."
    fr: "Projette 2 à 5 fois\ndes objets ronds\nvers l’ennemi."
    it: "Lancio di sfere sul\nnemico da 2 a 5\nvolte."
    de: "Wirft 2 - 5-mal\nrunde Gegen-\nstände auf den\nGegner."
    es: "Arroja esferas\nal rival de 2\na 5 veces."
barrier:
  names:
    jp_kana: バリアー
    en: BARRIER
    fr: BOUCLIER
    it: BARRIERA
    de: BARRIERE
    es: BARRERA
  descriptions:
    jp_kana: "からだの　まえに\nとても　がんじょうな\nかべを　つくりだし\nじぶんの　ぼうぎょを\nグーンと　あげる。"
    en: "The user creates a\nsturdy wall that\nsharply raises its\nDEFENSE stat."
    fr: "Crée une barrière\npour booster la\nDEFENSE."
    it: "Una barriera\naumenta di\nmolto la DIFESA."
    de: "Erzeugt Barriere,\ndie den\nVERT.-Wert stark\nerhöht."
    es: "Crea una barrera\npara subir mucho\nla DEFENSA."
baton_pass:
  names:
    jp_kana: バトンタッチ
    en: BATON PASS
    fr: RELAIS
    it: STAFFETTA
    de: STAFFETTE
    es: RELEVO
  descriptions:
    jp_kana: "じぶんの　のうりょくの\nへんかを　のこしたまま\nひかえの　ポケモンと\nいれかわる。"
    en: "The user switches\nout, passing along\nany stat changes\nto the new battler."
    fr: "Change de lanceur,\nmais transmet les\nchangements de\nstats."
    it: "Chi la usa è\nsostituito, ma\ngli effetti\npermangono."
    de: "Tauscht PKMN aus.\nAlle Statusverän-\nderungen bleiben\nbestehen."
    es: "Cambia de\ncompañero y\nmantiene\nlos estados."
beat_up:
  names:
    jp_kana: ふくろだたき
    en: BEAT UP
    fr: BASTON
    it: PICCHIADURO
    de: PRÜGLER
    es: PALIZA
  descriptions:
    jp_kana: "みかた　ぜんいんで\nこうげきする。\nなかまの　ポケモンが\nおおいほど　あたえる\nダメージが　おおきい。"
    en: "All party POKéMON\njoin in the attack.\nThe more allies,\nthe more damage."
    fr: "Appelle les\nPOKéMON de l’équipe\nà se joindre à\nl’attaque."
    it: "Chiama in aiuto i\nPOKéMON \ndella squadra\nnell’attacco."
    de: "Das Team nimmt ak-\ntiv am Kampf teil.\nJe mehr POKéMON,\ndesto stärker."
    es: "Ataque de todo el\nequipo POKéMON."
belly_drum:
  names:
    jp_kana: はらだいこ
    en: BELLY DRUM
    fr: COGNOBIDON
    it: PANCIAMBURO
    de: BAUCHTROMMEL
    es: TAMBOR
  descriptions:
    jp_kana: "じぶんの　ＨＰを\nさいだい　ＨＰの\nはんぶんだけ　へらし\nじぶんの　こうげきを\nさいだいまで　あげる。"
    en: "The user maximizes\nits ATTACK stat at\nthe cost of half\nits full HP."
    fr: "Améliore l’ATTAQUE\nà fond en sacrifiant\nla moitié des PV."
    it: "Aumenta l’ATTACCO\nsacrificando metà\ndei PS massimi."
    de: "Maximiert den\nANGR.-Wert,\nopfert jedoch die\nHälfte seiner KP."
    es: "Reduce tus PS para\nmejorar el ATAQUE."
bide:
  names:
    jp_kana: がまん
    en: BIDE
    fr: PATIENCE
    it: PAZIENZA
    de: GEDULD
    es: VENGANZA
  descriptions:
    jp_kana: "２ターンの　あいだ\nこうげきに　たえて\nうけた　ダメージを\nばいに　して　かえす。"
    en: "The user endures\nattacks for two\nturns, then strikes\nback double."
    fr: "Encaisse les\nattaques sur 2\ntours et renvoie\nle double."
    it: "Subisce per 2\nturni, per poi\nrestituire il\ndanno X 2."
    de: "Erträgt 2 Runden\nAngriffe und\nschlägt dann\ndoppelt zurück."
    es: "Espera 2 turnos\npara atacar con\ndoble potencia."
bind:
  names:
    jp_kana: しめつける
    en: BIND
    fr: ETREINTE
    it: LEGATUTTO
    de: KLAMMERGRIFF
    es: ATADURA
  descriptions:
    jp_kana: "ながい　からだや\nつるなどを　つかって\n２ー５ターンの　あいだ\nあいてを　しめつけて\nこうげきする。"
    en: "A long body or\ntentacles are used\nto bind the foe for\ntwo to five turns."
    fr: "Ligote l’ennemi et\nl’écrase pendant\n2 à 5 tours."
    it: "Lega e stringe\nil nemico\nda 2 a 5 turni."
    de: "Umklammert und\ntrifft den Gegner\n2 - 5-mal."
    es: "Ata y oprime\nde 2 a 5 turnos."
bite:
  names:
    jp_kana: かみつく
    en: BITE
    fr: MORSURE
    it: MORSO
    de: BISS
    es: MORDISCO
  descriptions:
    jp_kana: "するどく　とがった\nはで　かみついて\nこうげきする。\nあいてを　ひるませる\nことが　ある。"
    en: "The user bites with\nvicious fangs.\nIt may make the\nfoe flinch."
    fr: "Mord méchamment\nl’ennemi et peut\nl’apeurer."
    it: "Un morso rabbioso\nche può far\ntentennare il\nnemico."
    de: "Beißt zu und lässt\nden Gegner evtl.\nzurückschrecken."
    es: "Un voraz bocado\nque puede causar\nel retroceso."
blast_burn:
  names:
    jp_kana: ブラストバーン
    en: BLAST BURN
    fr: RAFALE FEU
    it: INCENDIO
    de: LOHEKANONADE
    es: ANILLO ÍGNEO
  descriptions:
    jp_kana: "すさまじい　ばくはつで\nあいてを　やきつくして\nこうげきする。\nつぎの　ターンは\nうごけなく　なる。"
    en: "The foe is hit with\na huge explosion.\nThe user can’t move\non the next turn."
    fr: "Puissant, mais\nimmobilise le\nlanceur le tour\nsuivant."
    it: "È potente, ma chi\nla usa perde il\nturno successivo."
    de: "Gegner wird von\nstarker Explosion\ngetroffen. Angreifer\nsetzt 1 Runde aus."
    es: "Es muy eficaz,\npero te inmoviliza\n1 turno."
blaze_kick:
  names:
    jp_kana: ブレイズキック
    en: BLAZE KICK
    fr: PIED BRULEUR
    it: CALCIARDENTE
    de: FEUERFEGER
    es: PATADA ÍGNEA
  descriptions:
    jp_kana: "こうげきした　あいてを\nやけど　じょうたいに\nすることが　あり\nきゅうしょに　あたる\nかくりつも　たかい。"
    en: "A fiery kick with a\nhigh critical-hit\nratio. It may also\nburn the foe."
    fr: "Coup de pied à\ntaux de critiques\nélevé. Peut brûler."
    it: "Può causare\nscottature.\nProbabile brutto\ncolpo."
    de: "Starker Tritt mit\nhoher Volltreffer-\nquote. Verursacht\nevtl. Verbrennung."
    es: "Suele ser un golpe\ncrítico y causar\nquemaduras."
blizzard:
  names:
    jp_kana: ふぶき
    en: BLIZZARD
    fr: BLIZZARD
    it: BORA
    de: BLIZZARD
    es: VENTISCA
  descriptions:
    jp_kana: "はげしい　ふぶきを\nてきに　ふきつけて\nこうげきする。\nこおり　じょうたいに\nすることが　ある。"
    en: "The foe is blasted\nwith a blizzard.\nIt may freeze the\nfoe solid."
    fr: "Déclenche une\ntempête de neige\npouvant geler\nl’ennemi."
    it: "Una tempesta di\nghiaccio che può\ncongelare il\nnemico."
    de: "Ein Schneesturm,\nder den Gegner\neinfrieren kann,\nwütet."
    es: "Tormenta de hielo\nque puede llegar\na congelar."
block:
  names:
    jp_kana: とおせんぼう
    en: BLOCK
    fr: BARRAGE
    it: BLOCCO
    de: RÜCKENTZUG
    es: BLOQUEO
  descriptions:
    jp_kana: "りょうてを　ひろげて\nまえに　たちはだかり\nにげみちを　ふさいで\nあいてを　せんとうから\nにげられなく　する。"
    en: "The user blocks the\nfoe’s way with arms\nspread wide to\nprevent escape."
    fr: "Bloque la route\nde l’ennemi\npour empêcher\nsa fuite."
    it: "Sbarra la strada al\nnemico impedendo\nla sostituzione."
    de: "Anwender versperrt\nden Fluchtweg des\nGegners mit aus-\ngestreckten Armen."
    es: "Le corta el paso\nal rival para que\nno pueda escapar."
body_slam:
  names:
    jp_kana: のしかかり
    en: BODY SLAM
    fr: PLAQUAGE
    it: CORPOSCONTRO
    de: BODYSLAM
    es: GOLPE CUERPO
  descriptions:
    jp_kana: "からだ　ぜんたいで\nあいてに　のしかかって\nこうげきする。\nまひ　じょうたいに\nすることが　ある。"
    en: "The user drops its\nfull body on the\nfoe. It may leave\nthe foe paralyzed."
    fr: "Une attaque en\ncharge. Peut\nparalyser l’ennemi."
    it: "Una carica con\ntutto il corpo che\npuò paralizzare\nil nemico."
    de: "Trifft den Gegner\nmit vollem Kör-\npereinsatz. Bewirkt\nevtl. Paralyse."
    es: "Ataque corporal\nque puede\nparalizar."
bone_club:
  names:
    jp_kana: ホネこんぼう
    en: BONE CLUB
    fr: MASSD’OS
    it: OSSOCLAVA
    de: KNOCHENKEULE
    es: HUESO PALO
  descriptions:
    jp_kana: "てに　もった　ホネで\nあいてを　なぐって\nこうげきする。\nあいてを　ひるませる\nことが　ある。"
    en: "The foe is clubbed\nwith a bone held in\nhand. It may make\nthe foe flinch."
    fr: "Cogne l’ennemi\navec un os. Peut\napeurer."
    it: "Un osso colpisce il\nnemico e può farlo\ntentennare."
    de: "Schlägt Gegner\nmit einer Keule\nund verschreckt\nihn evtl."
    es: "Aporrea con\nun hueso.\nPuede causar\nel retroceso."
bone_rush:
  names:
    jp_kana: ボーンラッシュ
    en: BONE RUSH
    fr: CHARGE-OS
    it: OSSORAFFICA
    de: KNOCHENHATZ
    es: ATAQUE ÓSEO
  descriptions:
    jp_kana: "てに　もった　ホネで\nあいてを　なぐりつけて\nこうげきする。\n２ー５かい　れんぞくで\nダメージを　あたえる。"
    en: "The user strikes\nthe foe with a bone\nin hand two to five\ntimes."
    fr: "Frappe l’ennemi\n2 à 5 fois\navec un os."
    it: "Colpisce il nemico\ncon un osso da\n2 a 5 volte."
    de: "Greift Gegner 2 -\n5-mal in Folge mit\neinem Knochen an."
    es: "Hueso en ristre,\naporrea al enemigo\nde 2 a 5 veces."
bonemerang:
  names:
    jp_kana: ホネブーメラン
    en: BONEMERANG
    fr: OSMERANG
    it: OSSOMERANG
    de: KNOCHMERANG
    es: HUESOMERANG
  descriptions:
    jp_kana: "てに　もった　ホネを\nあいてに　なげつけて\nいきと　かえりで\n２かい　れんぞくで\nこうげきする。"
    en: "The user throws a\nbone that hits the\nfoe once, then once\nagain on return."
    fr: "Lance un boomerang\nen os qui frappe\ndeux fois."
    it: "Boomerang\nd’osso che\ncolpisce 2 volte."
    de: "Ein Bumerang aus\nKnochen, der\nzweimal trifft."
    es: "Lanza un hueso\na modo de bumerán,\nque da 2 veces."
bounce:
  names:
    jp_kana: とびはねる
    en: BOUNCE
    fr: REBOND
    it: RIMBALZO
    de: SPRUNGFEDER
    es: BOTE
  descriptions:
    jp_kana: "そらたかく　とびはね\n２ターンめに　あいてを\nこうげきする。\nまひ　じょうたいに\nすることが　ある。"
    en: "The user bounces\non the foe on the\n2nd turn. It may\nparalyze the foe."
    fr: "Saute et tombe\nle tour suivant.\nPeut paralyser."
    it: "Balza in alto e\nricade dopo un\nturno. Può\nparalizzare."
    de: "Angreifer bespringt\nden Gegner in Runde\n2. Der Gegner wird\nevtl. paralysiert."
    es: "1.ᵉʳ turno: bota.\n2.º: golpea.\nPuede paralizar."
brick_break:
  names:
    jp_kana: かわらわり
    en: BRICK BREAK
    fr: CASSE-BRIQUE
    it: BRECCIA
    de: DURCHBRUCH
    es: DEMOLICIÓN
  descriptions:
    jp_kana: "かたい　こぶしなどで\nこうげきする。\nてきの　ひかりのかべや\nリフレクターも\nはかい　してしまう。"
    en: "An attack that also\nbreaks any barrier\nlike LIGHT SCREEN\nand REFLECT."
    fr: "Attaque qui brise\nles barrières comme\nPROTECTION et\nMUR LUMIERE."
    it: "Arreca danno e\ndistrugge barriere\ncome RIFLESSO\ne SCHERMOLUCE."
    de: "Durchbricht Barri-\neren wie LICHT-\nSCHILD und\nREFLEKTOR."
    es: "Destruye barreras\ncomo REFLEJO\ny causa daño."
bubble:
  names:
    jp_kana: あわ
    en: BUBBLE
    fr: ECUME
    it: BOLLA
    de: BLUBBER
    es: BURBUJA
  descriptions:
    jp_kana: "たくさんの　あわを\nくちから　はっしゃして\nこうげきする。\nあいての　すばやさを\nさげることが　ある。"
    en: "A spray of bubbles\nhits the foe.\nIt may lower the\nfoe’s SPEED stat."
    fr: "Une attaque de\nbulles pouvant\nbaisser la VITESSE."
    it: "Bolle che possono\nridurre la VELOCITÀ\ndel nemico."
    de: "Angriff mit Blasen.\nINIT.-Wert des\nGegners wird\nevtl. gesenkt."
    es: "Usa burbujas para\nintentar bajar\nla VELOCIDAD."
bubble_beam:
  names:
    jp_kana: バブルこうせん
    en: BUBBLEBEAM
    fr: BULLES D’O
    it: BOLLARAGGIO
    de: BLUBBSTRAHL
    es: RAYO BURBUJA
  descriptions:
    jp_kana: "あわを　いきおいよく\nくちから　はっしゃして\nこうげきする。\nあいての　すばやさを\nさげることが　ある。"
    en: "A spray of bubbles\nstrikes the foe.\nIt may lower the\nfoe’s SPEED stat."
    fr: "Envoie des bulles\npouvant baisser\nla VITESSE."
    it: "Forte getto di\nbolle che può\nridurre la\nVELOCITÀ."
    de: "Versprüht Blasen,\ndie evtl. den\nINIT.-Wert des\nGegners senken."
    es: "Diluvio de burbujas\nque puede bajar\nla VELOCIDAD."
bulk_up:
  names:
    jp_kana: ビルドアップ
    en: BULK UP
    fr: GONFLETTE
    it: GRANFISICO
    de: PROTZER
    es: CORPULENCIA
  descriptions:
    jp_kana: "からだに　ちからを\nこめて　きんにくを\nぶあつく　することで\nじぶんの　こうげきと\nぼうぎょを　あげる。"
    en: "The user bulks up\nits body to boost\nboth its ATTACK and\nDEFENSE stats."
    fr: "Se gonfle pour\nbooster l’ATTAQUE\net la DEFENSE."
    it: "Il corpo s’ingrossa\ne salgono ATTACCO\ne DIFESA di chi la\nusa."
    de: "Pumpt den Körper\nauf, um den ANGR.\nund die VERT. \nzu erhöhen."
    es: "Robustece el\ncuerpo para\nsubir ATAQUE\ny DEFENSA."
bullet_seed:
  names:
    jp_kana: タネマシンガン
    en: BULLET SEED
    fr: BALLE GRAINE
    it: SEMITRAGLIA
    de: KUGELSAAT
    es: RECURRENTE
  descriptions:
    jp_kana: "タネを　いきおいよく\nあいてに　はっしゃして\nこうげきする。\n２ー５かい　れんぞくで\nダメージを　あたえる。"
    en: "The user shoots\nseeds at the foe.\nTwo to five seeds\nare shot at once."
    fr: "Mitraille l’ennemi\navec 2 à 5 rafales\nde graines à\nla suite."
    it: "Da 2 a 5 raffiche\ndi semi sul nemico."
    de: "Verschießt 2 bis 5\nSamen gleichzeitig\nauf den Gegner."
    es: "Dispara de 2 a 5\nráfagas consecu-\ntivas de semillas."
calm_mind:
  names:
    jp_kana: めいそう
    en: CALM MIND
    fr: PLENITUDE
    it: CALMAMENTE
    de: GEDANKENGUT
    es: PAZ MENTAL
  descriptions:
    jp_kana: "しずかに　せいしんを\nとういつして　こころを\nしずめる　ことで\nじぶんの　とくこうと\nとくぼうを　あげる。"
    en: "The user focuses\nits mind to raise\nthe SP. ATK and\nSP. DEF stats."
    fr: "Méditation pour\naugmenter\nl’ATQ. SPE. et la\nDEF. SPE."
    it: "Aumenta l’ATT.\nSPEC. e la DIF.\nSPEC. di chi la\nusa."
    de: "Erhöht SP. ANG.\nund SP. VER.\ndurch\nKonzentration."
    es: "Sube el AT. ESP.\ny la DEF. ESP.\ncon concentración."
camouflage:
  names:
    jp_kana: ほごしょく
    en: CAMOUFLAGE
    fr: CAMOUFLAGE
    it: CAMUFFAMENTO
    de: TARNUNG
    es: CAMUFLAJE
  descriptions:
    jp_kana: "つかった　ばしょに\nよって　じぶんの\nタイプが　いろいろ\nへんかする。"
    en: "Alters the user’s\ntype depending on\nthe location’s\nterrain."
    fr: "Change le type\ndu POKéMON\nselon le lieu."
    it: "Modifica il tipo di\nchi la usa secondo\nil luogo."
    de: "Die Elementklasse\ndes POKéMON\nhängt vom Ort ab."
    es: "Modifica el tipo\ndel POKéMON\nsegún la zona\ndonde esté."
charge:
  names:
    jp_kana: じゅうでん
    en: CHARGE
    fr: CHARGEUR
    it: SOTTOCARICA
    de: LADEVORGANG
    es: CARGA
  descriptions:
    jp_kana: "でんきを　たくわえて\nつぎに　じぶんが　だす\nでんきタイプの\nわざの　ダメージを\nおおきくする。"
    en: "The user charges\npower to boost the\nELECTRIC move it\nuses next."
    fr: "Charge de la\npuissance pour son\nattaque ELECTRIK\nsuivante."
    it: "Potenzia la mossa\nelettrica usata\nsuccessivamente."
    de: "Lädt Energie für\nden kommenden\nELEKTRO-Angriff\nauf."
    es: "Recarga energía\ny sube el ataque\neléctrico posterior."
charm:
  names:
    jp_kana: あまえる
    en: CHARM
    fr: CHARME
    it: FASCINO
    de: CHARME
    es: ENCANTO
  descriptions:
    jp_kana: "かわいく　みつめたり\nないたりと　あまえて\nゆだんさせる　ことで\nあいての　こうげきを\nガクッと　さげる。"
    en: "The foe is charmed\nby the user’s cute\nappeals, sharply\ncutting its ATTACK."
    fr: "Charme l’ennemi\net baisse\nbeaucoup son\nATTAQUE."
    it: "Ammalia il nemico\nper ridurne di\nmolto l’ATTACCO."
    de: "Betört den Gegner\nund reduziert\nseinen ANGR.\ndeutlich."
    es: "Engatusa al rival\ny reduce bastante\nsu ATAQUE."
clamp:
  names:
    jp_kana: からではさむ
    en: CLAMP
    fr: CLAQUOIR
    it: TENAGLIA
    de: SCHNAPPER
    es: TENAZA
  descriptions:
    jp_kana: "とても　がんじょうな\nぶあつい　からに\n２ー５ターンの　あいだ\nあいてを　はさんで\nこうげきする。"
    en: "The foe is clamped\nand squeezed by\nthe user’s shell for\ntwo to five turns."
    fr: "Piège l’ennemi et\nl’écrase pendant\n2 à 5 tours."
    it: "Intrappola e\nstringe il nemico\nda 2 a 5 turni."
    de: "Fängt und quetscht\nden Gegner für\n2 - 5 Runden."
    es: "Atrapa y atenaza\ncon fuerza de 2\na 5 turnos."
comet_punch:
  names:
    jp_kana: れんぞくパンチ
    en: COMET PUNCH
    fr: POING COMETE
    it: COMETAPUGNO
    de: KOMETENHIEB
    es: PUÑO COMETA
  descriptions:
    jp_kana: "どとうの　パンチで\nあいてを　なぐりつけて\nこうげきする。\n２ー５かい　れんぞくで\nダメージを　あたえる。"
    en: "The foe is hit with\na flurry of punches\nthat strike two to\nfive times."
    fr: "Frappe rapidement\nl’ennemi\nde 2 à 5 fois."
    it: "Da 2 a 5 pugni\ncolpiscono\nripetutamente il\nnemico."
    de: "Trifft den Gegner\n2 - 5-mal\nhintereinander."
    es: "Pega de 2 a 5\nveces seguidas."
confuse_ray:
  names:
    jp_kana: あやしいひかり
    en: CONFUSE RAY
    fr: ONDE FOLIE
    it: STORDIRAGGIO
    de: KONFUSTRAHL
    es: RAYO CONFUSO
  descriptions:
    jp_kana: "あやしい　ひかりを\nあいてに　みせて\nまどわせる　ことで\nあいてを　こんらんの\nじょうたいに　する。"
    en: "The foe is exposed\nto a sinister ray\nthat triggers\nconfusion."
    fr: "Un horrible rayon\nqui rend\nl’ennemi confus."
    it: "Un raggio sinistro\nche confonde il\nnemico."
    de: "Ein fieser Strahl,\nder den Gegner\nverwirrt."
    es: "Rayo siniestro\nque confunde\nal enemigo."
confusion:
  names:
    jp_kana: ねんりき
    en: CONFUSION
    fr: CHOC MENTAL
    it: CONFUSIONE
    de: KONFUSION
    es: CONFUSIÓN
  descriptions:
    jp_kana: "よわい　ねんりきを\nあいてに　おくって\nこうげきする。\nこんらん　じょうたいに\nすることが　ある。"
    en: "A weak telekinetic\nattack that may\nalso leave the foe\nconfused."
    fr: "Une attaque PSY\npouvant rendre\nl’ennemi confus."
    it: "Attacco psichico\nche può causare\nconfusione nel\nnemico."
    de: "Psycho-Attacke,\ndie den Gegner\nevtl. verwirrt."
    es: "Ataque psíquico\nque puede causar\nconfusión."
constrict:
  names:
    jp_kana: からみつく
    en: CONSTRICT
    fr: CONSTRICTION
    it: LIMITAZIONE
    de: UMKLAMMERUNG
    es: RESTRICCIÓN
  descriptions:
    jp_kana: "ながい　しょくしゅや\nツタなどで　からみつき\nこうげきする。\nあいての　すばやさを\nさげることが　ある。"
    en: "The foe is attacked\nwith long tentacles\nor vines. It may\nlower SPEED."
    fr: "Etrangle avec des\ntentacules ou des\nlianes. Peut baisser\nla VITESSE."
    it: "Impedimento che\ndanneggia e può\nridurre la\nVELOCITÀ."
    de: "Angriff mit langen\nTentakeln oder\nRanken. Senkt\nevtl. INIT.-Wert."
    es: "Constriñe\npara herir\ny puede bajar\nla VELOCIDAD."
conversion:
  names:
    jp_kana: テクスチャー
    en: CONVERSION
    fr: ADAPTATION
    it: CONVERSIONE
    de: UMWANDLUNG
    es: CONVERSIÓN
  descriptions:
    jp_kana: "じぶんが　おぼえている\nわざの　どれか　１つと\nおなじ　タイプに\nじぶんの　タイプを\nへんか　させる。"
    en: "The user changes\nits type to match\nthe type of one of\nits moves."
    fr: "Change le type\ndu lanceur en\ncelui d’une\ncapacité."
    it: "Il tipo di chi la\nusa muta in quello\ndi una sua mossa."
    de: "Wandelt Element-\nklasse d. Anwenders\nin Elementklasse\neiner Attacke."
    es: "Cambia tu tipo\npor el tipo de un\nataque que tengas."
conversion_2:
  names:
    jp_kana: テクスチャー２
    en: CONVERSION 2
    fr: CONVERSION 2
    it: CONVERSIONE2
    de: UMWANDLUNG2
    es: CONVERSIÓN2
  descriptions:
    jp_kana: "あいてから　さいごに\nくらった　わざの\nこうかが　いまひとつに\nなるように　じぶんの\nタイプを　かえる。"
    en: "The user changes\ntype to make itself\nresistant to the\nlast attack it took."
    fr: "Permet de résister\nau type de la\ndernière attaque."
    it: "Chi la usa si fa\nresistente al tipo\ndell’ultimo attacco."
    de: "Anwender ändert\nElementklasse,\num resistenter\nzu sein."
    es: "Tu tipo se hace\nresistente al último\ntipo de ataque."
cosmic_power:
  names:
    jp_kana: コスモパワー
    en: COSMIC POWER
    fr: FORCE COSMIK
    it: COSMOFORZA
    de: KOSMIK-KRAFT
    es: MASA CÓSMICA
  descriptions:
    jp_kana: "うちゅう　からの\nしんぴてきな　ちからを\nとりこむ　ことで\nじぶんの　ぼうぎょと\nとくぼうを　あげる。"
    en: "The user absorbs a\nmystic power to\nraise its DEFENSE\nand SP. DEF."
    fr: "Le lanceur absorbe\nun pouvoir qui\nmonte la DEFENSE\net la DEF. SPE."
    it: "Una forza magica\naumenta la DIFESA\ne la DIF. SPEC. di\nchi la usa."
    de: "Erhöht VERT. und\nSP. VER. durch\nmystische Kraft."
    es: "Sube la DEFENSA\ny la DEF. ESP. con\nenergía mística."
cotton_spore:
  names:
    jp_kana: わたほうし
    en: COTTON SPORE
    fr: SPORE COTON
    it: COTTONSPORA
    de: BAUMWOLLSAAT
    es: ESPORAGODÓN
  descriptions:
    jp_kana: "こまかい　わたのような\nフワフワの　ほうしを\nまとわり　つかせて\nあいての　すばやさを\nガクッと　さげる。"
    en: "Cotton-like spores\ncling to the foe,\nsharply reducing\nits SPEED stat."
    fr: "Envoie des spores\npour baisser\nbeaucoup la\nVITESSE."
    it: "Spore riducono di\nmolto la VELOCITÀ\ndel nemico."
    de: "Wattebäusche\nheften sich an den\nGegner. Der\nINIT.-Wert sinkt"
    es: "Le pega esporas\nal rival para\nreducir su\nVELOCIDAD."
counter:
  names:
    jp_kana: カウンター
    en: COUNTER
    fr: RIPOSTE
    it: CONTATORE
    de: KONTER
    es: CONTADOR
  descriptions:
    jp_kana: "てきから　うけた\nぶつり　こうげきの\nダメージを　ばいにして\nそのてきに　かえす。"
    en: "A retaliation move\nthat counters any\nphysical hit with\ndouble the damage."
    fr: "Renvoie toute\nattaque physique,\n2 fois plus fort."
    it: "Replica agli\nattacchi fisici\ncon forza\nraddoppiata."
    de: "Kontert physischen\nTreffer mit\ndoppelter Kraft."
    es: "Devuelve un golpe\nfísico por\nduplicado."
covet:
  names:
    jp_kana: ほしがる
    en: COVET
    fr: IMPLORE
    it: SUPPLICA
    de: BEZIRZER
    es: ANTOJO
  descriptions:
    jp_kana: "かわいく　あまえながら\nちかづいて　いって\nあいてが　もっている\nどうぐを　うばう。"
    en: "A cutely executed\nattack that also\nsteals the foe’s\nhold item."
    fr: "Demande gentiment\nun objet détenu\npar l’ennemi."
    it: "Supplica il nemico\nper ottenerne lo\nstrumento tenuto."
    de: "Bittet charmant um\ndas gehaltene Item\ndes Gegners."
    es: "Pide con ternura\nal rival el objeto\nque lleve."
crabhammer:
  names:
    jp_kana: クラブハンマー
    en: CRABHAMMER
    fr: PINCE-MASSE
    it: MARTELLATA
    de: KRABBHAMMER
    es: MARTILLAZO
  descriptions:
    jp_kana: "おおきな　ハサミを　\nあいてに　たたきつけて\nこうげきする。\nきゅうしょに　あたる\nかくりつが　たかい。"
    en: "A large pincer is\nused to hammer the\nfoe. It has a high\ncritical-hit ratio."
    fr: "Attaque critique\nqui utilise une\ngrosse pince."
    it: "Sferzata con\ntenaglie. Probabile\nbrutto colpo."
    de: "Schlägt mit Schere\nzu. Die Volltref-\nferchance ist hoch."
    es: "Pinza con fuerza\ny suele dar un\ngolpe crítico."
cross_chop:
  names:
    jp_kana: クロスチョップ
    en: CROSS CHOP
    fr: COUP-CROIX
    it: INCROCOLPO
    de: KREUZHIEB
    es: TAJO CRUZADO
  descriptions:
    jp_kana: "りょうて　チョップで\nあいてを　たたきつけて\nこうげきする。\nきゅうしょに　あたる\nかくりつが　たかい。"
    en: "The foe is hit with\ndouble chops.\nIt has a high\ncritical-hit ratio."
    fr: "2 attaques\ntranchantes. Taux\nde critiques élevé."
    it: "Doppio colpo netto:\nprobabile brutto\ncolpo."
    de: "Doppelter Hieb.\nHohe Volltreffer-\nquote."
    es: "Corte doble que\nsuele propinar\nun golpe crítico."
crunch:
  names:
    jp_kana: かみくだく
    en: CRUNCH
    fr: MACHOUILLE
    it: SGRANOCCHIO
    de: KNIRSCHER
    es: TRITURAR
  descriptions:
    jp_kana: "ながく　するどい　はで\nつよく　かみくだいて\nこうげきする。\nあいての　とくぼうを\nさげることが　ある。"
    en: "The foe is crunched\nwith sharp fangs.\nIt may lower the\nfoe’s SP. DEF."
    fr: "Utilise ses crocs\npointus. Peut\nbaisser la\nDEF. SPE."
    it: "Attacco con denti\naffilati. Può\nridurre la DIFESA\nSPECIALE."
    de: "Beißt mit scharfen\nReißzähnen zu\nund senkt evtl.\ndie SP. VER."
    es: "Tritura con finos\ncolmillos y puede\nbajar la DEF. ESP."
crush_claw:
  names:
    jp_kana: ブレイククロー
    en: CRUSH CLAW
    fr: ECLATEGRIFFE
    it: TRITARTIGLI
    de: ZERMALMKLAUE
    es: GARRA BRUTAL
  descriptions:
    jp_kana: "かたく　するどい\nツメで　きりさいて\nこうげきする。\nあいての　ぼうぎょを\nさげることが　ある。"
    en: "The foe is attacked\nwith sharp claws.\nIt may also lower\nthe foe’s DEFENSE."
    fr: "Lacère avec\ndes griffes. Peut\nbaisser la\nDEFENSE."
    it: "Artigli affilati che\npossono ridurre la\nDIFESA del nemico."
    de: "Angriff mit scharfen\nKlauen. Senkt evtl.\nden VERT.-Wert."
    es: "Hace trizas al\nenemigo y puede\nbajar la DEFENSA."
curse:
  names:
    jp_kana: のろい
    en: CURSE
    fr: MALEDICTION
    it: MALEDIZIONE
    de: FLUCH
    es: MALDICIÓN
  descriptions:
    jp_kana: "つかう　ポケモンが\nゴーストタイプと\nそれ　いがい　とでは\nわざの　こうかが\nぜんぜん　ちがう。"
    en: "A move that works\ndifferently for the\nGHOST-type and all\nthe other types."
    fr: "Coup qui fonctionne\nautrement pour les\nSPECTRES."
    it: "Per il tipo SPETTRO\nha un effetto\ndiverso."
    de: "Ein Angriff, der bei\nGEIST-PKMN\nanders\nfunktioniert."
    es: "En el tipo\nFANTASMA tiene\nun efecto distinto."
cut:
  names:
    jp_kana: いあいぎり
    en: CUT
    fr: COUPE
    it: TAGLIO
    de: ZERSCHNEIDER
    es: CORTE
  descriptions:
    jp_kana: "カマや　ツメなどで\nあいてを　きりつけて\nこうげきする。\nほそい　きや　くさを\nきることも　できる。"
    en: "A basic attack.\nIt can be used to\ncut down thin trees\nand grass."
    fr: "Une attaque\nbasique. Peut \ncouper des\npetits arbres."
    it: "Attacco base. Fuori\ndalla lotta, può\ntagliare erba e\npiccoli alberi."
    de: "Ein Basisangriff.\nDamit können\nkleine Bäume\ngefällt werden."
    es: "Corta con garras,\nguadañas, etc.\nFuera de combate\nse usa para cortar."
defense_curl:
  names:
    jp_kana: まるくなる
    en: DEFENSE CURL
    fr: BOUL’ARMURE
    it: RICCIOLSCUDO
    de: EINIGLER
    es: RIZO DEFENSA
  descriptions:
    jp_kana: "からだを　まるめて\nちぢこまり　みを\nまもって　じぶんの\nぼうぎょを　あげる。"
    en: "The user curls up\nto conceal weak\nspots and raise its\nDEFENSE stat."
    fr: "S’enroule pour\ncacher ses points\nfaibles et monter\nsa DEFENSE."
    it: "Raggomitolandosi,\nchi la usa aumenta\nla propria DIFESA."
    de: "Verbirgt Schwächen\ndurch Einrollen und\nhebt gleichzeitig\nden VERT.-Wert."
    es: "Oculta su punto\ndébil al rizarse.\nSube la DEFENSA."
destiny_bond:
  names:
    jp_kana: みちづれ
    en: DESTINY BOND
    fr: PRLVT DESTIN
    it: DESTINOBBL.
    de: ABGANGSBUND
    es: MISMODESTINO
  descriptions:
    jp_kana: "みちづれを　つかった\nポケモンが　てきに\nたおされると\nその　てきも\nいっしょに　たおれる。"
    en: "If the user faints,\nthe foe delivering\nthe final hit also\nfaints."
    fr: "Si le lanceur est\nmis KO, l’ennemi\nle sera également."
    it: "Se chi la usa va\nKO, il nemico fa\nla stessa fine."
    de: "Wird der Angreifer\nbesiegt, gilt das\nauch für den\nGegner."
    es: "Si te debilitas,\nel enemigo\nse debilita\ncontigo."
detect:
  names:
    jp_kana: みきり
    en: DETECT
    fr: DETECTION
    it: INDIVIDUA
    de: SCANNER
    es: DETECCIÓN
  descriptions:
    jp_kana: "さきに　わざを　つかい\nあいての　こうげきを\nまったく　うけない。\nれんぞくで　だすと\nしっぱい　しやすい。"
    en: "Enables the user to\nevade all attacks.\nIt may fail if used\nin succession."
    fr: "Esquive l’attaque,\nmais peut échouer\nsi réutilisé."
    it: "Elude gli attacchi:\nse usata\nripetutamente\npuò fallire."
    de: "Anwender weicht\njeder Attacke aus.\nScheitert evtl. bei\nWiederholung."
    es: "Frena ataques,\npero puede\nfallar si se usa\nsin parar."
dig:
  names:
    jp_kana: あなをほる
    en: DIG
    fr: TUNNEL
    it: FOSSA
    de: SCHAUFLER
    es: EXCAVAR
  descriptions:
    jp_kana: "１ターンめで　じめんに\nもぐり　２ターンめに\nこうげきする。\nダンジョンの　なかから\nでることも　できる。"
    en: "An attack that hits\non the 2nd turn.\nCan also be used\nto exit dungeons."
    fr: "Creuse sous terre\nau 1ᵉʳ tour\net frappe au 2ᵉ."
    it: "Colpisce al 2º\nturno. Si usa anche\nper uscire da certi\nluoghi."
    de: "1. Runde eingrab-\nen und 2. an-\ngreifen. Flucht\naus Höhlen möglich."
    es: "1.ᵉʳ turno: cava.\n2.º: ataca."
disable:
  names:
    jp_kana: かなしばり
    en: DISABLE
    fr: ENTRAVE
    it: INIBITORE
    de: AUSSETZER
    es: ANULACIÓN
  descriptions:
    jp_kana: "うごきを　ふうじて\nあいてが　ちょくぜんに\nつかった　わざを\nすうターンの　あいだ\nつかえなく　する。"
    en: "For a few turns,\nit prevents the foe\nfrom using the move\nit last used."
    fr: "Empêche\nl’utilisation d’une\ndes attaques\nde l’ennemi."
    it: "Forza psichica:\ndisattiva una\nmossa del nemico\nper alcuni turni."
    de: "Die zuletzt benutz-\nte gegn. Attacke\nwird für mehrere\nRunden blockiert."
    es: "Desactiva un ataque\ndel contrincante."
dive:
  names:
    jp_kana: ダイビング
    en: DIVE
    fr: PLONGEE
    it: SUB
    de: TAUCHER
    es: BUCEO
  descriptions:
    jp_kana: "１ターンめで　みずに\nふかく　もぐって\n２ターンめで　あいてに\nむかって　つきあげて\nこうげきする。"
    en: "The user dives\nunderwater on the\nfirst turn and\nstrikes next turn."
    fr: "Plonge en apnée\nau premier tour et\nfrappe au second."
    it: "Chi la usa\ns’immerge al primo\nturno e attacca in\nquello seguente."
    de: "Der Anwender\ntaucht in der 1.\nRunde unter und\ntrifft in Runde 2."
    es: "1.ᵉʳ turno: bucea.\n2.º: golpea."
dizzy_punch:
  names:
    jp_kana: ピヨピヨパンチ
    en: DIZZY PUNCH
    fr: UPPERCUT
    it: STORDIPUGNO
    de: IRRSCHLAG
    es: PUÑO MAREO
  descriptions:
    jp_kana: "リズミカルな　パンチで\nあいてを　なぐって\nこうげきする。\nこんらん　じょうたいに\nすることが　ある。"
    en: "The foe is hit with\na rhythmic punch\nthat may leave it\nconfused."
    fr: "Un coup de poing\ncadencé. Peut\nrendre confus."
    it: "Pugno ritmico che\npuò confondere il\nnemico."
    de: "Rhythmischer\nSchlag, der den\nGegner verwirren\nkann."
    es: "Puño repetitivo\nque puede\ncausar confusión."
doom_desire:
  names:
    jp_kana: はめつのねがい
    en: DOOM DESIRE
    fr: CARNAREKET
    it: OBBLIDERIO
    de: KISMETWUNSCH
    es: DESEO OCULTO
  descriptions:
    jp_kana: "わざを　つかった\n２ターン　あとに\nたくさんの　ひかりを\nあいてに　ふりそそいで\nこうげきする。"
    en: "A move that attacks\nthe foe with a\nblast of light two\nturns after use."
    fr: "Charge la\nlumière pour\nfrapper 2 tours\nplus tard."
    it: "Forte luce solare\nche colpisce dopo\n2 turni."
    de: "Angriff mit Sonnen-\nenergie erfolgt\n2 Runden nach\nAttackeneinsatz."
    es: "Concentra intensa\nluz solar y ataca\n2 turnos después."
double_edge:
  names:
    jp_kana: すてみタックル
    en: DOUBLE-EDGE
    fr: DAMOCLES
    it: SDOPPIATORE
    de: RISIKOTACKLE
    es: DOBLE FILO
  descriptions:
    jp_kana: "いのちを　かけて\nてきに　つっこんで\nこうげきする。\nじぶんも　すこし\nダメージを　うける。"
    en: "A reckless, life-\nrisking tackle that\nalso hurts the user\na little."
    fr: "Une dangereuse\ncharge qui blesse\naussi légèrement\nle lanceur."
    it: "Carica molto\npericolosa che\ndanneggia anche\nchi la fa."
    de: "Lebensgefährlicher\nAngriff, bei dem\nsich der Angreifer\nselbst verletzt."
    es: "Ataque arriesgado\nque también hiere\nal agresor."
double_kick:
  names:
    jp_kana: にどげり
    en: DOUBLE KICK
    fr: DOUBLE PIED
    it: DOPPIOCALCIO
    de: DOPPELKICK
    es: DOBLE PATADA
  descriptions:
    jp_kana: "２ほんの　あしで\nあいてを　けとばして\nこうげきする。\n２かい　れんぞくで\nダメージを　あたえる。"
    en: "Two legs are used\nto quickly kick the\nfoe twice in one\nturn."
    fr: "Un double coup de\npied qui frappe\nl’ennemi deux fois."
    it: "Il nemico è colpito\nda un doppio\ncalcio."
    de: "Beide Beine treten\nin einer Runde\n2-mal schnell zu."
    es: "Una patada doble.\nGolpea 2 veces."
double_slap:
  names:
    jp_kana: おうふくビンタ
    en: DOUBLESLAP
    fr: TORGNOLES
    it: DOPPIASBERLA
    de: DUPLEXHIEB
    es: DOBLEBOFETÓN
  descriptions:
    jp_kana: "おうふく　ビンタで\nあいてを　たたいて\nこうげきする。\n２ー５かい　れんぞくで\nダメージを　あたえる。"
    en: "The foe is slapped\nrepeatedly, back\nand forth, two to\nfive times."
    fr: "Gifle rapidement\nl’ennemi\nde 2 à 5 fois."
    it: "Da 2 a 5 schiaffi\ncolpiscono\nripetutamente il\nnemico."
    de: "Trifft den Gegner\n2 - 5-mal\nhintereinander."
    es: "Abofetea de 2 a 5\nveces seguidas."
double_team:
  names:
    jp_kana: かげぶんしん
    en: DOUBLE TEAM
    fr: REFLET
    it: DOPPIOTEAM
    de: DOPPELTEAM
    es: DOBLE EQUIPO
  descriptions:
    jp_kana: "すばやい　うごきの\nぶんしんで　てきを\nまどわせて　じぶんの\nかいひりつを　あげる。"
    en: "The user creates\nillusory copies of\nitself to raise its\nevasiveness."
    fr: "Crée des\nimages-miroirs\npour augmenter\nl’esquive."
    it: "Copie illusorie\naumentano la\ncapacità di\nelusione."
    de: "Erzeugt Eben-\nbilder, um \nFluchtwert\nzu erhöhen."
    es: "Crea espejismos\npara mejorar\nla EVASIÓN."
dragon_breath:
  names:
    jp_kana: りゅうのいぶき
    en: DRAGONBREATH
    fr: DRACOSOUFFLE
    it: DRAGOSPIRO
    de: FEUERODEM
    es: DRAGOALIENTO
  descriptions:
    jp_kana: "ものすごい　いきを\nあいてに　ふきつけて\nこうげきする。\nまひ　じょうたいに\nすることが　ある。"
    en: "The foe is hit with\nan incredible blast\nof breath that may\nalso paralyze."
    fr: "Frappe l’ennemi\ngrâce à un souffle\nsuper puissant\npouvant paralyser."
    it: "Il nemico è\ninvestito da\nun soffio\npotentissimo."
    de: "Fegt den Gegner\nmit zerstörerisch\nheißem Atem weg."
    es: "Fuerte ráfaga\nde aliento\nque golpea\nal enemigo."
dragon_claw:
  names:
    jp_kana: ドラゴンクロー
    en: DRAGON CLAW
    fr: DRACOGRIFFE
    it: DRAGARTIGLI
    de: DRACHENKLAUE
    es: GARRA DRAGÓN
  descriptions:
    jp_kana: "するどく　とがった\nきょだいな　ツメで\nあいてを　きりさいて\nこうげきする。"
    en: "Sharp, huge claws\nhook and slash the\nfoe quickly and\nwith great power."
    fr: "Tranche violemment\nl’ennemi avec des\ngriffes acérées."
    it: "Artigli affilati\naggrediscono il\nnemico."
    de: "Der Gegner wird mit\nriesigen, scharfen\nKlauen stark\nverletzt."
    es: "Araña al rival\ncon garras\nafiladas."
dragon_dance:
  names:
    jp_kana: りゅうのまい
    en: DRAGON DANCE
    fr: DANSE DRACO
    it: DRAGODANZA
    de: DRACHENTANZ
    es: DANZA DRAGÓN
  descriptions:
    jp_kana: "とても　しんぴてきで　\nちからづよい　まいを\nはげしく　おどって\nじぶんの　こうげきと\nすばやさを　あげる。"
    en: "A mystic, powerful\ndance that boosts\nthe user’s ATTACK\nand SPEED stats."
    fr: "Danse mystique\naugmentant\nl’ATTAQUE et\nla VITESSE."
    it: "Danza magica che\naumenta l’ATTACCO\ne la VELOCITÀ di\nchi la usa."
    de: "Ein mystischer\nTanz, der den\nANGR.- und INIT.-\nWert erhöht."
    es: "Danza mística\nque sube\nel ATAQUE\ny la VELOCIDAD."
dragon_rage:
  names:
    jp_kana: りゅうのいかり
    en: DRAGON RAGE
    fr: DRACO-RAGE
    it: IRA DI DRAGO
    de: DRACHENWUT
    es: FURIA DRAGÓN
  descriptions:
    jp_kana: "しょうげきはを\nあいてに　ぶつけて\nこうげきする。\n４０の　きまった\nダメージを　あたえる。"
    en: "The foe is hit with\na shock wave that\nalways inflicts 40-\nHP damage."
    fr: "Envoie des ondes\nde choc infligeant\n40 PV de dégâts."
    it: "Fiammate che\ncausano sempre\nun danno di 40 PS."
    de: "Stößt Schockwellen\naus, die stets\n40 KP Schaden\nanrichten."
    es: "Cadena de ondas de\nchoque que quitan\n40 PS."
dream_eater:
  names:
    jp_kana: ゆめくい
    en: DREAM EATER
    fr: DEVOREVE
    it: MANGIASOGNI
    de: TRAUMFRESSER
    es: COME SUEÑOS
  descriptions:
    jp_kana: "ねむり　じょうたいの\nあいての　ゆめを\nたべて　あたえた\nダメージの　はんぶん\nＨＰが　かいふくする。"
    en: "Absorbs half the\ndamage it inflicted\non a sleeping foe\nto restore HP."
    fr: "Convertit en PV la\nmoitié des dégâts\ninfligés à l’ennemi\nendormi."
    it: "Assorbe metà dei\nPS persi da un\nnemico\naddormentato."
    de: "Schaden an schla-\nfendem Gegner\nwird halb Anwender\ngutgeschrieben."
    es: "Roba la mitad\ndel daño causado\na un rival dormido."
drill_peck:
  names:
    jp_kana: ドリルくちばし
    en: DRILL PECK
    fr: BEC VRILLE
    it: PERFORBECCO
    de: BOHRSCHNABEL
    es: PICO TALADRO
  descriptions:
    jp_kana: "するどく　とがった\nくちばしを　じくに\nからだを　かいてんして\nあいてに　つっこんで\nこうげきする。"
    en: "A corkscrewing\nattack with the\nsharp beak acting\nas a drill."
    fr: "Une attaque\nutilisant le\nbec comme\nune perceuse."
    it: "Attacco a spirale\ncon un becco\ntrapanante."
    de: "Korkenzieherangriff,\nbei dem der\nSchnabel als\nBohrer dient."
    es: "Picotazo giratorio\ny perforador muy\npotente."
dynamic_punch:
  names:
    jp_kana: ばくれつパンチ
    en: DYNAMICPUNCH
    fr: DYNAMOPOING
    it: DINAMIPUGNO
    de: WUCHTSCHLAG
    es: PUÑODINÁMICO
  descriptions:
    jp_kana: "こんしんの　ちからで\nパンチを　くりだして\nこうげきする。\nあいてを　こんらんの\nじょうたいに　する。"
    en: "The foe is punched\nwith the user’s full\npower. It confuses\nthe foe if it hits."
    fr: "Puissant et rend\nconfus,  mais pas\ntrès précis."
    it: "È potente.\nSe va a segno,\nconfonde il \nnemico."
    de: "Kräftiger Schlag,\nder den Gegner\nbei Erfolg evtl.\nverwirrt."
    es: "No es certero,\npero causa\nconfusión si atina."
earthquake:
  names:
    jp_kana: じしん
    en: EARTHQUAKE
    fr: SEISME
    it: TERREMOTO
    de: ERDBEBEN
    es: TERREMOTO
  descriptions:
    jp_kana: "せんとうに　でている\nじぶん　いがいの\nポケモンに　じしんの\nしょうげきを　あたえて\nこうげきする。"
    en: "An earthquake that\nstrikes all POKéMON\nin battle excluding\nthe user."
    fr: "Tremblement de\nterre sans effet\nsur les adversaires\nvolants."
    it: "Potente sisma, che \nha effetto su ogni\nPOKéMON in campo\ntranne chi lo usa."
    de: "Ein mächtiges\nBeben, das außer\nfliegende Gegner\nalle trifft."
    es: "Fuerte, pero inútil\ncontra voladores."
egg_bomb:
  names:
    jp_kana: タマゴばくだん
    en: EGG BOMB
    fr: BOMB’OEUF
    it: UOVOBOMBA
    de: EIERBOMBE
    es: BOMBA HUEVO
  descriptions:
    jp_kana: "おおきな　タマゴを\nちから　いっぱい\nあいてに　なげつけて\nこうげきする。"
    en: "A large egg is\nhurled with great\nforce at the foe to\ninflict damage."
    fr: "Envoie violemment\nun œuf en direction\nde l’ennemi."
    it: "Un uovo\nscaraventato\ncontro il nemico."
    de: "Ein großes Ei\nwird auf den\nGegner abgefeuert,\num ihm zu schaden."
    es: "Arroja un huevo\nal enemigo."
ember:
  names:
    jp_kana: ひのこ
    en: EMBER
    fr: FLAMMECHE
    it: BRACIERE
    de: GLUT
    es: ASCUAS
  descriptions:
    jp_kana: "ちいさな　ほのおを\nあいてに　はっしゃして\nこうげきする。\nやけど　じょうたいに\nすることが　ある。"
    en: "The foe is attacked\nwith small flames.\nThe foe may suffer\na burn."
    fr: "Une faible attaque\nde feu pouvant\nbrûler l’ennemi."
    it: "Debole attacco\ndi fuoco che può\nscottare."
    de: "Schwache Feuer-\nAttacke, die evtl.\nden Gegner\nverbrennt."
    es: "Ligero ataque que\npuede causar\nquemaduras."
encore:
  names:
    jp_kana: アンコール
    en: ENCORE
    fr: ENCORE
    it: RIPETI
    de: ZUGABE
    es: OTRA VEZ
  descriptions:
    jp_kana: "あいてが　さいごに\nつかった　わざを\n２ー６ターンの　あいだ\nずっと　ださせる。"
    en: "Makes the foe use\nthe move it last\nused repeatedly for\ntwo to six turns."
    fr: "Oblige l’ennemi à\nrépéter sa dernière\naction 2 à 6 tours."
    it: "Il nemico ripete\nl’ultima mossa\nda 2 a 6 turni."
    de: "Gegner wiederholt\nletzten Angriff\n2 - 6 Runden lang."
    es: "El rival repite\nel último ataque\nde 2 a 6 veces."
endeavor:
  names:
    jp_kana: がむしゃら
    en: ENDEAVOR
    fr: EFFORT
    it: RIMONTA
    de: NOTSITUATION
    es: ESFUERZO
  descriptions:
    jp_kana: "じぶんの　ＨＰが\nあいての　ＨＰより\nすくないほど\nあいてに　おおきな\nダメージを　あたえる。"
    en: "Gains power the\nfewer HP the user\nhas compared with\nthe foe."
    fr: "Gagne en\npuissance si PV\ninférieurs aux\nPV ennemis."
    it: "Più potente se chi\nla usa ha meno\nPS del nemico."
    de: "Wird stärker, wenn\nKP des Anwenders\ngeringer als KP des\nGegners sind."
    es: "Gana fuerza si\nel atacante\ntiene menos\nPS que el rival."
endure:
  names:
    jp_kana: こらえる
    en: ENDURE
    fr: TENACITE
    it: RESISTENZA
    de: AUSDAUER
    es: AGUANTE
  descriptions:
    jp_kana: "こうげきを　うけても\nＨＰが　かならず\n１だけ　のこる。\nれんぞくで　だすと\nしっぱい　しやすい。"
    en: "The user endures\nany hit with 1 HP\nleft. It may fail if\nused in succession."
    fr: "Résiste aux\nattaques du tour\navec 1 PV. Peut\néchouer si répété."
    it: "Chi la usa resiste\ncon almeno 1 PS.\nUsata ripetutamente\npuò fallire."
    de: "1 KP bleibt stets\nübrig. Misserfolg\nbei Wiederholung\nmöglich."
    es: "Resiste el ataque\nde 1 turno y deja\nal menos 1 PS."
eruption:
  names:
    jp_kana: ふんか
    en: ERUPTION
    fr: ERUPTION
    it: ERUZIONE
    de: ERUPTION
    es: ESTALLIDO
  descriptions:
    jp_kana: "いかりを　ばくはつ\nさせて　こうげきする。\nＨＰが　おおいほど\nあいてに　おおきな\nダメージを　あたえる。"
    en: "The higher the\nuser’s HP, the more\npowerful this\nattack becomes."
    fr: "Inflige plus de\ndégâts si les PV\ndu lanceur sont\nélevés."
    it: "Il danno dipende\ndai PS di chi la\nusa."
    de: "Je höher die KP\ndes Benutzers sind,\ndesto mehr Schaden\nwird angerichtet."
    es: "Cuanto mayor\nsea el número\nde tus PS, más\ndaño harás."
explosion:
  names:
    jp_kana: だいばくはつ
    en: EXPLOSION
    fr: EXPLOSION
    it: ESPLOSIONE
    de: EXPLOSION
    es: EXPLOSIÓN
  descriptions:
    jp_kana: "だいばくはつを　おこし\nあいてを　まきこんで\nこうげきする。\nつかった　あとに\nじぶんは　たおれる。"
    en: "The user explodes\nto inflict terrible\ndamage even while\nfainting itself."
    fr: "Inflige de sérieux\ndégâts, mais met le\nlanceur KO."
    it: "Infligge un forte\ndanno, ma chi la\nusa va KO."
    de: "Anwender explo-\ndiert, richtet gros-\nsen Schaden an\nund wird besiegt."
    es: "Causa mucho daño,\npero te debilita."
extrasensory:
  names:
    jp_kana: じんつうりき
    en: EXTRASENSORY
    fr: EXTRASENSEUR
    it: EXTRASENSO
    de: SONDERSENSOR
    es: PARANORMAL
  descriptions:
    jp_kana: "みえない　ふしぎな\nちからを　おくって\nこうげきする。\nあいてを　ひるませる\nことが　ある。"
    en: "The user attacks\nwith an odd power\nthat may make the\nfoe flinch."
    fr: "Pouvoir singulier\nqui peut\napeurer l’ennemi."
    it: "Forza particolare\nche può far\ntentennare il\nnemico."
    de: "Besonderer Angriff,\nder den Gegner\nevtl. zurück-\nschrecken lässt."
    es: "Energía muy\nextraña que\npuede causar\nel retroceso."
extreme_speed:
  names:
    jp_kana: しんそく
    en: EXTREMESPEED
    fr: VIT.EXTREME
    it: EXTRARAPIDO
    de: TURBOTEMPO
    es: VEL. EXTREMA
  descriptions:
    jp_kana: "めにも　とまらない\nものすごい　はやさで\nあいてに　とっしんして\nかならず　せんせい\nこうげきする。"
    en: "A blindingly speedy\ncharge attack that\nalways goes before\nany other."
    fr: "Une attaque\nextrêmement\nrapide et\npuissante."
    it: "Attacco\nestremamente\nrapido e potente."
    de: "Extrem schnelle\nund kraftvolle\nAttacke, die stets\nzuerst trifft."
    es: "Ataque extrema-\ndamente rápido\ny demoledor."
facade:
  names:
    jp_kana: からげんき
    en: FACADE
    fr: FACADE
    it: FACCIATA
    de: FASSADE
    es: IMAGEN
  descriptions:
    jp_kana: "じぶんが　どく　まひ\nやけど　じょうたいの\nときは　あいてに\nあたえる　ダメージが\nおおきくなる。"
    en: "An attack that is\nboosted if user is\nburned, poisoned,\nor paralyzed."
    fr: "Booste l’ATTAQUE\nsi le lanceur est\nbrûlé, paralysé\nou empoisonné."
    it: "Più potente se il\nnemico è scottato,\navvelenato o\nparalizzato."
    de: "Erhöht ANGR. nach\nVerbrennung,\nParalyse oder\nVergiftung."
    es: "Potencia el ATAQUE\nal estar quemado,\nparalizado o\nenvenenado."
fake_out:
  names:
    jp_kana: ねこだまし
    en: FAKE OUT
    fr: BLUFF
    it: BRUCIAPELO
    de: MOGELHIEB
    es: SORPRESA
  descriptions:
    jp_kana: "さきに　わざを　つかい\nきしゅう　こうげきで\nあいてを　ひるませる。\nさいしょの　ターンしか\nせいこうしない。"
    en: "An attack that hits\nfirst and causes\nflinching. Usable\nonly on 1st turn."
    fr: "Une attaque en\ndébut de bataille\npour apeurer."
    it: "Primo colpo al\nprimo turno: può\nfar tentennare."
    de: "Trifft schon beim\nersten Schlag.\nGegner schreckt\nevtl. zurück."
    es: "Ataca primero\nen un turno\ny puede causar\nretroceso."
fake_tears:
  names:
    jp_kana: うそなき
    en: FAKE TEARS
    fr: CROCO LARME
    it: FALSELACRIME
    de: TRUGTRÄNE
    es: LLANTO FALSO
  descriptions:
    jp_kana: "ないた　ふりを　して\nなみだを　ながし\nこまらせる　ことで\nあいての　とくぼうを\nガクッと　さげる。"
    en: "The user feigns\ncrying to sharply\nlower the foe’s\nSP. DEF stat."
    fr: "Fait semblant de\npleurer pour\nbaisser beaucoup\nla DEF. SPE."
    it: "Pianto teatrale che\nriduce la DIF.\nSPEC. del\nnemico."
    de: "Täuscht Weinen vor,\num den gegnerischen\nSP. VER.-Wert zu\nsenken."
    es: "Lágrimas de\ncocodrilo que\nbajan mucho\nla DEF. ESP."
false_swipe:
  names:
    jp_kana: みねうち
    en: FALSE SWIPE
    fr: FAUX-CHAGE
    it: FALSOFINALE
    de: TRUGSCHLAG
    es: FALSOTORTAZO
  descriptions:
    jp_kana: "あいての　ＨＰが\nかならず　１だけ\nのこる　ように\nてかげん　して\nこうげきする。"
    en: "A restrained attack\nthat always leaves\nthe foe with at\nleast 1 HP."
    fr: "Une attaque qui\nlaisse au\nmoins 1 PV à\nl’ennemi."
    it: "Attacco che lascia\nil nemico con\nalmeno 1 PS."
    de: "Ein Angriff, der\ndem Gegner\nzumindest 1 KP\nlässt."
    es: "Deja al enemigo\ncon al menos 1 PS."
feather_dance:
  names:
    jp_kana: フェザーダンス
    en: FEATHERDANCE
    fr: DANSE-PLUME
    it: DANZADIPIUME
    de: DAUNENREIGEN
    es: DANZA PLUMA
  descriptions:
    jp_kana: "こまかい　うもうを\nたいりょうに　ふりまき\nからだに　からませて\nあいての　こうげきを\nガクッと　さげる。"
    en: "The foe is covered\nwith a mass of down\nthat sharply cuts\nthe ATTACK stat."
    fr: "Enveloppe\nl’ennemi de duvet\net baisse beaucoup\nl’ATTAQUE."
    it: "Un manto di piume\nriduce di molto\nl’ATTACCO del\nnemico."
    de: "Hüllt Gegner in\nDaunen und\nsenkt den ANGR.\ndeutlich."
    es: "Envuelve al rival\ncon plumón\npara reducir\nsu ATAQUE."
feint_attack:
  names:
    jp_kana: だましうち
    en: FAINT ATTACK
    fr: FEINTE
    it: FINTA
    de: FINTE
    es: FINTA
  descriptions:
    jp_kana: "あいてを　ゆだんさせて\nちかづいて　いって\nこうげきする。\nこうげきは　かならず\nめいちゅう　する。"
    en: "The user draws up\nclose to the foe\ndisarmingly, then\nhits without fail."
    fr: "Attire l’ennemi et\nfrappe sans jamais\néchouer."
    it: "Avvicina il nemico\nper colpirlo\ninfallibilmente."
    de: "Zieht Gegner heran,\nentwaffnet ihn und\ntrifft gewiss."
    es: "Acerca al enemigo\npara que el golpe\nno falle."
fire_blast:
  names:
    jp_kana: だいもんじ
    en: FIRE BLAST
    fr: DEFLAGRATION
    it: FUOCOBOMBA
    de: FEUERSTURM
    es: LLAMARADA
  descriptions:
    jp_kana: "だいのじの　ほのおを\nあいてに　はっしゃして\nこうげきする。\nやけど　じょうたいに\nすることが　ある。"
    en: "The foe is hit with\nan intense flame.\nIt may leave the\ntarget with a burn."
    fr: "Une explosion\nde flammes.\nPeut brûler\nl’ennemi."
    it: "Un’intensa fiammata\nfa terra bruciata:\npuò far scottare."
    de: "Feuersbrunst, die\nalles versengt.\nVerbrennt den\nGegner evtl."
    es: "Llama que lo\nchamusca todo\ny suele causar\nquemadura."
fire_punch:
  names:
    jp_kana: ほのおのパンチ
    en: FIRE PUNCH
    fr: POING DE FEU
    it: FUOCOPUGNO
    de: FEUERSCHLAG
    es: PUÑO FUEGO
  descriptions:
    jp_kana: "ほのおを　こめた\nパンチで　あいてを\nこうげきする。\nやけど　じょうたいに\nすることが　ある。"
    en: "The foe is punched\nwith a fiery fist.\nIt may leave the\nfoe with a burn."
    fr: "Un poing de feu\npouvant brûler\nl’ennemi."
    it: "Pugno ardente che\npuò scottare il\nnemico."
    de: "Schlag, der dem\nGegner evtl.\nVerbrennungen\nzufügt."
    es: "Puñetazo ardiente.\nPuede quemar."
fire_spin:
  names:
    jp_kana: ほのおのうず
    en: FIRE SPIN
    fr: DANSEFLAMME
    it: TURBOFUOCO
    de: FEUERWIRBEL
    es: GIRO FUEGO
  descriptions:
    jp_kana: "はげしく　うずをまく\nほのおの　なかに\n２ー５ターンの　あいだ\nあいてを　とじこめ\nこうげきする。"
    en: "The foe is trapped\nin an intense spiral\nof fire that rages\ntwo to five turns."
    fr: "Encercle l’ennemi\navec des flammes\npendant 2 à 5\ntours."
    it: "Un turbine di fuoco\navvolge il nemico\nda 2 a 5 turni."
    de: "Der Gegner wird\nfür 2 - 5 Runden in\neinem Feuerkreis\ngefangen."
    es: "Un aro de fuego\nque atrapa de 2\na 5 veces."
fissure:
  names:
    jp_kana: じわれ
    en: FISSURE
    fr: ABIME
    it: ABISSO
    de: GEOFISSUR
    es: FISURA
  descriptions:
    jp_kana: "じわれを　おこして\nあいてを　おとして\nこうげきする。\nあたれば　いちげきで\nあいては　たおれる。"
    en: "The foe is dropped\ninto a fissure.\nThe foe faints if it\nhits."
    fr: "Fait tomber\nl’ennemi dans une\ncrevasse et le\nmet KO."
    it: "Mossa da KO in un\nattacco: getta in\nun abisso."
    de: "Sofort-K.O., wenn\nerfolgreich. Gegner\nwird in Gebirgs-\nspalte geworfen."
    es: "Ataque de tierra.\nFulmina en 1 golpe."
flail:
  names:
    jp_kana: じたばた
    en: FLAIL
    fr: FLEAU
    it: FLAGELLO
    de: DRESCHFLEGEL
    es: AZOTE
  descriptions:
    jp_kana: "じたばた　あばれて\nこうげきする。\nじぶんの　ＨＰが\nすくないほど　あたえる\nダメージが　おおきい。"
    en: "A desperate attack\nthat becomes more\npowerful the less\nHP the user has."
    fr: "Inflige plus de\ndégâts quand le\nlanceur n’a presque\nplus de PV."
    it: "Arreca danni\nmaggiori se i PS\ndi chi la usa\nsono bassi."
    de: "Attacke richtet\nmehr Schaden\nan, wenn eigene\nKP niedrig sind."
    es: "Causa un daño\nmayor si tienes\npocos PS."
flame_wheel:
  names:
    jp_kana: かえんぐるま
    en: FLAME WHEEL
    fr: ROUE DE FEU
    it: RUOTAFUOCO
    de: FLAMMENRAD
    es: RUEDA FUEGO
  descriptions:
    jp_kana: "ほのおを　まとい\nあいてに　とっしんして\nこうげきする。\nやけど　じょうたいに\nすることが　ある。"
    en: "The user makes a\nfiery charge at the\nfoe. It may cause\na burn."
    fr: "Une charge\nenflammée qui\npeut brûler\nl’ennemi."
    it: "Carica rovente che\npuò far scottare il\nnemico."
    de: "Feuer-Attacke, die\nden Gegner evtl.\nverbrennt."
    es: "Ataque de fuego\nque puede causar\nquemaduras."
flamethrower:
  names:
    jp_kana: かえんほうしゃ
    en: FLAMETHROWER
    fr: LANCE-FLAMME
    it: LANCIAFIAMME
    de: FLAMMENWURF
    es: LANZALLAMAS
  descriptions:
    jp_kana: "はげしい　ほのおを\nあいてに　はっしゃして\nこうげきする。\nやけど　じょうたいに\nすることが　ある。"
    en: "The foe is scorched\nwith intense flames.\nThe foe may suffer\na burn."
    fr: "Une puissante\nattaque de feu\npouvant brûler\nl’ennemi."
    it: "Forte attacco\ndi fuoco che può\nscottare."
    de: "Starke Feuer-\nAttacke, die evtl.\nden Gegner\nverbrennt."
    es: "Fuerte ataque que\npuede causar\nquemaduras."
flash:
  names:
    jp_kana: フラッシュ
    en: FLASH
    fr: FLASH
    it: FLASH
    de: BLITZ
    es: DESTELLO
  descriptions:
    jp_kana: "ひかりで　あいての\nめいちゅうを　さげる。\nくらい　どうくつないで\nつかうと　まわりを\nあかるく　てらせる。"
    en: "A blast of light\nthat cuts the foe’s\naccuracy. It also\nilluminates caves."
    fr: "Explosion lumineuse\nqui fait baisser\nla précision."
    it: "Abbatte la\nprecisione. Anche\nusata per\nilluminare grotte."
    de: "Erzeugt helles\nLicht, das die\ngegnerische\nGenauigkeit senkt."
    es: "Luz cegadora que\nbaja la PRECISIÓN.\nFuera de combate\nsirve para iluminar."
flatter:
  names:
    jp_kana: おだてる
    en: FLATTER
    fr: FLATTERIE
    it: ADULAZIONE
    de: SCHMEICHLER
    es: CAMELO
  descriptions:
    jp_kana: "あいてを　おだてて\nこんらん　じょうたいに\nするが　そのかわり\nどうじに　あいての\nとくこうを　あげる。"
    en: "Flattery is used to\nconfuse the foe,\nbut its SP. ATK\nalso rises."
    fr: "Rend l’ennemi\nconfus, mais\naugmente son \nATQ. SPE."
    it: "Confonde il nemico\nma ne aumenta\nl’ATTACCO\nSPECIALE."
    de: "Schmeichelt Geg-\nner, um ihn zu\nverwirren. Erhöht\ndessen SP. ANG."
    es: "Confunde al rival,\npero sube su AT.\nESP."
fly:
  names:
    jp_kana: そらをとぶ
    en: FLY
    fr: VOL
    it: VOLO
    de: FLIEGEN
    es: VUELO
  descriptions:
    jp_kana: "１ターンめで　そらに\nとんで　２ターンめに\nこうげきする。\nしっている　まちに\nとぶことも　できる。"
    en: "A 2-turn move that\nhits on the 2nd\nturn. Use it to fly\nto any known town."
    fr: "S’envole au premier\ntour et frappe au\nsecond."
    it: "Mossa in 2 turni\nche colpisce al 2º.\nUsata per spostarsi\ntra le città."
    de: "Steigt in der 1.\nRunde empor und\ntrifft den Gegner\nin Runde 2."
    es: "1.ᵉʳ turno: vuela.\n2.º: ataca. Fuera\nde combate lleva a\nsitios conocidos."
focus_energy:
  names:
    jp_kana: きあいだめ
    en: FOCUS ENERGY
    fr: PUISSANCE
    it: FOCALENERGIA
    de: ENERGIEFOKUS
    es: FOCO ENERGÍA
  descriptions:
    jp_kana: "おおきく　いきを　すい\nきあいを　こめて\nじぶんの　こうげきが\nきゅうしょに　あたる\nかくりつを　たかめる。"
    en: "The user takes a\ndeep breath and\nfocuses to raise its\ncritical-hit ratio."
    fr: "Concentration\npour booster\nle taux de\ncritiques."
    it: "Concentrazione\nenergetica:\nbrutti colpi più\nprobabili."
    de: "Anwender atmet\nein und bündelt\nKraft. Volltreffer-\nchance steigt."
    es: "Concentra energía\npara asegurar\nun golpe crítico."
focus_punch:
  names:
    jp_kana: きあいパンチ
    en: FOCUS PUNCH
    fr: MITRA-POING
    it: CENTRIPUGNO
    de: POWER-PUNCH
    es: PUÑO CERTERO
  descriptions:
    jp_kana: "あいてより　あとに\nこうげきする。\nわざを　だす　までに\nこうげきを　うけると\nひるんで　しまう。"
    en: "An attack that is\nexecuted last.\nThe user flinches\nif hit beforehand."
    fr: "Attaque en dernier.\nLanceur apeuré\nsi touché avant."
    it: "Colpisce per\nultima. Chi la\nusa tentenna\nse colpito."
    de: "Angriff, der zu-\nletzt erfolgt. Der\nAnwender schreckt\nevtl. zurück."
    es: "Es tardío, pero\nsi el rival\nte golpea\nno te moverás."
follow_me:
  names:
    jp_kana: このゆびとまれ
    en: FOLLOW ME
    fr: PAR ICI
    it: SONOQUI
    de: SPOTLIGHT
    es: SEÑUELO
  descriptions:
    jp_kana: "てきの　めを　じぶんに\nちゅうもく　させて\nてきが　つかう　わざは\nすべて　じぶんに\nくるように　する。"
    en: "The user draws\nattention to itself,\nmaking foes attack\nonly the user."
    fr: "Attire l’attention.\nLes adversaires.\nn’attaquent que le\nlanceur."
    it: "Chi la usa\ncostringe il nemico\nad attaccarlo."
    de: "Zieht Aufmerksam-\nkeit auf sich.\nGegner greift nur\nAnwender an."
    es: "Llama la atención\npara concentrar\nlos ataques."
foresight:
  names:
    jp_kana: みやぶる
    en: FORESIGHT
    fr: CLAIRVOYANCE
    it: PREVEGGENZA
    de: GESICHTE
    es: PROFECÍA
  descriptions:
    jp_kana: "かいひりつが　あがって\nわざを　あてにくく\nなってしまって　いる\nあいての　かいひりつを\nもとに　もどす。"
    en: "Completely negates\nthe foe’s efforts to\nheighten its ability\nto evade."
    fr: "Empêche l’ennemi\nd’améliorer son\nesquive."
    it: "Vanifica l’aumento\ndi elusione del\nnemico."
    de: "Verhindert den\nAnstieg von\ngegnerischem\nFluchtwert."
    es: "Anula los intentos\ndel rival de\naumentar\nla EVASIÓN."
frenzy_plant:
  names:
    jp_kana: ハードプラント
    en: FRENZY PLANT
    fr: VEGE-ATTAK
    it: RADICALBERO
    de: FAUNA-STATUE
    es: PLANTA FEROZ
  descriptions:
    jp_kana: "きょだいな　じゅもくを\nあいてに　たたきつけて\nこうげきする。\nつぎの　ターンは\nうごけなく　なる。"
    en: "The foe is hit with\nan enormous branch.\nThe user can’t move\non the next turn."
    fr: "Puissant, mais\nimmobilise le\nlanceur le tour\nsuivant."
    it: "È potente, ma chi\nla usa perde il\nturno successivo."
    de: "Angriff mit dickem\nAst. Der Angreifer\nmuss eine Runde\naussetzen."
    es: "Es eficaz, pero\ndeja inmóvil al\nagresor 1 turno."
frustration:
  names:
    jp_kana: やつあたり
    en: FRUSTRATION
    fr: FRUSTRATION
    it: FRUSTRAZIONE
    de: FRUSTRATION
    es: FRUSTRACIÓN
  descriptions:
    jp_kana: "ふまんを　はらすために\nあいてを　ぜんりょくで\nこうげきする。\nなついて　いないほど\nダメージが　おおきい。"
    en: "This attack move\ngrows more powerful\nthe less the user\nlikes its TRAINER."
    fr: "Attaque plus\npuissante si le\nDRESSEUR est\nmal aimé."
    it: "Più potente se chi\nla usa non ama il\nsuo ALLENATORE."
    de: "Die Attacke ist\nstärker bei\nverhassten\nTRAINERn."
    es: "Es más fuerte si\nno se aprecia\nal ENTRENADOR."
fury_attack:
  names:
    jp_kana: みだれづき
    en: FURY ATTACK
    fr: FURIE
    it: FURIA
    de: FURIENSCHLAG
    es: ATAQUE FURIA
  descriptions:
    jp_kana: "つのや　くちばしで\nあいてを　つついて\nこうげきする。\n２ー５かい　れんぞくで\nダメージを　あたえる。"
    en: "The foe is jabbed\nrepeatedly with a\nhorn or beak two to\nfive times."
    fr: "Frappe l’ennemi\n2 à 5 fois avec\nune corne, un bec,\netc."
    it: "Corna affilate\ninfilzano il nemico\nda 2 a 5 volte."
    de: "Spießt den Gegner\n2 - 5-mal mit\nspitzem Horn oder\nSchnabel auf."
    es: "Cornea al enemigo\nde 2 a 5 veces."
fury_cutter:
  names:
    jp_kana: れんぞくぎり
    en: FURY CUTTER
    fr: TAILLADE
    it: TAGLIOFURIA
    de: ZORNKLINGE
    es: CORTEFURIA
  descriptions:
    jp_kana: "カマや　ツメ　などで\nあいてを　きりつけて\nこうげきする。\nれんぞくで　あてると\nダメージが　ふえる。"
    en: "An attack that\ngrows stronger on\neach successive\nhit."
    fr: "Une attaque qui\ns’intensifie après\nchaque coup."
    it: "Aumenta d’intensità\nad ogni colpo\nsuccessivo."
    de: "Eine Attacke, deren\nHärte bei jedem\nTreffer zunimmt."
    es: "Crece en intensidad\nsi se usa repetidas\nveces."
fury_swipes:
  names:
    jp_kana: みだれひっかき
    en: FURY SWIPES
    fr: COMBO-GRIFFE
    it: SFURIATE
    de: KRATZFURIE
    es: GOLPES FURIA
  descriptions:
    jp_kana: "ツメや　カマなどで\nあいてを　ひっかいて\nこうげきする。\n２ー５かい　れんぞくで\nダメージを　あたえる。"
    en: "The foe is raked\nwith sharp claws or\nscythes two to five\ntimes."
    fr: "Ecorche l’ennemi\navec des griffes\nou des faux\nde 2 à 5 fois."
    it: "Tormenta con\ntenaglie e simili\nda 2 a 5 volte."
    de: "Beharkt Gegner\n2 - 5-mal mit\nscharfen Klauen\noder Sicheln."
    es: "Araña rápidamente\nde 2 a 5 veces."
future_sight:
  names:
    jp_kana: みらいよち
    en: FUTURE SIGHT
    fr: PRESCIENCE
    it: DIVINAZIONE
    de: SEHER
    es: PREMONICIÓN
  descriptions:
    jp_kana: "わざを　つかった\n２ターン　あとに\nねんりきを　だして\nあいてに　おくりこんで\nこうげきする。"
    en: "Two turns after\nthis move is used,\nthe foe is attacked\npsychically."
    fr: "Accumule de\nl’énergie pour\nfrapper 2 tours\nplus tard."
    it: "Raccoglie le forze\nper colpire dopo\n2 turni."
    de: "Zwei Runden nach-\ndem SEHER einge-\nsetzt wurde erfolgt\ndie Attacke."
    es: "Aumenta la energía\ninterior para\ngolpear a los 2\nturnos."
giga_drain:
  names:
    jp_kana: ギガドレイン
    en: GIGA DRAIN
    fr: GIGA-SANGSUE
    it: GIGASSORBIM.
    de: GIGASAUGER
    es: GIGADRENADO
  descriptions:
    jp_kana: "ようぶんを　すいとって\nこうげきする。\nあいてに　あたえた\nダメージの　はんぶん\nＨＰが　かいふくする。"
    en: "A harsh attack that\nabsorbs half the\ndamage it inflicted\nto restore HP."
    fr: "Absorbe la moitié\ndes dégâts infligés\net les convertit en\nPV."
    it: "Violento attacco\nche assorbe metà\ndei PS sottratti al\nnemico."
    de: "Starke Attacke!\nAbsorbiert die\nHälfte des ange-\nrichteten Schadens."
    es: "Absorbe la\nmitad del daño\nproducido."
glare:
  names:
    jp_kana: へびにらみ
    en: GLARE
    fr: INTIMIDATION
    it: BAGLIORE
    de: GIFTBLICK
    es: DESLUMBRAR
  descriptions:
    jp_kana: "おなかの　もようを\nみせて　おびえさせ\nあいてを　まひの\nじょうたいに　する。"
    en: "The user intimidates\nthe foe with the\ndesign on its belly\nto cause paralysis."
    fr: "Intimide l’ennemi\net le paralyse de\nterreur."
    it: "Il nemico è così\nspaventato da\nparalizzarsi."
    de: "Schüchtert Gegner\nmit dem Bauchmuster\nein, so dass er\nparalysiert ist."
    es: "Intimida y asusta\nal rival hasta\ndejarlo paralizado."
grass_whistle:
  names:
    jp_kana: くさぶえ
    en: GRASSWHISTLE
    fr: SIFFL’HERBE
    it: MELODERBA
    de: GRASFLÖTE
    es: SILBATO
  descriptions:
    jp_kana: "ここちよい　くさぶえの\nねいろを　きかせて\nあいてを　ねむりの\nじょうたいに　する。"
    en: "A pleasant melody\nis played to lull\nthe foe into a deep\nsleep."
    fr: "Endort l’ennemi\nen sifflant une\ndouce mélodie."
    it: "Una dolce melodia\ncostringe il nemico\nad addormentarsi."
    de: "Versetzt Gegner mit\nschöner Melodie in\nTiefschlaf."
    es: "Agradable melodía\nque adormece\nal rival."
growl:
  names:
    jp_kana: なきごえ
    en: GROWL
    fr: RUGISSEMENT
    it: RUGGITO
    de: HEULER
    es: GRUÑIDO
  descriptions:
    jp_kana: "かわいい　なきごえを\nきかせて　きを　ひき\nゆだんさせて　てきの\nこうげきを　さげる。"
    en: "The user growls in\na cute way, making\nthe foe lower its\nATTACK stat."
    fr: "Rugit gentiment\net baisse\nl’ATTAQUE de\nl’ennemi."
    it: "Un dolce ruggito\nriduce l’ATTACCO\ndel nemico."
    de: "Knurren, das den\nANGR.-Wert des\nGegners senkt."
    es: "Dulce gruñido que\nreduce el ATAQUE\ndel otro."
growth:
  names:
    jp_kana: せいちょう
    en: GROWTH
    fr: CROISSANCE
    it: CRESCITA
    de: WACHSTUM
    es: DESARROLLO
  descriptions:
    jp_kana: "からだを　いっきに\nおおきく　せいちょう　\nさせて　じぶんの\nとくこうを　あげる。"
    en: "The user’s body is\nforced to grow,\nraising the SP.\nATK stat."
    fr: "Développe le\ncorps et augmente\nl’ATQ. SPE."
    it: "Provoca la crescita\ndel corpo e\naumenta\nl’ATT. SPEC."
    de: "Der Körper wächst\nund SP. ANG.\nwird erhöht."
    es: "Crece a marchas\nforzadas y aumenta\nel AT. ESP."
grudge:
  names:
    jp_kana: おんねん
    en: GRUDGE
    fr: RANCUNE
    it: RANCORE
    de: NACHSPIEL
    es: RABIA
  descriptions:
    jp_kana: "あいての　わざで\nたおされた　ときに\nおんねんを　かけて\nそのわざの　ＰＰを\n０に　してしまう。"
    en: "If the user faints,\nthis move deletes\nthe PP of the move\nthat finished it."
    fr: "Si mis KO,\nsupprime les PP\ndu coup ennemi."
    it: "Se chi la usa va\nKO, azzera i PP\ndell’ultima mossa."
    de: "Wird der Anwender\nbesiegt, werden\nAP der Finalattacke\ngelöscht."
    es: "Si te debilitas,\nborra los PP\ndel último ataque\ndel rival."
guillotine:
  names:
    jp_kana: ハサミギロチン
    en: GUILLOTINE
    fr: GUILLOTINE
    it: GHIGLIOTTINA
    de: GUILLOTINE
    es: GUILLOTINA
  descriptions:
    jp_kana: "おおきな　ハサミで\nあいてを　きりさいて\nこうげきする。\nあたれば　いちげきで\nあいては　たおれる。"
    en: "A vicious tearing\nattack with pincers.\nThe foe will faint\nif it hits."
    fr: "Un puissant coup\nde pince qui peut\nmettre KO."
    it: "Forti tenaglie che\npossono mandare\nKO il nemico."
    de: "Kräftige Scheren-\nAttacke. Führt\nevtl. zum K.O."
    es: "Pinzas que pueden\nderribar de un\ngolpe."
gust:
  names:
    jp_kana: かぜおこし
    en: GUST
    fr: TORNADE
    it: RAFFICA
    de: WINDSTOSS
    es: TORNADO
  descriptions:
    jp_kana: "つばさで　おこした\nはげしい　かぜを\nあいてに　ぶつけて\nこうげきする。"
    en: "Strikes the foe\nwith a gust of wind\nwhipped up by\nwings."
    fr: "Envoie une rafale\nde vent en battant\ndes ailes."
    it: "Colpisce con\nuna folata di vento\nsollevata dalle\nali."
    de: "Trifft den Gegner\nmit einem Wind-\nstoß durch\nFlügelschlag."
    es: "Crea un tornado\ncon las alas."
hail:
  names:
    jp_kana: あられ
    en: HAIL
    fr: GRELE
    it: GRANDINE
    de: HAGELSTURM
    es: GRANIZO
  descriptions:
    jp_kana: "５ターンの　あいだ\nあられを　ふらせて\nこおりタイプ　いがいの\nポケモンに　まいターン\nダメージを　あたえる。"
    en: "A hailstorm lasting\nfive turns damages\nall POKéMON except\nthe ICE-type."
    fr: "Tempête de grêle\nqui dure\npendant 5 tours."
    it: "Grandinata di 5\nturni, che colpisce\ntutti tranne il\ntipo GHIACCIO."
    de: "Hagelsturm für 5\nRunden. Schadet\nallen, außer\nEIS-POKéMON."
    es: "Tormenta de granizo\nque golpea en cada\nturno."
harden:
  names:
    jp_kana: かたくなる
    en: HARDEN
    fr: ARMURE
    it: RAFFORZATORE
    de: HÄRTNER
    es: FORTALEZA
  descriptions:
    jp_kana: "ぜんしんに　ちからを\nこめて　からだを\nかたくして　じぶんの\nぼうぎょを　あげる。"
    en: "The user stiffens\nall the muscles in\nits body to raise\nits DEFENSE stat."
    fr: "Contracte les\nmuscles pour\naugmenter la\nDEFENSE."
    it: "I muscoli si\ntonificano per\naumentare la\nDIFESA."
    de: "Stärkt die\nMuskulatur und\nerhöht den\nVERT.-Wert."
    es: "Tensa la\nmusculatura\npara aumentar\nla DEFENSA."
haze:
  names:
    jp_kana: くろいきり
    en: HAZE
    fr: BUEE NOIRE
    it: NUBE
    de: DUNKELNEBEL
    es: NIEBLA
  descriptions:
    jp_kana: "くろい　きりを　だして\nせんとうに　でている\nポケモン　ぜんいんの\nのうりょくの　へんかを\nもとに　もどす。"
    en: "Eliminates all stat\nchanges among all\nPOKéMON engaged in\nbattle."
    fr: "Crée un nuage noir\nannulant tout\nchangement d’état."
    it: "Annulla ogni\nmodifica delle\nstatistiche di tutti\ni POKéMON in campo."
    de: "Alle Statusver-\nänderungen der\nKampfteilnehmer\nwerden annulliert."
    es: "Nube negra que\nelimina los cambios\nde características."
headbutt:
  names:
    jp_kana: ずつき
    en: HEADBUTT
    fr: COUP D’BOULE
    it: BOTTINTESTA
    de: KOPFNUSS
    es: GOLPE CABEZA
  descriptions:
    jp_kana: "あたまを　つきだし\nまっすぐ　つっこんで\nこうげきする。\nあいてを　ひるませる\nことが　ある。"
    en: "The user sticks its\nhead out and rams.\nIt may make the\nfoe flinch."
    fr: "Une charge qui\npeut apeurer\nl’ennemi."
    it: "Attacco d’urto che\npuò far tentennare."
    de: "Rammt den Gegner\nund lässt ihn evtl.\nzurückschrecken."
    es: "Cabezazo que puede\nhacer retroceder\nal rival."
heal_bell:
  names:
    jp_kana: いやしのすず
    en: HEAL BELL
    fr: GLAS DE SOIN
    it: RINTOCCASANA
    de: VITALGLOCKE
    es: CAMPANA CURA
  descriptions:
    jp_kana: "ここちよい　すずの\nねいろを　きかせて\nみかた　ぜんいんの\nじょうたい　いじょうを\nかいふくする。"
    en: "A soothing bell\nchimes to heal the\nstatus problems of\nall allies."
    fr: "Carillon apaisant\nqui soigne les \nchangements de\nstatut des alliés."
    it: "Uno scampanellio\nrisolve i problemi\ndi stato di tutta\nla squadra."
    de: "Läutet beruhigend\nund heilt alle\nStatusprobleme im\nTeam."
    es: "Repicar que cura\nlos problemas\nde estado."
heat_wave:
  names:
    jp_kana: ねっぷう
    en: HEAT WAVE
    fr: CANICULE
    it: ONDACALDA
    de: HITZEWELLE
    es: ONDA ÍGNEA
  descriptions:
    jp_kana: "あつい　いきを\nてきに　ふきかけて\nこうげきする。\nやけど　じょうたいに\nすることが　ある。"
    en: "The user exhales a\nheated breath to\nattack. It may also\ninflict a burn."
    fr: "Un souffle ardent\npouvant brûler\nl’ennemi."
    it: "Il nemico è\ninvestito da un\nsoffio caldo:\npuò scottare."
    de: "Gegner wird von\nheißem Atem\ngetroffen und ver-\nbrennt sich evtl."
    es: "Exhala un vaho\nígneo que puede\nquemar al rival."
helping_hand:
  names:
    jp_kana: てだすけ
    en: HELPING HAND
    fr: COUP D’MAIN
    it: ALTRUISMO
    de: RECHTE HAND
    es: REFUERZO
  descriptions:
    jp_kana: "てだすけ　された\nあいてが　つかう\nわざの　ダメージは\nふつうよりも\nおおきくなる。"
    en: "A move that boosts\nthe power of the\nally’s attack in a\nbattle."
    fr: "Améliore la\npuissance\nd’attaque du\nreceveur."
    it: "Aumenta la potenza\ndelle mosse di chi\nla riceve."
    de: "Steigert die Kraft\nder Angriffe des\nGetroffenen im\nKampf."
    es: "Refuerza los\nmovimientos\ndel receptor."
hidden_power:
  names:
    jp_kana: めざめるパワー
    en: HIDDEN POWER
    fr: PUIS. CACHEE
    it: INTROFORZA
    de: KRAFTRESERVE
    es: PODER OCULTO
  descriptions:
    jp_kana: "わざを　つかった\nポケモンに　よって\nあいてに　あたえる\nダメージと　わざの\nタイプが　へんかする。"
    en: "An attack that\nvaries in type and\nintensity depending\non the user."
    fr: "L’efficacité et le\ntype de l’attaque\ndépendent du\nlanceur."
    it: "L’efficacia e il\ntipo dipendono\nda chi la usa."
    de: "Die Wirkung und\nElementklasse der\nAttacke hängt\nvom Benutzer ab."
    es: "Su eficacia varía\nsegún el agresor."
high_jump_kick:
  names:
    jp_kana: とびひざげり
    en: HI JUMP KICK
    fr: PIED VOLTIGE
    it: CALCINVOLO
    de: TURMKICK
    es: PAT. S. ALTA
  descriptions:
    jp_kana: "ジャンプを　りようした\nひざげりで　あいてを\nこうげきする。\nはずすと　じぶんが\nダメージを　うける。"
    en: "A strong jumping\nknee kick. If it\nmisses, the user is\nhurt."
    fr: "Coup de pied\nsauté. S’il est\nraté, le lanceur\nse blesse."
    it: "Ginocchiata: chi la\nesegue subisce\ndanni se fallisce."
    de: "Sprungtritt mit\nKnie. Bei Misserfolg\nverletzt sich der\nAnwender selbst."
    es: "Si fallas esta\npatada, puedes\nautolesionarte."
horn_attack:
  names:
    jp_kana: つのでつく
    en: HORN ATTACK
    fr: KOUD’KORNE
    it: INCORNATA
    de: HORNATTACKE
    es: CORNADA
  descriptions:
    jp_kana: "するどく　とがった\nつのを　つかって\nあいてを　つついて\nこうげきする。"
    en: "The foe is jabbed\nwith a sharply\npointed horn to\ninflict damage."
    fr: "Frappe l’ennemi\nd’un coup\nde corne pointue."
    it: "Corna affilate\ninfilzano il\nnemico."
    de: "Spießt den Gegner\nmit dem spitzen\nHorn auf."
    es: "Ataca al enemigo\ncon afilados\ncuernos."
horn_drill:
  names:
    jp_kana: つのドリル
    en: HORN DRILL
    fr: EMPAL’KORNE
    it: PERFORCORNO
    de: HORNBOHRER
    es: PERFORADOR
  descriptions:
    jp_kana: "つのを　かいてんさせて\nあいてに　つきさして\nこうげきする。\nあたれば　いちげきで\nあいては　たおれる。"
    en: "The horn is rotated\nlike a drill to ram.\nThe foe will faint\nif it hits."
    fr: "Empale l’ennemi\nd’un coup de corne.\nMet KO en un coup."
    it: "Un colpo perforante\nda KO in un\nattacco."
    de: "K.O.-Attacke, die\nein Horn als\nBohrer einsetzt."
    es: "Ataque taladro.\nFulmina en 1 golpe."
howl:
  names:
    jp_kana: とおぼえ
    en: HOWL
    fr: GRONDEMENT
    it: GRIDODILOTTA
    de: JAULER
    es: AULLIDO
  descriptions:
    jp_kana: "おおきな　こえで\nほえて　きあいを\nたかめ　じぶんの\nこうげきを　あげる。"
    en: "The user howls to\nraise its spirit and\nboost its ATTACK\nstat."
    fr: "Grogne pour se\nrassurer et booster\nl’ATTAQUE."
    it: "Grido che aumenta\nl’ATTACCO di chi la\nusa."
    de: "Anwender jault, um\nin sich zu gehen\nund seinen ANGR.-\nWert zu erhöhen."
    es: "Aullido que sube\nel ánimo y aumenta\nel ATAQUE."
hydro_cannon:
  names:
    jp_kana: ハイドロカノン
    en: HYDRO CANNON
    fr: HYDROBLAST
    it: IDROCANNONE
    de: AQUAHAUBITZE
    es: HIDROCAÑÓN
  descriptions:
    jp_kana: "みずの　たいほうを\nあいてに　はっしゃして\nこうげきする。\nつぎの　ターンは\nうごけなく　なる。"
    en: "The foe is hit with\na watery cannon.\nThe user can’t move\non the next turn."
    fr: "Puissant, mais\nimmobilise le\nlanceur le tour\nsuivant."
    it: "È potente, ma chi\nla usa perde il\nturno successivo."
    de: "Gegner wird von\nWasserkanone\ngetroffen. Angreifer\nsetzt 1 Runde aus."
    es: "Es muy eficaz,\npero te inmoviliza\n1 turno."
hydro_pump:
  names:
    jp_kana: ハイドロポンプ
    en: HYDRO PUMP
    fr: HYDROCANON
    it: IDROPOMPA
    de: HYDROPUMPE
    es: HIDROBOMBA
  descriptions:
    jp_kana: "たいりょうの　みずを\nものすごい　いきおいで\nあいてに　はっしゃして\nこうげきする。"
    en: "A high volume of\nwater is blasted at\nthe foe under great\npressure."
    fr: "Envoie un\npuissant jet\nd’eau pour\nfrapper l’ennemi."
    it: "Il nemico è\ntravolto da un\npotente getto\nd’acqua."
    de: "Spritzt eine Menge\nWasser mit\nHochdruck auf\nden Gegner."
    es: "Lanza agua a\nchorros para\natacar."
hyper_beam:
  names:
    jp_kana: はかいこうせん
    en: HYPER BEAM
    fr: ULTRALASER
    it: IPER RAGGIO
    de: HYPERSTRAHL
    es: HIPERRAYO
  descriptions:
    jp_kana: "すさまじい　こうせんを\nあいてに　はっしゃして\nこうげきする。\nつぎの　ターンは\nうごけなく　なる。"
    en: "A severely damaging\nattack that makes\nthe user rest on\nthe next turn."
    fr: "Puissant, mais \nimmobilise\nle lanceur pour\nun tour."
    it: "È potente, ma chi\nla usa perde il\nturno successivo."
    de: "Starke Attacke, die\nden Angreifer\nzwingt, eine Runde\nauszusetzen."
    es: "Es eficaz, pero\ndeja inmóvil al\natacante 1 turno."
hyper_fang:
  names:
    jp_kana: ひっさつまえば
    en: HYPER FANG
    fr: CROC DE MORT
    it: IPERZANNA
    de: HYPERZAHN
    es: HIP.COLMILLO
  descriptions:
    jp_kana: "するどい　まえばで\nつよく　かみついて\nこうげきする。\nあいてを　ひるませる\nことが　ある。"
    en: "The foe is attacked\nwith sharp fangs.\nIt may make the\nfoe flinch."
    fr: "Blesse d’un coup\nde croc. Peut\napeurer l’ennemi."
    it: "Attacco con denti\naffilati, che può\nfar tentennare\nil nemico."
    de: "Angriff mit schar-\nfen Reißzähnen.\nGegner schreckt\nevtl. zurück."
    es: "Ataque con finos\ncolmillos. Puede\ncausar retroceso."
hyper_voice:
  names:
    jp_kana: ハイパーボイス
    en: HYPER VOICE
    fr: MEGAPHONE
    it: GRANVOCE
    de: SCHALLWELLE
    es: VOZARRÓN
  descriptions:
    jp_kana: "うるさく　ひびく\nおおごえの　しんどうを\nてきに　あたえて\nこうげきする。"
    en: "The user lets loose\na horribly loud\nshout with the\npower to damage."
    fr: "Attaque bruyante\nblessant avec des\nondes sonores."
    it: "Attacco rumoroso\nche colpisce con\nonde sonore."
    de: "Laute Attacke mit\nSchallwellen."
    es: "Ondas sonoras\nde alta frecuencia\nque hieren."
hypnosis:
  names:
    jp_kana: さいみんじゅつ
    en: HYPNOSIS
    fr: HYPNOSE
    it: IPNOSI
    de: HYPNOSE
    es: HIPNOSIS
  descriptions:
    jp_kana: "ねむけを　さそう\nあんじを　かけて\nあいてを　ねむりの\nじょうたいに　する。"
    en: "Hypnotic suggestion\nis used to make the\nfoe fall into a\ndeep sleep."
    fr: "Une attaque\nhypnotique\npouvant endormir\nl’ennemi."
    it: "Mossa ipnotizzante\nche può far\naddormentare il\nnemico."
    de: "Hypno-Attacke,\ndie den Gegner\nevtl. in Schlaf\nversetzt."
    es: "Ataque hipnótico\nque puede dormir\nal enemigo."
ice_ball:
  names:
    jp_kana: アイスボール
    en: ICE BALL
    fr: BALL’GLACE
    it: PALLA GELO
    de: FROSTBEULE
    es: BOLA HIELO
  descriptions:
    jp_kana: "５ターンの　あいだ\nあいてに　ころがって\nこうげきする。\nころがる　たびに\nダメージが　ふえる。"
    en: "A 5-turn rolling\nattack that becomes\nstronger each time\nit rolls."
    fr: "Une attaque en\n5 tours de\nplus en plus\npuissante."
    it: "Dura 5 turni, con\naumento\nprogressivo\ndell’intensità."
    de: "Roll-Angriff für 5\nRunden. Bei\nErfolg nimmt\ndie Stärke zu."
    es: "Dura 5 turnos\ny gana fuerza\nen cada uno."
ice_beam:
  names:
    jp_kana: れいとうビーム
    en: ICE BEAM
    fr: LASER GLACE
    it: GELORAGGIO
    de: EISSTRAHL
    es: RAYO HIELO
  descriptions:
    jp_kana: "つめたい　ビームを\nあいてに　はっしゃして\nこうげきする。\nこおり　じょうたいに\nすることが　ある。"
    en: "The foe is struck\nwith an icy beam.\nIt may freeze the\nfoe solid."
    fr: "Envoie un rayon\nde glace\npouvant geler\nl’ennemi."
    it: "Un raggio gelido\nche può congelare\nil nemico."
    de: "Der Gegner wird von\neinem Eisstrahl\ngetroffen und\nfriert evtl. ein."
    es: "Rayo de hielo\nque puede llegar\na congelar."
ice_punch:
  names:
    jp_kana: れいとうパンチ
    en: ICE PUNCH
    fr: POINGLACE
    it: GELOPUGNO
    de: EISHIEB
    es: PUÑO HIELO
  descriptions:
    jp_kana: "れいきを　こめた\nパンチで　あいてを\nこうげきする。\nこおり　じょうたいに\nすることが　ある。"
    en: "The foe is punched\nwith an icy fist.\nIt may leave the\nfoe frozen."
    fr: "Un poing de glace\npouvant\ngeler l’ennemi."
    it: "Pugno di ghiaccio\nche può congelare\nil nemico."
    de: "Ein Schlag, der\nden Gegner\nevtl. einfriert."
    es: "Puñetazo helado.\nPuede congelar."
icicle_spear:
  names:
    jp_kana: つららばり
    en: ICICLE SPEAR
    fr: STALAGTITE
    it: GELOLANCIA
    de: EISSPEER
    es: CARÁMBANO
  descriptions:
    jp_kana: "するどい　つららを\nあいてに　はっしゃして\nこうげきする。\n２ー５かい　れんぞくで\nダメージを　あたえる。"
    en: "Sharp icicles are\nfired at the foe.\nIt strikes two to\nfive times."
    fr: "Mitraille l’ennemi\navec 2 à 5 glaçons\nà la suite."
    it: "Da 2 a 5 raffiche\ndi ghiaccioli sul\nnemico."
    de: "Feuert 2 - 5\nEiszapfen auf\nden Gegner."
    es: "Ataca lanzando\nde 2 a 5 ráfagas\nde carámbanos."
icy_wind:
  names:
    jp_kana: こごえるかぜ
    en: ICY WIND
    fr: VENT GLACE
    it: VENTOGELATO
    de: EISSTURM
    es: VIENTO HIELO
  descriptions:
    jp_kana: "つめたい　れいきを\nあいてに　ふきつけて\nこうげきする。\nどうじに　あいての\nすばやさを　さげる。"
    en: "A chilling wind is\nused to attack.\nIt also lowers the\nSPEED stat."
    fr: "Attaque glaciale.\nBaisse la VITESSE\nde l’ennemi."
    it: "Attacco gelido che\nriduce la VELOCITÀ\ndel nemico."
    de: "Eis-Attacke, die\nden INIT.-Wert\ndes Gegners senkt."
    es: "Ataque helado que\nbaja la VELOCIDAD."
imprison:
  names:
    jp_kana: ふういん
    en: IMPRISON
    fr: POSSESSIF
    it: ESCLUSIVA
    de: BEGRENZER
    es: CERCA
  descriptions:
    jp_kana: "じぶんが　おぼえている\nわざと　おなじ　ものを\nてきも　おぼえていたら\nてきだけ　そのわざを\nつかえなく　する。"
    en: "Prevents foes from\nusing any move\nthat is also known\nby the user."
    fr: "Empêche les\nennemis d’utiliser\nles coups connus\ndu lanceur."
    it: "Il nemico non può\nusare le stesse\nmosse di chi la\nusa."
    de: "Hindert Gegner am\nEinsatz von\nAttacken, die der\nAnwender kennt."
    es: "Impide al rival\nusar ataques\nque tú conoces."
ingrain:
  names:
    jp_kana: ねをはる
    en: INGRAIN
    fr: RACINES
    it: RADICAMENTO
    de: VERWURZLER
    es: ARRAIGO
  descriptions:
    jp_kana: "だいちに　ねを　はり\nまいターン　ＨＰを\nかいふくする。\nねを　はって　いるので\nいれかえが　できない。"
    en: "The user lays roots\nthat restore HP on\nevery turn.\nIt can’t switch out."
    fr: "Plante des racines\npour gagner des PV\nchaque tour. Ne\npeut plus changer."
    it: "Chi la usa recupera\nPS ad ogni turno ma\nnon può essere\nsostituito."
    de: "Verwurzelung füllt\njede Runde KP auf.\nAustausch ist\nunmöglich."
    es: "Echa raíces para\nrecuperar PS,\npero impide\nel relevo."
iron_defense:
  names:
    jp_kana: てっぺき
    en: IRON DEFENSE
    fr: MUR DE FER
    it: FERROSCUDO
    de: EISENABWEHR
    es: DEF. FÉRREA
  descriptions:
    jp_kana: "からだの　ひょうめんを\nてつの　ように\nかたくする　ことで\nじぶんの　ぼうぎょを\nグーンと　あげる。"
    en: "The user hardens\nits body’s surface\nto sharply raise its\nDEFENSE stat."
    fr: "Endurcit le corps\npour booster la\nDEFENSE."
    it: "La superficie del\ncorpo si indurisce:\nsale la DIFESA di\nchi la usa."
    de: "Anwender stärkt\nden Körper, um den\nVERT.-Wert deutlich\nzu erhöhen."
    es: "Te fortalece y\nsube mucho\nla DEFENSA."
iron_tail:
  names:
    jp_kana: アイアンテール
    en: IRON TAIL
    fr: QUEUE DE FER
    it: CODACCIAIO
    de: EISENSCHWEIF
    es: COLA FÉRREA
  descriptions:
    jp_kana: "かたい　こうてつの\nしっぽを　たたきつけて\nこうげきする。\nあいての　ぼうぎょを\nさげることが　ある。"
    en: "An attack with a\nsteel-hard tail.\nIt may lower the\nfoe’s DEFENSE stat."
    fr: "Attaque avec la\nqueue. Peut baisser\nla DEFENSE."
    it: "Coda coriacea che \npuò ridurre la\nDIFESA."
    de: "Attacke mit hartem\nEisenschweif.\nSenkt evtl. den\nVERT.-Wert."
    es: "Ataca con una\ncola férrea\ny puede bajar\nla DEFENSA."
jump_kick:
  names:
    jp_kana: とびげり
    en: JUMP KICK
    fr: PIED SAUTE
    it: CALCIOSALTO
    de: SPRUNGKICK
    es: PATADA SALTO
  descriptions:
    jp_kana: "たかい　ジャンプからの\nキックで　あいてを\nこうげきする。\nはずすと　じぶんが\nダメージを　うける。"
    en: "The user jumps up\nhigh, then kicks.\nIf it misses, the\nuser hurts itself."
    fr: "Un coup de pied\nsauté. Peut blesser\nle lanceur si raté."
    it: "Potente calcio in\nvolo che può\ndanneggiare chi\nlo usa."
    de: "Der Angreifer hüpft\nund tritt zu.\nBei Misserfolg\nSelbstschädigung."
    es: "Si falla, dañará\na quien lo usa."
karate_chop:
  names:
    jp_kana: からてチョップ
    en: KARATE CHOP
    fr: POING-KARATE
    it: COLPOKARATE
    de: KARATESCHLAG
    es: GOLPE KARATE
  descriptions:
    jp_kana: "するどい　チョップで\nあいてを　たたいて\nこうげきする。\nきゅうしょに　あたる\nかくりつが　たかい。"
    en: "The foe is attacked\nwith a sharp chop.\nIt has a high\ncritical-hit ratio."
    fr: "Une attaque\ntranchante à taux\nde critiques élevé."
    it: "Colpo netto.\nProbabile\nbrutto colpo."
    de: "Gute Möglichkeit,\neinen Volltreffer\nzu landen."
    es: "Da un golpe\ncortante.\nSuele ser crítico."
kinesis:
  names:
    jp_kana: スプーンまげ
    en: KINESIS
    fr: TELEKINESIE
    it: CINÈSI
    de: PSYKRAFT
    es: KINÉTICO
  descriptions:
    jp_kana: "てに　もつ　スプーンを\nまげて　ちゅういを\nスプーンの　ほうに\nむけさせて　あいての\nめいちゅうを　さげる。"
    en: "The user distracts\nthe foe by bending\na spoon. It may\nlower accuracy."
    fr: "Distrait l’ennemi\navec une cuillère.\nPeut baisser la\nprécision."
    it: "Distrae il nemico e\npuò ridurne la\nprecisione."
    de: "Lenkt Gegner durch\nLöffel verbiegen ab\nund senkt evtl.\nseine Genauigkeit."
    es: "Distrae al rival\ny baja su nivel\nde PRECISIÓN."
knock_off:
  names:
    jp_kana: はたきおとす
    en: KNOCK OFF
    fr: SABOTAGE
    it: PRIVAZIONE
    de: ABSCHLAG
    es: DESARME
  descriptions:
    jp_kana: "あいての　ポケモンが\nもっている　どうぐを\nはたき　おとして\nせんとうが　おわるまで\nつかえなく　する。"
    en: "Knocks down the\nfoe’s held item to\nprevent its use\nduring the battle."
    fr: "Frappe l’objet\ntenu par l’ennemi\npour le rendre\ninutilisable."
    it: "Impedisce al nemico\ndi usare lo\nstrumento tenuto."
    de: "Schlägt Gegner\nItem weg. Vereitelt\nso den Gebrauch."
    es: "Deja al rival\ndesprovisto\ndel objeto\nque lleva."
leaf_blade:
  names:
    jp_kana: リーフブレード
    en: LEAF BLADE
    fr: LAME-FEUILLE
    it: FENDIFOGLIA
    de: LAUBKLINGE
    es: HOJA AGUDA
  descriptions:
    jp_kana: "とがった　はっぱで\nあいてを　きりつけて\nこうげきする。\nきゅうしょに　あたる\nかくりつが　たかい。"
    en: "The foe is slashed\nwith a sharp leaf.\nIt has a high\ncritical-hit ratio."
    fr: "Tranche avec une\nfeuille. Taux de\ncritiques élevé."
    it: "Foglia affilata.\nProbabile brutto\ncolpo sul nemico."
    de: "Hieb mit scharf-\nkantigem Blatt.\nHohe Volltreffer-\nquote."
    es: "Acuchilla con\nuna hoja fina.\nSuele dar\nun golpe crítico."
leech_life:
  names:
    jp_kana: きゅうけつ
    en: LEECH LIFE
    fr: VAMPIRISME
    it: SANGUISUGA
    de: BLUTSAUGER
    es: CHUPAVIDAS
  descriptions:
    jp_kana: "ちを　すいとって\nこうげきする。\nあいてに　あたえた\nダメージの　はんぶん\nＨＰが　かいふくする。"
    en: "An attack that\nabsorbs half the\ndamage it inflicted\nto restore HP."
    fr: "Une attaque qui\nconvertit en PV\nla moitié des\ndégâts infligés."
    it: "Sottrae PS al\nnemico pari a\nmetà del danno\ninfertogli."
    de: "Die Hälfte des zu-\ngefügten Schadens\nwird dem Anwender\ngutgeschrieben."
    es: "Absorbe la\nmitad del daño\nproducido."
leech_seed:
  names:
    jp_kana: やどりぎのタネ
    en: LEECH SEED
    fr: VAMPIGRAINE
    it: PARASSISEME
    de: EGELSAMEN
    es: DRENADORAS
  descriptions:
    jp_kana: "タネを　うえつけて\nあいての　ＨＰを\nまいターン　すこしずつ\nすいとって　じぶんは\nかいふくする。"
    en: "A seed is planted\non the foe to steal\nsome HP for the \nuser on every turn."
    fr: "Plante des graines\npour voler des PV\nà chaque tour."
    it: "Semi piantati sul\nnemico gli\nsottraggono PS\nad ogni turno."
    de: "Gegner wird\nbepflanzt und\nverliert jede\nRunde KP."
    es: "Planta tres semillas\nque quitan PS en\ncada turno."
leer:
  names:
    jp_kana: にらみつける
    en: LEER
    fr: GROZ’YEUX
    it: FULMISGUARDO
    de: SILBERBLICK
    es: MALICIOSO
  descriptions:
    jp_kana: "するどい　めつきで\nじっと　にらみつけ\nおびえさせて　てきの\nぼうぎょを　さげる。"
    en: "The foe is given an\nintimidating look\nthat lowers its\nDEFENSE stat."
    fr: "Lance un regard\nnoir et baisse\nla DEFENSE."
    it: "Uno sguardo\nfulminante riduce\nla DIFESA del\nnemico."
    de: "Gegnerischer VERT.-\nWert wird durch\nAngst einflößenden\nBlick gesenkt."
    es: "Asusta al enemigo\npara bajar su\nDEFENSA."
lick:
  names:
    jp_kana: したでなめる
    en: LICK
    fr: LECHOUILLE
    it: LECCATA
    de: SCHLECKER
    es: LENGÜETAZO
  descriptions:
    jp_kana: "すごく　ながい　したで\nあいてを　なめまわして\nこうげきする。\nまひ　じょうたいに\nすることが　ある。"
    en: "The foe is licked\nand hit with a long\ntongue. It may\nalso paralyze."
    fr: "Blesse avec un long\ncoup de langue.\nPeut paralyser."
    it: "Una lunga lingua\ninfligge danni e\npuò paralizzare."
    de: "Leck-Attacke mit\nlanger Zunge. Der\nGegner wird evtl.\nparalysiert."
    es: "Usa la lengua para\natacar. Puede\ncausar parálisis."
light_screen:
  names:
    jp_kana: ひかりのかべ
    en: LIGHT SCREEN
    fr: MUR LUMIERE
    it: SCHERMOLUCE
    de: LICHTSCHILD
    es: PANTALLA LUZ
  descriptions:
    jp_kana: "５ターンの　あいだ\nふしぎな　かべで\nてきから　うける\nとくしゅ　こうげきの\nダメージを　よわめる。"
    en: "A wall of light\ncuts damage from\nSP. ATK attacks\nfor five turns."
    fr: "Crée un mur\nlumineux et\nréduit les dégâts\nd’ATQ. SPE."
    it: "Una barriera di\nluce riduce i\ndanni dell’ATT.\nSPEC. per 5 turni."
    de: "Erzeugt Lichtwand\nund senkt Schaden\ndurch SP. ANG.\nfür 5 Runden."
    es: "Reduce el daño que\ncausa el AT. ESP.\ndel rival."
lock_on:
  names:
    jp_kana: ロックオン
    en: LOCK-ON
    fr: VERROUILLAGE
    it: LOCALIZZA
    de: ZIELSCHUSS
    es: FIJAR BLANCO
  descriptions:
    jp_kana: "あいてに　しっかりと\nしょうじゅんを　あわせ\nつぎの　こうげきが\nかならず　あいてに\nあたるように　する。"
    en: "The user locks on\nto the foe, making\nthe next move sure\nto hit."
    fr: "Verrouille la cible\npour ne pas la\nrater au tour\nsuivant."
    it: "Localizza il\nnemico: la mossa\nsuccessiva\nandrà a segno."
    de: "Visiert Gegner an\nund trifft in der\nnächsten Runde\ngarantiert."
    es: "Fija el blanco para\nque el siguiente\nataque no falle."
lovely_kiss:
  names:
    jp_kana: あくまのキッス
    en: LOVELY KISS
    fr: GROBISOU
    it: DEMONBACIO
    de: TODESKUSS
    es: BESO AMOROSO
  descriptions:
    jp_kana: "おそろしい　かおで\nむりやり　キスを　して\nあいてを　ねむりの\nじょうたいに　する。"
    en: "The user forces a\nkiss on the foe\nwith a scary face\nthat induces sleep."
    fr: "Demande un bisou\nen grimaçant.\nPeut endormir."
    it: "Un bacio rubato\nche può\ncostringere al\nsonno."
    de: "Anwender zwingt\ndem Gegner einen\nKuss auf, der evtl.\nSchlaf verursacht."
    es: "Pide un beso con\nuna cara que\nasusta y adormece."
low_kick:
  names:
    jp_kana: けたぐり
    en: LOW KICK
    fr: BALAYAGE
    it: COLPO BASSO
    de: FUSSKICK
    es: PATADA BAJA
  descriptions:
    jp_kana: "あしを　つよく　けって\nあいてを　ころばせて\nこうげきする。\nあいてが　おもいほど\nダメージも　おおきい。"
    en: "A low, tripping kick\nthat inflicts more\ndamage on heavier\nfoes."
    fr: "Un coup de pied\nfaisant plus de\ndégâts aux ennemis\nlourds."
    it: "Un calcio che\ndanneggia i nemici\npiù pesanti."
    de: "Tritt, der\nmassigen\nGegnern mehr\nSchaden zufügt."
    es: "Cuanto más pesa\nel enemigo, más\ndaño causa."
luster_purge:
  names:
    jp_kana: ラスターパージ
    en: LUSTER PURGE
    fr: LUMI-ECLAT
    it: ABBAGLIANTE
    de: SCHEINWERFER
    es: RESPLANDOR
  descriptions:
    jp_kana: "まばゆい　ひかりを\nいっきに　かいほうして\nこうげきする。\nあいての　とくぼうを\nさげることが　ある。"
    en: "A burst of light\ninjures the foe. It\nmay also lower the\nfoe’s SP. DEF."
    fr: "Envoie une lueur\nintense. Peut\naussi baisser la \nDEF. SPE."
    it: "Luce abbagliante\nche può ridurre la\nDIF. SPEC del\nnemico."
    de: "Angriff mit grellem\nLicht, der die\nSP. VER.\nevtl. senkt."
    es: "Fogonazo de luz\nque puede\nbajar la DEF. ESP."
mach_punch:
  names:
    jp_kana: マッハパンチ
    en: MACH PUNCH
    fr: MACH PUNCH
    it: PUGNORAPIDO
    de: TEMPOHIEB
    es: ULTRAPUÑO
  descriptions:
    jp_kana: "めにも　とまらない\nものすごい　はやさで\nパンチを　くりだして\nかならず　せんせい\nこうげきする。"
    en: "A punch thrown at\nblinding speed.\nIt is certain to\nstrike first."
    fr: "Coup de poing\nfulgurant. Permet\nde frapper en 1ᵉʳ."
    it: "Un pugno\nrapidissimo, che\ncolpisce per primo."
    de: "Extrem schneller\nHieb, der stets\nzuerst trifft."
    es: "Puñetazo que se da\nrápido para golpear\nprimero."
magic_coat:
  names:
    jp_kana: マジックコート
    en: MAGIC COAT
    fr: REFLET MAGIK
    it: MAGIVELO
    de: MAGIEMANTEL
    es: CAPA MÁGICA
  descriptions:
    jp_kana: "どく　まひ　ねむり\nこんらんの　わざや\nやどりぎのタネを\nあいてに　はねかえす。"
    en: "Reflects back the\nfoe’s LEECH SEED\nand any status-\ndamaging move."
    fr: "Renvoie au lanceur\nVAMPIGRAINE et les\ncapacités qui\nchangent le statut."
    it: "Rimanda al mittente\nl’effetto di mosse\nche causano\nproblemi di stato."
    de: "EGELSAMEN und\njeder Angriff mit\nStatuseffekten\nprallt ab."
    es: "El agresor recibe\nel reflejo de los\nefectos especiales."
magical_leaf:
  names:
    jp_kana: マジカルリーフ
    en: MAGICAL LEAF
    fr: FEUILLEMAGIK
    it: FOGLIAMAGICA
    de: ZAUBERBLATT
    es: HOJA MÁGICA
  descriptions:
    jp_kana: "あいてを　ついせきする\nふしぎな　はっぱで\nこうげきする。\nこうげきは　かならず\nめいちゅう　する。"
    en: "The foe is attacked\nwith a strange leaf\nthat cannot be\nevaded."
    fr: "Une attaque qui\nutilise une feuille\nétrange. Elle est\nimparable."
    it: "Strana foglia che\nva sempre a segno."
    de: "Magischer Blatt-\nangriff, dem nicht\nauszuweichen ist."
    es: "Ataca con una\nextraña hoja\nque no se puede\nesquivar."
magnitude:
  names:
    jp_kana: マグニチュード
    en: MAGNITUDE
    fr: AMPLEUR
    it: MAGNITUDO
    de: INTENSITÄT
    es: MAGNITUD
  descriptions:
    jp_kana: "じめんを　ゆらして\nたっている　あいてを\nこうげきする。\nダメージの　りょうが\nいろいろ　かわる。"
    en: "A ground-shaking\nattack against all\nstanding POKéMON.\nIts power varies."
    fr: "Un tremblement\nde terre d’intensité\nvariable."
    it: "Attacco sismico\nd’intensità casuale,\ncontro ogni POKéMON\nin campo."
    de: "Erdbebenartiger An-\ngriff von zufälliger\nStärke gegen alle\nstehenden Gegner."
    es: "Sacudida sísmica\nde intensidad\nvariable."
mean_look:
  names:
    jp_kana: くろいまなざし
    en: MEAN LOOK
    fr: REGARD NOIR
    it: MALOSGUARDO
    de: HORRORBLICK
    es: MAL DE OJO
  descriptions:
    jp_kana: "すいこまれる　ような\nくろい　まなざしで\nじっと　みつめて\nあいてを　せんとうから\nにげられなく　する。"
    en: "The foe is fixed\nwith a mean look\nthat prevents it\nfrom escaping."
    fr: "Lance un regard\nméchant pour\nempêcher la fuite."
    it: "Sguardo sinistro\nche impedisce\nal nemico di\nfuggire."
    de: "Böser Blick, der\ndie Flucht des\nGegners vereitelt."
    es: "Mal de ojo que\nimpide al rival huir\no pedir el relevo."
meditate:
  names:
    jp_kana: ヨガのポーズ
    en: MEDITATE
    fr: YOGA
    it: MEDITAZIONE
    de: MEDITATION
    es: MEDITACIÓN
  descriptions:
    jp_kana: "ヨガの　ポーズで\nねむった　ちからを\nからだの　おくから\nひきだして　じぶんの\nこうげきを　あげる。"
    en: "The user meditates\nto awaken its power\nand raise its\nATTACK stat."
    fr: "Méditation\npacifique pour\naugmenter\nl’ATTAQUE."
    it: "Chi la usa medita\nper migliorare\nl’ATTACCO."
    de: "Friedliche Medita-\ntion, um den\nANGR.-Wert zu\nsteigern."
    es: "Reposa y medita\npara aumentar\nel ATAQUE."
mega_drain:
  names:
    jp_kana: メガドレイン
    en: MEGA DRAIN
    fr: MEGA-SANGSUE
    it: MEGASSORBIM.
    de: MEGASAUGER
    es: MEGAAGOTAR
  descriptions:
    jp_kana: "ようぶんを　すいとって\nこうげきする。\nあいてに　あたえた\nダメージの　はんぶん\nＨＰが　かいふくする。"
    en: "A tough attack that\ndrains half the\ndamage it inflicted\nto restore HP."
    fr: "Une attaque qui\nconvertit la moitié\ndes dégâts infligés\nen PV."
    it: "Forte attacco\nche assorbe metà\ndei PS sottratti al\nnemico."
    de: "Starke Attacke, die\ndie Hälfte des\nSchadens\nabsorbiert."
    es: "Absorbe la mitad\ndel daño\nproducido."
mega_kick:
  names:
    jp_kana: メガトンキック
    en: MEGA KICK
    fr: ULTIMAWASHI
    it: MEGACALCIO
    de: MEGAKICK
    es: MEGAPATADA
  descriptions:
    jp_kana: "ものすごい　ちからを\nこめた　キックで\nあいてを　けとばして\nこうげきする。"
    en: "The foe is attacked\nby a kick fired\nwith muscle-packed\npower."
    fr: "Un coup de pied\nsuper puissant\net intense."
    it: "Un calcio\nestremamente\npotente."
    de: "Der Gegner wird\nmit einem extrem\nheftigen Tritt\nangegriffen."
    es: "Patada de extrema\nfuerza."
mega_punch:
  names:
    jp_kana: メガトンパンチ
    en: MEGA PUNCH
    fr: ULTIMAPOING
    it: MEGAPUGNO
    de: MEGAHIEB
    es: MEGAPUÑO
  descriptions:
    jp_kana: "ちからを　こめた\nパンチを　くりだして\nあいてを　なぐりつけて\nこうげきする。"
    en: "The foe is slugged\nby a punch thrown\nwith muscle-packed\npower."
    fr: "Un coup de poing\nd’une puissance\nincroyable."
    it: "Un pugno tirato\ncon estrema\npotenza."
    de: "Ein unglaublich\nkräftiger Hieb."
    es: "Un puñetazo\nde gran potencia."
megahorn:
  names:
    jp_kana: メガホーン
    en: MEGAHORN
    fr: MEGACORNE
    it: MEGACORNO
    de: VIELENDER
    es: MEGACUERNO
  descriptions:
    jp_kana: "かたくて　りっぱな\nつので　おもいっきり\nあいてを　つきさして\nこうげきする。"
    en: "A brutal ramming\nattack delivered\nwith a tough and\nimpressive horn."
    fr: "Une charge\nviolente, toutes\ncornes en avant."
    it: "Brutale urto con\npotenti corna."
    de: "Brutaler Ramm-\nangriff mit spitzem,\nbeeindruckenden\nHorn."
    es: "Violenta embestida\ncon retorcidos\ncuernos."
memento:
  names:
    jp_kana: おきみやげ
    en: MEMENTO
    fr: SOUVENIR
    it: MEMENTO
    de: MEMENTO-MORI
    es: LEGADO
  descriptions:
    jp_kana: "じぶんは　たおれるが\nそのかわり　あいての\nこうげきと　とくこうを\nガクッと　さげる。"
    en: "The user faints,\nbut sharply lowers\nthe foe’s ATTACK\nand SP. ATK."
    fr: "Le lanceur est mis\nKO mais baisse\nbeaucoup l’ATTAQUE\net l’ATQ. SPE."
    it: "Chi la usa va KO.\nRiduce di molto le\nstatistiche di\nattacco del nemico."
    de: "Der Benutzer ist\nbesiegt und senkt\ndie gegnerischen\nWerte drastisch."
    es: "Baja las\nhabilidades\ndel rival\ny te fulmina."
metal_claw:
  names:
    jp_kana: メタルクロー
    en: METAL CLAW
    fr: GRIFFE ACIER
    it: FERRARTIGLI
    de: METALLKLAUE
    es: GARRA METAL
  descriptions:
    jp_kana: "こうてつの　ツメで\nあいてを　きりさいて\nこうげきする。\nじぶんの　こうげきが\nあがることが　ある。"
    en: "The foe is attacked\nwith steel claws.\nIt may also raise\nthe user’s ATTACK."
    fr: "Attaque avec des\ngriffes. Peut\naugmenter\nl’ATTAQUE."
    it: "Colpo di artigli:\nl’ATTACCO\ndi chi lo usa può\nsalire."
    de: "Klauen-Attacke, die\nevtl. den ANGR.-\nWert des Anwen-\nders erhöht."
    es: "Ataque con garra\nque puede\naumentar\ntu ATAQUE."
metal_sound:
  names:
    jp_kana: きんぞくおん
    en: METAL SOUND
    fr: STRIDO-SON
    it: FERROSTRIDO
    de: METALLSOUND
    es: ECO METÁLICO
  descriptions:
    jp_kana: "きんぞくを　こすって\nでるような　いやな\nおとを　きかせて\nあいての　とくぼうを\nガクッと　さげる。"
    en: "A horrible metallic\nscreech is used to\nsharply lower the\nfoe’s SP. DEF."
    fr: "Cri horrible qui\nbaisse beaucoup\nla DEF. SPE."
    it: "Orribile stridio che\nriduce di molto la\nDIF. SPEC. di chi\nla usa."
    de: "Stößt einen spitzen\nSchrei aus, der\ndie SP. VER.\nd. Gegners senkt."
    es: "Tremendo chirrido\nque baja mucho\nla DEF. ESP."
meteor_mash:
  names:
    jp_kana: コメットパンチ
    en: METEOR MASH
    fr: POING METEOR
    it: METEORPUGNO
    de: STERNENHIEB
    es: PUÑO METEORO
  descriptions:
    jp_kana: "すいせいの　ごとく\nパンチを　くりだして\nこうげきする。\nじぶんの　こうげきが\nあがることが　ある。"
    en: "The foe is hit with\na hard, fast punch.\nIt may also raise\nthe user’s ATTACK."
    fr: "Coup de poing\nmétéore. Peut\naugmenter\nl’ATTAQUE."
    it: "Pugno simile a una\nmeteora: può far\nsalire l’ATTACCO."
    de: "Angriff mit einem\nharten, schnellen\nSchlag. Erhöht\nevtl. ANGR.-Wert."
    es: "Impacta como\nun meteorito\ny suele subir\nel ATAQUE."
metronome:
  names:
    jp_kana: ゆびをふる
    en: METRONOME
    fr: METRONOME
    it: METRONOMO
    de: METRONOM
    es: METRÓNOMO
  descriptions:
    jp_kana: "ゆびを　ふり　じぶんの\nのうを　しげきして\nすべての　わざの\nなかから　どれか\n１つを　くりだす。"
    en: "Waggles a finger\nand stimulates the\nbrain into using any\nmove at random."
    fr: "Remue un doigt\net lance une\nattaque POKéMON\nau hasard."
    it: "Un dito oscilla\nper usare una\nmossa POKéMON\na caso."
    de: "Bewegt Finger, um\nGehirn zu stimu-\nlieren. Wählt zu-\nfällig Attacke aus."
    es: "Usa al azar un\nataque POKéMON."
milk_drink:
  names:
    jp_kana: ミルクのみ
    en: MILK DRINK
    fr: LAIT A BOIRE
    it: BUONLATTE
    de: MILCHGETRÄNK
    es: BATIDO
  descriptions:
    jp_kana: "さいだい　ＨＰの\nはんぶんだけ　じぶんの\nＨＰを　かいふくする。\nＨＰを　なかまに\nわけることも　できる。"
    en: "Heals the user by\nup to half its full\nHP. It can be used\nto heal an ally."
    fr: "Regagne jusqu’à\nla moitié des PV\nmax du lanceur\nou d’un allié."
    it: "Chi la usa recupera\nfino a metà dei PS\nmassimi suoi o di un\ncompagno."
    de: "Max. KP d. Anwen-\nders werden halb\naufgefüllt. Team-\nheilung möglich."
    es: "Restaura hasta\nla mitad de tus PS\nmáximos."
mimic:
  names:
    jp_kana: ものまね
    en: MIMIC
    fr: COPIE
    it: MIMICA
    de: MIMIKRY
    es: MIMÉTICO
  descriptions:
    jp_kana: "あいてが　さいごに\nつかった　わざを\nせんとうの　あいだ\nじぶんの　わざに\nすることが　できる。"
    en: "The user copies the\nmove last used by\nthe foe for the\nrest of the battle."
    fr: "Imite la\ndernière attaque\nutilisée par\nl’ennemi."
    it: "Copia l’ultima\nmossa usata dal\nnemico per il\nresto della lotta."
    de: "Kopiert die zuvor\nausgeführte\nAttacke des\nGegners."
    es: "Copia un ataque\nusado por el\nenemigo."
mind_reader:
  names:
    jp_kana: こころのめ
    en: MIND READER
    fr: LIRE-ESPRIT
    it: LEGGIMENTE
    de: WILLENSLESER
    es: TELÉPATA
  descriptions:
    jp_kana: "あいての　うごきを\nこころで　かんじて\nつぎの　こうげきが\nかならず　あいてに\nあたるように　する。"
    en: "The user predicts\nthe foe’s action to\nensure its next\nattack hits."
    fr: "Pressent l’action\npour réussir\nl’attaque suivante."
    it: "Studia il nemico:\nla prossima\nmossa andrà a\nsegno."
    de: "Ahnt gegn. Aktion\nvoraus, um zu\ngewährleisten, dass\nnächste Att. trifft."
    es: "Adivina el ataque\ndel otro y actúa\nen consecuencia."
minimize:
  names:
    jp_kana: ちいさくなる
    en: MINIMIZE
    fr: LILLIPUT
    it: MINIMIZZATO
    de: KOMPRIMATOR
    es: REDUCCIÓN
  descriptions:
    jp_kana: "ぜんしんの　さいぼうを\nちぢめて　からだを\nちいさくして　じぶんの\nかいひりつを　あげる。"
    en: "The user compresses\nall the cells in its\nbody to raise its\nevasiveness."
    fr: "Rapetisse le\nlanceur pour\naugmenter\nl’esquive."
    it: "Chi la usa si\nrimpicciolisce\naumentando\nl’elusione."
    de: "Anwender\nschrumpft, um\nFluchtwert zu\nerhöhen."
    es: "El agresor mengua\npara aumentar\nla EVASIÓN."
mirror_coat:
  names:
    jp_kana: ミラーコート
    en: MIRROR COAT
    fr: VOILE MIROIR
    it: SPECCHIOVELO
    de: SPIEGELCAPE
    es: MANTO ESPEJO
  descriptions:
    jp_kana: "てきから　うけた\nとくしゅ　こうげきの\nダメージを　ばいにして\nてきに　かえす。"
    en: "A retaliation move\nthat pays back the\nfoe’s special attack\ndouble."
    fr: "Renvoie l’attaque\nspéciale ennemie\n2 fois plus fort."
    it: "Risponde ad un\nattacco speciale\ncon forza doppia."
    de: "Kontert die\nSpezial-Attacke\ndes Gegners mit\n2-facher Kraft."
    es: "Responde a un\nATAQUE ESPECIAL\ncon doble fuerza."
mirror_move:
  names:
    jp_kana: オウムがえし
    en: MIRROR MOVE
    fr: MIMIQUE
    it: SPECULMOSSA
    de: SPIEGELTRICK
    es: MOV. ESPEJO
  descriptions:
    jp_kana: "あいての　つかった\nわざを　まねして\nじぶんも　おなじ\nわざを　つかう。"
    en: "The user counters\nthe move last used\nby the foe with the\nsame move."
    fr: "Contre l’attaque de\nl’ennemi avec la\nmême attaque."
    it: "Risponde ad un\nattacco con\nl’ultima mossa\nusata dal nemico."
    de: "Erwidert gegne-\nrischen Angriff\nmit derselben\nAttacke."
    es: "Contraataca\ncon el mismo\nmovimiento."
mist:
  names:
    jp_kana: しろいきり
    en: MIST
    fr: BRUME
    it: NEBBIA
    de: WEISSNEBEL
    es: NEBLINA
  descriptions:
    jp_kana: "しろい　きりで　\nからだを　おおって\nみかたの　のうりょくを\nあいてに　さげられない\nように　する。"
    en: "The ally party is\nprotected by a\nmist that prevents\nstat reductions."
    fr: "Crée une brume\nstoppant la\nréduction\ndes capacités."
    it: "Blocca la riduzione\ndelle statistiche\ndell’intera squadra."
    de: "Ein Nebel schützt\ndein Team vor\nStatusverschlech-\nterungen."
    es: "Te rodea de fina\nniebla y protege\ntus habilidades."
mist_ball:
  names:
    jp_kana: ミストボール
    en: MIST BALL
    fr: BALL’BRUME
    it: FOSCHISFERA
    de: NEBELBALL
    es: BOLA NEBLINA
  descriptions:
    jp_kana: "きりじょうの　こまかい\nうもうで　つつみこみ\nこうげきする。\nあいての　とくこうを\nさげることが　ある。"
    en: "A flurry of down\nhits the foe. It\nmay also lower the\nfoe’s SP. ATK."
    fr: "Envoie une rafale\nde duvet. Peut \naussi baisser\nl’ATQ. SPE."
    it: "Nube di piume sul\nnemico: può ridurre\nl’ATT. SPEC."
    de: "Angriff mit Daunen-\ngestöber, der den\nSP. ANG.\nevtl. senkt."
    es: "Banco de niebla\nque puede bajar\nel AT. ESP."
moonlight:
  names:
    jp_kana: つきのひかり
    en: MOONLIGHT
    fr: RAYON LUNE
    it: LUCELUNARE
    de: MONDSCHEIN
    es: LUZ LUNAR
  descriptions:
    jp_kana: "じぶんの　ＨＰを\nかいふくする。\nてんきに　よって\nかいふくの　りょうが　\nへんかする。"
    en: "Restores the user’s\nHP. The amount of\nHP regained varies\nwith the weather."
    fr: "Restaure les PV.\nLa quantité varie\nsuivant le temps."
    it: "Ridà un numero di\nPS in base al tempo\nche fa."
    de: "Füllt KP des\nAnwenders auf.\nDie Menge hängt\nvom Wetter ab."
    es: "Restaura PS.\nLa cantidad\nvaría según\nel clima."
morning_sun:
  names:
    jp_kana: あさのひざし
    en: MORNING SUN
    fr: AURORE
    it: MATTINDORO
    de: MORGENGRAUEN
    es: SOL MATINAL
  descriptions:
    jp_kana: "じぶんの　ＨＰを\nかいふくする。\nてんきに　よって\nかいふくの　りょうが　\nへんかする。"
    en: "Restores the user’s\nHP. The amount of\nHP regained varies\nwith the weather."
    fr: "Restaure les PV.\nLa quantité varie\nsuivant le temps."
    it: "Ridà un numero di\nPS in base al tempo\nche fa."
    de: "Füllt KP des\nAnwenders auf.\nDie Menge hängt\nvom Wetter ab."
    es: "Restaura PS.\nLa cantidad\nvaría según\nel clima."
mud_shot:
  names:
    jp_kana: マッドショット
    en: MUD SHOT
    fr: TIR DE BOUE
    it: COLPODIFANGO
    de: LEHMSCHUSS
    es: DISP. LODO
  descriptions:
    jp_kana: "どろの　かたまりを\nあいてに　なげつけて\nこうげきする。\nどうじに　あいての\nすばやさを　さげる。"
    en: "The user attacks by\nhurling mud.\nIt also reduces the\nfoe’s SPEED."
    fr: "Envoie de la boue\nà l’ennemi\npour réduire sa\nVITESSE."
    it: "Fango lanciato sul\nnemico, per ridurne\nla VELOCITÀ."
    de: "Angriff mit Lehm,\nder den INIT.-Wert\ndes Gegners senkt."
    es: "Dispara lodo\nal rival y reduce\nsu VELOCIDAD."
mud_slap:
  names:
    jp_kana: どろかけ
    en: MUD-SLAP
    fr: COUD’BOUE
    it: FANGOSBERLA
    de: LEHMSCHELLE
    es: BOFETÓN LODO
  descriptions:
    jp_kana: "かおや　めなどに\nドロを　なげつけて\nこうげきする。\nどうじに　あいての\nめいちゅうを　さげる。"
    en: "Mud is hurled in\nthe foe’s face to\ninflict damage and\nlower its accuracy."
    fr: "Envoie de la boue\nau visage pour\nbaisser la\nprécision."
    it: "Fango in faccia al\nnemico: arreca\ndanni e ne riduce\nla precisione."
    de: "Schadet Gegner\ndurch Matsch.\nDie Genauigkeit\nsinkt."
    es: "Echa lodo en la\ncara para bajar\nla PRECISIÓN."
mud_sport:
  names:
    jp_kana: どろあそび
    en: MUD SPORT
    fr: LANCE-BOUE
    it: FANGATA
    de: LEHMSUHLER
    es: CHAPOTEOLODO
  descriptions:
    jp_kana: "どろを　かぶって\nどろどろに　なり\nじぶんが　いるあいだ\nでんきタイプの　わざの\nダメージを　へらす。"
    en: "Weakens ELECTRIC-\ntype attacks while\nthe user is in the\nbattle."
    fr: "Couvre le lanceur\nde boue pour\nrésister aux\nattaques ELECTRIK."
    it: "Chi la usa è più\nresistente agli\nattacchi elettrici."
    de: "Schwächt ELEKTRO-\nAttacken solange\nder Anwender am\nKampf teilnimmt."
    es: "Te cubre de lodo\ny mejora\ntu resistencia\neléctrica."
muddy_water:
  names:
    jp_kana: だくりゅう
    en: MUDDY WATER
    fr: OCROUPI
    it: FANGHIGLIA
    de: LEHMBRÜHE
    es: AGUA LODOSA
  descriptions:
    jp_kana: "にごった　みずを\nはげしく　たたきつけて\nこうげきする。\nてきの　めいちゅうを\nさげることが　ある。"
    en: "The user attacks\nwith muddy water.\nIt may also lower\nthe foe’s accuracy."
    fr: "Attaque d’eau\ncroupie. Peut\nbaisser la\nprécision."
    it: "Acqua fangosa che\npuò ridurre la\nprecisione del\nnemico."
    de: "Greift mit Matsch\nan und senkt evtl.\ndie Genauigkeit\ndes Gegners."
    es: "Ataque con agua\nlodosa que puede\nbajar la\nPRECISIÓN."
nature_power:
  names:
    jp_kana: しぜんのちから
    en: NATURE POWER
    fr: FORCE-NATURE
    it: NATURFORZA
    de: NATUR-KRAFT
    es: ADAPTACIÓN
  descriptions:
    jp_kana: "しぜんの　ちからで\nこうげきする。\nつかう　ばしょで\nでてくる　わざが\nへんかする。"
    en: "An attack that\nchanges type\ndepending on the\nuser’s location."
    fr: "Le type de\nl’attaque change\nselon le lieu\ndu combat."
    it: "Il tipo di questo\nattacco varia\nsecondo il luogo."
    de: "Die Elementklasse\ndes Angriffs hängt\nvom Ort ab."
    es: "El tipo de ataque\nvaría según\nel sitio."
needle_arm:
  names:
    jp_kana: ニードルアーム
    en: NEEDLE ARM
    fr: POING DARD
    it: PUGNOSPINE
    de: NIETENRANKE
    es: BRAZO PINCHO
  descriptions:
    jp_kana: "トゲが　たくさん　ある\nうでで　なぐりつけて\nこうげきする。\nあいてを　ひるませる\nことが　ある。"
    en: "An attack using\nthorny arms.\nIt may make the\nfoe flinch."
    fr: "Attaque avec\ndes bras épineux.\nPeut apeurer."
    it: "Un pugno spinoso\nche può far\ntentennare."
    de: "Angriff mit dornigen\nArmen. Gegner\nschreckt evtl.\nzurück."
    es: "Pega con brazos\nde pinchos\ny puede causar\nretroceso."
night_shade:
  names:
    jp_kana: ナイトヘッド
    en: NIGHT SHADE
    fr: TENEBRES
    it: OMBRA NOTT.
    de: NACHTNEBEL
    es: TINIEBLAS
  descriptions:
    jp_kana: "おそろしい　まぼろしを\nあいてに　みせて\nじぶんの　レベルと\nおなじ　だけの\nダメージを　あたえる。"
    en: "An attack with a\nmirage that inflicts\ndamage matching\nthe user’s level."
    fr: "Un mirage qui\ninflige des dégâts\nselon le niveau\ndu lanceur."
    it: "Infligge un danno\npari al livello di\nchi la usa."
    de: "Richtet Schaden\ngemäß Level\ndes Angreifers\nan."
    es: "Se restarán tantos\nPS como nivel tenga\nel agresor."
nightmare:
  names:
    jp_kana: あくむ
    en: NIGHTMARE
    fr: CAUCHEMAR
    it: INCUBO
    de: NACHTMAHR
    es: PESADILLA
  descriptions:
    jp_kana: "ねむり　じょうたいの\nあいてに　あくむを\nみせて　まいターン\nすこしずつ　ＨＰを\nへらしていく。"
    en: "A sleeping foe is\nshown a nightmare\nthat inflicts some\ndamage every turn."
    fr: "Un cauchemar qui\ninflige des dégâts\nà chaque tour à\nl’ennemi endormi."
    it: "Il nemico\naddormentato perde\n1/4 dei PS a ogni\nturno."
    de: "Dem schlafenden\nGegner wird in\njeder Runde\nSchaden zugefügt."
    es: "El rival dormido\npierde 1/4 de PS\npor turno."
octazooka:
  names:
    jp_kana: オクタンほう
    en: OCTAZOOKA
    fr: OCTAZOOKA
    it: OCTAZOOKA
    de: OCTAZOOKA
    es: PULPOCAÑÓN
  descriptions:
    jp_kana: "かおや　めなどに\nすみを　ふきかけて\nこうげきする。\nあいての　めいちゅうを\nさげることが　ある。"
    en: "Ink is blasted in\nthe foe’s face or\neyes to damage and\nlower accuracy."
    fr: "Jette de l’encre au\nvisage de l’ennemi\npour baisser sa\nprécision."
    it: "Inchiostro che\narreca danni e\nabbatte la\nprecisione."
    de: "Schießt Tinte, um\nSchaden anzurich-\nten und die Genau-\nigkeit zu senken."
    es: "Dispara tinta para\natacar y bajar\nla PRECISIÓN."
odor_sleuth:
  names:
    jp_kana: かぎわける
    en: ODOR SLEUTH
    fr: FLAIR
    it: SEGUGIO
    de: SCHNÜFFLER
    es: RASTREO
  descriptions:
    jp_kana: "かいひりつが　あがって\nわざを　あてにくく\nなってしまって　いる\nあいての　かいひりつを\nもとに　もどす。"
    en: "Completely negates\nthe foe’s efforts to\nheighten its ability\nto evade."
    fr: "Empêche l’ennemi\nd’augmenter son\nesquive."
    it: "Vanifica l’aumento\ndi elusione del\nnemico."
    de: "Hindert Gegner\ndaran, ihren\nFluchtwert zu\nerhöhen."
    es: "Anula los intentos\ndel rival por\naumentar\nla EVASIÓN."
outrage:
  names:
    jp_kana: げきりん
    en: OUTRAGE
    fr: COLERE
    it: OLTRAGGIO
    de: WUTANFALL
    es: ENFADO
  descriptions:
    jp_kana: "２ー３ターンの　あいだ\nあばれ　まくって\nこうげきする。\nあばれた　あとは\nこんらん　してしまう。"
    en: "The user thrashes\nabout for two to\nthree turns, then\nbecomes confused."
    fr: "Une attaque\nfurieuse sur\n2 à 3 tours.\nLanceur confus."
    it: "Attacco veemente\ndi 2-3 turni:\nconfonde chi lo\nusa."
    de: "Wiederholt Angriff\n2 - 3 Runden lang.\nAnschließend ist\ner verwirrt."
    es: "Embestida que dura\n2 ó 3 turnos y te\nconfunde."
overheat:
  names:
    jp_kana: オーバーヒート
    en: OVERHEAT
    fr: SURCHAUFFE
    it: VAMPATA
    de: HITZEKOLLER
    es: SOFOCO
  descriptions:
    jp_kana: "あいてを　フルパワーで\nこうげきする。\nつかうと　はんどうで\nじぶんの　とくこうが\nガクッと　さがる。"
    en: "An intense attack\nthat also sharply\nreduces the user’s\nSP. ATK stat."
    fr: "Attaque à pleine\npuissance, mais\nbaisse beaucoup\nl’ATQ. SPE."
    it: "Potente attacco, ma\nriduce di molto\nl’ATT. SPEC. di chi\nla usa."
    de: "Angriff mit voller\nKraft, der den SP.\nANG. d. Anwenders \ndeutlich senkt."
    es: "Ataque en toda\nregla que\nbaja mucho\ntu AT. ESP."
pain_split:
  names:
    jp_kana: いたみわけ
    en: PAIN SPLIT
    fr: BALANCE
    it: MALCOMUNE
    de: LEIDTEILER
    es: DIVIDE DOLOR
  descriptions:
    jp_kana: "じぶんの　ＨＰと\nあいての　ＨＰを\nたして　それを\nじぶんと　あいてで\nなかよく　わける。"
    en: "The user adds its\nHP to the foe’s HP,\nthen equally shares\nthe total HP."
    fr: "Ajoute les PV des\ndeux combattants\net les partage."
    it: "Somma i PS dei\n2 avversari\nridistribuendoli\nequamente."
    de: "Addiert KP von\nAnwender und\nGegner. Teilt\ngerecht auf."
    es: "Une tus PS a los\ndel rival y los\nreparte por igual."
pay_day:
  names:
    jp_kana: ネコにこばん
    en: PAY DAY
    fr: JACKPOT
    it: GIORNOPAGA
    de: ZAHLTAG
    es: DÍA DE PAGO
  descriptions:
    jp_kana: "こばんを　たくさん\nあいてに　なげつけて\nこうげきする。\nせんとうの　あとで\nおかねが　てにはいる。"
    en: "Numerous coins are\nhurled at the foe.\nMoney is earned\nafter battle."
    fr: "Lance des pièces.\nL’argent est\nrécupéré plus tard."
    it: "Lancia monete sul\nnemico, per\nrecuperarle più\ntardi."
    de: "Der Gegner wird\nmit Münzen\nbeworfen. Das Geld\nwird erstattet."
    es: "Arroja monedas\nque luego\nrecupera."
peck:
  names:
    jp_kana: つつく
    en: PECK
    fr: PICPIC
    it: BECCATA
    de: SCHNABEL
    es: PICOTAZO
  descriptions:
    jp_kana: "するどく　とがった\nくちばしや　つので　\nあいてを　つついて\nこうげきする。"
    en: "The foe is jabbed\nwith a sharply\npointed beak or\nhorn."
    fr: "Attaque l’ennemi\navec une corne,\nun bec pointu, etc."
    it: "Il nemico è colpito\nda una beccata o\nun colpo simile."
    de: "Greift Gegner mit\ndem Schnabel\noder Horn an."
    es: "Ataca con un\npunzante pico."
perish_song:
  names:
    jp_kana: ほろびのうた
    en: PERISH SONG
    fr: REQUIEM
    it: ULTIMOCANTO
    de: ABGESANG
    es: CANTO MORTAL
  descriptions:
    jp_kana: "きいた　ポケモンは\n３ターン　たつと\nみんな　たおれる。\nこうたいすると\nこうかは　なくなる。"
    en: "Any battler that\nhears this faints\nin three turns\nunless it switches."
    fr: "Un POKéMON qui\nentend ce requiem\nest KO en 3 tours."
    it: "Chi sente questo\ncanto va KO in 3\nturni, se non lo si\nsostituisce."
    de: "Wer ihn hört, wird\nnach 3 Runden\nbesiegt. Rettung\ndurch Tausch."
    es: "A los 3 turnos\ndel canto, caen\nrival y atacante."
petal_dance:
  names:
    jp_kana: はなびらのまい
    en: PETAL DANCE
    fr: DANSE-FLEUR
    it: PETALODANZA
    de: BLÄTTERTANZ
    es: DANZA PÉTALO
  descriptions:
    jp_kana: "２ー３ターンの　あいだ\nはなを　まきちらして\nこうげきする。\nまきちらした　あとは\nこんらん　してしまう。"
    en: "The user attacks\nwith petals for two\nto three turns,\nthen gets confused."
    fr: "Une attaque\nfurieuse de 2 à 3\ntours. Le lanceur\ndevient confus."
    it: "Attacco veemente\ndi 2-3 turni:\nconfonde chi lo\nusa."
    de: "Angriff mit Blüten-\nblättern für 2 - 3\nRunden. Angreifer\nwird verwirrt."
    es: "Dura de 2 a 3\nturnos y acaba\nconfundiéndote."
pin_missile:
  names:
    jp_kana: ミサイルばり
    en: PIN MISSILE
    fr: DARD-NUEE
    it: MISSILSPILLO
    de: NADELRAKETE
    es: PIN MISIL
  descriptions:
    jp_kana: "するどい　ハリを\nあいてに　はっしゃして\nこうげきする。\n２ー５かい　れんぞくで\nダメージを　あたえる。"
    en: "Sharp pins are shot\nat the foe and hit\ntwo to five times\nat once."
    fr: "Envoie des dards\nqui frappent\n2 à 5 fois."
    it: "Spilli di fuoco\ncolpiscono il\nnemico da 2 a 5\nvolte."
    de: "Spitze Nadeln\ntreffen den\nGegner 2 - 5-mal."
    es: "Lanza finas púas\nque hieren de 2 a\n5 veces."
poison_fang:
  names:
    jp_kana: どくどくのキバ
    en: POISON FANG
    fr: CROCHETVENIN
    it: VELENODENTI
    de: GIFTZAHN
    es: COLMILLO VEN
  descriptions:
    jp_kana: "どくの　ある　キバで\nあいてに　かみついて\nこうげきする。\nもうどく　じょうたいに\nすることが　ある。"
    en: "The foe is bitten\nwith toxic fangs.\nIt may also badly\npoison the foe."
    fr: "Morsure pouvant\nsérieusement\nempoisonner\nl’ennemi."
    it: "Denti affilati:\npossono\navvelenare il\nnemico."
    de: "Angriff mit Gift-\nreißzähnen. Gegner\nwird evtl. schwer\nvergiftet."
    es: "Incisivos colmillos\nque pueden\nenvenenar al rival."
poison_gas:
  names:
    jp_kana: どくガス
    en: POISON GAS
    fr: GAZ TOXIK
    it: VELENOGAS
    de: GIFTWOLKE
    es: GAS VENENOSO
  descriptions:
    jp_kana: "どくの　ある　ガスを\nかおなどに　ふきかけて\nあいてを　どくの\nじょうたいに　する。"
    en: "The foe is sprayed\nwith a cloud of\ntoxic gas that may\npoison the foe."
    fr: "Enveloppe l’ennemi\nd’un gaz toxique.\nPeut empoisonner."
    it: "Il nemico è avvolto\nin un gas che può\navvelenare."
    de: "Hüllt Gegner in\ngiftiges Gas ein,\ndas ihn evtl.\nvergiftet."
    es: "Envuelve al enemigo\nen gas tóxico\nvenenoso."
poison_powder:
  names:
    jp_kana: どくのこな
    en: POISONPOWDER
    fr: POUDRE TOXIK
    it: VELENPOLVERE
    de: GIFTPUDER
    es: POLVO VENENO
  descriptions:
    jp_kana: "どくの　ある　こなを\nたくさん　ふりまいて\nあいてを　どくの\nじょうたいに　する。"
    en: "A cloud of toxic\ndust is scattered.\nIt may poison the\nfoe."
    fr: "Répand une poudre\ntoxique pouvant\nempoisonner."
    it: "Polvere tossica\nche può avvelenare\nil nemico."
    de: "Verstreut giftigen\nPuder, der den\nGegner vergiften\nkann."
    es: "Polvo tóxico que\npuede envenenar\nal enemigo."
poison_sting:
  names:
    jp_kana: どくばり
    en: POISON STING
    fr: DARD-VENIN
    it: VELENOSPINA
    de: GIFTSTACHEL
    es: PICOTAZO VEN
  descriptions:
    jp_kana: "どくの　ある　ハリを\nあいてに　つきさして\nこうげきする。\nどく　じょうたいに\nすることが　ある。"
    en: "The foe is stabbed\nwith a toxic barb,\netc. It may poison\nthe foe."
    fr: "Une attaque de\ndards, etc.,\npouvant\nempoisonner."
    it: "Attacco con aculei\ne simili: può\navvelenare il\nnemico."
    de: "Angriff mit Gift-\nstacheln. Der\nGegner wird evtl.\nvergiftet."
    es: "Puede envenenar al\nenemigo con púas,\netc."
poison_tail:
  names:
    jp_kana: ポイズンテール
    en: POISON TAIL
    fr: QUEUE-POISON
    it: VELENOCODA
    de: GIFTSCHWEIF
    es: COLA VENENO
  descriptions:
    jp_kana: "こうげきした　あいてを\nどく　じょうたいに\nすることが　あり\nきゅうしょに　あたる\nかくりつも　たかい。"
    en: "An attack with a\nhigh critical-hit\nratio. It may also\npoison the foe."
    fr: "Attaque à taux de\ncritiques élevé.\nPeut aussi\nempoisonner."
    it: "Probabile brutto\ncolpo. Può\navvelenare il\nnemico."
    de: "Angriff mit hoher\nVolltrefferquote. \nDer Gegner wird\nevtl. vergiftet."
    es: "Puede envenenar\ny dar un golpe\ncrítico."
pound:
  names:
    jp_kana: はたく
    en: POUND
    fr: ECRAS’FACE
    it: BOTTA
    de: PFUND
    es: DESTRUCTOR
  descriptions:
    jp_kana: "ながい　しっぽや\nてなどを　つかって\nあいてを　はたいて\nこうげきする。"
    en: "A physical attack\ndelivered with a\nlong tail or a\nforeleg, etc."
    fr: "Ecrase l’ennemi\navec les pattes\navant ou la queue."
    it: "Il nemico è colpito\ncon la coda o le\nzampe anteriori."
    de: "Ein Hieb mit den\nVorderbeinen oder\ndem Schweif."
    es: "Golpea con las\npatas o la cola."
powder_snow:
  names:
    jp_kana: こなゆき
    en: POWDER SNOW
    fr: POUDREUSE
    it: POLNEVE
    de: PULVERSCHNEE
    es: NIEVE POLVO
  descriptions:
    jp_kana: "つめたい　こなゆきを\nあいてに　ふきつけて\nこうげきする。\nこおり　じょうたいに\nすることが　ある。"
    en: "Blasts the foe with\na snowy gust.\nIt may cause\nfreezing."
    fr: "Envoie une rafale\nde neige. Peut\ngeler l’ennemi."
    it: "Raffica di neve\nche può\ncongelare il\nnemico."
    de: "Angriff mit Schnee.\nGegner wird evtl.\neingefroren."
    es: "Lanza una nevada\nque puede llegar\na congelar."
present:
  names:
    jp_kana: プレゼント
    en: PRESENT
    fr: CADEAU
    it: REGALINO
    de: GESCHENK
    es: PRESENTE
  descriptions:
    jp_kana: "わなを　かけた　はこを\nあいてに　わたして\nこうげきする。\nＨＰを　かいふくさせて\nしまうことも　ある。"
    en: "The foe is given a\nbooby-trapped gift.\nIt restores HP\nsometimes, however."
    fr: "Cadeau en forme\nde bombe. Peut\nrestaurer des PV."
    it: "Regalo a forma di\nbomba: può far\nrecuperare PS."
    de: "Eine Bombe als\nGeschenk. Es\nkann auch KP\nwieder herstellen."
    es: "Regalo con forma\nde bomba. Puede\nque restaure\nlos PS."
protect:
  names:
    jp_kana: まもる
    en: PROTECT
    fr: ABRI
    it: PROTEZIONE
    de: SCHUTZSCHILD
    es: PROTECCIÓN
  descriptions:
    jp_kana: "さきに　わざを　つかい\nあいての　こうげきを\nまったく　うけない。\nれんぞくで　だすと\nしっぱい　しやすい。"
    en: "Enables the user to\nevade all attacks.\nIt may fail if used\nin succession."
    fr: "Esquive l’attaque,\nmais peut échouer\nsi réutilisé."
    it: "Elude gli attacchi:\nse usata\nripetutamente può\nfallire."
    de: "Anwender weicht\njeder Attacke aus.\nScheitert evtl. bei\nWiederholung."
    es: "Frena ataques,\npero puede fallar\nsi se usa sin cesar."
psybeam:
  names:
    jp_kana: サイケこうせん
    en: PSYBEAM
    fr: RAFALE PSY
    it: PSICORAGGIO
    de: PSYSTRAHL
    es: PSICORRAYO
  descriptions:
    jp_kana: "ふしぎな　こうせんを\nあいてに　はっしゃして\nこうげきする。\nこんらん　じょうたいに\nすることが　ある。"
    en: "A peculiar ray is\nshot at the foe.\nIt may leave the\nfoe confused."
    fr: "Etrange rayon\npouvant rendre\nl’ennemi confus."
    it: "Un raggio speciale\nche può confondere\nil nemico."
    de: "Feuert einen Strahl\nab, der den\nGegner verwirren\nkann."
    es: "Extraño rayo\nque puede causar\nconfusión."
psych_up:
  names:
    jp_kana: じこあんじ
    en: PSYCH UP
    fr: BOOST
    it: PSICAMISÙ
    de: PSYCHO-PLUS
    es: MÁS PSIQUE
  descriptions:
    jp_kana: "じぶんに　あんじを\nかける　ことで\nあいてに　かかっている\nほじょ　こうかを\nじぶんにも　かける。"
    en: "The user hypnotizes\nitself into copying\nany stat change\nmade by the foe."
    fr: "Copie les effets\nde l’ennemi et les\npasse au lanceur."
    it: "Copia le modifiche\nnelle statistiche\ndel nemico."
    de: "Selbsthypnose des\nAnw. zur Kopie der\nStatusveränderungen\ndes Gegners."
    es: "Copia los efectos\ndel rival y te los\nadjudica."
psychic:
  names:
    jp_kana: サイコキネシス
    en: PSYCHIC
    fr: PSYKO
    it: PSICHICO
    de: PSYCHOKINESE
    es: PSÍQUICO
  descriptions:
    jp_kana: "つよい　ねんりきを\nあいてに　おくって\nこうげきする。\nあいての　とくぼうを\nさげることが　ある。"
    en: "A strong telekinetic\nattack. It may also\nlower the foe’s\nSP. DEF stat."
    fr: "Une puissante\nattaque PSY\npouvant baisser\nla DEF. SPE."
    it: "Potente attacco\npsichico: può\nridurre la DIFESA\nSPECIALE."
    de: "Starke Psycho-\nAttacke, die evtl.\ndie SP. VER.\nsenkt."
    es: "Fuerte ataque\npsíquico que\npuede bajar\nla DEF. ESP."
psycho_boost:
  names:
    jp_kana: サイコブースト
    en: PSYCHO BOOST
    fr: PSYCHO BOOST
    it: PSICOSLANCIO
    de: PSYSCHUB
    es: PSICOATAQUE
  descriptions:
    jp_kana: "あいてを　フルパワーで\nこうげきする。\nつかうと　はんどうで\nじぶんの　とくこうが\nガクッと　さがる。"
    en: "An intense attack\nthat also sharply\nreduces the user’s\nSP. ATK stat."
    fr: "Attaque à pleine\npuissance, mais\nbaisse beaucoup\nl’ATQ. SPE."
    it: "Potente attacco, ma\nriduce di molto\nl’ATT. SPEC. di chi\nlo usa."
    de: "Angriff mit voller\nKraft, der den\nSP. ANG. des\nAnwenders senkt."
    es: "Es tremendamente\npotente, pero baja\nmucho el AT. ESP."
psywave:
  names:
    jp_kana: サイコウェーブ
    en: PSYWAVE
    fr: VAGUE PSY
    it: PSICONDA
    de: PSYWELLE
    es: PSICOONDA
  descriptions:
    jp_kana: "ふしぎな　ねんぱを\nあいてに　はっしゃして\nこうげきする。\nつかう　たびに\nダメージが　かわる。"
    en: "The foe is attacked\nwith an odd, hot\nenergy wave that\nvaries in intensity."
    fr: "Envoie une onde\nPSY d’intensité\nvariable."
    it: "Onda psichica di\nintensità variabile."
    de: "Heiße Energiewelle\nmit unterschied-\nlicher Intensität\nwird erzeugt."
    es: "Ataque con\nonda psíquica\nde intensidad\nvariable."
pursuit:
  names:
    jp_kana: おいうち
    en: PURSUIT
    fr: POURSUITE
    it: INSEGUIMENTO
    de: VERFOLGUNG
    es: PERSECUCIÓN
  descriptions:
    jp_kana: "あいてが　ポケモンを\nこうかん　しようとして\nひっこめる　ときに\nそのあいてに　おおきな\nダメージを　あたえる。"
    en: "An attack move that\nworks especially\nwell on a foe that\nis switching out."
    fr: "Inflige de sérieux\ndégâts lorsque\nl’ennemi change."
    it: "Più efficace se\nil nemico\nè in fase di\nsostituzione."
    de: "Richtet großen\nSchaden bei\nAustausch des\nGegners an."
    es: "Hace mucho daño\nal rival que pide\nel relevo."
quick_attack:
  names:
    jp_kana: でんこうせっか
    en: QUICK ATTACK
    fr: VIVE-ATTAQUE
    it: ATT. RAPIDO
    de: RUCKZUCKHIEB
    es: AT. RÁPIDO
  descriptions:
    jp_kana: "めにも　とまらない\nものすごい　はやさで\nあいてに　つっこんで\nかならず　せんせい\nこうげきする。"
    en: "An almost invisibly\nfast attack that\nis certain to strike\nfirst."
    fr: "Attaque fulgurante\nqui permet de\nfrapper en premier."
    it: "Attacco rapidissimo\nche colpisce sempre\nper primo."
    de: "Sehr schneller\nAngriff mit\nErstschlaggarantie."
    es: "Ataque rápido que\npermite golpear\nen 1.ᵉʳ lugar."
rage:
  names:
    jp_kana: いかり
    en: RAGE
    fr: FRENESIE
    it: IRA
    de: RASEREI
    es: FURIA
  descriptions:
    jp_kana: "あいての　こうげきを\nうける　たびに\nいかりで　じぶんの\nわざの　いりょくが\nあがっていく。"
    en: "An attack that\nbecomes stronger\neach time the user\nis hit in battle."
    fr: "Augmente\nl’ATTAQUE du\nlanceur à chaque\ncoup reçu."
    it: "Diventa sempre più\npotente ogni volta\nche chi la usa è\ncolpito."
    de: "Erhöht ANGR.\ndes Anwenders\nbei jedem gegne-\nrischen Treffer."
    es: "Mejora tu ATAQUE\ncada vez que te\ngolpean."
rain_dance:
  names:
    jp_kana: あまごい
    en: RAIN DANCE
    fr: DANSE PLUIE
    it: PIOGGIADANZA
    de: REGENTANZ
    es: DANZA LLUVIA
  descriptions:
    jp_kana: "５ターンの　あいだ\nあめを　ふらせて\nみずタイプの\nわざの　ダメージを\nおおきくする。"
    en: "A heavy rain falls\nfor five turns,\npowering up WATER-\ntype moves."
    fr: "Améliore les\nattaques EAU\npendant 5 tours."
    it: "Aumenta l’effetto\ndelle mosse\nACQUA per 5 turni."
    de: "Erhöht Stärke\nvon WASSER-\nAttacken 5 \nRunden lang."
    es: "Refuerza los\nataques de\ntipo AGUA\ndurante 5 turnos."
rapid_spin:
  names:
    jp_kana: こうそくスピン
    en: RAPID SPIN
    fr: TOUR RAPIDE
    it: RAPIGIRO
    de: TURBODREHER
    es: GIRO RÁPIDO
  descriptions:
    jp_kana: "しめつけや　まきつきや\nやどりぎのタネや\nまきびし　などの\nれんぞくの　わざから\nぬけだせる。"
    en: "An attack that\nfrees the user from\nBIND, WRAP, LEECH\nSEED, and SPIKES."
    fr: "Frappe l’ennemi\nen tournant sur\nsoi-même."
    it: "Attacco che libera\nchi lo usa\ndall’effetto di\ndiverse mosse."
    de: "Trifft den Gegner\ndurch Drehen mit\nmax. Tempo."
    es: "Ataque corporal\ngiratorio de gran\nvelocidad."
razor_leaf:
  names:
    jp_kana: はっぱカッター
    en: RAZOR LEAF
    fr: TRANCH’HERBE
    it: FOGLIELAMA
    de: RASIERBLATT
    es: HOJA AFILADA
  descriptions:
    jp_kana: "はっぱを　とばして\nてきを　きりつけて\nこうげきする。\nきゅうしょに　あたる\nかくりつが　たかい。"
    en: "The foe is hit with\na cutting leaf.\nIt has a high\ncritical-hit ratio."
    fr: "Tranche avec\ndes feuilles.\nTaux de critiques\nélevé."
    it: "Foglie tagliano il\nnemico. Probabile\nbrutto colpo."
    de: "Trifft Gegner mit\nBlättern. Hohe\nVolltrefferquote."
    es: "Corta con hojas.\nSuele ser crítico."
razor_wind:
  names:
    jp_kana: かまいたち
    en: RAZOR WIND
    fr: COUPE-VENT
    it: VENTAGLIENTE
    de: KLINGENSTURM
    es: V. CORTANTE
  descriptions:
    jp_kana: "つくりだした　かぜの\nやいばで　２ターンめに\nこうげきする。\nきゅうしょに　あたる\nかくりつが　たかい。"
    en: "Blades of wind hit\nthe foe on the 2nd\nturn. It has a high\ncritical-hit ratio."
    fr: "Une attaque en\n2 tours qui\nfrappe au\n2ᵉ tour."
    it: "Mossa in due tempi,\nche colpisce al 2º\nturno. Probabile\nbrutto colpo."
    de: "Eine Attacke, die\nauf 2 Runden\nbasiert. Hohe\nVolltrefferquote."
    es: "1.ᵉʳ turno:\nprepara.\n2.º: ataca."
recover:
  names:
    jp_kana: じこさいせい
    en: RECOVER
    fr: SOIN
    it: RIPRESA
    de: GENESUNG
    es: RECUPERACIÓN
  descriptions:
    jp_kana: "じぶんで　さいせいして\nじぶんの　ＨＰを\nさいだい　ＨＰの\nはんぶんだけ\nかいふくする。"
    en: "A self-healing move\nthat restores HP by\nup to half of the\nuser’s maximum HP."
    fr: "Restaure jusqu’à\nla moitié des PV\nmax du lanceur."
    it: "Chi la usa recupera\nfino a metà dei PS\nmassimi."
    de: "Max. KP des\nAnwenders wird\nbis zur Hälfte\naufgefüllt."
    es: "Restaura hasta\nla mitad de los PS\nmáximos."
recycle:
  names:
    jp_kana: リサイクル
    en: RECYCLE
    fr: RECYCLAGE
    it: RICICLO
    de: AUFBEREITUNG
    es: RECICLAJE
  descriptions:
    jp_kana: "つかって　しまって\nなくなった　どうぐを\nもういちど　つかえる\nように　する。"
    en: "A move that\nrecycles a used\nitem for use once\nmore."
    fr: "Recycle un objet\npour l’utiliser une\nfois de plus."
    it: "Permette di\nriutilizzare uno\nstrumento già\nusato."
    de: "Recycling eines\nverwendeten Items."
    es: "Recicla un objeto\nusado para\nutilizarlo de\nnuevo."
reflect:
  names:
    jp_kana: リフレクター
    en: REFLECT
    fr: PROTECTION
    it: RIFLESSO
    de: REFLEKTOR
    es: REFLEJO
  descriptions:
    jp_kana: "５ターンの　あいだ\nがんじょうな　かべで\nてきから　うける\nぶつり　こうげきの\nダメージを　よわめる。"
    en: "A wall of light\ncuts damage from\nphysical attacks\nfor five turns."
    fr: "Crée un mur\nlumineux qui\naffaiblit les att.\nphysiques 5 tours."
    it: "Una parete di luce\nindebolisce gli\nattacchi fisici\nper 5 turni."
    de: "Lichtwand, die\n5 Runden leicht\nvor physischen\nAngriffen schützt."
    es: "Pared de luz\nque debilita los\nataques físicos."
refresh:
  names:
    jp_kana: リフレッシュ
    en: REFRESH
    fr: REGENERATION
    it: RINFRESCATA
    de: HEILUNG
    es: ALIVIO
  descriptions:
    jp_kana: "じぶんが　なっている\nどく　まひ　やけどの\nじょうたい　いじょうを\nかいふくする。"
    en: "A self-healing move\nthat cures the user\nof a poisoning,\nburn, or paralysis."
    fr: "Soigne un\nempoisonnement,\nune paralysie ou\nune brûlure."
    it: "Cura avvelenamenti,\nparalisi e\nscottature."
    de: "Selbstheilung bei\nVergiftung, \nParalyse und\nVerbrennung."
    es: "Cura envenena-\nmientos, parálisis\ny quemaduras."
rest:
  names:
    jp_kana: ねむる
    en: REST
    fr: REPOS
    it: RIPOSO
    de: ERHOLUNG
    es: DESCANSO
  descriptions:
    jp_kana: "２ターンの　あいだ\nねむって　やすみ\nじぶんの　ＨＰと\nじょうたい　いじょうを\nすべて　かいふくする。"
    en: "The user sleeps for\ntwo turns to fully\nrestore HP and heal\nany status problem."
    fr: "Le lanceur dort\n2 tours et regagne\nses PV et son\nstatut normal."
    it: "Chi la usa dorme\nper 2 turni e\nrecupera PS e\nstato."
    de: "Anwender schläft 2\nRunden, um KP\nund Status voll\nzu erneuern."
    es: "Te duerme durante\n2 turnos para\ncurarte totalmente."
return:
  names:
    jp_kana: おんがえし
    en: RETURN
    fr: RETOUR
    it: RITORNO
    de: RÜCKKEHR
    es: RETROCESO
  descriptions:
    jp_kana: "トレーナーの　ために\nあいてを　ぜんりょくで\nこうげきする。\nなついて　いるほど\nダメージが　おおきい。"
    en: "This attack move\ngrows more powerful\nthe more the user\nlikes its TRAINER."
    fr: "Attaque dont la\npuissance dépend\nde l’amitié avec le\nDRESSEUR."
    it: "Più potente se chi\nla usa è amico del\nsuo ALLENATORE."
    de: "Angriff, dessen\nKraft bei Freund-\nschaft zum TRAI-\nNER größer wird."
    es: "Ataque que aumenta\nsus efectos con\nla amistad."
revenge:
  names:
    jp_kana: リベンジ
    en: REVENGE
    fr: VENDETTA
    it: VENDETTA
    de: VERGELTUNG
    es: DESQUITE
  descriptions:
    jp_kana: "あいてから　わざを\nうけていると\nその　あいてに\nあたえる　ダメージが\nおおきくなる。"
    en: "An attack move that\ngains in intensity if\nthe target has hurt\nthe user."
    fr: "Gagne en puissance\nquand blessé par\nl’ennemi."
    it: "Più potente se si è\nstati colpiti dal\nnemico."
    de: "Attacke wird\nstärker, wenn\nAnwender\nSchaden nimmt."
    es: "Ataque que\ngana fuerza si\nel enemigo\nte hiere."
reversal:
  names:
    jp_kana: きしかいせい
    en: REVERSAL
    fr: CONTRE
    it: CONTROPIEDE
    de: GEGENSCHLAG
    es: INVERSIÓN
  descriptions:
    jp_kana: "ちからを　ふりしぼって\nこうげきする。\nじぶんの　ＨＰが\nすくないほど　あたえる\nダメージが　おおきい。"
    en: "An all-out attack\nthat becomes more\npowerful the less\nHP the user has."
    fr: "Inflige plus de\ndégâts quand les\nPV du lanceur\nsont faibles."
    it: "Arreca danni\nmaggiori se i\nPS di chi la usa\nsono bassi."
    de: "Richtet mehr\nSchaden an,\nwenn eigene KP\nniedrig sind."
    es: "Si tienes pocos PS,\nel daño que causa\nes mucho mayor."
roar:
  names:
    jp_kana: ほえる
    en: ROAR
    fr: HURLEMENT
    it: BOATO
    de: BRÜLLER
    es: RUGIDO
  descriptions:
    jp_kana: "あいてを　にげださせて\nひかえの　ポケモンを\nむりやり　ひきだす。\nやせいの　ばあいは\nせんとうが　おわる。"
    en: "The foe is made to\nswitch out with an\nally. In the wild,\nthe battle ends."
    fr: "Fait fuir l’ennemi\npour mettre fin au\ncombat."
    it: "Il POKéMON nemico\nè costretto a\nlasciare la lotta."
    de: "Verjagt den Gegner\nund beendet den\nKampf in der\nWildnis."
    es: "Ahuyenta al rival\ny finaliza el\ncombate."
rock_blast:
  names:
    jp_kana: ロックブラスト
    en: ROCK BLAST
    fr: BOULE ROC
    it: CADUTAMASSI
    de: FELSWURF
    es: PEDRADA
  descriptions:
    jp_kana: "かたい　いわを\nあいてに　はっしゃして\nこうげきする。\n２ー５かい　れんぞくで\nダメージを　あたえる。"
    en: "The user hurls two\nto five hard rocks\nat the foe to\nattack."
    fr: "Projette des\nrochers sur\nl’ennemi 2 à 5 fois\nde suite."
    it: "Lancio di massi sul\nnemico che dura\nda 2 a 5 volte."
    de: "Wirft 2 - 5-mal in\nFolge Felsblöcke\nauf den Gegner."
    es: "Lanza pedruscos\nal rival de 2 a 5\nveces consecutivas."
rock_slide:
  names:
    jp_kana: いわなだれ
    en: ROCK SLIDE
    fr: EBOULEMENT
    it: FRANA
    de: STEINHAGEL
    es: AVALANCHA
  descriptions:
    jp_kana: "おおきな　いわを\nてきに　なげつけて\nこうげきする。\nてきを　ひるませる\nことが　ある。"
    en: "Large boulders are\nhurled at the foe.\nIt may make the\nfoe flinch."
    fr: "Envoie de gros\nrochers. Peut\napeurer l’ennemi."
    it: "Grandi massi\nlanciati sul\nnemico, che può\ntentennare."
    de: "Schleudert riesige\nFelsen. Gegner\nschreckt evtl.\nzurück."
    es: "Lanza grandes\npedruscos.\nPuede causar\nretroceso."
rock_smash:
  names:
    jp_kana: いわくだき
    en: ROCK SMASH
    fr: ECLATE-ROC
    it: SPACCAROCCIA
    de: ZERTRÜMMERER
    es: GOLPE ROCA
  descriptions:
    jp_kana: "こうげきと　どうじに\nあいての　ぼうぎょを\nさげることが　ある。\nひびわれた　いわを\nこわすことも　できる。"
    en: "An attack that may\nalso cut DEFENSE.\nIt can also smash\ncracked boulders."
    fr: "Une attaque qui\npeut baisser la\nDEFENSE et briser\ndes rochers."
    it: "Un lancio di pietre\nche può ridurre la\nDIFESA. Può anche\nfrantumare rocce."
    de: "Zertrümmernder An-\ngriff, auch bei\nSteinen. Senkt evtl.\ndie VERT."
    es: "Ataque que puede\nbajar la DEFENSA.\nFuera de combate\nmachaca rocas."
rock_throw:
  names:
    jp_kana: いわおとし
    en: ROCK THROW
    fr: JET-PIERRES
    it: SASSATA
    de: STEINWURF
    es: LANZARROCAS
  descriptions:
    jp_kana: "ちいさくて　なげやすい\nいわを　もちあげて\nあいてに　なげつけて\nこうげきする。"
    en: "The foe is attacked\nwith a shower of\nsmall, easily\nthrown rocks."
    fr: "Envoie des cailloux\npour frapper\nl’ennemi."
    it: "Il nemico è colpito\nda piccole rocce."
    de: "Der Gegner wird\nmit vielen kleinen\nSteinen beworfen."
    es: "Tira pequeñas rocas\nal enemigo."
rock_tomb:
  names:
    jp_kana: がんせきふうじ
    en: ROCK TOMB
    fr: TOMBEROCHE
    it: ROCCIOTOMBA
    de: FELSGRAB
    es: TUMBA ROCAS
  descriptions:
    jp_kana: "いわを　もちあげ\nあいてに　なげつけて\nこうげきする。\nどうじに　あいての\nすばやさを　さげる。"
    en: "Boulders are hurled\nat the foe. It also\nlowers the foe’s\nSPEED if it hits."
    fr: "Immobilise l’ennemi\navec des rochers.\nBaisse la VITESSE."
    it: "Rocce bloccano il\nnemico e ne\nabbattono la\nVELOCITÀ."
    de: "Angriff mit Felsen.\nBei Erfolg wird\nder INIT.-Wert des\nGegners gesenkt."
    es: "Tira rocas al\nrival, lo para\ny suele bajarle\nVELOCIDAD."
role_play:
  names:
    jp_kana: なりきり
    en: ROLE PLAY
    fr: IMITATION
    it: GIOCODIRUOLO
    de: ROLLENTAUSCH
    es: IMITACIÓN
  descriptions:
    jp_kana: "あいてに　なりきって\nじぶんも　あいてと\nおなじ　とくせいに\nへんかする。"
    en: "The user mimics the\nfoe completely and\ncopies the foe’s\nability."
    fr: "Imite la cible et\ncopie sa capacité\nspéciale."
    it: "Mima un POKéMON\ncopiandone\nl’abilità speciale."
    de: "Parodiert Gegner\nund kopiert seine\nSpezialfähigkeiten."
    es: "Imita al rival\ny copia\nsu HABILIDAD\nESPECIAL."
rolling_kick:
  names:
    jp_kana: まわしげり
    en: ROLLING KICK
    fr: MAWASHI GERI
    it: CALCIORULLO
    de: FEGEKICK
    es: PATADA GIRO
  descriptions:
    jp_kana: "からだを　かいてんさせ\nキックを　くりだして\nこうげきする。\nあいてを　ひるませる\nことが　ある。"
    en: "A quick kick from a\nrolling spin.\nIt may make the\nfoe flinch."
    fr: "Un coup de pied\ntournoyant et\nextrêmement rapide."
    it: "Un rapido calcio\ncon una rotazione.\nPuò far tentennare\nil nemico."
    de: "Schneller Tritt\naus der Drehung.\nGegner schreckt\nevtl. zurück."
    es: "Una patada rápida\ny circular."
rollout:
  names:
    jp_kana: ころがる
    en: ROLLOUT
    fr: ROULADE
    it: ROTOLAMENTO
    de: WALZER
    es: DESENROLLAR
  descriptions:
    jp_kana: "５ターンの　あいだ\nあいてに　ころがって\nこうげきする。\nあてる　たびに\nダメージが　ふえる。"
    en: "A 5-turn rolling\nattack that becomes\nstronger each time\nit hits."
    fr: "Une attaque sur\n5 tours, de plus en\nplus puissante."
    it: "Dura 5 turni, con\nintensità crescente."
    de: "Attacke, die 5\nRunden dauert.\nDie Härte nimmt\nzu."
    es: "Ataque de 5 turnos,\ncon fuerza cada\nvez mayor."
sacred_fire:
  names:
    jp_kana: せいなるほのお
    en: SACRED FIRE
    fr: FEU SACRE
    it: MAGIFUOCO
    de: LÄUTERFEUER
    es: FUEGOSAGRADO
  descriptions:
    jp_kana: "しんぴの　ほのおで\nあいてを　やきつくして\nこうげきする。\nやけど　じょうたいに\nすることが　ある。"
    en: "A mystical and\npowerful fire\nattack that may\ninflict a burn."
    fr: "Une attaque de feu\npuissante et\nmystique\npouvant brûler."
    it: "Fuoco magico\nche può causare\nuna scottatura."
    de: "Mystische Feuer-\nAttacke, die den\nGegner evtl.\nverbrennt."
    es: "Fuego místico que\npuede causar\nquemaduras."
safeguard:
  names:
    jp_kana: しんぴのまもり
    en: SAFEGUARD
    fr: RUNE PROTECT
    it: SALVAGUARDIA
    de: BODYGUARD
    es: VELO SAGRADO
  descriptions:
    jp_kana: "５ターンの　あいだ\nみかたは　ふしぎな\nちからで　まもられて\nじょうたい　いじょうに\nならなくなる。"
    en: "It protects the\nuser’s party from\nall status problems\nfor five turns."
    fr: "Force mystique\nempêchant tout\nchangement de\nstatut."
    it: "Protegge la\nsquadra da problemi\ndi stato per\n5 turni."
    de: "Team d. Anwenders\nist 5 Runden vor\nStatusproblemen\ngeschützt."
    es: "Fuerza mística\nque evita\nproblemas\nde estado."
sand_attack:
  names:
    jp_kana: すなかけ
    en: SAND-ATTACK
    fr: JET DE SABLE
    it: TURBOSABBIA
    de: SANDWIRBEL
    es: ATAQUE ARENA
  descriptions:
    jp_kana: "たいりょうの　すなを\nかおに　かけ　めを\nくらまして　あいての\nめいちゅうを　さげる。"
    en: "A lot of sand is\nhurled in the foe’s\nface, reducing its\naccuracy."
    fr: "Lance du sable et\nbaisse la précision\nde l’ennemi."
    it: "Riduce la\nprecisione del\nnemico sollevando\nsabbia."
    de: "Senkt Genauigkeit\ndes Gegners\ndurch Sand."
    es: "Arroja arena\na la cara y baja\nla PRECISIÓN."
sand_tomb:
  names:
    jp_kana: すなじごく
    en: SAND TOMB
    fr: TOURBI-SABLE
    it: SABBIOTOMBA
    de: SANDGRAB
    es: BUCLE ARENA
  descriptions:
    jp_kana: "はげしく　ふきあれる\nすなあらしの　なかに\n２ー５ターンの　あいだ\nあいてを　とじこめ\nこうげきする。"
    en: "The foe is trapped\ninside a painful\nsandstorm for two\nto five turns."
    fr: "Piège l’ennemi dans\nun cyclone de\n2 à 5 tours."
    it: "Un vortice\ndanneggia il nemico\nda 2 a 5 turni."
    de: "Gegner leidet für\n2 - 5 Runden in\nSandhose."
    es: "Enreda en un\nremolino de arena\nde 2 a 5 turnos."
sandstorm:
  names:
    jp_kana: すなあらし
    en: SANDSTORM
    fr: TEMPETESABLE
    it: TERREMPESTA
    de: SANDSTURM
    es: TORM. ARENA
  descriptions:
    jp_kana: "５ターンの　あいだ\nすなを　まきあげ　いわ\nじめん　はがねタイプ\nいがいの　ポケモンに\nダメージを　あたえる。"
    en: "A 5-turn sandstorm\nthat damages all\ntypes except ROCK,\nGROUND, and STEEL."
    fr: "Une tempête de\nsable qui souffle\npendant 5 tours."
    it: "Tempesta di sabbia\nper 5 turni. TERRA,\nROCCIA e ACCIAIO\nne sono immuni."
    de: "Sandsturm für 5\nRunden. Kein Ef-\nfekt bei GESTEIN,\nBODEN und STAHL."
    es: "Tormenta de arena\nque dura varios\nturnos."
scary_face:
  names:
    jp_kana: こわいかお
    en: SCARY FACE
    fr: GRIMACE
    it: VISOTRUCE
    de: GRIMASSE
    es: CARA SUSTO
  descriptions:
    jp_kana: "みぶるい　するような\nおそろしい　かおで\nにらみ　おびえさせて\nあいての　すばやさを\nガクッと　さげる。"
    en: "Frightens the foe\nwith a scary face\nto sharply reduce\nits SPEED."
    fr: "Effraye avec une\ngrimace pour\nbaisser beaucoup\nla VITESSE."
    it: "Sguardo che riduce\ndi molto la\nVELOCITÀ del\nnemico."
    de: "Erschreckt Gegner\nmit einer Grimasse. \nDer INIT.-Wert\nsinkt deutlich."
    es: "Asusta al enemigo\npara bajarle\nVELOCIDAD."
scratch:
  names:
    jp_kana: ひっかく
    en: SCRATCH
    fr: GRIFFE
    it: GRAFFIO
    de: KRATZER
    es: ARAÑAZO
  descriptions:
    jp_kana: "かたくて　とがった\nするどい　ツメで\nあいてを　ひっかいて\nこうげきする。"
    en: "Hard, pointed, and\nsharp claws rake\nthe foe."
    fr: "Lacère l’ennemi\navec des griffes\nacérées."
    it: "Graffia il nemico\ncon artigli\naffilati."
    de: "Der Gegner wird\nmit scharfen\nKlauen zerkratzt."
    es: "Araña con afiladas\ngarras."
screech:
  names:
    jp_kana: いやなおと
    en: SCREECH
    fr: GRINCEMENT
    it: STRIDIO
    de: KREIDESCHREI
    es: CHIRRIDO
  descriptions:
    jp_kana: "おもわず　みみを\nふさぎたく　なるような\nいやな　おとを　だして\nあいての　ぼうぎょを\nガクッと　さげる。"
    en: "An ear-splitting\nscreech is emitted\nto sharply reduce\nthe foe’s DEFENSE."
    fr: "Cri strident qui\nbaisse beaucoup\nla DEFENSE\nennemie."
    it: "Stridio che riduce\ndi molto  la\nDIFESA del\nnemico."
    de: "Stößt einen Schrei\naus, um\ngegnerische\nVERT. zu senken."
    es: "Ruido agudo que\nbaja mucho\nla DEFENSA\ndel rival."
secret_power:
  names:
    jp_kana: ひみつのちから
    en: SECRET POWER
    fr: FORCE CACHEE
    it: FORZASEGRETA
    de: GEHEIMPOWER
    es: DAÑO SECRETO
  descriptions:
    jp_kana: "ひみつの　ちからで\nこうげきする。\nつかう　ばしょで\nついかの　こうかが\nへんかする。"
    en: "An attack that may\nhave an additional\neffect that varies\nwith the terrain."
    fr: "Les effets de\nl’attaque\ndépendent du lieu."
    it: "L’effetto varia\nsecondo il\nluogo."
    de: "Angriff, der ab-\nhängig vom Ort\nnoch einen\nZusatzeffekt hat."
    es: "Los efectos de este\nataque varían\nsegún la zona."
seismic_toss:
  names:
    jp_kana: ちきゅうなげ
    en: SEISMIC TOSS
    fr: FRAPPE ATLAS
    it: MOV. SISMICO
    de: GEOWURF
    es: MOV. SÍSMICO
  descriptions:
    jp_kana: "いんりょくを　つかって\nあいてを　なげとばして\nじぶんの　レベルと\nおなじ　だけの\nダメージを　あたえる。"
    en: "A gravity-fed throw\nthat causes damage\nmatching the user’s\nlevel."
    fr: "Inflige des dégâts\nselon le niveau\ndu lanceur."
    it: "Infligge un danno\npari al livello di\nchi la usa."
    de: "Richtet Schaden\ngemäß Level des\nAngreifers an."
    es: "Se restarán tantos\nPS como nivel tenga\nel agresor."
self_destruct:
  names:
    jp_kana: じばく
    en: SELFDESTRUCT
    fr: DESTRUCTION
    it: AUTODISTRUZ.
    de: FINALE
    es: AUTODESTRUC
  descriptions:
    jp_kana: "じぶんで　ばくはつして\nあいてを　まきこんで\nこうげきする。\nつかった　あとに\nじぶんは　たおれる。"
    en: "The user blows up\nto inflict severe\ndamage, even\nmaking itself faint."
    fr: "Inflige de sérieux\ndégâts, mais met le\nlanceur KO."
    it: "Infligge un forte\ndanno, ma\nchi la usa va KO."
    de: "Anwender sprengt\nsich, richtet Rie-\nsenschaden an und\nwird dabei besiegt."
    es: "Potente, pero hace\nque te debilites."
shadow_ball:
  names:
    jp_kana: シャドーボール
    en: SHADOW BALL
    fr: BALL’OMBRE
    it: PALLA OMBRA
    de: SPUKBALL
    es: BOLA SOMBRA
  descriptions:
    jp_kana: "くろい　かげの\nかたまりを　なげつけて\nこうげきする。\nあいての　とくぼうを\nさげることが　ある。"
    en: "A shadowy blob is\nhurled at the foe.\nMay also lower the\nfoe’s SP. DEF."
    fr: "Projette une\ngrande tache\nqui peut baisser\nla DEF. SPE."
    it: "Sfera nera che può\nridurre la DIFESA\nSPECIALE del\nnemico."
    de: "Bewirft Gegner mit\ngruseligem Ball\nund senkt evtl.\ndie SP. VER."
    es: "Lanza una bola\nnegra que puede\nbajar la DEF. ESP."
shadow_punch:
  names:
    jp_kana: シャドーパンチ
    en: SHADOW PUNCH
    fr: POING OMBRE
    it: PUGNODOMBRA
    de: FINSTERFAUST
    es: PUÑO SOMBRA
  descriptions:
    jp_kana: "かげに　まぎれて\nパンチを　くりだして\nこうげきする。\nあいては　ぜったいに\nよけられない。"
    en: "The user throws a\npunch from the\nshadows. It cannot\nbe evaded."
    fr: "Un coup de poing\nimparable\nsortant de l’ombre."
    it: "Pugno inevitabile,\nche proviene dalle\ntenebre."
    de: "Angriff mit der\nFaust aus dem\nSchattenreich. Aus-\nweichen unmöglich."
    es: "Puñetazo ineludible\nprocedente de las\nsombras."
sharpen:
  names:
    jp_kana: かくばる
    en: SHARPEN
    fr: AFFUTAGE
    it: AFFILATORE
    de: SCHÄRFER
    es: AFILAR
  descriptions:
    jp_kana: "からだの　かどを\nふやし　カクカクに\nなって　じぶんの\nこうげきを　あげる。"
    en: "The user reduces\nits polygon count\nto sharpen edges\nand raise ATTACK."
    fr: "Réduit le nombre\nde polygones\net augmente\nl’ATTAQUE."
    it: "Riduce le dimensioni\ndi chi la usa per\naumentarne\nl’ATTACCO."
    de: "Anwender senkt die\nPolygonzahl, um\nKanten zu schärfen\nund erhöht ANGR."
    es: "Mejora el ATAQUE\nde quien lo usa."
sheer_cold:
  names:
    jp_kana: ぜったいれいど
    en: SHEER COLD
    fr: GLACIATION
    it: PUROGELO
    de: EISESKÄLTE
    es: FRÍO POLAR
  descriptions:
    jp_kana: "きょくげんの　さむさを\nあいてに　あたえて\nこうげきする。\nあたれば　いちげきで\nあいては　たおれる。"
    en: "The foe is attacked\nwith ultimate cold\nthat causes fainting\nif it hits."
    fr: "Attaque glacée qui\nmet KO quand elle\nest réussie."
    it: "Attacco gelido che,\nse va a segno, fa\nandare KO."
    de: "Angriff mit Kälte,\ndie den Gegner\nbei Erfolg besiegt."
    es: "Ataque polar\nque debilita\nal rival si le\nalcanza."
shock_wave:
  names:
    jp_kana: でんげきは
    en: SHOCK WAVE
    fr: ONDE DE CHOC
    it: ONDASHOCK
    de: SCHOCKWELLE
    es: ONDA VOLTIO
  descriptions:
    jp_kana: "すばやい　でんげきを\nあいてに　はっしゃして\nこうげきする。\nあいては　ぜったいに\nよけられない。"
    en: "A rapid jolt of\nelectricity strikes\nthe foe. It can’t\nbe evaded."
    fr: "Attaque électrique\nrapide et\nimpossible à\nesquiver."
    it: "Rapido ed\ninevitabile attacco\nelettrico."
    de: "Angriff mit schnel-\nlem Elektro-Schlag.\nAusweichen nicht\nmöglich."
    es: "Ataque eléctrico\nmuy rápido\ne ineludible."
signal_beam:
  names:
    jp_kana: シグナルビーム
    en: SIGNAL BEAM
    fr: RAYON SIGNAL
    it: SEGNORAGGIO
    de: AMPELLEUCHTE
    es: DOBLE RAYO
  descriptions:
    jp_kana: "てんめつする　ひかりを\nあいてに　はっしゃして\nこうげきする。\nこんらん　じょうたいに\nすることが　ある。"
    en: "The foe is hit with\na flashing beam\nthat may also\ncause confusion."
    fr: "Un étrange rayon\nqui peut rendre\nl’ennemi confus."
    it: "Strano raggio che\npuò confondere il\nnemico."
    de: "Strahlenattacke,\ndie den Gegner\nevtl. verwirrt."
    es: "Extraño ataque\ncon rayo.\nPuede causar\nconfusión."
silver_wind:
  names:
    jp_kana: ぎんいろのかぜ
    en: SILVER WIND
    fr: VENT ARGENTE
    it: VENTARGENTEO
    de: SILBERHAUCH
    es: VIENTO PLATA
  descriptions:
    jp_kana: "ぎんいろの　りんぷんで\nこうげきする。\nどうじに　じぶんの\nすべての　のうりょくが\nあがることが　ある。"
    en: "The foe is attacked\nwith a silver dust.\nIt may raise all\nthe user’s stats."
    fr: "Attaque poudreuse\nqui peut augmenter\nles capacités du\nlanceur."
    it: "Polvere che può\nfar salire le\nstatistiche."
    de: "Angriff mit Silber-\nstaub. Evtl. werden\nalle Statuswerte d.\nAnwenders erhöht."
    es: "Partículas de plata\nque quizá suban\nlas habilidades."
sing:
  names:
    jp_kana: うたう
    en: SING
    fr: BERCEUSE
    it: CANTO
    de: GESANG
    es: CANTO
  descriptions:
    jp_kana: "こころの　やすらぐ\nここちよい　きれいな\nうたごえを　きかせて\nあいてを　ねむりの\nじょうたいに　する。"
    en: "A soothing song\nin a calming voice\nlulls the foe into\na deep slumber."
    fr: "Berceuse plongeant\nl’ennemi dans un\nprofond sommeil."
    it: "Una dolce canzone\ncostringe il nemico\nad addormentarsi."
    de: "Ein Lied, das den\nGegner in tiefen\nSchlaf versetzt."
    es: "Cancioncilla que\npuede dormir al\nenemigo."
sketch:
  names:
    jp_kana: スケッチ
    en: SKETCH
    fr: GRIBOUILLE
    it: SCHIZZO
    de: NACHAHMER
    es: ESQUEMA
  descriptions:
    jp_kana: "あいてが　つかった\nわざを　じぶんの\nものに　する。\n１かい　つかうと\nスケッチは　なくなる。"
    en: "This move copies\nthe move last used\nby the foe, then\ndisappears."
    fr: "Copie en\npermanence la\ndernière attaque\nennemie."
    it: "Copia l’ultima\nmossa usata\ndal nemico."
    de: "Kopiert stets\nden zuletzt\nerlittenen\ngegn. Angriff."
    es: "Copia siempre\nel último ataque\ndel rival."
skill_swap:
  names:
    jp_kana: スキルスワップ
    en: SKILL SWAP
    fr: ECHANGE
    it: BARATTO
    de: WERTEWECHSEL
    es: INTERCAMBIO
  descriptions:
    jp_kana: "ちょうのうりょくで\nじぶんの　とくせいと\nあいての　とくせいを\nいれかえる。"
    en: "The user employs\nits psychic power\nto swap abilities\nwith the foe."
    fr: "Le lanceur et la\ncible échangent\nleur capacité\nspéciale."
    it: "Chi la usa scambia\nl’abilità speciale."
    de: "Anwender tauscht\nSpezialfähigkeit mit\ngegnerischem\nPOKéMON."
    es: "Intercambia la\nhabilidad especial\ncon otro POKéMON."
skull_bash:
  names:
    jp_kana: ロケットずつき
    en: SKULL BASH
    fr: COUD’KRANE
    it: CAPOCCIATA
    de: SCHÄDELWUMME
    es: CABEZAZO
  descriptions:
    jp_kana: "あたまを　ひっこめて\n２ターンめに　あいてを\nこうげきする。\n１ターンめは　じぶんの\nぼうぎょが　あがる。"
    en: "The user raises its\nDEFENSE in the 1st\nturn, then attacks\nin the 2nd turn."
    fr: "Monte la DEFENSE\nau 1ᵉʳ tour\net frappe au 2ᵉ."
    it: "Chi la usa aumenta\nla DIFESA e\nattacca dopo un\nturno."
    de: "In Runde 1 wird\ndie VERT. erhöht\nund in Runde 2\nangegriffen."
    es: "1.ᵉʳ turno: se\nprepara.\n2.º: da\nel cabezazo."
sky_attack:
  names:
    jp_kana: ゴッドバード
    en: SKY ATTACK
    fr: PIQUE
    it: AEROATTACCO
    de: HIMMELSFEGER
    es: ATAQUE AÉREO
  descriptions:
    jp_kana: "２ターンめに　あいてを\nこうげきする。\nひるませることが　あり\nきゅうしょに　あたる\nかくりつも　たかい。"
    en: "A 2nd-turn attack\nmove with a high\ncritical-hit ratio.\nThe foe may flinch."
    fr: "Attaque en 2 tours.\nTaux de critiques\nélevé. Peut\napeurer l’ennemi."
    it: "Trova punti deboli,\nper attaccare al\nturno seguente."
    de: "Angriff über 2\nRunden mit\nhoher Voll-\ntrefferquote."
    es: "1.º, busca punto\nflaco.\n2.º, va a por él."
sky_uppercut:
  names:
    jp_kana: スカイアッパー
    en: SKY UPPERCUT
    fr: STRATOPERCUT
    it: STRAMONTANTE
    de: HIMMELHIEB
    es: GANCHO ALTO
  descriptions:
    jp_kana: "そらに　むかうような\nものすごい　アッパーで\nあいてを　つきあげて\nこうげきする。"
    en: "The user attacks\nwith an uppercut\nthrown skywards\nwith force."
    fr: "Un uppercut porté\nen direction du\nciel."
    it: "Montante che sembra\nlanciare il nemico\nin cielo."
    de: "Kinnhaken, der den\nGegner gen\nHimmel schickt."
    es: "Gancho ascendente\nde gran ímpetu."
slack_off:
  names:
    jp_kana: なまける
    en: SLACK OFF
    fr: PARESSE
    it: PIGRO
    de: TAGEDIEB
    es: RELAJO
  descriptions:
    jp_kana: "なまけて　やすむことで\nじぶんの　ＨＰを\nさいだい　ＨＰの\nはんぶんだけ\nかいふくする。"
    en: "The user slacks off\nand restores its HP\nby half its full\nHP."
    fr: "Se détend et\nrécupère la moitié\ndes PV maximum."
    it: "Rilassamento:\nrestituisce\nmetà dei PS\nmassimi."
    de: "Durch Müßiggang\nwird die Hälfte der\nmax. KP aufgefüllt."
    es: "Te relaja y\nrestaura la\nmitad de los\nPS máximos."
slam:
  names:
    jp_kana: たたきつける
    en: SLAM
    fr: SOUPLESSE
    it: SCHIANTO
    de: SLAM
    es: PORTAZO
  descriptions:
    jp_kana: "ながい　しっぽや\nつるなどを　つかって\nあいてを　たたきつけて\nこうげきする。"
    en: "The foe is struck\nwith a long tail,\nvines, etc."
    fr: "Fouette l’ennemi\navec la queue, une\nliane, etc."
    it: "Un colpo inferto\ncon una coda,\nuna liana o simili."
    de: "Schlag mit einem\nlangen Schweif,\neiner Ranke o. Ä."
    es: "Golpea con las\nextremidades."
slash:
  names:
    jp_kana: きりさく
    en: SLASH
    fr: TRANCHE
    it: LACERAZIONE
    de: SCHLITZER
    es: CUCHILLADA
  descriptions:
    jp_kana: "ツメや　カマ　などで\nあいてを　ひっかいて\nこうげきする。\nきゅうしょに　あたる\nかくりつが　たかい。"
    en: "The foe is slashed\nwith claws, etc.\nIt has a high\ncritical-hit ratio."
    fr: "Coups de griffe,\netc. Taux de\ncritiques élevé."
    it: "Attacco di artigli\ne simili:\nprobabile brutto\ncolpo."
    de: "Hieb mit Klauen\noder Ähnlichem.\nHohe Volltreffer-\nquote."
    es: "Acuchilla con\npinzas, etc.\nSuele dar\nun golpe crítico."
sleep_powder:
  names:
    jp_kana: ねむりごな
    en: SLEEP POWDER
    fr: POUDRE DODO
    it: SONNIFERO
    de: SCHLAFPUDER
    es: SOMNÍFERO
  descriptions:
    jp_kana: "ねむくなる　こなを\nたくさん　ふりまいて\nあいてを　ねむりの\nじょうたいに　する。"
    en: "A sleep-inducing\ndust is scattered\nin high volume\naround a foe."
    fr: "Répand une poudre\npouvant endormir\nl’ennemi."
    it: "Polvere che può\nfar addormentare\nil nemico."
    de: "Verstreut Puder,\nder den Gegner\nevtl. in Schlaf\nversetzt."
    es: "Esparce polvo que\npuede dormir al\nenemigo."
sleep_talk:
  names:
    jp_kana: ねごと
    en: SLEEP TALK
    fr: BLABLA DODO
    it: SONNOLALIA
    de: SCHLAFREDE
    es: SONÁMBULO
  descriptions:
    jp_kana: "じぶんが　おぼえている\nわざの　うち　どれか\n１つを　くりだす。\nじぶんが　ねている\nときしか　つかえない。"
    en: "While asleep, the\nuser randomly uses\none of the moves it\nknows."
    fr: "Utilise un coup\nau hasard\nen dormant."
    it: "Chi la usa sfodera\nuno dei propri\nattacchi nel sonno."
    de: "Benutzt per Zufall\neine ihm bekannte\nAttacke im Schlaf."
    es: "Mientras duerme,\nusa un ataque\nelegido al azar."
sludge:
  names:
    jp_kana: ヘドロこうげき
    en: SLUDGE
    fr: DETRITUS
    it: FANGO
    de: SCHLAMMBAD
    es: RESIDUOS
  descriptions:
    jp_kana: "きたない　ヘドロを\nあいてに　なげつけて\nこうげきする。\nどく　じょうたいに\nすることが　ある。"
    en: "Toxic sludge is\nhurled at the foe.\nIt may poison the\ntarget."
    fr: "Blesse en envoyant\ndes détritus\ntoxiques. Peut\nempoisonner."
    it: "Lancio di fango che\narreca danno e può\navvelenare il\nnemico."
    de: "Wirft Schlamm auf\nGegner, der evtl.\nvergiftet wird."
    es: "Arroja residuos\nal rival. Puede\nllegar a envenenar."
sludge_bomb:
  names:
    jp_kana: ヘドロばくだん
    en: SLUDGE BOMB
    fr: BOMB-BEURK
    it: FANGOBOMBA
    de: MATSCHBOMBE
    es: BOMBA LODO
  descriptions:
    jp_kana: "きたない　ヘドロを\nあいてに　なげつけて\nこうげきする。\nどく　じょうたいに\nすることが　ある。"
    en: "Filthy sludge is\nhurled at the foe.\nIt may poison the\ntarget."
    fr: "Envoie des détritus\npour blesser.\nPeut empoisonner."
    it: "Lancio di fango che\narreca danno e può\navvelenare."
    de: "Gegner wird mit \ndreckigem Schlamm\nbeworfen,\nvergiftet ihn evtl."
    es: "Explosión de lodo\nque puede llegar\na envenenar."
smelling_salts:
  names:
    jp_kana: きつけ
    en: SMELLINGSALT
    fr: STIMULANT
    it: MANIEREFORTI
    de: RIECHSALZ
    es: ESTÍMULO
  descriptions:
    jp_kana: "まひ　じょうたいの\nあいてに　おおきな\nダメージを　あたえる。\nそのかわりに　あいての\nまひが　なおる。"
    en: "Doubly effective on\na paralyzed foe,\nbut it also cures\nthe foe’s paralysis."
    fr: "Doublement efficace\ncontre les ennemis\nparalysés, mais\nles soigne."
    it: "Forte contro nemici\nparalizzati, ma li\ncura."
    de: "Doppelt wirksam\ngegen paralysierte\nGegner, heilt sie\naber auch."
    es: "Afecta a rivales\nparalizados, pero\ntambién los cura."
smog:
  names:
    jp_kana: スモッグ
    en: SMOG
    fr: PUREDPOIS
    it: SMOG
    de: SMOG
    es: POLUCIÓN
  descriptions:
    jp_kana: "くさい　はいき　ガスを\nあいてに　ふきつけて\nこうげきする。\nどく　じょうたいに\nすることが　ある。"
    en: "The foe is attacked\nwith exhaust gases.\nIt may also poison\nthe foe."
    fr: "Un gaz nocif\npouvant empoisonner\nl’ennemi."
    it: "Gas di scarico che\npuò anche\navvelenare\nil nemico."
    de: "Angriff mit Gas.\nGegner wird \nevtl. vergiftet."
    es: "Gases de escape\nque pueden llegar\na envenenar."
smokescreen:
  names:
    jp_kana: えんまく
    en: SMOKESCREEN
    fr: BROUILLARD
    it: MURO DI FUMO
    de: RAUCHWOLKE
    es: PANTALLAHUMO
  descriptions:
    jp_kana: "かおに　おもいきり\nけむりや　スミなどを\nふきかけて　めを\nみえなくして　あいての\nめいちゅうを　さげる。"
    en: "An obscuring cloud\nof smoke or ink\nreduces the foe’s\naccuracy."
    fr: "Baisse la précision\nennemie en\nutilisant fumée,\nencre, etc."
    it: "Fumo o inchiostro\nriducono la\nprecisione del\nnemico."
    de: "Senkt Genauigkeit\ndes Gegners mit\nRauch, Tinte oder\nÄhnlichem."
    es: "Baja la PRECISIÓN\ndel enemigo con\nhumo, etc."
snatch:
  names:
    jp_kana: よこどり
    en: SNATCH
    fr: SAISIE
    it: SCIPPO
    de: ÜBERNAHME
    es: ROBO
  descriptions:
    jp_kana: "あいてが　つかうはずの\nかいふくの　わざや\nのうりょく　へんかの\nわざを　よこどりして\nじぶんに　つかう。"
    en: "Steals the effects\nof the foe’s\nhealing or status-\nchanging move."
    fr: "Vole les effets de\nchang. de statut\nde la prochaine\nattaque ennemie."
    it: "Ruba e utilizza una\nmossa che il\nnemico vuole usare."
    de: "Raubt den Effekt\nder gegn. heilenden\noder Status ver-\nändernden Attacke."
    es: "Roba el efecto\ndel ataque\nque el rival\nuse después."
snore:
  names:
    jp_kana: いびき
    en: SNORE
    fr: RONFLEMENT
    it: RUSSARE
    de: SCHNARCHER
    es: RONQUIDO
  descriptions:
    jp_kana: "いびきで　こうげきし\nあいてを　ひるませる\nことが　ある。\nじぶんが　ねている\nときしか　つかえない。"
    en: "An attack that can\nbe used only while\nasleep. It may\ncause flinching."
    fr: "Attaque sonore qui\nne peut être lancée\nqu’endormi."
    it: "Attacco rumoroso\nusato solo mentre\nsi dorme. Il nemico\npuò tentennare."
    de: "Attacke nur\nim Schlaf möglich.\nGegner schreckt\nevtl. zurück."
    es: "Fuerte ronquido\nque puede usarse\nestando dormido."
soft_boiled:
  names:
    jp_kana: タマゴうみ
    en: SOFTBOILED
    fr: E-COQUE
    it: COVAUOVA
    de: WEICHEI
    es: AMORTIGUADOR
  descriptions:
    jp_kana: "さいだい　ＨＰの\nはんぶんだけ　じぶんの\nＨＰを　かいふくする。\nＨＰを　なかまに\nわけることも　できる。"
    en: "Heals the user by\nup to half its full\nHP. It can be used\nto heal an ally."
    fr: "Restaure jusqu’à\nla moitié des PV\nmax. Utilisable sur\nun allié."
    it: "Chi la usa recupera\nfino a metà dei PS\nmassimi suoi o di un\ncompagno."
    de: "Max. KP d. Anwen-\nders werden halb\naufgefüllt. Team-\nheilung möglich."
    es: "Restaura hasta\nla mitad de tus PS\nmáximos."
solar_beam:
  names:
    jp_kana: ソーラービーム
    en: SOLARBEAM
    fr: LANCE-SOLEIL
    it: SOLARRAGGIO
    de: SOLARSTRAHL
    es: RAYO SOLAR
  descriptions:
    jp_kana: "１ターンめで　ひかりを\nきゅうしゅうして\n２ターンめで　あいてに\nほうしゅつ　して\nこうげきする。"
    en: "A 2-turn move that\nblasts the foe with\nabsorbed energy in\nthe 2nd turn."
    fr: "Absorbe la lumière\net attaque le tour\nsuivant."
    it: "Al primo turno\nassorbe energia\ne attacca nel\nsuccessivo."
    de: "Absorbiert Licht in\nder 1. Runde.\nIn Runde 2\nerfolgt der Angriff."
    es: "1.ᵉʳ turno: absorbe\nluz.\n2.º: ataca."
sonic_boom:
  names:
    jp_kana: ソニックブーム
    en: SONICBOOM
    fr: SONICBOOM
    it: SONICBOOM
    de: ULTRASCHALL
    es: BOMBA SÓNICA
  descriptions:
    jp_kana: "しょうげきはを\nあいてに　ぶつけて\nこうげきする。\n２０の　きまった\nダメージを　あたえる。"
    en: "The foe is hit with\na shock wave that\nalways inflicts 20-\nHP damage."
    fr: "Envoie des ondes\nde choc infligeant\n20 PV de dégâts."
    it: "Onde acustiche che\nfanno sempre un\ndanno di 20 PS."
    de: "Schockwellen, die\nstets 20 KP Scha-\nden anrichten,\nwerden ausgestoßen."
    es: "Lanza ondas de\nchoque que restan\n20 PS."
spark:
  names:
    jp_kana: スパーク
    en: SPARK
    fr: ETINCELLE
    it: SCINTILLA
    de: FUNKENSPRUNG
    es: CHISPA
  descriptions:
    jp_kana: "でんきを　まとい\nあいてに　とっしんして\nこうげきする。\nまひ　じょうたいに\nすることが　ある。"
    en: "An electrically\ncharged tackle that\nmay also paralyze\nthe foe."
    fr: "Une charge\nélectrique qui peut\nparalyser l’ennemi."
    it: "Attacco elettrico\nche può\nparalizzare il\nnemico."
    de: "Elektro-Hieb, der\nden Gegner\nparalysieren kann."
    es: "Ataque eléctrico\nque puede\nllegar a paralizar."
spider_web:
  names:
    jp_kana: クモのす
    en: SPIDER WEB
    fr: TOILE
    it: RAGNATELA
    de: SPINNENNETZ
    es: TELARAÑA
  descriptions:
    jp_kana: "ネバネバした　ほそい\nいとを　グルグルと\nあしなどに　からませて\nあいてを　せんとうから\nにげられなく　する。"
    en: "Ensnares the foe \nwith sticky string\nso it doesn’t flee\nor switch out."
    fr: "Capture l’ennemi\net empêche\ntoute fuite ou\nchangement."
    it: "Il nemico non può\nfuggire né essere\nsostituito."
    de: "Wickelt Gegner\nein. Flucht oder\nTausch unmöglich."
    es: "Enreda al rival\npara evitar que\nhuya o pida\nel relevo."
spike_cannon:
  names:
    jp_kana: とげキャノン
    en: SPIKE CANNON
    fr: PICANON
    it: SPARALANCE
    de: DORNKANONE
    es: CLAVO CAÑÓN
  descriptions:
    jp_kana: "するどい　ハリを\nあいてに　はっしゃして\nこうげきする。\n２ー５かい　れんぞくで\nダメージを　あたえる。"
    en: "Sharp spikes are\nfired at the foe to\nstrike two to five\ntimes."
    fr: "Lance des pointes\nqui frappent\n2 à 5 fois."
    it: "Lance acuminate\ncolpiscono il\nnemico da 2 a 5\nvolte."
    de: "Verschießt spitze\nStacheln auf den\nGegner, die\n2 - 5-mal treffen."
    es: "Lanza finas púas\nque hieren de 2\na 5 veces."
spikes:
  names:
    jp_kana: まきびし
    en: SPIKES
    fr: PICOTS
    it: PUNTE
    de: STACHLER
    es: PÚAS
  descriptions:
    jp_kana: "てきの　あしもとに\nまきびしの　わなを\nしかけ　こうたいで\nでてきた　ポケモンに\nダメージを　あたえる。"
    en: "A trap of spikes is\nlaid around the\nfoe’s party to hurt\nfoes switching in."
    fr: "Pointes pour\npiéger les ennemis\nqui échangent leur\nplace."
    it: "Punte che\ndanneggiano il\nnemico se\nsostituito."
    de: "Richtet bei Tausch\nSchaden mit\nStacheln an."
    es: "Riega púas que\nhieren si el rival\npide el relevo."
spit_up:
  names:
    jp_kana: はきだす
    en: SPIT UP
    fr: RELACHE
    it: SFOGHENERGIA
    de: ENTFESSLER
    es: ESCUPIR
  descriptions:
    jp_kana: "たくわえた　ちからを\nあいてに　ぶつけて\nこうげきする。\nたくわえて　いるほど\nダメージが　おおきい。"
    en: "The power built\nusing STOCKPILE is\nreleased at once\nfor attack."
    fr: "Libère la puissance\nprécédemment\naccumulée avec\nSTOCKAGE."
    it: "L’effetto dipende\ndall’energia prima\nimmagazzinata\ncon ACCUMULO."
    de: "Entlädt die Kraft,\ndie während Ein-\nsatz von HORTER\ngesammelt wurde."
    es: "Libera energía\nacumulada.\nCuanta más, mejor."
spite:
  names:
    jp_kana: うらみ
    en: SPITE
    fr: DEPIT
    it: DISPETTO
    de: GROLL
    es: RENCOR
  descriptions:
    jp_kana: "あいてが　さいごに\nつかった　わざに\nうらみを　いだいて\nその　わざの　ＰＰを\n２ー５だけ　へらす。"
    en: "A move that cuts\n2 to 5 PP from the\nmove last used by\nthe foe."
    fr: "Réduit de 2 à 5 \nles PP de la\ndernière attaque\nennemie."
    it: "Toglie da 2 a 5\nPP all’ultima \nmossa del\nnemico."
    de: "AP des letzten\ngegnerischen\nAngriffs werden\num 2 - 5 gesenkt."
    es: "Baja con rencor\nPP del último\nataque recibido."
splash:
  names:
    jp_kana: はねる
    en: SPLASH
    fr: TREMPETTE
    it: SPLASH
    de: PLATSCHER
    es: SALPICADURA
  descriptions:
    jp_kana: "こうげきも　せずに\nピョン　ピョンと\nそのばで　はねるだけで\nなにも　おこらない。"
    en: "The user just flops\nand splashes around\nwithout having any\neffect."
    fr: "Eclabousse l’ennemi\nsans aucun effet."
    it: "Semplice spruzzo,\nprivo di qualsiasi\nefficacia."
    de: "Nur ein Platscher, \nder überhaupt\nnichts bewirkt."
    es: "No tiene ningún\nefecto.\nSólo salpica."
spore:
  names:
    jp_kana: キノコのほうし
    en: SPORE
    fr: SPORE
    it: SPORA
    de: PILZSPORE
    es: ESPORA
  descriptions:
    jp_kana: "さいみん　こうかのある\nこまかい　ほうしを\nパラパラと　ふりまいて\nあいてを　ねむりの\nじょうたいに　する。"
    en: "The user scatters\nbursts of fine\nspores that induce\nsleep."
    fr: "Répand un nuage\nde spores qui\nendort."
    it: "Nube di spore che\nfa sempre\naddormentare\nil nemico."
    de: "Erzeugt eine Wolke\naus einschläfernden\nSporen."
    es: "Esparce esporas\nque inducen\nal sueño."
steel_wing:
  names:
    jp_kana: はがねのつばさ
    en: STEEL WING
    fr: AILE D’ACIER
    it: ALACCIAIO
    de: STAHLFLÜGEL
    es: ALA DE ACERO
  descriptions:
    jp_kana: "こうてつの　つばさを\nあいてに　たたきつけて\nこうげきする。\nじぶんの　ぼうぎょが\nあがることが　ある。"
    en: "The foe is hit with\nwings of steel.\nIt may also raise\nthe user’s DEFENSE."
    fr: "Frappe l’ennemi en \ndéployant ses ailes\nd’acier. Peut\nmonter la DEFENSE."
    it: "Colpo con forti\nali spiegate. Può\naumentare DIFESA\ndi chi la usa."
    de: "Trifft den Gegner\nmit Stahlflügeln.\nAnwenders VERT.\nsteigt evtl."
    es: "Alas rígidas que\ngolpean al rival."
stockpile:
  names:
    jp_kana: たくわえる
    en: STOCKPILE
    fr: STOCKAGE
    it: ACCUMULO
    de: HORTER
    es: RESERVA
  descriptions:
    jp_kana: "じぶんに　ちからを\nたくわえて　いく。\nさいだい　３かいまで\nたくわえられる。"
    en: "The user charges\nup power for use\nlater. It can be\nused three times."
    fr: "Accumule de la\npuissance pendant\n3 tours maximum."
    it: "Accumula energia\nda usare più tardi.\nSi può utilizzare\ntre volte."
    de: "Lädt Kraft für\nspäter auf. Kann\nbis zu 3-mal einge-\nsetzt werden."
    es: "Recarga energía\nhasta 3 veces."
stomp:
  names:
    jp_kana: ふみつけ
    en: STOMP
    fr: ECRASEMENT
    it: PESTONE
    de: STAMPFER
    es: PISOTÓN
  descriptions:
    jp_kana: "おおきな　あしで\nあいてを　ふみつけて\nこうげきする。\nあいてを　ひるませる\nことが　ある。"
    en: "The foe is stomped\nwith a big foot.\nIt may make the\nfoe flinch."
    fr: "Ecrase avec un\nénorme pied. Peut\napeurer l’ennemi."
    it: "Un grosso piede\ncolpisce il nemico,\nche può tentennare."
    de: "Stampfen mit dem\nFuß. Gegner\nschreckt evtl.\nzurück."
    es: "Tremendo pisotón\nque puede causar\nretroceso."
strength:
  names:
    jp_kana: かいりき
    en: STRENGTH
    fr: FORCE
    it: FORZA
    de: STÄRKE
    es: FUERZA
  descriptions:
    jp_kana: "こんしんの　ちからで\nあいてを　なぐりつけて\nこうげきする。\nおもい　いわを\nおすことも　できる。"
    en: "The foe is slugged\nat maximum power.\nCan also be used\nto move boulders."
    fr: "Accumule de la\npuissance,\npuis frappe\nl’ennemi."
    it: "Colpisce con la\nmassima energia.\nSi usa anche per\nspostare i massi."
    de: "Gegner wird extrem\nstark getroffen. \nVerschieben von\nFelsen möglich."
    es: "Potente ataque\nfísico. Fuera de\ncombate sirve para\nmover piedras."
string_shot:
  names:
    jp_kana: いとをはく
    en: STRING SHOT
    fr: SECRETION
    it: MILLEBAVE
    de: FADENSCHUSS
    es: DISP. DEMORA
  descriptions:
    jp_kana: "くちから　ふきだした\nたくさんの　いとを\nまきつけ　てきの\nすばやさを　さげる。"
    en: "The foe is bound\nwith strings shot\nfrom the mouth to\nreduce its SPEED."
    fr: "Ligote l’ennemi\nafin de réduire\nsa VITESSE."
    it: "Fili avvolgono il\nnemico riducendone\nla VELOCITÀ."
    de: "Umwickelt Gegner\nmit Faden aus\ndem Mund und\nsenkt INIT.-Wert."
    es: "Baja la VELOCIDAD\ndel enemigo."
struggle:
  names:
    jp_kana: わるあがき
    en: STRUGGLE
    fr: LUTTE
    it: SCONTRO
    de: VERZWEIFLER
    es: COMBATE
  descriptions:
    jp_kana: "ＰＰが　なくなると\nあがいて　あいてを\nこうげきする。\nじぶんも　すこし\nダメージを　うける。"
    en: "An attack that is\nused only if there\nis no PP. It also\nhurts the user."
    fr: "Fonctionne s’il ne\nreste plus de PP.\nBlesse légèrement\nle lanceur."
    it: "Agisce solo a PP\nazzerati e\ndanneggia\nanche chi la usa."
    de: "Einsatz nur bei\nverbrauchten AP.\nAnwender verletzt\nsich selbst."
    es: "Sólo se usa al\nacabarse los PP.\nTe hiere un poco."
stun_spore:
  names:
    jp_kana: しびれごな
    en: STUN SPORE
    fr: PARA-SPORE
    it: PARALIZZANTE
    de: STACHELSPORE
    es: PARALIZADOR
  descriptions:
    jp_kana: "しびれる　こなを\nたくさん　ふりまいて\nあいてを　まひの\nじょうたいに　する。"
    en: "Paralyzing dust is\nscattered wildly.\nIt may paralyze\nthe foe."
    fr: "Répand une poudre\npouvant paralyser\nl’ennemi."
    it: "Polvere che può\nparalizzare\nil nemico."
    de: "Verstreut Puder,\nder den\nGegner evtl.\nparalysiert."
    es: "Esparce polvo que\npuede paralizar\nal enemigo."
submission:
  names:
    jp_kana: じごくぐるま
    en: SUBMISSION
    fr: SACRIFICE
    it: SOTTOMISS.
    de: ÜBERROLLER
    es: SUMISIÓN
  descriptions:
    jp_kana: "じめんに　じぶんごと\nあいてを　なげつけて\nこうげきする。\nじぶんも　すこし\nダメージを　うける。"
    en: "A reckless, full-\nbody throw attack\nthat also hurts the\nuser a little."
    fr: "Une charge\nviolente qui\nblesse aussi\nle lanceur."
    it: "Carica spericolata\nche danneggia\nanche chi la fa."
    de: "Harte Körperat-\ntacke, bei der sich\nder Angreifer\nselbst verletzt."
    es: "Golpe desmedido\nque también hiere\nal agresor."
substitute:
  names:
    jp_kana: みがわり
    en: SUBSTITUTE
    fr: CLONAGE
    it: SOSTITUTO
    de: DELEGATOR
    es: SUSTITUTO
  descriptions:
    jp_kana: "じぶんの　ＨＰを\nいくらか　けずって\nぶんしんを　だす。\nぶんしんは　じぶんの\nみがわりに　なる。"
    en: "The user creates a\ndecoy using one-\nquarter of its full\nHP."
    fr: "Crée un leurre\navec 1/4 des PV\nmax du lanceur."
    it: "Crea un’esca con\n1/4 dei PS massimi\ndi chi la usa."
    de: "Lockvogel, der 1/4\nder max. KP des\nAnwenders besitzt."
    es: "Crea un señuelo\ncon 1/4 de tus\nPS máximos."
sunny_day:
  names:
    jp_kana: にほんばれ
    en: SUNNY DAY
    fr: ZENITH
    it: GIORNODISOLE
    de: SONNENTAG
    es: DÍA SOLEADO
  descriptions:
    jp_kana: "５ターンの　あいだ\nひざしを　つよくして\nほのおタイプの\nわざの　ダメージを\nおおきくする。"
    en: "The sun blazes for\nfive turns, powering\nup FIRE-type\nmoves."
    fr: "Améliore les\nattaques FEU\npendant 5 tours."
    it: "Aumenta l’effetto\ndelle mosse\nFUOCO per 5 turni."
    de: "Erhöht Stärke\nvon FEUER-\nAttacken 5\nRunden lang."
    es: "Sube los ataques\nde tipo FUEGO\ndurante 5 turnos."
super_fang:
  names:
    jp_kana: いかりのまえば
    en: SUPER FANG
    fr: CROC FATAL
    it: SUPERZANNA
    de: SUPERZAHN
    es: SUPERDIENTE
  descriptions:
    jp_kana: "するどい　まえばで\nつよく　かみついて\nこうげきする。\nあいての　ＨＰを\nはんぶんに　する。"
    en: "The user attacks\nwith sharp fangs\nand halves the\nfoe’s HP."
    fr: "Coup de croc qui\nfait baisser les\nPV de moitié."
    it: "Denti affilati\nabbattono metà dei\nPS del nemico."
    de: "Greift mit scharfen\nReißzähnen an.\nGegnerische KP\nwerden halbiert."
    es: "Finos colmillos\nque bajan a la\nmitad los PS\ndel rival."
superpower:
  names:
    jp_kana: ばかぢから
    en: SUPERPOWER
    fr: SURPUISSANCE
    it: TROPPOFORTE
    de: KRAFTKOLOSS
    es: FUERZA BRUTA
  descriptions:
    jp_kana: "すごい　ちからを\nはっきして　あいてを\nこうげきする。\nじぶんの　こうげきと\nぼうぎょが　さがる。"
    en: "A powerful attack,\nbut it also lowers\nthe user’s ATTACK\nand DEFENSE stats."
    fr: "Attaque puissante\nmais baisse les\nstats d’ATTAQUE\net DEFENSE."
    it: "Mossa potente, ma\npeggiora ATTACCO\ne DIFESA di chi la\nusa."
    de: "Starker Angriff, der\nsowohl ANGR. als\nauch VERT. des\nAnwenders senkt."
    es: "Aumenta mucho\nla fuerza, pero las\nhabilidades bajan."
supersonic:
  names:
    jp_kana: ちょうおんぱ
    en: SUPERSONIC
    fr: ULTRASON
    it: SUPERSUONO
    de: SUPERSCHALL
    es: SUPERSÓNICO
  descriptions:
    jp_kana: "とくしゅな　おんぱを\nからだから　はっして\nあいてを　こんらんの\nじょうたいに　する。"
    en: "The user generates\nodd sound waves.\nIt may confuse the\nfoe."
    fr: "Etranges ondes\nsonores pouvant\nrendre confus."
    it: "Strane onde\nacustiche\nconfondono il\nnemico."
    de: "Ausstoß bizarrer\nSchallwellen.\nDer Gegner wird\nevtl. verwirrt."
    es: "Raras ondas sónicas\nque pueden\nconfundir."
surf:
  names:
    jp_kana: なみのり
    en: SURF
    fr: SURF
    it: SURF
    de: SURFER
    es: SURF
  descriptions:
    jp_kana: "おこした　なみを\nてきに　たたきつけて\nこうげきする。\nみずの　うえを\nすすむことも　できる。"
    en: "A big wave crashes\ndown on the foe.\nCan also be used\nfor crossing water."
    fr: "Crée une énorme\nvague qui\ns’écrase sur\nl’ennemi."
    it: "Un’onda enorme\nsul nemico. Si usa\nper spostarsi\nsull’acqua."
    de: "Eine Welle bricht\nüber den Gegner\nherein. Surfen\ndamit möglich."
    es: "Lanza una gran ola\nal rival.\nFuera de combate\nsirve para nadar."
swagger:
  names:
    jp_kana: いばる
    en: SWAGGER
    fr: VANTARDISE
    it: BULLO
    de: ANGEBEREI
    es: CONTONEO
  descriptions:
    jp_kana: "あいてを　おこらせて\nこんらん　じょうたいに\nするが　そのかわり\nこうげきも　グーンと\nあげて　しまう。"
    en: "A move that makes\nthe foe confused,\nbut also sharply\nraises its ATTACK."
    fr: "Rend l’ennemi\nconfus et\nbooste l’ATTAQUE."
    it: "Confonde il nemico\nma ne aumenta di\nmolto l’ATTACCO."
    de: "Verwirrt den Gegner\nund erhöht den\nANGR.-Wert\ndeutlich."
    es: "Provoca confusión,\npero también sube\nel ATAQUE."
swallow:
  names:
    jp_kana: のみこむ
    en: SWALLOW
    fr: AVALE
    it: INTROENERGIA
    de: VERZEHRER
    es: TRAGAR
  descriptions:
    jp_kana: "たくわえた　ちからを\nのみこんで　じぶんの\nＨＰを　かいふくする。\nたくわえて　いるほど\nおおく　かいふくする。"
    en: "The energy it built\nusing STOCKPILE is\nabsorbed to restore\nHP."
    fr: "Absorbe la\npuissance accumulée\navec STOCKAGE\net restaure les PV."
    it: "Assorbe l’energia\nimmagazzinata\ncon ACCUMULO,\nrestituendo PS."
    de: "Absorbiert die\ngeHORTETE Kraft,\num KP aufzufüllen."
    es: "Absorbe energía\nacumulada\ny restaura PS."
sweet_kiss:
  names:
    jp_kana: てんしのキッス
    en: SWEET KISS
    fr: DOUX BAISER
    it: DOLCEBACIO
    de: BITTERKUSS
    es: BESO DULCE
  descriptions:
    jp_kana: "てんしの　ように\nかわいく　キスを　して\nあいてを　こんらんの\nじょうたいに　する。"
    en: "The user kisses\nthe foe with sweet\ncuteness that\ncauses confusion."
    fr: "Demande un bisou\ntout mignon. Peut\nrendre confus."
    it: "Un bacio rubato\nche può causare\nconfusione."
    de: "Anwender küsst\nGegner, der ob\ndieser Niedlichkeit\nverwirrt wird."
    es: "Pide un beso con\ndulzura y suele\ncausar confusión."
sweet_scent:
  names:
    jp_kana: あまいかおり
    en: SWEET SCENT
    fr: DOUX PARFUM
    it: PROFUMINO
    de: LOCKDUFT
    es: DULCE AROMA
  descriptions:
    jp_kana: "あまいかおりで　てきの\nかいひりつを　さげる。\nやせいポケモンが　いる\nばしょで　つかうと\nポケモンが　でてくる。"
    en: "Allures the foe to\nreduce evasiveness.\nIt also attracts\nwild POKéMON."
    fr: "Séduit l’ennemi\npour baisser son\nesquive. Attire les\nPOKéMON sauvages."
    it: "Alletta il nemico\nper ridurne\nl’elusione."
    de: "Lockt Gegner an und\nsenkt den Flucht-\nwert. Lockt auch\nwilde PKMN an."
    es: "Engatusa al rival\npara reducir\nsu EVASIÓN."
swift:
  names:
    jp_kana: スピードスター
    en: SWIFT
    fr: METEORES
    it: COMETE
    de: STERNSCHAUER
    es: RAPIDEZ
  descriptions:
    jp_kana: "ほしがたの　ひかりを　\nあいてに　はっしゃして\nこうげきする。\nこうげきは　かならず\nめいちゅう　する。"
    en: "Star-shaped rays\nthat never miss are\nfired at all foes in\nbattle."
    fr: "Envoie des rayons\nen forme d’étoile.\nTouche toujours\nla cible."
    it: "Raggi a forma di\nstella colpiscono\ntutti i nemici in\ncampo."
    de: "Verschießt stern-\nförmige Strahlen\nauf alle Gegner,\ndie stets treffen."
    es: "Lanza rayos en\nforma de estrella\nque no fallan."
swords_dance:
  names:
    jp_kana: つるぎのまい
    en: SWORDS DANCE
    fr: DANSE-LAMES
    it: DANZASPADA
    de: SCHWERTTANZ
    es: DANZA ESPADA
  descriptions:
    jp_kana: "たたかいの　おどりを\nはげしく　おどって\nきあいを　たかめ\nじぶんの　こうげきを\nグーンと　あげる。"
    en: "A frenetic dance of\nfighting. It sharply\nraises the ATTACK\nstat."
    fr: "Une danse de\ncombat pour\nbooster l’ATTAQUE."
    it: "Una danza che\npotenzia fortemente\nl’ATTACCO."
    de: "Ein wilder Kampf-\ntanz, der den\nANGRIFFs-Wert\ndrastisch erhöht."
    es: "Baile que mejora\nel ATAQUE."
synthesis:
  names:
    jp_kana: こうごうせい
    en: SYNTHESIS
    fr: SYNTHESE
    it: SINTESI
    de: SYNTHESE
    es: SÍNTESIS
  descriptions:
    jp_kana: "じぶんの　ＨＰを\nかいふくする。\nてんきに　よって\nかいふくの　りょうが　\nへんかする。"
    en: "Restores the user’s\nHP. The amount of\nHP regained varies\nwith the weather."
    fr: "Restaure les PV.\nLa quantité varie\nsuivant le temps."
    it: "Ridà un numero di\nPS in base al tempo\nche fa."
    de: "Füllt KP des\nAnwenders auf.\nDie Menge hängt\nvom Wetter ab."
    es: "Restaura PS.\nLa cantidad\nvaría según\nel clima."
tackle:
  names:
    jp_kana: たいあたり
    en: TACKLE
    fr: CHARGE
    it: AZIONE
    de: TACKLE
    es: PLACAJE
  descriptions:
    jp_kana: "あいてに　むかって\nからだ　ぜんたいで\nつっこんで　いって\nこうげきする。"
    en: "A physical attack\nin which the user\ncharges, full body,\ninto the foe."
    fr: "Charge l’ennemi\navec un\nviolent plaquage."
    it: "Una carica\neffettuata con\ntutto il corpo."
    de: "Trifft den Gegner\nmit vollem\nKörpereinsatz."
    es: "Embiste con todo\nel cuerpo."
tail_glow:
  names:
    jp_kana: ほたるび
    en: TAIL GLOW
    fr: LUMIQUEUE
    it: CODADILUCE
    de: SCHWEIFGLANZ
    es: RÁFAGA
  descriptions:
    jp_kana: "やさしく　てんめつする\nひかりを　ながめ\nせいしんを　とういつし\nじぶんの　とくこうを\nグーンと　あげる。"
    en: "The user flashes a\nlight that sharply\nraises its SP. ATK\nstat."
    fr: "Flash lumineux\nqui booste\nl’ATQ. SPE."
    it: "Luce brillante che\naumenta di molto\nl’ATT. SPEC. di\nchi la usa."
    de: "Ein blinkendes\nLicht, das den\nSP. ANG.\ndeutlich erhöht."
    es: "Ráfaga de luz\nque sube\nmuchísimo\nel AT. ESP."
tail_whip:
  names:
    jp_kana: しっぽをふる
    en: TAIL WHIP
    fr: MIMI-QUEUE
    it: COLPOCODA
    de: RUTENSCHLAG
    es: LÁTIGO
  descriptions:
    jp_kana: "しっぽを　さゆうに\nかわいく　ふって\nゆだんさせて　てきの\nぼうぎょを　さげる。"
    en: "The user wags its\ntail cutely, making\nthe foe lower its\nDEFENSE stat."
    fr: "Remue la queue\npour baisser la\nDEFENSE de\nl’ennemi."
    it: "Agita la coda per\nridurre la DIFESA\ndel nemico."
    de: "Hieb mit dem\nSchweif, senkt\ndie VERT. des\nGegners."
    es: "Agita la cola para\nbajar la DEFENSA\ndel otro."
take_down:
  names:
    jp_kana: とっしん
    en: TAKE DOWN
    fr: BELIER
    it: RIDUTTORE
    de: BODYCHECK
    es: DERRIBO
  descriptions:
    jp_kana: "すごい　いきおいで\nあいてに　つっこんで\nこうげきする。\nじぶんも　すこし\nダメージを　うける。"
    en: "A reckless, full-\nbody charge attack\nthat also hurts the\nuser a little."
    fr: "Une charge violente\nqui blesse aussi\nlégèrement le\nlanceur."
    it: "Carica spericolata\nche danneggia\nanche chi la fa."
    de: "Rücksichtslose\nAttacke, bei der\nsich der Angreifer\nselbst verletzt."
    es: "Carga desmedida\nque también hiere\nal agresor."
taunt:
  names:
    jp_kana: ちょうはつ
    en: TAUNT
    fr: PROVOC
    it: PROVOCAZIONE
    de: VERHÖHNER
    es: MOFA
  descriptions:
    jp_kana: "ちょうはつを　うけて\nすごく　こうふんした\nあいては　ダメージを\nあたえる　わざしか\nだせなくなる。"
    en: "The foe is taunted\ninto a rage that\nallows it to use\nonly attack moves."
    fr: "Provoque l’ennemi.\nL’oblige à utiliser\nseulement ses\nattaques."
    it: "Induce il nemico ad\nusare solo mosse\nd’attacco."
    de: "Legt den Gegner\nrein. Er benutzt\nnur noch Angriffe."
    es: "Hace que el rival\nsólo use ataques."
teeter_dance:
  names:
    jp_kana: フラフラダンス
    en: TEETER DANCE
    fr: DANSE-FOLLE
    it: STRAMPADANZA
    de: TAUMELTANZ
    es: DANZA CAOS
  descriptions:
    jp_kana: "フラフラした　ダンスを\nおどって　せんとうに\nでている　すべての\nポケモンを　こんらんの\nじょうたいに　する。"
    en: "A wobbly dance\nthat confuses all\nthe POKéMON in\nbattle."
    fr: "Danse qui rend\nconfus tous les\ncombattants."
    it: "Confonde tutti i\nPOKéMON\nin campo."
    de: "Ein Wackeltanz,\nder alle\nPOKéMON im \nKampf verwirrt."
    es: "Confunde a todos\nlos POKéMON\nque hay en escena."
teleport:
  names:
    jp_kana: テレポート
    en: TELEPORT
    fr: TELEPORT
    it: TELETRASPOR.
    de: TELEPORT
    es: TELETRANSP
  descriptions:
    jp_kana: "やせい　ポケモンとの\nせんとうを　ぬけだす。\nさいごに　はいった\nポケモンセンターが\nある　まちへ　いける。"
    en: "Use it to flee from\nany wild POKéMON.\nAlso warps to the\nlast POKé CENTER."
    fr: "Attaque PSY\npermettant de\nprendre aussitôt\nla fuite."
    it: "Mossa psichica per\nfuggire\nimmediatamente\ndalla lotta."
    de: "Fliehe sofort vor\nwilden PKMN.\nWarp zum letzten\nPKMN-CENTER."
    es: "Movimiento psíquico\nque permite huir\nal instante."
thief:
  names:
    jp_kana: どろぼう
    en: THIEF
    fr: LARCIN
    it: FURTO
    de: RAUB
    es: LADRÓN
  descriptions:
    jp_kana: "こうげきと　どうじに\nどうぐを　ぬすむ。\nじぶんが　どうぐを\nもっている　ばあいは\nどうぐは　ぬすめない。"
    en: "An attack that may\ntake the foe’s held\nitem if the user\nisn’t holding one."
    fr: "Peut voler l’objet\ntenu par l’ennemi\npendant l’attaque."
    it: "Può rubare lo\nstrumento\ntenuto dal\nnemico."
    de: "Das vom Gegner\ngehaltene Item\nkann gestohlen\nwerden."
    es: "Puede quitarle\nal rival el objeto\nque lleve."
thrash:
  names:
    jp_kana: あばれる
    en: THRASH
    fr: MANIA
    it: COLPO
    de: FUCHTLER
    es: GOLPE
  descriptions:
    jp_kana: "２ー３ターンの　あいだ\nあばれ　まくって\nこうげきする。\nあばれた　あとは\nこんらん　してしまう。"
    en: "The user rampages\nabout for two to\nthree turns, then\nbecomes confused."
    fr: "Une attaque\nfurieuse de 2 à 3\ntours. Le lanceur\ndevient confus."
    it: "Attacco veemente di\n2-3 turni: confonde\nchi lo usa."
    de: "Attacke über 2 bis\n3 Runden, die den\nAngreifer verwirrt."
    es: "Dura de 2 a 3\nturnos y acaba\nconfundiéndote."
thunder:
  names:
    jp_kana: かみなり
    en: THUNDER
    fr: FATAL-FOUDRE
    it: TUONO
    de: DONNER
    es: TRUENO
  descriptions:
    jp_kana: "はげしい　かみなりを\nあいてに　おとして\nこうげきする。\nまひ　じょうたいに\nすることが　ある。"
    en: "A brutal lightning\nattack that may\nalso leave the foe\nparalyzed."
    fr: "Une attaque\nfoudroyante pouvant\nparalyser l’ennemi."
    it: "Un tuono che può\ncausare paralisi."
    de: "Eine verheerende\nElektro-Attacke,\ndie den Gegner\nevtl. paralysiert."
    es: "Un estruendo que\npuede paralizar\nal enemigo."
thunder_punch:
  names:
    jp_kana: かみなりパンチ
    en: THUNDERPUNCH
    fr: POING-ECLAIR
    it: TUONOPUGNO
    de: DONNERSCHLAG
    es: PUÑO TRUENO
  descriptions:
    jp_kana: "でんげきを　こめた\nパンチで　あいてを\nこうげきする。\nまひ　じょうたいに\nすることが　ある。"
    en: "The foe is punched\nwith an electrified\nfist. It may leave\nthe foe paralyzed."
    fr: "Un poing électrique\npouvant paralyser\nl’ennemi."
    it: "Pugno elettrico che\npuò paralizzare il\nnemico."
    de: "Schlag, der den\nGegner evtl.\nparalysiert."
    es: "Puñetazo eléctrico.\nPuede paralizar."
thunder_shock:
  names:
    jp_kana: でんきショック
    en: THUNDERSHOCK
    fr: ECLAIR
    it: TUONOSHOCK
    de: DONNERSCHOCK
    es: IMPACTRUENO
  descriptions:
    jp_kana: "でんきの　しょうげきを\nあいてに　あびせて\nこうげきする。\nまひ　じょうたいに\nすることが　ある。"
    en: "An electric shock\nattack that may\nalso leave the foe\nparalyzed."
    fr: "Une attaque\nélectrique pouvant\nparalyser l’ennemi."
    it: "Attacco elettrico\nche può\nparalizzare il\nnemico."
    de: "Eine Elektro-\nAttacke, die den\nGegner evtl.\nparalysiert."
    es: "Ataque eléctrico\nque puede\nparalizar al\nenemigo."
thunder_wave:
  names:
    jp_kana: でんじは
    en: THUNDER WAVE
    fr: CAGE-ECLAIR
    it: TUONONDA
    de: DONNERWELLE
    es: ONDA TRUENO
  descriptions:
    jp_kana: "よわい　でんげきを\nあびせる　ことで\nあいてを　まひの\nじょうたいに　する。"
    en: "A weak electric\nshock that is sure\nto cause paralysis\nif it hits."
    fr: "Un faible choc\nélectrique qui\nparalyse l’ennemi."
    it: "Debole scarica\nelettrica che\nparalizza il\nnemico."
    de: "Ein schwacher\nStromstoß, der\nden Gegner\nparalysiert."
    es: "Una descarga que\npuede paralizar\nal enemigo."
thunderbolt:
  names:
    jp_kana: １０まんボルト
    en: THUNDERBOLT
    fr: TONNERRE
    it: FULMINE
    de: DONNERBLITZ
    es: RAYO
  descriptions:
    jp_kana: "つよい　でんげきを\nあいてに　あびせて\nこうげきする。\nまひ　じょうたいに\nすることが　ある。"
    en: "A strong electrical\nattack that may\nalso leave the foe\nparalyzed."
    fr: "Une forte attaque\nélectrique pouvant\nparalyser l’ennemi."
    it: "Potente attacco\nelettrico: può\nparalizzare il\nnemico."
    de: "Eine starke\nElektro-Attacke,\ndie den Gegner\nevtl. paralysiert."
    es: "Duro ataque\neléctrico que\npuede paralizar\nal enemigo."
tickle:
  names:
    jp_kana: くすぐる
    en: TICKLE
    fr: CHATOUILLE
    it: SOLLETICO
    de: SPASSKANONE
    es: COSQUILLAS
  descriptions:
    jp_kana: "コチョコチョと\nからだを　くすぐり\nわらわせる　ことで\nあいての　こうげきと\nぼうぎょを　さげる。"
    en: "The foe is made to\nlaugh, reducing its\nATTACK and DEFENSE\nstats."
    fr: "Fait rire l’ennemi\net baisse\nson ATTAQUE et\nsa DEFENSE."
    it: "Riduce ATTACCO e\nDIFESA del nemico\nfacendolo ridere."
    de: "Bringt Gegner zum\nLachen und dadurch\nsinkt dessen ANGR.\nund VERT."
    es: "Hace reír para\nbajar el ATAQUE\ny la DEFENSA."
torment:
  names:
    jp_kana: いちゃもん
    en: TORMENT
    fr: TOURMENTE
    it: ATTACCALITE
    de: FOLTERKNECHT
    es: TORMENTO
  descriptions:
    jp_kana: "あいてに　いちゃもんを\nつけて　おなじ　わざを\nれんぞくで　つかえない\nように　する。"
    en: "It enrages the foe,\nmaking it incapable\nof using the same\nmove successively."
    fr: "Perturbe l’ennemi.\nEmpêche la\nréutilisation d’une\nattaque."
    it: "Il nemico non può\npiù usare l’ultima\nmossa utilizzata."
    de: "Erzürnt Gegner, um\nwiederholten Ein-\nsatz derselben Att.\nzu verhindern."
    es: "Agobia e impide\nel uso reiterado\nde un ataque."
toxic:
  names:
    jp_kana: どくどく
    en: TOXIC
    fr: TOXIK
    it: TOSSINA
    de: TOXIN
    es: TÓXICO
  descriptions:
    jp_kana: "あいてを　もうどくの\nじょうたいに　する。\nまいターン　へる\nどくの　ダメージが\nふえていく。"
    en: "A move that badly\npoisons the foe.\nIts poison damage\nworsens every turn."
    fr: "Empoisonne\nl’ennemi avec\nune toxine de plus\nen plus forte."
    it: "Avvelena il nemico\ncon una potente\ntossina. Il danno\nsale ad ogni turno."
    de: "Vergiftet den\nGegner mit\neinem potenten\nToxin."
    es: "Envenena al rival\nde forma\nprogresiva."
transform:
  names:
    jp_kana: へんしん
    en: TRANSFORM
    fr: MORPHING
    it: TRASFORMAZ.
    de: WANDLER
    es: TRANSFORM
  descriptions:
    jp_kana: "あいての　ポケモンに\nへんしん　することで\nあいてと　まったく\nおなじ　わざが\nつかえるように　なる。"
    en: "The user transforms\ninto a copy of the\nfoe with even the\nsame move set."
    fr: "Modifie ses\ncellules pour\ncopier l’ennemi."
    it: "Chi la usa si\ntrasforma in una\ncopia del nemico,\ncomprese le mosse."
    de: "Anwender ver-\nwandelt sich in\nein Abbild des\nGegners."
    es: "Modifica las\ncélulas del rival\ny lo clona."
tri_attack:
  names:
    jp_kana: トライアタック
    en: TRI ATTACK
    fr: TRIPLATTAQUE
    it: TRIPLETTA
    de: TRIPLETTE
    es: TRIATAQUE
  descriptions:
    jp_kana: "３つの　こうせんで\nこうげきする。\nまひか　やけどか\nこおり　じょうたいに\nすることが　ある。"
    en: "A simultaneous\n3-beam attack that\nmay paralyze, burn,\nor freeze the foe."
    fr: "Envoie trois types\nde rayons en\nmême temps."
    it: "3 raggi che possono\nparalizzare,\nscottare o\ncongelare."
    de: "Feuert 3 Arten von\nStrahlen ab. Evtl.\nParalyse, Verbren-\nnung oder Frost."
    es: "Dispara 3 tipos\nde rayos a la vez."
trick:
  names:
    jp_kana: トリック
    en: TRICK
    fr: TOURMAGIK
    it: RAGGIRO
    de: TRICKBETRUG
    es: TRUCO
  descriptions:
    jp_kana: "あいての　すきを　みて\nじぶんが　もっている\nどうぐと　あいてが\nもっている　どうぐを\nこうかんする。"
    en: "A move that tricks\nthe foe into\ntrading held items\nwith the user."
    fr: "Oblige la cible à\néchanger\nles objets tenus."
    it: "Convince a\nscambiare uno\nstrumento tenuto."
    de: "Gehaltene\nItems werden\nmit Anwender\ngetauscht."
    es: "Engaña al rival\ny provoca\nun cambio\nde objeto."
triple_kick:
  names:
    jp_kana: トリプルキック
    en: TRIPLE KICK
    fr: TRIPLE PIED
    it: TRIPLOCALCIO
    de: DREIFACHKICK
    es: TRIPLEPATADA
  descriptions:
    jp_kana: "３かい　れんぞくで\nキックを　くりだして\nこうげきする。\nあてる　たびに\nダメージが　ふえる。"
    en: "A 3-kick attack\nthat becomes more\npowerful with each\nsuccessive hit."
    fr: "Trois coups de pied\nde plus en plus\npuissants."
    it: "Tre calci\nconsecutivi,\nsempre più forti."
    de: "Tritt Gegner 3-mal\nnacheinander.\nDie Härte der\nTritte nimmt zu."
    es: "Patea 3 veces\nseguidas y cada\nvez más fuerte."
twineedle:
  names:
    jp_kana: ダブルニードル
    en: TWINEEDLE
    fr: DOUBLE-DARD
    it: DOPPIO AGO
    de: DUONADEL
    es: DOBLEATAQUE
  descriptions:
    jp_kana: "りょうての　ハリで\n２かい　れんぞくで\nこうげきする。\nどく　じょうたいに\nすることが　ある。"
    en: "The foe is stabbed\ntwice with foreleg\nstingers. It may\npoison the foe."
    fr: "Les dards des\npattes avant\nfrappent\ndeux fois."
    it: "Aculei sulle zampe\nanteriori colpiscono\n2 volte. Possibile\navvelenamento."
    de: "Stacheln an den\nVorderbeinen\ntreffen den\nGegner 2-mal."
    es: "Clava aguijones al\nrival 2 veces."
twister:
  names:
    jp_kana: たつまき
    en: TWISTER
    fr: OURAGAN
    it: TORNADO
    de: WINDHOSE
    es: CICLÓN
  descriptions:
    jp_kana: "はげしい　たつまきを\nおこして　まきこみ\nこうげきする。\nあいてを　ひるませる\nことが　ある。"
    en: "A vicious twister\nattacks the foe.\nIt may make the\nfoe flinch."
    fr: "Déclenche un\nterrible ouragan\nblessant l’ennemi.\nPeut apeurer."
    it: "Un potente tornado\nsi abbatte contro\nil nemico, che può\ntentennare."
    de: "Trifft Gegner mit\nheftigem\nWirbelsturm."
    es: "Crea un violento\ntornado para hacer\ntrizas al rival."
uproar:
  names:
    jp_kana: さわぐ
    en: UPROAR
    fr: BROUHAHA
    it: BARAONDA
    de: AUFRUHR
    es: ALBOROTO
  descriptions:
    jp_kana: "２ー５ターンの　あいだ\nさわいで　こうげきし\nそのあいだは　だれも\nねむり　じょうたいに\nならなくなる。"
    en: "The user attacks in\nan uproar that\nprevents sleep for\ntwo to five turns."
    fr: "Brouhaha de\n2 à 5 tours.\nEmpêche de\ndormir."
    it: "Frastuono che\ndura da 2 a 5\nturni e non fa\ndormire."
    de: "Erzeugt für 2 - 5\nRunden einen\nAufruhr. Verhindert\nSchlaf."
    es: "Alborota de 2 a 5\nturnos. Mantiene\ndespierto."
vine_whip:
  names:
    jp_kana: つるのムチ
    en: VINE WHIP
    fr: FOUET LIANES
    it: FRUSTATA
    de: RANKENHIEB
    es: LÁTIGO CEPA
  descriptions:
    jp_kana: "ムチの　ように　しなる\nほそながい　つるを\nあいてに　たたきつけて\nこうげきする。"
    en: "The foe is struck\nwith slender, whip-\nlike vines."
    fr: "Fouette l’ennemi\navec de fines\nlianes."
    it: "Colpisce il nemico\ncon liane sottili\nsimili a fruste."
    de: "Peitschenähnlicher\nSchlag mit\nRanken."
    es: "Azota al enemigo\ncon ramas finas."
vise_grip:
  names:
    jp_kana: はさむ
    en: VICEGRIP
    fr: FORCE POIGNE
    it: PRESA
    de: KLAMMER
    es: AGARRE
  descriptions:
    jp_kana: "おおきくて　りっぱな\nハサミを　つかって\nあいてを　はさんで\nこうげきする。"
    en: "Huge, impressive\npincers grip and\nsqueeze the foe."
    fr: "Empoigne l’ennemi\navec de puissantes\npinces."
    it: "Stringe il nemico\nin una morsa di\nforti tenaglie."
    de: "Umklammert den\nGegner mit\ngroßen, kräftigen\nZangen."
    es: "Atrapa con potentes\npinzas."
vital_throw:
  names:
    jp_kana: あてみなげ
    en: VITAL THROW
    fr: CORPS PERDU
    it: VITALTIRO
    de: ÜBERWURF
    es: TIRO VITAL
  descriptions:
    jp_kana: "あいてより　あとに\nこうげきする。\nそのかわり　じぶんの\nこうげきは　かならず\nめいちゅう　する。"
    en: "Makes the user\nattack after the\nfoe. In return,\nit will not miss."
    fr: "Attaque après\nl’ennemi, mais\nn’échoue jamais."
    it: "Colpisce sempre\nper ultima, ma è\ninfallibile."
    de: "Anwender greift als\nZweiter an, dafür\naber Treffer-\ngarantie."
    es: "Lleva su tiempo\npero no falla."
volt_tackle:
  names:
    jp_kana: ボルテッカー
    en: VOLT TACKLE
    fr: ELECTACLE
    it: LOCOMOVOLT
    de: VOLTTACKLE
    es: PLACAJE ELÉC
  descriptions:
    jp_kana: "でんきを　まとい\nあいてに　つっこんで\nこうげきする。\nじぶんも　すこし\nダメージを　うける。"
    en: "The user throws an\nelectrified tackle.\nIt hurts the user\na little."
    fr: "Une dangereuse\ncharge électrique\nqui blesse aussi le\nlanceur."
    it: "Potente carica:\ndanneggia\nleggermente chi la\nfa."
    de: "Angriff mit Elektro-\nTackle. Der\nAnwender verletzt\nsich dabei leicht."
    es: "Placaje de alto\nriesgo que hiere\nun poco al\natacante."
water_gun:
  names:
    jp_kana: みずでっぽう
    en: WATER GUN
    fr: PISTOLET A O
    it: PISTOLACQUA
    de: AQUAKNARRE
    es: PISTOLA AGUA
  descriptions:
    jp_kana: "たくさんの　みずを\nくちから　いきおいよく\nあいてに　はっしゃして\nこうげきする。"
    en: "The foe is struck\nwith a lot of water\nexpelled forcibly\nfrom the mouth."
    fr: "Attaque l’ennemi\nen projetant de\nl’eau."
    it: "Il nemico è colpito\nda un getto\nd’acqua."
    de: "Der Gegner wird mit\nWasser aus dem\nMund bespritzt."
    es: "Rocía agua para\natacar."
water_pulse:
  names:
    jp_kana: みずのはどう
    en: WATER PULSE
    fr: VIBRAQUA
    it: IDROPULSAR
    de: AQUAWELLE
    es: HIDROPULSO
  descriptions:
    jp_kana: "みずの　しんどうを\nあいてに　あたえて\nこうげきする。\nこんらん　じょうたいに\nすることが　ある。"
    en: "An attack with a\npulsing blast of\nwater. It may also\nconfuse the foe."
    fr: "Envoi des ondes\naquatiques.\nPeut rendre confus."
    it: "Esplosione d’acqua\nche può confondere\nil nemico."
    de: "Angriff mit Wasser-\nwelle, die den\nGegner evtl.\nverwirren kann."
    es: "Ondas ultrasónicas\nque pueden\nconfundir al rival."
water_sport:
  names:
    jp_kana: みずあそび
    en: WATER SPORT
    fr: TOURNIQUET
    it: DOCCIASCUDO
    de: NASSMACHER
    es: HIDROCHORRO
  descriptions:
    jp_kana: "みずを　かぶって\nびしょびしょに　なり\nじぶんが　いるあいだ\nほのおタイプの　わざの\nダメージを　へらす。"
    en: "Weakens FIRE-type\nattacks while the\nuser is in the\nbattle."
    fr: "Mouille le lanceur\net augmente sa\nrésistance au feu."
    it: "Chi la usa\ns’impregna d’acqua\nper resistere al\nfuoco."
    de: "Schwächt FEUER-\nAttacken, solange\nder Anwender am\nKampf teilnimmt."
    es: "Te moja para\nque resistas\nmás los ataques\nde fuego."
water_spout:
  names:
    jp_kana: しおふき
    en: WATER SPOUT
    fr: GICLEDO
    it: ZAMPILLO
    de: FONTRÄNEN
    es: SALPICAR
  descriptions:
    jp_kana: "あたまから　しおを\nふいて　こうげきする。\nＨＰが　おおいほど\nあいてに　おおきな\nダメージを　あたえる。"
    en: "The higher the\nuser’s HP, the more\npowerful this\nattack becomes."
    fr: "Inflige plus de\ndégâts si le\nlanceur a\nbeaucoup de PV."
    it: "Più efficace se i\nPS di chi la usa\nsono alti."
    de: "Ist wirkungsvoller,\nwenn KP des\nAnwenders hoch\nsind."
    es: "Si tienes muchos\nPS, el daño que\ncausa es mucho\nmayor."
waterfall:
  names:
    jp_kana: たきのぼり
    en: WATERFALL
    fr: CASCADE
    it: CASCATA
    de: KASKADE
    es: CASCADA
  descriptions:
    jp_kana: "すごい　いきおいで\nあいてに　つっこんで\nこうげきする。\nながれおちる　たきを\nのぼることも　できる。"
    en: "A powerful charge\nattack. It can also\nbe used to climb\na waterfall."
    fr: "Charge puissante\npermettant de\nfranchir des\ncascades."
    it: "Potente carica.\nSi può anche usare\nper risalire una\ncascata."
    de: "Eine mächtige\nAttacke. Wasser-\nfälle können damit\nerklommen werden."
    es: "Embiste con impulso\npara remontar\nuna cascada incluso\nfuera de combate."
weather_ball:
  names:
    jp_kana: ウェザーボール
    en: WEATHER BALL
    fr: BALL’METEO
    it: PALLA CLIMA
    de: METEOROLOGE
    es: METEOROBOLA
  descriptions:
    jp_kana: "つかった　ときの\nてんきに　よって\nあいてに　あたえる\nダメージの　りょうと\nタイプが　へんかする。"
    en: "An attack that\nvaries in power and\ntype depending on\nthe weather."
    fr: "Le type et la\npuissance de\nl’attaque varient\nselon le climat."
    it: "Il tipo e la forza\ndipendono\nda che tempo fa."
    de: "Elementklasse und\nStärke der Attacke\nsind vom Wetter\nabhängig."
    es: "El tipo y fuerza\ndel ataque\nvarían según\nel clima."
whirlpool:
  names:
    jp_kana: うずしお
    en: WHIRLPOOL
    fr: SIPHON
    it: MULINELLO
    de: WHIRLPOOL
    es: TORBELLINO
  descriptions:
    jp_kana: "はげしく　うずをまく\nみずの　なかに\n２ー５ターンの　あいだ\nあいてを　とじこめ\nこうげきする。"
    en: "The foe is trapped\nin a fast, vicious\nwhirlpool for two\nto five turns."
    fr: "Piège l’ennemi\ndans un tourbillon\npendant\n2 à 5 tours."
    it: "Il nemico è\nintrappolato in\nun vortice da 2 a\n5 turni."
    de: "Hält Gegner 2 - 5\nRunden in einem\nStrudel gefangen."
    es: "Atrapa y daña\nal rival de 2 a 5\nturnos con un\ntorbellino."
whirlwind:
  names:
    jp_kana: ふきとばし
    en: WHIRLWIND
    fr: CYCLONE
    it: TURBINE
    de: WIRBELWIND
    es: REMOLINO
  descriptions:
    jp_kana: "あいてを　ふきとばし\nひかえの　ポケモンを\nむりやり　ひきだす。\nやせいの　ばあいは\nせんとうが　おわる。"
    en: "The foe is made to\nswitch out with an\nally. In the wild,\nthe battle ends."
    fr: "Envoie une rafale\nde vent et met fin\nau combat."
    it: "Il POKéMON nemico\nè costretto a\nlasciare la lotta."
    de: "Weht Gegner weg\nund beendet den\nKampf in der\nWildnis."
    es: "Se lleva al rival\ny termina el\ncombate."
will_o_wisp:
  names:
    jp_kana: おにび
    en: WILL-O-WISP
    fr: FEU FOLLET
    it: FUOCOFATUO
    de: IRRLICHT
    es: FUEGO FATUO
  descriptions:
    jp_kana: "あおじろく　もえる\nぶきみで　あやしい\nほのおを　はなって\nあいてを　やけどの\nじょうたいに　する。"
    en: "A sinister, bluish\nwhite flame is shot\nat the foe to\ninflict a burn."
    fr: "Inflige une\ndouloureuse \nbrûlure à l’ennemi."
    it: "Fiamme intense\ncausano una\nscottatura al\nnemico."
    de: "Angriff mit blau-\nweißer Flamme,\ndie den Gegner \nverbrennt."
    es: "Fuego muy intenso\nque produce\nquemaduras."
wing_attack:
  names:
    jp_kana: つばさでうつ
    en: WING ATTACK
    fr: CRU-AILE
    it: ATT. D’ALA
    de: FLÜGELSCHLAG
    es: ATAQUE ALA
  descriptions:
    jp_kana: "おおきく　ひろげた\nりっぱな　つばさを\nあいてに　ぶつけて\nこうげきする。"
    en: "The foe is struck\nwith large, imposing\nwings spread wide."
    fr: "Frappe l’ennemi\nen déployant les\nailes."
    it: "Colpisce il nemico\nspiegando le ali."
    de: "Trifft den Gegner\nmit weit gespreizten\nFlügeln."
    es: "Golpea al objetivo\ncon las alas."
wish:
  names:
    jp_kana: ねがいごと
    en: WISH
    fr: VOEU
    it: DESIDERIO
    de: WUNSCHTRAUM
    es: DESEO
  descriptions:
    jp_kana: "つぎの　ターンに\nじぶんの　ＨＰを\nさいだい　ＨＰの\nはんぶんだけ\nかいふくする。"
    en: "A self-healing move\nthat restores half\nthe full HP on the\nnext turn."
    fr: "Un vœu qui\nrestaure la moitié \ndes PV au tour\nsuivant."
    it: "Fa recuperare metà\ndei PS massimi al\nturno successivo."
    de: "Ein Wunsch, der KP\nauffüllt. Die\nErfüllung braucht\nZeit."
    es: "Lleva tiempo, pero\ncumple el deseo\nde restaurar\nlos PS."
withdraw:
  names:
    jp_kana: からにこもる
    en: WITHDRAW
    fr: REPLI
    it: RITIRATA
    de: PANZERSCHUTZ
    es: REFUGIO
  descriptions:
    jp_kana: "がんじょうな　からに\nもぐりこんで　みを\nまもって　じぶんの\nぼうぎょを　あげる。"
    en: "The user withdraws\nits body in its hard\nshell, raising its\nDEFENSE stat."
    fr: "Se recroqueville\ndans sa carapace\net augmente la\nDEFENSE."
    it: "Il corpo si ritira\nnel guscio per\naumentare\nla DIFESA."
    de: "Rückzug in den\nharten Panzer.\nErhöht den\nVERT.-Wert."
    es: "El agresor se\nprotege en su\ncoraza y sube\nla DEFENSA."
wrap:
  names:
    jp_kana: まきつく
    en: WRAP
    fr: LIGOTAGE
    it: AVVOLGIBOTTA
    de: WICKEL
    es: REPETICIÓN
  descriptions:
    jp_kana: "ながい　からだや\nつるなどを　つかって\n２ー５ターンの　あいだ\nあいてに　まきついて\nこうげきする。"
    en: "A long body or\nvines are used to\nwrap the foe for\ntwo to five turns."
    fr: "Ligote l’ennemi et\nl’étouffe pendant\n2 à 5 tours avec\ndes lianes."
    it: "Avvolge e stringe\nil nemico da 2 a 5\nvolte."
    de: "Umwickelt Gegner\n2 - 5-mal mit\nRanken o. Ä."
    es: "Oprime de 2 a 5\nturnos con ramas,\netc."
yawn:
  names:
    jp_kana: あくび
    en: YAWN
    fr: BAILLEMENT
    it: SBADIGLIO
    de: GÄHNER
    es: BOSTEZO
  descriptions:
    jp_kana: "おおきな　あくびで\nねむけを　さそって\nつぎの　ターンに\nあいてを　ねむりの\nじょうたいに　する。"
    en: "A huge yawn lulls\nthe foe into falling\nasleep on the next\nturn."
    fr: "Fait bâiller\nl’ennemi qui\ns’endort au tour\nsuivant."
    it: "Il nemico sbadiglia\ne al turno dopo\ns’addormenta."
    de: "Angreifer gähnt und\nGeg. schläft in der\nnächsten Runde ein."
    es: "Provoca el bostezo\ny después\nel sueño."
zap_cannon:
  names:
    jp_kana: でんじほう
    en: ZAP CANNON
    fr: ELECANON
    it: FALCECANNONE
    de: BLITZKANONE
    es: ELECTROCAÑÓN
  descriptions:
    jp_kana: "たいほうの　ような\nでんきを　はっしゃして\nこうげきする。\nあいてを　まひの\nじょうたいに　する。"
    en: "An electric blast is\nfired like a cannon\nto inflict damage\nand paralyze."
    fr: "Puissant et\nparalysant, mais\npas très précis."
    it: "Esplosione elettrica\nche infligge danni\ne paralizza il\nnemico."
    de: "Kanonenähnlicher\nElektro-Schuss, der\nschadet und\nevtl. paralysiert."
    es: "No es certero,\npero causa\nparálisis si atina."
