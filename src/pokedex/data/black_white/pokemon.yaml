      descriptions:
        jp_kana:
          black: "あたまの　はっぱを　かじると\nとても　にがいが　つかれた　からだを\nげんきにする　こうかが　あるのだ。"
          white: "すいぶんと　えいようの　ほうふな\nつちを　このむので　チュリネの　すむ\nとちは　さくもつの　そだちが　よい。"
        jp_kanji:
          black: "頭の　葉っぱを　かじると\nとても　苦いが　疲れた　体を\n元気にする　効果が　あるのだ。"
          white: "水分と　栄養の　豊富な\n土を　好むので　チュリネの　住む\n土地は　作物の　育ちが　良い。"
        en:
          black: "The leaves on its head are very bitter.\nEating one of these leaves is known\nto refresh a tired body."
          white: "Since they prefer moist, nutrient-rich\nsoil, the areas where Petilil live are\nknown to be good for growing plants."
        fr:
          black: "Les feuilles sur sa tête sont très\namères, mais elles remettent d’aplomb\nles corps les plus éreintés."
          white: "Il aime les zones bien irriguées et riches\nen nutriments. On sait que là où il vit,\nles cultures sont florissantes."
        it:
          black: "Le foglie che ha sul capo sono molto\namare ma, se masticate, hanno l’effetto\ndi rinvigorire il corpo stanco."
          white: "Dato che predilige i terreni ricchi di\nacqua e nutrimento, nelle zone in cui\nvive Petilil i raccolti sono rigogliosi."
        de:
          black: "Die Blätter auf seinem Kopf schmecken\nfurchtbar bitter, doch sie helfen\nausgezeichnet gegen Erschöpfung."
          white: "Da es nährstoffreiche Erde bevorzugt,\nkann man in Gebieten, in denen es lebt,\nfür gewöhnlich reiche Ernten erwarten."
        es:
          black: "Mordisquear las hojas de su cabeza\npermite recuperar toda la vitalidad,\na pesar de que están muy amargas."
          white: "Habita tierras húmedas ricas en\nnutrientes donde la cosecha es\nabundante."
        ko:
          black: "머리의 잎사귀를 갉아먹으면\n매우 쓰지만 지친 몸을\n회복시켜주는 효과가 있다."
          white: "치릴리는 수분과 영양이 풍부한\n땅을 좋아하기 때문에 치릴리가\n사는 토지는 작물이 잘 자란다."
lilligant:
