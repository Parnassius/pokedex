      descriptions:
        jp_kana:
          black: "ひづめから　みずを　ふきだすことで\nすいめんを　すべるように　いどう。\nとくいの　あしわざで　たたかう。"
          white: "うみや　かわなど　すいめんを　はしり\nせかいじゅうを　かけめぐっている。\nうつくしい　みずべに　あらわれる。"
        jp_kanji:
          black: "ひづめから　水を　吹き出すことで\n水面を　滑るように　移動。\n得意の　足技で　戦う。"
          white: "海や　川など　水面を　走り\n世界中を　駆け巡る。\n美しい　水辺に　現れる。"
        en:
          black: "By blasting water from its hooves, it can\nglide across water. It excels at using\nleg moves while battling."
          white: "It crosses the world, running over\nthe surfaces of oceans and rivers.\nIt appears at scenic waterfronts."
        fr:
          black: "Il projette de l’eau depuis ses sabots\net se déplace ainsi à grande vitesse.\nSa botte secrète est le coup de sabot."
          white: "Il parcourt le monde en courant à la\nsurface des mers et des cours d’eau.\nIl apparaît là où l’eau est très pure."
        it:
          black: "Spara acqua dagli zoccoli, poi si muove\nscivolando sulla superficie liquida che ha\nformato. Lotta usando abilmente gli arti."
          white: "Scorrazza per il mondo muovendosi sulla\nsuperficie dei mari o dei fiumi. Appare nei\nlidi più ameni."
        de:
          black: "Gleitet über das Wasser, indem es seine\nHufe als Wasserdüsen nutzt. Seine Bein-\ntechnik verschafft ihm im Kampf Vorteile."
          white: "Es kann auf dem Wasser laufen und reist\nauf Flüssen und Meeren um die Welt.\nZu sehen in malerischen Küstengebieten."
        es:
          black: "Desprende agua por sus pezuñas para\npoder deslizarse. Es especialista\nen atacar usando sus patas."
          white: "Corre por mares, ríos o cualquier\nsuperficie acuática de todo el mundo.\nAparece en aguas límpidas."
        ko:
          black: "발굽에서 물을 뿜어내서\n수면을 미끄러지듯이 이동한다.\n특기인 발기술로 싸운다."
          white: "바다나 강 등의 수면을 달려\n세계 곳곳을 뛰어다닌다.\n아름다운 물가에 나타난다."
