        - levitate
      descriptions:
        jp_kana:
          black: "まるい　もようが　はつでん　きかん。\nあいてに　まきついてから　もようを\nおしつけて　でんきを　ながすのだ。"
          white: "しょくよく　おうせいな　ポケモン。\nえものを　みつけると　おそいかかり\nでんきで　しびれさせてから　たべる。"
        jp_kanji:
          black: "丸い　模様が　発電　器官。\n相手に　巻きついてから　模様を\n押しつけて　電気を　流すのだ。"
          white: "食欲　おうせいな　ポケモン。\n獲物を　見つけると　襲いかかり\n電気で　しびれさせてから　食べる。"
        en:
          black: "They coil around foes and shock them\nwith electricity-generating organs that\nseem simply to be circular patterns."
          white: "These Pokémon have a big appetite.\nWhen they spot their prey, they attack\nit and paralyze it with electricity."
        fr:
          black: "Ses taches rondes émettent de\nl’électricité. Il s’enroule autour\nde ses proies et les électrocute."
          white: "Un Pokémon doté d’un gros appétit. Il\nparalyse ses proies avec des décharges\nélectriques avant de les manger."
        it:
          black: "I motivi circolari sono organi generatori\ndi corrente. Dopo aver avvolto il nemico\nlo fulmina con una scarica elettrica."
          white: "Pokémon dal grande appetito.\nQuando attacca, immobilizza il nemico\nparalizzandolo con l’elettricità."
        de:
          black: "Die rund gemaserten Flächen erzeugen\nStrom. Es schlingt sich um den Gegner,\npresst sie gegen ihn und aktiviert sie."
          white: "Hat es seine Beute erspäht, lähmt es\nsie mit Elektrizität und verspeist sie\nanschließend."
        es:
          black: "Las motas redondas componen su aparato\nelectrificador. Enrolla a su rival y deja\nque la corriente fluya por las motas."
          white: "Pokémon de apetito voraz. En cuanto\nencuentra una presa, la paraliza con\nelectricidad y la engulle."
        ko:
          black: "둥근 무늬가 발전 기관이다.\n상대를 휘감은 후 무늬를\n딱 붙여서 전기를 흘려보낸다."
          white: "식욕이 왕성한 포켓몬이다.\n먹이를 발견하면 덮쳐서\n전기로 마비시킨 후 먹는다."
eelektross:
  species_id: 604
  names:
    jp_kana: シビルドン
