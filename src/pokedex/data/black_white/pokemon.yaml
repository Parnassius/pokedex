    dewott:
      form_id: 0
      base_stats:
        hp: 75
        attack: 75
        defense: 60
        special_attack: 83
        special_defense: 60
        speed: 60
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 2
        special_defense: 0
        speed: 0
      types:
        - water
      egg_groups:
        - field
