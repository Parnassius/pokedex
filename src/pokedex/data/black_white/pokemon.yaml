        - psychic
      egg_groups:
        - amorphous
      abilities:
        - shadow_tag
      hidden_ability: telepathy
      descriptions:
        jp_kana:
          black: "くろい　しっぽを　ひっしになって\nかくすのは　しっぽに　ひみつがある\nしょうこだと　かんぐられている。"
          white: "くろい　しっぽを　ひっしになって\nかくすのは　しっぽに　ひみつがある\nしょうこだと　かんぐられている。"
        jp_kanji:
          black: "黒い　しっぽを　必死になって\n隠すのは　しっぽに　秘密がある\n証拠だと　勘ぐられている。"
          white: "黒い　しっぽを　必死になって\n隠すのは　しっぽに　秘密がある\n証拠だと　勘ぐられている。"
        en:
          black: "It desperately tries to keep its\nblack tail hidden. It is said to be\nproof the tail hides a secret."
          white: "It desperately tries to keep its\nblack tail hidden. It is said to be\nproof the tail hides a secret."
        fr:
          black: "Il cherche désespérément à cacher\nsa queue noire. Certains pensent\nqu’elle renferme un secret."
          white: "Il cherche désespérément à cacher\nsa queue noire. Certains pensent\nqu’elle renferme un secret."
        it:
          black: "Cerca di tenere nascosta la sua coda\nnera ad ogni costo. Pare che essa celi\nun segreto."
          white: "Cerca di tenere nascosta la sua coda\nnera ad ogni costo. Pare che essa celi\nun segreto."
        de:
          black: "Verzweifelt versucht es, seinen\nschwarzen Schweif zu verstecken.\nEr soll ein Geheimnis enthalten."
          white: "Verzweifelt versucht es, seinen\nschwarzen Schweif zu verstecken.\nEr soll ein Geheimnis enthalten."
        es:
          black: "Siempre intenta ocultar su cola,\npor lo que muchos creen que\ncontiene un secreto."
          white: "Siempre intenta ocultar su cola,\npor lo que muchos creen que\ncontiene un secreto."
        ko:
          black: "까만 꼬리를 필사적으로\n숨기는 것은 꼬리에 비밀이 있다는\n증거라고 의심받고 있다."
          white: "까만 꼬리를 필사적으로\n숨기는 것은 꼬리에 비밀이 있다는\n증거라고 의심받고 있다."
girafarig:
  species_id: 203
  names:
    jp_kana: キリンリキ
    jp_kanji: キリンリキ
    en: Girafarig
    fr: Girafarig
    it: Girafarig
    de: Girafarig
    es: Girafarig
