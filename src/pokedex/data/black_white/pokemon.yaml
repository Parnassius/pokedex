      descriptions:
        jp_kana:
          black: "ほほの　でんきぶくろで　つくった\nでんきを　まくの　うちがわに　ためて\nかっくうしながら　でんきを　はなつ。"
          white: "もりの　きのうえで　くらす。\nマントのような　まくの　うちがわを\nほうでん　させながら　かっくうする。"
        jp_kanji:
          black: "ほほの　電気袋で　作った　電気を\n膜の　内側に　ためて\n滑空しながら　電気を　放つ。"
          white: "森の　木の上で　暮らす。\nマントのような　膜の　内側を\n放電　させながら　滑空する。"
        en:
          black: "The energy made in its cheeks’ electric\npouches is stored inside its membrane\nand released while it is gliding."
          white: "They live on treetops and glide using\nthe inside of a cape-like membrane\nwhile discharging electricity."
        fr:
          black: "Il accumule dans ses membranes\nl’électricité qu’il produit dans ses\nbajoues, et la relâche tout en planant."
          white: "Il vit au sommet des arbres de la forêt.\nIl plane en déchargeant l’électricité de\nses membranes semblables à une cape."
        it:
          black: "Accumula nelle membrane l’elettricità\nche produce all’interno delle guance,\npoi la rilascia planando."
          white: "Vive nelle foreste sulle cime degli alberi.\nPlana usando una membrana simile a un\nmantello, elettrificata all’interno."
        de:
          black: "Im Flug entlädt es Strom, den es mit\nseinen Backentaschen erzeugt und\nin seinen Fluglappen gespeichert hat."
          white: "Lebt in den Wipfeln der Waldbäume.\nWährend es durch die Lüfte gleitet,\nentlädt es Strom aus seinen Fluglappen."
        es:
          black: "Almacena en una membrana la electricidad\ngenerada por sus mejillas y planea por\nlos aires soltando descargas."
          white: "Vive en la copa de los árboles. Produce\ndescargas mientras vuela con el interior\nde la membrana que hace de capa."
        ko:
          black: "볼의 전기 주머니에서 만든\n전기를 막 안쪽에 모아\n활공하며 전기를 발산한다."
          white: "숲의 나무 위에 산다.\n망토 같은 막의 안쪽을\n방전시키며 활공한다."
karrablast:
