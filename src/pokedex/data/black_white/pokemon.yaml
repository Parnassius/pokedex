        jp_kana:
          black: "きのみに　そっくり。まちがわれて\nとりポケモンに　つつかれてしまうが\nかたい　カラで　まもられている。"
          white: "きのみに　そっくり。まちがわれて\nとりポケモンに　つつかれてしまうが\nかたい　カラで　まもられている。"
        jp_kanji:
          black: "木の実に　そっくり。間違われて\nとりポケモンに　つつかれてしまうが\n硬い　殻で　守られている。"
          white: "木の実に　そっくり。間違われて\nとりポケモンに　つつかれてしまうが\n硬い　殻で　守られている。"
        en:
          black: "It looks just like a pinecone.\nIts shell protects it from bird\nPokémon that peck it by mistake."
          white: "It looks just like a pinecone.\nIts shell protects it from bird\nPokémon that peck it by mistake."
        fr:
          black: "Il ressemble à une pomme de pin.\nSa carapace le protège des Pokémon\nOiseaux qui le picorent par erreur."
          white: "Il ressemble à une pomme de pin.\nSa carapace le protège des Pokémon\nOiseaux qui le picorent par erreur."
        it:
          black: "Ha l’aspetto di una pigna. Il suo guscio\nlo protegge dai Pokémon uccello che lo\nbeccano per errore."
          white: "Ha l’aspetto di una pigna. Il suo guscio\nlo protegge dai Pokémon uccello che lo\nbeccano per errore."
        de:
          black: "Es sieht aus wie ein Tannenzapfen.\nSeine Schale schützt es vor Vogel-\nPokémon, die an ihm picken wollen."
          white: "Es sieht aus wie ein Tannenzapfen.\nSeine Schale schützt es vor Vogel-\nPokémon, die an ihm picken wollen."
        es:
          black: "Es como una piña piñonera. Su\ncoraza lo protege de los pájaros\nque lo picotean por error."
          white: "Es como una piña piñonera. Su\ncoraza lo protege de los pájaros\nque lo picotean por error."
        ko:
          black: "나무열매와 똑 닮았다. 실수로\n새 포켓몬에게 쪼이기도 하지만\n단단한 껍질이 몸을 보호하고 있다."
          white: "나무열매와 똑 닮았다. 실수로\n새 포켓몬에게 쪼이기도 하지만\n단단한 껍질이 몸을 보호하고 있다."
