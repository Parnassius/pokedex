      abilities:
        - big_pecks
        - super_luck
      hidden_ability: rivalry
      descriptions:
        jp_kana:
          black: "オスは　あたまの　かざりを　ゆらして\nあいてを　いかくする。メスの　ひこう\nのうりょくは　オスを　うわまわる。"
          white: "オスは　あたまに　かざりを　もつ。\nトレーナー　いがいの　ひとには\nけっして　なつかない　せいしつ。"
        jp_kanji:
          black: "オスは　頭の　飾りを　揺らして\n相手を　威嚇する。\nメスの　飛行能力は　オスを　上回る。"
          white: "オスは　頭に　飾りを　持つ。\nトレーナー　以外の　人には\nけっして　なつかない　性質。"
        en:
          black: "Males swing their head plumage to\nthreaten opponents. The females’ flying\nabilities surpass those of the males."
          white: "Males have plumage on their heads.\nThey will never let themselves feel close\nto anyone other than their Trainers."
        fr:
          black: "Le mâle intimide ses ennemis\navec ses caroncules.\nLa femelle vole mieux que le mâle."
          white: "Le mâle a une parure sur la tête.\nIls sont très farouches et ne\ns’attachent qu’à leur Dresseur."
        it:
          black: "Il maschio minaccia il nemico facendo\nondeggiare gli ornamenti del capo.\nLa femmina eccelle nel volo."
          white: "Il maschio ha una decorazione sulla\nfronte. Per indole, non si affeziona\na nessuno tranne l’Allenatore."
        de:
          black: "Männchen schrecken Gegner ab, indem sie\nihren Kopfschmuck schütteln. Weibchen\nverfügen über bessere Flugfertigkeiten."
          white: "Männliche Exemplare tragen eine\nVerzierung am Kopf. Lässt sich von\nNatur aus nur auf seinen Trainer ein."
        es:
          black: "El macho amenaza al enemigo meciendo el\nadorno de su cabeza. Al volar, la hembra\nes mucho más diestra que el macho."
          white: "El macho hace gala de ornamentación\nen la cabeza. No es dado a hacerse amigo\nde alguien que no sea su Entrenador."
        ko:
          black: "수컷은 머리의 장식을 흔들어서\n상대를 위협한다. 암컷의 비행\n능력은 수컷을 뛰어넘는다."
          white: "수컷은 머리에 장식이 있다.\n트레이너가 아닌 사람은\n절대 따르지 않는 성질을 가졌다."
blitzle:
  species_id: 522
  names:
    jp_kana: シママ
    jp_kanji: シママ
    en: Blitzle
    fr: Zébibron
    it: Blitzle
    de: Elezeba
    es: Blitzle
    ko: 줄뮤마
  forms:
    blitzle:
      form_id: 0
      base_stats:
        hp: 45
        attack: 60
        defense: 32
        special_attack: 50
        special_defense: 32
        speed: 76
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - electric
      egg_groups:
        - field
      abilities:
        - lightning_rod
        - motor_drive
      hidden_ability: sap_sipper
      held_items:
