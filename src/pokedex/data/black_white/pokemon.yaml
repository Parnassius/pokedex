      descriptions:
        jp_kana:
          black: "あたまの　コブを　しんどうさせると\nすいちゅうが　なみたつ　だけでなく\nじめんも　じしんのように　ゆれる。"
          white: "すいちゅうと　ちじょうで　せいかつ。\nながく　ネバネバした　したで\nえものを　からめて　とらえる。"
        jp_kanji:
          black: "頭の　コブを　振動させると\n水中が　波立つ　だけでなく\n地面も　地震のように　揺れる。"
          white: "水中と　地上で　生活。\n長く　ネバネバした　舌で\n獲物を　絡めて　捕らえる。"
        en:
          black: "When they vibrate the bumps on their\nheads, they can make waves in water\nor earthquake-like vibrations on land."
          white: "It lives in the water and on land.\nIt uses its long, sticky tongue\nto capture prey."
        fr:
          black: "Quand il fait vibrer la bosse sur sa tête,\nil provoque des ondulations dans l’eau,\nmais aussi des tremblements de terre."
          white: "Il vit dans l’eau et sur la terre ferme.\nIl attrape ses proies avec sa langue\nlongue et gluante."
        it:
          black: "Se fa vibrare il bernoccolo sulla testa\npuò sollevare onde nell’acqua e anche\nprovocare terremoti."
          white: "Vive in acqua e sulla terraferma.\nCattura le prede avvolgendole con\nla sua lunga lingua appiccicosa."
        de:
          black: "Wenn es die Beulen auf seinem Kopf zum\nSchwingen bringt, tobt je nach Umgebung\nentweder das Wasser oder die Erde bebt."
          white: "Es lebt zu Wasser und zu Lande.\nMit seiner langen, klebrigen Zunge\numklammert und fängt es seine Beute."
        es:
          black: "Cuando hace vibrar el bulto de su\ncabeza, no solo se embravece el mar,\nsino que la tierra también tiembla."
          white: "Pasa su vida en el agua y en tierra.\nCaza a sus presas empleando su\nviscosa lengua."
        ko:
          black: "머리의 혹을 진동시키면\n물속에 파동이 일어나며\n땅마저 지진처럼 흔들린다."
          white: "물속과 땅 위에서 생활한다.\n길고 끈적끈적한 혀로\n먹이를 감싸 포획한다."
seismitoad:
