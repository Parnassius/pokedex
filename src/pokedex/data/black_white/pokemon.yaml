          black: "ママンボウの　からだを　おおう\nとくしゅな　ねんまくには\nきずを　なおす　こうかが　ある。"
          white: "おおうなばらを　ただよって　くらす。\nきずついた　ポケモンを　みつけると\nだきかかえて　きしまで　はこぶ。"
        jp_kanji:
          black: "ママンボウの　体を　おおう\n特殊な　粘膜には\n傷を　治す　効果が　ある。"
          white: "大海原を　漂って　暮らす。\n傷ついた　ポケモンを　見つけると\n抱きかかえて　岸まで　運ぶ。"
        en:
          black: "The special membrane enveloping\nAlomomola has the ability to heal wounds."
          white: "Floating in the open sea is how they live.\nWhen they find a wounded Pokémon,\nthey embrace it and bring it to shore."
        fr:
          black: "La membrane spéciale qui entoure\nson corps a la capacité de guérir\nles blessures."
          white: "Il vit en dérivant dans les grands\nocéans. Quand il trouve des Pokémon\nblessés, il les ramène jusqu’à la côte."
        it:
          black: "La membrana speciale che ricopre il\ncorpo di Alomomola ha la capacità di\nguarire le ferite."
          white: "Vive in mare aperto trasportato dalle\nonde. Se si imbatte in un Pokémon ferito,\nlo riaccompagna a riva."
        de:
          black: "Die spezielle Schleimschicht, die seinen\nKörper umgibt, besitzt heilende Kräfte."
          white: "Es treibt durch den Ozean. Findet es ein\nverletztes Pokémon, nimmt es dieses auf\nund trägt es zurück an Land."
        es:
          black: "La membrana viscosa que recubre el\ncuerpo de Alomomola tiene facultades\ncurativas."
          white: "Vive flotando a la deriva en mar abierto.\nSiempre que encuentra un Pokémon\nherido, lo abraza y lo lleva a la costa."
        ko:
          black: "맘복치의 몸을 감싼\n특수한 점막에는 상처를\n회복시키는 효과가 있다."
          white: "넓은 바다를 떠돌아다니며 산다.\n상처입은 포켓몬을 발견하면\n안고서 물가까지 옮긴다."
joltik:
