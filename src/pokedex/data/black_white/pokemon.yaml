          white: "サイコパワーで　あいての　のうみそを\nあやつり　きおくする　えいぞうを\nちがう　ものに　かきかえてしまう。"
        jp_kanji:
          black: "相手の　記憶を　操作する。\n３色の　指を　点滅させて\n仲間と　会話している　らしい。"
          white: "サイコパワーで　相手の　脳みそを\n操り　記憶する　映像を\n違う　ものに　書き換えてしまう。"
        en:
          black: "It can manipulate an opponent’s memory.\nApparently, it communicates by flashing\nits three different-colored fingers."
          white: "It uses psychic power\nto control an opponent’s brain\nand tamper with its memories."
        fr:
          black: "Il peut manipuler les souvenirs de\nses ennemis et fait clignoter ses doigts\ntricolores pour discuter avec ses amis."
          white: "Il manipule l’esprit avec ses pouvoirs\npsychiques et peut modifier les images\nconservées dans les souvenirs."
        it:
          black: "Può manipolare i ricordi dell’avversario.\nPare che comunichi con i suoi simili\nfacendo lampeggiare le dita a tre colori."
          white: "Controlla il cervello dell’avversario con\npoteri psichici e ne sostituisce i ricordi."
        de:
          black: "Manipuliert das gegnerische Gedächtnis.\nLässt es seine drei bunten Finger\naufleuchten, kommuniziert es offenbar."
          white: "Es manipuliert die Gehirne seiner Gegner\nmit Psycho-Kräften, indem es die Bilder\nihrer Erinnerungen umgestaltet."
        es:
          black: "Manipula los recuerdos. Dicen que se\ncomunica con sus compañeros cuando\nsus dedos tricolores parpadean."
          white: "Controla el cerebro del rival con su\npoder psíquico y manipula sus recuerdos."
        ko:
          black: "상대의 기억을 조작한다.\n3가지 색 손가락을 점멸시켜\n동료와 대화하는 듯하다."
          white: "사이코 파워로 상대의 뇌를\n조종하여 기억된 영상을\n다른 것으로 바꿔 버린다."
litwick:
