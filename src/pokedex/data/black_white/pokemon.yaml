sawsbuck:
  species_id: 586
  names:
    jp_kana: メブキジカ
    jp_kanji: メブキジカ
    en: Sawsbuck
    fr: Haydaim
    it: Sawsbuck
    de: Kronjuwild
    es: Sawsbuck
    ko: 바라철록
  forms:
    sawsbuck_spring_form:
      form_id: 0
      names:
        jp_kana: はるのすがた
        jp_kanji: はるのすがた
        en: Spring Form
        fr: Forme Printemps
        it: Forma Primavera
        de: Frühlingsform
        es: Forma Primavera
        ko: 봄의 모습
      base_stats:
        hp: 80
        attack: 100
        defense: 70
        special_attack: 60
        special_defense: 70
        speed: 95
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - normal
        - grass
      egg_groups:
        - field
      abilities:
        - chlorophyll
        - sap_sipper
      hidden_ability: serene_grace
      descriptions:
        jp_kana:
          black: "きせつに　よって　すみかを　かえる。\nひとびとは　メブキジカの　ツノで\nきせつの　うつりかわりを　かんじる。"
          white: "きせつによって　ツノに　はえる\nくさばなが　かわる。りっぱな　ツノの\nもちぬしが　むれを　ひきいている。"
        jp_kanji:
          black: "季節によって　住処を　変える。\n人々は　メブキジカの　ツノで\n季節の　移り変わりを　感じる。"
          white: "季節によって　ツノに　生える\n草花が　変わる。立派な　ツノの\n持ち主が　群れを　率いている。"
        en:
          black: "They migrate according to the seasons.\nPeople can tell the season by looking at\nSawsbuck’s horns."
          white: "The plants growing on its horns change\naccording to the season. The leaders of\nthe herd possess magnificent horns."
        fr:
          black: "Il change d’habitat selon les saisons.\nLes gens constatent le passage des\nsaisons en regardant ses ramures."
          white: "Le feuillage qui pousse sur sa ramure\nchange au fil des saisons. Celui qui a\nla plus belle dirige le troupeau."
        it:
          black: "Cambia dimora a seconda delle stagioni.\nGli uomini si accorgono del cambio di\nstagione osservando le sue corna."
          white: "I fiori che crescono sulle sue corna\ncambiano a seconda della stagione.\nI capibranco hanno corna meravigliose."
        de:
          black: "An seinem Geweih kann man ablesen, wann\neine neue Jahreszeit beginnt. Sein Revier\nwechselt mit jeder neuen Jahreszeit."
          white: "Je nach Jahreszeit wächst eine andere\nPflanze auf seinem Geweih. Exemplare mit\nprächtiger Krone führen die Herde an."
        es:
          black: "Cambia de morada dependiendo de las\nestaciones. Observando sus cuernos, la\ngente sabe cuándo estas van a cambiar."
          white: "La vegetación de sus cuernos cambia\nsegún la estación. El líder de la manada\nes aquel con cuernos más majestuosos."
        ko:
          black: "계절에 따라 거처를 바꾼다.\n사람들은 바라철록의 뿔에서\n계절의 변화를 느낀다."
          white: "계절에 따라 뿔에 나는\n화초가 바뀐다. 훌륭한 뿔을\n가진 자가 무리를 거느린다."
