      form_id: 0
      base_stats:
        hp: 75
        attack: 140
        defense: 65
        special_attack: 112
        special_defense: 65
        speed: 110
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - rock
        - flying
      egg_groups:
        - flying
        - water_3
      abilities:
        - defeatist
      descriptions:
        jp_kana:
          black: "ちじょうで　じょそうを　つけてから\nとびたつ。なかまと　きょうりょくして\nえものを　しとめる　ちのうを　もつ。"
          white: "とぶよりも　はしるほうが　とくい。\nじどうしゃにも　まけない　スピードで\nはしりまわり　えものを　つかまえる。"
        jp_kanji:
          black: "地上で　助走を　つけてから\n飛び立つ。仲間と　協力して\n獲物を　しとめる　知能を　持つ。"
          white: "飛ぶよりも　走る方が　得意。\n自動車にも　負けない　スピードで\n走り回り　獲物を　捕まえる。"
        en:
          black: "They are intelligent and will cooperate\nto catch prey. From the ground, they\nuse a running start to take flight."
          white: "It runs better than it flies.\nIt catches prey by running at speeds\ncomparable to those of an automobile."
        fr:
          black: "Il s’envole après avoir pris de l’élan.\nIl est assez intelligent pour chasser\nses proies en groupe."
          white: "Il est plus doué pour courir que pour\nvoler. Il fonce sur ses proies aussi vite\nqu’une voiture pour les attraper."
        it:
          black: "Spicca il volo prendendo la rincorsa\nda terra. Collabora coi suoi simili per\ncatturare le prede."
          white: "È più versato nella corsa che nel volo.\nCattura le prede correndo a una\nvelocità pari a quella di un’automobile."
        de:
          black: "Bevor es abhebt, nimmt es am Boden\nAnlauf. Es ist schlau genug, seine Beute\nzusammen mit Artgenossen zu jagen."
          white: "Zu Fuß ist es schneller unterwegs als in\nder Luft. Bei der Jagd kann es in Sachen\nTempo selbst mit Autos mithalten."
        es:
          black: "Levanta el vuelo tras coger carrerilla.\nCoopera con sus compañeros de bandada\npara atrapar a sus presas."
          white: "Se le da mejor correr que volar.\nAtrapa a sus presas corriendo\nmás rápido que un coche."
        ko:
          black: "지상에서 도움닫기를 하여\n날아오른다. 동료와 협력하여\n먹이를 잡는 지능을 가졌다."
          white: "나는 것보다 달리는 것이 특기이다.\n자동차에도 지지 않는 스피드로\n달려 먹이를 잡는다."
trubbish:
