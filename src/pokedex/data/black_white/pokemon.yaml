          white: "しんわに　とうじょうする　ポケモン。\nしっぽの　なかに　でんきを　つくる\nきょだいな　はつでんきを　もつ。"
        jp_kanji:
          black: "しっぽで　電気を　作り出す。\n全身を　雷雲に　隠して\nイッシュ地方の　空を　飛ぶ。"
          white: "神話に　登場する　ポケモン。\nしっぽの　中に　電気を　作る\n巨大な　発電器を　持つ。"
        en:
          black: "Concealing itself in lightning clouds,\nit flies throughout the Unova region.\nIt creates electricity in its tail."
          white: "This Pokémon appears in legends.\nIn its tail, it has a giant generator\nthat creates electricity."
        fr:
          black: "Sa queue produit de l’électricité.\nIl dissimule son corps dans un nuage\nélectrique et plane dans le ciel d’Unys."
          white: "Un Pokémon mythique.\nIl possède dans sa queue un énorme\ngénérateur qui produit de l’électricité."
        it:
          black: "Produce elettricità con la coda. Vola\nnei cieli di Unima nascosto fra lampi e\nsaette."
          white: "Pokémon di cui si racconta nei miti.\nNella coda ha un enorme generatore\ndi elettricità."
        de:
          black: "Sein Schweif erzeugt Strom. Es verbirgt\nsich hinter dichten Gewitterwolken und\nfliegt durch den Luftraum über Einall."
          white: "Ein Pokémon, von dem schon in Sagen die\nRede ist. Sein Schweif enthält ein\ngewaltiges Organ zur Stromerzeugung."
        es:
          black: "Genera electricidad con su cola y,\npara ocultarse, sobrevuela Teselia\nenvuelto en nubes de rayos."
          white: "Pokémon que aparece en mitos de antaño.\nSu cola está provista de un enorme\ngenerador de electricidad."
        ko:
          black: "꼬리로 전기를 만들어 낸다.\n전신을 번개 구름에 숨기고\n하나지방의 하늘을 난다."
          white: "신화에 등장하는 포켓몬이다.\n꼬리 속에 전기를 만드는\n거대한 발전기가 있다."
landorus:
