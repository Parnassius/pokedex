      descriptions:
        jp_kana:
          black: "アップテンポの　おどりと　おとで\nはなの　タネを　ねらう　てんてきの\nとりポケモンを　おいはらうのだ。"
          white: "かんそうした　とちで　くらす。\nからだを　リズミカルに　うごかすと\nマラカスにような　おとを　かなでる。"
        jp_kanji:
          black: "アップテンポの　踊りと　音で\n花の　タネを　ねらう　天敵の\nとりポケモンを　追い払うのだ。"
          white: "乾燥した　土地で　暮らす。\n体を　リズミカルに　動かすと\nマラカスのような　音を　奏でる。"
        en:
          black: "It uses an up-tempo song and dance\nto drive away the bird Pokémon that\nprey on its flower seeds."
          white: "Arid regions are their habitat.\nThey move rhythmically, making\na sound similar to maracas."
        fr:
          black: "Avec une danse et des sons saccadés,\nil fait fuir ses prédateurs, les Pokémon\nOiseaux dévoreurs de graines de fleur."
          white: "Il vit dans les endroits secs.\nQuand il bouge son corps en rythme,\nil fait un bruit de maracas."
        it:
          black: "Con danze e suoni a ritmo vivace scaccia\ni suoi predatori, i Pokémon uccello, che\ndivorano i semi dei suoi fiori."
          white: "Vive nelle zone aride. Se muove il corpo\na tempo produce un suono di maracas."
        de:
          black: "Verjagt Vogel-Pokémon, die auf seine\nBlüten aus sind, mit einem flotten\nTänzchen und lauter Untermalung."
          white: "Erzeugt durch rhythmische Bewegungen\nLaute, die dem Klang von Maracas ähneln.\nLebt an trockenen Orten."
        es:
          black: "Espanta a los Pokémon pájaro con un\nbaile rápido y haciendo ruido para evitar\nque picoteen las semillas de sus flores."
          white: "Vive en territorio árido.\nEmite un sonido parecido a unas\nmaracas si se mueve de forma rítmica."
        ko:
          black: "템포가 빠른 춤과 소리로\n꽃씨를 노리는 천적인\n새포켓몬을 쫓아버린다."
          white: "건조한 땅에서 산다.\n몸을 리드미컬하게 움직이면\n마라카스 같은 소리를 낸다."
