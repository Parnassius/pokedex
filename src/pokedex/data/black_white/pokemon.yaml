      types:
        - water
      egg_groups:
        - field
      abilities:
        - gluttony
      hidden_ability: torrent
      held_items:
        common: oran_berry
        rare: rindo_berry
      descriptions:
        jp_kana:
          black: "あたまの　ふさに　ためた　みずは\nえいよう　たっぷり。しょくぶつに\nかけると　おおきく　そだつのだ。"
          white: "かんそうした　かんきょうに　よわい。\nあたまの　ふさに　ためた　みずを\nしっぽから　まいて　しめらせる。"
        jp_kanji:
          black: "頭の　ふさに　ためた　水は\n栄養　たっぷり。\n植物に　かけると　大きく　育つのだ。"
          white: "乾燥した　環境に　弱い。\n頭の　ふさに　ためた　水を\nしっぽから　まいて　湿らせる。"
        en:
          black: "The water stored inside the tuft on\nits head is full of nutrients. Plants\nthat receive its water grow large."
          white: "It does not thrive in dry environments.\nIt keeps itself damp by shooting water\nstored in its head tuft from its tail."
        fr:
          black: "L’eau contenue dans la mèche sur sa\ntête est pleine de nutriments. Elle fait\npousser les plantes avec vigueur."
          white: "Il supporte mal les environnements secs.\nIl s’humidifie avec sa queue en aspirant\nl’eau stockée dans la mèche sur sa tête."
        it:
          black: "L’acqua accumulata nel ciuffo è ricca\ndi nutrimento e fa crescere rigogliose\nle piante che ne vengono annaffiate."
          white: "Risente degli ambienti molto asciutti. Per\ntenersi umido, sparge dalla coda l’acqua\ncontenuta nel ciuffo sulla testa."
        de:
          black: "Das Wasser, das es im Büschel auf seinem\nKopf sammelt, ist äußerst nahrhaft und\nverhilft Pflanzen zu großem Wachstum."
          white: "Es wringt Wasser aus dem Büschel auf\nseinem Kopf und bespritzt damit Gegner.\nKein Pokémon für trockene Gegenden."
        es:
          black: "La acuosidad que acumula en su mata\nde pelo es rica en nutrientes, ideal para\nregar plantas y que crezcan mucho."
          white: "Su punto débil son los entornos secos.\nAlmacena agua en sus mechones y con ella\nmoja todo moviendo la cola."
        ko:
          black: "머리의 송아리에 모은 물은\n영양이 가득하다. 식물에\n뿌려주면 크게 자란다."
          white: "건조한 환경에 약하다.\n머리의 송아리에 모은 물을\n꼬리로 뿌려 주위를 적신다."
simipour:
  species_id: 516
  names:
