        jp_kana:
          black: "ランクルス　どうしが　あくしゅすると\nのうみそが　ネットワークで　つながり\nサイコパワーが　ぞうふくされるのだ。"
          white: "いわを　にぎりつぶす　あくりょくの\nうでを　あやつり　たたかう。\nたかい　ちのうを　もつ　ポケモン。"
        jp_kanji:
          black: "ランクルス　同士が　握手すると\n脳みそが　ネットワークで　つながり\nサイコパワーが　増幅されるのだ。"
          white: "岩を　握りつぶす　握力の\n腕を　操り　戦う。\n高い　知能を　持つ　ポケモン。"
        en:
          black: "When Reuniclus shake hands, a network\nforms between their brains, increasing\ntheir psychic power."
          white: "These remarkably intelligent Pokémon\nfight by controlling arms that can\ngrip with rock-crushing power."
        fr:
          black: "Quand ils se tiennent par la main,\nleurs cerveaux forment un réseau qui\ndémultiplie leurs pouvoirs psychiques."
          white: "Il combat avec ses bras assez puissants\npour broyer des rochers.\nC’est un Pokémon très intelligent."
        it:
          black: "Quando i Reuniclus si tengono per mano,\ni loro cervelli si interconnettono e\ni poteri psichici si amplificano."
          white: "Lotta agitando i suoi arti, capaci di\ndistruggere una roccia stritolandola.\nÈ un Pokémon dalla grande intelligenza."
        de:
          black: "Schütteln sich zwei von ihnen die Hände,\nbilden ihre Denkapparate ein Netzwerk\nund ihre Psycho-Kräfte werden stärker."
          white: "Sein Griff ist so stark, dass es damit\nganze Felsen zermalmen kann.\nEs ist sehr intelligent."
        es:
          black: "Cuando los Reuniclus se dan la mano,\nsus cerebros se conectan y multiplican\nsus poderes psíquicos."
          white: "La fortaleza de sus brazos le permite\nhacer añicos hasta rocas. Está dotado\nde una inteligencia superior."
        ko:
          black: "란쿨루스끼리 악수를 하면\n뇌가 네트워크처럼 연결되어\n사이코 파워가 증폭된다."
          white: "바위를 묵사발로 만드는 손 힘을\n가진 팔을 조종하여 싸운다.\n높은 지능을 지닌 포켓몬이다."
ducklett:
