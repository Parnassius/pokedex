      descriptions:
        jp_kana:
          black: "うみと　りくちで　せいかつする。\nはりてで　タンカーの　ふなぞこに\nあなを　あける　パワーの　もちぬし。"
          white: "あごの　ちからが　けたちがい。\nえものと　いっしょに　てっこつや\nいわも　かみくだいて　たべてしまう。"
        jp_kanji:
          black: "海と　陸地で　生活する。\n張り手で　タンカーの　船底に\n穴を　開ける　パワーの　持ち主。"
          white: "アゴの　力が　けたちがい。\n獲物と　一緒に　鉄骨や　岩も\nかみ砕いて　食べてしまう。"
        en:
          black: "They can live both in the ocean and on\nland. A slap from one of them is enough\nto open a hole in the bottom of a tanker."
          white: "Incredible jaw strength enables them\nto chew up steel beams and rocks\nalong with their prey."
        fr:
          black: "Il vit sur terre et en mer.\nSes bras surpuissants peuvent percer\ndes trous dans la coque des paquebots."
          white: "Ses mâchoires sont très puissantes.\nIl dévore sans distinction ses proies,\nl’acier et les rochers."
        it:
          black: "Vive nel mare e sulla terraferma. Ha una\nforza tale da sfondare con un solo colpo\nil fondo di una nave cisterna."
          white: "Delle mascelle incredibilmente potenti\ngli consentono di inghiottire rocce e\ntravi di acciaio, oltre alle sue prede."
        de:
          black: "Es lebt im Meer und an Land. Es ist so\nstark, dass es mit einem einzigen Hieb\nein Loch in ein Schiff reißen kann."
          white: "Sein Kiefer ist so stark wie kaum etwas\nanderes. Mit seiner Beute verschluckt\nes auch mal Felsen und Stahlträger."
        es:
          black: "Vive en el mar y en la superficie.\nSus garras pueden abrir un agujero\nen el fondo de un petrolero."
          white: "La fuerza de sus mandíbulas es enorme.\nTritura presas, huesos y rocas a la vez\ny los engulle."
        ko:
          black: "바다와 육지에서 생활한다.\n손바닥으로 쳐서 배 밑바닥에\n구멍을 내는 파워의 소유자다."
          white: "턱의 힘이 엄청나다.\n먹이와 함께 철골이나 바위도\n씹어 삼켜 버린다."
archen:
  species_id: 566
  names:
    jp_kana: アーケン
    jp_kanji: アーケン
    en: Archen
    fr: Arkéapti
    it: Archen
    de: Flapteryx
    es: Archen
    ko: 아켄
