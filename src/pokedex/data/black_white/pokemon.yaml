        jp_kanji:
          black: "赤と　青の　バスラオは\nすぐに　ケンカするほど　仲が　悪い。\nとても　乱暴な　ポケモン。"
          white: "赤と　青の　バスラオは　仲が　悪いが\nなぜか　色の　違う　個体が\n群れに　紛れ込んでいる。"
        en:
          black: "Red and blue Basculin get along so\npoorly, they’ll start fighting instantly.\nThese Pokémon are very hostile."
          white: "Red and blue Basculin usually do not\nget along, but sometimes members of one\nschool mingle with the other’s school."
        fr:
          black: "Les bleus et les rouges se détestent\ncordialement et se battent dès qu’ils\ns’aperçoivent. Un Pokémon très violent."
          white: "Les rouges et les bleus se détestent,\nmais il y en a toujours un ou deux\ndans un groupe de l’autre couleur."
        it:
          black: "I Basculin con la linea rossa e quelli con\nla linea blu litigano per un nonnulla.\nSono dei Pokémon molto aggressivi."
          white: "I Basculin con la linea rossa e quelli con\nla linea blu non vanno d’accordo ma,\nchissà perché, in gruppo si mescolano."
        de:
          black: "Rot gestreifte und blau gestreifte\nExemplare kriegen sich sofort in die\nHaare. Ein äußerst aggressives Pokémon."
          white: "Rot gestreifte und blau gestreifte\nExemplare sind sich feindlich gesonnen.\nDoch ist jeder Schwarm bunt gemischt."
        es:
          black: "Los Basculin con la raya roja y aquellos\ncon la raya azul no dejan de pelearse.\nSon unos Pokémon muy violentos."
          white: "Los Basculin con la raya roja y aquellos\ncon la raya azul se llevan fatal, pero\nalgunos tienden a agruparse."
        ko:
          black: "적색과 청색 배쓰나이는 툭하면\n싸울 만큼 사이가 나쁘다.\n매우 난폭한 포켓몬이다."
          white: "빨강과 파랑 배쓰나이는 사이가\n나쁨에도 불구하고 같은 무리에\n다른 색 개체가 섞여 있다."
