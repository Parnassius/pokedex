      descriptions:
        jp_kana:
          black: "とりポケモンの　そせんと　いわれる。\nとぶことは　できず　えだから　えだへ\nとびうつり　せいかつしていたらしい。"
          white: "かせきから　ふっかつした　ポケモン。\nあらゆる　とりポケモンの　そせんと\nかんがえられている。"
        jp_kanji:
          black: "とりポケモンの　祖先と　言われる。\n飛ぶことは　できず　枝から　枝へ\n飛び移り　生活していたらしい。"
          white: "化石から　復活した　ポケモン。\nあらゆる　とりポケモンの　祖先と\n考えられている。"
        en:
          black: "Said to be an ancestor of bird Pokémon,\nthey were unable to fly and moved about\nby hopping from one branch to another."
          white: "Revived from a fossil, this Pokémon\nis thought to be the ancestor of all\nbird Pokémon."
        fr:
          black: "On dit qu’il serait l’ancêtre de tous les\nPokémon Oiseaux. Il ne sait pas voler et\nse déplace en sautant d’arbre en arbre."
          white: "Un Pokémon recréé à partir d’un fossile.\nOn pense qu’il est l’ancêtre de tous\nles Pokémon Oiseaux."
        it:
          black: "Si dice sia antenato dei Pokémon uccello.\nSiccome non sa volare, si sposta di ramo\nin ramo saltando."
          white: "Pokémon risvegliatosi da un fossile.\nSi ritiene che sia l’antenato di tutti\ni Pokémon uccello."
        de:
          black: "Man nennt es den Urvater der\nVogel-Pokémon. Da es nicht fliegen kann,\nbewegt es sich hüpfend von Ast zu Ast."
          white: "Es wurde aus einem Fossil reanimiert.\nMan geht davon aus, dass es der Urahn\naller Vogel-Pokémon ist."
        es:
          black: "Dicen que es el Pokémon pájaro\nprimigenio. No puede volar, así que\nsolo salta de rama en rama."
          white: "Pokémon que renació de un fósil.\nDicen que es el antepasado de todos\nlos Pokémon pájaro."
        ko:
          black: "새포켓몬의 조상이라고 전해진다.\n날 수 없어서 가지에서 가지로\n뛰어다니며 생활했다고 한다."
          white: "화석에서 부활한 포켓몬이다.\n모든 새포켓몬의 조상이라\n여겨지고 있다."
archeops:
  species_id: 567
  names:
    jp_kana: アーケオス
