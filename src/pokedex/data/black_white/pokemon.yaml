      descriptions:
        jp_kana:
          black: "たいないの　ほのおが　もえあがると\nうごきの　キレと　スピードが　ます。\nピンチになると　けむりを　ふきだす。"
          white: "たべた　ものを　ねんりょうにして\nいぶくろで　ほのおを　もやすのだ。\nおこると　かりょくが　あがる。"
        jp_kanji:
          black: "体内の　炎が　燃え上がると\n動きの　キレと　スピードが　増す。\nピンチになると　煙を　吹き出す。"
          white: "食べた　ものを　燃料にして\n胃袋で　炎を　燃やすのだ。\n怒ると　火力が　上がる。"
        en:
          black: "When its internal fire flares up, its\nmovements grow sharper and faster.\nWhen in trouble, it emits smoke."
          white: "Whatever it eats becomes fuel for the\nflame in its stomach. When it is angered,\nthe intensity of the flame increases."
        fr:
          black: "Quand le feu dans son corps s’embrase,\nsa vitesse et son agilité augmentent.\nEn cas d’urgence, il crache de la fumée."
          white: "Ce qu’il mange devient du combustible\npour le feu dans son estomac.\nLa colère vivifie ses flammes."
        it:
          black: "Quando la fiamma interna arde intensa,\ndiventa più rapido e scattante.\nNei momenti critici esala fumo."
          white: "Usa ciò che divora come combustibile per\nprodurre fiamme nello stomaco. Quando si\narrabbia, le fiamme aumentano."
        de:
          black: "Lodert das Feuer in ihm auf, bewegt es\nsich geschmeidiger und schneller. Bei\nGefahr lässt es ordentlich Dampf ab."
          white: "Nutzt Nahrung als Brennstoff, um das\nFeuer in seinem Magen zu schüren. Mit\nWut im Bauch heizt es ungleich stärker."
        es:
          black: "Cuando las llamas de su interior se\navivan, aumenta su velocidad y agilidad.\nEmite humo si está en peligro."
          white: "Convierte lo que come en combustible\ny alimenta el fuego en su estómago.\nSi se enfada, se intensifican sus llamas."
        ko:
          black: "체내의 불꽃이 타오르면\n움직임이 더 빠르고 예리해진다.\n위급해지면 연기를 뿜어낸다."
          white: "먹은 음식을 연료로 삼아\n위 속에서 불꽃을 태운다.\n화가 나면 화력이 올라간다."
emboar:
