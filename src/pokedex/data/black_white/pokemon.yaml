        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ground
        - dark
      egg_groups:
        - field
      abilities:
        - intimidate
        - moxie
      hidden_ability: anger_point
      descriptions:
        jp_kana:
          black: "さばくの　すなの　なかで　せいかつ。\nたいように　あたためられた　すなが\nたいおんの　ていかを　ふせぐのだ。"
          white: "すなの　なかに　もぐり　めと　はなを\nそとに　だして　いどうする。\nくろい　まくが　めを　まもる。"
        jp_kanji:
          black: "砂漠の　砂の　中で　生活。\n太陽に　暖められた　砂が\n体温の　低下を　防ぐのだ。"
          white: "砂の　中に　潜り　目と　鼻を\n外に　出して　移動する。\n黒い　膜が　目を　守る。"
        en:
          black: "They live buried in the sands of the\ndesert. The sun-warmed sands prevent\ntheir body temperature from dropping."
          white: "It moves along below the sand’s surface,\nexcept for its nose and eyes. A dark\nmembrane shields its eyes from the sun."
        fr:
          black: "Il vit dans le sable des déserts.\nLe sable chauffé par le soleil empêche\nson corps de refroidir."
          white: "Il se déplace dans le sable en gardant\nle nez et les yeux à découvert.\nLa membrane noire protège ses yeux."
        it:
          black: "Vive nella sabbia del deserto che,\nscaldata dal sole, impedisce alla sua\ntemperatura corporea di scendere."
          white: "Si nasconde sotto la sabbia e si sposta\ncacciando fuori gli occhi e il naso.\nUna membrana nera gli protegge gli occhi."
        de:
          black: "Es lebt im Wüstensand. Der durch die\nSonne erhitzte Sand gewährleistet, dass\nes immer schön warm eingepackt ist."
          white: "Wenn es sich durch den Sand gräbt,\nragen nur noch Nase und Augen hervor.\nDie schwarze Haut dient als Augenschutz."
        es:
          black: "Vive en las arenas desérticas, donde las\naltas temperaturas de las mismas evitan\nque su cuerpo se enfríe."
          white: "Se desplaza hundido en la arena, dejando\nal descubierto solo los ojos y la nariz.\nUna membrana negra le protege los ojos."
        ko:
          black: "사막의 모래 속에서 생활한다.\n태양 때문에 따뜻해진 모래가\n체온 저하를 막아준다."
          white: "모래 속에 파고들어 눈과 코를\n밖에 내놓고 이동한다.\n검은 막이 눈을 보호한다."
krokorok:
