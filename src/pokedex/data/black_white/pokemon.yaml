      descriptions:
        jp_kana:
          black: "ちいさい　ポケモンを　みつけると\nうでの　カッターと　ねんちゃくいとで\nはっぱの　ふくを　ぬう　しゅうせい。"
          white: "おちばが　はっこうする　ねつで\nタマゴを　あたためる。クルミルに\nはっぱで　おくるみを　つくる。"
        jp_kanji:
          black: "小さい　ポケモンを　見つけると\n腕の　カッターと　粘着糸で\n葉っぱの　服を　縫う　習性。"
          white: "落ち葉が　発酵する　熱で\nタマゴを　温める。クルミルに\n葉っぱで　おくるみを　作る。"
        en:
          black: "Upon finding a small Pokémon, it weaves\nclothing for it from leaves, using the\ncutters on its arms and sticky silk."
          white: "It keeps its eggs warm with heat from\nfermenting leaves. It also uses leaves\nto make warm wrappings for Sewaddle."
        fr:
          black: "Quand il trouve de petits Pokémon, il\nleur coud des vêtements de feuilles en\nutilisant ses coupoirs et son fil adhésif."
          white: "Il réchauffe les œufs avec la chaleur\nde l’humus. Il fabrique des langes pour\nles Larveyette avec des feuilles."
        it:
          black: "Ha l’abitudine di cucire vestiti di foglie\nper i piccoli Pokémon che incontra,\nusando le lame sugli arti e filo viscoso."
          white: "Sfrutta il calore dell’humus per covare\nle sue uova e fabbrica coperte di\nfoglie per avvolgere Sewaddle."
        de:
          black: "Findet es ein junges Pokémon, kann es\nnicht anders, als ihm mit seinen Scheren\nund Klebefäden ein Kleidchen zu nähen."
          white: "Nutzt die Hitze kompostierenden Laubes\nzum Ausbrüten von Eiern. Es fertigt aus\nBlättern Kleidchen für Strawickl an."
        es:
          black: "Cuando se encuentra con un pequeño\nPokémon, suele usar sus cuchillas y\nlíquido viscoso para hacerle ropa."
          white: "Calienta sus huevos con el calor\ndesprendido por el humus. Hace\nmantillas con las hojas para Sewaddle."
        ko:
          black: "작은 포켓몬을 발견하면\n팔의 커터와 점착실로 잎사귀\n옷을 만드는 습성이 있다."
          white: "낙엽이 발효되는 열로\n알을 따뜻하게 한다. 잎사귀로\n두르보의 포대기를 만든다."
venipede:
  species_id: 543
  names:
    jp_kana: フシデ
    jp_kanji: フシデ
    en: Venipede
    fr: Venipatte
    it: Venipede
    de: Toxiped
    es: Venipede
    ko: 마디네
  forms:
    venipede:
      form_id: 0
      base_stats:
        hp: 30
        attack: 45
        defense: 59
        special_attack: 30
        special_defense: 39
        speed: 57
      evs_yield:
        hp: 0
