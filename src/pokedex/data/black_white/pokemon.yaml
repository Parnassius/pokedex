      descriptions:
        jp_kana:
          black: "ポケモンを　まもるため　にんげんと\nあらそった　でんせつの　ポケモン。\nちんちゃく　れいせいな　せいかく。"
          white: "はがねの　からだと　こころを　もつ。\nにらみつけるだけで　きょうぼうな\nポケモンも　したがわせてしまう。"
        jp_kanji:
          black: "ポケモンを　守るため\n人間と　争った　伝説の　ポケモン。\n沈着　冷静な　性格。"
          white: "鋼の　体と　心を　持つ。\nにらみつけるだけで　凶暴な\nポケモンも　従わせてしまう。"
        en:
          black: "This legendary Pokémon battled against\nhumans to protect Pokémon.\nIts personality is calm and composed."
          white: "It has a body and heart of steel.\nIts glare is sufficient to make even\nan unruly Pokémon obey it."
        fr:
          black: "Un Pokémon légendaire qui a combattu\nles humains pour protéger les Pokémon.\nIl est d’un naturel calme et posé."
          white: "Il possède un corps et un cœur de fer.\nIl peut mater les Pokémon les plus\nagressifs d’un simple regard."
        it:
          black: "Pokémon leggendario che ha lottato\ncontro gli umani per difendere i Pokémon.\nHa un carattere calmo e controllato."
          white: "Ha un corpo e uno spirito d’acciaio. Gli\nbasta lo sguardo per farsi ubbidire\nanche dai Pokémon più feroci."
        de:
          black: "Ein Legendäres Pokémon, das sich zum\nSchutz der Pokémon mit den Menschen\nanlegte. Eine kühle, gelassene Natur."
          white: "Sein Körper und sein Herz sind aus Stahl.\nEin böser Blick genügt und selbst die\nwildesten Pokémon unterwerfen sich ihm."
        es:
          black: "Pokémon legendario que luchó contra los\nhumanos para defender a los Pokémon.\nEs frío y mantiene la serenidad."
          white: "Posee un cuerpo y un corazón de acero.\nBasta una mirada suya para que\nPokémon violentos le obedezcan."
        ko:
          black: "포켓몬을 지키기 위해 인간과\n싸운 전설의 포켓몬이다.\n침착하고 냉정한 성격이다."
          white: "강철의 몸과 마음을 지녔다.\n째려보기만 해도 난폭한\n포켓몬마저도 따르게 된다."
