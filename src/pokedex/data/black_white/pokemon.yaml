      descriptions:
        jp_kana:
          black: "ほうでんすると　たてがみが　ひかる。\nたてがみの　ひかりかたで　なかまと\nコミュニケーションを　とっている。"
          white: "かみなりぐもで　そらが　おおわれると\nあらわれる。たてがみで　カミナリを\nキャッチして　でんきを　ためる。"
        jp_kanji:
          black: "放電すると　たてがみが　光る。\nたてがみの　光り方で　仲間と\nコミュニケーションを　とっている。"
          white: "雷雲で　空が　おおわれると\n現れる。たてがみで　雷を\nキャッチして　電気を　ためる。"
        en:
          black: "Its mane shines when it discharges\nelectricity. They use their flashing\nmanes to communicate with one another."
          white: "When thunderclouds cover the sky,\nit will appear. It can catch lightning\nwith its mane and store the electricity."
        fr:
          black: "Leur crinière scintille quand ils lâchent\nune décharge électrique. Ils se servent\nde ces scintillements pour communiquer."
          white: "Il apparaît quand le ciel est à l’orage.\nIl capte les éclairs avec sa crinière\net accumule de l’électricité."
        it:
          black: "Quando libera scariche elettriche, gli si\nillumina la criniera. Variando il tipo di\nilluminazione comunica con i compagni."
          white: "Appare quando il cielo si riempie di fulmini\ne saette. Accumula elettricità attirando\ni fulmini con la criniera."
        de:
          black: "Wenn es Strom entlädt, blitzt seine\nMähne auf. Auf diese Weise kann es\nauch mit Artgenossen kommunizieren."
          white: "Es erscheint, wenn Gewitterwolken den\nHimmel verdunkeln. Es fängt mit seiner\nMähne Blitze und hortet ihre Energie."
        es:
          black: "Su crin brilla al soltar descargas.\nTambién utiliza ese brillo para\ncomunicarse con otros de su especie."
          white: "Aparece cuando nubes envueltas en\nrayos encapotan el cielo. Atrapa rayos\ncon su crin y almacena electricidad."
        ko:
          black: "방전하면 갈기가 빛난다.\n갈기에서 나는 빛으로 동료와\n의사소통을 한다."
          white: "번개 구름이 하늘을 뒤덮으면\n나타난다. 갈기로 번개를\n붙잡아 전기를 모은다."
zebstrika:
  species_id: 523
  names:
    jp_kana: ゼブライカ
    jp_kanji: ゼブライカ
    en: Zebstrika
    fr: Zéblitz
    it: Zebstrika
    de: Zebritz
    es: Zebstrika
    ko: 제브라이카
  forms:
    zebstrika:
      form_id: 0
      base_stats:
        hp: 75
        attack: 100
        defense: 63
        special_attack: 80
        special_defense: 63
        speed: 116
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 2
      types:
        - electric
      egg_groups:
        - field
      abilities:
        - lightning_rod
        - motor_drive
      hidden_ability: sap_sipper
      held_items:
        common: cheri_berry
      descriptions:
        jp_kana:
          black: "いなずまのような　しゅんぱつりょく。\nゼブライカが　ぜんそくりょくで\nはしると　らいめいが　ひびきわたる。"
          white: "きしょうが　はげしく　おこると\nたてがみから　しほうはっぽうに\nでんげきを　うちまくるので　きけん。"
        jp_kanji:
          black: "稲妻のような　瞬発力。\nゼブライカが　全速力で　走ると\n雷鳴が　響きわたる。"
          white: "気性が　激しく\n怒ると　たてがみから 四方八方に\n電撃を　撃ちまくるので 危険。"
        en:
          black: "They have lightning-like movements.\nWhen Zebstrika run at full speed,\nthe sound of thunder reverberates."
          white: "This ill-tempered Pokémon is dangerous\nbecause when it’s angry, it shoots\nlightning from its mane in all directions."
        fr:
          black: "Il réagit à la vitesse de l’éclair.\nLorsqu’il est en plein galop, on peut\nentendre le grondement du tonnerre."
          white: "Il est agressif et projette des charges\nélectriques dans toutes les directions\nquand il est en colère. Faites attention!"
        it:
          black: "È scattante come una saetta.\nSe corre alla massima velocità, si sente\nun rimbombo di tuoni."
          white: "Quando si arrabbia, diventa impetuoso e\ntemibile. Lancia scariche elettriche in\nogni direzione con la criniera."
        de:
          black: "Es ist explosiv wie ein Blitz. Galoppiert\nes mit voller Geschwindigkeit drauflos,\nkann man Donnerhall vernehmen."
          white: "Ein stürmischer Geselle. Besonders\ngefährlich ist es, wenn es wütend ist und\nin alle Richtungen Stromsalven entlädt."
        es:
          black: "Su velocidad se asemeja a la de un rayo.\nSi corre al máximo, se dejan oír truenos\npor doquier."
          white: "Tiene mucho temperamento. Al enfadarse,\nlanza descargas en todas direcciones,\nlo que supone un peligro a su alrededor."
        ko:
          black: "천둥번개 같은 순발력을 가지고 있다.\n제브라이카가 전속력으로 달리면\n천둥소리가 울려 퍼진다."
          white: "기질이 격해서 화가 나면\n갈기에서 사방팔방으로\n전격을 마구 날리므로 위험하다."
roggenrola:
  species_id: 524
  names:
    jp_kana: ダンゴロ
    jp_kanji: ダンゴロ
    en: Roggenrola
    fr: Nodulithe
    it: Roggenrola
    de: Kiesling
    es: Roggenrola
    ko: 단굴
