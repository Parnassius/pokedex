      descriptions:
        jp_kana:
          black: "なかまのため　きけんを　かえりみず\nたたかう。じどうしゃを　つかんだまま\nおおぞらを　まう　ことが　できる。"
          white: "ゆうもうかかんな　おおぞらのせんし。\nからだの　きずが　おおい　ほど\nなかまから　そんけいされるという。"
        jp_kanji:
          black: "仲間のため　危険を　かえりみず\n戦う。自動車を　つかんだまま\n大空を　舞う　ことが　できる。"
          white: "勇猛果敢な　大空の戦士。\n体の　傷が　多いほど\n仲間から　尊敬されるという。"
        en:
          black: "They fight for their friends without any\nthought about danger to themselves.\nOne can carry a car while flying."
          white: "The more scars they have, the more\nrespect these brave soldiers of the sky \nget from their peers."
        fr:
          black: "Pour les siens, il combat au mépris du\ndanger. Il est capable de soulever\nune voiture haut dans le ciel."
          white: "Un chevalier du ciel brave et intrépide.\nPlus son corps porte de cicatrices, plus\nil est respecté de ses congénères."
        it:
          black: "Incurante del pericolo, lotta per\ndifendere i compagni. Può sollevare in\nvolo anche una pesante automobile."
          white: "È l’intrepido guerriero del cielo. Si dice\nche sia tanto più rispettato dai suoi\nsimili quante più sono le sue cicatrici."
        de:
          black: "Für Freunde stürzt es sich selbstlos in\nden Kampf. Es kann mit seinen Krallen\nAutos durch die Lüfte tragen."
          white: "Ein tapferer Krieger der Lüfte. Je mehr\nNarben es vorweisen kann, desto mehr\nRespekt zollen ihm seine Artgenossen."
        es:
          black: "Lucha por sus compañeros sin reparar\nen el peligro. Es capaz de volar alto\nincluso con un coche en sus garras."
          white: "Guerrero avezado. Su número de\ncicatrices es directamente proporcional\nal respeto que recibe de los suyos."
        ko:
          black: "동료를 위해 위험을 무릅쓰고\n싸운다. 자동차를 붙잡은 채로\n창공을 날 수 있다."
          white: "용맹 과감한 창공의 전사이다.\n몸의 상처가 많을수록\n동료에게 존경받는다고 한다."
vullaby:
  species_id: 629
  names:
    jp_kana: バルチャイ
    jp_kanji: バルチャイ
    en: Vullaby
    fr: Vostourno
    it: Vullaby
    de: Skallyk
    es: Vullaby
    ko: 벌차이
