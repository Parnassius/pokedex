      descriptions:
        jp_kana:
          black: "つよい　サイコパワーを　あやつる。\nサイコパワーで　あいての　のうみそを\nしめつけて　ずつうを　おこさせる。"
          white: "５０ねんまえに　さばくの　かなたから\nとつぜん　やってきた。その　ときまで\nだれも　みたことが　ない　ポケモン。"
        jp_kanji:
          black: "強力な　サイコパワーを　操る。\nサイコパワーで　相手の　脳みそを\n絞めつけて　頭痛を　起こさせる。"
          white: "５０年前に　砂漠の　彼方から\n突然　やってきた。その　ときまで\nだれも　見たことが　ない　ポケモン。"
        en:
          black: "It uses its strong psychic power\nto squeeze its opponent’s brain,\ncausing unendurable headaches."
          white: "This Pokémon had never been seen until\nit appeared from far in the desert\n50 years ago."
        fr:
          black: "Avec son puissant pouvoir psychique,\nil peut compresser le cerveau de ses\nennemis et déclencher des migraines."
          white: "Il est apparu soudainement des confins\nd’un désert il y a 50 ans. Personne ne\nl’avait jamais vu auparavant."
        it:
          black: "Con i suoi incredibili poteri psichici\ncomprime il cervello dei suoi nemici\nprovocando loro fortissime emicranie."
          white: "È apparso all’improvviso 50 anni fa nei\npressi di un deserto. Fino ad allora,\nnessuno l’aveva mai avvistato."
        de:
          black: "Es verfügt über mächtige Psycho-Kräfte,\nmit denen es die Hirne seiner Gegner\nverwirrt, um ihnen Kopfweh zu bereiten."
          white: "Bevor es vor 50 Jahren urplötzlich aus\nden Tiefen der Wüste erschien, hatte es\nkein Mensch je zuvor gesehen."
        es:
          black: "Posee un gran poder psíquico. Lo usa\npara comprimir el cerebro del enemigo\ny ocasionarle dolores de cabeza."
          white: "Apareció de la nada en un lejano\ndesierto hace 50 años. Hasta entonces,\nnadie lo había visto."
        ko:
          black: "강력한 사이코 파워를 다룬다.\n사이코 파워로 상대의 뇌를\n조여서 두통을 일으킨다."
          white: "50년 전 사막 저편에서\n갑자기 찾아왔다. 그때까지\n아무도 본 적 없는 포켓몬이다."
beheeyem:
