        - normal
      egg_groups:
        - fairy
      abilities:
        - healer
        - regenerator
      hidden_ability: klutz
      held_items:
        common: oran_berry
        rare: sitrus_berry
      descriptions:
        jp_kana:
          black: "みみの　しょっかくで　あいてに\nふれると　しんぞうの　おとで\nたいちょうや　きもちが　わかるのだ。"
          white: "けたはずれの　ちょうりょくを　もつ。\nかすかな　おとで　まわりの　ようすを\nレーダーのように　キャッチする。"
        jp_kanji:
          black: "耳の　触角で　相手に　触れると\n心臓の　音で\n体調や　気持ちが　わかるのだ。"
          white: "けたはずれの　聴力を　持つ。\nかすかな　音で　まわりの　様子を\nレーダーのように　キャッチする。"
        en:
          black: "It touches others with the feelers on\nits ears, using the sound of their\nheartbeats to tell how they are feeling."
          white: "Its auditory sense is astounding. It has\na radarlike ability to understand its\nsurroundings through slight sounds."
        fr:
          black: "Il ausculte les gens avec ses antennes\nauriculaires pour juger de leurs\némotions ou de leur santé."
          white: "Sa capacité auditive est exceptionnelle.\nIl émet des sons imperceptibles pour\nsonder les alentours, comme un sonar."
        it:
          black: "Quando tocca qualcuno con le antenne\ndelle orecchie, ne percepisce lo stato\nfisico e psicologico dal battito cardiaco."
          white: "Ha un udito eccezionale. Usa dei suoni\nimpercettibili per analizzare ciò che\ngli succede intorno."
        de:
          black: "Berührt es jemanden mit den Fühlern an\nseinen Ohren, erfährt es durch den\nHerzschlag der Person, wie es ihr geht."
          white: "Hat ein außerordentlich feines Gehör. Es\ntastet seine Umgebung auf jedes noch\nso leise Geräusch ab wie ein Radar."
        es:
          black: "Al tocar a alguien con las antenas de\nsus orejas, conoce su estado de ánimo\ny de salud por los latidos del corazón."
          white: "Su sentido del oído es infalible: capta\ncualquier ruido de su alrededor y hace\nlas veces de radar."
        ko:
          black: "귀의 더듬이가 상대에게\n닿으면 심장 소리를 듣고\n몸 상태나 기분을 알 수 있다."
          white: "엄청난 청력을 가지고 있다.\n희미한 소리만으로도 주변의 상황을\n레이더처럼 잡아낸다."
timburr:
  species_id: 532
  names:
    jp_kana: ドッコラー
    jp_kanji: ドッコラー
    en: Timburr
    fr: Charpenti
    it: Timburr
    de: Praktibalk
    es: Timburr
    ko: 으랏차
