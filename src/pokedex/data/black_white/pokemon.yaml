        jp_kana:
          black: "よあけと　ともに　スワンナたちは\nおどりはじめる。まんなかで　おどる\nスワンナが　むれの　リーダー。"
          white: "クチバシの　こうげきは　きょうれつ。\nながい　くびを　しならせて\nれんぞくして　つきを　くりだす。"
        jp_kanji:
          black: "夜明けと　ともに　スワンナたちは\n踊りはじめる。真ん中で　踊る\nスワンナが　群れの　リーダー。"
          white: "クチバシの　攻撃は　強烈。\n長い　首を　しならせて\n連続して　突きを　繰り出す。"
        en:
          black: "Swanna start to dance at dusk.\nThe one dancing in the middle is\nthe leader of the flock."
          white: "It administers sharp, powerful pecks\nwith its bill. It whips its long neck to\ndeliver forceful repeated strikes."
        fr:
          black: "Ils se mettent à danser à la tombée\nde la nuit. Le Lakmécygne qui danse\nau centre est le chef de la troupe."
          white: "Ses coups de bec sont très efficaces.\nIl plie son long cou et en inflige un\ndouloureux enchaînement."
        it:
          black: "Gli Swanna iniziano a ballare quando\nsorge il sole. Il capo del gruppo balla\nsempre al centro."
          white: "Attacca violentemente col becco. Sferra\ncolpi ripetuti, piegando il lungo collo."
        de:
          black: "Wenn der Morgen dämmert, fangen sie an\nzu tanzen. Das Swaroness in der Mitte\nführt die Gruppe an."
          white: "Es beugt seinen langen Hals, um mehrmals\nin Folge mit seinem Schnabel zu einer\ngnadenlosen Pick-Attacke anzusetzen."
        es:
          black: "Comienzan a danzar al amanecer.\nEl líder de la bandada se sitúa\nen el centro."
          white: "La potencia de su pico es brutal.\nArquea su largo cuello y picotea\nrepetidamente al enemigo."
        ko:
          black: "새벽이 오면 스완나들이\n춤추기 시작한다. 한가운데에서 춤추는\n스완나가 무리의 우두머리다."
          white: "부리 공격이 강렬하다.\n기다란 목을 구부려서\n연속으로 찌르기를 날린다."
vanillite:
