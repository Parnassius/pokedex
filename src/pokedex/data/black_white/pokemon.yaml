      types:
        - bug
      egg_groups:
        - bug
      abilities:
        - hydration
        - shell_armor
      hidden_ability: overcoat
      descriptions:
        jp_kana:
          black: "てきに　おそわれると　カラの　ふたを\nとじて　ぼうぎょ。ふたの　すきまから\nベトベトした　どくえきを　とばす。"
          white: "カブルモと　ともに　でんきてきな\nエネルギーを　あびると　しんかする。\nりゆうは　かいめいされていない。"
        jp_kanji:
          black: "敵に　襲われると　殻の　ふたを\n閉じて　防御。ふたの　すきまから\nベトベトした　毒液を　飛ばす。"
          white: "カブルモと　ともに　電気的な\nエネルギーを　浴びると　進化する。\n理由は　解明されていない。"
        en:
          black: "When attacked, it defends itself by\nclosing the lid of its shell. It can spit\na sticky, poisonous liquid."
          white: "It evolves when bathed in an\nelectric-like energy along with\nKarrablast. The reason is still unknown."
        fr:
          black: "Quand on l’attaque, il referme sa\nvisière pour se défendre, et\nprojette un poison visqueux."
          white: "Il évolue quand il baigne dans une\nénergie électrique avec un Carabing.\nLa cause en est inconnue."
        it:
          black: "Se viene attaccato, si richiude nella\nconchiglia per difendersi e spruzza\nun veleno viscoso dalla fessura."
          white: "Se riceve una scarica elettrica assieme a\nKarrablast, si evolve. Il motivo non è\nchiaro."
        de:
          black: "Bei Gefahr zieht es sich zum Schutz in\nseine Muschel zurück und schießt eine\nklebrige Flüssigkeit aus dem Spalt."
          white: "Führt man ihm zusammen mit Laukaps\nelektrische Energie zu, entwickelt es\nsich. Niemand kennt den Grund dafür."
        es:
          black: "Cierra la tapa de su caparazón al ser\natacado y luego escupe un líquido\nvenenoso por los resquicios de la misma."
          white: "Evoluciona si entra en contacto con\nenergía eléctrica junto a Karrablast.\nAún no se ha esclarecido el porqué."
        ko:
          black: "상대에게 공격당하면 껍질 뚜껑을\n닫아 방어한다. 뚜껑 틈새로\n끈적끈적한 독액을 날린다."
          white: "딱정곤과 함께 전기적인\n에너지를 받으면 진화한다.\n그 이유는 알려지지 않았다."
accelgor:
  species_id: 617
  names:
    jp_kana: アギルダー
    jp_kanji: アギルダー
    en: Accelgor
    fr: Limaspeed
    it: Accelgor
    de: Hydragil
    es: Accelgor
