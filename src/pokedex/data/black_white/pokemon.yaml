      descriptions:
        jp_kana:
          black: "しんわに　とうじょうする　ポケモン。\nしっぽから　ほのおを　ふきあげて\nすべての　ものを　やきつくす。"
          white: "レシラムの　しっぽが　もえると\nねつエネルギーで　たいきが　うごいて\nせかいの　てんきが　へんかする。"
        jp_kanji:
          black: "神話に　登場する　ポケモン。\nしっぽから　炎を　吹き上げて\nすべての　ものを　焼きつくす。"
          white: "レシラムの　しっぽが　燃えると\n熱エネルギーで　大気が　動いて\n世界の　天気が　変化する。"
        en:
          black: "This Pokémon appears in legends.\nIt sends flames into the air from its\ntail, burning up everything around it."
          white: "When Reshiram’s tail flares, the\nheat energy moves the atmosphere\nand changes the world’s weather."
        fr:
          black: "Un Pokémon mythique.\nIl projette de sa queue un tourbillon\nde flammes capable de tout emporter."
          white: "Quand sa queue s’embrase, l’énergie\nthermique dégagée modifie l’atmosphère\net bouleverse la météo du monde entier."
        it:
          black: "Pokémon di cui si parla nei miti. Può\nincenerire qualsiasi cosa, soffiando\nfiamme dalla coda."
          white: "Quando la sua coda brucia, il calore\nprodotto smuove l’aria provocando\ncambiamenti climatici in tutto il globo."
        de:
          black: "Ein aus Mythen bekanntes Pokémon.\nEs wirbelt mit seinem Schweif Feuer\nauf, mit dem es alles in Asche legt."
          white: "Lodert das Feuer in seinem Schweif auf,\ngerät die Erdatmosphäre durch die Hitze\nin Wallung und das Weltklima ändert sich."
        es:
          black: "Pokémon omnipresente en leyendas.\nHace brotar llamas de su cola y consume\ntodo lo que se le pone por delante."
          white: "Cuando la cola de Reshiram arde, su\nenergía calorífica altera la atmósfera,\ny el tiempo meteorológico cambia."
        ko:
          black: "신화에 등장하는 포켓몬이다.\n꼬리에서 불꽃을 뿜어 올려\n모든 것을 불태운다."
          white: "레시라무의 꼬리가 불타면\n열에너지로 대기가 움직여서\n세계의 날씨가 변화된다."
zekrom:
  species_id: 644
  names:
    jp_kana: ゼクロム
    jp_kanji: ゼクロム
    en: Zekrom
    fr: Zekrom
