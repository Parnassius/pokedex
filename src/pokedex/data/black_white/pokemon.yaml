      descriptions:
        jp_kana:
          black: "ながれるような　れんぞく　こうげきを\nくりだして　てきを　あっとうする。\nするどい　ツメで　てきを　きりさく。"
          white: "かれいな　れんぞくわざの　つかいて。\nせいしん　とういつすると　わざの\nキレと　スピードが　ますのだ。"
        jp_kanji:
          black: "流れるような　連続　攻撃を\n繰り出して　敵を　圧倒する。\n鋭い　ツメで　敵を　切り裂く。"
          white: "華麗な　連続技の　使い手。\n精神　統一すると\n技の　キレと　スピードが　増すのだ。"
        en:
          black: "In fights, they dominate with onslaughts\nof flowing, continuous attacks. With\ntheir sharp claws, they cut enemies."
          white: "They have mastered elegant combos.\nAs they concentrate, their battle moves\nbecome swifter and more precise."
        fr:
          black: "Il découpe ses ennemis avec ses griffes\nacérées et les terrasse avec ses\nenchaînements de coups hyper fluides."
          white: "Il emploie des enchaînements élégants.\nLorsqu’il se concentre, leur vitesse\net leur tranchant augmentent."
        it:
          black: "Soggioga il nemico concatenando una\nserie incessante di attacchi e lo\naffetta con le unghie affilate."
          white: "Sa fare eleganti combinazioni di mosse.\nSe si concentra, aumenta l’efficacia e\nla velocità dei suoi attacchi."
        de:
          black: "Es deckt seine Gegner mit filigranen\nAttacken in Serie ein und schlitzt sie\nmit seinen spitzen Klauen auf."
          white: "Ein Meister der Attacken in Serie. Wenn\nes sich geistig sammelt, werden die\nAttacken geschmeidiger und flotter."
        es:
          black: "Abruma a su rival con oleadas de ataques\nveloces. Corta al enemigo con sus\nafiladas garras."
          white: "Usa gráciles movimientos sucesivos.\nSi se concentra, aumenta su eficacia\ny rapidez."
        ko:
          black: "물 흐르는 듯한 연속 공격을\n펼쳐서 상대를 압도한다.\n날카로운 손톱으로 상대를 베어 가른다."
          white: "화려한 연속기를 사용한다.\n정신통일을 하면 기술의\n날카로움과 스피드가 올라간다."
mienshao:
  species_id: 620
  names:
    jp_kana: コジョンド
    jp_kanji: コジョンド
    en: Mienshao
    fr: Shaofouine
    it: Mienshao
    de: Wie-Shu
    es: Mienshao
    ko: 비조도
  forms:
    mienshao:
      form_id: 0
      base_stats:
        hp: 65
        attack: 125
        defense: 60
        special_attack: 95
        special_defense: 60
        speed: 105
      evs_yield:
        hp: 0
        attack: 2
