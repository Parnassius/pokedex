      descriptions:
        jp_kana:
          black: "にらむだけで　あいての　うごきを\nとめてしまう。たいようエネルギーを\nたいないで　ぞうふくさせる。"
          white: "あたまを　たかく　もちあげて\nあいてを　いあつする。きょうてきと\nたたかう　ときだけ　ほんきを　だす。"
        jp_kanji:
          black: "にらむだけで　相手の　動きを\n止めてしまう。太陽エネルギーを\n体内で　増幅させる。"
          white: "頭を　高く　持ち上げて　相手を\n威圧する。強敵と　戦う　ときだけ\n本気を　出す。"
        en:
          black: "It can stop its opponents’\nmovements with just a glare. It takes\nin solar energy and boosts it internally."
          white: "They raise their heads to intimidate\nopponents but only give it their all\nwhen fighting a powerful opponent."
        fr:
          black: "Il peut paralyser l’ennemi d’un regard.\nIl amplifie l’énergie du soleil dans\nson corps."
          white: "Il garde la tête haute pour intimider\nl’ennemi, et ne combat sérieusement\nque les ennemis les plus puissants."
        it:
          black: "Può bloccare i movimenti dell’avversario\ncon il solo sguardo. Amplifica l’energia\nsolare all’interno del suo corpo."
          white: "Intimidisce i nemici alzando la testa. Dà\nil meglio di sé quando combatte contro\nun avversario molto forte."
        de:
          black: "Bringt Gegner mit einem einzigen kühlen\nBlick zum Erstarren. In seinem Inneren\nverstärkt es die Energie der Sonne."
          white: "Versetzt Gegner in Ehrfurcht, indem es\nden Kopf weit in die Höhe streckt. Zeigt\nnur starken Gegnern seine wahre Macht."
        es:
          black: "Detiene los movimientos del rival con\nuna sola mirada. Expande la energía\nsolar dentro de su cuerpo."
          white: "Yergue su cabeza para intimidar al rival.\nSolo lucha con todo su potencial ante\nenemigos muy fuertes."
        ko:
          black: "째려보기만 해도 상대의 움직임을\n멈추게 한다. 태양에너지를\n체내에서 증폭시킨다."
          white: "머리를 높이 치켜들어\n상대를 위압한다. 강한 상대와\n싸울 때만 진정한 실력을 발휘한다."
tepig:
  species_id: 498
  names:
    jp_kana: ポカブ
    jp_kanji: ポカブ
