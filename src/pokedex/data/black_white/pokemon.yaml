          black: "うつくしい　はなを　さかせるのは\nベテラントレーナーでも　むずかしい。\nセレブに　にんきの　ポケモン。"
          white: "あたまの　はなかざりの　かおりには\nリラックスさせる　こうかが　ある。\nていれを　なまけると　かれてしまう。"
        jp_kanji:
          black: "美しい　花を　咲かせるのは\nベテラントレーナーでも　難しい。\nセレブに　人気の　ポケモン。"
          white: "頭の　花飾りの　香りには\nリラックスさせる　効果が　ある。\n手入れを　怠けると　枯れてしまう。"
        en:
          black: "Even veteran Trainers face a challenge\nin getting its beautiful flower to bloom.\nThis Pokémon is popular with celebrities."
          white: "The fragrance of the garland on its head\nhas a relaxing effect. It withers if a\nTrainer does not take good care of it."
        fr:
          black: "Même les Dresseurs confirmés ont\ndu mal à faire éclore sa belle fleur.\nUn Pokémon apprécié des célébrités."
          white: "La fleur sur sa tête a des propriétés\nrelaxantes. Elle se fane si on ne s’en\noccupe pas avec attention."
        it:
          black: "Neanche gli Allenatori più navigati\nriescono sempre a fare schiudere il suo\nfiore. Va di moda fra le celebrità."
          white: "I fiori che ha sulla testa spandono un\nprofumo rilassante, ma necessitano di\ncontinue attenzioni per non appassire."
        de:
          black: "Bei Promis ist es sehr beliebt. Auch ge-\nstandene Trainer tun sich schwer damit,\nseine Blüte schön aufblühen zu lassen."
          white: "Der Duft des Blumenschmucks auf seinem\nKopf wirkt beruhigend. Damit der Schmuck\nnicht verwelkt, muss man es gut pflegen."
        es:
          black: "Todos los famosos quieren uno.\nIncluso a los Entrenadores más curtidos\nles cuesta que florezca."
          white: "El aroma de la flor de su tocado relaja\na cualquiera a su alrededor. Hay que\ncuidarlo para que no se marchite."
        ko:
          black: "베테랑 트레이너일지라도\n아름다운 꽃을 피우기는 쉽지 않다.\n유명 인사에게 인기가 많은 포켓몬이다."
          white: "머리에 있는 꽃 장식의 향기에는\n긴장을 풀어 주는 효과가 있다.\n자주 손질하지 않으면 시들어 버린다."
