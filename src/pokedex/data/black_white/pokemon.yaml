        jp_kana:
          black: "まちなかで　くらす　バチュルは\nみんかの　コンセントから　でんきを\nすいとる　すべを　おぼえている。"
          white: "からだの　おおきな　ポケモンに\nとりついて　せいでんきを　すいとり\nちくでんぶくろに　でんきを　ためる。"
        jp_kanji:
          black: "街中で　暮らす　バチュルは\n民家の　コンセントから　電気を\n吸い取る　術を　覚えている。"
          white: "体の　大きな　ポケモンに　取りついて\n静電気を　吸い取り\n蓄電袋に　電気を　ためる。"
        en:
          black: "Joltik that live in cities have learned\na technique for sucking electricity\nfrom the outlets in houses."
          white: "They attach themselves to large-bodied\nPokémon and absorb static electricity,\nwhich they store in an electric pouch."
        fr:
          black: "Les Statitik qui vivent en ville ont\nappris à aspirer le courant depuis\nles prises électriques des maisons."
          white: "Il s’accroche aux Pokémon plus grands\net aspire leur électricité statique.\nIl la stocke dans ses poches-accus."
        it:
          black: "Vive in città e ha imparato una tecnica\nper succhiare l’elettricità dalle prese\ndi corrente delle case."
          white: "Si aggrappa ai Pokémon più grossi e ne\nassorbe l’energia statica che conserva\nin una sacca d’accumulo."
        de:
          black: "Wattzapf, die in der Stadt leben, haben\ndie Fähigkeit, aus den Steckdosen von\nWohnhäusern Strom abzuzapfen."
          white: "Es pflanzt sich an großen Pokémon fest\nund zapft ihnen elektrische Energie ab.\nDiese hortet es in seinen Ladetaschen."
        es:
          black: "Los que viven en las ciudades saben\nabsorber electricidad de los enchufes\nde las casas particulares."
          white: "Se agarra a Pokémon de gran tamaño,\nabsorbe su electricidad estática y la\nguarda en una bolsa interna."
        ko:
          black: "거리에서 사는 파쪼옥은\n민가의 콘센트에서 전기를\n빨아들이는 방법을 알고 있다."
          white: "몸이 큰 포켓몬에게 매달려\n정전기를 빨아들인 후\n축전 주머니에 전기를 모은다."
galvantula:
