maractus:
  species_id: 556
  names:
    jp_kana: マラカッチ
    jp_kanji: マラカッチ
    en: Maractus
    fr: Maracachi
    it: Maractus
    de: Maracamba
    es: Maractus
    ko: 마라카치
  forms:
    maractus:
      form_id: 0
      base_stats:
        hp: 75
        attack: 86
        defense: 67
