      descriptions:
        jp_kana:
          black: "ぐあいが　わるくなると　はなみずが\nみずっぽくなり　こおりわざの\nいりょくが　おちてしまうのだ。"
          white: "いつも　はなみずを　たらしている。\nはなみずを　すすって　わざを　だす。\nはなみずが　わざの　もと　なのだ。"
        jp_kanji:
          black: "具合が　悪くなると\n鼻水が　水っぽくなり　こおり技の\n威力が　落ちてしまうのだ。"
          white: "いつも　鼻水を　垂らしている。\n鼻水を　すすって　技を　出す。\n鼻水が　技の　素　なのだ。"
        en:
          black: "When it is not feeling well, its mucus\ngets watery and the power of its\nIce-type moves decreases."
          white: "Its nose is always running. It sniffs the\nsnot back up because the mucus\nprovides the raw material for its moves."
        fr:
          black: "Quand il est malade, sa goutte au nez\ndégèle et ses capacités de type Glace\ndeviennent moins efficaces."
          white: "Il a toujours la goutte au nez. Il\nl’aspire pour déclencher ses capacités.\nLa morve en est la matière première."
        it:
          black: "Quando sta male, la goccia al naso si fa\nacquosa e le sue tecniche congelanti\nperdono di efficacia."
          white: "Ha sempre il naso gocciolante e se ne\nserve per lanciare le sue mosse.\nIl muco è l’origine della sua forza."
        de:
          black: "Wenn es kränkelt, wird der Schleim\naus seiner Nase flüssiger und seine\nEis-Attacken verlieren an Stärke."
          white: "Der Schleim, der stets aus seiner Nase\nhängt, treibt seine Attacken an. Zieht\nes ihn hoch, steht ein Angriff bevor."
        es:
          black: "Cuando se siente mal, sus mucosidades\npasan a ser muy acuosas, y pierden\npotencia sus movimientos de hielo."
          white: "Siempre está con mucosidades colgando.\nLas aspira para hacer un movimiento, ya\nque son su materia prima para esto."
        ko:
          black: "건강이 나빠지면 콧물이\n묽어져서 얼음 기술의\n위력이 떨어진다."
          white: "언제나 콧물을 달고 다닌다.\n콧물을 훌쩍거려 기술을 사용한다.\n콧물이 기술의 근본이다."
beartic:
  species_id: 614
  names:
    jp_kana: ツンベアー
    jp_kanji: ツンベアー
    en: Beartic
    fr: Polagriffe
    it: Beartic
    de: Siberio
    es: Beartic
    ko: 툰베어
  forms:
    beartic:
      form_id: 0
      base_stats:
        hp: 95
        attack: 110
        defense: 80
        special_attack: 70
        special_defense: 80
        speed: 50
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ice
      egg_groups:
        - field
      abilities:
        - snow_cloak
      hidden_ability: swift_swim
      held_items:
        common: aspear_berry
      descriptions:
        jp_kana:
          black: "はく　いきを　じざいに　こおらせる。\nおよぎが　とくいで　きたの　うみを\nおよぎまわり　えものを　つかまえる。"
          white: "はく　いきを　こおらせて　こおりの\nキバや　ツメを　つくり　たたかう。\nきたの　さむい　とちで　くらす。"
        jp_kanji:
          black: "吐く　息を　自在に　凍らせる。\n泳ぎが　得意で　北の　海を\n泳ぎまわり　獲物を　捕まえる。"
          white: "吐く　息を　凍らせて　氷の　キバや\nツメを　作り　戦う。\n北の　寒い　土地で　暮らす。"
        en:
          black: "It can make its breath freeze at will.\nVery able in the water, it swims around\nin northern seas and catches prey."
          white: "It freezes its breath to create\nfangs and claws of ice to fight with.\nCold northern areas are its habitat."
        fr:
          black: "Il fait lui-même geler son haleine. Il\nest bon nageur et sillonne les mers\ndu nord à la recherche de ses proies."
          white: "Il gèle son haleine et en fait des crocs\net des griffes de glace pour combattre.\nIl vit dans les terres gelées du nord."
        it:
          black: "Ha la facoltà di congelare il suo fiato.\nÈ un buon nuotatore e vaga nei mari del\nnord in cerca di prede."
          white: "Lotta usando zanne o artigli creati\ncongelando il suo stesso respiro.\nVive nelle fredde regioni del nord."
        de:
          black: "Kann seinen eigenen Atem zum Gefrieren\nbringen. Es schwimmt auf der Suche nach\nBeute die nördlichen Meere ab."
          white: "Kämpft mit Reißzähnen aus Eis, die es\naus gefrorenem Atem herstellt. Es lebt\nim Norden, wo es kalt ist."
        es:
          black: "Congela su aliento a discreción. Se le da\nbien nadar, por eso se dirige a menudo a\nlos mares del norte en busca de presas."
          white: "Congela su aliento y crea colmillos\ny garras de hielo para combatir.\nVive en las gélidas tierras del norte."
        ko:
          black: "내뱉는 숨결을 자유자재로 얼린다.\n수영이 특기라 북쪽 바다를\n헤엄치며 먹이를 잡는다."
          white: "내뱉는 숨을 얼려 얼음 이빨이나\n손톱을 만들어서 싸운다.\n추운 북쪽 토지에서 산다."
cryogonal:
  species_id: 615
  names:
    jp_kana: フリージオ
    jp_kanji: フリージオ
    en: Cryogonal
    fr: Hexagel
    it: Cryogonal
    de: Frigometri
    es: Cryogonal
    ko: 프리지오
  forms:
    cryogonal:
      form_id: 0
      base_stats:
        hp: 70
        attack: 50
        defense: 30
        special_attack: 95
        special_defense: 135
        speed: 105
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 2
        speed: 0
      types:
        - ice
      egg_groups:
        - mineral
      abilities:
        - levitate
      held_items:
