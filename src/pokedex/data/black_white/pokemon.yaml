      abilities:
        - levitate
      descriptions:
        jp_kana:
          black: "うでの　ちからで　うみから　はいだし\nみずべの　えものに　おそいかかる。\nいっしゅんで　うみへ　ひきずりこむ。"
          white: "きゅうばんの　くちで　えものに\nすいつき　くいこませた　キバから\nでんきを　ながして　かんでんさせる。"
        jp_kanji:
          black: "腕の　力で　海から　はい出し\n水辺の　獲物に　襲いかかる。\n一瞬で　海へ　引きずり込む。"
          white: "吸盤の　口で　獲物に　吸いつき\n食い込ませた　キバから\n電気を　流して　感電させる。"
        en:
          black: "They crawl out of the ocean using their\narms. They will attack prey on shore and\nimmediately drag it into the ocean."
          white: "With their sucker mouths, they\nsuck in prey. Then they use their fangs\nto shock the prey with electricity."
        fr:
          black: "Il peut sortir de l’eau à la force de ses\nbras pour attraper des proies sur la\nrive. Il retourne à l’eau en un instant."
          white: "Il s’attache à ses proies avec sa\nbouche-ventouse et les électrocute\navec ses crocs."
        it:
          black: "Striscia fuori dal mare con la sola forza\ndei propri arti. Poi attacca la preda a\nriva e con un guizzo la trascina con sé."
          white: "Si attacca alla preda con la bocca\na ventosa e la fulmina attraverso\ni denti conficcati."
        de:
          black: "Es schleppt sich mithilfe seiner Arme an\nLand, schnappt nach seiner Beute und\nzerrt sie augenblicklich ins Meer."
          white: "Mit dem Saugnapf an seinem Maul hakt es\nsich an seiner Beute fest und versetzt\nihr über seine Fangzähne Stromschläge."
        es:
          black: "Sale del mar con la fuerza de sus brazos\ny ataca a sus presas en la costa. Luego\nse las lleva de vuelta al mar."
          white: "Pega la ventosa de su boca en su presa\ny la electrocuta con sus colmillos."
        ko:
          black: "팔 힘으로 바다에서 기어나와\n물가에 있는 먹이를 덮친다.\n한순간에 바다로 끌고 들어간다."
          white: "흡반 같은 입으로 먹이에\n달라붙은 후 박아 넣은 이빨을\n통해 전기를 흘려 감전시킨다."
elgyem:
