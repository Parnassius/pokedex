    garbodor:
      form_id: 0
      base_stats:
        hp: 80
        attack: 95
        defense: 82
        special_attack: 60
        special_defense: 82
        speed: 75
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - poison
      egg_groups:
        - mineral
