      abilities:
        - blaze
        - blaze
      hidden_ability: thick_fat
      descriptions:
        jp_kana:
          black: "てきの　こうげきを　みがるに　よけて\nはなから　ひのたまを　うちだす。\nほのおで　きのみを　やいて　たべる。"
          white: "はなの　あなから　ほのおを　ふく。\nカゼを　ひくと　ほのおでは　なく\nまっくろな　けむりに　なってしまう。"
        jp_kanji:
          black: "敵の　攻撃を　身軽に　避けて\n鼻から　火の玉を　撃ち出す。\n炎で　木の実を　焼いて　食べる。"
          white: "鼻の　穴から　炎を　吹く。\nカゼを　ひくと　炎ではなく\n真っ黒な　煙に　なってしまう。"
        en:
          black: "It can deftly dodge its foe’s attacks\nwhile shooting fireballs from its nose.\nIt roasts berries before it eats them."
          white: "It blows fire through its nose.\nWhen it catches a cold, the fire\nbecomes pitch-black smoke instead."
        fr:
          black: "Il évite agilement les attaques ennemies\net crache des boules de feu par le groin.\nIl aime griller des Baies pour les manger."
          white: "Il crache du feu par le groin.\nMais quand il est enrhumé, seule\nune fumée noirâtre en sort."
        it:
          black: "Lancia palle di fuoco dal naso mentre\nevita abilmente gli attacchi del nemico.\nMangia bacche che arrostisce lui stesso."
          white: "Esala fuoco dalle narici. Quando ha il\nraffreddore, al posto del fuoco emette\nun fumo nerissimo."
        de:
          black: "Weicht flink gegnerischen Angriffen aus\nund schießt Flammen aus dem Rüssel, mit\ndenen es gern auch mal Nüsse röstet."
          white: "Es schießt Flammen aus seinem Rüssel.\nIst es erkältet, kommt statt Feuer aber\nnur pechschwarzer Rauch zum Vorschein."
        es:
          black: "Evita con agilidad los ataques enemigos.\nLanza bolas de fuego por su hocico y\ntuesta bayas del bosque para comer."
          white: "Lanza llamas por su hocico.\nCuando está resfriado, expulsa humo\nazabache en lugar de fuego."
        ko:
          black: "적의 공격을 가볍게 피하고\n코로 불구슬을 쏘아댄다.\n불꽃으로 나무열매를 구워 먹는다."
          white: "콧구멍에서 불꽃을 뿜어낸다.\n감기에 걸리면 불꽃 대신\n새까만 연기를 뿜어낸다."
pignite:
  species_id: 499
  names:
