          black: "あたまの　ふさに　みずを　ためる。\nちょすいりょうが　へると　しっぽで\nみずを　すいあげて　ほきゅうする。"
          white: "しっぽから　こうあつの　みずを\nはっしゃすると　コンクリートの\nかべも　はかいする　いりょく。"
        jp_kanji:
          black: "頭の　ふさに　水を　ためる。\n貯水量が　減ると　しっぽで\n水を　吸い上げて　補給する。"
          white: "しっぽから　高圧の　水を　発射すると\nコンクリートの　壁も\n破壊する　威力。"
        en:
          black: "The tuft on its head holds water. When\nthe level runs low, it replenishes the\ntuft by siphoning up water with its tail."
          white: "The high-pressure water expelled\nfrom its tail is so powerful,\nit can destroy a concrete wall."
        fr:
          black: "Il stocke de l’eau dans les mèches de sa\ntête. Quand il est à sec, il se ravitaille\nen aspirant de l’eau par la queue."
          white: "Le jet d’eau à haute pression qu’il\npropulse par la queue est assez puissant\npour traverser un mur de béton."
        it:
          black: "Accumula acqua nel ciuffo. Quando il\nlivello di acqua diminuisce, fa\nrifornimento aspirandola dalla coda."
          white: "Spruzza dalla coda un getto d’acqua ad\nalta pressione, con una potenza tale da\ndistruggere anche pareti di cemento."
        de:
          black: "Speichert Wasser im Büschel auf seinem\nKopf. Sinkt der Wasserstand, tankt es\nüber seinen Schweif neue Flüssigkeit."
          white: "Es schießt mit so hohem Druck Wasser aus\nseinem Schweif, dass selbst Betonwände\nden Kürzeren ziehen."
        es:
          black: "Acumula agua en su pelo. Cuando le falta\nagua a su organismo, la cola absorbe\nlíquido para recuperar el equilibrio."
          white: "Cuando lanza agua a alta presión con\nsu cola, puede incluso resquebrajar\nuna pared de cemento."
        ko:
          black: "머리의 송아리에 물을 모은다.\n모아둔 물의 양이 줄어들면 꼬리로\n물을 빨아올려 보급한다."
          white: "꼬리에서 발사하는 고압의 물은\n콘크리트 벽도 파괴할 수 있는\n위력을 지녔다."
munna:
  species_id: 517
  names:
    jp_kana: ムンナ
    jp_kanji: ムンナ
    en: Munna
    fr: Munna
    it: Munna
    de: Somniam
    es: Munna
    ko: 몽나
  forms:
    munna:
      form_id: 0
      base_stats:
        hp: 76
        attack: 25
        defense: 45
        special_attack: 67
        special_defense: 55
        speed: 24
      evs_yield:
        hp: 1
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - psychic
      egg_groups:
        - field
      abilities:
        - forewarn
        - synchronize
      hidden_ability: telepathy
      descriptions:
        jp_kana:
          black: "ムンナに　ゆめを　たべらてしまうと\nゆめの　ないようを　わすれてしまう。\nつねに　くうちゅうに　うかんでいる。"
          white: "ひとや　ポケモンが　みた　ゆめを\nたべる。たのしい　ゆめを　たべると\nピンクいろの　けむりを　はきだす。"
        jp_kanji:
          black: "ムンナに　夢を　食べられてしまうと\n夢の　内容を　忘れてしまう。\nつねに　空中に　浮かんでいる。"
          white: "人や　ポケモンが　見た　夢を\n食べる。楽しい　夢を　食べると\nピンク色の　けむりを　吐き出す。"
        en:
          black: "Munna always float in the air. People\nwhose dreams are eaten by them\nforget what the dreams had been about."
          white: "It eats the dreams of people and\nPokémon. When it eats a pleasant\ndream, it expels pink-colored mist."
        fr:
          black: "Quand Munna mange un rêve, celui-ci\nest aussitôt oublié par le rêveur.\nIl lévite en permanence."
          white: "Il se nourrit des rêves des gens et des\nPokémon. Quand le rêve est agréable,\nil crache une fumée rose."
        it:
          black: "Quando Munna mangia i sogni di qualcuno,\nquesti dimentica che cosa ha sognato.\nGalleggia costantemente in aria."
          white: "Si nutre dei sogni di uomini e Pokémon.\nSe mangia sogni piacevoli, esala un fumo\ndi colore rosa."
        de:
          black: "Frisst es den Traum eines Menschen,\nvergisst der Träumer dessen Inhalt.\nEs schwebt stets durch die Luft."
          white: "Es verschlingt die Träume der Menschen.\nFrisst es einen fröhlichen Traum, stößt\nes danach einen rosafarbenen Dunst aus."
        es:
          black: "Hace olvidar los sueños que come.\nSiempre está flotando."
          white: "Se alimenta de los sueños de humanos\ny Pokémon. Si los sueños son felices,\ndespide humo rosa."
        ko:
          black: "몽나에게 꿈이 먹히면\n그 꿈의 내용을 잊어버리게 된다.\n항상 공중에 떠 있다."
          white: "사람이나 포켓몬이 꾼 꿈을\n먹는다. 즐거운 꿈을 먹으면\n분홍색 연기를 뿜어낸다."
musharna:
  species_id: 518
  names:
    jp_kana: ムシャーナ
    jp_kanji: ムシャーナ
    en: Musharna
    fr: Mushana
    it: Musharna
    de: Somnivora
    es: Musharna
    ko: 몽얌나
  forms:
    musharna:
      form_id: 0
      base_stats:
        hp: 116
        attack: 55
        defense: 85
        special_attack: 107
        special_defense: 95
        speed: 29
      evs_yield:
        hp: 2
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - psychic
      egg_groups:
        - field
      abilities:
        - forewarn
        - synchronize
      hidden_ability: telepathy
      descriptions:
        jp_kana:
          black: "おでこから　でている　けむりの\nなかには　ひとや　ポケモンの　みた\nゆめが　たくさん　つまっているのだ。"
          white: "たべた　ゆめを　じったいか　させる。\nおでこから　もれる　けむりが　ゆめに\nでてきた　ものに　すがたを　かえる。"
        jp_kanji:
          black: "おでこから　出ている　煙の　中には\n人や　ポケモンの　見た　夢が\nたくさん　詰まっているのだ。"
          white: "食べた　夢を　実体化　させる。\nおでこから　もれる　煙が　夢に\n出てきた　ものに　姿を　変える。"
        en:
          black: "The mist emanating from their foreheads\nis packed with the dreams of people\nand Pokémon."
          white: "With the mist from its forehead,\nit can create shapes of things\nfrom dreams it has eaten."
        fr:
          black: "La fumée qui sort de son front contient\nles rêves de nombreuses personnes et\nceux de nombreux Pokémon."
          white: "Il peut matérialiser les rêves qu’il a\nmangés. La fumée qui sort de son front\nprend la forme des objets vus en rêve."
        it:
          black: "Nel fumo che gli esce dalla fronte sono\nracchiusi molti sogni di esseri umani e\ndi Pokémon."
          white: "Riesce a materializzare i sogni mangiati.\nIl fumo che gli esce dalla fronte prende\nla forma di ciò che appare nel sogno."
        de:
          black: "Der Dunst, der aus seiner Stirn tritt,\nenthält die Träume unzähliger Menschen\nund Pokémon."
          white: "Kann Träume, die es verspeist hat, wahr\nwerden lassen. Die Trauminhalte nehmen\nüber den Dunst aus seiner Stirn Form an."
        es:
          black: "Multitud de sueños de humanos y Pokémon\nse encuentran atrapados en el humo que\ndespide por su frente."
          white: "Con el humo que despide por la frente,\npuede recrear la forma de las cosas\nque ha visto en los sueños que engulle."
        ko:
          black: "이마에서 나오는 연기 속에는\n사람이나 포켓몬이 꾼\n꿈이 많이 모여 있다."
          white: "먹은 꿈을 실체화한다.\n이마에서 새어나오는 연기는 꿈에\n나타났던 것으로 모습을 바꾼다."
pidove:
  species_id: 519
  names:
    jp_kana: マメパト
    jp_kanji: マメパト
    en: Pidove
    fr: Poichigeon
    it: Pidove
    de: Dusselgurr
    es: Pidove
    ko: 콩둘기
  forms:
    pidove:
      form_id: 0
      base_stats:
        hp: 50
        attack: 55
        defense: 50
        special_attack: 36
        special_defense: 30
        speed: 43
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - normal
        - flying
      egg_groups:
        - flying
      abilities:
        - big_pecks
        - super_luck
      hidden_ability: rivalry
      descriptions:
        jp_kana:
          black: "トレーナーの　めいれいを　よく　きく\nせいかくだが　むずかしい　しじは\nりかい　できない　こともある。"
          white: "まちなかで　くらしている　ポケモン。\nひとなつっこいので　こうえんや\nひろばに　たくさん　あつまってくる。"
        jp_kanji:
          black: "トレーナーの　命令を　よく　聞く\n性格だが　難しい　指示は\n理解　できない　こともある。"
          white: "街中で　暮らしている　ポケモン。\n人懐っこいので　公園や　広場に\nたくさん　集まってくる。"
        en:
          black: "Each follows its Trainer’s orders as\nbest it can, but they sometimes fail to\nunderstand complicated commands."
          white: "These Pokémon live in cities. They are\naccustomed to people. Flocks often\ngather in parks and plazas."
        fr:
          black: "Il suit scrupuleusement les consignes\nde son Dresseur, mais il a du mal à\ncomprendre les ordres trop compliqués."
          white: "Ces Pokémon vivent en ville. Ils sont\npeu farouches et se regroupent souvent\ndans les parcs ou sur les places."
        it:
          black: "Obbedisce sempre scrupolosamente agli\nordini dell’Allenatore, ma capita a volte\nche non capisca quelli più complessi."
          white: "Pokémon che vive in città. Si affeziona\nfacilmente alle persone, perciò non è\nstrano trovarlo in parchi o piazze."
        de:
          black: "Gewöhnlich hört es zwar auf das, was\nsein Trainer sagt, doch manchmal kommt\nes mit komplizierten Befehlen nicht klar."
          white: "Ein Pokémon, das in der Stadt zu Hause\nist. Es ist sehr zutraulich und bevölkert\nin Scharen öffentliche Plätze und Parks."
        es:
          black: "Es muy obediente con su Entrenador,\npero a veces no logra comprender\nórdenes complicadas."
          white: "Vive en la ciudad, pues se lleva muy bien\ncon la gente. Le encantan los parques y\nlas plazas, donde se reúne con otros."
        ko:
          black: "트레이너의 명령을 잘 따르는\n성격이지만 어려운 지시는\n이해하지 못할 때도 있다."
          white: "거리에 사는 포켓몬이다.\n사람을 잘 따라서 공원이나\n광장에 많이 모인다."
tranquill:
  species_id: 520
  names:
    jp_kana: ハトーボー
    jp_kanji: ハトーボー
    en: Tranquill
    fr: Colombeau
    it: Tranquill
    de: Navitaub
    es: Tranquill
    ko: 유토브
  forms:
    tranquill:
      form_id: 0
      base_stats:
        hp: 62
        attack: 77
        defense: 62
        special_attack: 50
        special_defense: 42
        speed: 65
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - normal
        - flying
      egg_groups:
        - flying
      abilities:
        - big_pecks
        - super_luck
      hidden_ability: rivalry
      descriptions:
        jp_kana:
          black: "どんなに　とおく　はなれても\nトレーナーの　もとに　かならず\nもどってくる　ことが　できる。"
          white: "ハトーボーの　すむ　もりの　おくには\nあらそいのない　へいわな　くにが\nあると　しんじられている。"
        jp_kanji:
          black: "どんなに　遠く　離れても\nトレーナーの　もとに　かならず\nもどってくる　ことが　できる。"
          white: "ハトーボーの　住む　森の　奥には\n争いのない　平和な　国が　あると\n信じられている。"
        en:
          black: "It can return to its Trainer’s location\nregardless of the distance\nseparating them."
          white: "Many people believe that, deep in the\nforest where Tranquill live, there is\na peaceful place where there is no war."
        fr:
          black: "Aussi éloigné qu’il puisse se trouver,\nil parvient toujours à retourner\nauprès de son Dresseur."
          white: "On dit que tout au fond de la forêt\noù il vit, il y aurait un pays paisible\nqui n’a jamais connu la guerre."
        it:
          black: "Per quanto lontano si trovi, è sempre in\ngrado di ritornare dal suo Allenatore."
          white: "Si dice che nel cuore della foresta in cui\nvive Tranquill si trovi un paese che\nnon conosce conflitti."
        de:
          black: "Egal wie weit es auch von seinem Trainer\nentfernt ist, es findet immer wieder\nzu ihm zurück."
          white: "Viele Leute glauben, dass es tief in\nseinem heimatlichen Wald ein Land der\nHarmonie gibt, wo man keine Kriege kennt."
        es:
          black: "Aunque se aleje o se pierda, siempre\nvuelve con su Entrenador."
          white: "Según los rumores, en lo más profundo\ndel bosque donde mora Tranquill, hay\nun mundo pacífico y exento de luchas."
        ko:
          black: "아무리 멀리 떨어져 있어도\n트레이너가 있는 곳으로 반드시\n돌아올 수 있다."
          white: "유토브가 사는 숲 속에는\n싸움이 없는 평화로운 나라가\n있다고 믿어진다."
unfezant:
  species_id: 521
  names:
    jp_kana: ケンホロウ
    jp_kanji: ケンホロウ
