      descriptions:
        jp_kana:
          black: "りょううでの　モンスターボールに\nにた　カサを　ゆらゆらと　うごかして\nえものを　さそう　ダンスを　おどる。"
          white: "モンスターボールの　カサを　みせつけ\nえものを　おびきよせようとするが\nだまされる　ポケモンは　すくない。"
        jp_kanji:
          black: "両腕の　モンスターボールに　似た\nカサを　ゆらゆらと　動かして\n獲物を　誘う　ダンスを　踊る。"
          white: "モンスターボールの　カサを　見せつけ\n獲物を　誘き寄せようとするが\nだまされる　ポケモンは　少ない。"
        en:
          black: "It lures prey close by dancing and\nwaving its arm caps, which resemble\nPoké Balls, in a swaying motion."
          white: "They show off their Poké Ball caps to\nlure prey, but very few Pokémon are\nfooled by this."
        fr:
          black: "Il danse en faisant tournoyer les\ncoupoles en forme de Poké Ball de\nses bras pour attirer ses proies."
          white: "Il se sert de ses coupoles en forme de\nPoké Ball pour attirer ses proies, mais\npeu de Pokémon se laissent avoir."
        it:
          black: "Attira le sue prede con danze, durante\nle quali fa roteare i dischi simili a\nPoké Ball che porta sugli arti."
          white: "Cerca di attirare le prede esibendo\nun cappello a forma di Poké Ball, ma sono\npochi i Pokémon che si fanno ingannare."
        de:
          black: "Es lockt seine Beute an, indem es die\nHüte in Form von Pokébällen an seinen\nArmen rüttelt und einen Tanz aufführt."
          white: "Um Beute anzulocken, bietet es seinen\nHut feil, der einem Pokéball ähnelt. Doch\nkaum ein Pokémon fällt darauf herein."
        es:
          black: "Baila meciendo rítmicamente los dos\nbrazos a modo de Poké Ball para hacer\nque sus presas se acerquen."
          white: "Aunque intenta pasar por parte superior\nde una Poké Ball para atraer a sus\npresas, consigue engañar a pocos."
        ko:
          black: "양팔의 몬스터볼을 닮은\n삿갓을 한들한들 흔들어\n먹이를 유인하는 춤을 춘다."
          white: "몬스터볼 무늬의 삿갓을 보여주며\n먹이를 유인하려 하지만\n속아 넘어가는 포켓몬은 드물다."
frillish:
  species_id: 592
  names:
    jp_kana: プルリル
    jp_kanji: プルリル
    en: Frillish
    fr: Viskuse
    it: Frillish
    de: Quabbel
    es: Frillish
    ko: 탱그릴
  forms:
    frillish:
      form_id: 0
      base_stats:
        hp: 55
        attack: 40
        defense: 50
        special_attack: 65
        special_defense: 85
