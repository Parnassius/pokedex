      descriptions:
        jp_kana:
          black: "たましいを　すいとって　もやす。\nほのおを　ゆらして　あいてを\nさいみんじょうたいに　する。"
          white: "シャンデラの　ほのおに　つつまれると\nたましいが　すいとられ　もやされる。\nぬけがらの　からだ　だけが　のこる。"
        jp_kanji:
          black: "魂を　吸い取って　燃やす。\n腕の　炎を　揺らして\n相手を　催眠状態に　する。"
          white: "シャンデラの　炎に　包まれると\n魂が　吸い取られ　燃やされる。\n抜け殻の　体　だけが　残る。"
        en:
          black: "It absorbs a spirit, which it then burns.\nBy waving the flames on its arms,\nit puts its foes into a hypnotic trance."
          white: "Being consumed in Chandelure’s flame\nburns up the spirit, leaving the\nbody behind."
        fr:
          black: "Il brûle en aspirant les âmes, et\nhypnotise ses ennemis en faisant\nosciller les flammes de ses bras."
          white: "Les victimes des flammes de Lugulabre\nvoient leur âme aspirée jusqu’à ce que\nleur corps ne soit plus que coquille vide."
        it:
          black: "Brucia consumando le anime che ha\naspirato. Ipnotizza l’avversario facendo\ntremolare le fiammelle sugli arti."
          white: "Le fiamme di Chandelure risucchiano\nlo spirito e lasciano il corpo come un\nguscio vuoto."
        de:
          black: "Es saugt die Seelen seiner Opfer aus und\nverbrennt sie. Nutzt seine Arme als\nPendel, um den Gegner zu hypnotisieren."
          white: "Es saugt die Seele eines jeden auf, der\nin seinen Feuerkranz gerät, bis nur noch\neine leere Hülle von ihm übrig ist."
        es:
          black: "Absorbe almas y las quema. Mece las\nllamas de sus brazos para hipnotizar\na sus enemigos."
          white: "Sus llamas absorben el alma del enemigo\ny la abrasan, dejando solo su cuerpo\ninerte."
        ko:
          black: "영혼을 빨아들여 태운다.\n불꽃을 흔들어서 상대를\n최면 상태로 만든다."
          white: "샹델라의 불꽃에 둘러싸이면\n영혼이 빨려가 불타버린다.\n빈 껍데기인 몸만 남는다."
axew:
  species_id: 610
  names:
    jp_kana: キバゴ
    jp_kanji: キバゴ
    en: Axew
    fr: Coupenotte
    it: Axew
    de: Milza
    es: Axew
