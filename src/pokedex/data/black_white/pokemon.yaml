          black: "ふきつな　ポケモンと　こわがられる。\nししゃの　たましいを　もとめて\nまちなかを　フラフラと　さまよう。"
          white: "りんじゅうの　きわに　あらわれて\nたましいが　にくたいを　はなれると\nすかさず　すいとってしまうのだ。"
        jp_kanji:
          black: "不吉な　ポケモンと　怖がられる。\n死者の　魂を　求めて\n街中を　フラフラと　さまよう。"
          white: "臨終の　際に　現れて\n魂が　肉体を　離れると\nすかさず　吸い取ってしまうのだ。"
        en:
          black: "This ominous Pokémon is feared.\nThrough cities it wanders, searching\nfor the spirits of the fallen."
          white: "It arrives near the moment of death\nand steals spirit from the body."
        fr:
          black: "Un Pokémon craint pour être de mauvais\naugure. Il erre dans les villes à la\nrecherche d’âmes de défunts."
          white: "Il apparaît au moment du trépas\net aspire l’âme à l’instant même\noù elle quitte le corps."
        it:
          black: "È temuto come portatore di cattiva\nsorte. Si aggira ramingo per le città\nalla ricerca degli spiriti perduti."
          white: "Appare sul finire della vita, per\nrisucchiare l’energia delle anime\nvagabonde."
        de:
          black: "Es irrt ziellos auf der Suche nach den\nSeelen der Verstorbenen durch die\nStadt. Als Unglücksbringer gefürchtet."
          white: "Es erscheint im Augenblick des Todes und\nverschlingt die Seele des Verblichenen,\nsofort nachdem sie den Körper verlässt."
        es:
          black: "Lo temen por ser considerado de mal\nagüero. Vaga en busca de almas de\nindividuos que han pasado a mejor vida."
          white: "Aparece hacia el final de la vida\ny absorbe el alma en cuanto\nesta se separa del cuerpo."
        ko:
          black: "불길한 포켓몬이라며 모두들 무서워한다.\n죽은 자의 영혼을 찾아\n흔들거리며 거리를 떠돈다."
          white: "임종 때 나타나서\n영혼이 육체를 떠나면\n재빨리 빨아들여 버린다."
chandelure:
  species_id: 609
  names:
    jp_kana: シャンデラ
    jp_kanji: シャンデラ
    en: Chandelure
    fr: Lugulabre
    it: Chandelure
    de: Skelabra
    es: Chandelure
    ko: 샹델라
  forms:
    chandelure:
      form_id: 0
      base_stats:
        hp: 60
        attack: 55
        defense: 90
        special_attack: 145
        special_defense: 90
        speed: 80
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 3
        special_defense: 0
