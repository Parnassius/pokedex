      descriptions:
        jp_kana:
          black: "おなかの　ホタチで　たたかう。\nこうげきを　うけとめてから　すかさず\nきりつけて　はんげきするのだ。"
          white: "おなかの　ホタチは　ツメと　おなじ\nせいぶんで　できている。おなかから\nはずして　こがたなとして　つかう。"
        jp_kanji:
          black: "お腹の　ホタチで　戦う。\n攻撃を　受け止めてから　すかさず\n切りつけて　反撃するのだ。"
          white: "お腹の　ホタチは\nツメと　同じ 成分で　できている。\nお腹から　外して 小刀として　使う。"
        en:
          black: "It fights using the scalchop on its\nstomach. In response to an attack,\nit retaliates immediately by slashing."
          white: "The scalchop on its stomach is made from\nthe same elements as claws. It detaches\nthe scalchop for use as a blade."
        fr:
          black: "Il combat avec le coupillage de son\nventre. Il peut parer un assaut et\nimmédiatement contre-attaquer."
          white: "Le coupillage sur son ventre est fait de\nla même matière que ses griffes. Il le\ndétache pour l’utiliser comme une dague."
        it:
          black: "Combatte con la conchiglia che ha sul\nventre. Contrattacca prontamente dopo\naver parato l’attacco avversario."
          white: "La conchiglia sul suo ventre ha la stessa\ncomposizione delle unghie. La estrae\ndal ventre, usandola per trafiggere."
        de:
          black: "Kämpft mit der Muschel auf seinem Bauch.\nPariert es einen Angriff, schlägt es\nsofort mit einer Schnitt-Attacke zurück."
          white: "Die Muschel auf seinem Bauch besteht aus\ndemselben Material wie seine Krallen.\nNimmt es sie ab, fungiert sie als Klinge."
        es:
          black: "Ataca con la vieira de su ombligo.\nEn cuanto para un ataque, pasa\nal contraataque sin dilación."
          white: "La vieira de su ombligo está hecha\ndel mismo material que sus garras.\nPuede sacarla y usarla de daga."
        ko:
          black: "배에 있는 가리비칼로 싸운다.\n공격을 막고 그 즉시\n베어 반격한다."
          white: "배에 있는 가리비칼은 손톱과 같은\n성분으로 구성되어 있다. 배에서\n떼어내 칼로 사용한다."
dewott:
  species_id: 502
  names:
    jp_kana: フタチマル
    jp_kanji: フタチマル
    en: Dewott
    fr: Mateloutre
    it: Dewott
    de: Zwottronin
    es: Dewott
    ko: 쌍검자비
