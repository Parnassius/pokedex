      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 2
      types:
        - grass
      egg_groups:
        - field
      abilities:
        - gluttony
      hidden_ability: overgrow
      held_items:
        common: oran_berry
        rare: occa_berry
      descriptions:
        jp_kana:
          black: "きしょうが　はげしく　トゲの　ついた\nしっぽを　ふりまわして　たたかう。\nあたまの　はっぱは　とても　にがい。"
          white: "トゲの　たくさん　ついた　しっぽを\nあいてに　たたきつけて　こうげき。\nきしょうの　はげしい　ポケモン。"
        jp_kanji:
          black: "気性が　激しく　トゲの　ついた\nしっぽを　振り回して　戦う。\n頭の　葉っぱは　とても　苦い。"
          white: "トゲの　たくさん　ついた　しっぽを\n相手に　たたきつけて　攻撃。\n気性の　激しい　ポケモン。"
        en:
          black: "Ill tempered, it fights by swinging its\nbarbed tail around wildly. The leaf\ngrowing on its head is very bitter."
          white: "It attacks enemies with strikes\nof its thorn-covered tail.\nThis Pokémon is wild tempered."
        fr:
          black: "Il a un tempérament violent et se\nbat avec sa queue pleine d’épines.\nLa feuille sur sa tête est très amère."
          white: "Il frappe ses ennemis avec sa queue\ncouverte de pointes. Un Pokémon au\ncaractère agressif."
        it:
          black: "Di carattere impetuoso, lotta roteando\nla coda dotata di aculei. Le foglie che ha\nsul capo sono molto amare."
          white: "Attacca il nemico colpendolo con la coda\npiena di aculei. Pokémon dal carattere\nimpetuoso."
        de:
          black: "Ein hitziger Geselle, der im Kampf seinen\ndornigen Schweif umherschwingt.\nAuf seinem Kopf wachsen bittere Kräuter."
          white: "Wer sich mit diesem temperamentvollen\nPokémon anlegt, bekommt seinen mit\nDornen bestückten Schweif zu spüren."
        es:
          black: "Pokémon muy temperamental que lucha con\nsu cola revestida de púas. Las hojas de\nsu cabeza están muy amargas."
          white: "Ataca estampando las espinas de su cola\nen el enemigo. Es un Pokémon con\nmucho temperamento."
        ko:
          black: "기질이 격하여 가시가 박힌\n꼬리를 휘두르며 싸운다.\n머리의 잎사귀는 매우 쓰다."
          white: "가시가 잔뜩 박힌 꼬리를\n상대에게 힘껏 쳐서 공격한다.\n기질이 격한 포켓몬이다."
pansear:
  species_id: 513
  names:
    jp_kana: バオップ
    jp_kanji: バオップ
    en: Pansear
    fr: Flamajou
    it: Pansear
    de: Grillmak
    es: Pansear
    ko: 바오프
  forms:
    pansear:
      form_id: 0
      base_stats:
        hp: 50
        attack: 53
        defense: 48
        special_attack: 53
        special_defense: 48
        speed: 64
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - fire
      egg_groups:
        - field
      abilities:
        - gluttony
      hidden_ability: blaze
      held_items:
        common: oran_berry
        rare: passho_berry
      descriptions:
        jp_kana:
          black: "あたまの　ふさは　おこると　おんどが\nあがり　３００ど　いじょうになる。\nきのみを　ふさで　やいて　たべる。"
          white: "かざんの　ほらあなで　くらす。\nあたまの　ふさの　なかが　もえていて\n３００どの　こうおんになる。"
        jp_kanji:
          black: "頭の　ふさは　怒ると　温度が　上がり\n３００度　以上になる。\n木の実を　ふさで　焼いて　食べる。"
          white: "火山の　洞穴で　暮らす。\n頭の　ふさの　中が　燃えていて\n３００度の　高温になる。"
        en:
          black: "When it is angered, the temperature\nof its head tuft reaches 600° F.\nIt uses its tuft to roast berries."
          white: "This Pokémon lives in caves\nin volcanoes. The fire within the\ntuft on its head can reach 600° F."
        fr:
          black: "Quand il s’énerve, la mèche sur sa\ntête chauffe à 300 °C. Il s’en sert\npour griller des Baies et les manger."
          white: "Il vit dans les cratères des volcans.\nL’intérieur de la mèche qu’il a sur la\ntête peut atteindre 300 °C."
        it:
          black: "Se si arrabbia, il ciuffo che ha sul capo\nraggiunge la temperatura di 300°C.\nLo usa anche per arrostire le bacche."
          white: "Vive nelle grotte vulcaniche. L’interno\ndel ciuffo che ha in testa brucia a una\ntemperatura di 300°C."
        de:
          black: "Ist es wütend, erreicht das Büschel auf\nseinem Kopf Temperaturen von bis zu 300\nGrad. Es röstet sich damit auch Nüsse."
          white: "Das Feuer in seinem Kopfbüschel erreicht\nTemperaturen von bis zu 300 Grad.\nEs ist in Vulkanhöhlen zu Hause."
        es:
          black: "Su mata de pelo aumenta de temperatura\ncuando se irrita, llegando a 300°.\nTuesta bayas con su pelo para comer."
          white: "Vive en cuevas volcánicas.\nEl interior de su mata de pelo arde,\nllegando a alcanzar hasta 300°."
        ko:
          black: "화가 나면 머리의 송아리 온도가 \n300도 이상 올라간다.\n나무열매를 송아리에 구워 먹는다."
          white: "화산 동굴에서 산다.\n머리의 송아리 속이 불타고 있어\n300도나 되는 높은 온도가 된다."
simisear:
  species_id: 514
  names:
    jp_kana: バオッキー
    jp_kanji: バオッキー
    en: Simisear
    fr: Flamoutan
    it: Simisear
    de: Grillchita
    es: Simisear
    ko: 바오키
