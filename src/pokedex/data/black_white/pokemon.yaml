      form_id: 0
      base_stats:
        hp: 46
        attack: 87
        defense: 60
        special_attack: 30
        special_defense: 40
        speed: 57
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
