      descriptions:
        jp_kana:
          black: "くらい　もりや　ほらあなで　くらす。\nはなの　あなから　ちょうおんぱを\nだして　あたりの　ようすを　さぐる。"
          white: "ほらあなの　かべに　はなの　あなで\nすいつき　ねむる。すいついた\nばしょに　ハートの　あとが　のこる。"
        jp_kanji:
          black: "暗い　森や　洞穴で　暮らす。\n鼻の　穴から　超音波を　出して\nあたりの　様子を　探る。"
          white: "洞穴の　壁に　鼻の　穴で\n吸いつき　眠る。吸いついた　場所に\nハートの　跡が　残る。"
        en:
          black: "Its habitat is dark forests and caves.\nIt emits ultrasonic waves from its\nnose to learn about its surroundings."
          white: "Suction from its nostrils enables it to\nstick to cave walls during sleep. It\nleaves a heart-shaped mark behind."
        fr:
          black: "Il vit dans les forêts sombres et les\ngrottes. Il émet des ultrasons par\nle nez pour se diriger."
          white: "Il s’accroche aux murs des cavernes en\nse servant de son nez comme ventouse.\nIl y laisse une trace en forme de cœur."
        it:
          black: "Vive nelle foreste buie o nelle caverne.\nSonda l’ambiente circostante emettendo\ndegli ultrasuoni dalle narici."
          white: "Dorme attaccato per le narici alle pareti\ndelle grotte, lasciando un’impronta a\nforma di cuore quando se ne stacca."
        de:
          black: "Wohnt in dunklen Wäldern und Höhlen.\nEs sendet Ultraschallwellen mit seiner\nNase aus, um die Gegend abzutasten."
          white: "Wenn es schläft, saugt es sich mit seinem\nNasenloch an einer Höhlenwand fest und\nhinterlässt dort eine herzförmige Spur."
        es:
          black: "Vive en bosques oscuros y cavernas.\nEmite ultrasonidos por la nariz para\nsaber todo lo que pasa a su alrededor."
          white: "Este peculiar Pokémon pega sus fosas\nnasales a la pared para dormir y, cuando\nlas retira, deja un corazón marcado."
        ko:
          black: "어두운 숲이나 동굴에서 산다.\n콧구멍에서 초음파를 쏘아\n주변의 모습을 살핀다."
          white: "동굴 벽에 콧구멍을\n붙이고 잔다. 붙었던 자리에\n하트 자국이 남는다."
swoobat:
