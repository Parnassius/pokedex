        - prankster
      hidden_ability: defiant
      descriptions:
        jp_kana:
          black: "くものような　エネルギーたいに\nかはんしんが　つつまれている。\nじそく３００キロで　そらを　とぶ。"
          white: "トルネロスの　しっぽから　ふきだした\nエネルギーが　おおあらしを　おこす。\nみんかを　ふきとばす　パワー。"
        jp_kanji:
          black: "雲のような　エネルギー体に\n下半身が　包まれている。\n時速３００キロで　空を　飛ぶ。"
          white: "トルネロスの　しっぽから　吹き出した\nエネルギーが　おおあらしを　起こす。\n民家を　吹き飛ばす　パワー。"
        en:
          black: "The lower half of its body is wrapped in\na cloud of energy. It zooms through\nthe sky at 200 mph."
          white: "Tornadus expels massive energy from its\ntail, causing severe storms. Its power\nis great enough to blow houses away."
        fr:
          black: "Le bas de son corps est entouré d’une\nmasse d’énergie semblable à un nuage.\nIl vole dans le ciel à 300 km/h."
          white: "L’énergie dégagée par sa queue provoque\nd’énormes tempêtes dont la force peut\nrenverser des maisons."
        it:
          black: "Ha la parte inferiore del corpo avvolta\nin una nuvola di energia.\nSfreccia nei cieli a 300 km/h."
          white: "L’energia sprigionata dalla coda di\nTornadus provoca una violenta tempesta\nin grado di spazzare via le case."
        de:
          black: "Sein Unterkörper ist in eine wolkenartige\nEnergieschicht gehüllt. Es jagt mit bis\nzu 300 km/h durch die Lüfte."
          white: "Mit der Energie aus seiner Rute erzeugt\nes wilde Stürme, die stark genug sind,\num ganze Wohnhäuser davonzuwehen."
        es:
          black: "La parte inferior de su cuerpo, similar a\nuna nube, está recubierta de un campo\nde energía. Vuela a 300 km/h."
          white: "La energía que desprende de su cola\ngenera violentas tempestades capaces\nde echar abajo casas."
        ko:
          black: "구름처럼 생긴 에너지체에\n하반신이 둘러싸여 있다.\n시속 300km로 하늘을 난다."
          white: "토네로스의 꼬리에서 뿜어져 나온\n에너지가 큰 폭풍을 일으킨다.\n민가를 날려버릴 정도의 힘이다."
thundurus:
