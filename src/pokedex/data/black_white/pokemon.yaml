      types:
        - dragon
      egg_groups:
        - monster
        - dragon
      abilities:
        - rivalry
        - mold_breaker
      hidden_ability: unnerve
      descriptions:
        jp_kana:
          black: "やさしい　せいかくだが　なわばりを\nあらす　ものには　ようしゃしない。\nてつを　きる　キバで　いどみかかる。"
          white: "てっこつを　きりつけても　はこぼれ\nしない　がんじょうな　キバを　もつ。\nかたい　よろいに　おおわれている。"
        jp_kanji:
          black: "優しい　性格だが　縄張りを　荒らす\n者には　容赦しない。\n鉄を　切る　キバで　挑みかかる。"
          white: "鉄骨を　切りつけても　刃こぼれ\nしない　頑丈な　キバを　持つ。\n硬い　よろいに　おおわれている。"
        en:
          black: "They are kind but can be relentless\nwhen defending territory. They challenge\nfoes with tusks that can cut steel."
          white: "Their sturdy tusks will stay sharp even\nif used to cut steel beams. These\nPokémon are covered in hard armor."
        fr:
          black: "Il est doux, mais ne pardonne pas à ceux\nqui viennent saccager son territoire.\nSes crocs peuvent découper de l’acier."
          white: "Ses crocs sont tellement puissants\nqu’ils peuvent découper l’acier sans\ns’émousser. Son armure est très solide."
        it:
          black: "Ha un carattere gentile, ma non perdona\nchi devasta il suo territorio. Le sue\nzanne possono tagliare l’acciaio."
          white: "Ha forti zanne che non si spezzano\nneanche quando trancia travi d’acciaio.\nÈ protetto da una resistente armatura."
        de:
          black: "Hat eine eher sanfte Natur, doch bei Ein-\ndringlingen kennt es keine Gnade. Seine\nStoßzähne durchbohren sogar Eisen."
          white: "Wenn es mit seinen robusten Hauern Stahl\ndurchbohrt, bleiben diese unversehrt.\nEs ist von einem festen Panzer umgeben."
        es:
          black: "Es gentil, pero no perdona a todo el que\nose invadir su territorio. Su mayor baza\nson sus colmillos, que cortan el acero."
          white: "Sus colmillos no se quiebran ni aunque\nlos hinque en un armazón de acero. Está\nprotegido por una resistente armadura."
        ko:
          black: "상냥한 성격이지만 영역을\n어지럽히는 자는 용서하지 않는다.\n철을 자르는 이빨로 덤벼든다."
          white: "철골을 두 동강 내도 상처 하나\n안 나는 튼튼한 이빨을 가지고 있다.\n단단한 갑옷에 덮여 있다."
cubchoo:
  species_id: 613
  names:
    jp_kana: クマシュン
    jp_kanji: クマシュン
    en: Cubchoo
    fr: Polarhume
    it: Cubchoo
    de: Petznief
    es: Cubchoo
    ko: 코고미
  forms:
    cubchoo:
      form_id: 0
      base_stats:
        hp: 55
        attack: 70
        defense: 40
        special_attack: 60
        special_defense: 40
        speed: 40
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ice
      egg_groups:
        - field
      abilities:
        - snow_cloak
      hidden_ability: rattled
      held_items:
