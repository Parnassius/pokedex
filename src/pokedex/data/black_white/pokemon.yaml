      form_id: 0
      base_stats:
        hp: 89
        attack: 124
        defense: 80
        special_attack: 55
        special_defense: 80
        speed: 55
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
