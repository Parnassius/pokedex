      descriptions:
        jp_kana:
          black: "なわばりに　はいってきた　あいてを\nしゅうだんで　たたきのめす。くちから\nさんせいの　たいえきを　とばす。"
          white: "とさかの　おおきさで　グループの\nリーダーを　きめる。キックこうげきで\nコンクリートブロックを　はかいする。"
        jp_kanji:
          black: "縄張りに　入ってきた　相手を\n集団で　たたきのめす。\n口から　酸性の　体液を　飛ばす。"
          white: "トサカの　大きさで　グループの\nリーダーを　決める。キック攻撃で\nコンクリートブロックを　破壊する。"
        en:
          black: "Groups of them beat up anything\nthat enters their territory. Each can\nspit acidic liquid from its mouth."
          white: "It can smash concrete blocks with its\nkicking attacks. The one with the biggest\ncrest is the group leader."
        fr:
          black: "Ils se regroupent pour rosser ceux\nqui pénètrent sur leur territoire.\nIls crachent un venin corrosif."
          white: "La plus grande crête détermine le\nmeneur du groupe. Il détruit des\nblocs de béton à coups de pied."
        it:
          black: "Attaccano in gruppo chi entra nel loro\nterritorio. Sputano acido dalla bocca."
          white: "Il capo del gruppo viene scelto in base\nalla grandezza della cresta. Spacca\nblocchi di cemento con dei calci."
        de:
          black: "Es geht im Rudel gegen Eindringlinge vor.\nAus seinem Mund speit es eine ätzende\nFlüssigkeit."
          white: "Wählt seinen Anführer über die Größe des\nKamms auf dem Kopf. Ein Tritt von ihm\nreicht, um Betonblöcke zu zertrümmern."
        es:
          black: "Ataca en grupo con virulencia a todo\naquel que se interne en su territorio.\nLanza ácido por la boca."
          white: "El líder del grupo es aquel cuya cresta\nes mayor. Es capaz de romper bloques de\ncemento con sus potentes patadas."
        ko:
          black: "영역을 침범한 상대를\n집단으로 때려눕힌다.\n입에서 산성 액체를 뱉는다."
          white: "볏의 크기로 그룹의\n리더를 정한다. 발차기로\n콘크리트 블록을 파괴한다."
sigilyph:
  species_id: 561
  names:
    jp_kana: シンボラー
    jp_kanji: シンボラー
    en: Sigilyph
    fr: Cryptéro
    it: Sigilyph
    de: Symvolara
    es: Sigilyph
    ko: 심보러
  forms:
    sigilyph:
      form_id: 0
      base_stats:
        hp: 72
        attack: 58
        defense: 80
        special_attack: 103
        special_defense: 80
        speed: 97
      evs_yield:
        hp: 0
