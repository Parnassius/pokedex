        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fighting
      egg_groups:
        - human_like
      abilities:
        - sturdy
        - inner_focus
      hidden_ability: mold_breaker
      held_items:
        rare: black_belt
        rarer_dark_grass: expert_belt
      descriptions:
        jp_kana:
          black: "ダゲキが　しゅぎょうする　やまから\nおおいわや　たいぼくに　こぶしを\nうちつける　おとが　きこえてくる。"
          white: "おびを　しめると　きあいが　はいり\nパンチの　はかいりょくが　ます。\nしゅぎょうを　ジャマすると　おこる。"
        jp_kanji:
          black: "ダゲキが　修業する　山から\n大岩や　大木に　こぶしを\n打ちつける　音が　聞こえてくる。"
          white: "帯を　締めると　気合いが　入り\nパンチの　破壊力が　増す。\n修業を　ジャマされると　怒る。"
        en:
          black: "The sound of Sawk punching boulders\nand trees can be heard all the way from\nthe mountains where they train."
          white: "Tying their belts gets them pumped and\nmakes their punches more destructive.\nDisturbing their training angers them."
        fr:
          black: "Dans les montagnes où il s’entraîne, on\npeut l’entendre donner des coups de\npoing aux rochers et aux grands arbres."
          white: "Quand il noue sa ceinture, il est plus\nconcentré et ses coups font plus mal.\nIl s’énerve si on gêne son entraînement."
        it:
          black: "Dalle montagne in cui si allena Sawk\ngiunge il suono di pugni che si schiantano\ncontro grandi alberi e rocce."
          white: "La cintura da karate gli dà la carica e\naumenta la forza distruttiva dei pugni.\nQuando si allena, meglio non disturbarlo."
        de:
          black: "Am Fuß von Bergen, wo Karadonis\ntrainiert, ertönt das Echo von Fäusten,\ndie gegen Felsen und Bäume schlagen."
          white: "Zieht es den Gürtel fest, werden seine\nHiebe stärker. Kann es gar nicht leiden,\nwenn man es beim Training stört."
        es:
          black: "En las montañas en las que se adiestra,\nse pueden oír sus puños golpear rocas\ny árboles."
          white: "La potencia de sus puñetazos aumenta\nsi se aprieta el cinturón. Si le molestan\ncuando se entrena, se enfada."
        ko:
          black: "타격귀가 수련하는 산에서는\n큰 바위나 큰 나무에 주먹이\n부딪히는 소리가 들려온다."
          white: "끈을 매면 기합이 들어가\n펀치의 파괴력이 늘어난다.\n수련을 방해하면 화를 낸다."
sewaddle:
  species_id: 540
  names:
    jp_kana: クルミル
    jp_kanji: クルミル
    en: Sewaddle
    fr: Larveyette
    it: Sewaddle
    de: Strawickl
    es: Sewaddle
    ko: 두르보
  forms:
    sewaddle:
      form_id: 0
      base_stats:
        hp: 45
        attack: 53
        defense: 70
        special_attack: 40
        special_defense: 60
        speed: 42
      evs_yield:
