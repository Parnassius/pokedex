        - swarm
        - hustle
      hidden_ability: truant
      descriptions:
        jp_kana:
          black: "はがねの　よろいを　みにまとう。\nてんてきの　クイタランの　こうげきを\nしゅうだんで　ふせぎ　はんげきする。"
          white: "やまを　ほって　すあなを　つくる。\nふくざつに　いりくんだ　トンネルは\nアイアントが　つくった　めいろだ。"
        jp_kanji:
          black: "鋼の　よろいを　身にまとう。\n天敵の　クイタランの　攻撃を\n集団で　防ぎ　反撃する。"
          white: "山を　掘って　巣穴を　作る。\n複雑に　入り組んだ　トンネルは\nアイアントが　作った　迷路だ。"
        en:
          black: "They attack in groups, covering\nthemselves in steel armor to\nprotect themselves from Heatmor."
          white: "Durant dig nests in mountains.\nThey build their complicated,\ninterconnected tunnels into mazes."
        fr:
          black: "Ils portent une armure de fer et se\nregroupent pour contrer les attaques\nde leurs prédateurs, les Aflamanoir."
          white: "Ils creusent des galeries dans les\nmontagnes. Les tunnels des Fermite\nsont de vrais labyrinthes."
        it:
          black: "È protetto da un’armatura d’acciaio. Si\nriunisce in gruppi per respingere gli\nattacchi di Heatmor, il suo predatore."
          white: "Si fa il nido scavando nelle montagne.\nI complicati intrecci di tunnel creati da\nDurant sono dei veri e propri labirinti."
        de:
          black: "Ein eiserner Panzer umgibt seinen Leib.\nAngriffe von Furnifraß, seinem Feind,\nschlägt es in der Gruppe zurück."
          white: "Es hebt ein komplexes Tunnelsystem\nim Berginneren aus und nutzt dieses\nLabyrinth als seinen Bau."
        es:
          black: "Llevan una armadura de acero. Se\ndefienden en grupo para contrarrestar\na sus depredadores, los Heatmor."
          white: "Abre agujeros en las montañas.\nLos intrincados túneles son obras\nlaberínticas de los Durant."
        ko:
          black: "강철의 갑옷을 몸에 걸친다.\n천적인 앤티골의 공격을\n집단으로 막아 반격한다."
          white: "산을 파내서 굴을 만든다.\n복잡하게 얽힌 터널은\n아이앤트가 만든 미로다."
deino:
