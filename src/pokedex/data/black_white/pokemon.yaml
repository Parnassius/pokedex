        jp_kana:
          black: "ちちゅうを　ほりすすむ　スピードは\nじそく５０キロいじょう。ちじょうを\nはしる　じどうしゃと　いいしょうぶ。"
          white: "りょうての　ツメを　かさねあわせて\nからだを　こうそく　かいてんさせると\nもうスピードで　ちちゅうを　すすむ。"
        jp_kanji:
          black: "地中を　掘り進む　スピードは\n時速５０キロ以上。\n地上を　走る　自動車と　いい勝負。"
          white: "両手の　ツメを　重ね合わせて\n体を　高速　回転させると\n猛スピードで　地中を　進む。"
        en:
          black: "It can dig through the ground\nat a speed of 30 mph. It could give\na car running aboveground a good race."
          white: "It makes its way swiftly through the soil\nby putting both claws together and\nrotating at high speed."
        fr:
          black: "Il peut creuser à plus de 50 km/h et\nfaire la course avec une voiture roulant\nsur le terrain qu’il creuse."
          white: "Il se propulse à grande vitesse sous\nla terre en joignant ses griffes et\nen tourbillonnant sur lui-même."
        it:
          black: "Avanza sotto terra a una velocità di\noltre 50 km/h. Una bella sfida anche per\nun’auto che corre in superficie."
          white: "Sfreccia a gran velocità sotto terra,\navvitandosi su se stesso, mentre si apre\nun passaggio scavando con le unghie."
        de:
          black: "Es gräbt sich mit 50 km/h durch das\nErdreich und kann beinahe schon mit den\nAutos an der Oberfläche Schritt halten."
          white: "Es führt seine beiden Klauen zusammen,\ndreht sich rapide um die eigene Achse und\ngräbt sich ratzfatz durch das Erdreich."
        es:
          black: "Avanza bajo tierra a más de 50 km/h.\nPodría librar carreras excepcionales con\nun coche que avance por la superficie."
          white: "Cuando junta las garras y comienza\na dar vueltas frenéticas, avanza\nbajo tierra a gran velocidad."
        ko:
          black: "시속 50km 이상의 스피드로\n땅속을 헤쳐나간다. 지상을\n달리는 자동차와 견줄만하다."
          white: "양손의 손톱을 깍지 끼워서\n몸을 고속 회전 시키면서\n맹렬한 속도로 땅속을 헤쳐나간다."
excadrill:
  species_id: 530
  names:
    jp_kana: ドリュウズ
    jp_kanji: ドリュウズ
    en: Excadrill
    fr: Minotaupe
    it: Excadrill
    de: Stalobor
    es: Excadrill
    ko: 몰드류
