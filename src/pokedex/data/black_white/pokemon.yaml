    zoroark:
      form_id: 0
      base_stats:
        hp: 60
        attack: 105
        defense: 60
        special_attack: 120
        special_defense: 60
        speed: 105
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 2
        special_defense: 0
        speed: 0
      types:
        - dark
      egg_groups:
        - field
      abilities:
        - illusion
      descriptions:
        jp_kana:
          black: "あいてを　ばかす　ことで　むれの\nあんぜんを　まもってきた　ポケモン。\nなかまの　けっそくが　かたい。"
          white: "いっぺんに　おおぜいの　ひとを\nばかす　ちからを　もつ。まぼろしの\nけしきを　みせて　すみかを　まもる。"
        jp_kanji:
          black: "相手を　化かす　ことで　群れの\n安全を　守ってきた　ポケモン。\n仲間同士の　結束が　固い。"
          white: "いっぺんに　大勢の　人を\n化かす　力を　持つ。\n幻の　景色を　見せて　住処を　守る。"
        en:
          black: "Bonds between these Pokémon are very\nstrong. It protects the safety of its\npack by tricking its opponents."
          white: "Each has the ability to fool a large\ngroup of people simultaneously. They\nprotect their lair with illusory scenery."
        fr:
          black: "Ces Pokémon protègent les leurs en\nprenant l’apparence de leurs ennemis.\nIls forment des groupes très soudés."
          white: "Il peut mystifier instantanément des\nfoules d’humains. Il protège son habitat\nen créant des illusions de paysages."
        it:
          black: "Protegge la sicurezza del gruppo\nammaliando gli avversari. Dimostra\nforte solidarietà verso i compagni."
          white: "Ha la capacità di trasformarsi in una\nfolla di persone. Protegge la tana\ncreando dei miraggi."
        de:
          black: "Seit jeher beschützt es das Rudel, indem\nes die Gestalt des Feindes annimmt. Es\nist sehr loyal zu seinen Artgenossen."
          white: "Kann auf einen Schlag große Massen\nvon Menschen täuschen. Es kreiert\nIllusionen, um sein Revier zu schützen."
        es:
          black: "Siempre ha protegido a su manada\nembaucando a sus enemigos. Dentro de\nla manada están todos muy unidos."
          white: "Tiene la facultad de confundir a muchos\nhumanos a la vez. Protege su guarida\ncreando un paisaje ilusorio."
        ko:
          black: "상대를 속여 무리의\n안전을 유지해온 포켓몬이다.\n동료 간의 결속력이 강하다."
          white: "한 번에 많은 사람을\n속이는 힘을 가졌다. 환영의\n경치를 보여줘 거처를 지킨다."
minccino:
  species_id: 572
  names:
    jp_kana: チラーミィ
    jp_kanji: チラーミィ
    en: Minccino
    fr: Chinchidou
    it: Minccino
    de: Picochilla
    es: Minccino
    ko: 치라미
