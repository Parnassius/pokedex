        jp_kana:
          black: "ほねを　ひろい　あつめて　すづくり。\nよわった　えものを　あしで　つかみ\nほねの　すまで　かるがると　はこぶ。"
          white: "そらから　ちじょうを　かんさつして\nよわった　えものに　おそいかかる。\nほねで　きかざる　しゅうせい。"
        jp_kanji:
          black: "骨を　拾い　集めて　巣作り。\n弱った　獲物を　脚で　つかみ\n骨の　巣まで　軽々と　運ぶ。"
          white: "空から　地上を　観察して\n弱った　獲物に　襲いかかる。\n骨で　着飾る　習性。"
        en:
          black: "It makes a nest out of bones it finds.\nIt grabs weakened prey in its talons\nand hauls it to its nest of bones."
          white: "Watching from the sky, they swoop to\nstrike weakened Pokémon on the ground.\nThey decorate themselves with bones."
        fr:
          black: "Il construit des nids en os. Il attrape\nles proies affaiblies avec ses serres\net les transporte allègrement au nid."
          white: "Il guette le sol depuis les airs et\nfond sur les proies affaiblies.\nIl aime s’apprêter avec des ossements."
        it:
          black: "Si costruisce il nido con le ossa\nraccolte. Afferra le prede indebolite\ncon gli arti e le trasporta nel nido."
          white: "Osserva la terra dal cielo e si lancia\nsulle prede in difficoltà. Ha l’abitudine\ndi farsi delle decorazioni con le ossa."
        de:
          black: "Es baut sein Nest aus Knochen. Ist seine\nBeute geschwächt, packt es sie mit den\nBeinen und trägt sie zu seinem Nest."
          white: "Es überblickt das Areal aus der Luft und\nstürzt sich auf ein geschwächtes Opfer.\nTrägt gern Knochenschmuck."
        es:
          black: "Construye su nido con huesos. Atrapa\npresas débiles con sus garras y las\ntransporta a su nido."
          white: "Otea la superficie desde el cielo y ataca\na Pokémon debilitados. Tiene por\ncostumbre hacerse adornos con huesos."
        ko:
          black: "뼈를 주워 모아 둥지를 만든다.\n쇠약해진 먹이를 발로 붙잡아\n뼈 둥지까지 가뿐히 옮긴다."
          white: "하늘에서 지상을 관찰하다\n쇠약해진 먹이를 덮친다.\n뼈로 몸치장하는 습성이 있다."
heatmor:
  species_id: 631
  names:
    jp_kana: クイタラン
    jp_kanji: クイタラン
    en: Heatmor
    fr: Aflamanoir
    it: Heatmor
    de: Furnifraß
    es: Heatmor
    ko: 앤티골
  forms:
    heatmor:
      form_id: 0
      base_stats:
        hp: 85
        attack: 97
        defense: 66
        special_attack: 105
        special_defense: 66
        speed: 65
      evs_yield:
        hp: 0
        attack: 0
