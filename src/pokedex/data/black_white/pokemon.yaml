      descriptions:
        jp_kana:
          black: "ランドロスの　おとずれる　とちは\nさくもつが　たくさん　みのるため\nはたけのかみさま　と　いわれている。"
          white: "しっぽから　ふりそそぐ　エネルギーが\nつちの　えいようを　ふやすので\nさくもつが　おおきく　そだつのだ。"
        jp_kanji:
          black: "ランドロスが　訪れる　土地は\n作物が　たくさん　実るため\n畑の神様　と　言われている。"
          white: "しっぽから　降り注ぐ　エネルギーが\n土の　栄養を　増やすので\n作物が　大きく　育つのだ。"
        en:
          black: "Lands visited by Landorus grant such\nbountiful crops that it has been hailed\nas “The Guardian of the Fields.”"
          white: "The energy that comes pouring from its\ntail increases the nutrition in the soil,\nmaking crops grow to great size."
        fr:
          black: "Il fait fructifier les cultures partout\noù il passe, c’est pourquoi on l’appelle\n“le dieu des moissons”."
          white: "L’énergie déversée par sa queue\nenrichit les sols en nutriments et\nfavorise les cultures."
        it:
          black: "Poiché le terre che visita producono\nabbondanti raccolti, è considerato\nuna benedizione per i campi."
          white: "Poiché l’energia che riversa dalla coda\nporta nutrimento alla terra, i raccolti\ncrescono rigogliosi."
        de:
          black: "Da an Orten, wo es sich blicken lässt,\nmit reicher Ernte zu rechnen ist, nennt\nman es auch den „Herrn des Ackerbaus“."
          white: "Es vergießt mit seinem Schweif Energie,\ndie den Boden mit Nährstoffen anreichert\nund für reichhaltige Ernten sorgt."
        es:
          black: "Lo consideran una deidad de las cosechas\nporque los cultivos crecen en abundancia\nen las tierras por las que pasa."
          white: "La energía que desprende su cola\nenriquece de nutrientes la tierra, y\nla calidad de las cosechas mejora."
        ko:
          black: "랜드로스가 찾아온 땅에는\n작물에 열매가 많이 열리기 때문에\n농지의 신이라고 전해진다."
          white: "꼬리에서 쏟아져 내리는 에너지가\n땅의 영양 상태를 좋게 하여\n작물이 크게 자란다."
