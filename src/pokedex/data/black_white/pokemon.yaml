      descriptions:
        jp_kana:
          black: "じめんを　すべるように　はしる。\nすばやい　うごきで　てきを　まどわせ\nつるのムチで　しとめるのだ。"
          white: "おいしげった　くさきの　かげを\nくぐりぬけ　こうげきを　さける。\nたくみな　ムチさばきで　はんげき。"
        jp_kanji:
          black: "地面を　滑るように　走る。\n素早い　動きで　敵を　まどわせ\nつるのムチで　しとめるのだ。"
          white: "生い茂った　草木の　陰を\n潜り抜けて　攻撃を　避ける。\n巧みな　ムチさばきで　反撃。"
        en:
          black: "It moves along the ground as if sliding.\nIts swift movements befuddle its foes,\nand it then attacks with a vine whip."
          white: "They avoid attacks by sinking into the\nshadows of thick foliage. They retaliate\nwith masterful whipping techniques."
        fr:
          black: "Il court comme s’il glissait sur le sol.\nIl déroute l’ennemi par ses mouvements\net l’assomme d’un coup de liane."
          white: "Il évite les coups en se cachant dans la\nvégétation luxuriante et contre-attaque\nhabilement avec un bon coup de liane."
        it:
          black: "Corre quasi scivolando sulle superfici.\nConfonde il nemico con i rapidi movimenti,\nper poi attaccarlo con una frustata."
          white: "Evita gli attacchi sgusciando tra la\nfolta vegetazione. Contrattacca poi\ncon abili colpi di frusta."
        de:
          black: "Huscht beinahe gleitend über den Boden\nund täuscht Gegner mit agilen Manövern,\nbis es mithilfe seiner Efeurute obsiegt."
          white: "Es verschwindet im wuchernden Dickicht,\num Angriffen auszuweichen, und kontert\nmit einem gekonnten Rutenhieb."
        es:
          black: "Parece que se desliza al correr.\nEngaña a sus rivales con su velocidad\ny los fustiga con su látigo."
          white: "Se oculta a la sombra de la vegetación\npara evitar enfrentamientos. Usa con\ndestreza el látigo para contraatacar."
        ko:
          black: "땅을 미끄러지듯 달린다.\n빠른 움직임으로 상대를 혼란시키고\n덩굴채찍으로 꼼짝 못하게 한다."
          white: "무성한 초목의 그림자를\n헤쳐나가며 공격을 피한다.\n채찍으로 능숙하게 반격한다."
serperior:
  species_id: 497
  names:
    jp_kana: ジャローダ
    jp_kanji: ジャローダ
    en: Serperior
    fr: Majaspic
    it: Serperior
    de: Serpiroyal
    es: Serperior
    ko: 샤로다
