      base_stats:
        hp: 70
        attack: 55
        defense: 75
        special_attack: 45
        special_defense: 65
        speed: 60
      evs_yield:
        hp: 0
        attack: 0
        defense: 1
        special_attack: 0
        special_defense: 0
