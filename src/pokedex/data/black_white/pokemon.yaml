      descriptions:
        jp_kana:
          black: "あごの　ほのおで　こぶしを　もやして\nほのおの　パンチを　くりだす。\nとても　なかまおもいの　ポケモン。"
          white: "ほのおの　あごひげを　たくわえる。\nパワーと　スピードを　かねそなえた\nかくとうの　わざを　みにつけている。"
        jp_kanji:
          black: "アゴの　炎で　こぶしを　燃やして\n炎の　パンチを　繰り出す。\nとても　仲間思いの　ポケモン。"
          white: "炎の　あごひげを　たくわえている。\nパワーと　スピードを　兼ね備えた\n格闘の　技を　身につけている。"
        en:
          black: "It can throw a fire punch by setting its\nfists on fire with its fiery chin. It cares\ndeeply about its friends."
          white: "It has mastered fast and powerful\nfighting moves. It grows a beard of fire."
        fr:
          black: "Il embrase ses poings avec les flammes\nsur son menton et cogne l’ennemi avec.\nC’est un Pokémon très solidaire."
          white: "Il a une barbe enflammée.\nIl maîtrise des techniques de combat au\ncorps à corps rapides et puissantes."
        it:
          black: "Infiamma i pugni sulla barba ardente,\npoi sferra attacchi di fuoco sui nemici.\nHa molta considerazione per i suoi simili."
          white: "La sua barba è avvolta dalle fiamme.\nPadroneggia mosse di lotta che combinano\npotenza e rapidità."
        de:
          black: "Steckt mit dem Feuer um sein Kinn seine\nFäuste in Brand und holt zu feurigen\nFausthieben aus. Zeigt großen Teamgeist."
          white: "Es trägt einen Backenbart aus Feuer und\nbeherrscht Kampftechniken, die ebenso\nwuchtig wie schnell sind."
        es:
          black: "Calienta sus puños con las llamas de\nsu barbilla para propinar puñetazos\nardientes. Es muy fiel a sus compañeros."
          white: "Posee una tupida barba fogosa. Es tanto\nrápido como poderoso, y su principal\nbaza es la lucha cuerpo a cuerpo."
        ko:
          black: "턱의 화염으로 주먹을 불태워\n불꽃펀치를 날린다.\n동료애가 깊은 포켓몬이다."
          white: "불꽃 턱수염을 기르고 있다.\n파워와 스피드를 겸비한\n격투 기술을 익히고 있다."
oshawott:
  species_id: 501
  names:
    jp_kana: ミジュマル
    jp_kanji: ミジュマル
    en: Oshawott
    fr: Moustillon
    it: Oshawott
    de: Ottaro
    es: Oshawott
    ko: 수댕이
  forms:
    oshawott:
      form_id: 0
      base_stats:
        hp: 55
        attack: 55
        defense: 45
        special_attack: 63
        special_defense: 45
        speed: 45
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 1
        special_defense: 0
        speed: 0
      types:
        - water
      egg_groups:
        - field
      abilities:
        - torrent
        - torrent
