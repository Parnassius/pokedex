      descriptions:
        jp_kana:
          black: "あたまの　コブから　しんけいを\nマヒさせる　えきたいを　とばす。\nしんどうで　あいてを　くるしめる。"
          white: "こぶしの　コブを　しんどうさせると\nパンチの　いりょくが　ばいぞうする。\nいちげきで　おおいわを　ふんさい。"
        jp_kanji:
          black: "頭の　コブから　神経を　マヒさせる\n液体を　飛ばす。\n振動で　相手を　苦しめる。"
          white: "こぶしの　コブを　振動させると\nパンチの　威力が　倍増する。\n一撃で　大岩を　粉砕。"
        en:
          black: "They shoot paralyzing liquid from their\nhead bumps. They use vibration to hurt\ntheir opponents."
          white: "It increases the power of its punches by\nvibrating the bumps on its fists. It can\nturn a boulder to rubble with one punch."
        fr:
          black: "Il fait gicler un liquide paralysant des\npustules sur sa tête, et attaque\nses ennemis à coups de vibrations."
          white: "Son coup de poing est plus fort quand il\nfait vibrer la pustule dessus. Il peut\nbriser un gros rocher d’un coup."
        it:
          black: "Dalle escrescenze che ha sulla testa\nspara un liquido che paralizza i nervi.\nUsa le vibrazioni per attaccare il nemico."
          white: "Facendo vibrare le protuberanze\nsui pugni, ne raddoppia la potenza.\nFrantuma enormi massi con un colpo."
        de:
          black: "Es schießt eine lähmende Flüssigkeit aus\nden Beulen auf seinem Kopf. Es plagt\nseine Gegner mit Schallwellen."
          white: "Wenn es die Beulen an seinen Fäusten zum\nSchwingen bringt, kann es doppelt so\nfest zuschlagen und Felsen zertrümmern."
        es:
          black: "Despide un líquido paralizador por los\nbultos de su cabeza. Atormenta a sus\noponentes con enormes vibraciones."
          white: "Aumenta la potencia de sus puñetazos\nhaciendo vibrar sus puños. Es capaz de\nquebrar una roca de un solo golpe."
        ko:
          black: "머리의 혹에서 신경을\n마비시키는 액체를 날린다.\n진동으로 상대를 괴롭힌다."
          white: "주먹의 혹을 진동시켜\n펀치의 위력을 배가시킨다.\n일격에 큰 바위를 부스러뜨린다."
throh:
