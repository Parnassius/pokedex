      descriptions:
        jp_kana:
          black: "パワーが　みなぎると　オレンジいろの\nけっしょうが　ひかり　かがやく。\nほらあなで　ちかすいを　さがす。"
          white: "たいないに　おさまりきらずに\nもれだした　エネルギーが　かたまり\nオレンジいろの　けっしょうになった。"
        jp_kanji:
          black: "パワーが　みなぎると　オレンジ色の\n結晶が　光り　輝く。\n洞穴で　地下水を　探す。"
          white: "体内に　収まりきらず　漏れ出した\nエネルギーが　かたまり\nオレンジ色の　結晶になった。"
        en:
          black: "When it overflows with power,\nthe orange crystal on its body glows.\nIt looks for underground water in caves."
          white: "Because its energy was too great to be\ncontained, the energy leaked and formed\norange crystals."
        fr:
          black: "Quand il est gonflé à bloc, ses cristaux\norangés scintillent. Il cherche de l’eau\nsouterraine dans les grottes."
          white: "L’énergie de son corps qu’il ne parvient\npas à retenir s’écoule à l’extérieur et\nforme des cristaux orangés."
        it:
          black: "Quando la sua energia è al massimo,\ni cristalli arancioni si illuminano. Cerca\nl’acqua nelle grotte sotterranee."
          white: "L’energia sovrabbondante cerca sfogo\nall’esterno del corpo e si solidifica\nformando cristalli di colore arancione."
        de:
          black: "Wenn es voller Kraft steckt, funkeln die\norangefarbenen Kristalle an seinem Leib.\nEs sucht Höhlen nach Grundwasser ab."
          white: "Energie, die ungehindert aus seinem\nKörper austrat, hat sich an ihm zu\norangefarbenen Kristallen verfestigt."
        es:
          black: "Cuando está rebosante de energía,\nbrillan sus cristales naranjas. Busca\naguas subterráneas en las cuevas."
          white: "La energía que no puede contener en\nel interior de su cuerpo se escapa\nformando cristales naranjas."
        ko:
          black: "힘이 넘치면 주황색\n결정이 반짝반짝 빛을 낸다.\n동굴에서 지하수를 찾아다닌다."
          white: "체내에서 처리되지 못하고\n빠져나온 에너지가 덩어리져서\n주황색 결정이 되었다."
gigalith:
  species_id: 526
  names:
