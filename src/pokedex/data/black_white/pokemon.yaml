      descriptions:
        jp_kana:
          black: "チョボマキと　いっしょに　いるときに\nでんきてきな　しげきを　うけると\nしんかする　ふしぎな　ポケモンだ。"
          white: "きけんを　かんじると　くちから\nさんせいの　えきたいを　とばす。\nチョボマキを　ねらう　ポケモン。"
        jp_kanji:
          black: "チョボマキと　一緒に　いるときに\n電気的な　刺激を　受けると\n進化する　不思議な　ポケモンだ。"
          white: "危険を　感じると　口から　酸性の\n液体を　飛ばして　敵を　撃退する。\nチョボマキを　ねらう　ポケモン。"
        en:
          black: "These mysterious Pokémon evolve when\nthey receive electrical stimulation while\nthey are in the same place as Shelmet."
          white: "When they feel threatened, they spit\nan acidic liquid to drive attackers away.\nThis Pokémon targets Shelmet."
        fr:
          black: "Un Pokémon mystérieux qui évolue quand\nil reçoit un stimulus électrique en étant\nproche d’un Escargaume."
          white: "Quand il sent un danger, il se défend\nen crachant un liquide acide.\nIl chasse les Escargaume."
        it:
          black: "Pokémon misterioso che si evolve\nricevendo uno stimolo elettrico, se si\ntrova in presenza di Shelmet."
          white: "Se avverte un pericolo respinge il nemico\nspruzzando un liquido acido dalla bocca.\nPrende di mira Shelmet."
        de:
          black: "Ein mysteriöses Pokémon, das sich\nentwickelt, wenn es zusammen mit\nSchnuthelm einen Stromschlag abbekommt."
          white: "Fühlt es sich bedroht, wehrt es sich,\nindem es ätzende Flüssigkeit speit.\nHat es auf Schnuthelm abgesehen."
        es:
          black: "Si recibe un estímulo eléctrico al\nestar en contacto con un Shelmet,\nevoluciona."
          white: "Cuando presiente peligro, expulsa por la\nboca un ácido que lanza a sus enemigos.\nSiempre va tras los Shelmet."
        ko:
          black: "쪼마리와 함께 있을 때\n전기적인 자극을 받으면\n진화하는 이상한 포켓몬이다."
          white: "위험을 느끼면 입에서 산성의\n액체를 뱉어서 적을 격퇴한다.\n쪼마리를 노리는 포켓몬이다."
escavalier:
  species_id: 589
  names:
    jp_kana: シュバルゴ
    jp_kanji: シュバルゴ
    en: Escavalier
    fr: Lançargot
