        attack: 0
        defense: 1
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - bug
        - grass
      egg_groups:
        - bug
      abilities:
        - swarm
        - chlorophyll
      hidden_ability: overcoat
      held_items:
        rare: mental_herb
      descriptions:
        jp_kana:
          black: "タマゴから　かえると　ハハコモリに\nふくを　つくってもらい　きせられる。\nフードで　あたまを　かくして　ねる。"
          white: "はっぱを　かみきり　くちから　だす\nねんちゃくいとで　ぬいあわせて\nじぶんで　ふくを　つくる　ポケモン。"
        jp_kanji:
          black: "タマゴから　かえると　ハハコモリに\n服を　作ってもらい　着せられる。\nフードで　頭を　隠して　寝る。"
          white: "葉っぱを　かみ切り　口から　出す\n粘着糸で　縫い合わせる。\n自分で　服を　作る　ポケモン。"
        en:
          black: "Leavanny dress it in clothes they made\nfor it when it hatched. It hides its head\nin its hood while it is sleeping."
          white: "This Pokémon makes clothes for itself.\nIt chews up leaves and sews them with\nsticky thread extruded from its mouth."
        fr:
          black: "Quand il éclot, Manternel lui coud son\nvêtement. Il dort en cachant son\nvisage sous sa capuche."
          white: "Il fait des vêtements en découpant des\nfeuilles et en les cousant avec le fil\nadhésif qu’il sécrète par la bouche."
        it:
          black: "Quando nasce dall’Uovo, Leavanny gli fa\nun vestito e glielo fa indossare. Dorme\ncoprendosi la testa con il cappuccio."
          white: "Si prepara da sé i vestiti, tagliando\nle foglie e usando i fili viscosi che\nsecerne dalla bocca per cucirli."
        de:
          black: "Gleich nach dem Schlüpfen näht Matrifol\nihm ein Kleidchen. Wenn es schläft,\nverbirgt es den Kopf unter einer Haube."
          white: "Schneidert sich ein Kleid, indem es sich\nBlätter zurechtbeißt und sie mit Klebe-\nfäden aus seinem Mund zusammennäht."
        es:
          black: "Cuando eclosiona, Leavanny le hace ropa\ny se la pone. Se tapa la cabeza con la\ncapucha para dormir."
          white: "Recorta hojas y las teje con el líquido\nviscoso que segrega por la boca para\nhacerse su propia ropa."
        ko:
          black: "알에서 부화하면 모아머가\n만들어 준 옷을 입는다.\n후드로 머리를 숨기고 잔다."
          white: "잎사귀를 물어뜯어\n입에서 뱉어낸 점착실로 꿰맨다.\n스스로 옷을 만드는 포켓몬이다."
swadloon:
  species_id: 541
  names:
    jp_kana: クルマユ
    jp_kanji: クルマユ
    en: Swadloon
    fr: Couverdure
    it: Swadloon
    de: Folikon
    es: Swadloon
    ko: 두르쿤
  forms:
    swadloon:
      form_id: 0
      base_stats:
        hp: 55
        attack: 63
        defense: 90
        special_attack: 50
        special_defense: 80
        speed: 42
      evs_yield:
        hp: 0
        attack: 0
        defense: 2
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - bug
        - grass
      egg_groups:
        - bug
      abilities:
        - leaf_guard
        - chlorophyll
      hidden_ability: overcoat
      held_items:
        rare: mental_herb
      descriptions:
        jp_kana:
          black: "クルマユの　すむ　もりは　くさきが\nよく　そだつ。クルマユが　おちばを\nえいようぶんに　かえているのだ。"
          white: "はっぱで　からだを　つつみこんで\nさむさを　ふせぐ。てぢかな　おちばを\nたべながら　もりを　いどうする。"
        jp_kanji:
          black: "クルマユの　住む　森は　草木が\nよく　育つ。クルマユが　落ち葉を\n栄養分に　変えているのだ。"
          white: "葉っぱで　体を　包み込んで\n寒さを　防ぐ。手近な　落ち葉を\n食べながら　森を　移動する。"
        en:
          black: "Forests where Swadloon live have superb\nfoliage because the nutrients they make\nfrom fallen leaves nourish the plant life."
          white: "It protects itself from the cold\nby wrapping up in leaves. It stays on\nthe move, eating leaves in forests."
        fr:
          black: "Dans les forêts où il vit, la végétation\npousse bien car il transforme les\nfeuilles mortes en engrais."
          white: "Il se protège du froid en s’emmitouflant\ndans une feuille. Il se déplace en forêt\net mange les feuilles tombées par terre."
        it:
          black: "Le foreste in cui vive Swadloon sono\nlussureggianti, poiché trasforma\nle foglie morte in sostanze nutritive."
          white: "Si protegge dal freddo avvolgendo\nil corpo nelle foglie, che ha l’abitudine\ndi mangiare in giro per la foresta."
        de:
          black: "Es wandelt herabgefallenes Laub in Nähr-\nstoffe um. In Wäldern, wo es Folikon\ngibt, fühlen sich Pflanzen pudelwohl."
          white: "Es schützt sich vor Kälte, indem es sich\nin Blätter einwickelt. Es durchstreift\nWälder und frisst herabgefallenes Laub."
        es:
          black: "La vegetación abunda en los bosques\nque habita. Este Pokémon transforma\nlas hojas caídas en nutrientes."
          white: "Se guarece del frío envolviéndose en\nhojas. Se desplaza por el bosque\ncomiendo a su paso las hojas caídas."
        ko:
          black: "두르쿤이 사는 숲은 초목이\n잘 자란다. 두르쿤이 낙엽을\n영양분으로 바꾸기 때문이다."
          white: "잎사귀로 몸을 감싸\n추위를 막는다. 가까이 있는 낙엽을\n먹으며 숲을 이동한다."
leavanny:
  species_id: 542
  names:
    jp_kana: ハハコモリ
    jp_kanji: ハハコモリ
    en: Leavanny
    fr: Manternel
    it: Leavanny
    de: Matrifol
    es: Leavanny
    ko: 모아머
  forms:
