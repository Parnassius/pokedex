          white: "オスが　メスに　きゅうあいするとき\nはっする　ちょうおんぱを　あびると\nとても　たのしい　きぶんになる。"
        jp_kanji:
          black: "いろいろな　周波数の　音波を\n鼻の　穴から　発射する。\n岩を　破壊する　音波も　出す。"
          white: "オスが　メスに　求愛するとき\n発する　超音波を　浴びると\nとても　楽しい　気分になる。"
        en:
          black: "It emits sound waves of various\nfrequencies from its nose, including\nsome powerful enough to destroy rocks."
          white: "Anyone who comes into contact with the\nultrasonic waves emitted by a courting\nmale experiences a positive mood shift."
        fr:
          black: "Il émet des ondes sonores de\ndifférentes fréquences par le nez.\nCertaines peuvent briser des rochers."
          white: "Le mâle courtise la femelle à l’aide\nd’ultrasons. Les écouter met de très\nbonne humeur."
        it:
          black: "Emette dal naso onde sonore di varie\nfrequenze, alcune in grado di\ndistruggere anche la pietra."
          white: "È molto piacevole essere investiti dalle\nonde ultrasoniche che il maschio emette\nquando corteggia la femmina."
        de:
          black: "Es sendet über seine Nase Schallwellen\nmit verschiedenen Frequenzen aus. Mit\nmanchen kann es sogar Felsen zerstören."
          white: "Wer den Ultraschallwellen eines\nMännchens in der Balz ausgesetzt wird,\nverfällt in eine euphorische Stimmung."
        es:
          black: "Dispara ondas de distintas frecuencias\npor su nariz. También emite ondas\ncapaces de destrozar rocas."
          white: "Todos rebosan de alborozo cuando\nperciben las ondas ultrasónicas emitidas\npor el macho para cortejar a la hembra."
        ko:
          black: "여러 주파수의 음파를\n콧구멍으로 발사한다.\n바위를 부수는 음파도 쏜다."
          white: "수컷이 암컷에게 구애할 때\n발사하는 초음파에 노출되면\n기분이 매우 즐거워진다."
drilbur:
