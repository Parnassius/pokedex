      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 2
      types:
        - bug
      egg_groups:
        - bug
      abilities:
        - hydration
        - sticky_hold
      hidden_ability: unburden
      descriptions:
        jp_kana:
          black: "からだが　かわくと　よわってしまう。\nうすい　まくを　なんじゅうも　まいて\nかんそうを　ふせいでいるのだ。"
          white: "おもい　カラを　ぬいだために\nみがるになった。まるで　にんじゃの\nような　みのこなしで　たたかう。"
        jp_kanji:
          black: "体が　乾くと　弱ってしまう。\n薄い　膜を　何重も　巻いて\n乾燥を　防いでいるのだ。"
          white: "重い　殻を　脱いだために\n身軽になった。まるで　忍者のような\n身のこなしで　戦う。"
        en:
          black: "When its body dries out, it weakens.\nSo, to prevent dehydration, it wraps\nitself in many layers of thin membrane."
          white: "Having removed its heavy shell,\nit becomes very light and can fight\nwith ninja-like movements."
        fr:
          black: "Quand son corps s’assèche, il faiblit.\nIl s’en prémunit en s’enroulant dans\nplusieurs couches d’une fine muqueuse."
          white: "Il s’est bien allégé en se débarrassant\nde sa lourde carapace. Il se bat avec\nl’agilité d’un ninja."
        it:
          black: "Si indebolisce quando il corpo si secca.\nPreviene l’essiccazione avvolgendosi\nin molti strati di sottili membrane."
          white: "Liberatosi della pesante conchiglia,\nè diventato leggero. Lotta con le\nmovenze proprie di un ninja."
        de:
          black: "Da es ohne Flüssigkeit an Kraft verliert,\nschützt es sich mit mehreren dünnen\nHautschichten vor dem Austrocknen."
          white: "Seit es die schwere Muschel abgestreift\nhat, ist es viel leichter. Nun gleichen\nseine Kampfbewegungen denen eines Ninja."
        es:
          black: "Los ambientes secos lo debilitan. Evita\nla sequedad envolviéndose en muchas\nmembranas finas superpuestas."
          white: "Se siente ligero una vez liberado\nde su caparazón. Lucha y se mueve\ncomo un ninja."
        ko:
          black: "몸이 마르면 약해진다.\n얇은 막을 몇 겹이나 두르고\n건조해지는 것을 막고 있다."
          white: "무거운 껍데기를 벗었기 때문에\n몸이 가벼워졌다. 마치 닌자 같은\n몸놀림으로 싸운다."
stunfisk:
  species_id: 618
  names:
    jp_kana: マッギョ
    jp_kanji: マッギョ
    en: Stunfisk
    fr: Limonde
    it: Stunfisk
    de: Flunschlik
    es: Stunfisk
    ko: 메더
