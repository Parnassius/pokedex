      descriptions:
        jp_kana:
          black: "３ほんの　トゲつきの　しょくしゅを\nふりまわして　たたかう。おおいわを\nふんさいする　はかいりょくだ。"
          white: "ほらあなの　てんじょうに　はりつき\nしたを　とおる　えものに　むかって\nてつの　トゲを　うちこみ　おそう。"
        jp_kanji:
          black: "３本の　トゲつき　触手を　振り回して\n戦う。鋼の　トゲは　たたきつけると\n大岩を　粉砕する　破壊力だ。"
          white: "洞穴の　天井に　はりつき\n下を　通る　獲物に　向かって\n鉄の　トゲを　打ち込み　襲う。"
        en:
          black: "It fights by swinging around its three\nspiky feelers. A hit from these steel\nspikes can reduce a boulder to rubble."
          white: "They attach themselves to cave\nceilings, firing steel spikes at targets\npassing beneath them."
        fr:
          black: "Il combat avec ses trois tentacules\népineux. Un coup de ses épines d’acier\npeut briser en deux de gros rochers."
          white: "Il s’accroche aux plafonds des grottes\net attaque les proies qui passent en\ndessous avec ses épines d’acier."
        it:
          black: "Lotta agitando i tre tentacoli muniti di\naculei. I suoi aculei d’acciaio possono\nfrantumare rocce imponenti."
          white: "Si appende al soffitto delle grotte e\nattacca le prede che passano al di sotto\nlanciando i suoi aculei di ferro."
        de:
          black: "Seine drei dornengespickten Schlingen,\nunter denen sogar große Felsen zu Bruch\ngehen, dienen ihm als Angriffswerkzeug."
          white: "Es setzt sich an der Decke von Höhlen\nfest und wirft seine dornengespickten\nSchlingen auf vorbeigehende Beute ab."
        es:
          black: "Lucha agitando sus tres tentáculos\nrecubiertos de púas. El impacto de sus\ntentáculos de acero machaca rocas."
          white: "Se pega al techo de cuevas y lanza púas\nde metal a todo el que pase por debajo\nde donde se encuentre."
        ko:
          black: "3개의 가시 달린 촉수를\n휘두르며 싸운다. 큰 바위를\n부스러뜨리는 파괴력이다."
          white: "동굴 천정에 달라붙어\n아래를 지나가는 먹이를 향해\n철 가시를 쏘며 덮친다."
klink:
  species_id: 599
  names:
    jp_kana: ギアル
    jp_kanji: ギアル
    en: Klink
    fr: Tic
    it: Klink
    de: Klikk
    es: Klink
    ko: 기어르
