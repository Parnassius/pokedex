        jp_kana:
          black: "とくしゅな　はっせいほうで　うたう\nメロディは　きいた　ものの\nかんじょうを　じざいに　あやつる。"
          white: "メロエッタの　かなでる　メロディに\nインスピレーションを　うけて\nつくられた　めいきょくは　おおい。"
        jp_kanji:
          black: "特殊な　発声法で　歌う　メロディは\n聞いた　者の　感情を\n自在に　操る。"
          white: "メロエッタの　奏でる　メロディに\nインスピレーションを　受けて\n作られた　名曲は　多い。"
        en:
          black: "Its melodies are sung with a special\nvocalization method that can control\nthe feelings of those who hear it."
          white: "Many famous songs have been inspired\nby the melodies that Meloetta plays."
        fr:
          black: "Sa voix si particulière lui permet de\nchanter des mélodies qui ensorcellent\nles gens et modifient leurs émotions."
          white: "De nombreux succès musicaux ont été\ncomposés en s’inspirant des mélodies\nchantées par Meloetta."
        it:
          black: "Controlla a suo piacimento le emozioni\ndi coloro che ascoltano i suoi singolari\nvocalizzi."
          white: "Sono molte le canzoni composte traendo\nispirazione dalla melodia suonata da\nMeloetta."
        de:
          black: "Wer die Melodie hört, die es in einer\nspeziellen Stimmlage von sich gibt,\nsteht voll in seinem Bann."
          white: "Seine Melodien inspirierten\nKomponisten, die daraus viele\nbekannte Lieder komponierten."
        es:
          black: "Controla los sentimientos de los que\nescuchan las melodías que emite con\nsu singular vocalización."
          white: "Se han creado innumerables canciones\ninspiradas en las melodías que emite\nMeloetta."
        ko:
          black: "특수한 발성법으로 노래하는\n멜로디는 노래를 들은 자의\n감정을 자유자재로 조종한다."
          white: "메로엣타가 연주하는\n멜로디에서 영감을 받아\n만들어진 명곡이 많다."
