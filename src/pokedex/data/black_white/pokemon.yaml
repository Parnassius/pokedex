      descriptions:
        jp_kana:
          black: "かんだかい　けいかいおんを\nほほの　しんどうで　はっせいさせて\nなかまに　きけんを　しらせる。"
          white: "ほほを　しんどうさせて　ひとには\nきこえない　おんぱを　だす。\nおんぱの　リズムで　かいわする。"
        jp_kanji:
          black: "甲高い　警戒音を\nほほの　振動で　発生させて\n仲間に　危険を　知らせる。"
          white: "ほほを　振動させて\n人には　聞こえない　音波を　出す。\n音波の　リズムで　会話する。"
        en:
          black: "They warn others of danger by\nvibrating their cheeks to create\na high-pitched sound."
          white: "By vibrating its cheeks, it emits sound\nwaves imperceptible to humans. It uses\nthe rhythm of these sounds to talk."
        fr:
          black: "Il prévient ses camarades du danger en\nfaisant vibrer ses joues pour générer\nun signal d’alarme très aigu."
          white: "Il fait vibrer ses joues pour émettre\ndes sons imperceptibles pour l’homme.\nIl communique grâce à leur rythme."
        it:
          black: "Avverte i suoi simili del pericolo con\nun acuto suono d’allarme che produce\nfacendo vibrare le guance."
          white: "Facendo vibrare le guance, emette onde\nsonore che gli uomini non sentono.\nConversa al ritmo di queste onde."
        de:
          black: "Bei Gefahr alarmiert es Artgenossen\ndurch ein schrilles Warnsignal, das es\nmit seinen Wangen erzeugt."
          white: "Erzeugt mit seinen Wangen für Menschen\nunhörbare Schallwellen. Es verständigt\nsich über den Rhythmus dieser Wellen."
        es:
          black: "Emite un agudo chirrido haciendo\nvibrar sus mejillas para avisar a sus\ncompañeros en momentos de peligro."
          white: "Emite sonidos imperceptibles para los\nhumanos con la vibración de sus mejillas\ny se comunica al ritmo de los mismos."
        ko:
          black: "볼을 진동시켜 발생한\n날카로운 경계음으로\n동료에게 위험을 알린다."
          white: "볼을 진동시켜서 사람에게는\n들리지 않는 음파를 낸다.\n음파의 리듬으로 대화를 나눈다."
palpitoad:
