        jp_kana:
          black: "はがねに　しんかした　ドリルは\nてっぱんを　つらぬく　はかいりょく。\nトンネルこうじで　だいかつやくする。"
          white: "ちか　１００メートルに　めいろの\nような　すあなを　つくる。ちかてつの\nトンネルに　あなを　あけてしまう。"
        jp_kanji:
          black: "鋼に　進化した　ドリルは\n鉄板を　つらぬく　破壊力。\nトンネル工事で　大活躍する。"
          white: "地下　１００メートルに　迷路の\nような　巣穴を　作る。地下鉄の\nトンネルに　穴を　開けてしまう。"
        en:
          black: "It can help in tunnel construction.\nIts drill has evolved into steel strong\nenough to bore through iron plates."
          white: "More than 300 feet below the surface,\nthey build mazelike nests. Their activity\ncan be destructive to subway tunnels."
        fr:
          black: "Ses vrilles en acier peuvent transpercer\ndes poutres en fer. Il est très employé\ndans la construction de tunnels."
          white: "Il se creuse des terriers labyrinthiques\nà 100 m sous terre. Il lui arrive de\npercer les galeries du métro."
        it:
          black: "La trivella si è evoluta diventando\nd’acciaio e può perforare una lastra di\nferro. È molto utile per scavare tunnel."
          white: "Costruisce una tana simile a un labirinto,\n100 metri sotto terra. A volte apre\nbuchi nei tunnel della metropolitana."
        de:
          black: "Seine zu Stahl weiterentwickelten Bohrer\nkriegen selbst Eisenplatten klein. Im\nTunnelbau ist es ein absolutes Ass."
          white: "Sein verworrener Bau liegt 100 Meter\ntief unter der Erde. Gelegentlich gräbt\nes auch U-Bahn-Schächte an."
        es:
          black: "Su taladro ha evolucionado y es capaz\nde atravesar una lámina de hierro.\nEs muy útil para construir túneles."
          white: "Construye madrigueras laberínticas\na 100 m bajo tierra. A veces abre\nagujeros en los túneles de metro."
        ko:
          black: "강철로 진화한 드릴은\n철판을 뚫는 파괴력을 가졌다.\n터널 공사에서 크게 활약한다."
          white: "땅 밑 100m에 미로 같은\n굴을 만든다. 지하철\n터널에 구멍을 뚫어 버린다."
