      descriptions:
        jp_kana:
          black: "しっぽで　おたがいの　からだを\nなでて　あいさつ。しっぽの　ていれを\nかかさず　いつも　きれいにしている。"
          white: "きれいずきな　せいかくの　ポケモン。\nしっぽを　ほうきがわりに　いつも\nすみかの　ほこりを　はらっている。"
        jp_kanji:
          black: "しっぽで　お互いの　体を\nなでて　あいさつ。しっぽの　手入れを\n欠かさず　いつも　きれいにしている。"
          white: "きれい好きな　性格の　ポケモン。\nしっぽを　ほうき代わりに　いつも\n住処の　ほこりを　払っている。"
        en:
          black: "They greet one another by rubbing each\nother with their tails, which are always\nkept well groomed and clean."
          white: "These Pokémon prefer a tidy habitat.\nThey are always sweeping and dusting,\nusing their tails as brooms."
        fr:
          black: "Ils se saluent en se caressant\nmutuellement le corps avec la queue,\nqu’ils gardent toujours immaculée."
          white: "Un Pokémon qui aime la propreté. Chez\nlui, il enlève sans cesse la poussière\nen utilisant sa queue comme un plumeau."
        it:
          black: "Saluta i suoi simili strofinando la propria\ncoda contro la loro. Si prende sempre\nmolta cura di questa parte del corpo."
          white: "Di natura ama la pulizia. Spazza sempre\nla polvere dalla sua tana usando la coda\ncome scopa."
        de:
          black: "Sie sorgen dafür, dass ihre Schweife\nstets schön sauber sind, da sie diese\nzur Begrüßung aneinanderreiben."
          white: "Ein Pokémon mit Putzfimmel. Es benutzt\nseinen Schweif als Staubwedel und fegt\nseinen Bau, bis alles picobello ist."
        es:
          black: "Se saludan haciéndose mimos con la cola.\nPor eso, se acicalan con esmero para que\nsu cola esté siempre limpia y arreglada."
          white: "Le encanta la limpieza. Usa su cola\na modo de escoba y se pasa\nel día barre que te barre."
        ko:
          black: "꼬리로 서로의 몸을 쓰다듬어\n인사를 나눈다. 자주 꼬리를\n손질하여 항상 깨끗이 해둔다."
          white: "깨끗함을 좋아하는 포켓몬이다.\n꼬리를 빗자루 대신 써서 항상\n거처의 먼지를 쓸어낸다."
cinccino:
  species_id: 573
  names:
    jp_kana: チラチーノ
    jp_kanji: チラチーノ
    en: Cinccino
    fr: Pashmilla
    it: Cinccino
    de: Chillabell
    es: Cinccino
    ko: 치라치노
