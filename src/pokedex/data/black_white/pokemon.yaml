      descriptions:
        jp_kana:
          black: "ふえいせいな　ばしょを　このむ。\nゲップのように　はきだす　ガスを\nすいこむと　１しゅうかん　ねこむ。"
          white: "ゴミぶくろが　さんぎょうはいきぶつと\nかがくへんかを　おこした　ことで\nポケモンとして　うまれかわった。"
        jp_kanji:
          black: "不衛生な　場所を　好む。\nゲップのように　吐き出す　ガスを\n吸い込むと　１週間　寝込む。"
          white: "ゴミ袋が　産業廃棄物と\n化学変化を　起こした　ことで\nポケモンとして　生まれ変わった。"
        en:
          black: "Inhaling the gas they belch will make\nyou sleep for a week. They prefer\nunsanitary places."
          white: "The combination of garbage bags and\nindustrial waste caused the chemical\nreaction that created this Pokémon."
        fr:
          black: "Il aime les endroits mal tenus.\nLe gaz qu’il rote endort\npendant une semaine."
          white: "Il est né de la mutation d’un\nsac poubelle contenant des\ndéchets industriels."
        it:
          black: "Predilige luoghi insalubri. Esala gas\ndalle fauci in grado di addormentare per\nuna settimana."
          white: "È nato da un sacchetto della spazzatura\nche ha subito un cambiamento chimico\na causa delle scorie industriali."
        de:
          black: "Hat ein Faible für schmutzige Orte. Wer\ndas Gas einatmet, das es mit Rülpslauten\nausstößt, schläft eine Woche durch."
          white: "Eine Mülltüte, der Industrieabfälle\nund chemische Reaktionen neues\nLeben eingehaucht haben."
        es:
          black: "Le gustan los lugares con suciedad.\nQuien inhala los gases que eructa\nduerme durante una semana."
          white: "Pokémon nacido de la reacción química\nentre una bolsa de basura y residuos\nindustriales."
        ko:
          black: "비위생적인 장소를 좋아한다.\n트림하듯이 토해내는 가스를\n들이마시면 1주일 동안 잠에 빠진다."
          white: "쓰레기 봉지가 산업 폐기물과\n화학적 변화를 일으켜서\n포켓몬으로 다시 태어났다."
garbodor:
  species_id: 569
  names:
    jp_kana: ダストダス
    jp_kanji: ダストダス
    en: Garbodor
    fr: Miasmax
    it: Garbodor
    de: Deponitox
    es: Garbodor
    ko: 더스트나
