      descriptions:
        jp_kana:
          black: "かたい　カラに　まもられている。\nタイヤのように　かいてんして\nてきに　はげしく　たいあたりする。"
          white: "ふだんは　うごかないが　おそわれると\nこうそく　かいてんして　はしりまわり\nたいあたりで　はんげきするのだ。"
        jp_kanji:
          black: "硬い　殻に　守られている。\nタイヤのように　回転して\n敵に　激しく　体当たりする。"
          white: "ふだんは　動かないが\n襲われると　高速　回転して　走り回り\n体当たりで　反撃するのだ。"
        en:
          black: "Protected by a hard shell, it spins\nits body like a wheel and crashes\nfuriously into its enemies."
          white: "It is usually motionless, but when\nattacked, it rotates at high speed and\nthen crashes into its opponent."
        fr:
          black: "Protégé par sa solide carapace,\nil fonce sur ses ennemis en\nroulant comme un pneu."
          white: "En général, il reste immobile. Mais quand\non l’attaque, il se met à tourbillonner\nà toute vitesse et fonce sur l’ennemi."
        it:
          black: "È protetto da un guscio resistente.\nSi scaglia contro il nemico rotolando\ncome uno pneumatico."
          white: "Di solito non si muove, ma se viene\nattaccato, comincia a turbinare su se\nstesso e si scaglia contro il nemico."
        de:
          black: "Von einem harten Schutzpanzer umgeben.\nEs greift seine Gegner an, indem es mit\nKaracho wie ein Rad in sie hineinrollt."
          white: "An sich ist es harmlos. Bringt man es\njedoch in Bedrängnis, setzt es sich\nmit blitzschnellen Rollattacken zur Wehr."
        es:
          black: "Lo protege un duro caparazón. Gira\ncomo una rueda y realiza brutales\nplacajes contra sus enemigos."
          white: "Normalmente no se mueve, pero se pone a\nrodar frenéticamente y contraataca con\nplacajes si lo atacan."
        ko:
          black: "단단한 껍질로 보호되고 있다.\n타이어처럼 회전하여 상대에게\n격렬히 몸통박치기를 날린다."
          white: "평소에는 움직이지 않지만 공격당하면\n고속 회전하여 뛰어다니다가\n몸통박치기로 반격한다."
scolipede:
