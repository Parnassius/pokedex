      descriptions:
        jp_kana:
          black: "みずを　たいりょうに　のみこんで\nたいないで　ゆきぐもを　つくる。\nもうふぶきで　てきを　くるしめる。"
          white: "２つの　あたまが　どうじに　おこると\nツノから　もうふぶきを　ふきだす。\nあたりを　おおゆきで　うめてしまう。"
        jp_kanji:
          black: "水を　大量に　飲み込んで\n体内で　雪雲を　作る。\n猛吹雪で　敵を　苦しめる。"
          white: "２つの　頭が　同時に　怒ると\nツノから　猛吹雪を　吹き出す。\nあたりを　大雪で　埋めてしまう。"
        en:
          black: "Swallowing large amounts of water, they\nmake snow clouds inside their bodies and\nattack their foes with violent blizzards."
          white: "If both heads get angry simultaneously,\nthis Pokémon expels a blizzard, burying\neverything in snow."
        fr:
          black: "Il avale de l’eau en grande quantité\net la transforme en nuages neigeux.\nIl souffle du blizzard sur ses ennemis."
          white: "Quand ses deux têtes se fâchent en même\ntemps, il émet un blizzard de ses cornes\net enfouit les alentours sous la neige."
        it:
          black: "Assorbe enormi quantità di acqua per\nformare nubi cariche di neve e attaccare\nil nemico con violente bufere."
          white: "Se le due teste si arrabbiano allo stesso\ntempo, scatena una bufera dalle corna,\ncoprendo di neve i dintorni."
        de:
          black: "Schluckt Unmengen an Wasser, die es in\nsich zu Schneewolken verwandelt, und\nplagt Gegner mit hartem Schneetreiben."
          white: "Bringt man beide Köpfe in Rage, stößt\nsein Horn heftige Eisböen aus, und alles\nin seiner Umgebung versinkt in Schnee."
        es:
          black: "Bebe cantidades ingentes de agua y\ncrea nubes cargadas de nieve para\nlanzar ventiscas a sus oponentes."
          white: "Si sus dos cabezas se irritan al mismo\ntiempo, genera una ventisca desde su\ncuerno cubriendo su entorno con nieve."
        ko:
          black: "물을 대량으로 들이마셔\n체내에서 눈구름을 만든다.\n강한 눈보라로 상대를 괴롭힌다."
          white: "두 개의 머리가 동시에 화를 내면\n뿔에서 강한 눈보라가 뿜어져 나온다.\n주변을 많은 눈으로 묻어 버린다."
deerling:
