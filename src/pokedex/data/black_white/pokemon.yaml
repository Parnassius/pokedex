          black: "もっている　マスクは　デスマスが\nにんげんだった　ときの　かお。\nたまに　みつめては　ないている。"
          white: "こだいの　はかに　まいそうされた\nひとの　たましいから　うまれた。\nむかしの　きおくが　のこっている。"
        jp_kanji:
          black: "持っている　マスクは\nデスマスが　人間だった　ときの　顔。\nたまに　見つめては　泣いている。"
          white: "古代の　墓に　埋葬された\n人の　魂から　生まれた。\n昔の　記憶が　残っている。"
        en:
          black: "Each of them carries a mask that used\nto be its face when it was human.\nSometimes they look at it and cry."
          white: "These Pokémon arose from the spirits of\npeople interred in graves in past ages.\nEach retains memories of its former life."
        fr:
          black: "Le motif de son masque est son visage\nquand il était humain. Parfois, il le\nregarde et se met à pleurer."
          white: "Il est né de l’âme d’un défunt inhumé\ndans une tombe antique. Il a conservé\nses anciens souvenirs."
        it:
          black: "La maschera che indossa è il volto che\naveva quando era un umano. A volte si\nmette a piangere mentre la guarda."
          white: "È nato dagli spettri che riposano nelle\nantiche tombe. Conserva la memoria\ndel tempo che fu."
        de:
          black: "Seine Maske ist ein Abbild des Gesichts,\ndas es als Mensch hatte. Manchmal weint\nes, wenn man ihm in die Augen sieht."
          white: "Es entsteht aus den Seelen von längst\nbegrabenen Menschen und kann sich noch\nimmer an deren Vergangenheit erinnern."
        es:
          black: "Su máscara representa la cara que\nposeía cuando era humano. A veces se\nle saltan las lágrimas al contemplarla."
          white: "Nació del alma de un humano enterrado\nhace milenios. Aún conserva recuerdos\ndel pasado."
        ko:
          black: "가지고 있는 마스크는 데스마스가\n사람이었을 때의 얼굴이다.\n가끔 마스크를 쳐다보며 운다."
          white: "고대의 무덤에 매장된\n사람의 영혼에서 태어났다.\n예전의 기억이 남아 있다."
cofagrigus:
  species_id: 563
  names:
    jp_kana: デスカーン
    jp_kanji: デスカーン
    en: Cofagrigus
    fr: Tutankafer
    it: Cofagrigus
    de: Echnatoll
    es: Cofagrigus
    ko: 데스니칸
