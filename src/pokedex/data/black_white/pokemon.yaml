          white: "ちいさい　こおりの　つぶを　たくさん\nつくりだして　じぶんの　すがたを\nてきの　めから　かくすのだ。"
        jp_kanji:
          black: "雪山に　生息する　ポケモン。\n大昔　氷河期の　ときに\n南の　土地に　移動してきた。"
          white: "小さい　氷の　粒を\nたくさん　作り出して　自分の　姿を\n敵の　目から　隠すのだ。"
        en:
          black: "Snowy mountains are this Pokémon’s\nhabitat. During an ancient ice age, they\nmoved to southern areas."
          white: "It conceals itself from enemy eyes\nby creating many small ice particles\nand hiding among them."
        fr:
          black: "Un Pokémon qui vit dans les montagnes\nenneigées. Il a émigré au sud durant\nl’ère glaciaire, il y a bien longtemps."
          white: "Il se cache de ses ennemis en\némettant une myriade de petites\nparticules de glace."
        it:
          black: "Vive sulle montagne innevate. Durante\nle antiche glaciazioni si è spostato\nnelle regioni del sud."
          white: "Si nasconde dai nemici producendo\nuna miriade di granelli di ghiaccio."
        de:
          black: "Es lebt auf schneebedeckten Bergen.\nVor vielen Jahren fand es während einer\nEiszeit seinen Weg in den Süden."
          white: "Es erzeugt viele kleine Eiskörner, mit\ndenen es sich vor seinen Gegnern\nversteckt."
        es:
          black: "Vive en las cumbres nevadas.\nMigró hacia el sur durante la era\nglaciar, hace muchísimos años."
          white: "Genera multitud de pequeñas partículas\nde hielo para ocultarse de sus enemigos."
        ko:
          black: "설산에 서식하는 포켓몬이다.\n먼 옛날 빙하기 때\n남쪽 토지로 이동해 왔다."
          white: "작은 얼음 알갱이를 많이\n만들어내서 자신의 모습이\n상대의 눈에 보이지 않게 한다."
vanilluxe:
