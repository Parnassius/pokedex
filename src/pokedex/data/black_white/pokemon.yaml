      descriptions:
        jp_kana:
          black: "マッハの　スピードで　そらを　とぶ。\nむねの　ふういんを　はがすと\nエネルギーが　ぼうそうしてしまう。"
          white: "ゴルーグを　つくった　こだいじんから\nひとや　ポケモンを　まもるように\nめいれいされていると　いわれている。"
        jp_kanji:
          black: "マッハの　スピードで　空を　飛ぶ。\n胸の　封印を　はがすと\nエネルギーが　暴走してしまう。"
          white: "ゴルーグを　作った　古代人から\n人や　ポケモンを　守るように\n命令されていると　言われている。"
        en:
          black: "It flies across the sky at Mach speeds.\nRemoving the seal on its chest makes\nits internal energy go out of control."
          white: "It is said that Golurk were ordered\nto protect people and Pokémon\nby the ancient people who made them."
        fr:
          black: "Il vole à la vitesse du son. Si le\nsceau sur sa poitrine est retiré,\nil perd tout contrôle de lui-même."
          white: "Ses créateurs d’une lointaine époque\nlui auraient ordonné de protéger les\nhumains et les Pokémon."
        it:
          black: "Vola alla velocità del suono. Se rimuove\nil sigillo che ha sul petto, sprigiona una\nenergia incontrollabile."
          white: "Si narra che gli antichi costruttori dei\nGolurk avessero ordinato loro di\nproteggere gli uomini e i Pokémon."
        de:
          black: "Es jagt mit Schallgeschwindigkeit durch\ndie Lüfte. Nimmt man das Siegel auf der\nBrust ab, gerät es außer Kontrolle."
          white: "Man munkelt, sein Schöpfer habe ihm\naufgetragen, schützend über Pokémon\nund Menschen zu wachen."
        es:
          black: "Vuela a velocidad mach. Pierde\nel control de su energía si se le\nretira el sello del pecho."
          white: "Al parecer, aquel que antaño lo creó\nle ordenó proteger a los Pokémon\ny a los humanos."
        ko:
          black: "마하의 스피드로 하늘을 난다.\n가슴의 봉인을 떼어내면\n에너지가 폭주해 버린다."
          white: "골루그를 만든 고대인에게\n사람과 포켓몬을 지키라고\n명령받았다고 전해진다."
pawniard:
  species_id: 624
  names:
    jp_kana: コマタナ
    jp_kanji: コマタナ
    en: Pawniard
    fr: Scalpion
    it: Pawniard
    de: Gladiantri
    es: Pawniard
    ko: 자망칼
  forms:
    pawniard:
      form_id: 0
      base_stats:
        hp: 45
        attack: 85
        defense: 70
        special_attack: 40
        special_defense: 40
        speed: 60
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - dark
        - steel
      egg_groups:
        - human_like
      abilities:
        - defiant
        - inner_focus
      hidden_ability: pressure
      descriptions:
        jp_kana:
          black: "ぜんしんが　はものの　ポケモン。\nたたかいで　はこぼれすると　かわらの\nてごろな　いしで　はを　とぐ。"
          white: "キリキザンの　めいれいで　たたかう。\nえものに　しがみつき　やいばを\nくいこませて　いためつけるのだ。"
        jp_kanji:
          black: "全身が　刃物の　ポケモン。\n戦いで　刃こぼれすると　\n河原の　石で　刃を　とぐ。"
          white: "キリキザンの　命令で　戦う。\n獲物に　しがみつき\n刃を　食い込ませて　痛めつけるのだ。"
        en:
          black: "Blades comprise this Pokémon’s entire\nbody. If battling dulls the blades, it\nsharpens them on stones by the river."
          white: "They fight at Bisharp’s command.\nThey cling to their prey and inflict\ndamage by sinking their blades into it."
        fr:
          black: "Tout son corps est fait de lames.\nSi une lame s’émousse, il va l’aiguiser\ncontre une pierre au bord d’une rivière."
          white: "Obéissant aux directives d’un Scalproie,\nil s’agrippe à ses proies pour\nles poignarder."
        it:
          black: "Il suo intero corpo è un’arma da taglio.\nSe le lame si smussano lottando, le affila\ncon pietre di fiume."
          white: "Lotta agli ordini di Bisharp. Si avvinghia\nalla preda e la attacca con le lame."
        de:
          black: "Sein Körper ist mit Klingen übersät, die\nes an Felsen eines Flussbettes schärft,\nwenn sie im Kampf schartig werden."
          white: "Im Kampf folgt es den Befehlen von\nCaesurio. Es nimmt sein Opfer in die\nZange und verletzt es mit seinen Klingen."
        es:
          black: "Su cuerpo está provisto de hojas\nafiladas. Cuando se desgastan, las afila\ncon cantos rodados a la orilla del río."
          white: "Lucha bajo las órdenes de Bisharp.\nSe agarra a sus oponentes y les inflige\ndaño utilizando sus cuchillas."
        ko:
          black: "전신이 칼날인 포켓몬이다.\n싸움에서 칼의 이가 빠지면 \n강가의 돌로 칼을 간다."
          white: "절각참의 명령으로 싸운다.\n먹이를 물고 늘어져\n칼날을 박아 혼내준다."
bisharp:
  species_id: 625
  names:
    jp_kana: キリキザン
    jp_kanji: キリキザン
    en: Bisharp
    fr: Scalproie
    it: Bisharp
    de: Caesurio
    es: Bisharp
    ko: 절각참
  forms:
    bisharp:
      form_id: 0
      base_stats:
        hp: 65
        attack: 125
        defense: 100
        special_attack: 60
        special_defense: 70
        speed: 70
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
