      descriptions:
        jp_kana:
          black: "かざんばいで　ちじょうが　まっくらに\nなったとき　ウルガモスの　ほのおが\nたいようの　かわりに　なったという。"
          white: "たたかいになると　６まいの　ハネから\nひのこの　りんぷんを　まきちらして\nあたり　いちめんを　ひのうみにする。"
        jp_kanji:
          black: "火山灰で　地上が　真っ暗に\nなったとき　ウルガモスの　炎が\n太陽の　代わりに　なったという。"
          white: "戦いになると　６枚の　ハネから\n火の粉の　りんぷんを　まき散らして\nあたり　一面を　火の海にする。"
        en:
          black: "When volcanic ash darkened the\natmosphere, it is said that Volcarona’s\nfire provided a replacement for the sun."
          white: "A sea of fire engulfs the surroundings\nof their battles, since they use their\nsix wings to scatter their ember scales."
        fr:
          black: "On dit que quand le ciel s’est obscurci à\ncause des cendres d’un volcan, le feu\nd’un Pyrax aurait remplacé le soleil."
          white: "Quand il se bat, il fait pleuvoir des\nécailles enflammées de ses six ailes et\ntransforme les alentours en mer de feu."
        it:
          black: "Si dice che quando il mondo fu oscurato\nda ceneri vulcaniche, le fiamme di\nVolcarona avessero sostituito il sole."
          white: "Quando lotta, sparge scaglie infuocate\ndalle sue sei ali, creando tutto intorno\nun mare di fuoco."
        de:
          black: "Es heißt, als das Land einst unter einer\ndüsteren Wolke aus Vulkanasche lag,\nübernahm es die Rolle der Sonne."
          white: "Schüttelt sich glühenden Staub aus\nseinen sechs Flügeln und verwandelt das\nUmfeld in ein einziges Meer aus Flammen."
        es:
          black: "Antaño, las cenizas volcánicas\ncubrieron los cielos. Entonces,\nsus llamaradas sirvieron de sol."
          white: "Cuando combate, despide escamas\nardientes de sus seis alas y genera\nun mar ígneo a su alrededor."
        ko:
          black: "화산재로 지상이 캄캄하게\n되었을 때 불카모스의 불꽃이\n태양을 대신했다고 한다."
          white: "싸울 때는 6개의 날개에서\n불꽃 가루를 흩뿌려서\n주변 일대를 불바다로 만든다."
