          white: "あさひの　エネルギーを　あびた\nつららが　ポケモンに　なった。\nゆきに　からだを　うめて　ねむる。"
        jp_kanji:
          black: "マイナス５０度の　息を　吐く。\n雪の　結晶を　作って\nあたりに　雪を　降らせる。"
          white: "朝日の　エネルギーを　浴びた\nつららが　ポケモンに　なった。\n雪に　体を　埋めて　眠る。"
        en:
          black: "The temperature of their breath\nis -58° F. They create snow crystals and\nmake snow fall in the areas around them."
          white: "This Pokémon formed from icicles\nbathed in energy from the morning sun.\nIt sleeps buried in snow."
        fr:
          black: "Il exhale une haleine à -50 °C.\nIl fabrique des cristaux de neige\net fait neiger autour de lui."
          white: "Ce Pokémon est né d’un glaçon qui\na baigné dans la lumière du matin.\nIl se cache dans la neige pour dormir."
        it:
          black: "Il suo fiato è a -50°C. Fa nevicare tutto\nintorno, formando dei cristalli di neve."
          white: "Pokémon nato da una stalattite che ha\nricevuto l’energia del sole mattutino.\nDorme sepolto sotto la neve."
        de:
          black: "Die Temperatur seines Odems liegt bei\nminus 50° C. Es erzeugt Eiskristalle und\nlässt es in seiner Umgebung schneien."
          white: "Ein Eiszapfen, der durch die Energie der\naufgehenden Sonne zum Pokémon wurde.\nNachts deckt es sich mit Schnee zu."
        es:
          black: "Lanza un aliento de 50° bajo cero.\nCrea bloques de nieve y es capaz\nde lograr que nieve a su alrededor."
          white: "Nació de un carámbano que absorbió\nla energía del sol al alba. Duerme\narropado por la nieve."
        ko:
          black: "마이너스 50도의 숨결을 내뱉는다.\n눈 결정을 만들어\n주변에 눈이 내리게 한다."
          white: "아침 해의 에너지를 받은\n고드름이 포켓몬이 되었다.\n눈에 몸을 묻고 잠든다."
