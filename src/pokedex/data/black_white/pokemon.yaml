      types:
        - dragon
      egg_groups:
        - monster
        - dragon
      abilities:
        - rivalry
        - mold_breaker
      hidden_ability: unnerve
      descriptions:
        jp_kana:
          black: "きのみを　キバで　くだいて　たべる。\nなんかいも　はえかわることで\nつよく　するどい　キバに　なる。"
          white: "キバで　じゅもくに　きずを　つけて\nなわばりの　めじるしにする。\nキバは　おれても　すぐに　はえる。"
        jp_kanji:
          black: "木の実を　キバで　砕いて　食べる。\n何回も　生え変わることで\n強く　鋭い　キバに　なる。"
          white: "キバで　樹木に　傷を　つけて\n縄張りの　目印にする。\nキバは　折れても　すぐに　生える。"
        en:
          black: "They use their tusks to crush the\nberries they eat. Repeated regrowth\nmakes their tusks strong and sharp."
          white: "They mark their territory by leaving\ngashes in trees with their tusks. If a\ntusk breaks, a new one grows in quickly."
        fr:
          black: "Il broie les Baies à grands coups de\ncrocs. Ceux-ci repoussent plusieurs\nfois, toujours plus forts et aiguisés."
          white: "Il laisse la marque de ses crocs dans les\narbres pour marquer son territoire. Ses\ncrocs repoussent dès qu’ils tombent."
        it:
          black: "Mangia le bacche sminuzzandole con\ni denti, che ricrescono costantemente,\ndiventando sempre più forti e affilati."
          white: "Incide gli alberi con le zanne per\nmarcare il suo territorio. Se le zanne\ngli si spezzano, ricrescono subito."
        de:
          black: "Es knackt sich mit seinen Hauern Nüsse.\nBrechen seine Fangzähne ab, wächst an\nihrer Stelle ein stärkeres Ersatzpaar."
          white: "Markiert sein Revier, indem es mit seinen\nFängen Kerben in Bäume schlägt. Brechen\ndiese einmal ab, wachsen sie sofort nach."
        es:
          black: "Usa sus colmillos para romper las bayas\nque come. Estos se regeneran una y otra\nvez, por eso son tan fuertes y afilados."
          white: "Deja la huella de sus colmillos en los\nárboles para marcar su territorio. Si se\nle rompen, se regeneran muy rápido."
        ko:
          black: "나무열매를 이빨로 씹어 먹는다.\n몇 차례를 거쳐 새로 나며\n강하고 날카로운 이빨이 된다."
          white: "이빨로 수목에 상처를 내서\n영역 표시를 한다.\n부러지면 바로 새 이빨이 난다."
fraxure:
  species_id: 611
  names:
    jp_kana: オノンド
    jp_kanji: オノンド
    en: Fraxure
    fr: Incisache
    it: Fraxure
    de: Sharfax
    es: Fraxure
    ko: 액슨도
  forms:
    fraxure:
      form_id: 0
      base_stats:
        hp: 66
        attack: 117
        defense: 70
        special_attack: 40
        special_defense: 50
        speed: 67
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - dragon
      egg_groups:
        - monster
        - dragon
      abilities:
        - rivalry
        - mold_breaker
      hidden_ability: unnerve
      descriptions:
        jp_kana:
          black: "おれた　キバは　はえかわらないので\nたたかいが　おわると　かわらの\nいわで　キバを　たんねんに　みがく。"
          white: "おおいわを　くだく　キバを　もつ。\nなわばりを　めぐる　オノンドたちの\nあらそいは　ひじょうに　はげしい。"
        jp_kanji:
          black: "折れた　キバは　生え変わらないので\n戦いが　終わると　河原の　岩で\nキバを　丹念に　磨く。"
          white: "大岩を　砕く　キバを　持つ。\n縄張りを　巡る　オノンドたちの\n争いは　非常に　激しい。"
        en:
          black: "Since a broken tusk will not grow back,\nthey diligently sharpen their tusks on\nriver rocks after they’ve been fighting."
          white: "Their tusks can shatter rocks.\nTerritory battles between Fraxure\ncan be intensely violent."
        fr:
          black: "Comme ses crocs brisés ne repoussent\npas, il les aiguise après le combat grâce\nà une pierre ramassée près d’un fleuve."
          white: "Leurs crocs peuvent découper des\nrochers. Leurs querelles de territoire\nsont extrêmement violentes."
        it:
          black: "Poiché, una volta spezzate, le zanne\nnon gli ricrescono, alla fine di ogni\nlotta le affila con delle pietre di fiume."
          white: "Ha zanne in grado di frantumare rocce.\nLe lotte per il territorio tra i Fraxure\nsono furibonde."
        de:
          black: "Da seine Hauer nicht mehr nachwachsen,\nwetzt es sie nach einem Kampf sachte an\nden Felsen eines Flussbettes."
          white: "Mit seinen Fängen kriegt es sogar Felsen\nklein. Gegen Artgenossen, die sein Revier\npassieren, geht es besonders hart vor."
        es:
          black: "Al terminar un combate, se tiene que\nafilar los colmillos con pedernal, pues\nlos rotos no le vuelven a salir."
          white: "Sus colmillos pueden hacer añicos rocas\ninmensas. Las luchas territoriales de los\nFraxure son encarnizadas."
        ko:
          black: "부러진 이빨은 다시 나지 않기 때문에\n싸움이 끝나면 강가에 있는\n바위로 이빨을 정성껏 닦는다."
          white: "큰 바위를 부수는 이빨을 가지고 있다.\n액슨도들의 영역 싸움은\n매우 격렬하다."
haxorus:
  species_id: 612
  names:
    jp_kana: オノノクス
    jp_kanji: オノノクス
    en: Haxorus
    fr: Tranchodon
