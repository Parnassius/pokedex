      descriptions:
        jp_kana:
          black: "かわを　くびまで　ひきあげて\nぼうぎょの　しせい。ゴムのような\nだんりょくで　ダメージを　へらす。"
          white: "しせんの　あった　あいてに　いきなり\nずつき　こうげきを　しかける。\nとても　かたい　ずがいこつを　もつ。"
        jp_kanji:
          black: "皮を　首まで　引き上げて\n防御の　姿勢。ゴムのような　弾力で\nダメージを　減らす。"
          white: "視線の　合った　相手に\nいきなり　頭突き　攻撃を　仕掛ける。\nとても　硬い　頭がい骨を　持つ。"
        en:
          black: "Its skin has a rubbery elasticity, so\nit can reduce damage by defensively\npulling its skin up to its neck."
          white: "It immediately headbutts anyone that\nmakes eye contact with it. Its skull is\nmassively thick."
        fr:
          black: "Il remonte sa peau jusqu’à son cou pour\nse protéger. Elle a une constitution\nélastique qui absorbe les coups."
          white: "Quiconque a le malheur de croiser son\nregard se prend un coup de tête.\nIl a le crâne très dur."
        it:
          black: "Assumono la posizione difensiva tirando\nsu fino al collo la pelle, che è elastica\ncome la gomma e previene i danni."
          white: "Attacca a testate chiunque abbia la\nsfortuna di incrociare il suo sguardo.\nIl suo cranio è durissimo."
        de:
          black: "Es zieht seine gummiartige Haut bis zum\nHals hinauf und nimmt eine Abwehrhaltung\nein, um sich vor Schaden zu schützen."
          white: "Es hat einen dicken Schädel und\nversetzt jedem, mit dem sich sein\nBlick kreuzt, eine Kopfnuss."
        es:
          black: "Se sube la piel hasta el cuello para\ndefenderse. Su elasticidad, similar a la\nde una goma, reduce el daño recibido."
          white: "Propina un cabezazo inmediato\na todo aquel que lo mira a los ojos.\nSu cráneo es muy duro."
        ko:
          black: "피부를 목까지 늘려서\n방어 자세를 취한다. 고무 같은\n탄력을 이용해 데미지를 줄인다."
          white: "눈이 마주친 상대에게 느닷없이\n박치기 공격을 한다.\n매우 단단한 두개골을 가지고 있다."
scrafty:
  species_id: 560
  names:
    jp_kana: ズルズキン
    jp_kanji: ズルズキン
    en: Scrafty
    fr: Baggaïd
    it: Scrafty
    de: Irokex
    es: Scrafty
    ko: 곤율거니
  forms:
    scrafty:
      form_id: 0
      base_stats:
        hp: 65
        attack: 90
        defense: 115
        special_attack: 45
        special_defense: 115
        speed: 58
      evs_yield:
