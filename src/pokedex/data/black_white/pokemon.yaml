        rarer_dark_grass: rare_bone
      descriptions:
        jp_kana:
          black: "なわばりを　とりあって　イワパレス\nどうしが　はげしく　たたかう。\nいわを　こわされた　ほうが　まけ。"
          white: "おもたい　いわを　せおって\nかんそうした　とちを　なんにちでも\nいどうできる　きゃくりょくを　もつ。"
        jp_kanji:
          black: "縄張りを　取り合って\nイワパレス　同士が　激しく　戦う。\n岩を　壊された　方が　負け。"
          white: "重たい　岩を　背負って\n乾燥した　土地を　何日でも\n移動できる　脚力を　持つ。"
        en:
          black: "Competing for territory, Crustle\nfight viciously. The one whose boulder\nis broken is the loser of the battle."
          white: "It possesses legs of enormous strength,\nenabling it to carry heavy slabs for many\ndays, even when crossing arid land."
        fr:
          black: "Entre eux, les querelles de territoire\nsont fréquentes et violentes. Celui qui\nse fait briser son rocher a perdu."
          white: "Il est assez endurant pour voyager des\njours durant dans des zones desséchées\navec son lourd rocher sur le dos."
        it:
          black: "I Crustle si disputano il territorio\nlottando ferocemente. Vince chi\ndistrugge la roccia del rivale."
          white: "Ha una tale forza nelle gambe, che può\nspostarsi per giorni in zone aride con\nuna pesante roccia sulle spalle."
        de:
          black: "Revierkonflikte führen oft zu heftigen\nKämpfen zwischen ihnen. Gewonnen hat,\nwer das gegnerische Haus zerstört."
          white: "Es ist hart genug im Nehmen, um mitsamt\nseines schweren Felsens mehrere Tage\ndurch trockene Gebiete zu wandern."
        es:
          black: "Se disputa el territorio con sus\ncongéneres. Pierde aquel al que le\nrompan la roca que lleva a cuestas."
          white: "Su inmensa capacidad motriz le permite\ndesplazarse cargando a sus espaldas\nrocas enormes durante días."
        ko:
          black: "영역을 빼앗기 위해\n암팰리스끼리 격렬히 싸운다.\n바위가 부서진 쪽이 패배다."
          white: "무거운 바위를 등에 지고\n며칠이고 건조한 땅을\n이동할 수 있는 다릿심을 가지고 있다."
scraggy:
  species_id: 559
