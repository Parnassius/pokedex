        jp_kana:
          black: "せんすいが　とくいな　とりポケモン。\nこうぶつの　みずゴケを　たべるため\nすいちゅうを　およぎまわる。"
          white: "てきに　おそわれると　ぜんしんの\nうもうから　みずしぶきを　だす。\nみずけむりに　まぎれて　にげるのだ。"
        jp_kanji:
          black: "潜水が　得意な　とりポケモン。\n好物の　みずゴケを　食べるため\n水中を　泳ぎまわる。"
          white: "敵に　襲われると　全身の　羽毛から\n水しぶきを　出す。\n水煙に　紛れて　逃げるのだ。"
        en:
          black: "These bird Pokémon are excellent divers.\nThey swim around in the water eating\ntheir favorite food--peat moss."
          white: "When attacked, it uses its feathers\nto splash water, escaping under cover\nof the spray."
        fr:
          black: "Un Pokémon Oiseau doué pour la plongée.\nIl nage sous l’eau à la recherche de\nsphaigne, son plat préféré."
          white: "Quand on l’attaque, il s’ébroue et fait\njaillir de la vapeur d’eau de tout son\ncorps. Il se cache dedans pour s’enfuir."
        it:
          black: "Pokémon uccello specializzato nelle\nimmersioni. Poiché è ghiotto di sfagno,\nsta sempre in acqua."
          white: "Quando viene attaccato schizza acqua\nda tutte le piume del corpo. Fugge\ndileguandosi in una nuvola di spruzzi."
        de:
          black: "Es schwimmt das Gewässer auf der Suche\nnach Torfmoos, seiner Leibspeise, ab.\nEin talentierter Taucher."
          white: "Gerät es in Gefahr, versprüht es Wasser\naus seinem Federkleid und nutzt den\nSprühregen, um Reißaus zu nehmen."
        es:
          black: "Pokémon Ave Agua capaz de sumergirse.\nNada de acá para allá y busca su comida\nfavorita: el musgo acuático."
          white: "Cuando se ve atacado, las plumas que\nlo recubren despiden ráfagas de agua\nque lo ayudan a escapar."
        ko:
          black: "잠수가 특기인 새포켓몬이다.\n좋아하는 이끼를 먹으려고\n물속을 헤엄쳐 다닌다."
          white: "상대에게 공격당하면 전신의\n깃털에서 물보라를 내뿜는다.\n물안개에 숨어들어 도망친다."
swanna:
