        jp_kana:
          black: "かくざいを　ふりまわして　たたかう。\nおもい　かくざいを　くも　なく\nもつようになると　しんかは　ちかい。"
          white: "いつも　かくざいを　かかえている。\nけんちく　げんばに　あらわれて\nこうじを　てつだう　ポケモン。"
        jp_kanji:
          black: "角材を　振り回して　戦う。\n重い　角材を　苦も　なく\n持つようになると　進化は　近い。"
          white: "いつも　角材を　抱えている。\n建築　現場に　現れて\n工事を　手伝う　ポケモン。"
        en:
          black: "It fights by swinging a piece of lumber\naround. It is close to evolving when it\ncan handle the lumber without difficulty."
          white: "These Pokémon appear at building\nsites and help out with construction.\nThey always carry squared logs."
        fr:
          black: "Il combat avec une poutre. Quand il en\narrive à transporter de lourds madriers\nsans problème, l’évolution est proche."
          white: "Il porte toujours une poutre.\nIl apparaît sur les chantiers\npour aider aux travaux."
        it:
          black: "Lotta brandendo una trave di legno.\nQuando arriva a portarla senza sforzo,\nl’evoluzione è vicina."
          white: "Porta sempre con sé una tavola di legno.\nAppare nei cantieri dove aiuta nei lavori."
        de:
          black: "Greift Gegner mit einem Holzbalken an.\nFällt es ihm leicht, den schweren Balken\nzu tragen, ist seine Entwicklung nah."
          white: "Trägt stets einen Holzbalken bei sich.\nEs taucht hier und da auf Baustellen\nauf und hilft dort den Arbeitern aus."
        es:
          black: "Lucha bamboleando vigas de madera.\nCuando las transporta sin dificultad,\nes señal de que va a evolucionar."
          white: "Siempre lleva vigas de madera.\nNormalmente ayuda en obras de\nconstrucción."
        ko:
          black: "각목을 휘두르며 싸운다.\n무거운 각목도 어렵지 않게 들 수\n있으면 곧 진화한다는 뜻이다."
          white: "항상 각목을 끼고 있다.\n건설 현장에 나타나\n공사를 도와주는 포켓몬이다."
gurdurr:
  species_id: 533
  names:
    jp_kana: ドテッコツ
    jp_kanji: ドテッコツ
    en: Gurdurr
    fr: Ouvrifier
    it: Gurdurr
    de: Strepoli
    es: Gurdurr
    ko: 토쇠골
