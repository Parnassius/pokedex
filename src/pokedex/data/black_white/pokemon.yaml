        special_attack: 3
        special_defense: 0
        speed: 0
      types:
        - dark
        - dragon
      egg_groups:
        - dragon
      abilities:
        - levitate
      descriptions:
        jp_kana:
          black: "６まいの　はねで　そらを　とびつづけ\nうごくものを　てきと　おもいこみ\nおそう　きょうぼうな　ポケモン。"
          white: "りょううでの　あたまは　のうみそを\nもたない。３つの　あたまで　すべてを\nたべつくし　はかいしてしまう。"
        jp_kanji:
          black: "６枚の　羽で　空を　飛び続け\n動くものを　敵と　思い込み　襲う\n凶暴な　ポケモン。"
          white: "両腕の　頭は　脳みそを　持たない。\n３つの　頭で　すべてを　食べつくし\n破壊してしまう。"
        en:
          black: "This brutal Pokémon travels the skies on\nits six wings. Anything that moves seems\nlike a foe to it, triggering its attack."
          white: "The heads on their arms do not have\nbrains. They use all three heads to\nconsume and destroy everything."
        fr:
          black: "Un Pokémon violent qui patrouille le ciel\navec ses six ailes et se jette sur tout\nce qui bouge, pensant voir un ennemi."
          white: "Les têtes sur ses bras n’ont pas\nde cerveau. Avec ses trois têtes,\nil dévore et détruit tout."
        it:
          black: "È molto aggressivo e pattuglia i cieli\nvolando con le sue sei ali. Attacca tutto\nciò che si muove, ritenendolo un nemico."
          white: "Le teste che ha sugli arti non hanno\ncervello. Distrugge e divora qualsiasi\ncosa usando tutte e tre le teste."
        de:
          black: "Es fliegt rastlos durch die Lüfte und\ngreift jeden an, der ihm unter die Augen\nkommt. Ein äußerst kaltblütiges Pokémon."
          white: "Die Köpfe an seinen beiden Armen haben\nkein eigenes Gehirn. Seine drei Mäuler\nkauen alles radikal kurz und klein."
        es:
          black: "Vuela ayudado por sus seis alas y ataca\ntodo aquello que encuentra a su paso.\nEs muy agresivo."
          white: "Las cabezas de sus dos brazos no\ntienen cerebro. Con sus tres cabezas\ndestruye y devora todo a su paso."
        ko:
          black: "6개의 날개로 하늘을 날며\n움직이는 것을 적으로 간주하고\n덮치는 난폭한 포켓몬이다."
          white: "양팔에 있는 머리에는 뇌가\n없다. 3개의 머리로 모든 것을\n먹어치워 파괴해 버린다."
larvesta:
  species_id: 636
  names:
    jp_kana: メラルバ
    jp_kanji: メラルバ
    en: Larvesta
    fr: Pyronille
    it: Larvesta
    de: Ignivor
    es: Larvesta
    ko: 활화르바
  forms:
    larvesta:
      form_id: 0
      base_stats:
        hp: 55
        attack: 85
        defense: 55
        special_attack: 50
        special_defense: 55
        speed: 60
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - bug
        - fire
      egg_groups:
        - bug
      abilities:
        - flame_body
      hidden_ability: swarm
      descriptions:
        jp_kana:
          black: "たいようから　うまれた　ポケモンと\nしんじられてきた。しんかするとき\nぜんしんが　ほのおに　つつまれる。"
          white: "かざんの　ふもとに　せいそくする。\n５ほんの　ツノから　ほのおを　だして\nおそってきた　てきを　げきたいする。"
        jp_kanji:
          black: "太陽から　生まれた　ポケモンと\n信じられてきた。進化するとき\n全身が　炎に　包まれる。"
          white: "火山の　ふもとに　生息する。\n５本の　ツノから　炎を　出して\n襲ってきた　敵を　撃退する。"
        en:
          black: "This Pokémon was believed to have\nbeen born from the sun. When it evolves,\nits entire body is engulfed in flames."
          white: "The base of volcanoes is where they make\ntheir homes. They shoot fire from their\nfive horns to repel attacking enemies."
        fr:
          black: "On dit que ce Pokémon serait né du\nsoleil. Lorsqu’il évolue, tout son\ncorps est enveloppé de flammes."
          white: "Il vit au pied des volcans. Il repousse\nceux qui l’attaquent avec les flammes\nqui jaillissent de ses cinq cornes."
        it:
          black: "Si crede sia un Pokémon nato dal sole.\nQuando si evolve, il suo corpo è avvolto\ninteramente dalle fiamme."
          white: "Vive ai piedi dei vulcani. Se attaccato,\nmette in fuga il nemico lanciando fiamme\ndai suoi cinque corni."
        de:
          black: "Bislang vermutet man, es sei ein Produkt\nder Sonne. Bei der Entwicklung ist sein\nganzer Körper in Flammen gehüllt."
          white: "Es lebt am Fuß von Vulkanen. Mit Gegnern\nräumt es auf, indem es aus seinen fünf\nHörnern Flammen auf sie abfeuert."
        es:
          black: "Se cree que nació del sol.\nCuando evoluciona, su cuerpo\nse ve recubierto por llamas."
          white: "Vive en las laderas de los volcanes.\nEmite fuego por sus cinco cuernos\npara ahuyentar a sus enemigos."
        ko:
          black: "태양에서 태어난 포켓몬이라고\n믿어져 왔다. 진화할 때\n전신이 불꽃에 둘러싸인다."
          white: "화산 기슭에 서식한다.\n5개의 뿔에서 불꽃이 나와\n달려드는 상대를 격퇴한다."
volcarona:
  species_id: 637
  names:
