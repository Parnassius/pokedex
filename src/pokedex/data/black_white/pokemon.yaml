        jp_kana:
          black: "しろい　たいもうは　とくべつな\nあぶらで　コーティングされているので\nてきの　こうげきを　うけながすのだ。"
          white: "しろい　たいもうは　はだざわりが\nばつぐん。ほこりや　せいでんきを\nまったく　よせつけないのだ。"
        jp_kanji:
          black: "白い　体毛は　特別な　脂で\nコーティングされているので\n敵の　攻撃を　受け流すのだ。"
          white: "白い　体毛は　肌触りが　抜群。\nほこりや　静電気を\nまったく　寄せつけないのだ。"
        en:
          black: "Their white fur is coated in a special oil\nthat makes it easy for them to\ndeflect attacks."
          white: "Their white fur feels amazing to touch.\nTheir fur repels dust and prevents\nstatic electricity from building up."
        fr:
          black: "Leurs poils blancs sont recouverts\nd’une graisse spéciale qui leur permet\nd’esquiver facilement les attaques."
          white: "La texture de ses poils blancs est\nincomparable. Elle n’attire ni la\npoussière, ni l’électricité statique."
        it:
          black: "Poiché la bianca pelliccia è coperta da\nuna patina di grasso speciale, i colpi\ndei nemici vengono deviati."
          white: "La sua pelliccia bianca è morbidissima\nal tatto. Non accumula né polvere né\nelettricità statica."
        de:
          black: "Sein weißer Flaum ist mit einem speziellen\nÖl überzogen. Gegnerische Angriffe\ngleiten daran einfach ab."
          white: "Sein weißer Flaum fühlt sich wunderbar\nflauschig an und zieht weder Staub noch\nstatische Elektrizität an."
        es:
          black: "Su pelaje blanco está recubierto\npor una grasa especial que hace\nresbalar los ataques enemigos."
          white: "El pelo que cubre su cuerpo proporciona\nuna agradable sensación al tocarlo. No\nacumula ni polvo ni electricidad estática."
        ko:
          black: "하얀 털은 특별한 기름으로\n코팅되어 있어서 상대의\n공격을 흘려버린다."
          white: "하얀 털은 감촉이 정말 좋다.\n먼지나 정전기가\n전혀 생기지 않는다."
gothita:
  species_id: 574
  names:
    jp_kana: ゴチム
    jp_kanji: ゴチム
    en: Gothita
    fr: Scrutella
    it: Gothita
    de: Mollimorba
    es: Gothita
    ko: 고디탱
  forms:
    gothita:
      form_id: 0
      base_stats:
        hp: 45
        attack: 30
        defense: 50
        special_attack: 55
        special_defense: 65
        speed: 45
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 1
        speed: 0
      types:
        - psychic
      egg_groups:
        - human_like
      abilities:
        - frisk
      hidden_ability: shadow_tag
      descriptions:
        jp_kana:
          black: "リボンのような　しょっかくで\nサイコパワーを　ぞうふくさせる。\nなにかを　じっと　みつめている。"
          white: "ポケモンや　トレーナーを　じっと\nかんさつする。ゴチムにしか　みえない\nなにかを　みつめているらしい。"
        jp_kanji:
          black: "リボンのような　触角で\nサイコパワーを　増幅させる。\nなにかを　じっと　見つめている。"
          white: "ポケモンや　トレーナーを　じっと\n観察する。ゴチムにしか　見えない\nなにかを　見つめているらしい。"
        en:
          black: "Their ribbonlike feelers increase their\npsychic power. They are always staring\nat something."
          white: "They intently observe both Trainers and\nPokémon. Apparently, they are looking\nat something that only Gothita can see."
        fr:
          black: "Concentre des pouvoirs psychiques dans\nses antennes semblables à des rubans,\net regarde fixement... mais quoi?"
          white: "Fixe les Pokémon et les Dresseurs du\nregard comme s’il y avait quelque chose\nque personne d’autre ne pouvait voir."
        it:
          black: "Amplifica i poteri psichici con le antenne\na forma di fiocchetti. Il suo sguardo è\nsempre fisso."
          white: "Osserva con attenzione i Pokémon e\ngli Allenatori, come se contemplasse\nqualcosa che solo lui può vedere."
        de:
          black: "Die schleifenförmigen Fühler erhöhen\nseine Psycho-Kräfte. Es scheint stets\nirgendetwas anzustarren."
          white: "Beobachtet andere Pokémon und Trainer\nmit durchdringendem Blick, als könne es\netwas erkennen, das keiner sonst sieht."
        es:
          black: "Amplifica su poder psíquico con sus\nantenitas en forma de lazo. Siempre\nestá mirando algo fijamente."
          white: "Clava su mirada en Pokémon y\nEntrenadores como si observara\nalgo solo perceptible por él."
        ko:
          black: "리본 모양의 더듬이로\n사이코 파워를 증폭시킨다.\n무언가를 가만히 바라보고 있다."
          white: "포켓몬이나 트레이너를 가만히\n관찰한다. 고디탱만 볼 수 있는\n무언가를 바라보고 있는 것 같다."
gothorita:
  species_id: 575
  names:
    jp_kana: ゴチミル
    jp_kanji: ゴチミル
    en: Gothorita
    fr: Mesmérella
    it: Gothorita
    de: Hypnomorba
    es: Gothorita
    ko: 고디보미
