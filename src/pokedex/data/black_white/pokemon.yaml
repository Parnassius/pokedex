      descriptions:
        jp_kana:
          black: "しっぽの　あなから　くうきを　すって\nたいないで　ほのおを　もやす。\nアイアントの　てんてき。"
          white: "こうおんで　もえる　ほのおの　したで\nアイアントの　はがねの　からだを\nとかして　なかみを　いただくのだ。"
        jp_kanji:
          black: "しっぽの　穴から　空気を　吸って\n体内で　炎を　燃やす。\nアイアントの　天敵。"
          white: "高温で　燃える　炎の　舌で\nアイアントの　鋼の　体を　溶かして\n中身を　いただくのだ。"
        en:
          black: "It breathes through a hole in its tail\nwhile it burns with an internal fire.\nDurant is its prey."
          white: "Using their very hot, flame-covered\ntongues, they burn through Durant’s\nsteel bodies and consume their insides."
        fr:
          black: "Il aspire de l’air par la queue et\nentretient un brasier dans son corps.\nC’est le prédateur des Fermite."
          white: "Avec sa langue de feu à haute\ntempérature, il fait fondre le corps\nd’acier des Fermite pour les dévorer."
        it:
          black: "Attizza la fiamma all’interno del corpo\naspirando l’aria da un foro nella coda.\nI Durant sono le sue prede."
          white: "Con la sua lingua infuocata scioglie la\ncorazza d’acciaio di Durant e ne consuma\nl’interno."
        de:
          black: "Es saugt über das Loch in seinem Schweif\nLuft auf, um in sich Feuer zu schüren. Es\nist der Erzfeind von Fermicula."
          white: "Mit seiner brandheißen Zunge bringt es\nFermicula zum Schmelzen, um so an sein\nweiches Inneres zu gelangen."
        es:
          black: "Absorbe aire por el orificio de su cola\ny consume llamas en su interior.\nEs enemigo acérrimo de los Durant."
          white: "Usa su lengua de fuego para derretir\nla armadura de acero de los Durant y\nllegar así hasta su interior."
        ko:
          black: "꼬리의 구멍으로 공기를 빨아들여\n체내에서 불꽃을 태운다.\n아이앤트의 천적이다."
          white: "뜨겁게 타오르는 불꽃의 혀로\n아이앤트의 강철 몸을\n녹여서 알맹이를 먹어치운다."
durant:
  species_id: 632
  names:
    jp_kana: アイアント
    jp_kanji: アイアント
    en: Durant
    fr: Fermite
    it: Durant
    de: Fermicula
    es: Durant
    ko: 아이앤트
  forms:
    durant:
      form_id: 0
      base_stats:
        hp: 58
        attack: 109
        defense: 112
        special_attack: 48
        special_defense: 48
