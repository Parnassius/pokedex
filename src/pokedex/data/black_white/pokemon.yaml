        jp_kana:
          black: "にんげん　どうしの　せんそうによって\nすみかを　うしなった　ポケモンたちを\nまもるため　にんげんと　たたかった。"
          white: "きょだいな　じょうへきを　いちげきで\nとっぱするほどの　とっしんりょく。\nでんせつで　かたられる　ポケモン。"
        jp_kanji:
          black: "人間　同士の　戦争によって\n住処を　失った　ポケモンたちを\n守るため　人間と　戦った。"
          white: "巨大な　城壁を\n一撃で　突破するほどの　突進力。\n伝説で　語られる　ポケモン。"
        en:
          black: "This Pokémon came to the defense of\nPokémon that had lost their homes in\na war among humans."
          white: "Its charge is strong enough to break\nthrough a giant castle wall in one blow.\nThis Pokémon is spoken of in legends."
        fr:
          black: "Il a combattu les humains pour protéger\nles Pokémon ayant perdu leur foyer à\ncause de leurs guerres fratricides."
          white: "Sa puissance d’impact lui permet\nd’enfoncer d’un seul coup le rempart\nd’un château. Un Pokémon de légende."
        it:
          black: "Ha lottato contro gli esseri umani per\nproteggere i Pokémon scacciati dalle\nloro dimore a causa delle guerre."
          white: "Quando carica, ha una forza tale da\nsfondare un’enorme muraglia.\nSi racconta di lui nelle leggende."
        de:
          black: "Einst bäumte es sich gegen die Menschen\nauf, deren Kriege zahllose Pokémon\nheimatlos gemacht hatten."
          white: "Seine Angriffskraft genügt, um selbst\nmächtige Wälle niederzureißen. Ein Held\nzahlreicher Legenden."
        es:
          black: "Luchó contra los hombres para proteger\na los Pokémon que perdieron su hogar\npor culpa de las guerras de los humanos."
          white: "Su potencia al embestir es capaz de\nderribar las murallas de un castillo.\nLas leyendas hablan de sus proezas."
        ko:
          black: "인간들 간에 벌어진 전쟁으로\n거처를 잃은 포켓몬들을\n지키기 위하여 인간과 싸웠다."
          white: "거대한 성벽을 일격에\n돌파할 만한 돌진력을 가졌다.\n전설로 전해지는 포켓몬이다."
