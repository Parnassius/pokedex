        jp_kana:
          black: "たいないで　１４００どの　ほのおを\nもやすことで　ダンプカーを　パンチで\nはかいするほどの　パワーを　つくる。"
          white: "たたかいで　よわると　いわのように\nうごかなくなる。こころを　とぎすまし\nせいしんりょくで　たたかうのだ。"
        jp_kanji:
          black: "体内で　１４００度の　炎を\n燃やすことで　ダンプカーを　パンチで\n破壊するほどの　パワーを　作る。"
          white: "戦いで　弱ると　岩のように\n動かなくなる。心を　研ぎ澄まし\n精神力で　戦うのだ。"
        en:
          black: "Its internal fire burns at 2,500° F,\nmaking enough power that it can\ndestroy a dump truck with one punch."
          white: "When weakened in battle, it transforms\ninto a stone statue. Then it sharpens\nits mind and fights on mentally."
        fr:
          black: "Il entretient des flammes à 1 400 °C\ndans son corps. De quoi détruire un\ncamion-benne d’un coup de poing!"
          white: "S’il a le dessous au combat, il se fige\ncomme un rocher, fait le vide dans son\nesprit et combat avec sa force mentale."
        it:
          black: "La sua fiamma interna, alla temperatura\ndi 1400°C, sviluppa una potenza tale da\ndistruggere un autocarro."
          white: "Se indebolito in combattimento, si\ntrasforma in una statua, attiva la mente\ne combatte con la forza dello spirito."
        de:
          black: "Erhitzt das Innere seines Körpers auf\n1 400 Grad und erlangt so die Kraft, um\nmit der Faust Laster zu zerstören."
          white: "Schwächt man es im Kampf, wird es reglos\nwie ein Stein und horcht in sich hinein, um\nmit der Kraft seines Geistes zu kämpfen."
        es:
          black: "Genera llamas que alcanzan los 1400°\nde temperatura con las que es capaz\nde destrozar un camión."
          white: "Se queda firme como una estatua\ncuando es debilitado en combate.\nAgudiza el ingenio para luchar."
        ko:
          black: "체내에서 1400도의 불꽃을\n태워서 덤프트럭을 펀치로\n파괴할 정도의 파워를 만든다."
          white: "싸움 중 약해지면 바위처럼\n움직이지 않는다. 마음을 가다듬고\n정신력으로 싸운다."
