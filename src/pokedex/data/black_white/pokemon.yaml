      egg_groups:
        - field
      abilities:
        - gluttony
      hidden_ability: blaze
      held_items:
        common: oran_berry
        rare: passho_berry
      descriptions:
        jp_kana:
          black: "あまいものが　だいこうぶつ。\nたいないの　ほのおを　もやす\nエネルギーに　なるのだ。"
          white: "からだの　なかの　ほのおを　もやして\nあたまや　しっぽから　ひのこを\nまきちらせて　てきを　こがす。"
        jp_kanji:
          black: "甘いものが　大好物。\n体内の　炎を　燃やす\nエネルギーに　なるのだ。"
          white: "体の　中の　炎を　燃やして\n頭や　しっぽから　火の粉を　\nまき散らせて　敵を　焦がす。"
        en:
          black: "It loves sweets because they become\nenergy for the fire burning inside\nits body."
          white: "A flame burns inside its body.\nIt scatters embers from its head\nand tail to sear its opponents."
        fr:
          black: "Il adore les aliments sucrés. Ils lui\nservent d’énergie pour alimenter le\nfeu à l’intérieur de son corps."
          white: "Son corps est en combustion. Il\nprojette des flammèches par la tête et\nla queue pour carboniser ses ennemis."
        it:
          black: "Ama i dolci che, una volta mangiati,\ndiventano energia per alimentare\nla fiamma all’interno del suo corpo."
          white: "Alimentando la fiamma all’interno del suo\ncorpo, sparge dalla testa o dalla coda\nuna pioggia di fuoco che scotta i nemici."
        de:
          black: "Am liebsten isst es Süßigkeiten.\nEs wandelt sie in Energie um, mit der es\ndas Feuer in seinem Körper schürt."
          white: "Es entfacht in seinem Körper ein Feuer\nund verkohlt Gegner mit Funken aus\nseinem Kopf und Schweif."
        es:
          black: "Le pirran los dulces, pues le aportan\nla energía que necesita para avivar\nlas llamas de su interior."
          white: "Achicharra a sus enemigos desprendiendo\nllamas por la cola y la cabeza, fruto\nde su desmesurado calor interno."
        ko:
          black: "단것을 매우 좋아한다.\n체내의 불꽃을 태우기 위한\n에너지가 된다."
          white: "몸속에서 태운 불꽃을\n머리나 꼬리로 흩뿌려서\n상대를 태운다."
panpour:
  species_id: 515
  names:
    jp_kana: ヒヤップ
    jp_kanji: ヒヤップ
    en: Panpour
    fr: Flotajou
