        jp_kana:
          black: "であった　えものは　にがさない。\nじどうしゃの　ボディを　くいちぎる\nきょうりょくな　あごを　もつ。"
          white: "そうがんきょうの　ように\nとおくの　ものを　かくだいして\nみる　ことが　できる　めを　もつ。"
        jp_kanji:
          black: "出会った　獲物は　逃がさない。\n自動車の　ボディを　食いちぎる\n強力な　アゴを　持つ。"
          white: "双眼鏡の　ように\n遠くの　ものを　拡大して\n見る　ことが　できる　目を　持つ。"
        en:
          black: "They never allow prey to escape.\nTheir jaws are so powerful, they can\ncrush the body of an automobile."
          white: "It can expand the focus of its eyes,\nenabling it to see objects in the far\ndistance as if it were using binoculars."
        fr:
          black: "Il ne laisse jamais échapper ses proies.\nSes mâchoires surpuissantes peuvent\nbroyer une voiture."
          white: "Ses yeux ont les mêmes propriétés que\ndes jumelles et lui permettent de voir\nles objets très éloignés en agrandi."
        it:
          black: "Una volta che l’ha presa, non si lascia\npiù sfuggire la preda. Ha delle mandibole\nin grado di fare a pezzi un’automobile."
          white: "Ha degli occhi simili a binocoli, che gli\npermettono di vedere le cose in\nlontananza ingrandite."
        de:
          black: "Hat es seine Beute erblickt, gibt es kein\nEntrinnen mehr. Sein mächtiger\nKiefer knackt selbst Karosserien."
          white: "Seine Augen können wie ein Fernglas weit\nentfernte Objekte näher heranholen."
        es:
          black: "Jamás deja escapar a su presa.\nSus mandíbulas son capaces de\ndestrozar la carrocería de un coche."
          white: "Sus ojos le permiten escudriñar en la\nlejanía ampliando lo que ve a manera\nde prismáticos."
        ko:
          black: "마주친 먹이는 놓치지 않는다.\n자동차 몸체를 물어뜯을 만큼\n강력한 턱을 가지고 있다."
          white: "쌍안경처럼\n멀리 있는 것을 확대해서\n볼 수 있는 눈을 가지고 있다."
darumaka:
  species_id: 554
