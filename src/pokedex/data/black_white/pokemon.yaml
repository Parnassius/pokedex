      descriptions:
        jp_kana:
          black: "なんにでも　かみつく　しゅうせい。\nたべられるものは　なんでも　たべる。\nうかつに　ちかよると　きけんだ。"
          white: "めが　みえないため　たいあたりしたり\nかみついて　まわりを　さぐる。\nからだじゅう　なまきずが　たえない。"
        jp_kanji:
          black: "なんにでも　かみつく　習性。\n食べられるものは　なんでも　食べる。\nうかつに　近寄ると　危険だ。"
          white: "目が　見えないため　体当たりしたり\nかみついて　まわりを　探る。\n体中　生傷が　絶えない。"
        en:
          black: "It tends to bite everything, and it\nis not a picky eater. Approaching it\ncarelessly is dangerous."
          white: "They cannot see, so they tackle and bite\nto learn about their surroundings.\nTheir bodies are covered in wounds."
        fr:
          black: "Il mord tout ce qui bouge, et mange tout\nce qu’il trouve. Il vaut mieux éviter\nde s’en approcher."
          white: "Comme il ne voit rien, il perçoit son\nenvironnement en mordant et en fonçant\nà tout va. Il est couvert de plaies."
        it:
          black: "Ha il vizio di mordere tutto e mangia\nqualsiasi cosa gli passi davanti.\nÈ pericoloso avvicinarlo senza cautela."
          white: "Dal momento che non ci vede, esamina ciò\nche lo circonda mordendo o lanciandosi di\npeso. Ha ammaccature su tutto il corpo."
        de:
          black: "Es beißt einfach alles und jeden und\nfrisst, was ihm zwischen die Zähne kommt.\nMan nähert sich ihm besser mit Bedacht."
          white: "Da es nichts sehen kann, sucht es seine\nUmgebung mit Rempel- und Bissattacken\nab und ist immer mit Wunden übersät."
        es:
          black: "Mordisquea todo aquello a su paso y\nse come todo aquello que sea comestible.\nEs peligroso acercarse a él sin cuidado."
          white: "No ve, por eso va haciendo placajes y\ndando mordiscos a diestro y siniestro.\nSu cuerpo está plagado de heridas."
        ko:
          black: "무엇이든 물어뜯는 습성이 있다.\n먹을 수 있는 것은 무엇이든 먹는다.\n함부로 다가가면 위험하다."
          white: "눈이 보이지 않아서 몸통박치기나\n물기로 주변을 살핀다.\n몸에 상처가 끊이지 않는다."
zweilous:
