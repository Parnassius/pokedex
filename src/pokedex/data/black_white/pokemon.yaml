        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - electric
      egg_groups:
        - amorphous
      abilities:
        - levitate
      descriptions:
        jp_kana:
          black: "１ぴきの　でんりょくは　ちいさいが\nたくさんの　シビシラスが　つながると\nカミナリと　おなじ　いりょくになる。"
          white: "むれで　こうどうする　ポケモン。\nでんきを　つくる　きかんを　もち\nピンチになると　はつでんさせる。"
        jp_kanji:
          black: "１匹の　電力は　小さいが\nたくさんの　シビシラスが　つながると\n雷と　同じ　威力になる。"
          white: "群れで　行動する　ポケモン。\n電気を　作る　器官を　持ち\nピンチになると　発電する。"
        en:
          black: "While one alone doesn’t have much power,\na chain of many Tynamo can be as\npowerful as lightning."
          white: "These Pokémon move in schools. They\nhave an electricity-generating organ, so\nthey discharge electricity if in danger."
        fr:
          black: "Tout seuls, ils ne dégagent pas beaucoup\nd’électricité, mais un banc d’Anchwatt\nproduit la même puissance qu’un éclair."
          white: "Ils agissent en groupes. Ils possèdent\nun organe produisant de l’électricité et\nlancent des décharges en cas de danger."
        it:
          black: "La carica elettrica di un Tynamo è\ndebole, ma se più esemplari si uniscono\nraggiungono la potenza di un fulmine."
          white: "Pokémon che agisce in gruppo. È dotato\ndi un apparato che produce scariche\nelettriche, utile nei momenti critici."
        de:
          black: "Allein erzeugt es nur wenig Strom, doch\ntritt es geschlossen im Schwarm auf,\ngleicht seine Kraft der eines Blitzes."
          white: "Es besitzt ein Organ, mit dem es im\nNotfall Elektrizität erzeugen kann.\nEs tritt stets in Schwärmen auf."
        es:
          black: "La electricidad de uno solo es diminuta,\npero, si multitud de Tynamo se conectan,\nconsiguen la potencia de un rayo."
          white: "Actúa siempre en su cardumen. Cuenta\ncon un mecanismo que genera electricidad\ny la libera cuando está en peligro."
        ko:
          black: "한 마리의 전력은 적지만\n많은 저리어가 연결되면\n번개와 같은 위력이 된다."
          white: "무리지어 행동하는 포켓몬이다.\n전기를 만드는 기관이 있으며\n위급해지면 발전시킨다."
eelektrik:
  species_id: 603
  names:
    jp_kana: シビビール
    jp_kanji: シビビール
    en: Eelektrik
    fr: Lampéroie
    it: Eelektrik
    de: Zapplalek
    es: Eelektrik
    ko: 저리릴
