          white: "およそ　１おくねんまえの　うみを\nおよいでいた。りくちへ　あがって\nえものに　おそいかかる　こともある。"
        jp_kanji:
          black: "古代の　化石から　復活した。\n深さ　１０００メートルまで\n潜水することが　できる。"
          white: "およそ　１億年前の　海を\n泳いでいた。陸地へ　上がって\n獲物に　襲いかかる　こともある。"
        en:
          black: "Restored from a fossil, this Pokémon\ncan dive to depths beyond half a mile."
          white: "About 100 million years ago, these\nPokémon swam in oceans. It is thought\nthey also went on land to attack prey."
        fr:
          black: "Il a été recréé à partir d’un fossile\npréhistorique. Il peut plonger jusqu’à\n1 000 mètres de profondeur."
          white: "Il nageait dans les océans il y a 100\nmillions d’années. Il lui arrive de rallier\nla terre ferme pour attaquer ses proies."
        it:
          black: "Si è risvegliato da un antico fossile.\nPuò immergersi fino a 1000 metri di\nprofondità."
          white: "Nuotava nei mari 100 milioni di anni fa.\nA volte sale in superficie per aggredire\nle prede."
        de:
          black: "Es wurde aus einem urzeitlichen Fossil\nreanimiert. Es kann in Tiefen von bis\nzu 1 000 Metern abtauchen."
          white: "Schwamm bereits vor 100 Millionen Jahren\ndurch die Meere. Ab und zu führt es die\nJagd auch an Land."
        es:
          black: "Ha renacido de un fósil prehistórico.\nPuede sumergirse hasta 1000 m\nde profundidad."
          white: "Ya pululaba por las aguas hace 100\nmillones de años. También va a tierra\na veces en busca de alimento."
        ko:
          black: "고대 화석에서 부활했다.\n1000m 깊이까지\n잠수할 수 있다."
          white: "약 1억 년 전 바다를\n헤엄쳐 다녔다. 육지에 올라\n먹이를 덮치는 일도 있다."
carracosta:
  species_id: 565
  names:
    jp_kana: アバゴーラ
    jp_kanji: アバゴーラ
    en: Carracosta
    fr: Mégapagos
    it: Carracosta
    de: Karippas
    es: Carracosta
    ko: 늑골라
