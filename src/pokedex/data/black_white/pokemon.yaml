        hp: 109
        attack: 66
        defense: 84
        special_attack: 81
        special_defense: 99
        speed: 32
      evs_yield:
        hp: 2
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
