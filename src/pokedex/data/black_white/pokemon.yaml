      descriptions:
        jp_kana:
          black: "たいおんが　あがると　すいじょうきに\nなって　すがたを　けす。たいおんが\nさがると　もとの　こおりに　もどる。"
          white: "ゆきぐもの　なかで　うまれた。\nこおりの　けっしょうで　できた\nくさりで　えものを　つかまえる。"
        jp_kanji:
          black: "体温が　上がると　水蒸気に　なって\n姿を　消す。体温が　下がると\n元の　氷に　戻る。"
          white: "雪雲の　中で　生まれた。\n氷の　結晶で　できた　鎖で\n獲物を　捕まえる。"
        en:
          black: "When its body temperature goes up, it\nturns into steam and vanishes. When its\ntemperature lowers, it returns to ice."
          white: "They are born in snow clouds.\nThey use chains made of\nice crystals to capture prey."
        fr:
          black: "Si sa température monte, il se dissipe\nen vapeur d’eau et disparaît. Quand\nelle diminue, il redevient de glace."
          white: "Né d’un nuage neigeux, il attrape ses\nproies à l’aide de sa chaîne faite\nde cristaux de givre."
        it:
          black: "Quando la sua temperatura aumenta, si\ndissolve in una nuvola di vapore, ma se\nsi abbassa, ridiventa di ghiaccio."
          white: "È nato nelle nuvole cariche di neve.\nCattura le prede con una catena\nfatta di cristalli di ghiaccio."
        de:
          black: "Steigt seine Körpertemperatur, wird es\nzu Wasser und verschwindet. Kühlt es\nwieder ab, nimmt es seine alte Form an."
          white: "Es fängt seine Beute mit Ketten, die\nsich aus Eiskristallen zusammensetzen.\nEntstanden ist es aus einer Schneewolke."
        es:
          black: "Se convierte en vapor y desaparece\ncuando sube su temperatura corporal.\nCuando baja, vuelve a hacerse de hielo."
          white: "Nació entre nubes de nieve.\nAtrapa a sus presas con una cadena\nhecha de hielo cristalizado."
        ko:
          black: "체온이 올라가면 수증기가 되어\n모습을 감춘다. 체온이 내려가면\n본래 모습인 얼음으로 되돌아간다."
          white: "눈구름 속에서 태어났다.\n얼음 결정으로 만들어진\n사슬로 먹이를 잡는다."
shelmet:
  species_id: 616
  names:
