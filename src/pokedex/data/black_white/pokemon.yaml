      descriptions:
        jp_kana:
          black: "２つの　からだは　くみあわせが\nきまっている。べつの　からだとは\nかみあわずに　はなれてしまう。"
          white: "２つの　からだが　かみあい\nかいてんすることで　いきるための\nエネルギーを　つくりだしている。"
        jp_kanji:
          black: "２つの　体は　組み合わせが\n決まっている。別の　体とは\nかみ合わずに　離れてしまう。"
          white: "２つの　体が　かみ合い\n回転することで　生きるための\nエネルギーを　作り出している。"
        en:
          black: "The two minigears that mesh together\nare predetermined. Each will rebound\nfrom other minigears without meshing."
          white: "Interlocking two bodies and\nspinning around generates\nthe energy they need to live."
        fr:
          black: "La compatibilité entre ses deux rouages\nest prédéterminée. Ceux-ci ne se\nfixeront à aucun autre."
          white: "Le mouvement de ses deux corps\nenchâssés produit l’énergie qui\nlui est nécessaire pour vivre."
        it:
          black: "I due ingranaggi che lo compongono\ncombaciano unicamente l’uno con l’altro.\nQualsiasi altro incastro è impossibile."
          white: "Produce l’energia che gli serve per\nvivere incastrando e facendo ruotare\nle due parti che lo compongono."
        de:
          black: "Seine zwei Teile greifen ineinander wie ein\nUhrwerk. Jedes andere Objekt, das man\nmit ihm kombinieren will, wird abgestoßen."
          white: "Es gewinnt lebenswichtige Energie, indem\nes seine zwei Einzelteile ineinander\nverzahnt und rotieren lässt."
        es:
          black: "La combinación de sus dos cuerpos es\npredeterminada. Si no se corresponde\ncon su homólogo, se separa."
          white: "Genera la energía vital que necesita\nhaciendo girar sus dos cuerpos."
        ko:
          black: "두 개의 몸은 그 조합 방법이\n정해져 있다. 다른 몸과는\n맞물리지 않고 떨어져 버린다."
          white: "두 개의 몸을 맞물려\n회전시켜서 살아가기 위한\n에너지를 만들고 있다."
klang:
  species_id: 600
  names:
    jp_kana: ギギアル
    jp_kanji: ギギアル
