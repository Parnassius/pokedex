      descriptions:
        jp_kana:
          black: "うすい　ベールのような　うでで\nあいての　からだを　しばりつけたまま\nうみの　そこへ　しずんでいくのだ。"
          white: "えものを　どくで　しびれさせて\n８０００メートルの　しんかいに\nあるという　すみかに　つれていく。"
        jp_kanji:
          black: "薄い　ベールのような　腕で\n相手の　体を　縛りつけたまま\n海の　底へ　沈んでいくのだ。"
          white: "獲物を　毒で　しびれさせて\n８０００メートルの　深海に\nあるという　住処に　連れていく。"
        en:
          black: "With its thin, veil-like arms wrapped\naround the body of its opponent,\nit sinks to the ocean floor."
          white: "They paralyze prey with poison,\nthen drag them down to their lairs,\nfive miles below the surface."
        fr:
          black: "Il s’enfonce dans les profondeurs de la\nmer en emmenant son ennemi, qu’il ligote\navec ses bras fins comme des voiles."
          white: "Il paralyse ses proies avec du poison et\nles entraîne jusqu’à son antre, qu’on\ndit situé à 8 000 m de profondeur."
        it:
          black: "Avvolge l’avversario con i suoi arti simili\na un velo sottile e lo trascina sul fondo\ndel mare."
          white: "Paralizza la preda con il veleno e la\nporta nella sua dimora a 8000 metri\nin fondo al mare."
        de:
          black: "Schlingt seine dünnen, schleierartigen\nArme um den Gegner und lässt sich mit ihm\nzum Meeresgrund sinken."
          white: "Es lähmt seine Beute mit Gift und\nverschleppt sie in seinen Unterschlupf,\nacht Kilometer unter dem Meeresspiegel."
        es:
          black: "Se escabulle al fondo del mar una vez\nque atrapa fuertemente a su rival con\nunos tentáculos semejantes a velos."
          white: "Paraliza a sus presas con veneno y las\nlleva a su morada, que se encuentra\na 8000 m en el fondo del mar."
        ko:
          black: "얇은 베일 같은 팔로\n상대의 몸을 묶고서\n바다 깊숙이 가라앉는다."
          white: "먹이를 독으로 마비시켜\n8000m 심해에\n있다는 거처로 데려간다."
jellicent:
  species_id: 593
  names:
    jp_kana: ブルンゲル
    jp_kanji: ブルンゲル
    en: Jellicent
    fr: Moyade
    it: Jellicent
    de: Apoquallyp
    es: Jellicent
    ko: 탱탱겔
  forms:
    jellicent:
      form_id: 0
      base_stats:
        hp: 100
        attack: 60
        defense: 70
        special_attack: 85
        special_defense: 105
        speed: 60
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 2
        speed: 0
      types:
        - water
        - ghost
      egg_groups:
        - amorphous
      abilities:
        - water_absorb
        - cursed_body
      hidden_ability: damp
      descriptions:
        jp_kana:
          black: "ブルンゲルの　すみかに　まよいこんだ\nふねは　しずめられて　のりくみいんの\nいのちは　すいとられて　しまうのだ。"
          white: "からだに　すいこんだ　かいすいを\nいきおいよく　ふきだして　すすむ。\nせいめいエネルギーが　だいこうぶつ。"
        jp_kanji:
          black: "ブルンゲルの　住処に　迷い込んだ\n船は　沈められて　乗組員の　命は\n吸い取られて　しまうのだ。"
          white: "体に　吸い込んだ　海水を\n勢いよく　吹き出して　前進する。\n生命エネルギーが　大好物。"
        en:
          black: "The fate of the ships and crew that\nwander into Jellicent’s habitat:\nall sunken, all lost, all vanished."
          white: "They propel themselves by expelling\nabsorbed seawater from their bodies.\nTheir favorite food is life energy."
        fr:
          black: "Les bateaux qui s’aventurent sur\nson territoire coulent, et Moyade\naspire l’énergie vitale des marins."
          white: "Il se déplace en projetant l’eau de mer\nqu’il accumule dans son corps. Son plat\npréféré est l’énergie vitale."
        it:
          black: "Affonda le sfortunate navi che si\navventurano nel suo territorio e\nconsuma l’energia dell’equipaggio."
          white: "Avanza espellendo con forza l’acqua di\nmare risucchiata nel corpo. È ghiotto\ndi energia vitale."
        de:
          black: "Dringt ein Schiff in sein Revier ein,\nbringt es dieses zum Kentern und saugt\ndie Lebensenergie aus der Besatzung."
          white: "Es bewegt sich wie mit einer Düse fort,\nindem es Meerwasser ausstößt. Seine\nLeibspeise ist Lebensenergie."
        es:
          black: "Jellicent hunde los barcos que acaban\nperdidos en su territorio y absorbe\nla energía vital de su tripulación."
          white: "Avanza expulsando violentamente el agua\nde mar absorbida anteriormente.\nLe encanta la energía vital."
        ko:
          black: "탱탱겔의 거처로 길을 잃고\n들어간 배는 가라앉으며 승무원의\n생명이 흡수되어 버린다."
          white: "몸에 빨아들인 바닷물을\n기운차게 뿜어내며 전진한다.\n생명 에너지를 매우 좋아한다."
alomomola:
  species_id: 594
  names:
    jp_kana: ママンボウ
    jp_kanji: ママンボウ
    en: Alomomola
    fr: Mamanbo
    it: Alomomola
    de: Mamolida
    es: Alomomola
    ko: 맘복치
  forms:
    alomomola:
      form_id: 0
      base_stats:
        hp: 165
        attack: 75
        defense: 80
        special_attack: 40
        special_defense: 45
