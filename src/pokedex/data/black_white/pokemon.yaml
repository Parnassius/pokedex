        - vital_spirit
        - pickup
      hidden_ability: run_away
      descriptions:
        jp_kana:
          black: "つよい　あいてにも　ゆうかんに\nたちむかうが　ふりな　たたかいを\nさける　ちのうの　たかい　ポケモン。"
          white: "かおを　おおう　ながい　けは\nすぐれた　レーダー。しゅういの\nようすを　びんかんに　さっちする。"
        jp_kanji:
          black: "強い　相手にも　勇敢に　立ち向かうが\n不利な　戦いを　避ける\n知能の　高い　ポケモン。"
          white: "顔を　おおう　長い　毛は\n優れた　レーダー。周囲の　様子を\n敏感に　察知する。"
        en:
          black: "It faces strong opponents with great\ncourage. But, when at a disadvantage in\na fight, this intelligent Pokémon flees."
          white: "The long hair around its face provides\nan amazing radar that lets it sense\nsubtle changes in its surroundings."
        fr:
          black: "Il fait vaillamment face à des ennemis\ntrès puissants, mais il est intelligent\net évite les combats trop inégaux."
          white: "Les longs poils de son museau font\nun excellent radar qui analyse les\nalentours avec une grande acuité."
        it:
          black: "Affronta con valore anche gli avversari\npiù forti, ma la sua intelligenza gli fa\nevitare le lotte troppo svantaggiose."
          white: "I lunghi peli che gli coprono il volto\nsono un radar molto sensibile alle\nvariazioni dell’ambiente circostante."
        de:
          black: "Ein kluges Pokémon, das sich zwar tapfer\nauch starken Gegnern zum Kampf stellt,\naber unfaire Begegnungen zu meiden weiß."
          white: "Das lange Fell um sein Gesicht fungiert\nals Hightech-Radar, mit dem es fein\nsäuberlich seine Umgebung abtastet."
        es:
          black: "Se enfrenta con brío a enemigos muy\npoderosos. Es muy inteligente, por eso\ntiende a evitar luchas en desventaja."
          white: "Los mechones que cubren su cara actúan\ncomo un magnífico radar para detectar\ncon precisión lo que hay a su alrededor."
        ko:
          black: "강한 상대를 만나도 용감하게\n맞서지만 불리한 싸움은 피할 줄\n아는 높은 지능을 가진 포켓몬이다."
          white: "얼굴을 둘러싼 긴 털은\n우수한 레이더다. 주위\n상황을 민감히 살핀다."
herdier:
  species_id: 507
  names:
    jp_kana: ハーデリア
    jp_kanji: ハーデリア
    en: Herdier
    fr: Ponchien
    it: Herdier
    de: Terribark
    es: Herdier
    ko: 하데리어
  forms:
    herdier:
      form_id: 0
      base_stats:
        hp: 65
        attack: 80
        defense: 65
        special_attack: 35
        special_defense: 65
        speed: 60
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - normal
      egg_groups:
        - field
      abilities:
        - intimidate
        - sand_rush
      hidden_ability: scrappy
      descriptions:
        jp_kana:
          black: "マントのように　からだを　おおう\nくろい　たいもうは　とても　かたい。\nうけた　ダメージを　へらしてくれる。"
          white: "トレーナーの　しじに　ちゅうじつ。\nおおむかしから　ポケモンを　そだてる\nトレーナーの　てつだいを　してきた。"
        jp_kanji:
          black: "マントのように　体を　おおう\n黒い　体毛は　とても　硬い。\n受けた　ダメージを　減らしてくれる。"
          white: "トレーナーの　指示に　忠実。\n大昔から　ポケモンを　育てる\nトレーナーの　手伝いを　してきた。"
        en:
          black: "It has black, cape-like fur that is\nvery hard and decreases the amount\nof damage it receives."
          white: "It loyally follows its Trainer’s\norders. For ages, they have helped\nTrainers raise Pokémon."
        fr:
          black: "Les poils qui entourent son corps\ncomme un manteau sont extrêmement\ndurs et amortissent les coups."
          white: "Il obéit fidèlement aux consignes.\nIl assiste les Dresseurs depuis\ntrès longtemps."
        it:
          black: "La pelliccia nera che lo ricopre come un\nmanto è estremamente dura e ammortizza\ni colpi che gli vengono inferti."
          white: "Segue fedelmente le istruzioni\ndell’Allenatore. Aiuta sin dall’antichità\ngli Allenatori ad allenare i Pokémon."
        de:
          black: "Das dunkle Fell, das es wie ein Mantel\numgibt, ist äußerst widerstandsfähig und\nmindert den Schaden durch Attacken."
          white: "Folgt treu den Befehlen seines Trainers.\nSchon seit jeher ist es als rechte Hand\nder Pokémon-Trainer bekannt."
        es:
          black: "Un robusto pelaje cubre su cuerpo a\nmodo de capa y disminuye el daño\nque recibe en los ataques."
          white: "Es fiel a las órdenes de su Entrenador.\nEsta especie ha ayudado desde antaño\na Entrenadores que crían Pokémon."
        ko:
          black: "매우 단단한 검은 털이\n망토처럼 몸을 둘러싸고 있다.\n입은 데미지를 줄여준다."
          white: "트레이너의 지시에 충실히 따른다.\n오랜 옛날부터 포켓몬을 키우는\n트레이너를 도와줘 왔다."
stoutland:
  species_id: 508
  names:
    jp_kana: ムーランド
    jp_kanji: ムーランド
    en: Stoutland
    fr: Mastouffe
    it: Stoutland
    de: Bissbark
    es: Stoutland
    ko: 바랜드
  forms:
    stoutland:
      form_id: 0
      base_stats:
        hp: 85
        attack: 100
        defense: 90
        special_attack: 45
        special_defense: 90
        speed: 80
      evs_yield:
        hp: 0
        attack: 3
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - normal
      egg_groups:
        - field
      abilities:
        - intimidate
        - sand_rush
      hidden_ability: scrappy
      descriptions:
        jp_kana:
          black: "ふぶきで　とざされた　やまに　はいり\nそうなんした　ひとを　たすける。\nながい　けが　さむさを　ふせぐ。"
          white: "やまや　うみで　そうなんした　ひとを\nきゅうじょする　ことが　とくい。\nとても　かしこい　ポケモン。"
        jp_kanji:
          black: "吹雪で　閉ざされた　山に　入り\n遭難した　人を　助ける。\n長い　毛が　寒さを　防ぐ。"
          white: "海や　山で　遭難した　人を\n救助する　ことが　得意。\nとても　賢い　ポケモン。"
        en:
          black: "It rescues people stranded by\nblizzards in the mountains. Its\nshaggy fur shields it from the cold."
          white: "This extremely wise Pokémon excels\nat rescuing people stranded at sea or\nin the mountains."
        fr:
          black: "Il sauve les gens bloqués dans les\nmontagnes par des tempêtes de neige.\nSes longs poils le protègent du froid."
          white: "Il est spécialisé dans l’assistance aux\npersonnes perdues en mer ou en\nmontagne. Il est très intelligent."
        it:
          black: "Soccorre chi si trova in difficoltà sulle\nmontagne spazzate da bufere di neve.\nI lunghi peli lo proteggono dal freddo."
          white: "La sua specialità è soccorrere chi si\ntrova in difficoltà in mare o in montagna.\nÈ molto intelligente."
        de:
          black: "Es rettet Menschen, die aufgrund eines\nSchneesturmes im Gebirge festsitzen.\nSein langes Fell schützt es vor Kälte."
          white: "Seine Stärke ist es, Menschen zu retten,\ndie auf hoher See oder in den Bergen in\nNot geraten. Ein sehr kluges Pokémon."
        es:
          black: "Socorre a humanos perdidos en montañas\nazotadas por ventiscas. Su largo pelaje\nle protege del frío."
          white: "Es especialista en socorrer a personas\nextraviadas en el mar o la montaña.\nEs muy inteligente."
        ko:
          black: "눈보라로 길이 막힌 산에 들어가\n조난된 사람을 구해준다.\n긴 털이 추위를 막는다."
          white: "바다나 산에서 조난당한 사람을\n구조하는 것이 특기다.\n매우 슬기로운 포켓몬이다."
purrloin:
  species_id: 509
  names:
    jp_kana: チョロネコ
    jp_kanji: チョロネコ
    en: Purrloin
    fr: Chacripan
    it: Purrloin
    de: Felilou
    es: Purrloin
    ko: 쌔비냥
  forms:
    purrloin:
      form_id: 0
      base_stats:
        hp: 41
        attack: 50
        defense: 37
        special_attack: 50
        special_defense: 37
        speed: 66
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - dark
      egg_groups:
        - field
      abilities:
        - limber
        - unburden
      hidden_ability: prankster
      descriptions:
        jp_kana:
          black: "ひとの　ものを　あそびで　ぬすむ。\nぬすまれた　ひとも　あいくるしい\nしぐさに　つい　ゆるしてしまうのだ。"
          white: "かわいらしい　しぐさで　ゆだんさせて\nその　すきに　もちものを　うばう。\nおこると　ツメを　たてて　はんげき。"
        jp_kanji:
          black: "人の　物を　遊びで　盗む。\n盗まれた　人も　愛くるしい　仕草に\nつい　許してしまうのだ。"
          white: "かわいらしい　仕草で　油断させて\nその　すきに　持ち物を　奪う。\n怒ると　ツメを　立てて　反撃。"
        en:
          black: "They steal from people for fun, but their\nvictims can’t help but forgive them.\nTheir deceptively cute act is perfect."
          white: "Its cute act is a ruse. When victims let\ndown their guard, they find their items\ntaken. It attacks with sharp claws."
        fr:
          black: "Il vole les gens pour le plaisir, mais il\nest tellement mignon que ses victimes\nfinissent toujours par lui pardonner."
          white: "Il détourne l’attention de ses victimes\navec ses gestes mignons pour mieux les\ndétrousser. En colère, il griffe."
        it:
          black: "Ruba per gioco le cose alle persone, ma\nè talmente tenero che finiscono tutti\nper perdonarlo."
          white: "Distrae con pose ammalianti i nemici\nincauti e ne approfitta per depredarli.\nSe si arrabbia, sguaina le unghie."
        de:
          black: "Es stibitzt den Leuten spaßeshalber ihr\nHab und Gut, doch dank seiner reizenden\nNatur kann ihm niemand lang böse sein."
          white: "Es lenkt die Menschen durch sein süßes\nVerhalten ab, um sie zu bestehlen. Ist\nes wütend, kratzt es gern mal."
        es:
          black: "Hurta a los humanos por mera diversión,\npero las víctimas lo perdonan al ver\na este Pokémon tan encantador."
          white: "Distrae a su oponente con movimientos\ngráciles y sustrae sus pertenencias.\nCuando se enfada, ataca con las garras."
        ko:
          black: "다른 사람의 물건을 장난삼아 훔친다.\n물건을 도둑맞은 사람도 애교 넘치는\n행동에 빠져 용서하고 만다."
          white: "귀여운 행동으로 방심하게 한 후\n그 틈에 지닌 물건을 빼앗아 간다.\n화가 나면 손톱을 세워서 반격한다."
liepard:
  species_id: 510
  names:
    jp_kana: レパルダス
    jp_kanji: レパルダス
    en: Liepard
    fr: Léopardus
    it: Liepard
    de: Kleoparda
    es: Liepard
    ko: 레파르다스
  forms:
    liepard:
      form_id: 0
      base_stats:
        hp: 64
        attack: 88
        defense: 50
        special_attack: 88
        special_defense: 50
        speed: 106
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 2
      types:
        - dark
      egg_groups:
        - field
      abilities:
        - limber
        - unburden
      hidden_ability: prankster
      descriptions:
        jp_kana:
          black: "しんしゅつきぼつな　ポケモン。\nうつくしい　スタイルと　けなみが\nおおくの　トレーナーを　ひきつける。"
          white: "けはいを　ころして　せっきんする。\nあいてが　きづく　まえに　はいごから\nしのびより　しとめてしまうのだ。"
        jp_kanji:
          black: "神出鬼没な　ポケモン。\n美しい　スタイルと　毛並みが\n多くの　トレーナーを　ひきつける。"
          white: "気配を　殺して　接近する。\n相手が　気づく　前に　背後から\n忍び寄り　仕留めてしまうのだ。"
        en:
          black: "These Pokémon vanish and appear\nunexpectedly. Many Trainers are drawn\nto their beautiful form and fur."
          white: "Stealthily, it sneaks up on its target,\nstriking from behind before its victim\nhas a chance to react."
        fr:
          black: "Un Pokémon insaisissable. Son style\net son pelage magnifique attirent de\nnombreux Dresseurs."
          white: "Il s’approche sans un bruit de sa proie\net l’abat d’un coup par derrière\nsans jamais être repéré."
        it:
          black: "Pokémon imprevedibile e indomabile\ndalla magnifica pelliccia, le cui linee\naggraziate attirano molti Allenatori."
          white: "Si avvicina di soppiatto alle spalle\ndel nemico colpendolo prima che se\nne accorga."
        de:
          black: "Kommt und geht, wann es will. Sein\nreizendes Aussehen und Fell ziehen\nTrainer in Scharen an."
          white: "Verbirgt seine Aura und nähert sich\nseinem Gegner völlig unbemerkt von\nhinten, um ihm den Garaus zu machen."
        es:
          black: "Siempre aparece en los momentos más\nimprevistos. Su elegante pelaje es el\nfavorito de muchos Entrenadores."
          white: "Se aproxima evitando que lo detecten.\nCon sigilo, se acerca a su rival por la\nespalda y lo ataca."
        ko:
          black: "신출귀몰한 포켓몬이다.\n아름다운 스타일과 털로\n많은 트레이너의 호감을 산다."
          white: "기척을 지우고 접근한다.\n상대가 눈치채기 전에 뒤쪽으로\n살며시 다가가 꼼짝 못하게 한다."
pansage:
  species_id: 511
  names:
    jp_kana: ヤナップ
    jp_kanji: ヤナップ
    en: Pansage
    fr: Feuillajou
    it: Pansage
    de: Vegimak
    es: Pansage
    ko: 야나프
  forms:
    pansage:
      form_id: 0
      base_stats:
        hp: 50
        attack: 53
        defense: 48
        special_attack: 53
        special_defense: 48
        speed: 64
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - grass
      egg_groups:
        - field
      abilities:
        - gluttony
      hidden_ability: overgrow
      held_items:
        common: oran_berry
        rare: occa_berry
      descriptions:
        jp_kana:
          black: "ふかい　もりで　くらす　ポケモン。\nあたまに　はえた　はっぱを　たべると\nつかれが　うそのように　きえる。"
          white: "げんきの　ない　ポケモンに\nあたまの　はっぱを　わけあたえる。\nつかれを　とる　こうかが　あるのだ。"
        jp_kanji:
          black: "深い　森で　暮らす　ポケモン。\n頭に　生えた　葉っぱを　食べると\n疲れが　ウソのように　消える。"
          white: "元気の　ない　ポケモンに\n頭の　葉っぱを　分け与える。\n疲れを　取る　効果が　あるのだ。"
        en:
          black: "This Pokémon dwells deep in the forest.\nEating a leaf from its head whisks\nweariness away as if by magic."
          white: "It shares the leaf on its head with\nweary-looking Pokémon. These\nleaves are known to relieve stress."
        fr:
          black: "Il vit dans les forêts profondes.\nManger la feuille qui pousse sur\nsa tête fait disparaître la fatigue."
          white: "Les feuilles qui poussent sur sa tête\nsoignent la fatigue. Il en donne aux\nPokémon affaiblis."
        it:
          black: "Vive nel fitto delle foreste. Mangiare\nle foglie che ha sulla testa fa sembrare\nla stanchezza un lontano ricordo."
          white: "Distribuisce le foglie sulla sua testa\nai Pokémon affaticati, per alleviare\nla loro stanchezza."
        de:
          black: "Es lebt tief im Wald. Beißt man in die\nKräuter auf seinem Kopf, fühlt man sich\nauf wundersame Weise erfrischt."
          white: "Schwächelnden Pokémon gibt es ein paar\nder Kräuter auf seinem Kopf ab und hilft\nihnen so wieder auf die Beine."
        es:
          black: "Vive en lo más profundo del bosque.\nEl agotamiento se desvanece con\nsolo comer hojas de su cabeza."
          white: "Comparte las hojas de su cabeza con\nPokémon agotados. Posee la facultad\nde aliviar el cansancio."
        ko:
          black: "깊은 숲에 사는 포켓몬이다.\n머리에 난 잎사귀를 먹으면\n피로가 거짓말처럼 사라진다."
          white: "기운이 없는 포켓몬에게\n머리의 잎사귀를 나눠준다.\n피로를 풀어주는 효과가 있다."
simisage:
  species_id: 512
  names:
    jp_kana: ヤナッキー
    jp_kanji: ヤナッキー
    en: Simisage
    fr: Feuiloutan
    it: Simisage
    de: Vegichita
    es: Simisage
    ko: 야나키
