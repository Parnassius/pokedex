      descriptions:
        jp_kana:
          black: "なかまを　まもるため　にんげんに\nたたかいを　いどんだ　ポケモン。\nでんせつで　かたりつがれている。"
          white: "あたまの　ツノは　するどい　やいば。\nつむじかぜのような　うごきで　てきを\nほんろうして　すばやく　きりつける。"
        jp_kanji:
          black: "仲間を　守るため\n人間に　戦いを　挑んだ　ポケモン。\n伝説で　語り継がれている。"
          white: "頭の　ツノは　鋭い　刃。\n旋風のような　動きで　敵を\nほんろうして　素早く　切りつける。"
        en:
          black: "This Pokémon fought humans in order\nto protect its friends. Legends about it\ncontinue to be passed down."
          white: "Its head sprouts horns as sharp as\nblades. Using whirlwind-like movements,\nit confounds and swiftly cuts opponents."
        fr:
          black: "Il a défié les humains pour protéger\nles siens. Son nom est resté dans\nla légende."
          white: "Ses cornes sont des lames effilées.\nIl lacère ses ennemis dans un\nmouvement tourbillonnant."
        it:
          black: "Pokémon che ha sfidato gli uomini per\nproteggere i propri compagni.\nSi racconta di lui nelle leggende."
          white: "Le corna della testa sono lame affilate.\nMuovendosi come un turbine, scuote\ne falcia fulmineo i nemici."
        de:
          black: "Es kämpfte einst gegen die Menschen,\num seine Freunde zu beschützen. Nun\nerzählt man sich Legenden von ihm."
          white: "Das Horn an seinem Kopf ist eine scharfe\nKlinge. Neckt seine Gegner mit quirligen\nBewegungen und greift blitzartig an."
        es:
          black: "Desafió a los humanos para defender a\nlos suyos. Multitud de leyendas hablan\nde él."
          white: "Sus cuernos son hojas afiladas. Sacude\na sus enemigos con sus relampagueantes\nmovimientos y los reduce."
        ko:
          black: "동료를 지키기 위해 인간에게\n싸움을 건 포켓몬이다.\n전설로 전해지고 있다."
          white: "머리의 뿔은 날카로운 칼날이다.\n회오리바람과 같은 움직임으로\n상대를 농락하여 재빠르게 벤다."
tornadus:
