      descriptions:
        jp_kana:
          black: "６かくけいの　みみを　もつ。\nちていで　あっしゅくされた　からだは\nてつに　まけないくらい　かたい。"
          white: "１００ねんまえの　だいじしんのとき\nじわれから　はっけんされた。\nたいないに　エネルギーコアを　もつ。"
        jp_kanji:
          black: "６角形の　耳を　持つ。\n地底で　圧縮された　体は\n鉄に　負けないくらい　硬い。"
          white: "１００年前の　大地震のときに\n地割れから　発見された。\n体内に　エネルギーコアを　持つ。"
        en:
          black: "Its ear is hexagonal in shape.\nCompressed underground,\nits body is as hard as steel."
          white: "They were discovered a hundred years\nago in an earthquake fissure. Inside\neach one is an energy core."
        fr:
          black: "Il a une oreille hexagonale. Son\ncorps, compressé dans des strates\nprofondes, est dur comme de l’acier."
          white: "On l’a découvert dans une fissure après\nun grand tremblement de terre il y a\n100 ans. Il possède un noyau d’énergie."
        it:
          black: "Ha un solo orecchio di forma esagonale.\nEssendo stato compresso sotto terra, il\nsuo corpo è duro quasi come l’acciaio."
          white: "Scoperto nelle spaccature del terreno\ndopo il grande terremoto di 100 anni fa.\nHa all’interno un nucleo di energia."
        de:
          black: "Hat ein sechseckiges Ohr. Sein durch\ndas Erdreich gepresster Körper steht\nStahl in Sachen Härte in nichts nach."
          white: "Wurde vor 100 Jahren nach einem großen\nErdbeben in einer Erdspalte entdeckt.\nEs trägt eine Energiesphäre in sich."
        es:
          black: "Su oreja tiene forma hexagonal.\nSu cuerpo fue comprimido bajo tierra.\nPor eso, es duro como el acero."
          white: "Descubierto en unas grietas generadas\npor un terremoto hace 100 años. Tiene\nun núcleo energético en su cuerpo."
        ko:
          black: "육각형 귀를 가지고 있다.\n땅속 깊은 곳에서 압축된 몸은\n철 못지않게 단단하다."
          white: "100년 전 대지진 때\n갈라진 땅에서 발견되었다.\n체내에 에너지 코어를 가지고 있다."
boldore:
