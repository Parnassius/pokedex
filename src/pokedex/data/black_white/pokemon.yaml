        jp_kana:
          black: "たいもうが　のやまの　くさと　おなじ\nいろと　かおりに　かわる。てきいを\nかんじると　くさむらに　かくれる。"
          white: "きせつの　かわりめに　なると\nたいもうと　においが　へんかする。\nきせつを　つげる　ポケモン。"
        jp_kanji:
          black: "体毛が　野山の　草と\n同じ　色と　香りに　変わる。\n敵意を　感じると　草むらに　隠れる。"
          white: "季節の　変わり目に　なると\n体毛と　においが　変化する。\n季節を　告げる　ポケモン。"
        en:
          black: "The color and scent of their fur changes\nto match the mountain grass. When they\nsense hostility, they hide in the grass."
          white: "The turning of the seasons changes the\ncolor and scent of this Pokémon’s fur.\nPeople use it to mark the seasons."
        fr:
          black: "Son pelage prend la même couleur et la\nmême odeur que les hautes herbes. S’il\nsent un ennemi, il court s’y réfugier."
          white: "Quand la saison change, il change de\npelage et d’odeur. Un Pokémon qui\nannonce le passage des saisons."
        it:
          black: "La sua pelliccia prende il colore e\nl’odore dell’erba dei prati. Se avverte\nun pericolo, si nasconde tra i cespugli."
          white: "Al cambio di stagione, muta la pelliccia e\nl’odore. È un Pokémon che annuncia\nil passaggio delle stagioni."
        de:
          black: "Sein Fell nimmt Farbe und Duft des\nFeldes oder des Grases unter ihm an. Bei\nGefahr sucht es im hohen Gras Schutz."
          white: "Sein Fell und sein Geruch ändern sich mit\ndem Wechsel der Jahreszeiten. Es ist der\nBote des Saisonwechsels."
        es:
          black: "El color y el aroma de su pelaje cambian\nsegún la vegetación de su entorno. Si lo\namenazan, se esconde entre el follaje."
          white: "Durante los cambios de estación,\nsu pelaje y olor cambian. Esto anuncia\nel comienzo de una estación."
        ko:
          black: "털이 산과 들의 풀과\n같은 색과 향기로 바뀐다.\n적의를 느끼면 풀숲에 숨는다."
