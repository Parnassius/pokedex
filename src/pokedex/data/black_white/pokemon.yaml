        jp_kana:
          black: "きけんを　さっちすると　トゲを\nいっせいに　はっしゃして　はんげき。\nその　すきに　ころがって　にげる。"
          white: "ほらあなの　かべに　トゲを　つきさし\nはりつく。いわに　ふくまれる\nこうぶつを　きゅうしゅうする。"
        jp_kanji:
          black: "危険を　察知すると　トゲを\nいっせいに　発射して　反撃。\nその　すきに　転がって　逃げる。"
          white: "洞穴の　壁に\nトゲを　突き刺し　はりつく。\n岩に　含まれる　鉱物を　吸収する。"
        en:
          black: "When threatened, it attacks by\nshooting a barrage of spikes, which gives\nit a chance to escape by rolling away."
          white: "They stick their spikes into cave\nwalls and absorb the minerals\nthey find in the rock."
        fr:
          black: "Quand il sent un danger, il réagit en\nprojetant toutes ses épines d’un coup\net s’enfuit en roulant sur lui-même."
          white: "Il s’accroche aux parois des grottes\nà l’aide de ses épines et absorbe les\nminéraux contenus dans la roche."
        it:
          black: "Quando avverte un pericolo, reagisce\nsparando simultaneamente tutti i suoi\naculei, per poi fuggire via rotolando."
          white: "Si attacca alle pareti delle grotte\nconficcando gli aculei. Assorbe\ni minerali all’interno delle rocce."
        de:
          black: "Fühlt es sich bedroht, wehrt es sich,\nindem es eine großzügige Salve Dornen\nabfeuert."
          white: "Es hakt sich mit seinen Dornen in den\nWänden von Höhlen fest und saugt\ndie Mineralien aus dem Gestein."
        es:
          black: "Lanza numerosas púas al detectar\npeligro. En cuanto tiene ocasión,\necha a rodar y se escapa."
          white: "Tiene por costumbre estampar sus púas\nen las paredes de cuevas. Absorbe\nlos minerales que contienen las rocas."
        ko:
          black: "위험을 발견하면 가시를\n일제히 발사하여 반격한다.\n그 틈에 몸을 굴려 도망간다."
          white: "동굴 벽에 가시를 박아넣어\n달라붙는다. 바위에 포함된\n광물을 흡수한다."
ferrothorn:
  species_id: 598
  names:
