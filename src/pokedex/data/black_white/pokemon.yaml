      descriptions:
        jp_kana:
          black: "はげしい　ずつきを　くらわせても\nふさふさの　たいもうが　ダメージを\nきゅうしゅうして　くれるのだ。"
          white: "みさかいなく　とっしんして　ずつきを\nくらわせる。はしっている　れっしゃを\nだっせんさせる　はかいりょく。"
        jp_kanji:
          black: "激しい　頭突きを　食らわせても\nふさふさの　体毛が\nダメージを　吸収して　くれるのだ。"
          white: "見境なく　突進して　頭突きを\n食らわせる。走っている　列車を\n脱線させる　破壊力。"
        en:
          black: "Their fluffy fur absorbs damage,\neven if they strike foes with a\nfierce headbutt."
          white: "They charge wildly and headbutt\neverything. Their headbutts have enough\ndestructive force to derail a train."
        fr:
          black: "Son pelage fourni absorbe les chocs\net lui permet d’asséner sans broncher\nle plus violent des coups de tête."
          white: "Il charge tout ce qui bouge sans\nréfléchir. Il peut faire dérailler\nun train en marche."
        it:
          black: "Anche se riceve una violenta testata,\nla folta pelliccia minimizza l’impatto."
          white: "Sferra testate contro tutto e tutti.\nHa una forza distruttiva tale da far\nderagliare un treno in corsa."
        de:
          black: "Sein zotteliges Fell fängt selbst nach\neiner seiner wuchtigen Rempelattacken\neiniges an Schaden ab."
          white: "Rammt seine Gegner ohne Rücksicht auf\nVerluste mit dem Kopf und vermag damit\nsogar Züge zum Entgleisen zu bringen."
        es:
          black: "Aunque encaje un cabezazo violento,\nsu pelaje absorbe el daño."
          white: "Embiste con la cabeza sin distinción.\nSu potencia es capaz de hacer\ndescarrilar un tren en marcha."
        ko:
          black: "세찬 박치기를 당해도\n탐스러운 털이 데미지를\n흡수해 준다."
          white: "무작정 돌진하여 박치기를\n한다. 달리고 있는 열차를\n탈선시킬 정도의 파괴력이다."
rufflet:
  species_id: 627
  names:
