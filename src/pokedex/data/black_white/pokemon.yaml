victini:
  species_id: 494
  names:
    jp_kana: ビクティニ
    jp_kanji: ビクティニ
    en: Victini
    fr: Victini
    it: Victini
    de: Victini
    es: Victini
    ko: 비크티니
  forms:
    victini:
      form_id: 0
      base_stats:
        hp: 100
        attack: 100
        defense: 100
        special_attack: 100
        special_defense: 100
        speed: 100
      evs_yield:
        hp: 3
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - psychic
        - fire
      egg_groups:
        - undiscovered
      abilities:
        - victory_star
      descriptions:
        jp_kana:
          black: "しょうりを　もたらす　ポケモン。\nビクティニを　つれた　トレーナーは\nどんな　しょうぶにも　かてるという。"
          white: "たいないで　むげんの　エネルギーを\nつくりだす。ふれた　あいてに\nエネルギーを　わけあたえる。"
        jp_kanji:
          black: "勝利を　もたらす　ポケモン。\nビクティニを　連れた　トレーナーは\nどんな　勝負にも　勝てるという。"
          white: "体内で　無限の　エネルギーを\n作り出す。触れた　相手に\nエネルギーを　分け与える。"
        en:
          black: "This Pokémon brings victory. It is said\nthat Trainers with Victini always win,\nregardless of the type of encounter."
          white: "It creates an unlimited supply of\nenergy inside its body, which it\nshares with those who touch it."
        fr:
          black: "Un Pokémon qui amène la victoire. On dit\nque les Dresseurs qui le possèdent\npeuvent gagner n’importe quel combat."
          white: "Son corps produit une énergie\nsans limites qu’il peut partager\navec ceux qu’il touche."
        it:
          black: "Pokémon che porta la vittoria. Si dice\nche l’Allenatore che ha con sé Victini\npossa vincere qualsiasi lotta."
          white: "Crea una quantità infinita di energia\nall’interno del proprio corpo e la\ncondivide con chi lo tocca."
        de:
          black: "Ein siegverheißendes Pokémon. Man\nsagt, Trainer, die ein Victini in ihrem\nTeam haben, seien unschlagbar."
          white: "Es erzeugt im Inneren seines Körpers\ngrenzenlose Energie, die es mit jedem\nteilt, der mit ihm in Berührung kommt."
        es:
          black: "Pokémon que atrae la victoria.\nDicen que el Entrenador que lo lleve\nsaldrá vencedor de cualquier batalla."
          white: "Genera energía ilimitada en el interior\nde su cuerpo. Es capaz de compartirla\ncon todo aquel que lo toca."
        ko:
          black: "승리를 부르는 포켓몬이다.\n비크티니와 함께 하는 트레이너는\n그 어떤 승부에서도 승리한다고 한다."
          white: "체내에서 무한한 에너지를\n만들어 낸다. 접촉한 상대에게\n에너지를 나누어 준다."
snivy:
  species_id: 495
  names:
    jp_kana: ツタージャ
    jp_kanji: ツタージャ
    en: Snivy
    fr: Vipélierre
    it: Snivy
    de: Serpifeu
    es: Snivy
    ko: 주리비얀
  forms:
    snivy:
      form_id: 0
      base_stats:
        hp: 45
        attack: 45
        defense: 55
        special_attack: 45
        special_defense: 55
        speed: 63
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - grass
      egg_groups:
        - field
        - grass
      abilities:
        - overgrow
        - overgrow
      hidden_ability: contrary
      descriptions:
        jp_kana:
          black: "ちのうが　たかく　とても　れいせい。\nたいようの　ひかりを　たっぷり\nあびると　うごきが　するどくなる。"
          white: "しっぽで　たいようを　あびて\nこうごうせいを　する。げんきを\nなくすと　しっぽが　たれさがる。"
        jp_kanji:
          black: "知能が　高く　とても　冷静。\n太陽の　光を　たっぷり　浴びると\n動きが　鋭くなる。"
          white: "しっぽで　太陽の光を　浴びて\n光合成を　する。元気を　なくすと\nしっぽが　たれさがる。"
        en:
          black: "It is very intelligent and calm.\nBeing exposed to lots of sunlight makes\nits movements swifter."
          white: "They photosynthesize by bathing their\ntails in sunlight. When they are not\nfeeling well, their tails droop."
        fr:
          black: "Un Pokémon intelligent et très calme.\nLorsqu’il a reçu suffisamment de\nlumière du soleil, il devient plus agile."
          white: "Il laisse sa queue prendre le soleil pour\nsa photosynthèse. Quand il est malade,\nsa queue pend tristement."
        it:
          black: "È dotato di intelligenza e sangue freddo.\nQuando riceve luce solare in abbondanza,\ni suoi movimenti si fanno agilissimi."
          white: "Assorbe i raggi solari dalla coda, per\noperare la fotosintesi. Quando non sta\nbene, la sua coda si affloscia."
        de:
          black: "Eine kühle Denkernatur. Bekommt es\ngenügend Sonnenlicht ab, erhöht sich die\nGeschwindigkeit seiner Bewegungen."
          white: "Fängt mit dem Schweif Sonnenlicht auf, um\nFotosynthese zu betreiben. Fehlt ihm die\nKraft, hängt sein Schweif schlaff herab."
        es:
          black: "De gran inteligencia y sangre fría.\nSe mueve ágilmente si recibe rayos\nde sol de forma continuada."
          white: "Sintetiza la luz del sol que recoge\ncon su cola. Esta se le queda abatida\ncuando le fallan las energías."
        ko:
          black: "지능이 높고 매우 냉정하다.\n태양의 빛을 듬뿍 받으면\n움직임이 민첩해진다."
          white: "꼬리로 태양의 빛을 받아\n광합성 한다. 기운이\n빠지면 꼬리가 축 늘어진다."
servine:
