      descriptions:
        jp_kana:
          black: "いしを　とかす　えきたいを　くちから\nぶんぴつするので　かたい　いしでも\nかんたんに　あなを　あけられるのだ。"
          white: "てごろな　いしに　あなを　あけて\nすみかにする。こわされると　かわりの\nいしが　みつかるまで　おちつかない。"
        jp_kanji:
          black: "石を　溶かす　液体を　口から\n分泌するので　硬い　石でも\n簡単に　穴を　開けられるのだ。"
          white: "手ごろな　石に　穴を　開けて\n住処にする。壊されると　代わりの\n石が　見つかるまで　落ち着かない。"
        en:
          black: "This Pokémon can easily melt holes in\nhard rocks with a liquid secreted from\nits mouth."
          white: "It makes a hole in a suitable rock. If\nthat rock breaks, the Pokémon remains\nagitated until it locates a replacement."
        fr:
          black: "Il peut facilement creuser son trou\ndans les pierres les plus dures grâce\nau liquide sécrété par sa bouche."
          white: "Il perce un caillou et s’en sert comme\nmaison. Quand on lui casse, il est anxieux\njusqu’à ce qu’il en trouve un autre."
        it:
          black: "Poiché secerne dalla bocca un liquido in\ngrado di sciogliere le pietre, riesce ad\naprirsi varchi anche nella dura roccia."
          white: "Scava un buco in una pietra adatta, per\nfarne la sua dimora. Se si rompe, non si\ndà pace finché non ne trova un’altra."
        de:
          black: "Das ätzende Sekret aus seinem Mund\nerlaubt es ihm, ohne Weiteres Steine\nauszuhöhlen."
          white: "Höhlt sich einen brauchbaren Stein aus,\num darin zu wohnen. Geht er zu Bruch,\nruht es nicht, bis es einen neuen findet."
        es:
          black: "Derrite las piedras más sólidas gracias\nal líquido corrosivo que segrega su boca.\nTambién puede abrir agujeros en ellas."
          white: "Abre un agujero en la roca y vive en él.\nSi la roca se resquebraja, no se queda\ntranquilo hasta que no encuentra otra."
        ko:
          black: "돌을 녹이는 액체를 입에서\n분비하기 때문에 단단한 돌도\n간단히 구멍 낼 수 있다."
          white: "적당한 돌을 찾아 구멍을 뚫어\n살 곳을 만든다. 부서지면 대신할\n돌을 찾을 때까지 불안해한다."
crustle:
  species_id: 558
  names:
    jp_kana: イワパレス
    jp_kanji: イワパレス
    en: Crustle
    fr: Crabaraque
    it: Crustle
    de: Castellith
    es: Crustle
    ko: 암팰리스
