        - stench
        - weak_armor
      hidden_ability: aftermath
      held_items:
        common: black_sludge
        rare: nugget
        rarer_dark_grass: big_nugget
      descriptions:
        jp_kana:
          black: "ひだりうでで　あいてを　しめつけて\nくちから　はきだす　あくしゅうの\nどくガスで　とどめを　さすのだ。"
          white: "ゴミを　すいこんで　からだの\nいちぶに　してしまう。みぎうでの\nゆびさきから　どくえきを　ふんしゃ。"
        jp_kanji:
          black: "左腕で　相手を　絞めつけて\n口から　吐き出す　悪臭の　毒ガスで\nとどめを　刺すのだ。"
          white: "ゴミを　吸い込んで\n体の　一部に　してしまう。\n右腕の　指先から　毒液を　噴射。"
        en:
          black: "It clenches opponents with its left arm\nand finishes them off with foul-smelling\npoison gas belched from its mouth."
          white: "They absorb garbage and make it part\nof their bodies. They shoot a poisonous\nliquid from their right-hand fingertips."
        fr:
          black: "Il étrangle ses ennemis avec son bras\ndroit et les achève avec le gaz puant et\nempoisonné qu’il exhale par la bouche."
          white: "Il aspire les déchets et les intègre à\nson corps. Les doigts de sa main droite\nexsudent un fluide empoisonné."
        it:
          black: "Serra l’avversario con l’arto sinistro e\ngli dà il colpo di grazia esalando dalla\nbocca un fetido gas velenoso."
          white: "Assorbe la spazzatura e la ingloba\nnel suo corpo. Spruzza veleno dalle\nestremità dell’arto destro."
        de:
          black: "Es nimmt mit dem rechten Arm Gegner in\ndie Mangel und gibt ihnen mit dem giftigen\nGas aus seinem Maul den Rest."
          white: "Es verschlingt Abfall und macht ihn zu\neinem Teil seines Körpers. Mit seinen\nrechten Fingerspitzen versprüht es Gift."
        es:
          black: "Apresa a su rival con el brazo izquierdo\ny le da el golpe de gracia exhalando por\nla boca un apestoso gas venenoso."
          white: "Traga basura y la integra en su cuerpo.\nDespide veneno líquido por la punta\nde los dedos de su mano derecha."
        ko:
          black: "왼팔로 상대를 꼭 붙들고\n입에서 악취가 나는 독가스를 \n토해내서 마무리한다."
          white: "쓰레기를 빨아들여 몸의\n일부로 만들어 버린다. 오른팔의\n손가락에서 독액을 분사한다."
zorua:
  species_id: 570
  names:
    jp_kana: ゾロア
    jp_kanji: ゾロア
    en: Zorua
    fr: Zorua
    it: Zorua
    de: Zorua
    es: Zorua
    ko: 조로아
