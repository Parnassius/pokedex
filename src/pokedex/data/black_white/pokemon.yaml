      evs_yield:
        hp: 0
        attack: 0
        defense: 2
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ghost
      egg_groups:
        - mineral
        - amorphous
      abilities:
        - mummy
      held_items:
        rare: spell_tag
      descriptions:
        jp_kana:
          black: "ちかづいた　にんげんを　のみこんで\nミイラに　してしまうという　うわさ。\nきんかいを　このんで　たべる。"
          white: "りっぱな　かんおけの　ふりをして\nはかドロボウを　こらしめる。\nじゅんきんで　おおわれた　からだ。"
        jp_kanji:
          black: "近づいた　人間を　飲み込んで\nミイラに　してしまうという　ウワサ。\n金塊を　好んで　食べる。"
          white: "立派な　かんおけの　ふりをして\n墓ドロボウを　こらしめる。\n純金で　おおわれた　体。"
        en:
          black: "It has been said that they swallow those\nwho get too close and turn them into\nmummies. They like to eat gold nuggets."
          white: "They pretend to be elaborate coffins\nto teach lessons to grave robbers.\nTheir bodies are covered in pure gold."
        fr:
          black: "Il paraît qu’il avale les gens\net les transforme en momies.\nIl adore manger des lingots d’or."
          white: "Il prend l’apparence d’un beau cercueil\npour punir les pilleurs de tombes.\nSon corps est recouvert d’or pur."
        it:
          black: "Si dice che inghiottisca le prede che gli\nsi avvicinano e le trasformi in mummie.\nGli piace mangiare le pepite d’oro."
          white: "Inganna i razziatori di tombe con il suo\naspetto da bara preziosa per poi punirli.\nIl suo corpo è ricoperto di oro puro."
        de:
          black: "Angeblich verschlingt es jeden, der sich\nihm auch nur nähert. Besonders gern\nfrisst es Klumpen aus reinem Gold."
          white: "Es tarnt sich als prächtiger Sarkophag\nund zieht Grabräubern die Ohren lang.\nSein Körper ist mit Gold überzogen."
        es:
          black: "Se comenta que engulle a todo humano\nque se le acerca y lo momifica. Su comida\nfavorita son las pepitas de oro."
          white: "Se hace pasar por un ataúd y castiga\na los ladrones de tumbas. Tiene el\ncuerpo bañado en oro puro."
        ko:
          black: "가까이 다가온 인간을 삼켜서\n미라로 만든다는 소문이 있다.\n금괴를 즐겨 먹는다."
          white: "잘 만들어진 관인 척하며\n도굴꾼을 기다렸다가 벌한다.\n몸체는 순금으로 덮여 있다."
tirtouga:
