      descriptions:
        jp_kana:
          black: "ヒトモシの　ともす　あかりは\nひとや　ポケモンの　せいめいりょくを\nすいとって　もえているのだ。"
          white: "あかりを　ともして　みちあんないを\nするように　みせかけながら\nせいめいりょくを　すいとっている。"
        jp_kanji:
          black: "ヒトモシの　灯す　明かりは\n人や　ポケモンの　生命力を\n吸い取って　燃えているのだ。"
          white: "明かりを　灯して　道案内を\nするように　見せかけながら\n生命力を　吸い取っている。"
        en:
          black: "Litwick shines a light that absorbs the\nlife energy of people and Pokémon,\nwhich becomes the fuel that it burns."
          white: "While shining a light and pretending\nto be a guide, it leeches off the life\nforce of any who follow it."
        fr:
          black: "Sa flamme brûle en consumant\nl’énergie vitale des gens et\ndes Pokémon."
          white: "Il fait semblant de guider ses victimes\nà la lueur de sa flamme, mais c’est pour\nmieux aspirer leur énergie vitale."
        it:
          black: "La luce che emana brucia consumando\nl’energia di esseri umani e Pokémon."
          white: "Mentre fa luce col pretesto di fare loro\nda guida, assorbe energia vitale dalle\nsue prede."
        de:
          black: "Es entfacht eine Flamme, die von der\nLebensenergie eines Menschen oder\neines Pokémon zehrt."
          white: "Es entzündet ein Licht und gibt vor, dem\nGegner den Weg zu weisen, doch eigtl.\nsaugt es ihm seine Lebensenergie ab."
        es:
          black: "La luz que desprende absorbe la energía\nvital de humanos y Pokémon."
          white: "Finge ser una luz guía en el camino,\npero en realidad solo quiere absorber\nla energía vital de quien lo sigue."
        ko:
          black: "불켜미가 밝히는 빛은\n사람과 포켓몬의 생명력을\n빨아들여 불타고 있다."
          white: "빛을 밝혀 길 안내를\n하는 것처럼 가장하여\n생명력을 빨아들이고 있다."
