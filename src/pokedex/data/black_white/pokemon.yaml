      descriptions:
        jp_kana:
          black: "にっこうを　つばさで　うけて\nからだを　あたためる。たいおんが\nさがると　うごけなくなってしまう。"
          white: "せまい　ほらあなを　はしりまわり\nえものを　するどい　ツメで　ほかく。\nかおの　ひふは　いわより　かたい。"
        jp_kanji:
          black: "日光を　翼で　受けて　体を　温める。\n体温が　下がると\n動けなくなってしまう。"
          white: "狭い　洞穴を　走り回り\n獲物を　鋭い　ツメで　捕獲。\n顔の　皮膚は　岩より　硬い。"
        en:
          black: "It warms its body by absorbing sunlight\nwith its wings. When its body temperature\nfalls, it can no longer move."
          white: "It races through narrow caves, using\nits sharp claws to catch prey. The skin\non its face is harder than a rock."
        fr:
          black: "Il utilise ses ailes pour emmagasiner la\nchaleur du soleil. Si la température de\nson corps baisse, il ne peut plus bouger."
          white: "Il sillonne les grottes étroites,\ncapturant ses proies avec ses griffes\nacérées. Sa face est dure comme le roc."
        it:
          black: "Si riscalda assorbendo la luce del sole\ndalle ali. Quando la sua temperatura si\nabbassa, non riesce più a muoversi."
          white: "Percorre le grotte anguste catturando\nle prede con gli artigli affilati. La pelle\ndel muso è più dura della roccia."
        de:
          black: "Es erwärmt seinen Körper, indem es mit\nden Flügeln das Sonnenlicht einfängt.\nKühlt sein Körper ab, erstarrt es."
          white: "Es jagt durch enge Höhlengänge und\nspießt seine Gegner mit spitzen Klauen\nauf. Seine Kopfhaut ist fester als Stein."
        es:
          black: "Calienta su cuerpo absorbiendo los rayos\nde sol por las alas. No se puede mover si\nbaja su temperatura corporal."
          white: "Corre por estrechas cavernas y atrapa\na sus presas con sus afiladas garras. La\npiel de la cara es más dura que una roca."
        ko:
          black: "날개로 햇빛을 받아\n몸을 따뜻하게 한다. 체온이\n내려가면 움직일 수 없게 된다."
          white: "좁은 동굴을 뛰어다니며\n날카로운 손톱으로 먹이를 잡는다.\n얼굴 피부는 바위보다 단단하다."
golett:
  species_id: 622
  names:
    jp_kana: ゴビット
    jp_kanji: ゴビット
    en: Golett
    fr: Gringolem
    it: Golett
    de: Golbit
    es: Golett
    ko: 골비람
  forms:
    golett:
      form_id: 0
      base_stats:
        hp: 59
        attack: 74
        defense: 50
        special_attack: 35
        special_defense: 50
        speed: 35
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ground
        - ghost
      egg_groups:
        - mineral
      abilities:
        - iron_fist
