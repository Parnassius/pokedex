          white: "プラズマだんによって　かいぞうされた\nこだいの　むしポケモン。せなかの\nたいほうが　パワーアップした。"
        jp_kanji:
          black: "３億年前に　最強の　ハンターとして\n恐れられていた。\nプラズマ団に　改造された。"
          white: "プラズマ団によって　改造された\n古代の　むしポケモン。\n背中の　大砲が　パワーアップした。"
        en:
          black: "Over 300 million years ago, it was feared\nas the strongest of hunters.\nIt has been modified by Team Plasma."
          white: "This ancient bug Pokémon was altered\nby Team Plasma. They upgraded the\ncannon on its back."
        fr:
          black: "Il y a 300 millions d’années, il était\ncraint comme l’ultime prédateur. Il a\nété modifié par la Team Plasma."
          white: "Un Pokémon Insecte des temps anciens\nmodifié par la Team Plasma. Le canon\ndans son dos a été grandement amélioré."
        it:
          black: "300 milioni di anni fa era temuto come\nil più forte fra i cacciatori.\nÈ stato modificato dal Team Plasma."
          white: "Antico Pokémon coleottero modificato\ndal Team Plasma, che ne ha notevolmente\npotenziato il cannone sulla schiena."
        de:
          black: "Vor 300 Millionen Jahren war es als der\nmächtigste aller Jäger gefürchtet.\nEs wurde von Team Plasma umgemodelt."
          white: "Ein von Team Plasma modifiziertes Käfer-\nPokémon aus dem Altertum. Die Kanone\nauf seinem Rücken ist nun noch stärker."
        es:
          black: "Era temido hace 300 millones de años\npor ser el cazador más fiero y eficaz.\nHa sido modificado por el Equipo Plasma."
          white: "Pokémon de tipo Bicho de la antigüedad,\nmodificado por el Equipo Plasma. El cañón\nde su lomo ha sido mejorado."
