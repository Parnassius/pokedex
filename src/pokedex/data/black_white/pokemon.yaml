    zorua:
      form_id: 0
      base_stats:
        hp: 40
        attack: 65
        defense: 40
        special_attack: 80
        special_defense: 40
        speed: 65
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 1
        special_defense: 0
        speed: 0
      types:
        - dark
      egg_groups:
        - field
      abilities:
        - illusion
      descriptions:
        jp_kana:
          black: "あいての　すがたに　ばけてみせて\nおどろかせる。むくちな　こどもに\nばけている　ことが　おおいらしい。"
          white: "ひとや　ほかの　ポケモンに　ばける。\nじぶんの　しょうたいを　かくすことで\nきけんから　みを　まもっているのだ。"
        jp_kanji:
          black: "相手の　姿に　化けてみせて\n驚かせる。無口な　子供に\n化けている　ことが　多いらしい。"
          white: "人や　ほかの　ポケモンに　化ける。\n自分の　正体を　隠すことで\n危険から　身を　守っているのだ。"
        en:
          black: "It changes into the forms of others\nto surprise them. Apparently, it\noften transforms into a silent child."
          white: "To protect themselves from danger,\nthey hide their true identities by\ntransforming into people and Pokémon."
        fr:
          black: "Il a le pouvoir de prendre l’apparence\ndes autres. On dit qu’il se transforme\nsouvent en petit enfant silencieux."
          white: "Il peut se transformer en humain ou en\nd’autres Pokémon. Il se protège du\ndanger en dissimulant sa vraie identité."
        it:
          black: "Spaventa gli altri cambiando aspetto.\nSpesso appare in veste di bambino\ntaciturno."
          white: "Si protegge dai pericoli trasformandosi\nin essere umano o in un altro Pokémon,\nnascondendo così la sua vera identità."
        de:
          black: "Es übertölpelt andere, indem es ver-\nschiedene Gestalten annimmt. Angeblich\ntarnt es sich oft als wortkarges Kind."
          white: "Es tarnt sich als Mensch oder als andere\nPokémon. Es schützt sich vor Gefahren,\nindem es seine wahre Gestalt geheim hält."
        es:
          black: "Se transforma en otros para crear\ndesconcierto. A menudo, adopta\nla forma de un niño parco en palabras."
          white: "Se transforma en humanos o en otros\nPokémon. Se defiende del peligro\nocultando su verdadera apariencia."
        ko:
          black: "상대의 모습으로 둔갑하여\n놀라게 한다. 말수가 적은 아이로\n둔갑해 있을 때가 잦다고 한다."
          white: "사람이나 다른 포켓몬으로 둔갑한다.\n자신의 정체를 감추어\n위험으로부터 몸을 지키는 것이다."
zoroark:
  species_id: 571
  names:
    jp_kana: ゾロアーク
    jp_kanji: ゾロアーク
    en: Zoroark
    fr: Zoroark
    it: Zoroark
    de: Zoroark
    es: Zoroark
    ko: 조로아크
