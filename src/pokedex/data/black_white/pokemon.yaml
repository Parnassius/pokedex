      descriptions:
        jp_kana:
          black: "たいないの　コアで　エネルギーを\nあっしゅくして　うちだす　こうげきは\nやまを　ふきとばす　いりょく。"
          white: "オレンジいろの　けっしょうで\nたいようこうせんを　きゅうしゅうして\nくちから　エネルギーを　うちだす。"
        jp_kanji:
          black: "体内の　コアで　エネルギーを\n圧縮して　撃ち出す　攻撃は\n山を　吹き飛ばす　威力。"
          white: "体に　生えた　オレンジ色の　結晶で\n太陽光線を　吸収した　エネルギーを\n体内で　増幅させ　口から　撃ち出す。"
        en:
          black: "Compressing the energy from its\ninternal core lets it fire off an attack\ncapable of blowing away a mountain."
          white: "The solar energy absorbed by its body’s\norange crystals is magnified internally\nand fired from its mouth."
        fr:
          black: "Il comprime de l’énergie dans son corps,\net ses attaques sont assez puissantes\npour renverser des montagnes."
          white: "Il amplifie dans son corps l’énergie du\nsoleil absorbée par ses cristaux orangés\net la projette par la bouche."
        it:
          black: "Comprime l’energia nel suo nucleo interno\nper poi spararla con una potenza che\npuò spazzare via anche le montagne."
          white: "Amplifica l’energia dei raggi solari che\nassorbe tramite i cristalli arancioni del\nsuo corpo e poi la spara dalla bocca."
        de:
          black: "Es kann ganze Berge einebnen, indem\nes Energie entlädt, die es in seinem\nKern gesammelt und verdichtet hat."
          white: "Es absorbiert über seine orangefarbenen\nKristalle das Sonnenlicht und schießt die\nso gewonnene Energie aus seinem Maul."
        es:
          black: "El núcleo de su cuerpo comprime la\nenergía para lanzar ataques capaces\nde destruir una montaña."
          white: "Con los cristales naranjas de su cuerpo,\nabsorbe la energía de los rayos de sol,\nla amplifica y la expulsa por la boca."
        ko:
          black: "체내의 코어에서 에너지를\n압축하여 쏘아대는 공격은\n산을 날려버릴 만한 위력이다."
          white: "주황색 결정으로\n태양 광선을 흡수하여\n입에서 에너지를 쏘아댄다."
woobat:
  species_id: 527
  names:
