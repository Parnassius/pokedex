      descriptions:
        jp_kana:
          black: "こだいとしを　まもっていた　きおくを\nのこしているため　いつも　おなじ\nルートを　とんでいるらしい。"
          white: "こだいとしの　まもりがみだった。\nなわばりに　しんにゅうした　てきを\nサイコパワーで　こうげきする。"
        jp_kanji:
          black: "古代都市を　守っていた　記憶を\n残しているため　いつも　同じ\nルートを　飛んでいるらしい。"
          white: "古代都市の　守り神だった。\n縄張りに　侵入した　敵を\nサイコパワーで　攻撃する。"
        en:
          black: "They never vary the route they fly,\nbecause their memories of guarding\nan ancient city remain steadfast."
          white: "The guardians of an ancient city, they\nuse their psychic power to attack\nenemies that invade their territory."
        fr:
          black: "On dit qu’il parcourt toujours le même\nitinéraire parce qu’il a gardé la mémoire\nde la ville antique qu’il protégeait."
          white: "Il était le dieu protecteur d’une ville\nantique. Il repoussait les envahisseurs\nà coups de pouvoir psychique."
        it:
          black: "Vola seguendo sempre la stessa rotta,\nperché conserva il ricordo della città\nantica che un tempo proteggeva."
          white: "Era lo spirito custode di un’antica\ncittà. Attaccava con poteri psichici i\nnemici che invadevano il suo territorio."
        de:
          black: "Erinnerungen an seine Tage als Wächter\neiner uralten Stadt veranlassen es,\nTag für Tag dieselbe Route abzufliegen."
          white: "Einst war es der Wächter einer Stadt aus\nuralten Zeiten. Wer sich in sein Revier\nwagt, lernt seine Psycho-Kräfte kennen."
        es:
          black: "Conserva recuerdos de cuando defendía\ncierta ciudad milenaria, por eso vuela\nsiempre trazando la misma ruta."
          white: "Fue la deidad protectora de una ciudad\nmilenaria. Ataca con su poder psíquico a\nlos enemigos que invaden su territorio."
        ko:
          black: "고대 도시를 지키던 기억이\n남아 있어서 언제나 같은\n루트를 날아다닌다고 한다."
          white: "고대 도시의 수호신이었다.\n자기 영역을 침범한 상대를\n사이코 파워로 공격한다."
