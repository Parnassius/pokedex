      descriptions:
        jp_kana:
          black: "どんなに　ほそい　すきまでも\nかぜのように　くぐりぬけてしまう。\nしろい　けだまを　のこしていく。"
          white: "つむじかぜに　のって　あらわれる。\nすきまから　いえに　はいりこみ\nいたずらを　していく　ポケモン。"
        jp_kanji:
          black: "どんなに　細い　すきまでも\n風のように　潜り抜けてしまう。\n白い　毛玉を　残していく。"
          white: "つむじ風に　乗って　現われる。\nすきまから　家に　入り込み\nいたずらを　していく　ポケモン。"
        en:
          black: "Like the wind, it can slip through any\ngap, no matter how small. It leaves\nballs of white fluff behind."
          white: "Riding whirlwinds, they appear.\nThese Pokémon sneak through gaps into\nhouses and cause all sorts of mischief."
        fr:
          black: "Il se faufile comme le vent par les\nespaces les plus étroits, en laissant\nune touffe de poils blancs."
          white: "Il apparaît dans un tourbillon de vent,\ns’introduit dans les maisons par les\ninterstices et y joue de mauvais tours."
        it:
          black: "Si infiltra nelle fessure più sottili, come\nun soffio di vento, lasciando dietro\ndi sé dei batuffoli bianchi."
          white: "Appare in cima a un vortice d’aria. Entra\nnelle case da minuscole fessure e fa\ndispetti di ogni genere."
        de:
          black: "Passiert wie ein Luftzug mühelos jeden\nnoch so engen Spalt und hinterlässt\ndort nichts als ein weißes Fellknäuel."
          white: "Es kommt auf Sturmböen geritten und\ndringt durch kleine Spalten in Häuser\nein, um dort Schabernack zu treiben."
        es:
          black: "Es capaz de atravesar las más mínimas\nfisuras. A su paso, deja bolitas blancas\nde pelo."
          white: "Aparece con remolinos de viento.\nEntra en las casas por las rendijas\ny le encanta hacer travesuras."
        ko:
          black: "아무리 좁은 틈이라도\n바람처럼 빠져나간다.\n하얀 털 뭉치를 남기고 간다."
          white: "회오리바람을 타고 나타난다.\n집의 틈새를 파고 들어와\n장난을 치는 포켓몬이다."
petilil:
