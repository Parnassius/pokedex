        rarer_dark_grass: balm_mushroom
      descriptions:
        jp_kana:
          black: "モンスターボールに　にた　もようで\nさそい　どくほうしを　ふきかける。\nなぜ　にているかは　なぞである。"
          white: "モンスターボールに　なぜか　にている\nポケモン。つかまえようとした　てきに\nどくほうしを　ふきかけて　げきたい。"
        jp_kanji:
          black: "モンスターボールに　似た　模様で\n誘い　毒胞子を　吹きかける。\nなぜ　似ているかは　ナゾである。"
          white: "モンスターボールに　なぜか　似ている\nポケモン。捕まえようとした　敵に\n毒胞子を　吹きかけて　撃退。"
        en:
          black: "It lures people in with its Poké Ball\npattern, then releases poison spores.\nWhy it resembles a Poké Ball is unknown."
          white: "For some reason, this Pokémon resembles\na Poké Ball. They release poison spores\nto repel those who try to catch them."
        fr:
          black: "Grâce à sa ressemblance mystérieuse\navec une Poké Ball, il attire ses ennemis\net relâche des spores empoisonnées."
          white: "Pour une raison inconnue, il ressemble à\nune Poké Ball. Il repousse ses ennemis\nà l’aide de spores empoisonnées."
        it:
          black: "Simile a una Poké Ball, adesca i nemici e\nsparge spore velenose. Da dove venga\nquesta somiglianza è un vero mistero."
          white: "Per un qualche motivo assomiglia a una\nPoké Ball. Soffia spore velenose contro\nil nemico per sfuggire alla cattura."
        de:
          black: "Fällt ein Trainer auf sein Äußeres\nherein, das komischerweise einem Pokéball\nähnelt, besprüht es ihn mit Giftsporen."
          white: "Es ähnelt einem Pokéball. Versucht man,\nes zu fangen, widersetzt es sich, indem\nes Giftsporen versprüht."
        es:
          black: "Gracias a su misterioso parecido a una\nPoké Ball, atrae a sus presas y lanza\nrápidamente esporas de veneno."
          white: "Por razones desconocidas, se parece a\nuna Poké Ball. Lanza esporas de veneno\npara repeler al enemigo."
        ko:
          black: "몬스터볼을 닮은 무늬로\n유인한 후 독 포자를 뿌려댄다.\n왜 닮았는지는 불가사의다."
          white: "왠지 몬스터볼을 닮은\n포켓몬이다. 잡으려 하는 상대에게\n독 포자를 뿌려 격퇴한다."
amoonguss:
  species_id: 591
  names:
    jp_kana: モロバレル
    jp_kanji: モロバレル
    en: Amoonguss
    fr: Gaulet
