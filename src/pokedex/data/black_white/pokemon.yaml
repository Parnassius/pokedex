          white: "じぶんよりも　からだの　おおきな\nあいてを　なげたくなる　しゅうせい。\nきまって　５ひきで　むれを　つくる。"
        jp_kanji:
          black: "帯を　締めると　パワーアップする。\n野生の　ナゲキは　つる草を　編んで\n自分の　帯を　作る。"
          white: "自分よりも　体の　大きな　相手を\n投げたくなる　習性。\n決まって　５匹で　群れを　作る。"
        en:
          black: "When it tightens its belt, it becomes\nstronger. Wild Throh use vines to weave\ntheir own belts."
          white: "When they encounter foes bigger than\nthemselves, they try to throw them.\nThey always travel in packs of five."
        fr:
          black: "Quand il noue sa ceinture, il devient\nplus puissant. Les Judokrak sauvages\ntressent leur ceinture avec des lianes."
          white: "Ils aiment projeter ceux qui sont plus\ngrands qu’eux. On les trouve toujours\npar groupes de cinq."
        it:
          black: "La cintura da karate lo rende più forte.\nI Throh selvatici si costruiscono le\ncinture usando piante rampicanti."
          white: "Ha il vizio di affrontare avversari più\ngrandi di lui. In genere si sposta in\ngruppi di cinque individui."
        de:
          black: "Zurrt es seinen Gürtel fest, gewinnt es\nan Kraft. Wilde Exemplare flechten sich\nihren Gürtel in Handarbeit aus Ranken."
          white: "Hat von Natur aus den Drang, Gegner\nzu werfen, die größer sind als es selbst.\nEs bildet stets Fünferrudel."
        es:
          black: "Aumenta su potencia si se aprieta\nel cinturón. Un Throh salvaje teje\nsu propio cinturón usando lianas."
          white: "Su carácter le empuja a sentir ansias de\nlanzar por los aires a rivales mayores\nque él. Forman manadas de cinco."
        ko:
          black: "끈을 매면 파워가 올라간다.\n야생 던지미는 덩굴풀을 엮어\n자신의 띠를 만든다."
          white: "자신보다 몸집이 큰 상대를\n던져버리려 하는 습성이 있다.\n반드시 5마리씩 무리를 짓는다."
sawk:
  species_id: 539
  names:
    jp_kana: ダゲキ
    jp_kanji: ダゲキ
    en: Sawk
    fr: Karaclée
    it: Sawk
    de: Karadonis
    es: Sawk
    ko: 타격귀
