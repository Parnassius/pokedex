        defense: 2
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - steel
      egg_groups:
        - mineral
      abilities:
        - plus
        - minus
      hidden_ability: clear_body
      descriptions:
        jp_kana:
          black: "かいてんほうこうを　かえる　ことで\nなかまに　きもちを　つたえている。\nおこるほど　かいてんが　はやくなる。"
          white: "ちびギアを　こうそくかいてんさせて\nはじきとばす　こうげきを　くりだす。\nちびギアが　もどれないと　きけん。"
        jp_kanji:
          black: "回転方向を　変える　ことで\n仲間に　気持ちを　伝えている。\n怒るほど　回転が　速くなる。"
          white: "ちびギアを　高速回転させて\n弾き飛ばす　攻撃を　繰り出す。\nちびギアが　戻れないと　危険。"
        en:
          black: "By changing the direction in which it\nrotates, it communicates its feelings to\nothers. When angry, it rotates faster."
          white: "Spinning minigears are rotated at high\nspeed and repeatedly fired away. It is\ndangerous if the gears don’t return."
        fr:
          black: "Ils communiquent entre eux en changeant\nleur sens de rotation. Plus ils sont en\ncolère, plus ils tournent vite."
          white: "Il attaque en lançant ses mini-rouages\nà grande vitesse. Il est en fâcheuse\nposture s’ils ne reviennent pas."
        it:
          black: "Comunicano il loro stato d’animo\ncambiando senso di rotazione. Più\nsi arrabbiano, più girano velocemente."
          white: "Esegue attacchi ripetuti lanciando i suoi\nminuscoli ingranaggi a gran velocità ma,\nse non ritornano, è in seria difficoltà."
        de:
          black: "Teilt Artgenossen seine Gefühlslage mit,\nindem es die Umlaufrichtung ändert. Wenn\nes wütend ist, dreht es sich schneller."
          white: "Lässt seine Einzelteile rapide rotieren\nund feuert sie auf Gegner ab. Kehren sie\nnicht zurück, wird es brenzlig."
        es:
          black: "Muestra sus sentimientos cambiando\nla dirección de su giro. Cuanto más se\nenfade, más rápido girará."
          white: "Hace girar sus engranajes menores\nfrenéticamente para lanzarlos en sus\nataques. Es peligroso si no regresan."
        ko:
          black: "회전 방향을 바꿔서\n동료에게 감정을 전한다.\n화가 나면 회전이 빨라진다."
          white: "고속 회전시킨 꼬마기어를\n날려서 공격한다. 꼬마기어가\n돌아오지 않으면 위험해진다."
