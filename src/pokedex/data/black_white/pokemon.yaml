      descriptions:
        jp_kana:
          black: "きたえあげた　きんにくの　からだは\nプロレスラーが　たばに　なって\nこうげきしても　びくとも　しない。"
          white: "てっこつを　かついで　からだを\nきたえている。きたえた　きんにくを\nなかまと　みせあい　じまんする。"
        jp_kanji:
          black: "鍛え上げられた　筋肉の　体は\nプロレスラーが　束に　なって\n攻撃しても　びくとも　しない。"
          white: "鉄骨を　担いで　体を　鍛えている。\n鍛えた　筋肉を\n仲間と　見せ合い　自慢する。"
        en:
          black: "This Pokémon is so muscular and strongly\nbuilt that even a group of wrestlers\ncould not make it budge an inch."
          white: "They strengthen their bodies by\ncarrying steel beams. They show off\ntheir big muscles to their friends."
        fr:
          black: "Même une armée de catcheurs se\njetant sur son corps hyper musclé\nne le ferait pas ciller."
          white: "Il entretient sa forme en transportant\nune poutre en acier et fait des concours\nde culturisme avec ses camarades."
        it:
          black: "Il suo corpo muscolosissimo resisterebbe\nsenza battere ciglio all’assalto di un\nlottatore di wrestling."
          white: "Fortifica il corpo portando sulle spalle\ntravi d’acciaio. Fa a gara con i suoi simili\nconfrontando i muscoli possenti."
        de:
          black: "Selbst wenn es mit voller Wucht von einem\nProfi-Ringer angegriffen wird, lässt es\ndies dank seines Muskeltrainings kalt."
          white: "Zu Trainingszwecken trägt es immer einen\nStahlträger bei sich. Unter Kollegen gibt\nes nur zu gern mit seinen Muskeln an."
        es:
          black: "Sus músculos están tan desarrollados\nque no se inmuta aunque lo ataquen \nvarios luchadores."
          white: "Ejercita sus músculos cargando vigas\nde acero. Le encanta lucir sus músculos\nentre sus amigos."
        ko:
          black: "단련을 거듭한 근육 덩어리 몸은\n프로레슬러가 단체로 공격해도\n꿈쩍도 하지 않는다."
          white: "철골을 짊어지고 몸을\n단련하고 있다. 단련한 근육을\n동료와 서로 보여주며 자랑한다."
conkeldurr:
  species_id: 534
  names:
    jp_kana: ローブシン
    jp_kanji: ローブシン
    en: Conkeldurr
    fr: Bétochef
    it: Conkeldurr
    de: Meistagrif
    es: Conkeldurr
    ko: 노보청
  forms:
    conkeldurr:
      form_id: 0
      base_stats:
        hp: 105
        attack: 140
        defense: 95
        special_attack: 55
        special_defense: 65
        speed: 45
      evs_yield:
        hp: 0
        attack: 3
        defense: 0
        special_attack: 0
        special_defense: 0
