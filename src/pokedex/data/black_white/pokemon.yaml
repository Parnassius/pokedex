      descriptions:
        jp_kana:
          black: "きゃくりょくで　きのみを　くだく。\nどんなに　つよい　あいてでも\nゆうかんに　たちむかう　しゅうせい。"
          white: "つよい　あいてにも　みさかいなく\nたたかいを　いどむ。たたかいを\nくりかえす　ことで　つよくなるのだ。"
        jp_kanji:
          black: "脚力で　きのみを　砕く。\nどんなに　強い　相手でも\n勇敢に　立ち向かう　習性。"
          white: "強い　相手にも　見境なく　戦いを\n挑む。戦いを　繰り返す　ことで\n強くなるのだ。"
        en:
          black: "They crush berries with their talons.\nThey bravely stand up to any opponent,\nno matter how strong it is."
          white: "They will challenge anything, even strong\nopponents, without fear. Their frequent\nfights help them become stronger."
        fr:
          black: "Il casse les Baies avec ses serres.\nIl combat courageusement, quelle que\nsoit la force de l’adversaire."
          white: "Il défie sans discernement même les\nennemis puissants. Il devient plus fort\nen multipliant les combats."
        it:
          black: "Si serve degli arti come schiaccianoci\nper rompere le bacche. Affronta con\nvalore anche i nemici più forti."
          white: "Sfida indiscriminatamente avversari\nanche più forti di lui. Si irrobustisce a\nforza di lottare."
        de:
          black: "Kann mit seinen Füßen Nüsse zermalmen.\nEs stellt sich jedem noch so starken\nGegner tapfer zum Kampf."
          white: "Es zettelt willkürlich Kämpfe an, egal wie\nstark der Gegner auch ist. Es gewinnt an\nStärke, indem es seine Fehler analysiert."
        es:
          black: "Quiebra bayas con sus extremidades.\nSe enfrenta con valentía a todo enemigo\npor fuerte que este sea."
          white: "Desafía indiscriminadamente a rivales\npoderosos. Librar numerosas batallas\nlo hace fuerte."
        ko:
          black: "다리 힘으로 나무열매를 으깬다.\n아무리 강한 상대라도\n용감히 맞서는 습성이 있다."
          white: "강한 상대에게도 무작정\n싸움을 건다. 싸움을 계속\n반복하며 강해진다."
braviary:
  species_id: 628
  names:
    jp_kana: ウォーグル
    jp_kanji: ウォーグル
    en: Braviary
