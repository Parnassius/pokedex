      descriptions:
        jp_kana:
          black: "サイコパワーを　ほうしゅつして\nおそってきた　てきを　げきたい。\nテレパシーで　なかまと　かいわする。"
          white: "とくしゅな　えきたいで\nからだが　つつまれているため\nどんな　かんきょうでも　いきられる。"
        jp_kanji:
          black: "サイコパワーを　放出して\n襲ってきた　敵を　撃退。\nテレパシーで　仲間と　会話する。"
          white: "特殊な　液体で\n体が　包まれているため\nどんな　環境でも　生きられる。"
        en:
          black: "They drive away attackers by unleashing\npsychic power. They can use telepathy\nto talk with others."
          white: "Because their bodies are enveloped\nin a special liquid, they can survive\nin any environment."
        fr:
          black: "Ils repoussent leurs assaillants\navec leurs pouvoirs psychiques et\ncommuniquent entre eux par télépathie."
          white: "Son corps est enrobé dans un fluide\nspécial, ce qui lui permet de vivre\ndans n’importe quel environnement."
        it:
          black: "Utilizza i suoi poteri psichici per\nrespingere gli aggressori. Comunica\ncon i compagni usando la telepatia."
          white: "Il suo corpo è avvolto in un liquido\nspeciale, che gli permette di vivere\nin qualsiasi ambiente."
        de:
          black: "Es wehrt Angreifer ab, indem es Psycho-\nKräfte auf sie ansetzt. Es kommuniziert\ntelepathisch mit Artgenossen."
          white: "Da sein Körper von einer speziellen\nFlüssigkeit umgeben ist, kann es in\njedem Umfeld überleben."
        es:
          black: "Desata su poder psíquico para ahuyentar\nal enemigo. Se comunica con sus\ncompañeros por telepatía."
          white: "Puede vivir en cualquier ambiente\ngracias al líquido especial que\nrecubre su cuerpo."
        ko:
          black: "사이코 파워를 방출하여\n달려드는 상대를 물리친다.\n텔레파시로 동료와 대화한다."
          white: "특수한 액체에\n몸이 둘러싸여 있어\n어떠한 환경에서도 살 수 있다."
duosion:
  species_id: 578
  names:
    jp_kana: ダブラン
    jp_kanji: ダブラン
    en: Duosion
    fr: Méios
    it: Duosion
    de: Mitodos
    es: Duosion
    ko: 듀란
  forms:
    duosion:
      form_id: 0
      base_stats:
        hp: 65
        attack: 40
        defense: 50
        special_attack: 125
        special_defense: 60
        speed: 30
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 2
        special_defense: 0
        speed: 0
      types:
        - psychic
      egg_groups:
        - amorphous
      abilities:
        - overcoat
        - magic_guard
      hidden_ability: regenerator
      descriptions:
        jp_kana:
          black: "２つに　ぶんれつした　のうみそを\nもっているため　いきなり　ちがう\nこうどうを　とることが　あるのだ。"
          white: "２つに　ぶんれつした　のうみそが\nおなじことを　かんがえたとき\nさいだいパワーが　はっきされる。"
        jp_kanji:
          black: "２つに　分裂した　脳みそを\n持っているため　いきなり　違う\n行動を　とることが　あるのだ。"
          white: "２つに　分裂した　脳みそが\n同じことを　考えたとき\n最大パワーが　発揮される。"
        en:
          black: "Since they have two divided brains,\nat times they suddenly try to take two\ndifferent actions at once."
          white: "When their brains, now divided in two,\nare thinking the same thoughts, these\nPokémon exhibit their maximum power."
        fr:
          black: "Il possède deux cerveaux séparés\nqui le font parfois agir de façon\ntotalement incohérente."
          white: "Il dégage sa puissance maximale\nquand ses cerveaux réfléchissent\nà la même chose."
        it:
          black: "Poiché ha due cervelli separati e\nindipendenti, può capitare che si\ncomporti in modo del tutto incoerente."
          white: "Libera la sua massima potenza quando\nle due parti in cui è diviso il suo cervello\npensano la stessa cosa."
        de:
          black: "Wegen seines gespaltenen Denkapparates\nkann es vorkommen, dass es sich abrupt\neiner anderen Tätigkeit zuwendet."
          white: "Kommen beide Hälften seines gespaltenen\nDenkapparates auf dieselbe Idee, ent-\nfesselt sich seine volle Kraft."
        es:
          black: "Dado que su cerebro está dividido en\ndos, a veces tiene conflictos a la hora\nde decidir qué hacer."
          white: "Cuando las dos partes de su cerebro\npiensan lo mismo, saca todo su poder\na relucir."
        ko:
          black: "둘로 분열된 뇌를\n가지고 있어서 갑자기 다른\n행동을 취할 때가 있다."
          white: "둘로 분열된 뇌가\n같은 일을 생각했을 때\n최대 파워가 발휘된다."
reuniclus:
