      descriptions:
        jp_kana:
          black: "コマタナの　むれを　ひきいている。\nボスの　ざを　うばいあい　たたかう。\nやぶれると　むれを　おいだされる。"
          white: "おおぜいの　コマタナを　したがえて\nえものを　むれで　おいつめる。\nとどめは　キリキザンが　さす。"
        jp_kanji:
          black: "コマタナの　群れを　率いている。\nボスの　座を　奪い合い　戦う。\n敗れると　群れを　追い出される。"
          white: "大勢の　コマタナを　従えて\n獲物を　群れで　追いつめる。\nとどめは　キリキザンが　刺す。"
        en:
          black: "It leads a group of Pawniard.\nIt battles to become the boss, but will\nbe driven from the group if it loses."
          white: "Bisharp pursues prey in the company of a\nlarge group of Pawniard. Then Bisharp\nfinishes off the prey."
        fr:
          black: "Ils dirigent les groupes de Scalpion.\nIls se battent pour la suprématie sur le\ngroupe, et les perdants en sont exclus."
          white: "Il chasse avec un groupe de Scalpion\nsous ses ordres, mais c’est lui qui\ndonne le coup de grâce."
        it:
          black: "Controlla gruppi di Pawniard. Lotta\nspietatamente per il comando, ma se\nperde deve abbandonare il gruppo."
          white: "Accompagnato da molti Pawniard, blocca\nle prede grazie alla forza del gruppo.\nÈ Bisharp a dare il colpo di grazia."
        de:
          black: "Anführer einer Schar von Gladiantri.\nVerliert es den Kampf um den Titel\ndes Anführers, wird es ausgestoßen."
          white: "Es rückt seinen Opfern mit einer Schar\nvon Gladiantri im Gefolge auf den Pelz.\nDen letzten Hieb übernimmt es selbst."
        es:
          black: "Líder del grupo de Pawniard.\nLucha continuamente para mantener\nsu posición. Es expulsado si pierde."
          white: "Su séquito son los Pawniard. Acorralan\na su presa con todo el grupo y Bisharp\npropina el golpe de gracia."
        ko:
          black: "자망칼 무리를 거느린다.\n보스의 자리를 차지하려고 싸운다.\n지면 무리에서 쫓겨난다."
          white: "많은 자망칼을 거느리며\n무리져서 먹이를 바싹 몰아넣는다.\n마무리는 절각참이 한다."
bouffalant:
  species_id: 626
  names:
    jp_kana: バッフロン
    jp_kanji: バッフロン
    en: Bouffalant
    fr: Frison
    it: Bouffalant
    de: Bisofank
    es: Bouffalant
    ko: 버프론
