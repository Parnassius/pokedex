        jp_kana:
          black: "すうひきで　むれを　つくる。\nがんきゅうを　カバーする　まくが\nすなあらしから　めを　まもる。"
          white: "めを　おおう　とくしゅな　まくが\nぶったいの　ねつを　かんちするため\nくらやみでも　まわりが　みえるのだ。"
        jp_kanji:
          black: "数匹で　群れを　作る。\n眼球を　カバーする　膜が\n砂あらしから　目を　守る。"
          white: "眼球を　おおう　特殊な　膜が\n物体の　熱を　感知するため\nくらやみでも　まわりが　見えるのだ。"
        en:
          black: "They live in groups of a few individuals.\nProtective membranes shield their eyes\nfrom sandstorms."
          white: "The special membrane covering its eyes\ncan sense the heat of objects, so it can\nsee its surroundings even in darkness."
        fr:
          black: "Ils vivent en petits groupes.\nLa membrane qui couvre leurs yeux\nles protège du soleil."
          white: "La membrane spéciale qui recouvre ses\nyeux détecte la chaleur et lui permet\nde voir dans le noir."
        it:
          black: "Forma gruppi di pochi esemplari.\nLa pellicola che ricopre i suoi occhi\nlo protegge dalle tempeste di sabbia."
          white: "La membrana speciale che ha sugli occhi è\nin grado di percepire il calore dei corpi,\nconsentendogli così di vedere al buio."
        de:
          black: "Bildet mit mehreren Artgenossen\nein Rudel. Eine Membran schützt\nseine Augen vor Sandstürmen."
          white: "Die spezielle Membran um seine Augen\nfungiert als Wärmesensor, durch den es\nsich auch im Dunkeln zurechtfindet."
        es:
          black: "Viven en manadas. La membrana que cubre\nsus ojos los protege de la arena."
          white: "Una membrana especial cubre sus ojos\ny le permite detectar el calor de los\ncuerpos, por eso ve en la oscuridad."
        ko:
          black: "여러 마리가 무리를 짓는다.\n안구를 감싼 막이\n모래 폭풍으로부터 눈을 지켜준다."
          white: "눈을 감싼 특수한 막이\n물체의 열을 감지해서\n어두워도 주변을 볼 수 있다."
krookodile:
