      descriptions:
        jp_kana:
          black: "こうそくで　とびまわり　するどい\nやりで　あいてを　つく。ふりな\nあいてにも　ゆうかんに　たちむかう。"
          white: "チョボマキの　カラを　みにつけて\nしんかした　ポケモン。こうてつの\nよろいが　ぜんしんを　ガードする。"
        jp_kanji:
          black: "高速で　飛び回り　鋭い　やりで\n相手を　突く。不利な　相手にも\n勇敢に　立ち向かう。"
          white: "チョボマキの　殻を　身につけて\n進化した　ポケモン。鋼鉄の　よろいが\n全身を　ガードする。"
        en:
          black: "They fly around at high speed, striking\nwith their pointed spears. Even when in\ntrouble, they face opponents bravely."
          white: "These Pokémon evolve by wearing the\nshell covering of a Shelmet. The steel\narmor protects their whole body."
        fr:
          black: "Il vole à toute vitesse et frappe tout\nennemi de ses lances pointues. Il combat\nbravement contre les plus forts que lui."
          white: "Un Pokémon qui a évolué en portant la\ncarapace d’un Escargaume. Une armure\nde fer protège tout son corps."
        it:
          black: "Infilza i nemici con le lance appuntite,\nsfrecciando a gran velocità. Affronta\ncon valore anche avversari temibili."
          white: "Pokémon che si è evoluto appropriandosi\ndella conchiglia di Shelmet. Un’armatura\nd’acciaio protegge tutto il suo corpo."
        de:
          black: "Jagt durch die Luft und spießt Gegner\nmit seinen Lanzen auf. Auch überlegenen\nGegnern stellt es sich ohne Furcht."
          white: "Es ist bei der Entwicklung in die Muschel\neines Schnuthelm geschlüpft. Die Eisen-\nrüstung schützt seinen ganzen Körper."
        es:
          black: "Ataca a los enemigos con sus lanzas a\nuna velocidad frenética. Se enfrenta\ncon valentía aun con rivales poderosos."
          white: "Pokémon que evolucionó poniéndose\nel caparazón de Shelmet. Su armazón\nde acero le protege todo el cuerpo."
        ko:
          black: "고속으로 날아다니며 날카로운\n창으로 상대를 찌른다. 불리한\n상대일지라도 용감히 맞선다."
          white: "쪼마리의 껍질을 입고\n진화한 포켓몬이다. 강철의\n갑옷이 전신을 보호한다."
foongus:
  species_id: 590
