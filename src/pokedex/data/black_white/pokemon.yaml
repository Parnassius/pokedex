      descriptions:
        jp_kana:
          black: "かみついて　もうどくを　あたえる。\nてんてきの　おおきな　とりポケモンも\nからだが　しびれて　うごけなくなる。"
          white: "あたまと　しっぽの　しょっかくで\nまわりの　ようすを　さぐる。\nひじょうに　きょうぼうな　せいかく。"
        jp_kanji:
          black: "かみついて　猛毒を　与える。\n天敵の　大きな　とりポケモンも\n体が　しびれて　動けなくなる。"
          white: "頭と　しっぽの　触角で\nまわりの　様子を　探る。\n非常に　凶暴な　性格。"
        en:
          black: "Its bite injects a potent poison, enough\nto paralyze large bird Pokémon that try\nto prey on it."
          white: "It discovers what is going on around it\nby using the feelers on its head and tail.\nIt is brutally aggressive."
        fr:
          black: "Sa morsure est très venimeuse.\nElle paralyse même les grands\nPokémon Oiseaux, ses prédateurs."
          white: "Il sonde les alentours avec les\nantennes sur sa tête et sa queue.\nIl est extrêmement brutal."
        it:
          black: "Mordendo, inietta un veleno potente.\nAnche i grandi Pokémon uccello, suoi\npredatori, ne rimangono paralizzati."
          white: "Sonda l’ambiente circostante con\nle antenne del capo e della coda.\nHa un carattere estremamente collerico."
        de:
          black: "Es beißt Angreifer und injiziert ihnen\nGift, das selbst große Vogel-Pokémon,\nseine natürlichen Feinde, lähmt."
          white: "Mit seinen Ruten und den Fühlern an\nseinem Kopf tastet es die Umgebung\nab. Ein überaus aggressiver Geselle."
        es:
          black: "Inocula un poderoso veneno al morder.\nHasta sus enemigos acérrimos, los\nPokémon pájaro, se quedan inmóviles."
          white: "Percibe su entorno con su sentido del\ntacto, residente en su cabeza y cola.\nSu carácter es violento por naturaleza."
        ko:
          black: "물어서 맹독을 퍼뜨린다.\n천적인 커다란 새포켓몬도\n몸이 마비돼서 움직일 수 없다."
          white: "머리와 꼬리의 더듬이로\n주변 상황을 살핀다.\n성격이 매우 난폭하다."
whirlipede:
  species_id: 544
  names:
    jp_kana: ホイーガ
    jp_kanji: ホイーガ
    en: Whirlipede
    fr: Scobolide
    it: Whirlipede
    de: Rollum
    es: Whirlipede
    ko: 휠구
  forms:
    whirlipede:
      form_id: 0
      base_stats:
        hp: 40
        attack: 55
        defense: 99
        special_attack: 40
        special_defense: 79
        speed: 47
      evs_yield:
        hp: 0
        attack: 0
        defense: 2
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - bug
        - poison
      egg_groups:
        - bug
      abilities:
        - poison_point
        - swarm
      hidden_ability: quick_feet
      held_items:
        common: pecha_berry
