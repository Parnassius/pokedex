      descriptions:
        jp_kana:
          black: "なわばりの　エサを　たべつくすと\nほかの　とちへ　いどうする。\n２つの　あたまは　なかが　わるい。"
          white: "２つの　あたまは　なかが　わるく\nあらそうように　エサを　たべるため\nいつも　エサを　たべすぎてしまう。"
        jp_kanji:
          black: "縄張りの　エサを　食べつくすと\nほかの　土地へ　移動する。\n２つの　頭は　仲が　悪い。"
          white: "２つの　頭は　仲が　悪く\n争うように　エサを　食べるため\nいつも　エサを　食べ過ぎてしまう。"
        en:
          black: "After it has eaten up all the food in\nits territory, it moves to another\narea. Its two heads do not get along."
          white: "Since their two heads do not get along\nand compete with each other for food,\nthey always eat too much."
        fr:
          black: "Quand il a mangé tout ce qui traînait sur\nson territoire, il migre vers d’autres\nhorizons. Ses 2 têtes s’entendent mal."
          white: "Ses deux têtes s’entendent mal. Même en\nmangeant, elles se cherchent des noises\net dévorent à qui mieux mieux."
        it:
          black: "Quando ha consumato tutto il cibo di\nun territorio, si sposta altrove.\nLe sue due teste non vanno d’accordo."
          white: "Poiché le due teste non vanno d’accordo\ne fanno quasi a gara per mangiare,\nva sempre a finire che mangia troppo."
        de:
          black: "Wenn es sein Revier leergejagt hat,\nsucht es sich ein neues. Seine beiden\nKöpfe liegen ständig im Streit."
          white: "Seine zwei Köpfe liegen stets im Streit.\nSo wird jede Mahlzeit ein Wettstreit für\nsie, bei dem sich beide überfressen."
        es:
          black: "Cambia de morada siempre que termina con\nla comida de una zona. Sus dos cabezas\nse llevan fatal."
          white: "Sus dos cabezas se llevan mal y se\ndisputan la comida con brutalidad. Por\neso acaban comiendo más de la cuenta."
        ko:
          black: "영역 안의 먹이를 다 먹어치우면\n다른 지역으로 이동한다.\n두 머리는 사이가 나쁘다."
          white: "2개의 머리는 사이가 나빠서\n싸우듯이 먹이를 먹기 때문에\n항상 과식하게 된다."
hydreigon:
  species_id: 635
  names:
    jp_kana: サザンドラ
    jp_kanji: サザンドラ
    en: Hydreigon
    fr: Trioxhydre
    it: Hydreigon
    de: Trikephalo
    es: Hydreigon
    ko: 삼삼드래
