      types:
        - dark
        - flying
      egg_groups:
        - flying
      abilities:
        - big_pecks
        - overcoat
      hidden_ability: weak_armor
      descriptions:
        jp_kana:
          black: "つばさが　ちいさいため　とべない。\nしんかの　ときが　ちかづくと\nじぶんから　ガイコツを　ぬぎすてる。"
          white: "てごろな　ガイコツを　みつけて\nおしりを　ぼうぎょする　しゅうせい。\nよわい　ポケモンを　おいかけまわす。"
        jp_kanji:
          black: "翼が　小さいため　飛べない。\n進化の　ときが　近づくと\n自分から　ガイコツを　脱ぎ捨てる。"
          white: "手ごろな　ガイコツを　見つけて\nおしりを　防御する　習性。\n弱い　ポケモンを　追いかけ回す。"
        en:
          black: "Its wings are too tiny to allow it to fly.\nAs the time approaches for it to evolve,\nit discards the bones it was wearing."
          white: "They tend to guard their posteriors\nwith suitable bones they have found.\nThey pursue weak Pokémon."
        fr:
          black: "Ses ailes sont trop petites pour lui\npermettre de voler. Quand l’évolution\napproche, il sort lui-même de sa coquille."
          white: "Il trouve des os convenables pour\nprotéger ses arrières, puis harcèle\nles Pokémon plus faibles que lui."
        it:
          black: "Le piccole ali non gli consentono di\nvolare. Quando si avvicina il momento\ndi evolversi, si libera del teschio."
          white: "Ha l’abitudine di ripararsi il dorso\ntrovando delle ossa appropriate.\nDà la caccia ai Pokémon deboli."
        de:
          black: "Seine Flügel sind noch zu klein zum\nFliegen. Kurz bevor es sich entwickelt,\nwirft es seine Schädelwindel ab."
          white: "Es schlüpft in einen passenden Schädel,\num sein Hinterteil zu schützen, und\nscheucht schwache Pokémon umher."
        es:
          black: "No puede volar porque sus alas son muy\npequeñas. Cuando va a evolucionar, él\nmismo se deshace de su calavera."
          white: "Usa una calavera para proteger sus\nposaderas. Es proclive a perseguir\nPokémon débiles."
        ko:
          black: "날개가 작아서 날지 못한다.\n진화가 가까워지면\n자기 스스로 해골을 벗어버린다."
          white: "적당한 해골을 찾아내서\n엉덩이를 방어하는 습성이 있다.\n약한 포켓몬을 쫓아 돌아다닌다."
mandibuzz:
  species_id: 630
  names:
    jp_kana: バルジーナ
    jp_kanji: バルジーナ
    en: Mandibuzz
    fr: Vaututrice
    it: Mandibuzz
    de: Grypheldis
    es: Mandibuzz
    ko: 버랜지나
