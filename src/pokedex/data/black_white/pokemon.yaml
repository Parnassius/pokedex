      descriptions:
        jp_kana:
          black: "たいないで　もえる　エネルギーに\nよって　かつどうしているが　どんな\nエネルギーなのかは　ふめいである。"
          white: "まぼろしの　こだいぶんめいの\nかがくに　よって　うみだされた\nポケモンと　かんがえられている。"
        jp_kanji:
          black: "体内で　燃える　エネルギーに　よって\n活動しているが　どんな\nエネルギーなのかは　不明である。"
          white: "幻の　古代文明の　科学に　よって\n生み出された　ポケモンと\n考えられている。"
        en:
          black: "The energy that burns inside it\nenables it to move, but no one has yet\nbeen able to identify this energy."
          white: "These Pokémon are thought to have been\ncreated by the science of an ancient\nand mysterious civilization."
        fr:
          black: "Il se meut grâce à l’énergie stockée\ndans son corps. Personne ne sait d’où\nvient cette énergie mystérieuse."
          white: "On pense que ce Pokémon est\nle produit de la technologie\nd’une civilisation ancienne."
        it:
          black: "Si muove grazie all’energia che gli brucia\ndentro, ma nessuno sa di che tipo di\nenergia si tratti."
          white: "Pare sia stato creato artificialmente\nda un’antica civiltà le cui conoscenze\nscientifiche sono ormai andate perse."
        de:
          black: "Es wird durch eine Energie angetrieben,\ndie seinem Körper entspringt. Keiner weiß\njedoch, woher diese Energie stammt."
          white: "Man nimmt an, dass es ein Produkt der\nverblüffenden wissenschaftlichen Künste\neiner uralten Zivilisation sei."
        es:
          black: "Se mueve gracias a la energía que\nquema dentro de su cuerpo, pero\nel origen de esta energía es incierto."
          white: "Los rumores apuntan a que fue un\nPokémon creado por la ciencia de una\nantigua y misteriosa civilización."
        ko:
          black: "체내에서 불타는 에너지로\n인해 활동하고 있지만 어떤\n에너지인지는 불명이다."
          white: "환상 속 고대 문명의\n과학에 의해 탄생한\n포켓몬이라 여겨지고 있다."
golurk:
  species_id: 623
  names:
    jp_kana: ゴルーグ
    jp_kanji: ゴルーグ
    en: Golurk
    fr: Golemastoc
    it: Golurk
    de: Golgantes
    es: Golurk
    ko: 골루그
