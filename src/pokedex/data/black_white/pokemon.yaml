      descriptions:
        jp_kana:
          black: "ボルトロスが　とおりすぎた　とちには\nカミナリの　おちた　むすうの　あとが\nやけこげとなって　のこっている。"
          white: "しっぽの　トゲから　でんげきを\nうちだす。イッシュちほうの　そらを\nとびまわり　カミナリを　おとす。"
        jp_kanji:
          black: "ボルトロスが　通り過ぎた　土地には\n雷の　落ちた　無数の　跡が\n焼け焦げとなって　残っている。"
          white: "しっぽの　トゲから　電撃を\n撃ち出す。イッシュ地方の　空を\n飛び回り　雷を　落とす。"
        en:
          black: "Countless charred remains mar the\nlandscape of places through which\nThundurus has passed."
          white: "The spikes on its tail discharge immense\nbolts of lightning. It flies around the\nUnova region firing off lightning bolts."
        fr:
          black: "Les terres qu’il a survolées sont\nrecouvertes d’innombrables traces\ndes éclairs qu’il y a fait tomber."
          white: "Sa queue lance des décharges\nélectriques. Il vole dans le ciel\nd’Unys et fait tomber des éclairs."
        it:
          black: "Dove passa Thundurus, rimane una scia\nlunghissima di bruciature nere provocate\ndai fulmini che scaglia."
          white: "Lancia scariche elettriche dagli aculei\ndella coda. Vola per i cieli di Unima\nscagliando fulmini."
        de:
          black: "Überall, wo es hingeht, hinterlässt es\nzahllose Brandflecken am Boden, als\nhätte dort der Blitz eingeschlagen."
          white: "Es greift mit elektrischer Ladung aus\nden Dornen seiner Rute an und bombar-\ndiert Einall aus der Luft mit Blitzen."
        es:
          black: "A su paso, Thundurus va dejando\nprofundas marcas de rayos que\nhan achicharrado el terreno."
          white: "Lanza descargas eléctricas por las\npúas de su cola. Sobrevuela Teselia\ndejando caer rayos."
        ko:
          black: "볼트로스가 지나간 땅에는\n번개가 떨어져 생긴 불탄 흔적이\n무수히 많이 남아 있다."
          white: "꼬리의 가시에서 전격을\n날린다. 하나지방의 하늘을\n날아다니며 번개를 내리친다."
reshiram:
  species_id: 643
  names:
    jp_kana: レシラム
    jp_kanji: レシラム
    en: Reshiram
    fr: Reshiram
    it: Reshiram
    de: Reshiram
    es: Reshiram
    ko: 레시라무
