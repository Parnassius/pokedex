      descriptions:
        jp_kana:
          black: "たいないで　ほのおが　もえていると\nおちつかなく　はしりまわっている。\nほのおが　ちいさくなると　ねむる。"
          white: "ダルマッカの　フンは　あついので\nむかしの　ひとは　ふところに　いれて\nからだを　あたためていたのだ。"
        jp_kanji:
          black: "体内で　炎が　燃えていると\n落ち着かなく　走り回っている。\n炎が　小さくなると　眠る。"
          white: "ダルマッカの　フンは　熱いので\n昔の　人は　懐に　入れて\n体を　温めていたのだ。"
        en:
          black: "When its internal fire is burning, it\ncannot calm down and it runs around.\nWhen the fire diminishes, it falls asleep."
          white: "Darumaka’s droppings are hot, so\npeople used to put them in their\nclothes to keep themselves warm."
        fr:
          black: "Quand le feu brûle dans son corps,\nil est tout excité et court partout.\nQuand le feu s’apaise, il s’endort."
          white: "Les gens d’autrefois avaient l’habitude\nde mettre ses crottes brûlantes sous\nleurs vêtements pour se réchauffer."
        it:
          black: "Quando la sua fiamma interna brucia,\ncorre qua e là senza trovare pace.\nMa se il fuoco si smorza, si addormenta."
          white: "Poiché i suoi escrementi sono molto caldi,\nnell’antichità gli uomini solevano\nconservarli in buste per riscaldarsi."
        de:
          black: "Solang das Feuer in ihm brennt, rennt\nes rastlos durch die Gegend. Geht ihm\ndas Brennmaterial aus, wird es schläfrig."
          white: "Früher nutzte man die heißen\nAusscheidungen von Flampion,\num sich den Körper zu wärmen."
        es:
          black: "No para quieto si arden las llamas\nde su estómago, pero se duerme\nplácidamente si se apaciguan."
          white: "Como sus excrementos están muy\ncalientes, la gente de antaño se los\nmetía en los bolsillos para calentarse."
        ko:
          black: "체내의 불꽃이 타고 있을 때는\n흥분해서 주변을 뛰어다닌다.\n불꽃이 작아지면 잠든다."
          white: "달막화의 배설물은 뜨거워서\n옛날 사람은 품에 넣고\n몸을 따뜻하게 하는 데 사용했다."
