      descriptions:
        jp_kana:
          black: "すばやい　うごきで　てきを　おいつめ\nあたまの　ツノで　こうげきする。\nとどめを　さすまで　ようしゃしない。"
          white: "くびの　ツメを　あいての　からだに\nくいこませて　どくを　あたえる。\nとても　こうげきてきな　せいかく。"
        jp_kanji:
          black: "素早い　動きで　敵を　追い詰め\n頭の　ツノで　攻撃する。\nとどめを　刺すまで　容赦しない。"
          white: "首の　ツメを　相手の　体に\n食い込ませて　毒を　与える。\nとても　攻撃的な　性格。"
        en:
          black: "With quick movements, it chases down\nits foes, attacking relentlessly with\nits horns until it prevails."
          white: "Highly aggressive, it uses the claws\nnear its neck to dig into its opponents\nand poison them."
        fr:
          black: "Il accule l’ennemi par ses mouvements\nrapides et l’attaque avec ses cornes.\nIl ne s’arrête qu’au coup de grâce."
          white: "Il inocule du poison à ses ennemis\npar les griffes de son cou.\nIl est extrêmement agressif."
        it:
          black: "Incalza la preda con movimenti rapidi e la\nattacca ripetutamente con le corna.\nNon si ferma fino al colpo di grazia."
          white: "Avvelena il nemico conficcandogli nel\ncorpo gli aculei che ha sul collo. Ha\nun carattere molto aggressivo."
        de:
          black: "Holt Gegner flinken Fußes ein und greift\nsie mit den Hörnern an seinem Kopf an.\nGnade ist ihm ein Fremdwort."
          white: "Rammt den Gegner mit den Zacken an\nseinem Hals und verpasst ihm eine Ladung\nGift. Von Natur aus sehr angriffslustig."
        es:
          black: "Arrincona a sus rivales con rápidos\nmovimientos y los ensarta con sus\ncuernos. No se detiene hasta vencer."
          white: "Las garras del cuello contienen\nun potente veneno capaz de acabar\ncon sus rivales. Es muy agresivo."
        ko:
          black: "빠른 움직임으로 적을 바싹 몰아넣어\n머리의 뿔로 공격한다.\n마무리 지을 때까지 봐주지 않는다."
          white: "목의 가시를 상대의 몸에\n박아 넣어 독을 퍼뜨린다.\n매우 공격적인 성격이다."
cottonee:
  species_id: 546
  names:
    jp_kana: モンメン
    jp_kanji: モンメン
    en: Cottonee
    fr: Doudouvet
    it: Cottonee
    de: Waumboll
    es: Cottonee
    ko: 소미안
  forms:
    cottonee:
      form_id: 0
      base_stats:
        hp: 40
        attack: 27
        defense: 60
        special_attack: 37
        special_defense: 50
        speed: 66
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - grass
      egg_groups:
        - grass
        - fairy
      abilities:
        - prankster
        - infiltrator
      hidden_ability: chlorophyll
      descriptions:
        jp_kana:
          black: "おそわれると　からだから　わたを\nとばす。てきが　わたを　モンメンと\nまちがえている　すきに　にげるのだ。"
          white: "かぜに　ふかれて　きままに　いどう。\nあめの　ひは　からだが　おもいので\nたいぼくの　ねもとで　あまやどり。"
        jp_kanji:
          black: "襲われると　体から　綿を　飛ばす。\n敵が　綿を　モンメンと\n間違えている　すきに　逃げるのだ。"
          white: "風に　吹かれて　気ままに　移動。\n雨の　日は　体が　重いので\n大木の　根元で　雨宿り。"
        en:
          black: "When attacked, it escapes by shooting\ncotton from its body. The cotton serves\nas a decoy to distract the attacker."
          white: "They go wherever the wind takes them.\nOn rainy days, their bodies are heavier,\nso they take shelter beneath big trees."
        fr:
          black: "Si on l’attaque, il projette un nuage de\ncoton. L’ennemi le confond avec lui, ce\nqui permet à Doudouvet de s’enfuir."
          white: "Il dérive librement au gré du vent.\nLes jours de pluie, il s’alourdit et\nse réfugie au pied des arbres."
        it:
          black: "Se viene attaccato crea una nuvola\ndi cotone per confondere il nemico,\npoi ne approfitta per fuggire."
          white: "Si sposta sospinto dal vento. Nei giorni\ndi pioggia si appesantisce e trova riparo\nai piedi di grossi alberi."
        de:
          black: "Wird es angegriffen, verstreut es zur\nTäuschung Watte. Es flieht, während der\nGegner nach dem wahren Waumboll sucht."
          white: "Lässt sich unbekümmert vom Wind treiben.\nRegen beschwert seinen Körper, sodass\nes unter großen Bäumen Schutz sucht."
        es:
          black: "Despide motas de algodón cuando lo\natacan para confundir a los enemigos\ny poner pies en polvorosa."
          white: "Se deja llevar por las ráfagas de viento.\nCuando llueve, su cuerpo pesa mucho, así\nque se guarece bajo árboles grandes."
        ko:
          black: "공격당하면 몸에서 솜을\n날린다. 상대가 솜을 소미안으로\n착각하고 있는 동안 도망친다."
          white: "바람에 날려 자유롭게 이동한다.\n비가 오는 날에는 몸이 무거워지므로\n큰 나무의 밑동에서 비를 피한다."
whimsicott:
  species_id: 547
  names:
    jp_kana: エルフーン
    jp_kanji: エルフーン
    en: Whimsicott
    fr: Farfaduvet
    it: Whimsicott
    de: Elfun
    es: Whimsicott
    ko: 엘풍
