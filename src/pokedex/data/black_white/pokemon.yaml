      descriptions:
        jp_kana:
          black: "ひふが　かたいので　すもうとりに\nふまれても　へいき。でんきを\nながすとき　わらいがおに　なる。"
          white: "うみべの　どろに　うまって　えものを\nまちかまえる。えものが　さわったとき\nでんきを　だして　しびれさせるのだ。"
        jp_kanji:
          black: "皮膚が　硬いので\n相撲取りに　踏まれても　平気。\n電気を　流すとき　笑い顔に　なる。"
          white: "海辺の　泥に　埋まって　獲物を\n待ち構える。獲物が　触ったとき\n電気を　出して　しびれさせるのだ。"
        en:
          black: "Its skin is very hard, so it is unhurt\neven if stepped on by sumo wrestlers.\nIt smiles when transmitting electricity."
          white: "It conceals itself in the mud of the\nseashore. Then it waits. When prey touch\nit, it delivers a jolt of electricity."
        fr:
          black: "Sa peau est si dure qu’il peut se faire\npiétiner par un sumo sans rien sentir.\nIl sourit en émettant de l’électricité."
          white: "Tapi dans la boue ou les sédiments,\nil attend sa proie patiemment et la\nparalyse avec une décharge électrique."
        it:
          black: "Ha la pelle così dura che un lottatore di\nsumo potrebbe calpestarlo senza fargli\nmale. L’elettricità gli fa il solletico."
          white: "Attende al varco le prede, sepolto nel\nfango in riva al mare. Se lo sfiorano,\nle paralizza con una scarica elettrica."
        de:
          black: "Dank seiner dicken Haut hält es selbst\ndas Gewicht eines Sumoringers aus. Wenn\nes Stromschläge verteilt, grinst es."
          white: "Es vergräbt sich im Morast am Meeres-\nboden. Wird es von seiner Beute\ngestreift, lähmt es sie mit Strom."
        es:
          black: "Ni un pisotón de un luchador de sumo\nlo aplastaría gracias a su piel sólida.\nSonríe al soltar descargas eléctricas."
          white: "Acecha a sus presas oculto en la arena\nhúmeda de la playa. Las paraliza con\nuna descarga eléctrica cuando lo tocan."
        ko:
          black: "피부가 단단해서 씨름꾼에게\n밟혀도 아무렇지 않다. 전기를\n흘려보낼 때 웃는 얼굴이 된다."
          white: "바닷가 펄 속에 묻혀 먹이를\n기다린다. 먹이가 몸에 닿으면\n전기를 써서 마비시킨다."
mienfoo:
  species_id: 619
  names:
