      descriptions:
        jp_kana:
          black: "ながれるような　たちさばきで\n２まいの　ホタチを　あつかう　わざは\nきびしい　しゅぎょうで　みにつける。"
          white: "みにつけた　ホタチさばきの　わざは\nフタチマルに　よって　ちがう。\nホタチの　ていれは　かかさない。"
        jp_kanji:
          black: "流れるような　太刀さばきで\n２枚の　ホタチを　あつかう　技は\n厳しい　修業によって　身につける。"
          white: "身につけた　ホタチさばきの　技は\nフタチマルに　よって　違う。\nホタチの　手入れは　欠かさない。"
        en:
          black: "Strict training is how it learns its\nflowing double-scalchop technique."
          white: "Scalchop techniques differ from one\nDewott to another. It never\nneglects maintaining its scalchops."
        fr:
          black: "L’apprentissage de sa technique de\ncombat, qui utilise élégamment ses deux\ncoupillages, est extrêmement rigoureux."
          white: "Chaque Mateloutre a sa propre technique\nd’escrime au coupillage, dont il prend\nun soin tout particulier."
        it:
          black: "Ha appreso tramite un durissimo\nallenamento l’arte di maneggiare le sue\ndue conchiglie come fossero lame."
          white: "Ogni Dewott ha mosse diverse in base alla\ntecnica con cui usa le affilate conchiglie\ndi cui si prende costantemente cura."
        de:
          black: "Es eignet sich durch strenges Training\nelegant ineinander übergehende\nAttacken mit seinen zwei Muscheln an."
          white: "Wie es seine Attacken ausführt, ist von\nExemplar zu Exemplar unterschiedlich.\nEs gibt sehr auf seine Muscheln acht."
        es:
          black: "Gran espadachín. Utiliza sus dos vieiras\ncon soltura al ejecutar las técnicas que\naprende con una disciplina espartana."
          white: "Cada Dewott utiliza diferentes técnicas\nde espadachín con sus dos vieiras,\ncuyo mantenimiento nunca descuida."
        ko:
          black: "물 흐르는 듯한 칼솜씨로\n2개의 가리비칼을 사용하는 기술은\n엄격한 수련을 통해 익힌 것이다."
          white: "몸에 익힌 가리비칼을 다루는 기술은\n각 쌍검자비에 따라 다르다.\n가리비칼 손질을 거르지 않는다."
samurott:
  species_id: 503
  names:
    jp_kana: ダイケンキ
    jp_kanji: ダイケンキ
    en: Samurott
    fr: Clamiral
    it: Samurott
    de: Admurai
    es: Samurott
    ko: 대검귀
  forms:
    samurott:
      form_id: 0
      base_stats:
        hp: 95
        attack: 100
        defense: 85
        special_attack: 108
        special_defense: 70
        speed: 70
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 3
        special_defense: 0
        speed: 0
      types:
        - water
      egg_groups:
        - field
      abilities:
        - torrent
        - torrent
      hidden_ability: shell_armor
      descriptions:
        jp_kana:
          black: "よろいに　しこまれた　つるぎの\nひとふりで　あいてを　たおす。\nひとにらみで　てきを　だまらせる。"
          white: "まえあしの　よろいの　いちぶが\nおおきな　つるぎに　なっている。\nほえる　だけで　てきを　いあつする。"
        jp_kanji:
          black: "よろいに　仕込まれた　剣の　一振りで\n相手を　倒す。\nひとにらみで　敵を　黙らせる。"
          white: "前脚の　よろいの　一部が\n大きな　剣に　なっている。\nほえる　だけで　敵を　威圧する。"
        en:
          black: "One swing of the sword incorporated in\nits armor can fell an opponent. A simple\nglare from one of them quiets everybody."
          white: "Part of the armor on its anterior legs\nbecomes a giant sword. Its cry alone\nis enough to intimidate most enemies."
        fr:
          black: "Il peut terrasser ses ennemis d’un coup\nde la lame enchâssée dans son armure,\net les faire taire d’un seul regard."
          white: "Les pièces d’armure sur ses pattes\nantérieures sont de grandes lames.\nUn simple cri peut intimider son ennemi."
        it:
          black: "Atterra l’avversario con un solo colpo\ndella spada inserita nell’armatura.\nUna sua occhiata ammutolisce il nemico."
          white: "Usa parte dell’armatura degli arti\nanteriori come fosse una grande spada.\nIntimidisce il nemico col solo ruggito."
        de:
          black: "Besiegt Gegner durch einen einzigen Hieb\nmit der Klinge an seinem Panzer. Ein\nböser Blick und seine Feinde verstummen."
          white: "Schüchtert Gegner allein durch seinen\nRuf ein. Ein Teil der Panzerung an seinen\nVorderbeinen dient ihm als Langschwert."
        es:
          black: "Derriba a su rival con un solo tajo del\nsable que lleva en su coraza.\nAcalla al enemigo con una simple mirada."
          white: "Utiliza una parte de la coraza de sus\npatas delanteras como un gran sable.\nIntimida a sus rivales con solo gruñir."
        ko:
          black: "갑옷에 내장된 검으로 한칼에\n상대를 제압한다.\n눈빛만으로 상대를 침묵시킨다."
          white: "앞다리의 갑옷 일부분이\n커다란 칼로 되어 있다.\n울부짖기만 해도 상대를 위압한다."
patrat:
  species_id: 504
  names:
    jp_kana: ミネズミ
    jp_kanji: ミネズミ
    en: Patrat
    fr: Ratentif
    it: Patrat
    de: Nagelotz
    es: Patrat
    ko: 보르쥐
  forms:
    patrat:
      form_id: 0
      base_stats:
        hp: 45
        attack: 55
        defense: 39
        special_attack: 35
        special_defense: 39
        speed: 42
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - normal
      egg_groups:
        - field
      abilities:
        - run_away
        - keen_eye
      hidden_ability: analytic
      descriptions:
        jp_kana:
          black: "ほほの　ふくろに　エサを　ためこみ\nなんにちも　みはりを　つづける。\nしっぽで　なかまに　あいずする。"
          white: "けいかいしんが　つよく　こうたいで\nすあなの　まわりを　みはりつづける。\nみはりが　いないと　ふあんなのだ。"
        jp_kanji:
          black: "ほほの　袋に　エサを　ため込み\n何日も　見張りを　続ける。\nしっぽで　仲間に　合図する。"
          white: "警戒心が　強く　交替で\n巣穴の　まわりを　見張り続ける。\n見張りが　いないと　不安なのだ。"
        en:
          black: "Using food stored in cheek pouches,\nthey can keep watch for days. They use\ntheir tails to communicate with others."
          white: "Extremely cautious, they take shifts to\nmaintain a constant watch of their nest.\nThey feel insecure without a lookout."
        fr:
          black: "Ils stockent à manger dans leurs\nbajoues et font le guet indéfiniment. Ils\nse font des signes en remuant la queue."
          white: "Ils sont très inquiets et se relaient\npour surveiller le territoire autour de\nleur nid. Sans guetteurs, ils ont peur."
        it:
          black: "Immagazzina cibo nelle guance e monta\nla guardia per molti giorni di seguito.\nUsa la coda per fare segnali ai compagni."
          white: "È molto guardingo e fa a turno coi suoi\nsimili per non lasciare la tana sguarnita,\naltrimenti non si sente al sicuro."
        de:
          black: "Hortet in seinen Backentaschen Futter,\num tagelang Wache stehen zu können, und\ngibt Kameraden über seine Rute Signale."
          white: "Sie sind von Natur aus vorsichtig und\nbewachen in Schichten ihren Bau. Hält\nniemand Wache, werden sie unruhig."
        es:
          black: "Almacena víveres en unas bolsas en sus\nmofletes y vigila durante días. Hace\nseñales con la cola a sus compañeros."
          white: "Siempre está alerta y no quita la mirada\nde su madriguera. Cuando no está\nvigilando, le invade la inquietud."
        ko:
          black: "볼의 주머니에 먹이를 모아두고\n며칠이고 망보기를 계속한다.\n꼬리로 동료에게 신호한다."
          white: "경계심이 강해서 교대로\n굴 주변을 끊임없이 망본다.\n망을 보지 않으면 불안해한다."
watchog:
  species_id: 505
  names:
    jp_kana: ミルホッグ
    jp_kanji: ミルホッグ
    en: Watchog
    fr: Miradar
    it: Watchog
    de: Kukmarda
    es: Watchog
    ko: 보르그
  forms:
    watchog:
      form_id: 0
      base_stats:
        hp: 60
        attack: 85
        defense: 69
        special_attack: 60
        special_defense: 69
        speed: 77
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - normal
      egg_groups:
        - field
      abilities:
        - illuminate
        - keen_eye
      hidden_ability: analytic
      descriptions:
        jp_kana:
          black: "ほっぺの　ふくろに　ためた　きのみの\nタネを　とばして　こうげき。てきを\nはっけんすると　しっぽを　たてる。"
          white: "からだの　もようを　ひからせて\nてきを　いかくする。くらやみでも\nまわりを　みとおす　めを　もつ。"
        jp_kanji:
          black: "ほほ袋に　ためた　木の実の　タネを\n飛ばして　攻撃。\n敵を　発見すると　しっぽを　立てる。"
          white: "体の　模様を　光らせて\n敵を　威嚇する。くらやみでも\nまわりを　見通す　目を　持つ。"
        en:
          black: "When they see an enemy, their tails\nstand high, and they spit the seeds of\nberries stored in their cheek pouches."
          white: "They make the patterns on their bodies\nshine in order to threaten predators.\nKeen eyesight lets them see in the dark."
        fr:
          black: "Il attaque en crachant les graines des\nBaies qu’il accumule dans ses bajoues.\nS’il voit un ennemi, il dresse la queue."
          white: "Il intimide l’ennemi en faisant briller\nles motifs de son pelage. Ses yeux\npeuvent voir même dans l’obscurité."
        it:
          black: "Attacca sparando i semi delle bacche\nche ha accumulato nelle guance.\nSe avvista il nemico, drizza la coda."
          white: "Intimidisce i nemici facendo brillare\nle strisce che ha sul corpo. La sua vista\ngli permette di muoversi anche al buio."
        de:
          black: "Bespuckt Gegner mit Kernen von Beeren\naus seinen Backentaschen. Erspäht es\neinen Feind, richtet es den Schweif auf."
          white: "Schüchtert Gegner ein, indem es die\nMaserung seines Fells aufblitzen lässt.\nAuch im Dunkeln entgeht ihm nichts."
        es:
          black: "Ataca lanzando las semillas de las bayas\nque acumula en sus mofletes. Su cola\nse tensa al avistar a un enemigo."
          white: "Hace brillar las rayas de su cuerpo\npara intimidar al enemigo. Sus ojos\nlo ven todo, hasta en la oscuridad."
        ko:
          black: "뺨의 주머니에 모아둔 나무열매의\n씨앗을 날려서 공격한다. 적을\n발견하면 꼬리를 세운다."
          white: "몸의 무늬를 빛나게 하여\n상대를 위협한다. 어두운 밤에도\n주변을 살필 수 있는 눈을 가지고 있다."
lillipup:
  species_id: 506
  names:
    jp_kana: ヨーテリー
    jp_kanji: ヨーテリー
    en: Lillipup
    fr: Ponchiot
    it: Lillipup
    de: Yorkleff
    es: Lillipup
    ko: 요테리
  forms:
    lillipup:
      form_id: 0
      base_stats:
        hp: 45
        attack: 60
        defense: 45
        special_attack: 25
        special_defense: 45
        speed: 55
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - normal
      egg_groups:
        - field
