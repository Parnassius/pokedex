        jp_kana:
          black: "てきに　おそわれると　でんきを\nおびた　いとを　たくさん　はきだして\nでんきの　バリアを　つくる。"
          white: "でんきを　おびた　いとで　わなを\nしかける。かんでんして　うごけない\nえものを　ゆっくりと　いただくのだ。"
        jp_kanji:
          black: "敵に　襲われると　電気を　帯びた\n糸を　たくさん　吐き出して\n電気の　バリアを　作る。"
          white: "電気を　帯びた　糸で　ワナを\n仕掛ける。感電して　動けない　獲物を\nゆっくりと　いただくのだ。"
        en:
          black: "When attacked, they create an\nelectric barrier by spitting out\nmany electrically charged threads."
          white: "They employ an electrically charged web\nto trap their prey. While it is immobilized\nby shock, they leisurely consume it."
        fr:
          black: "Quand on l’attaque, il projette une\nmultitude de fils électrifiés pour\ncréer une barrière électrique."
          white: "Il tend des pièges avec ses fils\nélectriques. Il déguste tranquillement\nses proies une fois électrocutées."
        it:
          black: "Quando viene attaccato, espelle\nuna rete di fili elettrificati per\nformare una barriera elettrica."
          white: "Tende trappole con fili elettrificati.\nConsuma poi con comodo le prede\nimmobilizzate dalla scarica elettrica."
        de:
          black: "Wird es angegriffen, spuckt es mit vielen\nelektrisch geladenen Fäden um sich und\nbaut sich eine Elektrobarriere."
          white: "Lässt seine Beute in elektrisch geladene\nFäden tappen. Solang diese durch den\nSchock gelähmt ist, labt es sich an ihr."
        es:
          black: "Cuando un enemigo lo ataca, expulsa por\nla boca hilos electrificados para crear\nuna barrera."
          white: "Pone trampas con hilos electrificados.\nDe este modo, electrocuta a sus\nenemigos y los inmoviliza por completo."
        ko:
          black: "상대에게 공격당하면 전기를\n띤 실을 무수히 뿜어내서\n전기 배리어를 만든다."
          white: "전기를 띤 실로 함정을 설치한다.\n감전돼서 움직이지 못하는\n먹이를 천천히 먹어치운다."
ferroseed:
