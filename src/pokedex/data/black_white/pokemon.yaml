      descriptions:
        jp_kana:
          black: "あかい　コアは　エネルギータンクの\nやくわり。チャージした　エネルギーを\nトゲから　しゅういに　うちだす。"
          white: "あかい　コアの　ついた　ギアを\nこうそくかいてんさせて　エネルギーを\nきゅうそくチャージ　するのだ。"
        jp_kanji:
          black: "赤い　コアは　エネルギータンクの\n役割。チャージした　エネルギーを\nトゲから　周囲に　撃ち出す。"
          white: "赤い　コアの　ついた　ギアを\n高速回転させて　エネルギーを\n急速チャージ　するのだ。"
        en:
          black: "Its red core functions as an energy\ntank. It fires the charged energy\nthrough its spikes into an area."
          white: "The gear with the red core is\nrotated at high speed for a\nrapid energy charge."
        fr:
          black: "Son noyau rouge lui permet d’accumuler\nde l’énergie qu’il projette ensuite aux\nalentours grâce à ses pics."
          white: "Il accumule rapidement de l’énergie en\nfaisant tourner très vite le rouage\nqui contient son noyau rouge."
        it:
          black: "Il nucleo rosso serve da serbatoio\ndi energia, che poi spara intorno a sé\nattraverso gli spuntoni."
          white: "Facendo girare velocemente l’ingranaggio\ndotato del nucleo rosso, accumula una\ngrande quantità di energia."
        de:
          black: "Der rote Zentralbestandteil dient als\nEnergiespeicher. Darin geladene Energie\nfeuert es über seine Stacheln ab."
          white: "Indem es das Rad mit dem roten Zentrum\nmit hohem Tempo zum Rotieren bringt,\nkann es eine Turboladung durchführen."
        es:
          black: "El núcleo rojo sirve como depósito de\nla energía que expulsa por las púas\nuna vez que está cargado."
          white: "Recarga su energía rápidamente haciendo\ngirar con gran celeridad el engranaje\nequipado con un núcleo rojo."
        ko:
          black: "빨간 코어는 에너지 탱크\n역할을 한다. 가시를 이용해\n모아둔 에너지를 주변에 쏘아댄다."
          white: "빨간 코어가 달린 기어를\n고속 회전시켜서 에너지를\n급속 충전한다."
tynamo:
  species_id: 602
  names:
    jp_kana: シビシラス
    jp_kanji: シビシラス
    en: Tynamo
    fr: Anchwatt
    it: Tynamo
    de: Zapplardin
    es: Tynamo
    ko: 저리어
  forms:
    tynamo:
      form_id: 0
      base_stats:
        hp: 35
        attack: 55
        defense: 40
        special_attack: 45
        special_defense: 40
