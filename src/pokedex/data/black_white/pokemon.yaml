    gothorita:
      form_id: 0
      base_stats:
        hp: 60
        attack: 45
        defense: 70
        special_attack: 75
        special_defense: 85
        speed: 55
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 2
        speed: 0
      types:
        - psychic
      egg_groups:
        - human_like
      abilities:
        - frisk
      hidden_ability: shadow_tag
      descriptions:
        jp_kana:
          black: "さいみんじゅつで　ポケモンや　ひとを\nあやつる。ねむったまま　ゴチミルに\nつれさられる　むかしばなしも　ある。"
          white: "ほしあかりが　パワーの　みなもと。\nよるになると　サイコパワーで　いしを\nうかべて　ほしの　はいちを　しるす。"
        jp_kanji:
          black: "催眠術で　ポケモンや　人を　操る。\n眠ったまま　ゴチミルに　連れ去られる\n昔話が　各地に　残っている。"
          white: "星明りが　パワーの　源。\n夜になると　サイコパワーで　石を\n浮かべて　星の　配置を　印す。"
        en:
          black: "They use hypnosis to control people and\nPokémon. Tales of Gothorita leading\npeople astray are told in every corner."
          white: "Starlight is the source of their power.\nAt night, they mark star positions by\nusing psychic power to float stones."
        fr:
          black: "Hypnotise les Pokémon et les gens. Il y a\nde nombreuses légendes de gens enlevés\ndans leur sommeil par des Mesmérella."
          white: "Tire son énergie de la lumière des\nétoiles et marque leur position en\nfaisant léviter des pierres la nuit."
        it:
          black: "Con l’ipnotismo controlla persone e\nPokémon. Molte sono le storie di gente\nportata via nel sonno da Gothorita."
          white: "Trae energia dalla luce delle stelle. Ne\ntraccia la posizione facendo levitare\nle pietre coi poteri psichici."
        de:
          black: "Es manipuliert Pokémon und Menschen\nmit Hypnosetricks. In Märchen tritt es\noft als Entführer auf."
          white: "Zieht seine Energie aus dem Sternenlicht.\nBei Nacht bringt es Steine zum Schweben\nund bildet damit Sternzeichen nach."
        es:
          black: "Controla a Pokémon y humanos con\nhipnosis. Existen multitud de historias\nde Gothorita que raptan a gente."
          white: "La luz de las estrellas origina su poder.\nDe noche, marca su posición haciendo\nlevitar piedras con su poder psíquico."
        ko:
          black: "최면술로 포켓몬이나 사람을 조종한다.\n잠든 채로 고디보미에게 끌려갔다는\n옛이야기가 각지에 남아 있다."
          white: "별빛이 힘의 원천이다.\n밤이 되면 사이코 파워로 돌을\n띄워 별의 배치를 표시한다."
gothitelle:
  species_id: 576
  names:
    jp_kana: ゴチルゼル
    jp_kanji: ゴチルゼル
    en: Gothitelle
    fr: Sidérella
    it: Gothitelle
    de: Morbitesse
    es: Gothitelle
    ko: 고디모아젤
  forms:
    gothitelle:
      form_id: 0
      base_stats:
        hp: 70
        attack: 55
        defense: 95
        special_attack: 95
        special_defense: 110
        speed: 65
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 3
        speed: 0
      types:
        - psychic
      egg_groups:
        - human_like
      abilities:
        - frisk
      hidden_ability: shadow_tag
      descriptions:
        jp_kana:
          black: "きょうりょくな　サイコパワーの\nえいきょうで　くうかんが　ねじれて\nしゅういに　ほしぞらが　うつるのだ。"
          white: "ほしの　ばしょや　うごきから\nみらいの　できごとを　よちする。\nトレーナーの　じゅみょうも　みえる。"
        jp_kanji:
          black: "強力な　サイコパワーの　影響で\nゴチルゼルの　周囲の　空間が　ねじれ\n何万光年も　遠くの　星空が　映る。"
          white: "星の　配置や　動きから　未来の\nできごとを　予知する　能力を　持つ。\nトレーナーの　寿命も　見える。"
        en:
          black: "Starry skies thousands of light-years\naway are visible in the space distorted\nby their intense psychic power."
          white: "They can predict the future from the\nplacement and movement of the stars.\nThey can see Trainers’ life spans."
        fr:
          black: "Ses pouvoirs psychiques plient l’espace\naux alentours. On y voit des étoiles\néloignées de millions d’années-lumière."
          white: "Prédit l’avenir à partir de la position\net du mouvement des étoiles. Perçoit\naussi l’espérance de vie des Dresseurs."
        it:
          black: "I suoi forti poteri psichici modificano\nlo spazio circostante rendendo visibili\ngalassie lontane milioni di anni luce."
          white: "Prevede il futuro dalla posizione e dal\nmovimento delle stelle. Conosce anche\nla durata della vita dell’Allenatore."
        de:
          black: "Durch seine mächtigen Psycho-Kräfte\nkrümmt sich der Raum und Bilder eines\nLichtjahre entfernten Ortes erscheinen."
          white: "Kann anhand der Sternenkonstellationen\ndie Zukunft voraussagen. Es weiß sogar,\nwie alt sein Trainer werden wird."
        es:
          black: "Su inmenso poder psíquico distorsiona\nel espacio y le permite reflejar incluso\nestrellas a años luz de distancia."
          white: "Predice el futuro analizando la posición\nde los astros y su movimiento. Conoce la\nesperanza de vida de los Entrenadores."
        ko:
          black: "강력한 사이코 파워의 영향으로\n고디모아젤 주변 공간이 비틀어져\n몇만 광년이나 떨어진 하늘의 별이 비친다."
          white: "별의 배치나 움직임으로 미래의\n일을 예지하는 능력을 가지고 있다.\n트레이너의 수명도 알 수 있다."
solosis:
  species_id: 577
  names:
    jp_kana: ユニラン
    jp_kanji: ユニラン
    en: Solosis
    fr: Nucléos
    it: Solosis
    de: Monozyto
    es: Solosis
    ko: 유니란
  forms:
    solosis:
      form_id: 0
      base_stats:
        hp: 45
        attack: 30
        defense: 40
        special_attack: 105
        special_defense: 50
        speed: 20
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 1
        special_defense: 0
        speed: 0
      types:
        - psychic
      egg_groups:
        - amorphous
      abilities:
        - overcoat
        - magic_guard
