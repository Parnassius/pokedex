        - field
      abilities:
        - inner_focus
        - early_bird
      hidden_ability: sap_sipper
      held_items:
        rare: persim_berry
      descriptions:
        jp_kana:
          black: "しっぽの　あたまにも　ちいさな\nのうがあり　うしろを　むいたままでも\nほんのうで　たたかうことが　できる。"
          white: "しっぽの　あたまにも　ちいさな\nのうがあり　うしろを　むいたままでも\nほんのうで　たたかうことが　できる。"
        jp_kanji:
          black: "しっぽの　頭にも　小さな\n脳があり　後ろを　向いたままでも\n本能で　戦うことが　できる。"
          white: "しっぽの　頭にも　小さな\n脳があり　後ろを　向いたままでも\n本能で　戦うことが　できる。"
        en:
          black: "The head on its tail contains a\nsmall brain. It can instinctively\nfight even while facing backward."
          white: "The head on its tail contains a\nsmall brain. It can instinctively\nfight even while facing backward."
        fr:
          black: "La tête qu’il a sur la queue dispose\nde son propre cerveau et lui\npermet de couvrir ses arrières."
          white: "La tête qu’il a sur la queue dispose\nde son propre cerveau et lui\npermet de couvrir ses arrières."
        it:
          black: "Sulla coda ha una testa con un piccolo\ncervello. Riesce a lottare anche se\nil nemico è alle sue spalle."
          white: "Sulla coda ha una testa con un piccolo\ncervello. Riesce a lottare anche se\nil nemico è alle sue spalle."
        de:
          black: "Es kann sich in beide Richtungen\nverteidigen, da der Kopf auf seinem\nSchweif ein kleines Gehirn besitzt."
          white: "Es kann sich in beide Richtungen\nverteidigen, da der Kopf auf seinem\nSchweif ein kleines Gehirn besitzt."
        es:
          black: "La cabeza de su cola también tiene\nun pequeño cerebro, así que puede\ncombatir por delante o por detrás."
          white: "La cabeza de su cola también tiene\nun pequeño cerebro, así que puede\ncombatir por delante o por detrás."
        ko:
          black: "꼬리의 머리에도 작은\n뇌가 있어서 뒤를 향한 채로도\n본능적으로 싸울 수 있다."
          white: "꼬리의 머리에도 작은\n뇌가 있어서 뒤를 향한 채로도\n본능적으로 싸울 수 있다."
