      descriptions:
        jp_kana:
          black: "うでの　たいもうを　ムチのように\nあつかう。りょううでの　こうげきは\nめにも　とまらぬ　はやさ。"
          white: "うでの　ながい　たいもうを\nてきに　たたきつけて　たたかう。\nムチのように　てきを　いためつける。"
        jp_kanji:
          black: "腕の　体毛を　ムチのように\nあつかう。両腕の　攻撃は\n目にも　止まらぬ　速さ。"
          white: "腕の　長い　体毛を\n敵に　たたきつけて　戦う。\nムチのように　敵を　痛めつける。"
        en:
          black: "It wields the fur on its arms like a whip.\nIts arm attacks come with such rapidity\nthat they cannot even be seen."
          white: "They use the long fur on their arms\nas a whip to strike their opponents."
        fr:
          black: "Il se sert des poils de ses pattes\nantérieures comme de fouets. Ses coups\nultrarapides sont invisibles à l’œil nu."
          white: "Il combat à l’aide des longs poils\nde ses pattes antérieures. \nIls font aussi mal qu’un fouet."
        it:
          black: "Usa i peli degli arti come fruste. I suoi\nattacchi sono talmente rapidi da essere\ninvisibili a occhio nudo."
          white: "Lotta colpendo i nemici con i lunghi peli\ndegli arti anteriori, che fa schioccare\ncome fruste."
        de:
          black: "Es benutzt das Fell an seinen Armen als\nPeitsche. Beide Arme bewegen sich dabei\nmit atemberaubender Geschwindigkeit."
          white: "Es geht seinen Gegnern ans Leder, indem\nes ihnen mit dem langen Fell seiner Arme\nwie mit einer Peitsche Hiebe verpasst."
        es:
          black: "Usa el pelaje de sus brazos a manera\nde látigos. Sus ataques alcanzan\nvelocidades de vértigo."
          white: "Golpea a sus enemigos con el pelaje de\nsus brazos, que usa a manera de látigos."
        ko:
          black: "팔에 있는 털을 채찍처럼\n다룬다. 양팔로 펼치는 공격은\n눈에 보이지 않을 만큼 빠르다."
          white: "팔에 있는 긴 털을\n적에게 힘껏 치며 싸운다.\n채찍처럼 상대를 혼내준다."
druddigon:
  species_id: 621
  names:
    jp_kana: クリムガン
    jp_kanji: クリムガン
    en: Druddigon
    fr: Drakkarmin
    it: Druddigon
    de: Shardrago
    es: Druddigon
    ko: 크리만
  forms:
    druddigon:
      form_id: 0
      base_stats:
        hp: 77
        attack: 120
        defense: 90
        special_attack: 60
        special_defense: 90
        speed: 48
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - dragon
      egg_groups:
        - dragon
        - monster
      abilities:
        - rough_skin
        - sheer_force
      hidden_ability: mold_breaker
      held_items:
