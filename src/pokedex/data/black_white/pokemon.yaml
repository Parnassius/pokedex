        jp_kana:
          black: "きょうりょくな　れいとうエネルギーを\nたいないで　つくりだすが　もれだした\nれいきで　からだが　こおっている。"
          white: "きょくていおんの　れいきを　つくる\nちからを　もっているが　じぶんの\nからだを　こおらせてしまっている。"
        jp_kanji:
          black: "強力な　冷凍エネルギーを\n体内で　作り出すが　漏れ出した\n冷気で　体が　凍っている。"
          white: "極低温の　冷気を　作る　力を\n持っているが　自分の　体を\n凍らせてしまっている。"
        en:
          black: "It generates a powerful, freezing\nenergy inside itself, but its body became\nfrozen when the energy leaked out."
          white: "It can produce ultracold air.\nIts body is frozen."
        fr:
          black: "Son corps produit une énergie à très\nbasse température, mais le souffle \nglacé qu’il exhale l’a gelé lui-même."
          white: "Il a le pouvoir de générer un souffle\nd’un froid inimaginable, mais a fini\npar se geler lui-même."
        it:
          black: "Produce all’interno del suo corpo una\npotente e gelida energia. Ma l’aria\nfredda che esala lo ha congelato."
          white: "Ha il potere di generare un freddo\nglaciale, ma ha finito per congelare\nil suo stesso corpo."
        de:
          black: "Sein Körper erzeugt in seinem Inneren\ngewaltige Mengen an Kälteenergie. Tritt\ndiese jedoch aus, gefriert sein Körper."
          white: "Es besitzt die Fähigkeit, eisige Kälte\nheraufzubeschwören, doch dabei\ngefriert auch sein eigener Körper."
        es:
          black: "Produce en su interior una intensa\nenergía gélida, y cualquier fuga\nhace que su cuerpo se congele."
          white: "Puede crear corrientes de aire\ntremendamente frías, pero al final\nacaba congelando su propio cuerpo."
        ko:
          black: "강력한 냉동 에너지를\n체내에서 만들어 내지만 새어나온\n냉기에 몸이 얼어 있다."
          white: "극저온의 냉기를 만드는 힘을\n지니고 있지만 자신의 몸까지\n얼려버리고 있다."
