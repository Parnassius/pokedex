      descriptions:
        jp_kana:
          black: "コンクリートを　つくる　ぎじゅつは\n２０００ねんまえに　ローブシンから\nおそわったと　かんがえられている。"
          white: "つえ　がわりの　コンクリートの\nはしらを　きんりょくを　つかわず\nじざいに　ふりまわす　わざを　もつ。"
        jp_kanji:
          black: "コンクリートを　作る　技術は\n２０００年前に　ローブシンから\n教わったと　考えられている。"
          white: "つえ　代わりの　コンクリートの　柱を\n筋力を　使わず\n自在に　振り回す　技を　持つ。"
        en:
          black: "It is thought that Conkeldurr taught\nhumans how to make concrete more\nthan 2,000 years ago."
          white: "They use concrete pillars as walking\ncanes. They know moves that enable them\nto swing the pillars freely in battle."
        fr:
          black: "On pense que la recette du ciment\na été enseignée aux humains par\nun Bétochef il y a 2 000 ans."
          white: "Il peut manier sans effort apparent\nles piliers de béton dont il se sert\ncomme de cannes."
        it:
          black: "Si pensa che la tecnica per fare il\ncemento sia stata diffusa proprio\nda Conkeldurr, 2000 anni fa."
          white: "Con un minimo sforzo dei muscoli, è in\ngrado di usare un pilastro di cemento\na mo’ di bastone da passeggio."
        de:
          black: "Man nimmt an, dass es der Menschheit\nvor ca. 2 000 Jahren das Betonmischen\nbeigebracht hat."
          white: "Besitzt die Fähigkeit, die Säulen, die\nes als Gehstöcke verwendet, ganz\nohne Krafteinsatz umherzuschwingen."
        es:
          black: "Se cree que Conkeldurr enseñó a\nlos humanos la técnica para elaborar\ncemento hace más de 2000 años."
          white: "Posee una técnica para mover a su\nantojo columnas de cemento a modo\nde bastones."
        ko:
          black: "콘크리트를 만드는 기술은\n2000년 전에 노보청에게\n배운 것이라고 여겨지고 있다."
          white: "지팡이 대신 사용하는 콘크리트\n기둥을 근력을 쓰지 않고\n자유자재로 휘두르는 기술을 가지고 있다."
tympole:
