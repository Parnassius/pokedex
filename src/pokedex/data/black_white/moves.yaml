absorb:
  names:
    jp_kana: すいとる
    jp_kanji: すいとる
    en: Absorb
    fr: Vol-Vie
    it: Assorbimento
    de: Absorber
    es: Absorber
    ko: 흡수
  descriptions:
    jp_kana: "ようぶんを　すいとり　こうげきする。\nあいてに　あたえた　ダメージの\nはんぶんの　ＨＰを　かいふくできる。"
    jp_kanji: "養分を　吸い取り　攻撃する。\n相手に　与えた　ダメージの\n半分の　ＨＰを　回復できる。"
    en: "A nutrient-draining attack. The user’s\nHP is restored by half the damage taken\nby the target."
    fr: "Une attaque qui convertit la moitié\ndes dégâts infligés en PV."
    it: "Mossa che assorbe PS. Chi la usa recupera\nuna quantità di PS pari alla metà del danno\ninferto."
    de: "Attacke, die die Hälfte des\nSchadens absorbiert."
    es: "Absorbe la mitad del daño producido\nen el objetivo para restaurar los PS\ndel usuario."
    ko: "양분을 흡수하여 공격한다.\n상대에게 입힌 데미지의\n절반에 해당하는 HP를 회복할 수 있다."
acid:
  names:
    jp_kana: ようかいえき
    jp_kanji: ようかいえき
    en: Acid
    fr: Acide
    it: Acido
    de: Säure
    es: Ácido
    ko: 용해액
  descriptions:
    jp_kana: "つよい　さんを　あいてに　かけて\nこうげきする。あいての　とくぼうを\nさげることが　ある。"
    jp_kanji: "強い　酸を　相手に　かけて\n攻撃する。相手の　特防を\nさげることが　ある。"
    en: "The opposing team is attacked with a spray\nof harsh acid. The acid may also lower\nthe targets’ Sp. Def stats."
    fr: "Le lanceur attaque l’ennemi avec un jet\nd’acide corrosif. Peut aussi baisser\nla Défense Spéciale de l’ennemi."
    it: "Colpisce i nemici spruzzando un acido\ncorrosivo. Può anche ridurre la Difesa\nSpeciale."
    de: "Versprüht ätzende Flüssigkeit, die\neventuell die Spezial-Verteidigung\ndes Zieles senkt."
    es: "Rocía con un ácido corrosivo.\nPuede bajar la Defensa Especial."
    ko: "강한 산을 상대에게 끼얹어\n공격한다. 상대의 특수방어를\n떨어뜨릴 때가 있다."
acid_armor:
  names:
    jp_kana: とける
    jp_kanji: とける
    en: Acid Armor
    fr: Acidarmure
    it: Scudo Acido
    de: Säurepanzer
    es: Armad. Ácida
    ko: 녹기
  descriptions:
    jp_kana: "さいぼうの　へんかで　えきじょうに　なり\nじぶんの　ぼうぎょを　ぐーんと　あげる。"
    jp_kanji: "細胞の　変化で　液状に　なり\n自分の　防御を　ぐーんと　あげる。"
    en: "The user alters its cellular structure to\nliquefy itself, sharply raising its\nDefense stat."
    fr: "Le lanceur modifie sa structure\nmoléculaire pour se liquéfier et\naugmenter fortement sa Défense."
    it: "Chi la usa altera la sua struttura\ncellulare passando allo stato liquido:\nla Difesa sale di molto."
    de: "Verflüssigt Körperzellen des Anwenders.\nErhöht den Verteidigungs-Wert stark."
    es: "Transforma la estructura celular\npara hacerse líquido y aumenta\nmucho la Defensa."
    ko: "세포의 변화로 액체가 되어\n자신의 방어를 크게 올린다."
acid_spray:
  names:
    jp_kana: アシッドボム
    jp_kanji: アシッドボム
    en: Acid Spray
    fr: Bombe Acide
    it: Acidobomba
    de: Säurespeier
    es: Bomba Ácida
    ko: 애시드봄
  descriptions:
    jp_kana: "あいてを　とかす　えきたいを\nはきだして　こうげきする。\nあいての　とくぼうを　がくっと　さげる。"
    jp_kanji: "相手を　とかす　液体を\n吐きだして　攻撃する。\n相手の　特防を　がくっと　さげる。"
    en: "The user spits fluid that works to melt\nthe target. This harshly reduces\nthe target’s Sp. Def stat."
    fr: "Un liquide acide qui fait fondre l’ennemi.\nSa Défense Spéciale diminue beaucoup."
    it: "Chi la usa attacca il bersaglio con un acido\naltamente corrosivo. Il fluido riduce\ndi molto la Difesa Speciale del bersaglio."
    de: "Anwender greift an, indem er eine ätzende\nFlüssigkeit auf das Ziel speit. Senkt\ndessen Spezial-Verteidigung stark."
    es: "Ataca con un líquido corrosivo,\nreduciendo mucho la Defensa\nEspecial del objetivo."
    ko: "상대를 녹이는 액체를\n토해내서 공격한다.\n상대의 특수방어를 크게 떨어뜨린다."
acrobatics:
  names:
    jp_kana: アクロバット
    jp_kanji: アクロバット
    en: Acrobatics
    fr: Acrobatie
    it: Acrobazia
    de: Akrobatik
    es: Acróbata
    ko: 애크러뱃
  descriptions:
    jp_kana: "かろやかに　あいてを　こうげきする。\nじぶんが　どうぐを　もっていない　とき\nおおきな　ダメージを　あたえる。"
    jp_kanji: "軽やかに　相手を　攻撃する。\n自分が　道具を　持っていないとき\n大きな　ダメージを　与える。"
    en: "The user nimbly strikes the target.\nIf the user is not holding an item,\nthis attack inflicts massive damage."
    fr: "Attaque agile. Si le lanceur ne tient\npas d’objet, l’attaque inflige\ndavantage de dégâts."
    it: "Attacca rapidamente il bersaglio.\nSe chi la usa non ha uno strumento,\ninfligge al nemico grossi danni."
    de: "Ein graziler Angriff auf das Ziel. Trägt\nder Anwender kein Item bei sich, richtet\ndie Attacke großen Schaden an."
    es: "Golpea ágilmente. Si el usuario no porta\nningún objeto, el objetivo resulta\nseriamente dañado."
    ko: "경쾌하게 상대를 공격한다.\n자신이 도구를 지니고 있지 않을 때\n큰 데미지를 준다."
acupressure:
  names:
    jp_kana: つぼをつく
    jp_kanji: つぼをつく
    en: Acupressure
    fr: Acupression
    it: Acupressione
    de: Akupressur
    es: Acupresión
    ko: 경혈찌르기
  descriptions:
    jp_kana: "つぼおしで　からだを\nかっせいか　させる。のうりょくの\nどれか　１つを　ぐーんと　あげる。"
    jp_kanji: "つぼおしで　体を　活性化させる。\n能力の　どれか　１つを\nぐーんと　あげる。"
    en: "The user applies pressure to stress\npoints, sharply boosting one of\nits stats."
    fr: "Le lanceur effectue des pressions\npour augmenter fortement l’une\nde ses stats."
    it: "Chi la usa esercita pressione su alcuni\npunti nevralgici e aumenta di molto\nuna statistica a caso."
    de: "Anwender erhöht Druck auf\nStresspunkte und steigert einen\nseiner Statuswerte stark."
    es: "La presión en puntos clave del cuerpo\npotencia una de sus características."
    ko: "경혈을 눌러 몸을 활성화시킨다.\n능력 중 하나를 크게 올린다."
aerial_ace:
  names:
    jp_kana: つばめがえし
    jp_kanji: つばめがえし
    en: Aerial Ace
    fr: Aéropique
    it: Aeroassalto
    de: Aero-Ass
    es: Golpe Aéreo
    ko: 제비반환
  descriptions:
    jp_kana: "すばやい　うごきで\nあいてを　ほんろうして　きりつける。\nこうげきは　かならず　めいちゅう　する。"
    jp_kanji: "素早い　動きで\n相手を　ほんろうして　切りつける。\n攻撃は　必ず　命中する。"
    en: "The user confounds the target with speed,\nthen slashes.\nThe attack lands without fail."
    fr: "Le lanceur prend l’ennemi de vitesse\net le lacère. N’échoue jamais."
    it: "Chi la usa attacca il nemico a grande\nvelocità. Questa mossa è infallibile."
    de: "Eine extrem schnelle Attacke, der\ndas Ziel nicht ausweichen kann."
    es: "El usuario lanza un ataque muy rápido\ne ineludible."
    ko: "재빠른 움직임으로\n상대를 농락해 벤다.\n공격은 반드시 명중한다."
aeroblast:
  names:
    jp_kana: エアロブラスト
    jp_kanji: エアロブラスト
    en: Aeroblast
    fr: Aéroblast
    it: Aerocolpo
    de: Luftstoß
    es: Aerochorro
    ko: 에어로블라스트
  descriptions:
    jp_kana: "くうきの　うずを\nはっしゃして　こうげきする。\nきゅうしょに　あたりやすい。"
    jp_kanji: "空気の　渦を\n発射して　攻撃する。\n急所に　当たりやすい。"
    en: "A vortex of air is shot at the target to\ninflict damage.\nCritical hits land more easily."
    fr: "Le lanceur projette une tornade sur\nl’ennemi pour infliger des dégâts. Taux\nde critiques élevé."
    it: "Colpisce il nemico con un vortice d’aria\nper danneggiarlo. Probabile brutto colpo."
    de: "Erzeugt Luftstrudel gegen das Ziel.\nHohe Volltrefferquote."
    es: "Lanza un chorro de aire que suele dar\nun golpe crítico."
    ko: "공기의 소용돌이를\n발사하여 공격한다.\n급소에 맞기 쉽다."
after_you:
  names:
    jp_kana: おさきにどうぞ
    jp_kanji: おさきにどうぞ
    en: After You
    fr: Après Vous
    it: Cortesia
    de: Galanterie
    es: Cede Paso
    ko: 당신먼저
  descriptions:
    jp_kana: "あいての　こうどうを　サポートして\nじぶんの　こうどうの　あとに\nつづけて　うごけるように　する。"
    jp_kanji: "相手の　行動を　サポートして\n自分の　行動の　あとに\n続けて　動けるように　する。"
    en: "The user helps the target and makes it\nuse its move right after the user."
    fr: "S’il est le premier à agir, le lanceur\npermet à sa cible d’utiliser une\ncapacité juste après lui."
    it: "Chi la usa aiuta un bersaglio più lento\npermettendogli di agire subito dopo."
    de: "Anwender ermöglicht dem Ziel direkt\nnach ihm zu handeln, solange der\nAnwender als Erstes zum Zug kommt."
    es: "Si el usuario es el más rápido, permite al\nobjetivo usar un movimiento justo tras él,\nadelantándose a Pokémon más rápidos."
    ko: "상대의 행동을 도와서\n자신이 행동한 뒤에 바로\n움직일 수 있도록 한다."
agility:
  names:
    jp_kana: こうそくいどう
    jp_kanji: こうそくいどう
    en: Agility
    fr: Hâte
    it: Agilità
    de: Agilität
    es: Agilidad
    ko: 고속이동
  descriptions:
    jp_kana: "ちからを　ぬいて　からだを　かるくして\nこうそくで　うごく。\nじぶんの　すばやさを　ぐーんと　あげる。"
    jp_kanji: "力を　ぬいて　体を　軽くして\n高速で　動く。\n自分の　素早さを　ぐーんと　あげる。"
    en: "The user relaxes and lightens its body to\nmove faster. It sharply boosts\nthe Speed stat."
    fr: "Le lanceur se relaxe et allège son corps\npour augmenter considérablement\nsa Vitesse."
    it: "Chi la usa rilassa e alleggerisce il proprio\ncorpo per far salire di molto la Velocità."
    de: "Entspannt den Körper, um den\nInitiative-Wert stark zu steigern."
    es: "Relaja el cuerpo para ganar\nmucha Velocidad."
    ko: "힘을 빼고 몸을 가볍게 해서\n고속으로 움직인다.\n자신의 스피드를 크게 올린다."
air_cutter:
  names:
    jp_kana: エアカッター
    jp_kanji: エアカッター
    en: Air Cutter
    fr: Tranch’Air
    it: Aerasoio
    de: Windschnitt
    es: Aire Afilado
    ko: 에어컷터
  descriptions:
    jp_kana: "するどい　かぜで\nあいてを　きりつけて　こうげきする。\nきゅうしょに　あたりやすい。"
    jp_kanji: "鋭い　風で\n相手を　切りつけて　攻撃する。\n急所に　当たりやすい。"
    en: "The user launches razor-like wind to\nslash the opposing team.\nCritical hits land more easily."
    fr: "Le lanceur appelle des vents tranchants\nqui lacèrent l’ennemi.\nTaux de critiques élevé."
    it: "Chi la usa provoca un vento tagliente che\nsferza i nemici. Probabile brutto colpo."
    de: "Greift mit rasierklingenartigem\nWind an. Hohe Volltrefferquote."
    es: "Viento cortante que azota.\nSuele ser un golpe crítico."
    ko: "날카로운 바람으로\n상대를 베어 공격한다.\n급소에 맞기 쉽다."
air_slash:
  names:
    jp_kana: エアスラッシュ
    jp_kanji: エアスラッシュ
    en: Air Slash
    fr: Lame d’Air
    it: Eterelama
    de: Luftschnitt
    es: Tajo Aéreo
    ko: 에어슬래시
  descriptions:
    jp_kana: "そらをも　きりさく\nくうきの　やいばで　こうげきする。\nあいてを　ひるませる　ことが　ある。"
    jp_kanji: "空をも　切り裂く\n空気の　刃で　攻撃する。\n相手を　ひるませることが　ある。"
    en: "The user attacks with a blade of air that\nslices even the sky. It may also make the\ntarget flinch."
    fr: "Le lanceur attaque avec une lame d’air\nqui fend tout. Peut aussi apeurer l’ennemi."
    it: "Chi la usa attacca con un vento tagliente\nche squarcia il cielo. Può anche far\ntentennare il Pokémon colpito."
    de: "Das Ziel wird mit einer Luftklinge\nangegriffen. Ziel schreckt\neventuell zurück."
    es: "Ataca con una hoja de aire que incluso\ncorta el cielo. También puede hacer\nretroceder al objetivo."
    ko: "하늘까지 베어 가르는\n공기의 칼날로 공격한다.\n상대를 풀죽게 만들 때가 있다."
ally_switch:
  names:
    jp_kana: サイドチェンジ
    jp_kanji: サイドチェンジ
    en: Ally Switch
    fr: Interversion
    it: Cambiaposto
    de: Seitentausch
    es: Cambio Banda
    ko: 사이드체인지
  descriptions:
    jp_kana: "ふしぎな　ちからで　テレポートして\nじぶんと　みかたの　いばしょを\nいれかえる。"
    jp_kanji: "不思議な　力で　テレポートして\n自分と　味方の　居場所を\n入れ替える。"
    en: "The user teleports using a strange power\nand switches its place with one of\nits allies."
    fr: "Le lanceur se téléporte à l’aide d’un\npouvoir mystérieux. Il échange sa place\navec celle d’un allié sur le terrain."
    it: "Chi la usa si teletrasporta al posto\ndi un compagno in campo, grazie\nad un misterioso potere."
    de: "Wundersame Kräfte teleportieren\nden Anwender an den Platz eines\nMitstreiters."
    es: "Un extraño poder que intercambia las\nposiciones del usuario y un aliado\nsobre el terreno de combate."
    ko: "이상한 힘으로 순간이동하여\n자신과 같은 편이 있는 장소를\n바꾼다."
amnesia:
  names:
    jp_kana: ドわすれ
    jp_kanji: ドわすれ
    en: Amnesia
    fr: Amnésie
    it: Amnesia
    de: Amnesie
    es: Amnesia
    ko: 망각술
  descriptions:
    jp_kana: "あたまを　からにして\nいっしゅん　なにかを　わすれる　ことで\nじぶんの　とくぼうを　ぐーんと　あげる。"
    jp_kanji: "頭を　からにして\n一瞬　なにかを　忘れることで\n自分の　特防を　ぐーんと　あげる。"
    en: "The user temporarily empties its mind to\nforget its concerns.\nIt sharply raises the user’s Sp. Def stat."
    fr: "Le lanceur fait le vide dans son esprit\npour oublier ses soucis. Augmente\nfortement sa Défense Spéciale."
    it: "Chi la usa svuota per un po’ la mente per\ndimenticare i problemi. La Difesa Speciale\naumenta di molto."
    de: "Gedächtnisverlust, der die\nSpezial-Verteidigung stark\nerhöht."
    es: "El usuario olvida sus preocupaciones\ny aumenta mucho la Defensa Especial."
    ko: "머리를 비워서 순간적으로\n무언가를 잊어버림으로써\n자신의 특수방어를 크게 올린다."
ancient_power:
  names:
    jp_kana: げんしのちから
    jp_kanji: げんしのちから
    en: AncientPower
    fr: Pouv.Antique
    it: Forzantica
    de: Antik-Kraft
    es: Poder Pasado
    ko: 원시의힘
  descriptions:
    jp_kana: "げんしの　ちからで　こうげきする。\nじぶんの　すべての\nのうりょくが　あがることが　ある。"
    jp_kanji: "原始の　力で　攻撃する。\n自分の　すべての\n能力が　あがることが　ある。"
    en: "The user attacks with a prehistoric power.\nIt may also raise all the user’s stats\nat once."
    fr: "Une attaque préhistorique qui peut\naugmenter toutes les stats du lanceur\nd’un seul coup."
    it: "Colpisce il nemico con una forza\nprimordiale. Può aumentare tutte\nle statistiche."
    de: "Angriff mit antiker Kraft, der alle\nStatuswerte erhöhen kann."
    es: "Ataque prehistórico que puede subir todas\nlas características."
    ko: "원시의 힘으로 공격한다.\n자신의 모든\n능력이 오를 때가 있다."
aqua_jet:
  names:
    jp_kana: アクアジェット
    jp_kanji: アクアジェット
    en: Aqua Jet
    fr: Aqua-Jet
    it: Acquagetto
    de: Wasserdüse
    es: Acua Jet
    ko: 아쿠아제트
  descriptions:
    jp_kana: "めにも　とまらぬ　ものすごい　はやさで\nあいてに　つっこむ。\nかならず　せんせい　こうげき　できる。"
    jp_kanji: "目にも　留まらぬ　ものすごい　速さで\n相手に　つっこむ。\n必ず　先制攻撃　できる。"
    en: "The user lunges at the target at a speed\nthat makes it almost invisible. It is sure\nto strike first."
    fr: "Le lanceur fonce sur l’ennemi si\nrapidement qu’on parvient à peine\nà le discerner. Frappe en premier."
    it: "Chi la usa colpisce sempre per primo e\nad una tale velocità da rendersi quasi\ninvisibile."
    de: "Sehr schneller Angriff mit\nErstschlaggarantie."
    es: "Ataque rápido que permite golpear\nen primer lugar."
    ko: "눈에 보이지 않는 굉장한 속도로\n상대에게 돌진한다.\n반드시 선제공격할 수 있다."
aqua_ring:
  names:
    jp_kana: アクアリング
    jp_kanji: アクアリング
    en: Aqua Ring
    fr: Anneau Hydro
    it: Acquanello
    de: Wasserring
    es: Acua Aro
    ko: 아쿠아링
  descriptions:
    jp_kana: "じぶんの　からだの　まわりを\nみずで　つくった　ベールで　おおう。\nまいターン　ＨＰを　かいふく　する。"
    jp_kanji: "自分の　体の　周りを\n水で　つくった　ベールで　おおう。\n毎ターン　ＨＰを　回復する。"
    en: "The user envelops itself in a veil made\nof water. It regains some HP on\nevery turn."
    fr: "Un voile liquide enveloppe le lanceur.\nIl récupère des PV à chaque tour."
    it: "Chi la usa si avvolge in un velo d’acqua.\nRecupera alcuni PS ad ogni turno."
    de: "Anwender umgibt sich mit einem Schleier\naus Wasser. Dabei regeneriert er\neinige KP pro Runde."
    es: "Un manto de agua cubre al Pokémon\nque lo usa. Recupera algunos PS en\ncada turno."
    ko: "자신의 몸 주변을\n물로 만든 베일로 덮는다.\n매 턴 HP를 회복한다."
aqua_tail:
  names:
    jp_kana: アクアテール
    jp_kanji: アクアテール
    en: Aqua Tail
    fr: Hydroqueue
    it: Idrondata
    de: Nassschweif
    es: Acua Cola
    ko: 아쿠아테일
  descriptions:
    jp_kana: "はげしく　あれくるう　あらなみの　ように\nおおきな　しっぽを　ふって\nあいてを　こうげきする。"
    jp_kanji: "激しく　あれくるう　荒波の　ように\n大きな　しっぽを　ふって\n相手を　攻撃する。"
    en: "The user attacks by swinging its tail as if\nit were a vicious wave in a raging storm."
    fr: "Le lanceur attaque en balançant sa\nqueue comme une lame de fond en\npleine tempête."
    it: "Chi la usa attacca agitando la coda\ncome se fosse una violenta ondata\nin una tempesta furiosa."
    de: "Anwender attackiert mit dem Schweif,\nals ob dieser eine brutale Welle in\neinem tosenden Sturm sei."
    es: "Ataca agitando la cola como si fuera\nuna ola rabiosa en una tormenta\ndevastadora."
    ko: "세차게 날뛰는 거친 파도와 같이\n큰 꼬리를 흔들어서\n상대를 공격한다."
arm_thrust:
  names:
    jp_kana: つっぱり
    jp_kanji: つっぱり
    en: Arm Thrust
    fr: Cogne
    it: Sberletese
    de: Armstoß
    es: Empujón
    ko: 손바닥치기
  descriptions:
    jp_kana: "ひらいた　りょうてで\nあいてを　つっぱって　こうげきする。\n２ー５かいの　あいだ　れんぞくで　だす。"
    jp_kanji: "ひらいた　両手で\n相手を　つっぱって　攻撃する。\n２ー５回の　あいだ　連続で　だす。"
    en: "The user looses a flurry of open-palmed\narm thrusts that hit two to five times in\na row."
    fr: "Un déluge de coups adressés avec la\npaume qui frappe de 2 à 5 fois d’affilée."
    it: "Raffica di ceffoni che colpisce da due a\ncinque volte di fila."
    de: "Schläge mit geradem Arm, die\ndas Ziel 2- bis 5-mal treffen."
    es: "Empujones directos que golpean de dos\na cinco veces seguidas."
    ko: "펼친 양손으로\n상대를 번갈아 쳐서 공격한다.\n2-5회 동안 연속으로 쓴다."
aromatherapy:
  names:
    jp_kana: アロマセラピー
    jp_kanji: アロマセラピー
    en: Aromatherapy
    fr: Aromathérapi
    it: Aromaterapia
    de: Aromakur
    es: Aromaterapia
    ko: 아로마테라피
  descriptions:
    jp_kana: "ここちよい　やすらぐ　かおりを　かがせて\nみかた　ぜんいんの\nじょうたい　いじょうを　かいふく　する。"
    jp_kanji: "心地好い　やすらぐ　香りを　かがせて\n味方全員の　状態異常を　回復する。"
    en: "The user releases a soothing scent that\nheals all status problems affecting\nthe user’s party."
    fr: "Le lanceur libère un parfum apaisant\nqui guérit tous les problèmes de\nstatut de l’équipe."
    it: "Chi la usa rilascia un dolce profumo\nche risolve tutti i problemi di stato\ndella sua squadra."
    de: "Heilt alle Statusprobleme des Teams\nmit beruhigendem Duft."
    es: "Cura todos los problemas de estado\ndel equipo con un suave aroma."
    ko: "기분 좋은 평온한 향기를 맡게 하여\n같은 편 모두의 상태 이상을 회복한다."
assist:
  names:
    jp_kana: ねこのて
    jp_kanji: ねこのて
    en: Assist
    fr: Assistance
    it: Assistente
    de: Zuschuss
    es: Ayuda
    ko: 조수
  descriptions:
    jp_kana: "おおいそぎで　みかたの　たすけを　かりて\nひかえの　ポケモンが　おぼえている\nわざを　どれか　１つ　つかう。"
    jp_kanji: "大急ぎで　味方の　助けを　かりて\n控えの　ポケモンが　おぼえている\n技を　どれか　１つ　使う。"
    en: "The user hurriedly and randomly uses a\nmove among those known by other\nPokémon in the party."
    fr: "Le lanceur se dépêche d’utiliser une\ncapacité au hasard parmi celles des\nPokémon de l’équipe."
    it: "Chi la usa utilizza in fretta e a caso una\ndelle mosse degli altri Pokémon della\nsquadra."
    de: "Greift zufällig mit einer Attacke eines\nTeampartners an."
    es: "Usa un movimiento de un miembro del equipo\nelegido al azar."
    ko: "서둘러서 같은 편의 도움을 받아\n교대 포켓몬이 기억하고 있는\n기술 중 하나를 쓴다."
assurance:
  names:
    jp_kana: ダメおし
    jp_kanji: ダメおし
    en: Assurance
    fr: Assurance
    it: Garanzia
    de: Gewissheit
    es: Buena Baza
    ko: 승부굳히기
  descriptions:
    jp_kana: "そのターンに　あいてが\nすでに　ダメージを　うけて　いたら\nわざの　いりょくは　２ばいに　なる。"
    jp_kanji: "そのターンに　相手が\nすでに　ダメージを　受けていたら\n技の　威力は　２倍に　なる。"
    en: "If the target has already taken some\ndamage in the same turn, this attack’s\npower is doubled."
    fr: "Cette attaque est deux fois plus\nefficace si l’ennemi a déjà été blessé\ndurant ce tour."
    it: "Se il nemico ha già subito dei danni nello\nstesso turno, la potenza di questa mossa\nraddoppia."
    de: "Hat der Gegner während der Runde bereits\nSchaden genommen, wird Kraft der\nAttacke verdoppelt."
    es: "Si el objetivo ya ha sufrido daño en ese\nturno, la fuerza del ataque se duplica."
    ko: "그 턴에 상대가\n이미 데미지를 입었다면\n기술의 위력은 2배가 된다."
astonish:
  names:
    jp_kana: おどろかす
    jp_kanji: おどろかす
    en: Astonish
    fr: Étonnement
    it: Sgomento
    de: Erstauner
    es: Impresionar
    ko: 놀래키기
  descriptions:
    jp_kana: "おおきな　こえなどで\nふいに　おどろかして　こうげきする。\nあいてを　ひるませる　ことが　ある。"
    jp_kanji: "大きな　声などで\n不意に　驚かして　攻撃する。\n相手を　ひるませることが　ある。"
    en: "The user attacks the target while shouting\nin a startling fashion.\nIt may also make the target flinch."
    fr: "Le lanceur attaque l’ennemi en poussant\nun cri terrifiant. Peut aussi l’apeurer."
    it: "Chi la usa attacca il bersaglio emettendo\nun verso terrificante. Può anche farlo\ntentennare."
    de: "Anwender greift mit einem Schrei an.\nEin Angriff, der das Ziel eventuell\nzurückschrecken lässt."
    es: "Impresiona tanto que puede hacer\nretroceder al objetivo."
    ko: "큰 소리 등으로\n불시에 놀래켜서 공격한다.\n상대를 풀죽게 만들 때가 있다."
attack_order:
  names:
    jp_kana: こうげきしれい
    jp_kanji: こうげきしれい
    en: Attack Order
    fr: Appel Attak
    it: Comandourto
    de: Schlagbefehl
    es: Al Ataque
    ko: 공격지령
  descriptions:
    jp_kana: "しもべを　よびだして\nあいてに　むかって　こうげき　させる。\nきゅうしょに　あたりやすい。"
    jp_kanji: "しもべを　呼びだして\n相手に　むかって　攻撃させる。\n急所に　当たりやすい。"
    en: "The user calls out its underlings to\npummel the target.\nCritical hits land more easily."
    fr: "Le lanceur appelle ses sous-fifres pour\nfrapper l’ennemi. Taux de critiques\nélevé."
    it: "Chi la usa raduna i suoi sgherri per\ncolpire il nemico. Probabile brutto colpo."
    de: "Anwender ruft seine Untergebenen zum\nAngriff. Hat eine hohe Volltrefferquote."
    es: "El usuario llama a sus súbditos\npara que ataquen al objetivo.\nSuele ser crítico."
    ko: "부하를 불러내어\n상대를 향해서 공격시킨다.\n급소에 맞기 쉽다."
attract:
  names:
    jp_kana: メロメロ
    jp_kanji: メロメロ
    en: Attract
    fr: Attraction
    it: Attrazione
    de: Anziehung
    es: Atracción
    ko: 헤롱헤롱
  descriptions:
    jp_kana: "♂なら♀を　♀なら♂を　ゆうわくして\nメロメロに　する。\nあいては　わざが　だしにくく　なる。"
    jp_kanji: "♂なら♀を　♀なら♂を　誘惑して\nメロメロに　する。\n相手は　技が　だしにくくなる。"
    en: "If it is the opposite gender of the user,\nthe target becomes infatuated and less\nlikely to attack."
    fr: "Si l’ennemi est du sexe opposé, il tombe\namoureux et rechigne alors à attaquer."
    it: "Se il nemico è del sesso opposto, s’infatua\ne attacca con meno probabilità."
    de: "Angriff auf Anwender vom anderen\nGeschlecht wird unwahrscheinlich."
    es: "Si el objetivo es del sexo opuesto,\nse enamorará y bajará la posibilidad\nde que ataque."
    ko: "수컷은 암컷을 암컷은 수컷을 유혹하여\n헤롱헤롱하게 만든다.\n상대가 기술을 쓰기 어려워진다."
aura_sphere:
  names:
    jp_kana: はどうだん
    jp_kanji: はどうだん
    en: Aura Sphere
    fr: Aurasphère
    it: Forzasfera
    de: Aurasphäre
    es: Esfera Aural
    ko: 파동탄
  descriptions:
    jp_kana: "からだの　おくから　はどうの　ちからを\nあいてに　うちはなつ。\nこうげきは　かならず　めいちゅう　する。"
    jp_kanji: "体の　奥から　波導の　力を\n相手に　うち放つ。\n攻撃は　必ず　命中する。"
    en: "The user looses a blast of aura power\nfrom deep within its body at the target.\nThis move is certain to hit."
    fr: "Le lanceur dégage une aura et projette\nde l’énergie. N’échoue jamais."
    it: "Chi la usa rilascia una forza eterea dal\nprofondo del corpo. La mossa è infallibile."
    de: "Tief aus dem Inneren des Anwenders löst\nsich ein kraftvoller Stoß Auraenergie.\nTrifft in jedem Fall."
    es: "Libera una descarga de la fuerza\ndel aura desde su interior.\nEs infalible."
    ko: "몸속에서 파동의 힘을\n끌어내 쏜다.\n공격은 반드시 명중한다."
aurora_beam:
  names:
    jp_kana: オーロラビーム
    jp_kanji: オーロラビーム
    en: Aurora Beam
    fr: Onde Boréale
    it: Raggiaurora
    de: Aurorastrahl
    es: Rayo Aurora
    ko: 오로라빔
  descriptions:
    jp_kana: "にじいろの　ビームを\nあいてに　はっしゃして　こうげきする。\nこうげきを　さげる　ことが　ある。"
    jp_kanji: "にじいろの　ビームを\n相手に　発射して　攻撃する。\n攻撃を　さげる　ことが　ある。"
    en: "The target is hit with a rainbow-colored\nbeam. This may also lower the target’s\nAttack stat."
    fr: "Envoie un rayon arc-en-ciel sur l’ennemi.\nPeut aussi baisser son Attaque."
    it: "Colpisce il nemico con un raggio dai\ncolori dell’iride. Può anche ridurne\nl’Attacco."
    de: "Regenbogenfarbener Strahl,\nder eventuell den Angriffs-Wert\ndes Zieles senkt."
    es: "Rayo multicolor que puede reducir\nel Ataque."
    ko: "무지개색의 빔을\n상대에게 발사하여 공격한다.\n공격을 떨어뜨릴 때가 있다."
autotomize:
  names:
    jp_kana: ボディパージ
    jp_kanji: ボディパージ
    en: Autotomize
    fr: Allègement
    it: Sganciapesi
    de: Autotomie
    es: Aligerar
    ko: 바디퍼지
  descriptions:
    jp_kana: "からだの　ムダな　ぶぶんを　けずる。　\nじぶんの　すばやさを　ぐーんと　あげて\nたいじゅうも　かるく　なる。"
    jp_kanji: "体の　ムダな　部分を　削る。　\n自分の　素早さを　ぐーんと　あげて\n体重も　軽くなる。"
    en: "The user sheds part of its body\nto make itself lighter and sharply\nraise its Speed stat."
    fr: "Le lanceur se débarrasse des parties\ninutiles de son corps. Son poids diminue\net sa Vitesse augmente fortement."
    it: "Chi la usa si libera di tutti i pesi in\neccesso, alleggerendosi e aumentando di\nmolto la propria Velocità."
    de: "Anwender trennt sich von überflüssigen\nKörperteilen und steigert seine Initiative\nstark. Sein Gewicht nimmt deutlich ab."
    es: "El usuario se sacude para hacerse más\nligero y aumentar mucho su Velocidad."
    ko: "몸의 쓸모없는 부분을 깎는다.\n자신의 스피드를 크게 올리고\n체중도 가벼워진다."
avalanche:
  names:
    jp_kana: ゆきなだれ
    jp_kanji: ゆきなだれ
    en: Avalanche
    fr: Avalanche
    it: Slavina
    de: Lawine
    es: Alud
    ko: 눈사태
  descriptions:
    jp_kana: "あいてから　わざを　うけていると\nその　あいてに　たいして\nわざの　いりょくが　２ばいに　なる。"
    jp_kanji: "相手から　技を　受けていると\nその　相手に　対して\n技の　威力が　２倍に　なる。"
    en: "An attack move that inflicts double the\ndamage if the user has been hurt by the\ntarget in the same turn."
    fr: "Une attaque deux fois plus puissante si le\nlanceur a été blessé par l’ennemi durant\nle tour."
    it: "Mossa d’attacco che infligge doppi danni,\nse chi la usa è stato ferito dal nemico\nnello stesso turno."
    de: "Wurde der Anwender vom Gegner in dieser\nRunde getroffen, erzeugt diese Attacke\ndoppelten Schaden."
    es: "Este ataque inflige el doble de daño\na un objetivo que haya golpeado al usuario\nen ese mismo turno."
    ko: "상대로부터 기술을 받으면\n그 상대에 대해서\n기술의 위력이 2배가 된다."
barrage:
  names:
    jp_kana: たまなげ
    jp_kanji: たまなげ
    en: Barrage
    fr: Pilonnage
    it: Att. Pioggia
    de: Stakkato
    es: Presa
    ko: 구슬던지기
  descriptions:
    jp_kana: "まるい　ものを\nあいてに　なげつけて　こうげきする。\n２ー５かいの　あいだ　れんぞくで　だす。"
    jp_kanji: "まるい　ものを\n相手に　投げつけて　攻撃する。\n２ー５回の　あいだ　連続で　だす。"
    en: "Round objects are hurled at the target\nto strike two to five times in a row."
    fr: "Projette de 2 à 5 grosses boules\nsur l’ennemi."
    it: "Piovono enormi sfere sulla testa del nemico\nda due a cinque volte di fila."
    de: "Wirft 2- bis 5-mal runde Gegenstände\nauf das Ziel."
    es: "Arroja esferas al objetivo entre dos y\ncinco veces seguidas."
    ko: "둥근 것을\n상대에게 내던져서 공격한다.\n2-5회 동안 연속으로 쓴다."
barrier:
  names:
    jp_kana: バリアー
    jp_kanji: バリアー
    en: Barrier
    fr: Bouclier
    it: Barriera
    de: Barriere
    es: Barrera
    ko: 배리어
  descriptions:
    jp_kana: "がんじょうな　かべを　つくって\nじぶんの　ぼうぎょを　ぐーんと　あげる。"
    jp_kanji: "頑丈な　壁を　つくって\n自分の　防御を　ぐーんと　あげる。"
    en: "The user throws up a sturdy wall that\nsharply raises its Defense stat."
    fr: "Le lanceur érige un mur solide qui\naugmente fortement sa Défense."
    it: "Innalza una barriera resistente che\naumenta molto la Difesa."
    de: "Erzeugt eine Barriere, die den\nVerteidigungs-Wert stark erhöht."
    es: "Crea una barrera para aumentar\nmucho la Defensa."
    ko: "튼튼한 장막을 만들어\n자신의 방어를 크게 올린다."
baton_pass:
  names:
    jp_kana: バトンタッチ
    jp_kanji: バトンタッチ
    en: Baton Pass
    fr: Relais
    it: Staffetta
    de: Staffette
    es: Relevo
    ko: 바톤터치
  descriptions:
    jp_kana: "ひかえの　ポケモンと　いれかわる。\nのうりょく　へんかは　かわった\nポケモンが　そのまま　うけつぐ。"
    jp_kanji: "控えの　ポケモンと　入れ替わる。\n能力変化は　替わった\nポケモンが　そのまま　受けつぐ。"
    en: "The user switches places with a party\nPokémon in waiting, passing along any\nstat changes."
    fr: "Le lanceur échange sa place et tout\nchangement de stat avec un Pokémon\nde l’équipe."
    it: "Chi la usa è sostituito da un Pokémon\ndella squadra, che eredita anche ogni\nmodifica alle statistiche."
    de: "Tauscht Pokémon aus. Alle\nStatusveränderungen\nbleiben bestehen."
    es: "Cambia el puesto con un compañero y le\npasa los cambios de características."
    ko: "교대 포켓몬과 바뀐다.\n능력 변화는 바뀐 포켓몬이\n그대로 이어받는다."
beat_up:
  names:
    jp_kana: ふくろだたき
    jp_kanji: ふくろだたき
    en: Beat Up
    fr: Baston
    it: Picchiaduro
    de: Prügler
    es: Paliza
    ko: 집단구타
  descriptions:
    jp_kana: "みかた　ぜんいんで　こうげきする。\nなかまの　ポケモンが　おおいほど\nわざの　こうげきかいすうが　ふえる。"
    jp_kanji: "味方　全員で　攻撃する。\n仲間の　ポケモンが　多いほど\n技の　攻撃回数が　増える。"
    en: "The user gets all party Pokémon to attack\nthe target. The more party Pokémon,\nthe greater the number of attacks."
    fr: "Le lanceur appelle tous les Pokémon de\nson équipe à attaquer. Plus ils sont\nnombreux, plus il y a d’attaques."
    it: "Chi la usa chiama in aiuto i Pokémon della\nsquadra: più ce ne sono, maggiore è\nil numero di attacchi."
    de: "Das gesamte Team nimmt aktiv am Kampf\nteil. Je mehr Pokémon, desto höher die\nAnzahl der Angriffe."
    es: "Ataque de todo el equipo Pokémon.\nCuantos más haya, más veces ataca."
    ko: "같은 편 전원이 공격한다.\n동료 포켓몬이 많을수록\n기술의 공격 횟수가 증가한다."
belly_drum:
  names:
    jp_kana: はらだいこ
    jp_kanji: はらだいこ
    en: Belly Drum
    fr: Cognobidon
    it: Panciamburo
    de: Bauchtrommel
    es: Tambor
    ko: 배북
  descriptions:
    jp_kana: "じぶんの　ＨＰを　さいだい　ＨＰの\nはんぶん　へらして　じぶんの　こうげきを\nさいだいに　あげる。"
    jp_kanji: "自分の　ＨＰを　最大ＨＰの\n半分　減らして　自分の　攻撃を\n最大に　あげる。"
    en: "The user maximizes its Attack stat in\nexchange for HP equal to half its max HP."
    fr: "Améliore l’Attaque au maximum en\nsacrifiant la moitié des PV max."
    it: "Chi la usa massimizza l’Attacco in cambio\ndi metà dei PS massimi."
    de: "Der Anwender maximiert den Angriffs-Wert\nauf Kosten der Hälfte seiner maximalen KP."
    es: "Reduce la mitad de los PS máximos\npara mejorar al máximo el Ataque."
    ko: "자신의 HP를 최대 HP의\n절반으로 감소시켜 자신의 공격을\n최대로 올린다."
bestow:
  names:
    jp_kana: ギフトパス
    jp_kanji: ギフトパス
    en: Bestow
    fr: Passe-Cadeau
    it: Cediregalo
    de: Offerte
    es: Ofrenda
    ko: 기프트패스
  descriptions:
    jp_kana: "あいてが　どうぐを　もっていない　とき\nじぶんが　もっている　どうぐを\nあいてに　わたす。"
    jp_kanji: "相手が　道具を　持っていないとき\n自分が　持っている　道具を\n相手に　わたす。"
    en: "The user passes its held item to the\ntarget when the target isn’t holding\nan item."
    fr: "Si la cible ne tient pas d’objet, le\nlanceur lui donne l’objet qu’il tient."
    it: "Chi la usa consegna il proprio strumento\nal bersaglio se ne è sprovvisto."
    de: "Trägt das Ziel gerade kein Item bei sich,\nerhält es das Item, das sich aktuell im\nBesitz des Anwenders befindet."
    es: "Entrega el objeto que lleva al objetivo\nen caso de que este no tenga ninguno."
    ko: "상대가 도구를 지니고 있지 않을 때\n자신이 지니고 있는 도구를\n상대에게 건넨다."
bide:
  names:
    jp_kana: がまん
    jp_kanji: がまん
    en: Bide
    fr: Patience
    it: Pazienza
    de: Geduld
    es: Venganza
    ko: 참기
  descriptions:
    jp_kana: "２ターンの　あいだ　こうげきに　たえて\nうけた　ダメージを　２ばいに　して\nあいてに　かえす。"
    jp_kanji: "２ターンの　あいだ　攻撃に　たえて\n受けた　ダメージを　２倍にして\n相手に　返す。"
    en: "The user endures attacks for two\nturns, then strikes back to cause\ndouble the damage taken."
    fr: "Le lanceur encaisse les coups durant 2\ntours et réplique en infligeant le double\ndes dégâts subis."
    it: "Chi la usa subisce attacchi per due turni\ne poi restituisce il danno moltiplicato\nper due."
    de: "Erträgt zwei Runden Angriffe und schlägt\ndann mit dem doppelten Wert des erlittenen\nSchadens zurück."
    es: "Espera dos turnos para atacar\ncon el doble de potencia del\ndaño recibido."
    ko: "2턴 동안 공격을 견뎌\n입은 데미지를 2배로 만들어\n상대에게 돌려준다."
bind:
  names:
    jp_kana: しめつける
    jp_kanji: しめつける
    en: Bind
    fr: Étreinte
    it: Legatutto
    de: Klammergriff
    es: Atadura
    ko: 조이기
  descriptions:
    jp_kana: "ながい　からだや　つるなどを　つかい\n４ー５ターンの　あいだ　\nあいてを　しめつけて　こうげきする。"
    jp_kanji: "長い　体や　つるなどを　使い\n４ー５ターンの　あいだ　\n相手を　締めつけて　攻撃する。"
    en: "Things such as long bodies or tentacles\nare used to bind and squeeze\nthe target for four to five turns."
    fr: "Ligote l’ennemi avec les tentacules\nou le corps pour l’écraser\ndurant 4 à 5 tours."
    it: "Lega e stritola il nemico per quattro\no cinque turni con tentacoli o con un\ncorpo lungo."
    de: "Umklammert und quetscht das\nZiel über 2 bis 5 Runden."
    es: Ata y oprime de cuatro a cinco turnos.
    ko: "긴 몸이나 덩굴 등을 써서\n4-5턴 동안\n상대를 조여 공격한다."
bite:
  names:
    jp_kana: かみつく
    jp_kanji: かみつく
    en: Bite
    fr: Morsure
    it: Morso
    de: Biss
    es: Mordisco
    ko: 물기
  descriptions:
    jp_kana: "するどく　とがった　はで\nかみついて　こうげきする。\nあいてを　ひるませる　ことが　ある。"
    jp_kanji: "鋭く　とがった　歯で\nかみついて　攻撃する。\n相手を　ひるませることが　ある。"
    en: "The target is bitten\nwith viciously sharp fangs.\nIt may make the target flinch."
    fr: "L’ennemi est mordu par de tranchantes\ncanines. Peut l’apeurer."
    it: "Il nemico viene morso da denti affilatissimi\nche possono farlo tentennare."
    de: "Beißt zu und lässt das Ziel\neventuell zurückschrecken."
    es: "Un voraz bocado que puede hacer\nretroceder al objetivo."
    ko: "날카롭고 뾰족한 이빨로\n물어서 공격한다.\n상대를 풀죽게 만들 때가 있다."
blast_burn:
  names:
    jp_kana: ブラストバーン
    jp_kanji: ブラストバーン
    en: Blast Burn
    fr: Rafale Feu
    it: Incendio
    de: Lohekanonade
    es: Anillo Ígneo
    ko: 블러스트번
  descriptions:
    jp_kana: "ばくはつの　ほのおで\nあいてを　やきつくして　こうげきする。\nつぎの　ターンは　うごけなく　なる。"
    jp_kanji: "爆発の　炎で\n相手を　焼きつくして　攻撃する。\n次の　ターンは　動けなくなる。"
    en: "The target is razed by a fiery explosion.\nThe user must rest on the\nnext turn, however."
    fr: "Une explosion ardente souffle\nl’adversaire. Le lanceur doit\nse reposer au tour suivant."
    it: "Potente esplosione che danneggia\nil nemico, ma fa saltare il turno\nsuccessivo a chi la provoca."
    de: "Das Ziel wird von starker Explosion\ngetroffen. Angreifer setzt eine\nRunde aus."
    es: "Explosión de fuego. El atacante debe\ndescansar el siguiente turno."
    ko: "폭발하는 불꽃으로\n상대를 태워서 공격한다.\n다음 턴은 움직일 수 없다."
blaze_kick:
  names:
    jp_kana: ブレイズキック
    jp_kanji: ブレイズキック
    en: Blaze Kick
    fr: Pied Brûleur
    it: Calciardente
    de: Feuerfeger
    es: Patada Ígnea
    ko: 브레이즈킥
  descriptions:
    jp_kana: "こうげきした　あいてを\nやけど　じょうたいに　することが　ある。\nきゅうしょにも　あたりやすい。"
    jp_kanji: "攻撃した　相手を\nやけど状態に　することが　ある。\n急所にも　当たりやすい。"
    en: "The user launches a kick that lands a\ncritical hit more easily.\nIt may also leave the target with a burn."
    fr: "Le lanceur envoie un coup de pied\nau taux de critiques élevé.\nPeut aussi brûler la cible."
    it: "Chi la usa tira un calcio. Probabile brutto\ncolpo. Può anche causare una scottatura."
    de: "Starker Tritt mit hoher Volltrefferquote.\nVerursacht eventuell Verbrennung."
    es: "Patada que suele ser un golpe crítico\ny puede causar quemaduras."
    ko: "공격한 상대를\n화상 상태로 만들 때가 있다.\n급소에도 맞기 쉽다."
blizzard:
  names:
    jp_kana: ふぶき
    jp_kanji: ふぶき
    en: Blizzard
    fr: Blizzard
    it: Bora
    de: Blizzard
    es: Ventisca
    ko: 눈보라
  descriptions:
    jp_kana: "はげしい　ふぶきを\nあいてに　ふきつけて　こうげきする。\nこおり　じょうたいに　することが　ある。"
    jp_kanji: "激しい　吹雪を\n相手に　吹きつけて　攻撃する。\nこおり状態に　することが　ある。"
    en: "A howling blizzard is summoned to strike\nthe opposing team. It may also freeze\nthem solid."
    fr: "Une violente tempête de neige\nest déclenchée sur l’ennemi.\nPeut aussi le geler."
    it: "Colpisce i bersagli con una tremenda\ntempesta di ghiaccio che può anche\ncongelarli."
    de: "Ein Schneesturm wütet, der das\nZiel einfrieren kann."
    es: "Tormenta de hielo que puede llegar\na congelar."
    ko: "세찬 눈보라를\n상대에게 내뿜어 공격한다.\n얼음 상태로 만들 때가 있다."
block:
  names:
    jp_kana: とおせんぼう
    jp_kanji: とおせんぼう
    en: Block
    fr: Barrage
    it: Blocco
    de: Rückentzug
    es: Bloqueo
    ko: 블록
  descriptions:
    jp_kana: "りょうてを　ひろげて　たちはだかり\nあいての　にげみちを　ふさいで\nにげられなく　する。"
    jp_kanji: "両手を　ひろげて　たちはだかり\n相手の　逃げ道を　ふさいで\n逃げられなくする。"
    en: "The user blocks the target’s way with arms\nspread wide to prevent escape."
    fr: "Le lanceur bloque la route de l’ennemi\npour empêcher sa fuite."
    it: "Chi la usa sbarra la strada al nemico\nimpedendone la fuga o la sostituzione."
    de: "Anwender versperrt den Fluchtweg des\nZieles."
    es: "Le corta el paso al objetivo para que\nno pueda escapar."
    ko: "양팔을 벌려 막아서서\n상대의 도주로를 가로막아\n도망칠 수 없게 한다."
blue_flare:
  names:
    jp_kana: あおいほのお
    jp_kanji: あおいほのお
    en: Blue Flare
    fr: Flamme Bleue
    it: Fuocoblu
    de: Blauflammen
    es: Llama Azul
    ko: 푸른불꽃
  descriptions:
    jp_kana: "うつくしくも　はげしい　あおいほのおで\nあいてを　つつみこんで　こうげきする。\nやけど　じょうたいに　することが　ある。"
    jp_kanji: "美しくも　激しい　青い炎で\n相手を　包みこんで　攻撃する。\nやけど状態に　することが　ある。"
    en: "The user attacks by engulfing the target\nin an intense, yet beautiful, blue flame.\nIt may leave the target with a burn."
    fr: "De magnifiques et redoutables flammes\nbleues fondent sur l’ennemi.\nPeut aussi le brûler."
    it: "Chi la usa attacca il bersaglio\navvolgendolo con magnifiche e intense\nfiamme blu che possono anche scottarlo."
    de: "Anwender greift an, indem er das Ziel in\nwunderschöne, intensiv blaue Flammen\nhüllt, die es eventuell verbrennen."
    es: "Ataca con una bella pero potente\nllama azul que rodea al objetivo.\nPuede quemarlo."
    ko: "아름다우면서도 격렬한 푸른불꽃으로\n상대를 둘러싸서 공격한다.\n화상 상태로 만들 때가 있다."
body_slam:
  names:
    jp_kana: のしかかり
    jp_kanji: のしかかり
    en: Body Slam
    fr: Plaquage
    it: Corposcontro
    de: Bodyslam
    es: Golpe Cuerpo
    ko: 누르기
  descriptions:
    jp_kana: "からだ　ぜんたいで\nあいてに　のしかかり　こうげきする。\nまひ　じょうたいに　することが　ある。"
    jp_kanji: "全身で\n相手に　のしかかり　攻撃する。\nまひ状態に　することが　ある。"
    en: "The user drops onto the target\nwith its full body weight. It may also\nleave the target with paralysis."
    fr: "Le lanceur se laisse tomber sur l’ennemi\nde tout son poids. Peut le paralyser."
    it: "Chi la usa carica il nemico con tutto\nil corpo. Può causarne anche la paralisi."
    de: "Trifft das Ziel mit vollem\nKörpereinsatz. Bewirkt\neventuell Paralyse."
    es: "Salta sobre el objetivo con todo su peso.\nPuede paralizar."
    ko: "몸 전체로\n상대를 덮쳐 눌러 공격한다.\n마비 상태로 만들 때가 있다."
bolt_strike:
  names:
    jp_kana: らいげき
    jp_kanji: らいげき
    en: Bolt Strike
    fr: ChargeFoudre
    it: Lucesiluro
    de: Blitzschlag
    es: At. Fulgor
    ko: 뇌격
  descriptions:
    jp_kana: "ぼうだいな　でんきを　みに　まとって\nあいてに　とっしんして　こうげきする。\nまひ　じょうたいに　することが　ある。"
    jp_kanji: "ぼうだいな　電気を　身に　まとって\n相手に　突進して　攻撃する。\nまひ状態に　することが　ある。"
    en: "The user charges its target, surrounding\nitself with a great amount of electricity.\nIt may leave the target with paralysis."
    fr: "S’enveloppe d’une charge électrique\nsurpuissante et se jette sur l’ennemi.\nPeut aussi le paralyser."
    it: "Colpisce il bersaglio con una possente\ncarica elettrica e può anche paralizzarlo."
    de: "Lädt seinen Körper mit einer gewaltigen\nMenge an Elektrizität auf und rammt damit\ndas Ziel. Ziel wird evtl. paralysiert."
    es: "Ataca envolviéndose de una gran\ncarga eléctrica y embistiendo al\nobjetivo con ella. Puede paralizar."
    ko: "방대한 전기를 몸에 둘러\n상대에게 돌진해서 공격한다.\n마비 상태로 만들 때가 있다."
bone_club:
  names:
    jp_kana: ホネこんぼう
    jp_kanji: ホネこんぼう
    en: Bone Club
    fr: Massd’Os
    it: Ossoclava
    de: Knochenkeule
    es: Hueso Palo
    ko: 뼈다귀치기
  descriptions:
    jp_kana: "てに　もった　ホネで\nあいてを　なぐりつけて　こうげきする。\nあいてを　ひるませる　ことが　ある。"
    jp_kanji: "手に　持った　ホネで\n相手を　なぐりつけて　攻撃する。\n相手を　ひるませることが　ある。"
    en: "The user clubs the target with a bone.\nIt may also make the target flinch."
    fr: "Le lanceur frappe l’ennemi à grands\ncoups d’os. Peut aussi apeurer l’ennemi."
    it: "Chi la usa colpisce il nemico con un osso e\npuò farlo anche tentennare."
    de: "Schlägt das Ziel mit einer Keule\nund verschreckt es eventuell."
    es: "Aporrea con un hueso.\nPuede hacer retroceder al objetivo."
    ko: "손에 들고 있는 뼈로\n상대를 세게 때려서 공격한다.\n상대를 풀죽게 만들 때가 있다."
bone_rush:
  names:
    jp_kana: ボーンラッシュ
    jp_kanji: ボーンラッシュ
    en: Bone Rush
    fr: Charge-Os
    it: Ossoraffica
    de: Knochenhatz
    es: Ataque Óseo
    ko: 본러쉬
  descriptions:
    jp_kana: "かたい　ホネで\nあいてを　なぐりつけて　こうげきする。\n２ー５かいの　あいだ　れんぞくで　だす。"
    jp_kanji: "硬い　ホネで\n相手を　なぐりつけて　攻撃する。\n２ー５回の　あいだ　連続で　だす。"
    en: "The user strikes the target with a hard\nbone two to five times in a row."
    fr: "Le lanceur frappe l’ennemi\n2 à 5 fois avec un os."
    it: "Chi la usa colpisce il nemico con un osso\nda due a cinque volte di fila."
    de: "Greift Ziel 2- bis 5-mal in Folge mit\neinem harten Knochen an."
    es: "Hueso en ristre, aporrea al objetivo\nde dos a cinco veces."
    ko: "단단한 뼈로\n상대를 세게 때려서 공격한다.\n2-5회 동안 연속으로 쓴다."
bonemerang:
  names:
    jp_kana: ホネブーメラン
    jp_kanji: ホネブーメラン
    en: Bonemerang
    fr: Osmerang
    it: Ossomerang
    de: Knochmerang
    es: Huesomerang
    ko: 뼈다귀부메랑
  descriptions:
    jp_kana: "てに　もった　ホネを　あいてに　なげつけ\nいきと　かえりで　２かい　れんぞくで\nダメージを　あたえる。"
    jp_kanji: "手に　持った　ホネを　相手に　投げつけ\n行きと　帰りの　２回連続で\nダメージを　与える。"
    en: "The user throws the bone it holds. The\nbone loops to hit the target twice,\ncoming and going."
    fr: "Le lanceur projette son os comme un\nboomerang. Cette attaque frappe à\nl’aller et au retour."
    it: "Chi la usa lancia l’osso che tiene. L’osso\ncolpisce due volte e ritorna come un vero\ne proprio boomerang."
    de: "Ein Bumerang aus Knochen, der\nzweimal trifft."
    es: "Lanza un hueso a modo de bumerán\nque golpea dos veces."
    ko: "손에 들고 있는 뼈를 상대에게 날려서\n날아갈 때와 돌아올 때 2회 연속\n데미지를 준다."
bounce:
  names:
    jp_kana: とびはねる
    jp_kanji: とびはねる
    en: Bounce
    fr: Rebond
    it: Rimbalzo
    de: Sprungfeder
    es: Bote
    ko: 뛰어오르다
  descriptions:
    jp_kana: "そらたかく　とびはねて\n２ターンめに　あいてを　こうげきする。\nまひ　じょうたいに　することが　ある。"
    jp_kanji: "空高く　飛び跳ねて\n２ターン目に　相手を　攻撃する。\nまひ状態に　することが　ある。"
    en: "The user bounces up high, then drops on\nthe target on the second turn. It may\nalso leave the target with paralysis."
    fr: "Le lanceur bondit très haut et plonge\nsur l’ennemi au 2ᵉ tour. Peut aussi\nparalyser l’ennemi."
    it: "Chi la usa balza in alto e ricade sul nemico\ndopo un turno. Può anche paralizzare."
    de: "Angreifer springt und landet in der\nnächsten Runde auf dem Ziel. Das\nZiel wird eventuell paralysiert."
    es: "Primer turno: bota.\nSegundo turno: golpea.\nPuede paralizar."
    ko: "하늘 높이 뛰어올라\n2턴째에 상대를 공격한다.\n마비 상태로 만들 때가 있다."
brave_bird:
  names:
    jp_kana: ブレイブバード
    jp_kanji: ブレイブバード
    en: Brave Bird
    fr: Rapace
    it: Baldeali
    de: Sturzflug
    es: Pájaro Osado
    ko: 브레이브버드
  descriptions:
    jp_kana: "はねを　おりたたみ\nていくう　ひこうで　とつげきする。\nじぶんも　かなり　ダメージを　うける。"
    jp_kanji: "はねを　おりたたみ\n低空飛行で　突撃する。\n自分も　かなり　ダメージを　受ける。"
    en: "The user tucks in its wings and charges\nfrom a low altitude.\nThe user also takes serious damage."
    fr: "Le lanceur replie ses ailes et charge\nen rase-mottes. Le lanceur subit aussi\nde graves dégâts."
    it: "Chi la usa si nasconde sotto le ali e carica\nda bassa quota. Tuttavia, subisce\nconsiderevoli danni."
    de: "Anwender greift aus niedriger Höhe an.\nEr erleidet bei dieser Attacke selbst\ngroßen Schaden."
    es: "Pliega sus alas y ataca con un vuelo\nrasante. El Pokémon que lo usa\ntambién resulta seriamente dañado."
    ko: "날개를 접어\n저공비행으로 돌격한다.\n자신도 상당한 데미지를 입는다."
brick_break:
  names:
    jp_kana: かわらわり
    jp_kanji: かわらわり
    en: Brick Break
    fr: Casse-Brique
    it: Breccia
    de: Durchbruch
    es: Demolición
    ko: 깨트리다
  descriptions:
    jp_kana: "しゅとうを　いきおいよく　ふりおろして\nあいてを　こうげきする。ひかりのかべや\nリフレクターも　はかいできる。"
    jp_kanji: "手刀を　勢いよく　振りおろして\n相手を　攻撃する。ひかりのかべや\nリフレクターも　破壊できる。"
    en: "The user attacks with a swift chop. It\ncan also break any barrier such as Light\nScreen and Reflect."
    fr: "Une attaque avec le tranchant de la main.\nPermet aussi de  briser les barrières\ncomme Mur Lumière et Protection."
    it: "Colpisce il nemico con una mano e rompe\nbarriere come Riflesso e Schermoluce."
    de: "Ein beherzter Handkantenschlag.\nDurchbricht Barrieren wie Lichtschild\nund Reflektor."
    es: "Potente ataque que también es capaz\nde destruir barreras como\nPantalla de Luz y Reflejo."
    ko: "수도로 기세 좋게 내려쳐서\n상대를 공격한다. 빛의장막이나\n리플렉터도 파괴할 수 있다."
brine:
  names:
    jp_kana: しおみず
    jp_kanji: しおみず
    en: Brine
    fr: Saumure
    it: Acquadisale
    de: Lake
    es: Salmuera
    ko: 소금물
  descriptions:
    jp_kana: "あいてが　ＨＰの　はんぶん　くらい\nきずを　おっていると　わざの　いりょくが\n２ばいに　なる。"
    jp_kanji: "相手が　ＨＰの　半分くらい\nきずを　おっていると　技の　威力が\n２倍に　なる。"
    en: "If the target’s HP is down to about half,\nthis attack will hit with double\nthe power."
    fr: "Cette attaque est deux fois plus\npuissante lorsque l’ennemi a moins\nde la moitié de ses PV."
    it: "Se i PS del nemico sono scesi a metà o\nmeno, questa mossa colpirà con il doppio\ndella forza."
    de: "Hat das Ziel die Hälfte oder weniger\nseiner maximalen KP, trifft diese Attacke\nmit doppelter Kraft."
    es: "Si al objetivo le queda la mitad o menos\nde sus PS, el ataque será el doble\nde fuerte."
    ko: "상대가 HP의 절반 정도\n상처를 입고 있으면 기술의\n위력이 2배가 된다."
bubble:
  names:
    jp_kana: あわ
    jp_kanji: あわ
    en: Bubble
    fr: Écume
    it: Bolla
    de: Blubber
    es: Burbuja
    ko: 거품
  descriptions:
    jp_kana: "むすうの　あわを　あいてに　ふきかけて\nこうげきする。あいての　すばやさを\nさげることが　ある。"
    jp_kanji: "無数の　泡を　相手に　吹きかけて\n攻撃する。相手の　素早さを\nさげることが　ある。"
    en: "A spray of countless bubbles is jetted at\nthe opposing team. It may also lower the\ntargets’ Speed stats."
    fr: "Des bulles frappent l’ennemi.\nPeut réduire sa Vitesse."
    it: "Una pioggia di bolle investe i nemici e può\nanche ridurne la Velocità."
    de: "Angriff mit Blasen. Initiative-Wert des\nGegners wird eventuell gesenkt."
    es: "Lanza burbujas al contrincante y puede\nreducir su Velocidad."
    ko: "매우 많은 거품을 상대에게 내뿜어\n공격한다. 상대의 스피드를\n떨어뜨릴 때가 있다."
bubble_beam:
  names:
    jp_kana: バブルこうせん
    jp_kanji: バブルこうせん
    en: BubbleBeam
    fr: Bulles d’O
    it: Bollaraggio
    de: Blubbstrahl
    es: Rayo Burbuja
    ko: 거품광선
  descriptions:
    jp_kana: "あわを　いきおいよく\nあいてに　はっしゃして　こうげきする。\nすばやさを　さげる　ことが　ある。"
    jp_kanji: "泡を　勢いよく\n相手に　発射して　攻撃する。\n素早さを　さげる　ことが　ある。"
    en: "A spray of bubbles is forcefully ejected\nat the opposing team. It may also lower\ntheir Speed stats."
    fr: "Des bulles sont envoyées avec\npuissance sur l’ennemi. Peut\naussi baisser sa Vitesse."
    it: "Colpisce il nemico con una forte scarica\ndi bolle. Può anche ridurne la Velocità."
    de: "Versprüht Blasen, die eventuell den\nInitiative-Wert des Zieles senken."
    es: "Diluvio de burbujas que puede bajar\nla Velocidad."
    ko: "거품을 기세 좋게\n상대에게 발사하여 공격한다.\n스피드를 떨어뜨릴 때가 있다."
bug_bite:
  names:
    jp_kana: むしくい
    jp_kanji: むしくい
    en: Bug Bite
    fr: Piqûre
    it: Coleomorso
    de: Käferbiss
    es: Picadura
    ko: 벌레먹음
  descriptions:
    jp_kana: "かみついて　こうげきする。\nあいてが　きのみを　もっている　とき\nたべて　きのみの　こうかを　うけられる。"
    jp_kanji: "かみついて　攻撃する。\n相手が　きのみを　持っているとき\n食べて　きのみの　効果を　受けられる。"
    en: "The user bites the target. If the target\nis holding a Berry, the user eats it and\ngains its effect."
    fr: "Le lanceur pique l’ennemi. Si ce dernier\ntient une Baie, le lanceur la dévore et\nobtient son effet."
    it: "Chi la usa morde il nemico. Inoltre, se\nquesti tiene una Bacca, gliela ruba e ne\nsfrutta gli effetti."
    de: "Anwender beißt das Ziel. Hält dieses\neine Beere, isst der Anwender sie und\nerhält ihren Effekt."
    es: "Pica al objetivo. Si el objetivo lleva\nuna Baya, el usuario se la come y\nse beneficia de su efecto."
    ko: "물어서 공격한다.\n상대가 나무열매를 지니고 있을 때\n먹어서 나무열매의 효과를 받을 수 있다."
bug_buzz:
  names:
    jp_kana: むしのさざめき
    jp_kanji: むしのさざめき
    en: Bug Buzz
    fr: Bourdon
    it: Ronzio
    de: Käfergebrumm
    es: Zumbido
    ko: 벌레의야단법석
  descriptions:
    jp_kana: "はねの　しんどうで　おんぱを　おこして\nこうげきする。あいての　とくぼうを\nさげることが　ある。"
    jp_kanji: "はねの　振動で　音波を　おこして\n攻撃する。相手の　特防を\nさげることが　ある。"
    en: "The user vibrates its wings to generate a\ndamaging sound wave. It may also lower\nthe target’s Sp. Def stat."
    fr: "Le lanceur fait vibrer ses ailes pour\nlancer une vague sonique. Peut aussi\nbaisser la Défense Spéciale de l’ennemi."
    it: "Chi la usa fa vibrare le ali creando\nun’onda sonora pericolosa. Può anche\nridurre la Difesa Speciale del nemico."
    de: "Anwender schlägt mit den Flügeln und\nerzeugt eine Schockwelle. Senkt evtl.\nSpezial-Verteidigung des Zieles."
    es: "El movimiento de las alas crea una onda\nsónica dañina. También puede disminuir\nla Defensa Especial del objetivo."
    ko: "날개의 진동으로 음파를 일으켜서\n공격한다. 상대의 특수방어를\n떨어뜨릴 때가 있다."
bulk_up:
  names:
    jp_kana: ビルドアップ
    jp_kanji: ビルドアップ
    en: Bulk Up
    fr: Gonflette
    it: Granfisico
    de: Protzer
    es: Corpulencia
    ko: 벌크업
  descriptions:
    jp_kana: "からだに　ちからを　こめて　きんにくを\nぶあつく　することで　じぶんの\nこうげきと　ぼうぎょを　あげる。"
    jp_kanji: "体に　力を　こめて\n筋肉を　ぶあつく　することで\n自分の　攻撃と　防御を　あげる。"
    en: "The user tenses its muscles to bulk up\nits body, boosting both its Attack and\nDefense stats."
    fr: "Le lanceur tend ses muscles pour se\ngonfler, ce qui booste son Attaque\net sa Défense."
    it: "Chi la usa tende i muscoli per gonfiare\nil corpo, aumentando Difesa e Attacco."
    de: "Pumpt den Körper auf, um den Angriff\nund die Verteidigung zu erhöhen."
    es: "Robustece el cuerpo para subir el Ataque\ny la Defensa."
    ko: "몸에 힘을 담아\n근육을 두껍게 해서\n자신의 공격과 방어를 올린다."
bulldoze:
  names:
    jp_kana: じならし
    jp_kanji: じならし
    en: Bulldoze
    fr: Piétisol
    it: Battiterra
    de: Dampfwalze
    es: Terratemblor
    ko: 땅고르기
  descriptions:
    jp_kana: "じめんを　ふみならして　じぶんの\nまわりに　いるものを　こうげきする。\nあいての　すばやさを　さげる。"
    jp_kanji: "地面を　踏みならして　自分の\n周りに　いるものを　攻撃する。\n相手の　素早さを　さげる。"
    en: "The user stomps down on the ground\nand attacks everything in the area. Hit\nPokémon’s Speed stat is reduced."
    fr: "Le lanceur piétine le sol et inflige des\ndégâts à tous les Pokémon autour\nde lui. Baisse aussi la Vitesse."
    it: "Chi la usa calpesta il terreno e scatena un\nterremoto che danneggia tutti i Pokémon\nnei paraggi e ne riduce anche la Velocità."
    de: "Anwender greift an, indem er den Boden\num sich herum plattwalzt. Die Initiative\naller betroffenen Pokémon sinkt."
    es: "Ataca con una sacudida sísmica que afecta\na los Pokémon adyacentes en combate y\nbaja su Velocidad."
    ko: "땅을 힘껏 밟아서 자신의\n주위에 있는 포켓몬을 공격한다.\n상대의 스피드를 떨어뜨린다."
bullet_punch:
  names:
    jp_kana: バレットパンチ
    jp_kanji: バレットパンチ
    en: Bullet Punch
    fr: Pisto-Poing
    it: Pugnoscarica
    de: Patronenhieb
    es: Puño Bala
    ko: 불릿펀치
  descriptions:
    jp_kana: "だんがんの　ような　はやくて　かたい\nパンチを　あいてに　くりだす。\nかならず　せんせい　こうげき　できる。"
    jp_kanji: "弾丸の　ような　速くて　硬い\nパンチを　相手に　くりだす。\n必ず　先制攻撃　できる。"
    en: "The user strikes the target\nwith tough punches as fast as bullets.\nThis move always goes first."
    fr: "Le lanceur envoie des coups de poing aussi\nrapides que des balles de revolver. Frappe\ntoujours en premier."
    it: "Chi la usa attacca con una scarica di pugni\nveloci come proiettili. Con questa mossa\nsi colpisce per primi."
    de: "Das Ziel wird von ultraschnellen\nHieben getroffen. Erstschlaggarantie."
    es: "Ataca con fuertes puñetazos\ntan rápidos como proyectiles.\nEste movimiento siempre va primero."
    ko: "탄환처럼 빠르고 단단한\n펀치를 상대에게 날린다.\n반드시 선제공격을 할 수 있다."
bullet_seed:
  names:
    jp_kana: タネマシンガン
    jp_kanji: タネマシンガン
    en: Bullet Seed
    fr: Balle Graine
    it: Semitraglia
    de: Kugelsaat
    es: Recurrente
    ko: 기관총
  descriptions:
    jp_kana: "タネを　いきおいよく\nあいてに　はっしゃして　こうげきする。\n２ー５かいの　あいだ　れんぞくで　だす。"
    jp_kanji: "タネを　勢いよく\n相手に　発射して　攻撃する。\n２ー５回の　あいだ　連続で　だす。"
    en: "The user forcefully shoots seeds at the\ntarget. Two to five seeds are shot in\nrapid succession."
    fr: "Le lanceur mitraille l’ennemi avec une\nrafale de graines. De 2 à 5 rafales sont\nlancées à la suite."
    it: "Chi la usa spara da due a cinque raffiche\ndi semi contro il nemico in successione."
    de: "Der Anwender wirft 2- bis 5-mal\nin rascher Folge Samen auf das\nZiel."
    es: "Dispara rápido de dos a cinco ráfagas\nde semillas de manera consecutiva."
    ko: "씨앗을 기세 좋게\n상대에게 발사하여 공격한다.\n2-5회 동안 연속으로 쓴다."
calm_mind:
  names:
    jp_kana: めいそう
    jp_kanji: めいそう
    en: Calm Mind
    fr: Plénitude
    it: Calmamente
    de: Gedankengut
    es: Paz Mental
    ko: 명상
  descriptions:
    jp_kana: "しずかに　せいしんを　とういつし\nこころを　しずめる　ことで　じぶんの\nとくこうと　とくぼうを　あげる。"
    jp_kanji: "静かに　精神を　統一し\n心を　鎮めることで　自分の\n特攻と　特防を　あげる。"
    en: "The user quietly focuses its mind and\ncalms its spirit to raise its Sp. Atk and\nSp. Def stats."
    fr: "Le lanceur se concentre et fait le vide\ndans son esprit pour monter son\nAttaque Spéciale et sa Défense Spéciale."
    it: "Chi la usa, meditando, placa il proprio\nspirito per aumentare l’Attacco Speciale\ne la Difesa Speciale."
    de: "Erhöht Spezial-Angriff und\nSpezial-Verteidigung durch\nKonzentration."
    es: "Aumenta la concentración y calma\nel espíritu para subir el Ataque Especial\ny la Defensa Especial."
    ko: "조용히 정신을 통일하고\n마음을 가라앉혀서 자신의\n특수공격과 특수방어를 올린다."
camouflage:
  names:
    jp_kana: ほごしょく
    jp_kanji: ほごしょく
    en: Camouflage
    fr: Camouflage
    it: Camuffamento
    de: Tarnung
    es: Camuflaje
    ko: 보호색
  descriptions:
    jp_kana: "みずべや　くさむら　どうくつなど\nいる　ばしょに　あわせて\nじぶんの　タイプを　かえる。"
    jp_kanji: "水辺や　草むら　どうくつなど\nいる　場所に　あわせて\n自分の　タイプを　変える。"
    en: "The user’s type is changed depending on\nits environment, such as at water’s edge,\nin grass, or in a cave."
    fr: "Modifie le type du lanceur en fonction\ndu terrain, comme une berge, une\ngrotte, l’herbe, etc."
    it: "Modifica il tipo di chi la usa a seconda del\nluogo, ad esempio sull’acqua, nell’erba\no in una grotta."
    de: "Der Typ des Anwenders passt sich\nder Umgebung an, sei es im Wasser,\nim Gras oder in einer Höhle."
    es: "Modifica el tipo del Pokémon según\nel terreno de combate donde esté."
    ko: "물가나 풀밭, 동굴 등\n있는 장소에 맞춰서\n자신의 타입을 바꾼다."
captivate:
  names:
    jp_kana: ゆうわく
    jp_kanji: ゆうわく
    en: Captivate
    fr: Séduction
    it: Incanto
    de: Liebreiz
    es: Seducción
    ko: 유혹
  descriptions:
    jp_kana: "♂なら♀を　♀なら♂を　ゆうわくして\nあいての　とくこうを　がくっと　さげる。"
    jp_kanji: "♂なら♀を　♀なら♂を　誘惑して\n相手の　特攻を　がくっと　さげる。"
    en: "If it is the opposite gender of the user,\nthe target is charmed into harshly\nlowering its Sp. Atk stat."
    fr: "Si l’ennemi est de sexe opposé au\nlanceur, il est séduit et son Attaque\nSpéciale baisse fortement."
    it: "Se il nemico è del sesso opposto di chi\nla usa, sarà ammaliato e il suo Attacco\nSpeciale diminuirà di molto."
    de: "Charme-Attacke, die Spezial-Angriff\nstark senkt, falls das Ziel dem\nanderen Geschlecht angehört."
    es: "Si el objetivo es del sexo opuesto,\nqueda embelesado y baja mucho\nsu Ataque Especial."
    ko: "수컷은 암컷을 암컷은 수컷을 유혹하여\n상대의 특수공격을 크게 떨어뜨린다."
charge:
  names:
    jp_kana: じゅうでん
    jp_kanji: じゅうでん
    en: Charge
    fr: Chargeur
    it: Sottocarica
    de: Ladevorgang
    es: Carga
    ko: 충전
  descriptions:
    jp_kana: "つぎの　ターンに　だす　でんきタイプの\nわざの　いりょくを　あげる。\nじぶんの　とくぼうも　あがる。"
    jp_kanji: "次の　ターンに　だす　でんきタイプの\n技の　威力を　あげる。\n自分の　特防も　あがる。"
    en: "The user boosts the power of the Electric\nmove it uses on the next turn. It also\nraises the user’s Sp. Def stat."
    fr: "Le lanceur concentre sa puissance pour\nsa prochaine attaque Électrik.\nAugmente sa Défense Spéciale."
    it: "Potenzia la mossa di tipo Elettro usata\nsubito dopo. Aumenta anche la Difesa\nSpeciale di chi la usa."
    de: "Lädt Energie für die kommende\nElektro-Attacke auf. Erhöht die\nSpezial-Verteidigung."
    es: "Recarga energía para potenciar el\nsiguiente movimiento de tipo Eléctrico.\nTambién sube la Defensa Especial."
    ko: "다음 턴에 쓸 전기타입\n기술의 위력을 올린다.\n자신의 특수방어도 올라간다."
charge_beam:
  names:
    jp_kana: チャージビーム
    jp_kanji: チャージビーム
    en: Charge Beam
    fr: Rayon Chargé
    it: Raggioscossa
    de: Ladestrahl
    es: Rayo Carga
    ko: 차지빔
  descriptions:
    jp_kana: "でんげきの　たばを　あいてに\nはっしゃする。でんきを　ためて　じぶんの\nとくこうを　あげることが　ある。"
    jp_kanji: "電撃の　束を　相手に\n発射する。電気を　ためて　自分の\n特攻を　あげることが　ある。"
    en: "The user attacks with an electric\ncharge. The user may use any remaining\nelectricity to raise its Sp. Atk stat."
    fr: "Le lanceur tire un rayon chargé\nd’électricité. Peut aussi augmenter\nson Attaque Spéciale."
    it: "Chi la usa lancia un fascio di elettricità\nmolto intensa. Può anche aumentare il suo\nAttacco Speciale."
    de: "Ziel wird von einem Elektrostrahl\ngetroffen. Steigert eventuell Spezial-\nAngriff des Anwenders."
    es: "Lanza un rayo eléctrico contra el\nobjetivo. Puede subir el Ataque\nEspecial de quien lo usa."
    ko: "전격의 다발을 상대에게\n발사한다. 전기를 모아서 자신의\n특수공격을 올릴 때가 있다."
charm:
  names:
    jp_kana: あまえる
    jp_kanji: あまえる
    en: Charm
    fr: Charme
    it: Fascino
    de: Charme
    es: Encanto
    ko: 애교부리기
  descriptions:
    jp_kana: "かわいく　みつめて　ゆだんを　さそい\nあいての　こうげきを　がくっと　さげる。"
    jp_kanji: "かわいく　みつめて　油断を　誘い\n相手の　攻撃を　がくっと　さげる。"
    en: "The user gazes at the target rather\ncharmingly, making it less wary.\nThe target’s Attack is harshly lowered."
    fr: "Le lanceur fait les yeux doux\npour berner l’ennemi et réduire\nconsidérablement son Attaque."
    it: "Ammalia il nemico con lo sguardo per\nrenderlo meno cauto. Ne riduce molto\nl’Attacco."
    de: "Betört das Ziel und reduziert\ndessen Angriff stark."
    es: "Engatusa al objetivo y reduce bastante\nsu Ataque."
    ko: "귀엽게 바라보고 방심을 유도하여\n상대의 공격을 크게 떨어뜨린다."
chatter:
  names:
    jp_kana: おしゃべり
    jp_kanji: おしゃべり
    en: Chatter
    fr: Babil
    it: Schiamazzo
    de: Geschwätz
    es: Cháchara
    ko: 수다
  descriptions:
    jp_kana: "おぼえた　ことばで\nおんぱを　おこして　こうげきする。\nあいてを　こんらん　させることが　ある。"
    jp_kanji: "おぼえた　言葉で\n音波を　おこして　攻撃する。\n相手を　混乱させることが　ある。"
    en: "The user attacks using a sound wave\nbased on words it has learned.\nIt may also confuse the target."
    fr: "Le lanceur envoie une onde musicale en\nrécitant des mots. Peut aussi rendre\nl’ennemi confus."
    it: "Chi la usa attacca creando un’onda\nsonora con le parole imparate. Può anche\nconfondere il nemico."
    de: "Attacke mit Schallwellen.\nVerwirrt das Ziel eventuell."
    es: "Ataca con una onda sónica compuesta\npor palabras que ha aprendido. Puede\nconfundir al objetivo."
    ko: "기억한 말로\n음파를 일으켜서 공격한다.\n상대를 혼란시킬 때가 있다."
chip_away:
  names:
    jp_kana: なしくずし
    jp_kanji: なしくずし
    en: Chip Away
    fr: Attrition
    it: Insidia
    de: Zermürben
    es: Guardia Baja
    ko: 야금야금
  descriptions:
    jp_kana: "すきを　みて　けんじつに　こうげきする。\nあいての　のうりょく　へんかに　\nかんけいなく　ダメージを　あたえる。"
    jp_kanji: "すきを　みて　堅実に　攻撃する。\n相手の　能力変化に　\n関係なく　ダメージを　与える。"
    en: "Looking for an opening, the user strikes\ncontinually. The target’s stat changes\ndon’t affect this attack’s damage."
    fr: "Une attaque puissante quand l’ennemi\nbaisse sa garde. Inflige des dégâts sans\ntenir compte des changements de stats."
    it: "Chi la usa attacca non appena il bersaglio\nabbassa la guardia. Il danno inflitto\nprescinde dalle modifiche alle statistiche."
    de: "Eine durchdachte Attacke zu rechter Zeit.\nRichtet unabhängig von den Status-\nveränderungen des Zieles Schaden an."
    es: "Un ataque que busca los puntos débiles\ndel objetivo y puede causarle daño\naunque cambien sus características."
    ko: "틈을 보며 착실하게 공격한다.\n상대의 능력 변화에\n관계없이 데미지를 준다."
circle_throw:
  names:
    jp_kana: ともえなげ
    jp_kanji: ともえなげ
    en: Circle Throw
    fr: Projection
    it: Ribaltiro
    de: Überkopfwurf
    es: Llave Giro
    ko: 배대뒤치기
  descriptions:
    jp_kana: "あいてを　なげとばして\nひかえの　ポケモンを　ひきずりだす。\nやせいの　ばあいは　せんとうが　おわる。"
    jp_kanji: "相手を　投げとばして\n控えの　ポケモンを　ひきずりだす。\n野生の　場合は　戦闘が　終わる。"
    en: "The user throws the target and drags out\nanother Pokémon in its party.\nIn the wild, the battle ends."
    fr: "Projette le Pokémon ennemi et le\nremplace par un autre. Dans la\nnature, met fin au combat."
    it: "Il bersaglio è scaraventato via ed è\ncostretto a lasciare il posto a un altro.\nSe è selvatico, la lotta finisce."
    de: "Schleudert das Ziel davon und bewirkt,\ndass ein anderes Pokémon eingewechselt\nwird. Beendet Kämpfe gegen wilde Pokémon."
    es: "Lanza por los aires al objetivo y hace que\nsalga otro Pokémon. Si es uno salvaje,\nacaba el combate."
    ko: "상대를 내던져서\n교대할 포켓몬을 끌어낸다.\n야생의 경우에는 배틀이 끝난다."
clamp:
  names:
    jp_kana: からではさむ
    jp_kanji: からではさむ
    en: Clamp
    fr: Claquoir
    it: Tenaglia
    de: Schnapper
    es: Tenaza
    ko: 껍질끼우기
  descriptions:
    jp_kana: "とても　がんじょうな　ぶあつい　からに\n４ー５ターンの　あいだ\nあいてを　はさんで　こうげきする。"
    jp_kanji: "とても　頑丈な　ぶあつい　殻に\n４ー５ターンの　あいだ\n相手を　はさんで　攻撃する。"
    en: "The target is clamped and squeezed by\nthe user’s very thick and sturdy shell for\nfour to five turns."
    fr: "Le lanceur piège l’ennemi dans sa dure\ncoquille et l’écrase pendant 4 à 5 tours."
    it: "Chi la usa intrappola e stritola il nemico\ncon la sua corazza spessa e forte per\nquattro o cinque turni."
    de: "Fängt und quetscht das Ziel über\n4 bis 5 Runden durch die harte Schale\ndes Anwenders."
    es: "Atrapa y atenaza con fuerza durante\ncuatro o cinco turnos."
    ko: "매우 튼튼하고 두꺼운 껍질에\n4-5턴 동안\n상대를 끼워서 공격한다."
clear_smog:
  names:
    jp_kana: クリアスモッグ
    jp_kanji: クリアスモッグ
    en: Clear Smog
    fr: Bain de Smog
    it: Pulifumo
    de: Klärsmog
    es: Nieblaclara
    ko: 클리어스모그
  descriptions:
    jp_kana: "とくしゅな　どろの　かたまりを\nあいてに　なげつけて　こうげきする。\nのうりょく　へんかを　もとに　もどす。"
    jp_kanji: "特殊な　泥の　塊を\n相手に　投げつけて　攻撃する。\n能力変化を　もとに　もどす。"
    en: "The user attacks by throwing a clump of\nspecial mud. All status changes are\nreturned to normal."
    fr: "Le lanceur jette un tas de détritus\nspéciaux sur la cible. Les changements\nde stats de la cible sont annulés."
    it: "Attacca il bersaglio lanciandogli contro\nuna nuvola di fumo speciale, che annulla\nogni modifica alle statistiche."
    de: "Anwender greift das Ziel mit spezial-\ngefertigten Schlammklumpen an. Setzt\nStatusveränderungen zurück."
    es: "Ataca al objetivo con una extraña niebla\nque elimina sus cambios de características."
    ko: "특수한 진흙 덩어리를\n상대에게 내던져서 공격한다.\n능력 변화를 원래대로 돌린다."
close_combat:
  names:
    jp_kana: インファイト
    jp_kanji: インファイト
    en: Close Combat
    fr: Close Combat
    it: Zuffa
    de: Nahkampf
    es: A Bocajarro
    ko: 인파이트
  descriptions:
    jp_kana: "まもりを　すてて　あいての　ふところに\nとつげきする。じぶんの\nぼうぎょと　とくぼうが　さがる。"
    jp_kanji: "守りを　捨てて　相手の　ふところに\n突撃する。自分の\n防御と　特防が　さがる。"
    en: "The user fights the target up close\nwithout guarding itself. It also cuts\nthe user’s Defense and Sp. Def."
    fr: "Le lanceur combat au corps à corps sans\nse protéger. Baisse aussi sa Défense et\nsa Défense Spéciale."
    it: "Chi la usa attacca abbassando la guardia.\nLa propria Difesa e la Difesa Speciale\nsi riducono."
    de: "Nahkampf-Attacke ohne Rücksicht\nauf Verluste. Senkt Verteidigung und\nSpezial-Verteidigung des Anwenders."
    es: "Lucha abiertamente contra el objetivo sin\nprotegerse. También reduce la Defensa\ny la Defensa Especial del usuario."
    ko: "방어를 포기하고 상대 깊숙이\n돌격한다. 자신의\n방어와 특수방어가 떨어진다."
coil:
  names:
    jp_kana: とぐろをまく
    jp_kanji: とぐろをまく
    en: Coil
    fr: Enroulement
    it: Arrotola
    de: Einrollen
    es: Enrosque
    ko: 똬리틀기
  descriptions:
    jp_kana: "とぐろを　まいて　しゅうちゅう　する。\nじぶんの　こうげきと　ぼうぎょと　\nめいちゅうりつを　あげる。"
    jp_kanji: "とぐろを　まいて　集中する。\n自分の　攻撃と　防御と　\n命中率を　あげる。"
    en: "The user coils up and concentrates.\nThis raises its Attack and Defense stats\nas well as its accuracy."
    fr: "Le lanceur s’enroule sur lui-même et se\nconcentre. Son Attaque, sa Défense et\nsa Précision augmentent."
    it: "Chi la usa si concentra, aumentando\nAttacco, Difesa e precisione."
    de: "Anwender rollt sich zusammen und sammelt\nsich. Dabei werden Angriff, Verteidigung\nund Genauigkeit erhöht."
    es: "El usuario se concentra, lo que le permite\naumentar su Ataque, Defensa y Precisión."
    ko: "똬리를 틀어서 집중한다.\n자신의 공격과 방어와\n명중률을 올린다."
comet_punch:
  names:
    jp_kana: れんぞくパンチ
    jp_kanji: れんぞくパンチ
    en: Comet Punch
    fr: Poing Comète
    it: Cometapugno
    de: Kometenhieb
    es: Puño Cometa
    ko: 연속펀치
  descriptions:
    jp_kana: "どとうの　パンチで\nあいてを　なぐりつけて　こうげきする。\n２ー５かいの　あいだ　れんぞくで　だす。"
    jp_kanji: "どとうの　パンチで\n相手を　なぐりつけて　攻撃する。\n２ー５回の　あいだ　連続で　だす。"
    en: "The target is hit with a flurry of punches\nthat strike two to five times in a row."
    fr: "Une tornade de coups de poing\nqui frappe de 2 à 5 fois d’affilée."
    it: "Colpisce il nemico con una scarica di pugni\nda due a cinque volte di fila."
    de: "Trifft das Ziel 2- bis 5-mal hintereinander\nmit kräftigen Hieben."
    es: Pega de dos a cinco veces seguidas.
    ko: "노도 같은 펀치로\n상대를 세게 때려서 공격한다.\n2-5회 동안 연속으로 쓴다."
confuse_ray:
  names:
    jp_kana: あやしいひかり
    jp_kanji: あやしいひかり
    en: Confuse Ray
    fr: Onde Folie
    it: Stordiraggio
    de: Konfustrahl
    es: Rayo Confuso
    ko: 이상한빛
  descriptions:
    jp_kana: "あやしい　ひかりを　\nあいてに　みせて　まどわせる。\nあいてを　こんらん　させる。"
    jp_kanji: "怪しい　光を　\n相手に　みせて　まどわせる。\n相手を　混乱させる。"
    en: "The target is exposed to a sinister\nray that triggers confusion."
    fr: "Un rayon sinistre qui plonge l’ennemi\ndans un état de confusion."
    it: "Colpisce il nemico con un raggio funesto\nche lo confonde."
    de: "Ein fieser Strahl, der das Ziel\nverwirrt."
    es: Rayo siniestro que confunde al objetivo.
    ko: "이상한 빛을\n상대에게 비춰 당황하게 한다.\n상대를 혼란시킨다."
confusion:
  names:
    jp_kana: ねんりき
    jp_kanji: ねんりき
    en: Confusion
    fr: Choc Mental
    it: Confusione
    de: Konfusion
    es: Confusión
    ko: 염동력
  descriptions:
    jp_kana: "よわい　ねんりきを\nあいてに　おくって　こうげきする。\nあいてを　こんらん　させることが　ある。"
    jp_kanji: "弱い　念力を\n相手に　送って　攻撃する。\n相手を　混乱させることが　ある。"
    en: "The target is hit by a weak telekinetic\nforce. It may also leave the\ntarget confused."
    fr: "Une faible vague télékinésique\nfrappe l’ennemi. Peut aussi le\nplonger dans la confusion."
    it: "Colpisce il nemico con una leggera forza\ntelecinetica e può anche confonderlo."
    de: "Das Ziel wird von schwacher\ntelekinetischer Energie getroffen\nund eventuell verwirrt."
    es: "Débil ataque telequinético que puede\ncausar confusión."
    ko: "약한 염동력을\n상대에게 보내어 공격한다.\n상대를 혼란시킬 때가 있다."
constrict:
  names:
    jp_kana: からみつく
    jp_kanji: からみつく
    en: Constrict
    fr: Constriction
    it: Limitazione
    de: Umklammerung
    es: Restricción
    ko: 휘감기
  descriptions:
    jp_kana: "しょくしゅや　ツタ　などを　からみつけて\nこうげきする。あいての　すばやさを\nさげることが　ある。"
    jp_kanji: "触手や　ツタなどを　からみつけて\n攻撃する。相手の　素早さを\nさげることが　ある。"
    en: "The target is attacked with long, creeping\ntentacles or vines.\nIt may also lower the target’s Speed stat."
    fr: "De longs tentacules ou lianes attaquent\nl’ennemi. Peut aussi baisser sa Vitesse."
    it: "Colpisce il nemico con lunghi tentacoli\no piante rampicanti. Può anche ridurne\nla Velocità."
    de: "Angriff mit langen Tentakeln oder Ranken.\nSenkt eventuell den Initiative-Wert."
    es: "Constriñe para herir y puede bajar\nla Velocidad."
    ko: "촉수나 덩굴 등을 휘감아서\n공격한다. 상대의 스피드를\n떨어뜨릴 때가 있다."
conversion:
  names:
    jp_kana: テクスチャー
    jp_kanji: テクスチャー
    en: Conversion
    fr: Adaptation
    it: Conversione
    de: Umwandlung
    es: Conversión
    ko: 텍스처
  descriptions:
    jp_kana: "じぶんの　タイプを\nおぼえている　わざの　なかの\nどれか　１つと　おなじ　タイプに　する。"
    jp_kanji: "自分の　タイプを\nおぼえている　技の　なかの\nどれか　１つと　同じ　タイプに　する。"
    en: "The user changes its type to become the\nsame type as one of its moves."
    fr: "Le lanceur change de type pour prendre\ncelui de l’une de ses capacités."
    it: "Il tipo di chi la usa muta in quello di una\nsua mossa a caso."
    de: "Wandelt den Typ des Anwenders in den Typ\neiner Attacke des Anwenders um."
    es: "Cambia el tipo del usuario por el de uno\nde sus movimientos."
    ko: "자신의 타입을\n배운 기술 중 어느 하나와\n같은 타입으로 바꾼다."
conversion_2:
  names:
    jp_kana: テクスチャー２
    jp_kanji: テクスチャー２
    en: Conversion 2
    fr: Conversion 2
    it: Conversione2
    de: Umwandlung2
    es: Conversión2
    ko: 텍스처2
  descriptions:
    jp_kana: "あいてが　さいごに　つかった　わざに\nていこう　できる　ように\nじぶんの　タイプを　へんか　させる。"
    jp_kanji: "相手が　最後に　使った技に\n抵抗できる　ように\n自分の　タイプを　変化させる。"
    en: "The user changes its type to make itself\nresistant to the type of the attack the\nopponent used last."
    fr: "Le lanceur change de type pour être\nrésistant au type de la dernière\nattaque lancée par sa cible."
    it: "Chi la usa cambia tipo per rendersi\nresistente al tipo dell’ultima mossa\nusata dal bersaglio."
    de: "Anwender ändert Typ und wird gegen\nletzten Angriffstyp resistent."
    es: "El usuario cambia de tipo para hacerse\nresistente al último tipo de movimiento\nusado por el objetivo."
    ko: "상대가 마지막으로 쓴 기술에\n저항할 수 있도록\n자신의 타입을 변화시킨다."
copycat:
  names:
    jp_kana: まねっこ
    jp_kanji: まねっこ
    en: Copycat
    fr: Photocopie
    it: Copione
    de: Imitator
    es: Copión
    ko: 흉내쟁이
  descriptions:
    jp_kana: "ちょくぜんに　でた　わざを　まねして\nおなじ　わざを　だす。\nわざが　でていないと　しっぱい　する。"
    jp_kanji: "直前に　でた　技を　まねして\n同じ　技を　だす。\n技が　でていないと　失敗する。"
    en: "The user mimics the move used immediately\nbefore it. The move fails if no other move\nhas been used yet."
    fr: "Le lanceur imite la dernière capacité\nemployée. Échoue si aucune capacité\nn’a été utilisée."
    it: "Chi la usa mima l’ultima mossa eseguita dal\nnemico. Fallisce se non è stata ancora\nusata alcuna mossa."
    de: "Anwender imitiert gerade verwendete\nAttacke. Dies schlägt fehl, falls zuvor\nkeine Attacke verwendet wurde."
    es: "Imita el movimiento usado justo antes.\nEl movimiento falla si no se ha usado\naún ninguno."
    ko: "직전에 나온 기술을 흉내 내어\n같은 기술을 쓴다.\n기술이 나오지 않았으면 실패한다."
cosmic_power:
  names:
    jp_kana: コスモパワー
    jp_kanji: コスモパワー
    en: Cosmic Power
    fr: Force Cosmik
    it: Cosmoforza
    de: Kosmik-Kraft
    es: Masa Cósmica
    ko: 코스믹파워
  descriptions:
    jp_kana: "うちゅう　から　しんぴの　ちからを\nとりこむ　ことで　じぶんの\nぼうぎょと　とくぼうを　あげる。"
    jp_kanji: "宇宙から　神秘の　力を\nとりこむ　ことで\n自分の　防御と　特防を　あげる。"
    en: "The user absorbs a mystical power from\nspace to raise its Defense and\nSp. Def stats."
    fr: "Le lanceur absorbe un pouvoir mystique\nspatial qui augmente sa Défense\net sa Défense Spéciale."
    it: "Chi la usa assorbe una forza mistica\ndallo spazio che aumenta la Difesa\ne la Difesa Speciale."
    de: "Erhöht Verteidigung und\nSpezial-Verteidigung durch\neine mystische Kraft."
    es: "Sube la Defensa y la Defensa Especial\npropias con energía mística."
    ko: "우주로부터 신비한 힘을\n손에 넣음으로써\n자신의 방어와 특수방어를 올린다."
cotton_guard:
  names:
    jp_kana: コットンガード
    jp_kanji: コットンガード
    en: Cotton Guard
    fr: Cotogarde
    it: Cotonscudo
    de: Watteschild
    es: Rizo Algodón
    ko: 코튼가드
  descriptions:
    jp_kana: "フワフワの　わたげで　じぶんの\nからだを　つつみこんで　まもる。\nぼうぎょを　ぐぐーんと　あげる。"
    jp_kanji: "フワフワの　綿毛で　自分の\n体を　包みこんで　守る。\n防御を　ぐぐーんと　あげる。"
    en: "The user protects itself by wrapping\nits body in soft cotton, drastically\nraising the user’s Defense stat."
    fr: "Le lanceur se protège en s’emmitouflant\ndans du coton. Sa Défense augmente\nfortement."
    it: "Chi la usa avvolge il proprio corpo con\ndel cotone molto morbido, proteggendosi\ne aumentando moltissimo la propria Difesa."
    de: "Anwender schützt sich, indem er sich in\neinen luftigen Flaum hüllt. Erhöht die\nVerteidigung drastisch."
    es: "Cubre al Pokémon con una madeja\nprotectora. Aumenta muchísimo\nla Defensa."
    ko: "푹신푹신한 솜털로 자신의\n몸을 둘러싸서 지킨다.\n방어를 매우 크게 올린다."
cotton_spore:
  names:
    jp_kana: わたほうし
    jp_kanji: わたほうし
    en: Cotton Spore
    fr: Spore Coton
    it: Cottonspora
    de: Baumwollsaat
    es: Esporagodón
    ko: 목화포자
  descriptions:
    jp_kana: "わたのような　フワフワの　ほうしを\nまとわり　つかせて\nあいての　すばやさを　がくっと　さげる。"
    jp_kanji: "綿のような　フワフワの　胞子を\nまとわり　つかせて\n相手の　素早さを　がくっと　さげる。"
    en: "The user releases cotton-like spores\nthat cling to the target,\nharshly reducing its Speed stat."
    fr: "Le lanceur libère des spores cotonneuses\nqui collent à l’ennemi et baissent\nfortement sa Vitesse."
    it: "Rilascia spore simili al cotone che si\nattaccano al nemico e riducono di molto\nla sua Velocità."
    de: "Wattebäusche heften sich an das\nZiel. Der Initiative-Wert sinkt stark."
    es: "Adhiere esporas al objetivo para reducir\nmucho su Velocidad."
    ko: "솜처럼 폭신폭신한 포자를\n착 달라붙게 해서\n상대의 스피드를 크게 떨어뜨린다."
counter:
  names:
    jp_kana: カウンター
    jp_kanji: カウンター
    en: Counter
    fr: Riposte
    it: Contatore
    de: Konter
    es: Contador
    ko: 카운터
  descriptions:
    jp_kana: "あいてから　うけた　ぶつり　こうげきの\nダメージを　２ばいに　して\nおなじ　あいてに　かえす。"
    jp_kanji: "相手から　受けた　物理攻撃の\nダメージを　２倍に　して\n同じ　相手に　返す。"
    en: "A retaliation move that counters any\nphysical attack, inflicting double the\ndamage taken."
    fr: "Une riposte qui répond à toute\nattaque physique en infligeant\nle double de dégâts."
    it: "Mossa che contrasta ogni attacco fisico,\narrecando il doppio del danno ricevuto."
    de: "Kontert physischen Treffer und fügt dem\nGegner das Doppelte des Schadens zu,\nden der Anwender erlitten hat."
    es: Devuelve un golpe físico por duplicado.
    ko: "상대로부터 받은 물리공격의\n데미지를 2배로 만들어\n같은 상대에게 돌려준다."
covet:
  names:
    jp_kana: ほしがる
    jp_kanji: ほしがる
    en: Covet
    fr: Implore
    it: Supplica
    de: Bezirzer
    es: Antojo
    ko: 탐내다
  descriptions:
    jp_kana: "かわいく　あまえながら\nあいてに　ちかづき\nもっている　どうぐを　うばう。"
    jp_kanji: "かわいく　あまえながら\n相手に　ちかづき\n持っている　道具を　うばう。"
    en: "The user endearingly approaches\nthe target, then steals the target’s\nheld item."
    fr: "Le lanceur s’approche de la cible avec\nun air angélique afin de dérober l’objet\nqu’elle tient."
    it: "Chi la usa attacca il bersaglio sorridendo\ne gli ruba lo strumento che tiene."
    de: "Bittet charmant um das gehaltene Item\ndes Zieles und stiehlt es dann."
    es: "Se acerca con ternura al objetivo, pero le\nataca pudiendo robar el objeto que lleve."
    ko: "귀엽게 애교부리며\n상대에게 다가가\n지니고 있는 도구를 뺏는다."
crabhammer:
  names:
    jp_kana: クラブハンマー
    jp_kanji: クラブハンマー
    en: Crabhammer
    fr: Pince-Masse
    it: Martellata
    de: Krabbhammer
    es: Martillazo
    ko: 찝게햄머
  descriptions:
    jp_kana: "おおきな　ハサミを\nあいてに　たたきつけて　こうげきする。　\nきゅうしょに　あたりやすい。"
    jp_kanji: "大きな　ハサミを\n相手に　たたきつけて　攻撃する。　\n急所に　当たりやすい。"
    en: "The target is hammered with a large pincer.\nCritical hits land more easily."
    fr: "Une grande pince martèle l’ennemi.\nTaux de critiques élevé."
    it: "Colpisce il nemico con una grande tenaglia.\nProbabile brutto colpo."
    de: "Schlägt mit Schere zu.\nHohe Volltrefferquote."
    es: "Golpea con fuerza con unas pinzas.\nSuele ser crítico."
    ko: "큰 집게를\n상대에게 내리쳐서 공격한다.\n급소에 맞기 쉽다."
cross_chop:
  names:
    jp_kana: クロスチョップ
    jp_kanji: クロスチョップ
    en: Cross Chop
    fr: Coup-Croix
    it: Incrocolpo
    de: Kreuzhieb
    es: Tajo Cruzado
    ko: 크로스촙
  descriptions:
    jp_kana: "りょうて　チョップを\nあいてに　たたきつけて　こうげきする。\nきゅうしょに　あたりやすい。"
    jp_kanji: "両手チョップを\n相手に　たたきつけて　攻撃する。\n急所に　当たりやすい。"
    en: "The user delivers a double chop with its\nforearms crossed.\nCritical hits land more easily."
    fr: "Le lanceur délivre un coup double en\ncroisant les avant-bras. Taux de\ncritiques élevé."
    it: "Investe il nemico con un colpo sferrato\ncon entrambe le braccia incrociate.\nProbabile brutto colpo."
    de: "Doppelter Hieb mit den Unterarmen.\nHohe Volltrefferquote."
    es: "Corte doble que suele propinar\nun golpe crítico."
    ko: "양손으로 당수를\n상대에게 힘껏 쳐서 공격한다.\n급소에 맞기 쉽다."
cross_poison:
  names:
    jp_kana: クロスポイズン
    jp_kanji: クロスポイズン
    en: Cross Poison
    fr: Poison-Croix
    it: Velenocroce
    de: Giftstreich
    es: Veneno X
    ko: 크로스포이즌
  descriptions:
    jp_kana: "どくの　やいばで　あいてを　きりさく。\nどく　じょうたいに　することが　あり\nきゅうしょにも　あたりやすい。"
    jp_kanji: "毒の　刃で　相手を　切り裂く。\n毒状態に　することが　あり\n急所にも　当たりやすい。"
    en: "A slashing attack with a poisonous blade\nthat may also leave the target poisoned.\nCritical hits land more easily."
    fr: "Un coup tranchant qui peut empoisonner\nl’ennemi. Taux de critiques élevé."
    it: "Attacco con zanne avvelenate che può\nanche avvelenare il Pokémon colpito.\nProbabile brutto colpo."
    de: "Ein schneidender Hieb, der das\nZiel eventuell vergiftet. Hat\neine hohe Volltrefferquote."
    es: "Tajo que puede envenenar al objetivo.\nSuele ser crítico."
    ko: "독 칼날로 상대를 베어 가른다.\n독 상태로 만들 때가 있고\n급소에도 맞기 쉽다."
crunch:
  names:
    jp_kana: かみくだく
    jp_kanji: かみくだく
    en: Crunch
    fr: Mâchouille
    it: Sgranocchio
    de: Knirscher
    es: Triturar
    ko: 깨물어부수기
  descriptions:
    jp_kana: "するどい　はで　あいてを　かみくだいて\nこうげきする。あいての　ぼうぎょを\nさげることが　ある。"
    jp_kanji: "鋭い　歯で\n相手を　かみくだいて　攻撃する。\n相手の　防御を　さげることが　ある。"
    en: "The user crunches up the target\nwith sharp fangs. It may also lower\nthe target’s Defense stat."
    fr: "Le lanceur mord l’ennemi de ses\ncrocs pointus. Peut aussi baisser\nla Défense de l’ennemi."
    it: "Il nemico viene morso con denti affilati.\nPuò anche ridurne la Difesa."
    de: "Beißt mit scharfen Reißzähnen\nzu und senkt eventuell die\nVerteidigung."
    es: "Tritura con afilados colmillos y puede\nbajar la Defensa del objetivo."
    ko: "날카로운 이빨로\n상대를 깨물어 부숴서 공격한다.\n상대의 방어를 떨어뜨릴 때가 있다."
crush_claw:
  names:
    jp_kana: ブレイククロー
    jp_kanji: ブレイククロー
    en: Crush Claw
    fr: Éclategriffe
    it: Tritartigli
    de: Zermalmklaue
    es: Garra Brutal
    ko: 브레이크크루
  descriptions:
    jp_kana: "かたく　するどい　ツメで　きりさいて\nこうげきする。あいての　ぼうぎょを\nさげることが　ある。"
    jp_kanji: "硬く　鋭い　ツメで\n切り裂いて　攻撃する。\n相手の　防御を　さげることが　ある。"
    en: "The user slashes the target with hard\nand sharp claws.\nIt may also lower the target’s Defense."
    fr: "Lacère l’ennemi avec des griffes\nsolides et aiguisées.\nPeut aussi baisser sa Défense."
    it: "Colpisce il nemico con artigli robusti e\naffilati che possono ridurne la Difesa."
    de: "Angriff mit scharfen Klauen. Senkt\neventuell den Verteidigungs-Wert."
    es: "Hace trizas al objetivo con garras\nafiladas y puede bajar su Defensa."
    ko: "단단하고 날카로운 손톱으로\n베어 갈라서 공격한다.\n상대의 방어를 떨어뜨릴 때가 있다."
crush_grip:
  names:
    jp_kana: にぎりつぶす
    jp_kanji: にぎりつぶす
    en: Crush Grip
    fr: Presse
    it: Sbriciolmano
    de: Quetschgriff
    es: Agarrón
    ko: 묵사발
  descriptions:
    jp_kana: "すさまじい　ちからで　あいてを　にぎり\nつぶす。あいての　ＨＰが　のこっている\nほど　いりょくが　あがる。"
    jp_kanji: "すさまじい　力で　相手を　にぎりつぶす。\n相手の　ＨＰが　残っているほど\n威力が　あがる。"
    en: "The target is crushed with great force.\nThe attack is more powerful the more\nHP the target has left."
    fr: "Une force puissante écrase l’ennemi.\nPlus il lui reste de PV et plus l’attaque\nest puissante."
    it: "Colpisce il nemico con grande forza.\nPiù PS ha il nemico, maggiore è la potenza\ndella mossa."
    de: "Ziel wird mit großer Kraft getroffen.\nJe höher die KP des Zieles, desto\nstärker die Attacke."
    es: "Estruja al objetivo con gran fuerza.\nCuantos más PS le queden al\nobjetivo, más fuerte será el ataque."
    ko: "굉장한 힘으로 상대를 묵사발로\n만든다. 상대의 HP가 남아있을수록\n위력이 올라간다."
curse:
  names:
    jp_kana: のろい
    jp_kanji: のろい
    en: Curse
    fr: Malédiction
    it: Maledizione
    de: Fluch
    es: Maldición
    ko: 저주
  descriptions:
    jp_kana: "つかう　ポケモンが\nゴーストタイプと　それいがい　とでは\nこうかが　かわる。"
    jp_kanji: "使う　ポケモンが\nゴーストタイプと　それ以外　とでは\n効果が　変わる。"
    en: "A move that works differently for the\nGhost type than for all other types."
    fr: "Une capacité à l’effet différent selon que\nle lanceur est un Pokémon Spectre ou non."
    it: "Una mossa che agisce in modo diverso\nse chi la usa è di tipo Spettro."
    de: "Attacke, deren Wirkung davon abhängt, ob\nder Anwender ein Geist-Pokémon ist."
    es: "Un movimiento que tiene efectos\ndistintos si el usuario es de tipo\nFantasma o no."
    ko: "기술을 쓰는 포켓몬이\n고스트타입일 때와 그 이외의\n타입일 때는 효과가 다르다."
cut:
  names:
    jp_kana: いあいぎり
    jp_kanji: いあいぎり
    en: Cut
    fr: Coupe
    it: Taglio
    de: Zerschneider
    es: Corte
    ko: 풀베기
  descriptions:
    jp_kana: "カマや　ツメなどで\nあいてを　きりつけて　こうげきする。\nほそいきも　きることが　できる。"
    jp_kanji: "カマや　ツメなどで\n相手を　切りつけて　攻撃する。\n細い木も　きることが　できる。"
    en: "The target is cut with a scythe or a claw.\nIt can also be used to cut down\nthin trees."
    fr: "Coupe l’ennemi avec des lames\nou des griffes. Hors combat,\npermet de couper des arbres fins."
    it: "Attacca il nemico con artigli o falci\naffilate. Fuori dalla lotta si usa per\ntagliare piccoli alberi."
    de: "Ein Basisangriff mit Schere oder Klaue.\nDamit können kleine Bäume gefällt werden."
    es: "Corta con garras, guadañas, etc.\nTambién sirve para cortar árboles\nfinos."
    ko: "낫이나 손톱 등으로\n상대를 베어 공격한다.\n가느다란 나무도 자를 수 있다."
dark_pulse:
  names:
    jp_kana: あくのはどう
    jp_kanji: あくのはどう
    en: Dark Pulse
    fr: Vibrobscur
    it: Neropulsar
    de: Finsteraura
    es: Pulso Umbrío
    ko: 악의파동
  descriptions:
    jp_kana: "からだから　あくいに\nみちた　おそろしい　オーラを　はっする。\nあいてを　ひるませる　ことが　ある。"
    jp_kanji: "体から　悪意に　みちた\n恐ろしい　オーラを　発する。\n相手を　ひるませることが　ある。"
    en: "The user releases a horrible aura imbued\nwith dark thoughts.\nIt may also make the target flinch."
    fr: "Le lanceur dégage une horrible\naura chargée d’idées noires.\nPeut aussi apeurer l’ennemi."
    it: "Chi la usa emana un’aura impregnata di\noscuri pensieri. Può anche far tentennare\nil Pokémon colpito."
    de: "Anwender greift mit fürchterlicher Aura\nschlechter Gedanken an. Ziel schreckt\neventuell zurück."
    es: "Libera una horrible aura llena de malos\npensamientos y puede hacer retroceder\nal objetivo."
    ko: "몸에서 악의로 가득한\n무서운 오라를 발한다.\n상대를 풀죽게 만들 때가 있다."
dark_void:
  names:
    jp_kana: ダークホール
    jp_kanji: ダークホール
    en: Dark Void
    fr: Trou Noir
    it: Vuototetro
    de: Schlummerort
    es: Brecha Negra
    ko: 다크홀
  descriptions:
    jp_kana: "あんこくの　せかいに　ひきずり　おとして\nあいてを　ねむり　じょうたいに　する。"
    jp_kanji: "暗黒の　世界に　ひきずり　落として\n相手を　眠り状態に　する。"
    en: "Opposing Pokémon are dragged into\na world of total darkness that makes\nthem sleep."
    fr: "L’ennemi est plongé dans les ténèbres.\nIl tombe dans un profond sommeil."
    it: "Trascina i nemici in un mondo di totale\noscurità e li fa addormentare."
    de: "Das Ziel wird in eine Welt der\nDunkelheit gezogen und in Schlaf\nversetzt."
    es: "El objetivo es enviado a un mundo de\ntinieblas que lo hace dormir."
    ko: "암흑의 세계로 끌고 가서 떨어뜨려\n상대를 잠듦 상태로 만든다."
defend_order:
  names:
    jp_kana: ぼうぎょしれい
    jp_kanji: ぼうぎょしれい
    en: Defend Order
    fr: Appel Défens
    it: Comandoscudo
    de: Blockbefehl
    es: A Defender
    ko: 방어지령
  descriptions:
    jp_kana: "しもべを　よびだして　じぶんの　からだに\nおおい　つかせる。ぼうぎょと　とくぼうを\nあげることが　できる。"
    jp_kanji: "しもべを　呼びだして　自分の　体に\nおおい　つかせる。防御と　特防を\nあげることが　できる。"
    en: "The user calls out its underlings to\nshield its body, raising its Defense\nand Sp. Def stats."
    fr: "Le lanceur appelle ses sous-fifres pour\nformer un bouclier qui augmente sa Défense\net sa Défense Spéciale."
    it: "Chi la usa raduna i suoi sgherri per creare\nuno scudo, aumentando Difesa e Difesa\nSpeciale."
    de: "Untergebene bilden einen lebenden Schild\num den Anwender. Steigert Verteidigung\nund Spezial-Verteidigung."
    es: "El usuario llama a sus súbditos para\nque formen un escudo viviente.\nSube la Defensa y la Defensa Especial."
    ko: "부하를 불러내어 자신의 몸을\n뒤덮게 한다. 방어와 특수방어를\n올릴 수 있다."
defense_curl:
  names:
    jp_kana: まるくなる
    jp_kanji: まるくなる
    en: Defense Curl
    fr: Boul’Armure
    it: Ricciolscudo
    de: Einigler
    es: Rizo Defensa
    ko: 웅크리기
  descriptions:
    jp_kana: "からだを　まるめて　ちぢこまり\nじぶんの　ぼうぎょを　あげる。"
    jp_kanji: "体を　まるめて　ちぢこまり\n自分の　防御を　あげる。"
    en: "The user curls up to conceal weak spots\nand raise its Defense stat."
    fr: "Le lanceur s’enroule pour cacher ses\npoints faibles, ce qui augmente sa Défense."
    it: "Chi la usa si raggomitola per nascondere\ni punti deboli e aumentare la propria\nDifesa."
    de: "Verbirgt Schwächen durch Einrollen und\nhebt gleichzeitig den Verteidigungs-Wert."
    es: "Se enrosca para ocultar su punto débil.\nSube la Defensa."
    ko: "몸을 둥글게 웅크려서\n자신의 방어를 올린다."
defog:
  names:
    jp_kana: きりばらい
    jp_kanji: きりばらい
    en: Defog
    fr: Anti-Brume
    it: Scacciabruma
    de: Auflockern
    es: Despejar
    ko: 안개제거
  descriptions:
    jp_kana: "つよいかぜで　あいての　リフレクターや\nひかりのかべ　などを　はらいのける。\nかいひりつも　さげる。"
    jp_kanji: "強い風で　相手の　リフレクターや\nひかりのかべ　などを　はらいのける。\n回避率も　さげる。"
    en: "A strong wind blows away the target’s\nobstacles such as Reflect or Light Screen.\nIt also lowers the target’s evasiveness."
    fr: "Un grand coup de vent qui disperse la\nProtection ou le Mur Lumière de l’ennemi.\nDiminue aussi son Esquive."
    it: "Chi la usa spazza via barriere come\nRiflesso e Schermoluce con un forte vento\ne riduce la capacità d’elusione del nemico."
    de: "Starker Wind hebt Attacken wie Reflektor\nund Lichtschild des Gegners auf.\nSenkt außerdem den Fluchtwert."
    es: "Potente viento que barre el Reflejo\no Pantalla de Luz del objetivo\ny puede reducir su Evasión."
    ko: "강한 바람으로 상대의 리플렉터나\n빛의장막 등을 제거한다.\n회피율도 떨어뜨린다."
destiny_bond:
  names:
    jp_kana: みちづれ
    jp_kanji: みちづれ
    en: Destiny Bond
    fr: Prlvt Destin
    it: Destinobbl.
    de: Abgangsbund
    es: Mismodestino
    ko: 길동무
  descriptions:
    jp_kana: "わざを　だしたあと　こうげきを　うけて\nひんしに　なったとき\nこうげき　あいても　ひんしに　する。"
    jp_kanji: "技を　だしたあと　攻撃を　受けて\nひんしに　なったとき\n攻撃　相手も　ひんしに　する。"
    en: "When this move is used, if the user faints,\nthe Pokémon that landed the knockout\nhit also faints."
    fr: "Quand cette capacité est activée,\nelle met K.O. un ennemi qui porte\nun coup fatal au lanceur."
    it: "Se chi la usa va KO prima del proprio turno,\nchi ha sferrato il colpo da KO fa la stessa\nfine."
    de: "Wird der Anwender nach Einsatz dieser\nAttacke besiegt, führt dies auch\nbeim Gegner zum K.O."
    es: "Si el usuario se debilita por un ataque\nrival antes de usar otro movimiento,\nel Pokémon rival se debilitará también."
    ko: "기술을 쓴 뒤 공격을 받아\n기절했을 때\n길동무의 대상도 기절하게 한다."
detect:
  names:
    jp_kana: みきり
    jp_kanji: みきり
    en: Detect
    fr: Détection
    it: Individua
    de: Scanner
    es: Detección
    ko: 판별
  descriptions:
    jp_kana: "あいての　こうげきを\nまったく　うけない。\nれんぞくで　だすと　しっぱい　しやすい。"
    jp_kanji: "相手の　攻撃を\nまったく　受けない。\n連続で　だすと　失敗しやすい。"
    en: "It enables the user to evade all attacks.\nIts chance of failing rises if it is used\nin succession."
    fr: "Le lanceur esquive toutes les attaques.\nPlus la capacité est utilisée de fois à la\nsuite, plus elle risque d’échouer."
    it: "Permette di eludere tutti gli attacchi.\nSe usata in successione può fallire."
    de: "Anwender weicht jeder Attacke aus.\nScheitert eventuell bei Wiederholung."
    es: "Frena todos los ataques, pero puede\nfallar si se usa repetidamente."
    ko: "상대의 공격을\n전혀 받지 않는다.\n연속으로 쓰면 실패하기 쉽다."
dig:
  names:
    jp_kana: あなをほる
    jp_kanji: あなをほる
    en: Dig
    fr: Tunnel
    it: Fossa
    de: Schaufler
    es: Excavar
    ko: 구멍파기
  descriptions:
    jp_kana: "１ターンめに　もぐり　２ターンめで\nあいてを　こうげきする。どうくつ\nからの　だっしゅつも　できる。"
    jp_kanji: "１ターン目に　潜り　２ターン目で\n相手を　攻撃する。\nどうくつからの　脱出も　できる。"
    en: "The user burrows, then attacks\non the second turn.\nIt can also be used to exit dungeons."
    fr: "Le lanceur creuse au 1ᵉʳ tour et\nfrappe au 2ᵉ. Permet aussi de\ns’échapper d’un donjon."
    it: "Chi la usa scava al primo turno e attacca\nal successivo. Fuori dalla lotta fa uscire\nda alcuni luoghi."
    de: "In Runde 1 eingraben und in Runde 2 an-\ngreifen. Macht Flucht aus Höhlen möglich."
    es: "Primer turno: cava.\nSegundo turno: ataca.\nTambién sirve para salir de ciertas zonas."
    ko: "1턴째에 파고들어 2턴째에\n상대를 공격한다.\n동굴에서 탈출할 수도 있다."
disable:
  names:
    jp_kana: かなしばり
    jp_kanji: かなしばり
    en: Disable
    fr: Entrave
    it: Inibitore
    de: Aussetzer
    es: Anulación
    ko: 사슬묶기
  descriptions:
    jp_kana: "あいての　うごきを　とめて\nちょくぜんに　だしていた　わざを\n４ターンの　あいだ　つかえなく　する。"
    jp_kanji: "相手の　動きを　とめて\n直前に　だしていた　技を\n４ターンの　あいだ　使えなくする。"
    en: "For four turns, this move prevents the\ntarget from using the move it last used."
    fr: "Empêche l’ennemi d’employer à nouveau\nsa dernière attaque. Dure quatre tours."
    it: "Per quattro turni impedisce al bersaglio\ndi riutilizzare l’ultima mossa usata."
    de: "Die zuletzt eingesetzte Attacke\ndes Zieles wird für mehrere Runden\nblockiert."
    es: "Desactiva el último movimiento del\nobjetivo durante cuatro turnos."
    ko: "상대의 움직임을 막아\n바로 전에 쓴 기술을\n4턴 동안 사용할 수 없게 만든다."
discharge:
  names:
    jp_kana: ほうでん
    jp_kanji: ほうでん
    en: Discharge
    fr: Coup d’Jus
    it: Scarica
    de: Ladungsstoß
    es: Chispazo
    ko: 방전
  descriptions:
    jp_kana: "まばゆい　でんげきで　じぶんの\nまわりに　いるものを　こうげきする。\nまひ　じょうたいに　することが　ある。"
    jp_kanji: "まばゆい　電撃で　自分の\n周りに　いるものを　攻撃する。\nまひ状態に　することが　ある。"
    en: "A flare of electricity is loosed to strike\nthe area around the user.\nIt may also cause paralysis."
    fr: "Un flamboiement d’électricité frappe\ntous les Pokémon autour du lanceur.\nPeut aussi paralyser."
    it: "Chi la usa colpisce i Pokémon che ha\nintorno con un bagliore elettrico.\nPuò anche causare paralisi."
    de: "Anwender greift die Pokémon in\nseiner Umgebung mit Elektrizität\nan. Paralysiert eventuell."
    es: "Una deslumbradora onda eléctrica\nafecta a los Pokémon de alrededor\nen combate. Puede paralizar."
    ko: "눈부신 전격으로 자신의\n주위에 있는 포켓몬을 공격한다.\n마비 상태로 만들 때가 있다."
dive:
  names:
    jp_kana: ダイビング
    jp_kanji: ダイビング
    en: Dive
    fr: Plongée
    it: Sub
    de: Taucher
    es: Buceo
    ko: 다이빙
  descriptions:
    jp_kana: "１ターンめで　もぐり　２ターンめに\nうきあがって　こうげきする。うみの\nおくふかくに　もぐる　ことも　できる。"
    jp_kanji: "１ターン目で　潜り　２ターン目に\n浮きあがって　攻撃する。\n海の　奥深くに　潜ることも　できる。"
    en: "Diving on the first turn, the user floats\nup and attacks on the second turn.\nIt can be used to dive deep in the ocean."
    fr: "Le lanceur plonge sous l’eau au\n1ᵉʳ tour et frappe au 2ᵉ. Permet\naussi de plonger au fond de l’eau."
    it: "Chi la usa si tuffa in acqua per emergere e\nattaccare al turno seguente. Fuori dalla\nlotta permette di immergersi sott’acqua."
    de: "Taucht in Runde 1 ab und greift in\nRunde 2 aus der Tiefe an. Ermöglicht\nTauchgänge zum Meeresgrund."
    es: "Primer turno: se sumerge en el mar.\nSegundo turno: emerge y ataca."
    ko: "1턴째에 잠수했다가 2턴째에\n떠올라 공격한다.\n바닷속 깊숙이 잠수할 수도 있다."
dizzy_punch:
  names:
    jp_kana: ピヨピヨパンチ
    jp_kanji: ピヨピヨパンチ
    en: Dizzy Punch
    fr: Uppercut
    it: Stordipugno
    de: Irrschlag
    es: Puño Mareo
    ko: 잼잼펀치
  descriptions:
    jp_kana: "リズミカルに　パンチを　くりだして\nあいてを　こうげきする。\nこんらん　させることが　ある。"
    jp_kanji: "リズミカルに　パンチを　くりだして\n相手を　攻撃する。\n混乱させることが　ある。"
    en: "The target is hit with rhythmically\nlaunched punches that may also\nleave it confused."
    fr: "Un enchaînement de coups de poing\ncadencés. Peut aussi rendre confus."
    it: "Colpisce il bersaglio con una sequenza\ndi pugni che può anche confonderlo."
    de: "Rhythmische Schläge, die das Ziel\nverwirren können."
    es: "Rítmicos puñetazos que pueden causar\nconfusión."
    ko: "리드미컬한 펀치를 날려\n상대를 공격한다.\n혼란시킬 때가 있다."
doom_desire:
  names:
    jp_kana: はめつのねがい
    jp_kanji: はめつのねがい
    en: Doom Desire
    fr: Carnareket
    it: Obbliderio
    de: Kismetwunsch
    es: Deseo Oculto
    ko: 파멸의소원
  descriptions:
    jp_kana: "わざを　つかった　２ターン　あとに\nむすうの　ひかりの　たばで\nあいてを　こうげきする。"
    jp_kanji: "技を　使った　２ターン後に\n無数の　光の　束で\n相手を　攻撃する。"
    en: "Two turns after this move is used, the\nuser blasts the target with a\nconcentrated bundle of light."
    fr: "Le lanceur génère une sphère lumineuse\nqu’il projette sur l’ennemi 2 tours\nplus tard."
    it: "Intensa luce solare che colpisce il nemico\ndopo due turni dall’uso della mossa."
    de: "Angriff mit gebündeltem Licht erfolgt\nzwei Runden nach Attackeneinsatz."
    es: "Concentra un haz de luz y ataca\ndos turnos después."
    ko: "기술을 사용한 2턴 뒤에\n무수한 빛의 다발이\n상대를 공격한다."
double_edge:
  names:
    jp_kana: すてみタックル
    jp_kanji: すてみタックル
    en: Double-Edge
    fr: Damoclès
    it: Sdoppiatore
    de: Risikotackle
    es: Doble Filo
    ko: 이판사판태클
  descriptions:
    jp_kana: "いのちを　かけて\nあいてに　とっしんして　こうげきする。\nじぶんも　かなり　ダメージを　うける。"
    jp_kanji: "命を　懸けて\n相手に　突進して　攻撃する。\n自分も　かなり　ダメージを　受ける。"
    en: "A reckless, life-risking tackle.\nIt also damages the user by a fairly large\namount, however."
    fr: "Une dangereuse charge. Inflige aussi des\ndégâts assez importants au lanceur."
    it: "Carica spietata e pericolosa che\ndanneggia molto anche chi la usa."
    de: "Lebensgefährlicher Angriff, bei dem\nsich der Angreifer selbst verletzt."
    es: "Ataque arriesgado que también hiere\nal agresor."
    ko: "목숨을 걸고\n상대에게 돌진하여 공격을 한다.\n자신도 상당한 데미지를 입는다."
double_hit:
  names:
    jp_kana: ダブルアタック
    jp_kanji: ダブルアタック
    en: Double Hit
    fr: Coup Double
    it: Doppiosmash
    de: Doppelschlag
    es: Doble Golpe
    ko: 더블어택
  descriptions:
    jp_kana: "しっぽなどを　つかい　あいてを　たたいて\nこうげきする。２かい　れんぞくで　\nダメージを　あたえる。"
    jp_kanji: "しっぽなどを　使い\n相手を　たたいて　攻撃する。\n２回連続で　ダメージを　与える。"
    en: "The user slams the target with a long tail,\nvines, or tentacle.\nThe target is hit twice in a row."
    fr: "Un coup de queue ou de liane qui frappe\nl’ennemi deux fois d’affilée."
    it: "Chi la usa colpisce il nemico con la coda\ndue volte di fila."
    de: "Anwender trifft das Ziel mit dem\nSchweif oder Ähnlichem. Ziel wird\ndoppelt getroffen."
    es: "Golpea al objetivo dos veces seguidas\ncon la cola u otras partes de su cuerpo."
    ko: "꼬리 등을 써서\n상대를 때려 공격한다.\n2회 연속으로 데미지를 준다."
double_kick:
  names:
    jp_kana: にどげり
    jp_kanji: にどげり
    en: Double Kick
    fr: Double Pied
    it: Doppiocalcio
    de: Doppelkick
    es: Doble Patada
    ko: 두번치기
  descriptions:
    jp_kana: "２ほんの　あしで　あいてを　けとばして\nこうげきする。２かい　れんぞくで\nダメージを　あたえる。"
    jp_kanji: "２本の　足で　相手を　けとばして\n攻撃する。２回連続で\nダメージを　与える。"
    en: "The target is quickly kicked twice in\nsuccession using both feet."
    fr: "Deux coups de pied qui frappent l’ennemi\ndeux fois d’affilée."
    it: "Colpisce il nemico due volte con un paio di\nrapidi calci inferti con entrambi i piedi."
    de: "Der Anwender tritt in einer Runde\nzweimal schnell zu."
    es: "Una patada doble.\nGolpea dos veces."
    ko: "2개의 다리로 상대를 걷어차서\n공격한다. 2회 연속으로\n데미지를 준다."
double_slap:
  names:
    jp_kana: おうふくビンタ
    jp_kanji: おうふくビンタ
    en: DoubleSlap
    fr: Torgnoles
    it: Doppiasberla
    de: Duplexhieb
    es: Doblebofetón
    ko: 연속뺨치기
  descriptions:
    jp_kana: "おうふく　ビンタで\nあいてを　たたいて　こうげきする。\n２ー５かいの　あいだ　れんぞくで　だす。"
    jp_kanji: "おうふく　ビンタで\n相手を　たたいて　攻撃する。\n２ー５回の　あいだ　連続で　だす。"
    en: "The target is slapped repeatedly, back\nand forth, two to five times in a row."
    fr: "Gifle rapidement l’ennemi\nde 2 à 5 fois d’affilée."
    it: "Schiaffeggia il nemico da due a cinque\nvolte di fila."
    de: "Trifft das Ziel 2- bis 5-mal hintereinander\nmit einem Duplexhieb."
    es: Abofetea de dos a cinco veces seguidas.
    ko: "연속 뺨치기로\n상대를 때려서 공격한다.\n2-5회 동안 연속으로 쓴다."
double_team:
  names:
    jp_kana: かげぶんしん
    jp_kanji: かげぶんしん
    en: Double Team
    fr: Reflet
    it: Doppioteam
    de: Doppelteam
    es: Doble Equipo
    ko: 그림자분신
  descriptions:
    jp_kana: "すばやい　うごきで　ぶんしんを　つくり\nあいてを　まどわせて\nかいひりつを　あげる。"
    jp_kanji: "素早い　動きで　分身を　つくり\n相手を　まどわせて\n回避率を　あげる。"
    en: "By moving rapidly, the user makes illusory\ncopies of itself to raise its evasiveness."
    fr: "Le lanceur se déplace si vite qu’il\ncrée des copies illusoires de lui,\naugmentant son Esquive."
    it: "Chi la usa si muove in fretta e crea copie\nillusorie di se stesso che aumentano\nla capacità di elusione."
    de: "Erzeugt durch schnelle Bewegungen\nEbenbilder, um den Fluchtwert zu erhöhen."
    es: "Crea copias de sí mismo para mejorar\nla Evasión."
    ko: "재빠른 움직임으로 분신을 만들어\n상대를 혼란시켜\n회피율을 올린다."
draco_meteor:
  names:
    jp_kana: りゅうせいぐん
    jp_kanji: りゅうせいぐん
    en: Draco Meteor
    fr: Draco Météor
    it: Dragobolide
    de: Draco Meteor
    es: Cometa Draco
    ko: 용성군
  descriptions:
    jp_kana: "てんくうから　いんせきを　\nあいてに　おとす。つかうと　はんどうで\nじぶんの　とくこうが　がくっと　さがる。"
    jp_kanji: "天空から　いん石を　\n相手に　落とす。使うと　反動で\n自分の　特攻が　がくっと　さがる。"
    en: "Comets are summoned down from the sky\nonto the target. The attack’s recoil\nharshly reduces the user’s Sp. Atk stat."
    fr: "Le lanceur invoque des comètes.\nLe contrecoup réduit fortement\nson Attaque Spéciale."
    it: "Attacca con meteore che cadono dal cielo.\nIl contraccolpo fa calare di molto\nl’Attacco Speciale di chi la usa."
    de: "Kometen werden heraufbeschworen.\nDer Rückstoß reduziert den Spezial-\nAngriff des Anwenders stark."
    es: "Hace que grandes cometas caigan del\ncielo. Baja mucho el Ataque Especial\nde quien lo usa."
    ko: "천공에서 운석을\n떨어뜨린다. 사용하면 반동으로\n자신의 특수공격이 크게 떨어진다."
dragon_breath:
  names:
    jp_kana: りゅうのいぶき
    jp_kanji: りゅうのいぶき
    en: DragonBreath
    fr: Dracosouffle
    it: Dragospiro
    de: Feuerodem
    es: Dragoaliento
    ko: 용의숨결
  descriptions:
    jp_kana: "ものすごい　いきを\nあいてに　ふきつけて　こうげきする。\nまひ　じょうたいに　することが　ある。"
    jp_kanji: "ものすごい　息を\n相手に　吹きつけて　攻撃する。\nまひ状態に　することが　ある。"
    en: "The user exhales a mighty gust that\ninflicts damage. It may also leave the\ntarget with paralysis."
    fr: "Le lanceur souffle fort sur l’ennemi pour\ninfliger des dégâts. Peut aussi le\nparalyser."
    it: "Investe il nemico con una raffica\npotentissima che arreca danni.\nPuò anche paralizzarlo."
    de: "Fegt das Ziel mit zerstörerisch\nheißem Atem weg. Paralysiert\ndas Ziel eventuell."
    es: "Poderosa ráfaga de aliento que golpea\nal objetivo y puede paralizarlo."
    ko: "굉장한 숨결을\n상대에게 내뿜어 공격한다.\n마비 상태로 만들 때가 있다."
dragon_claw:
  names:
    jp_kana: ドラゴンクロー
    jp_kanji: ドラゴンクロー
    en: Dragon Claw
    fr: Dracogriffe
    it: Dragartigli
    de: Drachenklaue
    es: Garra Dragón
    ko: 드래곤크루
  descriptions:
    jp_kana: "するどく　とがった　きょだいな　ツメで\nあいてを　きりさいて　こうげきする。"
    jp_kanji: "鋭く　とがった　巨大な　ツメで\n相手を　切り裂いて　攻撃する。"
    en: "The user slashes the target with huge,\nsharp claws."
    fr: "Le lanceur lacère l’ennemi de ses\ngrandes griffes aiguisées."
    it: "Chi la usa attacca con artigli affilati che\ngraffiano il nemico rapidamente e con\ngrande forza."
    de: "Das Ziel wird mit riesigen, scharfen\nKlauen stark verletzt."
    es: Araña al objetivo con garras afiladas.
    ko: "날카롭고 뾰족한 거대한 발톱으로\n상대를 베어 갈라서 공격한다."
dragon_dance:
  names:
    jp_kana: りゅうのまい
    jp_kanji: りゅうのまい
    en: Dragon Dance
    fr: Danse Draco
    it: Dragodanza
    de: Drachentanz
    es: Danza Dragón
    ko: 용의춤
  descriptions:
    jp_kana: "しんぴてきで　ちからづよい　まいを\nはげしく　おどる。じぶんの\nこうげきと　すばやさを　あげる。"
    jp_kanji: "神秘的で　力づよい　舞を\n激しく　おどる。自分の\n攻撃と　素早さを　あげる。"
    en: "The user vigorously performs a mystic,\npowerful dance that boosts its Attack and\nSpeed stats."
    fr: "Une danse mystique dont le rythme\neffréné augmente l’Attaque et la\nVitesse du lanceur."
    it: "Danza mistica e vigorosa che aumenta\nl’Attacco e la Velocità di chi la usa."
    de: "Ein mystischer Tanz, der den\nAngriffs- und Initiative-Wert\nerhöht."
    es: "Danza mística que sube el Ataque\ny la Velocidad."
    ko: "신비롭고 힘센 춤을\n격렬하게 춘다. 자신의\n공격과 스피드를 올린다."
dragon_pulse:
  names:
    jp_kana: りゅうのはどう
    jp_kanji: りゅうのはどう
    en: Dragon Pulse
    fr: Dracochoc
    it: Dragopulsar
    de: Drachenpuls
    es: Pulso Dragón
    ko: 용의파동
  descriptions:
    jp_kana: "おおきな　くちから　しょうげきはを\nまきおこして　あいてを　こうげきする。"
    jp_kanji: "大きな　口から　衝撃波を\nまきおこして　相手を　攻撃する。"
    en: "The target is attacked with a shock wave\ngenerated by the user’s gaping mouth."
    fr: "Le lanceur ouvre la bouche pour envoyer\nune onde de choc qui frappe l’ennemi."
    it: "Chi la usa spalanca la bocca e genera\nun’onda d’urto che colpisce il nemico."
    de: "Das Ziel wird mit einer Schockwelle\nangegriffen, die aus dem offenen Maul\ndes Anwenders kommt."
    es: "Abre mucho la boca y libera una onda\nde choque que ataca al objetivo."
    ko: "큰 입으로 충격파를\n일으켜서 상대를 공격한다."
dragon_rage:
  names:
    jp_kana: りゅうのいかり
    jp_kanji: りゅうのいかり
    en: Dragon Rage
    fr: Draco-Rage
    it: Ira di Drago
    de: Drachenwut
    es: Furia Dragón
    ko: 용의분노
  descriptions:
    jp_kana: "いかりの　しょうげきはを\nあいてに　ぶつけて　こうげきする。\n４０の　ダメージを　きまって　あたえる。"
    jp_kanji: "怒りの　衝撃波を\n相手に　ぶつけて　攻撃する。\n４０の　ダメージを　決まって　与える。"
    en: "This attack hits the target with a shock\nwave of pure rage. This attack always\ninflicts 40 HP damage."
    fr: "La colère du lanceur déclenche une onde\nde choc destructrice qui inflige\ntoujours 40 PV de dégâts."
    it: "Colpisce il nemico con un’onda d’urto\ngenerata dall’ira. Questo attacco\nprovoca sempre un danno di 40 PS."
    de: "Stößt eine wutgeladene Schockwelle aus,\ndie stets 40 KP Schaden anrichtet."
    es: "Ráfaga de furiosas ondas de choque\nque quitan 40 PS."
    ko: "분노의 충격파를\n상대에게 부딪쳐서 공격한다.\n언제나 40의 데미지를 준다."
dragon_rush:
  names:
    jp_kana: ドラゴンダイブ
    jp_kanji: ドラゴンダイブ
    en: Dragon Rush
    fr: Dracocharge
    it: Dragofuria
    de: Drachenstoß
    es: Carga Dragón
    ko: 드래곤다이브
  descriptions:
    jp_kana: "すさまじい　さっきで　いあつ　しながら\nたいあたりする。\nあいてを　ひるませる　ことが　ある。"
    jp_kanji: "すさまじい　殺気で　威圧しながら\n体当たりする。\n相手を　ひるませることが　ある。"
    en: "The user tackles the target while\nexhibiting overwhelming menace.\nIt may also make the target flinch."
    fr: "Le lanceur frappe l’ennemi d’un air\nmenaçant. Peut aussi apeurer l’ennemi."
    it: "Chi la usa attacca con fare minaccioso e\nin questo modo può anche far tentennare\nil nemico."
    de: "Anwender führt einen gefährlichen Angriff\naus. Das Ziel schreckt eventuell zurück."
    es: "Ataca de forma brutal mientras intimida\nal objetivo. También puede hacerlo\nretroceder."
    ko: "굉장한 살기로 위압하면서\n몸통박치기한다.\n상대를 풀죽게 만들 때가 있다."
dragon_tail:
  names:
    jp_kana: ドラゴンテール
    jp_kanji: ドラゴンテール
    en: Dragon Tail
    fr: Draco-Queue
    it: Codadrago
    de: Drachenrute
    es: Cola Dragón
    ko: 드래곤테일
  descriptions:
    jp_kana: "あいてを　はじきとばして\nひかえの　ポケモンを　ひきずりだす。\nやせいの　ばあいは　せんとうが　おわる。"
    jp_kanji: "相手を　はじきとばして\n控えの　ポケモンを　ひきずりだす。\n野生の　場合は　戦闘が　終わる。"
    en: "The user knocks away the target and\ndrags out another Pokémon in its party.\nIn the wild, the battle ends."
    fr: "Un coup puissant qui blesse la cible\net l’envoie balader. Dans la nature,\nmet fin au combat."
    it: "Chi la usa fa volar via il bersaglio in modo\nche venga sostituito. Se il bersaglio è un\nPokémon selvatico, la lotta finisce."
    de: "Putzt das Ziel vom Feld und wechselt\nes mit einem anderen Pokémon aus.\nBeendet Kämpfe gegen wilde Pokémon."
    es: "Ataca al objetivo y lo obliga a cambiarse\npor otro Pokémon. Si es uno salvaje,\nacaba el combate."
    ko: "상대를 튕겨내서\n교대할 포켓몬을 끌어낸다.\n야생의 경우에는 배틀이 끝난다."
drain_punch:
  names:
    jp_kana: ドレインパンチ
    jp_kanji: ドレインパンチ
    en: Drain Punch
    fr: Vampipoing
    it: Assorbipugno
    de: Ableithieb
    es: Puño Drenaje
    ko: 드레인펀치
  descriptions:
    jp_kana: "こぶしから　あいての　ちからを\nすいとる。あたえた　ダメージの\nはんぶんの　ＨＰを　かいふく　できる。"
    jp_kanji: "こぶしから　相手の　力を　吸い取る。\n与えた　ダメージの\n半分の　ＨＰを　回復できる。"
    en: "An energy-draining punch. The user’s\nHP is restored by half the damage taken\nby the target."
    fr: "Un coup de poing qui draine l’énergie.\nConvertit la moitié des dégâts infligés\nen PV pour le lanceur."
    it: "Pugno che assorbe energia. Fa recuperare\nuna quantità di PS pari alla metà del danno\ninferto."
    de: "Entzieht dem Ziel Energie. Die Hälfte\ndes Schadens wird den KP des Anwenders\nzugerechnet."
    es: "Un golpe que drena energía. El Pokémon\nrecupera la mitad de los PS arrebatados\nal objetivo."
    ko: "주먹으로 상대의 힘을 흡수한다.\n입힌 데미지의 절반에\n해당하는 HP를 회복할 수 있다."
dream_eater:
  names:
    jp_kana: ゆめくい
    jp_kanji: ゆめくい
    en: Dream Eater
    fr: Dévorêve
    it: Mangiasogni
    de: Traumfresser
    es: Come Sueños
    ko: 꿈먹기
  descriptions:
    jp_kana: "ねている　あいての　ゆめを　たべて\nこうげきする。　ダメージの　はんぶんの\nＨＰを　かいふく　する。"
    jp_kanji: "寝ている　相手の　夢を　食べて\n攻撃する。ダメージの　半分の\nＨＰを　回復する。"
    en: "The user eats the dreams of a sleeping\ntarget. It absorbs half the damage\ncaused to heal the user’s HP."
    fr: "Le lanceur mange le rêve de l’ennemi\nendormi. Le lanceur récupère en PV\nla moitié des dégâts infligés."
    it: "Attacco che funziona solo su un nemico\nche dorme. Chi lo usa riceve metà dei PS\npersi dal nemico."
    de: "Attacke gegen schlafendes Ziel.\nDie Hälfte des zugefügten Schadens\nwird dem Anwender gutgeschrieben."
    es: "Restaura al usuario la mitad del daño\ncausado a un objetivo dormido."
    ko: "잠자고 있는 상대의 꿈을 먹어\n공격한다. 데미지의 절반을\nHP로 회복한다."
drill_peck:
  names:
    jp_kana: ドリルくちばし
    jp_kanji: ドリルくちばし
    en: Drill Peck
    fr: Bec Vrille
    it: Perforbecco
    de: Bohrschnabel
    es: Pico Taladro
    ko: 회전부리
  descriptions:
    jp_kana: "かいてん　しながら　とがった　くちばしを\nあいてに　つきさして　こうげきする。"
    jp_kanji: "回転しながら　とがった　くちばしを\n相手に　突き刺して　攻撃する。"
    en: "A corkscrewing attack with the\nsharp beak acting as a drill."
    fr: "Une attaque utilisant le bec\ncomme une perceuse."
    it: "Attacco a spirale con un becco aguzzo\nche fa da trapano."
    de: "Korkenzieherangriff, bei dem der\nSchnabel als Bohrer dient."
    es: "Picotazo giratorio y perforador\nmuy potente."
    ko: "회전하면서 뾰족한 부리를\n상대에게 꿰찔러 공격한다."
drill_run:
  names:
    jp_kana: ドリルライナー
    jp_kanji: ドリルライナー
    en: Drill Run
    fr: Tunnelier
    it: Giravvita
    de: Schlagbohrer
    es: Taladradora
    ko: 드릴라이너
  descriptions:
    jp_kana: "ドリルのように　からだを　かいてん\nしながら　あいてに　たいあたりする。\nきゅうしょに　あたりやすい。"
    jp_kanji: "ドリルのように　体を　回転しながら\n相手に　体当たりする。\n急所に　当たりやすい。"
    en: "The user crashes into its target while\nrotating its body like a drill.\nCritical hits land more easily."
    fr: "Le lanceur tourne sur lui-même comme\nune perceuse et se jette sur l’ennemi.\nTaux de critiques élevé."
    it: "Chi la usa si scaglia sul bersaglio ruotando\nsu se stesso come un trapano perforante.\nProbabile brutto colpo."
    de: "Anwender rammt das Ziel, während er\nseinen Körper wie einen Bohrer dreht.\nHohe Volltrefferquote."
    es: "El usuario golpea usando\nsu cuerpo como un taladro.\nSuele ser crítico."
    ko: "드릴처럼 몸을 회전시켜서\n상대에게 몸통박치기한다.\n급소에 맞기 쉽다."
dual_chop:
  names:
    jp_kana: ダブルチョップ
    jp_kanji: ダブルチョップ
    en: Dual Chop
    fr: Double Baffe
    it: Doppiocolpo
    de: Doppelhieb
    es: Golpe Bis
    ko: 더블촙
  descriptions:
    jp_kana: "からだの　かたいぶぶんで　あいてを\nたたいて　こうげきする。２かい\nれんぞくで　ダメージを　あたえる。"
    jp_kanji: "体の　硬い部分で　相手を\nたたいて　攻撃する。\n２回連続で　ダメージを　与える。"
    en: "The user attacks its target by hitting\nit with brutal strikes.\nThe target is hit twice in a row."
    fr: "Le lanceur frappe l’ennemi deux fois\nd’affilée avec les parties les plus\nrobustes de son corps."
    it: "Chi la usa attacca due volte il bersaglio\ncon dei colpi estremamente forti."
    de: "Versetzt dem Ziel mit massiven\nExtremitäten Hiebe. Angriff erfolgt\nzweimal hintereinander."
    es: "Golpea dos veces seguidas con la cola\nu otras partes de su cuerpo."
    ko: "몸의 단단한 부분으로 상대를\n때려 공격한다. 2회 연속으로\n데미지를 준다."
dynamic_punch:
  names:
    jp_kana: ばくれつパンチ
    jp_kanji: ばくれつパンチ
    en: DynamicPunch
    fr: Dynamopoing
    it: Dinamipugno
    de: Wuchtschlag
    es: Puñodinámico
    ko: 폭발펀치
  descriptions:
    jp_kana: "こんしんの　ちからで\nパンチを　くりだして　こうげきする。\nあいてを　かならず　こんらん　させる。"
    jp_kanji: "こん身の　力で\nパンチを　くりだして　攻撃する。\n相手を　必ず　混乱させる。"
    en: "The user punches the target with full,\nconcentrated power.\nIt confuses the target if it hits."
    fr: "Le lanceur rassemble ses forces et\nenvoie un coup de poing à l’ennemi.\nS’il est touché, il est confus."
    it: "Colpisce il nemico con un pugno davvero\nforte. Se va a segno, lo confonde."
    de: "Kräftiger Schlag, der das Ziel\nbei Erfolg verwirrt."
    es: "Puñetazo con toda la fuerza concentrada.\nCausa confusión si atina."
    ko: "혼신의 힘으로\n펀치를 날려서 공격한다.\n상대를 반드시 혼란시킨다."
earth_power:
  names:
    jp_kana: だいちのちから
    jp_kanji: だいちのちから
    en: Earth Power
    fr: Telluriforce
    it: Geoforza
    de: Erdkräfte
    es: Tierra Viva
    ko: 대지의힘
  descriptions:
    jp_kana: "あいての　あしもとへ　だいちの　ちからを\nほうしゅつする。あいての　とくぼうを\nさげることが　ある。"
    jp_kanji: "相手の　足下へ　大地の力を\n放出する。相手の　特防を\nさげることが　ある。"
    en: "The user makes the ground under\nthe target erupt with power.\nIt may also lower the target’s Sp. Def."
    fr: "Des éruptions volcaniques ont lieu\nsous l’ennemi. Peut aussi baisser\nla Défense Spéciale de l’ennemi."
    it: "Dal terreno sotto il nemico si sprigiona\nuna forza devastante. Può anche ridurne\nla Difesa Speciale."
    de: "Der Boden unter dem Ziel erzittert\ndurch die Kraft der Erde. Senkt eventuell\nSpezial-Verteidigung."
    es: "La tierra a los pies del objetivo erupciona\nviolentamente. Puede disminuir\nla Defensa Especial del objetivo."
    ko: "상대의 발밑에 대지의 힘을\n방출한다. 상대의 특수방어를\n떨어뜨릴 때가 있다."
earthquake:
  names:
    jp_kana: じしん
    jp_kanji: じしん
    en: Earthquake
    fr: Séisme
    it: Terremoto
    de: Erdbeben
    es: Terremoto
    ko: 지진
  descriptions:
    jp_kana: "じしんの　しょうげきで　じぶんの\nまわりに　いるものを　こうげきする。"
    jp_kanji: "地震の　衝撃で　自分の\n周りに　いるものを　攻撃する。"
    en: "The user sets off an earthquake that\nstrikes those around it."
    fr: "Le lanceur provoque un tremblement\nde terre touchant tous les Pokémon\nautour de lui."
    it: "Chi la usa provoca un potente sisma\nche colpisce gli altri Pokémon in campo."
    de: "Ein mächtiges Beben, das die anderen\nPokémon in der Nähe des Anwenders\ntrifft."
    es: "Un terremoto que afecta a los Pokémon\nde alrededor en combate."
    ko: "지진의 충격으로 자신의\n주위에 있는 포켓몬을 공격한다."
echoed_voice:
  names:
    jp_kana: エコーボイス
    jp_kanji: エコーボイス
    en: Echoed Voice
    fr: Écho
    it: Echeggiavoce
    de: Widerhall
    es: Eco Voz
    ko: 에코보이스
  descriptions:
    jp_kana: "ひびく　こえで　あいてを　こうげきする。\nまいターン　だれかが　わざを\nつかい　つづけると　いりょくが　あがる。"
    jp_kanji: "響く　声で　相手を　攻撃する。\n毎ターン　だれかが　技を\n使い続けると　威力が　あがる。"
    en: "The user attacks the target with an\nechoing voice. If this move is used\nevery turn, it does greater damage."
    fr: "Un cri retentissant blesse l’ennemi. Si le\nlanceur ou d’autres Pokémon l’utilisent\nà chaque tour, l’effet augmente."
    it: "Attacca il bersaglio con la propria voce\necheggiante. Se usata a ripetizione da uno\no più Pokémon il danno aumenta."
    de: "Angriff mit widerhallender Stimme. Wenn in\njeder Runde ein Teilnehmer wiederholt die\nAttacke einsetzt, steigt die Stärke."
    es: "Un susurro que aumenta de potencia\nconforme el usuario y otros Pokémon\nlo van utilizando."
    ko: "울리는 목소리로 상대를 공격한다.\n매 턴 누군가 기술을\n계속해서 쓰면 위력이 올라간다."
egg_bomb:
  names:
    jp_kana: タマゴばくだん
    jp_kanji: タマゴばくだん
    en: Egg Bomb
    fr: Bomb’Œuf
    it: Uovobomba
    de: Eierbombe
    es: Bomba Huevo
    ko: 알폭탄
  descriptions:
    jp_kana: "おおきな　タマゴを　ちから　いっぱい\nあいてに　なげつけて　こうげきする。"
    jp_kanji: "大きな　タマゴを　力いっぱい\n相手に　投げつけて　攻撃する。"
    en: "A large egg is hurled at the target\nwith maximum force to inflict damage."
    fr: "De toutes ses forces, le lanceur\njette un gros œuf sur l’ennemi\npour lui infliger des dégâts."
    it: "Colpisce il nemico con un grande uovo\nscaraventato con enorme forza."
    de: "Ein großes Ei wird auf das Ziel\nabgefeuert, um ihm zu schaden."
    es: "Arroja un huevo al objetivo con\ngran fuerza."
    ko: "큰 알을 온 힘을 다해\n상대에게 내던져서 공격한다."
electro_ball:
  names:
    jp_kana: エレキボール
    jp_kanji: エレキボール
    en: Electro Ball
    fr: Boule Élek
    it: Energisfera
    de: Elektroball
    es: Bola Voltio
    ko: 일렉트릭볼
  descriptions:
    jp_kana: "でんきの　かたまりを　あいてに\nぶつける。あいてより　すばやさが\nはやいほど　いりょくが　あがる。"
    jp_kanji: "電気の　塊を　相手に\nぶつける。相手より　素早さが\n速いほど　威力が　あがる。"
    en: "The user hurls an electric orb\nat the target. The faster the user is\nthan the target, the greater the damage."
    fr: "Le lanceur envoie une boule d’électricité.\nSi sa Vitesse est plus grande que celle de\nl’ennemi, les dégâts augmentent d’autant."
    it: "Chi la usa attacca con una sfera d’energia\nelettrica. Più è rapido rispetto al\nbersaglio e più danni arreca."
    de: "Je höher die Initiative des Anwenders\nim Vergleich zum Ziel ist, desto stärker\ntrifft dieses eine geballte Ladung Strom."
    es: "Lanza una bola eléctrica. Cuanto mayor\nsea la Velocidad del usuario sobre la del\nobjetivo, mayor será el daño causado."
    ko: "전기 덩어리를 상대에게 부딪쳐서\n공격한다. 상대보다 스피드가\n빠를수록 위력이 올라간다."
electroweb:
  names:
    jp_kana: エレキネット
    jp_kanji: エレキネット
    en: Electroweb
    fr: Toile Élek
    it: Elettrotela
    de: Elektronetz
    es: Electrotela
    ko: 일렉트릭네트
  descriptions:
    jp_kana: "でんきの　ネットで\nあいてを　つかまえて　こうげきする。\nあいての　すばやさを　さげる。"
    jp_kanji: "電気の　ネットで\n相手を　捕まえて　攻撃する。\n相手の　素早さを　さげる。"
    en: "The user captures and attacks opposing\nPokémon by using an electric net. It\nreduces the targets’ Speed stat."
    fr: "Attrape l’ennemi dans un filet électrique.\nBaisse aussi la Vitesse de l’ennemi."
    it: "Chi la usa attacca i nemici catturandoli\ncon una ragnatela elettrica e riducendone\nla Velocità."
    de: "Fängt Ziele mit einem elektrischen\nNetz und senkt deren Initiative."
    es: "Atrapa y ataca a los objetivos con\nuna telaraña eléctrica. También\nreduce su Velocidad."
    ko: "전기 네트로\n상대를 붙잡아서 공격한다.\n상대의 스피드를 떨어뜨린다."
embargo:
  names:
    jp_kana: さしおさえ
    jp_kanji: さしおさえ
    en: Embargo
    fr: Embargo
    it: Divieto
    de: Itemsperre
    es: Embargo
    ko: 금제
  descriptions:
    jp_kana: "もたせた　どうぐを　つかえなくする。\nトレーナーも　その　ポケモンには\nどうぐを　つかえない。"
    jp_kanji: "持たせた　道具を　使えなくする。\nトレーナーも　その　ポケモンには\n道具を　使えない。"
    en: "It prevents the target from using its held\nitem. Its Trainer is also prevented from\nusing items on it."
    fr: "Empêche l’ennemi d’utiliser un\nobjet tenu et son Dresseur\nd’utiliser un objet sur lui."
    it: "Impedisce al nemico di usare lo strumento\nche tiene e al suo Allenatore di usarne\naltri sul Pokémon."
    de: "Verhindert, dass auf das Ziel Items\nverwendet werden."
    es: "Impide al objetivo usar el objeto que\nlleva. Su Entrenador tampoco puede\nusar objetos sobre él."
    ko: "지니게 한 도구를 쓸 수 없게 한다.\n트레이너도 그 포켓몬에게는\n도구를 쓸 수 없다."
ember:
  names:
    jp_kana: ひのこ
    jp_kanji: ひのこ
    en: Ember
    fr: Flammèche
    it: Braciere
    de: Glut
    es: Ascuas
    ko: 불꽃세례
  descriptions:
    jp_kana: "ちいさな　ほのおを\nあいてに　はっしゃして　こうげきする。\nやけど　じょうたいに　することが　ある。"
    jp_kanji: "小さな　炎を\n相手に　発射して　攻撃する。\nやけど状態に　することが　ある。"
    en: "The target is attacked with small flames.\nIt may also leave the target with a burn."
    fr: "L’ennemi est attaqué par de faibles\nflammes. Peut aussi le brûler."
    it: "Il nemico viene colpito da fiammelle\nche possono anche scottarlo."
    de: "Schwache Feuer-Attacke, durch die das\nZiel eventuell Verbrennungen erleidet."
    es: "Ataca con llamas pequeñas que\npueden causar quemaduras."
    ko: "작은 불꽃을\n상대에게 발사하여 공격한다.\n화상 상태로 만들 때가 있다."
encore:
  names:
    jp_kana: アンコール
    jp_kanji: アンコール
    en: Encore
    fr: Encore
    it: Ripeti
    de: Zugabe
    es: Otra Vez
    ko: 앵콜
  descriptions:
    jp_kana: "あいてが　さいごに　つかった　わざを\n３ターンの　あいだ\nずっと　ださせる。"
    jp_kanji: "相手が　最後に　使った技を\n３ターンの　あいだ\nずっと　ださせる。"
    en: "The user compels the target\nto keep using only the move\nit last used for three turns."
    fr: "Oblige l’ennemi à répéter la dernière\ncapacité utilisée durant 3 tours."
    it: "Chi la usa obbliga per tre turni il nemico a\nripetere l’ultima mossa eseguita."
    de: "Das Ziel wiederholt letzte Attacke drei\nRunden lang."
    es: "El objetivo repite su último movimiento\ndurante tres turnos."
    ko: "상대가 마지막으로 사용한\n기술을 3턴 동안\n계속 쓰게 한다."
endeavor:
  names:
    jp_kana: がむしゃら
    jp_kanji: がむしゃら
    en: Endeavor
    fr: Effort
    it: Rimonta
    de: Notsituation
    es: Esfuerzo
    ko: 죽기살기
  descriptions:
    jp_kana: "あいての　ＨＰが　じぶんの　ＨＰと\nおなじ　くらいに　なるように\nダメージを　あたえる。"
    jp_kanji: "相手の　ＨＰが　自分の　ＨＰと\n同じくらいに　なるように\nダメージを　与える。"
    en: "An attack move that cuts down the\ntarget’s HP to equal the user’s HP."
    fr: "Une attaque qui réduit les PV de\nl’ennemi au niveau des PV du lanceur."
    it: "Attacco che riduce i PS del nemico a una\nquantità pari ai PS di chi la usa."
    de: "Trifft nur, wenn KP des Anwenders geringer\nals KP des Zieles sind. Senkt dessen\nKP auf Niveau der KP des Anwenders."
    es: "Reduce los PS del objetivo para que igualen\na los del atacante."
    ko: "상대의 HP가 자신의 HP와\n같아지도록\n데미지를 준다."
endure:
  names:
    jp_kana: こらえる
    jp_kanji: こらえる
    en: Endure
    fr: Ténacité
    it: Resistenza
    de: Ausdauer
    es: Aguante
    ko: 버티기
  descriptions:
    jp_kana: "こうげきを　うけても\nＨＰを　かならず　１だけ　のこせる。\nれんぞくで　だすと　しっぱい　しやすい。"
    jp_kanji: "攻撃を　受けても\nＨＰを　必ず　１だけ　残せる。\n連続で　だすと　失敗しやすい。"
    en: "The user endures any attack with at least\n1 HP. Its chance of failing rises if it is\nused in succession."
    fr: "Le lanceur résiste aux attaques avec\n1 PV. Peut échouer si utilisée plusieurs\nfois de suite."
    it: "Chi la usa resta con un PS anche se\nsubisce un colpo da KO in quel turno.\nUsata in successione può fallire."
    de: "Nach fatalen Attacken bleibt stets\n1 KP übrig. Misserfolg bei Wiederholung\nmöglich."
    es: "Resiste cualquier ataque y deja\nal menos un PS. Puede fallar\nsi se usa repetidamente."
    ko: "공격을 받아도\nHP를 반드시 1만큼은 남긴다.\n연속으로 쓰면 실패하기 쉽다."
energy_ball:
  names:
    jp_kana: エナジーボール
    jp_kanji: エナジーボール
    en: Energy Ball
    fr: Éco-Sphère
    it: Energipalla
    de: Energieball
    es: Energibola
    ko: 에너지볼
  descriptions:
    jp_kana: "しぜんから　あつめた\nいのちの　ちからを　はっしゃする。\nあいての　とくぼうを　さげることが　ある。"
    jp_kanji: "自然から　集めた\n命の力を　発射する。\n相手の　特防を　さげることが　ある。"
    en: "The user draws power from nature and\nfires it at the target.\nIt may also lower the target’s Sp. Def."
    fr: "Utilise les pouvoirs de la nature pour\nattaquer l’ennemi. Peut aussi baisser\nla Défense Spéciale de l’ennemi."
    it: "Chi la usa attinge energia dalla natura\ne la scaglia contro il nemico. Può anche\nridurne la Difesa Speciale."
    de: "Anwender zieht Kraft aus der Natur und\nfeuert sie auf das Ziel. Senkt eventuell\nSpezial-Verteidigung des Zieles."
    es: "Aúna fuerzas de la naturaleza y libera\nsu ataque. Puede disminuir la Defensa\nEspecial del objetivo."
    ko: "자연으로부터 모은\n생명의 힘을 발사한다. 상대의\n특수방어를 떨어뜨릴 때가 있다."
entrainment:
  names:
    jp_kana: なかまづくり
    jp_kanji: なかまづくり
    en: Entrainment
    fr: Ten-danse
    it: Saltamicizia
    de: Zwango
    es: Danza Amiga
    ko: 동료만들기
  descriptions:
    jp_kana: "ふしぎな　リズムで　おどる。\nうごきを　まねさせて　じぶんと　あいての\nとくせいを　おなじに　する。"
    jp_kanji: "不思議な　リズムで　おどる。\n動きを　まねさせて　自分と　相手の\n特性を　同じに　する。"
    en: "The user dances with an odd rhythm that\ncompels the target to mimic it, making the\ntarget’s Ability the same as the user’s."
    fr: "Le lanceur danse sur un rythme étrange.\nIl force sa cible à l’imiter, ce qui lui fait\nadopter sa capacité spéciale."
    it: "Chi la usa saltella con un buffo ritmo,\ninvitando il bersaglio a imitarlo e rendendo\nla sua abilità identica alla propria."
    de: "Anwender tanzt zu seltsamem Rhythmus und\nzwingt das Ziel mitzumachen. Dieses nimmt\ndabei die Fähigkeit des Anwenders an."
    es: "Una extraña danza que hace que el usuario\ny el objetivo tengan la misma habilidad."
    ko: "이상한 리듬으로 춤춘다.\n움직임을 흉내 내게 해서\n자신과 상대의 특성을 똑같게 만든다."
eruption:
  names:
    jp_kana: ふんか
    jp_kanji: ふんか
    en: Eruption
    fr: Éruption
    it: Eruzione
    de: Eruption
    es: Estallido
    ko: 분화
  descriptions:
    jp_kana: "いかりを　ばくはつ　させて　あいてを\nこうげきする。じぶんの　ＨＰが　すくない\nほど　わざの　いりょくは　さがる。"
    jp_kanji: "怒りを　爆発させて　相手を\n攻撃する。自分の　ＨＰが\n少ないほど　技の　威力は　さがる。"
    en: "The user attacks the opposing team with\nexplosive fury. The lower the user’s HP,\nthe less powerful this attack becomes."
    fr: "Le lanceur laisse exploser sa colère.\nPlus ses PV sont bas et moins l’attaque\nest puissante."
    it: "Attacco impetuoso ed esplosivo la cui\npotenza è proporzionale ai PS di chi\nlo usa."
    de: "Explosiver Angriff. Je höher die KP\ndes Anwenders sind, desto mehr Schaden\nwird angerichtet."
    es: "Furia explosiva. Cuanto menor sea\nel número de PS del usuario, menos\ndaño hará el ataque."
    ko: "분노를 폭발시켜 상대를\n공격한다. 자신의 HP가\n적을수록 기술의 위력이 떨어진다."
explosion:
  names:
    jp_kana: だいばくはつ
    jp_kanji: だいばくはつ
    en: Explosion
    fr: Explosion
    it: Esplosione
    de: Explosion
    es: Explosión
    ko: 대폭발
  descriptions:
    jp_kana: "おおきな　ばくはつで　じぶんの\nまわりに　いるものを　こうげきする。\nつかった　あとに　ひんしに　なる。"
    jp_kanji: "大きな　爆発で　自分の\n周りに　いるものを　攻撃する。\n使ったあとに　ひんしに　なる。"
    en: "The user explodes to inflict damage on\nthose around it.\nThe user faints upon using this move."
    fr: "Le lanceur explose et inflige des\ndégâts à tous les Pokémon autour\nde lui. Met K.O. le lanceur."
    it: "Chi la usa esplode per infliggere danni\nagli altri Pokémon attorno, ma va KO."
    de: "Anwender explodiert, richtet bei allen\nPokémon in seiner Umgebung großen\nSchaden an und wird besiegt."
    es: "El atacante explota y hiere a todos\na su alrededor. El usuario\nse debilita de inmediato."
    ko: "큰 폭발로 자신의\n주위에 있는 포켓몬을 공격한다.\n쓰고 나서는 기절한다."
extrasensory:
  names:
    jp_kana: じんつうりき
    jp_kanji: じんつうりき
    en: Extrasensory
    fr: Extrasenseur
    it: Extrasenso
    de: Sondersensor
    es: Paranormal
    ko: 신통력
  descriptions:
    jp_kana: "みえない　ふしぎな　ちからを\nおくって　こうげきする。\nあいてを　ひるませる　ことが　ある。"
    jp_kanji: "みえない　不思議な　力を\n送って　攻撃する。\n相手を　ひるませることが　ある。"
    en: "The user attacks with an odd,\nunseeable power.\nIt may also make the target flinch."
    fr: "Le lanceur attaque avec un pouvoir\nétrange et invisible. Peut aussi\napeurer l’ennemi."
    it: "Chi la usa attacca con una misteriosa\nforza invisibile. Può far tentennare\nil nemico."
    de: "Besonderer Angriff mit einer unsichtbaren\nKraft, die das Ziel eventuell\nzurückschrecken lässt."
    es: "Energía muy extraña que puede\nhacer retroceder al objetivo."
    ko: "보이지 않는 이상한 힘을\n보내어 공격한다.\n상대를 풀죽게 만들 때가 있다."
extreme_speed:
  names:
    jp_kana: しんそく
    jp_kanji: しんそく
    en: ExtremeSpeed
    fr: Vit.Extrême
    it: Extrarapido
    de: Turbotempo
    es: Vel. Extrema
    ko: 신속
  descriptions:
    jp_kana: "めにも　とまらぬ　ものすごい　はやさで\nあいてに　とっしんして　こうげきする。\nかならず　せんせい　こうげき　できる。"
    jp_kanji: "目にも　留まらぬ　ものすごい　速さで\n相手に　突進して　攻撃する。\n必ず　先制攻撃　できる。"
    en: "The user charges the target at blinding\nspeed. This attack always goes\nbefore any other move."
    fr: "Le lanceur charge à une vitesse\nrenversante. Cette attaque a\ntoujours l’initiative."
    it: "Chi la usa carica il nemico a velocità\nimpressionante ed attacca sempre per\nprimo."
    de: "Extrem schnelle und kraftvolle\nAttacke, die stets zuerst trifft."
    es: "Ataque muy rápido que siempre\nse realiza el primero."
    ko: "눈에 보이지 않는 굉장한 속도로\n상대에게 돌진하여 공격한다.\n반드시 선제공격을 할 수 있다."
facade:
  names:
    jp_kana: からげんき
    jp_kanji: からげんき
    en: Facade
    fr: Façade
    it: Facciata
    de: Fassade
    es: Imagen
    ko: 객기
  descriptions:
    jp_kana: "じぶんが　どく　まひ　やけど\nじょうたいの　とき　あいてに　くりだすと\nわざの　いりょくが　２ばいに　なる。"
    jp_kanji: "自分が　毒　まひ　やけど\n状態のとき　相手に　くりだすと\n技の　威力が　２倍に　なる。"
    en: "An attack move that doubles its power if\nthe user is poisoned, burned, or\nhas paralysis."
    fr: "Une attaque dont la puissance double\nlorsque le lanceur est empoisonné,\nparalysé ou brûlé."
    it: "Mossa d’attacco che raddoppia la potenza\nse chi la usa è scottato, avvelenato\no paralizzato."
    de: "Doppelte Stärke nach Verbrennung,\nParalyse oder Vergiftung."
    es: "Ataca con el doble de potencia\nsi el usuario está quemado,\nparalizado o envenenado."
    ko: "자신이 독, 마비, 화상\n상태일 때 날리면\n기술의 위력이 2배가 된다."
fake_out:
  names:
    jp_kana: ねこだまし
    jp_kanji: ねこだまし
    en: Fake Out
    fr: Bluff
    it: Bruciapelo
    de: Mogelhieb
    es: Sorpresa
    ko: 속이다
  descriptions:
    jp_kana: "せんせい　こうげきで　あいてを\nひるませる。せんとうに　でたら\nすぐに　ださないと　せいこう　しない。"
    jp_kanji: "先制攻撃で　相手を　ひるませる。\n戦闘に　でたら\nすぐに　ださないと　成功しない。"
    en: "An attack that hits first and makes the\ntarget flinch. It only works the first turn\nthe user is in battle."
    fr: "Permet de frapper en premier et\napeure l’ennemi. Ne fonctionne\nqu’au premier tour."
    it: "Mossa che fa agire per primo e fa\ntentennare il nemico. Funziona solo\nappena sceso in campo."
    de: "Diese Attacke trifft zuerst. Das Ziel\nschreckt zurück. Gelingt nur in der\nersten Runde eines Kampfes."
    es: "Ataca primero y, además, hace retroceder\nal objetivo. Solo sirve en el primer turno."
    ko: "선제공격으로 상대를 풀죽게 한다.\n배틀에 나가서\n바로 쓰지 않으면 성공할 수 없다."
fake_tears:
  names:
    jp_kana: うそなき
    jp_kanji: うそなき
    en: Fake Tears
    fr: Croco Larme
    it: Falselacrime
    de: Trugträne
    es: Llanto Falso
    ko: 거짓울음
  descriptions:
    jp_kana: "ないた　ふりをして　なみだを　ながす。\nこまらせる　ことで\nあいての　とくぼうを　がくっと　さげる。"
    jp_kanji: "ないた　ふりをして　涙を　流す。\nこまらせる　ことで\n相手の　特防を　がくっと　さげる。"
    en: "The user feigns crying to fluster\nthe target, harshly lowering its\nSp. Def stat."
    fr: "Le lanceur fait semblant de pleurer\npour troubler l’ennemi et baisser\nfortement sa Défense Spéciale."
    it: "Chi la usa inscena un pianto teatrale per\ncommuovere il nemico. Ne riduce di molto la\nDifesa Speciale."
    de: "Täuscht Weinen vor, um die\nSpezial-Verteidigung des Zieles\nstark zu senken."
    es: "Lágrimas de cocodrilo que bajan mucho\nla Defensa Especial del objetivo."
    ko: "우는 척을 하며 눈물을 흘린다.\n난처하게 만들어\n상대의 특수방어를 크게 떨어뜨린다."
false_swipe:
  names:
    jp_kana: みねうち
    jp_kanji: みねうち
    en: False Swipe
    fr: Faux-Chage
    it: Falsofinale
    de: Trugschlag
    es: Falsotortazo
    ko: 칼등치기
  descriptions:
    jp_kana: "あいての　ＨＰが　\nかならず　１だけ　のこる　ように\nてかげん　して　こうげきする。"
    jp_kanji: "相手の　ＨＰが　\n必ず　１だけ　残るように\n手加減して　攻撃する。"
    en: "A restrained attack that prevents the\ntarget from fainting.\nThe target is left with at least 1 HP."
    fr: "Le lanceur retient ses coups pour\nque l’ennemi garde au moins 1 PV et\nne tombe pas K.O."
    it: "Chi la usa trattiene il colpo per impedire\nal nemico di andare KO, lasciandolo con\nalmeno un PS."
    de: "Ein Angriff, der dem Ziel\nzumindest 1 KP lässt."
    es: "Ataque moderado que no debilita\nal objetivo y le deja al menos un PS."
    ko: "상대의 HP가\n반드시 1만큼 남도록\n조절하여 공격한다."
feather_dance:
  names:
    jp_kana: フェザーダンス
    jp_kanji: フェザーダンス
    en: FeatherDance
    fr: Danse-Plume
    it: Danzadipiume
    de: Daunenreigen
    es: Danza Pluma
    ko: 깃털댄스
  descriptions:
    jp_kana: "うもうを　ふりまいて\nあいての　からだに　からませる。\nあいての　こうげきを　がくっと　さげる。"
    jp_kanji: "羽毛を　ふりまいて\n相手の　体に　からませる。\n相手の　攻撃を　がくっと　さげる。"
    en: "The user covers the target’s body with a\nmass of down that harshly lowers its\nAttack stat."
    fr: "Une montagne de plumes ensevelit\nl’ennemi et réduit considérablement\nson Attaque."
    it: "Chi la usa copre il nemico con un manto\ndi piume che riduce di molto il suo Attacco."
    de: "Hüllt das Ziel in Daunen und senkt\ndessen Angriffs-Wert stark."
    es: "Envuelve al objetivo con un manto de\nplumas para reducir mucho su Ataque."
    ko: "깃털을 흩뿌려\n상대의 몸에 휘감는다.\n상대의 공격을 크게 떨어뜨린다."
feint:
  names:
    jp_kana: フェイント
    jp_kanji: フェイント
    en: Feint
    fr: Ruse
    it: Fintoattacco
    de: Offenlegung
    es: Amago
    ko: 페인트
  descriptions:
    jp_kana: "まもるや　みきりを　している\nあいてに　こうげきが　できる。\nまもりの　こうかを　かいじょ　させる。"
    jp_kanji: "まもるや　みきりを　している\n相手に　攻撃が　できる。\n守りの　効果を　解除させる。"
    en: "An attack that hits a target using\nProtect or Detect. It also lifts\nthe effects of those moves."
    fr: "Une attaque capable de toucher un ennemi\nqui utilise Détection ou Abri. Annule aussi\nleur effet."
    it: "Mossa che colpisce anche un nemico che ha\nusato Protezione o Individua, annullandone\ngli effetti."
    de: "Ziele, die Schutzschild oder Scanner\nverwenden, werden getroffen. Entfernt\nEffekte dieser Attacken."
    es: "Permite golpear a objetivos que usan\nProtección o Detección y anula\ndichos movimientos."
    ko: "방어나 판별을 하고 있는\n상대에게 공격할 수 있다.\n방어 효과를 해제시킨다."
feint_attack:
  names:
    jp_kana: だましうち
    jp_kanji: だましうち
    en: Faint Attack
    fr: Feinte
    it: Finta
    de: Finte
    es: Finta
    ko: 속여때리기
  descriptions:
    jp_kana: "さりげなく　あいてに　ちかづき\nゆだんした　すきを　みて　なぐりつける。\nこうげきは　かならず　めいちゅう　する。"
    jp_kanji: "さりげなく　相手に　ちかづき\n油断した　すきを　みて　なぐりつける。\n攻撃は　必ず　命中する。"
    en: "The user approaches the target\ndisarmingly, then throws a sucker punch.\nIt hits without fail."
    fr: "Le lanceur s’approche l’air de rien avant\nde frapper par surprise. N’échoue jamais."
    it: "Chi la usa si avvicina al nemico facendo\nfinta di niente, per poi scagliare un pugno\ninfallibile a tradimento."
    de: "Anwender nähert sich mit Unschuldsmiene\ndem Ziel und schlägt zu, sobald dieses\nunachtsam wird. Ein Treffer ist gewiss."
    es: "Engaña al objetivo para acercarse\ny dar un puñetazo que no falla."
    ko: "슬금슬금 상대에게 다가가\n방심한 틈을 타서 세게 때린다.\n공격은 반드시 명중한다."
fiery_dance:
  names:
    jp_kana: ほのおのまい
    jp_kanji: ほのおのまい
    en: Fiery Dance
    fr: Danse du Feu
    it: Voldifuoco
    de: Feuerreigen
    es: Danza Llama
    ko: 불꽃춤
  descriptions:
    jp_kana: "ほのおを　まとい　はばたいて　あいてを\nこうげきする。じぶんの　とくこうが\nあがることが　ある。"
    jp_kanji: "炎を　まとい　はばたいて　相手を\n攻撃する。自分の　特攻が\nあがることが　ある。"
    en: "Cloaked in flames, the user dances\nand flaps its wings. It may also\nraise the user’s Sp. Atk stat."
    fr: "Le lanceur enveloppe l’ennemi de flammes.\nPeut aussi augmenter l’Attaque Spéciale\ndu lanceur."
    it: "Chi la usa avvolge il bersaglio tra le\nfiamme. Può anche aumentare l’Attacco\nSpeciale."
    de: "Hüllt das Ziel mit einer Feuerhose\nin Flammen. Erhöht eventuell den\nSpezial-Angriff des Anwenders."
    es: "El Pokémon golpea envuelto en llamas.\nPuede aumentar el Ataque Especial\nde quien lo usa."
    ko: "불꽃을 둘러 날개를 쳐서\n공격한다. 자신의 특수공격이\n오를 때가 있다."
final_gambit:
  names:
    jp_kana: いのちがけ
    jp_kanji: いのちがけ
    en: Final Gambit
    fr: Tout ou Rien
    it: Azzardo
    de: Wagemut
    es: Sacrificio
    ko: 목숨걸기
  descriptions:
    jp_kana: "いのちがけで　あいてを　こうげきする。\nじぶんは　ひんしに　なるが　あいてに\nＨＰぶんの　ダメージを　あたえる。"
    jp_kanji: "命懸けで　相手を　攻撃する。\n自分は　ひんしに　なるが　相手に\nＨＰ分の　ダメージを　与える。"
    en: "The user risks everything to attack its\ntarget. The user faints but does damage\nequal to the user’s HP."
    fr: "Une attaque très risquée. Le lanceur perd\ntous ses PV restants et inflige autant de\ndégâts à l’ennemi."
    it: "Chi la usa attacca con tutta la potenza di\ncui dispone e va KO, ma infligge al bersaglio\nun danno pari ai PS che ha perso."
    de: "Ein Angriff, der dem Ziel Schaden in Höhe\nder aktuellen KP des Anwenders zufügt.\nLetzterer wird dadurch selbst besiegt."
    es: "El usuario se sacrifica causándole\nun daño al objetivo equivalente\na sus propios PS perdidos."
    ko: "목숨을 걸고 상대를 공격한다.\n자신은 기절하게 되지만 상대에게\nHP만큼의 데미지를 준다."
fire_blast:
  names:
    jp_kana: だいもんじ
    jp_kanji: だいもんじ
    en: Fire Blast
    fr: Déflagration
    it: Fuocobomba
    de: Feuersturm
    es: Llamarada
    ko: 불대문자
  descriptions:
    jp_kana: "だいのじの　ほのおで\nあいてを　やきつくす。\nやけど　じょうたいに　することが　ある。"
    jp_kanji: "大の字の　炎で\n相手を　焼きつくす。\nやけど状態に　することが　ある。"
    en: "The target is attacked with an intense\nblast of all-consuming fire.\nIt may also leave the target with a burn."
    fr: "Un déluge de flammes ardentes submerge\nl’ennemi. Peut aussi le brûler."
    it: "Investe il nemico con un’intensa fiammata\nche fa terra bruciata. Può anche\nscottarlo."
    de: "Feuersbrunst, die das Ziel versengt\nund ihm eventuell eine Verbrennung\nzufügt."
    es: "Llama intensa que chamusca\ny puede causar quemaduras."
    ko: "큰 대자의 불꽃으로\n상대를 불태운다.\n화상 상태로 만들 때가 있다."
fire_fang:
  names:
    jp_kana: ほのおのキバ
    jp_kanji: ほのおのキバ
    en: Fire Fang
    fr: Crocs Feu
    it: Rogodenti
    de: Feuerzahn
    es: Colm. Ígneo
    ko: 불꽃엄니
  descriptions:
    jp_kana: "ほのおを　まとった　キバで　かみつく。\nあいてを　ひるませたり\nやけど　じょうたいに　することが　ある。"
    jp_kanji: "炎を　まとった　キバで　かみつく。\n相手を　ひるませたり\nやけど状態に　することが　ある。"
    en: "The user bites with flame-cloaked fangs.\nIt may also make the target flinch or leave\nit burned."
    fr: "Le lanceur utilise une morsure enflammée.\nPeut aussi brûler ou apeurer l’ennemi."
    it: "Chi la usa morde con denti infuocati. Può\nanche scottare o far tentennare il nemico."
    de: "Anwender beißt mit flammenden\nReißzähnen zu. Ziel schreckt\neventuell zurück oder verbrennt sich."
    es: "Usa colmillos en llamas para morder.\nPuede hacer que el objetivo retroceda\no reciba quemaduras."
    ko: "불꽃을 두른 이빨로 문다.\n상대를 풀죽게 하거나\n화상 상태로 만들 때가 있다."
fire_pledge:
  names:
    jp_kana: ほのおのちかい
    jp_kanji: ほのおのちかい
    en: Fire Pledge
    fr: Aire de Feu
    it: Fiammapatto
    de: Feuersäulen
    es: Voto Fuego
    ko: 불꽃의맹세
  descriptions:
    jp_kana: "ほのおの　はしらで　こうげきする。\nくさと　くみあわせると　いりょくが\nあがって　あたりが　ひの　うみに　なる。"
    jp_kanji: "炎の柱で　攻撃する。\nくさと　組みあわせると　威力が\nあがって　周りが　火の海に　なる。"
    en: "A column of fire hits opposing Pokémon.\nWhen used with its Grass equivalent, its\ndamage increases into a vast sea of fire."
    fr: "Une masse de feu s’abat sur l’ennemi.\nEn l’utilisant avec Aire d’Herbe, l’effet\naugmente et une mer de feu apparaît."
    it: "Attacca il nemico con una colonna di fuoco.\nSe usata con Erbapatto, aumentano gli\neffetti e il campo diventa un mare di fuoco."
    de: "Ein Angriff mit Feuersäulen. Kombiniert mit\nPflanzsäulen steigt die Wirkung und die\nUmgebung wird zu einem Meer aus Feuer."
    es: "Ataca con columnas de fuego.\nCombinado con un ataque tipo planta crea\nun mar de llamas y aumenta su potencia."
    ko: "불꽃기둥으로 공격한다.\n풀과 조합하면 위력이\n올라가고 주위가 불바다가 된다."
fire_punch:
  names:
    jp_kana: ほのおのパンチ
    jp_kanji: ほのおのパンチ
    en: Fire Punch
    fr: Poing de Feu
    it: Fuocopugno
    de: Feuerschlag
    es: Puño Fuego
    ko: 불꽃펀치
  descriptions:
    jp_kana: "ほのおを　こめた　パンチで\nあいてを　こうげきする。\nやけど　じょうたいに　することが　ある。"
    jp_kanji: "炎を　こめた　パンチで\n相手を　攻撃する。\nやけど状態に　することが　ある。"
    en: "The target is punched with a fiery fist.\nIt may also leave the target with a burn."
    fr: "Un coup de poing enflammé vient\nfrapper l’ennemi. Peut le brûler."
    it: "Colpisce il nemico con un pugno ardente\nche può scottarlo."
    de: "Feuriger Schlag, der dem Ziel eventuell\nVerbrennungen zufügt."
    es: "Puñetazo ardiente.\nPuede quemar."
    ko: "불꽃을 담은 펀치로\n상대를 공격한다.\n화상 상태로 만들 때가 있다."
fire_spin:
  names:
    jp_kana: ほのおのうず
    jp_kanji: ほのおのうず
    en: Fire Spin
    fr: Danseflamme
    it: Turbofuoco
    de: Feuerwirbel
    es: Giro Fuego
    ko: 회오리불꽃
  descriptions:
    jp_kana: "はげしく　うずをまく　ほのおの　なかに\n４ー５ターンの　あいだ\nあいてを　とじこめて　こうげきする。"
    jp_kanji: "激しく　渦をまく　炎の中に\n４ー５ターンの　あいだ\n相手を　閉じこめて　攻撃する。"
    en: "The target becomes trapped within a\nfierce vortex of fire that rages for four\nto five turns."
    fr: "Un tourbillon de flammes emprisonne\nl’ennemi pendant 4 à 5 tours."
    it: "Intrappola il bersaglio in un turbine di\nfuoco che dura per quattro o cinque turni."
    de: "Das Ziel wird für 4 bis 5 Runden in\neinem Feuerkreis gefangen."
    es: "Un aro de fuego que atrapa al objetivo\nde cuatro a cinco turnos."
    ko: "세차게 소용돌이치는 불꽃 속에\n4-5턴 동안\n상대를 가두어 공격한다."
fissure:
  names:
    jp_kana: じわれ
    jp_kanji: じわれ
    en: Fissure
    fr: Abîme
    it: Abisso
    de: Geofissur
    es: Fisura
    ko: 땅가르기
  descriptions:
    jp_kana: "じわれの　さけめに\nあいてを　おとして　こうげきする。\nあたれば　いちげきで　ひんしに　する。"
    jp_kanji: "地割れの　裂け目に\n相手を　落として　攻撃する。\n当たれば　一撃で　ひんしに　する。"
    en: "The user opens up a fissure in the ground\nand drops the target in.\nThe target instantly faints if it hits."
    fr: "Le lanceur fait tomber l’ennemi dans une\ncrevasse. Si cette attaque réussit,\nelle met K.O. sur le coup."
    it: "Chi la usa crea una spaccatura nel terreno\ne cerca di gettarvici dentro il nemico. Se\nva a segno, il nemico va KO."
    de: "Das Ziel wird in eine Erdspalte\ngeworfen. Ist die Attacke erfolgreich,\nführt sie zu einem K.O."
    es: "Abre una grieta en el suelo y mete al\nobjetivo en ella. Fulmina en un golpe."
    ko: "땅이 갈라진 곳에\n상대를 떨어뜨려 공격한다.\n맞으면 일격에 기절한다."
flail:
  names:
    jp_kana: じたばた
    jp_kanji: じたばた
    en: Flail
    fr: Fléau
    it: Flagello
    de: Dreschflegel
    es: Azote
    ko: 바둥바둥
  descriptions:
    jp_kana: "じたばた　あばれて　こうげきする。\nじぶんの　ＨＰが　すくないほど\nわざの　いりょくは　あがる。"
    jp_kanji: "じたばた　暴れて　攻撃する。\n自分の　ＨＰが　少ないほど\n技の　威力は　あがる。"
    en: "The user flails about aimlessly to attack.\nIt becomes more powerful the less HP\nthe user has."
    fr: "Le lanceur fait tournoyer son fléau.\nPlus ses PV sont bas, plus l’attaque\nest puissante."
    it: "Chi la usa si dimena per attaccare. È più\nefficace se i suoi PS sono bassi."
    de: "Attacke richtet mehr Schaden\nan, wenn eigene KP niedrig sind."
    es: "Ataque frenético.\nCuantos menos PS tenga el usuario,\nmás daño produce."
    ko: "바둥바둥 난동부려서 공격한다.\n자신의 HP가 적을수록\n기술의 위력이 올라간다."
flame_burst:
  names:
    jp_kana: はじけるほのお
    jp_kanji: はじけるほのお
    en: Flame Burst
    fr: Rebondifeu
    it: Pirolancio
    de: Funkenflug
    es: Pirotecnia
    ko: 불꽃튀기기
  descriptions:
    jp_kana: "あたると　はじける　ほのおで　あいてを\nこうげきする。はじけた　ほのおは\nとなりの　あいてにも　ふりかかる。"
    jp_kanji: "当たると　はじける　炎で　相手を\n攻撃する。はじけた　炎は\n隣の　相手にも　ふりかかる。"
    en: "The user attacks the target with a\nbursting flame. The bursting flame damages\nPokémon next to the target as well."
    fr: "Quand l’attaque atteint sa cible, elle\nprojette des flammes qui touchent\ntout ennemi situé à côté."
    it: "Chi la usa emana una fiammata che colpisce\nil bersaglio e si propaga fino a raggiungere\ni Pokémon accanto."
    de: "Bei Erfolg Angriff mit berstenden Feuer-\nblasen. Die Funken der geplatzten\nBlasen treffen auch benachbarte Ziele."
    es: "Golpea al objetivo con una llamarada que\nafecta a sus Pokémon adyacentes."
    ko: "맞으면 튀는 불꽃으로 상대를\n공격한다. 튕긴 불꽃은\n옆의 상대에게도 쏟아진다."
flame_charge:
  names:
    jp_kana: ニトロチャージ
    jp_kanji: ニトロチャージ
    en: Flame Charge
    fr: Nitrocharge
    it: Nitrocarica
    de: Nitroladung
    es: Nitrocarga
    ko: 니트로차지
  descriptions:
    jp_kana: "ほのおを　まとい　あいてを\nこうげきする。ちからを　ためて　じぶんの\nすばやさを　あげる。"
    jp_kanji: "炎を　まとい　相手を　攻撃する。\n力を　ためて　自分の\n素早さを　あげる。"
    en: "The user cloaks itself with flame and\nattacks. Building up more power,\nit raises the user’s Speed stat."
    fr: "Le lanceur s’entoure de flammes pour\nattaquer l’ennemi. Il se concentre\net sa Vitesse augmente."
    it: "Chi la usa si copre di fuoco e attacca\nil bersaglio. Concentrandosi aumenta,\ninoltre, la propria Velocità."
    de: "Anwender hüllt sich in Flammen und greift\ndas Ziel an. Sammelt seine Energie und\nerhöht dadurch die eigene Initiative."
    es: "Llamas que golpean al objetivo y\naumentan la Velocidad del atacante."
    ko: "불꽃을 둘러 상대를 공격한다.\n힘을 모아서 자신의\n스피드를 올린다."
flame_wheel:
  names:
    jp_kana: かえんぐるま
    jp_kanji: かえんぐるま
    en: Flame Wheel
    fr: Roue de Feu
    it: Ruotafuoco
    de: Flammenrad
    es: Rueda Fuego
    ko: 화염자동차
  descriptions:
    jp_kana: "ほのおを　まとい\nあいてに　とっしんして　こうげきする。\nやけど　じょうたいに　することが　ある。"
    jp_kanji: "炎を　まとい\n相手に　突進して　攻撃する。\nやけど状態に　することが　ある。"
    en: "The user cloaks itself in fire and\ncharges at the target.\nIt may also leave the target with a burn."
    fr: "Le lanceur s’entoure de feu et charge\nl’ennemi. Peut aussi brûler l’ennemi."
    it: "Chi la usa si copre di fuoco e carica\nil nemico. Può anche scottarlo."
    de: "Feuer-Attacke, die das Ziel eventuell\nverbrennt."
    es: "Ataca envuelto en fuego.\nPuede causar quemaduras."
    ko: "불꽃을 둘러\n상대에게 돌진하여 공격한다.\n화상 상태로 만들 때가 있다."
flamethrower:
  names:
    jp_kana: かえんほうしゃ
    jp_kanji: かえんほうしゃ
    en: Flamethrower
    fr: Lance-Flamme
    it: Lanciafiamme
    de: Flammenwurf
    es: Lanzallamas
    ko: 화염방사
  descriptions:
    jp_kana: "はげしい　ほのおを\nあいてに　はっしゃして　こうげきする。\nやけど　じょうたいに　することが　ある。"
    jp_kanji: "激しい　炎を\n相手に　発射して　攻撃する。\nやけど状態に　することが　ある。"
    en: "The target is scorched with an intense\nblast of fire. It may also leave the target\nwith a burn."
    fr: "L’ennemi reçoit un torrent de flammes.\nPeut aussi le brûler."
    it: "Il nemico viene colpito da intense\nfiammate che possono anche scottarlo."
    de: "Starke Feuer-Attacke, durch die das\nZiel eventuell Verbrennungen\nerleidet."
    es: "Ataca con una gran ráfaga de fuego que\npuede causar quemaduras."
    ko: "세찬 불꽃을\n상대에게 발사하여 공격한다.\n화상 상태로 만들 때가 있다."
flare_blitz:
  names:
    jp_kana: フレアドライブ
    jp_kanji: フレアドライブ
    en: Flare Blitz
    fr: Boutefeu
    it: Fuococarica
    de: Flammenblitz
    es: Envite Ígneo
    ko: 플레어드라이브
  descriptions:
    jp_kana: "ほのおを　まとって　とっしんする。\nじぶんも　かなり　ダメージを　うける。\nやけど　じょうたいに　することが　ある。"
    jp_kanji: "炎を　まとって　突進する。\n自分も　かなり　ダメージを　受ける。\nやけど状態に　することが　ある。"
    en: "The user cloaks itself in fire and charges\nat the target. The user sustains serious\ndamage and may leave the target burned."
    fr: "Le lanceur s’embrase avant de charger\nl’ennemi. Le choc blesse aussi gravement\nle lanceur. Peut brûler l’ennemi."
    it: "Chi la usa si ricopre di fuoco e carica\nil bersaglio, ma subisce il contraccolpo.\nPuò anche scottare."
    de: "Anwender hüllt sich in Flammen und stürmt\nauf das Ziel, das sich evtl. verbrennt.\nAnwender nimmt selbst großen Schaden."
    es: "El Pokémon se cubre de llamas y carga\ncontra el objetivo, aunque él también\nrecibe daños."
    ko: "불꽃을 두르고 돌진한다.\n자신도 상당한 데미지를 입는다.\n화상 상태로 만들 때가 있다."
flash:
  names:
    jp_kana: フラッシュ
    jp_kanji: フラッシュ
    en: Flash
    fr: Flash
    it: Flash
    de: Blitz
    es: Destello
    ko: 플래시
  descriptions:
    jp_kana: "まぶしい　ひかりで　\nあいての　めいちゅうりつを　さげる。\nくらい　どうくつも　あかるく　てらせる。"
    jp_kanji: "まぶしい　光で　\n相手の　命中率を　さげる。\n暗い　どうくつも　明るく　照らせる。"
    en: "The user flashes a bright light that cuts\nthe target’s accuracy.\nIt can also be used to illuminate caves."
    fr: "Explosion lumineuse qui fait baisser la\nPrécision de l’ennemi. Permet aussi\nd’éclairer les grottes."
    it: "Investe il nemico con un flash che ne\nriduce la precisione. Fuori dalla lotta\nserve per illuminare le grotte."
    de: "Erzeugt helles Licht, das die\nGenauigkeit des Zieles senkt\nund Höhlen ausleuchten kann."
    es: "Luz cegadora que baja la Precisión\ndel objetivo. Fuera de combate sirve\npara iluminar."
    ko: "눈이 부신 빛으로\n상대의 명중률을 떨어뜨린다.\n어두운 동굴도 밝게 비춰준다."
flash_cannon:
  names:
    jp_kana: ラスターカノン
    jp_kanji: ラスターカノン
    en: Flash Cannon
    fr: Luminocanon
    it: Cannonflash
    de: Lichtkanone
    es: Foco Respl.
    ko: 러스터캐논
  descriptions:
    jp_kana: "からだの　ひかりを　いってんに　あつめて\nちからを　はなつ。あいての　とくぼうを\nさげることが　ある。"
    jp_kanji: "体の　光を　一点に　集めて\n力を　放つ。\n相手の　特防を　さげることが　ある。"
    en: "The user gathers all its light energy and\nreleases it at once. It may also lower the\ntarget’s Sp. Def stat."
    fr: "Le lanceur concentre son énergie\nlumineuse et la fait exploser. Peut aussi\nbaisser la Défense Spéciale de l’ennemi."
    it: "Chi la usa attacca raccogliendo e\nrilasciando energia luminosa. Può\nridurre la Difesa Speciale del nemico."
    de: "Anwender sammelt Lichtenergie und\nfeuert sie auf einmal ab. Senkt eventuell\nSpezial-Verteidigung des Zieles."
    es: "El usuario concentra toda la luz\ndel cuerpo y la libera. Puede bajar\nla Defensa Especial del objetivo."
    ko: "몸의 빛을 한곳에 모아서\n힘을 쏜다. 상대의\n특수방어를 떨어뜨릴 때가 있다."
flatter:
  names:
    jp_kana: おだてる
    jp_kanji: おだてる
    en: Flatter
    fr: Flatterie
    it: Adulazione
    de: Schmeichler
    es: Camelo
    ko: 부추기기
  descriptions:
    jp_kana: "あいてを　おだてて　こんらん　させる。\nどうじに　あいての　とくこうも\nあげて　しまう。"
    jp_kanji: "相手を　おだてて　混乱させる。\n同時に　相手の　特攻も\nあげてしまう。"
    en: "Flattery is used to confuse the target.\nHowever, it also raises the target’s\nSp. Atk stat."
    fr: "Rend la cible confuse, mais\naugmente son Attaque Spéciale."
    it: "Adula il bersaglio e lo confonde, ma ne\naumenta l’Attacco Speciale."
    de: "Schmeichelt dem Ziel, um es zu verwirren.\nErhöht dessen Spezial-Angriff."
    es: "Halaga al objetivo y lo confunde, pero\ntambién sube su Ataque Especial."
    ko: "상대를 부추겨서 혼란시킨다.\n동시에 상대의 특수공격도\n올라가 버린다."
fling:
  names:
    jp_kana: なげつける
    jp_kanji: なげつける
    en: Fling
    fr: Dégommage
    it: Lancio
    de: Schleuder
    es: Lanzamiento
    ko: 내던지기
  descriptions:
    jp_kana: "もたせた　どうぐを\nすばやく　なげつけて　こうげきする。\nどうぐで　いりょくと　こうかが　かわる。"
    jp_kanji: "持たせた　道具を\n素早く　投げつけて　攻撃する。\n道具で　威力と　効果が　変わる。"
    en: "The user flings its held item at the target\nto attack. Its power and effects depend\non the item."
    fr: "Le lanceur envoie l’objet qu’il tient\nsur l’ennemi. La puissance et les\neffets dépendent de l’objet."
    it: "Chi la usa lancia sul nemico lo strumento\nche tiene. La forza e l’effetto dipendono\ndallo strumento."
    de: "Anwender schleudert sein Item auf\ndas Ziel. Kraft und Effekt der Attacke\nhängen vom Item ab."
    es: "Lanza contra el objetivo el objeto que\nlleva. La fuerza del ataque y su efecto\nvarían según el objeto."
    ko: "지니게 한 도구를\n재빠르게 내던져서 공격한다.\n도구에 따라 위력과 효과가 바뀐다."
fly:
  names:
    jp_kana: そらをとぶ
    jp_kanji: そらをとぶ
    en: Fly
    fr: Vol
    it: Volo
    de: Fliegen
    es: Vuelo
    ko: 공중날기
  descriptions:
    jp_kana: "１ターンめで　そらへ　とび\n２ターンめに　あいてを　こうげきする。\nしっている　まちに　とぶことも　できる。"
    jp_kanji: "１ターン目で　空へ　飛び\n２ターン目に　相手を　攻撃する。\n知っている　街に　飛ぶことも　できる。"
    en: "The user soars, then strikes its target\non the second turn. It can also be\nused for flying to any familiar town."
    fr: "Le lanceur s’envole au 1ᵉʳ tour et\nfrappe au 2ᵉ. Permet aussi de voler\njusqu’à une ville déjà visitée."
    it: "Chi la usa si alza in volo per attaccare\nal turno seguente. Fuori dalla lotta\npermette di volare in città già visitate."
    de: "Steigt in Runde 1 empor und trifft das\nZiel in Runde 2. Ermöglicht Flug in\njede bekannte Stadt."
    es: "Primer turno: vuela. Segundo turno:\nataca. Fuera de combate, permite ir\na sitios ya conocidos."
    ko: "1턴째에 하늘을 날아\n2턴째에 상대를 공격한다.\n알고 있는 도시로 날아갈 수 있다."
focus_blast:
  names:
    jp_kana: きあいだま
    jp_kanji: きあいだま
    en: Focus Blast
    fr: Exploforce
    it: Focalcolpo
    de: Fokusstoß
    es: Onda Certera
    ko: 기합구슬
  descriptions:
    jp_kana: "きあいを　たかめて　こんしんの　ちからを\nほうしゅつする。あいての　とくぼうを\nさげることが　ある。"
    jp_kanji: "気合を　高めて\nありったけの　力を　放出する。\n相手の　特防を　さげることが　ある。"
    en: "The user heightens its mental focus and\nunleashes its power.\nIt may also lower the target’s Sp. Def."
    fr: "Le lanceur rassemble ses forces et laisse\néclater son pouvoir. Peut aussi baisser la\nDéfense Spéciale de l’ennemi."
    it: "Chi la usa si concentra e rilascia la sua\nforza. Può ridurre la Difesa Speciale del\nPokémon colpito."
    de: "Anwender erhöht seinen mentalen Fokus\nund greift dann an. Senkt eventuell\nSpezial-Verteidigung des Zieles."
    es: "Agudiza la concentración mental y\nlibera su poder. Puede disminuir\nla Defensa Especial del objetivo."
    ko: "기합을 높여서\n혼신의 힘을 방출한다. 상대의\n특수방어를 떨어뜨릴 때가 있다."
focus_energy:
  names:
    jp_kana: きあいだめ
    jp_kanji: きあいだめ
    en: Focus Energy
    fr: Puissance
    it: Focalenergia
    de: Energiefokus
    es: Foco Energía
    ko: 기충전
  descriptions:
    jp_kana: "ふかく　いきを　すい　きあいを　こめる。\nじぶんの　こうげきが\nきゅうしょに　あたりやすく　なる。"
    jp_kanji: "深く　息を　吸い　気合を　こめる。\n自分の　攻撃が\n急所に　当たりやすくなる。"
    en: "The user takes a deep breath and\nfocuses so that critical hits land\nmore easily."
    fr: "Le lanceur prend une profonde inspiration\net se concentre pour augmenter son taux\nde critiques."
    it: "Chi la usa fa un profondo respiro e si\nconcentra per rendere più probabili\ni brutti colpi."
    de: "Anwender atmet ein und bündelt Kraft.\nDie Volltrefferquote steigt dadurch."
    es: "Concentra energía para aumentar\nlas posibilidades de un golpe crítico."
    ko: "깊게 숨을 들이마셔 기합을 넣는다.\n자신의 공격이\n급소에 맞기 쉬워진다."
focus_punch:
  names:
    jp_kana: きあいパンチ
    jp_kanji: きあいパンチ
    en: Focus Punch
    fr: Mitra-Poing
    it: Centripugno
    de: Power-Punch
    es: Puño Certero
    ko: 힘껏펀치
  descriptions:
    jp_kana: "せいしんを　たかめて　パンチを\nくりだす。わざを　だす　までに\nこうげきを　うけると　しっぱい　する。"
    jp_kanji: "精神を　高めて　パンチを　くりだす。\n技を　だすまでに\n攻撃を　受けると　失敗する。"
    en: "The user focuses its mind before\nlaunching a punch. It will fail if the user\nis hit before it is used."
    fr: "Le lanceur se concentre avant\nd’attaquer. Échoue s’il est touché\navant d’avoir frappé."
    it: "Chi la usa prende la mira prima di sferrare\nun pugno. Fallirà se verrà colpito prima\ndi eseguire la mossa."
    de: "Anwender konzentriert sich, bevor er\nangreift. Wird er vorher getroffen, ist\ndie Attacke erfolglos."
    es: "Se concentra para dar un puñetazo.\nFalla si se sufre un golpe antes de su uso."
    ko: "정신력을 높여 펀치를 날린다.\n기술을 쓰기 전에\n공격을 받으면 실패한다."
follow_me:
  names:
    jp_kana: このゆびとまれ
    jp_kanji: このゆびとまれ
    en: Follow Me
    fr: Par Ici
    it: Sonoqui
    de: Spotlight
    es: Señuelo
    ko: 날따름
  descriptions:
    jp_kana: "じぶんに　ちゅうもく　させて\nあいてからの　こうげきを\nすべて　じぶんに　むけさせる。"
    jp_kanji: "自分に　注目させて\n相手からの　攻撃を\nすべて　自分に　むけさせる。"
    en: "The user draws attention to itself,\nmaking all targets take aim\nonly at the user."
    fr: "Attire l’attention. Les ennemis\nn’attaquent que le lanceur."
    it: "Chi la usa attrae l’attenzione su di sé,\ncostringendo i nemici a sceglierlo sempre\ncome bersaglio."
    de: "Zieht Aufmerksamkeit auf sich.\nGegner greift nur Anwender an."
    es: "Llama la atención para concentrar\ntodos los ataques de todos los del\nequipo rival hacia sí mismo."
    ko: "자신에게 주목시켜\n상대로부터의 공격을\n모두 자신에게 향하게 한다."
force_palm:
  names:
    jp_kana: はっけい
    jp_kanji: はっけい
    en: Force Palm
    fr: Forte-Paume
    it: Palmoforza
    de: Kraftwelle
    es: Palmeo
    ko: 발경
  descriptions:
    jp_kana: "あいての　からだに\nしょうげきはを　あてて　こうげきする。\nまひ　じょうたいに　することが　ある。"
    jp_kanji: "相手の　体に\n衝撃波を　当てて　攻撃する。\nまひ状態に　することが　ある。"
    en: "The target is attacked with a shock wave.\nIt may also leave the target\nwith paralysis."
    fr: "Une onde de choc frappe l’ennemi.\nPeut aussi paralyser la cible."
    it: "Chi la usa attacca con un’onda d’urto che\npuò anche paralizzare il bersaglio."
    de: "Das Ziel wird mit einer Schockwelle\nangegriffen, die es eventuell\nparalysiert."
    es: "Ataca al objetivo con una onda de choque\ny puede llegar a paralizarlo."
    ko: "상대의 몸에\n충격파를 부딪쳐 공격한다.\n마비 상태로 만들 때가 있다."
foresight:
  names:
    jp_kana: みやぶる
    jp_kanji: みやぶる
    en: Foresight
    fr: Clairvoyance
    it: Preveggenza
    de: Gesichte
    es: Profecía
    ko: 꿰뚫어보기
  descriptions:
    jp_kana: "ゴーストタイプに　こうかがない　わざや\nかいひりつの　たかい　あいてに\nこうげきが　あたるように　なる。"
    jp_kanji: "ゴーストタイプに　効果がない　技や\n回避率の　高い　相手に\n攻撃が　当たるように　なる。"
    en: "Enables a Ghost-type target to be hit by\nNormal- and Fighting-type attacks. It also\nenables an evasive target to be hit."
    fr: "Permet de toucher un Pokémon Spectre\navec n’importe quelle capacité et de\ntoucher un ennemi insaisissable."
    it: "Chi la usa rende i Pokémon di tipo Spettro\nvulnerabili a qualsiasi tipo di mossa e può,\ninoltre, colpire i nemici sfuggenti."
    de: "Erlaubt es, Geist-Pokémon mit Normal-\nund Kampf-Attacken anzugreifen.\nIgnoriert den Fluchtwert des Zieles."
    es: "Permite atacar con cualquier movimiento\na objetivos de tipo Fantasma y golpear\na Pokémon evasivos."
    ko: "고스트타입에 효과가 없는 기술이나\n회피율이 높은 상대라 할지라도\n공격이 맞게 된다."
foul_play:
  names:
    jp_kana: イカサマ
    jp_kanji: イカサマ
    en: Foul Play
    fr: Tricherie
    it: Ripicca
    de: Schmarotzer
    es: Juego Sucio
    ko: 속임수
  descriptions:
    jp_kana: "あいての　ちからを　りようする。\nたたかっている　あいての　こうげきが\nたかいほど　ダメージが　あがる。"
    jp_kanji: "相手の　力を　利用する。\n戦っている　相手の　攻撃が\n高いほど　ダメージが　あがる。"
    en: "The user turns the target’s power\nagainst it. The higher the target’s\nAttack stat, the greater the damage."
    fr: "Le lanceur utilise la force de l’ennemi.\nPlus l’Attaque de l’ennemi est élevée,\nplus le lanceur inflige de dégâts."
    it: "Chi la usa sfrutta la forza del bersaglio.\nIl danno inflitto è proporzionale\nall’Attacco dell’avversario."
    de: "Anwender macht sich die Kraft des Zieles\nzunutze. Je höher dessen Angriff, desto\nmehr Schaden richtet die Attacke an."
    es: "El usuario emplea la fuerza del objetivo\npara atacarlo. Cuanto mayor es el Ataque\ndel objetivo, más daño provoca."
    ko: "상대의 힘을 이용한다.\n싸우고 있는 상대의 공격이\n높을수록 데미지가 올라간다."
freeze_shock:
  names:
    jp_kana: フリーズボルト
    jp_kanji: フリーズボルト
    en: Freeze Shock
    fr: Éclair Gelé
    it: Elettrogelo
    de: Frostvolt
    es: Rayo Gélido
    ko: 프리즈볼트
  descriptions:
    jp_kana: "でんきを　まとった　こおりの　かたまりで\n２ターンめに　あいてを　たたきつける。\nまひ　じょうたいに　することが　ある。"
    jp_kanji: "電気を　まとった　氷の　塊で\n２ターン目に　相手を　たたきつける。\nまひ状態に　することが　ある。"
    en: "On the second turn, the user hits the\ntarget with electrically charged ice.\nIt may leave the target with paralysis."
    fr: "Projette un bloc de glace électrifié\nsur l’ennemi au second tour.\nPeut aussi le paralyser."
    it: "Chi la usa lancia contro il nemico al turno\nsuccessivo una sfera di ghiaccio ricoperta\ndi elettricità. Può anche paralizzarlo."
    de: "Feuert in der zweiten Runde elektrisch\ngeladene Eisklumpen auf das Ziel ab.\nParalysiert das Ziel eventuell."
    es: "El usuario carga un bloque de hielo con\nelectricidad en el primer turno y ataca\ncon él en el segundo. Puede paralizar."
    ko: "전기를 두른 얼음 덩어리로\n2턴째에 상대를 내리친다.\n마비 상태로 만들 때가 있다."
frenzy_plant:
  names:
    jp_kana: ハードプラント
    jp_kanji: ハードプラント
    en: Frenzy Plant
    fr: Végé-Attak
    it: Radicalbero
    de: Fauna-Statue
    es: Planta Feroz
    ko: 하드플랜트
  descriptions:
    jp_kana: "おおきな　じゅもくで\nあいてを　たたきつけて　こうげきする。\nつぎの　ターンは　うごけなく　なる。"
    jp_kanji: "大きな　樹木で\n相手を　たたきつけて　攻撃する。\n次の　ターンは　動けなくなる。"
    en: "The user slams the target with\nan enormous tree.\nThe user can’t move on the next turn."
    fr: "Un violent coup de racines s’abat sur\nl’ennemi. Immobilise le lanceur au tour\nsuivant."
    it: "Un groviglio di radici colpisce il nemico.\nChi la usa salta il turno successivo."
    de: "Angriff mit dickem Ast. Der Angreifer\nmuss eine Runde aussetzen."
    es: "Golpea con una enorme planta.\nQuien lo usa no puede moverse\nen el siguiente turno."
    ko: "큰 나무로\n상대를 힘껏 쳐서 공격한다.\n다음 턴은 움직일 수 없게 된다."
frost_breath:
  names:
    jp_kana: こおりのいぶき
    jp_kanji: こおりのいぶき
    en: Frost Breath
    fr: SouffleGlacé
    it: Alitogelido
    de: Eisesodem
    es: Vaho Gélido
    ko: 얼음숨결
  descriptions:
    jp_kana: "つめたい　いきを\nあいてに　ふきつけて　こうげきする。\nかならず　きゅうしょに　あたる。"
    jp_kanji: "冷たい　息を\n相手に　吹きつけて　攻撃する。\n必ず　急所に　当たる。"
    en: "The user blows a cold breath on the\ntarget. This attack always results in\na critical hit."
    fr: "Un souffle froid blesse l’ennemi.\nL’effet est toujours critique."
    it: "Chi la usa attacca il bersaglio con un\nsoffio d’aria gelida. Brutto colpo\nassicurato."
    de: "Anwender greift an, indem er dem\nZiel eisigen Atem entgegenhaucht.\nVolltreffergarantie."
    es: "Ataque con aire helado.\nSiempre resulta en un golpe crítico."
    ko: "차가운 숨결을\n상대에게 내뿜어 공격한다.\n반드시 급소에 맞는다."
frustration:
  names:
    jp_kana: やつあたり
    jp_kanji: やつあたり
    en: Frustration
    fr: Frustration
    it: Frustrazione
    de: Frustration
    es: Frustración
    ko: 화풀이
  descriptions:
    jp_kana: "ふまんを　はらすため　ぜんりょくで\nあいてを　こうげきする。なついて\nいないほど　いりょくは　あがる。"
    jp_kanji: "不満を　はらすため　全力で\n相手を　攻撃する。\nなついていないほど　威力は　あがる。"
    en: "A full-power attack that grows more\npowerful the less the user likes\nits Trainer."
    fr: "Moins le Pokémon aime son Dresseur, plus\ncette attaque est puissante."
    it: "Mossa che diventa tanto più potente\nquanto minore è il grado di affezione\ndel Pokémon per il proprio Allenatore."
    de: "Die Attacke wird stärker, je weniger der\nAnwender seinen Trainer mag."
    es: "Cuanto menor sea la amistad con el\nEntrenador, más poderoso será\neste ataque."
    ko: "불만을 풀기 위해 전력으로\n상대를 공격한다.\n친밀하지 않을수록 위력이 올라간다."
fury_attack:
  names:
    jp_kana: みだれづき
    jp_kanji: みだれづき
    en: Fury Attack
    fr: Furie
    it: Furia
    de: Furienschlag
    es: Ataque Furia
    ko: 마구찌르기
  descriptions:
    jp_kana: "つのや　くちばしで\nあいてを　つついて　こうげきする。\n２ー５かいの　あいだ　れんぞくで　だす。"
    jp_kanji: "つのや　くちばしで\n相手を　つついて　攻撃する。\n２ー５回の　あいだ　連続で　だす。"
    en: "The target is jabbed repeatedly with a\nhorn or beak two to five times in a row."
    fr: "Frappe l’ennemi 2 à 5 fois d’affilée\navec un bec ou une corne."
    it: "Infilza il nemico con corna affilate o\nun becco da due a cinque volte di fila."
    de: "Spießt das Ziel 2- bis 5-mal mit spitzem\nHorn oder Schnabel auf."
    es: Cornea al objetivo de dos a cinco veces.
    ko: "뿔이나 부리로\n상대를 찔러서 공격한다.\n2-5회 동안 연속으로 쓴다."
fury_cutter:
  names:
    jp_kana: れんぞくぎり
    jp_kanji: れんぞくぎり
    en: Fury Cutter
    fr: Taillade
    it: Tagliofuria
    de: Zornklinge
    es: Cortefuria
    ko: 연속자르기
  descriptions:
    jp_kana: "カマや　ツメ　などで　あいてを\nきりつけて　こうげきする。れんぞくで\nあてると　いりょくが　あがる。"
    jp_kanji: "カマや　ツメなどで　相手を\n切りつけて　攻撃する。\n連続で　当てると　威力が　あがる。"
    en: "The target is slashed with scythes or\nclaws. Its power increases if it hits\nin succession."
    fr: "Un coup de faux ou de griffe dont\nla force augmente quand il touche\nplusieurs fois d’affilée."
    it: "Colpisce il nemico con falci o artigli. Se\nusata in successione aumenta di potenza\nogni volta che va a segno."
    de: "Eine Attacke mit Scheren oder Klauen,\nderen Härte bei aufeinanderfolgenden\nTreffern zunimmt."
    es: "Ataque con garras o guadaña que crece\nen intensidad si se usa repetidas veces."
    ko: "낫이나 발톱 등으로 상대를\n베어 공격한다.\n연속으로 맞히면 위력이 올라간다."
fury_swipes:
  names:
    jp_kana: みだれひっかき
    jp_kanji: みだれひっかき
    en: Fury Swipes
    fr: Combo-Griffe
    it: Sfuriate
    de: Kratzfurie
    es: Golpes Furia
    ko: 마구할퀴기
  descriptions:
    jp_kana: "ツメや　カマなどで\nあいてを　ひっかいて　こうげきする。\n２ー５かいの　あいだ　れんぞくで　だす。"
    jp_kanji: "ツメや　カマなどで\n相手を　ひっかいて　攻撃する。\n２ー５回の　あいだ　連続で　だす。"
    en: "The target is raked with sharp claws or\nscythes for two to five times in\nquick succession."
    fr: "L’ennemi est lacéré par des faux\nou des griffes de 2 à 5 fois."
    it: "Colpisce il nemico con artigli o falci\naffilate da due a cinque volte in rapida\nsuccessione."
    de: "Beharkt das Ziel 2- bis 5-mal mit\nscharfen Klauen oder Sicheln."
    es: Araña rápidamente de dos a cinco veces.
    ko: "발톱이나 낫 등으로\n상대를 할퀴어서 공격한다.\n2-5회 동안 연속으로 쓴다."
fusion_bolt:
  names:
    jp_kana: クロスサンダー
    jp_kanji: クロスサンダー
    en: Fusion Bolt
    fr: Éclair Croix
    it: Incrotuono
    de: Kreuzdonner
    es: Rayo Fusión
    ko: 크로스썬더
  descriptions:
    jp_kana: "きょだいな　いかずちを　たたきつける。\nきょだいな　ほのおの　えいきょうをうけ\nわざの　いりょくが　あがる。"
    jp_kanji: "巨大な　雷を　たたきつける。\n巨大な　炎の　影響を受け\n技の　威力が　あがる。"
    en: "The user throws down a giant thunderbolt.\nThis attack does greater damage\nwhen influenced by an enormous flame."
    fr: "Projette un orbe électrique\ngigantesque. L’effet augmente\nsous l’influence de Flamme Croix."
    it: "Chi la usa lancia un fulmine enorme.\nSe usata in combinazione con Incrofiamma,\nil danno provocato dalla mossa aumenta."
    de: "Feuert einen monströsen Blitz ab.\nWird die Attacke durch eine gigantische\nFlamme modifiziert, steigt die Stärke."
    es: "Ataca con una enorme descarga eléctrica.\nAumenta su potencia si es influenciada\npor una gigantesca llamarada."
    ko: "거대한 우뢰를 내리친다.\n거대한 불꽃의 영향을 받아\n기술의 위력이 올라간다."
fusion_flare:
  names:
    jp_kana: クロスフレイム
    jp_kanji: クロスフレイム
    en: Fusion Flare
    fr: Flamme Croix
    it: Incrofiamma
    de: Kreuzflamme
    es: Llama Fusión
    ko: 크로스플레임
  descriptions:
    jp_kana: "きょだいな　ほのおを　たたきつける。\nきょだいな　いかずちの　えいきょうをうけ\nわざの　いりょくが　あがる。"
    jp_kanji: "巨大な　炎を　たたきつける。\n巨大な　雷の　影響を受け\n技の　威力が　あがる。"
    en: "The user brings down a giant flame.\nThis attack does greater damage when\ninfluenced by an enormous thunderbolt."
    fr: "Projette une boule de feu\ngigantesque. L’effet augmente\nsous l’influence d’Éclair Croix."
    it: "Chi la usa lancia una fiammata enorme.\nSe usata in combinazione con Incrotuono,\nil danno provocato dalla mossa aumenta."
    de: "Feuert eine monströse Flamme ab. Wird\ndie Attacke durch einen gigantischen\nBlitz modifiziert, steigt die Stärke."
    es: "Ataca con una llamarada gigantesca.\nAumenta su potencia si es influenciada\npor una gran energía eléctrica."
    ko: "거대한 불꽃을 내리친다.\n거대한 우뢰의 영향을 받아\n기술의 위력이 올라간다."
future_sight:
  names:
    jp_kana: みらいよち
    jp_kanji: みらいよち
    en: Future Sight
    fr: Prescience
    it: Divinazione
    de: Seher
    es: Premonición
    ko: 미래예지
  descriptions:
    jp_kana: "わざを　つかった　２ターン　あとに\nあいてに　ねんりきの\nかたまりを　おくって　こうげきする。"
    jp_kanji: "技を　使った　２ターン後に\n相手に　念力の\n塊を　送って　攻撃する。"
    en: "Two turns after this move is used,\na hunk of psychic energy\nattacks the target."
    fr: "De l’énergie psychique vient frapper\nl’ennemi 2 tours après l’utilisation\nde cette capacité."
    it: "Due turni dopo l’utilizzo di questa mossa,\nil nemico viene attaccato con energia\npsichica."
    de: "Zwei Runden, nachdem Seher eingesetzt\nwurde, erfolgt der Angriff."
    es: "Concentra energía psíquica para golpear\nal objetivo dos turnos después."
    ko: "기술을 사용한 2턴 뒤에\n상대에게 염동력의\n덩어리를 보내어 공격한다."
gastro_acid:
  names:
    jp_kana: いえき
    jp_kanji: いえき
    en: Gastro Acid
    fr: Suc Digestif
    it: Gastroacido
    de: Magensäfte
    es: Bilis
    ko: 위액
  descriptions:
    jp_kana: "いえきを　あいての\nからだに　はきつける。ついた　いえきは\nあいての　とくせいの　こうかを　けす。"
    jp_kanji: "胃液を　相手の\n体に　吐きつける。ついた　胃液は\n相手の　特性の　効果を　消す。"
    en: "The user hurls up its stomach acids on\nthe target. The fluid eliminates the effect\nof the target’s Ability."
    fr: "Le lanceur répand ses sucs digestifs sur\nl’ennemi. Le fluide neutralise la capacité\nspéciale de l’ennemi."
    it: "Chi la usa lancia acidi gastrici sul nemico.\nIl fluido annulla l’abilità del nemico."
    de: "Anwender greift das Ziel mit\neigenen Magensäften an. Entfernt\nEffekte von dessen Fähigkeit."
    es: "El usuario arroja sus jugos biliares\nal objetivo, lo que anula el efecto de la\nhabilidad en uso."
    ko: "상대의 몸에 위액을 내뱉는다.\n달라붙은 위액은 상대의\n특성 효과를 지운다."
gear_grind:
  names:
    jp_kana: ギアソーサー
    jp_kanji: ギアソーサー
    en: Gear Grind
    fr: Lancécrou
    it: Ingracolpo
    de: Klikkdiskus
    es: Rueda Doble
    ko: 기어소서
  descriptions:
    jp_kana: "こうてつの　ギアを　あいてに\nなげつけて　こうげきする。２かい\nれんぞくで　ダメージを　あたえる。"
    jp_kanji: "鋼鉄の　ギアを　相手に\n投げつけて　攻撃する。\n２回連続で　ダメージを　与える。"
    en: "The user attacks by throwing\ntwo steel gears at its target."
    fr: "Le lanceur jette deux écrous d’acier qui\nfrappent l’ennemi deux fois d’affilée."
    it: "Chi la usa colpisce il bersaglio due volte\ndi fila lanciandogli contro dei dischi\nd’acciaio."
    de: "Anwender greift an, indem er stählerne\nZahnräder auf das Ziel schleudert.\nAngriff erfolgt zweimal hintereinander."
    es: "Rota dos engranajes de hierro sobre\nel objetivo. Golpea dos veces."
    ko: "강철의 기어를 상대에게\n던져서 공격한다.\n2회 연속으로 데미지를 준다."
giga_drain:
  names:
    jp_kana: ギガドレイン
    jp_kanji: ギガドレイン
    en: Giga Drain
    fr: Giga-Sangsue
    it: Gigassorbim.
    de: Gigasauger
    es: Gigadrenado
    ko: 기가드레인
  descriptions:
    jp_kana: "ようぶんを　すいとり　こうげきする。\nあたえた　ダメージの\nはんぶんの　ＨＰを　かいふく　できる。"
    jp_kanji: "養分を　吸い取り　攻撃する。\n与えた　ダメージの\n半分の　ＨＰを　回復できる。"
    en: "A nutrient-draining attack. The user’s\nHP is restored by half the damage\ntaken by the target."
    fr: "Une attaque qui convertit la moitié\ndes dégâts infligés en PV."
    it: "Mossa che assorbe PS. Chi la usa recupera\nuna quantità di PS pari alla metà del danno\ninferto."
    de: "Das Ziel wird angegriffen und die\nHälfte des zugefügten Schadens\ndem Angreifer als KP gutgeschrieben."
    es: "Un ataque que absorbe nutrientes.\nQuien lo usa recupera la mitad de\nlos PS del daño que produce."
    ko: "양분을 흡수하여 공격한다.\n입힌 데미지의 절반에 해당하는\nHP를 회복할 수 있다."
giga_impact:
  names:
    jp_kana: ギガインパクト
    jp_kanji: ギガインパクト
    en: Giga Impact
    fr: Giga Impact
    it: Gigaimpatto
    de: Gigastoß
    es: Giga Impacto
    ko: 기가임팩트
  descriptions:
    jp_kana: "もてる　ちからを　すべて　つかって\nあいてに　とつげきする。\nつぎの　ターンは　うごけなく　なる。"
    jp_kanji: "持てる　力を　すべて　使って\n相手に　突撃する。\n次の　ターンは　動けなくなる。"
    en: "The user charges at the target using\nevery bit of its power.\nThe user must rest on the next turn."
    fr: "Le lanceur charge l’ennemi de toute sa\npuissance. Il doit ensuite se reposer\nau tour suivant."
    it: "Chi la usa carica il nemico usando tutta\nla sua forza, ma al turno successivo\ndeve riposare."
    de: "Anwender rennt mit seiner ganzen Kraft\ngegen das Ziel an und muss dann\neine Runde ruhen."
    es: "Carga contra el objetivo usando toda\nla fuerza que tiene. El Pokémon\ndescansa el turno siguiente."
    ko: "가진 힘을 모두 사용해서\n상대에게 돌격한다.\n다음 턴은 움직일 수 없다."
glaciate:
  names:
    jp_kana: こごえるせかい
    jp_kanji: こごえるせかい
    en: Glaciate
    fr: ÈreGlaciaire
    it: Gelamondo
    de: Eiszeit
    es: Mundo Gélido
    ko: 얼다세계
  descriptions:
    jp_kana: "こごえる　ような　れいきを\nあいてに　ふきつけて　こうげきする。\nあいての　すばやさを　さげる。"
    jp_kanji: "凍えるような　冷気を\n相手に　吹きつけて　攻撃する。\n相手の　素早さを　さげる。"
    en: "The user attacks by blowing freezing cold\nair at opposing Pokémon. This attack\nreduces the targets’ Speed stat."
    fr: "Un souffle de vent qui congèle tout\nsur son passage s’abat sur l’ennemi.\nRéduit aussi sa Vitesse."
    it: "Chi la usa attacca i nemici con una folata\nd’aria gelida e ne riduce anche la Velocità."
    de: "Anwender greift an, indem er dem Ziel\nklirrend kalte Luft entgegenbläst. Senkt\ndie Initiative des Zieles."
    es: "Ataque con aire helado que puede bajar\nla Velocidad del objetivo."
    ko: "차가운 냉기를\n상대에게 내뿜어 공격한다.\n상대의 스피드를 떨어뜨린다."
glare:
  names:
    jp_kana: へびにらみ
    jp_kanji: へびにらみ
    en: Glare
    fr: Intimidation
    it: Bagliore
    de: Giftblick
    es: Deslumbrar
    ko: 뱀눈초리
  descriptions:
    jp_kana: "おなかの　もようで　おびえさせて\nあいてを　まひの　じょうたいに　する。"
    jp_kanji: "おなかの　模様で　おびえさせて\n相手を　まひの　状態に　する。"
    en: "The user intimidates the target with the\npattern on its belly to cause paralysis."
    fr: "Le lanceur intimide l’ennemi grâce à son\nregard terrifiant pour le paralyser."
    it: "Chi la usa spaventa il nemico con\nuno sguardo terrificante e ne causa\nla paralisi."
    de: "Schüchtert Ziel mit dem Muster\nauf seinem Bauch ein, sodass dieses\nparalysiert wird."
    es: "Intimida y asusta al objetivo con la mirada\npara dejarlo paralizado."
    ko: "배의 무늬로 겁을 주어\n상대를 마비 상태로 만든다."
grass_knot:
  names:
    jp_kana: くさむすび
    jp_kanji: くさむすび
    en: Grass Knot
    fr: Nœud Herbe
    it: Laccioerboso
    de: Strauchler
    es: Hierba Lazo
    ko: 풀묶기
  descriptions:
    jp_kana: "くさを　からませて　あいてを\nころばせる。あいてが　おもいほど\nいりょくが　あがる。"
    jp_kanji: "草を　からませて　相手を\n転ばせる。相手が　重いほど\n威力が　あがる。"
    en: "The user snares the target with grass and\ntrips it. The heavier the target,\nthe greater the damage."
    fr: "L’ennemi est piégé dans de l’herbe qui\nle fait trébucher. Plus il est lourd,\nplus il subit de dégâts."
    it: "Chi la usa intrappola il nemico con l’erba\ne lo fa cadere. Danneggia maggiormente\ni nemici più pesanti."
    de: "Ziel wird durch Gras ins Straucheln\ngebracht. Je schwerer das Ziel,\ndesto mehr Schaden."
    es: "Enreda al objetivo con hierba y lo derriba.\nCuanto más pesado es el objetivo,\nmás daño inflige."
    ko: "풀을 휘감아서 상대를\n쓰러뜨린다. 상대가 무거울수록\n위력이 올라간다."
grass_pledge:
  names:
    jp_kana: くさのちかい
    jp_kanji: くさのちかい
    en: Grass Pledge
    fr: Aire d’Herbe
    it: Erbapatto
    de: Pflanzsäulen
    es: Voto Planta
    ko: 풀의맹세
  descriptions:
    jp_kana: "くさの　はしらで　こうげきする。\nみずと　くみあわせると　いりょくが\nあがって　あたりが　しつげんに　なる。"
    jp_kanji: "草の柱で　攻撃する。\nみずと　組みあわせると　威力が\nあがって　あたりが　湿原に　なる。"
    en: "A column of grass hits opposing Pokémon.\nWhen used with its water equivalent, its\ndamage increases into a vast swamp."
    fr: "Une masse végétale s’abat sur l’ennemi.\nEn l’utilisant avec Aire d’Eau, l’effet\naugmente et un marécage apparaît."
    it: "Attacca il nemico con una colonna d’erba.\nSe usata con Acquapatto, aumentano gli\neffetti e il campo diventa una palude."
    de: "Ein Angriff mit Pflanzsäulen. Kombiniert\nmit Wassersäulen steigt die Wirkung\nund die Umgebung wird zu einem Sumpf."
    es: "Ataca con columnas de hojas.\nCombinado con un ataque de agua crea\nun pantano y aumenta su potencia."
    ko: "풀기둥으로 공격한다.\n물과 조합하면 위력이\n올라가고 주변이 습지초원이 된다."
grass_whistle:
  names:
    jp_kana: くさぶえ
    jp_kanji: くさぶえ
    en: GrassWhistle
    fr: Siffl’Herbe
    it: Meloderba
    de: Grasflöte
    es: Silbato
    ko: 풀피리
  descriptions:
    jp_kana: "ここちよい　ふえの　ねいろを　きかせて\nあいてを　ねむりの　じょうたいに　する。"
    jp_kanji: "心地好い　笛の　音色を　聞かせて\n相手を　眠りの　状態に　する。"
    en: "The user plays a pleasant melody that\nlulls the target into a deep sleep."
    fr: "Le lanceur joue une douce mélodie qui\nplonge l’ennemi dans un profond sommeil."
    it: "Una dolce melodia culla il nemico e\nlo costringe ad addormentarsi."
    de: "Versetzt das Ziel durch eine\nschöne Melodie in Tiefschlaf."
    es: "Agradable melodía que adormece\nal objetivo."
    ko: "기분 좋은 피리 소리를 들려주어\n상대를 잠듦 상태로 만든다."
gravity:
  names:
    jp_kana: じゅうりょく
    jp_kanji: じゅうりょく
    en: Gravity
    fr: Gravité
    it: Gravità
    de: Erdanziehung
    es: Gravedad
    ko: 중력
  descriptions:
    jp_kana: "５ターンの　あいだ\nじゅうりょくを　つよくして　ふゆうや\nそらへ　とぶ　わざを　つかえなく　する。"
    jp_kanji: "５ターンの　あいだ\n重力を　強くして　ふゆうや\n空へ　飛ぶ　技を　使えなくする。"
    en: "Gravity is intensified for five turns,\nmaking moves involving flying unusable\nand negating Levitate."
    fr: "La gravité augmente pendant 5 tours,\nce qui empêche les capacités volantes\net annule Lévitation."
    it: "Intensifica la gravità per cinque turni.\nLe mosse che fanno volare e Levitazione\nsono inutilizzabili."
    de: "Die Gravitation wird für fünf Runden\nerhöht. Macht Fliegen unmöglich und\nverhindert Schwebe."
    es: "La gravedad aumenta durante cinco\nturnos, lo que impide acciones\nque impliquen volar o levitar."
    ko: "5턴 동안 중력을\n강하게 해서 부유나 하늘을 나는\n기술을 사용할 수 없게 한다."
growl:
  names:
    jp_kana: なきごえ
    jp_kanji: なきごえ
    en: Growl
    fr: Rugissement
    it: Ruggito
    de: Heuler
    es: Gruñido
    ko: 울음소리
  descriptions:
    jp_kana: "かわいい　なきごえを　きかせて\nきを　ひき　ゆだんを　させて\nあいての　こうげきを　さげる。"
    jp_kanji: "かわいい　なきごえを　聞かせて\n気を　ひき　油断を　させて\n相手の　攻撃を　さげる。"
    en: "The user growls in an endearing way,\nmaking the opposing team less wary.\nThe foes’ Attack stats are lowered."
    fr: "Le lanceur pousse un cri tout mimi\npour tromper la vigilance de l’ennemi\net baisser son Attaque."
    it: "Distrae i nemici con un ruggito potente e\nne riduce l’Attacco."
    de: "Der Anwender nimmt den Gegner\nfür sich ein und senkt dessen\nAngriffs-Wert."
    es: "Dulce gruñido que reduce el Ataque\ndel contrincante."
    ko: "귀여운 울음소리를 들려주고\n관심을 끌어 방심한 사이에\n상대의 공격을 떨어뜨린다."
growth:
  names:
    jp_kana: せいちょう
    jp_kanji: せいちょう
    en: Growth
    fr: Croissance
    it: Crescita
    de: Wachstum
    es: Desarrollo
    ko: 성장
  descriptions:
    jp_kana: "からだを　いっきに\nおおきく　せいちょう　させて\nこうげきと　とくこうを　あげる。"
    jp_kanji: "体を　一気に\n大きく　生長させて\n攻撃と　特攻を　あげる。"
    en: "The user’s body grows all at once,\nraising the Attack and Sp. Atk stats."
    fr: "Le corps du lanceur se développe.\nAugmente l’Attaque et l’Attaque Spéciale."
    it: "Provoca la crescita immediata del corpo\ne l’aumento dell’Attacco e dell’Attacco\nSpeciale di chi la usa."
    de: "Der Körper wächst. Dadurch steigen\nAngriff und Spezial-Angriff."
    es: "El cuerpo del usuario crece a\nmarchas forzadas y aumenta\nel Ataque y el Ataque Especial."
    ko: "몸을 일시에\n크게 성장시켜\n공격과 특수공격을 올린다."
grudge:
  names:
    jp_kana: おんねん
    jp_kanji: おんねん
    en: Grudge
    fr: Rancune
    it: Rancore
    de: Nachspiel
    es: Rabia
    ko: 원념
  descriptions:
    jp_kana: "あいての　わざで　ひんしに　されたとき\nおんねんを　かけて\nそのわざの　ＰＰを　０に　する。"
    jp_kanji: "相手の　技で　ひんしに　されたとき\nおんねんを　かけて\nその技の　ＰＰを　０に　する。"
    en: "If the user faints, the user’s grudge\nfully depletes the PP of the opponent’s\nmove that knocked it out."
    fr: "Si le lanceur est mis K.O., sa rancune\népuise les PP de la capacité utilisée\npour le mettre K.O."
    it: "Se chi la usa va KO, i PP della mossa\nnemica che lo ha messo fuori gioco\nsi azzerano."
    de: "Bei K.O. des Anwenders werden die AP der\nAttacke, durch die er besiegt wurde,\nauf null herabgesetzt."
    es: "Si el usuario se debilita al recibir un\nataque, todos los PP de este último\nataque serán eliminados."
    ko: "상대의 기술로 기절하면\n원념을 담아\n그 기술의 PP를 0으로 만든다."
guard_split:
  names:
    jp_kana: ガードシェア
    jp_kanji: ガードシェア
    en: Guard Split
    fr: PartageGarde
    it: Paridifesa
    de: Schutzteiler
    es: Isoguardia
    ko: 가드셰어
  descriptions:
    jp_kana: "ちょうのうりょくで　じぶんと　あいての\nぼうぎょと　とくぼうを　たして\nはんぶんに　わける。"
    jp_kanji: "超能力で　自分と　相手の\n防御と　特防を　たして\n半分に　わける。"
    en: "The user employs its psychic power to\naverage its Defense and Sp. Def stats\nwith those of its target’s."
    fr: "Additionne la Défense et la Défense\nSpéciale du lanceur et de sa cible et les\nredistribue équitablement entre les deux."
    it: "Chi la usa sfrutta la sua forza psichica\nper sommare Difesa e Difesa Speciale a\nquelle del bersaglio e dividerle equamente."
    de: "Durch Psycho-Kräfte werden Vert. und\nSpez.-Vert. des Anwenders und des Zieles\naddiert und in zwei gleiche Hälften geteilt."
    es: "El usuario emplea sus poderes para hacer\nla media de su Defensa y Defensa Especial\ncon las de su objetivo y compartirlas."
    ko: "초능력으로 자신과 상대의\n방어와 특수방어를 더해서\n반으로 나눈다."
guard_swap:
  names:
    jp_kana: ガードスワップ
    jp_kanji: ガードスワップ
    en: Guard Swap
    fr: Permugarde
    it: Barattoscudo
    de: Schutztausch
    es: Cambia Def.
    ko: 가드스웹
  descriptions:
    jp_kana: "ちょうのうりょくで　じぶんと　あいての\nぼうぎょと　とくぼうの\nのうりょく　へんかを　いれかえる。"
    jp_kanji: "超能力で　自分と　相手の\n防御と　特防の\n能力変化を　入れ替える。"
    en: "The user employs its psychic power to\nswitch changes to its Defense and\nSp. Def with the target."
    fr: "Pouvoir qui échange les modifications de\nla Défense Spéciale et de la Défense\navec la cible."
    it: "Chi la usa sfrutta la sua forza psichica\nper scambiare le modifiche a Difesa e a\nDifesa Speciale con il bersaglio."
    de: "Psychische Kräfte tauschen Änderungen\nan Verteidigung und Spezial-Verteidigung\nmit denen des Zieles."
    es: "El usuario emplea su poder mental para\nintercambiar los cambios en Defensa y\nDefensa Especial con el objetivo."
    ko: "초능력으로 자신과 상대의\n방어와 특수방어의\n능력 변화를 교체한다."
guillotine:
  names:
    jp_kana: ハサミギロチン
    jp_kanji: ハサミギロチン
    en: Guillotine
    fr: Guillotine
    it: Ghigliottina
    de: Guillotine
    es: Guillotina
    ko: 가위자르기
  descriptions:
    jp_kana: "おおきな　ハサミで\nあいてを　きりさいて　こうげきする。\nあたれば　いちげきで　ひんしに　する。"
    jp_kanji: "大きな　ハサミで\n相手を　切り裂いて　攻撃する。\n当たれば　一撃で　ひんしに　する。"
    en: "A vicious, tearing attack with big pincers.\nThe target will faint instantly\nif this attack hits."
    fr: "De méchantes pinces lacèrent\nl’ennemi, le mettant K.O. sur\nle coup s’il est touché."
    it: "Attacca il nemico con pericolose tenaglie.\nSe l’attacco va a segno, il nemico va\nsubito KO."
    de: "Kräftige Scheren-Attacke. Führt beim\nZiel sofort zum K.O."
    es: "Ataque con pinzas que debilita al oponente\nde un golpe si acierta."
    ko: "큰 집게로\n상대를 베어 갈라 공격한다.\n맞으면 일격에 기절한다."
gunk_shot:
  names:
    jp_kana: ダストシュート
    jp_kanji: ダストシュート
    en: Gunk Shot
    fr: Détricanon
    it: Sporcolancio
    de: Mülltreffer
    es: Lanza Mugre
    ko: 더스트슈트
  descriptions:
    jp_kana: "きたない　ゴミを\nあいてに　ぶつけて　こうげきする。\nどく　じょうたいに　することが　ある。"
    jp_kanji: "汚い　ゴミを\n相手に　ぶつけて　攻撃する。\n毒状態に　することが　ある。"
    en: "The user shoots filthy garbage\nat the target to attack.\nIt may also poison the target."
    fr: "Le lanceur envoie des détritus sur\nl’ennemi. Peut aussi l’empoisonner."
    it: "Chi la usa attacca il nemico con rifiuti\nsudici che possono anche avvelenarlo."
    de: "Anwender schießt mit Müll auf das Ziel.\nVergiftet dieses eventuell."
    es: "Lanza contra el objetivo asquerosa\nbasura. Puede envenenar al objetivo."
    ko: "더러운 쓰레기를\n상대에게 부딪쳐서 공격한다.\n독 상태로 만들 때가 있다."
gust:
  names:
    jp_kana: かぜおこし
    jp_kanji: かぜおこし
    en: Gust
    fr: Tornade
    it: Raffica
    de: Windstoß
    es: Tornado
    ko: 바람일으키기
  descriptions:
    jp_kana: "つばさで　おこした　はげしい　かぜを\nあいてに　ぶつけて　こうげきする。"
    jp_kanji: "翼で　おこした　激しい　風を\n相手に　ぶつけて　攻撃する。"
    en: "A gust of wind is whipped up by wings and\nlaunched at the target to inflict damage."
    fr: "Le lanceur bat des ailes pour\ngénérer une bourrasque\nqui blesse l’ennemi."
    it: "Infligge danni al nemico con una folata\ndi vento sollevata dalle ali."
    de: "Trifft das Ziel mit einem Windstoß\ndurch einen Flügelschlag."
    es: "Crea un tornado con las alas y lo lanza\ncontra el objetivo."
    ko: "날개로 일으킨 격한 바람을\n상대에게 부딪쳐서 공격한다."
gyro_ball:
  names:
    jp_kana: ジャイロボール
    jp_kanji: ジャイロボール
    en: Gyro Ball
    fr: Gyroballe
    it: Vortexpalla
    de: Gyroball
    es: Giro Bola
    ko: 자이로볼
  descriptions:
    jp_kana: "からだを　こうそくに　かいてん　させて\nたいあたりする。あいてより　すばやさが\nおそいほど　つよい。"
    jp_kanji: "体を　高速に　回転させて\n体当たりする。相手より　素早さが\n遅いほど　強い。"
    en: "The user tackles the target with a\nhigh-speed spin. The slower the\nuser, the greater the damage."
    fr: "Le lanceur effectue une rotation et\nfrappe l’ennemi. Plus le lanceur est\nlent, plus il fait de dégâts."
    it: "Chi la usa colpisce il nemico con un vortice\nrapidissimo. Più lento è chi la usa, maggiore\nè il danno."
    de: "Angriff mit hoher Geschwindigkeit. Je\nniedriger die Initiative des Anwenders,\ndesto mehr Schaden."
    es: "Embiste al objetivo con un potente ataque\ngiratorio. Cuanto más lento es\nel usuario, más daño causa."
    ko: "몸을 고속으로 회전시켜\n몸통박치기한다. 상대보다\n스피드가 느릴수록 위력은 올라간다."
hail:
  names:
    jp_kana: あられ
    jp_kanji: あられ
    en: Hail
    fr: Grêle
    it: Grandine
    de: Hagelsturm
    es: Granizo
    ko: 싸라기눈
  descriptions:
    jp_kana: "５ターンの　あいだ　あられを　ふらして\nこおりタイプで　ない　ポケモン\nぜんいんに　ダメージを　あたえる。"
    jp_kanji: "５ターンの　あいだ　あられを　降らして\nこおりタイプで　ない　ポケモン\n全員に　ダメージを　与える。"
    en: "The user summons a hailstorm lasting five\nturns. It damages all Pokémon except the\nIce type."
    fr: "Invoque une tempête de grêle qui dure 5\ntours. Ne blesse pas les Pokémon de type\nGlace."
    it: "Chi la usa causa una grandinata che dura\ncinque turni. Danneggia tutti i Pokémon\ntranne quelli di tipo Ghiaccio."
    de: "Hagelsturm für fünf Runden. Schadet\nallen, außer Eis-Pokémon."
    es: "Tormenta de granizo que dura cinco\nturnos. Hiere a todos, excepto a\nlos de tipo Hielo."
    ko: "5턴 동안 싸라기눈을 내리게 해\n얼음타입이 아닌 포켓몬\n모두에게 데미지를 준다."
hammer_arm:
  names:
    jp_kana: アームハンマー
    jp_kanji: アームハンマー
    en: Hammer Arm
    fr: Marto-Poing
    it: Martelpugno
    de: Hammerarm
    es: Machada
    ko: 암해머
  descriptions:
    jp_kana: "つよくて　おもい　こぶしを\nふるって　ダメージを　あたえる。\nじぶんの　すばやさが　さがる。"
    jp_kanji: "強くて　重い　こぶしを\nふるって　ダメージを　与える。\n自分の　素早さが　さがる。"
    en: "The user swings and hits with its strong\nand heavy fist.\nIt lowers the user’s Speed, however."
    fr: "Le lanceur lâche un puissant coup de\npoing sur l’ennemi. Réduit la vitesse\ndu lanceur."
    it: "Chi la usa colpisce il nemico con il suo\npugno forte e pesante, ma perde Velocità."
    de: "Anwender trifft mit einem starken Hieb.\nSenkt Initiative des Anwenders."
    es: "Gira con fuerza el puño y da un gran\ngolpe. No obstante, baja la Velocidad."
    ko: "강하고 무거운 주먹을\n휘둘러 데미지를 준다.\n자신의 스피드가 떨어진다."
harden:
  names:
    jp_kana: かたくなる
    jp_kanji: かたくなる
    en: Harden
    fr: Armure
    it: Rafforzatore
    de: Härtner
    es: Fortaleza
    ko: 단단해지기
  descriptions:
    jp_kana: "ぜんしんに　ちからを　こめて\nからだを　かたくして\nじぶんの　ぼうぎょを　あげる。"
    jp_kanji: "全身に　力を　こめて\n体を　硬くして\n自分の　防御を　あげる。"
    en: "The user stiffens all the muscles in its\nbody to raise its Defense stat."
    fr: "Le lanceur contracte tous ses muscles\npour augmenter sa Défense."
    it: "Tutti i muscoli del corpo si tonificano\nper aumentare la Difesa."
    de: "Stärkt die Muskulatur und\nerhöht den Verteidigungs-Wert."
    es: "Tensa la musculatura del usuario\npara aumentar la Defensa."
    ko: "전신에 힘을 담아\n몸을 단단하게 해서\n자신의 방어를 올린다."
haze:
  names:
    jp_kana: くろいきり
    jp_kanji: くろいきり
    en: Haze
    fr: Buée Noire
    it: Nube
    de: Dunkelnebel
    es: Niebla
    ko: 흑안개
  descriptions:
    jp_kana: "くろいきりを　だして　せんとうに\nでている　ポケモン　ぜんいんの\nのうりょく　へんかを　もとに　もどす。"
    jp_kanji: "黒い霧を　だして　戦闘に\nでている　ポケモン　全員の\n能力変化を　もとに　もどす。"
    en: "The user creates a haze that eliminates\nevery stat change among all the Pokémon\nengaged in battle."
    fr: "Un brouillard qui annule les\nchangements de stats de tous\nles Pokémon au combat."
    it: "Chi la usa crea una nube nera che annulla\nogni modifica delle statistiche di tutti\ni Pokémon in campo."
    de: "Erzeugt einen dunklen Nebel. Alle\nVeränderungen der Statuswerte der\nKampfteilnehmer werden annulliert."
    es: "Neblina que elimina los cambios\nde características de todos\nlos Pokémon en combate."
    ko: "흑안개를 뿜어 배틀에\n참가 중인 포켓몬 전원의\n능력 변화를 원래대로 돌린다."
head_charge:
  names:
    jp_kana: アフロブレイク
    jp_kanji: アフロブレイク
    en: Head Charge
    fr: Peignée
    it: Ricciolata
    de: Steinschädel
    es: Ariete
    ko: 아프로브레이크
  descriptions:
    jp_kana: "すごい　アフロの　あたまで\nあいてに　とっしんして　こうげきする。\nじぶんも　すこし　ダメージを　うける。"
    jp_kanji: "すごい　アフロの　頭で\n相手に　突進して　攻撃する。\n自分も　少し　ダメージを　受ける。"
    en: "The user charges its head into its\ntarget, using its powerful guard hair.\nIt also damages the user a little."
    fr: "Le lanceur donne un coup avec sa tête\ncouronnée d’une fière crinière.\nBlesse aussi légèrement le lanceur."
    it: "Chi la usa carica il bersaglio con la sua\ntesta in stile afro, ma subisce un po’ di\ndanni per il contraccolpo."
    de: "Rempelattacke mit ausgeflippter\nRetrofrisur. Anwender nimmt selbst\nleichten Schaden."
    es: "Propina un tremendo cabezazo.\nTambién daña al usuario un poco."
    ko: "굉장한 아프로 머리로\n상대에게 돌진하여 공격한다.\n자신도 조금 데미지를 입는다."
head_smash:
  names:
    jp_kana: もろはのずつき
    jp_kanji: もろはのずつき
    en: Head Smash
    fr: Fracass’Tête
    it: Zuccata
    de: Kopfstoß
    es: Testarazo
    ko: 양날박치기
  descriptions:
    jp_kana: "いのちを　かけて　こんしんの　ちからで\nあいてに　ずつきを　する。じぶんも\nものすごい　ダメージを　うける。"
    jp_kanji: "命を　懸けて　こん身の　力で\n相手に　ずつきを　する。自分も\nものすごい　ダメージを　受ける。"
    en: "The user attacks the target with a\nhazardous, full-power headbutt.\nThe user also takes terrible damage."
    fr: "Le lanceur assène un coup de tête\ndésespéré. Blesse aussi gravement\nle lanceur."
    it: "Chi la usa attacca con tutta la potenza\ndi cui dispone, ma purtroppo subisce\ndanni considerevoli."
    de: "Anwender greift unter Einsatz seines\nLebens mit einem Kopfstoß an und nimmt\ndabei selbst jede Menge Schaden."
    es: "El usuario arriesga su vida y lanza\nun cabezazo con toda su fuerza.\nEl agresor resulta seriamente dañado."
    ko: "목숨을 걸고 혼신의 힘으로\n상대에게 박치기를 한다.\n자신도 굉장한 데미지를 입는다."
headbutt:
  names:
    jp_kana: ずつき
    jp_kanji: ずつき
    en: Headbutt
    fr: Coup d’Boule
    it: Bottintesta
    de: Kopfnuss
    es: Golpe Cabeza
    ko: 박치기
  descriptions:
    jp_kana: "あたまを　つきだして\nまっすぐ　つっこんで　こうげきする。\nあいてを　ひるませる　ことが　ある。"
    jp_kanji: "頭を　突きだして\nまっすぐ　つっこんで　攻撃する。\n相手を　ひるませることが　ある。"
    en: "The user sticks out its head and attacks\nby charging straight into the target.\nIt may also make the target flinch."
    fr: "Le lanceur donne un coup de tête.\nPeut apeurer l’ennemi."
    it: "Chi la usa si lancia diritto di testa contro\nil nemico. Può anche far tentennare."
    de: "Rammt das Ziel mit einer Kopfnuss.\nZiel schreckt eventuell zurück."
    es: "Lanza un potente cabezazo que puede\nhacer retroceder al objetivo."
    ko: "머리를 내밀어\n곧장 돌진하여 공격한다.\n상대를 풀죽게 만들 때가 있다."
heal_bell:
  names:
    jp_kana: いやしのすず
    jp_kanji: いやしのすず
    en: Heal Bell
    fr: Glas de Soin
    it: Rintoccasana
    de: Vitalglocke
    es: Campana Cura
    ko: 치료방울
  descriptions:
    jp_kana: "ここちよい　すずの　ねいろを　きかせて\nみかた　ぜんいんの\nじょうたい　いじょうを　かいふく　する。"
    jp_kanji: "心地好い　鈴の　音色を　聞かせて\n味方　全員の\n状態異常を　回復　する。"
    en: "The user makes a soothing bell chime\nto heal the status problems of all the\nparty Pokémon."
    fr: "Carillon apaisant qui soigne les problèmes\nde statut de tous les Pokémon de l’équipe."
    it: "Chi la usa produce uno scampanellio che\nrisolve i problemi di stato dei Pokémon\ndi tutta la squadra."
    de: "Läutet beruhigend und heilt alle\nStatusprobleme im Team."
    es: "Tañido que cura los problemas de estado\nde todos los Pokémon del equipo."
    ko: "기분 좋은 방울소리를\n들려주어 같은 편 전원의\n상태 이상을 회복한다."
heal_block:
  names:
    jp_kana: かいふくふうじ
    jp_kanji: かいふくふうじ
    en: Heal Block
    fr: Anti-Soin
    it: Anticura
    de: Heilblockade
    es: Anticura
    ko: 회복봉인
  descriptions:
    jp_kana: "５ターンの　あいだ　わざや\nとくせいや　もっている　どうぐによって\nＨＰを　かいふく　できなく　する。"
    jp_kanji: "５ターンの　あいだ　技や\n特性や　持っている　道具によって\nＨＰを　回復　できなくする。"
    en: "For five turns, the user prevents the\nopposing team from using any moves,\nAbilities, or held items that recover HP."
    fr: "Le lanceur empêche l’ennemi d’utiliser ses\ncapacités, cap. spé. ou objets tenus pour\nrécupérer des PV pendant 5 tours."
    it: "Chi la usa impedisce al nemico di utilizzare\nmosse o abilità recupera-PS per cinque\nturni."
    de: "Anwender verhindert für fünf Runden, dass\nGegner durch Attacken, Fähigkeiten oder\nItems KP regenerieren."
    es: "Impide al objetivo usar movimientos,\nhabilidades y objetos equipados que\nrecuperan PS durante cinco turnos."
    ko: "5턴 동안 기술이나 특성,\n지니고 있는 도구에 의한\nHP 회복을 할 수 없게 한다."
heal_order:
  names:
    jp_kana: かいふくしれい
    jp_kanji: かいふくしれい
    en: Heal Order
    fr: Appel Soins
    it: Comandocura
    de: Heilbefehl
    es: Auxilio
    ko: 회복지령
  descriptions:
    jp_kana: "しもべを　よびだして　きずを　なおす。\nさいだい　ＨＰの　はんぶん\nじぶんの　ＨＰを　かいふく　する。"
    jp_kanji: "しもべを　呼びだして　きずを　治す。\n最大ＨＰの　半分\n自分の　ＨＰを　回復する。"
    en: "The user calls out its underlings to\nheal it. The user regains up to half of its\nmax HP."
    fr: "Le lanceur appelle ses sous-fifres pour\nle soigner. Il récupère jusqu’à la moitié\nde ses PV max."
    it: "Chi la usa raduna i propri sgherri per farsi\ncurare. Recupera metà dei PS massimi."
    de: "Untergebene heilen den Anwender. KP des\nAnwenders werden mit 50 % der max. KP\naufgefüllt."
    es: "El usuario llama a sus súbditos para que\nlo curen. Recupera hasta la mitad de\nlos PS máximos."
    ko: "부하를 불러내어 상처를 회복한다.\n최대 HP의 절반만큼\n자신의 HP를 회복한다."
heal_pulse:
  names:
    jp_kana: いやしのはどう
    jp_kanji: いやしのはどう
    en: Heal Pulse
    fr: Vibra Soin
    it: Ondasana
    de: Heilwoge
    es: Pulso Cura
    ko: 치유파동
  descriptions:
    jp_kana: "いやしのはどうを　とばして\nさいだい　ＨＰの　はんぶん\nあいての　ＨＰを　かいふく　する。"
    jp_kanji: "いやしのはどうを　とばして\n最大ＨＰの　半分\n相手の　ＨＰを　回復する。"
    en: "The user emits a healing pulse which\nrestores the target’s HP by up to\nhalf of its max HP."
    fr: "Une aura de bien-être fait récupérer\nla moitié de ses PV max à la cible."
    it: "Chi la usa lancia un’onda rilassante che\nfa recuperare al bersaglio metà dei suoi\nPS massimi."
    de: "Anwender löst eine Schmerzen lindernde\nWelle aus und heilt das Ziel mit der Hälfte\nseiner maximalen KP."
    es: "Una onda curativa restaura los PS\ndel objetivo a la mitad de su máximo."
    ko: "치유파동을 날려서\n최대 HP의 절반만큼\n상대의 HP를 회복한다."
healing_wish:
  names:
    jp_kana: いやしのねがい
    jp_kanji: いやしのねがい
    en: Healing Wish
    fr: Vœu Soin
    it: Curardore
    de: Heilopfer
    es: Deseo Cura
    ko: 치유소원
  descriptions:
    jp_kana: "じぶんは　ひんしに　なるが　ひかえから\nでてくる　ポケモンの　じょうたい\nいじょうと　ＨＰを　かいふく　する。"
    jp_kanji: "自分は　ひんしに　なるが\n控えから　でてくる　ポケモンの\n状態異常と　ＨＰを　回復する。"
    en: "The user faints. In return, the Pokémon\ntaking its place will have its HP restored\nand status cured."
    fr: "Le lanceur tombe K.O. pour soigner les\nPV et le statut du Pokémon qui passe\naprès lui."
    it: "Chi la usa va KO, ma il Pokémon che lo\nsostituisce recupera tutti i PS e risolve\ni problemi di stato."
    de: "Anwender geht K.O. Das an seine\nStelle tretende Pokémon hat volle\nKP. Statusprobleme werden geheilt."
    es: "El Pokémon cae debilitado, pero su\nsustituto recupera su estado y los PS."
    ko: "자신은 기절하지만\n교대하여 나오는 포켓몬의\n상태 이상과 HP를 회복한다."
heart_stamp:
  names:
    jp_kana: ハートスタンプ
    jp_kanji: ハートスタンプ
    en: Heart Stamp
    fr: Crèvecœur
    it: Cuorestampo
    de: Herzstempel
    es: Arrumaco
    ko: 하트스탬프
  descriptions:
    jp_kana: "かわいい　しぐさで　ゆだん　させて\nきょうれつな　いちげきを　あびせる。\nあいてを　ひるませる　ことが　ある。"
    jp_kanji: "かわいい　しぐさで　油断させて\n強烈な　一撃を　浴びせる。\n相手を　ひるませることが　ある。"
    en: "The user unleashes a vicious blow after\nits cute act makes the target less wary.\nIt may also make the target flinch."
    fr: "Déconcentre l’ennemi avec des mouvements\nmignons avant de le frapper violemment.\nPeut apeurer l’ennemi."
    it: "Chi la usa distrae il nemico con un faccino\ninnocente per poi sferrargli un colpo\ndevastante che può farlo tentennare."
    de: "Verleitet Ziel durch Kokettieren zu Un-\nachtsamkeit und verpasst ihm dann einen\nharten Schlag. Ziel schreckt evtl. zurück."
    es: "Grácil gesto que asesta un golpe tremendo\nal objetivo y puede hacerlo retroceder."
    ko: "귀여운 모습으로 방심시켜서\n강렬한 일격을 날린다.\n상대를 풀죽게 만들 때가 있다."
heart_swap:
  names:
    jp_kana: ハートスワップ
    jp_kanji: ハートスワップ
    en: Heart Swap
    fr: Permucœur
    it: Cuorbaratto
    de: Statustausch
    es: Cambia Almas
    ko: 하트스웹
  descriptions:
    jp_kana: "ちょうのうりょくで\nじぶんと　あいてに　かかっている\nのうりょく　へんかを　いれかえる。"
    jp_kanji: "超能力で\n自分と　相手に　かかっている\n能力変化を　入れ替える。"
    en: "The user employs its psychic power to\nswitch stat changes with the target."
    fr: "Le lanceur utilise un pouvoir psychique\npour échanger ses changements de\nstats avec la cible."
    it: "Chi la usa sfrutta la sua forza psichica\nper scambiare le modifiche alle statistiche\ncon il bersaglio."
    de: "Anwender setzt Psycho-Kräfte ein,\num Statusveränderungen des Zieles\nmit den eigenen zu tauschen."
    es: "Usa la fuerza mental para intercambiar\ncon el objetivo los cambios en las\ncaracterísticas."
    ko: "초능력으로\n자신과 상대에 걸려있는\n능력 변화를 교체한다."
heat_crash:
  names:
    jp_kana: ヒートスタンプ
    jp_kanji: ヒートスタンプ
    en: Heat Crash
    fr: Tacle Feu
    it: Marchiafuoco
    de: Brandstempel
    es: Golpe Calor
    ko: 히트스탬프
  descriptions:
    jp_kana: "もえる　からだで　あいてに　ぶつかって\nこうげきする。じぶんが　あいてより\nおもいほど　いりょくが　あがる。"
    jp_kanji: "燃える　体で　相手に　ぶつかって\n攻撃する。自分が　相手より\n重いほど　威力が　あがる。"
    en: "The user slams its target with its flame-\ncovered body. The more the user outweighs\nthe target, the greater the damage."
    fr: "Le lanceur projette son corps enflammé\ncontre l’ennemi. S’il est plus lourd que\nl’ennemi, l’effet augmente en conséquence."
    it: "Chi la usa carica con il suo corpo rovente.\nPiù è pesante rispetto al bersaglio e più\ndanni causa."
    de: "Rempelattacke mit brennendem Körper.\nJe schwerer der Anwender im Vergleich\nzum Ziel ist, desto stärker die Attacke."
    es: "El usuario ataca con su cuerpo ardiente.\nCuanto mayor sea su peso comparado\ncon el del objetivo, más daño causará."
    ko: "불타는 몸으로 상대에게 부딪쳐서\n공격한다. 자신이 상대보다\n무거울수록 위력이 올라간다."
heat_wave:
  names:
    jp_kana: ねっぷう
    jp_kanji: ねっぷう
    en: Heat Wave
    fr: Canicule
    it: Ondacalda
    de: Hitzewelle
    es: Onda Ígnea
    ko: 열풍
  descriptions:
    jp_kana: "あつい　いきを\nあいてに　ふきつけて　こうげきする。\nやけど　じょうたいに　することが　ある。"
    jp_kanji: "熱い　息を\n相手に　吹きつけて　攻撃する。\nやけど状態に　することが　ある。"
    en: "The user attacks by exhaling hot breath\non the opposing team. It may also leave\ntargets with a burn."
    fr: "Le lanceur provoque une vague de\nchaleur. Peut aussi brûler l’ennemi."
    it: "Chi la usa investe i nemici con una folata\ndi vento caldo. Può anche scottare."
    de: "Gegner wird von Sturm aus heißer\nLuft getroffen und verbrennt sich\neventuell."
    es: "Provoca un viento abrasador que puede\nquemar al objetivo."
    ko: "뜨거운 숨결을\n상대에게 내뿜어 공격한다.\n화상 상태로 만들 때가 있다."
heavy_slam:
  names:
    jp_kana: ヘビーボンバー
    jp_kanji: ヘビーボンバー
    en: Heavy Slam
    fr: Tacle Lourd
    it: Pesobomba
    de: Rammboss
    es: Cuerpopesado
    ko: 헤비봄버
  descriptions:
    jp_kana: "おもたい　からだで　あいてに　ぶつかって\nこうげきする。じぶんが　あいてより\nおもいほど　いりょくが　あがる。"
    jp_kanji: "重たい　体で　相手に　ぶつかって\n攻撃する。自分が　相手より\n重いほど　威力が　あがる。"
    en: "The user slams into the target with its\nheavy body. The more the user outweighs\nthe target, the greater its damage."
    fr: "Le lanceur se jette sur l’ennemi de tout\nson poids. S’il est plus lourd que l’ennemi,\nl’effet augmente en conséquence."
    it: "Chi la usa si lancia contro il bersaglio\ncon tutto il proprio peso. Più è pesante\nrispetto ad esso e più danni causa."
    de: "Anwender rammt das Ziel mit massivem\nKörper. Je schwerer er im Vergleich zum\nZiel ist, desto stärker die Attacke."
    es: "El usuario golpea con todo su cuerpo.\nCuanto mayor sea su peso comparado\ncon el del objetivo, más daño causará."
    ko: "무거운 몸으로 상대에게 부딪쳐\n공격한다. 자신이 상대보다\n무거울수록 위력이 올라간다."
helping_hand:
  names:
    jp_kana: てだすけ
    jp_kanji: てだすけ
    en: Helping Hand
    fr: Coup d’Main
    it: Altruismo
    de: Rechte Hand
    es: Refuerzo
    ko: 도우미
  descriptions:
    jp_kana: "なかまを　たすける。\nてだすけ　された　ポケモンの　わざの\nいりょくは　いつもより　おおきく　なる。"
    jp_kanji: "仲間を　助ける。\nてだすけ　された　ポケモンの　技の\n威力は　いつもより　大きくなる。"
    en: "The user assists an ally by boosting\nthe power of its attack."
    fr: "Une capacité qui augmente la puissance\nd’attaque de l’allié pendant un tour."
    it: "Mossa che aumenta la potenza dell’attacco\ndi un alleato."
    de: "Anwender steigert die Kraft eines\nAngriffes eines Freundes."
    es: "El usuario ayuda a un aliado\nreforzando la potencia de\nsu ataque."
    ko: "동료를 돕는다.\n도움받은 포켓몬이 쓰는 기술의\n위력은 여느 때보다 커진다."
hex:
  names:
    jp_kana: たたりめ
    jp_kanji: たたりめ
    en: Hex
    fr: Châtiment
    it: Sciagura
    de: Bürde
    es: Infortunio
    ko: 병상첨병
  descriptions:
    jp_kana: "たたみかける　ように　こうげきする。\nじょうたい　いじょうの　あいてに\nおおきな　ダメージを　あたえる。"
    jp_kanji: "たたみかける　ように　攻撃する。\n状態異常の　相手に\n大きな　ダメージを　与える。"
    en: "This relentless attack does massive\ndamage to a target affected\nby status problems."
    fr: "Attaque acharnée qui cause\ndavantage de dégâts à l’ennemi\ns’il a un problème de statut."
    it: "Attacco che causa un danno enorme\nse il bersaglio ha problemi di stato."
    de: "Eine Attacke, bei der der Anwender das\nZiel bedrängt. Fügt Zielen mit\nStatusveränderungen hohen Schaden zu."
    es: "Ataque que causa un gran daño\na los objetivos que sufren\nproblemas de estado."
    ko: "엎친 데 덮친 격으로 공격한다.\n상태 이상인 상대에게\n큰 데미지를 준다."
hidden_power:
  names:
    jp_kana: めざめるパワー
    jp_kanji: めざめるパワー
    en: Hidden Power
    fr: Puis. Cachée
    it: Introforza
    de: Kraftreserve
    es: Poder Oculto
    ko: 잠재파워
  descriptions:
    jp_kana: "わざを　つかった　ポケモンに　よって\nあいてに　あたえる\nわざの　タイプと　いりょくが　かわる。"
    jp_kanji: "技を　使った　ポケモンに　よって\n相手に　与える\n技の　タイプと　威力が　変わる。"
    en: "A unique attack that varies in type and\nintensity depending on the Pokémon\nusing it."
    fr: "Attaque dont la puissance et le type\ndépendent du Pokémon qui l’utilise."
    it: "Mossa singolare che cambia tipo e\npotenza a seconda del Pokémon che\nla usa."
    de: "Wirkung und Typ der Attacke\nhängen vom Anwender ab."
    es: "Ataque único cuyo tipo y potencia varían\nsegún el agresor."
    ko: "기술을 배운 포켓몬의\n숨겨진 능력으로\n기술 타입과 위력이 바뀐다."
high_jump_kick:
  names:
    jp_kana: とびひざげり
    jp_kanji: とびひざげり
    en: Hi Jump Kick
    fr: Pied Voltige
    it: Calcinvolo
    de: Turmkick
    es: Pat. S. Alta
    ko: 무릎차기
  descriptions:
    jp_kana: "ジャンプからの　ひざげりで\nあいてを　こうげきする。\nはずすと　じぶんが　ダメージを　うける。"
    jp_kanji: "ジャンプからの　ひざげりで\n相手を　攻撃する。\nはずすと　自分が　ダメージを　受ける。"
    en: "The target is attacked with a knee kick\nfrom a jump. If it misses, the user is hurt\ninstead."
    fr: "Le lanceur s’élance pour effectuer un\ncoup de genou sauté. S’il échoue, le\nlanceur se blesse."
    it: "Chi la usa colpisce il nemico con una\nginocchiata in volo: se fallisce, subisce\ndanni."
    de: "Sprungtritt mit Knie. Bei Misserfolg\nverletzt sich der Anwender selbst."
    es: "Salta muy alto y lanza una patada.\nSi falla, dañará al usuario."
    ko: "점프해서 무릎차기로\n상대를 공격한다.\n빗나가면 자신이 데미지를 입는다."
hone_claws:
  names:
    jp_kana: つめとぎ
    jp_kanji: つめとぎ
    en: Hone Claws
    fr: Aiguisage
    it: Unghiaguzze
    de: Klauenwetzer
    es: Afilagarras
    ko: 손톱갈기
  descriptions:
    jp_kana: "ツメを　みがいて　するどく　する。\nじぶんの　こうげきと　\nめいちゅうりつを　あげる。"
    jp_kanji: "ツメを　磨いて　鋭く　する。\n自分の　攻撃と　\n命中率を　あげる。"
    en: "The user sharpens its claws to\nboost its Attack stat and accuracy."
    fr: "Le lanceur s’aiguise les griffes.\nAugmente l’Attaque et la Précision."
    it: "Chi la usa affila i propri artigli,\naumentando Attacco e precisione."
    de: "Wetzt seine Klauen, um sie zu schärfen.\nErhöht Angriff und Genauigkeit des\nAnwenders."
    es: "El usuario se afila las garras para\naumentar su Ataque y Precisión."
    ko: "손톱을 갈아 날카롭게 한다.\n자신의 공격과\n명중률을 올린다."
horn_attack:
  names:
    jp_kana: つのでつく
    jp_kanji: つのでつく
    en: Horn Attack
    fr: Koud’Korne
    it: Incornata
    de: Hornattacke
    es: Cornada
    ko: 뿔찌르기
  descriptions:
    jp_kana: "するどく　とがった　つので\nあいてを　こうげきする。"
    jp_kanji: "鋭く　とがった　つので\n相手を　攻撃する。"
    en: "The target is jabbed with a sharply\npointed horn to inflict damage."
    fr: "Frappe l’ennemi d’un coup de corne\npointue pour infliger des dégâts."
    it: "Danneggia il nemico infilzandolo con un\ncorno affilato."
    de: "Spießt das Ziel mit einem spitzem\nHorn auf."
    es: Ataca al objetivo con una cornada.
    ko: "날카롭고 뾰족한 뿔로\n상대를 공격한다."
horn_drill:
  names:
    jp_kana: つのドリル
    jp_kanji: つのドリル
    en: Horn Drill
    fr: Empal’Korne
    it: Perforcorno
    de: Hornbohrer
    es: Perforador
    ko: 뿔드릴
  descriptions:
    jp_kana: "かいてんする　つのを\nあいてに　つきさして　こうげきする。\nあたれば　いちげきで　ひんしに　する。"
    jp_kanji: "回転する　つのを\n相手に　突き刺して　攻撃する。\n当たれば　一撃で　ひんしに　する。"
    en: "The user stabs the target with a horn\nthat rotates like a drill.\nIf it hits, the target faints instantly."
    fr: "Un coup de corne en vrille qui empale\nl’ennemi, le mettant K.O. sur le coup\ns’il est touché."
    it: "Colpisce il nemico con un corno perforante\ncome un trapano. Se il colpo va a segno,\nil nemico va KO."
    de: "K.O.-Attacke, die ein Horn als\nBohrer einsetzt."
    es: "Ataque con taladro que fulmina\nen un golpe al objetivo si le toca."
    ko: "회전하는 뿔을\n상대에게 꿰찔러서 공격한다.\n맞으면 일격에 기절한다."
horn_leech:
  names:
    jp_kana: ウッドホーン
    jp_kanji: ウッドホーン
    en: Horn Leech
    fr: Encornebois
    it: Legnicorno
    de: Holzgeweih
    es: Astadrenaje
    ko: 우드호른
  descriptions:
    jp_kana: "つのを　つきさして　あいての　ようぶんを\nすいとる。あたえた　ダメージの\nはんぶんの　ＨＰを　かいふく　できる。"
    jp_kanji: "つのを　突き刺して　相手の　養分を\n吸い取る。与えた　ダメージの\n半分の　ＨＰを　回復できる。"
    en: "The user drains the target’s energy with\nits horns. The user’s HP is restored\nby half the damage taken by the target."
    fr: "Un coup de corne qui draine l’énergie\nde l’ennemi. Convertit la moitié des dégâts\ninfligés en PV pour le lanceur."
    it: "Chi la usa infilza il bersaglio con le corna\ne assorbe una quantità di PS pari a metà\ndel danno inferto."
    de: "Greift Ziel mit Astgeweih an und zapft\ndiesem Nährstoffe ab. Anwender wird um die\nHälfte des zugefügten Schadens geheilt."
    es: "Un golpe que drena energía.\nEl Pokémon recupera la mitad\nde los PS arrebatados al objetivo."
    ko: "뿔을 꿰찔러서 상대의 양분을\n흡수한다. 입힌 데미지의 절반에\n해당하는 HP를 회복할 수 있다."
howl:
  names:
    jp_kana: とおぼえ
    jp_kanji: とおぼえ
    en: Howl
    fr: Grondement
    it: Gridodilotta
    de: Jauler
    es: Aullido
    ko: 멀리짖음
  descriptions:
    jp_kana: "おおごえで　ほえて　きあいを　たかめ\nじぶんの　こうげきを　あげる。"
    jp_kanji: "大声で　ほえて　気合を　高め\n自分の　攻撃を　あげる。"
    en: "The user howls loudly to raise its spirit,\nboosting its Attack stat."
    fr: "Le lanceur hurle pour se rassurer, ce qui\naugmente son Attaque."
    it: "Chi la usa emette un verso molto forte\nper darsi coraggio e aumentare l’Attacco."
    de: "Anwender jault, um seinen Kampfgeist\nund seinen Angriffs-Wert zu erhöhen."
    es: "Aullido que sube el ánimo y aumenta\nel Ataque."
    ko: "큰 소리로 짖고 기합을 높여\n자신의 공격을 올린다."
hurricane:
  names:
    jp_kana: ぼうふう
    jp_kanji: ぼうふう
    en: Hurricane
    fr: Vent Violent
    it: Tifone
    de: Orkan
    es: Vendaval
    ko: 폭풍
  descriptions:
    jp_kana: "きょうれつな　かぜで　あいてを\nつつみこんで　こうげきする。\nあいてを　こんらん　させることが　ある。"
    jp_kanji: "強烈な　風で　相手を\n包みこんで　攻撃する。\n相手を　混乱させることが　ある。"
    en: "The user attacks by wrapping its opponent\nin a fierce wind that flies up into the sky.\nIt may also confuse the target."
    fr: "Le lanceur déclenche une tempête de\nvents violents qui s’abat sur l’ennemi.\nPeut aussi le rendre confus."
    it: "Chi la usa attacca il bersaglio\navvolgendolo con un vento fortissimo.\nPuò anche confonderlo."
    de: "Anwender greift das Ziel an, indem er\nes mit heftigen Windböen umgibt.\nZiel wird eventuell verwirrt."
    es: "Golpea al objetivo con un fuerte\ntorbellino que envuelve al rival\ny puede confundirlo."
    ko: "강렬한 바람으로 상대를\n둘러싸서 공격한다.\n상대를 혼란시킬 때가 있다."
hydro_cannon:
  names:
    jp_kana: ハイドロカノン
    jp_kanji: ハイドロカノン
    en: Hydro Cannon
    fr: Hydroblast
    it: Idrocannone
    de: Aquahaubitze
    es: Hidrocañón
    ko: 하이드로캐논
  descriptions:
    jp_kana: "みずの　たいほうを\nあいてに　はっしゃして　こうげきする。\nつぎの　ターンは　うごけなく　なる。"
    jp_kanji: "水の　大砲を\n相手に　発射して　攻撃する。\n次の　ターンは　動けなくなる。"
    en: "The target is hit with a watery blast.\nThe user must rest on the\nnext turn, however."
    fr: "Une trombe d’eau heurte l’ennemi.\nLe lanceur doit se reposer au tour\nsuivant."
    it: "Colpisce il nemico con un potente getto\nd’acqua. Chi la usa salta il turno\nsuccessivo."
    de: "Das Ziel wird von Wasserkanone\ngetroffen. Angreifer setzt eine\nRunde aus."
    es: "Disparo de agua. El atacante debe\ndescansar el siguiente turno."
    ko: "물의 대포를\n상대에게 발사해서 공격한다.\n다음 턴은 움직일 수 없다."
hydro_pump:
  names:
    jp_kana: ハイドロポンプ
    jp_kanji: ハイドロポンプ
    en: Hydro Pump
    fr: Hydrocanon
    it: Idropompa
    de: Hydropumpe
    es: Hidrobomba
    ko: 하이드로펌프
  descriptions:
    jp_kana: "たいりょうの　みずを\nはげしい　いきおいで\nあいてに　はっしゃして　こうげきする。"
    jp_kanji: "大量の　水を\n激しい　勢いで\n相手に　発射して　攻撃する。"
    en: "The target is blasted by a huge volume\nof water launched under great pressure."
    fr: "Un puissant jet d’eau est\ndirigé sur l’ennemi."
    it: "Il nemico è travolto da un potente getto\nd’acqua spruzzato ad altissima pressione."
    de: "Spritzt eine Menge Wasser mit\nHochdruck auf das Ziel."
    es: "Lanza una gran masa de agua a presión\npara atacar."
    ko: "대량의 물을\n세찬 기세로\n상대에게 발사하여 공격한다."
hyper_beam:
  names:
    jp_kana: はかいこうせん
    jp_kanji: はかいこうせん
    en: Hyper Beam
    fr: Ultralaser
    it: Iper Raggio
    de: Hyperstrahl
    es: Hiperrayo
    ko: 파괴광선
  descriptions:
    jp_kana: "つよい　こうせんを\nあいてに　はっしゃして　こうげきする。\nつぎの　ターンは　うごけなく　なる。"
    jp_kanji: "強い　光線を\n相手に　発射して　攻撃する。\n次の　ターンは　動けなくなる。"
    en: "The target is attacked with a powerful\nbeam. The user must rest on the next\nturn to regain its energy."
    fr: "Projette un puissant rayon sur l’ennemi.\nLe lanceur doit se reposer\nau tour suivant."
    it: "Colpisce il nemico con un potente raggio.\nChi la usa salta il turno successivo per\nrecuperare energia."
    de: "Starke Attacke, die den Angreifer\nzwingt, eine Runde auszusetzen."
    es: "Es eficaz, pero el atacante deberá\ndescansar en el siguiente turno."
    ko: "강한 광선을\n상대에게 발사하여 공격한다.\n다음 턴은 움직일 수 없다."
hyper_fang:
  names:
    jp_kana: ひっさつまえば
    jp_kanji: ひっさつまえば
    en: Hyper Fang
    fr: Croc de Mort
    it: Iperzanna
    de: Hyperzahn
    es: Hip.Colmillo
    ko: 필살앞니
  descriptions:
    jp_kana: "するどい　まえばで\nつよく　かみついて　こうげきする。\nあいてを　ひるませる　ことが　ある。"
    jp_kanji: "鋭い　前歯で\n強く　かみついて　攻撃する。\n相手を　ひるませることが　ある。"
    en: "The user bites hard on the target\nwith its sharp front fangs.\nIt may also make the target flinch."
    fr: "Le lanceur mord l’ennemi à l’aide de\nses incisives aiguisées. Peut aussi\napeurer l’ennemi."
    it: "Chi la usa morde il nemico con i suoi incisivi\naffilati. Può anche farlo tentennare."
    de: "Angriff mit scharfen Reißzähnen.\nZiel schreckt eventuell zurück."
    es: "Ataque con finos colmillos.\nPuede hacer retroceder al objetivo."
    ko: "날카로운 앞니로\n강하게 물어서 공격한다.\n상대를 풀죽게 만들 때가 있다."
hyper_voice:
  names:
    jp_kana: ハイパーボイス
    jp_kanji: ハイパーボイス
    en: Hyper Voice
    fr: Mégaphone
    it: Granvoce
    de: Schallwelle
    es: Vozarrón
    ko: 하이퍼보이스
  descriptions:
    jp_kana: "うるさく　ひびく　おおきな　しんどうを\nあいてに　あたえて　こうげきする。"
    jp_kanji: "うるさく　響く　大きな　振動を\n相手に　与えて　攻撃する。"
    en: "The user lets loose a horribly echoing\nshout with the power to inflict damage."
    fr: "Le lanceur pousse un cri dont l’écho\nterrifiant a le pouvoir d’infliger\ndes dégâts."
    it: "Chi la usa lancia un urlo straziante che\ndanneggia i nemici."
    de: Laute Attacke mit Schallwellen.
    es: "Grito desgarrador que inflige\ndaño al objetivo."
    ko: "시끄럽게 울려서 큰 진동을\n상대에게 전달하여 공격한다."
hypnosis:
  names:
    jp_kana: さいみんじゅつ
    jp_kanji: さいみんじゅつ
    en: Hypnosis
    fr: Hypnose
    it: Ipnosi
    de: Hypnose
    es: Hipnosis
    ko: 최면술
  descriptions:
    jp_kana: "ねむけを　さそう　あんじを　かけて\nあいてを　ねむり　じょうたいに　する。"
    jp_kanji: "眠気を　誘う　暗示を　かけて\n相手を　眠り状態に　する。"
    en: "The user employs hypnotic suggestion\nto make the target fall into a deep sleep."
    fr: "Le lanceur hypnotise l’ennemi pour le\nplonger dans un profond sommeil."
    it: "Chi la usa si avvale della suggestione\nipnotica per far addormentare il nemico."
    de: "Hypno-Attacke, die das Ziel\nin Schlaf versetzt."
    es: "Ataque hipnótico que hace dormir\nprofundamente al objetivo."
    ko: "졸음을 유도하는 암시를 걸어서\n상대를 잠듦 상태로 만든다."
ice_ball:
  names:
    jp_kana: アイスボール
    jp_kanji: アイスボール
    en: Ice Ball
    fr: Ball’Glace
    it: Palla Gelo
    de: Frostbeule
    es: Bola Hielo
    ko: 아이스볼
  descriptions:
    jp_kana: "５ターンの　あいだ　ころがりつづけて\nあいてを　こうげきする。わざが\nあたるたび　いりょくが　あがる。"
    jp_kanji: "５ターンの　あいだ　転がり続けて\n相手を　攻撃する。技が　当たるたび\n威力が　あがる。"
    en: "The user continually rolls into the target\nover five turns. It becomes stronger\neach time it hits."
    fr: "Envoie une balle de glace pendant 5 tours.\nL’attaque gagne en puissance\nà chaque coup."
    it: "Chi la usa attacca il nemico rotolando\nper cinque turni, con aumento progressivo\ndella potenza ogni volta che va a segno."
    de: "Attacke, die fünf Runden dauert.\nDie Härte nimmt von Mal zu Mal zu."
    es: "El atacante rueda contra el objetivo\ndurante cinco turnos, cada vez\ncon mayor fuerza."
    ko: "5턴 동안 구르기를 반복하여\n상대를 공격한다. 기술이 맞을 때마다\n위력이 올라간다."
ice_beam:
  names:
    jp_kana: れいとうビーム
    jp_kanji: れいとうビーム
    en: Ice Beam
    fr: Laser Glace
    it: Geloraggio
    de: Eisstrahl
    es: Rayo Hielo
    ko: 냉동빔
  descriptions:
    jp_kana: "こごえる　ビームを\nあいてに　はっしゃして　こうげきする。\nこおり　じょうたいに　することが　ある。"
    jp_kanji: "凍える　ビームを\n相手に　発射して　攻撃する。\nこおり状態に　することが　ある。"
    en: "The target is struck with an icy-cold\nbeam of energy.\nIt may also freeze the target solid."
    fr: "Un rayon de glace frappe l’ennemi.\nPeut aussi le geler."
    it: "Il nemico è colpito da un raggio di energia\ngelida che può anche congelarlo."
    de: "Das Ziel wird von einem Eisstrahl\ngetroffen und friert eventuell ein."
    es: Rayo de hielo que puede llegar a congelar.
    ko: "냉동빔을\n상대에게 발사하여 공격한다.\n얼음 상태로 만들 때가 있다."
ice_burn:
  names:
    jp_kana: コールドフレア
    jp_kanji: コールドフレア
    en: Ice Burn
    fr: Feu Glacé
    it: Vampagelida
    de: Frosthauch
    es: Llama Gélida
    ko: 콜드플레어
  descriptions:
    jp_kana: "すべてを　こおらせる　はげしい　れいきで\n２ターンめに　あいてを　つつみこむ。\nやけど　じょうたいに　することが　ある。"
    jp_kanji: "すべてを　凍らせる　激しい　冷気で\n２ターン目に　相手を　包みこむ。\nやけど状態に　することが　ある。"
    en: "On the second turn, an ultracold,\nfreezing wind surrounds the target.\nThis may leave the target with a burn."
    fr: "Au second tour, le lanceur projette un\nsouffle de vent glacial dévastateur\nsur l’ennemi. Peut le brûler."
    it: "Chi la usa attacca il bersaglio al turno\nsuccessivo e lo avvolge in un soffio\nd’aria congelata. Può anche scottarlo."
    de: "Umgibt das Ziel in der nächsten Runde\nmit heftigen, alles gefrierenden Eisböen.\nFügt dem Ziel eventuell Verbrennungen zu."
    es: "Ataca al objetivo en el segundo turno\nrodeándolo de un aire gélido.\nPuede causar quemaduras."
    ko: "모든 것을 얼려버리는 격렬한 냉기로\n2턴째에 상대를 둘러싼다.\n화상 상태로 만들 때가 있다."
ice_fang:
  names:
    jp_kana: こおりのキバ
    jp_kanji: こおりのキバ
    en: Ice Fang
    fr: Crocs Givre
    it: Gelodenti
    de: Eiszahn
    es: Colm. Hielo
    ko: 얼음엄니
  descriptions:
    jp_kana: "れいきを　ひめた　キバで　かみつく。\nあいてを　ひるませたり\nこおり　じょうたいに　することが　ある。"
    jp_kanji: "冷気を　ひめた　キバで　かみつく。\n相手を　ひるませたり\nこおり状態に　することが　ある。"
    en: "The user bites with cold-infused fangs.\nIt may also make the target flinch or\nleave it frozen."
    fr: "Le lanceur utilise une morsure glaciale.\nPeut aussi geler ou apeurer l’ennemi."
    it: "Chi la usa morde con denti ghiacciati.\nPuò anche congelare o far tentennare\nil nemico."
    de: "Anwender beißt mit eiskalten Reißzähnen\nzu. Ziel schreckt eventuell zurück oder\nfriert ein."
    es: "Usa colmillos helados para morder.\nPuede hacer que el objetivo retroceda\no congelarlo."
    ko: "냉기를 품은 이빨로 문다.\n상대를 풀죽게 하거나\n얼음 상태로 만들 때가 있다."
ice_punch:
  names:
    jp_kana: れいとうパンチ
    jp_kanji: れいとうパンチ
    en: Ice Punch
    fr: Poinglace
    it: Gelopugno
    de: Eishieb
    es: Puño Hielo
    ko: 냉동펀치
  descriptions:
    jp_kana: "れいきを　こめた　パンチで\nあいてを　こうげきする。\nこおり　じょうたいに　することが　ある。"
    jp_kanji: "冷気を　こめた　パンチで\n相手を　攻撃する。\nこおり状態に　することが　ある。"
    en: "The target is punched with an icy fist.\nIt may also leave the target frozen."
    fr: "Un coup de poing glacé vient\nfrapper l’ennemi. Peut le geler."
    it: "Colpisce il nemico con un pugno di ghiaccio\nche può congelarlo."
    de: "Ein eisiger Schlag, der das Ziel\neventuell einfriert."
    es: "Puñetazo helado.\nPuede congelar."
    ko: "냉기를 담은 펀치로\n상대를 공격한다.\n얼음 상태로 만들 때가 있다."
ice_shard:
  names:
    jp_kana: こおりのつぶて
    jp_kanji: こおりのつぶて
    en: Ice Shard
    fr: Éclats Glace
    it: Geloscheggia
    de: Eissplitter
    es: Canto Helado
    ko: 얼음뭉치
  descriptions:
    jp_kana: "こおりの　かたまりを　いっしゅんで\nつくり　あいてに　すばやく　はなつ。\nかならず　せんせい　こうげき　できる。"
    jp_kanji: "氷の塊を　一瞬で　つくり\n相手に　素早く　放つ。\n必ず　先制攻撃　できる。"
    en: "The user flash freezes chunks of\nice and hurls them at the target.\nThis move always goes first."
    fr: "Le lanceur crée des éclats de glace qu’il\nenvoie sur l’ennemi. Frappe toujours en\npremier."
    it: "Chi la usa crea dei pezzi di ghiaccio e\nli lancia. Con questa mossa si colpisce\nper primi."
    de: "Das Ziel wird mit Eisklumpen beworfen.\nDiese Attacke hat Erstschlaggarantie."
    es: "Crea bolas de hielo y las lanza a gran\nvelocidad. Este movimiento siempre\nva primero."
    ko: "얼음 덩어리를 순식간에 만들어\n상대에게 빠르게 쏜다.\n반드시 선제공격을 할 수 있다."
icicle_crash:
  names:
    jp_kana: つららおとし
    jp_kanji: つららおとし
    en: Icicle Crash
    fr: Chute Glace
    it: Scagliagelo
    de: Eiszapfhagel
    es: Chuzos
    ko: 고드름떨구기
  descriptions:
    jp_kana: "おおきな　つららを\nはげしく　ぶつけて　こうげきする。\nあいてを　ひるませる　ことが　ある。"
    jp_kanji: "大きな　氷柱を\n激しく　ぶつけて　攻撃する。\n相手を　ひるませることが　ある。"
    en: "The user attacks by harshly dropping\nan icicle onto the target.\nIt may also make the target flinch."
    fr: "Envoie de gros blocs de glace sur\nl’ennemi pour lui infliger des dégâts.\nPeut aussi l’apeurer."
    it: "Chi la usa attacca violentemente il nemico\ncon grosse stalattiti di ghiaccio che\npossono anche farlo tentennare."
    de: "Lässt große, schwere Eiszapfen\nauf das Ziel herabregnen.\nZiel schreckt eventuell zurück."
    es: "Lanza grandes carámbanos.\nPuede hacer retroceder al objetivo."
    ko: "큰 고드름을\n격렬하게 부딪쳐서 공격한다.\n상대를 풀죽게 만들 때가 있다."
icicle_spear:
  names:
    jp_kana: つららばり
    jp_kanji: つららばり
    en: Icicle Spear
    fr: Stalagtite
    it: Gelolancia
    de: Eisspeer
    es: Carámbano
    ko: 고드름침
  descriptions:
    jp_kana: "するどい　つららを\nあいてに　はっしゃして　こうげきする。\n２ー５かいの　あいだ　れんぞくで　だす。"
    jp_kanji: "鋭い　氷柱を\n相手に　発射して　攻撃する。\n２ー５回の　あいだ　連続で　だす。"
    en: "The user launches sharp icicles at the\ntarget. It strikes two to five times in\na row."
    fr: "Le lanceur jette des pics de glace sur\nl’ennemi, de 2 à 5 fois de suite."
    it: "Chi la usa spara ghiaccioli affilati contro\nil nemico da due a cinque volte di fila."
    de: "Feuert 2 bis 5 Eiszapfen auf\ndas Ziel."
    es: "Ataca lanzando de dos a cinco ráfagas\nconsecutivas de carámbanos."
    ko: "날카로운 고드름을\n상대에게 발사하여 공격한다.\n2-5회 동안 연속으로 쓴다."
icy_wind:
  names:
    jp_kana: こごえるかぜ
    jp_kanji: こごえるかぜ
    en: Icy Wind
    fr: Vent Glace
    it: Ventogelato
    de: Eissturm
    es: Viento Hielo
    ko: 얼다바람
  descriptions:
    jp_kana: "つめたい　れいきを\nあいてに　ふきつけて　こうげきする。\nあいての　すばやさを　さげる。"
    jp_kanji: "凍てつく　冷気を\n相手に　吹きつけて　攻撃する。\n相手の　素早さを　さげる。"
    en: "The user attacks with a gust of\nchilled air. It also reduces the targets’\nSpeed stat."
    fr: "Une bourrasque de vent froid blesse\nl’ennemi. Réduit aussi sa Vitesse."
    it: "Chi la usa attacca i nemici con una folata\ndi aria gelida e ne riduce anche\nla Velocità."
    de: "Eis-Attacke, die dem Gegner Schaden\nzufügt und seinen Initiative-Wert senkt."
    es: "Ataque con aire helado que baja\nla Velocidad del objetivo."
    ko: "차가운 냉기를\n상대에게 내뿜어 공격한다.\n상대의 스피드를 떨어뜨린다."
imprison:
  names:
    jp_kana: ふういん
    jp_kanji: ふういん
    en: Imprison
    fr: Possessif
    it: Esclusiva
    de: Begrenzer
    es: Cerca
    ko: 봉인
  descriptions:
    jp_kana: "あいてが　じぶんと　おなじ　わざを\nおぼえていたら　あいてだけ\nそのわざを　つかえなく　する。"
    jp_kanji: "相手が　自分と　同じ　技を\nおぼえていたら　相手だけ\nその技を　使えなくする。"
    en: "If the opponents know any move also known\nby the user, the opponents are prevented\nfrom using it."
    fr: "Si l’ennemi et le lanceur ont des\ncapacités en commun, l’ennemi ne\npourra pas les utiliser."
    it: "Chi la usa impedisce al nemico di usare\nmosse che conoscono entrambi."
    de: "Hindert Gegner am Einsatz von Attacken,\ndie der Anwender selbst auch kennt."
    es: "Impide a los contrincantes usar ataques\nconocidos por el usuario durante\nel combate."
    ko: "상대가 자신과 같은 기술을\n기억하고 있으면 상대만\n그 기술을 사용할 수 없게 한다."
incinerate:
  names:
    jp_kana: やきつくす
    jp_kanji: やきつくす
    en: Incinerate
    fr: Calcination
    it: Bruciatutto
    de: Einäschern
    es: Calcinación
    ko: 불태우기
  descriptions:
    jp_kana: "ほのおで　あいてを　こうげきする。\nあいてが　きのみを　もっている　とき\nもやして　つかえなく　する。"
    jp_kanji: "炎で　相手を　攻撃する。\n相手が　きのみを　持っているとき\n燃やして　使えなくする。"
    en: "The user attacks the target with fire.\nIf the target is holding a Berry, the\nBerry becomes burnt up and unusable."
    fr: "Des flammes calcinent l’ennemi.\nS’il tient une Baie, elle est\nbrûlée et devient inutilisable."
    it: "Attacca il nemico con una fiammata.\nSe il nemico ha una Bacca, viene\ndivorata dalle fiamme."
    de: "Eine Feuer-Attacke. Trägt das Ziel eine\nBeere bei sich, wird diese von den\nFlammen verzehrt und geht verloren."
    es: "Llamas que golpean a los objetivos\nadyacentes. Si estos llevan Bayas, estas\nse quemarán y ya no se podrán usar."
    ko: "불꽃으로 상대를 공격한다.\n상대가 나무열매를 지니고 있을 때\n불태워서 쓸 수 없게 만든다."
inferno:
  names:
    jp_kana: れんごく
    jp_kanji: れんごく
    en: Inferno
    fr: Feu d’Enfer
    it: Marchiatura
    de: Inferno
    es: Infierno
    ko: 연옥
  descriptions:
    jp_kana: "はげしい　ほのおで\nあいてを　つつみこみ　こうげきする。\nやけど　じょうたいに　する。"
    jp_kanji: "激しい　炎で\n相手を　包みこみ　攻撃する。\nやけど状態に　する。"
    en: "The user attacks by engulfing the target\nin an intense fire. It leaves the target\nwith a burn."
    fr: "L’ennemi est entouré d’un torrent de\nflammes ardentes qui le brûlent."
    it: "Il bersaglio viene avvolto da intense\nfiammate che causano scottature."
    de: "Anwender greift das Ziel an, indem\ner es mit dichten Flammen umhüllt.\nZiel erleidet Verbrennungen."
    es: "Ataca con una gran ráfaga de fuego\nque causa quemaduras."
    ko: "격렬한 불꽃으로\n상대를 둘러싸 공격한다.\n화상 상태로 만든다."
ingrain:
  names:
    jp_kana: ねをはる
    jp_kanji: ねをはる
    en: Ingrain
    fr: Racines
    it: Radicamento
    de: Verwurzler
    es: Arraigo
    ko: 뿌리박기
  descriptions:
    jp_kana: "だいちに　ねを　はり　まいターン\nじぶんの　ＨＰを　かいふく　する。\nねを　はっているので　いれかえられない。"
    jp_kanji: "大地に　根を　張り\n毎ターン　自分の　ＨＰを　回復する。\n根を　張っているので　入れ替えられない。"
    en: "The user lays roots that restore\nits HP on every turn. Because it is\nrooted, it can’t switch out."
    fr: "Le lanceur plante ses racines et récupère\ndes PV à chaque tour. Une fois enraciné, il\nne peut plus fuir."
    it: "Chi la usa mette delle radici che gli fanno\nrecuperare PS ad ogni turno. Non può\nessere sostituito."
    de: "Verwurzelung füllt jede Runde KP auf.\nAustausch ist unmöglich."
    es: "Echa raíces para recuperar PS en cada\nturno, pero impide el relevo."
    ko: "대지에 뿌리를 박아\n매 턴마다 자신의 HP를 회복한다.\n뿌리 박고 있으므로 교체할 수 없다."
iron_defense:
  names:
    jp_kana: てっぺき
    jp_kanji: てっぺき
    en: Iron Defense
    fr: Mur de Fer
    it: Ferroscudo
    de: Eisenabwehr
    es: Def. Férrea
    ko: 철벽
  descriptions:
    jp_kana: "ひふを　てつのように\nかたくする　ことで\nじぶんの　ぼうぎょを　ぐーんと　あげる。"
    jp_kanji: "皮膚を　鉄のように\n硬くする　ことで\n自分の　防御を　ぐーんと　あげる。"
    en: "The user hardens its body’s surface\nlike iron, sharply raising its\nDefense stat."
    fr: "L’épiderme du lanceur devient dur comme\ndu fer, ce qui augmente considérablement\nsa Défense."
    it: "Il corpo di chi la usa si indurisce come\nil ferro, facendone salire di molto la\nDifesa."
    de: "Anwender stärkt den Körper, um den\nVerteidigungs-Wert stark zu erhöhen."
    es: "Fortalece el cuerpo como si fuera\nhierro y sube mucho la Defensa."
    ko: "피부를 쇠처럼\n단단하게 함으로써\n자신의 방어를 크게 올린다."
iron_head:
  names:
    jp_kana: アイアンヘッド
    jp_kanji: アイアンヘッド
    en: Iron Head
    fr: Tête de Fer
    it: Metaltestata
    de: Eisenschädel
    es: Cabezahierro
    ko: 아이언헤드
  descriptions:
    jp_kana: "はがねの　ような\nかたい　あたまで　こうげきする。\nあいてを　ひるませる　ことが　ある。"
    jp_kanji: "鋼の　ような\n硬い　頭で　攻撃する。\n相手を　ひるませることが　ある。"
    en: "The user slams the target\nwith its steel-hard head.\nIt may also make the target flinch."
    fr: "Le lanceur heurte l’ennemi avec sa tête\ndure comme de l’acier. Peut aussi\napeurer l’ennemi."
    it: "Chi la usa colpisce il nemico con la sua\ntesta dura come l’acciaio. Può anche\nfarlo tentennare."
    de: "Ziel wird durch stahlharten Kopf des\nAnwenders getroffen und schreckt\neventuell zurück."
    es: "Ataca con su dura cabeza de hierro.\nPuede hacer que el objetivo retroceda."
    ko: "강철과 같은\n단단한 머리로 공격한다.\n상대를 풀죽게 만들 때가 있다."
iron_tail:
  names:
    jp_kana: アイアンテール
    jp_kanji: アイアンテール
    en: Iron Tail
    fr: Queue de Fer
    it: Codacciaio
    de: Eisenschweif
    es: Cola Férrea
    ko: 아이언테일
  descriptions:
    jp_kana: "かたい　しっぽで　あいてを　たたきつけて\nこうげきする。あいての　ぼうぎょを\nさげることが　ある。"
    jp_kanji: "硬い　しっぽで\n相手を　たたきつけて　攻撃する。\n相手の　防御を　さげることが　ある。"
    en: "The target is slammed with a steel-hard\ntail. It may also lower the target’s\nDefense stat."
    fr: "Attaque l’ennemi avec une queue de fer.\nPeut aussi baisser la Défense de l’ennemi."
    it: "Il nemico viene colpito da una robusta\ncoda d’acciaio. Può anche ridurne\nla Difesa."
    de: "Attacke mit hartem Eisenschweif.\nSenkt eventuell den Verteidigungs-Wert\ndes Zieles."
    es: "Ataca con una cola férrea y puede bajar\nla Defensa del objetivo."
    ko: "단단한 꼬리로\n상대를 힘껏 쳐서 공격한다.\n상대의 방어를 떨어뜨릴 때가 있다."
judgment:
  names:
    jp_kana: さばきのつぶて
    jp_kanji: さばきのつぶて
    en: Judgment
    fr: Jugement
    it: Giudizio
    de: Urteilskraft
    es: Sentencia
    ko: 심판의뭉치
  descriptions:
    jp_kana: "むすうの　こうだんを　あいてに\nほうしゅつする。じぶんの　もつ　\nプレートに　より　タイプが　かわる。"
    jp_kanji: "無数の　光弾を　相手に　放出する。\n自分の　持つ　プレートに　より　\nタイプが　変わる。"
    en: "The user releases countless shots of\nlight at the target. Its type varies with\nthe kind of Plate the user is holding."
    fr: "Le lanceur libère une myriade de rayons de\nlumière. Le type varie selon la Plaque\nque tient le lanceur."
    it: "Chi la usa rilascia numerosi colpi di luce.\nIl tipo varia a seconda della Lastra\ntenuta."
    de: "Anwender feuert unzählige Lichtstrahlen\nab. Deren Typ hängt von der gehaltenen\nTafel ab."
    es: "Emite incontables haces de luz.\nVaría según el tipo de Tabla\nque lleve el usuario."
    ko: "무수한 광탄을 상대에게 방출한다.\n자신이 가지고 있는 플레이트에 따라\n타입이 바뀐다."
jump_kick:
  names:
    jp_kana: とびげり
    jp_kanji: とびげり
    en: Jump Kick
    fr: Pied Sauté
    it: Calciosalto
    de: Sprungkick
    es: Patada Salto
    ko: 점프킥
  descriptions:
    jp_kana: "たかい　ジャンプからの　キックで\nあいてを　こうげきする。\nはずすと　じぶんが　ダメージを　うける。"
    jp_kanji: "高い　ジャンプからの　キックで\n相手を　攻撃する。\nはずすと　自分が　ダメージを　受ける。"
    en: "The user jumps up high, then strikes\nwith a kick. If the kick misses, the\nuser hurts itself."
    fr: "Le lanceur s’envole pour décocher\nun coup de pied sauté. S’il échoue,\nle lanceur se blesse."
    it: "Permette di saltare in alto per attaccare\ncon un calcio. Se non va a buon fine, chi\nla usa si ferisce."
    de: "Der Angreifer hüpft hoch und tritt zu.\nBei Misserfolg schadet er sich selbst."
    es: "Da un salto y pega una patada.\nSi falla, se lesiona."
    ko: "높이 점프해서 킥으로\n상대를 공격한다.\n빗나가면 자신이 데미지를 입는다."
karate_chop:
  names:
    jp_kana: からてチョップ
    jp_kanji: からてチョップ
    en: Karate Chop
    fr: Poing-Karaté
    it: Colpokarate
    de: Karateschlag
    es: Golpe Karate
    ko: 태권당수
  descriptions:
    jp_kana: "するどい　チョップで\nあいてを　たたいて　こうげきする。　\nきゅうしょに　あたりやすい。"
    jp_kanji: "鋭い　チョップで\n相手を　たたいて　攻撃する。　\n急所に　当たりやすい。"
    en: "The target is attacked with a sharp chop.\nCritical hits land more easily."
    fr: "L’ennemi est tranché violemment.\nTaux de critiques élevé."
    it: "Colpisce il nemico con un colpo netto.\nProbabile brutto colpo."
    de: "Gute Möglichkeit, einen Volltreffer\nzu landen."
    es: "Da un golpe cortante.\nSuele ser crítico."
    ko: "날카로운 당수로\n상대를 때려서 공격한다.\n급소에 맞기 쉽다."
kinesis:
  names:
    jp_kana: スプーンまげ
    jp_kanji: スプーンまげ
    en: Kinesis
    fr: Télékinésie
    it: Cinèsi
    de: Psykraft
    es: Kinético
    ko: 숟가락휘기
  descriptions:
    jp_kana: "スプーンを　まげて　ちゅういを　ひき\nあいての　めいちゅうりつを　さげる。"
    jp_kanji: "スプーンを　まげて　注意を　ひき\n相手の　命中率を　さげる。"
    en: "The user distracts the target\nby bending a spoon.\nIt lowers the target’s accuracy."
    fr: "Le lanceur distrait l’ennemi en pliant\nune cuillère. Peut baisser la Précision\nde l’ennemi."
    it: "Chi la usa distrae il bersaglio piegando\nun cucchiaio e ne riduce la precisione."
    de: "Lenkt Ziel durch Verbiegen\neines Löffels ab. Senkt\ndessen Genauigkeit."
    es: "Dobla una cuchara para distraer\nal objetivo y bajar su nivel de Precisión."
    ko: "숟가락을 휘어서 주의를 끌어\n상대의 명중률을 낮춘다."
knock_off:
  names:
    jp_kana: はたきおとす
    jp_kanji: はたきおとす
    en: Knock Off
    fr: Sabotage
    it: Privazione
    de: Abschlag
    es: Desarme
    ko: 탁쳐서떨구기
  descriptions:
    jp_kana: "あいての　もちものを　はたき　おとして\nせんとうが　おわるまで\nつかえなく　する。"
    jp_kanji: "相手の　持ち物を　はたき　落として\n戦闘が　終わるまで\n使えなくする。"
    en: "The user slaps down the target’s\nheld item, preventing that item\nfrom being used in the battle."
    fr: "Le lanceur fait tomber l’objet tenu\npar l’ennemi pour le rendre inutilisable\ndurant le combat."
    it: "Attacco che blocca anche lo strumento\ntenuto dal nemico, impedendone l’uso\nnella lotta."
    de: "Schlägt das Item des Zieles weg\nund vereitelt so dessen Gebrauch\nwährend des Kampfes."
    es: "Impide al objetivo usar el objeto que lleva\ndurante el combate."
    ko: "상대의 지닌 물건을 탁 쳐서 떨어뜨려\n배틀이 끝날 때까지\n사용할 수 없게 한다."
last_resort:
  names:
    jp_kana: とっておき
    jp_kanji: とっておき
    en: Last Resort
    fr: Dernierecour
    it: Ultimascelta
    de: Zuflucht
    es: Última Baza
    ko: 뒀다쓰기
  descriptions:
    jp_kana: "せんとうちゅうに　おぼえている　わざを\nすべて　つかうと　はじめて　だせる\nとっておきの　わざ。"
    jp_kanji: "戦闘中に　おぼえている　技を\nすべて　使うと　はじめて　だせる\nとっておきの　技。"
    en: "This move can be used only after the user\nhas used all the other moves it knows\nin the battle."
    fr: "Cette capacité ne peut être utilisée\nqu’après que le lanceur a utilisé\ntoutes les autres."
    it: "Per usare questa mossa, bisogna prima\navvalersi in lotta di tutte le altre mosse\nconosciute."
    de: "Diese Attacke kann nur eingesetzt\nwerden, nachdem alle verfügbaren\nAttacken ausgeführt wurden."
    es: "Este movimiento solo puede usarse\ntras haber agotado todos los demás\nconocidos por el Pokémon."
    ko: "배틀 중에 기억하고 있는 기술을\n모두 사용하면 그때부터 쓸 수 있는\n필살기이다."
lava_plume:
  names:
    jp_kana: ふんえん
    jp_kanji: ふんえん
    en: Lava Plume
    fr: Ébullilave
    it: Lavasbuffo
    de: Flammensturm
    es: Humareda
    ko: 분연
  descriptions:
    jp_kana: "まっかな　ほのおで　じぶんの\nまわりに　いるものを　こうげきする。\nやけど　じょうたいに　することが　ある。"
    jp_kanji: "真っ赤な　炎で　自分の\n周りに　いるものを　攻撃する。\nやけど状態に　することが　ある。"
    en: "An inferno of scarlet flames torches\neverything around the user. It may\nleave targets with a burn."
    fr: "Des boules de feu s’abattent sur tous\nles Pokémon autour du lanceur.\nPeut aussi brûler."
    it: "Chi la usa lancia fiamme scarlatte sugli\naltri Pokémon in campo. Può anche\nscottare."
    de: "Ein Flammeninferno, das über\nden Bereich um den Anwender\nhinwegfegt. Verbrennt eventuell."
    es: "Un infierno de llamas daña a los Pokémon\nadyacentes en combate. Puede quemar."
    ko: "새빨간 불꽃으로 자신의\n주위에 있는 포켓몬을 공격한다.\n화상 상태로 만들 때가 있다."
leaf_blade:
  names:
    jp_kana: リーフブレード
    jp_kanji: リーフブレード
    en: Leaf Blade
    fr: Lame-Feuille
    it: Fendifoglia
    de: Laubklinge
    es: Hoja Aguda
    ko: 리프블레이드
  descriptions:
    jp_kana: "はっぱを　つるぎのように　あやつり\nあいてを　きりつけて　こうげきする。\nきゅうしょに　あたりやすい。"
    jp_kanji: "はっぱを　剣のように　あやつり\n相手を　切りつけて　攻撃する。\n急所に　当たりやすい。"
    en: "The user handles a sharp leaf like a\nsword and attacks by cutting its target.\nCritical hits land more easily."
    fr: "Une feuille coupante comme une lame\nentaille l’ennemi. Taux de critiques élevé."
    it: "Colpisce il nemico usando una foglia\naffilata come una spada. Probabile\nbrutto colpo."
    de: "Hieb mit scharfkantigem\nBlatt. Hohe Volltrefferquote."
    es: "Acuchilla con una hoja fina.\nSuele dar un golpe crítico."
    ko: "잎사귀를 칼처럼 이용해\n상대를 베어 공격한다.\n급소에 맞기 쉽다."
leaf_storm:
  names:
    jp_kana: リーフストーム
    jp_kanji: リーフストーム
    en: Leaf Storm
    fr: Tempêteverte
    it: Verdebufera
    de: Blättersturm
    es: Lluevehojas
    ko: 리프스톰
  descriptions:
    jp_kana: "とがった　はっぱで　あいてに　あらしを\nおこす。つかうと　はんどうで\nじぶんの　とくこうが　がくっと　さがる。"
    jp_kanji: "とがった　はっぱで　相手に　あらしを\nおこす。使うと　反動で\n自分の　特攻が　がくっと　さがる。"
    en: "The user whips up a storm of leaves around\nthe target. The attack’s recoil harshly\nreduces the user’s Sp. Atk stat."
    fr: "Invoque une tempête de feuilles acérées.\nLe contrecoup réduit fortement l’Attaque\nSpéciale du lanceur."
    it: "Si forma una tempesta di foglie affilate.\nIl contraccolpo riduce di molto l’Attacco\nSpeciale di chi la usa."
    de: "Anwender erzeugt einen Sturm von\nscharfen Blättern. Rückstoß senkt\nSpezial-Angriff des Anwenders stark."
    es: "Cae una lluvia de hojas afiladas.\nBaja mucho el Ataque Especial\nde quien lo usa."
    ko: "뾰족한 잎사귀로 상대에게 바람을\n일으킨다. 사용하면 반동으로\n자신의 특수공격이 크게 떨어진다."
leaf_tornado:
  names:
    jp_kana: グラスミキサー
    jp_kanji: グラスミキサー
    en: Leaf Tornado
    fr: Phytomixeur
    it: Vorticerba
    de: Grasmixer
    es: Ciclón Hojas
    ko: 그래스믹서
  descriptions:
    jp_kana: "するどい　はっぱで　あいてを\nつつみこんで　こうげきする。\nめいちゅうりつを　さげることが　ある。"
    jp_kanji: "鋭い　はっぱで　相手を\n包みこんで　攻撃する。\n命中率を　さげることが　ある。"
    en: "The user attacks its target by\nencircling it in sharp leaves. This attack\nmay also lower the target’s accuracy."
    fr: "L’ennemi est pris dans un tourbillon de\nfeuilles acérées. Peut aussi baisser\nla Précision de l’ennemi."
    it: "Chi la usa avvolge e attacca il bersaglio\ncon foglie affilate che possono anche\nridurne la precisione."
    de: "Anwender greift an, indem er das Ziel\nin scharfes Blattwerk einwickelt. Senkt\neventuell die Genauigkeit."
    es: "Tritura con afiladas hojas y puede bajar\nla Precisión del objetivo."
    ko: "날카로운 잎사귀로 상대를\n둘러싸서 공격한다.\n명중률을 떨어뜨릴 때가 있다."
leech_life:
  names:
    jp_kana: きゅうけつ
    jp_kanji: きゅうけつ
    en: Leech Life
    fr: Vampirisme
    it: Sanguisuga
    de: Blutsauger
    es: Chupavidas
    ko: 흡혈
  descriptions:
    jp_kana: "ちを　すいとって　あいてを\nこうげきする。　あたえた　ダメージの\nはんぶんの　ＨＰを　かいふく　できる。"
    jp_kanji: "血を　吸い取って　相手を\n攻撃する。与えた　ダメージの\n半分の　ＨＰを　回復できる。"
    en: "The user drains the target’s blood.\nThe user’s HP is restored by half the\ndamage taken by the target."
    fr: "Une attaque qui aspire le sang de l’ennemi.\nLa moitié des dégâts sont convertis en\nPV pour le lanceur."
    it: "Mossa succhiasangue. Chi la usa recupera\nuna quantità di PS pari alla metà del danno\ninferto."
    de: "Die Hälfte des zugefügten Schadens\nwird dem Anwender gutgeschrieben."
    es: "Restaura al usuario la mitad del daño\ncausado al objetivo."
    ko: "피를 빨아서 상대를\n공격한다. 준 데미지의\n절반을 HP로 회복한다."
leech_seed:
  names:
    jp_kana: やどりぎのタネ
    jp_kanji: やどりぎのタネ
    en: Leech Seed
    fr: Vampigraine
    it: Parassiseme
    de: Egelsamen
    es: Drenadoras
    ko: 씨뿌리기
  descriptions:
    jp_kana: "うえつけた　あいての　ＨＰを\nまいターン　すこしだけ　すいとり\nじぶんの　ＨＰを　かいふく　する。"
    jp_kanji: "植えつけた　相手の　ＨＰを\n毎ターン　少しだけ　吸い取り\n自分の　ＨＰを　回復する。"
    en: "A seed is planted on the target. It steals\nsome HP from the target every turn."
    fr: "Une graine est semée sur l’ennemi.\nÀ chaque tour, elle lui dérobe des PV\nque le lanceur récupère."
    it: "Vengono piantati semi sul bersaglio. Questi\nsottraggono PS a ogni turno permettendo\na chi la usa di curarsi."
    de: "Ziel wird bepflanzt und verliert jede\nRunde KP, die ein Pokémon aus dem\nTeam des Anwenders heilen."
    es: "Planta semillas que absorben PS\npara recuperar la salud del usuario\nen cada turno."
    ko: "씨가 뿌려진 상대의 HP를\n매 턴 조금씩 흡수하여\n자신의 HP를 회복한다."
leer:
  names:
    jp_kana: にらみつける
    jp_kanji: にらみつける
    en: Leer
    fr: Groz’Yeux
    it: Fulmisguardo
    de: Silberblick
    es: Malicioso
    ko: 째려보기
  descriptions:
    jp_kana: "するどい　めつきで　おびえさせて\nあいての　ぼうぎょを　さげる。"
    jp_kanji: "鋭い　目つきで　おびえさせて\n相手の　防御を　さげる。"
    en: "The opposing team gains an intimidating\nleer with sharp eyes. The opposing team’s\nDefense stats are reduced."
    fr: "Le lanceur fait les gros yeux à l’ennemi\npour l’intimider et baisser sa Défense."
    it: "Terrorizza i nemici con uno sguardo\nfulminante e intimidatorio riducendone\nla Difesa."
    de: "Gegnerischer Verteidigungs-Wert wird\ndurch angsteinflößenden Blick gesenkt."
    es: "Intimida al objetivo para bajar\nsu Defensa."
    ko: "날카로운 눈초리로 겁을 주어\n상대의 방어를 떨어뜨린다."
lick:
  names:
    jp_kana: したでなめる
    jp_kanji: したでなめる
    en: Lick
    fr: Léchouille
    it: Leccata
    de: Schlecker
    es: Lengüetazo
    ko: 핥기
  descriptions:
    jp_kana: "ながい　したで\nあいてを　なめまわして　こうげきする。\nまひ　じょうたいに　することが　ある。"
    jp_kanji: "長い　舌で\n相手を　なめまわして　攻撃する。\nまひ状態に　することが　ある。"
    en: "The target is licked with a long tongue,\ncausing damage. It may also leave\nthe target with paralysis."
    fr: "Un grand coup de langue qui inflige des\ndégâts à l’ennemi. Peut aussi le paralyser."
    it: "Una lingua lunga infligge danni al nemico e\npuò anche paralizzarlo."
    de: "Leck-Attacke mit langer Zunge.\nDas Ziel wird eventuell\nparalysiert."
    es: "Una lengua ataca al objetivo.\nPuede causar parálisis."
    ko: "긴 혀로\n상대를 핥아서 공격한다.\n마비 상태로 만들 때가 있다."
light_screen:
  names:
    jp_kana: ひかりのかべ
    jp_kanji: ひかりのかべ
    en: Light Screen
    fr: Mur Lumière
    it: Schermoluce
    de: Lichtschild
    es: Pantalla Luz
    ko: 빛의장막
  descriptions:
    jp_kana: "５ターンの　あいだ　ふしぎな　かべで\nあいてから　うける　とくしゅ　こうげきの\nダメージを　よわめる。"
    jp_kanji: "５ターンの　あいだ　不思議な　かべで\n相手から　受ける　特殊攻撃の\nダメージを　弱める。"
    en: "A wondrous wall of light is put up to\nsuppress damage from special attacks\nfor five turns."
    fr: "Un fabuleux mur de lumière qui réduit les\ndégâts causés par les attaques spéciales\ndurant 5 tours."
    it: "Innalza una barriera di luce fantastica\nper ridurre i danni degli attacchi\nspeciali alla squadra per cinque turni."
    de: "Erzeugt eine Lichtwand und senkt Schaden\ndurch Spezial-Angriffe für fünf Runden."
    es: "Pared de luz que reduce durante\ncinco turnos el daño producido\npor los ataques especiales."
    ko: "5턴 동안 이상한 장막으로\n상대로부터 받는 특수공격의\n데미지를 약하게 한다."
lock_on:
  names:
    jp_kana: ロックオン
    jp_kanji: ロックオン
    en: Lock-On
    fr: Verrouillage
    it: Localizza
    de: Zielschuss
    es: Fijar Blanco
    ko: 록온
  descriptions:
    jp_kana: "しょうじゅんを　しっかり　あわせて\nつぎの　こうげきが　かならず　\nあいてに　あたるように　する。"
    jp_kanji: "照準を　しっかり　あわせて\n次の　攻撃が　必ず　\n相手に　当たるように　する。"
    en: "The user takes sure aim at the target.\nIt ensures the next attack does not fail\nto hit the target."
    fr: "Verrouille l’ennemi pour ne\npas le rater au tour suivant."
    it: "Chi la usa punta il nemico con precisione.\nLa mossa successiva andrà a segno."
    de: "Visiert das Ziel an und trifft in der\nnächsten Runde garantiert."
    es: "Fija el blanco para que el siguiente\nataque no falle."
    ko: "조준을 잘 맞춰\n다음 공격이 반드시\n상대에게 명중하도록 한다."
lovely_kiss:
  names:
    jp_kana: あくまのキッス
    jp_kanji: あくまのキッス
    en: Lovely Kiss
    fr: Grobisou
    it: Demonbacio
    de: Todeskuss
    es: Beso Amoroso
    ko: 악마의키스
  descriptions:
    jp_kana: "おそろしい　かおで　キスを　せまる。\nあいてを　ねむり　じょうたいに　する。"
    jp_kanji: "恐ろしい　顔で　キスを　せまる。\n相手を　眠り状態に　する。"
    en: "With a scary face, the user tries to\nforce a kiss on the target. If it\nsucceeds, the target falls asleep."
    fr: "Le lanceur fait un bisou à l’ennemi\nen prenant une mine effrayante.\nEndort l’ennemi."
    it: "Chi la usa intimidisce il nemico con\nuna faccia paurosa e gli schiocca\nun bacio che lo fa addormentare."
    de: "Anwender zwingt dem Ziel einen\nKuss auf, der Schlaf verursacht."
    es: "Con una cara que asusta, da un beso\nal objetivo y lo adormece."
    ko: "무서운 얼굴로 키스한다.\n상대를 잠듦 상태로 만든다."
low_kick:
  names:
    jp_kana: けたぐり
    jp_kanji: けたぐり
    en: Low Kick
    fr: Balayage
    it: Colpo Basso
    de: Fußkick
    es: Patada Baja
    ko: 안다리걸기
  descriptions:
    jp_kana: "あしを　つよく　けり　あいてを\nころばせて　こうげきする。あいてが\nおもいほど　いりょくが　あがる。"
    jp_kanji: "足を　強く　けり\n相手を　転ばせて　攻撃する。\n相手が　重いほど　威力が　あがる。"
    en: "A powerful low kick that makes the target\nfall over. It inflicts greater damage on\nheavier targets."
    fr: "Un puissant coup de pied bas qui fauche\nl’ennemi. Il est plus efficace contre\nles ennemis lourds."
    it: "Un calcio basso e potente che fa cadere\nil nemico. Danneggia maggiormente i nemici\npiù pesanti."
    de: "Tritt, der das Ziel umwirft. Je schwerer\ndas Ziel ist, desto mehr Schaden fügt\nihm die Attacke zu."
    es: "Patada baja. Cuanto más pesa\nel objetivo, más daño causa."
    ko: "발을 강하게 걸고\n상대를 넘어뜨려 공격한다.\n상대가 무거울수록 위력이 올라간다."
low_sweep:
  names:
    jp_kana: ローキック
    jp_kanji: ローキック
    en: Low Sweep
    fr: Balayette
    it: Calciobasso
    de: Fußtritt
    es: Puntapié
    ko: 로킥
  descriptions:
    jp_kana: "すばやい　うごきで　あいての　あしを\nねらって　こうげきする。\nあいての　すばやさを　さげる。"
    jp_kanji: "素早い　動きで　相手の　足を\nねらって　攻撃する。\n相手の　素早さを　さげる。"
    en: "The user attacks the target’s legs\nswiftly, reducing the target’s\nSpeed stat."
    fr: "Un coup rapide qui vise les pieds\nde l’ennemi et diminue sa Vitesse."
    it: "Chi la usa colpisce con un attacco fulmineo\nla parte inferiore del corpo del bersaglio,\nriducendone la Velocità."
    de: "Anwender greift mit blitzschnellen\nBewegungen die Beine des Zieles\nan und senkt dessen Initiative."
    es: "Un veloz ataque a los pies que\nreduce la Velocidad del objetivo."
    ko: "재빠른 움직임으로 상대의 다리를\n노려 공격한다.\n상대의 스피드를 떨어뜨린다."
lucky_chant:
  names:
    jp_kana: おまじない
    jp_kanji: おまじない
    en: Lucky Chant
    fr: Air Veinard
    it: Fortuncanto
    de: Beschwörung
    es: Conjuro
    ko: 주술
  descriptions:
    jp_kana: "てんに　むかって　おいのりを　ささげ\nあいての　こうげきを\nきゅうしょに　あたらなく　する。"
    jp_kanji: "天に　むかって　おいのりを　ささげ\n相手の　攻撃を\n急所に　当たらなくする。"
    en: "The user chants an incantation toward\nthe sky, preventing opposing Pokémon\nfrom landing critical hits."
    fr: "Le lanceur envoie une incantation vers le\nciel pour empêcher l’ennemi d’effectuer\ndes coups critiques."
    it: "Chi la usa rivolge un incantesimo al cielo,\nimpedendo al nemico di sferrare brutti\ncolpi alla squadra."
    de: "Anwender singt eine Beschwörungsformel,\ndie Volltreffer gegen ihn verhindert."
    es: "Lanza al cielo un conjuro que impide\nal objetivo asestar golpes críticos."
    ko: "하늘을 향해 기도를 올려\n상대의 공격을\n급소에 맞지 않게 한다."
lunar_dance:
  names:
    jp_kana: みかづきのまい
    jp_kanji: みかづきのまい
    en: Lunar Dance
    fr: Danse-Lune
    it: Lunardanza
    de: Lunartanz
    es: Danza Lunar
    ko: 초승달춤
  descriptions:
    jp_kana: "じぶんは　ひんしに　なるが\nひかえから　でてくる　ポケモンの\nすべての　じょうたいを　かいふく　する。"
    jp_kanji: "自分は　ひんしに　なるが\n控えから　でてくる　ポケモンの\nすべての　状態を　回復する。"
    en: "The user faints. In return, the Pokémon\ntaking its place will have its status and\nHP fully restored."
    fr: "Le lanceur tombe K.O. pour soigner le\nstatut et les PV du Pokémon qui prendra\nsa place au combat."
    it: "Chi la usa va KO. Il Pokémon che lo\nsostituisce risolve i propri problemi\ndi stato e recupera PS e PP."
    de: "Anwender geht K.O. Das an seine Stelle\ntretende Pokémon hat dafür volle KP/AP.\nStatusprobleme werden geheilt."
    es: "El usuario se debilita, pero el Pokémon\nque lo sustituye recupera su estado,\nlos PS y los PP."
    ko: "자신은 기절하지만\n교대하여 나오는 포켓몬의\n모든 상태를 회복한다."
luster_purge:
  names:
    jp_kana: ラスターパージ
    jp_kanji: ラスターパージ
    en: Luster Purge
    fr: Lumi-Éclat
    it: Abbagliante
    de: Scheinwerfer
    es: Resplandor
    ko: 라스트버지
  descriptions:
    jp_kana: "まばゆい　ひかりを　かいほうして　\nこうげきする。あいての　とくぼうを\nさげることが　ある。"
    jp_kanji: "まばゆい　光を\n解放して　攻撃する。\n相手の　特防を　さげることが　ある。"
    en: "The user lets loose a damaging burst\nof light. It may also reduce the target’s\nSp. Def stat."
    fr: "Le lanceur libère un éclair lumineux.\nPeut aussi baisser la Défense\nSpéciale de l’ennemi."
    it: "Chi la usa scatena un’esplosione\nabbagliante che può anche ridurre\nla Difesa Speciale del Pokémon colpito."
    de: "Angriff mit grellem Licht, der die\nSpezial-Verteidigung des Zieles\neventuell senkt."
    es: "Fogonazo de luz que puede bajar\nla Defensa Especial del objetivo."
    ko: "눈부신 빛을 개방하여\n공격한다. 상대의 특수방어를\n떨어뜨릴 때가 있다."
mach_punch:
  names:
    jp_kana: マッハパンチ
    jp_kanji: マッハパンチ
    en: Mach Punch
    fr: Mach Punch
    it: Pugnorapido
    de: Tempohieb
    es: Ultrapuño
    ko: 마하펀치
  descriptions:
    jp_kana: "めにも　とまらぬ　ものすごい　はやさで\nパンチを　くりだす。\nかならず　せんせい　こうげき　できる。"
    jp_kanji: "目にも　留まらぬ　ものすごい　速さで\nパンチを　くりだす。\n必ず　先制攻撃　できる。"
    en: "The user throws a punch at blinding\nspeed. It is certain to strike first."
    fr: "Coup de poing fulgurant.\nFrappe en premier."
    it: "Chi la usa tira un pugno a velocità\nimpressionante e colpisce di sicuro\nper primo."
    de: "Extrem schneller Hieb, der stets\nzuerst trifft."
    es: "Puñetazo que se da rápido para golpear\nprimero."
    ko: "눈에 보이지 않는 굉장한 속도로\n펀치를 날린다.\n반드시 선제공격을 할 수 있다."
magic_coat:
  names:
    jp_kana: マジックコート
    jp_kanji: マジックコート
    en: Magic Coat
    fr: Reflet Magik
    it: Magivelo
    de: Magiemantel
    es: Capa Mágica
    ko: 매직코트
  descriptions:
    jp_kana: "じょうたい　いじょうに　なる　ワザや\nやどりぎのタネ　などを\nだされたとき　あいてに　はねかえす。"
    jp_kanji: "状態異常に　なる　技や\nやどりぎのタネ　などを\nだされたとき　相手に　跳ね返す。"
    en: "A barrier reflects back to the target\nmoves like Leech Seed and moves\nthat damage status."
    fr: "Une barrière qui renvoie les capacités\ncomme Vampigraine et celles affectant\nle statut et les stats."
    it: "Una barriera rimanda al mittente l’effetto\ndi mosse come Parassiseme e di mosse\nche influenzano lo stato."
    de: "Egelsamen und alle Attacken mit Status\nverändernden Effekten prallen ab."
    es: "Barrera capaz de devolver al agresor\nmovimientos como Drenadoras y otros que\nalteran el estado o las características."
    ko: "상대가 상태 이상이 되는 기술이나\n씨뿌리기 등을 썼을 때 되받아친다."
magic_room:
  names:
    jp_kana: マジックルーム
    jp_kanji: マジックルーム
    en: Magic Room
    fr: Zone Magique
    it: Magicozona
    de: Magieraum
    es: Zona Mágica
    ko: 매직룸
  descriptions:
    jp_kana: "まかふしぎな　くうかんを　つくる。\n５ターンのあいだ　すべてのポケモンの\nどうぐの　こうかが　なくなる。"
    jp_kanji: "まか不思議な　空間を　つくる。\n５ターンのあいだ　すべてのポケモンの\n道具の　効果が　なくなる。"
    en: "The user creates a bizarre area\nin which Pokémon’s held items\nlose their effects for five turns."
    fr: "Le lanceur crée une zone étrange. Pendant\n5 tours, les objets tenus par tous les\nPokémon n’ont plus aucun effet."
    it: "Chi la usa crea una dimensione in cui\nl’effetto degli strumenti tenuti da tutti\ni Pokémon è annullato per cinque turni."
    de: "Anwender erzeugt einen bizarren Raum, in\ndem über fünf Runden die Wirkung aller von\nPokémon getragenen Items aufgehoben ist."
    es: "Crea un espacio misterioso que inutiliza\ntodos los objetos de los Pokémon\ndurante cinco turnos."
    ko: "이상한 공간을 만든다.\n5턴 동안 모든 포켓몬의\n도구의 효과가 사라진다."
magical_leaf:
  names:
    jp_kana: マジカルリーフ
    jp_kanji: マジカルリーフ
    en: Magical Leaf
    fr: Feuillemagik
    it: Fogliamagica
    de: Zauberblatt
    es: Hoja Mágica
    ko: 메지컬리프
  descriptions:
    jp_kana: "あいてを　ついせきする\nふしぎな　はっぱを まきちらす。\nこうげきは　かならず　めいちゅう　する。"
    jp_kanji: "相手を　追跡する\n不思議な　はっぱを まきちらす。\n攻撃は　必ず　命中する。"
    en: "The user scatters curious leaves\nthat chase the target.\nThis attack will not miss."
    fr: "Le lanceur disperse d’étranges feuilles\nqui poursuivent l’ennemi. N’échoue jamais."
    it: "Chi la usa sparpaglia strane foglie che\ninseguono il nemico. Attacco infallibile."
    de: "Magischer Blattangriff, dem nicht\nauszuweichen ist."
    es: "Esparce extrañas hojas que persiguen\nal objetivo. No se puede esquivar."
    ko: "상대를 추적하는\n이상한 잎사귀를 흩뿌린다.\n공격은 반드시 명중한다."
magma_storm:
  names:
    jp_kana: マグマストーム
    jp_kanji: マグマストーム
    en: Magma Storm
    fr: Vortex Magma
    it: Magmaclisma
    de: Lavasturm
    es: Lluvia Ígnea
    ko: 마그마스톰
  descriptions:
    jp_kana: "はげしく　もえたぎる　ほのおの　なかに\n４ー５ターンの　あいだ\nあいてを　とじこめて　こうげきする。"
    jp_kanji: "激しく　燃えたぎる　炎の　なかに\n４ー５ターンの　あいだ\n相手を　閉じこめて　攻撃する。"
    en: "The target becomes trapped\nwithin a maelstrom of fire that rages\nfor four to five turns."
    fr: "L’ennemi est pris dans un tourbillon\nde feu qui dure de 4 à 5 tours."
    it: "Intrappola il nemico in un turbine di fuoco\nche dura per quattro o cinque turni."
    de: "Das Ziel wird in einen Feuersog\ngezogen, der vier bis fünf\nRunden aktiv ist."
    es: "El objetivo queda atrapado en una\ntormenta de fuego que dura de\ncuatro a cinco turnos."
    ko: "세차게 타오르는 불꽃 속에\n4-5턴 동안 상대를\n가두어 공격한다."
magnet_bomb:
  names:
    jp_kana: マグネットボム
    jp_kanji: マグネットボム
    en: Magnet Bomb
    fr: Bombaimant
    it: Bombagnete
    de: Magnetbombe
    es: Bomba Imán
    ko: 마그넷봄
  descriptions:
    jp_kana: "あいてに　すいつく\nはがねの　ばくだんを　はっしゃする。\nこうげきは　かならず　めいちゅう　する。"
    jp_kanji: "相手に　吸いつく\n鋼の　爆弾を　発射する。\n攻撃は　必ず　命中　する。"
    en: "The user launches steel bombs that\nstick to the target.\nThis attack will not miss."
    fr: "Le lanceur projette des bombes d’acier\nqui collent à l’ennemi. N’échoue jamais."
    it: "Chi la usa lancia bombe d’acciaio che si\nattaccano al nemico. Una mossa infallibile."
    de: "Ziel wird durch Haftbomben getroffen.\nDiese Attacke trifft immer."
    es: "Lanza unas bombas de hierro que se pegan\nal adversario. No se puede esquivar."
    ko: "상대에게 달라붙는\n강철의 폭탄을 발사한다.\n공격은 반드시 명중한다."
magnet_rise:
  names:
    jp_kana: でんじふゆう
    jp_kanji: でんじふゆう
    en: Magnet Rise
    fr: Vol Magnétik
    it: Magnetascesa
    de: Magnetflug
    es: Levitón
    ko: 전자부유
  descriptions:
    jp_kana: "でんきで　つくった　じりょくの　ちからで\nちゅうに　うかぶ。\n５ターンの　あいだ　ふゆう　できる。"
    jp_kanji: "電気で　つくった　磁力の　力で\n宙に　浮かぶ。\n５ターンの　あいだ　浮遊できる。"
    en: "The user levitates using electrically\ngenerated magnetism for five turns."
    fr: "Le lanceur utilise l’électricité pour\ngénérer un champ magnétique\net léviter durant 5 tours."
    it: "Chi la usa si solleva in aria per cinque\nturni grazie a un campo elettromagnetico."
    de: "Anwender schwebt für fünf Runden\ndurch elektrisch erzeugten\nMagnetismus."
    es: "Levita gracias a un campo magnético\ngenerado por electricidad durante\ncinco turnos."
    ko: "전기로 만든 자력의 힘으로\n허공에 뜬다.\n5턴 동안 부유할 수 있다."
magnitude:
  names:
    jp_kana: マグニチュード
    jp_kanji: マグニチュード
    en: Magnitude
    fr: Ampleur
    it: Magnitudo
    de: Intensität
    es: Magnitud
    ko: 매그니튜드
  descriptions:
    jp_kana: "じめんを　ゆらして　じぶんの\nまわりに　いるものを　こうげきする。\nわざの　いりょくは　いろいろ　かわる。"
    jp_kanji: "地面を　揺らして　自分の\n周りに　いるものを　攻撃する。\n技の　威力は　いろいろ　変わる。"
    en: "The user looses a ground-shaking quake\naffecting everyone around the user.\nIts power varies."
    fr: "Un tremblement de terre d’intensité\nvariable qui affecte tous les Pokémon\nalentour. L’efficacité varie."
    it: "Chi la usa scatena un terremoto\nd’intensità variabile che danneggia\ngli altri Pokémon in campo."
    de: "Erdbebenartiger Angriff von zufälliger\nStärke gegen andere Pokémon in der\nUmgebung des Anwenders."
    es: "Sacudida sísmica de intensidad\nvariable que afecta a los Pokémon\nadyacentes en combate."
    ko: "땅을 흔들어서 자신의\n주위에 있는 포켓몬을 공격한다.\n기술의 위력이 여러모로 바뀐다."
me_first:
  names:
    jp_kana: さきどり
    jp_kanji: さきどり
    en: Me First
    fr: Moi d’Abord
    it: Precedenza
    de: Egotrip
    es: Yo Primero
    ko: 선취
  descriptions:
    jp_kana: "いりょくを　あげて　あいてが\nだそうとする　わざを　さきにだす。\nさきに　だせないと　しっぱい　する。"
    jp_kanji: "威力を　あげて　相手が\nだそうとする　技を　先にだす。\n先に　だせないと　失敗する。"
    en: "The user tries to cut ahead of the target\nto steal and use the target’s intended\nmove with greater power."
    fr: "Le lanceur vole la capacité prévue par\nl’ennemi et l’utilise en faisant plus de\ndégâts. Il doit frapper en premier."
    it: "Chi la usa precede un nemico più lento, gli\nruba l’attacco e glielo ritorce contro con\npotenza persino maggiore."
    de: "Anwender stiehlt und führt die Attacke\neines langsameren Gegners zuerst\nund mit größerer Kraft aus."
    es: "Se adelanta al movimiento que pretende\nusar el objetivo y lo lanza antes con más\nfuerza. Si el usuario es más lento, falla."
    ko: "위력을 올려 상대가\n쓰려고 하는 기술을 먼저 쓴다.\n먼저 쓰지 않으면 실패한다."
mean_look:
  names:
    jp_kana: くろいまなざし
    jp_kanji: くろいまなざし
    en: Mean Look
    fr: Regard Noir
    it: Malosguardo
    de: Horrorblick
    es: Mal de Ojo
    ko: 검은눈빛
  descriptions:
    jp_kana: "すいこまれる　ような　くろい　まなざしで\nじっと　みつめて　あいてを\nせんとうから　にげられなく　する。"
    jp_kanji: "吸いこまれるような　黒い　まなざしで\nじっと　みつめて　相手を\n戦闘から　逃げられなくする。"
    en: "The user pins the target with a dark,\narresting look.\nThe target becomes unable to flee."
    fr: "Le lanceur pétrifie l’ennemi en lui lançant\nun regard noir. Il devient incapable de\ns’enfuir."
    it: "Chi la usa blocca il nemico con uno sguardo\noscuro e ammaliante, impedendogli la fuga."
    de: "Böser Blick, der die Flucht des\nZieles vereitelt."
    es: "Mal de ojo que impide al objetivo huir\nde la batalla."
    ko: "빨려들어갈 것 같은 까만 눈빛으로\n가만히 응시하여 상대를\n배틀에서 도망갈 수 없게 한다."
meditate:
  names:
    jp_kana: ヨガのポーズ
    jp_kanji: ヨガのポーズ
    en: Meditate
    fr: Yoga
    it: Meditazione
    de: Meditation
    es: Meditación
    ko: 요가포즈
  descriptions:
    jp_kana: "ねむっている　ちからを\nからだの　おくから　ひきだして\nじぶんの　こうげきを　あげる。"
    jp_kanji: "眠っている　力を\n体の　奥から　ひきだして\n自分の　攻撃を　あげる。"
    en: "The user meditates to awaken the power\ndeep within its body and raise its\nAttack stat."
    fr: "Le lanceur médite pour éveiller son\npouvoir latent et augmenter son Attaque."
    it: "Chi la usa medita per risvegliare la propria\nforza interiore e migliorare l’Attacco."
    de: "Anwender aktiviert Kräfte, die tief in\nseinem Inneren schlummern, und\nsteigert so seinen Angriffs-Wert."
    es: "El usuario reposa y medita para potenciar\nel Ataque."
    ko: "잠들어 있는 힘을\n몸속에서 끌어내어\n자신의 공격을 올린다."
mega_drain:
  names:
    jp_kana: メガドレイン
    jp_kanji: メガドレイン
    en: Mega Drain
    fr: Méga-Sangsue
    it: Megassorbim.
    de: Megasauger
    es: Megaagotar
    ko: 메가드레인
  descriptions:
    jp_kana: "ようぶんを　すいとり　こうげきする。\nあいてに　あたえた　ダメージの\nはんぶんの　ＨＰを　かいふくできる。"
    jp_kanji: "養分を　吸い取り　攻撃する。\n相手に　与えた　ダメージの\n半分の　ＨＰを　回復できる。"
    en: "A nutrient-draining attack. The user’s\nHP is restored by half the damage taken\nby the target."
    fr: "Une attaque qui convertit la moitié\ndes dégâts infligés en PV."
    it: "Mossa che assorbe PS. Chi la usa recupera\nuna quantità di PS pari alla metà del danno\ninferto."
    de: "Attacke, die die Hälfte des\nSchadens absorbiert."
    es: "Absorbe la mitad del daño producido\nen el objetivo para restaurar los PS\ndel usuario."
    ko: "양분을 흡수하여 공격한다.\n상대에게 입힌 데미지의\n절반에 해당하는 HP를 회복할 수 있다."
mega_kick:
  names:
    jp_kana: メガトンキック
    jp_kanji: メガトンキック
    en: Mega Kick
    fr: Ultimawashi
    it: Megacalcio
    de: Megakick
    es: Megapatada
    ko: 메가톤킥
  descriptions:
    jp_kana: "ものすごい　ちからを　こめた　キックで\nあいてを　けとばして　こうげきする。"
    jp_kanji: "ものすごい　力を　こめた　キックで\n相手を　けとばして　攻撃する。"
    en: "The target is attacked by a kick launched\nwith muscle-packed power."
    fr: "Un coup de pied superpuissant\net intense qui frappe l’ennemi."
    it: "Colpisce il nemico con un calcio sferrato\ncon la forza di muscoli poderosi."
    de: "Das Ziel wird mit einem extrem\nheftigen Tritt angegriffen."
    es: Patada de extrema fuerza.
    ko: "굉장한 힘을 담은 킥으로\n상대를 걷어차서 공격한다."
mega_punch:
  names:
    jp_kana: メガトンパンチ
    jp_kanji: メガトンパンチ
    en: Mega Punch
    fr: Ultimapoing
    it: Megapugno
    de: Megahieb
    es: Megapuño
    ko: 메가톤펀치
  descriptions:
    jp_kana: "ちからを　こめた　パンチで\nあいてを　こうげきする。"
    jp_kanji: "力を　こめた　パンチで\n相手を　攻撃する。"
    en: "The target is slugged by a punch thrown\nwith muscle-packed power."
    fr: "L’ennemi reçoit un coup de poing\nd’une puissance incroyable."
    it: Colpisce il nemico con un pugno poderoso.
    de: Ein unglaublich kräftiger Hieb.
    es: Un puñetazo de gran potencia.
    ko: "힘을 담은 펀치로\n상대를 공격한다."
megahorn:
  names:
    jp_kana: メガホーン
    jp_kanji: メガホーン
    en: Megahorn
    fr: Mégacorne
    it: Megacorno
    de: Vielender
    es: Megacuerno
    ko: 메가폰
  descriptions:
    jp_kana: "かたくて　りっぱな　つので　おもいっきり\nあいてを　つきさして　こうげきする。"
    jp_kanji: "硬くて　りっぱな　つので　おもいっきり\n相手を　突き刺して　攻撃する。"
    en: "Using its tough and impressive horn,\nthe user rams into the target\nwith no letup."
    fr: "Le lanceur utilise ses gigantesques\ncornes pour charger l’ennemi."
    it: "Chi la usa utilizza il suo robusto e\nimponente corno per colpire il nemico\ncon tutto se stesso."
    de: "Brutaler Ramm-Angriff mit spitzem,\nbeeindruckendem Horn."
    es: "Violenta embestida con cuernos\nimponentes."
    ko: "단단하고 훌륭한 뿔로 마음껏\n상대를 꿰찔러서 공격한다."
memento:
  names:
    jp_kana: おきみやげ
    jp_kanji: おきみやげ
    en: Memento
    fr: Souvenir
    it: Memento
    de: Memento-Mori
    es: Legado
    ko: 추억의선물
  descriptions:
    jp_kana: "じぶんは　ひんしに　なるが　そのかわりに\nあいての　こうげきと　とくこうを\nがくっと　さげる。"
    jp_kanji: "自分は　ひんしに　なるが　そのかわりに\n相手の　攻撃と　特攻を\nがくっと　さげる。"
    en: "The user faints when using this move.\nIn return, it harshly lowers the target’s\nAttack and Sp. Atk."
    fr: "Le lanceur est mis K.O., mais l’Attaque\net l’Attaque Spéciale de l’ennemi baissent\nbeaucoup."
    it: "Chi la usa va KO. Tuttavia, riduce di molto\nl’Attacco e l’Attacco Speciale del nemico."
    de: "Der Anwender wird besiegt und senkt\nden Angriffs-Wert und den Spezial-\nAngriff des Zieles stark."
    es: "El usuario se debilita, pero baja mucho\ntanto el Ataque como el Ataque Especial\ndel objetivo."
    ko: "자신은 기절하게 되지만 그 대신\n상대의 공격과 특수공격을\n크게 떨어뜨린다."
metal_burst:
  names:
    jp_kana: メタルバースト
    jp_kanji: メタルバースト
    en: Metal Burst
    fr: Fulmifer
    it: Metalscoppio
    de: Metallstoß
    es: Repr. Metal
    ko: 메탈버스트
  descriptions:
    jp_kana: "わざを　だすまえに\nさいごに　うけた　わざの　ダメージを\nおおきくして　だした　あいてに　かえす。"
    jp_kanji: "技を　だす前に\n最後に　受けた　技の　ダメージを\n大きくして　だした　相手に　返す。"
    en: "The user retaliates with much greater\npower against the target\nthat last inflicted damage on it."
    fr: "Le lanceur attaque le dernier ennemi\nl’ayant blessé durant le même tour\nen frappant plus fort."
    it: "Chi la usa si vendica sul nemico che l’ha\nappena ferito con una mossa anche più\npotente."
    de: "Attacke mit großer Kraft gegen das\nZiel, das dem Anwender in derselben\nRunde zuletzt Schaden zufügte."
    es: "Devuelve al objetivo el último ataque\nrecibido, pero con mucha más fuerza."
    ko: "기술을 쓰기 전에\n마지막으로 받은 기술의 데미지를\n늘려서 기술을 쓴 상대에게 돌려준다."
metal_claw:
  names:
    jp_kana: メタルクロー
    jp_kanji: メタルクロー
    en: Metal Claw
    fr: Griffe Acier
    it: Ferrartigli
    de: Metallklaue
    es: Garra Metal
    ko: 메탈크로우
  descriptions:
    jp_kana: "こうてつの　ツメで　あいてを　きりさいて\nこうげきする。じぶんの　こうげきが\nあがることが　ある。"
    jp_kanji: "鋼鉄の　ツメで\n相手を　切り裂いて　攻撃する。\n自分の　攻撃が　あがることが　ある。"
    en: "The target is raked with steel claws.\nIt may also raise the user’s Attack stat."
    fr: "Attaque avec des griffes d’acier. Peut\naussi augmenter l’Attaque du lanceur."
    it: "Colpisce il nemico con artigli d’acciaio.\nPuò anche aumentare l’Attacco di chi\nla usa."
    de: "Klauen-Attacke, die eventuell den\nAngriffs-Wert des Anwenders erhöht."
    es: "Ataque con garras de acero que puede\naumentar el Ataque del usuario."
    ko: "강철의 발톱으로\n상대를 베어 갈라 공격한다.\n자신의 공격이 올라갈 때도 있다."
metal_sound:
  names:
    jp_kana: きんぞくおん
    jp_kanji: きんぞくおん
    en: Metal Sound
    fr: Strido-Son
    it: Ferrostrido
    de: Metallsound
    es: Eco Metálico
    ko: 금속음
  descriptions:
    jp_kana: "きんぞくを　こすって　でるような\nいやな　おとを　きかせる。\nあいての　とくぼうを　がくっと　さげる。"
    jp_kanji: "金属を　こすって　でるような\nいやな　音を　聞かせる。\n相手の　特防を　がくっと　さげる。"
    en: "A horrible sound like scraping metal\nharshly reduces the target’s\nSp. Def stat."
    fr: "Un cri horrible tel un crissement\nmétallique qui réduit fortement\nla Défense Spéciale de l’ennemi."
    it: "Orribile stridio, simile a quello prodotto\ndal metallo, che riduce di molto\nla Difesa Speciale del nemico."
    de: "Stößt einen spitzen Schrei aus, der\ndie Spezial-Verteidigung des Zieles\nstark senkt."
    es: "Horrible chirrido metálico que baja mucho\nla Defensa Especial del objetivo."
    ko: "금속을 긁을 때 나는 듯한\n싫은 소리를 들려준다.\n상대의 특수방어를 크게 떨어뜨린다."
meteor_mash:
  names:
    jp_kana: コメットパンチ
    jp_kanji: コメットパンチ
    en: Meteor Mash
    fr: Poing Météor
    it: Meteorpugno
    de: Sternenhieb
    es: Puño Meteoro
    ko: 코멧펀치
  descriptions:
    jp_kana: "すいせいの　ごとく　パンチを　くりだして\nあいてを　こうげきする。じぶんの　\nこうげきが　あがることが　ある。"
    jp_kanji: "すい星の　ごとく　パンチを　くりだして\n相手を　攻撃する。自分の　\n攻撃が　あがることが　ある。"
    en: "The target is hit with a hard punch fired\nlike a meteor. It may also raise\nthe user’s Attack."
    fr: "Un coup de poing lancé à la vitesse d’un\nmétéore. Peut aussi augmenter l’Attaque\ndu lanceur."
    it: "Colpisce il nemico con un pugno veloce\ncome una meteora. Può far pure salire\nl’Attacco di chi la usa."
    de: "Angriff mit einem harten, schnellen\nSchlag. Erhöht eventuell Angriffs-Wert\ndes Anwenders."
    es: "Puñetazo que impacta como un meteorito\ny puede subir el Ataque del agresor."
    ko: "혜성과 같은 펀치를 날려서\n상대를 공격한다. 자신의\n공격이 올라갈 때가 있다."
metronome:
  names:
    jp_kana: ゆびをふる
    jp_kanji: ゆびをふる
    en: Metronome
    fr: Métronome
    it: Metronomo
    de: Metronom
    es: Metrónomo
    ko: 손가락흔들기
  descriptions:
    jp_kana: "ゆびをふり　じぶんの　のうを　しげきして\nすべての　わざの　なかから\nどれか　１つを　くりだす。"
    jp_kanji: "指をふり　自分の　脳を　刺激して\nすべての　技の　なかから\nどれか　１つを　くりだす。"
    en: "The user waggles a finger and stimulates\nits brain into randomly using nearly\nany move."
    fr: "Agite un doigt et stimule le cerveau\npour utiliser presque n’importe\nquelle capacité au hasard."
    it: "Chi la usa fa di no con un dito e stimola il\ncervello a usare a caso una delle tante\nmosse esistenti."
    de: "Bewegt Finger, um das Gehirn zu\nstimulieren. Wählt zufällig eine\nAttacke aus."
    es: "El usuario mueve un dedo y\nestimula su cerebro para usar\nal azar casi cualquier movimiento."
    ko: "손가락을 흔들어 자신의 뇌를\n자극해서 모든 기술 중\n어느 하나를 날린다."
milk_drink:
  names:
    jp_kana: ミルクのみ
    jp_kanji: ミルクのみ
    en: Milk Drink
    fr: Lait à Boire
    it: Buonlatte
    de: Milchgetränk
    es: Batido
    ko: 우유마시기
  descriptions:
    jp_kana: "さいだい　ＨＰの　はんぶん\nじぶんの　ＨＰを　かいふく　する。\nなかまに　ＨＰを　わけることも　できる。"
    jp_kanji: "最大ＨＰの　半分\n自分の　ＨＰを　回復する。\n仲間に　ＨＰを　わけることも　できる。"
    en: "The user restores its own HP\nby up to half of its maximum HP.\nMay also be used in the field to heal HP."
    fr: "Le lanceur récupère jusqu’à la moitié de\nses PV max. En dehors des combats, permet\nde transférer des PV du lanceur à un allié."
    it: "Chi la usa recupera metà dei propri PS\nmassimi. Fuori dalla lotta può anche far\ntrasferire PS ai propri compagni."
    de: "KP des Anwenders werden um 50 % der\nmaximalen KP aufgefüllt. Heilung eines Ver-\nbündeten außerhalb von Kämpfen möglich."
    es: "Restaura la mitad de los PS máximos del\nusuario. Fuera de combate se usa para\ntransferir parte de sus PS a un aliado."
    ko: "자신의 최대 HP 절반을\n회복한다. 동료의 HP를\n회복시킬 수도 있다."
mimic:
  names:
    jp_kana: ものまね
    jp_kanji: ものまね
    en: Mimic
    fr: Copie
    it: Mimica
    de: Mimikry
    es: Mimético
    ko: 흉내내기
  descriptions:
    jp_kana: "あいてが　さいごに　つかった　わざを\nせんとうの　あいだ\nじぶんの　わざに　することが　できる。"
    jp_kanji: "相手が　最後に　使った　技を\n戦闘の　あいだ\n自分の　技に　することが　できる。"
    en: "The user copies the target’s last move.\nThe move can be used during battle\nuntil the Pokémon is switched out."
    fr: "Le lanceur copie la dernière capacité\nutilisée par la cible et la conserve\ntant qu’il reste au combat."
    it: "Copia l’ultima mossa usata dal bersaglio.\nLa mossa copiata si può utilizzare fino\nalla sostituzione del Pokémon."
    de: "Kopiert die zuvor ausgeführte Attacke\ndes Zieles. Kann im Kampf bis zur\nAuswechslung verwendet werden."
    es: "Copia el último movimiento usado por\nel objetivo. Dicho movimiento se podrá usar\nmientras el Pokémon no sea cambiado."
    ko: "상대가 마지막에 사용한 기술을\n배틀을 하는 동안\n자신의 기술로 만들 수 있다."
mind_reader:
  names:
    jp_kana: こころのめ
    jp_kanji: こころのめ
    en: Mind Reader
    fr: Lire-Esprit
    it: Leggimente
    de: Willensleser
    es: Telépata
    ko: 마음의눈
  descriptions:
    jp_kana: "あいての　うごきを　こころで　かんじて\nつぎの　こうげきが　かならず\nあいてに　あたるように　する。"
    jp_kanji: "相手の　動きを　心で　感じて\n次の　攻撃が　必ず\n相手に　当たるように　する。"
    en: "The user senses the target’s movements\nwith its mind to ensure its next\nattack does not miss the target."
    fr: "Le lanceur analyse les mouvements de\nl’ennemi pour être sûr de toucher\nau coup suivant."
    it: "Chi la usa prevede i movimenti del nemico\nper mandare a segno l’attacco successivo."
    de: "Ahnt Bewegungen des Zieles voraus,\num zu gewährleisten, dass die\nnächste eigene Attacke trifft."
    es: "El usuario adivina los movimientos\ndel objetivo para hacer que su siguiente\nataque no falle."
    ko: "상대의 움직임을 마음으로 읽고\n다음 공격이 반드시\n상대에게 명중되게 한다."
minimize:
  names:
    jp_kana: ちいさくなる
    jp_kanji: ちいさくなる
    en: Minimize
    fr: Lilliput
    it: Minimizzato
    de: Komprimator
    es: Reducción
    ko: 작아지기
  descriptions:
    jp_kana: "からだを　ちぢめて　ちいさく　みせて\nじぶんの　かいひりつを\nぐーんと　あげる。"
    jp_kanji: "体を　ちぢめて　小さく　みせて\n自分の　回避率を\nぐーんと　あげる。"
    en: "The user compresses its body\nto make itself look smaller,\nwhich sharply raises its evasiveness."
    fr: "Le lanceur comprime son corps pour se\nfaire tout petit et augmenter fortement\nson Esquive."
    it: "Il corpo di chi la usa si comprime e diventa\npiù piccolo. La sua capacità di elusione\naumenta di molto."
    de: "Anwender schrumpft, um seinen\nFluchtwert stark zu erhöhen."
    es: "El usuario mengua para aumentar\nmucho la Evasión."
    ko: "몸을 축소하여 작게 보임으로써\n자신의 회피율을 크게 올린다."
miracle_eye:
  names:
    jp_kana: ミラクルアイ
    jp_kanji: ミラクルアイ
    en: Miracle Eye
    fr: Œil Miracle
    it: Miracolvista
    de: Wunderauge
    es: Gran Ojo
    ko: 미라클아이
  descriptions:
    jp_kana: "あくタイプに　こうかがない　わざや\nかいひりつの　たかい　あいてに\nこうげきが　あたるように　なる。"
    jp_kanji: "あくタイプに　効果がない　技や\n回避率の　高い　相手に\n攻撃が　当たるように　なる。"
    en: "Enables a Dark-type target to be hit by\nPsychic-type attacks. It also enables\nan evasive target to be hit."
    fr: "Permet de toucher un Pokémon Ténèbres\navec toute capacité et de toucher un\nennemi insaisissable."
    it: "Chi la usa rende i Pokémon di tipo Buio\nvulnerabili a qualsiasi tipo di mossa e può,\ninoltre, colpire i nemici sfuggenti."
    de: "Erlaubt es, Unlicht-Pokémon mit\nPsycho-Attacken anzugreifen.\nIgnoriert den Fluchtwert des Zieles."
    es: "Permite atacar con cualquier movimiento\na objetivos de tipo Siniestro y golpear\na Pokémon evasivos."
    ko: "악타입에 효과가 없는 기술이나\n회피율이 높은 상대라 할지라도\n공격이 맞게 된다."
mirror_coat:
  names:
    jp_kana: ミラーコート
    jp_kanji: ミラーコート
    en: Mirror Coat
    fr: Voile Miroir
    it: Specchiovelo
    de: Spiegelcape
    es: Manto Espejo
    ko: 미러코트
  descriptions:
    jp_kana: "あいてから　うけた　とくしゅ　こうげきの\nダメージを　２ばいに　して\nそのあいてに　かえす。"
    jp_kanji: "相手から　受けた　特殊攻撃の\nダメージを　２倍に　して\nその相手に　返す。"
    en: "A retaliation move that counters any\nspecial attack, inflicting double the\ndamage taken."
    fr: "Une riposte qui contre n’importe quelle\nattaque spéciale en infligeant le double\ndes dégâts subis."
    it: "Mossa che replica ogni attacco speciale,\narrecando il doppio del danno ricevuto."
    de: "Kontert den Spezial-Angriff des Gegners\nmit doppeltem Schaden."
    es: "Responde a un ataque especial\nocasionando el doble del daño\nrecibido."
    ko: "상대에게 받은 특수공격의\n데미지를 2배로 만들어\n그 상대에게 돌려준다."
mirror_move:
  names:
    jp_kana: オウムがえし
    jp_kanji: オウムがえし
    en: Mirror Move
    fr: Mimique
    it: Speculmossa
    de: Spiegeltrick
    es: Mov. Espejo
    ko: 따라하기
  descriptions:
    jp_kana: "あいての　つかった　わざを　まねして\nじぶんも　おなじ　わざを　つかう。"
    jp_kanji: "相手の　使った　技を　まねして\n自分も　同じ技を　使う。"
    en: "The user counters the target by mimicking\nthe target’s last move."
    fr: "Le lanceur riposte à l’attaque de l’ennemi\navec la même attaque."
    it: "Chi la usa colpisce il bersaglio copiandone\nl’ultima mossa usata."
    de: "Kopiert die letzte Attacke des\nZieles und greift es an."
    es: "Contraataca con el mismo movimiento\nempleado por el objetivo."
    ko: "상대가 사용한 기술을 흉내 내어\n자신도 똑같은 기술을 쓴다."
mirror_shot:
  names:
    jp_kana: ミラーショット
    jp_kanji: ミラーショット
    en: Mirror Shot
    fr: Miroi-Tir
    it: Cristalcolpo
    de: Spiegelsalve
    es: Disp. Espejo
    ko: 미러숏
  descriptions:
    jp_kana: "みがき　あげられた　からだから\nせんこうの　ちからを　あいてに　はなつ。\nめいちゅうりつを　さげることが　ある。"
    jp_kanji: "磨きあげられた　体から\nせん光の　力を　相手に　放つ。\n命中率を　さげることが　ある。"
    en: "The user looses a flash of energy at\nthe target from its polished body.\nIt may also lower the target’s accuracy."
    fr: "Le corps poli du lanceur libère un\néclair d’énergie. Peut aussi baisser\nla Précision de l’ennemi."
    it: "Chi la usa rilascia fasci d’energia dal\ncorpo levigato. Può anche ridurre\nla precisione del nemico."
    de: "Anwender feuert Energiestrahl aus\nseinem Körper ab. Senkt eventuell\nGenauigkeit des Zieles."
    es: "El usuario libera un haz de energía\ndesde su pulido cuerpo.\nPuede bajar la Precisión."
    ko: "갈고 닦은 몸에서\n섬광의 힘을 상대에게 쏜다.\n명중률을 떨어뜨릴 때가 있다."
mist:
  names:
    jp_kana: しろいきり
    jp_kanji: しろいきり
    en: Mist
    fr: Brume
    it: Nebbia
    de: Weißnebel
    es: Neblina
    ko: 흰안개
  descriptions:
    jp_kana: "しろいきりで　からだを　おおう。\n５ターンの　あいだ　あいてに\nのうりょくを　さげられなく　なる。"
    jp_kanji: "白い霧で　体を　おおう。\n５ターンの　あいだ　相手に\n能力を　さげられなく　なる。"
    en: "The user cloaks its body with a white mist\nthat prevents any of its stats from being\ncut for five turns."
    fr: "Une brume blanche enveloppe l’équipe\ndu lanceur et empêche la réduction\ndes stats pour 5 tours."
    it: "Chi la usa attira una nebbia che blocca\nla riduzione alle statistiche della sua\nsquadra per cinque turni."
    de: "Anwender schützt das Team mit einem\nNebel. Verhindert Statussenkungen\nfür fünf Runden."
    es: "Rodea de fina niebla al usuario y\nprotege las características de su\nequipo durante cinco turnos."
    ko: "하얀 안개로 몸을 덮는다.\n5턴 동안 상대에 의해\n능력이 떨어지지 않게 된다."
mist_ball:
  names:
    jp_kana: ミストボール
    jp_kanji: ミストボール
    en: Mist Ball
    fr: Ball’Brume
    it: Foschisfera
    de: Nebelball
    es: Bola Neblina
    ko: 미스트볼
  descriptions:
    jp_kana: "きりじょうの　うもうで　つつみこみ　\nこうげきする。あいての　とくこうを\nさげることが　ある。"
    jp_kanji: "霧状の　羽毛で　包みこみ　\n攻撃する。\n相手の　特攻を　さげることが　ある。"
    en: "A mistlike flurry of down envelops and\ndamages the target. It may also lower\nthe target’s Sp. Atk."
    fr: "Une bulle de brume inflige des dégâts\nà l’ennemi. Peut aussi réduire son\nAttaque Spéciale."
    it: "Una sfera coperta di nebbia danneggia\nil nemico. Può anche ridurre l’Attacco\nSpeciale."
    de: "Angriff mit einer Kugel aus Wasser,\ndie Nebel enthält. Senkt eventuell den\nSpezial-Angriff des Zieles."
    es: "Banco de niebla que puede bajar\nel Ataque Especial del objetivo."
    ko: "안개의 깃털로 둘러싸\n공격한다. 상대의 특수공격을\n떨어뜨릴 때가 있다."
moonlight:
  names:
    jp_kana: つきのひかり
    jp_kanji: つきのひかり
    en: Moonlight
    fr: Rayon Lune
    it: Lucelunare
    de: Mondschein
    es: Luz Lunar
    ko: 달의불빛
  descriptions:
    jp_kana: "じぶんの　ＨＰを　かいふく　する。\nてんきに　よって\nかいふくの　りょうが　へんか　する。"
    jp_kanji: "自分の　ＨＰを　回復する。\n天気に　よって\n回復の　量が　変化する。"
    en: "The user restores its own HP.\nThe amount of HP regained varies\nwith the weather."
    fr: "Un soin qui restaure des PV au lanceur.\nSon efficacité varie en fonction de la\nmétéo."
    it: "Chi la usa recupera PS. Il numero di PS\nrecuperati dipende dalle condizioni\natmosferiche."
    de: "Füllt KP des Anwenders auf.\nDie Menge hängt vom Wetter ab."
    es: "Restaura PS del usuario.\nLa cantidad varía según\nel tiempo que haga."
    ko: "자신의 HP를 회복한다.\n날씨에 따라\n회복량이 변한다."
morning_sun:
  names:
    jp_kana: あさのひざし
    jp_kanji: あさのひざし
    en: Morning Sun
    fr: Aurore
    it: Mattindoro
    de: Morgengrauen
    es: Sol Matinal
    ko: 아침햇살
  descriptions:
    jp_kana: "じぶんの　ＨＰを　かいふく　する。\nてんきに　よって\nかいふくの　りょうが　へんか　する。"
    jp_kanji: "自分の　ＨＰを　回復する。\n天気に　よって\n回復の　量が　変化する。"
    en: "The user restores its own HP.\nThe amount of HP regained varies\nwith the weather."
    fr: "Un soin qui restaure des PV au lanceur.\nSon efficacité varie en fonction de la\nmétéo."
    it: "Chi la usa recupera PS. Il numero di PS\nrecuperati dipende dalle condizioni\natmosferiche."
    de: "Füllt KP des Anwenders auf.\nDie Menge hängt vom Wetter ab."
    es: "Restaura PS del usuario.\nLa cantidad varía según\nel tiempo que haga."
    ko: "자신의 HP를 회복한다.\n날씨에 따라\n회복량이 변한다."
mud_bomb:
  names:
    jp_kana: どろばくだん
    jp_kanji: どろばくだん
    en: Mud Bomb
    fr: Boue-Bombe
    it: Pantanobomba
    de: Schlammbombe
    es: Bomba Fango
    ko: 진흙폭탄
  descriptions:
    jp_kana: "かたい　どろのたまを\nあいてに　はっしゃして　こうげきする。\nめいちゅうりつを　さげることが　ある。"
    jp_kanji: "硬い　泥の　弾を\n相手に　発射して　攻撃する。\n命中率を　さげることが　ある。"
    en: "The user launches a hard-packed\nmud ball to attack.\nIt may also lower the target’s accuracy."
    fr: "Le lanceur attaque à l’aide d’une boule\nde boue solidifiée. Peut aussi baisser\nla Précision de l’ennemi."
    it: "Chi la usa lancia una compatta palla di\nfango. Può anche ridurre la precisione\ndel Pokémon colpito."
    de: "Anwender greift mit einem festen\nSchlammklumpen an. Senkt\neventuell Genauigkeit des Zieles."
    es: "Ataca lanzando una compacta bola de\nfango. Puede bajar la Precisión\ndel objetivo."
    ko: "단단한 진흙구슬을\n상대에게 발사하여 공격한다.\n명중률을 떨어뜨릴 때가 있다."
mud_shot:
  names:
    jp_kana: マッドショット
    jp_kanji: マッドショット
    en: Mud Shot
    fr: Tir de Boue
    it: Colpodifango
    de: Lehmschuss
    es: Disp. Lodo
    ko: 머드숏
  descriptions:
    jp_kana: "どろの　かたまりを\nあいてに　なげつけて　こうげきする。\nどうじに　あいての　すばやさを　さげる。"
    jp_kanji: "泥の　塊を\n相手に　投げつけて　攻撃する。\n同時に　相手の　素早さを　さげる。"
    en: "The user attacks by hurling a blob of mud\nat the target.\nIt also reduces the target’s Speed."
    fr: "Le lanceur attaque en projetant\nde la boue sur l’ennemi. Réduit\naussi la Vitesse de la cible."
    it: "Chi la usa attacca lanciando fango sul\nnemico. Riduce anche la Velocità."
    de: "Angriff mit Lehm, der den Initiative-Wert\ndes Zieles senkt."
    es: "El usuario lanza lodo al objetivo y reduce\nsu Velocidad."
    ko: "진흙 덩어리를\n상대에게 내던져서 공격한다.\n동시에 상대의 스피드를 떨어뜨린다."
mud_slap:
  names:
    jp_kana: どろかけ
    jp_kanji: どろかけ
    en: Mud-Slap
    fr: Coud’Boue
    it: Fangosberla
    de: Lehmschelle
    es: Bofetón Lodo
    ko: 진흙뿌리기
  descriptions:
    jp_kana: "あいての　かおなどに\nドロを　なげつけて　こうげきする。\nめいちゅうりつを　さげる。"
    jp_kanji: "相手の　顔などに\n泥を　投げつけて　攻撃する。\n命中率を　さげる。"
    en: "The user hurls mud in the target’s face to\ninflict damage and lower its accuracy."
    fr: "Le lanceur envoie de la boue au visage\nde l’ennemi pour infliger des dégâts\net baisser sa Précision."
    it: "Chi la usa butta fango in faccia al nemico\nper arrecargli danni e ridurne\nla precisione."
    de: "Schadet dem Ziel durch Matsch.\nDessen Genauigkeit sinkt."
    es: "Echa lodo en la cara para bajar\nla Precisión."
    ko: "상대의 얼굴 등에\n진흙을 내던져서 공격한다.\n명중률을 떨어뜨린다."
mud_sport:
  names:
    jp_kana: どろあそび
    jp_kanji: どろあそび
    en: Mud Sport
    fr: Lance-Boue
    it: Fangata
    de: Lehmsuhler
    es: Chapoteolodo
    ko: 흙놀이
  descriptions:
    jp_kana: "どろを　かぶって　どろどろに　なる。\nじぶんが　いるあいだ\nでんきタイプの　わざを　よわめる。"
    jp_kanji: "泥を　かぶって　どろどろに　なる。\n自分が　いるあいだ\nでんきタイプの　技を　弱める。"
    en: "The user covers itself with mud. It\nweakens Electric-type moves while the\nuser is in the battle."
    fr: "Le lanceur se couvre de boue\npour affaiblir les capacités\nÉlectrik quand il combat."
    it: "Chi la usa si ricopre di fango indebolendo\nle mosse di tipo Elettro finché resta\nin campo."
    de: "Schwächt Elektro-Attacken, solang\nder Anwender am Kampf teilnimmt."
    es: "El usuario se cubre de lodo y debilita\nlos movimientos de tipo Eléctrico\nmientras está en combate."
    ko: "진흙투성이가 된다. 기술을 쓴\n포켓몬이 배틀에 나와 있는 동안\n전기타입의 기술을 약하게 만든다."
muddy_water:
  names:
    jp_kana: だくりゅう
    jp_kanji: だくりゅう
    en: Muddy Water
    fr: Ocroupi
    it: Fanghiglia
    de: Lehmbrühe
    es: Agua Lodosa
    ko: 탁류
  descriptions:
    jp_kana: "にごった　みずを\nあいてに　はっしゃして　こうげきする。\nめいちゅうりつを　さげることが　ある。"
    jp_kanji: "濁った　水を\n相手に　発射して　攻撃する。\n命中率を　さげることが　ある。"
    en: "The user attacks by shooting muddy water\nat the opposing team.\nIt may also lower the targets’ accuracy."
    fr: "Le lanceur attaque en projetant de l’eau\nboueuse. Peut aussi réduire la Précision\nde l’ennemi."
    it: "Chi la usa attacca con un getto di fango\nche può anche ridurre la precisione\ndei nemici."
    de: "Greift mit Matsch an und senkt\neventuell die Genauigkeit des\nGegners."
    es: "Ataque con agua lodosa que puede\nbajar la Precisión."
    ko: "탁해진 물을\n상대에게 발사하여 공격한다.\n명중률을 떨어뜨릴 때가 있다."
nasty_plot:
  names:
    jp_kana: わるだくみ
    jp_kanji: わるだくみ
    en: Nasty Plot
    fr: Machination
    it: Congiura
    de: Ränkeschmied
    es: Maquinación
    ko: 나쁜음모
  descriptions:
    jp_kana: "わるいことを　かんがえて\nあたまを　かっせいか　させる。\nじぶんの　とくこうを　ぐーんと　あげる。"
    jp_kanji: "悪いことを　考えて\n頭を　活性化させる。\n自分の　特攻を　ぐーんと　あげる。"
    en: "The user stimulates its brain by thinking\nbad thoughts.\nIt sharply raises the user’s Sp. Atk."
    fr: "Stimule l’esprit par de mauvaises pensées.\nAugmente fortement l’Attaque Spéciale\ndu lanceur."
    it: "Chi la usa stimola il cervello pensando\na cose cattive. Aumenta di molto\nl’Attacco Speciale."
    de: "Anwender stimuliert sein Gehirn\nund hat finstere Gedanken.\nSteigert Spezial-Angriff stark."
    es: "Estimula su cerebro pensando en cosas\nmalas. Aumenta considerablemente\nel Ataque Especial."
    ko: "나쁜 일을 생각해서\n머리를 활성화시킨다.\n자신의 특수공격을 크게 올린다."
natural_gift:
  names:
    jp_kana: しぜんのめぐみ
    jp_kanji: しぜんのめぐみ
    en: Natural Gift
    fr: Don Naturel
    it: Dononaturale
    de: Beerenkräfte
    es: Don Natural
    ko: 자연의은혜
  descriptions:
    jp_kana: "きのみから　ちからを　もらい\nこうげきする。もたせた　きのみで\nわざの　タイプと　いりょくが　かわる。"
    jp_kanji: "きのみから　力を　もらい\n攻撃する。持たせた　きのみで\n技の　タイプと　威力が　変わる。"
    en: "The user draws power to attack by using\nits held Berry.\nThe Berry determines its type and power."
    fr: "Avant d’attaquer, le lanceur rassemble\nses forces grâce à sa Baie. Elle\ndétermine le type et la puissance."
    it: "Chi la usa trae forza dalla Bacca che\ntiene. Da questa dipendono il tipo e\nla forza dell’attacco."
    de: "Anwender zieht aus seiner derzeitigen\nBeere Kraft. Sie bestimmt Typ und\nStärke der Attacke."
    es: "La Baya que lleva presta su fuerza\npara atacar. El tipo de ataque\ny su fuerza dependen de la Baya."
    ko: "나무열매에서 힘을 얻어\n공격한다. 지니게 한 나무열매에 따라\n기술의 타입과 위력이 바뀐다."
nature_power:
  names:
    jp_kana: しぜんのちから
    jp_kanji: しぜんのちから
    en: Nature Power
    fr: Force-Nature
    it: Naturforza
    de: Natur-Kraft
    es: Adaptación
    ko: 자연의힘
  descriptions:
    jp_kana: "しぜんの　ちからで　こうげきする。\nつかう　ばしょで\nでてくる　わざが　へんかする。"
    jp_kanji: "自然の　力で　攻撃する。\n使う　場所で\nでてくる　技が　変化する。"
    en: "An attack that makes use of nature’s\npower. Its effects vary depending on the\nuser’s environment."
    fr: "Une attaque qui tire sa force de la\nnature. Son type varie selon le terrain."
    it: "Mossa che fa uso della forza della natura.\nIl suo effetto varia in base all’ambiente."
    de: "Angriff mit der Kraft der Natur, dessen\nTyp vom Ort abhängt, wo er durchgeführt\nwird."
    es: "Usa el poder de la naturaleza.\nSu efecto varía según el entorno\nde combate."
    ko: "자연의 힘으로 공격한다.\n사용하는 장소에 따라\n나오는 기술이 변화한다."
needle_arm:
  names:
    jp_kana: ニードルアーム
    jp_kanji: ニードルアーム
    en: Needle Arm
    fr: Poing Dard
    it: Pugnospine
    de: Nietenranke
    es: Brazo Pincho
    ko: 바늘팔
  descriptions:
    jp_kana: "トゲの　うでを\nはげしく　ふるって　こうげきする。\nあいてを　ひるませる　ことが　ある。"
    jp_kanji: "トゲの　腕を\n激しく　ふるって　攻撃する。\n相手を　ひるませることが　ある。"
    en: "The user attacks by wildly swinging its\nthorny arms. It may also make the\ntarget flinch."
    fr: "Le lanceur attaque en fouettant l’ennemi\nde ses bras épineux. Peut aussi l’apeurer."
    it: "Chi la usa attacca colpendo il nemico\ncon i suoi arti pieni di spine. Può far\ntentennare il Pokémon colpito."
    de: "Angriff mit dornigen Armen. Das Ziel\nschreckt eventuell zurück."
    es: "Pega con brazos de pinchos y puede\nhacer retroceder al objetivo."
    ko: "바늘팔을\n세차게 흔들어 공격한다.\n상대를 풀죽게 만들 때가 있다."
night_daze:
  names:
    jp_kana: ナイトバースト
    jp_kanji: ナイトバースト
    en: Night Daze
    fr: Explonuit
    it: Urtoscuro
    de: Nachtflut
    es: Pulso Noche
    ko: 나이트버스트
  descriptions:
    jp_kana: "あんこくの　しょうげきはを\nとばして　あいてを　こうげきする。\nめいちゅうりつを　さげることが　ある。"
    jp_kanji: "暗黒の　衝撃波を\nとばして　相手を　攻撃する。\n命中率を　さげることが　ある。"
    en: "The user lets loose a pitch-black shock\nwave at its target. It may also lower the\ntarget’s accuracy."
    fr: "Le lanceur attaque l’ennemi avec une onde\nde choc ténébreuse. Peut aussi baisser la\nPrécision de l’ennemi."
    it: "Chi la usa attacca il bersaglio con un’onda\nd’urto oscura che può ridurne\nla precisione."
    de: "Anwender greift Ziel mit finsteren\nSchockwellen an. Senkt eventuell die\nGenauigkeit."
    es: "Ataca al objetivo con una onda siniestra.\nPuede bajar su Precisión."
    ko: "암흑의 충격파를\n날려서 상대를 공격한다.\n명중률을 떨어뜨릴 때가 있다."
night_shade:
  names:
    jp_kana: ナイトヘッド
    jp_kanji: ナイトヘッド
    en: Night Shade
    fr: Ténèbres
    it: Ombra Nott.
    de: Nachtnebel
    es: Tinieblas
    ko: 나이트헤드
  descriptions:
    jp_kana: "おそろしい　まぼろしを　みせて\nじぶんの　レベルと　おなじ　だけの\nダメージを　あいてに　あたえる。"
    jp_kanji: "恐ろしい　幻を　みせて\n自分の　レベルと　同じだけの\nダメージを　相手に　与える。"
    en: "The user makes the target see a\nfrightening mirage. It inflicts damage\nmatching the user’s level."
    fr: "Le lanceur invoque un mirage. Inflige des\ndégâts équivalents au niveau du lanceur."
    it: "Fa apparire un orribile miraggio al nemico\ne infligge un danno pari al livello di chi\nla usa."
    de: "Das Ziel sieht eine Illusion. Richtet\nSchaden gemäß dem Level des\nAnwenders an."
    es: "Produce un espejismo ante el\nobjetivo, que pierde tantos PS\ncomo nivel tenga el agresor."
    ko: "무시무시한 환상을 보게 해서\n자신의 레벨과 똑같은 만큼의\n데미지를 상대에게 준다."
night_slash:
  names:
    jp_kana: つじぎり
    jp_kanji: つじぎり
    en: Night Slash
    fr: Tranche-Nuit
    it: Nottesferza
    de: Nachthieb
    es: Tajo Umbrío
    ko: 깜짝베기
  descriptions:
    jp_kana: "いっしゅんの　すきを　ついて\nあいてを　きりはらう。\nきゅうしょに　あたりやすい。"
    jp_kanji: "一瞬の　すきを　ついて\n相手を　切りはらう。\n急所に　当たりやすい。"
    en: "The user slashes the target\nthe instant an opportunity arises.\nCritical hits land more easily."
    fr: "Le lanceur lacère l’ennemi à la\npremière occasion. Taux de\ncritiques élevé."
    it: "Chi la usa colpisce il nemico appena\nsi presenta l’occasione. Probabile brutto\ncolpo."
    de: "Anwender greift bei der ersten\nGelegenheit mit scharfen Klauen\nan. Hohe Volltrefferquote."
    es: "Ataca al objetivo a la primera oportunidad.\nSuele ser crítico."
    ko: "순간적으로 틈을 노려\n상대를 베어 버린다.\n급소에 맞기 쉽다."
nightmare:
  names:
    jp_kana: あくむ
    jp_kanji: あくむ
    en: Nightmare
    fr: Cauchemar
    it: Incubo
    de: Nachtmahr
    es: Pesadilla
    ko: 악몽
  descriptions:
    jp_kana: "ねむり　じょうたいの　あいてに\nあくむを　みせて　まいターン　すこしずつ\nＨＰを　へらしていく。"
    jp_kanji: "眠り状態の　相手に\n悪夢を　みせて　毎ターン　少しずつ\nＨＰを　減らしていく。"
    en: "A sleeping target sees a nightmare\nthat inflicts some damage every turn."
    fr: "Un cauchemar qui inflige des dégâts à\nchaque tour à un ennemi endormi."
    it: "Il nemico addormentato ha un incubo e\nperde PS ad ogni turno."
    de: "Dem schlafenden Ziel wird durch einen\nAlptraum in jeder Runde Schaden\nzugefügt, solang es schläft."
    es: "El objetivo dormido sufre una pesadilla\nque le hace perder PS en cada turno."
    ko: "잠듦 상태의 상대에게\n악몽을 꾸게 하여 매 턴 조금씩\nHP를 떨어뜨려 간다."
octazooka:
  names:
    jp_kana: オクタンほう
    jp_kanji: オクタンほう
    en: Octazooka
    fr: Octazooka
    it: Octazooka
    de: Octazooka
    es: Pulpocañón
    ko: 대포무노포
  descriptions:
    jp_kana: "あいての　かおなどに\nすみを　ふきかけて　こうげきする。\nめいちゅうりつを　さげることが　ある。"
    jp_kanji: "相手の　顔などに\n墨を　吹きかけて　攻撃する。\n命中率を　さげることが　ある。"
    en: "The user attacks by spraying ink in the\ntarget’s face or eyes.\nIt may also lower the target’s accuracy."
    fr: "Le lanceur attaque en projetant de\nl’encre au visage de l’ennemi. Peut aussi\nbaisser la Précision de l’ennemi."
    it: "Chi la usa spruzza inchiostro in faccia al\nnemico. Può anche ridurne la precisione."
    de: "Schießt mit Tinte, um Schaden anzurichten\nund die Genauigkeit zu senken."
    es: "Dispara tinta a la cara.\nPuede bajar la Precisión."
    ko: "상대의 얼굴 등에\n먹물을 내뿜어 공격한다.\n명중률을 떨어뜨릴 때가 있다."
odor_sleuth:
  names:
    jp_kana: かぎわける
    jp_kanji: かぎわける
    en: Odor Sleuth
    fr: Flair
    it: Segugio
    de: Schnüffler
    es: Rastreo
    ko: 냄새구별
  descriptions:
    jp_kana: "ゴーストタイプに　こうかがない　わざや\nかいひりつの　たかい　あいてに\nこうげきが　あたるように　なる。"
    jp_kanji: "ゴーストタイプに　効果がない　技や\n回避率の　高い　相手に\n攻撃が　当たるように　なる。"
    en: "Enables a Ghost-type target to be hit with\nNormal- and Fighting-type attacks. It also\nenables an evasive target to be hit."
    fr: "Permet de toucher un Pokémon Spectre\navec n’importe quelle capacité et de\ntoucher un ennemi insaisissable."
    it: "Chi la usa rende i Pokémon di tipo Spettro\nvulnerabili a qualsiasi tipo di mossa e può,\ninoltre, colpire i nemici sfuggenti."
    de: "Erlaubt es, Geist-Pokémon mit Normal-\nund Kampf-Attacken anzugreifen.\nIgnoriert den Fluchtwert des Zieles."
    es: "Permite atacar con cualquier movimiento\na objetivos de tipo Fantasma y golpear\na Pokémon evasivos."
    ko: "고스트타입에 효과가 없는 기술이나\n회피율이 높은 상대라 할지라도\n공격이 맞게 된다."
ominous_wind:
  names:
    jp_kana: あやしいかぜ
    jp_kanji: あやしいかぜ
    en: Ominous Wind
    fr: Vent Mauvais
    it: Funestovento
    de: Unheilböen
    es: Vien. Aciago
    ko: 괴상한바람
  descriptions:
    jp_kana: "みのけも　よだつ　とっぷうで　あいてを\nこうげきする。じぶんの　すべての\nのうりょくが　あがることが　ある。"
    jp_kanji: "みのけも　よだつ　突風で　相手を\n攻撃する。自分の　すべての\n能力が　あがることが　ある。"
    en: "The user blasts the target with a gust of\nrepulsive wind. It may also raise all the\nuser’s stats at once."
    fr: "Le lanceur crée une violente bourrasque.\nPeut aussi augmenter toutes ses stats."
    it: "Chi la usa attacca con una forte raffica\ndi vento che può aumentare tutte le sue\nstatistiche."
    de: "Das Ziel treffen abscheuliche Winde.\nSteigert eventuell alle Statuswerte des\nAnwenders."
    es: "Produce un viento horripilante.\nPuede subir de golpe todas\nlas características del usuario."
    ko: "소름이 끼칠만한 돌풍으로 상대를\n공격한다. 자신의 모든\n능력이 올라갈 때가 있다."
outrage:
  names:
    jp_kana: げきりん
    jp_kanji: げきりん
    en: Outrage
    fr: Colère
    it: Oltraggio
    de: Wutanfall
    es: Enfado
    ko: 역린
  descriptions:
    jp_kana: "２ー３ターンの　あいだ\nあばれまくって　こうげきする。\nあばれた　あとは　こんらん　する。"
    jp_kanji: "２ー３ターンの　あいだ\n暴れまくって　攻撃する。\n暴れたあとは　混乱する。"
    en: "The user rampages and attacks for two\nto three turns.\nIt then becomes confused, however."
    fr: "Le lanceur laisse éclater sa rage et\nattaque pendant 2 à 3 tours avant de\ncéder à la confusion."
    it: "Chi la usa sfoga la sua ira e attacca\nil nemico per due o tre turni prima di\nessere lasciato in preda alla confusione."
    de: "Attacke über 2 bis 3 Runden,\ndie den Angreifer verwirrt."
    es: "Ataca de dos a tres turnos y acaba\nconfundiendo al agresor."
    ko: "2-3턴 동안\n마구 난동부려서 공격한다.\n난동부린 뒤에는 혼란에 빠진다."
overheat:
  names:
    jp_kana: オーバーヒート
    jp_kanji: オーバーヒート
    en: Overheat
    fr: Surchauffe
    it: Vampata
    de: Hitzekoller
    es: Sofoco
    ko: 오버히트
  descriptions:
    jp_kana: "フルパワーで　あいてを　こうげきする。\nつかうと　はんどうで\nじぶんの　とくこうが　がくっと　さがる。"
    jp_kanji: "フルパワーで　相手を　攻撃する。\n使うと　反動で\n自分の　特攻が　がくっと　さがる。"
    en: "The user attacks the target at full power.\nThe attack’s recoil harshly reduces the\nuser’s Sp. Atk stat."
    fr: "Attaque l’ennemi à pleine puissance.\nLe contrecoup baisse énormément\nl’Attaque Spéciale du lanceur."
    it: "Chi la usa sferra un potente attacco,\nma il contraccolpo riduce di molto\nil suo Attacco Speciale."
    de: "Angriff mit voller Kraft, der den\nSpezial-Angriff des Anwenders durch\nden Rückstoß stark senkt."
    es: "Ataque en toda regla que baja mucho\nel Ataque Especial de quien lo usa."
    ko: "풀 파워로 상대를 공격한다.\n쓰면 반동으로\n자신의 특수공격이 크게 떨어진다."
pain_split:
  names:
    jp_kana: いたみわけ
    jp_kanji: いたみわけ
    en: Pain Split
    fr: Balance
    it: Malcomune
    de: Leidteiler
    es: Divide Dolor
    ko: 아픔나누기
  descriptions:
    jp_kana: "じぶんの　ＨＰと　あいての　ＨＰを\nあわせて　それを　じぶんと　あいてで\nなかよく　わける。"
    jp_kanji: "自分の　ＨＰと　相手の　ＨＰを\nあわせて　それを　自分と　相手で\nなかよく　わける。"
    en: "The user adds its HP to the target’s HP,\nthen equally shares the combined HP\nwith the target."
    fr: "Le lanceur ajoute ses PV à ceux de\nsa cible et les répartit équitablement."
    it: "Chi la usa somma i propri PS a quelli\ndi un altro Pokémon per poi dividerli\nin parti uguali."
    de: "Addiert KP von Anwender und\nZiel. Teilt sie gerecht auf."
    es: "Suma los PS del usuario a los del objetivo\ny los reparte a partes iguales."
    ko: "자신의 HP와 상대의 HP를\n합친 것을 자신과 상대가\n사이좋게 나눈다."
pay_day:
  names:
    jp_kana: ネコにこばん
    jp_kanji: ネコにこばん
    en: Pay Day
    fr: Jackpot
    it: Giornopaga
    de: Zahltag
    es: Día de Pago
    ko: 고양이돈받기
  descriptions:
    jp_kana: "あいての　からだに\nこばんを　なげつけて　こうげきする。\nせんとうの　あとで　おかねが　もらえる。"
    jp_kanji: "相手の　体に\n小判を　投げつけて　攻撃する。\n戦闘の　あとで　お金が　もらえる。"
    en: "Numerous coins are hurled at the\ntarget to inflict damage.\nMoney is earned after the battle."
    fr: "Des pièces sont lancées sur l’ennemi.\nPermet d’obtenir de l’argent à la fin\ndu combat."
    it: "Colpisce il nemico con una gran quantità\ndi monete recuperabili dopo la lotta."
    de: "Das Ziel wird mit Münzen beworfen. Das\nGeld wird nach dem Kampf aufgesammelt."
    es: "Arroja monedas al objetivo.\nLas recupera al final del combate."
    ko: "상대의 몸에\n돈을 세게 던져서 공격한다.\n배틀 후에 돈을 받을 수 있다."
payback:
  names:
    jp_kana: しっぺがえし
    jp_kanji: しっぺがえし
    en: Payback
    fr: Représailles
    it: Rivincita
    de: Gegenstoß
    es: Vendetta
    ko: 보복
  descriptions:
    jp_kana: "ためこんで　こうげきする。\nあいてより　あとに　こうげき　できると\nわざの　いりょくは　２ばいに　なる。"
    jp_kanji: "ためこんで　攻撃する。\n相手より　あとに　攻撃できると\n技の　威力は　２倍に　なる。"
    en: "If the user moves after the target,\nthis attack’s power will be doubled."
    fr: "Le lanceur charge son énergie, puis\nattaque. La puissance est doublée\nsi le lanceur agit après l’ennemi."
    it: "Chi la usa accumula forza, poi attacca.\nLa potenza raddoppia se agisce dopo\nil Pokémon nemico."
    de: "Der Anwender lädt die Attacke auf. \nHandelt das Ziel vor dem Anwender,\nverdoppelt sich die Kraft der Attacke."
    es: "El usuario contraataca con el doble\nde fuerza si el objetivo usa\nun movimiento antes."
    ko: "모아서 공격한다.\n상대보다 뒤에 공격할 수 있으면\n기술의 위력은 2배가 된다."
peck:
  names:
    jp_kana: つつく
    jp_kanji: つつく
    en: Peck
    fr: Picpic
    it: Beccata
    de: Schnabel
    es: Picotazo
    ko: 쪼기
  descriptions:
    jp_kana: "するどく　とがった　くちばしや　つので　\nあいてを　つついて　こうげきする。"
    jp_kanji: "鋭く　とがった　くちばしや　つので　\n相手を　突いて　攻撃する。"
    en: "The target is jabbed with a sharply\npointed beak or horn."
    fr: "Frappe l’ennemi d’un bec pointu ou\nd’une corne pour infliger des dégâts."
    it: "Colpisce il nemico con un becco appuntito\no un corno."
    de: "Greift das Ziel mit dem Schnabel\noder Horn an."
    es: "Ensarta al objetivo con un cuerno o pico\npunzante."
    ko: "날카롭고 뾰족한 부리나 뿔로\n상대를 쪼아서 공격한다."
perish_song:
  names:
    jp_kana: ほろびのうた
    jp_kanji: ほろびのうた
    en: Perish Song
    fr: Requiem
    it: Ultimocanto
    de: Abgesang
    es: Canto Mortal
    ko: 멸망의노래
  descriptions:
    jp_kana: "うたを　きいた　ポケモンは\n３ターン　たつと　ひんしに　なる。\nこうたいすると　こうかは　なくなる。"
    jp_kanji: "歌を　聴いた　ポケモンは\n３ターン　たつと　ひんしに　なる。\n交代すると　効果は　なくなる。"
    en: "Any Pokémon that hears this song\nfaints in three turns, unless it switches\nout of battle."
    fr: "Tout Pokémon qui entend ce requiem\nest K.O. dans 3 tours à moins qu’il\nne quitte le combat."
    it: "Ogni Pokémon che sente questo canto va\nKO in tre turni, se non lo si sostituisce."
    de: "Wer diese Musik hört, wird nach drei\nRunden besiegt. Rettung ist durch\nEintausch eines neuen Pokémon möglich."
    es: "Si un Pokémon escucha este canto\ny no es cambiado por otro en\ntres turnos, acaba debilitándose."
    ko: "노래를 들은 포켓몬은\n3턴이 지나면 기절한다.\n교체되면 효과가 없어진다."
petal_dance:
  names:
    jp_kana: はなびらのまい
    jp_kanji: はなびらのまい
    en: Petal Dance
    fr: Danse-Fleur
    it: Petalodanza
    de: Blättertanz
    es: Danza Pétalo
    ko: 꽃잎댄스
  descriptions:
    jp_kana: "２ー３ターンの　あいだ　はなを\nまきちらして　あいてを　こうげきする。\nまきちらした　あとは　こんらん　する。"
    jp_kanji: "２ー３ターンの　あいだ　花を\nまきちらして　相手を　攻撃する。\nまきちらした　あとは　混乱する。"
    en: "The user attacks the target by scattering\npetals for two to three turns.\nThe user then becomes confused."
    fr: "Le lanceur attaque en projetant\ndes pétales pendant 2 à 3 tours\navant de céder à la confusion."
    it: "Attacca il nemico cospargendolo di petali\nper due o tre turni, ma chi la usa rimane\nconfuso."
    de: "Angriff mit Blütenblättern für 2 bis 3\nRunden. Angreifer wird verwirrt."
    es: "Lanza pétalos de dos a tres turnos\ny acaba confundiendo al atacante."
    ko: "2-3턴 동안 꽃을\n흩뿌려서 상대를 공격한다.\n흩뿌린 뒤에는 혼란에 빠진다."
pin_missile:
  names:
    jp_kana: ミサイルばり
    jp_kanji: ミサイルばり
    en: Pin Missile
    fr: Dard-Nuée
    it: Missilspillo
    de: Nadelrakete
    es: Pin Misil
    ko: 바늘미사일
  descriptions:
    jp_kana: "するどい　ハリを\nあいてに　はっしゃして　こうげきする。\n２ー５かいの　あいだ　れんぞくで　だす。"
    jp_kanji: "鋭い　ハリを\n相手に　発射して　攻撃する。\n２ー５回の　あいだ　連続で　だす。"
    en: "Sharp spikes are shot at the target\nin rapid succession.\nThey hit two to five times in a row."
    fr: "Envoie une rafale de dards.\nPeut toucher de 2 à 5 fois."
    it: "Il nemico viene colpito da due a cinque\nvolte con spilli appuntiti in rapida\nsuccessione."
    de: "Spitze Nadeln treffen das Ziel\n2- bis 5-mal hintereinander."
    es: "Lanza finas púas que hieren de dos\na cinco veces."
    ko: "날카로운 침을\n상대에게 발사해서 공격한다.\n2-5회 동안 연속으로 쓴다."
pluck:
  names:
    jp_kana: ついばむ
    jp_kanji: ついばむ
    en: Pluck
    fr: Picore
    it: Spennata
    de: Pflücker
    es: Picoteo
    ko: 쪼아대기
  descriptions:
    jp_kana: "くちばしで　こうげき。\nあいてが　きのみを　もっている　とき\nたべて　きのみの　こうかを　うけられる。"
    jp_kanji: "くちばしで　攻撃。\n相手が　きのみを　持っているとき\n食べて　きのみの　効果を　受けられる。"
    en: "The user pecks the target. If the target\nis holding a Berry, the user eats it and\ngains its effect."
    fr: "Le lanceur picore la cible. Si cette\ndernière tient une Baie, le lanceur\nla mange et profite de ses effets."
    it: "Chi la usa becca il bersaglio. Inoltre, se\nquesti tiene una Bacca, gliela ruba e ne\nsfrutta gli effetti."
    de: "Anwender pickt das Ziel, nimmt die\nBeere, falls das Ziel eine hält,\nund erhält ihren Effekt."
    es: "Picotea al objetivo. Si este sostiene una\nBaya, la picotea también y obtiene\nsus efectos."
    ko: "부리로 공격한다.\n상대가 나무열매를 지니고 있을 때\n먹어서 나무열매의 효과를 받을 수 있다."
poison_fang:
  names:
    jp_kana: どくどくのキバ
    jp_kanji: どくどくのキバ
    en: Poison Fang
    fr: Crochetvenin
    it: Velenodenti
    de: Giftzahn
    es: Colmillo Ven
    ko: 독엄니
  descriptions:
    jp_kana: "どくの　ある　キバで\nあいてに　かみついて　こうげきする。\nもうどくを　おわせる　ことが　ある。"
    jp_kanji: "毒の　ある　キバで\n相手に　かみついて　攻撃する。\n猛毒を　おわせる　ことが　ある。"
    en: "The user bites the target with toxic\nfangs. It may also leave the target\nbadly poisoned."
    fr: "Le lanceur mord l’ennemi de ses crocs\ntoxiques. Peut aussi l’empoisonner\ngravement."
    it: "Chi la usa morde il nemico con denti\navvelenati che possono anche\niperavvelenarlo."
    de: "Angriff mit giftigen Reißzähnen.\nDas Ziel wird eventuell\nschwer vergiftet."
    es: "Colmillos tóxicos que pueden envenenar\ngravemente al objetivo."
    ko: "독이 있는 이빨로\n상대를 물어서 공격한다.\n맹독을 주입할 때가 있다."
poison_gas:
  names:
    jp_kana: どくガス
    jp_kanji: どくガス
    en: Poison Gas
    fr: Gaz Toxik
    it: Velenogas
    de: Giftwolke
    es: Gas Venenoso
    ko: 독가스
  descriptions:
    jp_kana: "どくガスを　あいての　かおに　ふきかけて\nどくの　じょうたいに　する。"
    jp_kanji: "毒ガスを　相手の　顔に　吹きかけて\n毒の　状態に　する。"
    en: "A cloud of poison gas is sprayed\nin the face of opposing Pokémon.\nIt may poison those hit."
    fr: "Un nuage de gaz toxique est projeté au\nvisage de l’ennemi. Peut l’empoisonner."
    it: "Spruzza in faccia al nemico una nuvola\ndi gas tossico che avvelena."
    de: "Hüllt Gegner in der Umgebung\nin Gas ein, das sie vergiftet."
    es: "Lanza una nube de gas tóxico al objetivo.\nProduce envenenamiento."
    ko: "독가스를 상대의 얼굴에 내뿜어\n독 상태로 만든다."
poison_jab:
  names:
    jp_kana: どくづき
    jp_kanji: どくづき
    en: Poison Jab
    fr: Direct Toxik
    it: Velenpuntura
    de: Gifthieb
    es: Puya Nociva
    ko: 독찌르기
  descriptions:
    jp_kana: "どくに　そまった　しょくしゅや　うでで\nあいてを　つきさす。\nどく　じょうたいに　することが　ある。"
    jp_kanji: "毒に　そまった　触手や　腕で\n相手を　突き刺す。\n毒状態に　することが　ある。"
    en: "The target is stabbed with a tentacle or\narm steeped in poison. It may also\npoison the target."
    fr: "Attaque l’ennemi avec un tentacule ou\nun bras plein de poison. Peut aussi\nl’empoisonner."
    it: "Il nemico è colpito da un tentacolo o da\nun arto intriso di una sostanza tossica.\nPuò anche avvelenarlo."
    de: "Ziel wird mit vergiftetem Arm oder\nTentakel verletzt. Es wird dabei\neventuell vergiftet."
    es: "Pincha al objetivo con un tentáculo o\nbrazo envenenado. Puede llegar a\nenvenenar al objetivo."
    ko: "독에 물든 촉수나 팔로\n상대를 꿰찌른다.\n독 상태로 만들 때가 있다."
poison_powder:
  names:
    jp_kana: どくのこな
    jp_kanji: どくのこな
    en: PoisonPowder
    fr: Poudre Toxik
    it: Velenpolvere
    de: Giftpuder
    es: Polvo Veneno
    ko: 독가루
  descriptions:
    jp_kana: "どくの　ある　こなを\nたくさん　ふりまいて\nあいてを　どく　じょうたいに　する。"
    jp_kanji: "毒の　ある　粉を\nたくさん　ふりまいて\n相手を　毒状態に　する。"
    en: "The user scatters a cloud of poisonous\ndust on the target. It may poison\nthe target."
    fr: Une poudre toxique empoisonne l’ennemi.
    it: "Investe il bersaglio con una nuvola di\npolvere tossica che avvelena."
    de: Verstreut giftigen Puder auf das Ziel.
    es: Polvo tóxico que envenena al objetivo.
    ko: "독이 있는 가루를\n많이 흩뿌려서\n상대를 독 상태로 만든다."
poison_sting:
  names:
    jp_kana: どくばり
    jp_kanji: どくばり
    en: Poison Sting
    fr: Dard-Venin
    it: Velenospina
    de: Giftstachel
    es: Picotazo Ven
    ko: 독침
  descriptions:
    jp_kana: "どくの　ある　ハリを\nあいてに　つきさして　こうげきする。\nどく　じょうたいに　することが　ある。"
    jp_kanji: "毒の　ある　ハリを\n相手に　突き刺して　攻撃する。\n毒状態に　することが　ある。"
    en: "The user stabs the target\nwith a poisonous stinger.\nThis may also poison the target."
    fr: "Un dard toxique qui transperce l’ennemi.\nPeut aussi l’empoisonner."
    it: "Colpisce il nemico con un aculeo tossico\nche può anche avvelenarlo."
    de: "Angriff mit Giftstachel. Das Ziel\nwird eventuell vergiftet."
    es: "Lanza un aguijón tóxico que puede\nenvenenar al objetivo."
    ko: "독이 있는 침을\n상대에게 꿰찔러서 공격한다.\n독 상태로 만들 때가 있다."
poison_tail:
  names:
    jp_kana: ポイズンテール
    jp_kanji: ポイズンテール
    en: Poison Tail
    fr: Queue-Poison
    it: Velenocoda
    de: Giftschweif
    es: Cola Veneno
    ko: 포이즌테일
  descriptions:
    jp_kana: "しっぽで　たたく。\nどく　じょうたいに　することが　あり\nきゅうしょにも　あたりやすい。"
    jp_kanji: "しっぽで　たたく。\n毒状態に　することが　あり\n急所にも　当たりやすい。"
    en: "The user hits the target with its tail.\nIt may also poison the target.\nCritical hits land more easily."
    fr: "Attaque à taux de critiques élevé.\nPeut aussi empoisonner l’ennemi."
    it: "Chi la usa colpisce con la coda e può\navvelenare il nemico. Probabile brutto\ncolpo."
    de: "Angriff mit hoher Volltrefferquote.\nDiese Schweifattacke vergiftet das\nZiel eventuell."
    es: Puede envenenar y dar un golpe crítico.
    ko: "꼬리로 때린다.\n독 상태로 만들 때가 있고\n급소에도 맞기 쉽다."
pound:
  names:
    jp_kana: はたく
    jp_kanji: はたく
    en: Pound
    fr: Écras’Face
    it: Botta
    de: Pfund
    es: Destructor
    ko: 막치기
  descriptions:
    jp_kana: "ながい　しっぽや　てなどを　つかって\nあいてを　はたいて　こうげきする。"
    jp_kanji: "長い　しっぽや　手などを　使って\n相手を　はたいて　攻撃する。"
    en: "The target is physically pounded with\na long tail or a foreleg, etc."
    fr: "Écrase l’ennemi avec les pattes\navant, la queue, etc."
    it: "Colpisce il nemico con la coda o le zampe\nanteriori."
    de: "Ein Hieb mit den Vorderbeinen\noder dem Schweif."
    es: Golpea con las patas o la cola.
    ko: "긴 꼬리나 손 등을 사용하여\n상대를 때려서 공격한다."
powder_snow:
  names:
    jp_kana: こなゆき
    jp_kanji: こなゆき
    en: Powder Snow
    fr: Poudreuse
    it: Polneve
    de: Pulverschnee
    es: Nieve Polvo
    ko: 눈싸라기
  descriptions:
    jp_kana: "つめたい　こなゆきを\nあいてに　ふきつけて　こうげきする。\nこおり　じょうたいに　することが　ある。"
    jp_kanji: "冷たい　粉雪を\n相手に　吹きつけて　攻撃する。\nこおり状態に　することが　ある。"
    en: "The user attacks with a chilling gust\nof powdery snow.\nIt may also freeze the targets."
    fr: "Le lanceur projette de la neige\npoudreuse. Peut aussi geler l’ennemi."
    it: "Attacca i nemici con una raffica di neve\nfarinosa e può anche congelare."
    de: "Angriff mit Schnee. Gegner wird\neventuell eingefroren."
    es: "Lanza nieve que puede llegar\na congelar."
    ko: "차가운 가랑눈을\n상대에게 내뿜어 공격한다.\n얼음 상태로 만들 때가 있다."
power_gem:
  names:
    jp_kana: パワージェム
    jp_kanji: パワージェム
    en: Power Gem
    fr: Rayon Gemme
    it: Gemmoforza
    de: Juwelenkraft
    es: Joya de Luz
    ko: 파워젬
  descriptions:
    jp_kana: "ほうせきの　ように　きらめく　ひかりを\nはっしゃして　あいてを　こうげきする。"
    jp_kanji: "宝石のように　きらめく　光を\n発射して　相手を　攻撃する。"
    en: "The user attacks with a ray of light that\nsparkles as if it were made of gemstones."
    fr: "Le lanceur attaque avec un rayon de\nlumière qui scintille comme s’il était\ncomposé de gemmes."
    it: "Chi la usa attacca con un raggio di luce\nche brilla come se fosse fatto di pietre\npreziose."
    de: "Anwender attackiert mit einem Lichtstrahl,\nder funkelt, als sei er aus Juwelen."
    es: "Ataca con un rayo de luz que centellea\ncomo si lo formaran miles de joyas."
    ko: "보석처럼 반짝이는 빛을\n발사하여 상대를 공격한다."
power_split:
  names:
    jp_kana: パワーシェア
    jp_kanji: パワーシェア
    en: Power Split
    fr: PartageForce
    it: Pariattacco
    de: Kraftteiler
    es: Isofuerza
    ko: 파워셰어
  descriptions:
    jp_kana: "ちょうのうりょくで　じぶんと　あいての\nこうげきと　とくこうを　たして\nはんぶんに　わける。"
    jp_kanji: "超能力で　自分と　相手の\n攻撃と　特攻を　たして\n半分に　わける。"
    en: "The user employs its psychic power to\naverage its Attack and Sp. Atk stats\nwith those of the target’s."
    fr: "Additionne l’Attaque Spéciale et l’Attaque\ndu lanceur et de sa cible et les\nredistribue équitablement entre les deux."
    it: "Chi la usa sfrutta la sua forza psichica\nper sommare Attacco e Attacco Speciale a\nquelli del bersaglio e dividerli equamente."
    de: "Durch Psycho-Kräfte werden Angriff und\nSpezial-Angriff addiert und in zwei gleiche\nHälften geteilt."
    es: "El usuario emplea sus poderes para hacer\nla media de su Ataque y Ataque Especial\ncon los de su objetivo y compartirlos."
    ko: "초능력으로 자신과 상대의\n공격과 특수공격을 더해서\n반으로 나눈다."
power_swap:
  names:
    jp_kana: パワースワップ
    jp_kanji: パワースワップ
    en: Power Swap
    fr: Permuforce
    it: Barattoforza
    de: Krafttausch
    es: Cambia Fue.
    ko: 파워스웹
  descriptions:
    jp_kana: "ちょうのうりょくで　じぶんと　あいての\nこうげきと　とくこうの\nのうりょく　へんかを　いれかえる。"
    jp_kanji: "超能力で　自分と　相手の\n攻撃と　特攻の\n能力変化を　入れ替える。"
    en: "The user employs its psychic power to\nswitch changes to its Attack and\nSp. Atk with the target."
    fr: "Pouvoir qui échange les modifications\nde l’Attaque Spéciale et de l’Attaque\ndu lanceur avec la cible."
    it: "Chi la usa sfrutta la sua forza psichica\nper scambiare le modifiche ad Attacco e\nAttacco Speciale con il bersaglio."
    de: "Psychische Kräfte tauschen Änderungen\nan Angriff und Spezial-Angriff mit denen\ndes Zieles."
    es: "El usuario emplea su poder mental para\nintercambiar los cambios en Ataque y\nAtaque Especial con el objetivo."
    ko: "초능력으로 자신과 상대의\n공격과 특수공격의\n능력 변화를 교체한다."
power_trick:
  names:
    jp_kana: パワートリック
    jp_kanji: パワートリック
    en: Power Trick
    fr: Astuce Force
    it: Ingannoforza
    de: Krafttrick
    es: Truco Fuerza
    ko: 파워트릭
  descriptions:
    jp_kana: "ちょうのうりょくで\nじぶんの　こうげきと　ぼうぎょの　\nちからを　こうかん　する。"
    jp_kanji: "超能力で\n自分の　攻撃と　防御の　\n力を　交換する。"
    en: "The user employs its psychic power to\nswitch its Attack with its Defense stat."
    fr: "Le lanceur utilise ses pouvoirs psychiques\npour échanger sa stat Défense et sa\nstat Attaque."
    it: "Mossa psichica che permette a chi la usa\ndi scambiare i valori delle sue statistiche\ndi Attacco e Difesa."
    de: "Anwender setzt Psycho-Kräfte ein,\num eigenen Angriffs- mit Verteidigungs-\nWert auszutauschen."
    es: "Usa sus poderes mentales para\nintercambiar su característica de\nAtaque por Defensa."
    ko: "초능력으로\n자신의 공격과 방어의\n힘을 교환한다."
power_whip:
  names:
    jp_kana: パワーウィップ
    jp_kanji: パワーウィップ
    en: Power Whip
    fr: Mégafouet
    it: Vigorcolpo
    de: Blattgeißel
    es: Latigazo
    ko: 파워휩
  descriptions:
    jp_kana: "ツタや　しょくしゅを　はげしく　ふるって\nあいてを　たたきつけ　こうげきする。"
    jp_kanji: "ツタや　触手を　激しく　ふるって\n相手を　たたきつけ　攻撃する。"
    en: "The user violently whirls its vines or\ntentacles to harshly lash the target."
    fr: "Le lanceur fait virevolter violemment\nses lianes ou ses tentacules pour\nfouetter l’ennemi."
    it: "Chi la usa agita violentemente liane o\ntentacoli per sferzare il nemico."
    de: "Anwender wirbelt seine Ranken oder\nTentakel peitschenartig gegen das\nZiel."
    es: "El usuario agita violentamente sus lianas\no tentáculos para golpear al objetivo."
    ko: "덩굴이나 촉수를 세차게 흔들어\n상대를 힘껏 쳐서 공격한다."
present:
  names:
    jp_kana: プレゼント
    jp_kanji: プレゼント
    en: Present
    fr: Cadeau
    it: Regalino
    de: Geschenk
    es: Presente
    ko: 프레젠트
  descriptions:
    jp_kana: "わなを　しかけた　はこを\nあいてに　わたして　こうげきする。ＨＰが\nかいふくして　しまうことも　ある。"
    jp_kanji: "わなを　しかけた　箱を\n相手に　わたして　攻撃する。ＨＰが\n回復して　しまうことも　ある。"
    en: "The user attacks by giving the target a\ngift with a hidden trap. It restores\nHP sometimes, however."
    fr: "Le lanceur attaque en offrant un cadeau\npiégé à la cible. Peut à l’inverse\nrestaurer certains de ses PV."
    it: "Chi la usa dà un regalo bomba al bersaglio.\nA volte, però, può fargli recuperare PS."
    de: "Eine Bombe als Geschenk. Kann auch\nKP des Zieles wiederherstellen."
    es: "Quien lo usa ataca al objetivo dándole\nun regalo con bomba trampa.\nSin embargo, a veces restaura sus PS."
    ko: "덫을 설치한 상자를\n상대에게 건네어 공격한다.\nHP가 회복해버릴 때도 있다."
protect:
  names:
    jp_kana: まもる
    jp_kanji: まもる
    en: Protect
    fr: Abri
    it: Protezione
    de: Schutzschild
    es: Protección
    ko: 방어
  descriptions:
    jp_kana: "あいての　こうげきを\nまったく　うけない。\nれんぞくで　だすと　しっぱい　しやすい。"
    jp_kanji: "相手の　攻撃を\nまったく　受けない。\n連続で　だすと　失敗しやすい。"
    en: "It enables the user to evade all attacks.\nIts chance of failing rises if it is used in\nsuccession."
    fr: "Le lanceur esquive toutes les attaques.\nPlus la capacité est utilisée de fois à la\nsuite, plus elle risque d’échouer."
    it: "Permette di eludere tutti gli attacchi.\nSe usata in successione può fallire."
    de: "Anwender weicht jeder Attacke aus.\nScheitert eventuell bei Wiederholung."
    es: "Frena todos los ataques, pero puede\nfallar si se usa repetidamente."
    ko: "상대의 공격을\n전혀 받지 않는다.\n연속으로 쓰면 실패하기 쉽다."
psybeam:
  names:
    jp_kana: サイケこうせん
    jp_kanji: サイケこうせん
    en: Psybeam
    fr: Rafale Psy
    it: Psicoraggio
    de: Psystrahl
    es: Psicorrayo
    ko: 환상빔
  descriptions:
    jp_kana: "ふしぎな　こうせんを\nあいてに　はっしゃして　こうげきする。\nこんらん　させることが　ある。"
    jp_kanji: "不思議な　光線を\n相手に　発射して　攻撃する。\n混乱させることが　ある。"
    en: "The target is attacked with a peculiar ray.\nIt may also cause confusion."
    fr: "Un étrange rayon frappe l’ennemi.\nPeut aussi le rendre confus."
    it: "Colpisce il nemico con un raggio speciale.\nPuò anche confonderlo."
    de: "Feuert einen Strahl ab, der das\nZiel verwirren kann."
    es: Extraño rayo que puede causar confusión.
    ko: "이상한 광선을\n상대에게 발사하여 공격한다.\n혼란시킬 때가 있다."
psych_up:
  names:
    jp_kana: じこあんじ
    jp_kanji: じこあんじ
    en: Psych Up
    fr: Boost
    it: Psicamisù
    de: Psycho-Plus
    es: Más Psique
    ko: 자기암시
  descriptions:
    jp_kana: "じぶんに　あんじを　かけることで\nのうりょく　へんかの　じょうたいを\nあいてと　おなじにする。"
    jp_kanji: "自分に　暗示を　かけることで\n能力変化の　状態を\n相手と　同じにする。"
    en: "The user hypnotizes itself into\ncopying any stat change made\nby the target."
    fr: "Une autohypnose qui permet au lanceur\nde copier les changements de\nstats de la cible."
    it: "Chi la usa s’ipnotizza per copiare ogni\nmodifica alle statistiche del bersaglio."
    de: "Der Anwender hypnotisiert sich selbst, um\ndie Statusveränderungen des Zieles\nzu kopieren."
    es: "Quien lo usa se hipnotiza y copia\ncualquier cambio que haya en las\ncaracterísticas de su objetivo."
    ko: "자신에게 암시를 걸어서\n능력 변화 상태를\n상대와 똑같은 상태로 만든다."
psychic:
  names:
    jp_kana: サイコキネシス
    jp_kanji: サイコキネシス
    en: Psychic
    fr: Psyko
    it: Psichico
    de: Psychokinese
    es: Psíquico
    ko: 사이코키네시스
  descriptions:
    jp_kana: "つよい　ねんりきを　あいてに　おくって\nこうげきする。あいての　とくぼうを\nさげることが　ある。"
    jp_kanji: "強い　念力を　相手に　送って\n攻撃する。相手の　特防を\nさげることが　ある。"
    en: "The target is hit by a strong telekinetic\nforce. It may also reduce the target’s\nSp. Def stat."
    fr: "Une puissante force télékinésique\nfrappe l’ennemi. Peut aussi faire\nbaisser sa Défense Spéciale."
    it: "Il nemico viene colpito da una potente\nforza telecinetica che può anche ridurne\nla Difesa Speciale."
    de: "Starke Psycho-Attacke, die eventuell die\nSpezial-Verteidigung des Zieles senkt."
    es: "Fuerte ataque telequinético que puede\nbajar la Defensa Especial del objetivo."
    ko: "강한 염동력을 상대에게 보내어\n공격한다. 상대의 특수방어를\n떨어뜨릴 때가 있다."
psycho_boost:
  names:
    jp_kana: サイコブースト
    jp_kanji: サイコブースト
    en: Psycho Boost
    fr: Psycho Boost
    it: Psicoslancio
    de: Psyschub
    es: Psicoataque
    ko: 사이코부스트
  descriptions:
    jp_kana: "フルパワーで　あいてを　こうげきする。\nつかうと　はんどうで\nじぶんの　とくこうが　がくっと　さがる。"
    jp_kanji: "フルパワーで　相手を　攻撃する。\n使うと　反動で\n自分の　特攻が　がくっと　さがる。"
    en: "The user attacks the target at full power.\nThe attack’s recoil harshly reduces the\nuser’s Sp. Atk stat."
    fr: "Attaque l’ennemi à pleine puissance.\nLe contrecoup baisse énormément\nl’Attaque Spéciale du lanceur."
    it: "Chi la usa sferra un potente attacco,\nma il contraccolpo riduce di molto\nil suo Attacco Speciale."
    de: "Angriff mit voller Kraft, der den\nSpezial-Angriff des Anwenders durch\nden Rückstoß stark senkt."
    es: "Ataque en toda regla que baja mucho\nel Ataque Especial de quien lo usa."
    ko: "풀 파워로 상대를 공격한다.\n쓰면 반동으로\n자신의 특수공격이 크게 떨어진다."
psycho_cut:
  names:
    jp_kana: サイコカッター
    jp_kanji: サイコカッター
    en: Psycho Cut
    fr: Coupe Psycho
    it: Psicotaglio
    de: Psychoklinge
    es: Psico-corte
    ko: 사이코커터
  descriptions:
    jp_kana: "じったいか　させた\nこころの　やいばで　あいてを　きりさく。\nきゅうしょに　あたりやすい。"
    jp_kanji: "実体化させた\n心の　刃で　相手を　切り裂く。\n急所に　当たりやすい。"
    en: "The user tears at the target with blades\nformed by psychic power.\nCritical hits land more easily."
    fr: "Le lanceur entaille l’ennemi grâce à des\nlames faites de pouvoir psychique.\nTaux de critiques élevé."
    it: "Chi la usa colpisce il nemico con lame fatte\ndi forza psichica. Probabile brutto colpo."
    de: "Das Ziel wird mit Klingen attackiert,\ndie aus Psycho-Energie bestehen.\nHohe Volltrefferquote."
    es: "Ataca al objetivo con cuchillas formadas\npor energía psíquica.\nSuele ser crítico."
    ko: "실체화시킨\n마음의 칼날로 상대를 베어 가른다.\n급소에 맞기 쉽다."
psycho_shift:
  names:
    jp_kana: サイコシフト
    jp_kanji: サイコシフト
    en: Psycho Shift
    fr: Échange Psy
    it: Psicotrasfer
    de: Psybann
    es: Psico-cambio
    ko: 사이코시프트
  descriptions:
    jp_kana: "ちょうのうりょくで　あんじを　かけて\nじぶんの　うけている　じょうたい\nいじょうを　あいてに　うつす。"
    jp_kanji: "超能力で　暗示を　かけて\n自分の　受けている　状態異常を\n相手に　うつす。"
    en: "Using its psychic power of suggestion,\nthe user transfers its status problems\nto the target."
    fr: "Le lanceur transfère ses problèmes de\nstatut à l’ennemi grâce à son pouvoir\nde suggestion."
    it: "Con la forza psichica e la suggestione,\nchi la usa può trasferire i suoi problemi\ndi stato al Pokémon colpito."
    de: "Anwender nutzt seine Suggestivkräfte, um\neigene Statusprobleme auf das Ziel zu\ntransferieren."
    es: "Usa su poder mental para transferir\nal objetivo sus problemas de estado."
    ko: "초능력으로 암시를 걸어서\n자신에게 걸려 있는 상태 이상을\n상대에게 옮긴다."
psyshock:
  names:
    jp_kana: サイコショック
    jp_kanji: サイコショック
    en: Psyshock
    fr: Choc Psy
    it: Psicoshock
    de: Psychoschock
    es: Psicocarga
    ko: 사이코쇼크
  descriptions:
    jp_kana: "ふしぎな　ねんぱを　じったいかして\nあいてを　こうげきする。\nぶつりてきな　ダメージを　あたえる。"
    jp_kanji: "不思議な　念波を　実体化して\n相手を　攻撃する。\n物理的な　ダメージを　与える。"
    en: "The user materializes an odd\npsychic wave to attack the target.\nThis attack does physical damage."
    fr: "Le lanceur matérialise des ondes\nmystérieuses qu’il projette sur\nl’ennemi. Inflige des dégâts physiques."
    it: "Chi la usa attacca il bersaglio facendo\nmaterializzare un misterioso raggio\npsichico che provoca danni fisici."
    de: "Anwender erzeugt eine seltsame\nEnergiewelle, die dem Ziel\nphysischen Schaden zufügt."
    es: "Crea una onda psíquica que golpea\nal objetivo y provoca un gran daño."
    ko: "이상한 염력파를 실체화해서\n상대를 공격한다.\n물리적인 데미지를 준다."
psystrike:
  names:
    jp_kana: サイコブレイク
    jp_kanji: サイコブレイク
    en: Psystrike
    fr: Frappe Psy
    it: Psicobotta
    de: Psychostoß
    es: Onda Mental
    ko: 사이코브레이크
  descriptions:
    jp_kana: "ふしぎな　ねんぱを　じったいかして\nあいてを　こうげきする。\nぶつりてきな　ダメージを　あたえる。"
    jp_kanji: "不思議な　念波を　実体化して\n相手を　攻撃する。\n物理的な　ダメージを　与える。"
    en: "The user materializes an odd\npsychic wave to attack the target.\nThis attack does physical damage."
    fr: "Le lanceur matérialise des ondes\nmystérieuses qu’il projette sur\nl’ennemi. Inflige des dégâts physiques."
    it: "Chi la usa attacca il bersaglio facendo\nmaterializzare un misterioso raggio\npsichico che provoca danni fisici."
    de: "Anwender erzeugt seltsame Energiewellen,\ndie dem Ziel physischen Schaden\nzufügen."
    es: "Crea una onda psíquica que golpea\nal objetivo provocándole un daño físico."
    ko: "이상한 염력파를 실체화해서\n상대를 공격한다.\n물리적인 데미지를 준다."
psywave:
  names:
    jp_kana: サイコウェーブ
    jp_kanji: サイコウェーブ
    en: Psywave
    fr: Vague Psy
    it: Psiconda
    de: Psywelle
    es: Psicoonda
    ko: 사이코웨이브
  descriptions:
    jp_kana: "ふしぎな　ねんぱを\nあいてに　はっしゃして　こうげきする。\nつかう　たびに　ダメージが　かわる。"
    jp_kanji: "不思議な　念波を\n相手に　発射して　攻撃する。\n使うたびに　ダメージが　変わる。"
    en: "The target is attacked with an odd \npsychic wave.\nThe attack varies in intensity."
    fr: "Une étrange onde d’énergie chaude\nfrappe l’ennemi. Cette attaque est\nd’intensité variable."
    it: "Colpisce il nemico con una strana onda\npsichica. Ha un’intensità variabile."
    de: "Anwender erzeugt eine mysteriöse\nEnergiewelle, deren Intensität von\nMal zu Mal unterschiedlich ausfällt."
    es: "Ataque con una onda de energía\nde intensidad variable."
    ko: "이상한 염력파를\n상대에게 발사하여 공격한다.\n사용할 때마다 데미지가 바뀐다."
punishment:
  names:
    jp_kana: おしおき
    jp_kanji: おしおき
    en: Punishment
    fr: Punition
    it: Punizione
    de: Strafattacke
    es: Castigo
    ko: 혼내기
  descriptions:
    jp_kana: "のうりょく　へんかで\nあいてが　パワーアップ　しているほど\nわざの　いりょくが　あがる。"
    jp_kanji: "能力変化で\n相手が　パワーアップ　しているほど\n技の　威力が　あがる。"
    en: "This attack’s power increases\nthe more the target has powered\nup with stat changes."
    fr: "Plus l’ennemi a utilisé des augmentations\nde stats et plus cette capacité est\npuissante."
    it: "Questa mossa diventa più potente ogni\nvolta che il nemico aumenta le proprie\nstatistiche."
    de: "Je stärker das Ziel durch Status-\nveränderungen ist, desto stärker\nwirkt diese Attacke."
    es: "La fuerza del ataque aumenta cuanto más\nse ha fortalecido el objetivo con cambios\nde características."
    ko: "능력 변화로\n상대가 파워 업 한 만큼\n기술의 위력이 올라간다."
pursuit:
  names:
    jp_kana: おいうち
    jp_kanji: おいうち
    en: Pursuit
    fr: Poursuite
    it: Inseguimento
    de: Verfolgung
    es: Persecución
    ko: 따라가때리기
  descriptions:
    jp_kana: "あいて　ポケモンが　いれかわる　ときに\nわざを　だしていると\nばいの　いりょくで　こうげき　できる。"
    jp_kanji: "相手　ポケモンが　入れ替わるときに\n技を　だしていると\n倍の　威力で　攻撃できる。"
    en: "An attack move that inflicts double damage\nif used on a target that is switching out\nof battle."
    fr: "Une attaque qui inflige deux fois plus de\ndégâts à un ennemi qui quitte le combat."
    it: "Una mossa d’attacco che infligge un danno\ndoppio se il nemico è in fase di\nsostituzione."
    de: "Die Attacke richtet beim Ziel doppelten\nSchaden an, falls es ausgetauscht wird."
    es: "Hace el doble de daño al objetivo que pide\nel relevo."
    ko: "상대 포켓몬이 교체될 때\n기술을 쓰면 2배의 위력으로\n공격할 수 있다."
quash:
  names:
    jp_kana: さきおくり
    jp_kanji: さきおくり
    en: Quash
    fr: À la Queue
    it: Spintone
    de: Verzögerung
    es: Último Lugar
    ko: 순서미루기
  descriptions:
    jp_kana: "あいてを　おさえつけて\nこうどうの　じゅんばんを\nさいごに　する。"
    jp_kanji: "相手を　おさえつけて\n行動の　順番を\n最後に　する。"
    en: "The user suppresses the target and\nmakes its move go last."
    fr: "Retient la cible de force,\nl’obligeant à agir en dernier."
    it: "Chi la usa trattiene il bersaglio,\ncostringendolo ad agire per ultimo."
    de: "Anwender stemmt sich gegen das Ziel\nund bewirkt, dass dieses erst als\nLetztes angreift."
    es: "El usuario intimida a su objetivo logrando\nque su movimiento sea el último del turno."
    ko: "상대를 억눌러서\n행동의 순서를\n마지막으로 만든다."
quick_attack:
  names:
    jp_kana: でんこうせっか
    jp_kanji: でんこうせっか
    en: Quick Attack
    fr: Vive-Attaque
    it: Att. Rapido
    de: Ruckzuckhieb
    es: At. Rápido
    ko: 전광석화
  descriptions:
    jp_kana: "めにも　とまらぬ　ものすごい　はやさで\nあいてに　つっこむ。\nかならず　せんせい　こうげき　できる。"
    jp_kanji: "目にも　留まらぬ　ものすごい　速さで\n相手に　つっこむ。\n必ず　先制攻撃　できる。"
    en: "The user lunges at the target at a speed\nthat makes it almost invisible. It is sure\nto strike first."
    fr: "Le lanceur fonce sur l’ennemi si rapidement\nqu’on parvient à peine à le discerner.\nFrappe en premier."
    it: "Chi la usa colpisce sempre per primo e\nad una tale velocità da rendersi quasi\ninvisibile."
    de: "Sehr schneller Angriff mit\nErstschlaggarantie."
    es: "Ataque rápido que permite golpear\nen primer lugar."
    ko: "눈에 보이지 않는 굉장한 속도로\n상대에게 돌진한다.\n반드시 선제공격할 수 있다."
quick_guard:
  names:
    jp_kana: ファストガード
    jp_kanji: ファストガード
    en: Quick Guard
    fr: Prévention
    it: Anticipo
    de: Rapidschutz
    es: Anticipo
    ko: 퍼스트가드
  descriptions:
    jp_kana: "じぶんと　みかたを　あいての\nせんせい　こうげきから　まもる。\nれんぞくで　だすと　しっぱい　しやすい。"
    jp_kanji: "自分と　味方を　相手の\n先制攻撃から　守る。\n連続で　だすと　失敗しやすい。"
    en: "The user protects itself and its allies\nfrom priority moves. If used in\nsuccession, its chance of failing rises."
    fr: "Le lanceur et son équipe sont protégés\ncontre les attaques prioritaires. Peut\néchouer si utilisée plusieurs fois de suite."
    it: "Chi la usa protegge tutta la squadra dalle\nmosse dei nemici che fanno colpire per\nprimi. Se usata in successione può fallire."
    de: "Schützt Anwender und Mitstreiter vor\ngegnerischen Erstschlag-Attacken.\nGeht bei wiederholtem Einsatz oft daneben."
    es: "Protege a todo el equipo de ataques que\nse adelantan. Puede fallar si se utiliza\nrepetidamente."
    ko: "자신과 같은 편을 상대의\n선제공격으로부터 지킨다.\n연속으로 쓰면 실패하기 쉽다."
quiver_dance:
  names:
    jp_kana: ちょうのまい
    jp_kanji: ちょうのまい
    en: Quiver Dance
    fr: Papillodanse
    it: Eledanza
    de: Falterreigen
    es: Danza Aleteo
    ko: 나비춤
  descriptions:
    jp_kana: "しんぴてきで　うつくしい　まいを\nかろやかに　おどる。じぶんの　とくこうと\nとくぼうと　すばやさを　あげる。"
    jp_kanji: "神秘的で　美しい　舞を\n軽やかに　おどる。自分の　特攻と\n特防と　素早さを　あげる。"
    en: "The user lightly performs a beautiful,\nmystic dance. It boosts the user’s\nSp. Atk, Sp. Def, and Speed stats."
    fr: "Une danse mystique dont le rythme parfait\naugmente l’Attaque Spéciale, la Défense\nSpéciale et la Vitesse du lanceur."
    it: "Danza leggiadra ed elegante che aumenta\nl’Attacco Speciale, la Difesa Speciale\ne la Velocità di chi la usa."
    de: "Anwender legt behände einen mystischen,\nformvollendeten Tanz aufs Parkett. Spez.-\nAng., Spez.-Vert. und Initiative steigen."
    es: "Danza mística que sube el Ataque Especial,\nla Defensa Especial y la Velocidad."
    ko: "신비롭고 아름다운 춤을\n경쾌하게 춘다. 자신의 특수공격과\n특수방어와 스피드를 올린다."
rage:
  names:
    jp_kana: いかり
    jp_kanji: いかり
    en: Rage
    fr: Frénésie
    it: Ira
    de: Raserei
    es: Furia
    ko: 분노
  descriptions:
    jp_kana: "わざを　だしたときに　こうげきを\nうけると　いかりの　ちからで\nこうげきが　あがる。"
    jp_kanji: "技を　だしたときに　攻撃を\n受けると　怒りの　力で\n攻撃が　あがる。"
    en: "As long as this move is in use, the power\nof rage raises the Attack stat each\ntime the user is hit in battle."
    fr: "Une fois activée, cette capacité augmente\nl’Attaque du lanceur à mesure que celui-ci\nsubit des attaques."
    it: "Questa mossa ha il potere di aumentare\nla statistica Attacco ogni volta che chi\nla usa viene colpito durante una lotta."
    de: "Erhöht Angriff des Anwenders, wenn \ndieser getroffen wird, solange die\nAttacke aktiviert ist."
    es: "Al usarse, aumenta el Ataque del\nusuario cada vez que es golpeado."
    ko: "기술을 썼을 때 공격을\n받으면 분노의 힘으로\n공격이 올라간다."
rage_powder:
  names:
    jp_kana: いかりのこな
    jp_kanji: いかりのこな
    en: Rage Powder
    fr: PoudreFureur
    it: Polverabbia
    de: Wutpulver
    es: Polvo Ira
    ko: 분노가루
  descriptions:
    jp_kana: "イライラさせる　こなを　じぶんに\nふりかけて　ちゅういを　ひく。あいての\nこうげきを　すべて　じぶんに　むける。"
    jp_kanji: "イライラさせる　粉を　自分に\nふりかけて　注意を　ひく。相手の\n攻撃を　すべて　自分に　むける。"
    en: "The user scatters a cloud of irritating\npowder to draw attention to itself.\nOpponents aim only at the user."
    fr: "Le lanceur s’asperge d’une poudre\nirritante pour attirer l’attention. Il\nattire toutes les attaques ennemies."
    it: "Chi la usa attira l’attenzione dei nemici\ncospargendosi di una polvere irritante e\ndiventando bersaglio di tutti gli attacchi."
    de: "Anwender zieht gegn. Aufmerksamkeit\nund Angriffe auf sich, indem er ein Wut\nerzeugendes Pulver über sich streut."
    es: "Usa un polvo que irrita y centra\nen el usuario la atención y los\nataques de los rivales."
    ko: "안절부절못하게 하는 가루를\n자신에게 뿌려서 주의를 끈다.\n상대의 공격은 모두 자신에게 향한다."
rain_dance:
  names:
    jp_kana: あまごい
    jp_kanji: あまごい
    en: Rain Dance
    fr: Danse Pluie
    it: Pioggiadanza
    de: Regentanz
    es: Danza Lluvia
    ko: 비바라기
  descriptions:
    jp_kana: "５ターンの　あいだ　あめを　ふらせて\nみずタイプの\nわざの　いりょくを　あげる。"
    jp_kanji: "５ターンの　あいだ　雨を　降らせて\nみずタイプの\n技の　威力を　あげる。"
    en: "The user summons a heavy rain\nthat falls for five turns,\npowering up Water-type moves."
    fr: "Invoque de fortes pluies qui durent\n5 tours et améliorent les capacités\nde type Eau."
    it: "Chi la usa provoca una forte pioggia per\ncinque turni, potenziando le mosse di\ntipo Acqua."
    de: "Anwender erzeugt starken Regen.\nDie Stärke von Wasser-Attacken\nerhöht sich fünf Runden lang."
    es: "Genera una fuerte lluvia que refuerza\nlos movimientos de tipo Agua durante\ncinco turnos."
    ko: "5턴 동안 비를 내리게 하여\n물타입 기술의\n위력을 올린다."
rapid_spin:
  names:
    jp_kana: こうそくスピン
    jp_kanji: こうそくスピン
    en: Rapid Spin
    fr: Tour Rapide
    it: Rapigiro
    de: Turbodreher
    es: Giro Rápido
    ko: 고속스핀
  descriptions:
    jp_kana: "かいてんして　あいてを　こうげきする。\nしめつける　まきつく　やどりぎのタネ\nまきびし　なども　ふきとばせる。"
    jp_kanji: "回転して　相手を　攻撃する。\nしめつける　まきつく　やどりぎのタネ\nまきびし　なども　吹きとばせる。"
    en: "A spin attack that can also eliminate\nsuch moves as Bind, Wrap, Leech Seed,\nand Spikes."
    fr: "Une attaque tournoyante pouvant aussi\nannuler par ex. Étreinte, Ligotage,\nVampigraine ou Picots."
    it: "Attacco rotante che elimina gli effetti di\nmosse come Legatutto, Avvolgibotta, Punte\ne Parassiseme."
    de: "Trifft das Ziel mit einer Dreh-Attacke.\nBefreit sich unter anderem von Wickel,\nKlammergriff, Egelsamen und Stachler."
    es: "Ataque giratorio que puede eliminar\nmovimientos como Atadura,\nRepetición, Drenadoras y Púas."
    ko: "회전해서 상대를 공격한다.\n조이기, 김밥말이, 씨뿌리기,\n압정뿌리기 등도 날려버린다."
razor_leaf:
  names:
    jp_kana: はっぱカッター
    jp_kanji: はっぱカッター
    en: Razor Leaf
    fr: Tranch’Herbe
    it: Foglielama
    de: Rasierblatt
    es: Hoja Afilada
    ko: 잎날가르기
  descriptions:
    jp_kana: "はっぱを　とばして　\nあいてを　きりつけて　こうげきする。\nきゅうしょに　あたりやすい。"
    jp_kanji: "はっぱを　とばして　\n相手を　切りつけて　攻撃する。\n急所に　当たりやすい。"
    en: "Sharp-edged leaves are launched\nto slash at the opposing team.\nCritical hits land more easily."
    fr: "Des feuilles aiguisées comme des\nrasoirs entaillent l’ennemi.\nTaux de critiques élevé."
    it: "Foglie taglienti sferzano i nemici.\nProbabile brutto colpo."
    de: "Trifft das Ziel mit Blättern.\nHohe Volltrefferquote."
    es: "Corta con hojas afiladas.\nSuele ser crítico."
    ko: "잎사귀를 날려\n상대를 베어 공격한다.\n급소에 맞기 쉽다."
razor_shell:
  names:
    jp_kana: シェルブレード
    jp_kanji: シェルブレード
    en: Razor Shell
    fr: Coquilame
    it: Conchilama
    de: Kalkklinge
    es: Concha Filo
    ko: 셸블레이드
  descriptions:
    jp_kana: "するどい　かいがらで　きりつけて\nこうげきする。あいての　ぼうぎょを\nさげることが　ある。"
    jp_kanji: "鋭い　貝殻で　切りつけて\n攻撃する。相手の　防御を\nさげることが　ある。"
    en: "The user cuts its target with sharp\nshells. This attack may also lower the\ntarget’s Defense stat."
    fr: "Un coquillage aiguisé lacère l’ennemi.\nPeut aussi baisser sa Défense."
    it: "Chi la usa colpisce il bersaglio con il suo\nguscio affilato. Il colpo può anche ridurre\nla Difesa del bersaglio."
    de: "Schneideangriff mit einer scharfen\nMuschelschale. Senkt eventuell die\nVerteidigung des Zieles."
    es: "Una afilada vieira ataca al objetivo.\nTambién puede hacer disminuir su Defensa."
    ko: "날카로운 조개껍질로 베어\n공격한다. 상대의 방어를\n떨어뜨릴 때가 있다."
razor_wind:
  names:
    jp_kana: かまいたち
    jp_kanji: かまいたち
    en: Razor Wind
    fr: Coupe-Vent
    it: Ventagliente
    de: Klingensturm
    es: V. Cortante
    ko: 칼바람
  descriptions:
    jp_kana: "かぜの　やいばを　つくり\n２ターンめに　あいてを　こうげきする。\nきゅうしょに　あたりやすい。"
    jp_kanji: "風の　刃を　つくり\n２ターン目に　相手を　攻撃する。\n急所に　当たりやすい。"
    en: "A two-turn attack. Blades of wind hit\nopposing Pokémon on the second turn.\nCritical hits land more easily."
    fr: "Attaque en 2 tours.\nDes lames de vent frappent l’ennemi au\n2ᵉ tour. Taux de critiques élevé."
    it: "Chi la usa genera un turbine al primo\nturno e attacca al secondo.\nProbabile brutto colpo."
    de: "Eine Attacke, die über zwei Runden\ngeht. Hohe Volltrefferquote."
    es: "Primero se prepara y en el segundo turno\nataca al oponente con ráfagas de viento\ncortante. Alta probabilidad de ser crítico."
    ko: "바람의 칼날을 만들어\n2턴째에 상대를 공격한다.\n급소에 맞기 쉽다."
recover:
  names:
    jp_kana: じこさいせい
    jp_kanji: じこさいせい
    en: Recover
    fr: Soin
    it: Ripresa
    de: Genesung
    es: Recuperación
    ko: HP회복
  descriptions:
    jp_kana: "さいぼうを　さいせい　させて\nじぶんの　さいだい　ＨＰの\nはんぶんの　ＨＰを　かいふく　する。"
    jp_kanji: "細胞を　再生させて\n自分の　最大ＨＰの\n半分の　ＨＰを　回復する。"
    en: "Restoring its own cells, the user\nrestores its own HP by half of\nits max HP."
    fr: "Un soin qui permet au lanceur de récupérer\njusqu’à la moitié de ses PV max."
    it: "Mossa autocurativa. Chi la usa recupera\nmetà dei PS massimi."
    de: "Eine Selbstheilung. KP des Anwenders\nwerden um 50 % des maximalen Wertes\naufgefüllt."
    es: Restaura hasta la mitad de los PS máximos.
    ko: "세포를 재생시켜\n자신의 최대 HP의\n절반만큼 HP를 회복한다."
recycle:
  names:
    jp_kana: リサイクル
    jp_kanji: リサイクル
    en: Recycle
    fr: Recyclage
    it: Riciclo
    de: Aufbereitung
    es: Reciclaje
    ko: 리사이클
  descriptions:
    jp_kana: "せんとうちゅうに　つかって　なくなった\nじぶんの　もちものを　さいせい　させて\nつかえるように　する。"
    jp_kanji: "戦闘中に　使って　なくなった\n自分の　持ち物を　再生させて\n使えるように　する。"
    en: "The user recycles a held item that\nhas been used in battle so it can be\nused again."
    fr: "Recycle un objet tenu à usage unique\ndéjà utilisé lors du combat pour pouvoir\nl’utiliser à nouveau."
    it: "Chi la usa ricicla uno strumento tenuto,\ngià usato nella lotta, e lo può riutilizzare."
    de: "Recycling eines getragenen Items, das\nzuvor im Kampf verwendet wurde."
    es: "Recicla y así recupera el objeto\nequipado de un solo uso que ya\nha sido empleado en el combate."
    ko: "배틀 중에 사용하여 없어진\n자신의 지닌 물건을 재생시켜\n사용할 수 있게 한다."
reflect:
  names:
    jp_kana: リフレクター
    jp_kanji: リフレクター
    en: Reflect
    fr: Protection
    it: Riflesso
    de: Reflektor
    es: Reflejo
    ko: 리플렉터
  descriptions:
    jp_kana: "５ターンの　あいだ　ふしぎな　かべで\nあいてから　うける　ぶつり　こうげきの\nダメージを　よわめる。"
    jp_kanji: "５ターンの　あいだ　不思議な　かべで\n相手から　受ける　物理攻撃の\nダメージを　弱める。"
    en: "A wondrous wall of light is put up to\nsuppress damage from physical attacks\nfor five turns."
    fr: "Un fabuleux mur de lumière qui réduit les\ndégâts causés par les attaques physiques\ndurant 5 tours."
    it: "Innalza una barriera di luce fantastica\nper ridurre i danni degli attacchi fisici\nalla squadra per cinque turni."
    de: "Eine mysteriöse Wand, die fünf Runden den\nSchaden von physischen gegnerischen\nTreffern reduziert."
    es: "Pared de luz que reduce durante\ncinco turnos el daño producido\npor los ataques físicos."
    ko: "5턴 동안 이상한 장막으로\n상대로부터 받는 물리공격의\n데미지를 약하게 한다."
reflect_type:
  names:
    jp_kana: ミラータイプ
    jp_kanji: ミラータイプ
    en: Reflect Type
    fr: Copie Type
    it: Riflettipo
    de: Typenspiegel
    es: Clonatipo
    ko: 미러타입
  descriptions:
    jp_kana: "あいての　タイプを　はんしゃして\nじぶんも　おなじ　タイプに　なる。"
    jp_kanji: "相手の　タイプを　反射して\n自分も　同じ　タイプに　なる。"
    en: "The user reflects the target’s type,\nmaking it the same type as the target."
    fr: "Le lanceur copie le type de la cible\net devient du même type."
    it: "Chi la usa cambia il proprio tipo in quello\ndel bersaglio."
    de: "Anwender bildet das Ziel nach und\nnimmt dabei dessen Typ an."
    es: "Cambia el tipo del Pokémon al mismo\ntipo que el del objetivo."
    ko: "상대의 타입을 반사해서\n자신도 똑같은 타입이 된다."
refresh:
  names:
    jp_kana: リフレッシュ
    jp_kanji: リフレッシュ
    en: Refresh
    fr: Régénération
    it: Rinfrescata
    de: Heilung
    es: Alivio
    ko: 리프레쉬
  descriptions:
    jp_kana: "からだを　やすめて　じぶんが　おっている\nどく　まひ　やけどの\nじょうたい　いじょうを　なおす。"
    jp_kanji: "体を　やすめて　自分が　おっている\n毒　まひ　やけどの\n状態異常を　治す。"
    en: "The user rests to cure itself of a\npoisoning, burn, or paralysis."
    fr: "Le lanceur se repose pour guérir\nd’un empoisonnement, d’une brûlure\nou d’une paralysie."
    it: "Chi la usa riposa per curarsi da\navvelenamento, paralisi e scottatura."
    de: "Selbstheilung bei Vergiftung,\nParalyse und Verbrennung."
    es: "Descansa para curar parálisis,\nenvenenamiento o quemaduras."
    ko: "몸을 쉬게 하여 자신이 입은\n독, 마비, 화상의\n상태 이상을 치료한다."
relic_song:
  names:
    jp_kana: いにしえのうた
    jp_kanji: いにしえのうた
    en: Relic Song
    fr: ChantAntique
    it: Cantoantico
    de: Urgesang
    es: Cantoarcaico
    ko: 옛노래
  descriptions:
    jp_kana: "いにしえのうたを　あいてに　きかせて\nこころに　うったえて　こうげきする。\nねむり　じょうたいに　することが　ある。"
    jp_kanji: "いにしえのうたを　相手に　聞かせて\n心に　うったえて　攻撃する。\n眠り状態に　することが　ある。"
    en: "The user sings an ancient song and attacks\nby appealing to the hearts of those\nlistening. It may also induce sleep."
    fr: "Le lanceur attaque l’ennemi en lui\nchantant une chanson d’un autre temps.\nPeut endormir l’ennemi."
    it: "Chi la usa attacca i nemici intonando\nun’antica melodia che colpisce il loro\nspirito. Può anche farli addormentare."
    de: "Anwender greift mit Urgesang an, der\nGegner in der Nähe im tiefsten Inneren\nanspricht. Diese schlafen eventuell ein."
    es: "Ataca conmoviendo a los rivales de\nalrededor con un antiguo canto.\nPuede dormirlos."
    ko: "옛노래를 상대에게 들려주고\n마음에 호소하여 공격한다.\n잠듦 상태로 만들 때가 있다."
rest:
  names:
    jp_kana: ねむる
    jp_kanji: ねむる
    en: Rest
    fr: Repos
    it: Riposo
    de: Erholung
    es: Descanso
    ko: 잠자기
  descriptions:
    jp_kana: "２ターンの　あいだ　ねむり　つづける。\nじぶんの　ＨＰと　じょうたいいじょうを\nすべて　かいふく　する。"
    jp_kanji: "２ターンの　あいだ　眠り続ける。\n自分の　ＨＰと　状態異常を\nすべて　回復する。"
    en: "The user goes to sleep for two turns.\nIt fully restores the user’s HP and heals\nany status problem."
    fr: "Le lanceur dort pendant 2 tours. Il\nregagne tous ses PV et n’a plus de\nproblèmes de statut."
    it: "Chi la usa dorme per due turni.\nRecupera, però, tutti i PS e risolve\ntutti i suoi problemi di stato."
    de: "Anwender wird vollkommen\ngeheilt und schläft die\nfolgenden zwei Runden."
    es: "Restaura todos los PS y cura todos los\nproblemas de estado del usuario.\nDuerme los dos próximos turnos."
    ko: "2턴 동안 계속 잠잔다.\n자신의 HP와 상태 이상을\n모두 회복한다."
retaliate:
  names:
    jp_kana: かたきうち
    jp_kanji: かたきうち
    en: Retaliate
    fr: Vengeance
    it: Nemesi
    de: Heimzahlung
    es: Represalia
    ko: 원수갚기
  descriptions:
    jp_kana: "たおれた　みかたの　かたきを　うつ。\nまえの　ターンに　みかたが　たおされて\nいると　いりょくが　あがる。"
    jp_kanji: "倒れた　味方の　かたきを　討つ。\n前の　ターンに　味方が\n倒されていると　威力が　あがる。"
    en: "The user gets revenge for a fainted ally.\nIf an ally fainted in the previous turn,\nthis attack’s damage increases."
    fr: "Venge un Pokémon de l’équipe mis K.O.\nSi un Pokémon de l’équipe a été mis\nK.O. au tour d’avant, l’effet augmente."
    it: "Vendica un compagno messo KO. Se ciò è\naccaduto al turno precedente, il danno\nè maggiore."
    de: "Anwender nimmt Rache für einen besiegten\nMitstreiter. Wurde in der vorigen Runde ein\nMitstreiter besiegt, steigt die Kraft."
    es: "Venga a los amigos derrotados. Si en el\nturno anterior han derrotado a uno,\nla potencia del ataque aumentará."
    ko: "쓰러진 같은 편의 원수를 갚는다.\n앞 턴에서 같은 편이\n쓰러졌다면 위력이 올라간다."
return:
  names:
    jp_kana: おんがえし
    jp_kanji: おんがえし
    en: Return
    fr: Retour
    it: Ritorno
    de: Rückkehr
    es: Retroceso
    ko: 은혜갚기
  descriptions:
    jp_kana: "トレーナーの　ために　ぜんりょくで\nあいてを　こうげきする。\nなついて　いるほど　いりょくは　あがる。"
    jp_kanji: "トレーナーの　ために　全力で\n相手を　攻撃する。\nなついているほど　威力は　あがる。"
    en: "A full-power attack that grows more\npowerful the more the user likes\nits Trainer."
    fr: "Une attaque furieuse dont la puissance\naugmente quand le Pokémon apprécie\nson Dresseur."
    it: "Mossa che diventa tanto più potente\nquanto maggiore è il grado di affezione\ndel Pokémon per il proprio Allenatore."
    de: "Angriff, dessen Kraft bei Freundschaft\nzum Trainer größer wird."
    es: "Cuanto mayor sea la amistad con el\nEntrenador, más poderoso será\neste ataque."
    ko: "트레이너를 위해 전력으로\n상대를 공격한다.\n친밀할수록 위력이 올라간다."
revenge:
  names:
    jp_kana: リベンジ
    jp_kanji: リベンジ
    en: Revenge
    fr: Vendetta
    it: Vendetta
    de: Vergeltung
    es: Desquite
    ko: 리벤지
  descriptions:
    jp_kana: "あいてから　わざを　うけていると\nその　あいてに　たいして\nあたえる　ダメージが　２ばいに　なる。"
    jp_kanji: "相手から　技を　受けていると\nその相手に　対して\n与える　ダメージが　２倍に　なる。"
    en: "An attack move that inflicts double the\ndamage if the user has been hurt by the\nopponent in the same turn."
    fr: "Une attaque deux fois plus puissante\nsi le lanceur a été blessé par l’ennemi\ndurant ce tour."
    it: "Mossa d’attacco che infligge un danno\ndoppio se si è stati colpiti dal nemico\nnello stesso turno."
    de: "Schaden verdoppelt sich, wenn Anwender\nin der Runde bereits Schaden vom Ziel des\nAngriffes genommen hat."
    es: "Ataque que produce el doble de daño si\nel usuario es herido en el mismo turno."
    ko: "상대에게 기술을 받으면\n그 상대에게 주는 데미지가\n2배가 된다."
reversal:
  names:
    jp_kana: きしかいせい
    jp_kanji: きしかいせい
    en: Reversal
    fr: Contre
    it: Contropiede
    de: Gegenschlag
    es: Inversión
    ko: 기사회생
  descriptions:
    jp_kana: "ちからを　ふりしぼり　こうげきする。\nじぶんの　ＨＰが　すくないほど\nわざの　いりょくは　あがる。"
    jp_kanji: "力を　ふりしぼり　攻撃する。\n自分の　ＨＰが　少ないほど\n技の　威力は　あがる。"
    en: "An all-out attack that becomes more\npowerful the less HP the user has."
    fr: "Le lanceur ne retient plus ses coups. Plus\nses PV sont bas et plus l’attaque est\npuissante."
    it: "Chi la usa attacca con tutte le sue forze.\nPiù i PS sono bassi, maggiore è la potenza\ndi questa mossa."
    de: "Richtet mehr Schaden an,\nwenn eigene KP niedrig sind."
    es: "Ataque desesperado que causa\nmás daño cuantos menos PS\ntenga el usuario."
    ko: "힘을 쥐어짜서 공격한다.\n자신의 HP가 적을수록\n기술의 위력이 올라간다."
roar:
  names:
    jp_kana: ほえる
    jp_kanji: ほえる
    en: Roar
    fr: Hurlement
    it: Boato
    de: Brüller
    es: Rugido
    ko: 울부짖기
  descriptions:
    jp_kana: "あいてを　にがして\nひかえの　ポケモンを　ひきずりだす。\nやせいの　ばあいは　せんとうが　おわる。"
    jp_kanji: "相手を　逃がして\n控えの　ポケモンを　ひきずりだす。\n野生の　場合は　戦闘が　終わる。"
    en: "The target is scared off and replaced by\nanother Pokémon in its party. In the\nwild, the battle ends."
    fr: "Effraie le Pokémon ennemi et\nle remplace par un autre. Dans\nla nature, met fin au combat."
    it: "Il bersaglio è costretto a lasciare\nil campo e viene sostituito. Mette fine\nalle lotte contro Pokémon selvatici."
    de: "Verjagt das Ziel und ersetzt es\ndurch ein anderes Pokémon.\nBeendet den Kampf in der Wildnis."
    es: "Se lleva al objetivo, que es cambiado\npor otro Pokémon. Si es un Pokémon\nsalvaje, acaba el combate."
    ko: "상대를 도망가게 해서\n교대할 포켓몬을 끌어낸다.\n야생의 경우에는 배틀이 끝난다."
roar_of_time:
  names:
    jp_kana: ときのほうこう
    jp_kanji: ときのほうこう
    en: Roar of Time
    fr: Hurle-Temps
    it: Fragortempo
    de: Zeitenlärm
    es: Distorsión
    ko: 시간의포효
  descriptions:
    jp_kana: "じかんが　ゆがむほどの　ちからを\nうちだして　あいてを　こうげきする。\nつぎの　ターンは　うごけなく　なる。"
    jp_kanji: "時間が　ゆがむほどの　力を\nうちだして　相手を　攻撃する。\n次の　ターンは　動けなくなる。"
    en: "The user blasts the target with power\nthat distorts even time.\nThe user must rest on the next turn."
    fr: "Le lanceur frappe si fort qu’il affecte\nle cours du temps. Il se repose au\ntour suivant."
    it: "Chi la usa colpisce il nemico con una forza\ncapace di alterare il tempo, ma deve stare\nfermo il turno dopo."
    de: "Anwender attackiert mit einer Kraft, die\nselbst die Zeit verzerrt. In der nächsten\nRunde muss er ruhen."
    es: "Ataca al objetivo usando tal energía\nque el tiempo se distorsiona.\nEl usuario descansa el siguiente turno."
    ko: "시간이 뒤틀릴 정도의 힘을\n사용해서 상대를 공격한다.\n다음 턴은 움직일 수 없다."
rock_blast:
  names:
    jp_kana: ロックブラスト
    jp_kanji: ロックブラスト
    en: Rock Blast
    fr: Boule Roc
    it: Cadutamassi
    de: Felswurf
    es: Pedrada
    ko: 락블레스트
  descriptions:
    jp_kana: "かたい　がんせきを\nあいてに　はっしゃして　こうげきする。\n２ー５かいの　あいだ　れんぞくで　だす。"
    jp_kanji: "硬い　岩石を\n相手に　発射して　攻撃する。\n２ー５回の　あいだ　連続で　だす。"
    en: "The user hurls hard rocks at the target.\nTwo to five rocks are launched in quick\nsuccession."
    fr: "Le lanceur projette un rocher sur\nl’ennemi de 2 à 5 fois d’affilée."
    it: "Colpisce il nemico con dei massi pesanti\nlanciati in rapida successione. Il numero\ndi massi varia da due a cinque."
    de: "Wirft 2- bis 5-mal in Folge Felsblöcke\nauf das Ziel."
    es: "Lanza pedruscos al objetivo de dos a cinco\nveces consecutivas."
    ko: "단단한 암석을\n상대에게 발사하여 공격한다.\n2-5회 동안 연속으로 쓴다."
rock_climb:
  names:
    jp_kana: ロッククライム
    jp_kanji: ロッククライム
    en: Rock Climb
    fr: Escalade
    it: Scalaroccia
    de: Kraxler
    es: Treparrocas
    ko: 락클라임
  descriptions:
    jp_kana: "すごい　いきおいで　あいてに\nつっこみ　こうげきする。\nあいてを　こんらん　させることが　ある。"
    jp_kanji: "すごい　勢いで　相手に\nつっこみ　攻撃する。\n相手を　混乱させることが　ある。"
    en: "The user attacks the target by smashing\ninto it with incredible force.\nIt may also confuse the target."
    fr: "Le lanceur se jette violemment sur\nl’ennemi. Peut aussi le rendre confus."
    it: "Chi la usa carica con impeto incredibile.\nIl colpo può confondere il nemico."
    de: "Eine stürmische Attacke, die das Ziel\neventuell verwirrt."
    es: "Ataca con una gran embestida.\nPuede confundir al objetivo."
    ko: "굉장한 기세로 상대에게\n돌진하여 공격한다.\n상대를 혼란시킬 때가 있다."
rock_polish:
  names:
    jp_kana: ロックカット
    jp_kanji: ロックカット
    en: Rock Polish
    fr: Poliroche
    it: Lucidatura
    de: Steinpolitur
    es: Pulimento
    ko: 록커트
  descriptions:
    jp_kana: "じぶんの　からだを　みがいて　くうきの\nていこうを　すくなくする。すばやさを\nぐーんと　あげることが　できる。"
    jp_kanji: "自分の　体を　磨いて　空気の\n抵抗を　少なくする。素早さを\nぐーんと　あげることが　できる。"
    en: "The user polishes its body to reduce drag.\nIt can sharply raise the Speed stat."
    fr: "Le lanceur polit son corps pour\ndiminuer sa résistance au vent.\nAugmente fortement la Vitesse."
    it: "Chi la usa leviga il proprio corpo per\nridurne l’attrito. Aumenta di molto\nla Velocità."
    de: "Anwender reduziert so gut wie möglich\nden Luftwiderstand. Kann Initiative-Wert\nstark steigern."
    es: "Reduce la resistencia puliendo su cuerpo.\nAumenta la Velocidad considerablemente."
    ko: "자신의 몸을 닦아 공기의\n저항을 적게 한다. 스피드를\n크게 올릴 수 있다."
rock_slide:
  names:
    jp_kana: いわなだれ
    jp_kanji: いわなだれ
    en: Rock Slide
    fr: Éboulement
    it: Frana
    de: Steinhagel
    es: Avalancha
    ko: 스톤샤워
  descriptions:
    jp_kana: "おおきな　いわを\nはげしく　ぶつけて　こうげきする。\nあいてを　ひるませる　ことが　ある。"
    jp_kanji: "大きな　岩を\n激しく　ぶつけて　攻撃する。\n相手を　ひるませることが　ある。"
    en: "Large boulders are hurled at the opposing\nteam to inflict damage. It may also make\nthe targets flinch."
    fr: "Envoie de gros rochers sur l’ennemi\npour infliger des dégâts.\nPeut aussi l’apeurer."
    it: "I nemici vengono colpiti da grandi massi\nche possono anche farli tentennare."
    de: "Schleudert riesige Felsen auf\nGegner in der Umgebung, die\neventuell zurückschrecken."
    es: "Lanza grandes pedruscos.\nPuede hacer retroceder al objetivo."
    ko: "큰 바위를\n세차게 부딪쳐서 공격한다.\n상대를 풀죽게 만들 때가 있다."
rock_smash:
  names:
    jp_kana: いわくだき
    jp_kanji: いわくだき
    en: Rock Smash
    fr: Éclate-Roc
    it: Spaccaroccia
    de: Zertrümmerer
    es: Golpe Roca
    ko: 바위깨기
  descriptions:
    jp_kana: "いわを　くだくような\nパンチで　こうげきする。あいての\nぼうぎょを　さげる　ことが　ある。"
    jp_kanji: "岩をも　くだくような\nパンチで　攻撃する。相手の\n防御を　さげる　ことが　ある。"
    en: "The user attacks with a punch that can\nshatter a rock. It may also lower the\ntarget’s Defense stat."
    fr: "Porte un coup dévastateur à l’ennemi.\nPeut briser des rochers fissurés.\nPeut baisser la Défense."
    it: "Il nemico viene colpito da un pugno in\ngrado di frantumare anche la roccia.\nPuò anche ridurne la Difesa."
    de: "Steinbrechende Attacke, die den\nVerteidigungs-Wert des Zieles\nsenken kann."
    es: "Ataca con puñetazos que pueden\nromper rocas. Puede bajar\nla Defensa del objetivo."
    ko: "바위를 깨는 듯한\n펀치로 공격한다. 상대의\n방어를 떨어뜨릴 때가 있다."
rock_throw:
  names:
    jp_kana: いわおとし
    jp_kanji: いわおとし
    en: Rock Throw
    fr: Jet-Pierres
    it: Sassata
    de: Steinwurf
    es: Lanzarrocas
    ko: 돌떨구기
  descriptions:
    jp_kana: "ちいさな　いわを　もちあげて\nあいてに　なげつけて　こうげきする。"
    jp_kanji: "小さな　岩を　持ちあげて\n相手に　投げつけて　攻撃する。"
    en: "The user picks up and throws a small\nrock at the target to attack."
    fr: "Le lanceur lâche une\npierre sur l’ennemi."
    it: "Chi la usa solleva una roccia e la\nlancia contro il nemico."
    de: "Das Ziel wird mit einem kleinen\nStein beworfen."
    es: Tira una pequeña roca al objetivo.
    ko: "작은 바위를 들어올려\n상대에게 내던져서 공격한다."
rock_tomb:
  names:
    jp_kana: がんせきふうじ
    jp_kanji: がんせきふうじ
    en: Rock Tomb
    fr: Tomberoche
    it: Rocciotomba
    de: Felsgrab
    es: Tumba Rocas
    ko: 암석봉인
  descriptions:
    jp_kana: "がんせきを　なげつけて　こうげきする。\nあいての　うごきを　ふうじることで\nすばやさを　さげる。"
    jp_kanji: "岩石を　投げつけて　攻撃する。\n相手の　動きを　封じることで\n素早さを　さげる。"
    en: "Boulders are hurled at the target. It also\nlowers the target’s Speed by preventing\nits movement."
    fr: "Des rochers frappent l’ennemi. Réduit\naussi sa Vitesse en l’empêchant\nde se déplacer."
    it: "Colpisce il nemico con rocce. Inoltre,\nlo rallenta riducendone la Velocità."
    de: "Angriff mit Felsen. Bei Erfolg wird der\nInitiative-Wert des Zieles gesenkt."
    es: "Tira rocas que detienen al objetivo y\nbajan su Velocidad."
    ko: "암석을 내던져서 공격한다.\n상대의 움직임을 봉인함으로써\n스피드를 떨어뜨린다."
rock_wrecker:
  names:
    jp_kana: がんせきほう
    jp_kanji: がんせきほう
    en: Rock Wrecker
    fr: Roc-Boulet
    it: Devastomasso
    de: Felswerfer
    es: Romperrocas
    ko: 암석포
  descriptions:
    jp_kana: "きょだいな　いわを\nあいてに　はっしゃして　こうげきする。\nつぎの　ターンは　うごけなく　なる。"
    jp_kanji: "巨大な　岩を\n相手に　発射して　攻撃する。\n次の　ターンは　動けなくなる。"
    en: "The user launches a huge boulder at the\ntarget to attack. It must rest on the\nnext turn, however."
    fr: "Le lanceur attaque en projetant un\ngros rocher sur l’ennemi. Il doit se\nreposer au tour suivant."
    it: "Chi la usa attacca il nemico con un enorme\nmasso, ma si deve riposare al turno\nsuccessivo."
    de: "Anwender wirft einen riesigen Felsen auf\ndas Ziel. In der nächsten Runde muss\nder Anwender ruhen."
    es: "Lanza una piedra enorme contra\nel objetivo, pero tiene que descansar\nel siguiente turno."
    ko: "거대한 바위를\n상대에게 발사하여 공격한다.\n다음 턴은 움직일 수 없게 된다."
role_play:
  names:
    jp_kana: なりきり
    jp_kanji: なりきり
    en: Role Play
    fr: Imitation
    it: Giocodiruolo
    de: Rollentausch
    es: Imitación
    ko: 역할
  descriptions:
    jp_kana: "あいてに　なりきって　じぶんも　あいてと\nおなじ　とくせいに　へんかする。"
    jp_kanji: "相手に　なりきって　自分も　相手と\n同じ　特性に　変化する。"
    en: "The user mimics the target completely,\ncopying the target’s natural Ability."
    fr: "Imite la cible et copie\nsa capacité spéciale."
    it: "Chi la usa mima in tutto il bersaglio,\ncopiandone l’abilità."
    de: "Parodiert das Ziel und kopiert seine\nFähigkeit."
    es: "Imita al objetivo por completo y copia\nsu habilidad."
    ko: "상대의 역할을 하여 자신도 상대와\n같은 특성으로 변화한다."
rolling_kick:
  names:
    jp_kana: まわしげり
    jp_kanji: まわしげり
    en: Rolling Kick
    fr: Mawashi Geri
    it: Calciorullo
    de: Fegekick
    es: Patada Giro
    ko: 돌려차기
  descriptions:
    jp_kana: "からだを　すばやく　かいてん　させながら\nあいてを　けとばして　こうげきする。"
    jp_kanji: "体を　素早く　回転させながら\n相手を　けとばして　攻撃する。"
    en: "The user lashes out with a quick, spinning\nkick. It may also make the target flinch."
    fr: "Le lanceur effectue un coup de pied\ntournoyant et extrêmement rapide.\nPeut apeurer l’ennemi."
    it: "Chi la usa infierisce sul nemico con\nun calcio rotante. Può anche farlo\ntentennare."
    de: "Heftiger Tritt aus einer schnellen\nDrehbewegung. Lässt das Ziel\neventuell zurückschrecken."
    es: "Una patada rápida y circular.\nTambién puede hacer retroceder\nal objetivo."
    ko: "몸을 재빨리 회전시키며\n상대를 걷어차서 공격한다."
rollout:
  names:
    jp_kana: ころがる
    jp_kanji: ころがる
    en: Rollout
    fr: Roulade
    it: Rotolamento
    de: Walzer
    es: Desenrollar
    ko: 구르기
  descriptions:
    jp_kana: "５ターンの　あいだ　ころがりつづけて\nこうげきする。わざが　あたる　たびに\nいりょくが　あがる。"
    jp_kanji: "５ターンの　あいだ　転がり続けて\n攻撃する。技が　当たるたびに\n威力が　あがる。"
    en: "The user continually rolls into the target\nover five turns. It becomes stronger\neach time it hits."
    fr: "Un rocher roule sur l’ennemi pendant 5\ntours. L’attaque gagne en puissance\nà chaque coup."
    it: "Chi la usa colpisce il nemico rotolando\nper cinque turni, con aumento progressivo\ndella potenza ogni volta che va a segno."
    de: "Attacke, die fünf Runden dauert.\nDie Härte nimmt von Mal zu Mal zu."
    es: "El atacante rueda contra el objetivo\ndurante cinco turnos, cada vez\ncon mayor fuerza."
    ko: "5턴 동안 구르기를 반복하여\n공격한다. 기술이 맞을 때마다\n위력이 올라간다."
roost:
  names:
    jp_kana: はねやすめ
    jp_kanji: はねやすめ
    en: Roost
    fr: Atterrissage
    it: Trespolo
    de: Ruheort
    es: Respiro
    ko: 날개쉬기
  descriptions:
    jp_kana: "じめんに　おりて　からだを　やすめる。\nさいだい　ＨＰの　はんぶんの\nＨＰを　かいふく　する。"
    jp_kanji: "地面に　降りて　体を　やすめる。\n最大ＨＰの　半分の\nＨＰを　回復する。"
    en: "The user lands and rests its body.\nIt restores the user’s HP by up to\nhalf of its max HP."
    fr: "Le lanceur atterrit et se repose.\nRestaure jusqu’à la moitié\nde ses PV max."
    it: "Chi la usa sta fermo e riposa, recuperando\nmetà dei propri PS massimi."
    de: "Anwender landet und ruht sich aus.\nKP des Anwenders werden um 50 %\nder maximalen KP aufgefüllt."
    es: "Aterriza sobre la superficie para\ndescansar. Recupera hasta la\nmitad del total de sus PS."
    ko: "땅에 내려와 몸을 쉬게 한다.\n최대 HP의 절반만큼\nHP를 회복한다."
round:
  names:
    jp_kana: りんしょう
    jp_kanji: りんしょう
    en: Round
    fr: Chant Canon
    it: Coro
    de: Kanon
    es: Canon
    ko: 돌림노래
  descriptions:
    jp_kana: "うたで　あいてを　こうげきする。\nみんなで　りんしょう　すると　つづけて\nだすことが　でき　いりょくも　あがる。"
    jp_kanji: "歌で　相手を　攻撃する。\nみんなで　輪唱すると　続けて\nだすことが　でき　威力も　あがる。"
    en: "The user attacks the target with a song.\nOthers can join in the Round and make\nthe attack do greater damage."
    fr: "Le lanceur attaque l’ennemi en chantant.\nSi plusieurs Pokémon déclenchent cette\nattaque à la suite, l’effet augmente."
    it: "Attacca il bersaglio con una melodia.\nSe usata ripetutamente da uno o più\nPokémon i danni inflitti aumentano."
    de: "Angriff mit Gesang. Singt der Anwender\nmit allen im Kanon, steigt die Stärke."
    es: "Un canto que ataca al objetivo.\nCuantos más Pokémon lo usan,\nmás aumenta de potencia."
    ko: "노래로 상대를 공격한다.\n함께 돌림노래를 하면 계속해서\n쓸 수 있고 위력도 올라간다."
sacred_fire:
  names:
    jp_kana: せいなるほのお
    jp_kanji: せいなるほのお
    en: Sacred Fire
    fr: Feu Sacré
    it: Magifuoco
    de: Läuterfeuer
    es: Fuegosagrado
    ko: 성스러운불꽃
  descriptions:
    jp_kana: "しんぴの　ほのおで\nあいてを　やきつくして　こうげきする。\nやけど　じょうたいに　することが　ある。"
    jp_kanji: "神秘の　炎で\n相手を　焼きつくして　攻撃する。\nやけど状態に　することが　ある。"
    en: "The target is razed with a mystical fire\nof great intensity. It may also leave the\ntarget with a burn."
    fr: "Un feu mystique d’une intensité\nredoutable attaque l’ennemi.\nPeut aussi le brûler."
    it: "Colpisce il nemico con un fuoco mistico di\nenorme intensità che può anche causargli\nuna scottatura."
    de: "Mystische Feuer-Attacke, durch die\ndas Ziel eventuell Verbrennungen\nerleidet."
    es: "Fuego místico de gran intensidad\nque puede causar quemaduras."
    ko: "신비한 불꽃으로\n상대를 태워서 공격한다.\n화상 상태로 만들 때가 있다."
sacred_sword:
  names:
    jp_kana: せいなるつるぎ
    jp_kanji: せいなるつるぎ
    en: Sacred Sword
    fr: Lame Sainte
    it: Spadasolenne
    de: Sanctoklinge
    es: Espadasanta
    ko: 성스러운칼
  descriptions:
    jp_kana: "ながい　つので　きりつけて　こうげきする。\nあいての　のうりょく　へんかに　\nかんけいなく　ダメージを　あたえる。"
    jp_kanji: "長い　つので　切りつけて　攻撃する。\n相手の　能力変化に　\n関係なく　ダメージを　与える。"
    en: "The user attacks by slicing with its long\nhorns. The target’s stat changes\ndon’t affect this attack’s damage."
    fr: "Un coup de lame violent qui lacère\nl’ennemi et lui inflige des dégâts quels\nque soient ses changements de stats."
    it: "Chi la usa taglia il nemico con una spada\nmagica. Il danno inflitto ignora le modifiche\nalle statistiche del bersaglio."
    de: "Schneideangriff mit langem Horn.\nRichtet Schaden unabhängig von\nStatusveränderungen des Zieles an."
    es: "El usuario ataca con una espada,\nignorando cualquier cambio en\nlas características del objetivo."
    ko: "긴 뿔로 베어 공격한다.\n상대의 능력 변화에\n관계없이 데미지를 준다."
safeguard:
  names:
    jp_kana: しんぴのまもり
    jp_kanji: しんぴのまもり
    en: Safeguard
    fr: Rune Protect
    it: Salvaguardia
    de: Bodyguard
    es: Velo Sagrado
    ko: 신비의부적
  descriptions:
    jp_kana: "５ターンの　あいだ\nふしぎな　ちからに　まもられて\nじょうたい　いじょうに　ならなくなる。"
    jp_kanji: "５ターンの　あいだ\n不思議な　力に　守られて\n状態異常に　ならなくなる。"
    en: "The user creates a protective field that\nprevents status problems for five turns."
    fr: "Champ protecteur empêchant tous les\nproblèmes de statut pendant 5 tours."
    it: "Chi la usa crea un campo protettivo che\ndifende tutta la squadra dai problemi di\nstato per cinque turni."
    de: "Team des Anwenders ist fünf Runden\nvor Statusproblemen geschützt."
    es: "Crea un campo protector que evita\nproblemas de estado durante cinco turnos."
    ko: "5턴 동안\n이상한 힘의 보호를 받아\n상태 이상이 되지 않는다."
sand_attack:
  names:
    jp_kana: すなかけ
    jp_kanji: すなかけ
    en: Sand-Attack
    fr: Jet de Sable
    it: Turbosabbia
    de: Sandwirbel
    es: Ataque Arena
    ko: 모래뿌리기
  descriptions:
    jp_kana: "あいての　かおに　すなを　かけて　\nめいちゅうりつを　さげる。"
    jp_kanji: "相手の　顔に　砂を　かけて　\n命中率を　さげる。"
    en: "Sand is hurled in the target’s face,\nreducing its accuracy."
    fr: "Lance du sable au visage de l’ennemi\npour baisser sa Précision."
    it: "Getta sabbia in faccia al nemico e ne\nriduce la precisione."
    de: "Senkt Genauigkeit des Zieles,\nindem ihm Sand ins Gesicht\ngeworfen wird."
    es: Arroja arena a la cara y baja la Precisión.
    ko: "상대의 얼굴에 모래를 뿌려서\n명중률을 떨어뜨린다."
sand_tomb:
  names:
    jp_kana: すなじごく
    jp_kanji: すなじごく
    en: Sand Tomb
    fr: Tourbi-Sable
    it: Sabbiotomba
    de: Sandgrab
    es: Bucle Arena
    ko: 모래지옥
  descriptions:
    jp_kana: "はげしく　ふきあれる　すなあらしの\nなかに　４ー５ターンの　あいだ\nあいてを　とじこめて　こうげきする。"
    jp_kanji: "激しく　吹きあれる　砂あらしの\n中に　４ー５ターンの　あいだ\n相手を　閉じこめて　攻撃する。"
    en: "The user traps the target inside a harshly\nraging sandstorm for four to five turns."
    fr: "Le lanceur emprisonne l’ennemi dans\nune tempête de sable terrifiante qui\ndure de 4 à 5 tours."
    it: "Chi la usa intrappola il nemico in un turbine\ndi sabbia per quattro o cinque turni."
    de: "Das Ziel leidet für 4 bis 5\nRunden in einer Sandhose."
    es: "Enreda al objetivo en un remolino de arena\nde cuatro a cinco turnos."
    ko: "세차게 불어대는\n모래바람 속에 4-5턴 동안\n상대를 가두어 공격한다."
sandstorm:
  names:
    jp_kana: すなあらし
    jp_kanji: すなあらし
    en: Sandstorm
    fr: Tempêtesable
    it: Terrempesta
    de: Sandsturm
    es: Torm. Arena
    ko: 모래바람
  descriptions:
    jp_kana: "５ターンの　あいだ　すなあらしで\nいわ　じめん　はがねタイプ　いがいの\nポケモンに　ダメージを　あたえる。"
    jp_kanji: "５ターンの　あいだ　砂あらしで\nいわ　じめん　はがねタイプ　以外の\nポケモンに　ダメージを　与える。"
    en: "A five-turn sandstorm is summoned\nto hurt all combatants except the\nRock, Ground, and Steel types."
    fr: "Une tempête de sable de 5 tours\nqui blesse tous les Pokémon sauf\nles types Roche, Sol et Acier."
    it: "Causa una tempesta di sabbia per cinque\nturni che danneggia tutti i tipi in campo\nesclusi Terra, Roccia e Acciaio."
    de: "Sandsturm für fünf Runden. Fügt Pokémon\nvon jedem Typ außer Gestein, Boden und\nStahl Schaden zu."
    es: "Tormenta de arena que dura cinco\nturnos y hiere a todos, excepto\na los de tipo Roca, Tierra y Acero."
    ko: "5턴 동안 모래바람으로\n바위, 땅, 강철타입 이외의\n포켓몬에게 데미지를 준다."
scald:
  names:
    jp_kana: ねっとう
    jp_kanji: ねっとう
    en: Scald
    fr: Ébullition
    it: Idrovampata
    de: Siedewasser
    es: Escaldar
    ko: 열탕
  descriptions:
    jp_kana: "あつく　にえたぎる　みずを\nあいてに　はっしゃして　こうげきする。\nやけど　じょうたいに　することが　ある。"
    jp_kanji: "熱く　煮えたぎる　水を\n相手に　発射して　攻撃する。\nやけど状態に　することが　ある。"
    en: "The user shoots boiling hot water at\nits target. It may also leave the target\nwith a burn."
    fr: "L’ennemi est attaqué par un jet d’eau\nbouillante. Peut aussi le brûler."
    it: "Chi la usa attacca il bersaglio con un\ngetto d’acqua bollente che può anche\nscottarlo."
    de: "Heizt dem Ziel mit einem Schwall siedend\nheißen Kochwassers ein. Das Ziel\nerleidet eventuell Verbrennungen."
    es: "Ataca arrojando agua hirviendo\nal objetivo.\nPuede causar quemaduras."
    ko: "뜨겁게 끓어오르는 물을\n상대에게 발사해서 공격한다.\n화상 상태로 만들 때가 있다."
scary_face:
  names:
    jp_kana: こわいかお
    jp_kanji: こわいかお
    en: Scary Face
    fr: Grimace
    it: Visotruce
    de: Grimasse
    es: Cara Susto
    ko: 겁나는얼굴
  descriptions:
    jp_kana: "おそろしい　かおで　にらみ　おびえさせて\nあいての　すばやさを　がくっと　さげる。"
    jp_kanji: "恐ろしい　顔で　にらみ　おびえさせて\n相手の　素早さを　がくっと　さげる。"
    en: "The user frightens the target with a scary\nface to harshly reduce its Speed stat."
    fr: "Une grimace qui effraie l’ennemi et\nréduit fortement sa Vitesse."
    it: "Chi la usa spaventa il nemico con una\nfaccia terribile e ne riduce di molto\nla Velocità."
    de: "Jagt dem Ziel mit einer Grimasse\nAngst ein. Dessen Initiative-Wert\nsinkt stark."
    es: "Asusta al objetivo para reducir mucho\nsu Velocidad."
    ko: "무서운 얼굴로 노려보고 겁주어\n상대의 스피드를 크게 떨어뜨린다."
scratch:
  names:
    jp_kana: ひっかく
    jp_kanji: ひっかく
    en: Scratch
    fr: Griffe
    it: Graffio
    de: Kratzer
    es: Arañazo
    ko: 할퀴기
  descriptions:
    jp_kana: "かたく　とがった　するどい　ツメで\nあいてを　ひっかいて　こうげきする。"
    jp_kanji: "硬く　とがった　鋭い　ツメで\n相手を　ひっかいて　攻撃する。"
    en: "Hard, pointed, and sharp claws rake\nthe target to inflict damage."
    fr: "Lacère l’ennemi avec des griffes acérées\npour lui infliger des dégâts."
    it: "Infligge danni al nemico con artigli\nacuminati, duri e affilati."
    de: "Das Ziel wird mit scharfen\nKlauen zerkratzt."
    es: Araña con afiladas garras.
    ko: "단단하고 뾰족한 날카로운 손톱으로\n상대를 할퀴어서 공격한다."
screech:
  names:
    jp_kana: いやなおと
    jp_kanji: いやなおと
    en: Screech
    fr: Grincement
    it: Stridio
    de: Kreideschrei
    es: Chirrido
    ko: 싫은소리
  descriptions:
    jp_kana: "おもわず　みみを　ふさぎたくなる\nいやなおとを　だして\nあいての　ぼうぎょを　がくっと　さげる。"
    jp_kanji: "おもわず　耳を　ふさぎたくなる\nいやなおとを　だして\n相手の　防御を　がくっと　さげる。"
    en: "An earsplitting screech harshly reduces\nthe target’s Defense stat."
    fr: "Cri strident qui baisse beaucoup\nla Défense ennemie."
    it: "Stridio assordante che riduce di molto\nla Difesa del nemico."
    de: "Stößt einen Schrei aus, um die\nVerteidigung des Zieles stark\nzu senken."
    es: "Alarido agudo que reduce mucho\nla Defensa del objetivo."
    ko: "그만 귀를 막아버리고 싶은\n싫은 소리를 내어\n상대의 방어를 크게 떨어뜨린다."
searing_shot:
  names:
    jp_kana: かえんだん
    jp_kanji: かえんだん
    en: Searing Shot
    fr: Incendie
    it: Sparafuoco
    de: Flammenball
    es: Bomba Ígnea
    ko: 화염탄
  descriptions:
    jp_kana: "まっかな　ほのおで　じぶんの\nまわりに　いるものを　こうげきする\nやけど　じょうたいに　することが　ある。"
    jp_kanji: "真っ赤な　炎で　自分の\n周りに　いるものを　攻撃する。\nやけど状態に　することが　ある。"
    en: "An inferno of scarlet flames torches\neverything around the user. It may\nleave targets with a burn."
    fr: "Des flammes rougeoyantes s’abattent\nsur tous les Pokémon autour du lanceur.\nPeut aussi brûler."
    it: "Chi la usa lancia fiamme scarlatte sui\nPokémon intorno a sé. Può anche scottare."
    de: "Greift alles in seiner Umgebung mit\ntiefroten Flammen an. Opfer erleidet\neventuell Verbrennungen."
    es: "Un infierno de llamas daña a los Pokémon\nde alrededor en combate. Puede quemar."
    ko: "새빨간 불꽃으로 자신의\n주위에 있는 포켓몬을 공격한다.\n화상 상태로 만들 때가 있다."
secret_power:
  names:
    jp_kana: ひみつのちから
    jp_kanji: ひみつのちから
    en: Secret Power
    fr: Force Cachée
    it: Forzasegreta
    de: Geheimpower
    es: Daño Secreto
    ko: 비밀의힘
  descriptions:
    jp_kana: "ひみつの　ちからで　\nあいてを　こうげきする。つかう　ばしょで\nついかこうかが　へんかする。"
    jp_kanji: "秘密の　力で　\n相手を　攻撃する。使う　場所で\n追加効果が　変化する。"
    en: "The user attacks the target with a\nsecret power. Its added effects vary\ndepending on the user’s environment."
    fr: "Les effets de cette attaque varient en\nfonction de l’environnement."
    it: "Attacco che può avere un effetto\naggiuntivo a seconda del luogo\nin cui si trova chi lo usa."
    de: "Angriff, der abhängig vom Anwendungsort\neinen unterschiedlichen Zusatzeffekt\nbesitzt."
    es: "Ataque con poder secreto cuyos efectos\nsecundarios varían según el entorno\nde combate."
    ko: "비밀의 힘으로 상대를\n공격한다. 사용 장소에 따라\n추가 효과가 변화한다."
secret_sword:
  names:
    jp_kana: しんぴのつるぎ
    jp_kanji: しんぴのつるぎ
    en: Secret Sword
    fr: Lame Ointe
    it: Spadamistica
    de: Mystoschwert
    es: Sablemístico
    ko: 신비의칼
  descriptions:
    jp_kana: "ながい　つので　きりつけて　こうげきする。\nつのが　まとった　ふしぎな　ちからは\nぶつりてきな　ダメージを　あたえる。"
    jp_kanji: "長い　つので　切りつけて　攻撃する。\nつのが　まとった　不思議な　力は\n物理的な　ダメージを　与える。"
    en: "The user cuts with its long horn. The odd\npower contained in the horn does physical\ndamage to the target."
    fr: "L’ennemi est lacéré par une longue lame.\nLe pouvoir mystérieux de la lame inflige\ndes dégâts physiques."
    it: "Chi la usa attacca il bersaglio tagliandolo\ncon una spada mistica. La misteriosa\nenergia sprigionata provoca danni fisici."
    de: "Schneideangriff mit dem langen Schwert des\nAnwenders. Die mysteriöse Kraft aus dem\nHorn erzeugt physischen Schaden."
    es: "Ensarta al objetivo con un sable,\nhiriéndolo con su místico poder."
    ko: "긴 뿔로 베어 공격한다.\n뿔이 머금은 이상한 힘은\n물리적인 데미지를 준다."
seed_bomb:
  names:
    jp_kana: タネばくだん
    jp_kanji: タネばくだん
    en: Seed Bomb
    fr: Canon Graine
    it: Semebomba
    de: Samenbomben
    es: Bomba Germen
    ko: 씨폭탄
  descriptions:
    jp_kana: "かたい　からを　もつ　おおきな　タネを\nうえから　たたきつけて\nあいてを　こうげきする。"
    jp_kanji: "硬い　殻を　もつ　大きな　タネを\n上から　たたきつけて\n相手を　攻撃する。"
    en: "The user slams a barrage of hard-shelled\nseeds down on the target from above."
    fr: "Le lanceur fait pleuvoir un déluge\nde graines solides sur l’ennemi."
    it: "Chi la usa emette una raffica di semi dal\nguscio duro che colpiscono il nemico\ndall’alto."
    de: "Anwender lässt eine Menge Samen\nmit harter Schale von oben auf das\nZiel fallen."
    es: "Lanza al objetivo una descarga de\nsemillas explosivas desde arriba."
    ko: "단단한 껍질을 가지고 있는\n큰 씨앗을 힘껏 내던져\n상대를 공격한다."
seed_flare:
  names:
    jp_kana: シードフレア
    jp_kanji: シードフレア
    en: Seed Flare
    fr: Fulmigraine
    it: Infuriaseme
    de: Schocksamen
    es: Fogonazo
    ko: 시드플레어
  descriptions:
    jp_kana: "からだの　なかから　しょうげきはを\nはっせい　させる。あいての　とくぼうを\nがくっと　さげることが　ある。"
    jp_kanji: "体の　中から　衝撃波を\n発生させる。相手の　特防を　\nがくっと　さげることが　ある。"
    en: "The user emits a shock wave from\nits body to attack its target. It may\nharshly lower the target’s Sp. Def."
    fr: "Le corps du lanceur émet une onde de\nchoc. Peut aussi baisser grandement\nla Défense Spéciale de la cible."
    it: "Chi la usa genera un’onda d’urto dal\nsuo corpo. Può anche ridurre di molto\nla Difesa Speciale del bersaglio."
    de: "Anwender erzeugt eine Schockwelle.\nSpezial-Verteidigung des Zieles wird\nstark gesenkt."
    es: "Una onda de choque se libera del cuerpo.\nPuede bajar severamente la Defensa\nEspecial del objetivo."
    ko: "몸속에서 충격파를\n발생시킨다. 상대의 특수방어를\n크게 떨어뜨릴 때가 있다."
seismic_toss:
  names:
    jp_kana: ちきゅうなげ
    jp_kanji: ちきゅうなげ
    en: Seismic Toss
    fr: Frappe Atlas
    it: Mov. Sismico
    de: Geowurf
    es: Mov. Sísmico
    ko: 지구던지기
  descriptions:
    jp_kana: "いんりょくを　つかい　なげとばす。\nじぶんの　レベルと　おなじ　ダメージを\nあいてに　あたえる。"
    jp_kanji: "引力を　使い　投げとばす。\n自分の　レベルと　同じ　ダメージを\n相手に　与える。"
    en: "The target is thrown using the power of\ngravity. It inflicts damage equal to\nthe user’s level."
    fr: "L’ennemi est projeté grâce au pouvoir de\nla gravité. Inflige des dégâts équivalents\nau niveau du lanceur."
    it: "Colpisce il bersaglio con la forza di\ngravità. Infligge un danno pari al livello\ndi chi la usa."
    de: "Ziel wird mit der Kraft der Gravitation\numgeworfen. Richtet Schaden gemäß Level\ndes Angreifers an."
    es: "La gravedad derriba al objetivo.\nSe restarán tantos PS como nivel\ntenga el agresor."
    ko: "인력을 사용해 내던진다.\n자신의 레벨과 똑같은 데미지를\n상대에게 준다."
self_destruct:
  names:
    jp_kana: じばく
    jp_kanji: じばく
    en: Selfdestruct
    fr: Destruction
    it: Autodistruz.
    de: Finale
    es: Autodestruc
    ko: 자폭
  descriptions:
    jp_kana: "ばくはつを　おこして　じぶんの\nまわりに　いるものを　こうげきする。\nつかった　あとに　ひんしに　なる。"
    jp_kanji: "爆発を　おこして　自分の\n周りに　いるものを　攻撃する。\n使ったあとに　ひんしに　なる。"
    en: "The user attacks everything around it\nby causing an explosion.\nThe user faints upon using this move."
    fr: "Le lanceur explose en blessant\ntous les Pokémon autour de lui.\nLe lanceur tombe K.O."
    it: "Chi la usa esplode e infligge danni agli\naltri Pokémon in campo, ma poi va KO."
    de: "Anwender sprengt sich, richtet\nrundum Riesenschaden an und\nwird dabei besiegt."
    es: "El atacante explota y hiere\na todos a su alrededor.\nEl usuario se debilita de inmediato."
    ko: "폭발을 일으켜서 자신의\n주위에 있는 포켓몬을 공격한다.\n쓰고 나서 기절하게 된다."
shadow_ball:
  names:
    jp_kana: シャドーボール
    jp_kanji: シャドーボール
    en: Shadow Ball
    fr: Ball’Ombre
    it: Palla Ombra
    de: Spukball
    es: Bola Sombra
    ko: 섀도볼
  descriptions:
    jp_kana: "くろいかげの　かたまりを　なげつけて\nこうげきする。あいての　とくぼうを\nさげることが　ある。"
    jp_kanji: "黒い影の　塊を　投げつけて\n攻撃する。相手の　特防を\nさげることが　ある。"
    en: "The user hurls a shadowy blob at the\ntarget. It may also lower the target’s\nSp. Def stat."
    fr: "Projette une grande ombre sur\nl’ennemi. Peut aussi faire baisser\nsa Défense Spéciale."
    it: "Lancia sul nemico una sfera nera.\nPuò anche ridurne la Difesa Speciale."
    de: "Bewirft das Ziel mit gruseligem Ball und\nsenkt eventuell die Spezial-Verteidigung."
    es: "Lanza una bola oscura que puede bajar\nla Defensa Especial del objetivo."
    ko: "까만 그림자의 덩어리를 내던져서\n공격한다. 상대의 특수방어를\n떨어뜨릴 때가 있다."
shadow_claw:
  names:
    jp_kana: シャドークロー
    jp_kanji: シャドークロー
    en: Shadow Claw
    fr: Griffe Ombre
    it: Ombrartigli
    de: Dunkelklaue
    es: Garra Umbría
    ko: 섀도크루
  descriptions:
    jp_kana: "かげから　つくった　するどい　ツメで\nあいてを　きりさく。\nきゅうしょに　あたりやすい。"
    jp_kanji: "影から　つくった　鋭い　ツメで\n相手を　切り裂く。\n急所に　当たりやすい。"
    en: "The user slashes with a sharp claw made\nfrom shadows.\nCritical hits land more easily."
    fr: "Attaque avec une griffe puissante faite\nd’ombres. Taux de critiques élevé."
    it: "Chi la usa attacca con artigli d’ombra\nche colpiscono con gran forza. Probabile\nbrutto colpo."
    de: "Das Ziel wird mit scharfen Klauen\naus der Schattenwelt attackiert.\nHohe Volltrefferquote."
    es: "Ataca con una garra afilada hecha\nde sombras.\nSuele ser crítico."
    ko: "그림자로 만든 날카로운 발톱으로\n상대를 베어 가른다.\n급소에 맞기 쉽다."
shadow_force:
  names:
    jp_kana: シャドーダイブ
    jp_kanji: シャドーダイブ
    en: Shadow Force
    fr: Revenant
    it: Oscurotuffo
    de: Schemenkraft
    es: Golpe Umbrío
    ko: 섀도다이브
  descriptions:
    jp_kana: "１ターンめで　すがたを　けして\n２ターンめに　あいてを　こうげきする。\nまもっていても　こうげきは　あたる。"
    jp_kanji: "１ターン目で　姿を　消して\n２ターン目に　相手を　攻撃する。\n守っていても　攻撃は　当たる。"
    en: "The user disappears, then strikes the\ntarget on the second turn.\nIt hits even if the target protects itself."
    fr: "Le lanceur disparaît et frappe l’ennemi\nau second tour. Fonctionne même si\nl’ennemi se protège."
    it: "Chi la usa sparisce e poi colpisce il nemico\nal turno successivo. Evita pure Protezione\no Individua."
    de: "Anwender verschwindet in Runde 1 und\nattackiert in Runde 2. Trifft auch, wenn\nsich das Ziel selbst schützt."
    es: "En el primer turno, desaparece.\nEn el segundo, golpea al objetivo\naunque se esté protegiendo."
    ko: "1턴째에 모습을 감춰\n2턴째에 상대를 공격한다.\n방어하고 있어도 공격은 맞는다."
shadow_punch:
  names:
    jp_kana: シャドーパンチ
    jp_kanji: シャドーパンチ
    en: Shadow Punch
    fr: Poing Ombre
    it: Pugnodombra
    de: Finsterfaust
    es: Puño Sombra
    ko: 섀도펀치
  descriptions:
    jp_kana: "かげに　まぎれて　パンチを　くりだす。\nこうげきは　かならず　めいちゅう　する。"
    jp_kanji: "影に　まぎれて　パンチを　くりだす。\n攻撃は　必ず　命中する。"
    en: "The user throws a punch from the shadows.\nThe punch lands without fail."
    fr: "Le lanceur surgit des ombres et donne\nun coup de poing. N’échoue jamais."
    it: "Il nemico riceve un pugno proveniente\ndalle tenebre. Questa mossa è infallibile."
    de: "Angriff mit der Faust aus dem\nSchattenreich. Ausweichen\nunmöglich."
    es: "Puñetazo ineludible procedente\nde las sombras."
    ko: "그림자에 섞여 펀치를 날린다.\n공격은 반드시 명중한다."
shadow_sneak:
  names:
    jp_kana: かげうち
    jp_kanji: かげうち
    en: Shadow Sneak
    fr: Ombre Portée
    it: Furtivombra
    de: Schattenstoß
    es: Sombra Vil
    ko: 야습
  descriptions:
    jp_kana: "かげを　のばして\nあいての　はいごから　こうげきする。\nかならず　せんせい　こうげき　できる。"
    jp_kanji: "影を　のばして\n相手の　背後から　攻撃する。\n必ず　先制攻撃　できる。"
    en: "The user extends its shadow and attacks\nthe target from behind.\nThis move always goes first."
    fr: "Le lanceur étend son ombre pour frapper\npar derrière. Frappe toujours en premier."
    it: "Chi la usa estende la sua ombra e attacca\nil nemico alle spalle. Con questa mossa\nsi colpisce per primi."
    de: "Anwender erweitert Schatten und\ngreift das Ziel von hinten an.\nErstschlaggarantie."
    es: "Extiende su sombra y ataca al objetivo\npor la espalda.\nEste movimiento siempre va primero."
    ko: "그림자를 늘려\n상대의 배후에서 공격한다.\n반드시 선제공격할 수 있다."
sharpen:
  names:
    jp_kana: かくばる
    jp_kanji: かくばる
    en: Sharpen
    fr: Affûtage
    it: Affilatore
    de: Schärfer
    es: Afilar
    ko: 각지기
  descriptions:
    jp_kana: "からだの　かどを　ふやして\nカクカクに　なることで\nじぶんの　こうげきを　あげる。"
    jp_kanji: "体の　かどを　増やして\nカクカクに　なることで\n自分の　攻撃を　あげる。"
    en: "The user reduces its polygon count to\nmake itself more jagged, raising the\nAttack stat."
    fr: "Le lanceur réduit son nombre de polygones\npour accentuer ses angles et augmenter\nson Attaque."
    it: "Chi la usa riduce il numero di poligoni sul\nproprio corpo per accentuarne gli spigoli\ne aumentare l’Attacco."
    de: "Anwender senkt die Polygonzahl,\num Kanten zu erzeugen, die den\nAngriffs-Wert erhöhen."
    es: "El perfil del usuario se hace más afilado\ny su Ataque mejora."
    ko: "몸의 각을 늘려서\n더욱 각지게 하여\n자신의 공격을 올린다."
sheer_cold:
  names:
    jp_kana: ぜったいれいど
    jp_kanji: ぜったいれいど
    en: Sheer Cold
    fr: Glaciation
    it: Purogelo
    de: Eiseskälte
    es: Frío Polar
    ko: 절대영도
  descriptions:
    jp_kana: "ぜったいれいどの　つめたさで\nあいてを　こうげきする。\nあたれば　いちげきで　ひんしに　する。"
    jp_kanji: "絶対零度の　冷たさで\n相手を　攻撃する。\n当たれば　一撃で　ひんしに　する。"
    en: "The target is attacked with a blast of\nabsolute-zero cold.\nThe target instantly faints if it hits."
    fr: "Une vague de froid glacial frappe\nl’ennemi. S’il est touché, il est mis\nK.O. sur le coup."
    it: "Ondata di freddo penetrante che, se va\na segno, fa andare KO il nemico."
    de: "Angriff mit Kälte, die das Ziel\nbei Erfolg besiegt."
    es: "Ataque de frío polar que debilita\nal objetivo si le alcanza."
    ko: "절대영도의 추위로\n상대를 공격한다.\n맞으면 일격에 기절한다."
shell_smash:
  names:
    jp_kana: からをやぶる
    jp_kanji: からをやぶる
    en: Shell Smash
    fr: Exuviation
    it: Gettaguscio
    de: Hausbruch
    es: Rompecoraza
    ko: 껍질깨기
  descriptions:
    jp_kana: "からを　やぶって　じぶんの　ぼうぎょ\nとくぼうを　さげるが　こうげき　とくこう\nすばやさを　ぐーんと　あげる。"
    jp_kanji: "殻を　やぶって　自分の　防御\n特防を　さげるが　攻撃　特攻\n素早さを　ぐーんと　あげる。"
    en: "The user breaks its shell, lowering its\nDefense and Sp. Def stats but sharply\nraising Attack, Sp. Atk, and Speed stats."
    fr: "Le lanceur brise sa coquille. Il baisse sa\nDéfense et Déf. Spé., mais augmente forte-\nment son Attaque, Atq. Spé. et Vitesse."
    it: "Chi la usa si disfa del guscio. Difesa e\nDif. Sp. calano, ma aumentano di molto\nAttacco, Att. Sp. e Velocità."
    de: "Anwender zerbricht seine Schale und senkt\nseine Vert. und Spez.-Vert., dafür steigen\nAngr., Spez.-Angr. und Initiative stark."
    es: "El usuario rompe su coraza y baja su\nDefensa y Def. Esp., pero aumenta mucho\nsu Ataque, Ataque Especial y Velocidad."
    ko: "껍질을 깨서 자신의 방어와\n특수방어를 떨어뜨리지만 공격과\n특수공격, 스피드를 크게 올린다."
shift_gear:
  names:
    jp_kana: ギアチェンジ
    jp_kanji: ギアチェンジ
    en: Shift Gear
    fr: Chgt Vitesse
    it: Cambiomarcia
    de: Gangwechsel
    es: Cambiomarcha
    ko: 기어체인지
  descriptions:
    jp_kana: "はぐるまを　まわして\nじぶんの　こうげきを　あげる　だけでなく\nすばやさも　ぐーんと　あげる。"
    jp_kanji: "歯車を　回して\n自分の　攻撃を　あげる　だけでなく\n素早さも　ぐーんと　あげる。"
    en: "The user rotates its gears, raising its\nAttack and sharply raising its Speed."
    fr: "Le lanceur fait tourner ses engrenages.\nCeci augmente son Attaque et augmente\nfortement sa Vitesse."
    it: "Facendo ruotare gli ingranaggi, chi la usa\naumenta non solo il proprio Attacco, ma\nanche di molto la propria Velocità."
    de: "Durch Drehen der Zahnräder erhöht sich\nnicht nur der Angriffs-Wert, sondern auch\ndie Initiative des Anwenders stark."
    es: "Al hacer girar los engranajes, el usuario\nmejora su Ataque y aumenta su Velocidad\nespectacularmente."
    ko: "톱니바퀴를 돌려서 자신의\n공격을 올리는 것뿐만 아니라\n스피드도 크게 올린다."
shock_wave:
  names:
    jp_kana: でんげきは
    jp_kanji: でんげきは
    en: Shock Wave
    fr: Onde de Choc
    it: Ondashock
    de: Schockwelle
    es: Onda Voltio
    ko: 전격파
  descriptions:
    jp_kana: "でんげきを　すばやく\nあいてに　あびせる。\nこうげきは　かならず　めいちゅう　する。"
    jp_kanji: "電撃を　素早く\n相手に　浴びせる。\n攻撃は　必ず　命中する。"
    en: "The user strikes the target with a quick\njolt of electricity.\nThis attack cannot be evaded."
    fr: "Le lanceur envoie un choc électrique\nrapide à l’ennemi. Impossible à esquiver."
    it: "Chi la usa colpisce il nemico con una scossa\ndi elettricità. È impossibile eludere questa\nmossa."
    de: "Angriff mit schnellem Elektro-Schlag.\nAusweichen nicht möglich."
    es: Ataque eléctrico muy rápido e ineludible.
    ko: "전격을 재빠르게\n상대에게 날린다.\n공격은 반드시 명중한다."
signal_beam:
  names:
    jp_kana: シグナルビーム
    jp_kanji: シグナルビーム
    en: Signal Beam
    fr: Rayon Signal
    it: Segnoraggio
    de: Ampelleuchte
    es: Doble Rayo
    ko: 시그널빔
  descriptions:
    jp_kana: "ふしぎな　ひかりを\nはっしゃして　こうげきする。\nあいてを　こんらん　させることが　ある。"
    jp_kanji: "不思議な　光を\n発射して　攻撃する。\n相手を　混乱させることが　ある。"
    en: "The user attacks with a sinister beam of\nlight. It may also confuse the target."
    fr: "Le lanceur projette un rayon de\nlumière sinistre. Peut aussi\nrendre l’ennemi confus."
    it: "Chi la usa attacca con uno strano raggio\ndi luce che può anche confondere\nil Pokémon colpito."
    de: "Strahlenattacke, die das Ziel\neventuell verwirrt."
    es: "Ataca con un rayo de luz siniestro.\nPuede confundir al objetivo."
    ko: "이상한 빛을\n발사해서 공격한다.\n상대를 혼란시킬 때가 있다."
silver_wind:
  names:
    jp_kana: ぎんいろのかぜ
    jp_kanji: ぎんいろのかぜ
    en: Silver Wind
    fr: Vent Argenté
    it: Ventargenteo
    de: Silberhauch
    es: Viento Plata
    ko: 은빛바람
  descriptions:
    jp_kana: "かぜに　りんぷんを　のせて　あいてを\nこうげきする。じぶんの　すべての\nのうりょくが　あがることが　ある。"
    jp_kanji: "風に　りんぷんを　のせて　相手を\n攻撃する。自分の　すべての\n能力が　あがることが　ある。"
    en: "The target is attacked with powdery\nscales blown by wind.\nIt may also raise all the user’s stats."
    fr: "Vent qui projette des écailles poudreuses\nsur l’ennemi. Peut aussi monter toutes\nles stats du lanceur."
    it: "Attacca con un forte vento di polvere di\nsquame. Tutte le statistiche di chi la\nusa possono salire."
    de: "Angriff mit Silberstaub. Eventuell\nwerden alle Statuswerte des\nAnwenders erhöht."
    es: "Fuerte viento con polvo de escamas.\nPuede subir todas las características\nde quien lo usa."
    ko: "바람에 날개 가루를 날려서 상대를\n공격한다. 자신의 모든\n능력이 올라갈 때가 있다."
simple_beam:
  names:
    jp_kana: シンプルビーム
    jp_kanji: シンプルビーム
    en: Simple Beam
    fr: Rayon Simple
    it: Ondisinvolta
    de: Wankelstrahl
    es: Onda Simple
    ko: 심플빔
  descriptions:
    jp_kana: "なぞの　ねんぱを　あいてに　おくる。\nねんぱを　うけとった　あいては　\nとくせいが　たんじゅんに　なる。"
    jp_kanji: "なぞの　念波を　相手に　送る。\n念波を　受けとった　相手は　\n特性が　たんじゅんに　なる。"
    en: "The user’s mysterious psychic wave\nchanges the target’s Ability to Simple."
    fr: "Le lanceur envoie des ondes\nmystérieuses à l’ennemi. Sa\ncapacité spéciale devient Simple."
    it: "Chi la usa emette un misterioso raggio\npsichico che trasforma l’abilità del\nPokémon colpito in Disinvoltura."
    de: "Bestrahlt das Ziel mit mysteriösen\nEnergiewellen. Bei einem Treffer wird\ndessen Fähigkeit zu Wankelmut."
    es: "Lanza una onda psíquica que hace que\nla habilidad del objetivo pase a ser Simple."
    ko: "수수께끼의 염력파를 상대에게\n보낸다. 염력파를 받은 상대는\n특성이 단순으로 바뀐다."
sing:
  names:
    jp_kana: うたう
    jp_kanji: うたう
    en: Sing
    fr: Berceuse
    it: Canto
    de: Gesang
    es: Canto
    ko: 노래하기
  descriptions:
    jp_kana: "ここちよい　きれいな\nうたごえを　きかせて\nあいてを　ねむり　じょうたいに　する。"
    jp_kanji: "心地好い　きれいな\n歌声を　聞かせて\n相手を　眠り状態に　する。"
    en: "A soothing lullaby is sung in a calming\nvoice that puts the target into a deep\nslumber."
    fr: "Une berceuse plonge l’ennemi\ndans un profond sommeil."
    it: "Dolce ninnananna, cantata da una voce\nsuadente, che fa addormentare il nemico."
    de: "Ein Lied, das das Ziel in tiefen\nSchlaf versetzt."
    es: "Cancioncilla que hace dormir\nprofundamente al objetivo."
    ko: "기분 좋은 예쁜\n노랫소리를 들려주고\n상대를 잠듦 상태로 만든다."
sketch:
  names:
    jp_kana: スケッチ
    jp_kanji: スケッチ
    en: Sketch
    fr: Gribouille
    it: Schizzo
    de: Nachahmer
    es: Esquema
    ko: 스케치
  descriptions:
    jp_kana: "あいてが　つかった　わざを\nじぶんの　ものに　する。\n１かい　つかうと　スケッチは　きえる。"
    jp_kanji: "相手が　使った　技を\n自分の　ものに　する。\n１回　使うと　スケッチは　消える。"
    en: "It enables the user to permanently learn\nthe move last used by the target.\nOnce used, Sketch disappears."
    fr: "Le lanceur apprend le dernier coup\nutilisé par la cible. Gribouille disparaît\naprès utilisation."
    it: "Permette a chi la usa di imparare l’ultima\nmossa usata dal bersaglio. La nuova mossa\nappresa sostituisce Schizzo."
    de: "Anwender lernt die letzte Attacke\ndes Zieles dauerhaft. Nachahmer\nverschwindet nach Gebrauch."
    es: "Aprende de forma permanente\nel último movimiento del objetivo.\nEs de un solo uso."
    ko: "상대가 쓴 기술을\n자신의 것으로 만든다.\n한 번 사용하면 스케치는 사라진다."
skill_swap:
  names:
    jp_kana: スキルスワップ
    jp_kanji: スキルスワップ
    en: Skill Swap
    fr: Échange
    it: Baratto
    de: Wertewechsel
    es: Intercambio
    ko: 스킬스웹
  descriptions:
    jp_kana: "ちょうのうりょくで　じぶんの　とくせいと\nあいての　とくせいを　いれかえる。"
    jp_kanji: "超能力で　自分の　特性と\n相手の　特性を　入れ替える。"
    en: "The user employs its psychic power to\nexchange Abilities with the target."
    fr: "Le lanceur utilise ses pouvoirs psychiques\npour échanger sa capacité spéciale\navec la cible."
    it: "Chi la usa sfrutta le sue facoltà mentali\nper scambiare l’abilità con il bersaglio."
    de: "Anwender tauscht Fähigkeit mit\ndem Ziel."
    es: "Usa el poder psíquico para intercambiar\nhabilidades con el objetivo."
    ko: "초능력으로 자신의 특성과\n상대의 특성을 바꾼다."
skull_bash:
  names:
    jp_kana: ロケットずつき
    jp_kanji: ロケットずつき
    en: Skull Bash
    fr: Coud’Krâne
    it: Capocciata
    de: Schädelwumme
    es: Cabezazo
    ko: 로케트박치기
  descriptions:
    jp_kana: "１ターンめに　あたまを　ひっこめて\nぼうぎょを　あげる。\n２ターンめに　あいてを　こうげきする。"
    jp_kanji: "１ターン目に　頭を　ひっこめて\n防御を　あげる。\n２ターン目に　相手を　攻撃する。"
    en: "The user tucks in its head to raise its\nDefense in the first turn, then\nrams the target on the next turn."
    fr: "Le lanceur baisse la tête pour augmenter\nsa Défense au 1ᵉʳ tour et percuter\nl’ennemi au 2ᵉ."
    it: "Chi la usa ritira la testa per aumentare\nla Difesa e poi attacca al turno\nsuccessivo."
    de: "Der Anwender erhöht in Runde 1\nseine Verteidigung und greift in\nRunde 2 an."
    es: "Primer turno: se prepara\ny sube la Defensa del usuario.\nSegundo turno: da el cabezazo."
    ko: "1턴째에 머리를 움츠려\n방어를 올린다.\n2턴째에 상대를 공격한다."
sky_attack:
  names:
    jp_kana: ゴッドバード
    jp_kanji: ゴッドバード
    en: Sky Attack
    fr: Pique
    it: Aeroattacco
    de: Himmelsfeger
    es: Ataque Aéreo
    ko: 불새
  descriptions:
    jp_kana: "２ターンめに　あいてを　こうげきする。\nたまに　ひるませる。\nきゅうしょにも　あたりやすい。"
    jp_kanji: "２ターン目に　相手を　攻撃する。\nたまに　ひるませる。\n急所にも　当たりやすい。"
    en: "A second-turn attack move where\ncritical hits land more easily.\nIt may also make the target flinch."
    fr: "Une attaque en 2 tours au taux de\ncritiques élevé. Peut aussi apeurer\nl’ennemi."
    it: "Un attacco in due turni e probabile\nbrutto colpo. Può anche far tentennare\nil nemico."
    de: "Anwender greift in der zweiten Runde\nmit hoher Volltrefferquote an. Ziel\nschreckt eventuell zurück."
    es: "Ataque en dos turnos que suele ser\ncrítico. Puede hacer retroceder\nal objetivo."
    ko: "2턴째에 상대를 공격한다.\n가끔 풀죽게 만든다.\n급소에도 맞기 쉽다."
sky_drop:
  names:
    jp_kana: フリーフォール
    jp_kanji: フリーフォール
    en: Sky Drop
    fr: Chute Libre
    it: Cadutalibera
    de: Freier Fall
    es: Caída Libre
    ko: 프리폴
  descriptions:
    jp_kana: "１ターンめで　あいてを　そらへ　つれさり\n２ターンめに　おとして　こうげきする。\nつれさられた　あいては　うごけない。"
    jp_kanji: "１ターン目で　相手を　空へ　連れさり\n２ターン目に　落として　攻撃する。\n連れさられた　相手は　動けない。"
    en: "The user takes the target into the sky,\nthen drops it during the next turn.\nThe target cannot attack while in the sky."
    fr: "Le lanceur emmène l’ennemi dans les airs\nau 1ᵉʳ tour et le lâche dans le vide au\n2ᵉ. L’ennemi saisi ne peut pas attaquer."
    it: "Porta il bersaglio in cielo e lo scaglia a\nterra al turno successivo. Il bersaglio\ncatturato non può muoversi."
    de: "Steigt in Runde 1 mit dem Ziel in die\nLuft auf und lässt es in Runde 2 fallen.\nDas Opfer kann dabei nicht angreifen."
    es: "Primer turno: lanza al objetivo al aire.\nSegundo turno: lo hace caer. Mientras\nestá en el aire, no lo deja moverse."
    ko: "1턴째에 상대를 하늘로 끌고 가서\n2턴째에 떨어뜨려 공격한다.\n끌려간 상대는 움직일 수 없다."
sky_uppercut:
  names:
    jp_kana: スカイアッパー
    jp_kanji: スカイアッパー
    en: Sky Uppercut
    fr: Stratopercut
    it: Stramontante
    de: Himmelhieb
    es: Gancho Alto
    ko: 스카이업퍼
  descriptions:
    jp_kana: "そらに　むかうような　たかい　アッパーで\nあいてを　つきあげて　こうげきする。"
    jp_kanji: "空に　むかうような　高い　アッパーで\n相手を　突きあげて　攻撃する。"
    en: "The user attacks the target with an\nuppercut thrown skyward with force."
    fr: "Le lanceur attaque avec un uppercut.\nIl envoie son poing vers le ciel de\ntoutes ses forces."
    it: "Chi la usa attacca il nemico con un\nmontante che può arrivare fino in cielo."
    de: "Kinnhaken, der das Ziel gen\nHimmel schickt."
    es: Gancho ascendente de gran ímpetu.
    ko: "하늘을 향하는 듯한 높은 업퍼로\n상대를 밀어올려 공격한다."
slack_off:
  names:
    jp_kana: なまける
    jp_kanji: なまける
    en: Slack Off
    fr: Paresse
    it: Pigro
    de: Tagedieb
    es: Relajo
    ko: 태만함
  descriptions:
    jp_kana: "なまけて　やすむ。\nじぶんの　ＨＰを　さいだい　ＨＰの\nはんぶん　かいふく　する。"
    jp_kanji: "怠けて　やすむ。\n自分の　ＨＰを　最大ＨＰの\n半分　回復する。"
    en: "The user slacks off, restoring its own HP\nby up to half of its maximum HP."
    fr: "Le lanceur se tourne les pouces et\nrécupère jusqu’à la moitié de ses PV max."
    it: "Chi la usa si rilassa recuperando metà\ndei propri PS massimi."
    de: "Durch Müßiggang werden KP des\nAnwenders um 50 % der maximalen\nKP aufgefüllt."
    es: "El usuario se relaja y restaura la mitad\nde sus PS máximos."
    ko: "게으름 피우며 쉰다.\n자신의 HP를 최대 HP의\n절반만큼 회복한다."
slam:
  names:
    jp_kana: たたきつける
    jp_kanji: たたきつける
    en: Slam
    fr: Souplesse
    it: Schianto
    de: Slam
    es: Portazo
    ko: 힘껏치기
  descriptions:
    jp_kana: "ながい　しっぽや　つるなどを　つかい\nあいてを　たたきつけて　こうげきする。"
    jp_kanji: "長い　しっぽや　つるなどを　使い\n相手を　たたきつけて　攻撃する。"
    en: "The target is slammed with a long tail,\nvines, etc., to inflict damage."
    fr: "Fouette l’ennemi avec la queue, une\nliane, etc. pour infliger des dégâts."
    it: "Infligge danni al nemico con una coda,\nuna liana o simili."
    de: "Schlag mit einem langen Schweif,\neiner Ranke oder Ähnlichem."
    es: Golpea con las extremidades.
    ko: "긴 꼬리나 덩굴 등을 사용해\n상대를 힘껏 쳐서 공격한다."
slash:
  names:
    jp_kana: きりさく
    jp_kanji: きりさく
    en: Slash
    fr: Tranche
    it: Lacerazione
    de: Schlitzer
    es: Cuchillada
    ko: 베어가르기
  descriptions:
    jp_kana: "ツメや　カマ　などで\nあいてを　きりさいて　こうげきする。\nきゅうしょに　あたりやすい。"
    jp_kanji: "ツメや　カマなどで\n相手を　切り裂いて　攻撃する。\n急所に　当たりやすい。"
    en: "The target is attacked with a slash\nof claws or blades.\nCritical hits land more easily."
    fr: "Un coup de griffe ou autre tranche\nl’ennemi. Taux de critiques élevé."
    it: "Attacca il nemico con artigli, falci o altro.\nProbabile brutto colpo."
    de: "Hieb mit Klauen oder Ähnlichem.\nHohe Volltrefferquote."
    es: "Ataca con cuchillas o con pinzas.\nSuele dar un golpe crítico."
    ko: "발톱이나 낫 등으로\n상대를 베어 갈라서 공격한다.\n급소에 맞기 쉽다."
sleep_powder:
  names:
    jp_kana: ねむりごな
    jp_kanji: ねむりごな
    en: Sleep Powder
    fr: Poudre Dodo
    it: Sonnifero
    de: Schlafpuder
    es: Somnífero
    ko: 수면가루
  descriptions:
    jp_kana: "ねむくなる　こなを\nたくさん　ふりまいて\nあいてを　ねむり　じょうたいに　する。"
    jp_kanji: "眠くなる　粉を\nたくさん　ふりまいて\n相手を　眠り状態に　する。"
    en: "The user scatters a big cloud\nof sleep-inducing dust\naround the target."
    fr: "Le lanceur répand une poudre\nsoporifique qui endort la cible."
    it: "Investe il bersaglio con una grande nuvola\ndi polvere soporifera che lo fa\naddormentare."
    de: "Verstreut Schlafpuder, der das\nZiel eventuell in Schlaf versetzt."
    es: Esparce polvo que duerme al objetivo.
    ko: "잠이 오는 가루를\n많이 흩뿌려서\n상대를 잠듦 상태로 만든다."
sleep_talk:
  names:
    jp_kana: ねごと
    jp_kanji: ねごと
    en: Sleep Talk
    fr: Blabla Dodo
    it: Sonnolalia
    de: Schlafrede
    es: Sonámbulo
    ko: 잠꼬대
  descriptions:
    jp_kana: "じぶんが　おぼえている　わざの　うち\nどれか　１つを　くりだす。\nじぶんが　ねている　ときだけ　つかえる。"
    jp_kanji: "自分が　おぼえている　技の　うち\nどれか　１つを　くりだす。\n自分が　寝ているときだけ　使える。"
    en: "While it is asleep, the user randomly uses\none of the moves it knows."
    fr: "Le lanceur utilise un de ses coups\nau hasard pendant qu’il dort."
    it: "Chi la usa sfodera a caso una delle proprie\nmosse mentre sta dormendo."
    de: "Anwender setzt per Zufall eine ihm\nbekannte Attacke im Schlaf ein."
    es: "Mientras duerme, usa uno de sus\nmovimientos elegido al azar."
    ko: "자신이 배운 기술 중\n하나를 무작위로 날린다.\n자신이 잠들어 있을 때만 쓸 수 있다."
sludge:
  names:
    jp_kana: ヘドロこうげき
    jp_kanji: ヘドロこうげき
    en: Sludge
    fr: Détritus
    it: Fango
    de: Schlammbad
    es: Residuos
    ko: 오물공격
  descriptions:
    jp_kana: "きたない　ヘドロを\nあいてに　なげつけて　こうげきする。\nどく　じょうたいに　することが　ある。"
    jp_kanji: "汚い　ヘドロを\n相手に　投げつけて　攻撃する。\n毒状態に　することが　ある。"
    en: "Unsanitary sludge is hurled at the target.\nIt may also poison the target."
    fr: "Des détritus toxiques sont projetés sur\nl’ennemi. Peut aussi l’empoisonner."
    it: "Lancio di fango malsano che arreca danno\nal nemico. Può anche avvelenarlo."
    de: "Wirft Schlamm auf das Ziel,\ndas eventuell vergiftet wird."
    es: "Arroja residuos al objetivo.\nPuede llegar a envenenar."
    ko: "더러운 오물을\n상대에게 내던져서 공격한다.\n독 상태로 만들 때가 있다."
sludge_bomb:
  names:
    jp_kana: ヘドロばくだん
    jp_kanji: ヘドロばくだん
    en: Sludge Bomb
    fr: Bomb-Beurk
    it: Fangobomba
    de: Matschbombe
    es: Bomba Lodo
    ko: 오물폭탄
  descriptions:
    jp_kana: "きたない　ヘドロを\nあいてに　なげつけて　こうげきする。\nどく　じょうたいに　することが　ある。"
    jp_kanji: "汚い　ヘドロを\n相手に　投げつけて　攻撃する。\n毒状態に　することが　ある。"
    en: "Unsanitary sludge is hurled at the target.\nIt may also poison the target."
    fr: "Des détritus toxiques sont projetés sur\nl’ennemi. Peut aussi l’empoisonner."
    it: "Chi la usa attacca lanciando fango\nsul bersaglio. Può anche avvelenarlo."
    de: "Wirft Schlamm auf das Ziel. Dieses wird\neventuell vergiftet."
    es: "Arroja residuos al objetivo.\nPuede llegar a envenenar."
    ko: "더러운 오물을\n상대에게 내던져서 공격한다.\n독 상태로 만들 때가 있다."
sludge_wave:
  names:
    jp_kana: ヘドロウェーブ
    jp_kanji: ヘドロウェーブ
    en: Sludge Wave
    fr: Cradovague
    it: Fangonda
    de: Schlammwoge
    es: Onda Tóxica
    ko: 오물웨이브
  descriptions:
    jp_kana: "ヘドロの　なみで　じぶんの\nまわりに　いるものを　こうげきする。\nどく　じょうたいに　することが　ある。"
    jp_kanji: "ヘドロの　波で　自分の\n周りに　いるものを　攻撃する。\n毒状態に　することが　ある。"
    en: "It swamps the area around the user with a\ngiant sludge wave.\nIt may also poison those hit."
    fr: "Une vague de détritus attaque tous\nles Pokémon autour du lanceur.\nPeut aussi empoisonner."
    it: "Lancia un’onda di fango che attacca\ntutti i Pokémon nelle vicinanze.\nPuò anche avvelenare."
    de: "Greift Pokémon in der Nähe des\nAnwenders mit einer Schlammwelle an.\nDiese werden eventuell vergiftet."
    es: "Una onda tóxica que daña a los Pokémon\nde alrededor. Puede envenenar."
    ko: "오물 파도로 자신의\n주위에 있는 포켓몬을 공격한다.\n독 상태로 만들 때가 있다."
smack_down:
  names:
    jp_kana: うちおとす
    jp_kanji: うちおとす
    en: Smack Down
    fr: Anti-Air
    it: Abbattimento
    de: Katapult
    es: Antiaéreo
    ko: 떨어뜨리기
  descriptions:
    jp_kana: "いしや　たまを　なげて　とんでいる\nあいてを　こうげきする。あいては\nうちおとされて　じめんに　おちる。"
    jp_kanji: "石や　弾を　投げて　飛んでいる\n相手を　攻撃する。相手は\nうち落とされて　地面に　落ちる。"
    en: "The user throws a stone or projectile to\nattack an opponent. A flying Pokémon will\nfall to the ground when hit."
    fr: "Le lanceur jette toutes sortes\nde projectiles à un ennemi. Si ce\ndernier vole, il tombe au sol."
    it: "Chi la usa lancia una pietra o un\nproiettile. Può colpire anche un\nbersaglio in volo e farlo cadere."
    de: "Greift das Ziel mit Steinen und Wurfge-\nschossen an. Fliegende Ziele fallen dabei\nvom Himmel und landen auf dem Boden."
    es: "El usuario ataca lanzando una piedra\no un proyectil. Puede estrellar contra\nel suelo al objetivo si vuela."
    ko: "돌이나 구슬을 던져서 날고 있는\n상대를 공격한다.\n맞은 상대는 땅에 떨어진다."
smelling_salts:
  names:
    jp_kana: きつけ
    jp_kanji: きつけ
    en: SmellingSalt
    fr: Stimulant
    it: Maniereforti
    de: Riechsalz
    es: Estímulo
    ko: 정신차리기
  descriptions:
    jp_kana: "まひ　じょうたいの　あいてには\nいりょくが　２ばいに　なるが\nかわりに　あいての　まひが　なおる。"
    jp_kanji: "まひ状態の　相手には\n威力が　２倍に　なるが\nかわりに　相手の　まひが　治る。"
    en: "This attack inflicts double damage on a\ntarget with paralysis. It also cures the\ntarget’s paralysis, however."
    fr: "Cette attaque est doublement efficace\nsur les Pokémon paralysés, mais elle\nsoigne leur paralysie."
    it: "Infligge un danno doppio ad un bersaglio\nparalizzato, ma ne cura anche la paralisi."
    de: "Doppelt wirksam gegen paralysierte\nGegner, heilt sie aber auch davon."
    es: "Hace el doble de daño a objetivos\nparalizados, pero también cura\nla parálisis."
    ko: "마비 상태의 상대에게는\n위력이 2배가 되지만\n대신 상대의 마비가 풀린다."
smog:
  names:
    jp_kana: スモッグ
    jp_kanji: スモッグ
    en: Smog
    fr: Purédpois
    it: Smog
    de: Smog
    es: Polución
    ko: 스모그
  descriptions:
    jp_kana: "よごれた　ガスを\nあいてに　ふきつけて　こうげきする。\nどく　じょうたいに　することが　ある。"
    jp_kanji: "汚れた　ガスを\n相手に　吹きつけて　攻撃する。\n毒状態に　することが　ある。"
    en: "The target is attacked with a\ndischarge of filthy gases.\nIt may also poison the target."
    fr: "Le lanceur attaque à l’aide d’une\néruption de gaz répugnants.\nPeut aussi empoisonner l’ennemi."
    it: "Colpisce il nemico con una scarica di gas\nmaleodoranti. Può anche avvelenarlo."
    de: "Angriff mit Gas. Das Ziel kann\neventuell vergiftet werden."
    es: "El objetivo es atacado con gases tóxicos\nque pueden llegar a envenenar."
    ko: "더러운 가스를\n상대에게 내뿜어 공격한다.\n독 상태로 만들 때가 있다."
smokescreen:
  names:
    jp_kana: えんまく
    jp_kanji: えんまく
    en: SmokeScreen
    fr: Brouillard
    it: Muro di Fumo
    de: Rauchwolke
    es: Pantallahumo
    ko: 연막
  descriptions:
    jp_kana: "けむりや　スミなどを　ふきかけて\nあいての　めいちゅうりつを　さげる。"
    jp_kanji: "煙や　墨などを　吹きかけて\n相手の　命中率を　さげる。"
    en: "The user releases an obscuring cloud\nof smoke or ink. It reduces the\ntarget’s accuracy."
    fr: "Le lanceur disperse un nuage d’encre ou\nde fumée. Réduit la Précision de l’ennemi."
    it: "Nuvola di fumo o inchiostro che riduce\nla precisione del nemico."
    de: "Senkt Genauigkeit des Zieles mit\nRauch, Tinte oder Ähnlichem."
    es: "Baja la Precisión del objetivo con una nube\nde humo o tinta."
    ko: "연기나 먹물을 내뿜어\n상대의 명중률을 떨어뜨린다."
snarl:
  names:
    jp_kana: バークアウト
    jp_kanji: バークアウト
    en: Snarl
    fr: Aboiement
    it: Urlorabbia
    de: Standpauke
    es: Alarido
    ko: 바크아웃
  descriptions:
    jp_kana: "まくしたてる　ように　どなりつけて\nあいての　とくこうを　さげる。"
    jp_kanji: "まくしたてる　ように　怒鳴りつけて\n相手の　特攻を　さげる。"
    en: "The user yells as if it is ranting about\nsomething, making the target’s Sp. Atk\nstat decrease."
    fr: "Le lanceur hurle sur l’ennemi.\nBaisse l’Attaque Spéciale de l’ennemi."
    it: "Chi la usa si mette a urlare per un po’,\nriducendo l’Attacco Speciale dei nemici."
    de: "Wäscht Gegnern in der Nähe mit einer\nausführlichen Standpauke den Kopf\nund senkt dabei deren Spezial-Angriff."
    es: "Ataca lanzando un chillido insoportable\nque baja el Ataque Especial de\nlos objetivos."
    ko: "호되게 호통을 쳐서\n상대의 특수공격을 떨어뜨린다."
snatch:
  names:
    jp_kana: よこどり
    jp_kanji: よこどり
    en: Snatch
    fr: Saisie
    it: Scippo
    de: Übernahme
    es: Robo
    ko: 가로챔
  descriptions:
    jp_kana: "あいてが　つかおうと　した\nかいふくわざや　のうりょく　へんかの\nわざを　うばって　じぶんに　つかう。"
    jp_kanji: "相手が　使おうと　した\n回復技や　能力変化の\n技を　うばって　自分に　使う。"
    en: "The user steals the effects of any\nhealing or stat-changing move the\nopponent attempts to use."
    fr: "Le lanceur vole l’effet des capacités\nde soin ou de changement de stats\nutilisées par la cible."
    it: "Chi la usa ruba e utilizza la mossa\ncurativa o modifica-statistiche che\nil bersaglio stava per usare."
    de: "Raubt den Effekt der heilenden\noder Werte verändernden Attacke\ndes Gegners."
    es: "Roba el efecto de movimientos de curación\no de cambio de características que intente\nusar un combatiente."
    ko: "상대가 사용하려고 한\n회복 기술이나 능력 변화의\n기술을 빼앗아 자신에게 쓴다."
snore:
  names:
    jp_kana: いびき
    jp_kanji: いびき
    en: Snore
    fr: Ronflement
    it: Russare
    de: Schnarcher
    es: Ronquido
    ko: 코골기
  descriptions:
    jp_kana: "じぶんが　ねている　ときに\nざつおんを　だして　こうげきする。　\nあいてを　ひるませる　ことが　ある。"
    jp_kanji: "自分が　寝ているときに\n雑音を　だして　攻撃する。　\n相手を　ひるませることが　ある。"
    en: "An attack that can be used only if the\nuser is asleep. The harsh noise may also\nmake the target flinch."
    fr: "Une attaque qui ne fonctionne que si le\nlanceur est endormi. Le boucan peut aussi\napeurer l’ennemi."
    it: "Mossa da usare solo mentre si dorme.\nIl chiasso assordante può anche far\ntentennare il nemico."
    de: "Attacke nur im Schlaf möglich.\nZiel schreckt eventuell zurück."
    es: "Fuerte ronquido que debe usarse\ndormido. Puede hacer retroceder\nal objetivo."
    ko: "자신이 잠들어있을 때\n소음을 내어 공격한다.\n상대를 풀죽게 만들 때가 있다."
soak:
  names:
    jp_kana: みずびたし
    jp_kanji: みずびたし
    en: Soak
    fr: Détrempage
    it: Inondazione
    de: Überflutung
    es: Anegar
    ko: 물붓기
  descriptions:
    jp_kana: "たくさんの　みずを　あびせかけて\nあいてを　みずタイプに　する。"
    jp_kanji: "たくさんの　水を　浴びせかけて\n相手を　みずタイプに　する。"
    en: "The user shoots a torrent of water\nat the target and changes\nthe target’s type to Water."
    fr: "Le lanceur projette beaucoup d’eau sur\nsa cible, qui devient de type Eau."
    it: "Chi la usa proietta un lungo getto d’acqua\ncontro il bersaglio e lo rende un Pokémon\ndi tipo Acqua."
    de: "Überschüttet das Ziel mit Unmengen an\nWasser und ändert den Typ damit in\nWasser um."
    es: "Potente lluvia que transforma al objetivo\nen un Pokémon de tipo Agua."
    ko: "많은 물을 끼얹어서\n상대를 물타입으로 바꾼다."
soft_boiled:
  names:
    jp_kana: タマゴうみ
    jp_kanji: タマゴうみ
    en: Softboiled
    fr: E-Coque
    it: Covauova
    de: Weichei
    es: Amortiguador
    ko: 알낳기
  descriptions:
    jp_kana: "さいだい　ＨＰの　はんぶん\nじぶんの　ＨＰを　かいふく　する。\nなかまに　ＨＰを　わけることも　できる。"
    jp_kanji: "最大ＨＰの　半分\n自分の　ＨＰを　回復する。\n仲間に　ＨＰを　わけることも　できる。"
    en: "The user restores its own HP\nby up to half of its maximum HP.\nMay also be used in the field to heal HP."
    fr: "Le lanceur récupère jusqu’à la moitié de\nses PV max. En dehors des combats, permet\nde transférer des PV du lanceur à un allié."
    it: "Chi la usa recupera metà dei propri PS\nmassimi. Fuori dalla lotta può anche far\ntrasferire PS ai propri compagni."
    de: "KP des Anwenders werden um 50 %\nder maximalen KP aufgefüllt. Heilung\ndes Teams außerhalb von Kämpfen."
    es: "Restaura la mitad de los PS máximos del\nusuario. Fuera de combate se usa para\ntransferir parte de sus PS a un aliado."
    ko: "자신의 최대 HP 절반을\n회복한다. 동료의 HP를\n회복시킬 수도 있다."
solar_beam:
  names:
    jp_kana: ソーラービーム
    jp_kanji: ソーラービーム
    en: SolarBeam
    fr: Lance-Soleil
    it: Solarraggio
    de: Solarstrahl
    es: Rayo Solar
    ko: 솔라빔
  descriptions:
    jp_kana: "１ターンめに　ひかりを　いっぱいに\nあつめ　２ターンめに　ひかりの　たばを\nはっしゃして　こうげきする。"
    jp_kanji: "１ターン目に　光を　いっぱいに　集め\n２ターン目に　光の　束を\n発射して　攻撃する。"
    en: "A two-turn attack. The user gathers\nlight, then blasts a bundled beam on the\nsecond turn."
    fr: "Absorbe la lumière au premier tour\net envoie un rayon puissant au\ntour suivant."
    it: "Chi la usa assorbe luce al primo turno per\nproiettare un raggio intenso al turno\nsuccessivo."
    de: "Absorbiert Licht in Runde 1.\nIn Runde 2 erfolgt der Angriff."
    es: "Primer turno: absorbe luz.\nSegundo turno: ataca."
    ko: "1턴째에 빛을 가득 모아\n2턴째에 빛의 다발을\n발사하여 공격한다."
sonic_boom:
  names:
    jp_kana: ソニックブーム
    jp_kanji: ソニックブーム
    en: SonicBoom
    fr: Sonicboom
    it: Sonicboom
    de: Ultraschall
    es: Bomba Sónica
    ko: 소닉붐
  descriptions:
    jp_kana: "しょうげきはを\nあいてに　ぶつけて　こうげきする。\n２０の　ダメージを　きまって　あたえる。"
    jp_kanji: "衝撃波を\n相手に　ぶつけて　攻撃する。\n２０の　ダメージを　決まって　与える。"
    en: "The target is hit with a destructive shock\nwave that always inflicts 20 HP damage."
    fr: "Une onde de choc destructrice qui\ninflige toujours 20 PV de dégâts."
    it: "Il nemico viene colpito da onde acustiche\ndevastanti che gli provocano un danno\ncostante pari a 20 PS."
    de: "Das Ziel wird von einer Schockwelle\ngetroffen, die stets 20 KP Schaden\nanrichtet."
    es: "Lanza ondas de choque que restan\n20 PS al objetivo."
    ko: "충격파를\n상대에 부딪쳐서 공격한다.\n언제나 20의 데미지를 준다."
spacial_rend:
  names:
    jp_kana: あくうせつだん
    jp_kanji: あくうせつだん
    en: Spacial Rend
    fr: Spatio-Rift
    it: Fendispazio
    de: Raumschlag
    es: Corte Vacío
    ko: 공간절단
  descriptions:
    jp_kana: "まわりの　くうかんごと　あいてを\nひきさき　ダメージを　あたえる。\nきゅうしょに　あたりやすい。"
    jp_kanji: "周りの　空間ごと　相手を\n引き裂き　ダメージを　与える。\n急所に　当たりやすい。"
    en: "The user tears the target along with the\nspace around it.\nCritical hits land more easily."
    fr: "Le lanceur déchire l’ennemi et l’espace\nautour de lui. Taux de critiques élevé."
    it: "Chi la usa lacera il nemico e lo spazio che\nlo circonda. Probabile brutto colpo."
    de: "Schwere, raumgreifende Attacke.\nHohe Volltrefferquote."
    es: "Desgarra al objetivo y el espacio\na su alrededor. Suele ser crítico."
    ko: "주위의 공간과 더불어 상대를\n찢어서 데미지를 준다.\n급소에 맞기 쉽다."
spark:
  names:
    jp_kana: スパーク
    jp_kanji: スパーク
    en: Spark
    fr: Étincelle
    it: Scintilla
    de: Funkensprung
    es: Chispa
    ko: 스파크
  descriptions:
    jp_kana: "でんきを　まとい\nあいてに　とっしんして　こうげきする。\nまひ　じょうたいに　することが　ある。"
    jp_kanji: "電気を　まとい\n相手に　突進して　攻撃する。\nまひ状態に　することが　ある。"
    en: "The user throws an electrically charged\ntackle at the target. It may also leave\nthe target with paralysis."
    fr: "Lance une charge électrique sur\nl’ennemi. Peut aussi le paralyser."
    it: "Colpisce il nemico con una carica elettrica\ne può anche paralizzarlo."
    de: "Elektro-Hieb, der das Ziel\nparalysieren kann."
    es: "Ataque eléctrico que puede llegar\na paralizar."
    ko: "전기를 둘러\n상대에게 돌진하여 공격한다.\n마비 상태로 만들 때가 있다."
spider_web:
  names:
    jp_kana: クモのす
    jp_kanji: クモのす
    en: Spider Web
    fr: Toile
    it: Ragnatela
    de: Spinnennetz
    es: Telaraña
    ko: 거미집
  descriptions:
    jp_kana: "ネバネバした　ほそい　いとを\nグルグルと　からませて　あいてを\nせんとうから　にげられなく　する。"
    jp_kanji: "ネバネバした　細い　糸を\nグルグルと　からませて　相手を\n戦闘から　逃げられなくする。"
    en: "The user ensnares the target with thin,\ngooey silk so it can’t flee from battle."
    fr: "Le lanceur enserre l’ennemi à l’aide d’une\nfine soie gluante pour l’empêcher de fuir\nle combat."
    it: "Copre il nemico con un filo di seta sottile\ne appiccicoso. Il nemico non può fuggire."
    de: "Wickelt das Ziel ein. Flucht oder\nTausch unmöglich."
    es: "Enreda al objetivo para evitar que\nabandone la batalla."
    ko: "끈적끈적하고 가는 실을\n칭칭 휘감아 상대를\n배틀에서 도망칠 수 없게 한다."
spike_cannon:
  names:
    jp_kana: とげキャノン
    jp_kanji: とげキャノン
    en: Spike Cannon
    fr: Picanon
    it: Sparalance
    de: Dornkanone
    es: Clavo Cañón
    ko: 가시대포
  descriptions:
    jp_kana: "するどい　ハリを\nあいてに　はっしゃして　こうげきする。\n２ー５かいの　あいだ　れんぞくで　だす。"
    jp_kanji: "鋭い　ハリを\n相手に　発射して　攻撃する。\n２ー５回の　あいだ　連続で　だす。"
    en: "Sharp spikes are shot at the target\nin rapid succession.\nThey hit two to five times in a row."
    fr: "Envoie une rafale de dards. \nPeut toucher de 2 à 5 fois."
    it: "Il nemico viene colpito da due a cinque\nvolte in rapida successione da spilli\nappuntiti."
    de: "Spitze Nadeln treffen das\nZiel 2- bis 5-mal."
    es: "Lanza finas púas que hieren de dos\na cinco veces."
    ko: "날카로운 침을\n상대에게 발사해서 공격한다.\n2-5회 동안 연속으로 쓴다."
spikes:
  names:
    jp_kana: まきびし
    jp_kanji: まきびし
    en: Spikes
    fr: Picots
    it: Punte
    de: Stachler
    es: Púas
    ko: 압정뿌리기
  descriptions:
    jp_kana: "あいての　あしもとに　まきびしを\nしかける。こうたいで　でてきた　あいての\nポケモンに　ダメージを　あたえる。"
    jp_kanji: "相手の　足下に　まきびしを\nしかける。交代で　でてきた　相手の\nポケモンに　ダメージを　与える。"
    en: "The user lays a trap of spikes at the\nopposing team’s feet. The trap hurts\nPokémon that switch into battle."
    fr: "Le lanceur disperse des piquants sur le\nsol pour blesser tout ennemi qui entre\nau combat."
    it: "Chi la usa piazza sul terreno una trappola\ndi punte che danneggia i nemici quando\nscendono in campo."
    de: "Der Anwender verteilt Stacheln, die\nein gegnerisches Pokémon verletzen,\nsobald es in den Kampf gerufen wird."
    es: "Esparce púas en el equipo rival.\nLas púas hieren a los Pokémon\nrivales que entran en combate."
    ko: "상대의 발밑에 압정을\n뿌린다. 교체된 상대\n포켓몬에게 데미지를 준다."
spit_up:
  names:
    jp_kana: はきだす
    jp_kanji: はきだす
    en: Spit Up
    fr: Relâche
    it: Sfoghenergia
    de: Entfessler
    es: Escupir
    ko: 토해내기
  descriptions:
    jp_kana: "たくわえた　ちからを　あいてに　ぶつけて\nこうげきする。たくわえて　いるほど\nいりょくが　あがる。"
    jp_kanji: "蓄えた　力を\n相手に　ぶつけて　攻撃する。\n蓄えているほど　威力が　あがる。"
    en: "The power stored using the move Stockpile\nis released at once in an attack. The more\npower is stored, the greater the damage."
    fr: "Libère dans une attaque la puissance\nprécédemment accumulée avec Stockage."
    it: "Tutta l’energia accumulata in precedenza\ncon Accumulo è rilasciata nell’attacco.\nMaggiore è l’energia, più danni si arrecano."
    de: "Entlädt die Kraft, die während des\nEinsatzes von Horter gesammelt wurde."
    es: "Libera de una vez la energía acumulada\ncon Reserva."
    ko: "비축된 힘을\n상대에게 부딪쳐서 공격한다.\n비축된 만큼 위력이 올라간다."
spite:
  names:
    jp_kana: うらみ
    jp_kanji: うらみ
    en: Spite
    fr: Dépit
    it: Dispetto
    de: Groll
    es: Rencor
    ko: 원한
  descriptions:
    jp_kana: "あいてが　さいごに　つかった　わざに\nうらみを　いだいて\nそのわざの　ＰＰを　４だけ　へらす。"
    jp_kanji: "相手が　最後に　使った技に\n恨みを　抱いて\nその技の　ＰＰを　４だけ　減らす。"
    en: "The user unleashes its grudge on the move\nlast used by the target by cutting 4 PP\nfrom it."
    fr: "Le lanceur exprime son ressentiment\nen retirant 4 PP de la dernière attaque\nde l’ennemi."
    it: "Chi la usa sfoga la propria rabbia\nsull’ultima mossa usata dal bersaglio\ne le sottrae quattro PP."
    de: "AP der letzten Attacke des Zieles\nwerden um 4 gesenkt."
    es: "Da rienda suelta a su rencor\npara reducir cuatro PP del último\nmovimiento usado por el objetivo."
    ko: "상대가 마지막으로\n사용한 기술에 원한을 품어\n그 기술의 PP를 4만큼 줄인다."
splash:
  names:
    jp_kana: はねる
    jp_kanji: はねる
    en: Splash
    fr: Trempette
    it: Splash
    de: Platscher
    es: Salpicadura
    ko: 튀어오르기
  descriptions:
    jp_kana: "こうげきも　せずに　ピョン　ピョンと\nはねるだけで　なにも　おこらない　……。"
    jp_kanji: "攻撃もせずに　ピョン　ピョンと\n跳ねるだけで　なにも　おこらない……。"
    en: "The user just flops and splashes around\nto no effect at all..."
    fr: "Le lanceur barbote et éclabousse les\nenvirons. Cette capacité n’a aucun effet."
    it: "Chi la usa sguazza nell’acqua, senza\nottenere alcun effetto."
    de: "Nur ein Platscher, der überhaupt\nnichts bewirkt."
    es: No tiene ningún efecto. Solo salpica.
    ko: "공격도 하지 않고 팔딱팔딱 튈 뿐\n아무 일도 일어나지 않는다..."
spore:
  names:
    jp_kana: キノコのほうし
    jp_kanji: キノコのほうし
    en: Spore
    fr: Spore
    it: Spora
    de: Pilzspore
    es: Espora
    ko: 버섯포자
  descriptions:
    jp_kana: "さいみん　こうかの　ある\nほうしを　パラパラと　ふりまき\nあいてを　ねむり　じょうたいに　する。"
    jp_kanji: "催眠効果の　ある\n胞子を　パラパラと　ふりまき\n相手を　眠り状態に　する。"
    en: "The user scatters bursts of spores\nthat induce sleep."
    fr: "Le lanceur répand un nuage de\nspores qui endort."
    it: "Nube di spore che fa sempre addormentare\nil nemico."
    de: "Erzeugt eine Wolke aus einschläfernden\nSporen."
    es: Esparce esporas que inducen al sueño.
    ko: "최면 효과가 있는\n포자를 훌훌 흩뿌려서\n상대를 잠듦 상태로 만든다."
stealth_rock:
  names:
    jp_kana: ステルスロック
    jp_kanji: ステルスロック
    en: Stealth Rock
    fr: Piège de Roc
    it: Levitoroccia
    de: Tarnsteine
    es: Trampa Rocas
    ko: 스텔스록
  descriptions:
    jp_kana: "あいての　まわりに　むすうの　いわを\nうかべて　こうたいで　でてきた　あいての\nポケモンに　ダメージを　あたえる。"
    jp_kanji: "相手の　周りに　無数の　岩を\n浮かべて　交代で　でてきた　相手の\nポケモンに　ダメージを　与える。"
    en: "The user lays a trap of levitating stones\naround the opponent’s team. The trap\nhurts opponents that switch into battle."
    fr: "Lance des pierres flottantes autour\nde l’ennemi, qui blessent tout ennemi\nentrant au combat."
    it: "Chi la usa piazza una trappola di rocce\nsospese che danneggia i nemici che entrano\nin lotta."
    de: "Falle mit schwebenden Steinen.\nIn den Kampf eingreifende Gegner\nnehmen Schaden."
    es: "Una trampa de rocas que flota\nen el aire y daña a los objetivos\nque entran en combate."
    ko: "상대의 주위에 무수한 바위를\n띄워 교체해서 나온 상대\n포켓몬에게 데미지를 준다."
steamroller:
  names:
    jp_kana: ハードローラー
    jp_kanji: ハードローラー
    en: Steamroller
    fr: Bulldoboule
    it: Rulloduro
    de: Quetschwalze
    es: Rodillo Púas
    ko: 하드롤러
  descriptions:
    jp_kana: "まるめた　からだで　かいてんして\nあいてを　おしつぶす。\nあいてを　ひるませる　ことが　ある。"
    jp_kanji: "まるめた　体で　回転して\n相手を　おしつぶす。\n相手を　ひるませることが　ある。"
    en: "The user crushes its targets by rolling\nover them with its rolled-up body.\nThis attack may make the target flinch."
    fr: "Le lanceur se roule en boule et\nécrase son ennemi. Peut aussi\napeurer l’ennemi."
    it: "Chi la usa ruota su se stesso ad alta\nvelocità e schiaccia il bersaglio. Può\nanche farlo tentennare."
    de: "Anwender rollt mit rundlichem Körper\nüber das Ziel und drückt es platt.\nZiel schreckt eventuell zurück."
    es: "El usuario se hace una bola y arrolla\nal objetivo con su cuerpo.\nPuede hacerlo retroceder."
    ko: "둥글게 뭉친 몸을 회전하여\n상대를 뭉개 버린다.\n상대를 풀죽게 만들 때가 있다."
steel_wing:
  names:
    jp_kana: はがねのつばさ
    jp_kanji: はがねのつばさ
    en: Steel Wing
    fr: Aile d’Acier
    it: Alacciaio
    de: Stahlflügel
    es: Ala de Acero
    ko: 강철날개
  descriptions:
    jp_kana: "かたい　つばさを　あいてに　たたきつけて\nこうげきする。じぶんの　ぼうぎょが\nあがることが　ある。"
    jp_kanji: "硬い　翼を　相手に　たたきつけて\n攻撃する。自分の　防御が\nあがることが　ある。"
    en: "The target is hit with wings of steel.\nIt may also raise the user’s Defense stat."
    fr: "Le lanceur frappe l’ennemi avec des\nailes d’acier. Peut aussi augmenter\nla Défense du lanceur."
    it: "Colpisce il nemico con ali d’acciaio. Può\nanche aumentare la Difesa di chi la usa."
    de: "Trifft das Ziel mit Stahlflügeln.\nVerteidigungs-Wert des Anwenders\nsteigt eventuell."
    es: "Alas macizas que golpean al objetivo\ny pueden subir la Defensa\ndel usuario."
    ko: "단단한 날개를 상대에게 부딪쳐서\n공격한다. 자신의 방어가\n올라갈 때가 있다."
stockpile:
  names:
    jp_kana: たくわえる
    jp_kanji: たくわえる
    en: Stockpile
    fr: Stockage
    it: Accumulo
    de: Horter
    es: Reserva
    ko: 비축하기
  descriptions:
    jp_kana: "ちからを　たくわえて　じぶんの\nぼうぎょと　とくぼうを　あげる。\nさいだい　３かいまで　たくわえられる。"
    jp_kanji: "力を　蓄えて　自分の\n防御と　特防を　あげる。\n最大　３回まで　蓄えられる。"
    en: "The user charges up power and raises\nboth its Defense and Sp. Def. The move\ncan be used three times."
    fr: "Le lanceur accumule de la puissance et\naugmente sa Défense et sa Défense\nSpéciale. Peut être utilisé 3 fois."
    it: "Chi la usa accumula energia aumentando\nla Difesa e la Difesa Speciale.\nSi può utilizzare tre volte."
    de: "Lädt Kraft für später auf. Erhöht\nVerteidigung und Spezial-Verteidigung.\nKann bis zu dreimal eingesetzt werden."
    es: "Acumula energía y sube la Defensa y\nla Defensa Especial. Puede utilizarse\nhasta tres veces."
    ko: "힘을 비축해서 자신의\n방어와 특수방어를 올린다.\n최대 3회까지 비축할 수 있다."
stomp:
  names:
    jp_kana: ふみつけ
    jp_kanji: ふみつけ
    en: Stomp
    fr: Écrasement
    it: Pestone
    de: Stampfer
    es: Pisotón
    ko: 짓밟기
  descriptions:
    jp_kana: "おおきな　あしで\nあいてを　ふみつけて　こうげきする。\nあいてを　ひるませる　ことが　ある。"
    jp_kanji: "大きな　足で\n相手を　踏みつけて　攻撃する。\n相手を　ひるませることが　ある。"
    en: "The target is stomped with a big foot.\nIt may also make the target flinch."
    fr: "Écrase l’ennemi avec un énorme pied.\nPeut aussi l’apeurer."
    it: "Colpisce il nemico con un grosso piede\ne può anche farlo tentennare."
    de: "Stampfen mit dem Fuß. Das Ziel\nschreckt eventuell zurück."
    es: "Tremendo pisotón que puede hacer\nretroceder al objetivo."
    ko: "큰 발로\n상대를 짓밟아서 공격한다.\n상대를 풀죽게 만들 때가 있다."
stone_edge:
  names:
    jp_kana: ストーンエッジ
    jp_kanji: ストーンエッジ
    en: Stone Edge
    fr: Lame de Roc
    it: Pietrataglio
    de: Steinkante
    es: Roca Afilada
    ko: 스톤에지
  descriptions:
    jp_kana: "とがった　いわを\nあいてに　つきさして　こうげきする。\nきゅうしょに　あたりやすい。"
    jp_kanji: "とがった　岩を\n相手に　突き刺して　攻撃する。\n急所に　当たりやすい。"
    en: "The user stabs the foe with\nsharpened stones from below.\nIt has a high critical-hit ratio."
    fr: "Fait surgir des pierres aiguisées sous\nl’ennemi. Taux de critiques élevé."
    it: "Chi la usa colpisce il nemico dal\nbasso con pietre affilate. Probabile\nbrutto colpo."
    de: "Anwender sticht das Ziel mit spitzen\nSteinen. Hohe Volltrefferquote."
    es: "Clava piedras muy afiladas al objetivo.\nSuele ser crítico."
    ko: "뾰족한 바위를\n상대에게 꿰찔러서 공격한다.\n급소에 맞기 쉽다."
stored_power:
  names:
    jp_kana: アシストパワー
    jp_kanji: アシストパワー
    en: Stored Power
    fr: ForceAjoutée
    it: Veicolaforza
    de: Kraftvorrat
    es: Poderreserva
    ko: 어시스트파워
  descriptions:
    jp_kana: "ちくせき　された　パワーで　あいてを\nこうげきする。じぶんの　のうりょくが\nあがって　いるほど　いりょくが　あがる。"
    jp_kanji: "蓄積された　パワーで　相手を\n攻撃する。自分の　能力が\nあがっているほど　威力が　あがる。"
    en: "The user attacks the target with stored\npower. The more the user’s stats are\nraised, the greater the damage."
    fr: "Le lanceur attaque l’ennemi avec une force\naccumulée. Plus les stats du lanceur sont\naugmentées, plus le coup est efficace."
    it: "Attacca il bersaglio con l’energia\naccumulata. Più sono state aumentate le\nstatistiche, maggiore è il danno inflitto."
    de: "Angriff mit angesparter Energie. Je höher\ndie Statuswerte des Anwenders, desto\nstärker fällt die Attacke aus."
    es: "Acumula poder para golpear.\nCuanto más suban las características\ndel usuario, mayor será el daño."
    ko: "축적된 파워로 상대를\n공격한다. 자신의 능력이\n올라가 있는 만큼 위력이 오른다."
storm_throw:
  names:
    jp_kana: やまあらし
    jp_kanji: やまあらし
    en: Storm Throw
    fr: Yama Arashi
    it: Tempestretta
    de: Bergsturm
    es: Llave Corsé
    ko: 업어후리기
  descriptions:
    jp_kana: "きょうれつな　いちげきを\nあいてに　くりだす。こうげきは\nかならず　きゅうしょに　あたる。"
    jp_kanji: "強烈な　一撃を\n相手に　くりだす。攻撃は\n必ず　急所に　当たる。"
    en: "The user strikes the target with a fierce\nblow. This attack always results in a\ncritical hit."
    fr: "Un coup très puissant dont l’effet\nest toujours critique."
    it: "Chi la usa sferra un colpo micidiale\nal bersaglio, stritolandolo. Brutto colpo\nassicurato."
    de: "Ein Angriff mit voller Wucht\nund Volltreffergarantie."
    es: "Lanza un golpe fulminante.\nSiempre resulta en un golpe crítico."
    ko: "강렬한 일격을\n상대에게 날린다. 공격은\n반드시 급소에 맞는다."
strength:
  names:
    jp_kana: かいりき
    jp_kanji: かいりき
    en: Strength
    fr: Force
    it: Forza
    de: Stärke
    es: Fuerza
    ko: 괴력
  descriptions:
    jp_kana: "こんしんの　ちからで\nあいてを　なぐりつけて　こうげきする。\nおもたい　いわを　おすことも　できる。"
    jp_kanji: "こん身の　力で\n相手を　なぐりつけて　攻撃する。\n重たい　岩を　押すことも　できる。"
    en: "The target is slugged with a punch thrown\nat maximum power. It can also be used\nto move heavy boulders."
    fr: "Le lanceur cogne l’ennemi de toutes\nses forces. Permet aussi de déplacer\ndes rochers."
    it: "Colpisce il nemico con un’enorme energia.\nFuori dalla lotta si usa per spostare i\nmassi."
    de: "Das Ziel wird extrem stark getroffen.\nMacht Verschieben von Felsen möglich."
    es: "Potente puñetazo.\nFuera de combate sirve\npara mover piedras."
    ko: "혼신의 힘으로\n상대를 세게 때려서 공격한다.\n무거운 돌을 밀 수도 있다."
string_shot:
  names:
    jp_kana: いとをはく
    jp_kanji: いとをはく
    en: String Shot
    fr: Sécrétion
    it: Millebave
    de: Fadenschuss
    es: Disp. Demora
    ko: 실뿜기
  descriptions:
    jp_kana: "くちから　ふきだした　いとを　まきつけて\nあいての　すばやさを　さげる。"
    jp_kanji: "口から　吹きだした　糸を　まきつけて\n相手の　素早さを　さげる。"
    en: "The targets are bound with silk blown\nfrom the user’s mouth. This silk reduces\nthe targets’ Speed stat."
    fr: "Le lanceur crache de la\nsoie pour ligoter l’ennemi\net baisser sa Vitesse."
    it: "Chi la usa produce della seta che avvolge\ni nemici e ne riduce la Velocità."
    de: "Umwickelt Gegner in der Nähe mit\nFäden aus dem Mund und senkt\nden Initiative-Wert."
    es: "Lanza seda al objetivo y reduce\nsu Velocidad."
    ko: "입에서 뿜어낸 실을 휘감아서\n상대의 스피드를 떨어뜨린다."
struggle:
  names:
    jp_kana: わるあがき
    jp_kanji: わるあがき
    en: Struggle
    fr: Lutte
    it: Scontro
    de: Verzweifler
    es: Combate
    ko: 발버둥
  descriptions:
    jp_kana: "じぶんの　ＰＰが　なくなると\nあがいて　あいてを　こうげきする。\nじぶんも　すこし　ダメージを　うける。"
    jp_kanji: "自分の　ＰＰが　なくなると\nあがいて　相手を　攻撃する。\n自分も　少し　ダメージを　受ける。"
    en: "An attack that is used in desperation\nonly if the user has no PP. It also hurts\nthe user slightly."
    fr: "Une attaque désespérée, lancée\nquand le lanceur n’a plus de PP.\nLe blesse aussi légèrement."
    it: "Mossa da usare solo in caso estremo,\nquando non si hanno più PP. Danneggia\nanche chi la usa."
    de: "Angriff nur bei verbrauchten AP.\nAnwender verletzt sich selbst leicht."
    es: "Solo se usa como último recurso\nal acabarse los PP.\nHiere un poco al agresor."
    ko: "자신의 PP가 떨어지면\n발버둥쳐 상대를 공격한다.\n자신도 조금 데미지를 입는다."
struggle_bug:
  names:
    jp_kana: むしのていこう
    jp_kanji: むしのていこう
    en: Struggle Bug
    fr: Survinsecte
    it: Entomoblocco
    de: Käfertrutz
    es: Estoicismo
    ko: 벌레의저항
  descriptions:
    jp_kana: "ていこう　して　あいてを　こうげきする。\nあいての　とくこうを　さげる。"
    jp_kanji: "抵抗して　相手を　攻撃する。\n相手の　特攻を　さげる。"
    en: "While resisting, the user attacks the\nopposing Pokémon. The targets’\nSp. Atk stat is reduced."
    fr: "Le lanceur se débat de toutes ses forces,\net baisse l’Attaque Spéciale de l’ennemi."
    it: "Colpisce i nemici opponendo resistenza e\nriducendo il loro Attacco Speciale."
    de: "Anwender leistet Widerstand und greift an.\nDer Spezial-Angriff der Ziele sinkt."
    es: "El usuario contraataca.\nAdemás baja el Ataque Especial\nde los oponentes."
    ko: "저항해서 상대를 공격한다.\n상대의 특수공격을 떨어뜨린다."
stun_spore:
  names:
    jp_kana: しびれごな
    jp_kanji: しびれごな
    en: Stun Spore
    fr: Para-Spore
    it: Paralizzante
    de: Stachelspore
    es: Paralizador
    ko: 저리가루
  descriptions:
    jp_kana: "しびれる　こなを\nたくさん　ふりまいて\nあいてを　まひ　じょうたいに　する。"
    jp_kanji: "しびれる　粉を\nたくさん　ふりまいて\n相手を　まひ状態に　する。"
    en: "The user scatters a cloud of paralyzing\npowder. It may leave the target\nwith paralysis."
    fr: "Le lanceur répand sur l’ennemi une\npoudre qui le paralyse."
    it: "Investe il bersaglio con una nuvola di\npolvere che paralizza."
    de: Verstreut lähmenden Puder.
    es: Esparce polvo que paraliza al objetivo.
    ko: "저리 가루를\n많이 흩뿌려서\n상대를 마비 상태로 만든다."
submission:
  names:
    jp_kana: じごくぐるま
    jp_kanji: じごくぐるま
    en: Submission
    fr: Sacrifice
    it: Sottomiss.
    de: Überroller
    es: Sumisión
    ko: 지옥의바퀴
  descriptions:
    jp_kana: "じめんに　じぶんごと\nあいてを　なげつけて　こうげきする。\nじぶんも　すこし　ダメージを　うける。"
    jp_kanji: "地面に　自分ごと\n相手を　投げつけて　攻撃する。\n自分も　少し　ダメージを　受ける。"
    en: "The user grabs the target and recklessly\ndives for the ground. It also hurts the\nuser slightly."
    fr: "Le lanceur agrippe l’ennemi et\nl’écrase au sol. Blesse aussi\nlégèrement le lanceur."
    it: "Chi la usa carica il nemico in modo\nspericolato, ma danneggia anche\nse stesso."
    de: "Harte Körperattacke, bei der sich\nder Angreifer selbst leicht verletzt."
    es: "Tira al objetivo al suelo.\nTambién hiere al agresor."
    ko: "땅에 자신과 함께\n상대를 내던져 공격한다.\n자신도 조금 데미지를 입는다."
substitute:
  names:
    jp_kana: みがわり
    jp_kanji: みがわり
    en: Substitute
    fr: Clonage
    it: Sostituto
    de: Delegator
    es: Sustituto
    ko: 대타출동
  descriptions:
    jp_kana: "じぶんの　ＨＰを　すこし　けずって\nぶんしんを　だす。\nぶんしんは　じぶんの　みがわりに　なる。"
    jp_kanji: "自分の　ＨＰを　少し　削って\n分身を　だす。\n分身は　自分の　身代わりに　なる。"
    en: "The user makes a copy of itself using\nsome of its HP.\nThe copy serves as the user’s decoy."
    fr: "Le lanceur fait une copie de lui-même en\nsacrifiant quelques PV. La copie sert de\nleurre."
    it: "Chi la usa crea una copia di se stesso\nusando alcuni PS. La copia serve come\nesca per il nemico."
    de: "Anwender setzt eine kleine Menge an KP\nein, um einen Doppelgänger zu erzeugen,\nder für ihn Schläge einsteckt."
    es: "Utiliza parte de los PS propios para crear\nun sustituto que actúa como señuelo."
    ko: "자신의 HP를 조금 깎아서\n분신을 만든다.\n분신은 자신의 대타가 된다."
sucker_punch:
  names:
    jp_kana: ふいうち
    jp_kanji: ふいうち
    en: Sucker Punch
    fr: Coup Bas
    it: Sbigoattacco
    de: Tiefschlag
    es: Golpe Bajo
    ko: 기습
  descriptions:
    jp_kana: "あいてより　さきに　こうげき　できる。\nあいてが　だすわざが\nこうげきわざ　でないと　しっぱい　する。"
    jp_kanji: "相手より　先に　攻撃　できる。\n相手が　だす技が\n攻撃技でないと　失敗する。"
    en: "This move enables the user to attack\nfirst. It fails if the target is not\nreadying an attack, however."
    fr: "Permet au lanceur de frapper en premier.\nÉchoue si l’ennemi ne prépare pas\nune attaque."
    it: "Chi la usa può attaccare per primo.\nFallisce se il nemico non sta preparando\nun attacco."
    de: "Ermöglicht den Erstschlag. Gelingt\naber nur, wenn das Ziel gerade eine\nAttacke vorbereitet."
    es: "Permite atacar primero.\nFalla si el objetivo no está preparando\nningún ataque."
    ko: "상대보다 먼저 공격할 수 있다.\n상대가 쓴 기술이\n공격기술이 아니면 실패한다."
sunny_day:
  names:
    jp_kana: にほんばれ
    jp_kanji: にほんばれ
    en: Sunny Day
    fr: Zénith
    it: Giornodisole
    de: Sonnentag
    es: Día Soleado
    ko: 쾌청
  descriptions:
    jp_kana: "５ターンの　あいだ　ひざしを\nつよくして　ほのおタイプの\nわざの　いりょくを　あげる。"
    jp_kanji: "５ターンの　あいだ　日差しを\n強くして　ほのおタイプの\n技の　威力を　あげる。"
    en: "The user intensifies the sun for\nfive turns, powering up\nFire-type moves."
    fr: "Fait briller le soleil pendant 5 tours et\naméliore les capacités de type Feu."
    it: "Chi la usa intensifica i raggi solari per\ncinque turni, potenziando le mosse di tipo\nFuoco."
    de: "Die Sonne brennt unbarmherzig fünf\nRunden lang. Dadurch werden Attacken\nvom Typ Feuer verstärkt."
    es: "Quien lo usa intensifica el sol durante\ncinco turnos, lo que potencia los\nmovimientos de tipo Fuego."
    ko: "5턴 동안 햇살을\n강하게 해서 불꽃타입\n기술의 위력을 올린다."
super_fang:
  names:
    jp_kana: いかりのまえば
    jp_kanji: いかりのまえば
    en: Super Fang
    fr: Croc Fatal
    it: Superzanna
    de: Superzahn
    es: Superdiente
    ko: 분노의앞니
  descriptions:
    jp_kana: "するどい　まえばで\nはげしく　かみついて　こうげきする。\nあいての　ＨＰは　はんぶんに　なる。"
    jp_kanji: "鋭い　前歯で\n激しく　かみついて　攻撃する。\n相手の　ＨＰは　半分に　なる。"
    en: "The user chomps hard on the\ntarget with its sharp front fangs.\nIt cuts the target’s HP to half."
    fr: "Une vilaine morsure d’incisives qui réduit\nde moitié les PV de l’ennemi."
    it: "Chi la usa salta sul nemico azzannandolo\ncon i suoi incisivi affilati e facendogli\nperdere metà dei PS."
    de: "Greift mit scharfen Reißzähnen an.\nKP des Zieles werden halbiert."
    es: "Finos colmillos que reducen a la mitad\nlos PS del objetivo."
    ko: "날카로운 앞니로\n강하게 물어서 공격한다.\n상대의 HP는 절반이 된다."
superpower:
  names:
    jp_kana: ばかぢから
    jp_kanji: ばかぢから
    en: Superpower
    fr: Surpuissance
    it: Troppoforte
    de: Kraftkoloss
    es: Fuerza Bruta
    ko: 엄청난힘
  descriptions:
    jp_kana: "すごい　ちからを　はっきして\nあいてを　こうげきする。じぶんの\nこうげきと　ぼうぎょが　さがる。"
    jp_kanji: "すごい　力を　発揮して\n相手を　攻撃する。自分の\n攻撃と　防御が　さがる。"
    en: "The user attacks the target with great\npower. However, it also lowers the\nuser’s Attack and Defense."
    fr: "Une attaque puissante, mais qui baisse\nl’Attaque et la Défense du lanceur."
    it: "Chi la usa attacca il nemico con grande\nforza, ma il suo Attacco e la sua Difesa\npeggiorano."
    de: "Starke Attacke, die sowohl Angriff als\nauch Verteidigung des Anwenders senkt."
    es: "Ataque de gran potencia, pero que reduce\nel Ataque y la Defensa del agresor."
    ko: "엄청난 힘을 발휘하여\n상대를 공격한다. 자신의\n공격과 방어가 떨어진다."
supersonic:
  names:
    jp_kana: ちょうおんぱ
    jp_kanji: ちょうおんぱ
    en: Supersonic
    fr: Ultrason
    it: Supersuono
    de: Superschall
    es: Supersónico
    ko: 초음파
  descriptions:
    jp_kana: "とくしゅな　おんぱを\nからだから　はっして　\nあいてを　こんらん　させる。"
    jp_kanji: "特殊な　音波を\n体から　発して\n相手を　混乱させる。"
    en: "The user generates odd sound waves from\nits body. It may confuse the target."
    fr: "Le lanceur produit d’étranges ondes\nsonores qui rendent confus."
    it: "Chi la usa genera dal proprio corpo\nstrane onde acustiche che possono\nconfondere il nemico."
    de: "Ausstoß bizarrer Schallwellen.\nDas Ziel wird verwirrt."
    es: "Raras ondas sónicas que pueden\nconfundir al objetivo."
    ko: "특수한 음파를\n몸에서 발산하여\n상대를 혼란시킨다."
surf:
  names:
    jp_kana: なみのり
    jp_kanji: なみのり
    en: Surf
    fr: Surf
    it: Surf
    de: Surfer
    es: Surf
    ko: 파도타기
  descriptions:
    jp_kana: "おおきな　なみで　じぶんの\nまわりに　いるものを　こうげきする。\nみずの　うえも　およいで　すすめる。"
    jp_kanji: "大きな　波で　自分の\n周りに　いるものを　攻撃する。\n水上も　泳いで　進める。"
    en: "It swamps the area around the user\nwith a giant wave.\nIt can also be used for crossing water."
    fr: "Une énorme vague s’abat sur le\nchamp de bataille. Permet aussi\nde voyager sur l’eau."
    it: "Un’onda enorme sommerge il campo\ndi lotta. Fuori dalla lotta si usa\nper spostarsi sull’acqua."
    de: "Eine Welle bricht über alle Pokémon in der\nNähe des Anwenders herein. Macht Surfen\nmöglich."
    es: "Inunda el campo de batalla con una ola\ngigante. Fuera de batalla sirve para\nmoverse sobre el agua."
    ko: "큰 파도로 자신의\n주위에 있는 포켓몬을 공격한다.\n물 위도 헤엄쳐서 나아간다."
swagger:
  names:
    jp_kana: いばる
    jp_kanji: いばる
    en: Swagger
    fr: Vantardise
    it: Bullo
    de: Angeberei
    es: Contoneo
    ko: 뽐내기
  descriptions:
    jp_kana: "あいてを　おこらせて　こんらん　させる。\nいかりで　あいての　こうげきは\nぐーんと　あがってしまう。"
    jp_kanji: "相手を　怒らせて　混乱させる。\n怒りで　相手の　攻撃は\nぐーんと　あがってしまう。"
    en: "The user enrages and confuses the target.\nHowever, it also sharply raises the\ntarget’s Attack stat."
    fr: "Fait enrager la cible et la plonge dans\nla confusion, mais augmente fortement\nson Attaque."
    it: "Chi la usa provoca il bersaglio e lo\nconfonde, facendo aumentare però\ndi molto il suo Attacco."
    de: "Verwirrt das Ziel und erhöht\ndessen Angriffs-Wert stark."
    es: "Provoca confusión en el objetivo,\npero también sube mucho su Ataque."
    ko: "상대를 화내게 해서 혼란시킨다.\n분노로 상대의 공격은\n크게 올라가 버린다."
swallow:
  names:
    jp_kana: のみこむ
    jp_kanji: のみこむ
    en: Swallow
    fr: Avale
    it: Introenergia
    de: Verzehrer
    es: Tragar
    ko: 꿀꺽
  descriptions:
    jp_kana: "たくわえた　ちからを　のみこんで\nじぶんの　ＨＰを　かいふく　する。\nたくわえて　いるほど　かいふく　する。"
    jp_kanji: "蓄えた　力を　のみこんで\n自分の　ＨＰを　回復する。\n蓄えているほど　回復する。"
    en: "The power stored using the move Stockpile\nis absorbed by the user to heal its HP.\nStoring more power heals more HP."
    fr: "Le lanceur absorbe la puissance accumulée\navec Stockage pour restaurer ses PV."
    it: "Chi la usa assorbe l’energia raccolta\ncon la mossa Accumulo e recupera PS.\nMaggiore è l’energia, più PS si recuperano."
    de: "Absorbiert die gehortete Kraft,\num KP aufzufüllen."
    es: "Absorbe la energía acumulada\ncon Reserva y restaura PS."
    ko: "비축된 힘을 꿀꺽해서\n자신의 HP를 회복한다.\n비축된 만큼 회복한다."
sweet_kiss:
  names:
    jp_kana: てんしのキッス
    jp_kanji: てんしのキッス
    en: Sweet Kiss
    fr: Doux Baiser
    it: Dolcebacio
    de: Bitterkuss
    es: Beso Dulce
    ko: 천사의키스
  descriptions:
    jp_kana: "てんしのように　かわいく　キスして\nあいてを　こんらん　させる。"
    jp_kanji: "天使のように　かわいく　キスして\n相手を　混乱させる。"
    en: "The user kisses the target with a sweet,\nangelic cuteness that causes confusion."
    fr: "Le lanceur envoie un bisou si mignon\net désarmant qu’il plonge l’ennemi dans\nla confusion."
    it: "Chi la usa bacia il nemico con una dolcezza\nangelica, confondendolo."
    de: "Anwender küsst Ziel, das durch\ndiese Niedlichkeit verwirrt wird."
    es: "Da un beso con tal dulzura que\ncausa confusión."
    ko: "천사처럼 귀엽게 키스하여\n상대를 혼란시킨다."
sweet_scent:
  names:
    jp_kana: あまいかおり
    jp_kanji: あまいかおり
    en: Sweet Scent
    fr: Doux Parfum
    it: Profumino
    de: Lockduft
    es: Dulce Aroma
    ko: 달콤한향기
  descriptions:
    jp_kana: "かおりで　あいての　かいひりつを\nさげる。くさむら　などで　つかうと\nポケモンが　よってくる。"
    jp_kanji: "香りで　相手の　回避率を　さげる。\n草むら　などで　使うと\nポケモンが　よってくる。"
    en: "A sweet scent that lowers the opposing\nteam’s evasiveness. It also lures wild\nPokémon if used in grass, etc."
    fr: "Un doux parfum qui réduit l’Esquive\nde l’ennemi. Attire aussi\nles Pokémon sauvages."
    it: "Un dolce profumo che riduce l’elusione dei\nnemici. Fuori dalla lotta attira i Pokémon\nselvatici."
    de: "Lockt Gegner an und senkt deren\nFluchtwert. Lockt im Gras auch\nwilde Pokémon an."
    es: "Engatusa al objetivo para reducir\nsu Evasión. En la hierba alta sirve\npara atraer Pokémon salvajes."
    ko: "향기로 상대의 회피율을 떨어뜨린다.\n풀밭 등에서 쓰면\n포켓몬이 다가온다."
swift:
  names:
    jp_kana: スピードスター
    jp_kanji: スピードスター
    en: Swift
    fr: Météores
    it: Comete
    de: Sternschauer
    es: Rapidez
    ko: 스피드스타
  descriptions:
    jp_kana: "ほしがたの　ひかりを　はっしゃして\nあいてを　こうげきする。\nこうげきは　かならず　めいちゅう　する。"
    jp_kanji: "星型の　光を　発射して\n相手を　攻撃する。\n攻撃は　必ず　命中する。"
    en: "Star-shaped rays are shot at the opposing\nteam. This attack never misses."
    fr: "Le lanceur envoie des rayons d’étoiles.\nTouche toujours l’ennemi."
    it: "Colpisce i nemici con raggi a forma\ndi stella. Questo attacco è infallibile."
    de: "Verschießt sternförmige Strahlen,\ndie stets treffen, auf Gegner in\nder Umgebung."
    es: "Lanza rayos en forma de estrella que no\nfallan nunca."
    ko: "별 모양의 빛을 발사해서\n상대를 공격한다.\n공격은 반드시 명중한다."
switcheroo:
  names:
    jp_kana: すりかえ
    jp_kanji: すりかえ
    en: Switcheroo
    fr: Passe-Passe
    it: Rapidscambio
    de: Wechseldich
    es: Trapicheo
    ko: 바꿔치기
  descriptions:
    jp_kana: "めにも　とまらぬ　はやさで\nじぶんと　あいての　\nもちものを　こうかんする。"
    jp_kanji: "目にも　留まらぬ　速さで\n自分と　相手の　\n持ち物を　交換する。"
    en: "The user trades held items with the target\nfaster than the eye can follow."
    fr: "Le lanceur échange son objet avec\ncelui de la cible à une vitesse que\nl’œil a du mal à suivre."
    it: "Chi la usa scambia lo strumento che tiene\ncon quello del bersaglio ad una velocità\nimpressionante."
    de: "Item wird in Windeseile mit dem\nZiel getauscht."
    es: "Intercambia con el objetivo los objetos\nque llevan tan rápido que es imposible\nverlo a simple vista."
    ko: "눈에 보이지 않는 속도로\n자신과 상대가\n지닌 물건을 교환한다."
swords_dance:
  names:
    jp_kana: つるぎのまい
    jp_kanji: つるぎのまい
    en: Swords Dance
    fr: Danse-Lames
    it: Danzaspada
    de: Schwerttanz
    es: Danza Espada
    ko: 칼춤
  descriptions:
    jp_kana: "たたかいのまいを　はげしく　おどって\nきあいを　たかめる。\nじぶんの　こうげきを　ぐーんと　あげる。"
    jp_kanji: "戦いの舞を　激しく　おどって\n気合を　高める。\n自分の　攻撃を　ぐーんと　あげる。"
    en: "A frenetic dance to uplift the fighting\nspirit. It sharply raises the user’s\nAttack stat."
    fr: "Danse frénétique qui exalte l’esprit\ncombatif. Augmente beaucoup\nl’Attaque du lanceur."
    it: "Danza frenetica che incrementa lo spirito\ncombattivo. Chi la usa aumenta di molto\nil suo Attacco."
    de: "Ein wilder Kampftanz, der den eigenen\nAngriffs-Wert stark erhöht."
    es: "Baile frenético que aumenta mucho\nel Ataque."
    ko: "싸움의 춤을 격렬하게 추며\n기세를 높인다.\n자신의 공격을 크게 올린다."
synchronoise:
  names:
    jp_kana: シンクロノイズ
    jp_kanji: シンクロノイズ
    en: Synchronoise
    fr: Synchropeine
    it: Sincrumore
    de: Synchrolärm
    es: Sincrorruido
    ko: 싱크로노이즈
  descriptions:
    jp_kana: "ふしぎな　でんぱで　まわりに　いる\nじぶんと　おなじ　タイプの　\nポケモンに　ダメージを　あたえる。"
    jp_kanji: "不思議な　電波で　周りに　いる\n自分と　同じ　タイプの　\nポケモンに　ダメージを　与える。"
    en: "Using an odd shock wave, the user\ninflicts damage on any Pokémon of the same\ntype in the area around it."
    fr: "Des ondes mystérieuses blessent tous\nles Pokémon alentour qui sont du même\ntype que le lanceur."
    it: "Chi la usa infligge danni a tutti i Pokémon\ndel suo stesso tipo che ha vicino usando\nmisteriose onde elettromagnetiche."
    de: "Fügt Pokémon vom selben Typ, die sich in\nder Nähe des Anwenders aufhalten, mit\nseltsamen Druckwellen Schaden zu."
    es: "Una extraña onda que daña a todos\nlos Pokémon adyacentes del mismo\ntipo que el que la ejecuta."
    ko: "이상한 전파로 주위에 있는\n자신과 같은 타입의\n포켓몬에게 데미지를 준다."
synthesis:
  names:
    jp_kana: こうごうせい
    jp_kanji: こうごうせい
    en: Synthesis
    fr: Synthèse
    it: Sintesi
    de: Synthese
    es: Síntesis
    ko: 광합성
  descriptions:
    jp_kana: "じぶんの　ＨＰを　かいふく　する。\nてんきに　よって\nかいふくの　りょうが　へんか　する。"
    jp_kanji: "自分の　ＨＰを　回復する。\n天気に　よって\n回復の　量が　変化する。"
    en: "The user restores its own HP.\nThe amount of HP regained varies\nwith the weather."
    fr: "Un soin qui restaure des PV au lanceur.\nSon efficacité varie en fonction de la\nmétéo."
    it: "Chi la usa recupera PS. Il numero di PS\nrecuperati dipende dalle condizioni\natmosferiche."
    de: "Füllt KP des Anwenders auf.\nDie Menge hängt vom Wetter ab."
    es: "Restaura PS del usuario.\nLa cantidad varía según\nel tiempo que haga."
    ko: "자신의 HP를 회복한다.\n날씨에 따라\n회복량이 변한다."
tackle:
  names:
    jp_kana: たいあたり
    jp_kanji: たいあたり
    en: Tackle
    fr: Charge
    it: Azione
    de: Tackle
    es: Placaje
    ko: 몸통박치기
  descriptions:
    jp_kana: "あいてに　むかって　からだ　ぜんたいで\nぶつかって　いき　こうげきする。"
    jp_kanji: "相手に　むかって　全身で\nぶつかっていき　攻撃する。"
    en: "A physical attack in which the user\ncharges and slams into the target\nwith its whole body."
    fr: "Le lanceur charge l’ennemi et\nle percute de tout son corps."
    it: "Attacco fisico che colpisce il nemico\ninvestendolo con tutto il corpo."
    de: "Trifft das Ziel mit vollem\nKörpereinsatz."
    es: Embiste con todo el cuerpo.
    ko: "상대를 향해서 몸 전체를\n부딪쳐가며 공격한다."
tail_glow:
  names:
    jp_kana: ほたるび
    jp_kanji: ほたるび
    en: Tail Glow
    fr: Lumiqueue
    it: Codadiluce
    de: Schweifglanz
    es: Ráfaga
    ko: 반딧불
  descriptions:
    jp_kana: "てんめつする　ひかりを　ながめて\nじぶんの　せいしんを　とういつし\nとくこうを　ぐぐーんと　あげる。"
    jp_kanji: "点滅する　光を　眺めて\n自分の　精神を　統一し\n特攻を　ぐぐーんと　あげる。"
    en: "The user stares at flashing lights to\nfocus its mind, drastically raising its\nSp. Atk stat."
    fr: "Le lanceur regarde un flash lumineux\nfixement. Augmente considérablement\nson Attaque Spéciale."
    it: "Chi la usa fissa una luce forte per\nconcentrarsi e aumentare moltissimo\nl’Attacco Speciale."
    de: "Ein blinkendes Licht, das den\nSpezial-Angriff drastisch erhöht."
    es: "Se concentra en una ráfaga de luz que\nsube muchísimo el Ataque Especial."
    ko: "깜빡거리는 빛을 바라보고\n자신의 정신을 통일하여\n특수공격을 매우 크게 올린다."
tail_slap:
  names:
    jp_kana: スイープビンタ
    jp_kanji: スイープビンタ
    en: Tail Slap
    fr: Plumo-Queue
    it: Spazzasberla
    de: Kehrschelle
    es: Plumerazo
    ko: 스위프뺨치기
  descriptions:
    jp_kana: "かたい　しっぽで\nあいてを　たたいて　こうげきする。\n２ー５かいの　あいだ　れんぞくで　だす。"
    jp_kanji: "硬い　しっぽで\n相手を　たたいて　攻撃する。\n２ー５回の　あいだ　連続で　だす。"
    en: "The user attacks by striking the target\nwith its hard tail. It hits the target two\nto five times in a row."
    fr: "Le lanceur frappe l’ennemi de 2 à 5 fois\nd’affilée avec sa queue robuste."
    it: "Chi la usa colpisce il bersaglio con la sua\ncoda dura da due a cinque volte di fila."
    de: "Anwender greift das Ziel mit\nseiner schlagfesten Rute 2- bis 5-mal\nhintereinander an."
    es: "Golpea con la cola u otras\npartes de su cuerpo de dos\na cinco veces seguidas."
    ko: "단단한 꼬리로\n상대를 때려서 공격한다.\n2-5회 동안 연속으로 쓴다."
tail_whip:
  names:
    jp_kana: しっぽをふる
    jp_kanji: しっぽをふる
    en: Tail Whip
    fr: Mimi-Queue
    it: Colpocoda
    de: Rutenschlag
    es: Látigo
    ko: 꼬리흔들기
  descriptions:
    jp_kana: "しっぽを　さゆうに　かわいく　ふって\nゆだんを　さそう。\nあいての　ぼうぎょを　さげる。"
    jp_kanji: "しっぽを　左右に　かわいく　ふって\n油断を　誘う。\n相手の　防御を　さげる。"
    en: "The user wags its tail cutely, making\nopposing Pokémon less wary and\nlowering their Defense stat."
    fr: "Le lanceur remue son adorable queue\npour tromper la vigilance de l’ennemi\net baisser sa Défense."
    it: "Chi la usa agita la coda per distrarre\ni nemici, riducendone la Difesa."
    de: "Hieb mit dem Schweif. Senkt die\nVerteidigung des Gegners."
    es: "Agita la cola para bajar la Defensa\ndel contrincante."
    ko: "꼬리를 좌우로 귀엽게 흔들어\n방심을 유도한다.\n상대의 방어를 떨어뜨린다."
tailwind:
  names:
    jp_kana: おいかぜ
    jp_kanji: おいかぜ
    en: Tailwind
    fr: Vent Arrière
    it: Ventoincoda
    de: Rückenwind
    es: Viento Afín
    ko: 순풍
  descriptions:
    jp_kana: "はげしく　ふきあれる\nかぜのうずを　つくり　４ターンの　あいだ\nみかた　ぜんいんの　すばやさを　あげる。"
    jp_kanji: "激しく　吹きあれる\n風の渦を　つくり　４ターンの　あいだ\n味方　全員の　素早さを　あげる。"
    en: "The user whips up a turbulent whirlwind\nthat ups the Speed of all party Pokémon\nfor four turns."
    fr: "Génère une rafale de vent qui augmente la\nVitesse des Pokémon de l’équipe pendant 4\ntours."
    it: "Chi la usa scatena un turbine che aumenta\nla Velocità di tutti i Pokémon della squadra\nper quattro turni."
    de: "Anwender erzeugt einen Wirbelwind, der\nInitiative aller Pokémon im Team für vier\nRunden steigert."
    es: "Crea un fuerte remolino que aumenta\nla Velocidad de los Pokémon de tu equipo\ndurante cuatro turnos."
    ko: "세차게 불어대는\n바람의 소용돌이를 만들어 4턴 동안\n같은 편 모두의 스피드를 올린다."
take_down:
  names:
    jp_kana: とっしん
    jp_kanji: とっしん
    en: Take Down
    fr: Bélier
    it: Riduttore
    de: Bodycheck
    es: Derribo
    ko: 돌진
  descriptions:
    jp_kana: "すごい　いきおいで\nあいてに　ぶつかって　こうげきする。\nじぶんも　すこし　ダメージを　うける。"
    jp_kanji: "すごい　勢いで\n相手に　ぶつかって　攻撃する。\n自分も　少し　ダメージを　受ける。"
    en: "A reckless, full-body charge attack for\nslamming into the target.\nIt also damages the user a little."
    fr: "Une charge violente qui blesse aussi\nlégèrement le lanceur."
    it: "Carica spericolata con tutto il corpo\ncontro il nemico. Danneggia un po’\nanche chi la usa."
    de: "Rücksichtslose Attacke, bei der sich\nder Angreifer selbst leicht verletzt."
    es: "Carga desmedida que también hiere\nal agresor."
    ko: "굉장한 기세로\n상대에게 부딪쳐 공격한다.\n자신도 조금 데미지를 입는다."
taunt:
  names:
    jp_kana: ちょうはつ
    jp_kanji: ちょうはつ
    en: Taunt
    fr: Provoc
    it: Provocazione
    de: Verhöhner
    es: Mofa
    ko: 도발
  descriptions:
    jp_kana: "あいてを　おこらせる。３ターンの\nあいだ　あいては　ダメージを\nあたえる　わざしか　だせなく　なる。"
    jp_kanji: "相手を　怒らせる。３ターンの\nあいだ　相手は　ダメージを\n与える　技しか　だせなくなる。"
    en: "The target is taunted into a rage that\nallows it to use only attack moves\nfor three turns."
    fr: "Provoque l’ennemi. L’oblige à n’utiliser\nque des attaques pendant 3 tours."
    it: "Provoca il nemico, inducendolo ad usare\nsolo mosse d’attacco per tre turni."
    de: "Bringt das Ziel in Rage. Dieses\nkann über drei Runden hinweg nur\nnoch angreifen."
    es: "Enfurece al objetivo para que solo\nuse movimientos de ataque\ndurante tres turnos."
    ko: "상대를 화나게 한다.\n3턴 동안 상대는 데미지를\n주는 기술밖에 쓸 수 없게 된다."
techno_blast:
  names:
    jp_kana: テクノバスター
    jp_kanji: テクノバスター
    en: Techno Blast
    fr: TechnoBuster
    it: Tecnobotto
    de: Techblaster
    es: Tecno Shock
    ko: 테크노버스터
  descriptions:
    jp_kana: "こうだんを　あいてに\nほうしゅつする。じぶんの　もつ\nカセットに　より　タイプが　かわる。"
    jp_kanji: "光弾を　相手に　放出する。\n自分の　持つ\nカセットにより　タイプが　変わる。"
    en: "The user fires a beam of light at\nits target. The type changes depending\non the Drive the user holds."
    fr: "Le lanceur projette un rayon lumineux sur\nl’ennemi. Le type varie selon le Module\nque tient le lanceur."
    it: "Chi la usa rilascia un colpo di luce contro\nil bersaglio. Il tipo varia a seconda del\nmodulo tenuto."
    de: "Anwender feuert ein Lichtgeschoss auf das\nZiel ab. Der Typ der Attacke hängt von\ndem des Moduls ab."
    es: "Ataca al objetivo con un gran laser.\nEl tipo del ataque lo determina el\ncartucho que porta el usuario."
    ko: "광탄을 상대에게 방출한다.\n자신이 지니고 있는\n카세트에 의해 타입이 바뀐다."
teeter_dance:
  names:
    jp_kana: フラフラダンス
    jp_kanji: フラフラダンス
    en: Teeter Dance
    fr: Danse-Folle
    it: Strampadanza
    de: Taumeltanz
    es: Danza Caos
    ko: 흔들흔들댄스
  descriptions:
    jp_kana: "フラフラと　ダンスを　おどって\nじぶんの　まわりに　いるものを\nこんらん　じょうたいに　させる。"
    jp_kanji: "フラフラと　ダンスを　おどって\n自分の　周りに　いるものを\n混乱状態に　させる。"
    en: "The user performs a wobbly dance that\nconfuses the Pokémon around it."
    fr: "Danse qui rend confus tous les\nPokémon autour du lanceur."
    it: "Chi la usa esegue una danza goffa che\nconfonde tutti i Pokémon attorno."
    de: "Ein Wackeltanz, der andere\nPokémon in der Umgebung\ndes Anwenders verwirrt."
    es: "Danza histérica que confunde a los\nPokémon que están alrededor\ndel usuario."
    ko: "흔들흔들 댄스를 춰서\n주위에 있는 포켓몬을\n혼란 상태로 만든다."
telekinesis:
  names:
    jp_kana: テレキネシス
    jp_kanji: テレキネシス
    en: Telekinesis
    fr: Lévikinésie
    it: Telecinesi
    de: Telekinese
    es: Telequinesis
    ko: 텔레키네시스
  descriptions:
    jp_kana: "ちょうのうりょくで　あいてを　うかせる。\n３ターンの　あいだ　こうげきが\nあいてに　あたりやすく　なる。"
    jp_kanji: "超能力で　相手を　浮かせる。\n３ターンの　あいだ　攻撃が\n相手に　当たりやすく　なる。"
    en: "The user makes the target float with its\npsychic power. The target is easier to\nhit for three turns."
    fr: "Un pouvoir qui fait flotter l’ennemi dans\nles airs. Pendant 3 tours, il devient plus\nfacile à atteindre."
    it: "Chi la usa fa galleggiare in aria il\nbersaglio, rendendolo facile da\ncolpire per tre turni."
    de: "Bringt das Ziel durch Psycho-Kräfte zum\nSchweben. Dieses lässt sich so über drei\nRunden hinweg besonders leicht treffen."
    es: "El usuario emplea su poder mental para\nhacer flotar al objetivo, haciéndolo blanco\nfácil de sus ataques durante tres turnos."
    ko: "초능력으로 상대를 띄운다.\n3턴 동안 공격이\n상대에게 맞기 쉬워진다."
teleport:
  names:
    jp_kana: テレポート
    jp_kanji: テレポート
    en: Teleport
    fr: Téléport
    it: Teletraspor.
    de: Teleport
    es: Teletransp
    ko: 순간이동
  descriptions:
    jp_kana: "やせい　ポケモンとの　せんとうを\nやめる。さいごに　はいった\nポケセンの　ある　まちにも　いける。"
    jp_kanji: "野生ポケモンとの　戦闘を　やめる。\n最後に　はいった\nポケセンの　ある　街にも　行ける。"
    en: "Use it to flee from any wild Pokémon.\nIt can also warp to the last Pokémon\nCenter visited."
    fr: "Permet de fuir un Pokémon sauvage.\nPermet aussi de revenir au dernier\nCentre Pokémon visité."
    it: "Fa fuggire dai Pokémon selvatici.\nFuori dalla lotta porta all’ultimo\nCentro Pokémon visitato."
    de: "Flieht sofort vor wilden Pokémon.\nWarp zum letzten Pokémon-Center."
    es: "Permite huir al instante de combates\ncontra Pokémon salvajes o viajar\nal último Centro Pokémon visitado."
    ko: "야생 포켓몬과 배틀을 그만둔다.\n마지막에 들어갔던\n포켓몬센터가 있는 도시에도 갈 수 있다."
thief:
  names:
    jp_kana: どろぼう
    jp_kanji: どろぼう
    en: Thief
    fr: Larcin
    it: Furto
    de: Raub
    es: Ladrón
    ko: 도둑질
  descriptions:
    jp_kana: "こうげきと　どうじに　どうぐを　ぬすむ。\nじぶんが　どうぐを　もっている　ばあいは\nぬすめない。"
    jp_kanji: "攻撃と　同時に　道具を　盗む。\n自分が　道具を　持っている　場合は\n盗めない。"
    en: "The user attacks and steals the target’s\nheld item simultaneously.\nIt can’t steal if the user holds an item."
    fr: "Le lanceur attaque la cible et vole\nson objet. Le lanceur ne peut rien\nvoler s’il tient déjà un objet."
    it: "Chi la usa attacca il bersaglio e può\nrubargli uno strumento, se non ne tiene\ngià uno."
    de: "Erlaubt es, das Item des Zieles zu\nstehlen, solang der Anwender selbst\nkeins bei sich trägt."
    es: "Ataca y le quita al objetivo el objeto\nque lleve. Si el agresor lleva\nun objeto, no robará el del objetivo."
    ko: "공격과 동시에 도구를 훔친다.\n자신이 도구를 지니고 있을 경우에는\n훔칠 수 없다."
thrash:
  names:
    jp_kana: あばれる
    jp_kanji: あばれる
    en: Thrash
    fr: Mania
    it: Colpo
    de: Fuchtler
    es: Golpe
    ko: 난동부리기
  descriptions:
    jp_kana: "２ー３ターンの　あいだ\nあばれまくって　あいてを　こうげきする。\nあばれた　あとは　こんらん　する。"
    jp_kanji: "２ー３ターンの　あいだ\n暴れまくって　相手を　攻撃する。\n暴れたあとは　混乱する。"
    en: "The user rampages and attacks for two\nto three turns. It then becomes\nconfused, however."
    fr: "Une attaque furieuse qui dure de 2 à 3\ntours. Le lanceur devient confus."
    it: "Assale e attacca il nemico per due o tre\nturni, ma confonde chi la usa."
    de: "Attacke über 2 bis 3 Runden,\ndie den Angreifer verwirrt."
    es: "Ataca de dos a tres turnos y acaba\nconfundiendo al agresor."
    ko: "2-3턴 동안\n마구 난동부려서 상대를 공격한다.\n난동부린 뒤에는 혼란에 빠진다."
thunder:
  names:
    jp_kana: かみなり
    jp_kanji: かみなり
    en: Thunder
    fr: Fatal-Foudre
    it: Tuono
    de: Donner
    es: Trueno
    ko: 번개
  descriptions:
    jp_kana: "はげしい　かみなりを\nあいてに　おとして　こうげきする。\nまひ　じょうたいに　することが　ある。"
    jp_kanji: "激しい　雷を\n相手に　落として　攻撃する。\nまひ状態に　することが　ある。"
    en: "A wicked thunderbolt is dropped\non the target to inflict damage. It may\nalso leave the target with paralysis."
    fr: "La foudre tombe sur l’ennemi\npour lui infliger des dégâts.\nPeut aussi le paralyser."
    it: "Il nemico è colpito da un lampo molto\nviolento che può anche paralizzarlo."
    de: "Eine verheerende Elektro-Attacke,\ndie das Ziel eventuell paralysiert."
    es: "Un poderoso rayo que daña al objetivo\ny puede paralizarlo."
    ko: "강한 번개를\n상대에게 떨어뜨려 공격한다.\n마비 상태로 만들 때가 있다."
thunder_fang:
  names:
    jp_kana: かみなりのキバ
    jp_kanji: かみなりのキバ
    en: Thunder Fang
    fr: Crocs Éclair
    it: Fulmindenti
    de: Donnerzahn
    es: Colm. Rayo
    ko: 번개엄니
  descriptions:
    jp_kana: "でんきを　ためた　キバで　かみつく。\nあいてを　ひるませたり\nまひ　じょうたいに　することが　ある。"
    jp_kanji: "電気を　ためた　キバで　かみつく。\n相手を　ひるませたり\nまひ状態に　することが　ある。"
    en: "The user bites with electrified fangs.\nIt may also make the target flinch or\nleave it with paralysis."
    fr: "Le lanceur utilise une morsure électrifiée.\nPeut aussi paralyser ou apeurer l’ennemi."
    it: "Chi la usa morde con denti elettrificati\nche possono anche paralizzare o far\ntentennare il nemico."
    de: "Anwender beißt mit elektrifizierten\nReißzähnen zu. Das Ziel schreckt\neventuell zurück oder wird paralysiert."
    es: "Usa colmillos electrificados para\nmorder. Puede hacer que el objetivo\nretroceda o paralizarlo."
    ko: "전기를 모은 이빨로 문다.\n상대를 풀죽게 하거나\n마비 상태로 만들 때가 있다."
thunder_punch:
  names:
    jp_kana: かみなりパンチ
    jp_kanji: かみなりパンチ
    en: ThunderPunch
    fr: Poing-Éclair
    it: Tuonopugno
    de: Donnerschlag
    es: Puño Trueno
    ko: 번개펀치
  descriptions:
    jp_kana: "でんげきを　こめた　パンチで\nあいてを　こうげきする。\nまひ　じょうたいに　することが　ある。"
    jp_kanji: "電撃を　こめた　パンチで\n相手を　攻撃する。\nまひ状態に　することが　ある。"
    en: "The target is punched with an electrified\nfist. It may also leave the target\nwith paralysis."
    fr: "Un coup de poing électrique vient\nfrapper l’ennemi. Peut le paralyser."
    it: "Colpisce il nemico con un pugno elettrico\nche può paralizzarlo."
    de: "Ein elektrischer Schlag, der das Ziel\neventuell paralysiert."
    es: "Puñetazo eléctrico.\nPuede paralizar."
    ko: "전격을 담은 펀치로\n상대를 공격한다.\n마비 상태로 만들 때가 있다."
thunder_shock:
  names:
    jp_kana: でんきショック
    jp_kanji: でんきショック
    en: ThunderShock
    fr: Éclair
    it: Tuonoshock
    de: Donnerschock
    es: Impactrueno
    ko: 전기쇼크
  descriptions:
    jp_kana: "でんきの　しげきを\nあいてに　あびせて　こうげきする。\nまひ　じょうたいに　することが　ある。"
    jp_kanji: "電気の　刺激を\n相手に　浴びせて　攻撃する。\nまひ状態に　することが　ある。"
    en: "A jolt of electricity is hurled\nat the target to inflict damage. It may\nalso leave the target with paralysis."
    fr: "Une décharge électrique tombe sur\nl’ennemi. Peut aussi le paralyser."
    it: "Danneggia il bersaglio con una scarica\nelettrica che può anche paralizzarlo."
    de: "Eine Elektro-Attacke, die das\nZiel eventuell paralysiert."
    es: "Ataque eléctrico que puede paralizar\nal objetivo."
    ko: "전기 자극을\n상대에게 날려서 공격한다.\n마비 상태로 만들 때가 있다."
thunder_wave:
  names:
    jp_kana: でんじは
    jp_kanji: でんじは
    en: Thunder Wave
    fr: Cage-Éclair
    it: Tuononda
    de: Donnerwelle
    es: Onda Trueno
    ko: 전기자석파
  descriptions:
    jp_kana: "よわい　でんげきを　あびせる　ことで\nあいてを　まひ　じょうたいに　する。"
    jp_kanji: "弱い　電撃を　浴びせることで\n相手を　まひ状態に　する。"
    en: "A weak electric charge is launched at\nthe target. It causes paralysis if it hits."
    fr: "Un faible choc électrique frappe\nl’ennemi. Si l’attaque touche,\ncelui-ci est paralysé."
    it: "Il nemico viene colpito da una debole\nscarica elettrica che, se va a segno,\nne causa la paralisi."
    de: "Ein schwacher Stromstoß, der\ndas Ziel paralysiert."
    es: "Una ligera descarga que paraliza\nal objetivo si lo alcanza."
    ko: "약한 전격을 날려서\n상대를 마비 상태로 만든다."
thunderbolt:
  names:
    jp_kana: １０まんボルト
    jp_kanji: １０まんボルト
    en: Thunderbolt
    fr: Tonnerre
    it: Fulmine
    de: Donnerblitz
    es: Rayo
    ko: 10만볼트
  descriptions:
    jp_kana: "つよい　でんげきを\nあいてに　あびせて　こうげきする。\nまひ　じょうたいに　することが　ある。"
    jp_kanji: "強い　電撃を\n相手に　浴びせて　攻撃する。\nまひ状態に　することが　ある。"
    en: "A strong electric blast is loosed at the\ntarget. It may also leave the target\nwith paralysis."
    fr: "Une grosse décharge électrique tombe\nsur l’ennemi. Peut aussi le paralyser."
    it: "Il bersaglio viene colpito da una potente\nscarica elettrica che può anche\nparalizzarlo."
    de: "Eine starke Elektro-Attacke, die das\nZiel eventuell paralysiert."
    es: "Potente ataque eléctrico que puede\nparalizar al objetivo."
    ko: "강한 전격을\n상대에게 날려서 공격한다.\n마비 상태로 만들 때가 있다."
tickle:
  names:
    jp_kana: くすぐる
    jp_kanji: くすぐる
    en: Tickle
    fr: Chatouille
    it: Solletico
    de: Spaßkanone
    es: Cosquillas
    ko: 간지르기
  descriptions:
    jp_kana: "からだを　くすぐり　わらわせる　ことで\nあいての　こうげきと　ぼうぎょを\nさげる。"
    jp_kanji: "体を　くすぐり　笑わせる　ことで\n相手の　攻撃と　防御を　さげる。"
    en: "The user tickles the target into laughing,\nreducing its Attack and Defense stats."
    fr: "Le lanceur chatouille l’ennemi, ce qui\nbaisse son Attaque et sa Défense."
    it: "Chi la usa solletica il nemico e lo fa\nridere, riducendo il suo Attacco e la\nsua Difesa."
    de: "Bringt das Ziel zum Lachen und senkt\ndadurch dessen Angriff und Verteidigung."
    es: "Hace reír al objetivo para bajar el Ataque\ny la Defensa."
    ko: "몸을 간질여 웃게 만들어서\n상대의 공격과 방어를 떨어뜨린다."
torment:
  names:
    jp_kana: いちゃもん
    jp_kanji: いちゃもん
    en: Torment
    fr: Tourmente
    it: Attaccalite
    de: Folterknecht
    es: Tormento
    ko: 트집
  descriptions:
    jp_kana: "あいてに　いちゃもんを　つけて　\nおなじ　わざを　２かい　れんぞくで\nだせなくする。"
    jp_kanji: "相手に　いちゃもんを　つけて　\n同じ　技を　２回連続で\nだせなくする。"
    en: "The user torments and enrages the\ntarget, making it incapable of using\nthe same move twice in a row."
    fr: "Le lanceur irrite l’ennemi pour\nl’empêcher d’utiliser la même\ncapacité 2 fois de suite."
    it: "Chi la usa tormenta e fa infuriare\nil nemico, impedendogli di usare\nla stessa mossa due volte di seguito."
    de: "Erzürnt das Ziel, um wiederholten\nEinsatz derselben Attacke zu\nverhindern."
    es: "Atormenta y enfurece al objetivo, que no\npuede usar dos veces seguidas\nel mismo movimiento."
    ko: "상대에게 트집을 잡아서\n똑같은 기술을 2회 연속으로\n쓸 수 없게 한다."
toxic:
  names:
    jp_kana: どくどく
    jp_kanji: どくどく
    en: Toxic
    fr: Toxik
    it: Tossina
    de: Toxin
    es: Tóxico
    ko: 맹독
  descriptions:
    jp_kana: "あいてを　もうどくの\nじょうたいに　する。ターンが　すすむほど\nどくの　ダメージが　ふえていく。"
    jp_kanji: "相手を　猛毒の　状態に　する。\nターンが　すすむほど\n毒の　ダメージが　増えていく。"
    en: "A move that leaves the target\nbadly poisoned.\nIts poison damage worsens every turn."
    fr: "Empoisonne gravement l’ennemi. Les dégâts\ndus au poison augmentent à chaque tour."
    it: "Iperavvelena il nemico con una potente\ntossina. Il danno peggiora ad ogni turno."
    de: "Vergiftet das Ziel mit einem potenten\nToxin schwer. Vergiftung wird von Runde\nzu Runde stärker."
    es: "Envenena gravemente al objetivo y causa\nun daño mayor en cada turno."
    ko: "상대를 맹독의 상태로 만든다.\n턴이 진행될수록\n독의 데미지가 증가한다."
toxic_spikes:
  names:
    jp_kana: どくびし
    jp_kanji: どくびし
    en: Toxic Spikes
    fr: Pics Toxik
    it: Fielepunte
    de: Giftspitzen
    es: Púas Tóxicas
    ko: 독압정
  descriptions:
    jp_kana: "あいての　あしもとに　どくびしを\nしかける。こうたいで　でてきた　あいての\nポケモンに　どくを　おわせる。"
    jp_kanji: "相手の　足下に　どくびしを\nしかける。交代で　でてきた　相手の\nポケモンに　毒を　おわせる。"
    en: "The user lays a trap of poison spikes at\nthe opponent’s feet. They poison\nopponents that switch into battle."
    fr: "Lance des pics autour de l’ennemi. Ils\nempoisonnent les ennemis qui entrent\nau combat."
    it: "Chi la usa piazza una trappola di punte\nche avvelenano i nemici che scendono\nin campo."
    de: "Anwender legt eine Falle mit Giftdornen\naus. Gegner, die in den Kampf eingreifen,\nwerden vergiftet."
    es: "Lanza una trampa de púas tóxicas\na los pies del objetivo. El veneno afecta\na los Pokémon que entran."
    ko: "상대의 발밑에 독압정을\n뿌린다. 교체로 나온 상대\n포켓몬에 독을 덮어씌운다."
transform:
  names:
    jp_kana: へんしん
    jp_kanji: へんしん
    en: Transform
    fr: Morphing
    it: Trasformaz.
    de: Wandler
    es: Transform
    ko: 변신
  descriptions:
    jp_kana: "あいての　ポケモンに　へんしん\nすることで　あいてと　まったく\nおなじ　わざが　つかえる。"
    jp_kanji: "相手の　ポケモンに　変身することで\n相手と　まったく\n同じ　技が　使える。"
    en: "The user transforms into a copy of the\ntarget right down to having\nthe same move set."
    fr: "Le lanceur devient une copie de sa cible\net obtient la même palette de capacités."
    it: "Chi la usa si trasforma in una copia\nesatta del bersaglio per sfruttarne\nle caratteristiche."
    de: "Anwender verwandelt sich in ein Abbild des\nZieles und kann so auf die gleichen\nAttacken zugreifen."
    es: "El usuario se transforma en una copia del\nobjetivo, con los mismos movimientos."
    ko: "상대 포켓몬으로 변신하여\n상대와 완전히 똑같은\n기술을 사용할 수 있다."
tri_attack:
  names:
    jp_kana: トライアタック
    jp_kanji: トライアタック
    en: Tri Attack
    fr: Triplattaque
    it: Tripletta
    de: Triplette
    es: Triataque
    ko: 트라이어택
  descriptions:
    jp_kana: "３つの　こうせんで　こうげきする。\nまひか　やけどか　こおりじょうたいの\nどれかに　することが　ある。"
    jp_kanji: "３つの　光線で　攻撃する。\nまひか　やけどか　こおり状態の\nどれかに　することが　ある。"
    en: "The user strikes with a simultaneous\nthree-beam attack. May also burn, freeze,\nor leave the target with paralysis."
    fr: "Le lanceur envoie trois boules d’énergie\nsimultanément. Peut aussi paralyser,\nbrûler ou geler l’ennemi."
    it: "Colpisce il nemico con tre sfere simultanee\ncapaci di paralizzarlo, scottarlo o forse\ncongelarlo."
    de: "Feuert drei Strahlen ab. Verursacht\neventuell Paralyse, Verbrennung\noder Einfrieren."
    es: "Ataque triple que puede paralizar,\nquemar o congelar al objetivo."
    ko: "3개의 광선으로 공격한다.\n마비, 화상 또는 얼음 상태 중\n어느 하나로 만들 때가 있다."
trick:
  names:
    jp_kana: トリック
    jp_kanji: トリック
    en: Trick
    fr: Tourmagik
    it: Raggiro
    de: Trickbetrug
    es: Truco
    ko: 트릭
  descriptions:
    jp_kana: "あいての　すきを　ついて\nじぶんと　あいての\nもちものを　こうかんする。"
    jp_kanji: "相手の　すきを　ついて\n自分と　相手の\n持ち物を　交換する。"
    en: "The user catches the target off guard\nand swaps its held item with its own."
    fr: "Le lanceur prend la cible au dépourvu et\nl’oblige à échanger son objet contre\nle sien."
    it: "Chi la usa coglie il bersaglio in\ncontropiede e l’obbliga a cambiare\nil suo strumento con il proprio."
    de: "Erwischt das Ziel auf dem falschen Fuß.\nGehaltene Items werden mit Anwender\ngetauscht."
    es: "Engaña al objetivo desprevenido e\nintercambia objetos."
    ko: "상대의 빈틈을 노려\n자신과 상대가 지닌 물건을\n교환한다."
trick_room:
  names:
    jp_kana: トリックルーム
    jp_kanji: トリックルーム
    en: Trick Room
    fr: Distorsion
    it: Distortozona
    de: Bizarroraum
    es: Espacio Raro
    ko: 트릭룸
  descriptions:
    jp_kana: "まかふしぎな　くうかんを　つくる。\n５ターンの　あいだ\nおそい　ポケモンから　こうどう　できる。"
    jp_kanji: "まか不思議な　空間を　つくる。\n５ターンの　あいだ\n遅い　ポケモンから　行動できる。"
    en: "The user creates a bizarre area in which\nslower Pokémon get to move first for\nfive turns."
    fr: "Le lanceur crée une zone étrange où\nles Pokémon les plus lents frappent\nen 1ᵉʳ pendant 5 tours."
    it: "Chi la usa crea una dimensione in cui\ni Pokémon più lenti si muovono per primi\nper cinque turni."
    de: "Anwender erzeugt einen bizarren Raum,\nin dem langsame Pokémon fünf Runden\nlang zuerst agieren."
    es: "Se crea un espacio extraño en el que\nlos Pokémon lentos se mueven primero\ndurante cinco turnos."
    ko: "이상한 공간을 만든다.\n5턴 동안 느린 포켓몬부터\n행동할 수 있다."
triple_kick:
  names:
    jp_kana: トリプルキック
    jp_kanji: トリプルキック
    en: Triple Kick
    fr: Triple Pied
    it: Triplocalcio
    de: Dreifachkick
    es: Triplepatada
    ko: 트리플킥
  descriptions:
    jp_kana: "３かい　れんぞくで　キックを　くりだして\nこうげきする。わざが　あたる　たびに\nいりょくは　あがる。"
    jp_kanji: "３回連続で　キックを　くりだして\n攻撃する。技が　当たるたびに\n威力は　あがる。"
    en: "A consecutive three-kick attack that\nbecomes more powerful with each \nsuccessive hit."
    fr: "Une salve de 1 à 3 coups de pied dont la\npuissance augmente à chaque coup porté."
    it: "Chi la usa esegue fino a tre calci\nconsecutivi la cui potenza aumenta\nad ogni colpo."
    de: "Tritt das Ziel 1- bis 3-mal nacheinander.\nDie Härte der Tritte nimmt von Treffer zu\nTreffer zu."
    es: "Patea hasta tres veces seguidas y\ncada vez más fuerte."
    ko: "3회 연속으로 킥을 날려\n공격한다. 기술이 맞을 때마다\n위력이 올라간다."
trump_card:
  names:
    jp_kana: きりふだ
    jp_kanji: きりふだ
    en: Trump Card
    fr: Atout
    it: Asso
    de: Trumpfkarte
    es: As Oculto
    ko: 마지막수단
  descriptions:
    jp_kana: "きりふだの　のこり　ＰＰが\nすくなければ　すくないほど\nわざの　いりょくが　あがる。"
    jp_kanji: "きりふだの　残り　ＰＰが\n少なければ　少ないほど\n技の　威力が　あがる。"
    en: "The fewer PP this move has, the greater\nits attack power."
    fr: "Moins cette capacité possède de PP,\nplus elle est puissante."
    it: "La potenza di questa mossa aumenta man\nmano che i suoi PP diminuiscono."
    de: "Je weniger AP diese Attacke hat, desto\nmehr Angriffskraft besitzt sie."
    es: "Cuantos menos PP tenga el movimiento,\nmayor será la fuerza para atacar."
    ko: "마지막수단의 남은 PP가\n적으면 적을수록\n기술의 위력이 올라간다."
twineedle:
  names:
    jp_kana: ダブルニードル
    jp_kanji: ダブルニードル
    en: Twineedle
    fr: Double-Dard
    it: Doppio Ago
    de: Duonadel
    es: Dobleataque
    ko: 더블니들
  descriptions:
    jp_kana: "２ほんの　ハリを　あいてに　つきさし\n２かい　れんぞくで　ダメージ。\nどく　じょうたいに　することが　ある。"
    jp_kanji: "２本の　ハリを　相手に　突き刺し\n２回連続で　ダメージ。\n毒状態に　することが　ある。"
    en: "The user damages the target twice in\nsuccession by jabbing it with two spikes.\nIt may also poison the target."
    fr: "Un double coup de dard qui\ntransperce l’ennemi 2 fois d’affilée.\nPeut aussi l’empoisonner."
    it: "Colpisce il nemico due volte di seguito\ncon un paio di aghi. Può anche avvelenarlo."
    de: "Stacheln an den Vorderbeinen\ntreffen das Ziel zweimal.\nZiel wird eventuell vergiftet."
    es: "Pincha dos veces con dos espinas.\nPuede envenenar."
    ko: "2개의 침을 상대에게 꿰찔러\n2회 연속으로 데미지를 준다.\n독 상태로 만들 때가 있다."
twister:
  names:
    jp_kana: たつまき
    jp_kanji: たつまき
    en: Twister
    fr: Ouragan
    it: Tornado
    de: Windhose
    es: Ciclón
    ko: 회오리
  descriptions:
    jp_kana: "たつまきを　おこして\nあいてを　まきこみ　こうげきする。\nあいてを　ひるませる　ことが　ある。"
    jp_kanji: "竜巻を　おこして\n相手を　まきこみ　攻撃する。\n相手を　ひるませることが　ある。"
    en: "The user whips up a vicious tornado\nto tear at the opposing team.\nIt may also make targets flinch."
    fr: "Déclenche un terrible ouragan sur\nl’ennemi. Peut aussi l’apeurer."
    it: "Un potente tornado si abbatte sul nemico.\nPuò anche far tentennare."
    de: "Trifft Gegner in der Umgebung mit\nheftigem Wirbelsturm, welche\neventuell zurückschrecken."
    es: "Crea un violento tornado\npara hacer trizas al enemigo.\nPuede hacerle retroceder."
    ko: "회오리를 일으켜\n상대를 끌어들여 공격한다.\n상대를 풀죽게 만들 때가 있다."
u_turn:
  names:
    jp_kana: とんぼがえり
    jp_kanji: とんぼがえり
    en: U-turn
    fr: Demi-Tour
    it: Retromarcia
    de: Kehrtwende
    es: Ida y Vuelta
    ko: 유턴
  descriptions:
    jp_kana: "こうげき　したあと\nものすごい　スピードで　もどってきて\nひかえ　ポケモンと　いれかわる。"
    jp_kanji: "攻撃したあと\nものすごい　スピードで　もどってきて\n控えの　ポケモンと　入れ替わる。"
    en: "After making its attack, the user\nrushes back to switch places with\na party Pokémon in waiting."
    fr: "Après son attaque, le lanceur revient à\ntoute vitesse et change de place avec\nun Pokémon de l’équipe prêt au combat."
    it: "Chi usa questa mossa si tira indietro\nper farsi sostituire dopo aver sferrato\nl’attacco."
    de: "Nach der Attacke eilt der Anwender\nzurück und tauscht den Platz mit\neinem anderen Pokémon."
    es: "Tras atacar, vuelve a toda prisa\npara dar paso a otro Pokémon\ndel equipo."
    ko: "공격한 뒤\n굉장한 스피드로 돌아와서\n교대 포켓몬과 교체한다."
uproar:
  names:
    jp_kana: さわぐ
    jp_kanji: さわぐ
    en: Uproar
    fr: Brouhaha
    it: Baraonda
    de: Aufruhr
    es: Alboroto
    ko: 소란피기
  descriptions:
    jp_kana: "３ターンの　あいだ\nさわいで　あいてを　こうげきする。\nそのあいだは　だれも　ねむれなく　なる。"
    jp_kanji: "３ターンの　あいだ\n騒いで　相手を　攻撃する。\nそのあいだは　だれも　眠れなくなる。"
    en: "The user attacks in an uproar for\nthree turns. Over that time,\nno one can fall asleep."
    fr: "Le lanceur attaque en rugissant durant\n3 tours. Pendant ce temps, personne\nne peut s’endormir."
    it: "Chi la usa attacca per tre turni con un\nfrastuono che non fa dormire nessuno."
    de: "Anwender greift an, indem er über drei\nRunden hinweg einen Aufruhr erzeugt.\nVerhindert Schlaf."
    es: "Ataca de forma alborotada durante tres\nturnos. Mantiene despiertos a todos."
    ko: "3턴 동안\n소란피워 공격한다.\n그 동안은 아무도 잠들지 않게 된다."
v_create:
  names:
    jp_kana: Ｖジェネレート
    jp_kanji: Ｖジェネレート
    en: V-create
    fr: CoupVictoire
    it: Generatore V
    de: V-Generator
    es: V de Fuego
    ko: V제너레이트
  descriptions:
    jp_kana: "しゃくねつの　ほのおを　ひたいから\nはっせいさせて　すてみの　たいあたり。\nぼうぎょ　とくぼう　すばやさが　さがる。"
    jp_kanji: "しゃく熱の　炎を　額から\n発生させて　捨て身の　体当たり。\n防御　特防　素早さが　さがる。"
    en: "With a hot flame on its forehead, the user\nhurls itself at its target. It lowers the\nuser’s Defense, Sp. Def, and Speed stats."
    fr: "Le lanceur projette une flamme ardente de\nson front et se jette sur l’ennemi. Baisse\nla Défense, la Déf. Spé. et la Vitesse."
    it: "Chi la usa carica emettendo fiamme ardenti\ndalla fronte, a costo di una riduzione di\nDifesa, Difesa Speciale e Velocità."
    de: "Eine Verzweiflungsattacke. Anwender\nentfacht glühend heißes Feuer. Senkt\ndessen Vert., Spez.-Vert. und Initiative."
    es: "Golpea con una V de llamas al objetivo.\nBaja la Defensa, la Defensa Especial\ny la Velocidad de quien lo usa."
    ko: "작열하는 불꽃을 이마에서\n발생시켜 이판사판으로 몸통박치기한다.\n방어, 특수방어, 스피드가 떨어진다."
vacuum_wave:
  names:
    jp_kana: しんくうは
    jp_kanji: しんくうは
    en: Vacuum Wave
    fr: Onde Vide
    it: Vuotonda
    de: Vakuumwelle
    es: Onda Vacío
    ko: 진공파
  descriptions:
    jp_kana: "こぶしを　ふって\nしんくうの　なみを　まきおこす。\nかならず　せんせい　こうげき　できる。"
    jp_kanji: "こぶしを　ふって\n真空の　波を　まきおこす。\n必ず　先制攻撃できる。"
    en: "The user whirls its fists to send a wave\nof pure vacuum at the target. This move\nalways goes first."
    fr: "Le lanceur agite son poing pour projeter\nune onde de vide. Frappe toujours en\npremier."
    it: "Chi la usa rotea i pugni per lanciare\nun’onda di vuoto assoluto verso il nemico.\nAttacca per primo."
    de: "Ein Faustwirbel sendet eine\nVakuumwelle auf das Ziel.\nErstschlaggarantie."
    es: "Gira los puños y libera una onda de vacío\ncontra el objetivo. Este movimiento\nsiempre va primero."
    ko: "주먹을 흔들어\n진공의 파도를 일으킨다.\n반드시 선제공격을 할 수 있다."
venoshock:
  names:
    jp_kana: ベノムショック
    jp_kanji: ベノムショック
    en: Venoshock
    fr: Choc Venin
    it: Velenoshock
    de: Giftschock
    es: Cargatóxica
    ko: 베놈쇼크
  descriptions:
    jp_kana: "とくしゅな　どくえきを　あびせかける。\nどく　じょうたいの　あいてには\nいりょくが　２ばいに　なる。"
    jp_kanji: "特殊な　毒液を　浴びせかける。\n毒状態の　相手には\n威力が　２倍に　なる。"
    en: "The user drenches the target in a special\npoisonous liquid. Its power is doubled\nif the target is poisoned."
    fr: "Le lanceur inocule un poison spécial\nà l’ennemi. L’effet est doublé si\nl’ennemi est déjà empoisonné."
    it: "Lancia uno speciale liquido tossico sul\nbersaglio. Se questi è avvelenato, il\ndanno provocato raddoppia."
    de: "Überschüttet das Ziel mit einer speziellen\ntoxischen Flüssigkeit. Doppelt so stark\ngegen vergiftete Ziele."
    es: "Ataca cubriendo al objetivo con un líquido\nvenenoso. El daño será doble si este ya\nestá envenenado."
    ko: "특수한 독액을 끼얹는다.\n독 상태의 상대에게는\n위력이 2배가 된다."
vine_whip:
  names:
    jp_kana: つるのムチ
    jp_kanji: つるのムチ
    en: Vine Whip
    fr: Fouet Lianes
    it: Frustata
    de: Rankenhieb
    es: Látigo Cepa
    ko: 덩굴채찍
  descriptions:
    jp_kana: "ムチのように　しなる　ほそながい　つるで\nあいてを　たたきつけて　こうげきする。"
    jp_kanji: "ムチのように　しなる　細長い　つるで\n相手を　たたきつけて　攻撃する。"
    en: "The target is struck with slender,\nwhiplike vines to inflict damage."
    fr: "Fouette l’ennemi avec de fines lianes\npour infliger des dégâts."
    it: "Infligge danni al nemico con liane sottili\nsimili a fruste."
    de: Peitschenähnlicher Schlag mit Ranken.
    es: Azota al objetivo con ramas finas.
    ko: "채찍처럼 휘어지는 가늘고 긴 덩굴로\n상대를 힘껏 쳐서 공격한다."
vise_grip:
  names:
    jp_kana: はさむ
    jp_kanji: はさむ
    en: ViceGrip
    fr: Force Poigne
    it: Presa
    de: Klammer
    es: Agarre
    ko: 찝기
  descriptions:
    jp_kana: "あいてを　りょうがわから　はさんで\nダメージを　あたえる。"
    jp_kanji: "相手を　両側から　はさんで\nダメージを　あたえる。"
    en: "The target is gripped and squeezed from\nboth sides to inflict damage."
    fr: "L’ennemi est attrapé et compressé\npar les côtés."
    it: "Stringe il nemico in una morsa usando\nenormi e possenti tenaglie."
    de: "Umklammert das Ziel mit großen,\nkräftigen Zangen."
    es: Atrapa con potentes pinzas.
    ko: "상대를 양쪽에서 집어서\n데미지를 준다."
vital_throw:
  names:
    jp_kana: あてみなげ
    jp_kanji: あてみなげ
    en: Vital Throw
    fr: Corps Perdu
    it: Vitaltiro
    de: Überwurf
    es: Tiro Vital
    ko: 받아던지기
  descriptions:
    jp_kana: "あいてより　あとに　こうげきする。\nそのかわり　じぶんの　こうげきは\nかならず　めいちゅうする。"
    jp_kanji: "相手より　あとに　攻撃する。\nそのかわり　自分の　攻撃は\n必ず　命中する。"
    en: "The user attacks last.\nIn return, this throw move is\nguaranteed not to miss."
    fr: "Le lanceur porte son coup en\ndernier. En échange, cette\ncapacité n’échoue jamais."
    it: "Chi la usa attacca per ultimo, ma il colpo\nè sempre infallibile."
    de: "Anwender greift als Letzter an, hat dafür\naber eine Treffergarantie beim eigenen\nAngriff."
    es: "El usuario ataca el último,\npero no falla."
    ko: "상대보다 나중에 공격한다.\n그 대신 자신의 공격은\n반드시 명중한다."
volt_switch:
  names:
    jp_kana: ボルトチェンジ
    jp_kanji: ボルトチェンジ
    en: Volt Switch
    fr: ChangeÉclair
    it: Invertivolt
    de: Voltwechsel
    es: Voltiocambio
    ko: 볼트체인지
  descriptions:
    jp_kana: "こうげき　したあと\nものすごい　スピードで　もどってきて\nひかえ　ポケモンと　いれかわる。"
    jp_kanji: "攻撃したあと\nものすごい　スピードで　もどってきて\n控えポケモンと　入れ替わる。"
    en: "After making its attack, the user\nrushes back to switch places with\na party Pokémon in waiting."
    fr: "Après son attaque, le lanceur revient à\ntoute vitesse et change de place avec\nun Pokémon de l’équipe prêt au combat."
    it: "Chi usa questa mossa fa marcia indietro\nper farsi sostituire dopo aver sferrato\nl’attacco."
    de: "Anwender kehrt nach dem Angriff mit atem-\nberaubender Geschwindigkeit zurück und\ntauscht Platz mit einem anderen Pokémon."
    es: "Tras atacar, vuelve a toda prisa para dar\npaso a otro Pokémon del equipo."
    ko: "공격한 뒤\n굉장한 스피드로 돌아와서\n교대 포켓몬과 교체한다."
volt_tackle:
  names:
    jp_kana: ボルテッカー
    jp_kanji: ボルテッカー
    en: Volt Tackle
    fr: Électacle
    it: Locomovolt
    de: Volttackle
    es: Placaje Eléc
    ko: 볼트태클
  descriptions:
    jp_kana: "でんきを　まとって　とっしんする。\nじぶんも　かなり ダメージを　うける\nまひ　じょうたいに　することが　ある。"
    jp_kanji: "電気を　まとって　突進する。\n自分も　かなり　ダメージを　受ける。\nまひ状態に　することが　ある。"
    en: "The user electrifies itself, then charges. \nIt causes considerable damage to the user\nand may leave the target with paralysis."
    fr: "Le lanceur électrifie son corps avant de\ncharger. Le choc blesse aussi beaucoup\nle lanceur et peut paralyser l’ennemi."
    it: "Chi la usa si carica di elettricità e poi\nattacca. Può paralizzare il nemico.\nIl contraccolpo causa seri danni."
    de: "Angriff mit Elektro-Tackle. Der Anwender\nverletzt sich dabei. Das Ziel wird\neventuell paralysiert."
    es: "Quien lo usa electrifica su cuerpo para\nluego atacar. Se hiere mucho a sí mismo,\npero puede paralizar al objetivo."
    ko: "전기를 한데 모아 돌진한다\n자신도 상당한 데미지를 입는다.\n마비 상태로 만들 때가 있다."
wake_up_slap:
  names:
    jp_kana: めざましビンタ
    jp_kanji: めざましビンタ
    en: Wake-Up Slap
    fr: Réveil Forcé
    it: Svegliopacca
    de: Weckruf
    es: Espabila
    ko: 잠깨움뺨치기
  descriptions:
    jp_kana: "ねむり　じょうたいの　あいてに\nおおきな　ダメージを　あたえる。　\nかわりに　あいては　ねむりから　さめる。"
    jp_kanji: "眠り状態の　相手に\n大きな　ダメージを　与える。　\nかわりに　相手は　眠りから　さめる。"
    en: "This attack inflicts big damage on a\nsleeping target. It also wakes the target\nup, however."
    fr: "Cette attaque inflige d’importants\ndégâts à un Pokémon endormi.\nMais elle le réveille également."
    it: "Questa mossa infligge un danno doppio\nad un bersaglio addormentato, ma allo\nstesso tempo lo risveglia."
    de: "Richtet großen Schaden bei einem\nschlafenden Ziel an, weckt es\naber auch auf."
    es: "Inflige gran daño a objetivos dormidos.\nSin embargo, los bofetones también\nlos despiertan."
    ko: "잠듦 상태의 상대에게\n큰 데미지를 준다.\n대신 상대는 잠에서 깬다."
water_gun:
  names:
    jp_kana: みずでっぽう
    jp_kanji: みずでっぽう
    en: Water Gun
    fr: Pistolet à O
    it: Pistolacqua
    de: Aquaknarre
    es: Pistola Agua
    ko: 물대포
  descriptions:
    jp_kana: "みずを　いきおいよく\nあいてに　はっしゃして　こうげきする。"
    jp_kanji: "水を　勢いよく\n相手に　発射して　攻撃する。"
    en: "The target is blasted with a\nforceful shot of water."
    fr: "De l’eau est projetée sur l’ennemi\nen arc de cercle."
    it: "Il nemico è colpito da un potente getto\nd’acqua."
    de: Das Ziel wird mit Wasser bespritzt.
    es: Ataca disparando agua con gran potencia.
    ko: "물을 기세 좋게\n상대에게 발사하여 공격한다."
water_pledge:
  names:
    jp_kana: みずのちかい
    jp_kanji: みずのちかい
    en: Water Pledge
    fr: Aire d’Eau
    it: Acquapatto
    de: Wassersäulen
    es: Voto Agua
    ko: 물의맹세
  descriptions:
    jp_kana: "みずの　はしらで　こうげきする。\nほのおと　くみあわせると　いりょくが\nあがって　そらに　にじが　かかる。"
    jp_kanji: "水の柱で　攻撃する。\nほのおと　組みあわせると　威力が\nあがって　空に　にじが　かかる。"
    en: "A column of water strikes the target. When\ncombined with its fire equivalent, the\ndamage increases and a rainbow appears."
    fr: "Une masse d’eau s’abat sur l’ennemi.\nEn l’utilisant avec Aire de Feu, l’effet\naugmente et un arc-en-ciel apparaît."
    it: "Attacca il nemico con una colonna d’acqua.\nSe usata con Fiammapatto, aumentano gli\neffetti e un arcobaleno appare in cielo."
    de: "Ein Angriff mit Wassersäulen. Kombiniert\nmit Feuersäulen steigt die Wirkung\nund ein Regenbogen erscheint."
    es: "Ataca con columnas de agua.\nSi se combina con un ataque de fuego,\ncrea un arcoíris y aumenta su potencia."
    ko: "물기둥으로 공격한다.\n불꽃과 조합하면 위력이\n올라가고 하늘에 무지개가 걸린다."
water_pulse:
  names:
    jp_kana: みずのはどう
    jp_kanji: みずのはどう
    en: Water Pulse
    fr: Vibraqua
    it: Idropulsar
    de: Aquawelle
    es: Hidropulso
    ko: 물의파동
  descriptions:
    jp_kana: "みずの　しんどうを\nあいてに　あたえて　こうげきする。\nあいてを　こんらん　させることが　ある。"
    jp_kanji: "水の　振動を\n相手に　与えて　攻撃する。\n相手を　混乱させることが　ある。"
    en: "The user attacks the target with\na pulsing blast of water.\nIt may also confuse the target."
    fr: "Le lanceur envoie un puissant\njet d’eau sur l’ennemi. Peut\nrendre l’ennemi confus."
    it: "Il nemico viene colpito da un getto d’acqua\npotentissimo che può anche confonderlo."
    de: "Angriff mit Wasserwelle, die das\nZiel eventuell verwirren kann."
    es: "Ataca con un potente chorro de agua.\nPuede confundir al objetivo."
    ko: "물의 진동을\n상대에게 가하여 공격한다.\n상대를 혼란시킬 때가 있다."
water_sport:
  names:
    jp_kana: みずあそび
    jp_kanji: みずあそび
    en: Water Sport
    fr: Tourniquet
    it: Docciascudo
    de: Nassmacher
    es: Hidrochorro
    ko: 물놀이
  descriptions:
    jp_kana: "みずを　かぶって　びしょびしょに　なる。\nじぶんが　いるあいだ\nほのおタイプの　わざを　よわめる。"
    jp_kanji: "水を　かぶって　びしょびしょに　なる。\n自分が　いるあいだ\nほのおタイプの　技を　弱める。"
    en: "The user soaks itself with water. The move\nweakens Fire-type moves while the user\nis in the battle."
    fr: "Le lanceur s’asperge d’eau. Affaiblit\nles capacités Feu quand le lanceur\nest au combat."
    it: "Chi la usa s’impregna d’acqua indebolendo\nle mosse di tipo Fuoco finché resta\nin campo."
    de: "Schwächt Feuer-Attacken, solang\nder Anwender am Kampf teilnimmt."
    es: "El usuario se moja y, mientras esté\nen combate, los movimientos de tipo\nFuego se debilitan."
    ko: "흠뻑 젖어 버린다. 기술을 쓴 포켓몬이\n배틀에 나와 있는 동안 불꽃타입의\n기술을 약하게 만든다."
water_spout:
  names:
    jp_kana: しおふき
    jp_kanji: しおふき
    en: Water Spout
    fr: Giclédo
    it: Zampillo
    de: Fontränen
    es: Salpicar
    ko: 바지락조개
  descriptions:
    jp_kana: "しおを　ふきつけて　こうげきする。\nじぶんの　ＨＰが　すくないほど\nわざの　いりょくは　さがる。"
    jp_kanji: "潮を　吹きつけて　攻撃する。\n自分の　ＨＰが　少ないほど\n技の　威力は　さがる。"
    en: "The user spouts water to damage the\nopposing team. The lower the user’s HP,\nthe less powerful it becomes."
    fr: "Le lanceur attaque avec un jet d’eau.\nMoins il a de PV et moins l’attaque\nest puissante."
    it: "Lancia un getto d’acqua contro i nemici.\nLa potenza è proporzionale al numero di PS\ndi chi la usa."
    de: "Wasser-Attacke, die wirkungsvoller ist,\nwenn KP des Anwenders hoch sind."
    es: "Chorro de agua. Cuantos menos PS\ntenga el usuario, menos dañino será."
    ko: "바닷물을 내뿜어 공격한다.\n자신의 HP가 적을수록\n기술의 위력이 떨어진다."
waterfall:
  names:
    jp_kana: たきのぼり
    jp_kanji: たきのぼり
    en: Waterfall
    fr: Cascade
    it: Cascata
    de: Kaskade
    es: Cascada
    ko: 폭포오르기
  descriptions:
    jp_kana: "すごい　いきおいで　あいてに　つっこむ。\nあいてを　ひるませる　ことが　ある。\nたきも　およいで　のぼれる。"
    jp_kanji: "すごい　勢いで　相手に　つっこむ。\n相手を　ひるませることが　ある。\n滝も　泳いで　のぼれる。"
    en: "The user charges at the target\nand may make it flinch.\nIt can also be used to climb a waterfall."
    fr: "Le lanceur charge l’ennemi à une vitesse\nremarquable, ce qui peut l’apeurer.\nPermet aussi de franchir une cascade."
    it: "Carica il nemico a grande velocità e può\nfarlo tentennare. Fuori dalla lotta fa\nrisalire le cascate."
    de: "Eine mächtige Attacke, durch die das\nZiel evtl. zurückschreckt. Wasserfälle\nkönnen damit erklommen werden."
    es: "Embiste con un gran impulso que puede\nhacer retroceder. También sirve para\nremontar cascadas."
    ko: "굉장한 기세로 상대에게 돌진한다.\n상대를 풀죽게 만들 때가 있다.\n폭포도 거슬러 올라갈 수 있다."
weather_ball:
  names:
    jp_kana: ウェザーボール
    jp_kanji: ウェザーボール
    en: Weather Ball
    fr: Ball’Météo
    it: Palla Clima
    de: Meteorologe
    es: Meteorobola
    ko: 웨더볼
  descriptions:
    jp_kana: "つかった　ときの　てんきに　よって\nわざの　タイプと　いりょくが　かわる。"
    jp_kanji: "使ったときの　天気に　よって\n技の　タイプと　威力が　変わる。"
    en: "An attack move that varies in power and\ntype depending on the weather."
    fr: "Une attaque dont la puissance et le type\nvarient en fonction du temps qu’il fait."
    it: "Mossa d’attacco che varia tipo e forza in\nbase alle condizioni atmosferiche."
    de: "Typ und Stärke der Attacke sind\nvom Wetter zum Zeitpunkt der\nAnwendung abhängig."
    es: "El tipo y fuerza del ataque varían según\nel tiempo que haga."
    ko: "사용했을 때의 날씨에 따라서\n기술 타입과 위력이 바뀐다."
whirlpool:
  names:
    jp_kana: うずしお
    jp_kanji: うずしお
    en: Whirlpool
    fr: Siphon
    it: Mulinello
    de: Whirlpool
    es: Torbellino
    ko: 바다회오리
  descriptions:
    jp_kana: "はげしく　うずをまく　みずの　なかに\n４ー５ターンの　あいだ\nあいてを　とじこめて　こうげきする。"
    jp_kanji: "激しく　渦をまく　水の中に\n４ー５ターンの　あいだ\n相手を　閉じこめて　攻撃する。"
    en: "Traps foes in a violent swirling\nwhirlpool for four to five turns."
    fr: "Piège l’ennemi dans une trombe\nd’eau pendant 4 à 5 tours."
    it: "Intrappola il nemico in un turbine d’acqua\nche dura per quattro o cinque turni\ninfliggendogli dei danni ogni turno."
    de: "Das Ziel wird für 4 bis 5 Runden in einer\nWasserhose gefangen."
    es: "Una tromba de agua atrapa al objetivo\ndurante cuatro o cinco turnos."
    ko: "세차게 소용돌이치는\n물속에 4-5턴 동안\n상대를 가두어 공격한다."
whirlwind:
  names:
    jp_kana: ふきとばし
    jp_kanji: ふきとばし
    en: Whirlwind
    fr: Cyclone
    it: Turbine
    de: Wirbelwind
    es: Remolino
    ko: 날려버리기
  descriptions:
    jp_kana: "あいてを　ふきとばして\nひかえの　ポケモンを　ひきずりだす。\nやせいの　ばあいは　せんとうが　おわる。"
    jp_kanji: "相手を　吹きとばして\n控えの　ポケモンを　ひきずりだす。\n野生の　場合は　戦闘が　終わる。"
    en: "The target is blown away, to be replaced\nby another Pokémon in its party. In the\nwild, the battle ends."
    fr: "Éjecte le Pokémon ennemi\net le remplace par un autre.\nDans la nature, met fin au combat."
    it: "Il bersaglio è spazzato via ed è costretto\na lasciare il posto ad un altro. Se è\nselvatico, la lotta finisce."
    de: "Weht das Ziel weg und ersetzt es durch ein\nanderes Pokémon. In der Wildnis endet\nder Kampf."
    es: "Se lleva al objetivo, que es cambiado\npor otro Pokémon. Si es un Pokémon\nsalvaje, acaba el combate."
    ko: "상대를 날려버려서\n교대할 포켓몬을 끌어낸다.\n야생의 경우에는 배틀이 끝난다."
wide_guard:
  names:
    jp_kana: ワイドガード
    jp_kanji: ワイドガード
    en: Wide Guard
    fr: Garde Large
    it: Bodyguard
    de: Rundumschutz
    es: Vastaguardia
    ko: 와이드가드
  descriptions:
    jp_kana: "みかた　ぜんいんに　あたる　こうげきを\n１ターンの　あいだ　ふせぐ。\nれんぞくで　だすと　しっぱい　しやすい。"
    jp_kanji: "味方全員に　当たる　攻撃を\n１ターンの　あいだ　防ぐ。\n連続で　だすと　失敗しやすい。"
    en: "The user and its allies are protected from\nwide-ranging attacks for one turn. If used\nin succession, its chance of failing rises."
    fr: "Annule les attaques visant toute l’équipe\npendant 1 tour. Peut échouer si utilisée\nplusieurs fois de suite."
    it: "Chi la usa para tutti i colpi diretti alla\nintera squadra per un turno. Se usata\nin successione può fallire."
    de: "Schützt eine Runde lang vor Angriffen,\ndie alle Pokémon auf deiner Seite treffen.\nKlappt nur selten mehrmals in Folge."
    es: "Bloquea los ataques lanzados contra todo\ntu equipo durante un turno. Su eficacia\nmerma si se usa repetidas veces."
    ko: "같은 편 전원에게 향하는 공격을\n1턴 동안 막는다.\n연속으로 쓰면 실패하기 쉽다."
wild_charge:
  names:
    jp_kana: ワイルドボルト
    jp_kanji: ワイルドボルト
    en: Wild Charge
    fr: Éclair Fou
    it: Sprizzalampo
    de: Stromstoß
    es: Voltio Cruel
    ko: 와일드볼트
  descriptions:
    jp_kana: "でんきを　まとって\nあいてに　ぶつかって　こうげきする。\nじぶんも　すこし　ダメージを　うける。"
    jp_kanji: "電気を　まとって\n相手に　ぶつかって　攻撃する。\n自分も　少し　ダメージを　受ける。"
    en: "The user shrouds itself in electricity\nand smashes into its target.\nIt also damages the user a little."
    fr: "Une charge électrique violente qui blesse\naussi légèrement le lanceur."
    it: "Chi la usa si carica di elettricità per poi\nscagliarsi sul bersaglio, ma subisce dei\ndanni per il contraccolpo."
    de: "Anwender erzeugt Spannung und greift an,\nindem er auf Kollisionskurs geht. Er selbst\nerleidet dabei ebenfalls leichten Schaden."
    es: "Carga eléctrica muy potente que también\nhiere ligeramente a quien la usa."
    ko: "전기를 두르고\n상대에게 부딪쳐 공격한다.\n자신도 조금 데미지를 입는다."
will_o_wisp:
  names:
    jp_kana: おにび
    jp_kanji: おにび
    en: Will-O-Wisp
    fr: Feu Follet
    it: Fuocofatuo
    de: Irrlicht
    es: Fuego Fatuo
    ko: 도깨비불
  descriptions:
    jp_kana: "ぶきみで　あやしい　ほのおを　はなって\nあいてを　やけどの　じょうたいに　する。"
    jp_kanji: "不気味で　怪しい　炎を　放って\n相手を　やけどの　状態に　する。"
    en: "The user shoots a sinister, bluish-white\nflame at the target to inflict a burn."
    fr: "Lance une sinistre flamme violette à\nl’ennemi pour lui infliger une brûlure."
    it: "Fiamme intense di colore viola causano\nuna scottatura al nemico."
    de: "Angriff mit unheimlicher Flamme,\ndie das Ziel verbrennt."
    es: "Siniestra llama morada que produce\nquemaduras."
    ko: "으스스하고 괴상한 불꽃을 쏘아\n상대를 화상 상태로 만든다."
wing_attack:
  names:
    jp_kana: つばさでうつ
    jp_kanji: つばさでうつ
    en: Wing Attack
    fr: Cru-Aile
    it: Att. d’Ala
    de: Flügelschlag
    es: Ataque Ala
    ko: 날개치기
  descriptions:
    jp_kana: "おおきく　ひろげた　りっぱな　つばさを\nあいてに　ぶつけて　こうげきする。"
    jp_kanji: "大きく　ひろげた　りっぱな　翼を\n相手に　ぶつけて　攻撃する。"
    en: "The target is struck with large, imposing\nwings spread wide to inflict damage."
    fr: "L’ennemi est frappé par de larges ailes\ndéployées pour infliger des dégâts."
    it: "Infligge danni al nemico spiegando\ndelle grandi ali possenti."
    de: "Trifft das Ziel mit ausgebreiteten\nFlügeln."
    es: Golpea al objetivo con unas grandes alas.
    ko: "크게 펼친 훌륭한 날개를\n상대에게 부딪쳐서 공격한다."
wish:
  names:
    jp_kana: ねがいごと
    jp_kanji: ねがいごと
    en: Wish
    fr: Vœu
    it: Desiderio
    de: Wunschtraum
    es: Deseo
    ko: 희망사항
  descriptions:
    jp_kana: "つぎの　ターンに　\nじぶんの　ＨＰを　さいだい　ＨＰの　\nはんぶん　かいふく　する。"
    jp_kanji: "次の　ターンに　\n自分の　ＨＰを　最大ＨＰの　\n半分　回復する。"
    en: "One turn after this move is used,\nthe target’s HP is restored by\nhalf the user’s maximum HP."
    fr: "Un vœu qui permet de récupérer la\nmoitié des PV max au tour suivant."
    it: "Permette di recuperare metà dei PS massimi\nal turno successivo."
    de: "Ein Wunsch füllt in der nächsten Runde\n50 % der KP des Anwenders bei diesem\noder einem eingewechselten Pokémon auf."
    es: "Cumple el deseo de restaurar la mitad\nde los PS máximos en el siguiente turno."
    ko: "다음 턴에\n자신의 HP를 최대 HP의\n절반만큼 회복한다."
withdraw:
  names:
    jp_kana: からにこもる
    jp_kanji: からにこもる
    en: Withdraw
    fr: Repli
    it: Ritirata
    de: Panzerschutz
    es: Refugio
    ko: 껍질에숨기
  descriptions:
    jp_kana: "からに　もぐりこんで　みをまもり\nじぶんの　ぼうぎょを　あげる。"
    jp_kanji: "殻に　潜りこんで　身を守り\n自分の　防御を　あげる。"
    en: "The user withdraws its body into its hard\nshell, raising its Defense stat."
    fr: "Le lanceur se recroqueville dans sa\ncarapace, ce qui augmente sa Défense."
    it: "Il corpo si ritira nel suo duro guscio\nper aumentare la Difesa."
    de: "Rückzug in den harten Panzer.\nErhöht den Verteidigungs-Wert."
    es: "El usuario se protege en su coraza y sube\nla Defensa."
    ko: "껍질에 숨어 몸을 보호하여\n자신의 방어를 올린다."
wonder_room:
  names:
    jp_kana: ワンダールーム
    jp_kanji: ワンダールーム
    en: Wonder Room
    fr: Zone Étrange
    it: Mirabilzona
    de: Wunderraum
    es: Zona Extraña
    ko: 원더룸
  descriptions:
    jp_kana: "まかふしぎな　くうかんを　つくる。\n５ターンのあいだ　すべてのポケモンの\nぼうぎょと　とくぼうが　いれかわる。"
    jp_kanji: "まか不思議な　空間を　つくる。\n５ターンのあいだ　すべてのポケモンの\n防御と　特防が　入れ替わる。"
    en: "The user creates a bizarre area in which\nPokémon’s Defense and Sp. Def\nstats are swapped for five turns."
    fr: "Crée une zone étrange où pendant 5 tours,\nla Défense et la Défense Spéciale de tous\nles Pokémon sont inversées."
    it: "Chi la usa crea una dimensione in cui Difesa\ne Difesa Speciale di tutti i Pokémon\nvengono scambiate per cinque turni."
    de: "Anwender erzeugt bizarren Raum, in dem\nüber fünf Runden die Vert. aller Pokémon\nmit ihrer Spez.-Vert. getauscht wird."
    es: "Crea una zona misteriosa donde se\nintercambian la Defensa y Def. Especial\nen todos los Pokémon por cinco turnos."
    ko: "이상한 공간을 만든다.\n5턴 동안 모든 포켓몬의\n방어와 특수방어가 바뀐다."
wood_hammer:
  names:
    jp_kana: ウッドハンマー
    jp_kanji: ウッドハンマー
    en: Wood Hammer
    fr: Martobois
    it: Mazzuolegno
    de: Holzhammer
    es: Mazazo
    ko: 우드해머
  descriptions:
    jp_kana: "かたい　どうたいを\nあいてに　たたきつけて　こうげきする。\nじぶんも　かなり　ダメージを　うける。"
    jp_kanji: "硬い　胴体を\n相手に　たたきつけて　攻撃する。\n自分も　かなり　ダメージを　受ける。"
    en: "The user slams its rugged body into the\ntarget to attack. The user also sustains\nserious damage."
    fr: "Le lanceur heurte l’ennemi de son corps\nrobuste. Inflige de sérieux dégâts au\nlanceur aussi."
    it: "Chi la usa si lancia con tutto il corpo\ncontro il nemico, ma subisce anche\nconsiderevoli danni."
    de: "Anwender attackiert mit seinem robusten\nKörper. Er erleidet dabei auch selbst\ngroßen Schaden."
    es: "Arremete contra el objetivo con su\nrobusto cuerpo. El agresor también\nsufre bastante daño."
    ko: "단단한 몸통을\n상대에게 부딪쳐서 공격한다.\n자신도 상당한 데미지를 입는다."
work_up:
  names:
    jp_kana: ふるいたてる
    jp_kanji: ふるいたてる
    en: Work Up
    fr: Rengorgement
    it: Cuordileone
    de: Kraftschub
    es: Avivar
    ko: 분발
  descriptions:
    jp_kana: "じぶんを　ふるいたてて\nこうげきと　とくこうを　あげる。"
    jp_kanji: "自分を　奮いたてて\n攻撃と　特攻を　あげる。"
    en: "The user is roused, and its Attack\nand Sp. Atk stats increase."
    fr: "Le lanceur se rengorge.\nAugmente l’Attaque et l’Attaque Spéciale."
    it: "Chi la usa si tira su di morale, aumentando\nil proprio Attacco e l’Attacco Speciale."
    de: "Anwender erhält einen Kraftschub, der\nseinen Angriff und Spez.-Angr. erhöht."
    es: "Movimiento que aumenta el Ataque\ny el Ataque Especial de quien lo usa."
    ko: "스스로 분발해서\n공격과 특수공격을 올린다."
worry_seed:
  names:
    jp_kana: なやみのタネ
    jp_kanji: なやみのタネ
    en: Worry Seed
    fr: Soucigraine
    it: Affannoseme
    de: Sorgensamen
    es: Abatidoras
    ko: 고민씨
  descriptions:
    jp_kana: "こころを　なやませる　タネを\nうえつける。あいてを　ねむれなく　して\nとくせいを　ふみんに　する。"
    jp_kanji: "心を　なやませる　タネを\n植えつける。相手を　眠れなくして\n特性を　ふみんに　する。"
    en: "A seed that causes worry is planted on\nthe target. It prevents sleep by making\nits Ability Insomnia."
    fr: "Plante sur la cible une graine qui la rend\nsoucieuse et remplace sa capacité spéciale\npar Insomnia, l’empêchant ainsi de dormir."
    it: "Un seme che causa ansia viene piantato\nsul bersaglio. Ne muta l’abilità in\nInsonnia e ne blocca il sonno."
    de: "Ziel wird bepflanzt. Wandelt\nFähigkeit in Insomnia um.\nVerhindert so Schlaf."
    es: "Se planta una semilla en el objetivo que le\ncausa pesar. Evita el sueño gracias a\nla habilidad Insomnio."
    ko: "마음을 괴롭히는 씨앗을\n심는다. 상대를 잠잘 수 없게 해서\n특성을 불면으로 만든다."
wrap:
  names:
    jp_kana: まきつく
    jp_kanji: まきつく
    en: Wrap
    fr: Ligotage
    it: Avvolgibotta
    de: Wickel
    es: Repetición
    ko: 김밥말이
  descriptions:
    jp_kana: "ながい　からだや　つるなどを　つかって\n４ー５ターンの　あいだ\nあいてに　まきついて　こうげきする。"
    jp_kanji: "長い　体や　つるなどを　つかって\n４ー５ターンの　あいだ\n相手に　まきついて　攻撃する。"
    en: "A long body or vines are used to wrap and\nsqueeze the target for four to five turns."
    fr: "Le lanceur ligote l’ennemi avec des\nlianes ou son corps pour l’écraser\ndurant 4 à 5 tours."
    it: "Avvolge e stritola il nemico con un corpo\nlungo o con piante rampicanti per quattro\no cinque turni."
    de: "Umwickelt das Ziel über 4 bis 5 Runden\nmit Ranken oder Ähnlichem und fügt\nihm Schaden zu."
    es: "Oprime al objetivo de cuatro a cinco\nturnos con ramas o con su cuerpo."
    ko: "긴 몸이나 덩굴을 사용해\n4-5턴 동안\n상대를 휘감아 공격한다."
wring_out:
  names:
    jp_kana: しぼりとる
    jp_kanji: しぼりとる
    en: Wring Out
    fr: Essorage
    it: Strizzata
    de: Auswringen
    es: Estrujón
    ko: 쥐어짜기
  descriptions:
    jp_kana: "つよく　しめあげて　こうげきを　する。\nあいての　ＨＰが　のこっている　ほど\nいりょくは　あがる。"
    jp_kanji: "強く　締めあげて　攻撃を　する。\n相手の　ＨＰが　残っているほど\n威力は　あがる。"
    en: "The user powerfully wrings the target.\nThe more HP the target has, the greater\nthis attack’s power."
    fr: "Le lanceur essore l’ennemi. Plus\nl’ennemi a de PV, plus cette attaque\nest puissante."
    it: "Chi la usa stritola con forza il nemico.\nPiù PS ha il nemico, maggiore è la potenza\ndella mossa."
    de: "Anwender presst sein Ziel aus.\nJe höher die KP des Zieles, desto\nkraftvoller die Attacke."
    es: "Estruja con fuerza al objetivo.\nCuantos más PS tenga el objetivo,\nmás fuerza tendrá el ataque."
    ko: "강하게 조여 공격을 한다.\n상대의 HP가 많이 남아 있을수록\n위력이 올라간다."
x_scissor:
  names:
    jp_kana: シザークロス
    jp_kanji: シザークロス
    en: X-Scissor
    fr: Plaie-Croix
    it: Forbice X
    de: Kreuzschere
    es: Tijera X
    ko: 시저크로스
  descriptions:
    jp_kana: "カマや　ツメを　ハサミのように\nこうさ　させながら　あいてを　きりさく。"
    jp_kanji: "カマや　ツメを　ハサミのように\n交差させながら　相手を　切り裂く。"
    en: "The user slashes at the target by\ncrossing its scythes or claws as if\nthey were a pair of scissors."
    fr: "Le lanceur taillade l’ennemi en\nutilisant ses faux ou ses griffes\ncomme une paire de ciseaux."
    it: "Chi la usa colpisce il nemico usando le sue\nfalci o i suoi artigli come se fossero delle\nforbici."
    de: "Der Anwender führt eine Attacke\naus, die einer Scherenbewegung\nähnelt."
    es: "Cruza las guadañas o las garras\npara atacar al objetivo como si fueran\nunas tijeras."
    ko: "낫이나 발톱을 가위처럼\n교차시키면서 상대를 베어 가른다."
yawn:
  names:
    jp_kana: あくび
    jp_kanji: あくび
    en: Yawn
    fr: Bâillement
    it: Sbadiglio
    de: Gähner
    es: Bostezo
    ko: 하품
  descriptions:
    jp_kana: "おおきな　あくびで　ねむけを　さそう。\nつぎの　ターンに\nあいてを　ねむり　じょうたいに　する。"
    jp_kanji: "大きな　あくびで　眠気を　誘う。\n次の　ターンに\n相手を　眠り状態に　する。"
    en: "The user lets loose a huge yawn that\nlulls the target into falling asleep\non the next turn."
    fr: "Fait bâiller l’ennemi qui\ns’endort au tour suivant."
    it: "Chi la usa fa un grande sbadiglio che\naddormenta il nemico al turno seguente."
    de: "Angreifer gähnt und das Ziel schläft in der\nnächsten Runde ein."
    es: "Gran bostezo que induce al sueño\nal objetivo en el siguiente turno."
    ko: "큰 하품으로 졸음을 유도한다.\n다음 턴에 상대를\n잠듦 상태로 만든다."
zap_cannon:
  names:
    jp_kana: でんじほう
    jp_kanji: でんじほう
    en: Zap Cannon
    fr: Élecanon
    it: Falcecannone
    de: Blitzkanone
    es: Electrocañón
    ko: 전자포
  descriptions:
    jp_kana: "たいほうの　ような\nでんきを　はっしゃして　こうげきする。\nあいてを　まひの　じょうたいに　する。"
    jp_kanji: "大砲の　ような\n電気を　発射して　攻撃する。\n相手を　まひの　状態に　する。"
    en: "The user fires an electric blast like a\ncannon to inflict damage and\ncause paralysis."
    fr: "Un boulet de canon électrifié qui inflige\ndes dégâts et paralyse l’ennemi."
    it: "Chi la usa provoca un’esplosione elettrica\nche infligge danni e paralizza il nemico."
    de: "Kanonenähnlicher Elektro-Schuss,\nder schadet und paralysiert."
    es: "Dispara una descarga eléctrica que causa\ndaño y parálisis."
    ko: "대포처럼\n전기를 발사해서 공격한다.\n상대를 마비 상태로 만든다."
zen_headbutt:
  names:
    jp_kana: しねんのずつき
    jp_kanji: しねんのずつき
    en: Zen Headbutt
    fr: Psykoud’Boul
    it: Cozzata Zen
    de: Zen-Kopfstoß
    es: Cabezazo Zen
    ko: 사념의박치기
  descriptions:
    jp_kana: "しねんの　ちからを\nひたいに　あつめて　こうげきする。\nあいてを　ひるませる　ことが　ある。"
    jp_kanji: "思念の　力を\n額に　集めて　攻撃する。\n相手を　ひるませることが　ある。"
    en: "The user focuses its willpower to its head\nand attacks the target.\nIt may also make the target flinch."
    fr: "Le lanceur concentre sa volonté et\ndonne un coup de tête. Peut aussi\napeurer l’ennemi."
    it: "Chi la usa concentra la forza nella testa\ne si lancia contro il nemico. Può anche\nfarlo tentennare."
    de: "Anwender konzentriert seinen\nWillen und rammt das Ziel.\nDieses schreckt eventuell zurück."
    es: "Concentra su energía psíquica en\nla cabeza para golpear. Puede hacer\nque el objetivo retroceda."
    ko: "사념의 힘을\n이마에 모아서 공격한다.\n상대를 풀죽게 만들 때가 있다."
