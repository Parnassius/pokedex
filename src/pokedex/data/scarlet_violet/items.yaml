wasabi:
  names:
    jp_kana: ワサビソース
    jp_kanji: ワサビソース
    en: Wasabi
    fr: Sauce au Wasabi
    it: Wasabi
    de: Wasabi
    es: Wasabi
    ko: 와사비소스
    zh_simp: 芥末酱
    zh_trad: 芥末醬
  descriptions:
    jp_kana: "辛味が　強い　調味料。\nホースラディッシュと　近い　味わいで\n風味が　素晴らしい　調味料。"
    jp_kanji: "辛味が　強い　調味料。\nホースラディッシュと　近い　味わいで\n風味が　素晴らしい　調味料。"
    en: "This very spicy condiment seems close to horseradish at\nfirst, but you’ll find that it has a superb flavor all its own."
    fr: "Un condiment au goût très épicé. Bien que son goût soit\nsimilaire à celui du raifort, sa saveur est subtilement\ndistincte."
    it: "Un ingrediente molto piccante. Di sapore simile\nal Rafano, è un condimento dal gusto sublime."
    de: "Dieses sehr scharfe Würzmittel ähnelt zwar normalem\nMeerrettich, besitzt jedoch ein außergewöhnliches und\nunverwechselbares Aroma."
    es: "Parecido al rábano picante, este condimento es también\nmuy picante y aporta un aroma exquisito a cualquier\nbocadillo."
    ko: "매운맛이 강한 조미료.\n호스래디시와 비슷한 맛에\n풍미가 뛰어난 조미료다."
    zh_simp: "辣味强烈的调味料。\n是一款风味与辣根\n相似的优秀调味料。"
    zh_trad: "辣味強勁的調味料。\n滋味近似辣根，風味絕佳。"
water_gem:
  names:
    jp_kana: みずのジュエル
    jp_kanji: みずのジュエル
    en: Water Gem
    fr: Joyau Eau
    it: Bijouacqua
    de: Wasserjuwel
    es: Gema Agua
    ko: 물주얼
    zh_simp: 水之宝石
    zh_trad: 水之寶石
  descriptions:
    jp_kana: "みずのタイプの　ジュエル。\n持たせると　１度だけ　みずの\n技の威力が　強まる。"
    jp_kanji: "みずのタイプの　ジュエル。\n持たせると　１度だけ　みずの\n技の威力が　強まる。"
    en: "An item to be held by a Pokémon. This gem is imbued\nwith the essence of water and will boost the power of a\nWater-type move—but only once."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Eau."
    it: "Strumento da dare a un Pokémon. Gioiello che potenzia\nuna sola volta le mosse di tipo Acqua."
    de: "Ein Item zum Tragen. Dieses Juwel verstärkt einmalig\neine Attacke vom Typ Wasser."
    es: "Joya de un solo uso que potencia un movimiento de\ntipo Agua. Debe llevarla un Pokémon."
    ko: "물타입의 주얼.\n지니게 하면 한 번만 물\n기술의 위력이 강해진다."
    zh_simp: "水属性的宝石。\n携带后，水属性的\n招式威力仅会增强１次。"
    zh_trad: "水屬性的寶石。\n攜帶後，水屬性招式的\n威力會僅增強１次。"
water_memory:
  names:
    jp_kana: ウオーターメモリ
    jp_kanji: ウオーターメモリ
    en: Water Memory
    fr: ROM Eau
    it: ROM Acqua
    de: Wasser-Disc
    es: Disco Agua
    ko: 워터메모리
    zh_simp: 清水存储碟
    zh_trad: 清水記憶碟
  descriptions:
    jp_kana: "みずタイプの　データが　入った\nメモリ。　特定のポケモンが　持つと\nタイプが　変わる。"
    jp_kanji: "みずタイプの　データが　入った\nメモリ。　特定のポケモンが　持つと\nタイプが　変わる。"
    en: "A memory disc that contains Water-type data.\nIt changes the type of the holder if held by\na certain species of Pokémon."
    fr: "Une carte mémoire contenant des données sur\nle type Eau. Un certain Pokémon peut changer\nde type en l’équipant."
    it: "ROM contenente dati sul tipo Acqua in formato digitale.\nPermette a un certo Pokémon di cambiare tipo."
    de: "Eine Disc mit Daten zum Typ Wasser. Sie löst bei einem\nbestimmten Pokémon einen Typenwechsel aus."
    es: "Disco de datos que contiene información relativa al tipo\nAgua. Permite cambiar de tipo a cierto Pokémon."
    ko: "물타입의 데이터가 들어 있는\n메모리. 특정 포켓몬이\n지니면 타입이 바뀐다."
    zh_simp: "装有水属性数据的存储碟。\n特定宝可梦携带后，\n属性就会发生变化。"
    zh_trad: "裝有水屬性資料的記憶碟。\n特定寶可夢攜帶後，\n就會產生屬性的變化。"
water_stone:
  names:
    jp_kana: みずのいし
    jp_kanji: みずのいし
    en: Water Stone
    fr: Pierre Eau
    it: Pietraidrica
    de: Wasserstein
    es: Piedra Agua
    ko: 물의돌
    zh_simp: 水之石
    zh_trad: 水之石
  descriptions:
    jp_kana: "ある特定の　ポケモンを\n進化させる　不思議な石。\n澄んだ水色を　している。"
    jp_kanji: "ある特定の　ポケモンを\n進化させる　不思議な石。\n澄んだ水色を　している。"
    en: "A peculiar stone that can make certain species of\nPokémon evolve. It is the clear blue of a deep pool."
    fr: "Une pierre étrange qui fait évoluer certaines espèces\nde Pokémon. Elle est de couleur bleue."
    it: "Pietra particolare che fa evolvere determinate specie\ndi Pokémon. È azzurra."
    de: "Dieser besondere Stein löst bei bestimmten Pokémon\ndie Entwicklung aus. Er schimmert hellblau."
    es: "Curiosa piedra que hace evolucionar a determinadas\nespecies de Pokémon. Es de color azul."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 돌.\n투명한 푸른색을 띠고 있다."
    zh_simp: "能让某些特定宝可梦\n进化的神奇石头。\n看上去是澄蓝色的。"
    zh_trad: "能讓特定寶可夢\n進化的神奇石頭。\n看起來是澄澈的藍色。"
water_tera_shard:
  names:
    jp_kana: テラピースみず
    jp_kanji: テラピースみず
    en: Water Tera Shard
    fr: Téra-Éclat Eau
    it: Teralite Acqua
    de: Tera-Stück (Wasser)
    es: Teralito Agua
    ko: 테라피스 물
    zh_simp: 水太晶碎块
    zh_trad: 水太晶碎塊
  descriptions:
    jp_kana: "テラスタルポケモンが　倒れたとき\n砕けた　テラスタルジュエルが\nまれに　結晶化したもの。"
    jp_kanji: "テラスタルポケモンが　倒れたとき\n砕けた　テラスタルジュエルが\nまれに　結晶化したもの。"
    en: "On rare occasions, these shards form when a Tera\nPokémon falls in battle and its Tera Jewel shatters."
    fr: "Un fragment cristallisé qui se forme rarement lors\nde l’éclatement d’un Joyau Téracristal après qu’un\nPokémon Téracristal a été mis K.O."
    it: "Cristallizzazione che raramente si forma quando\nun Pokémon Teracristal viene sconfitto e la sua gemma\nTeracristal va in frantumi."
    de: "In äußerst seltenen Fällen kristallisieren Bruchstücke\ndes Terakristalls von im Kampf besiegten Terakristall-\nPokémon zu solchen Tera-Stücken."
    es: "Esquirla que se forma muy raramente cuando la joya\nTeracristal de un Pokémon teracristalizado se quiebra\ntras derrotarlo."
    ko: "테라스탈 포켓몬이 쓰러졌을 때\n부서진 테라스탈 주얼이\n드물게 결정화한 조각."
    zh_simp: "打倒太晶宝可梦时，\n破碎掉的太晶宝石有\n极低概率会结晶成此物。"
    zh_trad: "太晶寶可夢倒下時，\n碎裂的太晶寶石在罕見的情況下\n會結晶化，而形成此物。"
watercress:
  names:
    jp_kana: クレソン
    jp_kanji: クレソン
    en: Watercress
    fr: Cresson
    it: Crescione
    de: Kresse
    es: Berros
    ko: 물냉이
    zh_simp: 豆瓣菜
    zh_trad: 豆瓣菜
  descriptions:
    jp_kana: "苦味が　強い　食材。\n独特のクセが　特徴の野菜。\nやや好みが　分かれる　食材だ。"
    jp_kanji: "苦味が　強い　食材。\n独特のクセが　特徴の野菜。\nやや好みが　分かれる　食材だ。"
    en: "A very bitter ingredient that stands out among veggies\nfor its quirky flavor. People tend to either like it or not\nlike it—they rarely sit on the fence."
    fr: "Un ingrédient au goût très amer. Ce légume au goût\nvraiment unique laisse rarement indifférent :\nsoit on l’aime, soit on le déteste."
    it: "Un ingrediente molto amaro. Il particolare sapore che\ncontraddistingue questa verdura divide un po’ gli animi."
    de: "Durch ihren eigentümlichen Geschmack hebt sich diese\nsehr bittere Zutat von anderen Gemüsen ab. Von einigen\nheiß geliebt, kommt sie anderen niemals aufs Brot."
    es: "Una verdura que, debido a su fuerte sabor amargo y a\nsu aroma algo peculiar, suele provocar reacciones muy\ndiferentes según quien la coma."
    ko: "쓴맛이 강한 식재료.\n독특한 향이 특징적인 채소로,\n호불호가 은근히 갈린다."
    zh_simp: "苦味强烈的食材。\n以独特口味为特征的蔬菜。\n是种有点挑人的食材。"
    zh_trad: "苦味強勁的食材。\n以獨特滋味為特徵的蔬菜。\n人們對其的好惡略有區隔。"
waterium_z:bag:
  names:
    jp_kana: ミズＺ
    jp_kanji: ミズＺ
    en: Waterium Z
    fr: Aquazélite
    it: Idrium Z
    de: Aquium Z
    es: Hidrostal Z
    ko: 물Z
    zh_simp: 水Ｚ
    zh_trad: 水Ｚ
  descriptions:
    jp_kana: "みずタイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    jp_kanji: "みずタイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nWater-type moves to Water-type Z-Moves."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise son porteur à transformer ses capacités\nde type Eau en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono ai Pokémon di trasformare le mosse\ndi tipo Acqua in mosse Z."
    de: "Kristallisierte Z-Kraft, die Wasser-Attacken zu\nZ-Attacken aufstuft. Wird bei Bedarf automatisch\nvervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a los\nportadores convertir sus movimientos de tipo Agua en\nmovimientos Z."
    ko: "물타입 기술을\nZ기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将水属性招式升级成\nＺ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把水屬性招式\n升級為Ｚ招式的Ｚ力量結晶。"
waterium_z:held:
  names:
    jp_kana: ミズＺ
    jp_kanji: ミズＺ
    en: Waterium Z
    fr: Aquazélite
    it: Idrium Z
    de: Aquium Z
    es: Hidrostal Z
    ko: 물Z
    zh_simp: 水Ｚ
    zh_trad: 水Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　結晶。\nみずタイプの　技を\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nみずタイプの　技を\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Water-type moves to Z-Moves."
    fr: "Une cristallisation de la Force Z, permettant\nde transformer les capacités de type Eau\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare le mosse di tipo Acqua\nin mosse Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft\nWasser-Attacken zu Z-Attacken auf."
    es: "Cristal que confiere el Poder Z a los movimientos\nde tipo Agua."
    ko: "Z파워의 결정.\n물타입 기술을\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将水属性的招式\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把水屬性的招式\n升級為Ｚ招式。"
watmel_berry:
  names:
    jp_kana: カイスのみ
    jp_kanji: カイスのみ
    en: Watmel Berry
    fr: Baie Stekpa
    it: Baccacomero
    de: Wasmelbeere
    es: Baya Sambia
    ko: 슈박열매
    zh_simp: 瓜西果
    zh_trad: 瓜西果
  descriptions:
    jp_kana: "かしこさに　磨きを　かけるための\nポロックを　作るとき　使われる。\nほかの地方では　めずらしい　きのみ。"
    jp_kanji: "かしこさに　磨きを　かけるための\nポロックを　作るとき　使われる。\nほかの地方では　めずらしい　きのみ。"
    en: "Used to make Pokéblocks that will enhance Cleverness.\nThis Berry is rare in other regions."
    fr: "Une Baie très rare en dehors de cette région,\nutilisée pour préparer des Pokéblocs permettant\nd’augmenter l’Intelligence d’un Pokémon."
    it: "Bacca difficile da trovare in altre regioni usata per creare\nPokémelle che aumentano l’Acume del Pokémon."
    de: "Eine Beerensorte, die als Zutat für Pokériegel\nverwendet wird, welche die Klugheit erhöhen.\nIn anderen Regionen ist sie eher selten zu finden."
    es: "Se utiliza en la producción de Pokécubos que potencian\nel ingenio. Es una baya muy rara en otras regiones."
    ko: "슬기로움을 연마하기 위한\n포켓몬스넥을 만들 때 사용된다.\n다른 지방에서는 희귀한 나무열매."
    zh_simp: "用于制作宝可方块，\n制作出来的宝可方块可用来打磨聪明。\n在其他地区很少见的树果。"
    zh_trad: "製作用於增進聰明的\n寶可方塊時使用。\n在其他地區很少見的樹果。"
wattrel_feather:
  names:
    jp_kana: カイデンのはね
    jp_kanji: カイデンのはね
    en: Wattrel Feather
    fr: Plume de Zapétrel
    it: Penna di Wattrel
    de: Voltrel-Feder
    es: Pluma de Wattrel
    ko: 찌리비의깃털
    zh_simp: 电海燕的羽毛
    zh_trad: 電海燕的羽毛
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
wave_incense:
  names:
    jp_kana: さざなみのおこう
    jp_kanji: さざなみのおこう
    en: Wave Incense
    fr: Encens Vague
    it: Ondaroma
    de: Wellenrauch
    es: Incienso Acua
    ko: 잔물결향로
    zh_simp: 涟漪薰香
    zh_trad: 漣漪薰香
  descriptions:
    jp_kana: "不思議な香りの　御香。\n持たせると　みずタイプの\n技の威力が　あがる。"
    jp_kanji: "不思議な香りの　御香。\n持たせると　みずタイプの\n技の威力が　あがる。"
    en: "An item to be held by a Pokémon. This incense has\na curious aroma that boosts the power of the holder’s\nWater-type moves."
    fr: "Objet à tenir. Un encens au parfum curieux augmentant\nla puissance des capacités de type Eau."
    it: "Strumento da dare a un Pokémon. Incenso dal profumo\nesotico che potenzia le mosse di tipo Acqua."
    de: "Ein Item zum Tragen. Dieses exotische Räucherwerk\nverstärkt Attacken vom Typ Wasser."
    es: "Incienso de exótico aroma que potencia los movimientos\nde tipo Agua. Debe llevarlo un Pokémon."
    ko: "이상한 향기의 향로.\n지니게 하면 물타입\n기술의 위력이 올라간다."
    zh_simp: "有着神奇香气的薰香。\n携带后，水属性的\n招式威力就会提高。"
    zh_trad: "有著神奇香氣的薰香。\n攜帶後，水屬性的\n招式威力就會提高。"
weakness_policy:
  names:
    jp_kana: じゃくてんほけん
    jp_kanji: じゃくてんほけん
    en: Weakness Policy
    fr: Vulné-Assurance
    it: Vulneropolizza
    de: Schwächenschutz
    es: Seguro Debilidad
    ko: 약점보험
    zh_simp: 弱点保险
    zh_trad: 弱點保險
  descriptions:
    jp_kana: "弱点を　つかれたとき\n攻撃と　特攻が\nそれぞれ　ぐーんと　あがる。"
    jp_kanji: "弱点を　つかれたとき\n攻撃と　特攻が\nそれぞれ　ぐーんと　あがる。"
    en: "An item to be held by a Pokémon. If the holder is hit\nwith a move it’s weak to, this policy sharply boosts its\nAttack and Sp. Atk stats."
    fr: "Objet à tenir. Augmente beaucoup l’Attaque\net l’Attaque Spéciale du Pokémon lorsqu’il est touché\npar une capacité d’un type auquel il est vulnérable."
    it: "Se il Pokémon viene colpito da un attacco contro\ncui è debole, l’Attacco e l’Attacco Speciale\naumentano di molto."
    de: "Erhöht den Angriff und den Spezial-Angriff des Trägers\nstark, wenn er von einer sehr effektiven Attacke\ngetroffen wird."
    es: "Aumenta mucho el Ataque y el Ataque Especial cuando\nel Pokémon que lo lleva recibe un ataque frente al cual\nes débil."
    ko: "약점을 공격당했을 때\n공격과 특수공격이\n각각 크게 올라간다."
    zh_simp: "被针对弱点时，\n攻击和特攻就会大幅提高。"
    zh_trad: "被攻擊到弱點時，\n攻擊和特攻就會\n分別大幅提高。"
weedle_candy:
  names:
    jp_kana: ビードルのアメ
    jp_kanji: ビードルのアメ
    en: Weedle Candy
    fr: Bonbon Aspicot
    it: Caramella Weedle
    de: Hornliu-Bonbon
    es: Caramelo Weedle
    ko: 뿔충이의사탕
    zh_simp: 独角虫的糖果
    zh_trad: 獨角蟲的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
wellspring_mask:
  names:
    jp_kana: いどのめん
    jp_kanji: いどのめん
    en: Wellspring Mask
    fr: Masque du Puits
    it: Maschera Pozzo
    de: Brunnenmaske
    es: Máscara Fuente
    ko: 우물의가면
    zh_simp: 水井面具
    zh_trad: 水井面具
  descriptions:
    jp_kana: "結晶が　あしらわれた　木彫りの面。\nオーガポンに　持たせると\nみずタイプを　まとい　戦う。"
    jp_kanji: "結晶が　あしらわれた　木彫りの面。\nオーガポンに　持たせると\nみずタイプを　まとい　戦う。"
    en: "An item to be held by Ogerpon. This carved wooden\nmask is adorned with crystals and allows Ogerpon to\nwield the Water type during battle."
    fr: "Un masque en bois orné de cristaux. Si Ogerpon le tient,\nil prend le type Eau lors des combats."
    it: "Una maschera di legno intagliato ornata di cristalli.\nSe data a Ogerpon, gli consente di lottare assumendo\nil tipo Acqua."
    de: "Ein Item, das von Ogerpon getragen werden kann.\nDurch diese mit Kristallen verzierte, hölzerne Maske\nnimmt es im Kampf den Typ Wasser an."
    es: "Máscara de madera con cristales engarzados. Si la lleva\nOgerpon, le permite adoptar el tipo Agua para luchar."
    ko: "결정이 장식되어 있는 목각 가면.\n오거폰에게 지니게 하면\n물타입을 두르고 싸울 수 있다."
    zh_simp: "用结晶装饰的木雕面具。\n让厄诡椪携带后，就会用\n水属性覆盖全身进行战斗。"
    zh_trad: "用結晶裝飾的木雕面具。\n讓厄鬼椪攜帶後，戰鬥時\n就會有水屬性附上其身。"
wepear_berry:
  names:
    jp_kana: セシナのみ
    jp_kanji: セシナのみ
    en: Wepear Berry
    fr: Baie Repoi
    it: Baccapera
    de: Nirbebeere
    es: Baya Peragu
    ko: 서배열매
    zh_simp: 西梨果
    zh_trad: 西梨果
  descriptions:
    jp_kana: "かしこさに　磨きを　かけるための\nポロックを　作るとき　使われる。\n緑色の実は　食べると　苦い。"
    jp_kanji: "かしこさに　磨きを　かけるための\nポロックを　作るとき　使われる。\n緑色の実は　食べると　苦い。"
    en: "Used to make Pokéblocks that will enhance Cleverness.\nIts green flesh is bitter if eaten."
    fr: "Une Baie verte au goût amer, utilisée pour préparer\ndes Pokéblocs permettant d’augmenter l’Intelligence\nd’un Pokémon."
    it: "Bacca verde dal sapore amaro usata per creare\nPokémelle che aumentano l’Acume del Pokémon."
    de: "Eine Beerensorte, die als Zutat für Pokériegel\nverwendet wird, welche die Klugheit erhöhen.\nIhr grünes Fruchtfleisch schmeckt bitter."
    es: "Se utiliza en la producción de Pokécubos que potencian\nel ingenio. Es de color verde y sabor amargo."
    ko: "슬기로움을 연마하기 위한\n포켓몬스넥을 만들 때 사용된다.\n초록색 열매는 먹으면 쓰다."
    zh_simp: "用于制作宝可方块，\n制作出来的宝可方块可用来打磨聪明。\n绿色的果实尝起来是苦的。"
    zh_trad: "製作用於增進聰明的\n寶可方塊時使用。\n綠色的果實嘗起來是苦的。"
whimsical_chairs:
  names:
    jp_kana: ファンシーチェア
    jp_kanji: ファンシーチェア
    en: Whimsical Chairs
    fr: Sièges Fantaisie
    it: Sedie carine
    de: Zauber-Stühle
    es: Sillas Cucas
    ko: 팬시 체어
    zh_simp: 幻彩椅子
    zh_trad: 幻彩椅子
  descriptions:
    jp_kana: "ピクニックで　使いやすい　イス。\nファンシークロスの　デザインを\nもとに　作ってもらった。"
    jp_kanji: "ピクニックで　使いやすい　イス。\nファンシークロスの　デザインを\nもとに　作ってもらった。"
    en: "A set of chairs that are ideal for picnicking. Their design\nwas inspired by the Whimsical Tablecloth."
    fr: "Des sièges parfaits pour les pique-niques.\nLeur design est inspiré de la Nappe Fantaisie."
    it: "Pratiche sedie, perfette per i picnic, ispirate al design\ndella Tovaglia carina."
    de: "Diese Stühle sind gut geeignet für Picknicks.\nIhr Design basiert auf dem Zauber-Tischtuch."
    es: "Unas sillas ideales para irse de pícnic. Su diseño está\nbasado en el del Mantel Cuco."
    ko: "피크닉에서 사용하기 편한 의자.\n팬시 테이블보의\n디자인을 토대로 만들어졌다."
    zh_simp: "在野餐时很好用的椅子。\n根据幻彩桌巾的设计制作而成。"
    zh_trad: "野餐時很好用的椅子。\n根據幻彩桌巾的設計製作而成。"
whimsical_tablecloth:
  names:
    jp_kana: ファンシークロス
    jp_kanji: ファンシークロス
    en: Whimsical Tablecloth
    fr: Nappe Fantaisie
    it: Tovaglia carina
    de: Zauber-Tischtuch
    es: Mantel Cuco
    ko: 팬시 테이블보
    zh_simp: 幻彩桌巾
    zh_trad: 幻彩桌巾
  descriptions:
    jp_kana: "話題の　絵本作家との　コラボグッズ。\n優しいタッチで　描かれた　ポケモンが\n食卓に　花を　添えてくれる　テーブルクロス。"
    jp_kanji: "話題の　絵本作家との　コラボグッズ。\n優しいタッチで　描かれた　ポケモンが\n食卓に　花を　添えてくれる　テーブルクロス。"
    en: "A tablecloth made in collaboration with a popular\npicture-book author. The gently drawn Pokémon make\neven the loveliest picnic table more charming."
    fr: "Une nappe arborant des dessins venant de livres\nillustrés très populaires. Les Pokémon tracés avec\nsoin donnent à la table une touche délicate."
    it: "Tovaglia creata in collaborazione con una celebrità\nnel campo dei libri illustrati. I Pokémon disegnati\ncon tocco delicato abbelliscono la tavola."
    de: "Dieses Tischtuch ist in Kollaboration mit einem beliebten\nBilderbuchautor entstanden. Die liebevoll gezeichneten\nPokémon verleihen jedem Esstisch eine Portion Charme."
    es: "Este mantel, diseñado por un famoso autor de libros\nilustrados, trae a tu mesa un montón de adorables\nPokémon acompañados de flores."
    ko: "화제의 그림책 작가와의 콜라보 상품.\n따뜻한 그림체로 그려진 포켓몬이\n식탁에 활기를 불어넣어 주는 테이블보."
    zh_simp: "与当红绘本作家共同创作的商品。\n这款桌巾上有着以温柔笔触\n描绘出的宝可梦，能为餐桌增花添彩。"
    zh_trad: "和當紅的繪本作家合作的商品。\n桌巾上以溫柔筆觸描繪出的寶可夢\n能夠為餐桌增添光彩。"
whipped_cream:
  names:
    jp_kana: ホイップクリーム
    jp_kanji: ホイップクリーム
    en: Whipped Cream
    fr: Crème Fouettée
    it: Panna montata
    de: Schlagsahne
    es: Nata Montada
    ko: 휘핑크림
    zh_simp: 鲜奶油
    zh_trad: 鮮奶油
  descriptions:
    jp_kana: "甘味が　強い　調味料。\nパルデアでは　甘みが　しっかりと\n主張しているものが　好まれる。"
    jp_kanji: "甘味が　強い　調味料。\nパルデアでは　甘みが　しっかりと\n主張しているものが　好まれる。"
    en: "A very sweet condiment. Folks in Paldea seem to love\nthe varieties that really let the sweetness sing."
    fr: "Un condiment au goût très sucré. Il semblerait que\nsa popularité à Paldea dépende de son taux de sucre :\nplus il y en a, mieux c’est !"
    it: "Un condimento molto dolce. A Paldea si apprezzano\nle varietà in cui la componente dolce è preponderante."
    de: "Ein sehr süßes Würzmittel, dessen Popularität in\nPaldea von der Höhe des Zuckergehalts abhängt."
    es: "En Paldea, este ingrediente de sabor dulce es más\npopular cuanto más azúcar lleve."
    ko: "단맛이 강한 조미료.\n팔데아에서는 단맛이\n잘 두드러지는 것이 선호된다."
    zh_simp: "甜味强烈的调味料。\n在帕底亚，甜味突出的\n东西会受到欢迎。"
    zh_trad: "甜味強勁的調味料。\n在帕底亞地區，能明顯嚐到\n甜味的食物相當受歡迎。"
whipped_dream:
  names:
    jp_kana: ホイップポップ
    jp_kanji: ホイップポップ
    en: Whipped Dream
    fr: Chantibonbon
    it: Dolcespuma
    de: Sahnehäubchen
    es: Dulce de Nata
    ko: 휘핑팝
    zh_simp: 泡沫奶油
    zh_trad: 泡沫奶油
  descriptions:
    jp_kana: "ふんわり　ふわふわに　泡立てた\nほんのり　甘い　クリーム。\nあるポケモンが　好んでいる。"
    jp_kanji: "ふんわり　ふわふわに　泡立てた\nほんのり　甘い　クリーム。\nあるポケモンが　好んでいる。"
    en: "A soft and sweet treat made of fluffy, puffy, whipped,\nand whirled cream. It’s loved by a certain Pokémon."
    fr: "Une crème sucrée qui fond dans la bouche,\nlégère comme un nuage. Elle est appréciée\nd’un certain Pokémon."
    it: "Una spuma soffice, delicata e leggermente dolce.\nPiace a un Pokémon in particolare."
    de: "Ein lockeres, leicht süßliches Häubchen aus Schlagsahne.\nDas Lieblingsstück eines bestimmten Pokémon."
    es: "Un dulce a base de suave y esponjosa nata montada.\nCierto Pokémon lo adora."
    ko: "풍성하게 거품을 낸\n살짝 달콤한 크림.\n어떤 포켓몬이 좋아한다."
    zh_simp: "松松软软起着泡的，\n稍微有点甜的奶油。\n某种宝可梦很喜欢它。"
    zh_trad: "鬆鬆軟軟起著泡的，\n稍微有點甜的奶油。\n某種寶可夢很喜歡它。"
white_apricorn:
  names:
    jp_kana: しろぼんぐり
    jp_kanji: しろぼんぐり
    en: White Apricorn
    fr: Noigrume Blanc
    it: Ghicocca bianca
    de: Aprikoko Weiß
    es: Bonguri Blanco
    ko: 하얀규토리
    zh_simp: 白球果
    zh_trad: 白球果
  descriptions:
    jp_kana: "しろい　ぼんぐり。\nなんの　においも　しない。"
    jp_kanji: "しろい　ぼんぐり。\nなんの　においも　しない。"
    en: A white Apricorn. It doesn’t have any aroma at all.
    fr: "Un Noigrume de couleur blanche.\nIl ne dégage aucun arôme."
    it: Una ghicocca di colore bianco. Non emana alcun odore.
    de: Eine weiße Aprikoko. Sie riecht nach überhaupt nichts.
    es: "Bonguri de color blanco que no desprende aroma\nalguno."
    ko: "하얀색의 규토리.\n어떠한 향기도 나지 않는다."
    zh_simp: "白色的球果。\n没有任何气味。"
    zh_trad: "白色的球果。\n沒有任何氣味。"
white_dish:
  names:
    jp_kana: ホワイトプレート
    jp_kanji: ホワイトプレート
    en: White Dish
    fr: Assiette Blanche
    it: Piatto bianco
    de: Weißer Teller
    es: Plato Blanco
    ko: 화이트 플레이트
    zh_simp: 白色盘子
    zh_trad: 白色盤子
  descriptions:
    jp_kana: "ピクニック用のお皿。　料理や気分で\n使い分けられるよう　色の種類が　豊富。\nホワイトは　ショップおすすめの　商品。"
    jp_kanji: "ピクニック用のお皿。　料理や気分で\n使い分けられるよう　色の種類が　豊富。\nホワイトは　ショップおすすめの　商品。"
    en: "A dish for picnics. Comes in plenty of colors to choose\nfrom based on the food or the mood. The white variety\ncomes recommended by sellers."
    fr: "Une assiette de pique-nique. Il en existe de nombreuses\ncouleurs pour les accorder à l’ambiance ou au menu.\nLa blanche est la préférée des boutiques."
    it: "Piatto da picnic. È disponibile in un ampio assortimento\ndi colori tra cui si può scegliere a seconda del cibo e\ndell’umore. Il bianco è sempre consigliato."
    de: "Diesen Picknickteller gibt es in verschiedenen Farben,\ndamit man je nach Laune oder Speise variieren kann.\nDer weiße Teller wird von vielen Geschäften empfohlen."
    es: "Un plato de pícnic. Los distintos colores en los que viene\nofrecen posibilidades infinitas. Esta versión blanca la\nrecomiendan mucho en las tiendas."
    ko: "피크닉용 접시. 요리나 기분에 따라\n골라서 쓸 수 있게 색의 종류가 다양하다.\n화이트 컬러는 가게의 추천 상품이다."
    zh_simp: "野餐用的盘子。为了能够配合料理\n和心情使用，其有着丰富的颜色种类。\n白色的是深受店家推荐的商品。"
    zh_trad: "野餐用的盤子。提供豐富的顏色，\n以搭配各種不同的料理和心情。\n白色的盤子深受店家推薦。"
white_flute:
  names:
    jp_kana: しろいビードロ
    jp_kanji: しろいビードロ
    en: White Flute
    fr: Flûte Blanche
    it: Flauto bianco
    de: Weiße Flöte
    es: Flauta Blanca
    ko: 하양비드로
    zh_simp: 白色玻璃哨
    zh_trad: 白色玻璃哨
  descriptions:
    jp_kana: "白いガラスで　できた　笛。\n使った場所で　弱いポケモンと\n遭遇しやすくなる。"
    jp_kanji: "白いガラスで　できた　笛。\n使った場所で　弱いポケモンと\n遭遇しやすくなる。"
    en: "A flute made from white glass. It makes it easier to\nencounter low-level Pokémon in the place you use it."
    fr: "Un jouet en forme de flûte en verre blanc.\nAugmente les chances de rencontrer des Pokémon\nsauvages faibles là où l’on en joue."
    it: "Flauto fatto di vetro bianco. Aumenta le probabilità di\nincontrare Pokémon deboli nell’area in cui viene usato."
    de: "Eine Spielzeugflöte aus weißem Glas. Erhöht am\nEinsatzort die Wahrscheinlichkeit, schwachen wilden\nPokémon zu begegnen."
    es: "Una flauta de cristal blanco cuyas notas atraen a\nPokémon salvajes de nivel más bajo al lugar en el que\nse usa."
    ko: "하얀 유리로 만들어진 피리.\n사용한 장소에서 약한 포켓몬과\n만나기 쉬워진다."
    zh_simp: "以白色玻璃制成的哨子。\n在使用的地方更容易\n遇到弱小的宝可梦。"
    zh_trad: "以白色玻璃製成的笛子。\n在使用的地方更容易\n遇到弱小的寶可夢。"
white_herb:
  names:
    jp_kana: しろいハーブ
    jp_kanji: しろいハーブ
    en: White Herb
    fr: Herbe Blanche
    it: Erbachiara
    de: Schlohkraut
    es: Hierba Blanca
    ko: 하양허브
    zh_simp: 白色香草
    zh_trad: 白色香草
  descriptions:
    jp_kana: "持たせた　ポケモンの能力が\nさがったとき　１度だけ\n元の状態に　戻す。"
    jp_kanji: "持たせた　ポケモンの能力が\nさがったとき　１度だけ\n元の状態に　戻す。"
    en: "An item to be held by a Pokémon. It will restore any\nlowered stat in battle—but only once."
    fr: "Objet à tenir. Restaure les stats qui ont subi une baisse.\nNe peut être utilisé qu’une fois."
    it: "Strumento da dare a un Pokémon. Ripristina le statistiche\nridotte in lotta. Funziona una sola volta."
    de: "Ein Item zum Tragen. Es hebt einmalig jede negative\nStatusveränderung auf."
    es: "Restaura cualquier característica reducida en combate.\nEs de un solo uso y debe llevarla un Pokémon."
    ko: "지니게 한 포켓몬의 능력이\n떨어졌을 때 한 번만 원래\n상태로 돌아온다."
    zh_simp: "当携带它的宝可梦能力降低时，\n仅能回到之前的状态１次。"
    zh_trad: "當攜帶它的寶可夢\n能力降低時，將能回到\n初始狀態１次。"
white_mane_hair:
  names:
    jp_kana: しろいたてがみ
    jp_kanji: しろいたてがみ
    en: White Mane Hair
    fr: Crins Blancs
    it: Crini bianchi
    de: Helles Rosshaar
    es: Crin Blanca
    ko: 하얀갈기
    zh_simp: 白色鬃毛
    zh_trad: 白色鬃毛
  descriptions:
    jp_kana: "豊穣の王の　愛馬\nブリザポスの　たてがみ。\n丈夫で　よく　しなる。"
    jp_kanji: "豊穣の王の　愛馬\nブリザポスの　たてがみ。\n丈夫で　よく　しなる。"
    en: "Mane hair that belonged to the King of Bountiful\nHarvests’ beloved steed, Glastrier. The hair is strong\nand very flexible."
    fr: "Des crins de Blizzeval, le fidèle destrier du Seigneur\ndes récoltes. Ils sont à la fois souples et robustes."
    it: "Un ciuffo di crini di Glastrier, il fedele destriero\ndel Re dell’abbondanza. Sono resistenti e flessibili."
    de: "Eine Haarsträhne von Polaross, dem treuen Ross des\nKönigs der reichen Ernte. Sie ist robust und biegsam."
    es: "Parte de la crin de Glastrier, el amado corcel del Rey de\nlas Cosechas. Es flexible y resistente."
    ko: "풍요의 왕의 애마\n블리자포스의 갈기.\n튼튼하고도 매우 유연하다."
    zh_simp: "丰饶之王的爱马\n雪暴马的鬃毛。\n既结实又柔韧。"
    zh_trad: "豐饒之王的愛馬\n「雪暴馬」的鬃毛。\n既結實又柔韌。"
wide_lens:
  names:
    jp_kana: こうかくレンズ
    jp_kanji: こうかくレンズ
    en: Wide Lens
    fr: Loupe
    it: Grandelente
    de: Großlinse
    es: Lupa
    ko: 광각렌즈
    zh_simp: 广角镜
    zh_trad: 廣角鏡
  descriptions:
    jp_kana: "ものが　大きく見える　レンズ。\n持たせると　技の命中率が\n少し　あがる。"
    jp_kanji: "ものが　大きく見える　レンズ。\n持たせると　技の命中率が\n少し　あがる。"
    en: "An item to be held by a Pokémon. It’s a magnifying lens\nthat slightly boosts the accuracy of the holder’s moves."
    fr: "Objet à tenir. Une loupe qui augmente légèrement\nla Précision des capacités."
    it: "Strumento da dare a un Pokémon.\nLente d’ingrandimento che aumenta di poco\nla precisione delle mosse."
    de: "Ein Item zum Tragen. Dieses Vergrößerungsglas erhöht\ndie Genauigkeit etwas."
    es: "Aumenta ligeramente la precisión de los movimientos.\nDebe llevarla un Pokémon."
    ko: "물건이 크게 보이는 렌즈.\n지니게 하면 기술의 명중률이\n조금 올라간다."
    zh_simp: "能放大观看物体的镜片。\n携带后，招式的命中率\n就会少量提高。"
    zh_trad: "會讓物體看起來比較大的鏡片。\n攜帶後，招式的命中率\n就會少量提高。"
wiglett_sand:
  names:
    jp_kana: ウミディグダのすな
    jp_kanji: ウミディグダのすな
    en: Wiglett Sand
    fr: Sable de Taupikeau
    it: Sabbia di Wiglett
    de: Schligda-Sand
    es: Arena de Wiglett
    ko: 바다그다의모래
    zh_simp: 海地鼠的沙
    zh_trad: 海地鼠的沙
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
wiki_berry:
  names:
    jp_kana: ウイのみ
    jp_kanji: ウイのみ
    en: Wiki Berry
    fr: Baie Wiki
    it: Baccakiwi
    de: Wikibeere
    es: Baya Wiki
    ko: 위키열매
    zh_simp: 异奇果
    zh_trad: 異奇果
  descriptions:
    jp_kana: "ポケモンに　持たせると\nピンチのとき　ＨＰを　回復する。\nきらいな味だと　混乱する。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　ＨＰを　回復する。\nきらいな味だと　混乱する。"
    en: "If a Pokémon holds one of these Berries, it will be able\nto restore some HP should it find itself in a pinch.\nBut it will become confused if it hates the Berry’s taste."
    fr: "Tenue, cette Baie restaure des PV en cas de besoin,\nmais rend le Pokémon confus si son goût lui déplaît."
    it: "Se un Pokémon in difficoltà ha questa bacca, recupera\ndei PS. Se al Pokémon non piace il suo sapore,\npuò causare confusione."
    de: "Als getragenes Item füllt diese Beere in einer Notlage\ndie KP des Pokémon auf, doch ihr Aroma verwirrt jene,\ndie es nicht mögen."
    es: "Los Pokémon pueden llevarla y usarla para restaurar\nalgunos PS en un momento de apuro. Su sabor puede\ncausar confusión si no les gusta."
    ko: "포켓몬에게 지니게 하면\n위급할 때 HP를 회복한다.\n싫어하는 맛이면 혼란에 빠진다."
    zh_simp: "让宝可梦携带后，\n危机时可以回复ＨＰ。\n如果讨厌这味道就会混乱。"
    zh_trad: "讓寶可夢攜帶後，\n危機時可以回復ＨＰ。\n如果討厭這味道就會混亂。"
wing_ball:
  names:
    jp_kana: ウイングボール
    jp_kanji: ウイングボール
    en: Wing Ball
    fr: Envol Ball
    it: Wing Ball
    de: Flügelball
    es: Ala Ball
    ko: 윙볼
    zh_simp: 飞翼球
    zh_trad: 飛翼球
  descriptions:
    jp_kana: "強化されたフェザーボール。\n速くまっすぐに飛ぶ。素早いポケモンや\n空高く飛ぶポケモンの捕獲に有効である。"
    jp_kanji: "強化されたフェザーボール。\n速くまっすぐに飛ぶ。素早いポケモンや\n空高く飛ぶポケモンの捕獲に有効である。"
    en: "An improvement on the original Feather Ball design. A\nball that flies fast and true—ideal for catching nimble\nPokémon or Pokémon that fly high in the air."
    fr: "Cette Plume Ball améliorée fend les airs à toute vitesse,\nen ligne droite. Elle permet notamment d’attraper\nles Pokémon qui volent ou qui sont très rapides."
    it: "Versione potenziata della Piuma Ball che vola rapida\nin linea retta. È efficace per catturare Pokémon veloci\ne Pokémon che volano alti nel cielo."
    de: "Eine verbesserte Version des Federballs. Dieser Ball\nfliegt schnell und gerade. Er eignet sich besonders\nzum Fangen flinker oder fliegender Pokémon."
    es: "Versión mejorada de la Pluma Ball que vuela muy rápido\ny en línea recta al lanzarla. Ideal para capturar Pokémon\nágiles o Pokémon voladores."
    ko: "강화된 페더볼.\n빠르게 똑바로 날아간다. 재빠른 포켓몬이나\n하늘 높이 나는 포켓몬을 잡을 때 유용하다."
    zh_simp: "强化后的飞羽球。能直线高速飞行，\n在捕捉动作快速的宝可梦及\n飞在高空的宝可梦时十分有效。"
    zh_trad: "強化後的飛羽球。能直線高速飛行，\n在捕捉動作快速的寶可夢及\n飛在高空的寶可夢時十分有效。"
wing_ball:recipe:
  names:
    jp_kana: ウイングボール
    jp_kanji: ウイングボール
    en: Wing Ball
    fr: Envol Ball
    it: Wing Ball
    de: Flügelball
    es: Ala Ball
    ko: 윙볼
    zh_simp: 飞翼球
    zh_trad: 飛翼球
  descriptions:
    jp_kana: "ウイングボールのレシピ。　材料は\nぼんぐりのみ×１　てつのかけら×１\nそらいろたまいし×１"
    jp_kanji: "ウイングボールのレシピ。　材料は\nぼんぐりのみ×１　てつのかけら×１\nそらいろたまいし×１"
    en: "A recipe for crafting Wing Balls from scratch.\nRequired materials: 1 Apricorn, 1 Sky Tumblestone,\nand 1 Iron Chunk."
    fr: "Méthode pour Envol Ball. Ressources requises :\n1 Noigrume, 1 Fragment de Fer et 1 Galet Azur."
    it: "Ricetta per creare una Wing Ball. I materiali necessari\nsono 1 Bacca ghicocca, 1 Pezzo di ferro e 1 Ciottolo\nceleste."
    de: "Die Anleitung zur Herstellung eines Flügelballs.\nBenötigte Materialien: 1 Aprikoko, 1 Eisenbrocken\nund 1 Azurglanzstein."
    es: "Receta para crear Ala Balls. Materiales:\n1 Bonguri, 1 Pepita de Hierro y 1 Guijarro Celeste."
    ko: "윙볼의 레시피.\n재료: 규토리열매×1 철조각×1 하늘색옥돌×1"
    zh_simp: "飞翼球的材料单。材料是：\n球果果×１　碎铁×１\n天蓝玉石×１"
    zh_trad: "飛翼球的材料單。材料是：\n球果果×１　碎鐵×１\n天藍玉石×１"
wingull_feather:
  names:
    jp_kana: キャモメのはね
    jp_kanji: キャモメのはね
    en: Wingull Feather
    fr: Plume de Goélise
    it: Penna di Wingull
    de: Wingull-Feder
    es: Pluma de Wingull
    ko: 갈모매의깃털
    zh_simp: 长翅鸥的羽毛
    zh_trad: 長翅鷗的羽毛
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
winking_pika_pick:
  names:
    jp_kana: パチピカピック
    jp_kanji: パチピカピック
    en: Winking Pika Pick
    fr: Pique à Chu Fripon
    it: Stecchino pikapika
    de: Zwinker-Pika-Pikser
    es: Palillo Pikaguiño
    ko: 윙크피카 픽
    zh_simp: 眨眼皮卡丘三明治签
    zh_trad: 眨眼皮卡丘三明治籤
  descriptions:
    jp_kana: "ピカチュウが　デザインされた　ピック。\nウィンクした顔が　プリントされている。\n耳の部分が　持ちやすいのも　人気の秘密。"
    jp_kanji: "ピカチュウが　デザインされた　ピック。\nウィンクした顔が　プリントされている。\n耳の部分が　持ちやすいのも　人気の秘密。"
    en: "A Pick-achu, if you will, sporting Pikachu’s winking face.\nIt’s easy to grab by the ears, which is part of why it’s\nso popular."
    fr: "Une pique-à-chu, autrement dit : ornée du visage\nfarceur d’un Pikachu. Une des raisons de sa popularité\nvient de ses oreilles, par lesquelles on peut la tenir."
    it: "Stecchino a forma di Pikachu, rappresentato mentre fa\nl’occhiolino. Le orecchie offrono una facile presa,\ncontribuendo alla sua popolarità."
    de: "Ein Pikser im Design von Pikachu mit einem niedlichen\nAugenzwinkern. Die praktische Handhabung dank der\nprägnanten Ohren ist mit ein Grund für seine Beliebtheit."
    es: "Un palillo con forma de Pikachu guiñando un ojo.\nEl secreto de su popularidad reside en lo fácil de agarrar\nque resulta gracias a las orejitas."
    ko: "피카츄 디자인이 들어간 픽.\n윙크하는 표정이 프린트되어 있다.\n귀 부분이 잡기 편한 것 역시 인기의 비결이다."
    zh_simp: "设计成皮卡丘的签子。\n印着皮卡丘眨眼的表情。耳朵部分\n方便易拿也是其受欢迎的秘密。"
    zh_trad: "設計成皮卡丘造型的小籤。\n籤上印著牠眨眼的模樣。\n容易拿取的耳朵也是其廣受歡迎的原因之一。"
wise_glasses:
  names:
    jp_kana: ものしりメガネ
    jp_kanji: ものしりメガネ
    en: Wise Glasses
    fr: Lunettes Sages
    it: Saviocchiali
    de: Schlaubrille
    es: Gafas Especiales
    ko: 박식안경
    zh_simp: 博识眼镜
    zh_trad: 博識眼鏡
  descriptions:
    jp_kana: "ぶあつい　レンズの　ついた　メガネ。\n持たせると　特殊技の\n威力が　少し　あがる。"
    jp_kanji: "ぶあつい　レンズの　ついた　メガネ。\n持たせると　特殊技の\n威力が　少し　あがる。"
    en: "An item to be held by a Pokémon. This thick pair of\nglasses slightly boosts the power of the holder’s\nspecial moves."
    fr: "Objet à tenir. Une paire de lunettes épaisses qui\naugmente légèrement la puissance des capacités\nspéciales."
    it: "Strumento da dare a un Pokémon. Paio di occhiali dalle\nlenti spesse che potenzia di poco le mosse speciali."
    de: "Ein Item zum Tragen. Diese dicke Brille verstärkt auf\nSpezial-Angriff basierende Attacken."
    es: "Potencian ligeramente los ataques especiales. Debe\nllevarlas un Pokémon."
    ko: "두꺼운 렌즈를 붙인 안경.\n지니게 하면 특수 기술의\n위력이 조금 올라간다."
    zh_simp: "装着很厚镜片的眼镜。\n携带后，特殊招式的\n威力就会少量提高。"
    zh_trad: "裝著很厚鏡片的眼鏡。\n攜帶後，特殊招式的\n威力就會少量提高。"
wishing_chip:
  names:
    jp_kana: ねがいのかけら
    jp_kanji: ねがいのかけら
    en: Wishing Chip
    fr: Fragment Vœu
    it: Desioframmento
    de: Wunschsplitter
    es: Trocito Deseo
    ko: 소원의조각
    zh_simp: 许愿星碎片
    zh_trad: 許願星碎片
  descriptions:
    jp_kana: "ポケモンの　巣穴に　いくつか\n投げいれると　ダイマックスした\nポケモンが　現れることが　ある。"
    jp_kanji: "ポケモンの　巣穴に　いくつか\n投げいれると　ダイマックスした\nポケモンが　現れることが　ある。"
    en: "Toss a number of them into a Pokémon Den for the\nchance to attract a wild Dynamax Pokémon."
    fr: "En lancer plusieurs dans l’antre d’un Pokémon augmente\nles chances d’y faire apparaître un Pokémon Dynamax."
    it: "Se ne lanci alcuni dentro una tana di Pokémon possono\nfar comparire un Pokémon Dynamax."
    de: "Wirft man mehrere von ihnen in ein Pokémon-Nest,\ntaucht eventuell ein Dynamax-Pokémon auf."
    es: "Al lanzar unos cuantos a un nido Pokémon, es posible\nque aparezca algún Pokémon Dinamax."
    ko: "포켓몬굴에 몇 개 던져 넣으면\n다이맥스 포켓몬이\n나타날 때가 있다."
    zh_simp: "投掷数个到宝可梦的巢穴里，\n可能就会有极巨化宝可梦出现。"
    zh_trad: "投幾個進寶可夢的巢穴裡，\n有時可讓極巨化寶可夢現身。"
wishing_piece:
  names:
    jp_kana: ねがいのかたまり
    jp_kanji: ねがいのかたまり
    en: Wishing Piece
    fr: Morceau Vœu
    it: Desioblocco
    de: Wunschbrocken
    es: Trozo Deseo
    ko: 소원의덩어리
    zh_simp: 许愿星块
    zh_trad: 許願星塊
  descriptions:
    jp_kana: "ポケモンの　巣穴に　投げいれると\nダイマックスポケモンが　現れる。"
    jp_kanji: "ポケモンの　巣穴に　投げいれると\nダイマックスポケモンが　現れる。"
    en: "Throw one into a Pokémon Den to attract\na wild Dynamax Pokémon."
    fr: "Un objet à lancer dans l’antre d’un Pokémon\npour y faire apparaître un Pokémon Dynamax."
    it: "Se lanciato dentro una tana di Pokémon fa comparire\nun Pokémon Dynamax."
    de: "Wirft man ihn in ein Pokémon-Nest, taucht ein\nDynamax-Pokémon auf."
    es: "Al lanzarlo en un nido Pokémon, aparece un Pokémon\nDinamax."
    ko: "포켓몬굴에 던져 넣으면\n다이맥스 포켓몬이 나타난다."
    zh_simp: "投掷到宝可梦的巢穴里，\n就会有极巨化宝可梦出现。"
    zh_trad: "投進寶可夢的巢穴裡，\n極巨化寶可夢就會現身。"
wishing_star:
  names:
    jp_kana: ねがいぼし
    jp_kanji: ねがいぼし
    en: Wishing Star
    fr: Étoile Vœu
    it: Desiostella
    de: Wunschstern
    es: Estrella Deseo
    ko: 소원의별
    zh_simp: 许愿星
    zh_trad: 許願星
  descriptions:
    jp_kana: "ガラル地方で　みつかる　不思議な\nパワーを　秘めている　石。拾うと\n願いが　叶うとも　いわれている。"
    jp_kanji: "ガラル地方で　みつかる　不思議な\nパワーを　秘めている　石。拾うと\n願いが　叶うとも　いわれている。"
    en: "A stone found in the Galar region with a mysterious power.\nIt’s said that your dreams come true if you find one."
    fr: "Une gemme aux pouvoirs mystérieux que l’on trouve\ndans la région de Galar. On raconte que le vœu\nde la personne l’ayant ramassée se réalisera."
    it: "Pietra dal potere misterioso che si può trovare nella\nregione di Galar. Si dice che possa avverare i desideri\ndi chi la trova."
    de: "In Galar verstreute Steine, denen eine geheimnisvolle\nEnergie innewohnt. Es wird erzählt, Wünsche gingen in\nErfüllung, wenn man sie aufsammelt."
    es: "Piedra de poder misterioso hallada en la región de\nGalar. Se dice que quien encuentra una verá realizados\nsus sueños."
    ko: "가라르지방에서 발견되는\n신비한 힘을 간직하고 있는 돌.\n주우면 소원이 이루어진다고도 전해진다."
    zh_simp: "这是一块在伽勒尔地区发现的\n蕴含着神奇力量的石头。听说\n捡到它的人能实现自己的愿望。"
    zh_trad: "在伽勒爾地區發現的\n蘊藏著神秘力量的石頭。\n據說撿到它就能讓願望成真。"
wood:
  names:
    jp_kana: もくざい
    jp_kanji: もくざい
    en: Wood
    fr: Bois
    it: Legno
    de: Holz
    es: Madera
    ko: 목재
    zh_simp: 木材
    zh_trad: 木材
  descriptions:
    jp_kana: "生活用品から\n工芸品の材料にまで\n使える便利な木材。"
    jp_kanji: "生活用品から\n工芸品の材料にまで\n使える便利な木材。"
    en: "A handy log of wood that can be used for anything,\nfrom crafting common goods needed for daily living\nto producing works of art."
    fr: "Une ressource très pratique qui peut tout aussi bien servir\nà la confection d’objets du quotidien que de pièces plus\nraffinées."
    it: "Materiale molto utile, impiegato per la creazione\ndi oggetti di uso quotidiano o prodotti d’artigianato."
    de: "Mit diesem äußerst nützlichen Material kann man\nalles Mögliche herstellen, von Alltagswaren bis hin\nzu Kunstgegenständen."
    es: "Leño de gran utilidad que se emplea en la creación de\ndiversos artículos, desde objetos de uso cotidiano a\nproductos de artesanía."
    ko: "생활용품은 물론이고\n공예품의 재료로도\n사용할 수 있는 편리한 목재."
    zh_simp: "从生活用品到工艺品，\n能在制作各种物品时\n作为材料的好用木材。"
    zh_trad: "從生活用品到工藝品，\n能在製作各種物品時\n作為材料的好用木材。"
wooden_crown:
  names:
    jp_kana: きぼりのかんむり
    jp_kanji: きぼりのかんむり
    en: Wooden Crown
    fr: Couronne en Bois
    it: Corona di legno
    de: Holzkrone
    es: Corona Tallada
    ko: 목각왕관
    zh_simp: 木雕王冠
    zh_trad: 木雕王冠
  descriptions:
    jp_kana: "木で　彫られた　謎の　かたまり。\n欠けているような　跡が　あり\nなにかの一部　なのかもしれない。"
    jp_kanji: "木で　彫られた　謎の　かたまり。\n欠けているような　跡が　あり\nなにかの一部　なのかもしれない。"
    en: "A mysterious object made of wood. Part of it seems to\nbe chipped. Maybe it’s meant to be part of something."
    fr: "Une mystérieuse sculpture en bois.\nOn dirait qu’il lui manque un morceau, comme\ns’il s’agissait d’un fragment de quelque chose."
    it: "Un misterioso pezzo di legno intagliato. Ha dei segni\nche fanno pensare a una parte mancante."
    de: "Eine rätselhafte Holzschnitzerei, die aussieht, als sei\netwas von ihr abgebrochen. Vielleicht ist sie Teil von\netwas anderem."
    es: "Un misterioso objeto hecho de madera. Las marcas que\npresenta parecen indicar que no está completo, como si\nformase parte de algo."
    ko: "나무로 만들어진 수수께끼의 덩어리.\n뭔가가 빠진 듯한 흔적이 있는 것으로 보아\n무엇인가의 일부일지도 모른다."
    zh_simp: "用木头雕制而成的神秘物体。\n上面有看起来缺了什么的痕迹。\n可能是其他物品的一部分。"
    zh_trad: "神秘的木頭雕刻。\n上面有著像是缺損的痕跡，\n很可能是某種東西的一部分。"
wooper_slime:
  names:
    jp_kana: ウパーのねんえき
    jp_kanji: ウパーのねんえき
    en: Wooper Slime
    fr: Mucus d’Axoloto
    it: Muco di Wooper
    de: Felino-Schleim
    es: Secreción de Wooper
    ko: 우파의점액
    zh_simp: 乌波的黏液
    zh_trad: 烏波的黏液
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
works_key:
  names:
    jp_kana: はつでんしょキー
    jp_kanji: はつでんしょキー
    en: Works Key
    fr: Clé Parc Éolien
    it: Chiave impianto
    de: K-Schlüssel
    es: Llave de la Central
    ko: 발전소키
    zh_simp: 发电厂钥匙
    zh_trad: 發電廠鑰匙
  descriptions:
    jp_kana: "谷間の発電所の　扉を\nあけしめする　おおきな　カギ。\nなぜか　ギンガ団が　持っていた。"
    jp_kanji: "谷間の発電所の　扉を\nあけしめする　おおきな　カギ。\nなぜか　ギンガ団が　持っていた。"
    en: "A large key for operating the doors of the Valley\nWindworks in the canyon. It was held by a Team\nGalactic Grunt."
    fr: "Une grande clé servant à ouvrir la porte\nde la centrale du Parc Éolien. Étonnamment,\nun Sbire de la Team Galaxie la détenait."
    it: "Grande chiave usata per azionare la porta\ndell’Impianto Turbine. L’aveva con sé una\nRecluta del Team Galassia."
    de: "Ein großer Schlüssel, der zum Windkraftwerk gehört.\nEiner der Rüpel von Team Galaktik hatte ihn im Besitz."
    es: "Abre la puerta de la central del Valle Eólico. La llevaba\nun Recluta del Equipo Galaxia."
    ko: "골짜기발전소의 문을 여닫는 큰 열쇠.\n어찌 된 영문인지\n갤럭시단이 지니고 있었다."
    zh_simp: "用来打开或关闭\n山谷发电厂大门的大钥匙。\n不知为何，它落入了银河队的手中。"
    zh_trad: "用來打開或關閉\n山谷發電廠大門的大鑰匙。\n不知為何它在銀河隊手中。"
x_accuracy:
  names:
    jp_kana: ヨクアタール
    jp_kanji: ヨクアタール
    en: X Accuracy
    fr: Précision +
    it: Precisione X
    de: X-Genauigkeit
    es: Precisión X
    ko: 잘-맞히기
    zh_simp: 命中强化
    zh_trad: 命中強化
  descriptions:
    jp_kana: "戦闘中の　ポケモンの\n命中を　大きく　あげる　道具。\nひっこめると　元に　戻る。"
    jp_kanji: "戦闘中の　ポケモンの\n命中を　大きく　あげる　道具。\nひっこめると　元に　戻る。"
