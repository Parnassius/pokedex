heal_ball:
  names:
    jp_kana: ヒールボール
    jp_kanji: ヒールボール
    en: Heal Ball
    fr: Soin Ball
    it: Cura Ball
    de: Heilball
    es: Sana Ball
    ko: 힐볼
    zh_simp: 治愈球
    zh_trad: 治癒球
  descriptions:
    jp_kana: "捕まえたポケモンの　ＨＰと\n状態異常を　回復する\nちょっと優しい　ボール。"
    jp_kanji: "捕まえたポケモンの　ＨＰと\n状態異常を　回復する\nちょっと優しい　ボール。"
    en: "A remedial Poké Ball that restores HP and eliminates\nstatus conditions for a Pokémon caught with it."
    fr: "Une Poké Ball de soin qui rend tous ses PV au Pokémon\nattrapé et qui soigne toutes ses altérations de statut."
    it: "Poké Ball piuttosto delicata che ridà PS al Pokémon\ncatturato e cura tutti i suoi problemi di stato."
    de: "Ein wohltuender Ball, der alle KP des gefangenen\nPokémon wieder auffüllt und alle Statusprobleme behebt."
    es: "Poké Ball curativa que restaura los PS y cura todos los\nproblemas de estado de un Pokémon después de\ncapturarlo."
    ko: "잡은 포켓몬의 HP와\n상태 이상을 회복시키는\n조금 다정한 볼."
    zh_simp: "有点温柔的球。\n能回复捉到的宝可梦的\nＨＰ并治愈异常状态。"
    zh_trad: "有點溫柔的球。\n能回復捉到的寶可夢的\nＨＰ並治癒異常狀態。"
heal_powder:
  names:
    jp_kana: ばんのうごな
    jp_kanji: ばんのうごな
    en: Heal Powder
    fr: Poudre Soin
    it: Polvocura
    de: Heilpuder
    es: Polvo Curación
    ko: 만능가루
    zh_simp: 万能粉
    zh_trad: 萬能粉
  descriptions:
    jp_kana: "とても　にがい　粉薬。\nポケモン　１匹の　状態の\n異常を　すべて　回復する。"
    jp_kanji: "とても　にがい　粉薬。\nポケモン　１匹の　状態の\n異常を　すべて　回復する。"
    en: "A very bitter medicinal powder. It can be used to cure\nany status condition a Pokémon may have."
    fr: "Une poudre médicinale très amère.\nSoigne toutes les altérations de statut d’un Pokémon."
    it: "Rimedio amarissimo in polvere. Cura tutti i problemi\ndi stato di un Pokémon."
    de: "Ein bitteres medizinisches Pulver, das alle\nStatusprobleme eines Pokémon behebt."
    es: "Polvo medicinal muy amargo que cura todos los\nproblemas de estado de un Pokémon."
    ko: "매우 쓴 가루약.\n포켓몬 1마리의\n상태 이상을 모두 회복한다."
    zh_simp: "非常苦的药粉。\n能治愈１只宝可梦的\n所有异常状态。"
    zh_trad: "非常苦的藥粉。\n能治癒１隻寶可夢的\n所有異常狀態。"
health_candy:
  names:
    jp_kana: げんきのアメ
    jp_kanji: げんきのアメ
    en: Health Candy
    fr: Bonbon Santé S
    it: Caramella vitalità S
    de: Energiebonbon
    es: Caramelo Vigor
    ko: 기력의사탕
    zh_simp: 元气糖果
    zh_trad: 元氣糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nポケモンの　たいりょくを　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\nポケモンの　たいりょくを　上げる。"
    en: "A candy that is packed with energy. When given to\na Pokémon, it will increase that Pokémon’s HP."
    fr: "Un bonbon plein d’énergie.\nIl augmente les PV d’un Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta i PS di un Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\ndie KP eines Pokémon."
    es: "Caramelo energético que aumenta los PS máximos del\nPokémon."
    ko: "에너지가 가득한 사탕.\n포켓몬의 HP를 올린다."
    zh_simp: "充满能量的糖果。\n能提高宝可梦的体力。"
    zh_trad: "充滿能量的糖果。\n能提高寶可夢的體力。"
health_candy_l:
  names:
    jp_kana: げんきのアメＬ
    jp_kanji: げんきのアメＬ
    en: Health Candy L
    fr: Bonbon Santé M
    it: Caramella vitalità M
    de: Energiebonbon+
    es: Caramelo Vigor +
    ko: 기력의사탕L
    zh_simp: 元气糖果Ｌ
    zh_trad: 元氣糖果Ｌ
  descriptions:
    jp_kana: "エネルギーの　つまった　大きい　アメ。\nレベル３０　以上の　ポケモンの\nたいりょくを　上げる。"
    jp_kanji: "エネルギーの　つまった　大きい　アメ。\nレベル３０　以上の　ポケモンの\nたいりょくを　上げる。"
    en: "A big candy that is packed with energy. When given to\na Pokémon at Lv. 30 or higher, it will increase\nthat Pokémon’s HP."
    fr: "Un gros bonbon plein d’énergie.\nIl augmente les PV d’un Pokémon de niveau 30\nou supérieur."
    it: "Una caramella grande piena zeppa di energia.\nAumenta i PS di un Pokémon di livello 30 o superiore."
    de: "Ein großes Bonbon, das voller Energie steckt.\nErhöht dauerhaft die KP eines Pokémon ab Level 30."
    es: "Caramelo energético grande que aumenta los PS\nmáximos de un Pokémon de Nv. 30 o superior."
    ko: "에너지가 가득한 큰 사탕.\n레벨 30 이상인 포켓몬의\nHP를 올린다."
    zh_simp: "充满能量的大糖果。\n能让等级３０以上的\n宝可梦的体力上升。"
    zh_trad: "充滿能量的大糖果。\n能提高等級在３０以上的\n寶可夢的體力。"
health_candy_xl:
  names:
    jp_kana: げんきのアメＸＬ
    jp_kanji: げんきのアメＸＬ
    en: Health Candy XL
    fr: Bonbon Santé L
    it: Caramella vitalità L
    de: Energiebonbon++
    es: Caramelo Vigor ++
    ko: 기력의사탕XL
    zh_simp: 元气糖果ＸＬ
    zh_trad: 元氣糖果ＸＬ
  descriptions:
    jp_kana: "エネルギーの　つまった　特大の　アメ。\nレベル６０　以上の　ポケモンの\nたいりょくを　上げる。"
    jp_kanji: "エネルギーの　つまった　特大の　アメ。\nレベル６０　以上の　ポケモンの\nたいりょくを　上げる。"
    en: "A huge candy that is packed with energy. When given\nto a Pokémon at Lv. 60 or higher, it will increase\nthat Pokémon’s HP."
    fr: "Un énorme bonbon plein d’énergie.\nIl augmente les PV d’un Pokémon de niveau 60\nou supérieur."
    it: "Una caramella enorme piena zeppa di energia.\nAumenta i PS di un Pokémon di livello 60 o superiore."
    de: "Ein riesiges Bonbon, das voller Energie steckt.\nErhöht dauerhaft die KP eines Pokémon ab Level 60."
    es: "Caramelo energético enorme que aumenta los PS\nmáximos de un Pokémon de Nv. 60 o superior."
    ko: "에너지가 가득한 매우 큰 사탕.\n레벨 60 이상인 포켓몬의\nHP를 올린다."
    zh_simp: "充满能量的超大糖果。\n能让等级６０以上的\n宝可梦的体力上升。"
    zh_trad: "充滿能量的特大糖果。\n能提高等級在６０以上的\n寶可夢的體力。"
health_feather:
  names:
    jp_kana: たいりょくのハネ
    jp_kanji: たいりょくのハネ
    en: Health Feather
    fr: Plume Santé
    it: Piumsalute
    de: Heilfeder
    es: Pluma Vigor
    ko: 체력깃털
    zh_simp: 体力之羽
    zh_trad: 體力之羽
  descriptions:
    jp_kana: "ポケモンに　使う　道具。\nポケモン　１匹の　ＨＰの\n基礎ポイントを　ちょっと　あげる。"
    jp_kanji: "ポケモンに　使う　道具。\nポケモン　１匹の　ＨＰの\n基礎ポイントを　ちょっと　あげる。"
    en: "An item to be used on a Pokémon. This feather slightly\nincreases base points for a Pokémon’s HP stat."
    fr: "Objet à utiliser sur un Pokémon pour augmenter\nlégèrement ses PV de base."
    it: "Strumento da usare su un Pokémon. Ne aumenta di poco\ni punti base dei PS."
    de: "Wendet man dieses Item auf ein Pokémon an, werden\ndessen KP-Basispunkte dauerhaft ein wenig erhöht."
    es: "Pluma que aumenta un poco los PS de base de un\nPokémon."
    ko: "포켓몬에게 사용하는 도구.\n포켓몬 1마리의 HP\n기초 포인트를 조금 올린다."
    zh_simp: "用于宝可梦的道具。\n能稍微提高１只宝可梦的\nＨＰ的基础点数。"
    zh_trad: "用於寶可夢的道具。\n能稍微提高１隻寶可夢的\nＨＰ的基礎點數。"
health_mochi:
  names:
    jp_kana: たいりょくのもち
    jp_kanji: たいりょくのもち
    en: Health Mochi
    fr: Mochi Santé
    it: Mochi della salute
    de: Heil-Mochi
    es: Mochi Vigor
    ko: 체력떡
    zh_simp: 体力粘糕
    zh_trad: 體力糬
  descriptions:
    jp_kana: "きのみが　ねりこまれた　もち。\nポケモン　１匹の　ＨＰの\n基礎ポイントを　あげる。"
    jp_kanji: "きのみが　ねりこまれた　もち。\nポケモン　１匹の　ＨＰの\n基礎ポイントを　あげる。"
    en: "A mochi cake with Berries kneaded into its dough.\nIt increases base points for a Pokémon’s HP stat."
    fr: "Un mochi contenant des Baies qui augmente\nles PV de base d’un Pokémon."
    it: "Mochi preparato con un impasto a base di bacche.\nAumenta i punti base dei PS."
    de: "Ein mit Beeren gefüllter Mochi, der die KP-Basispunkte\neines Pokémon dauerhaft erhöht."
    es: "La masa de este mochi está preparada con bayas.\nAumenta los PS de base de un Pokémon."
    ko: "으깬 나무열매가 들어 있는 떡.\n포켓몬 1마리의 HP\n기초 포인트를 올린다."
    zh_simp: "糅合树果的粘糕。\n能提高１只宝可梦的\nＨＰ的基础点数。"
    zh_trad: "加入樹果揉製而成的麻糬。\n能提高１隻寶可夢的\nＨＰ的基礎點數。"
heart_scale:
  names:
    jp_kana: ハートのウロコ
    jp_kanji: ハートのウロコ
    en: Heart Scale
    fr: Écaille Cœur
    it: Squama cuore
    de: Herzschuppe
    es: Escama Corazón
    ko: 하트비늘
    zh_simp: 心之鳞片
    zh_trad: 心之鱗片
  descriptions:
    jp_kana: "きれいな　ハートの形の\nとてもめずらしい　ウロコ。\n渡すと　よろこぶ人も　いる。"
    jp_kanji: "きれいな　ハートの形の\nとてもめずらしい　ウロコ。\n渡すと　よろこぶ人も　いる。"
    en: "A pretty, heart-shaped scale that is extremely rare.\nCertain people are delighted to be given one of these."
    fr: "Une écaille très rare et jolie en forme de cœur.\nCertaines personnes sont ravies quand on leur\nen donne une."
    it: "Squama graziosa, a forma di cuore e molto rara.\nAlcune persone sono molto felici di riceverne una."
    de: "Eine hübsche, herzförmige und sehr seltene Schuppe.\nEs gibt Leute, die sich sehr darüber freuen würden,\neine zu erhalten."
    es: "Una bella y rara escama con forma de corazón que más\nde uno apreciará si se la entregas."
    ko: "예쁜 하트 모양의\n무척 진귀한 비늘.\n받으면 좋아하는 사람도 있다."
    zh_simp: "有着美丽心形外形\n且非常珍稀的鳞片。\n有些人收到会很高兴。"
    zh_trad: "有著美麗心形外形\n且非常稀奇的鱗片。\n有些人收到會很高興。"
hearthflame_mask:
  names:
    jp_kana: かまどのめん
    jp_kanji: かまどのめん
    en: Hearthflame Mask
    fr: Masque du Fourneau
    it: Maschera Focolare
    de: Ofenmaske
    es: Máscara Horno
    ko: 화덕의가면
    zh_simp: 火灶面具
    zh_trad: 火灶面具
  descriptions:
    jp_kana: "結晶が　あしらわれた　木彫りの面。\nオーガポンに　持たせると\nほのおタイプを　まとい　戦う。"
    jp_kanji: "結晶が　あしらわれた　木彫りの面。\nオーガポンに　持たせると\nほのおタイプを　まとい　戦う。"
    en: "An item to be held by Ogerpon. This carved wooden\nmask is adorned with crystals and allows Ogerpon to\nwield the Fire type during battle."
    fr: "Un masque en bois orné de cristaux. Si Ogerpon le tient,\nil prend le type Feu lors des combats."
    it: "Una maschera di legno intagliato ornata di cristalli.\nSe data a Ogerpon, gli consente di lottare assumendo\nil tipo Fuoco."
    de: "Ein Item, das von Ogerpon getragen werden kann.\nDurch diese mit Kristallen verzierte, hölzerne Maske\nnimmt es im Kampf den Typ Feuer an."
    es: "Máscara de madera con cristales engarzados. Si la lleva\nOgerpon, le permite adoptar el tipo Fuego para luchar."
    ko: "결정이 장식되어 있는 목각 가면.\n오거폰에게 지니게 하면\n불꽃타입을 두르고 싸울 수 있다."
    zh_simp: "用结晶装饰的木雕面具。\n让厄诡椪携带后，就会用\n火属性覆盖全身进行战斗。"
    zh_trad: "用結晶裝飾的木雕面具。\n讓厄鬼椪攜帶後，戰鬥時\n就會有火屬性附上其身。"
hearty_grains:
  names:
    jp_kana: いきいきイナホ
    jp_kanji: いきいきイナホ
    en: Hearty Grains
    fr: Riz Zélé
    it: Spiga rigogliosa
    de: Munterreis
    es: Espiga Vivaz
    ko: 싱싱이삭
    zh_simp: 旺旺谷
    zh_trad: 旺旺穀
  descriptions:
    jp_kana: "美しく元気なイナホ。\n陸上のポケモンなどの好物で\n投げた場所に引き寄せることができる。"
    jp_kanji: "美しく元気なイナホ。\n陸上のポケモンなどの好物で\n投げた場所に引き寄せることができる。"
    en: "Beautiful stalks of rice bursting with life. Pokémon that\ndwell and wander among the fields love these grains and\nwill gather wherever the stalks are thrown."
    fr: "Un magnifique épi de riz qui semble déborder de vie.\nParticulièrement apprécié des Pokémon terrestres,\nil les attire là où vous le lancez."
    it: "Una magnifica spiga lussureggiante. Molto apprezzata,\ntra gli altri, dai Pokémon campestri, li attira laddove\nviene lanciata."
    de: "Eine schöne Reisähre, die voller Energie steckt. Am\nBoden lebende Pokémon lieben sie besonders und\nlassen sich anlocken, wenn sie ihnen zugeworfen wird."
    es: "Preciosa espiga de arroz que parece rebosar vitalidad.\nAdorada por los Pokémon terrestres, que se verán\natraídos allá donde la lances."
    ko: "예쁘고 싱싱한 이삭.\n육상의 포켓몬들이 좋아해서\n던진 곳으로 유인할 수 있다."
    zh_simp: "美丽且生气勃勃的谷物。\n是陆地上的宝可梦喜爱的食物，\n能吸引它们聚集到投向的地方。"
    zh_trad: "美麗且生氣勃勃的穀物。\n是陸地上的寶可夢喜愛的食物，\n能吸引牠們聚集到投向的地方。"
heat_rock:
  names:
    jp_kana: あついいわ
    jp_kanji: あついいわ
    en: Heat Rock
    fr: Roche Chaude
    it: Rocciacalda
    de: Heißbrocken
    es: Roca Calor
    ko: 뜨거운바위
    zh_simp: 炽热岩石
    zh_trad: 熾熱岩石
  descriptions:
    jp_kana: "持たせた　ポケモンが\n日差しを　強くすると　いつもより\nはれの時間が　長くなる。"
    jp_kanji: "持たせた　ポケモンが\n日差しを　強くすると　いつもより\nはれの時間が　長くなる。"
    en: "An item to be held by a Pokémon. When the holder\nchanges the weather to harsh sunlight, the sunlight will\npersist for longer than usual."
    fr: "Objet à tenir. Prolonge la durée du temps ensoleillé\nquand il est déclenché par le porteur."
    it: "Allunga la durata della luce solare intensa provocata\ndal Pokémon che ha questo strumento."
    de: "Ein Item zum Tragen. Verlängert die Dauer von\nSonnenschein, den der Träger verursacht."
    es: "Prolonga la duración del tiempo soleado provocado por\nel Pokémon que la lleva."
    ko: "지니게 한 포켓몬이\n햇살이 강한 날씨로 만들면 여느 때보다\n쾌청의 지속 시간이 길어진다."
    zh_simp: "携带它的宝可梦让日照变强烈的话，\n晴天的时间就会比平时更长。"
    zh_trad: "攜帶它的寶可夢\n讓日照增強的話，\n晴天的時間就會比平時更長。"
heavy_ball:
  names:
    jp_kana: ヘビーボール
    jp_kanji: ヘビーボール
    en: Heavy Ball
    fr: Masse Ball
    it: Peso Ball
    de: Schwerball
    es: Peso Ball
    ko: 헤비볼
    zh_simp: 沉重球
    zh_trad: 沉重球
  descriptions:
    jp_kana: "体重が重い　ポケモンほど\n捕まえやすくなる\nちょっと変わった　ボール。"
    jp_kanji: "体重が重い　ポケモンほど\n捕まえやすくなる\nちょっと変わった　ボール。"
    en: "A somewhat different Poké Ball that becomes more\neffective the heavier the Pokémon is."
    fr: "Une Poké Ball un peu spéciale qui fonctionne\nd’autant mieux que le Pokémon est lourd."
    it: "Poké Ball un po’ diversa che diventa tanto più efficace\nquanto più pesante è il Pokémon da catturare."
    de: "Ein Ball, mit dem sich Pokémon mit hohem\nKörpergewicht leichter fangen lassen."
    es: "Poké Ball algo distinta a las demás que funciona mejor\ncuanto más pesado sea el Pokémon que se quiere\ncapturar."
    ko: "체중이 무거운 포켓몬일수록\n잡기 쉬워지는\n조금 특이한 볼."
    zh_simp: "有点与众不同的球。\n越是身体沉重的宝可梦\n就越容易捕捉到。"
    zh_trad: "有點與眾不同的球。\n寶可夢的體重越重，\n就越容易捉到。"
heavy_ball:legends:
  names:
    jp_kana: ヘビーボール
    jp_kanji: ヘビーボール
    en: Heavy Ball
    fr: Masse Ball
    it: Peso Ball
    de: Schwerball
    es: Peso Ball
    ko: 헤비볼
    zh_simp: 沉重球
    zh_trad: 沉重球
  descriptions:
    jp_kana: "重たくて飛ばないが\n油断しているポケモンに当てると\n高い捕獲性能を発揮する。"
    jp_kanji: "重たくて飛ばないが\n油断しているポケモンに当てると\n高い捕獲性能を発揮する。"
    en: "A ball that is too heavy to fly high or far, but it is highly\neffective if you manage to hit an unsuspecting Pokémon."
    fr: "Cette Poké Ball est trop lourde pour être lancée au loin,\nmais si elle atteint un Pokémon distrait, le taux de réussite\nest élevé."
    it: "Poké Ball troppo pesante per essere lanciata lontano.\nSe colpisce un Pokémon distratto, però, ha un’alta\nprobabilità di cattura."
    de: "Dieser schwere Ball kann nicht weit fliegen. Dafür ist\ndie Erfolgsquote hoch, wenn er ein unaufmerksames\nPokémon trifft."
    es: "Poké Ball demasiado pesada para lanzarla a largas\ndistancias, aunque tiene un porcentaje muy alto de\néxito si se usa contra un Pokémon distraído."
    ko: "무거워서 잘 날아가지 않지만\n방심하고 있는 포켓몬에게 맞히면\n높은 포획 성능을 발휘한다."
    zh_simp: "沉重而无法远投，但若能\n命中掉以轻心的宝可梦，\n就能发挥强大的捕获能力。"
    zh_trad: "沉重而無法遠投，但若能\n命中掉以輕心的寶可夢，\n就能發揮強大的捕獲能力。"
heavy_ball:recipe:
  names:
    jp_kana: ヘビーボール
    jp_kanji: ヘビーボール
    en: Heavy Ball
    fr: Masse Ball
    it: Peso Ball
    de: Schwerball
    es: Peso Ball
    ko: 헤비볼
    zh_simp: 沉重球
    zh_trad: 沉重球
  descriptions:
    jp_kana: "ヘビーボールのレシピ。　材料は\nぼんぐりのみ×１　くろいろたまいし×１"
    jp_kanji: "ヘビーボールのレシピ。　材料は\nぼんぐりのみ×１　くろいろたまいし×１"
    en: "A recipe for crafting Heavy Balls from scratch.\nRequired materials: 1 Apricorn and 1 Black Tumblestone."
    fr: "Méthode pour Masse Ball. Ressources requises :\n1 Noigrume et 1 Galet Noir."
    it: "Ricetta per creare una Peso Ball. I materiali necessari\nsono 1 Bacca ghicocca e 1 Ciottolo nero."
    de: "Die Anleitung zur Herstellung eines Schwerballs.\nBenötigte Materialien: 1 Aprikoko und\n1 Schwarzglanzstein."
    es: "Receta para crear Peso Balls. Materiales:\n1 Bonguri y 1 Guijarro Negro."
    ko: "헤비볼의 레시피.\n재료: 규토리열매×1 검은옥돌×1"
    zh_simp: "沉重球的材料单。材料是：\n球果果×１　黑玉石×１"
    zh_trad: "沉重球的材料單。材料是：\n球果果×１　黑玉石×１"
heavy_duty_boots:
  names:
    jp_kana: あつぞこブーツ
    jp_kanji: あつぞこブーツ
    en: Heavy-Duty Boots
    fr: Grosses Bottes
    it: Scarponi robusti
    de: Plateauschuhe
    es: Botas Gruesas
    ko: 통굽부츠
    zh_simp: 厚底靴
    zh_trad: 厚底靴
  descriptions:
    jp_kana: "足場に　しかけられた\n罠などの影響を　受けなくなる。"
    jp_kanji: "足場に　しかけられた\n罠などの影響を　受けなくなる。"
    en: "An item to be held by a Pokémon. These boots protect\nthe holder from the effects of traps and the like set on\nthe battlefield."
    fr: "Objet à tenir. Le porteur ne subit plus les effets\ndes pièges ou autres entraves posés sur le terrain."
    it: "Protegge il Pokémon che ce l’ha dagli effetti di trappole\ne di altri ostacoli piazzati ai suoi piedi."
    de: "Der Träger wird nicht mehr durch Fallen und andere\nObjekte beeinträchtigt, die auf dem Boden liegen."
    es: "Anula los efectos de aquello que se coloca a los pies\ndel Pokémon para obstaculizarlo, como las trampas."
    ko: "발밑에 설치된\n함정 등의 영향을 받지 않게 된다."
    zh_simp: 不受脚下陷阱等的影响。
    zh_trad: "攜帶後，將不會受\n腳下的陷阱等所影響。"
helix_fossil:
  names:
    jp_kana: かいのカセキ
    jp_kanji: かいのカセキ
    en: Helix Fossil
    fr: Nautile
    it: Helixfossile
    de: Helixfossil
    es: Fósil Hélix
    ko: 조개화석
    zh_simp: 贝壳化石
    zh_trad: 貝殼化石
  descriptions:
    jp_kana: "大昔　海に　すんでいた\n古代ポケモンの　カセキ。\n貝殻の一部　らしい。"
    jp_kanji: "大昔　海に　すんでいた\n古代ポケモンの　カセキ。\n貝殻の一部　らしい。"
    en: "A fossil from a prehistoric Pokémon that once lived\nin the sea. It might be a piece of a seashell."
    fr: "Le fossile d’un ancien Pokémon aquatique.\nOn dirait un morceau de coquillage."
    it: "Fossile di un Pokémon preistorico che viveva in mare.\nSembra essere parte di una conchiglia."
    de: "Das Fossil eines urzeitlichen Pokémon, das in der Tiefsee\nlebte. Es sieht wie ein Teil einer Muschelschale aus."
    es: "Fósil de un Pokémon prehistórico que vivía en el fondo\ndel mar. Parece ser un fragmento de concha marina."
    ko: "오랜 옛날 바다에 살았던\n고대 포켓몬의 화석.\n조개껍질의 일부인 듯하다."
    zh_simp: "很久以前栖息在海里的\n古代宝可梦的化石。\n好像是贝壳的一部分。"
    zh_trad: "很久以前棲息在海裡的\n古代寶可夢的化石。\n好像是貝殼的一部分。"
heracronite:
  names:
    jp_kana: ヘラクロスナイト
    jp_kanji: ヘラクロスナイト
    en: Heracronite
    fr: Scarhinoïte
    it: Heracrossite
    de: Skarabornit
    es: Heracrossita
    ko: 헤라크로스나이트
    zh_simp: 赫拉克罗斯进化石
    zh_trad: 赫拉克羅斯進化石
  descriptions:
    jp_kana: "ヘラクロスに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    jp_kanji: "ヘラクロスに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Heracross hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Scarhino, elle lui permet de\nméga-évoluer durant un combat."
    it: "Una delle misteriose Megapietre. Data a Heracross,\ngli permette di megaevolversi durante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Skaraborn getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Heracross en combate."
    ko: "헤라크로스에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让赫拉克罗斯携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓赫拉克羅斯攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
heracross_claw:
  names:
    jp_kana: ヘラクロスのツメ
    jp_kanji: ヘラクロスのツメ
    en: Heracross Claw
    fr: Griffe de Scarhino
    it: Artiglio di Heracross
    de: Skaraborn-Kralle
    es: Garra de Heracross
    ko: 헤라크로스의발톱
    zh_simp: 赫拉克罗斯的爪子
    zh_trad: 赫拉克羅斯的爪子
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
herbed_sausage:
  names:
    jp_kana: ハーブソーセージ
    jp_kanji: ハーブソーセージ
    en: Herbed Sausage
    fr: Saucisse aux Herbes
    it: Salsiccia alle erbe
    de: Kräuterwurst
    es: Butifarra
    ko: 허브소시지
    zh_simp: 香草香肠
    zh_trad: 香草香腸
  descriptions:
    jp_kana: "塩味と　苦味が　強い　食材。\n強い塩味と　ハーブの苦味で\nバランスが　楽しい　ソーセージ。"
    jp_kanji: "塩味と　苦味が　強い　食材。\n強い塩味と　ハーブの苦味で\nバランスが　楽しい　ソーセージ。"
    en: "A very salty and bitter ingredient. The balance between\nthe potent saltiness and the herbs’ bitterness make this\nsausage a pleasure."
    fr: "Un ingrédient au goût très salé et amer. Cette saucisse\nmaintient un équilibre délicat entre la forte saveur salée\net l’amertume des herbes."
    it: "Un ingrediente molto salato e amaro. Il gusto molto\nsalato della salsiccia viene controbilanciato dalle note\namare delle erbe."
    de: "Bei dieser sehr salzigen und bitteren Zutat kommt alles\nauf die Balance zwischen den beiden Aromen an."
    es: "El equilibrio entre el sabor salado de la carne y el\namargo de los condimentos que lleva dentro hace de\neste un embutido muy interesante al paladar."
    ko: "짠맛과 쓴맛이 강한 식재료.\n강한 짠맛과 허브의 쓴맛으로\n재미있는 밸런스를 이룬 소시지다."
    zh_simp: "咸味和苦味强烈的食材。\n极强的咸味和香草的苦味\n相互平衡讨人喜爱。"
    zh_trad: "鹹味和苦味強勁的食材。\n強勁的鹹味和香草的苦味之拿捏\n使品嚐這種香腸成為一種樂趣。"
heroic_sword_pick:
  names:
    jp_kana: ゆうしゃのけんピック
    jp_kanji: ゆうしゃのけんピック
    en: Heroic Sword Pick
    fr: Pique Épée du Héros
    it: Stecchino spadone
    de: Heldenschwert-Pikser
    es: Palillo Heroico
    ko: 용사의 검 픽
    zh_simp: 勇者之剑三明治签
    zh_trad: 勇者之劍三明治籤
  descriptions:
    jp_kana: "かっこよさを　追求した　ピック。\n食べたあとに　伝説の勇者ごっこが　できる。\n観光地の　お土産屋に　何故か　売っている。"
    jp_kanji: "かっこよさを　追求した　ピック。\n食べたあとに　伝説の勇者ごっこが　できる。\n観光地の　お土産屋に　何故か　売っている。"
    en: "A pick made to be the coolest. Once you’ve eaten, you\ncan pretend you’re a hero of legend. Souvenir shops at\ntourist spots sell these for some reason."
    fr: "Une pique pour les gens qui savent ce qui est cool.\nPermet de se prendre pour un héros de légende après\navoir mangé. Fréquente dans les magasins de souvenirs."
    it: "Stecchino per veri duri. Dopo mangiato si può giocare\nall’eroe leggendario. Sorprende un po’ vederlo nei\nnegozi di souvenir di luoghi turistici."
    de: "Ein Pikser, um Eindruck zu schinden. Nach dem Essen\nkann man damit in die Rolle eines Helden schlüpfen.\nSouvenirläden führen ihn seltsamerweise im Angebot."
    es: "Diseñado para impresionar, suele encontrarse en las\ntiendas de recuerdos para turistas. Tras comer, se puede\nusar para jugar a ser un héroe de leyenda."
    ko: "멋을 추구하는 픽.\n다 먹고 나면 전설의 용사 놀이를 할 수 있다.\n어째선지 관광지의 기념품 매장에서 팔고 있다."
    zh_simp: "追求帅气的签子。餐后能用来装\n传说中的勇者来玩游戏。不知为何\n会在观光胜地的特产店中贩卖。"
    zh_trad: "展現對帥氣之追求的小籤。\n吃完後能用它充當起傳說中的勇者。\n觀光地的特產店很神奇地會販售這種產品。"
hi_tech_earbuds:
  names:
    jp_kana: すごいみみせん
    jp_kanji: すごいみみせん
    en: Hi-tech Earbuds
    fr: Bouchons Audio
    it: Supertappi
    de: Top-Ohrenstöpsel
    es: Supertapones
    ko: 대단한귀마개
    zh_simp: 厉害耳塞
    zh_trad: 厲害耳塞
  descriptions:
    jp_kana: "さまざまな　音のボリュームを\n自由自在に　コントロール　できる\n不思議で　すごいみみせん。"
    jp_kanji: "さまざまな　音のボリュームを\n自由自在に　コントロール　できる\n不思議で　すごいみみせん。"
    en: "Strange earbuds that allow you to freely control the\nvolume of various sounds."
    fr: "Cet objet incroyable permet de contrôler librement\nle volume sonore de divers éléments."
    it: "Tappi per le orecchie misteriosi che permettono\na chi li indossa di regolare a proprio piacimento\nil volume di diversi suoni."
    de: "Mit diesen rätselhaften Ohrenstöpseln kann man die\nLautstärke verschiedener Geräuschquellen regulieren."
    es: "Curiosos auriculares que permiten ajustar de forma\nindependiente el volumen de distintos elementos\nsonoros."
    ko: "다양한 소리의 볼륨을\n자유자재로 조절할 수 있는\n신기하고 대단한 귀마개."
    zh_simp: "这个神奇又厉害的耳塞\n可以自由调节各种声音的音量。"
    zh_trad: "神奇又厲害的耳塞。\n可以自由調節各種聲音的音量。"
hippopotas_sand:
  names:
    jp_kana: ヒポポタスのすな
    jp_kanji: ヒポポタスのすな
    en: Hippopotas Sand
    fr: Sable d’Hippopotas
    it: Sabbia di Hippopotas
    de: Hippopotas-Sand
    es: Arena de Hippopotas
    ko: 히포포타스의모래
    zh_simp: 沙河马的沙
    zh_trad: 沙河馬的沙
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
