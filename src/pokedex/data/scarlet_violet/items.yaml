    en: "A pick designed after Eevee, sporting the Pokémon’s\nsmiling face. It’s easy to grab by the ears, which is part\nof why it’s so popular."
    fr: "Une pique ornée du visage souriant d’un Évoli.\nUne des raisons de sa popularité vient de ses oreilles,\npar lesquelles on peut la tenir facilement."
    it: "Stecchino a forma di Eevee con espressione sorridente.\nLe orecchie offrono una facile presa, contribuendo alla\nsua popolarità."
    de: "Ein Pikser im Design von Evoli mit einem kichernden\nAugenzwinkern. Die praktische Handhabung dank der\nprägnanten Ohren ist mit ein Grund für seine Beliebtheit."
    es: "Un palillo con forma de Eevee muy sonriente. El secreto\nde su popularidad reside en lo fácil de agarrar que\nresulta gracias a las orejitas."
    ko: "이브이 디자인이 들어간 픽.\n방긋 웃는 표정이 프린트되어 있다.\n귀 부분이 잡기 편한 것 역시 인기의 비결이다."
    zh_simp: "设计成伊布的签子。\n印着伊布露出笑脸的模样。耳朵部分\n方便易拿也是其受欢迎的秘密。"
    zh_trad: "設計成伊布造型的小籤。\n籤上印著牠露出笑臉的模樣。\n容易拿取的耳朵也是其廣受歡迎的原因之一。"
smoke_ball:
  names:
    jp_kana: けむりだま
    jp_kanji: けむりだま
    en: Smoke Ball
    fr: Boule Fumée
    it: Palla fumo
    de: Rauchball
    es: Bola de Humo
    ko: 연막탄
    zh_simp: 烟雾球
    zh_trad: 煙霧球
  descriptions:
    jp_kana: "持たせたポケモンは\n野生のポケモンとの　戦闘から\n絶対に　逃げられる。"
    jp_kanji: "持たせたポケモンは\n野生のポケモンとの　戦闘から\n絶対に　逃げられる。"
    en: "An item to be held by a Pokémon. It enables the holder\nto flee from any wild Pokémon encounter without fail."
    fr: "Objet à tenir. Permet au porteur de s’enfuir à coup sûr\nface à un Pokémon sauvage."
    it: "Strumento da dare a un Pokémon. Permette di fuggire\ncon successo da un Pokémon selvatico."
    de: "Ein Item zum Tragen. Es ermöglicht die garantierte Flucht\naus dem Kampf mit einem wilden Pokémon."
    es: "Permite huir siempre de combates contra Pokémon\nsalvajes. Debe llevarla un Pokémon."
    ko: "지니게 한 포켓몬은\n야생 포켓몬과의 배틀에서\n반드시 도망칠 수 있다."
    zh_simp: "携带它的宝可梦在和\n野生宝可梦的战斗中\n绝对可以逃走。"
    zh_trad: "攜帶它的寶可夢在和\n野生寶可夢的戰鬥中\n絕對可以逃走。"
smoke_bomb:
  names:
    jp_kana: めかくしだま
    jp_kanji: めかくしだま
    en: Smoke Bomb
    fr: Bombe Aveuglante
    it: Palla orba
    de: Rauchkugel
    es: Bola Humareda
    ko: 눈속임환
    zh_simp: 烟弹
    zh_trad: 煙彈
  descriptions:
    jp_kana: "地面に投げつけると　飛び散った\n細かい粉末が周囲の視界をさえぎり\nポケモンに気づかれなくなる。"
    jp_kanji: "地面に投げつけると　飛び散った\n細かい粉末が周囲の視界をさえぎり\nポケモンに気づかれなくなる。"
    en: "When thrown at the ground, these balls produce a cloud\nof fine powder that will reduce visibility in the area and\nkeep wild Pokémon from noticing you."
    fr: "Lorsqu’on la lance au sol, elle libère une fine poudre\nqui réduit la visibilité et permet d’échapper à l’attention\ndes Pokémon situés à proximité."
    it: "Se lanciata a terra, libera una polvere sottile che riduce\nla visibilità e permette di non farsi notare dai Pokémon."
    de: "Wirfst du sie auf den Boden, wird ein rauchähnliches\nfeines Pulver verstreut, das die Sicht einschränkt und\nPokémon daran hindert, dich zu bemerken."
    es: "Expulsa una fina polvareda a su alrededor tras lanzarla\ncontra el suelo y reduce la visibilidad, de forma que los\nPokémon salvajes no se percatan de tu presencia."
    ko: "땅에 던지면 고운 가루가 흩어져서\n주위의 시야를 차단하고\n포켓몬에게 들키지 않게 된다."
    zh_simp: "丢向地面后，飞散的细粉\n会遮蔽周围的视野，\n让自己不会被宝可梦察觉。"
    zh_trad: "丟向地面後，飛散的細粉\n會遮蔽周圍的視野，\n讓自己不會被寶可夢察覺。"
smoke_bomb:recipe:
  names:
    jp_kana: めかくしだま
    jp_kanji: めかくしだま
    en: Smoke Bomb
    fr: Bombe Aveuglante
    it: Palla orba
    de: Rauchkugel
    es: Bola Humareda
    ko: 눈속임환
    zh_simp: 烟弹
    zh_trad: 煙彈
  descriptions:
    jp_kana: "めかくしだまのレシピ。　材料は\nケムリイモ×１　タマゼンマイ×１"
    jp_kanji: "めかくしだまのレシピ。　材料は\nケムリイモ×１　タマゼンマイ×１"
    en: "A recipe for crafting Smoke Bombs from scratch.\nRequired materials: 1 Caster Fern leaf and\n1 Sootfoot Root."
    fr: "Méthode pour Bombe Aveuglante. Ressources requises :\n1 Rutabagaz et 1 Feuille Ronde."
    it: "Ricetta per creare una Palla orba. I materiali necessari\nsono 1 Patata fumosa e 1 Felcetonda."
    de: "Die Anleitung zur Herstellung einer Rauchkugel.\nBenötigte Materialien: 1 Rauchknolle und 1 Rundblatt."
    es: "Receta para crear Bolas Humareda. Materiales:\n1 Fumibulbo y 1 Helecho Rizado."
    ko: "눈속임환의 레시피.\n재료: 연기토란×1 둥근고비×1"
    zh_simp: "烟弹的材料单。材料是：\n烟芋×１　弹子萁×１"
    zh_trad: "煙彈的材料單。材料是：\n煙芋×１　彈子萁×１"
smoke_poke_tail:
  names:
    jp_kana: しっぽのくんせい
    jp_kanji: しっぽのくんせい
    en: Smoke-Poke Tail
    fr: Queue Fumée
    it: Coda affumicata
    de: Röstrute
    es: Cola Ahumada
    ko: 꼬리훈제
    zh_simp: 烟熏尾巴
    zh_trad: 煙燻尾巴
  descriptions:
    jp_kana: "キャンプの　料理に　使う\n食材の　一種。ポケモン　ヤドンの\nしっぽは　抜けても　すぐ　生えかわる。"
    jp_kanji: "キャンプの　料理に　使う\n食材の　一種。ポケモン　ヤドンの\nしっぽは　抜けても　すぐ　生えかわる。"
    en: "One of the many ingredients that can be used for\ncooking at your camp. When a Slowpoke’s tail falls off,\nit grows back quickly."
    fr: "Un ingrédient de cuisine pour le camping.\nLorsque la queue d’un Ramoloss tombe,\nelle repousse tout de suite."
    it: "Uno degli ingredienti che puoi usare per cucinare\nin campeggio. Quando la coda degli Slowpoke\nsi stacca, ricresce subito dopo."
    de: "Eine Zutat für PokéCamping-Mahlzeiten. Flegmon-Ruten\nwachsen sofort wieder nach, wenn sie abfallen."
    es: "Un ingrediente para cocinar en el campamento. Las\ncolas de Slowpoke siempre vuelven a crecer al poco\nde desprenderse."
    ko: "캠프 요리에 사용되는\n식재료 중 하나. 포켓몬 야돈의\n꼬리는 떨어져도 금방 새로 자란다."
    zh_simp: "在露营营地制作料理时会使用的\n一种食材。宝可梦呆呆兽的尾巴\n就算断掉也会很快长出新的。"
    zh_trad: "製作露營料理時使用的食材之一。\n寶可夢呆呆獸的尾巴，\n就算掉了也會馬上長回來。"
smoked_fillet:
  names:
    jp_kana: スモークきりみ
    jp_kanji: スモークきりみ
    en: Smoked Fillet
    fr: Filet Fumé
    it: Filetto affumicato
    de: Räucherfilet
    es: Filete Ahumado
    ko: 훈제토막
    zh_simp: 烟熏鱼片
    zh_trad: 煙燻魚片
  descriptions:
    jp_kana: "塩味と　苦味が　強い　食材。\n燻製による　独特の風味が　ある。\n特に　野菜類との　相性が　よい。"
    jp_kanji: "塩味と　苦味が　強い　食材。\n燻製による　独特の風味が　ある。\n特に　野菜類との　相性が　よい。"
    en: "A very salty and bitter ingredient with that unmistakable\nsmoky flavor. It pairs exceptionally well with veggies."
    fr: "Un ingrédient au goût très salé et amer. C’est grâce à\nun processus de fumaison qu’on obtient ce goût unique\nqui s’accorde si bien avec les légumes."
    it: "Un ingrediente molto salato e amaro. L’affumicatura\ngli conferisce un sapore caratteristico che si abbina bene\nin particolare con le verdure."
    de: "Der Räuchervorgang verleiht dieser sehr salzigen sowie\nbitteren Zutat ein charakteristisches Aroma. Sie passt\nhervorragend zu allerlei Gemüsesorten."
    es: "El ahumado aporta un aroma especial a este ingrediente\nya de por sí muy salado y amargo. Casa muy bien con\ntodo tipo de verduras."
    ko: "짠맛과 쓴맛이 강한 식재료.\n훈제 특유의 독특한 풍미가 난다.\n특히 채소 종류와 궁합이 잘 맞는다."
    zh_simp: "咸味和苦味强烈的食材。\n带有通过熏制得到的独特风味，\n与蔬菜类食材特别搭配。"
    zh_trad: "鹹味和苦味強勁的食材。\n帶有煙燻過後的獨特風味。\n和蔬菜類特別搭配。"
smoliv_oil:
  names:
    jp_kana: ミニーブのオイル
    jp_kanji: ミニーブのオイル
    en: Smoliv Oil
    fr: Huile d’Olivini
    it: Olio di Smoliv
    de: Olini-Öl
    es: Aceite de Smoliv
    ko: 미니브의오일
    zh_simp: 迷你芙的油
    zh_trad: 迷你芙的油
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
smooth_rock:
  names:
    jp_kana: さらさらいわ
    jp_kanji: さらさらいわ
    en: Smooth Rock
    fr: Roche Lisse
    it: Roccialiscia
    de: Glattbrocken
    es: Roca Suave
    ko: 보송보송바위
    zh_simp: 沙沙岩石
    zh_trad: 沙沙岩石
  descriptions:
    jp_kana: "持たせたポケモンが\nすなあらしを　起こすと　いつもより\nすなあらしの時間が　長くなる。"
    jp_kanji: "持たせたポケモンが\nすなあらしを　起こすと　いつもより\nすなあらしの時間が　長くなる。"
    en: "An item to be held by a Pokémon. When the holder\nchanges the weather to a sandstorm, the storm will\npersist for longer than usual."
    fr: "Objet à tenir. Prolonge la durée d’une tempête de sable\nquand elle est déclenchée par le porteur."
    it: "Allunga la durata della tempesta di sabbia provocata\ndal Pokémon che ha questo strumento."
    de: "Ein Item zum Tragen. Verlängert die Dauer von\nSandstürmen, die der Träger verursacht."
    es: "Prolonga la duración de las tormentas de arena\nprovocadas por el Pokémon que la lleva."
    ko: "지니게 한 포켓몬이\n날씨를 모래바람으로 만들면 여느 때보다\n모래바람의 지속 시간이 길어진다."
    zh_simp: "携带它的宝可梦刮起沙暴的话，\n沙暴的时间就会比平时更长。"
    zh_trad: "攜帶它的寶可夢\n刮起沙暴的話，\n沙暴的時間就會比平時更長。"
sneasel_claw:
  names:
    jp_kana: ニューラのツメ
    jp_kanji: ニューラのツメ
    en: Sneasel Claw
    fr: Griffe de Farfuret
    it: Artiglio di Sneasel
    de: Sniebel-Kralle
    es: Garra de Sneasel
    ko: 포푸니의손톱
    zh_simp: 狃拉的爪子
    zh_trad: 狃拉的爪子
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
snom_thread:
  names:
    jp_kana: ユキハミのいと
    jp_kanji: ユキハミのいと
    en: Snom Thread
    fr: Fil de Frissonille
    it: Filo di Snom
    de: Snomnom-Faden
    es: Hilo de Snom
    ko: 누니머기의실
    zh_simp: 雪吞虫的丝
    zh_trad: 雪吞蟲的絲
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
snorlax_candy:
  names:
    jp_kana: カビゴンのアメ
    jp_kanji: カビゴンのアメ
    en: Snorlax Candy
    fr: Bonbon Ronflex
    it: Caramella Snorlax
    de: Relaxo-Bonbon
    es: Caramelo Snorlax
    ko: 잠만보의사탕
    zh_simp: 卡比兽的糖果
    zh_trad: 卡比獸的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de cierto Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
snorlium_z:bag:
  names:
    jp_kana: カビゴンＺ
    jp_kanji: カビゴンＺ
    en: Snorlium Z
    fr: Ronflézélite
    it: Snorlactium Z
    de: Relaxonium Z
    es: Snorlastal Z
    ko: 잠만보Z
    zh_simp: 卡比兽Ｚ
    zh_trad: 卡比獸Ｚ
  descriptions:
    jp_kana: "カビゴンの　ギガインパクトを\n特別な　Ｚワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    jp_kanji: "カビゴンの　ギガインパクトを\n特別な　Ｚワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nSnorlax’s Giga Impact to a Z-Move."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise le Ronflex qui le tient à transformer\nsa capacité Giga Impact en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono a Snorlax di trasformare la mossa\nGigaimpatto in una mossa Z."
    de: "Kristallisierte Z-Kraft, die Relaxos Attacke\nGigastoß zu einer Z-Attacke aufstuft.\nWird bei Bedarf automatisch vervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a\nSnorlax convertir su Gigaimpacto en un movimiento Z."
    ko: "잠만보의 기가임팩트를\n특별한 Z기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将卡比兽的终极冲击\n升级成特殊Ｚ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把卡比獸的終極衝擊\n升級為特殊Ｚ招式的Ｚ力量結晶。"
snorlium_z:held:
  names:
    jp_kana: カビゴンＺ
    jp_kanji: カビゴンＺ
    en: Snorlium Z
    fr: Ronflézélite
    it: Snorlactium Z
    de: Relaxonium Z
    es: Snorlastal Z
    ko: 잠만보Z
    zh_simp: 卡比兽Ｚ
    zh_trad: 卡比獸Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　結晶。\nカビゴンの　ギガインパクトを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nカビゴンの　ギガインパクトを\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Snorlax’s Giga Impact to a Z-Move."
    fr: "Une cristallisation de la Force Z, permettant de\ntransformer la capacité Giga Impact d’un Ronflex\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare la mossa Gigaimpatto\ndi Snorlax in una mossa Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft Relaxos\nAttacke Gigastoß zu einer Z-Attacke auf."
    es: "Cristal que confiere el Poder Z al movimiento\nGigaimpacto de Snorlax."
