    zh_simp: 奈克洛索尔合体器
    zh_trad: 奈克洛索爾合體器
  descriptions:
    jp_kana: "光を　必要と　していた\nネクロズマと　ソルガレオを\n分離　させるための　マシン。"
    jp_kanji: "光を　必要と　していた\nネクロズマと　ソルガレオを\n分離　させるための　マシン。"
    en: "A machine to separate Necrozma, which needed\nlight, from Solgaleo."
    fr: "Un appareil permettant d’annuler la fusion\nd’un Necrozma assoiffé de lumière avec Solgaleo."
    it: "Dispositivo che permette a Necrozma di separarsi\nda Solgaleo quando non necessita più di luce."
    de: "Necrozma, das Licht benötigte, kann mithilfe dieser\nMaschine wieder von Solgaleo getrennt werden."
    es: "Artefacto que permite separar a Necrozma, ávido\nde luz, tras su fusión con Solgaleo."
    ko: "빛을 필요로 했던\n네크로즈마와 솔가레오를\n분리시키기 위한 머신."
    zh_simp: "用来让曾需求过光的奈克洛兹玛和\n索尔迦雷欧分离的机器。"
    zh_trad: "用來讓需要光的奈克洛茲瑪和\n索爾迦雷歐分離的機器。"
nacli_salt:
  names:
    jp_kana: コジオのしお
    jp_kanji: コジオのしお
    en: Nacli Salt
    fr: Sel de Selutin
    it: Sale di Nacli
    de: Geosali-Salz
    es: Sal de Nacli
    ko: 베베솔트의소금
    zh_simp: 盐石宝的盐
    zh_trad: 鹽石寶的鹽
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
naive_mint:
  names:
    jp_kana: むじゃきミント
    jp_kanji: むじゃきミント
    en: Naive Mint
    fr: Aromate Naïf
    it: Menta Ingenua
    de: Naiv-Minze
    es: Menta Ingenua
    ko: 천진난만민트
    zh_simp: 天真薄荷
    zh_trad: 天真薄荷
  descriptions:
    jp_kana: "ポケモンに　香りを　かがせると\n素早さが　上がりやすく　なるが\n特防は　上がりにくくなる　ミント。"
    jp_kanji: "ポケモンに　香りを　かがせると\n素早さが　上がりやすく　なるが\n特防は　上がりにくくなる　ミント。"
    en: "Having a Pokémon smell this mint can make its Speed\nstat grow stronger. However, its Sp. Def stat may suffer."
    fr: "Si un Pokémon hume cet aromate, sa Vitesse\nmontera plus facilement, mais sa Défense Spéciale\nse développera plus lentement."
    it: "Quando un Pokémon ne sente il profumo, la sua Velocità\naumenta più facilmente a scapito della Difesa Speciale."
    de: "Lässt man ein Pokémon an dieser Minze schnuppern,\nsteigt seine Initiative schneller, aber seine\nSpezial-Verteidigung umso langsamer."
    es: "Cuando un Pokémon percibe su aroma, aumenta\ncon más facilidad su Velocidad, en detrimento de su\nDefensa Especial."
    ko: "포켓몬에게 향기를 맡게 하면\n스피드가 오르기 쉬워지지만\n특수방어가 오르기 어려워지는 민트."
    zh_simp: "宝可梦闻了这种薄荷之后，\n会令速度容易提高，\n而特防则难以提高。"
    zh_trad: "讓寶可夢聞這種薄荷的氣味，\n會令速度變得容易提高，\n但特防則難以提高。"
nanab_berry:
  names:
    jp_kana: ナナのみ
    jp_kanji: ナナのみ
    en: Nanab Berry
    fr: Baie Nanab
    it: Baccabana
    de: Nanabbeere
    es: Baya Latano
    ko: 나나열매
    zh_simp: 蕉香果
    zh_trad: 蕉香果
  descriptions:
    jp_kana: "かわいさに　磨きを　かけるための\nポロックを　作るとき　使われる。\n桃色の実は　食べると　甘い。"
    jp_kanji: "かわいさに　磨きを　かけるための\nポロックを　作るとき　使われる。\n桃色の実は　食べると　甘い。"
    en: "Used to make Pokéblocks that will enhance Cuteness.\nIts pink flesh is sweet if eaten."
    fr: "Une Baie rose au goût sucré, utilisée pour préparer\ndes Pokéblocs permettant d’augmenter la Grâce\nd’un Pokémon."
    it: "Bacca rosa dal sapore dolce usata per creare\nPokémelle che aumentano la Grazia del Pokémon."
    de: "Eine Beerensorte, die als Zutat für Pokériegel\nverwendet wird, welche die Putzigkeit erhöhen.\nIhr rosa Fruchtfleisch schmeckt süßlich."
    es: "Se utiliza en la producción de Pokécubos que potencian\nla dulzura. Es de color rosa y sabor dulce."
    ko: "귀여움을 연마하기 위한\n포켓몬스넥을 만들 때 사용된다.\n담홍색 열매는 먹으면 달다."
    zh_simp: "用于制作宝可方块，\n制作出来的宝可方块可用来打磨可爱。\n粉红色的果实尝起来是甜的。"
    zh_trad: "製作用於增進可愛的\n寶可方塊時使用。\n粉紅色的果實嘗起來是甜的。"
naughty_mint:
  names:
    jp_kana: やんちゃミント
    jp_kanji: やんちゃミント
    en: Naughty Mint
    fr: Aromate Mauvais
    it: Menta Birbona
    de: Frech-Minze
    es: Menta Pícara
    ko: 개구쟁이민트
    zh_simp: 顽皮薄荷
    zh_trad: 頑皮薄荷
  descriptions:
    jp_kana: "ポケモンに　香りを　かがせると\n攻撃が　上がりやすく　なるが\n特防は　上がりにくくなる　ミント。"
    jp_kanji: "ポケモンに　香りを　かがせると\n攻撃が　上がりやすく　なるが\n特防は　上がりにくくなる　ミント。"
    en: "Having a Pokémon smell this mint can make its Attack\nstat grow stronger. However, its Sp. Def stat may suffer."
    fr: "Si un Pokémon hume cet aromate, son Attaque\nmontera plus facilement, mais sa Défense Spéciale\nse développera plus lentement."
    it: "Quando un Pokémon ne sente il profumo, il suo Attacco\naumenta più facilmente a scapito della Difesa Speciale."
    de: "Lässt man ein Pokémon an dieser Minze schnuppern,\nsteigt sein Angriff schneller, aber seine\nSpezial-Verteidigung umso langsamer."
    es: "Cuando un Pokémon percibe su aroma, aumenta con\nmás facilidad su Ataque, en detrimento de su Defensa\nEspecial."
    ko: "포켓몬에게 향기를 맡게 하면\n공격이 오르기 쉬워지지만\n특수방어가 오르기 어려워지는 민트."
    zh_simp: "宝可梦闻了这种薄荷之后，\n会令攻击容易提高，\n而特防则难以提高。"
    zh_trad: "讓寶可夢聞這種薄荷的氣味，\n會令攻擊變得容易提高，\n但特防則難以提高。"
necrozma_treat:
  names:
    jp_kana: ネクロズマのおやつ
    jp_kanji: ネクロズマのおやつ
    en: Necrozma Treat
    fr: Friandise Necrozma
    it: Spuntino per Necrozma
    de: Necrozma-Snack
    es: Galleta Necrozma
    ko: 네크로즈마의간식
    zh_simp: 奈克洛兹玛的点心
    zh_trad: 奈克洛茲瑪的點心
  descriptions:
    jp_kana: "伝説のポケモン　ネクロズマが\n好む食材で　作られた　おやつ。"
    jp_kanji: "伝説のポケモン　ネクロズマが\n好む食材で　作られた　おやつ。"
    en: "A snack made from ingredients favored by the\nLegendary Pokémon Necrozma."
    fr: "Une friandise préparée avec les ingrédients favoris\ndu Pokémon légendaire Necrozma."
    it: "Uno spuntino fatto con gli ingredienti preferiti\ndal Pokémon leggendario Necrozma."
    de: "Dieser Snack wurde mit den Lieblingszutaten des\nLegendären Pokémon Necrozma zubereitet."
    es: "Galleta preparada con los ingredientes favoritos\ndel Pokémon legendario Necrozma."
    ko: "전설의 포켓몬 네크로즈마가\n좋아하는 식재료로 만들어진 간식."
    zh_simp: "用传说的宝可梦奈克洛兹玛\n喜欢的食材制作的点心。"
    zh_trad: "用傳說的寶可夢奈克洛茲瑪\n喜愛的食材製成的點心。"
nest_ball:
  names:
    jp_kana: ネストボール
    jp_kanji: ネストボール
    en: Nest Ball
    fr: Faiblo Ball
    it: Minor Ball
    de: Nestball
    es: Nido Ball
    ko: 네스트볼
    zh_simp: 巢穴球
    zh_trad: 巢穴球
  descriptions:
    jp_kana: "捕まえる　野生のポケモンが\n弱いほど　捕まえやすくなる\nちょっと変わった　ボール。"
    jp_kanji: "捕まえる　野生のポケモンが\n弱いほど　捕まえやすくなる\nちょっと変わった　ボール。"
    en: "A somewhat different Poké Ball that becomes more\neffective the lower the level of the wild Pokémon."
    fr: "Une Poké Ball un peu spéciale qui fonctionne\nparticulièrement bien sur les Pokémon les plus faibles."
    it: "Poké Ball un po’ diversa che diventa tanto più efficace\nquanto più è basso il livello del Pokémon selvatico\nda catturare."
    de: "Ein Ball, mit dem sich Pokémon niedrigen Levels leichter\nfangen lassen."
    es: "Poké Ball algo distinta a las demás que funciona\nespecialmente bien con los Pokémon salvajes de nivel\nbajo."
    ko: "잡으려는 야생 포켓몬이\n약할수록 잡기 쉬운\n조금 특이한 볼."
    zh_simp: "有点与众不同的球。\n捕捉的野生宝可梦越弱，\n就会越容易捕捉。"
    zh_trad: "有點與眾不同的球。\n捕捉的野生寶可夢越弱，\n就越容易捉到。"
net_ball:
  names:
    jp_kana: ネットボール
    jp_kanji: ネットボール
    en: Net Ball
    fr: Filet Ball
    it: Rete Ball
    de: Netzball
    es: Malla Ball
    ko: 네트볼
    zh_simp: 捕网球
    zh_trad: 捕網球
  descriptions:
    jp_kana: "みずタイプと　むしタイプの\nポケモンが　捕まえやすくなる\nちょっと変わった　ボール。"
    jp_kanji: "みずタイプと　むしタイプの\nポケモンが　捕まえやすくなる\nちょっと変わった　ボール。"
    en: "A somewhat different Poké Ball that is more effective\nwhen catching Water- or Bug-type Pokémon."
    fr: "Une Poké Ball un peu spéciale qui fonctionne\nparticulièrement bien sur les Pokémon Eau ou Insecte."
    it: "Poké Ball un po’ diversa. Risulta particolarmente\nefficace sui Pokémon di tipo Acqua e Coleottero."
    de: "Ein Ball, mit dem sich Wasser- und Käfer-Pokémon\nleichter fangen lassen."
    es: "Poké Ball algo distinta a las demás que funciona\nespecialmente bien con los Pokémon de tipo Agua\ny Bicho."
    ko: "물타입과 벌레타입의\n포켓몬을 잡기 쉬운\n조금 특이한 볼."
    zh_simp: "有点与众不同的球。\n能很容易地捕捉\n水属性和虫属性的宝可梦。"
    zh_trad: "有點與眾不同的球。\n能更容易地捉到\n水屬性和蟲屬性寶可夢。"
never_melt_ice:
  names:
    jp_kana: とけないこおり
    jp_kanji: とけないこおり
    en: Never-Melt Ice
    fr: Glace Éternelle
    it: Gelomai
    de: Ewiges Eis
    es: Antiderretir
    ko: 녹지않는얼음
    zh_simp: 不融冰
    zh_trad: 不融冰
  descriptions:
    jp_kana: "熱を　よせつけない　氷。\n持たせると　こおりタイプの\n技の威力が　あがる。"
    jp_kanji: "熱を　よせつけない　氷。\n持たせると　こおりタイプの\n技の威力が　あがる。"
    en: "An item to be held by a Pokémon. It’s a heat-repelling\npiece of ice that boosts the power of the holder’s Ice-\ntype moves."
    fr: "Objet à tenir. Un morceau de glace qui réfléchit\nla chaleur et augmente la puissance des capacités\nde type Glace."
    it: "Strumento da dare a un Pokémon. Pezzo di ghiaccio\nche respinge il calore e potenzia le mosse\ndi tipo Ghiaccio."
    de: "Ein Item zum Tragen. Ein Stück Eis, das Hitze fernhält\nund Attacken vom Typ Eis verstärkt."
    es: "Fragmento de hielo que repele el calor y potencia los\nmovimientos de tipo Hielo. Debe llevarlo un Pokémon."
    ko: "열을 가까이하지 않게 하는 얼음.\n지니게 하면 얼음타입\n기술의 위력이 올라간다."
    zh_simp: "能隔绝热量的冰。\n携带后，冰属性的\n招式威力就会提高。"
    zh_trad: "隔絕熱的冰。\n攜帶後，冰屬性的\n招式威力就會提高。"
nidoran_f_candy:
  names:
    jp_kana: ニドラン♀のアメ
    jp_kanji: ニドラン♀のアメ
    en: Nidoran♀ Candy
    fr: Bonbon Nidoran♀
    it: Caramella Nidoran♀
    de: Nidoran♀-Bonbon
    es: Caramelo Nidoran♀
    ko: 니드런♀의사탕
    zh_simp: 尼多兰的糖果
    zh_trad: 尼多蘭的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
nidoran_m_candy:
  names:
    jp_kana: ニドラン♂のアメ
    jp_kanji: ニドラン♂のアメ
    en: Nidoran♂ Candy
    fr: Bonbon Nidoran♂
    it: Caramella Nidoran♂
    de: Nidoran♂-Bonbon
    es: Caramelo Nidoran♂
    ko: 니드런♂의사탕
    zh_simp: 尼多朗的糖果
    zh_trad: 尼多朗的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
noibat_fur:
  names:
    jp_kana: オンバットのけ
    jp_kanji: オンバットのけ
    en: Noibat Fur
    fr: Poils de Sonistrelle
    it: Pelo di Noibat
    de: eF-eM-Haar
    es: Pelo de Noibat
    ko: 음뱃의털
    zh_simp: 嗡蝠的毛
    zh_trad: 嗡蝠的毛
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
nomel_berry:
  names:
    jp_kana: ノメルのみ
    jp_kanji: ノメルのみ
    en: Nomel Berry
    fr: Baie Tronci
    it: Baccalemon
    de: Tronzibeere
    es: Baya Monli
    ko: 노멜열매
    zh_simp: 檬柠果
    zh_trad: 檬檸果
  descriptions:
    jp_kana: "たくましさに　磨きを　かけるための\nポロックを　作るとき　使われる。\nほかの地方では　めずらしい　きのみ。"
    jp_kanji: "たくましさに　磨きを　かけるための\nポロックを　作るとき　使われる。\nほかの地方では　めずらしい　きのみ。"
    en: "Used to make Pokéblocks that will enhance Toughness.\nThis Berry is rare in other regions."
    fr: "Une Baie très rare en dehors de cette région,\nutilisée pour préparer des Pokéblocs permettant\nd’augmenter la Robustesse d’un Pokémon."
    it: "Bacca difficile da trovare in altre regioni usata per creare\nPokémelle che aumentano la Grinta del Pokémon."
    de: "Eine Beerensorte, die als Zutat für Pokériegel\nverwendet wird, welche die Stärke erhöhen.\nIn anderen Regionen ist sie eher selten zu finden."
    es: "Se utiliza en la producción de Pokécubos que potencian\nla dureza. Es una baya muy rara en otras regiones."
    ko: "강인함을 연마하기 위한\n포켓몬스넥을 만들 때 사용된다.\n다른 지방에서는 희귀한 나무열매."
    zh_simp: "用于制作宝可方块，\n制作出来的宝可方块可用来打磨强壮。\n在其他地区很少见的树果。"
    zh_trad: "製作用於增進強壯的\n寶可方塊時使用。\n在其他地區很少見的樹果。"
noodles:
  names:
    jp_kana: ヌードル
    jp_kanji: ヌードル
    en: Noodles
    fr: Nouilles
    it: Noodle
    de: Nudeln
    es: Fideos
    ko: 누들
    zh_simp: 面条
    zh_trad: 麵條
  descriptions:
    jp_kana: "塩味が　ある　食材。\n茹でた麺。　サンドウィッチの\n具材として　可能性は　未知数。"
    jp_kanji: "塩味が　ある　食材。\n茹でた麺。　サンドウィッチの\n具材として　可能性は　未知数。"
    en: "A nice salty ingredient. It’s unclear how well these boiled\nnoodles will serve as a sandwich filling."
    fr: "Un ingrédient au goût salé. Ces nouilles bouillies\noffrent au Sandwich auquel on les ajoute des possibilités\ngustatives infinies."
    it: "Un ingrediente salato. Le possibilità offerte come\ncompanatico da questi tagliolini bolliti non sono ancora\nstate esplorate a fondo."
    de: "Eine salzige Zutat. Mit der Verwendung von gekochten\nNudeln als Sandwichbelag betritt man in kulinarischer\nHinsicht absolutes Neuland."
    es: "El sabor sencillo y salado de los fideos hervidos abre la\npuerta a una infinidad de posibilidades como relleno de\nbocadillo hasta ahora desconocidas."
    ko: "짠맛이 나는 식재료.\n삶은 면이다. 샌드위치 재료로서의\n가능성은 미지수다."
    zh_simp: "带有咸味的食材。\n煮熟的面。作为三明治\n馅料的潜力还是未知数。"
    zh_trad: "帶有鹹味的食材。\n煮熟的麵條。以三明治的材料而言，\n其可能性仍未可知。"
normal_gem:
  names:
    jp_kana: ノーマルジュエル
    jp_kanji: ノーマルジュエル
    en: Normal Gem
    fr: Joyau Normal
    it: Bijounormale
    de: Normaljuwel
    es: Gema Normal
    ko: 노말주얼
    zh_simp: 一般宝石
    zh_trad: 一般寶石
  descriptions:
    jp_kana: "ノーマルのタイプの　ジュエル。\n持たせると　１度だけ　ノーマルの\n技の威力が　強まる。"
    jp_kanji: "ノーマルのタイプの　ジュエル。\n持たせると　１度だけ　ノーマルの\n技の威力が　強まる。"
    en: "An item to be held by a Pokémon. This gem is imbued\nwith the essence of normalcy and will boost the power\nof a Normal-type move—but only once."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Normal."
    it: "Strumento da dare a un Pokémon. Gioiello che potenzia\nuna sola volta le mosse di tipo Normale."
    de: "Ein Item zum Tragen. Dieses Juwel verstärkt einmalig\neine Attacke vom Typ Normal."
    es: "Joya de un solo uso que potencia un movimiento de\ntipo Normal. Debe llevarla un Pokémon."
    ko: "노말타입의 주얼.\n지니게 하면 한 번만 노말\n기술의 위력이 강해진다."
    zh_simp: "一般属性的宝石。\n携带后，一般属性的\n招式威力仅会增强１次。"
    zh_trad: "一般屬性的寶石。\n攜帶後，一般屬性招式的\n威力會僅增強１次。"
normal_tera_shard:
  names:
    jp_kana: テラピースノーマル
    jp_kanji: テラピースノーマル
    en: Normal Tera Shard
    fr: Téra-Éclat Normal
    it: Teralite Normale
    de: Tera-Stück (Normal)
    es: Teralito Normal
    ko: 테라피스 노말
    zh_simp: 一般太晶碎块
    zh_trad: 一般太晶碎塊
  descriptions:
    jp_kana: "テラスタルポケモンが　倒れたとき\n砕けた　テラスタルジュエルが\nまれに　結晶化したもの。"
    jp_kanji: "テラスタルポケモンが　倒れたとき\n砕けた　テラスタルジュエルが\nまれに　結晶化したもの。"
    en: "On rare occasions, these shards form when a Tera\nPokémon falls in battle and its Tera Jewel shatters."
    fr: "Un fragment cristallisé qui se forme rarement lors\nde l’éclatement d’un Joyau Téracristal après qu’un\nPokémon Téracristal a été mis K.O."
    it: "Cristallizzazione che raramente si forma quando\nun Pokémon Teracristal viene sconfitto e la sua gemma\nTeracristal va in frantumi."
    de: "In äußerst seltenen Fällen kristallisieren Bruchstücke\ndes Terakristalls von im Kampf besiegten Terakristall-\nPokémon zu solchen Tera-Stücken."
    es: "Esquirla que se forma muy raramente cuando la joya\nTeracristal de un Pokémon teracristalizado se quiebra\ntras derrotarlo."
    ko: "테라스탈 포켓몬이 쓰러졌을 때\n부서진 테라스탈 주얼이\n드물게 결정화한 조각."
    zh_simp: "打倒太晶宝可梦时，\n破碎掉的太晶宝石有\n极低概率会结晶成此物。"
    zh_trad: "太晶寶可夢倒下時，\n碎裂的太晶寶石在罕見的情況下\n會結晶化，而形成此物。"
normalium_z:bag:
  names:
    jp_kana: ノーマルＺ
    jp_kanji: ノーマルＺ
    en: Normalium Z
    fr: Normazélite
    it: Normium Z
    de: Normium Z
    es: Normastal Z
    ko: 노말Z
    zh_simp: 一般Ｚ
    zh_trad: 一般Ｚ
  descriptions:
    jp_kana: "ノーマルタイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    jp_kanji: "ノーマルタイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nNormal-type moves to Normal-type Z-Moves."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise son porteur à transformer ses capacités\nde type Normal en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono ai Pokémon di trasformare le mosse\ndi tipo Normale in mosse Z."
    de: "Kristallisierte Z-Kraft, die Normal-Attacken zu\nZ-Attacken aufstuft. Wird bei Bedarf automatisch\nvervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a los\nportadores convertir sus movimientos de tipo Normal\nen movimientos Z."
    ko: "노말타입 기술을\nZ기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将一般属性招式升级成\nＺ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把一般屬性招式\n升級為Ｚ招式的Ｚ力量結晶。"
normalium_z:held:
  names:
    jp_kana: ノーマルＺ
    jp_kanji: ノーマルＺ
    en: Normalium Z
    fr: Normazélite
    it: Normium Z
    de: Normium Z
    es: Normastal Z
    ko: 노말Z
    zh_simp: 一般Ｚ
    zh_trad: 一般Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　結晶。\nノーマルタイプの　技を\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nノーマルタイプの　技を\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Normal-type moves to Z-Moves."
    fr: "Une cristallisation de la Force Z, permettant\nde transformer les capacités de type Normal\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare le mosse di tipo Normale\nin mosse Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft\nNormal-Attacken zu Z-Attacken auf."
    es: "Cristal que confiere el Poder Z a los movimientos\nde tipo Normal."
    ko: "Z파워의 결정.\n노말타입 기술을\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将一般属性的招式\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把一般屬性的招式\n升級為Ｚ招式。"
nosepass_fragment:
  names:
    jp_kana: ノズパスのかけら
    jp_kanji: ノズパスのかけら
    en: Nosepass Fragment
    fr: Fragment de Tarinor
    it: Frammento di Nosepass
    de: Nasgnet-Splitter
    es: Fragmento de Nosepass
    ko: 코코파스의조각
    zh_simp: 朝北鼻的碎片
    zh_trad: 朝北鼻的碎片
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
nugget:
  names:
    jp_kana: きんのたま
    jp_kanji: きんのたま
    en: Nugget
    fr: Pépite
    it: Pepita
    de: Nugget
    es: Pepita
    ko: 금구슬
    zh_simp: 金珠
    zh_trad: 金珠
  descriptions:
    jp_kana: "キラキラと　金色に　光る\n純金製の　玉。\nショップで　高く　売れる。"
    jp_kanji: "キラキラと　金色に　光る\n純金製の　玉。\nショップで　高く　売れる。"
    en: "A nugget of pure gold that gives off a lustrous gleam.\nIt can be sold at a high price to shops."
    fr: "Une pépite d’or pur qui brille d’un éclat magnifique.\nPeut être vendue à bon prix en magasin."
    it: "Pepita d’oro puro dal luccichio sfavillante.\nSi può vendere a un prezzo alto nei negozi."
    de: "Ein Nugget aus purem Gold, das einen schimmernden\nGlanz besitzt. Kann für viel Geld verkauft werden."
    es: "Pepita de oro puro que desprende un brillo\nespectacular. Puede venderse a buen precio en\nlas tiendas."
    ko: "금색으로 반짝반짝 빛나는\n순금으로 만들어진 구슬.\n상점에서 비싸게 팔린다."
    zh_simp: "闪着金光，\n以纯金制成的珠子。\n可以在商店高价出售。"
    zh_trad: "閃著金光的\n純金製珠子。\n可以在商店高價出售。"
numel_lava:
  names:
    jp_kana: ドンメルのようがん
    jp_kanji: ドンメルのようがん
    en: Numel Lava
    fr: Lave de Chamallot
    it: Lava di Numel
    de: Camaub-Lava
    es: Lava de Numel
    ko: 둔타의용암
    zh_simp: 呆火驼的熔岩
    zh_trad: 呆火駝的熔岩
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
