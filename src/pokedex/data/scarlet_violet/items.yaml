    jp_kanji: "とりポケモンの祖先と　いわれる\n古代ポケモンの　カセキ。\nつばさの一部　らしい。"
    en: "A fossil from a prehistoric Pokémon said to be an\nancestor to modern bird Pokémon. It looks as if it could\nhave come from part of some creature’s wing."
    fr: "Le fossile d’un ancien Pokémon considéré comme\nl’ancêtre des Pokémon oiseaux.\nIl semble que ce soit un morceau d’aile."
    it: "Fossile di un Pokémon preistorico che si dice sia\nl’antenato dei Pokémon alati. Sembra che fosse\nparte della sua ala."
    de: "Das Fossil eines urzeitlichen Pokémon, von dem man\nannimmt, dass es der Urahn der Vogel-Pokémon sei.\nEs sieht wie ein Teil eines Flügels aus."
    es: "Fósil de un Pokémon prehistórico que surcaba los\ncielos. Parece ser parte de una de sus alas."
    ko: "새포켓몬의 조상이라 불리는\n고대 포켓몬의 화석.\n날개의 일부인 듯하다."
    zh_simp: "据说是鸟宝可梦的祖先，\n古代宝可梦的化石。\n好像是翅膀的一部分。"
    zh_trad: "據說是鳥寶可夢祖先的\n古代寶可夢的化石。\n好像是翅膀的一部分。"
plump_beans:
