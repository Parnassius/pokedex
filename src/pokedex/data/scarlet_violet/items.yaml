    jp_kana: "キズぐすりのレシピ。　材料は\nオレンのみ×１　クスリソウ×１"
    jp_kanji: "キズぐすりのレシピ。　材料は\nオレンのみ×１　クスリソウ×１"
    en: "A recipe for crafting Potions from scratch.\nRequired materials: 1 Oran Berry and 1 Medicinal Leek."
    fr: "Méthode pour Potion. Ressources requises :\n1 Baie Oran et 1 Soignon."
    it: "Ricetta per una Pozione. Richiede 1 Baccarancia e\n1 Porro officinale."
    de: "Die Anleitung zur Herstellung eines Tranks.\nBenötigte Materialien: 1 Sinelbeere und\n1 Stange Fitlauch."
    es: "Receta para crear Pociones. Materiales:\n1 Baya Aranja y 1 Puerro Medicinal."
    ko: "상처약의 레시피.\n재료: 오랭열매×1 약초×1"
    zh_simp: "伤药的材料单。材料是：\n橙橙果×１　疗草×１"
    zh_trad: "傷藥的材料單。材料是：\n橙橙果×１　療草×１"
power_anklet:
  names:
    jp_kana: パワーアンクル
    jp_kanji: パワーアンクル
    en: Power Anklet
    fr: Chaîne Pouvoir
    it: Vigorgliera
    de: Machtkette
    es: Franja Recia
    ko: 파워앵클릿
    zh_simp: 力量护踝
    zh_trad: 力量護踝
  descriptions:
    jp_kana: "持たせると　バトル中の　素早さが\nさがるが　ふつうよりも　ポケモンの\n素早さが　高く　育ちやすい。"
    jp_kanji: "持たせると　バトル中の　素早さが\nさがるが　ふつうよりも　ポケモンの\n素早さが　高く　育ちやすい。"
    en: "An item to be held by a Pokémon. Holding this anklet\nreduces a Pokémon’s Speed in battle but allows its\nSpeed stat to grow more quickly."
    fr: "Objet à tenir. Permet à la stat de Vitesse de progresser\nplus vite, mais la réduit pendant le combat."
    it: "Strumento da dare a un Pokémon. Riduce la Velocità\nnella lotta ma permette ai punti base della Velocità\ndi crescere più rapidamente."
    de: "Ein Item zum Tragen. Es senkt während des Kampfes\ndie Initiative, lässt dafür aber nach dem Kampf die\nInitiative schneller steigen."
    es: "Reduce la Velocidad en combate, pero permite que\nla Velocidad de base aumente más rápidamente. Debe\nllevarla un Pokémon."
    ko: "지니게 하면 배틀 중 스피드가 떨어지지만\n여느 때보다 포켓몬의 스피드를\n올리면서 키우기가 쉽다."
    zh_simp: "虽然携带后对战时的速度会降低，\n但宝可梦的速度\n会比平时成长得更高。"
    zh_trad: "雖然攜帶後對戰時的速度會降低，\n但寶可夢的速度\n會比平時成長得更高。"
power_band:
  names:
    jp_kana: パワーバンド
    jp_kanji: パワーバンド
    en: Power Band
    fr: Bandeau Pouvoir
    it: Vigorbanda
    de: Machtband
    es: Banda Recia
    ko: 파워밴드
    zh_simp: 力量束带
    zh_trad: 力量束帶
  descriptions:
    jp_kana: "持たせると　バトル中の　素早さが\nさがるが　ふつうよりも　ポケモンの\n特防が　高く　育ちやすい。"
    jp_kanji: "持たせると　バトル中の　素早さが\nさがるが　ふつうよりも　ポケモンの\n特防が　高く　育ちやすい。"
    en: "An item to be held by a Pokémon. Holding this band\nreduces a Pokémon’s Speed in battle but allows its\nSp. Def stat to grow more quickly."
    fr: "Objet à tenir. Permet à la stat de Défense Spéciale de\nprogresser plus vite, mais réduit la Vitesse pendant\nle combat."
    it: "Strumento da dare a un Pokémon. Riduce la Velocità\nnella lotta ma permette ai punti base della Difesa\nSpeciale di crescere più rapidamente."
    de: "Ein Item zum Tragen. Es senkt während des Kampfes\ndie Initiative, lässt dafür aber nach dem Kampf die\nSpezial-Verteidigung schneller steigen."
    es: "Reduce la Velocidad en combate, pero permite que\nla Defensa Especial de base aumente más rápidamente.\nDebe llevarla un Pokémon."
    ko: "지니게 하면 배틀 중 스피드가 떨어지지만\n여느 때보다 포켓몬의 특수방어를\n올리면서 키우기가 쉽다."
    zh_simp: "虽然携带后对战时的速度会降低，\n但宝可梦的特防\n会比平时成长得更高。"
    zh_trad: "雖然攜帶後對戰時的速度會降低，\n但寶可夢的特防\n會比平時成長得更高。"
