    jp_kana: "決まった　場所で　使うことで\n特殊な　電気信号を　だして\n扉を　開ける　ハイテクな　カギ。"
    jp_kanji: "決まった　場所で　使うことで\n特殊な　電気信号を　だして\n扉を　開ける　ハイテクな　カギ。"
    en: "A high-tech key that has to be used at a specific\nlocation. It emits a special electronic signal to open\na door."
    fr: "Une clé destinée à une serrure très complexe.\nOuvre une porte en transmettant un signal électrique."
    it: "Una sofisticata chiave da usare in un determinato luogo.\nEmette un impulso elettrico speciale che apre una porta."
    de: "Ein besonderer Schlüssel, der an einem speziellen Ort\nTüren durch ein elektrisches Signal öffnet."
    es: "Una llave de alta tecnología que debe usarse en un\nlugar concreto. Emite una señal eléctrica que abre una\npuerta."
    ko: "정해진 장소에서 쓰는 것으로\n특수한 전기 신호를 내어\n문을 여는 첨단 기술의 열쇠."
    zh_simp: "在特定的地方使用，\n就会发出特殊电信号\n来开门的高科技钥匙。"
    zh_trad: "在特定的地方使用，\n就會發出特殊電子訊號\n來開門的高科技鑰匙。"
secret_medicine:
  names:
    jp_kana: ひでんのくすり
    jp_kanji: ひでんのくすり
    en: Secret Medicine
    fr: Remède Secret
    it: Rimedio segreto
    de: Geheimmedizin
    es: Medicina Secreta
    ko: 비전신약
    zh_simp: 秘传之药
    zh_trad: 秘傳之藥
  descriptions:
    jp_kana: "タンバシティの　薬屋で　もらった\nどんな　ポケモンでも　たちまち\nげんきになる　すごい　くすり。"
    jp_kanji: "タンバシティの　薬屋で　もらった\nどんな　ポケモンでも　たちまち\nげんきになる　すごい　くすり。"
    en: "A fantastic medicine dispensed by the pharmacy in\nCianwood City. It fully heals a Pokémon of any ailment."
    fr: "Un médicament génial vendu à la pharmacie d’Irisia.\nIl permet à n’importe quel Pokémon de retrouver\nla forme rapidement."
    it: "Rimedio fantastico distribuito dalla farmacia\na Fiorlisopoli. Cura i problemi di stato\ndi qualunque Pokémon."
    de: "Eine fantastische Medizin aus Anemonia City.\nHeilt und kuriert ein Pokémon vollständig."
    es: "Fantástico medicamento vendido en la farmacia de\nCiudad Orquídea. Cura completamente a un Pokémon."
    ko: "진청시티의 약국에서 받은\n어떤 포켓몬이라도 금방\n건강해지는 대단한 약."
    zh_simp: "在湛蓝市的药店里得到的，\n能让任何宝可梦立刻变得\n精力充沛的高效药。"
    zh_trad: "在湛藍市的藥店裡得到的，\n不管什麼寶可夢都能立刻\n變得精力充沛的高效藥。"
secret_medicine:legends:
  names:
    jp_kana: ひでんのくすり
    jp_kanji: ひでんのくすり
    en: Secret Medicine
    fr: Remède Secret
    it: Rimedio segreto
    de: Geheimmedizin
    es: Medicina Secreta
    ko: 비전신약
    zh_simp: 秘传之药
    zh_trad: 秘傳之藥
  descriptions:
    jp_kana: "どんなポケモンでもたちまち\nげんきになるすごい薬。\nタンバの薬屋で作られる。"
    jp_kanji: "どんなポケモンでもたちまち\nげんきになるすごい薬。\nタンバの薬屋で作られる。"
    en: "An astonishing medicine that can instantly restore health\nto any Pokémon. It is produced by an apothecary in\nCianwood City."
    fr: "Un médicament extraordinaire préparé à la pharmacie\nd’Irisia. Il permet de remettre instantanément d’aplomb\nn’importe quel Pokémon."
    it: "Rimedio fantastico che cura all’istante i problemi\ndi stato di qualunque Pokémon. Viene preparato\nalla farmacia di Fiorlisopoli."
    de: "Eine fantastische Medizin, die jedes Pokémon im\nHandumdrehen kuriert. Sie wird in der Anemonia-\nApotheke hergestellt."
    es: "Fantástico medicamento preparado en una botica de\nCiudad Orquídea y que cura completamente a cualquier\nPokémon."
    ko: "어떤 포켓몬이라도 금방\n건강해지는 대단한 약.\n진청의 약국에서 만들어진다."
    zh_simp: "不管什么宝可梦都能立刻\n变得精力充沛的高效药品。\n由湛蓝的药店所制作。"
    zh_trad: "不管什麼寶可夢都能立刻\n變得精力充沛的高效藥品。\n由湛藍的藥店所製作。"
seed_of_mastery:
  names:
    jp_kana: かいでんのタネ
    jp_kanji: かいでんのタネ
    en: Seed of Mastery
    fr: Graine Maîtrise
    it: Seme padronanza
    de: Meistersamen
    es: Semilla Dominio
    ko: 숙달의씨
    zh_simp: 精通种子
    zh_trad: 精通種子
  descriptions:
    jp_kana: "希少な種。警備隊長に渡すことで\nポケモンの技を早業と力業に\n切り替えられるようにしてもらえる。"
    jp_kanji: "希少な種。警備隊長に渡すことで\nポケモンの技を早業と力業に\n切り替えられるようにしてもらえる。"
    en: "A rare seed that can be given to the captain of the\nSecurity Corps to have a Pokémon master a move\nso it can be used in the agile style or strong style."
    fr: "Donnez cette étrange graine à la cheffe du Corps de\nla Défense afin qu’un Pokémon apprenne à alterner\nentre le Style Puissant et le Style Rapide d’une capacité."
    it: "Un seme misterioso. Se consegnato al capo della\nSquadra di vigilanza, permette a un Pokémon di sferrare\nmosse utilizzando la tecnica potente e la tecnica rapida."
    de: "Gib diesen mysteriösen Samen der Kommandantin des\nSicherheitstrupps, um zwischen der Kraft- und Tempo-\ntechnik einer Pokémon-Attacke wechseln zu können."
    es: "Puedes entregar esta misteriosa semilla a la Capitana de\nla división de seguridad para que ayude a un Pokémon a\ndominar los estilos fuerte y rápido de un movimiento."
    ko: "희귀한 씨앗. 경비대 대장에게 건네주면\n포켓몬의 기술을 강공과 속공으로\n전환할 수 있게 만들어 준다."
    zh_simp: "稀有的种子。将它交给警卫组\n组长，就能让宝可梦的招式\n在迅疾与刚猛之间切换。"
    zh_trad: "稀有的種子。將它交給警衛組\n的組長，就能讓寶可夢的招式\n在迅疾與剛猛之間切換。"
seedot_stem:
  names:
    jp_kana: タネボーのえだ
    jp_kanji: タネボーのえだ
    en: Seedot Stem
    fr: Tige de Grainipiot
    it: Picciolo di Seedot
    de: Samurzel-Zweig
    es: Tallo de Seedot
    ko: 도토링의가지
    zh_simp: 橡实果的枝条
    zh_trad: 橡實果的枝條
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
seel_candy:
  names:
    jp_kana: パウワウのアメ
    jp_kanji: パウワウのアメ
    en: Seel Candy
    fr: Bonbon Otaria
    it: Caramella Seel
    de: Jurob-Bonbon
    es: Caramelo Seel
    ko: 쥬쥬의사탕
    zh_simp: 小海狮的糖果
    zh_trad: 小海獅的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
