dynite_ore:
  names:
    jp_kana: マックスこうせき
    jp_kanji: マックスこうせき
    en: Dynite Ore
    fr: Dynamaxium
    it: Rocciamax
    de: Dyna-Erz
    es: Maxinium
    ko: 맥스광석
    zh_simp: 极矿石
    zh_trad: 極礦石
  descriptions:
    jp_kana: "マックスダイ巣穴で　採れる　謎の石。\nカンムリ雪原の　コレクターに　あげると\nなにか　いいことが　ある。"
    jp_kanji: "マックスダイ巣穴で　採れる　謎の石。\nカンムリ雪原の　コレクターに　あげると\nなにか　いいことが　ある。"
    en: "Mysterious ore that can be obtained in the Max Lair.\nSomething good will happen if you give it to a\ncollector in the Crown Tundra."
    fr: "Un minerai mystérieux que l’on trouve dans le Grand\nAntre Dynamax. Vous pourriez avoir une bonne surprise\nen le donnant à un collectionneur de Couronneige."
    it: "Una pietra misteriosa che si può trovare nella\ndynatana max. Se la consegni a un collezionista\ndella Landa Corona, potresti guadagnarci qualcosa."
    de: "Ein mysteriöses Gestein, das im Dyna-Riesennest\nzu finden ist. Gibst du es einem Sammler in den\nKronen-Schneelanden, passiert etwas Gutes."
    es: "Un extraño mineral que se encuentra en el Supernido\nDinamax. Tal vez ocurra algo bueno al dárselo a un\ncoleccionista de las Nieves de la Corona."
    ko: "맥스다이맥스굴에서 얻을 수 있는 수수께끼의 광석.\n왕관설원의 컬렉터에게 주면 좋은 일이 일어난다."
    zh_simp: "能够在极巨巢穴找出的神秘石头。\n把它送给王冠雪原的收藏家，\n就会有好事发生。"
    zh_trad: "能夠在極巨巢穴找到的神秘石頭。\n把它送給王冠雪原上的收藏家，\n就會有好事發生。"
earth_plate:
  names:
    jp_kana: だいちのプレート
    jp_kanji: だいちのプレート
    en: Earth Plate
    fr: Plaque Terre
    it: Lastrageo
    de: Erdtafel
    es: Tabla Terrax
    ko: 대지플레이트
    zh_simp: 大地石板
    zh_trad: 大地石板
  descriptions:
    jp_kana: "じめんのタイプの　石盤。\n持たせると　じめんタイプの\n技の威力が　強まる。"
    jp_kanji: "じめんのタイプの　石盤。\n持たせると　じめんタイプの\n技の威力が　強まる。"
    en: "An item to be held by a Pokémon. This stone tablet is\nimbued with the essence of the earth and boosts the\npower of the holder’s Ground-type moves."
    fr: "Objet à tenir. Une tablette en pierre augmentant\nla puissance des capacités de type Sol."
    it: "Strumento da dare a un Pokémon. Lastra di pietra che\npotenzia le mosse di tipo Terra."
    de: "Ein Item zum Tragen. Diese Steintafel verstärkt\nAttacken vom Typ Boden."
    es: "Tabla de piedra que potencia los movimientos de tipo\nTierra. Debe llevarla un Pokémon."
    ko: "땅타입의 석판.\n지니게 하면 땅타입\n기술의 위력이 강해진다."
    zh_simp: "地面属性的石板。\n携带后，地面属性的\n招式威力就会增强。"
    zh_trad: "地面屬性的石板。\n攜帶後，地面屬性的\n招式威力就會增強。"
eevee_candy:
  names:
    jp_kana: イーブイのアメ
    jp_kanji: イーブイのアメ
    en: Eevee Candy
    fr: Bonbon Évoli
    it: Caramella Eevee
    de: Evoli-Bonbon
    es: Caramelo Eevee
    ko: 이브이의사탕
    zh_simp: 伊布的糖果
    zh_trad: 伊布的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
eevee_cup:
  names:
    jp_kana: イーブイカップ
    jp_kanji: イーブイカップ
    en: Eevee Cup
    fr: Tasse Évoli
    it: Tazza Eevee
    de: Evoli-Tasse
    es: Taza Eevee
    ko: 이브이 컵
    zh_simp: 伊布水杯
    zh_trad: 伊布水杯
  descriptions:
    jp_kana: "ポケモン好きのための　カップ。\n子供が　飲み物を　ていねいに\n飲んでくれるので　親御さんも　大助かり。"
    jp_kanji: "ポケモン好きのための　カップ。\n子供が　飲み物を　ていねいに\n飲んでくれるので　親御さんも　大助かり。"
    en: "A cup for big-time Pokémon fans. Kids will happily drink\nout of it, making it a boon to parents."
    fr: "Une tasse pour les fans de Pokémon. Les enfants\ns’en servent avec joie. Elle est donc particulièrement\nappréciée des parents."
    it: "Tazza per amanti dei Pokémon. I bambini mostrano\nun grande piacere nell’usarla, per la gioia dei genitori."
    de: "Diese Tasse ist ein absolutes Muss für Pokémon-Fans.\nVor allem Eltern haben Grund zur Freude, denn Kinder\ntrinken ohne zu murren daraus."
    es: "La taza perfecta para los amantes de los Pokémon.\nLos niños beben de ella sin poner quejas, por lo\nque es una de las favoritas de aquellos con hijos."
    ko: "포켓몬 애호가를 위한 컵.\n아이가 음료수를 천천히\n마실 수 있게 해 줘서 부모에게 큰 도움을 준다."
    zh_simp: "为喜欢宝可梦的人而制作的杯子。\n靠这个杯子能让小孩小心翼翼地\n乖乖喝东西，可帮父母一个大忙。"
    zh_trad: "為寶可夢愛好者量身打造的水杯。\n它讓小孩子一滴不剩地喝光飲料，\n家長也因此輕鬆許多。"
eevee_fur:
  names:
    jp_kana: イーブイのけ
    jp_kanji: イーブイのけ
    en: Eevee Fur
    fr: Poils d’Évoli
    it: Pelo di Eevee
    de: Evoli-Haar
    es: Pelo de Eevee
    ko: 이브이의털
    zh_simp: 伊布的毛
    zh_trad: 伊布的毛
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
eevium_z:bag:
  names:
    jp_kana: イーブイＺ
    jp_kanji: イーブイＺ
    en: Eevium Z
    fr: Évolizélite
    it: Eevium Z
    de: Evolium Z
    es: Eeveestal Z
    ko: 이브이Z
    zh_simp: 伊布Ｚ
    zh_trad: 伊布Ｚ
  descriptions:
    jp_kana: "イーブイの　とっておきを\n特別な　Ｚワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    jp_kanji: "イーブイの　とっておきを\n特別な　Ｚワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nEevee’s Last Resort to a Z-Move."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise l’Évoli qui le tient à transformer\nsa capacité Dernier Recours en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono a Eevee di trasformare la mossa\nUltimascelta in una mossa Z."
    de: "Kristallisierte Z-Kraft, die Evolis Attacke\nZuflucht zu einer Z-Attacke aufstuft.\nWird bei Bedarf automatisch vervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a\nEevee convertir su Última Baza en un movimiento Z."
    ko: "이브이의 비장의무기를\n특별한 Z기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将伊布的珍藏\n升级成特殊Ｚ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把伊布的珍藏\n升級為特殊Ｚ招式的Ｚ力量結晶。"
eevium_z:held:
  names:
    jp_kana: イーブイＺ
    jp_kanji: イーブイＺ
    en: Eevium Z
    fr: Évolizélite
    it: Eevium Z
    de: Evolium Z
    es: Eeveestal Z
    ko: 이브이Z
    zh_simp: 伊布Ｚ
    zh_trad: 伊布Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　結晶。\nイーブイの　とっておきを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nイーブイの　とっておきを\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Eevee’s Last Resort to a Z-Move."
    fr: "Une cristallisation de la Force Z, permettant\nde transformer la capacité Dernier Recours\nd’un Évoli en capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare la mossa Ultimascelta\ndi Eevee in una mossa Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft Evolis\nAttacke Zuflucht zu einer Z-Attacke auf."
    es: "Cristal que confiere el Poder Z al movimiento Última\nBaza de Eevee."
    ko: "Z파워의 결정.\n이브이의 비장의무기를\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将伊布的珍藏\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把伊布的珍藏\n升級為Ｚ招式。"
egg:
  names:
    jp_kana: スライスエッグ
    jp_kanji: スライスエッグ
    en: Egg
    fr: Œuf
    it: Uovo bollito
    de: Ei
    es: Huevo Cocido
    ko: 에그슬라이스
    zh_simp: 水煮蛋片
    zh_trad: 水煮蛋片
  descriptions:
    jp_kana: "塩味が　ある　食材。\nさまざまな　味つけで　楽しめ\n栄養価も　高い　食材。"
    jp_kanji: "塩味が　ある　食材。\nさまざまな　味つけで　楽しめ\n栄養価も　高い　食材。"
    en: "An ingredient with a touch of saltiness. It’s full of\nnutrients and can be enjoyed with all sorts of seasonings."
    fr: "Un ingrédient au goût salé. Il s’accorde avec toutes\nsortes d’accompagnements pour apprécier encore\nmieux sa grande valeur nutritive."
    it: "Un ingrediente salato. Molto nutriente, si può condire\nin vari modi."
    de: "Diese salzige Zutat ist reich an Nährstoffen und kann in\nKombination mit den unterschiedlichsten Gewürzen\ngenossen werden."
    es: "Un ingrediente muy nutritivo con un toque salado.\nCasa muy bien con diversos condimentos, por lo que\nse puede disfrutar de muchas maneras."
    ko: "짠맛이 나는 식재료.\n다양한 맛을 조합해서 즐길 수 있고\n영양가도 높은 식재료다."
    zh_simp: "带有咸味的食材。\n能以各种调味品尝\n且营养充足的食材。"
    zh_trad: "帶有鹹味的食材。\n適合許多不同的調味方式，\n而且營養價值也很高。"
eiscue_down:
  names:
    jp_kana: コオリッポのうもう
    jp_kanji: コオリッポのうもう
    en: Eiscue Down
    fr: Duvet de Bekaglaçon
    it: Piuma di Eiscue
    de: Kubuin-Daune
    es: Plumón de Eiscue
    ko: 빙큐보의솜털
    zh_simp: 冰砌鹅的羽绒
    zh_trad: 冰砌鵝的羽絨
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
eject_button:
  names:
    jp_kana: だっしゅつボタン
    jp_kanji: だっしゅつボタン
    en: Eject Button
    fr: Bouton Fuite
    it: Pulsantefuga
    de: Fluchtknopf
    es: Botón Escape
    ko: 탈출버튼
    zh_simp: 逃脱按键
    zh_trad: 逃脫按鍵
  descriptions:
    jp_kana: "持たせて　技のダメージを　受けると\n戦闘から　脱出して\n手持ちと　入れ替わる　ことができる。"
    jp_kanji: "持たせて　技のダメージを　受けると\n戦闘から　脱出して\n手持ちと　入れ替わる　ことができる。"
    en: "An item to be held by a Pokémon. If the holder is\ndamaged by an attack, it will be switched out of battle\nto be replaced by another Pokémon on your team."
    fr: "Objet à tenir. Permet au porteur de quitter le combat\ns’il subit des dégâts d’une capacité offensive."
    it: "Se il Pokémon che ha questo strumento subisce danni\nda una mossa, viene immediatamente sostituito\nda un altro membro della squadra."
    de: "Nimmt der Träger dieses Fluchtknopfs durch eine Attacke\nSchaden, flieht er aus dem Kampf und wird mit einem\nTeam-Pokémon ausgetauscht."
    es: "Si el portador es alcanzado por un ataque, saldrá del\ncombate y será sustituido por otro Pokémon del equipo."
    ko: "지니게 하고 기술에 데미지를 받으면\n배틀에서 탈출하여\n지닌 포켓몬과 교체할 수 있다."
    zh_simp: "携带它的宝可梦如果受到招式的伤害，\n就能逃脱战斗，并和同行的\n其他宝可梦进行替换。"
    zh_trad: "攜帶它的寶可夢如果受到招式的傷害，\n就能從戰鬥中逃脫，並和同行的\n其他寶可夢進行替換。"
eject_pack:
  names:
    jp_kana: だっしゅつパック
    jp_kanji: だっしゅつパック
    en: Eject Pack
    fr: Sac Fuite
    it: Zainofuga
    de: Fluchttasche
    es: Mochila Escape
    ko: 탈출팩
    zh_simp: 避难背包
    zh_trad: 避難背包
  descriptions:
    jp_kana: "持たせたポケモンの\n能力が　下がると\n手持ちと　入れ替わる。"
    jp_kanji: "持たせたポケモンの\n能力が　下がると\n手持ちと　入れ替わる。"
    en: "An item to be held by a Pokémon. If the holder’s stats\nare lowered, it will be switched out of battle."
    fr: "Objet à tenir. Si le porteur subit une baisse de stats,\nil revient vers son Dresseur et change de place\navec un coéquipier."
    it: "Strumento da dare a un Pokémon. Se le sue statistiche\ndiminuiscono, viene sostituito da un altro Pokémon\ndella squadra."
    de: "Erleidet der Träger eine Senkung seiner Statuswerte,\nwird er mit einem Team-Mitglied ausgewechselt."
    es: "Si el portador ve reducidas sus características, será\nsustituido por otro Pokémon del equipo."
    ko: "지니게 한 포켓몬의\n능력이 떨어지면\n지닌 포켓몬과 교체한다."
    zh_simp: "当携带它的宝可梦能力下降时，\n同行宝可梦就会自动替换上场。"
    zh_trad: "當攜帶它的寶可夢能力降低時，\n將自動和同行寶可夢進行替換。"
ekans_candy:
  names:
    jp_kana: アーボのアメ
    jp_kanji: アーボのアメ
    en: Ekans Candy
    fr: Bonbon Abo
    it: Caramella Ekans
    de: Rettan-Bonbon
    es: Caramelo Ekans
    ko: 아보의사탕
    zh_simp: 阿柏蛇的糖果
    zh_trad: 阿柏蛇的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
ekans_fang:
  names:
    jp_kana: アーボのキバ
    jp_kanji: アーボのキバ
    en: Ekans Fang
    fr: Croc d’Abo
    it: Zanna di Ekans
    de: Rettan-Zahn
    es: Colmillo de Ekans
    ko: 아보의이빨
    zh_simp: 阿柏蛇的牙
    zh_trad: 阿柏蛇的牙
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
electabuzz_candy:
  names:
    jp_kana: エレブーのアメ
    jp_kanji: エレブーのアメ
    en: Electabuzz Candy
    fr: Bonbon Élektek
    it: Caramella Electabuzz
    de: Elektek-Bonbon
    es: Caramelo Electabuzz
    ko: 에레브의사탕
    zh_simp: 电击兽的糖果
    zh_trad: 電擊獸的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de cierto Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
electirizer:
  names:
    jp_kana: エレキブースター
    jp_kanji: エレキブースター
    en: Electirizer
    fr: Électriseur
    it: Elettritore
    de: Stromisierer
    es: Electrizador
    ko: 에레키부스터
    zh_simp: 电力增幅器
    zh_trad: 電力增幅器
  descriptions:
    jp_kana: "とてつもない　電気の　エネルギーが\n蓄えられている　箱。\nあるポケモンが　好んでいる。"
    jp_kanji: "とてつもない　電気の　エネルギーが\n蓄えられている　箱。\nあるポケモンが　好んでいる。"
    en: "A box packed with a tremendous amount of electric\nenergy. It’s loved by a certain Pokémon."
    fr: "Une boîte remplie d’une énorme quantité d’énergie\nélectrique. Appréciée d’un certain Pokémon."
    it: "Scatola strapiena di energia elettrica.\nPiace a un Pokémon in particolare."
    de: "Eine Schachtel mit elektrischer Energie.\nDas Lieblingsstück eines bestimmten Pokémon."
    es: "Este dispositivo contiene una gran cantidad de energía\neléctrica. Cierto Pokémon lo adora."
    ko: "엄청난 전기의 에너지가\n비축되어 있는 상자.\n어떤 포켓몬이 좋아하는 물건이다."
    zh_simp: "积蓄着庞大电气能量的箱子。\n某种宝可梦很喜欢它。"
    zh_trad: "蓄積著龐大\n電氣能量的箱子。\n某種寶可夢很喜歡它。"
electric_gem:
  names:
    jp_kana: でんきのジュエル
    jp_kanji: でんきのジュエル
    en: Electric Gem
    fr: Joyau Électrik
    it: Bijouelettro
    de: Elektrojuwel
    es: Gema Eléctrico
    ko: 전기주얼
    zh_simp: 电之宝石
    zh_trad: 電之寶石
  descriptions:
    jp_kana: "でんきのタイプの　ジュエル。\n持たせると　１度だけ　でんきの\n技の威力が　強まる。"
    jp_kanji: "でんきのタイプの　ジュエル。\n持たせると　１度だけ　でんきの\n技の威力が　強まる。"
    en: "An item to be held by a Pokémon. This gem is imbued\nwith the essence of electricity and will boost the power\nof an Electric-type move—but only once."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Électrik."
    it: "Strumento da dare a un Pokémon. Gioiello che potenzia\nuna sola volta le mosse di tipo Elettro."
    de: "Ein Item zum Tragen. Dieses Juwel verstärkt einmalig\neine Attacke vom Typ Elektro."
    es: "Joya de un solo uso que potencia un movimiento de\ntipo Eléctrico. Debe llevarla un Pokémon."
    ko: "전기타입의 주얼.\n지니게 하면 한 번만 전기\n기술의 위력이 강해진다."
    zh_simp: "电属性的宝石。\n携带后，电属性的\n招式威力仅会增强１次。"
    zh_trad: "電屬性的寶石。\n攜帶後，電屬性招式的\n威力會僅增強１次。"
electric_memory:
  names:
    jp_kana: エレクトロメモリ
    jp_kanji: エレクトロメモリ
    en: Electric Memory
    fr: ROM Électrik
    it: ROM Elettro
    de: Elektro-Disc
    es: Disco Eléctrico
    ko: 일렉트릭메모리
    zh_simp: 电子存储碟
    zh_trad: 電子記憶碟
  descriptions:
    jp_kana: "でんきタイプの　データが　入った\nメモリ。　特定のポケモンが　持つと\nタイプが　変わる。"
    jp_kanji: "でんきタイプの　データが　入った\nメモリ。　特定のポケモンが　持つと\nタイプが　変わる。"
    en: "A memory disc that contains Electric-type data.\nIt changes the type of the holder if held by\na certain species of Pokémon."
    fr: "Une carte mémoire contenant des données sur\nle type Électrik. Un certain Pokémon peut changer\nde type en l’équipant."
    it: "ROM contenente dati sul tipo Elettro in formato digitale.\nPermette a un certo Pokémon di cambiare tipo."
    de: "Eine Disc mit Daten zum Typ Elektro. Sie löst bei einem\nbestimmten Pokémon einen Typenwechsel aus."
    es: "Disco de datos que contiene información relativa al tipo\nEléctrico. Permite cambiar de tipo a cierto Pokémon."
    ko: "전기타입의 데이터가 들어 있는\n메모리. 특정 포켓몬이\n지니면 타입이 바뀐다."
    zh_simp: "装有电属性数据的存储碟。\n特定宝可梦携带后，\n属性就会发生变化。"
    zh_trad: "裝有電屬性資料的記憶碟。\n特定寶可夢攜帶後，\n就會產生屬性的變化。"
electric_seed:
  names:
    jp_kana: エレキシード
    jp_kanji: エレキシード
    en: Electric Seed
    fr: Graine Électrik
    it: Elettroseme
    de: Elektro-Samen
    es: Semilla Electro
    ko: 일렉트릭시드
    zh_simp: 电气种子
    zh_trad: 電氣種子
  descriptions:
    jp_kana: "ポケモンに　持たせると\nエレキフィールドのときに　使って\n防御が　あがる。"
    jp_kanji: "ポケモンに　持たせると\nエレキフィールドのときに　使って\n防御が　あがる。"
    en: "An item to be held by a Pokémon. If the terrain becomes\nElectric Terrain, the holder will use this seed to boost its\nown Defense stat."
    fr: "Objet à tenir. Lorsqu’un champ électrifié est actif,\nla graine est consommée pour augmenter la Défense\ndu porteur."
    it: "Strumento da dare a un Pokémon. Fa aumentare\nla Difesa in presenza di un Campo Elettrico."
    de: "Gibst du den Samen einem Pokémon zum Tragen, setzt\nes ihn ein, wenn ein Elektrofeld aktiv ist, und erhöht\ndadurch seine Verteidigung."
    es: "Si la lleva un Pokémon, la usa y aumenta su Defensa\ncuando el terreno está cubierto por un campo eléctrico."
    ko: "포켓몬에게 지니게 하면\n일렉트릭필드일 때 사용하여\n방어가 올라간다."
    zh_simp: "让宝可梦携带后，\n在电气场地上使用，\n防御就会提高。"
    zh_trad: "讓寶可夢攜帶後，\n在電氣場地上使用，\n就會提高防禦。"
electric_tera_shard:
  names:
    jp_kana: テラピースでんき
    jp_kanji: テラピースでんき
    en: Electric Tera Shard
    fr: Téra-Éclat Électrik
    it: Teralite Elettro
    de: Tera-Stück (Elektro)
    es: Teralito Eléctrico
    ko: 테라피스 전기
    zh_simp: 电太晶碎块
    zh_trad: 電太晶碎塊
  descriptions:
    jp_kana: "テラスタルポケモンが　倒れたとき\n砕けた　テラスタルジュエルが\nまれに　結晶化したもの。"
    jp_kanji: "テラスタルポケモンが　倒れたとき\n砕けた　テラスタルジュエルが\nまれに　結晶化したもの。"
    en: "On rare occasions, these shards form when a Tera\nPokémon falls in battle and its Tera Jewel shatters."
    fr: "Un fragment cristallisé qui se forme rarement lors\nde l’éclatement d’un Joyau Téracristal après qu’un\nPokémon Téracristal a été mis K.O."
    it: "Cristallizzazione che raramente si forma quando\nun Pokémon Teracristal viene sconfitto e la sua gemma\nTeracristal va in frantumi."
    de: "In äußerst seltenen Fällen kristallisieren Bruchstücke\ndes Terakristalls von im Kampf besiegten Terakristall-\nPokémon zu solchen Tera-Stücken."
    es: "Esquirla que se forma muy raramente cuando la joya\nTeracristal de un Pokémon teracristalizado se quiebra\ntras derrotarlo."
    ko: "테라스탈 포켓몬이 쓰러졌을 때\n부서진 테라스탈 주얼이\n드물게 결정화한 조각."
    zh_simp: "打倒太晶宝可梦时，\n破碎掉的太晶宝石有\n极低概率会结晶成此物。"
    zh_trad: "太晶寶可夢倒下時，\n碎裂的太晶寶石在罕見的情況下\n會結晶化，而形成此物。"
electrium_z:bag:
  names:
    jp_kana: デンキＺ
    jp_kanji: デンキＺ
    en: Electrium Z
    fr: Voltazélite
    it: Electrium Z
    de: Voltium Z
    es: Electrostal Z
    ko: 전기Z
    zh_simp: 电Ｚ
    zh_trad: 電Ｚ
  descriptions:
    jp_kana: "でんきタイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    jp_kanji: "でんきタイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nElectric-type moves to Electric-type Z-Moves."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise son porteur à transformer ses capacités\nde type Électrik en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono ai Pokémon di trasformare le mosse\ndi tipo Elettro in mosse Z."
    de: "Kristallisierte Z-Kraft, die Elektro-Attacken zu\nZ-Attacken aufstuft. Wird bei Bedarf automatisch\nvervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a los\nportadores convertir sus movimientos de tipo Eléctrico\nen movimientos Z."
    ko: "전기타입 기술을\nZ기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将电属性招式升级成\nＺ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把電屬性招式\n升級為Ｚ招式的Ｚ力量結晶。"
electrium_z:held:
  names:
    jp_kana: デンキＺ
    jp_kanji: デンキＺ
    en: Electrium Z
    fr: Voltazélite
    it: Electrium Z
    de: Voltium Z
    es: Electrostal Z
    ko: 전기Z
    zh_simp: 电Ｚ
    zh_trad: 電Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　結晶。\nでんきタイプの　技を\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nでんきタイプの　技を\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Electric-type moves to Z-Moves."
    fr: "Une cristallisation de la Force Z, permettant\nde transformer les capacités de type Électrik\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare le mosse di tipo Elettro\nin mosse Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft\nElektro-Attacken zu Z-Attacken auf."
    es: "Cristal que confiere el Poder Z a los movimientos\nde tipo Eléctrico."
    ko: "Z파워의 결정.\n전기타입 기술을\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将电属性的招式\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把電屬性的招式\n升級為Ｚ招式。"
elekid_fur:
  names:
    jp_kana: エレキッドのけ
    jp_kanji: エレキッドのけ
    en: Elekid Fur
    fr: Poils d’Élekid
    it: Pelo di Elekid
    de: Elekid-Haar
    es: Pelo de Elekid
    ko: 에레키드의털
    zh_simp: 电击怪的毛
    zh_trad: 電擊怪的毛
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
elevator_key:
  names:
    jp_kana: エレベータのキー
    jp_kanji: エレベータのキー
    en: Elevator Key
    fr: Clé Ascenseur
    it: Chiave ascensore
    de: Liftschlüssel
    es: Llave del Ascensor
    ko: 엘리베이터키
    zh_simp: 电梯钥匙
    zh_trad: 電梯鑰匙
  descriptions:
    jp_kana: "フラダリラボに　ある\nエレベータを　動かす　カードキー。\nフレア団の　マークいり。"
    jp_kanji: "フラダリラボに　ある\nエレベータを　動かす　カードキー。\nフレア団の　マークいり。"
    en: "A card key that activates the elevator in Lysandre\nLabs. It is emblazoned with Team Flare’s logo."
    fr: "Un passe de sécurité permettant d’accéder\nà l’ascenseur des Laboratoires Lysandre.\nIl est orné du logo de la Team Flare."
    it: "Tessera magnetica con il simbolo del Team Flare\nche attiva l’ascensore dei Laboratori Elisio."
    de: "Eine Schlüsselkarte mit dem Logo von Team Flare.\nSie aktiviert den Fahrstuhl im Labor von Flordelis."
    es: "Tarjeta con el logotipo del Team Flare que activa el\nascensor de los Laboratorios Lysson."
    ko: "플라드리 래버러토리에 있는\n엘리베이터를 작동시키는 카드키.\n플레어단의 마크가 새겨져 있다."
    zh_simp: "可以启动弗拉达利\n研究所里电梯的钥匙卡。\n上面有着闪焰队的标志。"
    zh_trad: "可以啟動弗拉達利\n研究所裡電梯的鑰匙卡。\n上面有著閃焰隊的標誌。"
elixir:
  names:
    jp_kana: ピーピーエイダー
    jp_kanji: ピーピーエイダー
    en: Elixir
    fr: Élixir
    it: Elisir
    de: Elixier
    es: Elixir
    ko: PP에이더
    zh_simp: ＰＰ多项小补剂
    zh_trad: ＰＰ多項小補劑
  descriptions:
    jp_kana: "ポケモンが　覚えている\n４つの技の　ＰＰを\n１０ずつ　回復する。"
    jp_kanji: "ポケモンが　覚えている\n４つの技の　ＰＰを\n１０ずつ　回復する。"
    en: "A medicine that can be used to restore 10 PP to all\nfour moves that a Pokémon knows."
    fr: Restaure 10 PP de toutes les capacités d’un Pokémon.
    it: "Restituisce 10 PP alle quattro mosse conosciute\ndal Pokémon."
    de: "Füllt die AP aller Attacken eines Pokémon um\n10 Punkte auf."
    es: "Restaura 10 PP de todos los movimientos aprendidos\npor el Pokémon elegido."
    ko: "포켓몬이 기억하고 있는\n4개 기술의 PP를\n10씩 회복한다."
    zh_simp: "能让宝可梦学会的\n４个招式各\n回复１０ＰＰ。"
    zh_trad: "能讓寶可夢已學會的\n４個招式各\n回復１０ＰＰ。"
endorsement:
  names:
    jp_kana: すいせんじょう
    jp_kanji: すいせんじょう
    en: Endorsement
    fr: Recommandation
    it: Referenze
    de: Empfehlungsbrief
    es: Recomendación
    ko: 추천장
    zh_simp: 推荐函
    zh_trad: 推薦函
  descriptions:
    jp_kana: "ジムチャレンジ　という　大会に\n参加　するための　すいせんじょう。"
    jp_kanji: "ジムチャレンジ　という　大会に\n参加　するための　すいせんじょう。"
    en: "A letter of recommendation that you’ll need in order to\nparticipate in the Gym Challenge."
    fr: Une lettre qui permet de participer au Défi des Arènes.
    it: "Lettera necessaria per partecipare alla Sfida delle\nPalestre."
    de: "Ein Empfehlungsschreiben, das benötigt wird, um an\nder Arena-Challenge teilzunehmen."
    es: "Una carta de recomendación necesaria para participar\nen el desafío de los gimnasios."
    ko: "체육관 챌린지라는 대회에\n참가하는 데에 필요한 추천장."
    zh_simp: "用于参加道馆挑战\n这一大赛的推荐函。"
    zh_trad: "參加名為道館挑戰的大賽時\n所需的推薦函。"
energy_powder:
  names:
    jp_kana: ちからのこな
    jp_kanji: ちからのこな
    en: Energy Powder
    fr: Poudrénergie
    it: Polvenergia
    de: Energiestaub
    es: Polvo Energía
    ko: 힘의가루
    zh_simp: 元气粉
    zh_trad: 元氣粉
  descriptions:
    jp_kana: "とても　にがい　粉薬。\nポケモン　１匹の　ＨＰを\n６０だけ　回復する。"
    jp_kanji: "とても　にがい　粉薬。\nポケモン　１匹の　ＨＰを\n６０だけ　回復する。"
    en: "A very bitter medicinal powder. It can be used to\nrestore 60 HP to a Pokémon."
    fr: "Une poudre médicinale très amère.\nRestaure 60 PV d’un Pokémon."
    it: "Rimedio amarissimo in polvere. Restituisce 60 PS\na un Pokémon."
    de: "Ein bitteres medizinisches Pulver, das die KP eines\nPokémon um 60 Punkte auffüllt."
    es: "Polvo medicinal muy amargo que restaura 60 PS de un\nPokémon."
    ko: "매우 쓴 가루약.\n포켓몬 1마리의 HP를\n60만큼 회복한다."
    zh_simp: "非常苦的药粉。\n能让１只宝可梦\n回复６０ＨＰ。"
    zh_trad: "非常苦的藥粉。\n能讓１隻寶可夢\n回復６０ＨＰ。"
energy_root:
  names:
    jp_kana: ちからのねっこ
    jp_kanji: ちからのねっこ
    en: Energy Root
    fr: Racinénergie
    it: Radicenergia
    de: Kraftwurzel
    es: Raíz Energía
    ko: 힘의뿌리
    zh_simp: 元气根
    zh_trad: 元氣根
  descriptions:
    jp_kana: "とても　にがい　ねっこ。\nポケモン　１匹の　ＨＰを\n１２０だけ　回復する。"
    jp_kanji: "とても　にがい　ねっこ。\nポケモン　１匹の　ＨＰを\n１２０だけ　回復する。"
    en: "A very bitter medicinal root. It can be used to restore\n120 HP to a Pokémon."
    fr: "Une racine très amère.\nRestaure 120 PV d’un Pokémon."
    it: Radice amarissima. Restituisce 120 PS a un Pokémon.
    de: "Eine bittere Wurzel, die die KP eines Pokémon um\n120 Punkte auffüllt."
    es: Raíz muy amarga que restaura 120 PS de un Pokémon.
    ko: "매우 쓴 뿌리.\n포켓몬 1마리의 HP를\n120만큼 회복한다."
    zh_simp: "非常苦的根。\n能让１只宝可梦\n回复１２０ＨＰ。"
    zh_trad: "非常苦的根。\n能讓１隻寶可夢\n回復１２０ＨＰ。"
enigma_berry:
  names:
    jp_kana: ナゾのみ
    jp_kanji: ナゾのみ
    en: Enigma Berry
    fr: Baie Enigma
    it: Baccaenigma
    de: Enigmabeere
    es: Baya Enigma
    ko: 의문열매
    zh_simp: 谜芝果
    zh_trad: 謎芝果
  descriptions:
    jp_kana: "ポケモンに　持たせると\n効果バツグンの　技を\n受けたとき　ＨＰを　回復する。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　技を\n受けたとき　ＨＰを　回復する。"
    en: "If a Pokémon holds one of these Berries, it will be able\nto regain some HP if it is hit with a supereffective move."
    fr: "Tenue, cette Baie restaure des PV au Pokémon\ns’il subit une attaque super efficace."
    it: "Se il Pokémon che ha questa bacca subisce una mossa\nsuperefficace, i suoi PS vengono ripristinati."
    de: "Als getragenes Item füllt diese Beere die KP des\nPokémon auf, wenn es von einer sehr effektiven Attacke\ngetroffen wird."
    es: "Si la lleva un Pokémon, le restaura los PS cuando le\nalcanza un ataque supereficaz."
    ko: "포켓몬에게 지니게 하면\n효과가 굉장한 기술로\n공격받았을 때 HP를 회복한다."
    zh_simp: "让宝可梦携带后，\n在受到效果绝佳的招式攻击时，\n可以回复ＨＰ。"
    zh_trad: "讓寶可夢攜帶後，\n在受到效果絕佳的招式\n攻擊時，可以回復ＨＰ。"
enigma_stone:
  names:
    jp_kana: なぞのすいしょう
    jp_kanji: なぞのすいしょう
    en: Enigma Stone
    fr: Mystécristal
    it: Misticristal
    de: Mytokristall
    es: Misticristal
    ko: 수수께끼의수정
    zh_simp: 谜之水晶
    zh_trad: 謎之水晶
  descriptions:
    jp_kana: "地面から　掘りだされた\nすいしょうだま。いわと　つちで\nおおわれているが　とても　きれい。"
    jp_kanji: "地面から　掘りだされた\nすいしょうだま。いわと　つちで\nおおわれているが　とても　きれい。"
    en: "A crystal ball that was excavated from the ground.\nIt is covered with bits of rock and earth, but it is still\nvery beautiful."
    fr: "Un orbe cristallin fraîchement déterré.\nIl est encore pris dans une gangue de terre et de roche."
    it: "Cristallo appena estratto dal suolo. Bellissimo malgrado\nsia ancora ricoperto di resti di roccia e terra."
    de: "Eine kristallene Kugel, die aus der Erde geborgen\nwurde. Schmutz und Gestein konnten ihrer Schönheit\nnichts anhaben."
    es: "Esfera cristalina encontrada bajo tierra. A pesar de estar\ncubierta de roca y tierra, su belleza es increíble."
    ko: "땅에서 파 올린\n수정구슬. 바위랑 흙으로\n뒤덮여 있지만 매우 아름답다."
    zh_simp: "从地下挖出的水晶球。\n虽然表面覆盖着岩石和尘土，\n但非常漂亮。"
    zh_trad: "從地下挖出的水晶球。\n雖然表面覆蓋著岩石和塵土，\n但非常漂亮。"
enigmatic_card:
  names:
    jp_kana: あやしいカード
    jp_kanji: あやしいカード
    en: Enigmatic Card
    fr: Message Mystère
    it: Lettera segreta
    de: Seltsame Karte
    es: Nota Intrigante
    ko: 괴상한카드
    zh_simp: 奇异卡片
    zh_trad: 奇異卡片
  descriptions:
    jp_kana: "「アーカラ島　８番道路の\nモーテル　客室　にて　待つ」と\n書かれた　謎の　カード。"
    jp_kanji: "「アーカラ島　８番道路の\nモーテル　客室　にて　待つ」と\n書かれた　謎の　カード。"
    en: "A mysterious card. Written on it is a request that you go\nto a guest room in the motel on Akala Island’s Route 8."
    fr: "Une carte étrange sur laquelle quelqu’un a écrit :\n« Je t’attends dans une chambre du motel de\nla Route 8 sur l’île d’Akala. »"
    it: "Biglietto misterioso. C’è scritto: \"Ti aspetto in una stanza\ndel motel di Akala, lungo il Percorso 8\"."
    de: "Eine rätselhafte Karte, auf der Folgendes steht:\n„Ich warte im Motel am Rand von Route 8 auf Akala.“"
    es: "Misteriosa nota que reza: \"Te espero en una habitación\ndel motel de la Ruta 8 en Akala\"."
    ko: "“아칼라섬 8번도로의\n모텔 객실에서 기다리겠다”라고\n적혀 있는 의문의 카드."
    zh_simp: "上面写有“在阿卡拉岛８号道路的\n汽车旅馆客房里等”的谜之卡片。"
    zh_trad: "上面寫有「在阿卡拉島８號道路的\n汽車旅館客房裡等」的\n謎之卡片。"
entei_treat:
  names:
    jp_kana: エンテイのおやつ
    jp_kanji: エンテイのおやつ
    en: Entei Treat
    fr: Friandise Entei
    it: Spuntino per Entei
    de: Entei-Snack
    es: Galleta Entei
    ko: 앤테이의간식
    zh_simp: 炎帝的点心
    zh_trad: 炎帝的點心
  descriptions:
    jp_kana: "伝説のポケモン　エンテイが\n好む食材で　作られた　おやつ。"
    jp_kanji: "伝説のポケモン　エンテイが\n好む食材で　作られた　おやつ。"
    en: "A snack made from ingredients favored by the\nLegendary Pokémon Entei."
    fr: "Une friandise préparée avec les ingrédients favoris\ndu Pokémon légendaire Entei."
    it: "Uno spuntino fatto con gli ingredienti preferiti\ndal Pokémon leggendario Entei."
    de: "Dieser Snack wurde mit den Lieblingszutaten des\nLegendären Pokémon Entei zubereitet."
    es: "Galleta preparada con los ingredientes favoritos\ndel Pokémon legendario Entei."
    ko: "전설의 포켓몬 앤테이가\n좋아하는 식재료로 만들어진 간식."
    zh_simp: "用传说的宝可梦炎帝\n喜欢的食材制作的点心。"
    zh_trad: "用傳說的寶可夢炎帝\n喜愛的食材製成的點心。"
eon_flute:
  names:
    jp_kana: むげんのふえ
    jp_kanji: むげんのふえ
    en: Eon Flute
    fr: Flûte Éon
    it: Flauto Eone
    de: Äon-Flöte
    es: Flauta Eón
    ko: 무한의피리
    zh_simp: 无限之笛
    zh_trad: 無限之笛
  descriptions:
    jp_kana: "どこに　いても\nラティオスや　ラティアスを\n呼び寄せることが　できる　笛。"
    jp_kanji: "どこに　いても\nラティオスや　ラティアスを\n呼び寄せることが　できる　笛。"
    en: "A flute that can be used to summon Latios or Latias\nno matter where you are."
    fr: "Une flûte capable d’appeler Latios ou Latias\noù que l’on soit."
    it: "Suonando questo flauto è possibile richiamare\nLatios o Latias ovunque ci si trovi."
    de: "Eine Flöte, mit der man Latios oder Latias herbeirufen\nkann, egal wo sie sich gerade befinden."
    es: "Flauta capaz de invocar a Latios o Latias en cualquier\nlugar."
    ko: "어디에 있든지\n라티오스나 라티아스를\n부를 수 있는 피리."
    zh_simp: "无论身在何处，\n都能召唤拉帝欧斯或\n拉帝亚斯的笛子。"
    zh_trad: "無論身在何處，\n都能召喚拉帝歐斯或\n拉帝亞斯的笛子。"
eon_ticket:
  names:
    jp_kana: むげんのチケット
    jp_kanji: むげんのチケット
    en: Eon Ticket
    fr: Passe Éon
    it: Biglietto Eone
    de: Äon-Ticket
    es: Ticket Eón
    ko: 무한티켓
    zh_simp: 无限船票
    zh_trad: 無限船票
  descriptions:
    jp_kana: "南の孤島へ　行く　船の\nチケット。トウカジムの　ジムリーダー\nセンリが　秘密を　知っている！？"
    jp_kanji: "南の孤島へ　行く　船の\nチケット。トウカジムの　ジムリーダー\nセンリが　秘密を　知っている！？"
    en: "The ticket required for sailing on a ferry to the\nSouthern Island. Does Norman, the Petalburg Gym\nLeader, know a secret?!"
    fr: "Un billet de ferry pour l’Île du Sud.\nNorman, le Champion de l’Arène de Clémenti-Ville,\nsemble savoir quelque chose à son sujet."
    it: "Biglietto per il traghetto che porta all’Isola Remota.\nNorman, il Capopalestra di Petalipoli, dovrebbe\nsapere come usarlo."
    de: "Ein Bootsticket, mit dem du zu einer fernen Insel im\nSüden schippern kannst. Kennt der Arenaleiter von\nBlütenburg, Norman, ein Geheimnis?!"
    es: "Billete de barco para viajar a Isla del Sur. Es posible que\nNorman, Líder de Gimnasio de Ciudad Petalia, sepa\nalgo al respecto."
    ko: "남쪽의 외딴섬으로 가는 배의\n승선티켓. 등화체육관 관장\n종길이 비밀을 알고 있다!?"
    zh_simp: "前往南方孤岛的船票。\n橙华道馆的馆主千里\n知道其中的秘密！？"
    zh_trad: "前往南方孤島的船票。\n橙華道館的館主千里\n知道其中的秘密！？"
escape_rope:
  names:
    jp_kana: あなぬけのヒモ
    jp_kanji: あなぬけのヒモ
    en: Escape Rope
    fr: Corde Sortie
    it: Fune di fuga
    de: Fluchtseil
    es: Cuerda Huida
    ko: 동굴탈출로프
    zh_simp: 离洞绳
    zh_trad: 離洞繩
  descriptions:
    jp_kana: "長くて　丈夫なヒモ。洞窟や\nダンジョンから　抜け出すことが　できる。\n何度でも　使える。"
    jp_kanji: "長くて　丈夫なヒモ。洞窟や\nダンジョンから　抜け出すことが　できる。\n何度でも　使える。"
    en: "A long and durable rope. Use it to escape instantly\nfrom locations like caves or dungeons. It can be used\nany number of times."
    fr: "Une corde longue et solide permettant de sortir\nrapidement d’une grotte ou d’un donjon.\nElle peut être utilisée à volonté."
    it: "Corda lunga e resistente che si usa per fuggire dalle\ngrotte o da certi luoghi chiusi. Può essere utilizzata\npiù volte."
    de: "Ein langes, festes Seil, das die sofortige Flucht aus\nHöhlen oder Ähnlichem ermöglicht. Kann beliebig\noft verwendet werden."
    es: "Cuerda larga y resistente que sirve para huir de cuevas\ny sitios cerrados en general. Puede usarse tantas veces\ncomo se quiera."
    ko: "길고 튼튼한 끈. 동굴이나\n던전에서 빠져나올 수 있다.\n몇 번이든 쓸 수 있다."
    zh_simp: "结实的长绳。\n可以从洞窟或迷宫中脱身。\n能够反复使用。"
    zh_trad: "結實的長繩。\n可以從洞窟或迷宮中脫身。\n可重複使用。"
espurr_fur:
  names:
    jp_kana: ニャスパーのけ
    jp_kanji: ニャスパーのけ
    en: Espurr Fur
    fr: Poils de Psystigri
    it: Pelo di Espurr
    de: Psiau-Haar
    es: Pelo de Espurr
    ko: 냐스퍼의털
    zh_simp: 妙喵的毛
    zh_trad: 妙喵的毛
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
eternal_ice:
  names:
    jp_kana: えいえんのこおり
    jp_kanji: えいえんのこおり
    en: Eternal Ice
    fr: Glaçon Éternel
    it: Ghiaccio perenne
    de: Perma-Eis
    es: Hielo Eterno
    ko: 영원한얼음
    zh_simp: 永恒之冰
    zh_trad: 永恆之冰
  descriptions:
    jp_kana: "雪原キング　クレベースが\n好んでいる氷柱。　大昔にいた\nクレベースの一部といわれる。"
    jp_kanji: "雪原キング　クレベースが\n好んでいる氷柱。　大昔にいた\nクレベースの一部といわれる。"
    en: "A type of ice beloved by the Lord of the Tundra,\nAvalugg. This ice is said to be fragments of ancient\nAvalugg that lived long ago."
    fr: "Un morceau de glace apprécié de Séracrawl,\nle Roi des Plaines Enneigées. On raconte que\nce serait le fragment d’un Séracrawl d’autrefois."
    it: "Pezzo di ghiaccio molto amato da Avalugg, il Re delle\nnevi. Si racconta che sia un frammento del corpo di un\nAvalugg vissuto in tempi remoti."
    de: "Ein Eisklumpen, der Arktilas, dem König des Schneefelds,\nviel Freude bereitet. Es heißt, er sei ein Fragment von\neinem Arktilas, das vor langer Zeit lebte."
    es: "Carámbano muy preciado por Avalugg, el Señor de las\nNieves. Se cree que se trata del fragmento de un\nAvalugg que vivió en tiempos inmemoriales."
    ko: "설원의 왕 크레베이스가\n좋아하는 얼음 기둥. 먼 옛날에 살던\n크레베이스의 일부라고 전해진다."
    zh_simp: "雪原王冰岩怪喜爱的冰柱。\n据说是遥远过去的某只\n冰岩怪身体的一部分。"
    zh_trad: "雪原王冰岩怪喜愛的冰柱。\n據說是遙遠過去的某隻\n冰岩怪身體的一部分。"
ether:
  names:
    jp_kana: ピーピーエイド
    jp_kanji: ピーピーエイド
    en: Ether
    fr: Huile
    it: Etere
    de: Äther
    es: Éter
    ko: PP에이드
    zh_simp: ＰＰ单项小补剂
    zh_trad: ＰＰ單項小補劑
  descriptions:
    jp_kana: "ポケモンが　覚えている\n技のうち　１つのＰＰを\n１０だけ　回復する。"
    jp_kanji: "ポケモンが　覚えている\n技のうち　１つのＰＰを\n１０だけ　回復する。"
    en: "A medicine that can be used to restore 10 PP to a single\nmove that a Pokémon knows."
    fr: Restaure 10 PP d’une capacité sélectionnée.
    it: "Restituisce un massimo di 10 PP a una mossa tra quelle\nconosciute dal Pokémon."
    de: "Füllt die AP einer ausgewählten Attacke eines Pokémon\num 10 Punkte auf."
    es: Restaura 10 PP del movimiento elegido de un Pokémon.
    ko: "포켓몬이 기억하고 있는\n기술 중 1개의 PP를\n10만큼 회복한다."
    zh_simp: "能让宝可梦学会的\n其中１个招式\n回复１０ＰＰ。"
    zh_trad: "能讓寶可夢已學會的\n其中１個招式\n回復１０ＰＰ。"
everstone:
  names:
    jp_kana: かわらずのいし
    jp_kanji: かわらずのいし
    en: Everstone
    fr: Pierre Stase
    it: Pietrastante
    de: Ewigstein
    es: Piedra Eterna
    ko: 변함없는돌
    zh_simp: 不变之石
    zh_trad: 不變之石
  descriptions:
    jp_kana: "ポケモンに　持たせると\nそのあいだ　進化しなくなる\n不思議な石。"
    jp_kanji: "ポケモンに　持たせると\nそのあいだ　進化しなくなる\n不思議な石。"
    en: "An item to be held by a Pokémon. A Pokémon holding\nthis peculiar stone is prevented from evolving."
    fr: "Objet à tenir. Une pierre étrange empêchant\nl’évolution."
    it: "Strumento da dare a un Pokémon.\nChi ha questa pietra particolare evita l’evoluzione."
    de: Ein Item zum Tragen. Es bewirkt einen Entwicklungsstopp.
    es: El Pokémon que lleva esta piedra mágica no evoluciona.
    ko: "포켓몬에게 지니게 하면\n지닌 동안에는 진화하지 않게 되는\n이상한 돌."
    zh_simp: "携带后，宝可梦在此期间\n不会进化的神奇石头。"
    zh_trad: "攜帶後，寶可夢在此期間\n不會進化的神奇石頭。"
eviolite:
  names:
    jp_kana: しんかのきせき
    jp_kanji: しんかのきせき
    en: Eviolite
    fr: Évoluroc
    it: Evolcondensa
    de: Evolith
    es: Mineral Evolutivo
    ko: 진화의휘석
    zh_simp: 进化奇石
    zh_trad: 進化奇石
  descriptions:
    jp_kana: "進化の不思議な　かたまり。\n持たせると　進化前ポケモンの\n防御と　特防が　あがる。"
    jp_kanji: "進化の不思議な　かたまり。\n持たせると　進化前ポケモンの\n防御と　特防が　あがる。"
    en: "An item to be held by a Pokémon. This mysterious\nevolutionary lump boosts the Defense and Sp. Def\nstats when held by a Pokémon that can still evolve."
    fr: "Objet à tenir. Un étrange concentré d’évolution\nqui augmente la Défense et la Défense Spéciale\nd’un Pokémon pouvant évoluer."
    it: "Misterioso concentrato di materia evolutiva.\nAumenta la Difesa e la Difesa Speciale di un\nPokémon che può ancora evolversi."
    de: "Ein mysteriöser Klumpen, der die Verteidigung und\nSpezial-Verteidigung von Pokémon erhöht, die sich\nnoch entwickeln können."
    es: "Roca misteriosa. El Pokémon portador aumentará su\nDefensa y su Defensa Especial si aún puede\nevolucionar."
    ko: "진화의 이상한 덩어리.\n지니게 하면 진화 전 포켓몬의\n방어와 특수방어가 올라간다."
    zh_simp: "进化的神奇石块。\n携带后，还能进化的宝可梦的\n防御和特防就会提高。"
    zh_trad: "進化的神奇石塊。\n攜帶後，還能進化的寶可夢的\n防禦和特防就會提高。"
exeggcute_candy:
  names:
    jp_kana: タマタマのアメ
    jp_kanji: タマタマのアメ
    en: Exeggcute Candy
    fr: Bonbon Noeunoeuf
    it: Caramella Exeggcute
    de: Owei-Bonbon
    es: Caramelo Exeggcute
    ko: 아라리의사탕
    zh_simp: 蛋蛋的糖果
    zh_trad: 蛋蛋的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
exeggcute_shell:
  names:
    jp_kana: タマタマのから
    jp_kanji: タマタマのから
    en: Exeggcute Shell
    fr: Coquille de Noeunoeuf
    it: Guscio di Exeggcute
    de: Owei-Schale
    es: Cáscara de Exeggcute
    ko: 아라리의껍데기
    zh_simp: 蛋蛋的壳
    zh_trad: 蛋蛋的殼
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
exercise_ball:
  names:
    jp_kana: バランスボール
    jp_kanji: バランスボール
    en: Exercise Ball
    fr: Ballon d’Exercice
    it: Palla fitness
    de: Gymnastik-Ball
    es: Pelota Pilates
    ko: 밸런스볼
    zh_simp: 瑜珈球
    zh_trad: 瑜珈球
  descriptions:
    jp_kana: "エクササイズ用の　大きなボール。\nうまく乗れば　体幹を　鍛えられる。\n飽きても　椅子として　使える。"
    jp_kanji: "エクササイズ用の　大きなボール。\nうまく乗れば　体幹を　鍛えられる。\n飽きても　椅子として　使える。"
    en: "A big ball designed for exercising. It can work as a seat\nif you get tired, too."
    fr: "Un gros ballon conçu pour faire de l’exercice.\nIl peut aussi servir de chaise quand on fatigue."
    it: "Grossa palla per fare esercizio. Se ci si stufa, può\ncomunque essere usata come sedia."
    de: "Ein großer Ball für Gymnastikübungen. Er eignet sich\naußerdem als Sitzgelegenheit, wenn man eine\nVerschnaufpause braucht."
    es: "Una pelota grande para hacer ejercicio. Si uno se cansa,\nse puede emplear a modo de silla."
    ko: "큰 사이즈의 운동용 볼.\n제대로 올라타면 코어 근육을 단련할 수 있다.\n질리면 의자로 활용할 수 있다."
    zh_simp: "健身用的大球。若能漂亮地\n乘上去，便可以锻炼体干。\n当厌倦锻炼了，还能当椅子使用。"
    zh_trad: "運動用的大球。\n穩坐在其上能鍛鍊到軀幹。\n即使覺得膩了，也能當椅子使用。"
exp_candy_l:
  names:
    jp_kana: けいけんアメＬ
    jp_kanji: けいけんアメＬ
    en: Exp. Candy L
    fr: Bonbon Exp. L
    it: Caram. esp. L
    de: EP-Bonbon L
    es: Caramelo Exp. L
    ko: 경험사탕L
    zh_simp: 经验糖果Ｌ
    zh_trad: 經驗糖果Ｌ
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n与えると　ポケモン　１匹の\n経験値が　かなり　増える。"
    jp_kanji: "エネルギーの　つまった　アメ。\n与えると　ポケモン　１匹の\n経験値が　かなり　増える。"
    en: "A candy that is packed with energy. If consumed,\nit grants a Pokémon a large number of Exp. Points."
    fr: "Un bonbon plein d’énergie. Il permet à un Pokémon de\ngagner une grande quantité de Points d’Expérience."
    it: "Caramella piena zeppa di energia che aumenta di molto\ni Punti Esperienza di un Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Beim Verzehr\nerhält das Pokémon eine große Menge an\nErfahrungspunkten."
    es: "Caramelo energético que aumenta bastante los puntos\nde experiencia de un Pokémon."
    ko: "에너지가 가득한 사탕.\n먹이면 포켓몬 1마리의\n경험치가 많이 올라간다."
    zh_simp: "充满能量的糖果。\n交给１只宝可梦后，\n可以为它增加许多经验值。"
    zh_trad: "充滿能量的糖果。\n餵給寶可夢後，\n能讓１隻寶可夢增加許多經驗值。"
exp_candy_m:
  names:
    jp_kana: けいけんアメＭ
    jp_kanji: けいけんアメＭ
    en: Exp. Candy M
    fr: Bonbon Exp. M
    it: Caram. esp. M
    de: EP-Bonbon M
    es: Caramelo Exp. M
    ko: 경험사탕M
    zh_simp: 经验糖果Ｍ
    zh_trad: 經驗糖果Ｍ
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n与えると　ポケモン　１匹の\n経験値が　増える。"
    jp_kanji: "エネルギーの　つまった　アメ。\n与えると　ポケモン　１匹の\n経験値が　増える。"
    en: "A candy that is packed with energy. If consumed,\nit grants a Pokémon a moderate number of Exp. Points."
    fr: "Un bonbon plein d’énergie. Il permet à un Pokémon de\ngagner une quantité moyenne de Points d’Expérience."
    it: "Caramella piena zeppa di energia che aumenta\nmoderatamente i Punti Esperienza di un Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Beim Verzehr\nerhält das Pokémon eine gewisse Menge an\nErfahrungspunkten."
    es: "Caramelo energético que aumenta los puntos de\nexperiencia de un Pokémon."
    ko: "에너지가 가득한 사탕.\n먹이면 포켓몬 1마리의\n경험치가 올라간다."
    zh_simp: "充满能量的糖果。\n交给１只宝可梦后，\n可以为它增加经验值。"
    zh_trad: "充滿能量的糖果。\n餵給寶可夢後，\n能讓１隻寶可夢增加經驗值。"
exp_candy_s:
  names:
    jp_kana: けいけんアメＳ
    jp_kanji: けいけんアメＳ
    en: Exp. Candy S
    fr: Bonbon Exp. S
    it: Caram. esp. S
    de: EP-Bonbon S
    es: Caramelo Exp. S
    ko: 경험사탕S
    zh_simp: 经验糖果Ｓ
    zh_trad: 經驗糖果Ｓ
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n与えると　ポケモン　１匹の\n経験値が　少し　増える。"
    jp_kanji: "エネルギーの　つまった　アメ。\n与えると　ポケモン　１匹の\n経験値が　少し　増える。"
    en: "A candy that is packed with energy. If consumed,\nit grants a Pokémon a small number of Exp. Points."
    fr: "Un bonbon plein d’énergie. Il permet à un Pokémon de\ngagner une petite quantité de Points d’Expérience."
    it: "Caramella piena zeppa di energia che aumenta di poco\ni Punti Esperienza di un Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Beim Verzehr\nerhält das Pokémon eine geringe Menge an\nErfahrungspunkten."
    es: "Caramelo energético que aumenta ligeramente los\npuntos de experiencia de un Pokémon."
    ko: "에너지가 가득한 사탕.\n먹이면 포켓몬 1마리의\n경험치가 조금 올라간다."
    zh_simp: "充满能量的糖果。\n交给１只宝可梦后，\n可以为它增加少许经验值。"
    zh_trad: "充滿能量的糖果。\n餵給寶可夢後，\n能讓１隻寶可夢增加少量經驗值。"
exp_candy_xl:
  names:
    jp_kana: けいけんアメＸＬ
    jp_kanji: けいけんアメＸＬ
    en: Exp. Candy XL
    fr: Bonbon Exp. XL
    it: Caram. esp. XL
    de: EP-Bonbon XL
    es: Caramelo Exp. XL
    ko: 경험사탕XL
    zh_simp: 经验糖果ＸＬ
    zh_trad: 經驗糖果ＸＬ
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n与えると　ポケモン　１匹の\n経験値が　とても　増える。"
    jp_kanji: "エネルギーの　つまった　アメ。\n与えると　ポケモン　１匹の\n経験値が　とても　増える。"
    en: "A candy that is packed with energy. If consumed,\nit grants a Pokémon a very large number of Exp. Points."
    fr: "Un bonbon plein d’énergie. Il permet à un Pokémon de\ngagner une très grande quantité de Points d’Expérience."
    it: "Caramella piena zeppa di energia che aumenta\nmoltissimo i Punti Esperienza di un Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Beim Verzehr\nerhält das Pokémon eine sehr große Menge an\nErfahrungspunkten."
    es: "Caramelo energético que aumenta mucho los puntos\nde experiencia de un Pokémon."
    ko: "에너지가 가득한 사탕.\n먹이면 포켓몬 1마리의\n경험치가 매우 많이 올라간다."
    zh_simp: "充满能量的糖果。\n交给１只宝可梦后，\n可以为它增加大量经验值。"
    zh_trad: "充滿能量的糖果。\n餵給寶可夢後，\n能讓１隻寶可夢增加大量經驗值。"
exp_candy_xs:
  names:
    jp_kana: けいけんアメＸＳ
    jp_kanji: けいけんアメＸＳ
    en: Exp. Candy XS
    fr: Bonbon Exp. XS
    it: Caram. esp. XS
    de: EP-Bonbon XS
    es: Caramelo Exp. XS
    ko: 경험사탕XS
    zh_simp: 经验糖果ＸＳ
    zh_trad: 經驗糖果ＸＳ
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n与えると　ポケモン　１匹の\n経験値が　ほんの少し　増える。"
    jp_kanji: "エネルギーの　つまった　アメ。\n与えると　ポケモン　１匹の\n経験値が　ほんの少し　増える。"
    en: "A candy that is packed with energy. If consumed,\nit grants a Pokémon a very small number of Exp. Points."
    fr: "Un bonbon plein d’énergie. Il permet à un Pokémon de\ngagner une très petite quantité de Points d’Expérience."
    it: "Caramella piena zeppa di energia che aumenta\ndi pochissimo i Punti Esperienza di un Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Beim Verzehr\nerhält das Pokémon eine sehr geringe Menge an\nErfahrungspunkten."
    es: "Caramelo energético que aumenta ligerísimamente los\npuntos de experiencia de un Pokémon."
    ko: "에너지가 가득한 사탕.\n먹이면 포켓몬 1마리의\n경험치가 아주 조금 올라간다."
    zh_simp: "充满能量的糖果。\n交给１只宝可梦后，\n可以为它增加一点点经验值。"
    zh_trad: "充滿能量的糖果。\n餵給寶可夢後，\n能讓１隻寶可夢增加些微經驗值。"
exp_charm:
  names:
    jp_kana: けいけんおまもり
    jp_kanji: けいけんおまもり
    en: Exp. Charm
    fr: Charme Exp
    it: Esperienzamuleto
    de: EP-Pin
    es: Amuleto Experiencia
    ko: 경험부적
    zh_simp: 经验护符
    zh_trad: 經驗護符
  descriptions:
    jp_kana: "持っていると　ポケモンが　得られる\n経験値が　増える\n不思議で　よくのびる　おまもり。"
    jp_kanji: "持っていると　ポケモンが　得られる\n経験値が　増える\n不思議で　よくのびる　おまもり。"
    en: "Having one of these charms increases the Exp. Points\nyour Pokémon get. It’s a strange, stretchy charm that\nencourages growth."
    fr: "Un mystérieux charme élastique qui permet aux Pokémon\nde gagner davantage de Points d’Expérience."
    it: "Un amuleto stranamente elastico che fa aumentare\ni Punti Esperienza che i Pokémon possono ottenere."
    de: "Ein mysteriöser, elastischer Glücksbringer, durch den\nPokémon mehr Erfahrungspunkte erhalten."
    es: "Misterioso amuleto elástico que aumenta los puntos de\nexperiencia que reciben los Pokémon."
    ko: "지니고 있으면 포켓몬이 받는\n경험치가 늘어나는\n이상하고 잘 늘어나는 부적."
    zh_simp: "能够伸得很长的神奇护符。\n训练家拥有它之后，\n宝可梦获得的经验值就会增加。"
    zh_trad: "能夠伸得很長的神奇護符。\n只要擁有它，寶可夢能獲得的\n經驗值就會增加。"
exp_share:
  names:
    jp_kana: がくしゅうそうち
    jp_kanji: がくしゅうそうち
    en: Exp. Share
    fr: Multi Exp
    it: Condividi esperienza
    de: EP-Teiler
    es: Repartir Experiencia
    ko: 학습장치
    zh_simp: 学习装置
    zh_trad: 學習裝置
  descriptions:
    jp_kana: "スイッチを　いれると\n手持ちのポケモン　すべてが\n経験値を　もらえる　装置。"
    jp_kanji: "スイッチを　いれると\n手持ちのポケモン　すべてが\n経験値を　もらえる　装置。"
    en: "Turning on this special device will allow all the Pokémon\non your team to share in Exp. Points gained."
    fr: "Objet à activer. Il permet de faire gagner des Points\nd’Expérience à tous les Pokémon de l’équipe."
    it: "Se attivato, tutti i Pokémon della squadra ricevono\nPunti Esperienza dalla lotta."
    de: "Solange der EP-Teiler angeschaltet ist, erhält jedes\nTeam-Pokémon nach einem Sieg Erfahrungspunkte."
    es: "Al activar el dispositivo, todos los Pokémon de tu\nequipo ganan puntos de experiencia tras los combates."
    ko: "스위치를 켜면\n지닌 포켓몬 모두가\n경험치를 받을 수 있는 장치."
    zh_simp: "打开开关后，\n能让同行的所有宝可梦\n获得经验值的装置。"
    zh_trad: "打開開關後，\n同行的所有寶可夢\n都可獲得經驗值的裝置。"
expert_belt:
  names:
    jp_kana: たつじんのおび
    jp_kanji: たつじんのおび
    en: Expert Belt
    fr: Ceinture Pro
    it: Abilcintura
    de: Expertengurt
    es: Cinta Experto
    ko: 달인의띠
    zh_simp: 达人带
    zh_trad: 達人帶
  descriptions:
    jp_kana: "使いこまれた　黒い帯。\n持たせると　効果バツグンのとき\n技の威力が　少し　あがる。"
    jp_kanji: "使いこまれた　黒い帯。\n持たせると　効果バツグンのとき\n技の威力が　少し　あがる。"
    en: "An item to be held by a Pokémon. It’s a well-worn\nbelt that slightly boosts the power of the holder’s\nsupereffective moves."
    fr: "Objet à tenir. Une ceinture usée qui augmente\nlégèrement la puissance des capacités super efficaces."
    it: "Strumento da dare a un Pokémon. Cintura consumata\nche potenzia di poco le mosse superefficaci."
    de: "Ein Item zum Tragen. Dieser alte Gürtel verstärkt\nsehr effektive Attacken."
    es: "Potencia ligeramente los movimientos supereficaces.\nDebe llevarla un Pokémon."
    ko: "오래 사용한 까만 띠.\n지니게 하면 효과가 뛰어날 때\n기술의 위력이 조금 올라간다."
    zh_simp: "用惯了的黑色带子。\n携带后，效果绝佳时的\n招式威力就会少量提高。"
    zh_trad: "用慣了的黑色帶子。\n攜帶後，效果絕佳時的\n招式威力就會少量提高。"
explorer_kit:
  names:
    jp_kana: たんけんセット
    jp_kanji: たんけんセット
    en: Explorer Kit
    fr: Explorakit
    it: Esplorokit
    de: Erkundungs-Set
    es: Kit de Explorador
    ko: 탐험세트
    zh_simp: 探险套装
    zh_trad: 探險組合
  descriptions:
    jp_kana: "探検に役立つ　便利な\n道具が　はいった　ふくろ。\n地下通路に　はいれる。"
    jp_kanji: "探検に役立つ　便利な\n道具が　はいった　ふくろ。\n地下通路に　はいれる。"
    en: "A bag filled with convenient tools for exploring.\nIt provides access to the Underground in the\nSinnoh region."
    fr: "Un sac contenant des objets utiles à l’exploration.\nPermet d’entrer dans le Souterrain."
    it: "Utilissimo kit contenente strumenti per l’esplorazione.\nPermette di percorrere i tunnel sotterranei."
    de: "Ein Sack voller hilfreicher Items für Erkundungsgänge.\nÖffnet den Untergrund."
    es: "Una saca donde guardar los objetos útiles para la\nexploración. Permite acceder al Subsuelo."
    ko: "탐험에 도움이 되는 편리한\n도구가 들어 있는 주머니.\n지하통로에 들어갈 수 있다."
    zh_simp: "装着有助于探险且\n方便使用的道具的袋子。\n有了它就可以进入地下通道。"
    zh_trad: "裝著探險時可派上用場的\n好用道具的袋子。\n可以進入地下通道。"
fairium_z:bag:
  names:
    jp_kana: フェアリーＺ
    jp_kanji: フェアリーＺ
    en: Fairium Z
    fr: Nymphézélite
    it: Follectium Z
    de: Sylphium Z
    es: Feeristal Z
    ko: 페어리Z
    zh_simp: 妖精Ｚ
    zh_trad: 妖精Ｚ
  descriptions:
    jp_kana: "フェアリータイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    jp_kanji: "フェアリータイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nFairy-type moves to Fairy-type Z-Moves."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise son porteur à transformer ses capacités\nde type Fée en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono ai Pokémon di trasformare le mosse\ndi tipo Folletto in mosse Z."
    de: "Kristallisierte Z-Kraft, die Feen-Attacken zu Z-Attacken\naufstuft. Wird bei Bedarf automatisch vervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a los\nportadores convertir sus movimientos de tipo Hada en\nmovimientos Z."
    ko: "페어리타입 기술을\nZ기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将妖精属性招式升级成\nＺ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把妖精屬性招式\n升級為Ｚ招式的Ｚ力量結晶。"
fairium_z:held:
  names:
    jp_kana: フェアリーＺ
    jp_kanji: フェアリーＺ
    en: Fairium Z
    fr: Nymphézélite
    it: Follectium Z
    de: Sylphium Z
    es: Feeristal Z
    ko: 페어리Z
    zh_simp: 妖精Ｚ
    zh_trad: 妖精Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　結晶。\nフェアリータイプの　技を\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nフェアリータイプの　技を\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Fairy-type moves to Z-Moves."
    fr: "Une cristallisation de la Force Z, permettant\nde transformer les capacités de type Fée\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare le mosse di tipo Folletto\nin mosse Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft\nFeen-Attacken zu Z-Attacken auf."
    es: "Cristal que confiere el Poder Z a los movimientos\nde tipo Hada."
    ko: "Z파워의 결정.\n페어리타입 기술을\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将妖精属性的招式\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把妖精屬性的招式\n升級為Ｚ招式。"
fairy_feather:
  names:
    jp_kana: ようせいのハネ
    jp_kanji: ようせいのハネ
    en: Fairy Feather
    fr: Plume Enchantée
    it: Piuma fatata
    de: Feendaune
    es: Pluma Feérica
    ko: 요정의깃털
    zh_simp: 妖精之羽
    zh_trad: 妖精之羽
  descriptions:
    jp_kana: "光にあてると　淡く光る　ハネ。\n持たせると　フェアリータイプの\n技の威力が　あがる。"
    jp_kanji: "光にあてると　淡く光る　ハネ。\n持たせると　フェアリータイプの\n技の威力が　あがる。"
    en: "An item to be held by a Pokémon. This feather, which\ngleams faintly when hit by light, boosts the power of\nthe holder’s Fairy-type moves."
    fr: "Objet à tenir. Cette plume augmente la puissance\ndes capacités de type Fée. Elle brille d’une pâle lueur\nlorsqu’on l’expose à la lumière."
    it: "Strumento da dare a un Pokémon. Piuma che brilla\ndebolmente alla luce e potenzia le mosse di tipo\nFolletto."
    de: "Ein Item zum Tragen. Diese Feder, die im Licht sanft\nleuchtet, verstärkt Attacken vom Typ Fee."
    es: "Pluma que brilla tenuemente cuando entra en contacto\ncon la luz y que potencia los movimientos de tipo Hada.\nDebe llevarla un Pokémon."
    ko: "빛에 비추면 희미하게 빛나는 깃털.\n지니게 하면 페어리타입\n기술의 위력이 올라간다."
    zh_simp: "接触到光后就会微微发光的羽毛。\n携带后，妖精属性的\n招式威力就会提高。"
    zh_trad: "被光照到後會微微發光的羽毛。\n攜帶後，妖精屬性的\n招式威力就會提高。"
fairy_gem:
  names:
    jp_kana: ようせいジュエル
    jp_kanji: ようせいジュエル
    en: Fairy Gem
    fr: Joyau Fée
    it: Bijoufolletto
    de: Feenjuwel
    es: Gema Hada
    ko: 페어리주얼
    zh_simp: 妖精宝石
    zh_trad: 妖精寶石
  descriptions:
    jp_kana: "フェアリーの　タイプの　ジュエル。\n持たせると　１度だけ　フェアリーの\n技の　威力が　強まる。"
    jp_kanji: "フェアリーの　タイプの　ジュエル。\n持たせると　１度だけ　フェアリーの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon. This gem is imbued\nwith the essence of fairies and will boost the power\nof a Fairy-type move—but only once."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Fée."
    it: "Strumento da dare a un Pokémon. Gioiello che potenzia\nuna sola volta le mosse di tipo Folletto."
    de: "Ein Item zum Tragen. Dieses Juwel verstärkt einmalig\nAttacken vom Typ Fee."
    es: "Joya de un solo uso que potencia un movimiento de\ntipo Hada. Debe llevarla un Pokémon."
    ko: "페어리타입의 주얼.\n지니게 하면 한 번만 페어리\n기술의 위력이 강해진다."
    zh_simp: "妖精属性的宝石。\n携带后，妖精属性的\n招式威力会仅增强１次。"
    zh_trad: "妖精屬性的寶石。\n攜帶後，妖精屬性的\n招式威力會僅增強１次。"
fairy_memory:
  names:
    jp_kana: フェアリーメモリ
    jp_kanji: フェアリーメモリ
    en: Fairy Memory
    fr: ROM Fée
    it: ROM Folletto
    de: Feen-Disc
    es: Disco Hada
    ko: 페어리메모리
    zh_simp: 妖精存储碟
    zh_trad: 妖精記憶碟
  descriptions:
    jp_kana: "フェアリータイプの　データが　入った\nメモリ。　特定のポケモンが　持つと\nタイプが　変わる。"
    jp_kanji: "フェアリータイプの　データが　入った\nメモリ。　特定のポケモンが　持つと\nタイプが　変わる。"
    en: "A memory disc that contains Fairy-type data.\nIt changes the type of the holder if held by\na certain species of Pokémon."
    fr: "Une carte mémoire contenant des données sur\nle type Fée. Un certain Pokémon peut changer\nde type en l’équipant."
    it: "ROM contenente dati sul tipo Folletto in formato\ndigitale. Permette a un certo Pokémon di cambiare tipo."
    de: "Eine Disc mit Daten zum Typ Fee. Sie löst bei einem\nbestimmten Pokémon einen Typenwechsel aus."
    es: "Disco de datos que contiene información relativa al tipo\nHada. Permite cambiar de tipo a cierto Pokémon."
    ko: "페어리타입의 데이터가 들어 있는\n메모리. 특정 포켓몬이\n지니면 타입이 바뀐다."
    zh_simp: "装有妖精属性数据的存储碟。\n特定宝可梦携带后，\n属性就会发生变化。"
    zh_trad: "裝有妖精屬性資料的記憶碟。\n特定寶可夢攜帶後，\n就會產生屬性的變化。"
fairy_tera_shard:
  names:
    jp_kana: テラピースフェアリー
    jp_kanji: テラピースフェアリー
    en: Fairy Tera Shard
    fr: Téra-Éclat Fée
    it: Teralite Folletto
    de: Tera-Stück (Fee)
    es: Teralito Hada
    ko: 테라피스 페어리
    zh_simp: 妖精太晶碎块
    zh_trad: 妖精太晶碎塊
  descriptions:
    jp_kana: "テラスタルポケモンが　倒れたとき\n砕けた　テラスタルジュエルが\nまれに　結晶化したもの。"
    jp_kanji: "テラスタルポケモンが　倒れたとき\n砕けた　テラスタルジュエルが\nまれに　結晶化したもの。"
    en: "On rare occasions, these shards form when a Tera\nPokémon falls in battle and its Tera Jewel shatters."
    fr: "Un fragment cristallisé qui se forme rarement lors\nde l’éclatement d’un Joyau Téracristal après qu’un\nPokémon Téracristal a été mis K.O."
    it: "Cristallizzazione che raramente si forma quando\nun Pokémon Teracristal viene sconfitto e la sua gemma\nTeracristal va in frantumi."
    de: "In äußerst seltenen Fällen kristallisieren Bruchstücke\ndes Terakristalls von im Kampf besiegten Terakristall-\nPokémon zu solchen Tera-Stücken."
    es: "Esquirla que se forma muy raramente cuando la joya\nTeracristal de un Pokémon teracristalizado se quiebra\ntras derrotarlo."
    ko: "테라스탈 포켓몬이 쓰러졌을 때\n부서진 테라스탈 주얼이\n드물게 결정화한 조각."
    zh_simp: "打倒太晶宝可梦时，\n破碎掉的太晶宝石有\n极低概率会结晶成此物。"
    zh_trad: "太晶寶可夢倒下時，\n碎裂的太晶寶石在罕見的情況下\n會結晶化，而形成此物。"
falinks_sweat:
  names:
    jp_kana: タイレーツのあせ
    jp_kanji: タイレーツのあせ
    en: Falinks Sweat
    fr: Sueur d’Hexadron
    it: Sudore di Falinks
    de: Legios-Schweiß
    es: Sudor de Falinks
    ko: 대여르의땀
    zh_simp: 列阵兵的汗
    zh_trad: 列陣兵的汗
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
fancy_apple:
  names:
    jp_kana: とくせんリンゴ
    jp_kanji: とくせんリンゴ
    en: Fancy Apple
    fr: Pomme Juteuse
    it: Mela prelibata
    de: Luxusapfel
    es: Manzana Selecta
    ko: 특선사과
    zh_simp: 特选苹果
    zh_trad: 特選蘋果
  descriptions:
    jp_kana: "キャンプの　料理に　使う\n食材の　一種。選び抜かれた\nリンゴは　形もよく　光り輝く。"
    jp_kanji: "キャンプの　料理に　使う\n食材の　一種。選び抜かれた\nリンゴは　形もよく　光り輝く。"
    en: "One of the many ingredients that can be used for\ncooking at your camp. An apple chosen above others.\nIt has spectacular form and a brilliant sheen."
    fr: "Un ingrédient de cuisine pour le camping.\nCette pomme a été spécialement sélectionnée\npour sa forme et sa peau brillante."
    it: "Uno degli ingredienti che puoi usare per cucinare\nin campeggio. Queste mele sono selezionate\ncon cura in base alla forma e alla lucentezza."
    de: "Eine Zutat für PokéCamping-Mahlzeiten. Diese\nhandverlesenen Exemplare sind formschön und\nglänzen wunderbar."
    es: "Un ingrediente para cocinar en el campamento. Es\nbrillante y tiene una forma perfecta."
    ko: "캠프 요리에 사용되는\n식재료 중 하나. 엄선된 사과는\n모양도 예쁘고 윤기가 돈다."
    zh_simp: "在露营营地制作料理时会使用的\n一种食材。历经千挑万选的苹果\n不仅形状饱满，表皮更是亮泽鲜艳。"
    zh_trad: "製作露營料理時使用的食材之一。\n經過嚴格挑選的蘋果，\n不但形狀漂亮，而且充滿光澤。"
farfetchd_candy:
  names:
    jp_kana: カモネギのアメ
    jp_kanji: カモネギのアメ
    en: Farfetch’d Candy
    fr: Bonbon Canarticho
    it: Caramella Farfetch’d
    de: Porenta-Bonbon
    es: Caramelo Farfetch’d
    ko: 파오리의사탕
    zh_simp: 大葱鸭的糖果
    zh_trad: 大蔥鴨的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de cierto Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
fashion_case:
  names:
    jp_kana: アクセサリーいれ
    jp_kanji: アクセサリーいれ
    en: Fashion Case
    fr: Coffret Mode
    it: Scatola chic
    de: Modekoffer
    es: Caja Corazón
    ko: 액세서리상자
    zh_simp: 饰品盒
    zh_trad: 飾品盒
  descriptions:
    jp_kana: "ミュージカルで　ポケモンに　つける\nいろとりどりのグッズを　たくさん\nしまえる　きれいで　すてきなケース。"
    jp_kanji: "ミュージカルで　ポケモンに　つける\nいろとりどりのグッズを　たくさん\nしまえる　きれいで　すてきなケース。"
    en: "A wondrous, pretty case to store lots of colorful Props\nfor your Pokémon to wear in a musical."
    fr: "Une boîte permettant de ranger les Parures pour\nhabiller les Pokémon au Music-Hall."
    it: "Scatola bella ed elegante per conservare i gadget\nusati per agghindare i Pokémon durante\nil Pokémon Musical."
    de: "Ein schicker Koffer mit Platz für alle im Musical\nbenötigten Deko-Objekte deiner Pokémon.\nDa knittert nichts."
    es: "Una bonita cajita donde guardar todos los\nComplementos para vestir a los Pokémon en el Teatro\nMusical."
    ko: "뮤지컬에서 포켓몬에게 다는\n각양각색의 굿즈를 많이\n넣을 수 있는 아름답고 멋진 케이스."
    zh_simp: "漂亮精美的盒子。\n可以存放宝可梦出演音乐剧时\n用来装扮自己的多种小物件。"
    zh_trad: "漂亮精美的盒子。\n可以存放多種用來裝扮\n出演音樂劇的寶可夢的小飾品。"
fast_ball:
  names:
    jp_kana: スピードボール
    jp_kanji: スピードボール
    en: Fast Ball
    fr: Speed Ball
    it: Rapid Ball
    de: Turboball
    es: Rapid Ball
    ko: 스피드볼
    zh_simp: 速度球
    zh_trad: 速度球
  descriptions:
    jp_kana: "にげあしのはやい　ポケモンが\n捕まえやすくなる\nちょっと変わった　ボール。"
    jp_kanji: "にげあしのはやい　ポケモンが\n捕まえやすくなる\nちょっと変わった　ボール。"
    en: "A somewhat different Poké Ball that is more effective\nwhen catching Pokémon that are usually very quick to\nrun away."
    fr: "Une Poké Ball un peu spéciale qui fonctionne\nparticulièrement bien sur les Pokémon qui ont\ntendance à fuir."
    it: "Poké Ball un po’ diversa che funziona particolarmente\nbene con i Pokémon bravi a scappare."
    de: "Ein Ball, mit dem sich Pokémon, die schnell weglaufen,\nleichter fangen lassen."
    es: "Poké Ball algo distinta a las demás especialmente\nindicada para capturar Pokémon con tendencia a huir."
    ko: "도주가 빠른 포켓몬이\n잡기 쉬워지는\n조금 특이한 볼."
    zh_simp: "有点与众不同的球。\n能很容易地捕捉\n逃跑速度很快的宝可梦。"
    zh_trad: "有點與眾不同的球。\n能更容易地捉到\n逃跑速度很快的寶可夢。"
favored_mail:
  names:
    jp_kana: だいすきメール
    jp_kanji: だいすきメール
    en: Favored Mail
    fr: Lettre Fan
    it: Messaggio TVB
    de: Faiblebrief
    es: Carta Favoritos
    ko: 애호메일
    zh_simp: 喜爱邮件
    zh_trad: 喜愛郵件
  descriptions:
    jp_kana: "好きなものを　伝える　メールが\n書きやすい　レターペーパー。\nポケモンに　持たせて　使う。"
    jp_kanji: "好きなものを　伝える　メールが\n書きやすい　レターペーパー。\nポケモンに　持たせて　使う。"
    en: "Stationery designed to make it easier to write about\nyour favorite things. Have a Pokémon hold it\nfor delivery."
    fr: "Un papier à lettres idéal pour parler de ce que\nl’on aime. Peut être tenu et livré par un Pokémon."
    it: "Carta da lettere ideale per parlare di ciò che\nsi ama.\nSi usa dandola a un Pokémon."
    de: "Briefpapier, mit dem man jemandem verraten kann,\nwas man gern mag. Gib es einem Pokémon zum Tragen."
    es: "Carta para escribir sobre tus cosas favoritas.\nDebe llevarla un Pokémon para entregarla."
    ko: "좋아하는 것을 전하는 메일을\n쉽게 쓸 수 있는 편지지.\n포켓몬에게 지니게 해서 쓴다."
    zh_simp: "方便写表达自己喜好这类邮件的信纸。\n使用该道具时，\n需要让宝可梦携带着来用。"
    zh_trad: "方便寫表達自己喜好這類郵件的信紙。\n需讓寶可夢攜帶使用。"
feather_ball:
  names:
    jp_kana: フェザーボール
    jp_kanji: フェザーボール
    en: Feather Ball
    fr: Plume Ball
    it: Piuma Ball
    de: Federball
    es: Pluma Ball
    ko: 페더볼
    zh_simp: 飞羽球
    zh_trad: 飛羽球
  descriptions:
    jp_kana: "速くまっすぐに飛ぶボール。\n素早いポケモンや\n空高く飛ぶポケモンの捕獲に有効である。"
    jp_kanji: "速くまっすぐに飛ぶボール。\n素早いポケモンや\n空高く飛ぶポケモンの捕獲に有効である。"
    en: "A ball that flies fast and true—ideal for catching nimble\nPokémon or Pokémon that fly high in the air."
    fr: "Cette Poké Ball fend les airs à toute vitesse, en ligne\ndroite. Elle permet notamment d’attraper les Pokémon\nqui volent ou qui sont très rapides."
    it: "Poké Ball che vola rapida in linea retta.\nÈ efficace per catturare Pokémon veloci e Pokémon\nche volano alti nel cielo."
    de: "Dieser Ball fliegt schnell und gerade. Er eignet sich\nbesonders zum Fangen flinker oder fliegender Pokémon."
    es: "Poké Ball que vuela muy rápido y en línea recta al\nlanzarla. Ideal para capturar Pokémon ágiles o Pokémon\nvoladores."
    ko: "빠르게 똑바로 날아가는 볼.\n재빠른 포켓몬이나\n하늘 높이 나는 포켓몬을 잡을 때 유용하다."
    zh_simp: "能直线高速飞行的球。\n在捕捉动作快速的宝可梦及\n飞在高空的宝可梦时十分有效。"
    zh_trad: "能直線高速飛行的球。\n在捕捉動作快速的寶可夢及\n飛在高空的寶可夢時十分有效。"
feather_ball:recipe:
  names:
    jp_kana: フェザーボール
    jp_kanji: フェザーボール
    en: Feather Ball
    fr: Plume Ball
    it: Piuma Ball
    de: Federball
    es: Pluma Ball
    ko: 페더볼
    zh_simp: 飞羽球
    zh_trad: 飛羽球
  descriptions:
    jp_kana: "フェザーボールのレシピ。　材料は\nぼんぐりのみ×１　そらいろたまいし×１"
    jp_kanji: "フェザーボールのレシピ。　材料は\nぼんぐりのみ×１　そらいろたまいし×１"
    en: "A recipe for crafting Feather Balls from scratch.\nRequired materials: 1 Apricorn and 1 Sky Tumblestone."
    fr: "Méthode pour Plume Ball. Ressources requises :\n1 Noigrume et 1 Galet Azur."
    it: "Ricetta per creare una Piuma Ball. I materiali necessari\nsono 1 Bacca ghicocca e 1 Ciottolo celeste."
    de: "Die Anleitung zur Herstellung eines Federballs.\nBenötigte Materialien: 1 Aprikoko und 1 Azurglanzstein."
    es: "Receta para crear Pluma Balls. Materiales:\n1 Bonguri y 1 Guijarro Celeste."
    ko: "페더볼의 레시피.\n재료: 규토리열매×1 하늘색옥돌×1"
    zh_simp: "飞羽球的材料单。材料是：\n球果果×１　天蓝玉石×１"
    zh_trad: "飛羽球的材料單。材料是：\n球果果×１　天藍玉石×１"
feebas_scales:
  names:
    jp_kana: ヒンバスのうろこ
    jp_kanji: ヒンバスのうろこ
    en: Feebas Scales
    fr: Écaille de Barpau
    it: Squama di Feebas
    de: Barschwa-Schuppe
    es: Escama de Feebas
    ko: 빈티나의비늘
    zh_simp: 丑丑鱼的鳞片
    zh_trad: 醜醜魚的鱗片
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
festival_ticket:
  names:
    jp_kana: フェスチケット
    jp_kanji: フェスチケット
    en: Festival Ticket
    fr: Festicket
    it: Festicket
    de: Festival-Ticket
    es: Festicupón
    ko: 페스티켓
    zh_simp: 圆庆票
    zh_trad: 圓慶票
  descriptions:
    jp_kana: "フェスサークルで　アトラクションを\n開くことが　できる。"
    jp_kanji: "フェスサークルで　アトラクションを\n開くことが　できる。"
    en: "A ticket that allows you to host a mission in\nFestival Plaza."
    fr: "Un ticket qui permet de commencer une mini-quête\nsur la Place Festival."
    it: "Biglietto che permette di dare inizio a un minigioco\nnel Festiplaza."
    de: "Ein Ticket, mit dem man auf dem Festival-Plaza\nSpektakel veranstalten kann."
    es: "Se puede canjear para organizar minijuegos en la\nFesti Plaza."
    ko: "페스서클에서 어트랙션을\n개최할 수 있다."
    zh_simp: "可以在圆庆广场\n开启游乐项目。"
    zh_trad: "可以在圓慶廣場\n開啟遊樂項目。"
fidough_fur:
  names:
    jp_kana: パピモッチのけ
    jp_kanji: パピモッチのけ
    en: Fidough Fur
    fr: Poils de Pâtachiot
    it: Pelo di Fidough
    de: Hefel-Haar
    es: Pelo de Fidough
    ko: 쫀도기의털
    zh_simp: 狗仔包的毛
    zh_trad: 狗仔包的毛
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
fiery_pick:
  names:
    jp_kana: メラメラピック
    jp_kanji: メラメラピック
    en: Fiery Pick
    fr: Pique Volcanique
    it: Stecchino infuocato
    de: Flammen-Pikser
    es: Palillo Ígneo
    ko: 이글이글 픽
    zh_simp: 鸭嘴炎兽三明治签
    zh_trad: 鴨嘴炎獸三明治籤
  descriptions:
    jp_kana: "ブーバーンが　デザインされた　ピック。\n使うと　心なしか　出来立て　ホヤホヤな\nサンドウィッチに　見えると　言われている。"
    jp_kanji: "ブーバーンが　デザインされた　ピック。\n使うと　心なしか　出来立て　ホヤホヤな\nサンドウィッチに　見えると　言われている。"
    en: "A pick designed after Magmortar. It’s said that using\nthis pick makes any sandwich look like it’s fresh out of\nthe oven."
    fr: "Une pique ornée d’un Maganon. Plantée dans\nun Sandwich, elle le rend tout chaud comme s’il\nvenait d’être préparé."
    it: "Stecchino a forma di Magmortar. Pare che usarlo\ndoni ai panini un inspiegabile aspetto di freschezza\ne fragranza."
    de: "Ein Pikser im Design von Magbrant, der ein Sandwich\njederzeit so aussehen lässt, als wäre es gerade frisch\nzubereitet worden."
    es: "Un palillo con forma de Magmortar que, según dicen,\nconfiere a los bocadillos un aspecto de pan tostado y\nrecién horneado la mar de apetecible."
    ko: "마그마번 디자인이 들어간 픽.\n사용하면 기분 탓인지 갓 만들어서\n따끈따끈한 샌드위치처럼 보인다고 한다."
    zh_simp: "设计成鸭嘴炎兽的签子。\n据说使用这种签子会让三明治\n看起来像刚做好的一样热气腾腾。"
    zh_trad: "設計成鴨嘴炎獸造型的小籤。\n據說用了這種小籤能讓三明治\n看起來彷彿剛做好熱騰騰的樣子。"
fighting_gem:
  names:
    jp_kana: かくとうジュエル
    jp_kanji: かくとうジュエル
    en: Fighting Gem
    fr: Joyau Combat
    it: Bijoulotta
    de: Kampfjuwel
    es: Gema Lucha
    ko: 격투주얼
    zh_simp: 格斗宝石
    zh_trad: 格鬥寶石
  descriptions:
    jp_kana: "かくとうのタイプの　ジュエル。\n持たせると　１度だけ　かくとうの\n技の威力が　強まる。"
    jp_kanji: "かくとうのタイプの　ジュエル。\n持たせると　１度だけ　かくとうの\n技の威力が　強まる。"
    en: "An item to be held by a Pokémon. This gem is imbued\nwith the essence of the fighting spirit and will boost the\npower of a Fighting-type move—but only once."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Combat."
    it: "Strumento da dare a un Pokémon. Gioiello che potenzia\nuna sola volta le mosse di tipo Lotta."
    de: "Ein Item zum Tragen. Dieses Juwel verstärkt einmalig\neine Attacke vom Typ Kampf."
    es: "Joya de un solo uso que potencia un movimiento de\ntipo Lucha. Debe llevarla un Pokémon."
    ko: "격투타입의 주얼.\n지니게 하면 한 번만 격투\n기술의 위력이 강해진다."
    zh_simp: "格斗属性的宝石。\n携带后，格斗属性的\n招式威力仅会增强１次。"
    zh_trad: "格鬥屬性的寶石。\n攜帶後，格鬥屬性招式的\n威力會僅增強１次。"
fighting_memory:
  names:
    jp_kana: ファイトメモリ
    jp_kanji: ファイトメモリ
    en: Fighting Memory
    fr: ROM Combat
    it: ROM Lotta
    de: Kampf-Disc
    es: Disco Lucha
    ko: 파이팅메모리
    zh_simp: 战斗存储碟
    zh_trad: 戰鬥記憶碟
  descriptions:
    jp_kana: "かくとうタイプの　データが　入った\nメモリ。　特定の　ポケモンが　持つと\nタイプが　変わる。"
    jp_kanji: "かくとうタイプの　データが　入った\nメモリ。　特定の　ポケモンが　持つと\nタイプが　変わる。"
    en: "A memory disc that contains Fighting-type data.\nIt changes the type of the holder if held by\na certain species of Pokémon."
    fr: "Une carte mémoire contenant des données sur\nle type Combat. Un certain Pokémon peut changer\nde type en l’équipant."
    it: "ROM contenente dati sul tipo Lotta in formato digitale.\nPermette a un certo Pokémon di cambiare tipo."
    de: "Eine Disc mit Daten zum Typ Kampf. Sie löst bei einem\nbestimmten Pokémon einen Typenwechsel aus."
    es: "Disco de datos que contiene información relativa al tipo\nLucha. Permite cambiar de tipo a cierto Pokémon."
    ko: "격투타입의 데이터가 들어 있는\n메모리. 특정 포켓몬이\n지니면 타입이 바뀐다."
    zh_simp: "装有格斗属性数据的存储碟。\n特定宝可梦携带后，\n属性就会发生变化。"
    zh_trad: "裝有格鬥屬性資料的記憶碟。\n特定寶可夢攜帶後，\n就會產生屬性的變化。"
fighting_tera_shard:
  names:
    jp_kana: テラピースかくとう
    jp_kanji: テラピースかくとう
    en: Fighting Tera Shard
    fr: Téra-Éclat Combat
    it: Teralite Lotta
    de: Tera-Stück (Kampf)
    es: Teralito Lucha
    ko: 테라피스 격투
    zh_simp: 格斗太晶碎块
    zh_trad: 格鬥太晶碎塊
  descriptions:
    jp_kana: "テラスタルポケモンが　倒れたとき\n砕けた　テラスタルジュエルが\nまれに　結晶化したもの。"
    jp_kanji: "テラスタルポケモンが　倒れたとき\n砕けた　テラスタルジュエルが\nまれに　結晶化したもの。"
    en: "On rare occasions, these shards form when a Tera\nPokémon falls in battle and its Tera Jewel shatters."
    fr: "Un fragment cristallisé qui se forme rarement lors\nde l’éclatement d’un Joyau Téracristal après qu’un\nPokémon Téracristal a été mis K.O."
    it: "Cristallizzazione che raramente si forma quando\nun Pokémon Teracristal viene sconfitto e la sua gemma\nTeracristal va in frantumi."
    de: "In äußerst seltenen Fällen kristallisieren Bruchstücke\ndes Terakristalls von im Kampf besiegten Terakristall-\nPokémon zu solchen Tera-Stücken."
    es: "Esquirla que se forma muy raramente cuando la joya\nTeracristal de un Pokémon teracristalizado se quiebra\ntras derrotarlo."
    ko: "테라스탈 포켓몬이 쓰러졌을 때\n부서진 테라스탈 주얼이\n드물게 결정화한 조각."
    zh_simp: "打倒太晶宝可梦时，\n破碎掉的太晶宝石有\n极低概率会结晶成此物。"
    zh_trad: "太晶寶可夢倒下時，\n碎裂的太晶寶石在罕見的情況下\n會結晶化，而形成此物。"
fightinium_z:bag:
  names:
    jp_kana: カクトウＺ
    jp_kanji: カクトウＺ
    en: Fightinium Z
    fr: Combazélite
    it: Luctium Z
    de: Battalium Z
    es: Lizastal Z
    ko: 격투Z
    zh_simp: 格斗Ｚ
    zh_trad: 格鬥Ｚ
  descriptions:
    jp_kana: "かくとうタイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    jp_kanji: "かくとうタイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nFighting-type moves to Fighting-type Z-Moves."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise son porteur à transformer ses capacités\nde type Combat en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono ai Pokémon di trasformare le mosse\ndi tipo Lotta in mosse Z."
    de: "Kristallisierte Z-Kraft, die Kampf-Attacken zu\nZ-Attacken aufstuft. Wird bei Bedarf automatisch\nvervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a los\nportadores convertir sus movimientos de tipo Lucha en\nmovimientos Z."
    ko: "격투타입 기술을\nZ기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将格斗属性招式升级成\nＺ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把格鬥屬性招式\n升級為Ｚ招式的Ｚ力量結晶。"
fightinium_z:held:
  names:
    jp_kana: カクトウＺ
    jp_kanji: カクトウＺ
    en: Fightinium Z
    fr: Combazélite
    it: Luctium Z
    de: Battalium Z
    es: Lizastal Z
    ko: 격투Z
    zh_simp: 格斗Ｚ
    zh_trad: 格鬥Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　結晶。\nかくとうタイプの　技を\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nかくとうタイプの　技を\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Fighting-type moves to Z-Moves."
    fr: "Une cristallisation de la Force Z, permettant\nde transformer les capacités de type Combat\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare le mosse di tipo Lotta\nin mosse Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft\nKampf-Attacken zu Z-Attacken auf."
    es: "Cristal que confiere el Poder Z a los movimientos\nde tipo Lucha."
    ko: "Z파워의 결정.\n격투타입 기술을\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将格斗属性的招式\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把格鬥屬性的招式\n升級為Ｚ招式。"
figy_berry:
  names:
    jp_kana: フィラのみ
    jp_kanji: フィラのみ
    en: Figy Berry
    fr: Baie Figuy
    it: Baccafico
    de: Giefebeere
    es: Baya Higog
    ko: 무화열매
    zh_simp: 勿花果
    zh_trad: 勿花果
  descriptions:
    jp_kana: "ポケモンに　持たせると\nピンチのとき　ＨＰを　回復する。\nきらいな味だと　混乱する。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　ＨＰを　回復する。\nきらいな味だと　混乱する。"
    en: "If a Pokémon holds one of these Berries, it will be able\nto restore some HP should it find itself in a pinch.\nBut it will become confused if it hates the Berry’s taste."
    fr: "Tenue, cette Baie restaure des PV en cas de besoin,\nmais rend le Pokémon confus si son goût lui déplaît."
    it: "Se un Pokémon in difficoltà ha questa bacca, recupera\ndei PS. Se al Pokémon non piace il suo sapore,\npuò causare confusione."
    de: "Als getragenes Item füllt diese Beere in einer Notlage\ndie KP des Pokémon auf, doch ihr Aroma verwirrt jene,\ndie es nicht mögen."
    es: "Los Pokémon pueden llevarla y usarla para restaurar\nalgunos PS en un momento de apuro. Su sabor puede\ncausar confusión si no les gusta."
    ko: "포켓몬에게 지니게 하면\n위급할 때 HP를 회복한다.\n싫어하는 맛이면 혼란에 빠진다."
    zh_simp: "让宝可梦携带后，\n危机时可以回复ＨＰ。\n如果讨厌这味道就会混乱。"
    zh_trad: "讓寶可夢攜帶後，\n危機時可以回復ＨＰ。\n如果討厭這味道就會混亂。"
fine_remedy:
  names:
    jp_kana: いいカンポーやく
    jp_kanji: いいカンポーやく
    en: Fine Remedy
    fr: Super Remède
    it: Preparato buono
    de: Superarznei
    es: Superremedio
    ko: 좋은한방약
    zh_simp: 好中药
    zh_trad: 好中藥
  descriptions:
    jp_kana: "いいキズぐすりと同じで\nポケモン１匹のＨＰが１００回復するが\n苦く　なかよし度がさがる。"
    jp_kanji: "いいキズぐすりと同じで\nポケモン１匹のＨＰが１００回復するが\n苦く　なかよし度がさがる。"
    en: "An herbal medicine that can restore 100 HP to a\nPokémon, just as a Super Potion does. Yet the bitter taste\nwill make the Pokémon less friendly toward you."
    fr: "Permet de restaurer 100 PV d’un Pokémon comme le\nferait une Super Potion. Son goût amer fera cependant\ndiminuer l’amitié que vous porte le Pokémon."
    it: "Come la Superpozione, restituisce 100 PS a un Pokémon\nma, essendo amaro, fa diminuire il suo livello di amicizia."
    de: "Diese Arznei hat dieselbe Wirkung wie ein Supertrank\nund füllt die KP eines Pokémon um 100 Punkte auf.\nIhr bitterer Geschmack senkt jedoch seine Zutraulichkeit."
    es: "Preparado medicinal que restablece 100 PS a un único\nPokémon, como una Superpoción, aunque su sabor\namargo hace que sea menos amistoso."
    ko: "좋은상처약과 마찬가지로\n포켓몬 1마리의 HP를 100만큼 회복하지만\n맛이 써서 절친도가 떨어진다."
    zh_simp: "效果和好伤药一样，\n能让１只宝可梦回复１００ＨＰ，\n但味道很苦，友好度会降低。"
    zh_trad: "效果和好傷藥一樣，\n能讓１隻寶可夢回復１００ＨＰ，\n但味道很苦，友好度會降低。"
fine_remedy:recipe:
  names:
    jp_kana: いいカンポーやく
    jp_kanji: いいカンポーやく
    en: Fine Remedy
    fr: Super Remède
    it: Preparato buono
    de: Superarznei
    es: Superremedio
    ko: 좋은한방약
    zh_simp: 好中药
    zh_trad: 好中藥
  descriptions:
    jp_kana: "いいカンポーやくのレシピ。　材料は\nカンポーやく×１　ピーピーグサ×１"
    jp_kanji: "いいカンポーやくのレシピ。　材料は\nカンポーやく×１　ピーピーグサ×１"
    en: "A recipe for crafting Fine Remedies from scratch.\nRequired materials: 1 Remedy and 1 Pep-Up Plant."
    fr: "Méthode pour Super Remède. Ressources requises :\n1 Remède et 1 Plante PP."
    it: "Ricetta per un Preparato buono. Richiede 1 Preparato e\n1 radice di Erba PP."
    de: "Die Anleitung zur Herstellung einer Superarznei.\nBenötigte Materialien: 1 Arznei und\n1 Stängel Ätherkraut."
    es: "Receta para crear Superremedios. Materiales:\n1 Remedio y 1 Hierba Éter."
    ko: "좋은한방약의 레시피.\n재료: 한방약×1 PP풀×1"
    zh_simp: "好中药的材料单。材料是：\n中药×１　ＰＰ草×１"
    zh_trad: "好中藥的材料單。材料是：\n中藥×１　ＰＰ草×１"
finizen_mucus:
  names:
    jp_kana: ナミイルカのねんえき
    jp_kanji: ナミイルカのねんえき
    en: Finizen Mucus
    fr: Mucus de Dofin
    it: Muco di Finizen
    de: Normifin-Schleim
    es: Secreción de Finizen
    ko: 맨돌핀의점액
    zh_simp: 波普海豚的黏液
    zh_trad: 波普海豚的黏液
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
finneon_scales:
  names:
    jp_kana: ケイコウオのウロコ
    jp_kanji: ケイコウオのウロコ
    en: Finneon Scales
    fr: Écaille d’Écayon
    it: Squama di Finneon
    de: Finneon-Schuppe
    es: Escama de Finneon
    ko: 형광어의비늘
    zh_simp: 荧光鱼的鳞片
    zh_trad: 螢光魚的鱗片
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
fire_gem:
  names:
    jp_kana: ほのおのジュエル
    jp_kanji: ほのおのジュエル
    en: Fire Gem
    fr: Joyau Feu
    it: Bijoufuoco
    de: Feuerjuwel
    es: Gema Fuego
    ko: 불꽃주얼
    zh_simp: 火之宝石
    zh_trad: 火之寶石
  descriptions:
    jp_kana: "ほのおのタイプの　ジュエル。\n持たせると　１度だけ　ほのおの\n技の威力が　強まる。"
    jp_kanji: "ほのおのタイプの　ジュエル。\n持たせると　１度だけ　ほのおの\n技の威力が　強まる。"
    en: "An item to be held by a Pokémon. This gem is imbued\nwith the essence of fire and will boost the power of a\nFire-type move—but only once."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Feu."
    it: "Strumento da dare a un Pokémon. Gioiello che potenzia\nuna sola volta le mosse di tipo Fuoco."
    de: "Ein Item zum Tragen. Dieses Juwel verstärkt einmalig\neine Attacke vom Typ Feuer."
    es: "Joya de un solo uso que potencia un movimiento de\ntipo Fuego. Debe llevarla un Pokémon."
    ko: "불꽃타입의 주얼.\n지니게 하면 한 번만 불꽃\n기술의 위력이 강해진다."
    zh_simp: "火属性的宝石。\n携带后，火属性的\n招式威力仅会增强１次。"
    zh_trad: "火屬性的寶石。\n攜帶後，火屬性招式的\n威力會僅增強１次。"
fire_memory:
  names:
    jp_kana: ファイヤーメモリ
    jp_kanji: ファイヤーメモリ
    en: Fire Memory
    fr: ROM Feu
    it: ROM Fuoco
    de: Feuer-Disc
    es: Disco Fuego
    ko: 파이어메모리
    zh_simp: 火焰存储碟
    zh_trad: 火焰記憶碟
  descriptions:
    jp_kana: "ほのおタイプの　データが　入った\nメモリ。　特定のポケモンが　持つと\nタイプが　変わる。"
    jp_kanji: "ほのおタイプの　データが　入った\nメモリ。　特定のポケモンが　持つと\nタイプが　変わる。"
    en: "A memory disc that contains Fire-type data.\nIt changes the type of the holder if held by\na certain species of Pokémon."
    fr: "Une carte mémoire contenant des données sur\nle type Feu. Un certain Pokémon peut changer\nde type en l’équipant."
    it: "ROM contenente dati sul tipo Fuoco in formato digitale.\nPermette a un certo Pokémon di cambiare tipo."
    de: "Eine Disc mit Daten zum Typ Feuer. Sie löst bei einem\nbestimmten Pokémon einen Typenwechsel aus."
    es: "Disco de datos que contiene información relativa al tipo\nFuego. Permite cambiar de tipo a cierto Pokémon."
    ko: "불꽃타입의 데이터가 들어 있는\n메모리. 특정 포켓몬이\n지니면 타입이 바뀐다."
    zh_simp: "装有火属性数据的存储碟。\n特定宝可梦携带后，\n属性就会发生变化。"
    zh_trad: "裝有火屬性資料的記憶碟。\n特定寶可夢攜帶後，\n就會產生屬性的變化。"
fire_pattern_cup:
  names:
    jp_kana: ファイヤーカップ
    jp_kanji: ファイヤーカップ
    en: Fire Pattern Cup
    fr: Tasse à Flammes
    it: Tazza con fiamme
    de: Flammen-Tasse
    es: Taza Llamas
    ko: 파이어 컵
    zh_simp: 火焰水杯
    zh_trad: 火焰水杯
  descriptions:
    jp_kana: "家での食事でも　活躍する　カップ。\n軽くて　丈夫で　重ねられるので\n収納や　持ち運びに　とても便利。"
    jp_kanji: "家での食事でも　活躍する　カップ。\n軽くて　丈夫で　重ねられるので\n収納や　持ち運びに　とても便利。"
    en: "A cup that’s as good for using at home as on a picnic.\nIt’s light, sturdy, and stacks well, so it’s a cinch to pack\nup and carry around."
    fr: "Une tasse pouvant être utilisée partout, même chez soi.\nLégère et solide, elle s’emboîte avec d’autres tasses\nsimilaires, ce qui la rend facile à emporter et à stocker."
    it: "Tazza leggera e resistente, ottima da usare anche a casa.\nEssendo impilabile è comodissima sia da riporre che da\ntrasportare."
    de: "Diese Tasse eignet sich auch für den Gebrauch daheim.\nSie ist leicht, robust und lässt sich stapeln, weshalb man\nsie prima verstauen und überallhin mitnehmen kann."
    es: "Apta para usarse incluso en casa, esta ligera y resistente\ntaza se puede apilar con facilidad, lo que facilita tanto\nsu almacenamiento como su transporte."
    ko: "집에서 식사할 때도 쓰기 좋은 컵.\n가볍고 튼튼한 데다 겹쳐서 쌓을 수도 있어서\n휴대하거나 수납하기에도 매우 편하다."
    zh_simp: "在家吃饭时也经常会用到的杯子。\n轻巧坚固，能叠起来收纳，方便携带。"
    zh_trad: "在家庭餐桌上也是常客的水杯。\n既輕巧又堅固，而且還能堆疊，\n因此在收納或攜帶上都很方便。"
fire_stone:
  names:
    jp_kana: ほのおのいし
    jp_kanji: ほのおのいし
    en: Fire Stone
    fr: Pierre Feu
    it: Pietrafocaia
    de: Feuerstein
    es: Piedra Fuego
    ko: 불꽃의돌
    zh_simp: 火之石
    zh_trad: 火之石
  descriptions:
    jp_kana: "ある特定の　ポケモンを\n進化させる　不思議な石。\nだいだい色を　している。"
    jp_kanji: "ある特定の　ポケモンを\n進化させる　不思議な石。\nだいだい色を　している。"
    en: "A peculiar stone that can make certain species of\nPokémon evolve. It has a fiery orange heart."
    fr: "Une pierre étrange qui fait évoluer certaines espèces\nde Pokémon. Elle est jaune et orange."
    it: "Pietra particolare che fa evolvere determinate\nspecie di Pokémon. Ha sfumature arancioni."
    de: "Dieser besondere Stein löst bei bestimmten Pokémon\ndie Entwicklung aus. Er schimmert in den Farben\nOrange und Gelb."
    es: "Curiosa piedra que hace evolucionar a determinadas\nespecies de Pokémon. Es amarilla con una marca\nnaranja."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 돌.\n주황색을 띠고 있다."
    zh_simp: "能让某些特定宝可梦\n进化的神奇石头。\n看上去是橙黄色的。"
    zh_trad: "能讓特定寶可夢\n進化的神奇石頭。\n看起來是橙黃色的。"
fire_tera_shard:
  names:
    jp_kana: テラピースほのお
    jp_kanji: テラピースほのお
    en: Fire Tera Shard
    fr: Téra-Éclat Feu
    it: Teralite Fuoco
    de: Tera-Stück (Feuer)
    es: Teralito Fuego
    ko: 테라피스 불꽃
    zh_simp: 火太晶碎块
    zh_trad: 火太晶碎塊
  descriptions:
    jp_kana: "テラスタルポケモンが　倒れたとき\n砕けた　テラスタルジュエルが\nまれに　結晶化したもの。"
    jp_kanji: "テラスタルポケモンが　倒れたとき\n砕けた　テラスタルジュエルが\nまれに　結晶化したもの。"
    en: "On rare occasions, these shards form when a Tera\nPokémon falls in battle and its Tera Jewel shatters."
    fr: "Un fragment cristallisé qui se forme rarement lors\nde l’éclatement d’un Joyau Téracristal après qu’un\nPokémon Téracristal a été mis K.O."
    it: "Cristallizzazione che raramente si forma quando\nun Pokémon Teracristal viene sconfitto e la sua gemma\nTeracristal va in frantumi."
    de: "In äußerst seltenen Fällen kristallisieren Bruchstücke\ndes Terakristalls von im Kampf besiegten Terakristall-\nPokémon zu solchen Tera-Stücken."
    es: "Esquirla que se forma muy raramente cuando la joya\nTeracristal de un Pokémon teracristalizado se quiebra\ntras derrotarlo."
    ko: "테라스탈 포켓몬이 쓰러졌을 때\n부서진 테라스탈 주얼이\n드물게 결정화한 조각."
    zh_simp: "打倒太晶宝可梦时，\n破碎掉的太晶宝石有\n极低概率会结晶成此物。"
    zh_trad: "太晶寶可夢倒下時，\n碎裂的太晶寶石在罕見的情況下\n會結晶化，而形成此物。"
firium_z:bag:
  names:
    jp_kana: ホノオＺ
    jp_kanji: ホノオＺ
    en: Firium Z
    fr: Pyrozélite
    it: Pirium Z
    de: Pyrium Z
    es: Pirostal Z
    ko: 불꽃Z
    zh_simp: 火Ｚ
    zh_trad: 火Ｚ
  descriptions:
    jp_kana: "ほのおタイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    jp_kanji: "ほのおタイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nFire-type moves to Fire-type Z-Moves."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise son porteur à transformer ses capacités\nde type Feu en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono ai Pokémon di trasformare le mosse\ndi tipo Fuoco in mosse Z."
    de: "Kristallisierte Z-Kraft, die Feuer-Attacken zu Z-Attacken\naufstuft. Wird bei Bedarf automatisch vervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a los\nportadores convertir sus movimientos de tipo Fuego en\nmovimientos Z."
    ko: "불꽃타입 기술을\nZ기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将火属性招式升级成\nＺ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把火屬性招式\n升級為Ｚ招式的Ｚ力量結晶。"
firium_z:held:
  names:
    jp_kana: ホノオＺ
    jp_kanji: ホノオＺ
    en: Firium Z
    fr: Pyrozélite
    it: Pirium Z
    de: Pyrium Z
    es: Pirostal Z
    ko: 불꽃Z
    zh_simp: 火Ｚ
    zh_trad: 火Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　結晶。\nほのおタイプの　技を\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nほのおタイプの　技を\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Fire-type moves to Z-Moves."
    fr: "Une cristallisation de la Force Z, permettant\nde transformer les capacités de type Feu\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare le mosse di tipo Fuoco\nin mosse Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft\nFeuer-Attacken zu Z-Attacken auf."
    es: "Cristal que confiere el Poder Z a los movimientos\nde tipo Fuego."
    ko: "Z파워의 결정.\n불꽃타입 기술을\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将火属性的招式\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把火屬性的招式\n升級為Ｚ招式。"
fishing_rod:
  names:
    jp_kana: つりざお
    jp_kanji: つりざお
    en: Fishing Rod
    fr: Canne à Pêche
    it: Canna da pesca
    de: Angel
    es: Caña
    ko: 낚싯대
    zh_simp: 钓竿
    zh_trad: 釣竿
  descriptions:
    jp_kana: "水の　ある　場所で　使うと\nいろんな　ポケモンが　つれる。"
    jp_kanji: "水の　ある　場所で　使うと\nいろんな　ポケモンが　つれる。"
    en: Use it by the water to fish up various kinds of Pokémon.
    fr: "Une canne qui permet de pêcher divers Pokémon\nsauvages dans les points d’eau."
    it: "Permette di pescare varie specie di Pokémon\nin qualsiasi specchio d’acqua."
    de: "Setzt man sie in der Nähe von Gewässern ein, kann man\ndamit unterschiedliche Pokémon angeln."
    es: "Sirve para pescar Pokémon salvajes en todo tipo de\ncuerpos de agua."
    ko: "물이 있는 장소에서 사용하면\n다양한 포켓몬을 낚을 수 있다."
    zh_simp: "在有水的地方使用，\n就能钓到各种各样的宝可梦。"
    zh_trad: "在有水的地方使用，\n就能釣到各式各樣的寶可夢。"
fishing_rod:alola:
  names:
    jp_kana: つりざお
    jp_kanji: つりざお
    en: Fishing Rod
    fr: Canne à Pêche
    it: Canna da pesca
    de: Angel
    es: Caña
    ko: 낚싯대
    zh_simp: 钓竿
    zh_trad: 釣竿
  descriptions:
    jp_kana: "キャプテン　スイレンが　作った\nつりざお。　岩陰に　向かって\n使うと　ポケモンが　つれる。"
    jp_kanji: "キャプテン　スイレンが　作った\nつりざお。　岩陰に　向かって\n使うと　ポケモンが　つれる。"
    en: "A fishing rod made by Captain Lana. Cast a line\nover piles of underwater rocks to fish for wild\naquatic Pokémon."
    fr: "Une canne à pêche fabriquée par la Capitaine Néphie.\nElle permet de pêcher les Pokémon cachés dans\nles rochers immergés."
    it: "Canna da pesca con un amo realizzato dal Capitano\nSuiren. Permette di pescare i Pokémon che si\nnascondono sott’acqua tra le rocce."
    de: "Eine Angel, die von Captain Tracy hergestellt wurde.\nWenn sie bei Felsen im Wasser benutzt wird, kann man\ndamit Pokémon angeln."
    es: "Caña fabricada por la Capitana Nereida. Permite pescar\nlos Pokémon escondidos en las rocas sumergidas."
    ko: "캡틴 수련이 만든 낚싯대.\n바위그늘을 향해서\n사용하면 포켓몬을 낚을 수 있다."
    zh_simp: "水莲队长制作的钓竿。\n如果向着岩石阴影那边使用，\n就能钓到宝可梦。"
    zh_trad: "水蓮隊長製作的釣竿。\n如果向著岩石陰影那邊使用，\n就可以釣到寶可夢。"
fist_plate:
  names:
    jp_kana: こぶしのプレート
    jp_kanji: こぶしのプレート
    en: Fist Plate
    fr: Plaque Poing
    it: Lastrapugno
    de: Fausttafel
    es: Tabla Fuerte
    ko: 주먹플레이트
    zh_simp: 拳头石板
    zh_trad: 拳頭石板
  descriptions:
    jp_kana: "かくとうのタイプの　石盤。\n持たせると　かくとうタイプの\n技の威力が　強まる。"
    jp_kanji: "かくとうのタイプの　石盤。\n持たせると　かくとうタイプの\n技の威力が　強まる。"
    en: "An item to be held by a Pokémon. This stone tablet is\nimbued with the essence of the fighting spirit and boosts\nthe power of the holder’s Fighting-type moves."
    fr: "Objet à tenir. Une tablette en pierre augmentant\nla puissance des capacités de type Combat."
    it: "Strumento da dare a un Pokémon. Lastra di pietra che\npotenzia le mosse di tipo Lotta."
    de: "Ein Item zum Tragen. Diese Steintafel verstärkt\nAttacken vom Typ Kampf."
    es: "Tabla de piedra que potencia los movimientos de tipo\nLucha. Debe llevarla un Pokémon."
    ko: "격투타입의 석판.\n지니게 하면 격투타입\n기술의 위력이 강해진다."
    zh_simp: "格斗属性的石板。\n携带后，格斗属性的\n招式威力就会增强。"
    zh_trad: "格鬥屬性的石板。\n攜帶後，格鬥屬性的\n招式威力就會增強。"
flabebe_pollen:
  names:
    jp_kana: フラベベのかふん
    jp_kanji: フラベベのかふん
    en: Flabébé Pollen
    fr: Pollen de Flabébé
    it: Polline di Flabébé
    de: Flabébé-Pollen
    es: Polen de Flabébé
    ko: 플라베베의꽃가루
    zh_simp: 花蓓蓓的花粉
    zh_trad: 花蓓蓓的花粉
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
flame_orb:
  names:
    jp_kana: かえんだま
    jp_kanji: かえんだま
    en: Flame Orb
    fr: Orbe Flamme
    it: Fiammosfera
    de: Heiß-Orb
    es: Llamasfera
    ko: 화염구슬
    zh_simp: 火焰宝珠
    zh_trad: 火焰寶珠
  descriptions:
    jp_kana: "触ると　熱をだす　不思議な玉。\n持たせると　戦闘中に\nやけどの状態に　なる。"
    jp_kanji: "触ると　熱をだす　不思議な玉。\n持たせると　戦闘中に\nやけどの状態に　なる。"
    en: "An item to be held by a Pokémon. It’s a bizarre orb that\ngives off heat when touched and will afflict the holder\nwith a burn during battle."
    fr: "Objet à tenir. Un orbe bizarre qui brûle son porteur\ndurant le combat."
    it: "Strumento da dare a un Pokémon. Sfera bizzarra che\nprocura una scottatura a chi l’ha con sé in una lotta."
    de: "Ein Item zum Tragen. Dieser bizarre Orb fügt seinem\nTräger im Kampf Verbrennungen zu."
    es: "Extraña esfera que causa quemaduras al Pokémon que\nla lleva en combate."
    ko: "만지면 열을 내는 이상한 구슬.\n지니게 하면 배틀 중에\n화상 상태가 된다."
    zh_simp: "触碰后会放出热量的神奇宝珠。\n携带后，在战斗时会变成灼伤状态。"
    zh_trad: "觸碰後會放出熱量的神奇寶珠。\n攜帶後，在戰鬥時\n會變成灼傷狀態。"
flame_plate:
  names:
    jp_kana: ひのたまプレート
    jp_kanji: ひのたまプレート
    en: Flame Plate
    fr: Plaque Flamme
    it: Lastrarogo
    de: Feuertafel
    es: Tabla Llama
    ko: 불구슬플레이트
    zh_simp: 火球石板
    zh_trad: 火球石板
  descriptions:
    jp_kana: "ほのおのタイプの　石盤。\n持たせると　ほのおタイプの\n技の威力が　強まる。"
    jp_kanji: "ほのおのタイプの　石盤。\n持たせると　ほのおタイプの\n技の威力が　強まる。"
    en: "An item to be held by a Pokémon. This stone tablet is\nimbued with the essence of fire and boosts the power\nof the holder’s Fire-type moves."
    fr: "Objet à tenir. Une tablette en pierre augmentant\nla puissance des capacités de type Feu."
    it: "Strumento da dare a un Pokémon. Lastra di pietra che\npotenzia le mosse di tipo Fuoco."
    de: "Ein Item zum Tragen. Diese Steintafel verstärkt\nAttacken vom Typ Feuer."
    es: "Tabla de piedra que potencia los movimientos de tipo\nFuego. Debe llevarla un Pokémon."
    ko: "불꽃타입의 석판.\n지니게 하면 불꽃타입\n기술의 위력이 강해진다."
    zh_simp: "火属性的石板。\n携带后，火属性的\n招式威力就会增强。"
    zh_trad: "火屬性的石板。\n攜帶後，火屬性的\n招式威力就會增強。"
