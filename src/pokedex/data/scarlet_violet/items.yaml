cubone_candy:
  names:
    jp_kana: カラカラのアメ
    jp_kanji: カラカラのアメ
    en: Cubone Candy
    fr: Bonbon Osselait
    it: Caramella Cubone
    de: Tragosso-Bonbon
    es: Caramelo Cubone
    ko: 탕구리의사탕
    zh_simp: 卡拉卡拉的糖果
    zh_trad: 卡拉卡拉的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
cucumber:
  names:
    jp_kana: キュウリスライス
    jp_kanji: キュウリスライス
    en: Cucumber
    fr: Concombre
    it: Cetriolo
    de: Gurke
    es: Pepino
    ko: 오이슬라이스
    zh_simp: 小黄瓜片
    zh_trad: 小黃瓜片
  descriptions:
    jp_kana: "酸味と　苦味が　ある　食材。\n青臭さを　活かすなら　コクのある食材と\n一緒に　サンドすると　よい。"
    jp_kanji: "酸味と　苦味が　ある　食材。\n青臭さを　活かすなら　コクのある食材と\n一緒に　サンドすると　よい。"
    en: "A tart and bitter ingredient. Using it together with rich-\ntasting ingredients in a sandwich will really make the\nmost of a cucumber’s fresh-veggie aroma."
    fr: "Un ingrédient au goût amer et acide. La meilleure façon\nde mettre en valeur sa saveur fraîche est de le combiner\navec des ingrédients au goût prononcé."
    it: "Un ingrediente aspro e amaro. Le sue fresche note\nvegetali ben si sposano con gli ingredienti dal gusto\npiù corposo."
    de: "Der frische Geschmack dieser säuerlich-bitteren Zutat\nlässt sich am besten in Szene setzen, indem man sie mit\nreichhaltigen Zutaten in einem Sandwich kombiniert."
    es: "Ingrediente ácido y amargo a la vez. Se recomienda\ncombinarlo con algún otro de sabor fuerte para sacar\nel máximo partido a su intenso sabor a verdura."
    ko: "신맛과 쓴맛이 나는 식재료.\n진한 맛이 나는 식재료와 같이\n샌드위치에 넣으면 풋내를 살릴 수 있다."
    zh_simp: "带有酸味和苦味的食材。\n想要活用其草腥味的话，就和\n味道浓厚的食材一起做成三明治吧。"
    zh_trad: "帶有酸味和苦味的食材。\n如欲活用其青草味，可連同\n滋味濃郁的食材一起夾進麵包。"
