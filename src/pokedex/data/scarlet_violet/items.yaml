    jp_kanji: "持たせると　バトル中の　素早さが\nさがるが　ふつうよりも　ポケモンの\n攻撃が　高く　育ちやすい。"
    en: "An item to be held by a Pokémon. Holding this bracer\nreduces a Pokémon’s Speed in battle but allows its\nAttack stat to grow more quickly."
    fr: "Objet à tenir. Permet à la stat d’Attaque de progresser\nplus vite, mais réduit la Vitesse pendant le combat."
    it: "Strumento da dare a un Pokémon. Riduce la Velocità\nnella lotta ma permette ai punti base dell’Attacco\ndi crescere più rapidamente."
