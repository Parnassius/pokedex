    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
muscle_band:
  names:
    jp_kana: ちからのハチマキ
    jp_kanji: ちからのハチマキ
    en: Muscle Band
    fr: Bandeau Muscle
    it: Muscolbanda
    de: Muskelband
    es: Cinta Fuerte
    ko: 힘의머리띠
    zh_simp: 力量头带
    zh_trad: 力量頭帶
  descriptions:
    jp_kana: "ちからが　わいてくる　ハチマキ。\n持たせると　物理技の\n威力が　少し　あがる。"
    jp_kanji: "ちからが　わいてくる　ハチマキ。\n持たせると　物理技の\n威力が　少し　あがる。"
    en: "An item to be held by a Pokémon. This headband\nexudes strength, slightly boosting the power of the\nholder’s physical moves."
    fr: "Objet à tenir. Un bandeau qui augmente légèrement\nla puissance des capacités physiques."
    it: "Strumento da dare a un Pokémon. Fascia che potenzia\ndi poco le mosse fisiche."
    de: "Ein Item zum Tragen. Dieses Stirnband verstärkt\nphysische Attacken etwas."
    es: "Cinta del pelo que aumenta ligeramente la potencia de\nlos ataques físicos. Debe llevarla un Pokémon."
    ko: "힘이 끓어오르는 머리띠.\n지니게 하면 물리 기술의\n위력이 조금 올라간다."
    zh_simp: "力如泉涌的头带。\n携带后，物理招式的\n威力就会少量提高。"
    zh_trad: "力如泉湧的頭帶。\n攜帶後，物理招式的\n威力就會少量提高。"
muscle_feather:
  names:
    jp_kana: きんりょくのハネ
    jp_kanji: きんりょくのハネ
    en: Muscle Feather
    fr: Plume Force
    it: Piumpotenza
    de: Kraftfeder
    es: Pluma Músculo
    ko: 근력깃털
    zh_simp: 肌力之羽
    zh_trad: 肌力之羽
  descriptions:
    jp_kana: "ポケモンに　使う　道具。\nポケモン　１匹の　攻撃の\n基礎ポイントを　ちょっと　あげる。"
    jp_kanji: "ポケモンに　使う　道具。\nポケモン　１匹の　攻撃の\n基礎ポイントを　ちょっと　あげる。"
    en: "An item to be used on a Pokémon. This feather slightly\nincreases base points for a Pokémon’s Attack stat."
    fr: "Objet à utiliser sur un Pokémon pour augmenter\nlégèrement son Attaque de base."
    it: "Strumento da usare su un Pokémon. Ne aumenta di poco\ni punti base dell’Attacco."
    de: "Wendet man dieses Item auf ein Pokémon an, werden\ndessen Angriffs-Basispunkte dauerhaft ein wenig erhöht."
    es: "Pluma que aumenta un poco el Ataque de base de un\nPokémon."
    ko: "포켓몬에게 사용하는 도구.\n포켓몬 1마리의 공격\n기초 포인트를 조금 올린다."
    zh_simp: "用于宝可梦的道具。\n能稍微提高１只宝可梦的\n攻击的基础点数。"
    zh_trad: "用於寶可夢的道具。\n能稍微提高１隻寶可夢的\n攻擊的基礎點數。"
muscle_mochi:
  names:
    jp_kana: きんりょくのもち
    jp_kanji: きんりょくのもち
    en: Muscle Mochi
    fr: Mochi Force
    it: Mochi della potenza
    de: Kraft-Mochi
    es: Mochi Músculo
    ko: 근력떡
    zh_simp: 肌力粘糕
    zh_trad: 肌力糬
  descriptions:
    jp_kana: "きのみが　ねりこまれた　もち。\nポケモン　１匹の　攻撃の\n基礎ポイントを　あげる。"
    jp_kanji: "きのみが　ねりこまれた　もち。\nポケモン　１匹の　攻撃の\n基礎ポイントを　あげる。"
    en: "A mochi cake with Berries kneaded into its dough.\nIt increases base points for a Pokémon’s Attack stat."
    fr: "Un mochi contenant des Baies qui augmente\nl’Attaque de base d’un Pokémon."
    it: "Mochi preparato con un impasto a base di bacche.\nAumenta i punti base dell’Attacco."
    de: "Ein mit Beeren gefüllter Mochi, der die Angriffs-\nBasispunkte eines Pokémon dauerhaft erhöht."
    es: "La masa de este mochi está preparada con bayas.\nAumenta el Ataque de base de un Pokémon."
    ko: "으깬 나무열매가 들어 있는 떡.\n포켓몬 1마리의 공격\n기초 포인트를 올린다."
    zh_simp: "糅合树果的粘糕。\n能提高１只宝可梦的\n攻击的基础点数。"
    zh_trad: "加入樹果揉製而成的麻糬。\n能提高１隻寶可夢的\n攻擊的基礎點數。"
mushroom_cake:
  names:
    jp_kana: キノコよせだま
    jp_kanji: キノコよせだま
    en: Mushroom Cake
    fr: Appât Toumou
    it: Polpetta funghi
    de: Pilzköder
    es: Cebo de Setas
    ko: 버섯유인환
    zh_simp: 菇诱团
    zh_trad: 菇誘糰
  descriptions:
    jp_kana: "キノコとよせだまのもとを練りこんだもの。\n怪獣やドラゴンのようなポケモンなどを\n強く引き寄せることができる。"
    jp_kanji: "キノコとよせだまのもとを練りこんだもの。\n怪獣やドラゴンのようなポケモンなどを\n強く引き寄せることができる。"
    en: "A cake made by combining mushrooms with a Cake-Lure\nBase. These cakes are potently effective at attracting the\nmore monstrous Pokémon, as well as dragon Pokémon."
    fr: "Obtenu en pétrissant une boule d’Appâte mélangée à\nun champignon, cet appât attire fortement les Pokémon\npareils à des monstres ou à des dragons."
    it: "Strumento creato aggiungendo dei funghi a una Polpetta\nbase. Esercita una forte attrattiva in particolare sui\nPokémon dall’aspetto mostruoso e simili a draghi."
    de: "Eine Mischung aus Köderteig und Pilzen, von der\nmonströse sowie drachenähnliche Pokémon stark\nangezogen werden."
    es: "Bola de cebo creada con setas y masa que atrae a\nlos Pokémon monstruosos o con atributos de dragón."
    ko: "버섯과 유인환반죽을 섞어서 반죽한 것.\n괴수나 드래곤 같은 포켓몬을\n강하게 유인하는 효과가 있다."
    zh_simp: "由蘑菇与诱团原料糅合而成。\n对怪兽类和龙类宝可梦\n有着很强的吸引力。"
    zh_trad: "由蕈菇與誘糰原料揉合而成。\n對怪獸類和龍類寶可夢\n有著很強的吸引力。"
mushroom_cake:recipe:
