    zh_trad: "能讓寶可夢已學會的\n其中１個招式的\nＰＰ最大值少量提高。"
precooked_burger:
  names:
    jp_kana: レトルトバーグ
    jp_kanji: レトルトバーグ
    en: Precooked Burger
    fr: Steak Haché
    it: Hamburger
    de: Frikadellen
    es: Hamburguesas
    ko: 레토르트햄버그
    zh_simp: 即食肉排
    zh_trad: 即食肉排
  descriptions:
    jp_kana: "キャンプの　料理に　使う\n食材の　一種。迷った　ときは\nハンバーグを　入れておけば　間違いない。"
    jp_kanji: "キャンプの　料理に　使う\n食材の　一種。迷った　ときは\nハンバーグを　入れておけば　間違いない。"
    en: "One of the many ingredients that can be used for\ncooking at your camp. If you’re unsure about what to\ncook, you can’t go wrong with some burger."
    fr: "Un ingrédient de cuisine pour le camping.\nQuand on ne sait pas quoi ajouter à un curry,\nle steak haché est une valeur sûre."
    it: "Uno degli ingredienti che puoi usare per cucinare\nin campeggio. Quando non sai bene cosa fare,\naggiungi un Hamburger e non sbagli mai."
    de: "Eine Zutat für PokéCamping-Mahlzeiten. Mit Frikadellen\nliegt man nie falsch. Die perfekte Zutat für alle Köche,\ndie sich nicht für eine Zutat entscheiden können."
    es: "Un ingrediente para cocinar en el campamento. Una\napuesta segura, perfecta para esos momentos de duda."
    ko: "캠프 요리에 사용되는\n식재료 중 하나. 고민될 때\n햄버그를 넣으면 실패할 일은 없다."
    zh_simp: "在露营营地制作料理时会使用的\n一种食材。不知道该加什么的时候，\n选择这种汉堡肉准没错。"
    zh_trad: "製作露營料理時使用的食材之一。\n不知道該放什麼的時候，\n放漢堡排就一定不會錯。"
premier_ball:
  names:
    jp_kana: プレミアボール
    jp_kanji: プレミアボール
