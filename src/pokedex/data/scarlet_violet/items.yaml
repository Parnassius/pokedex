    jp_kana: "持たせたポケモンは　１度だけ\n１ターン目に　ちからを　ためる技を\nすぐに　使うことが　できる。"
    jp_kanji: "持たせたポケモンは　１度だけ\n１ターン目に　ちからを　ためる技を\nすぐに　使うことが　できる。"
    en: "An item to be held by a Pokémon. It allows the holder\nto immediately use a move that normally requires a turn\nto charge—but only once."
    fr: "Objet à tenir et à usage unique. Permet d’utiliser\nimmédiatement une capacité qui devrait se charger\nau premier tour."
    it: "Strumento monouso da dare a un Pokémon.\nPermette l’uso immediato di una mossa che in\ngenere richiede un turno prima di essere eseguita."
    de: "Ein Item zum Tragen. Der Träger kann damit einmalig\neine Attacke sofort einsetzen, die sonst aufgeladen\nwerden muss."
    es: "Permite el uso inmediato de movimientos que requieren\nun turno para cargarse. Es de un solo uso y debe llevarla\nun Pokémon."
    ko: "지니게 한 포켓몬은 한 번만\n1턴째에 힘을 모으는 기술을\n바로 사용할 수가 있다."
    zh_simp: "携带它的宝可梦仅有１次机会\n可以在第１回合使出\n需要蓄力的招式。"
    zh_trad: "攜帶它的寶可夢將有１次機會，\n可以在１回合內就發動\n需要蓄力的招式。"
