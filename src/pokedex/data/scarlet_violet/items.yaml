mareep_wool:
  names:
    jp_kana: メリープのけだま
    jp_kanji: メリープのけだま
    en: Mareep Wool
    fr: Laine de Wattouat
    it: Lana di Mareep
    de: Voltilamm-Wolle
    es: Lana de Mareep
    ko: 메리프의털뭉치
    zh_simp: 咩利羊的毛球
    zh_trad: 咩利羊的毛球
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
