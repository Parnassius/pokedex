    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
sachet:
  names:
    jp_kana: においぶくろ
    jp_kanji: においぶくろ
    en: Sachet
    fr: Sachet Senteur
    it: Bustina aromi
    de: Duftbeutel
    es: Saquito Fragante
    ko: 향기주머니
    zh_simp: 香袋
    zh_trad: 香袋
  descriptions:
    jp_kana: "ちょっと　きつめの香りを　だす\n香料を　詰めた　袋。\nあるポケモンが　好んでいる。"
    jp_kanji: "ちょっと　きつめの香りを　だす\n香料を　詰めた　袋。\nあるポケモンが　好んでいる。"
    en: "A sachet filled with fragrant perfumes that are just\nslightly overwhelming. Yet it’s loved by a certain\nPokémon."
    fr: "Un sachet d’herbes et d’épices, au parfum trop marqué\npour beaucoup, mais néanmoins apprécié d’un certain\nPokémon."
    it: "Una bustina che contiene aromi dal profumo piuttosto\nintenso. Piace a un Pokémon in particolare."
    de: "Ein mit Parfüm gefüllter Beutel, der einen penetranten\nDuft verströmt. Das Lieblingsstück eines bestimmten\nPokémon."
    es: "Un saquito lleno de sustancias aromáticas cuyo perfume\nresulta abrumador. Cierto Pokémon lo adora."
    ko: "살짝 강렬한 향기가 나는\n향료를 채운 주머니.\n어떤 포켓몬이 좋아하는 물건이다."
    zh_simp: "装着散发微浓香气的\n香料的袋子。\n某种宝可梦很喜欢它。"
    zh_trad: "裝著散發有點濃的香氣的\n香料的袋子。\n某種寶可夢很喜歡它。"
sacred_ash:
  names:
    jp_kana: せいなるはい
    jp_kanji: せいなるはい
    en: Sacred Ash
    fr: Cendre Sacrée
    it: Cenere magica
    de: Zauberasche
    es: Ceniza Sagrada
    ko: 성스러운분말
    zh_simp: 圣灰
    zh_trad: 聖灰
  descriptions:
    jp_kana: "ひんしに　なってしまった\nポケモン　全員の　ＨＰを\nすべて　回復する。"
    jp_kanji: "ひんしに　なってしまった\nポケモン　全員の　ＨＰを\nすべて　回復する。"
    en: "Ash that can be used to revive all party Pokémon that\nhave fainted. It also fully restores the Pokémon’s max HP."
    fr: Ranime tous les Pokémon K.O. et restaure tous leurs PV.
    it: Restituisce tutti i PS ai Pokémon esausti.
    de: "Ein Item, das alle kampfunfähigen Pokémon\nwiederbelebt und deren KP vollständig wieder\nauffüllt."
    es: "Reanima completamente a todos los Pokémon\ndebilitados y restaura todos sus PS."
    ko: "기절해 버린\n포켓몬 전원의 HP를\n모두 회복한다."
    zh_simp: "能让陷入昏厥的\n全部宝可梦\n回复所有ＨＰ。"
    zh_trad: "能讓所有\n陷入瀕死的寶可夢\n回復所有ＨＰ。"
safari_ball:
  names:
    jp_kana: サファリボール
    jp_kanji: サファリボール
    en: Safari Ball
    fr: Safari Ball
    it: Safari Ball
    de: Safariball
    es: Safari Ball
    ko: 사파리볼
    zh_simp: 狩猎球
    zh_trad: 狩獵球
  descriptions:
    jp_kana: "カントー地方の　サファリゾーンや\nシンオウ地方の　大湿原で\n使われていた　特別なボール。"
    jp_kanji: "カントー地方の　サファリゾーンや\nシンオウ地方の　大湿原で\n使われていた　特別なボール。"
    en: "A special Poké Ball used in locales such as the Safari\nZone in the Kanto region and the Great Marsh in the\nSinnoh region."
    fr: "Une Poké Ball spéciale anciennement utilisée dans\ndes lieux tels que le Parc Safari de Kanto ou\nle Grand Marais de Sinnoh."
    it: "Poké Ball speciale usata in passato in luoghi come\nla Zona Safari di Kanto o la Gran Palude di Sinnoh."
    de: "Ein besonderer Ball, der unter anderem in der\nSafari-Zone der Kanto-Region und im Großmoor\nder Sinnoh-Region eingesetzt wird."
    es: "Poké Ball especial utilizada en lugares como la Zona\nSafari de Kanto y el Gran Pantano de Sinnoh."
    ko: "관동지방의 사파리존과\n신오지방의 대습초원에서\n사용되었던 특별한 볼."
    zh_simp: "曾在关都地区的狩猎地带\n以及神奥地区的大湿地被使用。\n是一种特殊的球。"
    zh_trad: "曾在關都地區的狩獵地帶，\n以及神奧地區的大濕地被使用。\n是一種特殊的球。"
safety_goggles:
  names:
    jp_kana: ぼうじんゴーグル
    jp_kanji: ぼうじんゴーグル
    en: Safety Goggles
    fr: Lunettes Filtre
    it: Visierantisabbia
    de: Schutzbrille
    es: Gafa Protectora
    ko: 방진고글
    zh_simp: 防尘护目镜
    zh_trad: 防塵護目鏡
  descriptions:
    jp_kana: "すなあらしの　ダメージを　受けず\n粉や　胞子の　影響も\n防げる　ゴーグル。"
    jp_kanji: "すなあらしの　ダメージを　受けず\n粉や　胞子の　影響も\n防げる　ゴーグル。"
    en: "An item to be held by a Pokémon. These goggles protect\nthe holder from both sandstorm damage and the effects\nof powders and spores."
    fr: "Objet à tenir. Protège le Pokémon des dégâts\ndes tempêtes de sable et des effets des capacités\nqui libèrent de la poudre et des spores."
    it: "Visiera che protegge dai danni inflitti dalle tempeste\ndi sabbia e dagli effetti causati da polveri e spore."
    de: "Diese Brille schützt ihren Träger vor Schaden durch\nSandstürme sowie vor Effekten von Puder, Pulver, Saat\nund Sporen."
    es: "Gafa que protege del daño producido por las tormentas\nde arena y de los efectos causados por polvos o\nesporas."
    ko: "모래바람에 데미지를 받지 않고,\n가루나 포자의 영향도\n받지 않게 해 주는 고글."
    zh_simp: "不单是沙暴的伤害，就连\n粉末类和孢子类招式的效果\n也能防御的护目镜。"
    zh_trad: "不但不會受到沙暴的傷害，\n還能防止粉末或孢子的影響的護目鏡。"
sail_fossil:
  names:
    jp_kana: ヒレのカセキ
    jp_kanji: ヒレのカセキ
    en: Sail Fossil
    fr: Fossile Nageoire
    it: Fossilpinna
    de: Flossenfossil
    es: Fósil Aleta
    ko: 지느러미화석
    zh_simp: 鳍之化石
    zh_trad: 鰭之化石
  descriptions:
    jp_kana: "大昔　地上で　暮らした\n古代ポケモンの　カセキ。\n首のヒレの一部　らしい。"
    jp_kanji: "大昔　地上で　暮らした\n古代ポケモンの　カセキ。\n首のヒレの一部　らしい。"
    en: "A fossil from a prehistoric Pokémon that once lived\non the land. It looks like the impression from a\nskin sail."
    fr: "Le fossile d’un Pokémon préhistorique terrestre.\nOn dirait un morceau de nageoire."
    it: "Fossile di un Pokémon preistorico che viveva\nsulla terraferma. Sembra far parte di una pinna."
    de: "Das Fossil eines urzeitlichen Pokémon, das an Land\nlebte. Es sieht wie ein Teil einer Flosse aus."
    es: "Fósil de un Pokémon prehistórico terrestre. Parece la\nimpresión de una aleta."
    ko: "오랜 옛날 지상에서 살았던\n고대 포켓몬의 화석.\n목지느러미의 일부인 듯하다."
    zh_simp: "很久以前生活在地上的\n古代宝可梦的化石。\n好像是头鳍的一部分。"
    zh_trad: "很久以前生活在地上的\n古代寶可夢的化石。\n好像是頭鰭的一部分。"
salac_berry:
  names:
    jp_kana: カムラのみ
    jp_kanji: カムラのみ
    en: Salac Berry
    fr: Baie Sailak
    it: Baccasalak
    de: Salkabeere
    es: Baya Aslac
    ko: 캄라열매
    zh_simp: 沙鳞果
    zh_trad: 沙鱗果
  descriptions:
    jp_kana: "ポケモンに　持たせると\nピンチのとき　自分の\n素早さが　あがる。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　自分の\n素早さが　あがる。"
    en: "If a Pokémon holds one of these Berries, its Speed stat\nwill be boosted should it find itself in a pinch."
    fr: Tenue, cette Baie augmente la Vitesse en cas de besoin.
    it: "Se il Pokémon che ha questa bacca si trova in difficoltà,\nla sua Velocità aumenta."
    de: "Als getragenes Item erhöht diese Beere die Initiative\ndes Pokémon, sobald es in einer Notlage steckt."
    es: "Si la lleva un Pokémon, le aumenta la Velocidad en un\nmomento de apuro."
    ko: "포켓몬에게 지니게 하면\n위급할 때 자신의\n스피드가 올라간다."
    zh_simp: "让宝可梦携带后，危机时，\n自己的速度就会提高。"
    zh_trad: "讓寶可夢攜帶後，\n危機時，自己的\n速度就會提高。"
salad_mix:
  names:
    jp_kana: やさいパック
    jp_kanji: やさいパック
    en: Salad Mix
    fr: Légumes
    it: Verdure
    de: Gemüse
    es: Verduras
    ko: 채소팩
    zh_simp: 袋装蔬菜
    zh_trad: 袋裝蔬菜
  descriptions:
    jp_kana: "キャンプの　料理に　使う\n食材の　一種。いろんな　野菜の\n詰めあわせで　健康に　よさそう。"
    jp_kanji: "キャンプの　料理に　使う\n食材の　一種。いろんな　野菜の\n詰めあわせで　健康に　よさそう。"
    en: "One of the many ingredients that can be used for\ncooking at your camp. The assortment of vegetables\nlooks quite appealing and healthy."
    fr: "Un ingrédient de cuisine pour le camping.\nCet assortiment de légumes divers permet de préparer\ndes plats équilibrés."
    it: "Uno degli ingredienti che puoi usare per cucinare\nin campeggio. Un assortimento di ortaggi dall’aria\nmolto salutare."
    de: "Eine Zutat für PokéCamping-Mahlzeiten. Diese bunte\nMischung aus verschiedenen Gemüsesorten sorgt für\neine ausgewogene und gesunde Ernährung."
    es: "Un ingrediente para cocinar en el campamento. Una\nmezcla muy sana de varios tipos de verduras."
    ko: "캠프 요리에 사용되는\n식재료 중 하나. 다양한 채소가\n들어 있어 건강에 좋아 보인다."
    zh_simp: "在露营营地制作料理时会使用的\n一种食材。将各种蔬菜搭配到一起，\n看上去就非常有益健康。"
    zh_trad: "製作露營料理時使用的食材之一。\n裡面裝著什錦蔬菜，\n看起來十分有益健康。"
salamencite:
  names:
    jp_kana: ボーマンダナイト
    jp_kanji: ボーマンダナイト
    en: Salamencite
    fr: Drattakite
    it: Salamencite
    de: Brutalandanit
    es: Salamencita
    ko: 보만다나이트
    zh_simp: 暴飞龙进化石
    zh_trad: 暴飛龍進化石
  descriptions:
    jp_kana: "ボーマンダに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    jp_kanji: "ボーマンダに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Salamence hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Drattak, elle lui permet de méga-évoluer\ndurant un combat."
    it: "Una delle misteriose Megapietre. Data a Salamence,\ngli permette di megaevolversi durante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Brutalanda getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Salamence en combate."
    ko: "보만다에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "暴飞龙携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "暴飛龍攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
salandit_gas:
  names:
    jp_kana: ヤトウモリのガス
    jp_kanji: ヤトウモリのガス
    en: Salandit Gas
    fr: Gaz de Tritox
    it: Gas di Salandit
    de: Molunk-Gas
    es: Gas de Salandit
    ko: 야도뇽의가스
    zh_simp: 夜盗火蜥的气体
    zh_trad: 夜盜火蜥的氣體
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
salt:
  names:
    jp_kana: ソルト
    jp_kanji: ソルト
    en: Salt
    fr: Sel
    it: Sale
    de: Salz
    es: Sal
    ko: 소금
    zh_simp: 盐
    zh_trad: 鹽
  descriptions:
    jp_kana: "塩味が　強い　調味料。\n特に　かくばった　ジオヅムの\n足跡から　採れる　ソルトが　人気。"
    jp_kanji: "塩味が　強い　調味料。\n特に　かくばった　ジオヅムの\n足跡から　採れる　ソルトが　人気。"
    en: "A very salty seasoning, unsurprisingly. People quite\nlike the grains of salt that can be gathered from the\nfootprints of particularly jagged Naclstack."
    fr: "Un condiment qui donne tout son sens aux mots\n« très salé ». Le Sel récolté dans les empreintes des\nAmassel particulièrement cubiques est très apprécié."
    it: "Un condimento molto salato. Quello raccolto dalle\nimpronte lasciate dai Naclstack più squadrati è molto\npopolare."
    de: "Ein sehr salziges Würzmittel, wie nicht anders zu\nerwarten. Besonders beliebt ist Salz, das aus den\nFußabdrücken äußerst kantiger Sedisal gewonnen wird."
    es: "Un condimento salado, obviamente. La sal que se puede\nencontrar en las huellas que dejan los Naclstack\nparticularmente angulosos es muy popular."
    ko: "짠맛이 강한 조미료.\n특히 네모난 스태솔트의\n발자취에서 채집한 소금이 인기다."
    zh_simp: "咸味强烈的调味料。\n从四四方方的盐石垒脚印下\n采集到的盐特别受欢迎。"
    zh_trad: "鹹味強勁的調味料。\n從稜稜角角的鹽石壘的足跡\n採得的鹽特別受到歡迎。"
salt_cake:
  names:
    jp_kana: ミネラルよせだま
    jp_kanji: ミネラルよせだま
    en: Salt Cake
    fr: Appât Rochedur
    it: Polpetta minerale
    de: Mineralköder
    es: Cebo Mineral
    ko: 미네랄유인환
    zh_simp: 矿诱团
    zh_trad: 礦誘糰
  descriptions:
    jp_kana: "ミネラルとよせだまのもとを練り込んだもの。\n草や岩のようなポケモンを\n強く引き寄せることができる。"
    jp_kanji: "ミネラルとよせだまのもとを練り込んだもの。\n草や岩のようなポケモンを\n強く引き寄せることができる。"
    en: "A cake made by combining salt with a Cake-Lure Base.\nThese cakes are potently effective at attracting Pokémon\nthat bear a resemblance to grass, plants, or minerals."
    fr: "Obtenu en pétrissant une boule d’Appâte mélangée\nà du sel, cet appât attire fortement les Pokémon\npareils à des plantes ou à des roches."
    it: "Strumento creato aggiungendo dei minerali a una\nPolpetta base. Esercita una forte attrattiva in particolare\nsui Pokémon simili a vegetali e rocce."
    de: "Eine Mischung aus Köderteig und Mineralen, von der\nfels- sowie pflanzenähnliche Pokémon stark angezogen\nwerden."
    es: "Bola de cebo creada con minerales y masa que atrae a\nlos Pokémon con atributos vegetales o rocosos."
    ko: "미네랄과 유인환반죽을 섞어서 반죽한 것.\n풀이나 바위 같은 포켓몬을\n강하게 유인하는 효과가 있다."
    zh_simp: "由矿物与诱团原料糅合而成。\n对草类和岩石类宝可梦\n有着很强的吸引力。"
    zh_trad: "由礦物與誘糰原料揉合而成。\n對草類和岩石類寶可夢\n有著很強的吸引力。"
salt_cake:recipe:
  names:
    jp_kana: ミネラルよせだま
    jp_kanji: ミネラルよせだま
    en: Salt Cake
    fr: Appât Rochedur
    it: Polpetta minerale
    de: Mineralköder
    es: Cebo Mineral
    ko: 미네랄유인환
    zh_simp: 矿诱团
    zh_trad: 礦誘糰
  descriptions:
    jp_kana: "ミネラルよせだまのレシピ。　材料は\nごりごりミネラル×１　よせだまのもと×１"
    jp_kanji: "ミネラルよせだまのレシピ。　材料は\nごりごりミネラル×１　よせだまのもと×１"
    en: "A recipe for crafting Salt Cakes from scratch.\nRequired materials: 1 hunk of Crunchy Salt and\n1 Cake-Lure Base."
    fr: "Méthode pour Appât Rochedur. Ressources requises :\n1 cristal de Sel Rochedur et 1 boule d’Appâte."
    it: "Ricetta per una Polpetta minerale. Richiede 1 pezzo\ndi Minerale duro e 1 Polpetta base."
    de: "Die Anleitung zur Herstellung eines Mineralköders.\nBenötigte Materialien: 1 Brocken Knirschmineral und\n1 Portion Köderteig."
    es: "Receta para crear Cebos Minerales. Materiales:\n1 trozo de Mineral Crocante y 1 bola de Masa\npara Cebo."
    ko: "미네랄유인환의 레시피.\n재료: 단단미네랄×1 유인환반죽×1"
    zh_simp: "矿诱团的材料单。材料是：\n坚坚矿×１　诱团原料×１"
    zh_trad: "礦誘糰的材料單。材料是：\n堅堅礦×１　誘糰原料×１"
salty_herba_mystica:
  names:
    jp_kana: ひでん：しおスパイス
    jp_kanji: ひでん：しおスパイス
    en: Salty Herba Mystica
    fr: Épice Secrète Salée
    it: Spezia nascosta salata
    de: Salziges Geheimgewürz
    es: Especia Oculta Salada
    ko: 비전 짭짤스파이스
    zh_simp: 秘传：咸味料
    zh_trad: 秘傳：鹹味料
  descriptions:
    jp_kana: "幻と呼ばれる　調味料の　ひとつ。\nまろやかな　その塩味には　すさまじい\n健康促進の　効果が　あるという。"
    jp_kanji: "幻と呼ばれる　調味料の　ひとつ。\nまろやかな　その塩味には　すさまじい\n健康促進の　効果が　あるという。"
    en: "One of the condiments spoken of as legends. Its mellow\nsaltiness is said to be tremendously effective when it\ncomes to promoting health."
    fr: "Un des condiments considérés comme fabuleux.\nOn raconte que sa rondeur salée a de prodigieux\neffets bénéfiques sur la santé."
    it: "Uno dei condimenti definiti leggendari. Il suo gusto\nrotondo e salato avrebbe effetti prodigiosi per la salute."
    de: "Eines der Würzmittel, die als mystisch gelten. Seinem\nsanften, salzigen Geschmack wird eine nahezu sagenhaft\nanmutende gesundheitsfördernde Wirkung nachgesagt."
    es: "Uno de los condimentos considerados de leyenda.\nSe dice que, además de un suave sabor salado, aporta\ninnumerables beneficios para la salud."
    ko: "환상이라 불리는 조미료의 일종.\n부드러운 짠맛에 어마어마한\n건강 증진 효과가 있다고 한다."
    zh_simp: "被以奇幻来形容的调味料之一。\n醇美的咸味在促进健康上\n据说有着惊人的效果。"
    zh_trad: "被冠以幻之名的調味料之一。\n據說其順口的鹹味帶有\n極為顯著的增進健康之效。"
sand_radish:
  names:
    jp_kana: スナハマダイコン
    jp_kanji: スナハマダイコン
    en: Sand Radish
    fr: Radis des Plages
    it: Rafano costiero
    de: Strandrettich
    es: Rábano Arenero
    ko: 모래해변무
    zh_simp: 沙滩萝卜
    zh_trad: 沙灘蘿蔔
  descriptions:
    jp_kana: "元は砂浜に自生していたが凍土でも育つよう\n改良された根菜。根は苦いが漬けこむことで\n甘辛くなり　にばいづけの材料となる。"
    jp_kanji: "元は砂浜に自生していたが凍土でも育つよう\n改良された根菜。根は苦いが漬けこむことで\n甘辛くなり　にばいづけの材料となる。"
    en: "This bitter root, originally native to sandy beaches, can\nnow be raised even in frozen soil. It is pickled to make a\nsweet and spicy treat known as Twice-Spiced Radishes."
    fr: "Ce radis requis pour la confection des Bouchées Doubles\nse trouvait à l’origine sur les plages et pousse maintenant\ndans les sols gelés. Il perd son amertume une fois mariné."
    it: "Radice amara che cresce sulle spiagge, ma ben adattata\nanche al freddo. Se marinata, assume un sapore dolce\ne piccante. Viene impiegata per preparare i Doppiaceti."
    de: "Dieses inzwischen auch im Frostland wachsende Strand-\ngewächs wird zur Herstellung von Doppelrettich genutzt.\nSeine bitteren Wurzeln schmecken eingelegt süß-würzig."
    es: "Hortaliza que solía crecer en playas arenosas, adaptada\nal clima de la tundra. Se encurte para tornar dulces y\npicantes sus amargas raíces y preparar el Encurtidoble."
    ko: "모래해변에 자생하던 것을 동토에서도 기를 수 있게\n개량한 뿌리채소. 뿌리는 맛이 쓰지만\n절이면 매콤달콤해져서, 두배절임의 재료로 쓰인다."
    zh_simp: "原本生长在沙滩的根菜，经过改良后\n在冻土也能生长。根部味苦，腌渍后则会\n变得甜中带辣，可作为双倍腌菜的材料。"
    zh_trad: "原本生長在沙灘的根菜。經過改良後在凍土\n也能生長。根部味苦，醃漬後則會變得\n甜中帶辣，可作為雙倍醃菜的材料。"
sandile_claw:
  names:
    jp_kana: メグロコのツメ
    jp_kanji: メグロコのツメ
    en: Sandile Claw
    fr: Griffe de Mascaïman
    it: Artiglio di Sandile
    de: Ganovil-Kralle
    es: Garra de Sandile
    ko: 깜눈크의발톱
    zh_simp: 黑眼鳄的爪子
    zh_trad: 黑眼鱷的爪子
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
sandshrew_candy:
  names:
    jp_kana: サンドのアメ
    jp_kanji: サンドのアメ
    en: Sandshrew Candy
    fr: Bonbon Sabelette
    it: Caramella Sandshrew
    de: Sandan-Bonbon
    es: Caramelo Sandshrew
    ko: 모래두지의사탕
    zh_simp: 穿山鼠的糖果
    zh_trad: 穿山鼠的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
sandshrew_claw:
  names:
    jp_kana: サンドのツメ
    jp_kanji: サンドのツメ
    en: Sandshrew Claw
    fr: Griffe de Sabelette
    it: Artiglio di Sandshrew
    de: Sandan-Kralle
    es: Garra de Sandshrew
    ko: 모래두지의발톱
    zh_simp: 穿山鼠的爪子
    zh_trad: 穿山鼠的爪子
  descriptions:
