    zh_simp: 可疑补丁
    zh_trad: 可疑修正檔
  descriptions:
    jp_kana: "なかに　怪しい情報が\nつまった　透明な機械。\nあるポケモンが　好んでいる。"
    jp_kanji: "なかに　怪しい情報が\nつまった　透明な機械。\nあるポケモンが　好んでいる。"
    en: "A transparent device overflowing with dubious data.\nIt’s loved by a certain Pokémon."
    fr: "Un appareil transparent rempli de données douteuses.\nApprécié d’un certain Pokémon."
    it: "Dispositivo trasparente strapieno di dati di dubbia\norigine. Piace a un Pokémon in particolare."
    de: "Ein durchsichtiges Gerät. Es enthält dubiose Daten.\nDas Lieblingsstück eines bestimmten Pokémon."
    es: "Dispositivo transparente que contiene datos\nmisteriosos. Cierto Pokémon lo adora."
    ko: "안에 괴상한 정보가\n가득한 투명한 기계다.\n어떤 포켓몬이 좋아하는 물건이다."
    zh_simp: "内部储存了奇怪信息的透明机器。\n某种宝可梦很喜欢它。"
    zh_trad: "內部儲存了可疑\n資訊的透明機器。\n某種寶可夢很喜歡它。"
