    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
tyranitarite:
  names:
    jp_kana: バンギラスナイト
    jp_kanji: バンギラスナイト
    en: Tyranitarite
    fr: Tyranocivite
    it: Tyranitarite
    de: Despotarnit
    es: Tyranitarita
    ko: 마기라스나이트
    zh_simp: 班基拉斯进化石
    zh_trad: 班基拉斯進化石
  descriptions:
    jp_kana: "バンギラスに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    jp_kanji: "バンギラスに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Tyranitar hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Tyranocif, elle lui permet de\nméga-évoluer durant un combat."
    it: "Una delle misteriose Megapietre. Data a Tyranitar,\ngli permette di megaevolversi durante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Despotar getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Tyranitar en combate."
    ko: "마기라스에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让班基拉斯携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓班基拉斯攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
tyrogue_sweat:
  names:
    jp_kana: バルキーのあせ
    jp_kanji: バルキーのあせ
