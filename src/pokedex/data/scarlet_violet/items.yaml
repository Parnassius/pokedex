splash_plate:
  names:
    jp_kana: しずくプレート
    jp_kanji: しずくプレート
    en: Splash Plate
    fr: Plaque Hydro
    it: Lastraidro
    de: Wassertafel
    es: Tabla Linfa
    ko: 물방울플레이트
    zh_simp: 水滴石板
    zh_trad: 水滴石板
  descriptions:
    jp_kana: "みずのタイプの　石盤。\n持たせると　みずタイプの\n技の威力が　強まる。"
    jp_kanji: "みずのタイプの　石盤。\n持たせると　みずタイプの\n技の威力が　強まる。"
    en: "An item to be held by a Pokémon. This stone tablet is\nimbued with the essence of water and boosts the power\nof the holder’s Water-type moves."
    fr: "Objet à tenir. Une tablette en pierre augmentant\nla puissance des capacités de type Eau."
    it: "Strumento da dare a un Pokémon. Lastra di pietra che\npotenzia le mosse di tipo Acqua."
    de: "Ein Item zum Tragen. Diese Steintafel verstärkt\nAttacken vom Typ Wasser."
    es: "Tabla de piedra que potencia los movimientos de tipo\nAgua. Debe llevarla un Pokémon."
    ko: "물타입의 석판.\n지니게 하면 물타입\n기술의 위력이 강해진다."
    zh_simp: "水属性的石板。\n携带后，水属性的\n招式威力就会增强。"
    zh_trad: "水屬性的石板。\n攜帶後，水屬性的\n招式威力就會增強。"
spoiled_apricorn:
  names:
    jp_kana: むしくいぼんぐり
    jp_kanji: むしくいぼんぐり
    en: Spoiled Apricorn
    fr: Noigrume Rongé
    it: Ghicocca bacata
    de: Löchrige Aprikoko
    es: Bonguri Pocho
    ko: 벌레먹은규토리
    zh_simp: 蛀球果
    zh_trad: 蛀球果
  descriptions:
    jp_kana: "中身が食べられた　ぼんぐり。\n投げつけられたポケモンは動きが鈍り\n隙がうまれることもある。"
    jp_kanji: "中身が食べられた　ぼんぐり。\n投げつけられたポケモンは動きが鈍り\n隙がうまれることもある。"
    en: "An Apricorn that’s had its insides eaten. Hitting a\nPokémon with one may stun the Pokémon, creating an\nopening for you to act."
    fr: "Un Noigrume dont la chair a été mangée. Lancez-le\nsur un Pokémon pour ralentir ses mouvements,\nvoire le rendre vulnérable."
    it: "Ghicocca rosicchiata dall’interno. Se lanciata contro\nun Pokémon, ne rallenta i movimenti e può fargli\nabbassare la guardia."
    de: "Wird diese innen zerfressene Aprikoko auf ein Pokémon\ngeworfen, macht sie es schwerfälliger und schafft so\nmöglicherweise eine günstige Gelegenheit für dich."
    es: "Un bonguri que ha sido comido por dentro. Al acertar a\nun Pokémon con él, dificulta sus movimientos y puede\ndejarlo expuesto."
    ko: "속을 파먹힌 규토리.\n포켓몬에게 던지면 움직임이 둔해져서\n빈틈이 생길 때가 있다."
    zh_simp: "果肉被吃掉了的球果。\n被它投中的宝可梦动作会\n变得迟缓，有时还会生出破绽。"
    zh_trad: "果肉被吃掉了的球果。\n被它投中的寶可夢動作會\n變得遲緩，有時還會生出破綻。"
spoink_pearl:
  names:
    jp_kana: バネブーのしんじゅ
    jp_kanji: バネブーのしんじゅ
    en: Spoink Pearl
    fr: Perle de Spoink
    it: Perla di Spoink
    de: Spoink-Perle
    es: Perla de Spoink
    ko: 피그점프의진주
    zh_simp: 跳跳猪的珍珠
    zh_trad: 跳跳豬的珍珠
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
