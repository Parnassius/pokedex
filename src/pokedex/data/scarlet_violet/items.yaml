    fr: Plume Esprit
    it: Piumingegno
    de: Geniefeder
    es: Pluma Intelecto
    ko: 지력깃털
    zh_simp: 智力之羽
    zh_trad: 智力之羽
  descriptions:
    jp_kana: "ポケモンに　使う　道具。\nポケモン　１匹の　特攻の\n基礎ポイントを　ちょっと　あげる。"
    jp_kanji: "ポケモンに　使う　道具。\nポケモン　１匹の　特攻の\n基礎ポイントを　ちょっと　あげる。"
    en: "An item to be used on a Pokémon. This feather slightly\nincreases base points for a Pokémon’s Sp. Atk stat."
    fr: "Objet à utiliser sur un Pokémon pour augmenter\nlégèrement son Attaque Spéciale de base."
    it: "Strumento da usare su un Pokémon. Ne aumenta di poco\ni punti base dell’Attacco Speciale."
    de: "Wendet man dieses Item auf ein Pokémon an, werden\ndessen Spezial-Angriffs-Basispunkte dauerhaft ein wenig\nerhöht."
    es: "Pluma que aumenta un poco el Ataque Especial de base\nde un Pokémon."
    ko: "포켓몬에게 사용하는 도구.\n포켓몬 1마리의 특수공격\n기초 포인트를 조금 올린다."
    zh_simp: "用于宝可梦的道具。\n能稍微提高１只宝可梦的\n特攻的基础点数。"
    zh_trad: "用於寶可夢的道具。\n能稍微提高１隻寶可夢的\n特攻的基礎點數。"
genius_mochi:
  names:
    jp_kana: ちりょくのもち
    jp_kanji: ちりょくのもち
