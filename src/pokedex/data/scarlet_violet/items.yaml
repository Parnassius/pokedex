    zh_trad: 菇誘糰
  descriptions:
    jp_kana: "キノコよせだまのレシピ。　材料は\nもちもちキノコ×１　よせだまのもと×１"
    jp_kanji: "キノコよせだまのレシピ。　材料は\nもちもちキノコ×１　よせだまのもと×１"
    en: "A recipe for crafting Mushroom Cakes from scratch.\nRequired materials: 1 Springy Mushroom and\n1 Cake-Lure Base."
    fr: "Méthode pour Appât Toumou. Ressources requises :\n1 boule d’Appâte et 1 Champi Toumou."
    it: "Ricetta per una Polpetta funghi. Richiede 1 Fungo\ngommoso e 1 Polpetta base."
    de: "Die Anleitung zur Herstellung eines Pilzköders.\nBenötigte Materialien: 1 Zähpilz und\n1 Portion Köderteig."
    es: "Receta para crear Cebos de Setas. Materiales:\n1 Seta Esponjosa y 1 bola de Masa para Cebo."
    ko: "버섯유인환의 레시피.\n재료: 쫄깃쫄깃버섯×1 유인환반죽×1"
    zh_simp: "菇诱团的材料单。材料是：\n糯糯菇×１　诱团原料×１"
    zh_trad: "菇誘糰的材料單。材料是：\n糯糯菇×１　誘糰原料×１"
mustard:
  names:
    jp_kana: マスタード
    jp_kanji: マスタード
    en: Mustard
    fr: Moutarde
    it: Senape
    de: Senf
    es: Mostaza
    ko: 머스터드
    zh_simp: 黄芥末酱
    zh_trad: 黃芥末醬
  descriptions:
    jp_kana: "辛味が　強い　調味料。\nパン料理には　欠かせない。\nケチャップとも　相性バッチリ。"
    jp_kanji: "辛味が　強い　調味料。\nパン料理には　欠かせない。\nケチャップとも　相性バッチリ。"
    en: "A very spicy condiment that’s indispensable when bread\nis on the table. It pairs tremendously with ketchup."
    fr: "Un condiment au goût très épicé qui va très bien\navec le ketchup. Le pain fait ressortir ses puissants\narômes."
    it: "Un condimento molto piccante, immancabile nella\npreparazione dei panini. Si abbina alla perfezione\nanche con il Ketchup."
    de: "Ein sehr scharfes Würzmittel, das nie fehlen darf, wenn\nBrot gereicht wird. Es ergänzt sich wunderbar mit\nKetchup."
    es: "De sabor fuertemente picante, es un condimento\nimprescindible allá donde haya pan. Combina de\nmaravilla con el kétchup."
    ko: "매운맛이 강한 조미료.\n빵 요리에 빠지지 않는다.\n케첩과도 궁합이 잘 맞는다."
    zh_simp: "辣味强烈的调味料。\n制作面包料理必不可少，\n与番茄酱乃天作之合。"
    zh_trad: "辣味強勁的調味料。\n是麵包料理所不可或缺的滋味。\n和番茄醬也相當搭配。"
mysterious_balm:
  names:
    jp_kana: しずめだま
    jp_kanji: しずめだま
    en: Mysterious Balm
    fr: Pacifisphère
    it: Sferazen
    de: Ruhegabe
    es: Calmasfera
    ko: 진정환
    zh_simp: 镇宝
    zh_trad: 鎮寶
  descriptions:
    jp_kana: "アルセウスとの戦いで　使う\n不思議なタマ。"
    jp_kanji: "アルセウスとの戦いで　使う\n不思議なタマ。"
    en: A mysterious balm to be used when battling Arceus.
    fr: "Une sphère mystérieuse à utiliser lorsque l’on combat\nArceus."
    it: Sfera misteriosa da usare durante la lotta contro Arceus.
    de: "Diese mysteriöse Ruhegabe ist für den Einsatz im Kampf\ngegen Arceus gedacht."
    es: "Misteriosa esfera que ha de emplearse al combatir\ncontra Arceus."
    ko: 아르세우스와의 싸움에 사용하는 신비한 구슬.
    zh_simp: 与阿尔宙斯对战时使用的神秘球体。
    zh_trad: 與阿爾宙斯對戰時使用的神秘球體。
mysterious_shard_l:
  names:
    jp_kana: なぞのかけらＬ
    jp_kanji: なぞのかけらＬ
    en: Mysterious Shard L
    fr: Éclat Étrange L
    it: Frammento insolito L
    de: Enigmafragment L
    es: Esquirla Extraña L
    ko: 수수께끼의조각L
    zh_simp: 谜之碎片Ｌ
    zh_trad: 謎之碎片Ｌ
  descriptions:
    jp_kana: "不思議な　力を　感じる　大きなかけら。\nかけらの　中に　ハマナスの　花の\nような　模様が　浮かんでいる。"
    jp_kanji: "不思議な　力を　感じる　大きなかけら。\nかけらの　中に　ハマナスの　花の\nような　模様が　浮かんでいる。"
    en: "A large shard that emanates an enigmatic power.\nInside the shard, you can see a pattern that looks like\nRamanas roses."
    fr: "Un gros éclat qui dégage une étrange énergie.\nOn aperçoit à l’intérieur un motif qui rappelle\nla variété de fleurs Rosa rugosa."
    it: "Frammento di grandi dimensioni che emana un’energia\nmisteriosa. Al suo interno è visibile un motivo floreale\nche ricorda una rosa rugosa."
    de: "Ein großes Fragment, von dem eine rätselhafte Kraft\nausgeht. Die Musterung in seinem Inneren erinnert an\nHamanasu-Rosen."
    es: "Una gran esquirla de la que emana una misteriosa\nenergía y en cuyo interior se aprecia un motivo que\nrecuerda a una rosa rugosa Hansa."
    ko: "신비한 힘이 느껴지는 큰 조각.\n조각 안에 해당화 같은 무늬가 보인다."
    zh_simp: "能够感受到神秘力量的大碎片。\n碎片上浮现出了像玫瑰花一样的花纹。"
    zh_trad: "能感受到神奇力量的大碎片。\n碎片中浮現著像是玫瑰花的花紋。"
mysterious_shard_s:
  names:
    jp_kana: なぞのかけらＳ
    jp_kanji: なぞのかけらＳ
    en: Mysterious Shard S
    fr: Éclat Étrange S
    it: Frammento insolito S
    de: Enigmafragment S
    es: Esquirla Extraña S
    ko: 수수께끼의조각S
    zh_simp: 谜之碎片Ｓ
    zh_trad: 謎之碎片Ｓ
  descriptions:
    jp_kana: "不思議な　力を　感じる　小さなかけら。\nかけらの　中に　ハマナスの　花の\nような　模様が　浮かんでいる。"
    jp_kanji: "不思議な　力を　感じる　小さなかけら。\nかけらの　中に　ハマナスの　花の\nような　模様が　浮かんでいる。"
    en: "A small shard that emanates an enigmatic power.\nInside the shard, you can see a pattern that looks like\nRamanas roses."
    fr: "Un petit éclat qui dégage une étrange énergie.\nOn aperçoit à l’intérieur un motif qui rappelle\nla variété de fleurs Rosa rugosa."
    it: "Frammento di piccole dimensioni che emana un’energia\nmisteriosa. Al suo interno è visibile un motivo floreale\nche ricorda una rosa rugosa."
    de: "Ein kleines Fragment, von dem eine rätselhafte Kraft\nausgeht. Die Musterung in seinem Inneren erinnert an\nHamanasu-Rosen."
    es: "Una pequeña esquirla de la que emana una misteriosa\nenergía y en cuyo interior se aprecia un motivo que\nrecuerda a una rosa rugosa Hansa."
    ko: "신비한 힘이 느껴지는 작은 조각.\n조각 안에 해당화 같은 무늬가 보인다."
    zh_simp: "能够感受到神秘力量的小碎片。\n碎片上浮现出了像玫瑰花一样的花纹。"
    zh_trad: "能感受到神奇力量的小碎片。\n碎片中浮現著像是玫瑰花的花紋。"
mystery_egg:
  names:
    jp_kana: ふしぎなタマゴ
    jp_kanji: ふしぎなタマゴ
    en: Mystery Egg
    fr: Œuf Mystère
    it: Uovo mistero
    de: Rätsel-Ei
    es: Huevo Misterioso
    ko: 이상한알
    zh_simp: 神奇蛋
    zh_trad: 神奇蛋
  descriptions:
    jp_kana: "ポケモンじいさんから　あずかった\n不思議な　もようの　タマゴ。\nなんの　タマゴか　わからない。"
    jp_kanji: "ポケモンじいさんから　あずかった\n不思議な　もようの　タマゴ。\nなんの　タマゴか　わからない。"
    en: "An Egg obtained from Mr. Pokémon. It has a mysterious\npattern on it, and what is in the Egg is unknown."
    fr: "Un Œuf étrange confié par M. Pokémon.\nPersonne ne sait ce qu’il contient."
    it: "Uovo dai disegni bizzarri che si riceve da Mr. Pokémon.\nNon si sa che cosa contenga."
    de: "Ein seltsam gemustertes Ei, das du von Mr. Pokémon\nerhalten hast. Sein Inhalt liegt im Dunkeln."
    es: "Misterioso Huevo con dibujos que obtienes del\nSr. Pokémon. Nadie sabe qué contiene."
    ko: "포켓몬 할아버지로부터 받은\n이상한 모양의 알.\n어떤 알인지 모른다."
    zh_simp: "从宝可梦爷爷那里得到的\n有着神奇花纹的蛋。\n不知道是什么的蛋。"
    zh_trad: "從寶可夢爺爺那裡得到的\n有著神奇花紋的蛋。\n不知道是什麼的蛋。"
mystic_water:
  names:
    jp_kana: しんぴのしずく
    jp_kanji: しんぴのしずく
    en: Mystic Water
    fr: Eau Mystique
    it: Acqua magica
    de: Zauberwasser
    es: Agua Mística
    ko: 신비의물방울
    zh_simp: 神秘水滴
    zh_trad: 神秘水滴
  descriptions:
    jp_kana: "しずくの形の　宝石。\n持たせると　みずタイプの\n技の威力が　あがる。"
    jp_kanji: "しずくの形の　宝石。\n持たせると　みずタイプの\n技の威力が　あがる。"
    en: "An item to be held by a Pokémon. This teardrop-shaped\ngem boosts the power of the holder’s Water-type moves."
    fr: "Objet à tenir. Une gemme en forme de goutte d’eau\nqui augmente la puissance des capacités de type Eau."
    it: "Strumento da dare a un Pokémon. Gemma a forma\ndi goccia che potenzia le mosse di tipo Acqua."
    de: "Ein Item zum Tragen. Ein tränenförmiger Edelstein,\nder Attacken vom Typ Wasser verstärkt."
    es: "Gema con forma de gota de agua que potencia los\nmovimientos de tipo Agua. Debe llevarla un Pokémon."
    ko: "물방울 모양의 보석.\n지니게 하면 물타입\n기술의 위력이 올라간다."
    zh_simp: "水滴形状的宝石。\n携带后，水属性的\n招式威力就会提高。"
    zh_trad: "水滴形狀的寶石。\n攜帶後，水屬性的\n招式威力就會提高。"
mythical_pecha_berry:
  names:
    jp_kana: まぼろしモモン
    jp_kanji: まぼろしモモン
    en: Mythical Pecha Berry
    fr: Baie Pêcha Fabuleuse
    it: Baccapesca misteriosa
    de: Mysteriöse Pirsifbeere
    es: Baya Meloc Singular
    ko: 환상복슝
    zh_simp: 幻之桃桃果
    zh_trad: 幻之桃桃果
  descriptions:
    jp_kana: "職人が　大事に　育てた　モモンの木から\n数年に　ひとつだけ　生ると　いわれる\n最上級の　モモンのみ。　ツヤが　違う。"
    jp_kanji: "職人が　大事に　育てた　モモンの木から\n数年に　ひとつだけ　生ると　いわれる\n最上級の　モモンのみ。　ツヤが　違う。"
    en: "A Pecha Berry of the highest quality. It’s said that a\nPecha Berry tree carefully tended by an expert gardener\nwill produce just one of these Berries every few years."
    fr: "Une Baie Pêcha exceptionnelle au lustre particulier.\nIl faut des années d’entretien méticuleux avant\nqu’un arbre Pêcha en produise ne serait-ce qu’une seule."
    it: "Una Baccapesca sopraffina. Si dice che servano anni\ndi cure da parte degli agricoltori per produrne anche\nsolo una. Ha una lucentezza ineguagliabile."
    de: "Eine sehr erlesene Pirsifbeere mit unvergleichlichem\nGlanz. Es heißt, dass ein von Experten sorgfältig\ngepflegter Baum alle paar Jahre nur eine hervorbringt."
    es: "Baya Meloc de calidad suprema y de un lustre especial.\nSe dice que los agricultores tienen que dedicar años de\ncuidados para que los árboles produzcan siquiera una."
    ko: "장인이 소중하게 키운 복슝나무에서\n수년에 단 하나만 열린다고 전해 내려오는\n최상급 복슝열매. 빛깔부터 남다르다."
    zh_simp: "据说每隔数年才会在匠人\n精心栽培的桃桃树上结出一颗的\n最高级桃桃果。光泽与众不同。"
    zh_trad: "據說每隔幾年才會在匠人精心栽培\n的桃桃樹上結出一顆的最高級桃桃果。\n光澤明顯地與眾不同。"
n_lunarizer:fuse:
  names:
    jp_kana: ネクロプラスルナ
    jp_kanji: ネクロプラスルナ
    en: N-Lunarizer
    fr: Necroluna
    it: Necrolunix
    de: Necrolun
    es: Necroluna
    ko: 네크로플러스루나
    zh_simp: 奈克洛露奈合体器
    zh_trad: 奈克洛露奈合體器
  descriptions:
    jp_kana: "光を　必要と　する\nネクロズマと　ルナアーラを\n合体　させるための　マシン。"
    jp_kanji: "光を　必要と　する\nネクロズマと　ルナアーラを\n合体　させるための　マシン。"
    en: "A machine to fuse Necrozma, which needs light,\nand Lunala."
    fr: "Un appareil permettant à un Necrozma assoiffé\nde lumière de fusionner avec Lunala."
    it: "Dispositivo che permette a Necrozma di fondersi\ncon Lunala quando necessita di luce."
    de: "Necrozma, das Licht benötigt, kann mithilfe dieser\nMaschine mit Lunala fusioniert werden."
    es: "Artefacto que permite fusionar a Necrozma, ávido\nde luz, con Lunala."
    ko: "빛을 필요로 하는\n네크로즈마와 루나아라를\n합체시키기 위한 머신."
    zh_simp: "用来让需求光的奈克洛兹玛和\n露奈雅拉合体的机器。"
    zh_trad: "用來讓需要光的奈克洛茲瑪和\n露奈雅拉合體的機器。"
n_lunarizer:separate:
  names:
    jp_kana: ネクロプラスルナ
    jp_kanji: ネクロプラスルナ
    en: N-Lunarizer
    fr: Necroluna
    it: Necrolunix
    de: Necrolun
    es: Necroluna
    ko: 네크로플러스루나
    zh_simp: 奈克洛露奈合体器
    zh_trad: 奈克洛露奈合體器
  descriptions:
    jp_kana: "光を　必要と　していた\nネクロズマと　ルナアーラを\n分離　させるための　マシン。"
    jp_kanji: "光を　必要と　していた\nネクロズマと　ルナアーラを\n分離　させるための　マシン。"
    en: "A machine to separate Necrozma, which needed\nlight, from Lunala."
    fr: "Un appareil permettant d’annuler la fusion\nd’un Necrozma assoiffé de lumière avec Lunala."
    it: "Dispositivo che permette a Necrozma di separarsi\nda Lunala quando non necessita più di luce."
    de: "Necrozma, das Licht benötigte, kann mithilfe dieser\nMaschine wieder von Lunala getrennt werden."
    es: "Artefacto que permite separar a Necrozma, ávido\nde luz, tras su fusión con Lunala."
    ko: "빛을 필요로 했던\n네크로즈마와 루나아라를\n분리시키기 위한 머신."
    zh_simp: "用来让曾需求过光的奈克洛兹玛和\n露奈雅拉分离的机器。"
    zh_trad: "用來讓需要光的奈克洛茲瑪和\n露奈雅拉分離的機器。"
n_solarizer:fuse:
  names:
    jp_kana: ネクロプラスソル
    jp_kanji: ネクロプラスソル
    en: N-Solarizer
    fr: Necrosol
    it: Necrosolix
    de: Necrosol
    es: Necrosol
    ko: 네크로플러스솔
    zh_simp: 奈克洛索尔合体器
    zh_trad: 奈克洛索爾合體器
  descriptions:
