bread:
  names:
    jp_kana: しょくパン
    jp_kanji: しょくパン
    en: Bread
    fr: Pain de Mie
    it: Pan carré
    de: Toastbrot
    es: Pan de Molde
    ko: 식빵
    zh_simp: 吐司面包
    zh_trad: 吐司麵包
  descriptions:
    jp_kana: "キャンプの　料理に　使う\n食材の　一種。お皿に　残った\nカレーを　拭くのにも　重宝する。"
    jp_kanji: "キャンプの　料理に　使う\n食材の　一種。お皿に　残った\nカレーを　拭くのにも　重宝する。"
    en: "One of the many ingredients that can be used for\ncooking at your camp. An indispensable tool for\nmopping up that extra curry left on your plate."
    fr: "Un ingrédient de cuisine pour le camping.\nParfait pour saucer le curry quand on a fini son assiette."
    it: "Uno degli ingredienti che puoi usare per cucinare\nin campeggio. Queste fette di pane sono perfette\nper fare la scarpetta dopo aver mangiato il curry."
    de: "Eine Zutat für PokéCamping-Mahlzeiten. Eignet sich\nbestens, um damit Curryreste aufzutunken."
    es: "Un ingrediente para cocinar en el campamento. No hay\nplacer mayor que usar el pan para rebañar la salsa que\nqueda en el plato."
    ko: "캠프 요리에 사용되는\n식재료 중 하나. 접시에 남은\n카레를 닦아 내는 데도 유용하다."
    zh_simp: "在露营营地制作料理时会使用的\n一种食材。同时也是用于吸干盘中\n最后一滴咖喱的秘密武器。"
    zh_trad: "製作露營料理時使用的食材之一。\n也很適合用來把留在盤子上\n的咖哩全部抹乾淨。"
briars_book:
  names:
    jp_kana: ゼロの秘宝
    jp_kanji: ゼロの秘宝
    en: Briar’s Book
    fr: Livre de Bria
    it: Libro di Rea
    de: Briannas Buch
    es: Libro de Brie
    ko: 제로의 비보
    zh_simp: 零之秘宝
    zh_trad: 零之秘寶
  descriptions:
    jp_kana: "ゼロの大空洞の　探検記の見本。\n調査中　起きたことや　ブライア先生視点の\n考察が　長文で　書かれている。"
    jp_kanji: "ゼロの大空洞の　探検記の見本。\n調査中　起きたことや　ブライア先生視点の\n考察が　長文で　書かれている。"
    en: "A proof copy of the exploration notes covering the\nArea Zero Underdepths. It’s filled with long paragraphs\ndescribing what happened, along with Briar’s thoughts."
    fr: "Un exemplaire du récit d’exploration de l’Abîme Zéro,\nrédigé par madame Bria. Elle y partage ses réflexions\net décrit en détail les évènements de l’expédition."
    it: "Copia del resoconto sull’esplorazione del Grande\nAbisso Zero. Riporta in dettaglio fatti avvenuti durante\nle ricerche e considerazioni della professoressa Rea."
    de: "Ein Probeexemplar des Expeditionsberichts über das\nHöhlensystem Null. Ms Brianna schildert darin detailliert\ndie Ereignisse und ihre Gedanken dazu."
    es: "Libro que relata de forma extensiva los detalles de la\ninvestigación y las reflexiones de la docente Brie.\nSe titula \"El tesoro oculto del Área Cero\"."
    ko: "제로의 대공동 탐험기의 견본.\n조사 중에 일어난 일과 브라이어의 시점에서\n고찰한 내용이 장문으로 쓰여 있다."
    zh_simp: "零之大空洞探险记的样书。\n里面用长篇的文章记载着调查中\n发生的事件和白蕾雅老师的考察内容。"
    zh_trad: "零之大空洞探險記的樣書。\n裡頭用長篇文章寫著調查過程中\n發生的事和白蕾雅老師考察研究的內容。"
bridge_mail_d:
  names:
    jp_kana: ブリッジメールＨ
    jp_kanji: ブリッジメールＨ
    en: Bridge Mail D
    fr: Lettre Pont Y
    it: Messaggio Ponte L
    de: Brückbrief M
    es: Carta Puente F
    ko: 브리지메일M
    zh_simp: 桥梁邮件Ｈ
    zh_trad: 橋梁郵件Ｈ
  descriptions:
    jp_kana: "真っ赤な　跳ね橋の　絵柄が\nプリントされた　レターペーパー。\nポケモンに　持たせて　使う。"
    jp_kanji: "真っ赤な　跳ね橋の　絵柄が\nプリントされた　レターペーパー。\nポケモンに　持たせて　使う。"
    en: "Stationery featuring an illustration of a bright-red\ndrawbridge. Have a Pokémon hold it for delivery."
    fr: "Un papier à lettres avec un motif de pont mobile rouge.\nPeut être tenu et livré par un Pokémon."
    it: "Carta da lettere che riporta l’immagine di un ponte\nmobile di colore rosso fuoco.\nSi usa dandola a un Pokémon."
    de: "Das Briefpapier hat eine knallrote Zugbrücke als\nHintergrund. Gib es einem Pokémon zum Tragen."
    es: "Carta con la imagen de un puente levadizo de color\nrojo. Debe llevarla un Pokémon para entregarla."
    ko: "새빨간 도개교의 무늬가\n프린트된 편지지.\n포켓몬에게 지니게 해서 쓴다."
    zh_simp: "印有鲜红色活动桥图案的信纸。\n使用该道具时，\n需要让宝可梦携带着来用。"
    zh_trad: "印有大紅色活動橋圖案的信紙。\n需讓寶可夢攜帶使用。"
