    zh_trad: 起司片
  descriptions:
    jp_kana: "塩味が　ある　食材。\n薄く切った　シート状のチーズ。\n扱いやすく　サンドウィッチの　具材向き。"
    jp_kanji: "塩味が　ある　食材。\n薄く切った　シート状のチーズ。\n扱いやすく　サンドウィッチの　具材向き。"
    en: "A very salty ingredient. This thinly sliced cheese is\nperfect for adding to a sandwich."
    fr: "Un ingrédient au goût salé.\nCe fromage a été coupé en tranches fines pour le\nrendre encore plus facile à ajouter à un Sandwich."
    it: "Un ingrediente salato. Tagliato a fette sottili è ideale\nda usare nei panini."
    de: "Diese in dünne Scheiben geschnittene salzige Zutat ist\nder perfekte Belag für ein Sandwich."
    es: "De fuerte sabor salado, esta fina loncha de queso\nestá pensada para poder incluirse fácilmente en\ncualquier bocadillo."
    ko: "짠맛이 나는 식재료.\n얇게 저민 시트형 치즈다.\n다루기 쉬워서 샌드위치 재료로 적합하다."
    zh_simp: "带有咸味的食材。\n切成薄片的芝士。方便使用，\n适合用作三明治的馅料。"
    zh_trad: "帶有鹹味的食材。\n切成薄片的起司。\n容易使用，適合作為三明治的材料。"
cheri_berry:
  names:
    jp_kana: クラボのみ
    jp_kanji: クラボのみ
    en: Cheri Berry
    fr: Baie Ceriz
    it: Baccaliegia
    de: Amrenabeere
    es: Baya Zreza
    ko: 버치열매
    zh_simp: 樱子果
    zh_trad: 櫻子果
  descriptions:
    jp_kana: "ポケモンに　持たせると\nまひを　回復する。"
    jp_kanji: "ポケモンに　持たせると\nまひを　回復する。"
    en: "If a Pokémon holds one of these Berries, it will be able\nto free itself from paralysis."
    fr: "Une Baie qui soigne la paralysie lorsqu’elle est tenue\npar un Pokémon."
    it: Se un Pokémon ha questa bacca, guarisce dalla paralisi.
    de: "Als getragenes Item heilt diese Beere das Pokémon von\nParalyse."
    es: "Los Pokémon pueden llevarla y usarla para recuperarse\nde la parálisis."
    ko: "포켓몬에게 지니게 하면\n마비를 회복한다."
    zh_simp: "让宝可梦携带后，\n可以治愈麻痹。"
    zh_trad: "讓寶可夢攜帶後，\n可以治癒麻痺。"
cherish_ball:
  names:
    jp_kana: プレシャスボール
    jp_kanji: プレシャスボール
    en: Cherish Ball
    fr: Mémoire Ball
    it: Pregio Ball
    de: Jubelball
    es: Gloria Ball
    ko: 프레셔스볼
    zh_simp: 贵重球
    zh_trad: 貴重球
  descriptions:
    jp_kana: "なにかの　記念の品として\n特別に　つくられた\nかなり　めずらしい　ボール。"
    jp_kanji: "なにかの　記念の品として\n特別に　つくられた\nかなり　めずらしい　ボール。"
    en: "A quite rare Poké Ball made to commemorate a special\noccasion of some sort."
    fr: "Une Poké Ball plutôt rare qui fut créée\npour une occasion spéciale."
    it: "Poké Ball molto esclusiva creata per commemorare\nun evento speciale."
    de: "Ein seltener Ball, der als Reminiszenz an irgendein\nEreignis hergestellt wurde."
    es: "Poké Ball bastante singular que se creó para\nconmemorar alguna ocasión especial."
    ko: "무언가의 기념품으로\n특별히 만들어진\n상당히 진귀한 볼."
    zh_simp: "相当珍贵的球。\n特制出来的某种纪念品。"
    zh_trad: "作為某種紀念品\n而特別製造的，\n頗稀奇的球。"
cherry_tomatoes:
  names:
    jp_kana: カットミニトマト
    jp_kanji: カットミニトマト
    en: Cherry Tomatoes
    fr: Tomate Cerise
    it: Pomodorino
    de: Mini-Tomate
    es: Tomate Cherri
    ko: 방울토마토슬라이스
    zh_simp: 小番茄块
    zh_trad: 小番茄塊
  descriptions:
    jp_kana: "酸味が　強い　食材。\nとりわけ　甘みも　強い　品種が\nパルデアでは　人気なのだ。"
    jp_kanji: "酸味が　強い　食材。\nとりわけ　甘みも　強い　品種が\nパルデアでは　人気なのだ。"
    en: "A very tart ingredient. Some varieties are also very\nsweet, and these are prized above all others by the\npeople of Paldea."
    fr: "Un ingrédient au goût très acide. Certaines variétés ont\naussi un goût très sucré qui les rend particulièrement\npopulaires à Paldea."
    it: "Un ingrediente molto aspro. Le varietà più dolci sono\nle più apprezzate a Paldea."
    de: "Eine sehr saure Zutat, doch in Paldea erfreuen sich\neher Sorten von stark süßlichem Geschmack großer\nBeliebtheit."
    es: "Tienen un fuerte componente ácido, pero las variedades\nmás dulces son las más populares en Paldea."
    ko: "신맛이 강한 식재료.\n특히 단맛도 강한 품종이\n팔데아에서 인기다."
    zh_simp: "酸味强烈的食材。\n味道特别甜的品种\n在帕底亚很受欢迎。"
    zh_trad: "酸味強勁的食材。\n甜味也特別重的品種\n在帕底亞地區很受歡迎。"
chesto_berry:
  names:
    jp_kana: カゴのみ
    jp_kanji: カゴのみ
    en: Chesto Berry
    fr: Baie Maron
    it: Baccastagna
    de: Maronbeere
    es: Baya Atania
    ko: 유루열매
    zh_simp: 零余果
    zh_trad: 零餘果
  descriptions:
    jp_kana: "ポケモンに　持たせると\n眠りを　回復する。"
    jp_kanji: "ポケモンに　持たせると\n眠りを　回復する。"
    en: "If a Pokémon holds one of these Berries, it will be able\nto wake itself from sleep."
    fr: "Une Baie qui soigne le sommeil lorsqu’elle est tenue\npar un Pokémon."
    it: Se un Pokémon ha questa bacca, si risveglia dal sonno.
    de: "Als getragenes Item lässt diese Beere das Pokémon\naufwachen, wenn es in Schlaf versetzt wird."
    es: "Los Pokémon pueden llevarla y usarla para despertar\ndel sueño."
    ko: "포켓몬에게 지니게 하면\n잠듦을 회복한다."
    zh_simp: "让宝可梦携带后，\n可以治愈睡眠。"
    zh_trad: "讓寶可夢攜帶後，\n可以治癒睡眠。"
chewtle_claw:
  names:
    jp_kana: カムカメのツメ
    jp_kanji: カムカメのツメ
    en: Chewtle Claw
    fr: Griffe de Khélocrok
    it: Unghia di Chewtle
    de: Kamehaps-Kralle
    es: Garra de Chewtle
    ko: 깨물부기의발톱
    zh_simp: 咬咬龟的爪子
    zh_trad: 咬咬龜的爪子
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
chilan_berry:
  names:
    jp_kana: ホズのみ
    jp_kanji: ホズのみ
    en: Chilan Berry
    fr: Baie Zalis
    it: Baccacinlan
    de: Latchibeere
    es: Baya Chilan
    ko: 카리열매
    zh_simp: 灯浆果
    zh_trad: 燈漿果
  descriptions:
    jp_kana: "ポケモンに　持たせると\nノーマル技を　受けたとき\n威力が　弱まる。"
    jp_kanji: "ポケモンに　持たせると\nノーマル技を　受けたとき\n威力が　弱まる。"
    en: "If a Pokémon holding this Berry is hit with a\nNormal-type move, the power of that move\nwill be weakened."
    fr: "Tenue, cette Baie réduit les dégâts subis lorsque\nle Pokémon est touché par une capacité super efficace\nde type Normal."
    it: "Se il Pokémon che ha questa bacca subisce una mossa\ndi tipo Normale, la potenza della mossa viene\nindebolita."
    de: "Als getragenes Item schwächt diese Beere eine\nNormal-Attacke, von der das Pokémon getroffen wird."
    es: "Si la lleva un Pokémon, debilita un ataque de tipo\nNormal que reciba."
    ko: "포켓몬에게 지니게 하면\n노말 기술로 공격받았을 때\n위력이 약해진다."
    zh_simp: "让宝可梦携带后，\n在受到一般属性招式攻击时，\n能令其威力减弱。"
    zh_trad: "讓寶可夢攜帶後，\n在受到一般屬性招式攻擊時，\n能使其威力減弱。"
chili_sauce:
  names:
    jp_kana: チリソース
    jp_kanji: チリソース
    en: Chili Sauce
    fr: Sauce Piquante
    it: Salsa piccante
    de: Chilisoße
    es: Salsa Picante
    ko: 칠리소스
    zh_simp: 辣酱
    zh_trad: 辣醬
  descriptions:
    jp_kana: "辛味が　強い　調味料。\nスコヴィランから　抽出した成分を\n配合した　ピリッとした　ソース。"
    jp_kanji: "辛味が　強い　調味料。\nスコヴィランから　抽出した成分を\n配合した　ピリッとした　ソース。"
    en: "A condiment with a very spicy kick. It’s thanks to\nScovillain that this sauce gets its signature mouth-\ntingling burn."
    fr: "Un condiment au goût très épicé. C’est un ingrédient\nproduit par des Scovilain qui donne à cette sauce\nsa saveur si particulière."
    it: "Un condimento molto piccante. L’effetto bruciante\ndi questa salsa è causato da elementi provenienti\nda Scovillain mescolati insieme."
    de: "Das feurige Prickeln, das dieses sehr scharfe Würzmittel\nauf der Zunge auslöst, ist den Scharfstoffen von\nHalupenjo zu verdanken."
    es: "El extracto de Scovillain hace de este un condimento\nmuy picante."
    ko: "매운맛이 강한 조미료.\n스코빌런에게서 추출한 성분을\n배합해서 만든 알싸한 소스다."
    zh_simp: "辣味强烈的调味料。\n使用从狠辣椒抽出的成分\n调制而成的刺激酱汁。"
    zh_trad: "辣味強勁的調味料。\n加入萃取自狠辣椒的成分，\n調製而成的辛辣醬料。"
chill_drive:
  names:
    jp_kana: フリーズカセット
    jp_kanji: フリーズカセット
    en: Chill Drive
    fr: Module Cryo
    it: Gelomodulo
    de: Gefriermodul
    es: CrioROM
    ko: 프리즈카세트
    zh_simp: 冰冻卡带
    zh_trad: 冰凍卡帶
  descriptions:
    jp_kana: "ゲノセクトに　持たせると\nテクノバスターという　技が\nこおりタイプになる　カセット。"
    jp_kanji: "ゲノセクトに　持たせると\nテクノバスターという　技が\nこおりタイプになる　カセット。"
    en: "A cassette to be held by Genesect. It changes\nGenesect’s Techno Blast move so it becomes\nIce type."
    fr: "Tenu par Genesect, ce module change la capacité\nTechno-Buster en une capacité de type Glace."
    it: "Modulo da dare a Genesect. Trasforma Tecnobotto\nin una mossa di tipo Ghiaccio."
    de: "Ein Item, das von Genesect getragen werden kann.\nEs wandelt den Typ der Attacke Techblaster in\nEis um."
    es: "Cartucho que convierte Tecno Shock de Genesect en un\nmovimiento de tipo Hielo."
    ko: "게노세크트에게 지니게 하면\n테크노버스터라는 기술이\n얼음타입으로 바뀌는 카세트."
    zh_simp: "这是让盖诺赛克特携带的卡带。\n携带后，高科技光炮这招式\n就会变为冰属性。"
    zh_trad: "讓蓋諾賽克特攜帶的卡帶。\n攜帶後，招式高科技光炮\n會變為冰屬性。"
chinchou_sparks:
  names:
    jp_kana: チョンチーのでんき
    jp_kanji: チョンチーのでんき
    en: Chinchou Sparks
    fr: Électricité de Loupio
    it: Elettricità di Chinchou
    de: Lampi-Strom
    es: Electricidad de Chinchou
    ko: 초라기의전기
    zh_simp: 灯笼鱼的电力
    zh_trad: 燈籠魚的電力
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
chingling_fragment:
  names:
    jp_kana: リーシャンのかけら
    jp_kanji: リーシャンのかけら
    en: Chingling Fragment
    fr: Fragment de Korillon
    it: Frammento di Chingling
    de: Klingplim-Splitter
    es: Fragmento de Chingling
    ko: 랑딸랑의조각
    zh_simp: 铃铛响的碎片
    zh_trad: 鈴鐺響的碎片
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
chipped_pot:
  names:
    jp_kana: かけたポット
    jp_kanji: かけたポット
    en: Chipped Pot
    fr: Théière Ébréchée
    it: Teiera crepata
    de: Löchrige Kanne
    es: Tetera Rota
    ko: 이빠진포트
    zh_simp: 缺损的茶壶
    zh_trad: 缺損的茶壺
  descriptions:
    jp_kana: "ある特定の　ポケモンを\n進化させる　不思議なポット。\n欠けているが　お茶は　おいしくなる。"
    jp_kanji: "ある特定の　ポケモンを\n進化させる　不思議なポット。\n欠けているが　お茶は　おいしくなる。"
    en: "A peculiar teapot that can make a certain species of\nPokémon evolve. It may be chipped, but tea poured\nfrom it is delicious."
    fr: "Un récipient mystérieux pouvant faire évoluer un certain\nPokémon. Il est ébréché, mais on y fait du bon thé."
    it: "Teiera particolare che fa evolvere determinate\nspecie di Pokémon. È crepata, ma il tè che contiene\nè davvero ottimo."
    de: "Diese sonderbare Kanne löst bei einem bestimmten\nPokémon die Entwicklung aus. Sie weist zwar Löcher auf,\naber das wirkt sich nicht negativ auf den Tee aus."
    es: "Curiosa tetera que hace evolucionar a una determinada\nespecie de Pokémon. Pese a estar rota, sirve un té\nexquisito."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 포트.\n이가 빠졌지만 차는 맛있어진다."
    zh_simp: "这个神奇的茶壶\n可以使特定的宝可梦进化。\n虽然有缺陷，但泡出来的茶依旧清香。"
    zh_trad: "可以讓特定的寶可夢\n進化的神奇茶壺。\n雖然有缺口，但茶會變得美味。"
choice_band:
  names:
    jp_kana: こだわりハチマキ
    jp_kanji: こだわりハチマキ
    en: Choice Band
    fr: Bandeau Choix
    it: Bendascelta
    de: Wahlband
    es: Cinta Elección
    ko: 구애머리띠
    zh_simp: 讲究头带
    zh_trad: 講究頭帶
  descriptions:
    jp_kana: "ちょっと　こだわった　ハチマキ。\n持たせると　攻撃は　あがるが\n同じ技しか　だせなくなる。"
    jp_kanji: "ちょっと　こだわった　ハチマキ。\n持たせると　攻撃は　あがるが\n同じ技しか　だせなくなる。"
    en: "An item to be held by a Pokémon. This curious\nheadband boosts the holder’s Attack stat but only\nallows the use of a single move."
    fr: "Objet à tenir. Ce bandeau augmente l’Attaque,\nmais ne permet d’utiliser qu’une seule capacité."
    it: "Strumento da dare a un Pokémon. Questa benda\naumenta l’Attacco, ma permette l’uso di una sola mossa."
    de: "Ein Item zum Tragen. Erhöht den Angriff, aber nur eine\nAttacke ist einsetzbar."
    es: "Una cinta muy particular que aumenta el Ataque,\npero solo permite usar un movimiento. Debe llevarla\nun Pokémon."
    ko: "기술을 구애받는 머리띠.\n지니게 하면 공격은 올라가지만\n똑같은 기술밖에 쓰지 못한다."
    zh_simp: "有点讲究的头带。\n虽然携带后攻击会提高，\n但只能使出相同的招式。"
    zh_trad: "有點講究的頭帶。\n雖然攜帶後攻擊會提高，\n但只能使出相同的招式。"
choice_dumpling:
  names:
    jp_kana: こだわりちまき
    jp_kanji: こだわりちまき
    en: Choice Dumpling
    fr: Papillote Choix
    it: Involtoscelta
    de: Wahlreishappen
    es: Aperitivo Elección
    ko: 구애잎사귀떡
    zh_simp: 讲究粽
    zh_trad: 講究粽
  descriptions:
    jp_kana: "使うと　ポケモンが　熱中する　ちまき。\n熱中している技の　ダメージが　増えるが\nかわりに　受けるダメージも　増える。"
    jp_kanji: "使うと　ポケモンが　熱中する　ちまき。\n熱中している技の　ダメージが　増えるが\nかわりに　受けるダメージも　増える。"
    en: "A dumpling that will make a Pokémon become fixated on\na move in battle. The Pokémon will deal more damage\nwhen using that move but will take more damage as well."
    fr: "Le Pokémon qui mange ce plat sera obsédé par la\ndernière capacité utilisée. Les dégâts infligés par celle-ci\net les dégâts subis par le Pokémon augmenteront alors."
    it: "Fa sì che il Pokémon su cui è usato si fissi su una mossa,\nche infliggerà più danni. In compenso, aumenteranno\nanche i danni subiti dal Pokémon."
    de: "Durch diese Speise fixiert sich das Pokémon auf eine\nAttacke. In diesem Zustand richtet es mehr Schaden an,\nerleidet aber auch mehr Schaden."
    es: "El Pokémon que se lo coma se crecerá en combate y\nverá aumentada la potencia del último movimiento que\nhaya usado, aunque también el daño que reciba."
    ko: "사용하면 포켓몬이 열중 상태가 되는 잎사귀떡.\n열중하고 있는 기술의 데미지가 증가하지만\n자신이 입는 데미지도 증가한다."
    zh_simp: "使用后会让宝可梦陷入热衷的粽子。\n所热衷的招式给予的伤害会增加，\n同时自己受到的伤害也会增加。"
    zh_trad: "使用後會讓寶可夢陷入熱衷的粽子。\n所熱衷的招式給予的傷害會增加，\n同時自己受到的傷害也會增加。"
choice_dumpling:recipe:
  names:
    jp_kana: こだわりちまき
    jp_kanji: こだわりちまき
    en: Choice Dumpling
    fr: Papillote Choix
    it: Involtoscelta
    de: Wahlreishappen
    es: Aperitivo Elección
    ko: 구애잎사귀떡
    zh_simp: 讲究粽
    zh_trad: 講究粽
  descriptions:
    jp_kana: "こだわりちまきのレシピ。　材料は\nタマゼンマイ×３　ツルギマイタケ×１\nキュウショウロ×１　いきいきイナホ×２"
    jp_kanji: "こだわりちまきのレシピ。　材料は\nタマゼンマイ×３　ツルギマイタケ×１\nキュウショウロ×１　いきいきイナホ×２"
    en: "A recipe for crafting Choice Dumplings from scratch.\nRequired materials: 3 Caster Fern leaves, 1 Direshroom,\n1 bunch of Swordcap, and 2 stalks of Hearty Grains."
    fr: "Méthode pour Papillote Choix. Ressources requises :\n3 Feuilles Rondes, 1 Fortichampi, 1 Champiscoto\net 2 épis de Riz Zélé."
    it: "Ricetta per un Involtoscelta. Richiede 3 Felcitonde,\n1 cespo di Danzaspaditole, 1 Colpogone e 2 Spighe\nrigogliose."
    de: "Die Anleitung zur Herstellung eines Wahlreishappens.\nBenötigte Materialien: 3 Rundblätter, 1 Schwertling,\n1 Volltrefferling und 2 Ähren Munterreis."
    es: "Receta para crear Aperitivos Elección. Materiales:\n3 Helechos Rizados, 1 Seta Espada, 1 Seta Crítica y\n2 Espigas Vivaces."
    ko: "구애잎사귀떡의 레시피.\n재료: 둥근고비×3 칼춤버섯×1\n급소버섯×1 싱싱이삭×2"
    zh_simp: "讲究粽的材料单。材料是：\n弹子萁×３　剑舞菇×１\n要害松露×１　旺旺谷×２"
    zh_trad: "講究粽的材料單。材料是：\n彈子萁×３　劍舞菇×１\n要害松露×１　旺旺穀×２"
choice_scarf:
  names:
    jp_kana: こだわりスカーフ
    jp_kanji: こだわりスカーフ
    en: Choice Scarf
    fr: Mouchoir Choix
    it: Stolascelta
    de: Wahlschal
    es: Pañuelo Elección
    ko: 구애스카프
    zh_simp: 讲究围巾
    zh_trad: 講究圍巾
  descriptions:
    jp_kana: "ちょっと　こだわった　スカーフ。\n持たせると　素早さは　あがるが\n同じ技しか　だせなくなる。"
    jp_kanji: "ちょっと　こだわった　スカーフ。\n持たせると　素早さは　あがるが\n同じ技しか　だせなくなる。"
    en: "An item to be held by a Pokémon. This curious scarf\nboosts the holder’s Speed stat but only allows the use of\na single move."
    fr: "Objet à tenir. Augmente la Vitesse, mais ne permet\nd’utiliser qu’une seule capacité."
    it: "Strumento da dare a un Pokémon. Stola che aumenta\nla Velocità, ma consente l’uso di una sola mossa."
    de: "Ein Item zum Tragen. Dieser Schal erhöht die Initiative,\naber nur eine Attacke ist einsetzbar."
    es: "Un pañuelo muy particular que aumenta la Velocidad,\npero solo permite usar un movimiento. Debe llevarlo un\nPokémon."
    ko: "기술을 구애받는 스카프.\n지니게 하면 스피드는 올라가지만\n같은 기술밖에 쓸 수 없다."
    zh_simp: "有点讲究的围巾。\n虽然携带后速度会提高，\n但只能使出相同的招式。"
    zh_trad: "有點講究的圍巾。\n雖然攜帶後速度會提高，\n但只能使出相同的招式。"
choice_specs:
  names:
    jp_kana: こだわりメガネ
    jp_kanji: こだわりメガネ
    en: Choice Specs
    fr: Lunettes Choix
    it: Lentiscelta
    de: Wahlbrille
    es: Gafas Elección
    ko: 구애안경
    zh_simp: 讲究眼镜
    zh_trad: 講究眼鏡
  descriptions:
    jp_kana: "ちょっと　こだわった　メガネ。\n持たせると　特攻は　あがるが\n同じ技しか　だせなくなる。"
    jp_kanji: "ちょっと　こだわった　メガネ。\n持たせると　特攻は　あがるが\n同じ技しか　だせなくなる。"
    en: "An item to be held by a Pokémon. These curious glasses\nboost the holder’s Sp. Atk stat but only allow the use of\na single move."
    fr: "Objet à tenir. Augmente l’Attaque Spéciale,\nmais ne permet d’utiliser qu’une seule capacité."
    it: "Strumento da dare a un Pokémon. Questi occhiali\naumentano l’Attacco Speciale, ma permettono l’uso\ndi una sola mossa."
    de: "Ein Item zum Tragen. Diese Brille erhöht den\nSpezial-Angriff, aber nur eine Attacke ist einsetzbar."
    es: "Unas gafas muy particulares que aumentan el Ataque\nEspecial, pero solo permiten usar un movimiento.\nDebe llevarlas un Pokémon."
    ko: "기술을 구애받는 안경.\n지니게 하면 특수공격이 올라가지만\n같은 기술밖에 쓸 수 없다."
    zh_simp: "有点讲究的眼镜。\n虽然携带后特攻会提高，\n但只能使出相同的招式。"
    zh_trad: "有點講究的眼鏡。\n雖然攜帶後特攻會提高，\n但只能使出相同的招式。"
chople_berry:
  names:
    jp_kana: ヨプのみ
    jp_kanji: ヨプのみ
    en: Chople Berry
    fr: Baie Pomroz
    it: Baccarosmel
    de: Rospelbeere
    es: Baya Pomaro
    ko: 로플열매
    zh_simp: 莲蒲果
    zh_trad: 蓮蒲果
  descriptions:
    jp_kana: "ポケモンに　持たせると\n効果バツグンの　かくとう技を\n受けたとき　威力が　弱まる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　かくとう技を\n受けたとき　威力が　弱まる。"
    en: "If a Pokémon holding this Berry is hit with a\nsupereffective Fighting-type move, the power of that\nmove will be weakened."
    fr: "Tenue, cette Baie réduit les dégâts subis lorsque\nle Pokémon est touché par une capacité super efficace\nde type Combat."
    it: "Se il Pokémon che ha questa bacca subisce una mossa\nsuperefficace di tipo Lotta, la potenza della mossa\nviene indebolita."
    de: "Als getragenes Item schwächt diese Beere eine\nsehr effektive Kampf-Attacke, von der das Pokémon\ngetroffen wird."
    es: "Si la lleva un Pokémon, debilita un ataque supereficaz\nde tipo Lucha que reciba."
    ko: "포켓몬에게 지니게 하면\n효과가 굉장한 격투 기술로\n공격받았을 때 위력이 약해진다."
    zh_simp: "让宝可梦携带后，\n在受到效果绝佳的格斗属性招式\n攻击时，能令其威力减弱。"
    zh_trad: "讓寶可夢攜帶後，\n在受到效果絕佳的格鬥屬性招式\n攻擊時，能使其威力減弱。"
chorizo:
  names:
    jp_kana: やきチョリソー
    jp_kanji: やきチョリソー
    en: Chorizo
    fr: Chorizo Grillé
    it: Chorizo rosolato
    de: Chorizo
    es: Chorizo
    ko: 구운초리조
    zh_simp: 煎辣香肠
    zh_trad: 煎辣香腸
  descriptions:
    jp_kana: "塩味と　辛味が　強い　食材。\nしっかりとした　塩味の　ソーセージ。\n辛味が　効いた　タイプが　人気。"
    jp_kanji: "塩味と　辛味が　強い　食材。\nしっかりとした　塩味の　ソーセージ。\n辛味が　効いた　タイプが　人気。"
    en: "A very salty and spicy ingredient. This type of sausage\nhas particularly robust salty flavor, and the spicier\nvarieties are extra popular."
    fr: "Un ingrédient au goût très salé et épicé.\nUn incontournable de la charcuterie salée. Les saucisses\nles plus épicées sont particulièrement populaires."
    it: "Un ingrediente molto salato e piccante. Questa salsiccia\nè molto apprezzata nelle sue varietà più pungenti."
    de: "Eine sehr salzig-scharfe Zutat. Wie bei allen Würsten\nspielt der richtige Salzgehalt eine wichtige Rolle, doch\ndie Beliebtheit dieser Sorte steigt mit dem Schärfegrad."
    es: "Un embutido de fuerte sabor salado y picante. Las\nvariedades con extra de picante son más populares\nincluso."
    ko: "짠맛과 매운맛이 강한 식재료.\n충분한 짠맛이 나는 소시지로,\n매운맛이 나는 타입이 인기가 많다."
    zh_simp: "咸味和辣味强烈的食材。\n咸味十足的香肠，\n够辣的类型很受欢迎。"
    zh_trad: "鹹味和辣味強勁的食材。\n鹹味紮實的香腸。\n鹹中帶辣者更是特別受歡迎。"
clauncher_claw:
  names:
    jp_kana: ウデッポウのハサミ
    jp_kanji: ウデッポウのハサミ
    en: Clauncher Claw
    fr: Pince de Flingouste
    it: Chela di Clauncher
    de: Scampisto-Schere
    es: Pinza de Clauncher
    ko: 완철포의집게
    zh_simp: 铁臂枪虾的钳子
    zh_trad: 鐵臂槍蝦的鉗子
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
claw_fossil:
  names:
    jp_kana: ツメのカセキ
    jp_kanji: ツメのカセキ
    en: Claw Fossil
    fr: Fossile Griffe
    it: Fossilunghia
    de: Klauenfossil
    es: Fósil Garra
    ko: 발톱화석
    zh_simp: 爪子化石
    zh_trad: 爪子化石
  descriptions:
    jp_kana: "大昔　海に　すんでいた\n古代ポケモンの　カセキ。\nツメの一部　らしい。"
    jp_kanji: "大昔　海に　すんでいた\n古代ポケモンの　カセキ。\nツメの一部　らしい。"
    en: "A fossil from a prehistoric Pokémon that once lived\nin the sea. It appears to be a fragment of a claw."
    fr: "Le fossile d’un ancien Pokémon aquatique.\nOn dirait un morceau de griffe."
    it: "Fossile di un Pokémon preistorico che viveva in mare.\nSembra essere parte di un artiglio."
    de: "Das Fossil eines urzeitlichen Pokémon, das in der Tiefsee\nlebte. Es sieht wie ein Teil einer Klaue aus."
    es: "Fósil de un Pokémon prehistórico que vivía en el fondo\ndel mar. Parece ser parte de una garra."
    ko: "오랜 옛날 바다에 살았던\n고대 포켓몬의 화석.\n발톱의 일부인 듯하다."
    zh_simp: "很久以前栖息在海里的\n古代宝可梦的化石。\n好像是爪子的一部分。"
    zh_trad: "很久以前棲息在海裡的\n古代寶可夢的化石。\n好像是爪子的一部分。"
cleanse_tag:
  names:
    jp_kana: きよめのおふだ
    jp_kanji: きよめのおふだ
    en: Cleanse Tag
    fr: Rune Purifiante
    it: Velopuro
    de: Schutzsticker
    es: Amuleto
    ko: 순결의부적
    zh_simp: 洁净之符
    zh_trad: 潔淨之符
  descriptions:
    jp_kana: "１番前の　ポケモンに\n持たせると　野生ポケモンが\n出てきにくくなる。"
    jp_kanji: "１番前の　ポケモンに\n持たせると　野生ポケモンが\n出てきにくくなる。"
    en: "An item to be held by a Pokémon. It helps keep wild\nPokémon away when the holder is the head of the party."
    fr: "Objet à tenir. Aide à repousser les Pokémon sauvages\nsi le porteur est le premier Pokémon de l’équipe."
    it: "Strumento da dare a un Pokémon. Se chi ce l’ha è\nil primo della squadra, aiuta ad allontanare\ni Pokémon selvatici."
    de: "Ein Item zum Tragen. Dieser Sticker reduziert\nBegegnungen mit wilden Pokémon, wenn der Träger\nan der Spitze deines Teams steht."
    es: "Si lo lleva el primer Pokémon del equipo, se reduce la\nprobabilidad de que se acerquen Pokémon salvajes."
    ko: "맨 앞의 포켓몬에게\n지니게 하면 야생 포켓몬이\n나타날 확률이 낮아진다."
    zh_simp: "让排在最前面的宝可梦携带后，\n野生宝可梦就会不容易出现。"
    zh_trad: "讓排在最前面的寶可夢\n攜帶後，野生寶可夢\n會變得不容易出現。"
clear_amulet:
  names:
    jp_kana: クリアチャーム
    jp_kanji: クリアチャーム
    en: Clear Amulet
    fr: Talisman Sain
    it: Ciondolochiaro
    de: Neutralschmuck
    es: Amuleto Puro
    ko: 클리어참
    zh_simp: 清净坠饰
    zh_trad: 清淨墜飾
  descriptions:
    jp_kana: "透き通った　かがやきの　チャーム。\n持たせると　相手の　技や　特性で\n能力を　下げられない。"
    jp_kanji: "透き通った　かがやきの　チャーム。\n持たせると　相手の　技や　特性で\n能力を　下げられない。"
    en: "An item to be held by a Pokémon. This clear, sparkling\namulet protects the holder from having its stats lowered\nby moves used against it or by other Pokémon’s Abilities."
    fr: "Objet à tenir. Un talisman translucide et brillant qui\nempêche les stats du Pokémon de baisser à cause\ndu talent ou d’une capacité de l’adversaire."
    it: "Strumento da dare a un Pokémon. Ciondolo brillante\ne trasparente che impedisce la diminuzione delle\nstatistiche causata da abilità o mosse di altri Pokémon."
    de: "Gibt man dieses glänzende Item einem Pokémon zum\nTragen, können dessen Statuswerte nicht durch Attacken\noder Fähigkeiten anderer Pokémon gesenkt werden."
    es: "Un amuleto brillante y transparente. Impide que los\nmovimientos o habilidades de otros Pokémon reduzcan\nlas características del Pokémon que lo lleva."
    ko: "투명하고 빛나는 참.\n지니게 하면 상대의 기술이나 특성으로\n능력이 떨어지지 않는다."
    zh_simp: "光芒晶莹剔透的坠饰。\n携带后，不会因为对手的\n招式或特性而被降低能力。"
    zh_trad: "澄澈晶瑩的墜飾。\n攜帶後，不會因對手的招式或特性\n而被降低能力。"
clear_bell:
  names:
    jp_kana: とうめいなスズ
    jp_kanji: とうめいなスズ
    en: Clear Bell
    fr: Glas Transparent
    it: Campana chiara
    de: Klarglocke
    es: Cascabel Claro
    ko: 크리스탈방울
    zh_simp: 透明铃铛
    zh_trad: 透明鈴鐺
  descriptions:
    jp_kana: "こころ　やすまる　音色が　きける\nとても　ふるめかしい　スズ。"
    jp_kanji: "こころ　やすまる　音色が　きける\nとても　ふるめかしい　スズ。"
    en: "A very old-fashioned bell that makes a gentle\nringing sound."
    fr: Une cloche antique au tintement apaisant.
    it: "Una campana antica. Produce un suono che dona\npace al cuore."
    de: "Eine altehrwürdige Glocke, deren Läuten alle\nbesänftigt, die es hören."
    es: "Cascabel de aspecto antiguo que emite un sonido\nque calma el espíritu."
    ko: "마음이 편안해지는 음색이 들리는\n아주 고풍스러운 방울."
    zh_simp: "能发出静心宁神音色的，\n非常古旧的铃铛。"
    zh_trad: "能發出使人心情平靜音色的，\n非常古老的鈴鐺。"
clefairy_candy:
  names:
    jp_kana: ピッピのアメ
    jp_kanji: ピッピのアメ
    en: Clefairy Candy
    fr: Bonbon Mélofée
    it: Caramella Clefairy
    de: Piepi-Bonbon
    es: Caramelo Clefairy
    ko: 삐삐의사탕
    zh_simp: 皮皮的糖果
    zh_trad: 皮皮的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
cleffa_fur:
  names:
    jp_kana: ピィのけ
    jp_kanji: ピィのけ
    en: Cleffa Fur
    fr: Poils de Mélo
    it: Pelo di Cleffa
    de: Pii-Haar
    es: Pelo de Cleffa
    ko: 삐의털
    zh_simp: 皮宝宝的毛
    zh_trad: 皮寶寶的毛
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
clever_feather:
  names:
    jp_kana: せいしんのハネ
    jp_kanji: せいしんのハネ
    en: Clever Feather
    fr: Plume Mental
    it: Piumintuito
    de: Espritfeder
    es: Pluma Mente
    ko: 정신력깃털
    zh_simp: 精神之羽
    zh_trad: 精神之羽
  descriptions:
    jp_kana: "ポケモンに　使う　道具。\nポケモン　１匹の　特防の\n基礎ポイントを　ちょっと　あげる。"
    jp_kanji: "ポケモンに　使う　道具。\nポケモン　１匹の　特防の\n基礎ポイントを　ちょっと　あげる。"
    en: "An item to be used on a Pokémon. This feather slightly\nincreases base points for a Pokémon’s Sp. Def stat."
    fr: "Objet à utiliser sur un Pokémon pour augmenter\nlégèrement sa Défense Spéciale de base."
    it: "Strumento da usare su un Pokémon. Ne aumenta di poco\ni punti base della Difesa Speciale."
    de: "Wendet man dieses Item auf ein Pokémon an, werden\ndessen Spezial-Verteidigungs-Basispunkte dauerhaft\nein wenig erhöht."
    es: "Pluma que aumenta un poco la Defensa Especial de\nbase de un Pokémon."
    ko: "포켓몬에게 사용하는 도구.\n포켓몬 1마리의 특수방어\n기초 포인트를 조금 올린다."
    zh_simp: "用于宝可梦的道具。\n能稍微提高１只宝可梦的\n特防的基础点数。"
    zh_trad: "用於寶可夢的道具。\n能稍微提高１隻寶可夢的\n特防的基礎點數。"
clever_mochi:
  names:
    jp_kana: せいしんのもち
    jp_kanji: せいしんのもち
    en: Clever Mochi
    fr: Mochi Mental
    it: Mochi dell’intuito
    de: Esprit-Mochi
    es: Mochi Mente
    ko: 정신력떡
    zh_simp: 精神粘糕
    zh_trad: 精神糬
  descriptions:
    jp_kana: "きのみが　ねりこまれた　もち。\nポケモン　１匹の　特防の\n基礎ポイントを　あげる。"
    jp_kanji: "きのみが　ねりこまれた　もち。\nポケモン　１匹の　特防の\n基礎ポイントを　あげる。"
    en: "A mochi cake with Berries kneaded into its dough.\nIt increases base points for a Pokémon’s Sp. Def stat."
    fr: "Un mochi contenant des Baies qui augmente\nla Défense Spéciale de base d’un Pokémon."
    it: "Mochi preparato con un impasto a base di bacche.\nAumenta i punti base della Difesa Speciale."
    de: "Ein mit Beeren gefüllter Mochi, der die Spezial-\nVerteidigungs-Basispunkte eines Pokémon\ndauerhaft erhöht."
    es: "La masa de este mochi está preparada con bayas.\nAumenta la Defensa Especial de base de un Pokémon."
    ko: "으깬 나무열매가 들어 있는 떡.\n포켓몬 1마리의 특수방어\n기초 포인트를 올린다."
    zh_simp: "糅合树果的粘糕。\n能提高１只宝可梦的\n特防的基础点数。"
    zh_trad: "加入樹果揉製而成的麻糬。\n能提高１隻寶可夢的\n特防的基礎點數。"
clothing_trunk:
  names:
    jp_kana: おきがえトランク
    jp_kanji: おきがえトランク
    en: Clothing Trunk
    fr: Malle à Costumes
    it: Valigia vestiti
    de: Klamottenkoffer
    es: Maleta
    ko: 옷갈아입기트렁크
    zh_simp: 换装箱
    zh_trad: 換裝箱
  descriptions:
    jp_kana: "ポケモンや　トレーナーの\n着替えを　入れられる\nとても軽い　トランク。"
    jp_kanji: "ポケモンや　トレーナーの\n着替えを　入れられる\nとても軽い　トランク。"
    en: "A very light trunk that can carry clothing for you\nand your Pokémon."
    fr: "Une malle très légère qui contient vos costumes\net ceux de votre partenaire."
    it: "Una valigia leggerissima che può contenere tutti i capi\nd’abbigliamento di un Allenatore e del suo Pokémon."
    de: "Ein überraschend leichter Koffer, in dem verschiedene\nKleidungsstücke und Accessoires für Trainer und\nPokémon verstaut werden können."
    es: "Una maleta muy ligera en la que puedes guardar ropa\no accesorios para ti o tu Pokémon."
    ko: "포켓몬이나 트레이너의\n의상을 넣을 수 있는\n매우 가벼운 트렁크."
    zh_simp: "非常轻的箱子。\n能塞入宝可梦或\n训练家的替换衣物。"
    zh_trad: "十分輕便的行李箱。\n裡面可以放寶可夢和\n訓練家的替換衣物。"
clover_sweet:
  names:
    jp_kana: よつばアメざいく
    jp_kanji: よつばアメざいく
    en: Clover Sweet
    fr: Trèfle en Sucre
    it: Bonbonfoglio
    de: Zucker-Kleeblatt
    es: Confite Trébol
    ko: 네잎사탕공예
    zh_simp: 幸运草糖饰
    zh_trad: 幸運草糖飾
  descriptions:
    jp_kana: "よつばの形をした　アメ細工。\nマホミルに　持たせてあげると\nくるくる　回って　喜ぶ。"
    jp_kanji: "よつばの形をした　アメ細工。\nマホミルに　持たせてあげると\nくるくる　回って　喜ぶ。"
    en: "A clover-shaped sweet. When a Milcery holds this,\nit spins around happily."
    fr: "Un bonbon en forme de trèfle.\nQuand on le donne à un Crèmy, il se réjouit en tournant\nsur lui-même."
    it: "Bonbon a forma di quadrifoglio. Se dato a Milcery,\nil Pokémon farà le piroette per la felicità."
    de: "Zuckerwerk in Form eines Kleeblattes. Gibt man es\nHokumil zum Tragen, dreht es sich vor Freude im Kreis."
    es: "Figura de caramelo con forma de trébol. Al dárselo a\nMilcery, se pone a girar rebosante de alegría."
    ko: "네잎클로버 모양의 사탕공예.\n마빌크에게 지니게 하면\n빙빙 돌며 기뻐한다."
    zh_simp: "四叶草形状的工艺糖果。\n让小仙奶携带的话，\n会高兴地转圈圈。"
    zh_trad: "四葉草形狀的工藝糖果。\n讓小仙奶攜帶的話，\n牠會高興得轉圈圈。"
coba_berry:
  names:
    jp_kana: バコウのみ
    jp_kanji: バコウのみ
    en: Coba Berry
    fr: Baie Cobaba
    it: Baccababa
    de: Kobabeere
    es: Baya Kouba
    ko: 바코열매
    zh_simp: 棱瓜果
    zh_trad: 稜瓜果
  descriptions:
    jp_kana: "ポケモンに　持たせると\n効果バツグンの　ひこう技を\n受けたとき　威力が　弱まる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　ひこう技を\n受けたとき　威力が　弱まる。"
    en: "If a Pokémon holding this Berry is hit with a\nsupereffective Flying-type move, the power of that\nmove will be weakened."
    fr: "Tenue, cette Baie réduit les dégâts subis lorsque\nle Pokémon est touché par une capacité super efficace\nde type Vol."
    it: "Se il Pokémon che ha questa bacca subisce una mossa\nsuperefficace di tipo Volante, la potenza della mossa\nviene indebolita."
    de: "Als getragenes Item schwächt diese Beere eine\nsehr effektive Flug-Attacke, von der das Pokémon\ngetroffen wird."
    es: "Si la lleva un Pokémon, debilita un ataque supereficaz\nde tipo Volador que reciba."
    ko: "포켓몬에게 지니게 하면\n효과가 굉장한 비행 기술로\n공격받았을 때 위력이 약해진다."
    zh_simp: "让宝可梦携带后，\n在受到效果绝佳的飞行属性招式\n攻击时，能令其威力减弱。"
    zh_trad: "讓寶可夢攜帶後，\n在受到效果絕佳的飛行屬性招式\n攻擊時，能使其威力減弱。"
cobalion_treat:
  names:
    jp_kana: コバルオンのおやつ
    jp_kanji: コバルオンのおやつ
    en: Cobalion Treat
    fr: Friandise Cobaltium
    it: Spuntino per Cobalion
    de: Kobalium-Snack
    es: Galleta Cobalion
    ko: 코바르온의간식
    zh_simp: 勾帕路翁的点心
    zh_trad: 勾帕路翁的點心
  descriptions:
    jp_kana: "伝説のポケモン　コバルオンが\n好む食材で　作られた　おやつ。"
    jp_kanji: "伝説のポケモン　コバルオンが\n好む食材で　作られた　おやつ。"
    en: "A snack made from ingredients favored by the\nLegendary Pokémon Cobalion."
    fr: "Une friandise préparée avec les ingrédients favoris\ndu Pokémon légendaire Cobaltium."
    it: "Uno spuntino fatto con gli ingredienti preferiti\ndal Pokémon leggendario Cobalion."
    de: "Dieser Snack wurde mit den Lieblingszutaten des\nLegendären Pokémon Kobalium zubereitet."
    es: "Galleta preparada con los ingredientes favoritos\ndel Pokémon legendario Cobalion."
    ko: "전설의 포켓몬 코바르온이\n좋아하는 식재료로 만들어진 간식."
    zh_simp: "用传说的宝可梦勾帕路翁\n喜欢的食材制作的点心。"
    zh_trad: "用傳說的寶可夢勾帕路翁\n喜愛的食材製成的點心。"
coconut_milk:
  names:
    jp_kana: ヤシのミルク
    jp_kanji: ヤシのミルク
    en: Coconut Milk
    fr: Lait de Coco
    it: Latte di cocco
    de: Kokosmilch
    es: Leche de Coco
    ko: 야자밀크
    zh_simp: 椰奶
    zh_trad: 椰奶
  descriptions:
    jp_kana: "キャンプの　料理に　使う\n食材の　一種。ココナッツの\n上品な　甘さの　ミルクが　人気。"
    jp_kanji: "キャンプの　料理に　使う\n食材の　一種。ココナッツの\n上品な　甘さの　ミルクが　人気。"
    en: "One of the many ingredients that can be used for\ncooking at your camp. The refined sweetness of this\ncoconut milk makes it quite popular."
    fr: "Un ingrédient de cuisine pour le camping.\nLa douceur incomparable de cette boisson\nà la noix de coco lui vaut un grand succès."
    it: "Uno degli ingredienti che puoi usare per cucinare\nin campeggio. La sua raffinata dolcezza lo rende\nmolto popolare."
    de: "Eine Zutat für PokéCamping-Mahlzeiten. Die feine Süße\nder Kokosnuss verhilft dieser Milch zu sehr großer\nBeliebtheit."
    es: "Un ingrediente para cocinar en el campamento. Muy\npopular por el dulzor refinado que aporta al plato."
    ko: "캠프 요리에 사용되는\n식재료 중 하나. 고급스러운 단맛이 나는\n코코넛 밀크가 인기다."
    zh_simp: "在露营营地制作料理时会使用的\n一种食材。椰奶那种与众不同的\n清甜滋味非常受欢迎。"
    zh_trad: "製作露營料理時使用的食材之一。\n帶著椰子特有清甜滋味的\n椰奶很受歡迎。"
coin_case:
  names:
    jp_kana: コインケース
    jp_kanji: コインケース
    en: Coin Case
    fr: Boîte Jetons
    it: Salvadanaio
    de: Münzkorb
    es: Monedero
    ko: 동전케이스
    zh_simp: 代币盒
    zh_trad: 代幣盒
  descriptions:
    jp_kana: "ゲームコーナーで　てにいれた\nコインを　５００００枚まで\nいれることが　できる　ケース。"
    jp_kanji: "ゲームコーナーで　てにいれた\nコインを　５００００枚まで\nいれることが　できる　ケース。"
    en: "A case for holding coins obtained at the Game Corner.\nIt can hold up to 50,000 coins."
    fr: "Une boîte pour conserver les Jetons obtenus\nà la salle d’arcade. Peut contenir jusqu’à 50 000 Jetons."
    it: "Contenitore ottenuto al Casinò che può contenere\nfino a 50.000 Gettoni."
    de: "Im Korb finden bis zu 50 000 Münzen des\nGamer-Paradieses Platz."
    es: "Se puede obtener en la Sala de Juegos. Tiene capacidad\npara 50 000 fichas."
    ko: "게임코너에서 손에 넣은\n동전을 50000개 까지\n넣을 수 있는 케이스."
    zh_simp: "可以存放代币的盒子。\n最多能放入５００００枚\n在游戏城获得的代币。"
    zh_trad: "最多可以放入５００００枚\n在遊戲城獲得的代幣的盒子。"
colbur_berry:
  names:
    jp_kana: ナモのみ
    jp_kanji: ナモのみ
    en: Colbur Berry
    fr: Baie Lampou
    it: Baccaxan
    de: Burleobeere
    es: Baya Dillo
    ko: 마코열매
    zh_simp: 刺耳果
    zh_trad: 刺耳果
  descriptions:
    jp_kana: "ポケモンに　持たせると\n効果バツグンの　あく技を\n受けたとき　威力が　弱まる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　あく技を\n受けたとき　威力が　弱まる。"
    en: "If a Pokémon holding this Berry is hit with a\nsupereffective Dark-type move, the power of that\nmove will be weakened."
    fr: "Tenue, cette Baie réduit les dégâts subis lorsque\nle Pokémon est touché par une capacité super efficace\nde type Ténèbres."
    it: "Se il Pokémon che ha questa bacca subisce una mossa\nsuperefficace di tipo Buio, la potenza della mossa\nviene indebolita."
    de: "Als getragenes Item schwächt diese Beere eine\nsehr effektive Unlicht-Attacke, von der das Pokémon\ngetroffen wird."
    es: "Si la lleva un Pokémon, debilita un ataque supereficaz\nde tipo Siniestro que reciba."
    ko: "포켓몬에게 지니게 하면\n효과가 굉장한 악 기술로\n공격받았을 때 위력이 약해진다."
    zh_simp: "让宝可梦携带后，\n在受到效果绝佳的恶属性招式\n攻击时，能令其威力减弱。"
    zh_trad: "讓寶可夢攜帶後，\n在受到效果絕佳的惡屬性招式\n攻擊時，能使其威力減弱。"
colress_machine:
  names:
    jp_kana: アクロママシーン
    jp_kanji: アクロママシーン
    en: Colress Machine
    fr: Nikodule
    it: Acrocongegno
    de: Achromat
    es: Acromáquina
    ko: 아크로마머신
    zh_simp: 阿克罗玛机器
    zh_trad: 阿克羅瑪機器
  descriptions:
    jp_kana: "ポケモンの　能力を　無理やり\n目覚めさせる　特殊な　装置。\nだが　試作品のため　不完全。"
    jp_kanji: "ポケモンの　能力を　無理やり\n目覚めさせる　特殊な　装置。\nだが　試作品のため　不完全。"
    en: "A special device that wrings out the potential of\nPokémon. It’s an imperfect prototype."
    fr: "Un appareil spécial qui permet d’éveiller de force\nla puissance des Pokémon. Mais il ne s’agit que\nd’un prototype."
    it: "Prototipo imperfetto di un dispositivo speciale ideato\nper risvegliare in modo forzato le capacità dei Pokémon."
    de: "Eine Vorrichtung, die verborgene Kräfte in den\nPokémon weckt. Es handelt sich dabei um einen\nunfertigen Prototyp."
    es: "Dispositivo que permite aumentar forzadamente las\ncaracterísticas de los Pokémon. Es un prototipo\nimperfecto."
    ko: "포켓몬의 능력을 강제로\n눈뜨게 만드는 특수 장치.\n그러나 시작품이기에 불완전하다."
    zh_simp: "能强行让宝可梦的能力\n觉醒的特殊装置。\n但由于是试制品，功能尚未完善。"
    zh_trad: "能強行讓寶可夢的能力\n覺醒的特殊裝置。\n但由於是試作品，功能還不完全。"
combee_honey:
  names:
    jp_kana: ミツハニーのミツ
    jp_kanji: ミツハニーのミツ
    en: Combee Honey
    fr: Nectar d’Apitrini
    it: Nettare di Combee
    de: Wadribie-Honig
    es: Miel de Combee
    ko: 세꿀버리의꿀
    zh_simp: 三蜜蜂的蜜
    zh_trad: 三蜜蜂的蜜
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
comet_shard:
  names:
    jp_kana: すいせいのかけら
    jp_kanji: すいせいのかけら
    en: Comet Shard
    fr: Morceau Comète
    it: Pezzo cometa
    de: Kometstück
    es: Fragmento Cometa
    ko: 혜성조각
    zh_simp: 彗星碎片
    zh_trad: 彗星碎片
  descriptions:
    jp_kana: "すい星が　近づいたとき\n地表に　落ちた　かけら。\nショップで　高く　売れる。"
    jp_kanji: "すい星が　近づいたとき\n地表に　落ちた　かけら。\nショップで　高く　売れる。"
    en: "A shard that fell to the ground when a comet passed\nnearby. It can be sold at a high price to shops."
    fr: "Un fragment de comète, tombé au sol quand\nelle traversait l’atmosphère. Peut être vendu\nà bon prix en magasin."
    it: "Scheggia di cometa caduta al suolo. Si può vendere\na un prezzo alto nei negozi."
    de: "Ein Kometensplitter, der aus dem All herabgefallen ist.\nKann für viel Geld verkauft werden."
    es: "Fragmento de un cometa caído al suelo al atravesar la\natmósfera. Puede venderse a buen precio en las tiendas."
    ko: "혜성이 가까워졌을 때\n지표면에 떨어진 조각.\n상점에서 비싸게 팔린다."
    zh_simp: "彗星临近时，\n掉落到地表上的碎片。\n可以在商店高价出售。"
    zh_trad: "彗星接近時，\n掉落到地表上的碎片。\n可以在商店高價出售。"
comfey_flower:
  names:
    jp_kana: キュワワーのはな
    jp_kanji: キュワワーのはな
    en: Comfey Flower
    fr: Fleur de Guérilande
    it: Fiore di Comfey
    de: Curelei-Blüte
    es: Flor de Comfey
    ko: 큐아링의꽃
    zh_simp: 花疗环环的花
    zh_trad: 花療環環的花
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
