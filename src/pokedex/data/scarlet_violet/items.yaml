  descriptions:
    jp_kana: "ポケスロンの　記録が　はいっている。\nポケスロンで　遊んだ　時間が\n記録された　カード。"
    jp_kanji: "ポケスロンの　記録が　はいっている。\nポケスロンで　遊んだ　時間が\n記録された　カード。"
    en: "It holds Pokéathlon records. It is a card that shows how\nmuch time you spent participating in the Pokéathlon."
    fr: "Contient vos données du Pokéathlon.\nSur cette carte est inscrit le temps que vous avez\npassé à y jouer."
    it: "Contiene i tuoi dati Pokéathlon. Su questa Scheda\nsono registrate le ore che hai passato a giocare."
    de: "Speichert deine Pokéathlon-Rekorde. Die Karte zeigt,\nwie viel Zeit du beim Pokéathlon verbracht hast."
    es: "Contiene los datos del Pokéathlon con el tiempo que se\nha pasado en esta competición."
    ko: "포켓슬론의 기록이 들어 있다.\n포켓슬론으로 즐긴 시간이\n기록된 카드."
    zh_simp: "ー\nー\nー"
    zh_trad: "ー\nー\nー"
dawn_stone:
  names:
    jp_kana: めざめいし
    jp_kanji: めざめいし
    en: Dawn Stone
    fr: Pierre Aube
    it: Pietralbore
    de: Funkelstein
    es: Piedra Alba
    ko: 각성의돌
    zh_simp: 觉醒之石
    zh_trad: 覺醒之石
  descriptions:
    jp_kana: "ある特定の　ポケモンを\n進化させる　不思議な石。\nひとみのように　まばゆい。"
    jp_kanji: "ある特定の　ポケモンを\n進化させる　不思議な石。\nひとみのように　まばゆい。"
    en: "A peculiar stone that can make certain species of\nPokémon evolve. It sparkles like a glittering eye."
    fr: "Une pierre étrange qui fait évoluer certaines espèces\nde Pokémon. Elle brille comme un œil."
    it: "Pietra particolare che fa evolvere determinate specie\ndi Pokémon. È luccicante come gli occhi."
    de: "Dieser besondere Stein löst bei bestimmten Pokémon\ndie Entwicklung aus. Er glitzert hübsch."
    es: "Curiosa piedra que hace evolucionar a determinadas\nespecies de Pokémon. Brilla como un lucero."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 돌.\n눈동자처럼 아름답다."
    zh_simp: "能让某些特定宝可梦\n进化的神奇石头。\n像眼眸一般光彩动人。"
    zh_trad: "能讓特定寶可夢\n進化的神奇石頭。\n像眼眸一般光彩動人。"
dazzling_honey:
  names:
    jp_kana: きらきらミツ
    jp_kanji: きらきらミツ
    en: Dazzling Honey
    fr: Miel Kibrille
    it: Miele luccicante
    de: Funkelhonig
    es: Miel Brillante
    ko: 반짝반짝꿀
    zh_simp: 晶晶蜜
    zh_trad: 晶晶蜜
  descriptions:
    jp_kana: "琥珀色に輝くミツ。\n虫ポケモンやフェアリーのようなポケモンの好物で\n投げた場所に引き寄せることができる。"
    jp_kanji: "琥珀色に輝くミツ。\n虫ポケモンやフェアリーのようなポケモンの好物で\n投げた場所に引き寄せることができる。"
    en: "Honey that sparkles with an amber hue. It is beloved\nby bug Pokémon and Pokémon with fairylike charms,\nso they will gather wherever a comb of it is thrown."
    fr: "Du miel qui brille d’une belle couleur ambrée.\nParticulièrement apprécié des Pokémon pareils à des\ninsectes ou à des fées, il les attire là où vous le lancez."
    it: "Miele dal brillante colore ambrato. Molto apprezzato,\ntra gli altri, dai Pokémon dall’aspetto di coleotteri\no esseri magici, li attira laddove viene lanciato."
    de: "Honig, der bernsteinfarben funkelt. Feen- sowie\ninsektenähnliche Pokémon lieben ihn besonders und\nlassen sich anlocken, wenn er ihnen zugeworfen wird."
    es: "Miel que reluce con un tono ambarino. Adorada por los\nPokémon insecto y aquellos con atributos feéricos, que\nse verán atraídos allá donde la lances."
    ko: "호박색으로 빛나는 꿀.\n벌레포켓몬이나 페어리 같은 포켓몬이 좋아해서\n던진 곳으로 유인할 수 있다."
    zh_simp: "闪耀着琥珀色光泽的蜜。\n是虫宝可梦和妖精类宝可梦喜爱的食物，\n能吸引它们聚集到投向的地方。"
    zh_trad: "閃耀著琥珀色光澤的蜜。\n是蟲寶可夢和妖精類寶可夢喜愛的食物，\n能吸引牠們聚集到投向的地方。"
decidium_z:bag:
  names:
    jp_kana: ジュナイパーＺ
    jp_kanji: ジュナイパーＺ
    en: Decidium Z
    fr: Archézélite
    it: Deciduenium Z
    de: Silvarronium Z
    es: Dueyestal Z
    ko: 모크나이퍼Z
    zh_simp: 狙射树枭Ｚ
    zh_trad: 狙射樹梟Ｚ
  descriptions:
    jp_kana: "ジュナイパーの　かげぬいを\n特別な　Ｚワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    jp_kanji: "ジュナイパーの　かげぬいを\n特別な　Ｚワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nDecidueye’s Spirit Shackle to a Z-Move."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise l’Archéduc qui le tient à transformer\nsa capacité Tisse Ombre en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono a Decidueye di trasformare la mossa\nCucitura d’Ombra in una mossa Z."
    de: "Kristallisierte Z-Kraft, die Silvarros Attacke\nSchattenfessel zu einer Z-Attacke aufstuft.\nWird bei Bedarf automatisch vervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a\nDecidueye convertir su Puntada Sombría en un\nmovimiento Z."
    ko: "모크나이퍼의 그림자꿰매기를\n특별한 Z기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将狙射树枭的缝影\n升级成特殊Ｚ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把狙射樹梟的縫影\n升級為特殊Ｚ招式的Ｚ力量結晶。"
decidium_z:held:
  names:
    jp_kana: ジュナイパーＺ
    jp_kanji: ジュナイパーＺ
    en: Decidium Z
    fr: Archézélite
    it: Deciduenium Z
    de: Silvarronium Z
    es: Dueyestal Z
    ko: 모크나이퍼Z
    zh_simp: 狙射树枭Ｚ
    zh_trad: 狙射樹梟Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　結晶。\nジュナイパーの　かげぬいを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nジュナイパーの　かげぬいを\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Decidueye’s Spirit Shackle to a Z-Move."
    fr: "Une cristallisation de la Force Z, permettant de\ntransformer la capacité Tisse Ombre d’un Archéduc\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare la mossa Cucitura d’Ombra\ndi Decidueye in una mossa Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft Silvarros\nAttacke Schattenfessel zu einer Z-Attacke auf."
    es: "Cristal que confiere el Poder Z al movimiento Puntada\nSombría de Decidueye."
    ko: "Z파워의 결정.\n모크나이퍼의 그림자꿰매기를\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将狙射树枭的缝影\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把狙射樹梟的縫影\n升級為Ｚ招式。"
dedenne_fur:
  names:
    jp_kana: デデンネのけ
    jp_kanji: デデンネのけ
    en: Dedenne Fur
    fr: Poils de Dedenne
    it: Pelo di Dedenne
    de: Dedenne-Haar
    es: Pelo de Dedenne
    ko: 데덴네의털
    zh_simp: 咚咚鼠的毛
    zh_trad: 咚咚鼠的毛
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
deep_sea_scale:
  names:
    jp_kana: しんかいのウロコ
    jp_kanji: しんかいのウロコ
    en: Deep Sea Scale
    fr: Écaille Océan
    it: Squamabissi
    de: Abyssschuppe
    es: Escama Marina
    ko: 심해의비늘
    zh_simp: 深海鳞片
    zh_trad: 深海鱗片
  descriptions:
    jp_kana: "パールルに　持たせると\n特防が　あがる　ウロコ。\nうすいピンク色に　光る。"
    jp_kanji: "パールルに　持たせると\n特防が　あがる　ウロコ。\nうすいピンク色に　光る。"
    en: "An item to be held by Clamperl. This scale shines with\na faint pink and boosts Clamperl’s Sp. Def stat."
    fr: "Objet à faire tenir à Coquiperl.\nUne écaille de couleur rose qui augmente\nsa Défense Spéciale."
    it: "Strumento da dare a Clamperl. Squama dai bagliori\nrosei che aumenta la Difesa Speciale."
    de: "Ein Item, das von Perlu getragen werden kann.\nEs schimmert pink und erhöht die Spezial-Verteidigung."
    es: "Tiene un débil brillo rosado y aumenta la Defensa\nEspecial. Debe llevarla Clamperl."
    ko: "진주몽에게 지니게 하면\n특수방어가 올라가는 비늘.\n연한 분홍색으로 빛난다."
    zh_simp: "让珍珠贝携带后，\n特防就会提高的鳞片。\n散发着淡淡的粉红色光芒。"
    zh_trad: "讓珍珠貝攜帶後，\n特防就會提高的鱗片。\n散發著淡淡的粉紅色光芒。"
deep_sea_tooth:
  names:
    jp_kana: しんかいのキバ
    jp_kanji: しんかいのキバ
    en: Deep Sea Tooth
    fr: Dent Océan
    it: Dente abissi
    de: Abysszahn
    es: Diente Marino
    ko: 심해의이빨
    zh_simp: 深海之牙
    zh_trad: 深海之牙
  descriptions:
    jp_kana: "パールルに　持たせると\n特攻が　あがる　キバ。\n鋭く　銀色に　光る。"
    jp_kanji: "パールルに　持たせると\n特攻が　あがる　キバ。\n鋭く　銀色に　光る。"
    en: "An item to be held by Clamperl. This fang gleams a\nsharp silver and boosts Clamperl’s Sp. Atk stat."
    fr: "Objet à faire tenir à Coquiperl.\nUne dent de couleur argent qui augmente\nson Attaque Spéciale."
    it: "Strumento da dare a Clamperl. Dente affilato dai\nbagliori argentei che aumenta l’Attacco Speciale."
    de: "Ein Item, das von Perlu getragen werden kann.\nEs schimmert silbern und erhöht den Spezial-Angriff."
    es: "Tiene el brillo afilado de la plata y aumenta el Ataque\nEspecial. Debe llevarlo Clamperl."
    ko: "진주몽에게 지니게 하면\n특수공격이 올라가는 이빨.\n날카롭고 은색으로 빛난다."
    zh_simp: "让珍珠贝携带后，\n特攻就会提高的牙齿。\n散发着闪亮的银光。"
    zh_trad: "讓珍珠貝攜帶後，\n特攻就會提高的牙齒。\n散發著銳利的銀色光芒。"
deerling_hair:
  names:
    jp_kana: シキジカのけ
    jp_kanji: シキジカのけ
    en: Deerling Hair
    fr: Poils de Vivaldaim
    it: Pelo di Deerling
    de: Sesokitz-Haar
    es: Pelo de Deerling
    ko: 사철록의털
    zh_simp: 四季鹿的毛
    zh_trad: 四季鹿的毛
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
