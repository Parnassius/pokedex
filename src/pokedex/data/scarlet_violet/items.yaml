    jp_kanji: コマタナのやいば
    en: Pawniard Blade
    fr: Lame de Scalpion
    it: Lama di Pawniard
    de: Gladiantri-Klinge
    es: Cuchilla de Pawniard
    ko: 자망칼의칼날
    zh_simp: 驹刀小兵的刀
    zh_trad: 駒刀小兵的刀
  descriptions:
