    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
munchlax_fang:
  names:
    jp_kana: ゴンベのキバ
    jp_kanji: ゴンベのキバ
    en: Munchlax Fang
    fr: Croc de Goinfrex
    it: Zanna di Munchlax
    de: Mampfaxo-Zahn
    es: Colmillo de Munchlax
    ko: 먹고자의이빨
    zh_simp: 小卡比兽的牙
    zh_trad: 小卡比獸的牙
  descriptions:
