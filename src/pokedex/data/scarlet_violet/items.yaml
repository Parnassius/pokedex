    fr: "Une plume très jolie, mais ordinaire et sans effet\nparticulier."
    it: "Piuma molto bella, ma priva di qualsiasi utilità:\nnon ha alcun effetto."
    de: Eine ganz normale Feder, die rein gar nichts bewirkt.
    es: "Pluma normal y corriente. Muy bonita, pero no sirve\npara nada."
    ko: "아름답기만 할 뿐 아무 효과도 없는\n지극히 평범한 깃털."
    zh_simp: "仅仅只是漂亮，\n没有任何效果，\n极其普通的羽毛。"
    zh_trad: "僅僅只是漂亮，\n沒有任何效果，\n極其普通的羽毛。"
