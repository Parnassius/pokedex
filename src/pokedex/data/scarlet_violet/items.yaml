lava_cookie:
  names:
    jp_kana: フエンせんべい
    jp_kanji: フエンせんべい
    en: Lava Cookie
    fr: Lava Cookie
    it: Lavottino
    de: Lavakeks
    es: Galleta Lava
    ko: 용암전병
    zh_simp: 釜炎仙贝
    zh_trad: 釜炎仙貝
  descriptions:
    jp_kana: "フエン名物の　せんべい。\nポケモン　１匹の　状態の\n異常を　すべて　回復する。"
    jp_kanji: "フエン名物の　せんべい。\nポケモン　１匹の　状態の\n異常を　すべて　回復する。"
    en: "Lavaridge Town’s local specialty. It can be used to cure\nany status condition a Pokémon may have."
    fr: "Une spécialité de Vermilava.\nSoigne toutes les altérations de statut d’un Pokémon."
    it: "Specialità tipica di Cuordilava. Cura tutti i problemi\ndi stato di un Pokémon."
    de: "Dieser Keks ist eine Spezialität aus Bad Lavastadt.\nEr behebt alle Statusprobleme eines Pokémon."
    es: "Dulce típico de Pueblo Lavacalda que cura todos los\nproblemas de estado de un Pokémon."
    ko: "용암마을의 명물인 전병.\n포켓몬 1마리의\n상태 이상을 모두 회복한다."
    zh_simp: "釜炎特产的仙贝。\n能治愈１只宝可梦的\n所有异常状态。"
    zh_trad: "釜炎特產的仙貝。\n能治癒１隻寶可夢的\n所有異常狀態。"
lax_incense:
  names:
    jp_kana: のんきのおこう
    jp_kanji: のんきのおこう
    en: Lax Incense
    fr: Encens Doux
    it: Distraroma
    de: Laxrauch
    es: Incienso Suave
    ko: 무사태평향로
    zh_simp: 悠闲薰香
    zh_trad: 悠閒薰香
  descriptions:
    jp_kana: "持たせると　御香の不思議な\n香りが　相手を　まどわせて\n技が　命中　しにくくなる。"
    jp_kanji: "持たせると　御香の不思議な\n香りが　相手を　まどわせて\n技が　命中　しにくくなる。"
    en: "An item to be held by a Pokémon. The curious aroma of\nthis incense may cause moves to miss its holder."
    fr: "Objet à tenir. Le parfum trompeur de cet encens\nbaisse la précision des capacités de l’ennemi."
    it: "Strumento da dare a un Pokémon. Il suo aroma intenso\nturba l’avversario e ne riduce la precisione."
    de: "Ein Item zum Tragen. Dieses exotische Räucherwerk\nvernebelt die Sinne gegnerischer Pokémon und senkt\nso ihre Genauigkeit."
    es: "Su peculiar aroma reduce la Precisión del rival. Debe\nllevarlo un Pokémon."
    ko: "지니게 하면 향로의 이상한\n향기가 상대를 혼란시켜\n기술이 명중하기 어려워진다."
    zh_simp: "携带后，薰香的\n神奇香气会迷惑对手，\n其招式会变得不容易命中。"
    zh_trad: "攜帶後，薰香的\n神奇香氣會迷惑對手，\n其招式會變得不容易命中。"
lax_mint:
  names:
    jp_kana: のうてんきミント
    jp_kanji: のうてんきミント
    en: Lax Mint
    fr: Aromate Lâche
    it: Menta Fiacca
    de: Lasch-Minze
    es: Menta Floja
    ko: 촐랑민트
    zh_simp: 乐天薄荷
    zh_trad: 樂天薄荷
  descriptions:
    jp_kana: "ポケモンに　香りを　かがせると\n防御が　上がりやすく　なるが\n特防は　上がりにくくなる　ミント。"
    jp_kanji: "ポケモンに　香りを　かがせると\n防御が　上がりやすく　なるが\n特防は　上がりにくくなる　ミント。"
    en: "Having a Pokémon smell this mint can make its Defense\nstat grow stronger. However, its Sp. Def stat may suffer."
    fr: "Si un Pokémon hume cet aromate, sa Défense\nmontera plus facilement, mais sa Défense Spéciale\nse développera plus lentement."
    it: "Quando un Pokémon ne sente il profumo, la sua Difesa\naumenta più facilmente a scapito della Difesa Speciale."
    de: "Lässt man ein Pokémon an dieser Minze schnuppern,\nsteigt seine Verteidigung schneller, aber seine\nSpezial-Verteidigung umso langsamer."
    es: "Cuando un Pokémon percibe su aroma, aumenta con\nmás facilidad su Defensa, en detrimento de su Defensa\nEspecial."
    ko: "포켓몬에게 향기를 맡게 하면\n방어가 오르기 쉬워지지만\n특수방어가 오르기 어려워지는 민트."
    zh_simp: "宝可梦闻了这种薄荷之后，\n会令防御容易提高，\n而特防则难以提高。"
    zh_trad: "讓寶可夢聞這種薄荷的氣味，\n會令防禦變得容易提高，\n但特防則難以提高。"
leaden_ball:
  names:
    jp_kana: メガトンボール
    jp_kanji: メガトンボール
    en: Leaden Ball
    fr: Mégamasse Ball
    it: Megaton Ball
    de: Zentnerball
    es: Kilo Ball
    ko: 메가톤볼
    zh_simp: 超重球
    zh_trad: 超重球
  descriptions:
    jp_kana: "強化されたヘビーボール。\n重たくて飛ばないが　油断している\nポケモンに当てると高い捕獲性能を発揮。"
    jp_kanji: "強化されたヘビーボール。\n重たくて飛ばないが　油断している\nポケモンに当てると高い捕獲性能を発揮。"
    en: "An improvement on the original Heavy Ball design.\nA ball that is too heavy to fly high or far, but it is highly\neffective if you manage to hit an unsuspecting Pokémon."
    fr: "Cette Masse Ball améliorée est trop lourde pour être\nlancée au loin, mais si elle atteint un Pokémon distrait,\nle taux de réussite est élevé."
    it: "Versione potenziata della Peso Ball. È troppo pesante\nper essere lanciata lontano, ma se colpisce un Pokémon\ndistratto ha un’alta probabilità di cattura."
    de: "Eine verbesserte Version des Schwerballs. Dieser schwere\nBall kann nicht weit fliegen. Dafür ist die Erfolgsquote\nhoch, wenn er ein unaufmerksames Pokémon trifft."
    es: "Versión mejorada de la Peso Ball. Muy pesada para\nlanzarla a largas distancias, aunque tiene un porcentaje\nmuy alto de éxito si se usa contra un Pokémon distraído."
    ko: "강화된 헤비볼.\n무거워서 잘 날아가지 않지만, 방심하고 있는\n포켓몬에게 맞히면 높은 포획 성능을 발휘한다."
    zh_simp: "强化后的沉重球。沉重而无法远投，\n但若能命中掉以轻心的宝可梦，\n就能发挥强大的捕获能力。"
    zh_trad: "強化後的沉重球。沉重而無法遠投，\n但若能命中掉以輕心的寶可夢，\n就能發揮強大的捕獲能力。"
leaden_ball:recipe:
  names:
    jp_kana: メガトンボール
    jp_kanji: メガトンボール
    en: Leaden Ball
    fr: Mégamasse Ball
    it: Megaton Ball
    de: Zentnerball
    es: Kilo Ball
    ko: 메가톤볼
    zh_simp: 超重球
    zh_trad: 超重球
  descriptions:
    jp_kana: "メガトンボールのレシピ。　材料は\nぼんぐりのみ×１　てつのかけら×１\nくろいろたまいし×１"
    jp_kanji: "メガトンボールのレシピ。　材料は\nぼんぐりのみ×１　てつのかけら×１\nくろいろたまいし×１"
    en: "A recipe for crafting Leaden Balls from scratch.\nRequired materials: 1 Apricorn, 1 Black Tumblestone,\nand 1 Iron Chunk."
    fr: "Méthode pour Mégamasse Ball. Ressources requises :\n1 Noigrume, 1 Fragment de Fer et 1 Galet Noir."
    it: "Ricetta per creare una Megaton Ball. I materiali necessari\nsono 1 Bacca ghicocca, 1 Pezzo di ferro e 1 Ciottolo\nnero."
    de: "Die Anleitung zur Herstellung eines Zentnerballs.\nBenötigte Materialien: 1 Aprikoko, 1 Eisenbrocken\nund 1 Schwarzglanzstein."
    es: "Receta para crear Kilo Balls. Materiales:\n1 Bonguri, 1 Pepita de Hierro y 1 Guijarro Negro."
    ko: "메가톤볼의 레시피.\n재료: 규토리열매×1 철조각×1 검은옥돌×1"
    zh_simp: "超重球的材料单。材料是：\n球果果×１　碎铁×１\n黑玉石×１"
    zh_trad: "超重球的材料單。材料是：\n球果果×１　碎鐵×１\n黑玉石×１"
leaders_crest:
  names:
    jp_kana: かしらのしるし
    jp_kanji: かしらのしるし
    en: Leader’s Crest
    fr: Emblème du Général
    it: Simbolo del capo
    de: Anführersymbol
    es: Distintivo de Líder
    ko: 대장의징표
    zh_simp: 头领凭证
    zh_trad: 頭領憑證
  descriptions:
    jp_kana: "古ぼけた　刃物のような　かけら。\nコマタナの　群れを　率いている\nキリキザンだけが　持っている。"
    jp_kanji: "古ぼけた　刃物のような　かけら。\nコマタナの　群れを　率いている\nキリキザンだけが　持っている。"
    en: "A shard of what appears to be an old blade of some\nsort. It is held only by Bisharp that head up a group\nof Pawniard."
    fr: "Un fragment de ce qui semble être une épée usée\npar le temps. Seuls les Scalproie commandant\nun bataillon de Scalpion en possèdent une."
    it: "Frammento di quella che si direbbe una lama vecchia\ne rovinata. Solo ai Bisharp che guidano i gruppi di\nPawniard è concesso l’onore di averne uno."
    de: "Ein Bruchstück von etwas, das wie eine abgenutzte\nKlinge aussieht. Einzig Caesurio, die einen Trupp\nGladiantri anführen, dürfen dieses Abzeichen tragen."
    es: "Fragmento de lo que parece una cuchilla desgastada.\nSolo la llevan los Bisharp que lideran grupos de\nPawniard."
    ko: "오래된 날붙이로 보이는 조각.\n자망칼 무리를 통솔하는\n절각참만이 가지고 있다."
    zh_simp: "像久经岁月的刃器一样的碎片。\n只有率领着驹刀小兵群体的\n劈斩司令能携带着。"
    zh_trad: "形似破舊刀刃的碎片。\n只有率領著駒刀小兵群體的\n劈斬司令才會持有。"
leaf_letter:eevee:
  names:
    jp_kana: このはのおてがみ
    jp_kanji: このはのおてがみ
    en: Leaf Letter
    fr: Lettre Végétale
    it: Foglialettera
    de: Blattbrief
    es: Hoja Escrita
    ko: 나뭇잎편지
    zh_simp: 树叶信
    zh_trad: 樹葉信
  descriptions:
    jp_kana: "木の葉で　作った　手紙。\nイーブイの　足あとで\nなにかが　書かれて　いる。"
    jp_kanji: "木の葉で　作った　手紙。\nイーブイの　足あとで\nなにかが　書かれて　いる。"
    en: "A letter written on a leaf. Something is written using\nEevee’s footprints."
    fr: "Une lettre rédigée sur une feuille d’arbre.\nÉvoli semble y avoir écrit quelque chose avec ses pattes."
    it: "Una lettera scritta sulla foglia di un albero, dove le\nimpronte di Eevee sembrano formare delle frasi\ndi senso compiuto."
    de: "Ein Brief, der auf einem Blatt verfasst wurde.\nEvoli scheint mit seinen Pfotenabdrücken\netwas geschrieben zu haben."
    es: "Una carta escrita en una hoja. Hay huellas de Eevee\nestampadas en ella y parecen guardar algún significado."
    ko: "나뭇잎으로 만든 편지.\n이브이의 발자국으로\n무언가가 쓰여 있다."
    zh_simp: "以树叶制作的信件。\n上面留有伊布的脚印，\n好像是要表达些什么。"
    zh_trad: "用樹葉做的信。\n上面有伊布的腳印。\n好像是想表達些什麼。"
leaf_letter:pikachu:
  names:
    jp_kana: このはのおてがみ
    jp_kanji: このはのおてがみ
    en: Leaf Letter
    fr: Lettre Végétale
    it: Foglialettera
    de: Blattbrief
    es: Hoja Escrita
    ko: 나뭇잎편지
    zh_simp: 树叶信
    zh_trad: 樹葉信
  descriptions:
    jp_kana: "木の葉で　作った　手紙。\nピカチュウの　足あとで\nなにかが　書かれて　いる。"
    jp_kanji: "木の葉で　作った　手紙。\nピカチュウの　足あとで\nなにかが　書かれて　いる。"
    en: "A letter written on a leaf. Something is written using\nPikachu’s footprints."
    fr: "Une lettre rédigée sur une feuille d’arbre.\nPikachu semble y avoir écrit quelque chose\navec ses pattes."
    it: "Una lettera scritta sulla foglia di un albero, dove le\nimpronte di Pikachu sembrano formare delle frasi\ndi senso compiuto."
    de: "Ein Brief, der auf einem Blatt verfasst wurde.\nPikachu scheint mit seinen Pfotenabdrücken\netwas geschrieben zu haben."
    es: "Una carta escrita en una hoja. Hay huellas de Pikachu\nestampadas en ella y parecen guardar algún significado."
    ko: "나뭇잎으로 만든 편지.\n피카츄의 발자국으로\n무언가가 쓰여 있다."
    zh_simp: "以树叶制作的信件。\n上面留有皮卡丘的脚印，\n好像是要表达些什么。"
    zh_trad: "用樹葉做的信。\n上面有皮卡丘的腳印。\n好像是想表達些什麼。"
leaf_stone:
  names:
    jp_kana: リーフのいし
    jp_kanji: リーフのいし
    en: Leaf Stone
    fr: Pierre Plante
    it: Pietrafoglia
    de: Blattstein
    es: Piedra Hoja
    ko: 리프의돌
    zh_simp: 叶之石
    zh_trad: 葉之石
  descriptions:
    jp_kana: "ある特定の　ポケモンを\n進化させる　不思議な石。\n葉っぱの模様が　ある。"
    jp_kanji: "ある特定の　ポケモンを\n進化させる　不思議な石。\n葉っぱの模様が　ある。"
    en: "A peculiar stone that can make certain species of\nPokémon evolve. It has an unmistakable leaf pattern."
    fr: "Une pierre étrange qui fait évoluer certaines espèces\nde Pokémon. Une feuille est dessinée dessus."
    it: "Pietra particolare che fa evolvere determinate specie\ndi Pokémon. Riporta l’immagine di una foglia."
    de: "Dieser besondere Stein löst bei bestimmten Pokémon\ndie Entwicklung aus. Er hat ein Blattmuster."
    es: "Curiosa piedra que hace evolucionar a determinadas\nespecies de Pokémon. Tiene grabada una hoja."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 돌.\n잎사귀 무늬가 있다."
    zh_simp: "能让某些特定宝可梦\n进化的神奇石头。\n有着叶子般的花纹。"
    zh_trad: "能讓特定寶可夢\n進化的神奇石頭。\n上面有著葉子花紋。"
leafy_chairs:
  names:
    jp_kana: ネイチャーチェア
    jp_kanji: ネイチャーチェア
    en: Leafy Chairs
    fr: Sièges Verdoyants
    it: Sedie natura
    de: Natur-Stühle
    es: Sillas Naturaleza
    ko: 네이처 체어
    zh_simp: 大自然椅子
    zh_trad: 大自然椅子
  descriptions:
    jp_kana: "ピクニックで　使いやすい　イス。\nネイチャークロスの　デザインを\nもとに　作ってもらった。"
    jp_kanji: "ピクニックで　使いやすい　イス。\nネイチャークロスの　デザインを\nもとに　作ってもらった。"
    en: "A set of chairs that are ideal for picnicking. Their design\nwas inspired by the Leafy Tablecloth."
    fr: "Des sièges parfaits pour les pique-niques.\nLeur design est inspiré de la Nappe Verdoyante."
    it: "Pratiche sedie, perfette per i picnic, ispirate al design\ndella Tovaglia natura."
    de: "Diese Stühle sind gut geeignet für Picknicks.\nIhr Design basiert auf dem Natur-Tischtuch."
    es: "Unas sillas ideales para irse de pícnic. Su diseño está\nbasado en el del Mantel Naturaleza."
    ko: "피크닉에서 사용하기 편한 의자.\n네이처 테이블보의\n디자인을 토대로 만들어졌다."
    zh_simp: "在野餐时很好用的椅子。\n根据大自然桌巾的设计制作而成。"
    zh_trad: "野餐時很好用的椅子。\n根據大自然桌巾的設計製作而成。"
leafy_tablecloth:
  names:
    jp_kana: ネイチャークロス
    jp_kanji: ネイチャークロス
    en: Leafy Tablecloth
    fr: Nappe Verdoyante
    it: Tovaglia natura
    de: Natur-Tischtuch
    es: Mantel Naturaleza
    ko: 네이처 테이블보
    zh_simp: 大自然桌巾
    zh_trad: 大自然桌巾
  descriptions:
    jp_kana: "くさタイプの　ポケモンが　プリントされた\nボタニカル柄の　テーブルクロス。\n仲間はずれが　まじってるので　見つけてみよう。"
    jp_kanji: "くさタイプの　ポケモンが　プリントされた\nボタニカル柄の　テーブルクロス。\n仲間はずれが　まじってるので　見つけてみよう。"
    en: "A botanically themed tablecloth featuring Grass-type\nPokémon. Can you find the Pokémon that doesn’t quite\nfit in?"
    fr: "Une nappe au motif végétal, couverte de Pokémon de\ntype Plante. Mais un intrus semble s’être glissé parmi\neux..."
    it: "Tovaglia con motivo botanico decorata con Pokémon\ndi tipo Erba. Prova a trovare l’intruso che si nasconde\nin mezzo a loro."
    de: "Ein Tischtuch mit botanischem Design, auf dem diverse\nPflanzen-Pokémon abgedruckt sind. Ein Pokémon ist\nhier jedoch etwas fehl am Platz. Kannst du es finden?"
    es: "Un mantel con motivo vegetal en el que aparecen varios\nPokémon de tipo Planta, aunque uno de ellos no encaja\ncon el resto. ¿Sabrías decir cuál?"
    ko: "풀타입 포켓몬이 프린트된\n보태니컬 스타일 테이블보.\n엉뚱한 포켓몬이 섞여 있으니 찾아 보자."
    zh_simp: "印有草属性宝可梦，\n以植物图案为主的桌巾。\n找出混在里面的异类吧。"
    zh_trad: "印著草屬性寶可夢的\n植物花紋桌巾。\n把混在其中的不速之客找出來吧。"
lechonk_hair:
  names:
    jp_kana: グルトンのけ
    jp_kanji: グルトンのけ
    en: Lechonk Hair
    fr: Poils de Gourmelet
    it: Pelo di Lechonk
    de: Ferkuli-Haar
    es: Pelo de Lechonk
    ko: 맛보돈의털
    zh_simp: 爱吃豚的毛
    zh_trad: 愛吃豚的毛
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
leek:
  names:
    jp_kana: ながねぎ
    jp_kanji: ながねぎ
    en: Leek
    fr: Poireau
    it: Porro
    de: Lauchstange
    es: Puerro
    ko: 대파
    zh_simp: 大葱
    zh_trad: 大蔥
  descriptions:
    jp_kana: "とても長くて　硬いクキ。\nカモネギに　持たせると　技が\n急所に　当たりやすくなる。"
    jp_kanji: "とても長くて　硬いクキ。\nカモネギに　持たせると　技が\n急所に　当たりやすくなる。"
    en: "An item to be held by Farfetch’d. This very long and stiff\nstalk of leek boosts the critical-hit ratio of Farfetch’d’s\nmoves."
    fr: "Objet à faire tenir à Canarticho.\nUn poireau très long et solide qui augmente\nson taux de critiques."
    it: "Strumento da dare a Farfetch’d. Lungo gambo di porro\nche aumenta la probabilità di sferrare brutti colpi."
    de: "Ein Item, das von Porenta getragen werden kann. Diese\nlange Lauchstange erhöht die Volltrefferquote stark."
    es: "Puerro muy largo y duro que aumenta la probabilidad\nde asestar un golpe crítico. Debe llevarlo Farfetch’d."
    ko: "매우 길고 단단한 줄기.\n파오리에게 지니게 하면 기술이\n급소에 맞기 쉬워진다."
    zh_simp: "非常长且坚硬的茎。\n让大葱鸭携带后，\n招式会变得容易击中要害。"
    zh_trad: "非常長且堅硬的莖。\n讓大蔥鴨攜帶後，招式會\n變得容易擊中要害。"
left_poke_ball:
  names:
    jp_kana: のこされたボール
    jp_kanji: のこされたボール
    en: Left Poké Ball
    fr: Poké Ball donnée
    it: Poké Ball altrui
    de: Nachlassball
    es: Poké Ball Ajena
    ko: 남겨진 볼
    zh_simp: 留下的精灵球
    zh_trad: 留下的精靈球
  descriptions:
    jp_kana: "トレーナーを　失った　ポケモンが\n入っている　ボール。　トレーナーは\nウラウラ島　出身　らしい。"
    jp_kanji: "トレーナーを　失った　ポケモンが\n入っている　ボール。　トレーナーは\nウラウラ島　出身　らしい。"
    en: "A Poké Ball containing a Pokémon that lost its Trainer.\nIt seems the Trainer hails from Ula’ula Island."
    fr: "Une Poké Ball contenant un Pokémon dont le Dresseur\na disparu. Il semblerait que ce Dresseur soit originaire\nd’Ula-Ula."
    it: "Poké Ball contenente un Pokémon rimasto orfano\ndell’Allenatore. Sembra che l’Allenatore fosse\noriginario di Ula Ula."
    de: "Der Pokéball enthält ein Pokémon, das seinen Trainer\nverloren hat. Dieser stammt wohl aus Ula-Ula."
    es: "Poké Ball que alberga un Pokémon que perdió a su\nEntrenador, al parecer, natural de Ula-Ula."
    ko: "트레이너를 잃은 포켓몬이\n들어 있는 볼. 트레이너는\n울라울라섬 출신인 듯하다."
    zh_simp: "该精灵球里面装的是没有了\n训练家的宝可梦。那位训练家\n好像是出生自乌拉乌拉岛。"
    zh_trad: "這個精靈球裡面裝了\n失去訓練家的寶可夢。\n訓練家似乎來自烏拉烏拉島。"
leftovers:
  names:
    jp_kana: たべのこし
    jp_kanji: たべのこし
    en: Leftovers
    fr: Restes
    it: Avanzi
    de: Überreste
    es: Restos
    ko: 먹다남은음식
    zh_simp: 吃剩的东西
    zh_trad: 吃剩的東西
  descriptions:
    jp_kana: "持たせると　ポケモンの　ＨＰが\n戦闘のあいだ　少しずつ　回復する。"
    jp_kanji: "持たせると　ポケモンの　ＨＰが\n戦闘のあいだ　少しずつ　回復する。"
    en: "An item to be held by a Pokémon. The holder’s HP is\nslowly but steadily restored throughout a battle."
    fr: "Objet à tenir. Permet de restaurer graduellement\nles PV du porteur durant le combat."
    it: "Strumento da dare a un Pokémon. Fa recuperare\ngradualmente i PS durante la lotta."
    de: Ein Item zum Tragen. Es füllt im Kampf stetig KP auf.
    es: "Este objeto restaura gradualmente durante el combate\nlos PS del Pokémon que lo lleva."
    ko: "지니게 하면 포켓몬의 HP가\n배틀을 하는 동안 조금씩\n회복된다."
    zh_simp: "携带后，宝可梦的ＨＰ\n会在战斗期间缓缓回复。"
    zh_trad: "攜帶後，寶可夢的ＨＰ\n會在戰鬥期間緩緩回復。"
legend_plate:
  names:
    jp_kana: レジェンドプレート
    jp_kanji: レジェンドプレート
    en: Legend Plate
    fr: Plaque Légende
    it: Lastraleggenda
    de: Legendentafel
    es: Tabla Legendaria
    ko: 레전드플레이트
    zh_simp: 传说石板
    zh_trad: 傳說石板
  descriptions:
    jp_kana: "万物の力が宿った石盤。\nあるポケモンに使うと\nあらゆるタイプの力を得る。"
    jp_kanji: "万物の力が宿った石盤。\nあるポケモンに使うと\nあらゆるタイプの力を得る。"
    en: "A stone tablet imbued with the essence of all creation.\nWhen used on a certain Pokémon, it allows that\nPokémon to gain the power of every type there is."
    fr: "Une tablette en pierre imprégnée d’une puissance\nsuprême. Lorsqu’elle est utilisée sur un certain Pokémon,\ncelui-ci obtient les pouvoirs de n’importe quel type."
    it: "Lastra di pietra colma di energia universale. Se usata\nsu un Pokémon in particolare, gli permette di ottenere\nil potere di tutti i tipi esistenti."
    de: "Dieser Steintafel wohnt eine universelle Energie inne.\nWird sie auf ein bestimmtes Pokémon angewendet,\nerlangt es die Kraft aller Typen."
    es: "Tabla de piedra imbuida de la energía de la creación.\nPermite a cierto Pokémon obtener el poder de cualquier\ntipo."
    ko: "만물의 힘이 깃든 석판.\n특정 포켓몬에게 사용하면\n모든 타입의 힘을 얻는다."
    zh_simp: "蕴含着万物之力的石板。\n对某种宝可梦使用，\n可使其获得一切属性的力量。"
    zh_trad: "蘊含著萬物之力的石板。\n對某種寶可夢使用，\n可使其獲得一切屬性的力量。"
legendary_clue_1:
  names:
    jp_kana: でんせつのメモ１
    jp_kanji: でんせつのメモ１
    en: Legendary Clue 1
    fr: Note Légende 1
    it: Leggenda 1
    de: Legenden-Notiz 1
    es: Leyenda 1
    ko: 전설의메모1
    zh_simp: 传说笔记１
    zh_trad: 傳說筆記１
  descriptions:
    jp_kana: "豊穣の王　伝説について\nピオニーが　まとめた　メモ。\n古い　写真が　貼り付けられている。"
    jp_kanji: "豊穣の王　伝説について\nピオニーが　まとめた　メモ。\n古い　写真が　貼り付けられている。"
    en: "A clue about the King of Bountiful Harvests. It’s written\nby Peony, and an old photo is attached to it."
    fr: "Les notes de Dhilan sur le légendaire Seigneur\ndes récoltes. Elles sont accompagnées d’une vieille\nphotographie."
    it: "Appunti presi da Peony sulla leggenda del Re\ndell’abbondanza. C’è attaccata una vecchia foto."
    de: "Gesammelte Notizen von Peony über die Legende des\nKönigs der reichen Ernte. Ein altes Foto ist auch dabei."
    es: "Una nota escrita por Peony acerca de la leyenda del\nRey de las Cosechas. Lleva adjunta una vieja fotografía."
    ko: "풍요의 왕 전설에 대해\n피오니가 정리한 메모.\n오래된 사진이 붙어 있다."
    zh_simp: "皮欧尼整理的\n有关丰饶之王传说的笔记。\n上面贴着很旧的照片。"
    zh_trad: "皮歐尼針對豐饒之王傳說\n所整理的筆記。\n上面貼著很舊的照片。"
legendary_clue_2:
  names:
    jp_kana: でんせつのメモ２
    jp_kanji: でんせつのメモ２
    en: Legendary Clue 2
    fr: Note Légende 2
    it: Leggenda 2
    de: Legenden-Notiz 2
    es: Leyenda 2
    ko: 전설의메모2
    zh_simp: 传说笔记２
    zh_trad: 傳說筆記２
  descriptions:
    jp_kana: "巨人　伝説について\nピオニーが　まとめた　メモ。\n個性的な　絵が　描かれている。"
    jp_kanji: "巨人　伝説について\nピオニーが　まとめた　メモ。\n個性的な　絵が　描かれている。"
    en: "A clue about the legend of giants. It’s written\nby Peony and has unique drawings."
    fr: "Les notes de Dhilan sur les colosses légendaires.\nIl a pris le temps de les accompagner d’illustrations."
    it: "Appunti presi da Peony sulla leggenda dei giganti.\nContengono un’illustrazione singolare."
    de: "Gesammelte Notizen von Peony über die Legende der\nGiganten. Ein paar einzigartige Illustrationen sind\nauch dabei."
    es: "Una nota escrita por Peony acerca de la leyenda de los\ngigantes. Contiene unas ilustraciones muy particulares."
    ko: "거인의 전설에 대해\n피오니가 정리한 메모.\n개성적인 그림이 그려져 있다."
    zh_simp: "皮欧尼整理的\n有关巨人传说的笔记。\n上面绘有充满个性的画。"
    zh_trad: "皮歐尼針對巨人傳說\n所整理的筆記。\n上面畫有個性十足的圖案。"
legendary_clue_3:
  names:
    jp_kana: でんせつのメモ３
    jp_kanji: でんせつのメモ３
    en: Legendary Clue 3
    fr: Note Légende 3
    it: Leggenda 3
    de: Legenden-Notiz 3
    es: Leyenda 3
    ko: 전설의메모3
    zh_simp: 传说笔记３
    zh_trad: 傳說筆記３
  descriptions:
    jp_kana: "とりポケモン　伝説について\nピオニーが　まとめた　メモ。\n個性的な　絵が　描かれている。"
    jp_kanji: "とりポケモン　伝説について\nピオニーが　まとめた　メモ。\n個性的な　絵が　描かれている。"
    en: "A clue about the legend of bird Pokémon. It’s written\nby Peony and has a unique drawing."
    fr: "Les notes de Dhilan sur les oiseaux de légende.\nIl a pris le temps de les accompagner d’une illustration."
    it: "Appunti presi da Peony sulla leggenda dei Pokémon\nalati. Contengono un’illustrazione singolare."
    de: "Gesammelte Notizen von Peony über die Legende der\nVogel-Pokémon. Eine einzigartige Illustration ist auch\ndabei."
    es: "Una nota escrita por Peony acerca de la leyenda de\nlas aves legendarias. Contiene una ilustración muy\nparticular."
    ko: "새포켓몬 전설에 대해\n피오니가 정리한 메모.\n개성적인 그림이 그려져 있다."
    zh_simp: "皮欧尼整理的\n有关鸟宝可梦传说的笔记。\n上面绘有充满个性的画。"
    zh_trad: "皮歐尼針對鳥寶可夢傳說\n所整理的筆記。\n上面畫有個性十足的圖案。"
legendary_clue_question:
  names:
    jp_kana: でんせつのメモ？
    jp_kanji: でんせつのメモ？
    en: Legendary Clue?
    fr: Note Légende (?)
    it: Leggenda ?
    de: Legenden-Notiz X
    es: Leyenda (?)
    ko: 전설의메모?
    zh_simp: 传说笔记？
    zh_trad: 傳說筆記？
  descriptions:
    jp_kana: "ピオニーが　落とした　不思議なメモ。\nマックスダイ巣穴に　光の穴が\n開かれた　写真が　貼り付けてある。"
    jp_kanji: "ピオニーが　落とした　不思議なメモ。\nマックスダイ巣穴に　光の穴が\n開かれた　写真が　貼り付けてある。"
    en: "A mysterious clue that Peony seems to have dropped.\nThere’s a photo attached to it showing a shining hole\nopening above the Max Lair."
    fr: "Une note mystérieuse que Dhilan a égarée.\nOn peut y voir la photo d’un trou de lumière,\ndans le Grand Antre Dynamax."
    it: "Appunti misteriosi perduti da Peony. Vi è incollata\nuna foto di uno squarcio luminoso apertosi in una\ndynatana max."
    de: "Eine rätselhafte Notiz, die Peony verloren hat.\nDarin klebt ein Foto eines leuchtenden Lochs,\ndas sich über dem Dyna-Riesennest geöffnet hat."
    es: "Una extraña nota que se le cayó a Peony. Tiene pegada\nuna foto del Supernido Dinamax en la que se ve una\ncavidad luminosa."
    ko: "피오니가 떨어뜨린 수상한 메모.\n맥스다이맥스굴에 빛나는 구멍이 열린\n사진이 붙어 있다."
    zh_simp: "皮欧尼掉落的神秘笔记。\n上面贴有极巨巢穴\n出现光洞的照片。"
    zh_trad: "皮歐尼掉落的神秘筆記。\n上面貼的照片裡可以看見\n極巨巢穴有個發光的大洞。"
lemonade:
  names:
    jp_kana: ミックスオレ
    jp_kanji: ミックスオレ
    en: Lemonade
    fr: Limonade
    it: Lemonsucco
    de: Limonade
    es: Limonada
    ko: 후르츠밀크
    zh_simp: 果汁牛奶
    zh_trad: 果汁牛奶
  descriptions:
    jp_kana: "とても　あまい　ジュース。\nポケモン　１匹の　ＨＰを\n７０だけ　回復する。"
    jp_kanji: "とても　あまい　ジュース。\nポケモン　１匹の　ＨＰを\n７０だけ　回復する。"
    en: "A very sweet and refreshing drink. It can be used to\nrestore 70 HP to a Pokémon."
    fr: "Une boisson très sucrée.\nRestaure 70 PV d’un Pokémon."
    it: Bevanda molto dolce. Restituisce 70 PS a un Pokémon.
    de: "Ein sehr süßes Getränk, das die KP eines Pokémon um\n70 Punkte auffüllt."
    es: Bebida muy dulce que restaura 70 PS de un Pokémon.
    ko: "매우 달콤한 주스.\n포켓몬 1마리의 HP를\n70만큼 회복한다."
    zh_simp: "非常香甜的牛奶。\n能让１只宝可梦\n回复７０ＨＰ。"
    zh_trad: "非常甜的果汁。\n能讓１隻寶可夢\n回復７０ＨＰ。"
lens_case:
  names:
    jp_kana: レンズケース
    jp_kanji: レンズケース
    en: Lens Case
    fr: Boîte Lentilles
    it: Portalenti
    de: Linsenetui
    es: Portalentillas
    ko: 렌즈케이스
    zh_simp: 隐形眼镜盒
    zh_trad: 隱形眼鏡盒
  descriptions:
    jp_kana: "コンタクトレンズを　しまっておける\nちょっと　おしゃれな　ケース。"
    jp_kanji: "コンタクトレンズを　しまっておける\nちょっと　おしゃれな　ケース。"
    en: "A rather chic-looking case for carrying\ncontact lenses."
    fr: Un étui plutôt chic destiné aux lentilles de contact.
    it: Un elegante astuccio per lenti a contatto.
    de: Ein stilvolles Etui zur Aufbewahrung von Kontaktlinsen.
    es: "Estuche de aspecto sofisticado para llevar tus lentes\nde contacto."
    ko: "콘택트렌즈를 담아 둘 수 있는\n살짝 멋진 케이스."
    zh_simp: "可以存放隐形眼镜的，\n有点漂亮的盒子。"
    zh_trad: "可以存放隱形眼鏡的，\n有點漂亮的盒子。"
leppa_berry:
  names:
    jp_kana: ヒメリのみ
    jp_kanji: ヒメリのみ
    en: Leppa Berry
    fr: Baie Mepo
    it: Baccamela
    de: Jonagobeere
    es: Baya Zanama
    ko: 과사열매
    zh_simp: 苹野果
    zh_trad: 蘋野果
  descriptions:
    jp_kana: "ポケモンに　持たせると\nＰＰを　１０だけ　回復する。"
    jp_kanji: "ポケモンに　持たせると\nＰＰを　１０だけ　回復する。"
    en: "If a Pokémon holds one of these Berries, it will be able\nto restore 10 PP to a move."
    fr: "Une Baie qui restaure 10 PP lorsqu’elle est tenue\npar un Pokémon."
    it: "Se un Pokémon ha questa bacca, restituisce 10 PP\na una mossa."
    de: "Als getragenes Item füllt diese Beere die AP einer\nAttacke des Pokémon um 10 Punkte auf."
    es: "Los Pokémon pueden llevarla y usarla para restaurar\n10 PP de un movimiento."
    ko: "포켓몬에게 지니게 하면\nPP를 10만큼 회복한다."
    zh_simp: "让宝可梦携带后，\n可以回复１０ＰＰ。"
    zh_trad: "讓寶可夢攜帶後，\n可以回復１０ＰＰ。"
letter:
  names:
    jp_kana: ダイゴへのてがみ
    jp_kanji: ダイゴへのてがみ
    en: Letter
    fr: Lettre à Pierre
    it: Lettera
    de: Brief an Troy
    es: Carta a Máximo
    ko: 성호에게줄편지
    zh_simp: 给大吾的信
    zh_trad: 給大吾的信
  descriptions:
    jp_kana: "デボン社長から\nあずかった　手紙。"
    jp_kanji: "デボン社長から\nあずかった　手紙。"
    en: "An extremely important letter to Steven from\nthe president of Devon Corporation."
    fr: Une lettre confiée par le directeur de Devon.
    it: Lettera che ti è stata affidata dal direttore della Devon.
    de: "Ein Brief, den du im Namen des Präsidenten der\nDevon Corporation an Troy aushändigen sollst."
    es: Carta que te ha confiado el presidente de Devon S. A.
    ko: "데봉사장이\n맡긴 편지."
    zh_simp: "从得文社长\n那里得到的信。"
    zh_trad: 得文社長託付的信。
lettuce:
  names:
    jp_kana: レタス
    jp_kanji: レタス
    en: Lettuce
    fr: Laitue
    it: Lattuga
    de: Salat
    es: Lechuga
    ko: 양상추
    zh_simp: 生菜
    zh_trad: 生菜
  descriptions:
    jp_kana: "苦味が　ある　食材。\nクセが　少ないので　いろいろな食材と\n組み合わせて　楽しむことが　できる。"
    jp_kanji: "苦味が　ある　食材。\nクセが　少ないので　いろいろな食材と\n組み合わせて　楽しむことが　できる。"
    en: "This bitter-tasting ingredient is simple and\nstraightforward—just add it to all kinds of other\ningredients for a delightfully crunchy time."
    fr: "Un ingrédient au goût amer. Sa saveur simple lui permet\nde se combiner avec toutes sortes d’aliments."
    it: "Un ingrediente amaro. Il suo sapore semplice permette\nun gradevole abbinamento con tanti altri ingredienti."
    de: "Dank ihres relativ schlichten Geschmacks kann diese\nbittere Zutat wunderbar mit den unterschiedlichsten\nanderen Zutaten kombiniert werden."
    es: "Tiene un sabor muy suave con un ligero toque amargo,\nlo que hace que se pueda disfrutar como\nacompañamiento de casi cualquier otro ingrediente."
    ko: "쓴맛이 나는 식재료.\n개성이 강하지 않아서\n다양한 식재료와 조합해서 즐길 수 있다."
    zh_simp: "带苦味的食材。\n因为味道朴素，所以能\n与各种食材搭配享用。"
    zh_trad: "帶有苦味的食材。\n沒有什麼特殊的味道，所以能和\n其他各式各樣的食材搭配享用。"
level_ball:
  names:
    jp_kana: レベルボール
    jp_kanji: レベルボール
    en: Level Ball
    fr: Niveau Ball
    it: Level Ball
    de: Levelball
    es: Nivel Ball
    ko: 레벨볼
    zh_simp: 等级球
    zh_trad: 等級球
  descriptions:
    jp_kana: "自分のポケモンより　レベルが\n低いほど　捕まえやすくなる\nちょっと変わった　ボール。"
    jp_kanji: "自分のポケモンより　レベルが\n低いほど　捕まえやすくなる\nちょっと変わった　ボール。"
    en: "A somewhat different Poké Ball that becomes more\neffective the lower the level of the Pokémon compared\nto your own Pokémon."
    fr: "Une Poké Ball un peu spéciale qui fonctionne\nparticulièrement bien sur les Pokémon de niveau\ninférieur au sien."
    it: "Poké Ball un po’ diversa che diventa tanto più efficace\nquanto più il livello del Pokémon da catturare è\ninferiore a quello del proprio."
    de: "Ein Ball, mit dem sich Pokémon umso leichter fangen\nlassen, je niedriger ihr Level im Vergleich zu deinem\nTeam ist."
    es: "Poké Ball algo distinta a las demás que funciona mejor\ncuanto menor sea el nivel del Pokémon salvaje en\nrelación al del Pokémon propio."
    ko: "자신의 포켓몬보다 레벨이\n낮을수록 잡기 쉬워지는\n조금 특이한 볼."
    zh_simp: "有点与众不同的球。\n要捕捉的宝可梦比自己宝可梦的\n等级越低，就会越容易捕捉。"
    zh_trad: "有點與眾不同的球。\n對手的等級比自己的寶可夢低越多，\n就越容易捉到。"
liberty_pass:
  names:
    jp_kana: リバティチケット
    jp_kanji: リバティチケット
    en: Liberty Pass
    fr: Passe Liberté
    it: Liberticket
    de: Gartenpass
    es: Tarjeta Libertad
    ko: 리버티티켓
    zh_simp: 自由船票
    zh_trad: 自由船票
  descriptions:
    jp_kana: "リバティガーデン島に　行くための\n特別なチケット。\nヒウンシティから　船に　乗れる。"
    jp_kanji: "リバティガーデン島に　行くための\n特別なチケット。\nヒウンシティから　船に　乗れる。"
    en: "A special pass to go to Liberty Garden.\nBoard the ship in Castelia City."
    fr: "Un ticket spécial permettant de se rendre\nsur l’Île Liberté à bord du bateau de Volucité."
    it: "Biglietto speciale per l’Isola Libertà. La nave parte\nda Austropoli."
    de: "Ein besonderes Ticket für die Überfahrt von Stratos City\nzur Insel des Freiheitsgartens."
    es: "Ticket especial para ir en barco desde Ciudad Porcelana\na Isla Libertad."
    ko: "리버티가든섬에 가기 위한\n특별한 티켓.\n구름시티에서 배를 탈 수 있다."
    zh_simp: "用于前往自由庭园岛的特殊船票。\n可以从飞云市上船。"
    zh_trad: "用於前往自由庭園島的\n特殊船票。\n可以從飛雲市上船。"
lickitung_candy:
  names:
    jp_kana: ベロリンガのアメ
    jp_kanji: ベロリンガのアメ
    en: Lickitung Candy
    fr: Bonbon Excelangue
    it: Caramella Lickitung
    de: Schlurp-Bonbon
    es: Caramelo Lickitung
    ko: 내루미의사탕
    zh_simp: 大舌头的糖果
    zh_trad: 大舌頭的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de cierto Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
liechi_berry:
  names:
    jp_kana: チイラのみ
    jp_kanji: チイラのみ
    en: Liechi Berry
    fr: Baie Lichii
    it: Baccalici
    de: Lydzibeere
    es: Baya Lichi
    ko: 치리열매
    zh_simp: 枝荔果
    zh_trad: 枝荔果
  descriptions:
    jp_kana: "ポケモンに　持たせると\nピンチのとき　自分の\n攻撃が　あがる。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　自分の\n攻撃が　あがる。"
    en: "If a Pokémon holds one of these Berries, its Attack stat\nwill be boosted should it find itself in a pinch."
    fr: Tenue, cette Baie augmente l’Attaque en cas de besoin.
    it: "Se il Pokémon che ha questa bacca si trova in difficoltà,\nil suo Attacco aumenta."
    de: "Als getragenes Item erhöht diese Beere den Angriff\ndes Pokémon, sobald es in einer Notlage steckt."
    es: "Si la lleva un Pokémon, le aumenta el Ataque en un\nmomento de apuro."
    ko: "포켓몬에게 지니게 하면\n위급할 때 자신의\n공격이 올라간다."
    zh_simp: "让宝可梦携带后，危机时，\n自己的攻击就会提高。"
    zh_trad: "讓寶可夢攜帶後，\n危機時，自己的\n攻擊就會提高。"
life_orb:
  names:
    jp_kana: いのちのたま
    jp_kanji: いのちのたま
    en: Life Orb
    fr: Orbe Vie
    it: Assorbisfera
    de: Leben-Orb
    es: Vidasfera
    ko: 생명의구슬
    zh_simp: 生命宝珠
    zh_trad: 生命寶珠
  descriptions:
    jp_kana: "持たせると　攻撃するたびに\nＨＰが　少し　減ってしまうが\n技の威力が　あがる。"
    jp_kanji: "持たせると　攻撃するたびに\nＨＰが　少し　減ってしまうが\n技の威力が　あがる。"
    en: "An item to be held by a Pokémon. It boosts the power\nof the holder’s moves, but the holder also loses a small\namount of HP with each attack it lands."
    fr: "Objet à tenir. Augmente la puissance des capacités,\nmais fait perdre des PV au porteur à chaque fois\nqu’il attaque."
    it: "Strumento da dare a un Pokémon. Per ogni attacco\nsferrato, aumenta la potenza delle mosse a scapito\ndi alcuni PS."
    de: "Ein Item zum Tragen. Ein Orb, der Attacken verstärkt,\naber den Träger bei jedem Angriff KP kostet."
    es: "Potencia los movimientos, pero consume PS con cada\nataque. Debe llevarla un Pokémon."
    ko: "지니게 하면 공격할 때마다\nHP가 조금씩 줄지만\n기술의 위력이 올라간다."
    zh_simp: "携带后，虽然每次攻击时\nＨＰ少量减少，\n但招式的威力会提高。"
    zh_trad: "攜帶後，雖然每次攻擊時\nＨＰ會少量減少，但招式的\n威力會提高。"
lift_key:
  names:
    jp_kana: エレベータのカギ
    jp_kanji: エレベータのカギ
    en: Lift Key
    fr: Clé Ascenseur
    it: Chiave ascensore
    de: Aufzugsschlüssel
    es: Llave del Ascensor
    ko: 엘리베이터열쇠
    zh_simp: 电梯钥匙
    zh_trad: 電梯鑰匙
  descriptions:
    jp_kana: "ロケット団　アジトに　ある\nエレベータを　動かす　カギ。\nロケット団の　マーク入り。"
    jp_kanji: "ロケット団　アジトに　ある\nエレベータを　動かす　カギ。\nロケット団の　マーク入り。"
    en: "A key that operates the elevator in the Team Rocket\nHideout. It bears the Team Rocket logo."
    fr: "Une clé activant l’ascenseur du Repaire de la Team\nRocket. Elle porte la marque de l’organisation."
    it: "Chiave per l’ascensore nel Rifugio del Team Rocket.\nPresenta il logo del Team Rocket."
    de: "Ein Schlüssel, mit dessen Hilfe der Aufzug im\nRocket-Versteck in Gang gesetzt werden kann.\nDas Logo von Team Rocket ist darauf abgebildet."
    es: "Llave que permite acceder al ascensor de la Guarida\ndel Team Rocket. Lleva grabado el símbolo del\nTeam Rocket."
    ko: "로켓단아지트에 있는\n엘리베이터를 작동시키는 열쇠.\n로켓단의 마크가 새겨져 있다."
    zh_simp: "带有火箭队标志的钥匙。\n能启动位于火箭队基地的电梯。"
    zh_trad: "能啟動火箭隊基地\n電梯的鑰匙。\n上面有火箭隊的標誌。"
light_ball:
  names:
    jp_kana: でんきだま
    jp_kanji: でんきだま
    en: Light Ball
    fr: Balle Lumière
    it: Elettropalla
    de: Kugelblitz
    es: Bola Luminosa
    ko: 전기구슬
    zh_simp: 电气球
    zh_trad: 電氣球
  descriptions:
    jp_kana: "ピカチュウに　持たせると\n攻撃と　特攻が\nあがる　不思議な玉。"
    jp_kanji: "ピカチュウに　持たせると\n攻撃と　特攻が\nあがる　不思議な玉。"
    en: "An item to be held by Pikachu. It’s a mysterious orb\nthat boosts Pikachu’s Attack and Sp. Atk stats."
    fr: "Objet à faire tenir à Pikachu. Un orbe énigmatique\nqui augmente son Attaque et son Attaque Spéciale."
    it: "Strumento da dare a Pikachu. Sfera insolita che aumenta\nl’Attacco e l’Attacco Speciale."
    de: "Ein Item, das von Pikachu getragen werden kann.\nEs erhöht den Angriff und den Spezial-Angriff."
    es: "Asombrosa esfera que aumenta el Ataque y el Ataque\nEspecial. Debe llevarla Pikachu."
    ko: "피카츄에게 지니게 하면\n공격과 특수공격이\n올라가는 이상한 구슬."
    zh_simp: "让皮卡丘携带后，\n攻击和特攻就会\n提高的神奇之球。"
    zh_trad: "讓皮卡丘攜帶後，\n攻擊和特攻就會\n提高的神奇之球。"
light_clay:
  names:
    jp_kana: ひかりのねんど
    jp_kanji: ひかりのねんど
    en: Light Clay
    fr: Lumargile
    it: Creta luce
    de: Lichtlehm
    es: Refleluz
    ko: 빛의점토
    zh_simp: 光之黏土
    zh_trad: 光之黏土
  descriptions:
    jp_kana: "持たせたポケモンが　ひかりのかべや\nリフレクターを　使ったとき\nいつもよりも　長く　残る。"
    jp_kanji: "持たせたポケモンが　ひかりのかべや\nリフレクターを　使ったとき\nいつもよりも　長く　残る。"
    en: "An item to be held by a Pokémon. When the holder\nuses protective moves like Light Screen or Reflect,\ntheir effects will last longer than usual."
    fr: "Objet à tenir. Il prolonge la durée des capacités\ntelles que Mur Lumière et Protection lancées par\nle porteur."
    it: "Strumento da dare a un Pokémon. Allunga la durata\ndelle mosse barriera come Schermoluce e Riflesso."
    de: "Ein Item zum Tragen. Verlängert die Dauer von Barrieren\nwie Lichtschild und Reflektor."
    es: "Prolonga la duración de barreras como las creadas por\nReflejo y Pantalla de Luz. Debe llevarlo un Pokémon."
    ko: "지니게 한 포켓몬이 빛의장막이나\n리플렉터를 사용했을 때\n여느 때보다 긴 시간 동안 지속된다."
    zh_simp: "当携带它的宝可梦\n使出光墙或反射壁时，\n效果会比平时持续得更长。"
    zh_trad: "當攜帶它的寶可夢\n使出光牆或反射壁時，\n效果會比平時持續得更久。"
light_stone:
  names:
    jp_kana: ライトストーン
    jp_kanji: ライトストーン
    en: Light Stone
    fr: Galet Blanc
    it: Chiarolite
    de: Lichtstein
    es: Orbe Claro
    ko: 라이트스톤
    zh_simp: 光明石
    zh_trad: 光明石
  descriptions:
    jp_kana: "レシラムの肉体が　滅び\n変化した姿。　英雄の\n登場を　待っていると　される。"
    jp_kanji: "レシラムの肉体が　滅び\n変化した姿。　英雄の\n登場を　待っていると　される。"
    en: "Reshiram’s body was destroyed and changed into\nthis stone. It is said to be waiting for the\nemergence of a hero."
    fr: "Ce sont les derniers restes du corps de Reshiram.\nOn dit qu’ils attendent l’apparition d’un héros."
    it: "Pietra in cui si è tramutato Reshiram quando ha perso\nla sua forma corporea. Attende la venuta di un eroe."
    de: "Nach dem Zerfall seines Körpers nahm Reshiram diese\nForm an. Man sagt, es warte auf die Ankunft eines\nHelden."
    es: "Forma que adoptó Reshiram al perder su cuerpo.\nEspera la llegada de un nuevo héroe."
    ko: "레시라무의 육체가 허물어져\n변화한 모습. 영웅의\n등장을 기다린다고 여겨진다."
    zh_simp: "莱希拉姆的肉体\n毁灭后变成的样子。\n据说它在等待着英雄的到来。"
    zh_trad: "萊希拉姆的肉體\n毀滅後變成的樣子。\n據說它在等待著英雄的到來。"
like_mail:
  names:
    jp_kana: おすすめメール
    jp_kanji: おすすめメール
    en: Like Mail
    fr: Lettre Avis
    it: Messaggio Consiglio
    de: Insiderbrief
    es: Carta Gustos
    ko: 추천메일
    zh_simp: 推荐邮件
    zh_trad: 推薦郵件
  descriptions:
    jp_kana: "なにかを　おすすめする　メールが\n書きやすい　レターペーパー。\nポケモンに　持たせて　使う。"
    jp_kanji: "なにかを　おすすめする　メールが\n書きやすい　レターペーパー。\nポケモンに　持たせて　使う。"
    en: "Stationery designed to allow you to recommend\nsomething to the reader. Have a Pokémon hold it\nfor delivery."
    fr: "Un papier à lettres idéal pour donner des conseils.\nPeut être tenu et livré par un Pokémon."
    it: "Carta da lettere ideale per scrivere un consiglio.\nSi usa dandola a un Pokémon."
    de: "Briefpapier, mit dem man jemandem einen Tipp geben\nkann. Gib es einem Pokémon zum Tragen."
    es: "Carta para recomendar algo. Debe llevarla un Pokémon\npara entregarla."
    ko: "뭔가 추천하는 메일을\n쉽게 쓸 수 있는 편지지.\n포켓몬에게 지니게 해서 쓴다."
    zh_simp: "方便写推荐内容这类邮件的信纸。\n使用该道具时，\n需要让宝可梦携带着来用。"
    zh_trad: "方便寫推薦內容這類郵件的信紙。\n需讓寶可夢攜帶使用。"
lilac_chairs:
  names:
    jp_kana: パープルチェア
    jp_kanji: パープルチェア
    en: Lilac Chairs
    fr: Sièges Mauves
    it: Sedie lilla
    de: Violette Stühle
    es: Sillas Malvas
    ko: 퍼플 체어
    zh_simp: 紫色椅子
    zh_trad: 紫色椅子
  descriptions:
    jp_kana: "ピクニックで　使いやすい　イス。\nパープルクロスの　デザインを\nもとに　作ってもらった。"
    jp_kanji: "ピクニックで　使いやすい　イス。\nパープルクロスの　デザインを\nもとに　作ってもらった。"
    en: "A set of chairs that are ideal for picnicking. Their design\nwas inspired by the Lilac Tablecloth."
    fr: "Des sièges parfaits pour les pique-niques.\nLeur design est inspiré de la Nappe Mauve."
    it: "Pratiche sedie, perfette per i picnic, ispirate al design\ndella Tovaglia lilla."
    de: "Diese Stühle sind gut geeignet für Picknicks.\nIhr Design basiert auf dem Violetten Tischtuch."
    es: "Unas sillas ideales para irse de pícnic. Su diseño está\nbasado en el del Mantel Malva."
    ko: "피크닉에서 사용하기 편한 의자.\n퍼플 테이블보의\n디자인을 토대로 만들어졌다."
    zh_simp: "在野餐时很好用的椅子。\n根据紫色桌巾的设计制作而成。"
    zh_trad: "野餐時很好用的椅子。\n根據紫色桌巾的設計製作而成。"
lilac_tablecloth:
  names:
    jp_kana: パープルクロス
    jp_kanji: パープルクロス
    en: Lilac Tablecloth
    fr: Nappe Mauve
    it: Tovaglia lilla
    de: Violettes Tischtuch
    es: Mantel Malva
    ko: 퍼플 테이블보
    zh_simp: 紫色桌巾
    zh_trad: 紫色桌巾
  descriptions:
    jp_kana: "やわらかい　パープルカラーの　テーブルクロス。\n肌に優しい　サラリとした　さわり心地で\n食器を　置いても　音を　立てない。"
    jp_kanji: "やわらかい　パープルカラーの　テーブルクロス。\n肌に優しい　サラリとした　さわり心地で\n食器を　置いても　音を　立てない。"
    en: "A light purple tablecloth. It’s smooth and pleasant to\nthe touch, and dishes can be placed on it with hardly\na sound."
    fr: "Une nappe d’une douce couleur mauve. Sa texture\nsatinée est agréable au toucher et étouffe le bruit\ndes plats lorsqu’on les pose dessus."
    it: "Tovaglia di un delicato color lilla. È così liscia e\nmorbida al tatto che quando ci poggi le stoviglie\nnon fanno rumore."
    de: "Dieses weiche violette Tischtuch aus hautfreundlichem,\nglattem Material absorbiert jegliches Geräusch von\nGeschirr, das darauf platziert wird."
    es: "Un mantel de un suave color malva. Está hecho de un\nmaterial tan sedoso y delicado que hasta absorbe el\nsonido que producen los platos al colocarlos sobre él."
    ko: "부드러운 퍼플 컬러의 테이블보.\n피부에 자극이 적은 매끈한 재질이며\n식기를 올려놓아도 소리가 나지 않는다."
    zh_simp: "柔软的紫色桌巾。\n丝柔顺滑亲近肌肤，\n放上餐具也不会发出声音。"
    zh_trad: "以柔和的紫色為質地的桌巾。\n觸感輕柔，如同撫過肌膚一般，\n而且放置餐具時也不會發出聲響。"
linking_cord:
  names:
    jp_kana: つながりのヒモ
    jp_kanji: つながりのヒモ
    en: Linking Cord
    fr: Fil de Liaison
    it: Filo dell’unione
    de: Verbindungsschnur
    es: Cordón Unión
    ko: 연결의끈
    zh_simp: 联系绳
    zh_trad: 聯繫繩
  descriptions:
    jp_kana: "なにかしらのつながりを　感じさせる\n不思議なエネルギーを　秘めているヒモ。\nあるポケモンたちが　好んでいる。"
    jp_kanji: "なにかしらのつながりを　感じさせる\n不思議なエネルギーを　秘めているヒモ。\nあるポケモンたちが　好んでいる。"
    en: "A string exuding a mysterious energy that makes you\nfeel a strange sense of connection. It’s loved by\ncertain Pokémon."
    fr: "Un fil qui semble abriter une étrange énergie capable\nde nouer des liens entre les êtres. Il est apprécié de\ncertains Pokémon."
    it: "Filo dotato di una misteriosa energia che lascia\npercepire un inspiegabile senso di connessione.\nPiace a dei Pokémon in particolare."
    de: "Diese Schnur verströmt eine mysteriöse Energie und\nverleiht ein seltsames Gefühl der Verbundenheit.\nDas Lieblingsstück bestimmter Pokémon."
    es: "Cordón que emite una singular energía capaz de\ntransmitir una extraña sensación de conexión. Ciertos\nPokémon lo adoran."
    ko: "모종의 유대감이 느껴지는\n신비한 에너지가 담긴 끈.\n어떤 포켓몬들이 좋아하는 물건이다."
    zh_simp: "蕴藏着不可思议能量的绳子，\n能从中感受到某种联系。\n某种宝可梦们很喜欢它。"
    zh_trad: "蘊藏著不可思議能量的繩子，\n能從中感受到某種聯繫。\n受到了某種寶可夢們的喜愛。"
litleo_tuft:
  names:
    jp_kana: シシコのたてがみ
    jp_kanji: シシコのたてがみ
    en: Litleo Tuft
    fr: Crinière d’Hélionceau
    it: Crine di Litleo
    de: Leufeo-Mähnenhaar
    es: Mechón de Litleo
    ko: 레오꼬의갈기
    zh_simp: 小狮狮的鬃毛
    zh_trad: 小獅獅的鬃毛
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
litwick_soot:
  names:
    jp_kana: ヒトモシのすす
    jp_kanji: ヒトモシのすす
    en: Litwick Soot
    fr: Suie de Funécire
    it: Fuliggine di Litwick
    de: Lichtel-Ruß
    es: Hollín de Litwick
    ko: 불켜미의검댕
    zh_simp: 烛光灵的煤灰
    zh_trad: 燭光靈的煤灰
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
loaded_dice:
  names:
    jp_kana: いかさまダイス
    jp_kanji: いかさまダイス
    en: Loaded Dice
    fr: Dé Pipé
    it: Dado truccato
    de: Gezinkter Würfel
    es: Dado Trucado
    ko: 속임수주사위
    zh_simp: 机变骰子
    zh_trad: 老千骰子
  descriptions:
    jp_kana: "いい目しか　出ない　サイコロ。\n持たせて　連続技を　使うと\n多めに　技を　出すことが　できる。"
    jp_kanji: "いい目しか　出ない　サイコロ。\n持たせて　連続技を　使うと\n多めに　技を　出すことが　できる。"
    en: "An item to be held by a Pokémon. This loaded dice\nalways rolls a good number, and holding one can ensure\nthat the holder’s multistrike moves hit more times."
    fr: "Objet à tenir. Ce dé ne tire que des bons numéros\net permet d’asséner de nombreux coups lorsqu’une\ncapacité pouvant frapper plusieurs fois est utilisée."
    it: "Strumento da dare a un Pokémon. Dado truccato che\ncade sempre in modo favorevole, permettendo alle\nmosse multicolpo di mandare a segno più colpi."
    de: "Ein Würfel, der stets eine hohe Augenzahl landet.\nGibt man ihn einem Pokémon zum Tragen, kann es\nbei Serien-Attacken eine hohe Trefferzahl erzielen."
    es: "Un dado que siempre cae favorablemente. Los\nmovimientos de ataque múltiple de quien lo lleve\ngolpearán más veces."
    ko: "좋은 눈만 나오는 주사위.\n지니게 하고 연속 기술을 사용하면\n많은 횟수로 기술을 사용할 수 있다."
    zh_simp: "只会出现好数字的骰子。\n携带后，在使用连续招式时，\n能使出较多次招式。"
    zh_trad: "只會滾出好點數的骰子。\n攜帶後，在使用連續招式時，\n能以較多的次數進行攻擊。"
lock_capsule:
  names:
    jp_kana: ロックカプセル
    jp_kanji: ロックカプセル
    en: Lock Capsule
    fr: Poké Écrin
    it: Capsula scrigno
    de: Tresorkapsel
    es: Cápsula Candado
    ko: 록캡슐
    zh_simp: 上锁的容器
    zh_trad: 上鎖的容器
  descriptions:
    jp_kana: "特殊なカギで　あけられる\n頑丈なカプセル。"
    jp_kanji: "特殊なカギで　あけられる\n頑丈なカプセル。"
    en: "A sturdy Capsule that can only be opened with a\nspecial key."
    fr: "Un écrin résistant qui ne s’ouvre qu’avec une clé\nspéciale."
    it: "Scrigno blindato che si apre solo con una chiave\nspeciale."
    de: "Eine äußerst robuste Kapsel, die sich nur mit einem\nganz speziellen Schlüssel öffnen lässt."
    es: "Una cápsula resistente que solo puede abrirse con una\nllave especial."
    ko: "특수한 열쇠로 열 수 있는\n튼튼한 캡슐."
    zh_simp: "需用特殊钥匙打开的\n坚固的容器。"
    zh_trad: "需用特殊鑰匙打開的\n堅固容器。"
lone_earring:
  names:
    jp_kana: かたっぽピアス
    jp_kanji: かたっぽピアス
    en: Lone Earring
    fr: Boucle d’Oreille
    it: Orecchino
    de: Ohrring
    es: Pendiente
    ko: 한쪽귀고리
    zh_simp: 一边的耳环
    zh_trad: 一邊的耳環
  descriptions:
    jp_kana: "だれかが　落とした\n片っぽ　だけの　ピアス。"
    jp_kanji: "だれかが　落とした\n片っぽ　だけの　ピアス。"
    en: A single earring that somebody dropped.
    fr: Une boucle d’oreille perdue par quelqu’un.
    it: Un orecchino spaiato, perso da qualcuno.
    de: Ein einzelner Ohrring, den irgendjemand verloren hat.
    es: Un pendiente que se le ha debido de caer a alguien.
    ko: "누군가가 떨어뜨린\n한쪽뿐인 귀고리."
    zh_simp: 某人遗失的单只耳环。
    zh_trad: "只有一邊的耳環。\n不知道是誰遺失的。"
lonely_mint:
  names:
    jp_kana: さみしがりミント
    jp_kanji: さみしがりミント
    en: Lonely Mint
    fr: Aromate Solo
    it: Menta Schiva
    de: Solo-Minze
    es: Menta Huraña
    ko: 외로움민트
    zh_simp: 怕寂寞薄荷
    zh_trad: 怕寂寞薄荷
  descriptions:
    jp_kana: "ポケモンに　香りを　かがせると\n攻撃が　上がりやすく　なるが\n防御は　上がりにくくなる　ミント。"
    jp_kanji: "ポケモンに　香りを　かがせると\n攻撃が　上がりやすく　なるが\n防御は　上がりにくくなる　ミント。"
    en: "Having a Pokémon smell this mint can make its Attack\nstat grow stronger. However, its Defense stat may suffer."
    fr: "Si un Pokémon hume cet aromate, son Attaque\nmontera plus facilement, mais sa Défense\nse développera plus lentement."
    it: "Quando un Pokémon ne sente il profumo, il suo Attacco\naumenta più facilmente a scapito della sua Difesa."
    de: "Lässt man ein Pokémon an dieser Minze schnuppern,\nsteigt sein Angriff schneller, aber seine Verteidigung\numso langsamer."
    es: "Cuando un Pokémon percibe su aroma, aumenta con\nmás facilidad su Ataque, en detrimento de su Defensa."
    ko: "포켓몬에게 향기를 맡게 하면\n공격이 오르기 쉬워지지만\n방어가 오르기 어려워지는 민트."
    zh_simp: "宝可梦闻了这种薄荷之后，\n会令攻击容易提高，\n而防御则难以提高。"
    zh_trad: "讓寶可夢聞這種薄荷的氣味，\n會令攻擊變得容易提高，\n但防禦則難以提高。"
looker_ticket:
  names:
    jp_kana: ハンサムチケット
    jp_kanji: ハンサムチケット
    en: Looker Ticket
    fr: Ticket Beladonis
    it: Carta Bellocchio
    de: LeBelle-Ticket
    es: Boleto Handsome
    ko: 핸섬티켓
    zh_simp: 帅哥券
    zh_trad: 帥哥券
  descriptions:
    jp_kana: "きらきら　かがやく\n塗料が　吹きつけられた\nハンサム　てづくりの　チケット。"
    jp_kanji: "きらきら　かがやく\n塗料が　吹きつけられた\nハンサム　てづくりの　チケット。"
    en: "A ticket that was handmade by Looker. It’s\ndecorated with a liberal amount of glittery paint."
    fr: "Un ticket brillant de mille feux, peint à la main\npar Beladonis."
    it: "Un biglietto realizzato a mano da Bellocchio,\ndipinto con colori brillanti."
    de: "Ein von LeBelle persönlich gebasteltes Ticket.\nEs ist mit einer leuchtenden Farbschicht überzogen."
    es: "Boleto hecho a mano por Handsome, decorado con una\ngenerosa cantidad de purpurina."
    ko: "번쩍번쩍 빛나는\n스프레이가 뿌려진\n핸섬이 직접 만든 티켓."
    zh_simp: "喷有闪闪发光的涂料，\n帅哥亲手制作的券。"
    zh_trad: "噴有閃閃發光的塗料，\n帥哥親手製作的券。"
loot_sack:
  names:
    jp_kana: たからぶくろ
    jp_kanji: たからぶくろ
    en: Loot Sack
    fr: Sac Butin
    it: Bottinosacca
    de: Beutesack
    es: Saca Botín
    ko: 보물주머니
    zh_simp: 宝物袋
    zh_trad: 寶物袋
  descriptions:
    jp_kana: "炭鉱で　てにいれた\n宝物を　しまっておける\n大きくて丈夫な　ふくろ。"
    jp_kanji: "炭鉱で　てにいれた\n宝物を　しまっておける\n大きくて丈夫な　ふくろ。"
    en: "A sturdy, spacious bag that is used to carry any\ntreasures or loot obtained in the coal mine."
    fr: "Un grand sac robuste utilisé pour transporter\nle butin obtenu dans la mine de charbon."
    it: "Una sacca spaziosa e resistente usata per trasportare\nil bottino ottenuto nella miniera."
    de: "Ein fester Sack. Wird verwendet, um Beute aus der\nKohlemine zu transportieren."
    es: "Una saca grande y resistente utilizada para transportar\nel botín reunido en la mina de carbón."
    ko: "탄갱에서 손에 넣은\n보물을 보관해 둘 수 있는\n크고 튼튼한 주머니다."
    zh_simp: "结实的大袋子。\n可以将在煤矿里\n获得的宝物放进去。"
    zh_trad: "結實的大袋子。\n可以將在礦坑裡\n獲得的寶物放進去。"
lopunnite:
  names:
    jp_kana: ミミロップナイト
    jp_kanji: ミミロップナイト
    en: Lopunnite
    fr: Lockpinite
    it: Lopunnite
    de: Schlapornit
    es: Lopunnita
    ko: 이어롭나이트
    zh_simp: 长耳兔进化石
    zh_trad: 長耳兔進化石
  descriptions:
    jp_kana: "ミミロップに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    jp_kanji: "ミミロップに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Lopunny hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Lockpin, elle lui permet de méga-évoluer\ndurant un combat."
    it: "Una delle misteriose Megapietre. Data a Lopunny,\ngli permette di megaevolversi durante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Schlapor getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Lopunny en combate."
    ko: "이어롭에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "长耳兔携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "長耳兔攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
lost_item:
  names:
    jp_kana: おとしもの
    jp_kanji: おとしもの
    en: Lost Item
    fr: Objet perdu
    it: Strumento perso
    de: Fundsache
    es: Objeto Perdido
    ko: 분실물
    zh_simp: 遗失物
    zh_trad: 遺失物
  descriptions:
    jp_kana: "モノマネ娘が　なくした\nマネネの　人形。"
    jp_kanji: "モノマネ娘が　なくした\nマネネの　人形。"
    en: The Mime Jr. doll that was lost by the Copycat.
    fr: La Poupée Mime Jr. perdue par la Copieuse.
    it: Pupazzo raffigurante Mime Jr. smarrito da Copiona.
    de: "Eine Pantimimi-Puppe, welche die Nachahmerin\nverloren hat."
    es: El muñeco de Mime Jr. que perdió la Copiona.
    ko: "흉내내기 아가씨가 잃어버린\n흉내내인형."
    zh_simp: "模仿少女丢失的\n魔尼尼人偶。"
    zh_trad: "模仿少女丟失的\n魔尼尼人偶。"
lost_satchel:1:
  names:
    jp_kana: だれかのおとしもの
    jp_kanji: だれかのおとしもの
    en: Lost Satchel
    fr: Objet Perdu
    it: Oggetto smarrito
    de: Verlorene Items
    es: Objeto perdido
    ko: 누군가의분실물
    zh_simp: 他人的遗失物
    zh_trad: 某人的遺失物
  descriptions:
    jp_kana: だれかが落としたポーチ。
    jp_kanji: だれかが落としたポーチ。
    en: A satchel that someone dropped.
    fr: Une sacoche que quelqu’un a égarée.
    it: Borsello perso da qualcuno.
    de: Eine Tasche, die jemand verloren hat.
    es: Zurrón que se le ha caído a alguien.
    ko: 누군가가 떨어뜨린 파우치.
    zh_simp: 他人遗失的腰包。
    zh_trad: 某人遺失的腰包。
