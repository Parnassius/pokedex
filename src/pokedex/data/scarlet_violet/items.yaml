sassy_mint:
  names:
    jp_kana: なまいきミント
    jp_kanji: なまいきミント
    en: Sassy Mint
    fr: Aromate Malpoli
    it: Menta Vivace
    de: Forsch-Minze
    es: Menta Grosera
    ko: 건방민트
    zh_simp: 自大薄荷
    zh_trad: 自大薄荷
  descriptions:
    jp_kana: "ポケモンに　香りを　かがせると\n特防が　上がりやすく　なるが\n素早さは　上がりにくくなる　ミント。"
    jp_kanji: "ポケモンに　香りを　かがせると\n特防が　上がりやすく　なるが\n素早さは　上がりにくくなる　ミント。"
    en: "Having a Pokémon smell this mint can make its Sp. Def\nstat grow stronger. However, its Speed stat may suffer."
    fr: "Si un Pokémon hume cet aromate, sa Défense Spéciale\nmontera plus facilement, mais sa Vitesse\nse développera plus lentement."
    it: "Quando un Pokémon ne sente il profumo,\nla sua Difesa Speciale aumenta più facilmente\na scapito della Velocità."
    de: "Lässt man ein Pokémon an dieser Minze schnuppern,\nsteigt seine Spezial-Verteidigung schneller, aber seine\nInitiative umso langsamer."
    es: "Cuando un Pokémon percibe su aroma, aumenta con\nmás facilidad su Defensa Especial, en detrimento de su\nVelocidad."
    ko: "포켓몬에게 향기를 맡게 하면\n특수방어가 오르기 쉬워지지만\n스피드가 오르기 어려워지는 민트."
    zh_simp: "宝可梦闻了这种薄荷之后，\n会令特防容易提高，\n而速度则难以提高。"
    zh_trad: "讓寶可夢聞這種薄荷的氣味，\n會令特防變得容易提高，\n但速度則難以提高。"
sausages:
  names:
    jp_kana: あらびきヴルスト
    jp_kanji: あらびきヴルスト
    en: Sausages
    fr: Saucisses
    it: Salsicce
    de: Würstchen
    es: Salchichas
    ko: 탱글탱글부어스트
    zh_simp: 粗绞肉香肠
    zh_trad: 粗絞肉香腸
  descriptions:
    jp_kana: "キャンプの　料理に　使う\n食材の　一種。ヴルストとは\nソーセージの　種類。ボイルして食べる。"
    jp_kanji: "キャンプの　料理に　使う\n食材の　一種。ヴルストとは\nソーセージの　種類。ボイルして食べる。"
    en: "One of the many ingredients that can be used for\ncooking at your camp. These sausages should be\nboiled before eating."
    fr: "Un ingrédient de cuisine pour le camping.\nÀ faire bouillir avant de déguster."
    it: "Uno degli ingredienti che puoi usare per cucinare\nin campeggio. Questo tipo di salsiccia va mangiato\nbollito."
    de: "Eine Zutat für PokéCamping-Mahlzeiten. Die kleinen\ngroben Würstchen werden vor dem Verzehr gekocht."
    es: "Un ingrediente para cocinar en el campamento.\nSi te apetece disfrutar de su delicioso sabor, basta\ncon hervirlas."
    ko: "캠프 요리에 사용되는\n식재료 중 하나. 부어스트는\n소시지의 한 종류다. 삶아서 먹는다."
    zh_simp: "在露营营地制作料理时会使用的\n一种食材。白香肠是香肠的一种。\n需要先煮过之后再食用。"
    zh_trad: "製作露營料理時使用的食材之一。\n是香腸的一種，\n水煮後方可食用。"
scanner:
  names:
    jp_kana: たんちき
    jp_kanji: たんちき
    en: Scanner
    fr: Scanner
    it: Scanner
    de: Scanner
    es: Escáner
    ko: 탐지기
    zh_simp: 探测器
    zh_trad: 探測器
  descriptions:
    jp_kana: "シーキンセツの　中で\nみつけた　道具。"
    jp_kanji: "シーキンセツの　中で\nみつけた　道具。"
    en: A device found inside Sea Mauville.
    fr: Un objet trouvé à Lavandia Sea.
    it: Dispositivo trovato a Ciclamare.
    de: "Ein Gerät, das du in Seewoge Malvenfroh gefunden\nhast."
    es: Objeto hallado en el interior de Malvamar.
    ko: "씨보라 안에서\n발견한 도구."
    zh_simp: "在海紫堇中\n找到的道具。"
    zh_trad: "在海紫菫中\n找到的道具。"
scarlet_book:
  names:
    jp_kana: スカーレットブック
    jp_kanji: スカーレットブック
    en: Scarlet Book
    fr: Livre Écarlate
    it: Libro scarlatto
    de: Karmesinbuch
    es: Libro Escarlata
    ko: 스칼렛북
    zh_simp: 朱之书
    zh_trad: 朱之書
  descriptions:
    jp_kana: "著者　ヘザーによって　書かれた\nパルデアの大穴の　探検記。\nつたない文字で　オーリムと　書かれている。"
    jp_kanji: "著者　ヘザーによって　書かれた\nパルデアの大穴の　探検記。\nつたない文字で　オーリムと　書かれている。"
    en: "A record of the expedition that the author, Heath, went\non within the Great Crater of Paldea. The book has the\nname “Sada” written on it in clumsy handwriting."
    fr: "Un récit d’exploration du Cratère de Paldea signé\npar un certain Bruyer. Quelqu’un y a inscrit le nom\n« Olim » d’une écriture maladroite."
    it: "Resoconto della spedizione nella Voragine di Paldea\nredatto da Callugaris. Sul libro c’è scritto \"Olim\" con\ngrafia un po’ maldestra."
    de: "Ein Bericht über eine Expedition im Schlund von Paldea,\nan der der Verfasser Alondo teilnahm. Auf den Einband\nist recht unbeholfen der Name „Antiqua“ gekritzelt."
    es: "Diario de exploración en el que el autor, Eriad, narra sus\nincursiones en el foso de Paldea. Tiene escrito \"Albora\"\ncon una letra descuidada."
    ko: "헤더가 집필한\n팔데아의 대공 탐험기.\n서툰 글씨로 “올림”이라고 쓰여 있다."
    zh_simp: "由海哲撰写的帕底亚巨坑探险记。\n以拙劣的字迹写着“奥琳”二字。"
    zh_trad: "由海哲撰寫的帕底亞巨坑探險記。\n拙劣的字跡勾勒出「奧琳」二字。"
scarlet_book:2:
  names:
    jp_kana: スカーレットブック
    jp_kanji: スカーレットブック
    en: Scarlet Book
    fr: Livre Écarlate
    it: Libro scarlatto
    de: Karmesinbuch
    es: Libro Escarlata
    ko: 스칼렛북
    zh_simp: 朱之书
    zh_trad: 朱之書
  descriptions:
    jp_kana: "オーリム博士と　交換してもらった\nパルデアの大穴の　探検記。\nつたない文字で　オーリムと　書かれている。"
    jp_kanji: "オーリム博士と　交換してもらった\nパルデアの大穴の　探検記。\nつたない文字で　オーリムと　書かれている。"
    en: "A record of an expedition to the Great Crater of Paldea,\ngiven to you by Professor Sada. The book has the name\n“Sada” written on it in clumsy handwriting."
    fr: "Un récit d’exploration du Cratère de Paldea\nque la Professeure Olim vous a donné.\nSon nom y est inscrit d’une écriture maladroite."
    it: "Resoconto della spedizione nella Voragine di Paldea\nottenuto dalla Professoressa Olim. Sul libro c’è scritto\n\"Olim\" con grafia un po’ maldestra."
    de: "Ein Bericht über eine Expedition im Schlund von Paldea,\nden du von Professor Antiqua erhalten hast. Auf den\nEinband wurde der Name „Antiqua“ gekritzelt."
    es: "Diario de exploración de las incursiones en el foso de\nPaldea que obtuviste de manos de la Profesora Albora.\nTiene escrito su nombre con una letra descuidada."
    ko: "올림박사와 교환한\n팔데아의 대공 탐험기.\n서툰 글씨로 “올림”이라고 쓰여 있다."
    zh_simp: "和奥琳博士交换来的\n帕底亚巨坑探险记。\n以拙劣的字迹写着“奥琳”二字。"
    zh_trad: "和奧琳博士交換來的\n帕底亞巨坑探險記。\n拙劣的字跡勾勒出「奧琳」二字。"
scatter_bang:
  names:
    jp_kana: ばりばりだま
    jp_kanji: ばりばりだま
    en: Scatter Bang
    fr: Sachet Pétarade
    it: Scoppiosfera
    de: Knallkugel
    es: Bola Ruidosa
    ko: 팡팡환
    zh_simp: 声弹
    zh_trad: 聲彈
  descriptions:
    jp_kana: "地面に投げつけると\n大きな音を鳴らして\n弱いポケモンを退散させる。"
    jp_kanji: "地面に投げつけると\n大きな音を鳴らして\n弱いポケモンを退散させる。"
    en: "When thrown at the ground, these balls produce a loud\nnoise and scare off low-level Pokémon in the area,\nsending them running."
    fr: "Lorsqu’on le lance au sol, le bruit qu’il provoque fait\nfuir les Pokémon faibles situés à proximité."
    it: "Se lanciata a terra, emette un forte rumore che induce\nalla fuga i Pokémon più deboli."
    de: "Wirfst du diese Kugel auf den Boden, entsteht ein lautes\nGeräusch, das schwache Pokémon verscheucht."
    es: "Provoca un ruido estrepitoso al lanzarla contra el suelo y\nhace que los Pokémon de nivel bajo salgan espantados."
    ko: "땅에 던지면 커다란 소리를 내어\n약한 포켓몬을 달아나게 만든다."
    zh_simp: "丢向地面后会\n发出巨大的声响，\n将弱小的宝可梦赶走。"
    zh_trad: "丟向地面後會\n發出巨大的聲響，\n將弱小的寶可夢趕走。"
scatter_bang:recipe:
  names:
    jp_kana: ばりばりだま
    jp_kanji: ばりばりだま
    en: Scatter Bang
    fr: Sachet Pétarade
    it: Scoppiosfera
    de: Knallkugel
    es: Bola Ruidosa
    ko: 팡팡환
    zh_simp: 声弹
    zh_trad: 聲彈
  descriptions:
    jp_kana: "ばりばりだまのレシピ。　材料は\nバリバリモ×１　タマゼンマイ×１"
    jp_kanji: "ばりばりだまのレシピ。　材料は\nバリバリモ×１　タマゼンマイ×１"
    en: "A recipe for crafting Scatter Bangs from scratch.\nRequired materials: 1 Pop Pod and 1 Caster Fern leaf."
    fr: "Méthode pour Sachet Pétarade. Ressources requises :\n1 Pétaralgue et 1 Feuille Ronde."
    it: "Ricetta per creare una Scoppiosfera. I materiali necessari\nsono 1 Scoppiettalga e 1 Felcetonda."
    de: "Die Anleitung zur Herstellung einer Knallkugel.\nBenötigte Materialien: 1 Kugel Knallmoos und\n1 Rundblatt."
    es: "Receta para crear Bolas Ruidosas. Materiales:\n1 Marimo Ruidoso y 1 Helecho Rizado."
    ko: "팡팡환의 레시피.\n재료: 팡팡마리모×1 둥근고비×1"
    zh_simp: "声弹的材料单。材料是：\n惊声藻×１　弹子萁×１"
    zh_trad: "聲彈的材料單。材料是：\n驚聲藻×１　彈子萁×１"
scatterbug_powder:
  names:
    jp_kana: コフキムシのこな
    jp_kanji: コフキムシのこな
