    jp_kanji: "Ｚパワーの　結晶。\nソルガレオの　メテオドライブを\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Solgaleo’s Sunsteel Strike to a Z-Move."
