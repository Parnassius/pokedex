    it: "Contiene i tuoi dati Pokéathlon. Su questa Scheda\nè registrato il numero di ultimi posti nelle gare."
    de: "Speichert deine Pokéathlon-Rekorde. Die Karte zeigt,\nwie oft du in einer Disziplin den letzten Platz belegt\nhast."
    es: "Contiene los datos del Pokéathlon con el número de\nveces que se ha terminado en última posición en una\ndisciplina."
    ko: "포켓슬론의 기록이 들어 있다.\n경기에서 꼴찌 한\n횟수가 기록된 카드."
