pickle:
  names:
    jp_kana: ピクルススライス
    jp_kanji: ピクルススライス
    en: Pickle
    fr: Cornichon
    it: Sottaceto
    de: Gewürzgurke
    es: Pepinillo
    ko: 피클슬라이스
    zh_simp: 酸黄瓜片
    zh_trad: 酸黃瓜片
  descriptions:
    jp_kana: "酸味が　強い　食材。\nスパイスと　ビネガーから　作られる\n調味液に　野菜を　漬けたもの。"
    jp_kanji: "酸味が　強い　食材。\nスパイスと　ビネガーから　作られる\n調味液に　野菜を　漬けたもの。"
    en: "This very sour ingredient is made by pickling veggies\nin a flavorful brine made from spices and vinegar."
    fr: "Un ingrédient au goût très acide. Il s’agit de petits\nlégumes ayant mariné dans une saumure à base\nd’épices et de vinaigre."
    it: "Un ingrediente molto aspro costituito da verdure\nimmerse in una marinata di aceto e spezie."
    de: "Bei der Herstellung dieser sehr sauren Zutat wird das\nGemüse in einer Lake aus Gewürzen und Essig eingelegt."
    es: "Un ingrediente de sabor muy ácido que se prepara\nencurtiéndolo en una salmuera a base de vinagre y\nespecias."
    ko: "신맛이 강한 식재료.\n스파이스와 비니거로 만든\n조미액에 채소를 절인 것."
    zh_simp: "酸味强烈的食材。\n是通过香料与醋制作的\n调味液腌制蔬菜而成。"
    zh_trad: "酸味強勁的食材。\n將蔬菜浸泡於由香料和醋製作的\n調味液中醃漬而成。"
picnic_set:
  names:
    jp_kana: ピクニックセット
    jp_kanji: ピクニックセット
    en: Picnic Set
    fr: Set de Pique-Nique
    it: Set da picnic
    de: Picknick-Set
    es: Kit de Pícnic
    ko: 피크닉세트
    zh_simp: 野餐组合
    zh_trad: 野餐組合
  descriptions:
    jp_kana: "たくさん　収納できる　バスケットに\nポケモンと　ピクニックを　するための\n道具が　あれこれ　つまっている。"
    jp_kanji: "たくさん　収納できる　バスケットに\nポケモンと　ピクニックを　するための\n道具が　あれこれ　つまっている。"
    en: "A roomy basket packed with all sorts of things for use\nwhen enjoying picnicking with your Pokémon."
    fr: "Un panier rempli de toutes les choses nécessaires\npour faire un bon pique-nique avec ses Pokémon."
    it: "Cestino molto capiente stracolmo di strumenti\nper fare un bel picnic assieme ai Pokémon."
    de: "Ein Korb mit großem Fassungsvermögen, der randvoll\nmit allerlei Dingen gefüllt ist, die man für ein Picknick mit\nseinen Pokémon benötigt."
    es: "Una espaciosa cesta repleta de toda clase de enseres\npara disfrutar de pícnics junto a los Pokémon."
    ko: "잔뜩 수납할 수 있는 바구니에\n포켓몬과 피크닉을 즐길 때 쓰이는\n다양한 도구들이 들어 있다."
    zh_simp: "在能收纳大量物品的野餐篮中，\n塞满了各种用来\n和宝可梦野餐的道具。"
    zh_trad: "收納空間寬敞的野餐籃內，\n裝滿了和寶可夢野餐時\n要使用的各式道具。"
pidgeotite:
  names:
    jp_kana: ピジョットナイト
    jp_kanji: ピジョットナイト
    en: Pidgeotite
    fr: Roucarnagite
    it: Pidgeotite
    de: Taubossnit
    es: Pidgeotita
    ko: 피죤투나이트
    zh_simp: 大比鸟进化石
    zh_trad: 大比鳥進化石
  descriptions:
    jp_kana: "ピジョットに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    jp_kanji: "ピジョットに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Pidgeot hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Roucarnage, elle lui permet\nde méga-évoluer durant un combat."
    it: "Una delle misteriose Megapietre. Data a Pidgeot,\ngli permette di megaevolversi durante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Tauboss getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Pidgeot en combate."
    ko: "피죤투에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让大比鸟携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓大比鳥攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
pidgey_candy:
  names:
    jp_kana: ポッポのアメ
    jp_kanji: ポッポのアメ
    en: Pidgey Candy
    fr: Bonbon Roucool
    it: Caramella Pidgey
    de: Taubsi-Bonbon
    es: Caramelo Pidgey
    ko: 구구의사탕
    zh_simp: 波波的糖果
    zh_trad: 波波的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
pika_pika_pick:
  names:
    jp_kana: ピカピカピック
    jp_kanji: ピカピカピック
    en: Pika-Pika Pick
    fr: Pique Pikapika
    it: Stecchino Pikachu
    de: Pikapika-Pikser
    es: Palillo Pikachu
    ko: 피카피카 픽
    zh_simp: 皮卡丘三明治签
    zh_trad: 皮卡丘三明治籤
  descriptions:
    jp_kana: "ピカチュウが　デザインされた　ピック。\nいつもの顔が　プリントされている。\n耳の部分が　持ちやすいのも　人気の秘密。"
    jp_kanji: "ピカチュウが　デザインされた　ピック。\nいつもの顔が　プリントされている。\n耳の部分が　持ちやすいのも　人気の秘密。"
    en: "A Pick-achu, as it were, sporting Pikachu’s usual\nexpression. It’s easy to grab by the ears, which is part\nof why it’s so popular."
    fr: "Une pique-à-chu, autrement dit : ornée du visage\nadorable d’un Pikachu. Une des raisons de sa popularité\nvient de ses oreilles, par lesquelles on peut la tenir."
    it: "Stecchino a forma di Pikachu, rappresentato con la sua\nsolita espressione. Le orecchie offrono una facile presa,\ncontribuendo alla sua popolarità."
    de: "Ein Pikser im Design von Pikachu mit charakteristischem\nGesichtsausdruck. Die praktische Handhabung dank der\nprägnanten Ohren ist mit ein Grund für seine Beliebtheit."
    es: "Un palillo con forma de Pikachu, tan sonriente como\nsiempre. El secreto de su popularidad reside en lo fácil\nde agarrar que resulta gracias a las orejitas."
    ko: "피카츄 디자인이 들어간 픽.\n평상시 표정이 프린트되어 있다.\n귀 부분이 잡기 편한 것 역시 인기의 비결이다."
    zh_simp: "设计成皮卡丘的签子。\n印着皮卡丘平常的表情。耳朵部分\n方便易拿也是其受欢迎的秘密。"
    zh_trad: "設計成皮卡丘造型的小籤。\n籤上印著牠平時的模樣。\n容易拿取的耳朵也是其廣受歡迎的原因之一。"
pikachu_candy:
  names:
    jp_kana: ピカチュウのアメ
    jp_kanji: ピカチュウのアメ
    en: Pikachu Candy
    fr: Bonbon Pikachu
    it: Caramella Pikachu
    de: Pikachu-Bonbon
    es: Caramelo Pikachu
    ko: 피카츄의사탕
    zh_simp: 皮卡丘的糖果
    zh_trad: 皮卡丘的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
pikachu_cup:
  names:
    jp_kana: ピカチュウカップ
    jp_kanji: ピカチュウカップ
    en: Pikachu Cup
    fr: Tasse Pikachu
    it: Tazza Pikachu
    de: Pikachu-Tasse
    es: Taza Pikachu
    ko: 피카츄 컵
    zh_simp: 皮卡丘水杯
    zh_trad: 皮卡丘水杯
  descriptions:
    jp_kana: "ポケモン好きのための　カップ。\n子供が　飲み物を　元気よく\n飲んでくれるので　親御さんも　大助かり。"
    jp_kanji: "ポケモン好きのための　カップ。\n子供が　飲み物を　元気よく\n飲んでくれるので　親御さんも　大助かり。"
    en: "A cup for big-time Pokémon fans. Kids will happily drink\nout of it, making it a boon to parents."
    fr: "Une tasse pour les fans de Pokémon. Les enfants\ns’en servent avec joie. Elle est donc particulièrement\nappréciée des parents."
    it: "Tazza per amanti dei Pokémon. I bambini mostrano\nun grande entusiasmo nell’usarla, per la gioia\ndei genitori."
    de: "Diese Tasse ist ein absolutes Muss für Pokémon-Fans.\nVor allem Eltern haben Grund zur Freude, denn Kinder\ntrinken ohne zu murren daraus."
    es: "La taza perfecta para los amantes de los Pokémon.\nLos niños beben de ella con muchas ganas, por lo\nque es una de las favoritas de aquellos con hijos."
    ko: "포켓몬 애호가를 위한 컵.\n아이가 음료수를 씩씩하게\n마실 수 있게 해 줘서 부모에게 큰 도움을 준다."
    zh_simp: "为喜欢宝可梦的人而制作的杯子。\n靠这个杯子能让小孩精神饱满地\n乖乖喝东西，可帮父母一个大忙。"
    zh_trad: "為寶可夢愛好者量身打造的水杯。\n它讓小孩子大口大口地喝下飲料，\n家長也因此輕鬆許多。"
pikanium_z:bag:
  names:
    jp_kana: ピカチュウＺ
    jp_kanji: ピカチュウＺ
    en: Pikanium Z
    fr: Pikazélite
    it: Pikacium Z
    de: Pikachium Z
    es: Pikastal Z
    ko: 피카츄Z
    zh_simp: 皮卡丘Ｚ
    zh_trad: 皮卡丘Ｚ
  descriptions:
    jp_kana: "ピカチュウの　ボルテッカーを\n特別な　Ｚワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    jp_kanji: "ピカチュウの　ボルテッカーを\n特別な　Ｚワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nPikachu’s Volt Tackle to a Z-Move."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise le Pikachu qui le tient à transformer\nsa capacité Électacle en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono a Pikachu di trasformare la mossa\nLocomovolt in una mossa Z."
    de: "Kristallisierte Z-Kraft, die Pikachus Attacke\nVolttackle zu einer Z-Attacke aufstuft.\nWird bei Bedarf automatisch vervielfacht."
    es: "Concentra el Poder Z en cristales que permiten\na Pikachu convertir su Placaje Eléctrico en un\nmovimiento Z."
    ko: "피카츄의 볼트태클을\n특별한 Z기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将皮卡丘的伏特攻击\n升级成特殊Ｚ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把皮卡丘的伏特攻擊\n升級為特殊Ｚ招式的Ｚ力量結晶。"
pikanium_z:held:
  names:
    jp_kana: ピカチュウＺ
    jp_kanji: ピカチュウＺ
    en: Pikanium Z
    fr: Pikazélite
    it: Pikacium Z
    de: Pikachium Z
    es: Pikastal Z
    ko: 피카츄Z
    zh_simp: 皮卡丘Ｚ
    zh_trad: 皮卡丘Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　結晶。\nピカチュウの　ボルテッカーを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nピカチュウの　ボルテッカーを\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Pikachu’s Volt Tackle to a Z-Move."
    fr: "Une cristallisation de la Force Z, permettant de\ntransformer la capacité Électacle d’un Pikachu\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare la mossa Locomovolt\ndi Pikachu in una mossa Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft Pikachus\nAttacke Volttackle zu einer Z-Attacke auf."
    es: "Cristal que confiere el Poder Z al movimiento\nPlacaje Eléctrico de Pikachu."
    ko: "Z파워의 결정.\n피카츄의 볼트태클을\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将皮卡丘的伏特攻击\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把皮卡丘的伏特攻擊\n升級為Ｚ招式。"
pikashunium_z:bag:
  names:
    jp_kana: サトピカＺ
    jp_kanji: サトピカＺ
    en: Pikashunium Z
    fr: Pikachazélite
    it: Ashpikacium Z
    de: Ash-Pikachium Z
    es: Ash-Pikastal Z
    ko: 지우피카Z
    zh_simp: 智皮卡Ｚ
    zh_trad: 智皮卡Ｚ
  descriptions:
    jp_kana: "キャップを　かぶった　ピカチュウの\n１０まんボルトを　Ｚワザに　変える\nＺパワーの　結晶を　作りだす。"
    jp_kanji: "キャップを　かぶった　ピカチュウの\n１０まんボルトを　Ｚワザに　変える\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nThunderbolt to a Z-Move when used by a Pikachu\nwearing a cap."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise le Pikachu à casquette qui le tient\nà transformer sa capacité Tonnerre en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono a Pikachu con il berretto di trasformare\nla mossa Fulmine in una mossa Z."
    de: "Kristallisierte Z-Kraft, die die Attacke Donnerblitz\ndes Pikachus mit Kappe zu einer Z-Attacke\naufstuft. Wird bei Bedarf automatisch vervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a los\nPikachu que llevan gorra convertir su Rayo en un\nmovimiento Z."
    ko: "모자를 쓴 피카츄의\n10만볼트를 Z기술로 바꾸는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将戴着帽子的皮卡丘的十万伏特\n升级成特殊Ｚ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把戴著帽子的皮卡丘的十萬伏特\n升級為特殊Ｚ招式的Ｚ力量結晶。"
pikashunium_z:held:
  names:
    jp_kana: サトピカＺ
    jp_kanji: サトピカＺ
    en: Pikashunium Z
    fr: Pikachazélite
    it: Ashpikacium Z
    de: Ash-Pikachium Z
    es: Ash-Pikastal Z
    ko: 지우피카Z
    zh_simp: 智皮卡Ｚ
    zh_trad: 智皮卡Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　結晶。\nキャップを　かぶった　ピカチュウの\n１０まんボルトを　Ｚワザに　変える。"
    jp_kanji: "Ｚパワーの　結晶。\nキャップを　かぶった　ピカチュウの\n１０まんボルトを　Ｚワザに　変える。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Thunderbolt to a Z-Move when used\nby a Pikachu wearing a cap."
    fr: "Une cristallisation de la Force Z, qui autorise\nle Pikachu à casquette qui la tient à transformer\nsa capacité Tonnerre en capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare la mossa Fulmine\ndi Pikachu con il berretto in una mossa Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft die Attacke\nDonnerblitz des Pikachus mit Kappe zu einer\nZ-Attacke auf."
    es: "Cristal que confiere el Poder Z al movimiento Rayo de\nlos Pikachu que llevan gorra."
    ko: "Z파워의 결정.\n모자를 쓴 피카츄의\n10만볼트를 Z기술로 바꾼다."
    zh_simp: "Ｚ力量的结晶。\n会将戴着帽子的皮卡丘的\n十万伏特升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把戴著帽子的皮卡丘的\n十萬伏特升級為Ｚ招式。"
pikipek_feather:
  names:
    jp_kana: ツツケラのはね
    jp_kanji: ツツケラのはね
    en: Pikipek Feather
    fr: Plume de Picassaut
    it: Penna di Pikipek
    de: Peppeck-Feder
    es: Pluma de Pikipek
    ko: 콕코구리의깃털
    zh_simp: 小笃儿的羽毛
    zh_trad: 小篤兒的羽毛
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
pinap_berry:
  names:
    jp_kana: パイルのみ
    jp_kanji: パイルのみ
    en: Pinap Berry
    fr: Baie Nanana
    it: Baccananas
    de: Sananabeere
    es: Baya Pinia
    ko: 파인열매
    zh_simp: 凰梨果
    zh_trad: 凰梨果
  descriptions:
    jp_kana: "たくましさに　磨きを　かけるための\nポロックを　作るとき　使われる。\n黄色の実は　食べると　酸っぱい。"
    jp_kanji: "たくましさに　磨きを　かけるための\nポロックを　作るとき　使われる。\n黄色の実は　食べると　酸っぱい。"
    en: "Used to make Pokéblocks that will enhance Toughness.\nIts yellow flesh is sour if eaten."
    fr: "Une Baie jaune au goût acide, utilisée pour préparer\ndes Pokéblocs permettant d’augmenter la Robustesse\nd’un Pokémon."
    it: "Bacca gialla dal sapore acido usata per creare\nPokémelle che aumentano la Grinta del Pokémon."
    de: "Eine Beerensorte, die als Zutat für Pokériegel\nverwendet wird, welche die Stärke erhöhen.\nIhr gelbes Fruchtfleisch schmeckt säuerlich."
    es: "Se utiliza en la producción de Pokécubos que potencian\nla dureza. Es de color amarillo y sabor ácido."
    ko: "강인함을 연마하기 위한\n포켓몬스넥을 만들 때 사용된다.\n노란색 열매는 먹으면 시다."
    zh_simp: "用于制作宝可方块，\n制作出来的宝可方块可用来打磨强壮。\n黄色的果实尝起来是酸的。"
    zh_trad: "製作用於增進強壯的\n寶可方塊時使用。\n黃色的果實嘗起來是酸的。"
pincurchin_spines:
  names:
    jp_kana: バチンウニのはり
    jp_kanji: バチンウニのはり
    en: Pincurchin Spines
    fr: Épine de Wattapik
    it: Aculeo di Pincurchin
    de: Britzigel-Stachel
    es: Púa de Pincurchin
    ko: 찌르성게의가시
    zh_simp: 啪嚓海胆的针
    zh_trad: 啪嚓海膽的針
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
pineapple:
  names:
    jp_kana: カットパイン
    jp_kanji: カットパイン
    en: Pineapple
    fr: Ananas
    it: Ananas
    de: Ananas
    es: Piña
    ko: 파인애플슬라이스
    zh_simp: 凤梨片
    zh_trad: 鳳梨片
  descriptions:
    jp_kana: "酸味が　強い　食材。\n色も食感も　楽しい　南国の果実。\n食べやすい形に　カットされている。"
    jp_kanji: "酸味が　強い　食材。\n色も食感も　楽しい　南国の果実。\n食べやすい形に　カットされている。"
    en: "This very tart ingredient is a fruit of southern lands,\nand its color and texture are a thrill. It’s been cut into\nchunks to be easily manageable."
    fr: "Un ingrédient au goût très acide. Un fruit tropical dont\nla couleur et les saveurs ravissent petits et grands.\nIl est déjà coupé pour être plus facile à manger."
    it: "Un ingrediente molto aspro. Questo frutto tropicale\ndal colore e dalla consistenza piacevoli viene tagliato\nin pezzi facili da mangiare."
    de: "Als sehr saure Zutat überzeugt diese Südfrucht mit ihrer\nFarbe sowie Textur. Sie ist in mundgerechte Stücke\nzerkleinert."
    es: "Esta fruta de tierras sureñas tiene un bonito color,\nuna textura interesante y un potente sabor ácido.\nCortada en trozos es perfecta en los bocadillos."
    ko: "신맛이 강한 식재료.\n색도 식감도 즐길 수 있는 남쪽 나라의 과일이다.\n먹기 좋은 형태로 잘라져 있다."
    zh_simp: "酸味强烈的食材。\n能让人大饱眼福和口福的南国果实。\n被切成了容易吃的形状。"
    zh_trad: "酸味強勁的食材。\n顏色和口感都讓人心情飛揚的南國果實。\n已被切成容易入口的形狀。"
pineco_husk:
  names:
    jp_kana: クヌギダマのから
    jp_kanji: クヌギダマのから
    en: Pineco Husk
    fr: Écorce de Pomdepik
    it: Guscio di Pineco
    de: Tannza-Schale
    es: Corteza de Pineco
    ko: 피콘의껍데기
    zh_simp: 榛果球的壳
    zh_trad: 榛果球的殼
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
pink_apricorn:
  names:
    jp_kana: ももぼんぐり
    jp_kanji: ももぼんぐり
    en: Pink Apricorn
    fr: Noigrume Rose
    it: Ghicocca rosa
    de: Aprikoko Pink
    es: Bonguri Rosa
    ko: 담홍규토리
    zh_simp: 粉球果
    zh_trad: 粉球果
  descriptions:
    jp_kana: "ももいろの　ぼんぐり。\nあまそうな　いい　においがする。"
    jp_kanji: "ももいろの　ぼんぐり。\nあまそうな　いい　においがする。"
    en: A pink Apricorn. It has a pleasantly sweet scent.
    fr: "Un Noigrume de couleur rose.\nIl dégage un arôme sucré."
    it: Una ghicocca di colore rosa. Emana un profumo dolce.
    de: "Eine pinkfarbene Aprikoko. Sie verströmt einen süßen\nund appetitanregenden Geruch."
    es: Bonguri de color rosa y aroma dulce.
    ko: "담홍색의 규토리.\n달콤한 듯한 좋은 향기가 난다."
    zh_simp: "粉红色的球果。\n有种甜甜的，好闻的香味。"
    zh_trad: "粉紅色的球果。\n有種甜甜的，好聞的香味。"
pink_bottle:
  names:
    jp_kana: ピンクボトル
    jp_kanji: ピンクボトル
    en: Pink Bottle
    fr: Gourde Rose
    it: Borraccia rosa
    de: Pinke Flasche
    es: Termo Rosa
    ko: 핑크 보틀
    zh_simp: 粉红水壶
    zh_trad: 粉紅水壺
  descriptions:
    jp_kana: "ピクニック用の　水筒として　定番の商品。\nシンプルなデザインで　持ち運びやすく\n男女問わず　選ぶ人が　多い。"
    jp_kanji: "ピクニック用の　水筒として　定番の商品。\nシンプルなデザインで　持ち運びやすく\n男女問わず　選ぶ人が　多い。"
    en: "A go-to bottle widely used for drinks at picnics. Its\nsimple design and portability make it popular among all\nsorts of people."
    fr: "Une gourde largement utilisée lors de pique-niques.\nSa forme simple et pratique la rend populaire auprès\nd’un large public."
    it: "Classica borraccia da picnic. Il suo design semplice e\nla sua portabilità la rendono popolare tra persone di\nogni genere."
    de: "Dieser Klassiker unter den Picknickflaschen lässt sich\nleicht transportieren und besticht durch sein schlichtes\nDesign. Deshalb ist diese Flasche allseits beliebt."
    es: "El típico termo para pícnic, con un diseño sencillo\ny práctico que agrada a todo el mundo."
    ko: "피크닉용 보틀의 정석 같은 상품.\n심플한 디자인에 휴대가 간편해서\n남녀 불문하고 고르는 사람이 많다."
    zh_simp: "是用于野餐的水壶中较为大众的商品。\n设计简约，易于携带。\n无论男女都有很多人会选择它。"
    zh_trad: "國民款的野餐用水壺。\n設計簡潔，且容易攜帶，\n因此不分男女廣受青睞。"
pink_chairs:
  names:
    jp_kana: ピンクチェア
    jp_kanji: ピンクチェア
    en: Pink Chairs
    fr: Sièges Roses
    it: Sedie rosa
    de: Pinke Stühle
    es: Sillas Rosas
    ko: 핑크 체어
    zh_simp: 粉红椅子
    zh_trad: 粉紅椅子
  descriptions:
    jp_kana: "ピクニックで　使いやすい　イス。\nピンククロスの　デザインを\nもとに　作ってもらった。"
    jp_kanji: "ピクニックで　使いやすい　イス。\nピンククロスの　デザインを\nもとに　作ってもらった。"
    en: "A set of chairs that are ideal for picnicking. Their design\nwas inspired by the Pink Tablecloth."
    fr: "Des sièges parfaits pour les pique-niques.\nLeur design est inspiré de la Nappe Rose."
    it: "Pratiche sedie, perfette per i picnic, ispirate al design\ndella Tovaglia rosa."
    de: "Diese Stühle sind gut geeignet für Picknicks.\nIhr Design basiert auf dem Pinken Tischtuch."
    es: "Unas sillas ideales para irse de pícnic. Su diseño está\nbasado en el del Mantel Rosa."
    ko: "피크닉에서 사용하기 편한 의자.\n핑크 테이블보의\n디자인을 토대로 만들어졌다."
    zh_simp: "在野餐时很好用的椅子。\n根据粉红桌巾的设计制作而成。"
    zh_trad: "野餐時很好用的椅子。\n根據粉紅桌巾的設計製作而成。"
pink_cup:
  names:
    jp_kana: ピンクカップ
    jp_kanji: ピンクカップ
    en: Pink Cup
    fr: Tasse Rose
    it: Tazza rosa
    de: Pinke Tasse
    es: Taza Rosa
    ko: 핑크 컵
    zh_simp: 粉红水杯
    zh_trad: 粉紅水杯
  descriptions:
    jp_kana: "ピンクボトルと　セット購入される　カップ。\n重ねられないため　収納には　不向きだが\n写真映えを　気にする人に　人気が高い。"
    jp_kanji: "ピンクボトルと　セット購入される　カップ。\n重ねられないため　収納には　不向きだが\n写真映えを　気にする人に　人気が高い。"
    en: "A cup sold with the Pink Bottle. The two don’t stack, so\nthey’re tough to pack—but they look good, so they’re\npopular with those who like to post picnic photos."
    fr: "Une tasse vendue avec la Gourde Rose. Les tasses de\nce set ne s’emboîtent pas et sont donc moins pratiques,\nmais elles rendent bien sur les photos de pique-nique."
    it: "Tazza venduta assieme alla Borraccia rosa.\nNon essendo impilabile non è comoda da riporre,\nma va a ruba tra chi vuole fare delle belle foto."
    de: "Die Tasse wird im Set mit gleichfarbiger Flasche verkauft.\nSie ist nicht stapelbar und somit recht sperrig, doch bei\nLeuten mit einem Faible für schöne Fotos sehr beliebt."
    es: "Esta taza se vende junto al Termo Rosa. No es la opción\nmás cómoda, pues no se puede apilar, pero es bastante\npopular por ser muy fotogénica."
    ko: "핑크 보틀과 세트로 많이 구입하는 컵.\n겹쳐서 쌓을 수 없어서 수납하기에는 불편하나,\n예쁜 사진을 찍고 싶은 사람에게 인기가 많다."
    zh_simp: "与粉红水壶成套购买的杯子。\n因为不能叠放，所以不利于收纳，\n但很受追求拍出精美照片的人欢迎。"
    zh_trad: "和粉紅水壺成套售出的水杯。\n無法堆疊，所以不容易收納，\n但注重拍出美照的人對其愛不釋手。"
pink_nectar:
  names:
    jp_kana: うすもものミツ
    jp_kanji: うすもものミツ
    en: Pink Nectar
    fr: Nectar Rose
    it: Nettare rosa
    de: Rosa Nektar
    es: Néctar Rosa
    ko: 연분홍꿀
    zh_simp: 桃粉色花蜜
    zh_trad: 桃粉色花蜜
  descriptions:
    jp_kana: "うすもも色の　花のミツ。\n特定のポケモンの　姿を　変える。"
    jp_kanji: "うすもも色の　花のミツ。\n特定のポケモンの　姿を　変える。"
    en: "Flower nectar obtained from a pink flower. It changes\nthe form of a certain species of Pokémon."
    fr: "Un nectar de couleur rose qui permet à\nun certain Pokémon de changer d’apparence."
    it: "Nettare di fiori rosa. Fa cambiare forma a una\ndeterminata specie di Pokémon."
    de: "Ein zartrosa Blütennektar. Ein bestimmtes Pokémon kann\ndamit seine Form ändern."
    es: "Néctar de cierta flor rosa, capaz de hacer cambiar de\nforma a una determinada especie de Pokémon."
    ko: "연분홍색 꽃의 꿀.\n특정 포켓몬의 모습을 바꾼다."
    zh_simp: "桃粉色花的花蜜。\n可以改变特定宝可梦的样子。"
    zh_trad: "桃粉色的花蜜。\n可以改變特定寶可夢的樣子。"
pink_petal:
  names:
    jp_kana: ももいろはなびら
    jp_kanji: ももいろはなびら
    en: Pink Petal
    fr: Pétale Rose
    it: Petalo rosa
    de: Rosa Blatt
    es: Pétalo Rosa
    ko: 담홍꽃잎
    zh_simp: 粉红花瓣
    zh_trad: 粉紅花瓣
  descriptions:
    jp_kana: "マツリカの試練で　マツリカから\nもらえる　はなびらの　押し花。\n７種類　集めるのが　目的。"
    jp_kanji: "マツリカの試練で　マツリカから\nもらえる　はなびらの　押し花。\n７種類　集めるのが　目的。"
    en: "A pressed flower petal you receive from Mina\nduring Mina’s trial. The goal is to collect seven\ndifferent kinds of petals."
    fr: "Un pétale pressé qu’Oléa vous a remis lors\nde son Épreuve. Il y en a sept à collectionner."
    it: "Petalo di fiore pressato ottenuto da Rika durante\nla sua prova. L’obiettivo è ricevere sette petali diversi."
    de: "Ein gepresstes Blütenblatt, das man im Rahmen von\nMatsurikas Prüfung von ihr erhält. Ziel ist es,\nsieben verschiedene Blütenblätter zu sammeln."
    es: "Pétalo prensado recibido de manos de Rika durante\nsu prueba. El objetivo es reunir siete distintos."
    ko: "말리화의 시련에서 말리화에게\n받을 수 있는 꽃잎의 압화.\n7종류 모으는 것이 목적."
    zh_simp: "在茉莉的考验中，\n能从茉莉那里得到的干花花瓣。\n目标是集齐７种。"
    zh_trad: "在茉莉的考驗中，\n從茉莉那裡得到的壓花花瓣。\n目標是集滿７種花瓣。"
pink_scarf:
  names:
    jp_kana: ピンクのバンダナ
    jp_kanji: ピンクのバンダナ
    en: Pink Scarf
    fr: Foulard Rose
    it: Fascia rosa
    de: Rosa Schal
    es: Pañuelo Rosa
    ko: 분홍밴드
    zh_simp: 粉红头巾
    zh_trad: 粉紅頭巾
  descriptions:
    jp_kana: "持たせて　コンテストに　参加すると\nそのポケモンは　いつもより\nかわいく　みられる。"
    jp_kanji: "持たせて　コンテストに　参加すると\nそのポケモンは　いつもより\nかわいく　みられる。"
    en: "When a Pokémon holds this during a contest, it looks\neven cuter than usual."
    fr: "Objet à tenir. Augmente la Grâce d’un Pokémon\ndans les concours."
    it: "Strumento da dare a un Pokémon.\nAumenta la Grazia di chi l’indossa in una gara."
    de: "Ein Item zum Tragen. Trainer erhöhen damit in\nWettbewerben die Putzigkeit ihres Pokémon."
    es: "Aumenta la dulzura en los concursos. Debe llevarlo un\nPokémon."
    ko: "지니게 하여 콘테스트에 참가하면\n그 포켓몬은 여느 때보다\n귀엽게 보인다."
    zh_simp: "携带它去参加华丽大赛的\n宝可梦会比平时\n看上去更加可爱。"
    zh_trad: "攜帶它去參加華麗大賽的\n寶可夢會比平時\n看起來更加可愛。"
pink_tablecloth:
  names:
    jp_kana: ピンククロス
    jp_kanji: ピンククロス
    en: Pink Tablecloth
    fr: Nappe Rose
    it: Tovaglia rosa
    de: Pinkes Tischtuch
    es: Mantel Rosa
    ko: 핑크 테이블보
    zh_simp: 粉红桌巾
    zh_trad: 粉紅桌巾
  descriptions:
    jp_kana: "落ち着いた　ピンクカラーの　テーブルクロス。\n肌に優しい　サラリとした　さわり心地で\n食器を　置いても　音を　立てない。"
    jp_kanji: "落ち着いた　ピンクカラーの　テーブルクロス。\n肌に優しい　サラリとした　さわり心地で\n食器を　置いても　音を　立てない。"
    en: "A simple pink tablecloth. It’s smooth and pleasant to\nthe touch, and dishes can be placed on it with hardly\na sound."
    fr: "Une nappe d’une douce couleur rose. Sa texture\nsatinée est agréable au toucher et étouffe le bruit\ndes plats lorsqu’on les pose dessus."
    it: "Tovaglia di un sobrio color rosa. È così liscia e morbida\nal tatto che quando ci poggi le stoviglie non fanno\nrumore."
    de: "Dieses schlichte pinke Tischtuch aus hautfreundlichem,\nglattem Material absorbiert jegliches Geräusch von\nGeschirr, das darauf platziert wird."
    es: "Un mantel de un suave color rosa. Está hecho de un\nmaterial tan sedoso y delicado que hasta absorbe el\nsonido que producen los platos al colocarlos sobre él."
    ko: "차분한 핑크 컬러의 테이블보.\n피부에 자극이 적은 매끈한 재질이며\n식기를 올려놓아도 소리가 나지 않는다."
    zh_simp: "稳重的粉红色桌巾。\n丝柔顺滑亲近肌肤，\n放上餐具也不会发出声音。"
    zh_trad: "以沉穩的粉紅色為質地的桌巾。\n觸感輕柔，如同撫過肌膚一般，\n而且放置餐具時也不會發出聲響。"
pinsir_candy:
  names:
    jp_kana: カイロスのアメ
    jp_kanji: カイロスのアメ
    en: Pinsir Candy
    fr: Bonbon Scarabrute
    it: Caramella Pinsir
    de: Pinsir-Bonbon
    es: Caramelo Pinsir
    ko: 쁘사이저의사탕
    zh_simp: 凯罗斯的糖果
    zh_trad: 凱羅斯的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de cierto Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
pinsirite:
  names:
    jp_kana: カイロスナイト
    jp_kanji: カイロスナイト
    en: Pinsirite
    fr: Scarabruite
    it: Pinsirite
    de: Pinsirnit
    es: Pinsirita
    ko: 쁘사이저나이트
    zh_simp: 凯罗斯进化石
    zh_trad: 凱羅斯進化石
  descriptions:
    jp_kana: "カイロスに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    jp_kanji: "カイロスに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Pinsir hold it, and this stone will enable it to\nMega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Scarabrute, elle lui permet de\nméga-évoluer durant un combat."
    it: "Una delle misteriose Megapietre. Data a Pinsir,\ngli permette di megaevolversi durante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Pinsir getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Pinsir en combate."
    ko: "쁘사이저에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让凯罗斯携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓凱羅斯攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
pixie_plate:
  names:
    jp_kana: せいれいプレート
    jp_kanji: せいれいプレート
    en: Pixie Plate
    fr: Plaque Pixie
    it: Lastraspiritello
    de: Feentafel
    es: Tabla Duende
    ko: 정령플레이트
    zh_simp: 妖精石板
    zh_trad: 妖精石板
  descriptions:
    jp_kana: "フェアリーのタイプの　石盤。\n持たせると　フェアリータイプの\n技の威力が　強まる。"
    jp_kanji: "フェアリーのタイプの　石盤。\n持たせると　フェアリータイプの\n技の威力が　強まる。"
    en: "An item to be held by a Pokémon. This stone tablet is\nimbued with the essence of fairies and boosts the power\nof the holder’s Fairy-type moves."
    fr: "Objet à tenir. Une tablette en pierre augmentant\nla puissance des capacités de type Fée."
    it: "Strumento da dare a un Pokémon. Lastra di pietra che\npotenzia le mosse di tipo Folletto."
    de: "Ein Item zum Tragen. Diese Steintafel verstärkt Attacken\nvom Typ Fee."
