spooky_chairs:
  names:
    jp_kana: うらめしチェア
    jp_kanji: うらめしチェア
    en: Spooky Chairs
    fr: Sièges Hantés
    it: Sedie dispetto
    de: Groll-Stühle
    es: Sillas Espectrales
    ko: 원망 체어
    zh_simp: 鬼祟椅子
    zh_trad: 鬼祟椅子
  descriptions:
    jp_kana: "ピクニックで　使いやすい　イス。\nうらめしクロスの　デザインを\nもとに　作ってもらった。"
    jp_kanji: "ピクニックで　使いやすい　イス。\nうらめしクロスの　デザインを\nもとに　作ってもらった。"
    en: "A set of chairs that are ideal for picnicking. Their design\nwas inspired by the Spooky Tablecloth."
    fr: "Des sièges parfaits pour les pique-niques.\nLeur design est inspiré de la Nappe Hantée."
    it: "Pratiche sedie, perfette per i picnic, ispirate al design\ndella Tovaglia dispetto."
    de: "Diese Stühle sind gut geeignet für Picknicks.\nIhr Design basiert auf dem Groll-Tischtuch."
    es: "Unas sillas ideales para irse de pícnic. Su diseño está\nbasado en el del Mantel Espectral."
    ko: "피크닉에서 사용하기 편한 의자.\n원망 테이블보의\n디자인을 토대로 만들어졌다."
    zh_simp: "在野餐时很好用的椅子。\n根据鬼祟桌巾的设计制作而成。"
    zh_trad: "野餐時很好用的椅子。\n根據鬼祟桌巾的設計製作而成。"
spooky_plate:
  names:
    jp_kana: もののけプレート
    jp_kanji: もののけプレート
    en: Spooky Plate
    fr: Plaque Fantôme
    it: Lastratetra
    de: Spuktafel
    es: Tabla Terror
    ko: 원령플레이트
    zh_simp: 妖怪石板
    zh_trad: 妖怪石板
  descriptions:
    jp_kana: "ゴーストのタイプの　石盤。\n持たせると　ゴーストタイプの\n技の威力が　強まる。"
    jp_kanji: "ゴーストのタイプの　石盤。\n持たせると　ゴーストタイプの\n技の威力が　強まる。"
    en: "An item to be held by a Pokémon. This stone tablet is\nimbued with the essence of ghosts and boosts the power\nof the holder’s Ghost-type moves."
    fr: "Objet à tenir. Une tablette en pierre augmentant\nla puissance des capacités de type Spectre."
    it: "Strumento da dare a un Pokémon. Lastra di pietra che\npotenzia le mosse di tipo Spettro."
    de: "Ein Item zum Tragen. Diese Steintafel verstärkt\nAttacken vom Typ Geist."
    es: "Tabla de piedra que potencia los movimientos de tipo\nFantasma. Debe llevarla un Pokémon."
    ko: "고스트타입의 석판.\n지니게 하면 고스트타입\n기술의 위력이 강해진다."
    zh_simp: "幽灵属性的石板。\n携带后，幽灵属性的\n招式威力就会增强。"
    zh_trad: "幽靈屬性的石板。\n攜帶後，幽靈屬性的\n招式威力就會增強。"
spooky_tablecloth:
  names:
    jp_kana: うらめしクロス
    jp_kanji: うらめしクロス
    en: Spooky Tablecloth
    fr: Nappe Hantée
    it: Tovaglia dispetto
    de: Groll-Tischtuch
    es: Mantel Espectral
    ko: 원망 테이블보
    zh_simp: 鬼祟桌巾
    zh_trad: 鬼祟桌巾
  descriptions:
    jp_kana: "濃紺の生地に　ポケモンの顔が\n浮かびあがる　ポップな　テーブルクロス。\nゴーストタイプ好きの　必須アイテム。"
    jp_kanji: "濃紺の生地に　ポケモンの顔が\n浮かびあがる　ポップな　テーブルクロス。\nゴーストタイプ好きの　必須アイテム。"
    en: "A pop-art-style tablecloth with Pokémon faces floating\nup from the deep nighttime blue. This is a must-have for\nfans of Ghost types."
    fr: "Une nappe pop art sur laquelle des visages de Pokémon\nflottent sur un fond bleu nuit. Un accessoire indispensable\nà tout fan de Pokémon Spectre qui se respecte."
    it: "Tovaglia in stile pop art con delle facce di Pokémon\nche emergono dallo sfondo blu scuro del tessuto.\nUn oggetto irrinunciabile per gli amanti del tipo Spettro."
    de: "Ein Tischtuch im Pop-Art-Design, bei dem die Gesichter\nvon Pokémon mit dem dunkelblauen Stoff verschmelzen.\nEin absolutes Muss für Fans von Geister-Pokémon."
    es: "Un mantel de diseño pop en el que aparecen caras de\nvarios Pokémon sobre un fondo azul oscuro. Perfecto\npara los amantes de los Pokémon de tipo Fantasma."
    ko: "짙은 남색 천에 포켓몬의 얼굴이\n드러나 있는 발랄한 테이블보.\n고스트타입 애호가들의 필수 아이템이다."
    zh_simp: "在海军蓝的布料上浮现出\n宝可梦的脸的时尚桌巾。\n是幽灵属性爱好者必备的道具。"
    zh_trad: "帶有流行風的桌巾，\n深藍色的質地裡浮現出寶可夢的臉。\n幽靈屬性的愛好者絕對不可錯過。"
sport_ball:
  names:
    jp_kana: コンペボール
    jp_kanji: コンペボール
    en: Sport Ball
    fr: Compét’Ball
    it: Gara Ball
    de: Turnierball
    es: Competi Ball
    ko: 컴퍼티션볼
    zh_simp: 竞赛球
    zh_trad: 競賽球
  descriptions:
    jp_kana: "ジョウト地方の　虫捕り大会で\n使われていた　特別なボール。"
    jp_kanji: "ジョウト地方の　虫捕り大会で\n使われていた　特別なボール。"
    en: "A special Poké Ball that was used during the\nBug-Catching Contest in the Johto region."
    fr: "Une Poké Ball spéciale anciennement utilisée\nau Concours de Capture d’insecte de Johto."
    it: "Poké Ball speciale usata in passato nella Gara\nPigliamosche di Johto."
    de: "Ein besonderer Ball, der beim Käferturnier der\nJohto-Region eingesetzt wird."
    es: "Poké Ball especial utilizada en el Concurso de Captura\nde Bichos de la región de Johto."
    ko: "성도지방의 곤충채집 대회에서\n사용되었던 특별한 볼."
    zh_simp: "曾在城都地区的捕虫大赛上使用的\n特殊的球。"
    zh_trad: "曾在城都地區的捕蟲大賽被使用。\n是一種特殊的球。"
sprayduck:
  names:
    jp_kana: コダックじょうろ
    jp_kanji: コダックじょうろ
    en: Sprayduck
    fr: Kwakarrosoir
    it: Sprayduck
    de: Enton-Kanne
    es: Psydugadera
    ko: 고라파덕물뿌리개
    zh_simp: 可达鸭喷壶
    zh_trad: 可達鴨噴壺
  descriptions:
    jp_kana: "水を　かける　道具。\nふかふかのつちに　埋めた　きのみを\nすくすく　育てる。"
    jp_kanji: "水を　かける　道具。\nふかふかのつちに　埋めた　きのみを\nすくすく　育てる。"
    en: "A watering can shaped like a Psyduck. It helps promote\nthe healthy growth of any Berries planted in good, soft\nsoil."
    fr: "Un arrosoir en forme de Psykokwak.\nAide à la croissance des Baies plantées\ndans les sols meubles."
    it: "Annaffiatoio fatto a forma di Psyduck. Favorisce\nla crescita delle bacche piantate nel terreno soffice."
    de: "Eine Gießkanne in Form von Enton. Gieße gepflanzte\nBeeren, damit sie besser wachsen."
    es: "Una regadera con forma de Psyduck. Ayuda a que las\nbayas plantadas en suelo fértil crezcan mejor."
    ko: "물을 주는 도구.\n푹신푹신한 흙에 심은 나무열매를\n쑥쑥 키운다."
    zh_simp: "浇水的道具。\n能让埋在松软土壤里的\n树果快快长大。"
    zh_trad: "澆水的器具。\n能讓埋在鬆軟土壤裡的\n樹果快快長大。"
springy_mushroom:
  names:
    jp_kana: もちもちキノコ
    jp_kanji: もちもちキノコ
    en: Springy Mushroom
    fr: Champi Toumou
    it: Fungo gommoso
    de: Zähpilz
    es: Seta Esponjosa
    ko: 쫄깃쫄깃버섯
    zh_simp: 糯糯菇
    zh_trad: 糯糯菇
  descriptions:
    jp_kana: "大きくて食べごろのキノコ。\n怪獣やドラゴンのようなポケモンの好物で\n投げた場所に引き寄せることができる。"
    jp_kanji: "大きくて食べごろのキノコ。\n怪獣やドラゴンのようなポケモンの好物で\n投げた場所に引き寄せることができる。"
    en: "A large and well-ripened mushroom. It is beloved by the\nmore monstrous Pokémon, as well as dragon Pokémon,\nso they will gather wherever one is thrown."
    fr: "Un gros champignon comestible. Particulièrement\napprécié des Pokémon pareils à des monstres ou\nà des dragons, il les attire là où vous le lancez."
    it: "Grande fungo perfettamente maturo. Molto apprezzato,\ntra gli altri, da Pokémon mostruosi o simili a draghi,\nli attira laddove viene lanciato."
    de: "Ein großer Pilz von perfekter Reife. Monströse sowie\ndrachenähnliche Pokémon lieben ihn besonders und\nlassen sich anlocken, wenn er ihnen zugeworfen wird."
    es: "Seta de gran tamaño perfectamente madura. Adorada\npor Pokémon monstruosos o con atributos de dragón,\nque se verán atraídos allá donde la lances."
    ko: "크고 먹기 적당한 버섯.\n괴수나 드래곤 같은 포켓몬이 좋아해서\n던진 곳으로 유인할 수 있다."
    zh_simp: "硕大而成熟的蘑菇。\n是怪兽类和龙类宝可梦喜爱的食物，\n能吸引它们聚集到投向的地方。"
    zh_trad: "碩大而成熟的蕈菇。\n是怪獸類和龍類寶可夢喜愛的食物，\n能吸引牠們聚集到投向的地方。"
sprinklotad:
  names:
    jp_kana: ハスボーじょうろ
    jp_kanji: ハスボーじょうろ
    en: Sprinklotad
    fr: Nénurrosoir
    it: Irrigalotad
    de: Loturzelkanne
    es: Lotadgadera
    ko: 연꽃몬물뿌리개
    zh_simp: 莲叶童子喷壶
    zh_trad: 蓮葉童子噴壺
  descriptions:
    jp_kana: "水を　かける　道具。\nふかふかのつちに　埋めた\nきのみを　すくすく　育てる。"
    jp_kanji: "水を　かける　道具。\nふかふかのつちに　埋めた\nきのみを　すくすく　育てる。"
    en: "A watering can shaped like a Lotad. It helps\npromote the healthy growth of any Berries planted\nin good, soft soil."
    fr: "Un arrosoir en forme de Nénupiot qui aide\nà la croissance des Baies plantées dans les sols meubles."
    it: "Strumento per annaffiare a forma di Lotad.\nFavorisce la crescita delle bacche piantate\nnel terreno soffice."
    de: "Eine Gießkanne in Form von Loturzel. Gieße gepflanzte\nBeeren, damit sie besser wachsen."
    es: "Una regadera con forma de Lotad. Ayuda a que las\nbayas plantadas en suelo fértil crezcan mejor."
    ko: "물을 주는 도구.\n푹신푹신한 흙에 심은\n나무열매를 쑥쑥 키운다."
    zh_simp: "浇水的道具。\n能让埋在松软土壤里的\n树果快快长大。"
    zh_trad: "澆水的器具。\n能讓埋在鬆軟土壤裡的\n樹果快快長大。"
squall_slate:
  names:
    jp_kana: あらしのせきばん
    jp_kanji: あらしのせきばん
    en: Squall Slate
    fr: Tablette Tempête
    it: Piastra dei venti
    de: Sturmplatte
    es: Losa Tormenta
    ko: 폭풍의석판
    zh_simp: 暴风石板
    zh_trad: 暴風石板
  descriptions:
    jp_kana: "不思議な　力に　あふれる　石板。\nハマナスパークの　嵐の部屋と\n深い　つながりを　感じる。"
    jp_kanji: "不思議な　力に　あふれる　石板。\nハマナスパークの　嵐の部屋と\n深い　つながりを　感じる。"
    en: "A slate overflowing with enigmatic energy. You can feel\na strong connection between it and the Squall Room at\nRamanas Park."
    fr: "Une tablette qui regorge d’une étrange énergie.\nElle semble intimement liée à la Salle de la Tempête\ndu Parc Rosa Rugosa."
    it: "Lastra di pietra che emana una misteriosa energia.\nSembra profondamente connessa alla Stanza dei venti\ndel Parco Rosa Rugosa."
    de: "Eine Platte, die vor rätselhafter Energie strotzt.\nMan kann eine starke Verbindung zwischen ihr und der\nSturmkammer im Hamanasu-Park spüren."
    es: "Una losa rebosante de una misteriosa energía. Parece\nestrechamente relacionada con la Sala de la Tormenta\ndel Parque Hansa."
    ko: "신비한 힘이 넘치는 석판.\n해당화파크의 폭풍의 방과\n깊은 연관이 있는 것 같다."
    zh_simp: "充满了神秘力量的石板。\n感觉它与玫瑰公园的暴风之厅\n有着很深的关联。"
    zh_trad: "充滿神奇力量的石板。\n感覺它和玫瑰公園的暴風之廳\n有很深的關係。"
squawkabilly_feather:
  names:
    jp_kana: イキリンコのはね
    jp_kanji: イキリンコのはね
    en: Squawkabilly Feather
    fr: Plume de Tapatoès
    it: Penna di Squawkabilly
    de: Krawalloro-Feder
    es: Pluma de Squawkabilly
    ko: 시비꼬의깃털
    zh_simp: 怒鹦哥的羽毛
    zh_trad: 怒鸚哥的羽毛
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
squirt_bottle:
  names:
    jp_kana: ゼニガメじょうろ
    jp_kanji: ゼニガメじょうろ
    en: Squirt Bottle
    fr: Carapuce à O
    it: Annaffiatoio
    de: Schiggykanne
    es: Squirgadera
    ko: 꼬부기물뿌리개
    zh_simp: 杰尼龟喷壶
    zh_trad: 傑尼龜噴壺
  descriptions:
    jp_kana: "みずを　かける　道具。\nきのみプランターの　きのみを\nすくすく　育てる。"
    jp_kanji: "みずを　かける　道具。\nきのみプランターの　きのみを\nすくすく　育てる。"
    en: A bottle used for watering plants in the Berry Pots.
    fr: "Un arrosoir qui permet de faire croître rapidement\nles Baies plantées dans le Plante-Baies."
    it: "Strumento che serve a innaffiare. Permette un’ottima\ncrescita delle bacche seminate nel Piantabacche."
    de: "Eine Gießkanne, durch deren Wasser Beeren im\nPflanzset umso rascher wachsen."
    es: "Objeto que contiene agua y se usa para regar las\nbayas del Plantabayas."
    ko: "물을 주는 도구.\n나무열매플랜터의 나무열매를\n쑥쑥 키운다."
    zh_simp: "浇水的道具。\n能让树果种植盆里的\n树果快快长大。"
    zh_trad: "澆水的器具。\n能讓樹果種植盆裡的\n樹果快快長大。"
squirtle_candy:
  names:
    jp_kana: ゼニガメのアメ
    jp_kanji: ゼニガメのアメ
    en: Squirtle Candy
    fr: Bonbon Carapuce
    it: Caramella Squirtle
    de: Schiggy-Bonbon
    es: Caramelo Squirtle
    ko: 꼬부기의사탕
    zh_simp: 杰尼龟的糖果
    zh_trad: 傑尼龜的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
ss_ticket:ss_anne:
  names:
    jp_kana: ふねのチケット
    jp_kanji: ふねのチケット
    en: S.S. Ticket
    fr: Passe Bateau
    it: Biglietto nave
    de: Bootsticket
    es: Ticket del Barco
    ko: 승선티켓
    zh_simp: 船票
    zh_trad: 船票
  descriptions:
    jp_kana: "サント・アンヌ号に　乗るとき\n必要な　船の　チケット。\n船の　絵が　描かれている。"
    jp_kanji: "サント・アンヌ号に　乗るとき\n必要な　船の　チケット。\n船の　絵が　描かれている。"
    en: "The ticket required to board the S.S. Anne.\nIt has a drawing of a ship on it."
    fr: "Un ticket nécessaire pour embarquer à bord\nde L’Océane. Il y a une image du navire dessus."
    it: "Biglietto per salire sulla Motonave Anna.\nC’è disegnata sopra una nave."
    de: "Ein Ticket, das benötigt wird, um an Bord der MS Anne\nzu gehen. Das Schiff ist darauf abgebildet."
    es: "Billete necesario para embarcar en el S. S. Anne. Tiene\ndibujado un barco."
    ko: "상트앙느호에 탈 때\n필요한 승선 티켓.\n배 그림이 그려져 있다."
    zh_simp: "乘坐圣特安努号时所需的船票。\n上面绘有船只的图案。"
    zh_trad: "乘搭聖特安努號時\n所需的船票。\n上面畫了一艘船。"
ss_ticket:ss_aqua:
  names:
    jp_kana: ふねのチケット
    jp_kanji: ふねのチケット
    en: S.S. Ticket
    fr: Passe Bateau
    it: Biglietto nave
    de: Bootsticket
    es: Ticket del Barco
    ko: 승선티켓
    zh_simp: 船票
    zh_trad: 船票
  descriptions:
    jp_kana: "高速船アクア号に　乗るとき\n必要な　船の　チケット。\n船の　絵が　描かれている。"
    jp_kanji: "高速船アクア号に　乗るとき\n必要な　船の　チケット。\n船の　絵が　描かれている。"
    en: "A ticket required for sailing on the high-speed ferry\nS.S. Aqua. It has a drawing of a ship on it."
    fr: "Un ticket nécessaire pour embarquer sur le ferry\nL’Aquaria. Un bateau est dessiné dessus."
    it: "Biglietto per imbarcarsi sulla Motonave Acqua.\nC’è disegnata una nave."
    de: "Ein Ticket, um auf der MS Aqua zu fahren. Eine\nZeichnung der Fähre ist auf dem Ticket zu sehen."
    es: "Billete válido para embarcar en el Ferry S. S. Aqua.\nTiene dibujado un barco."
    ko: "쾌속선 아쿠아호에 탈 때\n필요한 승선티켓.\n배 그림이 그려져 있다."
    zh_simp: "乘坐高速船水流号时所需的船票。\n上面绘有船的图案。"
    zh_trad: "乘坐高速船水流號時\n所需的船票。\n上面繪有船的圖案。"
ss_ticket:ss_tidal:
  names:
    jp_kana: ふねのチケット
    jp_kanji: ふねのチケット
    en: S.S. Ticket
    fr: Passe Bateau
    it: Biglietto nave
    de: Bootsticket
    es: Ticket del Barco
    ko: 승선티켓
    zh_simp: 船票
    zh_trad: 船票
  descriptions:
    jp_kana: "連絡船に\n乗るとき　必要。"
    jp_kanji: "連絡船に\n乗るとき　必要。"
    en: Ticket required for sailing on a ferry.
    fr: Un objet indispensable pour prendre le ferry.
    it: Biglietto necessario per imbarcarsi su un traghetto.
    de: Ein Ticket, mit dem man die Fähre benutzen kann.
    es: Necesario para montar en barcos de línea regular.
    ko: "연락선에\n탈 때 필요하다."
    zh_simp: 乘坐渡船时需要用到。
    zh_trad: "乘坐交通船時\n需要用到。"
stable_mulch:
  names:
    jp_kana: ながながこやし
    jp_kanji: ながながこやし
    en: Stable Mulch
    fr: Fertistable
    it: Fertilsaldo
    de: Stabilmulch
    es: Abono Fijador
    ko: 오래오래비료
    zh_simp: 久久肥
    zh_trad: 久久肥
  descriptions:
    jp_kana: "きのみを　育てるときの　肥料。\nしかし　ホウエン地方の　土には\nまるで　なじまないので　効果が　ない。"
    jp_kanji: "きのみを　育てるときの　肥料。\nしかし　ホウエン地方の　土には\nまるで　なじまないので　効果が　ない。"
    en: "A fertilizer for growing Berries. However, it appears\nto be unsuitable for the soil in the Hoenn region and\nhas no effect."
    fr: "Un engrais à utiliser sur un sol meuble.\nIl n’est cependant pas adapté aux terres de Hoenn\net n’y a aucun effet."
    it: "Fertilizzante usato per coltivare le bacche. Tuttavia,\nnon ha effetto a Hoenn, perché non è adatto al terreno\ndella regione."
    de: "Mulch zur Nutzung auf Beerenfeldern. Durch seine\nUnverträglichkeit mit den Böden in Hoenn bleibt sein\nEinsatz dort ohne Wirkung."
    es: "Un fertilizante usado para el cultivo de bayas. Parece\nque no se asienta bien en el suelo de Hoenn, por lo\nque no tiene efecto en esta región."
    ko: "나무열매를 키울 때 사용하는 비료.\n그러나 호연지방의 흙에는\n전혀 맞지 않기에 효과가 없다."
    zh_simp: "培育树果时的肥料。\n但完全不适合丰缘地区的土壤，\n所以没什么效果。"
    zh_trad: "培育樹果時的肥料。\n但完全不適合豐緣地區的土壤，\n所以沒什麼效果。"
stantler_hair:
  names:
    jp_kana: オドシシのけ
    jp_kanji: オドシシのけ
    en: Stantler Hair
    fr: Poils de Cerfrousse
    it: Pelo di Stantler
    de: Damhirplex-Haar
    es: Pelo de Stantler
    ko: 노라키의털
    zh_simp: 惊角鹿的毛
    zh_trad: 驚角鹿的毛
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
star_piece:
  names:
    jp_kana: ほしのかけら
    jp_kanji: ほしのかけら
    en: Star Piece
    fr: Morceau d’Étoile
    it: Pezzo stella
    de: Sternenstück
    es: Trozo Estrella
    ko: 별의조각
    zh_simp: 星星碎片
    zh_trad: 星星碎片
  descriptions:
    jp_kana: "キラキラと　赤く　光る\nきれいな　宝石のかけら。\nショップで　高く　売れる。"
    jp_kanji: "キラキラと　赤く　光る\nきれいな　宝石のかけら。\nショップで　高く　売れる。"
    en: "A small shard of a beautiful gem that gives off a\ndistinctly red sparkle. It can be sold at a high price\nto shops."
    fr: "Un fragment de gemme qui brille d’un éclat rouge.\nPeut être vendu à bon prix en magasin."
    it: "Frammento rosso acceso di una gemma.\nSi può vendere a un prezzo alto nei negozi."
    de: "Teil eines hübschen Edelsteins, der in rötlicher Farbe\nschimmert. Kann für viel Geld verkauft werden."
    es: "Fragmento de una bonita gema roja que puede\nvenderse a buen precio en las tiendas."
    ko: "반짝반짝 빨갛게 빛나는\n예쁜 보석 조각.\n상점에서 비싸게 팔린다."
    zh_simp: "闪着红光且十分\n美丽的宝石碎片。\n可以在商店高价出售。"
    zh_trad: "閃著紅光且十分\n美麗的寶石碎片。\n可以在商店高價出售。"
star_piece:recipe:
  names:
    jp_kana: ほしのかけら
    jp_kanji: ほしのかけら
    en: Star Piece
    fr: Morceau d’Étoile
    it: Pezzo stella
    de: Sternenstück
    es: Trozo Estrella
    ko: 별의조각
    zh_simp: 星星碎片
    zh_trad: 星星碎片
  descriptions:
    jp_kana: "ほしのかけらのレシピ。　材料は\nあかいかけら×３　あおいかけら×３\nみどりのかけら×３　ほしのすな×１"
    jp_kanji: "ほしのかけらのレシピ。　材料は\nあかいかけら×３　あおいかけら×３\nみどりのかけら×３　ほしのすな×１"
    en: "A recipe for crafting Star Pieces from scratch.\nRequired materials: 3 Red Shards, 3 Blue Shards,\n3 Green Shards, and 1 bag of Stardust."
    fr: "Méthode pour Morceau d’Étoile. Ressources requises :\n3 Tessons Rouges, 3 Tessons Bleus, 3 Tessons Verts\net 1 sac de Poussière Étoile."
    it: "Ricetta per creare un Pezzo stella. I materiali necessari\nsono 3 Cocci rossi, 3 Cocci blu, 3 Cocci verdi\ne 1 sacchetto di Polvostella."
    de: "Die Anleitung zur Herstellung eines Sternenstücks.\nBenötigte Materialien: 3 Purpurstücke, 3 Indigostücke,\n3 Grünstücke und 1 Säckchen Sternenstaub."
    es: "Receta para crear Trozos Estrella. Materiales:\n3 Partes Rojas, 3 Partes Azules, 3 Partes Verdes y\n1 saquito de Polvo Estelar."
    ko: "별의조각의 레시피.\n재료: 빨강조각×3 파랑조각×3\n초록조각×3 별의모래×1"
    zh_simp: "星星碎片的材料单。材料是：\n红色碎片×３　蓝色碎片×３\n绿色碎片×３　星星沙子×１"
    zh_trad: "星星碎片的材料單。材料是：\n紅色碎片×３　藍色碎片×３\n綠色碎片×３　星星沙子×１"
star_sweet:
  names:
    jp_kana: スターアメざいく
    jp_kanji: スターアメざいく
    en: Star Sweet
    fr: Étoile en Sucre
    it: Bonbonstella
    de: Zucker-Stern
    es: Confite Estrella
    ko: 스타사탕공예
    zh_simp: 星星糖饰
    zh_trad: 星星糖飾
  descriptions:
    jp_kana: "スターの形をした　アメ細工。\nマホミルに　持たせてあげると\nくるくる　回って　喜ぶ。"
    jp_kanji: "スターの形をした　アメ細工。\nマホミルに　持たせてあげると\nくるくる　回って　喜ぶ。"
    en: "A star-shaped sweet. When a Milcery holds this, it spins\naround happily."
    fr: "Un bonbon en forme d’étoile.\nQuand on le donne à un Crèmy, il se réjouit en tournant\nsur lui-même."
    it: "Bonbon a forma di stella. Se dato a Milcery,\nil Pokémon farà le piroette per la felicità."
    de: "Zuckerwerk in Form eines Sterns. Gibt man es Hokumil\nzum Tragen, dreht es sich vor Freude im Kreis."
    es: "Figura de caramelo con forma de estrella. Al dárselo a\nMilcery, se pone a girar rebosante de alegría."
    ko: "별 모양의 사탕공예.\n마빌크에게 지니게 하면\n빙빙 돌며 기뻐한다."
    zh_simp: "星星形状的工艺糖果。\n让小仙奶携带的话，\n会高兴地转圈圈。"
    zh_trad: "星星形狀的工藝糖果。\n讓小仙奶攜帶的話，\n牠會高興得轉圈圈。"
stardust:
  names:
    jp_kana: ほしのすな
    jp_kanji: ほしのすな
    en: Stardust
    fr: Poussière Étoile
    it: Polvostella
    de: Sternenstaub
    es: Polvo Estelar
    ko: 별의모래
    zh_simp: 星星沙子
    zh_trad: 星星沙子
  descriptions:
    jp_kana: "てざわりが　サラサラの\n赤くて　きれいな砂。\nショップで　安く　売れる。"
    jp_kanji: "てざわりが　サラサラの\n赤くて　きれいな砂。\nショップで　安く　売れる。"
    en: "Lovely red sand that flows between the fingers with a\nloose, silky feel. It can be sold at a low price to shops."
    fr: "Du sable rouge ravissant, aux grains très fins.\nPeut être vendu à bas prix en magasin."
    it: "Bella sabbia rossa dalla consistenza leggera e farinosa.\nSi può vendere a un prezzo basso nei negozi."
    de: "Schöner, roter Sand, der sich seidenweich anfühlt.\nKann für wenig Geld verkauft werden."
    es: "Bonita arena roja de tacto sedoso que no alcanza un\nbuen precio en las tiendas."
    ko: "감촉이 보슬보슬한\n빨갛고 예쁜 모래.\n상점에서 싸게 팔린다."
    zh_simp: "手感细腻且十分\n美丽的红色沙子。\n可以在商店低价出售。"
    zh_trad: "手感細緻且十分\n美麗的紅色沙子。\n可以在商店低價出售。"
starf_berry:
  names:
    jp_kana: スターのみ
    jp_kanji: スターのみ
    en: Starf Berry
    fr: Baie Frista
    it: Baccambola
    de: Krambobeere
    es: Baya Arabol
    ko: 스타열매
    zh_simp: 星桃果
    zh_trad: 星桃果
  descriptions:
    jp_kana: "ポケモンに　持たせると\nピンチのとき　どれか　１つの\n能力が　ぐーんと　あがる。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　どれか　１つの\n能力が　ぐーんと　あがる。"
    en: "If a Pokémon holds one of these Berries, one of its stats\nwill be sharply boosted should it find itself in a pinch."
    fr: "Tenue, cette Baie augmente beaucoup une des stats\nen cas de besoin."
    it: "Se il Pokémon che ha questa bacca si trova in difficoltà,\nuna delle sue statistiche aumenta di molto."
    de: "Als getragenes Item erhöht diese Beere einen\nStatuswert des Pokémon stark, sobald es in einer\nNotlage steckt."
    es: "Si la lleva un Pokémon, le aumenta mucho una\ncaracterística en un momento de apuro."
    ko: "포켓몬에게 지니게 하면\n위급할 때 능력 중의 하나가\n크게 올라간다."
    zh_simp: "让宝可梦携带后，危机时，\n某一项能力就会大幅提高。"
    zh_trad: "讓寶可夢攜帶後，\n危機時，某一項能力\n就會大幅提高。"
starly_feather:
  names:
    jp_kana: ムックルのはね
    jp_kanji: ムックルのはね
    en: Starly Feather
    fr: Plume d’Étourmi
    it: Penna di Starly
    de: Staralili-Feder
    es: Pluma de Starly
    ko: 찌르꼬의깃털
    zh_simp: 姆克儿的羽毛
    zh_trad: 姆克兒的羽毛
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
staryu_candy:
  names:
    jp_kana: ヒトデマンのアメ
    jp_kanji: ヒトデマンのアメ
    en: Staryu Candy
    fr: Bonbon Stari
    it: Caramella Staryu
    de: Sterndu-Bonbon
    es: Caramelo Staryu
    ko: 별가사리의사탕
    zh_simp: 海星星的糖果
    zh_trad: 海星星的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
stealth_spray:
  names:
    jp_kana: ひそやかスプレー
    jp_kanji: ひそやかスプレー
    en: Stealth Spray
    fr: Solution Furtive
    it: Furtivizzante
    de: Schleichspray
    es: Aerosol Sigilo
    ko: 살금살금스프레이
    zh_simp: 匿声喷雾
    zh_trad: 匿聲噴霧
  descriptions:
    jp_kana: "使うと　少しのあいだ\n自分の足音がしなくなって\n野生のポケモンに気づかれにくくなる。"
    jp_kanji: "使うと　少しのあいだ\n自分の足音がしなくなって\n野生のポケモンに気づかれにくくなる。"
    en: "When used in the field, this spray muffles the sound of\nyour footsteps and makes wild Pokémon less likely to\nnotice you for a short time."
    fr: "Cette solution permet de faire disparaître les bruits de\npas de son utilisateur. Les Pokémon sauvages ont ainsi\nplus de mal à le repérer."
    it: "Strumento che elimina il rumore dei propri passi.\nRende più difficile farsi notare dai Pokémon selvatici\nper un po’ di tempo."
    de: "Dieses Item bewirkt, dass du für kurze Zeit geräuschlos\nläufst und seltener von wilden Pokémon bemerkt wirst."
    es: "Objeto que oculta el ruido de tus pisadas y hace más\ndifícil que los Pokémon salvajes se percaten de tu\npresencia durante un breve período de tiempo."
    ko: "사용하면 잠시 동안 발소리가 나지 않아\n야생 포켓몬에게 들키지 않게 된다."
    zh_simp: "使用后的一小段时间内，\n自己的脚步声将会消失，\n变得不容易被野生宝可梦察觉。"
    zh_trad: "使用後的一小段時間內，\n自己的腳步聲將會消失，\n變得不容易被野生寶可夢察覺。"
stealth_spray:recipe:
  names:
    jp_kana: ひそやかスプレー
    jp_kanji: ひそやかスプレー
    en: Stealth Spray
    fr: Solution Furtive
    it: Furtivizzante
    de: Schleichspray
    es: Aerosol Sigilo
    ko: 살금살금스프레이
    zh_simp: 匿声喷雾
    zh_trad: 匿聲噴霧
  descriptions:
    jp_kana: "ひそやかスプレーのレシピ。　材料は\nポフのみ×１　ムシヨケソウ×３"
    jp_kanji: "ひそやかスプレーのレシピ。　材料は\nポフのみ×１　ムシヨケソウ×３"
    en: "A recipe for crafting Stealth Sprays from scratch.\nRequired materials: 1 Hopo Berry and\n3 Bugwort blooms."
    fr: "Méthode pour Solution Furtive. Ressources requises :\n1 Baie Bouhlon et 3 Plantes Répulsives."
    it: "Ricetta per un Furtivizzante. Richiede 1 Baccaluppo e\n3 fiori di Erba repellente."
    de: "Die Anleitung zur Herstellung eines Schleichsprays.\nBenötigte Materialien: 1 Pfohbeere und 3 Schutzblumen."
    es: "Receta para crear Aerosoles Sigilo. Materiales:\n1 Baya Lupu y 3 Hierbas Repelentes."
    ko: "살금살금스프레이의 레시피.\n재료: 포흐열매×1 벌레회피풀×3"
    zh_simp: "匿声喷雾的材料单。材料是：\n花啤果×１　除虫草×３"
    zh_trad: "匿聲噴霧的材料單。材料是：\n花啤果×１　除蟲草×３"
steel_bottle_b:
  names:
    jp_kana: Bステンレスボトル
    jp_kanji: Bステンレスボトル
    en: Steel Bottle (B)
    fr: Gourde Inox (Bleu)
    it: Borraccia inox B
    de: Edelstahlflasche (B)
    es: Termo Metal Azul
    ko: B 스테인리스 보틀
    zh_simp: 蓝纹不锈钢水壶
    zh_trad: 藍紋不鏽鋼水壺
  descriptions:
    jp_kana: "キャンプにも　使われる　定番の水筒。\n熱を通しにくい　ステンレスなので\n優れた保温と　保冷機能を　ほこる。"
    jp_kanji: "キャンプにも　使われる　定番の水筒。\n熱を通しにくい　ステンレスなので\n優れた保温と　保冷機能を　ほこる。"
    en: "A go-to bottle sometimes used while camping. The\nstainless steel keeps the temperature inside steady,\nmaking it great for keeping drinks hot or cold."
    fr: "Une gourde parfois utilisée pour faire du camping.\nL’acier inoxydable isole son contenu et lui permet de\ngarder vos boissons chaudes ou froides à température."
    it: "Borraccia classica usata anche per il campeggio.\nRealizzata in acciaio inox dall’elevata capacità\ntermoisolante, mantiene bene sia il caldo che il freddo."
    de: "Diese klassische Trinkflasche eignet sich auch fürs\nCamping. Ihr wärmedämmender Edelstahl verlangsamt\ndie Abkühlung oder Erwärmung von Getränken merklich."
    es: "Este termo resulta útil tanto en pícnics como acampadas,\npues conserva muy bien la temperatura en su interior\ngracias al acero inoxidable aislante del que está hecho."
    ko: "캠프에도 사용하는 정석적인 보틀.\n열이 잘 통하지 않는 스테인리스 소재라\n보온 및 보냉 성능이 뛰어나다."
    zh_simp: "在露营时也会使用到的标准款水壶。\n以不易导热的不锈钢制成，\n具备极佳的保温保冷功能。"
    zh_trad: "在露營時也能使用的標準款水壺。\n以不易導熱的不銹鋼製成，\n具備優秀的保溫和保冷效果。"
steel_bottle_r:
  names:
    jp_kana: Rステンレスボトル
    jp_kanji: Rステンレスボトル
    en: Steel Bottle (R)
    fr: Gourde Inox (Rouge)
    it: Borraccia inox R
    de: Edelstahlflasche (R)
    es: Termo Metal Rojo
    ko: R 스테인리스 보틀
    zh_simp: 红纹不锈钢水壶
    zh_trad: 紅紋不鏽鋼水壺
  descriptions:
