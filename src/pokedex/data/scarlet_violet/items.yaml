    jp_kana: おちゃ
    jp_kanji: おちゃ
    en: Tea
    fr: Thé
    it: Tè
    de: Tee
    es: Té
    ko: 차
    zh_simp: 茶
    zh_trad: 茶
  descriptions:
    jp_kana: "すこし　苦くて\n芳ばしい香りの　お茶。\nかわいた喉が　うるおう。"
    jp_kanji: "すこし　苦くて\n芳ばしい香りの　お茶。\nかわいた喉が　うるおう。"
    en: "Aromatic tea that has a slightly bitter taste.\nIt soothes a dry throat."
    fr: "Un thé aromatique légèrement amer.\nIl a des vertus désaltérantes."
    it: "Un tè fragrante dal sapore amarognolo.\nMolto dissetante."
    de: "Ein aromatischer Tee mit leicht bitterem Geschmack.\nGenau das Richtige, um den Durst zu stillen."
    es: "Un aromático té de sabor ligeramente amargo que\nresulta ideal para aplacar la sed."
    ko: "약간 씁쓸하고\n구수한 향기가 나는 차.\n말랐던 목이 촉촉해진다."
    zh_simp: "有一点点苦，\n却又芬芳宜人的香茶。\n抿一口，清咽润喉。"
    zh_trad: "散發著撲鼻芳香，\n喝起來有點苦澀的茶。\n能滋潤乾渴的喉嚨。"
teal_mask:
  names:
    jp_kana: みどりのめん
    jp_kanji: みどりのめん
    en: Teal Mask
    fr: Masque Turquoise
    it: Maschera Turchese
    de: Türkisgrüne Maske
    es: Máscara Turquesa
    ko: 벽록의가면
    zh_simp: 碧草面具
    zh_trad: 碧草面具
  descriptions:
    jp_kana: "鬼の顔を　模した　碧のお面。\nオモテ祭りで　出会った子が\n階段で　落としたのを　拾った。"
    jp_kanji: "鬼の顔を　模した　碧のお面。\nオモテ祭りで　出会った子が\n階段で　落としたのを　拾った。"
    en: "A teal mask patterned after the face of an ogre.\nOgerpon dropped it while fleeing up the stairs after\nvisiting the Festival of Masks."
    fr: "Un masque turquoise à l’effigie du Monstre, qu’un être\nmystérieux a laissé tomber dans un escalier pendant\nla Fête des Visages, et que vous avez ramassé."
    it: "Una maschera turchese che raffigura il viso di un orco.\nL’hai raccolta dopo che qualcuno incontrato alla Festa\ndelle maschere l’ha fatta cadere giù per le scale."
    de: "Eine türkisgrüne Maske mit dem Gesicht eines Oni.\nDu hast sie aufgehoben, nachdem jemand sie während\ndes Maskenfests auf einer Treppe verloren hatte."
    es: "Máscara turquesa con la cara de un ogro. La recogiste\ndespués de que se le cayese por las escaleras al\nPokémon que visteis en el Festival de Máscaras."
    ko: "도깨비의 얼굴을 본뜬 초록색 가면.\n가면 축제에서 만난 아이가\n계단에서 떨어뜨린 것을 주웠다."
    zh_simp: "模仿鬼的脸制成的绿色面具。\n面具是捡到的，在掩面祭\n遇到的孩子把它掉在了台阶上。"
    zh_trad: "以鬼的臉為造型的綠色面具。\n在掩面祭遇到的孩子把它\n遺落在樓梯上。因此就撿來了。"
teal_style_card:
  names:
    jp_kana: おしゃれカードみどり
    jp_kanji: おしゃれカードみどり
    en: Teal Style Card
    fr: Carte Élégance Verte
    it: Tessera chic verde
    de: Grüne Style-Karte
    es: Tarjeta Chic Verde
    ko: 멋쟁이카드 그린
    zh_simp: 碧之时尚名人卡
    zh_trad: 碧之時尚名人卡
  descriptions:
    jp_kana: "持っていると　ブティックで　買える\n品物が　増える。　ヘアサロンでは\n選べる　髪型が　増える　カード。"
    jp_kanji: "持っていると　ブティックで　買える\n品物が　増える。　ヘアサロンでは\n選べる　髪型が　増える　カード。"
    en: "Having one of these cards increases the selection\navailable to you in boutiques and hair salons."
    fr: "Une carte permettant d’accéder à un plus vaste choix\nd’articles dans les boutiques chics et à davantage\nde coupes de cheveux dans les salons de coiffure."
    it: "Una tessera che amplia la scelta di acconciature\ndisponibili nei saloni di bellezza e di articoli\nacquistabili nei negozi di vestiti."
    de: "Wer diese Karte bei sich trägt, erhält in Boutiquen\nund Friseursalons eine größere Auswahl."
    es: "Una tarjeta que aumenta la selección de artículos\ndisponibles en las tiendas y permite elegir entre una\nmayor variedad de peinados en las peluquerías."
    ko: "지니고 있으면 부티크에서 살 수 있는\n품목이 늘어나고, 헤어살롱에서는\n고를 수 있는 헤어스타일이 늘어나는 카드."
    zh_simp: "拥有后，在时装店可以买到的物品\n和在美发沙龙可以选择的发型\n都会有所增加的卡片。"
    zh_trad: "擁有這張卡，就能在時裝店買到\n更多商品。到美髮沙龍時，\n也能有更多樣化的髮型選項。"
tectonic_slate:
  names:
    jp_kana: たいりくのせきばん
    jp_kanji: たいりくのせきばん
    en: Tectonic Slate
    fr: Tablette Continents
    it: Piastra delle terre
    de: Kontinentplatte
    es: Losa Tierra
    ko: 대륙의석판
    zh_simp: 大陆石板
    zh_trad: 大陸石板
  descriptions:
    jp_kana: "不思議な　力に　あふれる　石板。\nハマナスパークの　大陸の部屋と\n深い　つながりを　感じる。"
    jp_kanji: "不思議な　力に　あふれる　石板。\nハマナスパークの　大陸の部屋と\n深い　つながりを　感じる。"
    en: "A slate overflowing with enigmatic energy. You can feel\na strong connection between it and the Tectonic Room\nat Ramanas Park."
    fr: "Une tablette qui regorge d’une étrange énergie.\nElle semble intimement liée à la Salle des Continents\ndu Parc Rosa Rugosa."
    it: "Lastra di pietra che emana una misteriosa energia.\nSembra profondamente connessa alla Stanza delle terre\ndel Parco Rosa Rugosa."
    de: "Eine Platte, die vor rätselhafter Energie strotzt.\nMan kann eine starke Verbindung zwischen ihr und der\nKontinentkammer im Hamanasu-Park spüren."
    es: "Una losa rebosante de una misteriosa energía. Parece\nestrechamente relacionada con la Sala de la Tierra del\nParque Hansa."
    ko: "신비한 힘이 넘치는 석판.\n해당화파크의 대륙의 방과\n깊은 연관이 있는 것 같다."
    zh_simp: "充满了神秘力量的石板。\n感觉它与玫瑰公园的大陆之厅\n有着很深的关联。"
    zh_trad: "充滿神奇力量的石板。\n感覺它和玫瑰公園的大陸之廳\n有很深的關係。"
teddiursa_claw:
  names:
    jp_kana: ヒメグマのツメ
    jp_kanji: ヒメグマのツメ
    en: Teddiursa Claw
    fr: Griffe de Teddiursa
    it: Artiglio di Teddiursa
    de: Teddiursa-Kralle
    es: Garra de Teddiursa
    ko: 깜지곰의손톱
    zh_simp: 熊宝宝的爪子
    zh_trad: 熊寶寶的爪子
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
tempting_charm_b:
  names:
    jp_kana: みがわりおまもり２
    jp_kanji: みがわりおまもり２
    en: Tempting Charm B
    fr: Remplamulette 2
    it: Amuleto Sostituto 2
    de: Wahrungstalisman 2
    es: Amuleto Sustituto 2
    ko: 대타부적2
    zh_simp: 替身护符２
    zh_trad: 替身護符２
  descriptions:
    jp_kana: "気を失ったとき　なぜか他の道具よりも\n先に消えてしまう不思議なおまもり。\n色が５種類あるうちのひとつ。"
    jp_kanji: "気を失ったとき　なぜか他の道具よりも\n先に消えてしまう不思議なおまもり。\n色が５種類あるうちのひとつ。"
    en: "A mysterious charm that tends to be lost before any\nother item when you faint in the field. This type of charm\ncomes in five different colors."
    fr: "Pour une raison inconnue, cette mystérieuse amulette\nest l’objet qui disparaît en priorité lorsque vous perdez\nconnaissance. Elle existe en cinq couleurs différentes."
    it: "Misterioso amuleto che, per qualche ragione, svanisce\nprima di qualsiasi altro strumento se chi lo possiede\nsviene. Ne esistono di cinque colori differenti."
    de: "Ein mysteriöser Talisman, der unerklärlicherweise vor\nallen anderen Items verschwindet, wenn du ohnmächtig\nwirst. Dies ist eine von fünf Farbvarianten."
    es: "Extraño amuleto que desaparece antes que tus demás\nposesiones cuando pierdes el conocimiento. Este es uno\nde los cinco colores que existen."
    ko: "정신을 잃었을 때, 어째선지 다른 도구보다도\n먼저 사라져 버리는 신비한 부적.\n색이 다른 5종류 중 하나."
    zh_simp: "不可思议的护符。在人昏倒时，\n不知为何会比其他道具更先消失。\n是５种颜色的护符中的一种。"
    zh_trad: "不可思議的護符。在人昏倒時，\n不知為何會比其他道具更先消失。\n是５種顏色的護符中的一種。"
