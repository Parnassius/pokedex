    fr: Nappe Tartan Bleue
    it: Tovaglia a quadri viola
    de: Blaukaro-Tischtuch
    es: Mantel Cuadros Azul
    ko: 블루 체크 테이블보
    zh_simp: 蓝色格子桌巾
    zh_trad: 藍色格子桌巾
  descriptions:
    jp_kana: "厚手の生地で　丈夫な　テーブルクロス。\nおだやかな青色の　チェック柄で\n食卓を　さわやかに　変身させる。"
    jp_kanji: "厚手の生地で　丈夫な　テーブルクロス。\nおだやかな青色の　チェック柄で\n食卓を　さわやかに　変身させる。"
    en: "A sturdy tablecloth made of thick fabric. The gentle\nblue plaid gives a table a crisp look."
    fr: "Une nappe résistante coupée dans un tissu épais.\nLe motif bleu à carreaux reposant apporte\nde la douceur à n’importe quelle table."
    it: "Tovaglia robusta realizzata in tessuto spesso. Il suo\nmotivo a scacchi di un bel viola delicato trasforma\nla tavola donandole serenità."
    de: "Ein robustes Tischtuch aus dickem Stoff. Mit seinem\nsanften blauen Karomuster zaubert es ein gewisses\nGefühl von Ruhe auf den Esstisch."
    es: "Hecho de un material grueso y resistente, este mantel a\ncuadros de un suave color azul aporta una sensación de\ncalma a cualquier mesa."
    ko: "두꺼운 천으로 만든 튼튼한 테이블보.\n평온한 파란색 체크무늬로\n식탁을 시원하게 만들어 준다."
    zh_simp: "以厚重布料制作的结实桌巾。\n其宁静温和的蓝色格子图案，\n能让食桌摇身变得神清气爽。"
    zh_trad: "質地厚實，牢固耐用的桌巾。\n象徵安穩的藍色格紋\n為餐桌帶來清新的氣息。"
