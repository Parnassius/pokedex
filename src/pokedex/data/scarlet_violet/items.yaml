    jp_kanji: タテトプスのツメ
    en: Shieldon Claw
    fr: Ongle de Dinoclier
    it: Artiglio di Shieldon
    de: Schilterus-Kralle
    es: Garra de Shieldon
    ko: 방패톱스의발톱
    zh_simp: 盾甲龙的爪子
    zh_trad: 盾甲龍的爪子
  descriptions:
