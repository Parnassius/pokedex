    ko: "크리티컬커터의 레시피.\n재료: 급소버섯×2 스위트러플×1"
    zh_simp: "要害攻击的材料单。材料是：\n要害松露×２　甜松露×１"
    zh_trad: "要害攻擊的材料單。材料是：\n要害松露×２　甜松露×１"
