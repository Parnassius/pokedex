acro_bike:
  names:
    jp_kana: ダートじてんしゃ
    jp_kanji: ダートじてんしゃ
    en: Acro Bike
    fr: Vélo Cross
    it: Bici da cross
    de: Kunstrad
    es: Bici Acrobática
    ko: 더트자전거
    zh_simp: 越野自行车
    zh_trad: 越野自行車
  descriptions:
    jp_kana: "ジャンプや　ウィリーの\nアクションが　できる\nおりたたみの　自転車。"
    jp_kanji: "ジャンプや　ウィリーの\nアクションが　できる\nおりたたみの　自転車。"
    en: "This folding bike allows you to perform actions\nsuch as wheelies and bunny hops."
    fr: "Un vélo pliable qui permet de bondir et de rouler\nsur la roue arrière."
    it: "Bici pieghevole con cui si possono fare acrobazie\ncome salti o impennate."
    de: "Ein Klapprad, mit dem du Kunststücke wie Sprünge\noder Wheelies ausführen kannst."
    es: "Bicicleta plegable capaz de correr sobre una sola rueda,\nrealizar saltos y otras acrobacias."
    ko: "점프나 윌리 액션을\n할 수 있는\n접이식 자전거다."
    zh_simp: "能做出跳跃或抬前轮动作的\n折叠式自行车。"
    zh_trad: "能做出跳躍或抬前輪動作的\n折疊式自行車。"
adamant_crystal:
  names:
    jp_kana: だいこんごうだま
    jp_kanji: だいこんごうだま
    en: Adamant Crystal
    fr: Globe Adamant
    it: Adamasferoide
    de: Adamantkristall
    es: Gran Diamansfera
    ko: 큰금강옥
    zh_simp: 大金刚宝玉
    zh_trad: 大金剛寶玉
  descriptions:
    jp_kana: "ディアルガに　持たせると\n力がみなぎり　姿が変わる\n光り輝く　大きな珠。"
    jp_kanji: "ディアルガに　持たせると\n力がみなぎり　姿が変わる\n光り輝く　大きな珠。"
    en: "An item to be held by Dialga. This large, glowing gem\nwells with power and allows the Pokémon to change\nform."
    fr: "Ce grand cristal brillant débordant de puissance\npermet à Dialga de changer de forme quand\ncelui-ci le tient."
    it: "Grande cristallo scintillante che, se dato a Dialga,\nlo riempie di energia e gli permette di cambiare forma."
    de: "Ein Item, das von Dialga getragen werden kann.\nDurch diesen großen, funkelnden Kristall wird es von\nKraft erfüllt und nimmt eine andere Form an."
    es: "Gema brillante de gran tamaño que, cuando la lleva\nDialga, lo imbuye de poder y le permite cambiar de\nforma."
    ko: "눈부시게 빛나는 큰 구슬.\n디아루가에게 지니게 하면\n힘이 넘쳐서 모습이 바뀐다."
    zh_simp: "光辉灿烂的大珠子。\n让帝牙卢卡携带后，\n能使之力量高涨并改变形态。"
    zh_trad: "光輝燦爛的大珠子。\n讓帝牙盧卡攜帶的話，\n能使之力量高漲並改變形態。"
adamant_mint:
  names:
    jp_kana: いじっぱりミント
    jp_kanji: いじっぱりミント
    en: Adamant Mint
    fr: Aromate Rigide
    it: Menta Decisa
    de: Hart-Minze
    es: Menta Firme
    ko: 고집민트
    zh_simp: 固执薄荷
    zh_trad: 固執薄荷
  descriptions:
    jp_kana: "ポケモンに　香りを　かがせると\n攻撃が　上がりやすく　なるが\n特攻は　上がりにくくなる　ミント。"
    jp_kanji: "ポケモンに　香りを　かがせると\n攻撃が　上がりやすく　なるが\n特攻は　上がりにくくなる　ミント。"
    en: "Having a Pokémon smell this mint can make its Attack\nstat grow stronger. However, its Sp. Atk stat may suffer."
    fr: "Si un Pokémon hume cet aromate, son Attaque\nmontera plus facilement, mais son Attaque Spéciale\nse développera plus lentement."
    it: "Quando un Pokémon ne sente il profumo, il suo Attacco\naumenta più facilmente a scapito dell’Attacco Speciale."
    de: "Lässt man ein Pokémon an dieser Minze schnuppern,\nsteigt sein Angriff schneller, aber sein Spezial-Angriff\numso langsamer."
    es: "Cuando un Pokémon percibe su aroma, aumenta con\nmás facilidad su Ataque, en detrimento de su Ataque\nEspecial."
    ko: "포켓몬에게 향기를 맡게 하면\n공격이 오르기 쉬워지지만\n특수공격이 오르기 어려워지는 민트."
    zh_simp: "宝可梦闻了这种薄荷之后，\n会令攻击容易提高，\n而特攻则难以提高。"
    zh_trad: "讓寶可夢聞這種薄荷的氣味，\n會令攻擊變得容易提高，\n但特攻則難以提高。"
adamant_orb:
  names:
    jp_kana: こんごうだま
    jp_kanji: こんごうだま
    en: Adamant Orb
    fr: Orbe Adamant
    it: Adamasfera
    de: Adamant-Orb
    es: Diamansfera
    ko: 금강옥
    zh_simp: 金刚宝珠
    zh_trad: 金剛寶珠
  descriptions:
    jp_kana: "ディアルガに　持たせると　ドラゴンと\nはがねタイプの　技の威力が\nあがる　光り輝く　珠。"
    jp_kanji: "ディアルガに　持たせると　ドラゴンと\nはがねタイプの　技の威力が\nあがる　光り輝く　珠。"
    en: "A brightly shining gem to be held by Dialga. It boosts\nthe power of Dialga’s Dragon- and Steel-type moves."
    fr: "Un orbe très brillant qui augmente la puissance\ndes capacités de types Dragon et Acier\ns’il est porté par Dialga."
    it: "Sfera molto luminosa da dare a Dialga.\nPotenzia le mosse di tipo Drago e Acciaio."
    de: "Ein Item, das von Dialga getragen werden kann.\nDieser hell strahlende Orb verstärkt Attacken vom Typ\nDrache und Stahl."
    es: "Una esfera brillante que potencia los movimientos de\ntipo Acero y Dragón. Debe llevarla Dialga."
    ko: "디아루가에게 지니게 하면 드래곤과\n강철타입 기술의 위력이 올라가는\n반짝반짝 빛나는 구슬."
    zh_simp: "让帝牙卢卡携带的话，\n龙和钢属性的招式威力就会提高。\n散发着光辉的宝珠。"
    zh_trad: "讓帝牙盧卡攜帶的話，\n龍和鋼屬性的招式威力就會提高。\n散發著光輝的寶珠。"
adrenaline_orb:
  names:
    jp_kana: ビビリだま
    jp_kanji: ビビリだま
    en: Adrenaline Orb
    fr: Orbe Frousse
    it: Fifasfera
    de: Zitter-Orb
    es: Nerviosfera
    ko: 주눅구슬
    zh_simp: 胆怯球
    zh_trad: 膽怯球
  descriptions:
    jp_kana: "ポケモンに　持たせると\nいかくを　受けた時\nすばやさが　上がる。"
    jp_kanji: "ポケモンに　持たせると\nいかくを　受けた時\nすばやさが　上がる。"
    en: "An item to be held by a Pokémon. This orb boosts the\nSpeed stat if the holder is intimidated."
    fr: "Objet à tenir. Si le porteur est touché par le talent\nIntimidation, sa Vitesse augmente."
    it: "Data a un Pokémon, aumenta la Velocità se subisce\nPrepotenza."
    de: "Als getragenes Item erhöht er bei Pokémon, die unter\ndem Einfluss von Bedroher stehen, die Initiative."
    es: "Aumenta la Velocidad del portador si se siente\nintimidado."
    ko: "포켓몬에게 지니게 하면\n위협을 받았을 때\n스피드가 올라간다."
    zh_simp: "让宝可梦携带后，\n在受到威吓时速度会提高。"
    zh_trad: "讓寶可夢攜帶後，\n受到威嚇時速度就會提高。"
adventure_guide:
  names:
    jp_kana: たんけんこころえ
    jp_kanji: たんけんこころえ
    en: Adventure Guide
    fr: ABC Aventure
    it: Guida avventura
    de: Abenteuerfibel
    es: Guía de Aventura
    ko: 탐험수칙
    zh_simp: 探险心得
    zh_trad: 探險心得
  descriptions:
    jp_kana: "トレーナーが　旅を　するときの\nアドバイスが　まとめられていく\n不思議で　便利な　手帳。"
    jp_kanji: "トレーナーが　旅を　するときの\nアドバイスが　まとめられていく\n不思議で　便利な　手帳。"
    en: "A mysterious and convenient notebook that contains\nall the advice a Trainer receives out on an adventure."
    fr: "Un mystérieux carnet très utile dans lequel sont notés\nles conseils qu’un Dresseur ou une Dresseuse reçoit\nau cours de ses aventures."
    it: "Utile ma misterioso taccuino che raccoglie consigli\nper gli Allenatori in viaggio."
    de: "Ein mysteriöses und praktisches Notizbuch, in welchem\nnützliche Informationen zu allen Themen, die für einen\nTrainer auf Reisen von Belang sind, verzeichnet werden."
    es: "Una extraña y práctica libreta usada para compilar\nconsejos y pistas útiles para la aventura de todo\nEntrenador."
    ko: "트레이너가 여행할 때 필요한\n어드바이스가 정리되는\n신기하고도 편리한 수첩."
    zh_simp: "一种神奇便利的手册。\n会汇总训练家在旅行时\n所需要的各种建议。"
    zh_trad: "一種神奇的好用手冊。\n會整合訓練家在旅途中\n需要的各種建議。"
aerodactyl_candy:
  names:
    jp_kana: プテラのアメ
    jp_kanji: プテラのアメ
    en: Aerodactyl Candy
    fr: Bonbon Ptéra
    it: Caramella Aerodactyl
    de: Aerodactyl-Bonbon
    es: Caramelo Aerodactyl
    ko: 프테라의사탕
    zh_simp: 化石翼龙的糖果
    zh_trad: 化石翼龍的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de cierto Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
aerodactylite:
  names:
    jp_kana: プテラナイト
    jp_kanji: プテラナイト
    en: Aerodactylite
    fr: Ptéraïte
    it: Aerodactylite
    de: Aerodactylonit
    es: Aerodactylita
    ko: 프테라나이트
    zh_simp: 化石翼龙进化石
    zh_trad: 化石翼龍進化石
  descriptions:
    jp_kana: "プテラに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    jp_kanji: "プテラに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Aerodactyl hold it, and this stone will enable\nit to Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Ptéra, elle lui permet de\nméga-évoluer durant un combat."
    it: "Una delle misteriose Megapietre. Data ad Aerodactyl,\ngli permette di megaevolversi durante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Aerodactyl getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Aerodactyl en combate."
    ko: "프테라에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让化石翼龙携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓化石翼龍攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
aggronite:
  names:
    jp_kana: ボスゴドラナイト
    jp_kanji: ボスゴドラナイト
    en: Aggronite
    fr: Galekingite
    it: Aggronite
    de: Stollossnit
    es: Aggronita
    ko: 보스로라나이트
    zh_simp: 波士可多拉进化石
    zh_trad: 波士可多拉進化石
  descriptions:
    jp_kana: "ボスゴドラに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    jp_kanji: "ボスゴドラに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Aggron hold it, and this stone will enable it to\nMega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Galeking, elle lui permet de\nméga-évoluer durant un combat."
    it: "Una delle misteriose Megapietre. Data ad Aggron,\ngli permette di megaevolversi durante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Stolloss getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Aggron en combate."
    ko: "보스로라에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让波士可多拉携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓波士可多拉攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
aguav_berry:
  names:
    jp_kana: バンジのみ
    jp_kanji: バンジのみ
    en: Aguav Berry
    fr: Baie Gowav
    it: Baccaguava
    de: Gauvebeere
    es: Baya Guaya
    ko: 아바열매
    zh_simp: 乐芭果
    zh_trad: 樂芭果
  descriptions:
    jp_kana: "ポケモンに　持たせると\nピンチのとき　ＨＰを　回復する。\nきらいな味だと　混乱する。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　ＨＰを　回復する。\nきらいな味だと　混乱する。"
    en: "If a Pokémon holds one of these Berries, it will be able\nto restore some HP should it find itself in a pinch.\nBut it will become confused if it hates the Berry’s taste."
    fr: "Tenue, cette Baie restaure des PV en cas de besoin,\nmais rend le Pokémon confus si son goût lui déplaît."
    it: "Se un Pokémon in difficoltà ha questa bacca, recupera\ndei PS. Se al Pokémon non piace il suo sapore,\npuò causare confusione."
    de: "Als getragenes Item füllt diese Beere in einer Notlage\ndie KP des Pokémon auf, doch ihr Aroma verwirrt jene,\ndie es nicht mögen."
    es: "Los Pokémon pueden llevarla y usarla para restaurar\nalgunos PS en un momento de apuro. Su sabor puede\ncausar confusión si no les gusta."
    ko: "포켓몬에게 지니게 하면\n위급할 때 HP를 회복한다.\n싫어하는 맛이면 혼란에 빠진다."
    zh_simp: "让宝可梦携带后，\n危机时可以回复ＨＰ。\n如果讨厌这味道就会混乱。"
    zh_trad: "讓寶可夢攜帶後，\n危機時可以回復ＨＰ。\n如果討厭這味道就會混亂。"
aipom_hair:
  names:
    jp_kana: エイパムのけ
    jp_kanji: エイパムのけ
    en: Aipom Hair
    fr: Poils de Capumain
    it: Pelo di Aipom
    de: Griffel-Haar
    es: Pelo de Aipom
    ko: 에이팜의털
    zh_simp: 长尾怪手的毛
    zh_trad: 長尾怪手的毛
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
air_balloon:
  names:
    jp_kana: ふうせん
    jp_kanji: ふうせん
    en: Air Balloon
    fr: Ballon
    it: Palloncino
    de: Luftballon
    es: Globo Helio
    ko: 풍선
    zh_simp: 气球
    zh_trad: 氣球
  descriptions:
    jp_kana: "ポケモンに　持たせると\nポケモンが　宙に　浮く。\n攻撃を　受けると　割れてしまう。"
    jp_kanji: "ポケモンに　持たせると\nポケモンが　宙に　浮く。\n攻撃を　受けると　割れてしまう。"
    en: "An item to be held by a Pokémon. This balloon makes\nthe holder float in the air. If the holder is hit with an\nattack, the balloon will burst."
    fr: "Objet à tenir. Il permet au porteur de flotter dans les airs\net éclate quand le porteur est touché par une attaque."
    it: "Permette al Pokémon che ha questo strumento\ndi fluttuare in aria. Scoppia se il Pokémon\nè colpito da un attacco."
    de: "Gibt man ihn einem Pokémon zum Tragen, fängt es an\nzu schweben. Wird es von einem Angriff getroffen,\nplatzt der Luftballon."
    es: "El Pokémon que lo lleve flotará en el aire. Si recibe un\nataque, estallará."
    ko: "포켓몬에게 지니게 하면\n포켓몬이 허공에 뜬다.\n공격을 받으면 터져 버린다."
    zh_simp: "让宝可梦携带后，\n宝可梦会浮在空中。\n受到攻击就会破裂。"
    zh_trad: "讓寶可夢攜帶後，\n寶可夢會浮在空中。\n受到攻擊就會破裂。"
alakazite:
  names:
    jp_kana: フーディナイト
    jp_kanji: フーディナイト
    en: Alakazite
    fr: Alakazamite
    it: Alakazamite
    de: Simsalanit
    es: Alakazamita
    ko: 후디나이트
