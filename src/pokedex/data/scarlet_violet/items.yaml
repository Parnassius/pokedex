crystal_cluster:
  names:
    jp_kana: けっしょうのかけら
    jp_kanji: けっしょうのかけら
    en: Crystal Cluster
    fr: Morceau de Cristal
    it: Pezzo di cristallo
    de: Kristallfragment
    es: Fragmento de Cristal
    ko: 결정조각
    zh_simp: 结晶碎片
    zh_trad: 結晶碎片
  descriptions:
    jp_kana: "てらす池に　しずんでいる\n光りかがやく　結晶の欠けら。\nお面を　修理するのに　必要らしい。"
    jp_kanji: "てらす池に　しずんでいる\n光りかがやく　結晶の欠けら。\nお面を　修理するのに　必要らしい。"
    en: "A cluster of the crystals found within the Crystal Pool.\nThey sparkle brilliantly and are apparently necessary to\nrepair a certain mask."
    fr: "Un morceau de cristal brillant provenant du Lac\nCristallin. Il semblerait qu’il soit indispensable\nà la réparation d’un certain masque."
    it: "Pezzo di uno dei cristalli che brillano sul fondo del Lago\nCristallìo. Pare che serva per riparare una maschera."
    de: "Ein Stück der leuchtenden Kristalle vom Grund des\nKristallsees. Es wird für die Reparatur der Maske\nbenötigt."
    es: "Un fragmento de los cristales que refulgen en el fondo\ndel Lago Cristalino. Por lo visto es uno de los materiales\nnecesarios para reparar la máscara."
    ko: "태라수호에 가라앉아 있는\n반짝반짝 빛나는 결정의 조각.\n가면을 수리하는 데 필요하다고 한다."
    zh_simp: "沉在晶光池池底\n并闪闪发光的结晶碎片。\n修理面具时似乎需要用到。"
    zh_trad: "沉在晶光池裡，\n閃耀著光輝的結晶碎片。\n修理面具時似乎需要它。"
