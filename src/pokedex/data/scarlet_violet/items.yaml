    en: "Professor Sonia’s published writings. Her new\ndiscoveries about the Galar region’s legends are\nrecorded in this enjoyable read."
    fr: "Ouvrage publié par Professeure Sonya,\noù elle conte à sa manière les nouvelles découvertes\nfaites au sujet des légendes de Galar."
    it: "Pubblicazione della Professoressa Sonia.\nRaccoglie tutte le ultime scoperte riguardanti le\nleggende di Galar in un libro scorrevole e informativo."
    de: "Dieses Buch wurde von Professor Sania herausgebracht.\nEs ist eine unterhaltsam geschriebene Abhandlung über\nneue Erkenntnisse zu Legenden der Galar-Region."
    es: "Publicación de la Profesora Sonia que trata de forma\namena los recientes descubrimientos sobre las leyendas\nde la región de Galar."
    ko: "소니아박사가 출판했다.\n가라르지방의 전설에 대한\n새로운 발견이 흥미롭게 쓰여 있다."
    zh_simp: "索妮亚博士出版的书。\n以风趣的文笔展示了\n关于伽勒尔地区传说的最新发现。"
    zh_trad: "索妮亞博士出版的書。\n書中以有趣的手法描述了\n關於伽勒爾地區傳說的新發現。"
soot_sack:
  names:
    jp_kana: はいぶくろ
    jp_kanji: はいぶくろ
    en: Soot Sack
    fr: Sac à Suie
    it: Sacco cenere
    de: Aschetasche
    es: Saco Hollín
    ko: 재주머니
    zh_simp: 集灰袋
    zh_trad: 集灰袋
  descriptions:
    jp_kana: "つもった　かざんばいを\n集めるための　ふくろ。"
    jp_kanji: "つもった　かざんばいを\n集めるための　ふくろ。"
    en: A sack used to gather and hold volcanic ash.
    fr: "Un sac utilisé pour ramasser les cendres volcaniques\naccumulées au sol."
    it: Sacco per raccogliere la cenere vulcanica.
    de: "Eine Tasche, mit der du herabgerieselte Vulkanasche\naufsammeln kannst."
    es: "Bolsa en la que recoger la ceniza de volcán\nsedimentada en el suelo."
    ko: "쌓인 화산재를\n모으기 위한 주머니."
    zh_simp: "将堆积起来的火山灰\n收集起来的袋子。"
    zh_trad: "用於收集堆積的\n火山灰的袋子。"
sootfoot_root:
  names:
    jp_kana: ケムリイモ
    jp_kanji: ケムリイモ
    en: Sootfoot Root
    fr: Rutabagaz
    it: Patata fumosa
    de: Rauchknolle
    es: Fumibulbo
    ko: 연기토란
    zh_simp: 烟芋
    zh_trad: 煙芋
  descriptions:
    jp_kana: "めかくしだまの材料となるイモ。\nすりつぶして料理に使うほか\n乾燥させると細かく軽い粉末になる。"
    jp_kanji: "めかくしだまの材料となるイモ。\nすりつぶして料理に使うほか\n乾燥させると細かく軽い粉末になる。"
    en: "A tuber used for crafting Smoke Bombs. It can be\nmashed for use in cooking, but it can also be dried and\nground to produce a fine powder."
    fr: "Un tubercule utilisé pour confectionner des Bombes\nAveuglantes. On peut l’écraser pour l’utiliser en cuisine\nou bien le faire sécher pour le réduire en poudre fine."
    it: "Patata impiegata nella fabbricazione delle Palle orbe.\nSi può grattugiare e utilizzare in cucina o essiccare\nper ricavarne una polvere fine e leggera."
    de: "Eine Knolle, aus der Rauchkugeln hergestellt werden.\nMan kann sie zerstampfen und als Kochzutat verwenden\noder sie trocknen und zu feinem Pulver zermahlen."
    es: "Bulbo necesario para crear Bolas Humareda. Además\nde triturarlo para cocinar, se puede secar y pulverizar."
    ko: "눈속임환의 재료가 되는 토란.\n갈아서 요리에 쓸 수 있으며\n말리면 곱고 가벼운 가루가 된다."
    zh_simp: "能作为烟弹的材料使用的芋头。\n磨碎后能用来入菜，干燥后\n则会变成轻盈细致的粉末。"
    zh_trad: "能作為煙彈的材料使用的芋頭。\n磨碎後能用來入菜，乾燥後\n則會變成輕盈細緻的粉末。"
soothe_bell:
  names:
    jp_kana: やすらぎのすず
    jp_kanji: やすらぎのすず
    en: Soothe Bell
    fr: Grelot Zen
    it: Calmanella
    de: Sanftglocke
    es: Cascabel Alivio
    ko: 평온의방울
    zh_simp: 安抚之铃
    zh_trad: 安撫之鈴
  descriptions:
    jp_kana: "心地よい　音色の鈴。\n持たせたポケモンは　心が　安らぎ\nなかよく　なりやすくなる。"
    jp_kanji: "心地よい　音色の鈴。\n持たせたポケモンは　心が　安らぎ\nなかよく　なりやすくなる。"
    en: "An item to be held by a Pokémon. The comforting chime\nof this bell calms the holder, making it friendly."
    fr: "Objet à tenir. Un grelot dont le carillon calme le porteur\net favorise l’amitié."
    it: "Strumento da dare a un Pokémon. Campanella dal suono\nrassicurante che calma chi la usa aumentandone il livello\ndi amicizia."
    de: "Ein Item zum Tragen. Diese Glocke mit behaglichem\nKlang besänftigt ihren Träger, sodass dieser schneller\nzutraulich wird."
    es: "Un cascabel con un tañido calmante que reconforta al\nPokémon que lo lleva y lo vuelve más amistoso."
    ko: "기분 좋은 소리의 방울.\n지니게 한 포켓몬은 마음이\n편안해져 친밀해지기 쉬워진다."
    zh_simp: "音色悦耳的铃铛。\n让携带它的宝可梦清心怡神，\n变得容易和训练家亲密。"
    zh_trad: "音色悅耳的鈴鐺。\n寶可夢攜帶後心情會平靜下來，\n容易和訓練家變得友好。"
soul_dew:
  names:
    jp_kana: こころのしずく
    jp_kanji: こころのしずく
    en: Soul Dew
    fr: Rosée Âme
    it: Cuorugiada
    de: Seelentau
    es: Rocío Bondad
    ko: 마음의물방울
    zh_simp: 心之水滴
    zh_trad: 心之水滴
  descriptions:
    jp_kana: "ラティオスや　ラティアスに　持たせると\nエスパーと　ドラゴンタイプの技の\n威力が　あがる　不思議な珠。"
    jp_kanji: "ラティオスや　ラティアスに　持たせると\nエスパーと　ドラゴンタイプの技の\n威力が　あがる　不思議な珠。"
    en: "A wondrous orb to be held by Latios or Latias. It boosts\nthe power of their Psychic- and Dragon-type moves."
    fr: "Objet à faire tenir à Latios ou Latias.\nUn orbe prodigieux qui augmente la puissance\nde leurs capacités de type Psy ou Dragon."
    it: "Sfera miracolosa da dare a Latios o Latias.\nAumenta la potenza delle mosse di tipo Psico e Drago."
    de: "Ein Item, das von Latios oder Latias getragen werden\nkann. Diese sonderbare Kugel verstärkt Attacken vom\nTyp Psycho und Drache."
    es: "Un orbe fantástico que potencia los movimientos de\ntipo Psíquico y Dragón. Debe llevarlo Latios o Latias."
    ko: "라티오스나 라티아스에게 지니게 하면\n에스퍼와 드래곤타입 기술의 위력이\n올라가는 이상한 구슬."
    zh_simp: "让拉帝欧斯或拉帝亚斯携带后，\n超能力和龙属性的招式威力\n就会提高的神奇珠子。"
    zh_trad: "讓拉帝歐斯或拉帝亞斯攜帶後，\n超能力和龍屬性的招式威力\n就會提高的神奇珠子。"
soul_slate:
  names:
    jp_kana: こころのせきばん
    jp_kanji: こころのせきばん
    en: Soul Slate
    fr: Tablette Cœur
    it: Piastra del cuore
    de: Gefühlsplatte
    es: Losa Empatía
    ko: 마음의석판
    zh_simp: 心之石板
    zh_trad: 心之石板
  descriptions:
    jp_kana: "不思議な　力に　あふれる　石板。\nハマナスパークの　心の部屋と\n深い　つながりを　感じる。"
    jp_kanji: "不思議な　力に　あふれる　石板。\nハマナスパークの　心の部屋と\n深い　つながりを　感じる。"
    en: "A slate overflowing with enigmatic energy. You can feel\na strong connection between it and the Soul Room at\nRamanas Park."
    fr: "Une tablette qui regorge d’une étrange énergie.\nElle semble intimement liée à la Salle du Cœur\ndu Parc Rosa Rugosa."
    it: "Lastra di pietra che emana una misteriosa energia.\nSembra profondamente connessa alla Stanza del cuore\ndel Parco Rosa Rugosa."
    de: "Eine Platte, die vor rätselhafter Energie strotzt.\nMan kann eine starke Verbindung zwischen ihr und der\nGefühlskammer im Hamanasu-Park spüren."
    es: "Una losa rebosante de una misteriosa energía. Parece\nestrechamente relacionada con la Sala de la Empatía\ndel Parque Hansa."
    ko: "신비한 힘이 넘치는 석판.\n해당화파크의 마음의 방과\n깊은 연관이 있는 것 같다."
    zh_simp: "充满了神秘力量的石板。\n感觉它与玫瑰公园的心之厅\n有着很深的关联。"
    zh_trad: "充滿神奇力量的石板。\n感覺它和玫瑰公園的心之廳\n有很深的關係。"
sour_herba_mystica:
  names:
    jp_kana: ひでん：すぱスパイス
    jp_kanji: ひでん：すぱスパイス
    en: Sour Herba Mystica
    fr: Épice Secrète Acide
    it: Spezia nascosta aspra
    de: Saures Geheimgewürz
    es: Especia Oculta Ácida
    ko: 비전 새콤스파이스
    zh_simp: 秘传：酸味料
    zh_trad: 秘傳：酸味料
  descriptions:
    jp_kana: "優れた酸味を　持つ　スパイスであり\n抜群の　疲労回復の　効果が　あるという。\nその存在を　知る者は　ごくわずか。"
    jp_kanji: "優れた酸味を　持つ　スパイスであり\n抜群の　疲労回復の　効果が　あるという。\nその存在を　知る者は　ごくわずか。"
    en: "This surpassingly sour condiment is said to be super\neffective in helping the eater recover from exhaustion.\nOnly a scant few people know it exists."
    fr: "On dit que sa saveur acide raffinée peut soigner\nla fatigue la plus totale chez ceux qui la dégustent.\nSeuls quelques initiés connaissent son existence."
    it: "Una spezia incredibilmente aspra che si dice sia\nstraordinariamente efficace nel combattere la\nstanchezza. Pochissimi ne conoscono l’esistenza."
    de: "Dieses unfassbar saure Würzmittel soll hervorragend\ngegen Erschöpfung wirken. Nur wenige Menschen wissen,\ndass dieses mystische Gewächs überhaupt existiert."
    es: "Además de poseer un delicioso sabor ácido, se dice que\neste condimento prácticamente desconocido devuelve\nla energía incluso a la persona más exhausta."
    ko: "뛰어난 신맛을 가진 스파이스로,\n발군의 피로 회복 효과를 가졌다고 한다.\n그 존재를 아는 사람은 극히 소수다."
    zh_simp: "一种拥有出众酸味的调味料，\n据说还拥有优秀的恢复疲劳效果。\n只有极少数的人知道它的存在。"
    zh_trad: "據說此調味料的酸味超群，\n而且有優秀的消除疲勞之效。\n知曉其存在者極為稀少。"
space_balm:
  names:
    jp_kana: そらのシズメダマ
    jp_kanji: そらのシズメダマ
    en: Space Balm
    fr: Pacifi-Espace
    it: Sferazen spazio
    de: Raumruhegabe
    es: Calmasfera Espacio
    ko: 공간의진정환
    zh_simp: 空之镇宝
    zh_trad: 空之鎮寶
  descriptions:
    jp_kana: "荒ぶる　パルキアを\n鎮めることが　できる\n不思議な力を　秘めたタマ。"
    jp_kanji: "荒ぶる　パルキアを\n鎮めることが　できる\n不思議な力を　秘めたタマ。"
    en: "A mysterious balm that somehow has the power to calm\nPalkia in its frenzy."
    fr: "L’étrange parfum que dégage cet objet permet d’apaiser\nla frénésie de Palkia."
    it: "Sfera dotata di un misterioso potere in grado di placare\nla collera di Palkia."
    de: "Dieses Säckchen birgt eine mysteriöse Kraft.\nMit ihm kann man Palkia besänftigen."
    es: "Misteriosa esfera imbuida de un poder capaz de calmar\na Palkia cuando se encuentra furioso."
    ko: "폭주하는 펄기아를\n진정시킬 수 있는\n신비한 힘이 담겨 있는 주머니."
    zh_simp: "蕴含着不可思议力量的\n投掷用道具。能让狂暴的\n帕路奇亚镇静下来。"
    zh_trad: "蘊含著不可思議力量的\n投擲用道具。能讓狂暴的\n帕路奇亞鎮靜下來。"
sparkling_stone:
  names:
    jp_kana: かがやくいし
    jp_kanji: かがやくいし
    en: Sparkling Stone
    fr: Gemme Lumière
    it: Pietra lucente
    de: Glitzerstein
    es: Piedra Brillante
    ko: 빛나는돌
    zh_simp: 光辉石
    zh_trad: 光輝石
  descriptions:
    jp_kana: "アローラの　守り神と　される\nポケモンから　もらった　石。\nかがやきに　秘密が　あるという。"
    jp_kanji: "アローラの　守り神と　される\nポケモンから　もらった　石。\nかがやきに　秘密が　あるという。"
    en: "A stone entrusted to you by a Pokémon that has been\nvenerated as a guardian deity in the Alola region.\nThere is said to be some secret in how it sparkles."
    fr: "Une pierre donnée par un Pokémon gardien d’Alola.\nSon éclat cache un secret."
    it: "Pietra ricevuta dal Pokémon protettore di Alola.\nDietro la sua lucentezza si nasconde un segreto."
    de: "Ein Stein, den du von einem der Schutzpatrone Alolas\nerhalten hast. Es heißt, dass sich hinter dem Glitzern ein\nGeheimnis verberge."
    es: "Piedra con un misterioso brillo entregada por un\nPokémon considerado como uno de los espíritus\nguardianes de Alola."
    ko: "알로라의 수호신으로 여겨지는\n포켓몬으로부터 받은 돌.\n빛에 비밀이 있다고 한다."
    zh_simp: "从被认为是阿罗拉守护神的\n宝可梦那里得到的石头。\n据说其光辉下有着某种秘密。"
    zh_trad: "從被認為是阿羅拉守護神的\n寶可夢處得到的石頭。\n據說其光輝包含著某種秘密。"
spearow_candy:
  names:
    jp_kana: オニスズメのアメ
    jp_kanji: オニスズメのアメ
    en: Spearow Candy
    fr: Bonbon Piafabec
    it: Caramella Spearow
    de: Habitak-Bonbon
    es: Caramelo Spearow
    ko: 깨비참의사탕
    zh_simp: 烈雀的糖果
    zh_trad: 烈雀的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
spectrier_treat:
  names:
    jp_kana: レイスポスのおやつ
    jp_kanji: レイスポスのおやつ
    en: Spectrier Treat
    fr: Friandise Spectreval
    it: Spuntino per Spectrier
    de: Phantoross-Snack
    es: Galleta Spectrier
    ko: 레이스포스의간식
    zh_simp: 灵幽马的点心
    zh_trad: 靈幽馬的點心
  descriptions:
    jp_kana: "伝説のポケモン　レイスポスが\n好む食材で　作られた　おやつ。"
    jp_kanji: "伝説のポケモン　レイスポスが\n好む食材で　作られた　おやつ。"
    en: "A snack made from ingredients favored by the\nLegendary Pokémon Spectrier."
    fr: "Une friandise préparée avec les ingrédients favoris\ndu Pokémon légendaire Spectreval."
    it: "Uno spuntino fatto con gli ingredienti preferiti\ndal Pokémon leggendario Spectrier."
    de: "Dieser Snack wurde mit den Lieblingszutaten des\nLegendären Pokémon Phantoross zubereitet."
    es: "Galleta preparada con los ingredientes favoritos\ndel Pokémon legendario Spectrier."
    ko: "전설의 포켓몬 레이스포스가\n좋아하는 식재료로 만들어진 간식."
    zh_simp: "用传说的宝可梦灵幽马\n喜欢的食材制作的点心。"
    zh_trad: "用傳說的寶可夢靈幽馬\n喜愛的食材製成的點心。"
spell_tag:
  names:
    jp_kana: のろいのおふだ
    jp_kanji: のろいのおふだ
    en: Spell Tag
    fr: Rune Sort
    it: Spettrotarga
    de: Bannsticker
    es: Hechizo
    ko: 저주의부적
    zh_simp: 咒术之符
    zh_trad: 詛咒之符
  descriptions:
    jp_kana: "怪しくて　不気味な　お札。\n持たせると　ゴーストタイプの\n技の威力が　あがる。"
    jp_kanji: "怪しくて　不気味な　お札。\n持たせると　ゴーストタイプの\n技の威力が　あがる。"
    en: "An item to be held by a Pokémon. It’s a sinister, eerie\ntag that boosts the power of the holder’s Ghost-type\nmoves."
    fr: "Objet à tenir. Un talisman sinistre et étrange qui\naugmente la puissance des capacités de type Spectre."
    it: "Strumento da dare a un Pokémon. Targa sinistra\ne inquietante che potenzia le mosse di tipo Spettro."
    de: "Ein Item zum Tragen. Ein fieser, unheimlicher Sticker,\nder Attacken vom Typ Geist verstärkt."
    es: "Misterioso y siniestro objeto que potencia los\nmovimientos de tipo Fantasma. Debe llevarlo un\nPokémon."
    ko: "괴상하고 으스스한 부적.\n지니게 하면 고스트타입\n기술의 위력이 올라간다."
    zh_simp: "古怪可怕的咒符。\n携带后，幽灵属性的\n招式威力就会提高。"
    zh_trad: "古怪可怕的咒符。\n攜帶後，幽靈屬性的\n招式威力就會提高。"
spelon_berry:
  names:
    jp_kana: ノワキのみ
    jp_kanji: ノワキのみ
    en: Spelon Berry
    fr: Baie Kiwan
    it: Baccamelos
    de: Kiwanbeere
    es: Baya Wikano
    ko: 메호키열매
    zh_simp: 刺角果
    zh_trad: 刺角果
  descriptions:
    jp_kana: "かわいさに　磨きを　かけるための\nポロックを　作るとき　使われる。\nほかの地方では　めずらしい　きのみ。"
    jp_kanji: "かわいさに　磨きを　かけるための\nポロックを　作るとき　使われる。\nほかの地方では　めずらしい　きのみ。"
    en: "Used to make Pokéblocks that will enhance Cuteness.\nThis Berry is rare in other regions."
    fr: "Une Baie très rare en dehors de cette région,\nutilisée pour préparer des Pokéblocs permettant\nd’augmenter la Grâce d’un Pokémon."
    it: "Bacca difficile da trovare in altre regioni usata per creare\nPokémelle che aumentano la Grazia del Pokémon."
    de: "Eine Beerensorte, die als Zutat für Pokériegel\nverwendet wird, welche die Putzigkeit erhöhen.\nIn anderen Regionen ist sie eher selten zu finden."
    es: "Se utiliza en la producción de Pokécubos que potencian\nla dulzura. Es una baya muy rara en otras regiones."
    ko: "귀여움을 연마하기 위한\n포켓몬스넥을 만들 때 사용된다.\n다른 지방에서는 희귀한 나무열매."
    zh_simp: "用于制作宝可方块，\n制作出来的宝可方块可用来打磨可爱。\n在其他地区很少见的树果。"
    zh_trad: "製作用於增進可愛的\n寶可方塊時使用。\n在其他地區很少見的樹果。"
spice_mix:
  names:
    jp_kana: スパイスセット
    jp_kanji: スパイスセット
    en: Spice Mix
    fr: Épices
    it: Spezie assortite
    de: Gewürzmix
    es: Especias
    ko: 스파이스세트
    zh_simp: 香料组合
    zh_trad: 香料組合
  descriptions:
    jp_kana: "キャンプの　料理に　使う\n食材の　一種。５０種類を\n超える　スパイスが　入っており　辛い。"
    jp_kanji: "キャンプの　料理に　使う\n食材の　一種。５０種類を\n超える　スパイスが　入っており　辛い。"
    en: "One of the many ingredients that can be used for\ncooking at your camp. There are over fifty spices\ncontained within this ingredient’s hot flavor."
    fr: "Un ingrédient de cuisine pour le camping.\nCe mélange de plus d’une cinquantaine d’épices\nest souvent utilisé pour donner du piquant au curry."
    it: "Uno degli ingredienti che puoi usare per cucinare\nin campeggio. Miscela di oltre cinquanta spezie\ndiverse, dal sapore piccante."
    de: "Eine Zutat für PokéCamping-Mahlzeiten. Diese scharfe\nMischung setzt sich aus mehr als 50 verschiedenen\nGewürzen zusammen."
    es: "Un ingrediente para cocinar en el campamento. Es una\nmezcla picante de más de 50 tipos de especias."
    ko: "캠프 요리에 사용되는\n식재료 중 하나. 50가지가 넘는\n향신료가 들어 있어 맵다."
    zh_simp: "在露营营地制作料理时会使用的\n一种食材。加入了超过５０种\n香辛料调配而成，香辣十足。"
    zh_trad: "製作露營料理時使用的食材之一。\n裡面有超過５０種的香料，很辣。"
spicy_herba_mystica:
  names:
    jp_kana: ひでん：からスパイス
    jp_kanji: ひでん：からスパイス
    en: Spicy Herba Mystica
    fr: Épice Secrète Corsée
    it: Spezia nascosta pepata
    de: Scharfes Geheimgewürz
    es: Especia Oculta Picante
    ko: 비전 매콤스파이스
    zh_simp: 秘传：辣味料
    zh_trad: 秘傳：辣味料
  descriptions:
    jp_kana: "最高の辛みを　持つと　噂される\n幻の調味料。　ひと口　食べるだけで\n新陳代謝が　爆発的に　向上するという。"
    jp_kanji: "最高の辛みを　持つと　噂される\n幻の調味料。　ひと口　食べるだけで\n新陳代謝が　爆発的に　向上するという。"
    en: "The legendary condiment said to have the mightiest of\nall spicy flavors. It’s said that a single bite will kick the\nmetabolism into high gear immediately."
    fr: "Un condiment fabuleux supposé avoir la saveur la plus\ncorsée qui soit. Il est dit qu’une pincée peut stimuler\nle métabolisme de manière spectaculaire."
    it: "Un condimento leggendario che, a quel che si dice,\nè estremamente piccante. Un solo boccone causa\nun’accelerazione esplosiva del metabolismo."
    de: "Dieses mystische Würzmittel weist angeblich den\nallerhöchsten Schärfegrad auf. Ein Bissen soll genügen,\num den Stoffwechsel explosionsartig anzuregen."
    es: "Se rumorea que este condimento de leyenda posee el\nsabor picante definitivo. Basta con saborear una pizca\npara acelerar el metabolismo de manera exorbitante."
    ko: "최고의 매운맛을 가졌다고 전해 내려오는\n환상의 조미료. 한 입만 먹어도\n신진대사가 폭발적으로 향상된다고 한다."
    zh_simp: "这款幻之调味料据说拥有极品的辣味，\n传闻只要吃一口，\n新陈代谢就会爆炸性地提高。"
    zh_trad: "相傳帶有極致辣味的幻之調味料。\n據說只要淺嚐一口，\n新陳代謝就會爆發性地提升。"
spinarak_thread:
  names:
    jp_kana: イトマルのいと
    jp_kanji: イトマルのいと
    en: Spinarak Thread
    fr: Fil de Mimigal
    it: Filo di Spinarak
    de: Webarak-Faden
    es: Hilo de Spinarak
    ko: 페이검의실
    zh_simp: 圆丝蛛的丝
    zh_trad: 圓絲蛛的絲
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
spiritomb_fragment:
  names:
