  names:
    jp_kana: Yステンレスボトル
    jp_kanji: Yステンレスボトル
    en: Steel Bottle (Y)
    fr: Gourde Inox (Jaune)
    it: Borraccia inox G
    de: Edelstahlflasche (G)
    es: Termo Metal Amarillo
    ko: Y 스테인리스 보틀
    zh_simp: 黄纹不锈钢水壶
    zh_trad: 黃紋不鏽鋼水壺
  descriptions:
