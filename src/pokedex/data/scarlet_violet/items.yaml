    jp_kana: "きのみが　ねりこまれた　もち。\nポケモン　１匹の　特攻の\n基礎ポイントを　あげる。"
    jp_kanji: "きのみが　ねりこまれた　もち。\nポケモン　１匹の　特攻の\n基礎ポイントを　あげる。"
    en: "A mochi cake with Berries kneaded into its dough.\nIt increases base points for a Pokémon’s Sp. Atk stat."
    fr: "Un mochi contenant des Baies qui augmente\nl’Attaque Spéciale de base d’un Pokémon."
    it: "Mochi preparato con un impasto a base di bacche.\nAumenta i punti base dell’Attacco Speciale."
    de: "Ein mit Beeren gefüllter Mochi, der die Spezial-Angriffs-\nBasispunkte eines Pokémon dauerhaft erhöht."
    es: "La masa de este mochi está preparada con bayas.\nAumenta el Ataque Especial de base de un Pokémon."
    ko: "으깬 나무열매가 들어 있는 떡.\n포켓몬 1마리의 특수공격\n기초 포인트를 올린다."
    zh_simp: "糅合树果的粘糕。\n能提高１只宝可梦的\n特攻的基础点数。"
    zh_trad: "加入樹果揉製而成的麻糬。\n能提高１隻寶可夢的\n特攻的基礎點數。"
genome_slate:
