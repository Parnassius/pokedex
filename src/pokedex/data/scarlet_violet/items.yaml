    jp_kanji: ルチャブルのうもう
    en: Hawlucha Down
    fr: Duvet de Brutalibré
    it: Piuma di Hawlucha
    de: Resladero-Daune
    es: Plumón de Hawlucha
    ko: 루차불의솜털
    zh_simp: 摔角鹰人的羽绒
    zh_trad: 摔角鷹人的羽絨
