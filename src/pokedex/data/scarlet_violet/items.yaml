serious_mint:
  names:
    jp_kana: まじめミント
    jp_kanji: まじめミント
    en: Serious Mint
    fr: Aromate Sérieux
    it: Menta Seria
    de: Ernst-Minze
    es: Menta Seria
    ko: 성실민트
    zh_simp: 认真薄荷
    zh_trad: 認真薄荷
  descriptions:
    jp_kana: "ポケモンに　香りを　かがせると\n攻撃　防御　素早さ　特防\n特攻が　万遍なく　育つ　ミント。"
    jp_kanji: "ポケモンに　香りを　かがせると\n攻撃　防御　素早さ　特防\n特攻が　万遍なく　育つ　ミント。"
    en: "Having a Pokémon smell this mint will cause its Attack,\nDefense, Sp. Atk, Sp. Def, and Speed stats to grow at\nan equal rate."
    fr: "Si un Pokémon hume cet aromate, son Attaque,\nsa Défense, sa Vitesse, son Attaque Spéciale\net sa Défense Spéciale se développeront uniformément."
    it: "Quando un Pokémon ne sente il profumo, le sue\nstatistiche di Attacco, Difesa, Velocità, Difesa Speciale\ne Attacco Speciale aumentano uniformemente."
    de: "Lässt man ein Pokémon an dieser Minze schnuppern,\nsteigen Angriff, Verteidigung, Spezial-Angriff,\nSpezial-Verteidigung und Initiative gleichmäßig."
    es: "Cuando un Pokémon percibe su aroma, su Ataque,\nsu Defensa, su Ataque Especial, su Defensa Especial y\nsu Velocidad crecen de forma uniforme."
    ko: "포켓몬에게 향기를 맡게 하면\n공격, 방어, 스피드, 특수방어,\n특수공격이 골고루 오르게 되는 민트."
    zh_simp: "宝可梦闻了这种薄荷之后，\n攻击、防御、速度、\n特防、特攻能全方位提高。"
    zh_trad: "讓寶可夢聞這種薄荷的氣味，\n會令攻擊、防禦、速度、\n特防和特攻均衡地成長。"
