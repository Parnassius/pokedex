academy_cup:scarlet:
  names:
    jp_kana: スクールカップ
    jp_kanji: スクールカップ
    en: Academy Cup
    fr: Tasse de l’Académie
    it: Tazza accademia
    de: Akademie-Tasse
    es: Taza Academia
    ko: 스쿨 컵
    zh_simp: 校园水杯
    zh_trad: 校園水杯
  descriptions:
    jp_kana: "アカデミー指定の　ピクニック用　カップ。\n飲み口の　きめ細やかさは　こだわりの\n作りで　学校外でも　人気が　高い。"
    jp_kanji: "アカデミー指定の　ピクニック用　カップ。\n飲み口の　きめ細やかさは　こだわりの\n作りで　学校外でも　人気が　高い。"
    en: "The academy’s standard-issue cup for picnicking. The\ncareful design of its mouth makes it popular both inside\nand outside the academy."
    fr: "Une tasse fournie par l’académie pour les pique-niques.\nLe soin apporté à ses rebords la rend populaire parmi\nles élèves, mais aussi en dehors de l’école."
    it: "Tazza da picnic con il design regolamentare\ndell’accademia. Il bordo di fattura sopraffina la rende\nmolto popolare anche al di fuori della scuola."
    de: "Die offizielle Akademie-Tasse für Picknicks. Dank des\neigenwilligen Designs ihres fein gearbeiteten Randes\nist sie nicht nur bei Akademieschülern sehr beliebt."
    es: "La taza de pícnic oficial de la academia. El borde resulta\nespecialmente cómodo a la hora de beber, por lo que es\npopular incluso entre aquellos que no son alumnos."
    ko: "아카데미 지정 피크닉용 컵.\n입이 닿는 부분이 섬세하게 만들어져서\n학교 밖에서도 인기가 많다."
    zh_simp: "学院指定的野餐用杯。\n杯口造型经过精雕细琢，\n在学校内外都很有人气。"
    zh_trad: "學院指定的野餐用水杯。\n精心雕琢而成的細緻杯口\n連校外人士也趨之若鶩。"
academy_cup:violet:
  names:
    jp_kana: スクールカップ
    jp_kanji: スクールカップ
