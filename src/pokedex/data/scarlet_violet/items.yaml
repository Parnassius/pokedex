    de: "Ausweis zur Teilnahme an Pokémon-Wettbewerben.\nDie Zeichnung eines Bandes ist aufgedruckt."
    es: "Es necesario para participar en Concursos Pokémon.\nTiene una cinta de ganador dibujada."
    ko: "지니고 있으면 포켓몬 콘테스트에\n참가할 수 있다.\n기념리본이 그려져 있다."
    zh_simp: "拿着它就可以参加宝可梦华丽大赛。\n上面印有纪念奖章。"
    zh_trad: "拿著它就可以參加\n寶可夢華麗大賽。\n上面印有紀念獎章。"
cornerstone_mask:
  names:
    jp_kana: いしずえのめん
    jp_kanji: いしずえのめん
    en: Cornerstone Mask
    fr: Masque de la Pierre
    it: Maschera Fondamenta
    de: Fundamentmaske
    es: Máscara Cimiento
    ko: 주춧돌의가면
    zh_simp: 础石面具
    zh_trad: 礎石面具
  descriptions:
    jp_kana: "結晶が　あしらわれた　木彫りの面。\nオーガポンに　持たせると\nいわタイプを　まとい　戦う。"
    jp_kanji: "結晶が　あしらわれた　木彫りの面。\nオーガポンに　持たせると\nいわタイプを　まとい　戦う。"
    en: "An item to be held by Ogerpon. This carved wooden\nmask is adorned with crystals and allows Ogerpon to\nwield the Rock type during battle."
