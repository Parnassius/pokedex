shaderoot_carrot:
  names:
    jp_kana: くろいにんじん
    jp_kanji: くろいにんじん
    en: Shaderoot Carrot
    fr: Carotte Sombre
    it: Carota oscura
    de: Phantomkarotte
    es: Zanahoria Oscura
    ko: 검은당근
    zh_simp: 黑萝卜
    zh_trad: 黑蘿蔔
  descriptions:
    jp_kana: "豊穣の王の　愛馬が\n好んで　食べる　作物。\n薄暗い　畑で　育った。"
    jp_kanji: "豊穣の王の　愛馬が\n好んで　食べる　作物。\n薄暗い　畑で　育った。"
    en: "Produce that the King of Bountiful Harvests’ beloved\nsteed likes to eat. It grew in a gloomy field."
    fr: "Un légume très apprécié du fidèle destrier\ndu Seigneur des récoltes. Il a été cultivé\ndans un champ ombragé."
    it: "Un ortaggio molto apprezzato dal fedele destriero\ndel Re dell’abbondanza. Cresce nei campi ombreggiati."
    de: "Eine Karotte, die auf einem in Schatten getauchten\nFeld heranwuchs. Das treue Ross des Königs der\nreichen Ernte mag sie besonders gern."
    es: "Una zanahoria cultivada en un huerto sombrío. Es la\nhortaliza preferida del amado corcel del Rey de las\nCosechas."
    ko: "풍요의 왕의 애마가\n즐겨 먹는 작물.\n어두컴컴한 밭에서 자랐다."
    zh_simp: "丰饶之王的爱马\n喜欢吃的农作物。\n生长于光线暗淡的田地。"
    zh_trad: "豐饒之王的愛馬喜歡吃的農作物。\n生長在光線幽暗的田地。"
shalour_sable:
  names:
    jp_kana: シャラサブレ
    jp_kanji: シャラサブレ
    en: Shalour Sable
    fr: Sablé Yantreizh
    it: Yantafrollino
    de: Yantara-Sablé
    es: Galleta Yantra
    ko: 사라사블레
    zh_simp: 娑罗沙布蕾
    zh_trad: 娑羅沙布蕾
  descriptions:
    jp_kana: "シャラシティ名物の　サブレ。\nポケモン　１匹の　状態の\n異常を　すべて　回復する。"
    jp_kanji: "シャラシティ名物の　サブレ。\nポケモン　１匹の　状態の\n異常を　すべて　回復する。"
    en: "Shalour City’s famous shortbread. It can be used to cure\nany status condition a Pokémon may have."
    fr: "Une spécialité de Yantreizh.\nSoigne toutes les altérations de statut d’un Pokémon."
    it: "Il famoso Yantafrollino di Yantaropoli.\nCura tutti i problemi di stato di un Pokémon."
    de: "Dieser Butterkeks ist eine Spezialität aus Yantara City.\nEr behebt alle Statusprobleme eines Pokémon."
    es: "Especialidad de Ciudad Yantra. Cura los problemas de\nestado de un Pokémon."
    ko: "사라시티의 명물 사블레.\n포켓몬 1마리의 상태 이상을\n모두 회복한다."
    zh_simp: "娑罗市特产的沙布蕾。\n能治愈１只宝可梦的\n所有异常状态。"
    zh_trad: "娑羅市特產的沙布蕾。\n能治癒１隻寶可夢的\n所有異常狀態。"
sharp_beak:
  names:
    jp_kana: するどいくちばし
    jp_kanji: するどいくちばし
    en: Sharp Beak
    fr: Bec Pointu
    it: Beccaffilato
    de: Spitzer Schnabel
    es: Pico Afilado
    ko: 예리한부리
    zh_simp: 锐利鸟嘴
    zh_trad: 銳利鳥嘴
  descriptions:
    jp_kana: "長く　とがった　くちばし。\n持たせると　ひこうタイプの\n技の威力が　あがる。"
    jp_kanji: "長く　とがった　くちばし。\n持たせると　ひこうタイプの\n技の威力が　あがる。"
    en: "An item to be held by a Pokémon. It’s a long, sharp beak\nthat boosts the power of the holder’s Flying-type moves."
    fr: "Objet à tenir. Un bec long et pointu qui augmente\nla puissance des capacités de type Vol."
    it: "Strumento da dare a un Pokémon. Becco lungo e affilato\nche potenzia le mosse di tipo Volante."
    de: "Ein Item zum Tragen. Ein langer, scharfer Schnabel,\nder Attacken vom Typ Flug verstärkt."
    es: "Pico largo y afilado que potencia los movimientos de\ntipo Volador. Debe llevarlo un Pokémon."
    ko: "길고 뾰족한 부리.\n지니게 하면 비행타입\n기술의 위력이 올라간다."
    zh_simp: "又长又尖的鸟嘴。\n携带后，飞行属性的\n招式威力就会提高。"
    zh_trad: "又長又尖的鳥嘴。\n攜帶後，飛行屬性的\n招式威力就會提高。"
sharpedonite:
  names:
    jp_kana: サメハダナイト
    jp_kanji: サメハダナイト
    en: Sharpedonite
    fr: Sharpedite
    it: Sharpedite
    de: Tohaidonit
    es: Sharpedonita
    ko: 샤크니아나이트
    zh_simp: 巨牙鲨进化石
    zh_trad: 巨牙鯊進化石
  descriptions:
    jp_kana: "サメハダーに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    jp_kanji: "サメハダーに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Sharpedo hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Sharpedo, elle lui permet\nde méga-évoluer durant un combat."
    it: "Una delle misteriose Megapietre. Data a Sharpedo,\ngli permette di megaevolversi durante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Tohaido getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Sharpedo en combate."
    ko: "샤크니아에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让巨牙鲨携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓巨牙鯊攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
shed_shell:
  names:
    jp_kana: きれいなぬけがら
    jp_kanji: きれいなぬけがら
    en: Shed Shell
    fr: Carapace Mue
    it: Disfoguscio
    de: Wechselhülle
    es: Muda Concha
    ko: 아름다운허물
    zh_simp: 美丽空壳
    zh_trad: 美麗空殼
  descriptions:
    jp_kana: "丈夫で　硬い　ぬけがら。\n持たせた　ポケモンは　控えの\nポケモンと　必ず　いれかわれる。"
    jp_kanji: "丈夫で　硬い　ぬけがら。\n持たせた　ポケモンは　控えの\nポケモンと　必ず　いれかわれる。"
    en: "An item to be held by a Pokémon. Hard and sturdy, this\ndiscarded carapace enables the holder to switch out of\nbattle without fail."
    fr: "Objet à tenir. Une carapace dure qui permet\nau porteur de se retirer du combat à tous les coups."
    it: "Un Pokémon con questo robusto guscio può essere\nsempre sostituito."
    de: "Ein Item zum Tragen. Dieser harte Panzer sorgt dafür,\ndass sein Träger unter allen Umständen ausgetauscht\nwerden kann."
    es: "Esta concha desechada permite que el portador siempre\npueda cambiarse por otro Pokémon que no esté\ncombatiendo."
    ko: "튼튼하고 단단한 허물.\n지니게 한 포켓몬은 교대\n포켓몬과 반드시 교체할 수 있다."
    zh_simp: "结实坚硬的空壳。\n携带它的宝可梦必定可以\n和后备的宝可梦进行替换。"
    zh_trad: "結實堅硬的空殼。\n攜帶它的寶可夢必定可以\n和後備的寶可夢進行替換。"
shell_bell:
  names:
    jp_kana: かいがらのすず
    jp_kanji: かいがらのすず
    en: Shell Bell
    fr: Grelot Coque
    it: Conchinella
    de: Muschelglocke
    es: Cascabel Concha
    ko: 조개껍질방울
    zh_simp: 贝壳之铃
    zh_trad: 貝殼之鈴
  descriptions:
    jp_kana: "持たせた　ポケモンが　攻撃して\n相手に　ダメージを　あたえたとき\nＨＰを　少し　回復できる。"
    jp_kanji: "持たせた　ポケモンが　攻撃して\n相手に　ダメージを　あたえたとき\nＨＰを　少し　回復できる。"
    en: "An item to be held by a Pokémon. The holder restores\na little HP to itself every time it inflicts damage with an\nattack."
    fr: "Objet à tenir. Restaure un peu les PV du porteur\nchaque fois qu’il inflige des dégâts."
    it: "Strumento da dare a un Pokémon. Chi ce l’ha recupera\nun po’ di PS ogni volta che infligge danni con un attacco."
    de: "Ein Item zum Tragen. Es füllt einige KP des Trägers\nimmer dann wieder auf, wenn dieser dem Ziel durch\neinen Angriff Schaden zufügt."
    es: "Cada vez que el portador inflige daño, recupera algunos\nPS. Debe llevarlo un Pokémon."
    ko: "지니게 한 포켓몬이 공격하여\n상대에게 데미지를 줬을 때\nHP를 조금 회복할 수 있다."
    zh_simp: "当携带它的宝可梦\n攻击对手并造成伤害时，\n能回复少量ＨＰ。"
    zh_trad: "當攜帶它的寶可夢\n攻擊並造成對手傷害時，\n能回復少量ＨＰ。"
shellder_candy:
  names:
    jp_kana: シェルダーのアメ
    jp_kanji: シェルダーのアメ
    en: Shellder Candy
    fr: Bonbon Kokiyas
    it: Caramella Shellder
    de: Muschas-Bonbon
    es: Caramelo Shellder
    ko: 셀러의사탕
    zh_simp: 大舌贝的糖果
    zh_trad: 大舌貝的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
shellder_pearl:
  names:
    jp_kana: シェルダーのしんじゅ
    jp_kanji: シェルダーのしんじゅ
    en: Shellder Pearl
    fr: Perle de Kokiyas
    it: Perla di Shellder
    de: Muschas-Perle
    es: Perla de Shellder
    ko: 셀러의진주
    zh_simp: 大舌贝的珍珠
    zh_trad: 大舌貝的珍珠
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
shellos_mucus:
  names:
    jp_kana: カラナクシのねんえき
    jp_kanji: カラナクシのねんえき
    en: Shellos Mucus
    fr: Mucus de Sancoki
    it: Bava di Shellos
    de: Schalellos-Schleim
    es: Secreción de Shellos
    ko: 깝질무의점액
    zh_simp: 无壳海兔的黏液
    zh_trad: 無殼海兔的黏液
