    fr: Poudre de Lépidonille
    it: Polvere di Scatterbug
    de: Purmel-Puder
    es: Polvo de Scatterbug
    ko: 분이벌레의가루
    zh_simp: 粉蝶虫的粉
    zh_trad: 粉蝶蟲的粉
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
sceptilite:
  names:
    jp_kana: ジュカインナイト
    jp_kanji: ジュカインナイト
    en: Sceptilite
    fr: Jungkite
    it: Sceptilite
    de: Gewaldronit
    es: Sceptilita
    ko: 나무킹나이트
    zh_simp: 蜥蜴王进化石
    zh_trad: 蜥蜴王進化石
  descriptions:
    jp_kana: "ジュカインに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    jp_kanji: "ジュカインに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Sceptile hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Jungko, elle lui permet de méga-évoluer\ndurant un combat."
    it: "Una delle misteriose Megapietre. Data a Sceptile,\ngli permette di megaevolversi durante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Gewaldro getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Sceptile en combate."
    ko: "나무킹에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让蜥蜴王携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓蜥蜴王攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
scizorite:
  names:
    jp_kana: ハッサムナイト
