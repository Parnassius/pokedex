cyber_ball:
  names:
    jp_kana: ゲーミングボール
    jp_kanji: ゲーミングボール
    en: Cyber Ball
    fr: Ballon Gaming
    it: Palla gaming
    de: Cyber-Ball
    es: Pelota Cibernética
    ko: 게이밍볼
    zh_simp: 电竞球
    zh_trad: 電競球
  descriptions:
    jp_kana: "マニアに　人気の　ゲーミングＰＣに\n似せて　作られた　ボール。　オリジナルと\n違って　光らないが　存在感は　際立つ。"
    jp_kanji: "マニアに　人気の　ゲーミングＰＣに\n似せて　作られた　ボール。　オリジナルと\n違って　光らないが　存在感は　際立つ。"
    en: "A ball themed after hardcore gaming PCs. It may not\nlight up like its inspiration, but it still stands out."
    fr: "Un ballon créé à l’image d’un PC de gaming pour les\njoueurs hardcores. Contrairement aux vrais PC, il ne\ns’illumine pas, mais il se fait quand même remarquer."
    it: "Palla ispirata a uno di quei PC per videogiochi popolari\ntra gli appassionati. A differenza dell’originale non si\nillumina, ma decisamente non passa inosservata."
    de: "Dieser Ball ist einem bei Videospielfans sehr beliebten\nGaming-PC nachempfunden. Anders als das Original\nleuchtet er zwar nicht, doch ein Hingucker ist er allemal."
    es: "Una pelota hecha a imagen de los más potentes\nordenadores para jugones. A diferencia de estos, no\nse ilumina, pero no por eso resulta menos llamativa."
    ko: "마니아 사이에서 인기 있는 게이밍 PC를\n본떠 만든 볼. 오리지널과는 다르게\n빛나지 않지만, 존재감은 확실하다."
    zh_simp: "模仿电竞迷所喜欢的人气电竞电脑\n所制作的球。它不像真电脑\n那样能发光，但还是很显眼。"
    zh_trad: "模仿電競迷熱愛的電競用電腦\n所做成的球。不會像原版一樣發光，\n但非常具有存在感。"
cyclizar_scales:
  names:
    jp_kana: モトトカゲのウロコ
    jp_kanji: モトトカゲのウロコ
