    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
doppel_bonnets:
  names:
    jp_kana: カゲブンシメジ
    jp_kanji: カゲブンシメジ
    en: Doppel Bonnets
    fr: Champinja
    it: Doppioteamillo
    de: Flinkling
    es: Seta Evasiva
    ko: 그림자분신버섯
    zh_simp: 影分菇
    zh_trad: 影分菇
  descriptions:
    jp_kana: "食べると身軽になり\n素早さが増すキノコ。\nヨクアタラーヌの材料となる。"
    jp_kanji: "食べると身軽になり\n素早さが増すキノコ。\nヨクアタラーヌの材料となる。"
    en: "Mushrooms that, when consumed, make the eater feel\nnimble and agile as a fleeting shadow. They are one\nof the materials needed for crafting Aux Evasions."
    fr: "Ce champignon confère de l’agilité à celui qui l’ingère\net augmente ainsi sa vitesse. Ressource requise pour\nla confection d’une fiole d’Esquive Extra."
    it: "Fungo utilizzato nella preparazione di Elusioni X.\nSe mangiato, rende più leggeri e aumenta la Velocità."
    de: "Dieser Pilz wird zur Herstellung von Ausweichvitaminen\ngenutzt. Sein Verzehr lässt den Körper leichter\nerscheinen und macht so agiler."
    es: "Seta que, al ser ingerida, aligera el cuerpo y otorga\ngran agilidad y rapidez. Es un ingrediente vital de la\nGragea Evasiva."
    ko: "먹으면 몸이 가벼워져서\n민첩함이 오르는 버섯.\n잘-안맞기의 재료가 된다."
    zh_simp: "食用后会让身体变得轻盈，\n使速度变得更快的菇类。\n可作为闪避强化的材料。"
    zh_trad: "食用後會讓身體變得輕盈，\n使速度變得更快的菇類。\n可作為閃避強化的材料。"
douse_drive:
  names:
    jp_kana: アクアカセット
    jp_kanji: アクアカセット
    en: Douse Drive
    fr: Module Aqua
    it: Idromodulo
    de: Aquamodul
    es: HidroROM
    ko: 아쿠아카세트
    zh_simp: 水流卡带
    zh_trad: 水流卡帶
  descriptions:
    jp_kana: "ゲノセクトに　持たせると\nテクノバスターという　技が\nみずタイプになる　カセット。"
    jp_kanji: "ゲノセクトに　持たせると\nテクノバスターという　技が\nみずタイプになる　カセット。"
    en: "A cassette to be held by Genesect. It changes\nGenesect’s Techno Blast move so it becomes\nWater type."
    fr: "Tenu par Genesect, ce module change la capacité\nTechno-Buster en une capacité de type Eau."
    it: "Modulo da dare a Genesect. Trasforma Tecnobotto\nin una mossa di tipo Acqua."
    de: "Ein Item, das von Genesect getragen werden kann.\nEs wandelt den Typ der Attacke Techblaster in\nWasser um."
    es: "Cartucho que convierte Tecno Shock de Genesect en un\nmovimiento de tipo Agua."
    ko: "게노세크트에게 지니게 하면\n테크노버스터라는 기술이\n물타입으로 바뀌는 카세트."
    zh_simp: "这是让盖诺赛克特携带的卡带。\n携带后，高科技光炮这招式\n就会变为水属性。"
    zh_trad: "讓蓋諾賽克特攜帶的卡帶。\n攜帶後，招式高科技光炮\n會變為水屬性。"
dowsing_machine:
  names:
    jp_kana: ダウジングマシン
    jp_kanji: ダウジングマシン
    en: Dowsing Machine
    fr: Cherch’Objet
    it: Ricerca strumenti
    de: Itemradar
    es: Zahorí
    ko: 다우징머신
    zh_simp: 探宝器
    zh_trad: 探寶器
  descriptions:
    jp_kana: "みえない　道具に　反応して\n場所を　教えてくれる　最新の　機械。\n頭に　つけて　使う。"
    jp_kanji: "みえない　道具に　反応して\n場所を　教えてくれる　最新の　機械。\n頭に　つけて　使う。"
    en: "The latest device for showing the location of hidden\nitems. It’s worn on the head when in use."
    fr: "Un appareil high-tech qui indique l’emplacement\ndes objets invisibles. Il se porte sur la tête."
    it: "Dispositivo ultramoderno che rileva la presenza\ndi strumenti non visibili a occhio nudo.\nSi indossa sulla testa."
    de: "Scannt die Umgebung nach unsichtbaren Items und\nzeigt an, wo diese sich befinden. Es wird auf dem\nKopf getragen."
    es: "Aparato de precisión que reacciona ante objetos que no\nse ven. Para usarlo, es necesario colocárselo en la\ncabeza."
    ko: "보이지 않는 도구에 반응해서\n장소를 가르쳐 주는 최신 기계.\n머리에 쓰고 사용한다."
    zh_simp: "会对看不见的道具起反应，\n并将它的位置告诉你的最尖端机器。\n戴在头上使用。"
    zh_trad: "會對看不見的道具起反應，\n並將它的位置告訴你的最尖端機器。\n戴在頭上使用。"
draco_plate:
  names:
    jp_kana: りゅうのプレート
    jp_kanji: りゅうのプレート
    en: Draco Plate
    fr: Plaque Draco
    it: Lastradrakon
    de: Dracotafel
    es: Tabla Draco
    ko: 용의플레이트
    zh_simp: 龙之石板
    zh_trad: 龍之石板
  descriptions:
    jp_kana: "ドラゴンのタイプの　石盤。\n持たせると　ドラゴンタイプの\n技の威力が　強まる。"
    jp_kanji: "ドラゴンのタイプの　石盤。\n持たせると　ドラゴンタイプの\n技の威力が　強まる。"
    en: "An item to be held by a Pokémon. This stone tablet is\nimbued with the essence of dragons and boosts the\npower of the holder’s Dragon-type moves."
    fr: "Objet à tenir. Une tablette en pierre augmentant\nla puissance des capacités de type Dragon."
    it: "Strumento da dare a un Pokémon. Lastra di pietra che\npotenzia le mosse di tipo Drago."
    de: "Ein Item zum Tragen. Diese Steintafel verstärkt\nAttacken vom Typ Drache."
    es: "Tabla de piedra que potencia los movimientos de tipo\nDragón. Debe llevarla un Pokémon."
    ko: "드래곤타입의 석판.\n지니게 하면 드래곤타입\n기술의 위력이 강해진다."
    zh_simp: "龙属性的石板。\n携带后，龙属性的\n招式威力就会增强。"
    zh_trad: "龍屬性的石板。\n攜帶後，龍屬性的\n招式威力就會增強。"
dragon_fang:
  names:
    jp_kana: りゅうのキバ
    jp_kanji: りゅうのキバ
    en: Dragon Fang
    fr: Croc Dragon
    it: Dente di drago
    de: Drachenzahn
    es: Colmillo Dragón
    ko: 용의이빨
    zh_simp: 龙之牙
    zh_trad: 龍之牙
  descriptions:
    jp_kana: "硬くて　鋭い　キバ。\n持たせると　ドラゴンタイプの\n技の威力が　あがる。"
    jp_kanji: "硬くて　鋭い　キバ。\n持たせると　ドラゴンタイプの\n技の威力が　あがる。"
    en: "An item to be held by a Pokémon. This hard, sharp fang\nboosts the power of the holder’s Dragon-type moves."
    fr: "Objet à tenir. Un croc dur et pointu qui augmente\nla puissance des capacités de type Dragon."
    it: "Strumento da dare a un Pokémon. Dente duro e affilato\nche potenzia le mosse di tipo Drago."
    de: "Ein Item zum Tragen. Ein harter und scharfer Reißzahn,\nder Attacken vom Typ Drache verstärkt."
    es: "Colmillo afilado de gran dureza que potencia los\nmovimientos de tipo Dragón. Debe llevarlo un Pokémon."
    ko: "단단하고 날카로운 이빨.\n지니게 하면 드래곤타입\n기술의 위력이 올라간다."
    zh_simp: "坚硬锐利的牙齿。\n携带后，龙属性的\n招式威力就会提高。"
    zh_trad: "堅硬銳利的牙齒。\n攜帶後，龍屬性的\n招式威力就會提高。"
dragon_gem:
  names:
    jp_kana: ドラゴンジュエル
    jp_kanji: ドラゴンジュエル
    en: Dragon Gem
    fr: Joyau Dragon
    it: Bijoudrago
    de: Drakojuwel
    es: Gema Dragón
    ko: 드래곤주얼
    zh_simp: 龙之宝石
    zh_trad: 龍之寶石
  descriptions:
    jp_kana: "ドラゴンのタイプの　ジュエル。\n持たせると　１度だけ　ドラゴンの\n技の威力が　強まる。"
    jp_kanji: "ドラゴンのタイプの　ジュエル。\n持たせると　１度だけ　ドラゴンの\n技の威力が　強まる。"
    en: "An item to be held by a Pokémon. This gem is imbued\nwith the essence of dragons and will boost the power of\na Dragon-type move—but only once."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Dragon."
    it: "Strumento da dare a un Pokémon. Gioiello che potenzia\nuna sola volta le mosse di tipo Drago."
    de: "Ein Item zum Tragen. Dieses Juwel verstärkt einmalig\neine Attacke vom Typ Drache."
    es: "Joya de un solo uso que potencia un movimiento de\ntipo Dragón. Debe llevarla un Pokémon."
    ko: "드래곤타입의 주얼.\n지니게 하면 한 번만 드래곤\n기술의 위력이 강해진다."
    zh_simp: "龙属性的宝石。\n携带后，龙属性的\n招式威力仅会增强１次。"
    zh_trad: "龍屬性的寶石。\n攜帶後，龍屬性招式的\n威力會僅增強１次。"
dragon_memory:
  names:
    jp_kana: ドラゴンメモリ
    jp_kanji: ドラゴンメモリ
    en: Dragon Memory
    fr: ROM Dragon
    it: ROM Drago
    de: Drachen-Disc
    es: Disco Dragón
    ko: 드래곤메모리
    zh_simp: 龙存储碟
    zh_trad: 龍記憶碟
  descriptions:
    jp_kana: "ドラゴンタイプの　データが　入った\nメモリ。　特定のポケモンが　持つと\nタイプが　変わる。"
    jp_kanji: "ドラゴンタイプの　データが　入った\nメモリ。　特定のポケモンが　持つと\nタイプが　変わる。"
    en: "A memory disc that contains Dragon-type data.\nIt changes the type of the holder if held by\na certain species of Pokémon."
    fr: "Une carte mémoire contenant des données sur\nle type Dragon. Un certain Pokémon peut changer\nde type en l’équipant."
    it: "ROM contenente dati sul tipo Drago in formato digitale.\nPermette a un certo Pokémon di cambiare tipo."
    de: "Eine Disc mit Daten zum Typ Drache. Sie löst bei einem\nbestimmten Pokémon einen Typenwechsel aus."
    es: "Disco de datos que contiene información relativa al tipo\nDragón. Permite cambiar de tipo a cierto Pokémon."
    ko: "드래곤타입의 데이터가 들어 있는\n메모리. 특정 포켓몬이\n지니면 타입이 바뀐다."
    zh_simp: "装有龙属性数据的存储碟。\n特定宝可梦携带后，\n属性就会发生变化。"
    zh_trad: "裝有龍屬性資料的記憶碟。\n特定寶可夢攜帶後，\n就會產生屬性的變化。"
dragon_scale:
  names:
    jp_kana: りゅうのウロコ
    jp_kanji: りゅうのウロコ
    en: Dragon Scale
    fr: Écaille Draco
    it: Squama drago
    de: Drachenschuppe
    es: Escama Dragón
    ko: 용의비늘
    zh_simp: 龙之鳞片
    zh_trad: 龍之鱗片
  descriptions:
    jp_kana: "硬くて　丈夫な　ウロコ。\nドラゴンタイプの　ポケモンが\n持っていることが　ある。"
    jp_kanji: "硬くて　丈夫な　ウロコ。\nドラゴンタイプの　ポケモンが\n持っていることが　ある。"
    en: "A very tough and inflexible scale. Dragon-type Pokémon\nmay be holding this item when caught."
    fr: "Une écaille épaisse et dure, parfois tenue par\nles Pokémon de type Dragon."
    it: "Squama spessa e dura. Può averla un Pokémon\ndi tipo Drago."
    de: "Eine dicke und starke Haut. Drachen-Pokémon tragen\ndieses Item eventuell bei sich."
    es: "Una gruesa y resistente escama que a veces llevan los\nPokémon de tipo Dragón."
    ko: "단단하고 튼튼한 비늘.\n드래곤타입의 포켓몬이\n지니고 있는 경우가 있다."
    zh_simp: "又硬又坚固的鳞片。\n龙属性宝可梦有时会携带它。"
    zh_trad: "又硬又結實的鱗片。\n有時龍屬性寶可夢\n會攜帶著它。"
dragon_skull:
  names:
    jp_kana: ドラゴンのホネ
    jp_kanji: ドラゴンのホネ
    en: Dragon Skull
    fr: Crâne Dragon
    it: Teschio
    de: Drakoschädel
    es: Cráneo Dragón
    ko: 드래곤의뼈
    zh_simp: 龙之骨
    zh_trad: 龍之骨
  descriptions:
    jp_kana: "荒れ狂う　海を　ものともせず\n自由に　とびまわっていたと　される\nポケモンの　頭のホネ。"
    jp_kanji: "荒れ狂う　海を　ものともせず\n自由に　とびまわっていたと　される\nポケモンの　頭のホネ。"
    en: "The skull of a Pokémon that was said to have braved\nthe raging seas to fly around the world."
    fr: "Le crâne d’un Pokémon qui aurait survolé librement\nla mer déchaînée."
    it: "Teschio di un Pokémon che sorvolava libero i mari\nsenza temere neanche le più forti tempeste."
    de: "Der Schädel eines Pokémon, das einst wütendem\nSeegang zum Trotz frei um die Welt flog."
    es: "Cráneo de un Pokémon. Se dice que este Pokémon\ncruzó mares embravecidos."
    ko: "성난 바다 위를 개의치 않고\n자유롭게 날아다녔다는\n포켓몬의 머리뼈."
    zh_simp: "据说是能在狂风暴雨的\n大海上随意翱翔的宝可梦的头骨。"
    zh_trad: "據說是能在狂風暴雨的\n大海上任意翱翔的\n寶可夢的頭骨。"
dragon_tera_shard:
  names:
    jp_kana: テラピースドラゴン
    jp_kanji: テラピースドラゴン
    en: Dragon Tera Shard
    fr: Téra-Éclat Dragon
    it: Teralite Drago
    de: Tera-Stück (Drache)
    es: Teralito Dragón
    ko: 테라피스 드래곤
    zh_simp: 龙太晶碎块
    zh_trad: 龍太晶碎塊
  descriptions:
    jp_kana: "テラスタルポケモンが　倒れたとき\n砕けた　テラスタルジュエルが\nまれに　結晶化したもの。"
    jp_kanji: "テラスタルポケモンが　倒れたとき\n砕けた　テラスタルジュエルが\nまれに　結晶化したもの。"
    en: "On rare occasions, these shards form when a Tera\nPokémon falls in battle and its Tera Jewel shatters."
    fr: "Un fragment cristallisé qui se forme rarement lors\nde l’éclatement d’un Joyau Téracristal après qu’un\nPokémon Téracristal a été mis K.O."
    it: "Cristallizzazione che raramente si forma quando\nun Pokémon Teracristal viene sconfitto e la sua gemma\nTeracristal va in frantumi."
    de: "In äußerst seltenen Fällen kristallisieren Bruchstücke\ndes Terakristalls von im Kampf besiegten Terakristall-\nPokémon zu solchen Tera-Stücken."
    es: "Esquirla que se forma muy raramente cuando la joya\nTeracristal de un Pokémon teracristalizado se quiebra\ntras derrotarlo."
    ko: "테라스탈 포켓몬이 쓰러졌을 때\n부서진 테라스탈 주얼이\n드물게 결정화한 조각."
    zh_simp: "打倒太晶宝可梦时，\n破碎掉的太晶宝石有\n极低概率会结晶成此物。"
    zh_trad: "太晶寶可夢倒下時，\n碎裂的太晶寶石在罕見的情況下\n會結晶化，而形成此物。"
dragonium_z:bag:
  names:
    jp_kana: ドラゴンＺ
    jp_kanji: ドラゴンＺ
    en: Dragonium Z
    fr: Dracozélite
    it: Draconium Z
    de: Dracium Z
    es: Dracostal Z
    ko: 드래곤Z
    zh_simp: 龙Ｚ
    zh_trad: 龍Ｚ
  descriptions:
    jp_kana: "ドラゴンタイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    jp_kanji: "ドラゴンタイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nDragon-type moves to Dragon-type Z-Moves."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise son porteur à transformer ses capacités\nde type Dragon en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono ai Pokémon di trasformare le mosse\ndi tipo Drago in mosse Z."
    de: "Kristallisierte Z-Kraft, die Drachen-Attacken zu\nZ-Attacken aufstuft. Wird bei Bedarf automatisch\nvervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a los\nportadores convertir sus movimientos de tipo Dragón\nen movimientos Z."
    ko: "드래곤타입 기술을\nZ기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将龙属性招式升级成\nＺ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把龍屬性招式\n升級為Ｚ招式的Ｚ力量結晶。"
dragonium_z:held:
  names:
    jp_kana: ドラゴンＺ
    jp_kanji: ドラゴンＺ
    en: Dragonium Z
    fr: Dracozélite
    it: Draconium Z
    de: Dracium Z
    es: Dracostal Z
    ko: 드래곤Z
    zh_simp: 龙Ｚ
    zh_trad: 龍Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　結晶。\nドラゴンタイプの　技を\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nドラゴンタイプの　技を\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Dragon-type moves to Z-Moves."
    fr: "Une cristallisation de la Force Z, permettant\nde transformer les capacités de type Dragon\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare le mosse di tipo Drago\nin mosse Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft\nDrachen-Attacken zu Z-Attacken auf."
    es: "Cristal que confiere el Poder Z a los movimientos\nde tipo Dragón."
    ko: "Z파워의 결정.\n드래곤타입 기술을\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将龙属性的招式\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把龍屬性的招式\n升級為Ｚ招式。"
dratini_candy:
  names:
    jp_kana: ミニリュウのアメ
    jp_kanji: ミニリュウのアメ
    en: Dratini Candy
    fr: Bonbon Minidraco
    it: Caramella Dratini
    de: Dratini-Bonbon
    es: Caramelo Dratini
    ko: 미뇽의사탕
    zh_simp: 迷你龙的糖果
    zh_trad: 迷你龍的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
dratini_scales:
  names:
    jp_kana: ミニリュウのウロコ
    jp_kanji: ミニリュウのウロコ
    en: Dratini Scales
    fr: Écaille de Minidraco
    it: Squama di Dratini
    de: Dratini-Schuppe
    es: Escama de Dratini
    ko: 미뇽의비늘
    zh_simp: 迷你龙的鳞片
    zh_trad: 迷你龍的鱗片
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
dread_plate:
  names:
    jp_kana: こわもてプレート
    jp_kanji: こわもてプレート
    en: Dread Plate
    fr: Plaque Ombre
    it: Lastratimore
    de: Furchttafel
    es: Tabla Oscura
    ko: 공포플레이트
    zh_simp: 恶颜石板
    zh_trad: 惡顏石板
  descriptions:
    jp_kana: "あくのタイプの　石盤。\n持たせると　あくタイプの\n技の威力が　強まる。"
    jp_kanji: "あくのタイプの　石盤。\n持たせると　あくタイプの\n技の威力が　強まる。"
    en: "An item to be held by a Pokémon. This stone tablet is\nimbued with the essence of darkness and boosts the\npower of the holder’s Dark-type moves."
    fr: "Objet à tenir. Une tablette en pierre augmentant\nla puissance des capacités de type Ténèbres."
    it: "Strumento da dare a un Pokémon. Lastra di pietra che\npotenzia le mosse di tipo Buio."
    de: "Ein Item zum Tragen. Diese Steintafel verstärkt\nAttacken vom Typ Unlicht."
    es: "Tabla de piedra que potencia los movimientos de tipo\nSiniestro. Debe llevarla un Pokémon."
    ko: "악타입의 석판.\n지니게 하면 악타입\n기술의 위력이 강해진다."
    zh_simp: "恶属性的石板。\n携带后，恶属性的\n招式威力就会增强。"
    zh_trad: "惡屬性的石板。\n攜帶後，惡屬性的\n招式威力就會增強。"
dream_ball:
  names:
    jp_kana: ドリームボール
    jp_kanji: ドリームボール
    en: Dream Ball
    fr: Rêve Ball
    it: Dream Ball
    de: Traumball
    es: Ensueño Ball
    ko: 드림볼
    zh_simp: 梦境球
    zh_trad: 夢境球
  descriptions:
    jp_kana: "ねむり状態の\nポケモンが　捕まえやすくなる\nちょっと変わった　ボール。"
    jp_kanji: "ねむり状態の\nポケモンが　捕まえやすくなる\nちょっと変わった　ボール。"
    en: "A somewhat different Poké Ball that is more effective\nwhen catching Pokémon that are asleep."
    fr: "Une Poké Ball un peu spéciale qui fonctionne\nparticulièrement bien sur les Pokémon endormis."
    it: "Poké Ball un po’ diversa che funziona particolarmente\nbene con i Pokémon addormentati."
    de: "Ein Ball, mit dem sich schlafende Pokémon leichter\nfangen lassen."
    es: "Poké Ball algo distinta a las demás que funciona\nespecialmente bien con los Pokémon dormidos."
    ko: "잠듦 상태의\n포켓몬을 잡기 쉬운\n조금 특이한 볼."
    zh_simp: "有点与众不同的球。\n能很容易地捕捉\n睡眠状态的宝可梦。"
    zh_trad: "有點與眾不同的球。\n能更容易地捉到\n睡眠狀態的寶可夢。"
dreepy_powder:
  names:
    jp_kana: ドラメシヤのこな
    jp_kanji: ドラメシヤのこな
    en: Dreepy Powder
    fr: Poudre de Fantyrm
    it: Polvere di Dreepy
    de: Grolldra-Puder
    es: Polvo de Dreepy
    ko: 드라꼰의가루
    zh_simp: 多龙梅西亚的粉
    zh_trad: 多龍梅西亞的粉
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
drifloon_gas:
  names:
    jp_kana: フワンテのガス
    jp_kanji: フワンテのガス
    en: Drifloon Gas
    fr: Gaz de Baudrive
    it: Gas di Drifloon
    de: Driftlon-Gas
    es: Gas de Drifloon
    ko: 흔들풍손의가스
    zh_simp: 飘飘球的气体
    zh_trad: 飄飄球的氣體
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
