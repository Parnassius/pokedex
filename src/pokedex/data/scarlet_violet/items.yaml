pop_pod:
  names:
    jp_kana: バリバリモ
    jp_kanji: バリバリモ
    en: Pop Pod
    fr: Pétaralgue
    it: Scoppiettalga
    de: Knallmoos
    es: Marimo Ruidoso
    ko: 팡팡마리모
    zh_simp: 惊声藻
    zh_trad: 驚聲藻
  descriptions:
    jp_kana: "ばりばりだまの材料となる海藻。\n包んで空気の逃げ道を減らしてから\n衝撃を加えると大きな音が鳴る。"
    jp_kanji: "ばりばりだまの材料となる海藻。\n包んで空気の逃げ道を減らしてから\n衝撃を加えると大きな音が鳴る。"
    en: "A sea vegetable used for crafting Scatter Bangs. If you\nwrap it up so that the air has no way to escape, then\ndeal it a sharp blow, it produces a loud popping noise."
    fr: "Une algue qui sert à confectionner des Sachets Pétarade.\nLorsqu’on y emprisonne de l’air en la roulant en boule,\npuis qu’on y porte un coup, elle éclate bruyamment."
    it: "Alga impiegata nella fabbricazione delle Scoppiosfere.\nAvvolta in modo da intrappolare l’aria al suo interno,\ngenera un forte rumore quando viene colpita."
    de: "Eine Meeresalge, aus der Knallkugeln hergestellt werden.\nWird sie luftdicht gewickelt und dann einem starken\nSchlag ausgesetzt, erzeugt sie ein lautes Geräusch."
    es: "Alga marina necesaria para crear Bolas Ruidosas. Se\nenvuelve de forma que no deje escapar el aire y, al darle\nun golpe seco, provoca un fuerte estruendo."
    ko: "팡팡환의 재료가 되는 해초.\n감싸서 공기가 샐 틈을 좁힌 다음\n충격을 주면 커다란 소리가 난다."
    zh_simp: "能作为声弹的材料使用的海藻。\n将它包起来减少空气逸出的路径，\n然后施加冲击，就会发出巨大的声响。"
    zh_trad: "能作為聲彈的材料使用的海藻。\n將它包起來減少空氣逸出的管道，\n然後施加衝擊，就會發出巨大的聲響。"
porygon_candy:
  names:
    jp_kana: ポリゴンのアメ
    jp_kanji: ポリゴンのアメ
