potato_salad:
  names:
    jp_kana: ポテトサラダ
    jp_kanji: ポテトサラダ
    en: Potato Salad
    fr: Salade de Patates
    it: Insalata di patate
    de: Kartoffelsalat
    es: Ensaladilla
    ko: 감자샐러드
    zh_simp: 土豆沙拉
    zh_trad: 馬鈴薯沙拉
  descriptions:
    jp_kana: "酸味が　強い　食材。\nポテトを　メインにした　サラダ。\nパンとの相性は　かなりのもの。"
    jp_kanji: "酸味が　強い　食材。\nポテトを　メインにした　サラダ。\nパンとの相性は　かなりのもの。"
    en: "This very tart ingredient—a soft salad that’s all about\npotatoes—pairs tremendously well with bread."
    fr: "Un ingrédient au goût acide. Cette salade composée\nprincipalement de pommes de terre se marie\nmerveilleusement bien avec le pain."
    it: "Un ingrediente molto aspro. Questa insalata a base\ndi patate si sposa benissimo con il pane."
    de: "Bei dieser sehr sauren Zutat handelt es sich um Salat\nauf Kartoffelbasis, der sich ziemlich gut mit Brot\nkombinieren lässt."
    es: "El fuerte sabor ácido de esta ensalada con la patata\ncomo elemento principal es el acompañamiento\nperfecto para el pan."
    ko: "신맛이 강한 식재료.\n감자를 메인으로 만든 샐러드.\n빵과는 궁합이 상당히 잘 맞는다."
    zh_simp: "酸味强烈的食材。\n以土豆为主的沙拉。\n与面包的搭配程度不容小觑。"
    zh_trad: "酸味強勁的食材。\n以馬鈴薯為主的沙拉。\n和麵包極為搭配。"
potato_tortilla:
  names:
    jp_kana: トルティージャ
    jp_kanji: トルティージャ
    en: Potato Tortilla
    fr: Tortilla
    it: Tortilla
    de: Tortilla
    es: Tortilla
    ko: 토르티야
    zh_simp: 烘蛋
    zh_trad: 烘蛋
  descriptions:
    jp_kana: "塩味が　強い　食材。\nパルデアで　人気の料理。\nしっかりとした　ボリュームが　ある。"
    jp_kanji: "塩味が　強い　食材。\nパルデアで　人気の料理。\nしっかりとした　ボリュームが　ある。"
    en: "A very salty ingredient and a popular dish in Paldea.\nIt’s undeniably filling."
    fr: "Un ingrédient au goût très salé très populaire à Paldea.\nIl est rare d’avoir encore faim après en avoir mangé\nune entière."
    it: "Un ingrediente molto salato. Molto popolare a Paldea,\nè ricco e sostanzioso."
    de: "Diese sehr salzige Zutat erfreut sich in Paldea als Gericht\ngroßer Beliebtheit und ist ungemein sättigend."
    es: "Uno de los platos más populares de toda Paldea.\nComo ingrediente, aporta un fuerte sabor salado\ny bastante contundencia."
    ko: "짠맛이 강한 식재료.\n팔데아에서 인기가 많다.\n포만감을 확실하게 가져다준다."
    zh_simp: "咸味强烈的食材。\n在帕底亚是很有人气的料理。\n拥有充足的份量。"
    zh_trad: "鹹味強勁的食材。\n在帕底亞地區是熱門料理。\n分量相當充足。"
potion:
  names:
    jp_kana: キズぐすり
    jp_kanji: キズぐすり
    en: Potion
    fr: Potion
    it: Pozione
    de: Trank
    es: Poción
    ko: 상처약
    zh_simp: 伤药
    zh_trad: 傷藥
  descriptions:
    jp_kana: "スプレー式の　キズぐすり。\nポケモン　１匹の　ＨＰを\n２０だけ　回復する。"
    jp_kanji: "スプレー式の　キズぐすり。\nポケモン　１匹の　ＨＰを\n２０だけ　回復する。"
    en: "A spray-type medicine for treating wounds. It can be\nused to restore 20 HP to a Pokémon."
    fr: "Un spray qui soigne les blessures.\nRestaure 20 PV d’un Pokémon."
    it: "Rimedio spray per le ferite. Restituisce 20 PS\na un Pokémon."
    de: "Hilft bei Wunden. Füllt die KP eines Pokémon um\n20 Punkte auf."
    es: "Medicina en espray que cura heridas y restaura 20 PS\nde un Pokémon."
    ko: "스프레이식의 상처약.\n포켓몬 1마리의 HP를\n20만큼 회복한다."
    zh_simp: "喷雾式伤药。\n能让１只宝可梦\n回复２０ＨＰ。"
    zh_trad: "噴霧式傷藥。\n能讓１隻寶可夢\n回復２０ＨＰ。"
potion:recipe:
  names:
    jp_kana: キズぐすり
    jp_kanji: キズぐすり
