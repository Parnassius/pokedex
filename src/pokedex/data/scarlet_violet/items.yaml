curry_powder:
  names:
    jp_kana: カレーパウダー
    jp_kanji: カレーパウダー
    en: Curry Powder
    fr: Curry en Poudre
    it: Curry in polvere
    de: Currypulver
    es: Curri en Polvo
    ko: 카레파우더
    zh_simp: 咖喱粉
    zh_trad: 咖哩粉
  descriptions:
    jp_kana: "辛味が　強い　調味料。\n優れた調味料だが　使いすぎると\nほかの食材の　味がなくなるので　注意。"
    jp_kanji: "辛味が　強い　調味料。\n優れた調味料だが　使いすぎると\nほかの食材の　味がなくなるので　注意。"
    en: "A very spicy condiment. Just watch out—use too much\nof this potent seasoning, and it’ll cancel out the other\nflavors."
    fr: "Un condiment au goût très épicé. Il présente de\nnombreux avantages, mais il ne faut pas en abuser,\nau risque de masquer les autres saveurs."
    it: "Un ingrediente molto piccante. È un ottimo condimento\nma bisogna usarlo con attenzione, perché in grandi\nquantità copre i sapori degli altri ingredienti."
    de: "Ein nützliches, aber sehr scharfes Würzmittel. Man sollte\nsich davor hüten, es allzu großzügig zu verwenden, da es\nandere Geschmacksnoten schnell überlagert."
    es: "Además de ser muy picante, el sabor tan fuerte de este\ncondimento enseguida eclipsa los sabores de los demás\ningredientes, por lo que es mejor no pasarse con él."
    ko: "매운맛이 강한 조미료.\n뛰어난 조미료이나 너무 많이 사용하면\n다른 식재료의 맛이 사라지므로 주의해야 한다."
    zh_simp: "辣味强烈的调味料。\n虽然是很出色的调味料，但需注意\n下太多可会抢掉其他食材的味道。"
    zh_trad: "辣味強勁的調味料。\n是一種出色的調味料，但請注意：\n使用過量會使其他食材失去滋味。"
custap_berry:
  names:
    jp_kana: イバンのみ
    jp_kanji: イバンのみ
    en: Custap Berry
    fr: Baie Chérim
    it: Baccacrela
    de: Eipfelbeere
    es: Baya Chiri
    ko: 애슈열매
    zh_simp: 释陀果
    zh_trad: 釋陀果
  descriptions:
    jp_kana: "ポケモンに　持たせると\nピンチのとき　１度だけ\n行動が　早くなる。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　１度だけ\n行動が　早くなる。"
    en: "If a Pokémon holds one of these Berries, it will be able\nto act faster should it find itself in a pinch—but only for\nthe next move it uses."
    fr: "Tenue, cette Baie permet d’utiliser une capacité\nen priorité une fois en cas de besoin."
    it: "Se il Pokémon che ha questa bacca si trova in difficoltà,\nagisce più velocemente. Funziona una sola volta."
    de: "Als getragenes Item ermöglicht diese Beere dem\nPokémon in einer Notlage einmalig den Erstschlag."
    es: "Si la lleva un Pokémon, puede actuar en primer lugar\nuna vez en un momento de apuro."
    ko: "포켓몬에게 지니게 하면\n위급할 때 한 번만\n행동이 빨라진다."
    zh_simp: "让宝可梦携带后，危机时，\n行动仅会变快１次。"
    zh_trad: "讓寶可夢攜帶後，\n危機時，行動會僅\n變快１次。"
cutiefly_powder:
  names:
    jp_kana: アブリーのこな
    jp_kanji: アブリーのこな
    en: Cutiefly Powder
    fr: Poudre de Bombydou
    it: Polvere di Cutiefly
    de: Wommel-Puder
    es: Polvo de Cutiefly
    ko: 에블리의가루
    zh_simp: 萌虻的粉
    zh_trad: 萌虻的粉
  descriptions:
