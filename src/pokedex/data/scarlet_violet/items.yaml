mint_chairs:
  names:
    jp_kana: ミントチェア
    jp_kanji: ミントチェア
    en: Mint Chairs
    fr: Sièges Menthe
    it: Sedie menta
    de: Türkise Stühle
    es: Sillas Menta
    ko: 민트 체어
    zh_simp: 浅绿椅子
    zh_trad: 淺綠椅子
  descriptions:
    jp_kana: "ピクニックで　使いやすい　イス。\nミントクロスの　デザインを\nもとに　作ってもらった。"
    jp_kanji: "ピクニックで　使いやすい　イス。\nミントクロスの　デザインを\nもとに　作ってもらった。"
    en: "A set of chairs that are ideal for picnicking. Their design\nwas inspired by the Mint Tablecloth."
    fr: "Des sièges parfaits pour les pique-niques.\nLeur design est inspiré de la Nappe Menthe."
    it: "Pratiche sedie, perfette per i picnic, ispirate al design\ndella Tovaglia menta."
    de: "Diese Stühle sind gut geeignet für Picknicks.\nIhr Design basiert auf dem Türkisen Tischtuch."
    es: "Unas sillas ideales para irse de pícnic. Su diseño está\nbasado en el del Mantel Menta."
    ko: "피크닉에서 사용하기 편한 의자.\n민트 테이블보의\n디자인을 토대로 만들어졌다."
    zh_simp: "在野餐时很好用的椅子。\n根据浅绿桌巾的设计制作而成。"
    zh_trad: "野餐時很好用的椅子。\n根據淺綠桌巾的設計製作而成。"
mint_tablecloth:
  names:
    jp_kana: ミントクロス
    jp_kanji: ミントクロス
    en: Mint Tablecloth
    fr: Nappe Menthe
    it: Tovaglia menta
    de: Türkises Tischtuch
    es: Mantel Menta
    ko: 민트 테이블보
    zh_simp: 浅绿桌巾
    zh_trad: 淺綠桌巾
  descriptions:
    jp_kana: "やわらかい　ミントカラーの　テーブルクロス。\n肌に優しい　サラリとした　さわり心地で\n食器を　置いても　音を　立てない。"
    jp_kanji: "やわらかい　ミントカラーの　テーブルクロス。\n肌に優しい　サラリとした　さわり心地で\n食器を　置いても　音を　立てない。"
    en: "A light mint-colored tablecloth. It’s smooth and pleasant\nto the touch, and dishes can be placed on it with hardly\na sound."
    fr: "Une nappe d’une douce couleur menthe. Sa texture\nsatinée est agréable au toucher et étouffe le bruit\ndes plats lorsqu’on les pose dessus."
    it: "Tovaglia di un delicato color menta. È così liscia e\nmorbida al tatto che quando ci poggi le stoviglie\nnon fanno rumore."
    de: "Dieses weiche türkise Tischtuch aus hautfreundlichem,\nglattem Material absorbiert jegliches Geräusch von\nGeschirr, das darauf platziert wird."
    es: "Un mantel de un suave color menta. Está hecho de un\nmaterial tan sedoso y delicado que hasta absorbe el\nsonido que producen los platos al colocarlos sobre él."
    ko: "부드러운 민트 컬러의 테이블보.\n피부에 자극이 적은 매끈한 재질이며\n식기를 올려놓아도 소리가 나지 않는다."
    zh_simp: "柔软的浅绿色桌巾。\n丝柔顺滑亲近肌肤，\n放上餐具也不会发出声音。"
    zh_trad: "以柔和的淺綠色為質地的桌巾。\n觸感輕柔，如同撫過肌膚一般，\n而且放置餐具時也不會發出聲響。"
