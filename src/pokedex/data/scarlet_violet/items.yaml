    jp_kana: "クリティカッターのレシピ。　材料は\nキュウショウロ×２　スイートトリュフ×１"
    jp_kanji: "クリティカッターのレシピ。　材料は\nキュウショウロ×２　スイートトリュフ×１"
    en: "A recipe for crafting Dire Hits from scratch.\nRequired materials: 2 Direshrooms and 1 Candy Truffle."
