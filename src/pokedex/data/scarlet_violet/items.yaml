cream_cheese:
  names:
    jp_kana: クリームチーズ
    jp_kanji: クリームチーズ
    en: Cream Cheese
    fr: Fromage Frais
    it: Formaggio cremoso
    de: Frischkäse
    es: Queso Crema
    ko: 크림치즈
    zh_simp: 奶油芝士
    zh_trad: 奶油起司
  descriptions:
    jp_kana: "甘味と　酸味と　塩味の　調味料。\nマッチする食材が　意外と　多く\n使い勝手が　よい　食材なのだ。"
    jp_kanji: "甘味と　酸味と　塩味の　調味料。\nマッチする食材が　意外と　多く\n使い勝手が　よい　食材なのだ。"
    en: "A condiment offering very sweet and very tart flavor.\nIt goes well with more ingredients than you’d expect,\nmaking it a convenient go-to."
    fr: "Un condiment au goût sucré, acide et salé. Sa nature\nversatile en fait un accompagnement agréable pour\nune quantité surprenante d’ingrédients."
    it: "Un condimento dolce, aspro e salato. Si abbina\nbene a una sorprendente varietà di ingredienti e\nper questo è molto versatile."
    de: "Dieses Würzmittel ist eine sehr vielseitige Zutat, da es\nsüße, saure sowie salzige Geschmacksnoten vereint und\nso mit den unterschiedlichsten Belägen harmoniert."
    es: "Gracias a que combina dulzor, acidez y un toque salado,\nes un ingrediente muy versátil que casa muy bien con\nmuchos otros."
    ko: "단맛과 신맛과 짠맛이 나는 조미료.\n어울리는 식재료가 은근히 많아서\n아무 때나 쓰기 좋은 식재료다."
    zh_simp: "带有甜味、酸味和咸味的调味料。\n意外地与不少食材都很搭配，\n是能随意运用的调味料。"
    zh_trad: "帶有甜味、酸味和鹹味的調味料。\n能搭配的食材意外地多，\n是很好使用的百搭食材。"
croagunk_poison:
  names:
    jp_kana: グレッグルのどくそ
    jp_kanji: グレッグルのどくそ
    en: Croagunk Poison
    fr: Poison de Cradopaud
    it: Tossine di Croagunk
    de: Glibunkel-Toxin
    es: Toxinas de Croagunk
    ko: 삐딱구리의독소
    zh_simp: 不良蛙的毒素
    zh_trad: 不良蛙的毒素
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
