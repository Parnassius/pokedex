    zh_trad: 基因石板
  descriptions:
    jp_kana: "不思議な　力に　あふれる　石板。\nハマナスパークの　遺伝子の部屋と\n深い　つながりを　感じる。"
    jp_kanji: "不思議な　力に　あふれる　石板。\nハマナスパークの　遺伝子の部屋と\n深い　つながりを　感じる。"
    en: "A slate overflowing with enigmatic energy. You can feel\na strong connection between it and the Genome Room\nat Ramanas Park."
    fr: "Une tablette qui regorge d’une étrange énergie.\nElle semble intimement liée à la Salle de la Génétique\ndu Parc Rosa Rugosa."
    it: "Lastra di pietra che emana una misteriosa energia.\nSembra profondamente connessa alla Stanza del gene\ndel Parco Rosa Rugosa."
    de: "Eine Platte, die vor rätselhafter Energie strotzt.\nMan kann eine starke Verbindung zwischen ihr und der\nGenkammer im Hamanasu-Park spüren."
    es: "Una losa rebosante de una misteriosa energía. Parece\nestrechamente relacionada con la Sala de la Genética\ndel Parque Hansa."
    ko: "신비한 힘이 넘치는 석판.\n해당화파크의 유전자의 방과\n깊은 연관이 있는 것 같다."
    zh_simp: "充满了神秘力量的石板。\n感觉它与玫瑰公园的基因之厅\n有着很深的关联。"
    zh_trad: "充滿神奇力量的石板。\n感覺它和玫瑰公園的基因之廳\n有很深的關係。"
gentle_mint:
  names:
    jp_kana: おとなしいミント
    jp_kanji: おとなしいミント
    en: Gentle Mint
    fr: Aromate Gentil
    it: Menta Gentile
    de: Zart-Minze
    es: Menta Amable
    ko: 얌전민트
    zh_simp: 温顺薄荷
    zh_trad: 溫順薄荷
  descriptions:
    jp_kana: "ポケモンに　香りを　かがせると\n特防が　上がりやすく　なるが\n防御は　上がりにくくなる　ミント。"
    jp_kanji: "ポケモンに　香りを　かがせると\n特防が　上がりやすく　なるが\n防御は　上がりにくくなる　ミント。"
    en: "Having a Pokémon smell this mint can make its Sp. Def\nstat grow stronger. However, its Defense stat may suffer."
    fr: "Si un Pokémon hume cet aromate, sa Défense Spéciale\nmontera plus facilement, mais sa Défense\nse développera plus lentement."
    it: "Quando un Pokémon ne sente il profumo,\nla sua Difesa Speciale aumenta più facilmente\na scapito della Difesa."
    de: "Lässt man ein Pokémon an dieser Minze schnuppern,\nsteigt seine Spezial-Verteidigung schneller, aber seine\nVerteidigung umso langsamer."
    es: "Cuando un Pokémon percibe su aroma, aumenta con\nmás facilidad su Defensa Especial, en detrimento de su\nDefensa."
    ko: "포켓몬에게 향기를 맡게 하면\n특수방어가 오르기 쉬워지지만\n방어가 오르기 어려워지는 민트."
    zh_simp: "宝可梦闻了这种薄荷之后，\n会令特防容易提高，\n而防御则难以提高。"
    zh_trad: "讓寶可夢聞這種薄荷的氣味，\n會令特防變得容易提高，\n但防禦則難以提高。"
