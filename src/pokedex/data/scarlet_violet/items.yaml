magnet:
  names:
    jp_kana: じしゃく
    jp_kanji: じしゃく
    en: Magnet
    fr: Aimant
    it: Calamita
    de: Magnet
    es: Imán
    ko: 자석
    zh_simp: 磁铁
    zh_trad: 磁鐵
  descriptions:
    jp_kana: "強力な　磁石。\n持たせると　でんきタイプの\n技の威力が　あがる。"
    jp_kanji: "強力な　磁石。\n持たせると　でんきタイプの\n技の威力が　あがる。"
    en: "An item to be held by a Pokémon. It’s a powerful magnet\nthat boosts the power of the holder’s Electric-type\nmoves."
    fr: "Objet à tenir. Un aimant puissant qui augmente\nla puissance des capacités de type Électrik."
    it: "Strumento da dare a un Pokémon. Potente magnete\nche potenzia le mosse di tipo Elettro."
    de: "Ein Item zum Tragen. Ein starker Magnet, der Attacken\nvom Typ Elektro verstärkt."
    es: "Su potente magnetismo potencia los movimientos de\ntipo Eléctrico. Debe llevarlo un Pokémon."
    ko: "강력한 자석.\n지니게 하면 전기타입\n기술의 위력이 올라간다."
    zh_simp: "强力的磁铁。\n携带后，电属性的\n招式威力就会提高。"
    zh_trad: "強力的磁鐵。\n攜帶後，電屬性的\n招式威力就會提高。"
mago_berry:
  names:
    jp_kana: マゴのみ
    jp_kanji: マゴのみ
    en: Mago Berry
    fr: Baie Mago
    it: Baccamango
    de: Magobeere
    es: Baya Ango
    ko: 마고열매
    zh_simp: 芒芒果
    zh_trad: 芒芒果
  descriptions:
    jp_kana: "ポケモンに　持たせると\nピンチのとき　ＨＰを　回復する。\nきらいな味だと　混乱する。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　ＨＰを　回復する。\nきらいな味だと　混乱する。"
    en: "If a Pokémon holds one of these Berries, it will be able\nto restore some HP should it find itself in a pinch.\nBut it will become confused if it hates the Berry’s taste."
    fr: "Tenue, cette Baie restaure des PV en cas de besoin,\nmais rend le Pokémon confus si son goût lui déplaît."
    it: "Se un Pokémon in difficoltà ha questa bacca, recupera\ndei PS. Se al Pokémon non piace il suo sapore,\npuò causare confusione."
    de: "Als getragenes Item füllt diese Beere in einer Notlage\ndie KP des Pokémon auf, doch ihr Aroma verwirrt jene,\ndie es nicht mögen."
    es: "Los Pokémon pueden llevarla y usarla para restaurar\nalgunos PS en un momento de apuro. Su sabor puede\ncausar confusión si no les gusta."
    ko: "포켓몬에게 지니게 하면\n위급할 때 HP를 회복한다.\n싫어하는 맛이면 혼란에 빠진다."
    zh_simp: "让宝可梦携带后，\n危机时可以回复ＨＰ。\n如果讨厌这味道就会混乱。"
    zh_trad: "讓寶可夢攜帶後，\n危機時可以回復ＨＰ。\n如果討厭這味道就會混亂。"
magost_berry:
  names:
    jp_kana: ゴスのみ
    jp_kanji: ゴスのみ
    en: Magost Berry
    fr: Baie Mangou
    it: Baccagostan
    de: Magostbeere
    es: Baya Aostan
    ko: 고스티열매
    zh_simp: 岳竹果
    zh_trad: 岳竹果
  descriptions:
    jp_kana: "かわいさに　磨きを　かけるための\nポロックを　作るとき　使われる。\nほかの地方では　めずらしい　きのみ。"
    jp_kanji: "かわいさに　磨きを　かけるための\nポロックを　作るとき　使われる。\nほかの地方では　めずらしい　きのみ。"
    en: "Used to make Pokéblocks that will enhance Cuteness.\nThis Berry is rare in other regions."
    fr: "Une Baie très rare en dehors de cette région,\nutilisée pour préparer des Pokéblocs permettant\nd’augmenter la Grâce d’un Pokémon."
    it: "Bacca difficile da trovare in altre regioni usata per creare\nPokémelle che aumentano la Grazia del Pokémon."
    de: "Eine Beerensorte, die als Zutat für Pokériegel\nverwendet wird, welche die Putzigkeit erhöhen.\nIn anderen Regionen ist sie eher selten zu finden."
    es: "Se utiliza en la producción de Pokécubos que potencian\nla dulzura. Es una baya muy rara en otras regiones."
    ko: "귀여움을 연마하기 위한\n포켓몬스넥을 만들 때 사용된다.\n다른 지방에서는 희귀한 나무열매."
    zh_simp: "用于制作宝可方块，\n制作出来的宝可方块可用来打磨可爱。\n在其他地区很少见的树果。"
    zh_trad: "製作用於增進可愛的\n寶可方塊時使用。\n在其他地區很少見的樹果。"
