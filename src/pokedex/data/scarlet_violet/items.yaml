latias_treat:
  names:
    jp_kana: ラティアスのおやつ
    jp_kanji: ラティアスのおやつ
    en: Latias Treat
    fr: Friandise Latias
    it: Spuntino per Latias
    de: Latias-Snack
    es: Galleta Latias
    ko: 라티아스의간식
    zh_simp: 拉帝亚斯的点心
    zh_trad: 拉帝亞斯的點心
  descriptions:
    jp_kana: "伝説のポケモン　ラティアスが\n好む食材で　作られた　おやつ。"
    jp_kanji: "伝説のポケモン　ラティアスが\n好む食材で　作られた　おやつ。"
    en: "A snack made from ingredients favored by the\nLegendary Pokémon Latias."
    fr: "Une friandise préparée avec les ingrédients favoris\ndu Pokémon légendaire Latias."
    it: "Uno spuntino fatto con gli ingredienti preferiti\ndal Pokémon leggendario Latias."
    de: "Dieser Snack wurde mit den Lieblingszutaten des\nLegendären Pokémon Latias zubereitet."
    es: "Galleta preparada con los ingredientes favoritos\ndel Pokémon legendario Latias."
    ko: "전설의 포켓몬 라티아스가\n좋아하는 식재료로 만들어진 간식."
    zh_simp: "用传说的宝可梦拉帝亚斯\n喜欢的食材制作的点心。"
    zh_trad: "用傳說的寶可夢拉帝亞斯\n喜愛的食材製成的點心。"
latiasite:
  names:
    jp_kana: ラティアスナイト
    jp_kanji: ラティアスナイト
    en: Latiasite
    fr: Latiasite
    it: Latiasite
    de: Latiasnit
    es: Latiasita
    ko: 라티아스나이트
    zh_simp: 拉帝亚斯进化石
    zh_trad: 拉帝亞斯進化石
  descriptions:
    jp_kana: "ラティアスに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    jp_kanji: "ラティアスに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Latias hold it, and this stone will enable it to\nMega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par Latias, elle lui permet de\nméga-évoluer durant un combat."
    it: "Una delle misteriose Megapietre. Data a Latias,\ngli permette di megaevolversi durante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Latias getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Latias en combate."
    ko: "라티아스에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让拉帝亚斯携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓拉帝亞斯攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
latios_treat:
  names:
    jp_kana: ラティオスのおやつ
    jp_kanji: ラティオスのおやつ
