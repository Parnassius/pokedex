durin_berry:
  names:
    jp_kana: ドリのみ
    jp_kanji: ドリのみ
    en: Durin Berry
    fr: Baie Durin
    it: Baccadurian
    de: Durinbeere
    es: Baya Rudion
    ko: 두리열매
    zh_simp: 金枕果
    zh_trad: 金枕果
  descriptions:
    jp_kana: "かしこさに　磨きを　かけるための\nポロックを　作るとき　使われる。\nほかの地方では　めずらしい　きのみ。"
    jp_kanji: "かしこさに　磨きを　かけるための\nポロックを　作るとき　使われる。\nほかの地方では　めずらしい　きのみ。"
    en: "Used to make Pokéblocks that will enhance Cleverness.\nThis Berry is rare in other regions."
    fr: "Une Baie très rare en dehors de cette région,\nutilisée pour préparer des Pokéblocs permettant\nd’augmenter l’Intelligence d’un Pokémon."
    it: "Bacca difficile da trovare in altre regioni usata per creare\nPokémelle che aumentano l’Acume del Pokémon."
    de: "Eine Beerensorte, die als Zutat für Pokériegel\nverwendet wird, welche die Klugheit erhöhen.\nIn anderen Regionen ist sie eher selten zu finden."
    es: "Se utiliza en la producción de Pokécubos que potencian\nel ingenio. Es una baya muy rara en otras regiones."
    ko: "슬기로움을 연마하기 위한\n포켓몬스넥을 만들 때 사용된다.\n다른 지방에서는 희귀한 나무열매."
    zh_simp: "用于制作宝可方块，\n制作出来的宝可方块可用来打磨聪明。\n在其他地区很少见的树果。"
    zh_trad: "製作用於增進聰明的\n寶可方塊時使用。\n在其他地區很少見的樹果。"
dusk_ball:
  names:
    jp_kana: ダークボール
    jp_kanji: ダークボール
    en: Dusk Ball
    fr: Sombre Ball
    it: Scuro Ball
    de: Finsterball
    es: Ocaso Ball
    ko: 다크볼
    zh_simp: 黑暗球
    zh_trad: 黑暗球
  descriptions:
    jp_kana: "夜や　洞窟など　暗いところで\nポケモンが　捕まえやすくなる\nちょっと変わった　ボール。"
    jp_kanji: "夜や　洞窟など　暗いところで\nポケモンが　捕まえやすくなる\nちょっと変わった　ボール。"
    en: "A somewhat different Poké Ball that is more effective\nwhen catching Pokémon at night or in dark places,\nsuch as caves."
    fr: "Une Poké Ball un peu spéciale qui permet de capturer\nles Pokémon plus facilement la nuit ou dans les endroits\nsombres, tels que les grottes."
    it: "Poké Ball un po’ diversa che rende più facile\ncatturare Pokémon selvatici di notte o in luoghi\nbui come le grotte."
    de: "Ein mysteriöser Ball, mit dem sich Pokémon in der Nacht\noder an dunklen Orten leichter fangen lassen."
    es: "Poké Ball algo distinta a las demás especialmente\nindicada para capturar Pokémon salvajes por la noche\no en lugares oscuros."
    ko: "밤이나 동굴 등 어두운 곳에서\n포켓몬을 잡기 쉬운\n조금 특이한 볼."
    zh_simp: "有点与众不同的球。\n能很容易地在夜晚或洞窟等\n阴暗的地方捕捉宝可梦。"
    zh_trad: "有點與眾不同的球。\n容易在夜晚或洞窟等陰暗的地方\n捉到寶可夢。"
dusk_stone:
  names:
    jp_kana: やみのいし
    jp_kanji: やみのいし
    en: Dusk Stone
    fr: Pierre Nuit
    it: Neropietra
    de: Finsterstein
    es: Piedra Noche
    ko: 어둠의돌
    zh_simp: 暗之石
    zh_trad: 暗之石
  descriptions:
    jp_kana: "ある特定の　ポケモンを\n進化させる　不思議な　石。\nやみのように　暗い。"
    jp_kanji: "ある特定の　ポケモンを\n進化させる　不思議な　石。\nやみのように　暗い。"
    en: "A peculiar stone that can make certain species of\nPokémon evolve. It holds dark shadows within it."
    fr: "Une pierre étrange qui fait évoluer certaines espèces\nde Pokémon. Elle est sombre comme une nuit sans lune."
    it: "Pietra particolare che fa evolvere determinate specie\ndi Pokémon. È scura come le tenebre."
    de: "Dieser besondere Stein löst bei bestimmten Pokémon\ndie Entwicklung aus. Er ist sehr düster."
    es: "Curiosa piedra que hace evolucionar a determinadas\nespecies de Pokémon. Es oscura como la noche."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 돌.\n칠흑처럼 어둡다."
    zh_simp: "能让某些特定宝可梦\n进化的神奇石头。\n像黑夜一般漆黑。"
    zh_trad: "能讓特定寶可夢\n進化的神奇石頭。\n像黑暗一般漆黑。"
