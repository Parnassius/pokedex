grass_gem:
  names:
    jp_kana: くさのジュエル
    jp_kanji: くさのジュエル
    en: Grass Gem
    fr: Joyau Plante
    it: Bijouerba
    de: Pflanzenjuwel
    es: Gema Planta
    ko: 풀주얼
    zh_simp: 草之宝石
    zh_trad: 草之寶石
  descriptions:
    jp_kana: "くさのタイプの　ジュエル。\n持たせると　１度だけ　くさの\n技の威力が　強まる。"
    jp_kanji: "くさのタイプの　ジュエル。\n持たせると　１度だけ　くさの\n技の威力が　強まる。"
    en: "An item to be held by a Pokémon. This gem is imbued\nwith the essence of plants and will boost the power of\na Grass-type move—but only once."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Plante."
    it: "Strumento da dare a un Pokémon. Gioiello che potenzia\nuna sola volta le mosse di tipo Erba."
    de: "Ein Item zum Tragen. Dieses Juwel verstärkt einmalig\neine Attacke vom Typ Pflanze."
    es: "Joya de un solo uso que potencia un movimiento de\ntipo Planta. Debe llevarla un Pokémon."
    ko: "풀타입의 주얼.\n지니게 하면 한 번만 풀\n기술의 위력이 강해진다."
    zh_simp: "草属性的宝石。\n携带后，草属性的\n招式威力仅会增强１次。"
    zh_trad: "草屬性的寶石。\n攜帶後，草屬性招式的\n威力會僅增強１次。"
grass_memory:
  names:
    jp_kana: グラスメモリ
    jp_kanji: グラスメモリ
    en: Grass Memory
    fr: ROM Plante
    it: ROM Erba
    de: Pflanzen-Disc
    es: Disco Planta
    ko: 그래스메모리
    zh_simp: 青草存储碟
    zh_trad: 青草記憶碟
  descriptions:
    jp_kana: "くさタイプの　データが　入った\nメモリ。　特定のポケモンが　持つと\nタイプが　変わる。"
    jp_kanji: "くさタイプの　データが　入った\nメモリ。　特定のポケモンが　持つと\nタイプが　変わる。"
    en: "A memory disc that contains Grass-type data.\nIt changes the type of the holder if held by\na certain species of Pokémon."
    fr: "Une carte mémoire contenant des données sur\nle type Plante. Un certain Pokémon peut changer\nde type en l’équipant."
    it: "ROM contenente dati sul tipo Erba in formato digitale.\nPermette a un certo Pokémon di cambiare tipo."
    de: "Eine Disc mit Daten zum Typ Pflanze. Sie löst bei einem\nbestimmten Pokémon einen Typenwechsel aus."
    es: "Disco de datos que contiene información relativa al tipo\nPlanta. Permite cambiar de tipo a cierto Pokémon."
    ko: "풀타입의 데이터가 들어 있는\n메모리. 특정 포켓몬이\n지니면 타입이 바뀐다."
    zh_simp: "装有草属性数据的存储碟。\n特定宝可梦携带后，\n属性就会发生变化。"
    zh_trad: "裝有草屬性資料的記憶碟。\n特定寶可夢攜帶後，\n就會產生屬性的變化。"
grass_tera_shard:
  names:
    jp_kana: テラピースくさ
    jp_kanji: テラピースくさ
    en: Grass Tera Shard
    fr: Téra-Éclat Plante
    it: Teralite Erba
    de: Tera-Stück (Pflanze)
    es: Teralito Planta
    ko: 테라피스 풀
    zh_simp: 草太晶碎块
    zh_trad: 草太晶碎塊
  descriptions:
    jp_kana: "テラスタルポケモンが　倒れたとき\n砕けた　テラスタルジュエルが\nまれに　結晶化したもの。"
    jp_kanji: "テラスタルポケモンが　倒れたとき\n砕けた　テラスタルジュエルが\nまれに　結晶化したもの。"
    en: "On rare occasions, these shards form when a Tera\nPokémon falls in battle and its Tera Jewel shatters."
    fr: "Un fragment cristallisé qui se forme rarement lors\nde l’éclatement d’un Joyau Téracristal après qu’un\nPokémon Téracristal a été mis K.O."
    it: "Cristallizzazione che raramente si forma quando\nun Pokémon Teracristal viene sconfitto e la sua gemma\nTeracristal va in frantumi."
    de: "In äußerst seltenen Fällen kristallisieren Bruchstücke\ndes Terakristalls von im Kampf besiegten Terakristall-\nPokémon zu solchen Tera-Stücken."
    es: "Esquirla que se forma muy raramente cuando la joya\nTeracristal de un Pokémon teracristalizado se quiebra\ntras derrotarlo."
    ko: "테라스탈 포켓몬이 쓰러졌을 때\n부서진 테라스탈 주얼이\n드물게 결정화한 조각."
    zh_simp: "打倒太晶宝可梦时，\n破碎掉的太晶宝石有\n极低概率会结晶成此物。"
    zh_trad: "太晶寶可夢倒下時，\n碎裂的太晶寶石在罕見的情況下\n會結晶化，而形成此物。"
grassium_z:bag:
  names:
    jp_kana: クサＺ
    jp_kanji: クサＺ
    en: Grassium Z
    fr: Florazélite
    it: Herbium Z
    de: Botanium Z
    es: Fitostal Z
    ko: 풀Z
    zh_simp: 草Ｚ
    zh_trad: 草Ｚ
  descriptions:
    jp_kana: "くさタイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    jp_kanji: "くさタイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nGrass-type moves to Grass-type Z-Moves."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise son porteur à transformer ses capacités\nde type Plante en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono ai Pokémon di trasformare le mosse\ndi tipo Erba in mosse Z."
    de: "Kristallisierte Z-Kraft, die Pflanzen-Attacken zu\nZ-Attacken aufstuft. Wird bei Bedarf automatisch\nvervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a los\nportadores convertir sus movimientos de tipo Planta en\nmovimientos Z."
    ko: "풀타입 기술을\nZ기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将草属性招式升级成\nＺ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把草屬性招式\n升級為Ｚ招式的Ｚ力量結晶。"
grassium_z:held:
  names:
    jp_kana: クサＺ
    jp_kanji: クサＺ
    en: Grassium Z
    fr: Florazélite
    it: Herbium Z
    de: Botanium Z
    es: Fitostal Z
    ko: 풀Z
    zh_simp: 草Ｚ
    zh_trad: 草Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　結晶。\nくさタイプの　技を\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nくさタイプの　技を\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Grass-type moves to Z-Moves."
    fr: "Une cristallisation de la Force Z, permettant\nde transformer les capacités de type Plante\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare le mosse di tipo Erba\nin mosse Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft\nPflanzen-Attacken zu Z-Attacken auf."
    es: "Cristal que confiere el Poder Z a los movimientos\nde tipo Planta."
    ko: "Z파워의 결정.\n풀타입 기술을\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将草属性的招式\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把草屬性的招式\n升級為Ｚ招式。"
grassy_seed:
  names:
    jp_kana: グラスシード
    jp_kanji: グラスシード
    en: Grassy Seed
    fr: Graine Herbe
    it: Erbaseme
    de: Gras-Samen
    es: Semilla Hierba
    ko: 그래스시드
    zh_simp: 青草种子
    zh_trad: 青草種子
  descriptions:
    jp_kana: "ポケモンに　持たせると\nグラスフィールドのときに　使って\n防御が　あがる。"
    jp_kanji: "ポケモンに　持たせると\nグラスフィールドのときに　使って\n防御が　あがる。"
    en: "An item to be held by a Pokémon. If the terrain becomes\nGrassy Terrain, the holder will use this seed to boost its\nown Defense stat."
    fr: "Objet à tenir. Lorsqu’un champ herbu est actif,\nla graine est consommée pour augmenter la Défense\ndu porteur."
    it: "Strumento da dare a un Pokémon. Fa aumentare\nla Difesa in presenza di un Campo Erboso."
    de: "Gibst du den Samen einem Pokémon zum Tragen, setzt\nes ihn ein, wenn ein Grasfeld aktiv ist, und erhöht\ndadurch seine Verteidigung."
    es: "Si la lleva un Pokémon, la usa y aumenta su Defensa\ncuando el terreno está cubierto por un campo de hierba."
    ko: "포켓몬에게 지니게 하면\n그래스필드일 때 사용하여\n방어가 올라간다."
    zh_simp: "让宝可梦携带后，\n在青草场地上使用，\n防御就会提高。"
    zh_trad: "讓寶可夢攜帶後，\n在青草場地上使用，\n就會提高防禦。"
great_ball:
  names:
    jp_kana: スーパーボール
    jp_kanji: スーパーボール
    en: Great Ball
    fr: Super Ball
    it: Mega Ball
    de: Superball
    es: Super Ball
    ko: 슈퍼볼
    zh_simp: 超级球
    zh_trad: 超級球
  descriptions:
    jp_kana: "モンスターボールよりも　さらに\nポケモンを　捕まえやすくなった\n少し性能のいい　ボール。"
    jp_kanji: "モンスターボールよりも　さらに\nポケモンを　捕まえやすくなった\n少し性能のいい　ボール。"
    en: "A good, high-performance Poké Ball that provides\na higher success rate for catching Pokémon than\na standard Poké Ball."
    fr: "Une Poké Ball performante dont le taux de réussite\nest supérieur à celui de la Poké Ball."
    it: "Poké Ball dalle ottime prestazioni: fornisce\nmaggiori probabilità di cattura rispetto alla\nnormale Poké Ball."
    de: "Ein Ball mit guter Erfolgsquote. Dem Pokéball in allen\nPunkten überlegen."
    es: "Poké Ball de alto rendimiento. Tiene un índice de\ncaptura superior al de la Poké Ball."
    ko: "몬스터볼보다도 더욱\n포켓몬을 잡기 쉬워진\n약간 성능이 좋은 볼."
    zh_simp: "比起精灵球来\n更容易捉到宝可梦的，\n性能还算不错的球。"
    zh_trad: "性能還算不錯的球。\n比起精靈球\n更容易捉到寶可夢。"
great_ball:legends:
  names:
    jp_kana: スーパーボール
    jp_kanji: スーパーボール
    en: Great Ball
    fr: Super Ball
    it: Mega Ball
    de: Superball
    es: Super Ball
    ko: 슈퍼볼
    zh_simp: 超级球
    zh_trad: 超級球
  descriptions:
    jp_kana: "モンスターボールよりも\nさらにポケモンを捕まえやすくなった\n少し性能のいい不思議なボール。"
    jp_kanji: "モンスターボールよりも\nさらにポケモンを捕まえやすくなった\n少し性能のいい不思議なボール。"
    en: "A mysterious ball that provides a higher success rate\nfor catching Pokémon than a standard Poké Ball does."
    fr: "Cette étrange balle aux capacités étonnantes permet\nd’attraper les Pokémon plus facilement qu’avec une\nPoké Ball."
    it: "Poké Ball misteriosa dalle ottime prestazioni: fornisce\nmaggiori probabilità di cattura rispetto alla normale\nPoké Ball."
    de: "Mit diesem rätselhaften Ball sind Pokémon noch leichter\nzu fangen als mit einem Pokéball."
    es: "Misteriosa bola de alto rendimiento. Tiene un índice de\ncaptura superior al de la Poké Ball."
    ko: "몬스터볼보다도\n더욱 포켓몬을 잡기 쉬워진\n약간 성능이 좋고 신비한 볼."
    zh_simp: "不可思议的球。比起精灵球来\n更容易捉到宝可梦的，\n性能还算不错的球。"
    zh_trad: "不可思議的球。性能\n還算不錯，比起精靈球\n更容易捉到寶可夢。"
great_ball:recipe:
  names:
    jp_kana: スーパーボール
    jp_kanji: スーパーボール
    en: Great Ball
    fr: Super Ball
    it: Mega Ball
    de: Superball
    es: Super Ball
    ko: 슈퍼볼
    zh_simp: 超级球
    zh_trad: 超級球
  descriptions:
    jp_kana: "スーパーボールのレシピ。　材料は\nぼんぐりのみ×１　てつのかけら×１\nたまいし×１"
    jp_kanji: "スーパーボールのレシピ。　材料は\nぼんぐりのみ×１　てつのかけら×１\nたまいし×１"
    en: "A recipe for crafting Great Balls from scratch.\nRequired materials: 1 Apricorn, 1 Iron Chunk, and\n1 Tumblestone."
    fr: "Méthode pour Super Ball. Ressources requises :\n1 Noigrume, 1 Fragment de Fer et 1 Galet."
    it: "Ricetta per creare una Mega Ball. I materiali necessari\nsono 1 Bacca ghicocca, 1 Pezzo di ferro e 1 Ciottolo."
    de: "Die Anleitung zur Herstellung eines Superballs.\nBenötigte Materialien: 1 Aprikoko, 1 Eisenbrocken\nund 1 Glanzstein."
    es: "Receta para crear Super Balls. Materiales:\n1 Bonguri, 1 Pepita de Hierro y 1 Guijarro Rojo."
    ko: "슈퍼볼의 레시피.\n재료: 규토리열매×1 철조각×1 옥돌×1"
    zh_simp: "超级球的材料单。材料是：\n球果果×１　碎铁×１\n玉石×１"
    zh_trad: "超級球的材料單。材料是：\n球果果×１　碎鐵×１\n玉石×１"
greavard_wax:
  names:
    jp_kana: ボチのろう
    jp_kanji: ボチのろう
    en: Greavard Wax
    fr: Cire de Toutombe
    it: Cera di Greavard
    de: Gruff-Wachs
    es: Cera de Greavard
    ko: 망망이의촛농
    zh_simp: 墓仔狗的蜡
    zh_trad: 墓仔狗的蠟
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
green_apricorn:
  names:
    jp_kana: みどぼんぐり
    jp_kanji: みどぼんぐり
    en: Green Apricorn
    fr: Noigrume Vert
    it: Ghicocca verde
    de: Aprikoko Grün
    es: Bonguri Verde
    ko: 초록규토리
    zh_simp: 绿球果
    zh_trad: 綠球果
  descriptions:
    jp_kana: "みどりの　ぼんぐり。\n不思議と　こうばしい　かおりがする。"
    jp_kanji: "みどりの　ぼんぐり。\n不思議と　こうばしい　かおりがする。"
    en: A green Apricorn. It has a mysterious and aromatic scent.
    fr: "Un Noigrume de couleur verte.\nIl dégage un arôme étonnamment riche."
    it: "Una ghicocca di colore verde. Emana un profumo\nintenso."
    de: "Eine grüne Aprikoko. Sie verströmt einen seltsam\naromatischen Geruch."
    es: "Bonguri de color verde y aroma peculiar que recuerda\nal café tostado."
    ko: "초록색의 규토리.\n이상하게도 고소한 향기가 난다."
    zh_simp: "绿色的球果。\n有种焦香的香味，非常神奇。"
    zh_trad: "綠色的球果。\n有種焦香的香味，非常神奇。"
green_bell_pepper:
  names:
    jp_kana: ピーマンスライス
    jp_kanji: ピーマンスライス
    en: Green Bell Pepper
    fr: Poivron Vert
    it: Peperone verde
    de: Grüne Paprika
    es: Pimiento Verde
    ko: 피망슬라이스
    zh_simp: 青椒片
    zh_trad: 青椒片
  descriptions:
    jp_kana: "苦味が　ある　食材。\nスライスして　サンドウィッチに\nはさめば　アクセントに　なる。"
    jp_kanji: "苦味が　ある　食材。\nスライスして　サンドウィッチに\nはさめば　アクセントに　なる。"
    en: "An ingredient with some bitterness. When sliced, it adds\na nice accent to a sandwich."
    fr: "Un ingrédient au goût amer. Coupé en tranches, il ajoute\nune note agréable à un Sandwich."
    it: "Un ingrediente amaro. Tagliato a fette sottili è perfetto\nper impreziosire un panino imbottito."
    de: "In Scheiben geschnitten verleiht diese bittere Zutat\neinem Sandwich einen interessanten Geschmacksakzent."
    es: "Cortado en tiras, aporta un regusto amargo a\ncualquier bocadillo."
    ko: "쓴맛이 나는 식재료.\n슬라이스해서 샌드위치에 넣으면\n악센트가 되어 준다."
    zh_simp: "带有苦味的食材。\n切成片放进三明治当中\n能够起到提味作用。"
    zh_trad: "帶有苦味的食材。\n切片後夾進三明治\n可收畫龍點睛之效。"
green_dish:
  names:
    jp_kana: グリーンプレート
    jp_kanji: グリーンプレート
    en: Green Dish
    fr: Assiette Verte
    it: Piatto verde
    de: Grüner Teller
    es: Plato Verde
    ko: 그린 플레이트
    zh_simp: 绿色盘子
    zh_trad: 綠色盤子
  descriptions:
    jp_kana: "ピクニック用のお皿。　料理や気分で\n使い分けられるよう　色の種類が　豊富。\nグリーンは　かなりの　人気商品。"
    jp_kanji: "ピクニック用のお皿。　料理や気分で\n使い分けられるよう　色の種類が　豊富。\nグリーンは　かなりの　人気商品。"
    en: "A dish for picnics. Comes in plenty of colors to choose\nfrom based on the food or the mood. The green variety\nis quite popular."
    fr: "Une assiette de pique-nique. Il en existe de nombreuses\ncouleurs pour les accorder à l’ambiance ou au menu.\nLa verte est particulièrement populaire."
    it: "Piatto da picnic. È disponibile in un ampio assortimento\ndi colori tra cui si può scegliere a seconda del cibo e\ndell’umore. Il verde è molto popolare."
    de: "Diesen Picknickteller gibt es in verschiedenen Farben,\ndamit man je nach Laune oder Speise variieren kann.\nDer grüne Teller ist ziemlich beliebt."
    es: "Un plato de pícnic. Los distintos colores en los que viene\nofrecen posibilidades infinitas. Esta versión verde es muy\npopular."
    ko: "피크닉용 접시. 요리나 기분에 따라\n골라서 쓸 수 있게 색의 종류가 다양하다.\n그린 컬러는 상당한 인기 상품이다."
    zh_simp: "野餐用的盘子。为了能够配合料理\n和心情使用，其有着丰富的颜色种类。\n绿色的是非常有人气的商品。"
    zh_trad: "野餐用的盤子。提供豐富的顏色，\n以搭配各種不同的料理和心情。\n綠色的盤子非常熱銷。"
green_petal:
  names:
    jp_kana: みどりのはなびら
    jp_kanji: みどりのはなびら
    en: Green Petal
    fr: Pétale Vert
    it: Petalo verde
    de: Grünes Blatt
    es: Pétalo Verde
    ko: 초록꽃잎
    zh_simp: 绿色花瓣
    zh_trad: 綠色花瓣
  descriptions:
    jp_kana: "マツリカの試練で　マオから\nもらえる　はなびらの　押し花。\n７種類　集めるのが　目的。"
    jp_kanji: "マツリカの試練で　マオから\nもらえる　はなびらの　押し花。\n７種類　集めるのが　目的。"
    en: "A pressed flower petal you receive from Mallow\nduring Mina’s trial. The goal is to collect seven\ndifferent kinds of petals."
    fr: "Un pétale pressé que Barbara vous a remis lors\nde l’Épreuve d’Oléa. Il y en a sept à collectionner."
    it: "Petalo di fiore pressato ottenuto da Ibis durante la\nprova di Rika. L’obiettivo è ricevere sette petali diversi."
    de: "Ein gepresstes Blütenblatt, das man im Rahmen von\nMatsurikas Prüfung von Maho erhält. Ziel ist es,\nsieben verschiedene Blütenblätter zu sammeln."
    es: "Pétalo prensado recibido de manos de Lulú durante la\nprueba de Rika. El objetivo es reunir siete distintos."
    ko: "말리화의 시련에서 마오에게\n받을 수 있는 꽃잎의 압화.\n7종류 모으는 것이 목적."
    zh_simp: "在茉莉的考验中，\n能从玛奥那里得到的干花花瓣。\n目标是集齐７种。"
    zh_trad: "在茉莉的考驗中，\n從瑪奧那裡得到的壓花花瓣。\n目標是集滿７種花瓣。"
green_poke_ball_pick:
  names:
    jp_kana: みどりボールピック
    jp_kanji: みどりボールピック
    en: Green Poké Ball Pick
    fr: Pique à Ball Verte
    it: Stecchino Ball verde
    de: Grünball-Pikser
    es: Palillo Ball Verde
    ko: 초록 볼 픽
    zh_simp: 绿珠珠三明治签
    zh_trad: 綠珠珠三明治籤
  descriptions:
    jp_kana: "シンプルな　緑のボールの　ピック\n最初に　くさタイプの　ポケモンを\n選んだ　トレーナーが　よく使っている。"
    jp_kanji: "シンプルな　緑のボールの　ピック\n最初に　くさタイプの　ポケモンを\n選んだ　トレーナーが　よく使っている。"
    en: "A sandwich pick with a simple green Poké Ball design.\nOften used by Trainers who picked a Grass-type\nPokémon for their first partner."
    fr: "Une pique ornée d’une simple Poké Ball verte.\nElle est souvent utilisée par les Dresseurs ayant choisi un\nPokémon de type Plante comme partenaire de départ."
    it: "Stecchino a forma di una semplice Poké Ball verde.\nViene spesso usato da Allenatori che scelgono come\nprimo compagno d’avventure un Pokémon di tipo Erba."
    de: "Ein schlichter Pikser im Design eines grünen Pokéballs.\nWird häufig von Trainern verwendet, die als ihr erstes\nPokémon eines vom Typ Pflanze wählten."
    es: "Un palillo con un sencillo diseño de una Poké Ball verde.\nEspecialmente popular entre aquellos que eligieron a un\nPokémon de tipo Planta como primer compañero."
    ko: "심플한 초록색 볼 모양 픽.\n첫 포켓몬으로 풀타입을\n선택한 트레이너가 자주 사용한다."
    zh_simp: "带有简约绿色球的签子。\n一开始选择了草属性\n宝可梦的训练家经常会使用。"
    zh_trad: "簡約的綠色珠珠小籤。\n最初選擇了草屬性寶可夢的\n訓練家經常使用。"
green_scarf:
  names:
    jp_kana: みどりのバンダナ
    jp_kanji: みどりのバンダナ
    en: Green Scarf
    fr: Foulard Vert
    it: Fascia verde
    de: Grüner Schal
    es: Pañuelo Verde
    ko: 초록밴드
    zh_simp: 绿色头巾
    zh_trad: 綠色頭巾
  descriptions:
    jp_kana: "持たせて　コンテストに　参加すると\nそのポケモンは　いつもより\nかしこく　みられる。"
    jp_kanji: "持たせて　コンテストに　参加すると\nそのポケモンは　いつもより\nかしこく　みられる。"
    en: "When a Pokémon holds this during a contest, it looks\neven cleverer than usual."
    fr: "Objet à tenir. Augmente l’Intelligence d’un Pokémon\ndans les concours."
    it: "Strumento da dare a un Pokémon.\nAumenta l’Acume di chi l’indossa in una gara."
    de: "Ein Item zum Tragen. Trainer erhöhen damit in\nWettbewerben die Klugheit ihres Pokémon."
    es: "Aumenta el ingenio en los concursos. Debe llevarlo un\nPokémon."
    ko: "지니게 하여 콘테스트에 참가하면\n그 포켓몬은 여느 때보다\n슬기롭게 보인다."
    zh_simp: "携带它去参加华丽大赛的\n宝可梦会比平时\n看上去更加聪明。"
    zh_trad: "攜帶它去參加華麗大賽的\n寶可夢會比平時\n看起來更加聰明。"
green_shard:
  names:
    jp_kana: みどりのかけら
    jp_kanji: みどりのかけら
    en: Green Shard
    fr: Tesson Vert
    it: Coccio verde
    de: Grünstück
    es: Parte Verde
    ko: 초록조각
    zh_simp: 绿色碎片
    zh_trad: 綠色碎片
  descriptions:
    jp_kana: "緑の　小さなかけら。\n昔に　作られた　なにかの\n道具の一部　らしい。"
    jp_kanji: "緑の　小さなかけら。\n昔に　作られた　なにかの\n道具の一部　らしい。"
    en: "A small green shard. It appears to be a fragment of\nsome sort of implement made long ago."
    fr: "Un petit tesson vert.\nIl semble provenir d’un objet très ancien."
    it: "Un piccolo coccio verde che con ogni probabilità\nè un frammento di un antico strumento."
    de: "Eine grüne Scherbe eines antiken Werkzeugs, das vor\nlanger Zeit angefertigt wurde."
    es: "Un pequeño fragmento verde. Parece formar parte de\nalgún tipo de herramienta antigua."
    ko: "초록색 작은 조각.\n옛날에 만들어진 어떤\n도구의 일부인 듯하다."
    zh_simp: "绿色的小碎片。\n好像是以前制作的\n某道具的一部分。"
    zh_trad: "綠色的小碎片。\n好像是以前製作的\n某道具的一部分。"
greet_mail:
  names:
    jp_kana: はじめてメール
    jp_kanji: はじめてメール
    en: Greet Mail
    fr: Lettre Salut
    it: Messaggio Inizio
    de: Grußbrief
    es: Carta Inicial
    ko: 첫메일
    zh_simp: 初次邮件
    zh_trad: 初次郵件
  descriptions:
    jp_kana: "はじめましての　あいさつが\n書きやすい　レターペーパー。\nポケモンに　持たせて　使う。"
    jp_kanji: "はじめましての　あいさつが\n書きやすい　レターペーパー。\nポケモンに　持たせて　使う。"
    en: "Stationery designed to be easy to use when writing\nsomeone for the first time. Have a Pokémon hold it\nfor delivery."
    fr: "Un papier à lettres idéal pour se présenter.\nPeut être tenu et livré par un Pokémon."
    it: "Carta da lettere ideale per presentarsi a qualcuno.\nSi usa dandola a un Pokémon."
    de: "Briefpapier, mit dem man sich bei jemandem vorstellen\nkann. Gib es einem Pokémon zum Tragen."
    es: "Carta para presentarse a alguien. Debe llevarla un\nPokémon para entregarla."
    ko: "첫인사를\n쉽게 쓸 수 있는 편지지.\n포켓몬에게 지니게 해서 쓴다."
    zh_simp: "方便写初次见面这类寒暄语的信纸。\n使用该道具时，\n需要让宝可梦携带着来用。"
    zh_trad: "方便寫初次見面這類招呼語的信紙。\n需讓寶可夢攜帶使用。"
grepa_berry:
  names:
    jp_kana: ウブのみ
    jp_kanji: ウブのみ
    en: Grepa Berry
    fr: Baie Résin
    it: Baccauva
    de: Labrusbeere
    es: Baya Uvav
    ko: 또뽀열매
    zh_simp: 萄葡果
    zh_trad: 萄葡果
  descriptions:
    jp_kana: "ポケモンに　あげると\nとても　なかよく　なりやすくなるが\n特防の　基礎ポイントは　さがる。"
    jp_kanji: "ポケモンに　あげると\nとても　なかよく　なりやすくなるが\n特防の　基礎ポイントは　さがる。"
    en: "If a Pokémon is fed this Berry, it will grow more friendly,\nbut it will lose base points for its Sp. Def stat."
    fr: "Une Baie qui rend les Pokémon plus amicaux,\nmais baisse leur Défense Spéciale de base."
    it: "Usata su un Pokémon, ne aumenta il livello di amicizia,\nma ne diminuisce i punti base della Difesa Speciale."
    de: "Isst ein Pokémon diese Beere, wird es zutraulicher,\naber seine Spezial-Verteidigungs-Basispunkte sinken."
    es: "Al usarla con un Pokémon, lo vuelve más amistoso,\npero también reduce su Defensa Especial de base."
    ko: "포켓몬에게 주면\n매우 친밀해지기 쉬워지지만\n특수방어의 기초 포인트가 떨어진다."
    zh_simp: "如果把它交给宝可梦，\n宝可梦就会变得非常容易和训练家亲密，\n但特防的基础点数会降低。"
    zh_trad: "如果把它餵給寶可夢，\n寶可夢會非常容易和訓練家變得友好，\n但特防的基礎點數會降低。"
grimer_candy:
  names:
    jp_kana: ベトベターのアメ
    jp_kanji: ベトベターのアメ
    en: Grimer Candy
    fr: Bonbon Tadmorv
    it: Caramella Grimer
    de: Sleima-Bonbon
    es: Caramelo Grimer
    ko: 질퍽이의사탕
    zh_simp: 臭泥的糖果
    zh_trad: 臭泥的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
grimer_toxin:
  names:
    jp_kana: ベトベターのどくそ
    jp_kanji: ベトベターのどくそ
    en: Grimer Toxin
    fr: Poison de Tadmorv
    it: Tossine di Grimer
    de: Sleima-Toxin
    es: Toxinas de Grimer
    ko: 질퍽이의독소
    zh_simp: 臭泥的毒素
    zh_trad: 臭泥的毒素
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
grip_claw:
  names:
    jp_kana: ねばりのかぎづめ
    jp_kanji: ねばりのかぎづめ
    en: Grip Claw
    fr: Accro Griffe
    it: Presartiglio
    de: Griffklaue
    es: Garra Garfio
    ko: 끈기갈고리손톱
    zh_simp: 紧缠钩爪
    zh_trad: 緊纏鉤爪
  descriptions:
    jp_kana: "持たせると　しめつける　まきつくなど\nダメージを　あたえつづける技の\nターン数が　増える。"
    jp_kanji: "持たせると　しめつける　まきつくなど\nダメージを　あたえつづける技の\nターン数が　増える。"
    en: "An item to be held by a Pokémon. When the holder uses\nmoves that deal damage over several turns, such as\nBind or Wrap, their effects will last longer than usual."
    fr: "Objet à tenir. Prolonge la durée des attaques à tours\nmultiples telles que Ligotage et Étreinte."
    it: "Strumento da dare a un Pokémon. Aumenta i turni\ndi effetto delle mosse che infliggono danni in modo\ncontinuativo come Avvolgibotta e Legatutto."
    de: "Ein Item zum Tragen. Verlängert die Dauer von Attacken\nwie Klammergriff und Wickel, die über mehrere Runden\nSchaden zufügen."
    es: "Prolonga la duración de ataques multiturno como\nAtadura y Constricción si la lleva un Pokémon."
    ko: "지니게 하면 조이기나 김밥말이 등\n데미지를 계속 주는 기술의\n턴 수가 늘어난다."
    zh_simp: "携带后，绑紧以及紧束等\n会持续造成伤害的招式的\n回合数会增加。"
    zh_trad: "攜帶後，綁緊以及緊束等\n會持續造成傷害的招式的\n回合數會增加。"
griseous_core:
  names:
    jp_kana: だいはっきんだま
    jp_kanji: だいはっきんだま
    en: Griseous Core
    fr: Globe Platiné
    it: Grigiosferoide
    de: Platinumkristall
    es: Gran Griseosfera
    ko: 큰백금옥
    zh_simp: 大白金宝玉
    zh_trad: 大白金寶玉
  descriptions:
    jp_kana: "ギラティナに　持たせると\n力がみなぎり　姿が変わる\n光り輝く　大きな珠。"
    jp_kanji: "ギラティナに　持たせると\n力がみなぎり　姿が変わる\n光り輝く　大きな珠。"
    en: "An item to be held by Giratina. This large, glowing gem\nwells with power and allows the Pokémon to change\nform."
    fr: "Ce grand cristal brillant débordant de puissance\npermet à Giratina de changer de forme quand\ncelui-ci le tient."
    it: "Grande cristallo scintillante che, se dato a Giratina,\nlo riempie di energia e gli permette di cambiare forma."
    de: "Ein Item, das von Giratina getragen werden kann.\nDurch diesen großen, funkelnden Kristall wird es von\nKraft erfüllt und nimmt eine andere Form an."
    es: "Gema brillante de gran tamaño que, cuando la lleva\nGiratina, lo imbuye de poder y le permite cambiar de\nforma."
    ko: "눈부시게 빛나는 큰 구슬.\n기라티나에게 지니게 하면\n힘이 넘쳐서 모습이 바뀐다."
    zh_simp: "光辉灿烂的大珠子。\n让骑拉帝纳携带后，\n能使之力量高涨并改变形态。"
    zh_trad: "光輝燦爛的大珠子。\n讓騎拉帝納攜帶的話，\n能使之力量高漲並改變形態。"
griseous_orb:
  names:
    jp_kana: はっきんだま
    jp_kanji: はっきんだま
    en: Griseous Orb
    fr: Orbe Platiné
    it: Grigiosfera
    de: Platinum-Orb
    es: Griseosfera
    ko: 백금옥
    zh_simp: 白金宝珠
    zh_trad: 白金寶珠
  descriptions:
    jp_kana: "ギラティナに　持たせると　ドラゴンと\nゴーストタイプの　技の威力が\nあがる　光り輝く　珠。"
    jp_kanji: "ギラティナに　持たせると　ドラゴンと\nゴーストタイプの　技の威力が\nあがる　光り輝く　珠。"
    en: "A shining gem to be held by Giratina. It boosts the\npower of Giratina’s Dragon- and Ghost-type moves."
    fr: "Un mystérieux objet destiné à Giratina.\nAméliore les capacités de types Dragon et Spectre."
    it: "Gemma splendente da dare a Giratina. Aumenta\nla potenza delle mosse di tipo Drago e Spettro."
    de: "Ein Item, das von Giratina getragen werden kann.\nDieser glühende Orb verstärkt Attacken vom Typ Drache\nund Geist."
    es: "Una esfera brillante que potencia los movimientos de\ntipo Dragón y Fantasma. Debe llevarla Giratina."
    ko: "기라티나에게 지니게 하면 드래곤과\n고스트타입 기술의 위력이 올라가는\n반짝반짝 빛나는 구슬."
    zh_simp: "让骑拉帝纳携带的话，\n龙和幽灵属性的招式威力就会提高。\n散发着光辉的宝珠。"
    zh_trad: "讓騎拉帝納攜帶的話，\n龍和幽靈屬性的招式威力就會提高。\n散發著光輝的寶珠。"
grit_dust:
  names:
    jp_kana: ガンバリのすな
    jp_kanji: ガンバリのすな
    en: Grit Dust
    fr: Sable Effort
    it: Sabbia impegno
    de: Leistungssand
    es: Polvo Esfuerzo
    ko: 노력의모래
    zh_simp: 奋斗沙
    zh_trad: 奮鬥沙
  descriptions:
    jp_kana: "ポケモンのがんばレベルをあげる\n不思議な砂。\nがんばレベルが０から２のポケモンに使える。"
    jp_kanji: "ポケモンのがんばレベルをあげる\n不思議な砂。\nがんばレベルが０から２のポケモンに使える。"
    en: "Mysterious dust that can raise the effort level for one of\na Pokémon’s stats. It can be used to raise effort levels\nonly up to level three, however."
    fr: "Un sable mystérieux qui permet d’augmenter le niveau\nd’effort d’un Pokémon s’il est inférieur à 3."
    it: "Misteriosa sabbia che aumenta il livello di impegno\ndi un Pokémon. Può essere utilizzata su Pokémon\ncon un livello di impegno tra 0 e 2."
    de: "Dieser rätselhafte Sand erhöht den Leistungslevel eines\nPokémon. Er kann für Pokémon mit einem Leistungslevel\nvon 0 bis 2 verwendet werden."
    es: "Misterioso polvo que aumenta el nivel de esfuerzo de un\nPokémon. Solamente puede utilizarse si su nivel de\nesfuerzo es inferior a tres."
    ko: "포켓몬의 노력 레벨을 올리는 신비한 모래.\n노력 레벨이 0부터 2인 포켓몬에게 사용할 수 있다."
    zh_simp: "不可思议的沙子。\n能让宝可梦的奋斗等级提升。\n可用于奋斗等级０～２的宝可梦。"
    zh_trad: "不可思議的沙子。\n能讓寶可夢的奮鬥等級提升。\n可用於奮鬥等級０～２的寶可夢。"
grit_gravel:
  names:
    jp_kana: ガンバリのじゃり
    jp_kanji: ガンバリのじゃり
    en: Grit Gravel
    fr: Cailloux Effort
    it: Ghiaia impegno
    de: Leistungskies
    es: Grava Esfuerzo
    ko: 노력의자갈
    zh_simp: 奋斗砾
    zh_trad: 奮鬥礫
  descriptions:
    jp_kana: "ポケモンのがんばレベルをあげる\n不思議な砂利。\nがんばレベルが３から５のポケモンに使える。"
    jp_kanji: "ポケモンのがんばレベルをあげる\n不思議な砂利。\nがんばレベルが３から５のポケモンに使える。"
    en: "Mysterious gravel that can raise the effort level for one\nof a Pokémon’s stats. It can be used only if the effort\nlevel is at least level three and no greater than level five."
    fr: "Des cailloux mystérieux qui permettent d’augmenter\nle niveau d’effort d’un Pokémon s’il se trouve\nentre 3 et 5."
    it: "Misteriosa ghiaia che aumenta il livello di impegno\ndi un Pokémon. Può essere utilizzata su Pokémon\ncon un livello di impegno tra 3 e 5."
    de: "Dieser rätselhafte Kies erhöht den Leistungslevel eines\nPokémon. Er kann für Pokémon mit einem Leistungslevel\nvon 3 bis 5 verwendet werden."
    es: "Misteriosa grava que aumenta el nivel de esfuerzo de un\nPokémon. Solamente puede utilizarse si su nivel de\nesfuerzo se encuentra entre tres y cinco."
    ko: "포켓몬의 노력 레벨을 올리는 신비한 자갈.\n노력 레벨이 3부터 5인 포켓몬에게 사용할 수 있다."
    zh_simp: "不可思议的沙砾。\n能让宝可梦的奋斗等级提升。\n可用于奋斗等级３～５的宝可梦。"
    zh_trad: "不可思議的沙礫。\n能讓寶可夢的奮鬥等級提升。\n可用於奮鬥等級３～５的寶可夢。"
grit_pebble:
  names:
    jp_kana: ガンバリのいし
    jp_kanji: ガンバリのいし
    en: Grit Pebble
    fr: Pierre Effort
    it: Pietra impegno
    de: Leistungsstein
    es: Piedra Esfuerzo
    ko: 노력의돌
    zh_simp: 奋斗石
    zh_trad: 奮鬥石
  descriptions:
    jp_kana: "ポケモンのがんばレベルをあげる\n不思議な石。\nがんばレベルが６から８のポケモンに使える。"
    jp_kanji: "ポケモンのがんばレベルをあげる\n不思議な石。\nがんばレベルが６から８のポケモンに使える。"
    en: "A mysterious pebble that can raise the effort level for\none of a Pokémon’s stats. It can be used only if the effort\nlevel is at least level six and no greater than level eight."
    fr: "Une pierre mystérieuse qui permet d’augmenter\nle niveau d’effort d’un Pokémon s’il se trouve\nentre 6 et 8."
    it: "Misteriosa pietra che aumenta il livello di impegno\ndi un Pokémon. Può essere utilizzata su Pokémon\ncon un livello di impegno tra 6 e 8."
    de: "Dieser rätselhafte Stein erhöht den Leistungslevel eines\nPokémon. Er kann für Pokémon mit einem Leistungslevel\nvon 6 bis 8 verwendet werden."
    es: "Misteriosa piedra que aumenta el nivel de esfuerzo de\nun Pokémon. Solamente puede utilizarse si su nivel de\nesfuerzo se encuentra entre seis y ocho."
    ko: "포켓몬의 노력 레벨을 올리는 신비한 돌.\n노력 레벨이 6부터 8인 포켓몬에게 사용할 수 있다."
    zh_simp: "不可思议的石块。\n能让宝可梦的奋斗等级提升。\n可用于奋斗等级６～８的宝可梦。"
    zh_trad: "不可思議的石塊。\n能讓寶可夢的奮鬥等級提升。\n可用於奮鬥等級６～８的寶可夢。"
grit_rock:
  names:
    jp_kana: ガンバリのいわ
    jp_kanji: ガンバリのいわ
    en: Grit Rock
    fr: Rocher Effort
    it: Roccia impegno
    de: Leistungsfels
    es: Roca Esfuerzo
    ko: 노력의바위
    zh_simp: 奋斗岩
    zh_trad: 奮鬥岩
  descriptions:
    jp_kana: "ポケモンのがんばレベルをあげる\n不思議な岩。\nがんばレベルが９のポケモンに使える。"
    jp_kanji: "ポケモンのがんばレベルをあげる\n不思議な岩。\nがんばレベルが９のポケモンに使える。"
    en: "A mysterious rock that can raise the effort level for one\nof a Pokémon’s stats. It can be used only if the effort\nlevel has already reached level nine."
    fr: "Un rocher mystérieux qui permet d’augmenter le niveau\nd’effort d’un Pokémon s’il est de 9."
    it: "Misteriosa roccia che aumenta il livello di impegno\ndi un Pokémon. Può essere utilizzata su Pokémon\ncon un livello di impegno pari a 9."
    de: "Dieser rätselhafte Fels erhöht den Leistungslevel eines\nPokémon. Er kann für Pokémon mit Leistungslevel 9\nverwendet werden."
    es: "Misteriosa roca que aumenta el nivel de esfuerzo de un\nPokémon. Solamente puede utilizarse si su nivel de\nesfuerzo es nueve."
    ko: "포켓몬의 노력 레벨을 올리는 신비한 바위.\n노력 레벨이 9인 포켓몬에게 사용할 수 있다."
    zh_simp: "不可思议的岩石。\n能让宝可梦的奋斗等级提升。\n可用于奋斗等级９的宝可梦。"
    zh_trad: "不可思議的岩石。\n能讓寶可夢的奮鬥等級提升。\n可用於奮鬥等級９的寶可夢。"
groudon_treat:
  names:
    jp_kana: グラードンのおやつ
    jp_kanji: グラードンのおやつ
    en: Groudon Treat
    fr: Friandise Groudon
    it: Spuntino per Groudon
    de: Groudon-Snack
    es: Galleta Groudon
    ko: 그란돈의간식
    zh_simp: 固拉多的点心
    zh_trad: 固拉多的點心
  descriptions:
    jp_kana: "伝説のポケモン　グラードンが\n好む食材で　作られた　おやつ。"
    jp_kanji: "伝説のポケモン　グラードンが\n好む食材で　作られた　おやつ。"
    en: "A snack made from ingredients favored by the\nLegendary Pokémon Groudon."
    fr: "Une friandise préparée avec les ingrédients favoris\ndu Pokémon légendaire Groudon."
    it: "Uno spuntino fatto con gli ingredienti preferiti\ndal Pokémon leggendario Groudon."
    de: "Dieser Snack wurde mit den Lieblingszutaten des\nLegendären Pokémon Groudon zubereitet."
    es: "Galleta preparada con los ingredientes favoritos\ndel Pokémon legendario Groudon."
    ko: "전설의 포켓몬 그란돈이\n좋아하는 식재료로 만들어진 간식."
    zh_simp: "用传说的宝可梦固拉多\n喜欢的食材制作的点心。"
    zh_trad: "用傳說的寶可夢固拉多\n喜愛的食材製成的點心。"
ground_gem:
  names:
    jp_kana: じめんのジュエル
    jp_kanji: じめんのジュエル
    en: Ground Gem
    fr: Joyau Sol
    it: Bijouterra
    de: Bodenjuwel
    es: Gema Tierra
    ko: 땅주얼
    zh_simp: 地面宝石
    zh_trad: 地面寶石
  descriptions:
    jp_kana: "じめんのタイプの　ジュエル。\n持たせると　１度だけ　じめんの\n技の威力が　強まる。"
    jp_kanji: "じめんのタイプの　ジュエル。\n持たせると　１度だけ　じめんの\n技の威力が　強まる。"
    en: "An item to be held by a Pokémon. This gem is imbued\nwith the essence of the earth and will boost the power\nof a Ground-type move—but only once."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Sol."
    it: "Strumento da dare a un Pokémon. Gioiello che potenzia\nuna sola volta le mosse di tipo Terra."
    de: "Ein Item zum Tragen. Dieses Juwel verstärkt einmalig\neine Attacke vom Typ Boden."
    es: "Joya de un solo uso que potencia un movimiento de\ntipo Tierra. Debe llevarla un Pokémon."
    ko: "땅타입의 주얼.\n지니게 하면 한 번만 땅\n기술의 위력이 강해진다."
    zh_simp: "地面属性的宝石。\n携带后，地面属性的\n招式威力仅会增强１次。"
    zh_trad: "地面屬性的寶石。\n攜帶後，地面屬性招式的\n威力會僅增強１次。"
ground_memory:
  names:
    jp_kana: グラウンドメモリ
    jp_kanji: グラウンドメモリ
    en: Ground Memory
    fr: ROM Sol
    it: ROM Terra
    de: Boden-Disc
    es: Disco Tierra
    ko: 그라운드메모리
    zh_simp: 大地存储碟
    zh_trad: 大地記憶碟
  descriptions:
    jp_kana: "じめんタイプの　データが　入った\nメモリ。　特定のポケモンが　持つと\nタイプが　変わる。"
    jp_kanji: "じめんタイプの　データが　入った\nメモリ。　特定のポケモンが　持つと\nタイプが　変わる。"
    en: "A memory disc that contains Ground-type data.\nIt changes the type of the holder if held by\na certain species of Pokémon."
    fr: "Une carte mémoire contenant des données sur\nle type Sol. Un certain Pokémon peut changer\nde type en l’équipant."
    it: "ROM contenente dati sul tipo Terra in formato digitale.\nPermette a un certo Pokémon di cambiare tipo."
    de: "Eine Disc mit Daten zum Typ Boden. Sie löst bei einem\nbestimmten Pokémon einen Typenwechsel aus."
    es: "Disco de datos que contiene información relativa al tipo\nTierra. Permite cambiar de tipo a cierto Pokémon."
    ko: "땅타입의 데이터가 들어 있는\n메모리. 특정 포켓몬이\n지니면 타입이 바뀐다."
    zh_simp: "装有地面属性数据的存储碟。\n特定宝可梦携带后，\n属性就会发生变化。"
    zh_trad: "裝有地面屬性資料的記憶碟。\n特定寶可夢攜帶後，\n就會產生屬性的變化。"
ground_tera_shard:
  names:
    jp_kana: テラピースじめん
    jp_kanji: テラピースじめん
    en: Ground Tera Shard
    fr: Téra-Éclat Sol
    it: Teralite Terra
    de: Tera-Stück (Boden)
    es: Teralito Tierra
    ko: 테라피스 땅
    zh_simp: 地面太晶碎块
    zh_trad: 地面太晶碎塊
  descriptions:
    jp_kana: "テラスタルポケモンが　倒れたとき\n砕けた　テラスタルジュエルが\nまれに　結晶化したもの。"
    jp_kanji: "テラスタルポケモンが　倒れたとき\n砕けた　テラスタルジュエルが\nまれに　結晶化したもの。"
    en: "On rare occasions, these shards form when a Tera\nPokémon falls in battle and its Tera Jewel shatters."
    fr: "Un fragment cristallisé qui se forme rarement lors\nde l’éclatement d’un Joyau Téracristal après qu’un\nPokémon Téracristal a été mis K.O."
    it: "Cristallizzazione che raramente si forma quando\nun Pokémon Teracristal viene sconfitto e la sua gemma\nTeracristal va in frantumi."
    de: "In äußerst seltenen Fällen kristallisieren Bruchstücke\ndes Terakristalls von im Kampf besiegten Terakristall-\nPokémon zu solchen Tera-Stücken."
    es: "Esquirla que se forma muy raramente cuando la joya\nTeracristal de un Pokémon teracristalizado se quiebra\ntras derrotarlo."
    ko: "테라스탈 포켓몬이 쓰러졌을 때\n부서진 테라스탈 주얼이\n드물게 결정화한 조각."
    zh_simp: "打倒太晶宝可梦时，\n破碎掉的太晶宝石有\n极低概率会结晶成此物。"
    zh_trad: "太晶寶可夢倒下時，\n碎裂的太晶寶石在罕見的情況下\n會結晶化，而形成此物。"
groundium_z:bag:
  names:
    jp_kana: ジメンＺ
    jp_kanji: ジメンＺ
    en: Groundium Z
    fr: Terrazélite
    it: Terrium Z
    de: Terrium Z
    es: Geostal Z
    ko: 땅Z
    zh_simp: 地面Ｚ
    zh_trad: 地面Ｚ
  descriptions:
    jp_kana: "じめんタイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    jp_kanji: "じめんタイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nGround-type moves to Ground-type Z-Moves."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise son porteur à transformer ses capacités\nde type Sol en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono ai Pokémon di trasformare le mosse\ndi tipo Terra in mosse Z."
    de: "Kristallisierte Z-Kraft, die Boden-Attacken zu\nZ-Attacken aufstuft. Wird bei Bedarf automatisch\nvervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a los\nportadores convertir sus movimientos de tipo Tierra en\nmovimientos Z."
    ko: "땅타입 기술을\nZ기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将地面属性招式升级成\nＺ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把地面屬性招式\n升級為Ｚ招式的Ｚ力量結晶。"
groundium_z:held:
  names:
    jp_kana: ジメンＺ
    jp_kanji: ジメンＺ
    en: Groundium Z
    fr: Terrazélite
    it: Terrium Z
    de: Terrium Z
    es: Geostal Z
    ko: 땅Z
    zh_simp: 地面Ｚ
    zh_trad: 地面Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　結晶。\nじめんタイプの　技を\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nじめんタイプの　技を\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Ground-type moves to Z-Moves."
    fr: "Une cristallisation de la Force Z, permettant\nde transformer les capacités de type Sol\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare le mosse di tipo Terra\nin mosse Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft\nBoden-Attacken zu Z-Attacken auf."
    es: "Cristal que confiere el Poder Z a los movimientos\nde tipo Tierra."
    ko: "Z파워의 결정.\n땅타입 기술을\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将地面属性的招式\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把地面屬性的招式\n升級為Ｚ招式。"
growlithe_candy:
  names:
    jp_kana: ガーディのアメ
    jp_kanji: ガーディのアメ
    en: Growlithe Candy
    fr: Bonbon Caninos
    it: Caramella Growlithe
    de: Fukano-Bonbon
    es: Caramelo Growlithe
    ko: 가디의사탕
    zh_simp: 卡蒂狗的糖果
    zh_trad: 卡蒂狗的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
growlithe_fur:
  names:
    jp_kana: ガーディのけ
    jp_kanji: ガーディのけ
    en: Growlithe Fur
    fr: Poils de Caninos
    it: Pelo di Growlithe
    de: Fukano-Haar
    es: Pelo de Growlithe
    ko: 가디의털
    zh_simp: 卡蒂狗的毛
    zh_trad: 卡蒂狗的毛
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
growth_mulch:
  names:
    jp_kana: すくすくこやし
    jp_kanji: すくすくこやし
    en: Growth Mulch
    fr: Fertipousse
    it: Fertilrapido
    de: Wachsmulch
    es: Abono Rápido
    ko: 무럭무럭비료
    zh_simp: 速速肥
    zh_trad: 速速肥
  descriptions:
    jp_kana: "きのみを　育てるときの　肥料。\nしかし　ホウエン地方の　土には\nまるで　なじまないので　効果が　ない。"
    jp_kanji: "きのみを　育てるときの　肥料。\nしかし　ホウエン地方の　土には\nまるで　なじまないので　効果が　ない。"
    en: "A fertilizer for growing Berries. However, it appears\nto be unsuitable for the soil in the Hoenn region and\nhas no effect."
    fr: "Un engrais à utiliser sur un sol meuble.\nIl n’est cependant pas adapté aux terres de Hoenn\net n’y a aucun effet."
    it: "Fertilizzante usato per coltivare le bacche. Tuttavia,\nnon ha effetto a Hoenn, perché non è adatto al terreno\ndella regione."
    de: "Mulch zur Nutzung auf Beerenfeldern. Durch seine\nUnverträglichkeit mit den Böden in Hoenn bleibt sein\nEinsatz dort ohne Wirkung."
    es: "Un fertilizante usado para el cultivo de bayas. Parece\nque no se asienta bien en el suelo de Hoenn, por lo\nque no tiene efecto en esta región."
    ko: "나무열매를 키울 때 사용하는 비료.\n그러나 호연지방의 흙에는\n전혀 맞지 않기에 효과가 없다."
    zh_simp: "培育树果时的肥料。\n但完全不适合丰缘地区的土壤，\n所以没什么效果。"
    zh_trad: "培育樹果時的肥料。\n但完全不適合豐緣地區的土壤，\n所以沒什麼效果。"
grubbin_thread:
  names:
    jp_kana: アゴジムシのいと
    jp_kanji: アゴジムシのいと
    en: Grubbin Thread
    fr: Fil de Larvibule
    it: Filo di Grubbin
    de: Mabula-Faden
    es: Hilo de Grubbin
    ko: 턱지충이의실
    zh_simp: 强颚鸡母虫的丝
    zh_trad: 強顎雞母蟲的絲
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
grubby_hanky:
  names:
    jp_kana: よごれたハンカチ
    jp_kanji: よごれたハンカチ
    en: Grubby Hanky
    fr: Mouchoir Sale
    it: Pezza sporca
    de: Schnäuztuch
    es: Pañuelo Sucio
    ko: 더러운손수건
    zh_simp: 脏手帕
    zh_trad: 髒手帕
  descriptions:
    jp_kana: "シッポウシティにある　カフェソーコの\n常連が　落とした　ハンカチ。\nほのかに　ポケモンの　香りがする。"
    jp_kanji: "シッポウシティにある　カフェソーコの\n常連が　落とした　ハンカチ。\nほのかに　ポケモンの　香りがする。"
    en: "A handkerchief dropped by a regular at Nacrene City’s\nCafé Warehouse. It smells faintly like a Pokémon."
    fr: "Un mouchoir égaré par un habitué du Café\nde la Grange. Il sent légèrement le Pokémon."
    it: "Pezzo di stoffa perso al Bar Magazzino di Zefiropoli da\nun cliente abituale. Odora leggermente di Pokémon."
    de: "Ein Taschentuch, das ein Stammkunde im\nCafé Lagerhaus in Septerna City verloren hat.\nRiecht leicht nach Pokémon."
    es: "Pañuelo perdido por un cliente habitual del Café Alma\nen Ciudad Esmalte. Desprende el olor de un Pokémon."
    ko: "칠보시티에 있는 카페 갤러지의\n단골손님이 떨어뜨린 손수건.\n희미하게 포켓몬의 냄새가 난다."
    zh_simp: "七宝市仓库咖啡馆的\n熟客遗失的手帕。\n隐约有着宝可梦的香气。"
    zh_trad: "七寶市倉庫咖啡館的\n熟客遺失的手帕。\n隱約有著寶可夢的香氣。"
guard_spec:
  names:
    jp_kana: エフェクトガード
    jp_kanji: エフェクトガード
    en: Guard Spec.
    fr: Garde-Stats
    it: Superguardia
    de: Megablock
    es: Protección X
    ko: 이펙트가드
    zh_simp: 能力防守
    zh_trad: 能力防守
  descriptions:
    jp_kana: "戦闘中　５ターンの　あいだ\n味方の　能力を\nさげられなくする　道具。"
    jp_kanji: "戦闘中　５ターンの　あいだ\n味方の　能力を\nさげられなくする　道具。"
    en: "An item that prevents Pokémon on your side from\nhaving their stats lowered in battle for five turns."
    fr: "Empêche la baisse des stats de tous les Pokémon\nalliés pendant cinq tours."
    it: "Per cinque turni dopo l’uso, evita che le statistiche\ndei Pokémon alleati diminuiscano."
    de: "Verhindert im Kampf für fünf Runden, dass die\nStatuswerte von Pokémon auf der Mitstreiterseite\ngesenkt werden."
    es: "Evita que reduzcan las características de un Pokémon\ny sus aliados durante cinco turnos."
    ko: "배틀 중 5턴 동안\n같은 편의 능력을\n떨어뜨리지 않게 하는 도구."
    zh_simp: "在战斗中，\n５回合内不让我方\n能力降低的道具。"
    zh_trad: "在戰鬥中，\n５回合內讓我方的\n能力不被降低的道具。"
guidebook:
  names:
    jp_kana: ぼうけんノート
    jp_kanji: ぼうけんノート
    en: Guidebook
    fr: Notes d’Aventure
    it: Note di viaggio
    de: Abenteuernotizen
    es: Guía de Viaje
    ko: 모험노트
    zh_simp: 冒险笔记
    zh_trad: 冒險筆記
  descriptions:
    jp_kana: "これまでの　冒険の様子が\n記録されている　ノート。"
    jp_kanji: "これまでの　冒険の様子が\n記録されている　ノート。"
    en: A notebook that keeps a record of your adventure so far.
    fr: "Un carnet contenant des informations utiles qui\nse remplit au fur et à mesure de votre aventure."
    it: "Diario in cui viene annotata la tua avventura\ngiorno per giorno."
    de: "In diesen Notizen stehen Informationen, die dir im\nVerlauf deines Abenteuers von Nutzen sein werden."
    es: "Un cuaderno en el que se recogen, día a día, los\nprogresos de la aventura."
    ko: "지금까지의 모험 상황이\n기록되어 있는 노트."
    zh_simp: "记录着到现在为止的\n冒险经历的笔记。"
    zh_trad: "記錄著到目前為止的\n冒險歷程的筆記。"
gulpin_mucus:
  names:
    jp_kana: ゴクリンのねんえき
    jp_kanji: ゴクリンのねんえき
    en: Gulpin Mucus
    fr: Mucus de Gloupti
    it: Muco di Gulpin
    de: Schluppuck-Schleim
    es: Secreción de Gulpin
    ko: 꼴깍몬의점액
    zh_simp: 溶食兽的黏液
    zh_trad: 溶食獸的黏液
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
gyaradosite:
  names:
    jp_kana: ギャラドスナイト
    jp_kanji: ギャラドスナイト
    en: Gyaradosite
    fr: Léviatorite
    it: Gyaradosite
    de: Garadosnit
    es: Gyaradosita
    ko: 갸라도스나이트
    zh_simp: 暴鲤龙进化石
    zh_trad: 暴鯉龍進化石
  descriptions:
    jp_kana: "ギャラドスに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    jp_kanji: "ギャラドスに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Gyarados hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Léviator, elle lui permet de\nméga-évoluer durant un combat."
    it: "Una delle misteriose Megapietre. Data a Gyarados,\ngli permette di megaevolversi durante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Garados getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Gyarados en combate."
    ko: "갸라도스에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让暴鲤龙携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓暴鯉龍攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
haban_berry:
  names:
    jp_kana: ハバンのみ
    jp_kanji: ハバンのみ
    en: Haban Berry
    fr: Baie Fraigo
    it: Baccahaban
    de: Terirobeere
    es: Baya Anjiro
    ko: 하반열매
    zh_simp: 莓榴果
    zh_trad: 莓榴果
  descriptions:
    jp_kana: "ポケモンに　持たせると\n効果バツグンの　ドラゴン技を\n受けたとき　威力が　弱まる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　ドラゴン技を\n受けたとき　威力が　弱まる。"
    en: "If a Pokémon holding this Berry is hit with a\nsupereffective Dragon-type move, the power of that\nmove will be weakened."
    fr: "Tenue, cette Baie réduit les dégâts subis lorsque\nle Pokémon est touché par une capacité super efficace\nde type Dragon."
    it: "Se il Pokémon che ha questa bacca subisce una mossa\nsuperefficace di tipo Drago, la potenza della mossa\nviene indebolita."
    de: "Als getragenes Item schwächt diese Beere eine\nsehr effektive Drachen-Attacke, von der das Pokémon\ngetroffen wird."
    es: "Si la lleva un Pokémon, debilita un ataque supereficaz\nde tipo Dragón que reciba."
    ko: "포켓몬에게 지니게 하면\n효과가 굉장한 드래곤 기술로\n공격받았을 때 위력이 약해진다."
    zh_simp: "让宝可梦携带后，\n在受到效果绝佳的龙属性招式\n攻击时，能令其威力减弱。"
    zh_trad: "讓寶可夢攜帶後，\n在受到效果絕佳的龍屬性招式\n攻擊時，能使其威力減弱。"
ham:
  names:
    jp_kana: ハムスライス
    jp_kanji: ハムスライス
    en: Ham
    fr: Jambon Blanc
    it: Prosciutto cotto
    de: Kochschinken
    es: Jamón Cocido
    ko: 슬라이스햄
    zh_simp: 火腿片
    zh_trad: 火腿片
  descriptions:
    jp_kana: "塩味が　強い　食材。\nしっかりとした　塩味が　あるので\n野菜類と　非常に　相性が　よい。"
    jp_kanji: "塩味が　強い　食材。\nしっかりとした　塩味が　あるので\n野菜類と　非常に　相性が　よい。"
    en: "A very salty ingredient—and that very saltiness is what\nmakes it such a nice companion to veggies."
    fr: "Un ingrédient au goût très salé. Sa saveur particulière\nen fait un accompagnement idéal pour toutes sortes\nde légumes."
    it: "Un ingrediente molto salato, che proprio per questo\nsi abbina particolarmente bene con le verdure."
    de: "Eine sehr salzige Zutat, die dank dieser dominanten\nGeschmackskomponente hervorragend mit allerlei\nGemüsesorten harmoniert."
    es: "Su fuerte sabor salado combina a la perfección con todo\ntipo de verduras."
    ko: "짠맛이 강한 식재료.\n충분하게 짠맛이 나기 때문에\n채소 종류와 매우 궁합이 잘 맞는다."
    zh_simp: "咸味强烈的食材。\n因为其咸味很足，所以与\n蔬菜类的食材非常搭配。"
    zh_trad: "鹹味強勁的食材。\n其鹹味非常紮實，\n因此和蔬菜類非常搭配。"
hamburger:
  names:
    jp_kana: ハンバーグ
    jp_kanji: ハンバーグ
    en: Hamburger
    fr: Steak Haché
    it: Hamburger grigliato
    de: Frikadelle
    es: Hamburguesa
    ko: 햄버그
    zh_simp: 汉堡排
    zh_trad: 漢堡排
  descriptions:
    jp_kana: "塩味が　強い　食材。\nサンドウィッチに　しっかりとした\n食べ応えを　求めるなら　欠かせない。"
    jp_kanji: "塩味が　強い　食材。\nサンドウィッチに　しっかりとした\n食べ応えを　求めるなら　欠かせない。"
    en: "This very salty ingredient is the thing to add if you want\nto make your sandwich truly filling."
    fr: "Un ingrédient au goût très salé. Parfait si l’on veut\npréparer un Sandwich qui tient vraiment au corps."
    it: "Un ingrediente molto salato, perfetto per preparare\ndei panini sostanziosi."
    de: "Wem nach einem sättigenden Sandwich zumute ist,\nder sollte auf diese sehr salzige Zutat nicht verzichten."
    es: "Un ingrediente de fuerte sabor salado fundamental para\ndar volumen y consistencia a cualquier bocadillo."
    ko: "짠맛이 강한 식재료.\n샌드위치에 확실한\n포만감을 주고 싶을 때 빠지지 않는다."
    zh_simp: "咸味强烈的食材。\n如果希望三明治能吃得\n让人满足，就绝不能少了它。"
    zh_trad: "鹹味強勁的食材。\n若希望三明治能帶來飽足感，\n便少不了它。"
happiny_dust:
  names:
    jp_kana: ピンプクのおとしもの
    jp_kanji: ピンプクのおとしもの
    en: Happiny Dust
    fr: Babiole de Ptiravi
    it: Oggetto di Happiny
    de: Wonneira-Material
    es: Pertenencia de Happiny
    ko: 핑복의유실물
    zh_simp: 小福蛋的掉落物
    zh_trad: 小福蛋的掉落物
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
hard_stone:
  names:
    jp_kana: かたいいし
    jp_kanji: かたいいし
    en: Hard Stone
    fr: Pierre Dure
    it: Pietradura
    de: Granitstein
    es: Piedra Dura
    ko: 딱딱한돌
    zh_simp: 硬石头
    zh_trad: 硬石頭
  descriptions:
    jp_kana: "絶対に　割れない石。\n持たせると　いわタイプの\n技の威力が　あがる。"
    jp_kanji: "絶対に　割れない石。\n持たせると　いわタイプの\n技の威力が　あがる。"
    en: "An item to be held by a Pokémon. It’s a durable stone\nthat boosts the power of the holder’s Rock-type moves."
    fr: "Objet à tenir. Une pierre incassable qui augmente\nla puissance des capacités de type Roche."
    it: "Strumento da dare a un Pokémon. Pietra indistruttibile\nche potenzia le mosse di tipo Roccia."
    de: "Ein Item zum Tragen. Ein unzerbrechlicher Stein,\nder Attacken vom Typ Gestein verstärkt."
    es: "La robustez de la piedra potencia los movimientos de\ntipo Roca. Debe llevarla un Pokémon."
    ko: "절대 깨지지 않는 돌.\n지니게 하면 바위타입\n기술의 위력이 올라간다."
    zh_simp: "绝对不会裂开的石头。\n携带后，岩石属性的\n招式威力就会提高。"
    zh_trad: "絕對不會裂開的石頭。\n攜帶後，岩石屬性的\n招式威力就會提高。"
hasty_mint:
  names:
    jp_kana: せっかちミント
    jp_kanji: せっかちミント
    en: Hasty Mint
    fr: Aromate Pressé
    it: Menta Lesta
    de: Hastig-Minze
    es: Menta Activa
    ko: 성급민트
    zh_simp: 急躁薄荷
    zh_trad: 急躁薄荷
  descriptions:
    jp_kana: "ポケモンに　香りを　かがせると\n素早さが　上がりやすく　なるが\n防御は　上がりにくくなる　ミント。"
    jp_kanji: "ポケモンに　香りを　かがせると\n素早さが　上がりやすく　なるが\n防御は　上がりにくくなる　ミント。"
    en: "Having a Pokémon smell this mint can make its Speed\nstat grow stronger. However, its Defense stat may suffer."
    fr: "Si un Pokémon hume cet aromate, sa Vitesse\nmontera plus facilement, mais sa Défense\nse développera plus lentement."
    it: "Quando un Pokémon ne sente il profumo, la sua Velocità\naumenta più facilmente a scapito della Difesa."
    de: "Lässt man ein Pokémon an dieser Minze schnuppern,\nsteigt seine Initiative schneller, aber seine Verteidigung\numso langsamer."
    es: "Cuando un Pokémon percibe su aroma, aumenta\ncon más facilidad su Velocidad, en detrimento de su\nDefensa."
    ko: "포켓몬에게 향기를 맡게 하면\n스피드가 오르기 쉬워지지만\n방어가 오르기 어려워지는 민트."
    zh_simp: "宝可梦闻了这种薄荷之后，\n会令速度容易提高，\n而防御则难以提高。"
    zh_trad: "讓寶可夢聞這種薄荷的氣味，\n會令速度變得容易提高，\n但防禦則難以提高。"
hatenna_dust:
  names:
    jp_kana: ミブリムのおとしもの
    jp_kanji: ミブリムのおとしもの
    en: Hatenna Dust
    fr: Babiole de Bibichut
    it: Oggetto di Hatenna
    de: Brimova-Material
    es: Pertenencia de Hatenna
    ko: 몸지브림의유실물
