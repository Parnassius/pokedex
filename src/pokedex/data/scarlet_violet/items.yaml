    zh_trad: 中藥
  descriptions:
    jp_kana: "キズぐすりと同じで\nポケモン１匹のＨＰが６０回復するが\n苦く　なかよし度がさがる。"
    jp_kanji: "キズぐすりと同じで\nポケモン１匹のＨＰが６０回復するが\n苦く　なかよし度がさがる。"
    en: "An herbal medicine that can restore 60 HP to a\nPokémon, just as a Potion does. Yet the bitter taste\nwill make the Pokémon less friendly toward you."
    fr: "Permet de restaurer 60 PV d’un Pokémon comme\nle ferait une Potion. Son goût amer fera cependant\ndiminuer l’amitié que vous porte le Pokémon."
    it: "Come la Pozione, restituisce 60 PS a un Pokémon ma,\nessendo amaro, fa diminuire il suo livello di amicizia."
    de: "Diese Arznei hat dieselbe Wirkung wie ein Trank und\nfüllt die KP eines Pokémon um 60 Punkte auf.\nIhr bitterer Geschmack senkt jedoch seine Zutraulichkeit."
    es: "Preparado medicinal que restablece 60 PS a un único\nPokémon, como una Poción, aunque su sabor amargo\nhace que sea menos amistoso."
    ko: "상처약과 마찬가지로\n포켓몬 1마리의 HP를 60만큼 회복하지만\n맛이 써서 절친도가 떨어진다."
    zh_simp: "效果和伤药一样，\n能让１只宝可梦回复６０ＨＰ，\n但味道很苦，友好度会降低。"
    zh_trad: "效果和傷藥一樣，\n能讓１隻寶可夢回復６０ＨＰ，\n但味道很苦，友好度會降低。"
remedy:recipe:
  names:
    jp_kana: カンポーやく
    jp_kanji: カンポーやく
    en: Remedy
    fr: Remède
    it: Preparato
    de: Arznei
    es: Remedio
    ko: 한방약
    zh_simp: 中药
    zh_trad: 中藥
  descriptions:
    jp_kana: "カンポーやくのレシピ。　材料は\nムシヨケソウ×２"
    jp_kanji: "カンポーやくのレシピ。　材料は\nムシヨケソウ×２"
    en: "A recipe for crafting Remedies from scratch.\nRequired materials: 2 Bugwort blooms."
    fr: "Méthode pour Remède. Ressources requises :\n2 Plantes Répulsives."
    it: "Ricetta per un Preparato. Richiede 2 fiori di Erba\nrepellente."
    de: "Die Anleitung zur Herstellung einer Arznei.\nBenötigte Materialien: 2 Schutzblumen."
    es: "Receta para crear Remedios. Materiales:\n2 Hierbas Repelentes."
    ko: "한방약의 레시피.\n재료: 벌레회피풀×2"
    zh_simp: "中药的材料单。材料是：\n除虫草×２"
    zh_trad: "中藥的材料單。材料是：\n除蟲草×２"
repeat_ball:
  names:
    jp_kana: リピートボール
    jp_kanji: リピートボール
    en: Repeat Ball
    fr: Bis Ball
    it: Bis Ball
    de: Wiederball
    es: Acopio Ball
    ko: 리피트볼
    zh_simp: 重复球
    zh_trad: 重複球
  descriptions:
    jp_kana: "捕まえたことの　ある\nポケモンが　捕まえやすくなる\nちょっと変わった　ボール。"
    jp_kanji: "捕まえたことの　ある\nポケモンが　捕まえやすくなる\nちょっと変わった　ボール。"
    en: "A somewhat different Poké Ball that is more effective\nwhen catching a Pokémon of a species that you’ve\ncaught before."
    fr: "Une Poké Ball un peu spéciale qui fonctionne\nparticulièrement bien sur les espèces de Pokémon\ndéjà capturées."
    it: "Poké Ball un po’ diversa. Risulta particolarmente\nefficace sulle specie di Pokémon già catturate\nin precedenza."
    de: "Ein Ball, mit dem sich Pokémon leichter fangen lassen,\nwenn ihre Art bereits gefangen wurde."
    es: "Poké Ball algo distinta a las demás que funciona\nespecialmente bien con las especies de Pokémon\nya capturadas."
    ko: "잡은 적이 있는\n포켓몬을 잡기 쉬운\n조금 특이한 볼."
    zh_simp: "有点与众不同的球。\n能很容易地捕捉\n以前曾捉到过的宝可梦。"
    zh_trad: "有點與眾不同的球。\n曾經捉到過的寶可夢\n會變得容易捉到。"
repel:
  names:
    jp_kana: むしよけスプレー
    jp_kanji: むしよけスプレー
    en: Repel
    fr: Repousse
    it: Repellente
    de: Schutz
    es: Repelente
    ko: 벌레회피스프레이
    zh_simp: 除虫喷雾
    zh_trad: 除蟲噴霧
  descriptions:
    jp_kana: "使うと　少しのあいだ\n弱い　野生のポケモンが\nまったく　出てこなくなる。"
    jp_kanji: "使うと　少しのあいだ\n弱い　野生のポケモンが\nまったく　出てこなくなる。"
    en: "An item that prevents low-level wild Pokémon from\njumping out at you for a short time."
    fr: "Repousse les Pokémon sauvages faibles pendant\nun court moment."
    it: "Strumento che evita a chi lo usa di incontrare Pokémon\nselvatici deboli per un po’ di tempo."
    de: Hält für kurze Zeit schwache wilde Pokémon ab.
    es: "Evita encuentros con Pokémon salvajes de nivel bajo\ndurante un corto período de tiempo."
    ko: "사용하면 잠시 동안\n약한 야생 포켓몬이\n전혀 나오지 않게 된다."
    zh_simp: "使用后，在较短的一段时间内，\n弱小的野生宝可梦将完全不会出现。"
    zh_trad: "使用後的短暫期間，\n弱小的野生寶可夢變得\n完全不會出現。"
reply_mail:
  names:
    jp_kana: おかえしメール
    jp_kanji: おかえしメール
    en: Reply Mail
    fr: Lettre Réponse
    it: Messaggio Risposta
    de: Rückbrief
    es: Carta Respuesta
    ko: 답장메일
    zh_simp: 回复邮件
    zh_trad: 回覆郵件
  descriptions:
    jp_kana: "もらった　メールへの　お返しが\n書きやすい　レターペーパー。\nポケモンに　持たせて　使う。"
    jp_kanji: "もらった　メールへの　お返しが\n書きやすい　レターペーパー。\nポケモンに　持たせて　使う。"
    en: "Stationery designed to make it easy to respond\nto a letter you received. Have a Pokémon hold it\nfor delivery."
    fr: "Un papier à lettres idéal pour répondre à un autre\ncourrier. Peut être tenu et livré par un Pokémon."
    it: "Carta da lettere ideale per scrivere una risposta\na un messaggio.\nSi usa dandola a un Pokémon."
    de: "Briefpapier, mit dem man einen anderen Brief\nbeantworten kann. Gib es einem Pokémon zum Tragen."
    es: "Carta para responder a un mensaje. Debe llevarla un\nPokémon para entregarla."
    ko: "받은 메일에 대한 답장을\n쉽게 쓸 수 있는 편지지.\n포켓몬에게 지니게 해서 쓴다."
    zh_simp: "方便写回复邮件的信纸。\n使用该道具时，\n需要让宝可梦携带着来用。"
    zh_trad: "方便寫回覆郵件的信紙。\n需讓寶可夢攜帶使用。"
reset_urge:
  names:
    jp_kana: フラットコール
    jp_kanji: フラットコール
    en: Reset Urge
    fr: Réamorçage
    it: Ripristino
    de: Umkehrappell
    es: Quitaestado
    ko: 플랫콜
    zh_simp: ？？？
    zh_trad: ？？？
  descriptions:
    jp_kana: "使うと　味方のポケモンの\n能力変化が　元に　戻る。"
    jp_kanji: "使うと　味方のポケモンの\n能力変化が　元に　戻る。"
    en: "When used, it removes any stat changes of an\nally Pokémon."
    fr: "Permet d’annuler les changements de stats\nd’un Pokémon de l’équipe."
    it: "Usandolo, tutte le modifiche alle statistiche di un\nPokémon della squadra saranno annullate."
    de: "Hebt bei Gebrauch Statusveränderungen deines\nMitstreiters auf."
    es: "Cuando se usa, se anulan los cambios en las\ncaracterísticas de un Pokémon de tu equipo."
    ko: "사용하면 같은 편 포켓몬의\n능력 변화가 원래대로 되돌아간다."
    zh_simp: "使用后，我方宝可梦的\n能力变化将消失。"
    zh_trad: "使用後，我方寶可夢的\n能力變化將復原。"
reshiram_treat:
  names:
    jp_kana: レシラムのおやつ
    jp_kanji: レシラムのおやつ
    en: Reshiram Treat
    fr: Friandise Reshiram
    it: Spuntino per Reshiram
    de: Reshiram-Snack
    es: Galleta Reshiram
    ko: 레시라무의간식
    zh_simp: 莱希拉姆的点心
    zh_trad: 萊希拉姆的點心
  descriptions:
    jp_kana: "伝説のポケモン　レシラムが\n好む食材で　作られた　おやつ。"
    jp_kanji: "伝説のポケモン　レシラムが\n好む食材で　作られた　おやつ。"
    en: "A snack made from ingredients favored by the\nLegendary Pokémon Reshiram."
    fr: "Une friandise préparée avec les ingrédients favoris\ndu Pokémon légendaire Reshiram."
    it: "Uno spuntino fatto con gli ingredienti preferiti\ndal Pokémon leggendario Reshiram."
    de: "Dieser Snack wurde mit den Lieblingszutaten des\nLegendären Pokémon Reshiram zubereitet."
    es: "Galleta preparada con los ingredientes favoritos\ndel Pokémon legendario Reshiram."
    ko: "전설의 포켓몬 레시라무가\n좋아하는 식재료로 만들어진 간식."
    zh_simp: "用传说的宝可梦莱希拉姆\n喜欢的食材制作的点心。"
    zh_trad: "用傳說的寶可夢萊希拉姆\n喜愛的食材製成的點心。"
resist_feather:
  names:
    jp_kana: ていこうのハネ
    jp_kanji: ていこうのハネ
    en: Resist Feather
    fr: Plume Armure
    it: Piumtutela
    de: Abwehrfeder
    es: Pluma Aguante
    ko: 저항력깃털
    zh_simp: 抵抗之羽
    zh_trad: 抵抗之羽
  descriptions:
    jp_kana: "ポケモンに　使う　道具。\nポケモン　１匹の　防御の\n基礎ポイントを　ちょっと　あげる。"
    jp_kanji: "ポケモンに　使う　道具。\nポケモン　１匹の　防御の\n基礎ポイントを　ちょっと　あげる。"
    en: "An item to be used on a Pokémon. This feather slightly\nincreases base points for a Pokémon’s Defense stat."
    fr: "Objet à utiliser sur un Pokémon pour augmenter\nlégèrement sa Défense de base."
    it: "Strumento da usare su un Pokémon. Ne aumenta di poco\ni punti base della Difesa."
    de: "Wendet man dieses Item auf ein Pokémon an, werden\ndessen Verteidigungs-Basispunkte dauerhaft ein wenig\nerhöht."
    es: "Pluma que aumenta un poco la Defensa de base de un\nPokémon."
    ko: "포켓몬에게 사용하는 도구.\n포켓몬 1마리의 방어\n기초 포인트를 조금 올린다."
    zh_simp: "用于宝可梦的道具。\n能稍微提高１只宝可梦的\n防御的基础点数。"
    zh_trad: "用於寶可夢的道具。\n能稍微提高１隻寶可夢的\n防禦的基礎點數。"
resist_mochi:
  names:
    jp_kana: ていこうのもち
    jp_kanji: ていこうのもち
    en: Resist Mochi
    fr: Mochi Armure
    it: Mochi della tutela
    de: Abwehr-Mochi
    es: Mochi Aguante
    ko: 저항력떡
    zh_simp: 抵抗粘糕
    zh_trad: 抵抗糬
  descriptions:
    jp_kana: "きのみが　ねりこまれた　もち。\nポケモン　１匹の　防御の\n基礎ポイントを　あげる。"
    jp_kanji: "きのみが　ねりこまれた　もち。\nポケモン　１匹の　防御の\n基礎ポイントを　あげる。"
    en: "A mochi cake with Berries kneaded into its dough.\nIt increases base points for a Pokémon’s Defense stat."
    fr: "Un mochi contenant des Baies qui augmente\nla Défense de base d’un Pokémon."
    it: "Mochi preparato con un impasto a base di bacche.\nAumenta i punti base della Difesa."
    de: "Ein mit Beeren gefüllter Mochi, der die Verteidigungs-\nBasispunkte eines Pokémon dauerhaft erhöht."
    es: "La masa de este mochi está preparada con bayas.\nAumenta la Defensa de base de un Pokémon."
    ko: "으깬 나무열매가 들어 있는 떡.\n포켓몬 1마리의 방어\n기초 포인트를 올린다."
    zh_simp: "糅合树果的粘糕。\n能提高１只宝可梦的\n防御的基础点数。"
    zh_trad: "加入樹果揉製而成的麻糬。\n能提高１隻寶可夢的\n防禦的基礎點數。"
reveal_glass:
  names:
    jp_kana: うつしかがみ
    jp_kanji: うつしかがみ
    en: Reveal Glass
    fr: Miroir Sacré
    it: Verispecchio
    de: Wahrspiegel
    es: Espejo Veraz
    ko: 비추는거울
    zh_simp: 现形镜
    zh_trad: 現形鏡
  descriptions:
    jp_kana: "真実を　映しだすことで\nポケモンを　本来の姿に\n変えてしまう　不思議な鏡。"
    jp_kanji: "真実を　映しだすことで\nポケモンを　本来の姿に\n変えてしまう　不思議な鏡。"
    en: "A mysterious looking glass that reveals the truth.\nIt can return a Pokémon to its original shape."
    fr: "Un mystérieux miroir qui, en reflétant la vérité,\npermet de redonner à un Pokémon sa forme originelle."
    it: "Specchio misterioso che, riflettendo la verità, fa\nriacquistare ai Pokémon la loro forma originaria."
    de: "Ein mysteriöser Spiegel, der Pokémon in ihre eigentliche\nForm verwandelt, indem er die Wahrheit widerspiegelt."
    es: "Espejo misterioso que refleja la verdad y devuelve los\nPokémon a su forma original."
    ko: "진실을 비춰줌으로\n포켓몬을 본래의 모습으로\n바꿔 버리는 이상한 거울."
    zh_simp: "能够通过照出真实，\n让宝可梦变回原来\n样子的神奇镜子。"
    zh_trad: "能藉由照出真實，\n讓寶可夢變回原來\n樣子的神奇鏡子。"
revival_herb:
  names:
    jp_kana: ふっかつそう
    jp_kanji: ふっかつそう
    en: Revival Herb
    fr: Herbe Rappel
    it: Vitalerba
    de: Vitalkraut
    es: Hierba Revivir
    ko: 부활초
    zh_simp: 复活草
    zh_trad: 復活草
  descriptions:
    jp_kana: "とても　にがい　薬草。\nひんしの　ポケモン　１匹の\nＨＰを　すべて　回復する。"
    jp_kanji: "とても　にがい　薬草。\nひんしの　ポケモン　１匹の\nＨＰを　すべて　回復する。"
    en: "A very bitter medicinal herb. It can be used to revive\na Pokémon that has fainted. It also fully restores the\nPokémon’s max HP."
    fr: "Une herbe médicinale très amère.\nRanime un Pokémon K.O. et restaure tous ses PV."
    it: "Erba medicinale amarissima che restituisce tutti i PS\na un Pokémon esausto."
    de: "Ein bitteres medizinisches Kraut, das ein kampfunfähiges\nPokémon wiederbelebt und dessen KP vollständig\nwieder auffüllt."
    es: "Hierba medicinal muy amarga que reanima a un\nPokémon debilitado y restaura todos sus PS."
    ko: "매우 쓴 약초.\n기절한 포켓몬 1마리의\nHP를 모두 회복한다."
    zh_simp: "非常苦的药草。\n能让１只昏厥的宝可梦\n回复所有ＨＰ。"
    zh_trad: "非常苦的藥草。\n能讓１隻瀕死的寶可夢\n回復所有ＨＰ。"
revive:
  names:
    jp_kana: げんきのかけら
    jp_kanji: げんきのかけら
    en: Revive
    fr: Rappel
    it: Revitalizzante
    de: Beleber
    es: Revivir
    ko: 기력의조각
    zh_simp: 活力碎片
    zh_trad: 活力碎片
  descriptions:
    jp_kana: "ひんしになった　ポケモン\n１匹を　元気に　したうえで\nＨＰを　半分まで　回復する。"
    jp_kanji: "ひんしになった　ポケモン\n１匹を　元気に　したうえで\nＨＰを　半分まで　回復する。"
    en: "A medicine that can be used to revive a Pokémon that\nhas fainted. It also restores half the Pokémon’s max HP."
    fr: "Un médicament qui ranime un Pokémon K.O.\net restaure la moitié de ses PV max."
    it: "Rimedio che rianima un Pokémon esausto\ne gli restituisce metà dei suoi PS massimi."
    de: "Eine Medizin, die ein kampfunfähiges Pokémon\nwiederbelebt. Die Hälfte der maximalen KP wird\naufgefüllt."
    es: "Medicina que reanima a un Pokémon debilitado y le\ndevuelve la mitad de sus PS."
    ko: "기절해 버린 포켓몬\n1마리를 건강하게 하고\nHP를 절반까지 회복한다."
    zh_simp: "能让１只陷入昏厥的\n宝可梦重获生机，\n并回复一半ＨＰ。"
    zh_trad: "能讓１隻陷入瀕死的\n寶可夢重獲生機，\n並回復一半ＨＰ。"
revive:recipe:
  names:
    jp_kana: げんきのかけら
    jp_kanji: げんきのかけら
    en: Revive
    fr: Rappel
    it: Revitalizzante
    de: Beleber
    es: Revivir
    ko: 기력의조각
    zh_simp: 活力碎片
    zh_trad: 活力碎片
  descriptions:
    jp_kana: "げんきのかけらのレシピ。　材料は\nゲンキノツボミ×１　クスリソウ×２"
    jp_kanji: "げんきのかけらのレシピ。　材料は\nゲンキノツボミ×１　クスリソウ×２"
    en: "A recipe for crafting Revives from scratch.\nRequired materials: 1 Vivichoke and 2 Medicinal Leeks."
    fr: "Méthode pour Rappel. Ressources nécessaires :\n1 Bourgeon Vivace et 2 Soignons."
    it: "Ricetta per un Revitalizzante. Richiede 1 Revitalboccio e\n2 Porri officinali."
    de: "Die Anleitung zur Herstellung eines Belebers.\nBenötigte Materialien: 1 Vitalknospe und\n2 Stangen Fitlauch."
    es: "Receta para crear Revivir. Materiales:\n1 Revibrote y 2 Puerros Medicinales."
    ko: "기력의조각의 레시피.\n재료: 기력의봉오리×1 약초×2"
    zh_simp: "活力碎片的材料单。材料是：\n活力蕾×１　疗草×２"
    zh_trad: "活力碎片的材料單。材料是：\n活力蕾×１　療草×２"
rhyhorn_candy:
  names:
    jp_kana: サイホーンのアメ
    jp_kanji: サイホーンのアメ
    en: Rhyhorn Candy
    fr: Bonbon Rhinocorne
    it: Caramella Rhyhorn
    de: Rihorn-Bonbon
    es: Caramelo Rhyhorn
    ko: 뿔카노의사탕
    zh_simp: 独角犀牛的糖果
    zh_trad: 獨角犀牛的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
rhyhorn_fang:
  names:
    jp_kana: サイホーンのキバ
    jp_kanji: サイホーンのキバ
    en: Rhyhorn Fang
    fr: Croc de Rhinocorne
    it: Zanna di Rhyhorn
    de: Rihorn-Zahn
    es: Colmillo de Rhyhorn
    ko: 뿔카노의이빨
    zh_simp: 独角犀牛的牙
    zh_trad: 獨角犀牛的牙
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
ribbon_sweet:
  names:
    jp_kana: リボンアメざいく
    jp_kanji: リボンアメざいく
    en: Ribbon Sweet
    fr: Ruban en Sucre
    it: Bonbonfiocco
    de: Zucker-Schleife
    es: Confite Lazo
    ko: 리본사탕공예
    zh_simp: 蝴蝶结糖饰
    zh_trad: 蝴蝶結糖飾
  descriptions:
    jp_kana: "リボンの形をした　アメ細工。\nマホミルに　持たせてあげると\nくるくる　回って　喜ぶ。"
    jp_kanji: "リボンの形をした　アメ細工。\nマホミルに　持たせてあげると\nくるくる　回って　喜ぶ。"
    en: "A ribbon-shaped sweet. When a Milcery holds this,\nit spins around happily."
    fr: "Un bonbon en forme de ruban.\nQuand on le donne à un Crèmy, il se réjouit en tournant\nsur lui-même."
    it: "Bonbon a forma di fiocco. Se dato a Milcery,\nil Pokémon farà le piroette per la felicità."
    de: "Zuckerwerk in Form einer Schleife. Gibt man es Hokumil\nzum Tragen, dreht es sich vor Freude im Kreis."
    es: "Figura de caramelo con forma de lazo. Al dárselo a\nMilcery, se pone a girar rebosante de alegría."
    ko: "리본 모양의 사탕공예.\n마빌크에게 지니게 하면\n빙빙 돌며 기뻐한다."
    zh_simp: "蝴蝶结形状的工艺糖果。\n让小仙奶携带的话，\n会高兴地转圈圈。"
    zh_trad: "蝴蝶結形狀的工藝糖果。\n讓小仙奶攜帶的話，\n牠會高興得轉圈圈。"
rice:
  names:
    jp_kana: ライス
    jp_kanji: ライス
    en: Rice
    fr: Riz
    it: Riso
    de: Reis
    es: Arroz
    ko: 라이스
    zh_simp: 米饭
    zh_trad: 米飯
  descriptions:
    jp_kana: "甘味が　ある　食材。\n炊きあげた米。　サンドウィッチの\n具材として　可能性は　未知数。"
    jp_kanji: "甘味が　ある　食材。\n炊きあげた米。　サンドウィッチの\n具材として　可能性は　未知数。"
    en: "An ingredient with a touch of sweetness. It’s unclear how\nwell this cooked rice will serve as a sandwich filling."
    fr: "Un ingrédient au goût sucré. Ce riz cuit offre\nau Sandwich auquel on l’ajoute des possibilités\ngustatives infinies."
    it: "Un ingrediente dolce. Le possibilità offerte come\ncompanatico da questo riso cotto non sono ancora state\nesplorate a fondo."
    de: "Eine süßliche Zutat. Mit der Verwendung von gekochtem\nReis als Sandwichbelag betritt man in kulinarischer\nHinsicht absolutes Neuland."
    es: "El sabor sencillo y dulzón del arroz recién cocido abre la\npuerta a una infinidad de posibilidades como relleno de\nbocadillo hasta ahora desconocidas."
    ko: "단맛이 나는 식재료.\n갓 지은 밥이다. 샌드위치 재료로서의\n가능성은 미지수다."
    zh_simp: "带有甜味的食材。\n煮熟的米。作为三明治\n馅料的潜力还是未知数。"
    zh_trad: "帶有甜味的食材。\n煮熟的米飯。以三明治的材料而言，\n其可能性仍未可知。"
rich_mulch:
  names:
    jp_kana: たわわこやし
    jp_kanji: たわわこやし
    en: Rich Mulch
    fr: Fertibondance
    it: Fertilflorido
    de: Sprießmulch
    es: Abono Fértil
    ko: 주렁주렁비료
    zh_simp: 硕果肥
    zh_trad: 碩果肥
  descriptions:
    jp_kana: "きのみを　育てるときの　肥料。\nしかし　ホウエン地方の　土には\nまるで　なじまないので　効果が　ない。"
    jp_kanji: "きのみを　育てるときの　肥料。\nしかし　ホウエン地方の　土には\nまるで　なじまないので　効果が　ない。"
    en: "A fertilizer for growing Berries. However, it appears\nto be unsuitable for the soil in the Hoenn region and\nhas no effect."
    fr: "Un engrais à utiliser sur un sol meuble.\nIl n’est cependant pas adapté aux terres de Hoenn\net n’y a aucun effet."
    it: "Fertilizzante usato per coltivare le bacche. Tuttavia,\nnon ha effetto a Hoenn, perché non è adatto al terreno\ndella regione."
    de: "Mulch zur Nutzung auf Beerenfeldern. Durch seine\nUnverträglichkeit mit den Böden in Hoenn bleibt sein\nEinsatz dort ohne Wirkung."
    es: "Un fertilizante usado para el cultivo de bayas. Parece\nque no se asienta bien en el suelo de Hoenn, por lo\nque no tiene efecto en esta región."
    ko: "나무열매를 키울 때 사용하는 비료.\n그러나 호연지방의 흙에는\n전혀 맞지 않기에 효과가 없다."
    zh_simp: "培育树果时的肥料。\n但完全不适合丰缘地区的土壤，\n所以没什么效果。"
    zh_trad: "培育樹果時的肥料。\n但完全不適合豐緣地區的土壤，\n所以沒什麼效果。"
ride_pager:
  names:
    jp_kana: ライドギア
    jp_kanji: ライドギア
    en: Ride Pager
    fr: Appel-Monture
    it: Chiamapassaggio
    de: PokéMobil-Funk
    es: Buscamontura
    ko: 라이드기어
    zh_simp: 骑行装置
    zh_trad: 騎行裝置
  descriptions:
    jp_kana: "ナンバーを　うちこむことで\n対応した　ライドポケモンを\n瞬時に　呼びだす　道具。"
    jp_kanji: "ナンバーを　うちこむことで\n対応した　ライドポケモンを\n瞬時に　呼びだす　道具。"
    en: "By entering certain numbers on this pager,\nyou can summon Ride Pokémon in an instant."
    fr: "Un appareil permettant d’appeler une Poké Monture\ninstantanément en tapant le bon numéro."
    it: "Dispositivo che permette di chiamare i Pokémon del\nPoképassaggio digitando il numero corrispondente."
    de: "Ein Gerät, mit dem durch die Eingabe einer Nummer\ndas entsprechende Pokémon für PokéMobil gerufen\nwird."
    es: "Dispositivo dotado de un teclado numérico con el que\nllamar a diversas Pokémonturas."
    ko: "넘버를 입력해서\n대응하는 라이드포켓몬을\n순식간에 불러내는 도구."
    zh_simp: "通过输入编号，瞬间召唤\n与编号对应的坐骑宝可梦的道具。"
    zh_trad: "透過輸入編號，瞬間叫出\n與編號對應的坐騎寶可夢的道具。"
rindo_berry:
  names:
    jp_kana: リンドのみ
    jp_kanji: リンドのみ
    en: Rindo Berry
    fr: Baie Ratam
    it: Baccarindo
    de: Grindobeere
    es: Baya Tamar
    ko: 린드열매
    zh_simp: 罗子果
    zh_trad: 羅子果
  descriptions:
    jp_kana: "ポケモンに　持たせると\n効果バツグンの　くさ技を\n受けたとき　威力が　弱まる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　くさ技を\n受けたとき　威力が　弱まる。"
    en: "If a Pokémon holding this Berry is hit with a\nsupereffective Grass-type move, the power of that\nmove will be weakened."
    fr: "Tenue, cette Baie réduit les dégâts subis lorsque\nle Pokémon est touché par une capacité super efficace\nde type Plante."
    it: "Se il Pokémon che ha questa bacca subisce una mossa\nsuperefficace di tipo Erba, la potenza della mossa\nviene indebolita."
    de: "Als getragenes Item schwächt diese Beere eine\nsehr effektive Pflanzen-Attacke, von der das\nPokémon getroffen wird."
    es: "Si la lleva un Pokémon, debilita un ataque supereficaz\nde tipo Planta que reciba."
    ko: "포켓몬에게 지니게 하면\n효과가 굉장한 풀 기술로\n공격받았을 때 위력이 약해진다."
    zh_simp: "让宝可梦携带后，\n在受到效果绝佳的草属性招式\n攻击时，能令其威力减弱。"
    zh_trad: "讓寶可夢攜帶後，\n在受到效果絕佳的草屬性招式\n攻擊時，能使其威力減弱。"
ring_target:
  names:
    jp_kana: ねらいのまと
    jp_kanji: ねらいのまと
    en: Ring Target
    fr: Point de Mire
    it: Facilsaglio
    de: Zielscheibe
    es: Blanco
    ko: 겨냥표적
    zh_simp: 标靶
    zh_trad: 標靶
  descriptions:
    jp_kana: "ポケモンの　タイプの相性で\n無効だった　技が\n当たるように　なってしまう。"
    jp_kanji: "ポケモンの　タイプの相性で\n無効だった　技が\n当たるように　なってしまう。"
    en: "An item to be held by a Pokémon. Moves that would\nnormally have no effect due to type matchups will still\nhit the holder."
    fr: "Objet à tenir. Rend le porteur sensible aux capacités\nauxquelles il devrait être immunisé en raison de son\ntype."
    it: "Se un Pokémon ha questo strumento, le mosse che\ndi norma non hanno effetto contro il suo tipo vanno\na segno."
    de: "Attacken, die aufgrund der Wechselwirkungen zwischen\nden Typen keine Wirkung haben, treffen den Träger."
    es: "El Pokémon que lo lleva es vulnerable frente a\nmovimientos que normalmente no afectan a su tipo."
    ko: "포켓몬 타입의 상성 때문에\n무효였던 기술이\n맞게 되어 버린다."
    zh_simp: "原本因宝可梦的属性相克关系\n而无效的招式现在会变得\n能够击中自己。"
    zh_trad: "原本因寶可夢的屬性相剋關係\n而無效的招式現在會變得\n能夠擊中自己。"
riolu_fur:
  names:
    jp_kana: リオルのけ
    jp_kanji: リオルのけ
    en: Riolu Fur
    fr: Poils de Riolu
    it: Pelo di Riolu
    de: Riolu-Haar
    es: Pelo de Riolu
    ko: 리오르의털
    zh_simp: 利欧路的毛
    zh_trad: 利歐路的毛
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
rock_gem:
  names:
    jp_kana: いわのジュエル
    jp_kanji: いわのジュエル
    en: Rock Gem
    fr: Joyau Roche
    it: Bijouroccia
    de: Gesteinsjuwel
    es: Gema Roca
    ko: 바위주얼
    zh_simp: 岩石宝石
    zh_trad: 岩石寶石
  descriptions:
    jp_kana: "いわのタイプの　ジュエル。\n持たせると　１度だけ　いわの\n技の威力が　強まる。"
    jp_kanji: "いわのタイプの　ジュエル。\n持たせると　１度だけ　いわの\n技の威力が　強まる。"
    en: "An item to be held by a Pokémon. This gem is imbued\nwith the essence of rock and will boost the power of a\nRock-type move—but only once."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Roche."
    it: "Strumento da dare a un Pokémon. Gioiello che potenzia\nuna sola volta le mosse di tipo Roccia."
    de: "Ein Item zum Tragen. Dieses Juwel verstärkt einmalig\neine Attacke vom Typ Gestein."
    es: "Joya de un solo uso que potencia un movimiento de\ntipo Roca. Debe llevarla un Pokémon."
    ko: "바위타입의 주얼.\n지니게 하면 한 번만 바위\n기술의 위력이 강해진다."
    zh_simp: "岩石属性的宝石。\n携带后，岩石属性的\n招式威力仅会增强１次。"
    zh_trad: "岩石屬性的寶石。\n攜帶後，岩石屬性招式的\n威力會僅增強１次。"
rock_incense:
  names:
    jp_kana: がんせきおこう
    jp_kanji: がんせきおこう
    en: Rock Incense
    fr: Encens Roc
    it: Roccioaroma
    de: Steinrauch
    es: Incienso Roca
    ko: 암석향로
    zh_simp: 岩石薰香
    zh_trad: 岩石薰香
  descriptions:
    jp_kana: "不思議な香りの　御香。\n持たせると　いわタイプの\n技の威力が　あがる。"
    jp_kanji: "不思議な香りの　御香。\n持たせると　いわタイプの\n技の威力が　あがる。"
    en: "An item to be held by a Pokémon. This incense has\na curious aroma that boosts the power of the holder’s\nRock-type moves."
    fr: "Objet à tenir. Un encens au parfum curieux\naugmentant la puissance des capacités de type Roche."
    it: "Strumento da dare a un Pokémon. Incenso dal profumo\nesotico che potenzia le mosse di tipo Roccia."
    de: "Ein Item zum Tragen. Dieses exotische Räucherwerk\nverstärkt Attacken vom Typ Gestein."
    es: "Incienso de exótico aroma que potencia los movimientos\nde tipo Roca. Debe llevarlo un Pokémon."
    ko: "이상한 향기의 향로.\n지니게 하면 바위타입\n기술의 위력이 올라간다."
    zh_simp: "有着神奇香气的薰香。\n携带后，岩石属性的\n招式威力就会提高。"
    zh_trad: "有著神奇香氣的薰香。\n攜帶後，岩石屬性的\n招式威力就會提高。"
rock_memory:
  names:
    jp_kana: ロックメモリ
    jp_kanji: ロックメモリ
    en: Rock Memory
    fr: ROM Roche
    it: ROM Roccia
    de: Gesteins-Disc
    es: Disco Roca
    ko: 록메모리
    zh_simp: 岩石存储碟
    zh_trad: 岩石記憶碟
  descriptions:
    jp_kana: "いわタイプの　データが　入った\nメモリ。　特定のポケモンが　持つと\nタイプが　変わる。"
    jp_kanji: "いわタイプの　データが　入った\nメモリ。　特定のポケモンが　持つと\nタイプが　変わる。"
    en: "A memory disc that contains Rock-type data.\nIt changes the type of the holder if held by\na certain species of Pokémon."
    fr: "Une carte mémoire contenant des données sur\nle type Roche. Un certain Pokémon peut changer\nde type en l’équipant."
    it: "ROM contenente dati sul tipo Roccia in formato digitale.\nPermette a un certo Pokémon di cambiare tipo."
    de: "Eine Disc mit Daten zum Typ Gestein. Sie löst bei einem\nbestimmten Pokémon einen Typenwechsel aus."
    es: "Disco de datos que contiene información relativa al tipo\nRoca. Permite cambiar de tipo a cierto Pokémon."
    ko: "바위타입의 데이터가 들어 있는\n메모리. 특정 포켓몬이\n지니면 타입이 바뀐다."
    zh_simp: "装有岩石属性数据的存储碟。\n特定宝可梦携带后，\n属性就会发生变化。"
    zh_trad: "裝有岩石屬性資料的記憶碟。\n特定寶可夢攜帶後，\n就會產生屬性的變化。"
rock_tera_shard:
  names:
    jp_kana: テラピースいわ
    jp_kanji: テラピースいわ
    en: Rock Tera Shard
    fr: Téra-Éclat Roche
    it: Teralite Roccia
    de: Tera-Stück (Gestein)
    es: Teralito Roca
    ko: 테라피스 바위
    zh_simp: 岩石太晶碎块
    zh_trad: 岩石太晶碎塊
  descriptions:
    jp_kana: "テラスタルポケモンが　倒れたとき\n砕けた　テラスタルジュエルが\nまれに　結晶化したもの。"
    jp_kanji: "テラスタルポケモンが　倒れたとき\n砕けた　テラスタルジュエルが\nまれに　結晶化したもの。"
    en: "On rare occasions, these shards form when a Tera\nPokémon falls in battle and its Tera Jewel shatters."
    fr: "Un fragment cristallisé qui se forme rarement lors\nde l’éclatement d’un Joyau Téracristal après qu’un\nPokémon Téracristal a été mis K.O."
    it: "Cristallizzazione che raramente si forma quando\nun Pokémon Teracristal viene sconfitto e la sua gemma\nTeracristal va in frantumi."
    de: "In äußerst seltenen Fällen kristallisieren Bruchstücke\ndes Terakristalls von im Kampf besiegten Terakristall-\nPokémon zu solchen Tera-Stücken."
    es: "Esquirla que se forma muy raramente cuando la joya\nTeracristal de un Pokémon teracristalizado se quiebra\ntras derrotarlo."
    ko: "테라스탈 포켓몬이 쓰러졌을 때\n부서진 테라스탈 주얼이\n드물게 결정화한 조각."
    zh_simp: "打倒太晶宝可梦时，\n破碎掉的太晶宝石有\n极低概率会结晶成此物。"
    zh_trad: "太晶寶可夢倒下時，\n碎裂的太晶寶石在罕見的情況下\n會結晶化，而形成此物。"
rockium_z:bag:
  names:
    jp_kana: イワＺ
    jp_kanji: イワＺ
    en: Rockium Z
    fr: Rocazélite
    it: Petrium Z
    de: Petrium Z
    es: Litostal Z
    ko: 바위Z
    zh_simp: 岩石Ｚ
    zh_trad: 岩石Ｚ
  descriptions:
    jp_kana: "いわタイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    jp_kanji: "いわタイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nRock-type moves to Rock-type Z-Moves."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise son porteur à transformer ses capacités\nde type Roche en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono ai Pokémon di trasformare le mosse\ndi tipo Roccia in mosse Z."
    de: "Kristallisierte Z-Kraft, die Gesteins-Attacken zu\nZ-Attacken aufstuft. Wird bei Bedarf automatisch\nvervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a los\nportadores convertir sus movimientos de tipo Roca en\nmovimientos Z."
    ko: "바위타입 기술을\nZ기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将岩石属性招式升级成\nＺ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把岩石屬性招式\n升級為Ｚ招式的Ｚ力量結晶。"
rockium_z:held:
  names:
    jp_kana: イワＺ
    jp_kanji: イワＺ
    en: Rockium Z
    fr: Rocazélite
    it: Petrium Z
    de: Petrium Z
    es: Litostal Z
    ko: 바위Z
    zh_simp: 岩石Ｚ
    zh_trad: 岩石Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　結晶。\nいわタイプの　技を\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nいわタイプの　技を\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Rock-type moves to Z-Moves."
    fr: "Une cristallisation de la Force Z, permettant\nde transformer les capacités de type Roche\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare le mosse di tipo Roccia\nin mosse Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft\nGesteins-Attacken zu Z-Attacken auf."
    es: "Cristal que confiere el Poder Z a los movimientos\nde tipo Roca."
    ko: "Z파워의 결정.\n바위타입 기술을\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将岩石属性的招式\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把岩石屬性的招式\n升級為Ｚ招式。"
rockruff_rock:
  names:
    jp_kana: イワンコのいわ
    jp_kanji: イワンコのいわ
    en: Rockruff Rock
    fr: Roche de Rocabot
    it: Roccia di Rockruff
    de: Wuffels-Stein
    es: Roca de Rockruff
    ko: 암멍이의바위
    zh_simp: 岩狗狗的岩石
    zh_trad: 岩狗狗的岩石
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
rocky_helmet:
  names:
    jp_kana: ゴツゴツメット
    jp_kanji: ゴツゴツメット
    en: Rocky Helmet
    fr: Casque Brut
    it: Bitorzolelmo
    de: Beulenhelm
    es: Casco Dentado
    ko: 울퉁불퉁멧
    zh_simp: 凸凸头盔
    zh_trad: 凸凸頭盔
  descriptions:
    jp_kana: "ポケモンに　持たせると\n自分に　さわった相手に\nダメージを　与える。"
    jp_kanji: "ポケモンに　持たせると\n自分に　さわった相手に\nダメージを　与える。"
    en: "An item to be held by a Pokémon. If another Pokémon\nmakes direct contact with the holder, that Pokémon will\nbe damaged."
    fr: "Objet à tenir. Il inflige des dégâts à l’attaquant\nsi ce dernier touche directement le porteur."
    it: "Il Pokémon che ha questo strumento infligge danni\nall’avversario che è entrato in contatto con lui."
    de: "Ein Item zum Tragen. Fügt einem Angreifer Schaden zu,\nwenn dieser den Träger berührt."
    es: "Si el portador es alcanzado por un movimiento de\ncontacto, el atacante también recibe daño."
    ko: "포켓몬에게 지니게 하면\n자신과 접촉한 상대에게\n데미지를 준다."
    zh_simp: "让宝可梦携带后，\n能对触碰到自己的\n对手造成伤害。"
    zh_trad: "讓寶可夢攜帶後，\n會對接觸到自己的\n對手造成傷害。"
roller_skates:
  names:
    jp_kana: ローラースケート
    jp_kanji: ローラースケート
    en: Roller Skates
    fr: Rollers
    it: Pattini
    de: Rollerskates
    es: Patines
    ko: 롤러스케이트
    zh_simp: 轮滑鞋
    zh_trad: 溜冰鞋
  descriptions:
    jp_kana: "クツ底に　ローラーが　ついている。\n地面を　滑走　したり\nトリックプレイを　決めたりできる。"
    jp_kanji: "クツ底に　ローラーが　ついている。\n地面を　滑走　したり\nトリックプレイを　決めたりできる。"
    en: "Attaches roller skates to the bottom of your shoes,\nallowing you to glide quickly around and perform tricks."
    fr: "Aussi connus sous le nom de patins à roulettes,\nils permettent de se déplacer rapidement\net éventuellement de réaliser des figures."
    it: "Pattini applicati alla suola delle scarpe.\nPermettono di pattinare e di eseguire figure."
    de: "Schuhe mit Rädern an der Sohle. Mit ihnen kannst du\nüber den Boden rollen und Tricks ausführen."
    es: "Ruedas que se acoplan a la suela del calzado y te\npermiten ir más rápido y realizar piruetas\nespectaculares."
    ko: "신발 바닥에 롤러가 달려 있다.\n지면을 활주하거나\n트릭플레이를 할 수 있다."
    zh_simp: "鞋底下装着滑轮。\n能在地面上滑行，\n或漂亮地表演特技。"
    zh_trad: "鞋底裝著滑輪。\n能在地面上滑行，\n或漂亮地表演特技。"
rolycoly_coal:
  names:
    jp_kana: タンドンのせきたん
    jp_kanji: タンドンのせきたん
    en: Rolycoly Coal
    fr: Charbon de Charbi
    it: Carbone di Rolycoly
    de: Klonkett-Kohle
    es: Carbón de Rolycoly
    ko: 탄동의석탄
    zh_simp: 小炭仔的煤炭
    zh_trad: 小炭仔的煤炭
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
