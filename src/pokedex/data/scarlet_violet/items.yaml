    fr: Rouille de Ferdeter
    it: Ruggine di Orthworm
    de: Schlurm-Patina
    es: Óxido de Orthworm
    ko: 꿈트렁의녹
    zh_simp: 拖拖蚓的锈
    zh_trad: 拖拖蚓的鏽
