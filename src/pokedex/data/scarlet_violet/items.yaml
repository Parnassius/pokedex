hm07:
  names:
    jp_kana: ひでんマシン０７
    jp_kanji: ひでんマシン０７
    en: HM07
    fr: CS07
    it: MN07
    de: VM07
    es: MO07
    ko: 비전머신07
    zh_simp: 秘传学习器０７
    zh_trad: 秘傳學習器０７
  descriptions:
    jp_kana: "１ターン目で　潜り　２ターン目に\n浮きあがって　攻撃する。"
    jp_kanji: "１ターン目で　潜り　２ターン目に\n浮きあがって　攻撃する。"
    en: "Diving on the first turn, the user floats up and\nattacks on the next turn."
    fr: "Le lanceur plonge sous l’eau au premier tour\net frappe au second."
    it: "Il Pokémon si tuffa in acqua per emergere e attaccare\nal turno successivo."
    de: "Anwender taucht in Runde 1 ab und greift in Runde 2\naus der Tiefe an."
    es: "El usuario se sumerge en el primer turno y ataca en el\nsegundo."
    ko: "1턴째에 잠수했다가\n2턴째에 떠올라 공격한다."
    zh_simp: "第１回合潜入水中，\n第２回合浮上来进行攻击。"
    zh_trad: "使用後的第１回合潛入水中，\n並於第２回合浮上來進行攻擊。"
ho_oh_treat:
  names:
    jp_kana: ホウオウのおやつ
    jp_kanji: ホウオウのおやつ
    en: Ho-Oh Treat
    fr: Friandise Ho-Oh
    it: Spuntino per Ho-Oh
    de: Ho-Oh-Snack
    es: Galleta Ho-Oh
    ko: 칠색조의간식
    zh_simp: 凤王的点心
    zh_trad: 鳳王的點心
  descriptions:
    jp_kana: "伝説のポケモン　ホウオウが\n好む食材で　作られた　おやつ。"
    jp_kanji: "伝説のポケモン　ホウオウが\n好む食材で　作られた　おやつ。"
    en: "A snack made from ingredients favored by the\nLegendary Pokémon Ho-Oh."
    fr: "Une friandise préparée avec les ingrédients favoris\ndu Pokémon légendaire Ho-Oh."
    it: "Uno spuntino fatto con gli ingredienti preferiti\ndal Pokémon leggendario Ho-Oh."
    de: "Dieser Snack wurde mit den Lieblingszutaten des\nLegendären Pokémon Ho-Oh zubereitet."
    es: "Galleta preparada con los ingredientes favoritos\ndel Pokémon legendario Ho-Oh."
    ko: "전설의 포켓몬 칠색조가\n좋아하는 식재료로 만들어진 간식."
    zh_simp: "用传说的宝可梦凤王\n喜欢的食材制作的点心。"
    zh_trad: "用傳說的寶可夢鳳王\n喜愛的食材製成的點心。"
holo_caster:female:
  names:
    jp_kana: ホロキャスター
    jp_kanji: ホロキャスター
    en: Holo Caster
    fr: Holokit
    it: Holovox
    de: Holo-Log
    es: Holomisor
    ko: 홀로캐스터
    zh_simp: 全息影像通讯器
    zh_trad: 全像投影通訊器
  descriptions:
    jp_kana: "受信した　ホログラムの\n映像データを　いつでも\n観ることが　できる　装置。"
    jp_kanji: "受信した　ホログラムの\n映像データを　いつでも\n観ることが　できる　装置。"
    en: "A device that allows you to view the hologram clips\nyou have received at any time."
    fr: "Un appareil portable permettant de recevoir\net de visualiser des hologrammes à volonté."
    it: "Dispositivo in grado di ricevere e riprodurre in qualsiasi\nmomento comunicazioni olografiche."
    de: "Ein Gerät, das Hologramm-Nachrichten empfangen\nund jederzeit abspielen kann."
    es: "Este aparato permite recibir vídeos holográficos\ny visualizarlos en cualquier momento."
    ko: "수신한 홀로그램\n영상 데이터를 언제라도\n볼 수 있는 장치."
    zh_simp: "可以随时查看接收到的\n全息影像数据的装置。"
    zh_trad: "可以隨時查看接收到的\n全像投影資料的裝置。"
holo_caster:male:
  names:
    jp_kana: ホロキャスター
    jp_kanji: ホロキャスター
    en: Holo Caster
    fr: Holokit
    it: Holovox
    de: Holo-Log
    es: Holomisor
    ko: 홀로캐스터
    zh_simp: 全息影像通讯器
    zh_trad: 全像投影通訊器
  descriptions:
    jp_kana: "受信した　ホログラムの\n映像データを　いつでも\n観ることが　できる　装置。"
    jp_kanji: "受信した　ホログラムの\n映像データを　いつでも\n観ることが　できる　装置。"
    en: "A device that allows you to view the hologram clips\nyou have received at any time."
    fr: "Un appareil portable permettant de recevoir\net de visualiser des hologrammes à volonté."
    it: "Dispositivo in grado di ricevere e riprodurre in qualsiasi\nmomento comunicazioni olografiche."
    de: "Ein Gerät, das Hologramm-Nachrichten empfangen\nund jederzeit abspielen kann."
    es: "Este aparato permite recibir vídeos holográficos\ny visualizarlos en cualquier momento."
    ko: "수신한 홀로그램\n영상 데이터를 언제라도\n볼 수 있는 장치."
    zh_simp: "可以随时查看接收到的\n全息影像数据的装置。"
    zh_trad: "可以隨時查看接收到的\n全像投影資料的裝置。"
hometown_muffin:
  names:
    jp_kana: ふるさとマフィン
    jp_kanji: ふるさとマフィン
    en: Hometown Muffin
    fr: Muffin Tradition
    it: Muffin classico
    de: Heimatmuffin
    es: Bizcocho Clásico
    ko: 고향머핀
    zh_simp: 家乡玛芬
    zh_trad: 家鄉瑪芬
  descriptions:
    jp_kana: "ガラル地方などで　食べられるお菓子。\nきのみなどを　使って　作る。\n好むポケモンも　意外と　多い。"
    jp_kanji: "ガラル地方などで　食べられるお菓子。\nきのみなどを　使って　作る。\n好むポケモンも　意外と　多い。"
    en: "A baked treat made from Berries and other ingredients,\nwhich is often eaten in regions such as Galar. It is\nbeloved by a surprising number of Pokémon."
    fr: "Un muffin à base de Baies, très apprécié des êtres\nhumains et des Pokémon, notamment dans la région\nde Galar."
    it: "Prodotto da forno consumato a Galar e in altre regioni.\nViene preparato con bacche e vari ingredienti,\ne stranamente è apprezzato anche da molti Pokémon."
    de: "Dieses Beerengebäck ist sehr beliebt in Galar und\nanderen Regionen. Es schmeckt auch überraschend\nvielen Pokémon."
    es: "Dulce que se suele consumir en regiones como Galar\nque se prepara a base de bayas y otros ingredientes.\nCuriosamente, hace las delicias de muchos Pokémon."
    ko: "가라르지방 등에서 흔히 먹는 간식.\n나무열매 등을 사용해 만든다.\n좋아하는 포켓몬이 의외로 많다."
    zh_simp: "伽勒尔地区常见的点心。\n用树果等材料制成，\n爱吃这种点心的宝可梦意外地多。"
    zh_trad: "伽勒爾地區常見的點心。\n用樹果等材料製成，\n愛吃這種點心的寶可夢意外地多。"
hondew_berry:
  names:
    jp_kana: ロメのみ
    jp_kanji: ロメのみ
    en: Hondew Berry
    fr: Baie Lonme
    it: Baccamelon
    de: Honmelbeere
    es: Baya Meluce
    ko: 로매열매
    zh_simp: 哈密果
    zh_trad: 哈密果
  descriptions:
    jp_kana: "ポケモンに　あげると\nとても　なかよく　なりやすくなるが\n特攻の　基礎ポイントは　さがる。"
    jp_kanji: "ポケモンに　あげると\nとても　なかよく　なりやすくなるが\n特攻の　基礎ポイントは　さがる。"
    en: "If a Pokémon is fed this Berry, it will grow more friendly,\nbut it will lose base points for its Sp. Atk stat."
    fr: "Une Baie qui rend les Pokémon plus amicaux,\nmais baisse leur Attaque Spéciale de base."
    it: "Usata su un Pokémon, ne aumenta il livello di amicizia,\nma ne diminuisce i punti base dell’Attacco Speciale."
    de: "Isst ein Pokémon diese Beere, wird es zutraulicher,\naber seine Spezial-Angriffs-Basispunkte sinken."
    es: "Al usarla con un Pokémon, lo vuelve más amistoso,\npero también reduce su Ataque Especial de base."
    ko: "포켓몬에게 주면\n매우 친밀해지기 쉬워지지만\n특수공격의 기초 포인트가 떨어진다."
    zh_simp: "如果把它交给宝可梦，\n宝可梦就会变得非常容易和训练家亲密，\n但特攻的基础点数会降低。"
    zh_trad: "如果把它餵給寶可夢，\n寶可夢會非常容易和訓練家變得友好，\n但特攻的基礎點數會降低。"
honey:
  names:
    jp_kana: あまいミツ
    jp_kanji: あまいミツ
    en: Honey
    fr: Miel
    it: Miele
    de: Honig
    es: Miel
    ko: 달콤한꿀
    zh_simp: 甜甜蜜
    zh_trad: 甜甜蜜
  descriptions:
    jp_kana: "ポケモンが　集めた\nあまい　においがする　ミツ。\nショップで　安く　売れる。"
    jp_kanji: "ポケモンが　集めた\nあまい　においがする　ミツ。\nショップで　安く　売れる。"
    en: "Honey collected thanks to Pokémon’s efforts. It has a\nsweet aroma and can be sold at a low price to shops."
    fr: "Du miel au parfum riche rassemblé par des Pokémon.\nPeut être vendu à bas prix en magasin."
    it: "Miele dal dolce aroma, frutto dell’attività di determinati\nPokémon. Si può vendere a un prezzo basso nei negozi."
    de: "Süß duftender Honig, der von Pokémon gesammelt\nwurde. Kann für wenig Geld verkauft werden."
    es: "Miel de dulce aroma recolectada por los Pokémon que\nno alcanza un buen precio en las tiendas."
    ko: "포켓몬이 모은\n달콤한 냄새가 나는 꿀.\n상점에서 싸게 팔린다."
    zh_simp: "宝可梦采集的清甜芬芳的花蜜。\n可在商店里廉价出售。"
    zh_trad: "寶可夢採集的香甜花蜜。\n可以在商店低價出售。"
honey_cake:
  names:
    jp_kana: ミツよせだま
    jp_kanji: ミツよせだま
    en: Honey Cake
    fr: Appât Kibrille
    it: Polpetta miele
    de: Honigköder
    es: Cebo Meloso
    ko: 꿀유인환
    zh_simp: 蜜诱团
    zh_trad: 蜜誘糰
  descriptions:
    jp_kana: "ミツとよせだまのもとを練りこんだもの。\n虫ポケモンやフェアリーのようなポケモンを\n強く引き寄せることができる。"
    jp_kanji: "ミツとよせだまのもとを練りこんだもの。\n虫ポケモンやフェアリーのようなポケモンを\n強く引き寄せることができる。"
    en: "A cake made by combining honey with a Cake-Lure\nBase. These cakes are potently effective at attracting\nbug Pokémon and also those with fairylike charms."
    fr: "Obtenu en pétrissant une boule d’Appâte mélangée\nà du miel, cet appât attire fortement les Pokémon\npareils à des insectes ou à des fées."
    it: "Strumento creato aggiungendo del miele a una Polpetta\nbase. Esercita una forte attrattiva in particolare sui\nPokémon simili a coleotteri e a esseri magici."
    de: "Eine Mischung aus Köderteig und Honig, von der\nfeen- sowie insektenähnliche Pokémon stark angezogen\nwerden."
    es: "Bola de cebo creada con miel y masa que atrae a los\nPokémon con atributos de insecto o feéricos."
    ko: "꿀과 유인환반죽을 섞어서 반죽한 것.\n벌레포켓몬이나 페어리 같은 포켓몬을\n강하게 유인하는 효과가 있다."
    zh_simp: "由蜜与诱团原料糅合而成。\n对虫宝可梦和妖精类宝可梦\n有着很强的吸引力。"
    zh_trad: "由蜜與誘糰原料揉合而成。\n對蟲寶可夢和妖精類寶可夢\n有著很強的吸引力。"
honey_cake:recipe:
  names:
    jp_kana: ミツよせだま
    jp_kanji: ミツよせだま
    en: Honey Cake
    fr: Appât Kibrille
    it: Polpetta miele
    de: Honigköder
    es: Cebo Meloso
    ko: 꿀유인환
    zh_simp: 蜜诱团
    zh_trad: 蜜誘糰
  descriptions:
    jp_kana: "ミツよせだまのレシピ。　材料は\nきらきらミツ×１　よせだまのもと×１"
    jp_kanji: "ミツよせだまのレシピ。　材料は\nきらきらミツ×１　よせだまのもと×１"
    en: "A recipe for crafting Honey Cakes from scratch.\nRequired materials: 1 comb of Dazzling Honey and\n1 Cake-Lure Base."
    fr: "Méthode pour Appât Kibrille. Ressources requises :\n1 rayon de Miel Kibrille et 1 boule d’Appâte."
    it: "Ricetta per una Polpetta miele. Richiede 1 favo\ndi Miele luccicante e 1 Polpetta base."
    de: "Die Anleitung zur Herstellung eines Honigköders.\nBenötigte Materialien: 1 Wabe Funkelhonig und\n1 Portion Köderteig."
    es: "Receta para crear Cebos Melosos. Materiales:\n1 panal de Miel Brillante y 1 bola de Masa para Cebo."
    ko: "꿀유인환의 레시피.\n재료: 반짝반짝꿀×1 유인환반죽×1"
    zh_simp: "蜜诱团的材料单。材料是：\n晶晶蜜×１　诱团原料×１"
    zh_trad: "蜜誘糰的材料單。材料是：\n晶晶蜜×１　誘糰原料×１"
honor_of_kalos:
  names:
    jp_kana: カロスエンブレム
    jp_kanji: カロスエンブレム
    en: Honor of Kalos
    fr: Insigne de Kalos
    it: Emblema di Kalos
    de: Kalos-Emblem
    es: Emblema de Kalos
    ko: 칼로스엠블럼
    zh_simp: 卡洛斯勋章
    zh_trad: 卡洛斯勳章
  descriptions:
    jp_kana: "カロス地方で　すばらしい\n活躍を　した　人物に\n贈られる　貴重な　シンボル。"
    jp_kanji: "カロス地方で　すばらしい\n活躍を　した　人物に\n贈られる　貴重な　シンボル。"
    en: "A precious symbol that is awarded to individuals\nwho have done great things for the Kalos region."
    fr: "Une récompense symbolique offerte à ceux qui\nont contribué de manière exceptionnelle à la grandeur\nde Kalos."
    it: "Prezioso riconoscimento conferito a coloro che si sono\ndistinti per gesta eccezionali nella regione di Kalos."
    de: "Ein wertvolles Emblem, das all jenen überreicht wird,\ndie Großes für die Kalos-Region vollbracht haben."
    es: "Símbolo otorgado en reconocimiento a quienes han\nrealizado gestas excepcionales en la región de Kalos."
    ko: "칼로스지방에서\n훌륭한 활약을 한 인물에게\n주어지는 귀중한 심볼."
    zh_simp: "颁发给为卡洛斯地区\n作出杰出贡献的人的宝贵勋章。"
    zh_trad: "頒發給為卡洛斯地區\n帶來傑出貢獻的人的\n寶貴勳章。"
hoothoot_feather:
  names:
    jp_kana: ホーホーのはね
    jp_kanji: ホーホーのはね
    en: Hoothoot Feather
    fr: Plume de Hoothoot
    it: Penna di Hoothoot
    de: Hoothoot-Feder
    es: Pluma de Hoothoot
    ko: 부우부의깃털
    zh_simp: 咕咕的羽毛
    zh_trad: 咕咕的羽毛
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
hopo_berry:
  names:
    jp_kana: ポフのみ
    jp_kanji: ポフのみ
    en: Hopo Berry
    fr: Baie Bouhlon
    it: Baccaluppo
    de: Pfohbeere
    es: Baya Lupu
    ko: 포흐열매
    zh_simp: 花啤果
    zh_trad: 花啤果
  descriptions:
    jp_kana: "ポケモンに食べさせると\nＰＰが回復する。野生のポケモンが\n食べると周りへの反応が鈍くなる。"
    jp_kanji: "ポケモンに食べさせると\nＰＰが回復する。野生のポケモンが\n食べると周りへの反応が鈍くなる。"
    en: "A Berry that can be fed to a Pokémon to restore its PP.\nIf a wild Pokémon eats one of these Berries, that\nPokémon’s reactions will be dulled."
    fr: "Cette Baie permet de restaurer les PP du Pokémon qui\nla mange. Si c’est un Pokémon sauvage qui la mange,\ncelui-ci réagira moins vivement à ce qui l’entoure."
    it: "Bacca che restituisce PP al Pokémon che la mangia.\nSe mangiata da un Pokémon selvatico, ne appanna\ni riflessi rendendolo meno reattivo."
    de: "Gibst du sie einem Pokémon zu essen, füllt sie seine\nAP auf. Isst sie ein wildes Pokémon, werden seine\nReaktionen schwerfälliger."
    es: "Restablece PP a un Pokémon si se le da de comer.\nSi se la come un Pokémon salvaje, entorpecerá sus\nsentidos."
    ko: "포켓몬에게 먹이면 PP를 회복한다.\n야생 포켓몬이 먹으면\n주위에 대한 반응이 둔해진다."
    zh_simp: "让宝可梦吃下后，可以回复ＰＰ。\n野生的宝可梦吃下后，\n对周围的反应会变得迟钝。"
    zh_trad: "讓寶可夢吃下後，\n可以回復ＰＰ。野生寶可夢吃下後，\n對周遭的反應會變得遲鈍。"
hoppip_leaf:
  names:
    jp_kana: ハネッコのはっぱ
    jp_kanji: ハネッコのはっぱ
    en: Hoppip Leaf
    fr: Feuille de Granivol
    it: Foglia di Hoppip
    de: Hoppspross-Blatt
    es: Hoja de Hoppip
    ko: 통통코의잎
    zh_simp: 毽子草的叶片
    zh_trad: 毽子草的葉片
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
horsea_candy:
  names:
    jp_kana: タッツーのアメ
    jp_kanji: タッツーのアメ
    en: Horsea Candy
    fr: Bonbon Hypotrempe
    it: Caramella Horsea
    de: Seeper-Bonbon
    es: Caramelo Horsea
    ko: 쏘드라의사탕
    zh_simp: 墨海马的糖果
    zh_trad: 墨海馬的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
horsea_ink:
  names:
    jp_kana: タッツーのスミ
    jp_kanji: タッツーのスミ
    en: Horsea Ink
    fr: Encre d’Hypotrempe
    it: Inchiostro di Horsea
    de: Seeper-Tinte
    es: Tinta de Horsea
    ko: 쏘드라의먹물
    zh_simp: 墨海马的墨汁
    zh_trad: 墨海馬的墨汁
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
horseradish:
  names:
    jp_kana: ホースラディッシュ
    jp_kanji: ホースラディッシュ
    en: Horseradish
    fr: Raifort
    it: Rafano
    de: Meerrettich
    es: Rábano Picante
    ko: 호스래디시
    zh_simp: 辣根
    zh_trad: 辣根
  descriptions:
    jp_kana: "辛味が　強い　調味料。\n鼻を抜けるような　辛味が　特徴で\n脂っこい具材と　相性が　よい。"
    jp_kanji: "辛味が　強い　調味料。\n鼻を抜けるような　辛味が　特徴で\n脂っこい具材と　相性が　よい。"
    en: "A very spicy condiment. Its distinctive sharp sizzle in\nyour sinuses makes it a good match for rich fillings."
    fr: "Un condiment au goût très épicé. Sa saveur corsée\nunique monte facilement au nez. S’accorde bien avec\ndes ingrédients plus gras."
    it: "Un ingrediente molto piccante. Il suo caratteristico\nsapore pungente, che si sente fin nel naso, si abbina\nbene con gli ingredienti grassi."
    de: "Dieses Würzmittel besitzt eine sehr prägnante Schärfe,\ndie ein leichtes Stechen im Nasenraum verursacht.\nEs harmoniert gut mit fettigen Belägen."
    es: "El fuerte picante de este ingrediente despeja hasta la\nnariz, por lo que casa especialmente bien con alimentos\ncon alto contenido graso."
    ko: "매운맛이 강한 조미료.\n코를 찡하게 만드는 매운맛이 특징으로\n느끼한 식재료와 궁합이 잘 맞는다."
    zh_simp: "辣味强烈的调味料。\n穿鼻而过般的辣味是其特征，\n与油腻的馅料很搭配。"
    zh_trad: "辣味強勁的調味料。\n以刺鼻的辣味為特徵。\n和油膩的食材相當搭配。"
houndoominite:
  names:
    jp_kana: ヘルガナイト
    jp_kanji: ヘルガナイト
    en: Houndoominite
    fr: Démolossite
    it: Houndoomite
    de: Hundemonit
    es: Houndoomita
    ko: 헬가나이트
    zh_simp: 黑鲁加进化石
    zh_trad: 黑魯加進化石
  descriptions:
    jp_kana: "ヘルガーに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    jp_kanji: "ヘルガーに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Houndoom hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Démolosse, elle lui permet de\nméga-évoluer durant un combat."
    it: "Una delle misteriose Megapietre. Data a Houndoom,\ngli permette di megaevolversi durante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Hundemon getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Houndoom en combate."
    ko: "헬가에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让黑鲁加携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓黑魯加攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
houndour_fang:
  names:
    jp_kana: デルビルのキバ
    jp_kanji: デルビルのキバ
    en: Houndour Fang
    fr: Croc de Malosse
    it: Zanna di Houndour
    de: Hunduster-Zahn
    es: Colmillo de Houndour
    ko: 델빌의이빨
    zh_simp: 戴鲁比的牙
    zh_trad: 戴魯比的牙
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
hp_up:
  names:
    jp_kana: マックスアップ
    jp_kanji: マックスアップ
    en: HP Up
    fr: PV Plus
    it: PS-su
    de: KP-Plus
    es: Más PS
    ko: 맥스업
    zh_simp: ＨＰ增强剂
    zh_trad: ＨＰ增強劑
  descriptions:
    jp_kana: "ポケモンの　栄養ドリンク。\nポケモン　１匹の　ＨＰの\n基礎ポイントを　あげる。"
    jp_kanji: "ポケモンの　栄養ドリンク。\nポケモン　１匹の　ＨＰの\n基礎ポイントを　あげる。"
    en: "A nutritious drink for Pokémon. This drink increases\nbase points for a Pokémon’s HP stat."
    fr: "Une boisson très nutritive qui augmente\nles PV de base d’un Pokémon."
    it: "Bevanda nutriente per Pokémon. Aumenta i punti base\ndei PS."
    de: "Ein gehaltvolles Getränk, das die KP-Basispunkte eines\nPokémon dauerhaft erhöht."
    es: "Nutritiva bebida que aumenta los PS de base de\nun Pokémon."
    ko: "포켓몬의 영양 드링크.\n포켓몬 1마리의 HP\n기초 포인트를 올린다."
    zh_simp: "宝可梦的营养饮料。\n能提高１只宝可梦的\nＨＰ的基础点数。"
    zh_trad: "寶可夢的營養飲料。\n能提高１隻寶可夢的\nＨＰ的基礎點數。"
hyper_potion:
  names:
    jp_kana: すごいキズぐすり
    jp_kanji: すごいキズぐすり
    en: Hyper Potion
    fr: Hyper Potion
    it: Iperpozione
    de: Hypertrank
    es: Hiperpoción
    ko: 고급상처약
    zh_simp: 厉害伤药
    zh_trad: 厲害傷藥
  descriptions:
    jp_kana: "スプレー式の　キズぐすり。\nポケモン　１匹の　ＨＰを\n１２０だけ　回復する。"
    jp_kanji: "スプレー式の　キズぐすり。\nポケモン　１匹の　ＨＰを\n１２０だけ　回復する。"
    en: "A spray-type medicine for treating wounds. It can be\nused to restore 120 HP to a Pokémon."
    fr: "Un spray qui soigne les blessures.\nRestaure 120 PV d’un Pokémon."
    it: "Rimedio spray per le ferite. Restituisce 120 PS\na un Pokémon."
    de: "Hilft bei Wunden. Füllt die KP eines Pokémon um\n120 Punkte auf."
    es: "Medicina en espray que cura heridas y restaura 120 PS\nde un Pokémon."
    ko: "스프레이식의 상처약.\n포켓몬 1마리의 HP를\n120만큼 회복한다."
    zh_simp: "喷雾式伤药。\n能让１只宝可梦\n回复１２０ＨＰ。"
    zh_trad: "噴霧式傷藥。\n能讓１隻寶可夢\n回復１２０ＨＰ。"
hyper_potion:recipe:
  names:
    jp_kana: すごいキズぐすり
    jp_kanji: すごいキズぐすり
    en: Hyper Potion
    fr: Hyper Potion
    it: Iperpozione
    de: Hypertrank
    es: Hiperpoción
    ko: 고급상처약
    zh_simp: 厉害伤药
    zh_trad: 厲害傷藥
  descriptions:
    jp_kana: "すごいキズぐすりのレシピ。　材料は\nいいキズぐすり×１　ゲンキノツボミ×１"
    jp_kanji: "すごいキズぐすりのレシピ。　材料は\nいいキズぐすり×１　ゲンキノツボミ×１"
    en: "A recipe for crafting Hyper Potions from scratch.\nRequired materials: 1 Super Potion and 1 Vivichoke."
    fr: "Méthode pour Hyper Potion. Ressources requises :\n1 Super Potion et 1 Bourgeon Vivace."
    it: "Ricetta per un’Iperpozione. Richiede 1 Superpozione e\n1 Revitalboccio."
    de: "Die Anleitung zur Herstellung eines Hypertranks.\nBenötigte Materialien: 1 Supertrank und 1 Vitalknospe."
    es: "Receta para crear Hiperpociones. Materiales:\n1 Superpoción y 1 Revibrote."
    ko: "고급상처약의 레시피.\n재료: 좋은상처약×1 기력의봉오리×1"
    zh_simp: "厉害伤药的材料单。材料是：\n好伤药×１　活力蕾×１"
    zh_trad: "厲害傷藥的材料單。材料是：\n好傷藥×１　活力蕾×１"
iapapa_berry:
  names:
    jp_kana: イアのみ
    jp_kanji: イアのみ
    en: Iapapa Berry
    fr: Baie Papaya
    it: Baccapaia
    de: Yapabeere
    es: Baya Pabaya
    ko: 파야열매
    zh_simp: 芭亚果
    zh_trad: 芭亞果
  descriptions:
    jp_kana: "ポケモンに　持たせると\nピンチのとき　ＨＰを　回復する。\nきらいな味だと　混乱する。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　ＨＰを　回復する。\nきらいな味だと　混乱する。"
    en: "If a Pokémon holds one of these Berries, it will be able\nto restore some HP should it find itself in a pinch.\nBut it will become confused if it hates the Berry’s taste."
    fr: "Tenue, cette Baie restaure des PV en cas de besoin,\nmais rend le Pokémon confus si son goût lui déplaît."
    it: "Se un Pokémon in difficoltà ha questa bacca, recupera\ndei PS. Se al Pokémon non piace il suo sapore,\npuò causare confusione."
    de: "Als getragenes Item füllt diese Beere in einer Notlage\ndie KP des Pokémon auf, doch ihr Aroma verwirrt jene,\ndie es nicht mögen."
    es: "Los Pokémon pueden llevarla y usarla para restaurar\nalgunos PS en un momento de apuro. Su sabor puede\ncausar confusión si no les gusta."
    ko: "포켓몬에게 지니게 하면\n위급할 때 HP를 회복한다.\n싫어하는 맛이면 혼란에 빠진다."
    zh_simp: "让宝可梦携带后，\n危机时可以回复ＨＰ。\n如果讨厌这味道就会混乱。"
    zh_trad: "讓寶可夢攜帶後，\n危機時可以回復ＨＰ。\n如果討厭這味道就會混亂。"
ice_gem:
  names:
    jp_kana: こおりのジュエル
    jp_kanji: こおりのジュエル
    en: Ice Gem
    fr: Joyau Glace
    it: Bijoughiaccio
    de: Eisjuwel
    es: Gema Hielo
    ko: 얼음주얼
    zh_simp: 冰之宝石
    zh_trad: 冰之寶石
  descriptions:
    jp_kana: "こおりのタイプの　ジュエル。\n持たせると　１度だけ　こおりの\n技の威力が　強まる。"
    jp_kanji: "こおりのタイプの　ジュエル。\n持たせると　１度だけ　こおりの\n技の威力が　強まる。"
    en: "An item to be held by a Pokémon. This gem is imbued\nwith the essence of ice and will boost the power of an\nIce-type move—but only once."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Glace."
    it: "Strumento da dare a un Pokémon. Gioiello che potenzia\nuna sola volta le mosse di tipo Ghiaccio."
    de: "Ein Item zum Tragen. Dieses Juwel verstärkt einmalig\neine Attacke vom Typ Eis."
    es: "Joya de un solo uso que potencia un movimiento de\ntipo Hielo. Debe llevarla un Pokémon."
    ko: "얼음타입의 주얼.\n지니게 하면 한 번만 얼음\n기술의 위력이 강해진다."
    zh_simp: "冰属性的宝石。\n携带后，冰属性的\n招式威力仅会增强１次。"
    zh_trad: "冰屬性的寶石。\n攜帶後，冰屬性招式的\n威力會僅增強１次。"
ice_heal:
  names:
    jp_kana: こおりなおし
    jp_kanji: こおりなおし
    en: Ice Heal
    fr: Antigel
    it: Antigelo
    de: Eisheiler
    es: Antihielo
    ko: 얼음상태치료제
    zh_simp: 解冻药
    zh_trad: 解凍藥
  descriptions:
    jp_kana: "スプレー式の　薬。\nポケモン　１匹の　こおりの\n状態を　回復する。"
    jp_kanji: "スプレー式の　薬。\nポケモン　１匹の　こおりの\n状態を　回復する。"
    en: "A spray-type medicine for treating freezing. It can be\nused to thaw out a Pokémon that has been frozen solid."
    fr: "Un médicament sous forme de spray.\nRéchauffe un Pokémon gelé."
    it: Rimedio spray. Cura un Pokémon dal congelamento.
    de: Ein Spray, das ein eingefrorenes Pokémon auftaut.
    es: Medicina en espray que descongela a un Pokémon.
    ko: "스프레이식의 약.\n포켓몬 1마리의\n얼음 상태를 회복한다."
    zh_simp: "喷雾式药水。\n能治愈１只宝可梦的\n冰冻状态。"
    zh_trad: "噴霧式藥水。\n能治癒１隻寶可夢的\n冰凍狀態。"
ice_memory:
  names:
    jp_kana: アイスメモリ
    jp_kanji: アイスメモリ
    en: Ice Memory
    fr: ROM Glace
    it: ROM Ghiaccio
    de: Eis-Disc
    es: Disco Hielo
    ko: 아이스메모리
    zh_simp: 冰雪存储碟
    zh_trad: 冰雪記憶碟
  descriptions:
    jp_kana: "こおりタイプの　データが　入った\nメモリ。　特定のポケモンが　持つと\nタイプが　変わる。"
    jp_kanji: "こおりタイプの　データが　入った\nメモリ。　特定のポケモンが　持つと\nタイプが　変わる。"
    en: "A memory disc that contains Ice-type data.\nIt changes the type of the holder if held by\na certain species of Pokémon."
    fr: "Une carte mémoire contenant des données sur\nle type Glace. Un certain Pokémon peut changer\nde type en l’équipant."
    it: "ROM contenente dati sul tipo Ghiaccio in formato\ndigitale. Permette a un certo Pokémon di cambiare tipo."
    de: "Eine Disc mit Daten zum Typ Eis. Sie löst bei einem\nbestimmten Pokémon einen Typenwechsel aus."
    es: "Disco de datos que contiene información relativa al tipo\nHielo. Permite cambiar de tipo a cierto Pokémon."
    ko: "얼음타입의 데이터가 들어 있는\n메모리. 특정 포켓몬이\n지니면 타입이 바뀐다."
    zh_simp: "装有冰属性数据的存储碟。\n特定宝可梦携带后，\n属性就会发生变化。"
    zh_trad: "裝有冰屬性資料的記憶碟。\n特定寶可夢攜帶後，\n就會產生屬性的變化。"
ice_stone:
  names:
    jp_kana: こおりのいし
    jp_kanji: こおりのいし
    en: Ice Stone
    fr: Pierre Glace
    it: Pietragelo
    de: Eisstein
    es: Piedra Hielo
    ko: 얼음의돌
    zh_simp: 冰之石
    zh_trad: 冰之石
  descriptions:
    jp_kana: "ある特定の　ポケモンを\n進化させる　不思議な石。\n雪の模様が　ある。"
    jp_kanji: "ある特定の　ポケモンを\n進化させる　不思議な石。\n雪の模様が　ある。"
    en: "A peculiar stone that can make certain species of\nPokémon evolve. It has a snowflake pattern in it."
    fr: "Une pierre étrange qui fait évoluer certaines espèces\nde Pokémon. Un flocon de neige semble dessiné dessus."
    it: "Pietra particolare che fa evolvere determinate specie di\nPokémon. Si intravede l’immagine di un fiocco di neve."
    de: "Dieser besondere Stein löst bei bestimmten Pokémon\ndie Entwicklung aus. Er hat ein Schneeflockenmuster."
    es: "Curiosa piedra que hace evolucionar a determinadas\nespecies de Pokémon. Presenta motivos que recuerdan\na los cristales de hielo."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 돌.\n눈송이 무늬가 있다."
    zh_simp: "能让某些特定宝可梦\n进化的神奇石头。\n有着雪花般的花纹。"
    zh_trad: "能讓特定寶可夢\n進化的神奇石頭。\n有著雪花般的花紋。"
ice_tera_shard:
  names:
    jp_kana: テラピースこおり
    jp_kanji: テラピースこおり
    en: Ice Tera Shard
    fr: Téra-Éclat Glace
    it: Teralite Ghiaccio
    de: Tera-Stück (Eis)
    es: Teralito Hielo
    ko: 테라피스 얼음
    zh_simp: 冰太晶碎块
    zh_trad: 冰太晶碎塊
  descriptions:
    jp_kana: "テラスタルポケモンが　倒れたとき\n砕けた　テラスタルジュエルが\nまれに　結晶化したもの。"
    jp_kanji: "テラスタルポケモンが　倒れたとき\n砕けた　テラスタルジュエルが\nまれに　結晶化したもの。"
    en: "On rare occasions, these shards form when a Tera\nPokémon falls in battle and its Tera Jewel shatters."
    fr: "Un fragment cristallisé qui se forme rarement lors\nde l’éclatement d’un Joyau Téracristal après qu’un\nPokémon Téracristal a été mis K.O."
    it: "Cristallizzazione che raramente si forma quando\nun Pokémon Teracristal viene sconfitto e la sua gemma\nTeracristal va in frantumi."
    de: "In äußerst seltenen Fällen kristallisieren Bruchstücke\ndes Terakristalls von im Kampf besiegten Terakristall-\nPokémon zu solchen Tera-Stücken."
    es: "Esquirla que se forma muy raramente cuando la joya\nTeracristal de un Pokémon teracristalizado se quiebra\ntras derrotarlo."
    ko: "테라스탈 포켓몬이 쓰러졌을 때\n부서진 테라스탈 주얼이\n드물게 결정화한 조각."
    zh_simp: "打倒太晶宝可梦时，\n破碎掉的太晶宝石有\n极低概率会结晶成此物。"
    zh_trad: "太晶寶可夢倒下時，\n碎裂的太晶寶石在罕見的情況下\n會結晶化，而形成此物。"
iceroot_carrot:
  names:
    jp_kana: つめたいにんじん
    jp_kanji: つめたいにんじん
    en: Iceroot Carrot
    fr: Carotte Gelée
    it: Carota algida
    de: Polarkarotte
    es: Zanahoria Nívea
    ko: 차가운당근
    zh_simp: 冰萝卜
    zh_trad: 冰蘿蔔
  descriptions:
    jp_kana: "豊穣の王の　愛馬が\n好んで　食べる　作物。\n雪深い　畑で　育った。"
    jp_kanji: "豊穣の王の　愛馬が\n好んで　食べる　作物。\n雪深い　畑で　育った。"
    en: "Produce that the King of Bountiful Harvests’ beloved\nsteed likes to eat. It grew in a field covered in snow."
    fr: "Un légume très apprécié du fidèle destrier\ndu Seigneur des récoltes. Il a été cultivé\ndans un champ entouré d’une neige épaisse."
    it: "Un ortaggio molto apprezzato dal fedele destriero del\nRe dell’abbondanza. Cresce in campi coperti di neve."
    de: "Eine Karotte, die auf einem tief verschneiten Feld\nheranwuchs. Das treue Ross des Königs der reichen\nErnte mag sie besonders gern."
    es: "Una zanahoria cultivada en un huerto rebosante de\nnieve. Es la hortaliza preferida del amado corcel del\nRey de las Cosechas."
    ko: "풍요의 왕의 애마가\n즐겨 먹는 작물.\n눈 덮인 밭에서 자랐다."
    zh_simp: "丰饶之王的爱马\n喜欢吃的农作物。\n生长于白雪皑皑的田地。"
    zh_trad: "豐饒之王的愛馬喜歡吃的農作物。\n生長在積雪深厚的田地。"
icicle_plate:
  names:
    jp_kana: つららのプレート
    jp_kanji: つららのプレート
    en: Icicle Plate
    fr: Plaque Glace
    it: Lastragelo
    de: Frosttafel
    es: Tabla Helada
    ko: 고드름플레이트
    zh_simp: 冰柱石板
    zh_trad: 冰柱石板
  descriptions:
    jp_kana: "こおりのタイプの　石盤。\n持たせると　こおりタイプの\n技の威力が　強まる。"
    jp_kanji: "こおりのタイプの　石盤。\n持たせると　こおりタイプの\n技の威力が　強まる。"
    en: "An item to be held by a Pokémon. This stone tablet is\nimbued with the essence of ice and boosts the power\nof the holder’s Ice-type moves."
    fr: "Objet à tenir. Une tablette en pierre augmentant\nla puissance des capacités de type Glace."
    it: "Strumento da dare a un Pokémon. Lastra di pietra che\npotenzia le mosse di tipo Ghiaccio."
    de: "Ein Item zum Tragen. Diese Steintafel verstärkt\nAttacken vom Typ Eis."
    es: "Tabla de piedra que potencia los movimientos de tipo\nHielo. Debe llevarla un Pokémon."
    ko: "얼음타입의 석판.\n지니게 하면 얼음타입\n기술의 위력이 강해진다."
    zh_simp: "冰属性的石板。\n携带后，冰属性的\n招式威力就会增强。"
    zh_trad: "冰屬性的石板。\n攜帶後，冰屬性的\n招式威力就會增強。"
icium_z:bag:
  names:
    jp_kana: コオリＺ
    jp_kanji: コオリＺ
    en: Icium Z
    fr: Cryozélite
    it: Glacium Z
    de: Glacium Z
    es: Criostal Z
    ko: 얼음Z
    zh_simp: 冰Ｚ
    zh_trad: 冰Ｚ
  descriptions:
    jp_kana: "こおりタイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    jp_kanji: "こおりタイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nIce-type moves to Ice-type Z-Moves."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise son porteur à transformer ses capacités\nde type Glace en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono ai Pokémon di trasformare le mosse\ndi tipo Ghiaccio in mosse Z."
    de: "Kristallisierte Z-Kraft, die Eis-Attacken zu Z-Attacken\naufstuft. Wird bei Bedarf automatisch vervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a los\nportadores convertir sus movimientos de tipo Hielo en\nmovimientos Z."
    ko: "얼음타입 기술을\nZ기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将冰属性招式升级成\nＺ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把冰屬性招式\n升級為Ｚ招式的Ｚ力量結晶。"
icium_z:held:
  names:
    jp_kana: コオリＺ
    jp_kanji: コオリＺ
    en: Icium Z
    fr: Cryozélite
    it: Glacium Z
    de: Glacium Z
    es: Criostal Z
    ko: 얼음Z
    zh_simp: 冰Ｚ
    zh_trad: 冰Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　結晶。\nこおりタイプの　技を\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nこおりタイプの　技を\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Ice-type moves to Z-Moves."
    fr: "Une cristallisation de la Force Z, permettant\nde transformer les capacités de type Glace\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare le mosse di tipo Ghiaccio\nin mosse Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft\nEis-Attacken zu Z-Attacken auf."
    es: "Cristal que confiere el Poder Z a los movimientos\nde tipo Hielo."
    ko: "Z파워의 결정.\n얼음타입 기술을\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将冰属性的招式\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把冰屬性的招式\n升級為Ｚ招式。"
icy_rock:
  names:
    jp_kana: つめたいいわ
    jp_kanji: つめたいいわ
    en: Icy Rock
    fr: Roche Glace
    it: Rocciafredda
    de: Eisbrocken
    es: Roca Helada
    ko: 차가운바위
    zh_simp: 冰冷岩石
    zh_trad: 冰冷岩石
  descriptions:
    jp_kana: "持たせたポケモンが\n天気を　ゆきにすると　いつもより\nゆきの時間が　長くなる。"
    jp_kanji: "持たせたポケモンが\n天気を　ゆきにすると　いつもより\nゆきの時間が　長くなる。"
    en: "An item to be held by a Pokémon. When the holder\nchanges the weather to snow, the snow will persist for\nlonger than usual."
    fr: "Objet à tenir. Il prolonge la durée de la neige quand\nelle est déclenchée par le porteur."
    it: "Allunga la durata della nevicata provocata\ndal Pokémon che ha questo strumento."
    de: "Ein Item zum Tragen. Verlängert die Dauer von Schnee,\nden der Träger verursacht."
    es: "Prolonga la duración de las nevadas provocadas por el\nPokémon que la lleva."
    ko: "지니게 한 포켓몬이\n날씨를 눈으로 만들면 여느 때보다\n눈의 지속 시간이 길어진다."
    zh_simp: "携带它的宝可梦将天气变为下雪的话，\n下雪的时间就会比平时更长。"
    zh_trad: "攜帶它的寶可夢\n將天氣變為下雪的話，\n下雪的時間就會比平時更長。"
igglybuff_fluff:
  names:
    jp_kana: ププリンのけ
    jp_kanji: ププリンのけ
    en: Igglybuff Fluff
    fr: Poils de Toudoudou
    it: Pelo di Igglybuff
    de: Fluffeluff-Haar
    es: Pelo de Igglybuff
    ko: 푸푸린의털
    zh_simp: 宝宝丁的毛
    zh_trad: 寶寶丁的毛
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
ilimas_normalium_z:
  names:
    jp_kana: イリマノーマルＺ
    jp_kanji: イリマノーマルＺ
    en: Ilima’s Normalium Z
    fr: Cristal Z Althéo
    it: Normium Z Liam
    de: Elimas Normium Z
    es: Cristal Z (Liam)
    ko: 일리마의 노말Z
    zh_simp: 伊利马一般Ｚ
    zh_trad: 伊利馬一般Ｚ
  descriptions:
    jp_kana: "イリマから　預かった　ノーマルＺ。\n茂みの洞窟　奥にある\n台座に　置くよう　頼まれた。"
    jp_kanji: "イリマから　預かった　ノーマルＺ。\n茂みの洞窟　奥にある\n台座に　置くよう　頼まれた。"
    en: "The Normalium Z you were entrusted with by Ilima.\nYou were asked to place it on the pedestal at\nthe back of Verdant Cavern."
    fr: "Une Normazélite qu’Althéo vous a confiée.\nIl vous a demandé de la déposer sur le piédestal\nqui se trouve au fond de la Grotte Verdoyante."
    it: "Normium Z ricevuto da Liam. Devi porlo sul piedistallo\ndentro la Grotta Sottobosco."
    de: "Das Normium Z, das Elima dir anvertraut hat. Er hat\ndich gebeten, es in den Sockel in der Vegetationshöhle\nzu legen."
    es: "Normastal Z que te entrega Liam para que lo deposites\nsobre el altar situado al fondo de la Cueva Sotobosque."
    ko: "일리마에게 받은 노말Z.\n우거진 동굴 안쪽에 있는\n대좌에 두도록 부탁받았다."
    zh_simp: "伊利马交给你保管的一般Ｚ。\n受人嘱托要把它放到\n葱郁洞窟深处的台座上。"
    zh_trad: "伊利馬交給你的一般Ｚ。\n有人拜託你把它放到\n蔥鬱洞窟深處的台座上。"
illumise_fluid:
  names:
    jp_kana: イルミーゼのしる
    jp_kanji: イルミーゼのしる
    en: Illumise Fluid
    fr: Fluide de Lumivole
    it: Fluido di Illumise
    de: Illumise-Sekret
    es: Fluido de Illumise
    ko: 네오비트의체액
    zh_simp: 甜甜萤的汁液
    zh_trad: 甜甜螢的汁液
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
impidimp_hair:
  names:
    jp_kana: ベロバーのけ
    jp_kanji: ベロバーのけ
    en: Impidimp Hair
    fr: Poils de Grimalin
    it: Pelo di Impidimp
    de: Bähmon-Haar
    es: Pelo de Impidimp
    ko: 메롱꿍의털
    zh_simp: 捣蛋小妖的毛
    zh_trad: 搗蛋小妖的毛
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
impish_mint:
  names:
    jp_kana: わんぱくミント
    jp_kanji: わんぱくミント
    en: Impish Mint
    fr: Aromate Malin
    it: Menta Scaltra
    de: Pfiffig-Minze
    es: Menta Agitada
    ko: 장난꾸러기민트
    zh_simp: 淘气薄荷
    zh_trad: 淘氣薄荷
  descriptions:
    jp_kana: "ポケモンに　香りを　かがせると\n防御が　上がりやすく　なるが\n特攻は　上がりにくくなる　ミント。"
    jp_kanji: "ポケモンに　香りを　かがせると\n防御が　上がりやすく　なるが\n特攻は　上がりにくくなる　ミント。"
    en: "Having a Pokémon smell this mint can make its Defense\nstat grow stronger. However, its Sp. Atk stat may suffer."
    fr: "Si un Pokémon hume cet aromate, sa Défense\nmontera plus facilement, mais son Attaque Spéciale\nse développera plus lentement."
    it: "Quando un Pokémon ne sente il profumo, la sua Difesa\naumenta più facilmente a scapito dell’Attacco Speciale."
    de: "Lässt man ein Pokémon an dieser Minze schnuppern,\nsteigt seine Verteidigung schneller, aber sein\nSpezial-Angriff umso langsamer."
    es: "Cuando un Pokémon percibe su aroma, aumenta con\nmás facilidad su Defensa, en detrimento de su Ataque\nEspecial."
    ko: "포켓몬에게 향기를 맡게 하면\n방어가 오르기 쉬워지지만\n특수공격이 오르기 어려워지는 민트."
    zh_simp: "宝可梦闻了这种薄荷之后，\n会令防御容易提高，\n而特攻则难以提高。"
    zh_trad: "讓寶可夢聞這種薄荷的氣味，\n會令防禦變得容易提高，\n但特攻則難以提高。"
incinium_z:bag:
  names:
    jp_kana: ガオガエンＺ
    jp_kanji: ガオガエンＺ
    en: Incinium Z
    fr: Félinozélite
    it: Incineronium Z
    de: Fuegronium Z
    es: Incinostal Z
    ko: 어흥염Z
    zh_simp: 炽焰咆哮虎Ｚ
    zh_trad: 熾焰咆哮虎Ｚ
  descriptions:
    jp_kana: "ガオガエンの　ＤＤラリアットを\n特別な　Ｚワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    jp_kanji: "ガオガエンの　ＤＤラリアットを\n特別な　Ｚワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nIncineroar’s Darkest Lariat to a Z-Move."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise le Félinferno qui le tient à transformer\nsa capacité Dark Lariat en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono a Incineroar di trasformare la mossa\nBraccioteso in una mossa Z."
    de: "Kristallisierte Z-Kraft, die Fuegros Attacke\nDark Lariat zu einer Z-Attacke aufstuft.\nWird bei Bedarf automatisch vervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a\nIncineroar convertir su Lariat Oscuro en un\nmovimiento Z."
    ko: "어흥염의 DD래리어트를\n특별한 Z기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将炽焰咆哮虎的ＤＤ金勾臂\n升级成特殊Ｚ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把熾焰咆哮虎的ＤＤ金勾臂\n升級為特殊Ｚ招式的Ｚ力量結晶。"
incinium_z:held:
  names:
    jp_kana: ガオガエンＺ
    jp_kanji: ガオガエンＺ
    en: Incinium Z
    fr: Félinozélite
    it: Incineronium Z
    de: Fuegronium Z
    es: Incinostal Z
    ko: 어흥염Z
    zh_simp: 炽焰咆哮虎Ｚ
    zh_trad: 熾焰咆哮虎Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　結晶。\nガオガエンの　ＤＤラリアットを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nガオガエンの　ＤＤラリアットを\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Incineroar’s Darkest Lariat to a Z-Move."
    fr: "Une cristallisation de la Force Z, permettant\nde transformer la capacité Dark Lariat d’un Félinferno\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare la mossa Braccioteso\ndi Incineroar in una mossa Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft Fuegros\nAttacke Dark Lariat zu einer Z-Attacke auf."
    es: "Cristal que confiere el Poder Z al movimiento Lariat\nOscuro de Incineroar."
    ko: "Z파워의 결정.\n어흥염의 DD래리어트를\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将炽焰咆哮虎的ＤＤ金勾臂\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把熾焰咆哮虎的ＤＤ金勾臂\n升級為Ｚ招式。"
indeedee_fur:
  names:
    jp_kana: イエッサンのけ
    jp_kanji: イエッサンのけ
    en: Indeedee Fur
    fr: Poils de Wimessir
    it: Pelo di Indeedee
    de: Servol-Haar
    es: Pelo de Indeedee
    ko: 에써르의털
    zh_simp: 爱管侍的毛
    zh_trad: 愛管侍的毛
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
indigo_disk:
  names:
    jp_kana: あおのディスク
    jp_kanji: あおのディスク
    en: Indigo Disk
    fr: Disque Indigo
    it: Disco indaco
    de: Indigoblaue Scheibe
    es: Disco Índigo
    ko: 남청의디스크
    zh_simp: 蓝之光碟
    zh_trad: 藍之光碟
  descriptions:
    jp_kana: "トップチャンピオンから　持たされた\n藍色に　かがやく　謎のディスク。\nエリアゼロに　関係しているようだ。"
    jp_kanji: "トップチャンピオンから　持たされた\n藍色に　かがやく　謎のディスク。\nエリアゼロに　関係しているようだ。"
    en: "A mysterious disk with an indigo shine to it, given to you\nby the Top Champion. It seems to be tied to Area Zero."
    fr: "Un disque mystérieux aux beaux reflets indigo que\nla Maîtresse en Chef vous a confié. Il semble avoir\nun lien avec la Zone Zéro."
    it: "Un disco color indaco che ti è stato affidato\ndalla Supercampionessa. Sembra avere a che\nfare con l’Area Zero."
    de: "Eine geheimnisvolle, indigoblau schimmernde Scheibe,\ndie dir vom Top-Champ überreicht wurde. Sie scheint\nmit Zone Null in Verbindung zu stehen."
    es: "Misterioso disco de reflejos índigos que te confió la\nSupercampeona. Parece guardar relación con el Área\nCero."
    ko: "치프 챔피언에게서 받은\n푸른빛으로 빛나는 수수께끼의 디스크.\n에리어 제로와 연관이 있는 것 같다."
    zh_simp: "从首席冠军那里得到的\n散发着蓝色光辉的神秘光碟。\n似乎和第零区有关。"
    zh_trad: "受到首席冠軍託付的\n閃耀著藍色光澤的神秘光碟。\n似乎和第零區有所關係。"
indigo_style_card:
  names:
    jp_kana: おしゃれカードあお
    jp_kanji: おしゃれカードあお
    en: Indigo Style Card
    fr: Carte Élégance Bleue
    it: Tessera chic blu
    de: Blaue Style-Karte
    es: Tarjeta Chic Azul
    ko: 멋쟁이카드 블루
    zh_simp: 蓝之时尚名人卡
    zh_trad: 藍之時尚名人卡
  descriptions:
    jp_kana: "持っていると　ブティックで　買える\n品物が　増える。　ヘアサロンでは\n選べる　髪型が　増える　カード。"
    jp_kanji: "持っていると　ブティックで　買える\n品物が　増える。　ヘアサロンでは\n選べる　髪型が　増える　カード。"
    en: "Having one of these cards increases the selection\navailable to you in boutiques and hair salons."
    fr: "Une carte permettant d’accéder à un plus vaste choix\nd’articles dans les boutiques chics et à davantage\nde coupes de cheveux dans les salons de coiffure."
    it: "Una tessera che amplia la scelta di acconciature\ndisponibili nei saloni di bellezza e di articoli\nacquistabili nei negozi di vestiti."
    de: "Wer diese Karte bei sich trägt, erhält in Boutiquen\nund Friseursalons eine größere Auswahl."
    es: "Una tarjeta que aumenta la selección de artículos\ndisponibles en las tiendas y permite elegir entre una\nmayor variedad de peinados en las peluquerías."
    ko: "지니고 있으면 부티크에서 살 수 있는\n품목이 늘어나고, 헤어살롱에서는\n고를 수 있는 헤어스타일이 늘어나는 카드."
    zh_simp: "拥有后，在时装店可以买到的物品\n和在美发沙龙可以选择的发型\n都会有所增加的卡片。"
    zh_trad: "擁有這張卡，就能在時裝店買到\n更多商品。到美髮沙龍時，\n也能有更多樣化的髮型選項。"
inkay_ink:
  names:
    jp_kana: マーイーカのスミ
    jp_kanji: マーイーカのスミ
    en: Inkay Ink
    fr: Encre de Sepiatop
    it: Inchiostro di Inkay
    de: Iscalar-Tinte
    es: Tinta de Inkay
    ko: 오케이징의먹물
    zh_simp: 好啦鱿的墨汁
    zh_trad: 好啦魷的墨汁
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
inquiry_mail:
  names:
    jp_kana: しつもんメール
    jp_kanji: しつもんメール
    en: Inquiry Mail
    fr: Lettre Demande
    it: Messaggio Chiedi
    de: Fragebrief
    es: Carta Pregunta
    ko: 질문메일
    zh_simp: 询问邮件
    zh_trad: 詢問郵件
  descriptions:
    jp_kana: "相手への　質問の　メールが\n書きやすい　レターペーパー。\nポケモンに　持たせて　使う。"
    jp_kanji: "相手への　質問の　メールが\n書きやすい　レターペーパー。\nポケモンに　持たせて　使う。"
    en: "Stationery designed to make it easier to pose a question\nabout something. Have a Pokémon hold it for delivery."
    fr: "Un papier à lettres idéal pour poser des questions.\nPeut être tenu et livré par un Pokémon."
    it: "Carta da lettere ideale per scrivere una domanda.\nSi usa dandola a un Pokémon."
    de: "Briefpapier, mit dem man jemandem eine Frage stellen\nkann. Gib es einem Pokémon zum Tragen."
    es: "Carta para preguntar a un compañero. Debe llevarla un\nPokémon para entregarla."
    ko: "상대에게 질문하는 메일을\n쉽게 쓸 수 있는 편지지.\n포켓몬에게 지니게 해서 쓴다."
    zh_simp: "方便写询问对方这类邮件的信纸。\n使用该道具时，\n需要让宝可梦携带着来用。"
    zh_trad: "方便寫詢問對方這類郵件的信紙。\n需讓寶可夢攜帶使用。"
insect_plate:
  names:
    jp_kana: たまむしプレート
    jp_kanji: たまむしプレート
    en: Insect Plate
    fr: Plaque Insecte
    it: Lastrabaco
    de: Käfertafel
    es: Tabla Bicho
    ko: 비단벌레플레이트
    zh_simp: 玉虫石板
    zh_trad: 玉蟲石板
  descriptions:
    jp_kana: "むしのタイプの　石盤。\n持たせると　むしタイプの\n技の威力が　強まる。"
    jp_kanji: "むしのタイプの　石盤。\n持たせると　むしタイプの\n技の威力が　強まる。"
    en: "An item to be held by a Pokémon. This stone tablet is\nimbued with the essence of bugs and boosts the power\nof the holder’s Bug-type moves."
    fr: "Objet à tenir. Une tablette en pierre augmentant\nla puissance des capacités de type Insecte."
    it: "Strumento da dare a un Pokémon. Lastra di pietra che\npotenzia le mosse di tipo Coleottero."
    de: "Ein Item zum Tragen. Diese Steintafel verstärkt\nAttacken vom Typ Käfer."
    es: "Tabla de piedra que potencia los movimientos de tipo\nBicho. Debe llevarla un Pokémon."
    ko: "벌레타입의 석판.\n지니게 하면 벌레타입\n기술의 위력이 강해진다."
    zh_simp: "虫属性的石板。\n携带后，虫属性的\n招式威力就会增强。"
    zh_trad: "蟲屬性的石板。\n攜帶後，蟲屬性的\n招式威力就會增強。"
instant_noodles:
  names:
    jp_kana: レトルトめん
    jp_kanji: レトルトめん
    en: Instant Noodles
    fr: Nouilles
    it: Noodle precotti
    de: Fertignudeln
    es: Fideos de Bote
    ko: 레토르트면
    zh_simp: 即食面
    zh_trad: 即食麵
  descriptions:
    jp_kana: "キャンプの　料理に　使う\n食材の　一種。ジャンクフードの\nテイストが　意外と　マッチする。"
    jp_kanji: "キャンプの　料理に　使う\n食材の　一種。ジャンクフードの\nテイストが　意外と　マッチする。"
    en: "One of the many ingredients that can be used for\ncooking at your camp. It has a junk-food sort of taste,\nbut it goes well with curry."
    fr: "Un ingrédient de cuisine pour le camping.\nLa saveur de cet ingrédient, somme toute banal,\nse marie étonnamment bien avec le curry."
    it: "Uno degli ingredienti che puoi usare per cucinare\nin campeggio. Il tipico gusto da cibo spazzatura\nsi abbina sorprendentemente bene con il curry."
    de: "Eine Zutat für PokéCamping-Mahlzeiten. Das Aroma\ndieses Fertiggerichts passt überraschend gut zu Curry."
    es: "Un ingrediente para cocinar en el campamento.\nEl sabor reconfortante de estos fideos casa\ninesperadamente bien con la salsa de curri."
    ko: "캠프 요리에 사용되는\n식재료 중 하나. 인스턴트 음식의\n맛이 의외로 잘 어울린다."
    zh_simp: "在露营营地制作料理时会使用的\n一种食材。没想到加入速食食品，\n滋味也出乎意料地和谐。"
    zh_trad: "製作露營料理時使用的食材之一。\n速食食品的味道\n意外地和料理很配。"
intriguing_stone:
  names:
    jp_kana: すごそうないし
    jp_kanji: すごそうないし
    en: Intriguing Stone
    fr: Pierre Insolite
    it: Sasso suggestivo
    de: Kurioser Stein
    es: Piedra Insólita
    ko: 대단할듯한돌
    zh_simp: 似珍石
    zh_trad: 似珍石
  descriptions:
    jp_kana: "みる　人に　よっては\n貴重　かもしれない\nかなり　変わった　石。"
    jp_kanji: "みる　人に　よっては\n貴重　かもしれない\nかなり　変わった　石。"
    en: "A rather curious stone that might appear valuable\nto some. It’s all in the eye of the beholder."
    fr: "Une pierre assez étrange qui pourrait avoir de la valeur\npour certaines personnes."
    it: "Un sasso piuttosto singolare che qualcuno potrebbe\nritenere di valore."
    de: "Ein ungewöhnlicher Stein, dessen Wert je nach\nBetrachter unterschiedlich eingeschätzt wird."
    es: "Una curiosa piedra que a algunos les puede parecer de\ngran valor."
    ko: "보는 사람에 따라서는\n귀중할지도 모르는\n꽤 특이한 돌."
    zh_simp: "在有些人看来\n可能会觉得它十分贵重。\n非常与众不同的石头。"
    zh_trad: "在某些人眼裡\n可能會覺得它十分貴重。\n頗與眾不同的石頭。"
iron:
  names:
    jp_kana: ブロムヘキシン
    jp_kanji: ブロムヘキシン
    en: Iron
    fr: Fer
    it: Ferro
    de: Eisen
    es: Hierro
    ko: 사포닌
    zh_simp: 防御增强剂
    zh_trad: 防禦增強劑
  descriptions:
    jp_kana: "ポケモンの　栄養ドリンク。\nポケモン　１匹の　防御の\n基礎ポイントを　あげる。"
    jp_kanji: "ポケモンの　栄養ドリンク。\nポケモン　１匹の　防御の\n基礎ポイントを　あげる。"
    en: "A nutritious drink for Pokémon. This drink increases\nbase points for a Pokémon’s Defense stat."
    fr: "Une boisson très nutritive qui augmente\nla Défense de base d’un Pokémon."
    it: "Bevanda nutriente per Pokémon. Aumenta i punti base\ndella Difesa."
    de: "Ein gehaltvolles Getränk, das die Verteidigungs-\nBasispunkte eines Pokémon dauerhaft erhöht."
    es: "Nutritiva bebida que aumenta la Defensa de base de un\nPokémon."
    ko: "포켓몬의 영양 드링크.\n포켓몬 1마리의 방어\n기초 포인트를 올린다."
    zh_simp: "宝可梦的营养饮料。\n能提高１只宝可梦的\n防御的基础点数。"
    zh_trad: "寶可夢的營養飲料。\n能提高１隻寶可夢的\n防禦的基礎點數。"
iron_ball:
  names:
    jp_kana: くろいてっきゅう
    jp_kanji: くろいてっきゅう
    en: Iron Ball
    fr: Balle Fer
    it: Ferropalla
    de: Eisenkugel
    es: Bola Férrea
    ko: 검은철구
    zh_simp: 黑色铁球
    zh_trad: 黑色鐵球
  descriptions:
    jp_kana: "持たせると　素早さが　さがる。\nひこうタイプや　ふゆうポケモンは\nじめん技が　当たってしまう。"
    jp_kanji: "持たせると　素早さが　さがる。\nひこうタイプや　ふゆうポケモンは\nじめん技が　当たってしまう。"
    en: "An item to be held by a Pokémon. It lowers the holder’s\nSpeed stat and makes the holder vulnerable to Ground-\ntype moves even if it is a Flying type or is levitating."
    fr: "Objet à tenir. Réduit la Vitesse. Rend les porteurs\nde type Vol, ainsi que ceux en lévitation,\nsensibles aux capacités de type Sol."
    it: "Riduce la Velocità e rende vulnerabili alle mosse di tipo\nTerra se chi ce l’ha è di tipo Volante o ha l’abilità\nLevitazione."
    de: "Ein Item zum Tragen. Macht Pokémon des Typs\nFlug oder mit der Fähigkeit Schwebe anfällig für\nBoden-Attacken. Senkt die Initiative."
    es: "Reduce la Velocidad del Pokémon que la lleva. Si levita\no es de tipo Volador, se torna sensible a movimientos de\ntipo Tierra."
    ko: "지니게 하면 스피드가 떨어진다.\n비행타입이나 부유포켓몬은\n땅 기술에 맞아 버린다."
    zh_simp: "携带后，速度会降低。\n飞行属性以及飘浮宝可梦\n会被地面招式击中。"
    zh_trad: "攜帶後，速度會降低。\n飛行屬性以及飄浮特性的\n寶可夢會被地面招式擊中。"
iron_barktongue:
  names:
    jp_kana: テッペキクラゲ
    jp_kanji: テッペキクラゲ
    en: Iron Barktongue
    fr: Carapachampi
    it: Ferroscudino
    de: Schildling
    es: Seta Férrea
    ko: 철벽버섯
    zh_simp: 铁壁木耳
    zh_trad: 鐵壁木耳
  descriptions:
    jp_kana: "食べると体が硬くなり\n耐久力が増すキノコ。\nまもりのがんやくの材料となる。"
    jp_kanji: "食べると体が硬くなり\n耐久力が増すキノコ。\nまもりのがんやくの材料となる。"
    en: "Mushrooms that, when consumed, make the body of\nthe eater grow tougher. They boost endurance and are\none of the materials needed for crafting Aux Guards."
    fr: "Ce champignon durcit le corps de celui qui l’ingère\net renforce ainsi sa résistance. Ressource requise\npour la confection d’une fiole de Défense Extra."
    it: "Fungo utilizzato nella preparazione di Difensive extra.\nSe mangiato, indurisce il corpo rendendolo\npiù resistente."
    de: "Dieser Pilz wird zur Herstellung von Defensivvitaminen\ngenutzt. Sein Verzehr festigt den Körper und verleiht\neinem so mehr Standhaftigkeit."
    es: "Seta que, al ser ingerida, endurece el cuerpo y aumenta\nla resistencia. Es un ingrediente vital de la\nGragea Defensiva."
    ko: "먹으면 몸이 단단해져서\n내구력이 오르는 버섯.\n방어의환약의 재료가 된다."
    zh_simp: "食用后会让身体变得坚硬，\n发挥更强耐力的菇类。\n可作为防守药丸的材料。"
    zh_trad: "食用後會讓身體變得堅硬，\n發揮更強耐力的菇類。\n可作為防守藥丸的材料。"
iron_chunk:
  names:
    jp_kana: てつのかけら
    jp_kanji: てつのかけら
    en: Iron Chunk
    fr: Fragment de Fer
    it: Pezzo di ferro
    de: Eisenbrocken
    es: Pepita de Hierro
    ko: 철조각
    zh_simp: 碎铁
    zh_trad: 碎鐵
  descriptions:
    jp_kana: "天然の金属片。\n各種のモンスターボールをつくるとき\n加工して留め具などにする。"
    jp_kanji: "天然の金属片。\n各種のモンスターボールをつくるとき\n加工して留め具などにする。"
    en: "A naturally occurring hunk of iron. Such ore is needed\nto make the requisite parts of numerous Poké Ball\nvarieties, such as the clasp that holds the ball shut."
    fr: "Un Fragment de Fer brut nécessaire à la fabrication\ndu système de fermeture des différentes Poké Balls."
    it: "Frammento di ferro di origine naturale. Viene impiegato\nper la fabbricazione delle parti metalliche delle Poké\nBall, come ad esempio la fibbia di chiusura."
    de: "Ein natürlich vorkommender Eisenklumpen, aus dem bei\nder Herstellung verschiedener Pokébälle unter anderem\ndie Schließvorrichtung gefertigt wird."
    es: "Trozo de metal en bruto necesario para fabricar las\ndiversas partes de cualquier Poké Ball, como el cierre."
    ko: "천연의 금속 조각.\n각종 몬스터볼을 만들 때\n가공해서 잠금쇠 등에 사용한다."
    zh_simp: "天然的金属片。\n可加工成锁扣等零件，\n在制作各种精灵球时使用。"
    zh_trad: "天然的金屬片。\n可加工成鎖扣等零件，\n在製作各種精靈球時使用。"
iron_plate:
  names:
    jp_kana: こうてつプレート
    jp_kanji: こうてつプレート
    en: Iron Plate
    fr: Plaque Fer
    it: Lastraferro
    de: Eisentafel
    es: Tabla Acero
    ko: 강철플레이트
    zh_simp: 钢铁石板
    zh_trad: 鋼鐵石板
  descriptions:
    jp_kana: "はがねのタイプの　石盤。\n持たせると　はがねタイプの\n技の威力が　強まる。"
    jp_kanji: "はがねのタイプの　石盤。\n持たせると　はがねタイプの\n技の威力が　強まる。"
    en: "An item to be held by a Pokémon. This stone tablet is\nimbued with the essence of steel and boosts the power\nof the holder’s Steel-type moves."
    fr: "Objet à tenir. Une tablette en pierre augmentant\nla puissance des capacités de type Acier."
    it: "Strumento da dare a un Pokémon. Lastra di pietra che\npotenzia le mosse di tipo Acciaio."
    de: "Ein Item zum Tragen. Diese Steintafel verstärkt\nAttacken vom Typ Stahl."
    es: "Tabla de piedra que potencia los movimientos de tipo\nAcero. Debe llevarla un Pokémon."
    ko: "강철타입의 석판.\n지니게 하면 강철타입\n기술의 위력이 강해진다."
    zh_simp: "钢属性的石板。\n携带后，钢属性的\n招式威力就会增强。"
    zh_trad: "鋼屬性的石板。\n攜帶後，鋼屬性的\n招式威力就會增強。"
item_drop:
  names:
    jp_kana: アイテムドロップ
    jp_kanji: アイテムドロップ
    en: Item Drop
    fr: Jette Objet
    it: Lascioggetto
    de: Itemabwurf
    es: Tiraobjeto
    ko: 아이템드롭
    zh_simp: ？？？
    zh_trad: ？？？
  descriptions:
    jp_kana: "使うと　味方のポケモンが\n持っている　道具を　なくす。"
    jp_kanji: "使うと　味方のポケモンが\n持っている　道具を　なくす。"
    en: "When used, it causes an ally Pokémon to drop a\nheld item."
    fr: Retire tout objet tenu par un Pokémon de l’équipe.
    it: "Usandolo, un Pokémon della squadra lascerà il proprio\nstrumento."
    de: "Der Mitstreiter lässt bei Gebrauch das von ihm\ngetragene Item fallen."
    es: "Cuando se usa, un Pokémon de tu equipo pierde su\nobjeto."
    ko: "사용하면 같은 편 포켓몬이\n지니고 있는 도구를 잃어버린다."
    zh_simp: "使用后，能立刻丢弃\n我方宝可梦携带的道具。"
    zh_trad: "使用後，我方寶可夢\n能立刻丟棄攜帶的道具。"
item_urge:
  names:
    jp_kana: アイテムコール
    jp_kanji: アイテムコール
    en: Item Urge
    fr: Appel Objet
    it: Chiamoggetto
    de: Itemappell
    es: Activaobjeto
    ko: 아이템콜
    zh_simp: ？？？
    zh_trad: ？？？
  descriptions:
    jp_kana: "使うと　味方のポケモンが\n持っている　道具を　すぐ使う。"
    jp_kanji: "使うと　味方のポケモンが\n持っている　道具を　すぐ使う。"
    en: "When used, it causes an ally Pokémon to use its\nheld item."
    fr: "Permet d’utiliser immédiatement l’objet tenu\npar un Pokémon de l’équipe."
    it: "Usandolo, un Pokémon della squadra userà\nimmediatamente il proprio strumento."
    de: "Der Mitstreiter setzt bei Gebrauch sofort das von ihm\ngetragene Item ein."
    es: "Cuando se usa, un Pokémon de tu equipo utiliza su\nobjeto inmediatamente."
    ko: "사용하면 같은 편 포켓몬이\n지니고 있는 도구를 바로 쓴다."
    zh_simp: "使用后，能立刻使用\n我方宝可梦携带的道具。"
    zh_trad: "使用後，我方寶可夢\n能立刻使用攜帶的道具。"
jaboca_berry:
  names:
    jp_kana: ジャポのみ
    jp_kanji: ジャポのみ
    en: Jaboca Berry
    fr: Baie Jaboca
    it: Baccajaba
    de: Jabocabeere
    es: Baya Jaboca
    ko: 자보열매
    zh_simp: 嘉珍果
    zh_trad: 嘉珍果
  descriptions:
    jp_kana: "ポケモンに　持たせると\n物理技を　受けたとき\n相手にも　ダメージを　あたえる。"
    jp_kanji: "ポケモンに　持たせると\n物理技を　受けたとき\n相手にも　ダメージを　あたえる。"
    en: "If a Pokémon holding this Berry is hit with a physical\nmove, the attacker will also take damage."
    fr: "Si le Pokémon qui tient cette Baie est touché par\nune capacité physique, son attaquant subit des dégâts."
    it: "Se un Pokémon ha questa bacca, chi attacca\nsubirà danni se la sua mossa fisica va a segno."
    de: "Als getragenes Item verursacht diese Beere Schaden bei\neinem Angreifer, der das Pokémon mit einer physischen\nAttacke trifft."
    es: "Si la lleva un Pokémon y recibe un ataque físico,\nel atacante también recibe daño."
    ko: "포켓몬에게 지니게 하면\n물리 기술로 공격받았을 때\n상대에게도 데미지를 준다."
    zh_simp: "让宝可梦携带后，\n在受到物理招式攻击时，\n能给予对手伤害。"
    zh_trad: "讓寶可夢攜帶後，\n在受到物理招式攻擊時，\n也能給予對手傷害。"
jade_orb:
  names:
    jp_kana: もえぎいろのたま
    jp_kanji: もえぎいろのたま
    en: Jade Orb
    fr: Orbe Vert
    it: Sfera verde
    de: Grüne Kugel
    es: Esfera Verde
    ko: 연둣빛구슬
    zh_simp: 草绿色宝珠
    zh_trad: 草綠色寶珠
  descriptions:
    jp_kana: "ホウエン地方の　伝説と\n深い　関わりが　あると　いわれる\nみどりいろに　かがやく　たま。"
    jp_kanji: "ホウエン地方の　伝説と\n深い　関わりが　あると　いわれる\nみどりいろに　かがやく　たま。"
    en: "A shiny green orb that is said to have a deep connection\nto a legend of the Hoenn region."
    fr: "Un orbe viride dont on dit qu’il a un lien très étroit\navec les légendes de Hoenn."
    it: "Sfera con riflessi verdi, che pare essere strettamente\nlegata alle leggende della regione di Hoenn."
    de: "Eine grün schimmernde Kugel, von der in den\nLegenden der Hoenn-Region berichtet wird."
    es: "Esfera glauca de la que se dice que guarda una\nestrecha relación con las leyendas de Hoenn."
    ko: "호연지방의 전설과\n깊은 연관이 있다고 전해지는\n초록색으로 빛나는 구슬."
    zh_simp: "散发着绿色光辉的宝珠。\n据说和丰缘地区的传说渊源颇深。"
    zh_trad: "散發著綠色光輝的寶珠。\n據說和豐緣地區的傳說\n有著很深的淵源。"
jalapeno:
  names:
    jp_kana: ハラペーニョ
    jp_kanji: ハラペーニョ
    en: Jalapeño
    fr: Piment
    it: Jalapeño
    de: Jalapeño
    es: Jalapeño
    ko: 할라페뇨
    zh_simp: 小辣椒
    zh_trad: 小辣椒
  descriptions:
    jp_kana: "辛味が　強い　食材。\n辛味が　非常に　強いので　好き嫌いが\nはっきり　分かれる　食材なのだ。"
    jp_kanji: "辛味が　強い　食材。\n辛味が　非常に　強いので　好き嫌いが\nはっきり　分かれる　食材なのだ。"
    en: "A very spicy ingredient—so spicy as to leave no room\nfor ambivalence about it. You either like it or you don’t."
    fr: "Un ingrédient au goût très épicé. Son goût est\ntellement relevé qu’il est très clivant : soit on l’aime,\nsoit on le déteste."
    it: "Un ingrediente molto piccante. La sua piccantezza\nestrema si ama o si odia senza mezze misure."
    de: "Eine sehr scharfe Zutat. An ihrem außerordentlich hohen\nSchärfegrad scheiden sich die Geister."
    es: "Un ingrediente con un sabor muy picante, por lo que\nnormalmente o se ama o se odia."
    ko: "매운맛이 강한 식재료.\n매운맛이 매우 강해서 호불호가\n확실하게 갈리는 식재료다."
    zh_simp: "辣味强烈的食材。\n由于辣味非常之强，\n所以是喜恶两极化的食材。"
    zh_trad: "辣味強勁的食材。\n由於辣味非常強烈，\n所以人們對其的好惡相當分明。"
jam:
  names:
    jp_kana: ベリージャム
    jp_kanji: ベリージャム
    en: Jam
    fr: Confiture de Baies
    it: Confettura di bosco
    de: Beerenkonfitüre
    es: Confitura de Bayas
    ko: 베리잼
    zh_simp: 莓果酱
    zh_trad: 莓果醬
  descriptions:
    jp_kana: "甘味と　酸味が　強い　調味料。\nサンドウィッチに　使うには　甘みが\n強めなので　使うときは　注意しよう。"
    jp_kanji: "甘味と　酸味が　強い　調味料。\nサンドウィッチに　使うには　甘みが\n強めなので　使うときは　注意しよう。"
    en: "A condiment that’s very sweet and likewise very sour.\nTake care when adding it to sandwiches, as the sweet\nside can overwhelm."
    fr: "Un condiment au goût très sucré et acide. Attention à\nne pas en tartiner de trop à l’intérieur d’un Sandwich,\ncar cela risquerait de masquer les autres saveurs."
    it: "Un condimento molto dolce e aspro. È necessario usarlo\ncon attenzione nei panini a causa della notevole\ndolcezza."
    de: "Verwendet man dieses sehr süß-saure Würzmittel bei der\nZubereitung von Sandwiches, ist Vorsicht geboten,\nda die süße Note recht dominant sein kann."
    es: "Este ingrediente posee un fuerte sabor ácido, pero en\nlos bocadillos suele destacar su dulzor, por lo que es\nmejor no usar demasiado para no empalagar."
    ko: "단맛과 신맛이 강한 조미료.\n샌드위치에 사용하기엔 단맛이 강하므로\n사용할 때는 주의하자."
    zh_simp: "甜味和酸味强烈的调味料。\n用在三明治上时甜味偏强，\n使用时要足够注意。"
    zh_trad: "甜味和酸味強勁的調味料。\n用於三明治時，甜味會偏重，\n所以使用時要多加留意。"
jangmo_o_scales:
  names:
    jp_kana: ジャラコのウロコ
    jp_kanji: ジャラコのウロコ
    en: Jangmo-o Scales
    fr: Écaille de Bébécaille
    it: Squama di Jangmo-o
    de: Miniras-Schuppe
    es: Escama de Jangmo-o
    ko: 짜랑꼬의비늘
    zh_simp: 心鳞宝的鳞片
    zh_trad: 心鱗寶的鱗片
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
jaw_fossil:
  names:
    jp_kana: アゴのカセキ
    jp_kanji: アゴのカセキ
    en: Jaw Fossil
    fr: Fossile Mâchoire
    it: Fossilmascella
    de: Kieferfossil
    es: Fósil Mandíbula
    ko: 턱화석
    zh_simp: 颚之化石
    zh_trad: 顎之化石
  descriptions:
    jp_kana: "大昔　地上で　暮らした\n古代ポケモンの　カセキ。\n大きなアゴの一部　らしい。"
    jp_kanji: "大昔　地上で　暮らした\n古代ポケモンの　カセキ。\n大きなアゴの一部　らしい。"
    en: "A fossil from a prehistoric Pokémon that once lived\non the land. It looks as if it could be a piece of a\nlarge jaw."
    fr: "Le fossile d’un Pokémon préhistorique terrestre.\nOn dirait un morceau de mâchoire."
    it: "Fossile di un Pokémon preistorico che viveva sulla\nterraferma. Sembra far parte di una grossa mascella."
    de: "Das Fossil eines urzeitlichen Pokémon, das an Land\nlebte. Es sieht wie ein Teil eines Kieferknochens aus."
    es: "Fósil de un Pokémon prehistórico terrestre. Parece ser\nparte de una mandíbula."
    ko: "오랜 옛날 지상에서 살았던\n고대 포켓몬의 화석.\n커다란 턱의 일부인 듯하다."
    zh_simp: "很久以前生活在地上的\n古代宝可梦的化石。\n好像是很大的颚的一部分。"
    zh_trad: "很久以前生活在地上的\n古代寶可夢的化石。\n好像是很大的顎的一部分。"
jet_ball:
  names:
    jp_kana: ジェットボール
    jp_kanji: ジェットボール
    en: Jet Ball
    fr: Propulse Ball
    it: Jet Ball
    de: Düsenball
    es: Aero Ball
    ko: 제트볼
    zh_simp: 飞梭球
    zh_trad: 飛梭球
  descriptions:
    jp_kana: "最高に強化されたフェザーボール。\n速くまっすぐに飛ぶ。素早いポケモンや\n空高く飛ぶポケモンの捕獲に有効である。"
    jp_kanji: "最高に強化されたフェザーボール。\n速くまっすぐに飛ぶ。素早いポケモンや\n空高く飛ぶポケモンの捕獲に有効である。"
    en: "The ultimate iteration of the Feather Ball. A ball that\nflies fast and true—ideal for catching nimble Pokémon\nor Pokémon that fly high in the air."
    fr: "Cette version ultime de la Plume Ball fend les airs à toute\nvitesse, en ligne droite. Elle permet notamment d’attraper\nles Pokémon qui volent ou qui sont très rapides."
    it: "Versione potenziata al massimo della Piuma Ball che\nvola rapida in linea retta. È efficace per catturare\nPokémon veloci e Pokémon che volano alti nel cielo."
    de: "Die ultimative Version des Federballs. Dieser Ball\nfliegt schnell und gerade. Er eignet sich besonders\nzum Fangen flinker oder fliegender Pokémon."
    es: "Versión inmejorable de la Pluma Ball que vuela muy\nrápido y en línea recta al lanzarla. Ideal para capturar\nPokémon ágiles o Pokémon voladores."
    ko: "최고로 강화된 페더볼.\n빠르게 똑바로 날아간다. 재빠른 포켓몬이나\n하늘 높이 나는 포켓몬을 잡을 때 유용하다."
    zh_simp: "强化到最高阶的飞羽球。能直线高速飞行，\n在捕捉动作快速的宝可梦及\n飞在高空的宝可梦时十分有效。"
    zh_trad: "強化到最高階的飛羽球。能直線高速飛行，\n在捕捉動作快速的寶可夢及\n飛在高空的寶可夢時十分有效。"
jet_ball:recipe:
  names:
    jp_kana: ジェットボール
    jp_kanji: ジェットボール
    en: Jet Ball
    fr: Propulse Ball
    it: Jet Ball
    de: Düsenball
    es: Aero Ball
    ko: 제트볼
    zh_simp: 飞梭球
    zh_trad: 飛梭球
  descriptions:
    jp_kana: "ジェットボールのレシピ。　材料は\nぼんぐりのみ×１　てつのかけら×２\nそらいろたまいし×２"
    jp_kanji: "ジェットボールのレシピ。　材料は\nぼんぐりのみ×１　てつのかけら×２\nそらいろたまいし×２"
    en: "A recipe for crafting Jet Balls from scratch.\nRequired materials: 1 Apricorn, 2 Sky Tumblestones,\nand 2 Iron Chunks."
    fr: "Méthode pour Propulse Ball. Ressources requises :\n1 Noigrume, 2 Fragments de Fer et 2 Galets Azur."
    it: "Ricetta per creare una Jet Ball. I materiali necessari\nsono 1 Bacca ghicocca, 2 Pezzi di ferro e 2 Ciottoli\ncelesti."
    de: "Die Anleitung zur Herstellung eines Düsenballs.\nBenötigte Materialien: 1 Aprikoko, 2 Eisenbrocken\nund 2 Azurglanzsteine."
    es: "Receta para crear Aero Balls. Materiales:\n1 Bonguri, 2 Pepitas de Hierro y 2 Guijarros Celestes."
    ko: "제트볼의 레시피.\n재료: 규토리열매×1 철조각×2 하늘색옥돌×2"
    zh_simp: "飞梭球的材料单。材料是：\n球果果×１　碎铁×２\n天蓝玉石×２"
    zh_trad: "飛梭球的材料單。材料是：\n球果果×１　碎鐵×２\n天藍玉石×２"
jigglypuff_candy:
  names:
    jp_kana: プリンのアメ
    jp_kanji: プリンのアメ
    en: Jigglypuff Candy
    fr: Bonbon Rondoudou
    it: Caramella Jigglypuff
    de: Pummeluff-Bonbon
    es: Caramelo Jigglypuff
    ko: 푸린의사탕
    zh_simp: 胖丁的糖果
    zh_trad: 胖丁的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
johto_slate:
  names:
    jp_kana: ジョウトのせきばん
    jp_kanji: ジョウトのせきばん
    en: Johto Slate
    fr: Tablette Johto
    it: Piastra di Johto
    de: Johto-Platte
    es: Losa Johto
    ko: 성도의석판
    zh_simp: 城都石板
    zh_trad: 城都石板
  descriptions:
    jp_kana: "不思議な　力に　あふれる　石板。\nハマナスパークの　ジョウトの部屋と\n深い　つながりを　感じる。"
    jp_kanji: "不思議な　力に　あふれる　石板。\nハマナスパークの　ジョウトの部屋と\n深い　つながりを　感じる。"
    en: "A slate overflowing with enigmatic energy. You can feel\na strong connection between it and the Johto Room at\nRamanas Park."
    fr: "Une tablette qui regorge d’une étrange énergie.\nElle semble intimement liée à la Salle de Johto\ndu Parc Rosa Rugosa."
    it: "Lastra di pietra che emana una misteriosa energia.\nSembra profondamente connessa alla Stanza di Johto\ndel Parco Rosa Rugosa."
    de: "Eine Platte, die vor rätselhafter Energie strotzt.\nMan kann eine starke Verbindung zwischen ihr und der\nJohto-Kammer im Hamanasu-Park spüren."
    es: "Una losa rebosante de una misteriosa energía. Parece\nestrechamente relacionada con la Sala de Johto del\nParque Hansa."
    ko: "신비한 힘이 넘치는 석판.\n해당화파크의 성도의 방과\n깊은 연관이 있는 것 같다."
    zh_simp: "充满了神秘力量的石板。\n感觉它与玫瑰公园的城都之厅\n有着很深的关联。"
    zh_trad: "充滿神奇力量的石板。\n感覺它和玫瑰公園的城都之廳\n有很深的關係。"
jolly_mint:
  names:
    jp_kana: ようきミント
    jp_kanji: ようきミント
    en: Jolly Mint
    fr: Aromate Jovial
    it: Menta Allegra
    de: Froh-Minze
    es: Menta Alegre
    ko: 명랑민트
    zh_simp: 爽朗薄荷
    zh_trad: 爽朗薄荷
  descriptions:
    jp_kana: "ポケモンに　香りを　かがせると\n素早さが　上がりやすく　なるが\n特攻は　上がりにくくなる　ミント。"
    jp_kanji: "ポケモンに　香りを　かがせると\n素早さが　上がりやすく　なるが\n特攻は　上がりにくくなる　ミント。"
    en: "Having a Pokémon smell this mint can make its Speed\nstat grow stronger. However, its Sp. Atk stat may suffer."
    fr: "Si un Pokémon hume cet aromate, sa Vitesse\nmontera plus facilement, mais son Attaque Spéciale\nse développera plus lentement."
    it: "Quando un Pokémon ne sente il profumo, la sua Velocità\naumenta più facilmente a scapito dell’Attacco Speciale."
    de: "Lässt man ein Pokémon an dieser Minze schnuppern,\nsteigt seine Initiative schneller, aber sein Spezial-Angriff\numso langsamer."
    es: "Cuando un Pokémon percibe su aroma, aumenta\ncon más facilidad su Velocidad, en detrimento de su\nAtaque Especial."
    ko: "포켓몬에게 향기를 맡게 하면\n스피드가 오르기 쉬워지지만\n특수공격이 오르기 어려워지는 민트."
    zh_simp: "宝可梦闻了这种薄荷之后，\n会令速度容易提高，\n而特攻则难以提高。"
    zh_trad: "讓寶可夢聞這種薄荷的氣味，\n會令速度變得容易提高，\n但特攻則難以提高。"
joltik_thread:
  names:
    jp_kana: バチュルのいと
    jp_kanji: バチュルのいと
    en: Joltik Thread
    fr: Fil de Statitik
    it: Filo di Joltik
    de: Wattzapf-Faden
    es: Hilo de Joltik
    ko: 파쪼옥의실
    zh_simp: 电电虫的丝
    zh_trad: 電電蟲的絲
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
jubilife_muffin:
  names:
    jp_kana: コトブキマフィン
    jp_kanji: コトブキマフィン
    en: Jubilife Muffin
    fr: Rusti-Muffin
    it: Muffin Giubilo
    de: Jubelmuffin
    es: Bizcocho Jubileo
    ko: 축복머핀
    zh_simp: 祝庆玛芬
    zh_trad: 祝慶瑪芬
  descriptions:
    jp_kana: "コトブキムラで　流行りつつある　隠れた名物。\nポケモンが　よく好ん　で食べる。\n食べると　状態異常が　回復する。"
    jp_kanji: "コトブキムラで　流行りつつある　隠れた名物。\nポケモンが　よく好ん　で食べる。\n食べると　状態異常が　回復する。"
    en: "A hidden gem gaining popularity in Jubilife Village and\nbeloved by Pokémon. This sweet treat can be fed to\na Pokémon to cure any status condition it may have."
    fr: "Un mets populaire à Rusti-Cité que seuls les fins gourmets\nsavent où trouver. Très apprécié des Pokémon, il soigne\nles altérations de statut."
    it: "Specialità segreta del Villaggio Giubilo che gode di\ncrescente popolarità. Particolarmente apprezzato\ndai Pokémon, cura i problemi di stato se mangiato."
    de: "Eine wenig bekannte Spezialität, die sich in Jubeldorf\nzunehmender Beliebtheit erfreut. Sie wird auch von\nPokémon gern gegessen und heilt alle Statusprobleme."
    es: "Especialidad poco conocida de Villa Jubileo que cada\nvez goza de mayor popularidad. Hace las delicias de\nlos Pokémon y cura todos los problemas de estado."
    ko: "축복마을에서 유행 중인 숨겨진 명물.\n포켓몬이 즐겨 먹는다.\n먹으면 상태 이상을 회복한다."
    zh_simp: "祝庆村不为人知的特产，是宝可梦\n喜爱的食物，如今正渐渐流行起来。\n吃下后能治愈异常状态。"
    zh_trad: "祝慶村不為人知的特產，是寶可夢\n喜愛的食物，如今正漸漸流行起來。\n吃下後能治癒異常狀態。"
jubilife_muffin:recipe:
  names:
    jp_kana: コトブキマフィン
    jp_kanji: コトブキマフィン
    en: Jubilife Muffin
    fr: Rusti-Muffin
    it: Muffin Giubilo
    de: Jubelmuffin
    es: Bizcocho Jubileo
    ko: 축복머핀
    zh_simp: 祝庆玛芬
    zh_trad: 祝慶瑪芬
  descriptions:
    jp_kana: "コトブキマフィンのレシピ。　材料は\nいきいきイナホ×２　ポフのみ×２\nズリのみ×１　よせだまのもと×１"
    jp_kanji: "コトブキマフィンのレシピ。　材料は\nいきいきイナホ×２　ポフのみ×２\nズリのみ×１　よせだまのもと×１"
    en: "A recipe for crafting Jubilife Muffins from scratch.\nRequired materials: 2 stalks of Hearty Grains,\n2 Hopo Berries, 1 Razz Berry, and 1 Cake-Lure Base."
    fr: "Méthode pour Rusti-Muffin. Ressources requises :\n2 épis de Riz Zélé, 2 Baies Bouhlon, 1 Baie Framby\net 1 boule d’Appâte."
    it: "Ricetta per un Muffin Giubilo. Richiede 2 Spighe\nrigogliose, 2 Baccaluppo, 1 Baccalampon e\n1 Polpetta base."
    de: "Die Anleitung zur Herstellung eines Jubelmuffins.\nBenötigte Materialien: 2 Ähren Munterreis,\n2 Pfohbeeren, 1 Himmihbeere und 1 Portion Köderteig."
    es: "Receta para crear Bizcochos Jubileo. Materiales:\n2 Espigas Vivaces, 2 Bayas Lupu, 1 Baya Frambu\ny 1 bola de Masa para Cebo."
    ko: "축복머핀의 레시피.\n재료: 싱싱이삭×2 포흐열매×2\n라즈열매×1 유인환반죽×1"
    zh_simp: "祝庆玛芬的材料单。材料是：\n旺旺谷×２　花啤果×２\n蔓莓果×１　诱团原料×１"
    zh_trad: "祝慶瑪芬的材料單。材料是：\n旺旺穀×２　花啤果×２\n蔓莓果×１　誘糰原料×１"
