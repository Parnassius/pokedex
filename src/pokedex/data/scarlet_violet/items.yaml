    ko: "고스트타입의 주얼.\n지니게 하면 한 번만 고스트\n기술의 위력이 강해진다."
    zh_simp: "幽灵属性的宝石。\n携带后，幽灵属性的\n招式威力仅会增强１次。"
    zh_trad: "幽靈屬性的寶石。\n攜帶後，幽靈屬性招式的\n威力會僅增強１次。"
ghost_memory:
  names:
    jp_kana: ゴーストメモリ
    jp_kanji: ゴーストメモリ
    en: Ghost Memory
    fr: ROM Spectre
    it: ROM Spettro
    de: Geister-Disc
    es: Disco Fantasma
    ko: 고스트메모리
    zh_simp: 幽灵存储碟
    zh_trad: 幽靈記憶碟
  descriptions:
    jp_kana: "ゴーストタイプの　データが　入った\nメモリ。　特定のポケモンが　持つと\nタイプが　変わる。"
    jp_kanji: "ゴーストタイプの　データが　入った\nメモリ。　特定のポケモンが　持つと\nタイプが　変わる。"
    en: "A memory disc that contains Ghost-type data.\nIt changes the type of the holder if held by\na certain species of Pokémon."
    fr: "Une carte mémoire contenant des données sur\nle type Spectre. Un certain Pokémon peut changer\nde type en l’équipant."
    it: "ROM contenente dati sul tipo Spettro in formato\ndigitale. Permette a un certo Pokémon di cambiare tipo."
    de: "Eine Disc mit Daten zum Typ Geist. Sie löst bei einem\nbestimmten Pokémon einen Typenwechsel aus."
    es: "Disco de datos que contiene información relativa al tipo\nFantasma. Permite cambiar de tipo a cierto Pokémon."
    ko: "고스트타입의 데이터가 들어 있는\n메모리. 특정 포켓몬이\n지니면 타입이 바뀐다."
    zh_simp: "装有幽灵属性数据的存储碟。\n特定宝可梦携带后，\n属性就会发生变化。"
    zh_trad: "裝有幽靈屬性資料的記憶碟。\n特定寶可夢攜帶後，\n就會產生屬性的變化。"
ghost_tera_shard:
  names:
    jp_kana: テラピースゴースト
    jp_kanji: テラピースゴースト
    en: Ghost Tera Shard
    fr: Téra-Éclat Spectre
    it: Teralite Spettro
    de: Tera-Stück (Geist)
    es: Teralito Fantasma
    ko: 테라피스 고스트
    zh_simp: 幽灵太晶碎块
    zh_trad: 幽靈太晶碎塊
  descriptions:
    jp_kana: "テラスタルポケモンが　倒れたとき\n砕けた　テラスタルジュエルが\nまれに　結晶化したもの。"
    jp_kanji: "テラスタルポケモンが　倒れたとき\n砕けた　テラスタルジュエルが\nまれに　結晶化したもの。"
    en: "On rare occasions, these shards form when a Tera\nPokémon falls in battle and its Tera Jewel shatters."
    fr: "Un fragment cristallisé qui se forme rarement lors\nde l’éclatement d’un Joyau Téracristal après qu’un\nPokémon Téracristal a été mis K.O."
    it: "Cristallizzazione che raramente si forma quando\nun Pokémon Teracristal viene sconfitto e la sua gemma\nTeracristal va in frantumi."
    de: "In äußerst seltenen Fällen kristallisieren Bruchstücke\ndes Terakristalls von im Kampf besiegten Terakristall-\nPokémon zu solchen Tera-Stücken."
    es: "Esquirla que se forma muy raramente cuando la joya\nTeracristal de un Pokémon teracristalizado se quiebra\ntras derrotarlo."
    ko: "테라스탈 포켓몬이 쓰러졌을 때\n부서진 테라스탈 주얼이\n드물게 결정화한 조각."
    zh_simp: "打倒太晶宝可梦时，\n破碎掉的太晶宝石有\n极低概率会结晶成此物。"
    zh_trad: "太晶寶可夢倒下時，\n碎裂的太晶寶石在罕見的情況下\n會結晶化，而形成此物。"
ghostium_z:bag:
  names:
    jp_kana: ゴーストＺ
    jp_kanji: ゴーストＺ
    en: Ghostium Z
    fr: Spectrozélite
    it: Spectrium Z
    de: Phantomium Z
    es: Espectrostal Z
    ko: 고스트Z
    zh_simp: 幽灵Ｚ
    zh_trad: 幽靈Ｚ
  descriptions:
    jp_kana: "ゴーストタイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    jp_kanji: "ゴーストタイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nGhost-type moves to Ghost-type Z-Moves."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise son porteur à transformer ses capacités\nde type Spectre en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono ai Pokémon di trasformare le mosse\ndi tipo Spettro in mosse Z."
    de: "Kristallisierte Z-Kraft, die Geister-Attacken zu\nZ-Attacken aufstuft. Wird bei Bedarf automatisch\nvervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a los\nportadores convertir sus movimientos de tipo Fantasma\nen movimientos Z."
    ko: "고스트타입 기술을\nZ기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将幽灵属性招式升级成\nＺ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把幽靈屬性招式\n升級為Ｚ招式的Ｚ力量結晶。"
ghostium_z:held:
  names:
    jp_kana: ゴーストＺ
    jp_kanji: ゴーストＺ
    en: Ghostium Z
    fr: Spectrozélite
    it: Spectrium Z
    de: Phantomium Z
    es: Espectrostal Z
    ko: 고스트Z
    zh_simp: 幽灵Ｚ
    zh_trad: 幽靈Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　結晶。\nゴーストタイプの　技を\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nゴーストタイプの　技を\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Ghost-type moves to Z-Moves."
    fr: "Une cristallisation de la Force Z, permettant\nde transformer les capacités de type Spectre\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare le mosse di tipo Spettro\nin mosse Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft\nGeister-Attacken zu Z-Attacken auf."
    es: "Cristal que confiere el Poder Z a los movimientos\nde tipo Fantasma."
    ko: "Z파워의 결정.\n고스트타입 기술을\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将幽灵属性的招式\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把幽靈屬性的招式\n升級為Ｚ招式。"
gible_scales:
  names:
    jp_kana: フカマルのウロコ
    jp_kanji: フカマルのウロコ
    en: Gible Scales
    fr: Écaille de Griknot
    it: Squama di Gible
    de: Kaumalat-Schuppe
    es: Escama de Gible
    ko: 딥상어동의비늘
    zh_simp: 圆陆鲨的鳞片
    zh_trad: 圓陸鯊的鱗片
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
gigantamix:
  names:
    jp_kana: キョダイパウダー
    jp_kanji: キョダイパウダー
    en: Gigantamix
    fr: Poudre Gigamax
    it: Gigaspezia
    de: Giga-Pulver
    es: Especias Gigamax
    ko: 거대파우더
    zh_simp: 超极粉
    zh_trad: 超極粉
  descriptions:
    jp_kana: "キャンプ　料理の　食材。\n一振りで　カレーを　巨大に　する\n不思議な　スパイス。"
    jp_kanji: "キャンプ　料理の　食材。\n一振りで　カレーを　巨大に　する\n不思議な　スパイス。"
    en: "One of the many ingredients that can be used for\ncooking at your camp. A mysterious spice. Even a tiny\nsprinkle is sure to make a curry gigantic."
    fr: "Un ingrédient de cuisine pour le camping.\nUne simple pincée de cette épice mystérieuse\npermet de donner une taille démesurée au curry."
    it: "Uno degli ingredienti per cucinare in campeggio.\nBasta un pizzico di questa spezia misteriosa per\ningigantire qualsiasi curry."
    de: "Eine Zutat für PokéCamping-Mahlzeiten. Dieses\ngeheimnisvolle Gewürz macht Currygerichte auf\neinen Schlag gigantisch."
    es: "Un ingrediente para cocinar en el campamento. Una\npizca de esta extraña especia basta para elaborar un\ncurri gigantesco."
    ko: "캠프 요리의 식재료.\n조금만 넣어도 카레를 거대하게 만드는\n신비한 향신료."
    zh_simp: "在露营营地制作料理时会使用的食材。\n只要把这种神奇的香辛料往咖喱上\n轻轻一撒，咖喱就会变得巨大无比。"
    zh_trad: "製作露營料理時使用的食材。\n神奇的香料，輕輕一撒就能\n讓咖哩變得巨大無比。"
gigaton_ball:
  names:
    jp_kana: ギガトンボール
    jp_kanji: ギガトンボール
    en: Gigaton Ball
    fr: Gigamasse Ball
    it: Gigaton Ball
    de: Tonnenball
    es: Quintal Ball
    ko: 기가톤볼
    zh_simp: 巨重球
    zh_trad: 巨重球
  descriptions:
    jp_kana: "最高に強化されたヘビーボール。\n重たくて飛ばないが　油断している\nポケモンに当てると高い捕獲性能を発揮。"
    jp_kanji: "最高に強化されたヘビーボール。\n重たくて飛ばないが　油断している\nポケモンに当てると高い捕獲性能を発揮。"
    en: "The ultimate iteration of the Heavy Ball. A ball that is\ntoo heavy to fly high or far, but it is highly effective if\nyou manage to hit an unsuspecting Pokémon."
    fr: "Cette version ultime de la Masse Ball est trop lourde\npour être lancée au loin, mais si elle atteint un Pokémon\ndistrait, le taux de réussite est élevé."
    it: "Versione potenziata al massimo della Peso Ball. È troppo\npesante per essere lanciata lontano, ma se colpisce\nun Pokémon distratto ha un’alta probabilità di cattura."
    de: "Die ultimative Version des Schwerballs. Dieser schwere\nBall kann nicht weit fliegen. Dafür ist die Erfolgsquote\nhoch, wenn er ein unaufmerksames Pokémon trifft."
    es: "Versión inmejorable de la Peso Ball. Muy pesada para\nlanzarla a largas distancias, aunque tiene un porcentaje\nmuy alto de éxito si se usa contra un Pokémon distraído."
    ko: "최고로 강화된 헤비볼.\n무거워서 잘 날아가지 않지만, 방심하고 있는\n포켓몬에게 맞히면 높은 포획 성능을 발휘한다."
    zh_simp: "强化到最高阶的沉重球。沉重而无法远投，\n但若能命中掉以轻心的宝可梦，\n就能发挥强大的捕获能力。"
    zh_trad: "強化到最高階的沉重球。沉重而無法遠投，\n但若能命中掉以輕心的寶可夢，\n就能發揮強大的捕獲能力。"
gigaton_ball:recipe:
  names:
    jp_kana: ギガトンボール
    jp_kanji: ギガトンボール
    en: Gigaton Ball
    fr: Gigamasse Ball
    it: Gigaton Ball
    de: Tonnenball
    es: Quintal Ball
    ko: 기가톤볼
    zh_simp: 巨重球
    zh_trad: 巨重球
  descriptions:
    jp_kana: "ギガトンボールのレシピ。　材料は\nぼんぐりのみ×１　てつのかけら×２\nくろいろたまいし×２"
    jp_kanji: "ギガトンボールのレシピ。　材料は\nぼんぐりのみ×１　てつのかけら×２\nくろいろたまいし×２"
    en: "A recipe for crafting Gigaton Balls from scratch.\nRequired materials: 1 Apricorn, 2 Black Tumblestones,\nand 2 Iron Chunks."
    fr: "Méthode pour Gigamasse Ball. Ressources requises :\n1 Noigrume, 2 Fragments de Fer et 2 Galets Noirs."
    it: "Ricetta per creare una Gigaton Ball. I materiali necessari\nsono 1 Bacca ghicocca, 2 Pezzi di ferro e 2 Ciottoli neri."
    de: "Die Anleitung zur Herstellung eines Tonnenballs.\nBenötigte Materialien: 1 Aprikoko, 2 Eisenbrocken\nund 2 Schwarzglanzsteine."
    es: "Receta para crear Quintal Balls. Materiales:\n1 Bonguri, 2 Pepitas de Hierro y 2 Guijarros Negros."
    ko: "기가톤볼의 레시피.\n재료: 규토리열매×1 철조각×2 검은옥돌×2"
    zh_simp: "巨重球的材料单。材料是：\n球果果×１　碎铁×２\n黑玉石×２"
    zh_trad: "巨重球的材料單。材料是：\n球果果×１　碎鐵×２\n黑玉石×２"
gimmighoul_coin:
  names:
    jp_kana: コレクレーのコイン
    jp_kanji: コレクレーのコイン
    en: Gimmighoul Coin
    fr: Pièce de Mordudor
    it: Moneta di Gimmighoul
    de: Gierspenst-Münze
    es: Moneda de Gimmighoul
    ko: 모으령의코인
    zh_simp: 索财灵的硬币
    zh_trad: 索財靈的硬幣
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nコレクレーが　大事そうに　集めている。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nコレクレーが　大事そうに　集めている。"
    en: "Material accidentally dropped by a Pokémon. It seems\nthat Gimmighoul treasure and hoard these."
    fr: "Un objet laissé par un Pokémon.\nMordudor les collectionne avec énormément de soin."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon che i Gimmighoul accumulano avidamente."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nGierspenst hortet diese Münzen eifrig."
    es: "Material que ha dejado caer un Pokémon.\nLos Gimmighoul las coleccionan y las aprecian mucho."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n모으령이 소중하게 모으고 있다."
    zh_simp: "宝可梦不小心掉落的东西。\n索财灵珍爱有加地收集着它。"
    zh_trad: "寶可夢不小心掉落的東西。\n索財靈正在百般珍惜地收集。"
girafarig_fur:
  names:
    jp_kana: キリンリキのけ
    jp_kanji: キリンリキのけ
    en: Girafarig Fur
    fr: Poils de Girafarig
    it: Pelo di Girafarig
    de: Girafarig-Haar
    es: Pelo de Girafarig
    ko: 키링키의털
    zh_simp: 麒麟奇的毛
    zh_trad: 麒麟奇的毛
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
glalitite:
  names:
    jp_kana: オニゴーリナイト
    jp_kanji: オニゴーリナイト
    en: Glalitite
    fr: Oniglalite
    it: Glalite
    de: Firnontornit
    es: Glalita
    ko: 얼음귀신나이트
    zh_simp: 冰鬼护进化石
    zh_trad: 冰鬼護進化石
  descriptions:
    jp_kana: "オニゴーリに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    jp_kanji: "オニゴーリに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Glalie hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Oniglali, elle lui permet de méga-évoluer\ndurant un combat."
    it: "Una delle misteriose Megapietre. Data a Glalie,\ngli permette di megaevolversi durante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Firnontor getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Glalie en combate."
    ko: "얼음귀신에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让冰鬼护携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓冰鬼護攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
glastrier_treat:
  names:
    jp_kana: ブリザポスのおやつ
    jp_kanji: ブリザポスのおやつ
    en: Glastrier Treat
    fr: Friandise Blizzeval
    it: Spuntino per Glastrier
    de: Polaross-Snack
    es: Galleta Glastrier
    ko: 블리자포스의간식
    zh_simp: 雪暴马的点心
    zh_trad: 雪暴馬的點心
  descriptions:
    jp_kana: "伝説のポケモン　ブリザポスが\n好む食材で　作られた　おやつ。"
    jp_kanji: "伝説のポケモン　ブリザポスが\n好む食材で　作られた　おやつ。"
    en: "A snack made from ingredients favored by the\nLegendary Pokémon Glastrier."
    fr: "Une friandise préparée avec les ingrédients favoris\ndu Pokémon légendaire Blizzeval."
    it: "Uno spuntino fatto con gli ingredienti preferiti\ndal Pokémon leggendario Glastrier."
    de: "Dieser Snack wurde mit den Lieblingszutaten des\nLegendären Pokémon Polaross zubereitet."
    es: "Galleta preparada con los ingredientes favoritos\ndel Pokémon legendario Glastrier."
    ko: "전설의 포켓몬 블리자포스가\n좋아하는 식재료로 만들어진 간식."
    zh_simp: "用传说的宝可梦雪暴马\n喜欢的食材制作的点心。"
    zh_trad: "用傳說的寶可夢雪暴馬\n喜愛的食材製成的點心。"
gligar_fang:
  names:
    jp_kana: グライガーのキバ
    jp_kanji: グライガーのキバ
    en: Gligar Fang
    fr: Croc de Scorplane
    it: Zanna di Gligar
    de: Skorgla-Zahn
    es: Colmillo de Gligar
    ko: 글라이거의이빨
    zh_simp: 天蝎的牙
    zh_trad: 天蠍的牙
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
glimmering_charm:
  names:
    jp_kana: きらめくおまもり
    jp_kanji: きらめくおまもり
    en: Glimmering Charm
    fr: Charme Éclatant
    it: Brillamuleto
    de: Glitzerpin
    es: Amuleto Cristalino
    ko: 반짝이는부적
    zh_simp: 晶耀护符
    zh_trad: 晶耀護符
  descriptions:
    jp_kana: "持っていると　テラレイドバトルで\nもらえる　テラピースが　増える\n不思議で　きらめいている　おまもり。"
    jp_kanji: "持っていると　テラレイドバトルで\nもらえる　テラピースが　増える\n不思議で　きらめいている　おまもり。"
    en: "Having one of these mysterious glimmering charms\nincreases the number of Tera Shards you receive from\nTera Raid Battles."
    fr: "Un mystérieux charme éclatant qui permet d’obtenir\ndavantage de Téra-Éclats lors des raids Téracristal."
    it: "Misterioso amuleto brillante che aumenta le teraliti\nottenibili nei Raid Teracristal."
    de: "Ein mysteriöser, glitzernder Glücksbringer, durch den\nman in Tera-Raids mehr Tera-Stücke erhält."
    es: "Misterioso amuleto refulgente que puede aumentar\nla cantidad de teralitos obtenidos en teraincursiones."
    ko: "지니고 있으면 테라 레이드배틀에서\n받을 수 있는 테라피스가 늘어나는\n이상하고 반짝이는 부적."
    zh_simp: "拥有它之后，在太晶团体战中\n会获得更多太晶碎块的\n神奇闪光护符。"
    zh_trad: "只要擁有它，在太晶團體戰中\n就能獲得更多太晶碎塊的\n神奇晶亮護符。"
glimmet_crystal:
  names:
    jp_kana: キラーメのけっしょう
    jp_kanji: キラーメのけっしょう
    en: Glimmet Crystal
    fr: Cristal de Germéclat
    it: Cristallo di Glimmet
    de: Lumispross-Kristall
    es: Cristal de Glimmet
    ko: 초롱순의결정
    zh_simp: 晶光芽的结晶
    zh_trad: 晶光芽的結晶
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
go_goggles:
  names:
    jp_kana: ゴーゴーゴーグル
    jp_kanji: ゴーゴーゴーグル
    en: Go-Goggles
    fr: Lunettes Sable
    it: Occhialoni
    de: Wüstenbrille
    es: Gafas Aislantes
    ko: 고고고글
    zh_simp: ＧＯＧＯ护目镜
    zh_trad: ＧＯＧＯ護目鏡
  descriptions:
    jp_kana: "砂漠の　すなあらしから\n目を　守ってくれる\nすてきな　ゴーグル。"
    jp_kanji: "砂漠の　すなあらしから\n目を　守ってくれる\nすてきな　ゴーグル。"
    en: "Nifty goggles to protect eyes from\ndesert sandstorms."
    fr: "Une paire de lunettes bien pratique qui protège\nles yeux en cas de tempête de sable dans le désert."
    it: "Occhiali indispensabili per proteggersi dalle tempeste\ndi sabbia."
    de: "Eine schicke Brille, die deine Augen vor Sandstürmen\nschützt."
    es: "Gafas idóneas para protegerte los ojos de las tormentas\nde arena del desierto."
    ko: "사막의 모래바람으로부터\n눈을 보호해 주는\n근사한 고글."
    zh_simp: "能在沙漠的沙暴中\n保护眼睛的出色护目镜。"
    zh_trad: "能在沙漠的沙暴中\n保護眼睛的出色護目鏡。"
gold_bottle:
  names:
    jp_kana: ゴールドチタンボトル
    jp_kanji: ゴールドチタンボトル
    en: Gold Bottle
    fr: Gourde Titane (Or)
    it: Borraccia oro
    de: Gold-Titanflasche
    es: Termo Dorado
    ko: 골드 티탄 보틀
    zh_simp: 金钛水壶
    zh_trad: 金鈦水壺
  descriptions:
    jp_kana: "やまおとこ　やまガールに　人気の商品。\nチタン素材を　使っているため　塩分を含む\n液体を　保存しても　錆びない。"
    jp_kanji: "やまおとこ　やまガールに　人気の商品。\nチタン素材を　使っているため　塩分を含む\n液体を　保存しても　錆びない。"
    en: "A popular option among hikers. It’s made with titanium,\nso it doesn’t rust even if it’s used to hold drinks with high\nsodium content."
    fr: "Un accessoire populaire auprès des Montagnards et\nMontagnardes. Sa structure en titane lui permet de\ncontenir des liquides riches en sel sans rouiller."
    it: "Articolo popolare tra Montanari e Montanare. Essendo\nrealizzata in titanio placcato, non si arrugginisce\nnemmeno se usata per bevande che contengono sale."
    de: "Diese in der Wanderszene äußerst beliebte Trinkflasche\nbesteht aus Titan und bleibt so selbst bei Aufbewahrung\nsalzhaltiger Getränke rostfrei."
    es: "Popular entre Montañeros. Al estar hecho de titanio,\nno se oxida ni aunque dentro se lleven líquidos con\nalto grado de salinidad."
    ko: "등산가와 등산걸에게 인기 있는 상품.\n티타늄 소재를 사용해서 염분이 있는\n액체를 보관해도 녹이 슬지 않는다."
    zh_simp: "在登山男与登山女孩之间\n很有人气的商品。使用钛制成，\n即使用来装含盐分的液体也不会生锈。"
    zh_trad: "受到登山男和登山女孩歡迎的商品。\n材質為鈦，因此即使存放\n含有鹽分的液體也不會生鏽。"
gold_bottle_cap:
  names:
    jp_kana: きんのおうかん
    jp_kanji: きんのおうかん
    en: Gold Bottle Cap
    fr: Capsule d’Or
    it: Tappo d’oro
    de: Goldkronkorken
    es: Chapa Dorada
    ko: 금색병뚜껑
    zh_simp: 金色王冠
    zh_trad: 金色王冠
  descriptions:
    jp_kana: "金色の　きれいな王冠。\nぎんのおうかんより　珍しい。\n渡すと　よろこぶ人も　いる。"
    jp_kanji: "金色の　きれいな王冠。\nぎんのおうかんより　珍しい。\n渡すと　よろこぶ人も　いる。"
    en: "A lovely gold bottle cap, which is even rarer than a silver\nbottle cap. Certain people are delighted to be given\none of these."
    fr: "Une jolie capsule en or, encore plus rare\nque la Capsule d’Argent.\nCertaines personnes adorent en recevoir."
    it: "Un bel tappo a corona color oro, più raro del\nTappo d’argento. Alcuni lo apprezzano molto."
    de: "Ein hübscher goldener Kronkorken. Er ist noch seltener\nals ein Silberkronkorken. Es gibt Leute, die sich sehr\ndarüber freuen würden, einen zu erhalten."
    es: "Una bonita chapa de color dorado, menos común que\nsu equivalente plateada. Hay gente que las aprecia\nmucho."
    ko: "금색의 아름다운 병뚜껑.\n은색병뚜껑보다 진귀하다.\n받으면 좋아하는 사람도 있다."
    zh_simp: "金色的美丽王冠。\n比银色王冠珍贵。\n有些人收到它会很高兴。"
    zh_trad: "金色的美麗王冠。\n比銀色王冠更珍貴。\n有些人收到它會很高興。"
gold_cup:
  names:
    jp_kana: ゴールドチタンカップ
    jp_kanji: ゴールドチタンカップ
    en: Gold Cup
    fr: Tasse Titane (Or)
    it: Tazza oro
    de: Gold-Titantasse
    es: Taza Dorada
    ko: 골드 티탄 컵
    zh_simp: 金钛水杯
    zh_trad: 金鈦水杯
  descriptions:
    jp_kana: "やまおとこ　やまガールに　人気の商品。\nチタン素材を　使っているため　塩分を含む\n液体を　そそいでも　錆びない。"
    jp_kanji: "やまおとこ　やまガールに　人気の商品。\nチタン素材を　使っているため　塩分を含む\n液体を　そそいでも　錆びない。"
    en: "A popular option among hikers. It’s made with titanium,\nso it doesn’t rust even if it’s used to hold drinks with high\nsodium content."
    fr: "Un accessoire populaire auprès des Montagnards et\nMontagnardes. Sa structure en titane lui permet de\ncontenir des liquides riches en sel sans rouiller."
    it: "Articolo popolare tra Montanari e Montanare. Essendo\nrealizzata in titanio placcato, non si arrugginisce\nnemmeno se usata per bevande che contengono sale."
    de: "Diese in der Wanderszene äußerst beliebte Tasse\nbesteht aus Titan und rostet somit nicht, selbst wenn\nsalzhaltige Getränke eingegossen werden."
    es: "Popular entre Montañeros. Al estar hecha de titanio,\nno se oxida ni aunque se viertan dentro líquidos con\nalto grado de salinidad."
    ko: "등산가와 등산걸에게 인기 있는 상품.\n티타늄 소재를 사용해서 염분이 있는\n액체를 따라도 녹이 슬지 않는다."
    zh_simp: "在登山男与登山女孩之间\n很有人气的商品。使用钛制成，\n即使注入含盐分的液体也不会生锈。"
    zh_trad: "受到登山男和登山女孩歡迎的商品。\n材質為鈦，因此即使注入\n含有鹽分的液體也不會生鏽。"
gold_leaf:
  names:
    jp_kana: きんのはっぱ
    jp_kanji: きんのはっぱ
    en: Gold Leaf
    fr: Feuille Dorée
    it: Fogliadoro
    de: Goldblatt
    es: Hoja de Oro
    ko: 금빛잎사귀
    zh_simp: 金色叶子
    zh_trad: 金色葉子
  descriptions:
    jp_kana: "金色の　不思議な　はっぱ。\nこの　はっぱを　つける　木は\n見つかって　いない。"
    jp_kanji: "金色の　不思議な　はっぱ。\nこの　はっぱを　つける　木は\n見つかって　いない。"
    en: "A mysterious gold leaf. No trees with this leaf have\nbeen found yet."
    fr: "Une feuille dorée mystérieuse. Elle ne semble\nappartenir à aucun arbre connu."
    it: "Una strana foglia dorata. Nessuno sa da che albero\nprovenga."
    de: "Ein rätselhaftes Blatt mit goldener Färbung. Bisher hat\nman noch keinen Baum entdeckt, an dem solche Blätter\nwachsen."
    es: "Extraña hoja de color dorado. Se desconoce de qué\nárbol procede."
    ko: "금빛의 신비한 나뭇잎.\n이 나뭇잎이 자라는 나무는\n아직 발견되지 않았다."
    zh_simp: "神奇的金色叶子。\n至今仍未发现能长出\n这种叶子的树木。"
    zh_trad: "不可思議的金色葉子。\n至今還未發現\n長有這種葉子的樹。"
gold_pick:
  names:
    jp_kana: ゴールドピック
    jp_kanji: ゴールドピック
    en: Gold Pick
    fr: Pique Dorée
    it: Stecchino oro
    de: Gold-Pikser
    es: Palillo Dorado
    ko: 골드 픽
    zh_simp: 金色三明治签
    zh_trad: 金色三明治籤
  descriptions:
    jp_kana: "金色で　高級感　ただよう　ピック。\n刺せば　ゴージャスな　気持ちになり\n苦手な食材も　モリモリ　食べられるはず。"
    jp_kanji: "金色で　高級感　ただよう　ピック。\n刺せば　ゴージャスな　気持ちになり\n苦手な食材も　モリモリ　食べられるはず。"
    en: "A golden pick that oozes class. Using it on a sandwich\nlends an extravagant air that’ll make you want to eat up,\neven if you don’t love the fillings."
    fr: "Une pique dorée pour pique-niqueurs de luxe. Plantée\ndans un Sandwich, elle lui donne un côté somptueux\nqui met en appétit, même si on n’aime pas la garniture."
    it: "Stecchino dorato di alta classe. Dona un tocco di\nsontuosità al panino, invogliando a mangiarlo di gusto\nanche se gli ingredienti non vanno molto a genio."
    de: "Diesen goldenen Pikser umweht ein Hauch von Luxus.\nEr veredelt jedes Sandwich und macht sogar Appetit\nauf Zutaten, die einem normalerweise nicht munden."
    es: "Un palillo de un ostentoso color dorado. Convierte\ncualquier bocadillo en un plato de lujo tan apetecible\nque se come aunque no guste su relleno."
    ko: "금색으로 고급스러움을 드러내는 픽.\n꽂으면 고저스한 느낌이 들어서\n싫어하는 식재료도 잘 먹을 수 있게 된다."
    zh_simp: "充满高档气息的金色签子。\n插了它就能让人感受到奢华的感觉，\n连不喜欢的食材应该也能大口吃下。"
    zh_trad: "散發出高檔氣息的金色小籤。\n插入三明治時會備感尊榮，\n即使是不敢吃的食材應該也能大快朵頤。"
gold_teeth:
  names:
    jp_kana: きんのいれば
    jp_kanji: きんのいれば
    en: Gold Teeth
    fr: Dentier en Or
    it: Denti d’oro
    de: Goldenes Gebiss
    es: Dentadura de Oro
    ko: 금틀니
    zh_simp: 金假牙
    zh_trad: 金假牙
  descriptions:
    jp_kana: "サファリゾーンの　園長が\n落とした　金色の　入れ歯。\n笑うと　とても　まぶしい。"
    jp_kanji: "サファリゾーンの　園長が\n落とした　金色の　入れ歯。\n笑うと　とても　まぶしい。"
    en: "A set of golden false teeth lost by the Safari Zone’s\nwarden. They make his smile sparkle."
    fr: "Un dentier en or perdu par le directeur du Parc Safari.\nIl lui donne un sourire étincelant."
    it: "Dentiera dorata persa dal guardiano della Zona Safari.\nRende il suo sorriso davvero scintillante."
    de: "Ein vergoldeter Zahnersatz, den der Direktor der\nSafari-Zone verlegt hat. Setzt er ihn ein, verleiht er ihm\nbuchstäblich ein goldiges Lächeln."
    es: "Unos dientes de oro que perdió el Guarda de la Zona\nSafari con los que tiene una sonrisa deslumbrante."
    ko: "사파리존의 원장이\n떨어뜨린 금색 틀니.\n웃으면 매우 눈부시다."
    zh_simp: "狩猎地带的园长遗失的金假牙。\n装上它后，笑起来十分耀眼。"
    zh_trad: "狩獵地帶的園長\n遺失的金色假牙。\n裝上它之後笑起來非常耀眼。"
goldeen_candy:
  names:
    jp_kana: トサキントのアメ
    jp_kanji: トサキントのアメ
    en: Goldeen Candy
    fr: Bonbon Poissirène
    it: Caramella Goldeen
    de: Goldini-Bonbon
    es: Caramelo Goldeen
    ko: 콘치의사탕
    zh_simp: 角金鱼的糖果
    zh_trad: 角金魚的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
golden_nanab_berry:
  names:
    jp_kana: きんのナナのみ
    jp_kanji: きんのナナのみ
    en: Golden Nanab Berry
    fr: Baie Nanab dorée
    it: Baccabana dorata
    de: Goldene Nanabbeere
    es: Baya Latano Dorada
    ko: 황금 나나열매
    zh_simp: 金色蕉香果
    zh_trad: 金色蕉香果
  descriptions:
    jp_kana: "ポケモンを　捕まえるときに\nあたえると　かなり落ち着く　きのみ。"
    jp_kanji: "ポケモンを　捕まえるときに\nあたえると　かなり落ち着く　きのみ。"
    en: "A Berry that drastically calms Pokémon you’re trying\nto catch when given to them."
    fr: "Une Baie à donner à un Pokémon sauvage au moment\nde la capture pour le calmer durablement."
    it: "Bacca che calma molto il Pokémon selvatico a cui viene\ndata al momento della cattura."
    de: "Gibst du diese Beere einem Pokémon zu essen,\nwird es während des Fangversuchs viel ruhiger."
    es: "Una baya que puedes lanzar a un Pokémon salvaje\npara tranquilizarlo mucho."
    ko: "포켓몬을 잡을 때 주면\n상당히 얌전해지는 나무열매."
    zh_simp: "捕捉宝可梦时，\n把这树果交给宝可梦\n就能有效地平复对方的情绪。"
    zh_trad: "在捕捉時把這個樹果餵給寶可夢，\n就能讓牠們的情緒大幅穩定下來。"
golden_pinap_berry:
  names:
    jp_kana: きんのパイルのみ
    jp_kanji: きんのパイルのみ
    en: Golden Pinap Berry
    fr: Baie Nanana dorée
    it: Baccananas dorata
    de: Goldene Sananabeere
    es: Baya Pinia Dorada
    ko: 황금 파인열매
    zh_simp: 金色凰梨果
    zh_trad: 金色凰梨果
  descriptions:
    jp_kana: "ポケモンに　あたえると\n捕まえたときに　道具が\nかなり　手にはいりやすくなる　きのみ。"
    jp_kanji: "ポケモンに　あたえると\n捕まえたときに　道具が\nかなり　手にはいりやすくなる　きのみ。"
    en: "A Berry that makes you drastically more likely to get\nan item when given to Pokémon you’re trying to catch."
    fr: "Une Baie à donner à un Pokémon sauvage pour avoir\nbeaucoup plus de chances d’obtenir un objet après\nl’avoir capturé."
    it: "Bacca che rende molto più facile ottenere strumenti\nquando catturi il Pokémon a cui l’hai data."
    de: "Gibst du diese Beere einem Pokémon zu essen, wird die\nChance, bei einem erfolgreichen Fangversuch ein Item\nzu erhalten, stark erhöht."
    es: "Una baya que puedes lanzar a un Pokémon salvaje\npara aumentar mucho las probabilidades de conseguir\nun objeto tras capturarlo."
    ko: "포켓몬에게 주면\n잡았을 때 도구를 손에 넣기\n상당히 쉬워지는 나무열매."
    zh_simp: "如果把这树果交给宝可梦，\n那么接下来捉住该宝可梦时，\n会非常容易获得道具。"
    zh_trad: "把這個樹果餵給寶可夢，\n在捕捉成功後，\n會非常容易獲得道具。"
golden_razz_berry:
  names:
    jp_kana: きんのズリのみ
    jp_kanji: きんのズリのみ
    en: Golden Razz Berry
    fr: Baie Framby dorée
    it: Baccalampon dorata
    de: Goldene Himmihbeere
    es: Baya Frambu Dorada
    ko: 황금 라즈열매
    zh_simp: 金色蔓莓果
    zh_trad: 金色蔓莓果
  descriptions:
    jp_kana: "ポケモンに　あたえると\nかなり　捕まえやすくなる　きのみ。"
    jp_kanji: "ポケモンに　あたえると\nかなり　捕まえやすくなる　きのみ。"
    en: "A Berry that makes it drastically easier to catch Pokémon\nwhen given to them."
    fr: "Une Baie à donner à un Pokémon sauvage pour pouvoir\nl’attraper beaucoup plus facilement."
    it: "Bacca che facilita di molto la cattura del Pokémon\nselvatico a cui viene data."
    de: "Gibst du diese Beere einem Pokémon zu essen,\nlässt es sich viel leichter fangen."
    es: "Una baya que puedes lanzar a un Pokémon salvaje\npara que resulte mucho más fácil capturarlo."
    ko: "포켓몬에게 주면\n상당히 잡기 쉬워지는 나무열매."
    zh_simp: "把这树果交给宝可梦后，\n宝可梦就会变得十分容易捕捉。"
    zh_trad: "把這個樹果餵給寶可夢，\n就能讓牠們變得十分容易捕捉。"
golett_shard:
  names:
    jp_kana: ゴビットのかけら
    jp_kanji: ゴビットのかけら
    en: Golett Shard
    fr: Fragment de Gringolem
    it: Frammento di Golett
    de: Golbit-Splitter
    es: Fragmento de Golett
    ko: 골비람의조각
    zh_simp: 泥偶小人的碎片
    zh_trad: 泥偶小人的碎片
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
good_rod:
  names:
    jp_kana: いいつりざお
    jp_kanji: いいつりざお
    en: Good Rod
    fr: Super Canne
    it: Canna da pesca buona
    de: Profiangel
    es: Caña Buena
    ko: 좋은낚싯대
    zh_simp: 好钓竿
    zh_trad: 好釣竿
  descriptions:
    jp_kana: "あたらしくて　いい　つりざお。\n水の　ある　場所で　使うと\nポケモンが　つれる。"
    jp_kanji: "あたらしくて　いい　つりざお。\n水の　ある　場所で　使うと\nポケモンが　つれる。"
    en: "A new, good-quality fishing rod. Use it at bodies of\nwater to fish for Pokémon."
    fr: "Une canne neuve et de bonne qualité.\nUtilisez-la pour pêcher des Pokémon sauvages\ndans les points d’eau."
    it: "Canna da pesca nuova e di qualità. Si usa per pescare\nPokémon selvatici in qualsiasi specchio d’acqua."
    de: "Eine recht gute Angel. Damit kannst du in jedem\nGewässer nach Pokémon angeln."
    es: "Caña de pescar nuevecita y de gran calidad. Pesca\nPokémon salvajes en todo tipo de aguas."
    ko: "새로 나온 좋은 낚싯대.\n물이 있는 장소에서 사용하면\n포켓몬을 낚을 수 있다."
    zh_simp: "不错的新钓竿。\n在有水的地方使用的话，\n可以钓到宝可梦。"
    zh_trad: "不錯的新釣竿。\n在有水的地方使用的話，\n可以釣到寶可夢。"
gooey_mulch:
  names:
    jp_kana: ねばねばこやし
    jp_kanji: ねばねばこやし
    en: Gooey Mulch
    fr: Fertiglu
    it: Fertilcolla
    de: Neumulch
    es: Abono Brote
    ko: 끈적끈적비료
    zh_simp: 粘粘肥
    zh_trad: 黏黏肥
  descriptions:
    jp_kana: "きのみを　育てるときの　肥料。\nしかし　ホウエン地方の　土には\nまるで　なじまないので　効果が　ない。"
    jp_kanji: "きのみを　育てるときの　肥料。\nしかし　ホウエン地方の　土には\nまるで　なじまないので　効果が　ない。"
    en: "A fertilizer for growing Berries. However, it appears\nto be unsuitable for the soil in the Hoenn region and\nhas no effect."
    fr: "Un engrais à utiliser sur un sol meuble.\nIl n’est cependant pas adapté aux terres de Hoenn\net n’y a aucun effet."
    it: "Fertilizzante usato per coltivare le bacche. Tuttavia,\nnon ha effetto a Hoenn, perché non è adatto al terreno\ndella regione."
    de: "Mulch zur Nutzung auf Beerenfeldern. Durch seine\nUnverträglichkeit mit den Böden in Hoenn bleibt sein\nEinsatz dort ohne Wirkung."
    es: "Un fertilizante usado para el cultivo de bayas. Parece\nque no se asienta bien en el suelo de Hoenn, por lo\nque no tiene efecto en esta región."
    ko: "나무열매를 키울 때 사용하는 비료.\n그러나 호연지방의 흙에는\n전혀 맞지 않기에 효과가 없다."
    zh_simp: "培育树果时的肥料。\n但完全不适合丰缘地区的土壤，\n所以没什么效果。"
    zh_trad: "培育樹果時的肥料。\n但完全不適合豐緣地區的土壤，\n所以沒什麼效果。"
goomy_goo:
  names:
    jp_kana: ヌメラのねんえき
    jp_kanji: ヌメラのねんえき
    en: Goomy Goo
    fr: Mucus de Mucuscule
    it: Bava di Goomy
    de: Viscora-Schleim
