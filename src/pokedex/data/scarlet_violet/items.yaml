    es: Flecha Venenosa
    ko: 독바늘
    zh_simp: 毒针
    zh_trad: 毒針
  descriptions:
    jp_kana: "どくのある　ちいさな　ハリ。\n持たせると　どくタイプの\n技の威力が　あがる。"
    jp_kanji: "どくのある　ちいさな　ハリ。\n持たせると　どくタイプの\n技の威力が　あがる。"
    en: "An item to be held by a Pokémon. This small poisonous\nbarb boosts the power of the holder’s Poison-type\nmoves."
    fr: "Objet à tenir. Un petit pic empoisonné qui augmente\nla puissance des capacités de type Poison."
    it: "Strumento da dare a un Pokémon. Aculeo piccolo\ne tossico che potenzia le mosse di tipo Veleno."
    de: "Ein Item zum Tragen. Ein schmaler und giftiger\nWiderhaken, der Attacken vom Typ Gift verstärkt."
    es: "Pequeña flecha venenosa que potencia los movimientos\nde tipo Veneno. Debe llevarla un Pokémon."
    ko: "독이 있는 작은 침.\n지니게 하면 독타입\n기술의 위력이 올라간다."
    zh_simp: "有毒的小针。\n携带后，毒属性的\n招式威力就会提高。"
    zh_trad: "有毒的小針。\n攜帶後，毒屬性的\n招式威力就會提高。"
poison_gem:
  names:
    jp_kana: どくのジュエル
    jp_kanji: どくのジュエル
    en: Poison Gem
    fr: Joyau Poison
    it: Bijouveleno
    de: Giftjuwel
    es: Gema Veneno
    ko: 독주얼
    zh_simp: 毒之宝石
    zh_trad: 毒之寶石
  descriptions:
    jp_kana: "どくのタイプの　ジュエル。\n持たせると　１度だけ　どくの\n技の威力が　強まる。"
    jp_kanji: "どくのタイプの　ジュエル。\n持たせると　１度だけ　どくの\n技の威力が　強まる。"
    en: "An item to be held by a Pokémon. This gem is imbued\nwith the essence of poison and will boost the power of\na Poison-type move—but only once."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Poison."
    it: "Strumento da dare a un Pokémon. Gioiello che potenzia\nuna sola volta le mosse di tipo Veleno."
    de: "Ein Item zum Tragen. Dieses Juwel verstärkt einmalig\neine Attacke vom Typ Gift."
    es: "Joya de un solo uso que potencia un movimiento de\ntipo Veneno. Debe llevarla un Pokémon."
    ko: "독타입의 주얼.\n지니게 하면 한 번만 독\n기술의 위력이 강해진다."
    zh_simp: "毒属性的宝石。\n携带后，毒属性的\n招式威力仅会增强１次。"
    zh_trad: "毒屬性的寶石。\n攜帶後，毒屬性招式的\n威力會僅增強１次。"
poison_memory:
  names:
    jp_kana: ポイズンメモリ
    jp_kanji: ポイズンメモリ
    en: Poison Memory
    fr: ROM Poison
    it: ROM Veleno
    de: Gift-Disc
    es: Disco Veneno
    ko: 포이즌메모리
    zh_simp: 毒存储碟
    zh_trad: 毒記憶碟
  descriptions:
    jp_kana: "どくタイプの　データが　入った\nメモリ。　特定のポケモンが　持つと\nタイプが　変わる。"
    jp_kanji: "どくタイプの　データが　入った\nメモリ。　特定のポケモンが　持つと\nタイプが　変わる。"
    en: "A memory disc that contains Poison-type data.\nIt changes the type of the holder if held by\na certain species of Pokémon."
    fr: "Une carte mémoire contenant des données sur\nle type Poison. Un certain Pokémon peut changer\nde type en l’équipant."
    it: "ROM contenente dati sul tipo Veleno in formato\ndigitale. Permette a un certo Pokémon di cambiare tipo."
    de: "Eine Disc mit Daten zum Typ Gift. Sie löst bei einem\nbestimmten Pokémon einen Typenwechsel aus."
    es: "Disco de datos que contiene información relativa al tipo\nVeneno. Permite cambiar de tipo a cierto Pokémon."
    ko: "독타입의 데이터가 들어 있는\n메모리. 특정 포켓몬이\n지니면 타입이 바뀐다."
    zh_simp: "装有毒属性数据的存储碟。\n特定宝可梦携带后，\n属性就会发生变化。"
    zh_trad: "裝有毒屬性資料的記憶碟。\n特定寶可夢攜帶後，\n就會產生屬性的變化。"
poison_tera_shard:
  names:
    jp_kana: テラピースどく
    jp_kanji: テラピースどく
    en: Poison Tera Shard
    fr: Téra-Éclat Poison
    it: Teralite Veleno
    de: Tera-Stück (Gift)
    es: Teralito Veneno
    ko: 테라피스 독
    zh_simp: 毒太晶碎块
    zh_trad: 毒太晶碎塊
  descriptions:
    jp_kana: "テラスタルポケモンが　倒れたとき\n砕けた　テラスタルジュエルが\nまれに　結晶化したもの。"
    jp_kanji: "テラスタルポケモンが　倒れたとき\n砕けた　テラスタルジュエルが\nまれに　結晶化したもの。"
    en: "On rare occasions, these shards form when a Tera\nPokémon falls in battle and its Tera Jewel shatters."
    fr: "Un fragment cristallisé qui se forme rarement lors\nde l’éclatement d’un Joyau Téracristal après qu’un\nPokémon Téracristal a été mis K.O."
    it: "Cristallizzazione che raramente si forma quando\nun Pokémon Teracristal viene sconfitto e la sua gemma\nTeracristal va in frantumi."
    de: "In äußerst seltenen Fällen kristallisieren Bruchstücke\ndes Terakristalls von im Kampf besiegten Terakristall-\nPokémon zu solchen Tera-Stücken."
    es: "Esquirla que se forma muy raramente cuando la joya\nTeracristal de un Pokémon teracristalizado se quiebra\ntras derrotarlo."
    ko: "테라스탈 포켓몬이 쓰러졌을 때\n부서진 테라스탈 주얼이\n드물게 결정화한 조각."
    zh_simp: "打倒太晶宝可梦时，\n破碎掉的太晶宝石有\n极低概率会结晶成此物。"
    zh_trad: "太晶寶可夢倒下時，\n碎裂的太晶寶石在罕見的情況下\n會結晶化，而形成此物。"
poisonium_z:bag:
  names:
    jp_kana: ドクＺ
    jp_kanji: ドクＺ
    en: Poisonium Z
    fr: Toxizélite
    it: Venenium Z
    de: Toxium Z
    es: Toxistal Z
    ko: 독Z
    zh_simp: 毒Ｚ
    zh_trad: 毒Ｚ
  descriptions:
    jp_kana: "どくタイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    jp_kanji: "どくタイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nPoison-type moves to Poison-type Z-Moves."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise son porteur à transformer ses capacités\nde type Poison en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono ai Pokémon di trasformare le mosse\ndi tipo Veleno in mosse Z."
    de: "Kristallisierte Z-Kraft, die Gift-Attacken zu Z-Attacken\naufstuft. Wird bei Bedarf automatisch vervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a los\nportadores convertir sus movimientos de tipo Veneno\nen movimientos Z."
    ko: "독타입 기술을\nZ기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将毒属性招式升级成\nＺ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把毒屬性招式\n升級為Ｚ招式的Ｚ力量結晶。"
poisonium_z:held:
  names:
    jp_kana: ドクＺ
    jp_kanji: ドクＺ
    en: Poisonium Z
    fr: Toxizélite
    it: Venenium Z
    de: Toxium Z
    es: Toxistal Z
    ko: 독Z
    zh_simp: 毒Ｚ
    zh_trad: 毒Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　結晶。\nどくタイプの　技を\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nどくタイプの　技を\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Poison-type moves to Z-Moves."
    fr: "Une cristallisation de la Force Z, permettant\nde transformer les capacités de type Poison\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare le mosse di tipo Veleno\nin mosse Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft\nGift-Attacken zu Z-Attacken auf."
    es: "Cristal que confiere el Poder Z a los movimientos\nde tipo Veneno."
    ko: "Z파워의 결정.\n독타입 기술을\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将毒属性的招式\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把毒屬性的招式\n升級為Ｚ招式。"
poke_ball:
  names:
    jp_kana: モンスターボール
    jp_kanji: モンスターボール
    en: Poké Ball
    fr: Poké Ball
    it: Poké Ball
    de: Pokéball
    es: Poké Ball
    ko: 몬스터볼
    zh_simp: 精灵球
    zh_trad: 精靈球
  descriptions:
    jp_kana: "野生のポケモンに　投げて\n捕まえるための　ボール。\nカプセル式に　なっている。"
    jp_kanji: "野生のポケモンに　投げて\n捕まえるための　ボール。\nカプセル式に　なっている。"
    en: "A device for catching wild Pokémon. It’s thrown like\na ball at a Pokémon, comfortably encapsulating\nits target."
    fr: "Un objet semblable à une capsule, qui capture\nles Pokémon sauvages. Il suffit pour cela de le lancer\ncomme une balle."
    it: "Strumento dotato di capsula usato per catturare\nPokémon selvatici. Si lancia contro il bersaglio\ncome una palla."
    de: "Damit fängst du wilde Pokémon. Du wirfst ihn wie einen\nnormalen Ball. Das Design ähnelt dem einer Kapsel."
    es: "Dispositivo con diseño capsular que captura Pokémon\nsalvajes. Se lanza como una bola contra el blanco."
    ko: "야생 포켓몬에게 던져서\n잡기 위한 볼.\n캡슐식으로 되어 있다."
    zh_simp: "用于投向野生宝可梦\n并将其捕捉的球。\n它是胶囊样式的。"
    zh_trad: "用於投向野生寶可夢\n並將其捕捉的球。\n它是膠囊樣式的。"
poke_ball:key_item:
  names:
    jp_kana: モンスターボール
    jp_kanji: モンスターボール
    en: Poké Ball
    fr: Poké Ball
    it: Poké Ball
    de: Pokéball
    es: Poké Ball
    ko: 몬스터볼
    zh_simp: 精灵球
    zh_trad: 精靈球
  descriptions:
    jp_kana: "ー\nー\nー"
    jp_kanji: "ー\nー\nー"
    en: "-\n-\n-"
    fr: "-\n-\n-"
    it: "-\n-\n-"
    de: ー
    es: "-\n-\n-"
    ko: "-\n-\n-"
    zh_simp: "ー\nー\nー"
    zh_trad: "ー\nー\nー"
poke_ball:legends:
  names:
    jp_kana: モンスターボール
    jp_kanji: モンスターボール
    en: Poké Ball
    fr: Poké Ball
    it: Poké Ball
    de: Pokéball
    es: Poké Ball
    ko: 몬스터볼
    zh_simp: 精灵球
    zh_trad: 精靈球
  descriptions:
    jp_kana: "野生のポケモンに投げて\n捕まえるための不思議なボール。\n材料を集めてクラフトでつくる。"
    jp_kanji: "野生のポケモンに投げて\n捕まえるための不思議なボール。\n材料を集めてクラフトでつくる。"
    en: "A mysterious ball that can be thrown at wild Pokémon\nin order to catch them. These balls can be crafted by\nhand if you gather the necessary materials."
    fr: "Une étrange balle qui peut être lancée sur les Pokémon\nsauvages afin de les capturer. On peut la confectionner\nà partir de diverses ressources."
    it: "Speciale strumento da lanciare come una palla, usato\nper catturare Pokémon selvatici. Viene creata a mano\nuna volta raccolti tutti i materiali necessari."
    de: "Ein rätselhafter Ball, den man auf wilde Pokémon wirft,\num sie zu fangen. Wenn man die nötigen Materialien\nsammelt, kann man ihn selbst herstellen."
    es: "Misterioso instrumento con forma de bola que se lanza\na un Pokémon salvaje para capturarlo. Puede elaborarse\nmanualmente si se reúnen los materiales necesarios."
    ko: "야생 포켓몬에게 던지면\n잡을 수 있는 신비한 볼.\n재료를 모아 공작으로 만든다."
    zh_simp: "不可思议的球。用于投向野生\n宝可梦并将其捕捉。需收集材料\n并通过工艺制作来生产。"
    zh_trad: "不可思議的球。用於投向野生\n寶可夢並將其捕捉。需收集材料\n並透過工藝製作來生產。"
poke_ball:recipe:
  names:
    jp_kana: モンスターボール
    jp_kanji: モンスターボール
    en: Poké Ball
    fr: Poké Ball
    it: Poké Ball
    de: Pokéball
    es: Poké Ball
    ko: 몬스터볼
    zh_simp: 精灵球
    zh_trad: 精靈球
  descriptions:
    jp_kana: "モンスターボールのレシピ。　材料は\nぼんぐりのみ×１　たまいし×１"
    jp_kanji: "モンスターボールのレシピ。　材料は\nぼんぐりのみ×１　たまいし×１"
    en: "A recipe for crafting Poké Balls from scratch.\nRequired materials: 1 Apricorn and 1 Tumblestone."
    fr: "Méthode pour Poké Ball. Ressources requises :\n1 Noigrume et 1 Galet."
    it: "Ricetta per creare una Poké Ball. I materiali necessari\nsono 1 Bacca ghicocca e 1 Ciottolo."
    de: "Die Anleitung zur Herstellung eines Pokéballs.\nBenötigte Materialien: 1 Aprikoko und 1 Glanzstein."
    es: "Receta para crear Poké Balls. Materiales:\n1 Bonguri y 1 Guijarro Rojo."
    ko: "몬스터볼의 레시피.\n재료: 규토리열매×1 옥돌×1"
    zh_simp: "精灵球的材料单。材料是：\n球果果×１　玉石×１"
    zh_trad: "精靈球的材料單。材料是：\n球果果×１　玉石×１"
poke_doll:
  names:
    jp_kana: ピッピにんぎょう
    jp_kanji: ピッピにんぎょう
    en: Poké Doll
    fr: Poké Poupée
    it: Pokébambola
    de: Poképuppe
    es: Pokémuñeco
    ko: 삐삐인형
    zh_simp: 皮皮玩偶
    zh_trad: 皮皮玩偶
  descriptions:
    jp_kana: "ポケモンの　気をひかせる　道具。\n野生ポケモンとの　戦闘から\n絶対に　逃げられる。"
    jp_kanji: "ポケモンの　気をひかせる　道具。\n野生ポケモンとの　戦闘から\n絶対に　逃げられる。"
    en: "A doll that attracts the attention of Pokémon.\nIt guarantees escape from any battle with wild Pokémon."
    fr: "Une poupée qui détourne l’attention d’un Pokémon.\nElle permet de s’enfuir d’un combat contre un Pokémon\nsauvage à coup sûr."
    it: "Strumento che attrae i Pokémon. Permette di fuggire\nimmancabilmente dalla lotta con un Pokémon selvatico."
    de: "Ein Item, das wilde Pokémon vom Kampfgeschehen\nablenkt und garantiert die Flucht ermöglicht."
    es: "Un muñeco que atrae la atención de los Pokémon.\nEs útil para huir de un combate contra un Pokémon\nsalvaje."
    ko: "포켓몬의 관심을 끄는 도구.\n야생 포켓몬과의 배틀에서\n반드시 도망칠 수 있다."
    zh_simp: "能吸引宝可梦注意的道具。\n在和野生宝可梦的\n战斗中绝对可以逃走。"
    zh_trad: "能吸引寶可夢注意的道具。\n在和野生寶可夢的\n戰鬥中絕對可以逃走。"
poke_flute:
  names:
    jp_kana: ポケモンのふえ
    jp_kanji: ポケモンのふえ
    en: Poké Flute
    fr: Poké Flûte
    it: Pokéflauto
    de: Pokéflöte
    es: Pokéflauta
    ko: 포켓몬피리
    zh_simp: 宝可梦之笛
    zh_trad: 寶可夢之笛
  descriptions:
    jp_kana: "眠っている　ポケモンも\n思わず　めざめるほど　すばらしい\n音色を　奏でる　ふえ。"
    jp_kanji: "眠っている　ポケモンも\n思わず　めざめるほど　すばらしい\n音色を　奏でる　ふえ。"
    en: "A flute that can play with such a beautiful tone that\neven sleeping Pokémon find themselves woken up."
    fr: "Une flûte au son si particulier qu’elle permet de réveiller\nles Pokémon les plus profondément endormis."
    it: "Flauto dal suono meraviglioso che risveglia anche\ni Pokémon profondamente addormentati."
    de: "Eine Flöte, die so wundervolle Töne spielen kann,\ndass selbst schlafende Pokémon aufwachen."
    es: "Una flauta con un timbre tan dulce y hermoso que\ndespierta hasta al Pokémon más profundamente\ndormido."
    ko: "잠자고 있는 포켓몬도\n무심코 잠에서 깨어날 정도로\n멋진 음색을 내는 피리."
    zh_simp: "能吹出让睡着的宝可梦\n都会情不自禁醒来的\n美妙音色的笛子。"
    zh_trad: "能吹出讓睡著的寶可夢\n都會情不自禁醒來的\n美妙音色的笛子。"
poke_radar:
  names:
    jp_kana: ポケトレ
    jp_kanji: ポケトレ
    en: Poké Radar
    fr: Poké Radar
    it: Poké Radar
    de: Pokéradar
    es: Poké Radar
    ko: 포켓트레
    zh_simp: 宝可追踪
    zh_trad: 寶可追蹤
  descriptions:
    jp_kana: "くさむらに　隠れている　ポケモンを\n探しだせる　道具。\n歩くと　電池が　たまる。"
    jp_kanji: "くさむらに　隠れている　ポケモンを\n探しだせる　道具。\n歩くと　電池が　たまる。"
    en: "A tool that can search out Pokémon that are hiding\nin the tall grass. Its battery is recharged as you walk."
    fr: "Un objet permettant de trouver les Pokémon\nqui se cachent dans les hautes herbes.\nSe recharge quand on marche."
    it: "Strumento con cui individuare i Pokémon nascosti\nnell’erba. La batteria si ricarica mentre cammini."
    de: "Spürt Pokémon im hohen Gras auf. Die Batterie wird\nbeim Reisen aufgeladen."
    es: "Busca Pokémon que se esconden en la hierba alta.\nLa batería se recarga al caminar."
    ko: "풀밭에 숨어 있는 포켓몬을\n찾아내는 도구.\n걸으면 전지가 충전된다."
    zh_simp: "能够将藏在草丛里的\n宝可梦找出来的道具。\n走路就能给电池充电。"
    zh_trad: "能夠將藏在草叢裡的\n寶可夢找出來的道具。\n走路就能給電池充電。"
poke_toy:
  names:
    jp_kana: ポケじゃらし
    jp_kanji: ポケじゃらし
    en: Poké Toy
    fr: Poké Plumet
    it: Pokégingillo
    de: Pokéwedel
    es: Pokéseñuelo
    ko: 포켓풀
    zh_simp: 宝可尾草
    zh_trad: 寶可尾草
  descriptions:
    jp_kana: "ポケモンの気を　ひかせる　道具。\n野生ポケモンとの　戦闘から\n絶対に　逃げられる。"
    jp_kanji: "ポケモンの気を　ひかせる　道具。\n野生ポケモンとの　戦闘から\n絶対に　逃げられる。"
    en: "A toy that attracts the attention of Pokémon.\nIt guarantees escape from any battle with wild Pokémon."
    fr: "Un objet qui attire les Pokémon.\nPermet de s’enfuir d’un combat contre\nun Pokémon sauvage."
    it: "Strumento che attrae i Pokémon. È utile per fuggire\ndalla lotta con Pokémon selvatici."
    de: "Ein Item, das wilde Pokémon vom Kampfgeschehen\nablenkt und garantiert die Flucht ermöglicht."
    es: "Un objeto que atrae la atención de los Pokémon. Es útil\npara huir de un combate contra un Pokémon salvaje."
    ko: "포켓몬의 관심을 끄는 도구.\n야생 포켓몬과의 배틀에서\n반드시 도망칠 수 있다."
    zh_simp: "能吸引宝可梦注意的道具。\n在和野生宝可梦的\n战斗中绝对可以逃走。"
    zh_trad: "能吸引寶可夢注意的道具。\n在和野生寶可夢的\n戰鬥中絕對可以逃走。"
pokeblock_kit:
  names:
    jp_kana: ポロックキット
    jp_kanji: ポロックキット
    en: Pokéblock Kit
    fr: Kit Pokébloc
    it: Kit Pokémelle
    de: Pokériegel-Set
    es: Kit de Pokécubos
    ko: 포켓몬스낵키트
    zh_simp: 宝可方块套装
    zh_trad: 寶可方塊組合
  descriptions:
    jp_kana: "きのみから　ポロックを　作る\nきのみブレンダーと　できたポロックを\n保存する　ポロックケースの　セット。"
    jp_kanji: "きのみから　ポロックを　作る\nきのみブレンダーと　できたポロックを\n保存する　ポロックケースの　セット。"
    en: "A set containing a Berry Blender for making\nPokéblocks and a Pokéblock Case for\nstoring Pokéblocks."
    fr: "Une boîte pour ranger le Mixeur à Baies\net les Pokéblocs."
    it: "Kit composto da un Mixer bacche, usato per preparare\nle Pokémelle, e da un Portapokémelle, usato per\nconservarle."
    de: "Ein Set, das aus einem Beerenmixer für die Herstellung\nvon Pokériegeln und einer Pokériegelbox für deren\nLagerung besteht."
    es: "Kit consistente en una Licuabayas para preparar\nPokécubos a partir de bayas y un Tubo Pokécubos para\nguardarlos."
    ko: "나무열매로 포켓몬스낵을 만드는\n나무열매블렌더와 만들어진 포켓몬스낵을\n저장하는 포켓몬스낵케이스 세트."
    zh_simp: "这是树果混合器和宝可方块盒的套装。\n树果混合器可利用树果制作宝可方块，\n而做好的宝可方块可用宝可方块盒来保存。"
    zh_trad: "可由樹果製作寶可方塊的樹果混合器\n與存放用的寶可方塊盒之套裝。"
pokedex:
  names:
    jp_kana: ポケモンずかん
    jp_kanji: ポケモンずかん
    en: Pokédex
    fr: Pokédex
    it: Pokédex
    de: Pokédex
    es: Pokédex
    ko: 포켓몬 도감
    zh_simp: 宝可梦图鉴
    zh_trad: 寶可夢圖鑑
  descriptions:
    jp_kana: "ポケモンの調査結果をまとめた冊子。\n新しいポケモンを報告するたびに\nラベン博士がページを増やしていく。"
    jp_kanji: "ポケモンの調査結果をまとめた冊子。\n新しいポケモンを報告するたびに\nラベン博士がページを増やしていく。"
    en: "A volume for compiling the collected results of much\nPokémon research. Professor Laventon continually adds\nto it with each report made on new Pokémon species."
    fr: "Un livre compilant tous les résultats des recherches sur\nles Pokémon. À chaque nouveau Pokémon découvert,\nle Professeur Lavande ajoute les pages correspondantes."
    it: "Libriccino che raccoglie gli esiti delle ricerche sui\nPokémon. Ogni volta che vengono avvistati nuovi\nPokémon, il Professor Laven aggiunge nuove pagine."
    de: "In diesem Buch werden die Forschungsergebnisse zu\nPokémon festgehalten. Wenn du Professor Laven von\nneuen Pokémon berichtest, fügt er weitere Seiten hinzu."
    es: "Tomo en el que se recoge información variopinta acerca\nde los Pokémon. El Profesor Lavender añade nuevas\npáginas a medida que se descubren nuevas especies."
    ko: "포켓몬의 조사 결과가 정리된 책자.\n새로운 포켓몬을 보고할 때마다\n라벤박사가 페이지를 늘려 준다."
    zh_simp: "汇整了宝可梦调查结果的簿子。\n每当向拉苯博士报告了新的宝可梦，\n他就会在这里增加新的页面。"
    zh_trad: "彙整了寶可夢調查結果的簿子。\n每當向拉苯博士報告了新的寶可夢，\n他就會在這裡增加新的頁面。"
pokemon_box_link:
  names:
    jp_kana: ポケモンボックス
    jp_kanji: ポケモンボックス
    en: Pokémon Box Link
    fr: Boîte Pokémon
    it: Box Pokémon
    de: Pokémon-Box
    es: Caja de Pokémon
    ko: 포켓몬 박스
    zh_simp: 宝可梦盒
    zh_trad: 寶可夢盒
  descriptions:
    jp_kana: "いつでも　ポケモンセンターの\nパソコンの　ボックスに　アクセスして\nポケモンを　預けたり　引きだせる。"
    jp_kanji: "いつでも　ポケモンセンターの\nパソコンの　ボックスに　アクセスして\nポケモンを　預けたり　引きだせる。"
    en: "A device that allows you to access the Pokémon storage\nsystem. There are some places where it won’t work."
    fr: "Permet d’accéder aux Boîtes PC du Centre Pokémon\nà tout moment pour y déposer ou en retirer\ndes Pokémon."
    it: "Permette di accedere in qualsiasi momento ai box\ndel PC del Centro Pokémon per depositare o ritirare\ni Pokémon."
    de: "Ermöglicht jederzeit Zugriff auf die PC-Boxen im\nPokémon-Center, um Pokémon abzulegen oder\nins Team aufzunehmen."
    es: "Permite acceder en todo momento a las Cajas del PC\nde los Centros Pokémon para dejar o sacar Pokémon."
    ko: "언제든지 포켓몬센터에 있는\nPC의 박스에 접속해서\n포켓몬을 맡기거나 데려올 수 있다."
    zh_simp: "可以随时访问\n宝可梦中心电脑里的盒子，\n来寄放或领回需要的宝可梦。"
    zh_trad: "能隨時連線到\n寶可夢中心電腦裡的盒子，\n寄放或領出寶可夢。"
pokemon_box_link:lets_go:
  names:
    jp_kana: ポケモンボックス
    jp_kanji: ポケモンボックス
    en: Pokémon Box Link
    fr: Boîte Pokémon
    it: Box Pokémon
    de: Pokémon-Box
    es: Caja de Pokémon
    ko: 포켓몬 박스
    zh_simp: 宝可梦盒
    zh_trad: 寶可夢盒
  descriptions:
    jp_kana: "ー\nー\nー"
    jp_kanji: "ー\nー\nー"
    en: "-\n-\n-"
    fr: "-\n-\n-"
    it: "-\n-\n-"
    de: ー
    es: "-\n-\n-"
    ko: "-\n-\n-"
    zh_simp: "ー\nー\nー"
    zh_trad: "ー\nー\nー"
pokeshi_doll:
  names:
    jp_kana: ポケモンこけし
    jp_kanji: ポケモンこけし
    en: Pokéshi Doll
    fr: Poupée Pokéshi
    it: Pokékokeshi
    de: Pokémon-Kokeshi
    es: Pokémuñeca
    ko: 포켓몬목각인형
    zh_simp: 宝可梦木娃娃
    zh_trad: 寶可夢木娃娃
  descriptions:
    jp_kana: "ポケモンをかたどった木製のおもちゃ。\n雑貨屋で売れる。"
    jp_kanji: "ポケモンをかたどった木製のおもちゃ。\n雑貨屋で売れる。"
    en: "A wooden toy carved in the image of a Pokémon. It can\nbe sold to the general store."
    fr: "Un jouet en bois aux traits de Pokémon qui peut être\nvendu à la Boutique."
    it: "Giocattolo di legno a forma di Pokémon.\nSi può vendere all’Emporio."
    de: "Ein Holzspielzeug in der Form eines Pokémon.\nEs kann verkauft werden."
    es: "Juguete de madera tallado con forma de Pokémon.\nSe puede vender en el bazar."
    ko: "포켓몬을 본뜬 목제 장난감.\n잡화점에 팔 수 있다."
    zh_simp: "宝可梦造型的木制玩具。\n可以在杂货店出售。"
    zh_trad: "寶可夢造型的木製玩具。\n可以在雜貨店出售。"
pokeshi_doll:recipe:
  names:
    jp_kana: ポケモンこけし
    jp_kanji: ポケモンこけし
    en: Pokéshi Doll
    fr: Poupée Pokéshi
    it: Pokékokeshi
    de: Pokémon-Kokeshi
    es: Pokémuñeca
    ko: 포켓몬목각인형
    zh_simp: 宝可梦木娃娃
    zh_trad: 寶可夢木娃娃
  descriptions:
    jp_kana: "ポケモンこけしのレシピ。　材料は\nもくざい×３"
    jp_kanji: "ポケモンこけしのレシピ。　材料は\nもくざい×３"
    en: "A recipe for crafting Pokéshi Dolls from scratch.\nRequired materials: 3 logs of Wood."
    fr: "Méthode pour Poupée Pokéshi. Ressources requises :\n3 morceaux de Bois."
    it: "Ricetta per creare una Pokékokeshi. I materiali necessari\nsono 3 pezzi di Legno."
    de: "Die Anleitung zur Herstellung einer Pokémon-Kokeshi.\nBenötigte Materialien: 3 Stück Holz."
    es: "Receta para crear Pokémuñecas. Materiales:\n3 leños de Madera."
    ko: "포켓몬목각인형의 레시피.\n재료: 목재×3"
    zh_simp: "宝可梦木娃娃的材料单。 材料是：\n木材×３"
    zh_trad: "寶可夢木娃娃的材料單。材料是：\n木材×３"
polished_mud_ball:
  names:
    jp_kana: ピカピカだんご
    jp_kanji: ピカピカだんご
    en: Polished Mud Ball
    fr: Boulette de Boue
    it: Pallina di fango
    de: Glanzkugel
    es: Bola de Arcilla
    ko: 반짝반짝경단
    zh_simp: 光滑泥球
    zh_trad: 光滑泥球
  descriptions:
    jp_kana: "時間を　かけて　磨きあげた\n表面が　ツルツルに　光る\n泥で　できた　団子。"
    jp_kanji: "時間を　かけて　磨きあげた\n表面が　ツルツルに　光る\n泥で　できた　団子。"
    en: "A ball made of mud. It had been polished for such\na long time that the surface is very shiny."
    fr: "Une boulette de boue si bien polie qu’elle brille\nde mille feux."
    it: "Una pallina di fango levigata con cura, tanto che\nla sua superficie è liscia e lucida."
    de: "Eine Kugel aus Schlamm, die so lange Zeit poliert\nwurde, dass ihre Oberfläche nun leuchtend glänzt."
    es: "Bola de arcilla que ha sido pulida durante tanto tiempo\nque su superficie ha quedado lisa y brillante."
    ko: "시간을 들여 빚어낸\n표면이 반질반질하게 빛나는\n진흙으로 만든 경단."
    zh_simp: "用泥土制作的丸子。\n花了大把时间打磨，\n表面油光水滑。"
    zh_trad: "花了不少時間\n把表面磨得\n非常光滑的泥球。"
poliwag_candy:
  names:
    jp_kana: ニョロモのアメ
    jp_kanji: ニョロモのアメ
    en: Poliwag Candy
    fr: Bonbon Ptitard
    it: Caramella Poliwag
    de: Quapsel-Bonbon
    es: Caramelo Poliwag
    ko: 발챙이의사탕
    zh_simp: 蚊香蝌蚪的糖果
    zh_trad: 蚊香蝌蚪的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
poliwag_slime:
  names:
    jp_kana: ニョロモのねんえき
    jp_kanji: ニョロモのねんえき
    en: Poliwag Slime
    fr: Mucus de Ptitard
    it: Muco di Poliwag
    de: Quapsel-Schleim
    es: Secreción de Poliwag
    ko: 발챙이의점액
    zh_simp: 蚊香蝌蚪的黏液
    zh_trad: 蚊香蝌蚪的黏液
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
polka_dot_bottle:
  names:
    jp_kana: みずたまボトル
    jp_kanji: みずたまボトル
    en: Polka-Dot Bottle
    fr: Gourde à Pois
    it: Borraccia a pois
    de: Punkte-Flasche
    es: Termo Lunares
    ko: 물방울 보틀
    zh_simp: 圆点水壶
    zh_trad: 圓點水壺
  descriptions:
    jp_kana: "みずたま柄の　軽くて　小さい\nコップつき　水筒。　つけ外し　できる\nストラップは　持ち歩きにも　便利。"
    jp_kanji: "みずたま柄の　軽くて　小さい\nコップつき　水筒。　つけ外し　できる\nストラップは　持ち歩きにも　便利。"
    en: "A polka-dot-patterned bottle that’s small, light, and\neven comes with a cup. The detachable strap makes it\nhandy for walking around with."
    fr: "Une gourde constellée de pois avec une petite tasse\nassortie. Petite et légère, elle est facile à emporter\navec soi en balade grâce à sa lanière détachable."
    it: "Borraccia piccola e leggera decorata con un motivo\na pois e dotata di bicchiere. Può essere portata\ncomodamente in giro grazie alla cinghia rimovibile."
    de: "Zu dieser kleinen und leichten Thermosflasche mit\nPunktemuster gehört auch eine passende Tasse. Dank\nabnehmbarem Riemen lässt sie sich bequem mitführen."
    es: "Un termo de lunares ligero y con tacita incorporada.\nLa correa se puede poner y quitar, lo que lo hace\nmuy cómodo para llevárselo de paseo."
    ko: "물방울무늬의 가볍고 작은 보틀.\n컵이 포함되어 있다. 탈착 가능한\n스트랩이 있어서 들고 다니기 편하다."
    zh_simp: "带有圆点图案，轻便小巧\n还附带杯子的水壶。配备了\n可拆式挂绳，方便携带。"
    zh_trad: "裝飾著點狀花紋，輕盈小巧，\n附帶水杯的水壺。\n背帶可自由拆卸，所以也方便攜帶。"
polka_dot_chairs:
  names:
    jp_kana: みずたまチェア
    jp_kanji: みずたまチェア
    en: Polka-Dot Chairs
    fr: Sièges à Pois
    it: Sedie a pois
    de: Punkte-Stühle
    es: Sillas Lunares
    ko: 물방울 체어
    zh_simp: 圆点椅子
    zh_trad: 圓點椅子
  descriptions:
    jp_kana: "ピクニックで　使いやすい　イス。\nみずたまクロスの　デザインを\nもとに　作ってもらった。"
    jp_kanji: "ピクニックで　使いやすい　イス。\nみずたまクロスの　デザインを\nもとに　作ってもらった。"
    en: "A set of chairs that are ideal for picnicking. Their design\nwas inspired by the Polka-Dot Tablecloth."
    fr: "Des sièges parfaits pour les pique-niques.\nLeur design est inspiré de la Nappe à Pois."
    it: "Pratiche sedie, perfette per i picnic, ispirate al design\ndella Tovaglia a pois."
    de: "Diese Stühle sind gut geeignet für Picknicks.\nIhr Design basiert auf dem Punkte-Tischtuch."
    es: "Unas sillas ideales para irse de pícnic. Su diseño está\nbasado en el del Mantel Lunares."
    ko: "피크닉에서 사용하기 편한 의자.\n물방울 테이블보의\n디자인을 토대로 만들어졌다."
    zh_simp: "在野餐时很好用的椅子。\n根据圆点桌巾的设计制作而成。"
    zh_trad: "野餐時很好用的椅子。\n根據圓點桌巾的設計製作而成。"
polka_dot_cup:
  names:
    jp_kana: みずたまカップ
    jp_kanji: みずたまカップ
    en: Polka-Dot Cup
    fr: Tasse à Pois
    it: Tazza a pois
    de: Punkte-Tasse
    es: Taza Lunares
    ko: 물방울 컵
    zh_simp: 圆点水杯
    zh_trad: 圓點水杯
  descriptions:
    jp_kana: "ピクニックで　子供が使う　カップ。\n軽くて　丈夫な　素材で　できている。\n重ねられるので　持ち運びにも　便利。"
    jp_kanji: "ピクニックで　子供が使う　カップ。\n軽くて　丈夫な　素材で　できている。\n重ねられるので　持ち運びにも　便利。"
    en: "A cup for kids to use at picnics. It’s made of light but\nstrong material. It’s stackable, which makes it handy for\ncarrying around."
    fr: "Une tasse à pique-nique très légère et solide, destinée\naux enfants. On peut les empiler facilement, ce qui\nles rend faciles à transporter."
    it: "Tazza da picnic pensata per i bambini. È realizzata con\nun materiale leggero ma resistente. Essendo impilabile\nè anche comoda da trasportare."
    de: "Diese Picknicktasse für Kinder besteht aus robustem und\nleichtem Material. Da sich solche Tassen stapeln lassen,\nkann man sie bequem überallhin mitnehmen."
    es: "Una taza de pícnic apta para los más peques, hecha\nde un material ligero pero resistente. Además, al ser\napilable, resulta muy cómoda de transportar."
    ko: "피크닉에서 어린이가 사용하는 컵.\n가볍고 튼튼한 소재로 만들어져 있다.\n겹쳐서 쌓을 수도 있어서 들고 다니기 편하다."
    zh_simp: "野餐时小孩使用的杯子。\n使用轻巧坚固的材料制成。\n能够叠起来，因此方便携带。"
    zh_trad: "小孩子在野餐時使用的水杯。\n由輕巧而堅固的材料製成。\n可以堆疊，所以也方便攜帶。"
polka_dot_tablecloth:
  names:
    jp_kana: みずたまクロス
    jp_kanji: みずたまクロス
    en: Polka-Dot Tablecloth
    fr: Nappe à Pois
    it: Tovaglia a pois
    de: Punkte-Tischtuch
    es: Mantel Lunares
    ko: 물방울 테이블보
    zh_simp: 圆点桌巾
    zh_trad: 圓點桌巾
  descriptions:
    jp_kana: "みずたま柄が　オシャレな　テーブルクロス。\n防水　防カビ　性能に　優れ\n汚れも　ひと拭きで　落ちる。"
    jp_kanji: "みずたま柄が　オシャレな　テーブルクロス。\n防水　防カビ　性能に　優れ\n汚れも　ひと拭きで　落ちる。"
    en: "A tablecloth with a fashionable polka-dot pattern. It’s\ngreat at repelling water and mold, and stains and\nsmudges wipe right off."
    fr: "Une nappe avec un élégant motif à pois. Elle est\nhydrophobe, anti-moisissures, et il suffit d’un simple\ncoup d’éponge pour y faire disparaître toutes les taches."
    it: "Tovaglia dall’elegante motivo a pois. Impermeabile\ne a prova di muffa, per pulirla basta una passata di\nspugna."
    de: "Dieses Tischtuch mit modischem Punktemuster ist\nwunderbar wasserabweisend und schimmelfest, sodass\nsich Schmutz und Flecken leicht wegwischen lassen."
    es: "Un mantel con un original diseño de lunares.\nEs resistente al agua y al moho, por lo que es\nmuy fácil de limpiar."
    ko: "세련된 물방울무늬의 테이블보.\n방수와 방미 성능이 뛰어나서\n더러워져도 한 번 쓱 닦으면 깨끗해진다."
    zh_simp: "带有圆点图案的时尚桌巾。\n既防水又防霉，性能优越。\n弄脏了也一下就能擦掉。"
    zh_trad: "擁有時尚點狀花紋的桌巾。\n防水和防霉性能非常卓越，\n髒汙也能輕易地擦拭乾淨。"
poltchageist_powder:
  names:
    jp_kana: チャデスのこな
    jp_kanji: チャデスのこな
    en: Poltchageist Powder
    fr: Poudre de Poltchageist
    it: Polvere di Poltchageist
    de: Mortcha-Puder
    es: Polvo de Poltchageist
    ko: 차데스의가루
    zh_simp: 斯魔茶的粉
    zh_trad: 斯魔茶的粉
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
pomeg_berry:
  names:
    jp_kana: ザロクのみ
    jp_kanji: ザロクのみ
    en: Pomeg Berry
    fr: Baie Grena
    it: Baccagrana
    de: Granabeere
    es: Baya Grana
    ko: 유석열매
    zh_simp: 榴石果
    zh_trad: 榴石果
  descriptions:
    jp_kana: "ポケモンに　あげると\nとても　なかよく　なりやすくなるが\nＨＰの　基礎ポイントは　さがる。"
    jp_kanji: "ポケモンに　あげると\nとても　なかよく　なりやすくなるが\nＨＰの　基礎ポイントは　さがる。"
    en: "If a Pokémon is fed this Berry, it will grow more friendly,\nbut it will lose base points for its HP stat."
    fr: "Une Baie qui rend les Pokémon plus amicaux,\nmais baisse leurs PV de base."
    it: "Usata su un Pokémon, ne aumenta il livello di amicizia,\nma ne diminuisce i punti base dei PS."
    de: "Isst ein Pokémon diese Beere, wird es zutraulicher,\naber seine KP-Basispunkte sinken."
    es: "Al usarla con un Pokémon, lo vuelve más amistoso,\npero también reduce sus PS de base."
    ko: "포켓몬에게 주면\n매우 친밀해지기 쉬워지지만\nHP의 기초 포인트가 떨어진다."
    zh_simp: "如果把它交给宝可梦，\n宝可梦就会变得非常容易和训练家亲密，\n但ＨＰ的基础点数会降低。"
    zh_trad: "如果把它餵給寶可夢，\n寶可夢會非常容易和訓練家變得友好，\n但ＨＰ的基礎點數會降低。"
ponyta_candy:
  names:
    jp_kana: ポニータのアメ
    jp_kanji: ポニータのアメ
    en: Ponyta Candy
    fr: Bonbon Ponyta
    it: Caramella Ponyta
    de: Ponita-Bonbon
    es: Caramelo Ponyta
    ko: 포니타의사탕
    zh_simp: 小火马的糖果
    zh_trad: 小火馬的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
poochyena_fang:
  names:
    jp_kana: ポチエナのキバ
    jp_kanji: ポチエナのキバ
