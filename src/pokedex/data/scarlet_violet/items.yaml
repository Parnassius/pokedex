    jp_kanji: あおぞらプレート
    en: Sky Plate
    fr: Plaque Ciel
    it: Lastracielo
    de: Wolkentafel
    es: Tabla Cielo
    ko: 푸른하늘플레이트
    zh_simp: 蓝天石板
    zh_trad: 藍天石板
  descriptions:
    jp_kana: "ひこうのタイプの　石盤。\n持たせると　ひこうタイプの\n技の威力が　強まる。"
    jp_kanji: "ひこうのタイプの　石盤。\n持たせると　ひこうタイプの\n技の威力が　強まる。"
    en: "An item to be held by a Pokémon. This stone tablet is\nimbued with the essence of flight and boosts the power\nof the holder’s Flying-type moves."
    fr: "Objet à tenir. Une tablette en pierre augmentant\nla puissance des capacités de type Vol."
    it: "Strumento da dare a un Pokémon. Lastra di pietra che\npotenzia le mosse di tipo Volante."
    de: "Ein Item zum Tragen. Diese Steintafel verstärkt\nAttacken vom Typ Flug."
    es: "Tabla de piedra que potencia los movimientos de tipo\nVolador. Debe llevarla un Pokémon."
