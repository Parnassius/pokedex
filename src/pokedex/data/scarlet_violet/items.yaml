    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de cierto Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
tapunium_z:bag:
  names:
    jp_kana: カプＺ
    jp_kanji: カプＺ
    en: Tapunium Z
    fr: Tokozélite
    it: Tapium Z
    de: Kapium Z
    es: Tapistal Z
    ko: 카푸Z
    zh_simp: 卡璞Ｚ
    zh_trad: 卡璞Ｚ
  descriptions:
    jp_kana: "カプたちの　しぜんのいかりを\n特別な　Ｚワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    jp_kanji: "カプたちの　しぜんのいかりを\n特別な　Ｚワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade the\ntapu’s Nature’s Madness to a Z-Move."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise le Pokémon Tutélaire qui le tient à\ntransformer sa capacité Ire de la Nature en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono ai Tapu di trasformare la mossa\nIra della Natura in una mossa Z."
    de: "Kristallisierte Z-Kraft, die die Kapu-Attacke\nNaturzorn zu einer Z-Attacke aufstuft.\nWird bei Bedarf automatisch vervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a\nlos Tapu convertir su Furia Natural en un movimiento Z."
    ko: "카푸들의 자연의분노를\n특별한 Z기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将卡璞们的自然之怒\n升级成特殊Ｚ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把卡璞們的自然之怒\n升級為特殊Ｚ招式的Ｚ力量結晶。"
tapunium_z:held:
  names:
    jp_kana: カプＺ
    jp_kanji: カプＺ
    en: Tapunium Z
    fr: Tokozélite
    it: Tapium Z
    de: Kapium Z
    es: Tapistal Z
    ko: 카푸Z
    zh_simp: 卡璞Ｚ
    zh_trad: 卡璞Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　結晶。\nカプたちの　しぜんのいかりを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nカプたちの　しぜんのいかりを\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power. It upgrades\nthe tapu’s Nature’s Madness to a Z-Move."
    fr: "Une cristallisation de la Force Z, permettant\nde transformer la capacité Ire de la Nature\nd’un Toko en capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare la mossa Ira della Natura\ndei Tapu in una mossa Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft die\nKapu-Attacke Naturzorn zu einer Z-Attacke auf."
    es: "Cristal que confiere el Poder Z al movimiento Furia\nNatural de los Tapu."
    ko: "Z파워의 결정.\n카푸들의 자연의분노를\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将卡璞们的自然之怒\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把卡璞們的自然之怒\n升級為Ｚ招式。"
