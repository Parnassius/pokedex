    jp_kanji: "ポケモンに　持たせると\n物理技を　受けたとき\n自分の　防御が　あがる。"
    en: "If a Pokémon holding this Berry is hit with a physical\nmove, the holder’s Defense stat will be boosted."
    fr: "Tenue, cette Baie augmente la Défense du Pokémon\nlorsqu’il est touché par une capacité physique."
    it: "Se un Pokémon ha questa bacca, aumenta la propria\nDifesa quando subisce una mossa fisica."
    de: "Als getragenes Item erhöht diese Beere die\nVerteidigung des Pokémon, wenn dieses von\neiner physischen Attacke getroffen wird."
    es: "Si la lleva un Pokémon, aumenta su Defensa tras recibir\nun ataque físico."
    ko: "포켓몬에게 지니게 하면\n물리 기술로 공격받았을 때\n자신의 방어가 올라간다."
    zh_simp: "让宝可梦携带后，\n在受到物理招式攻击时，\n自己的防御就会提高。"
    zh_trad: "讓寶可夢攜帶後，\n在受到物理招式攻擊時，\n自己的防禦就會提高。"
kelpsy_berry:
  names:
    jp_kana: ネコブのみ
    jp_kanji: ネコブのみ
    en: Kelpsy Berry
    fr: Baie Alga
    it: Baccalga
    de: Setangbeere
    es: Baya Algama
    ko: 시마열매
    zh_simp: 藻根果
    zh_trad: 藻根果
  descriptions:
    jp_kana: "ポケモンに　あげると\nとても　なかよく　なりやすくなるが\n攻撃の　基礎ポイントは　さがる。"
    jp_kanji: "ポケモンに　あげると\nとても　なかよく　なりやすくなるが\n攻撃の　基礎ポイントは　さがる。"
    en: "If a Pokémon is fed this Berry, it will grow more friendly,\nbut it will lose base points for its Attack stat."
    fr: "Une Baie qui rend les Pokémon plus amicaux,\nmais baisse leur Attaque de base."
    it: "Usata su un Pokémon, ne aumenta il livello di amicizia,\nma ne diminuisce i punti base dell’Attacco."
    de: "Isst ein Pokémon diese Beere, wird es zutraulicher,\naber seine Angriffs-Basispunkte sinken."
    es: "Al usarla con un Pokémon, lo vuelve más amistoso,\npero también reduce su Ataque de base."
    ko: "포켓몬에게 주면\n매우 친밀해지기 쉬워지지만\n공격의 기초 포인트가 떨어진다."
    zh_simp: "如果把它交给宝可梦，\n宝可梦就会变得非常容易和训练家亲密，\n但攻击的基础点数会降低。"
    zh_trad: "如果把它餵給寶可夢，\n寶可夢會非常容易和訓練家變得友好，\n但攻擊的基礎點數會降低。"
ketchup:
  names:
    jp_kana: ケチャップ
    jp_kanji: ケチャップ
    en: Ketchup
    fr: Ketchup
    it: Ketchup
    de: Ketchup
    es: Kétchup
    ko: 케첩
    zh_simp: 番茄酱
    zh_trad: 番茄醬
  descriptions:
    jp_kana: "塩味と　酸味が　強い　調味料。\nトマトを　中心に　数種類の\n原料を　加工し　作られている。"
    jp_kanji: "塩味と　酸味が　強い　調味料。\nトマトを　中心に　数種類の\n原料を　加工し　作られている。"
    en: "A condiment with very salty and tart flavor. While a\nnumber of other ingredients go into its signature flavor,\nthe noble tomato is its heart and soul."
    fr: "Un condiment au goût très acide et salé. Un certain\nnombre d’ingrédients entre dans sa préparation, mais\nc’est la tomate qui lui donne sa saveur si particulière."
    it: "Un condimento molto salato e aspro. Si prepara con\nuna base di Pomodori a cui vengono aggiunti di diversi\naltri ingredienti."
    de: "Ein sehr salziges sowie säuerliches Würzmittel, das aus\neiner Vielzahl an Zutaten hergestellt wird, wobei jedoch\nTomaten die klar dominante Komponente bilden."
    es: "Ácido y salado a la vez, este condimento está hecho a\npartir de tomates y otros ingredientes procesados."
    ko: "짠맛과 신맛이 강한 조미료.\n토마토를 중심으로 여러 종류의\n원료를 가공해서 만든다."
    zh_simp: "咸味和酸味强烈的调味料。\n以番茄为中心，\n由数种原料加工制成。"
    zh_trad: "鹹味和酸味強勁的調味料。\n由以番茄為主的數種原料\n加工製作而成。"
key_stone:
  names:
    jp_kana: キーストーン
    jp_kanji: キーストーン
    en: Key Stone
    fr: Gemme Sésame
    it: Pietrachiave
    de: Schlüssel-Stein
    es: Piedra Activadora
    ko: 키스톤
    zh_simp: 钥石
    zh_trad: 鑰石
  descriptions:
    jp_kana: "メガストーンを　持ったまま　戦う\nポケモンを　メガシンカさせる\n未知のパワーを　秘めた　石。"
    jp_kanji: "メガストーンを　持ったまま　戦う\nポケモンを　メガシンカさせる\n未知のパワーを　秘めた　石。"
    en: "A stone filled with an unexplained power. It makes\nPokémon that battle with a Mega Stone\nMega Evolve."
    fr: "Une pierre aux pouvoirs mystérieux permettant\nà un Pokémon de méga-évoluer au combat s’il tient\nla bonne Méga-Gemme."
    it: "Pietra dotata di un misterioso potere.\nDurante la lotta, può innescare la megaevoluzione\ndei Pokémon che hanno una Megapietra."
    de: "Ein Stein mit unbekannten Kräften. Er kann im Kampf\nbei Pokémon, die einen Mega-Stein tragen, eine\nMega-Entwicklung auslösen."
    es: "Piedra de singulares poderes que permite\nmegaevolucionar en combate a un Pokémon que lleve\nconsigo una Megapiedra."
    ko: "메가스톤을 지닌 채로 싸우는\n포켓몬을 메가진화시키는\n미지의 힘을 가진 돌."
    zh_simp: "蕴藏着未知力量的石头。\n能让携带着超级石战斗的\n宝可梦进行超级进化。"
    zh_trad: "隱藏著未知力量的石頭。\n能讓攜帶著超級石戰鬥的\n寶可夢進行超級進化。"
key_to_room_1:
  names:
    jp_kana: １ごうしつのカギ
    jp_kanji: １ごうしつのカギ
    en: Key to Room 1
    fr: Clé Salle 1
    it: Chiave stanza 1
    de: R1-Schlüssel
    es: Ll. Habitación 1
    ko: 1호실열쇠
    zh_simp: １号客房的钥匙
    zh_trad: １號客房的鑰匙
  descriptions:
    jp_kana: "シーキンセツの　部屋に\n入るための　カギ。"
    jp_kanji: "シーキンセツの　部屋に\n入るための　カギ。"
    en: A key that opens a door inside Sea Mauville.
    fr: La clé d’une salle de Lavandia Sea.
    it: Chiave per accedere a una delle stanze di Ciclamare.
    de: "Ein Schlüssel, der in das Schloss eines Raumes auf\nSeewoge Malvenfroh passt."
    es: Llave de acceso a una de las habitaciones de Malvamar.
    ko: "씨보라의 방으로\n들어가기 위한 열쇠."
    zh_simp: "进入海紫堇的房间时\n所需的钥匙。"
    zh_trad: "用於進入\n海紫菫的房間的鑰匙。"
