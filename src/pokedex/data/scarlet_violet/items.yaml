    zh_trad: 高級球
  descriptions:
    jp_kana: "ハイパーボールのレシピ。　材料は\nぼんぐりのみ×１　てつのかけら×２\nたまいし×２"
    jp_kanji: "ハイパーボールのレシピ。　材料は\nぼんぐりのみ×１　てつのかけら×２\nたまいし×２"
    en: "A recipe for crafting Ultra Balls from scratch.\nRequired materials: 1 Apricorn, 2 Iron Chunks, and\n2 Tumblestones."
    fr: "Méthode pour Hyper Ball. Ressources requises :\n1 Noigrume, 2 Fragments de Fer et 2 Galets."
    it: "Ricetta per creare un’Ultra Ball. I materiali necessari\nsono 1 Bacca ghicocca, 2 Pezzi di ferro e 2 Ciottoli."
    de: "Die Anleitung zur Herstellung eines Hyperballs.\nBenötigte Materialien: 1 Aprikoko, 2 Eisenbrocken\nund 2 Glanzsteine."
    es: "Receta para crear Ultra Balls. Materiales:\n1 Bonguri, 2 Pepitas de Hierro y 2 Guijarros Rojos."
    ko: "하이퍼볼의 레시피.\n재료: 규토리열매×1 철조각×2 옥돌×2"
    zh_simp: "高级球的材料单。材料是：\n球果果×１　碎铁×２\n玉石×２"
    zh_trad: "高級球的材料單。材料是：\n球果果×１　碎鐵×２\n玉石×２"
ultranecrozium_z:bag:
  names:
    jp_kana: ウルトラネクロＺ
    jp_kanji: ウルトラネクロＺ
    en: Ultranecrozium Z
    fr: Ultranécrozélite
    it: Ultranecrozium Z
    de: Ultranecronium Z
    es: Ultranecrostal Z
    ko: 울트라네크로Z
    zh_simp: 究极奈克洛Ｚ
    zh_trad: 究極奈克洛Ｚ
  descriptions:
    jp_kana: "ソルガレオか　ルナアーラと\n合体した　ネクロズマを\n新たな　姿にする　結晶。"
    jp_kanji: "ソルガレオか　ルナアーラと\n合体した　ネクロズマを\n新たな　姿にする　結晶。"
    en: "It’s a crystal that turns Necrozma fused with\nSolgaleo or Lunala into a new form."
    fr: "Un cristal permettant de donner une nouvelle forme\nà Necrozma quand il a fusionné avec Solgaleo ou Lunala."
    it: "Cristallo che permette a Necrozma di assumere una\nnuova forma quando è fuso con Lunala o Solgaleo."
    de: "Kristallisierte Z-Kraft, die bei Necrozma nach der Fusion\nmit Solgaleo oder Lunala bewirkt, dass es eine neue\nForm annimmt."
    es: "Cristal que permite a Necrozma, una vez fusionado\ncon Solgaleo o Lunala, adoptar una nueva forma."
    ko: "솔가레오나 루나아라와\n합체한 네크로즈마를\n새로운 모습으로 만드는 결정."
    zh_simp: "能让和索尔迦雷欧或\n露奈雅拉合体的奈克洛兹玛\n变成崭新样子的结晶。"
    zh_trad: "可讓和索爾迦雷歐或露奈雅拉\n合體後的奈克洛茲瑪\n展現出全新樣子的結晶。"
ultranecrozium_z:held:
  names:
    jp_kana: ウルトラネクロＺ
    jp_kanji: ウルトラネクロＺ
    en: Ultranecrozium Z
    fr: Ultranécrozélite
    it: Ultranecrozium Z
    de: Ultranecronium Z
    es: Ultranecrostal Z
    ko: 울트라네크로Z
    zh_simp: 究极奈克洛Ｚ
    zh_trad: 究極奈克洛Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　結晶。\nネクロズマの　フォトンゲイザーを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nネクロズマの　フォトンゲイザーを\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Necrozma’s Photon Geyser to\na Z-Move."
    fr: "Une cristallisation de la Force Z, permettant\nde transformer le Photo-Geyser de Necrozma\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare la mossa Geyser Fotonico\ndi Necrozma in una mossa Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft Necrozmas\nAttacke Photonen-Geysir zu einer Z-Attacke auf."
    es: "Cristal que confiere el Poder Z al movimiento Géiser\nFotónico de Necrozma."
    ko: "Z파워의 결정.\n네크로즈마의 포톤가이저를\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将奈克洛兹玛的光子喷涌\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n可將奈克洛茲瑪的光子噴湧\n升級為Ｚ招式。"
unown_report:
  names:
    jp_kana: アンノーンノート
    jp_kanji: アンノーンノート
    en: Unown Report
    fr: Carnet Zarbi
    it: Registro Unown
    de: Icognitoheft
    es: Bloc Unown
    ko: 안농노트
    zh_simp: 未知图腾笔记
    zh_trad: 未知圖騰筆記
  descriptions:
    jp_kana: "みつけた　アンノーンの　ようすが\n記録されている　ノート。"
    jp_kanji: "みつけた　アンノーンの　ようすが\n記録されている　ノート。"
    en: A report of all the discovered kinds of Unown.
    fr: "Un carnet permettant de noter toutes les formes\nde Zarbi capturées."
    it: "Registro dove si riportano tutte le forme di Unown\ntrovate."
    de: "Ein Heft, in dem automatisch Daten zu bereits\ngefangenen Icognito aufgezeichnet werden."
    es: "Bloc que almacena la información de los Unown\ncapturados hasta el momento."
    ko: "발견한 안농의 모습이\n기록되어 있는 노트."
    zh_simp: "记录着已找到的\n未知图腾样子的笔记本。"
    zh_trad: "記錄著已找到的\n未知圖騰樣子的筆記本。"
unremarkable_teacup:
  names:
    jp_kana: ボンサクのちゃわん
    jp_kanji: ボンサクのちゃわん
    en: Unremarkable Teacup
    fr: Bol Médiocre
    it: Tazza dozzinale
    de: Simple Teeschale
    es: Cuenco Mediocre
    ko: 범작찻잔
    zh_simp: 凡作茶碗
    zh_trad: 凡作茶碗
  descriptions:
    jp_kana: "ある特定の　ポケモンを\n進化させる　不思議な茶碗。\n割れているが　お茶は　おいしくなる。"
    jp_kanji: "ある特定の　ポケモンを\n進化させる　不思議な茶碗。\n割れているが　お茶は　おいしくなる。"
    en: "A peculiar teacup that can make a certain species of\nPokémon evolve. It may be cracked, but tea drunk\nfrom it is delicious."
    fr: "Un bol à thé mystérieux qui permet de faire évoluer\nune certaine espèce de Pokémon. Il est abîmé,\nmais on y fait du bon thé."
    it: "Tazza da tè particolare che fa evolvere determinate\nspecie di Pokémon. È rotta, ma il tè che contiene\nè davvero ottimo."
    de: "Diese sonderbare Teeschale löst bei einem bestimmten\nPokémon die Entwicklung aus. Sie weist zwar Risse auf,\naber das wirkt sich nicht negativ auf den Tee aus."
    es: "Curioso cuenco que hace evolucionar a una determinada\nespecie de Pokémon. Pese a estar agrietado, hace que\nel té sepa exquisito."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 찻잔.\n깨졌지만 차는 맛있어진다."
    zh_simp: "这个神奇的茶碗\n可以使特定的宝可梦进化。\n虽然破裂了，但泡出来的茶会很香。"
    zh_trad: "能讓特定寶可夢\n進化的神奇茶碗。\n雖然有裂痕，但茶會變得美味。"
upgrade:
  names:
    jp_kana: アップグレード
    jp_kanji: アップグレード
    en: Upgrade
    fr: Améliorator
    it: Upgrade
    de: Upgrade
    es: Mejora
    ko: 업그레이드
    zh_simp: 升级数据
    zh_trad: 升級資料
  descriptions:
    jp_kana: "中に　いろんな　情報が\nつまった　透明な機械。\nシルフ　カンパニー製。"
    jp_kanji: "中に　いろんな　情報が\nつまった　透明な機械。\nシルフ　カンパニー製。"
    en: "A transparent device somehow filled with all sorts of\ndata. It was produced by Silph Co."
    fr: "Un dispositif transparent rempli de données diverses\net variées. Fabriqué par la Sylphe SARL."
    it: "Apparecchio trasparente pieno zeppo di dati\ndi ogni tipo. È un prodotto della Silph S.p.A."
    de: "Ein durchsichtiges Gerät. Es enthält alle möglichen\nDaten. Hergestellt von der Silph Company."
    es: "Peculiar dispositivo fabricado en Silph S. A. que\ncontiene todo tipo de datos."
    ko: "안에 여러 가지 정보가\n가득한 투명한 기계다.\n실프주식회사 제품."
    zh_simp: "内部储存了各种信息的透明机器。\n西尔佛公司制造。"
    zh_trad: "內部儲存了各種\n資訊的透明機器。\n西爾佛公司製造。"
utility_umbrella:
  names:
    jp_kana: ばんのうがさ
    jp_kanji: ばんのうがさ
    en: Utility Umbrella
    fr: Parapluie Solide
    it: Superombrello
    de: Allzweckschirm
    es: Parasol Multiuso
    ko: 만능우산
    zh_simp: 万能伞
    zh_trad: 萬能傘
  descriptions:
    jp_kana: "持たせた　ポケモンは\n雨と　日差しが強いときの\n影響を　受けなくなる。"
    jp_kanji: "持たせた　ポケモンは\n雨と　日差しが強いときの\n影響を　受けなくなる。"
    en: "An item to be held by a Pokémon. This sturdy umbrella\nprotects the holder from the effects of rain and harsh\nsunlight."
    fr: "Objet à tenir. Il protège le porteur des effets de la pluie\net des rayons du soleil."
    it: "Strumento da dare a un Pokémon. Protegge dagli\neffetti causati dalla pioggia e dalla luce solare intensa."
    de: "Der Träger ist gegen die Effekte von Regen und\nSonnenlicht geschützt."
    es: "El portador se vuelve invulnerable a los efectos de\nla lluvia y del sol."
    ko: "지니게 한 포켓몬은\n비와 햇살이 강할 때의\n영향을 받지 않게 된다."
    zh_simp: "携带它的宝可梦\n在下雨或日照很强时，\n不会受到天气的影响。"
    zh_trad: "攜帶它的寶可夢\n在下雨或日照很強時，\n不會受到天氣的影響。"
uxies_claw:
  names:
    jp_kana: ユクシーのつめ
    jp_kanji: ユクシーのつめ
    en: Uxie’s Claw
    fr: Griffe de Créhelf
    it: Artiglio di Uxie
    de: Selfe-Kralle
    es: Garra de Uxie
    ko: 유크시의손톱
    zh_simp: 由克希之爪
    zh_trad: 由克希之爪
  descriptions:
    jp_kana: "エイチ湖にすむ知識の神\nユクシーの試練を達成した証。\nあかいくさりをつくるために必要。"
    jp_kanji: "エイチ湖にすむ知識の神\nユクシーの試練を達成した証。\nあかいくさりをつくるために必要。"
    en: "Proof that you have completed the trial set by Uxie,\nthe Being of Knowledge that lives in Lake Acuity.\nThis item is needed to forge the Red Chain."
    fr: "Cet objet atteste que vous avez réussi l’épreuve de\nCréhelf, « l’être du savoir » qui vit au Lac Savoir.\nIl est indispensable pour forger la Chaîne Rouge."
    it: "Attesta il superamento della prova di Uxie, la divinità\ndella conoscenza che dimora nel Lago Arguzia.\nIndispensabile per forgiare la Catena rossa."
    de: "Diese Kralle beweist deinen Abschluss der Prüfung des\nwissenden Wesens Selfe, das im See der Stärke lebt.\nSie ist nötig, um die Rote Kette herzustellen."
    es: "Prueba de que has superado el desafío impuesto por\nUxie, el Ser de la Sabiduría que habita en el Lago\nAgudeza. Necesaria para forjar la Cadena Roja."
    ko: "예지호수에 사는 지식의 신\n유크시의 시련을 클리어한 증표.\n빨강사슬을 만드는 데 필요하다."
    zh_simp: "完成了住在睿智湖的知识之神\n由克希的考验的证明。\n制造红色锁链时的必备品。"
    zh_trad: "達成了住在睿智湖的知識之神\n由克希的試煉的證明。\n製造紅色鎖鏈時的必備品。"
varoom_fume:
  names:
    jp_kana: ブロロンのガス
    jp_kanji: ブロロンのガス
    en: Varoom Fume
    fr: Gaz de Vrombi
    it: Gas di Varoom
    de: Knattox-Gas
    es: Gas de Varoom
    ko: 부르롱의가스
    zh_simp: 噗隆隆的气体
    zh_trad: 噗隆隆的氣體
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
vee_vee_pick:
  names:
    jp_kana: ブイブイピック
    jp_kanji: ブイブイピック
    en: Vee-Vee Pick
    fr: Pique Volivoli
    it: Stecchino Eevee
    de: Volivoli-Pikser
    es: Palillo Eevee
    ko: 브이브이 픽
    zh_simp: 伊布三明治签
    zh_trad: 伊布三明治籤
  descriptions:
    jp_kana: "イーブイが　デザインされた　ピック。\nいつもの顔が　プリントされている。\n耳の部分が　持ちやすいのも　人気の秘密。"
    jp_kanji: "イーブイが　デザインされた　ピック。\nいつもの顔が　プリントされている。\n耳の部分が　持ちやすいのも　人気の秘密。"
    en: "A pick designed after Eevee, sporting the Pokémon’s\nusual expression. It’s easy to grab by the ears, which is\npart of why it’s so popular."
    fr: "Une pique ornée du visage adorable d’un Évoli.\nUne des raisons de sa popularité vient de ses oreilles,\npar lesquelles on peut la tenir facilement."
    it: "Stecchino a forma di Eevee, rappresentato con la sua\nsolita espressione. Le orecchie offrono una facile presa,\ncontribuendo alla sua popolarità."
    de: "Ein Pikser im Design von Evoli mit charakteristischem\nGesichtsausdruck. Die praktische Handhabung dank der\nprägnanten Ohren ist mit ein Grund für seine Beliebtheit."
    es: "Un palillo con forma de Eevee con su típica expresión.\nEl secreto de su popularidad reside en lo fácil de\nagarrar que resulta gracias a las orejitas."
    ko: "이브이 디자인이 들어간 픽.\n평상시 표정이 프린트되어 있다.\n귀 부분이 잡기 편한 것 역시 인기의 비결이다."
    zh_simp: "设计成伊布的签子。\n印着伊布平常的表情。耳朵部分\n方便易拿也是其受欢迎的秘密。"
    zh_trad: "設計成伊布造型的小籤。\n籤上印著牠平時的模樣。\n容易拿取的耳朵也是其廣受歡迎的原因之一。"
veluza_fillet:
  names:
    jp_kana: ミガルーサのきりみ
    jp_kanji: ミガルーサのきりみ
    en: Veluza Fillet
    fr: Chair de Délestin
    it: Filetto di Veluza
    de: Agiluza-Filet
    es: Carne de Veluza
    ko: 가비루사의토막
    zh_simp: 轻身鳕的鱼片
    zh_trad: 輕身鱈的魚片
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
venonat_candy:
  names:
    jp_kana: コンパンのアメ
    jp_kanji: コンパンのアメ
    en: Venonat Candy
    fr: Bonbon Mimitoss
    it: Caramella Venonat
    de: Bluzuk-Bonbon
    es: Caramelo Venonat
    ko: 콘팡의사탕
    zh_simp: 毛球的糖果
    zh_trad: 毛球的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
venonat_fang:
  names:
    jp_kana: コンパンのキバ
    jp_kanji: コンパンのキバ
    en: Venonat Fang
    fr: Croc de Mimitoss
    it: Zanna di Venonat
    de: Bluzuk-Zahn
    es: Colmillo de Venonat
    ko: 콘팡의이빨
    zh_simp: 毛球的牙
    zh_trad: 毛球的牙
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
venusaurite:
  names:
    jp_kana: フシギバナイト
    jp_kanji: フシギバナイト
    en: Venusaurite
    fr: Florizarrite
    it: Venusaurite
    de: Bisaflornit
    es: Venusaurita
    ko: 이상해꽃나이트
    zh_simp: 妙蛙花进化石
    zh_trad: 妙蛙花進化石
  descriptions:
    jp_kana: "フシギバナに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    jp_kanji: "フシギバナに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Venusaur hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Florizarre, elle lui permet de\nméga-évoluer durant un combat."
    it: "Una delle misteriose Megapietre. Data a Venusaur,\ngli permette di megaevolversi durante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Bisaflor getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Venusaur en combate."
    ko: "이상해꽃에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让妙蛙花携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓妙蛙花攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
vinegar:
  names:
    jp_kana: ビネガー
    jp_kanji: ビネガー
    en: Vinegar
    fr: Vinaigre
    it: Aceto
    de: Essig
    es: Vinagre
    ko: 비니거
    zh_simp: 醋
    zh_trad: 醋
  descriptions:
    jp_kana: "酸味が　強い　調味料。\nパルデアでは　ブドウ由来の　酢が　人気。\n隠し味として　使うと　効果的なのだ。"
    jp_kanji: "酸味が　強い　調味料。\nパルデアでは　ブドウ由来の　酢が　人気。\n隠し味として　使うと　効果的なのだ。"
    en: "A very sour condiment. Vinegars derived from grapes are\npopular in Paldea. Highly effective when used to add\njust a light note of flavor."
    fr: "Un condiment au goût très acide. Les vinaigres produits\nà partir du raisin sont très populaires à Paldea. À utiliser\navec parcimonie pour relever légèrement un plat."
    it: "Un condimento molto aspro che a Paldea è famoso\nnella varietà prodotta con l’uva. È ottimo aggiunto come\ntocco finale."
    de: "Ein sehr saures Würzmittel, dessen auf Traubenbasis\nhergestellte Sorten in Paldea besonders beliebt sind.\nEignet sich gut, um bestimmte Aromen zu unterstreichen."
    es: "Un condimento de sabor particularmente ácido. En\nPaldea se utiliza mucho el derivado de las uvas, muy\nefectivo como sabor de fondo en cualquier preparación."
    ko: "신맛이 강한 조미료.\n팔데아에서는 포도로 만든 것이 인기다.\n포인트로 조금만 사용하면 효과적이다."
    zh_simp: "酸味强烈的调味料。\n在帕底亚，葡萄制成的醋很受欢迎。\n作为添加风味使用，效果会十分好。"
    zh_trad: "酸味強勁的調味料。\n在帕底亞地區，由葡萄製成的醋很受歡迎。\n用於提味非常有效果。"
violet_book:
  names:
    jp_kana: バイオレットブック
    jp_kanji: バイオレットブック
    en: Violet Book
    fr: Livre Violet
    it: Libro violetto
    de: Purpurbuch
    es: Libro Púrpura
    ko: 바이올렛북
    zh_simp: 紫之书
    zh_trad: 紫之書
  descriptions:
    jp_kana: "著者　ヘザーによって　書かれた\nパルデアの大穴の　探検記。\nつたない文字で　フトゥーと　書かれている。"
    jp_kanji: "著者　ヘザーによって　書かれた\nパルデアの大穴の　探検記。\nつたない文字で　フトゥーと　書かれている。"
    en: "A record of the expedition that the author, Heath, went\non within the Great Crater of Paldea. The book has the\nname “Turo” written on it in clumsy handwriting."
    fr: "Un récit d’exploration du Cratère de Paldea signé\npar un certain Bruyer. Quelqu’un y a inscrit le nom\n« Turum » d’une écriture maladroite."
    it: "Resoconto della spedizione nella Voragine di Paldea\nredatto da Callugaris. Sul libro c’è scritto \"Turum\" con\ngrafia un po’ maldestra."
    de: "Ein Bericht über eine Expedition im Schlund von Paldea,\nan der der Verfasser Alondo teilnahm. Auf den Einband\nist recht unbeholfen der Name „Futurus“ gekritzelt."
    es: "Diario de exploración en el que el autor, Eriad, narra sus\nincursiones en el foso de Paldea. Tiene escrito \"Turo\"\ncon una letra descuidada."
    ko: "헤더가 집필한\n팔데아의 대공 탐험기.\n서툰 글씨로 “투로”라고 쓰여 있다."
    zh_simp: "由海哲撰写的帕底亚巨坑探险记。\n以拙劣的字迹写着“弗图”二字。"
    zh_trad: "由海哲撰寫的帕底亞巨坑探險記。\n拙劣的字跡勾勒出「弗圖」二字。"
violet_book:2:
  names:
    jp_kana: バイオレットブック
    jp_kanji: バイオレットブック
    en: Violet Book
    fr: Livre Violet
    it: Libro violetto
    de: Purpurbuch
    es: Libro Púrpura
    ko: 바이올렛북
    zh_simp: 紫之书
    zh_trad: 紫之書
  descriptions:
    jp_kana: "フトゥー博士と　交換してもらった\nパルデアの大穴の　探検記。\nつたない文字で　フトゥーと　書かれている。"
    jp_kanji: "フトゥー博士と　交換してもらった\nパルデアの大穴の　探検記。\nつたない文字で　フトゥーと　書かれている。"
    en: "A record of an expedition to the Great Crater of Paldea,\ngiven to you by Professor Turo. The book has the name\n“Turo” written on it in clumsy handwriting."
    fr: "Un récit d’exploration du Cratère de Paldea\nque le Professeur Turum vous a donné.\nSon nom y est inscrit d’une écriture maladroite."
    it: "Resoconto della spedizione nella Voragine di Paldea\nottenuto dal Professor Turum. Sul libro c’è scritto\n\"Turum\" con grafia un po’ maldestra."
    de: "Ein Bericht über eine Expedition im Schlund von Paldea,\nden du von Professor Futurus erhalten hast. Auf den\nEinband wurde der Name „Futurus“ gekritzelt."
    es: "Diario de exploración de las incursiones en el foso de\nPaldea que obtuviste de manos del Profesor Turo.\nTiene escrito su nombre con una letra descuidada."
    ko: "투로박사와 교환한\n팔데아의 대공 탐험기.\n서툰 글씨로 “투로”라고 쓰여 있다."
    zh_simp: "和弗图博士交换来的\n帕底亚巨坑探险记。\n以拙劣的字迹写着“弗图”二字。"
    zh_trad: "和弗圖博士交換來的\n帕底亞巨坑探險記。\n拙劣的字跡勾勒出「弗圖」二字。"
virizion_treat:
  names:
    jp_kana: ビリジオンのおやつ
    jp_kanji: ビリジオンのおやつ
    en: Virizion Treat
    fr: Friandise Viridium
    it: Spuntino per Virizion
    de: Viridium-Snack
    es: Galleta Virizion
    ko: 비리디온의간식
    zh_simp: 毕力吉翁的点心
    zh_trad: 畢力吉翁的點心
  descriptions:
    jp_kana: "伝説のポケモン　ビリジオンが\n好む食材で　作られた　おやつ。"
    jp_kanji: "伝説のポケモン　ビリジオンが\n好む食材で　作られた　おやつ。"
    en: "A snack made from ingredients favored by the\nLegendary Pokémon Virizion."
    fr: "Une friandise préparée avec les ingrédients favoris\ndu Pokémon légendaire Viridium."
    it: "Uno spuntino fatto con gli ingredienti preferiti\ndal Pokémon leggendario Virizion."
    de: "Dieser Snack wurde mit den Lieblingszutaten des\nLegendären Pokémon Viridium zubereitet."
    es: "Galleta preparada con los ingredientes favoritos\ndel Pokémon legendario Virizion."
    ko: "전설의 포켓몬 비리디온이\n좋아하는 식재료로 만들어진 간식."
    zh_simp: "用传说的宝可梦毕力吉翁\n喜欢的食材制作的点心。"
    zh_trad: "用傳說的寶可夢畢力吉翁\n喜愛的食材製成的點心。"
vivichoke:
  names:
    jp_kana: ゲンキノツボミ
    jp_kanji: ゲンキノツボミ
    en: Vivichoke
    fr: Bourgeon Vivace
    it: Revitalboccio
    de: Vitalknospe
    es: Revibrote
    ko: 기력의봉오리
    zh_simp: 活力蕾
    zh_trad: 活力蕾
  descriptions:
    jp_kana: "朝露のつぼみとも呼ばれる。\nひん死になったポケモンを活気づける\n道具の材料となる。"
    jp_kanji: "朝露のつぼみとも呼ばれる。\nひん死になったポケモンを活気づける\n道具の材料となる。"
    en: "Also called a morning-dew bud. It is used as a material\nfor crafting items that can restore vitality to a Pokémon\nthat has fainted."
    fr: "Ressource requise pour la confection d’objets qui\nredonnent de la vigueur aux Pokémon K.O.\nOn l’appelle aussi « bourgeon de la rosée du matin »."
    it: "Ingrediente per la preparazione di strumenti che\nrianimano i Pokémon esausti. È anche noto come\n\"bocciolo della rugiada del mattino\"."
    de: "Diese Knospe wird zur Herstellung von Items genutzt,\ndie kampfunfähige Pokémon wiederbeleben.\nSie ist auch als „Morgentauknospe“ bekannt."
    es: "Ingrediente necesario en la elaboración de objetos que\ndevuelven el conocimiento a Pokémon debilitados.\nTambién se conoce como \"brote del rocío matutino\"."
    ko: "아침 이슬의 봉오리라고도 불린다.\n기절해 버린 포켓몬을 건강하게 하는\n도구의 재료가 된다."
    zh_simp: "也被称为朝露之花苞。\n可作为给昏厥的宝可梦\n注入活力的道具材料。"
    zh_trad: "也被稱為朝露之花苞。\n可作為幫瀕死的寶可夢\n注入活力的道具的材料。"
volbeat_fluid:
  names:
    jp_kana: バルビートのしる
    jp_kanji: バルビートのしる
    en: Volbeat Fluid
    fr: Fluide de Muciole
    it: Fluido di Volbeat
    de: Volbeat-Sekret
    es: Fluido de Volbeat
    ko: 볼비트의체액
    zh_simp: 电萤虫的汁液
    zh_trad: 電螢蟲的汁液
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
volcano_balm:
  names:
    jp_kana: かざんのシズメダマ
    jp_kanji: かざんのシズメダマ
    en: Volcano Balm
    fr: Pacifi-Volcan
    it: Sferazen vulcano
    de: Vulkanruhegabe
    es: Calmasfera Volcán
    ko: 화산의진정환
    zh_simp: 火山镇宝
    zh_trad: 火山鎮寶
  descriptions:
    jp_kana: "荒ぶる島キング　ウインディを\n鎮めることができる\n不思議な香りを発する。"
    jp_kanji: "荒ぶる島キング　ウインディを\n鎮めることができる\n不思議な香りを発する。"
    en: "A mysterious balm that gives off a soothing scent.\nIt can be used to help calm the frenzy of the Lord of\nthe Isles, Arcanine."
    fr: "L’étrange parfum que dégage cet objet permet d’apaiser\nla frénésie d’Arcanin, le Roi de l’Île."
    it: "Emana un misterioso profumo in grado di calmare\nla collera di Arcanine, il Re delle isole."
    de: "Dieses Säckchen verströmt einen mysteriösen Duft.\nMit ihm kann man Arkani, den König der Insel,\nbesänftigen."
    es: "Esfera que emana un peculiar aroma capaz de calmar a\nArcanine, el Señor de las Islas, cuando se encuentra\nfurioso."
    ko: "폭주하는 섬의 왕 윈디를\n진정시킬 수 있는\n신비한 향기가 난다."
    zh_simp: "能让狂暴的岛屿王\n风速狗镇静下来。\n散发着不可思议的香气。"
    zh_trad: "能讓狂暴的島嶼王\n風速狗鎮靜下來。\n散發著不可思議的香氣。"
voltorb_candy:
  names:
    jp_kana: ビリリダマのアメ
    jp_kanji: ビリリダマのアメ
    en: Voltorb Candy
    fr: Bonbon Voltorbe
    it: Caramella Voltorb
    de: Voltobal-Bonbon
    es: Caramelo Voltorb
    ko: 찌리리공의사탕
    zh_simp: 霹雳电球的糖果
    zh_trad: 霹靂電球的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
voltorb_sparks:
  names:
    jp_kana: ビリリダマのでんき
    jp_kanji: ビリリダマのでんき
    en: Voltorb Sparks
    fr: Électricité de Voltorbe
    it: Elettricità di Voltorb
    de: Voltobal-Strom
    es: Electricidad de Voltorb
    ko: 찌리리공의전기
    zh_simp: 霹雳电球的电力
    zh_trad: 霹靂電球的電力
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
vs_recorder:
  names:
    jp_kana: バトルレコーダー
    jp_kanji: バトルレコーダー
    en: Vs. Recorder
    fr: Magnéto VS
    it: Registradati
    de: Kampfkamera
    es: Cámara Lucha
    ko: 배틀레코더
    zh_simp: 对战记录器
    zh_trad: 對戰記錄器
  descriptions:
    jp_kana: "友達との　勝負や\n特殊な　施設での　勝負を\n記録できる　かっこいい　機械。"
    jp_kanji: "友達との　勝負や\n特殊な　施設での　勝負を\n記録できる　かっこいい　機械。"
    en: "An amazing device that can record a battle between\nfriends or the battles at certain special battle facilities."
    fr: "Un appareil utile permettant d’enregistrer les combats\nentre amis et ceux ayant lieu dans un bâtiment\nde combat."
    it: "Fantastico dispositivo che registra le lotte tra amici\no quelle che hanno luogo in alcuni edifici dedicati\nalla lotta."
    de: "Ein tolles Gerät, um Kämpfe zwischen Freunden\noder Kämpfe in einer speziellen Kampfeinrichtung\naufzuzeichnen."
    es: "Un fantástico dispositivo que graba combates entre\namigos o celebrados en algún recinto especial."
    ko: "친구와의 승부나\n특수한 시설에서의 승부를\n기록할 수 있는 멋있는 기계."
    zh_simp: "很酷的机器。\n可以记录和朋友或\n在特殊设施里的对战过程。"
    zh_trad: "很酷的機器。\n可以記錄和朋友或\n在特殊設施裡的對戰過程。"
vs_seeker:
  names:
    jp_kana: バトルサーチャー
    jp_kanji: バトルサーチャー
    en: Vs. Seeker
    fr: Cherch’Combat
    it: Cercasfide
    de: Kampffahnder
    es: Buscapelea
    ko: 배틀서처
    zh_simp: 对战搜寻器
    zh_trad: 對戰搜尋器
  descriptions:
    jp_kana: "戦いたい　トレーナーを\n教えてくれる　機械。\n歩くと　電池が　たまる。"
    jp_kanji: "戦いたい　トレーナーを\n教えてくれる　機械。\n歩くと　電池が　たまる。"
    en: "A device that indicates Trainers who want to battle.\nIts battery charges while you walk."
    fr: "Un appareil indiquant les Dresseurs prêts à se battre.\nLa batterie se recharge quand on marche."
    it: "Apparecchio per trovare gli Allenatori che vogliono\nlottare. La batteria si ricarica camminando."
    de: "Ein Gerät, das rückkampfwillige Trainer ausfindig macht.\nDie Batterie lädt sich beim Reisen auf."
    es: "Dispositivo que busca Entrenadores listos para el\ncombate. La batería se carga al caminar."
    ko: "싸우고 싶어하는 트레이너를\n알려 주는 기계.\n걸으면 전지가 충전된다."
    zh_simp: "会告诉你想对战的\n训练家在哪里的机器。\n走路就能给电池充电。"
    zh_trad: "會告訴你想對戰的\n訓練家在哪裡的機器。\n走路就能給電池充電。"
vullaby_feather:
  names:
    jp_kana: バルチャイのはね
    jp_kanji: バルチャイのはね
    en: Vullaby Feather
    fr: Plume de Vostourno
    it: Penna di Vullaby
    de: Skallyk-Feder
    es: Pluma de Vullaby
    ko: 벌차이의깃털
    zh_simp: 秃鹰丫头的羽毛
    zh_trad: 禿鷹丫頭的羽毛
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
