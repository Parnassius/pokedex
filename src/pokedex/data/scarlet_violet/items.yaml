    jp_kana: テラスタルオーブ
    jp_kanji: テラスタルオーブ
    en: Tera Orb
    fr: Orbe Téracristal
    it: Terasfera
    de: Terakristall-Orb
    es: Orbe Teracristal
    ko: 테라스탈오브
    zh_simp: 太晶珠
    zh_trad: 太晶珠
  descriptions:
    jp_kana: "結晶の力を　秘めている　オーブ。\nエネルギーが　チャージされていると\nポケモンを　テラスタル　させる。"
    jp_kanji: "結晶の力を　秘めている　オーブ。\nエネルギーが　チャージされていると\nポケモンを　テラスタル　させる。"
    en: "An orb that holds within it the power to crystallize.\nWhen it is charged with energy, it can be used to cause\nPokémon to Terastallize."
    fr: "Un orbe qui renferme le pouvoir de la cristallisation.\nQuand il est chargé d’énergie, il permet à un Pokémon\nde se téracristalliser."
    it: "Una sfera che racchiude il potere della cristallizzazione.\nSe caricata di energia, permette di teracristallizzare\ni Pokémon."
    de: "Diesem Orb wohnt Kristallisierungskraft inne.\nIst er vollständig aufgeladen, kann er Pokémon\nterakristallisieren."
    es: "Una esfera que encierra en su interior el poder de la\ncristalización. Al cargarse de energía, permite a los\nPokémon teracristalizarse."
    ko: "결정의 힘을 간직하고 있는 오브.\n에너지가 충전되면\n포켓몬을 테라스탈시킬 수 있다."
    zh_simp: "蕴藏着结晶之力的宝珠。\n经过蓄能之后，\n能够让宝可梦太晶化。"
    zh_trad: "秘藏著結晶之力的寶珠。\n在蓄足了能量的狀態下\n可使寶可夢太晶化。"
terrain_extender:
  names:
    jp_kana: グランドコート
    jp_kanji: グランドコート
    en: Terrain Extender
    fr: Champ’Duit
    it: Fissacampo
    de: Feldbeschichtung
    es: Cubresuelos
    ko: 그라운드코트
    zh_simp: 大地膜
    zh_trad: 大地膜
  descriptions:
    jp_kana: "持たせたポケモンが　技や\n特性で　フィールドを　張ったとき\nいつもよりも　長く　残る。"
    jp_kanji: "持たせたポケモンが　技や\n特性で　フィールドを　張ったとき\nいつもよりも　長く　残る。"
    en: "An item to be held by a Pokémon. It extends the\nduration of terrain caused by the holder’s move\nor Ability."
    fr: "Objet à tenir. Il prolonge la durée des champs\nque le Pokémon peut créer sur le terrain avec\nune capacité ou un talent."
    it: "Se un Pokémon ha questo strumento, l’effetto di\nuna sua mossa o abilità che modifica il campo\ndi lotta durerà più a lungo."
    de: "Ein Item zum Tragen. Hat der Träger durch eine Attacke\noder eine Fähigkeit ein Feld erzeugt, verlängert sich\ndessen Dauer."
    es: "Al llevarlo, prolonga la duración de los campos creados\npor el Pokémon en el terreno de combate mediante\nmovimientos o su habilidad."
    ko: "지니게 한 포켓몬이 기술이나\n특성으로 필드를 사용했을 때\n여느 때보다 긴 시간 동안 지속된다."
    zh_simp: "当携带它的宝可梦\n利用招式或特性展开场地时，\n场地的持续时间会比平时更长。"
    zh_trad: "當攜帶它的寶可夢\n透過招式或特性展開場地時，\n場地的持續時間會比平時更長。"
terrakion_treat:
  names:
    jp_kana: テラキオンのおやつ
    jp_kanji: テラキオンのおやつ
    en: Terrakion Treat
    fr: Friandise Terrakium
    it: Spuntino per Terrakion
    de: Terrakium-Snack
    es: Galleta Terrakion
    ko: 테라키온의간식
    zh_simp: 代拉基翁的点心
    zh_trad: 代拉基翁的點心
  descriptions:
    jp_kana: "伝説のポケモン　テラキオンが\n好む食材で　作られた　おやつ。"
    jp_kanji: "伝説のポケモン　テラキオンが\n好む食材で　作られた　おやつ。"
    en: "A snack made from ingredients favored by the\nLegendary Pokémon Terrakion."
    fr: "Une friandise préparée avec les ingrédients favoris\ndu Pokémon légendaire Terrakium."
    it: "Uno spuntino fatto con gli ingredienti preferiti\ndal Pokémon leggendario Terrakion."
    de: "Dieser Snack wurde mit den Lieblingszutaten des\nLegendären Pokémon Terrakium zubereitet."
    es: "Galleta preparada con los ingredientes favoritos\ndel Pokémon legendario Terrakion."
    ko: "전설의 포켓몬 테라키온이\n좋아하는 식재료로 만들어진 간식."
    zh_simp: "用传说的宝可梦代拉基翁\n喜欢的食材制作的点心。"
    zh_trad: "用傳說的寶可夢代拉基翁\n喜愛的食材製成的點心。"
thanks_mail:
  names:
    jp_kana: かんしゃメール
    jp_kanji: かんしゃメール
    en: Thanks Mail
    fr: Lettre Merci
    it: Messaggio Grazie
    de: Dankesbrief
    es: Carta Gracias
    ko: 감사메일
    zh_simp: 感谢邮件
    zh_trad: 感謝郵件
  descriptions:
    jp_kana: "感謝を　伝える　メールが\n書きやすい　レターペーパー。\nポケモンに　持たせて　使う。"
    jp_kanji: "感謝を　伝える　メールが\n書きやすい　レターペーパー。\nポケモンに　持たせて　使う。"
    en: "Stationery designed to make it easy for you to express\nthanks. Have a Pokémon hold it for delivery."
    fr: "Un papier à lettres idéal pour les remerciements.\nPeut être tenu et livré par un Pokémon."
    it: "Carta da lettere ideale per scrivere dei\nringraziamenti.\nSi usa dandola a un Pokémon."
    de: "Briefpapier, mit dem man sich bei jemandem bedanken\nkann. Gib es einem Pokémon zum Tragen."
    es: "Carta de agradecimiento. Debe llevarla un Pokémon\npara entregarla."
    ko: "감사의 마음을 전하는 메일을\n쉽게 쓸 수 있는 편지지.\n포켓몬에게 지니게 해서 쓴다."
    zh_simp: "方便写表达感谢这类邮件的信纸。\n使用该道具时，\n需要让宝可梦携带着来用。"
    zh_trad: "方便寫表達感謝這類郵件的信紙。\n需讓寶可夢攜帶使用。"
thick_club:
  names:
    jp_kana: ふといホネ
    jp_kanji: ふといホネ
    en: Thick Club
    fr: Masse Os
    it: Osso spesso
    de: Kampfknochen
    es: Hueso Grueso
    ko: 굵은뼈
    zh_simp: 粗骨头
    zh_trad: 粗骨頭
  descriptions:
    jp_kana: "なにかの　硬いホネ。\nカラカラ　または　ガラガラに\n持たせると　攻撃が　あがる。"
    jp_kanji: "なにかの　硬いホネ。\nカラカラ　または　ガラガラに\n持たせると　攻撃が　あがる。"
    en: "An item to be held by Cubone or Marowak. This hard\nbone of unknown origin boosts their Attack stat."
    fr: "Objet à faire tenir à Osselait ou Ossatueur.\nUn os dur qui augmente leur Attaque."
    it: "Strumento da dare a Cubone o Marowak.\nOsso duro che aumenta l’Attacco."
    de: "Ein Item, das von Tragosso oder Knogga getragen\nwerden kann. Dieser harte Knochen erhöht den Angriff."
    es: "Extraño tipo de hueso que potencia los ataques físicos.\nDebe llevarlo Cubone o Marowak."
    ko: "무언가의 단단한 뼈.\n탕구리 혹은 텅구리에게\n지니게 하면 공격이 올라간다."
    zh_simp: "某种坚硬的骨头。\n让卡拉卡拉或嘎啦嘎啦携带后，\n攻击就会提高。"
    zh_trad: "某種堅硬的骨頭。\n讓卡拉卡拉或嘎啦嘎啦攜帶後，\n攻擊就會提高。"
throat_spray:
  names:
    jp_kana: のどスプレー
    jp_kanji: のどスプレー
    en: Throat Spray
    fr: Spray Gorge
    it: Spray gola
    de: Halsspray
    es: Espray Bucal
    ko: 목스프레이
    zh_simp: 爽喉喷雾
    zh_trad: 爽喉噴霧
  descriptions:
    jp_kana: "音に　関する　技を　使うと\n特攻が　上がる。"
    jp_kanji: "音に　関する　技を　使うと\n特攻が　上がる。"
    en: "An item to be held by a Pokémon. If the holder uses\na sound-based move, this throat spray will boost its\nSp. Atk stat."
    fr: "Augmente l’Attaque Spéciale du porteur\nlorsqu’il utilise une capacité basée sur le son."
    it: "Aumenta l’Attacco Speciale quando il Pokémon usa\nuna mossa basata sul suono."
    de: "Erhöht bei Einsatz einer Geräusch-Attacke den\nSpezial-Angriff des Trägers."
    es: "Aumenta el Ataque Especial al emplear un movimiento\nque usa sonido."
    ko: "소리 기술을 사용하면\n특수공격이 올라간다."
    zh_simp: "使用声音相关的招式时，\n特攻会提高。"
    zh_trad: "使用與聲音有關的招式時，\n特攻會提高。"
thunder_stone:
  names:
    jp_kana: かみなりのいし
    jp_kanji: かみなりのいし
    en: Thunder Stone
    fr: Pierre Foudre
    it: Pietratuono
    de: Donnerstein
    es: Piedra Trueno
    ko: 천둥의돌
    zh_simp: 雷之石
    zh_trad: 雷之石
  descriptions:
    jp_kana: "ある特定の　ポケモンを\n進化させる　不思議な石。\n稲妻の模様が　ある。"
    jp_kanji: "ある特定の　ポケモンを\n進化させる　不思議な石。\n稲妻の模様が　ある。"
    en: "A peculiar stone that can make certain species of\nPokémon evolve. It has a distinct thunderbolt pattern."
    fr: "Une pierre étrange qui fait évoluer certaines espèces\nde Pokémon. Un éclair est dessiné dessus."
    it: "Pietra particolare che fa evolvere determinate specie\ndi Pokémon. Riporta l’immagine di un fulmine."
    de: "Dieser besondere Stein löst bei bestimmten Pokémon\ndie Entwicklung aus. Er hat ein Blitzmuster."
    es: "Curiosa piedra que hace evolucionar a determinadas\nespecies de Pokémon. Tiene grabado un rayo."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 돌.\n천둥번개 무늬가 있다."
    zh_simp: "能让某些特定宝可梦\n进化的神奇石头。\n有着闪电般的花纹。"
    zh_trad: "能讓特定寶可夢\n進化的神奇石頭。\n上面有著閃電花紋。"
tidal_bell:
  names:
    jp_kana: うみなりのスズ
    jp_kanji: うみなりのスズ
    en: Tidal Bell
    fr: Glas Tempête
    it: Campana onda
    de: Gischtglocke
    es: Cascabel Oleaje
    ko: 해명의방울
    zh_simp: 海声铃铛
    zh_trad: 海聲鈴鐺
  descriptions:
    jp_kana: "こころ　やすまる　ねいろが　きける\nとても　ふるめかしい　スズ。"
    jp_kanji: "こころ　やすまる　ねいろが　きける\nとても　ふるめかしい　スズ。"
    en: "A very old-fashioned bell that makes a gentle\nringing sound."
    fr: Une cloche antique au tintement apaisant.
    it: "Una campana antica. Produce un suono che dona\npace al cuore."
    de: "Eine altehrwürdige Glocke, deren Läuten alle\nbesänftigt, die es hören."
    es: "Cascabel de aspecto antiguo que emite un sonido que\ncalma el espíritu."
    ko: "마음이 편안해지는 음색이 들리는\n아주 고풍스러운 방울."
    zh_simp: "能发出静心宁神音色的，\n非常古旧的铃铛。"
    zh_trad: "能發出使人心情平靜音色的，\n非常古老的鈴鐺。"
timburr_sweat:
  names:
    jp_kana: ドッコラーのあせ
    jp_kanji: ドッコラーのあせ
    en: Timburr Sweat
    fr: Sueur de Charpenti
    it: Sudore di Timburr
    de: Praktibalk-Schweiß
    es: Sudor de Timburr
    ko: 으랏차의땀
    zh_simp: 搬运小匠的汗
    zh_trad: 搬運小匠的汗
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
time_balm:
  names:
    jp_kana: ときのシズメダマ
    jp_kanji: ときのシズメダマ
    en: Time Balm
    fr: Pacifi-Temps
    it: Sferazen tempo
    de: Zeitruhegabe
    es: Calmasfera Tiempo
    ko: 시간의진정환
    zh_simp: 时之镇宝
    zh_trad: 時之鎮寶
  descriptions:
    jp_kana: "荒ぶる　ディアルガを\n鎮めることが　できる\n不思議な力を　秘めたタマ。"
    jp_kanji: "荒ぶる　ディアルガを\n鎮めることが　できる\n不思議な力を　秘めたタマ。"
    en: "A mysterious balm that somehow has the power to calm\nDialga in its frenzy."
    fr: "L’étrange parfum que dégage cet objet permet d’apaiser\nla frénésie de Dialga."
    it: "Sfera dotata di un misterioso potere in grado di placare\nla collera di Dialga."
    de: "Dieses Säckchen birgt eine mysteriöse Kraft.\nMit ihm kann man Dialga besänftigen."
    es: "Misteriosa esfera imbuida de un poder capaz de calmar\na Dialga cuando se encuentra furioso."
    ko: "폭주하는 디아루가를\n진정시킬 수 있는\n신비한 힘이 담겨 있는 주머니."
    zh_simp: "蕴含着不可思议力量的\n投掷用道具。能让狂暴的\n帝牙卢卡镇静下来。"
    zh_trad: "蘊含著不可思議力量的\n投擲用道具。能讓狂暴的\n帝牙盧卡鎮靜下來。"
timer_ball:
  names:
    jp_kana: タイマーボール
    jp_kanji: タイマーボール
    en: Timer Ball
    fr: Chrono Ball
    it: Timer Ball
    de: Timerball
    es: Turno Ball
    ko: 타이머볼
    zh_simp: 计时球
    zh_trad: 計時球
  descriptions:
    jp_kana: "ターン数が　かかれば　かかるほど\nポケモンが　捕まえやすくなる\nちょっと変わった　ボール。"
    jp_kanji: "ターン数が　かかれば　かかるほど\nポケモンが　捕まえやすくなる\nちょっと変わった　ボール。"
    en: "A somewhat different Poké Ball that becomes more\neffective at catching Pokémon the more turns that are\ntaken in battle."
    fr: "Une Poké Ball un peu spéciale qui fonctionne\nde mieux en mieux à mesure que le combat s’éternise."
    it: "Poké Ball un po’ diversa che diventa via via più efficace\ncon il passare dei turni nella lotta."
    de: "Ein Ball, mit dem sich Pokémon umso leichter fangen\nlassen, je länger der Kampf dauert."
    es: "Poké Ball algo distinta a las demás que va mejorando su\nrendimiento con cada turno de combate."
    ko: "턴 수가 길어지면 길어질수록\n포켓몬을 잡기 쉬운\n조금 특이한 볼."
    zh_simp: "有点与众不同的球。\n回合数花费得越多，\n宝可梦就会越容易捕捉。"
    zh_trad: "有點與眾不同的球。\n回合數花費得越多，\n就越容易捉到寶可夢。"
timid_mint:
  names:
    jp_kana: おくびょうミント
    jp_kanji: おくびょうミント
    en: Timid Mint
    fr: Aromate Timide
    it: Menta Timida
    de: Scheu-Minze
    es: Menta Miedosa
    ko: 겁쟁이민트
    zh_simp: 胆小薄荷
    zh_trad: 膽小薄荷
  descriptions:
    jp_kana: "ポケモンに　香りを　かがせると\n素早さが　上がりやすく　なるが\n攻撃は　上がりにくくなる　ミント。"
    jp_kanji: "ポケモンに　香りを　かがせると\n素早さが　上がりやすく　なるが\n攻撃は　上がりにくくなる　ミント。"
    en: "Having a Pokémon smell this mint can make its Speed\nstat grow stronger. However, its Attack stat may suffer."
    fr: "Si un Pokémon hume cet aromate, sa Vitesse\nmontera plus facilement, mais son Attaque\nse développera plus lentement."
    it: "Quando un Pokémon ne sente il profumo, la sua Velocità\naumenta più facilmente a scapito dell’Attacco."
    de: "Lässt man ein Pokémon an dieser Minze schnuppern,\nsteigt seine Initiative schneller, aber sein Angriff umso\nlangsamer."
    es: "Cuando un Pokémon percibe su aroma, aumenta\ncon más facilidad su Velocidad, en detrimento de su\nAtaque."
    ko: "포켓몬에게 향기를 맡게 하면\n스피드가 오르기 쉬워지지만\n공격이 오르기 어려워지는 민트."
    zh_simp: "宝可梦闻了这种薄荷之后，\n会令速度容易提高，\n而攻击则难以提高。"
    zh_trad: "讓寶可夢聞這種薄荷的氣味，\n會令速度變得容易提高，\n但攻擊則難以提高。"
tin_of_beans:
  names:
    jp_kana: マメかん
    jp_kanji: マメかん
    en: Tin of Beans
    fr: Haricots
    it: Lattina fagioli
    de: Dosenbohnen
    es: Lata de Habas
    ko: 콩통조림
    zh_simp: 豆子罐头
    zh_trad: 豆子罐頭
  descriptions:
    jp_kana: "キャンプの　料理に　使う\n食材の　一種。いっしょに\n煮込むと　マメの　甘味が　広がる。"
    jp_kanji: "キャンプの　料理に　使う\n食材の　一種。いっしょに\n煮込むと　マメの　甘味が　広がる。"
    en: "One of the many ingredients that can be used for\ncooking at your camp. When simmered, the beans\nsuffuse a dish with their mild flavor."
    fr: "Un ingrédient de cuisine pour le camping.\nÀ faire mijoter avec les autres ingrédients\npour que la douce saveur des fèves se propage."
    it: "Uno degli ingredienti che puoi usare per cucinare\nin campeggio. Questi fagioli donano alla pietanza\nun sapore dolce quando vengono bolliti."
    de: "Eine Zutat für PokéCamping-Mahlzeiten. Ihr süßliches\nAroma überträgt sich beim Kochen auf die anderen\nZutaten."
    es: "Un ingrediente para cocinar en el campamento. Al\nestofar las habas en la salsa, esta absorbe parte de su\ndulzor."
    ko: "캠프 요리에 사용되는\n식재료 중 하나. 다른 재료와 같이 넣고\n푹 삶으면 콩의 단맛이 퍼지게 된다."
    zh_simp: "在露营营地制作料理时会使用的\n一种食材。放进料理里一起煮，\n豆子的那种香甜就会散发出来。"
    zh_trad: "製作露營料理時使用的食材之一。\n和其他材料一起燉煮，\n豆子的甜味就會散發出來。"
tinkatink_hair:
  names:
    jp_kana: カヌチャンのけ
    jp_kanji: カヌチャンのけ
    en: Tinkatink Hair
    fr: Poils de Forgerette
    it: Pelo di Tinkatink
    de: Forgita-Haar
    es: Pelo de Tinkatink
    ko: 어리짱의털
    zh_simp: 小锻匠的毛
    zh_trad: 小鍛匠的毛
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
tiny_bamboo_shoot:
  names:
    jp_kana: ちいさなタケノコ
    jp_kanji: ちいさなタケノコ
    en: Tiny Bamboo Shoot
    fr: Petit Bambou
    it: Minibambù
    de: Minibambusspross
    es: Bambú Pequeño
    ko: 작은죽순
    zh_simp: 小竹笋
    zh_trad: 小竹筍
  descriptions:
    jp_kana: "ちいさな　めずらしいタケノコ。\n一部のグルメの　あいだでは\nけっこう人気が　高い。"
    jp_kanji: "ちいさな　めずらしいタケノコ。\n一部のグルメの　あいだでは\nけっこう人気が　高い。"
    en: "A small and rare bamboo shoot. It’s quite popular with\na certain class of gourmands."
    fr: "Une petite pousse de bambou assez rare.\nElle est plutôt populaire auprès de certains gourmets."
    it: "Germoglio di bambù piccolo e raro. È discretamente\napprezzato da alcuni gourmet."
    de: "Ein kleiner und recht seltener Bambusspross, der sich bei\neinigen Feinschmeckern großer Beliebtheit erfreut."
    es: "Un pequeño brote de bambú que es poco común\ny bastante popular entre determinados grupos de\ngourmets."
    ko: "작고 진귀한 죽순.\n일부 미식가 사이에서는\n매우 인기가 높다."
    zh_simp: "小小的珍贵竹笋。\n在部分美食家中\n拥有很高人气。"
    zh_trad: "既小巧又罕見的竹筍。\n在一些饕客之間相當受歡迎。"
tiny_mushroom:
  names:
    jp_kana: ちいさなキノコ
    jp_kanji: ちいさなキノコ
    en: Tiny Mushroom
    fr: Petit Champi
    it: Minifungo
    de: Minipilz
    es: Miniseta
    ko: 작은버섯
    zh_simp: 小蘑菇
    zh_trad: 小蘑菇
  descriptions:
    jp_kana: "ちいさな　めずらしいキノコ。\n一部のマニアの　あいだでは\nけっこう人気が　高い。"
    jp_kanji: "ちいさな　めずらしいキノコ。\n一部のマニアの　あいだでは\nけっこう人気が　高い。"
    en: "A small and rare mushroom. It’s quite popular with\na certain class of collectors."
    fr: "Un petit champignon assez rare.\nIl est plutôt populaire auprès de certains gourmets."
    it: "Fungo piccolo e raro. È discretamente apprezzato\nda alcuni intenditori."
    de: "Ein kleiner und recht seltener Pilz, der sich bei einigen\nSammlern großer Beliebtheit erfreut."
    es: "Una pequeña seta que es poco común y bastante\npopular entre determinados grupos de gourmets."
    ko: "작고 진귀한 버섯.\n일부 마니아 사이에서는\n매우 인기가 높다."
    zh_simp: "珍稀的小蘑菇。\n在一些爱好者中\n有着相当高的人气。"
    zh_trad: "稀奇的小蘑菇。\n在部分愛好者間\n頗受歡迎。"
tm00:
  names:
    jp_kana: わざマシン００
    jp_kanji: わざマシン００
    en: TM00
    fr: CT00
    it: MT00
    de: TM00
    es: MT00
    ko: 기술머신00
    zh_simp: 招式学习器００
    zh_trad: 招式學習器００
  descriptions:
    jp_kana: "力を　こめた　パンチで\n相手を　攻撃する。"
    jp_kanji: "力を　こめた　パンチで\n相手を　攻撃する。"
    en: "The target is slugged by a punch thrown with\nmuscle-packed power."
    fr: "La cible reçoit un coup de poing d’une grande\npuissance."
    it: Il Pokémon attacca il bersaglio con un pugno poderoso.
    de: Ein unglaublich kräftiger Hieb.
    es: Puñetazo de gran potencia.
    ko: "힘을 담은 펀치로\n상대를 공격한다."
    zh_simp: 用充满力量的拳头攻击对手。
    zh_trad: "用帶有強大力量的拳頭\n攻擊對手。"
