crown_pass:
  names:
    jp_kana: カンムリパス
    jp_kanji: カンムリパス
    en: Crown Pass
    fr: Pass Couronneige
    it: Pass Corona
    de: Kronenpass
    es: Pase Corona
    ko: 왕관패스
    zh_simp: 王冠车票
    zh_trad: 王冠車票
  descriptions:
    jp_kana: "カンムリ雪原に　行くための　パス。\nブラッシータウンの　駅で\n駅員さんに　見せよう。"
    jp_kanji: "カンムリ雪原に　行くための　パス。\nブラッシータウンの　駅で\n駅員さんに　見せよう。"
    en: "A pass to go to the Crown Tundra. Show it to the rail\nstaff at Wedgehurst Station."
    fr: "Un pass pour se rendre à Couronneige.\nMontrez-le à l’employé de la Gare de Brasswick."
    it: "Un pass necessario per raggiungere la Landa Corona.\nMostralo al personale della Stazione di Brassbury."
    de: "Ein Pass, mit dem du zu den Kronen-Schneelanden\ngelangst. Zeige ihn dem Personal am Brassbury-Bahnhof."
    es: "Un pase que permite viajar hasta las Nieves de la\nCorona. Hay que mostrárselo al empleado de la\nestación de Pueblo Par."
    ko: "왕관설원에 갈 수 있는 패스.\n브래시마을역에 있는\n역무원에게 보여 주자."
    zh_simp: "前往王冠雪原的车票。\n在木杆镇的车站，\n把它出示给站务员看吧。"
    zh_trad: "前往王冠雪原的車票。\n在木桿鎮的車站\n把它出示給站務員看吧。"
crunchy_salt:
  names:
    jp_kana: ごりごりミネラル
    jp_kanji: ごりごりミネラル
    en: Crunchy Salt
    fr: Sel Rochedur
    it: Minerale duro
    de: Knirschmineral
    es: Mineral Crocante
    ko: 단단미네랄
    zh_simp: 坚坚矿
    zh_trad: 堅堅礦
  descriptions:
    jp_kana: "透き通ったミネラルの塊。\n草や岩のようなポケモンの好物で\n投げた場所に引き寄せることができる。"
    jp_kanji: "透き通ったミネラルの塊。\n草や岩のようなポケモンの好物で\n投げた場所に引き寄せることができる。"
    en: "Translucent crystals that are beloved by Pokémon\nbearing a resemblance to grass, plants, or minerals.\nThey will gather wherever a lump of this salt is thrown."
    fr: "Un amas minéral transparent. Particulièrement apprécié\ndes Pokémon pareils à des plantes ou à des roches,\nil les attire là où vous le lancez."
    it: "Pezzo di minerale trasparente. Molto apprezzato, tra\ngli altri, da Pokémon simili a vegetali o rocce, li attira\nladdove viene lanciato."
    de: "Ein durchsichtiges Mineral. Fels- und pflanzenähnliche\nPokémon lieben es besonders und lassen sich anlocken,\nwenn es ihnen zugeworfen wird."
    es: "Trozo de un mineral transparente. Adorado por los\nPokémon con atributos vegetales o rocosos, que se\nverán atraídos allá donde lo lances."
    ko: "투명한 미네랄 덩어리.\n풀이나 바위 같은 포켓몬이 좋아해서\n던진 곳으로 유인할 수 있다."
    zh_simp: "晶莹剔透的矿物。\n是草类和岩石类宝可梦喜爱的食物，\n能吸引它们聚集到投向的地方。"
    zh_trad: "晶瑩通透的礦物。\n是草類和岩石類寶可夢喜愛的食物，\n能吸引牠們聚集到投向的地方。"
cryogonal_ice:
  names:
    jp_kana: フリージオのこおり
    jp_kanji: フリージオのこおり
    en: Cryogonal Ice
    fr: Glace d’Hexagel
    it: Ghiaccio di Cryogonal
    de: Frigometri-Eis
    es: Hielo de Cryogonal
    ko: 프리지오의얼음
    zh_simp: 几何雪花的冰
    zh_trad: 幾何雪花的冰
  descriptions:
