payapa_berry:
  names:
    jp_kana: ウタンのみ
    jp_kanji: ウタンのみ
    en: Payapa Berry
    fr: Baie Yapap
    it: Baccapayapa
    de: Pyapabeere
    es: Baya Payapa
    ko: 야파열매
    zh_simp: 福禄果
    zh_trad: 福祿果
  descriptions:
    jp_kana: "ポケモンに　持たせると\n効果バツグンの　エスパー技を\n受けたとき　威力が　弱まる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　エスパー技を\n受けたとき　威力が　弱まる。"
    en: "If a Pokémon holding this Berry is hit with a\nsupereffective Psychic-type move, the power of that\nmove will be weakened."
    fr: "Tenue, cette Baie réduit les dégâts subis lorsque\nle Pokémon est touché par une capacité super efficace\nde type Psy."
    it: "Se il Pokémon che ha questa bacca subisce una mossa\nsuperefficace di tipo Psico, la potenza della mossa\nviene indebolita."
    de: "Als getragenes Item schwächt diese Beere eine\nsehr effektive Psycho-Attacke, von der das Pokémon\ngetroffen wird."
    es: "Si la lleva un Pokémon, debilita un ataque supereficaz\nde tipo Psíquico que reciba."
    ko: "포켓몬에게 지니게 하면\n효과가 굉장한 에스퍼 기술로\n공격받았을 때 위력이 약해진다."
    zh_simp: "让宝可梦携带后，\n在受到效果绝佳的超能力属性招式\n攻击时，能令其威力减弱。"
    zh_trad: "讓寶可夢攜帶後，\n在受到效果絕佳的超能力屬性招式\n攻擊時，能使其威力減弱。"
peach_chairs:
  names:
    jp_kana: ベージュチェア
    jp_kanji: ベージュチェア
    en: Peach Chairs
    fr: Sièges Beiges
    it: Sedie pesca
    de: Beige Stühle
    es: Sillas Beis
    ko: 베이지 체어
    zh_simp: 米色椅子
    zh_trad: 米色椅子
  descriptions:
    jp_kana: "ピクニックで　使いやすい　イス。\nベージュクロスの　デザインを\nもとに　作ってもらった。"
    jp_kanji: "ピクニックで　使いやすい　イス。\nベージュクロスの　デザインを\nもとに　作ってもらった。"
    en: "A set of chairs that are ideal for picnicking. Their design\nwas inspired by the Peach Tablecloth."
    fr: "Des sièges parfaits pour les pique-niques.\nLeur design est inspiré de la Nappe Beige."
    it: "Pratiche sedie, perfette per i picnic, ispirate al design\ndella Tovaglia pesca."
    de: "Diese Stühle sind gut geeignet für Picknicks.\nIhr Design basiert auf dem Beigen Tischtuch."
    es: "Unas sillas ideales para irse de pícnic. Su diseño está\nbasado en el del Mantel Beis."
    ko: "피크닉에서 사용하기 편한 의자.\n베이지 테이블보의\n디자인을 토대로 만들어졌다."
    zh_simp: "在野餐时很好用的椅子。\n根据米色桌巾的设计制作而成。"
    zh_trad: "野餐時很好用的椅子。\n根據米色桌巾的設計製作而成。"
peach_tablecloth:
  names:
    jp_kana: ベージュクロス
    jp_kanji: ベージュクロス
    en: Peach Tablecloth
    fr: Nappe Beige
    it: Tovaglia pesca
    de: Beiges Tischtuch
    es: Mantel Beis
    ko: 베이지 테이블보
    zh_simp: 米色桌巾
    zh_trad: 米色桌巾
  descriptions:
    jp_kana: "やわらかい　ベージュカラーの　テーブルクロス。\n肌に優しい　サラリとした　さわり心地で\n食器を　置いても　音を　立てない。"
    jp_kanji: "やわらかい　ベージュカラーの　テーブルクロス。\n肌に優しい　サラリとした　さわり心地で\n食器を　置いても　音を　立てない。"
    en: "A light peach-colored tablecloth. It’s smooth and\npleasant to the touch, and dishes can be placed on\nit with hardly a sound."
    fr: "Une nappe d’une douce couleur beige. Sa texture\nsatinée est agréable au toucher et étouffe le bruit\ndes plats lorsqu’on les pose dessus."
    it: "Tovaglia di un delicato color pesca. È così liscia e\nmorbida al tatto che quando ci poggi le stoviglie\nnon fanno rumore."
    de: "Dieses weiche beige Tischtuch aus hautfreundlichem,\nglattem Material absorbiert jegliches Geräusch von\nGeschirr, das darauf platziert wird."
    es: "Un mantel de un suave color beis. Está hecho de un\nmaterial tan sedoso y delicado que hasta absorbe el\nsonido que producen los platos al colocarlos sobre él."
    ko: "부드러운 베이지 컬러의 테이블보.\n피부에 자극이 적은 매끈한 재질이며\n식기를 올려놓아도 소리가 나지 않는다."
    zh_simp: "柔软的米色桌巾。\n丝柔顺滑亲近肌肤，\n放上餐具也不会发出声音。"
    zh_trad: "以柔和的米色為質地的桌巾。\n觸感輕柔，如同撫過肌膚一般，\n而且放置餐具時也不會發出聲響。"
peanut_butter:
  names:
    jp_kana: ピーナッツバター
    jp_kanji: ピーナッツバター
    en: Peanut Butter
    fr: Beurre de Cacahuètes
    it: Burro di arachidi
    de: Erdnussbutter
    es: Crema de Cacahuete
    ko: 땅콩버터
    zh_simp: 花生酱
    zh_trad: 花生醬
  descriptions:
    jp_kana: "甘味が　強い　調味料。\nパルデア地方では　無糖よりも\n甘いほうが　人気らしい。"
    jp_kanji: "甘味が　強い　調味料。\nパルデア地方では　無糖よりも\n甘いほうが　人気らしい。"
    en: "A very sweet condiment. People in Paldea seem to favor\nthe sweet varieties over the unsweetened."
    fr: "Un condiment au goût très sucré. À Paldea, la version\nsucrée semble être plus populaire que la version nature."
    it: "Un condimento molto dolce. A Paldea questa versione\nè più amata di quella senza zucchero."
    de: "Ein sehr süßes Würzmittel. In Paldea steht diese Variante\noffenbar höher im Kurs als die zuckerfreie Alternative."
    es: "Un ingrediente muy dulce. La versión con azúcar\nañadido es la más popular en Paldea."
    ko: "단맛이 강한 조미료.\n팔데아지방에서는 무가당보다\n당분이 있는 쪽이 인기 있다고 한다."
    zh_simp: "甜味强烈的调味料。\n在帕底亚地区比起无糖，\n似乎甜甜的更受人欢迎。"
    zh_trad: "甜味強勁的調味料。\n在帕底亞地區，有甜味似乎比\n無甜味更受到歡迎。"
pearl:
  names:
    jp_kana: しんじゅ
    jp_kanji: しんじゅ
    en: Pearl
    fr: Perle
    it: Perla
    de: Perle
    es: Perla
    ko: 진주
    zh_simp: 珍珠
    zh_trad: 珍珠
  descriptions:
    jp_kana: "きれいな銀色に　光る\n少しちいさめの　真珠。\nショップで　安く　売れる。"
    jp_kanji: "きれいな銀色に　光る\n少しちいさめの　真珠。\nショップで　安く　売れる。"
    en: "A rather small pearl that has a nice silvery sheen to it.\nIt can be sold at a low price to shops."
    fr: "Une petite perle qui brille d’une jolie couleur argent.\nPeut être vendue à bas prix en magasin."
    it: "Perla piuttosto piccola dai graziosi riflessi argentei.\nSi può vendere a un prezzo basso nei negozi."
    de: "Eine relativ kleine Perle, die in schönem Silber funkelt.\nKann für wenig Geld verkauft werden."
    es: "Brillante perla pequeña y plateada que no alcanza un\nbuen precio en las tiendas."
    ko: "예쁜 은색으로 빛나는\n자그마한 진주.\n상점에서 싸게 팔린다."
    zh_simp: "散发着美丽银辉\n且有点小的珍珠。\n可以在商店低价出售。"
    zh_trad: "散發著美麗銀輝的\n有點小的珍珠。\n可以在商店低價出售。"
pearl_string:
  names:
    jp_kana: おだんごしんじゅ
    jp_kanji: おだんごしんじゅ
    en: Pearl String
    fr: Perle Triple
    it: Trittiperla
    de: Triperle
    es: Sarta de Perlas
    ko: 경단진주
    zh_simp: 丸子珍珠
    zh_trad: 丸子珍珠
  descriptions:
    jp_kana: "きれいな銀色に　光る\nとても大粒の　真珠。\nショップで　高く　売れる。"
    jp_kanji: "きれいな銀色に　光る\nとても大粒の　真珠。\nショップで　高く　売れる。"
    en: "Very large pearls that have a nice silvery sheen to them.\nThey can be sold at a high price to shops."
    fr: "Une grappe de perles brillant d’une jolie couleur argent.\nPeut être vendue à bon prix en magasin."
    it: "Grosse perle dai riflessi argentei. Si possono vendere\na un prezzo alto nei negozi."
    de: "Große Perlen, die in schönem Silber funkeln. Können für\nviel Geld verkauft werden."
    es: "Brillantes perlas plateadas de gran tamaño que pueden\nvenderse a buen precio en las tiendas."
    ko: "예쁜 은색으로 빛나는\n매우 큰 낱알의 진주.\n상점에서 비싸게 팔린다."
    zh_simp: "散发着美丽银辉\n且非常大颗的珍珠。\n可以在商店高价出售。"
    zh_trad: "散發著美麗銀輝的\n非常大顆的珍珠。\n可以在商店高價出售。"
peat_block:
  names:
    jp_kana: ピートブロック
    jp_kanji: ピートブロック
    en: Peat Block
    fr: Bloc de Tourbe
    it: Blocco di torba
    de: Torfblock
    es: Bloque de Turba
    ko: 피트블록
    zh_simp: 泥炭块
    zh_trad: 泥炭塊
  descriptions:
    jp_kana: "泥のような石炭のかたまり。\n乾かすことで燃料としても使える。\nあるポケモンが好んでいる。"
    jp_kanji: "泥のような石炭のかたまり。\n乾かすことで燃料としても使える。\nあるポケモンが好んでいる。"
    en: "A block of muddy material that can be used as fuel for\nburning when it is dried. It’s loved by a certain Pokémon."
    fr: "Un Bloc de Tourbe similaire à de la boue qu’on peut\nutiliser comme combustible une fois séché.\nIl est apprécié d’un certain Pokémon."
    it: "Agglomerato di una sostanza fangosa a base di carbone.\nSe essiccato, può anche essere impiegato come\ncarburante. Piace a un Pokémon in particolare."
    de: "Ein schlammähnlicher Klumpen, der getrocknet als\nBrennmaterial genutzt werden kann. Das Lieblingsstück\neines bestimmten Pokémon."
    es: "Pedrusco de carbón que se asemeja al lodo y que se\npuede emplear como combustible tras secarse. Le\nencanta a cierto Pokémon."
    ko: "진흙 같은 석탄 덩어리.\n말리면 연료로도 쓸 수 있다.\n어떤 포켓몬이 좋아하는 물건이다."
    zh_simp: "质地像是泥土的煤炭块。\n干燥后也能当成燃料使用。\n某种宝可梦很喜欢它。"
    zh_trad: "質地像是泥土的煤炭塊。\n乾燥後也能當成燃料使用。\n某種寶可夢很喜歡它。"
pecha_berry:
  names:
    jp_kana: モモンのみ
    jp_kanji: モモンのみ
    en: Pecha Berry
    fr: Baie Pêcha
    it: Baccapesca
    de: Pirsifbeere
    es: Baya Meloc
    ko: 복슝열매
    zh_simp: 桃桃果
    zh_trad: 桃桃果
  descriptions:
    jp_kana: "ポケモンに　持たせると\n毒を　回復する。"
    jp_kanji: "ポケモンに　持たせると\n毒を　回復する。"
    en: "If a Pokémon holds one of these Berries, it will be able\nto lift the effects of being poisoned from itself."
    fr: "Une Baie qui soigne l’empoisonnement lorsqu’elle est\ntenue par un Pokémon."
    it: "Se un Pokémon ha questa bacca, guarisce\ndall’avvelenamento."
    de: "Als getragenes Item heilt diese Beere das Pokémon von\nVergiftung."
    es: "Los Pokémon pueden llevarla y usarla para curarse\ndel envenenamiento."
    ko: "포켓몬에게 지니게 하면\n독을 회복한다."
    zh_simp: "让宝可梦携带后，\n可以治愈中毒。"
    zh_trad: "讓寶可夢攜帶後，\n可以治癒中毒。"
pep_up_plant:
  names:
    jp_kana: ピーピーグサ
    jp_kanji: ピーピーグサ
    en: Pep-Up Plant
    fr: Plante PP
    it: Erba PP
    de: Ätherkraut
    es: Hierba Éter
    ko: PP풀
    zh_simp: ＰＰ草
    zh_trad: ＰＰ草
  descriptions:
    jp_kana: "辛味が強いが滋養強壮に効く。\nポケモンのＰＰを回復したり\n能力をアップさせる道具の材料となる。"
    jp_kanji: "辛味が強いが滋養強壮に効く。\nポケモンのＰＰを回復したり\n能力をアップさせる道具の材料となる。"
    en: "Extremely spicy but also highly nutritious. This herb is\nused as a material for crafting items that can restore PP\nto Pokémon or boost their stats."
    fr: "Cette plante très épicée est riche en éléments nutritifs.\nOn l’utilise pour la confection d’objets qui restaurent\nles PP ou qui augmentent les stats des Pokémon."
    it: "Ingrediente per la preparazione di strumenti che\nripristinano PP o aumentano le statistiche. È molto\npiccante ma altrettanto nutriente."
    de: "Dieses Kraut wird zur Herstellung von Items genutzt,\ndie Statuswerte von Pokémon erhöhen oder ihre AP\nwiederherstellen. Es ist sehr scharf, aber äußerst nahrhaft."
    es: "De sabor picante pero excelentes cualidades nutritivas.\nUn ingrediente vital para crear objetos que restauren los\nPP o que aumenten las características de un Pokémon."
    ko: "매운맛이 강하지만 자양 강장의 효과가 있다.\n포켓몬의 PP를 회복하거나\n능력을 올리는 도구의 재료가 된다."
    zh_simp: "味道辛辣，有滋补强身的效果。\n能回复宝可梦的ＰＰ，以及\n作为能力强化道具的材料。"
    zh_trad: "味道辛辣，有滋補強身的效果。\n能回復寶可夢的ＰＰ，以及\n作為能力強化道具的材料。"
pepper:
  names:
    jp_kana: ペッパー
    jp_kanji: ペッパー
    en: Pepper
    fr: Poivre
    it: Pepe
    de: Pfeffer
    es: Pimienta
    ko: 후추
    zh_simp: 胡椒
    zh_trad: 胡椒
  descriptions:
    jp_kana: "辛味が　強い　調味料。\n脂っこい食材と　相性が　よい。\n隠し味として　少し　使おう。"
    jp_kanji: "辛味が　強い　調味料。\n脂っこい食材と　相性が　よい。\n隠し味として　少し　使おう。"
    en: "A seasoning packing very spicy flavor. It goes nicely\nwith oilier foods and works especially well when you\nadd just a pinch for a hint of flavor."
    fr: "Un condiment au goût très épicé. Utilisé avec\nparcimonie, il fonctionne à merveille, et se marie\nparticulièrement bien avec les aliments gras."
    it: "Un condimento molto piccante che si abbina bene\nagli ingredienti grassi. Ne basta una piccola quantità\ncome tocco finale."
    de: "Dieses sehr scharfe Würzmittel passt gut zu fettigen\nZutaten und verleiht Speisen das gewisse Etwas."
    es: "Este condimento de sabor picante combina\nparticularmente bien como sabor de fondo con\ningredientes con alto contenido graso."
    ko: "매운맛이 강한 조미료.\n느끼한 식재료와 궁합이 잘 맞는다.\n포인트를 주는 용도로 조금씩 사용하자."
    zh_simp: "辣味强烈的调味料。\n与油腻的食材很搭配。\n来加一点提升风味吧。"
    zh_trad: "辣味強勁的調味料。\n和油膩的食材相當搭配。\n不妨加入少許來提味。"
permit:
  names:
    jp_kana: きょかしょう
    jp_kanji: きょかしょう
    en: Permit
    fr: Permis
    it: Permesso
    de: Genehmigung
    es: Pase
    ko: 허가증
    zh_simp: 许可证
    zh_trad: 許可證
  descriptions:
    jp_kana: "わずかな人しか　知らない\n自然保護区に　入るために\n必要な　ライセンスカード。"
    jp_kanji: "わずかな人しか　知らない\n自然保護区に　入るために\n必要な　ライセンスカード。"
    en: "A permit that is needed to enter the Nature Preserve,\na place that not many people know about."
    fr: "Un permis nécessaire pour pénétrer dans la Réserve\nNaturelle, lieu protégé des foules modernes."
    it: "Tessera che permette di accedere a una Riserva\nNaturale conosciuta da pochi."
    de: "Eine Genehmigung in Form einer Karte, die den Zutritt\nins Naturschutzgebiet ermöglicht. Nur wenige kennen\nden Ort."
    es: "Permiso necesario para acceder a la Reserva Natural,\nlugar que solo unos pocos conocen."
    ko: "소수의 사람밖에 모르는\n자연보호구역에 들어가기 위해\n필요한 라이선스 카드."
    zh_simp: "只有极少数人才知道的，\n进入自然保护区所需的授权卡。"
    zh_trad: "進入只有極少數人\n才知道的自然保護區時，\n所需的授權卡。"
persim_berry:
  names:
    jp_kana: キーのみ
    jp_kanji: キーのみ
    en: Persim Berry
    fr: Baie Kika
    it: Baccaki
    de: Persimbeere
    es: Baya Caquic
    ko: 시몬열매
    zh_simp: 柿仔果
    zh_trad: 柿仔果
  descriptions:
    jp_kana: "ポケモンに　持たせると\n混乱を　回復する。"
    jp_kanji: "ポケモンに　持たせると\n混乱を　回復する。"
    en: "If a Pokémon holds one of these Berries, it will be able\nto cure itself of confusion."
    fr: "Une Baie qui soigne la confusion lorsqu’elle est tenue\npar un Pokémon."
    it: "Se un Pokémon ha questa bacca, guarisce\ndalla confusione."
    de: "Als getragenes Item heilt diese Beere das Pokémon von\nVerwirrung."
    es: "Los Pokémon pueden llevarla y usarla para librarse de\nla confusión."
    ko: "포켓몬에게 지니게 하면\n혼란을 회복한다."
    zh_simp: "让宝可梦携带后，\n可以治愈混乱。"
    zh_trad: "讓寶可夢攜帶後，\n可以治癒混亂。"
petaya_berry:
  names:
    jp_kana: ヤタピのみ
    jp_kanji: ヤタピのみ
    en: Petaya Berry
    fr: Baie Pitaye
    it: Baccapitaya
    de: Tahaybeere
    es: Baya Yapati
    ko: 야타비열매
    zh_simp: 龙火果
    zh_trad: 龍火果
  descriptions:
    jp_kana: "ポケモンに　持たせると\nピンチのとき　自分の\n特攻が　あがる。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　自分の\n特攻が　あがる。"
    en: "If a Pokémon holds one of these Berries, its Sp. Atk stat\nwill be boosted should it find itself in a pinch."
    fr: "Tenue, cette Baie augmente l’Attaque Spéciale\nen cas de besoin."
    it: "Se il Pokémon che ha questa bacca si trova in difficoltà,\nil suo Attacco Speciale aumenta."
    de: "Als getragenes Item erhöht diese Beere den\nSpezial-Angriff des Pokémon, sobald es in\neiner Notlage steckt."
    es: "Si la lleva un Pokémon, le aumenta el Ataque Especial en\nun momento de apuro."
    ko: "포켓몬에게 지니게 하면\n위급할 때 자신의\n특수공격이 올라간다."
    zh_simp: "让宝可梦携带后，危机时，\n自己的特攻就会提高。"
    zh_trad: "讓寶可夢攜帶後，\n危機時，自己的\n特攻就會提高。"
petilil_leaf:
  names:
    jp_kana: チュリネのはっぱ
    jp_kanji: チュリネのはっぱ
    en: Petilil Leaf
    fr: Feuille de Chlorobule
    it: Foglia di Petilil
    de: Lilminip-Blatt
    es: Hoja de Petilil
    ko: 치릴리의잎
    zh_simp: 百合根娃娃的叶片
    zh_trad: 百合根娃娃的葉片
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
pewter_crunchies:
  names:
    jp_kana: ニビあられ
    jp_kanji: ニビあられ
    en: Pewter Crunchies
    fr: Crok’Argenta
    it: Plumbeosalatini
    de: Marmoria-Kräcker
    es: Rokikos
    ko: 회색강정
    zh_simp: 深灰米果
    zh_trad: 深灰米果
  descriptions:
    jp_kana: "ニビ名物の　あられ。\nポケモン　１匹の　状態異常を\nすべて　回復する。"
    jp_kanji: "ニビ名物の　あられ。\nポケモン　１匹の　状態異常を\nすべて　回復する。"
    en: "Pewter City’s famous crunchy snack. They can be used\nto cure any status condition a Pokémon may have."
    fr: "Une spécialité d’Argenta.\nSoigne toutes les altérations de statut d’un Pokémon."
    it: "I salatini tipici di Plumbeopoli. Curano tutti i problemi\ndi stato di un Pokémon."
    de: "Diese Kräcker sind eine Spezialität aus Marmoria City.\nSie beheben alle Statusprobleme eines Pokémon."
    es: "Tentempié típico de Ciudad Plateada. Cura todos los\nproblemas de estado de un Pokémon."
    ko: "회색시티의 명물인 강정.\n포켓몬 1마리의 상태 이상을\n모두 회복한다."
    zh_simp: "深灰特产的糕点。\n能治愈１只宝可梦的\n所有异常状态。"
    zh_trad: "深灰市特產的米果。\n能治癒１隻寶可夢的\n所有異常狀態。"
phanpy_nail:
  names:
