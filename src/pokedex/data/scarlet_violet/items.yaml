shiny_charm:
  names:
    jp_kana: ひかるおまもり
    jp_kanji: ひかるおまもり
    en: Shiny Charm
    fr: Charme Chroma
    it: Cromamuleto
    de: Schillerpin
    es: Amuleto Iris
    ko: 빛나는부적
    zh_simp: 闪耀护符
    zh_trad: 閃耀護符
  descriptions:
    jp_kana: "持っていると　ひかる　ポケモンと\n出会いやすくなる　といわれる\n不思議で　ひかりかがやく　おまもり。"
    jp_kanji: "持っていると　ひかる　ポケモンと\n出会いやすくなる　といわれる\n不思議で　ひかりかがやく　おまもり。"
    en: "Having one of these mysterious shining charms makes it\nmore likely you’ll encounter Shiny Pokémon in the wild."
    fr: "Un mystérieux charme scintillant qui facilite la rencontre\navec les Pokémon chromatiques."
    it: "Misterioso amuleto luminoso che aumenta la probabilità\ndi incontrare Pokémon cromatici."
    de: "Ein mysteriöser, schillernder Glücksbringer, der die\nWahrscheinlichkeit erhöht, Schillernde Pokémon zu\nfinden."
    es: "Misterioso amuleto brillante que aumenta la\nprobabilidad de encontrar Pokémon variocolor."
    ko: "지니고 있으면 빛나는 포켓몬과\n만나기 쉬워진다고 전해지는\n이상하고 매우 반짝이는 부적."
    zh_simp: "拥有它之后，据说会\n更容易遇见发光宝可梦的\n神奇闪光护符。"
    zh_trad: "只要擁有它，據說會變得\n更容易遇見發光寶可夢的\n神奇閃光護符。"
shiny_stone:
  names:
    jp_kana: ひかりのいし
    jp_kanji: ひかりのいし
    en: Shiny Stone
    fr: Pierre Éclat
    it: Pietrabrillo
    de: Leuchtstein
    es: Piedra Día
    ko: 빛의돌
    zh_simp: 光之石
    zh_trad: 光之石
  descriptions:
    jp_kana: "ある特定の　ポケモンを\n進化させる　不思議な石。\nひかりのように　まぶしい。"
    jp_kanji: "ある特定の　ポケモンを\n進化させる　不思議な石。\nひかりのように　まぶしい。"
    en: "A peculiar stone that can make certain species of\nPokémon evolve. It shines with a dazzling light."
    fr: "Une pierre étrange qui fait évoluer certaines espèces\nde Pokémon. Elle brille d’une lumière aveuglante."
    it: "Pietra particolare che fa evolvere determinate specie\ndi Pokémon. Brilla di una luce abbagliante."
    de: "Dieser besondere Stein löst bei bestimmten Pokémon\ndie Entwicklung aus. Er leuchtet hell."
    es: "Curiosa piedra que hace evolucionar a determinadas\nespecies de Pokémon. Tiene un brillo espectacular."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 돌.\n빛처럼 눈부시다."
    zh_simp: "能让某些特定宝可梦\n进化的神奇石头。\n像光芒一样耀眼。"
    zh_trad: "能讓特定寶可夢\n進化的神奇石頭。\n像光芒一樣耀眼。"
shoal_salt:
  names:
    jp_kana: あさせのしお
    jp_kanji: あさせのしお
    en: Shoal Salt
    fr: Sel Tréfonds
    it: Sale ondoso
    de: Küstensalz
    es: Sal Cardumen
    ko: 여울소금
    zh_simp: 浅滩海盐
    zh_trad: 淺灘海鹽
  descriptions:
    jp_kana: "浅瀬の洞穴で\n見つけた　塩。"
    jp_kanji: "浅瀬の洞穴で\n見つけた　塩。"
    en: Salt that was found inside Shoal Cave.
    fr: Du sel provenant de la Grotte Tréfonds.
    it: Sale rinvenuto nella Grotta Ondosa.
    de: "Reine Salzkristalle, die du in der Küstenhöhle\ngefunden hast."
    es: "Una sal muy fina que se encuentra en la Cueva\nCardumen."
    ko: "여울의 동굴에서\n발견한 소금."
    zh_simp: "在浅滩洞穴这地方\n找到的海盐。"
    zh_trad: "在名為淺灘洞穴的地方\n找到的海鹽。"
shoal_shell:
  names:
    jp_kana: あさせのかいがら
    jp_kanji: あさせのかいがら
    en: Shoal Shell
    fr: CoquilleTréfonds
    it: Gusciondoso
    de: Küstenschale
    es: Concha Cardumen
    ko: 여울조개껍질
    zh_simp: 浅滩贝壳
    zh_trad: 淺灘貝殼
  descriptions:
    jp_kana: "浅瀬の洞穴で\n見つけた　貝殻。"
    jp_kanji: "浅瀬の洞穴で\n見つけた　貝殻。"
    en: A seashell that was found inside Shoal Cave.
    fr: Un coquillage provenant de la Grotte Tréfonds.
    it: Guscio rinvenuto nella Grotta Ondosa.
    de: "Eine hübsche Muschelschale, die du in der Küstenhöhle\ngefunden hast."
    es: Concha que se encuentra en la Cueva Cardumen.
    ko: "여울의 동굴에서\n발견한 조개껍질."
    zh_simp: "在浅滩洞穴这地方\n找到的贝壳。"
    zh_trad: "在名為淺灘洞穴的地方\n找到的貝殼。"
shock_drive:
  names:
    jp_kana: イナズマカセット
    jp_kanji: イナズマカセット
    en: Shock Drive
    fr: Module Choc
    it: Voltmodulo
    de: Blitzmodul
    es: FulgoROM
    ko: 번개카세트
    zh_simp: 闪电卡带
    zh_trad: 閃電卡帶
  descriptions:
    jp_kana: "ゲノセクトに　持たせると\nテクノバスターという　技が\nでんきタイプになる　カセット。"
    jp_kanji: "ゲノセクトに　持たせると\nテクノバスターという　技が\nでんきタイプになる　カセット。"
    en: "A cassette to be held by Genesect. It changes\nGenesect’s Techno Blast move so it becomes\nElectric type."
    fr: "Tenu par Genesect, ce module change la capacité\nTechno-Buster en une capacité de type Électrik."
    it: "Modulo da dare a Genesect. Trasforma Tecnobotto\nin una mossa di tipo Elettro."
    de: "Ein Item, das von Genesect getragen werden kann.\nEs wandelt den Typ der Attacke Techblaster in\nElektro um."
    es: "Cartucho que convierte Tecno Shock de Genesect en un\nmovimiento de tipo Eléctrico."
    ko: "게노세크트에게 지니게 하면\n테크노버스터라는 기술이\n전기타입으로 바뀌는 카세트."
    zh_simp: "这是让盖诺赛克特携带的卡带。\n携带后，高科技光炮这招式\n就会变为电属性。"
    zh_trad: "讓蓋諾賽克特攜帶的卡帶。\n攜帶後，招式高科技光炮\n會變為電屬性。"
shroodle_ink:
  names:
    jp_kana: シルシュルーのインク
    jp_kanji: シルシュルーのインク
    en: Shroodle Ink
    fr: Encre de Gribouraigne
    it: Inchiostro di Shroodle
    de: Sproxi-Tinte
    es: Tinta de Shroodle
    ko: 땃쭈르의잉크
    zh_simp: 滋汁鼹的墨汁
    zh_trad: 滋汁鼴的墨汁
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
