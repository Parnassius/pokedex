    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
nymble_claw:
  names:
    jp_kana: マメバッタのツメ
    jp_kanji: マメバッタのツメ
    en: Nymble Claw
    fr: Griffe de Lilliterelle
    it: Artiglio di Nymble
    de: Micrick-Kralle
    es: Garra de Nymble
    ko: 콩알뚜기의발톱
    zh_simp: 豆蟋蟀的爪子
    zh_trad: 豆蟋蟀的爪子
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
oaks_letter:
  names:
    jp_kana: オーキドのてがみ
    jp_kanji: オーキドのてがみ
    en: Oak’s Letter
    fr: Lettre Chen
    it: Lettera Oak
    de: Eichs Brief
    es: Carta Prof. Oak
    ko: 오박사의편지
    zh_simp: 大木的信
    zh_trad: 大木的信
  descriptions:
    jp_kana: "オーキド博士からの　手紙。\n中には　２２４番道路に\n来てほしいと　書かれている。"
    jp_kanji: "オーキド博士からの　手紙。\n中には　２２４番道路に\n来てほしいと　書かれている。"
    en: "A letter from Professor Oak. Written in it is a request for\nyou to go to Route 224."
    fr: "Une lettre du Professeur Chen vous demandant\nde vous rendre sur la Route 224."
    it: "Lettera del Professor Oak con la richiesta di dirigerti\nverso il Percorso 224."
    de: "Ein Brief von Professor Eich. Er bittet dich,\nzur Route 224 zu gehen."
    es: "Carta del Profesor Oak en la que se te pide que vayas a\nla Ruta 224."
    ko: "오박사의 편지다.\n안에는 224번도로로\n와 달라고 적혀 있다."
    zh_simp: "大木博士的来信。\n上面写着请来２２４号道路。"
    zh_trad: "來自大木博士的信。\n上面寫著請來\n２２４號道路。"
occa_berry:
  names:
    jp_kana: オッカのみ
    jp_kanji: オッカのみ
    en: Occa Berry
    fr: Baie Chocco
    it: Baccacao
    de: Koakobeere
    es: Baya Caoca
    ko: 오카열매
    zh_simp: 巧可果
    zh_trad: 巧可果
  descriptions:
    jp_kana: "ポケモンに　持たせると\n効果バツグンの　ほのお技を\n受けたとき　威力が　弱まる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　ほのお技を\n受けたとき　威力が　弱まる。"
    en: "If a Pokémon holding this Berry is hit with a\nsupereffective Fire-type move, the power of that\nmove will be weakened."
    fr: "Tenue, cette Baie réduit les dégâts subis lorsque\nle Pokémon est touché par une capacité super efficace\nde type Feu."
    it: "Se il Pokémon che ha questa bacca subisce una mossa\nsuperefficace di tipo Fuoco, la potenza della mossa\nviene indebolita."
    de: "Als getragenes Item schwächt diese Beere eine\nsehr effektive Feuer-Attacke, von der das Pokémon\ngetroffen wird."
    es: "Si la lleva un Pokémon, debilita un ataque supereficaz\nde tipo Fuego que reciba."
    ko: "포켓몬에게 지니게 하면\n효과가 굉장한 불꽃 기술로\n공격받았을 때 위력이 약해진다."
    zh_simp: "让宝可梦携带后，\n在受到效果绝佳的火属性招式\n攻击时，能令其威力减弱。"
    zh_trad: "讓寶可夢攜帶後，\n在受到效果絕佳的火屬性招式\n攻擊時，能使其威力減弱。"
oceanic_slate:
  names:
    jp_kana: たいかいのせきばん
    jp_kanji: たいかいのせきばん
    en: Oceanic Slate
    fr: Tablette Océans
    it: Piastra dei mari
    de: Meeresplatte
    es: Losa Mar
    ko: 대해의석판
    zh_simp: 大海石板
    zh_trad: 大海石板
  descriptions:
    jp_kana: "不思議な　力に　あふれる　石板。\nハマナスパークの　大海の部屋と\n深い　つながりを　感じる。"
    jp_kanji: "不思議な　力に　あふれる　石板。\nハマナスパークの　大海の部屋と\n深い　つながりを　感じる。"
    en: "A slate overflowing with enigmatic energy. You can feel\na strong connection between it and the Oceanic Room\nat Ramanas Park."
    fr: "Une tablette qui regorge d’une étrange énergie.\nElle semble intimement liée à la Salle des Océans\ndu Parc Rosa Rugosa."
    it: "Lastra di pietra che emana una misteriosa energia.\nSembra profondamente connessa alla Stanza dei mari\ndel Parco Rosa Rugosa."
    de: "Eine Platte, die vor rätselhafter Energie strotzt.\nMan kann eine starke Verbindung zwischen ihr und der\nMeereskammer im Hamanasu-Park spüren."
    es: "Una losa rebosante de una misteriosa energía. Parece\nestrechamente relacionada con la Sala del Mar del\nParque Hansa."
    ko: "신비한 힘이 넘치는 석판.\n해당화파크의 대해의 방과\n깊은 연관이 있는 것 같다."
    zh_simp: "充满了神秘力量的石板。\n感觉它与玫瑰公园的大海之厅\n有着很深的关联。"
    zh_trad: "充滿神奇力量的石板。\n感覺它和玫瑰公園的大海之廳\n有很深的關係。"
odd_incense:
  names:
    jp_kana: あやしいおこう
    jp_kanji: あやしいおこう
    en: Odd Incense
    fr: Encens Bizarre
    it: Bizzoaroma
    de: Schrägrauch
    es: Incienso Raro
    ko: 괴상한향로
    zh_simp: 奇异薰香
    zh_trad: 奇異薰香
  descriptions:
    jp_kana: "不思議な香りの　御香。\n持たせると　エスパータイプの\n技の威力が　あがる。"
    jp_kanji: "不思議な香りの　御香。\n持たせると　エスパータイプの\n技の威力が　あがる。"
    en: "An item to be held by a Pokémon. This incense has\na curious aroma that boosts the power of the holder’s\nPsychic-type moves."
    fr: "Objet à tenir. Un encens au parfum curieux\naugmentant la puissance des capacités de type Psy."
    it: "Strumento da dare a un Pokémon. Incenso dal profumo\nesotico che potenzia le mosse di tipo Psico."
    de: "Ein Item zum Tragen. Dieses exotische Räucherwerk\nverstärkt Attacken vom Typ Psycho."
    es: "Incienso de exótico aroma que potencia los movimientos\nde tipo Psíquico. Debe llevarlo un Pokémon."
    ko: "이상한 향기의 향로.\n지니게 하면 에스퍼타입\n기술의 위력이 올라간다."
    zh_simp: "有着神奇香气的薰香。\n携带后，超能力属性的\n招式威力就会提高。"
    zh_trad: "有著神奇香氣的薰香。\n攜帶後，超能力屬性的\n招式威力就會提高。"
odd_keystone:
  names:
    jp_kana: かなめいし
    jp_kanji: かなめいし
    en: Odd Keystone
    fr: Clé de Voûte
    it: Roccianima
    de: Spiritkern
    es: Piedra Espíritu
    ko: 쐐기돌
    zh_simp: 楔石
    zh_trad: 楔石
  descriptions:
    jp_kana: "これがないと　石の塔が\n崩れてしまう　大事な石。\nときどき　石から　声が聞こえる。"
    jp_kanji: "これがないと　石の塔が\n崩れてしまう　大事な石。\nときどき　石から　声が聞こえる。"
    en: "A vital item that is needed to keep a stone tower from\ncollapsing. Voices can be heard from it occasionally."
    fr: "Un objet très important qui empêche une tour en pierre\nde s’écrouler. Des voix en sortent parfois."
    it: "Strumento importante che impedisce il crollo di una\ntorre di pietra. A volte dal suo interno provengono\ndelle voci."
    de: "Ein wichtiges Item, mit dem ein Steinturm repariert\nwerden kann. Manchmal erklingen Stimmen aus seinem\nInneren."
    es: "Objeto vital para impedir que una torre de piedra se\nderrumbe. A veces se oyen voces en su interior."
    ko: "이것이 없으면 돌탑이\n무너져 버리는 중요한 돌.\n가끔 돌에서 목소리가 들린다."
    zh_simp: "没有它，石之塔就会\n崩塌的重要石头。\n有时能从石头里听到声音。"
    zh_trad: "沒有它，石之塔就會\n崩塌的重要石頭。\n有時能從石頭裡聽到聲音。"
oddish_candy:
  names:
    jp_kana: ナゾノクサのアメ
    jp_kanji: ナゾノクサのアメ
    en: Oddish Candy
    fr: Bonbon Mystherbe
    it: Caramella Oddish
    de: Myrapla-Bonbon
    es: Caramelo Oddish
    ko: 뚜벅쵸의사탕
    zh_simp: 走路草的糖果
    zh_trad: 走路草的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
oddish_leaf:
  names:
    jp_kana: ナゾノクサのはっぱ
    jp_kanji: ナゾノクサのはっぱ
    en: Oddish Leaf
    fr: Feuille de Mystherbe
    it: Foglia di Oddish
    de: Myrapla-Blatt
    es: Hoja de Oddish
    ko: 뚜벅쵸의잎
    zh_simp: 走路草的叶片
    zh_trad: 走路草的葉片
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
old_amber:
  names:
    jp_kana: ひみつのコハク
    jp_kanji: ひみつのコハク
    en: Old Amber
    fr: Vieil Ambre
    it: Ambra antica
    de: Altbernstein
    es: Ámbar Viejo
    ko: 비밀의호박
    zh_simp: 秘密琥珀
    zh_trad: 秘密琥珀
  descriptions:
    jp_kana: "古代ポケモンの　遺伝子が\n閉じこめられている　コハク。\n赤みを　帯びて　透けている。"
    jp_kanji: "古代ポケモンの　遺伝子が\n閉じこめられている　コハク。\n赤みを　帯びて　透けている。"
    en: "A piece of amber that still contains the genetic\nmaterial of a prehistoric Pokémon. It’s clear with\na tawny, reddish tint."
    fr: "Un morceau d’ambre contenant l’ADN d’un ancien\nPokémon. Il est de couleur jaune."
    it: "Pezzo di ambra che contiene il materiale genetico\ndi un Pokémon antico. È trasparente con sfumature\nrossastre."
    de: "Ein Stück Bernstein, in dem die Gene eines uralten\nPokémon enthalten sind. Es ist durchsichtig."
    es: "Fragmento de ámbar que contiene información genética\nde un Pokémon prehistórico. Es de color amarillo."
    ko: "고대 포켓몬의 유전자가\n갇혀 있는 호박.\n붉은 기가 돌면서 약간 투명하다."
    zh_simp: "封存着古代宝可梦\n遗传基因的琥珀，\n透着点红色。"
    zh_trad: "封存著古代寶可夢\n遺傳基因的琥珀，\n透著點紅色。"
old_charm:
  names:
    jp_kana: こだいのおまもり
    jp_kanji: こだいのおまもり
    en: Old Charm
    fr: Vieux Grigri
    it: Amuleto antico
    de: Talisman
    es: Talismán
    ko: 고대의부적
    zh_simp: 古代护符
    zh_trad: 古代護符
  descriptions:
    jp_kana: "カンナギタウンの　長老に\n届ける　大昔の　おまもり。\nポケモンの　ホネで　つくられている。"
    jp_kanji: "カンナギタウンの　長老に\n届ける　大昔の　おまもり。\nポケモンの　ホネで　つくられている。"
    en: "An ancient good-luck charm made of Pokémon\nbones to be taken to the elder of Celestic Town."
    fr: "Un ancien porte-bonheur fait d’os de Pokémon\nà apporter à la doyenne de Célestia."
    it: "Antico portafortuna fatto di ossa di Pokémon\nda portare all’anziana di Memoride."
    de: "Ein antiker Glücksbringer. Soll der Ältesten in Elyses\nüberbracht werden."
    es: "Está hecho con huesos de Pokémon y trae buena suerte.\nHay que llevárselo a la anciana de Pueblo Caelestis."
    ko: "봉신마을의 장로에게\n전해 줄 오랜 옛날의 부적.\n포켓몬의 뼈로 만들어졌다."
    zh_simp: "要交给神和镇上长老的远古护符。\n由宝可梦的骨头制成。"
    zh_trad: "要交給神和鎮上長老的遠古護符。\n由寶可夢的骨頭製成。"
old_gateau:
  names:
    jp_kana: もりのヨウカン
    jp_kanji: もりのヨウカン
    en: Old Gateau
    fr: Vieux Gâteau
    it: Dolce gateau
    de: Spezialität
    es: Barrita Plus
    ko: 숲의양갱
    zh_simp: 森之羊羹
    zh_trad: 森之羊羹
  descriptions:
    jp_kana: "ハクタイの　隠れた　名物。\nポケモン　１匹の　状態の\n異常を　すべて　回復する。"
    jp_kanji: "ハクタイの　隠れた　名物。\nポケモン　１匹の　状態の\n異常を　すべて　回復する。"
    en: "A hidden gem found in the Old Chateau. It can be used\nto cure any status condition a Pokémon may have."
    fr: "Une spécialité du Vieux Château.\nSoigne toutes les altérations de statut d’un Pokémon."
    it: "Specialità segreta dell’Antico Château.\nCura tutti i problemi di stato di un Pokémon."
    de: "Dies ist eine heimliche Spezialität aus Ewigenau.\nSie behebt alle Statusprobleme eines Pokémon."
    es: "Especialidad de la Vieja Mansión. Cura todos los\nproblemas de estado de un Pokémon."
    ko: "영원시티의 숨은 명물.\n포켓몬 1마리의\n상태 이상을 모두 회복한다."
    zh_simp: "百代不为人知的特产。\n能治愈１只宝可梦的\n所有异常状态。"
    zh_trad: "百代不為人知的特產。\n能治癒１隻寶可夢的\n所有異常狀態。"
old_gateau:recipe:
  names:
    jp_kana: もりのヨウカン
    jp_kanji: もりのヨウカン
    en: Old Gateau
    fr: Vieux Gâteau
    it: Dolce gateau
    de: Spezialität
    es: Barrita Plus
    ko: 숲의양갱
    zh_simp: 森之羊羹
    zh_trad: 森之羊羹
  descriptions:
    jp_kana: "もりのヨウカンのレシピ。　材料は\nころころマメ×１　きらきらミツ×１\nケムリイモ×１　よせだまのもと×１"
    jp_kanji: "もりのヨウカンのレシピ。　材料は\nころころマメ×１　きらきらミツ×１\nケムリイモ×１　よせだまのもと×１"
    en: "A recipe for crafting Old Gateaux from scratch.\nRequired materials: 1 pod of Plump Beans, 1 comb of\nDazzling Honey, 1 Sootfoot Root, and 1 Cake-Lure Base."
    fr: "Méthode pour Vieux Gâteau. Ressources requises :\n1 Fève Dodue, 1 rayon de Miel Kibrille, 1 Rutabagaz\net 1 boule d’Appâte."
    it: "Ricetta per un Dolce gateau. Richiede 1 baccello\ndi Fagioli paffuti, 1 favo di Miele luccicante,\n1 Patata fumosa e 1 Polpetta base."
    de: "Die Anleitung zur Herstellung einer Spezialität.\nBenötigte Materialien: 1 Kullerbohne, 1 Rauchknolle,\n1 Wabe Funkelhonig und 1 Portion Köderteig."
    es: "Receta para crear Barritas Plus. Materiales:\n1 Haba Suculenta, 1 panal de Miel Brillante,\n1 Fumibulbo y 1 bola de Masa para Cebo."
    ko: "숲의양갱의 레시피.\n재료: 통통콩×1 반짝반짝꿀×1\n연기토란×1 유인환반죽×1"
    zh_simp: "森之羊羹的材料单。材料是：\n滚滚豆×１　晶晶蜜×１\n烟芋×１　诱团原料×１"
    zh_trad: "森之羊羹的材料單。材料是：\n滾滾豆×１　晶晶蜜×１\n煙芋×１　誘糰原料×１"
old_journal:
  names:
    jp_kana: ふるいにっき
    jp_kanji: ふるいにっき
    en: Old Journal
    fr: Vieux Journal
    it: Vecchio diario
    de: Altes Journal
    es: Diario Antiguo
    ko: 낡은일기
    zh_simp: 古老日记
    zh_trad: 古老日記
  descriptions:
    jp_kana: "やぶれたにっきの\n抜け落ちていた\nページがそろった日記。"
    jp_kanji: "やぶれたにっきの\n抜け落ちていた\nページがそろった日記。"
    en: "A stab-bound journal that once had pages torn from it.\nAll the pages have been collected and restored."
    fr: "Il est à nouveau complet depuis que les pages\nmanquantes du Journal Déchiré ont été retrouvées."
    it: "Il Diario rovinato, ora completo di tutte le pagine\nmancanti."
    de: "Das Kaputte Journal wurde um die fehlenden Seiten\nergänzt und ist jetzt wieder ein vollständiges Tagebuch."
    es: "Diario ajado que ahora cuenta con todas las hojas\nque le arrancaron."
    ko: "찢어진일기의\n빠진 페이지를\n모두 채운 일기."
    zh_simp: "破损日记所缺少的页面\n全部凑齐之后的日记。"
    zh_trad: "破損日記所缺少的頁面\n全部湊齊之後的日記。"
old_letter:
  names:
    jp_kana: ふるびたてがみ
    jp_kanji: ふるびたてがみ
    en: Old Letter
    fr: Lettre Jaunie
    it: Vecchia lettera
    de: Vergilbter Brief
    es: Carta Ajada
    ko: 낡은편지
    zh_simp: 陈旧的信
    zh_trad: 陳舊的信
  descriptions:
    jp_kana: "女の子　から　預かった　手紙。\n宛先は　男の子。\nなぜだか　古びた　感じが　する。"
    jp_kanji: "女の子　から　預かった　手紙。\n宛先は　男の子。\nなぜだか　古びた　感じが　する。"
    en: "A letter entrusted to you by a girl, to be delivered to\na boy. Strangely, it looks old to you."
    fr: "Une lettre confiée par une petite fille,\ndont le destinataire est un petit garçon.\nElle semble jaunie par le temps..."
    it: "Una lettera, indirizzata a un bambino, che ha\nl’aria di essere un po’ consumata dal tempo.\nL’hai ricevuta in consegna da una bambina."
    de: "Diesen Brief hast du von einem Mädchen erhalten, um\nihn einem Jungen zu übergeben. Aus irgendeinem\nGrund sieht er schon etwas älter und vergilbt aus."
    es: "Carta de aspecto desgastado entregada por una niña y\ncon un chico como destinatario."
    ko: "여자아이가 맡긴 편지.\n받는 이는 남자아이로 되어 있다.\n어째선지 낡아 보인다."
    zh_simp: "女孩子投递的书信\n收件人是男孩子。\n散发出一种怀旧的气息。"
    zh_trad: "一個女孩子託付的信。\n收信人是男孩子。\n不知為何感覺有點陳舊。"
old_rod:
  names:
    jp_kana: ボロのつりざお
    jp_kanji: ボロのつりざお
    en: Old Rod
    fr: Canne
    it: Canna da pesca usata
    de: Angel
    es: Caña Vieja
    ko: 낡은낚싯대
    zh_simp: 破旧钓竿
    zh_trad: 破舊釣竿
  descriptions:
    jp_kana: "ふるくて　ボロい　つりざお。\n水の　ある　場所で　使うと\nポケモンが　つれる。"
    jp_kanji: "ふるくて　ボロい　つりざお。\n水の　ある　場所で　使うと\nポケモンが　つれる。"
    en: "An old and beat-up fishing rod. Use it at bodies of water\nto fish for Pokémon."
    fr: "Une vieille canne usée.\nUtilisez-la pour pêcher des Pokémon sauvages\ndans les points d’eau."
    it: "Canna da pesca vecchia e rovinata. Si usa per pescare\nPokémon selvatici in qualsiasi specchio d’acqua."
    de: "Eine alte, abgenutzte Angel. Damit kannst du in\njedem Gewässer nach Pokémon angeln."
    es: "Caña de pescar bastante usada y desgastada. Pesca\nPokémon salvajes en todo tipo de aguas."
    ko: "낡고 조잡한 낚싯대.\n물이 있는 장소에서 사용하면\n포켓몬을 낚을 수 있다."
    zh_simp: "又破又旧的钓竿。\n在有水的地方使用的话，\n可以钓到宝可梦。"
    zh_trad: "又破又舊的釣竿。\n在有水的地方使用的話，\n可以釣到寶可夢。"
old_verse_1:
  names:
    jp_kana: ふるいポエム１
    jp_kanji: ふるいポエム１
    en: Old Verse 1
    fr: Vieux Poème (1)
    it: Antica poesia 1
    de: Altes Gedicht 1
    es: Poema Antiguo 1
    ko: 오래된 시1
    zh_simp: 古老诗文１
    zh_trad: 古老詩文１
  descriptions:
    jp_kana: "ヒスイ地方の各地から\n掘りだされる古い詩の一遍。\n筆跡から書いた人物は同じとされる。"
    jp_kanji: "ヒスイ地方の各地から\n掘りだされる古い詩の一遍。\n筆跡から書いた人物は同じとされる。"
    en: "Part of a series of old poems that have been unearthed\naround the Hisui region. Judging from the handwriting,\nit appears they were all written by the same person."
    fr: "L’un des vieux poèmes que l’on peut déterrer aux quatre\ncoins de Hisui. À en juger par la forme des lettres,\nces poèmes sont l’œuvre d’un seul et même auteur."
    it: "Una delle vecchie poesie che si possono trovare\nsotterrate in giro per tutta Hisui. Dalla calligrafia\nsembrano attribuibili a un unico autore."
    de: "Eines der alten Gedichte, die überall in der Hisui-Region\nausgegraben werden. Die Handschrift lässt vermuten,\ndass sie alle von derselben Person verfasst wurden."
    es: "Fragmento de una colección de antiguos poemas que se\nha desenterrado por toda la región de Hisui. Por el trazo\ndel pincel, se cree que todos pertenecen al mismo autor."
    ko: "히스이지방 각지에서 발굴되는\n오래된 시 한 편. 필적으로 미루어 보아\n모두 같은 인물이 쓴 것으로 추정된다."
    zh_simp: "发掘自洗翠地区各地的古诗\n之中的一篇。根据笔迹判断，\n这些诗篇应是出自同一人之手。"
    zh_trad: "發掘自洗翠地區各地的古詩\n之中的一篇。根據筆跡判斷，\n這些詩篇應是出自同一人之手。"
old_verse_10:
  names:
    jp_kana: ふるいポエム１０
    jp_kanji: ふるいポエム１０
