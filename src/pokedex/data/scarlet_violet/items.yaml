    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de cierto Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
oran_berry:
  names:
    jp_kana: オレンのみ
    jp_kanji: オレンのみ
    en: Oran Berry
    fr: Baie Oran
    it: Baccarancia
    de: Sinelbeere
    es: Baya Aranja
    ko: 오랭열매
    zh_simp: 橙橙果
    zh_trad: 橙橙果
  descriptions:
    jp_kana: "ポケモンに　持たせると\nＨＰを　１０だけ　回復する。"
    jp_kanji: "ポケモンに　持たせると\nＨＰを　１０だけ　回復する。"
    en: "If a Pokémon holds one of these Berries, it will be able\nto restore 10 HP to itself."
    fr: "Une Baie qui restaure 10 PV lorsqu’elle est tenue\npar un Pokémon."
    it: Se un Pokémon ha questa bacca, recupera 10 PS.
    de: "Als getragenes Item füllt diese Beere die KP des\nPokémon um 10 Punkte auf."
    es: "Los Pokémon pueden llevarla y usarla para restaurar\n10 PS."
    ko: "포켓몬에게 지니게 하면\nHP를 10만큼 회복한다."
    zh_simp: "让宝可梦携带后，\n可以回复１０ＨＰ。"
    zh_trad: "讓寶可夢攜帶後，\n可以回復１０ＨＰ。"
orange_dish:
  names:
    jp_kana: オレンジプレート
    jp_kanji: オレンジプレート
    en: Orange Dish
    fr: Assiette Orange
    it: Piatto arancione
    de: Oranger Teller
    es: Plato Naranja
    ko: 오렌지 플레이트
    zh_simp: 橘色盘子
    zh_trad: 橘色盤子
  descriptions:
    jp_kana: "ピクニック用のお皿。　料理や気分で\n使い分けられるよう　色の種類が　豊富。\nオレンジは　人気上位の　商品。"
    jp_kanji: "ピクニック用のお皿。　料理や気分で\n使い分けられるよう　色の種類が　豊富。\nオレンジは　人気上位の　商品。"
    en: "A dish for picnics. Comes in plenty of colors to choose\nfrom based on the food or the mood. The orange variety\nis the most popular of all."
    fr: "Une assiette de pique-nique. Il en existe de nombreuses\ncouleurs pour les accorder à l’ambiance ou au menu.\nL’orange est un des modèles les plus appréciés."
    it: "Piatto da picnic. È disponibile in un ampio assortimento\ndi colori tra cui si può scegliere a seconda del cibo e\ndell’umore. L’arancione è tra i più popolari."
    de: "Diesen Picknickteller gibt es in verschiedenen Farben,\ndamit man je nach Laune oder Speise variieren kann.\nDer orange Teller ist einer der beliebtesten."
    es: "Un plato de pícnic. Los distintos colores en los que viene\nofrecen posibilidades infinitas. Esta versión naranja es de\nlas más populares."
    ko: "피크닉용 접시. 요리나 기분에 따라\n골라서 쓸 수 있게 색의 종류가 다양하다.\n오렌지 컬러는 인기 상위 상품이다."
    zh_simp: "野餐用的盘子。为了能够配合料理\n和心情使用，其有着丰富的颜色种类。\n橘色的是稳居人气榜前几名的商品。"
    zh_trad: "野餐用的盤子。提供豐富的顏色，\n以搭配各種不同的料理和心情。\n橘色的盤子人氣名列前茅。"
orange_petal:
  names:
    jp_kana: だいだいはなびら
    jp_kanji: だいだいはなびら
    en: Orange Petal
    fr: Pétale Orange
    it: Petalo arancione
    de: Oranges Blatt
    es: Pétalo Naranja
    ko: 주황꽃잎
    zh_simp: 橙色花瓣
    zh_trad: 橙色花瓣
  descriptions:
    jp_kana: "マツリカの試練で　イリマから\nもらえる　はなびらの　押し花。\n７種類　集めるのが　目的。"
    jp_kanji: "マツリカの試練で　イリマから\nもらえる　はなびらの　押し花。\n７種類　集めるのが　目的。"
    en: "A pressed flower petal you receive from Ilima\nduring Mina’s trial. The goal is to collect seven\ndifferent kinds of petals."
    fr: "Un pétale pressé qu’Althéo vous a remis lors\nde l’Épreuve d’Oléa. Il y en a sept à collectionner."
    it: "Petalo di fiore pressato ottenuto da Liam durante la\nprova di Rika. L’obiettivo è ricevere sette petali diversi."
    de: "Ein gepresstes Blütenblatt, das man im Rahmen von\nMatsurikas Prüfung von Elima erhält. Ziel ist es,\nsieben verschiedene Blütenblätter zu sammeln."
    es: "Pétalo prensado recibido de manos de Liam durante la\nprueba de Rika. El objetivo es reunir siete distintos."
    ko: "말리화의 시련에서 일리마에게\n받을 수 있는 꽃잎의 압화.\n7종류 모으는 것이 목적."
    zh_simp: "在茉莉的考验中，\n能从伊利马那里得到的干花花瓣。\n目标是集齐７种。"
    zh_trad: "在茉莉的考驗中，\n從伊利馬那裡得到的壓花花瓣。\n目標是集滿７種花瓣。"
oranguru_fur:
  names:
    jp_kana: ヤレユータンのけ
    jp_kanji: ヤレユータンのけ
    en: Oranguru Fur
    fr: Poils de Gouroutan
    it: Pelo di Oranguru
    de: Kommandutan-Haar
    es: Pelo de Oranguru
    ko: 하랑우탄의털
    zh_simp: 智挥猩的毛
    zh_trad: 智揮猩的毛
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
oricorio_feather:
  names:
