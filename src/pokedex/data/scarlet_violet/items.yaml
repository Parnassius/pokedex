oval_charm:
  names:
    jp_kana: まるいおまもり
    jp_kanji: まるいおまもり
    en: Oval Charm
    fr: Charme Ovale
    it: Ovamuleto
    de: Ovalpin
    es: Amuleto Oval
    ko: 둥근부적
    zh_simp: 圆形护符
    zh_trad: 圓形護符
  descriptions:
    jp_kana: "持っていると　ピクニックで\nタマゴが　みつかりやすくなる\n不思議で　とてもまるい　おまもり。"
    jp_kanji: "持っていると　ピクニックで\nタマゴが　みつかりやすくなる\n不思議で　とてもまるい　おまもり。"
    en: "Having one of these mysterious oval charms makes it\nmore likely Pokémon Eggs might be found during picnics."
    fr: "Un mystérieux charme rond qui permet de trouver\nplus facilement des Œufs durant un pique-nique."
    it: "Misterioso amuleto di forma ovoidale che aumenta\nla probabilità di trovare Uova durante i picnic."
    de: "Ein mysteriöser, ovaler Glücksbringer, der die\nWahrscheinlichkeit erhöht, beim Picknicken Eier\nzu finden."
    es: "Misterioso amuleto ovalado que aumenta la posibilidad\nde encontrar Huevos en los pícnics."
    ko: "지니고 있으면 피크닉에서\n알을 발견하기 쉬워지는\n이상하고 매우 둥근 부적."
    zh_simp: "拥有它之后，在野餐时\n会更容易找到蛋的\n神奇浑圆护符。"
    zh_trad: "只要擁有它，便會變得\n更容易在野餐時發現蛋的\n神奇渾圓護符。"
oval_stone:
  names:
    jp_kana: まんまるいし
    jp_kanji: まんまるいし
    en: Oval Stone
    fr: Pierre Ovale
    it: Pietraovale
    de: Ovaler Stein
    es: Piedra Oval
    ko: 동글동글돌
    zh_simp: 浑圆之石
    zh_trad: 渾圓之石
  descriptions:
    jp_kana: "ある特定の　ポケモンを\n進化させる　不思議な石。\nたまのように　まるい。"
    jp_kanji: "ある特定の　ポケモンを\n進化させる　不思議な石。\nたまのように　まるい。"
    en: "A peculiar stone that can make a certain species of\nPokémon evolve. It is round and smooth."
    fr: "Une pierre étrange qui fait évoluer certaines espèces\nde Pokémon. Elle a la forme d’un œuf."
    it: "Pietra particolare che fa evolvere determinate specie\ndi Pokémon. È tondeggiante."
    de: "Dieser besondere Stein löst bei bestimmten Pokémon\ndie Entwicklung aus. Er ist eiförmig."
    es: "Curiosa piedra que hace evolucionar a una determinada\nespecie de Pokémon. Tiene forma de huevo."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 돌.\n구슬처럼 둥글다."
    zh_simp: "能让某些特定宝可梦\n进化的神奇石头。\n像珠子一般圆润。"
    zh_trad: "能讓特定寶可夢\n進化的神奇石頭。\n像珠子一般圓潤。"
pachirisu_fur:
  names:
    jp_kana: パチリスのけ
    jp_kanji: パチリスのけ
