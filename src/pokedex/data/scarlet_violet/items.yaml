    zh_trad: "讓七夕青鳥攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
amaze_mulch:
  names:
    jp_kana: とんでもこやし
    jp_kanji: とんでもこやし
    en: Amaze Mulch
    fr: Fertiprodige
    it: Fertilprodigio
    de: Ultramulch
    es: Abono Insólito
    ko: 기절초풍비료
    zh_simp: 超效肥
    zh_trad: 超效肥
  descriptions:
    jp_kana: "きのみを　育てるときの　肥料。\nしかし　ホウエン地方の　土には\nまるで　なじまないので　効果が　ない。"
    jp_kanji: "きのみを　育てるときの　肥料。\nしかし　ホウエン地方の　土には\nまるで　なじまないので　効果が　ない。"
    en: "A fertilizer for growing Berries. However, it appears\nto be unsuitable for the soil in the Hoenn region and\nhas no effect."
    fr: "Un engrais à utiliser sur un sol meuble.\nIl n’est cependant pas adapté aux terres de Hoenn\net n’y a aucun effet."
    it: "Fertilizzante usato per coltivare le bacche. Tuttavia,\nnon ha effetto a Hoenn, perché non è adatto al terreno\ndella regione."
    de: "Mulch zur Nutzung auf Beerenfeldern. Durch seine\nUnverträglichkeit mit den Böden in Hoenn bleibt sein\nEinsatz dort ohne Wirkung."
    es: "Un fertilizante usado para el cultivo de bayas. Parece\nque no se asienta bien en el suelo de Hoenn, por lo\nque no tiene efecto en esta región."
    ko: "나무열매를 키울 때 사용하는 비료.\n그러나 호연지방의 흙에는\n전혀 맞지 않기에 효과가 없다."
    zh_simp: "培育树果时的肥料。\n但完全不适合丰缘地区的土壤，\n所以没什么效果。"
    zh_trad: "培育樹果時的肥料。\n但完全不適合豐緣地區的土壤，\n所以沒什麼效果。"
ampharosite:
  names:
    jp_kana: デンリュウナイト
    jp_kanji: デンリュウナイト
    en: Ampharosite
    fr: Pharampite
    it: Ampharosite
    de: Ampharosnit
    es: Ampharosita
    ko: 전룡나이트
    zh_simp: 电龙进化石
    zh_trad: 電龍進化石
  descriptions:
    jp_kana: "デンリュウに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    jp_kanji: "デンリュウに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Ampharos hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Pharamp, elle lui permet de\nméga-évoluer durant un combat."
    it: "Una delle misteriose Megapietre. Data ad Ampharos,\ngli permette di megaevolversi durante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Ampharos getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Ampharos en combate."
    ko: "전룡에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让电龙携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓電龍攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
amulet_coin:
  names:
    jp_kana: おまもりこばん
    jp_kanji: おまもりこばん
    en: Amulet Coin
    fr: Pièce Rune
    it: Monetamuleto
    de: Münzamulett
    es: Moneda Amuleto
    ko: 부적금화
    zh_simp: 护符金币
    zh_trad: 護符金幣
  descriptions:
    jp_kana: "持たせたポケモンが　１度でも\n戦闘に　顔を　だすと\nお金が　２倍　もらえる。"
    jp_kanji: "持たせたポケモンが　１度でも\n戦闘に　顔を　だすと\nお金が　２倍　もらえる。"
    en: "An item to be held by a Pokémon. It doubles any\nprize money received as long as the holder joins the\nbattle at least once."
    fr: "Objet à tenir. Double l’argent gagné si le porteur\nse joint au combat."
    it: "Strumento da dare a un Pokémon. Se chi ce l’ha\npartecipa alla lotta anche una sola volta, i guadagni\nraddoppiano."
    de: "Ein Item zum Tragen. Verdoppelt das Preisgeld,\nwenn der Träger am Kampf teilnimmt."
    es: "Si el Pokémon que la lleva lucha en un combate,\nse duplica el dinero ganado."
    ko: "지니게 한 포켓몬이\n한 번이라도 배틀에 나가면\n돈을 2배로 받을 수 있다."
    zh_simp: "只要携带它的宝可梦\n在战斗时出场一次，\n就能获得２倍金钱。"
    zh_trad: "只要攜帶它的寶可夢\n在戰鬥時出場一次，\n就能獲得２倍金錢。"
antidote:
  names:
    jp_kana: どくけし
    jp_kanji: どくけし
    en: Antidote
    fr: Antidote
    it: Antidoto
    de: Gegengift
    es: Antídoto
    ko: 해독제
    zh_simp: 解毒药
    zh_trad: 解毒藥
  descriptions:
    jp_kana: "スプレー式の　薬。\nポケモン　１匹の　どくの\n状態を　回復する。"
    jp_kanji: "スプレー式の　薬。\nポケモン　１匹の　どくの\n状態を　回復する。"
    en: "A spray-type medicine for treating poisoning. It can\nbe used to lift the effects of being poisoned from\na Pokémon."
    fr: "Un médicament sous forme de spray.\nGuérit un Pokémon empoisonné."
    it: Rimedio spray. Cura un Pokémon dall’avvelenamento.
    de: Ein Spray, das ein Pokémon von Vergiftungen heilt.
    es: "Medicina en espray que contrarresta los efectos del\nveneno en un Pokémon."
    ko: "스프레이식의 약.\n포켓몬 1마리의\n독 상태를 회복한다."
    zh_simp: "喷雾式药水。\n能治愈１只宝可梦的\n中毒状态。"
    zh_trad: "噴霧式藥水。\n能治癒１隻寶可夢的\n中毒狀態。"
apicot_berry:
  names:
    jp_kana: ズアのみ
    jp_kanji: ズアのみ
    en: Apicot Berry
    fr: Baie Abriko
    it: Baccacocca
    de: Apikobeere
    es: Baya Aricoc
    ko: 규살열매
    zh_simp: 杏仔果
    zh_trad: 杏仔果
  descriptions:
    jp_kana: "ポケモンに　持たせると\nピンチのとき　自分の\n特防が　あがる。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　自分の\n特防が　あがる。"
    en: "If a Pokémon holds one of these Berries, its Sp. Def stat\nwill be boosted should it find itself in a pinch."
    fr: "Tenue, cette Baie augmente la Défense Spéciale\nen cas de besoin."
    it: "Se il Pokémon che ha questa bacca si trova in difficoltà,\nla sua Difesa Speciale aumenta."
    de: "Als getragenes Item erhöht diese Beere die\nSpezial-Verteidigung des Pokémon, sobald es\nin einer Notlage steckt."
    es: "Si la lleva un Pokémon, le aumenta la Defensa Especial\nen un momento de apuro."
    ko: "포켓몬에게 지니게 하면\n위급할 때 자신의\n특수방어가 올라간다."
    zh_simp: "让宝可梦携带后，危机时，\n自己的特防就会提高。"
    zh_trad: "讓寶可夢攜帶後，\n危機時，自己的\n特防就會提高。"
apple:
  names:
    jp_kana: わぎりリンゴ
    jp_kanji: わぎりリンゴ
    en: Apple
    fr: Pomme
    it: Mela
    de: Apfel
    es: Manzana
    ko: 사과슬라이스
    zh_simp: 苹果片
    zh_trad: 蘋果片
  descriptions:
    jp_kana: "甘味が　強い　食材。\nスライスされていて　サンドウィッチの\n具材として　扱いやすいのだ。"
    jp_kanji: "甘味が　強い　食材。\nスライスされていて　サンドウィッチの\n具材として　扱いやすいのだ。"
    en: "This very sweet ingredient is sliced thin to make it easy\nto add into a sandwich."
    fr: "Un ingrédient au goût très sucré. Coupé en tranches\nfines, ce fruit est plus facile à ajouter à un Sandwich."
    it: "Un ingrediente molto dolce. Tagliato a fettine, può\nessere agevolmente usato per imbottire i panini."
    de: "In Scheiben geschnitten lässt sich mit dieser sehr süßen\nZutat problemlos ein Sandwich belegen."
    es: "Cortada en rebanadas, esta fruta de sabor muy dulce es\nmuy fácil de incluir en cualquier preparación."
    ko: "단맛이 강한 식재료.\n슬라이스해서\n샌드위치 재료로 넣기 좋다."
    zh_simp: "甜味强烈的食材。\n切成了片，作为三明治馅料\n用起来十分方便。"
    zh_trad: "甜味強勁的食材。\n切成的薄片在製作\n三明治時很好使用。"
applin_juice:
  names:
    jp_kana: カジッチュのかじゅう
    jp_kanji: カジッチュのかじゅう
    en: Applin Juice
    fr: Jus de Verpom
    it: Succo di Applin
    de: Knapfel-Fruchtsaft
    es: Zumo de Applin
    ko: 과사삭벌레의과즙
    zh_simp: 啃果虫的果汁
    zh_trad: 啃果蟲的果汁
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
apricorn:
  names:
    jp_kana: ぼんぐりのみ
    jp_kanji: ぼんぐりのみ
    en: Apricorn
    fr: Noigrume
    it: Bacca ghicocca
    de: Aprikoko
    es: Bonguri
    ko: 규토리열매
    zh_simp: 球果果
    zh_trad: 球果果
  descriptions:
    jp_kana: "各種モンスターボールを　つくるときに\n殻を　カプセルとして　使う　きのみ。\n正式名称　ちゃぼんぐり。"
    jp_kanji: "各種モンスターボールを　つくるときに\n殻を　カプセルとして　使う　きのみ。\n正式名称　ちゃぼんぐり。"
    en: "A fruit whose shell can be used to form the capsules of\nall manner of Poké Balls when crafting them from\nscratch. Its proper name is actually “Brown Apricorn.”"
    fr: "L’enveloppe rigide de cette Baie est utilisée\npour confectionner les capsules des Poké Balls.\nSon appellation officielle est « Noigrume marron »."
    it: "Bacca il cui guscio viene impiegato per fabbricare\ncapsule di Poké Ball di ogni tipo. È ufficialmente nota\ncome \"ghicocca marrone\"."
    de: "Aus der Schale dieser Frucht kann die Kapsel für\nverschiedene Pokébälle hergestellt werden.\nIhr vollständiger Name lautet „Aprikoko Braun“."
    es: "Fruto cuya cáscara se puede utilizar para crear la\ncarcasa de las Poké Balls. Su verdadero nombre es\n\"bonguri marrón\"."
    ko: "각종 몬스터볼을 만들 때\n껍질을 캡슐 삼아 사용하는 나무열매.\n정식 명칭은 갈색규토리."
    zh_simp: "外壳可当成胶囊状容器使用，\n是被用来制作各种精灵球的树果。\n正式名称是茶球果。"
    zh_trad: "外殼可當成膠囊狀容器使用，\n被用來製作各種精靈球的樹果。\n正式名稱是茶球果。"
apricorn_box:
  names:
    jp_kana: ぼんぐりケース
    jp_kanji: ぼんぐりケース
    en: Apricorn Box
    fr: Boîte Noigrume
    it: Ghicobox
    de: Aprikokobox
    es: Caja Bonguri
    ko: 규토리케이스
    zh_simp: 球果盒
    zh_trad: 球果盒
  descriptions:
    jp_kana: "ぼんぐりを　９９こ　保存できる\n便利な　いれもの。"
    jp_kanji: "ぼんぐりを　９９こ　保存できる\n便利な　いれもの。"
    en: "A handy box where you can store up to 99 of each\nkind of Apricorn."
    fr: "Une boîte bien pratique qui peut contenir jusqu’à\n99 Noigrumes."
    it: "Contenitore molto pratico dove conservare fino a 99\nghicocche diverse."
    de: "Eine praktische Tragebox, in der du bis zu 99 Aprikokos\njeder Sorte transportieren kannst."
    es: "Práctico recipiente que puede almacenar hasta\n99 bonguris de cada tipo."
    ko: "규토리를 99개 보존할 수 있는\n편리한 용기."
    zh_simp: "使用方便，可以保存\n９９个球果的容器。"
    zh_trad: "可以存放\n９９個球果的好用容器。"
aqua_suit:
  names:
    jp_kana: アクアスーツ
    jp_kanji: アクアスーツ
    en: Aqua Suit
    fr: Scaphandre Aqua
    it: Tuta Idro
    de: Aqua-Anzug
    es: Traje Aqua
    ko: 아쿠아슈트
    zh_simp: 海洋装
    zh_trad: 海洋裝
  descriptions:
    jp_kana: "アクア団の　科学技術を\n結集して　つくられた　スーツ。\nどんな　衝撃にも　耐えられる。"
    jp_kanji: "アクア団の　科学技術を\n結集して　つくられた　スーツ。\nどんな　衝撃にも　耐えられる。"
    en: "A suit made with the collective technological know-how\nof Team Aqua. It can withstand any impact."
    fr: "Une combinaison créée à partir des méthodes\nscientifiques de la Team Aqua.\nElle résiste à tous les chocs."
    it: "Tuta altamente tecnologica costruita dal Team Idro\nin grado di resistere a qualunque shock."
    de: "Ein Anzug, der unter Einsatz des gesamten technischen\nWissens von Team Aqua entstand. Hält jeder Art von\nErschütterung stand."
    es: "Este traje es el resultado de las arduas investigaciones\ncientíficas del Equipo Aqua. Es capaz de soportar\ncualquier impacto."
    ko: "아쿠아단이 과학기술을\n결집하여 만든 슈트다.\n어떠한 충격에도 견딜 수 있다."
    zh_simp: "集海洋队科学技术于一身的服装。\n能承受任何冲击。"
    zh_trad: "集結了海洋隊的\n科學技術製造的服裝。\n能承受任何衝擊。"
armor_fossil:
  names:
    jp_kana: たてのカセキ
    jp_kanji: たてのカセキ
    en: Armor Fossil
    fr: Fossile Armure
    it: Fossilscudo
    de: Panzerfossil
    es: Fósil Coraza
    ko: 방패의화석
    zh_simp: 盾甲化石
    zh_trad: 盾甲化石
  descriptions:
    jp_kana: "大昔　地上で　暮らした\n古代ポケモンの　カセキ。\n襟飾りの一部　らしい。"
    jp_kanji: "大昔　地上で　暮らした\n古代ポケモンの　カセキ。\n襟飾りの一部　らしい。"
    en: "A fossil from a prehistoric Pokémon that once lived on\nthe land. It looks to be from some kind of protective\ncollar."
    fr: "Le fossile d’un Pokémon préhistorique terrestre.\nOn dirait un morceau de collier."
    it: "Fossile di un Pokémon preistorico che viveva sulla\nterraferma. Sembra essere parte di un collare."
    de: "Das Fossil eines urzeitlichen Pokémon, das an Land\nlebte. Es sieht wie ein Teil eines Nackenschildes aus."
    es: "Fósil de un Pokémon prehistórico terrestre. Parece ser\nparte de una protección ósea del cuello."
    ko: "오랜 옛날 지상에서 살았던\n고대 포켓몬의 화석.\n깃 장식의 일부인 듯하다."
    zh_simp: "很久以前生活在地上的\n古代宝可梦的化石。\n好像是领饰的一部分。"
    zh_trad: "很久以前生活在地上的\n古代寶可夢的化石。\n好像是領飾的一部分。"
armor_pass:
  names:
    jp_kana: ヨロイパス
    jp_kanji: ヨロイパス
    en: Armor Pass
    fr: Pass Isolarmure
    it: Pass Armatura
    de: Rüstungspass
    es: Pase Armadura
    ko: 갑옷패스
    zh_simp: 铠甲车票
    zh_trad: 鎧甲車票
  descriptions:
    jp_kana: "ヨロイ島に　行くための　パス。\nブラッシータウンの　駅で\n駅員さんに　見せよう。"
    jp_kanji: "ヨロイ島に　行くための　パス。\nブラッシータウンの　駅で\n駅員さんに　見せよう。"
    en: "A pass to go to the Isle of Armor. Show it to the rail\nstaff at Wedgehurst Station."
    fr: "Un pass pour se rendre à Isolarmure.\nMontrez-le à l’employé de la Gare de Brasswick."
    it: "Un pass necessario per raggiungere l’Isola dell’Armatura.\nMostralo al personale della Stazione di Brassbury."
    de: "Ein Pass, mit dem du zur Rüstungsinsel gelangst.\nZeige ihn dem Personal am Brassbury-Bahnhof."
    es: "Un pase que permite viajar hasta la Isla de la Armadura.\nHay que mostrárselo al empleado de la estación de\nPueblo Par."
    ko: "갑옷섬에 갈 수 있는 패스.\n브래시마을역에 있는\n역무원에게 보여 주자."
    zh_simp: "前往铠岛的车票。\n在木杆镇的车站，\n把它出示给站务员看吧。"
    zh_trad: "前往鎧島的車票。\n在木桿鎮的車站\n把它出示給站務員看吧。"
armorite_ore:
  names:
    jp_kana: ヨロイこうせき
    jp_kanji: ヨロイこうせき
    en: Armorite Ore
    fr: Armurium
    it: Rocciarmatura
    de: Rüstungserz
    es: Duralium
    ko: 갑옷광석
    zh_simp: 铠甲矿石
    zh_trad: 鎧甲礦石
  descriptions:
    jp_kana: "ヨロイ島で　採れる　珍しい石。\nヨロイ島の　コレクターに　あげると\nなにか　いいことが　ある。"
    jp_kanji: "ヨロイ島で　採れる　珍しい石。\nヨロイ島の　コレクターに　あげると\nなにか　いいことが　ある。"
    en: "Rare ore that can be obtained on the Isle of Armor.\nSomething good will happen if you give it to a collector\non the Isle of Armor."
    fr: "Un minerai rare que l’on trouve à Isolarmure.\nVous pourriez avoir une bonne surprise\nen le donnant à un collectionneur de l’île."
    it: "Una pietra rara che si può trovare sull’Isola\ndell’Armatura. Se la consegni a un collezionista\ndi quella zona, potresti guadagnarci qualcosa."
    de: "Ein seltenes Gestein, das auf der Rüstungsinsel zu\nfinden ist. Gibst du es einem Sammler auf der Insel,\npassiert etwas Gutes."
    es: "Un mineral poco común que se encuentra en la Isla de\nla Armadura. Tal vez ocurra algo bueno al dárselo a un\ncoleccionista de dicha isla."
    ko: "갑옷섬에서 얻을 수 있는 희귀한 광석.\n갑옷섬의 컬렉터에게 주면 좋은 일이 일어난다."
    zh_simp: "能够在铠岛找出的珍稀石头。\n把它送给铠岛的收藏家，\n就会有好事发生。"
    zh_trad: "能夠在鎧島找到的稀奇石頭。\n把它送給鎧島上的收藏家，\n就會有好事發生。"
arrokuda_scales:
  names:
    jp_kana: サシカマスのウロコ
    jp_kanji: サシカマスのウロコ
    en: Arrokuda Scales
    fr: Écaille d’Embrochet
    it: Squama di Arrokuda
    de: Pikuda-Schuppe
    es: Escama de Arrokuda
    ko: 찌로꼬치의비늘
    zh_simp: 刺梭鱼的鳞片
    zh_trad: 刺梭魚的鱗片
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
articuno_candy:
  names:
    jp_kana: フリーザーのアメ
    jp_kanji: フリーザーのアメ
    en: Articuno Candy
    fr: Bonbon Artikodin
    it: Caramella Articuno
    de: Arktos-Bonbon
    es: Caramelo Articuno
    ko: 프리져의사탕
    zh_simp: 急冻鸟的糖果
    zh_trad: 急凍鳥的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de cierto Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
articuno_treat:
  names:
    jp_kana: フリーザーのおやつ
    jp_kanji: フリーザーのおやつ
    en: Articuno Treat
    fr: Friandise Artikodin
    it: Spuntino per Articuno
    de: Arktos-Snack
    es: Galleta Articuno
    ko: 프리져의간식
    zh_simp: 急冻鸟的点心
    zh_trad: 急凍鳥的點心
  descriptions:
    jp_kana: "伝説のポケモン　フリーザーが\n好む食材で　作られた　おやつ。"
    jp_kanji: "伝説のポケモン　フリーザーが\n好む食材で　作られた　おやつ。"
    en: "A snack made from ingredients favored by the\nLegendary Pokémon Articuno."
    fr: "Une friandise préparée avec les ingrédients favoris\ndu Pokémon légendaire Artikodin."
    it: "Uno spuntino fatto con gli ingredienti preferiti\ndal Pokémon leggendario Articuno."
    de: "Dieser Snack wurde mit den Lieblingszutaten des\nLegendären Pokémon Arktos zubereitet."
    es: "Galleta preparada con los ingredientes favoritos\ndel Pokémon legendario Articuno."
    ko: "전설의 포켓몬 프리져가\n좋아하는 식재료로 만들어진 간식."
    zh_simp: "用传说的宝可梦急冻鸟\n喜欢的食材制作的点心。"
    zh_trad: "用傳說的寶可夢急凍鳥\n喜愛的食材製成的點心。"
aspear_berry:
  names:
    jp_kana: ナナシのみ
    jp_kanji: ナナシのみ
    en: Aspear Berry
    fr: Baie Willia
    it: Baccaperina
    de: Wilbirbeere
    es: Baya Perasi
    ko: 배리열매
    zh_simp: 利木果
    zh_trad: 利木果
  descriptions:
    jp_kana: "ポケモンに　持たせると\nこおりを　回復する。"
    jp_kanji: "ポケモンに　持たせると\nこおりを　回復する。"
    en: "If a Pokémon holds one of these Berries, it will be able\nto thaw itself after being frozen."
    fr: "Une Baie qui soigne le gel lorsqu’elle est tenue\npar un Pokémon."
    it: "Se un Pokémon ha questa bacca, guarisce\ndal congelamento."
    de: "Als getragenes Item taut diese Beere das Pokémon auf,\nwenn es eingefroren wird."
    es: "Los Pokémon pueden llevarla y usarla para\ndescongelarse."
    ko: "포켓몬에게 지니게 하면\n얼음을 회복한다."
    zh_simp: "让宝可梦携带后，\n可以治愈冰冻。"
    zh_trad: "讓寶可夢攜帶後，\n可以治癒冰凍。"
assault_vest:
  names:
    jp_kana: とつげきチョッキ
    jp_kanji: とつげきチョッキ
    en: Assault Vest
    fr: Veste de Combat
    it: Corpetto assalto
    de: Offensivweste
    es: Chaleco Asalto
    ko: 돌격조끼
    zh_simp: 突击背心
    zh_trad: 突擊背心
  descriptions:
    jp_kana: "攻撃的になる　チョッキ。\n持たせると　特防が　あがるが\n変化技を　だせなくなる。"
    jp_kanji: "攻撃的になる　チョッキ。\n持たせると　特防が　あがるが\n変化技を　だせなくなる。"
    en: "An item to be held by a Pokémon. This offensive vest\nboosts the holder’s Sp. Def stat but prevents the use of\nstatus moves."
    fr: "Objet à tenir. Une veste augmentant la Défense\nSpéciale, mais empêchant d’utiliser des capacités\nde statut."
    it: "Strumento da dare a un Pokémon. Questo corpetto\naumenta la Difesa Speciale ma impedisce l’uso\ndi mosse di stato."
    de: "Trägt ein Pokémon diese Weste, erhöht sich seine\nSpezial-Verteidigung, aber es kann keine\nStatus-Attacken mehr einsetzen."
    es: "Chaleco que aumenta la Defensa Especial del Pokémon\nque lo lleva, pero le impide usar movimientos de estado."
    ko: "공격적으로 변하는 조끼.\n지니게 하면 특수방어가 올라가지만\n변화 기술을 쓸 수 없게 된다."
    zh_simp: "会变得富有攻击性的背心。\n虽然携带后特防会提高，\n但会无法使出变化招式。"
    zh_trad: "會變得富有攻擊性的背心。\n雖然攜帶後特防會提高，\n但會無法使出變化招式。"
audinite:
  names:
    jp_kana: タブンネナイト
    jp_kanji: タブンネナイト
    en: Audinite
    fr: Nanméouïte
    it: Audinite
    de: Ohrdochnit
    es: Audinita
    ko: 다부니나이트
    zh_simp: 差不多娃娃进化石
    zh_trad: 差不多娃娃進化石
  descriptions:
    jp_kana: "タブンネに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    jp_kanji: "タブンネに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Audino hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Nanméouïe, elle lui permet\nde méga-évoluer durant un combat."
    it: "Una delle misteriose Megapietre. Data a Audino,\ngli permette di megaevolversi durante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Ohrdoch getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Audino en combate."
    ko: "다부니에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让差不多娃娃携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓差不多娃娃攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
auspicious_armor:
  names:
    jp_kana: イワイノヨロイ
    jp_kanji: イワイノヨロイ
    en: Auspicious Armor
    fr: Armure de la Fortune
    it: Armatura fausta
    de: Glorienrüstung
    es: Armadura Auspiciosa
    ko: 축복받은갑옷
    zh_simp: 庆祝之铠
    zh_trad: 慶祝之鎧
  descriptions:
    jp_kana: "ある特定の　ポケモンを\n進化させる　不思議なヨロイ。\n祝いの感情が　秘められている。"
    jp_kanji: "ある特定の　ポケモンを\n進化させる　不思議なヨロイ。\n祝いの感情が　秘められている。"
    en: "A peculiar set of armor that can make a certain species\nof Pokémon evolve. Auspicious wishes live within it."
    fr: "Une armure mystérieuse pouvant faire évoluer un certain\nPokémon. Des vœux de bonne fortune y sont enfermés."
    it: "Armatura particolare che fa evolvere determinate specie\ndi Pokémon. Alberga dentro di sé sentimenti fausti."
    de: "Diese sonderbare Rüstung löst bei einem bestimmten\nPokémon die Entwicklung aus. Sie ist von einem\nGlück verheißenden Willen beseelt."
    es: "Curiosa armadura que hace evolucionar a una\ndeterminada especie de Pokémon. En su interior\nalberga sentimientos auspiciosos."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 갑옷.\n축복의 감정이 담겨 있다."
    zh_simp: "能让某些特定宝可梦\n进化的神奇铠甲。\n蕴含着祝贺的感情。"
    zh_trad: "能讓特定寶可夢\n進化的神奇鎧甲。\n秘藏著祝福的情感。"
autograph:
  names:
    jp_kana: マチスのサイン
    jp_kanji: マチスのサイン
    en: Autograph
    fr: Dédicace de Bob
    it: Autografo
    de: Autogramm
    es: Autógrafo
    ko: 마티스의사인
    zh_simp: 马志士的签名
    zh_trad: 馬志士的簽名
  descriptions:
    jp_kana: "クチバ　ジムリーダー　マチスから\nもらった　サイン色紙。\nＧｏｏｄ　Ｌｕｃｋ！と　書かれている。"
    jp_kanji: "クチバ　ジムリーダー　マチスから\nもらった　サイン色紙。\nＧｏｏｄ　Ｌｕｃｋ！と　書かれている。"
    en: "The autograph you got from the Vermilion City Gym\nLeader, Lt. Surge. He wrote, “Good luck!”"
    fr: "C’est un autographe de Major Bob, le Champion\nde l’Arène de Carmin sur Mer ! Il y a écrit « Good\nluck ! » dessus."
    it: "È l’autografo di Lt. Surge, il Capopalestra di Aranciopoli.\nC’è scritto \"Good luck!\"."
    de: "Das ist ein Autogramm von Major Bob, dem Arenaleiter\nvon Orania City. Darauf steht: „Viel Glück, [VAR 1100 (00FF080600000052)]ekrutRekrutin!“"
    es: "El autógrafo del Teniente Surge, el Líder de Gimnasio\nde Ciudad Carmín. La dedicatoria reza: \"Good luck!\"."
    ko: "갈색체육관 관장 마티스에게\n받은 사인이 적힌 종이.\nGood Luck!이라고 써 있다."
    zh_simp: "枯叶市道馆馆主马志士\n给你的彩色签名纸。\n上面写着“Ｇｏｏｄ Ｌｕｃｋ！”。"
    zh_trad: "從枯葉市道館館主馬志士\n那裡拿到的簽名板。\n上面寫著「Ｇｏｏｄ　Ｌｕｃｋ！」。"
aux_evasion:
  names:
    jp_kana: ヨクアタラーヌ
    jp_kanji: ヨクアタラーヌ
    en: Aux Evasion
    fr: Esquive Extra
    it: Elusione X
    de: Ausweichvitamine
    es: Gragea Evasiva
    ko: 잘-안맞기
    zh_simp: 闪避强化
    zh_trad: 閃避強化
  descriptions:
    jp_kana: "戦闘中のポケモンが\n相手の技に当たりづらくなる道具。\nひっこめると元に戻る。"
    jp_kanji: "戦闘中のポケモンが\n相手の技に当たりづらくなる道具。\nひっこめると元に戻る。"
    en: "An item that makes moves less likely to strike a\nPokémon in battle. This effect disappears if the\nPokémon leaves the battle."
    fr: "Augmente les chances d’un Pokémon d’esquiver\nles capacités de son adversaire pendant un combat.\nL’effet disparaît si le Pokémon est retiré."
    it: "Riduce la probabilità che le mosse dell’avversario\nvadano a segno in una lotta. L’effetto svanisce\nse il Pokémon è sostituito."
    de: "Senkt die Wahrscheinlichkeit, dass das Pokémon im\nKampf von gegnerischen Attacken getroffen wird.\nDie Wirkung endet mit dem Austausch des Pokémon."
    es: "Objeto que dificulta que los movimientos de los rivales\nalcancen al Pokémon en combate. Al cambiar de\nPokémon, el efecto desaparece."
    ko: "배틀 중인 포켓몬이\n상대의 기술에 잘 맞지 않게 되는 도구.\n포켓몬을 볼에 넣어 버리면 원래대로 되돌아간다."
    zh_simp: "让宝可梦在战斗中变得\n较不易被对手招式命中的道具。\n离场后，效果便会消失。"
    zh_trad: "讓寶可夢在戰鬥中變得\n較不易被對手招式命中的道具。\n離場後，效果便會消失。"
aux_evasion:recipe:
  names:
    jp_kana: ヨクアタラーヌ
    jp_kanji: ヨクアタラーヌ
    en: Aux Evasion
    fr: Esquive Extra
    it: Elusione X
    de: Ausweichvitamine
    es: Gragea Evasiva
    ko: 잘-안맞기
    zh_simp: 闪避强化
    zh_trad: 閃避強化
  descriptions:
    jp_kana: "ヨクアタラーヌのレシピ。　材料は\nカゲブンシメジ×２　スイートトリュフ×１"
    jp_kanji: "ヨクアタラーヌのレシピ。　材料は\nカゲブンシメジ×２　スイートトリュフ×１"
    en: "A recipe for crafting Aux Evasions from scratch.\nRequired materials: 2 bunches of Doppel Bonnets and\n1 Candy Truffle."
    fr: "Méthode pour Esquive Extra. Ressources requises :\n2 Champinjas et 1 Truffe Sucrée."
    it: "Ricetta per un’Elusione X. Richiede 2 cespi\ndi Doppioteamilli e 1 Tartufo dolce."
    de: "Die Anleitung zur Herstellung von Ausweichvitaminen.\nBenötigte Materialien: 2 Flinklinge und 1 Süßtrüffel."
    es: "Receta para crear Grageas Evasivas. Materiales:\n2 Setas Evasivas y 1 Trufa Dulce."
    ko: "잘-안맞기의 레시피.\n재료: 그림자분신버섯×2 스위트러플×1"
    zh_simp: "闪避强化的材料单。材料是：\n影分菇×２　甜松露×１"
    zh_trad: "閃避強化的材料單。材料是：\n影分菇×２　甜松露×１"
aux_guard:
  names:
    jp_kana: まもりのがんやく
    jp_kanji: まもりのがんやく
    en: Aux Guard
    fr: Défense Extra
    it: Difensiva extra
    de: Defensivvitamine
    es: Gragea Defensiva
    ko: 방어의환약
    zh_simp: 防守药丸
    zh_trad: 防守藥丸
  descriptions:
    jp_kana: "戦闘中のポケモンの\n守りの力を大きくあげる道具。\nひっこめると元に戻る。"
    jp_kanji: "戦闘中のポケモンの\n守りの力を大きくあげる道具。\nひっこめると元に戻る。"
    en: "An item that sharply boosts the defensive stats of a\nPokémon in battle. These effects disappear if the\nPokémon leaves the battle."
    fr: "Augmente beaucoup la puissance défensive d’un\nPokémon pendant un combat. L’effet disparaît si\nle Pokémon est retiré."
    it: "Aumenta di molto la forza difensiva di un Pokémon\nin una lotta. L’effetto svanisce se il Pokémon è sostituito."
    de: "Hebt die Defensivkraft eines Pokémon im Kampf stark\nan. Die Wirkung endet mit dem Austausch des Pokémon."
    es: "Objeto que aumenta mucho la defensiva de un\nPokémon en combate. Al cambiar de Pokémon,\nel efecto desaparece."
    ko: "배틀 중인 포켓몬의\n방어력을 크게 올리는 도구.\n포켓몬을 볼에 넣어 버리면 원래대로 되돌아간다."
    zh_simp: "大大提高战斗中\n宝可梦防守力的道具。\n离场后，效果便会消失。"
    zh_trad: "大大提高戰鬥中\n寶可夢防守力的道具。\n離場後，效果便會消失。"
aux_guard:recipe:
  names:
    jp_kana: まもりのがんやく
    jp_kanji: まもりのがんやく
    en: Aux Guard
    fr: Défense Extra
    it: Difensiva extra
    de: Defensivvitamine
    es: Gragea Defensiva
    ko: 방어의환약
    zh_simp: 防守药丸
    zh_trad: 防守藥丸
  descriptions:
    jp_kana: "まもりのがんやくのレシピ。　材料は\nテッペキクラゲ×２　ピーピーグサ×１"
    jp_kanji: "まもりのがんやくのレシピ。　材料は\nテッペキクラゲ×２　ピーピーグサ×１"
    en: "A recipe for crafting Aux Guards from scratch.\nRequired materials: 2 scraps of Iron Barktongue and\n1 Pep-Up Plant."
    fr: "Méthode pour Défense Extra. Ressources requises :\n2 Carapachampis et 1 Plante PP."
    it: "Ricetta per una Difensiva extra. Richiede 2 Ferroscudini\ne 1 radice di Erba PP."
    de: "Die Anleitung zur Herstellung von Defensivvitaminen.\nBenötigte Materialien: 2 Schildlinge und\n1 Stängel Ätherkraut."
    es: "Receta para crear Grageas Defensivas. Materiales:\n2 Setas Férreas y 1 Hierba Éter."
    ko: "방어의환약의 레시피.\n재료: 철벽버섯×2 PP풀×1"
    zh_simp: "防守药丸的材料单。材料是：\n铁壁木耳×２　ＰＰ草×１"
    zh_trad: "防守藥丸的材料單。材料是：\n鐵壁木耳×２　ＰＰ草×１"
aux_power:
  names:
    jp_kana: せめのがんやく
    jp_kanji: せめのがんやく
    en: Aux Power
    fr: Offensive Extra
    it: Offensiva extra
    de: Offensivvitamine
    es: Gragea Ofensiva
    ko: 공격의환약
    zh_simp: 进攻药丸
    zh_trad: 進攻藥丸
  descriptions:
    jp_kana: "戦闘中のポケモンの\n攻めの力を大きくあげる道具。\nひっこめると元に戻る。"
    jp_kanji: "戦闘中のポケモンの\n攻めの力を大きくあげる道具。\nひっこめると元に戻る。"
    en: "An item that sharply boosts the offensive stats of a\nPokémon in battle. These effects disappear if the\nPokémon leaves the battle."
    fr: "Augmente beaucoup la puissance offensive d’un\nPokémon pendant un combat. L’effet disparaît si\nle Pokémon est retiré."
    it: "Aumenta di molto la forza offensiva di un Pokémon\nin una lotta. L’effetto svanisce se il Pokémon è sostituito."
    de: "Hebt die Offensivkraft eines Pokémon im Kampf stark\nan. Die Wirkung endet mit dem Austausch des Pokémon."
    es: "Objeto que aumenta mucho la ofensiva de un\nPokémon en combate. Al cambiar de Pokémon,\nel efecto desaparece."
    ko: "배틀 중인 포켓몬의\n공격력을 크게 올리는 도구.\n포켓몬을 볼에 넣어 버리면 원래대로 되돌아간다."
    zh_simp: "大大提高战斗中\n宝可梦进攻力的道具。\n离场后，效果便会消失。"
    zh_trad: "大大提高戰鬥中\n寶可夢進攻力的道具。\n離場後，效果便會消失。"
aux_power:recipe:
  names:
    jp_kana: せめのがんやく
    jp_kanji: せめのがんやく
    en: Aux Power
    fr: Offensive Extra
    it: Offensiva extra
    de: Offensivvitamine
    es: Gragea Ofensiva
    ko: 공격의환약
    zh_simp: 进攻药丸
    zh_trad: 進攻藥丸
  descriptions:
    jp_kana: "せめのがんやくのレシピ。　材料は\nツルギマイタケ×２　ピーピーグサ×１"
    jp_kanji: "せめのがんやくのレシピ。　材料は\nツルギマイタケ×２　ピーピーグサ×１"
    en: "A recipe for crafting Aux Powers from scratch.\nRequired materials: 2 bunches of Swordcap and\n1 Pep-Up Plant."
    fr: "Méthode pour Offensive Extra. Ressources requises :\n2 Fortichampis et 1 Plante PP."
    it: "Ricetta per un’Offensiva extra. Richiede 2 cespi\ndi Danzaspaditole e 1 radice di Erba PP."
    de: "Die Anleitung zur Herstellung von Offensivvitaminen.\nBenötigte Materialien: 2 Schwertlinge und\n1 Stängel Ätherkraut."
    es: "Receta para crear Grageas Ofensivas. Materiales:\n2 Setas Espada y 1 Hierba Éter."
    ko: "공격의환약의 레시피.\n재료: 칼춤버섯×2 PP풀×1"
    zh_simp: "进攻药丸的材料单。材料是：\n剑舞菇×２　ＰＰ草×１"
    zh_trad: "進攻藥丸的材料單。材料是：\n劍舞菇×２　ＰＰ草×１"
aux_powerguard:
  names:
    jp_kana: マルチアップ
    jp_kanji: マルチアップ
    en: Aux Powerguard
    fr: Double Extra
    it: Multi extra
    de: Kombivitamine
    es: Gragea Multi
    ko: 멀티업
    zh_simp: 多重强化
    zh_trad: 多重強化
  descriptions:
    jp_kana: "戦闘中のポケモンの\n攻めの力と守りの力を大きくあげる道具。\nひっこめると元に戻る。"
    jp_kanji: "戦闘中のポケモンの\n攻めの力と守りの力を大きくあげる道具。\nひっこめると元に戻る。"
    en: "An item that sharply boosts the offensive and defensive\nstats of a Pokémon in battle. These effects disappear\nif the Pokémon leaves the battle."
    fr: "Augmente beaucoup la puissance offensive et\nla puissance défensive pendant un combat.\nL’effet disparaît si le Pokémon est retiré."
    it: "Aumenta di molto la forza offensiva e la forza difensiva\ndi un Pokémon in una lotta. L’effetto svanisce se\nil Pokémon è sostituito."
    de: "Hebt die Offensivkraft und Defensivkraft eines Pokémon\nim Kampf stark an. Die Wirkung endet mit dem\nAustausch des Pokémon."
    es: "Objeto que aumenta mucho la ofensiva y la defensiva\nde un Pokémon en combate. Al cambiar de Pokémon,\nel efecto desaparece."
    ko: "배틀 중인 포켓몬의\n공격력과 방어력을 크게 올리는 도구.\n포켓몬을 볼에 넣어 버리면 원래대로 되돌아간다."
    zh_simp: "大大提高战斗中宝可梦\n进攻力和防守力的道具。\n离场后，效果便会消失。"
    zh_trad: "大大提高戰鬥中寶可夢\n進攻力和防守力的道具。\n離場後，效果便會消失。"
aux_powerguard:recipe:
  names:
    jp_kana: マルチアップ
    jp_kanji: マルチアップ
    en: Aux Powerguard
    fr: Double Extra
    it: Multi extra
    de: Kombivitamine
    es: Gragea Multi
    ko: 멀티업
    zh_simp: 多重强化
    zh_trad: 多重強化
  descriptions:
    jp_kana: "マルチアップのレシピ。　材料は\nせめのがんやく×１　まもりのがんやく×１\nキングリーフ×１"
    jp_kanji: "マルチアップのレシピ。　材料は\nせめのがんやく×１　まもりのがんやく×１\nキングリーフ×１"
    en: "A recipe for crafting Aux Powerguards from scratch.\nRequired materials: 1 Aux Power, 1 Aux Guard, and\n1 bunch of King’s Leaf."
    fr: "Méthode pour Double Extra. Ressources requises :\n1 fiole d’Offensive Extra, 1 fiole de Défense Extra\net 1 bouquet d’Herbe Souveraine."
    it: "Ricetta per un Multi extra. Richiede 1 Offensiva extra,\n1 Difensiva extra e 1 ciuffo di Foglia regina."
    de: "Die Anleitung zur Herstellung von Kombivitaminen.\nBenötigte Materialien: 1 Fläschchen Offensivvitamine,\n1 Fläschchen Defensivvitamine und 1 Königsblatt."
    es: "Receta para crear Grageas Multi. Materiales:\n1 Gragea Ofensiva, 1 Gragea Defensiva y 1 Hierba\nRegia."
    ko: "멀티업의 레시피.\n재료: 공격의환약×1 방어의환약×1 킹리프×1"
    zh_simp: "多重强化的材料单。材料是：\n进攻药丸×１　防守药丸×１\n皇叶×１"
    zh_trad: "多重強化的材料單。材料是：\n進攻藥丸×１　防守藥丸×１\n皇葉×１"
avocado:
  names:
    jp_kana: アボカド
    jp_kanji: アボカド
    en: Avocado
    fr: Avocat
    it: Avocado
    de: Avocado
    es: Aguacate
    ko: 아보카도
    zh_simp: 牛油果
    zh_trad: 酪梨
  descriptions:
    jp_kana: "甘味が　ある　食材。\n味自体は　淡泊だが　コクが　あるので\n食べ応えは　十分なのだ。"
    jp_kanji: "甘味が　ある　食材。\n味自体は　淡泊だが　コクが　あるので\n食べ応えは　十分なのだ。"
    en: "An ingredient with sweet notes—though its flavor is\nvery mild. The avocado’s richness, however, makes it\nsatisfying to eat."
    fr: "Un ingrédient au goût sucré. Sa saveur subtile\nest contrebalancée par son onctuosité, ce qui en\nfait un ingrédient nourrissant et très agréable à déguster."
    it: "Un ingrediente dolce. Ha un sapore abbastanza neutro\ne una corposità che lo rende piuttosto sostanzioso."
    de: "Die cremige Note dieser süßlichen Zutat bietet einen\nAusgleich zu ihrer aromatischen Schlichtheit und\ngarantiert ein zufriedenstellendes Geschmackserlebnis."
    es: "Posee un sabor dulce y algo simplón, pero es bastante\ncontundente, por lo que sacia enseguida."
    ko: "단맛이 나는 식재료.\n맛 자체는 담백하나 진한 맛이 있어서\n포만감을 느끼기에는 충분하다."
    zh_simp: "带有甜味的食材。\n味道本身虽淡薄但有深度，\n吃起来足够让人满足。"
    zh_trad: "帶有甜味的食材。\n味道本身清淡，但又顯得濃郁，\n因此口感十足。"
awakening:
  names:
    jp_kana: ねむけざまし
    jp_kanji: ねむけざまし
    en: Awakening
    fr: Réveil
    it: Sveglia
    de: Aufwecker
    es: Despertar
    ko: 잠깨는약
    zh_simp: 解眠药
    zh_trad: 解眠藥
  descriptions:
    jp_kana: "スプレー式の　薬。\nポケモン　１匹の　ねむりの\n状態を　回復する。"
    jp_kanji: "スプレー式の　薬。\nポケモン　１匹の　ねむりの\n状態を　回復する。"
    en: "A spray-type medicine to wake the sleeping. It can be\nused to rouse a Pokémon from the clutches of sleep."
    fr: "Un médicament sous forme de spray.\nRéveille un Pokémon endormi."
    it: Rimedio spray. Sveglia un Pokémon addormentato.
    de: Ein Spray, das ein schlafendes Pokémon aufweckt.
    es: "Medicina en espray que libera a un Pokémon de las\ngarras del sueño."
    ko: "스프레이식의 약.\n포켓몬 1마리의\n잠듦 상태를 회복한다."
    zh_simp: "喷雾式药水。\n能治愈１只宝可梦的\n睡眠状态。"
    zh_trad: "噴霧式藥水。\n能治癒１隻寶可夢的\n睡眠狀態。"
axew_scales:
  names:
    jp_kana: キバゴのウロコ
    jp_kanji: キバゴのウロコ
    en: Axew Scales
    fr: Écaille de Coupenotte
    it: Squama di Axew
    de: Milza-Schuppe
    es: Escama de Axew
    ko: 터검니의비늘
    zh_simp: 牙牙的鳞片
    zh_trad: 牙牙的鱗片
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
azelfs_fang:
  names:
    jp_kana: アグノムのきば
    jp_kanji: アグノムのきば
    en: Azelf’s Fang
    fr: Croc de Créfadet
    it: Zanna di Azelf
    de: Tobutz-Fangzahn
    es: Diente de Azelf
    ko: 아그놈의이빨
    zh_simp: 亚克诺姆之牙
    zh_trad: 亞克諾姆之牙
  descriptions:
    jp_kana: "リッシ湖にすむ意思の神\nアグノムの試練を達成した証。\nあかいくさりをつくるために必要。"
    jp_kanji: "リッシ湖にすむ意思の神\nアグノムの試練を達成した証。\nあかいくさりをつくるために必要。"
    en: "Proof that you have completed the trial set by Azelf,\nthe Being of Willpower that lives in Lake Valor.\nThis item is needed to forge the Red Chain."
    fr: "Cet objet atteste que vous avez réussi l’épreuve de\nCréfadet, « l’être de la volonté » qui vit au Lac Courage.\nIl est indispensable pour forger la Chaîne Rouge."
    it: "Attesta il superamento della prova di Azelf, la divinità\ndella volontà che dimora nel Lago Valore.\nIndispensabile per forgiare la Catena rossa."
    de: "Dieser Zahn beweist deinen Abschluss der Prüfung des\nstarken Wesens Tobutz, das im See der Kühnheit lebt.\nEr ist nötig, um die Rote Kette herzustellen."
    es: "Prueba de que has superado el desafío impuesto por\nAzelf, el Ser de la Voluntad que habita en el Lago Valor.\nNecesario para forjar la Cadena Roja."
    ko: "입지호수에 사는 의지의 신\n아그놈의 시련을 클리어한 증표.\n빨강사슬을 만드는 데 필요하다."
    zh_simp: "完成了住在立志湖的意志之神\n亚克诺姆的考验的证明。\n制造红色锁链时的必备品。"
    zh_trad: "達成了住在立志湖的意志之神\n亞克諾姆的試煉的證明。\n製造紅色鎖鏈時的必備品。"
azure_flute:
  names:
    jp_kana: てんかいのふえ
    jp_kanji: てんかいのふえ
    en: Azure Flute
    fr: Flûte Azur
    it: Flauto cielo
    de: Azurflöte
    es: Flauta Azur
    ko: 천계의피리
    zh_simp: 天界之笛
    zh_trad: 天界之笛
  descriptions:
    jp_kana: "この世の　ものとは　おもえない\n音色が　なりひびく　ふえ。　いつ\nだれが　つくったのか　わからない。"
    jp_kanji: "この世の　ものとは　おもえない\n音色が　なりひびく　ふえ。　いつ\nだれが　つくったのか　わからない。"
    en: "A flute that puts out echoing sounds that do not seem\nto be of this world. No one knows who made it or when."
    fr: "Une flûte produisant des sons qui semblent provenir\nd’un autre monde. On ne sait pas qui l’a fabriquée."
    it: "Flauto che emette una melodia che sembra appartenere\na un altro mondo. Non si sa chi l’abbia creato."
    de: "Eine Flöte, deren Töne nicht von dieser Welt zu sein\nscheinen. Ihr Erschaffer ist nicht bekannt."
    es: "Emite sonidos que no parecen de este mundo. Es de\nfabricante desconocido."
    ko: "이 세상의 것이라고는 생각할 수 없는\n음색이 울려 퍼지는 피리. 언제\n누가 만들었는지 모른다."
    zh_simp: "能发出响彻云霄的天籁之音的笛子。\n不知道是谁在什么时候制造的它。"
    zh_trad: "能發出響徹雲霄的\n天籟之音的笛子。不知是什麼人\n在什麼時候製造了它。"
azurill_fur:
  names:
    jp_kana: ルリリのけ
    jp_kanji: ルリリのけ
    en: Azurill Fur
    fr: Poils d’Azurill
    it: Pelo di Azurill
    de: Azurill-Haar
    es: Pelo de Azurill
    ko: 루리리의털
    zh_simp: 露力丽的毛
    zh_trad: 露力麗的毛
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
b_w_grass_chairs:
  names:
    jp_kana: くさむらチェア
    jp_kanji: くさむらチェア
    en: B&W Grass Chairs
    fr: Sièges Hautes Herbes
    it: Sedie erba alta
    de: Retro-Gras-Stühle
    es: Sillas Hierba Alta
    ko: 풀숲 체어
    zh_simp: 草丛椅子
    zh_trad: 草叢椅子
  descriptions:
    jp_kana: "ピクニックで　使いやすい　イス。\nくさむらモノクロスの　デザインを\nもとに　作ってもらった。"
    jp_kanji: "ピクニックで　使いやすい　イス。\nくさむらモノクロスの　デザインを\nもとに　作ってもらった。"
    en: "A set of chairs that are ideal for picnicking. Their design\nwas inspired by the B&W Grass Tablecloth."
    fr: "Des sièges parfaits pour les pique-niques.\nLeur design est inspiré de la Nappe Hautes Herbes."
    it: "Pratiche sedie, perfette per i picnic, ispirate al design\ndella Tovaglia erba alta."
    de: "Diese Stühle sind gut geeignet für Picknicks.\nIhr Design basiert auf dem Retro-Gras-Tischtuch."
    es: "Unas sillas ideales para irse de pícnic. Su diseño está\nbasado en el del Mantel Hierba Alta."
    ko: "피크닉에서 사용하기 편한 의자.\n풀숲 흑백 테이블보의\n디자인을 토대로 만들어졌다."
    zh_simp: "在野餐时很好用的椅子。\n根据黑白草丛桌巾的设计制作而成。"
    zh_trad: "野餐時很好用的椅子。\n根據黑白草叢桌巾的設計製作而成。"
b_w_grass_tablecloth:
  names:
    jp_kana: くさむらモノクロス
    jp_kanji: くさむらモノクロス
    en: B&W Grass Tablecloth
    fr: Nappe Hautes Herbes
    it: Tovaglia erba alta
    de: Retro-Gras-Tischtuch
    es: Mantel Hierba Alta
    ko: 풀숲 흑백 테이블보
    zh_simp: 黑白草丛桌巾
    zh_trad: 黑白草叢桌巾
  descriptions:
    jp_kana: "草むらに　ひそむ　ポケモンたちが\n今にも　飛び出してきそうな\nモノトーンカラーの　こじゃれた　クロス。"
    jp_kanji: "草むらに　ひそむ　ポケモンたちが\n今にも　飛び出してきそうな\nモノトーンカラーの　こじゃれた　クロス。"
    en: "A tablecloth with a fun, trendy black-and-white design\nfeaturing Pokémon that seem poised to leap from the\ntall grass at any moment."
    fr: "Une nappe monochrome montrant des hautes herbes.\nLes Pokémon qui y sont cachés semblent prêts à\nbondir vers vous."
    it: "Sembra quasi che i Pokémon nascosti nell’erba alta\ndisegnati su questa stilosa tovaglia monocromatica\nstiano per balzare fuori da un momento all’altro."
    de: "Dieses schicke Tischtuch in schwarz-weißem Retro-Look\nzieren Pokémon, die nur darauf zu warten scheinen, aus\ndem hohen Gras hervorzuspringen."
    es: "Un mantel monocromático con mucho estilo en el que\naparecen unos Pokémon acechando desde la hierba alta."
    ko: "풀숲에 숨어 있는 포켓몬들이\n당장이라도 튀어나올 것만 같은\n모노톤의 재미있는 테이블보."
    zh_simp: "黑白配色的精美桌巾。\n藏身在草丛中的宝可梦\n感觉随时都会跳出来。"
    zh_trad: "黑白色調的時髦桌巾。\n藏身在草叢中的寶可夢們\n似乎隨時都會跳出來。"
babiri_berry:
  names:
    jp_kana: リリバのみ
    jp_kanji: リリバのみ
    en: Babiri Berry
    fr: Baie Babiri
    it: Baccababiri
    de: Babiribeere
    es: Baya Baribá
    ko: 바리비열매
    zh_simp: 霹霹果
    zh_trad: 霹霹果
  descriptions:
    jp_kana: "ポケモンに　持たせると\n効果バツグンの　はがね技を\n受けたとき　威力が　弱まる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　はがね技を\n受けたとき　威力が　弱まる。"
    en: "If a Pokémon holding this Berry is hit with a\nsupereffective Steel-type move, the power of that\nmove will be weakened."
    fr: "Tenue, cette Baie réduit les dégâts subis lorsque\nle Pokémon est touché par une capacité super efficace\nde type Acier."
    it: "Se il Pokémon che ha questa bacca subisce una mossa\nsuperefficace di tipo Acciaio, la potenza della mossa\nviene indebolita."
    de: "Als getragenes Item schwächt diese Beere eine\nsehr effektive Stahl-Attacke, von der das Pokémon\ngetroffen wird."
    es: "Si la lleva un Pokémon, debilita un ataque supereficaz\nde tipo Acero que reciba."
    ko: "포켓몬에게 지니게 하면\n효과가 굉장한 강철 기술로\n공격받았을 때 위력이 약해진다."
    zh_simp: "让宝可梦携带后，\n在受到效果绝佳的钢属性招式\n攻击时，能令其威力减弱。"
    zh_trad: "讓寶可夢攜帶後，\n在受到效果絕佳的鋼屬性招式\n攻擊時，能使其威力減弱。"
bachs_food_tin:
  names:
    jp_kana: バックのかんづめ
    jp_kanji: バックのかんづめ
    en: Bach’s Food Tin
    fr: Conserve de Bach
    it: Scatoletta Bach
    de: Bachs Feinkost
    es: Lata de Bach
    ko: 바크의통조림
    zh_simp: 巴哈罐头
    zh_trad: 巴哈罐頭
  descriptions:
    jp_kana: "キャンプの　料理に　使う\n食材の　一種。バックが　売る\n缶詰が　なぜか　ガラルで　人気だ。"
    jp_kanji: "キャンプの　料理に　使う\n食材の　一種。バックが　売る\n缶詰が　なぜか　ガラルで　人気だ。"
    en: "One of the many ingredients that can be used for\ncooking at your camp. The tinned food that Bach sells\nis curiously popular in Galar."
    fr: "Un ingrédient de cuisine pour le camping.\nCette conserve, vendue par Bach, connaît un succès\nsurprenant à Galar."
    it: "Uno degli ingredienti che puoi usare per cucinare\nin campeggio. Queste scatolette vendute da Bach\nsono particolarmente amate dagli abitanti di Galar."
    de: "Eine Zutat für PokéCamping-Mahlzeiten. Diese von\nBach vertriebene Dosennahrung erfreut sich in Galar\nüberraschend hoher Beliebtheit."
    es: "Un ingrediente para cocinar en el campamento. Las\nconservas de Bach son muy apreciadas por todo Galar."
    ko: "캠프 요리에 사용되는\n식재료 중 하나. 바크가 파는 통조림은\n어째선지 가라르에서 인기다."
    zh_simp: "在露营营地制作料理时会使用的\n一种食材。不知是什么原因，\n巴哈卖的罐头在伽勒尔特别受欢迎。"
    zh_trad: "製作露營料理時使用的食材之一。\n巴哈賣的罐頭不知為何\n在伽勒爾很受歡迎。"
bacon:
  names:
    jp_kana: やきベーコン
    jp_kanji: やきベーコン
    en: Bacon
    fr: Bacon
    it: Pancetta rosolata
    de: Gebratener Speck
    es: Panceta
    ko: 구운베이컨
    zh_simp: 煎培根
    zh_trad: 煎培根
  descriptions:
    jp_kana: "塩味が　強い　食材。\n焦げる寸前まで　じっくり　焼いているので\n香ばしさと　うま味が　たっぷりだぞ。"
    jp_kanji: "塩味が　強い　食材。\n焦げる寸前まで　じっくり　焼いているので\n香ばしさと　うま味が　たっぷりだぞ。"
    en: "This very salty ingredient has been cooked just shy of\ncharred, making it burst with fragrance and tasty flavor."
    fr: "Un ingrédient au goût très salé. Cuit jusqu’à\ncaramélisation, sa saveur déborde d’umami et\nde parfums alléchants."
    it: "Un ingrediente molto salato. Cotta quasi fino\nad abbrustolirla, è fragrante e molto saporita."
    de: "Diese sehr salzige Zutat besitzt ein intensives Aroma und\nvollmundigen Geschmack, da sie schön kross angebraten\nwurde."
    es: "Tiene un sabor salado bastante fuerte, pero, si se cocina\nhasta estar casi quemada, se vuelve intensa y aromática."
    ko: "짠맛이 강한 식재료.\n타기 직전까지 바짝 구워서\n고소함과 감칠맛으로 가득하다."
    zh_simp: "咸味强烈的食材。\n充分煎至焦脆程度恰到好处，\n因此香味与鲜味十足。"
    zh_trad: "鹹味強勁的食材。\n充分煎得要焦而不焦，\n使香味和鮮味相當飽滿。"
bagon_scales:
  names:
    jp_kana: タツベイのウロコ
    jp_kanji: タツベイのウロコ
    en: Bagon Scales
    fr: Écaille de Draby
    it: Squama di Bagon
    de: Kindwurm-Schuppe
    es: Escama de Bagon
    ko: 아공이의비늘
    zh_simp: 宝贝龙的鳞片
    zh_trad: 寶貝龍的鱗片
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
baguette:
  names:
    jp_kana: バゲット
    jp_kanji: バゲット
    en: Baguette
    fr: Baguette
    it: Filoncino
    de: Baguette
    es: Barra de Pan
    ko: 바게트
    zh_simp: 长棍面包
    zh_trad: 長棍麵包
  descriptions:
    jp_kana: "棒状のパンを　スライスしたもの。\n小麦の香りと　素朴な塩味は\nどんな食材とも　マッチするのだ。"
    jp_kanji: "棒状のパンを　スライスしたもの。\n小麦の香りと　素朴な塩味は\nどんな食材とも　マッチするのだ。"
    en: "A long loaf sliced into top and bottom halves. Its aroma\nof wheat and its straightforward, salty flavor make it pair\nwell with all kinds of sandwich ingredients."
    fr: "Un pain oblong coupé en deux. Son parfum de blé\net son goût naturellement salé lui permettent d’aller\navec toutes sortes d’ingrédients."
    it: "Filoncino di pane tagliato a metà. L’aroma del grano\ne il sapore semplice del sale lo rendono perfetto per\nogni tipo di companatico."
    de: "Die länglichen Brothälften harmonieren dank ihres\nwunderbaren Weizendufts sowie ihres schlichten\nsalzigen Geschmacks mit allen möglichen Zutaten."
    es: "Una barra de pan cortada en dos mitades. El aroma\nsuave del trigo y su sencillo sabor salado casan a la\nperfección con cualquier ingrediente."
    ko: "막대기 모양의 빵을 자른 것.\n밀가루의 향과 소박한 짠맛이\n어떤 식재료와도 잘 어울린다."
    zh_simp: "以切开的棒状面包制成。\n带有小麦的香味与朴素的咸味，\n无论与什么食材都很搭配。"
    zh_trad: "切開的棒狀麵包。\n小麥的香氣和樸素的鹹味\n和什麼樣的食材都能搭配。"
ball_of_mud:
  names:
    jp_kana: どろだんご
    jp_kanji: どろだんご
    en: Ball of Mud
    fr: Boule de Boue
    it: Palla di fango
    de: Lehmball
    es: Bola de Lodo
    ko: 진흙경단
    zh_simp: 泥丸
    zh_trad: 泥丸
  descriptions:
    jp_kana: "カチカチに固めた　どろだんご。\n当てられたポケモンは動きが鈍り\n隙がうまれることもある。"
    jp_kanji: "カチカチに固めた　どろだんご。\n当てられたポケモンは動きが鈍り\n隙がうまれることもある。"
    en: "A ball of mud that has become stiff and hard. Hitting a\nPokémon with one may stun the Pokémon, creating an\nopening for you to act."
    fr: "Une Boule de Boue qui a durci. Lancez-la sur\nun Pokémon pour ralentir ses mouvements,\nvoire le rendre vulnérable."
    it: "Palla di fango compatta e dura. Se lanciata contro\nun Pokémon, ne rallenta i movimenti e può fargli\nabbassare la guardia."
    de: "Wird dieser erhärtete Lehmball auf ein Pokémon\ngeworfen, macht er es schwerfälliger und schafft so\nmöglicherweise eine günstige Gelegenheit für dich."
    es: "Bola de lodo que se ha endurecido. Al acertar a un\nPokémon con ella, dificulta sus movimientos y puede\ndejarlo expuesto."
    ko: "단단하게 굳은 진흙 경단.\n포켓몬에게 던지면 움직임이 둔해져서\n빈틈이 생길 때가 있다."
    zh_simp: "硬邦邦的坚固泥丸。\n被它击中的宝可梦动作会\n变得迟缓，有时还会生出破绽。"
    zh_trad: "硬梆梆的堅固泥丸。\n被它擊中的寶可夢動作會\n變得遲緩，有時還會生出破綻。"
balm_mushroom:
  names:
    jp_kana: かおるキノコ
    jp_kanji: かおるキノコ
    en: Balm Mushroom
    fr: Champi Suave
    it: Profumfungo
    de: Duftpilz
    es: Seta Aroma
    ko: 향기버섯
    zh_simp: 芳香蘑菇
    zh_trad: 芳香蘑菇
  descriptions:
    jp_kana: "あたりいったいに　いい香りが\nひろがる　めずらしいキノコ。\nショップで　高く　売れる。"
    jp_kanji: "あたりいったいに　いい香りが\nひろがる　めずらしいキノコ。\nショップで　高く　売れる。"
    en: "A rare mushroom that gives off a nice fragrance.\nIt can be sold at a high price to shops."
    fr: "Un champignon rare qui répand un agréable parfum\nautour de lui. Peut être vendu à bon prix en magasin."
    it: "Fungo raro che emana un profumo gradevolissimo.\nSi può vendere a un prezzo alto nei negozi."
    de: "Ein seltener Pilz, der ein angenehmes Aroma verbreitet.\nKann für viel Geld verkauft werden."
    es: "Extraña seta que desprende un agradable aroma.\nPuede venderse a buen precio en las tiendas."
    ko: "주변 일대에 좋은 향기가\n퍼지는 희귀한 버섯.\n상점에서 비싸게 팔린다."
    zh_simp: "能让附近一带\n芳香四溢的珍稀蘑菇。\n可以在商店高价出售。"
    zh_trad: "能讓附近一帶\n充滿馥郁香氣的稀奇蘑菇。\n可以在商店高價出售。"
banana:
  names:
    jp_kana: バナナスライス
    jp_kanji: バナナスライス
    en: Banana
    fr: Banane
    it: Banana
    de: Banane
    es: Plátano
    ko: 바나나슬라이스
    zh_simp: 香蕉片
    zh_trad: 香蕉片
  descriptions:
    jp_kana: "甘味が　強い　食材。\n甘さと　コクがあり　好物にしている\nポケモンが　多い　定番フルーツだ。"
    jp_kanji: "甘味が　強い　食材。\n甘さと　コクがあり　好物にしている\nポケモンが　多い　定番フルーツだ。"
    en: "A very sweet ingredient. This go-to fruit is sweet and\nrich, and it’s beloved by many Pokémon."
    fr: "Un ingrédient au goût très sucré.\nSa douceur unique en fait un fruit incontournable\napprécié par de très nombreux Pokémon."
    it: "Un ingrediente molto dolce. Un frutto di sicuro successo,\namato da molti Pokémon per il suo gusto dolce e\ncorposo."
    de: "Eine sehr süße Zutat. Aufgrund ihrer Süße und der\ncharakteristischen Konsistenz ist diese Frucht der\nklare Favorit vieler Pokémon."
    es: "Una fruta que es muy popular entre los Pokémon por\nsu dulzor y suculencia."
    ko: "단맛이 강한 식재료.\n단맛과 진한 맛이 있어 좋아하는\n포켓몬이 많은 정석적인 과일이다."
    zh_simp: "甜味强烈的食材。\n甘甜味美，是很多宝可梦\n都喜爱的经典水果。"
    zh_trad: "甜味強勁的食材。\n甜度和馥郁兼具，且廣受寶可夢喜愛，\n屬於國民級的水果。"
band_autograph:
  names:
    jp_kana: バンドのサイン
    jp_kanji: バンドのサイン
    en: Band Autograph
    fr: Dédicace
    it: Autografo band
    de: Band-Autogramm
    es: Autógrafo Grupo
    ko: 밴드의사인
    zh_simp: 乐队的签名
    zh_trad: 樂團的簽名
  descriptions:
    jp_kana: "ガラル地方の　カリスマで　ある\nバンド「マキシマイザズ」の\nメンバー　全員に　よる　サイン。"
    jp_kanji: "ガラル地方の　カリスマで　ある\nバンド「マキシマイザズ」の\nメンバー　全員に　よる　サイン。"
    en: "It’s signed by all members of the Galar region’s most\ncharismatic band, the Maximizers."
    fr: "Une dédicace des membres du célèbre groupe de Galar,\n« The Maximizers », au grand complet."
    it: "Gli autografi di tutti i membri della banda\npiù carismatica di Galar, i \"Maximizers\"."
    de: "Auf dieser Autogrammkarte haben alle Mitglieder der\nMaximizers unterschrieben. Die Band erfreut sich in der\nGalar-Region großer Beliebtheit."
    es: "Un autógrafo firmado por todos los miembros de los\nMaximizers, el grupo musical más carismático de Galar."
    ko: "가라르지방의 카리스마 넘치는\n밴드 “맥시마이저즈”\n멤버 전원의 사인."
    zh_simp: "伽勒尔地区的标志性乐队\n“马西马赛”\n全体成员的亲笔签名。"
    zh_trad: "伽勒爾地區神級樂團\n「馬西馬賽」全體成員的簽名。"
banettite:
  names:
    jp_kana: ジュペッタナイト
    jp_kanji: ジュペッタナイト
    en: Banettite
    fr: Branettite
    it: Banettite
    de: Banetteonit
    es: Banettita
    ko: 다크펫나이트
    zh_simp: 诅咒娃娃进化石
    zh_trad: 詛咒娃娃進化石
  descriptions:
    jp_kana: "ジュペッタに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    jp_kanji: "ジュペッタに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Banette hold it, and this stone will enable it to\nMega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Branette, elle lui permet de\nméga-évoluer durant un combat."
    it: "Una delle misteriose Megapietre. Data a Banette,\ngli permette di megaevolversi durante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Banette getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Banette en combate."
    ko: "다크펫에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让诅咒娃娃携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓詛咒娃娃攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
barboach_slime:
  names:
    jp_kana: ドジョッチのねんえき
    jp_kanji: ドジョッチのねんえき
    en: Barboach Slime
    fr: Mucus de Barloche
    it: Muco di Barboach
    de: Schmerbe-Schleim
    es: Secreción de Barboach
    ko: 미꾸리의점액
    zh_simp: 泥泥鳅的黏液
    zh_trad: 泥泥鰍的黏液
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
barred_cup:
  names:
    jp_kana: よこストライプカップ
    jp_kanji: よこストライプカップ
    en: Barred Cup
    fr: Tasse à Rayures Bleues
    it: Tazza a righe orizzontali
    de: Querstreifen-Tasse
    es: Taza Raya Horizontal
    ko: 가로 줄무늬 컵
    zh_simp: 横条纹水杯
    zh_trad: 橫條紋水杯
  descriptions:
    jp_kana: "家での食事でも　活躍する　カップ。\n軽くて　丈夫で　重ねられるので\n収納や　持ち運びに　とても便利。"
    jp_kanji: "家での食事でも　活躍する　カップ。\n軽くて　丈夫で　重ねられるので\n収納や　持ち運びに　とても便利。"
    en: "A cup that’s as good for using at home as on a picnic.\nIt’s light, sturdy, and stacks well, so it’s a cinch to pack\nup and carry around."
    fr: "Une tasse pouvant être utilisée partout, même chez soi.\nLégère et solide, elle s’emboîte avec d’autres tasses\nsimilaires, ce qui la rend facile à emporter et à stocker."
    it: "Tazza leggera e resistente, ottima da usare anche a casa.\nEssendo impilabile è comodissima sia da riporre che da\ntrasportare."
    de: "Diese Tasse eignet sich auch für den Gebrauch daheim.\nSie ist leicht, robust und lässt sich stapeln, weshalb man\nsie prima verstauen und überallhin mitnehmen kann."
    es: "Apta para usarse incluso en casa, esta ligera y resistente\ntaza se puede apilar con facilidad, lo que facilita tanto\nsu almacenamiento como su transporte."
    ko: "집에서 식사할 때도 쓰기 좋은 컵.\n가볍고 튼튼한 데다 겹쳐서 쌓을 수도 있어서\n휴대하거나 수납하기에도 매우 편하다."
    zh_simp: "在家吃饭时也经常会用到的杯子。\n轻巧坚固，能叠起来收纳，方便携带。"
    zh_trad: "在家庭餐桌上也是常客的水杯。\n既輕巧又堅固，而且還能堆疊，\n因此在收納或攜帶上都很方便。"
basculegion_food:
  names:
    jp_kana: イダイトウだんご
    jp_kanji: イダイトウだんご
    en: Basculegion Food
    fr: Appâragruel
    it: Esca Basculegion
    de: Salmagnis-Kloß
    es: Cebo Basculegion
    ko: 대쓰여너경단
    zh_simp: 幽尾玄鱼丸
    zh_trad: 幽尾玄魚丸
  descriptions:
    jp_kana: "ライドポケモン　イダイトウの好物。\n変わった手段で集めた材料を\n変わった手段で調理してつくる。"
    jp_kanji: "ライドポケモン　イダイトウの好物。\n変わった手段で集めた材料を\n変わった手段で調理してつくる。"
    en: "A favored food of Basculegion, a Pokémon that will bear\nyou on its back. This food is crafted in an unusual way,\nfrom ingredients gathered via equally unusual methods."
    fr: "Un mets apprécié de Paragruel, l’une des Montures\nPokémon. On le prépare selon un procédé particulier,\navec des ressources acquises d’une manière inhabituelle."
    it: "Il piatto preferito di Basculegion, uno dei Pokémon\ndel Poképassaggio. Composto da materiali peculiari\ne cotto con metodi altrettanto peculiari."
    de: "Die Lieblingsspeise des Reit-Pokémon Salmagnis. Die\nMaterialien wurden auf ungewöhnliche Weise gesammelt\nund dann auf ebenso ungewöhnliche Weise zubereitet."
    es: "Aperitivo favorito de la Montura Pokémon Basculegion.\nSe elabora mediante un particular método a partir de\ningredientes obtenidos de forma un tanto peculiar."
    ko: "라이드포켓몬 대쓰여너가 좋아하는 음식.\n특이한 방법으로 모은 재료를\n특이한 방법으로 조리해서 만든다."
    zh_simp: "坐骑宝可梦幽尾玄鱼喜爱的食物。\n是通过奇特的手段收集材料，\n再以奇特的手段烹饪而成。"
    zh_trad: "坐騎寶可夢幽尾玄魚喜愛的食物。\n是透過奇特的手段收集材料，\n再以奇特的手段調理而成。"
basculin_fang:
  names:
    jp_kana: バスラオのキバ
    jp_kanji: バスラオのキバ
    en: Basculin Fang
    fr: Croc de Bargantua
    it: Dente di Basculin
    de: Barschuft-Zahn
    es: Colmillo de Basculin
    ko: 배쓰나이의이빨
    zh_simp: 野蛮鲈鱼的牙
    zh_trad: 野蠻鱸魚的牙
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
basement_key:goldenrod_tunnel:
  names:
    jp_kana: ちかのかぎ
    jp_kanji: ちかのかぎ
    en: Basement Key
    fr: Clé Sous-Sol
    it: Chiave sotterr.
    de: Kelleröffner
    es: Llave del Sótano
    ko: 지하의열쇠
    zh_simp: 地下钥匙
    zh_trad: 地下鑰匙
  descriptions:
    jp_kana: "コガネ地下道に　ある　扉を\n空ける　カギ。"
    jp_kanji: "コガネ地下道に　ある　扉を\n空ける　カギ。"
    en: A key that opens a door in the Goldenrod Tunnel.
    fr: "Une clé qui permet d’ouvrir la porte au fond\ndu Doublon-Tunnel."
    it: "Chiave che permette di aprire la porta all’interno\ndel Fiortunnel."
    de: "Ein Schlüssel, der eine Tür in der Dukatia-Passage von\nDukatia City öffnet."
    es: Llave que abre la puerta que hay en el Túnel Trigal.
    ko: "금빛지하도에 있는 문을\n여는 열쇠."
    zh_simp: "用来打开满金地道\n大门的钥匙。"
    zh_trad: "用來打開滿金地下道的\n門的鑰匙。"
basement_key:new_mauville:
  names:
    jp_kana: ちかのカギ
    jp_kanji: ちかのカギ
    en: Basement Key
    fr: Clé Sous-Sol
    it: Chiave sotterr.
    de: Kelleröffner
    es: Llave del Sótano
    ko: 지하열쇠
    zh_simp: 地下钥匙
    zh_trad: 地下鑰匙
  descriptions:
    jp_kana: "キンセツの　地下にある\nニューキンセツに\n入るための　カギ。"
    jp_kanji: "キンセツの　地下にある\nニューキンセツに\n入るための　カギ。"
    en: "The key to New Mauville, which was constructed\nbeneath Mauville City."
    fr: "Une clé permettant d’accéder à New Lavandia,\ndans les sous-sols de Lavandia."
    it: "Chiave che permette di accedere a Ciclanova,\nla città sotterranea costruita sotto a Ciclamipoli."
    de: "Ein Schlüssel, der dir Zugang nach Neu Malvenfroh\nverschafft, welches unter Malvenfroh City liegt."
    es: "Llave que da acceso a Malvalanova, situada en los\nsubterráneos de Ciudad Malvalona."
    ko: "보라시티 지하에 있는\n뉴보라에 들어가기 위한 열쇠."
    zh_simp: "进入紫堇地下的新紫堇时，\n所使用的钥匙。"
    zh_trad: "用於進入紫菫地下的\n新紫菫的鑰匙。"
basil:
  names:
    jp_kana: バジル
    jp_kanji: バジル
    en: Basil
    fr: Basilic
    it: Basilico
    de: Basilikum
    es: Albahaca
    ko: 바질
    zh_simp: 罗勒
    zh_trad: 羅勒
  descriptions:
    jp_kana: "苦味が　強い　食材。\n扱いやすい　ハーブの一種。\n香り高く　トマトとの　相性が　よい。"
    jp_kanji: "苦味が　強い　食材。\n扱いやすい　ハーブの一種。\n香り高く　トマトとの　相性が　よい。"
    en: "A very bitter ingredient that’s quite versatile, as herbs\ngo. It’s fragrant and goes well with tomatoes."
    fr: "Un ingrédient au goût très amer. Cette herbacée\ntrès odorante se marie bien avec beaucoup\nd’aliments, mais plus particulièrement les tomates."
    it: "Un ingrediente molto amaro. Erba aromatica facile\nda usare in cucina, si abbina bene con i Pomodori."
    de: "Eine sehr bittere, doch äußerst vielseitige Zutat. Diese\nKräutersorte duftet herrlich und harmoniert besonders\ngut mit Tomaten."
    es: "Una hierba de fuerte sabor amargo y muy aromática.\nSe puede usar de diversas formas, pero combina\nespecialmente bien con el tomate."
    ko: "쓴맛이 강한 식재료.\n다루기 쉬운 허브의 일종.\n향이 진해서 토마토와 궁합이 잘 맞는다."
    zh_simp: "苦味强烈的食材。\n是一种容易使用的香草。\n十分芳香，与番茄很搭配。"
    zh_trad: "苦味強勁的食材。\n是容易使用的香草之一。\n氣味芬芳，和番茄非常搭配。"
battle_chairs:
  names:
    jp_kana: しょうぶチェア
    jp_kanji: しょうぶチェア
    en: Battle Chairs
    fr: Sièges Combat Pokémon
    it: Sedie sfida
    de: Action-Stühle
    es: Sillas Combate
    ko: 배틀 체어
    zh_simp: 对决椅子
    zh_trad: 對決椅子
  descriptions:
    jp_kana: "ピクニックで　使いやすい　イス。\nしょうぶクロスの　デザインを\nもとに　作ってもらった。"
    jp_kanji: "ピクニックで　使いやすい　イス。\nしょうぶクロスの　デザインを\nもとに　作ってもらった。"
    en: "A set of chairs that are ideal for picnicking. Their design\nwas inspired by the Battle Tablecloth."
    fr: "Des sièges parfaits pour les pique-niques.\nLeur design est inspiré de la Nappe Combat Pokémon."
    it: "Pratiche sedie, perfette per i picnic, ispirate al design\ndella Tovaglia sfida."
    de: "Diese Stühle sind gut geeignet für Picknicks.\nIhr Design basiert auf dem Action-Tischtuch."
    es: "Unas sillas ideales para irse de pícnic. Su diseño está\nbasado en el del Mantel Combate."
    ko: "피크닉에서 사용하기 편한 의자.\n배틀 테이블보의\n디자인을 토대로 만들어졌다."
    zh_simp: "在野餐时很好用的椅子。\n根据对决桌巾的设计制作而成。"
    zh_trad: "野餐時很好用的椅子。\n根據對決桌巾的設計製作而成。"
battle_pocket:
  names:
    jp_kana: バトルポケット
    jp_kanji: バトルポケット
    en: Battle Pocket
    fr: Poche de Combat
    it: Tasca lotta
    de: Kampftasche
    es: Bolsillo Combate
    ko: 배틀포켓
    zh_simp: 对战口袋
    zh_trad: 對戰口袋
  descriptions:
    jp_kana: "ー\nー\nー"
    jp_kanji: "ー\nー\nー"
    en: "-\n-\n-"
    fr: "-\n-\n-"
    it: "-\n-\n-"
    de: ー
    es: "-\n-\n-"
    ko: "-\n-\n-"
    zh_simp: "ー\nー\nー"
    zh_trad: "ー\nー\nー"
battle_tablecloth:
  names:
    jp_kana: しょうぶクロス
    jp_kanji: しょうぶクロス
    en: Battle Tablecloth
    fr: Nappe Combat Pokémon
    it: Tovaglia sfida
    de: Action-Tischtuch
    es: Mantel Combate
    ko: 배틀 테이블보
    zh_simp: 对决桌巾
    zh_trad: 對決桌巾
  descriptions:
    jp_kana: "ビビッドなカラーが　目を引く　一品。\nこれを　敷いて　食事を　すれば\n人もポケモンも　やる気が　みなぎる。"
    jp_kanji: "ビビッドなカラーが　目を引く　一品。\nこれを　敷いて　食事を　すれば\n人もポケモンも　やる気が　みなぎる。"
    en: "A garish, eye-catching tablecloth. Putting this on your\npicnic table will inspire any person or Pokémon who eats\nthere to do their best."
    fr: "Une nappe aux couleurs éclatantes qui attire le regard.\nN’importe quel humain ou Pokémon mangeant sur cette\nnappe se sentira prêt à tout entreprendre."
    it: "Tovaglia appariscente dai colori sgargianti. Una tavola\napparecchiata con questa tovaglia dà la carica sia\nai Pokémon che alle persone."
    de: "Mit seinen lebhaften Farben zieht dieses Tischtuch alle\nBlicke auf sich. Wirft man es über den Esstisch, sprudeln\nMensch und Pokémon nur so über vor Tatendrang!"
    es: "Este mantel cuenta con un diseño y unos colores muy\nllamativos que llenan de energía y vitalidad tanto a\npersonas como a Pokémon."
    ko: "비비드한 컬러가 눈길을 사로잡는 테이블보.\n이것을 깔고 식사하면\n사람도 포켓몬도 의욕이 샘솟는다."
    zh_simp: "颜色鲜艳引人注目的桌巾。\n只要铺上这个吃饭，\n无论是人还是宝可梦都会充满干劲。"
    zh_trad: "鮮明的色彩抓得住眾人的目光。\n鋪設這種桌巾後再用餐，\n不論是人還是寶可夢都會充滿幹勁。"
beach_glass:
  names:
    jp_kana: うみべのガラス
    jp_kanji: うみべのガラス
    en: Beach Glass
    fr: Galet de Verre
    it: Vetro marino
    de: Strandscherbe
    es: Cristal Marino
    ko: 바닷가유리
    zh_simp: 海边的玻璃
    zh_trad: 海邊的玻璃
  descriptions:
    jp_kana: "波に　もまれて　丸くなった\n色のついた　ガラス片。\n少し　ざらざら　している。"
    jp_kanji: "波に　もまれて　丸くなった\n色のついた　ガラス片。\n少し　ざらざら　している。"
    en: "A piece of colored glass. Waves have rounded its edges.\nIt’s slightly rough to the touch."
    fr: "Un morceau de verre coloré arrondi par les vagues.\nSa texture est légèrement rugueuse."
    it: "Un piccolo pezzetto di vetro colorato che è stato\narrotondato dalle onde del mare. È un po’ ruvido\nal tatto."
    de: "Ein farbiges Stück Glas, das von den Wellen umspült\nund so abgeschliffen wurde. Es fühlt sich etwas rau an."
    es: "Cristal de colores pulido por la acción erosiva de las\nolas. Al tacto resulta algo áspero."
    ko: "파도에 깎여 둥글어진\n색이 있는 유리 파편.\n조금 거칠거칠하다."
    zh_simp: "受到波浪的洗刷从而\n变成圆形的彩色玻璃片。\n表面摸起来有点粗糙不平。"
    zh_trad: "受海浪沖刷而變圓的\n彩色玻璃碎片。\n表面有點粗糙。"
bean_cake:
  names:
    jp_kana: マメよせだま
    jp_kanji: マメよせだま
    en: Bean Cake
    fr: Appât Dodu
    it: Polpetta fagioli
    de: Bohnenköder
    es: Cebo de Habas
    ko: 콩유인환
    zh_simp: 豆诱团
    zh_trad: 豆誘糰
  descriptions:
    jp_kana: "マメとよせだまのもとを練りこんだもの。\n鳥ポケモンや魚ポケモンを\n強く引き寄せることができる。"
    jp_kanji: "マメとよせだまのもとを練りこんだもの。\n鳥ポケモンや魚ポケモンを\n強く引き寄せることができる。"
    en: "A cake made by combining beans with a Cake-Lure\nBase. These cakes are potently effective at attracting fish\nPokémon, as well as bird Pokémon and their flying ilk."
    fr: "Obtenu en pétrissant une boule d’Appâte mélangée\nà une fève, cet appât attire fortement les Pokémon\npareils à des oiseaux ou à des poissons."
    it: "Strumento creato aggiungendo dei fagioli a una\nPolpetta base. Esercita una forte attrattiva in particolare\nsui Pokémon alati e acquatici."
    de: "Eine Mischung aus Köderteig und Bohnen, von der\nVogel- sowie Fisch-Pokémon stark angezogen werden."
    es: "Bola de cebo creada con habas y masa que atrae a\nlos Pokémon con atributos de pájaro o de pez."
    ko: "콩과 유인환반죽을 섞어서 반죽한 것.\n새포켓몬이나 물고기포켓몬을\n강하게 유인하는 효과가 있다."
    zh_simp: "由豆子与诱团原料糅合而成。\n对鸟宝可梦和鱼宝可梦\n有着很强的吸引力。"
    zh_trad: "由豆子與誘糰原料揉合而成。\n對鳥寶可夢和魚寶可夢\n有著很強的吸引力。"
bean_cake:recipe:
  names:
    jp_kana: マメよせだま
    jp_kanji: マメよせだま
    en: Bean Cake
    fr: Appât Dodu
    it: Polpetta fagioli
    de: Bohnenköder
    es: Cebo de Habas
    ko: 콩유인환
    zh_simp: 豆诱团
    zh_trad: 豆誘糰
  descriptions:
    jp_kana: "マメよせだまのレシピ。　材料は\nころころマメ×１　よせだまのもと×１"
    jp_kanji: "マメよせだまのレシピ。　材料は\nころころマメ×１　よせだまのもと×１"
    en: "A recipe for crafting Bean Cakes from scratch.\nRequired materials: 1 pod of Plump Beans and\n1 Cake-Lure Base."
    fr: "Méthode pour Appât Dodu. Ressources requises :\n1 Fève Dodue et 1 boule d’Appâte."
    it: "Ricetta per una Polpetta fagioli. Richiede 1 baccello\ndi Fagioli paffuti e 1 Polpetta base."
    de: "Die Anleitung zur Herstellung eines Bohnenköders.\nBenötigte Materialien: 1 Kullerbohne und\n1 Portion Köderteig."
    es: "Receta para crear Cebos de Habas. Materiales:\n1 Haba Suculenta y 1 bola de Masa para Cebo."
    ko: "콩유인환의 레시피.\n재료: 통통콩×1 유인환반죽×1"
    zh_simp: "豆诱团的材料单。材料是：\n滚滚豆×１　诱团原料×１"
    zh_trad: "豆誘糰的材料單。材料是：\n滾滾豆×１　誘糰原料×１"
beast_ball:
  names:
    jp_kana: ウルトラボール
    jp_kanji: ウルトラボール
    en: Beast Ball
    fr: Ultra Ball
    it: UC Ball
    de: Ultraball
    es: Ente Ball
    ko: 울트라볼
    zh_simp: 究极球
    zh_trad: 究極球
  descriptions:
    jp_kana: "ポケモンが　捕まえにくい\nちょっと変わった　ボール。"
    jp_kanji: "ポケモンが　捕まえにくい\nちょっと変わった　ボール。"
    en: "A somewhat different Poké Ball that is not very\neffective when catching Pokémon."
    fr: "Une Poké Ball un peu spéciale avec laquelle\nil est assez difficile de capturer des Pokémon."
    it: "Poké Ball un po’ diversa con cui è difficile catturare\nPokémon."
    de: "Ein etwas ungewöhnlicher Ball, mit dem sich Pokémon\nnur schwer fangen lassen."
    es: "Poké Ball algo distinta a las demás con la que resulta\ndifícil capturar Pokémon."
    ko: "포켓몬을 잡기 어려운\n조금 특이한 볼."
    zh_simp: "有些与众不同的精灵球。\n很难捕捉一般的宝可梦。"
    zh_trad: "有點與眾不同的球。\n很難捕捉寶可夢。"
beedrillite:
  names:
    jp_kana: スピアナイト
    jp_kanji: スピアナイト
    en: Beedrillite
    fr: Dardargnite
    it: Beedrillite
    de: Bibornit
    es: Beedrillita
    ko: 독침붕나이트
    zh_simp: 大针蜂进化石
    zh_trad: 大針蜂進化石
  descriptions:
    jp_kana: "スピアーに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    jp_kanji: "スピアーに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Beedrill hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Dardargnan, elle lui permet\nde méga-évoluer durant un combat."
    it: "Una delle misteriose Megapietre. Data a Beedrill,\ngli permette di megaevolversi durante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Bibor getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Beedrill en combate."
    ko: "독침붕에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "大针蜂携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "大針蜂攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
beldum_claw:
  names:
    jp_kana: ダンバルのツメ
    jp_kanji: ダンバルのツメ
    en: Beldum Claw
    fr: Griffe de Terhal
    it: Artiglio di Beldum
    de: Tanhel-Kralle
    es: Garra de Beldum
    ko: 메탕의발톱
    zh_simp: 铁哑铃的爪子
    zh_trad: 鐵啞鈴的爪子
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
bellsprout_candy:
  names:
    jp_kana: マダツボミのアメ
    jp_kanji: マダツボミのアメ
    en: Bellsprout Candy
    fr: Bonbon Chétiflor
    it: Caramella Bellsprout
    de: Knofensa-Bonbon
    es: Caramelo Bellsprout
    ko: 모다피의사탕
    zh_simp: 喇叭芽的糖果
    zh_trad: 喇叭芽的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
bellsprout_vine:
  names:
    jp_kana: マダツボミのツル
    jp_kanji: マダツボミのツル
    en: Bellsprout Vine
    fr: Liane de Chétiflor
    it: Viticcio di Bellsprout
    de: Knofensa-Ranke
    es: Liana de Bellsprout
    ko: 모다피의덩굴
    zh_simp: 喇叭芽的藤蔓
    zh_trad: 喇叭芽的藤蔓
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
belue_berry:
  names:
    jp_kana: ベリブのみ
    jp_kanji: ベリブのみ
    en: Belue Berry
    fr: Baie Myrte
    it: Baccartillo
    de: Myrtilbeere
    es: Baya Andano
    ko: 루베열매
    zh_simp: 靛莓果
    zh_trad: 靛莓果
  descriptions:
    jp_kana: "うつくしさに　磨きを　かけるための\nポロックを　作るとき　使われる。\nほかの地方では　めずらしい　きのみ。"
    jp_kanji: "うつくしさに　磨きを　かけるための\nポロックを　作るとき　使われる。\nほかの地方では　めずらしい　きのみ。"
    en: "Used to make Pokéblocks that will enhance Beauty.\nThis Berry is rare in other regions."
    fr: "Une Baie très rare en dehors de cette région,\nutilisée pour préparer des Pokéblocs permettant\nd’augmenter la Beauté d’un Pokémon."
    it: "Bacca difficile da trovare in altre regioni usata per creare\nPokémelle che aumentano la Bellezza del Pokémon."
    de: "Eine Beerensorte, die als Zutat für Pokériegel\nverwendet wird, welche die Schönheit erhöhen.\nIn anderen Regionen ist sie eher selten zu finden."
    es: "Se utiliza en la producción de Pokécubos que potencian\nla belleza. Es una baya muy rara en otras regiones."
    ko: "아름다움을 연마하기 위한\n포켓몬스넥을 만들 때 사용된다.\n다른 지방에서는 희귀한 나무열매."
    zh_simp: "用于制作宝可方块，\n制作出来的宝可方块可用来打磨美丽。\n在其他地区很少见的树果。"
    zh_trad: "製作用於增進美麗的\n寶可方塊時使用。\n在其他地區很少見的樹果。"
bergmite_ice:
  names:
    jp_kana: カチコールのこおり
    jp_kanji: カチコールのこおり
    en: Bergmite Ice
    fr: Glace de Grelaçon
    it: Ghiaccio di Bergmite
    de: Arktip-Eis
    es: Hielo de Bergmite
    ko: 꽁어름의얼음
    zh_simp: 冰宝的冰
    zh_trad: 冰寶的冰
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
berry_juice:
  names:
    jp_kana: きのみジュース
    jp_kanji: きのみジュース
    en: Berry Juice
    fr: Jus de Baie
    it: Succo di bacca
    de: Beerensaft
    es: Zumo de Baya
    ko: 나무열매쥬스
    zh_simp: 树果汁
    zh_trad: 樹果汁
  descriptions:
    jp_kana: "きのみ　１００％の　ジュース。\nポケモン　１匹の　ＨＰを\n２０だけ　回復する。"
    jp_kanji: "きのみ　１００％の　ジュース。\nポケモン　１匹の　ＨＰを\n２０だけ　回復する。"
    en: "A 100 percent pure juice made from Berries. It can be\nused to restore 20 HP to a Pokémon."
    fr: "Une boisson 100 % pur Jus de Baie.\nRestaure 20 PV d’un Pokémon."
    it: "Bevanda di puro succo di bacche. Restituisce 20 PS\na un Pokémon."
    de: "Hundertprozentiger Fruchtsaft, aus Beeren gekeltert.\nFüllt die KP eines Pokémon um 20 Punkte auf."
    es: "Zumo de bayas 100 % natural que restaura 20 PS de un\nPokémon."
    ko: "나무열매 100% 주스.\n포켓몬 1마리의 HP를\n20만큼 회복한다."
    zh_simp: "１００％树果果汁。\n能让１只宝可梦\n回复２０ＨＰ。"
    zh_trad: "１００％樹果果汁。\n能讓１隻寶可夢\n回復２０ＨＰ。"
berry_pots:
  names:
    jp_kana: きのみプランター
    jp_kanji: きのみプランター
    en: Berry Pots
    fr: Plante-Baies
    it: Piantabacche
    de: Pflanzset
    es: Plantabayas
    ko: 나무열매플랜터
    zh_simp: 树果种植盆
    zh_trad: 樹果種植盆
  descriptions:
    jp_kana: "いつでも　手軽に　きのみを\n育てられる　携帯式の\n栽培容器。"
    jp_kanji: "いつでも　手軽に　きのみを\n育てられる　携帯式の\n栽培容器。"
    en: "Portable containers that allow you to easily cultivate\nBerries anywhere and anytime."
    fr: "Un accessoire portatif qui permet de cultiver des Baies\nen tout lieu et à tout moment."
    it: "Accessorio tascabile che permette di coltivare\nbacche in qualunque luogo e momento."
    de: "Ein tragbares Utensil, das die Aufzucht von Pflanzen\naus Beeren ermöglicht, wo immer du auch gerade bist."
    es: "Dispositivo portátil de cultivo que permite plantar bayas\nen cualquier momento de forma sencilla."
    ko: "항상 손쉽게 나무열매를\n키울 수 있는 휴대형\n재배 용기."
    zh_simp: "可以随时轻松培育树果的\n便携式栽培容器。"
    zh_trad: "可以隨時輕鬆培育樹果的\n可攜式栽培容器。"
berry_sweet:
  names:
    jp_kana: ベリーアメざいく
    jp_kanji: ベリーアメざいく
    en: Berry Sweet
    fr: Baie en Sucre
    it: Bonbonbosco
    de: Zucker-Beere
    es: Confite Fruto
    ko: 베리사탕공예
    zh_simp: 野莓糖饰
    zh_trad: 野莓糖飾
  descriptions:
    jp_kana: "ベリーの形をした　アメ細工。\nマホミルに　持たせてあげると\nくるくる　回って　喜ぶ。"
    jp_kanji: "ベリーの形をした　アメ細工。\nマホミルに　持たせてあげると\nくるくる　回って　喜ぶ。"
    en: "A berry-shaped sweet. When a Milcery holds this,\nit spins around happily."
    fr: "Un bonbon en forme de Baie.\nQuand on le donne à un Crèmy, il se réjouit en tournant\nsur lui-même."
    it: "Bonbon a forma di frutto di bosco. Se dato a Milcery,\nil Pokémon farà le piroette per la felicità."
    de: "Zuckerwerk in Form einer Beere. Gibt man es Hokumil\nzum Tragen, dreht es sich vor Freude im Kreis."
    es: "Figura de caramelo con forma de baya. Al dárselo a\nMilcery, se pone a girar rebosante de alegría."
    ko: "베리 모양의 사탕공예.\n마빌크에게 지니게 하면\n빙빙 돌며 기뻐한다."
    zh_simp: "浆果形状的工艺糖果。\n让小仙奶携带的话，\n会高兴地转圈圈。"
    zh_trad: "莓果形狀的工藝糖果。\n讓小仙奶攜帶的話，\n牠會高興得轉圈圈。"
big_bamboo_shoot:
  names:
    jp_kana: おおきなタケノコ
    jp_kanji: おおきなタケノコ
    en: Big Bamboo Shoot
    fr: Gros Bambou
    it: Grande bambù
    de: Riesenbambusspross
    es: Bambú Grande
    ko: 큰죽순
    zh_simp: 大竹笋
    zh_trad: 大竹筍
  descriptions:
    jp_kana: "おおきな　めずらしいタケノコ。\n一部のグルメの　あいだでは\nとても人気が　高い。"
    jp_kanji: "おおきな　めずらしいタケノコ。\n一部のグルメの　あいだでは\nとても人気が　高い。"
    en: "A large and rare bamboo shoot. It’s extremely popular\nwith a certain class of gourmands."
    fr: "Une grosse pousse de bambou assez rare.\nElle est très populaire auprès de certains gourmets."
    it: "Germoglio di bambù grande e raro. È discretamente\napprezzato da alcuni gourmet."
    de: "Ein großer und recht seltener Bambusspross, der sich bei\neinigen Feinschmeckern sehr großer Beliebtheit erfreut."
    es: "Un gran brote de bambú que es poco común y muy\npopular entre determinados grupos de gourmets."
    ko: "크고 진귀한 죽순.\n일부 미식가 사이에서는\n매우 인기가 높다."
    zh_simp: "大大的珍贵竹笋。\n在部分美食家中\n拥有非常高人气。"
    zh_trad: "既碩大又罕見的竹筍。\n在一些饕客之間相當受歡迎。"
big_malasada:
  names:
    jp_kana: おおきいマラサダ
    jp_kanji: おおきいマラサダ
    en: Big Malasada
    fr: Malasada Maxi
    it: Malasada maxi
    de: Maxi-Malasada
    es: Malasada Maxi
    ko: 큰 말라사다
    zh_simp: 大马拉萨达
    zh_trad: 大馬拉薩達
  descriptions:
    jp_kana: "アローラ名物の　あげパン。\nポケモン　１匹の　状態異常を\nすべて　回復する。"
    jp_kanji: "アローラ名物の　あげパン。\nポケモン　１匹の　状態異常を\nすべて　回復する。"
    en: "The Alola region’s famous fried confection. It can be\nused to cure any status condition a Pokémon may have."
    fr: "Une spécialité d’Alola.\nSoigne toutes les altérations de statut d’un Pokémon."
    it: "Frittella tipica di Alola. Cura tutti i problemi di stato\ndi un Pokémon."
    de: "Dieses Gebäck ist eine Spezialität aus Alola.\nEs behebt alle Statusprobleme eines Pokémon."
    es: "Fritura típica de Alola que cura todos los problemas de\nestado de un Pokémon."
    ko: "알로라의 명물인 튀긴 빵.\n포켓몬 1마리의\n상태 이상을 모두 회복한다."
    zh_simp: "阿罗拉特产的油炸面包。\n能治愈１只宝可梦的\n所有异常状态。"
    zh_trad: "阿羅拉特產的油炸麵包。\n能治癒１隻寶可夢的\n所有異常狀態。"
big_mushroom:
  names:
    jp_kana: おおきなキノコ
    jp_kanji: おおきなキノコ
    en: Big Mushroom
    fr: Gros Champi
    it: Grande fungo
    de: Riesenpilz
    es: Seta Grande
    ko: 큰버섯
    zh_simp: 大蘑菇
    zh_trad: 大蘑菇
  descriptions:
    jp_kana: "おおきな　めずらしいキノコ。\n一部のマニアの　あいだでは\nとても人気が　高い。"
    jp_kanji: "おおきな　めずらしいキノコ。\n一部のマニアの　あいだでは\nとても人気が　高い。"
    en: "A large and rare mushroom. It’s extremely popular with\na certain class of collectors."
    fr: "Un grand champignon assez rare.\nIl est très populaire auprès de certains gourmets."
    it: "Fungo grande e raro. È molto apprezzato da alcuni\nintenditori."
    de: "Ein großer und recht seltener Pilz, der sich bei einigen\nSammlern sehr großer Beliebtheit erfreut."
    es: "Una gran seta que es poco común y muy popular entre\ndeterminados grupos de gourmets."
    ko: "크고 진귀한 버섯.\n일부 마니아 사이에서는\n매우 인기가 높다."
    zh_simp: "珍稀的大蘑菇。\n在一些爱好者中\n有着非常高的人气。"
    zh_trad: "稀奇的大蘑菇。\n在部分愛好者中\n非常受歡迎。"
big_nugget:
  names:
    jp_kana: でかいきんのたま
    jp_kanji: でかいきんのたま
    en: Big Nugget
    fr: Maxi Pépite
    it: Granpepita
    de: Riesennugget
    es: Maxipepita
    ko: 큰금구슬
    zh_simp: 巨大金珠
    zh_trad: 巨大金珠
  descriptions:
    jp_kana: "キラキラと　金色に　光る\n純金製の　おおきな玉。\nショップで　高く　売れる。"
    jp_kanji: "キラキラと　金色に　光る\n純金製の　おおきな玉。\nショップで　高く　売れる。"
    en: "A big nugget of pure gold that gives off a lustrous\ngleam. It can be sold at a high price to shops."
    fr: "Une grosse pépite d’or pur qui brille d’un éclat\nmagnifique. Peut être vendue à bon prix en magasin."
    it: "Grossa pepita d’oro puro dal luccichio sfavillante.\nSi può vendere a un prezzo alto nei negozi."
    de: "Ein großes Nugget aus purem Gold, das einen\nschimmernden Glanz besitzt. Kann für viel Geld\nverkauft werden."
    es: "Pepita grande de oro puro que desprende un brillo\nespectacular. Puede venderse a buen precio en las\ntiendas."
    ko: "금색으로 반짝반짝 빛나는\n순금으로 만들어진 큰 구슬.\n상점에서 비싸게 팔린다."
    zh_simp: "以纯金制成，\n闪着金光的大珠子。\n可以在商店高价出售。"
    zh_trad: "閃著金光的\n純金製大珠子。\n可以在商店高價出售。"
big_pearl:
  names:
    jp_kana: おおきなしんじゅ
    jp_kanji: おおきなしんじゅ
    en: Big Pearl
    fr: Grande Perle
    it: Grande perla
    de: Riesenperle
    es: Perla Grande
    ko: 큰진주
    zh_simp: 大珍珠
    zh_trad: 大珍珠
  descriptions:
    jp_kana: "きれいな銀色に　光る\nかなり大粒の　真珠。\nショップで　高く　売れる。"
    jp_kanji: "きれいな銀色に　光る\nかなり大粒の　真珠。\nショップで　高く　売れる。"
    en: "A rather large pearl that has a nice silvery sheen to it.\nIt can be sold at a high price to shops."
    fr: "Une grosse perle qui brille d’une jolie couleur argent.\nPeut être vendue à bon prix en magasin."
    it: "Perla piuttosto grande dai graziosi riflessi argentei.\nSi può vendere a un prezzo alto nei negozi."
    de: "Eine relativ große Perle, die in schönem Silber funkelt.\nKann für viel Geld verkauft werden."
    es: "Brillante perla plateada de gran tamaño que puede\nvenderse a buen precio en las tiendas."
    ko: "예쁜 은색으로 빛나는\n상당히 큰 낱알의 진주.\n상점에서 비싸게 팔린다."
    zh_simp: "散发着美丽银辉\n且相当大颗的珍珠。\n可以在商店高价出售。"
    zh_trad: "散發著美麗銀輝的\n頗大顆的珍珠。\n可以在商店高價出售。"
big_root:
  names:
    jp_kana: おおきなねっこ
    jp_kanji: おおきなねっこ
    en: Big Root
    fr: Grosse Racine
    it: Granradice
    de: Großwurzel
    es: Raíz Grande
    ko: 큰뿌리
    zh_simp: 大根茎
    zh_trad: 大根莖
  descriptions:
    jp_kana: "持たせると　ＨＰを　吸いとる　技で\nいつもより多く　自分の　ＨＰを\n回復できる。"
    jp_kanji: "持たせると　ＨＰを　吸いとる　技で\nいつもより多く　自分の　ＨＰを\n回復できる。"
    en: "An item to be held by a Pokémon. This root boosts the\namount of HP the holder restores to itself when it uses\nHP-stealing moves."
    fr: "Objet à tenir. Permet au porteur de récupérer davantage\nde PV quand il utilise des capacités qui absorbent les PV."
    it: "Strumento da dare a un Pokémon. Potenzia le mosse\nruba-PS facendo recuperare un maggior numero di PS."
    de: "Ein Item zum Tragen. Verstärkt den Effekt von\nKP-stehlenden Attacken."
    es: "El Pokémon que la lleva recupera más PS al usar\nmovimientos que drenan energía."
    ko: "지니게 하면 HP 흡수 기술을 썼을 때\n여느 때보다 많은 HP를\n자신이 회복할 수 있다."
    zh_simp: "携带后，吸取ＨＰ的招式\n可以比平时更多地回复自己的ＨＰ。"
    zh_trad: "攜帶後，吸取ＨＰ的招式\n可以比平時回復更多\n自己的ＨＰ。"
bike:
  names:
    jp_kana: じてんしゃ
    jp_kanji: じてんしゃ
    en: Bike
    fr: Bicyclette
    it: Bicicletta
    de: Fahrrad
    es: Bici
    ko: 자전거
    zh_simp: 自行车
    zh_trad: 自行車
  descriptions:
    jp_kana: "ランニングシューズ　よりも\n速く　走ることが　できる\n折りたたみ式の　じてんしゃ。"
    jp_kanji: "ランニングシューズ　よりも\n速く　走ることが　できる\n折りたたみ式の　じてんしゃ。"
    en: "A folding bike that enables a rider to get around\nmuch faster than with Running Shoes."
    fr: "Une Bicyclette pliable permettant de se déplacer\nbien plus rapidement qu’en marchant."
    it: "Bici pieghevole che permette di spostarsi più\nvelocemente che con le Scarpe da Corsa."
    de: Ein Klapprad, mit dem man schneller ist als zu Fuß.
    es: "Bicicleta plegable con la que se va más rápido que\ncorriendo."
    ko: "러닝슈즈보다도\n빨리 달릴 수 있는\n접이식 자전거다."
    zh_simp: "能比跑步鞋跑得还快的\n折叠式自行车。"
    zh_trad: "能跑得比跑步鞋還快的\n折疊式自行車。"
bike:yellow:
  names:
    jp_kana: じてんしゃ
    jp_kanji: じてんしゃ
    en: Bike
    fr: Bicyclette
    it: Bicicletta
    de: Fahrrad
    es: Bici
    ko: 자전거
    zh_simp: 自行车
    zh_trad: 自行車
  descriptions:
    jp_kana: "ランニングシューズ　よりも\n速く　走ることが　できる\n折りたたみ式の　じてんしゃ。"
    jp_kanji: "ランニングシューズ　よりも\n速く　走ることが　できる\n折りたたみ式の　じてんしゃ。"
    en: "A folding bike that enables a rider to get around\nmuch faster than with Running Shoes."
    fr: "Une Bicyclette pliable permettant de se déplacer\nbien plus rapidement qu’en marchant."
    it: "Bici pieghevole che permette di spostarsi più\nvelocemente che con le Scarpe da Corsa."
    de: Ein Klapprad, mit dem man schneller ist als zu Fuß.
    es: "Bicicleta plegable con la que se va más rápido que\ncorriendo."
    ko: "러닝슈즈보다도\n빨리 달릴 수 있는\n접이식 자전거다."
    zh_simp: "能比跑步鞋跑得还快的\n折叠式自行车。"
    zh_trad: "能跑得比跑步鞋還快的\n折疊式自行車。"
binding_band:
  names:
    jp_kana: しめつけバンド
    jp_kanji: しめつけバンド
    en: Binding Band
    fr: Bande Étreinte
    it: Legafascia
    de: Klammerband
    es: Banda Atadura
    ko: 조임밴드
    zh_simp: 紧绑束带
    zh_trad: 緊綁束帶
  descriptions:
    jp_kana: "締めつける技を　補助する　バンド。\n持たせると　締めつける技の\n威力が　強くなる。"
    jp_kanji: "締めつける技を　補助する　バンド。\n持たせると　締めつける技の\n威力が　強くなる。"
    en: "An item to be held by a Pokémon. This band boosts\nthe power of binding moves used by the holder."
    fr: "Objet à tenir. Il augmente la puissance des capacités\nimmobilisantes telles que Ligotage ou Étreinte."
    it: "Strumento da dare a un Pokémon che aumenta\nla potenza di mosse come Avvolgibotta e Legatutto."
    de: "Ein Band, das die Stärke aller Klammerattacken des\nTrägers erhöht."
    es: "Banda que potencia los movimientos que estrujan al\nrival. Debe llevarla un Pokémon."
    ko: "조이기 기술을 보조하는 밴드.\n지니게 하면 조이기 기술의\n위력이 강해진다."
    zh_simp: "能增强绑紧招式的束带。\n携带后，绑紧招式的威力会变强。"
    zh_trad: "輔助綁緊類招式的束帶。\n攜帶後，綁緊類招式的\n威力會變強。"
bitter_herba_mystica:
  names:
    jp_kana: ひでん：にがスパイス
    jp_kanji: ひでん：にがスパイス
    en: Bitter Herba Mystica
    fr: Épice Secrète Amère
    it: Spezia nascosta amara
    de: Bitteres Geheimgewürz
    es: Especia Oculta Amarga
    ko: 비전 쌉쌀스파이스
    zh_simp: 秘传：苦味料
    zh_trad: 秘傳：苦味料
  descriptions:
    jp_kana: "深い苦味を　持つ　幻の調味料。\n体の免疫を　劇的に　高めると\n伝えられているが　真偽は　不明。"
    jp_kanji: "深い苦味を　持つ　幻の調味料。\n体の免疫を　劇的に　高めると\n伝えられているが　真偽は　不明。"
    en: "A legendary condiment with a deeply bitter taste. It’s\nsaid to dramatically bolster a body’s immune defenses,\nthough that hasn’t been proven."
    fr: "Un condiment fabuleux d’une amertume profonde.\nLes grimoires disent qu’une pincée suffit à décupler\nles défenses immunitaires, mais cela n’a pas été prouvé."
    it: "Un condimento leggendario dall’intenso gusto amaro.\nSi dice che causi un significativo incremento delle difese\nimmunitarie, ma la veridicità di ciò non è confermata."
    de: "Ein sehr bitter schmeckendes, mystisches Würzmittel.\nGerüchten zufolge soll es das Immunsystem des Körpers\ndrastisch stärken. Beweise dafür fehlen jedoch."
    es: "Un condimento legendario con un fuerte sabor amargo.\nSe dice que refuerza el sistema inmunitario, mas este\ndato no se ha comprobado a ciencia cierta."
    ko: "깊은 쓴맛을 가진 환상의 조미료.\n몸의 면역을 극적으로 강화한다고\n전해지고 있으나, 진위는 불명이다."
    zh_simp: "拥有浓厚苦味的奇幻调味料。\n相传能大幅提高身体的免疫力，\n但事实真实性不明。"
    zh_trad: "帶有深沉苦味的幻之調味料。\n相傳它會顯著地增強身體免疫力，\n但其真實性無從得知。"
black_apricorn:
  names:
    jp_kana: くろぼんぐり
    jp_kanji: くろぼんぐり
    en: Black Apricorn
    fr: Noigrume Noir
    it: Ghicocca nera
    de: Aprikoko Schwarz
    es: Bonguri Negro
    ko: 검은규토리
    zh_simp: 黑球果
    zh_trad: 黑球果
  descriptions:
    jp_kana: "くろい　ぼんぐり。\nなんともいえない　においがする。"
    jp_kanji: "くろい　ぼんぐり。\nなんともいえない　においがする。"
    en: "A black Apricorn. It has a smell that cannot be captured\nin words."
    fr: "Un Noigrume de couleur noire.\nIl dégage un arôme indéfinissable."
    it: "Una ghicocca di colore nero. Emana un odore\nindefinibile."
    de: "Eine schwarze Aprikoko. Sie verströmt einen\nunbeschreiblichen Geruch."
    es: Bonguri de color negro y aroma indescriptible.
    ko: "검은색의 규토리.\n말로는 표현할 수 없는 향기가 난다."
    zh_simp: "黑色的球果。\n有种无法形容的气味。"
    zh_trad: "黑色的球果。\n有種無法形容的氣味。"
black_augurite:
  names:
    jp_kana: くろのきせき
    jp_kanji: くろのきせき
    en: Black Augurite
    fr: Obsidienne
    it: Augite nera
    de: Schwarzaugit
    es: Mineral Negro
    ko: 검은휘석
    zh_simp: 黑奇石
    zh_trad: 黑奇石
  descriptions:
    jp_kana: "割るとするどい切れ味を持つ\nガラスに似た性質の黒い石。\nあるポケモンが好んでいる。"
    jp_kanji: "割るとするどい切れ味を持つ\nガラスに似た性質の黒い石。\nあるポケモンが好んでいる。"
    en: "A glassy black stone that produces a sharp cutting\nedge when split. It’s loved by a certain Pokémon."
    fr: "Lorsqu’on brise cette pierre noire semblable à du verre,\non obtient des éclats très coupants. Elle est appréciée\nd’un certain Pokémon."
    it: "Pietra nera dalle caratteristiche simili al vetro che\npuò essere molto tagliente se frantumata.\nPiace a un Pokémon in particolare."
    de: "Ein glasähnlicher schwarzer Stein, der scharfe Kanten\naufweist, wenn er zerbricht. Das Lieblingsstück eines\nbestimmten Pokémon."
    es: "Piedra negra que posee cualidades similares a las del\ncristal y cuyos bordes son muy afilados al partirse.\nLe encanta a cierto Pokémon."
    ko: "조각내면 예리하게 날이 서는\n유리 같은 성질을 띠는 검은 돌.\n어떤 포켓몬이 좋아하는 물건이다."
    zh_simp: "破碎后会变得十分锋利，\n性质类似玻璃的黑石。\n某种宝可梦很喜欢它。"
    zh_trad: "破碎後會變得十分鋒利，\n性質類似玻璃的黑石。\n某種寶可夢很喜歡它。"
black_belt:
  names:
    jp_kana: くろおび
    jp_kanji: くろおび
    en: Black Belt
    fr: Ceinture Noire
    it: Cintura nera
    de: Schwarzgurt
    es: Cinturón Negro
    ko: 검은띠
    zh_simp: 黑带
    zh_trad: 黑帶
  descriptions:
    jp_kana: "気が　ひきしまる　帯。\n持たせると　かくとうタイプの\n技の威力が　あがる。"
    jp_kanji: "気が　ひきしまる　帯。\n持たせると　かくとうタイプの\n技の威力が　あがる。"
    en: "An item to be held by a Pokémon. This belt helps with\nfocus and boosts the power of the holder’s Fighting-type\nmoves."
    fr: "Objet à tenir. Une ceinture d’art martial qui augmente\nla puissance des capacités de type Combat."
    it: "Strumento da dare a un Pokémon. Cintura che potenzia\nla determinazione e le mosse di tipo Lotta."
    de: "Ein Item zum Tragen. Ein Gürtel, der die Entschlossenheit\ndes Trägers sowie Attacken vom Typ Kampf verstärkt."
    es: "Aumenta la concentración y potencia los movimientos\nde tipo Lucha. Debe llevarlo un Pokémon."
    ko: "마음을 긴장시키는 띠.\n지니게 하면 격투타입\n기술의 위력이 올라간다."
    zh_simp: "能振作精神的带子。\n携带后，格斗属性的\n招式威力就会提高。"
    zh_trad: "能振作精神的帶子。\n攜帶後，格鬥屬性的\n招式威力就會提高。"
black_flute:
  names:
    jp_kana: くろいビードロ
    jp_kanji: くろいビードロ
    en: Black Flute
    fr: Flûte Noire
    it: Flauto nero
    de: Schwarze Flöte
    es: Flauta Negra
    ko: 검정비드로
    zh_simp: 黑色玻璃哨
    zh_trad: 黑色玻璃哨
  descriptions:
    jp_kana: "黒いガラスで　できた　笛。\n使った　場所で　強いポケモンと\n遭遇　しやすくなる。"
    jp_kanji: "黒いガラスで　できた　笛。\n使った　場所で　強いポケモンと\n遭遇　しやすくなる。"
    en: "A flute made from black glass. It makes it easier to\nencounter high-level Pokémon in the place you use it."
    fr: "Un jouet en forme de flûte en verre noir.\nAugmente les chances de rencontrer des Pokémon\nsauvages de niveau élevé là où l’on en joue."
    it: "Flauto fatto di vetro nero. Aumenta le probabilità di\nincontrare Pokémon forti nell’area in cui viene usato."
    de: "Eine Spielzeugflöte aus schwarzem Glas. Erhöht am\nEinsatzort die Wahrscheinlichkeit, starken wilden\nPokémon zu begegnen."
    es: "Una flauta de cristal negro cuyas notas atraen a\nPokémon salvajes de nivel más alto al lugar en el que\nse usa."
    ko: "검은 유리로 만들어진 피리.\n사용한 장소에서 강한 포켓몬과\n만나기 쉬워진다."
    zh_simp: "以黑色玻璃制成的哨子。\n在使用的地方更容易\n遇到强大的宝可梦。"
    zh_trad: "以黑色玻璃製成的笛子。\n在使用的地方更容易\n遇到強大的寶可夢。"
black_glasses:
  names:
    jp_kana: くろいメガネ
    jp_kanji: くろいメガネ
    en: Black Glasses
    fr: Lunettes Noires
    it: Occhialineri
    de: Schattenbrille
    es: Gafas de Sol
    ko: 검은안경
    zh_simp: 黑色眼镜
    zh_trad: 黑色眼鏡
  descriptions:
    jp_kana: "怪しく見える　メガネ。\n持たせると　あくタイプの\n技の威力が　あがる。"
    jp_kanji: "怪しく見える　メガネ。\n持たせると　あくタイプの\n技の威力が　あがる。"
    en: "An item to be held by a Pokémon. It’s a pair of shady-\nlooking glasses that boost the power of the holder’s\nDark-type moves."
    fr: "Objet à tenir. Une paire de lunettes à l’aspect\nlouche qui augmente la puissance des capacités\nde type Ténèbres."
    it: "Strumento da dare a un Pokémon. Inquietante paio\ndi occhiali che potenzia le mosse di tipo Buio."
    de: "Ein Item zum Tragen. Eine dunkle Brille, die Attacken\nvom Typ Unlicht verstärkt."
    es: "Potencian los movimientos de tipo Siniestro. Debe\nllevarlas un Pokémon."
    ko: "괴상하게 보이는 안경.\n지니게 하면 악타입\n기술의 위력이 올라간다."
    zh_simp: "看上去很奇怪的眼镜。\n携带后，恶属性的\n招式威力就会提高。"
    zh_trad: "看起來很奇怪的眼鏡。\n攜帶後，惡屬性的\n招式威力就會提高。"
black_mane_hair:
  names:
    jp_kana: くろいたてがみ
    jp_kanji: くろいたてがみ
    en: Black Mane Hair
    fr: Crins Sombres
    it: Crini neri
    de: Dunkles Rosshaar
    es: Crin Negra
    ko: 검은갈기
    zh_simp: 黑色鬃毛
    zh_trad: 黑色鬃毛
  descriptions:
    jp_kana: "豊穣の王の　愛馬\nレイスポスの　たてがみ。\nなめらかな　肌ざわりだ。"
    jp_kanji: "豊穣の王の　愛馬\nレイスポスの　たてがみ。\nなめらかな　肌ざわりだ。"
    en: "Mane hair that belonged to the King of Bountiful\nHarvests’ beloved steed, Spectrier. The hair is very\nsmooth to the touch."
    fr: "Des crins de Spectreval, le fidèle destrier du Seigneur\ndes récoltes. Ils sont soyeux au toucher."
    it: "Un ciuffo di crini di Spectrier, il fedele destriero\ndel Re dell’abbondanza. Sono morbidi al tatto."
    de: "Eine Haarsträhne von Phantoross, dem treuen Ross des\nKönigs der reichen Ernte. Sie fühlt sich weich und\ngeschmeidig an."
    es: "Parte de la crin de Spectrier, el amado corcel del Rey de\nlas Cosechas. Es suave al tacto."
    ko: "풍요의 왕의 애마\n레이스포스의 갈기.\n촉감이 매우 부드럽다."
    zh_simp: "丰饶之王的爱马\n灵幽马的鬃毛。\n摸起来非常柔顺。"
    zh_trad: "豐饒之王的愛馬\n「靈幽馬」的鬃毛。\n觸感柔滑。"
black_sludge:
  names:
    jp_kana: くろいヘドロ
    jp_kanji: くろいヘドロ
    en: Black Sludge
    fr: Boue Noire
    it: Fangopece
    de: Giftschleim
    es: Lodo Negro
    ko: 검은오물
    zh_simp: 黑色污泥
    zh_trad: 黑色污泥
  descriptions:
    jp_kana: "持たせると　どくタイプの　ポケモンは\n少しずつ　ＨＰを　回復する。\nそれ以外は　ＨＰが　減ってしまう。"
    jp_kanji: "持たせると　どくタイプの　ポケモンは\n少しずつ　ＨＰを　回復する。\nそれ以外は　ＨＰが　減ってしまう。"
    en: "An item to be held by a Pokémon. If the holder is a\nPoison type, this sludge will gradually restore its HP.\nIt damages any other type."
    fr: "Objet à tenir. Restaure peu à peu les PV des Pokémon\nde type Poison. Inflige des dégâts à tous les autres types."
    it: "Strumento da dare a un Pokémon. Restituisce\ngradualmente PS ai Pokémon di tipo Veleno,\nma fa perdere PS a tutti gli altri."
    de: "Ein Item zum Tragen. Es füllt die KP von Gift-Pokémon\nstetig auf. Anderen Pokémon fügt es Schaden zu."
    es: "Si lo lleva un Pokémon de tipo Veneno, restaura\ngradualmente sus PS. Si es de otro tipo, sus PS\nse reducirán."
    ko: "지니게 하면 독타입의 포켓몬은\n조금씩 HP를 회복한다.\n그 이외의 타입은 HP가 줄어 버린다."
    zh_simp: "携带后，毒属性的宝可梦\n会缓缓回复ＨＰ。\n其他属性的话，ＨＰ则会减少。"
    zh_trad: "攜帶後，毒屬性的寶可夢\n會緩緩回復ＨＰ。\n其他屬性的話，ＨＰ則會減少。"
black_tumblestone:
  names:
    jp_kana: くろいろたまいし
    jp_kanji: くろいろたまいし
    en: Black Tumblestone
    fr: Galet Noir
    it: Ciottolo nero
    de: Schwarzglanzstein
    es: Guijarro Negro
    ko: 검은옥돌
    zh_simp: 黑玉石
    zh_trad: 黑玉石
  descriptions:
    jp_kana: "ぼんぐりと組み合わせることで\nヘビーボールの性能をひきだす\n不思議な黒い石。"
    jp_kanji: "ぼんぐりと組み合わせることで\nヘビーボールの性能をひきだす\n不思議な黒い石。"
    en: "When combined with an Apricorn, this mysterious\nblack stone can draw out the properties required\nto forge a Heavy Ball."
    fr: "Lorsqu’on combine cette étrange pierre noire\nà un Noigrume, elle présente les propriétés\nnécessaires à la confection d’une Masse Ball."
    it: "Strana pietra nera che, se combinata con una Bacca\nghicocca, innesca le proprietà necessarie alla creazione\ndi una Peso Ball."
    de: "Kombiniert man diesen mysteriösen schwarzen Stein\nmit einer Aprikoko, kann ein Schwerball daraus gefertigt\nwerden."
    es: "Misteriosa piedra de color negro que, al combinarse con\nun Bonguri, presenta las cualidades necesarias para\nfabricar una Peso Ball."
    ko: "규토리와 조합하면\n헤비볼의 성능을 끌어낼 수 있는\n신비한 검은 돌."
    zh_simp: "不可思议的黑色石头。\n与球果组合后，能够\n激发出沉重球的性能。"
    zh_trad: "不可思議的黑色石頭。\n與球果組合後，能夠\n激發出沉重球的性能。"
blank_plate:
  names:
    jp_kana: まっさらプレート
    jp_kanji: まっさらプレート
    en: Blank Plate
    fr: Plaque Renouveau
    it: Lastraripristino
    de: Neutraltafel
    es: Tabla Neutra
    ko: 순백플레이트
    zh_simp: 净空石板
    zh_trad: 淨空石板
  descriptions:
    jp_kana: "ノーマルのタイプの石盤。\nあるポケモンに使うと\nノーマルの力を得る。"
    jp_kanji: "ノーマルのタイプの石盤。\nあるポケモンに使うと\nノーマルの力を得る。"
    en: "A stone tablet imbued with the essence of normalcy.\nWhen used on a certain Pokémon, it allows that\nPokémon to gain the power of the Normal type."
    fr: "Une tablette en pierre imprégnée de la puissance\ndu type Normal. Lorsqu’elle est utilisée sur un certain\nPokémon, celui-ci obtient les pouvoirs du type Normal."
    it: "Lastra di pietra di tipo Normale. Se usata su un Pokémon\nin particolare, gli permette di ottenere il potere\ndel tipo Normale."
    de: "Dieser Steintafel wohnt die Energie des Typs Normal\ninne. Wird sie auf ein bestimmtes Pokémon angewendet,\nerlangt es die Kraft des Typs Normal."
    es: "Tabla de piedra imbuida de la energía del tipo Normal.\nPermite a cierto Pokémon obtener el poder del tipo\nNormal."
    ko: "노말타입의 석판.\n특정 포켓몬에게 사용하면\n노말의 힘을 얻는다."
    zh_simp: "一般属性的石板。\n对某种宝可梦使用，\n可使其获得一般属性的力量。"
    zh_trad: "一般屬性的石板。\n對某種寶可夢使用，\n可使其獲得一般屬性的力量。"
blastoisinite:
  names:
    jp_kana: カメックスナイト
    jp_kanji: カメックスナイト
    en: Blastoisinite
    fr: Tortankite
    it: Blastoisite
    de: Turtoknit
    es: Blastoisita
    ko: 거북왕나이트
    zh_simp: 水箭龟进化石
    zh_trad: 水箭龜進化石
  descriptions:
    jp_kana: "カメックスに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    jp_kanji: "カメックスに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Blastoise hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Tortank, elle lui permet de\nméga-évoluer durant un combat."
    it: "Una delle misteriose Megapietre. Data a Blastoise,\ngli permette di megaevolversi durante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Turtok getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Blastoise en combate."
    ko: "거북왕에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让水箭龟携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓水箭龜攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
blazikenite:
  names:
    jp_kana: バシャーモナイト
    jp_kanji: バシャーモナイト
    en: Blazikenite
    fr: Braségalite
    it: Blazikenite
    de: Lohgocknit
    es: Blazikenita
    ko: 번치코나이트
    zh_simp: 火焰鸡进化石
    zh_trad: 火焰雞進化石
  descriptions:
    jp_kana: "バシャーモに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    jp_kanji: "バシャーモに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Blaziken hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Braségali, elle lui permet de\nméga-évoluer durant un combat."
    it: "Una delle misteriose Megapietre. Data a Blaziken,\ngli permette di megaevolversi durante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Lohgock getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Blaziken en combate."
    ko: "번치코에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让火焰鸡携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓火焰雞攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
blitzle_mane_hair:
  names:
    jp_kana: シママのたてがみ
    jp_kanji: シママのたてがみ
    en: Blitzle Mane Hair
    fr: Crinière de Zébibron
    it: Crine di Blitzle
    de: Elezeba-Mähnenhaar
    es: Mechón de Blitzle
    ko: 줄뮤마의갈기
    zh_simp: 斑斑马的鬃毛
    zh_trad: 斑斑馬的鬃毛
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
blue_apricorn:
  names:
    jp_kana: あおぼんぐり
    jp_kanji: あおぼんぐり
    en: Blue Apricorn
    fr: Noigrume Bleu
    it: Ghicocca blu
    de: Aprikoko Blau
    es: Bonguri Azul
    ko: 파란규토리
    zh_simp: 蓝球果
    zh_trad: 藍球果
  descriptions:
    jp_kana: "あおい　ぼんぐり。\n少し　あおくさい　かおりがする。"
    jp_kanji: "あおい　ぼんぐり。\n少し　あおくさい　かおりがする。"
    en: A blue Apricorn. It has a slightly grassy smell to it.
    fr: "Un Noigrume de couleur bleue.\nIl dégage un arôme un peu aigre."
    it: Una ghicocca di colore blu. Emana un odore un po’ acre.
    de: "Eine blaue Aprikoko. Sie verströmt einen unreifen\nGeruch."
    es: Bonguri de color azul y aroma tierno.
    ko: "파란색의 규토리.\n약간 풋내가 난다."
    zh_simp: "蓝色的球果。\n略有一股青草的香味。"
    zh_trad: "藍色的球果。\n略有一股青草的香味。"
blue_bottle:
  names:
    jp_kana: ブルーボトル
    jp_kanji: ブルーボトル
    en: Blue Bottle
    fr: Gourde Bleue
    it: Borraccia celeste
    de: Blaue Flasche
    es: Termo Azul
    ko: 블루 보틀
    zh_simp: 蓝色水壶
    zh_trad: 藍色水壺
  descriptions:
    jp_kana: "ピクニック用の　水筒として　定番の商品。\nシンプルなデザインで　持ち運びやすく\n男女問わず　選ぶ人が　多い。"
    jp_kanji: "ピクニック用の　水筒として　定番の商品。\nシンプルなデザインで　持ち運びやすく\n男女問わず　選ぶ人が　多い。"
    en: "A go-to bottle widely used for drinks at picnics. Its\nsimple design and portability make it popular among all\nsorts of people."
    fr: "Une gourde largement utilisée lors de pique-niques.\nSa forme simple et pratique la rend populaire auprès\nd’un large public."
    it: "Classica borraccia da picnic. Il suo design semplice e\nla sua portabilità la rendono popolare tra persone di\nogni genere."
    de: "Dieser Klassiker unter den Picknickflaschen lässt sich\nleicht transportieren und besticht durch sein schlichtes\nDesign. Deshalb ist diese Flasche allseits beliebt."
    es: "El típico termo para pícnic, con un diseño sencillo\ny práctico que agrada a todo el mundo."
    ko: "피크닉용 보틀의 정석 같은 상품.\n심플한 디자인에 휴대가 간편해서\n남녀 불문하고 고르는 사람이 많다."
    zh_simp: "是用于野餐的水壶中较为大众的商品。\n设计简约，易于携带。\n无论男女都有很多人会选择它。"
    zh_trad: "國民款的野餐用水壺。\n設計簡潔，且容易攜帶，\n因此不分男女廣受青睞。"
blue_card:
  names:
    jp_kana: ブルーカード
    jp_kanji: ブルーカード
    en: Blue Card
    fr: Carte Bleue
    it: Carta blu
    de: Blaue Karte
    es: Tarjeta Azul
    ko: 블루카드
    zh_simp: 蓝卡
    zh_trad: 藍卡
  descriptions:
    jp_kana: "「アオイのあいことば」　番組の\nポイントを　貯める　カード。"
    jp_kanji: "「アオイのあいことば」　番組の\nポイントを　貯める　カード。"
    en: A card to save points for the Buena’s Password show.
    fr: "Une carte pour accumuler les points de l’émission\n« Le Mot de Passe de Buena »."
    it: "Carta per accumulare i punti del programma\n\"Password Show\" di Buena."
    de: "Eine Karte, auf der die Punkte für „Passwort mit Buena“\nfestgehalten werden."
    es: "Tarjeta para conseguir puntos con el programa de\nradio Las contraseñas de Buena."
    ko: "“규화의 암호” 방송의\n포인트를 모으는 카드."
    zh_simp: "可以将《葵妍的密语》\n这节目的点数积攒起来的卡片。"
    zh_trad: "可以將《葵妍的密語》\n這節目的點數\n儲存起來的卡片。"
blue_chairs:
  names:
    jp_kana: ブルーチェア
    jp_kanji: ブルーチェア
    en: Blue Chairs
    fr: Sièges Bleus
    it: Sedie blu
    de: Blaue Stühle
    es: Sillas Azules
    ko: 블루 체어
    zh_simp: 蓝色椅子
    zh_trad: 藍色椅子
  descriptions:
    jp_kana: "ピクニックで　使いやすい　イス。\nブルークロスの　デザインを\nもとに　作ってもらった。"
    jp_kanji: "ピクニックで　使いやすい　イス。\nブルークロスの　デザインを\nもとに　作ってもらった。"
    en: "A set of chairs that are ideal for picnicking. Their design\nwas inspired by the Blue Tablecloth."
    fr: "Des sièges parfaits pour les pique-niques.\nLeur design est inspiré de la Nappe Bleue."
    it: "Pratiche sedie, perfette per i picnic, ispirate al design\ndella Tovaglia blu."
    de: "Diese Stühle sind gut geeignet für Picknicks.\nIhr Design basiert auf dem Blauen Tischtuch."
    es: "Unas sillas ideales para irse de pícnic. Su diseño está\nbasado en el del Mantel Azul."
    ko: "피크닉에서 사용하기 편한 의자.\n블루 테이블보의\n디자인을 토대로 만들어졌다."
    zh_simp: "在野餐时很好用的椅子。\n根据蓝色桌巾的设计制作而成。"
    zh_trad: "野餐時很好用的椅子。\n根據藍色桌巾的設計製作而成。"
blue_cup:
  names:
    jp_kana: ブルーカップ
    jp_kanji: ブルーカップ
    en: Blue Cup
    fr: Tasse Bleue
    it: Tazza celeste
    de: Blaue Tasse
    es: Taza Azul
    ko: 블루 컵
    zh_simp: 蓝色水杯
    zh_trad: 藍色水杯
  descriptions:
    jp_kana: "ブルーボトルと　セット購入される　カップ。\n重ねられないため　収納には　不向きだが\n写真映えを　気にする人に　人気が高い。"
    jp_kanji: "ブルーボトルと　セット購入される　カップ。\n重ねられないため　収納には　不向きだが\n写真映えを　気にする人に　人気が高い。"
    en: "A cup sold with the Blue Bottle. The two don’t stack, so\nthey’re tough to pack—but they look good, so they’re\npopular with those who like to post picnic photos."
    fr: "Une tasse vendue avec la Gourde Bleue. Les tasses de\nce set ne s’emboîtent pas et sont donc moins pratiques,\nmais elles rendent bien sur les photos de pique-nique."
    it: "Tazza venduta assieme alla Borraccia celeste.\nNon essendo impilabile non è comoda da riporre,\nma va a ruba tra chi vuole fare delle belle foto."
    de: "Die Tasse wird im Set mit gleichfarbiger Flasche verkauft.\nSie ist nicht stapelbar und somit recht sperrig, doch bei\nLeuten mit einem Faible für schöne Fotos sehr beliebt."
    es: "Esta taza se vende junto al Termo Azul. No es la opción\nmás cómoda, pues no se puede apilar, pero es bastante\npopular por ser muy fotogénica."
    ko: "블루 보틀과 세트로 많이 구입하는 컵.\n겹쳐서 쌓을 수 없어서 수납하기에는 불편하나,\n예쁜 사진을 찍고 싶은 사람에게 인기가 많다."
    zh_simp: "与蓝色水壶成套购买的杯子。\n因为不能叠放，所以不利于收纳，\n但很受追求拍出精美照片的人欢迎。"
    zh_trad: "和藍色水壺成套售出的水杯。\n無法堆疊，所以不容易收納，\n但注重拍出美照的人對其愛不釋手。"
blue_dish:
  names:
    jp_kana: ブループレート
    jp_kanji: ブループレート
    en: Blue Dish
    fr: Assiette Bleue
    it: Piatto celeste
    de: Blauer Teller
    es: Plato Azul
    ko: 블루 플레이트
    zh_simp: 蓝色盘子
    zh_trad: 藍色盤子
  descriptions:
    jp_kana: "ピクニック用のお皿。　料理や気分で\n使い分けられるよう　色の種類が　豊富。\nブルーは　安定して　売れている　商品。"
    jp_kanji: "ピクニック用のお皿。　料理や気分で\n使い分けられるよう　色の種類が　豊富。\nブルーは　安定して　売れている　商品。"
    en: "A dish for picnics. Comes in plenty of colors to choose\nfrom based on the food or the mood. The blue variety is\na consistent strong seller."
    fr: "Une assiette de pique-nique. Il en existe de nombreuses\ncouleurs pour les accorder à l’ambiance ou au menu.\nLa bleue se vend comme des petits pains."
    it: "Piatto da picnic. È disponibile in un ampio assortimento\ndi colori tra cui si può scegliere a seconda del cibo e\ndell’umore. Il celeste è sempre molto in voga."
    de: "Diesen Picknickteller gibt es in verschiedenen Farben,\ndamit man je nach Laune oder Speise variieren kann.\nDer blaue Teller verkauft sich durchweg solide."
    es: "Un plato de pícnic. Los distintos colores en los que viene\nofrecen posibilidades infinitas. Esta versión azul siempre\nvende bien."
    ko: "피크닉용 접시. 요리나 기분에 따라\n골라서 쓸 수 있게 색의 종류가 다양하다.\n블루 컬러는 안정적으로 팔리는 상품이다."
    zh_simp: "野餐用的盘子。为了能够配合料理\n和心情使用，其有着丰富的颜色种类。\n蓝色的是销售量稳定的商品。"
    zh_trad: "野餐用的盤子。提供豐富的顏色，\n以搭配各種不同的料理和心情。\n藍色的盤子銷路穩定。"
blue_flag_pick:
  names:
    jp_kana: あおいはたピック
    jp_kanji: あおいはたピック
    en: Blue-Flag Pick
    fr: Pique à Fanion Bleu
    it: Bandierina blu
    de: Blaufahnen-Pikser
    es: Palillo Bandera Azul
    ko: 파랑 깃발 픽
    zh_simp: 蓝旗子三明治签
    zh_trad: 藍旗子三明治籤
  descriptions:
    jp_kana: "青い旗が　冒険感を　かもしだす　ピック。\n旗の部分が　厚紙で　できているので\n風がなくても　しっかり　広がっている。"
    jp_kanji: "青い旗が　冒険感を　かもしだす　ピック。\n旗の部分が　厚紙で　できているので\n風がなくても　しっかり　広がっている。"
    en: "This pick flies a blue flag that lends an air of adventure.\nThe flag itself is made of card stock, so it’ll fly proudly\neven with no wind."
    fr: "Une pique dont le drapeau bleu appelle à l’aventure.\nLe papier du fanion est épais pour le faire tenir en l’air\nmême sans vent."
    it: "La bandierina blu di questo stecchino crea un’atmosfera\ndi avventura. Essendo di cartoncino, si staglia fiera anche\nsenza vento."
    de: "Das blaue Fähnchen am Pikser regt die Abenteuerlust an.\nEs ist aus dickem Papier gefertigt und daher stets straff\ngespannt, selbst wenn kein Wind weht."
    es: "La banderita azul de este palillo inspira emoción y\naventura. Está hecha de cartulina, por lo que se\nmantiene en posición aunque no sople viento."
    ko: "파란 깃발이 모험하는 기분을 자아내는 픽.\n깃발 부분이 두꺼운 종이로 되어 있어서\n바람이 불지 않아도 똑바로 펼쳐져 있다."
    zh_simp: "签子上带有酝酿出冒险感的蓝色旗帜。\n旗帜的部分由厚纸制成，\n因此即使没有风也能完全展开。"
    zh_trad: "小籤上的藍色旗子營造出冒險感。\n旗子是以厚紙製成，\n因此即使無風也會昂首飄揚。"
blue_flute:
  names:
    jp_kana: あおいビードロ
    jp_kanji: あおいビードロ
    en: Blue Flute
    fr: Flûte Bleue
    it: Flauto blu
    de: Blaue Flöte
    es: Flauta Azul
    ko: 파랑비드로
    zh_simp: 蓝色玻璃哨
    zh_trad: 藍色玻璃哨
  descriptions:
    jp_kana: "青いガラスで　できた　笛。\n眠り状態を　回復する。"
    jp_kanji: "青いガラスで　できた　笛。\n眠り状態を　回復する。"
    en: "A flute made from blue glass. It awakens\nsleeping Pokémon."
    fr: "Un jouet en forme de flûte en verre bleu.\nRéveille un Pokémon endormi."
    it: "Flauto fatto di vetro blu. Ha il potere di risvegliare\ni Pokémon addormentati."
    de: "Eine Spielzeugflöte aus blauem Glas. Weckt ein\nschlafendes Pokémon auf."
    es: "Una flauta de cristal azul cuyas notas despiertan a un\nPokémon del sueño."
    ko: "파란 유리로 만들어진 피리.\n잠듦 상태를\n회복한다."
    zh_simp: "以蓝色玻璃制成的哨子。\n可以治愈睡眠状态。"
    zh_trad: "以藍色玻璃製成的笛子。\n可以治癒睡眠狀態。"
blue_orb:
  names:
    jp_kana: あいいろのたま
    jp_kanji: あいいろのたま
    en: Blue Orb
    fr: Gemme Bleue
    it: Gemma blu
    de: Blauer Edelstein
    es: Prisma Azul
    ko: 쪽빛구슬
    zh_simp: 靛蓝色宝珠
    zh_trad: 靛藍色寶珠
  descriptions:
    jp_kana: "ホウエン地方の　伝説と\n深い　関わりが　あると　いわれる\nあおく　かがやく　たま。"
    jp_kanji: "ホウエン地方の　伝説と\n深い　関わりが　あると　いわれる\nあおく　かがやく　たま。"
    en: "A shiny blue orb that is said to have a deep connection\nto a legend of the Hoenn region."
    fr: "Une gemme céruléenne dont on dit qu’elle a un lien\ntrès étroit avec les légendes de Hoenn."
    it: "Gemma con riflessi blu, che pare essere strettamente\nlegata alle leggende della regione di Hoenn."
    de: "Ein blau schimmernder Stein, von dem in den Legenden\nder Hoenn-Region berichtet wird."
    es: "Piedra añil de la que se dice que guarda una estrecha\nrelación con las leyendas de Hoenn."
    ko: "호연지방의 전설과\n깊은 연관이 있다고 전해지는\n파랗게 빛나는 구슬."
    zh_simp: "散发着蓝色光辉的宝珠。\n据说和丰缘地区的传说渊源颇深。"
    zh_trad: "散發著藍色光輝的寶珠。\n據說和豐緣地區的傳說\n有著很深的淵源。"
blue_petal:
  names:
    jp_kana: あおのはなびら
    jp_kanji: あおのはなびら
    en: Blue Petal
    fr: Pétale Bleu
    it: Petalo azzurro
    de: Blaues Blatt
    es: Pétalo Azul
    ko: 파랑꽃잎
    zh_simp: 蓝色花瓣
    zh_trad: 藍色花瓣
  descriptions:
    jp_kana: "マツリカの試練で　スイレンから\nもらえる　はなびらの　押し花。\n７種類　集めるのが　目的。"
    jp_kanji: "マツリカの試練で　スイレンから\nもらえる　はなびらの　押し花。\n７種類　集めるのが　目的。"
    en: "A pressed flower petal you receive from Lana\nduring Mina’s trial. The goal is to collect seven\ndifferent kinds of petals."
    fr: "Un pétale pressé que Néphie vous a remis lors\nde l’Épreuve d’Oléa. Il y en a sept à collectionner."
    it: "Petalo di fiore pressato ottenuto da Suiren durante la\nprova di Rika. L’obiettivo è ricevere sette petali diversi."
    de: "Ein gepresstes Blütenblatt, das man im Rahmen von\nMatsurikas Prüfung von Tracy erhält. Ziel ist es,\nsieben verschiedene Blütenblätter zu sammeln."
    es: "Pétalo prensado recibido de manos de Nereida durante\nla prueba de Rika. El objetivo es reunir siete distintos."
    ko: "말리화의 시련에서 수련에게\n받을 수 있는 꽃잎의 압화.\n7종류 모으는 것이 목적."
    zh_simp: "在茉莉的考验中，\n能从水莲那里得到的干花花瓣。\n目标是集齐７种。"
    zh_trad: "在茉莉的考驗中，\n從水蓮那裡得到的壓花花瓣。\n目標是集滿７種花瓣。"
blue_poke_ball_pick:
  names:
    jp_kana: あおボールピック
    jp_kanji: あおボールピック
    en: Blue Poké Ball Pick
    fr: Pique à Ball Bleue
    it: Stecchino Ball blu
    de: Blauball-Pikser
    es: Palillo Ball Azul
    ko: 파랑 볼 픽
    zh_simp: 蓝珠珠三明治签
    zh_trad: 藍珠珠三明治籤
  descriptions:
    jp_kana: "シンプルな　青いボールの　ピック\n最初に　みずタイプの　ポケモンを\n選んだ　トレーナーが　よく使っている。"
    jp_kanji: "シンプルな　青いボールの　ピック\n最初に　みずタイプの　ポケモンを\n選んだ　トレーナーが　よく使っている。"
    en: "A sandwich pick with a simple blue Poké Ball design.\nOften used by Trainers who picked a Water-type\nPokémon for their first partner."
    fr: "Une pique ornée d’une simple Poké Ball bleue.\nElle est souvent utilisée par les Dresseurs ayant choisi un\nPokémon de type Eau comme partenaire de départ."
    it: "Stecchino a forma di semplice Poké Ball blu. Viene\nspesso usato da Allenatori che scelgono come primo\ncompagno d’avventure un Pokémon di tipo Acqua."
    de: "Ein schlichter Pikser im Design eines blauen Pokéballs.\nWird häufig von Trainern verwendet, die als erstes\nPokémon eines vom Typ Wasser wählten."
    es: "Un palillo con un sencillo diseño de una Poké Ball azul.\nEspecialmente popular entre aquellos que eligieron a un\nPokémon de tipo Agua como primer compañero."
    ko: "심플한 파란색 볼 모양 픽.\n첫 포켓몬으로 물타입을\n선택한 트레이너가 자주 사용한다."
    zh_simp: "带有简约蓝色球的签子。\n一开始选择了水属性\n宝可梦的训练家经常会使用。"
    zh_trad: "簡約的藍色珠珠小籤。\n最初選擇了水屬性寶可夢的\n訓練家經常使用。"
blue_scarf:
  names:
    jp_kana: あおいバンダナ
    jp_kanji: あおいバンダナ
    en: Blue Scarf
    fr: Foulard Bleu
    it: Fascia blu
    de: Blauer Schal
    es: Pañuelo Azul
    ko: 파랑밴드
    zh_simp: 蓝色头巾
    zh_trad: 藍色頭巾
  descriptions:
    jp_kana: "持たせて　コンテストに　参加すると\nそのポケモンは　いつもより\nうつくしく　みられる。"
    jp_kanji: "持たせて　コンテストに　参加すると\nそのポケモンは　いつもより\nうつくしく　みられる。"
    en: "When a Pokémon holds this during a contest, it looks\neven more beautiful than usual."
    fr: "Objet à tenir. Augmente la Beauté d’un Pokémon\ndans les concours."
    it: "Strumento da dare a un Pokémon.\nAumenta la Bellezza di chi l’indossa in una gara."
    de: "Ein Item zum Tragen. Trainer erhöhen damit in\nWettbewerben die Schönheit ihres Pokémon."
    es: "Aumenta la belleza en los concursos. Debe llevarlo un\nPokémon."
    ko: "지니게 하여 콘테스트에 참가하면\n그 포켓몬은 여느 때보다\n아름답게 보인다."
    zh_simp: "携带它去参加华丽大赛的\n宝可梦会比平时\n看上去更加美丽。"
    zh_trad: "攜帶它去參加華麗大賽的\n寶可夢會比平時\n看起來更加美麗。"
blue_shard:
  names:
    jp_kana: あおいかけら
    jp_kanji: あおいかけら
    en: Blue Shard
    fr: Tesson Bleu
    it: Coccio blu
    de: Indigostück
    es: Parte Azul
    ko: 파랑조각
    zh_simp: 蓝色碎片
    zh_trad: 藍色碎片
  descriptions:
    jp_kana: "青い　小さなかけら。\n昔に　作られた　なにかの\n道具の一部　らしい。"
    jp_kanji: "青い　小さなかけら。\n昔に　作られた　なにかの\n道具の一部　らしい。"
    en: "A small blue shard. It appears to be a fragment of\nsome sort of implement made long ago."
    fr: "Un petit tesson bleu.\nIl semble provenir d’un objet très ancien."
    it: "Un piccolo coccio blu che con ogni probabilità\nè un frammento di un antico strumento."
    de: "Eine blaue Scherbe eines antiken Werkzeugs, das vor\nlanger Zeit angefertigt wurde."
    es: "Un pequeño fragmento azul. Parece formar parte de\nalgún tipo de herramienta antigua."
    ko: "파란 작은 조각.\n옛날에 만들어진 어떤\n도구의 일부인 듯하다."
    zh_simp: "蓝色的小碎片。\n好像是以前制作的\n某道具的一部分。"
    zh_trad: "藍色的小碎片。\n好像是以前製作的\n某道具的一部分。"
blue_sky_flower_pick:
  names:
    jp_kana: あおぞらおはなピック
    jp_kanji: あおぞらおはなピック
    en: Blue-Sky Flower Pick
    fr: Pique Fleur d’Azur
    it: Stecchino fiore blu
    de: Mittagsblumen-Pikser
    es: Palillo Flor Azul
    ko: 푸른하늘 꽃 픽
    zh_simp: 晴空花三明治签
    zh_trad: 晴空花三明治籤
  descriptions:
    jp_kana: "青空を　イメージさせる　お花のピック。\n空花シリーズの　ピックを　何種類か　使うと\nピクニック気分が　盛り上がること　うけあい。"
    jp_kanji: "青空を　イメージさせる　お花のピック。\n空花シリーズの　ピックを　何種類か　使うと\nピクニック気分が　盛り上がること　うけあい。"
    en: "A flower pick designed to evoke a blue sky. It’s part of a\nline of “sky-flower” picks. Using a few is guaranteed to\nboost that special picnic spirit."
    fr: "Une pique ornée d’une fleur évoquant un ciel pur.\nIl en existe toute une série. Les utiliser ensemble dans\nun pique-nique permet de donner une ambiance festive."
    it: "Stecchino a forma di fiore che evoca il cielo blu.\nUsando diversi tipi di questi stecchini si può star sicuri\ndi creare una fantastica atmosfera da picnic."
    de: "Ein Blumen-Pikser, der an die Mittagssonne denken lässt,\nund zu einer Serie von Tageszeit-Piksern gehört. Nutzt\nman mehrere, ist eine tolle Picknickstimmung garantiert!"
    es: "El color de la flor recuerda al cielo azul. Los palillos con\nforma de flor resultan muy vistosos combinados entre sí\ny ayudan a crear un ambiente animado en los pícnics."
    ko: "푸른 하늘을 연상시키는 꽃 모양 픽.\n하늘꽃 시리즈 픽을 여러 종류 사용하면\n틀림없이 피크닉이 더욱더 즐거워질 것이다."
    zh_simp: "以晴空为灵感创作的花朵签子。\n只要用上几种天色花朵系列的签子，\n保证能让野餐的氛围得到升华。"
    zh_trad: "以晴空為意象的花朵小籤。\n將天色花朵系列的三明治籤搭配使用，\n肯定能增添野餐的興致。"
blue_tablecloth:
  names:
    jp_kana: ブルークロス
    jp_kanji: ブルークロス
    en: Blue Tablecloth
    fr: Nappe Bleue
    it: Tovaglia blu
    de: Blaues Tischtuch
    es: Mantel Azul
    ko: 블루 테이블보
    zh_simp: 蓝色桌巾
    zh_trad: 藍色桌巾
  descriptions:
    jp_kana: "落ち着いた　ブルーカラーの　テーブルクロス。\n肌に優しい　サラリとした　さわり心地で\n食器を　置いても　音を　立てない。"
    jp_kanji: "落ち着いた　ブルーカラーの　テーブルクロス。\n肌に優しい　サラリとした　さわり心地で\n食器を　置いても　音を　立てない。"
    en: "A simple blue tablecloth. It’s smooth and pleasant to\nthe touch, and dishes can be placed on it with hardly\na sound."
    fr: "Une nappe d’une douce couleur bleue. Sa texture\nsatinée est agréable au toucher et étouffe le bruit\ndes plats lorsqu’on les pose dessus."
    it: "Tovaglia di un sobrio color blu. È così liscia e morbida\nal tatto che quando ci poggi le stoviglie non fanno\nrumore."
    de: "Dieses schlichte blaue Tischtuch aus hautfreundlichem,\nglattem Material absorbiert jegliches Geräusch von\nGeschirr, das darauf platziert wird."
    es: "Un mantel de un suave color azul. Está hecho de un\nmaterial tan sedoso y delicado que hasta absorbe el\nsonido que producen los platos al colocarlos sobre él."
    ko: "차분한 블루 컬러의 테이블보.\n피부에 자극이 적은 매끈한 재질이며\n식기를 올려놓아도 소리가 나지 않는다."
    zh_simp: "稳重的蓝色桌巾。\n丝柔顺滑亲近肌肤，\n放上餐具也不会发出声音。"
    zh_trad: "以沉穩的藍色為質地的桌巾。\n觸感輕柔，如同撫過肌膚一般，\n而且放置餐具時也不會發出聲響。"
blueberry_chairs:
  names:
    jp_kana: ブルーベリーチェア
    jp_kanji: ブルーベリーチェア
    en: Blueberry Chairs
    fr: Sièges Myrtille
    it: Sedie Mirtillo
    de: Blaubeer-Stühle
    es: Sillas Arándano
    ko: 블루베리 체어
    zh_simp: 蓝莓椅子
    zh_trad: 藍莓椅子
  descriptions:
    jp_kana: "ピクニックで　使いやすい　イス。\nブルーベリークロスの　デザインを\nもとに　作ってもらった。"
    jp_kanji: "ピクニックで　使いやすい　イス。\nブルーベリークロスの　デザインを\nもとに　作ってもらった。"
    en: "A set of chairs that are ideal for picnicking. Their design\nwas inspired by the Blueberry Tablecloth."
    fr: "Des sièges parfaits pour les pique-niques.\nLeur design est inspiré de la Nappe Myrtille."
    it: "Pratiche sedie, perfette per i picnic, ispirate al design\ndella Tovaglia Mirtillo."
    de: "Diese Stühle sind gut geeignet für Picknicks.\nIhr Design basiert auf dem Blaubeer-Tischtuch."
    es: "Unas sillas ideales para irse de pícnic. Su diseño está\nbasado en el del Mantel Arándano."
    ko: "피크닉에서 사용하기 편한 의자.\n블루베리 테이블보의\n디자인을 토대로 만들어졌다."
    zh_simp: "在野餐时很好用的椅子。\n根据蓝莓桌巾的设计制作而成。"
    zh_trad: "野餐時很好用的椅子。\n根據藍莓桌巾的設計製作而成。"
blueberry_tablecloth:
  names:
    jp_kana: ブルーベリークロス
    jp_kanji: ブルーベリークロス
    en: Blueberry Tablecloth
    fr: Nappe Myrtille
    it: Tovaglia Mirtillo
    de: Blaubeer-Tischtuch
    es: Mantel Arándano
    ko: 블루베리 테이블보
    zh_simp: 蓝莓桌巾
    zh_trad: 藍莓桌巾
  descriptions:
    jp_kana: "耐熱素材で　するどいキバでも　ちぎれない\n最新の　繊維加工　技術で　作られた\nブルーベリー学園指定の　テーブルクロス。"
    jp_kanji: "耐熱素材で　するどいキバでも　ちぎれない\n最新の　繊維加工　技術で　作られた\nブルーベリー学園指定の　テーブルクロス。"
    en: "Blueberry Academy’s standard issue tablecloth, made\nwith the latest fiber-processing technology. It’s heat-\nresistant and so tough even a Razor Claw can’t tear it."
    fr: "Une nappe fournie par l’Institut Myrtille. Grâce aux\ndernières technologies textiles, elle est ignifugée et\nassez solide pour résister aux coups d’un Croc Rasoir."
    it: "Tovaglia con il design regolamentare dell’istituto,\nrealizzata in materiale ignifugo, trattato con processi\nall’avanguardia. Neanche un Affilodente può lacerarla."
    de: "Das offizielle Blaubeer-Tischtuch aus hitzebeständigem\nMaterial. Dank hochmoderner Faserverarbeitung kann\nnicht einmal ein Scharfzahn dem Stoff etwas anhaben."
    es: "El mantel oficial de la Academia Arándano, fabricado\ncon un material de última tecnología resistente tanto\nal fuego como a las mordeduras."
    ko: "내열 소재에 예리한 이빨에도 찢어지지 않는\n최신 섬유 가공 기술로 만들어진\n블루베리 아카데미 지정 테이블보."
    zh_simp: "蓝莓学园指定的桌巾。采用耐热材料，\n以最新的纤维加工技术制成。\n即使是使用锐利之牙都不能撕开。"
    zh_trad: "藍莓學園指定的桌巾。採用耐熱素材，\n並結合即使被銳利之牙攻擊也不會撕裂的\n最新型纖維加工技術製成。"
bluk_berry:
  names:
    jp_kana: ブリーのみ
    jp_kanji: ブリーのみ
    en: Bluk Berry
    fr: Baie Remu
    it: Baccamora
    de: Morbbeere
    es: Baya Oram
    ko: 블리열매
    zh_simp: 墨莓果
    zh_trad: 墨莓果
  descriptions:
    jp_kana: "うつくしさに　磨きを　かけるための\nポロックを　作るとき　使われる。\n青色の実は　食べると　渋い。"
    jp_kanji: "うつくしさに　磨きを　かけるための\nポロックを　作るとき　使われる。\n青色の実は　食べると　渋い。"
    en: "Used to make Pokéblocks that will enhance Beauty.\nIts blue flesh is dry if eaten."
    fr: "Une Baie violette et âpre, utilisée pour préparer\ndes Pokéblocs permettant d’augmenter la Beauté\nd’un Pokémon."
    it: "Bacca blu dal sapore agro usata per creare Pokémelle\nche aumentano la Bellezza del Pokémon."
    de: "Eine Beerensorte, die als Zutat für Pokériegel\nverwendet wird, welche die Schönheit erhöhen.\nIhr bläuliches Fruchtfleisch schmeckt herb."
    es: "Se utiliza en la producción de Pokécubos que potencian\nla belleza. Es de color azulado y sabor seco."
    ko: "아름다움을 연마하기 위한\n포켓몬스넥을 만들 때 사용된다.\n파란색 열매는 먹으면 떫다."
    zh_simp: "用于制作宝可方块，\n制作出来的宝可方块可用来打磨美丽。\n蓝色的果实尝起来是涩的。"
    zh_trad: "製作用於增進美麗的\n寶可方塊時使用。\n藍色的果實嘗起來是澀的。"
blunder_policy:
  names:
    jp_kana: からぶりほけん
    jp_kanji: からぶりほけん
    en: Blunder Policy
    fr: Assurance Échec
    it: Fiascopolizza
    de: Fehlschlagschutz
    es: Seguro Fallo
    ko: 허탕보험
    zh_simp: 打空保险
    zh_trad: 打空保險
  descriptions:
    jp_kana: "命中率に　よって\n技が　はずれたとき\n素早さが　ぐーんと　上がる。"
    jp_kanji: "命中率に　よって\n技が　はずれたとき\n素早さが　ぐーんと　上がる。"
    en: "An item to be held by a Pokémon. If the holder misses\nwith a move due to low accuracy, this policy will sharply\nboost its Speed stat."
    fr: "Objet à tenir. Si une capacité échoue à cause de\nson manque de Précision, la Vitesse du lanceur\naugmente beaucoup."
    it: "Se una mossa non va a segno a causa della scarsa\nprecisione, la Velocità aumenta di molto."
    de: "Schlägt eine Attacke des Trägers mangels Genauigkeit\nfehl, steigt im Gegenzug dessen Initiative stark an."
    es: "Aumenta mucho la Velocidad cuando el Pokémon yerra\nel movimiento debido a la precisión."
    ko: "명중률에 의해\n기술이 빗나갔을 때\n스피드가 크게 올라간다."
    zh_simp: "招式因命中率影响而落空时，\n速度会大幅提高。"
    zh_trad: "當招式受命中率影響\n而未能擊中對手時，\n自己的速度將大幅提高。"
bobs_food_tin:
  names:
    jp_kana: ボブのかんづめ
    jp_kanji: ボブのかんづめ
    en: Bob’s Food Tin
    fr: Conserve de Bob
    it: Lattina Gustavo
    de: Pauls Feinkost
    es: Lata de Darren
    ko: 밥의통조림
    zh_simp: 饱伯罐头
    zh_trad: 飽伯罐頭
  descriptions:
    jp_kana: "キャンプの　料理に　使う\n食材の　一種。ボブが　売り出した\n缶詰が　なぜか　ガラルで　人気だ。"
    jp_kanji: "キャンプの　料理に　使う\n食材の　一種。ボブが　売り出した\n缶詰が　なぜか　ガラルで　人気だ。"
    en: "One of the many ingredients that can be used for\ncooking at your camp. The tinned food that Bob sells\nis curiously popular in Galar."
    fr: "Un ingrédient de cuisine pour le camping.\nCette conserve, vendue par Bob, connaît un succès\nétonnant à Galar."
    it: "Uno degli ingredienti che puoi usare per cucinare\nin campeggio. Queste lattine vendute da Gustavo\nsono particolarmente amate dagli abitanti di Galar."
    de: "Eine Zutat für PokéCamping-Mahlzeiten. Diese von\nLeckerpaul vertriebene Dosennahrung erfreut sich in\nGalar überraschend hoher Beliebtheit."
    es: "Un ingrediente para cocinar en el campamento. Las\nconservas de Darren son muy apreciadas por todo\nGalar."
    ko: "캠프 요리에 사용되는\n식재료 중 하나. 밥이 파는 통조림은\n어째선지 가라르에서 인기다."
    zh_simp: "在露营营地制作料理时会使用的\n一种食材。不知是什么原因，\n饱伯卖的罐头在伽勒尔特别受欢迎。"
    zh_trad: "製作露營料理時使用的食材之一。\n飽伯賣的罐頭不知為何\n在伽勒爾很受歡迎。"
boiled_egg:
  names:
    jp_kana: ゆでタマゴ
    jp_kanji: ゆでタマゴ
    en: Boiled Egg
    fr: Œuf Dur
    it: Uovo sodo
    de: Gekochtes Ei
    es: Huevo Duro
    ko: 삶은알
    zh_simp: 水煮蛋
    zh_trad: 水煮蛋
  descriptions:
    jp_kana: "キャンプの　料理に　使う\n食材の　一種。たった　一つの\nゆでタマゴが　クオリティを　あげてくれる。"
    jp_kanji: "キャンプの　料理に　使う\n食材の　一種。たった　一つの\nゆでタマゴが　クオリティを　あげてくれる。"
    en: "One of the many ingredients that can be used for\ncooking at your camp. Even just one boiled egg can\nreally enhance a dish."
    fr: "Un ingrédient de cuisine pour le camping.\nLe simple ajout d’un œuf donne une touche\nde prestige à tous les plats."
    it: "Uno degli ingredienti che puoi usare per cucinare\nin campeggio. Basta una di queste Uova sode\nper creare un piatto d’alta qualità."
    de: "Eine Zutat für PokéCamping-Mahlzeiten. Ein einzelnes\ngekochtes Ei reicht aus, um die Qualität einer Speise\ndeutlich anzuheben."
    es: "Un ingrediente para cocinar en el campamento. Con tan\nsolo uno de estos huevos se consigue un plato gourmet."
    ko: "캠프 요리에 사용되는\n식재료 중 하나. 단 하나의 삶은알이\n요리의 퀄리티를 높여 준다."
    zh_simp: "在露营营地制作料理时会使用的\n一种食材。只需一个水煮蛋，\n整道料理的水准都能得到升华。"
    zh_trad: "製作露營料理時使用的食材之一。\n只需一顆水煮蛋就能讓\n整道料理的水準向上提升。"
bold_mint:
  names:
    jp_kana: ずぶといミント
    jp_kanji: ずぶといミント
    en: Bold Mint
    fr: Aromate Assuré
    it: Menta Sicura
    de: Kühn-Minze
    es: Menta Osada
    ko: 대담민트
    zh_simp: 大胆薄荷
    zh_trad: 大膽薄荷
  descriptions:
    jp_kana: "ポケモンに　香りを　かがせると\n防御が　上がりやすく　なるが\n攻撃は　上がりにくくなる　ミント。"
    jp_kanji: "ポケモンに　香りを　かがせると\n防御が　上がりやすく　なるが\n攻撃は　上がりにくくなる　ミント。"
    en: "Having a Pokémon smell this mint can make its Defense\nstat grow stronger. However, its Attack stat may suffer."
    fr: "Si un Pokémon hume cet aromate, sa Défense\nmontera plus facilement, mais son Attaque\nse développera plus lentement."
    it: "Quando un Pokémon ne sente il profumo, la sua Difesa\naumenta più facilmente a scapito dell’Attacco."
    de: "Lässt man ein Pokémon an dieser Minze schnuppern,\nsteigt seine Verteidigung schneller, aber sein Angriff\numso langsamer."
    es: "Cuando un Pokémon percibe su aroma, aumenta con\nmás facilidad su Defensa, en detrimento de su Ataque."
    ko: "포켓몬에게 향기를 맡게 하면\n방어가 오르기 쉬워지지만\n공격이 오르기 어려워지는 민트."
    zh_simp: "宝可梦闻了这种薄荷之后，\n会令防御容易提高，\n而攻击则难以提高。"
    zh_trad: "讓寶可夢聞這種薄荷的氣味，\n會令防禦變得容易提高，\n但攻擊則難以提高。"
