    zh_simp: 酸酸苹果
    zh_trad: 酸酸蘋果
  descriptions:
    jp_kana: "ある特定の　ポケモンを\n進化させる　不思議なりんご。\nとにかく　酸っぱい。"
    jp_kanji: "ある特定の　ポケモンを\n進化させる　不思議なりんご。\nとにかく　酸っぱい。"
    en: "A peculiar apple that can make a certain species of\nPokémon evolve. It’s exceptionally tart."
    fr: "Une pomme mystérieuse très acide qui permet\nde faire évoluer un certain Pokémon."
    it: "Mela particolare dal sapore molto aspro che\nfa evolvere determinate specie di Pokémon."
    de: "Dieser sonderbare Apfel löst bei einem bestimmten\nPokémon die Entwicklung aus. Er schmeckt sehr sauer."
    es: "Curiosa manzana, de sabor particularmente ácido,\nque hace evolucionar a una determinada especie de\nPokémon."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 사과.\n엄청나게 새콤하다."
    zh_simp: "这种神奇的苹果\n可以使特定的宝可梦进化。\n吃起来酸酸的。"
    zh_trad: "能讓特定寶可夢\n進化的神奇蘋果。\n非常酸。"
