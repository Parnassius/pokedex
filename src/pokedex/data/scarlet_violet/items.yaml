academy_bottle:scarlet:
  names:
    jp_kana: スクールボトル
    jp_kanji: スクールボトル
    en: Academy Bottle
    fr: Gourde de l’Académie
    it: Borraccia accademia
    de: Akademie-Flasche
    es: Termo Academia
    ko: 스쿨 보틀
    zh_simp: 校园水壶
    zh_trad: 校園水壺
  descriptions:
    jp_kana: "学校のエンブレムが　きらめく　ボトル。\n軽くて　丈夫な　真空断熱　構造で\n保温から　保冷まで　バッチリ。"
    jp_kanji: "学校のエンブレムが　きらめく　ボトル。\n軽くて　丈夫な　真空断熱　構造で\n保温から　保冷まで　バッチリ。"
    en: "A bottle emblazoned with the academy’s emblem.\nIt’s light, sturdy, and vacuum insulated, so it’ll keep\nyour hots hot and your colds cold."
    fr: "Une bouteille portant le blason de l’académie. Elle est\nlégère, solide et isolée sous vide pour conserver vos\nboissons chaudes et froides à leur température idéale."
    it: "Borraccia su cui brilla l’emblema della scuola.\nLeggera e resistente, la sua capacità isotermica permette\ndi mantenere la temperatura di bevande calde e fredde."
    de: "Das Wappen der Akademie ziert diese ebenso robuste\nwie leichte Flasche, die Getränke dank Vakuumdämmung\nwarm beziehungsweise kalt hält."
    es: "Un termo decorado con el escudo de la academia.\nLigero, resistente y muy bien aislado, conserva sin\nproblema la temperatura de lo que se vierta en él."
    ko: "학교의 엠블럼이 반짝이는 보틀.\n가볍고 튼튼한 진공 단열 구조로 되어 있어\n보온 성능은 물론 보냉 성능도 완벽하다."
    zh_simp: "校徽闪亮耀眼的水壶。\n轻巧坚固，采用了真空隔热的构造，\n由保温到保冷，功能一应俱全。"
    zh_trad: "校徽閃閃發亮的水壺。\n具備輕巧又堅固的真空隔熱構造，\n不論要保溫或保冷都不是問題。"
