snow_balm:
  names:
    jp_kana: ゆきのシズメダマ
    jp_kanji: ゆきのシズメダマ
    en: Snow Balm
    fr: Pacifi-Neige
    it: Sferazen neve
    de: Schneeruhegabe
    es: Calmasfera Nieve
    ko: 눈의진정환
    zh_simp: 雪之镇宝
    zh_trad: 雪之鎮寶
  descriptions:
    jp_kana: "荒ぶる雪原キング　クレベースを\n鎮めることができる\n不思議な香りを発する。"
    jp_kanji: "荒ぶる雪原キング　クレベースを\n鎮めることができる\n不思議な香りを発する。"
    en: "A mysterious balm that gives off a soothing scent.\nIt can be used to help calm the frenzy of the Lord of\nthe Tundra, Avalugg."
    fr: "L’étrange parfum que dégage cet objet permet d’apaiser\nla frénésie de Séracrawl, le Roi des Plaines Enneigées."
    it: "Emana un misterioso profumo in grado di calmare\nla collera di Avalugg, il Re delle nevi."
    de: "Dieses Säckchen verströmt einen mysteriösen Duft.\nMit ihm kann man Arktilas, den König des Schneefelds,\nbesänftigen."
    es: "Esfera que emana un peculiar aroma capaz de calmar a\nAvalugg, el Señor de las Nieves, cuando se encuentra\nfurioso."
    ko: "폭주하는 설원의 왕 크레베이스를\n진정시킬 수 있는\n신비한 향기가 난다."
    zh_simp: "能让狂暴的雪原王\n冰岩怪镇静下来。\n散发着不可思议的香气。"
    zh_trad: "能讓狂暴的雪原王\n冰岩怪鎮靜下來。\n散發著不可思議的香氣。"
snowball:
  names:
    jp_kana: ゆきだま
    jp_kanji: ゆきだま
    en: Snowball
    fr: Boule de Neige
    it: Palla di neve
    de: Schneeball
    es: Bola de Nieve
    ko: 눈덩이
    zh_simp: 雪球
    zh_trad: 雪球
  descriptions:
    jp_kana: "使い捨ての　ゆきだま。\n持たせて　こおりの技の　ダメージを\n受けると　攻撃が　あがる。"
    jp_kanji: "使い捨ての　ゆきだま。\n持たせて　こおりの技の　ダメージを\n受けると　攻撃が　あがる。"
    en: "An item to be held by a Pokémon. This single-use ball\nof snow boosts the Attack stat if the holder is damaged\nby an Ice-type move."
    fr: "Objet à tenir. Une boule de neige à usage unique\nqui augmente l’Attaque du porteur lorsqu’il subit\ndes dégâts à cause d’une capacité de type Glace."
    it: "Palla di neve monouso. Se il Pokémon che ce l’ha\nsubisce danni da una mossa di tipo Ghiaccio, il suo\nAttacco aumenta."
    de: "Nimmt der Träger dieses Schneeballs durch eine\nEis-Attacke Schaden, steigt sein Angriff und das Item\nverschwindet."
    es: "Bola de nieve que aumenta el Ataque del portador si\nlo alcanza un ataque de tipo Hielo. Es de un solo uso."
    ko: "단 한 번 쓰면 없어지는 눈덩이.\n지니게 하고 얼음 기술에 데미지를 받으면\n공격이 올라간다."
    zh_simp: "一次性使用的雪球。\n携带它的宝可梦如果受到冰属性\n招式的伤害，攻击就会提高。"
    zh_trad: "只能使用一次的雪球。\n攜帶它的寶可夢如果受到冰屬性\n招式的傷害，攻擊就會提高。"
snowball:legends:
  names:
    jp_kana: ゆきだま
    jp_kanji: ゆきだま
    en: Snowball
    fr: Boule de Neige
    it: Palla di neve
    de: Schneeball
    es: Bola de Nieve
    ko: 눈덩이
    zh_simp: 雪丸
    zh_trad: 雪丸
  descriptions:
    jp_kana: "雪を固めて作った球状の物体。\nポケモンに投げつけると動きが鈍り\n隙がうまれることもある。"
    jp_kanji: "雪を固めて作った球状の物体。\nポケモンに投げつけると動きが鈍り\n隙がうまれることもある。"
    en: "A hard ball made of compressed snow. Hitting a\nPokémon with one may stun the Pokémon, creating an\nopening for you to act."
    fr: "Une boule obtenue en compressant de la neige.\nLancez-la sur un Pokémon pour ralentir ses mouvements,\nvoire le rendre vulnérable."
    it: "Oggetto sferico fatto di neve indurita. Se lanciata contro\nun Pokémon, ne rallenta i movimenti e può fargli\nabbassare la guardia."
    de: "Wird dieser harte Schneeball auf ein Pokémon geworfen,\nmacht er es schwerfälliger und schafft so möglicherweise\neine günstige Gelegenheit für dich."
    es: "Bola creada a partir de nieve endurecida. Al acertar a\nun Pokémon con ella, dificulta sus movimientos y puede\ndejarlo expuesto."
    ko: "눈을 뭉쳐서 만든 구형의 물체.\n포켓몬에게 던지면 움직임이 둔해져서\n빈틈이 생길 때가 있다."
    zh_simp: "用雪压成的球状物体。\n用它投中宝可梦能使其动作\n变得迟缓，有时还会生出破绽。"
    zh_trad: "用雪壓成的球狀物體。\n用它投中寶可夢能使其動作\n變得遲緩，有時還會生出破綻。"
