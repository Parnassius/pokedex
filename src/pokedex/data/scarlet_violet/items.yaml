  descriptions:
    jp_kana: "持たせると　バトル中の　素早さが\nさがるが　ふつうよりも　ポケモンの\nＨＰが　高く　育ちやすい。"
    jp_kanji: "持たせると　バトル中の　素早さが\nさがるが　ふつうよりも　ポケモンの\nＨＰが　高く　育ちやすい。"
    en: "An item to be held by a Pokémon. Holding this weight\nreduces a Pokémon’s Speed in battle but allows its\nHP stat to grow more quickly."
    fr: "Objet à tenir. Permet aux PV max de progresser\nplus vite, mais réduit la Vitesse pendant le combat."
