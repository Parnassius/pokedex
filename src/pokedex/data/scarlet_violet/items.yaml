    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de cierto Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
ditto_goo:
  names:
    jp_kana: メタモンのべたべた
    jp_kanji: メタモンのべたべた
    en: Ditto Goo
    fr: Substance de Métamorph
    it: Appiccicume di Ditto
    de: Ditto-Glibber
    es: Pegote de Ditto
    ko: 메타몽의끈끈이
    zh_simp: 百变怪的黏糊
    zh_trad: 百變怪的黏糊
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
dive_ball:
  names:
    jp_kana: ダイブボール
    jp_kanji: ダイブボール
    en: Dive Ball
    fr: Scuba Ball
    it: Sub Ball
    de: Tauchball
    es: Buceo Ball
    ko: 다이브볼
    zh_simp: 潜水球
    zh_trad: 潛水球
  descriptions:
    jp_kana: "水の世界で　暮らしている\nポケモンが　捕まえやすくなる\nちょっと変わった　ボール。"
    jp_kanji: "水の世界で　暮らしている\nポケモンが　捕まえやすくなる\nちょっと変わった　ボール。"
    en: "A somewhat different Poké Ball that is more effective\nwhen catching Pokémon in or on the water."
    fr: "Une Poké Ball un peu spéciale qui fonctionne\nparticulièrement bien sur les Pokémon sous-marins."
    it: "Poké Ball un po’ diversa. Risulta particolarmente\nefficace sui Pokémon che vivono in acqua."
    de: "Ein Ball, mit dem sich Pokémon, die auf oder im Wasser\nleben, leichter fangen lassen."
    es: "Poké Ball algo distinta a las demás que funciona\nespecialmente bien con los Pokémon que viven en\nel agua."
    ko: "물의 세계에서 사는\n포켓몬을 잡기 쉬운\n조금 특이한 볼."
    zh_simp: "有点与众不同的球。\n能很容易地捕捉\n生活在水世界里的宝可梦。"
    zh_trad: "有點與眾不同的球。\n能更容易地捉到\n生活在水中世界的寶可夢。"
dna_splicers:fuse:
  names:
    jp_kana: いでんしのくさび
    jp_kanji: いでんしのくさび
    en: DNA Splicers
    fr: Pointeau ADN
    it: Cuneo DNA
    de: DNS-Keil
    es: Punta ADN
    ko: 유전자쐐기
    zh_simp: 基因之楔
    zh_trad: 基因之楔
  descriptions:
    jp_kana: "元は　ひとつだったと　いわれる\nキュレムと　あるポケモンを\n合体させる　一対のくさび。"
    jp_kanji: "元は　ひとつだったと　いわれる\nキュレムと　あるポケモンを\n合体させる　一対のくさび。"
    en: "A splicer that fuses Kyurem and a certain Pokémon.\nThey are said to have originally been one."
    fr: "Un outil qui permet la fusiorption de Kyurem\net d’un autre Pokémon avec lequel il ne faisait\nqu’un à l’origine."
    it: "Cuneo che permette di fondere Kyurem con il Pokémon\nal quale era unito in origine."
    de: "Ein Keil, der Kyurem und ein gewisses anderes\nPokémon, die vermeintlich einst eins gewesen sind,\nvereinigt."
    es: "Punta que permite fusionar a Kyurem con cierto\nPokémon con el que, originariamente, formaba un solo\nser."
    ko: "원래는 하나였다고 전해지는\n큐레무와 어떤 포켓몬을\n합체시키는 한 쌍의 쐐기."
    zh_simp: "据说是能让原本为一体的\n酋雷姆和某宝可梦\n合体的一对楔子。"
    zh_trad: "能讓據說原是一體的酋雷姆和\n某寶可夢合體的一對楔子。"
dna_splicers:separate:
  names:
    jp_kana: いでんしのくさび
    jp_kanji: いでんしのくさび
    en: DNA Splicers
    fr: Pointeau ADN
    it: Cuneo DNA
    de: DNS-Keil
    es: Punta ADN
    ko: 유전자쐐기
    zh_simp: 基因之楔
    zh_trad: 基因之楔
  descriptions:
    jp_kana: "合体した　キュレムと\nあるポケモンを　元通りに\n分離させる　一対のくさび。"
    jp_kanji: "合体した　キュレムと\nあるポケモンを　元通りに\n分離させる　一対のくさび。"
    en: "A splicer that separates Kyurem and a certain\nPokémon when they have been fused."
    fr: "Un outil qui permet de séparer Kyurem et le Pokémon\navec lequel il a fusiorbé."
    it: "Cuneo che permette di separare Kyurem dal Pokémon\ncon cui era fuso."
    de: "Ein Keil, der Kyurem und ein gewisses anderes\nPokémon, die vereinigt wurden, voneinander trennt."
    es: "Punta que permite separar a Kyurem del Pokémon con\nel que se ha fusionado."
    ko: "합체한 큐레무와\n어떤 포켓몬을 원래대로\n분리시키는 한 쌍의 쐐기."
    zh_simp: "能让合体后的\n酋雷姆和某宝可梦\n分离成原状的一对楔子。"
    zh_trad: "能讓合體後的\n酋雷姆和某寶可夢\n分離至原狀的一對楔子。"
doduo_candy:
  names:
    jp_kana: ドードーのアメ
    jp_kanji: ドードーのアメ
    en: Doduo Candy
    fr: Bonbon Doduo
    it: Caramella Doduo
    de: Dodu-Bonbon
    es: Caramelo Doduo
    ko: 두두의사탕
    zh_simp: 嘟嘟的糖果
    zh_trad: 嘟嘟的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
doduo_down:
  names:
    jp_kana: ドードーのうもう
    jp_kanji: ドードーのうもう
    en: Doduo Down
    fr: Duvet de Doduo
    it: Piuma di Doduo
    de: Dodu-Daune
    es: Plumón de Doduo
    ko: 두두의솜털
    zh_simp: 嘟嘟的羽绒
    zh_trad: 嘟嘟的羽絨
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
dome_fossil:
  names:
    jp_kana: こうらのカセキ
    jp_kanji: こうらのカセキ
    en: Dome Fossil
    fr: Fossile Dôme
    it: Domofossile
    de: Domfossil
    es: Fósil Domo
    ko: 껍질화석
    zh_simp: 甲壳化石
    zh_trad: 甲殼化石
  descriptions:
    jp_kana: "大昔　海に　すんでいた\n古代ポケモンの　カセキ。\nこうらの一部　らしい。"
    jp_kanji: "大昔　海に　すんでいた\n古代ポケモンの　カセキ。\nこうらの一部　らしい。"
    en: "A fossil from a prehistoric Pokémon that once lived\nin the sea. It could be a shell or carapace."
    fr: "Le fossile d’un ancien Pokémon aquatique.\nOn dirait un morceau de carapace."
    it: "Fossile di un Pokémon preistorico che viveva in mare.\nSembra essere parte di una corazza."
    de: "Das Fossil eines urzeitlichen Pokémon, das in der Tiefsee\nlebte. Es sieht wie ein Teil eines Rückenschilds aus."
    es: "Fósil de un Pokémon prehistórico que vivía en el fondo\ndel mar. Parece ser un fragmento de caparazón."
    ko: "오랜 옛날 바다에 살았던\n고대 포켓몬의 화석.\n등껍질의 일부인 듯하다."
    zh_simp: "很久以前栖息在海里的\n古代宝可梦的化石。\n好像是甲壳的一部分。"
    zh_trad: "很久以前棲息在海裡的\n古代寶可夢的化石。\n好像是甲殼的一部分。"
dondozo_whisker:
  names:
    jp_kana: ヘイラッシャのヒゲ
    jp_kanji: ヘイラッシャのヒゲ
    en: Dondozo Whisker
    fr: Barbillon d’Oyacata
    it: Barbiglio di Dondozo
    de: Heerashai-Bartel
    es: Bigote de Dondozo
    ko: 어써러셔의수염
    zh_simp: 吃吼霸的胡须
    zh_trad: 吃吼霸的鬍鬚
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
