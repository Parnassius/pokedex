    fr: "Un transmetteur high-tech permettant à quatre\npersonnes de communiquer par le son et l’image."
    it: "Ricetrasmittente all’avanguardia che permette\ndi fare videochiamate con un gruppo massimo\ndi quattro persone."
    de: "Ein hochmodernes Gerät, mit dem bis zu vier Personen\nmiteinander kommunizieren können. Es ermöglicht sogar\nVideo-Chat!"
    es: "Comunicador de alta tecnología con cámara que\npermite hablar a cuatro personas a la vez."
    ko: "영상 통화 기능이 내장된\n최신식 무전기.\n최대 4명이 동시에 통화할 수 있다."
    zh_simp: "带摄像头功能，\n最多能让４人进行通话的\n最新型对讲机。"
    zh_trad: "附影像鏡頭功能，\n最多能讓４人進行通話的\n最新型對講機。"
xtransceiver:male:
  names:
    jp_kana: ライブキャスター
    jp_kanji: ライブキャスター
    en: Xtransceiver
    fr: Vokit
    it: Interpoké
    de: Viso-Caster
    es: Videomisor
    ko: 라이브캐스터
    zh_simp: 即时通讯器
    zh_trad: 即時通訊器
  descriptions:
    jp_kana: "最大４人で　通話ができる\nテレビカメラ機能つきの\n最新型トランシーバー。"
    jp_kanji: "最大４人で　通話ができる\nテレビカメラ機能つきの\n最新型トランシーバー。"
    en: "A high-tech transceiver with a camera function.\nIt allows up to four-way calls."
    fr: "Un transmetteur high-tech permettant à quatre\npersonnes de communiquer par le son et l’image."
    it: "Ricetrasmittente all’avanguardia che permette\ndi fare videochiamate con un gruppo massimo\ndi quattro persone."
    de: "Ein hochmodernes Gerät, mit dem bis zu vier Personen\nmiteinander kommunizieren können. Es ermöglicht sogar\nVideo-Chat!"
    es: "Comunicador de alta tecnología con cámara que\npermite hablar a cuatro personas a la vez."
    ko: "영상 통화 기능이 내장된\n최신식 무전기.\n최대 4명이 동시에 통화할 수 있다."
    zh_simp: "带摄像头功能，\n最多能让４人进行通话的\n最新型对讲机。"
    zh_trad: "附影像鏡頭功能，\n最多能讓４人進行通話的\n最新型對講機。"
yache_berry:
  names:
    jp_kana: ヤチェのみ
    jp_kanji: ヤチェのみ
    en: Yache Berry
    fr: Baie Nanone
    it: Baccamoya
    de: Kiroyabeere
    es: Baya Rimoya
    ko: 플카열매
    zh_simp: 番荔果
    zh_trad: 番荔果
  descriptions:
    jp_kana: "ポケモンに　持たせると\n効果バツグンの　こおり技を\n受けたとき　威力が　弱まる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　こおり技を\n受けたとき　威力が　弱まる。"
    en: "If a Pokémon holding this Berry is hit with a\nsupereffective Ice-type move, the power of that\nmove will be weakened."
    fr: "Tenue, cette Baie réduit les dégâts subis lorsque\nle Pokémon est touché par une capacité super efficace\nde type Glace."
    it: "Se il Pokémon che ha questa bacca subisce una mossa\nsuperefficace di tipo Ghiaccio, la potenza della mossa\nviene indebolita."
    de: "Als getragenes Item schwächt diese Beere eine\nsehr effektive Eis-Attacke, von der das Pokémon\ngetroffen wird."
    es: "Si la lleva un Pokémon, debilita un ataque supereficaz\nde tipo Hielo que reciba."
    ko: "포켓몬에게 지니게 하면\n효과가 굉장한 얼음 기술로\n공격받았을 때 위력이 약해진다."
    zh_simp: "让宝可梦携带后，\n在受到效果绝佳的冰属性招式\n攻击时，能令其威力减弱。"
    zh_trad: "讓寶可夢攜帶後，\n在受到效果絕佳的冰屬性招式\n攻擊時，能使其威力減弱。"
yanma_spike:
  names:
    jp_kana: ヤンヤンマのトゲ
    jp_kanji: ヤンヤンマのトゲ
    en: Yanma Spike
    fr: Dard de Yanma
    it: Aculeo di Yanma
    de: Yanma-Stachel
    es: Aguijón de Yanma
    ko: 왕자리의가시
    zh_simp: 蜻蜻蜓的刺
    zh_trad: 蜻蜻蜓的刺
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
yarn_ball:
  names:
    jp_kana: けいとボール
    jp_kanji: けいとボール
    en: Yarn Ball
    fr: Pelote de Laine
    it: Palla gomitolo
    de: Woll-Ball
    es: Pelota Ovillo
    ko: 털실볼
    zh_simp: 毛线球
    zh_trad: 毛線球
  descriptions:
    jp_kana: "毛糸で　作られた　小さなボール。\nほつれないように　編みこまれているが\nほつれても　毛糸として　再利用できる。"
    jp_kanji: "毛糸で　作られた　小さなボール。\nほつれないように　編みこまれているが\nほつれても　毛糸として　再利用できる。"
    en: "A small ball of yarn. It’s woven tight so as not to unravel,\nbut even if it were to come undone, at least you could\nstill use the yarn for something."
    fr: "Une petite balle en laine. Le fil est comprimé pour ne\npas se défaire... Mais même si cela devait arriver, il est\ntoujours possible d’utiliser la laine pour tricoter."
    it: "Piccola palla fatta con filo di lana. È intrecciata in modo\nda non disfarsi, ma qualora dovesse succedere si può\nriutilizzare come filo da maglia."
    de: "Ein kleiner Ball aus Wolle. Er ist engmaschig gestrickt,\ndamit das Garn nicht zerfranst. Selbst wenn sich die\nMaschen doch lösen, ist die Wolle noch verwertbar."
    es: "Una pequeña pelota hecha de lana. Está pensada para\nque no se desenrede, pero, si lo hace, siempre se puede\nusar para tejer algo."
    ko: "털실로 만들어진 작은 볼.\n실이 풀리지 않게 잘 짜여 있으나,\n풀리더라도 털실로 재사용할 수 있다."
    zh_simp: "以毛线制作的小球。\n编织得不易散开。即使散开，\n也能作为毛线被循环利用。"
    zh_trad: "以毛線製成的小球。\n雖然已編得很緊實以避免綻線，\n但就算綻了線，也能當毛線重複使用。"
yellow_apricorn:
  names:
    jp_kana: きぼんぐり
    jp_kanji: きぼんぐり
    en: Yellow Apricorn
    fr: Noigrume Jaune
    it: Ghicocca gialla
    de: Aprikoko Gelb
    es: Bonguri Amarillo
    ko: 노랑규토리
    zh_simp: 黄球果
    zh_trad: 黃球果
  descriptions:
    jp_kana: "きいろの　ぼんぐり。\nさわやかな　かおりが　する。"
    jp_kanji: "きいろの　ぼんぐり。\nさわやかな　かおりが　する。"
    en: A yellow Apricorn. It has a light, refreshing scent.
    fr: "Un Noigrume de couleur jaune.\nIl dégage un arôme délicat."
    it: "Una ghicocca di colore giallo. Emana un profumo\ndelicato."
    de: "Eine gelbe Aprikoko. Sie verströmt einen frischen\nGeruch."
    es: Bonguri de color amarillo y aroma refrescante.
    ko: "노란색의 규토리.\n산뜻한 향기가 난다."
    zh_simp: "黄色的球果。\n有种清爽的香味。"
    zh_trad: "黃色的球果。\n有種清爽的香味。"
yellow_bell_pepper:
  names:
    jp_kana: きパプリカスライス
    jp_kanji: きパプリカスライス
    en: Yellow Bell Pepper
    fr: Poivron Jaune
    it: Peperone giallo
    de: Gelbe Paprika
    es: Pimiento Amarillo
    ko: 노란파프리카슬라이스
    zh_simp: 黄椒片
    zh_trad: 黃椒片
  descriptions:
    jp_kana: "苦味が　ある　食材。\n赤いパプリカと　味の差は　特にないが\nミックスして　使えば　目にも　おいしい。"
    jp_kanji: "苦味が　ある　食材。\n赤いパプリカと　味の差は　特にないが\nミックスして　使えば　目にも　おいしい。"
    en: "An ingredient with some bitterness. It’s not much\ndifferent from its red counterpart in flavor, but mixing\nthe colors makes a feast for the eyes."
    fr: "Un ingrédient au goût amer. Sa saveur est proche du\npoivron rouge, mais le mélange des variétés aux\ncouleurs différentes est aussi un régal pour les yeux."
    it: "Un ingrediente amaro dal sapore simile a quello\ndel Peperone rosso. Mischiarli crea una festa di colori."
    de: "Diese bittere Zutat unterscheidet sich im Geschmack\nnicht sehr von Roter Paprika, doch mischt man die\nverschiedenfarbigen Sorten, freut sich das Auge."
    es: "Tiene un sabor amargo casi idéntico a su variante roja,\npero, al mezclarlos, la variedad de colores da muy buen\naspecto a cualquier comida."
    ko: "쓴맛이 나는 식재료.\n빨간 파프리카와 맛의 차이는 거의 없으나\n섞어서 사용하면 보기에도 좋다."
    zh_simp: "带有苦味的食材。\n味道与红椒几乎无异，但混合\n起来用便能给人带来视觉享受。"
    zh_trad: "帶有苦味的食材。\n味道和紅椒並無特別差異，\n不過混合使用會更加美觀。"
yellow_bottle:
  names:
    jp_kana: イエローボトル
    jp_kanji: イエローボトル
    en: Yellow Bottle
    fr: Gourde Jaune
    it: Borraccia gialla
    de: Gelbe Flasche
    es: Termo Amarillo
    ko: 옐로 보틀
    zh_simp: 黄色水壶
    zh_trad: 黃色水壺
  descriptions:
    jp_kana: "ピクニック用の　水筒として　定番の商品。\nシンプルなデザインで　持ち運びやすく\n男女問わず　選ぶ人が　多い。"
    jp_kanji: "ピクニック用の　水筒として　定番の商品。\nシンプルなデザインで　持ち運びやすく\n男女問わず　選ぶ人が　多い。"
    en: "A go-to bottle widely used for drinks at picnics. Its\nsimple design and portability make it popular among all\nsorts of people."
    fr: "Une gourde largement utilisée lors de pique-niques.\nSa forme simple et pratique la rend populaire auprès\nd’un large public."
    it: "Classica borraccia da picnic. Il suo design semplice e\nla sua portabilità la rendono popolare tra persone di\nogni genere."
    de: "Dieser Klassiker unter den Picknickflaschen lässt sich\nleicht transportieren und besticht durch sein schlichtes\nDesign. Deshalb ist diese Flasche allseits beliebt."
    es: "El típico termo para pícnic, con un diseño sencillo\ny práctico que agrada a todo el mundo."
    ko: "피크닉용 보틀의 정석 같은 상품.\n심플한 디자인에 휴대가 간편해서\n남녀 불문하고 고르는 사람이 많다."
    zh_simp: "是用于野餐的水壶中较为大众的商品。\n设计简约，易于携带。\n无论男女都有很多人会选择它。"
    zh_trad: "國民款的野餐用水壺。\n設計簡潔，且容易攜帶，\n因此不分男女廣受青睞。"
yellow_chairs:
  names:
    jp_kana: イエローチェア
    jp_kanji: イエローチェア
    en: Yellow Chairs
    fr: Sièges Jaunes
    it: Sedie gialle
    de: Gelbe Stühle
    es: Sillas Amarillas
    ko: 옐로 체어
    zh_simp: 黄色椅子
    zh_trad: 黃色椅子
  descriptions:
    jp_kana: "ピクニックで　使いやすい　イス。\nイエロークロスの　デザインを\nもとに　作ってもらった。"
    jp_kanji: "ピクニックで　使いやすい　イス。\nイエロークロスの　デザインを\nもとに　作ってもらった。"
    en: "A set of chairs that are ideal for picnicking. Their design\nwas inspired by the Yellow Tablecloth."
    fr: "Des sièges parfaits pour les pique-niques.\nLeur design est inspiré de la Nappe Jaune."
    it: "Pratiche sedie, perfette per i picnic, ispirate al design\ndella Tovaglia gialla."
    de: "Diese Stühle sind gut geeignet für Picknicks.\nIhr Design basiert auf dem Gelben Tischtuch."
    es: "Unas sillas ideales para irse de pícnic. Su diseño está\nbasado en el del Mantel Amarillo."
    ko: "피크닉에서 사용하기 편한 의자.\n옐로 테이블보의\n디자인을 토대로 만들어졌다."
    zh_simp: "在野餐时很好用的椅子。\n根据黄色桌巾的设计制作而成。"
    zh_trad: "野餐時很好用的椅子。\n根據黃色桌巾的設計製作而成。"
yellow_cup:
  names:
    jp_kana: イエローカップ
    jp_kanji: イエローカップ
    en: Yellow Cup
    fr: Tasse Jaune
    it: Tazza gialla
    de: Gelbe Tasse
    es: Taza Amarilla
    ko: 옐로 컵
    zh_simp: 黄色水杯
    zh_trad: 黃色水杯
  descriptions:
    jp_kana: "イエローボトルと　セット購入される　カップ。\n重ねられないため　収納には　不向きだが\n写真映えを　気にする人に　人気が高い。"
    jp_kanji: "イエローボトルと　セット購入される　カップ。\n重ねられないため　収納には　不向きだが\n写真映えを　気にする人に　人気が高い。"
    en: "A cup sold with the Yellow Bottle. The two don’t stack,\nso they’re tough to pack—but they look good, so they’re\npopular with those who like to post picnic photos."
    fr: "Une tasse vendue avec la Gourde Jaune. Les tasses de\nce set ne s’emboîtent pas et sont donc moins pratiques,\nmais elles rendent bien sur les photos de pique-nique."
    it: "Tazza venduta assieme alla Borraccia gialla.\nNon essendo impilabile non è comoda da riporre,\nma va a ruba tra chi vuole fare delle belle foto."
    de: "Die Tasse wird im Set mit gleichfarbiger Flasche verkauft.\nSie ist nicht stapelbar und somit recht sperrig, doch bei\nLeuten mit einem Faible für schöne Fotos sehr beliebt."
    es: "Esta taza se vende junto al Termo Amarillo. No es la\nopción más cómoda, pues no se puede apilar, pero es\nbastante popular por ser muy fotogénica."
    ko: "옐로 보틀과 세트로 많이 구입하는 컵.\n겹쳐서 쌓을 수 없어서 수납하기에는 불편하나,\n예쁜 사진을 찍고 싶은 사람에게 인기가 많다."
    zh_simp: "与黄色水壶成套购买的杯子。\n因为不能叠放，所以不利于收纳，\n但很受追求拍出精美照片的人欢迎。"
    zh_trad: "和黃色水壺成套售出的水杯。\n無法堆疊，所以不容易收納，\n但注重拍出美照的人對其愛不釋手。"
yellow_dish:
  names:
    jp_kana: イエロープレート
    jp_kanji: イエロープレート
    en: Yellow Dish
    fr: Assiette Jaune
    it: Piatto giallo
    de: Gelber Teller
    es: Plato Amarillo
    ko: 옐로 플레이트
    zh_simp: 黄色盘子
    zh_trad: 黃色盤子
  descriptions:
    jp_kana: "ピクニック用のお皿。　料理や気分で\n使い分けられるよう　色の種類が　豊富。\nイエローは　間違いなしの　商品。"
    jp_kanji: "ピクニック用のお皿。　料理や気分で\n使い分けられるよう　色の種類が　豊富。\nイエローは　間違いなしの　商品。"
    en: "A dish for picnics. Comes in plenty of colors to choose\nfrom based on the food or the mood. The yellow variety\nis impossible to go wrong with."
    fr: "Une assiette de pique-nique. Il en existe de nombreuses\ncouleurs pour les accorder à l’ambiance ou au menu.\nIl est impossible de se tromper avec la jaune."
    it: "Piatto da picnic. È disponibile in un ampio assortimento\ndi colori tra cui si può scegliere a seconda del cibo e\ndell’umore. Con il giallo si va sul sicuro."
    de: "Diesen Picknickteller gibt es in verschiedenen Farben,\ndamit man je nach Laune oder Speise variieren kann.\nDer gelbe Teller ist stets die richtige Wahl."
    es: "Un plato de pícnic. Los distintos colores en los que viene\nofrecen posibilidades infinitas. Esta versión amarilla\nnunca falla."
    ko: "피크닉용 접시. 요리나 기분에 따라\n골라서 쓸 수 있게 색의 종류가 다양하다.\n옐로 컬러는 후회하지 않을 상품이다."
    zh_simp: "野餐用的盘子。为了能够配合料理\n和心情使用，其有着丰富的颜色种类。\n黄色的是买了绝不会后悔的商品。"
    zh_trad: "野餐用的盤子。提供豐富的顏色，\n以搭配各種不同的料理和心情。\n黃色的盤子買了絕對不會後悔。"
yellow_flute:
  names:
    jp_kana: きいろビードロ
    jp_kanji: きいろビードロ
    en: Yellow Flute
    fr: Flûte Jaune
    it: Flauto giallo
    de: Gelbe Flöte
    es: Flauta Amarilla
    ko: 노랑비드로
    zh_simp: 黄色玻璃哨
    zh_trad: 黃色玻璃哨
  descriptions:
    jp_kana: "黄色のガラスで　できた　笛。\n混乱状態を　回復する。"
    jp_kanji: "黄色のガラスで　できた　笛。\n混乱状態を　回復する。"
    en: "A flute made from yellow glass. It snaps Pokémon\nout of confusion."
    fr: "Un jouet en forme de flûte en verre jaune.\nSoigne la confusion."
    it: "Flauto fatto di vetro giallo. Ha il potere di curare\nla confusione."
    de: Eine Spielzeugflöte aus gelbem Glas. Heilt Verwirrung.
    es: "Una flauta de cristal amarillo cuyas notas sacan a un\nPokémon de la confusión."
    ko: "노란 유리로 만들어진 피리.\n혼란 상태를\n회복한다."
    zh_simp: "以黄色玻璃制成的哨子。\n可以治愈混乱状态。"
    zh_trad: "以黃色玻璃製成的笛子。\n可以治癒混亂狀態。"
yellow_nectar:
  names:
    jp_kana: やまぶきのミツ
    jp_kanji: やまぶきのミツ
    en: Yellow Nectar
    fr: Nectar Jaune
    it: Nettare giallo
    de: Gelber Nektar
    es: Néctar Amarillo
    ko: 진노랑꿀
    zh_simp: 金黄色花蜜
    zh_trad: 金黃色花蜜
  descriptions:
    jp_kana: "やまぶき色の　花のミツ。\n特定のポケモンの　姿を　変える。"
    jp_kanji: "やまぶき色の　花のミツ。\n特定のポケモンの　姿を　変える。"
    en: "Flower nectar obtained from a yellow flower. It changes\nthe form of a certain species of Pokémon."
    fr: "Un nectar de couleur jaune qui permet à\nun certain Pokémon de changer d’apparence."
    it: "Nettare di fiori gialli. Fa cambiare forma a una\ndeterminata specie di Pokémon."
    de: "Ein goldgelber Blütennektar. Ein bestimmtes Pokémon\nkann damit seine Form ändern."
    es: "Néctar de cierta flor amarilla, capaz de hacer cambiar\nde forma a una determinada especie de Pokémon."
    ko: "진노랑색 꽃의 꿀.\n특정 포켓몬의 모습을 바꾼다."
    zh_simp: "金黄色花的花蜜。\n可以改变特定宝可梦的样子。"
    zh_trad: "金黃色的花蜜。\n可以改變特定寶可夢的樣子。"
yellow_petal:
  names:
    jp_kana: きいろのはなびら
    jp_kanji: きいろのはなびら
    en: Yellow Petal
    fr: Pétale Jaune
    it: Petalo giallo
    de: Gelbes Blatt
    es: Pétalo Amarillo
    ko: 노랑꽃잎
    zh_simp: 黄色花瓣
    zh_trad: 黃色花瓣
  descriptions:
    jp_kana: "マツリカの試練で　マーマネから\nもらえる　はなびらの　押し花。\n７種類　集めるのが　目的。"
    jp_kanji: "マツリカの試練で　マーマネから\nもらえる　はなびらの　押し花。\n７種類　集めるのが　目的。"
    en: "A pressed flower petal you receive from Sophocles\nduring Mina’s trial. The goal is to collect seven\ndifferent kinds of petals."
    fr: "Un pétale pressé que Chrys vous a remis lors\nde l’Épreuve d’Oléa. Il y en a sept à collectionner."
    it: "Petalo di fiore pressato ottenuto da Chrys durante la\nprova di Rika. L’obiettivo è ricevere sette petali diversi."
    de: "Ein gepresstes Blütenblatt, das man im Rahmen von\nMatsurikas Prüfung von Chrys erhält. Ziel ist es,\nsieben verschiedene Blütenblätter zu sammeln."
    es: "Pétalo prensado recibido de manos de Chris durante la\nprueba de Rika. El objetivo es reunir siete distintos."
    ko: "말리화의 시련에서 마마네에게\n받을 수 있는 꽃잎의 압화.\n7종류 모으는 것이 목적."
    zh_simp: "在茉莉的考验中，\n能从马玛内那里得到的干花花瓣。\n目标是集齐７种。"
    zh_trad: "在茉莉的考驗中，\n從馬瑪內那裡得到的壓花花瓣。\n目標是集滿７種花瓣。"
yellow_scarf:
  names:
    jp_kana: きいろのバンダナ
    jp_kanji: きいろのバンダナ
    en: Yellow Scarf
    fr: Foulard Jaune
    it: Fascia gialla
    de: Gelber Schal
    es: Pañuelo Amarillo
    ko: 노랑밴드
    zh_simp: 黄色头巾
    zh_trad: 黃色頭巾
  descriptions:
    jp_kana: "持たせて　コンテストに　参加すると\nそのポケモンは　いつもより\nたくましく　みられる。"
    jp_kanji: "持たせて　コンテストに　参加すると\nそのポケモンは　いつもより\nたくましく　みられる。"
    en: "When a Pokémon holds this during a contest, it looks\neven tougher than usual."
    fr: "Objet à tenir. Augmente la Robustesse d’un Pokémon\ndans les concours."
    it: "Strumento da dare a un Pokémon.\nAumenta la Grinta di chi l’indossa in una gara."
    de: "Ein Item zum Tragen. Trainer erhöhen damit in\nWettbewerben die Stärke ihres Pokémon."
    es: "Aumenta la dureza en los concursos. Debe llevarlo un\nPokémon."
    ko: "지니게 하여 콘테스트에 참가하면\n그 포켓몬은 여느 때보다\n강인하게 보인다."
    zh_simp: "携带它去参加华丽大赛的\n宝可梦会比平时\n看上去更加强壮。"
    zh_trad: "攜帶它去參加華麗大賽的\n寶可夢會比平時\n看起來更加強壯。"
yellow_shard:
  names:
    jp_kana: きいろいかけら
    jp_kanji: きいろいかけら
    en: Yellow Shard
    fr: Tesson Jaune
    it: Coccio giallo
    de: Gelbstück
    es: Parte Amarilla
    ko: 노랑조각
    zh_simp: 黄色碎片
    zh_trad: 黃色碎片
  descriptions:
    jp_kana: "黄色い　小さなかけら。\n昔に　作られた　なにかの\n道具の一部　らしい。"
    jp_kanji: "黄色い　小さなかけら。\n昔に　作られた　なにかの\n道具の一部　らしい。"
    en: "A small yellow shard. It appears to be a fragment of\nsome sort of implement made long ago."
    fr: "Un petit tesson jaune.\nIl semble provenir d’un objet très ancien."
    it: "Un piccolo coccio giallo che con ogni probabilità\nè un frammento di un antico strumento."
    de: "Eine gelbe Scherbe eines antiken Werkzeugs, das vor\nlanger Zeit angefertigt wurde."
    es: "Un pequeño fragmento amarillo. Parece formar parte de\nalgún tipo de herramienta antigua."
    ko: "노란 작은 조각.\n옛날에 만들어진 어떤\n도구의 일부인 듯하다."
    zh_simp: "黄色的小碎片。\n好像是以前制作的\n某道具的一部分。"
    zh_trad: "黃色的小碎片。\n好像是以前製作的\n某道具的一部分。"
yellow_tablecloth:
  names:
    jp_kana: イエロークロス
    jp_kanji: イエロークロス
    en: Yellow Tablecloth
    fr: Nappe Jaune
    it: Tovaglia gialla
    de: Gelbes Tischtuch
    es: Mantel Amarillo
    ko: 옐로 테이블보
    zh_simp: 黄色桌巾
    zh_trad: 黃色桌巾
  descriptions:
    jp_kana: "落ち着いた　イエローカラーの　テーブルクロス。\n肌に優しい　サラリとした　さわり心地で\n食器を　置いても　音を　立てない。"
    jp_kanji: "落ち着いた　イエローカラーの　テーブルクロス。\n肌に優しい　サラリとした　さわり心地で\n食器を　置いても　音を　立てない。"
    en: "A simple yellow tablecloth. It’s smooth and pleasant to\nthe touch, and dishes can be placed on it with hardly\na sound."
    fr: "Une nappe d’une douce couleur jaune. Sa texture\nsatinée est agréable au toucher et étouffe le bruit\ndes plats lorsqu’on les pose dessus."
    it: "Tovaglia di un sobrio color giallo. È così liscia e\nmorbida al tatto che quando ci poggi le stoviglie\nnon fanno rumore."
    de: "Dieses schlichte gelbe Tischtuch aus hautfreundlichem,\nglattem Material absorbiert jegliches Geräusch von\nGeschirr, das darauf platziert wird."
    es: "Un mantel de un suave color amarillo. Está hecho de un\nmaterial tan sedoso y delicado que hasta absorbe el\nsonido que producen los platos al colocarlos sobre él."
    ko: "차분한 옐로 컬러의 테이블보.\n피부에 자극이 적은 매끈한 재질이며\n식기를 올려놓아도 소리가 나지 않는다."
    zh_simp: "稳重的黄色桌巾。\n丝柔顺滑亲近肌肤，\n放上餐具也不会发出声音。"
    zh_trad: "以沉穩的黃色為質地的桌巾。\n觸感輕柔，如同撫過肌膚一般，\n而且放置餐具時也不會發出聲響。"
yogurt:
  names:
    jp_kana: ヨーグルト
    jp_kanji: ヨーグルト
    en: Yogurt
    fr: Yaourt
    it: Yogurt
    de: Joghurt
    es: Yogur
    ko: 요구르트
    zh_simp: 酸奶
    zh_trad: 優格
  descriptions:
    jp_kana: "甘味と　酸味が　強い　調味料。\n特に　フルーツ類と　相性が　よく\nサンドウィッチにも　使いやすいのだ。"
    jp_kanji: "甘味と　酸味が　強い　調味料。\n特に　フルーツ類と　相性が　よく\nサンドウィッチにも　使いやすいのだ。"
    en: "A condiment that’s very sweet and very sour. It goes\nespecially well with fruit and is easy to incorporate into\na sandwich."
    fr: "Un condiment au goût très sucré et acide. Facile à\nincorporer dans un Sandwich, il accompagne\nparticulièrement bien les fruits."
    it: "Un condimento molto dolce e aspro. Si abbina\nparticolarmente bene alla frutta e si può usare\ncon facilità anche nei panini."
    de: "Dieses Würzmittel vereint sehr süße wie saure\nGeschmacksnoten. Es harmoniert perfekt mit Obst\nund lässt sich auch gut auf Sandwiches streichen."
    es: "Este ingrediente de sabor agridulce combina a la\nperfección con todo tipo de frutas y es muy fácil\nde incorporar en los bocadillos."
    ko: "단맛과 신맛이 강한 조미료.\n특히 과일 종류와 궁합이 잘 맞는다.\n샌드위치에도 사용하기 좋다."
    zh_simp: "甜味和酸味强烈的调味料。\n与水果类的食物特别搭配，\n也很容易用在三明治上。"
    zh_trad: "甜味和酸味強勁的調味料。\n和水果類特別搭配。\n作為三明治的食材也很好使用。"
yungoos_fur:
  names:
    jp_kana: ヤングースのけ
    jp_kanji: ヤングースのけ
    en: Yungoos Fur
    fr: Poils de Manglouton
    it: Pelo di Yungoos
    de: Mangunior-Haar
    es: Pelo de Yungoos
    ko: 영구스의털
    zh_simp: 猫鼬少的毛
    zh_trad: 貓鼬少的毛
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
z_power_ring:
  names:
    jp_kana: Ｚパワーリング
    jp_kanji: Ｚパワーリング
    en: Z-Power Ring
    fr: Super Bracelet Z
    it: Supercerchio Z
    de: Z-Kraftring
    es: Superpulsera Z
    ko: Z파워링
    zh_simp: Ｚ强力手环
    zh_trad: Ｚ強力手環
  descriptions:
    jp_kana: "トレーナーの　気力　体力を\n使って　ポケモンが　Ｚパワーを\n放てるようにする　不思議な腕輪。"
    jp_kanji: "トレーナーの　気力　体力を\n使って　ポケモンが　Ｚパワーを\n放てるようにする　不思議な腕輪。"
    en: "A mysterious ring that enables Pokémon to use\nZ-Power. It requires both the willpower and the\nphysical power of the Trainer wearing it."
    fr: "Un bracelet mystérieux utilisant la force vitale\ndu Dresseur pour permettre à ses Pokémon\nd’utiliser la Force Z."
    it: "Bracciale misterioso che trasmette le energie mentali\ne fisiche dell’Allenatore ai suoi Pokémon, permettendo\nloro di sfruttare il Potere Z."
    de: "Ein wundersames Armband, das die geistige und\nkörperliche Kraft eines Trainers nutzt, um bei einem\nPokémon die Z-Kraft freizusetzen."
    es: "Misteriosa pulsera que transmite la fuerza física y\nmental del Entrenador a sus Pokémon, lo que les\npermite usar movimientos Z."
    ko: "트레이너의 기력과 체력을\n사용해서 포켓몬이 Z파워를\n발산할 수 있게 하는 신비한 팔찌."
    zh_simp: "通过使用训练家的\n气力和体力来让宝可梦\n释放出Ｚ力量的神奇手环。"
    zh_trad: "用訓練家的精力和體力\n來讓寶可夢釋放出\nＺ力量的神奇手環。"
z_ring:
  names:
    jp_kana: Ｚリング
    jp_kanji: Ｚリング
    en: Z-Ring
    fr: Bracelet Z
    it: Cerchio Z
    de: Z-Ring
    es: Pulsera Z
    ko: Z링
    zh_simp: Ｚ手环
    zh_trad: Ｚ手環
  descriptions:
    jp_kana: "トレーナーの　気力　体力を\n使って　ポケモンが　Ｚパワーを\n放てるようにする　不思議な腕輪。"
    jp_kanji: "トレーナーの　気力　体力を\n使って　ポケモンが　Ｚパワーを\n放てるようにする　不思議な腕輪。"
    en: "A mysterious ring that enables Pokémon to use\nZ-Power. It requires both the willpower and\nthe physical power of the Trainer wearing it."
    fr: "Un bracelet mystérieux utilisant la force vitale\ndu Dresseur pour permettre à ses Pokémon\nd’utiliser la Force Z."
    it: "Bracciale misterioso che trasmette le energie mentali\ne fisiche dell’Allenatore ai suoi Pokémon, permettendo\nloro di sfruttare il Potere Z."
    de: "Ein wundersames Armband, das die geistige und\nkörperliche Kraft eines Trainers nutzt, um bei einem\nPokémon die Z-Kraft freizusetzen."
    es: "Misteriosa pulsera que transmite la fuerza física y\nmental del Entrenador a sus Pokémon, lo que les\npermite usar movimientos Z."
    ko: "트레이너의 기력과 체력을\n사용해서 포켓몬이 Z파워를\n발산할 수 있게 하는 신비한 팔찌."
    zh_simp: "通过使用训练家的\n气力和体力来让宝可梦\n释放出Ｚ力量的神奇手环。"
    zh_trad: "用訓練家的精力和體力\n來讓寶可夢釋放出\nＺ力量的神奇手環。"
zangoose_claw:
  names:
    jp_kana: ザングースのツメ
    jp_kanji: ザングースのツメ
    en: Zangoose Claw
    fr: Griffe de Mangriff
    it: Artiglio di Zangoose
    de: Sengo-Kralle
    es: Garra de Zangoose
    ko: 쟝고의발톱
    zh_simp: 猫鼬斩的爪子
    zh_trad: 貓鼬斬的爪子
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
zap_plate:
  names:
    jp_kana: いかずちプレート
    jp_kanji: いかずちプレート
    en: Zap Plate
    fr: Plaque Volt
    it: Lastrasaetta
    de: Blitztafel
    es: Tabla Trueno
    ko: 우레플레이트
    zh_simp: 雷电石板
    zh_trad: 雷電石板
  descriptions:
    jp_kana: "でんきのタイプの　石盤。\n持たせると　でんきタイプの\n技の威力が　強まる。"
    jp_kanji: "でんきのタイプの　石盤。\n持たせると　でんきタイプの\n技の威力が　強まる。"
    en: "An item to be held by a Pokémon. This stone tablet is\nimbued with the essence of electricity and boosts the\npower of the holder’s Electric-type moves."
    fr: "Objet à tenir. Une tablette en pierre augmentant\nla puissance des capacités de type Électrik."
    it: "Strumento da dare a un Pokémon. Lastra di pietra che\npotenzia le mosse di tipo Elettro."
    de: "Ein Item zum Tragen. Diese Steintafel verstärkt\nAttacken vom Typ Elektro."
    es: "Tabla de piedra que potencia los movimientos de tipo\nEléctrico. Debe llevarla un Pokémon."
    ko: "전기타입의 석판.\n지니게 하면 전기타입\n기술의 위력이 강해진다."
    zh_simp: "电属性的石板。\n携带后，电属性的\n招式威力就会增强。"
    zh_trad: "電屬性的石板。\n攜帶後，電屬性的\n招式威力就會增強。"
zapdos_candy:
  names:
    jp_kana: サンダーのアメ
    jp_kanji: サンダーのアメ
    en: Zapdos Candy
    fr: Bonbon Électhor
    it: Caramella Zapdos
    de: Zapdos-Bonbon
    es: Caramelo Zapdos
    ko: 썬더의사탕
    zh_simp: 闪电鸟的糖果
    zh_trad: 閃電鳥的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de cierto Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
zapdos_treat:
  names:
    jp_kana: サンダーのおやつ
    jp_kanji: サンダーのおやつ
    en: Zapdos Treat
    fr: Friandise Électhor
    it: Spuntino per Zapdos
    de: Zapdos-Snack
    es: Galleta Zapdos
    ko: 썬더의간식
    zh_simp: 闪电鸟的点心
    zh_trad: 閃電鳥的點心
  descriptions:
    jp_kana: "伝説のポケモン　サンダーが\n好む食材で　作られた　おやつ。"
    jp_kanji: "伝説のポケモン　サンダーが\n好む食材で　作られた　おやつ。"
    en: "A snack made from ingredients favored by the\nLegendary Pokémon Zapdos."
    fr: "Une friandise préparée avec les ingrédients favoris\ndu Pokémon légendaire Électhor."
    it: "Uno spuntino fatto con gli ingredienti preferiti\ndal Pokémon leggendario Zapdos."
    de: "Dieser Snack wurde mit den Lieblingszutaten des\nLegendären Pokémon Zapdos zubereitet."
    es: "Galleta preparada con los ingredientes favoritos\ndel Pokémon legendario Zapdos."
    ko: "전설의 포켓몬 썬더가\n좋아하는 식재료로 만들어진 간식."
    zh_simp: "用传说的宝可梦闪电鸟\n喜欢的食材制作的点心。"
    zh_trad: "用傳說的寶可夢閃電鳥\n喜愛的食材製成的點心。"
zekrom_treat:
  names:
    jp_kana: ゼクロムのおやつ
    jp_kanji: ゼクロムのおやつ
    en: Zekrom Treat
    fr: Friandise Zekrom
    it: Spuntino per Zekrom
    de: Zekrom-Snack
    es: Galleta Zekrom
    ko: 제크로무의간식
    zh_simp: 捷克罗姆的点心
    zh_trad: 捷克羅姆的點心
  descriptions:
    jp_kana: "伝説のポケモン　ゼクロムが\n好む食材で　作られた　おやつ。"
    jp_kanji: "伝説のポケモン　ゼクロムが\n好む食材で　作られた　おやつ。"
    en: "A snack made from ingredients favored by the\nLegendary Pokémon Zekrom."
    fr: "Une friandise préparée avec les ingrédients favoris\ndu Pokémon légendaire Zekrom."
    it: "Uno spuntino fatto con gli ingredienti preferiti\ndal Pokémon leggendario Zekrom."
    de: "Dieser Snack wurde mit den Lieblingszutaten des\nLegendären Pokémon Zekrom zubereitet."
    es: "Galleta preparada con los ingredientes favoritos\ndel Pokémon legendario Zekrom."
    ko: "전설의 포켓몬 제크로무가\n좋아하는 식재료로 만들어진 간식."
    zh_simp: "用传说的宝可梦捷克罗姆\n喜欢的食材制作的点心。"
    zh_trad: "用傳說的寶可夢捷克羅姆\n喜愛的食材製成的點心。"
zinc:
  names:
    jp_kana: キトサン
    jp_kanji: キトサン
    en: Zinc
    fr: Zinc
    it: Zinco
    de: Zink
    es: Zinc
    ko: 키토산
    zh_simp: 特防增强剂
    zh_trad: 特防增強劑
  descriptions:
    jp_kana: "ポケモンの　栄養ドリンク。\nポケモン　１匹の　特防の\n基礎ポイントを　あげる。"
    jp_kanji: "ポケモンの　栄養ドリンク。\nポケモン　１匹の　特防の\n基礎ポイントを　あげる。"
    en: "A nutritious drink for Pokémon. This drink increases\nbase points for a Pokémon’s Sp. Def stat."
    fr: "Une boisson très nutritive qui augmente\nla Défense Spéciale de base d’un Pokémon."
    it: "Bevanda nutriente per Pokémon. Aumenta i punti base\ndella Difesa Speciale."
    de: "Ein gehaltvolles Getränk, das die Spezial-Verteidigungs-\nBasispunkte eines Pokémon dauerhaft erhöht."
    es: "Nutritiva bebida que aumenta la Defensa Especial de\nbase de un Pokémon."
    ko: "포켓몬의 영양 드링크.\n포켓몬 1마리의 특수방어\n기초 포인트를 올린다."
    zh_simp: "宝可梦的营养饮料。\n能提高１只宝可梦的\n特防的基础点数。"
    zh_trad: "寶可夢的營養飲料。\n能提高１隻寶可夢的\n特防的基礎點數。"
zoom_lens:
  names:
    jp_kana: フォーカスレンズ
    jp_kanji: フォーカスレンズ
    en: Zoom Lens
    fr: Lentille Zoom
    it: Zoomlente
    de: Zoomlinse
    es: Telescopio
    ko: 포커스렌즈
    zh_simp: 对焦镜
    zh_trad: 對焦鏡
  descriptions:
    jp_kana: "持たせたポケモンが　相手よりも\n行動するのが　遅いとき\n技が　命中しやすくなる。"
    jp_kanji: "持たせたポケモンが　相手よりも\n行動するのが　遅いとき\n技が　命中しやすくなる。"
    en: "An item to be held by a Pokémon. When the holder acts\nafter its target, its move will be more accurate than usual."
    fr: "Objet à tenir. Augmente la précision des capacités du\nporteur s’il attaque après l’ennemi."
    it: "Strumento da dare a un Pokémon. Se chi ce l’ha attacca\ndopo l’avversario, la sua precisione aumenta."
    de: "Ein Item zum Tragen. Agiert das Ziel zuerst, erhöht sich\ndie Genauigkeit des Trägers."
    es: "Si el Pokémon que lo lleva se mueve después que el\nrival, aumenta la precisión del movimiento que use."
    ko: "지니게 한 포켓몬이 상대보다도\n행동하는 것이 늦을 때\n기술이 명중하기 쉬워진다."
    zh_simp: "当携带它的宝可梦比\n对手行动迟缓时，\n招式会变得容易命中。"
    zh_trad: "當攜帶它的寶可夢比\n對手行動緩慢時，\n招式會變得容易命中。"
zorua_fur:
  names:
    jp_kana: ゾロアのけ
    jp_kanji: ゾロアのけ
    en: Zorua Fur
    fr: Poils de Zorua
    it: Pelo di Zorua
    de: Zorua-Haar
    es: Pelo de Zorua
    ko: 조로아의털
    zh_simp: 索罗亚的毛
    zh_trad: 索羅亞的毛
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
zubat_candy:
  names:
    jp_kana: ズバットのアメ
    jp_kanji: ズバットのアメ
    en: Zubat Candy
    fr: Bonbon Nosferapti
    it: Caramella Zubat
    de: Zubat-Bonbon
    es: Caramelo Zubat
    ko: 주뱃의사탕
    zh_simp: 超音蝠的糖果
    zh_trad: 超音蝠的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
zygarde_cube:
  names:
    jp_kana: ジガルデキューブ
    jp_kanji: ジガルデキューブ
    en: Zygarde Cube
    fr: Boîte Zygarde
    it: Teca Zygarde
    de: Zygarde-Würfel
    es: Arca de Zygarde
    ko: 지가르데큐브
    zh_simp: 基格尔德多面体
    zh_trad: 基格爾德多面體
  descriptions:
    jp_kana: "ポケモン　ジガルデの　コアと　セルが\n集まった道具。　ジガルデの\n姿を　変えることが　できる。"
    jp_kanji: "ポケモン　ジガルデの　コアと　セルが\n集まった道具。　ジガルデの\n姿を　変えることが　できる。"
    en: "An item in which Zygarde Cores and Cells are gathered.\nYou can also use it to change Zygarde’s forms."
    fr: "Un artefact dans lequel les Cellules et Cœurs\nde Zygarde ont été rassemblés. Il permet\nà Zygarde de changer de forme."
    it: "Strumento che contiene i nuclei e le cellule di Zygarde.\nGrazie ad esso è possibile far cambiare forma\nal Pokémon."
    de: "Ein Gegenstand, der die Kerne und Zellen des Pokémon\nZygarde enthält. Mit ihm kann Zygarde seine Form\nändern."
    es: "Dispositivo en el que se hallan almacenados núcleos\ny células de Zygarde. También le permite cambiar de\nforma."
    ko: "포켓몬 지가르데의 코어와 셀이\n모여 있는 도구. 지가르데의\n모습을 바꿀 수도 있다."
    zh_simp: "聚集了宝可梦基格尔德的\n核心和细胞的道具。\n可以改变基格尔德的样子。"
    zh_trad: "聚集了寶可夢基格爾德的\n核心和細胞的道具。\n可以改變基格爾德的樣子。"
