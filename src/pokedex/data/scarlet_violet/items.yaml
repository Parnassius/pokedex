charizardite_x:
  names:
    jp_kana: リザードナイトＸ
    jp_kanji: リザードナイトＸ
    en: Charizardite X
    fr: Dracaufite X
    it: Charizardite X
    de: Gluraknit X
    es: Charizardita X
    ko: 리자몽나이트X
    zh_simp: 喷火龙进化石Ｘ
    zh_trad: 噴火龍進化石Ｘ
  descriptions:
    jp_kana: "リザードンに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    jp_kanji: "リザードンに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Charizard hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Dracaufeu, elle lui permet de\nméga-évoluer durant un combat."
    it: "Una delle misteriose Megapietre. Data a Charizard,\ngli permette di megaevolversi durante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Glurak getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Charizard en combate."
    ko: "리자몽에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让喷火龙携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓噴火龍攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
