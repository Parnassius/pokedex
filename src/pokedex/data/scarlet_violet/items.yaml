ability_capsule:
  names:
    jp_kana: とくせいカプセル
    jp_kanji: とくせいカプセル
    en: Ability Capsule
    fr: Pilule Talent
    it: Capsula abilità
    de: Fähigkeiten-Kapsel
    es: Cápsula Habilidad
    ko: 특성캡슐
    zh_simp: 特性胶囊
    zh_trad: 特性膠囊
  descriptions:
    jp_kana: "２種類の特性を　持つ\nポケモンに　使うと　今とは違う\n特性に　変えられる　カプセル。"
    jp_kanji: "２種類の特性を　持つ\nポケモンに　使うと　今とは違う\n特性に　変えられる　カプセル。"
    en: "A capsule that allows a Pokémon to switch its current\nAbility to the other Ability its species can have."
    fr: "Une pilule permettant à un Pokémon pouvant\navoir deux talents de passer de l’un à l’autre."
    it: "Se usata su un Pokémon che può avere due abilità,\nquesta capsula permette di cambiare quella attiva."
    de: "Bei Anwendung auf ein Pokémon, das zwei\nverschiedene Fähigkeiten haben kann, wird seine\naktuelle Fähigkeit mit der anderen ausgewechselt."
    es: "Cápsula que les permite cambiar de habilidad a los\nPokémon que poseen dos."
    ko: "2종류의 특성을 가진\n포켓몬에게 사용하면 지금과는 다른\n특성으로 바꿀 수 있는 캡슐."
    zh_simp: "如果用于有着２种特性的宝可梦，\n就能令其现有特性变为另一种的胶囊。"
    zh_trad: "如果用於有著２種特性的\n寶可夢，就能使其特性\n變為另外一種的膠囊。"
ability_patch:
  names:
    jp_kana: とくせいパッチ
    jp_kanji: とくせいパッチ
    en: Ability Patch
    fr: Patch Talent
    it: Cerotto abilità
    de: Fähigkeiten-Pflaster
    es: Parche Habilidad
    ko: 특성패치
    zh_simp: 特性膏药
    zh_trad: 特性膏藥
  descriptions:
    jp_kana: "通常の特性を　持つ\nポケモンに　使うと　めずらしい\n特性に　変えられる　パッチ。"
    jp_kanji: "通常の特性を　持つ\nポケモンに　使うと　めずらしい\n特性に　変えられる　パッチ。"
    en: "A patch that can be used to change the regular Ability\nof a Pokémon to a rarer Ability."
    fr: "Un objet qui permet de remplacer le talent ordinaire\nd’un Pokémon par un talent rare."
    it: "Cerotto che permette a un Pokémon dotato\ndi un’abilità comune di cambiarla in una più rara."
    de: "Ein Pflaster, das es ermöglicht, die reguläre Fähigkeit\neines Pokémon zu einer seltenen Fähigkeit zu ändern."
    es: "Parche que permite cambiar la habilidad normal de un\nPokémon a otra menos común."
    ko: "일반적인 특성을 가진 포켓몬에게 사용하면\n희귀한 특성으로 바꿀 수 있는 패치."
    zh_simp: "可以改变宝可梦特性的膏药。\n给拥有常见特性的宝可梦使用后，\n其特性会转变为稀有特性。"
    zh_trad: "使用於擁有常見特性的寶可夢，\n就能把寶可夢的特性改變成\n稀有特性的膏藥。"
ability_shield:
  names:
    jp_kana: とくせいガード
    jp_kanji: とくせいガード
    en: Ability Shield
    fr: Garde-Talent
    it: Scudo abilità
    de: Fähigkeitenschild
    es: Escudo Habilidad
    ko: 특성가드
    zh_simp: 特性护具
    zh_trad: 特性護具
  descriptions:
    jp_kana: "かわいらしく　個性的な　盾。\n持たせると　相手に\n特性を　変えられない。"
    jp_kanji: "かわいらしく　個性的な　盾。\n持たせると　相手に\n特性を　変えられない。"
    en: "An item to be held by a Pokémon. This cute and rather\nunique-looking shield protects the holder from having its\nAbility changed by others."
    fr: "Objet à tenir. Un bouclier à l’aspect unique et mignon.\nIl empêche l’adversaire de changer le talent du porteur."
    it: "Strumento da dare a un Pokémon. Adorabile e peculiare\nscudo che impedisce agli altri Pokémon di modificare\nl’abilità di chi lo ha con sé."
    de: "Ein niedlicher Schild mit eigenwilligem Design. Gibt man\nihn einem Pokémon zum Tragen, kann dessen Fähigkeit\nnicht von anderen Pokémon geändert werden."
    es: "Un escudo muy bonito de aspecto singular. Impide que\notros Pokémon cambien la habilidad del Pokémon que\nlo lleva."
    ko: "귀엽고 개성적인 방패.\n지니게 하면 상대에 의해\n특성이 바뀌지 않는다."
    zh_simp: "可爱而有个性的盾。\n携带后，特性不会\n被对手改变。"
    zh_trad: "既可愛又有個性的盾。\n攜帶後，不會被對手變更特性。"
ability_urge:
  names:
    jp_kana: スキルコール
    jp_kanji: スキルコール
    en: Ability Urge
    fr: Appel Talent
    it: Chiamabilità
    de: Fähigkeiten-Appell
    es: Habilitador
    ko: 스킬콜
    zh_simp: ？？？
    zh_trad: ？？？
  descriptions:
    jp_kana: "使うと　味方のポケモンの\n特性を　発動させる。"
    jp_kanji: "使うと　味方のポケモンの\n特性を　発動させる。"
    en: "When used, it activates the Ability of an\nally Pokémon."
    fr: Déclenche le talent d’un Pokémon de l’équipe.
    it: Se usato su un Pokémon della squadra, ne attiva l’abilità.
    de: Aktiviert bei Gebrauch die Fähigkeit des Mitstreiters.
    es: "Al usarlo, activa la habilidad de un Pokémon de tu\nequipo."
    ko: "사용하면 같은 편 포켓몬의\n특성을 발동시킨다."
    zh_simp: "使用后，能令我方\n宝可梦的特性启动。"
    zh_trad: "使用後，能使我方\n寶可夢的特性發動。"
abomasite:
  names:
    jp_kana: ユキノオナイト
    jp_kanji: ユキノオナイト
    en: Abomasite
    fr: Blizzarite
    it: Abomasnowite
    de: Rexblisarnit
    es: Abomasnowita
    ko: 눈설왕나이트
    zh_simp: 暴雪王进化石
    zh_trad: 暴雪王進化石
  descriptions:
    jp_kana: "ユキノオーに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    jp_kanji: "ユキノオーに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Abomasnow hold it, and this stone will enable\nit to Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Blizzaroi, elle lui permet de\nméga-évoluer durant un combat."
    it: "Una delle misteriose Megapietre. Data ad Abomasnow,\ngli permette di megaevolversi durante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Rexblisar getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Abomasnow en combate."
    ko: "눈설왕에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让暴雪王携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓暴雪王攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
abra_candy:
  names:
    jp_kana: ケーシィのアメ
    jp_kanji: ケーシィのアメ
    en: Abra Candy
    fr: Bonbon Abra
    it: Caramella Abra
    de: Abra-Bonbon
    es: Caramelo Abra
    ko: 캐이시의사탕
    zh_simp: 凯西的糖果
    zh_trad: 凱西的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
absolite:
  names:
    jp_kana: アブソルナイト
    jp_kanji: アブソルナイト
    en: Absolite
    fr: Absolite
    it: Absolite
    de: Absolnit
    es: Absolita
    ko: 앱솔나이트
    zh_simp: 阿勃梭鲁进化石
    zh_trad: 阿勃梭魯進化石
  descriptions:
    jp_kana: "アブソルに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    jp_kanji: "アブソルに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Absol hold it, and this stone will enable it to\nMega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Absol, elle lui permet de\nméga-évoluer durant un combat."
    it: "Una delle misteriose Megapietre. Data ad Absol,\ngli permette di megaevolversi durante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Absol getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Absol en combate."
    ko: "앱솔에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让阿勃梭鲁携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓阿勃梭魯攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
absorb_bulb:
  names:
    jp_kana: きゅうこん
    jp_kanji: きゅうこん
    en: Absorb Bulb
    fr: Bulbe
    it: Bulbo
    de: Knolle
    es: Tubérculo
    ko: 구근
    zh_simp: 球根
    zh_trad: 球根
  descriptions:
    jp_kana: "使い捨ての　きゅうこん。\n持たせて　みずの技の　ダメージを\n受けると　特攻が　あがる。"
    jp_kanji: "使い捨ての　きゅうこん。\n持たせて　みずの技の　ダメージを\n受けると　特攻が　あがる。"
    en: "An item to be held by a Pokémon. This single-use bulb\nboosts the Sp. Atk stat if the holder is damaged by a\nWater-type attack."
    fr: "Objet à tenir. Un bulbe jetable qui augmente\nl’Attaque Spéciale du porteur lorsqu’il subit\ndes dégâts à cause d’une capacité de type Eau."
    it: "Bulbo monouso. Se il Pokémon che ha questo strumento\nsubisce danni da una mossa di tipo Acqua, il suo Attacco\nSpeciale aumenta."
    de: "Nimmt der Träger dieser Knolle durch eine\nWasser-Attacke Schaden, steigt sein Spezial-Angriff\nund das Item verschwindet."
    es: "Tubérculo que aumenta el Ataque Especial del portador\nsi lo alcanza un ataque de tipo Agua. Es de un solo uso."
    ko: "단 한 번 쓰면 없어지는 구근.\n지니게 하고 물 기술에 데미지를 받으면\n특수공격이 올라간다."
    zh_simp: "一次性使用的球根。\n携带它的宝可梦如果受到水属性\n招式的伤害，特攻就会提高。"
    zh_trad: "只能使用一次的球根。\n攜帶它的寶可夢如果受到水屬性\n招式的傷害，特攻就會提高。"
academy_ball:scarlet:
  names:
    jp_kana: スクールボール
    jp_kanji: スクールボール
    en: Academy Ball
    fr: Ballon de l’Académie
    it: Palla accademia
    de: Akademie-Ball
    es: Pelota Academia
    ko: 스쿨볼
    zh_simp: 校园球
    zh_trad: 校園球
  descriptions:
    jp_kana: "アカデミー指定の　ボール。　普通サイズ。\nエンブレムの位置を　ぴったり　蹴ると\nまっすぐ飛ぶと　信じている　生徒も多い。"
    jp_kanji: "アカデミー指定の　ボール。　普通サイズ。\nエンブレムの位置を　ぴったり　蹴ると\nまっすぐ飛ぶと　信じている　生徒も多い。"
    en: "The academy’s standard-issue ball in a regulation size.\nLots of students believe that if you kick it right on the\nacademy emblem, it’ll fly in a straight line."
    fr: "Un ballon distribué par l’académie, de taille moyenne.\nBeaucoup d’élèves pensent qu’il faut le taper juste sur\nle blason de l’académie pour le faire voler droit."
    it: "Palla con il design regolamentare dell’accademia.\nÈ di misura media. Molti studenti credono che se la calci\nesattamente sull’emblema volerà dritta."
    de: "Der offizielle Akademie-Ball in der Standardgröße. Viele\nSchüler glauben, er fliege in gerader Linie, wenn man\ngegen das darauf abgebildete Akademie-Wappen tritt."
    es: "La pelota oficial de la academia, de tamaño medio.\nMuchos estudiantes creen que, para que vaya en línea\nrecta, hay que patearla justo en el centro del escudo."
    ko: "보통 사이즈의 아카데미 지정 볼.\n엠블럼 위치를 정확하게 차면\n똑바로 날아간다고 믿는 학생이 많다."
    zh_simp: "学院指定的球。普通尺寸。\n有很多学生相信只要完美踢中\n勋章的部分，就能让球笔直飞出。"
    zh_trad: "學院指定的球。一般尺寸。\n許多學生相信，若精準踢中校徽的位置，\n球將會筆直地飛出去。"
