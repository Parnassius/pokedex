pack_of_potatoes:
  names:
    jp_kana: ポテトパック
    jp_kanji: ポテトパック
    en: Pack of Potatoes
    fr: Pommes de Terre
    it: Patate
    de: Kartoffeln
    es: Patatas
    ko: 포테이토팩
    zh_simp: 袋装土豆
    zh_trad: 袋裝洋芋
  descriptions:
    jp_kana: "キャンプの　料理に　使う\n食材の　一種。ポテトが\n辛さを　打ち消し　マイルドにする。"
    jp_kanji: "キャンプの　料理に　使う\n食材の　一種。ポテトが\n辛さを　打ち消し　マイルドにする。"
    en: "One of the many ingredients that can be used for\ncooking at your camp. Potatoes help mellow out a spicy\ntaste, to make a dish more mild."
    fr: "Un ingrédient de cuisine pour le camping.\nCes féculents permettent d’atténuer le piquant\ndu curry pour le rendre plus doux."
    it: "Uno degli ingredienti che puoi usare per cucinare\nin campeggio. Smorzano i gusti piccanti donando\nal piatto un sapore più delicato."
    de: "Eine Zutat für PokéCamping-Mahlzeiten. Kartoffeln\nnehmen würzigen Speisen etwas von ihrer Schärfe und\nmachen sie milder."
    es: "Un ingrediente para cocinar en el campamento. Las\npatatas contrarrestan el picante y suavizan el plato."
    ko: "캠프 요리에 사용되는\n식재료 중 하나. 감자가 매운맛을\n잡아 순한 맛으로 만들어 준다."
    zh_simp: "在露营营地制作料理时会使用的\n一种食材。土豆能中和辣味，\n使整道料理的滋味变得柔和。"
    zh_trad: "製作露營料理時使用的食材之一。\n洋芋能夠中和辣味，\n使料理的味道變得溫和。"
packaged_curry:
  names:
    jp_kana: レトルトカレー
    jp_kanji: レトルトカレー
    en: Packaged Curry
    fr: Curry Instantané
    it: Curry precotto
    de: Fertigcurry
    es: Curri de Bote
    ko: 레토르트카레
    zh_simp: 即食咖喱
    zh_trad: 即食咖哩
  descriptions:
    jp_kana: "キャンプの　料理に　使う\n食材の　一種。完成　された\nレトルトカレーを　使って　ミスを防ぐ。"
    jp_kanji: "キャンプの　料理に　使う\n食材の　一種。完成　された\nレトルトカレーを　使って　ミスを防ぐ。"
    en: "One of the many ingredients that can be used for\ncooking at your camp. Using packaged curry helps\nmake sure there are no slipups when cooking."
    fr: "Un ingrédient de cuisine pour le camping.\nÀ ajouter au curry pour corriger les erreurs\nde préparation."
    it: "Uno degli ingredienti che puoi usare per cucinare\nin campeggio. Questo prodotto precotto permette\ndi andare a colpo sicuro ed evitare brutte sorprese."
    de: "Eine Zutat für PokéCamping-Mahlzeiten. Da bei einem\nFertigcurry der Name Programm ist, kann beim Kochen\nnichts schiefgehen."
    es: "Un ingrediente para cocinar en el campamento.\nEste curri precocinado nunca falla."
    ko: "캠프 요리에 사용되는\n식재료 중 하나. 완성된 레토르트카레를\n사용해서 실패를 막는다."
    zh_simp: "在露营营地制作料理时会使用的\n一种食材。使用这种成品速食咖喱，\n可以有效预防失误。"
    zh_trad: "製作露營料理時使用的食材之一。\n使用現成的即食咖哩，\n可以避免失敗。"
pair_of_tickets:
  names:
    jp_kana: ペアチケット
    jp_kanji: ペアチケット
    en: Pair of Tickets
    fr: Ticket Duo
    it: Biglietto doppio
    de: Zweierticket
    es: Entrada para Dos
    ko: 페어티켓
    zh_simp: 双人票
    zh_trad: 雙人票
  descriptions:
    jp_kana: "トクサネ宇宙センターで　開かれている\n天体ショーの　２人組チケット。"
    jp_kanji: "トクサネ宇宙センターで　開かれている\n天体ショーの　２人組チケット。"
    en: "Tickets for two to the astronomical show being\nheld at the Mossdeep Space Center."
    fr: "Un ticket pour deux personnes pour le spectacle\nd’astronomie se déroulant au Centre Spatial d’Algatia."
    it: "Biglietto per due persone per lo spettacolo\nastronomico del Centro Spaziale di Verdeazzupoli."
    de: "Eine Eintrittskarte, mit der zwei Personen Zutritt zur\nAstronomie-Show des Raumfahrtzentrums von\nMoosbach City erhalten."
    es: "Pase de dos personas para asistir al espectáculo de\nastronomía que se celebra en el Centro Espacial de\nAlgaria."
    ko: "이끼 우주센터에서\n열리고 있는 천체쇼의\n2인용 티켓이다."
    zh_simp: "在绿岭宇宙中心举办的\n天体展览的双人票。"
    zh_trad: "在綠嶺宇宙中心舉辦的\n天體展覽的雙人票。"
pal_pad:
  names:
    jp_kana: ともだちてちょう
    jp_kanji: ともだちてちょう
    en: Pal Pad
    fr: Registre Ami
    it: Blocco amici
    de: Adressbuch
    es: Bloc de Amigos
    ko: 친구수첩
    zh_simp: 朋友手册
    zh_trad: 朋友手冊
  descriptions:
    jp_kana: "友達を　登録したり\n遊んだことを　記録する\n便利な　手帳。"
    jp_kanji: "友達を　登録したり\n遊んだことを　記録する\n便利な　手帳。"
    en: "A convenient notepad that is used to register your\nfriends and keep a record of your gameplay."
    fr: "Un carnet bien pratique pour enregistrer vos amis\net vos données de jeu."
    it: "Blocco appunti utile per registrare gli amici e\nper tenere un resoconto dell’esperienza di gioco."
    de: "In diesem praktischen Notizbuch kannst du deine\nFreunde registrieren und Spieldaten einsehen."
    es: "Un cuaderno muy práctico en el que se pueden registrar\namigos y actividades que hayas realizado."
    ko: "친구를 등록하거나\n친구와 놀았던 기록을 관리하는\n편리한 수첩."
    zh_simp: "使用方便的手册。\n可以添加朋友或\n记录游戏的内容。"
    zh_trad: "好用的手冊。\n可以新增朋友或\n記錄遊戲的內容。"
pamtre_berry:
  names:
    jp_kana: シーヤのみ
    jp_kanji: シーヤのみ
    en: Pamtre Berry
    fr: Baie Palma
    it: Baccapalma
    de: Pallmbeere
    es: Baya Plama
    ko: 자야열매
    zh_simp: 椰木果
    zh_trad: 椰木果
  descriptions:
    jp_kana: "うつくしさに　磨きを　かけるための\nポロックを　作るとき　使われる。\nほかの地方では　めずらしい　きのみ。"
    jp_kanji: "うつくしさに　磨きを　かけるための\nポロックを　作るとき　使われる。\nほかの地方では　めずらしい　きのみ。"
    en: "Used to make Pokéblocks that will enhance Beauty.\nThis Berry is rare in other regions."
    fr: "Une Baie très rare en dehors de cette région,\nutilisée pour préparer des Pokéblocs permettant\nd’augmenter la Beauté d’un Pokémon."
    it: "Bacca difficile da trovare in altre regioni usata per creare\nPokémelle che aumentano la Bellezza del Pokémon."
    de: "Eine Beerensorte, die als Zutat für Pokériegel\nverwendet wird, welche die Schönheit erhöhen.\nIn anderen Regionen ist sie eher selten zu finden."
    es: "Se utiliza en la producción de Pokécubos que potencian\nla belleza. Es una baya muy rara en otras regiones."
    ko: "아름다움을 연마하기 위한\n포켓몬스넥을 만들 때 사용된다.\n다른 지방에서는 희귀한 나무열매."
    zh_simp: "用于制作宝可方块，\n制作出来的宝可方块可用来打磨美丽。\n在其他地区很少见的树果。"
    zh_trad: "製作用於增進美麗的\n寶可方塊時使用。\n在其他地區很少見的樹果。"
paralyze_heal:
  names:
    jp_kana: まひなおし
    jp_kanji: まひなおし
    en: Paralyze Heal
    fr: Anti-Para
    it: Antiparalisi
    de: Para-Heiler
    es: Antiparalizador
    ko: 마비치료제
    zh_simp: 解麻药
    zh_trad: 解麻藥
  descriptions:
    jp_kana: "スプレー式の　薬。\nポケモン　１匹の　まひの\n状態を　回復する。"
    jp_kanji: "スプレー式の　薬。\nポケモン　１匹の　まひの\n状態を　回復する。"
    en: "A spray-type medicine for treating paralysis. It can be\nused to free a Pokémon that has been paralyzed."
    fr: "Un médicament sous forme de spray.\nSoigne un Pokémon de la paralysie."
    it: Rimedio spray. Cura un Pokémon dalla paralisi.
    de: Ein Spray, das ein Pokémon von Paralyse heilt.
    es: Medicina en espray que cura a un Pokémon paralizado.
    ko: "스프레이식의 약.\n포켓몬 1마리의\n마비 상태를 회복한다."
    zh_simp: "喷雾式药水。\n能治愈１只宝可梦的\n麻痹状态。"
    zh_trad: "噴霧式藥水。\n能治癒１隻寶可夢的\n麻痺狀態。"
paras_candy:
  names:
    jp_kana: パラスのアメ
    jp_kanji: パラスのアメ
    en: Paras Candy
    fr: Bonbon Paras
    it: Caramella Paras
    de: Paras-Bonbon
    es: Caramelo Paras
    ko: 파라스의사탕
    zh_simp: 派拉斯的糖果
    zh_trad: 派拉斯的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
parasol_pick:
  names:
    jp_kana: パラソルピック
    jp_kanji: パラソルピック
    en: Parasol Pick
    fr: Pique Parasol
    it: Ombrellino
    de: Schirmchen-Pikser
    es: Palillo Sombrilla
    ko: 파라솔 픽
    zh_simp: 阳伞三明治签
    zh_trad: 陽傘三明治籤
  descriptions:
    jp_kana: "パラソル部分が　持ちにくいという\n評判もあり　指は　汚れてしまうが\n食べたあとに　くるくる回すと　楽しい。"
    jp_kanji: "パラソル部分が　持ちにくいという\n評判もあり　指は　汚れてしまうが\n食べたあとに　くるくる回すと　楽しい。"
    en: "Some complain that the parasol part of this pick is hard\nto hold on to, so your fingers get messy. Still, it’s fun to\ntwirl this all around after you’ve eaten."
    fr: "Certains se plaignent que le parasol rend le Sandwich\ndifficile à manger, et que l’on finit par se salir les doigts.\nMais c’est amusant de le faire tourner après avoir fini."
    it: "C’è chi si lamenta che la parte a ombrello non offra\nuna buona presa, ma anche se si finisce per sporcarsi\nle dita, dopo mangiato ci si può divertire a farlo ruotare."
    de: "Einige finden, dass das Schirmchen stört und beim Essen\nzu schmutzigen Fingern führt. Aber dafür macht es Spaß,\nden Pikser nach dem Essen herumzuzwirbeln."
    es: "Hay gente que opina que la parte de la sombrilla es\nincómoda de agarrar y se acaba siempre con los dedos\npringados, pero resulta muy divertido darle vueltas."
    ko: "파라솔 부분이 집기 힘들다는 평가도 있다.\n손가락이 더러워지지만\n다 먹고 나서 빙글빙글 돌리면 재미있다."
    zh_simp: "虽然有人批评伞的部分\n不易拿且会弄脏手，但餐后\n能用来转着玩，很有趣。"
    zh_trad: "雖然有些人詬病陽傘部分不易拿取，\n而且手還會沾到食物，\n不過吃完後可以拿來轉著玩。"
parcel:kanto:
  names:
    jp_kana: おとどけもの
    jp_kanji: おとどけもの
    en: Parcel
    fr: Colis
    it: Pacco
    de: Paket
    es: Paquete
    ko: 전해줄물건
    zh_simp: 包裹
    zh_trad: 包裹
  descriptions:
    jp_kana: "トキワシティの　ショップ　から\nオーキド博士に　届けるよう\n頼まれた　荷物。"
    jp_kanji: "トキワシティの　ショップ　から\nオーキド博士に　届けるよう\n頼まれた　荷物。"
    en: "A parcel you were asked to deliver to Professor Oak\nfrom Viridian City’s Poké Mart."
    fr: "Un paquet à livrer au Professeur Chen de la part\nde la Boutique Pokémon de Jadielle."
    it: "Un pacchetto per il Professor Oak dal Pokémon-Market\ndi Smeraldopoli."
    de: "Ein Paket für Professor Eich, das man dir im\nPokémon-Supermarkt von Vertania City anvertraut hat."
    es: "Un paquete para el Profesor Oak que te entregaron\nen la Tienda Pokémon de Ciudad Verde."
    ko: "상록시티의 숍에서\n오박사님에게 전달하도록\n부탁받은 물건."
    zh_simp: "这是常青市的商店\n托付给你的包裹。\n需要将它交给大木博士。"
    zh_trad: "在常青市的商店\n被拜託送到大木博士\n手上的包裹。"
parcel:sinnoh:
  names:
    jp_kana: おとどけもの
    jp_kanji: おとどけもの
    en: Parcel
    fr: Colis
    it: Pacco
    de: Paket
    es: Paquete
    ko: 전해줄물건
    zh_simp: 包裹
    zh_trad: 包裹
  descriptions:
    jp_kana: "フタバタウンから　旅立った\n幼なじみに　渡すように\n頼まれた　おとどけもの。"
    jp_kanji: "フタバタウンから　旅立った\n幼なじみに　渡すように\n頼まれた　おとどけもの。"
    en: "A parcel entrusted into your care. You’re supposed to\ndeliver it to your childhood friend who left Twinleaf Town."
    fr: "Un paquet qu’on vous a confié.\nVous devez le remettre à votre ami d’enfance\nqui a quitté Bonaugure."
    it: "Pacchetto da consegnare al tuo amico d’infanzia\nche ha lasciato Duefoglie."
    de: "Ein Paket, das dir anvertraut wurde. Du sollst es deinem\nbesten Freund geben, der Zweiblattdorf verließ."
    es: "Paquete encomendado a tu cuidado que tienes que\nentregar a tu amigo de la infancia que dejó Pueblo\nHojaverde."
    ko: "떡잎마을에서 여행을 떠난\n소꿉친구에게 건네주도록\n부탁받은 물건."
    zh_simp: "这是别人托付给你的包裹。\n需要将它交给从双叶镇启程\n踏上旅途的青梅竹马。"
    zh_trad: "受人之託要交給從雙葉鎮\n啟程踏上旅途的\n青梅竹馬的包裹。"
park_ball:
  names:
    jp_kana: パークボール
    jp_kanji: パークボール
    en: Park Ball
    fr: Parc Ball
    it: Parco Ball
    de: Parkball
    es: Parque Ball
    ko: 파크볼
    zh_simp: 公园球
    zh_trad: 公園球
  descriptions:
    jp_kana: "パルパークのなかで\n使う　特別なボール。"
    jp_kanji: "パルパークのなかで\n使う　特別なボール。"
    en: A special Poké Ball used in the Pal Park.
    fr: Une Poké Ball spéciale utilisée au Parc des Amis.
    it: "Poké Ball speciale utilizzata solo all’interno\ndel Parco Amici."
    de: Ein Ball, der nur im Park der Freunde eingesetzt wird.
    es: Poké Ball especial utilizada dentro del Parque Compi.
    ko: "팔파크 내에서\n사용하는 특별한 볼."
    zh_simp: "在伙伴公园里使用的\n特殊的球。"
    zh_trad: "在夥伴公園裡使用的\n特殊的球。"
party_sparkler_pick:
  names:
    jp_kana: おいわいはなびピック
    jp_kanji: おいわいはなびピック
    en: Party Sparkler Pick
    fr: Pique Feu d’Artifice
    it: Stecchino scintille
    de: Wunderkerzen-Pikser
    es: Palillo Bengala
    ko: 축하 폭죽 픽
    zh_simp: 烟花祝庆三明治签
    zh_trad: 煙火祝慶三明治籤
  descriptions:
    jp_kana: "自動で　小さな花火が　燃える　ピック。\nパーティーや　おめでたい席で　使われている。\n燃え終わったときの　匂いは　クセになる。"
    jp_kanji: "自動で　小さな花火が　燃える　ピック。\nパーティーや　おめでたい席で　使われている。\n燃え終わったときの　匂いは　クセになる。"
    en: "This pick features a small sparkler that goes off\nautomatically. It’s used at parties or for guests of honor.\nIt leaves an oddly appealing aroma once it’s burned out."
    fr: "Une pique qui émet automatiquement de petites\nétincelles. Utilisée dans les fêtes, elle dégage un parfum\nétrangement plaisant lorsqu’elle est consumée."
    it: "Stecchino che produce piccole scintille. Viene usato\nalle feste o in occasioni speciali. Una volta spento lascia\nun odore sorprendentemente gradevole."
    de: "Dieser Pikser entfacht automatisch ein kleines Feuerwerk\nund eignet sich bestens für Partys oder festliche Anlässe.\nIst er abgebrannt, hinterlässt er einen angenehmen Duft."
    es: "Un palillo del que saltan unas pequeñas chispas, ideal\npara fiestas u ocasiones especiales. El olor que deja tras\napagarse es agradable."
    ko: "자동으로 작은 폭죽이 타오르는 픽.\n파티나 축하하는 자리에 많이 사용된다.\n다 타고 난 뒤에 나는 냄새가 중독성 있다."
    zh_simp: "会自动烧起小火花的签子。\n会用在派对或喜庆场合。\n燃尽后的味道会让人上瘾。"
    zh_trad: "會自動燃放小型火花的小籤。\n用於派對或喜慶等場合。\n火花燃盡後留下的氣味獨具特色。"
pass:
  names:
    jp_kana: リニアパス
    jp_kanji: リニアパス
    en: Pass
    fr: Passe Train
    it: Superpass
    de: Fahrschein
    es: Magnetopase
    ko: 리니어패스
    zh_simp: 磁浮列车自由票
    zh_trad: 磁浮列車自由票
  descriptions:
    jp_kana: "リニアカーに　乗るときに　必要な\nチケット。　いつでも　乗り放題。"
    jp_kanji: "リニアカーに　乗るときに　必要な\nチケット。　いつでも　乗り放題。"
    en: "A pass required for riding the Magnet Train. It allows you\nto ride whenever and however much you’d like."
    fr: "Un ticket nécessaire pour monter à bord\ndu Train Magnétique. Utilisable à volonté."
    it: "Biglietto necessario per viaggiare sul supertreno.\nUtilizzabile a volontà."
    de: "Eine Fahrkarte, die einem die Reise mit dem Magnetzug\nermöglicht. Gilt für beliebig viele Fahrten."
    es: "Billete necesario para poder montar todas las veces que\nse desee en el Magnetotrén."
    ko: "리니어 카를 탈 때 필요한\n티켓. 언제든지 무제한으로 이용 가능."
    zh_simp: "乘坐磁浮列车时所需的车票。\n可以随时自由乘坐。"
    zh_trad: "乘坐磁浮列車時所需的車票。\n可以隨時自由乘坐。"
pass_orb:
  names:
    jp_kana: デルダマ
    jp_kanji: デルダマ
    en: Pass Orb
    fr: Offrisphère
    it: Passabilia
    de: Transfer-Orb
    es: Regalosfera
    ko: 딜구슬
    zh_simp: 释出之玉
    zh_trad: 釋出之玉
  descriptions:
    jp_kana: "デルパワーを　発生させる\nときに使う　イッシュの　パワーが\nとじこめられた　不思議な　玉。"
    jp_kanji: "デルパワーを　発生させる\nときに使う　イッシュの　パワーが\nとじこめられた　不思議な　玉。"
    en: "A mysterious orb containing the power of the\nUnova region, to be used when generating\nPass Power."
    fr: "Une sphère mystérieuse contenant l’Aura d’Unys\net permettant l’utilisation des Offri-Auras."
    it: "Bilia misteriosa che racchiude l’energia di Unima\ned è in grado di lanciare il Passapotere."
    de: "Ein mysteriöser Orb, der die Kraft der Einall-Region\nenthält und zur Erzeugung von Transferkraft dient."
    es: "Esfera misteriosa que contiene el poder de la región de\nTeselia y se utiliza para generar Poderes Regalo."
    ko: "딜파워를 발생시킬 때\n사용하는 하나지방의 파워가\n담긴 이상한 구슬."
    zh_simp: "在这块神奇的玉石里，\n封存着用于产生\n释出之力的合众之力。"
    zh_trad: "在這塊神奇的玉石裡，\n封存著用於產生\n釋出之力的合眾之力。"
passho_berry:
  names:
    jp_kana: イトケのみ
    jp_kanji: イトケのみ
    en: Passho Berry
    fr: Baie Pocpoc
    it: Baccapasflo
    de: Foepasbeere
    es: Baya Pasio
    ko: 꼬시개열매
    zh_simp: 千香果
    zh_trad: 千香果
  descriptions:
    jp_kana: "ポケモンに　持たせると\n効果バツグンの　みず技を\n受けたとき　威力が　弱まる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　みず技を\n受けたとき　威力が　弱まる。"
    en: "If a Pokémon holding this Berry is hit with a\nsupereffective Water-type move, the power of that\nmove will be weakened."
    fr: "Tenue, cette Baie réduit les dégâts subis lorsque\nle Pokémon est touché par une capacité super efficace\nde type Eau."
    it: "Se il Pokémon che ha questa bacca subisce una mossa\nsuperefficace di tipo Acqua, la potenza della mossa\nviene indebolita."
    de: "Als getragenes Item schwächt diese Beere eine\nsehr effektive Wasser-Attacke, von der das Pokémon\ngetroffen wird."
    es: "Si la lleva un Pokémon, debilita un ataque supereficaz\nde tipo Agua que reciba."
    ko: "포켓몬에게 지니게 하면\n효과가 굉장한 물 기술로\n공격받았을 때 위력이 약해진다."
    zh_simp: "让宝可梦携带后，\n在受到效果绝佳的水属性招式\n攻击时，能令其威力减弱。"
    zh_trad: "讓寶可夢攜帶後，\n在受到效果絕佳的水屬性招式\n攻擊時，能使其威力減弱。"
passimian_fur:
  names:
    jp_kana: ナゲツケサルのけ
    jp_kanji: ナゲツケサルのけ
    en: Passimian Fur
    fr: Poils de Quartermac
    it: Pelo di Passimian
    de: Quartermak-Haar
    es: Pelo de Passimian
    ko: 내던숭이의털
    zh_simp: 投掷猴的毛
    zh_trad: 投擲猴的毛
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
pasta:
  names:
    jp_kana: パスタ
    jp_kanji: パスタ
    en: Pasta
    fr: Pâtes
    it: Pasta
    de: Spaghetti
    es: Pasta
    ko: 파스타
    zh_simp: 通心粉
    zh_trad: 通心麵
  descriptions:
    jp_kana: "キャンプの　料理に　使う\n食材の　一種。小麦粉を　こねて\n作った　麺。意外と　カレーに合う。"
    jp_kanji: "キャンプの　料理に　使う\n食材の　一種。小麦粉を　こねて\n作った　麺。意外と　カレーに合う。"
    en: "One of the many ingredients that can be used for\ncooking at your camp. These flour noodles make\nfor a surprisingly good match with curry."
    fr: "Un ingrédient de cuisine pour le camping.\nFabriquées avec de la farine de blé, ces pâtes\nse marient étonnamment bien avec le curry."
    it: "Uno degli ingredienti che puoi usare per cucinare\nin campeggio. Questi spaghetti di grano duro\nsi sposano sorprendentemente bene con il curry."
    de: "Eine Zutat für PokéCamping-Mahlzeiten. Diese aus\nWeizenmehl hergestellten Nudeln passen überraschend\ngut zu Currygerichten aller Art."
    es: "Un ingrediente para cocinar en el campamento. Estos\nfideos de harina de trigo combinan inesperadamente\nbien con el curri."
    ko: "캠프 요리에 사용되는\n식재료 중 하나. 밀가루를 반죽해서\n만든 면이다. 의외로 카레와 잘 어울린다."
    zh_simp: "在露营营地制作料理时会使用的\n一种食材。是由小麦粉揉制的面条。\n搭配咖喱出乎意料地美味。"
    zh_trad: "製作露營料理時使用的食材之一。\n用麵粉揉成的麵條，\n意外地和咖哩很配。"
pawmi_fur:
  names:
    jp_kana: パモのけ
    jp_kanji: パモのけ
    en: Pawmi Fur
    fr: Poils de Pohm
    it: Pelo di Pawmi
    de: Pamo-Haar
    es: Pelo de Pawmi
    ko: 빠모의털
