boost_mulch:
  names:
    jp_kana: ぐんぐんこやし
    jp_kanji: ぐんぐんこやし
    en: Boost Mulch
    fr: Fertibérance
    it: Fertilcopioso
    de: Wuchermulch
    es: Abono Fructífero
    ko: 부쩍부쩍비료
    zh_simp: 劲劲肥
    zh_trad: 勁勁肥
  descriptions:
    jp_kana: "きのみを　育てるときの　肥料。\nしかし　ホウエン地方の　土には\nまるで　なじまないので　効果が　ない。"
    jp_kanji: "きのみを　育てるときの　肥料。\nしかし　ホウエン地方の　土には\nまるで　なじまないので　効果が　ない。"
    en: "A fertilizer for growing Berries. However, it appears\nto be unsuitable for the soil in the Hoenn region and\nhas no effect."
    fr: "Un engrais à utiliser sur un sol meuble.\nIl n’est cependant pas adapté aux terres de Hoenn\net n’y a aucun effet."
    it: "Fertilizzante usato per coltivare le bacche. Tuttavia,\nnon ha effetto a Hoenn, perché non è adatto al terreno\ndella regione."
    de: "Mulch zur Nutzung auf Beerenfeldern. Durch seine\nUnverträglichkeit mit den Böden in Hoenn bleibt sein\nEinsatz dort ohne Wirkung."
    es: "Un fertilizante usado para el cultivo de bayas. Parece\nque no se asienta bien en el suelo de Hoenn, por lo\nque no tiene efecto en esta región."
    ko: "나무열매를 키울 때 사용하는 비료.\n그러나 호연지방의 흙에는\n전혀 맞지 않기에 효과가 없다."
    zh_simp: "培育树果时的肥料。\n但完全不适合丰缘地区的土壤，\n所以没什么效果。"
    zh_trad: "培育樹果時的肥料。\n但完全不適合豐緣地區的土壤，\n所以沒什麼效果。"
booster_energy:
  names:
    jp_kana: ブーストエナジー
    jp_kanji: ブーストエナジー
    en: Booster Energy
    fr: Énergie Booster
    it: Capsula energetica
    de: Energiekapsel
    es: Energía Potenciadora
    ko: 부스트에너지
    zh_simp: 驱劲能量
    zh_trad: 驅勁能量
  descriptions:
    jp_kana: "エネルギーが　つまった　カプセル\nある特性を　持つ　ポケモンに\n持たせると　その力を　ブーストさせる。"
    jp_kanji: "エネルギーが　つまった　カプセル\nある特性を　持つ　ポケモンに\n持たせると　その力を　ブーストさせる。"
    en: "An item to be held by Pokémon with certain Abilities.\nThe energy that fills this capsule boosts the strength of\nthe Pokémon."
    fr: "Objet à tenir. Une capsule contenant un concentré\nd’énergie qui renforce le Pokémon qui la porte,\nsi celui-ci possède le talent approprié."
    it: "Strumento da dare a un Pokémon. Capsula ricolma\ndi energia che aumenta la potenza dei Pokémon dotati\ndi certe abilità."
    de: "Eine Kapsel voller Energie. Gibt man sie einem Pokémon\nmit einer bestimmten Fähigkeit zum Tragen, verpasst sie\ndessen Kraft einen Schub."
    es: "Tanque que contiene energía en su interior. Si lo lleva\nun Pokémon que posea cierta habilidad, potenciará su\npoder."
    ko: "에너지가 가득한 캡슐.\n어떤 특성을 가진 포켓몬에게\n지니게 하면 그 힘을 증폭시킨다."
    zh_simp: "充满能量的胶囊。\n让有某种特性的宝可梦携带后，\n其能力会得到提升。"
    zh_trad: "充滿能量的膠囊。\n讓有著某種特性的寶可夢攜帶後，\n其力量將有所強化。"
bottle_cap:
  names:
    jp_kana: ぎんのおうかん
    jp_kanji: ぎんのおうかん
