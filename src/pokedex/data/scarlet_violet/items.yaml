    jp_kanji: ずがいのカセキ
    en: Skull Fossil
    fr: Fossile Crâne
    it: Fossilcranio
    de: Kopffossil
    es: Fósil Cráneo
    ko: 두개의화석
    zh_simp: 头盖化石
    zh_trad: 頭蓋化石
  descriptions:
    jp_kana: "大昔　地上で　暮らした\n古代ポケモンの　カセキ。\n頭の一部　らしい。"
    jp_kanji: "大昔　地上で　暮らした\n古代ポケモンの　カセキ。\n頭の一部　らしい。"
    en: "A fossil from a prehistoric Pokémon that once lived\non the land. It appears as though it’s part of a head."
    fr: "Le fossile d’un Pokémon préhistorique terrestre.\nOn dirait un morceau de crâne."
    it: "Fossile di un Pokémon preistorico che viveva sulla\nterraferma. Sembra essere parte di un teschio."
    de: "Das Fossil eines urzeitlichen Pokémon, das an Land\nlebte. Es sieht wie ein Teil eines Schädels aus."
    es: "Fósil de un Pokémon prehistórico terrestre. Parece ser\nparte de un cráneo."
    ko: "오랜 옛날 지상에서 살았던\n고대 포켓몬의 화석.\n머리의 일부인 듯하다."
    zh_simp: "很久以前生活在地上的\n古代宝可梦的化石。\n好像是头部的一部分。"
    zh_trad: "很久以前生活在地上的\n古代寶可夢的化石。\n好像是頭部的一部分。"
