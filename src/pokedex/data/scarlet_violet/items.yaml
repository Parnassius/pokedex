    ko: 오래된 시3
    zh_simp: 古老诗文３
    zh_trad: 古老詩文３
  descriptions:
    jp_kana: "ヒスイ地方の各地から\n掘りだされる古い詩の一遍。\n筆跡から書いた人物は同じとされる。"
    jp_kanji: "ヒスイ地方の各地から\n掘りだされる古い詩の一遍。\n筆跡から書いた人物は同じとされる。"
    en: "Part of a series of old poems that have been unearthed\naround the Hisui region. Judging from the handwriting,\nit appears they were all written by the same person."
    fr: "L’un des vieux poèmes que l’on peut déterrer aux quatre\ncoins de Hisui. À en juger par la forme des lettres,\nces poèmes sont l’œuvre d’un seul et même auteur."
    it: "Una delle vecchie poesie che si possono trovare\nsotterrate in giro per tutta Hisui. Dalla calligrafia\nsembrano attribuibili a un unico autore."
    de: "Eines der alten Gedichte, die überall in der Hisui-Region\nausgegraben werden. Die Handschrift lässt vermuten,\ndass sie alle von derselben Person verfasst wurden."
    es: "Fragmento de una colección de antiguos poemas que se\nha desenterrado por toda la región de Hisui. Por el trazo\ndel pincel, se cree que todos pertenecen al mismo autor."
    ko: "히스이지방 각지에서 발굴되는\n오래된 시 한 편. 필적으로 미루어 보아\n모두 같은 인물이 쓴 것으로 추정된다."
    zh_simp: "发掘自洗翠地区各地的古诗\n之中的一篇。根据笔迹判断，\n这些诗篇应是出自同一人之手。"
    zh_trad: "發掘自洗翠地區各地的古詩\n之中的一篇。根據筆跡判斷，\n這些詩篇應是出自同一人之手。"
