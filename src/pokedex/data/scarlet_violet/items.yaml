silk_scarf:
  names:
    jp_kana: シルクのスカーフ
    jp_kanji: シルクのスカーフ
    en: Silk Scarf
    fr: Mouchoir Soie
    it: Sciarpa seta
    de: Seidenschal
    es: Pañuelo de Seda
    ko: 실크스카프
    zh_simp: 丝绸围巾
    zh_trad: 絲綢圍巾
  descriptions:
    jp_kana: "はだざわりの　よい　スカーフ。\n持たせると　ノーマルタイプの\n技の　威力が　あがる。"
    jp_kanji: "はだざわりの　よい　スカーフ。\n持たせると　ノーマルタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon. It’s a sumptuous scarf\nthat boosts the power of the holder’s Normal-type\nmoves."
    fr: "Objet à tenir. Un mouchoir somptueux qui augmente\nla puissance des capacités de type Normal."
    it: "Strumento da dare a un Pokémon. Sciarpa raffinata che\npotenzia le mosse di tipo Normale."
    de: "Ein Item zum Tragen. Ein kostbarer Schal, der Attacken\nvom Typ Normal verstärkt."
    es: "La delicadeza del pañuelo potencia los movimientos de\ntipo Normal. Debe llevarlo un Pokémon."
    ko: "감촉이 좋은 스카프.\n지니게 하면 노말타입\n기술의 위력이 올라간다."
    zh_simp: "手感不错的围巾。\n携带后，一般属性的\n招式威力就会提高。"
    zh_trad: "手感不錯的圍巾。\n攜帶後，一般屬性的\n招式威力就會提高。"
silph_scope:
  names:
    jp_kana: シルフスコープ
    jp_kanji: シルフスコープ
    en: Silph Scope
    fr: Scope Sylphe
    it: Spettrosonda
    de: Silph Scope
    es: Visor Silph
    ko: 실프스코프
    zh_simp: 西尔佛检视镜
    zh_trad: 西爾佛檢視鏡
  descriptions:
    jp_kana: "人の　目に　見えない　ものを\n見ることが　できる　スコープ。\nシルフカンパニー製。"
    jp_kanji: "人の　目に　見えない　ものを\n見ることが　できる　スコープ。\nシルフカンパニー製。"
    en: "A scope that lets you see what cannot usually be seen.\nIt is made by Silph Co."
    fr: "Un appareil permettant de voir les Pokémon invisibles.\nIl est fabriqué par la Sylphe SARL."
    it: "Sonda che rivela i Pokémon invisibili, prodotta\ndalla Silph S.p.A."
    de: "Dieses Gerät macht Dinge sichtbar, die dem\nmenschlichen Auge sonst verborgen bleiben.\nEs wurde von der Silph Company entwickelt."
    es: "Dispositivo que permite ver cosas que, de otra forma,\nresultarían invisibles para el ojo humano. Fabricado por\nSilph S. A."
    ko: "사람의 눈에 보이지 않는 것을\n볼 수 있게 해 주는 스코프.\n실프주식회사 제품."
    zh_simp: "西尔佛公司制造的透视镜。\n可以看见人眼无法看见的东西。"
    zh_trad: "西爾佛公司製造的檢視鏡。\n能看見人類肉眼\n看不到的東西。"
silver_bottle:
  names:
    jp_kana: シルバーチタンボトル
    jp_kanji: シルバーチタンボトル
    en: Silver Bottle
    fr: Gourde Titane (Argent)
    it: Borraccia argento
    de: Silber-Titanflasche
    es: Termo Plateado
    ko: 실버 티탄 보틀
    zh_simp: 银钛水壶
    zh_trad: 銀鈦水壺
  descriptions:
    jp_kana: "やまおとこ　やまガールに　人気の商品。\nチタン素材を　使っているため　塩分を含む\n液体を　保存しても　錆びない。"
    jp_kanji: "やまおとこ　やまガールに　人気の商品。\nチタン素材を　使っているため　塩分を含む\n液体を　保存しても　錆びない。"
    en: "A popular option among hikers. It’s made with titanium,\nso it doesn’t rust even if it’s used to hold drinks with high\nsodium content."
    fr: "Un accessoire populaire auprès des Montagnards et\nMontagnardes. Sa structure en titane lui permet de\ncontenir des liquides riches en sel sans rouiller."
    it: "Articolo popolare tra Montanari e Montanare. Essendo\nrealizzata in titanio placcato, non si arrugginisce\nnemmeno se usata per bevande che contengono sale."
    de: "Diese in der Wanderszene äußerst beliebte Trinkflasche\nbesteht aus Titan und bleibt so selbst bei Aufbewahrung\nsalzhaltiger Getränke rostfrei."
    es: "Popular entre Montañeros. Al estar hecho de titanio,\nno se oxida ni aunque dentro se lleven líquidos con\nalto grado de salinidad."
    ko: "등산가와 등산걸에게 인기 있는 상품.\n티타늄 소재를 사용해서 염분이 있는\n액체를 보관해도 녹이 슬지 않는다."
    zh_simp: "在登山男与登山女孩之间\n很有人气的商品。使用钛制成，\n即使用来装含盐分的液体也不会生锈。"
    zh_trad: "受到登山男和登山女孩歡迎的商品。\n材質為鈦，因此即使存放\n含有鹽分的液體也不會生鏽。"
silver_cup:
  names:
    jp_kana: シルバーチタンカップ
    jp_kanji: シルバーチタンカップ
    en: Silver Cup
    fr: Tasse Titane (Argent)
    it: Tazza argento
    de: Silber-Titantasse
    es: Taza Plateada
    ko: 실버 티탄 컵
    zh_simp: 银钛水杯
    zh_trad: 銀鈦水杯
  descriptions:
    jp_kana: "やまおとこ　やまガールに　人気の商品。\nチタン素材を　使っているため　塩分を含む\n液体を　そそいでも　錆びない。"
    jp_kanji: "やまおとこ　やまガールに　人気の商品。\nチタン素材を　使っているため　塩分を含む\n液体を　そそいでも　錆びない。"
    en: "A popular option among hikers. It’s made with titanium,\nso it doesn’t rust even if it’s used to hold drinks with high\nsodium content."
    fr: "Un accessoire populaire auprès des Montagnards et\nMontagnardes. Sa structure en titane lui permet de\ncontenir des liquides riches en sel sans rouiller."
    it: "Articolo popolare tra Montanari e Montanare. Essendo\nrealizzata in titanio placcato, non si arrugginisce\nnemmeno se usata per bevande che contengono sale."
    de: "Diese in der Wanderszene äußerst beliebte Tasse\nbesteht aus Titan und rostet somit nicht, selbst wenn\nsalzhaltige Getränke eingegossen werden."
    es: "Popular entre Montañeros. Al estar hecha de titanio,\nno se oxida ni aunque se viertan dentro líquidos con\nalto grado de salinidad."
    ko: "등산가와 등산걸에게 인기 있는 상품.\n티타늄 소재를 사용해서 염분이 있는\n액체를 따라도 녹이 슬지 않는다."
    zh_simp: "在登山男与登山女孩之间\n很有人气的商品。使用钛制成，\n即使注入含盐分的液体也不会生锈。"
    zh_trad: "受到登山男和登山女孩歡迎的商品。\n材質為鈦，因此即使注入\n含有鹽分的液體也不會生鏽。"
silver_feather:
  names:
    jp_kana: ぎんいろのはね
    jp_kanji: ぎんいろのはね
    en: Silver Feather
    fr: Argent’Aile
    it: Ala d’argento
    de: Silberflügel
    es: Pluma Plateada
    ko: 은빛깃털
    zh_simp: 银色之羽
    zh_trad: 銀色之羽
  descriptions:
    jp_kana: "ぎんいろに　ひかり　かがやく\n不思議な　はね。"
    jp_kanji: "ぎんいろに　ひかり　かがやく\n不思議な　はね。"
    en: A strange feather that gleams with a silvery color.
    fr: Une étrange plume qui brille d’un éclat argenté.
    it: Misteriosa piuma che brilla di luce argentea.
    de: "Eine silberne Feder, die von einem seltsamen Leuchten\nerfüllt ist."
    es: Misteriosa pluma de un brillante color plateado.
    ko: "은빛으로 빛나는\n신비한 깃털."
    zh_simp: "散发着银色光辉的\n神奇羽毛。"
    zh_trad: "散發著銀色光輝的\n神奇羽毛。"
silver_leaf:
  names:
    jp_kana: ぎんのはっぱ
    jp_kanji: ぎんのはっぱ
    en: Silver Leaf
    fr: Feuille Argentée
    it: Fogliargento
    de: Silberblatt
    es: Hoja de Plata
    ko: 은빛잎사귀
    zh_simp: 银色叶子
    zh_trad: 銀色葉子
  descriptions:
    jp_kana: "銀色の　不思議な　はっぱ。\nこの　はっぱを　つける　木は\n見つかって　いない。"
    jp_kanji: "銀色の　不思議な　はっぱ。\nこの　はっぱを　つける　木は\n見つかって　いない。"
    en: "A mysterious silver leaf. No trees with this leaf have\nbeen found yet."
    fr: "Une feuille argentée mystérieuse. Elle ne semble\nappartenir à aucun arbre connu."
    it: "Una strana foglia argentata. Nessuno sa da che albero\nprovenga."
    de: "Ein rätselhaftes Blatt mit silberner Färbung. Bisher hat\nman noch keinen Baum entdeckt, an dem solche Blätter\nwachsen."
    es: "Extraña hoja de color plateado. Se desconoce de qué\nárbol procede."
    ko: "은빛의 신비한 나뭇잎.\n이 나뭇잎이 자라는 나무는\n아직 발견되지 않았다."
    zh_simp: "神奇的银色叶子。\n至今仍未发现能长出\n这种叶子的树木。"
    zh_trad: "不可思議的銀色葉子。\n至今還未發現\n長有這種葉子的樹。"
silver_nanab_berry:
  names:
    jp_kana: ぎんのナナのみ
    jp_kanji: ぎんのナナのみ
    en: Silver Nanab Berry
    fr: Baie Nanab argentée
    it: Baccabana argentata
    de: Silberne Nanabbeere
    es: Baya Latano Plateada
    ko: 은 나나열매
    zh_simp: 银色蕉香果
    zh_trad: 銀色蕉香果
  descriptions:
    jp_kana: "ポケモンを　捕まえるときに\nあたえると　落ち着く　きのみ。"
    jp_kanji: "ポケモンを　捕まえるときに\nあたえると　落ち着く　きのみ。"
    en: "A Berry that calms Pokémon you’re trying to catch\nwhen given to them."
    fr: "Une Baie à donner à un Pokémon sauvage au moment\nde la capture pour le calmer pendant un instant."
    it: "Bacca che calma il Pokémon selvatico a cui viene data\nal momento della cattura."
    de: "Gibst du diese Beere einem Pokémon zu essen,\nwird es während des Fangversuchs ruhiger."
    es: "Una baya que puedes lanzar a un Pokémon salvaje\npara tranquilizarlo bastante."
    ko: "포켓몬을 잡을 때 주면\n얌전해지는 나무열매."
    zh_simp: "捕捉宝可梦时，\n把这树果交给宝可梦\n就能平复对方的情绪。"
    zh_trad: "在捕捉時把這個樹果餵給寶可夢，\n就能讓牠們的情緒穩定下來。"
silver_pick:
  names:
    jp_kana: シルバーピック
    jp_kanji: シルバーピック
    en: Silver Pick
    fr: Pique Argentée
    it: Stecchino argento
    de: Silber-Pikser
    es: Palillo Plateado
    ko: 실버 픽
    zh_simp: 银色三明治签
    zh_trad: 銀色三明治籤
  descriptions:
    jp_kana: "銀色で　高級感　ただよう　ピック。\n刺せば　ゴージャスな　気持ちになり\n苦手な食材も　モリモリ　食べられるはず。"
    jp_kanji: "銀色で　高級感　ただよう　ピック。\n刺せば　ゴージャスな　気持ちになり\n苦手な食材も　モリモリ　食べられるはず。"
    en: "A silver pick that oozes class. Using it on a sandwich\nlends an extravagant air that’ll make you want to eat up,\neven if you don’t love the fillings."
    fr: "Une pique argentée pour pique-niqueurs de luxe. Plantée\ndans un Sandwich, elle lui donne un côté somptueux\nqui met en appétit, même si on n’aime pas la garniture."
    it: "Stecchino argentato di alta classe. Dona un tocco di\nsontuosità al panino, invogliando a mangiarlo di gusto\nanche se gli ingredienti non vanno molto a genio."
    de: "Diesen silbernen Pikser umweht ein Hauch von Luxus.\nEr veredelt jedes Sandwich und macht sogar Appetit\nauf Zutaten, die einem normalerweise nicht munden."
    es: "Un palillo de un ostentoso color plateado. Convierte\ncualquier bocadillo en un plato de lujo tan apetecible\nque se come aunque no guste su relleno."
    ko: "은색으로 고급스러움을 드러내는 픽.\n꽂으면 고저스한 느낌이 들어서\n싫어하는 식재료도 잘 먹을 수 있게 된다."
    zh_simp: "充满高档气息的银色签子。\n插了它就能让人感受到奢华的感觉，\n连不喜欢的食材应该也能大口吃下。"
    zh_trad: "散發出高檔氣息的銀色小籤。\n插入三明治時會備感尊榮，\n即使是不敢吃的食材應該也能大快朵頤。"
silver_pinap_berry:
  names:
    jp_kana: ぎんのパイルのみ
    jp_kanji: ぎんのパイルのみ
    en: Silver Pinap Berry
    fr: Baie Nanana argentée
    it: Baccananas argentata
    de: Silberne Sananabeere
    es: Baya Pinia Plateada
    ko: 은 파인열매
    zh_simp: 银色凰梨果
    zh_trad: 銀色凰梨果
  descriptions:
    jp_kana: "ポケモンに　あたえると\n捕まえたときに　道具が\n手にはいり　やすくなる　きのみ。"
    jp_kanji: "ポケモンに　あたえると\n捕まえたときに　道具が\n手にはいり　やすくなる　きのみ。"
    en: "A Berry that makes you more likely to get an item when\ngiven to Pokémon you’re trying to catch."
    fr: "Une Baie à donner à un Pokémon sauvage pour avoir\nplus de chances d’obtenir un objet après l’avoir capturé."
    it: "Bacca che rende più facile ottenere strumenti\nquando catturi il Pokémon a cui l’hai data."
    de: "Gibst du diese Beere einem Pokémon zu essen, wird die\nChance, bei einem erfolgreichen Fangversuch ein Item\nzu erhalten, erhöht."
    es: "Una baya que puedes lanzar a un Pokémon salvaje\npara aumentar bastante las probabilidades de conseguir\nun objeto tras capturarlo."
    ko: "포켓몬에게 주면\n잡았을 때 도구를 손에 넣기\n쉬워지는 나무열매."
    zh_simp: "如果把这树果交给宝可梦，\n那么接下来捉住该宝可梦时，\n会更容易获得道具。"
    zh_trad: "把這個樹果餵給寶可夢，\n在捕捉成功後，\n會更容易獲得道具。"
silver_powder:
  names:
    jp_kana: ぎんのこな
    jp_kanji: ぎんのこな
    en: Silver Powder
    fr: Poudre Argentée
    it: Argenpolvere
    de: Silberstaub
    es: Polvo Plata
    ko: 은빛가루
    zh_simp: 银粉
    zh_trad: 銀粉
  descriptions:
    jp_kana: "銀色に　輝く　粉。\n持たせると　むしタイプの\n技の威力が　あがる。"
    jp_kanji: "銀色に　輝く　粉。\n持たせると　むしタイプの\n技の威力が　あがる。"
    en: "An item to be held by a Pokémon. It’s a shiny silver\npowder that boosts the power of the holder’s Bug-type\nmoves."
    fr: "Objet à tenir. De la poudre d’argent brillante qui\naugmente la puissance des capacités de type Insecte."
    it: "Strumento da dare a un Pokémon. Polvere argentea\ne brillante che potenzia le mosse di tipo Coleottero."
    de: "Ein Item zum Tragen. Es verstärkt Attacken vom Typ\nKäfer."
    es: "Polvo de brillo argénteo que potencia los movimientos\nde tipo Bicho. Debe llevarlo un Pokémon."
    ko: "은색으로 반짝이는 가루.\n지니게 하면 벌레타입\n기술의 위력이 올라간다."
    zh_simp: "散发着银色光辉的粉末。\n携带后，虫属性的\n招式威力就会提高。"
    zh_trad: "散發著銀色光輝的粉末。\n攜帶後，蟲屬性的\n招式威力就會提高。"
silver_razz_berry:
  names:
    jp_kana: ぎんのズリのみ
    jp_kanji: ぎんのズリのみ
    en: Silver Razz Berry
    fr: Baie Framby argentée
    it: Baccalampon argentata
    de: Silberne Himmihbeere
    es: Baya Frambu Plateada
    ko: 은 라즈열매
    zh_simp: 银色蔓莓果
    zh_trad: 銀色蔓莓果
  descriptions:
    jp_kana: "ポケモンに　あたえると\n捕まえ　やすくなる　きのみ。"
    jp_kanji: "ポケモンに　あたえると\n捕まえ　やすくなる　きのみ。"
    en: "A Berry that makes it easier to catch Pokémon when\ngiven to them."
    fr: "Une Baie à donner à un Pokémon sauvage pour pouvoir\nl’attraper plus facilement."
    it: "Bacca che facilita la cattura del Pokémon selvatico\na cui viene data."
    de: "Gibst du diese Beere einem Pokémon zu essen,\nlässt es sich leichter fangen."
    es: "Una baya que puedes lanzar a un Pokémon salvaje\npara que resulte bastante más fácil capturarlo."
    ko: "포켓몬에게 주면\n잡기 쉬워지는 나무열매."
    zh_simp: "把这树果交给宝可梦后，\n宝可梦就会变得容易捕捉。"
    zh_trad: "把這個樹果餵給寶可夢，\n就能讓牠們變得容易捕捉。"
simple_chairs:
  names:
    jp_kana: シンプルチェア
    jp_kanji: シンプルチェア
    en: Simple Chairs
    fr: Sièges Simples
    it: Sedie semplici
    de: Standard-Stühle
    es: Sillas Simples
    ko: 심플 체어
    zh_simp: 简约椅子
    zh_trad: 簡約椅子
  descriptions:
    jp_kana: "ピクニックで　使いやすい　イス。\nシンプルな　デザインで\n衝撃や　汚れにも　強い。"
    jp_kanji: "ピクニックで　使いやすい　イス。\nシンプルな　デザインで\n衝撃や　汚れにも　強い。"
    en: "A set of chairs that are ideal for picnicking. They have a\nsimple design that can stand up to both dirt and physical\nimpacts."
    fr: "Des sièges au design simple, parfaits pour\nles pique-niques. Ils résistent aux chocs\net ne se salissent pas."
    it: "Pratiche sedie, perfette per i picnic. Hanno un design\nsemplice e sono resistenti agli urti e allo sporco."
    de: "Diese Stühle sind gut geeignet für Picknicks. Sie haben\nein simples Design und sind stoß- sowie schmutzresistent."
    es: "Unas sillas ideales para irse de pícnic. Poseen un diseño\nsencillo y son resistentes a los arañazos y las manchas."
    ko: "피크닉에서 사용하기 편한 의자.\n심플한 디자인으로\n충격이나 오염에 강하다."
    zh_simp: "在野餐时很好用的椅子。\n设计简约，结实耐脏。"
    zh_trad: "野餐時很好用的椅子。\n設計簡約，堅固耐用且不怕髒。"
sinistea_chip:
  names:
    jp_kana: ヤバチャのかけら
    jp_kanji: ヤバチャのかけら
    en: Sinistea Chip
    fr: Fragment de Théffroi
    it: Coccio di Sinistea
    de: Fatalitee-Splitter
    es: Fragmento de Sinistea
    ko: 데인차의조각
    zh_simp: 来悲茶的碎片
    zh_trad: 來悲茶的碎片
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
sitrus_berry:
  names:
    jp_kana: オボンのみ
    jp_kanji: オボンのみ
    en: Sitrus Berry
    fr: Baie Sitrus
    it: Baccacedro
    de: Tsitrubeere
    es: Baya Zidra
    ko: 자뭉열매
    zh_simp: 文柚果
    zh_trad: 文柚果
  descriptions:
    jp_kana: "ポケモンに　持たせると\nＨＰを　少しだけ　回復する。"
    jp_kanji: "ポケモンに　持たせると\nＨＰを　少しだけ　回復する。"
    en: "If a Pokémon holds one of these Berries, it will be able\nto restore a small amount of HP to itself."
    fr: "Une Baie qui restaure quelques PV lorsqu’elle est tenue\npar un Pokémon."
    it: Se un Pokémon ha questa bacca, recupera un po’ di PS.
    de: "Als getragenes Item füllt diese Beere die KP des\nPokémon ein wenig auf."
    es: "Los Pokémon pueden llevarla y usarla para restaurar\nalgunos PS."
    ko: "포켓몬에게 지니게 하면\nHP를 조금 회복한다."
    zh_simp: "让宝可梦携带后，\n可以回复少量ＨＰ。"
    zh_trad: "讓寶可夢攜帶後，\n可以回復少量ＨＰ。"
