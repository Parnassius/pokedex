    jp_kana: ゆうかんミント
    jp_kanji: ゆうかんミント
    en: Brave Mint
    fr: Aromate Brave
    it: Menta Audace
    de: Mutig-Minze
    es: Menta Audaz
    ko: 용감민트
    zh_simp: 勇敢薄荷
    zh_trad: 勇敢薄荷
  descriptions:
    jp_kana: "ポケモンに　香りを　かがせると\n攻撃が　上がりやすく　なるが\n素早さは　上がりにくくなる　ミント。"
    jp_kanji: "ポケモンに　香りを　かがせると\n攻撃が　上がりやすく　なるが\n素早さは　上がりにくくなる　ミント。"
    en: "Having a Pokémon smell this mint can make its Attack\nstat grow stronger. However, its Speed stat may suffer."
    fr: "Si un Pokémon hume cet aromate, son Attaque\nmontera plus facilement, mais sa Vitesse\nse développera plus lentement."
    it: "Quando un Pokémon ne sente il profumo, il suo Attacco\naumenta più facilmente a scapito della Velocità."
    de: "Lässt man ein Pokémon an dieser Minze schnuppern,\nsteigt sein Angriff schneller, aber seine Initiative umso\nlangsamer."
    es: "Cuando un Pokémon percibe su aroma, aumenta con\nmás facilidad su Ataque, en detrimento de su Velocidad."
