sandwich:
  names:
    jp_kana: サンドウィッチ
    jp_kanji: サンドウィッチ
    en: Sandwich
    fr: Sandwich
    it: Panino
    de: Sandwich
    es: Bocadillo
    ko: 샌드위치
    zh_simp: 三明治
    zh_trad: 三明治
  descriptions:
    jp_kana: "野菜や　お肉などの　具材を\nパンで　はさんだ　料理。\nピクニックで　食べるのに　最適。"
    jp_kanji: "野菜や　お肉などの　具材を\nパンで　はさんだ　料理。\nピクニックで　食べるのに　最適。"
    en: "A dish made by sandwiching vegetables, meat, or other\ningredients between two pieces of bread. It makes a\nfantastic meal when out on a picnic."
    fr: "Un casse-croûte composé de divers ingrédients, tels\nque des légumes ou de la viande, et servi entre deux\ntranches de pain. Idéal pour un pique-nique."
    it: "Una pietanza realizzata mettendo vari ingredienti\ncome verdure o carne tra due fette di pane. Perfetto\nda mangiare durante i picnic."
    de: "Dieses Gericht besteht aus verschiedenen Belägen wie\nFleisch oder Gemüse, die zwischen zwei Scheiben Brot\nplatziert werden. Der ideale Imbiss für ein Picknick."
    es: "Un plato que consiste en verduras, carne u otros\ningredientes entre dos rebanadas de pan, perfecto\npara consumir en un pícnic."
    ko: "채소나 고기 등의 재료를\n빵 사이에 끼운 요리.\n피크닉에서 먹기 적당하다."
    zh_simp: "使用面包夹着蔬菜和\n肉类等馅料制成的料理。\n最适合在野餐时食用。"
    zh_trad: "用麵包夾著蔬菜、\n肉類等材料而成。\n作為野餐料理再適合不過。"
sandygast_sand:
  names:
    jp_kana: スナバァのすな
    jp_kanji: スナバァのすな
    en: Sandygast Sand
    fr: Sable de Bacabouh
    it: Sabbia di Sandygast
    de: Sankabuh-Sand
    es: Arena de Sandygast
    ko: 모래꿍의모래
    zh_simp: 沙丘娃的沙
    zh_trad: 沙丘娃的沙
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
