cranidos_spike:
  names:
    jp_kana: ズガイドスのトゲ
    jp_kanji: ズガイドスのトゲ
    en: Cranidos Spike
    fr: Piquant de Kranidos
    it: Punta di Cranidos
    de: Koknodon-Stachel
    es: Púa de Cranidos
    ko: 두개도스의가시
    zh_simp: 头盖龙的刺
    zh_trad: 頭蓋龍的刺
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
