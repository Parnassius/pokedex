    jp_kana: キュウショウロ
    jp_kanji: キュウショウロ
    en: Direshroom
    fr: Champiscoto
    it: Colpogone
    de: Volltrefferling
    es: Seta Crítica
    ko: 급소버섯
    zh_simp: 要害松露
    zh_trad: 要害松露
  descriptions:
    jp_kana: "食べると集中力が研ぎ澄まされ\n急所に当たる確率が増すキノコ。\nクリティカッターの材料となる。"
    jp_kanji: "食べると集中力が研ぎ澄まされ\n急所に当たる確率が増すキノコ。\nクリティカッターの材料となる。"
    en: "Mushrooms that, when consumed, sharpen the eater’s\nfocus. They make it easier to land critical hits and are\none of the materials needed for crafting Dire Hits."
    fr: "Ce champignon aide celui qui l’ingère à se concentrer\net augmente ses chances d’infliger des coups critiques.\nRequis pour la confection d’une fiole de Muscle +."
    it: "Fungo utilizzato nella preparazione di Supercolpi. Se\nmangiato, aumenta la concentrazione e la probabilità\ndi sferrare brutti colpi."
    de: "Dieser Pilz wird zur Herstellung von Treffervitaminen\ngenutzt. Sein Verzehr steigert die Konzentration und\nerhöht so die Volltrefferquote."
    es: "Seta que, al ser ingerida, aumenta la concentración y la\nprobabilidad de asestar golpes críticos. Es un\ningrediente vital de la Gragea Crítica."
    ko: "먹으면 집중력이 높아져서\n급소에 맞힐 확률이 오르는 버섯.\n크리티컬커터의 재료가 된다."
    zh_simp: "食用后会让注意力更加集中，\n增加击中要害机率的菇类。\n可作为要害攻击的材料。"
    zh_trad: "食用後會讓注意力更加集中，\n增加擊中要害機率的菇類。\n可作為要害攻擊的材料。"
discount_coupon:
  names:
