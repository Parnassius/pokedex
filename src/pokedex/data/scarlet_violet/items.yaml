    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
vulpix_candy:
  names:
    jp_kana: ロコンのアメ
    jp_kanji: ロコンのアメ
    en: Vulpix Candy
    fr: Bonbon Goupix
    it: Caramella Vulpix
    de: Vulpix-Bonbon
    es: Caramelo Vulpix
    ko: 식스테일의사탕
    zh_simp: 六尾的糖果
    zh_trad: 六尾的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
vulpix_fur:
  names:
    jp_kana: ロコンのけ
    jp_kanji: ロコンのけ
    en: Vulpix Fur
    fr: Poils de Goupix
    it: Pelo di Vulpix
    de: Vulpix-Haar
    es: Pelo de Vulpix
    ko: 식스테일의털
    zh_simp: 六尾的毛
    zh_trad: 六尾的毛
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
wacan_berry:
  names:
    jp_kana: ソクノのみ
    jp_kanji: ソクノのみ
    en: Wacan Berry
    fr: Baie Parma
    it: Baccaparmen
    de: Kerzalbeere
    es: Baya Gualot
    ko: 초나열매
    zh_simp: 烛木果
    zh_trad: 燭木果
  descriptions:
    jp_kana: "ポケモンに　持たせると\n効果バツグンの　でんき技を\n受けたとき　威力が　弱まる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　でんき技を\n受けたとき　威力が　弱まる。"
    en: "If a Pokémon holding this Berry is hit with a\nsupereffective Electric-type move, the power of that\nmove will be weakened."
    fr: "Tenue, cette Baie réduit les dégâts subis lorsque\nle Pokémon est touché par une capacité super efficace\nde type Électrik."
    it: "Se il Pokémon che ha questa bacca subisce una mossa\nsuperefficace di tipo Elettro, la potenza della mossa\nviene indebolita."
    de: "Als getragenes Item schwächt diese Beere eine\nsehr effektive Elektro-Attacke, von der das Pokémon\ngetroffen wird."
    es: "Si la lleva un Pokémon, debilita un ataque supereficaz\nde tipo Eléctrico que reciba."
    ko: "포켓몬에게 지니게 하면\n효과가 굉장한 전기 기술로\n공격받았을 때 위력이 약해진다."
    zh_simp: "让宝可梦携带后，\n在受到效果绝佳的电属性招式\n攻击时，能令其威力减弱。"
    zh_trad: "讓寶可夢攜帶後，\n在受到效果絕佳的電屬性招式\n攻擊時，能使其威力減弱。"
wailmer_pail:
  names:
    jp_kana: ホエルコじょうろ
    jp_kanji: ホエルコじょうろ
    en: Wailmer Pail
    fr: Wailmerrosoir
    it: Vaso Wailmer
    de: Wailmerkanne
    es: Wailmegadera
    ko: 고래왕자물뿌리개
    zh_simp: 吼吼鲸喷壶
    zh_trad: 吼吼鯨噴壺
  descriptions:
    jp_kana: "みずを　かける　道具。\n土に　うめた　きのみを\nすくすく　育てる。"
    jp_kanji: "みずを　かける　道具。\n土に　うめた　きのみを\nすくすく　育てる。"
    en: "A watering can shaped like a Wailmer. It helps\npromote the healthy growth of any Berries planted\nin soil."
    fr: Un objet qui sert à arroser les Baies plantées dans le sol.
    it: "Annaffiatoio a forma di Wailmer che aiuta a far\ncrescere rigogliose le piantine di bacche."
    de: "Eine Gießkanne. Gießt du mit ihr im Boden\nangepflanzte Beeren, wachsen sie schneller."
    es: "Regadera con forma de Wailmer. Muy útil para que\ncrezcan las bayas plantadas."
    ko: "물을 주는 도구.\n땅에 심은 나무열매를\n쑥쑥 키운다."
    zh_simp: "浇水的道具。\n能让埋在土壤里的\n树果快快长大。"
    zh_trad: "澆水的器具。\n能讓埋在土壤裡的\n樹果快快長大。"
wall_fragment:
  names:
    jp_kana: せきばんのかけら
    jp_kanji: せきばんのかけら
    en: Wall Fragment
    fr: Fragment de Mur
    it: Pezzo di lastra
    de: Plattenfragment
    es: Trozo de Losa
    ko: 석판조각
    zh_simp: 石板碎块
    zh_trad: 石板碎塊
  descriptions:
    jp_kana: "ズイの遺跡にあった石壁の一部。\n文字のような文様が刻まれている。"
    jp_kanji: "ズイの遺跡にあった石壁の一部。\n文字のような文様が刻まれている。"
    en: "A fragment that was once part of a stone panel in the\nSolaceon Ruins. It has markings carved on it that appear\nto be some kind of writing."
    fr: "Un fragment de mur des Ruines Bonvivre. On peut\ny voir des gravures qui évoquent des caractères."
    it: "Parte di una lastra originaria delle Rovine Flemma.\nVi sono incisi simboli simili a lettere."
    de: "Ein Teil der Steinplatte aus den Ruinen des Trostes.\nDarauf sind buchstabenähnliche Muster eingemeißelt."
    es: "Trozo de una vetusta losa situada en las Ruinas Sosiego\nen cuya superficie hay tallados ciertos caracteres."
    ko: "신수유적에 있던 석판의 일부.\n문자 같아 보이는 무늬가 새겨져 있다."
    zh_simp: "随意遗迹中石壁的一部分。\n上面刻着像是文字的纹路。"
    zh_trad: "隨意遺跡中石壁的一部分。\n上面刻著像是文字的紋路。"
warding_charm_b:
  names:
    jp_kana: けんこうおまもり２
    jp_kanji: けんこうおまもり２
    en: Warding Charm B
    fr: Zenamulette 2
    it: Amuleto salute 2
    de: Statustalisman 2
    es: Amuleto Salud 2
    ko: 건강부적2
    zh_simp: 健康护符２
    zh_trad: 健康護符２
  descriptions:
    jp_kana: "状態異常を回避する\n効果を秘めた不思議なおまもり。\n色が５種類あるうちのひとつ。"
    jp_kanji: "状態異常を回避する\n効果を秘めた不思議なおまもり。\n色が５種類あるうちのひとつ。"
    en: "A mysterious charm that holds the power to protect\na person from being afflicted with status conditions.\nThis type of charm comes in five different colors."
    fr: "Cette mystérieuse amulette renferme un pouvoir\nqui permet d’éviter les altérations de statut.\nElle existe en cinq couleurs différentes."
    it: "Misterioso amuleto che garantisce protezione contro\ni problemi di stato. Ne esistono di cinque colori\ndifferenti."
    de: "Ein mysteriöser Talisman, der dich vor Statusproblemen\nschützt. Dies ist eine von fünf Farbvarianten."
    es: "Amuleto imbuido de un extraño y misterioso poder que\notorga protección contra los problemas de estado. Este\nes uno de los cinco colores que existen."
    ko: "상태 이상을 회피하는\n효과가 담긴 신비한 부적.\n색이 다른 5종류 중 하나."
    zh_simp: "不可思议的护符。\n有着避免陷入异常状态的效果。\n是５种颜色的护符中的一种。"
    zh_trad: "不可思議的護符。\n有著避免陷入異常狀態的效果。\n是５種顏色的護符中的一種。"
warding_charm_p:
  names:
    jp_kana: けんこうおまもり３
