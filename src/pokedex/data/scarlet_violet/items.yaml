ultra_ball:
  names:
    jp_kana: ハイパーボール
    jp_kanji: ハイパーボール
    en: Ultra Ball
    fr: Hyper Ball
    it: Ultra Ball
    de: Hyperball
    es: Ultra Ball
    ko: 하이퍼볼
    zh_simp: 高级球
    zh_trad: 高級球
  descriptions:
    jp_kana: "スーパーボールよりも　さらに\nポケモンを　捕まえやすくなった\nすごく性能のいい　ボール。"
    jp_kanji: "スーパーボールよりも　さらに\nポケモンを　捕まえやすくなった\nすごく性能のいい　ボール。"
    en: "An ultra-high-performance Poké Ball that provides\na higher success rate for catching Pokémon than\na Great Ball."
    fr: "Une Poké Ball très performante dont le taux de réussite\nest supérieur à celui de la Super Ball."
    it: "Poké Ball dalle prestazioni eccellenti: fornisce\nmaggiori probabilità di cattura rispetto alla\nMega Ball."
    de: "Ein Ball mit hoher Erfolgsquote. Dem Superball in allen\nPunkten überlegen."
    es: "Poké Ball de rendimiento superior. Tiene un índice de\ncaptura mayor al de la Super Ball."
    ko: "슈퍼볼보다도 더욱\n포켓몬을 잡기 쉬워진\n매우 성능이 좋은 볼."
    zh_simp: "比起超级球来\n更容易捉到宝可梦的，\n性能非常不错的球。"
    zh_trad: "性能非常不錯的球。\n比起超級球\n更容易捉到寶可夢。"
ultra_ball:legends:
  names:
    jp_kana: ハイパーボール
    jp_kanji: ハイパーボール
    en: Ultra Ball
    fr: Hyper Ball
    it: Ultra Ball
    de: Hyperball
    es: Ultra Ball
    ko: 하이퍼볼
    zh_simp: 高级球
    zh_trad: 高級球
  descriptions:
    jp_kana: "スーパーボールよりも\nさらにポケモンを捕まえやすくなった\nすごく性能のいい不思議なボール。"
    jp_kanji: "スーパーボールよりも\nさらにポケモンを捕まえやすくなった\nすごく性能のいい不思議なボール。"
    en: "A mysterious ball that provides an even higher success\nrate for catching Pokémon than a Great Ball does."
    fr: "Cette étrange balle aux capacités étonnantes permet\nd’attraper les Pokémon plus facilement qu’avec une\nSuper Ball."
    it: "Poké Ball misteriosa dalle prestazioni eccellenti: fornisce\nmaggiori probabilità di cattura rispetto alla Mega Ball."
    de: "Mit diesem rätselhaften Ball sind Pokémon noch leichter\nzu fangen als mit einem Superball."
    es: "Misteriosa bola de rendimiento superior. Tiene un índice\nde captura mayor al de la Super Ball."
    ko: "슈퍼볼보다도\n더욱 포켓몬을 잡기 쉬워진\n매우 성능이 좋고 신비한 볼."
    zh_simp: "不可思议的球。比起超级球来\n更容易捉到宝可梦的，\n性能非常不错的球。"
    zh_trad: "不可思議的球。性能\n非常不錯。比起超級球\n更容易捉到寶可夢。"
ultra_ball:recipe:
  names:
