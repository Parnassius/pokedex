float_stone:
  names:
    jp_kana: かるいし
    jp_kanji: かるいし
    en: Float Stone
    fr: Pierrallégée
    it: Pietralieve
    de: Leichtstein
    es: Piedra Pómez
    ko: 가벼운돌
    zh_simp: 轻石
    zh_trad: 輕石
  descriptions:
    jp_kana: "とても軽い　石。\n持たせると　ポケモンの\n体重が　軽くなる。"
    jp_kanji: "とても軽い　石。\n持たせると　ポケモンの\n体重が　軽くなる。"
    en: "An item to be held by a Pokémon. This very light stone\nreduces the weight of the holder."
    fr: "Objet à tenir. Une pierre très légère qui réduit le poids\ndu Pokémon qui la tient."
    it: "Pietra leggerissima che riduce il peso del Pokémon\nche l’ha con sé."
    de: "Ein federleichter Stein, der das Gewicht des Trägers\nverringert."
    es: "Piedra muy ligera que reduce el peso del Pokémon que\nla lleve."
    ko: "매우 가벼운 돌.\n지니게 하면 포켓몬의\n체중이 가벼워진다."
    zh_simp: "非常轻的石头。\n携带后，宝可梦的体重会变轻。"
    zh_trad: "非常輕的石頭。\n攜帶後，寶可夢的\n體重會變輕。"
flower_pattern_cup:
  names:
    jp_kana: フラワーカップ
    jp_kanji: フラワーカップ
    en: Flower Pattern Cup
    fr: Tasse à Fleurs
    it: Tazza a fiori
    de: Blümchen-Tasse
    es: Taza Flores
    ko: 플라워 컵
    zh_simp: 花朵水杯
    zh_trad: 花朵水杯
  descriptions:
    jp_kana: "ピクニックで　子供が使う　カップ。\n軽くて　丈夫な　素材で　できている。\n重ねられるので　持ち運びにも　便利。"
    jp_kanji: "ピクニックで　子供が使う　カップ。\n軽くて　丈夫な　素材で　できている。\n重ねられるので　持ち運びにも　便利。"
    en: "A cup for kids to use at picnics. It’s made of light but\nstrong material. It’s stackable, which makes it handy for\ncarrying around."
    fr: "Une tasse à pique-nique très légère et solide, destinée\naux enfants. On peut les empiler facilement, ce qui\nles rend faciles à transporter."
    it: "Tazza da picnic pensata per i bambini. È realizzata con\nun materiale leggero ma resistente. Essendo impilabile\nè anche comoda da trasportare."
    de: "Diese Picknicktasse für Kinder besteht aus robustem und\nleichtem Material. Da sich solche Tassen stapeln lassen,\nkann man sie bequem überallhin mitnehmen."
    es: "Una taza de pícnic apta para los más peques, hecha\nde un material ligero pero resistente. Además, al ser\napilable, resulta muy cómoda de transportar."
    ko: "피크닉에서 어린이가 사용하는 컵.\n가볍고 튼튼한 소재로 만들어져 있다.\n겹쳐서 쌓을 수도 있어서 들고 다니기 편하다."
    zh_simp: "野餐时小孩使用的杯子。\n使用轻巧坚固的材料制成。\n能够叠起来，因此方便携带。"
    zh_trad: "小孩子在野餐時使用的水杯。\n由輕巧而堅固的材料製成。\n可以堆疊，所以也方便攜帶。"
flower_sweet:
  names:
    jp_kana: おはなアメざいく
    jp_kanji: おはなアメざいく
    en: Flower Sweet
    fr: Fleur en Sucre
    it: Bonbonfiore
    de: Zucker-Blume
    es: Confite Flor
    ko: 꽃사탕공예
    zh_simp: 花朵糖饰
    zh_trad: 花朵糖飾
  descriptions:
    jp_kana: "おはなの形をした　アメ細工。\nマホミルに　持たせてあげると\nくるくる　回って　喜ぶ。"
    jp_kanji: "おはなの形をした　アメ細工。\nマホミルに　持たせてあげると\nくるくる　回って　喜ぶ。"
    en: "A flower-shaped sweet. When a Milcery holds this,\nit spins around happily."
    fr: "Un bonbon en forme de fleur.\nQuand on le donne à un Crèmy, il se réjouit en tournant\nsur lui-même."
    it: "Bonbon a forma di fiore. Se dato a Milcery,\nil Pokémon farà le piroette per la felicità."
    de: "Zuckerwerk in Form einer Blume. Gibt man es Hokumil\nzum Tragen, dreht es sich vor Freude im Kreis."
    es: "Figura de caramelo con forma de flor. Al dárselo a\nMilcery, se pone a girar rebosante de alegría."
    ko: "꽃 모양의 사탕공예.\n마빌크에게 지니게 하면\n빙빙 돌며 기뻐한다."
    zh_simp: "花朵形状的工艺糖果。\n让小仙奶携带的话，\n会高兴地转圈圈。"
    zh_trad: "花朵形狀的工藝糖果。\n讓小仙奶攜帶的話，\n牠會高興得轉圈圈。"
fluffy_tail:
  names:
    jp_kana: エネコのシッポ
    jp_kanji: エネコのシッポ
    en: Fluffy Tail
    fr: Queue Skitty
    it: Coda Skitty
    de: Eneco-Rute
    es: Cola Skitty
    ko: 에나비꼬리
    zh_simp: 向尾喵的尾巴
    zh_trad: 向尾喵的尾巴
  descriptions:
    jp_kana: "ポケモンの　気をひかせる　道具。\n野生ポケモンとの　戦闘から\n絶対に　逃げられる。"
    jp_kanji: "ポケモンの　気をひかせる　道具。\n野生ポケモンとの　戦闘から\n絶対に　逃げられる。"
    en: "A toy that attracts the attention of Pokémon.\nIt guarantees escape from any battle with wild Pokémon."
    fr: "Un objet qui détourne l’attention d’un Pokémon.\nIl permet de s’enfuir d’un combat contre un Pokémon\nsauvage à coup sûr."
    it: "Strumento che attrae i Pokémon. Permette di fuggire\nimmancabilmente dalla lotta con un Pokémon selvatico."
    de: "Ein Item, das wilde Pokémon vom Kampfgeschehen\nablenkt und garantiert die Flucht ermöglicht."
    es: "Un objeto que atrae la atención de los Pokémon. Es útil\npara huir de un combate contra un Pokémon salvaje."
    ko: "포켓몬의 관심을 끄는 도구.\n야생 포켓몬과의 배틀에서\n반드시 도망칠 수 있다."
    zh_simp: "能吸引宝可梦注意的道具。\n在和野生宝可梦的\n战斗中绝对可以逃走。"
    zh_trad: "能吸引寶可夢注意的道具。\n在和野生寶可夢的\n戰鬥中絕對可以逃走。"
flying_gem:
  names:
    jp_kana: ひこうのジュエル
    jp_kanji: ひこうのジュエル
    en: Flying Gem
    fr: Joyau Vol
    it: Bijouvolante
    de: Flugjuwel
    es: Gema Volador
    ko: 비행주얼
    zh_simp: 飞行宝石
    zh_trad: 飛行寶石
  descriptions:
    jp_kana: "ひこうのタイプの　ジュエル。\n持たせると　１度だけ　ひこうの\n技の威力が　強まる。"
    jp_kanji: "ひこうのタイプの　ジュエル。\n持たせると　１度だけ　ひこうの\n技の威力が　強まる。"
    en: "An item to be held by a Pokémon. This gem is imbued\nwith the essence of flight and will boost the power of a\nFlying-type move—but only once."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Vol."
    it: "Strumento da dare a un Pokémon. Gioiello che potenzia\nuna sola volta le mosse di tipo Volante."
    de: "Ein Item zum Tragen. Dieses Juwel verstärkt einmalig\neine Attacke vom Typ Flug."
    es: "Joya de un solo uso que potencia un movimiento de\ntipo Volador. Debe llevarla un Pokémon."
    ko: "비행타입의 주얼.\n지니게 하면 한 번만 비행\n기술의 위력이 강해진다."
    zh_simp: "飞行属性的宝石。\n携带后，飞行属性的\n招式威力仅会增强１次。"
    zh_trad: "飛行屬性的寶石。\n攜帶後，飛行屬性招式的\n威力會僅增強１次。"
flying_memory:
  names:
    jp_kana: フライングメモリ
    jp_kanji: フライングメモリ
    en: Flying Memory
    fr: ROM Vol
    it: ROM Volante
    de: Flug-Disc
    es: Disco Volador
    ko: 플라잉메모리
    zh_simp: 飞翔存储碟
    zh_trad: 飛翔記憶碟
  descriptions:
    jp_kana: "ひこうタイプの　データが　入った\nメモリ。　特定のポケモンが　持つと\nタイプが　変わる。"
    jp_kanji: "ひこうタイプの　データが　入った\nメモリ。　特定のポケモンが　持つと\nタイプが　変わる。"
    en: "A memory disc that contains Flying-type data.\nIt changes the type of the holder if held by\na certain species of Pokémon."
    fr: "Une carte mémoire contenant des données sur\nle type Vol. Un certain Pokémon peut changer\nde type en l’équipant."
    it: "ROM contenente dati sul tipo Volante in formato\ndigitale. Permette a un certo Pokémon di cambiare tipo."
    de: "Eine Disc mit Daten zum Typ Flug. Sie löst bei einem\nbestimmten Pokémon einen Typenwechsel aus."
    es: "Disco de datos que contiene información relativa al tipo\nVolador. Permite cambiar de tipo a cierto Pokémon."
    ko: "비행타입의 데이터가 들어 있는\n메모리. 특정 포켓몬이\n지니면 타입이 바뀐다."
    zh_simp: "装有飞行属性数据的存储碟。\n特定宝可梦携带后，\n属性就会发生变化。"
    zh_trad: "裝有飛行屬性資料的記憶碟。\n特定寶可夢攜帶後，\n就會產生屬性的變化。"
flying_tera_shard:
  names:
    jp_kana: テラピースひこう
    jp_kanji: テラピースひこう
    en: Flying Tera Shard
    fr: Téra-Éclat Vol
    it: Teralite Volante
    de: Tera-Stück (Flug)
    es: Teralito Volador
    ko: 테라피스 비행
    zh_simp: 飞行太晶碎块
    zh_trad: 飛行太晶碎塊
  descriptions:
    jp_kana: "テラスタルポケモンが　倒れたとき\n砕けた　テラスタルジュエルが\nまれに　結晶化したもの。"
    jp_kanji: "テラスタルポケモンが　倒れたとき\n砕けた　テラスタルジュエルが\nまれに　結晶化したもの。"
    en: "On rare occasions, these shards form when a Tera\nPokémon falls in battle and its Tera Jewel shatters."
    fr: "Un fragment cristallisé qui se forme rarement lors\nde l’éclatement d’un Joyau Téracristal après qu’un\nPokémon Téracristal a été mis K.O."
    it: "Cristallizzazione che raramente si forma quando\nun Pokémon Teracristal viene sconfitto e la sua gemma\nTeracristal va in frantumi."
    de: "In äußerst seltenen Fällen kristallisieren Bruchstücke\ndes Terakristalls von im Kampf besiegten Terakristall-\nPokémon zu solchen Tera-Stücken."
    es: "Esquirla que se forma muy raramente cuando la joya\nTeracristal de un Pokémon teracristalizado se quiebra\ntras derrotarlo."
    ko: "테라스탈 포켓몬이 쓰러졌을 때\n부서진 테라스탈 주얼이\n드물게 결정화한 조각."
    zh_simp: "打倒太晶宝可梦时，\n破碎掉的太晶宝石有\n极低概率会结晶成此物。"
    zh_trad: "太晶寶可夢倒下時，\n碎裂的太晶寶石在罕見的情況下\n會結晶化，而形成此物。"
flyinium_z:bag:
  names:
    jp_kana: ヒコウＺ
    jp_kanji: ヒコウＺ
    en: Flyinium Z
    fr: Aérozélite
    it: Volantium Z
    de: Aerium Z
    es: Aerostal Z
    ko: 비행Z
    zh_simp: 飞行Ｚ
    zh_trad: 飛行Ｚ
  descriptions:
    jp_kana: "ひこうタイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    jp_kanji: "ひこうタイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nFlying-type moves to Flying-type Z-Moves."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise son porteur à transformer ses capacités\nde type Vol en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono ai Pokémon di trasformare le mosse\ndi tipo Volante in mosse Z."
    de: "Kristallisierte Z-Kraft, die Flug-Attacken zu Z-Attacken\naufstuft. Wird bei Bedarf automatisch vervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a los\nportadores convertir sus movimientos de tipo Volador\nen movimientos Z."
    ko: "비행타입 기술을\nZ기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将飞行属性招式升级成\nＺ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把飛行屬性招式\n升級為Ｚ招式的Ｚ力量結晶。"
flyinium_z:held:
  names:
    jp_kana: ヒコウＺ
    jp_kanji: ヒコウＺ
    en: Flyinium Z
    fr: Aérozélite
    it: Volantium Z
    de: Aerium Z
    es: Aerostal Z
    ko: 비행Z
    zh_simp: 飞行Ｚ
    zh_trad: 飛行Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　結晶。\nひこうタイプの　技を\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nひこうタイプの　技を\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Flying-type moves to Z-Moves."
    fr: "Une cristallisation de la Force Z, permettant\nde transformer les capacités de type Vol\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare le mosse di tipo Volante\nin mosse Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft\nFlug-Attacken zu Z-Attacken auf."
    es: "Cristal que confiere el Poder Z a los movimientos\nde tipo Volador."
    ko: "Z파워의 결정.\n비행타입 기술을\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将飞行属性的招式\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把飛行屬性的招式\n升級為Ｚ招式。"
focus_band:
  names:
    jp_kana: きあいのハチマキ
    jp_kanji: きあいのハチマキ
    en: Focus Band
    fr: Bandeau
    it: Bandana
    de: Fokusband
    es: Cinta Aguante
    ko: 기합의머리띠
    zh_simp: 气势头带
    zh_trad: 氣勢頭帶
  descriptions:
    jp_kana: "持たせると　ひんしに　なりそうな\n技を　受けても　ＨＰを　１だけ\n残して　耐えることが　ある。"
    jp_kanji: "持たせると　ひんしに　なりそうな\n技を　受けても　ＨＰを　１だけ\n残して　耐えることが　ある。"
    en: "An item to be held by a Pokémon. When the holder is hit\nwith a move that should knock it out, it may be able to\nendure with 1 HP."
    fr: "Objet à tenir pouvant parfois empêcher d’être mis K.O.,\nne laissant qu’un seul PV."
    it: "Strumento da dare a un Pokémon. Chi ce l’ha può\nevitare un potenziale KO e rimanere con un solo PS."
    de: "Ein Item zum Tragen. Der Träger bleibt nach einer\neigentlich fatalen Attacke eventuell mit 1 KP im Kampf."
    es: "El Pokémon que la lleva a veces resiste los golpes que\npotencialmente lo debilitarían y se queda con 1 PS."
    ko: "지니게 하면\n기절할 듯한 기술로 공격받아도\nHP를 1 남겨서 견디기도 한다."
    zh_simp: "携带后，即便受到\n可能会导致昏厥的招式，\n有时也能仅以１ＨＰ撑过去。"
    zh_trad: "攜帶後，即便受到\n可能會導致瀕死的招式，\n有時也能僅以１ＨＰ撐過去。"
focus_sash:
  names:
    jp_kana: きあいのタスキ
    jp_kanji: きあいのタスキ
    en: Focus Sash
    fr: Ceinture Force
    it: Focalnastro
    de: Fokusgurt
    es: Banda Aguante
    ko: 기합의띠
    zh_simp: 气势披带
    zh_trad: 氣勢披帶
  descriptions:
    jp_kana: "持たせると　ＨＰが　満タンのとき\nひんしになりそうな　技を　受けても\nＨＰ１で　１度だけ　耐える。"
    jp_kanji: "持たせると　ＨＰが　満タンのとき\nひんしになりそうな　技を　受けても\nＨＰ１で　１度だけ　耐える。"
    en: "An item to be held by a Pokémon. If the holder has full\nHP and it is hit with a move that should knock it out,\nit will endure with 1 HP—but only once."
    fr: "Objet à tenir. S’il a encore tous ses PV, le porteur\npourra éviter d’être mis K.O. en un coup.\nIl ne conservera alors qu’un seul PV."
    it: "Strumento da dare a un Pokémon. Se il Pokémon ha tutti\ni PS, eviterà un potenziale KO, rimanendo con un PS."
    de: "Ein Item zum Tragen. Sorgt bei vollen KP des Trägers\neinmalig dafür, dass er nach einer eigentlich fatalen\nAttacke mit 1 KP im Kampf bleibt."
    es: "Si el Pokémon que la lleva tiene los PS al máximo, resiste\nuna vez un golpe que lo debilitaría y se queda con 1 PS."
    ko: "지니게 하면 HP가 꽉 찼을 때\n기절할 듯한 기술로 공격받아도\nHP 1로 한 번은 버틴다."
    zh_simp: "携带后，在ＨＰ全满时，\n即便受到可能会导致昏厥的招式，\n也能仅以１ＨＰ撑过去１次。"
    zh_trad: "攜帶後，在ＨＰ全滿時，\n即使受到可能導致瀕死的招式攻擊，\n也能以１ＨＰ撐過１次。"
fomantis_leaf:
  names:
    jp_kana: カリキリのはっぱ
    jp_kanji: カリキリのはっぱ
    en: Fomantis Leaf
    fr: Feuille de Mimantis
    it: Foglia di Fomantis
    de: Imantis-Blatt
    es: Hoja de Fomantis
    ko: 짜랑랑의잎
    zh_simp: 伪螳草的叶片
    zh_trad: 偽螳草的葉片
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
foongus_spores:
  names:
    jp_kana: タマゲタケのほうし
    jp_kanji: タマゲタケのほうし
    en: Foongus Spores
    fr: Spores de Trompignon
    it: Spore di Foongus
    de: Tarnpignon-Spore
    es: Esporas de Foongus
    ko: 깜놀버슬의포자
    zh_simp: 哎呀球菇的孢子
    zh_trad: 哎呀球菇的孢子
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
forage_bag:
  names:
    jp_kana: ざいりょうぶくろ
    jp_kanji: ざいりょうぶくろ
    en: Forage Bag
    fr: Sac Ingrédients
    it: Portaingredienti
    de: Zutatenbeutel
    es: Zurrón
    ko: 재료주머니
    zh_simp: 材料袋
    zh_trad: 材料袋
  descriptions:
    jp_kana: "ジャングルで　集めた\n材料を　まとめておく　ふくろ。\nマオの試練で　使う。"
    jp_kanji: "ジャングルで　集めた\n材料を　まとめておく　ふくろ。\nマオの試練で　使う。"
    en: "A bag to carry ingredients gathered during Mallow’s\ntrial in the jungle."
    fr: "Un sac pour mettre les ingrédients récoltés dans\nla jungle, utilisé dans l’Épreuve de Barbara."
    it: "Sacchetto in cui mettere gli ingredienti trovati nella\nGiungla Ombrosa, necessari per la prova di Ibis."
    de: "Ein Beutel zum Aufbewahren der Zutaten, die man im\nDschungel sammelt. Er wird bei Mahos Prüfung benutzt."
    es: "Saco para guardar ingredientes, indispensable en la\nJungla Umbría para superar la prueba de Lulú."
    ko: "정글에서 모은\n재료를 모아 두는 주머니.\n마오의 시련에서 사용한다."
    zh_simp: "将丛林里收集到的材料\n装在一起的袋子。\n在玛奥的考验中使用。"
    zh_trad: "把叢林裡收集到的材料\n放在一起的袋子。\n會在瑪奧的考驗中使用。"
forest_balm:
  names:
    jp_kana: もりのシズメダマ
    jp_kanji: もりのシズメダマ
    en: Forest Balm
    fr: Pacifi-Forêt
    it: Sferazen foresta
    de: Waldruhegabe
    es: Calmasfera Bosque
    ko: 숲의진정환
    zh_simp: 森之镇宝
    zh_trad: 森之鎮寶
  descriptions:
    jp_kana: "荒ぶる森キング　バサギリを\n鎮めることができる\n不思議な香りを発する。"
    jp_kanji: "荒ぶる森キング　バサギリを\n鎮めることができる\n不思議な香りを発する。"
    en: "A mysterious balm that gives off a soothing scent.\nIt can be used to help calm the frenzy of the Lord of\nthe Woods, Kleavor."
    fr: "L’étrange parfum que dégage cet objet permet d’apaiser\nla frénésie de Hachécateur, le Roi de la Forêt."
    it: "Emana un misterioso profumo in grado di placare\nla collera di Kleavor, il Re delle foreste."
    de: "Dieses Säckchen verströmt einen mysteriösen Duft.\nMit ihm kann man Axantor, den König des Waldes,\nbesänftigen."
    es: "Esfera que emana un peculiar aroma capaz de calmar a\nKleavor, el Señor de los Bosques, cuando se encuentra\nfurioso."
    ko: "폭주하는 숲의 왕 사마자르를\n진정시킬 수 있는\n신비한 향기가 난다."
    zh_simp: "能让狂暴的森林王\n劈斧螳螂镇静下来。\n散发着不可思议的香气。"
    zh_trad: "能讓狂暴的森林王\n劈斧螳螂鎮靜下來。\n散發著不可思議的香氣。"
fossilized_bird:
  names:
    jp_kana: カセキのトリ
    jp_kanji: カセキのトリ
    en: Fossilized Bird
    fr: Fossile Oiseau
    it: Ornitofossile
    de: Vogelfossil
    es: Ornitofósil
    ko: 화석새
    zh_simp: 化石鸟
    zh_trad: 化石鳥
  descriptions:
    jp_kana: "大昔　空を　飛んでいた\n古代ポケモンの　カセキの一部。\nどんな姿　だったのかは　謎。"
    jp_kanji: "大昔　空を　飛んでいた\n古代ポケモンの　カセキの一部。\nどんな姿　だったのかは　謎。"
    en: "A fossil piece left behind by a prehistoric Pokémon that\nonce soared through the sky. What it looked like is\na mystery."
    fr: "Un morceau du fossile d’un ancien Pokémon volant.\nNul ne sait à quoi il ressemblait."
    it: "Parte del fossile di un Pokémon preistorico che solcava\ni cieli. Nessuno sa quale fosse il suo aspetto."
    de: "Teilstück des Fossils eines urzeitlichen Pokémon,\ndas in grauer Vorzeit durch die Lüfte flog. Wie es\nzu Lebzeiten aussah, ist ein Rätsel."
    es: "Parte del fósil de un Pokémon prehistórico que surcaba\nlos cielos. Su apariencia sigue siendo una incógnita."
    ko: "오랜 옛날 하늘을 날던\n고대 포켓몬 화석의 일부.\n어떤 모습이었는지는 수수께끼다."
    zh_simp: "远古时代的宝可梦化石残片。\n它曾翱翔于天空，\n本来面目至今仍是未解之谜。"
    zh_trad: "很久以前曾翱翔天際的\n古代寶可夢的化石碎片。\n本來面目至今仍是個謎。"
fossilized_dino:
  names:
    jp_kana: カセキのクビナガ
    jp_kanji: カセキのクビナガ
    en: Fossilized Dino
    fr: Fossile Aileron
    it: Plesiofossile
    de: Paddelfossil
    es: Plesiofósil
    ko: 화석긴목
    zh_simp: 化石海兽
    zh_trad: 化石海獸
  descriptions:
    jp_kana: "大昔　海に　すんでいた\n古代ポケモンの　カセキの一部。\nどんな姿　だったのかは　謎。"
    jp_kanji: "大昔　海に　すんでいた\n古代ポケモンの　カセキの一部。\nどんな姿　だったのかは　謎。"
    en: "A fossil piece left behind by a prehistoric Pokémon that\nonce lived in the sea. What it looked like is a mystery."
    fr: "Un morceau du fossile d’un ancien Pokémon aquatique.\nNul ne sait à quoi il ressemblait."
    it: "Parte del fossile di un Pokémon preistorico che viveva\nin mare. Nessuno sa quale fosse il suo aspetto."
    de: "Teilstück des Fossils eines urzeitlichen Pokémon,\ndas in grauer Vorzeit im Meer lebte. Wie es zu\nLebzeiten aussah, ist ein Rätsel."
    es: "Parte del fósil de un Pokémon prehistórico que habitaba\nen el mar. Su apariencia sigue siendo una incógnita."
    ko: "오랜 옛날 바다에 살았던\n고대 포켓몬 화석의 일부.\n어떤 모습이었는지는 수수께끼다."
    zh_simp: "远古时代的宝可梦化石残片。\n它曾栖息于大海，\n本来面目至今仍是未解之谜。"
    zh_trad: "很久以前棲息在海裡的\n古代寶可夢的化石碎片。\n本來面目至今仍是個謎。"
fossilized_drake:
  names:
    jp_kana: カセキのリュウ
    jp_kanji: カセキのリュウ
    en: Fossilized Drake
    fr: Fossile Dragon
    it: Dracofossile
    de: Drachenfossil
    es: Dracofósil
    ko: 화석용
    zh_simp: 化石龙
    zh_trad: 化石龍
  descriptions:
    jp_kana: "大昔　陸に　すんでいた\n古代ポケモンの　カセキの一部。\nどんな姿　だったのかは　謎。"
    jp_kanji: "大昔　陸に　すんでいた\n古代ポケモンの　カセキの一部。\nどんな姿　だったのかは　謎。"
    en: "A fossil piece left behind by a prehistoric Pokémon that\nonce roamed the land. What it looked like is a mystery."
    fr: "Un morceau du fossile d’un ancien Pokémon terrestre.\nNul ne sait à quoi il ressemblait."
    it: "Parte del fossile di un Pokémon preistorico che viveva\nsulla terraferma. Nessuno sa quale fosse il suo aspetto."
    de: "Teilstück des Fossils eines urzeitlichen Pokémon,\ndas in grauer Vorzeit das Land bevölkerte. Wie es\nzu Lebzeiten aussah, ist ein Rätsel."
    es: "Parte del fósil de un Pokémon prehistórico que habitaba\nen tierra firme. Su aspecto sigue siendo una incógnita."
    ko: "오랜 옛날 육지에 살았던\n고대 포켓몬 화석의 일부.\n어떤 모습이었는지는 수수께끼다."
    zh_simp: "远古时代的宝可梦化石残片。\n它曾栖息于陆地，\n本来面目至今仍是未解之谜。"
    zh_trad: "很久以前棲息在陸地的\n古代寶可夢的化石碎片。\n本來面目至今仍是個謎。"
fossilized_fish:
  names:
    jp_kana: カセキのサカナ
    jp_kanji: カセキのサカナ
    en: Fossilized Fish
    fr: Fossile Poisson
    it: Ittiofossile
    de: Fischfossil
    es: Ictiofósil
    ko: 화석물고기
    zh_simp: 化石鱼
    zh_trad: 化石魚
  descriptions:
    jp_kana: "大昔　海に　すんでいた\n古代ポケモンの　カセキの一部。\nどんな姿　だったのかは　謎。"
    jp_kanji: "大昔　海に　すんでいた\n古代ポケモンの　カセキの一部。\nどんな姿　だったのかは　謎。"
    en: "A fossil piece left behind by a prehistoric Pokémon that\nonce lived in the sea. What it looked like is a mystery."
    fr: "Un morceau du fossile d’un ancien Pokémon aquatique.\nNul ne sait à quoi il ressemblait."
    it: "Parte del fossile di un Pokémon preistorico che viveva\nin mare. Nessuno sa quale fosse il suo aspetto."
    de: "Teilstück des Fossils eines urzeitlichen Pokémon,\ndas in grauer Vorzeit im Meer lebte. Wie es zu\nLebzeiten aussah, ist ein Rätsel."
    es: "Parte del fósil de un Pokémon prehistórico que habitaba\nen el mar. Su apariencia sigue siendo una incógnita."
    ko: "오랜 옛날 바다에 살았던\n고대 포켓몬 화석의 일부.\n어떤 모습이었는지는 수수께끼다."
    zh_simp: "远古时代的宝可梦化石残片。\n它曾栖息于大海，\n本来面目至今仍是未解之谜。"
    zh_trad: "很久以前棲息在海裡的\n古代寶可夢的化石碎片。\n本來面目至今仍是個謎。"
fresh_cream:
  names:
    jp_kana: しんせんクリーム
    jp_kanji: しんせんクリーム
    en: Fresh Cream
    fr: Crème Fraîche
    it: Panna da cucina
    de: Frische Sahne
    es: Nata Fresca
    ko: 신선한크림
    zh_simp: 鲜鲜奶油
    zh_trad: 鮮鮮奶油
  descriptions:
    jp_kana: "キャンプの　料理に　使う\n食材の　一種。辛い　カレーに\nホイップを　足すことで　甘くする。"
    jp_kanji: "キャンプの　料理に　使う\n食材の　一種。辛い　カレーに\nホイップを　足すことで　甘くする。"
    en: "One of the many ingredients that can be used for\ncooking at your camp. Add some whipped cream to a\nspicy curry to give it some sweetness."
    fr: "Un ingrédient de cuisine pour le camping.\nEn fouettant cette crème, elle peut être ajoutée\nà un curry pour y apporter de la douceur."
    it: "Uno degli ingredienti che puoi usare per cucinare\nin campeggio. Si può aggiungere a un curry\npiccante per renderlo più dolce."
    de: "Eine Zutat für PokéCamping-Mahlzeiten. Gibt man in\nein pikantes Curry ein bisschen Schlagsahne, wird es\ndadurch cremig und süß."
    es: "Un ingrediente para cocinar en el campamento. La nata\nda un toque dulce a la salsa picante del curri."
    ko: "캠프 요리에 사용되는\n식재료 중 하나. 매운 카레에\n휘핑크림을 넣으면 달콤해진다."
    zh_simp: "在露营营地制作料理时会使用的\n一种食材。在辣味的咖喱中\n加入奶油，使滋味变得香甜可口。"
    zh_trad: "製作露營料理時使用的食材之一。\n辛辣的咖哩中加入鮮奶油，\n能使味道變得香甜。"
fresh_start_mochi:
  names:
    jp_kana: まっさらもち
    jp_kanji: まっさらもち
    en: Fresh-Start Mochi
    fr: Mochi Renouveau
    it: Mochi del ripristino
    de: Neuanfangs-Mochi
    es: Mochi Reinicio
    ko: 순백떡
    zh_simp: 净空粘糕
    zh_trad: 淨空糬
  descriptions:
    jp_kana: "きのみが　ねりこまれた　もち。\nポケモンの　基礎ポイントが\nすべて　なくなってしまう。"
    jp_kanji: "きのみが　ねりこまれた　もち。\nポケモンの　基礎ポイントが\nすべて　なくなってしまう。"
    en: "A mochi cake with Berries kneaded into its dough.\nIt causes a Pokémon to lose all its base points."
    fr: "Un mochi contenant des Baies qui réinitialise tous\nles points de base d’un Pokémon."
    it: "Mochi preparato con un impasto a base di bacche.\nAzzera tutti i punti base."
    de: "Ein mit Beeren gefüllter Mochi, der alle Basispunkte\neines Pokémon zurücksetzt."
    es: "La masa de este mochi está preparada con bayas.\nRestablece todos los puntos de base de un Pokémon."
    ko: "으깬 나무열매가 들어 있는 떡.\n포켓몬의 기초 포인트가\n모두 사라지게 된다."
    zh_simp: "糅合树果的粘糕。\n能让宝可梦的基础点数\n全部消失。"
    zh_trad: "加入樹果揉製而成的麻糬。\n能讓寶可夢的基礎點數\n全部消失。"
fresh_water:
  names:
    jp_kana: おいしいみず
    jp_kanji: おいしいみず
    en: Fresh Water
    fr: Eau Fraîche
    it: Acqua fresca
    de: Tafelwasser
    es: Agua Fresca
    ko: 맛있는물
    zh_simp: 美味之水
    zh_trad: 美味之水
  descriptions:
    jp_kana: "ミネラル　たっぷりの　水。\nポケモン　１匹の　ＨＰを\n３０だけ　回復する。"
    jp_kanji: "ミネラル　たっぷりの　水。\nポケモン　１匹の　ＨＰを\n３０だけ　回復する。"
    en: "Water with high mineral content. It can be used to\nrestore 30 HP to a Pokémon."
    fr: "Une eau riche en minéraux.\nRestaure 30 PV d’un Pokémon."
    it: "Acqua ricca di sostanze minerali. Restituisce 30 PS\na un Pokémon."
    de: "Ein stilles Wasser mit hohem Mineralienanteil, das die\nKP eines Pokémon um 30 Punkte auffüllt."
    es: "Agua de alto contenido mineral que restaura 30 PS de\nun Pokémon."
    ko: "미네랄이 가득한 물.\n포켓몬 1마리의 HP를\n30만큼 회복한다."
    zh_simp: "富含矿物质的水。\n能让１只宝可梦\n回复３０ＨＰ。"
    zh_trad: "含有豐富礦物質的水。\n能讓１隻寶可夢\n回復３０ＨＰ。"
fried_fillet:
  names:
    jp_kana: きりみフライ
    jp_kanji: きりみフライ
    en: Fried Fillet
    fr: Filet Frit
    it: Filetto impanato
    de: Frittierfilet
    es: Filete Frito
    ko: 튀긴토막
    zh_simp: 炸鱼片
    zh_trad: 炸魚片
  descriptions:
    jp_kana: "塩味と　苦味が　強い　食材。\nサンドウィッチに　するならば\n酸味がある　味つけが　よい。"
    jp_kanji: "塩味と　苦味が　強い　食材。\nサンドウィッチに　するならば\n酸味がある　味つけが　よい。"
    en: "When used in a sandwich, this very salty and bitter\ningredient is at its best paired with sour seasonings."
    fr: "Un ingrédient au goût très salé et amer. Dans un\nSandwich, il s’accorde mieux avec des aliments\naux saveurs plus acides."
    it: "Un ingrediente molto salato e amaro. Nei panini\nè ottimo accompagnato da un condimento aspro."
    de: "Verwendet man sie als Sandwichbelag, sollte man diese\nsehr salzige sowie bittere Zutat am besten säuerlich\nwürzen."
    es: "Un ingrediente con un fuerte toque salado y amargo que\ncombina especialmente bien con condimentos ácidos."
    ko: "짠맛과 쓴맛이 강한 식재료.\n샌드위치에 넣을 거라면\n신맛을 첨가하는 것이 좋다."
    zh_simp: "咸味和苦味强烈的食材。\n若要用来制作三明治，\n调味时最好加入酸味。"
    zh_trad: "鹹味和苦味強勁的食材。\n若要用於三明治，\n建議佐以酸味。"
fried_food:
  names:
    jp_kana: フライもりあわせ
    jp_kanji: フライもりあわせ
    en: Fried Food
    fr: Fritures
    it: Fritto misto
    de: Frittiertes
    es: Frituras
    ko: 모둠튀김
    zh_simp: 炸物拼盘
    zh_trad: 炸物拼盤
  descriptions:
    jp_kana: "キャンプの　料理に　使う\n食材の　一種。揚げてから\n時間がたつので　少し　油っこい。"
    jp_kanji: "キャンプの　料理に　使う\n食材の　一種。揚げてから\n時間がたつので　少し　油っこい。"
    en: "One of the many ingredients that can be used for\ncooking at your camp. It’s been a while since it was\nfried, so it’s gotten greasy."
    fr: "Un ingrédient de cuisine pour le camping.\nCes fritures sont sorties de la friteuse depuis\nun moment déjà, et l’huile a commencé à couler."
    it: "Uno degli ingredienti che puoi usare per cucinare\nin campeggio. È passato del tempo dal momento\ndella frittura, per cui è un po’ untuoso."
    de: "Eine Zutat für PokéCamping-Mahlzeiten. Diese Beilagen\nsind recht fettig, da sie schon vor einer Weile aus der\nFritteuse geholt wurden."
    es: "Un ingrediente para cocinar en el campamento. A\nmedida que pasa el tiempo se van volviendo más\naceitosas."
    ko: "캠프 요리에 사용되는\n식재료 중 하나. 튀기고\n시간이 좀 지나서 살짝 느끼하다."
    zh_simp: "在露营营地制作料理时会使用的\n一种食材。炸完出锅后\n放置了一段时间，所以稍稍有些油腻。"
    zh_trad: "製作露營料理時使用的食材之一。\n已經炸好一段時間，\n所以有點油膩。"
friend_ball:
  names:
    jp_kana: フレンドボール
    jp_kanji: フレンドボール
    en: Friend Ball
    fr: Copain Ball
    it: Friend Ball
    de: Freundesball
    es: Amigo Ball
    ko: 프렌드볼
    zh_simp: 友友球
    zh_trad: 友友球
  descriptions:
    jp_kana: "捕まえた　野生ポケモンが\nすぐに　なついてくれる\nちょっと変わった　ボール。"
    jp_kanji: "捕まえた　野生ポケモンが\nすぐに　なついてくれる\nちょっと変わった　ボール。"
    en: "A somewhat different Poké Ball that makes a wild\nPokémon more friendly toward you immediately after\nit’s caught."
    fr: "Une Poké Ball un peu spéciale qui permet de rendre\nrapidement amicaux les Pokémon sauvages attrapés\navec celle-ci."
    it: "Poké Ball un po’ diversa che fa sì che i Pokémon selvatici\ncon essa catturati si affezionino più rapidamente."
    de: "Ein besonderer Ball, der die Sympathie von\ngefangenen Pokémon sofort ansteigen lässt."
    es: "Poké Ball algo distinta a las demás que hace más\namistosos a los Pokémon salvajes inmediatamente\ntras capturarlos."
    ko: "잡은 야생 포켓몬이\n바로 친밀해지는\n조금 특이한 볼."
    zh_simp: "有点与众不同的球。\n捉到的野生宝可梦会立刻\n变得和训练家亲密起来。"
    zh_trad: "有點與眾不同的球。\n捉到的野生寶可夢會立刻\n和訓練家變得親密。"
frigibax_scales:
  names:
    jp_kana: セビエのウロコ
    jp_kanji: セビエのウロコ
    en: Frigibax Scales
    fr: Écaille de Frigodo
    it: Squama di Frigibax
    de: Frospino-Schuppe
    es: Escama de Frigibax
    ko: 드니차의비늘
    zh_simp: 凉脊龙的鳞片
    zh_trad: 涼脊龍的鱗片
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
fruit_bunch:
  names:
    jp_kana: フサパック
    jp_kanji: フサパック
    en: Fruit Bunch
    fr: Fruits
    it: Frutti
    de: Früchte
    es: Fruta Tropical
    ko: 송이팩
    zh_simp: 袋装果实
    zh_trad: 袋裝果實
  descriptions:
    jp_kana: "キャンプの　料理に　使う\n食材の　一種。トロトロに　なった\nフサが　トロピカル気分に　させてくれる。"
    jp_kanji: "キャンプの　料理に　使う\n食材の　一種。トロトロに　なった\nフサが　トロピカル気分に　させてくれる。"
    en: "One of the many ingredients that can be used for\ncooking at your camp. The syrupy fruits give off a strong\ntropical feel."
    fr: "Un ingrédient de cuisine pour le camping.\nLes fruits écrasés donnent un parfum tropical\nà toute préparation."
    it: "Uno degli ingredienti che puoi usare per cucinare\nin campeggio. La loro polpa conferisce alle pietanze\nun sapore tropicale."
    de: "Eine Zutat für PokéCamping-Mahlzeiten. Die weichen\nFrüchte verleihen dem Essen eine tropische Note."
    es: "Un ingrediente para cocinar en el campamento.\nLa jugosa fruta aporta un toque tropical al plato."
    ko: "캠프 요리에 사용되는\n식재료 중 하나. 걸쭉해진 송이가\n열대지방의 기분을 느끼게 해 준다."
    zh_simp: "在露营营地制作料理时会使用的\n一种食材。煮得粘稠浓厚的水果，\n能为料理增添一份热带风情。"
    zh_trad: "製作露營料理時使用的食材之一。\n煮得黏糊糊的果實能為料理\n帶來一份熱帶風情。"
full_heal:
  names:
    jp_kana: なんでもなおし
    jp_kanji: なんでもなおし
    en: Full Heal
    fr: Total Soin
    it: Cura totale
    de: Hyperheiler
    es: Cura Total
    ko: 만병통치제
    zh_simp: 万灵药
    zh_trad: 萬靈藥
  descriptions:
    jp_kana: "スプレー式の　薬。\nポケモン　１匹の　状態の\n異常を　すべて　回復する。"
    jp_kanji: "スプレー式の　薬。\nポケモン　１匹の　状態の\n異常を　すべて　回復する。"
    en: "A spray-type medicine that is broadly effective. It can be\nused to cure any status condition a Pokémon may have."
    fr: "Un médicament sous forme de spray.\nSoigne toutes les altérations de statut d’un Pokémon."
    it: "Rimedio spray. Cura tutti i problemi di stato\ndi un Pokémon."
    de: "Ein Spray, das alle Statusprobleme eines Pokémon\nbehebt."
    es: "Medicina en espray que cura todos los problemas de\nestado de un Pokémon."
    ko: "스프레이식의 약.\n포켓몬 1마리의\n상태 이상을 모두 회복한다."
    zh_simp: "喷雾式药水。\n能治愈１只宝可梦的\n所有异常状态。"
    zh_trad: "噴霧式藥水。\n能治癒１隻寶可夢的\n所有異常狀態。"
full_heal:recipe:
  names:
    jp_kana: なんでもなおし
    jp_kanji: なんでもなおし
    en: Full Heal
    fr: Total Soin
    it: Cura totale
    de: Hyperheiler
    es: Cura Total
    ko: 만병통치제
    zh_simp: 万灵药
    zh_trad: 萬靈藥
  descriptions:
    jp_kana: "なんでもなおしのレシピ。　材料は\nクラボのみ×１　モモンのみ×１\nチーゴのみ×１　ナナシのみ×１"
    jp_kanji: "なんでもなおしのレシピ。　材料は\nクラボのみ×１　モモンのみ×１\nチーゴのみ×１　ナナシのみ×１"
    en: "A recipe for crafting Full Heals from scratch.\nRequired materials: 1 Cheri Berry, 1 Pecha Berry,\n1 Rawst Berry, and 1 Aspear Berry."
    fr: "Méthode pour Total Soin. Ressources requises :\n1 Baie Ceriz, 1 Baie Pêcha, 1 Baie Fraive et 1 Baie Willia."
    it: "Ricetta per una Cura totale. Richiede 1 Baccaliegia,\n1 Baccapesca, 1 Baccafrago e 1 Baccaperina."
    de: "Die Anleitung zur Herstellung eines Hyperheilers.\nBenötigte Materialien: 1 Amrenabeere, 1 Pirsifbeere,\n1 Fragiabeere und 1 Wilbirbeere."
    es: "Receta para crear Curas Totales. Materiales:\n1 Baya Zreza, 1 Baya Meloc, 1 Baya Safre y\n1 Baya Perasi."
    ko: "만병통치제의 레시피.\n재료: 버치열매×1 복슝열매×1\n복분열매×1 배리열매×1"
    zh_simp: "万灵药的材料单。材料是：\n樱子果×１　桃桃果×１\n莓莓果×１　利木果×１"
    zh_trad: "萬靈藥的材料單。材料是：\n櫻子果×１　桃桃果×１\n莓莓果×１　利木果×１"
full_incense:
  names:
    jp_kana: まんぷくおこう
    jp_kanji: まんぷくおこう
    en: Full Incense
    fr: Encens Plein
    it: Gonfioaroma
    de: Lahmrauch
    es: Incienso Lento
    ko: 만복향로
    zh_simp: 饱腹薰香
    zh_trad: 飽腹薰香
  descriptions:
    jp_kana: "不思議な香りの　御香。\n持たせた　ポケモンは　いつもより\n行動が遅くなる。"
    jp_kanji: "不思議な香りの　御香。\n持たせた　ポケモンは　いつもより\n行動が遅くなる。"
    en: "An item to be held by a Pokémon. This incense has\na curious aroma that makes the holder move slower\nthan usual."
    fr: "Objet à tenir. Un encens au parfum curieux\nqui fait enfler son porteur et le fait se déplacer\nlentement."
    it: "Strumento da dare a un Pokémon. Incenso dal profumo\nesotico che rende lenti."
    de: "Ein Item zum Tragen. Dieses exotische Räucherwerk\nmacht den Träger langsamer als gewöhnlich."
    es: "Incienso de exótico aroma que hace que el Pokémon\nque lo lleve actúe más despacio."
    ko: "이상한 향기의 향로.\n지니게 한 포켓몬은 여느 때보다\n행동이 느려진다."
    zh_simp: "有着神奇香气的薰香。\n携带后，宝可梦的行动\n会比平时更加迟缓。"
    zh_trad: "有著神奇香氣的薰香。\n攜帶它的寶可夢\n行動會比平時更加緩慢。"
full_restore:
  names:
    jp_kana: かいふくのくすり
    jp_kanji: かいふくのくすり
    en: Full Restore
    fr: Guérison
    it: Ricarica totale
    de: Top-Genesung
    es: Restaurar Todo
    ko: 회복약
    zh_simp: 全复药
    zh_trad: 全復藥
  descriptions:
    jp_kana: "ポケモン　１匹の　ＨＰと\n状態異常を　すべて\n回復する。"
    jp_kanji: "ポケモン　１匹の　ＨＰと\n状態異常を　すべて\n回復する。"
    en: "A medicine that can be used to fully restore the max HP\nof a Pokémon and cure any status condition it may have."
    fr: "Un médicament qui restaure tous les PV d’un Pokémon\net soigne toutes ses altérations de statut."
    it: "Rimedio che restituisce tutti i PS a un Pokémon\ne cura tutti i suoi problemi di stato."
    de: "Füllt die KP eines Pokémon wieder vollständig auf und\nbehebt alle Statusprobleme."
    es: "Medicina que restaura todos los PS y cura todos los\nproblemas de estado de un Pokémon."
    ko: "포켓몬 1마리의 HP와\n상태 이상을 모두\n회복한다."
    zh_simp: "能回复１只宝可梦的\n所有ＨＰ并治愈所有异常状态。"
    zh_trad: "能回復１隻寶可夢的\n所有ＨＰ並治癒所有\n異常狀態。"
full_restore:recipe:
  names:
    jp_kana: かいふくのくすり
    jp_kanji: かいふくのくすり
    en: Full Restore
    fr: Guérison
    it: Ricarica totale
    de: Top-Genesung
    es: Restaurar Todo
    ko: 회복약
    zh_simp: 全复药
    zh_trad: 全復藥
  descriptions:
    jp_kana: "かいふくのくすりのレシピ。　材料は\nまんたんのくすり×１　なんでもなおし×１"
    jp_kanji: "かいふくのくすりのレシピ。　材料は\nまんたんのくすり×１　なんでもなおし×１"
    en: "A recipe for crafting Full Restores from scratch.\nRequired materials: 1 Max Potion and 1 Full Heal."
    fr: "Méthode pour Guérison. Ressources requises :\n1 Potion Max et 1 Total Soin."
    it: "Ricetta per una Ricarica totale. Richiede 1 Pozione max\ne 1 Cura totale."
    de: "Die Anleitung zur Herstellung einer Top-Genesung.\nBenötigte Materialien: 1 Top-Trank und 1 Hyperheiler."
    es: "Receta para crear Restaurar Todo. Materiales:\n1 Poción Máxima y 1 Cura Total."
    ko: "회복약의 레시피.\n재료: 풀회복약×1 만병통치제×1"
    zh_simp: "全复药的材料单。材料是：\n全满药×１　万灵药×１"
    zh_trad: "全復藥的材料單。材料是：\n全滿藥×１　萬靈藥×１"
galactic_key:
  names:
    jp_kana: ギンガだんのカギ
    jp_kanji: ギンガだんのカギ
    en: Galactic Key
    fr: Clé Galaxie
    it: Chiave Galassia
    de: G-Schlüssel
    es: Llave Galaxia
    ko: 갤럭시단의열쇠
    zh_simp: 银河队钥匙
    zh_trad: 銀河隊鑰匙
  descriptions:
    jp_kana: "ギンガ団アジトの　セキュリティを\n解除するための　カードキー。\nなくすと　おしおき　されるらしい。"
    jp_kanji: "ギンガ団アジトの　セキュリティを\n解除するための　カードキー。\nなくすと　おしおき　されるらしい。"
    en: "A card key for disengaging the security systems in the\nGalactic HQ. Losing it can result in punishment,\napparently."
    fr: "Une clé magnétique servant à désactiver les systèmes\nde sécurité du QG de la Team Galaxie. La perdre\nsemble entraîner une lourde punition."
    it: "Chiave a scheda per disattivare i sistemi di sicurezza\nnel Covo del Team Galassia. Se la si perde,\nsi viene puniti."
    de: "Diese Schlüsselkarte deaktiviert die Sicherheitssysteme\nin der Galaktik-Zentrale. Wer sie verliert, muss mit einer\nStrafe rechnen."
    es: "Desactiva los sistemas de seguridad de la Base Galaxia.\nPor lo visto, perder esta tarjeta se castiga severamente."
    ko: "갤럭시단아지트의 보안을\n해제하기 위한 카드키다.\n잃어버리면 벌을 받는 듯하다."
    zh_simp: "用于解除银河队基地\n安全防范系统的钥匙卡。\n弄丢了的话，好像会受到惩罚。"
    zh_trad: "用於解除銀河隊基地\n保全系統的鑰匙卡。\n弄丟了的話，好像會受到懲罰。"
galarica_cuff:
  names:
    jp_kana: ガラナツブレス
    jp_kanji: ガラナツブレス
    en: Galarica Cuff
    fr: Bracelet Galanoa
    it: Fascia Galarnoce
    de: Galarnuss-Reif
    es: Brazal Galanuez
    ko: 가라두구팔찌
    zh_simp: 伽勒豆蔻手环
    zh_trad: 伽勒荳蔻手環
  descriptions:
    jp_kana: "ガラナツのえだを　編み込んだ　ブレスレット。\nガラル地方の　ヤドンに\nつけてあげると　喜ぶ。"
    jp_kanji: "ガラナツのえだを　編み込んだ　ブレスレット。\nガラル地方の　ヤドンに\nつけてあげると　喜ぶ。"
    en: "A cuff made from woven-together Galarica Twigs.\nGiving it to a Galarian Slowpoke makes the Pokémon\nvery happy."
    fr: "Un bracelet confectionné à partir de Branches Galanoa.\nLes Ramoloss de Galar adorent en porter."
    it: "Un bracciale ottenuto intrecciando Rami Galarnoce.\nGli Slowpoke di Galar amano indossarlo."
    de: "Ein Armreif, der aus Galarnuss-Zweigen gewoben wird.\nGalar-Flegmon freuen sich, wenn sie diesen anlegen\ndürfen."
    es: "Un brazalete hecho de Ramas de Galanuez trenzadas.\nLos Slowpoke de Galar se ponen contentísimos si lo\nreciben como regalo."
    ko: "가라두구가지를 엮어서 만든 팔찌.\n가라르지방의 야돈에게 채워 주면 기뻐한다."
    zh_simp: "用伽勒豆蔻枝编织的手环。\n给伽勒尔地区的呆呆兽戴上，\n它就会很开心。"
    zh_trad: "用伽勒荳蔻枝編成的手環。\n幫伽勒爾地區的呆呆獸戴上，\n牠就會很高興。"
galarica_twig:
  names:
    jp_kana: ガラナツのえだ
    jp_kanji: ガラナツのえだ
    en: Galarica Twig
    fr: Branche Galanoa
    it: Ramo Galarnoce
    de: Galarnuss-Zweig
    es: Rama de Galanuez
    ko: 가라두구가지
    zh_simp: 伽勒豆蔻枝
    zh_trad: 伽勒荳蔻枝
  descriptions:
    jp_kana: "ガラル地方の　一部に　生える\nガラナツという　木の枝。　とある　ポケモンの\nアクセサリーの　材料として　使われる。"
    jp_kanji: "ガラル地方の　一部に　生える\nガラナツという　木の枝。　とある　ポケモンの\nアクセサリーの　材料として　使われる。"
    en: "A twig from a species of tree called Galarica that grows\nin certain areas around the Galar region. It’s a material\nfor an accessory for a certain Pokémon."
    fr: "Une branche de Galanoa, un arbre qui pousse dans\ncertains endroits de Galar. Elle sert à fabriquer\ndes accessoires pour un Pokémon en particulier."
    it: "Un ramo di Galarnoce, un albero che cresce in alcune\nzone di Galar. Viene usato per realizzare accessori\nper un certo Pokémon."
    de: "Ein Zweig eines Baumes namens Galarnuss, der in\nTeilen der Galar-Region wächst. Er dient als Material zur\nHerstellung von Schmuck für ein bestimmtes Pokémon."
    es: "Una rama de un árbol llamado Galanuez, que crece en\ndeterminadas zonas de Galar. Con ella se pueden crear\naccesorios para cierto Pokémon."
    ko: "가라르지방의 일부 지역에서 자라는\n가라두구라는 나무의 가지.\n어떤 포켓몬의 액세서리 재료로 쓰인다."
    zh_simp: "伽勒尔部分地区生长的\n伽勒豆蔻这种植物的枝条。\n可以用来制作某种宝可梦的饰品。"
    zh_trad: "生長在伽勒爾部分地區的\n伽勒荳蔻的嫩枝。\n常被用來製成某種寶可夢的飾品。"
galarica_wreath:
  names:
    jp_kana: ガラナツリース
    jp_kanji: ガラナツリース
    en: Galarica Wreath
    fr: Couronne Galanoa
    it: Corona Galarnoce
    de: Galarnuss-Kranz
    es: Corona Galanuez
    ko: 가라두구머리장식
    zh_simp: 伽勒豆蔻花圈
    zh_trad: 伽勒荳蔻花圈
  descriptions:
    jp_kana: "ガラナツのえだを　編み込んだ　冠。\nガラル地方の　ヤドンに\nかぶせてあげると　喜ぶ。"
    jp_kanji: "ガラナツのえだを　編み込んだ　冠。\nガラル地方の　ヤドンに\nかぶせてあげると　喜ぶ。"
    en: "A wreath made from woven-together Galarica Twigs.\nPlacing it on the head of a Galarian Slowpoke makes\nthe Pokémon very happy."
    fr: "Une couronne confectionnée à partir de Branches\nGalanoa. Les Ramoloss de Galar adorent en porter."
    it: "Una corona ottenuta intrecciando Rami Galarnoce.\nGli Slowpoke di Galar amano indossarla."
    de: "Ein Kranz, der aus Galarnuss-Zweigen gewoben wird.\nGalar-Flegmon freuen sich, wenn sie diesen tragen\ndürfen."
    es: "Una corona hecha de Ramas de Galanuez trenzadas.\nLos Slowpoke de Galar se ponen contentísimos cuando\nla llevan puesta."
    ko: "가라두구가지를 엮어서 만든 머리 장식.\n가라르지방의 야돈에게 씌워 주면 기뻐한다."
    zh_simp: "用伽勒豆蔻枝编织的花环头饰。\n给伽勒尔地区的呆呆兽戴上这种头饰，\n它就会很开心。"
    zh_trad: "用伽勒荳蔻枝編成的花冠。\n給伽勒爾地區的呆呆獸戴上它，\n呆呆獸就會很開心。"
galladite:
  names:
    jp_kana: エルレイドナイト
    jp_kanji: エルレイドナイト
    en: Galladite
    fr: Gallamite
    it: Galladite
    de: Galagladinit
    es: Galladita
    ko: 엘레이드나이트
    zh_simp: 艾路雷朵进化石
    zh_trad: 艾路雷朵進化石
  descriptions:
    jp_kana: "エルレイドに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    jp_kanji: "エルレイドに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Gallade hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Gallame, elle lui permet de méga-évoluer\ndurant un combat."
    it: "Una delle misteriose Megapietre. Data a Gallade,\ngli permette di megaevolversi durante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Galagladi getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Gallade en combate."
    ko: "엘레이드에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让艾路雷朵携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓艾路雷朵攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
ganlon_berry:
  names:
    jp_kana: リュガのみ
    jp_kanji: リュガのみ
    en: Ganlon Berry
    fr: Baie Lingan
    it: Baccalongan
    de: Linganbeere
    es: Baya Gonlan
    ko: 용아열매
    zh_simp: 龙睛果
    zh_trad: 龍睛果
  descriptions:
    jp_kana: "ポケモンに　持たせると\nピンチのとき　自分の\n防御が　あがる。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　自分の\n防御が　あがる。"
    en: "If a Pokémon holds one of these Berries, its Defense stat\nwill be boosted should it find itself in a pinch."
    fr: "Tenue, cette Baie augmente la Défense en cas\nde besoin."
    it: "Se il Pokémon che ha questa bacca si trova in difficoltà,\nla sua Difesa aumenta."
    de: "Als getragenes Item erhöht diese Beere die Verteidigung\ndes Pokémon, sobald es in einer Notlage steckt."
    es: "Si la lleva un Pokémon, le aumenta la Defensa en un\nmomento de apuro."
    ko: "포켓몬에게 지니게 하면\n위급할 때 자신의\n방어가 올라간다."
    zh_simp: "让宝可梦携带后，危机时，\n自己的防御就会提高。"
    zh_trad: "讓寶可夢攜帶後，\n危機時，自己的\n防禦就會提高。"
garchompite:
  names:
    jp_kana: ガブリアスナイト
    jp_kanji: ガブリアスナイト
    en: Garchompite
    fr: Carchacrokite
    it: Garchompite
    de: Knakracknit
    es: Garchompita
    ko: 한카리아스나이트
    zh_simp: 烈咬陆鲨进化石
    zh_trad: 烈咬陸鯊進化石
  descriptions:
    jp_kana: "ガブリアスに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    jp_kanji: "ガブリアスに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Garchomp hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Carchacrok, elle lui permet de\nméga-évoluer durant un combat."
    it: "Una delle misteriose Megapietre. Data a Garchomp,\ngli permette di megaevolversi durante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Knakrack getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Garchomp en combate."
    ko: "한카리아스에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让烈咬陆鲨携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓烈咬陸鯊攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
