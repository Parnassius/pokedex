    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
marill_ball:
  names:
    jp_kana: マリルボール
    jp_kanji: マリルボール
    en: Marill Ball
    fr: Ballon Marill
    it: Palla Marill
    de: Marill-Ball
    es: Pelota Marill
    ko: 마릴볼
    zh_simp: 玛力露球
    zh_trad: 瑪力露球
  descriptions:
    jp_kana: "マリルを　モチーフにした　ボール。\nやわらかくて　よく弾む。　間違って\n本物のマリルを　投げないよう　注意。"
    jp_kanji: "マリルを　モチーフにした　ボール。\nやわらかくて　よく弾む。　間違って\n本物のマリルを　投げないよう　注意。"
    en: "A Marill-themed ball. It’s soft and springy. Make sure\nyou haven’t mistaken a real Marill for this ball before\nthrowing."
    fr: "Un ballon doux et rebondissant qui ressemble comme\ndeux gouttes d’eau à un Marill. Faites attention à ne\npas le confondre avec le vrai !"
    it: "Palla ispirata a Marill. È morbida e rimbalza bene.\nAttenzione a non lanciare per sbaglio un vero Marill\nal posto di questa palla."
    de: "Ein weicher Ball im Marill-Design mit großer Sprungkraft.\nHüte dich davor, aus Versehen ein echtes Marill anstelle\ndes Balles zu werfen!"
    es: "Esta pelota es blandita y rebota muy bien, pero se\nparece tanto a Marill que hay que andarse con ojo para\nno confundirse y lanzar a un Marill de verdad por error."
    ko: "마릴을 모티브로 만든 볼.\n말랑말랑하고 잘 튀어 오른다.\n실수로 진짜 마릴을 던지지 않게 주의하자."
    zh_simp: "参考玛力露制作的球。\n柔软而有弹性。要注意\n别误把真的玛力露扔出去了。"
    zh_trad: "以瑪力露為主題，設計而成的球。\n柔軟而有彈性。小心別誤把\n真的瑪力露當成球丟出去。"
mark_charm:
  names:
    jp_kana: あかしのおまもり
    jp_kanji: あかしのおまもり
    en: Mark Charm
    fr: Charme Insigne
    it: Emblemamuleto
    de: Zeichenpin
    es: Amuleto Emblema
    ko: 증표의부적
    zh_simp: 证章护符
    zh_trad: 證章護符
  descriptions:
    jp_kana: "持っていると　あかしが　ついた\nポケモンと　出会いやすくなる\n不思議で　個性的な　おまもり。"
    jp_kanji: "持っていると　あかしが　ついた\nポケモンと　出会いやすくなる\n不思議で　個性的な　おまもり。"
    en: "Having one of these mysterious and unique charms\nmakes it more likely you’ll encounter a Pokémon with\na mark."
    fr: "Un charme mystérieux qui permet de rencontrer\nplus facilement des Pokémon avec des insignes."
    it: "Misterioso e singolare amuleto che rende più facile\nincontrare Pokémon con un emblema."
    de: "Ein mysteriöser, individueller Glücksbringer, der die\nWahrscheinlichkeit erhöht, Pokémon zu finden,\ndie über ein Zeichen verfügen."
    es: "Misterioso y particular amuleto que aumenta las\nposibilidades de encontrar Pokémon con emblemas."
    ko: "지니고 있으면 증표가 붙은 포켓몬과\n만나기 쉬워지는 이상하고 개성적인 부적."
    zh_simp: "神奇而富有个性的护符。\n拥有该护符后，\n会更容易遇到带有证章的宝可梦。"
    zh_trad: "又神奇又個性十足的護符。\n只要擁有它，就會變得\n容易遇見有證章的寶可夢。"
marmalade:
  names:
    jp_kana: マーマレード
    jp_kanji: マーマレード
    en: Marmalade
    fr: Marmelade
    it: Marmellata
    de: Marmelade
    es: Mermelada
    ko: 마멀레이드
    zh_simp: 橘子酱
    zh_trad: 橘子醬
  descriptions:
    jp_kana: "酸味と　苦味を　感じる　調味料。\n脂っこい　食材と　相性が　よく\n意外と　応用が利く　食材だ。"
    jp_kanji: "酸味と　苦味を　感じる　調味料。\n脂っこい　食材と　相性が　よく\n意外と　応用が利く　食材だ。"
    en: "A condiment with sour and bitter notes. It’s surprisingly\nuseful, as it makes a nice counterpoint to oilier foods."
    fr: "Un condiment au goût acide et amer. Plus utile qu’on peut\nle croire de prime abord, notamment pour accompagner\ndes ingrédients gras, qu’il complète à merveille."
    it: "Un condimento aspro e amaro, inaspettatamente\nversatile perché si abbina bene con gli ingredienti\ngrassi."
    de: "Dieses säuerliche und bittere Würzmittel ist äußerst\npraktisch, da es überraschend gut zu fettigen Zutaten\npasst."
    es: "Ingrediente con un toque amargo y ácido que tiene más\nusos de los que parecería a simple vista, pues casa de\nmaravilla con otros con alto contenido graso."
    ko: "신맛과 쓴맛을 느낄 수 있는 조미료.\n느끼한 식재료와 궁합이 잘 맞아서\n의외로 응용법이 다양한 식재료다."
    zh_simp: "能让人感受到酸味和苦味的调味料。\n与油腻的食材很搭配，\n意外地是种用途广泛的食材。"
    zh_trad: "會感覺到酸味和苦味的調味料。\n和油膩的食材相當搭配，\n活用範圍意外地廣泛。"
marsh_balm:
  names:
    jp_kana: ぬまのシズメダマ
    jp_kanji: ぬまのシズメダマ
    en: Marsh Balm
    fr: Pacifi-Marais
    it: Sferazen palude
    de: Moorruhegabe
    es: Calmasfera Pantano
    ko: 늪의진정환
    zh_simp: 沼之镇宝
    zh_trad: 沼之鎮寶
  descriptions:
    jp_kana: "荒ぶる峠クイーン　ドレディアを\n鎮めることができる\n不思議な香りを発する。"
    jp_kanji: "荒ぶる峠クイーン　ドレディアを\n鎮めることができる\n不思議な香りを発する。"
    en: "A mysterious balm that gives off a soothing scent.\nIt can be used to help calm the frenzy of the Lady of\nthe Ridge, Lilligant."
    fr: "L’étrange parfum que dégage cet objet permet d’apaiser\nla frénésie de Fragilady, la Reine du Col."
    it: "Emana un misterioso profumo in grado di placare\nla collera di Lilligant, la Regina delle creste."
    de: "Dieses Säckchen verströmt einen mysteriösen Duft.\nMit ihm kann man Dressella, die Königin des Bergkamms,\nbesänftigen."
    es: "Esfera que emana un peculiar aroma capaz de calmar a\nLilligant, la Señora de las Cumbres, cuando se encuentra\nfuriosa."
    ko: "폭주하는 고개의 여왕 드레디어를\n진정시킬 수 있는\n신비한 향기가 난다."
    zh_simp: "能让狂暴的山道女王\n裙儿小姐镇静下来。\n散发着不可思议的香气。"
    zh_trad: "能讓狂暴的山道女王\n裙兒小姐鎮靜下來。\n散發著不可思議的香氣。"
marshadium_z:bag:
  names:
    jp_kana: マーシャドーＺ
    jp_kanji: マーシャドーＺ
    en: Marshadium Z
    fr: Marshadozélite
    it: Marshadium Z
    de: Marshadownium Z
    es: Marshastal Z
    ko: 마샤도Z
    zh_simp: 玛夏多Ｚ
    zh_trad: 瑪夏多Ｚ
  descriptions:
    jp_kana: "マーシャドーの　シャドースチールを\n特別な　Ｚワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    jp_kanji: "マーシャドーの　シャドースチールを\n特別な　Ｚワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nMarshadow’s Spectral Thief to a Z-Move."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise le Marshadow qui le tient à transformer\nsa capacité Clepto-Mânes en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono a Marshadow di trasformare la mossa\nOmbrafurto in una mossa Z."
    de: "Kristallisierte Z-Kraft, die Marshadows Attacke\nDiebesschatten zu einer Z-Attacke aufstuft.\nWird bei Bedarf automatisch vervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a\nMarshadow convertir su Robasombra en un\nmovimiento Z."
    ko: "마샤도의 섀도스틸을\n특별한 Z기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将玛夏多的暗影偷盗\n升级成特殊Ｚ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把瑪夏多的暗影偷盜\n升級為特殊Ｚ招式的Ｚ力量結晶。"
marshadium_z:held:
  names:
    jp_kana: マーシャドーＺ
    jp_kanji: マーシャドーＺ
    en: Marshadium Z
    fr: Marshadozélite
    it: Marshadium Z
    de: Marshadownium Z
    es: Marshastal Z
    ko: 마샤도Z
    zh_simp: 玛夏多Ｚ
    zh_trad: 瑪夏多Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　結晶。\nマーシャドーの　シャドースチールを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nマーシャドーの　シャドースチールを\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Marshadow’s Spectral Thief to\na Z-Move."
    fr: "Une cristallisation de la Force Z, permettant\nde transformer la capacité Clepto-Mânes de\nMarshadow en capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare la mossa Ombrafurto\ndi Marshadow in una mossa Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft\nMarshadows Attacke Diebesschatten zu einer\nZ-Attacke auf."
    es: "Cristal que confiere el Poder Z al movimiento\nRobasombra de Marshadow."
    ko: "Z파워의 결정.\n마샤도의 섀도스틸을\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将玛夏多的暗影偷盗\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把瑪夏多的暗影偷盜\n升級為Ｚ招式。"
maschiff_fang:
  names:
    jp_kana: オラチフのキバ
    jp_kanji: オラチフのキバ
    en: Maschiff Fang
    fr: Croc de Grondogue
    it: Zanna di Maschiff
    de: Mobtiff-Zahn
    es: Colmillo de Maschiff
    ko: 오라티프의이빨
    zh_simp: 偶叫獒的牙
    zh_trad: 偶叫獒的牙
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
master_ball:
  names:
    jp_kana: マスターボール
    jp_kanji: マスターボール
    en: Master Ball
    fr: Master Ball
    it: Master Ball
    de: Meisterball
    es: Master Ball
    ko: 마스터볼
    zh_simp: 大师球
    zh_trad: 大師球
  descriptions:
    jp_kana: "野生のポケモンを　必ず\n捕まえることが　できる\n最高性能の　ボール。"
    jp_kanji: "野生のポケモンを　必ず\n捕まえることが　できる\n最高性能の　ボール。"
    en: "The very best Poké Ball with the ultimate level of\nperformance. With it, you will catch any wild Pokémon\nwithout fail."
    fr: "Assurément la Poké Ball la plus performante.\nElle permet de capturer à coup sûr un Pokémon\nsauvage."
    it: "La Poké Ball dalle prestazioni migliori: cattura\ni Pokémon selvatici senza mai fallire."
    de: "Der beste Ball! Damit fängst du garantiert jedes\nwilde Pokémon."
    es: "La Poké Ball definitiva. Captura cualquier Pokémon\nsalvaje y no falla nunca."
    ko: "야생 포켓몬을 반드시\n잡을 수 있는\n최고 성능의 볼."
    zh_simp: "必定能捉到野生宝可梦的，\n性能最好的球。"
    zh_trad: "性能最好的球。\n必定能捉到野生寶可夢。"
masterpiece_teacup:
  names:
    jp_kana: ケッサクのちゃわん
    jp_kanji: ケッサクのちゃわん
    en: Masterpiece Teacup
    fr: Bol Exceptionnel
    it: Tazza eccezionale
    de: Edle Teeschale
    es: Cuenco Exquisito
    ko: 걸작찻잔
    zh_simp: 杰作茶碗
    zh_trad: 傑作茶碗
  descriptions:
    jp_kana: "ある特定の　ポケモンを\n進化させる　不思議な茶碗。\n欠けているが　お茶は　おいしくなる。"
    jp_kanji: "ある特定の　ポケモンを\n進化させる　不思議な茶碗。\n欠けているが　お茶は　おいしくなる。"
    en: "A peculiar teacup that can make a certain species of\nPokémon evolve. It may be chipped, but tea drunk\nfrom it is delicious."
    fr: "Un bol à thé mystérieux qui permet de faire évoluer\nune certaine espèce de Pokémon. Il est ébréché,\nmais on y fait du bon thé."
    it: "Tazza da tè particolare che fa evolvere determinate\nspecie di Pokémon. È crepata, ma il tè che contiene\nè davvero ottimo."
    de: "Diese sonderbare Teeschale löst bei einem bestimmten\nPokémon die Entwicklung aus. Sie weist zwar Löcher auf,\naber das wirkt sich nicht negativ auf den Tee aus."
    es: "Curioso cuenco que hace evolucionar a una determinada\nespecie de Pokémon. Pese a estar roto, hace que el té\nsepa exquisito."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 찻잔.\n이가 빠졌지만 차는 맛있어진다."
    zh_simp: "这个神奇的茶碗\n可以使特定的宝可梦进化。\n虽然破缺了，但泡出来的茶会很香。"
    zh_trad: "能讓特定寶可夢\n進化的神奇茶碗。\n雖然有缺口，但茶會變得美味。"
mawilite:
  names:
    jp_kana: クチートナイト
    jp_kanji: クチートナイト
    en: Mawilite
    fr: Mysdibulite
    it: Mawilite
    de: Flunkifernit
    es: Mawilita
    ko: 입치트나이트
    zh_simp: 大嘴娃进化石
    zh_trad: 大嘴娃進化石
  descriptions:
    jp_kana: "クチートに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    jp_kanji: "クチートに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Mawile hold it, and this stone will enable it to\nMega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Mysdibule, elle lui permet de\nméga-évoluer durant un combat."
    it: "Una delle misteriose Megapietre. Data a Mawile,\ngli permette di megaevolversi durante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Flunkifer getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Mawile en combate."
    ko: "입치트에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让大嘴娃携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓大嘴娃攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
max_elixir:
  names:
    jp_kana: ピーピーマックス
    jp_kanji: ピーピーマックス
    en: Max Elixir
    fr: Élixir Max
    it: Elisir max
    de: Top-Elixier
    es: Elixir Máximo
    ko: PP맥스
    zh_simp: ＰＰ多项全补剂
    zh_trad: ＰＰ多項全補劑
  descriptions:
    jp_kana: "ポケモンが　覚えている\n４つの技の　ＰＰを\nすべて　回復する。"
    jp_kanji: "ポケモンが　覚えている\n４つの技の　ＰＰを\nすべて　回復する。"
    en: "A medicine that can be used to fully restore the max PP\nof all four moves that a Pokémon knows."
    fr: "Restaure tous les PP de toutes les capacités\nd’un Pokémon."
    it: "Restituisce tutti i PP alle quattro mosse conosciute\ndal Pokémon."
    de: "Füllt die AP aller Attacken eines Pokémon\nvollständig auf."
    es: "Restaura completamente los PP de todos los\nmovimientos aprendidos por el Pokémon elegido."
    ko: "포켓몬이 기억하고 있는\n4개 기술의 PP를\n모두 회복한다."
    zh_simp: "能让宝可梦学会的\n４个招式\n回复所有ＰＰ。"
    zh_trad: "能讓寶可夢已學會的\n４個招式\n回復所有ＰＰ。"
max_elixir:recipe:
  names:
    jp_kana: ピーピーマックス
    jp_kanji: ピーピーマックス
    en: Max Elixir
    fr: Maxi Soin PP
    it: Tonico PP Max
    de: Elixierpillen
    es: Píldora Elixir
    ko: PP맥스
    zh_simp: ＰＰ多项全补剂
    zh_trad: ＰＰ多項全補劑
  descriptions:
    jp_kana: "ピーピーマックスのレシピ。　材料は\nピーピーリカバー×１　キングリーフ×２"
    jp_kanji: "ピーピーマックスのレシピ。　材料は\nピーピーリカバー×１　キングリーフ×２"
    en: "A recipe for crafting Max Elixirs from scratch.\nRequired materials: 1 Max Ether and 2 bunches of\nKing’s Leaf."
    fr: "Méthode pour Maxi Soin PP. Ressources requises :\n1 Soin PP et 2 bouquets d’Herbe Souveraine."
    it: "Ricetta per una confezione di Tonico PP Max. Richiede\n1 confezione di Tonico PP e 2 ciuffi di Foglia regina."
    de: "Die Anleitung zur Herstellung von Elixierpillen.\nBenötigte Materialien: 1 Büchse Ätherpillen und\n2 Königsblätter."
    es: "Receta para crear Píldoras Elixir. Materiales:\n1 Píldora Éter y 2 Hierbas Regias."
    ko: "PP맥스의 레시피.\n재료: PP회복×1 킹리프×2"
    zh_simp: "ＰＰ多项全补剂的材料单。材料是：\nＰＰ单项全补剂×１　皇叶×２"
    zh_trad: "ＰＰ多項全補劑的材料單。材料是：\nＰＰ單項全補劑×１　皇葉×２"
max_ether:
  names:
    jp_kana: ピーピーリカバー
    jp_kanji: ピーピーリカバー
    en: Max Ether
    fr: Huile Max
    it: Etere max
    de: Top-Äther
    es: Éter Máximo
    ko: PP회복
    zh_simp: ＰＰ单项全补剂
    zh_trad: ＰＰ單項全補劑
  descriptions:
    jp_kana: "ポケモンが　覚えている\n技のうち　１つのＰＰを\nすべて　回復する。"
    jp_kanji: "ポケモンが　覚えている\n技のうち　１つのＰＰを\nすべて　回復する。"
    en: "A medicine that can be used to fully restore the max PP\nof a single move that a Pokémon knows."
    fr: Restaure tous les PP d’une capacité sélectionnée.
    it: "Restituisce tutti i PP a una mossa tra quelle conosciute\ndal Pokémon."
    de: "Füllt die AP einer ausgewählten Attacke eines Pokémon\nvollständig auf."
    es: "Restaura completamente los PP del movimiento elegido\nde un Pokémon."
    ko: "포켓몬이 기억하고 있는\n기술 중 1개의 PP를\n모두 회복한다."
    zh_simp: "能让宝可梦学会的\n其中１个招式\n回复所有ＰＰ。"
    zh_trad: "能讓寶可夢已學會的\n其中１個招式\n回復所有ＰＰ。"
max_ether:recipe:
  names:
    jp_kana: ピーピーリカバー
    jp_kanji: ピーピーリカバー
    en: Max Ether
    fr: Soin PP
    it: Tonico PP
    de: Ätherpillen
    es: Píldora Éter
    ko: PP회복
    zh_simp: ＰＰ单项全补剂
    zh_trad: ＰＰ單項全補劑
  descriptions:
    jp_kana: "ピーピーリカバーのレシピ。　材料は\nヒメリのみ×１　ピーピーグサ×２"
    jp_kanji: "ピーピーリカバーのレシピ。　材料は\nヒメリのみ×１　ピーピーグサ×２"
    en: "A recipe for crafting Max Ethers from scratch.\nRequired materials: 1 Leppa Berry and 2 Pep-Up Plants."
    fr: "Méthode pour Soin PP. Ressources requises :\n1 Baie Mepo et 2 Plantes PP."
    it: "Ricetta per una confezione di Tonico PP. Richiede\n1 Baccamela e 2 radici di Erba PP."
    de: "Die Anleitung zur Herstellung von Ätherpillen.\nBenötigte Materialien: 1 Jonagobeere und\n2 Stängel Ätherkraut."
    es: "Receta para crear Píldoras Éter. Materiales:\n1 Baya Zanama y 2 Hierbas Éter."
    ko: "PP회복의 레시피.\n재료: 과사열매×1 PP풀×2"
    zh_simp: "ＰＰ单项全补剂的材料单。材料是：\n苹野果×１　ＰＰ草×２"
    zh_trad: "ＰＰ單項全補劑的材料單。材料是：\n蘋野果×１　ＰＰ草×２"
max_honey:
  names:
    jp_kana: ダイミツ
    jp_kanji: ダイミツ
    en: Max Honey
    fr: Maxi Miel
    it: Mielemax
    de: Dyna-Honig
    es: Maxipanal
    ko: 다이꿀
    zh_simp: 极巨甜蜜
    zh_trad: 極巨甜蜜
  descriptions:
    jp_kana: "ダイマックスした　ビークインが　作る　ミツ。\nダイスープに　入れると　まろやかになる。\nげんきのかたまりと　同じ　効果も　ある。"
    jp_kanji: "ダイマックスした　ビークインが　作る　ミツ。\nダイスープに　入れると　まろやかになる。\nげんきのかたまりと　同じ　効果も　ある。"
    en: "Honey that Dynamax Vespiquen produces. Adding this\nhoney to Max Soup makes the taste very smooth. It also\nhas the same effect as a Max Revive."
    fr: "Un miel crémeux produit par un Apireine Dynamax\nqui permet d’adoucir le goût de la Maxi Soupe.\nIl a également le même effet qu’un Rappel Max."
    it: "Miele prodotto dai Vespiquen dynamaxizzati.\nSe aggiunto alla Zuppamax la rende molto saporita.\nHa anche gli stessi effetti di un Revitalizzante max."
    de: "Honig, der von dynamaximierten Honweisel hergestellt\nwird und den Geschmack einer Dyna-Suppe abrundet.\nVerfügt über denselben Effekt wie Top-Beleber."
    es: "Panal construido por Vespiquen Dinamax cuya densa\nmiel suaviza el sabor de la Maxisopa. También tiene\nel mismo efecto que un Revivir Máximo."
    ko: "다이맥스한 비퀸이 만드는 꿀.\n다이수프에 넣으면 부드러워진다.\n기력의덩어리와 같은 효과도 있다."
    zh_simp: "极巨化的蜂女王制造出的蜜汁。\n放进极巨汤里，就能让汤的味道变得很温和。\n与活力块具有相同的效果。"
    zh_trad: "由極巨化的蜂女王製造的蜜汁。\n放進極巨湯裡，湯就會變得又甜又醇。\n也有與活力塊相同的效果。"
max_lure:
  names:
    jp_kana: ゴールドコロン
    jp_kanji: ゴールドコロン
    en: Max Lure
    fr: Parfum Max
    it: Profumo max
    de: Top-Lockparfüm
    es: Colonia Máxima
    ko: 골드코롱
    zh_simp: 黄金香水
    zh_trad: 黃金香水
  descriptions:
    jp_kana: "使うと　珍しい　ポケモンが\n出てきやすくなる　香水。\nシルバーコロンより　長く　もつ。"
    jp_kanji: "使うと　珍しい　ポケモンが\n出てきやすくなる　香水。\nシルバーコロンより　長く　もつ。"
    en: "A bottle of perfume that makes rare Pokémon more\nlikely to appear when sprayed about. Its effect lasts\nlonger than that of a Super Lure."
    fr: "Une substance qui fait apparaître les Pokémon rares\nplus facilement pendant une durée plus longue que\nle Super Parfum."
    it: "Profumo che attira Pokémon rari. Il suo effetto dura\npiù a lungo di quello del Superprofumo."
    de: "Ein Parfüm, das für kurze Zeit vermehrt seltene\nPokémon erscheinen lässt. Wirkt länger als das Item\nSuper-Lockparfüm."
    es: "Colonia que atrae a los Pokémon raros y cuyo efecto\nes algo más duradero que el de la Supercolonia."
    ko: "사용하면 희귀한 포켓몬이\n나오기 쉬워지는 향수.\n실버코롱보다 효과가 오래간다."
    zh_simp: "使用该香水后，\n稀有宝可梦会更容易出现。\n效果比白银香水更持久。"
    zh_trad: "使用後，讓稀有寶可夢\n變得容易出現的香水。\n效果比白銀香水更持久。"
max_mushrooms:
  names:
    jp_kana: ダイキノコ
    jp_kanji: ダイキノコ
    en: Max Mushrooms
    fr: Maxi Champi
    it: Fungomax
    de: Dyna-Pilz
    es: Maxiseta
    ko: 다이버섯
    zh_simp: 极巨菇菇
    zh_trad: 極巨菇菇
  descriptions:
    jp_kana: "ダイマックスの　姿を　変える\n力を　持った　キノコ。　戦闘中\nポケモンの　すべての　能力を　あげる。"
    jp_kanji: "ダイマックスの　姿を　変える\n力を　持った　キノコ。　戦闘中\nポケモンの　すべての　能力を　あげる。"
    en: "Mushrooms that have the power of changing Dynamax\nforms. They boost all stats of a Pokémon during battle."
    fr: "Un champignon pouvant modifier l’apparence\ndes Pokémon Dynamax. Utilisé en combat,\nil augmente toutes les stats d’un Pokémon."
    it: "Un fungo con il potere di modificare la forma dei\nPokémon Dynamax. Se usato durante la lotta,\naumenta tutte le statistiche."
    de: "Ein Pilz, der über die Eigenschaft verfügt, die Gestalt\nvon Dynamax-Pokémon zu ändern. Im Kampf hebt er\nalle Statuswerte eines Pokémon an."
    es: "Una seta capaz de cambiar el aspecto de los Pokémon\nal dinamaxizarse. Aumenta todas las características de\nun Pokémon si se usa en combate."
    ko: "다이맥스의 모습을 바꿀 수 있는 힘을 가진 버섯.\n배틀 중인 포켓몬의 모든 능력을 올린다."
    zh_simp: "拥有某种神奇力量的蘑菇，\n能改变宝可梦极巨化的样子。\n在战斗中，可以提高宝可梦所有的能力。"
    zh_trad: "蘊藏著神奇力量的蘑菇，\n可以讓寶可夢改變極巨化的樣子。\n在戰鬥中能提高寶可夢的所有能力。"
max_potion:
  names:
    jp_kana: まんたんのくすり
    jp_kanji: まんたんのくすり
    en: Max Potion
    fr: Potion Max
    it: Pozione max
    de: Top-Trank
    es: Poción Máxima
    ko: 풀회복약
    zh_simp: 全满药
    zh_trad: 全滿藥
  descriptions:
    jp_kana: "スプレー式の　キズぐすり。\nポケモン　１匹の　ＨＰを\nすべて　回復する。"
    jp_kanji: "スプレー式の　キズぐすり。\nポケモン　１匹の　ＨＰを\nすべて　回復する。"
    en: "A spray-type medicine for treating wounds. It can be\nused to fully restore the max HP of a Pokémon."
    fr: "Un spray qui soigne les blessures.\nRestaure tous les PV d’un Pokémon."
    it: "Rimedio spray per le ferite. Restituisce tutti i PS\na un Pokémon."
    de: "Hilft bei Wunden. Füllt die KP eines Pokémon wieder\nvollständig auf."
    es: "Medicina en espray que cura heridas y restaura todos\nlos PS de un Pokémon."
    ko: "스프레이식의 상처약.\n포켓몬 1마리의 HP를\n모두 회복한다."
    zh_simp: "喷雾式伤药。\n能让１只宝可梦\n回复所有ＨＰ。"
    zh_trad: "噴霧式傷藥。\n能讓１隻寶可夢\n回復所有ＨＰ。"
max_potion:recipe:
  names:
    jp_kana: まんたんのくすり
    jp_kanji: まんたんのくすり
    en: Max Potion
    fr: Potion Max
    it: Pozione max
    de: Top-Trank
    es: Poción Máxima
    ko: 풀회복약
    zh_simp: 全满药
    zh_trad: 全滿藥
  descriptions:
    jp_kana: "まんたんのくすりのレシピ。　材料は\nオボンのみ×１　キングリーフ×１"
    jp_kanji: "まんたんのくすりのレシピ。　材料は\nオボンのみ×１　キングリーフ×１"
    en: "A recipe for crafting Max Potions from scratch.\nRequired materials: 1 Sitrus Berry and 1 bunch of\nKing’s Leaf."
    fr: "Méthode pour Potion Max. Ressources requises :\n1 Baie Sitrus et 1 bouquet d’Herbe Souveraine."
    it: "Ricetta per una Pozione max. Richiede 1 Baccacedro e\n1 ciuffo di Foglia regina."
    de: "Die Anleitung zur Herstellung eines Top-Tranks.\nBenötigte Materialien: 1 Tsitrubeere und 1 Königsblatt."
    es: "Receta para crear Pociones Máximas. Materiales:\n1 Baya Zidra y 1 Hierba Regia."
    ko: "풀회복약의 레시피.\n재료: 자뭉열매×1 킹리프×1"
    zh_simp: "全满药的材料单。材料是：\n文柚果×１　皇叶×１"
    zh_trad: "全滿藥的材料單。材料是：\n文柚果×１　皇葉×１"
max_repel:
  names:
    jp_kana: ゴールドスプレー
    jp_kanji: ゴールドスプレー
    en: Max Repel
    fr: Repousse Max
    it: Repellente max
    de: Top-Schutz
    es: Repelente Máximo
    ko: 골드스프레이
    zh_simp: 黄金喷雾
    zh_trad: 黃金噴霧
  descriptions:
    jp_kana: "弱い　野生のポケモンが\nまったく　出てこなくなる。\nシルバースプレーより　長く　効く。"
    jp_kanji: "弱い　野生のポケモンが\nまったく　出てこなくなる。\nシルバースプレーより　長く　効く。"
    en: "An item that prevents low-level wild Pokémon from\njumping out at you for a time. It lasts longer than\nSuper Repel."
    fr: "Repousse les Pokémon sauvages faibles plus longtemps\nque le Super Repousse."
    it: "Strumento che evita a chi lo usa di incontrare Pokémon\nselvatici deboli. Il suo effetto dura più a lungo di quello\ndel Superrepellente."
    de: "Hält schwache wilde Pokémon ab. Wirkt länger als das\nItem Superschutz."
    es: "Evita encuentros con Pokémon salvajes de nivel bajo\ndurante más tiempo que un Superrepelente."
    ko: "약한 야생 포켓몬이\n전혀 나오지 않게 된다.\n실버스프레이보다 효과가 오래간다."
    zh_simp: "弱小的野生宝可梦\n将完全不会出现。\n效果比白银喷雾更持久。"
    zh_trad: "弱小的野生寶可夢\n變得完全不會出現。\n效果比白銀噴霧更持久。"
max_revive:
  names:
    jp_kana: げんきのかたまり
    jp_kanji: げんきのかたまり
    en: Max Revive
    fr: Rappel Max
    it: Revitalizzante max
    de: Top-Beleber
    es: Revivir Máximo
    ko: 기력의덩어리
    zh_simp: 活力块
    zh_trad: 活力塊
  descriptions:
    jp_kana: "ひんしになった　ポケモン\n１匹を　元気に　したうえで\nＨＰを　すべて　回復する。"
    jp_kanji: "ひんしになった　ポケモン\n１匹を　元気に　したうえで\nＨＰを　すべて　回復する。"
    en: "A medicine that can be used to revive a Pokémon that\nhas fainted. It also fully restores the Pokémon’s max HP."
    fr: "Un médicament qui ranime un Pokémon K.O.\net restaure tous ses PV."
    it: "Rimedio che rianima un Pokémon esausto\nrestituendogli tutti i PS."
    de: "Eine Medizin, die ein kampfunfähiges Pokémon\nwiederbelebt. Die KP werden vollständig wieder\naufgefüllt."
    es: "Medicina que reanima a un Pokémon debilitado y le\ndevuelve todos sus PS."
    ko: "기절해 버린 포켓몬\n1마리를 건강하게 하고\nHP를 모두 회복한다."
    zh_simp: "能让１只陷入昏厥的\n宝可梦重获生机，\n并回复所有ＨＰ。"
    zh_trad: "能讓１隻陷入瀕死的\n寶可夢重獲生機，\n並回復所有ＨＰ。"
max_revive:recipe:
  names:
    jp_kana: げんきのかたまり
    jp_kanji: げんきのかたまり
    en: Max Revive
    fr: Rappel Max
    it: Revitalizzante max
    de: Top-Beleber
    es: Revivir Máximo
    ko: 기력의덩어리
    zh_simp: 活力块
    zh_trad: 活力塊
  descriptions:
    jp_kana: "げんきのかたまりのレシピ。　材料は\nげんきのかけら×１　キングリーフ×２"
    jp_kanji: "げんきのかたまりのレシピ。　材料は\nげんきのかけら×１　キングリーフ×２"
    en: "A recipe for crafting Max Revives from scratch.\nRequired materials: 1 Revive and 2 bunches of\nKing’s Leaf."
    fr: "Méthode pour Rappel Max. Ressources requises :\n1 Rappel et 2 bouquets d’Herbe Souveraine."
    it: "Ricetta per un Revitalizzante max. Richiede\n1 Revitalizzante e 2 ciuffi di Foglia regina."
    de: "Die Anleitung zur Herstellung eines Top-Belebers.\nBenötigte Materialien: 1 Beleber und 2 Königsblätter."
    es: "Receta para crear Revivir Máximos. Materiales:\n1 Revivir y 2 Hierbas Regias."
    ko: "기력의덩어리의 레시피.\n재료: 기력의조각×1 킹리프×2"
    zh_simp: "活力块的材料单。材料是：\n活力碎片×１　皇叶×２"
    zh_trad: "活力塊的材料單。材料是：\n活力碎片×１　皇葉×２"
mayonnaise:
  names:
    jp_kana: マヨネーズ
    jp_kanji: マヨネーズ
    en: Mayonnaise
    fr: Mayonnaise
    it: Maionese
    de: Mayonnaise
    es: Mayonesa
    ko: 마요네즈
    zh_simp: 蛋黄酱
    zh_trad: 美乃滋
  descriptions:
    jp_kana: "酸味が　強い　調味料。\nしかし　色々な食材と　マッチする。\nただし　カロリーには　注意。"
    jp_kanji: "酸味が　強い　調味料。\nしかし　色々な食材と　マッチする。\nただし　カロリーには　注意。"
    en: "A condiment that packs a very tart punch yet pairs well\nwith various ingredients."
    fr: "Un condiment au goût très acide, mais qui se marie\npourtant bien avec une grande variété d’ingrédients."
    it: "Un condimento molto aspro, ma che comunque si sposa\nbene con una gran varietà di ingredienti."
    de: "Trotz der sehr säuerlichen Note passt dieses Würzmittel\nhervorragend zu allerlei Zutaten."
    es: "Un condimento que casa muy bien con muchos\ningredientes a pesar de su sabor ácido."
    ko: "신맛이 강한 조미료.\n그러나 다양한 식재료와 잘 어울린다.\n대신 칼로리는 주의해야 한다."
    zh_simp: "酸味强烈的调味料，\n然而与各种食材都很搭配，\n不过要注意其卡路里。"
    zh_trad: "酸味強勁的調味料。\n不過，和許多食材都能搭配。\n但是，請格外留意熱量。"
meadow_plate:
  names:
    jp_kana: みどりのプレート
    jp_kanji: みどりのプレート
    en: Meadow Plate
    fr: Plaque Herbe
    it: Lastraprato
    de: Wiesentafel
    es: Tabla Pradal
    ko: 초록플레이트
    zh_simp: 碧绿石板
    zh_trad: 碧綠石板
  descriptions:
    jp_kana: "くさのタイプの　石盤。\n持たせると　くさタイプの\n技の威力が　強まる。"
    jp_kanji: "くさのタイプの　石盤。\n持たせると　くさタイプの\n技の威力が　強まる。"
    en: "An item to be held by a Pokémon. This stone tablet is\nimbued with the essence of plants and boosts the power\nof the holder’s Grass-type moves."
    fr: "Objet à tenir. Une tablette en pierre augmentant\nla puissance des capacités de type Plante."
    it: "Strumento da dare a un Pokémon. Lastra di pietra che\npotenzia le mosse di tipo Erba."
    de: "Ein Item zum Tragen. Diese Steintafel verstärkt\nAttacken vom Typ Pflanze."
    es: "Tabla de piedra que potencia los movimientos de tipo\nPlanta. Debe llevarla un Pokémon."
    ko: "풀타입의 석판.\n지니게 하면 풀타입\n기술의 위력이 강해진다."
    zh_simp: "草属性的石板。\n携带后，草属性的\n招式威力就会增强。"
    zh_trad: "草屬性的石板。\n攜帶後，草屬性的\n招式威力就會增強。"
medal_box:
  names:
    jp_kana: メダルボックス
    jp_kanji: メダルボックス
    en: Medal Box
    fr: Boîte Médailles
    it: Box premi
    de: Medaillenbox
    es: Caja de Insignias
    ko: 메달박스
    zh_simp: 奖牌盒
    zh_trad: 獎牌盒
  descriptions:
    jp_kana: "獲得した　メダルを　収納し\nメダルについての　情報を\n記録する　箱型の　機械。"
    jp_kanji: "獲得した　メダルを　収納し\nメダルについての　情報を\n記録する　箱型の　機械。"
    en: "A box-shaped machine that stores Medals and\nMedal information."
    fr: "Une boîte qui permet de ranger les Médailles\net d’enregistrer des informations à leur sujet."
    it: "Apparecchio rettangolare usato per custodire i Premi\nottenuti e tutte le informazioni che li riguardano."
    de: "Ein Gerät in Form einer Box, in der Medaillen\naufbewahrt und Informationen dazu gespeichert werden."
    es: "Un dispositivo con forma de caja que almacena las\ninsignias y la información relacionada."
    ko: "획득한 메달을 수납하고\n메달에 대한 정보를\n기록하는 상자 모양의 기계."
    zh_simp: "可以放入获得的奖牌，\n并记录奖牌信息的箱形机器。"
    zh_trad: "可以放入獲得的獎牌，\n並記錄獎牌資訊的\n箱形機器。"
medichamite:
  names:
    jp_kana: チャーレムナイト
    jp_kanji: チャーレムナイト
    en: Medichamite
    fr: Charminite
    it: Medichamite
    de: Meditalisnit
    es: Medichamita
    ko: 요가램나이트
    zh_simp: 恰雷姆进化石
    zh_trad: 恰雷姆進化石
  descriptions:
    jp_kana: "チャーレムに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    jp_kanji: "チャーレムに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Medicham hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Charmina, elle lui permet de\nméga-évoluer durant un combat."
    it: "Una delle misteriose Megapietre. Data a Medicham,\ngli permette di megaevolversi durante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Meditalis getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Medicham en combate."
    ko: "요가램에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让恰雷姆携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓恰雷姆攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
medicinal_leek:
  names:
    jp_kana: クスリソウ
    jp_kanji: クスリソウ
    en: Medicinal Leek
    fr: Soignon
    it: Porro officinale
    de: Fitlauch
    es: Puerro Medicinal
    ko: 약초
    zh_simp: 疗草
    zh_trad: 療草
  descriptions:
    jp_kana: "くすりの調合に必要となる。\nヒスイ地方の各地に自生しており\n旅の供とも呼ばれる。"
    jp_kanji: "くすりの調合に必要となる。\nヒスイ地方の各地に自生しており\n旅の供とも呼ばれる。"
    en: "Required for crafting medicinal compounds. This\nvegetable is found growing across the Hisui region\nand is also known as the wayfarer’s friend."
    fr: "Cet ingrédient qui pousse dans chaque recoin de\nHisui est utilisé dans les préparations médicinales.\nOn l’appelle aussi « l’ami du voyageur »."
    it: "Ingrediente necessario per la preparazione di rimedi.\nCresce spontaneo in ogni angolo di Hisui ed è anche\nconosciuto come \"compagno del viaggiatore\"."
    de: "Diese Pflanze wird zur Zubereitung von Medizin genutzt.\nSie ist überall in Hisui zu finden und trägt den Beinamen\n„Freund der Reisenden“."
    es: "Ingrediente necesario para preparar ciertos productos\nmedicinales. Crece a lo largo y ancho de la región de\nHisui y también se conoce como \"puerro del viajero\"."
    ko: "약을 조제하는 데 필요한 재료.\n히스이지방 각지에 자생하며\n여행의 벗이라고도 불린다."
    zh_simp: "能用来调制成药品。\n生长在洗翠地区各地，\n也被称为旅人良伴。"
    zh_trad: "能用來調合成藥品。\n生長在洗翠地區各地，\n也被稱為旅人良伴。"
medicine_pocket:
  names:
    jp_kana: かいふくポケット
    jp_kanji: かいふくポケット
    en: Medicine Pocket
    fr: Trousse de Soins
    it: Tasca rimedi
    de: Medizintasche
    es: Botiquín
    ko: 회복포켓
    zh_simp: 回复口袋
    zh_trad: 回復口袋
  descriptions:
    jp_kana: "ー\nー\nー"
    jp_kanji: "ー\nー\nー"
    en: "-\n-\n-"
    fr: "-\n-\n-"
    it: "-\n-\n-"
    de: ー
    es: "-\n-\n-"
    ko: "-\n-\n-"
    zh_simp: "ー\nー\nー"
    zh_trad: "ー\nー\nー"
meditite_sweat:
  names:
    jp_kana: アサナンのあせ
    jp_kanji: アサナンのあせ
    en: Meditite Sweat
    fr: Sueur de Méditikka
    it: Sudore di Meditite
    de: Meditie-Schweiß
    es: Sudor de Meditite
    ko: 요가랑의땀
    zh_simp: 玛沙那的汗
    zh_trad: 瑪沙那的汗
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
mega_anchor:
  names:
    jp_kana: メガイカリ
    jp_kanji: メガイカリ
    en: Mega Anchor
    fr: Méga-Ancre
    it: Megaancora
    de: Mega-Anker
    es: Megaancla
    ko: 메가앵커
    zh_simp: 超级船锚
    zh_trad: 超級船錨
  descriptions:
    jp_kana: "メガストーンを　持ったまま　戦う\nポケモンを　メガシンカさせる\n未知のパワーを　秘めた　アンカー。"
    jp_kanji: "メガストーンを　持ったまま　戦う\nポケモンを　メガシンカさせる\n未知のパワーを　秘めた　アンカー。"
    en: "This anchor contains an unknown power that\nsomehow enables a Pokémon carrying a Mega Stone\nto Mega Evolve in battle."
    fr: "Une ancre aux pouvoirs mystérieux permettant\nà un Pokémon de méga-évoluer au combat s’il tient\nla bonne Méga-Gemme."
    it: "Ancora dotata di un misterioso potere.\nPermette a un Pokémon che ha una Megapietra\ndi megaevolversi durante la lotta."
    de: "Ein Anker mit geheimnisvollen Kräften. Er ermöglicht\nPokémon, die einen Mega-Stein tragen, eine\nMega-Entwicklung durchzuführen."
    es: "Ancla con un poder misterioso que permite\nmegaevolucionar a Pokémon que lleven la\nMegapiedra adecuada."
    ko: "메가스톤을 지닌 채로 싸우는\n포켓몬을 메가진화시키는\n미지의 힘을 가진 앵커."
    zh_simp: "蕴藏着未知力量的船锚。\n能让携带着超级石战斗的\n宝可梦进行超级进化。"
    zh_trad: "隱藏著未知力量的船錨。\n能讓攜帶著超級石戰鬥的\n寶可夢進行超級進化。"
mega_anklet:
  names:
    jp_kana: メガアンクレット
    jp_kanji: メガアンクレット
    en: Mega Anklet
    fr: Méga-Grève
    it: Megagambale
    de: Mega-Beinreif
    es: Megatobillera
    ko: 메가앵클릿
    zh_simp: 超级脚镯
    zh_trad: 超級腳鐲
