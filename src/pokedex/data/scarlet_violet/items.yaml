    jp_kana: "ぼんぐりと組み合わせることで\nフェザーボールの性能をひきだす。\n不思議な空色の石。"
    jp_kanji: "ぼんぐりと組み合わせることで\nフェザーボールの性能をひきだす。\n不思議な空色の石。"
    en: "When combined with an Apricorn, this mysterious\nsky-blue stone can draw out the properties required\nto forge a Feather Ball."
    fr: "Lorsqu’on combine cette étrange pierre azur\nà un Noigrume, elle présente les propriétés\nnécessaires à la confection d’une Plume Ball."
    it: "Strana pietra celeste che, se combinata con una Bacca\nghicocca, innesca le proprietà necessarie alla creazione\ndi una Piuma Ball."
