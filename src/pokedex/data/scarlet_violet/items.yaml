    de: "Das Briefpapier hat eine geschwungene Brücke als\nHintergrund. Gib es einem Pokémon zu Tragen."
    es: "Carta con la imagen de un puente con varios arcos.\nDebe llevarla un Pokémon para entregarla."
    ko: "아치가 그려진 다리의 무늬가\n프린트된 편지지.\n포켓몬에게 지니게 해서 쓴다."
    zh_simp: "印有拱桥图案的信纸。\n使用该道具时，\n需要让宝可梦携带着来用。"
    zh_trad: "印有拱橋圖案的信紙。\n需讓寶可夢攜帶使用。"
bridge_mail_s:
  names:
    jp_kana: ブリッジメールＳ
    jp_kanji: ブリッジメールＳ
    en: Bridge Mail S
    fr: Lettre Pont S
    it: Messaggio Ponte F
    de: Brückbrief H
    es: Carta Puente S
    ko: 브리지메일S
    zh_simp: 桥梁邮件Ｓ
    zh_trad: 橋梁郵件Ｓ
  descriptions:
    jp_kana: "空を　つらぬく　橋の　絵柄が\nプリントされた　レターペーパー。\nポケモンに　持たせて　使う。"
    jp_kanji: "空を　つらぬく　橋の　絵柄が\nプリントされた　レターペーパー。\nポケモンに　持たせて　使う。"
    en: "Stationery featuring an illustration of a bridge that\nseems to pierce the sky. Have a Pokémon hold it\nfor delivery."
    fr: "Un papier à lettres avec un motif de pont traversant\nle ciel. Peut être tenu et livré par un Pokémon."
    it: "Carta da lettere che riporta l’immagine di un ponte\nsospeso nel cielo.\nSi usa dandola a un Pokémon."
    de: "Das Briefpapier hat eine weit in den Himmel ragende\nBrücke als Hintergrund. Gib es einem Pokémon zum\nTragen."
    es: "Carta con la imagen de un puente que se alza hacia el\ncielo. Debe llevarla un Pokémon para entregarla."
    ko: "하늘을 관통하는 다리의 무늬가\n프린트된 편지지.\n포켓몬에게 지니게 해서 쓴다."
    zh_simp: "印有通天桥图案的信纸。\n使用该道具时，\n需要让宝可梦携带着来用。"
    zh_trad: "印有通天橋圖案的信紙。\n需讓寶可夢攜帶使用。"
bridge_mail_t:
  names:
    jp_kana: ブリッジメールＣ
    jp_kanji: ブリッジメールＣ
    en: Bridge Mail T
    fr: Lettre Pont F
    it: Messaggio Ponte P
    de: Brückbrief Z
    es: Carta Puente A
    ko: 브리지메일C
    zh_simp: 桥梁邮件Ｃ
    zh_trad: 橋梁郵件Ｃ
  descriptions:
    jp_kana: "鋼鉄の　つり橋の　絵柄が\nプリントされた　レターペーパー。\nポケモンに　持たせて　使う。"
    jp_kanji: "鋼鉄の　つり橋の　絵柄が\nプリントされた　レターペーパー。\nポケモンに　持たせて　使う。"
    en: "Stationery featuring an illustration of a high-tension\nsteel suspension bridge. Have a Pokémon hold it\nfor delivery."
    fr: "Un papier à lettres avec un motif de pont suspendu\nen acier. Peut être tenu et livré par un Pokémon."
    it: "Carta da lettere che riporta l’immagine di un ponte\nd’acciaio sospeso.\nSi usa dandola a un Pokémon."
    de: "Das Briefpapier hat eine stählerne Hängebrücke als\nHintergrund. Gib es einem Pokémon zum Tragen."
    es: "Carta con la imagen de un puente colgante de acero.\nDebe llevarla un Pokémon para entregarla."
    ko: "강철의 현수교 무늬가\n프린트된 편지지.\n포켓몬에게 지니게 해서 쓴다."
    zh_simp: "印有钢铁吊桥图案的信纸。\n使用该道具时，\n需要让宝可梦携带着来用。"
    zh_trad: "印有鋼鐵懸索橋圖案的信紙。\n需讓寶可夢攜帶使用。"
bridge_mail_v:
  names:
    jp_kana: ブリッジメールＶ
    jp_kanji: ブリッジメールＶ
    en: Bridge Mail V
    fr: Lettre Pont H
    it: Messaggio Ponte V
    de: Brückbrief D
    es: Carta Puente V
    ko: 브리지메일V
    zh_simp: 桥梁邮件Ｖ
    zh_trad: 橋梁郵件Ｖ
  descriptions:
    jp_kana: "レンガ造りの　橋の　絵柄が\nプリントされた　レターペーパー。\nポケモンに　持たせて　使う。"
    jp_kanji: "レンガ造りの　橋の　絵柄が\nプリントされた　レターペーパー。\nポケモンに　持たせて　使う。"
    en: "Stationery featuring an illustration of a vintage-looking\nbrick bridge. Have a Pokémon hold it for delivery."
    fr: "Un papier à lettres avec un motif de pont en briques.\nPeut être tenu et livré par un Pokémon."
    it: "Carta da lettere che riporta l’immagine di un ponte\ndi mattoni.\nSi usa dandola a un Pokémon."
    de: "Das Briefpapier hat eine Brücke aus Ziegelsteinen als\nHintergrund. Gib es einem Pokémon zum Tragen."
    es: "Carta con la imagen de un puente de ladrillos.\nDebe llevarla un Pokémon para entregarla."
    ko: "벽돌로 만든 다리의 무늬가\n프린트된 편지지.\n포켓몬에게 지니게 해서 쓴다."
    zh_simp: "印有砖桥图案的信纸。\n使用该道具时，\n需要让宝可梦携带着来用。"
    zh_trad: "印有磚橋圖案的信紙。\n需讓寶可夢攜帶使用。"
bright_powder:
  names:
    jp_kana: ひかりのこな
    jp_kanji: ひかりのこな
    en: Bright Powder
    fr: Poudre Claire
    it: Luminpolvere
    de: Blendpuder
    es: Polvo Brillo
    ko: 반짝가루
    zh_simp: 光粉
    zh_trad: 光粉
  descriptions:
    jp_kana: "キラキラ　光る粉。　持たせると\n光が　相手を　惑わして\n技が　命中しにくくなる。"
    jp_kanji: "キラキラ　光る粉。　持たせると\n光が　相手を　惑わして\n技が　命中しにくくなる。"
    en: "An item to be held by a Pokémon. This glittery powder\ncasts a tricky glare that lowers the accuracy of opposing\nPokémon’s moves."
    fr: "Objet à tenir. La lumière émise par cette poudre\nbrillante trouble l’ennemi et baisse sa Précision."
    it: "Strumento da dare a un Pokémon. Emette un bagliore\nche turba l’avversario e ne riduce la precisione."
    de: "Ein Item zum Tragen. Es senkt die Genauigkeit von\ngegnerischen Pokémon."
    es: "Lanza un destello que reduce la Precisión del rival.\nDebe llevarlo un Pokémon."
    ko: "반짝반짝 빛나는 가루. 지니게 하면\n빛이 상대를 혼란시켜\n기술이 명중되기 어려워진다."
    zh_simp: "闪闪发光的粉末。\n携带后，光芒会迷惑对手，\n从而使其招式变得不容易命中。"
    zh_trad: "閃閃發光的粉末。\n攜帶後，光芒會迷惑對手，\n進而使其招式變得不容易命中。"
brittle_bones:
  names:
    jp_kana: かぼそいホネ
    jp_kanji: かぼそいホネ
    en: Brittle Bones
    fr: Os à Moelle
    it: Ossi sottili
    de: Feine Knochen
    es: Huesos Finos
    ko: 가느다란뼈
    zh_simp: 细骨
    zh_trad: 細骨
  descriptions:
    jp_kana: "キャンプの　料理に　使う\n食材の　一種。ホネから　ほんのり\nにじみだす　エキスが　旨味を　足す。"
    jp_kanji: "キャンプの　料理に　使う\n食材の　一種。ホネから　ほんのり\nにじみだす　エキスが　旨味を　足す。"
    en: "One of the many ingredients that can be used for\ncooking at your camp. The taste boiled off from the\nbones is sure to give a dish a light umami taste."
    fr: "Un ingrédient de cuisine pour le camping.\nLes saveurs subtiles extraites de cet os\ndonnent un goût exquis aux plats."
    it: "Uno degli ingredienti che puoi usare per cucinare\nin campeggio. Le sostanze rilasciate da questi\nossi donano al piatto un gusto unico."
    de: "Eine Zutat für PokéCamping-Mahlzeiten. Das Aroma,\ndas diese Knochen auf andere Zutaten übertragen,\nverleiht jeder Speise einen vorzüglichen Geschmack."
    es: "Un ingrediente para cocinar en el campamento. Los\njugos del hueso dan un profundo sabor a la salsa."
    ko: "캠프 요리에 사용되는\n식재료 중 하나. 뼈에서 은은하게\n배어 나오는 진액이 감칠맛을 더해 준다."
    zh_simp: "在露营营地制作料理时会使用的\n一种食材。将骨头精心熬煮而得的\n一丝浓缩的精华加深了料理的美味。"
    zh_trad: "製作露營料理時使用的食材之一。\n從骨頭裡滲出來的少量精華\n可以使料理更添美味。"
bronze_bottle:
  names:
    jp_kana: ブロンズチタンボトル
    jp_kanji: ブロンズチタンボトル
    en: Bronze Bottle
    fr: Gourde Titane (Bronze)
    it: Borraccia bronzo
    de: Bronze-Titanflasche
    es: Termo Bronceado
    ko: 브론즈 티탄 보틀
    zh_simp: 铜钛水壶
    zh_trad: 銅鈦水壺
  descriptions:
    jp_kana: "やまおとこ　やまガールに　人気の商品。\nチタン素材を　使っているため　塩分を含む\n液体を　保存しても　錆びない。"
    jp_kanji: "やまおとこ　やまガールに　人気の商品。\nチタン素材を　使っているため　塩分を含む\n液体を　保存しても　錆びない。"
    en: "A popular option among hikers. It’s made with titanium,\nso it doesn’t rust even if it’s used to hold drinks with high\nsodium content."
    fr: "Un accessoire populaire auprès des Montagnards et\nMontagnardes. Sa structure en titane lui permet de\ncontenir des liquides riches en sel sans rouiller."
    it: "Articolo popolare tra Montanari e Montanare. Essendo\nrealizzata in titanio placcato, non si arrugginisce\nnemmeno se usata per bevande che contengono sale."
    de: "Diese in der Wanderszene äußerst beliebte Trinkflasche\nbesteht aus Titan und bleibt so selbst bei Aufbewahrung\nsalzhaltiger Getränke rostfrei."
    es: "Popular entre Montañeros. Al estar hecho de titanio,\nno se oxida ni aunque dentro se lleven líquidos con\nalto grado de salinidad."
    ko: "등산가와 등산걸에게 인기 있는 상품.\n티타늄 소재를 사용해서 염분이 있는\n액체를 보관해도 녹이 슬지 않는다."
    zh_simp: "在登山男与登山女孩之间\n很有人气的商品。使用钛制成，\n即使用来装含盐分的液体也不会生锈。"
    zh_trad: "受到登山男和登山女孩歡迎的商品。\n材質為鈦，因此即使存放\n含有鹽分的液體也不會生鏽。"
bronze_cup:
  names:
    jp_kana: ブロンズチタンカップ
    jp_kanji: ブロンズチタンカップ
    en: Bronze Cup
    fr: Tasse Titane (Bronze)
    it: Tazza bronzo
    de: Bronze-Titantasse
    es: Taza Bronceada
    ko: 브론즈 티탄 컵
    zh_simp: 铜钛水杯
    zh_trad: 銅鈦水杯
  descriptions:
    jp_kana: "やまおとこ　やまガールに　人気の商品。\nチタン素材を　使っているため　塩分を含む\n液体を　そそいでも　錆びない。"
    jp_kanji: "やまおとこ　やまガールに　人気の商品。\nチタン素材を　使っているため　塩分を含む\n液体を　そそいでも　錆びない。"
    en: "A popular option among hikers. It’s made with titanium,\nso it doesn’t rust even if it’s used to hold drinks with high\nsodium content."
    fr: "Un accessoire populaire auprès des Montagnards et\nMontagnardes. Sa structure en titane lui permet de\ncontenir des liquides riches en sel sans rouiller."
    it: "Articolo popolare tra Montanari e Montanare. Essendo\nrealizzata in titanio placcato, non si arrugginisce\nnemmeno se usata per bevande che contengono sale."
    de: "Diese in der Wanderszene äußerst beliebte Tasse\nbesteht aus Titan und rostet somit nicht, selbst wenn\nsalzhaltige Getränke eingegossen werden."
    es: "Popular entre Montañeros. Al estar hecha de titanio,\nno se oxida ni aunque se viertan dentro líquidos con\nalto grado de salinidad."
    ko: "등산가와 등산걸에게 인기 있는 상품.\n티타늄 소재를 사용해서 염분이 있는\n액체를 따라도 녹이 슬지 않는다."
    zh_simp: "在登山男与登山女孩之间\n很有人气的商品。使用钛制成，\n即使注入含盐分的液体也不会生锈。"
    zh_trad: "受到登山男和登山女孩歡迎的商品。\n材質為鈦，因此即使注入\n含有鹽分的液體也不會生鏽。"
bronzor_fragment:
  names:
    jp_kana: ドーミラーのかけら
    jp_kanji: ドーミラーのかけら
    en: Bronzor Fragment
    fr: Fragment d’Archéomire
    it: Frammento di Bronzor
    de: Bronzel-Splitter
    es: Fragmento de Bronzor
    ko: 동미러의조각
    zh_simp: 铜镜怪的碎片
    zh_trad: 銅鏡怪的碎片
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
bruxish_tooth:
  names:
    jp_kana: ハギギシリのは
    jp_kanji: ハギギシリのは
    en: Bruxish Tooth
    fr: Dent de Denticrisse
    it: Dente di Bruxish
    de: Knirfish-Zahn
    es: Diente de Bruxish
    ko: 치갈기의이빨
    zh_simp: 磨牙彩皮鱼的牙齿
    zh_trad: 磨牙彩皮魚的牙齒
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
bug_gem:
  names:
    jp_kana: むしのジュエル
    jp_kanji: むしのジュエル
    en: Bug Gem
    fr: Joyau Insecte
    it: Bijoucoleottero
    de: Käferjuwel
    es: Gema Bicho
    ko: 벌레주얼
    zh_simp: 虫之宝石
    zh_trad: 蟲之寶石
  descriptions:
    jp_kana: "むしのタイプの　ジュエル。\n持たせると　１度だけ　むしの\n技の威力が　強まる。"
    jp_kanji: "むしのタイプの　ジュエル。\n持たせると　１度だけ　むしの\n技の威力が　強まる。"
    en: "An item to be held by a Pokémon. This gem is imbued\nwith the essence of bugs and will boost the power of a\nBug-type move—but only once."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Insecte."
    it: "Strumento da dare a un Pokémon. Gioiello che potenzia\nuna sola volta le mosse di tipo Coleottero."
    de: "Ein Item zum Tragen. Dieses Juwel verstärkt einmalig\neine Attacke vom Typ Käfer."
    es: "Joya de un solo uso que potencia un movimiento de\ntipo Bicho. Debe llevarla un Pokémon."
    ko: "벌레타입의 주얼.\n지니게 하면 한 번만 벌레\n기술의 위력이 강해진다."
    zh_simp: "虫属性的宝石。\n携带后，虫属性的\n招式威力仅会增强１次。"
    zh_trad: "蟲屬性的寶石。\n攜帶後，蟲屬性招式的\n威力會僅增強１次。"
bug_memory:
  names:
    jp_kana: バグメモリ
    jp_kanji: バグメモリ
    en: Bug Memory
    fr: ROM Insecte
    it: ROM Coleottero
    de: Käfer-Disc
    es: Disco Bicho
    ko: 버그메모리
    zh_simp: 虫子存储碟
    zh_trad: 蟲子記憶碟
  descriptions:
    jp_kana: "むしタイプの　データが　入った\nメモリ。　特定のポケモンが　持つと\nタイプが　変わる。"
    jp_kanji: "むしタイプの　データが　入った\nメモリ。　特定のポケモンが　持つと\nタイプが　変わる。"
    en: "A memory disc that contains Bug-type data.\nIt changes the type of the holder if held by\na certain species of Pokémon."
    fr: "Une carte mémoire contenant des données sur\nle type Insecte. Un certain Pokémon peut changer\nde type en l’équipant."
    it: "ROM contenente dati sul tipo Coleottero in formato\ndigitale. Permette a un certo Pokémon di cambiare tipo."
    de: "Eine Disc mit Daten zum Typ Käfer. Sie löst bei einem\nbestimmten Pokémon einen Typenwechsel aus."
    es: "Disco de datos que contiene información relativa al tipo\nBicho. Permite cambiar de tipo a cierto Pokémon."
    ko: "벌레타입의 데이터가 들어 있는\n메모리. 특정 포켓몬이\n지니면 타입이 바뀐다."
    zh_simp: "装有虫属性数据的存储碟。\n特定宝可梦携带后，\n属性就会发生变化。"
    zh_trad: "裝有蟲屬性資料的記憶碟。\n特定寶可夢攜帶後，\n就會產生屬性的變化。"
bug_tera_shard:
  names:
    jp_kana: テラピースむし
    jp_kanji: テラピースむし
    en: Bug Tera Shard
    fr: Téra-Éclat Insecte
    it: Teralite Coleottero
    de: Tera-Stück (Käfer)
    es: Teralito Bicho
    ko: 테라피스 벌레
    zh_simp: 虫太晶碎块
    zh_trad: 蟲太晶碎塊
  descriptions:
    jp_kana: "テラスタルポケモンが　倒れたとき\n砕けた　テラスタルジュエルが\nまれに　結晶化したもの。"
    jp_kanji: "テラスタルポケモンが　倒れたとき\n砕けた　テラスタルジュエルが\nまれに　結晶化したもの。"
    en: "On rare occasions, these shards form when a Tera\nPokémon falls in battle and its Tera Jewel shatters."
    fr: "Un fragment cristallisé qui se forme rarement lors\nde l’éclatement d’un Joyau Téracristal après qu’un\nPokémon Téracristal a été mis K.O."
    it: "Cristallizzazione che raramente si forma quando\nun Pokémon Teracristal viene sconfitto e la sua gemma\nTeracristal va in frantumi."
    de: "In äußerst seltenen Fällen kristallisieren Bruchstücke\ndes Terakristalls von im Kampf besiegten Terakristall-\nPokémon zu solchen Tera-Stücken."
    es: "Esquirla que se forma muy raramente cuando la joya\nTeracristal de un Pokémon teracristalizado se quiebra\ntras derrotarlo."
    ko: "테라스탈 포켓몬이 쓰러졌을 때\n부서진 테라스탈 주얼이\n드물게 결정화한 조각."
    zh_simp: "打倒太晶宝可梦时，\n破碎掉的太晶宝石有\n极低概率会结晶成此物。"
    zh_trad: "太晶寶可夢倒下時，\n碎裂的太晶寶石在罕見的情況下\n會結晶化，而形成此物。"
buginium_z:bag:
  names:
    jp_kana: ムシＺ
    jp_kanji: ムシＺ
    en: Buginium Z
    fr: Insectozélite
    it: Insectium Z
    de: Insectium Z
    es: Insectostal Z
    ko: 벌레Z
    zh_simp: 虫Ｚ
    zh_trad: 蟲Ｚ
  descriptions:
    jp_kana: "むしタイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    jp_kanji: "むしタイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nBug-type moves to Bug-type Z-Moves."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise son porteur à transformer ses capacités\nde type Insecte en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono ai Pokémon di trasformare le mosse\ndi tipo Coleottero in mosse Z."
    de: "Kristallisierte Z-Kraft, die Käfer-Attacken zu Z-Attacken\naufstuft. Wird bei Bedarf automatisch vervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a los\nportadores convertir sus movimientos de tipo Bicho en\nmovimientos Z."
    ko: "벌레타입 기술을\nZ기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将虫属性招式升级成\nＺ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把蟲屬性招式\n升級為Ｚ招式的Ｚ力量結晶。"
buginium_z:held:
  names:
    jp_kana: ムシＺ
    jp_kanji: ムシＺ
    en: Buginium Z
    fr: Insectozélite
    it: Insectium Z
    de: Insectium Z
    es: Insectostal Z
    ko: 벌레Z
    zh_simp: 虫Ｚ
    zh_trad: 蟲Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　結晶。\nむしタイプの　技を\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nむしタイプの　技を\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Bug-type moves to Z-Moves."
    fr: "Une cristallisation de la Force Z, permettant\nde transformer les capacités de type Insecte\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare le mosse di tipo\nColeottero in mosse Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft\nKäfer-Attacken zu Z-Attacken auf."
    es: "Cristal que confiere el Poder Z a los movimientos\nde tipo Bicho."
    ko: "Z파워의 결정.\n벌레타입 기술을\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将虫属性的招式\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把蟲屬性的招式\n升級為Ｚ招式。"
bugwort:
  names:
    jp_kana: ムシヨケソウ
    jp_kanji: ムシヨケソウ
    en: Bugwort
    fr: Plante Répulsive
    it: Erba repellente
    de: Schutzblume
    es: Hierba Repelente
    ko: 벌레회피풀
    zh_simp: 除虫草
    zh_trad: 除蟲草
  descriptions:
    jp_kana: "ヒスイ地方の各地で自生する野草。\n薬としての効果を秘めているが\n苦いため野生ポケモンは食さない。"
    jp_kanji: "ヒスイ地方の各地で自生する野草。\n薬としての効果を秘めているが\n苦いため野生ポケモンは食さない。"
    en: "A wildflower that can be found growing across the Hisui\nregion. It does have medicinal properties, but it is\nso bitter that no wild Pokémon will eat it."
    fr: "Une plante qui pousse aux quatre coins de Hisui.\nOn l’utilise pour ses vertus médicinales, mais du fait\nde son amertume, aucun Pokémon sauvage n’en mange."
    it: "Erba che cresce spontanea in ogni angolo di Hisui.\nHa proprietà curative ma è talmente amara che\nnessun Pokémon selvatico la mangia."
    de: "Diese Blume ist in ganz Hisui zu finden.\nSie hat eine heilende Wirkung, schmeckt aber so bitter,\ndass sie von wilden Pokémon nicht gefressen wird."
    es: "Hierba agreste que crece por toda la región de Hisui.\nCuenta con propiedades medicinales, pero su sabor\namargo hace que los Pokémon salvajes la aborrezcan."
    ko: "히스이지방 각지에 자생하는 들풀.\n약으로서 효과를 가지고 있지만\n맛이 쓰기 때문에 야생 포켓몬은 먹지 않는다."
    zh_simp: "生长在洗翠地区各地的野草。\n虽然具有药效，但由于味苦，\n野生宝可梦不会去吃它。"
    zh_trad: "生長在洗翠地區各地的野草。\n雖然具有藥效，但由於味苦，\n野生寶可夢不會去吃它。"
buizel_fur:
  names:
    jp_kana: ブイゼルのけ
    jp_kanji: ブイゼルのけ
    en: Buizel Fur
    fr: Poils de Mustébouée
    it: Pelo di Buizel
    de: Bamelin-Haar
    es: Pelo de Buizel
    ko: 브이젤의털
    zh_simp: 泳圈鼬的毛
    zh_trad: 泳圈鼬的毛
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
bulbasaur_candy:
  names:
    jp_kana: フシギダネのアメ
    jp_kanji: フシギダネのアメ
    en: Bulbasaur Candy
    fr: Bonbon Bulbizarre
    it: Caramella Bulbasaur
    de: Bisasam-Bonbon
    es: Caramelo Bulbasaur
    ko: 이상해씨의사탕
    zh_simp: 妙蛙种子的糖果
    zh_trad: 妙蛙種子的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
burn_drive:
  names:
    jp_kana: ブレイズカセット
    jp_kanji: ブレイズカセット
    en: Burn Drive
    fr: Module Pyro
    it: Piromodulo
    de: Flammenmodul
    es: PiroROM
    ko: 블레이즈카세트
    zh_simp: 火焰卡带
    zh_trad: 火焰卡帶
  descriptions:
    jp_kana: "ゲノセクトに　持たせると\nテクノバスターという　技が\nほのおタイプになる　カセット。"
    jp_kanji: "ゲノセクトに　持たせると\nテクノバスターという　技が\nほのおタイプになる　カセット。"
    en: "A cassette to be held by Genesect. It changes\nGenesect’s Techno Blast move so it becomes\nFire type."
    fr: "Tenu par Genesect, ce module change la capacité\nTechno-Buster en une capacité de type Feu."
    it: "Modulo da dare a Genesect. Trasforma Tecnobotto\nin una mossa di tipo Fuoco."
    de: "Ein Item, das von Genesect getragen werden kann.\nEs wandelt den Typ der Attacke Techblaster in\nFeuer um."
    es: "Cartucho que convierte Tecno Shock de Genesect en un\nmovimiento de tipo Fuego."
    ko: "게노세크트에게 지니게 하면\n테크노버스터라는 기술이\n불꽃타입으로 바뀌는 카세트."
    zh_simp: "这是让盖诺赛克特携带的卡带。\n携带后，高科技光炮这招式\n就会变为火属性。"
    zh_trad: "讓蓋諾賽克特攜帶的卡帶。\n攜帶後，招式高科技光炮\n會變為火屬性。"
burn_heal:
  names:
    jp_kana: やけどなおし
    jp_kanji: やけどなおし
    en: Burn Heal
    fr: Anti-Brûle
    it: Antiscottatura
    de: Feuerheiler
    es: Antiquemar
    ko: 화상치료제
    zh_simp: 灼伤药
    zh_trad: 灼傷藥
  descriptions:
    jp_kana: "スプレー式の　薬。\nポケモン　１匹の　やけどの\n状態を　回復する。"
    jp_kanji: "スプレー式の　薬。\nポケモン　１匹の　やけどの\n状態を　回復する。"
    en: "A spray-type medicine for treating burns. It can be used\nto cure a Pokémon suffering from a burn."
    fr: "Un médicament sous forme de spray.\nSoigne les brûlures d’un Pokémon."
    it: Rimedio spray. Cura un Pokémon dalla scottatura.
    de: Ein Spray, das ein Pokémon von Verbrennungen heilt.
    es: "Medicina en espray que cura las quemaduras a un\nPokémon."
    ko: "스프레이식의 약.\n포켓몬 1마리의\n화상 상태를 회복한다."
    zh_simp: "喷雾式药水。\n能治愈１只宝可梦的\n灼伤状态。"
    zh_trad: "噴霧式藥水。\n能治癒１隻寶可夢的\n灼傷狀態。"
butter:
  names:
    jp_kana: バター
    jp_kanji: バター
    en: Butter
    fr: Beurre
    it: Burro
    de: Butter
    es: Mantequilla
    ko: 버터
    zh_simp: 黄油
    zh_trad: 奶油
  descriptions:
    jp_kana: "甘味と　塩味のある　調味料。\nコクがあり　パンの食感も　よくなる。\nモーモーミルク１００％は　高級品。"
    jp_kanji: "甘味と　塩味のある　調味料。\nコクがあり　パンの食感も　よくなる。\nモーモーミルク１００％は　高級品。"
    en: "A condiment that unites salty and sweet and also packs a\nrichness that makes bread a delight to eat. The finest\nbutter products are made of 100 percent Moomoo Milk."
    fr: "Un condiment au goût sucré et salé. Sa saveur de\ncaractère se déguste encore mieux sur une tranche de\npain. Le beurre de qualité est 100 % Lait Meumeu."
    it: "Un condimento dolce e salato. Ha un gusto intenso e\nmigliora anche la consistenza del pane. Le varietà più\npregiate sono prodotte al 100% con Latte Mumu."
    de: "Dieses süßlich-salzige Würzmittel veredelt durch seine\nCremigkeit die Konsistenz jedes Brotes. Markenbutter\nbesteht zu 100 % aus reiner Kuhmuh-Milch."
    es: "Este ingrediente salado tiene un toque dulce y aporta\ntanto sabor como textura al pan. La mejor es la\nelaborada solamente con Leche Mu-mu."
    ko: "단맛과 짠맛이 나는 조미료.\n진한 맛이 나며, 빵의 식감도 좋아진다.\n튼튼밀크 100%인 것은 고급으로 친다."
    zh_simp: "带有甜味和咸味的调味料。\n不仅味道浓郁，更能提升面包口感。\n哞哞鲜奶１００％的乃是高级品。"
    zh_trad: "帶有甜味和鹹味的調味料。\n味道濃郁，還能提升麵包的口感。\n由１００％哞哞鮮奶製成的屬於高級品。"
cacnea_needle:
  names:
    jp_kana: サボネアのトゲ
    jp_kanji: サボネアのトゲ
    en: Cacnea Needle
    fr: Épine de Cacnea
    it: Spina di Cacnea
    de: Tuska-Stachel
    es: Espina de Cacnea
    ko: 선인왕의가시
    zh_simp: 刺球仙人掌的刺
    zh_trad: 刺球仙人掌的刺
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
cake_lure_base:
  names:
    jp_kana: よせだまのもと
    jp_kanji: よせだまのもと
    en: Cake-Lure Base
    fr: Appâte
    it: Polpetta base
    de: Köderteig
    es: Masa para Cebo
    ko: 유인환반죽
    zh_simp: 诱团原料
    zh_trad: 誘糰原料
  descriptions:
    jp_kana: "エサと混ぜあわせることで\n香ばしさが増す兵糧丸。"
    jp_kanji: "エサと混ぜあわせることで\n香ばしさが増す兵糧丸。"
    en: "A type of field provision that enhances the flavor of\nother foods it is mixed with."
    fr: "Lorsqu’on mélange cette boule nutritive à de\nla nourriture, elle dégage un parfum appétissant."
    it: "Polpetta nutriente che, se mescolata con altri alimenti,\nemana un forte profumo appetitoso."
    de: "Vermischt man diesen nahrhaften Teig mit anderen\nZutaten, so verströmt er einen aromatischen Duft."
    es: "Masa que, al mezclarse con ciertos alimentos, emana\nun fragante aroma."
    ko: "먹이와 섞으면\n고소한 맛이 더해지는 반죽."
    zh_simp: "与宝可梦的食物混合后，\n香气会更加浓郁的口粮。"
    zh_trad: "與寶可夢的食物混合後，\n香氣會更加濃郁的口糧。"
calcium:
  names:
    jp_kana: リゾチウム
    jp_kanji: リゾチウム
    en: Calcium
    fr: Calcium
    it: Calcio
    de: Kalzium
    es: Calcio
    ko: 리보플라빈
    zh_simp: 特攻增强剂
    zh_trad: 特攻增強劑
  descriptions:
    jp_kana: "ポケモンの　栄養ドリンク。\nポケモン　１匹の　特攻の\n基礎ポイントを　あげる。"
    jp_kanji: "ポケモンの　栄養ドリンク。\nポケモン　１匹の　特攻の\n基礎ポイントを　あげる。"
    en: "A nutritious drink for Pokémon. This drink increases\nbase points for a Pokémon’s Sp. Atk stat."
    fr: "Une boisson très nutritive qui augmente\nl’Attaque Spéciale de base d’un Pokémon."
    it: "Bevanda nutriente per Pokémon. Aumenta i punti base\ndell’Attacco Speciale."
    de: "Ein gehaltvolles Getränk, das die Spezial-Angriffs-\nBasispunkte eines Pokémon dauerhaft erhöht."
    es: "Nutritiva bebida que aumenta el Ataque Especial de\nbase de un Pokémon."
    ko: "포켓몬의 영양 드링크.\n포켓몬 1마리의 특수공격\n기초 포인트를 올린다."
    zh_simp: "宝可梦的营养饮料。\n能提高１只宝可梦的\n特攻的基础点数。"
    zh_trad: "寶可夢的營養飲料。\n能提高１隻寶可夢的\n特攻的基礎點數。"
calm_mint:
  names:
    jp_kana: おだやかミント
    jp_kanji: おだやかミント
    en: Calm Mint
    fr: Aromate Calme
    it: Menta Calma
    de: Still-Minze
    es: Menta Serena
    ko: 차분민트
    zh_simp: 温和薄荷
    zh_trad: 溫和薄荷
  descriptions:
    jp_kana: "ポケモンに　香りを　かがせると\n特防が　上がりやすく　なるが\n攻撃は　上がりにくくなる　ミント。"
    jp_kanji: "ポケモンに　香りを　かがせると\n特防が　上がりやすく　なるが\n攻撃は　上がりにくくなる　ミント。"
    en: "Having a Pokémon smell this mint can make its Sp. Def\nstat grow stronger. However, its Attack stat may suffer."
    fr: "Si un Pokémon hume cet aromate, sa Défense Spéciale\nmontera plus facilement, mais son Attaque\nse développera plus lentement."
    it: "Quando un Pokémon ne sente il profumo,\nla sua Difesa Speciale aumenta più facilmente\na scapito dell’Attacco."
    de: "Lässt man ein Pokémon an dieser Minze schnuppern,\nsteigt seine Spezial-Verteidigung schneller, aber sein\nAngriff umso langsamer."
    es: "Cuando un Pokémon percibe su aroma, aumenta con\nmás facilidad su Defensa Especial, en detrimento de su\nAtaque."
    ko: "포켓몬에게 향기를 맡게 하면\n특수방어가 오르기 쉬워지지만\n공격이 오르기 어려워지는 민트."
    zh_simp: "宝可梦闻了这种薄荷之后，\n会令特防容易提高，\n而攻击则难以提高。"
    zh_trad: "讓寶可夢聞這種薄荷的氣味，\n會令特防變得容易提高，\n但攻擊則難以提高。"
cameruptite:
  names:
    jp_kana: バクーダナイト
    jp_kanji: バクーダナイト
    en: Cameruptite
    fr: Caméruptite
    it: Cameruptite
    de: Cameruptnit
    es: Cameruptita
    ko: 폭타나이트
    zh_simp: 喷火驼进化石
    zh_trad: 噴火駝進化石
  descriptions:
    jp_kana: "バクーダに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    jp_kanji: "バクーダに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Camerupt hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Camérupt, elle lui permet\nde méga-évoluer durant un combat."
    it: "Una delle misteriose Megapietre. Data a Camerupt,\ngli permette di megaevolversi durante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Camerupt getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Camerupt en combate."
    ko: "폭타에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "喷火驼携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "噴火駝攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
camping_gear:
  names:
    jp_kana: キャンプセット
    jp_kanji: キャンプセット
    en: Camping Gear
    fr: Kit de Camping
    it: Kit da campeggio
    de: Camping-Set
    es: Kit de Acampada
    ko: 캠프세트
    zh_simp: 露营组合
    zh_trad: 露營組合
  descriptions:
    jp_kana: "ワイルドエリアや　キャンプスポットで\nテントを　張ったり　その中で\n料理を　作ることが　できる。"
    jp_kanji: "ワイルドエリアや　キャンプスポットで\nテントを　張ったり　その中で\n料理を　作ることが　できる。"
    en: "Everything you need to set up a tent and get cooking in\na Wild Area or at a camping spot."
    fr: "Ce kit permet d’installer une tente dans les zones\nde camping des Terres Sauvages et d’y cuisiner."
    it: "Permette di montare una tenda e cucinare nelle\nTerre Selvagge o in altri luoghi adatti al campeggio."
    de: "Mit diesem Set ist es möglich, in der Naturzone sowie\nan anderen bestimmten Orten ein Zelt aufzuschlagen\nund dort zu kochen."
    es: "Este kit tiene todo lo necesario para montar una tienda\nde campaña y cocinar, ya sea en el Área Silvestre o en\nzonas de acampada."
    ko: "와일드에리어나 캠핑 스폿에서\n텐트를 치거나 그 안에서\n요리를 만들 수 있다."
    zh_simp: "可以在旷野地带\n或露营营地上搭起帐篷，\n在那里制作料理。"
    zh_trad: "可以用它\n在曠野地帶或營地\n搭起帳篷和製作料理。"
candy_jar:
  names:
    jp_kana: アメボトル
    jp_kanji: アメボトル
    en: Candy Jar
    fr: Bonbonnière
    it: Portacaramelle
    de: Bonbonglas
    es: Tarro de Caramelos
    ko: 사탕보틀
    zh_simp: 糖果罐
    zh_trad: 糖果罐
  descriptions:
    jp_kana: "ー\nー\nー"
    jp_kanji: "ー\nー\nー"
    en: "-\n-\n-"
    fr: "-\n-\n-"
    it: "-\n-\n-"
    de: ー
    es: "-\n-\n-"
    ko: "-\n-\n-"
    zh_simp: "ー\nー\nー"
    zh_trad: "ー\nー\nー"
candy_truffle:
  names:
    jp_kana: スイートトリュフ
    jp_kanji: スイートトリュフ
    en: Candy Truffle
    fr: Truffe Sucrée
    it: Tartufo dolce
    de: Süßtrüffel
    es: Trufa Dulce
    ko: 스위트러플
    zh_simp: 甜松露
    zh_trad: 甜松露
  descriptions:
    jp_kana: "不思議なエネルギーが\nつまった甘いキノコ。\n各種道具の材料となる。"
    jp_kanji: "不思議なエネルギーが\nつまった甘いキノコ。\n各種道具の材料となる。"
    en: "A sweet-fleshed truffle that is packed full of mysterious\nenergy. It is one of the materials needed for crafting\nvarious items."
    fr: "Ce champignon sucré regorge d’une mystérieuse énergie.\nRessource requise pour la confection de toutes sortes\nd’objets."
    it: "Fungo utilizzato nella preparazione di vari strumenti.\nHa un sapore dolce ed è pregno di una misteriosa\nenergia."
    de: "Dieser süße Pilz wird zur Herstellung verschiedener Items\ngenutzt. Er steckt voller mysteriöser Energie."
    es: "Seta de sabor dulce que emite una extraña y misteriosa\nenergía. Se puede utilizar como material para elaborar\ndiversos objetos."
    ko: "신비한 에너지가\n가득 들어 있는 달콤한 버섯.\n각종 도구의 재료가 된다."
    zh_simp: "充满了不可思议\n能量的甘甜菇类。\n可作为各种道具的材料。"
    zh_trad: "充滿了不可思議能量的\n甘甜菇類。可作為\n各種道具的材料。"
capsakid_seed:
  names:
    jp_kana: カプサイジのたね
    jp_kanji: カプサイジのたね
    en: Capsakid Seed
    fr: Graine de Pimito
    it: Seme di Capsakid
    de: Chilingel-Samen
    es: Semilla de Capsakid
    ko: 캡싸이의씨앗
    zh_simp: 热辣娃的种子
    zh_trad: 熱辣娃的種子
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
carbink_jewel:
  names:
    jp_kana: メレシーのほうせき
    jp_kanji: メレシーのほうせき
    en: Carbink Jewel
    fr: Joyau de Strassie
    it: Gemma di Carbink
    de: Rocara-Edelstein
    es: Gema de Carbink
    ko: 멜리시의보석
    zh_simp: 小碎钻的宝石
    zh_trad: 小碎鑽的寶石
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
carbos:
  names:
    jp_kana: インドメタシン
    jp_kanji: インドメタシン
    en: Carbos
    fr: Carbone
    it: Carburante
    de: Carbon
    es: Carburante
    ko: 알칼로이드
    zh_simp: 速度增强剂
    zh_trad: 速度增強劑
  descriptions:
    jp_kana: "ポケモンの　栄養ドリンク。\nポケモン　１匹の　素早さの\n基礎ポイントを　あげる。"
    jp_kanji: "ポケモンの　栄養ドリンク。\nポケモン　１匹の　素早さの\n基礎ポイントを　あげる。"
    en: "A nutritious drink for Pokémon. This drink increases\nbase points for a Pokémon’s Speed stat."
    fr: "Une boisson très nutritive qui augmente\nla Vitesse de base d’un Pokémon."
    it: "Bevanda nutriente per Pokémon. Aumenta i punti base\ndella Velocità."
    de: "Ein gehaltvolles Getränk, das die Initiative-Basispunkte\neines Pokémon dauerhaft erhöht."
    es: "Nutritiva bebida que aumenta la Velocidad de base de\nun Pokémon."
    ko: "포켓몬의 영양 드링크.\n포켓몬 1마리의 스피드\n기초 포인트를 올린다."
    zh_simp: "宝可梦的营养饮料。\n能提高１只宝可梦的\n速度的基础点数。"
    zh_trad: "寶可夢的營養飲料。\n能提高１隻寶可夢的\n速度的基礎點數。"
card_key:goldenrod_radio_tower:
  names:
    jp_kana: カードキー
    jp_kanji: カードキー
    en: Card Key
    fr: Carte Magnétique
    it: Apriporta
    de: Schlüsselkarte
    es: Llave Magnética
    ko: 카드키
    zh_simp: 钥匙卡
    zh_trad: 鑰匙卡
  descriptions:
    jp_kana: "ラジオ局の　シャッターを　開ける\nカード式の　カギ。"
    jp_kanji: "ラジオ局の　シャッターを　開ける\nカード式の　カギ。"
    en: A card key that opens a shutter in the Radio Tower.
    fr: "Une clé en forme de carte permettant d’ouvrir\nles cloisons de la Tour Radio."
    it: "Chiave a scheda che apre le porte automatizzate\ndella Torre Radio."
    de: Eine Schlüsselkarte, die eine Tür im Radioturm öffnet.
    es: "Llave con forma de tarjeta que abre las puertas\nde la Torre Radio."
    ko: "라디오방송국의 셔터를 여는\n카드식 열쇠."
    zh_simp: "用来打开电台卷帘门的\n卡片式钥匙。"
    zh_trad: "用來打開電臺鐵捲門的\n卡片式鑰匙。"
card_key:silph_co:
  names:
    jp_kana: カードキー
    jp_kanji: カードキー
    en: Card Key
    fr: Carte Magnétique
    it: Apriporta
    de: Schlüsselkarte
    es: Llave Magnética
    ko: 카드키
    zh_simp: 钥匙卡
    zh_trad: 鑰匙卡
  descriptions:
    jp_kana: "ヤマブキの　シルフカンパニー\n本社　ビルの　ドアロックを\nはずす　カードタイプの　カギ。"
    jp_kanji: "ヤマブキの　シルフカンパニー\n本社　ビルの　ドアロックを\nはずす　カードタイプの　カギ。"
    en: "A card key that unlocks doors in Silph Co.’s head\noffice in Saffron City."
    fr: "Une carte magnétique pouvant ouvrir les portes\ndu siège de la Sylphe SARL à Safrania."
    it: "Chiave a scheda per sbloccare le porte nella sede\ndella Silph S.p.A. a Zafferanopoli."
    de: "Eine Schlüsselkarte, mit der die Türen im Hauptsitz der\nSilph Company in Saffronia City geöffnet werden\nkönnen."
    es: "Esta tarjeta permite abrir las puertas de la Oficina\nCentral de Silph S. A. en Ciudad Azafrán."
    ko: "노랑시티의 실프주식회사\n본사 빌딩의 도어록을\n해제하는 카드 타입의 열쇠."
    zh_simp: "用来打开位于金黄市的\n西尔佛公司总部大厦门锁的\n卡片式钥匙。"
    zh_trad: "卡片型的鑰匙。\n能打開位於金黃市的\n西爾佛公司總部的門鎖。"
careful_mint:
  names:
    jp_kana: しんちょうミント
    jp_kanji: しんちょうミント
    en: Careful Mint
    fr: Aromate Prudent
    it: Menta Cauta
    de: Sacht-Minze
    es: Menta Cauta
    ko: 신중민트
    zh_simp: 慎重薄荷
    zh_trad: 慎重薄荷
  descriptions:
    jp_kana: "ポケモンに　香りを　かがせると\n特防が　上がりやすく　なるが\n特攻は　上がりにくくなる　ミント。"
    jp_kanji: "ポケモンに　香りを　かがせると\n特防が　上がりやすく　なるが\n特攻は　上がりにくくなる　ミント。"
    en: "Having a Pokémon smell this mint can make its Sp. Def\nstat grow stronger. However, its Sp. Atk stat may suffer."
    fr: "Si un Pokémon hume cet aromate, sa Défense Spéciale\nmontera plus facilement, mais son Attaque Spéciale\nse développera plus lentement."
    it: "Quando un Pokémon ne sente il profumo,\nla sua Difesa Speciale aumenta più facilmente\na scapito dell’Attacco Speciale."
    de: "Lässt man ein Pokémon an dieser Minze schnuppern,\nsteigt seine Spezial-Verteidigung schneller, aber sein\nSpezial-Angriff umso langsamer."
    es: "Cuando un Pokémon percibe su aroma, aumenta con\nmás facilidad su Defensa Especial, en detrimento de su\nAtaque Especial."
    ko: "포켓몬에게 향기를 맡게 하면\n특수방어가 오르기 쉬워지지만\n특수공격이 오르기 어려워지는 민트."
    zh_simp: "宝可梦闻了这种薄荷之后，\n会令特防容易提高，\n而特攻则难以提高。"
    zh_trad: "讓寶可夢聞這種薄荷的氣味，\n會令特防變得容易提高，\n但特攻則難以提高。"
carrot_seeds:
  names:
    jp_kana: にんじんのタネ
    jp_kanji: にんじんのタネ
    en: Carrot Seeds
    fr: Graines Carotte
    it: Semi di carota
    de: Karottensamen
    es: Sem. Zanahoria
    ko: 당근씨
    zh_simp: 萝卜种子
    zh_trad: 蘿蔔種子
  descriptions:
    jp_kana: "畑に　植えて　使う　タネ。\n植える　畑に　よって　できる\nにんじんの　種類が　変わる。"
    jp_kanji: "畑に　植えて　使う　タネ。\n植える　畑に　よって　できる\nにんじんの　種類が　変わる。"
    en: "Seeds to plant in a field. The kind of carrot you’ll get is\ndetermined by which field you plant the seeds in."
    fr: "Des graines à planter dans un champ. L’espèce\nde carotte obtenue varie selon le type de sol."
    it: "Dei semi da piantare in un campo. La varietà di carote\nottenibili cambia in base al terreno."
    de: "Samen, die sich auf einem Feld einpflanzen lassen.\nJe nachdem, wie dieses beschaffen ist, wächst dort\neine andere Karottenart."
    es: "Semillas para plantar en un huerto. Permiten obtener\nun tipo u otro de zanahoria en función del lugar elegido\npara su cultivo."
    ko: "밭에 심을 수 있는 씨.\n심은 밭에 따라\n자라는 당근의 종류가 달라진다."
    zh_simp: "种在田地里使用的种子。\n出产的萝卜种类会根据\n种下的田地而有所不同。"
    zh_trad: "可以種在田地裡的種子。\n長出來的蘿蔔種類會根據\n種下它的田地而不同。"
casteliacone:
  names:
    jp_kana: ヒウンアイス
    jp_kanji: ヒウンアイス
    en: Casteliacone
    fr: Glace Volute
    it: Conostropoli
    de: Stratos-Eis
    es: Porcehelado
    ko: 구름아이스
    zh_simp: 飞云冰淇淋
    zh_trad: 飛雲冰淇淋
  descriptions:
    jp_kana: "ヒウンシティの　名物アイス。\nポケモン　１匹の　状態異常を\nすべて　回復する。"
    jp_kanji: "ヒウンシティの　名物アイス。\nポケモン　１匹の　状態異常を\nすべて　回復する。"
    en: "Castelia City’s specialty: soft-serve ice cream. It can be\nused to cure any status condition a Pokémon may have."
    fr: "Une spécialité de Volucité.\nSoigne toutes les altérations de statut d’un Pokémon."
    it: "Il famoso gelato di Austropoli. Cura tutti i problemi\ndi stato di un Pokémon."
    de: "Dieses Eis ist eine Spezialität aus Stratos City.\nEs behebt alle Statusprobleme eines Pokémon."
    es: "Especialidad de Ciudad Porcelana. Cura los problemas\nde estado de un Pokémon."
    ko: "구름시티의 명물 아이스.\n포켓몬 1마리의 상태 이상을\n모두 회복한다."
    zh_simp: "飞云市特产的冰淇淋。\n能治愈１只宝可梦的\n所有异常状态。"
    zh_trad: "飛雲市特產的冰淇淋。\n能治癒１隻寶可夢的\n所有異常狀態。"
caster_fern:
  names:
    jp_kana: タマゼンマイ
    jp_kanji: タマゼンマイ
    en: Caster Fern
    fr: Feuille Ronde
    it: Felcetonda
    de: Rundblatt
    es: Helecho Rizado
    ko: 둥근고비
    zh_simp: 弹子萁
    zh_trad: 彈子萁
  descriptions:
    jp_kana: "投げる道具の　材料となる　シダ植物。\nうずまき状に　まるまった葉を　広げると\n天然の包み紙と　なる。"
    jp_kanji: "投げる道具の　材料となる　シダ植物。\nうずまき状に　まるまった葉を　広げると\n天然の包み紙と　なる。"
    en: "A fern used for crafting items made to be thrown.\nWhen these curled leaves are unfurled, they can serve\nas nature’s wrapping paper."
    fr: "Une ressource utilisée dans la confection d’objets\nà lancer. Une fois déployées, ces feuilles peuvent\négalement servir d’emballage naturel."
    it: "Pianta utilizzata per confezionare strumenti da lanciare.\nLe sue foglie arrotolate, una volta distese, vengono\nimpiegate come rivestimento di fibra naturale."
    de: "Diese runden Blätter werden zum Herstellen von\nWurf-Items verwendet. Flachgedrückt können sie\nals natürliches Packpapier dienen."
    es: "Planta que sirve como material para la fabricación de\nobjetos arrojadizos y cuyas hojas rizadas se despliegan\npara formar una especie de revestimiento natural."
    ko: "투척 도구의 재료가 되는 양치식물.\n회오리 형태로 말려 있는 잎사귀를 펼치면\n천연의 포장지가 된다."
    zh_simp: "能作为投掷用道具的材料使用的\n蕨类植物。将卷成漩涡状的叶片\n展开后，就是一张天然的包装纸。"
    zh_trad: "能作為投擲用道具的材料使用的\n蕨類植物。將捲成漩渦狀的葉片\n展開後，就是一張天然的包裝紙。"
catching_charm:
  names:
    jp_kana: ゆれないおまもり
    jp_kanji: ゆれないおまもり
    en: Catching Charm
    fr: Charme Stabilité
    it: Catturamuleto
    de: Superfangpin
    es: Amuleto Captura
    ko: 흔들림없는부적
    zh_simp: 防晃护符
    zh_trad: 防晃護符
  descriptions:
    jp_kana: "持っていると　ほかくクリティカルが\n発生しやすくなる\n不思議で　あまりゆれない　おまもり。"
    jp_kanji: "持っていると　ほかくクリティカルが\n発生しやすくなる\n不思議で　あまりゆれない　おまもり。"
    en: "Having one of these mysterious, unshakable charms\nmakes it more likely you’ll get a critical catch."
    fr: "Ce porte-bonheur permet de stabiliser les Poké Balls\net augmente les chances de réaliser une capture\ncritique."
    it: "Misterioso amuleto che non oscilla molto. Aumenta\nla probabilità che si verifichi una cattura critica."
    de: "Ein mysteriöser Glücksbringer, der nur wenig wackelt\nund die Wahrscheinlichkeit erhöht, einen Superfang\nhinzulegen."
    es: "Aumenta la probabilidad de lograr una captura crítica\nal llevarlo equipado. Curiosamente, apenas vibra."
    ko: "지니고 있으면 포획 크리티컬이\n나오기 쉬워지는\n이상하고 잘 흔들리지 않는 부적."
