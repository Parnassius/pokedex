    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
celestica_flute:
  names:
    jp_kana: カミナギのふえ
    jp_kanji: カミナギのふえ
    en: Celestica Flute
    fr: Flûte Céleste
    it: Flauto memordei
    de: Elysien-Flöte
    es: Flauta Celestial
    ko: 공신의피리
    zh_simp: 神阖之笛
    zh_trad: 神闔之笛
  descriptions:
    jp_kana: "特別なポケモンを呼びだし\n乗せてもらうことができる笛。\n不思議な音色を奏でる。"
    jp_kanji: "特別なポケモンを呼びだし\n乗せてもらうことができる笛。\n不思議な音色を奏でる。"
    en: "A flute that can be used to call special Pokémon that\nare willing to bear you around the region. Its timbre is\neerie and mysterious."
    fr: "Cette flûte permet d’appeler des Pokémon spéciaux qui\npeuvent servir de montures. Elle émet un son mystérieux."
    it: "Flauto dal suono enigmatico che permette di richiamare\ndei Pokémon speciali su cui salire in groppa."
    de: "Mit dieser Flöte kannst du besondere Pokémon\nherbeirufen, die dir als Reit-Pokémon dienen.\nSie erzeugt einen wundersamen Klang."
    es: "Flauta cuyo enigmático silbido es capaz de invocar a\nciertos Pokémon especiales que pueden ejercer de\nmonturas."
    ko: "특별한 포켓몬을 불러내어\n올라탈 수 있게 해 주는 피리.\n신비한 음색을 가졌다."
    zh_simp: "能够呼唤特别的宝可梦\n前来成为坐骑的笛子。\n能奏出不可思议的音律。"
    zh_trad: "能夠呼喚特別的寶可夢\n前來成為坐騎的笛子。\n能奏出不可思議的音色。"
cell_battery:
  names:
    jp_kana: じゅうでんち
    jp_kanji: じゅうでんち
    en: Cell Battery
    fr: Pile
    it: Ricaripila
    de: Akku
    es: Pila
    ko: 충전지
    zh_simp: 充电电池
    zh_trad: 充電電池
  descriptions:
    jp_kana: "使い捨ての　じゅうでんち。\n持たせて　でんきの技の　ダメージを\n受けると　攻撃が　あがる。"
    jp_kanji: "使い捨ての　じゅうでんち。\n持たせて　でんきの技の　ダメージを\n受けると　攻撃が　あがる。"
    en: "An item to be held by a Pokémon. This single-use\nbattery boosts the Attack stat if the holder is damaged\nby an Electric-type attack."
    fr: "Objet à tenir. Une pile jetable qui augmente\nl’Attaque du porteur lorsqu’il subit des dégâts\nà cause d’une capacité de type Électrik."
    it: "Pila monouso. Se il Pokémon che ha questo strumento\nsubisce danni da una mossa di tipo Elettro, il suo Attacco\naumenta."
    de: "Nimmt der Träger dieses Akkus durch eine\nElektro-Attacke Schaden, steigt sein Angriff\nund das Item verschwindet."
    es: "Pila que aumenta el Ataque del portador si lo alcanza un\nataque de tipo Eléctrico. Es de un solo uso."
    ko: "단 한 번 쓰면 없어지는 충전지.\n지니게 하고 전기 기술에 데미지를 받으면\n공격이 올라간다."
    zh_simp: "一次性使用的充电电池。\n携带它的宝可梦如果受到电属性\n招式的伤害，攻击就会提高。"
    zh_trad: "只能使用一次的充電電池。\n攜帶它的寶可夢如果受到電屬性\n招式的傷害，攻擊就會提高。"
