    de: "Das Wappen der Akademie ziert diese ebenso robuste\nwie leichte Flasche, die Getränke dank Vakuumdämmung\nwarm beziehungsweise kalt hält."
    es: "Un termo decorado con el escudo de la academia.\nLigero, resistente y muy bien aislado, conserva sin\nproblema la temperatura de lo que se vierta en él."
    ko: "학교의 엠블럼이 반짝이는 보틀.\n가볍고 튼튼한 진공 단열 구조로 되어 있어\n보온 성능은 물론 보냉 성능도 완벽하다."
    zh_simp: "校徽闪亮耀眼的水壶。\n轻巧坚固，采用了真空隔热的构造，\n由保温到保冷，功能一应俱全。"
    zh_trad: "校徽閃閃發亮的水壺。\n具備輕巧又堅固的真空隔熱構造，\n不論要保溫或保冷都不是問題。"
academy_chairs:scarlet:
  names:
    jp_kana: スクールチェア
    jp_kanji: スクールチェア
    en: Academy Chairs
    fr: Sièges de l’Académie
    it: Sedie accademia
    de: Akademie-Stühle
    es: Sillas Academia
    ko: 스쿨 체어
    zh_simp: 校园椅子
    zh_trad: 校園椅子
  descriptions:
    jp_kana: "ピクニックで　使いやすい　イス。\nスクールクロスの　デザインを\nもとに　作ってもらった。"
    jp_kanji: "ピクニックで　使いやすい　イス。\nスクールクロスの　デザインを\nもとに　作ってもらった。"
    en: "A set of chairs that are ideal for picnicking. Their design\nwas inspired by the Academy Tablecloth."
    fr: "Des sièges parfaits pour les pique-niques.\nLeur design est inspiré de la Nappe de l’Académie."
    it: "Pratiche sedie, perfette per i picnic, ispirate al design\ndella Tovaglia accademia."
    de: "Diese Stühle sind gut geeignet für Picknicks.\nIhr Design basiert auf dem Akademie-Tischtuch."
    es: "Unas sillas ideales para irse de pícnic. Su diseño está\nbasado en el del Mantel Academia."
    ko: "피크닉에서 사용하기 편한 의자.\n스쿨 테이블보의\n디자인을 토대로 만들어졌다."
    zh_simp: "在野餐时很好用的椅子。\n根据校园桌巾的设计制作而成。"
    zh_trad: "野餐時很好用的椅子。\n根據校園桌巾的設計製作而成。"
academy_chairs:violet:
  names:
