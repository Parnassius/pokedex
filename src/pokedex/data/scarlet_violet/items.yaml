    de: "Eine Eintrittskarte für den Gasthof in Fleetburg.\nSie ist über 50 Jahre alt..."
    es: "Necesario para entrar en la posada de Ciudad Canal.\nEs extraño, pero la última fecha registrada es de hace\n50 años."
    ko: "운하시티의 여관에 들어갈 수 있는\n카드. 어찌 된 일인지 50년 정도 전의\n날짜가 새겨져 있다."
    zh_simp: "可以进入水脉市旅馆的卡片。\n不知为何，上面刻有\n５０年前左右的日期。"
    zh_trad: "可以進入水脈市旅館的卡片。\n不知為何，上面刻有\n５０年前左右的日期。"
mental_herb:
  names:
    jp_kana: メンタルハーブ
    jp_kanji: メンタルハーブ
    en: Mental Herb
    fr: Herbe Mental
    it: Mentalerba
    de: Mentalkraut
    es: Hierba Mental
    ko: 멘탈허브
    zh_simp: 心灵香草
    zh_trad: 心靈香草
  descriptions:
    jp_kana: "持たせたポケモンが　自由に\n技を　だせなくなったときに\n１度だけ　回復する。"
    jp_kanji: "持たせたポケモンが　自由に\n技を　だせなくなったときに\n１度だけ　回復する。"
    en: "An item to be held by a Pokémon. The holder will be\nable to shake off move-binding effects to move freely—\nbut only once."
    fr: "Objet à tenir. Permet au Pokémon de choisir sa capacité\nnormalement lorsque la sélection a été limitée.\nNe peut être utilisé qu’une fois."
    it: "Strumento monouso che guarisce il Pokémon\ndalle condizioni che gli impediscono di usare\nle sue mosse."
    de: "Ein Item zum Tragen. Es befreit den Träger einmalig von\nEffekten, die ihn vom Einsatz von Attacken abhalten."
    es: "El Pokémon que la lleva se libera de los efectos que le\nrestringen qué movimientos puede utilizar. Es de un solo\nuso."
    ko: "지니게 한 포켓몬은\n헤롱헤롱 상태가 되었을 때\n한 번만 회복한다."
    zh_simp: "当携带它的宝可梦\n无法自由使出招式时，\n仅会回复１次。"
    zh_trad: "當攜帶它的寶可夢\n無法自由使出招式時，\n會僅回復１次。"
meowth_candy:
  names:
    jp_kana: ニャースのアメ
    jp_kanji: ニャースのアメ
    en: Meowth Candy
    fr: Bonbon Miaouss
    it: Caramella Meowth
    de: Mauzi-Bonbon
    es: Caramelo Meowth
    ko: 나옹의사탕
    zh_simp: 喵喵的糖果
    zh_trad: 喵喵的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
meowth_fur:
  names:
    jp_kana: ニャースのけ
    jp_kanji: ニャースのけ
    en: Meowth Fur
    fr: Poils de Miaouss
    it: Pelo di Meowth
    de: Mauzi-Haar
    es: Pelo de Meowth
    ko: 나옹의털
    zh_simp: 喵喵的毛
    zh_trad: 喵喵的毛
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
mesprits_plume:
  names:
    jp_kana: エムリットのはね
    jp_kanji: エムリットのはね
    en: Mesprit’s Plume
    fr: Aile de Créfollet
    it: Piuma di Mesprit
    de: Vesprit-Feder
    es: Pluma de Mesprit
    ko: 엠라이트의깃털
    zh_simp: 艾姆利多之翅
    zh_trad: 艾姆利多之翅
  descriptions:
    jp_kana: "シンジ湖にすむ感情の神\nエムリットの試練を達成した証。\nあかいくさりをつくるために必要。"
    jp_kanji: "シンジ湖にすむ感情の神\nエムリットの試練を達成した証。\nあかいくさりをつくるために必要。"
    en: "Proof that you have completed the trial set by Mesprit,\nthe Being of Emotion that lives in Lake Verity.\nThis item is needed to forge the Red Chain."
    fr: "Cet objet atteste que vous avez réussi l’épreuve de\nCréfollet, « l’être de l’émotion » qui vit au Lac Vérité.\nIl est indispensable pour forger la Chaîne Rouge."
    it: "Attesta il superamento della prova di Mesprit, la divinità\ndelle emozioni che dimora nel Lago Verità.\nIndispensabile per forgiare la Catena rossa."
    de: "Diese Feder beweist deinen Abschluss der Prüfung des\nfühlenden Wesens Vesprit, das im See der Wahrheit lebt.\nSie ist nötig, um die Rote Kette herzustellen."
    es: "Prueba de que has superado el desafío impuesto por\nMesprit, el Ser de la Emoción que habita en el Lago\nVeraz. Necesaria para forjar la Cadena Roja."
    ko: "진실호수에 사는 감정의 신\n엠라이트의 시련을 클리어한 증표.\n빨강사슬을 만드는 데 필요하다."
    zh_simp: "完成了住在心齐湖的感情之神\n艾姆利多的考验的证明。\n制造红色锁链时的必备品。"
    zh_trad: "達成了住在心齊湖的感情之神\n艾姆利多的試煉的證明。\n製造紅色鎖鏈時的必備品。"
metagrossite:
  names:
    jp_kana: メタグロスナイト
    jp_kanji: メタグロスナイト
    en: Metagrossite
    fr: Métalossite
    it: Metagrossite
    de: Metagrossnit
    es: Metagrossita
    ko: 메타그로스나이트
    zh_simp: 巨金怪进化石
    zh_trad: 巨金怪進化石
  descriptions:
    jp_kana: "メタグロスに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    jp_kanji: "メタグロスに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Metagross hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Métalosse, elle lui permet\nde méga-évoluer durant un combat."
    it: "Una delle misteriose Megapietre. Data a Metagross,\ngli permette di megaevolversi durante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Metagross getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Metagross en combate."
    ko: "메타그로스에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让巨金怪携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓巨金怪攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
metal_alloy:
  names:
    jp_kana: ふくごうきんぞく
    jp_kanji: ふくごうきんぞく
    en: Metal Alloy
    fr: Métal Composite
    it: Metallo composito
    de: Legierungsmetall
    es: Metal Compuesto
    ko: 복합금속
    zh_simp: 复合金属
    zh_trad: 複合金屬
  descriptions:
    jp_kana: "ある特定の　ポケモンを\n進化させる　不思議な金属。\nいくつもの層が　重なっている。"
    jp_kanji: "ある特定の　ポケモンを\n進化させる　不思議な金属。\nいくつもの層が　重なっている。"
    en: "A peculiar metal that can make certain species of\nPokémon evolve. It is composed of many layers."
    fr: "Un morceau de métal étrange qui permet de\nfaire évoluer une certaine espèce de Pokémon.\nIl est composé de plusieurs couches."
    it: "Metallo particolare che fa evolvere determinate\nspecie di Pokémon. È composto da vari strati."
    de: "Dieses besondere Metall löst bei einem bestimmten\nPokémon die Entwicklung aus. Es besteht aus einer\nVielzahl an übereinanderliegenden Schichten."
    es: "Curioso metal que hace evolucionar a una determinada\nespecie de Pokémon. Está formado por distintas capas."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 금속.\n여러 겹으로 겹쳐져 있다."
    zh_simp: "能让某些特定宝可梦\n进化的神奇金属。\n由多个层次叠加而成。"
    zh_trad: "能讓特定寶可夢\n進化的神奇金屬。\n由許多的層次堆疊而成。"
metal_coat:
  names:
    jp_kana: メタルコート
    jp_kanji: メタルコート
    en: Metal Coat
    fr: Peau Métal
    it: Metalcopertura
    de: Metallmantel
    es: Revest. Metálico
    ko: 금속코트
    zh_simp: 金属膜
    zh_trad: 金屬膜
  descriptions:
    jp_kana: "特殊な金属の　膜。\n持たせると　はがねタイプの\n技の威力が　あがる。"
    jp_kanji: "特殊な金属の　膜。\n持たせると　はがねタイプの\n技の威力が　あがる。"
    en: "An item to be held by a Pokémon. It’s a special metallic\ncoating that boosts the power of the holder’s Steel-type\nmoves."
    fr: "Objet à tenir. Une pellicule métallique spéciale\nqui augmente la puissance des capacités de type Acier."
    it: "Strumento da dare a un Pokémon. Speciale rivestimento\nmetallico che potenzia le mosse di tipo Acciaio."
    de: "Ein Item zum Tragen. Eine spezielle Beschichtung aus\nMetall, die Attacken vom Typ Stahl verstärkt."
    es: "Película metálica que potencia los movimientos de tipo\nAcero. Debe llevarlo un Pokémon."
    ko: "특수한 금속 장막.\n지니게 하면 강철타입\n기술의 위력이 올라간다."
    zh_simp: "特殊的金属膜。\n携带后，钢属性的\n招式威力就会提高。"
    zh_trad: "特殊的金屬膜。\n攜帶後，鋼屬性的\n招式威力就會提高。"
metal_powder:
  names:
    jp_kana: メタルパウダー
    jp_kanji: メタルパウダー
    en: Metal Powder
    fr: Poudre Métal
    it: Metalpolvere
    de: Metallstaub
    es: Polvo Metálico
    ko: 금속파우더
    zh_simp: 金属粉
    zh_trad: 金屬粉
  descriptions:
    jp_kana: "メタモンに　持たせると　防御が\nあがる　不思議な粉。\nとても　こまかくて　硬い。"
    jp_kanji: "メタモンに　持たせると　防御が\nあがる　不思議な粉。\nとても　こまかくて　硬い。"
    en: "An item to be held by Ditto. Extremely fine yet hard,\nthis odd powder boosts Ditto’s Defense stat."
    fr: "Objet à faire tenir à Métamorph.\nCette poudre étrange, très fine mais résistante,\naugmente sa Défense."
    it: "Strumento da dare a Ditto. Strana polvere finissima\ne al tempo stesso dura che migliora la Difesa."
    de: "Ein Item, das von Ditto getragen werden kann. Fein und\ndoch hart, erhöht dieses sonderbare Pulver die\nVerteidigung."
    es: "Polvo muy fino, pero a la vez poderoso, que aumenta\nla Defensa. Debe llevarlo Ditto."
    ko: "메타몽에게 지니게 하면\n방어가 올라가는 이상한 가루.\n매우 잘고 단단하다."
    zh_simp: "让百变怪携带后，\n防御就会提高的神奇粉末。\n非常细腻坚硬。"
    zh_trad: "讓百變怪攜帶後，\n防禦就會提高的神奇粉末。\n非常細緻堅硬。"
meteorite:hoenn:
  names:
    jp_kana: いんせき
    jp_kanji: いんせき
    en: Meteorite
    fr: Météorite
    it: Meteorite
    de: Meteorit
    es: Meteorito
    ko: 운석
    zh_simp: 陨石
    zh_trad: 隕石
  descriptions:
    jp_kana: "元々は　流星の滝に\n落ちていた　いんせき。\nえんとつ山で　手に入れた。"
    jp_kanji: "元々は　流星の滝に\n落ちていた　いんせき。\nえんとつ山で　手に入れた。"
    en: "A meteorite originally found at Meteor Falls.\nYou got it at Mt. Chimney."
    fr: "Une météorite qui s’est écrasée sur le Site Météore,\ntrouvée au Mont Chimnée."
    it: "Meteorite proveniente dalle Cascate Meteora.\nPuoi ottenerlo sul Monte Camino."
    de: "Ein Meteorit, der ursprünglich bei den Meteorfällen\neingeschlagen ist. Du hast ihn beim Schlotberg erhalten."
    es: "Meteorito obtenido en el Monte Cenizo que antes se\nencontraba en la Cascada Meteoro."
    ko: "원래는 유성의 폭포에\n떨어져 있던 운석이다.\n굴뚝산에서 손에 넣었다."
    zh_simp: "原本是落入流星瀑布里的陨石。\n是在烟囱山获得的。"
    zh_trad: "原為墜落在\n流星瀑布裡的隕石。\n在煙囪山得到了它。"
meteorite:hoenn_2:
  names:
    jp_kana: いんせき
    jp_kanji: いんせき
    en: Meteorite
    fr: Météorite
    it: Meteorite
    de: Meteorit
    es: Meteorito
    ko: 운석
    zh_simp: 陨石
    zh_trad: 隕石
  descriptions:
    jp_kana: "えんとつ山で　手に入れた　いんせき。\nほのかに　輝きを　放っている。"
    jp_kanji: "えんとつ山で　手に入れた　いんせき。\nほのかに　輝きを　放っている。"
    en: "A meteorite that you got at Mt. Chimney. It gives off\na faint glow."
    fr: "Une météorite trouvée au Mont Chimnée.\nElle émet une légère lueur."
    it: "Meteorite ottenuto sul Monte Camino.\nEmette una debole luminescenza."
    de: "Ein Meteorit, den du beim Schlotberg erhalten hast.\nVom ihm geht ein schwaches Leuchten aus."
    es: "Meteorito obtenido en el Monte Cenizo. Desprende un\ntenue brillo."
    ko: "굴뚝산에서 손에 넣은 운석.\n은은하게 빛을 발하고 있다."
    zh_simp: "在烟囱山上获得的陨石。\n隐约散发着光辉。"
    zh_trad: "在煙囪山上獲得的隕石。\n隱約散發著光芒。"
meteorite:hoenn_3:
  names:
    jp_kana: いんせき
    jp_kanji: いんせき
    en: Meteorite
    fr: Météorite
    it: Meteorite
    de: Meteorit
    es: Meteorito
    ko: 운석
    zh_simp: 陨石
    zh_trad: 隕石
  descriptions:
    jp_kana: "えんとつ山で　手に入れた　いんせき。\nほのかな　光を　放ち続けている。\n触れると　じんわり　暖かい。"
    jp_kanji: "えんとつ山で　手に入れた　いんせき。\nほのかな　光を　放ち続けている。\n触れると　じんわり　暖かい。"
    en: "A meteorite that you got at Mt. Chimney.\nIt continues to give off a faint glow and is slightly\nwarm to the touch."
    fr: "Une météorite trouvée au Mont Chimnée.\nElle émet une faible lueur de façon continue,\net est légèrement tiède au toucher."
    it: "Meteorite ottenuto sul Monte Camino.\nEmette una debole luminescenza.\nToccandolo, si avverte un certo calore."
    de: "Ein Meteorit, den du beim Schlotberg erhalten hast.\nVon ihm geht ein schwaches Licht aus. Wenn man ihn\nberührt, wird er warm."
    es: "Meteorito obtenido en el Monte Cenizo. Sigue\ndesprendiendo un tenue brillo y es ligeramente cálido\nal tacto."
    ko: "굴뚝산에서 손에 넣은 운석.\n은은한 빛을 계속해서 발하고 있다.\n만지면 은근히 따뜻하다."
    zh_simp: "在烟囱山上获得的陨石。\n持续散发着微光。\n摸上去隐约有点暖暖的。"
    zh_trad: "在煙囪山上獲得的隕石。\n持續散發著微微光芒。\n摸起來有點暖暖的。"
meteorite:hoenn_4:
  names:
    jp_kana: いんせき
    jp_kanji: いんせき
    en: Meteorite
    fr: Météorite
    it: Meteorite
    de: Meteorit
    es: Meteorito
    ko: 운석
    zh_simp: 陨石
    zh_trad: 隕石
  descriptions:
    jp_kana: "えんとつ山で　手に入れた　いんせき。\nなにかの　文様が　浮かび上がり\n七色の　光が　あふれだす。"
    jp_kanji: "えんとつ山で　手に入れた　いんせき。\nなにかの　文様が　浮かび上がり\n七色の　光が　あふれだす。"
    en: "A meteorite that you got at Mt. Chimney.\nSome sort of pattern has risen to the surface,\nand it’s shining with rainbow-colored light."
    fr: "Une météorite trouvée au Mont Chimnée.\nUn étrange symbole est gravé à sa surface,\net luit des sept couleurs de l’arc-en-ciel."
    it: "Meteorite ottenuto sul Monte Camino.\nSulla superficie è visibile un motivo in rilievo\nche brilla dei colori dell’arcobaleno."
    de: "Ein Meteorit, den du beim Schlotberg erhalten hast.\nEr ist seltsam gemustert und aus seinem Inneren strahlt\nein regenbogenfarbenes Licht."
    es: "Meteorito obtenido en el Monte Cenizo. Presenta unos\npeculiares grabados e irradia una luz con los siete\ncolores del arcoíris."
    ko: "굴뚝산에서 손에 넣은 운석.\n어떤 문양이 드러나며\n일곱 색깔의 빛이 넘쳐 난다."
    zh_simp: "在烟囱山上获得的陨石。\n上面浮现着某些花纹，\n并散发着七色光芒。"
    zh_trad: "在煙囪山上獲得的隕石。\n上面浮現出某種花紋，\n並流瀉著七色光芒。"
meteorite:paldea:
  names:
    jp_kana: いんせき
    jp_kanji: いんせき
    en: Meteorite
    fr: Météorite
    it: Meteorite
    de: Meteorit
    es: Meteorito
    ko: 운석
    zh_simp: 陨石
    zh_trad: 隕石
  descriptions:
    jp_kana: "宇宙から　地上に　落ちてきた石。\nさわると　じんわり　温かい。\n特定のポケモンの　姿を　変える。"
    jp_kanji: "宇宙から　地上に　落ちてきた石。\nさわると　じんわり　温かい。\n特定のポケモンの　姿を　変える。"
    en: "A rock that fell to earth from space. It’s slightly\nwarm to the touch. It allows a certain species of\nPokémon to change forms."
    fr: "Une pierre venue de l’espace, qui permet\nà un certain Pokémon de changer d’apparence.\nElle est légèrement tiède au toucher."
    it: "Una roccia caduta dallo spazio che fa cambiare forma\na una determinata specie di Pokémon. Toccandola,\nsi avverte un certo calore."
    de: "Ein Stein, der aus dem Weltall auf die Erde gefallen ist\nund bei Berührung eine sanfte Wärme ausstrahlt.\nEin bestimmtes Pokémon kann damit seine Form ändern."
    es: "Roca proveniente del espacio exterior capaz de hacer\ncambiar de forma a cierto Pokémon. Es ligeramente\ncálida al tacto."
    ko: "우주로부터 지상에 떨어진 돌.\n만지면 은근히 따뜻하다.\n특정 포켓몬의 모습을 바꾼다."
    zh_simp: "从宇宙中坠落到地面上的石头。\n摸上去隐约有点暖暖的。\n可以改变特定宝可梦的样子。"
    zh_trad: "從宇宙落到地上的石頭。\n摸起來帶著一點微溫。\n可以改變特定寶可夢的樣子。"
meteorite_shard:
  names:
    jp_kana: いんせきのかけら
    jp_kanji: いんせきのかけら
    en: Meteorite Shard
    fr: Éclat Météorite
    it: Framm. meteorite
    de: Meteoritenstück
    es: Fragmento Meteorito
    ko: 운석조각
    zh_simp: 陨石碎片
    zh_trad: 隕石碎片
  descriptions:
    jp_kana: "石の洞窟に　落ちていた\nいんせきのかけらの　ひとつ。\n触れると　ほのかに　暖かい。"
    jp_kanji: "石の洞窟に　落ちていた\nいんせきのかけらの　ひとつ。\n触れると　ほのかに　暖かい。"
    en: "One of the fragments of a meteorite from\nGranite Cave. It’s faintly warm to the touch."
    fr: "L’un des fragments de météorite tombés dans\nla Grotte Granite. Il est légèrement tiède au toucher."
    it: "Frammento di meteorite trovato nella Grotta Pietrosa.\nToccandolo, si avverte un certo calore."
    de: "Eines der Meteoritenstücke aus der Granithöhle.\nWenn man es berührt, wird es ein bisschen warm."
    es: "Trozo de meteorito encontrado en el suelo de la\nCueva Granito. Es ligeramente cálido al tacto."
    ko: "바위 동굴에 떨어진\n운석조각 중의 하나.\n만지면 은근히 따뜻하다."
    zh_simp: "掉落在石之洞窟里的\n陨石碎片之一。\n摸上去有一点点暖暖的。"
    zh_trad: "掉落在石之洞窟裡的\n隕石碎片之一。\n摸起來有點暖暖的。"
metronome:
  names:
    jp_kana: メトロノーム
    jp_kanji: メトロノーム
    en: Metronome
    fr: Métronome
    it: Plessimetro
    de: Metronom
    es: Metrónomo
    ko: 메트로놈
    zh_simp: 节拍器
    zh_trad: 節拍器
  descriptions:
    jp_kana: "持たせると　同じ技を　連続で\n使ったとき　威力が　あがる。\nやめると　威力は　もどる。"
    jp_kanji: "持たせると　同じ技を　連続で\n使ったとき　威力が　あがる。\nやめると　威力は　もどる。"
    en: "An item to be held by a Pokémon. It boosts the power\nof a move that’s used repeatedly. Once the chain is\nbroken, the move’s power returns to normal."
    fr: "Objet à tenir. Amplifie une capacité utilisée à répétition.\nL’effet s’annule si une autre capacité est utilisée."
    it: "Strumento da dare a un Pokémon. Potenzia una mossa\nusata più volte di seguito. Il potenziamento svanisce\nal cambio di mossa."
    de: "Ein Item zum Tragen. Verstärkt eine Attacke, je öfter sie\nin Folge ausgeführt wird."
    es: "Potencia un movimiento que se use de forma\nconsecutiva, pero el efecto se pierde si se emplea otro\nmovimiento. Debe llevarlo un Pokémon."
    ko: "지니게 하면 똑같은 기술을 연속으로\n사용했을 때 위력이 올라간다.\n그만두면 위력이 되돌아간다."
    zh_simp: "携带后，连续使出相同招式时，\n威力就会提高。不再使出\n相同招式时，威力就会复原。"
    zh_trad: "攜帶後，連續使出相同招式時，\n威力就會提高。停止時，\n威力就會復原。"
mew_candy:
  names:
    jp_kana: ミュウのアメ
    jp_kanji: ミュウのアメ
    en: Mew Candy
    fr: Bonbon Mew
    it: Caramella Mew
    de: Mew-Bonbon
    es: Caramelo Mew
    ko: 뮤의사탕
    zh_simp: 梦幻的糖果
    zh_trad: 夢幻的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de cierto Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
mewnium_z:bag:
  names:
    jp_kana: ミュウＺ
    jp_kanji: ミュウＺ
    en: Mewnium Z
    fr: Mewzélite
    it: Mewnium Z
    de: Mewnium Z
    es: Mewstal Z
    ko: 뮤Z
    zh_simp: 梦幻Ｚ
    zh_trad: 夢幻Ｚ
  descriptions:
    jp_kana: "ミュウの　サイコキネシスを\n特別な　Ｚワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    jp_kanji: "ミュウの　サイコキネシスを\n特別な　Ｚワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nMew’s Psychic to a Z-Move."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise le Mew qui le tient à transformer\nsa capacité Psyko en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono a Mew di trasformare la mossa\nPsichico in una mossa Z."
    de: "Kristallisierte Z-Kraft, die Mews Attacke\nPsychokinese zu einer Z-Attacke aufstuft.\nWird bei Bedarf automatisch vervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a\nMew convertir su Psíquico en un movimiento Z."
    ko: "뮤의 사이코키네시스를\n특별한 Z기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将梦幻的精神强念\n升级成特殊Ｚ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把夢幻的精神強念\n升級為特殊Ｚ招式的Ｚ力量結晶。"
mewnium_z:held:
  names:
    jp_kana: ミュウＺ
    jp_kanji: ミュウＺ
    en: Mewnium Z
    fr: Mewzélite
    it: Mewnium Z
    de: Mewnium Z
    es: Mewstal Z
    ko: 뮤Z
    zh_simp: 梦幻Ｚ
    zh_trad: 夢幻Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　結晶。\nミュウの　サイコキネシスを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nミュウの　サイコキネシスを\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Mew’s Psychic to a Z-Move."
    fr: "Une cristallisation de la Force Z, permettant\nde transformer la capacité Psyko de Mew\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare la mossa Psichico di Mew\nin una mossa Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft Mews\nAttacke Psychokinese zu einer Z-Attacke auf."
    es: "Cristal que confiere el Poder Z al movimiento Psíquico\nde Mew."
    ko: "Z파워의 결정.\n뮤의 사이코키네시스를\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将梦幻的精神强念\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把夢幻的精神強念\n升級為Ｚ招式。"
mewtwo_candy:
  names:
    jp_kana: ミュウツーのアメ
    jp_kanji: ミュウツーのアメ
    en: Mewtwo Candy
    fr: Bonbon Mewtwo
    it: Caramella Mewtwo
    de: Mewtu-Bonbon
    es: Caramelo Mewtwo
    ko: 뮤츠의사탕
    zh_simp: 超梦的糖果
    zh_trad: 超夢的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de cierto Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
mewtwonite_x:
  names:
    jp_kana: ミュウツナイトＸ
    jp_kanji: ミュウツナイトＸ
    en: Mewtwonite X
    fr: Mewtwoïte X
    it: Mewtwoite X
    de: Mewtunit X
    es: Mewtwoita X
    ko: 뮤츠나이트X
    zh_simp: 超梦进化石Ｘ
    zh_trad: 超夢進化石Ｘ
  descriptions:
    jp_kana: "ミュウツーに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    jp_kanji: "ミュウツーに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Mewtwo hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par Mewtwo, elle lui permet de\nméga-évoluer durant un combat."
    it: "Una delle misteriose Megapietre. Data a Mewtwo,\ngli permette di megaevolversi durante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Mewtu getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Mewtwo en combate."
    ko: "뮤츠에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让超梦携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓超夢攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
mewtwonite_y:
  names:
    jp_kana: ミュウツナイトＹ
    jp_kanji: ミュウツナイトＹ
    en: Mewtwonite Y
    fr: Mewtwoïte Y
    it: Mewtwoite Y
    de: Mewtunit Y
    es: Mewtwoita Y
    ko: 뮤츠나이트Y
    zh_simp: 超梦进化石Ｙ
    zh_trad: 超夢進化石Ｙ
  descriptions:
    jp_kana: "ミュウツーに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    jp_kanji: "ミュウツーに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Mewtwo hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par Mewtwo, elle lui permet de\nméga-évoluer durant un combat."
    it: "Una delle misteriose Megapietre. Data a Mewtwo,\ngli permette di megaevolversi durante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Mewtu getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Mewtwo en combate."
    ko: "뮤츠에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让超梦携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓超夢攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
micle_berry:
  names:
    jp_kana: ミクルのみ
    jp_kanji: ミクルのみ
    en: Micle Berry
    fr: Baie Micle
    it: Baccaracolo
    de: Wunfrubeere
    es: Baya Lagro
    ko: 미클열매
    zh_simp: 奇秘果
    zh_trad: 奇秘果
  descriptions:
    jp_kana: "ポケモンに　持たせると\nピンチのとき　１度だけ\n技の　命中率が　あがる。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　１度だけ\n技の　命中率が　あがる。"
    en: "If a Pokémon holds one of these Berries, its accuracy will\nbe boosted should it find itself in a pinch—but only for\nthe next move it uses."
    fr: "Tenue, cette Baie augmente une fois la Précision\nd’une capacité en cas de besoin."
    it: "Se il Pokémon che ha questa bacca si trova in difficoltà,\nla precisione della sua mossa successiva aumenta.\nFunziona una sola volta."
    de: "Als getragenes Item erhöht diese Beere einmalig die\nGenauigkeit des Pokémon, sobald es in einer Notlage\nsteckt."
    es: "Si la lleva un Pokémon, le aumenta una única vez la\nprecisión de un movimiento en un momento de apuro."
    ko: "포켓몬에게 지니게 하면\n위급할 때 한 번만\n기술의 명중률이 올라간다."
    zh_simp: "让宝可梦携带后，危机时，\n招式的命中率仅会提高１次。"
    zh_trad: "讓寶可夢攜帶後，\n危機時，招式的命中率\n會僅提高１次。"
mienfoo_claw:
  names:
    jp_kana: コジョフーのツメ
    jp_kanji: コジョフーのツメ
    en: Mienfoo Claw
    fr: Griffe de Kungfouine
    it: Artiglio di Mienfoo
    de: Lin-Fu-Kralle
    es: Garra de Mienfoo
    ko: 비조푸의손톱
    zh_simp: 功夫鼬的爪子
    zh_trad: 功夫鼬的爪子
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
mighty_candy:
  names:
    jp_kana: ちからのアメ
    jp_kanji: ちからのアメ
    en: Mighty Candy
    fr: Bonbon Force S
    it: Caramella potenza S
    de: Stärkebonbon
    es: Caramelo Músculo
    ko: 힘의사탕
    zh_simp: 力量糖果
    zh_trad: 力量糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nポケモンの　こうげきを　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\nポケモンの　こうげきを　上げる。"
    en: "A candy that is packed with energy. When given to\na Pokémon, it will increase that Pokémon’s Attack stat."
    fr: "Un bonbon plein d’énergie.\nIl augmente l’Attaque d’un Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta l’Attacco di un Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nden Angriff eines Pokémon."
    es: "Caramelo energético que aumenta el Ataque del\nPokémon."
    ko: "에너지가 가득한 사탕.\n포켓몬의 공격을 올린다."
    zh_simp: "充满能量的糖果。\n能提高宝可梦的攻击。"
    zh_trad: "充滿能量的糖果。\n能提高寶可夢的攻擊。"
mighty_candy_l:
  names:
    jp_kana: ちからのアメＬ
    jp_kanji: ちからのアメＬ
    en: Mighty Candy L
    fr: Bonbon Force M
    it: Caramella potenza M
    de: Stärkebonbon+
    es: Caramelo Músculo +
    ko: 힘의사탕L
    zh_simp: 力量糖果Ｌ
    zh_trad: 力量糖果Ｌ
  descriptions:
    jp_kana: "エネルギーの　つまった　大きい　アメ。\nレベル３０　以上の　ポケモンの\nこうげきを　上げる。"
    jp_kanji: "エネルギーの　つまった　大きい　アメ。\nレベル３０　以上の　ポケモンの\nこうげきを　上げる。"
    en: "A big candy that is packed with energy. When given to\na Pokémon at Lv. 30 or higher, it will increase that\nPokémon’s Attack stat."
    fr: "Un gros bonbon plein d’énergie.\nIl augmente l’Attaque d’un Pokémon de niveau 30\nou supérieur."
    it: "Una caramella grande piena zeppa di energia.\nAumenta l’Attacco di un Pokémon di livello 30\no superiore."
    de: "Ein großes Bonbon, das voller Energie steckt.\nErhöht dauerhaft den Angriff eines Pokémon ab\nLevel 30."
    es: "Caramelo energético grande que aumenta el Ataque de\nun Pokémon de Nv. 30 o superior."
    ko: "에너지가 가득한 큰 사탕.\n레벨 30 이상인 포켓몬의\n공격을 올린다."
    zh_simp: "充满能量的大糖果。\n能让等级３０以上的\n宝可梦的攻击上升。"
    zh_trad: "充滿能量的大糖果。\n能提高等級在３０以上的\n寶可夢的攻擊。"
mighty_candy_xl:
  names:
    jp_kana: ちからのアメＸＬ
    jp_kanji: ちからのアメＸＬ
    en: Mighty Candy XL
    fr: Bonbon Force L
    it: Caramella potenza L
    de: Stärkebonbon++
    es: Caramelo Músculo ++
    ko: 힘의사탕XL
    zh_simp: 力量糖果ＸＬ
    zh_trad: 力量糖果ＸＬ
  descriptions:
    jp_kana: "エネルギーの　つまった　特大の　アメ。\nレベル６０　以上の　ポケモンの\nこうげきを　上げる。"
    jp_kanji: "エネルギーの　つまった　特大の　アメ。\nレベル６０　以上の　ポケモンの\nこうげきを　上げる。"
    en: "A huge candy that is packed with energy. When given\nto a Pokémon at Lv. 60 or higher, it will increase that\nPokémon’s Attack stat."
    fr: "Un énorme bonbon plein d’énergie.\nIl augmente l’Attaque d’un Pokémon de niveau 60\nou supérieur."
    it: "Una caramella enorme piena zeppa di energia.\nAumenta l’Attacco di un Pokémon di livello 60\no superiore."
    de: "Ein riesiges Bonbon, das voller Energie steckt.\nErhöht dauerhaft den Angriff eines Pokémon ab\nLevel 60."
    es: "Caramelo energético enorme que aumenta el Ataque\nde un Pokémon de Nv. 60 o superior."
    ko: "에너지가 가득한 매우 큰 사탕.\n레벨 60 이상인 포켓몬의\n공격을 올린다."
    zh_simp: "充满能量的超大糖果。\n能让等级６０以上的\n宝可梦的攻击上升。"
    zh_trad: "充滿能量的特大糖果。\n能提高等級在６０以上的\n寶可夢的攻擊。"
milcery_cream:
  names:
    jp_kana: マホミルのクリーム
    jp_kanji: マホミルのクリーム
    en: Milcery Cream
    fr: Crème de Crèmy
    it: Panna di Milcery
    de: Hokumil-Sahne
    es: Nata de Milcery
    ko: 마빌크의크림
    zh_simp: 小仙奶的奶油
    zh_trad: 小仙奶的奶油
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
mild_mint:
  names:
    jp_kana: おっとりミント
    jp_kanji: おっとりミント
    en: Mild Mint
    fr: Aromate Doux
    it: Menta Mite
    de: Mild-Minze
    es: Menta Afable
    ko: 의젓민트
    zh_simp: 慢吞吞薄荷
    zh_trad: 慢吞吞薄荷
  descriptions:
    jp_kana: "ポケモンに　香りを　かがせると\n特攻が　上がりやすく　なるが\n防御は　上がりにくくなる　ミント。"
    jp_kanji: "ポケモンに　香りを　かがせると\n特攻が　上がりやすく　なるが\n防御は　上がりにくくなる　ミント。"
    en: "Having a Pokémon smell this mint can make its Sp. Atk\nstat grow stronger. However, its Defense stat may suffer."
    fr: "Si un Pokémon hume cet aromate, son Attaque Spéciale\nmontera plus facilement, mais sa Défense\nse développera plus lentement."
    it: "Quando un Pokémon ne sente il profumo,\nil suo Attacco Speciale aumenta più facilmente\na scapito della Difesa."
    de: "Lässt man ein Pokémon an dieser Minze schnuppern,\nsteigt sein Spezial-Angriff schneller, aber seine\nVerteidigung umso langsamer."
    es: "Cuando un Pokémon percibe su aroma, aumenta con\nmás facilidad su Ataque Especial, en detrimento de su\nDefensa."
    ko: "포켓몬에게 향기를 맡게 하면\n특수공격이 오르기 쉬워지지만\n방어가 오르기 어려워지는 민트."
    zh_simp: "宝可梦闻了这种薄荷之后，\n会令特攻容易提高，\n而防御则难以提高。"
    zh_trad: "讓寶可夢聞這種薄荷的氣味，\n會令特攻變得容易提高，\n但防禦則難以提高。"
mimikium_z:bag:
  names:
    jp_kana: ミミッキュＺ
    jp_kanji: ミミッキュＺ
    en: Mimikium Z
    fr: Mimiquizélite
    it: Mimikyum Z
    de: Mimigmium Z
    es: Mimikyustal Z
    ko: 따라큐Z
    zh_simp: 谜拟ＱＺ
    zh_trad: 謎擬ＱＺ
  descriptions:
    jp_kana: "ミミッキュの　じゃれつくを\nＺワザに　グレードアップする\nＺパワーの　結晶を　つくりだす。"
    jp_kanji: "ミミッキュの　じゃれつくを\nＺワザに　グレードアップする\nＺパワーの　結晶を　つくりだす。"
    en: "It converts Z-Power into crystals that upgrade\nMimikyu’s Play Rough to a Z-Move."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise le Mimiqui qui le tient à transformer\nsa capacité Câlinerie en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono a Mimikyu di trasformare la mossa\nCarineria in una mossa Z."
    de: "Kristallisierte Z-Kraft, die Mimigmas Attacke Knuddler\nzu einer Z-Attacke aufstuft. Wird bei Bedarf\nautomatisch vervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a\nMimikyu convertir su Carantoña en un movimiento Z."
    ko: "따라큐의 치근거리기를\nZ기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将谜拟Ｑ的嬉闹\n升级成Ｚ招式的Ｚ力量结晶。"
    zh_trad: "可用來製造將\n謎擬Ｑ的嬉鬧\n升級為Ｚ招式的Ｚ力量結晶。"
mimikium_z:held:
  names:
    jp_kana: ミミッキュＺ
    jp_kanji: ミミッキュＺ
    en: Mimikium Z
    fr: Mimiquizélite
    it: Mimikyum Z
    de: Mimigmium Z
    es: Mimikyustal Z
    ko: 따라큐Z
    zh_simp: 谜拟ＱＺ
    zh_trad: 謎擬ＱＺ
  descriptions:
    jp_kana: "Ｚパワーの　結晶。\nミミッキュの　じゃれつくを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nミミッキュの　じゃれつくを\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Mimikyu’s Play Rough to a Z-Move."
    fr: "Une cristallisation de la Force Z, permettant\nde transformer la capacité Câlinerie d’un Mimiqui\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare la mossa Carineria\ndi Mimikyu in una mossa Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft Mimigmas\nAttacke Knuddler zu einer Z-Attacke auf."
    es: "Cristal que confiere el Poder Z al movimiento\nCarantoña de Mimikyu."
    ko: "Z파워의 결정.\n따라큐의 치근거리기를\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将谜拟Ｑ的嬉闹\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n可將謎擬Ｑ的嬉鬧\n升級為Ｚ招式。"
