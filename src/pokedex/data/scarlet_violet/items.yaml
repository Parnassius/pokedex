courage_candy:
  names:
    jp_kana: こころのアメ
    jp_kanji: こころのアメ
    en: Courage Candy
    fr: Bonbon Mental S
    it: Caramella intuito S
    de: Mentalbonbon
    es: Caramelo Mente
    ko: 마음의사탕
    zh_simp: 心灵糖果
    zh_trad: 心靈糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nポケモンの　とくぼうを　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\nポケモンの　とくぼうを　上げる。"
    en: "A candy that is packed with energy. When given to\na Pokémon, it will increase that Pokémon’s Sp. Def stat."
    fr: "Un bonbon plein d’énergie.\nIl augmente la Défense Spéciale d’un Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta la Difesa Speciale di un Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\ndie Spezial-Verteidigung eines Pokémon."
    es: "Caramelo energético que aumenta la Defensa Especial\ndel Pokémon."
    ko: "에너지가 가득한 사탕.\n포켓몬의 특수방어를 올린다."
    zh_simp: "充满能量的糖果。\n能提高宝可梦的特防。"
    zh_trad: "充滿能量的糖果。\n能提高寶可夢的特防。"
