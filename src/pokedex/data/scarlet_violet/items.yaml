diamond_bottle:
  names:
    jp_kana: ダイヤボトル
    jp_kanji: ダイヤボトル
    en: Diamond Bottle
    fr: Gourde à Losanges
    it: Borraccia a rombi
    de: Rauten-Flasche
    es: Termo Rombos
    ko: 다이아 보틀
    zh_simp: 菱纹水壶
    zh_trad: 菱紋水壺
  descriptions:
    jp_kana: "ダイヤ柄の　軽くて　小さい\nコップつき　水筒。　つけ外し　できる\nストラップは　持ち歩きにも　便利。"
    jp_kanji: "ダイヤ柄の　軽くて　小さい\nコップつき　水筒。　つけ外し　できる\nストラップは　持ち歩きにも　便利。"
    en: "A diamond-patterned bottle that’s small, light, and even\ncomes with a cup. The detachable strap makes it handy\nfor walking around with."
    fr: "Une gourde à losanges avec une petite tasse assortie.\nPetite et légère, elle est facile à emporter avec soi\nen balade grâce à sa lanière détachable."
    it: "Borraccia piccola e leggera decorata con un motivo\na rombi e dotata di bicchiere. Può essere portata\ncomodamente in giro grazie alla cinghia rimovibile."
    de: "Zu dieser kleinen und leichten Thermosflasche mit\nRautenmuster gehört auch eine passende Tasse. Dank\nabnehmbarem Riemen lässt sie sich bequem mitführen."
    es: "Un termo a rombos ligero y con tacita incorporada.\nLa correa se puede poner y quitar, lo que lo hace\nmuy cómodo para llevárselo de paseo."
    ko: "다이아 무늬의 가볍고 작은 보틀.\n컵이 포함되어 있다. 탈착 가능한\n스트랩이 있어서 들고 다니기 편하다."
    zh_simp: "带有菱纹图案，轻便小巧\n还附带杯子的水壶。配备了\n可拆式挂绳，方便携带。"
    zh_trad: "裝飾著菱狀花紋，輕盈小巧，\n附帶水杯的水壺。\n背帶可自由拆卸，所以也方便攜帶。"
diamond_chairs:
  names:
    jp_kana: ダイヤチェア
    jp_kanji: ダイヤチェア
    en: Diamond Chairs
    fr: Sièges à Losanges
    it: Sedie a rombi
    de: Rauten-Stühle
    es: Sillas Rombos
    ko: 다이아 체어
    zh_simp: 菱纹椅子
    zh_trad: 菱紋椅子
  descriptions:
    jp_kana: "ピクニックで　使いやすい　イス。\nダイヤクロスの　デザインを\nもとに　作ってもらった。"
    jp_kanji: "ピクニックで　使いやすい　イス。\nダイヤクロスの　デザインを\nもとに　作ってもらった。"
    en: "A set of chairs that are ideal for picnicking. Their design\nwas inspired by the Diamond Tablecloth."
    fr: "Des sièges parfaits pour les pique-niques.\nLeur design est inspiré de la Nappe à Losanges."
    it: "Pratiche sedie, perfette per i picnic, ispirate al design\ndella Tovaglia a rombi."
    de: "Diese Stühle sind gut geeignet für Picknicks.\nIhr Design basiert auf dem Rauten-Tischtuch."
    es: "Unas sillas ideales para irse de pícnic. Su diseño está\nbasado en el del Mantel Rombos."
    ko: "피크닉에서 사용하기 편한 의자.\n다이아 테이블보의\n디자인을 토대로 만들어졌다."
    zh_simp: "在野餐时很好用的椅子。\n根据菱纹桌巾的设计制作而成。"
    zh_trad: "野餐時很好用的椅子。\n根據菱紋桌巾的設計製作而成。"
diamond_pattern_cup:
  names:
    jp_kana: ダイヤカップ
    jp_kanji: ダイヤカップ
    en: Diamond Pattern Cup
    fr: Tasse à Losanges
    it: Tazza a rombi
    de: Rauten-Tasse
    es: Taza Rombos
    ko: 다이아 컵
    zh_simp: 菱纹水杯
    zh_trad: 菱紋水杯
  descriptions:
    jp_kana: "家での食事でも　活躍する　カップ。\n軽くて　丈夫で　重ねられるので\n収納や　持ち運びに　とても便利。"
    jp_kanji: "家での食事でも　活躍する　カップ。\n軽くて　丈夫で　重ねられるので\n収納や　持ち運びに　とても便利。"
    en: "A cup that’s as good for using at home as on a picnic.\nIt’s light, sturdy, and stacks well, so it’s a cinch to pack\nup and carry around."
    fr: "Une tasse pouvant être utilisée partout, même chez soi.\nLégère et solide, elle s’emboîte avec d’autres tasses\nsimilaires, ce qui la rend facile à emporter et à stocker."
    it: "Tazza leggera e resistente, ottima da usare anche a casa.\nEssendo impilabile è comodissima sia da riporre che da\ntrasportare."
    de: "Diese Tasse eignet sich auch für den Gebrauch daheim.\nSie ist leicht, robust und lässt sich stapeln, weshalb man\nsie prima verstauen und überallhin mitnehmen kann."
    es: "Apta para usarse incluso en casa, esta ligera y resistente\ntaza se puede apilar con facilidad, lo que facilita tanto\nsu almacenamiento como su transporte."
    ko: "집에서 식사할 때도 쓰기 좋은 컵.\n가볍고 튼튼한 데다 겹쳐서 쌓을 수도 있어서\n휴대하거나 수납하기에도 매우 편하다."
    zh_simp: "在家吃饭时也经常会用到的杯子。\n轻巧坚固，能叠起来收纳，方便携带。"
    zh_trad: "在家庭餐桌上也是常客的水杯。\n既輕巧又堅固，而且還能堆疊，\n因此在收納或攜帶上都很方便。"
diamond_tablecloth:
  names:
    jp_kana: ダイヤクロス
    jp_kanji: ダイヤクロス
    en: Diamond Tablecloth
    fr: Nappe à Losanges
    it: Tovaglia a rombi
    de: Rauten-Tischtuch
    es: Mantel Rombos
    ko: 다이아 테이블보
    zh_simp: 菱纹桌巾
    zh_trad: 菱紋桌巾
  descriptions:
    jp_kana: "ダイヤ柄が　オシャレな　テーブルクロス。\n防水　防カビ　性能に　優れ\n汚れも　ひと拭きで　落ちる。"
    jp_kanji: "ダイヤ柄が　オシャレな　テーブルクロス。\n防水　防カビ　性能に　優れ\n汚れも　ひと拭きで　落ちる。"
    en: "A tablecloth with a fashionable diamond pattern. It’s\ngreat at repelling water and mold, and stains and\nsmudges wipe right off."
    fr: "Une nappe avec un élégant motif à losanges. Elle est\nhydrophobe, anti-moisissures, et il suffit d’un simple\ncoup d’éponge pour y faire disparaître toutes les taches."
    it: "Tovaglia dall’elegante motivo a rombi. Impermeabile\ne a prova di muffa, per pulirla basta una passata di\nspugna."
    de: "Dieses Tischtuch mit modischem Rautenmuster ist\nwunderbar wasserabweisend und schimmelfest, sodass\nsich Schmutz und Flecken leicht wegwischen lassen."
    es: "Un mantel con un original diseño a rombos. Es resistente\nal agua y al moho, por lo que es muy fácil de limpiar."
    ko: "세련된 다이아 무늬의 테이블보.\n방수와 방미 성능이 뛰어나서\n더러워져도 한 번 쓱 닦으면 깨끗해진다."
    zh_simp: "带有菱纹图案的时尚桌巾。\n既防水又防霉，性能优越。\n弄脏了也一下就能擦掉。"
    zh_trad: "擁有時尚菱狀花紋的桌巾。\n防水和防霉性能非常卓越，\n髒汙也能輕易地擦拭乾淨。"
diancite:
  names:
    jp_kana: ディアンシナイト
    jp_kanji: ディアンシナイト
    en: Diancite
    fr: Diancite
    it: Diancite
    de: Diancienit
    es: Diancita
    ko: 디안시나이트
    zh_simp: 蒂安希进化石
    zh_trad: 蒂安希進化石
  descriptions:
    jp_kana: "ディアンシーに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    jp_kanji: "ディアンシーに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Diancie hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Diancie, elle lui permet de méga-évoluer\ndurant un combat."
    it: "Una delle misteriose Megapietre. Data a Diancie,\ngli permette di megaevolversi durante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Diancie getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Diancie en combate."
    ko: "디안시에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让蒂安希携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓蒂安希攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
digger_drill:
  names:
    jp_kana: あなほりドリル
    jp_kanji: あなほりドリル
    en: Digger Drill
    fr: Foreuse
    it: Trivella
    de: Einwegbohrer
    es: Taladro
    ko: 구멍파기드릴
    zh_simp: 挖洞钻
    zh_trad: 挖洞鑽
  descriptions:
    jp_kana: "壁に　穴を開けて　秘密基地を\n作れる　使い切りの　ドリル。"
    jp_kanji: "壁に　穴を開けて　秘密基地を\n作れる　使い切りの　ドリル。"
    en: "A single-use drill to bore a hole in the wall for your\nSecret Base."
    fr: "Une foreuse à usage unique qui permet de construire\nune Base Secrète en perçant un mur."
    it: Trapano monouso per creare la tua Base Segreta.
    de: "Ein Einwegbohrer, mit dem du ein Loch in eine Wand\nbohren kannst, um eine Geheimbasis zu errichten."
    es: "Taladro de un solo uso que sirve para perforar un muro\ny construir una Base Secreta en su interior."
    ko: "벽에 구멍을 내어 비밀기지를\n만들 수 있는 일회용 드릴."
    zh_simp: "能够在墙上钻洞，\n以建造秘密基地的一次性钻头。"
    zh_trad: "能在牆壁上開洞，\n建造秘密基地的拋棄式鑽錐。"
diglett_candy:
  names:
    jp_kana: ディグダのアメ
    jp_kanji: ディグダのアメ
    en: Diglett Candy
    fr: Bonbon Taupiqueur
    it: Caramella Diglett
    de: Digda-Bonbon
    es: Caramelo Diglett
    ko: 디그다의사탕
    zh_simp: 地鼠的糖果
    zh_trad: 地鼠的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
diglett_dirt:
  names:
    jp_kana: ディグダのつち
    jp_kanji: ディグダのつち
    en: Diglett Dirt
    fr: Terre de Taupiqueur
    it: Terra di Diglett
    de: Digda-Erde
    es: Tierra de Diglett
    ko: 디그다의흙
    zh_simp: 地鼠的土
    zh_trad: 地鼠的土
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
dire_hit:
  names:
    jp_kana: クリティカット
    jp_kanji: クリティカット
    en: Dire Hit
    fr: Muscle +
    it: Supercolpo
    de: X-Volltreffer
    es: Crítico X
    ko: 크리티컬커터
    zh_simp: 要害攻击
    zh_trad: 要害攻擊
  descriptions:
    jp_kana: "急所率が　大きく　あがる。\n１度しか　使うことが　できない。\nひっこめると　元に　戻る。"
    jp_kanji: "急所率が　大きく　あがる。\n１度しか　使うことが　できない。\nひっこめると　元に　戻る。"
    en: "An item that can be used once to sharply boost the\ncritical-hit ratio of a Pokémon in battle. This effect\ndisappears if the Pokémon leaves the battle."
    fr: "Augmente fortement le taux de critiques.\nUtilisable une seule fois.\nL’effet disparaît si le Pokémon est retiré."
    it: "Aumenta di molto la probabilità di sferrare brutti colpi.\nSi può usare una sola volta e l’effetto svanisce\nse il Pokémon è sostituito."
    de: "Hebt einmalig die Volltrefferquote des Pokémon im\nKampf stark an. Die Wirkung endet mit dem Austausch\ndes Pokémon."
    es: "Aumenta mucho la probabilidad de asestar un golpe\ncrítico en combate. Solo se puede usar una vez y,\nal cambiar de Pokémon, el efecto desaparece."
    ko: "급소 명중률이 크게 올라간다.\n한 번밖에 쓸 수 없다. 포켓몬을 볼에\n넣어 버리면 원래대로 되돌아간다."
    zh_simp: "击中要害的几率会大幅提高。\n只能使用１次。\n离场后，效果便会消失。"
    zh_trad: "擊中要害的機率會大大提高。\n只能使用１次。\n離場後，效果便會消失。"
dire_hit:legends:
  names:
    jp_kana: クリティカッター
    jp_kanji: クリティカッター
    en: Dire Hit
    fr: Muscle +
    it: Supercolpo
    de: Treffervitamine
    es: Gragea Crítica
    ko: 크리티컬커터
    zh_simp: 要害攻击
    zh_trad: 要害攻擊
  descriptions:
    jp_kana: "戦闘中のポケモンの　急所に\n当たる確率を　大きくあげる　道具。\nひっこめると　元に　戻る。"
    jp_kanji: "戦闘中のポケモンの　急所に\n当たる確率を　大きくあげる　道具。\nひっこめると　元に　戻る。"
    en: "An item that sharply boosts the critical-hit ratio of\na Pokémon in battle. This effect disappears if the\nPokémon leaves the battle."
    fr: "Augmente fortement le taux de critiques pendant\nun combat. L’effet disparaît si le Pokémon est retiré."
    it: "Aumenta di molto la probabilità di un Pokémon\ndi sferrare brutti colpi in una lotta. L’effetto svanisce\nse il Pokémon è sostituito."
    de: "Hebt die Volltrefferquote eines Pokémon im Kampf\nstark an. Die Wirkung endet mit dem Austausch des\nPokémon."
    es: "Objeto que aumenta mucho las probabilidades de un\nPokémon de asestar un golpe crítico en combate.\nAl cambiar de Pokémon, el efecto desaparece."
    ko: "배틀 중인 포켓몬이\n급소에 맞힐 확률을 크게 올리는 도구.\n포켓몬을 볼에 넣어 버리면 원래대로 되돌아간다."
    zh_simp: "大大提高战斗中宝可梦\n击中要害机率的道具。\n离场后，效果便会消失。"
    zh_trad: "大大提高戰鬥中寶可夢\n擊中要害機率的道具。\n離場後，效果便會消失。"
dire_hit:recipe:
