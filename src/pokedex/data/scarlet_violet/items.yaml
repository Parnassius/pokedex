    zh_trad: 西獅海壬Ｚ
  descriptions:
    jp_kana: "アシレーヌの　うたかたのアリアを\n特別な　Ｚワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    jp_kanji: "アシレーヌの　うたかたのアリアを\n特別な　Ｚワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nPrimarina’s Sparkling Aria to a Z-Move."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise l’Oratoria qui le tient à transformer\nsa capacité Aria de l’Écume en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono a Primarina di trasformare la mossa\nCanto Effimero in una mossa Z."
    de: "Kristallisierte Z-Kraft, die Primarenes Attacke\nSchaumserenade zu einer Z-Attacke aufstuft.\nWird bei Bedarf automatisch vervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a\nPrimarina convertir su Aria Burbuja en un movimiento Z."
    ko: "누리레느의 물거품아리아를\n특별한 Z기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将西狮海壬的泡影的咏叹调\n升级成特殊Ｚ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把西獅海壬的泡影的詠歎調\n升級為特殊Ｚ招式的Ｚ力量結晶。"
primarium_z:held:
  names:
    jp_kana: アシレーヌＺ
    jp_kanji: アシレーヌＺ
    en: Primarium Z
    fr: Oratozélite
    it: Primarinium Z
    de: Primarenium Z
    es: Primastal Z
    ko: 누리레느Z
    zh_simp: 西狮海壬Ｚ
    zh_trad: 西獅海壬Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　結晶。\nアシレーヌの　うたかたのアリアを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nアシレーヌの　うたかたのアリアを\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Primarina’s Sparkling Aria to a Z-Move."
    fr: "Une cristallisation de la Force Z, permettant\nde transformer la capacité Aria de l’Écume\nd’un Oratoria en capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare la mossa Canto Effimero\ndi Primarina in una mossa Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft Primarenes\nAttacke Schaumserenade zu einer Z-Attacke auf."
    es: "Cristal que confiere el Poder Z al movimiento Aria\nBurbuja de Primarina."
    ko: "Z파워의 결정.\n누리레느의 물거품아리아를\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将西狮海壬的泡影的咏叹调\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把西獅海壬的泡影的詠歎調\n升級為Ｚ招式。"
prism_scale:
  names:
    jp_kana: きれいなウロコ
    jp_kanji: きれいなウロコ
    en: Prism Scale
    fr: Bel’Écaille
    it: Squama bella
    de: Schönschuppe
    es: Escama Bella
    ko: 고운비늘
    zh_simp: 美丽鳞片
    zh_trad: 美麗鱗片
  descriptions:
    jp_kana: "ある特定の　ポケモンを\n進化させる　不思議なウロコ。\nにじ色に　輝いている。"
    jp_kanji: "ある特定の　ポケモンを\n進化させる　不思議なウロコ。\nにじ色に　輝いている。"
    en: "A mysterious scale that causes a certain Pokémon\nto evolve. It shines in rainbow colors."
    fr: "Une écaille étrange qui fait évoluer une certaine espèce\nde Pokémon. Elle a une couleur arc-en-ciel."
    it: "Squama misteriosa che fa evolvere determinate specie\ndi Pokémon. Riflette i colori dell’arcobaleno."
    de: "Diese sonderbare Schuppe löst bei einem bestimmten\nPokémon die Entwicklung aus. Sie funkelt in den Farben\ndes Regenbogens."
    es: "Curiosa escama que hace evolucionar a cierto Pokémon.\nBrilla con los colores del arcoíris."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 비늘.\n무지갯빛으로 빛나고 있다."
    zh_simp: "能让某些特定宝可梦\n进化的神奇鳞片。\n散发着虹色光辉。"
    zh_trad: "能讓特定寶可夢\n進化的神奇鱗片。\n散發著虹色光輝。"
prison_bottle:
  names:
    jp_kana: いましめのツボ
    jp_kanji: いましめのツボ
    en: Prison Bottle
    fr: Vase Scellé
    it: Vaso del vincolo
    de: Banngefäß
    es: Vasija Castigo
    ko: 굴레의항아리
    zh_simp: 惩戒之壶
    zh_trad: 懲戒之壺
  descriptions:
    jp_kana: "大昔に　とあるポケモンの　力を\n封じ込めたと　される　ツボ。"
    jp_kanji: "大昔に　とあるポケモンの　力を\n封じ込めたと　される　ツボ。"
    en: "A bottle believed to have been used to seal away\nthe power of a certain Pokémon long, long ago."
    fr: "Un récipient utilisé il y a fort longtemps pour sceller\nle pouvoir d’un certain Pokémon."
    it: "Vaso in cui si dice sia sigillata da tempo\nimmemorabile la forza di un Pokémon."
    de: "Ein Gefäß, mit dem vor langer, langer Zeit die Macht\neines gewissen Pokémon versiegelt wurde."
    es: "Vasija en la que se halla confinado el poder de cierto\nPokémon desde hace muchísimo tiempo."
    ko: "먼 옛날 어떤 포켓몬의 힘을\n봉인했다고 여겨지는 항아리."
    zh_simp: "据说在很久以前封印着\n某只宝可梦力量的壶。"
    zh_trad: "據說在很久以前封印著\n某隻寶可夢力量的壺。"
professors_mask:
  names:
    jp_kana: はかせのふくめん
    jp_kanji: はかせのふくめん
    en: Professor’s Mask
    fr: Masque du Prof
    it: Maschera del Prof
    de: Maske des Profs
    es: Máscara Profesor
    ko: 박사의복면
    zh_simp: 博士的面罩
    zh_trad: 博士的面罩
  descriptions:
    jp_kana: "ロイヤルマスクの　覆面。\nプロレスラー　自ら\nミシンで　縫っているらしい。"
    jp_kanji: "ロイヤルマスクの　覆面。\nプロレスラー　自ら\nミシンで　縫っているらしい。"
    en: "The mask that belongs to The Masked Royal.\nThis pro wrestler apparently sews his mask on a\nmachine himself."
    fr: "Le masque de Royal Mask !\nOn raconte que ce catcheur professionnel\naurait cousu son costume lui-même."
    it: "Maschera di Mister Royale. Sembra che il famoso\nlottatore l’abbia cucita a macchina personalmente."
    de: "Die Maske von Mask Royale. Der Profi-Wrestler hat sie\nselbst mit der Nähmaschine genäht."
    es: "La máscara de luchador de Royale el Enmascarado.\nMuy probablemente de factura propia."
    ko: "로열마스크의 복면.\n프로레슬러 스스로\n재봉틀로 누빈 듯하다."
    zh_simp: "皇家蒙面人的面罩。\n好像是职业摔角手\n自己用缝纫机缝制的。"
    zh_trad: "皇家蒙面人的面罩。\n好像是職業摔角手\n自己用縫紉機縫製的。"
profs_letter:
  names:
    jp_kana: はかせのてがみ
    jp_kanji: はかせのてがみ
    en: Prof’s Letter
    fr: Lettre du Prof
    it: Lettera del Prof
    de: Brief vom Prof
    es: Carta Profesor
    ko: 박사의편지
    zh_simp: 博士的信
    zh_trad: 博士的信
  descriptions:
    jp_kana: "プラターヌ博士から\nママあてに　書かれた　手紙。\nほんのり　いい　香りがする。"
    jp_kanji: "プラターヌ博士から\nママあてに　書かれた　手紙。\nほんのり　いい　香りがする。"
    en: "A letter that Professor Sycamore wrote to your\nmother. A faint but pleasant perfume seems to\ncling to the paper."
    fr: "Une lettre du Professeur Platane à Maman.\nElle dégage un parfum subtil."
    it: "Lettera del Professor Platan per la mamma.\nEmana un delicato profumo."
    de: "Ein an deine Mutter adressierter Brief von\nProfessor Platan. Ihm haftet ein schwacher\nParfümduft an."
    es: "Una carta sutilmente perfumada que el Profesor Ciprés\nle ha escrito a tu madre."
    ko: "플라타느박사가\n엄마에게 쓴 편지.\n은은하게 좋은 향기가 난다."
    zh_simp: "布拉塔诺博士写给妈妈的信。\n上面带有微微的香气。"
    zh_trad: "布拉塔諾博士\n寫給媽媽的信。\n信上帶有微微香氣。"
prop_case:
  names:
    jp_kana: グッズケース
    jp_kanji: グッズケース
    en: Prop Case
    fr: Boîte Parure
    it: Portagadget
    de: Deko-Box
    es: Neceser
    ko: 굿즈케이스
    zh_simp: 物品箱
    zh_trad: 物品箱
  descriptions:
    jp_kana: "ミュージカルで　ポケモンに　つける\nいろとりどりの　グッズを　たくさん\n収納する　きれいで　すてきなケース。"
    jp_kanji: "ミュージカルで　ポケモンに　つける\nいろとりどりの　グッズを　たくさん\n収納する　きれいで　すてきなケース。"
    en: "A wondrous, pretty case to store lots of colorful Props\nfor your Pokémon to wear in a musical."
    fr: "Une boîte permettant de ranger les Parures\npour habiller les Pokémon au Music-Hall."
    it: "Scatola bella ed elegante per conservare i gadget usati\nper agghindare i Pokémon durante il Pokémon Musical."
    de: "Eine ganz tolle Box, in der jede Menge bunte\nDeko-Objekte für Pokémon-Musicals Platz haben."
    es: "Una bonita cajita donde guardar todos los\nComplementos para vestir a los Pokémon en el Teatro\nMusical."
    ko: "뮤지컬에서 포켓몬에게 다는\n각양각색의 굿즈를 많이\n넣을 수 있는 아름답고 멋진 케이스."
    zh_simp: "漂亮精美的箱子。\n可以存放宝可梦出演音乐剧时\n用来装扮自己的多种小物件。"
    zh_trad: "漂亮精美的箱子。\n可以存放多種用來裝扮\n出演音樂劇的寶可夢的小飾品。"
prosciutto:
  names:
    jp_kana: なまハム
    jp_kanji: なまハム
    en: Prosciutto
    fr: Jambon Cru
    it: Prosciutto crudo
    de: Roher Schinken
    es: Jamón Serrano
    ko: 생햄
    zh_simp: 生火腿
    zh_trad: 生火腿
  descriptions:
    jp_kana: "塩味が　強い　食材。\nハムと　違って　加熱していないため\nフレッシュな　味わいが　楽しめる。"
    jp_kanji: "塩味が　強い　食材。\nハムと　違って　加熱していないため\nフレッシュな　味わいが　楽しめる。"
    en: "This ingredient is very salty like regular ham, but the\ndifference is prosciutto is not cooked after it is cured,\ngiving it a fun freshness."
    fr: "Un ingrédient au goût très salé. Contrairement\nau jambon blanc, il n’est pas cuit, ce qui lui donne\nun goût plus frais."
    it: "Un ingrediente molto salato. Non essendo stato\nsottoposto a cottura, ha un sapore più fresco rispetto\nal Prosciutto cotto."
    de: "Eine sehr salzige Zutat. Da die rohe Variante anders als\nKochschinken keinen Garprozess durchlaufen muss,\nentfaltet sie einen herrlich frischen Geschmack."
    es: "Tiene un sabor muy salado, pero, al estar curado y no\ncocido, conserva un sabor más auténtico."
    ko: "짠맛이 강한 식재료.\n햄과는 달리 가열하지 않아서\n신선한 맛을 즐길 수 있다."
    zh_simp: "咸味很强的食材。\n因为与火腿不同，并没有加热，\n所以能享受新鲜的味道。"
    zh_trad: "鹹味強勁的食材。\n不同於火腿，未經加熱，\n因此能嚐到新鮮的滋味。"
protective_pads:
  names:
    jp_kana: ぼうごパット
    jp_kanji: ぼうごパット
    en: Protective Pads
    fr: Pare-Effet
    it: Smorzaurti
    de: Schutzpolster
    es: Paracontacto
    ko: 방호패드
    zh_simp: 部位护具
    zh_trad: 部位護具
  descriptions:
    jp_kana: "攻撃する　相手に\nさわって　受ける　効果を\n受けないように　する。"
    jp_kanji: "攻撃する　相手に\nさわって　受ける　効果を\n受けないように　する。"
    en: "An item to be held by a Pokémon. These pads protect\nthe holder from effects triggered by making direct\ncontact with another Pokémon."
    fr: "Objet à tenir. Il annule les effets subis par le porteur\nquand il utilise une attaque directe sur un autre\nPokémon."
    it: "Protegge dagli effetti causati dal contatto\ncon altri Pokémon."
    de: "Greift der Träger ein Ziel an, ist er vor Effekten, die\ndurch direkten Kontakt mit diesem ausgelöst werden,\ngeschützt."
    es: "Protege al Pokémon de los efectos que le produciría\nel contacto directo en combate."
    ko: "공격하는 상대와\n접촉해서 받게 되는\n효과를 받지 않게 한다."
    zh_simp: "不会受到触碰攻击对手时\n本应受到的效果。"
    zh_trad: "觸碰要攻擊的對手時，\n不會受到本應受到的效果。"
protector:
  names:
    jp_kana: プロテクター
    jp_kanji: プロテクター
    en: Protector
    fr: Protecteur
    it: Copertura
    de: Schützer
    es: Protector
    ko: 프로텍터
    zh_simp: 护具
    zh_trad: 護具
  descriptions:
    jp_kana: "なにかの　プロテクター。\nとても硬くて　重い。\nあるポケモンが　好んでいる。"
    jp_kanji: "なにかの　プロテクター。\nとても硬くて　重い。\nあるポケモンが　好んでいる。"
    en: "A protective item of some sort. It is extremely stiff\nand heavy. It’s loved by a certain Pokémon."
    fr: "Un objet protecteur très dur et très lourd.\nApprécié d’un certain Pokémon."
    it: "Strumento protettivo, molto duro e pesante,\nprediletto da un Pokémon in particolare."
    de: "Ein schützendes Item. Steif und schwer.\nDas Lieblingsstück eines bestimmten Pokémon."
    es: "Dispositivo de protección muy pesado. Cierto Pokémon\nlo adora."
    ko: "무언가의 프로텍터.\n매우 단단하고 무겁다.\n어떤 포켓몬이 좋아하는 물건이다."
    zh_simp: "某种护具。\n非常坚硬而且沉重。\n某种宝可梦很喜欢它。"
    zh_trad: "某種護具。\n非常堅硬而且沉重。\n某種寶可夢很喜歡它。"
protein:
  names:
    jp_kana: タウリン
    jp_kanji: タウリン
    en: Protein
    fr: Protéine
    it: Proteina
    de: Protein
    es: Proteína
    ko: 타우린
    zh_simp: 攻击增强剂
    zh_trad: 攻擊增強劑
  descriptions:
    jp_kana: "ポケモンの　栄養ドリンク。\nポケモン　１匹の　攻撃の\n基礎ポイントを　あげる。"
    jp_kanji: "ポケモンの　栄養ドリンク。\nポケモン　１匹の　攻撃の\n基礎ポイントを　あげる。"
    en: "A nutritious drink for Pokémon. This drink increases\nbase points for a Pokémon’s Attack stat."
    fr: "Une boisson très nutritive qui augmente\nl’Attaque de base d’un Pokémon."
    it: "Bevanda nutriente per Pokémon. Aumenta i punti base\ndell’Attacco."
    de: "Ein gehaltvolles Getränk, das die Angriffs-Basispunkte\neines Pokémon dauerhaft erhöht."
    es: "Nutritiva bebida que aumenta el Ataque de base de un\nPokémon."
    ko: "포켓몬의 영양 드링크.\n포켓몬 1마리의 공격\n기초 포인트를 올린다."
    zh_simp: "宝可梦的营养饮料。\n能提高１只宝可梦的\n攻击的基础点数。"
    zh_trad: "寶可夢的營養飲料。\n能提高１隻寶可夢的\n攻擊的基礎點數。"
psychic_gem:
  names:
    jp_kana: エスパージュエル
    jp_kanji: エスパージュエル
    en: Psychic Gem
    fr: Joyau Psy
    it: Bijoupsico
    de: Psychojuwel
    es: Gema Psíquico
    ko: 에스퍼주얼
    zh_simp: 超能力宝石
    zh_trad: 超能力寶石
  descriptions:
    jp_kana: "エスパーのタイプの　ジュエル。\n持たせると　１度だけ　エスパーの\n技の威力が　強まる。"
    jp_kanji: "エスパーのタイプの　ジュエル。\n持たせると　１度だけ　エスパーの\n技の威力が　強まる。"
    en: "An item to be held by a Pokémon. This gem is imbued\nwith the essence of psychic energy and will boost the\npower of a Psychic-type move—but only once."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Psy."
    it: "Strumento da dare a un Pokémon. Gioiello che potenzia\nuna sola volta le mosse di tipo Psico."
    de: "Ein Item zum Tragen. Dieses Juwel verstärkt einmalig\neine Attacke vom Typ Psycho."
    es: "Joya de un solo uso que potencia un movimiento de\ntipo Psíquico. Debe llevarla un Pokémon."
    ko: "에스퍼타입의 주얼.\n지니게 하면 한 번만 에스퍼\n기술의 위력이 강해진다."
    zh_simp: "超能力属性的宝石。\n携带后，超能力属性的\n招式威力仅会增强１次。"
    zh_trad: "超能力屬性的寶石。\n攜帶後，超能力屬性招式的\n威力會僅增強１次。"
psychic_memory:
  names:
    jp_kana: サイキックメモリ
    jp_kanji: サイキックメモリ
    en: Psychic Memory
    fr: ROM Psy
    it: ROM Psico
    de: Psycho-Disc
    es: Disco Psíquico
    ko: 사이킥메모리
    zh_simp: 精神存储碟
    zh_trad: 精神記憶碟
  descriptions:
    jp_kana: "エスパータイプの　データが　入った\nメモリ。　特定のポケモンが　持つと\nタイプが　変わる。"
    jp_kanji: "エスパータイプの　データが　入った\nメモリ。　特定のポケモンが　持つと\nタイプが　変わる。"
    en: "A memory disc that contains Psychic-type data.\nIt changes the type of the holder if held by\na certain species of Pokémon."
    fr: "Une carte mémoire contenant des données sur\nle type Psy. Un certain Pokémon peut changer\nde type en l’équipant."
    it: "ROM contenente dati sul tipo Psico in formato digitale.\nPermette a un certo Pokémon di cambiare tipo."
    de: "Eine Disc mit Daten zum Typ Psycho. Sie löst bei einem\nbestimmten Pokémon einen Typenwechsel aus."
    es: "Disco de datos que contiene información relativa al tipo\nPsíquico. Permite cambiar de tipo a cierto Pokémon."
    ko: "에스퍼타입의 데이터가 들어 있는\n메모리. 특정 포켓몬이\n지니면 타입이 바뀐다."
    zh_simp: "装有超能力属性数据的存储碟。\n特定宝可梦携带后，\n属性就会发生变化。"
    zh_trad: "裝有超能力屬性資料的記憶碟。\n特定寶可夢攜帶後，\n就會產生屬性的變化。"
psychic_seed:
  names:
    jp_kana: サイコシード
    jp_kanji: サイコシード
    en: Psychic Seed
    fr: Graine Psychique
    it: Psicoseme
    de: Psycho-Samen
    es: Semilla Psique
    ko: 사이코시드
    zh_simp: 精神种子
    zh_trad: 精神種子
  descriptions:
    jp_kana: "ポケモンに　持たせると\nサイコフィールドのときに　使って\n特防が　あがる。"
    jp_kanji: "ポケモンに　持たせると\nサイコフィールドのときに　使って\n特防が　あがる。"
    en: "An item to be held by a Pokémon. If the terrain becomes\nPsychic Terrain, the holder will use this seed to boost its\nown Sp. Def stat."
    fr: "Objet à tenir. Lorsqu’un champ psychique est actif,\nla graine est consommée pour augmenter la Défense\nSpéciale du porteur."
    it: "Strumento da dare a un Pokémon. Fa aumentare\nla Difesa Speciale in presenza di un Campo Psichico."
    de: "Gibst du den Samen einem Pokémon zum Tragen, setzt\nes ihn ein, wenn ein Psychofeld aktiv ist, und erhöht\ndadurch seine Spezial-Verteidigung."
    es: "Si la lleva un Pokémon, la usa y aumenta su Defensa\nEspecial cuando el terreno está cubierto por un campo\npsíquico."
    ko: "포켓몬에게 지니게 하면\n사이코필드일 때 사용하여\n특수방어가 올라간다."
    zh_simp: "让宝可梦携带后，\n在精神场地上使用，\n特防就会提高。"
    zh_trad: "讓寶可夢攜帶後，\n在精神場地上使用，\n就會提高特防。"
psychic_tera_shard:
  names:
    jp_kana: テラピースエスパー
    jp_kanji: テラピースエスパー
    en: Psychic Tera Shard
    fr: Téra-Éclat Psy
    it: Teralite Psico
    de: Tera-Stück (Psycho)
    es: Teralito Psíquico
    ko: 테라피스 에스퍼
    zh_simp: 超能力太晶碎块
    zh_trad: 超能力太晶碎塊
  descriptions:
    jp_kana: "テラスタルポケモンが　倒れたとき\n砕けた　テラスタルジュエルが\nまれに　結晶化したもの。"
    jp_kanji: "テラスタルポケモンが　倒れたとき\n砕けた　テラスタルジュエルが\nまれに　結晶化したもの。"
    en: "On rare occasions, these shards form when a Tera\nPokémon falls in battle and its Tera Jewel shatters."
    fr: "Un fragment cristallisé qui se forme rarement lors\nde l’éclatement d’un Joyau Téracristal après qu’un\nPokémon Téracristal a été mis K.O."
    it: "Cristallizzazione che raramente si forma quando\nun Pokémon Teracristal viene sconfitto e la sua gemma\nTeracristal va in frantumi."
    de: "In äußerst seltenen Fällen kristallisieren Bruchstücke\ndes Terakristalls von im Kampf besiegten Terakristall-\nPokémon zu solchen Tera-Stücken."
    es: "Esquirla que se forma muy raramente cuando la joya\nTeracristal de un Pokémon teracristalizado se quiebra\ntras derrotarlo."
    ko: "테라스탈 포켓몬이 쓰러졌을 때\n부서진 테라스탈 주얼이\n드물게 결정화한 조각."
    zh_simp: "打倒太晶宝可梦时，\n破碎掉的太晶宝石有\n极低概率会结晶成此物。"
    zh_trad: "太晶寶可夢倒下時，\n碎裂的太晶寶石在罕見的情況下\n會結晶化，而形成此物。"
psychium_z:bag:
  names:
    jp_kana: エスパーＺ
    jp_kanji: エスパーＺ
    en: Psychium Z
    fr: Psychézélite
    it: Psichium Z
    de: Psium Z
    es: Psicostal Z
    ko: 에스퍼Z
    zh_simp: 超能力Ｚ
    zh_trad: 超能力Ｚ
  descriptions:
    jp_kana: "エスパータイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    jp_kanji: "エスパータイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nPsychic-type moves to Psychic-type Z-Moves."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise son porteur à transformer ses capacités\nde type Psy en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono ai Pokémon di trasformare le mosse\ndi tipo Psico in mosse Z."
    de: "Kristallisierte Z-Kraft, die Psycho-Attacken zu\nZ-Attacken aufstuft. Wird bei Bedarf automatisch\nvervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a los\nportadores convertir sus movimientos de tipo Psíquico\nen movimientos Z."
    ko: "에스퍼타입 기술을\nZ기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将超能力属性招式升级成\nＺ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把超能力屬性招式\n升級為Ｚ招式的Ｚ力量結晶。"
psychium_z:held:
  names:
    jp_kana: エスパーＺ
    jp_kanji: エスパーＺ
    en: Psychium Z
    fr: Psychézélite
    it: Psichium Z
    de: Psium Z
    es: Psicostal Z
    ko: 에스퍼Z
    zh_simp: 超能力Ｚ
    zh_trad: 超能力Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　結晶。\nエスパータイプの　技を\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nエスパータイプの　技を\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Psychic-type moves to Z-Moves."
    fr: "Une cristallisation de la Force Z, permettant\nde transformer les capacités de type Psy\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare le mosse di tipo Psico\nin mosse Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft\nPsycho-Attacken zu Z-Attacken auf."
    es: "Cristal que confiere el Poder Z a los movimientos\nde tipo Psíquico."
    ko: "Z파워의 결정.\n에스퍼타입 기술을\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将超能力属性的招式\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把超能力屬性的招式\n升級為Ｚ招式。"
psyduck_candy:
  names:
    jp_kana: コダックのアメ
    jp_kanji: コダックのアメ
    en: Psyduck Candy
    fr: Bonbon Psykokwak
    it: Caramella Psyduck
    de: Enton-Bonbon
    es: Caramelo Psyduck
    ko: 고라파덕의사탕
    zh_simp: 可达鸭的糖果
    zh_trad: 可達鴨的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
psyduck_down:
  names:
    jp_kana: コダックのうもう
    jp_kanji: コダックのうもう
    en: Psyduck Down
    fr: Duvet de Psykokwak
    it: Piuma di Psyduck
    de: Enton-Daune
    es: Plumón de Psyduck
    ko: 고라파덕의솜털
    zh_simp: 可达鸭的羽绒
    zh_trad: 可達鴨的羽絨
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
punching_glove:
  names:
    jp_kana: パンチグローブ
    jp_kanji: パンチグローブ
    en: Punching Glove
    fr: Gant de Boxe
    it: Guantone
    de: Boxhandschuh
    es: Guante de Boxeo
    ko: 펀치글러브
    zh_simp: 拳击手套
    zh_trad: 拳擊手套
  descriptions:
    jp_kana: "こぶしを　保護する　グローブ。\n持たせると　パンチ技の　威力が　あがり\n相手に　接触しない　パンチに　なる。"
    jp_kanji: "こぶしを　保護する　グローブ。\n持たせると　パンチ技の　威力が　あがり\n相手に　接触しない　パンチに　なる。"
    en: "An item to be held by a Pokémon. This protective glove\nboosts the power of the holder’s punching moves and\nprevents direct contact with targets."
    fr: "Objet à tenir. Ce gant protecteur augmente\nla puissance des capacités coups de poing du porteur\net lui évite d’entrer en contact direct avec sa cible."
    it: "Strumento da dare a un Pokémon. Guanto protettivo\nche potenzia le mosse sferrate con i pugni, impedendo\ninoltre un contatto diretto con il bersaglio."
    de: "Ein Handschuh zum Schutz der Faust. Erhöht die Stärke\nvon Hieb-, Punch-, Faust- und Schlag-Attacken des\nTrägers und verhindert eine direkte Berührung des Zieles."
    es: "Guante protector que aumenta la potencia de los\nmovimientos con los puños del Pokémon que lo\nlleve y evita que hagan contacto directo con el rival."
    ko: "주먹을 보호하는 글러브.\n지니게 하면 펀치 기술의 위력이 오르고\n상대에게 접촉하지 않는 펀치가 된다."
    zh_simp: "保护拳头的手套。\n携带后，拳击招式的威力会提高，\n且变得拳击时不会接触到对手。"
    zh_trad: "能保護拳頭的手套。\n攜帶後，使用到拳頭的招式威力會提高，\n而且拳擊不會接觸到對手。"
pungent_root:
  names:
    jp_kana: みずべのハーブ
    jp_kanji: みずべのハーブ
    en: Pungent Root
    fr: Tubercule
    it: Erbe acquatiche
    de: Uferkraut
    es: Hierba Intensa
    ko: 물가허브팩
    zh_simp: 水边香草
    zh_trad: 水邊香草
  descriptions:
    jp_kana: "キャンプの　料理に　使う\n食材の　一種。適当に　摘んだ\nハーブが　香り　彩りを　追加する。"
    jp_kanji: "キャンプの　料理に　使う\n食材の　一種。適当に　摘んだ\nハーブが　香り　彩りを　追加する。"
    en: "One of the many ingredients that can be used for\ncooking at your camp. Though carelessly picked, these\nherbs can add a fragrant accent to a dish."
    fr: "Un ingrédient de cuisine pour le camping.\nCette racine permet d’ajouter du parfum\net de la couleur aux plats."
    it: "Uno degli ingredienti che puoi usare per cucinare\nin campeggio. Queste erbe selezionate con grande\ncura aggiungono a ogni pietanza un aroma unico."
    de: "Eine Zutat für PokéCamping-Mahlzeiten. Dieses wahllos\ngepflückte Kraut verleiht Speisen ein spezielles Aroma\nund eine kräftige Farbe."
    es: "Un ingrediente para cocinar en el campamento. Unas\nhierbas que aportan color y aroma a la salsa."
    ko: "캠프 요리에 사용되는\n식재료 중 하나. 알맞게 딴\n허브가 향과 색감을 더해 준다."
    zh_simp: "在露营营地制作料理时会使用的\n一种食材。将信手摘取的香草\n点缀在上面，使料理更加色香味俱全。"
    zh_trad: "製作露營料理時使用的食材之一。\n隨手摘取的香草能夠為料理\n增添香氣和色彩。"
pure_incense:
  names:
    jp_kana: きよめのおこう
    jp_kanji: きよめのおこう
    en: Pure Incense
    fr: Encens Pur
    it: Puroaroma
    de: Scheuchrauch
    es: Incienso Puro
    ko: 순결의향로
    zh_simp: 洁净薰香
    zh_trad: 潔淨薰香
  descriptions:
    jp_kana: "１番前の　ポケモンに\n持たせると　野生ポケモンが\n出てきにくくなる。"
    jp_kanji: "１番前の　ポケモンに\n持たせると　野生ポケモンが\n出てきにくくなる。"
    en: "An item to be held by a Pokémon. It helps keep wild\nPokémon away when the holder is the head of the party."
    fr: "Objet à tenir. Aide à repousser les Pokémon sauvages\nsi le porteur est le premier Pokémon de l’équipe."
    it: "Strumento da dare a un Pokémon. Se chi ce l’ha è\nil primo della squadra, aiuta ad allontanare\ni Pokémon selvatici."
    de: "Ein Item zum Tragen. Dieses exotische Räucherwerk\nreduziert Begegnungen mit wilden Pokémon, wenn der\nTräger an der Spitze deines Teams steht."
    es: "Si lo lleva el primer Pokémon del equipo, se reduce la\nprobabilidad de que se acerquen Pokémon salvajes."
    ko: "맨 앞의 포켓몬에게\n지니게 하면 야생 포켓몬이\n나타날 확률이 낮아진다."
    zh_simp: "让排在最前面的宝可梦携带后，\n野生宝可梦就会不容易出现。"
    zh_trad: "讓排在最前面的寶可夢\n攜帶後，野生寶可夢\n會變得不容易出現。"
purple_nectar:
  names:
    jp_kana: むらさきのミツ
    jp_kanji: むらさきのミツ
    en: Purple Nectar
    fr: Nectar Mauve
    it: Nettare viola
    de: Purpurner Nektar
    es: Néctar Violeta
    ko: 보라꿀
    zh_simp: 兰紫色花蜜
    zh_trad: 蘭紫色花蜜
  descriptions:
    jp_kana: "むらさき色の　花のミツ。\n特定のポケモンの　姿を　変える。"
    jp_kanji: "むらさき色の　花のミツ。\n特定のポケモンの　姿を　変える。"
    en: "Flower nectar obtained from a purple flower. It changes\nthe form of a certain species of Pokémon."
    fr: "Un nectar de couleur mauve qui permet à\nun certain Pokémon de changer d’apparence."
    it: "Nettare di fiori viola. Fa cambiare forma a una\ndeterminata specie di Pokémon."
    de: "Ein violetter Blütennektar. Ein bestimmtes Pokémon kann\ndamit seine Form ändern."
    es: "Néctar de cierta flor violeta, capaz de hacer cambiar de\nforma a una determinada especie de Pokémon."
    ko: "보라색 꽃의 꿀.\n특정 포켓몬의 모습을 바꾼다."
    zh_simp: "兰紫色花的花蜜。\n可以改变特定宝可梦的样子。"
    zh_trad: "蘭紫色的花蜜。\n可以改變特定寶可夢的樣子。"
purple_petal:
  names:
    jp_kana: むらさきはなびら
    jp_kanji: むらさきはなびら
    en: Purple Petal
    fr: Pétale Violet
    it: Petalo violetto
    de: Violettes Blatt
    es: Pétalo Violeta
    ko: 보라꽃잎
    zh_simp: 紫色花瓣
    zh_trad: 紫色花瓣
  descriptions:
    jp_kana: "マツリカの試練で　クチナシから\nもらえる　はなびらの　押し花。\n７種類　集めるのが　目的。"
    jp_kanji: "マツリカの試練で　クチナシから\nもらえる　はなびらの　押し花。\n７種類　集めるのが　目的。"
    en: "A pressed flower petal you receive from Nanu\nduring Mina’s trial. The goal is to collect seven\ndifferent kinds of petals."
    fr: "Un pétale pressé que Danh vous a remis lors\nde l’Épreuve d’Oléa. Il y en a sept à collectionner."
    it: "Petalo di fiore pressato ottenuto da Augusto durante la\nprova di Rika. L’obiettivo è ricevere sette petali diversi."
    de: "Ein gepresstes Blütenblatt, das man im Rahmen von\nMatsurikas Prüfung von Yasu erhält. Ziel ist es,\nsieben verschiedene Blütenblätter zu sammeln."
    es: "Pétalo prensado recibido de manos de Denio durante la\nprueba de Rika. El objetivo es reunir siete distintos."
    ko: "말리화의 시련에서 나누에게\n받을 수 있는 꽃잎의 압화.\n7종류 모으는 것이 목적."
    zh_simp: "在茉莉的考验中，\n能从默丹那里得到的干花花瓣。\n目标是集齐７种。"
    zh_trad: "在茉莉的考驗中，\n從默丹那裡得到的壓花花瓣。\n目標是集滿７種花瓣。"
qualot_berry:
  names:
    jp_kana: タポルのみ
    jp_kanji: タポルのみ
    en: Qualot Berry
    fr: Baie Qualot
    it: Baccaloquat
    de: Qualotbeere
    es: Baya Ispero
    ko: 파비열매
    zh_simp: 比巴果
    zh_trad: 比巴果
  descriptions:
    jp_kana: "ポケモンに　あげると\nとても　なかよく　なりやすくなるが\n防御の　基礎ポイントは　さがる。"
    jp_kanji: "ポケモンに　あげると\nとても　なかよく　なりやすくなるが\n防御の　基礎ポイントは　さがる。"
    en: "If a Pokémon is fed this Berry, it will grow more friendly,\nbut it will lose base points for its Defense stat."
    fr: "Une Baie qui rend les Pokémon plus amicaux,\nmais baisse leur Défense de base."
    it: "Usata su un Pokémon, ne aumenta il livello di amicizia,\nma ne diminuisce i punti base della Difesa."
    de: "Isst ein Pokémon diese Beere, wird es zutraulicher,\naber seine Verteidigungs-Basispunkte sinken."
    es: "Al usarla con un Pokémon, lo vuelve más amistoso,\npero también reduce su Defensa de base."
    ko: "포켓몬에게 주면\n매우 친밀해지기 쉬워지지만\n방어의 기초 포인트가 떨어진다."
    zh_simp: "如果把它交给宝可梦，\n宝可梦就会变得非常容易和训练家亲密，\n但防御的基础点数会降低。"
    zh_trad: "如果把它餵給寶可夢，\n寶可夢會非常容易和訓練家變得友好，\n但防禦的基礎點數會降低。"
quick_ball:
  names:
    jp_kana: クイックボール
    jp_kanji: クイックボール
    en: Quick Ball
    fr: Rapide Ball
    it: Velox Ball
    de: Flottball
    es: Veloz Ball
    ko: 퀵볼
    zh_simp: 先机球
    zh_trad: 先機球
  descriptions:
    jp_kana: "戦闘が　始まって　すぐに\n使うと　捕まえやすくなる\nちょっと変わった　ボール。"
    jp_kanji: "戦闘が　始まって　すぐに\n使うと　捕まえやすくなる\nちょっと変わった　ボール。"
    en: "A somewhat different Poké Ball that is more effective\nat catching Pokémon when used first thing in a battle."
    fr: "Une Poké Ball un peu spéciale qui permet d’attraper\nun Pokémon sauvage plus facilement si on l’utilise\nau début du combat."
    it: "Poké Ball un po’ diversa che facilita la cattura se usata\nall’inizio della lotta."
    de: "Ein ungewöhnlicher Ball, mit dem sich Pokémon am\nAnfang des Kampfes leichter fangen lassen."
    es: "Poké Ball algo distinta a las demás cuyo índice de\ncaptura es mayor si se usa al inicio de un encuentro\ncon Pokémon salvajes."
    ko: "배틀이 시작되자마자\n사용하면 잡기 쉬워지는\n조금 특이한 볼."
    zh_simp: "有点与众不同的球。\n如果战斗开始后立刻使用，\n就能很容易地捉到宝可梦。"
    zh_trad: "有點與眾不同的球。\n在戰鬥開始後立刻使用，\n就會變得容易捉到寶可夢。"
quick_candy:
  names:
    jp_kana: はやさのアメ
    jp_kanji: はやさのアメ
    en: Quick Candy
    fr: Bonbon Sprint S
    it: Caramella rapidità S
    de: Flottbonbon
    es: Caramelo Ímpetu
    ko: 속도의사탕
    zh_simp: 敏捷糖果
    zh_trad: 敏捷糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nポケモンの　すばやさを　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\nポケモンの　すばやさを　上げる。"
    en: "A candy that is packed with energy. When given to\na Pokémon, it will increase that Pokémon’s Speed stat."
    fr: "Un bonbon plein d’énergie.\nIl augmente la Vitesse d’un Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta la Velocità di un Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\ndie Initiative eines Pokémon."
    es: "Caramelo energético que aumenta la Velocidad del\nPokémon."
    ko: "에너지가 가득한 사탕.\n포켓몬의 스피드를 올린다."
    zh_simp: "充满能量的糖果。\n能提高宝可梦的速度。"
    zh_trad: "充滿能量的糖果。\n能提高寶可夢的速度。"
quick_candy_l:
  names:
    jp_kana: はやさのアメＬ
    jp_kanji: はやさのアメＬ
    en: Quick Candy L
    fr: Bonbon Sprint M
    it: Caramella rapidità M
    de: Flottbonbon+
    es: Caramelo Ímpetu +
    ko: 속도의사탕L
    zh_simp: 敏捷糖果Ｌ
    zh_trad: 敏捷糖果Ｌ
  descriptions:
    jp_kana: "エネルギーの　つまった　大きい　アメ。\nレベル３０　以上の　ポケモンの\nすばやさを　上げる。"
    jp_kanji: "エネルギーの　つまった　大きい　アメ。\nレベル３０　以上の　ポケモンの\nすばやさを　上げる。"
    en: "A big candy that is packed with energy. When given to\na Pokémon at Lv. 30 or higher, it will increase that\nPokémon’s Speed stat."
    fr: "Un gros bonbon plein d’énergie.\nIl augmente la Vitesse d’un Pokémon de niveau 30\nou supérieur."
    it: "Una caramella grande piena zeppa di energia.\nAumenta la Velocità di un Pokémon di livello 30\no superiore."
    de: "Ein großes Bonbon, das voller Energie steckt.\nErhöht dauerhaft die Initiative eines Pokémon ab\nLevel 30."
    es: "Caramelo energético grande que aumenta la Velocidad\nde un Pokémon de Nv. 30 o superior."
    ko: "에너지가 가득한 큰 사탕.\n레벨 30 이상인 포켓몬의\n스피드를 올린다."
    zh_simp: "充满能量的大糖果。\n能让等级３０以上的\n宝可梦的速度上升。"
    zh_trad: "充滿能量的大糖果。\n能提高等級在３０以上的\n寶可夢的速度。"
quick_candy_xl:
  names:
    jp_kana: はやさのアメＸＬ
    jp_kanji: はやさのアメＸＬ
    en: Quick Candy XL
    fr: Bonbon Sprint L
    it: Caramella rapidità L
    de: Flottbonbon++
    es: Caramelo Ímpetu ++
    ko: 속도의사탕XL
    zh_simp: 敏捷糖果ＸＬ
    zh_trad: 敏捷糖果ＸＬ
  descriptions:
    jp_kana: "エネルギーの　つまった　特大の　アメ。\nレベル６０　以上の　ポケモンの\nすばやさを　上げる。"
    jp_kanji: "エネルギーの　つまった　特大の　アメ。\nレベル６０　以上の　ポケモンの\nすばやさを　上げる。"
    en: "A huge candy that is packed with energy. When given\nto a Pokémon at Lv. 60 or higher, it will increase that\nPokémon’s Speed stat."
    fr: "Un énorme bonbon plein d’énergie.\nIl augmente la Vitesse d’un Pokémon de niveau 60\nou supérieur."
    it: "Una caramella enorme piena zeppa di energia.\nAumenta la Velocità di un Pokémon di livello 60\no superiore."
    de: "Ein riesiges Bonbon, das voller Energie steckt.\nErhöht dauerhaft die Initiative eines Pokémon ab\nLevel 60."
    es: "Caramelo energético enorme que aumenta la Velocidad\nde un Pokémon de Nv. 60 o superior."
    ko: "에너지가 가득한 매우 큰 사탕.\n레벨 60 이상인 포켓몬의\n스피드를 올린다."
    zh_simp: "充满能量的超大糖果。\n能让等级６０以上的\n宝可梦的速度上升。"
    zh_trad: "充滿能量的特大糖果。\n能提高等級在６０以上的\n寶可夢的速度。"
quick_claw:
  names:
    jp_kana: せんせいのツメ
    jp_kanji: せんせいのツメ
    en: Quick Claw
    fr: Vive Griffe
    it: Rapidartiglio
    de: Flinkklaue
    es: Garra Rápida
    ko: 선제공격손톱
    zh_simp: 先制之爪
    zh_trad: 先制之爪
  descriptions:
    jp_kana: "軽くて　鋭い　ツメ。\n持たせると　相手より　先に\n行動できることが　ある。"
    jp_kanji: "軽くて　鋭い　ツメ。\n持たせると　相手より　先に\n行動できることが　ある。"
    en: "An item to be held by a Pokémon. This light, sharp claw\nlets the holder move first occasionally."
    fr: "Objet à tenir. Une griffe légère mais tranchante\nqui permet parfois de frapper en priorité."
    it: "Strumento da dare a un Pokémon. Leggero e affilato,\nogni tanto permette di agire prima dell’avversario."
    de: "Ein Item zum Tragen. Es ermöglicht gelegentlich den\nErstschlag."
    es: "Garra ligera y afilada que permite que el Pokémon que\nla lleve ataque a veces el primero."
    ko: "가볍고 날카로운 손톱.\n지니게 하면 상대보다 먼저\n행동할 수도 있다."
    zh_simp: "又轻又尖锐的爪子。\n携带后，有时能比对手\n先一步行动。"
    zh_trad: "又輕又尖銳的爪子。\n攜帶後，有時能比對手\n先一步行動。"
quick_powder:
  names:
    jp_kana: スピードパウダー
    jp_kanji: スピードパウダー
    en: Quick Powder
    fr: Poudre Vite
    it: Velopolvere
    de: Flottstaub
    es: Polvo Veloz
    ko: 스피드파우더
    zh_simp: 速度粉
    zh_trad: 速度粉
  descriptions:
    jp_kana: "メタモンに　持たせると\n素早さが　あがる　不思議な粉。\nとても　こまかくて　硬い。"
    jp_kanji: "メタモンに　持たせると\n素早さが　あがる　不思議な粉。\nとても　こまかくて　硬い。"
    en: "An item to be held by Ditto. Extremely fine yet hard,\nthis odd powder boosts Ditto’s Speed stat."
    fr: "Objet à faire tenir à Métamorph.\nCette poudre étrange, très fine mais résistante,\naugmente sa Vitesse."
    it: "Strumento da dare a Ditto. Questa strana polvere,\nfine e al contempo dura, aumenta la Velocità."
    de: "Ein Item, das Ditto zum Tragen gegeben werden kann.\nFein und doch hart, erhöht dieses sonderbare Pulver die\nInitiative."
    es: "Polvo muy fino, pero a la vez poderoso, que aumenta\nla Velocidad. Debe llevarlo Ditto."
    ko: "메타몽에게 지니게 하면 스피드가\n올라가는 이상한 가루.\n매우 잘고 단단하다."
    zh_simp: "让百变怪携带后，\n速度就会提高的神奇粉末。\n非常细腻坚硬。"
    zh_trad: "讓百變怪攜帶後，\n速度就會提高的神奇粉末。\n非常細緻堅硬。"
quiet_mint:
  names:
    jp_kana: れいせいミント
    jp_kanji: れいせいミント
    en: Quiet Mint
    fr: Aromate Discret
    it: Menta Quieta
    de: Ruhig-Minze
    es: Menta Mansa
    ko: 냉정민트
    zh_simp: 冷静薄荷
    zh_trad: 冷靜薄荷
  descriptions:
    jp_kana: "ポケモンに　香りを　かがせると\n特攻が　上がりやすく　なるが\n素早さは　上がりにくくなる　ミント。"
    jp_kanji: "ポケモンに　香りを　かがせると\n特攻が　上がりやすく　なるが\n素早さは　上がりにくくなる　ミント。"
    en: "Having a Pokémon smell this mint can make its Sp. Atk\nstat grow stronger. However, its Speed stat may suffer."
    fr: "Si un Pokémon hume cet aromate, son Attaque Spéciale\nmontera plus facilement, mais sa Vitesse\nse développera plus lentement."
    it: "Quando un Pokémon ne sente il profumo,\nil suo Attacco Speciale aumenta più facilmente\na scapito della Velocità."
    de: "Lässt man ein Pokémon an dieser Minze schnuppern,\nsteigt sein Spezial-Angriff schneller, aber seine Initiative\numso langsamer."
    es: "Cuando un Pokémon percibe su aroma, aumenta con\nmás facilidad su Ataque Especial, en detrimento de su\nVelocidad."
    ko: "포켓몬에게 향기를 맡게 하면\n특수공격이 오르기 쉬워지지만\n스피드가 오르기 어려워지는 민트."
    zh_simp: "宝可梦闻了这种薄荷之后，\n会令特攻容易提高，\n而速度则难以提高。"
    zh_trad: "讓寶可夢聞這種薄荷的氣味，\n會令特攻變得容易提高，\n但速度則難以提高。"
qwilfish_spines:
  names:
    jp_kana: ハリーセンのトゲ
    jp_kanji: ハリーセンのトゲ
    en: Qwilfish Spines
    fr: Épine de Qwilfish
    it: Aculeo di Qwilfish
    de: Baldorfish-Stachel
    es: Púa de Qwilfish
    ko: 침바루의가시
    zh_simp: 千针鱼的刺
    zh_trad: 千針魚的刺
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
rabuta_berry:
  names:
    jp_kana: ラブタのみ
    jp_kanji: ラブタのみ
    en: Rabuta Berry
    fr: Baie Rabuta
    it: Baccambutan
    de: Rabutabeere
    es: Baya Rautan
    ko: 라부탐열매
    zh_simp: 茸丹果
    zh_trad: 茸丹果
  descriptions:
    jp_kana: "かしこさに　磨きを　かけるための\nポロックを　作るとき　使われる。\nほかの地方では　めずらしい　きのみ。"
    jp_kanji: "かしこさに　磨きを　かけるための\nポロックを　作るとき　使われる。\nほかの地方では　めずらしい　きのみ。"
    en: "Used to make Pokéblocks that will enhance Cleverness.\nThis Berry is rare in other regions."
    fr: "Une Baie très rare en dehors de cette région,\nutilisée pour préparer des Pokéblocs permettant\nd’augmenter l’Intelligence d’un Pokémon."
    it: "Bacca difficile da trovare in altre regioni usata per creare\nPokémelle che aumentano l’Acume del Pokémon."
    de: "Eine Beerensorte, die als Zutat für Pokériegel\nverwendet wird, welche die Klugheit erhöhen.\nIn anderen Regionen ist sie eher selten zu finden."
    es: "Se utiliza en la producción de Pokécubos que potencian\nel ingenio. Es una baya muy rara en otras regiones."
    ko: "슬기로움을 연마하기 위한\n포켓몬스넥을 만들 때 사용된다.\n다른 지방에서는 희귀한 나무열매."
    zh_simp: "用于制作宝可方块，\n制作出来的宝可方块可用来打磨聪明。\n在其他地区很少见的树果。"
    zh_trad: "製作用於增進聰明的\n寶可方塊時使用。\n在其他地區很少見的樹果。"
radiant_petal:
  names:
    jp_kana: かがやくはなびら
    jp_kanji: かがやくはなびら
    en: Radiant Petal
    fr: Pétale Brillant
    it: Petalo lucente
    de: Kronblatt
    es: Pétalo Fulgor
    ko: 빛나는꽃잎
    zh_simp: 光辉花瓣
    zh_trad: 光輝花瓣
  descriptions:
    jp_kana: "豊穣の王　から　もらった\nひとひらの　はなびら。\n淡い　ひかりを　放っている。"
    jp_kanji: "豊穣の王　から　もらった\nひとひらの　はなびら。\n淡い　ひかりを　放っている。"
    en: "A single petal that the King of Bountiful Harvests\ngave you. It radiates faint light."
    fr: "Un pétale offert par le Seigneur des récoltes.\nIl en émane une faible lueur."
    it: "Un petalo ricevuto dal Re dell’abbondanza.\nEmana una luce fioca."
    de: "Ein Blütenblatt, das du vom König der reichen Ernte\nerhalten hast. Es strahlt ein sanftes Licht aus."
    es: "Un pétalo recibido del Rey de las Cosechas.\nEmite una luz tenue."
    ko: "풍요의 왕에게서 받은 한 장의 꽃잎.\n희미하게 빛을 내고 있다."
    zh_simp: "从丰饶之王那里\n得到的一片花瓣。\n散发着朦胧的光辉。"
    zh_trad: "從豐饒之王那裡\n得到的一片花瓣。\n散發著淡淡的光輝。"
rage_candy_bar:
  names:
    jp_kana: いかりまんじゅう
    jp_kanji: いかりまんじゅう
    en: Rage Candy Bar
    fr: Bonbon Rage
    it: Iramella
    de: Wutkeks
    es: Caramelo Furia
    ko: 분노의호두과자
    zh_simp: 愤怒馒头
    zh_trad: 憤怒饅頭
  descriptions:
    jp_kana: "チョウジタウン名物の　まんじゅう。\nポケモン　１匹の　状態の\n異常を　すべて　回復する。"
    jp_kanji: "チョウジタウン名物の　まんじゅう。\nポケモン　１匹の　状態の\n異常を　すべて　回復する。"
    en: "Mahogany Town’s famous candy. It can be used to\ncure any status condition a Pokémon may have."
    fr: "Un bonbon, spécialité d’Acajou.\nSoigne toutes les altérations de statut d’un Pokémon."
    it: "Caramella tipica di Mogania. Cura tutti i problemi\ndi stato di un Pokémon."
    de: "Dieser Keks ist eine Spezialität aus Mahagonia City.\nEr behebt alle Statusprobleme eines Pokémon."
    es: "Caramelo típico de Pueblo Caoba. Cura todos los\nproblemas de estado de un Pokémon."
    ko: "황토마을의 명물인 호두과자.\n포켓몬 1마리의 상태 이상을\n모두 회복한다."
    zh_simp: "卡吉镇特产的馒头。\n能治愈１只宝可梦的\n所有异常状态。"
    zh_trad: "卡吉鎮特產的饅頭。\n能治癒１隻寶可夢的\n所有異常狀態。"
raikou_treat:
  names:
    jp_kana: ライコウのおやつ
    jp_kanji: ライコウのおやつ
    en: Raikou Treat
    fr: Friandise Raikou
    it: Spuntino per Raikou
    de: Raikou-Snack
    es: Galleta Raikou
    ko: 라이코의간식
    zh_simp: 雷公的点心
    zh_trad: 雷公的點心
  descriptions:
    jp_kana: "伝説のポケモン　ライコウが\n好む食材で　作られた　おやつ。"
    jp_kanji: "伝説のポケモン　ライコウが\n好む食材で　作られた　おやつ。"
    en: "A snack made from ingredients favored by the\nLegendary Pokémon Raikou."
    fr: "Une friandise préparée avec les ingrédients favoris\ndu Pokémon légendaire Raikou."
    it: "Uno spuntino fatto con gli ingredienti preferiti\ndal Pokémon leggendario Raikou."
    de: "Dieser Snack wurde mit den Lieblingszutaten des\nLegendären Pokémon Raikou zubereitet."
    es: "Galleta preparada con los ingredientes favoritos\ndel Pokémon legendario Raikou."
    ko: "전설의 포켓몬 라이코가\n좋아하는 식재료로 만들어진 간식."
    zh_simp: "用传说的宝可梦雷公\n喜欢的食材制作的点心。"
    zh_trad: "用傳說的寶可夢雷公\n喜愛的食材製成的點心。"
rainbow_feather:
  names:
    jp_kana: にじいろのはね
    jp_kanji: にじいろのはね
    en: Rainbow Feather
    fr: Arc-en-Ci’Aile
    it: Ala d’iride
    de: Buntschwinge
    es: Pluma Arcoíris
    ko: 무지갯빛깃털
    zh_simp: 虹色之羽
    zh_trad: 虹色之羽
  descriptions:
    jp_kana: "にじいろに　ひかり　かがやく\n不思議な　はね。"
    jp_kanji: "にじいろに　ひかり　かがやく\n不思議な　はね。"
    en: A strange feather that gleams in rainbow colors.
    fr: Une étrange plume qui brille d’un éclat arc-en-ciel.
    it: Piuma magica dai mille colori.
    de: "Eine mystische Feder, die von einem\nregenbogenfarbenen Leuchten erfüllt ist."
    es: Misteriosa pluma de un brillante color arcoíris.
    ko: "무지갯빛으로 빛나는\n이상한 깃털."
    zh_simp: "散发着虹色光辉的\n神奇羽毛。"
    zh_trad: "散發著虹色光輝的\n神奇羽毛。"
rainbow_flower:
  names:
    jp_kana: にじいろのはな
    jp_kanji: にじいろのはな
    en: Rainbow Flower
    fr: Fleur 7 Couleurs
    it: Fiore arcobaleno
    de: Regenbogenblüte
    es: Flor Irisada
    ko: 무지개꽃
    zh_simp: 虹色之花
    zh_trad: 虹色之花
  descriptions:
    jp_kana: "キャプテンたちから　もらった\nはなびらを　ひとつに　まとめたもの。\n成長を　認められた　証。"
    jp_kanji: "キャプテンたちから　もらった\nはなびらを　ひとつに　まとめたもの。\n成長を　認められた　証。"
    en: "A flower made of the petals you received from\ncaptains. It’s proof that your growth has been\nrecognized by them."
    fr: "Une fleur formée à partir des pétales que vous ont\nremis les sept Capitaines. C’est le symbole de\nce que vous avez accompli jusqu’ici."
    it: "Fiore composto dai petali ottenuti dai Capitani.\nÈ la prova che i tuoi progressi sono stati riconosciuti."
    de: "Diese Blüte besteht aus den Blütenblättern, die du von\nden Captains erhalten hast. Sie ist ein Symbol der\nAnerkennung deiner Stärke."
    es: "Flor resultante de la unión de los siete pétalos\nentregados por los Capitanes, símbolo de la experiencia\ny madurez acumuladas en tu aventura."
    ko: "캡틴들에게 받은\n꽃잎을 하나로 만든 것.\n성장을 인정받은 증표."
    zh_simp: "将得自队长们那里的花瓣\n化零为整后形成的东西。\n是成长得到认可的证明。"
    zh_trad: "以從隊長們那裡得到的花瓣\n構成的一朵花。這朵花\n證明了他們認同你的成長。"
rainbow_slate:
  names:
    jp_kana: にじのせきばん
    jp_kanji: にじのせきばん
    en: Rainbow Slate
    fr: Tablette Arc-en-ciel
    it: Piastra arcobaleno
    de: Regenbogenplatte
    es: Losa Arcoíris
    ko: 무지개의석판
    zh_simp: 彩虹石板
    zh_trad: 彩虹石板
  descriptions:
    jp_kana: "不思議な　力に　あふれる　石板。\nハマナスパークの　虹の部屋と\n深い　つながりを　感じる。"
    jp_kanji: "不思議な　力に　あふれる　石板。\nハマナスパークの　虹の部屋と\n深い　つながりを　感じる。"
    en: "A slate overflowing with enigmatic energy. You can feel\na strong connection between it and the Rainbow Room\nat Ramanas Park."
    fr: "Une tablette qui regorge d’une étrange énergie.\nElle semble intimement liée à la Salle de l’Arc-en-ciel\ndu Parc Rosa Rugosa."
    it: "Lastra di pietra che emana una misteriosa energia.\nSembra profondamente connessa alla Stanza arcobaleno\ndel Parco Rosa Rugosa."
    de: "Eine Platte, die vor rätselhafter Energie strotzt.\nMan kann eine starke Verbindung zwischen ihr und der\nRegenbogenkammer im Hamanasu-Park spüren."
    es: "Una losa rebosante de una misteriosa energía. Parece\nestrechamente relacionada con la Sala del Arcoíris del\nParque Hansa."
    ko: "신비한 힘이 넘치는 석판.\n해당화파크의 무지개의 방과\n깊은 연관이 있는 것 같다."
    zh_simp: "充满了神秘力量的石板。\n感觉它与玫瑰公园的彩虹之厅\n有着很深的关联。"
    zh_trad: "充滿神奇力量的石板。\n感覺它和玫瑰公園的彩虹之廳\n有很深的關係。"
ralts_dust:
  names:
    jp_kana: ラルトスのおとしもの
    jp_kanji: ラルトスのおとしもの
    en: Ralts Dust
    fr: Babiole de Tarsal
    it: Oggetto di Ralts
    de: Trasla-Material
    es: Pertenencia de Ralts
    ko: 랄토스의유실물
    zh_simp: 拉鲁拉丝的掉落物
    zh_trad: 拉魯拉絲的掉落物
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
rare_bone:
  names:
    jp_kana: きちょうなホネ
    jp_kanji: きちょうなホネ
    en: Rare Bone
    fr: Os Rare
    it: Osso raro
    de: Steinknochen
    es: Hueso Raro
    ko: 귀중한뼈
    zh_simp: 贵重骨头
    zh_trad: 貴重骨頭
  descriptions:
    jp_kana: "ポケモン考古学の　うえで\nとても貴重な　ホネ。\nショップで　高く　売れる。"
    jp_kanji: "ポケモン考古学の　うえで\nとても貴重な　ホネ。\nショップで　高く　売れる。"
    en: "A rare bone that is extremely valuable for the study\nof Pokémon archeology. It can be sold at a high price\nto shops."
    fr: "Un os d’une grande valeur pour l’archéologie Pokémon.\nPeut être vendu à bon prix en magasin."
    it: "Osso di grande valore per l’archeologia Pokémon.\nSi può vendere a un prezzo alto nei negozi."
    de: "Ein Knochen, der jeden Pokémon-Archäologen erfreut.\nKann für viel Geld verkauft werden."
    es: "Un hueso de gran valor para la arqueología Pokémon.\nPuede venderse a buen precio en las tiendas."
    ko: "포켓몬 고고학에 있어\n매우 귀중한 뼈.\n상점에서 비싸게 팔린다."
    zh_simp: "在宝可梦考古学上\n非常贵重的骨头。\n可以在商店高价出售。"
    zh_trad: "在寶可夢考古學上\n非常貴重的骨頭。\n可以在商店高價出售。"
rare_candy:
  names:
    jp_kana: ふしぎなアメ
    jp_kanji: ふしぎなアメ
    en: Rare Candy
    fr: Super Bonbon
    it: Caramella rara
    de: Sonderbonbon
    es: Caramelo Raro
    ko: 이상한사탕
    zh_simp: 神奇糖果
    zh_trad: 神奇糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nあたえると　ポケモン　１匹の\nレベルが　１だけ　あがる。"
    jp_kanji: "エネルギーの　つまった　アメ。\nあたえると　ポケモン　１匹の\nレベルが　１だけ　あがる。"
    en: "A candy that is packed with energy. If consumed, it raises\na Pokémon’s level by one."
    fr: "Un bonbon plein d’énergie.\nIl permet à un Pokémon de monter d’un niveau."
    it: "Una caramella altamente energetica.\nFa salire un Pokémon di un livello."
    de: "Ein energiereiches Bonbon, das den Level eines\nPokémon dauerhaft um 1 erhöht."
    es: Caramelo energético que sube a un Pokémon de nivel.
    ko: "에너지가 가득한 사탕.\n먹이면 포켓몬 1마리의\n레벨이 1만큼 올라간다."
    zh_simp: "充满能量的糖果。\n将它交给宝可梦后，\n１只宝可梦的等级仅会提高１。"
    zh_trad: "充滿能量的糖果。\n餵給寶可夢後，\n能讓１隻寶可夢的等級提高１級。"
rash_mint:
  names:
    jp_kana: うっかりやミント
    jp_kanji: うっかりやミント
    en: Rash Mint
    fr: Aromate Foufou
    it: Menta Ardente
    de: Hitzig-Minze
    es: Menta Alocada
    ko: 덜렁민트
    zh_simp: 马虎薄荷
    zh_trad: 馬虎薄荷
  descriptions:
    jp_kana: "ポケモンに　香りを　かがせると\n特攻が　上がりやすく　なるが\n特防は　上がりにくくなる　ミント。"
    jp_kanji: "ポケモンに　香りを　かがせると\n特攻が　上がりやすく　なるが\n特防は　上がりにくくなる　ミント。"
    en: "Having a Pokémon smell this mint can make its Sp. Atk\nstat grow stronger. However, its Sp. Def stat may suffer."
    fr: "Si un Pokémon hume cet aromate, son Attaque Spéciale\nmontera plus facilement, mais sa Défense Spéciale\nse développera plus lentement."
    it: "Quando un Pokémon ne sente il profumo,\nil suo Attacco Speciale aumenta più facilmente\na scapito della Difesa Speciale."
    de: "Lässt man ein Pokémon an dieser Minze schnuppern,\nsteigt sein Spezial-Angriff schneller, aber seine\nSpezial-Verteidigung umso langsamer."
    es: "Cuando un Pokémon percibe su aroma, aumenta con\nmás facilidad su Ataque Especial, en detrimento de su\nDefensa Especial."
    ko: "포켓몬에게 향기를 맡게 하면\n특수공격이 오르기 쉬워지지만\n특수방어가 오르기 어려워지는 민트."
    zh_simp: "宝可梦闻了这种薄荷之后，\n会令特攻容易提高，\n而特防则难以提高。"
    zh_trad: "讓寶可夢聞這種薄荷的氣味，\n會令特攻變得容易提高，\n但特防則難以提高。"
rattata_candy:
  names:
    jp_kana: コラッタのアメ
    jp_kanji: コラッタのアメ
    en: Rattata Candy
    fr: Bonbon Rattata
    it: Caramella Rattata
    de: Rattfratz-Bonbon
    es: Caramelo Rattata
    ko: 꼬렛의사탕
    zh_simp: 小拉达的糖果
    zh_trad: 小拉達的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
rawst_berry:
  names:
    jp_kana: チーゴのみ
    jp_kanji: チーゴのみ
    en: Rawst Berry
    fr: Baie Fraive
    it: Baccafrago
    de: Fragiabeere
    es: Baya Safre
    ko: 복분열매
    zh_simp: 莓莓果
    zh_trad: 莓莓果
  descriptions:
    jp_kana: "ポケモンに　持たせると\nやけどを　回復する。"
    jp_kanji: "ポケモンに　持たせると\nやけどを　回復する。"
    en: "If a Pokémon holds one of these Berries, it will be able\nto cure itself of a burn."
    fr: "Une Baie qui soigne une brûlure lorsqu’elle est tenue\npar un Pokémon."
    it: "Se un Pokémon ha questa bacca, guarisce dalle\nscottature."
    de: "Als getragenes Item heilt diese Beere das Pokémon von\nVerbrennungen."
    es: "Los Pokémon pueden llevarla y usarla para curarse las\nquemaduras."
    ko: "포켓몬에게 지니게 하면\n화상을 회복한다."
    zh_simp: "让宝可梦携带后，\n可以治愈灼伤。"
    zh_trad: "讓寶可夢攜帶後，\n可以治癒灼傷。"
rayquaza_treat:
  names:
    jp_kana: レックウザのおやつ
    jp_kanji: レックウザのおやつ
    en: Rayquaza Treat
    fr: Friandise Rayquaza
    it: Spuntino per Rayquaza
    de: Rayquaza-Snack
    es: Galleta Rayquaza
    ko: 레쿠쟈의간식
    zh_simp: 烈空坐的点心
    zh_trad: 烈空坐的點心
  descriptions:
    jp_kana: "伝説のポケモン　レックウザが\n好む食材で　作られた　おやつ。"
    jp_kanji: "伝説のポケモン　レックウザが\n好む食材で　作られた　おやつ。"
    en: "A snack made from ingredients favored by the\nLegendary Pokémon Rayquaza."
    fr: "Une friandise préparée avec les ingrédients favoris\ndu Pokémon légendaire Rayquaza."
    it: "Uno spuntino fatto con gli ingredienti preferiti\ndal Pokémon leggendario Rayquaza."
    de: "Dieser Snack wurde mit den Lieblingszutaten des\nLegendären Pokémon Rayquaza zubereitet."
    es: "Galleta preparada con los ingredientes favoritos\ndel Pokémon legendario Rayquaza."
    ko: "전설의 포켓몬 레쿠쟈가\n좋아하는 식재료로 만들어진 간식."
    zh_simp: "用传说的宝可梦烈空坐\n喜欢的食材制作的点心。"
    zh_trad: "用傳說的寶可夢烈空坐\n喜愛的食材製成的點心。"
razor_claw:
  names:
    jp_kana: するどいツメ
    jp_kanji: するどいツメ
    en: Razor Claw
    fr: Griffe Rasoir
    it: Affilartiglio
    de: Scharfklaue
    es: Garra Afilada
    ko: 예리한손톱
    zh_simp: 锐利之爪
    zh_trad: 銳利之爪
  descriptions:
    jp_kana: "鋭く　とがった　ツメ。\n持たせると　技が　急所に\n当たりやすくなる。"
    jp_kanji: "鋭く　とがった　ツメ。\n持たせると　技が　急所に\n当たりやすくなる。"
    en: "An item to be held by a Pokémon. This sharply hooked\nclaw boosts the critical-hit ratio of the holder’s moves."
    fr: "Objet à tenir. Une griffe crochue et pointue\naugmentant le taux de critiques."
    it: "Strumento da dare a un Pokémon. Artiglio che aumenta\nla probabilità di sferrare brutti colpi."
    de: "Ein Item zum Tragen. Die scharfe Klaue erhöht die\nVolltrefferquote des Trägers."
    es: "Garra afilada que aumenta la probabilidad de asestar\nun golpe crítico. Debe llevarla un Pokémon."
    ko: "날카롭고 뾰족한 손톱.\n지니게 하면 기술이\n급소에 맞기 쉬워진다."
    zh_simp: "尖锐的爪子。\n携带后，招式会\n变得容易击中要害。"
    zh_trad: "尖銳的爪子。\n攜帶後，招式會\n變得容易擊中要害。"
razor_fang:
  names:
    jp_kana: するどいキバ
    jp_kanji: するどいキバ
    en: Razor Fang
    fr: Croc Rasoir
    it: Affilodente
    de: Scharfzahn
    es: Colmillo Agudo
    ko: 예리한이빨
    zh_simp: 锐利之牙
    zh_trad: 銳利之牙
  descriptions:
    jp_kana: "鋭く　とがった　キバ。\n持たせると　ダメージを　与えたとき\nひるませることが　ある。"
    jp_kanji: "鋭く　とがった　キバ。\n持たせると　ダメージを　与えたとき\nひるませることが　ある。"
    en: "An item to be held by a Pokémon. This sharply hooked\nfang may cause the target to flinch whenever the holder\nsuccessfully inflicts damage on them with an attack."
    fr: "Objet à tenir. Un croc pointu et aiguisé pouvant apeurer\nl’ennemi quand le porteur lui inflige des dégâts."
    it: "Strumento da dare a un Pokémon. Chi ce l’ha può\nfar tentennare l’avversario a cui infligge danni."
    de: "Ein Item zum Tragen. Trifft der Träger dieses spitzen und\nscharfen Zahnes das Ziel mit einem Angriff, der Schaden\nverursacht, schreckt es eventuell zurück."
    es: "Si lo lleva un Pokémon, puede amedrentar al objetivo\nal que inflige daño con un ataque."
    ko: "날카롭고 뾰족한 이빨.\n지니게 하면 데미지를 줬을 때\n풀죽게 하기도 한다."
    zh_simp: "尖锐的牙齿。\n携带后，在给予伤害时，\n有时会让对手畏缩。"
    zh_trad: "尖銳的牙齒。\n攜帶後，在給予傷害時，\n有時會讓對手畏縮。"
razz_berry:
  names:
    jp_kana: ズリのみ
    jp_kanji: ズリのみ
    en: Razz Berry
    fr: Baie Framby
    it: Baccalampon
    de: Himmihbeere
    es: Baya Frambu
    ko: 라즈열매
    zh_simp: 蔓莓果
    zh_trad: 蔓莓果
  descriptions:
    jp_kana: "かっこよさに　磨きを　かけるための\nポロックを　作るとき　使われる。\n赤色の実は　食べると　辛い。"
    jp_kanji: "かっこよさに　磨きを　かけるための\nポロックを　作るとき　使われる。\n赤色の実は　食べると　辛い。"
    en: "Used to make Pokéblocks that will enhance Coolness.\nIts red flesh is spicy if eaten."
    fr: "Une Baie orange au goût épicé, utilisée pour préparer\ndes Pokéblocs permettant d’augmenter le Sang-froid\nd’un Pokémon."
    it: "Bacca rossa dal sapore piccante usata per creare\nPokémelle che aumentano la Classe del Pokémon."
    de: "Eine Beerensorte, die als Zutat für Pokériegel\nverwendet wird, welche die Coolness erhöhen.\nIhr rötliches Fruchtfleisch schmeckt scharf."
    es: "Se utiliza en la producción de Pokécubos que potencian\nel carisma. Es de color rojizo y sabor picante."
    ko: "근사함을 연마하기 위한\n포켓몬스넥을 만들 때 사용된다.\n빨간색 열매는 먹으면 맵다."
    zh_simp: "用于制作宝可方块，\n制作出来的宝可方块可用来打磨帅气。\n红色的果实尝起来是辣的。"
    zh_trad: "製作用於增進帥氣的\n寶可方塊時使用。\n紅色的果實嘗起來是辣的。"
reaper_cloth:
  names:
    jp_kana: れいかいのぬの
    jp_kanji: れいかいのぬの
    en: Reaper Cloth
    fr: Tissu Fauche
    it: Terrorpanno
    de: Düsterumhang
    es: Tela Terrible
    ko: 영계의천
    zh_simp: 灵界之布
    zh_trad: 靈界之布
  descriptions:
    jp_kana: "おそろしく　強い霊力が\nこめられている　布。\nあるポケモンが　好んでいる。"
    jp_kanji: "おそろしく　強い霊力が\nこめられている　布。\nあるポケモンが　好んでいる。"
    en: "A cloth imbued with horrifyingly strong spiritual energy.\nIt’s loved by a certain Pokémon."
    fr: "Un tissu imprégné d’une énergie spirituelle\nhorriblement puissante. Apprécié d’un certain Pokémon."
    it: "Panno intriso di un’energia spirituale terribilmente forte.\nPiace a un Pokémon in particolare."
    de: "Ein Stoffumhang mit geistiger Energie.\nDas Lieblingsstück eines bestimmten Pokémon."
    es: "Tela imbuida de una energía espiritual muy potente.\nCierto Pokémon la adora."
    ko: "무섭고 강한 영력이\n담겨 있는 천.\n어떤 포켓몬이 좋아하는 물건이다."
    zh_simp: "蕴含着惊人强大灵力的布。\n某种宝可梦很喜欢它。"
    zh_trad: "蘊含著驚人的\n強大靈力的布。\n某種寶可夢很喜歡它。"
red_apricorn:
  names:
    jp_kana: あかぼんぐり
    jp_kanji: あかぼんぐり
    en: Red Apricorn
    fr: Noigrume Rouge
    it: Ghicocca rossa
    de: Aprikoko Rot
    es: Bonguri Rojo
    ko: 빨간규토리
    zh_simp: 红球果
    zh_trad: 紅球果
  descriptions:
    jp_kana: "あかい　ぼんぐり。\nつーんと　はなにくる　においがする。"
    jp_kanji: "あかい　ぼんぐり。\nつーんと　はなにくる　においがする。"
    en: "A red Apricorn. It has a pungent scent that assails\nthe nostrils."
    fr: "Un Noigrume de couleur rouge.\nIl dégage un puissant arôme."
    it: "Una ghicocca di colore rosso. Emana un odore\nmolto forte."
    de: "Eine rote Aprikoko. Sie verströmt einen stechenden\nGeruch."
    es: Bonguri de color rojo y aroma muy penetrante.
    ko: "빨간색의 규토리.\n코를 톡 쏘는 향기가 난다."
    zh_simp: "红色的球果。\n有种刺鼻的气味。"
    zh_trad: "紅色的球果。\n有種刺鼻的氣味。"
red_bell_pepper:
  names:
    jp_kana: あかパプリカスライス
    jp_kanji: あかパプリカスライス
    en: Red Bell Pepper
    fr: Poivron Rouge
    it: Peperone rosso
    de: Rote Paprika
    es: Pimiento Rojo
    ko: 빨간파프리카슬라이스
    zh_simp: 红椒片
    zh_trad: 紅椒片
  descriptions:
    jp_kana: "苦味が　ある　食材。\nピーマンよりも　苦味と　風味が\n優しいので　使いやすい　食材。"
    jp_kanji: "苦味が　ある　食材。\nピーマンよりも　苦味と　風味が\n優しいので　使いやすい　食材。"
    en: "An ingredient with some bitterness—but its bitter notes\nand overall flavor are pleasantly mild compared to its\ngreen cousin."
    fr: "Un ingrédient au goût amer. Une variété moins amère\net à la saveur plus légère que les poivrons verts."
    it: "Un ingrediente amaro più versatile del Peperone verde\ngrazie al gusto meno robusto e a note meno amare."
    de: "Diese bittere Zutat ist vielseitiger in der Verwendung als\nGrüne Paprika, da Bitterkeit und Aroma bei ihr milder\nausfallen."
    es: "Es ligeramente amargo, pero, comparado con su\nvariante verde, es más suave y más fácil de incluir\nen ciertas preparaciones."
    ko: "쓴맛이 나는 식재료.\n피망보다 쓴맛과 풍미가\n강하지 않아서 먹기 좋다."
    zh_simp: "带有苦味的食材。\n苦味及其风味比青椒\n更加淡，易于使用。"
    zh_trad: "帶有苦味的食材。\n苦味和風味較青椒溫和，\n因此容易使用。"
red_card:
  names:
    jp_kana: レッドカード
    jp_kanji: レッドカード
    en: Red Card
    fr: Carton Rouge
    it: Cartelrosso
    de: Rote Karte
    es: Tarjeta Roja
    ko: 레드카드
    zh_simp: 红牌
    zh_trad: 紅牌
  descriptions:
    jp_kana: "不思議な　ちからのある　カード。\n持たせると　ダメージを　与えてきた\n相手を　退場させることが　できる。"
    jp_kanji: "不思議な　ちからのある　カード。\n持たせると　ダメージを　与えてきた\n相手を　退場させることが　できる。"
    en: "An item to be held by a Pokémon. If the holder is\ndamaged by an attack, the mysterious power of this\ncard can remove the attacker from the battle."
    fr: "Objet à tenir. Une carte au pouvoir mystérieux qui\npermet d’éjecter un Pokémon du combat si ce dernier\ninflige des dégâts au porteur avec une capacité offensive."
    it: "Cartellino dal potere misterioso. Chi ce l’ha fa ritirare\ndalla lotta il Pokémon che gli ha inferto dei danni."
    de: "Eine Karte mit mysteriösen Kräften. Wird dem Träger\nSchaden zugefügt, wird der Angreifer des Platzes\nverwiesen."
    es: "Misteriosa tarjeta que permite al Pokémon que la lleva\nexpulsar a otro Pokémon que lo ataque."
    ko: "이상한 힘이 있는 카드.\n지니게 하면 데미지를 준 상대를\n퇴장시킬 수 있다."
    zh_simp: "有着神奇力量的卡片。\n携带后，能让对自己\n造成伤害的对手退场。"
    zh_trad: "有著神奇力量的卡片。\n攜帶後，能讓對自己\n造成傷害的對手退場。"
red_chain:
  names:
    jp_kana: あかいくさり
    jp_kanji: あかいくさり
    en: Red Chain
    fr: Chaîne Rouge
    it: Catena rossa
    de: Rote Kette
    es: Cadena Roja
    ko: 빨강사슬
    zh_simp: 红色锁链
    zh_trad: 紅色鎖鏈
  descriptions:
    jp_kana: "シンオウ地方を　うみだした\n伝説の　ポケモンを　つなぐと\nいわれる　神話の　道具。"
    jp_kanji: "シンオウ地方を　うみだした\n伝説の　ポケモンを　つなぐと\nいわれる　神話の　道具。"
    en: "A mythical chain that is said to bind the Legendary\nPokémon that created the Sinnoh region."
    fr: "Une chaîne mystique qui serait reliée au Pokémon\nlégendaire ayant créé la région de Sinnoh."
    it: "Catena mitica che si dice leghi il Pokémon leggendario\nche ha creato la regione di Sinnoh."
    de: "Diese mythische Kette soll das Legendäre Pokémon\nbinden können, das einst die Sinnoh-Region erschuf."
    es: "Se dice que esta cadena mística está relacionada con el\nPokémon legendario que creó la región de Sinnoh."
    ko: "신오지방을 만들어 낸\n전설의 포켓몬과 이어진다고\n전해지는 신화의 도구."
    zh_simp: "神话道具。\n据说连接着孕育出\n神奥地区的传说的宝可梦。"
    zh_trad: "神話道具。\n據說連結著孕育出\n神奧地區的傳說的寶可夢。"
red_dish:
  names:
    jp_kana: レッドプレート
    jp_kanji: レッドプレート
    en: Red Dish
    fr: Assiette Rouge
    it: Piatto rosso
    de: Roter Teller
    es: Plato Rojo
    ko: 레드 플레이트
    zh_simp: 红色盘子
    zh_trad: 紅色盤子
  descriptions:
    jp_kana: "ピクニック用のお皿。　料理や気分で\n使い分けられるよう　色の種類が　豊富。\nレッドは　いつも売れている　商品。"
    jp_kanji: "ピクニック用のお皿。　料理や気分で\n使い分けられるよう　色の種類が　豊富。\nレッドは　いつも売れている　商品。"
    en: "A dish for picnics. Comes in plenty of colors to choose\nfrom based on the food or the mood. The red variety\nnever fails to sell well."
    fr: "Une assiette de pique-nique. Il en existe de nombreuses\ncouleurs pour les accorder à l’ambiance ou au menu.\nLa rouge se vend très bien d’une année sur l’autre."
    it: "Piatto da picnic. È disponibile in un ampio assortimento\ndi colori tra cui si può scegliere a seconda del cibo e\ndell’umore. Il rosso vende sempre."
    de: "Diesen Picknickteller gibt es in verschiedenen Farben,\ndamit man je nach Laune oder Speise variieren kann.\nDie Verkaufszahlen des roten Tellers enttäuschen nie."
    es: "Un plato de pícnic. Los distintos colores en los que viene\nofrecen posibilidades infinitas. Esta versión roja es un\nclásico atemporal."
    ko: "피크닉용 접시. 요리나 기분에 따라\n골라서 쓸 수 있게 색의 종류가 다양하다.\n레드 컬러는 스테디셀러 상품이다."
    zh_simp: "野餐用的盘子。为了能够配合料理\n和心情使用，其有着丰富的颜色种类。\n红色的是永远都有市场的商品。"
    zh_trad: "野餐用的盤子。提供豐富的顏色，\n以搭配各種不同的料理和心情。\n紅色的盤子銷路長紅。"
red_flag_pick:
  names:
    jp_kana: あかいはたピック
    jp_kanji: あかいはたピック
    en: Red-Flag Pick
    fr: Pique à Fanion Rouge
    it: Bandierina rossa
    de: Rotfahnen-Pikser
    es: Palillo Bandera Roja
    ko: 빨강 깃발 픽
    zh_simp: 红旗子三明治签
    zh_trad: 紅旗子三明治籤
  descriptions:
    jp_kana: "赤い旗が　冒険感を　かもしだす　ピック。\n旗の部分が　厚紙で　できているので\n風がなくても　しっかり　広がっている。"
    jp_kanji: "赤い旗が　冒険感を　かもしだす　ピック。\n旗の部分が　厚紙で　できているので\n風がなくても　しっかり　広がっている。"
    en: "This pick flies a red flag that lends an air of adventure.\nThe flag itself is made of card stock, so it’ll fly proudly\neven with no wind."
    fr: "Une pique dont le drapeau rouge appelle à l’aventure.\nLe papier du fanion est épais pour le faire tenir en l’air\nmême sans vent."
    it: "La bandierina rossa di questo stecchino crea\nun’atmosfera di avventura. Essendo di cartoncino,\nsi staglia fiera anche senza vento."
    de: "Das rote Fähnchen am Pikser regt die Abenteuerlust an.\nEs ist aus dickem Papier gefertigt und daher stets straff\ngespannt, selbst wenn kein Wind weht."
    es: "La banderita roja de este palillo inspira emoción y\naventura. Está hecha de cartulina, por lo que se\nmantiene en posición aunque no sople viento."
    ko: "빨간 깃발이 모험하는 기분을 자아내는 픽.\n깃발 부분이 두꺼운 종이로 되어 있어서\n바람이 불지 않아도 똑바로 펼쳐져 있다."
    zh_simp: "签子上带有酝酿出冒险感的红色旗帜。\n旗帜的部分由厚纸制成，\n因此即使没有风也能完全展开。"
    zh_trad: "小籤上的紅色旗子營造出冒險感。\n旗子是以厚紙製成，\n因此即使無風也會昂首飄揚。"
red_flute:
  names:
    jp_kana: あかいビードロ
    jp_kanji: あかいビードロ
    en: Red Flute
    fr: Flûte Rouge
    it: Flauto rosso
    de: Rote Flöte
    es: Flauta Roja
    ko: 빨강비드로
    zh_simp: 红色玻璃哨
    zh_trad: 紅色玻璃哨
  descriptions:
    jp_kana: "赤いガラスで　できた　笛。\nメロメロ状態を　回復する。"
    jp_kanji: "赤いガラスで　できた　笛。\nメロメロ状態を　回復する。"
    en: "A flute made from red glass. It snaps Pokémon\nout of infatuation."
    fr: "Un jouet en forme de flûte en verre rouge.\nAnnule l’effet du statut attraction."
    it: "Flauto fatto di vetro rosso. Ha il potere di curare\nl’infatuazione."
    de: Eine Spielzeugflöte aus rotem Glas. Heilt Anziehung.
    es: "Una flauta de cristal rojo cuyas notas hacen volver en sí\na un Pokémon enamorado."
    ko: "빨간 유리로 만들어진 피리.\n헤롱헤롱 상태를\n회복한다."
    zh_simp: "以红色玻璃制成的哨子。\n可以治愈着迷状态。"
    zh_trad: "以紅色玻璃製成的笛子。\n可以治癒著迷狀態。"
red_nectar:
  names:
    jp_kana: くれないのミツ
    jp_kanji: くれないのミツ
    en: Red Nectar
    fr: Nectar Rouge
    it: Nettare rosso
    de: Roter Nektar
    es: Néctar Rojo
    ko: 다홍꿀
    zh_simp: 朱红色花蜜
    zh_trad: 朱紅色花蜜
  descriptions:
    jp_kana: "くれない色の　花のミツ。\n特定のポケモンの　姿を　変える。"
    jp_kanji: "くれない色の　花のミツ。\n特定のポケモンの　姿を　変える。"
    en: "Flower nectar obtained from a red flower. It changes the\nform of a certain species of Pokémon."
    fr: "Un nectar de couleur rouge qui permet à\nun certain Pokémon de changer d’apparence."
    it: "Nettare di fiori rossi. Fa cambiare forma a una\ndeterminata specie di Pokémon."
    de: "Ein tiefroter Blütennektar. Ein bestimmtes Pokémon kann\ndamit seine Form ändern."
    es: "Néctar de cierta flor roja, capaz de hacer cambiar de\nforma a una determinada especie de Pokémon."
    ko: "다홍색 꽃의 꿀.\n특정 포켓몬의 모습을 바꾼다."
    zh_simp: "朱红色花的花蜜。\n可以改变特定宝可梦的样子。"
    zh_trad: "朱紅色的花蜜。\n可以改變特定寶可夢的樣子。"
red_onion:
  names:
    jp_kana: アーリーレッド
    jp_kanji: アーリーレッド
    en: Red Onion
    fr: Oignon Rouge
    it: Cipolla rossa
    de: Rote Zwiebel
    es: Cebolla Roja
    ko: 적양파
    zh_simp: 红洋葱
    zh_trad: 紅洋蔥
  descriptions:
    jp_kana: "甘味が　ある　食材。\nたまねぎと　比較して　辛味や\n香りが　穏やかで　食べやすい。"
    jp_kanji: "甘味が　ある　食材。\nたまねぎと　比較して　辛味や\n香りが　穏やかで　食べやすい。"
    en: "An ingredient with some sweetness to it. Its spiciness and\nfragrance are milder than those of other onions, making\nit a pleasant bite."
    fr: "Un ingrédient au goût sucré. Il est plus doux et moins\nâcre que les autres oignons, ce qui lui permet de\nsatisfaire la plupart des palais."
    it: "Un ingrediente dolce. Si lascia mangiare più facilmente\ndella Cipolla bianca grazie all’aroma e la piccantezza\nmeno marcati."
    de: "Diese süßliche Zutat zeichnet sich im Vergleich zu\ngewöhnlichen Zwiebeln durch milde Schärfe und mildes\nAroma aus, wodurch sie sich leichter verspeisen lässt."
    es: "Comparada con otros tipos de cebolla, la fragancia y el\npicante de esta variante dulzona son mucho más suaves,\npor lo que se deja comer mejor."
    ko: "단맛이 나는 식재료.\n양파에 비해 매운맛이나\n향이 강하지 않아서 먹기 좋다."
    zh_simp: "带有甜味的食材。\n与洋葱相比，辣味和\n香味都较淡，容易入口。"
    zh_trad: "帶有甜味的食材。\n辣味和氣味較洋蔥溫和，\n容易入口。"
red_orb:
  names:
    jp_kana: べにいろのたま
    jp_kanji: べにいろのたま
    en: Red Orb
    fr: Gemme Rouge
    it: Gemma rossa
    de: Roter Edelstein
    es: Prisma Rojo
    ko: 주홍구슬
    zh_simp: 朱红色宝珠
    zh_trad: 朱紅色寶珠
  descriptions:
    jp_kana: "ホウエン地方の　伝説と\n深い　関わりが　あると　いわれる\nあかく　かがやく　たま。"
    jp_kanji: "ホウエン地方の　伝説と\n深い　関わりが　あると　いわれる\nあかく　かがやく　たま。"
    en: "A shiny red orb that is said to have a deep connection\nto a legend of the Hoenn region."
    fr: "Une gemme incarnate dont on dit qu’elle a un lien\ntrès étroit avec les légendes de Hoenn."
    it: "Gemma con riflessi rossi, che pare essere strettamente\nlegata alle leggende della regione di Hoenn."
    de: "Ein rot schimmernder Stein, von dem in den Legenden\nder Hoenn-Region berichtet wird."
    es: "Piedra carmesí de la que se dice que guarda una\nestrecha relación con las leyendas de Hoenn."
    ko: "호연지방의 전설과\n깊은 연관이 있다고 전해지는\n빨갛게 빛나는 구슬."
    zh_simp: "散发着红色光辉的宝珠。\n据说和丰缘地区的传说渊源颇深。"
    zh_trad: "散發著紅色光輝的寶珠。\n據說和豐緣地區的傳說\n有著很深的淵源。"
red_petal:
  names:
    jp_kana: あかのはなびら
    jp_kanji: あかのはなびら
    en: Red Petal
    fr: Pétale Rouge
    it: Petalo rosso
    de: Rotes Blatt
    es: Pétalo Rojo
    ko: 빨강꽃잎
    zh_simp: 红色花瓣
    zh_trad: 紅色花瓣
  descriptions:
    jp_kana: "マツリカの試練で　カキから\nもらえる　はなびらの　押し花。\n７種類　集めるのが　目的。"
    jp_kanji: "マツリカの試練で　カキから\nもらえる　はなびらの　押し花。\n７種類　集めるのが　目的。"
    en: "A pressed flower petal you receive from Kiawe\nduring Mina’s trial. The goal is to collect seven\ndifferent kinds of petals."
    fr: "Un pétale pressé que Kiawe vous a remis lors\nde l’Épreuve d’Oléa. Il y en a sept à collectionner."
    it: "Petalo di fiore pressato ottenuto da Kawe durante la\nprova di Rika. L’obiettivo è ricevere sette petali diversi."
    de: "Ein gepresstes Blütenblatt, das man im Rahmen von\nMatsurikas Prüfung von Kiawe erhält. Ziel ist es,\nsieben verschiedene Blütenblätter zu sammeln."
    es: "Pétalo prensado recibido de manos de Kiawe durante la\nprueba de Rika. El objetivo es reunir siete distintos."
    ko: "말리화의 시련에서 키아웨에게\n받을 수 있는 꽃잎의 압화.\n7종류 모으는 것이 목적."
    zh_simp: "在茉莉的考验中，\n能从卡奇那里得到的干花花瓣。\n目标是集齐７种。"
    zh_trad: "在茉莉的考驗中，\n從卡奇那裡得到的壓花花瓣。\n目標是集滿７種花瓣。"
red_poke_ball_pick:
  names:
    jp_kana: あかボールピック
    jp_kanji: あかボールピック
    en: Red Poké Ball Pick
    fr: Pique à Ball Rouge
    it: Stecchino Ball rosso
    de: Rotball-Pikser
    es: Palillo Ball Roja
    ko: 빨강 볼 픽
    zh_simp: 红珠珠三明治签
    zh_trad: 紅珠珠三明治籤
  descriptions:
    jp_kana: "シンプルな　赤いボールの　ピック\n最初に　ほのおタイプの　ポケモンを\n選んだ　トレーナーが　よく使っている。"
    jp_kanji: "シンプルな　赤いボールの　ピック\n最初に　ほのおタイプの　ポケモンを\n選んだ　トレーナーが　よく使っている。"
    en: "A sandwich pick with a simple red Poké Ball design.\nOften used by Trainers who picked a Fire-type Pokémon\nfor their first partner."
    fr: "Une pique ornée d’une simple Poké Ball rouge.\nElle est souvent utilisée par les Dresseurs ayant choisi un\nPokémon de type Feu comme partenaire de départ."
    it: "Stecchino a forma di una semplice Poké Ball rossa.\nViene spesso usato da Allenatori che scelgono come\nprimo compagno d’avventure un Pokémon di tipo Fuoco."
    de: "Ein schlichter Pikser im Design eines roten Pokéballs.\nWird häufig von Trainern verwendet, die als ihr erstes\nPokémon eines vom Typ Feuer wählten."
    es: "Un palillo con un sencillo diseño de una Poké Ball roja.\nEspecialmente popular entre aquellos que eligieron a un\nPokémon de tipo Fuego como primer compañero."
    ko: "심플한 빨간색 볼 모양 픽.\n첫 포켓몬으로 불꽃타입을\n선택한 트레이너가 자주 사용한다."
    zh_simp: "带有简约红色球的签子。\n一开始选择了火属性\n宝可梦的训练家经常会使用。"
    zh_trad: "簡約的紅色珠珠小籤。\n最初選擇了火屬性寶可夢的\n訓練家經常使用。"
red_scale:
  names:
    jp_kana: あかいウロコ
    jp_kanji: あかいウロコ
    en: Red Scale
    fr: Écaille Rouge
    it: Squama rossa
    de: Rote Schuppe
    es: Escama Roja
    ko: 빨간비늘
    zh_simp: 红色鳞片
    zh_trad: 紅色鱗片
  descriptions:
    jp_kana: "怒りの湖に　あらわれた\nあかい　ギャラドスの　ウロコ。\nほのおのように　あかく　かがやく。"
    jp_kanji: "怒りの湖に　あらわれた\nあかい　ギャラドスの　ウロコ。\nほのおのように　あかく　かがやく。"
    en: "A scale from a red Gyarados that appeared at the Lake\nof Rage. It glows red like a flame."
    fr: "Une écaille du Léviator apparu au Lac Colère.\nElle rougeoie comme une flamme."
    it: "Una squama del Gyarados rosso apparso al Lago d’Ira.\nÈ rossa come il fuoco."
    de: "Eine Schuppe des roten Garados, das im See des Zorns\nerschienen ist. Sie glänzt rot wie Feuer."
    es: "Escama del Gyarados aparecido en el Lago de la Furia.\nEs de un rojo tan intenso como las llamas."
    ko: "분노의 호수에 나타난\n빨간 갸라도스의 비늘.\n불꽃처럼 빨갛게 빛난다."
    zh_simp: "在愤怒之湖里出现的\n红色暴鲤龙的鳞片。\n散发着像火一样的红色光芒。"
    zh_trad: "在憤怒之湖裡出現的\n紅色暴鯉龍的鱗片。\n散發著像火一樣的紅色光芒。"
red_scarf:
  names:
    jp_kana: あかいバンダナ
    jp_kanji: あかいバンダナ
    en: Red Scarf
    fr: Foulard Rouge
    it: Fascia rossa
    de: Roter Schal
    es: Pañuelo Rojo
    ko: 빨강밴드
    zh_simp: 红色头巾
    zh_trad: 紅色頭巾
  descriptions:
    jp_kana: "持たせて　コンテストに　参加すると\nそのポケモンは　いつもより\nかっこよく　みられる。"
    jp_kanji: "持たせて　コンテストに　参加すると\nそのポケモンは　いつもより\nかっこよく　みられる。"
    en: "When a Pokémon holds this during a contest, it looks\neven cooler than usual."
    fr: "Objet à tenir. Augmente le Sang-froid d’un Pokémon\ndans les concours."
    it: "Strumento da dare a un Pokémon.\nAumenta la Classe di chi l’indossa in una gara."
    de: "Ein Item zum Tragen. Trainer erhöhen damit in\nWettbewerben die Coolness ihres Pokémon."
    es: "Aumenta el carisma en los concursos. Debe llevarlo un\nPokémon."
    ko: "지니게 하여 콘테스트에 참가하면\n그 포켓몬은 여느 때보다\n근사하게 보인다."
    zh_simp: "携带它去参加华丽大赛的\n宝可梦会比平时\n看上去更加帅气。"
    zh_trad: "攜帶它去參加華麗大賽的\n寶可夢會比平時\n看起來更加帥氣。"
red_shard:
  names:
    jp_kana: あかいかけら
    jp_kanji: あかいかけら
    en: Red Shard
    fr: Tesson Rouge
    it: Coccio rosso
    de: Purpurstück
    es: Parte Roja
    ko: 빨강조각
    zh_simp: 红色碎片
    zh_trad: 紅色碎片
  descriptions:
    jp_kana: "赤い　小さなかけら。\n昔に　作られた　なにかの\n道具の一部　らしい。"
    jp_kanji: "赤い　小さなかけら。\n昔に　作られた　なにかの\n道具の一部　らしい。"
    en: "A small red shard. It appears to be a fragment of\nsome sort of implement made long ago."
    fr: "Un petit tesson rouge.\nIl semble provenir d’un objet très ancien."
    it: "Un piccolo coccio rosso che con ogni probabilità\nè un frammento di un antico strumento."
    de: "Eine rote Scherbe eines antiken Werkzeugs, das vor\nlanger Zeit angefertigt wurde."
    es: "Un pequeño fragmento rojo. Parece formar parte de\nalgún tipo de herramienta antigua."
    ko: "빨간 작은 조각.\n옛날에 만들어진 어떤\n도구의 일부인 듯하다."
    zh_simp: "红色的小碎片。\n好像是以前制作的\n某道具的一部分。"
    zh_trad: "紅色的小碎片。\n好像是以前製作的\n某道具的一部分。"
reins_of_unity:
  names:
    jp_kana: キズナのタヅナ
    jp_kanji: キズナのタヅナ
    en: Reins of Unity
    fr: Rênes de l’Unité
    it: Briglie legame
    de: Zügel des Bundes
    es: Riendas Unión
    ko: 유대의고삐
    zh_simp: 牵绊缰绳
    zh_trad: 牽絆韁繩
  descriptions:
    jp_kana: "光に　かざすと　かがやく　布。\n昔　人間が　豊穣の王に\n感謝の　気持ちとして　捧げていた。"
    jp_kanji: "光に　かざすと　かがやく　布。\n昔　人間が　豊穣の王に\n感謝の　気持ちとして　捧げていた。"
    en: "Cords that shine when you hold them up to the light.\nThe people of old times presented these to the King of\nBountiful Harvests to express their gratitude."
    fr: "Une courroie faite d’un tissu qui scintille à la lumière.\nLes humains en offraient autrefois au Seigneur\ndes récoltes en gage de leur gratitude."
    it: "Nastri che risplendono se illuminati. Un tempo venivano\nofferti dagli esseri umani al Re dell’abbondanza in\nsegno di gratitudine."
    de: "Zügel gewoben aus Stoff, der leuchtet, wenn man ihn\nins Licht hält. Einst schenkten die Menschen sie dem\nKönig der reichen Ernte als Zeichen ihrer Dankbarkeit."
    es: "Correas elaboradas con un tejido que brilla bajo la luz.\nEn el pasado, los humanos las entregaban como ofrenda\nal Rey de las Cosechas en señal de gratitud."
    ko: "빛에 비추면 반짝이는 천.\n과거에 인간들이 풍요의 왕에게\n감사하는 마음을 담아 바쳤다고 한다."
    zh_simp: "拿到光下即可生辉的布。\n人们曾经将其进献给\n丰饶之王以表感谢之意。"
    zh_trad: "透光時會熠熠生輝的布料。\n人們曾經將它獻給豐饒之王，\n藉此表達感謝之意。"
reins_of_unity:separate:
  names:
    jp_kana: キズナのタヅナ
    jp_kanji: キズナのタヅナ
    en: Reins of Unity
    fr: Rênes de l’Unité
    it: Briglie legame
    de: Zügel des Bundes
    es: Riendas Unión
    ko: 유대의고삐
    zh_simp: 牵绊缰绳
    zh_trad: 牽絆韁繩
  descriptions:
    jp_kana: "人が　王に　献上していた　タヅナ。\n繋がった者　同士　意思疎通が　できる。\nバドレックスと　愛馬を　分離させる。"
    jp_kanji: "人が　王に　献上していた　タヅナ。\n繋がった者　同士　意思疎通が　できる。\nバドレックスと　愛馬を　分離させる。"
    en: "Reins that people presented to the king. They enable\nthose who are connected to communicate with each\nother. The reins separate Calyrex and its beloved steed."
    fr: "Une offrande des humains au roi. Ces rênes permettent\nà ceux qu’elles unissent de se comprendre. Elles\npermettent aussi de séparer Sylveroy de son destrier."
    it: "Briglie offerte in dono al re dagli esseri umani.\nPermettono a coloro che sono uniti di comprendersi\ne consentono a Calyrex di separarsi dal suo destriero."
    de: "Zügel, die dem König vom Volk dargeboten wurden.\nSie sorgen für Verständnis zwischen Coronospa und\nseinem treuen Ross und ermöglichen ihre Trennung."
    es: "Riendas que se entregaron como ofrenda al rey.\nPermiten el entendimiento mutuo entre aquellos que\nestán unidos y separan a Calyrex de su amado corcel."
    ko: "인간들이 왕에게 바친 고삐.\n연결된 이들은 의사소통할 수 있게 된다.\n버드렉스와 애마를 분리시킨다."
    zh_simp: "人们曾经用来进献给国王的缰绳。\n通过缰绳连接的二者可以相互交流。\n可使蕾冠王与爱马一分为二。"
    zh_trad: "過去曾由人們獻給國王的韁繩。\n韁繩相繫的生物可以彼此溝通。\n能夠解開蕾冠王與愛馬的合體。"
reins_of_unity:unite:
  names:
    jp_kana: キズナのタヅナ
    jp_kanji: キズナのタヅナ
    en: Reins of Unity
    fr: Rênes de l’Unité
    it: Briglie legame
    de: Zügel des Bundes
    es: Riendas Unión
    ko: 유대의고삐
    zh_simp: 牵绊缰绳
    zh_trad: 牽絆韁繩
  descriptions:
    jp_kana: "人が　王に　献上していた　タヅナ。\n豊穣の力を　増幅し\nバドレックスと　愛馬を　合体させる。"
    jp_kanji: "人が　王に　献上していた　タヅナ。\n豊穣の力を　増幅し\nバドレックスと　愛馬を　合体させる。"
    en: "Reins that people presented to the king. They enhance\nCalyrex’s power over bountiful harvests and unite\nCalyrex with its beloved steed."
    fr: "Une offrande des humains au roi. Ces rênes permettent\nd’unir Sylveroy à son fidèle destrier, et renforcent son\nhabilité à prodiguer d’abondantes récoltes."
    it: "Briglie offerte in dono al re dagli esseri umani.\nAmplificano il potere di Calyrex di donare prosperità\ne gli permettono di unirsi al suo destriero."
    de: "Zügel, die dem König vom Volk dargeboten wurden.\nSie verstärken Coronospas Macht über reiche Ernten\nund ermöglichen das Bündnis mit seinem treuen Ross."
    es: "Riendas que se entregaron como ofrenda al rey.\nPotencian los poderes de Calyrex para mejorar las\ncosechas y le permiten unirse con su amado corcel."
    ko: "인간들이 왕에게 바친 고삐.\n풍요의 힘을 증폭시켜서\n버드렉스와 애마를 합체시킨다."
    zh_simp: "人们曾经用来进献给国王的缰绳。\n可增强丰饶之力，\n并使蕾冠王与爱马合二为一。"
    zh_trad: "過去曾由人們獻給國王的韁繩。\n能夠增強豐饒之力，\n使蕾冠王與愛馬合體。"
relaxed_mint:
  names:
    jp_kana: のんきミント
    jp_kanji: のんきミント
    en: Relaxed Mint
    fr: Aromate Relax
    it: Menta Placida
    de: Locker-Minze
    es: Menta Plácida
    ko: 무사태평민트
    zh_simp: 悠闲薄荷
    zh_trad: 悠閒薄荷
  descriptions:
    jp_kana: "ポケモンに　香りを　かがせると\n防御が　上がりやすく　なるが\n素早さは　上がりにくくなる　ミント。"
    jp_kanji: "ポケモンに　香りを　かがせると\n防御が　上がりやすく　なるが\n素早さは　上がりにくくなる　ミント。"
    en: "Having a Pokémon smell this mint can make its Defense\nstat grow stronger. However, its Speed stat may suffer."
    fr: "Si un Pokémon hume cet aromate, sa Défense\nmontera plus facilement, mais sa Vitesse\nse développera plus lentement."
    it: "Quando un Pokémon ne sente il profumo, la sua Difesa\naumenta più facilmente a scapito della Velocità."
    de: "Lässt man ein Pokémon an dieser Minze schnuppern,\nsteigt seine Verteidigung schneller, aber seine Initiative\numso langsamer."
    es: "Cuando un Pokémon percibe su aroma, aumenta\ncon más facilidad su Defensa, en detrimento de su\nVelocidad."
    ko: "포켓몬에게 향기를 맡게 하면\n방어가 오르기 쉬워지지만\n스피드가 오르기 어려워지는 민트."
    zh_simp: "宝可梦闻了这种薄荷之后，\n会令防御容易提高，\n而速度则难以提高。"
    zh_trad: "讓寶可夢聞這種薄荷的氣味，\n會令防禦變得容易提高，\n但速度則難以提高。"
