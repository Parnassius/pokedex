    it: Frammento di Duskull
    de: Zwirrlicht-Splitter
    es: Fragmento de Duskull
    ko: 해골몽의조각
    zh_simp: 夜巡灵的碎片
    zh_trad: 夜巡靈的碎片
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
dynamax_band:
  names:
    jp_kana: ダイマックスＢ
    jp_kanji: ダイマックスＢ
    en: Dynamax Band
    fr: Poignet Dynamax
    it: Polsino Dynamax
    de: Dynamax-Band
    es: Maximuñequera
    ko: 다이맥스 밴드
    zh_simp: 极巨腕带
    zh_trad: 極巨腕帶
  descriptions:
    jp_kana: "ねがいぼしが　組みこまれており\nパワースポットに　いると　光りだして\nポケモンを　ダイマックス　させる。"
    jp_kanji: "ねがいぼしが　組みこまれており\nパワースポットに　いると　光りだして\nポケモンを　ダイマックス　させる。"
    en: "A Wishing Star has been affixed to it. It lets out a light\nthat allows Pokémon to Dynamax when at a Power Spot."
    fr: "Quand elle se trouve près d’une Source d’Énergie,\nl’Étoile Vœu sertie dans ce poignet brille, ce qui\npermet de donner à un Pokémon sa forme Dynamax."
    it: "Contiene una Desiostella e quando si trova vicino\na un punto energetico emette una luce che permette\nai Pokémon di dynamaxizzarsi."
    de: "Wenn man sich in der Nähe einer Energiequelle aufhält,\nleuchtet der darin eingearbeitete Wunschstern auf und\nermöglicht die Dynamaximierung von Pokémon."
    es: "Si lleva engarzada una Estrella Deseo y el portador se\nhalla junto a un nodo energético, reacciona emitiendo\nuna luz y permite dinamaxizar Pokémon."
    ko: "소원의별이 박혀 있으며\n파워스폿에 있으면 빛이 나고\n포켓몬을 다이맥스시킬 수 있다."
    zh_simp: "内部嵌入了许愿星，\n在能量点就会发出光芒，\n使宝可梦极巨化。"
    zh_trad: "嵌入了許願星，\n當位處能量點時會發光，\n讓寶可夢極巨化。"
dynamax_candy:
  names:
    jp_kana: ダイマックスアメ
    jp_kanji: ダイマックスアメ
    en: Dynamax Candy
    fr: Bonbon Dynamax
    it: Caramella Dynamax
    de: Dynamax-Bonbon
    es: Caramelo Dinamax
    ko: 다이맥스사탕
    zh_simp: 极巨糖果
    zh_trad: 極巨糖果
  descriptions:
    jp_kana: "エネルギーが　つまった　アメ。　与えると\nダイマックスレベルが　１あがる。レベルが\n高いと　ダイマックスの　ＨＰが　増える。"
    jp_kanji: "エネルギーが　つまった　アメ。　与えると\nダイマックスレベルが　１あがる。レベルが\n高いと　ダイマックスの　ＨＰが　増える。"
    en: "A candy that is packed with energy. If consumed, it raises\nthe Dynamax Level of a Pokémon by one. A higher level\nmeans higher HP when Dynamaxed."
    fr: "Un bonbon plein d’énergie qui fait monter le niveau\nDynamax d’un Pokémon d’un point. Plus ce dernier\nest élevé, plus les PV sous forme Dynamax augmentent."
    it: "Caramella piena zeppa di energia che aumenta\ndi un punto il Livello Dynamax. Più alto è il livello, più\naumentano i PS del Pokémon quando si dynamaxizza."
    de: "Ein Bonbon, das voller Energie steckt. Beim Verzehr\nsteigt der Dynamax-Level eines Pokémon um 1 Stufe an.\nDies erhöht seine KP nach der Dynamaximierung."
    es: "Caramelo energético que sube el nivel Dinamax de un\nPokémon. Cuanto más alto sea el nivel, más aumentarán\nsus PS al dinamaxizarse."
    ko: "에너지가 가득한 사탕.\n먹이면 다이맥스 레벨이 1 올라간다.\n레벨이 높으면 다이맥스 시의 HP가 늘어난다."
    zh_simp: "充满能量的糖果。\n喂给宝可梦后，极巨化等级能够提高１级。\n当极巨化等级提高时，极巨化时的ＨＰ会增加。"
    zh_trad: "充滿能量的糖果。\n餵給寶可夢後，能讓極巨化等級提升１級。\n當等級變高，極巨化時ＨＰ將會增加。"
dynamax_crystal_and15:
  names:
    jp_kana: ★And15
    jp_kanji: ★And15
    en: ★And15
    fr: ★And15
    it: ★And15
    de: ★And15
    es: ★And15
    ko: ★And15
    zh_simp: ★And15
    zh_trad: ★And15
  descriptions:
    jp_kana: "使った　日に　ワイルドエリアの\n見張り塔のダイ巣穴　から\n[VAR 0101 (0000304C)]　現れる。"
    jp_kanji: "使った　日に　ワイルドエリアの\n見張り塔のダイ巣穴　から\n[VAR 0101 (0000304C)]　現れる。"
    en: "An item that causes [VAR 0101 (00000020)]to appear from\nthe Watchtower Lair in the Wild Area until the end of\nthe day."
    fr: "Un objet faisant apparaître un [VAR 0101 (0000000A)]dans l’antre géant de la Tour en ruines\ndes Terres Sauvages jusqu’à la fin de la journée."
    it: "Strumento che fa apparire [VAR 0101 (00000020)]nella\ndynatana della Torre Diroccata, nelle Terre Selvagge,\nfino alla fine del giorno in cui viene usato."
    de: "Dieses Item bewirkt, dass im Wachturm-Nest in der\nNaturzone ein [VAR 0101 (00000020)]bis zum Ende des Tages\nerscheint, an dem das Item eingesetzt wurde."
    es: "Posibilita la aparición de [VAR 0101 (00000020)]en el nido\nDinamax de la Atalaya del Área Silvestre hasta finalizar\nel día en que se ha usado."
    ko: "사용한 당일에만 와일드에리어에 있는\n감시탑의 다이맥스굴에서\n[VAR 0101 (00000010)]\x02ᤀ\x03 나타난다."
    zh_simp: "使用后的当天，\n旷野地带的瞭望塔巨巢中\n会出现[VAR 0101 (00003002)]"
    zh_trad: "使用後的當天，\n[VAR 0101 (00006703)]出現在\n曠野地帶的瞭望塔巨巢。"
