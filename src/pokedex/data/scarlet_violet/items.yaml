academy_tablecloth:scarlet:
  names:
    jp_kana: スクールクロス
    jp_kanji: スクールクロス
    en: Academy Tablecloth
    fr: Nappe de l’Académie
    it: Tovaglia accademia
    de: Akademie-Tischtuch
    es: Mantel Academia
    ko: 스쿨 테이블보
    zh_simp: 校园桌巾
    zh_trad: 校園桌巾
  descriptions:
    jp_kana: "耐熱素材で　するどいツメでも　破れない\n最新の　繊維加工　技術で　作られた\nアカデミー指定の　テーブルクロス。"
    jp_kanji: "耐熱素材で　するどいツメでも　破れない\n最新の　繊維加工　技術で　作られた\nアカデミー指定の　テーブルクロス。"
    en: "The academy’s standard-issue tablecloth. It’s made with\nthe latest fiber-processing technology and is so tough\nthat not even a Razor Claw can tear it."
    fr: "Une nappe fournie par l’académie. Grâce aux dernières\ntechnologies textiles, elle est ignifugée et assez solide\npour résister aux coups d’une Griffe Rasoir."
    it: "Tovaglia con il design regolamentare dell’accademia,\nrealizzata in materiale ignifugo, trattato con processi\nall’avanguardia. Neanche un Affilartiglio può strapparla."
    de: "Das offizielle Akademie-Tischtuch aus hitzebeständigem\nMaterial. Dank hochmoderner Faserverarbeitung kann\nnicht einmal eine Scharfklaue dem Stoff etwas anhaben."
    es: "El mantel oficial de la academia, fabricado con un\nmaterial de última tecnología resistente tanto al fuego\ncomo a los arañazos."
    ko: "내열 소재에 예리한 손톱에도 찢어지지 않는\n최신 섬유 가공 기술로 만들어진\n아카데미 지정 테이블보."
    zh_simp: "学院指定的桌巾。采用耐热材料，\n以最新的纤维加工技术制成。\n即使是使用锐利之爪都不能弄破。"
    zh_trad: "學院指定的桌巾。採用耐熱素材，\n並結合即使被銳利之爪攻擊也不會破損的\n最新型纖維加工技術製成。"
