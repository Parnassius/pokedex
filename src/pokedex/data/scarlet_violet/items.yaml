    es: Caramelo Mente ++
    ko: 마음의사탕XL
    zh_simp: 心灵糖果ＸＬ
    zh_trad: 心靈糖果ＸＬ
  descriptions:
    jp_kana: "エネルギーの　つまった　特大の　アメ。\nレベル６０　以上の　ポケモンの\nとくぼうを　上げる。"
    jp_kanji: "エネルギーの　つまった　特大の　アメ。\nレベル６０　以上の　ポケモンの\nとくぼうを　上げる。"
    en: "A huge candy that is packed with energy. When given\nto a Pokémon at Lv. 60 or higher, it will increase that\nPokémon’s Sp. Def stat."
    fr: "Un énorme bonbon plein d’énergie.\nIl augmente la Défense Spéciale d’un Pokémon\nde niveau 60 ou supérieur."
    it: "Una caramella enorme piena zeppa di energia.\nAumenta la Difesa Speciale di un Pokémon\ndi livello 60 o superiore."
    de: "Ein riesiges Bonbon, das voller Energie steckt.\nErhöht dauerhaft die Spezial-Verteidigung eines\nPokémon ab Level 60."
    es: "Caramelo energético enorme que aumenta la Defensa\nEspecial de un Pokémon de Nv. 60 o superior."
    ko: "에너지가 가득한 매우 큰 사탕.\n레벨 60 이상인 포켓몬의\n특수방어를 올린다."
    zh_simp: "充满能量的超大糖果。\n能让等级６０以上的\n宝可梦的特防上升。"
    zh_trad: "充滿能量的特大糖果。\n能提高等級在６０以上的\n寶可夢的特防。"
cover_fossil:
  names:
    jp_kana: ふたのカセキ
    jp_kanji: ふたのカセキ
    en: Cover Fossil
    fr: Fossile Plaque
    it: Fossiltappo
    de: Schildfossil
    es: Fósil Tapa
    ko: 덮개화석
    zh_simp: 背盖化石
    zh_trad: 背蓋化石
  descriptions:
    jp_kana: "大昔　海に　すんでいた\n古代ポケモンの　カセキ。\n背中の一部　らしい。"
    jp_kanji: "大昔　海に　すんでいた\n古代ポケモンの　カセキ。\n背中の一部　らしい。"
    en: "A fossil from a prehistoric Pokémon that once lived\nin the sea. It appears as though it could be part of a\ncreature’s back."
    fr: "Le fossile d’un ancien Pokémon aquatique.\nIl semble que ce soit une partie de son dos."
    it: "Fossile di un Pokémon preistorico che viveva\nnel mare. Sembra essere parte del suo dorso."
    de: "Das Fossil eines urzeitlichen Pokémon, das in der Tiefsee\nlebte. Es sieht wie ein Teil eines Rückens aus."
    es: "Fósil de un Pokémon prehistórico que vivía en el fondo\ndel mar. Parece ser un fragmento de caparazón."
    ko: "오랜 옛날 바다에 살았던\n고대 포켓몬의 화석.\n등의 일부인 듯하다."
    zh_simp: "很久以前栖息在海里的\n古代宝可梦的化石。\n好像是后背的一部分。"
    zh_trad: "很久以前棲息在海裡的\n古代寶可夢的化石。\n好像是後背的一部分。"
covert_cloak:
  names:
    jp_kana: おんみつマント
    jp_kanji: おんみつマント
    en: Covert Cloak
    fr: Cape Obscure
    it: Anonimanto
    de: Tarnumhang
    es: Capa Furtiva
    ko: 은밀망토
    zh_simp: 密探斗篷
    zh_trad: 密探斗篷
  descriptions:
    jp_kana: "敵の目を　あざむく　フード付き　マント。\n持たせると　体を　包み隠し\n技の　追加効果を　受けなくなる。"
    jp_kanji: "敵の目を　あざむく　フード付き　マント。\n持たせると　体を　包み隠し\n技の　追加効果を　受けなくなる。"
    en: "An item to be held by a Pokémon. This hooded cloak\nconceals the holder, tricking the eyes of its enemies\nand protecting it from the additional effects of moves."
    fr: "Objet à tenir. Une cape à capuchon qui dissimule\nle porteur aux yeux de ses adversaires et le protège\ndes effets additionnels des capacités."
    it: "Strumento da dare a un Pokémon. Manto con cappuccio\nche nasconde chi lo indossa, proteggendolo dagli effetti\naggiuntivi delle mosse subite."
    de: "Ein Item zum Tragen. Dieser Kapuzenumhang verbirgt\nden Träger trickreich vor den Augen seiner Angreifer\nund schützt ihn so vor Zusatzeffekten ihrer Attacken."
    es: "Capa con capucha que engaña al rival. Oculta a quien\nla lleve y lo protege de los efectos secundarios de los\nmovimientos de sus rivales."
    ko: "상대의 눈을 속이는 후드 달린 망토.\n지니게 하면 몸을 숨겨서\n기술의 추가 효과를 받지 않게 된다."
    zh_simp: "能骗过敌人眼睛的带帽披风。\n携带后，能够隐藏身体，\n变得不会受到招式的追加效果影响。"
    zh_trad: "能瞞過敵人視線的連帽斗篷。\n攜帶後，自己的身體會被包覆並隱藏，\n而不受到招式的追加效果影響。"
crabrawler_shell:
  names:
    jp_kana: マケンカニのから
    jp_kanji: マケンカニのから
    en: Crabrawler Shell
    fr: Carapace de Crabagarre
    it: Carapace di Crabrawler
    de: Krabbox-Schale
    es: Cáscara de Crabrawler
    ko: 오기지게의껍데기
    zh_simp: 好胜蟹的壳
    zh_trad: 好勝蟹的殼
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
cracked_pot:
  names:
    jp_kana: われたポット
    jp_kanji: われたポット
    en: Cracked Pot
    fr: Théière Fêlée
    it: Teiera rotta
    de: Rissige Kanne
    es: Tetera Agrietada
    ko: 깨진포트
    zh_simp: 破裂的茶壶
    zh_trad: 破裂的茶壺
  descriptions:
    jp_kana: "ある特定の　ポケモンを\n進化させる　不思議なポット。\n割れているが　お茶は　おいしくなる。"
    jp_kanji: "ある特定の　ポケモンを\n進化させる　不思議なポット。\n割れているが　お茶は　おいしくなる。"
    en: "A peculiar teapot that can make a certain species of\nPokémon evolve. It may be cracked, but tea poured\nfrom it is delicious."
    fr: "Un récipient mystérieux pouvant faire évoluer un certain\nPokémon. Il est abîmé, mais on y fait du bon thé."
    it: "Teiera particolare che fa evolvere determinate\nspecie di Pokémon. È rotta, ma il tè che contiene\nè davvero ottimo."
    de: "Diese sonderbare Kanne löst bei einem bestimmten\nPokémon die Entwicklung aus. Sie weist zwar Risse auf,\naber das wirkt sich nicht negativ auf den Tee aus."
    es: "Curiosa tetera que hace evolucionar a una determinada\nespecie de Pokémon. Pese a estar agrietada, sirve un té\nexquisito."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 포트.\n깨졌지만 차는 맛있어진다."
    zh_simp: "这个神奇的茶壶\n可以使特定的宝可梦进化。\n虽然有破损，但泡出来的茶依旧清香。"
    zh_trad: "可以讓特定的寶可夢\n進化的神奇茶壺。\n雖然有裂痕，但茶會變得美味。"
crafting_kit:
  names:
    jp_kana: クラフトキット
    jp_kanji: クラフトキット
    en: Crafting Kit
    fr: Boîte à Outils
    it: Kit faidaté
    de: Handwerkskiste
    es: Kit de Artesanía
    ko: 공작키트
    zh_simp: 工艺套组
    zh_trad: 工藝套組
  descriptions:
    jp_kana: "クラフト台がない場所でも\nクラフトを可能にする道具がそろったセット。\nただし使えるのはポーチの中の材料だけ。"
    jp_kanji: "クラフト台がない場所でも\nクラフトを可能にする道具がそろったセット。\nただし使えるのはポーチの中の材料だけ。"
    en: "A kit containing everything you might need for crafting,\neven when there is no workbench around. However, you\ncan only use the materials you have in your satchel."
    fr: "Une boîte contenant tous les outils nécessaires pour\nconfectionner des objets même sans établi. Toutefois,\nelle ne permet d’utiliser que les ressources de la Sacoche."
    it: "Set di attrezzi che permette di creare strumenti anche\nin assenza di un banco per il faidaté. È possibile\nadoperare solo i materiali contenuti nel Borsello."
    de: "Mit diesem Werkzeugsatz kannst du Items auch an Orten\nherstellen, an denen es keine Werkbank gibt. Dies geht\naber nur mit Materialien aus deiner Tasche."
    es: "Kit que contiene los instrumentos necesarios para crear\nobjetos aun sin una mesa de trabajo a mano. Tan solo\npodrás usar los materiales que tengas en el Zurrón."
    ko: "공작대가 없는 곳에서도\n공작을 할 수 있는 도구가 갖춰져 있는 세트.\n단, 파우치 안의 재료만 사용할 수 있다."
    zh_simp: "在没有工艺制作台的地方\n也能进行工艺制作的工具组合。\n但仅限使用腰包中的材料。"
    zh_trad: "在沒有工藝製作台的地方\n也能進行工藝製作的工具組合。\n但僅限使用腰包中的材料。"
cramorant_down:
  names:
    jp_kana: ウッウのうもう
    jp_kanji: ウッウのうもう
