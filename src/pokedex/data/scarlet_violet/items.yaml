    jp_kana: ＤＳプレイヤー
    jp_kanji: ＤＳプレイヤー
    en: DS Sounds
    fr: Lecteur DS
    it: Lettore DS
    de: DS-Player
    es: Reproductor DS
    ko: DS플레이어
    zh_simp: ＤＳ播放器
    zh_trad: ＤＳ播放器
  descriptions:
    jp_kana: "懐かしい　曲が　聞ける\n音楽　プレイヤー。\nスイッチ　一つで　切り替えられる。"
    jp_kanji: "懐かしい　曲が　聞ける\n音楽　プレイヤー。\nスイッチ　一つで　切り替えられる。"
    en: "A music player that allows you to listen to nostalgic\nsongs. It’s operated with the flip of a single switch."
    fr: "Un lecteur de musique qui permet de se plonger\ndans une atmosphère rétro. Une pression suffit\npour changer de mode."
    it: "Lettore di musica che permette di immergersi\nin atmosfere rétro. Funziona con un solo tasto."
    de: "Ein Abspielgerät, das Musik aus einer längst\nvergangenen Zeit spielt. Lässt sich durch simplen\nKnopfdruck bedienen."
    es: "Reproductor con el que se pueden escuchar aquellas\ncanciones tan nostálgicas. Se cambia de canción con\nun solo botón."
    ko: "그리운 곡을 들을 수 있는\n음악 플레이어.\n스위치 하나로 전환할 수 있다."
    zh_simp: "可以听到怀旧歌曲的音乐播放器。\n可用一个开关切换歌曲。"
    zh_trad: "可以聽到懷舊歌曲的\n音樂播放機。\n可一鍵切換歌曲。"
