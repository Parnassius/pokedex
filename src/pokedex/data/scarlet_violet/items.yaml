shinx_fang:
  names:
    jp_kana: コリンクのキバ
    jp_kanji: コリンクのキバ
    en: Shinx Fang
    fr: Croc de Lixy
    it: Zanna di Shinx
    de: Sheinux-Zahn
    es: Colmillo de Shinx
    ko: 꼬링크의이빨
    zh_simp: 小猫怪的牙
    zh_trad: 小貓怪的牙
  descriptions:
