    es: "Reduce la Velocidad en combate, pero permite que\nel Ataque de base aumente más rápidamente. Debe\nllevarlo un Pokémon."
    ko: "지니게 하면 배틀 중 스피드가 떨어지지만\n여느 때보다 포켓몬의 공격을\n올리면서 키우기가 쉽다."
