    de: Sumpexnit
    es: Swampertita
    ko: 대짱이나이트
    zh_simp: 巨沼怪进化石
    zh_trad: 巨沼怪進化石
  descriptions:
    jp_kana: "ラグラージに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    jp_kanji: "ラグラージに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Swampert hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Laggron, elle lui permet de méga-évoluer\ndurant un combat."
    it: "Una delle misteriose Megapietre. Data a Swampert,\ngli permette di megaevolversi durante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Sumpex getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Swampert en combate."
    ko: "대짱이에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让巨沼怪携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓巨沼怪攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
swap_snack:
  names:
    jp_kana: あべこべやき
    jp_kanji: あべこべやき
    en: Swap Snack
    fr: En-cas Contraire
    it: Invertigratin
    de: Umkehrbratling
    es: Bocadito Inversión
    ko: 뒤바뀜구이
    zh_simp: 颠倒烧
    zh_trad: 顛倒燒
  descriptions:
    jp_kana: "使うとポケモンの攻めの力と守りの力が\n一時的に入れ替わる不思議な食べ物。"
    jp_kanji: "使うとポケモンの攻めの力と守りの力が\n一時的に入れ替わる不思議な食べ物。"
    en: "When eaten, this curious snack temporarily swaps a\nPokémon’s offensive stats with its defensive stats."
    fr: "Ce curieux en-cas permet d’inverser temporairement\nla puissance offensive et la puissance défensive\nd’un Pokémon."
    it: "Speciale pietanza che scambia temporaneamente\nla forza offensiva e la forza difensiva del Pokémon."
    de: "Diese mysteriöse Speise bewirkt, dass die Offensivkraft\nund die Defensivkraft eines Pokémon vorübergehend\nausgetauscht werden."
    es: "Misterioso refrigerio que invierte temporalmente los\nvalores ofensivos y los defensivos del Pokémon."
    ko: "사용하면 포켓몬의 공격력과 방어력이\n일시적으로 뒤바뀌는 신비한 먹거리."
    zh_simp: "不可思议的食物。\n使用后可让宝可梦的\n进攻力和防守力暂时互换。"
    zh_trad: "不可思議的食物。\n使用後可讓寶可夢的\n進攻力和防守力暫時互換。"
swap_snack:recipe:
  names:
    jp_kana: あべこべやき
    jp_kanji: あべこべやき
    en: Swap Snack
    fr: En-cas Contraire
    it: Invertigratin
    de: Umkehrbratling
    es: Bocadito Inversión
    ko: 뒤바뀜구이
    zh_simp: 颠倒烧
    zh_trad: 顛倒燒
  descriptions:
    jp_kana: "あべこべやきのレシピ。　材料は\nスイートトリュフ×１　ケムリイモ×１\nもちもちキノコ×１　ポフのみ×１"
    jp_kanji: "あべこべやきのレシピ。　材料は\nスイートトリュフ×１　ケムリイモ×１\nもちもちキノコ×１　ポフのみ×１"
    en: "A recipe for crafting Swap Snacks from scratch.\nRequired materials: 1 Candy Truffle, 1 Sootfoot Root,\n1 Springy Mushroom, and 1 Hopo Berry."
    fr: "Méthode pour En-cas Contraire. Ressources requises :\n1 Truffe Sucrée, 1 Rutabagaz, 1 Champi Toumou\net 1 Baie Bouhlon."
    it: "Ricetta per un Invertigratin. Richiede 1 Tartufo dolce,\n1 Patata fumosa, 1 Fungo gommoso e 1 Baccaluppo."
    de: "Die Anleitung zur Herstellung eines Umkehrbratlings.\nBenötigte Materialien: 1 Süßtrüffel, 1 Rauchknolle,\n1 Zähpilz und 1 Pfohbeere."
    es: "Receta para crear Bocaditos Inversión. Materiales:\n1 Trufa Dulce, 1 Fumibulbo, 1 Seta Esponjosa y\n1 Baya Lupu."
    ko: "뒤바뀜구이의 레시피.\n재료: 스위트러플×1 연기토란×1\n쫄깃쫄깃버섯×1 포흐열매×1"
    zh_simp: "颠倒烧的材料单。材料是：\n甜松露×１　烟芋×１\n糯糯菇×１　花啤果×１"
    zh_trad: "顛倒燒的材料單。材料是：\n甜松露×１　煙芋×１\n糯糯菇×１　花啤果×１"
sweet_apple:
  names:
    jp_kana: あまーいりんご
    jp_kanji: あまーいりんご
    en: Sweet Apple
    fr: Pomme Sucrée
    it: Dolcepomo
    de: Süßer Apfel
    es: Manzana Dulce
    ko: 달콤한사과
    zh_simp: 甜甜苹果
    zh_trad: 甜甜蘋果
  descriptions:
    jp_kana: "ある特定の　ポケモンを\n進化させる　不思議なりんご。\nとにかく　甘い。"
    jp_kanji: "ある特定の　ポケモンを\n進化させる　不思議なりんご。\nとにかく　甘い。"
    en: "A peculiar apple that can make a certain species of\nPokémon evolve. It’s exceptionally sweet."
    fr: "Une pomme mystérieuse très sucrée qui permet\nde faire évoluer un certain Pokémon."
    it: "Mela particolare e dal sapore molto dolce che\nfa evolvere determinate specie di Pokémon."
    de: "Dieser sonderbare Apfel löst bei einem bestimmten\nPokémon die Entwicklung aus. Er schmeckt sehr süß."
    es: "Curiosa manzana, de sabor particularmente dulce,\nque hace evolucionar a una determinada especie de\nPokémon."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 사과.\n엄청나게 달다."
    zh_simp: "这种神奇的苹果\n可以使特定的宝可梦进化。\n吃起来非常甜美。"
    zh_trad: "能讓特定寶可夢\n進化的神奇蘋果。\n非常甜。"
sweet_heart:
  names:
    jp_kana: ハートスイーツ
    jp_kanji: ハートスイーツ
    en: Sweet Heart
    fr: Chococœur
    it: Dolcecuore
    de: Herzkonfekt
    es: Corazón Dulce
    ko: 하트스위트
    zh_simp: 心形甜点
    zh_trad: 心形甜點
  descriptions:
    jp_kana: "とても甘ったるい　チョコレート。\nポケモン　１匹の　ＨＰを\n２０だけ　回復する。"
    jp_kanji: "とても甘ったるい　チョコレート。\nポケモン　１匹の　ＨＰを\n２０だけ　回復する。"
    en: "A piece of cloyingly sweet chocolate. It can be used to\nrestore 20 HP to a Pokémon."
    fr: "Un chocolat extrêmement sucré.\nRestaure 20 PV d’un Pokémon."
    it: "Cioccolato molto dolce. Restituisce 20 PS\na un Pokémon."
    de: "Ein süßer Schokosnack, der die KP eines Pokémon um\n20 Punkte auffüllt."
    es: "Chocolatina de sabor dulce. Restaura 20 PS de un\nPokémon."
    ko: "지나칠 정도로 달콤한 초콜릿.\n포켓몬 1마리의 HP를\n20만큼 회복한다."
    zh_simp: "非常甜腻的巧克力。\n能让１只宝可梦\n回复２０ＨＰ。"
    zh_trad: "非常甜膩的巧克力。\n能讓１隻寶可夢\n回復２０ＨＰ。"
sweet_herba_mystica:
  names:
    jp_kana: ひでん：あまスパイス
    jp_kanji: ひでん：あまスパイス
    en: Sweet Herba Mystica
    fr: Épice Secrète Sucrée
    it: Spezia nascosta dolce
    de: Süßes Geheimgewürz
    es: Especia Oculta Dulce
    ko: 비전 달콤스파이스
    zh_simp: 秘传：甜味料
    zh_trad: 秘傳：甜味料
  descriptions:
    jp_kana: "文献でのみ　伝わる　幻の調味料。\nその甘みを　口にすると　胃が活性化し\n食欲不振が　完治するという　逸話がある。"
    jp_kanji: "文献でのみ　伝わる　幻の調味料。\nその甘みを　口にすると　胃が活性化し\n食欲不振が　完治するという　逸話がある。"
    en: "A legendary condiment told of only in books. Word has\nit that one taste of its sweet flavor stimulates the\ndigestive system and cures a lack of appetite."
    fr: "Un condiment dont seules les fables conservent la trace.\nSa douceur est telle qu’une pincée suffit pour stimuler la\ndigestion et soigner le manque d’appétit le plus tenace."
    it: "Un condimento leggendario di cui si narra solo nei libri.\nSembra che la sua dolcezza stimoli lo stomaco e curi\nla mancanza di appetito."
    de: "Ein mystisches Würzmittel, das nur aus alten Texten\nbekannt ist. Sein süßer Geschmack soll angeblich die\nVerdauung anregen und so Appetitlosigkeit kurieren."
    es: "Un misterioso condimento legendario del que solo\nse habla en libros. Su dulzor estimula el sistema\ndigestivo y devuelve el apetito a cualquiera."
    ko: "문헌으로만 전해 내려오는 환상의 조미료.\n그 단맛을 한번 맛보면 위가 활성화되어\n식욕 부진이 완치된다는 이야기가 있다."
    zh_simp: "仅出现在文献中的奇幻调味料。\n更有称品尝过其甜味之后胃被激活，\n食欲不振得到根治的轶事。"
    zh_trad: "僅在文獻中流傳的幻之調味料。\n根據某段軼聞，有人嚐其甘甜之後，\n腸胃開始活化，食慾不振的困擾也迎刃而解。"
swift_feather:
  names:
    jp_kana: しゅんぱつのハネ
    jp_kanji: しゅんぱつのハネ
    en: Swift Feather
    fr: Plume Sprint
    it: Piumreazione
    de: Flinkfeder
    es: Pluma Ímpetu
    ko: 순발력깃털
    zh_simp: 瞬发之羽
    zh_trad: 瞬發之羽
  descriptions:
    jp_kana: "ポケモンに　使う　道具。\nポケモン　１匹の　素早さの\n基礎ポイントを　ちょっと　あげる。"
    jp_kanji: "ポケモンに　使う　道具。\nポケモン　１匹の　素早さの\n基礎ポイントを　ちょっと　あげる。"
    en: "An item to be used on a Pokémon. This feather slightly\nincreases base points for a Pokémon’s Speed stat."
    fr: "Objet à utiliser sur un Pokémon pour augmenter\nlégèrement sa Vitesse de base."
    it: "Strumento da usare su un Pokémon. Ne aumenta di poco\ni punti base della Velocità."
    de: "Wendet man dieses Item auf ein Pokémon an, werden\ndessen Initiative-Basispunkte dauerhaft ein wenig erhöht."
    es: "Pluma que aumenta un poco la Velocidad de base de un\nPokémon."
    ko: "포켓몬에게 사용하는 도구.\n포켓몬 1마리의 스피드\n기초 포인트를 조금 올린다."
    zh_simp: "用于宝可梦的道具。\n能稍微提高１只宝可梦的\n速度的基础点数。"
    zh_trad: "用於寶可夢的道具。\n能稍微提高１隻寶可夢的\n速度的基礎點數。"
swift_mochi:
  names:
    jp_kana: しゅんぱつのもち
    jp_kanji: しゅんぱつのもち
    en: Swift Mochi
    fr: Mochi Sprint
    it: Mochi della reazione
    de: Flink-Mochi
    es: Mochi Ímpetu
    ko: 순발력떡
    zh_simp: 瞬发粘糕
    zh_trad: 瞬發糬
  descriptions:
    jp_kana: "きのみが　ねりこまれた　もち。\nポケモン　１匹の　素早さの\n基礎ポイントを　あげる。"
    jp_kanji: "きのみが　ねりこまれた　もち。\nポケモン　１匹の　素早さの\n基礎ポイントを　あげる。"
    en: "A mochi cake with Berries kneaded into its dough.\nIt increases base points for a Pokémon’s Speed stat."
    fr: "Un mochi contenant des Baies qui augmente\nla Vitesse de base d’un Pokémon."
    it: "Mochi preparato con un impasto a base di bacche.\nAumenta i punti base della Velocità."
    de: "Ein mit Beeren gefüllter Mochi, der die Initiative-\nBasispunkte eines Pokémon dauerhaft erhöht."
    es: "La masa de este mochi está preparada con bayas.\nAumenta la Velocidad de base de un Pokémon."
    ko: "으깬 나무열매가 들어 있는 떡.\n포켓몬 1마리의 스피드\n기초 포인트를 올린다."
    zh_simp: "糅合树果的粘糕。\n能提高１只宝可梦的\n速度的基础点数。"
    zh_trad: "加入樹果揉製而成的麻糬。\n能提高１隻寶可夢的\n速度的基礎點數。"
swinub_hair:
  names:
    jp_kana: ウリムーのけ
    jp_kanji: ウリムーのけ
    en: Swinub Hair
    fr: Poils de Marcacrin
    it: Pelo di Swinub
    de: Quiekel-Haar
    es: Pelo de Swinub
    ko: 꾸꾸리의털
    zh_simp: 小山猪的毛
    zh_trad: 小山豬的毛
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
swordcap:
  names:
    jp_kana: ツルギマイタケ
    jp_kanji: ツルギマイタケ
    en: Swordcap
    fr: Fortichampi
    it: Danzaspaditola
    de: Schwertling
    es: Seta Espada
    ko: 칼춤버섯
    zh_simp: 剑舞菇
    zh_trad: 劍舞菇
  descriptions:
    jp_kana: "食べると筋肉がふくらみ\n強くなるキノコ。\nせめのがんやくの材料となる。"
    jp_kanji: "食べると筋肉がふくらみ\n強くなるキノコ。\nせめのがんやくの材料となる。"
    en: "Mushrooms that, when consumed, cause the muscles\nto swell. They imbue the eater with strength and are\none of the materials needed for crafting Aux Powers."
    fr: "Ce champignon fait gonfler les muscles de celui qui\nl’ingère et le rend ainsi plus fort. Ressource requise\npour la confection d’une fiole d’Offensive Extra."
    it: "Fungo utilizzato nella preparazione di Offensive extra.\nSe mangiato, gonfia i muscoli e rende più forti."
    de: "Dieser Pilz wird zur Herstellung von Offensivvitaminen\ngenutzt. Sein Verzehr lässt die Muskeln anschwellen\nund macht so stärker."
    es: "Seta que, al ser ingerida, aumenta la musculatura y\nproporciona más fuerza. Es un ingrediente vital de la\nGragea Ofensiva."
    ko: "먹으면 근육이 팽창하여\n힘이 세지는 버섯.\n공격의환약의 재료가 된다."
    zh_simp: "食用后会让肌肉膨胀，\n发挥更强力量的菇类。\n可作为进攻药丸的材料。"
    zh_trad: "食用後會讓肌肉膨脹，\n發揮更強力量的菇類。\n可作為進攻藥丸的材料。"
synchro_machine:
  names:
    jp_kana: シンクロマシン
    jp_kanji: シンクロマシン
    en: Synchro Machine
    fr: Synchrotron
    it: Sincronizzatore
    de: Synchromaschine
    es: Sincromisor
    ko: 싱크로머신
    zh_simp: 同步器
    zh_trad: 同步器
  descriptions:
    jp_kana: "ポケモンと　気持ちを　シンクロさせ\nポケモンに　いろいろ　してもらえる　装置。\n試作品なので　見た目は　シンプル。"
    jp_kanji: "ポケモンと　気持ちを　シンクロさせ\nポケモンに　いろいろ　してもらえる　装置。\n試作品なので　見た目は　シンプル。"
    en: "A device that synchronizes your mind and feelings\nwith your Pokémon’s so that you can work as one.\nIt’s still a prototype—hence its unrefined appearance."
    fr: "Un appareil permettant de synchroniser ses pensées\navec un Pokémon et de le guider dans ses mouvements.\nCe prototype a une apparence encore rudimentaire."
    it: "Dispositivo che permette di sincronizzare i propri\npensieri con quelli dei Pokémon e dare loro varie\nistruzioni. Essendo un prototipo, ha un design minimale."
    de: "Ein Gerät, das deine Gefühle mit denen deines Pokémon\nsynchronisiert, damit du ihm direkte Anweisungen geben\nkannst. Dieser Prototyp sieht noch etwas unfertig aus."
    es: "Dispositivo que permite sincronizar los pensamientos del\nusuario con los de sus Pokémon para hacer que sigan sus\ninstrucciones. Como es un prototipo, el diseño es simple."
    ko: "포켓몬과 마음을 싱크로해서\n포켓몬에게 다양한 일을 시킬 수 있는 장치.\n시제품이라 외형은 심플하다."
    zh_simp: "能够和宝可梦的情感同步，\n让宝可梦帮忙做各种事情的装置。\n由于是试制品，所以外观很简约。"
    zh_trad: "能與寶可夢的情感同步，\n讓寶可夢幫忙做各種事情的裝置。\n由於是試製品，外觀十分樸素。"
syrupy_apple:
  names:
    jp_kana: みついりりんご
    jp_kanji: みついりりんご
    en: Syrupy Apple
    fr: Pomme Nectar
    it: Sciroppomo
    de: Saftiger Apfel
    es: Manzana Melosa
    ko: 꿀맛사과
    zh_simp: 蜜汁苹果
    zh_trad: 蜜汁蘋果
  descriptions:
    jp_kana: "ある特定の　ポケモンを\n進化させる　不思議なりんご。\nとにかく　蜜入り。"
    jp_kanji: "ある特定の　ポケモンを\n進化させる　不思議なりんご。\nとにかく　蜜入り。"
    en: "A peculiar apple that can make a certain species of\nPokémon evolve. It’s exceptionally syrupy."
    fr: "Une pomme mystérieuse pleine de nectar qui permet\nde faire évoluer une certaine espèce de Pokémon."
    it: "Mela particolare, ricca di una sostanza simile a sciroppo,\nche fa evolvere determinate specie di Pokémon."
    de: "Dieser sonderbare Apfel löst bei einem bestimmten\nPokémon die Entwicklung aus. Er ist sehr saftig."
    es: "Curiosa manzana, de sabor particularmente meloso,\nque hace evolucionar a una determinada especie de\nPokémon."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 사과.\n엄청나게 꿀맛이다."
    zh_simp: "这种神奇的苹果\n可以使特定的宝可梦进化。\n富含蜜汁。"
    zh_trad: "能讓特定寶可夢\n進化的神奇蘋果。\n富含蜜汁。"
tadbulb_mucus:
  names:
    jp_kana: ズピカのねんえき
    jp_kanji: ズピカのねんえき
    en: Tadbulb Mucus
    fr: Mucus de Têtampoule
    it: Muco di Tadbulb
    de: Blipp-Schleim
    es: Secreción de Tadbulb
    ko: 빈나두의점액
    zh_simp: 光蚪仔的黏液
    zh_trad: 光蚪仔的黏液
  descriptions:
