    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
malicious_armor:
  names:
    jp_kana: ノロイノヨロイ
    jp_kanji: ノロイノヨロイ
    en: Malicious Armor
    fr: Armure de la Rancune
    it: Armatura infausta
    de: Fluchrüstung
    es: Armadura Maldita
    ko: 저주받은갑옷
    zh_simp: 咒术之铠
    zh_trad: 詛咒之鎧
  descriptions:
    jp_kana: "ある特定の　ポケモンを\n進化させる　不思議なヨロイ。\n呪いの感情が　秘められている。"
    jp_kanji: "ある特定の　ポケモンを\n進化させる　不思議なヨロイ。\n呪いの感情が　秘められている。"
    en: "A peculiar set of armor that can make a certain species\nof Pokémon evolve. Malicious will lurks within it."
    fr: "Une armure mystérieuse pouvant faire évoluer un certain\nPokémon. Une grande rancune y est enfermée."
    it: "Armatura particolare che fa evolvere determinate specie\ndi Pokémon. Alberga dentro di sé sentimenti infausti."
    de: "Diese sonderbare Rüstung löst bei einem bestimmten\nPokémon die Entwicklung aus. Sie ist von einem\nverfluchten Willen beseelt."
    es: "Curiosa armadura que hace evolucionar a una\ndeterminada especie de Pokémon. En su interior\nalberga sentimientos de rencor."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 갑옷.\n저주의 감정이 담겨 있다."
    zh_simp: "能让某些特定宝可梦\n进化的神奇铠甲。\n蕴含着诅咒的感情。"
    zh_trad: "能讓特定寶可夢\n進化的神奇鎧甲。\n秘藏著詛咒的情感。"
manectite:
  names:
    jp_kana: ライボルトナイト
    jp_kanji: ライボルトナイト
    en: Manectite
    fr: Élecsprintite
    it: Manectricite
    de: Voltensonit
    es: Manectricita
    ko: 썬더볼트나이트
    zh_simp: 雷电兽进化石
    zh_trad: 雷電獸進化石
  descriptions:
    jp_kana: "ライボルトに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    jp_kanji: "ライボルトに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Manectric hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Élecsprint, elle lui permet de\nméga-évoluer durant un combat."
    it: "Una delle misteriose Megapietre. Data a Manectric,\ngli permette di megaevolversi durante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Voltenso getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Manectric en combate."
    ko: "썬더볼트에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让雷电兽携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓雷電獸攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
mankey_candy:
  names:
    jp_kana: マンキーのアメ
    jp_kanji: マンキーのアメ
    en: Mankey Candy
    fr: Bonbon Férosinge
    it: Caramella Mankey
    de: Menki-Bonbon
    es: Caramelo Mankey
    ko: 망키의사탕
    zh_simp: 猴怪的糖果
    zh_trad: 猴怪的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
mankey_fur:
  names:
    jp_kana: マンキーのけ
    jp_kanji: マンキーのけ
    en: Mankey Fur
    fr: Poils de Férosinge
    it: Pelo di Mankey
    de: Menki-Haar
    es: Pelo de Mankey
    ko: 망키의털
    zh_simp: 猴怪的毛
    zh_trad: 猴怪的毛
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
maranga_berry:
  names:
    jp_kana: タラプのみ
    jp_kanji: タラプのみ
    en: Maranga Berry
    fr: Baie Rangma
    it: Baccapane
    de: Tarabeere
    es: Baya Maranga
    ko: 타라프열매
    zh_simp: 香罗果
    zh_trad: 香羅果
  descriptions:
    jp_kana: "ポケモンに　持たせると\n特殊技を　受けたとき\n自分の　特防が　あがる。"
    jp_kanji: "ポケモンに　持たせると\n特殊技を　受けたとき\n自分の　特防が　あがる。"
    en: "If a Pokémon holding this Berry is hit with a special\nmove, the holder’s Sp. Def stat will be boosted."
    fr: "Tenue, cette Baie augmente la Défense Spéciale\ndu Pokémon lorsqu’il est touché par une capacité\nspéciale."
    it: "Se un Pokémon ha questa bacca, aumenta la propria\nDifesa Speciale quando subisce una mossa speciale."
    de: "Als getragenes Item erhöht diese Beere die\nSpezial-Verteidigung des Pokémon, wenn dieses\nvon einer Spezial-Attacke getroffen wird."
    es: "Si la lleva un Pokémon, aumenta su Defensa Especial\ntras recibir un ataque especial."
    ko: "포켓몬에게 지니게 하면\n특수 기술로 공격받았을 때\n자신의 특수방어가 올라간다."
    zh_simp: "让宝可梦携带后，\n在受到特殊招式攻击时，\n自己的特防就会提高。"
    zh_trad: "讓寶可夢攜帶後，\n在受到特殊招式攻擊時，\n自己的特防就會提高。"
marble:
  names:
    jp_kana: ビーだま
    jp_kanji: ビーだま
    en: Marble
    fr: Bille
    it: Biglia
    de: Glasmurmel
    es: Canica
    ko: 유리구슬
    zh_simp: 弹珠
    zh_trad: 彈珠
  descriptions:
    jp_kana: "まんまるの　ガラス玉。\n透明な　玉の中に\n色ガラスの模様が　見える。"
    jp_kanji: "まんまるの　ガラス玉。\n透明な　玉の中に\n色ガラスの模様が　見える。"
    en: "A round glass marble. You can see colored glass\ninside the transparent marble."
    fr: "Une bille de verre transparente avec un motif coloré\nà l’intérieur."
    it: "Una biglia di vetro perfettamente rotonda. Al suo\ninterno si vede in trasparenza del vetro colorato."
    de: "Eine runde, durchsichtige Kugel aus Glas. In ihrer Mitte\nbefinden sich Muster in verschiedensten Farben."
    es: "Esfera de cristal transparente en cuyo interior se\npueden apreciar diferentes colores."
    ko: "동글동글한 유리구슬.\n투명한 구슬 안에\n색유리의 무늬가 비친다."
    zh_simp: "非常圆润的玻璃球。\n能在透明的球体中\n看见彩色玻璃的花纹。"
    zh_trad: "圓滾滾的玻璃彈珠。\n在透明的彈珠中\n能看見彩色玻璃的花紋。"
mareanie_spike:
  names:
    jp_kana: ヒドイデのトゲ
    jp_kanji: ヒドイデのトゲ
    en: Mareanie Spike
    fr: Épine de Vorastérie
    it: Aculeo di Mareanie
    de: Garstella-Stachel
    es: Aguijón de Mareanie
    ko: 시마사리의가시
    zh_simp: 好坏星的刺
    zh_trad: 好壞星的刺
  descriptions:
