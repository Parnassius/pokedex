    it: "Uno spuntino fatto con gli ingredienti preferiti\ndal Pokémon leggendario Solgaleo."
    de: "Dieser Snack wurde mit den Lieblingszutaten des\nLegendären Pokémon Solgaleo zubereitet."
    es: "Galleta preparada con los ingredientes favoritos\ndel Pokémon legendario Solgaleo."
    ko: "전설의 포켓몬 솔가레오가\n좋아하는 식재료로 만들어진 간식."
    zh_simp: "用传说的宝可梦索尔迦雷欧\n喜欢的食材制作的点心。"
    zh_trad: "用傳說的寶可夢索爾迦雷歐\n喜愛的食材製成的點心。"
solganium_z:bag:
  names:
    jp_kana: ソルガレオＺ
    jp_kanji: ソルガレオＺ
    en: Solganium Z
    fr: Solgazélite
    it: Solgaleium Z
    de: Solgalium Z
    es: Solgaleostal Z
    ko: 솔가레오Z
    zh_simp: 索尔迦雷欧Ｚ
    zh_trad: 索爾迦雷歐Ｚ
  descriptions:
    jp_kana: "ソルガレオの　メテオドライブを\nＺワザに　グレードアップする\nＺパワーの　結晶を　つくりだす。"
    jp_kanji: "ソルガレオの　メテオドライブを\nＺワザに　グレードアップする\nＺパワーの　結晶を　つくりだす。"
    en: "It converts Z-Power into crystals that upgrade\nSolgaleo’s Sunsteel Strike to a Z-Move."
    fr: "Permet de concentrer la Force Z en un cristal qui,\ntenu, autorise Solgaleo à transformer son Choc Météore\nen capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono a Solgaleo di trasformare la mossa\nAstrocarica in una mossa Z."
    de: "Kristallisierte Z-Kraft, die Solgaleos Attacke Stahlgestirn\nzu einer Z-Attacke aufstuft. Wird bei Bedarf\nautomatisch vervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a\nSolgaleo convertir su Meteoimpacto en un\nmovimiento Z."
    ko: "솔가레오의 메테오드라이브를\nZ기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将索尔迦雷欧的流星闪冲\n升级成Ｚ招式的Ｚ力量结晶。"
    zh_trad: "可用來製造將\n索爾迦雷歐的流星閃衝\n升級為Ｚ招式的Ｚ力量結晶。"
solganium_z:held:
