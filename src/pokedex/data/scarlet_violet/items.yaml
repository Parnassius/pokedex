    jp_kana: "ある特定の　ポケモンを\n進化させる　不思議なかけじく。\nあくの極意が　書かれている。"
    jp_kanji: "ある特定の　ポケモンを\n進化させる　不思議なかけじく。\nあくの極意が　書かれている。"
    en: "A peculiar scroll that can make a certain species of\nPokémon evolve. Written upon it are the true secrets of\nthe path of darkness."
    fr: "Un rouleau mystérieux pouvant faire évoluer un certain\nPokémon. Tous les secrets de la voie des Ténèbres\ny sont inscrits."
    it: "Rotolo particolare che fa evolvere determinate specie\ndi Pokémon. Vi sono scritti i segreti più nascosti della\ndottrina del Buio."
    de: "Diese sonderbare Schriftrolle löst bei einem bestimmten\nPokémon die Entwicklung aus. Auf ihr stehen die\nverborgenen Geheimnisse der Künste des Unlichts."
    es: "Curioso manuscrito que hace evolucionar a una\ndeterminada especie de Pokémon. En él se revelan\nlos secretos del tipo Siniestro."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 족자.\n악의 오의가 적혀 있다."
    zh_simp: "能让某些特定宝可梦\n进化的神奇挂轴。\n上面写着恶之奥秘。"
    zh_trad: "可以讓特定的寶可夢\n進化的神奇掛軸。\n其中記載著惡之精髓。"
