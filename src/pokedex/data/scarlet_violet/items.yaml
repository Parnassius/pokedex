steel_gem:
  names:
    jp_kana: はがねのジュエル
    jp_kanji: はがねのジュエル
    en: Steel Gem
    fr: Joyau Acier
    it: Bijouacciaio
    de: Stahljuwel
    es: Gema Acero
    ko: 강철주얼
    zh_simp: 钢之宝石
    zh_trad: 鋼之寶石
  descriptions:
    jp_kana: "はがねのタイプの　ジュエル。\n持たせると　１度だけ　はがねの\n技の威力が　強まる。"
    jp_kanji: "はがねのタイプの　ジュエル。\n持たせると　１度だけ　はがねの\n技の威力が　強まる。"
    en: "An item to be held by a Pokémon. This gem is imbued\nwith the essence of steel and will boost the power of a\nSteel-type move—but only once."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Acier."
    it: "Strumento da dare a un Pokémon. Gioiello che potenzia\nuna sola volta le mosse di tipo Acciaio."
    de: "Ein Item zum Tragen. Dieses Juwel verstärkt einmalig\neine Attacke vom Typ Stahl."
    es: "Joya de un solo uso que potencia un movimiento de\ntipo Acero. Debe llevarla un Pokémon."
    ko: "강철타입의 주얼.\n지니게 하면 한 번만 강철\n기술의 위력이 강해진다."
    zh_simp: "钢属性的宝石。\n携带后，钢属性的\n招式威力仅会增强１次。"
    zh_trad: "鋼屬性的寶石。\n攜帶後，鋼屬性招式的\n威力會僅增強１次。"
steel_memory:
  names:
    jp_kana: スチールメモリ
    jp_kanji: スチールメモリ
    en: Steel Memory
    fr: ROM Acier
    it: ROM Acciaio
    de: Stahl-Disc
    es: Disco Acero
    ko: 스틸메모리
    zh_simp: 钢铁存储碟
    zh_trad: 鋼鐵記憶碟
  descriptions:
    jp_kana: "はがねタイプの　データが　入った\nメモリ。　特定のポケモンが　持つと\nタイプが　変わる。"
    jp_kanji: "はがねタイプの　データが　入った\nメモリ。　特定のポケモンが　持つと\nタイプが　変わる。"
    en: "A memory disc that contains Steel-type data.\nIt changes the type of the holder if held by\na certain species of Pokémon."
    fr: "Une carte mémoire contenant des données sur\nle type Acier. Un certain Pokémon peut changer\nde type en l’équipant."
    it: "ROM contenente dati sul tipo Acciaio in formato\ndigitale. Permette a un certo Pokémon di cambiare tipo."
    de: "Eine Disc mit Daten zum Typ Stahl. Sie löst bei einem\nbestimmten Pokémon einen Typenwechsel aus."
    es: "Disco de datos que contiene información relativa al tipo\nAcero. Permite cambiar de tipo a cierto Pokémon."
    ko: "강철타입의 데이터가 들어 있는\n메모리. 특정 포켓몬이\n지니면 타입이 바뀐다."
    zh_simp: "装有钢属性数据的存储碟。\n特定宝可梦携带后，\n属性就会发生变化。"
    zh_trad: "裝有鋼屬性資料的記憶碟。\n特定寶可夢攜帶後，\n就會產生屬性的變化。"
steel_tera_shard:
  names:
    jp_kana: テラピースはがね
    jp_kanji: テラピースはがね
    en: Steel Tera Shard
    fr: Téra-Éclat Acier
    it: Teralite Acciaio
    de: Tera-Stück (Stahl)
    es: Teralito Acero
    ko: 테라피스 강철
    zh_simp: 钢太晶碎块
    zh_trad: 鋼太晶碎塊
  descriptions:
    jp_kana: "テラスタルポケモンが　倒れたとき\n砕けた　テラスタルジュエルが\nまれに　結晶化したもの。"
    jp_kanji: "テラスタルポケモンが　倒れたとき\n砕けた　テラスタルジュエルが\nまれに　結晶化したもの。"
    en: "On rare occasions, these shards form when a Tera\nPokémon falls in battle and its Tera Jewel shatters."
    fr: "Un fragment cristallisé qui se forme rarement lors\nde l’éclatement d’un Joyau Téracristal après qu’un\nPokémon Téracristal a été mis K.O."
    it: "Cristallizzazione che raramente si forma quando\nun Pokémon Teracristal viene sconfitto e la sua gemma\nTeracristal va in frantumi."
    de: "In äußerst seltenen Fällen kristallisieren Bruchstücke\ndes Terakristalls von im Kampf besiegten Terakristall-\nPokémon zu solchen Tera-Stücken."
    es: "Esquirla que se forma muy raramente cuando la joya\nTeracristal de un Pokémon teracristalizado se quiebra\ntras derrotarlo."
    ko: "테라스탈 포켓몬이 쓰러졌을 때\n부서진 테라스탈 주얼이\n드물게 결정화한 조각."
    zh_simp: "打倒太晶宝可梦时，\n破碎掉的太晶宝石有\n极低概率会结晶成此物。"
    zh_trad: "太晶寶可夢倒下時，\n碎裂的太晶寶石在罕見的情況下\n會結晶化，而形成此物。"
steelium_z:bag:
  names:
    jp_kana: ハガネＺ
    jp_kanji: ハガネＺ
    en: Steelium Z
    fr: Métallozélite
    it: Metallium Z
    de: Metallium Z
    es: Metalostal Z
    ko: 강철Z
    zh_simp: 钢Ｚ
    zh_trad: 鋼Ｚ
  descriptions:
    jp_kana: "はがねタイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    jp_kanji: "はがねタイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nSteel-type moves to Steel-type Z-Moves."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise son porteur à transformer ses capacités\nde type Acier en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono ai Pokémon di trasformare le mosse\ndi tipo Acciaio in mosse Z."
    de: "Kristallisierte Z-Kraft, die Stahl-Attacken zu Z-Attacken\naufstuft. Wird bei Bedarf automatisch vervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a los\nportadores convertir sus movimientos de tipo Acero en\nmovimientos Z."
    ko: "강철타입 기술을\nZ기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将钢属性招式升级成\nＺ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把鋼屬性招式\n升級為Ｚ招式的Ｚ力量結晶。"
steelium_z:held:
  names:
    jp_kana: ハガネＺ
    jp_kanji: ハガネＺ
    en: Steelium Z
    fr: Métallozélite
    it: Metallium Z
    de: Metallium Z
    es: Metalostal Z
    ko: 강철Z
    zh_simp: 钢Ｚ
    zh_trad: 鋼Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　結晶。\nはがねタイプの　技を\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nはがねタイプの　技を\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Steel-type moves to Z-Moves."
    fr: "Une cristallisation de la Force Z, permettant\nde transformer les capacités de type Acier\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare le mosse di tipo Acciaio\nin mosse Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft\nStahl-Attacken zu Z-Attacken auf."
    es: "Cristal que confiere el Poder Z a los movimientos\nde tipo Acero."
    ko: "Z파워의 결정.\n강철타입 기술을\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将钢属性的招式\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把鋼屬性的招式\n升級為Ｚ招式。"
steelixite:
  names:
    jp_kana: ハガネールナイト
    jp_kanji: ハガネールナイト
    en: Steelixite
    fr: Steelixite
    it: Steelixite
    de: Stahlosnit
    es: Steelixita
    ko: 강철톤나이트
    zh_simp: 大钢蛇进化石
    zh_trad: 大鋼蛇進化石
  descriptions:
    jp_kana: "ハガネールに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    jp_kanji: "ハガネールに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Steelix hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Steelix, elle lui permet de méga-évoluer\ndurant un combat."
    it: "Una delle misteriose Megapietre. Data a Steelix,\ngli permette di megaevolversi durante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Stahlos getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Steelix en combate."
    ko: "강철톤에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让大钢蛇携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓大鋼蛇攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
stellar_tera_shard:
  names:
    jp_kana: テラピースステラ
    jp_kanji: テラピースステラ
    en: Stellar Tera Shard
    fr: Téra-Éclat Stellaire
    it: Teralite Astrale
    de: Tera-Stück (Stellar)
    es: Teralito Astral
    ko: 테라피스 스텔라
    zh_simp: 星晶太晶碎块
    zh_trad: 星晶太晶碎塊
  descriptions:
    jp_kana: "テラスタルポケモンが　倒れたとき\n砕けた　テラスタルジュエルが\nまれに　結晶化したもの。"
    jp_kanji: "テラスタルポケモンが　倒れたとき\n砕けた　テラスタルジュエルが\nまれに　結晶化したもの。"
    en: "On rare occasions, these shards form when a Tera\nPokémon falls in battle and its Tera Jewel shatters."
    fr: "Un fragment cristallisé qui se forme rarement lors\nde l’éclatement d’un Joyau Téracristal après qu’un\nPokémon Téracristal a été mis K.O."
    it: "Cristallizzazione che raramente si forma quando\nun Pokémon Teracristal viene sconfitto e la sua\ngemma Teracristal va in frantumi."
    de: "In äußerst seltenen Fällen kristallisieren Bruchstücke\ndes Terakristalls von im Kampf besiegten Terakristall-\nPokémon zu solchen Tera-Stücken."
    es: "Esquirla que se forma muy raramente cuando la joya\nTeracristal de un Pokémon teracristalizado se quiebra\ntras derrotarlo."
    ko: "테라스탈 포켓몬이 쓰러졌을 때\n부서진 테라스탈 주얼이\n드물게 결정화한 조각."
    zh_simp: "打倒太晶宝可梦时，\n破碎掉的太晶宝石有\n极低概率会结晶成此物。"
    zh_trad: "太晶寶可夢倒下時，\n碎裂的太晶寶石在罕見的情況下\n會結晶化，而形成此物。"
sticker_bag:
  names:
    jp_kana: シールぶくろ
    jp_kanji: シールぶくろ
    en: Sticker Bag
    fr: Sac Sceaux
    it: Bollosacca
    de: Stickertüte
    es: Bolsa de Sellos
    ko: 실주머니
    zh_simp: 贴纸袋
    zh_trad: 貼紙袋
  descriptions:
    jp_kana: "シールが　１０枚　いれられる\nちっちゃな　ふくろ。"
    jp_kanji: "シールが　１０枚　いれられる\nちっちゃな　ふくろ。"
    en: "A tiny bag that can hold 10 Stickers for decorating\nBall Capsules."
    fr: "Un petit sac pouvant contenir dix sceaux\npour décorer les Poké Balls."
    it: Sacchettino che può contenere dieci bolli.
    de: "Ein kleines Tütchen. Es bietet Platz für bis zu 10 Sticker\nfür die Pokébälle."
    es: "Bolsita con capacidad para diez sellos de los que\ndecoran las Poké Balls."
    ko: "실이 10장 들어가는\n작은 주머니."
    zh_simp: "可以放入１０张\n贴纸的小袋子。"
    zh_trad: "可以放入１０張\n貼紙的小袋子。"
sticker_case:
  names:
    jp_kana: シールいれ
    jp_kanji: シールいれ
    en: Sticker Case
    fr: Boîte à Sceaux
    it: Portabolli
    de: Stickerkoffer
    es: Caja de Sellos
    ko: 실상자
    zh_simp: 贴纸盒
    zh_trad: 貼紙盒
  descriptions:
    jp_kana: "ボールカプセルに　はりつけられる\nシールが　はいった　いれもの。"
    jp_kanji: "ボールカプセルに　はりつけられる\nシールが　はいった　いれもの。"
    en: "A case for storing Stickers that can be applied to\nBall Capsules."
    fr: "Une boîte qui sert à ranger des sceaux à coller\nsur des Capsule Balls."
    it: "Contenitore per conservare i bolli che possono\nessere applicati sulle capsule delle Poké Ball."
    de: "In diesem Koffer kannst du die Sticker für die\nBallkapseln der Pokébälle aufbewahren."
    es: "Caja en la que se pueden guardar los sellos que se\naplican a las cápsulas de las Poké Balls."
    ko: "볼캡슐에 붙일 수 있는\n실이 들어 있는 용기."
    zh_simp: "放有贴在球壳上的\n贴纸的容器。"
    zh_trad: "放有貼在球殼上的\n貼紙的容器。"
sticky_barb:
  names:
    jp_kana: くっつきバリ
    jp_kanji: くっつきバリ
    en: Sticky Barb
    fr: Piquants
    it: Vischiopunta
    de: Klettdorn
    es: Toxiestrella
    ko: 끈적끈적바늘
    zh_simp: 附着针
    zh_trad: 附著針
  descriptions:
    jp_kana: "持たせると　毎ターン　ダメージを\n受ける。　自分に　ふれてきた\n相手に　くっつくことも　ある。"
    jp_kanji: "持たせると　毎ターン　ダメージを\n受ける。　自分に　ふれてきた\n相手に　くっつくことも　ある。"
    en: "An item to be held by a Pokémon. It damages the\nholder every turn and may latch on to Pokémon that\nmake direct contact with the holder."
    fr: "Objet à tenir. Blesse le porteur à chaque tour.\nPeut s’accrocher à un Pokémon qui inflige une\nattaque directe au porteur."
    it: "Strumento che danneggia chi ce l’ha a ogni turno.\nPuò attaccarsi a un Pokémon che entra in contatto\ncon chi ce l’ha a causa di un attacco."
    de: "Ein Item zum Tragen. Schadet dem Träger in jeder\nRunde, kann aber an Angreifern haften bleiben,\ndie ihn berühren."
    es: "Daña en cada turno al Pokémon que la lleva. Puede\nadherirse al Pokémon que ataque al portador con un\nmovimiento de contacto."
    ko: "지니게 하면 매 턴 데미지를 입는다.\n자신에게 접촉해 온 상대에게\n들러붙기도 한다."
    zh_simp: "携带后，每回合都会受到伤害。\n有时也会附着到\n碰到自己的对手身上。"
    zh_trad: "攜帶後，每回合都會受到傷害。\n有時也會附著到\n碰到自己的對手身上。"
sticky_glob:
  names:
    jp_kana: ねばりだま
    jp_kanji: ねばりだま
    en: Sticky Glob
    fr: Boule Gluante
    it: Sfera viscosa
    de: Klebkugel
    es: Bola Pegajosa
    ko: 끈끈환
    zh_simp: 黏丸
    zh_trad: 黏丸
  descriptions:
    jp_kana: "ねばねばする球状の物体。\nポケモンに投げつけると動きが鈍り\n隙がうまれることもある。"
    jp_kanji: "ねばねばする球状の物体。\nポケモンに投げつけると動きが鈍り\n隙がうまれることもある。"
    en: "A ball of some kind of sticky substance. Hitting a\nPokémon with one may stun the Pokémon, creating an\nopening for you to act."
    fr: "Une boule constituée d’une substance gluante.\nLancez-la sur un Pokémon pour ralentir ses mouvements,\nvoire le rendre vulnérable."
    it: "Oggetto sferico fatto di una sostanza appiccicosa. Se\nlanciata contro un Pokémon, ne rallenta i movimenti\ne può fargli abbassare la guardia."
    de: "Wird diese klebrige Kugel auf ein Pokémon geworfen,\nmacht sie es schwerfälliger und schafft so möglicherweise\neine günstige Gelegenheit für dich."
    es: "Bola pringosa y viscosa. Al acertar a un Pokémon con\nella, dificulta sus movimientos y puede dejarlo\nexpuesto."
    ko: "끈적끈적한 구형의 물체.\n포켓몬에게 던지면 움직임이 둔해져서\n빈틈이 생길 때가 있다."
    zh_simp: "黏糊糊的球状物体。\n用它投中宝可梦能使其动作\n变得迟缓，有时还会生出破绽。"
    zh_trad: "黏答答的球狀物體。\n用它投中寶可夢能使其動作\n變得遲緩，有時還會生出破綻。"
sticky_glob:recipe:
  names:
    jp_kana: ねばりだま
    jp_kanji: ねばりだま
    en: Sticky Glob
    fr: Boule Gluante
    it: Sfera viscosa
    de: Klebkugel
    es: Bola Pegajosa
    ko: 끈끈환
    zh_simp: 黏丸
    zh_trad: 黏丸
  descriptions:
    jp_kana: "ねばりだまのレシピ。　材料は\nむしくいぼんぐり×１　どろだんご×１\nタマゼンマイ×１"
    jp_kanji: "ねばりだまのレシピ。　材料は\nむしくいぼんぐり×１　どろだんご×１\nタマゼンマイ×１"
    en: "A recipe for crafting Sticky Globs from scratch.\nRequired materials: 1 Spoiled Apricorn, 1 Ball of Mud,\nand 1 Caster Fern leaf."
    fr: "Méthode pour Boule Gluante. Ressources requises :\n1 Noigrume Rongé, 1 Boule de Boue et 1 Feuille Ronde."
    it: "Ricetta per creare una Sfera viscosa. I materiali\nnecessari sono 1 Ghicocca bacata, 1 Palla di fango\ne 1 Felcetonda."
    de: "Die Anleitung zur Herstellung einer Klebkugel.\nBenötigte Materialien: 1 Löchrige Aprikoko, 1 Lehmball\nund 1 Rundblatt."
    es: "Receta para crear Bolas Pegajosas. Materiales:\n1 Bonguri Pocho, 1 Bola de Lodo y 1 Helecho Rizado."
    ko: "끈끈환의 레시피.\n재료: 벌레먹은규토리×1 진흙경단×1\n둥근고비×1"
    zh_simp: "黏丸的材料单。材料是：\n蛀球果×１　泥丸×１\n弹子萁×１"
    zh_trad: "黏丸的材料單。材料是：\n蛀球果×１　泥丸×１\n彈子萁×１"
stone_plate:
  names:
    jp_kana: がんせきプレート
    jp_kanji: がんせきプレート
    en: Stone Plate
    fr: Plaque Roc
    it: Lastrapietra
    de: Steintafel
    es: Tabla Pétrea
    ko: 암석플레이트
    zh_simp: 岩石石板
    zh_trad: 岩石石板
  descriptions:
    jp_kana: "いわのタイプの　石盤。\n持たせると　いわタイプの\n技の威力が　強まる。"
    jp_kanji: "いわのタイプの　石盤。\n持たせると　いわタイプの\n技の威力が　強まる。"
    en: "An item to be held by a Pokémon. This stone tablet is\nimbued with the essence of rock and boosts the power\nof the holder’s Rock-type moves."
    fr: "Objet à tenir. Une tablette en pierre augmentant\nla puissance des capacités de type Roche."
    it: "Strumento da dare a un Pokémon. Lastra di pietra che\npotenzia le mosse di tipo Roccia."
    de: "Ein Item zum Tragen. Diese Steintafel verstärkt\nAttacken vom Typ Gestein."
    es: "Tabla de piedra que potencia los movimientos de tipo\nRoca. Debe llevarla un Pokémon."
    ko: "바위타입의 석판.\n지니게 하면 바위타입\n기술의 위력이 강해진다."
    zh_simp: "岩石属性的石板。\n携带后，岩石属性的\n招式威力就会增强。"
    zh_trad: "岩石屬性的石板。\n攜帶後，岩石屬性的\n招式威力就會增強。"
stonjourner_stone:
  names:
    jp_kana: イシヘンジンのいわ
    jp_kanji: イシヘンジンのいわ
    en: Stonjourner Stone
    fr: Roche de Dolman
    it: Roccia di Stonjourner
    de: Humanolith-Stein
    es: Roca de Stonjourner
    ko: 돌헨진의바위
    zh_simp: 巨石丁的岩石
    zh_trad: 巨石丁的岩石
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
storage_key:galactic_warehouse:
  names:
    jp_kana: そうこのカギ
    jp_kanji: そうこのカギ
    en: Storage Key
    fr: Clé du Hangar
    it: Chiave magazzino
    de: Lagerschlüssel
    es: Llave del Almacén
    ko: 창고열쇠
    zh_simp: 仓库钥匙
    zh_trad: 倉庫鑰匙
  descriptions:
    jp_kana: "トバリシティの　はずれにある\nギンガ団の　怪しい\n倉庫に　はいるための　カギ。"
    jp_kanji: "トバリシティの　はずれにある\nギンガ団の　怪しい\n倉庫に　はいるための　カギ。"
    en: "The key to Team Galactic’s sinister warehouse located at\nthe edge of Veilstone City."
    fr: "La clé du hangar de la Team Galaxie situé\nà la périphérie de Voilaroc."
    it: "Chiave del misterioso deposito del Team Galassia\nsituato ai confini di Rupepoli."
    de: "Der Schlüssel zur Lagerhalle von Team Galaktik am\nRande von Schleiede."
    es: "Llave del siniestro almacén del Equipo Galaxia que está\nubicado en las afueras de Ciudad Rocavelo."
    ko: "장막시티 변두리에 있는\n갤럭시단의 수상한 창고에\n들어가기 위한 열쇠다."
    zh_simp: "用于进入银河队在帷幕市市郊的\n可疑仓库的钥匙。"
    zh_trad: "用於進入銀河隊在\n帷幕市市郊的\n可疑倉庫的鑰匙。"
storage_key:sea_mauville:
  names:
    jp_kana: そうこのカギ
    jp_kanji: そうこのカギ
    en: Storage Key
    fr: Clé du Hangar
    it: Chiave magazzino
    de: Lagerschlüssel
    es: Llave del Almacén
    ko: 창고열쇠
    zh_simp: 仓库钥匙
    zh_trad: 倉庫鑰匙
  descriptions:
    jp_kana: "シーキンセツの　倉庫に\n入るための　カギ。"
    jp_kanji: "シーキンセツの　倉庫に\n入るための　カギ。"
    en: "A key that opens the storage hold inside\nSea Mauville."
    fr: La clé de la réserve de Lavandia Sea.
    it: Chiave per accedere al magazzino di Ciclamare.
    de: "Ein Schlüssel, der in das Schloss des Lagerraums auf\nSeewoge Malvenfroh passt."
    es: Llave de acceso al almacén de Malvamar.
    ko: "씨보라의 창고로\n들어가기 위한 열쇠."
    zh_simp: "进入海紫堇的仓库时\n所需的钥匙。"
    zh_trad: "用於進入\n海紫菫的房間的鑰匙。"
strange_ball:
  names:
    jp_kana: ストレンジボール
    jp_kanji: ストレンジボール
    en: Strange Ball
    fr: Étrange Ball
    it: Strange Ball
    de: Rätselball
    es: Extraña Ball
    ko: 스트레인지볼
    zh_simp: 奇异球
    zh_trad: 奇異球
  descriptions:
    jp_kana: "ー\nー\nー"
    jp_kanji: "ー\nー\nー"
    en: "-\n-\n-"
    fr: "-\n-\n-"
    it: "-\n-\n-"
    de: ー
    es: "-\n-\n-"
    ko: "-\n-\n-"
    zh_simp: "ー\nー\nー"
    zh_trad: "ー\nー\nー"
strange_souvenir:
  names:
    jp_kana: ふしぎなおきもの
    jp_kanji: ふしぎなおきもの
    en: Strange Souvenir
    fr: Bibelot Bizarre
    it: Strano ninnolo
    de: Skurriloskulptur
    es: Estatuilla Rara
    ko: 이상한장식품
    zh_simp: 神秘摆设
    zh_trad: 神秘擺設
  descriptions:
    jp_kana: "アローラ地方で　古くから\n守り神　とされる　不思議な\nポケモンを　かたどった　置物。"
    jp_kanji: "アローラ地方で　古くから\n守り神　とされる　不思議な\nポケモンを　かたどった　置物。"
    en: "An ornament depicting a mysterious Pokémon\nthat has been venerated as a guardian deity\nfor an extremely long time in the Alola region."
    fr: "Un ornement à l’image d’un Pokémon vénéré à Alola\net considéré comme une divinité protectrice depuis\ndes temps immémoriaux."
    it: "Statuetta raffigurante un Pokémon misterioso\nche ad Alola viene considerato una divinità\nprotettrice sin dall’antichità."
    de: "Eine Skulptur in Form eines wundersamen Pokémon,\ndas in der Alola-Region seit jeher als Schutzpatron\nangesehen wird."
    es: "Ornamento que representa a un Pokémon misterioso\nvenerado desde la antigüedad en Alola como espíritu\nprotector."
    ko: "알로라지방에서 예로부터\n수호신으로 여겨지는 신비한\n포켓몬을 본떠 만든 장식품."
    zh_simp: "在阿罗拉地区，据说是模仿\n古时候被称为守护神的\n神奇宝可梦而制作的摆设。"
    zh_trad: "據說是模仿自古以來\n在阿羅拉地區被稱為守護神的\n神奇寶可夢而製作的擺設。"
stratospheric_slate:
  names:
    jp_kana: てんくうのせきばん
    jp_kanji: てんくうのせきばん
    en: Stratospheric Slate
    fr: Tablette Cieux
    it: Piastra dei cieli
    de: Himmelsplatte
    es: Losa Cielo
    ko: 천공의석판
    zh_simp: 天空石板
    zh_trad: 天空石板
  descriptions:
    jp_kana: "不思議な　力に　あふれる　石板。\nハマナスパークの　天空の部屋と\n深い　つながりを　感じる。"
    jp_kanji: "不思議な　力に　あふれる　石板。\nハマナスパークの　天空の部屋と\n深い　つながりを　感じる。"
    en: "A slate overflowing with enigmatic energy. You can feel\na strong connection between it and the Stratospheric\nRoom at Ramanas Park."
    fr: "Une tablette qui regorge d’une étrange énergie.\nElle semble intimement liée à la Salle des Cieux\ndu Parc Rosa Rugosa."
    it: "Lastra di pietra che emana una misteriosa energia.\nSembra profondamente connessa alla Stanza dei cieli\ndel Parco Rosa Rugosa."
    de: "Eine Platte, die vor rätselhafter Energie strotzt.\nMan kann eine starke Verbindung zwischen ihr und der\nHimmelskammer im Hamanasu-Park spüren."
    es: "Una losa rebosante de una misteriosa energía. Parece\nestrechamente relacionada con la Sala del Cielo del\nParque Hansa."
    ko: "신비한 힘이 넘치는 석판.\n해당화파크의 천공의 방과\n깊은 연관이 있는 것 같다."
    zh_simp: "充满了神秘力量的石板。\n感觉它与玫瑰公园的天空之厅\n有着很深的关联。"
    zh_trad: "充滿神奇力量的石板。\n感覺它和玫瑰公園的天空之廳\n有很深的關係。"
strawberry:
  names:
    jp_kana: いちごスライス
    jp_kanji: いちごスライス
    en: Strawberry
    fr: Fraise
    it: Fragola
    de: Erdbeere
    es: Fresa
    ko: 딸기슬라이스
    zh_simp: 草莓片
    zh_trad: 草莓片
  descriptions:
    jp_kana: "酸味と　甘味が　強い　食材。\nはさむだけで　見映えする　サンドが\nできるので　人気の食材の　ひとつ。"
    jp_kanji: "酸味と　甘味が　強い　食材。\nはさむだけで　見映えする　サンドが\nできるので　人気の食材の　ひとつ。"
    en: "A very tart and sweet ingredient, popular for its ability\nto make a sandwich visually striking."
    fr: "Un ingrédient au goût très sucré et acide.\nTrès populaire, ce fruit est capable de mettre en valeur\nn’importe quel Sandwich grâce à ses couleurs vives."
    it: "Un ingrediente molto aspro e dolce. È uno dei più\npopolari per preparare panini che siano belli da vedere,\noltre che buoni."
    de: "Eine Zutat mit sehr saurem und süßem Geschmack. Als\nBelag verwandelt sie jedes Sandwich in einen Hingucker\nund steht so auf der Beliebtheitsskala weit oben."
    es: "Una fruta de fuerte sabor dulce y ácido. Es muy popular\ncomo relleno de bocadillos, pues resulta muy llamativa\npara la vista."
    ko: "신맛과 단맛이 강한 식재료.\n넣기만 해도 예쁜 샌드위치를\n만들 수 있어서 인기 있는 식재료 중 하나다."
    zh_simp: "酸味和甜味强烈的食材。\n三明治只要夹了它就能变得抢镜，\n因此是一种十分有人气的食材。"
    zh_trad: "酸味和甜味強勁的食材。\n光是夾進三明治便很上相，\n因此躋身熱門食材之列。"
strawberry_sweet:
  names:
    jp_kana: いちごアメざいく
    jp_kanji: いちごアメざいく
    en: Strawberry Sweet
    fr: Fraise en Sucre
    it: Bonbonfragola
    de: Zucker-Erdbeere
    es: Confite Fresa
    ko: 딸기사탕공예
    zh_simp: 草莓糖饰
    zh_trad: 草莓糖飾
  descriptions:
    jp_kana: "いちごの形をした　アメ細工。\nマホミルに　持たせてあげると\nくるくる　回って　喜ぶ。"
    jp_kanji: "いちごの形をした　アメ細工。\nマホミルに　持たせてあげると\nくるくる　回って　喜ぶ。"
    en: "A strawberry-shaped sweet. When a Milcery holds this,\nit spins around happily."
    fr: "Un bonbon en forme de fraise.\nQuand on le donne à un Crèmy, il se réjouit en tournant\nsur lui-même."
    it: "Bonbon a forma di fragola. Se dato a Milcery,\nil Pokémon farà le piroette per la felicità."
    de: "Zuckerwerk in Form einer Erdbeere. Gibt man es\nHokumil zum Tragen, dreht es sich vor Freude im Kreis."
    es: "Figura de caramelo con forma de fresa. Al dárselo a\nMilcery, se pone a girar rebosante de alegría."
    ko: "딸기 모양의 사탕공예.\n마빌크에게 지니게 하면\n빙빙 돌며 기뻐한다."
    zh_simp: "草莓形状的工艺糖果。\n让小仙奶携带的话，\n会高兴地转圈圈。"
    zh_trad: "草莓形狀的工藝糖果。\n讓小仙奶攜帶的話，\n牠會高興得轉圈圈。"
stretchy_spring:
  names:
    jp_kana: のびたバネ
    jp_kanji: のびたバネ
    en: Stretchy Spring
    fr: Ressort Détendu
    it: Molla elastica
    de: Spiralfeder
    es: Muelle Estirado
    ko: 늘어난용수철
    zh_simp: 松掉的弹簧
    zh_trad: 鬆掉的彈簧
  descriptions:
    jp_kana: "細くて　小さいバネ。\nすっかり　伸びきって　使い道が\nみつからない。"
    jp_kanji: "細くて　小さいバネ。\nすっかり　伸びきって　使い道が\nみつからない。"
    en: "A thin small spring. It’s totally stretched out, and\nwhat it’s used for is unknown."
    fr: "Un petit ressort fin et complètement distendu.\nNul ne sait à quoi il peut bien servir."
    it: "Una molla piccola e sottile. È deformata e ormai\ninutilizzabile."
    de: "Eine kleine, dünne Feder, die bis zum Äußersten\ngedehnt wurde. Man kann nicht mehr erkennen,\nwofür sie ursprünglich verwendet wurde."
    es: "Muelle fino y pequeño. Está algo elongado y se\ndesconoce cuál puede ser su uso."
    ko: "가늘고 작은 용수철.\n완전히 늘어나서 어디에\n써야 할지 모르겠다."
    zh_simp: "细小的弹簧。\n被拉得太长了，\n不知道能派上什么用。"
    zh_trad: "細小的彈簧。\n已經完全鬆掉，\n找不到任何用途。"
striped_bottle:
  names:
    jp_kana: ストライプボトル
    jp_kanji: ストライプボトル
    en: Striped Bottle
    fr: Gourde à Rayures
    it: Borraccia a righe
    de: Streifen-Flasche
    es: Termo Rayas
    ko: 줄무늬 보틀
    zh_simp: 条纹水壶
    zh_trad: 條紋水壺
  descriptions:
    jp_kana: "ストライプ柄の　軽くて　小さい\nコップつき　水筒。　つけ外し　できる\nストラップは　持ち歩きにも　便利。"
    jp_kanji: "ストライプ柄の　軽くて　小さい\nコップつき　水筒。　つけ外し　できる\nストラップは　持ち歩きにも　便利。"
    en: "A striped bottle that’s small, light, and even comes with\na cup. The detachable strap makes it handy for walking\naround with."
    fr: "Une gourde à rayures avec une petite tasse assortie.\nPetite et légère, elle est facile à emporter avec soi\nen balade grâce à sa lanière détachable."
    it: "Borraccia piccola e leggera decorata con un motivo\na righe e dotata di bicchiere. Può essere portata\ncomodamente in giro grazie alla cinghia rimovibile."
    de: "Zu dieser kleinen und leichten Thermosflasche mit\nStreifenmuster gehört auch eine passende Tasse. Dank\nabnehmbarem Riemen lässt sie sich bequem mitführen."
    es: "Un termo a rayas ligero y con tacita incorporada.\nLa correa se puede poner y quitar, lo que lo hace\nmuy cómodo para llevárselo de paseo."
    ko: "줄무늬의 가볍고 작은 보틀.\n컵이 포함되어 있다. 탈착 가능한\n스트랩이 있어서 들고 다니기 편하다."
    zh_simp: "带有条纹图案，轻便小巧\n还附带杯子的水壶。配备了\n可拆式挂绳，方便携带。"
    zh_trad: "裝飾著條狀花紋，輕盈小巧，\n附帶水杯的水壺。\n背帶可自由拆卸，所以也方便攜帶。"
striped_chairs:
  names:
    jp_kana: ストライプチェア
    jp_kanji: ストライプチェア
    en: Striped Chairs
    fr: Sièges à Rayures
    it: Sedie a righe
    de: Streifen-Stühle
    es: Sillas Rayas
    ko: 줄무늬 체어
    zh_simp: 条纹椅子
    zh_trad: 條紋椅子
  descriptions:
    jp_kana: "ピクニックで　使いやすい　イス。\nストライプクロスの　デザインを\nもとに　作ってもらった。"
    jp_kanji: "ピクニックで　使いやすい　イス。\nストライプクロスの　デザインを\nもとに　作ってもらった。"
    en: "A set of chairs that are ideal for picnicking. Their design\nwas inspired by the Striped Tablecloth."
    fr: "Des sièges parfaits pour les pique-niques.\nLeur design est inspiré de la Nappe à Rayures."
    it: "Pratiche sedie, perfette per i picnic, ispirate al design\ndella Tovaglia a righe."
    de: "Diese Stühle sind gut geeignet für Picknicks.\nIhr Design basiert auf dem Streifen-Tischtuch."
    es: "Unas sillas ideales para irse de pícnic. Su diseño está\nbasado en el del Mantel Rayas."
    ko: "피크닉에서 사용하기 편한 의자.\n줄무늬 테이블보의\n디자인을 토대로 만들어졌다."
    zh_simp: "在野餐时很好用的椅子。\n根据条纹桌巾的设计制作而成。"
    zh_trad: "野餐時很好用的椅子。\n根據條紋桌巾的設計製作而成。"
striped_cup:
  names:
    jp_kana: たてストライプカップ
    jp_kanji: たてストライプカップ
    en: Striped Cup
    fr: Tasse à Rayures Jaunes
    it: Tazza a righe verticali
    de: Längsstreifen-Tasse
    es: Taza Raya Vertical
    ko: 세로 줄무늬 컵
    zh_simp: 直条纹水杯
    zh_trad: 直條紋水杯
  descriptions:
    jp_kana: "ピクニックで　子供が使う　カップ。\n軽くて　丈夫な　素材で　できている。\n重ねられるので　持ち運びにも　便利。"
    jp_kanji: "ピクニックで　子供が使う　カップ。\n軽くて　丈夫な　素材で　できている。\n重ねられるので　持ち運びにも　便利。"
    en: "A cup for kids to use at picnics. It’s made of light but\nstrong material. It’s stackable, which makes it handy for\ncarrying around."
    fr: "Une tasse à pique-nique très légère et solide, destinée\naux enfants. On peut les empiler facilement, ce qui\nles rend faciles à transporter."
    it: "Tazza da picnic pensata per i bambini. È realizzata con\nun materiale leggero ma resistente. Essendo impilabile\nè anche comoda da trasportare."
    de: "Diese Picknicktasse für Kinder besteht aus robustem und\nleichtem Material. Da sich solche Tassen stapeln lassen,\nkann man sie bequem überallhin mitnehmen."
    es: "Una taza de pícnic apta para los más peques, hecha\nde un material ligero pero resistente. Además, al ser\napilable, resulta muy cómoda de transportar."
    ko: "피크닉에서 어린이가 사용하는 컵.\n가볍고 튼튼한 소재로 만들어져 있다.\n겹쳐서 쌓을 수도 있어서 들고 다니기 편하다."
    zh_simp: "野餐时小孩使用的杯子。\n使用轻巧坚固的材料制成。\n能够叠起来，因此方便携带。"
    zh_trad: "小孩子在野餐時使用的水杯。\n由輕巧而堅固的材料製成。\n可以堆疊，所以也方便攜帶。"
striped_tablecloth:
  names:
    jp_kana: ストライプクロス
    jp_kanji: ストライプクロス
    en: Striped Tablecloth
    fr: Nappe à Rayures
    it: Tovaglia a righe
    de: Streifen-Tischtuch
    es: Mantel Rayas
    ko: 줄무늬 테이블보
    zh_simp: 条纹桌巾
    zh_trad: 條紋桌巾
  descriptions:
    jp_kana: "ストライプ柄が　オシャレな　テーブルクロス。\n防水　防カビ　性能に　優れ\n汚れも　ひと拭きで　落ちる。"
    jp_kanji: "ストライプ柄が　オシャレな　テーブルクロス。\n防水　防カビ　性能に　優れ\n汚れも　ひと拭きで　落ちる。"
    en: "A tablecloth with a fashionable striped pattern. It’s great\nat repelling water and mold, and stains and smudges\nwipe right off."
    fr: "Une nappe avec un élégant motif à rayures. Elle est\nhydrophobe, anti-moisissures, et il suffit d’un simple\ncoup d’éponge pour y faire disparaître toutes les taches."
    it: "Tovaglia dall’elegante motivo a righe. Impermeabile\ne a prova di muffa, per pulirla basta una passata di\nspugna."
    de: "Dieses Tischtuch mit modischem Streifenmuster ist\nwunderbar wasserabweisend und schimmelfest, sodass\nsich Schmutz und Flecken leicht wegwischen lassen."
    es: "Un mantel con un original diseño a rayas. Es resistente\nal agua y al moho, por lo que es muy fácil de limpiar."
    ko: "세련된 줄무늬의 테이블보.\n방수와 방미 성능이 뛰어나서\n더러워져도 한 번 쓱 닦으면 깨끗해진다."
    zh_simp: "带有条纹图案的时尚桌巾。\n既防水又防霉，性能优越。\n弄脏了也一下就能擦掉。"
    zh_trad: "擁有時尚條狀花紋的桌巾。\n防水和防霉性能非常卓越，\n髒汙也能輕易地擦拭乾淨。"
stunky_fur:
  names:
    jp_kana: スカンプーのけ
    jp_kanji: スカンプーのけ
    en: Stunky Fur
    fr: Poils de Moufouette
    it: Pelo di Stunky
    de: Skunkapuh-Haar
    es: Pelo de Stunky
    ko: 스컹뿡의털
    zh_simp: 臭鼬噗的毛
    zh_trad: 臭鼬噗的毛
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
style_card:
  names:
    jp_kana: おしゃれカード
    jp_kanji: おしゃれカード
    en: Style Card
    fr: Carte Élégance
    it: Tessera chic
    de: Style-Karte
    es: Tarjeta Chic
    ko: 멋쟁이카드
    zh_simp: 时尚名人卡
    zh_trad: 時尚名人卡
  descriptions:
    jp_kana: "持っていると　ブティックで　買える\n品物が　増える。　ヘアサロンでは\n選べる　髪型が　増える　カード。"
    jp_kanji: "持っていると　ブティックで　買える\n品物が　増える。　ヘアサロンでは\n選べる　髪型が　増える　カード。"
    en: "Having one of these cards increases the selection\navailable to you in boutiques and hair salons."
    fr: "Une carte permettant d’accéder à un plus vaste choix\nd’articles dans les boutiques chics et à davantage de\ncoiffures dans les salons Salle à Mèches."
    it: "Una tessera che amplia la scelta di acconciature\ndisponibili dai Parrucchieri e di articoli acquistabili\nnei Negozi di vestiti."
    de: "Wer diese Karte bei sich trägt, erhält in Boutiquen\nund Friseursalons eine größere Auswahl."
    es: "Una tarjeta que aumenta la selección de artículos\ndisponibles en las tiendas y permite elegir entre una\nmayor variedad de peinados en las peluquerías."
    ko: "지니고 있으면 부티크에서 살 수 있는\n품목이 늘어나고, 헤어살롱에서는\n고를 수 있는 헤어스타일이 늘어나는 카드."
    zh_simp: "拥有后，在时装店可以买到的物品\n和在美发沙龙可以选择的发型\n都会有所增加的卡片。"
    zh_trad: "擁有這張卡，就能在時裝店買到\n更多商品。到美髮沙龍時，\n也能有更多樣化的髮型選項。"
suicune_treat:
  names:
    jp_kana: スイクンのおやつ
    jp_kanji: スイクンのおやつ
    en: Suicune Treat
    fr: Friandise Suicune
    it: Spuntino per Suicune
    de: Suicune-Snack
    es: Galleta Suicune
    ko: 스이쿤의간식
    zh_simp: 水君的点心
    zh_trad: 水君的點心
  descriptions:
    jp_kana: "伝説のポケモン　スイクンが\n好む食材で　作られた　おやつ。"
    jp_kanji: "伝説のポケモン　スイクンが\n好む食材で　作られた　おやつ。"
    en: "A snack made from ingredients favored by the\nLegendary Pokémon Suicune."
    fr: "Une friandise préparée avec les ingrédients favoris\ndu Pokémon légendaire Suicune."
    it: "Uno spuntino fatto con gli ingredienti preferiti\ndal Pokémon leggendario Suicune."
    de: "Dieser Snack wurde mit den Lieblingszutaten des\nLegendären Pokémon Suicune zubereitet."
    es: "Galleta preparada con los ingredientes favoritos\ndel Pokémon legendario Suicune."
    ko: "전설의 포켓몬 스이쿤이\n좋아하는 식재료로 만들어진 간식."
    zh_simp: "用传说的宝可梦水君\n喜欢的食材制作的点心。"
    zh_trad: "用傳說的寶可夢水君\n喜愛的食材製成的點心。"
suite_key:
  names:
    jp_kana: ルームキー
    jp_kanji: ルームキー
    en: Suite Key
    fr: Clé de Chambre
    it: Chiave suite
    de: Hotelschlüssel
    es: Llave de la Suite
    ko: 룸키
    zh_simp: 房间钥匙
    zh_trad: 房間鑰匙
  descriptions:
    jp_kana: "湖の　ほとりにある\n高級ホテルの　ルームキー。\nなぜか　よく　なくなってしまう。"
    jp_kanji: "湖の　ほとりにある\n高級ホテルの　ルームキー。\nなぜか　よく　なくなってしまう。"
    en: "A key to one of the suites at a certain luxury hotel\nby a lake. For some odd reason, it often disappears."
    fr: "La clé de l’une des suites de l’hôtel de luxe se trouvant\nprès du lac. Bizarrement, elle disparaît souvent."
    it: "Chiave di una suite vicino a un lago.\nPer ragioni misteriose, scompare spesso."
    de: "Schlüssel zu einer Hotelsuite. Verschwindet\nseltsamerweise immer wieder mal."
    es: "Llave de una suite del hotel de lujo junto al lago.\nPor algún motivo, se pierde a menudo."
    ko: "호수 근처에 있는 고급 호텔의 룸키.\n왜인지는 모르나 잘 없어진다."
    zh_simp: "湖畔高级宾馆的房间钥匙。\n不知为何，它经常会丢失。"
    zh_trad: "湖畔高級旅館的房間鑰匙。\n不知為何老是搞丟。"
sun_flute:
  names:
    jp_kana: たいようのふえ
    jp_kanji: たいようのふえ
    en: Sun Flute
    fr: Flûte du Soleil
    it: Flauto solare
    de: Sonnenflöte
    es: Flauta Solar
    ko: 태양의피리
    zh_simp: 太阳之笛
    zh_trad: 太陽之笛
  descriptions:
    jp_kana: "太陽の　伝説ポケモンに\n感謝の　気持ちを　表すため\n音色を　捧げていた　という。"
    jp_kanji: "太陽の　伝説ポケモンに\n感謝の　気持ちを　表すため\n音色を　捧げていた　という。"
    en: "It is said that the tones it produces were offered\nup as an expression of gratitude to the Legendary\nPokémon of the sun."
    fr: "Une flûte dont le timbre permettait d’exprimer\nsa reconnaissance au Pokémon légendaire du soleil."
    it: "Flauto il cui dolce suono esprime la riconoscenza degli\nesseri umani verso il Pokémon leggendario del sole."
    de: "Auf dieser Flöte soll eine Melodie gespielt worden sein,\num dem Legendären Sonnen-Pokémon Dank zu sagen."
    es: "Flauta que se hace sonar como muestra de gratitud\nhacia el Pokémon legendario del sol."
    ko: "태양의 전설포켓몬에게\n감사의 마음을 표현하기 위해\n음색을 바쳤다고 한다."
    zh_simp: "为了对太阳的\n传说的宝可梦表达感激之情，\n据说会用它来献上美乐。"
    zh_trad: "為了對太陽的\n傳說的寶可夢表達感激之情，\n據說會用它來獻上美樂。"
sun_stone:
  names:
    jp_kana: たいようのいし
    jp_kanji: たいようのいし
    en: Sun Stone
    fr: Pierre Soleil
    it: Pietrasolare
    de: Sonnenstein
    es: Piedra Solar
    ko: 태양의돌
    zh_simp: 日之石
    zh_trad: 日之石
  descriptions:
    jp_kana: "ある特定の　ポケモンを\n進化させる　不思議な石。\n太陽のように　赤い。"
    jp_kanji: "ある特定の　ポケモンを\n進化させる　不思議な石。\n太陽のように　赤い。"
    en: "A peculiar stone that can make certain species of\nPokémon evolve. It burns as red as the evening sun."
    fr: "Une pierre étrange qui fait évoluer certaines espèces\nde Pokémon. Elle est rouge comme le soleil couchant."
    it: "Pietra particolare che fa evolvere determinate specie\ndi Pokémon. È rossa come il sole al tramonto."
    de: "Dieser besondere Stein löst bei bestimmten Pokémon\ndie Entwicklung aus. Er ist rot wie die Abendsonne."
    es: "Curiosa piedra que hace evolucionar a determinadas\nespecies de Pokémon. Es roja como el núcleo del sol."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 돌.\n태양처럼 빨갛다."
    zh_simp: "能让某些特定宝可梦\n进化的神奇石头。\n像太阳一样赤红。"
    zh_trad: "能讓特定寶可夢\n進化的神奇石頭。\n像太陽一樣赤紅。"
sunkern_leaf:
  names:
    jp_kana: ヒマナッツのはっぱ
    jp_kanji: ヒマナッツのはっぱ
    en: Sunkern Leaf
    fr: Feuille de Tournegrin
    it: Foglia di Sunkern
    de: Sonnkern-Blatt
    es: Hoja de Sunkern
    ko: 해너츠의잎
    zh_simp: 向日种子的叶片
    zh_trad: 向日種子的葉片
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
sunrise_flower_pick:
  names:
    jp_kana: あさやけおはなピック
    jp_kanji: あさやけおはなピック
    en: Sunrise Flower Pick
    fr: Pique Fleur du Levant
    it: Stecchino fiore rosso
    de: Morgenblumen-Pikser
    es: Palillo Flor Rosa
    ko: 아침노을 꽃 픽
    zh_simp: 朝霞花三明治签
    zh_trad: 朝霞花三明治籤
  descriptions:
    jp_kana: "朝焼け空を　イメージさせる　お花のピック。\n空花シリーズの　ピックを　何種類か　使うと\nピクニック気分が　盛り上がること　うけあい。"
    jp_kanji: "朝焼け空を　イメージさせる　お花のピック。\n空花シリーズの　ピックを　何種類か　使うと\nピクニック気分が　盛り上がること　うけあい。"
    en: "A flower pick designed to evoke a glorious sunrise. It’s\npart of a line of “sky-flower” picks. Using a few is\nguaranteed to boost that special picnic spirit."
    fr: "Une pique ornée d’une fleur évoquant l’aurore.\nIl en existe toute une série. Les utiliser ensemble dans\nun pique-nique permet de donner une ambiance festive."
    it: "Stecchino a forma di fiore che evoca il cielo all’alba.\nUsando diversi tipi di questi stecchini si può star sicuri\ndi creare una fantastica atmosfera da picnic."
    de: "Ein Blumen-Pikser, der an die Morgensonne denken lässt,\nund zu einer Serie von Tageszeit-Piksern gehört. Nutzt\nman mehrere, ist eine tolle Picknickstimmung garantiert!"
    es: "El color de la flor recuerda al amanecer. Los palillos con\nforma de flor resultan muy vistosos combinados entre sí\ny ayudan a crear un ambiente animado en los pícnics."
    ko: "아침노을을 연상시키는 꽃 모양 픽.\n하늘꽃 시리즈 픽을 여러 종류 사용하면\n틀림없이 피크닉이 더욱더 즐거워질 것이다."
    zh_simp: "以朝霞为灵感创作的花朵签子。\n只要用上几种天色花朵系列的签子，\n保证能让野餐的氛围得到升华。"
    zh_trad: "以朝霞為意象的花朵小籤。\n將天色花朵系列的三明治籤搭配使用，\n肯定能增添野餐的興致。"
sunset_flower_pick:
  names:
    jp_kana: ゆうやけおはなピック
    jp_kanji: ゆうやけおはなピック
    en: Sunset Flower Pick
    fr: Pique Fleur du Ponant
    it: Stecchino fiore arancio
    de: Abendblumen-Pikser
    es: Palillo Flor Naranja
    ko: 저녁노을 꽃 픽
    zh_simp: 夕阳花三明治签
    zh_trad: 夕陽花三明治籤
  descriptions:
    jp_kana: "夕焼け空を　イメージさせる　お花のピック。\n空花シリーズの　ピックを　何種類か　使うと\nピクニック気分が　盛り上がること　うけあい。"
    jp_kanji: "夕焼け空を　イメージさせる　お花のピック。\n空花シリーズの　ピックを　何種類か　使うと\nピクニック気分が　盛り上がること　うけあい。"
    en: "A flower pick designed to evoke a blazing sunset. It’s\npart of a line of “sky-flower” picks. Using a few is\nguaranteed to boost that special picnic spirit."
    fr: "Une pique ornée d’une fleur évoquant le crépuscule.\nIl en existe toute une série. Les utiliser ensemble dans\nun pique-nique permet de donner une ambiance festive."
    it: "Stecchino a forma di fiore che evoca il cielo al tramonto.\nUsando diversi tipi di questi stecchini si può star sicuri\ndi creare una fantastica atmosfera da picnic."
    de: "Ein Blumen-Pikser, der an die Abendsonne denken lässt,\nund zu einer Serie von Tageszeit-Piksern gehört. Nutzt\nman mehrere, ist eine tolle Picknickstimmung garantiert!"
    es: "El color de la flor recuerda al atardecer. Los palillos con\nforma de flor resultan muy vistosos combinados entre sí\ny ayudan a crear un ambiente animado en los pícnics."
    ko: "저녁노을을 연상시키는 꽃 모양 픽.\n하늘꽃 시리즈 픽을 여러 종류 사용하면\n틀림없이 피크닉이 더욱더 즐거워질 것이다."
    zh_simp: "以夕阳为灵感创作的花朵签子。\n只要用上几种天色花朵系列的签子，\n保证能让野餐的氛围得到升华。"
    zh_trad: "以夕陽為意象的花朵小籤。\n將天色花朵系列的三明治籤搭配使用，\n肯定能增添野餐的興致。"
super_lure:
  names:
    jp_kana: シルバーコロン
    jp_kanji: シルバーコロン
    en: Super Lure
    fr: Super Parfum
    it: Superprofumo
    de: Super-Lockparfüm
    es: Supercolonia
    ko: 실버코롱
    zh_simp: 白银香水
    zh_trad: 白銀香水
  descriptions:
    jp_kana: "使うと　珍しい　ポケモンが\n出てきやすくなる　香水。\nむしよせコロンより　長く　もつ。"
    jp_kanji: "使うと　珍しい　ポケモンが\n出てきやすくなる　香水。\nむしよせコロンより　長く　もつ。"
    en: "A bottle of perfume that makes rare Pokémon more\nlikely to appear when sprayed about. Its effect lasts\nlonger than that of a Lure."
    fr: "Une substance qui fait apparaître les Pokémon rares\nplus facilement pendant une durée plus longue que\nle Parfum."
    it: "Profumo che attira Pokémon rari. Il suo effetto dura\npiù a lungo di quello del Profumo invito."
    de: "Ein Parfüm, das für kurze Zeit vermehrt seltene\nPokémon erscheinen lässt. Wirkt länger als das Item\nLockparfüm."
    es: "Colonia que atrae a los Pokémon raros y cuyo efecto\nes algo más duradero que el de la Colonia."
    ko: "사용하면 희귀한 포켓몬이\n나오기 쉬워지는 향수.\n벌레유인코롱보다 효과가 오래간다."
    zh_simp: "使用该香水后，\n稀有宝可梦会更容易出现。\n效果比引虫香水更持久。"
    zh_trad: "使用後，讓稀有寶可夢\n變得容易出現的香水。\n效果比引蟲香水更持久。"
super_potion:
  names:
    jp_kana: いいキズぐすり
    jp_kanji: いいキズぐすり
    en: Super Potion
    fr: Super Potion
    it: Superpozione
    de: Supertrank
    es: Superpoción
    ko: 좋은상처약
    zh_simp: 好伤药
    zh_trad: 好傷藥
  descriptions:
    jp_kana: "スプレー式の　キズぐすり。\nポケモン　１匹の　ＨＰを\n６０だけ　回復する。"
    jp_kanji: "スプレー式の　キズぐすり。\nポケモン　１匹の　ＨＰを\n６０だけ　回復する。"
    en: "A spray-type medicine for treating wounds. It can\nbe used to restore 60 HP to a Pokémon."
    fr: "Un spray qui soigne les blessures.\nRestaure 60 PV d’un Pokémon."
    it: "Rimedio spray per le ferite. Restituisce 60 PS\na un Pokémon."
    de: "Hilft bei Wunden. Füllt die KP eines Pokémon um\n60 Punkte auf."
    es: "Medicina en espray que cura heridas y restaura 60 PS\nde un Pokémon."
    ko: "스프레이식의 상처약.\n포켓몬 1마리의 HP를\n60만큼 회복한다."
    zh_simp: "喷雾式伤药。\n能让１只宝可梦\n回复６０ＨＰ。"
    zh_trad: "噴霧式傷藥。\n能讓１隻寶可夢\n回復６０ＨＰ。"
super_potion:recipe:
  names:
    jp_kana: いいキズぐすり
    jp_kanji: いいキズぐすり
    en: Super Potion
    fr: Super Potion
    it: Superpozione
    de: Supertrank
    es: Superpoción
    ko: 좋은상처약
    zh_simp: 好伤药
    zh_trad: 好傷藥
  descriptions:
    jp_kana: "いいキズぐすりのレシピ。　材料は\nキズぐすり×１　ピーピーグサ×１"
    jp_kanji: "いいキズぐすりのレシピ。　材料は\nキズぐすり×１　ピーピーグサ×１"
    en: "A recipe for crafting Super Potions from scratch.\nRequired materials: 1 Potion and 1 Pep-Up Plant."
    fr: "Méthode pour Super Potion. Ressources requises :\n1 Potion et 1 Plante PP."
    it: "Ricetta per una Superpozione. Richiede 1 Pozione e\n1 radice di Erba PP."
    de: "Die Anleitung zur Herstellung eines Supertranks.\nBenötigte Materialien: 1 Trank und 1 Stängel Ätherkraut."
    es: "Receta para crear Superpociones. Materiales:\n1 Poción y 1 Hierba Éter."
    ko: "좋은상처약의 레시피.\n재료: 상처약×1 PP풀×1"
    zh_simp: "好伤药的材料单。材料是：\n伤药×１　ＰＰ草×１"
    zh_trad: "好傷藥的材料單。材料是：\n傷藥×１　ＰＰ草×１"
super_repel:
  names:
    jp_kana: シルバースプレー
    jp_kanji: シルバースプレー
    en: Super Repel
    fr: Super Repousse
    it: Superrepellente
    de: Superschutz
    es: Superrepelente
    ko: 실버스프레이
    zh_simp: 白银喷雾
    zh_trad: 白銀噴霧
  descriptions:
    jp_kana: "弱い　野生のポケモンが\nまったく　出てこなくなる。\nむしよけスプレーより　長く　効く。"
    jp_kanji: "弱い　野生のポケモンが\nまったく　出てこなくなる。\nむしよけスプレーより　長く　効く。"
    en: "An item that prevents low-level wild Pokémon from\njumping out at you for a time. It lasts longer than Repel."
    fr: "Repousse les Pokémon sauvages faibles plus longtemps\nque le Repousse."
    it: "Strumento che evita a chi lo usa di incontrare Pokémon\nselvatici deboli. Il suo effetto dura più a lungo di quello\ndel Repellente."
    de: "Hält schwache wilde Pokémon ab. Wirkt länger als das\nItem Schutz."
    es: "Evita encuentros con Pokémon salvajes de nivel bajo\ndurante más tiempo que un Repelente."
    ko: "약한 야생 포켓몬이\n전혀 나오지 않게 된다.\n벌레회피스프레이보다 효과가 오래간다."
    zh_simp: "弱小的野生宝可梦\n将完全不会出现。\n效果比除虫喷雾更持久。"
    zh_trad: "弱小的野生寶可夢\n變得完全不會出現。\n效果比除蟲噴霧更持久。"
super_rod:
  names:
    jp_kana: すごいつりざお
    jp_kanji: すごいつりざお
    en: Super Rod
    fr: Méga Canne
    it: Canna da pesca super
    de: Superangel
    es: Supercaña
    ko: 대단한낚싯대
    zh_simp: 厉害钓竿
    zh_trad: 厲害釣竿
  descriptions:
    jp_kana: "最新の　すごい　つりざお。\n水の　ある　場所で　使うと\nポケモンが　つれる。"
    jp_kanji: "最新の　すごい　つりざお。\n水の　ある　場所で　使うと\nポケモンが　つれる。"
    en: "An awesome, high-spec fishing rod. Use it at bodies of\nwater to fish for Pokémon."
    fr: "Une canne à pêche ultramoderne.\nUtilisez-la pour pêcher des Pokémon sauvages\ndans les points d’eau."
    it: "Canna da pesca supertecnologica. Si usa per pescare\nPokémon selvatici in qualsiasi specchio d’acqua."
    de: "Eine wundervoll gefertigte Angel. Die beste Angel,\num Pokémon an Land zu ziehen."
    es: "Increíble caña de pescar de alta tecnología. Pesca\nPokémon salvajes en todo tipo de aguas."
    ko: "최신식의 대단한 낚싯대.\n물이 있는 장소에서 사용하면\n포켓몬을 낚을 수 있다."
    zh_simp: "最新的厉害钓竿。\n在有水的地方使用的话，\n可以钓到宝可梦。"
    zh_trad: "最新的厲害釣竿。\n在有水的地方使用的話，\n可以釣到寶可夢。"
superb_remedy:
  names:
    jp_kana: すごいカンポーやく
    jp_kanji: すごいカンポーやく
    en: Superb Remedy
    fr: Hyper Remède
    it: Preparato ottimo
    de: Hyperarznei
    es: Hiperremedio
    ko: 고급한방약
    zh_simp: 厉害中药
    zh_trad: 厲害中藥
  descriptions:
    jp_kana: "すごいキズぐすりと同じで\nポケモン１匹のＨＰが１５０回復するが\n苦く　なかよし度がさがる。"
    jp_kanji: "すごいキズぐすりと同じで\nポケモン１匹のＨＰが１５０回復するが\n苦く　なかよし度がさがる。"
    en: "An herbal medicine that can restore 150 HP to a\nPokémon, just as a Hyper Potion does. Yet the bitter\ntaste will make the Pokémon less friendly toward you."
    fr: "Permet de restaurer 150 PV d’un Pokémon, comme le\nferait une Hyper Potion. Son goût amer fera cependant\ndiminuer l’amitié que vous porte le Pokémon."
    it: "Come l’Iperpozione, restituisce 150 PS a un Pokémon\nma, essendo amara, fa diminuire il livello di amicizia."
    de: "Diese Arznei hat dieselbe Wirkung wie ein Hypertrank\nund füllt die KP eines Pokémon um 150 Punkte auf.\nIhr bitterer Geschmack senkt jedoch seine Zutraulichkeit."
    es: "Preparado medicinal que restablece 150 PS a un único\nPokémon, como una Hiperpoción, aunque su sabor\namargo hace que sea menos amistoso."
    ko: "고급상처약과 마찬가지로\n포켓몬 1마리의 HP를 150만큼 회복하지만\n맛이 써서 절친도가 떨어진다."
    zh_simp: "效果和厉害伤药一样，\n能让１只宝可梦回复１５０ＨＰ，\n但味道很苦，友好度会降低。"
    zh_trad: "效果和厲害傷藥一樣，\n能讓１隻寶可夢回復１５０ＨＰ，\n但味道很苦，友好度會降低。"
superb_remedy:recipe:
  names:
    jp_kana: すごいカンポーやく
    jp_kanji: すごいカンポーやく
    en: Superb Remedy
    fr: Hyper Remède
    it: Preparato ottimo
    de: Hyperarznei
    es: Hiperremedio
    ko: 고급한방약
    zh_simp: 厉害中药
    zh_trad: 厲害中藥
  descriptions:
    jp_kana: "すごいカンポーやくのレシピ。　材料は\nいいカンポーやく×１　ゲンキノツボミ×１"
    jp_kanji: "すごいカンポーやくのレシピ。　材料は\nいいカンポーやく×１　ゲンキノツボミ×１"
    en: "A recipe for crafting Superb Remedies from scratch.\nRequired materials: 1 Fine Remedy and 1 Vivichoke."
    fr: "Méthode pour Hyper Remède. Ressources requises :\n1 Super Remède et 1 Bourgeon Vivace."
    it: "Ricetta per un Preparato ottimo. Richiede 1 Preparato\nbuono e 1 Revitalboccio."
    de: "Die Anleitung zur Herstellung einer Hyperarznei.\nBenötigte Materialien: 1 Superarznei und 1 Vitalknospe."
    es: "Receta para crear Hiperremedios. Materiales:\n1 Superremedio y 1 Revibrote."
    ko: "고급한방약의 레시피.\n재료: 좋은한방약×1 기력의봉오리×1"
    zh_simp: "厉害中药的材料单。材料是：\n好中药×１　活力蕾×１"
    zh_trad: "厲害中藥的材料單。材料是：\n好中藥×１　活力蕾×１"
surge_badge:
  names:
    jp_kana: だいだいバッジ
    jp_kanji: だいだいバッジ
    en: Surge Badge
    fr: Fulguro-Badge
    it: Medaglia Tonante
    de: Gewitterorden
    es: Medalla Fulgor
    ko: 주황배지
    zh_simp: 桔色徽章
    zh_trad: 橘色徽章
  descriptions:
    jp_kana: "ジムオブカントーで　もらえる\nノベルティの　バッジ。　どこかの\nジムバッジを　まねているらしい。"
    jp_kanji: "ジムオブカントーで　もらえる\nノベルティの　バッジ。　どこかの\nジムバッジを　まねているらしい。"
    en: "A novelty badge that you can receive at the\nKantonian Gym. Rumor has it that it imitates\nthe Badge of a Gym somewhere."
    fr: "Un badge promotionnel obtenu à l’Arène de Kanto.\nIl paraît que c’est une imitation du Badge\nd’une certaine Arène."
    it: "Medaglia souvenir ottenuta alla Palestra di Kanto.\nSembra ispirata alla Medaglia di un’altra Palestra."
    de: "Ein Werbegeschenk, das man in der Kanto-Arena erhält.\nEs scheint sich dabei um die Nachbildung eines Ordens\neiner bestimmten Arena zu handeln."
    es: "Medalla conseguida en el Gimnasio de Kanto. Su\naspecto guarda un sospechoso parecido con la medalla\nde otro gimnasio."
    ko: "체육관오브관동에서 받을 수 있는\n노벨티 배지. 어딘가의\n체육관 배지를 흉내 낸 듯하다."
    zh_simp: "能从关都之道馆那里得到的徽章赠品。\n好像仿照了某个地区的道馆徽章。"
    zh_trad: "可在關都之道館獲得的徽章贈品。\n聽說這好像是在模仿\n某個地方的道館徽章。"
surprise_mulch:
  names:
    jp_kana: びっくりこやし
    jp_kanji: びっくりこやし
    en: Surprise Mulch
    fr: Fertistantané
    it: Fertilsorpresa
    de: Wundermulch
    es: Abono Sorpresa
    ko: 깜놀비료
    zh_simp: 吃惊肥
    zh_trad: 吃驚肥
  descriptions:
    jp_kana: "きのみを　育てるときの　肥料。\nしかし　ホウエン地方の　土には\nまるで　なじまないので　効果が　ない。"
    jp_kanji: "きのみを　育てるときの　肥料。\nしかし　ホウエン地方の　土には\nまるで　なじまないので　効果が　ない。"
    en: "A fertilizer for growing Berries. However, it appears\nto be unsuitable for the soil in the Hoenn region and\nhas no effect."
    fr: "Un engrais à utiliser sur un sol meuble.\nIl n’est cependant pas adapté aux terres de Hoenn\net n’y a aucun effet."
    it: "Fertilizzante usato per coltivare le bacche. Tuttavia,\nnon ha effetto a Hoenn, perché non è adatto al terreno\ndella regione."
    de: "Mulch zur Nutzung auf Beerenfeldern. Durch seine\nUnverträglichkeit mit den Böden in Hoenn bleibt sein\nEinsatz dort ohne Wirkung."
    es: "Un fertilizante usado para el cultivo de bayas. Parece\nque no se asienta bien en el suelo de Hoenn, por lo\nque no tiene efecto en esta región."
    ko: "나무열매를 키울 때 사용하는 비료.\n그러나 호연지방의 흙에는\n전혀 맞지 않기에 효과가 없다."
    zh_simp: "培育树果时的肥料。\n但完全不适合丰缘地区的土壤，\n所以没什么效果。"
    zh_trad: "培育樹果時的肥料。\n但完全不適合豐緣地區的土壤，\n所以沒什麼效果。"
surskit_syrup:
  names:
    jp_kana: アメタマのミツ
    jp_kanji: アメタマのミツ
    en: Surskit Syrup
    fr: Nectar d’Arakdo
    it: Sciroppo di Surskit
    de: Gehweiher-Nektar
    es: Néctar de Surskit
    ko: 비구술의꿀
    zh_simp: 溜溜糖球的蜜
    zh_trad: 溜溜糖球的蜜
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
survival_charm_b:
  names:
    jp_kana: あんぜんおまもり２
    jp_kanji: あんぜんおまもり２
    en: Survival Charm B
    fr: Enduramulette 2
    it: Amuleto tutela 2
    de: Schutztalisman 2
    es: Amuleto Protector 2
    ko: 안전부적2
    zh_simp: 安全护符２
    zh_trad: 安全護符２
  descriptions:
    jp_kana: "気を失いにくくする\n効果を秘めた不思議なおまもり。\n色が５種類あるうちのひとつ。"
    jp_kanji: "気を失いにくくする\n効果を秘めた不思議なおまもり。\n色が５種類あるうちのひとつ。"
    en: "A mysterious charm that holds the power to protect\na person from fainting while out in the field. This type\nof charm comes in five different colors."
    fr: "Grâce aux pouvoirs de cette mystérieuse amulette,\nil est plus difficile de perdre connaissance.\nElle existe en cinq couleurs différentes."
    it: "Misterioso amuleto grazie al quale è più difficile\nperdere i sensi. Ne esistono di cinque colori differenti."
    de: "Ein mysteriöser Talisman, der dich länger durchhalten\nlässt, bevor du ohnmächtig wirst. Dies ist eine von fünf\nFarbvarianten."
    es: "Amuleto imbuido de un extraño y misterioso poder que\notorga resistencia ante la pérdida de conocimiento. Este\nes uno de los cinco colores que existen."
    ko: "정신을 쉽게 잃지 않게 해 주는\n효과가 담긴 신비한 부적.\n색이 다른 5종류 중 하나."
    zh_simp: "不可思议的护符。\n有着让人不易昏倒的效果。\n是５种颜色的护符中的一种。"
    zh_trad: "不可思議的護符。\n有著讓人不易昏倒的效果。\n是５種顏色的護符中的一種。"
