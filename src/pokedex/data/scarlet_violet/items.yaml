  descriptions:
    jp_kana: "ポケモンに　持たせると\n効果バツグンの　むし技を\n受けたとき　威力が　弱まる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　むし技を\n受けたとき　威力が　弱まる。"
    en: "If a Pokémon holding this Berry is hit with a\nsupereffective Bug-type move, the power of that\nmove will be weakened."
    fr: "Tenue, cette Baie réduit les dégâts subis lorsque\nle Pokémon est touché par une capacité super efficace\nde type Insecte."
    it: "Se il Pokémon che ha questa bacca subisce una mossa\nsuperefficace di tipo Coleottero, la potenza della mossa\nviene indebolita."
    de: "Als getragenes Item schwächt diese Beere eine\nsehr effektive Käfer-Attacke, von der das Pokémon\ngetroffen wird."
    es: "Si la lleva un Pokémon, debilita un ataque supereficaz\nde tipo Bicho que reciba."
    ko: "포켓몬에게 지니게 하면\n효과가 굉장한 벌레 기술로\n공격받았을 때 위력이 약해진다."
    zh_simp: "让宝可梦携带后，\n在受到效果绝佳的虫属性招式\n攻击时，能令其威力减弱。"
    zh_trad: "讓寶可夢攜帶後，\n在受到效果絕佳的蟲屬性招式\n攻擊時，能使其威力減弱。"
