    fr: Écaille de Magicarpe
    it: Squama di Magikarp
    de: Karpador-Schuppe
    es: Escama de Magikarp
    ko: 잉어킹의비늘
    zh_simp: 鲤鱼王的鳞片
    zh_trad: 鯉魚王的鱗片
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
magma_stone:
  names:
    jp_kana: かざんのおきいし
    jp_kanji: かざんのおきいし
    en: Magma Stone
    fr: Pierre Magma
    it: Magmapietra
    de: Magmastein
    es: Piedra Magma
    ko: 화산의돌
    zh_simp: 火山镇石
    zh_trad: 火山鎮石
  descriptions:
    jp_kana: "しゃくねつの　マグマの　熱でとけた\n岩石が　固まって　できたもの。\n中に　マグマが　残っている。"
    jp_kanji: "しゃくねつの　マグマの　熱でとけた\n岩石が　固まって　できたもの。\n中に　マグマが　残っている。"
    en: "A stone formed by boulders melting in intensely hot\nmagma, then hardening. Magma remains sealed inside it."
    fr: "Une pierre formée à partir de roche en fusion solidifiée.\nElle contient du magma."
    it: "Pietra che si è formata a seguito di un’intensa colata\nlavica. Il magma è rimasto intrappolato al suo interno."
    de: "Ein Stein aus gehärtetem Magma. Sein Kern ist noch\nflüssig und heiß."
    es: "Formada a partir de magma enfriado y endurecido.\nAún hay magma líquido en su interior."
    ko: "이글거리는 마그마의 열로 녹은\n암석이 굳어져 생긴 것.\n안에는 마그마가 남아 있다."
    zh_simp: "被灼热熔岩熔化的岩石\n凝固后形成的产物。\n里面还留有熔岩。"
    zh_trad: "被灼熱熔岩熔化的岩石\n凝固後形成的產物。\n裡面還留有熔岩。"
magma_suit:
  names:
    jp_kana: マグマスーツ
    jp_kanji: マグマスーツ
    en: Magma Suit
    fr: Scaph. Magma
    it: Tuta Magma
    de: Magma-Anzug
    es: Traje Magma
    ko: 마그마슈트
    zh_simp: 熔岩装
    zh_trad: 熔岩裝
  descriptions:
    jp_kana: "マグマ団の　科学技術を\n結集して　つくられた　スーツ。\nどんな　衝撃にも　耐えられる。"
    jp_kanji: "マグマ団の　科学技術を\n結集して　つくられた　スーツ。\nどんな　衝撃にも　耐えられる。"
    en: "A suit made with the collective technological\nknow-how of Team Magma. It can withstand\nany impact."
    fr: "Une combinaison créée à partir des méthodes\nscientifiques de la Team Magma.\nElle résiste à tous les chocs."
    it: "Tuta altamente tecnologica costruita dal Team Magma,\nin grado di resistere a qualunque shock."
    de: "Ein Anzug, der unter Einsatz des gesamten technischen\nWissens von Team Magma entstand. Hält jeder Art von\nErschütterung stand."
    es: "Este traje es el resultado de las arduas investigaciones\ncientíficas del Equipo Magma. Es capaz de soportar\ncualquier impacto."
    ko: "마그마단이 과학기술을\n결집하여 만든 슈트다.\n어떠한 충격에도 견딜 수 있다."
    zh_simp: "集熔岩队科学技术于一身的服装。\n能承受任何冲击。"
    zh_trad: "集結了熔岩隊的\n科學技術製造的服裝。\n能承受任何衝擊。"
