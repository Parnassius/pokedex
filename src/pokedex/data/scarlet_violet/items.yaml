kings_leaf:
  names:
    jp_kana: キングリーフ
    jp_kanji: キングリーフ
    en: King’s Leaf
    fr: Herbe Souveraine
    it: Foglia regina
    de: Königsblatt
    es: Hierba Regia
    ko: 킹리프
    zh_simp: 皇叶
    zh_trad: 皇葉
  descriptions:
    jp_kana: "光り輝くハーブの王様。\nくすりの材料とあわせることで\n回復効果を高める。"
    jp_kanji: "光り輝くハーブの王様。\nくすりの材料とあわせることで\n回復効果を高める。"
    en: "The king of herbs, glittering and brilliant. Combining\nthis herb with other materials needed to make medicines\nwill boost their efficacy."
    fr: "Surnommée « la reine des herbes », elle scintille joliment.\nLa mélanger à d’autres ressources permet d’augmenter\nl’efficacité des préparations médicinales."
    it: "Pianta scintillante considerata la regina delle erbe.\nSe combinata con altri ingredienti medicinali, ne\naumenta l’efficacia."
    de: "Diese funkelnde Pflanze gilt als König aller Kräuter.\nIn Verbindung mit medizinischen Zutaten steigert es\nderen heilende Wirkung."
    es: "Hierba brillante, conocida como la reina de las hierbas,\nque se mezcla con otros ingredientes medicinales para\npotenciar la eficacia curativa de estos."
    ko: "눈부시게 빛나는 허브의 왕.\n약재와 조합하면\n회복 효과가 높아진다."
    zh_simp: "闪耀着光辉的香草之王。\n与药物的材料配合，\n可以提高其回复效果。"
    zh_trad: "閃耀著光輝的香草之王。\n與藥物的材料配合，\n可以提高其回復效果。"
kings_rock:
  names:
    jp_kana: おうじゃのしるし
    jp_kanji: おうじゃのしるし
    en: King’s Rock
    fr: Roche Royale
    it: Roccia di re
    de: King-Stein
    es: Roca del Rey
    ko: 왕의징표석
    zh_simp: 王者之证
    zh_trad: 王者之證
  descriptions:
    jp_kana: "持たせると　攻撃して\nダメージを　与えたときに\n相手を　ひるませることが　ある。"
    jp_kanji: "持たせると　攻撃して\nダメージを　与えたときに\n相手を　ひるませることが　ある。"
    en: "An item to be held by a Pokémon. It may cause the\ntarget to flinch whenever the holder successfully inflicts\ndamage on them with an attack."
    fr: "Objet à tenir. Peut apeurer l’ennemi lorsque le porteur\nlui inflige des dégâts."
    it: "Strumento da dare a un Pokémon. Se chi ce l’ha infligge\ndanni con un attacco, può far tentennare l’avversario."
    de: "Ein Item zum Tragen. Trifft der Träger das Ziel mit einem\nAngriff, der Schaden verursacht, schreckt es eventuell\nzurück."
    es: "El Pokémon que la lleva puede amedrentar al objetivo\nal que inflige daño con un ataque."
    ko: "지니게 하면\n공격해서 데미지를 줄 때\n상대를 풀죽이기도 한다."
    zh_simp: "携带后进行攻击，\n在造成伤害时，\n有时会让对手畏缩。"
    zh_trad: "攜帶後進行攻擊，\n並造成傷害時，\n有時會讓對手畏縮。"
kiwi:
  names:
    jp_kana: わぎりキウイ
    jp_kanji: わぎりキウイ
    en: Kiwi
    fr: Kiwi
    it: Kiwi
    de: Kiwi
    es: Kiwi
    ko: 키위슬라이스
    zh_simp: 奇异果片
    zh_trad: 奇異果片
  descriptions:
    jp_kana: "酸味が　強い　食材。\n強い酸味と　軽い甘みが　ある。\n脂っこい食材と　相性が　よい。"
    jp_kanji: "酸味が　強い　食材。\n強い酸味と　軽い甘みが　ある。\n脂っこい食材と　相性が　よい。"
    en: "A very tart ingredient that has a light touch of sweetness\nas well. It goes well with rich ingredients."
    fr: "Un ingrédient au goût très acide. Son acidité est adoucie\npar une touche sucrée qui en fait l’accompagnement\nidéal des ingrédients plus riches."
    it: "Un ingrediente molto aspro, ma con un leggero tocco\ndi dolcezza. Si abbina bene con gli ingredienti grassi."
    de: "Diese sehr saure Zutat besitzt zudem eine leichte Süße,\nweshalb sie gut mit fettigen Zutaten harmoniert."
    es: "Una fruta de sabor muy ácido, pero con un ligero toque\ndulce. Complementa muy bien los ingredientes con alto\ncontenido graso."
    ko: "신맛이 강한 식재료.\n강한 신맛과 가벼운 단맛이 난다.\n느끼한 식재료와 궁합이 잘 맞는다."
    zh_simp: "酸味强烈的食材。\n带有很强酸味和淡淡的甜味。\n与油腻的食材很搭配。"
    zh_trad: "酸味強勁的食材。\n此外還帶有些許甘甜，\n和油膩的食材相當搭配。"
klawf_claw:
  names:
    jp_kana: ガケガニのハサミ
    jp_kanji: ガケガニのハサミ
    en: Klawf Claw
    fr: Pince de Craparoi
    it: Chela di Klawf
    de: Klibbe-Schere
    es: Pinza de Klawf
    ko: 절벼게의집게
    zh_simp: 毛崖蟹的钳子
    zh_trad: 毛崖蟹的鉗子
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
klawf_stick:
  names:
    jp_kana: ガケガニスティック
    jp_kanji: ガケガニスティック
    en: Klawf Stick
    fr: Bâtonnet de Craparoi
    it: Surimi di Klawf
    de: Klibbe-Stick
    es: Surimi de Klawf
    ko: 절벼게맛살
    zh_simp: 毛崖蟹棒
    zh_trad: 毛崖蟹棒
  descriptions:
    jp_kana: "甘味と　塩味が　強い　食材。\nガケガニの　脱皮したあとの　殻のエキスが\n配合された　ヘルシーな　加工食品。"
    jp_kanji: "甘味と　塩味が　強い　食材。\nガケガニの　脱皮したあとの　殻のエキスが\n配合された　ヘルシーな　加工食品。"
    en: "A very sweet and salty ingredient. It’s a nutritious\nprocessed food made with a concentrate derived from\nshed Klawf shells."
    fr: "Un ingrédient au goût très salé et sucré. Une préparation\nindustrielle saine créée à partir d’une substance extraite\ndes carapaces laissées par des Craparoi après leur mue."
    it: "Un ingrediente molto dolce e salato. È un cibo nutriente\nottenuto tramite processo industriale dall’essenza\nestratta dai carapaci lasciati dai Klawf dopo la muta."
    de: "Ein industriell verarbeitetes Lebensmittel, das sehr süß\nund salzig ist. Diese nahrhafte Zutat ist mit einem\nKonzentrat aus abgeworfenen Klibbe-Schalen versetzt."
    es: "Un nutritivo alimento procesado con un fuerte sabor\ndulce y salado a la vez, elaborado a partir del extracto\nde las mudas de caparazón de Klawf."
    ko: "단맛과 짠맛이 강한 식재료.\n절벼게의 탈피하고 남은 껍데기의 진액을\n배합해서 만든 건강한 가공식품."
    zh_simp: "甜味和咸味强烈的食材。\n由毛崖蟹脱下的壳的萃取物\n调制而成的健康加工食品。"
    zh_trad: "甜味和鹹味強勁的食材。\n加入了由毛崖蟹脫下的殼提煉之精華，\n是有益健康的加工食品。"
klefki_key:
  names:
    jp_kana: クレッフィのかぎ
    jp_kanji: クレッフィのかぎ
    en: Klefki Key
    fr: Clé de Trousselin
    it: Chiave di Klefki
    de: Clavion-Schlüssel
    es: Llave de Klefki
    ko: 클레피의열쇠
    zh_simp: 钥圈儿的钥匙
    zh_trad: 鑰圈兒的鑰匙
  descriptions:
