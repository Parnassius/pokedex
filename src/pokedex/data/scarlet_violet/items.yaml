tmv_pass:
  names:
    jp_kana: ＴＭＶパス
    jp_kanji: ＴＭＶパス
    en: TMV Pass
    fr: Passe TMV
    it: Pass TMV
    de: TMV-Pass
    es: Abono del TMV
    ko: TMV패스
    zh_simp: ＴＭＶ自由票
    zh_trad: ＴＭＶ自由票
  descriptions:
    jp_kana: "ミアレシティと　キナンシティを\n結ぶ　超高速鉄道に\nいつでも　乗れる　チケット。"
    jp_kanji: "ミアレシティと　キナンシティを\n結ぶ　超高速鉄道に\nいつでも　乗れる　チケット。"
    en: "A commuter pass that allows the holder to ride the\nTMV between Lumiose City and Kiloude City at\nany time."
    fr: "Un abonnement à vie à la ligne de TMV qui relie\nIllumis à Batisques."
    it: "Biglietto che permette di salire liberamente sul treno\na megavelocità che collega Luminopoli e Batikopoli."
    de: "Mit dieser Fahrkarte kannst du jederzeit den\nHochgeschwindigkeitszug nehmen, der zwischen\nIllumina City und Batika City verkehrt."
    es: "Pase que permite realizar viajes ilimitados en el TMV\nque une las ciudades de Luminalia y Batik."
    ko: "미르시티와 기남시티를 잇는\n초고속철도를 언제든지\n탈 수 있는 티켓."
    zh_simp: "可以随时乘坐连接着\n密阿雷市和奇楠市的\n超高速列车的车票。"
    zh_trad: "可以隨時乘坐連接著\n密阿雷市和奇楠市的\n超高速列車的車票。"
toedscool_flaps:
  names:
    jp_kana: ノノクラゲのヒラヒラ
    jp_kanji: ノノクラゲのヒラヒラ
    en: Toedscool Flaps
    fr: Membrane de Terracool
    it: Pieghe di Toedscool
    de: Tentagra-Lamelle
    es: Pliegue de Toedscool
    ko: 들눈해의갓
    zh_simp: 原野水母的薄片
    zh_trad: 原野水母的薄片
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
tofu:
  names:
    jp_kana: トーフ
    jp_kanji: トーフ
    en: Tofu
    fr: Tofu
    it: Tofu
    de: Tofu
    es: Tofu
    ko: 두부
    zh_simp: 豆腐
    zh_trad: 豆腐
  descriptions:
    jp_kana: "甘味が　ある　食材。\n生の豆腐。　サンドウィッチの\n具材として　可能性は　未知数。"
    jp_kanji: "甘味が　ある　食材。\n生の豆腐。　サンドウィッチの\n具材として　可能性は　未知数。"
    en: "An ingredient with a touch of sweetness. It’s unclear how\nwell this raw block of tofu will serve as a sandwich filling."
    fr: "Un ingrédient au goût sucré. Ce morceau de tofu cru\noffre au Sandwich auquel on l’ajoute des possibilités\ngustatives infinies."
    it: "Un ingrediente dolce. Le possibilità offerte come\ncompanatico da questo tofu fresco non sono ancora\nstate esplorate a fondo."
    de: "Eine süßliche Zutat. Mit der Verwendung von frischem\nTofu als Sandwichbelag betritt man in kulinarischer\nHinsicht absolutes Neuland."
    es: "El sabor sencillo y dulzón del tofu fresco abre la puerta\na una infinidad de posibilidades como relleno de\nbocadillo hasta ahora desconocidas."
    ko: "단맛이 나는 식재료.\n생두부다. 샌드위치 재료로서의\n가능성은 미지수다."
    zh_simp: "带有甜味的食材。\n生豆腐。作为三明治\n馅料的潜力还是未知数。"
    zh_trad: "帶有甜味的食材。\n生的豆腐。以三明治的材料而言，\n其可能性仍未可知。"
tomato:
  names:
    jp_kana: トマトスライス
    jp_kanji: トマトスライス
    en: Tomato
    fr: Tomate
    it: Pomodoro
    de: Tomate
    es: Tomate
    ko: 토마토슬라이스
    zh_simp: 番茄片
    zh_trad: 番茄片
  descriptions:
    jp_kana: "酸味が　強い　食材。\nうま味の成分を　多く　含んでいるので\nいろんなポケモンに　人気なのだ。"
    jp_kanji: "酸味が　強い　食材。\nうま味の成分を　多く　含んでいるので\nいろんなポケモンに　人気なのだ。"
    en: "This very tart ingredient has a lot of savory elements\nto it, making it popular with many Pokémon."
    fr: "Un ingrédient au goût très acide. Très apprécié par\ndivers Pokémon grâce à plusieurs éléments lui donnant\nune saveur umami unique."
    it: "Un ingrediente molto aspro, amato da tanti Pokémon\nper via della sapidità di molte delle sostanze che\ncontiene."
    de: "Eine sehr saure Zutat, die durch ihre zahlreichen umami\nKomponenten bei vielen Pokémon hoch im Kurs steht."
    es: "Tiene un fuerte sabor ácido, pero también un toque\numami que lo hace muy popular entre los Pokémon."
    ko: "신맛이 강한 식재료.\n감칠맛이 나는 성분을 많이 포함하고 있어서\n다양한 포켓몬에게 인기가 많다."
    zh_simp: "酸味强烈的食材。\n含有许多鲜味成分，\n所以受到各种宝可梦欢迎。"
    zh_trad: "酸味強勁的食材。\n富含帶有鮮味的成分，\n所以受到許多寶可夢的喜愛。"
torkoal_coal:
  names:
    jp_kana: コータスのせきたん
    jp_kanji: コータスのせきたん
    en: Torkoal Coal
    fr: Charbon de Chartor
    it: Carbone di Torkoal
    de: Qurtel-Kohle
    es: Carbón de Torkoal
    ko: 코터스의석탄
    zh_simp: 煤炭龟的煤炭
    zh_trad: 煤炭龜的煤炭
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
torn_journal:
  names:
    jp_kana: やぶれたにっき
    jp_kanji: やぶれたにっき
    en: Torn Journal
    fr: Journal Déchiré
    it: Diario rovinato
    de: Kaputtes Journal
    es: Diario Rasgado
    ko: 찢어진일기
    zh_simp: 破损日记
    zh_trad: 破損日記
  descriptions:
    jp_kana: "古びた和とじの日記。\n破れており後半のページが抜けている。"
    jp_kanji: "古びた和とじの日記。\n破れており後半のページが抜けている。"
    en: "An old, stab-bound diary in a traditional style. It has\nbeen torn and is missing the latter half of its pages."
    fr: "Un vieux journal relié selon une méthode traditionnelle.\nIl est déchiré et il manque la moitié des pages."
    it: "Antico diario rilegato in modo tradizionale. È alquanto\nmalconcio e mancano le pagine da metà in poi."
    de: "Ein altes, fadengebundenes Tagebuch. Es ist ziemlich\nramponiert und die zweite Hälfte der Seiten fehlt."
    es: "Diario antiguo y ajado, con una encuadernación clásica,\nal que le han arrancado las últimas hojas."
    ko: "옛날 방식으로 제본된 일기.\n찢어져서 후반 페이지가 빠져 있다."
    zh_simp: "陈旧的线装日记本。\n日记本破损严重，\n缺少了后半的书页。"
    zh_trad: "陳舊的線裝日記本。\n日記本破損嚴重，\n缺少了後半的書頁。"
tough_candy:
  names:
    jp_kana: まもりのアメ
    jp_kanji: まもりのアメ
    en: Tough Candy
    fr: Bonbon Armure S
    it: Caramella protezione S
    de: Robustbonbon
    es: Caramelo Aguante
    ko: 수비의사탕
    zh_simp: 守护糖果
    zh_trad: 守護糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nポケモンの　ぼうぎょを　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\nポケモンの　ぼうぎょを　上げる。"
    en: "A candy that is packed with energy. When given to\na Pokémon, it will increase that Pokémon’s Defense stat."
    fr: "Un bonbon plein d’énergie.\nIl augmente la Défense d’un Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta la Difesa di un Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\ndie Verteidigung eines Pokémon."
    es: "Caramelo energético que aumenta la Defensa del\nPokémon."
    ko: "에너지가 가득한 사탕.\n포켓몬의 방어를 올린다."
    zh_simp: "充满能量的糖果。\n能提高宝可梦的防御。"
    zh_trad: "充滿能量的糖果。\n能提高寶可夢的防禦。"
tough_candy_l:
  names:
    jp_kana: まもりのアメＬ
    jp_kanji: まもりのアメＬ
    en: Tough Candy L
    fr: Bonbon Armure M
    it: Caramella protezione M
    de: Robustbonbon+
    es: Caramelo Aguante +
    ko: 수비의사탕L
    zh_simp: 守护糖果Ｌ
    zh_trad: 守護糖果Ｌ
  descriptions:
    jp_kana: "エネルギーの　つまった　大きい　アメ。\nレベル３０　以上の　ポケモンの\nぼうぎょを　上げる。"
    jp_kanji: "エネルギーの　つまった　大きい　アメ。\nレベル３０　以上の　ポケモンの\nぼうぎょを　上げる。"
    en: "A big candy that is packed with energy. When given to\na Pokémon at Lv. 30 or higher, it will increase\nthat Pokémon’s Defense stat."
    fr: "Un gros bonbon plein d’énergie.\nIl augmente la Défense d’un Pokémon de niveau 30\nou supérieur."
    it: "Una caramella grande piena zeppa di energia.\nAumenta la Difesa di un Pokémon di livello 30\no superiore."
    de: "Ein großes Bonbon, das voller Energie steckt.\nErhöht dauerhaft die Verteidigung eines Pokémon ab\nLevel 30."
    es: "Caramelo energético grande que aumenta la Defensa\nde un Pokémon de Nv. 30 o superior."
    ko: "에너지가 가득한 큰 사탕.\n레벨 30 이상인 포켓몬의\n방어를 올린다."
    zh_simp: "充满能量的大糖果。\n能让等级３０以上的\n宝可梦的防御上升。"
    zh_trad: "充滿能量的大糖果。\n能提高等級在３０以上的\n寶可夢的防禦。"
tough_candy_xl:
  names:
    jp_kana: まもりのアメＸＬ
    jp_kanji: まもりのアメＸＬ
    en: Tough Candy XL
    fr: Bonbon Armure L
    it: Caramella protezione L
    de: Robustbonbon++
    es: Caramelo Aguante ++
    ko: 수비의사탕XL
    zh_simp: 守护糖果ＸＬ
    zh_trad: 守護糖果ＸＬ
  descriptions:
    jp_kana: "エネルギーの　つまった　特大の　アメ。\nレベル６０　以上の　ポケモンの\nぼうぎょを　上げる。"
    jp_kanji: "エネルギーの　つまった　特大の　アメ。\nレベル６０　以上の　ポケモンの\nぼうぎょを　上げる。"
    en: "A huge candy that is packed with energy. When given\nto a Pokémon at Lv. 60 or higher, it will increase\nthat Pokémon’s Defense stat."
    fr: "Un énorme bonbon plein d’énergie.\nIl augmente la Défense d’un Pokémon de niveau 60\nou supérieur."
    it: "Una caramella enorme piena zeppa di energia.\nAumenta la Difesa di un Pokémon di livello 60\no superiore."
    de: "Ein riesiges Bonbon, das voller Energie steckt.\nErhöht dauerhaft die Verteidigung eines Pokémon ab\nLevel 60."
    es: "Caramelo energético enorme que aumenta la Defensa\nde un Pokémon de Nv. 60 o superior."
    ko: "에너지가 가득한 매우 큰 사탕.\n레벨 60 이상인 포켓몬의\n방어를 올린다."
    zh_simp: "充满能量的超大糖果。\n能让等级６０以上的\n宝可梦的防御上升。"
    zh_trad: "充滿能量的特大糖果。\n能提高等級在６０以上的\n寶可夢的防禦。"
town_map:
  names:
    jp_kana: タウンマップ
    jp_kanji: タウンマップ
    en: Town Map
    fr: Carte
    it: Mappa città
    de: Karte
    es: Mapa
    ko: 타운맵
    zh_simp: 城镇地图
    zh_trad: 城鎮地圖
  descriptions:
    jp_kana: "いつでも　手軽に　みることが\nできる　便利な　地図。\n自分の　場所も　わかる。"
    jp_kanji: "いつでも　手軽に　みることが\nできる　便利な　地図。\n自分の　場所も　わかる。"
    en: "A very convenient map that can be viewed anytime.\nIt even shows you your present location in the region."
    fr: "Une carte très pratique pouvant être consultée\nn’importe quand. Elle indique la position actuelle."
    it: "Utilissima mappa, consultabile in ogni situazione.\nMostra anche la propria posizione in tempo reale."
    de: "Eine praktische Karte, die jederzeit aufgerufen werden\nkann. Dein aktueller Standort wird auch angezeigt."
    es: "Un mapa muy útil que puede consultarse en cualquier\nmomento y que, además, te indica dónde te encuentras."
    ko: "언제라도 간편하게 볼 수\n있는 편리한 지도.\n자신이 있는 곳도 알 수 있다."
    zh_simp: "可以随时轻松\n查看的便利地图。\n也能清楚自己的位置。"
    zh_trad: "可以隨時輕鬆\n查看的好用地圖。\n也能知道自己的位置。"
toxel_sparks:
  names:
    jp_kana: エレズンのでんき
    jp_kanji: エレズンのでんき
    en: Toxel Sparks
    fr: Électricité de Toxizap
    it: Elettricità di Toxel
    de: Toxel-Strom
    es: Electricidad de Toxel
    ko: 일레즌의전기
    zh_simp: 电音婴的电力
    zh_trad: 毒電嬰的電力
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
toxic_orb:
  names:
    jp_kana: どくどくだま
    jp_kanji: どくどくだま
    en: Toxic Orb
    fr: Orbe Toxique
    it: Tossicsfera
    de: Toxik-Orb
    es: Toxisfera
    ko: 맹독구슬
    zh_simp: 剧毒宝珠
    zh_trad: 劇毒寶珠
  descriptions:
    jp_kana: "触ると　毒をだす　不思議な玉。\n持たせると　戦闘中に\n猛毒の状態に　なる。"
    jp_kanji: "触ると　毒をだす　不思議な玉。\n持たせると　戦闘中に\n猛毒の状態に　なる。"
    en: "An item to be held by a Pokémon. It’s a bizarre orb that\nexudes toxins when touched and will badly poison the\nholder during battle."
    fr: "Objet à tenir. Un orbe bizarre qui empoisonne\ngravement son porteur durant le combat."
    it: "Strumento da dare a un Pokémon. Sfera bizzarra\nche iperavvelena chi l’ha con sé in una lotta."
    de: "Ein Item zum Tragen. Dieser bizarre Orb vergiftet\nseinen Träger im Kampf schwer."
    es: "Extraña esfera que envenena gravemente al Pokémon\nque la lleva en combate."
    ko: "만지면 독을 발산하는 이상한 구슬.\n지니게 하면 배틀 중에\n맹독 상태가 된다."
    zh_simp: "触碰后会放出毒的神奇宝珠。\n携带后，在战斗时会变成剧毒状态。"
    zh_trad: "觸碰後會放出毒的神奇寶珠。\n攜帶後，在戰鬥時\n會變成劇毒狀態。"
toxic_plate:
  names:
    jp_kana: もうどくプレート
    jp_kanji: もうどくプレート
    en: Toxic Plate
    fr: Plaque Toxicité
    it: Lastrafiele
    de: Gifttafel
    es: Tabla Tóxica
    ko: 맹독플레이트
    zh_simp: 剧毒石板
    zh_trad: 劇毒石板
  descriptions:
    jp_kana: "どくのタイプの　石盤。\n持たせると　どくタイプの\n技の威力が　強まる。"
    jp_kanji: "どくのタイプの　石盤。\n持たせると　どくタイプの\n技の威力が　強まる。"
    en: "An item to be held by a Pokémon. This stone tablet is\nimbued with the essence of poison and boosts the power\nof the holder’s Poison-type moves."
    fr: "Objet à tenir. Une tablette en pierre augmentant\nla puissance des capacités de type Poison."
    it: "Strumento da dare a un Pokémon. Lastra di pietra che\npotenzia le mosse di tipo Veleno."
    de: "Ein Item zum Tragen. Diese Steintafel verstärkt\nAttacken vom Typ Gift."
    es: "Tabla de piedra que potencia los movimientos de tipo\nVeneno. Debe llevarla un Pokémon."
    ko: "독타입의 석판.\n지니게 하면 독타입\n기술의 위력이 강해진다."
    zh_simp: "毒属性的石板。\n携带后，毒属性的\n招式威力就会增强。"
    zh_trad: "毒屬性的石板。\n攜帶後，毒屬性的\n招式威力就會增強。"
tr00:
  names:
    jp_kana: わざレコード００
    jp_kanji: わざレコード００
    en: TR00
    fr: DT00
    it: DT00
    de: TP00
    es: DT00
    ko: 기술레코드00
    zh_simp: 招式记录００
    zh_trad: 招式紀錄００
  descriptions:
    jp_kana: "戦いの舞を　激しく　おどって\n気合を　高める。\n自分の　攻撃を　ぐーんと　あげる。"
    jp_kanji: "戦いの舞を　激しく　おどって\n気合を　高める。\n自分の　攻撃を　ぐーんと　あげる。"
    en: "A frenetic dance to uplift the fighting spirit.\nThis sharply raises the user’s Attack stat."
    fr: "Une danse frénétique qui exalte l’esprit combatif.\nAugmente beaucoup l’Attaque du lanceur."
    it: "Danza frenetica che incrementa lo spirito\ncombattivo. Chi la usa aumenta di molto\nil suo Attacco."
    de: "Ein wilder Tanz, der den Kampfgeist wecken soll.\nDer Angriffs-Wert des Anwenders wird stark erhöht."
    es: "Este frenético baile de combate eleva el espíritu y\naumenta mucho el Ataque."
    ko: "싸움의 춤을 격렬하게 춰서\n기세를 높인다.\n자신의 공격을 크게 올린다."
    zh_simp: "激烈地跳起战舞提高气势。\n大幅提高自己的攻击。"
    zh_trad: "激烈地跳起戰舞提升氣勢，\n大幅提高自己的攻擊。"
tr01:
  names:
    jp_kana: わざレコード０１
    jp_kanji: わざレコード０１
    en: TR01
    fr: DT01
    it: DT01
    de: TP01
    es: DT01
    ko: 기술레코드01
    zh_simp: 招式记录０１
    zh_trad: 招式紀錄０１
  descriptions:
    jp_kana: "全身で\n相手に　のしかかり　攻撃する。\nまひ状態に　することが　ある。"
    jp_kanji: "全身で\n相手に　のしかかり　攻撃する。\nまひ状態に　することが　ある。"
    en: "The user drops onto the target with its full body\nweight. This may also leave the target with paralysis."
    fr: "Le lanceur se laisse tomber sur la cible de tout\nson poids, ce qui peut aussi la paralyser."
    it: "Il Pokémon attacca il bersaglio scagliandosi contro di lui\ncon tutto il corpo. Può causarne anche la paralisi."
    de: "Trifft das Ziel mit vollem Körpereinsatz und paralysiert\nes eventuell."
    es: "Salta sobre el objetivo con todo su peso y puede llegar\na paralizarlo."
    ko: "몸 전체로\n상대를 덮쳐눌러 공격한다.\n마비 상태로 만들 때가 있다."
    zh_simp: "用整个身体\n压住对手进行攻击。\n有时会让对手陷入麻痹状态。"
    zh_trad: "用整個身體\n壓住對手進行攻擊。\n有時會讓對手陷入麻痺狀態。"
tr02:
  names:
    jp_kana: わざレコード０２
    jp_kanji: わざレコード０２
    en: TR02
    fr: DT02
    it: DT02
    de: TP02
    es: DT02
    ko: 기술레코드02
    zh_simp: 招式记录０２
    zh_trad: 招式紀錄０２
  descriptions:
    jp_kana: "激しい　炎を\n相手に　発射して　攻撃する。\nやけど状態に　することが　ある。"
    jp_kanji: "激しい　炎を\n相手に　発射して　攻撃する。\nやけど状態に　することが　ある。"
    en: "The target is scorched with an intense blast of fire.\nThis may also leave the target with a burn."
    fr: "La cible reçoit un torrent de flammes qui peut aussi\nla brûler."
    it: "Il Pokémon attacca il bersaglio lanciando intense\nfiammate che possono anche scottarlo."
    de: "Starke Feuer-Attacke, durch die das Ziel eventuell\nVerbrennungen erleidet."
    es: "Ataca con una gran ráfaga de fuego que puede causar\nquemaduras."
    ko: "세찬 불꽃을\n상대에게 발사하여 공격한다.\n화상 상태로 만들 때가 있다."
    zh_simp: "向对手发射烈焰进行攻击。\n有时会让对手陷入灼伤状态。"
    zh_trad: "向對手發射\n強烈火焰進行攻擊。\n有時會讓對手陷入灼傷狀態。"
tr03:
  names:
    jp_kana: わざレコード０３
    jp_kanji: わざレコード０３
    en: TR03
    fr: DT03
    it: DT03
    de: TP03
    es: DT03
    ko: 기술레코드03
    zh_simp: 招式记录０３
    zh_trad: 招式紀錄０３
  descriptions:
    jp_kana: "大量の　水を\n激しい　勢いで\n相手に　発射して　攻撃する。"
    jp_kanji: "大量の　水を\n激しい　勢いで\n相手に　発射して　攻撃する。"
    en: "The target is blasted by a huge volume of water\nlaunched under great pressure."
    fr: Un puissant jet d’eau est dirigé sur la cible.
    it: "Il Pokémon attacca il bersaglio travolgendolo con un\npotente getto d’acqua spruzzato ad altissima pressione."
    de: Spritzt eine Menge Wasser mit Hochdruck auf das Ziel.
    es: Lanza una gran masa de agua a presión para atacar.
    ko: "대량의 물을\n세찬 기세로\n상대에게 발사하여 공격한다."
    zh_simp: "向对手猛烈地\n喷射大量水流进行攻击。"
    zh_trad: "向對手猛烈地噴射\n大量水流進行攻擊。"
tr04:
  names:
    jp_kana: わざレコード０４
    jp_kanji: わざレコード０４
    en: TR04
    fr: DT04
    it: DT04
    de: TP04
    es: DT04
    ko: 기술레코드04
    zh_simp: 招式记录０４
    zh_trad: 招式紀錄０４
  descriptions:
    jp_kana: "大きな　波で　自分の\n周りに　いるものを　攻撃する。"
    jp_kanji: "大きな　波で　自分の\n周りに　いるものを　攻撃する。"
    en: "The user attacks everything around it by swamping\nits surroundings with a giant wave."
    fr: "Une énorme vague s’abat sur le champ de bataille\net inflige des dégâts à tous les Pokémon autour\ndu lanceur."
    it: "Chi la usa attacca gli altri Pokémon attorno con un’onda\nenorme."
    de: "Anwender greift mit einer gewaltigen Welle\nalle Pokémon im Umkreis an."
    es: "Inunda el terreno de combate con una ola gigante\nque golpea a los Pokémon adyacentes."
    ko: "큰 파도로 자신의\n주위에 있는 포켓몬을 공격한다."
    zh_simp: "利用大浪\n攻击自己周围所有的宝可梦。"
    zh_trad: "使用大浪\n攻擊自己周圍所有的寶可夢。"
tr05:
  names:
    jp_kana: わざレコード０５
    jp_kanji: わざレコード０５
    en: TR05
    fr: DT05
    it: DT05
    de: TP05
    es: DT05
    ko: 기술레코드05
    zh_simp: 招式记录０５
    zh_trad: 招式紀錄０５
  descriptions:
    jp_kana: "凍える　ビームを\n相手に　発射して　攻撃する。\nこおり状態に　することが　ある。"
    jp_kanji: "凍える　ビームを\n相手に　発射して　攻撃する。\nこおり状態に　することが　ある。"
    en: "The target is struck with an icy-cold beam of energy.\nThis may also leave the target frozen."
    fr: "Un rayon de glace frappe la cible, ce qui peut aussi\nla geler."
    it: "Il Pokémon attacca il bersaglio con un raggio di energia\ngelida che può anche congelarlo."
    de: "Das Ziel wird von einem Eisstrahl getroffen und friert\neventuell ein."
    es: Rayo de hielo que puede llegar a congelar.
    ko: "냉동빔을\n상대에게 발사하여 공격한다.\n얼음 상태로 만들 때가 있다."
    zh_simp: "向对手发射冰冻光束进行攻击。\n有时会让对手陷入冰冻状态。"
    zh_trad: "向對手發射\n冰凍光束進行攻擊。\n有時會讓對手陷入冰凍狀態。"
tr06:
  names:
    jp_kana: わざレコード０６
    jp_kanji: わざレコード０６
    en: TR06
    fr: DT06
    it: DT06
    de: TP06
    es: DT06
    ko: 기술레코드06
    zh_simp: 招式记录０６
    zh_trad: 招式紀錄０６
  descriptions:
    jp_kana: "激しい　吹雪を\n相手に　吹きつけて　攻撃する。\nこおり状態に　することが　ある。"
    jp_kanji: "激しい　吹雪を\n相手に　吹きつけて　攻撃する。\nこおり状態に　することが　ある。"
    en: "A howling blizzard is summoned to strike opposing\nPokémon. This may also leave the opposing\nPokémon frozen."
    fr: "Une violente tempête de neige s’abat sur la cible,\nce qui peut aussi la geler."
    it: "Il Pokémon attacca il bersaglio con una tremenda\ntempesta di ghiaccio che può anche congelarlo."
    de: "Ein Schneesturm wütet, der gegnerische Pokémon\neinfrieren kann."
    es: Tormenta de hielo que puede llegar a congelar.
    ko: "세찬 눈보라를\n상대에게 내뿜어 공격한다.\n얼음 상태로 만들 때가 있다."
    zh_simp: "将猛烈的暴风雪\n刮向对手进行攻击。\n有时会让对手陷入冰冻状态。"
    zh_trad: "將猛烈的暴風雪\n吹向對手進行攻擊。\n有時會讓對手陷入冰凍狀態。"
tr07:
  names:
    jp_kana: わざレコード０７
    jp_kanji: わざレコード０７
    en: TR07
    fr: DT07
    it: DT07
    de: TP07
    es: DT07
    ko: 기술레코드07
    zh_simp: 招式记录０７
    zh_trad: 招式紀錄０７
  descriptions:
    jp_kana: "足を　強く　けり\n相手を　転ばせて　攻撃する。\n相手が　重いほど　威力が　あがる。"
    jp_kanji: "足を　強く　けり\n相手を　転ばせて　攻撃する。\n相手が　重いほど　威力が　あがる。"
    en: "A powerful low kick that makes the target fall over.\nThe heavier the target, the greater the move’s power."
    fr: "Un grand coup de pied bas qui fauche la cible.\nPlus celle-ci est lourde, plus la puissance de\ncette capacité augmente."
    it: "Il Pokémon attacca il bersaglio con un calcio basso e\npotente che lo fa cadere. Più il bersaglio è pesante,\nmaggiore è la potenza della mossa."
    de: "Ein Tritt, der das Ziel umwirft. Je schwerer das Ziel ist,\ndesto mehr Schaden fügt ihm die Attacke zu."
    es: "Patada baja que derriba al objetivo. Cuanto más pesa\neste, más daño le causa."
    ko: "발을 강하게 걸고\n상대를 넘어뜨려 공격한다.\n상대가 무거울수록 위력이 올라간다."
    zh_simp: "用力踢对手的脚，\n使其摔倒进行攻击。\n对手越重，威力越大。"
    zh_trad: "用力踢對手的腳，\n讓對手摔倒進行攻擊。\n對手越重，威力越大。"
tr08:
  names:
    jp_kana: わざレコード０８
    jp_kanji: わざレコード０８
    en: TR08
    fr: DT08
    it: DT08
    de: TP08
    es: DT08
    ko: 기술레코드08
    zh_simp: 招式记录０８
    zh_trad: 招式紀錄０８
  descriptions:
    jp_kana: "強い　電撃を\n相手に　浴びせて　攻撃する。\nまひ状態に　することが　ある。"
    jp_kanji: "強い　電撃を\n相手に　浴びせて　攻撃する。\nまひ状態に　することが　ある。"
    en: "A strong electric blast crashes down on the target.\nThis may also leave the target with paralysis."
    fr: "Une grosse décharge électrique tombe sur la cible,\nce qui peut aussi la paralyser."
    it: "Il Pokémon attacca il bersaglio con una potente scarica\nelettrica che può anche paralizzarlo."
    de: "Eine starke Elektro-Attacke, die das Ziel eventuell\nparalysiert."
    es: "Potente ataque eléctrico que puede paralizar al\nobjetivo."
    ko: "강한 전격을\n상대에게 날려서 공격한다.\n마비 상태로 만들 때가 있다."
    zh_simp: "向对手发出强力电击进行攻击。\n有时会让对手陷入麻痹状态。"
    zh_trad: "向對手放出強力電流進行攻擊。\n有時會讓對手陷入麻痺狀態。"
tr09:
  names:
    jp_kana: わざレコード０９
    jp_kanji: わざレコード０９
    en: TR09
    fr: DT09
    it: DT09
    de: TP09
    es: DT09
    ko: 기술레코드09
    zh_simp: 招式记录０９
    zh_trad: 招式紀錄０９
  descriptions:
    jp_kana: "激しい　雷を\n相手に　落として　攻撃する。\nまひ状態に　することが　ある。"
    jp_kanji: "激しい　雷を\n相手に　落として　攻撃する。\nまひ状態に　することが　ある。"
    en: "A wicked thunderbolt is dropped on the target to\ninflict damage. This may also leave the target\nwith paralysis."
    fr: "La foudre tombe sur la cible pour lui infliger\ndes dégâts, ce qui peut aussi la paralyser."
    it: "Il Pokémon attacca il bersaglio con un fulmine molto\nviolento che può anche paralizzarlo."
    de: "Eine verheerende Elektro-Attacke, die das Ziel\neventuell paralysiert."
    es: "Un poderoso rayo que daña al objetivo y puede\nparalizarlo."
    ko: "강한 번개를\n상대에게 떨어뜨려 공격한다.\n마비 상태로 만들 때가 있다."
    zh_simp: "向对手劈下暴雷进行攻击。\n有时会让对手陷入麻痹状态。"
    zh_trad: "向對手劈下暴雷進行攻擊。\n有時會讓對手陷入麻痺狀態。"
tr10:
  names:
    jp_kana: わざレコード１０
    jp_kanji: わざレコード１０
    en: TR10
    fr: DT10
    it: DT10
    de: TP10
    es: DT10
    ko: 기술레코드10
    zh_simp: 招式记录１０
    zh_trad: 招式紀錄１０
  descriptions:
    jp_kana: "地震の　衝撃で　自分の\n周りに　いるものを　攻撃する。"
    jp_kanji: "地震の　衝撃で　自分の\n周りに　いるものを　攻撃する。"
    en: "The user sets off an earthquake that strikes every\nPokémon around it."
    fr: "Le lanceur provoque un tremblement de terre\ntouchant tous les Pokémon autour de lui."
    it: "Chi la usa attacca gli altri Pokémon attorno provocando\nun potente sisma."
    de: "Ein mächtiges Beben, das alle Pokémon im Umkreis\ntrifft."
    es: Un terremoto que afecta a los Pokémon adyacentes.
    ko: "지진의 충격으로 자신의\n주위에 있는 포켓몬을 공격한다."
    zh_simp: "利用地震的冲击，\n攻击自己周围所有的宝可梦。"
    zh_trad: "用地震的衝擊，\n攻擊自己周圍所有的寶可夢。"
tr11:
  names:
    jp_kana: わざレコード１１
    jp_kanji: わざレコード１１
    en: TR11
    fr: DT11
    it: DT11
    de: TP11
    es: DT11
    ko: 기술레코드11
    zh_simp: 招式记录１１
    zh_trad: 招式紀錄１１
  descriptions:
    jp_kana: "強い　念力を　相手に　送って\n攻撃する。　相手の　特防を\nさげることが　ある。"
    jp_kanji: "強い　念力を　相手に　送って\n攻撃する。　相手の　特防を\nさげることが　ある。"
    en: "The target is hit by a strong telekinetic force.\nThis may also lower the target’s Sp. Def stat."
    fr: "Une puissante force télékinétique frappe la cible,\nce qui peut aussi faire baisser sa Défense Spéciale."
    it: "Il Pokémon attacca il bersaglio con una potente forza\ntelecinetica che può anche ridurne la Difesa Speciale."
    de: "Starke Psycho-Attacke, die eventuell die\nSpezial-Verteidigung des Zieles senkt."
    es: "Fuerte ataque telequinético que puede reducir la\nDefensa Especial del objetivo."
    ko: "강한 염동력을 상대에게 보내어\n공격한다. 상대의 특수방어를\n떨어뜨릴 때가 있다."
    zh_simp: "向对手发送强大的念力进行攻击。\n有时会降低对手的特防。"
    zh_trad: "向對手發送\n強大的念力進行攻擊。\n有時會降低對手的特防。"
tr12:
  names:
    jp_kana: わざレコード１２
    jp_kanji: わざレコード１２
    en: TR12
    fr: DT12
    it: DT12
    de: TP12
    es: DT12
    ko: 기술레코드12
    zh_simp: 招式记录１２
    zh_trad: 招式紀錄１２
  descriptions:
    jp_kana: "力を　ぬいて　体を　軽くして\n高速で　動く。\n自分の　素早さを　ぐーんと　あげる。"
    jp_kanji: "力を　ぬいて　体を　軽くして\n高速で　動く。\n自分の　素早さを　ぐーんと　あげる。"
    en: "The user relaxes and lightens its body to move\nfaster. This sharply raises the Speed stat."
    fr: "Le lanceur se relaxe et allège son corps pour beaucoup\naugmenter sa Vitesse."
    it: "Il Pokémon rilassa e alleggerisce il proprio corpo\nper far salire di molto la Velocità."
    de: "Entspannt den Körper, um den Initiative-Wert stark\nzu erhöhen."
    es: "Relaja y aligera el cuerpo para aumentar mucho la\nVelocidad."
    ko: "힘을 빼고 몸을 가볍게 해서\n고속으로 움직인다.\n자신의 스피드를 크게 올린다."
    zh_simp: "让身体放松变得轻盈，\n以便高速移动。\n大幅提高自己的速度。"
    zh_trad: "放鬆身體，\n讓自己變得輕盈以進行高速移動。\n可大幅提高自己的速度。"
tr13:
  names:
    jp_kana: わざレコード１３
    jp_kanji: わざレコード１３
    en: TR13
    fr: DT13
    it: DT13
    de: TP13
    es: DT13
    ko: 기술레코드13
    zh_simp: 招式记录１３
    zh_trad: 招式紀錄１３
  descriptions:
    jp_kana: "深く　息を　吸い　気合を　こめる。\n自分の　攻撃が\n急所に　当たりやすくなる。"
    jp_kanji: "深く　息を　吸い　気合を　こめる。\n自分の　攻撃が\n急所に　当たりやすくなる。"
    en: "The user takes a deep breath and focuses so that\ncritical hits land more easily."
    fr: "Le lanceur prend une profonde inspiration\net se concentre pour augmenter son taux de critiques."
    it: "Il Pokémon fa un profondo respiro e si concentra\nper rendere più probabili i brutti colpi."
    de: "Anwender atmet ein und bündelt Kraft.\nDie Volltrefferquote steigt dadurch."
    es: "Concentra energía para aumentar las posibilidades de\nasestar un golpe crítico."
    ko: "깊게 숨을 들이마셔 기합을 넣는다.\n자신의 공격이\n급소에 맞기 쉬워진다."
    zh_simp: "深深地吸口气，集中精神。\n自己的攻击会变得\n容易击中要害。"
    zh_trad: "深呼吸後集中精神。\n讓自己的攻擊\n變得容易擊中要害。"
tr14:
  names:
    jp_kana: わざレコード１４
    jp_kanji: わざレコード１４
    en: TR14
    fr: DT14
    it: DT14
    de: TP14
    es: DT14
    ko: 기술레코드14
    zh_simp: 招式记录１４
    zh_trad: 招式紀錄１４
  descriptions:
    jp_kana: "指をふり　自分の　脳を　刺激して\nすべての　技の　なかから\nどれか　１つを　くりだす。"
    jp_kanji: "指をふり　自分の　脳を　刺激して\nすべての　技の　なかから\nどれか　１つを　くりだす。"
    en: "The user waggles a finger and stimulates its brain\ninto randomly using nearly any move."
    fr: "Le lanceur agite un doigt et stimule son cerveau pour\nutiliser presque n’importe quelle capacité au hasard."
    it: "Il Pokémon fa di no con il dito e stimola il cervello\na usare a caso una delle tante mosse esistenti."
    de: "Bewegt Finger, um das Gehirn zu stimulieren.\nWählt zufällig eine Attacke aus."
    es: "Mueve un dedo y estimula su cerebro para usar al azar\ncasi cualquier movimiento."
    ko: "손가락을 흔들어 자신의 뇌를\n자극해서 모든 기술 중\n어느 하나를 날린다."
    zh_simp: "挥动手指刺激自己的大脑，\n从所有的招式中\n任意使出１个。"
    zh_trad: "揮動手指刺激自己的大腦，\n從全部的招式中\n隨機選出１招使出。"
tr15:
  names:
    jp_kana: わざレコード１５
    jp_kanji: わざレコード１５
    en: TR15
    fr: DT15
    it: DT15
    de: TP15
    es: DT15
    ko: 기술레코드15
    zh_simp: 招式记录１５
    zh_trad: 招式紀錄１５
  descriptions:
    jp_kana: "大の字の　炎で\n相手を　焼きつくす。\nやけど状態に　することが　ある。"
    jp_kanji: "大の字の　炎で\n相手を　焼きつくす。\nやけど状態に　することが　ある。"
    en: "The target is attacked with an intense blast of\nall-consuming fire. This may also leave the target\nwith a burn."
    fr: "Un déluge de flammes ardentes submerge la cible,\nce qui peut aussi la brûler."
    it: "Investe il bersaglio con un’intensa fiammata\nche fa terra bruciata. Può anche scottarlo."
    de: "Feuersbrunst, die das Ziel versengt und ihm eventuell\nVerbrennungen zufügt."
    es: "Llama intensa que chamusca y puede causar\nquemaduras."
    ko: "큰대자의 불꽃으로\n상대를 불태운다.\n화상 상태로 만들 때가 있다."
    zh_simp: "用大字形状的火焰烧尽对手。\n有时会让对手陷入灼伤状态。"
    zh_trad: "用大字形狀的火焰燒盡對手。\n有時會讓對手陷入灼傷狀態。"
tr16:
  names:
    jp_kana: わざレコード１６
    jp_kanji: わざレコード１６
    en: TR16
    fr: DT16
    it: DT16
    de: TP16
    es: DT16
    ko: 기술레코드16
    zh_simp: 招式记录１６
    zh_trad: 招式紀錄１６
  descriptions:
    jp_kana: "すごい　勢いで　相手に　つっこむ。\n相手を　ひるませることが　ある。"
    jp_kanji: "すごい　勢いで　相手に　つっこむ。\n相手を　ひるませることが　ある。"
    en: "The user charges at the target and may make\nit flinch."
    fr: "Le lanceur charge la cible avec une intensité\nremarquable, ce qui peut l’apeurer."
    it: "Il Pokémon carica il bersaglio a grande velocità e può\nfarlo tentennare."
    de: "Eine mächtige Attacke, durch die das Ziel eventuell\nzurückschreckt."
    es: "Embiste con un gran impulso y puede llegar a\namedrentar al objetivo."
    ko: "굉장한 기세로 상대에게 돌진한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "以惊人的气势扑向对手。\n有时会使对手畏缩。"
    zh_trad: "以驚人的氣勢撲向對手。\n有時會讓對手畏縮。"
tr17:
  names:
    jp_kana: わざレコード１７
    jp_kanji: わざレコード１７
    en: TR17
    fr: DT17
    it: DT17
    de: TP17
    es: DT17
    ko: 기술레코드17
    zh_simp: 招式记录１７
    zh_trad: 招式紀錄１７
  descriptions:
    jp_kana: "頭を　からにして\n一瞬　なにかを　忘れることで\n自分の　特防を　ぐーんと　あげる。"
    jp_kanji: "頭を　からにして\n一瞬　なにかを　忘れることで\n自分の　特防を　ぐーんと　あげる。"
    en: "The user temporarily empties its mind to forget its\nconcerns. This sharply raises the user’s Sp. Def stat."
    fr: "Le lanceur fait le vide dans son esprit pour oublier\nses soucis. Augmente beaucoup sa Défense Spéciale."
    it: "Il Pokémon svuota per un po’ la mente per dimenticare\ni problemi. La Difesa Speciale aumenta di molto."
    de: "Gedächtnisverlust, der die Spezial-Verteidigung\nstark erhöht."
    es: "El usuario olvida sus preocupaciones y aumenta mucho\nla Defensa Especial."
    ko: "머리를 비워서 순간적으로\n무언가를 잊어버림으로써\n자신의 특수방어를 크게 올린다."
    zh_simp: "将头脑清空，\n瞬间忘记某事，\n从而大幅提高自己的特防。"
    zh_trad: "將頭腦清空，\n藉由在一瞬間遺忘某些事\n大幅提高自己的特防。"
tr18:
  names:
    jp_kana: わざレコード１８
    jp_kanji: わざレコード１８
    en: TR18
    fr: DT18
    it: DT18
    de: TP18
    es: DT18
    ko: 기술레코드18
    zh_simp: 招式记录１８
    zh_trad: 招式紀錄１８
  descriptions:
    jp_kana: "血を　吸い取って　相手を\n攻撃する。　与えた　ダメージの\n半分の　ＨＰを　回復できる。"
    jp_kanji: "血を　吸い取って　相手を\n攻撃する。　与えた　ダメージの\n半分の　ＨＰを　回復できる。"
    en: "The user drains the target’s blood. The user’s HP is\nrestored by half the damage taken by the target."
    fr: "Une attaque qui aspire le sang de la cible.\nLa moitié des dégâts sont convertis en PV\npour le lanceur."
    it: "Il Pokémon succhia il sangue del bersaglio e lo attacca,\nrecuperando una quantità di PS pari alla metà del danno\ninflitto."
    de: "Der Anwender saugt dem Ziel Blut ab. Die Hälfte des\nzugefügten Schadens wird dem Anwender als KP\ngutgeschrieben."
    es: "Chupa sangre al objetivo. El usuario recupera la mitad\nde los PS del daño que produce."
    ko: "피를 빨아서 상대를\n공격한다. 준 데미지의\n절반을 HP로 회복한다."
    zh_simp: "吸取血液攻击对手。\n可以回复给予对手伤害的一半ＨＰ。"
    zh_trad: "吸取對手的血液進行攻擊。\n可以回復給予對手\n傷害的一半ＨＰ。"
tr19:
  names:
    jp_kana: わざレコード１９
    jp_kanji: わざレコード１９
    en: TR19
    fr: DT19
    it: DT19
    de: TP19
    es: DT19
    ko: 기술레코드19
    zh_simp: 招式记录１９
    zh_trad: 招式紀錄１９
  descriptions:
    jp_kana: "３つの　光線で　攻撃する。\nまひか　やけどか　こおり状態の\nどれかに　することが　ある。"
    jp_kanji: "３つの　光線で　攻撃する。\nまひか　やけどか　こおり状態の\nどれかに　することが　ある。"
    en: "The user strikes with a simultaneous three-beam attack.\nThis may also burn, freeze, or paralyze the target."
    fr: "Le lanceur envoie trois boules d’énergie simultanément\nqui peuvent aussi paralyser, brûler ou geler la cible."
    it: "Il Pokémon attacca il bersaglio con tre raggi di luce\nche possono paralizzarlo, scottarlo o congelarlo."
    de: "Feuert drei Strahlen ab. Verursacht eventuell Paralyse,\nVerbrennungen oder Einfrieren."
    es: "Ataque con tres rayos de luz que puede paralizar,\nquemar o congelar al objetivo."
    ko: "3개의 광선으로 공격한다.\n마비, 화상 또는 얼음 상태 중\n어느 하나로 만들 때가 있다."
    zh_simp: "用３种光线进行攻击。\n有时会让对手陷入\n麻痹、灼伤或冰冻的状态。"
    zh_trad: "用３種光線進行攻擊。\n有時會讓對手陷入\n麻痺、灼傷或冰凍的狀態。"
tr20:
  names:
    jp_kana: わざレコード２０
    jp_kanji: わざレコード２０
    en: TR20
    fr: DT20
    it: DT20
    de: TP20
    es: DT20
    ko: 기술레코드20
    zh_simp: 招式记录２０
    zh_trad: 招式紀錄２０
  descriptions:
    jp_kana: "自分の　ＨＰを　少し　削って\n分身を　だす。\n分身は　自分の　身代わりに　なる。"
    jp_kanji: "自分の　ＨＰを　少し　削って\n分身を　だす。\n分身は　自分の　身代わりに　なる。"
    en: "The user creates a substitute for itself using some of\nits own HP. The substitute serves as the user’s decoy."
    fr: "Le lanceur crée un clone en sacrifiant quelques PV.\nCe clone sert de leurre."
    it: "Il Pokémon crea una copia di se stesso usando alcuni PS.\nLa copia serve come esca per l’avversario."
    de: "Anwender setzt eine kleine Menge an KP ein, um einen\nDoppelgänger zu erzeugen, der für ihn Schläge\neinsteckt."
    es: "Utiliza parte de los PS propios para crear un sustituto\nque actúa como señuelo."
    ko: "자신의 HP를 조금 깎아서\n분신을 만든다.\n분신은 자신의 대타가 된다."
    zh_simp: "削减少许自己的ＨＰ，\n制造分身。\n分身将成为自己的替身。"
    zh_trad: "消耗一些自己的ＨＰ，\n製造分身。\n分身將成為自己的替身。"
tr21:
  names:
    jp_kana: わざレコード２１
    jp_kanji: わざレコード２１
    en: TR21
    fr: DT21
    it: DT21
    de: TP21
    es: DT21
    ko: 기술레코드21
    zh_simp: 招式记录２１
    zh_trad: 招式紀錄２１
  descriptions:
    jp_kana: "力を　ふりしぼり　攻撃する。\n自分の　ＨＰが　少ないほど\n技の　威力は　あがる。"
    jp_kanji: "力を　ふりしぼり　攻撃する。\n自分の　ＨＰが　少ないほど\n技の　威力は　あがる。"
    en: "An all-out attack that becomes more powerful the\nless HP the user has."
    fr: "Le lanceur ne retient plus ses coups.\nPlus ses PV sont bas, plus la puissance de cette capacité\naugmente."
    it: "Il Pokémon attacca con tutte le sue forze.\nPiù i suoi PS sono bassi, più la potenza della mossa\naumenta."
    de: Richtet mehr Schaden an, wenn eigene KP niedrig sind.
    es: "Ataque desesperado que causa más daño cuantos\nmenos PS tenga el usuario."
    ko: "힘을 쥐어짜서 공격한다.\n자신의 HP가 적을수록\n기술의 위력이 올라간다."
    zh_simp: "竭尽全力进行攻击。\n自己的ＨＰ越少，\n招式的威力越大。"
    zh_trad: "竭盡全力進行攻擊。\n自己的ＨＰ越少，\n招式的威力越大。"
tr22:
  names:
    jp_kana: わざレコード２２
    jp_kanji: わざレコード２２
    en: TR22
    fr: DT22
    it: DT22
    de: TP22
    es: DT22
    ko: 기술레코드22
    zh_simp: 招式记录２２
    zh_trad: 招式紀錄２２
  descriptions:
    jp_kana: "汚い　ヘドロを\n相手に　投げつけて　攻撃する。\n毒状態に　することが　ある。"
    jp_kanji: "汚い　ヘドロを\n相手に　投げつけて　攻撃する。\n毒状態に　することが　ある。"
    en: "Unsanitary sludge is hurled at the target. This may\nalso poison the target."
    fr: "Des détritus toxiques sont projetés sur la cible, ce qui\npeut aussi l’empoisonner."
    it: "Il Pokémon attacca lanciando fango malsano\nsul bersaglio. Può anche avvelenarlo."
    de: "Wirft Schlamm auf das Ziel. Dieses wird eventuell\nvergiftet."
    es: Arroja residuos al objetivo. Puede llegar a envenenar.
    ko: "더러운 오물을\n상대에게 내던져서 공격한다.\n독 상태로 만들 때가 있다."
    zh_simp: "用污泥投掷对手进行攻击。\n有时会让对手陷入中毒状态。"
    zh_trad: "向對手投擲污泥進行攻擊。\n有時會讓對手陷入中毒狀態。"
tr23:
  names:
    jp_kana: わざレコード２３
    jp_kanji: わざレコード２３
    en: TR23
    fr: DT23
    it: DT23
    de: TP23
    es: DT23
    ko: 기술레코드23
    zh_simp: 招式记录２３
    zh_trad: 招式紀錄２３
  descriptions:
    jp_kana: "相手の　足下に　まきびしを\nしかける。交代で　でてきた　相手の\nポケモンに　ダメージを　与える。"
    jp_kanji: "相手の　足下に　まきびしを\nしかける。交代で　でてきた　相手の\nポケモンに　ダメージを　与える。"
    en: "The user lays a trap of spikes at the opposing\nteam’s feet. The trap hurts Pokémon that switch\ninto battle."
    fr: "Le lanceur disperse des picots sur le sol pour blesser\ntout ennemi qui entre au combat."
    it: "Il Pokémon piazza sul terreno una trappola di punte\nche danneggia gli avversari quando scendono in campo."
    de: "Der Anwender legt Stacheln aus, die gegnerische\nPokémon verletzen, die in den Kampf gerufen\nwerden."
    es: "Lanza una trampa de púas a los pies del objetivo que\nhiere a los rivales que entran en combate."
    ko: "상대의 발밑에 압정을\n뿌린다. 교체된 상대\n포켓몬에게 데미지를 준다."
    zh_simp: "在对手的脚下扔撒菱。\n对替换出场的\n对手的宝可梦给予伤害。"
    zh_trad: "將撒菱散布在對手的腳下。\n讓對手替換出場的寶可夢\n受到傷害。"
tr24:
  names:
    jp_kana: わざレコード２４
    jp_kanji: わざレコード２４
    en: TR24
    fr: DT24
    it: DT24
    de: TP24
    es: DT24
    ko: 기술레코드24
    zh_simp: 招式记录２４
    zh_trad: 招式紀錄２４
  descriptions:
    jp_kana: "２ー３ターンの　間\n暴れまくって　攻撃する。\n暴れたあとは　混乱する。"
    jp_kanji: "２ー３ターンの　間\n暴れまくって　攻撃する。\n暴れたあとは　混乱する。"
    en: "The user rampages and attacks for two to three\nturns. The user then becomes confused."
    fr: "Le lanceur enrage et attaque pendant deux ou trois tours\navant de devenir confus."
    it: "Il Pokémon s’infuria e attacca per due o tre turni,\nma rimane confuso."
    de: "Attacke über zwei bis drei Runden, die den Anwender\ndanach verwirrt."
    es: "El usuario ataca enfurecido durante dos o tres turnos\ny, después, se queda confuso."
    ko: "2~3턴 동안\n마구 난동 부려서 공격한다.\n난동 부린 뒤에는 혼란에 빠진다."
    zh_simp: "在２～３回合内，\n乱打一气地进行攻击。\n大闹一番后自己会陷入混乱。"
    zh_trad: "在２～３回合內\n瘋狂亂打對手進行攻擊。\n大鬧一番後自己會陷入混亂。"
tr25:
  names:
    jp_kana: わざレコード２５
    jp_kanji: わざレコード２５
    en: TR25
    fr: DT25
    it: DT25
    de: TP25
    es: DT25
    ko: 기술레코드25
    zh_simp: 招式记录２５
    zh_trad: 招式紀錄２５
  descriptions:
    jp_kana: "不思議な　念波を　実体化して\n相手を　攻撃する。\n物理的な　ダメージを　与える。"
    jp_kanji: "不思議な　念波を　実体化して\n相手を　攻撃する。\n物理的な　ダメージを　与える。"
    en: "The user materializes an odd psychic wave to attack\nthe target. This attack does physical damage."
    fr: "Le lanceur matérialise des ondes mystérieuses\nqu’il projette sur la cible, ce qui inflige des dégâts\nphysiques à celle-ci."
    it: "Il Pokémon attacca il bersaglio facendo materializzare\nmisteriose onde psichiche che provocano danni fisici."
    de: "Anwender erzeugt eine seltsame Energiewelle, die dem\nZiel physischen Schaden zufügt."
    es: "Crea una onda psíquica que causa daño físico al\nobjetivo."
    ko: "이상한 염력파를 실체화하여\n상대를 공격한다.\n물리적인 데미지를 준다."
    zh_simp: "将神奇的念波实体化攻击对手。\n给予物理伤害。"
    zh_trad: "將神奇的念力波實體化後攻擊對手。\n給予對手物理傷害。"
tr26:
  names:
    jp_kana: わざレコード２６
    jp_kanji: わざレコード２６
    en: TR26
    fr: DT26
    it: DT26
    de: TP26
    es: DT26
    ko: 기술레코드26
    zh_simp: 招式记录２６
    zh_trad: 招式紀錄２６
  descriptions:
    jp_kana: "攻撃を　受けても\nＨＰを　必ず　１だけ　残せる。\n連続で　だすと　失敗しやすい。"
    jp_kanji: "攻撃を　受けても\nＨＰを　必ず　１だけ　残せる。\n連続で　だすと　失敗しやすい。"
    en: "The user endures any attack with at least 1 HP.\nIts chance of failing rises if it is used in succession."
    fr: "Le lanceur résiste aux attaques avec 1 PV.\nPeut échouer si utilisée plusieurs fois de suite."
    it: "Il Pokémon resta con 1 PS qualunque attacco subisca.\nSe la mossa è usata in successione può fallire."
    de: "Nach fatalen Attacken bleibt stets 1 KP übrig.\nMisserfolg bei Wiederholung möglich."
    es: "Resiste cualquier ataque y deja al menos 1 PS.\nPuede fallar si se usa repetidamente."
    ko: "공격을 받아도\nHP를 반드시 1만큼은 남긴다.\n연속으로 쓰면 실패하기 쉽다."
    zh_simp: "即使受到攻击，\n也至少会留下１ＨＰ。\n连续使出则容易失败。"
    zh_trad: "即使受到再強烈的攻擊，\n也一定會剩下１ＨＰ。\n連續使用時容易失敗。"
tr27:
  names:
    jp_kana: わざレコード２７
    jp_kanji: わざレコード２７
    en: TR27
    fr: DT27
    it: DT27
    de: TP27
    es: DT27
    ko: 기술레코드27
    zh_simp: 招式记录２７
    zh_trad: 招式紀錄２７
  descriptions:
    jp_kana: "自分が　おぼえている　技の　うち\nどれか　１つを　くりだす。\n自分が　寝ているときだけ　使える。"
    jp_kanji: "自分が　おぼえている　技の　うち\nどれか　１つを　くりだす。\n自分が　寝ているときだけ　使える。"
    en: "While it is asleep, the user randomly uses one of the\nmoves it knows."
    fr: "Le lanceur utilise une de ses capacités au hasard.\nIl ne peut utiliser cette capacité que quand il dort."
    it: "Il Pokémon sferra a caso una delle proprie mosse, solo\nmentre dorme."
    de: "Anwender setzt per Zufall eine ihm bekannte Attacke\nein. Klappt nur, wenn der Anwender gerade schläft."
    es: "Mientras duerme, usa uno de sus movimientos elegido\nal azar."
    ko: "자신이 배운 기술 중\n하나를 무작위로 날린다.\n자신이 잠들어 있을 때만 쓸 수 있다."
    zh_simp: "从自己已学会的招式中\n任意使出１个。\n只能在自己睡觉时使用。"
    zh_trad: "從自己已學會的招式中\n隨機選出１個使出。\n只有在睡眠狀態時可以使用。"
tr28:
  names:
    jp_kana: わざレコード２８
    jp_kanji: わざレコード２８
    en: TR28
    fr: DT28
    it: DT28
    de: TP28
    es: DT28
    ko: 기술레코드28
    zh_simp: 招式记录２８
    zh_trad: 招式紀錄２８
  descriptions:
    jp_kana: "硬くて　りっぱな　つので　おもいっきり\n相手を　突き刺して　攻撃する。"
    jp_kanji: "硬くて　りっぱな　つので　おもいっきり\n相手を　突き刺して　攻撃する。"
    en: "Using its tough and impressive horn, the user rams\ninto the target with no letup."
    fr: Le lanceur inflige un grand coup de corne à la cible.
    it: "Il Pokémon usa il suo robusto e imponente corno\nper attaccare il bersaglio con tutto se stesso."
    de: "Brutaler Ramm-Angriff mit spitzem,\nbeeindruckendem Horn."
    es: "Ensarta al objetivo con su imponente cuerno\no cornamenta."
    ko: "단단하고 훌륭한 뿔로 힘껏\n상대를 꿰찔러서 공격한다."
    zh_simp: "用坚硬且华丽的角狠狠地\n刺入对手进行攻击。"
    zh_trad: "用堅硬且華麗的角狠狠地\n刺進對手進行攻擊。"
tr29:
  names:
    jp_kana: わざレコード２９
    jp_kanji: わざレコード２９
    en: TR29
    fr: DT29
    it: DT29
    de: TP29
    es: DT29
    ko: 기술레코드29
    zh_simp: 招式记录２９
    zh_trad: 招式紀錄２９
  descriptions:
    jp_kana: "控えの　ポケモンと　入れ替わる。\n能力変化は　替わった\nポケモンが　そのまま　受けつぐ。"
    jp_kanji: "控えの　ポケモンと　入れ替わる。\n能力変化は　替わった\nポケモンが　そのまま　受けつぐ。"
    en: "The user switches places with a party Pokémon in\nwaiting and passes along any stat changes."
    fr: "Le lanceur échange sa place et tout changement\nde stats avec un Pokémon de l’équipe."
    it: "Il Pokémon è sostituito da un altro della squadra,\nche eredita anche ogni modifica alle statistiche."
    de: "Tauscht den Anwender aus und überträgt alle\nStatusveränderungen auf das eingewechselte\nPokémon."
    es: "Cambia el puesto con otro miembro del equipo y le\npasa los cambios en las características."
    ko: "교대 포켓몬과 교체한다.\n능력 변화는 교대 포켓몬이\n그대로 이어받는다."
    zh_simp: "和后备宝可梦进行替换。\n换上的宝可梦\n能直接继承其能力的变化。"
    zh_trad: "與後備寶可夢進行替換。\n替換上場的寶可夢，\n將承接目前寶可夢的能力變化。"
tr30:
  names:
    jp_kana: わざレコード３０
    jp_kanji: わざレコード３０
    en: TR30
    fr: DT30
    it: DT30
    de: TP30
    es: DT30
    ko: 기술레코드30
    zh_simp: 招式记录３０
    zh_trad: 招式紀錄３０
  descriptions:
    jp_kana: "相手に　アンコールした　技を\n３回　続けて　出させる。"
    jp_kanji: "相手に　アンコールした　技を\n３回　続けて　出させる。"
    en: "The user compels the target to keep using the move\nit encored for three turns."
    fr: "Le lanceur oblige la cible à répéter la dernière capacité\nutilisée durant trois tours."
    it: "Il Pokémon obbliga il bersaglio a ripetere per tre turni\nl’ultima mossa eseguita."
    de: Das Ziel wiederholt die letzte Attacke drei Runden lang.
    es: "El objetivo repite su último movimiento durante tres\nturnos."
    ko: "상대에게 앙코르를 외쳐서\n기술을 3번 연속으로 쓰게 한다."
    zh_simp: "让对手接受再来一次，\n连续３次使出最后使用的招式。"
    zh_trad: "要求對手再來一次，\n讓對手連續３次\n使出最近一次使用的招式。"
tr31:
  names:
    jp_kana: わざレコード３１
    jp_kanji: わざレコード３１
    en: TR31
    fr: DT31
    it: DT31
    de: TP31
    es: DT31
    ko: 기술레코드31
    zh_simp: 招式记录３１
    zh_trad: 招式紀錄３１
  descriptions:
    jp_kana: "硬い　しっぽで\n相手を　たたきつけて　攻撃する。\n相手の　防御を　さげることが　ある。"
    jp_kanji: "硬い　しっぽで\n相手を　たたきつけて　攻撃する。\n相手の　防御を　さげることが　ある。"
    en: "The target is slammed with a steel-hard tail.\nThis may also lower the target’s Defense stat."
    fr: "Le lanceur attaque la cible avec une queue de fer,\nce qui peut aussi baisser la Défense de la cible."
    it: "Il Pokémon attacca colpendo il bersaglio con una\nrobusta coda che può anche ridurne la Difesa."
    de: "Attacke mit hartem Eisenschweif. Senkt eventuell den\nVerteidigungs-Wert des Zieles."
    es: "Ataca con una cola férrea y puede reducir la Defensa\ndel objetivo."
    ko: "단단한 꼬리로\n상대를 힘껏 쳐서 공격한다.\n상대의 방어를 떨어뜨릴 때가 있다."
    zh_simp: "使用坚硬的尾巴\n摔打对手进行攻击。\n有时会降低对手的防御。"
    zh_trad: "將堅硬的尾巴\n甩向對手進行攻擊。\n有時會降低對手的防禦。"
tr32:
  names:
    jp_kana: わざレコード３２
    jp_kanji: わざレコード３２
    en: TR32
    fr: DT32
    it: DT32
    de: TP32
    es: DT32
    ko: 기술레코드32
    zh_simp: 招式记录３２
    zh_trad: 招式紀錄３２
  descriptions:
    jp_kana: "鋭い　歯で\n相手を　かみくだいて　攻撃する。\n相手の　防御を　さげることが　ある。"
    jp_kanji: "鋭い　歯で\n相手を　かみくだいて　攻撃する。\n相手の　防御を　さげることが　ある。"
    en: "The user crunches up the target with sharp fangs.\nThis may also lower the target’s Defense stat."
    fr: "Le lanceur mord la cible de ses crocs pointus, ce qui\npeut aussi baisser sa Défense."
    it: "Il Pokémon attacca mordendo il bersaglio con denti\naffilati. Può anche ridurne la Difesa."
    de: "Beißt mit scharfen Reißzähnen zu und senkt eventuell\ndie Verteidigung."
    es: "Tritura con afilados colmillos y puede reducir la Defensa\ndel objetivo."
    ko: "날카로운 이빨로\n상대를 깨물어 부숴서 공격한다.\n상대의 방어를 떨어뜨릴 때가 있다."
    zh_simp: "用利牙咬碎对手进行攻击。\n有时会降低对手的防御。"
    zh_trad: "用尖銳的牙齒咬碎對手進行攻擊。\n有時會降低對手的防禦。"
tr33:
  names:
    jp_kana: わざレコード３３
    jp_kanji: わざレコード３３
    en: TR33
    fr: DT33
    it: DT33
    de: TP33
    es: DT33
    ko: 기술레코드33
    zh_simp: 招式记录３３
    zh_trad: 招式紀錄３３
  descriptions:
    jp_kana: "黒い影の　塊を　投げつけて\n攻撃する。　相手の　特防を\nさげることが　ある。"
    jp_kanji: "黒い影の　塊を　投げつけて\n攻撃する。　相手の　特防を\nさげることが　ある。"
    en: "The user hurls a shadowy blob at the target.\nThis may also lower the target’s Sp. Def stat."
    fr: "Le lanceur projette une grande ombre sur la cible qui\npeut aussi faire baisser la Défense Spéciale de celle-ci."
    it: "Il Pokémon attacca lanciando sul bersaglio un grumo\ndi ombre nere. Può anche ridurne la Difesa Speciale."
    de: "Bewirft das Ziel mit einem gruseligen Ball und senkt\neventuell dessen Spezial-Verteidigung."
    es: "Lanza una bola oscura que puede reducir la Defensa\nEspecial del objetivo."
    ko: "까만 그림자 덩어리를 내던져서\n공격한다. 상대의 특수방어를\n떨어뜨릴 때가 있다."
    zh_simp: "投掷一团黑影进行攻击。\n有时会降低对手的特防。"
    zh_trad: "投擲一團黑影進行攻擊。\n有時會降低對手的特防。"
tr34:
  names:
    jp_kana: わざレコード３４
    jp_kanji: わざレコード３４
    en: TR34
    fr: DT34
    it: DT34
    de: TP34
    es: DT34
    ko: 기술레코드34
    zh_simp: 招式记录３４
    zh_trad: 招式紀錄３４
  descriptions:
    jp_kana: "技を　使った　２ターン後に\n相手に　念力の\n塊を　送って　攻撃する。"
    jp_kanji: "技を　使った　２ターン後に\n相手に　念力の\n塊を　送って　攻撃する。"
    en: "Two turns after this move is used, a hunk of psychic\nenergy attacks the target."
    fr: "De l’énergie psychique vient frapper la cible\ndeux tours après l’utilisation de cette capacité."
    it: "Due turni dopo l’utilizzo di questa mossa, il Pokémon\nattacca il bersaglio con energia psichica."
    de: "Zwei Runden, nachdem Seher eingesetzt wurde,\nerfolgt ein Angriff mit Psycho-Energie."
    es: "Concentra energía psíquica para golpear al objetivo dos\nturnos después."
    ko: "기술을 사용한 2턴 뒤에\n상대에게 염동력 덩어리를\n보내어 공격한다."
    zh_simp: "在使用招式２回合后，\n向对手发送一团念力进行攻击。"
    zh_trad: "使用招式的２回合後，\n向對手發送一團念力進行攻擊。"
tr35:
  names:
    jp_kana: わざレコード３５
    jp_kanji: わざレコード３５
    en: TR35
    fr: DT35
    it: DT35
    de: TP35
    es: DT35
    ko: 기술레코드35
    zh_simp: 招式记录３５
    zh_trad: 招式紀錄３５
  descriptions:
    jp_kana: "３ターンの　間\n騒いで　相手を　攻撃する。\nそのあいだは　だれも　眠れなくなる。"
    jp_kanji: "３ターンの　間\n騒いで　相手を　攻撃する。\nそのあいだは　だれも　眠れなくなる。"
    en: "The user attacks in an uproar for three turns.\nDuring that time, no Pokémon can fall asleep."
    fr: "Le lanceur attaque en rugissant durant trois tours.\nPendant ce temps, aucun Pokémon ne peut s’endormir."
    it: "Il Pokémon attacca per tre turni con un frastuono\nche non fa dormire nessuno."
    de: "Anwender greift an, indem er über drei Runden hinweg\neinen Aufruhr erzeugt. Verhindert Schlaf."
    es: "Ataca de forma alborotada durante tres turnos.\nMantiene despiertos a todos."
    ko: "3턴 동안\n소란 피워 공격한다.\n그동안은 아무도 잠들지 않게 된다."
    zh_simp: "在３回合内\n大吵大闹攻击对手。\n在此期间谁都不能入眠。"
    zh_trad: "在３回合內\n大吵大鬧攻擊對手。\n在此期間誰都無法入眠。"
tr36:
  names:
    jp_kana: わざレコード３６
    jp_kanji: わざレコード３６
    en: TR36
    fr: DT36
    it: DT36
    de: TP36
    es: DT36
    ko: 기술레코드36
    zh_simp: 招式记录３６
    zh_trad: 招式紀錄３６
  descriptions:
    jp_kana: "熱い　息を\n相手に　吹きつけて　攻撃する。\nやけど状態に　することが　ある。"
    jp_kanji: "熱い　息を\n相手に　吹きつけて　攻撃する。\nやけど状態に　することが　ある。"
    en: "The user attacks by exhaling hot breath on opposing\nPokémon. This may also leave those Pokémon with\na burn."
    fr: "Le lanceur projette une grande ombre sur la cible\nqui peut aussi faire baisser sa Défense Spéciale."
    it: "Il Pokémon attacca investendo il bersaglio con un soffio\nd’aria calda. Può anche scottarlo."
    de: "Gegnerische Pokémon werden von einem Sturm aus\nheißer Luft getroffen und erleiden eventuell\nVerbrennungen."
    es: "Provoca un viento abrasador que daña al objetivo y\npuede causar quemaduras."
    ko: "뜨거운 숨결을\n상대에게 내뿜어 공격한다.\n화상 상태로 만들 때가 있다."
    zh_simp: "将炎热的气息\n吹向对手进行攻击。\n有时会让对手陷入灼伤状态。"
    zh_trad: "將炎熱的氣息\n吹向對手進行攻擊。\n有時會讓對手陷入灼傷狀態。"
tr37:
  names:
    jp_kana: わざレコード３７
    jp_kanji: わざレコード３７
    en: TR37
    fr: DT37
    it: DT37
    de: TP37
    es: DT37
    ko: 기술레코드37
    zh_simp: 招式记录３７
    zh_trad: 招式紀錄３７
  descriptions:
    jp_kana: "相手を　怒らせる。　３ターンの\n間　相手は　ダメージを\n与える　技しか　だせなくなる。"
    jp_kanji: "相手を　怒らせる。　３ターンの\n間　相手は　ダメージを\n与える　技しか　だせなくなる。"
    en: "The target is taunted into a rage that allows it to use\nonly attack moves for three turns."
    fr: "Le lanceur provoque la cible, ce qui oblige celle-ci\nà n’utiliser que des capacités qui infligent des dégâts\npendant trois tours."
    it: "Il Pokémon provoca il bersaglio inducendolo a usare\nsolo mosse che infliggono danni per tre turni."
    de: "Bringt das Ziel in Rage. Dieses kann über drei Runden\nhinweg nur noch angreifen."
    es: "Enfurece al objetivo para que solo use movimientos de\nataque durante tres turnos."
    ko: "상대를 화나게 한다.\n3턴 동안 상대는 데미지를\n주는 기술밖에 쓸 수 없게 된다."
    zh_simp: "使对手愤怒。\n在３回合内让对手只能使出\n给予伤害的招式。"
    zh_trad: "激怒對手。\n在３回合內讓對手\n只能使出給予傷害的招式。"
tr38:
  names:
    jp_kana: わざレコード３８
    jp_kanji: わざレコード３８
    en: TR38
    fr: DT38
    it: DT38
    de: TP38
    es: DT38
    ko: 기술레코드38
    zh_simp: 招式记录３８
    zh_trad: 招式紀錄３８
  descriptions:
    jp_kana: "相手の　すきを　ついて\n自分と　相手の\n持ち物を　交換する。"
    jp_kanji: "相手の　すきを　ついて\n自分と　相手の\n持ち物を　交換する。"
    en: "The user catches the target off guard and swaps its\nheld item with its own."
    fr: "Le lanceur prend la cible au dépourvu\net l’oblige à échanger son objet contre le sien."
    it: "Il Pokémon coglie il bersaglio in contropiede e lo\nobbliga a scambiare il suo strumento con il proprio."
    de: "Der Anwender überrumpelt das Ziel und tauscht mit\nihm die getragenen Items."
    es: "Engaña al objetivo desprevenido e intercambia su\nobjeto con él."
    ko: "상대의 빈틈을 노려\n자신과 상대가 지닌 물건을\n바꿔치기한다."
    zh_simp: "抓住对手的空隙，\n交换自己和对手的持有物。"
    zh_trad: "在對手露出空隙時，\n趁機交換自己和對手的持有物。"
tr39:
  names:
    jp_kana: わざレコード３９
    jp_kanji: わざレコード３９
    en: TR39
    fr: DT39
    it: DT39
    de: TP39
    es: DT39
    ko: 기술레코드39
    zh_simp: 招式记录３９
    zh_trad: 招式紀錄３９
  descriptions:
    jp_kana: "すごい　力を　発揮して\n相手を　攻撃する。自分の\n攻撃と　防御が　さがる。"
    jp_kanji: "すごい　力を　発揮して\n相手を　攻撃する。自分の\n攻撃と　防御が　さがる。"
    en: "The user attacks the target with great power.\nHowever, this also lowers the user’s Attack and\nDefense stats."
    fr: "Une attaque puissante, mais qui baisse l’Attaque\net la Défense du lanceur."
    it: "Il Pokémon attacca il bersaglio con grande forza,\nma il suo Attacco e la sua Difesa diminuiscono."
    de: "Starke Attacke, die jedoch auch den Angriff und die\nVerteidigung des Anwenders senkt."
    es: "Ataque de gran potencia, pero que reduce el Ataque y\nla Defensa del usuario."
    ko: "엄청난 힘을 발휘하여\n상대를 공격한다. 자신의\n공격과 방어가 떨어진다."
    zh_simp: "发挥惊人的力量攻击对手。\n自己的攻击和防御会降低。"
    zh_trad: "發揮驚人的力量攻擊對手。\n自己的攻擊和防禦會降低。"
tr40:
  names:
    jp_kana: わざレコード４０
    jp_kanji: わざレコード４０
    en: TR40
    fr: DT40
    it: DT40
    de: TP40
    es: DT40
    ko: 기술레코드40
    zh_simp: 招式记录４０
    zh_trad: 招式紀錄４０
  descriptions:
    jp_kana: "超能力で　自分の　特性と\n相手の　特性を　入れ替える。"
    jp_kanji: "超能力で　自分の　特性と\n相手の　特性を　入れ替える。"
    en: "The user employs its psychic power to exchange\nAbilities with the target."
    fr: "Le lanceur utilise ses pouvoirs psychiques pour échanger\nson talent avec la cible."
    it: "Il Pokémon sfrutta i suoi poteri psichici per scambiare\nl’abilità con quella del bersaglio."
    de: Anwender tauscht seine Fähigkeit mit der des Zieles.
    es: "Usa el poder psíquico para intercambiar habilidades\ncon el objetivo."
    ko: "초능력으로 자신의 특성과\n상대의 특성을 바꾼다."
    zh_simp: "利用超能力互换\n自己和对手的特性。"
    zh_trad: "用超能力將自己和\n對手的特性互相交換。"
tr41:
  names:
    jp_kana: わざレコード４１
    jp_kanji: わざレコード４１
    en: TR41
    fr: DT41
    it: DT41
    de: TP41
    es: DT41
    ko: 기술레코드41
    zh_simp: 招式记录４１
    zh_trad: 招式紀錄４１
  descriptions:
    jp_kana: "攻撃した　相手を\nやけど状態に　することが　ある。\n急所にも　当たりやすい。"
    jp_kanji: "攻撃した　相手を\nやけど状態に　することが　ある。\n急所にも　当たりやすい。"
    en: "The user launches a kick that lands a critical hit\nmore easily. This may also leave the target with\na burn."
    fr: "Le lanceur envoie un coup de pied au taux de critiques\nélevé. Peut aussi brûler la cible."
    it: "Il Pokémon attacca il bersaglio e può anche scottarlo.\nProbabile brutto colpo."
    de: "Starker Tritt mit hoher Volltrefferquote. Verursacht\neventuell Verbrennungen."
    es: "Patada que suele asestar un golpe crítico y puede causar\nquemaduras."
    ko: "공격한 상대를\n화상 상태로 만들 때가 있다.\n급소에도 맞기 쉽다."
    zh_simp: "攻击对手后，\n有时会使其陷入灼伤状态。\n也容易击中要害。"
    zh_trad: "有時會讓受到攻擊的對手\n陷入灼傷狀態。\n且容易擊中要害。"
tr42:
  names:
    jp_kana: わざレコード４２
    jp_kanji: わざレコード４２
    en: TR42
    fr: DT42
    it: DT42
    de: TP42
    es: DT42
    ko: 기술레코드42
    zh_simp: 招式记录４２
    zh_trad: 招式紀錄４２
  descriptions:
    jp_kana: "うるさく　響く　大きな　振動を\n相手に　与えて　攻撃する。"
    jp_kanji: "うるさく　響く　大きな　振動を\n相手に　与えて　攻撃する。"
    en: "The user lets loose a horribly echoing shout with\nthe power to inflict damage."
    fr: "Le lanceur pousse un cri dont l’écho terrifiant\na le pouvoir d’infliger des dégâts à la cible."
    it: "Il Pokémon attacca il bersaglio lanciando un urlo\nstraziante."
    de: "Eine laute Attacke, bei der gegnerische Pokémon mit\nSchallwellen angegriffen werden."
    es: Grito desgarrador que inflige daño al objetivo.
    ko: "시끄럽게 울리는 큰 진동을\n상대에게 전달하여 공격한다."
    zh_simp: "给予对手又吵又响的\n巨大震动进行攻击。"
    zh_trad: "製造出震耳欲聾的\n巨大聲波攻擊對手。"
tr43:
  names:
    jp_kana: わざレコード４３
    jp_kanji: わざレコード４３
    en: TR43
    fr: DT43
    it: DT43
    de: TP43
    es: DT43
    ko: 기술레코드43
    zh_simp: 招式记录４３
    zh_trad: 招式紀錄４３
  descriptions:
    jp_kana: "フルパワーで　相手を　攻撃する。\n使うと　反動で\n自分の　特攻が　がくっと　さがる。"
    jp_kanji: "フルパワーで　相手を　攻撃する。\n使うと　反動で\n自分の　特攻が　がくっと　さがる。"
    en: "The user attacks the target at full power. The attack’s\nrecoil harshly lowers the user’s Sp. Atk stat."
    fr: "Le lanceur attaque la cible à pleine puissance, mais\nle contrecoup baisse beaucoup l’Attaque Spéciale\ndu lanceur."
    it: "Il Pokémon sferra un potente attacco, ma il contraccolpo\nriduce di molto il suo Attacco Speciale."
    de: "Angriff mit voller Kraft, der den Spezial-Angriff des\nAnwenders durch den Rückstoß stark senkt."
    es: "Ataca al objetivo con toda su fuerza, pero reduce mucho\nel Ataque Especial del usuario."
    ko: "풀 파워로 상대를 공격한다.\n사용하면 반동으로\n자신의 특수공격이 크게 떨어진다."
    zh_simp: "使出全部力量攻击对手。\n使用之后会因为反作用力，\n自己的特攻大幅降低。"
    zh_trad: "釋放全部能量攻擊對手。\n使用後因為反作用力，\n自己的特攻會大幅降低。"
tr44:
  names:
    jp_kana: わざレコード４４
    jp_kanji: わざレコード４４
    en: TR44
    fr: DT44
    it: DT44
    de: TP44
    es: DT44
    ko: 기술레코드44
    zh_simp: 招式记录４４
    zh_trad: 招式紀錄４４
  descriptions:
    jp_kana: "宇宙から　神秘の　力を\nとりこむ　ことで\n自分の　防御と　特防を　あげる。"
    jp_kanji: "宇宙から　神秘の　力を\nとりこむ　ことで\n自分の　防御と　特防を　あげる。"
    en: "The user absorbs a mystical power from space to\nraise its Defense and Sp. Def stats."
    fr: "Le lanceur absorbe un pouvoir mystique spatial\nqui augmente sa Défense et sa Défense Spéciale."
    it: "Il Pokémon assorbe una forza mistica dallo spazio\nche aumenta la Difesa e la Difesa Speciale."
    de: "Erhöht Verteidigung und Spezial-Verteidigung durch\neine mystische Kraft."
    es: "Absorbe una energía mística proveniente del espacio\nque aumenta su Defensa y su Defensa Especial."
    ko: "우주로부터 신비한 힘을\n손에 넣음으로써\n자신의 방어와 특수방어를 올린다."
    zh_simp: "汲取宇宙中神秘的力量，\n从而提高自己的防御和特防。"
    zh_trad: "吸取來自宇宙的神秘力量，\n提高自己的防禦和特防。"
tr45:
  names:
    jp_kana: わざレコード４５
    jp_kanji: わざレコード４５
    en: TR45
    fr: DT45
    it: DT45
    de: TP45
    es: DT45
    ko: 기술레코드45
    zh_simp: 招式记录４５
    zh_trad: 招式紀錄４５
  descriptions:
    jp_kana: "濁った　水を\n相手に　発射して　攻撃する。\n命中率を　さげることが　ある。"
    jp_kanji: "濁った　水を\n相手に　発射して　攻撃する。\n命中率を　さげることが　ある。"
    en: "The user attacks by shooting muddy water at opposing\nPokémon. This may also lower their accuracy."
    fr: "Le lanceur attaque en projetant de l’eau boueuse.\nPeut aussi réduire la Précision de la cible."
    it: "Il Pokémon attacca il bersaglio con un getto di fango\nche può anche ridurne la precisione."
    de: "Greift mit Matsch an und senkt eventuell die\nGenauigkeit der gegnerischen Pokémon."
    es: "Ataque con agua lodosa que puede reducir la Precisión\ndel objetivo."
    ko: "탁해진 물을\n상대에게 발사하여 공격한다.\n명중률을 떨어뜨릴 때가 있다."
    zh_simp: "向对手喷射浑浊的水进行攻击。\n有时会降低对手的命中率。"
    zh_trad: "用渾濁的污水攻擊對手。\n有時會降低對手的命中率。"
tr46:
  names:
    jp_kana: わざレコード４６
    jp_kanji: わざレコード４６
    en: TR46
    fr: DT46
    it: DT46
    de: TP46
    es: DT46
    ko: 기술레코드46
    zh_simp: 招式记录４６
    zh_trad: 招式紀錄４６
  descriptions:
    jp_kana: "皮膚を　鉄のように\n硬くする　ことで\n自分の　防御を　ぐーんと　あげる。"
    jp_kanji: "皮膚を　鉄のように\n硬くする　ことで\n自分の　防御を　ぐーんと　あげる。"
    en: "The user hardens its body’s surface like iron,\nsharply raising its Defense stat."
    fr: "L’épiderme du lanceur devient dur comme du fer,\nce qui augmente beaucoup sa Défense."
    it: "Il corpo del Pokémon si indurisce come il ferro,\nfacendone salire di molto la Difesa."
    de: "Anwender stärkt den Körper, um den\nVerteidigungs-Wert stark zu erhöhen."
    es: "Fortalece el cuerpo como si fuera de hierro y aumenta\nmucho la Defensa."
    ko: "피부를 쇠처럼\n단단하게 만듦으로써\n자신의 방어를 크게 올린다."
    zh_simp: "将皮肤变得坚硬如铁，\n从而大幅提高自己的防御。"
    zh_trad: "將皮膚變得堅硬如鐵，\n大幅提高自己的防禦。"
tr47:
  names:
    jp_kana: わざレコード４７
    jp_kanji: わざレコード４７
    en: TR47
    fr: DT47
    it: DT47
    de: TP47
    es: DT47
    ko: 기술레코드47
    zh_simp: 招式记录４７
    zh_trad: 招式紀錄４７
  descriptions:
    jp_kana: "鋭く　とがった　巨大な　ツメで\n相手を　切り裂いて　攻撃する。"
    jp_kanji: "鋭く　とがった　巨大な　ツメで\n相手を　切り裂いて　攻撃する。"
    en: The user slashes the target with huge sharp claws.
    fr: "Le lanceur lacère la cible de ses grandes griffes\naiguisées."
    it: "Il Pokémon attacca con artigli affilati che graffiano\nil bersaglio con grande forza."
    de: "Der Anwender greift das Ziel mit riesigen, scharfen\nKlauen an."
    es: Araña al objetivo con unas enormes garras afiladas.
    ko: "날카롭고 뾰족하며 거대한 발톱으로\n상대를 베어 갈라서 공격한다."
    zh_simp: "用尖锐的巨爪\n劈开对手进行攻击。"
    zh_trad: "用尖銳的巨爪\n撕裂對手進行攻擊。"
tr48:
  names:
    jp_kana: わざレコード４８
    jp_kanji: わざレコード４８
    en: TR48
    fr: DT48
    it: DT48
    de: TP48
    es: DT48
    ko: 기술레코드48
    zh_simp: 招式记录４８
    zh_trad: 招式紀錄４８
  descriptions:
    jp_kana: "体に　力を　こめて\n筋肉を　ぶあつく　することで\n自分の　攻撃と　防御を　あげる。"
    jp_kanji: "体に　力を　こめて\n筋肉を　ぶあつく　することで\n自分の　攻撃と　防御を　あげる。"
    en: "The user tenses its muscles to bulk up its body,\nraising both its Attack and Defense stats."
    fr: "Le lanceur tend ses muscles pour se gonfler,\nce qui booste son Attaque et sa Défense."
    it: "Il Pokémon tende i muscoli per gonfiare il corpo,\naumentando Difesa e Attacco."
    de: "Der Anwender spannt seine Muskeln an, um den Angriff\nund die Verteidigung zu erhöhen."
    es: "Robustece el cuerpo para aumentar el Ataque y la\nDefensa."
    ko: "몸에 힘을 주어\n근육을 두껍게 해서\n자신의 공격과 방어를 올린다."
    zh_simp: "使出全身力气绷紧肌肉，\n从而提高自己的攻击和防御。"
    zh_trad: "將力量集中於體內，增厚肌肉，\n提高自己的攻擊和防禦。"
tr49:
  names:
    jp_kana: わざレコード４９
    jp_kanji: わざレコード４９
    en: TR49
    fr: DT49
    it: DT49
    de: TP49
    es: DT49
    ko: 기술레코드49
    zh_simp: 招式记录４９
    zh_trad: 招式紀錄４９
  descriptions:
    jp_kana: "静かに　精神を　統一し\n心を　鎮めることで　自分の\n特攻と　特防を　あげる。"
    jp_kanji: "静かに　精神を　統一し\n心を　鎮めることで　自分の\n特攻と　特防を　あげる。"
    en: "The user quietly focuses its mind and calms its\nspirit to raise its Sp. Atk and Sp. Def stats."
    fr: "Le lanceur se concentre et fait le vide dans son esprit\npour augmenter son Attaque Spéciale et sa Défense\nSpéciale."
    it: "Il Pokémon si concentra e placa il proprio spirito per\naumentare l’Attacco Speciale e la Difesa Speciale."
    de: "Erhöht Spezial-Angriff und Spezial-Verteidigung durch\nKonzentration."
    es: "Mejora la concentración y calma el espíritu para\naumentar el Ataque Especial y la Defensa Especial."
    ko: "조용히 정신을 통일하고\n마음을 가라앉혀서 자신의\n특수공격과 특수방어를 올린다."
    zh_simp: "静心凝神，\n从而提高自己的特攻和特防。"
    zh_trad: "屏氣凝神，\n提高自己的特攻和特防。"
tr50:
  names:
    jp_kana: わざレコード５０
    jp_kanji: わざレコード５０
    en: TR50
    fr: DT50
    it: DT50
    de: TP50
    es: DT50
    ko: 기술레코드50
    zh_simp: 招式记录５０
    zh_trad: 招式紀錄５０
  descriptions:
    jp_kana: "はっぱを　剣のように　あやつり\n相手を　切りつけて　攻撃する。\n急所に　当たりやすい。"
    jp_kanji: "はっぱを　剣のように　あやつり\n相手を　切りつけて　攻撃する。\n急所に　当たりやすい。"
    en: "The user handles a sharp leaf like a sword and\nattacks by cutting its target. Critical hits land\nmore easily."
    fr: "Une feuille coupante comme une lame entaille la cible.\nTaux de critiques élevé."
    it: "Il Pokémon attacca il bersaglio manovrando una foglia\ncome se fosse una spada. Probabile brutto colpo."
    de: Hieb mit scharfkantigem Blatt. Hohe Volltrefferquote.
    es: "Acuchilla con una hoja fina. Suele asestar un golpe\ncrítico."
    ko: "잎사귀를 칼처럼 이용해\n상대를 베어 공격한다.\n급소에 맞기 쉽다."
    zh_simp: "像用剑一般操纵叶片\n切斩对手进行攻击。\n容易击中要害。"
    zh_trad: "如用劍般操控葉子\n切斬對手進行攻擊。\n容易擊中要害。"
tr51:
  names:
    jp_kana: わざレコード５１
    jp_kanji: わざレコード５１
    en: TR51
    fr: DT51
    it: DT51
    de: TP51
    es: DT51
    ko: 기술레코드51
    zh_simp: 招式记录５１
    zh_trad: 招式紀錄５１
  descriptions:
    jp_kana: "神秘的で　力強い　舞を\n激しく　おどる。　自分の\n攻撃と　素早さを　あげる。"
    jp_kanji: "神秘的で　力強い　舞を\n激しく　おどる。　自分の\n攻撃と　素早さを　あげる。"
    en: "The user vigorously performs a mystic, powerful\ndance that raises its Attack and Speed stats."
    fr: "Une danse mystique dont le rythme effréné\naugmente l’Attaque et la Vitesse du lanceur."
    it: "Il Pokémon esegue una danza mistica e vigorosa che\naumenta il suo Attacco e la sua Velocità."
    de: "Ein mystischer Tanz, der den Angriffs- und\nInitiative-Wert erhöht."
    es: "Frenética danza mística que aumenta el Ataque y la\nVelocidad."
    ko: "신비롭고 힘센 춤을\n격렬하게 춘다. 자신의\n공격과 스피드를 올린다."
    zh_simp: "激烈地跳起神秘且\n强有力的舞蹈。\n从而提高自己的攻击和速度。"
    zh_trad: "激烈地跳起神秘又強而有力的舞蹈。\n提高自己的攻擊和速度。"
tr52:
  names:
    jp_kana: わざレコード５２
    jp_kanji: わざレコード５２
    en: TR52
    fr: DT52
    it: DT52
    de: TP52
    es: DT52
    ko: 기술레코드52
    zh_simp: 招式记录５２
    zh_trad: 招式紀錄５２
  descriptions:
    jp_kana: "体を　高速に　回転させて\n体当たりする。相手より　素早さが\n低いほど　強い。"
    jp_kanji: "体を　高速に　回転させて\n体当たりする。相手より　素早さが\n低いほど　強い。"
    en: "The user tackles the target with a high-speed spin.\nThe slower the user compared to the target, the\ngreater the move’s power."
    fr: "Le lanceur effectue une rotation rapide et frappe\nla cible. Plus la Vitesse du lanceur est basse par\nrapport à celle de la cible, plus il inflige de dégâts."
    it: "Il Pokémon si scaglia sul bersaglio facendo ruotare\nvorticosamente il proprio corpo. Più è lento rispetto\nal bersaglio, più è forte."
    de: "Angriff mit hoher Geschwindigkeit. Je niedriger die\nInitiative des Anwenders im Vergleich zum Ziel ist,\ndesto höher der Schaden."
    es: "Embiste al objetivo con un potente ataque giratorio.\nCuanto menor es la Velocidad del usuario respecto a\nla del objetivo, más daño causa."
    ko: "몸을 고속으로 회전시켜\n몸통박치기한다. 상대보다 스피드가\n낮을수록 위력은 올라간다."
    zh_simp: "让身体高速旋转并撞击对手。\n速度比对手越慢，威力越大。"
    zh_trad: "高速旋轉身體，撞擊對手。\n速度比對手越慢，威力越大。"
tr53:
  names:
    jp_kana: わざレコード５３
    jp_kanji: わざレコード５３
    en: TR53
    fr: DT53
    it: DT53
    de: TP53
    es: DT53
    ko: 기술레코드53
    zh_simp: 招式记录５３
    zh_trad: 招式紀錄５３
  descriptions:
    jp_kana: "守りを　捨てて　相手の　ふところに\n突撃する。　自分の\n防御と　特防が　さがる。"
    jp_kanji: "守りを　捨てて　相手の　ふところに\n突撃する。　自分の\n防御と　特防が　さがる。"
    en: "The user fights the target up close without guarding\nitself. This also lowers the user’s Defense and\nSp. Def stats."
    fr: "Le lanceur ne pense plus à se protéger et frappe\nsa cible violemment au corps à corps. Cette capacité\nbaisse la Défense et la Défense Spéciale du lanceur."
    it: "Il Pokémon attacca abbassando la guardia.\nLa sua Difesa e la sua Difesa Speciale diminuiscono."
    de: "Nahkampf-Attacke ohne Rücksicht auf Verluste. Senkt\nVerteidigung und Spezial-Verteidigung des Anwenders."
    es: "Ataca ferozmente al objetivo sin protegerse, lo cual\nreduce la Defensa y la Defensa Especial del usuario."
    ko: "방어를 포기하고 상대 쪽으로\n깊숙이 돌격한다. 자신의\n방어와 특수방어가 떨어진다."
    zh_simp: "放弃守护，向对手的怀里突击。\n自己的防御和特防会降低。"
    zh_trad: "反守為攻，近身突擊對手。\n自己的防禦和特防會降低。"
tr54:
  names:
    jp_kana: わざレコード５４
    jp_kanji: わざレコード５４
    en: TR54
    fr: DT54
    it: DT54
    de: TP54
    es: DT54
    ko: 기술레코드54
    zh_simp: 招式记录５４
    zh_trad: 招式紀錄５４
  descriptions:
    jp_kana: "相手の　足下に　どくびしを\nしかける。　交代で　でてきた　相手の\nポケモンに　毒を　おわせる。"
    jp_kanji: "相手の　足下に　どくびしを\nしかける。　交代で　でてきた　相手の\nポケモンに　毒を　おわせる。"
    en: "The user lays a trap of poison spikes at the feet of\nthe opposing team. The spikes will poison opposing\nPokémon that switch into battle."
    fr: "Le lanceur éparpille des pics autour de la cible,\nce qui empoisonne les Pokémon entrant au combat\nde ce côté."
    it: "Il Pokémon piazza una trappola di punte che avvelenano\ngli avversari quando scendono in campo."
    de: "Anwender legt eine Falle mit giftigen Stacheln aus.\nIn den Kampf eingewechselte gegnerische Pokémon\nwerden vergiftet."
    es: "Lanza una trampa de púas tóxicas a los pies del objetivo\nque envenena a los rivales que entran en combate."
    ko: "상대의 발밑에 독 압정을\n뿌린다. 교체로 나온 상대\n포켓몬에게 독을 퍼지게 한다."
    zh_simp: "在对手的脚下撒毒菱。\n使对手替换出场的宝可梦中毒。"
    zh_trad: "在對手腳下散布毒菱。\n讓對手替換出場的寶可夢\n陷入中毒狀態。"
tr55:
  names:
    jp_kana: わざレコード５５
    jp_kanji: わざレコード５５
    en: TR55
    fr: DT55
    it: DT55
    de: TP55
    es: DT55
    ko: 기술레코드55
    zh_simp: 招式记录５５
    zh_trad: 招式紀錄５５
  descriptions:
    jp_kana: "炎を　まとって　突進する。\n自分も　かなり　ダメージを　受ける。\nやけど状態に　することが　ある。"
    jp_kanji: "炎を　まとって　突進する。\n自分も　かなり　ダメージを　受ける。\nやけど状態に　することが　ある。"
    en: "The user cloaks itself in fire and charges the target.\nThis also damages the user quite a lot. This attack\nmay leave the target with a burn."
    fr: "Le lanceur s’embrase avant de charger la cible, ce qui\npeut la brûler. Le choc blesse aussi gravement le lanceur."
    it: "Il Pokémon si ricopre di fuoco e carica il bersaglio,\nma subisce seri danni. Può anche scottare il bersaglio."
    de: "Anwender hüllt sich in Flammen und stürmt auf das\nZiel zu, das dadurch eventuell Verbrennungen\nerleidet. Anwender nimmt selbst großen Schaden."
    es: "El usuario se cubre de llamas y carga contra el objetivo,\naunque se hiere seriamente a sí mismo. Puede causar\nquemaduras."
    ko: "불꽃을 두르고 돌진한다.\n자신도 상당한 데미지를 입는다.\n화상 상태로 만들 때가 있다."
    zh_simp: "让火焰覆盖全身猛撞向对手。\n自己也会受到不小的伤害。\n有时会让对手陷入灼伤状态。"
    zh_trad: "將火焰圍繞全身後猛撞對手。\n自己也會受到不小的傷害。\n有時會讓對手陷入灼傷狀態。"
tr56:
  names:
    jp_kana: わざレコード５６
    jp_kanji: わざレコード５６
    en: TR56
    fr: DT56
    it: DT56
    de: TP56
    es: DT56
    ko: 기술레코드56
    zh_simp: 招式记录５６
    zh_trad: 招式紀錄５６
  descriptions:
    jp_kana: "体の　奥から　波導の　力を\n相手に　うち放つ。\n攻撃は　必ず　命中する。"
    jp_kanji: "体の　奥から　波導の　力を\n相手に　うち放つ。\n攻撃は　必ず　命中する。"
    en: "The user lets loose a blast of aura power from deep\nwithin its body at the target. This attack\nnever misses."
    fr: "Le lanceur puise au fond de lui-même pour dégager\nune aura et projeter de l’énergie sur la cible.\nN’échoue jamais."
    it: "Il Pokémon rilascia l’aura dal profondo del corpo e la\nspara verso il bersaglio. Questo attacco va sempre\na segno."
    de: "Tief aus dem Inneren des Anwenders löst sich ein\nkraftvoller Stoß Aura-Energie. Diese Attacke trifft\ngarantiert."
    es: "Libera una inmensa descarga de aura desde su interior.\nNo falla nunca."
    ko: "몸속에서 파동의 힘을\n끌어내 상대에게 쏜다.\n공격은 반드시 명중한다."
    zh_simp: "从体内产生出波导之力，\n然后向对手发出。\n攻击必定会命中。"
    zh_trad: "將來自體內深處的波導之力\n擊向對手。\n攻擊必定會命中。"
tr57:
  names:
    jp_kana: わざレコード５７
    jp_kanji: わざレコード５７
    en: TR57
    fr: DT57
    it: DT57
    de: TP57
    es: DT57
    ko: 기술레코드57
    zh_simp: 招式记录５７
    zh_trad: 招式紀錄５７
  descriptions:
    jp_kana: "毒に　そまった　触手や　腕で\n相手を　突き刺す。\n毒状態に　することが　ある。"
    jp_kanji: "毒に　そまった　触手や　腕で\n相手を　突き刺す。\n毒状態に　することが　ある。"
    en: "The target is stabbed with a tentacle, arm, or the like\nsteeped in poison. This may also poison the target."
    fr: "Le lanceur attaque la cible avec un tentacule, un bras,\nou un autre membre imprégné de poison, ce qui peut\naussi empoisonner la cible."
    it: "Il Pokémon infilza il bersaglio con un tentacolo o un arto\nintriso di una sostanza tossica che può anche\navvelenarlo."
    de: "Der Anwender greift mit giftigen Gliedmaßen wie\nTentakeln oder Armen an. Das Ziel wird dabei\neventuell vergiftet."
    es: "Pincha al objetivo con un tentáculo o brazo envenenado.\nPuede llegar a envenenar al objetivo."
    ko: "독에 물든 촉수나 팔로\n상대를 꿰찌른다.\n독 상태로 만들 때가 있다."
    zh_simp: "用带毒的触手或手臂\n刺入对手。\n有时会让对手陷入中毒状态。"
    zh_trad: "以帶有毒性的觸手或手臂刺進對手。\n有時會讓對手陷入中毒狀態。"
tr58:
  names:
    jp_kana: わざレコード５８
    jp_kanji: わざレコード５８
    en: TR58
    fr: DT58
    it: DT58
    de: TP58
    es: DT58
    ko: 기술레코드58
    zh_simp: 招式记录５８
    zh_trad: 招式紀錄５８
  descriptions:
    jp_kana: "体から　悪意に　みちた\n恐ろしい　オーラを　発する。\n相手を　ひるませることが　ある。"
    jp_kanji: "体から　悪意に　みちた\n恐ろしい　オーラを　発する。\n相手を　ひるませることが　ある。"
    en: "The user releases a horrible aura imbued with dark\nthoughts. This may also make the target flinch."
    fr: "Le lanceur projette une horrible aura chargée\nde pensées maléfiques, ce qui peut aussi apeurer\nla cible."
    it: "Il Pokémon emana un’aura impregnata di oscuri pensieri.\nPuò anche far tentennare il bersaglio."
    de: "Anwender greift mit fürchterlicher Aura schlechter\nGedanken an. Ziel schreckt eventuell zurück."
    es: "Libera una horrible aura llena de malos pensamientos\nque puede amedrentar al objetivo."
    ko: "몸에서 악의로 가득한\n무서운 오라를 발한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "从体内发出\n充满恶意的恐怖气场。\n有时会使对手畏缩。"
    zh_trad: "從身體散發出\n充滿惡意的恐怖氣場。\n有時會使對手畏縮。"
tr59:
  names:
    jp_kana: わざレコード５９
    jp_kanji: わざレコード５９
    en: TR59
    fr: DT59
    it: DT59
    de: TP59
    es: DT59
    ko: 기술레코드59
    zh_simp: 招式记录５９
    zh_trad: 招式紀錄５９
  descriptions:
    jp_kana: "硬い　殻を　もつ　大きな　タネを\n上から　たたきつけて\n相手を　攻撃する。"
    jp_kanji: "硬い　殻を　もつ　大きな　タネを\n上から　たたきつけて\n相手を　攻撃する。"
    en: "The user slams a barrage of hard-shelled seeds\ndown on the target from above."
    fr: "Le lanceur déclenche un déluge de grosses graines\nà la coque solide sur la cible."
    it: "Il Pokémon attacca il bersaglio dall’alto emettendo\nuna raffica di semi dal guscio duro."
    de: "Anwender lässt eine Menge Samen mit harter Schale\nvon oben auf das Ziel fallen."
    es: "Lanza al objetivo una descarga de enormes semillas\nde cáscara muy dura desde arriba."
    ko: "단단한 껍질을 가지고 있는\n큰 씨앗을 위에서 힘껏 내던져\n상대를 공격한다."
    zh_simp: "将外壳坚硬的大种子，\n从上方砸下攻击对手。"
    zh_trad: "從上方砸下外殼堅硬的\n大種子，攻擊對手。"
tr60:
  names:
    jp_kana: わざレコード６０
    jp_kanji: わざレコード６０
    en: TR60
    fr: DT60
    it: DT60
    de: TP60
    es: DT60
    ko: 기술레코드60
    zh_simp: 招式记录６０
    zh_trad: 招式紀錄６０
  descriptions:
    jp_kana: "カマや　ツメを　ハサミのように\n交差させながら　相手を　切り裂く。"
    jp_kanji: "カマや　ツメを　ハサミのように\n交差させながら　相手を　切り裂く。"
    en: "The user slashes at the target by crossing its\nscythes or claws as if they were a pair of scissors."
    fr: "Le lanceur taillade la cible en utilisant ses faux\nou ses griffes comme une paire de ciseaux."
    it: "Il Pokémon squarcia il bersaglio con un attacco\nche ricorda un colpo di forbici."
    de: "Der Anwender führt eine Attacke aus, die einer\nScherenbewegung ähnelt."
    es: "Cruza las guadañas o las garras para atacar al objetivo\ncomo si fueran unas tijeras."
    ko: "낫이나 발톱을 가위처럼\n교차시키면서 상대를 베어 가른다."
    zh_simp: "将镰刀或爪子像剪刀般地交叉，\n顺势劈开对手。"
    zh_trad: "將鐮刀或爪子像剪刀般地交叉，\n順勢劈開對手。"
tr61:
  names:
    jp_kana: わざレコード６１
    jp_kanji: わざレコード６１
    en: TR61
    fr: DT61
    it: DT61
    de: TP61
    es: DT61
    ko: 기술레코드61
    zh_simp: 招式记录６１
    zh_trad: 招式紀錄６１
  descriptions:
    jp_kana: "振動で　音波を　おこして\n攻撃する。相手の　特防を\nさげることが　ある。"
    jp_kanji: "振動で　音波を　おこして\n攻撃する。相手の　特防を\nさげることが　ある。"
    en: "The user generates a damaging sound wave by\nvibration. This may also lower the target’s\nSp. Def stat."
    fr: "Le lanceur fait vibrer son corps pour lancer une vague\nsonique, ce qui peut aussi baisser la Défense Spéciale\nde la cible."
    it: "Il Pokémon attacca generando un’onda sonora che può\nanche ridurre la Difesa Speciale del bersaglio."
    de: "Anwender erzeugt Schallwellen, die beim Ziel Schaden\nverursachen und eventuell dessen Spezial-Verteidigung\nsenken."
    es: "El usuario crea una onda sónica dañina moviendo\nsu cuerpo que también puede reducir la Defensa\nEspecial del objetivo."
    ko: "진동으로 음파를 일으켜서\n공격한다. 상대의 특수방어를\n떨어뜨릴 때가 있다."
    zh_simp: "利用振动发出音波进行攻击。\n有时会降低对手的特防。"
    zh_trad: "利用振動產生出的音波進行攻擊。\n有時會降低對手的特防。"
tr62:
  names:
    jp_kana: わざレコード６２
    jp_kanji: わざレコード６２
    en: TR62
    fr: DT62
    it: DT62
    de: TP62
    es: DT62
    ko: 기술레코드62
    zh_simp: 招式记录６２
    zh_trad: 招式紀錄６２
  descriptions:
    jp_kana: "大きな　口から　衝撃波を\nまきおこして　相手を　攻撃する。"
    jp_kanji: "大きな　口から　衝撃波を\nまきおこして　相手を　攻撃する。"
    en: "The target is attacked with a shock wave generated\nby the user’s gaping mouth."
    fr: "Le lanceur ouvre la bouche pour projeter une aura\nqui frappe la cible."
    it: "Il Pokémon attacca il bersaglio generando un’onda\nd’urto dalla bocca."
    de: "Das Ziel wird mit einer Schockwelle angegriffen,\ndie aus dem offenen Maul des Anwenders kommt."
    es: "Abre mucho la boca y libera una onda de choque con\nla que ataca al objetivo."
    ko: "큰 입으로 충격파를\n일으켜서 상대를 공격한다."
    zh_simp: "从大大的口中\n掀起冲击波攻击对手。"
    zh_trad: "從張大的口中\n發射衝擊波攻擊對手。"
tr63:
  names:
    jp_kana: わざレコード６３
    jp_kanji: わざレコード６３
    en: TR63
    fr: DT63
    it: DT63
    de: TP63
    es: DT63
    ko: 기술레코드63
    zh_simp: 招式记录６３
    zh_trad: 招式紀錄６３
  descriptions:
    jp_kana: "宝石のように　きらめく　光を\n発射して　相手を　攻撃する。"
    jp_kanji: "宝石のように　きらめく　光を\n発射して　相手を　攻撃する。"
    en: "The user attacks with a ray of light that sparkles as\nif it were made of gemstones."
    fr: "Le lanceur attaque avec un rayon de lumière\nqui scintille comme s’il était composé de gemmes."
    it: "Il Pokémon attacca con un raggio di luce che brilla\ncome se fosse fatto di pietre preziose."
    de: "Anwender attackiert mit einem Lichtstrahl, der funkelt,\nals sei er aus Juwelen."
    es: "Ataca con un rayo de luz que centellea como si lo\nformaran miles de joyas."
    ko: "보석처럼 반짝이는 빛을\n발사하여 상대를 공격한다."
    zh_simp: "发射如宝石般闪耀的光芒\n攻击对手。"
    zh_trad: "發射如寶石般\n閃耀的光芒攻擊對手。"
tr64:
  names:
    jp_kana: わざレコード６４
    jp_kanji: わざレコード６４
    en: TR64
    fr: DT64
    it: DT64
    de: TP64
    es: DT64
    ko: 기술레코드64
    zh_simp: 招式记录６４
    zh_trad: 招式紀錄６４
  descriptions:
    jp_kana: "気合を　高めて\nありったけの　力を　放出する。\n相手の　特防を　さげることが　ある。"
    jp_kanji: "気合を　高めて\nありったけの　力を　放出する。\n相手の　特防を　さげることが　ある。"
    en: "The user heightens its mental focus and unleashes\nits power. This may also lower the target’s\nSp. Def stat."
    fr: "Le lanceur rassemble ses forces et laisse éclater\nson pouvoir, ce qui peut aussi baisser la Défense\nSpéciale de la cible."
    it: "Il Pokémon si concentra e rilascia la sua forza.\nPuò ridurre la Difesa Speciale del bersaglio."
    de: "Anwender erhöht seinen mentalen Fokus und greift\ndann an. Senkt eventuell Spezial-Verteidigung des\nZieles."
    es: "Agudiza la concentración mental y libera su poder.\nPuede reducir la Defensa Especial del objetivo."
    ko: "기합을 높여서\n혼신의 힘을 방출한다. 상대의\n특수방어를 떨어뜨릴 때가 있다."
    zh_simp: "提高气势，\n释放出全部力量。\n有时会降低对手的特防。"
    zh_trad: "提高氣勢，\n釋放全身所有力量。\n有時會降低對手的特防。"
tr65:
  names:
    jp_kana: わざレコード６５
    jp_kanji: わざレコード６５
    en: TR65
    fr: DT65
    it: DT65
    de: TP65
    es: DT65
    ko: 기술레코드65
    zh_simp: 招式记录６５
    zh_trad: 招式紀錄６５
  descriptions:
    jp_kana: "自然から　集めた\n命の力を　発射する。\n相手の　特防を　さげることがある。"
    jp_kanji: "自然から　集めた\n命の力を　発射する。\n相手の　特防を　さげることがある。"
    en: "The user draws power from nature and fires it at the\ntarget. This may also lower the target’s Sp. Def stat."
    fr: "Le lanceur utilise les pouvoirs de la nature pour attaquer\nla cible, ce qui peut aussi baisser la Défense Spéciale de\ncelle-ci."
    it: "Il Pokémon attinge energia dalla natura e la scaglia\ncontro il bersaglio. Può anche ridurne la Difesa Speciale."
    de: "Anwender zieht Kraft aus der Natur und feuert sie auf\ndas Ziel. Senkt eventuell Spezial-Verteidigung des\nZieles."
    es: "Aúna fuerzas de la naturaleza y libera su ataque.\nPuede reducir la Defensa Especial del objetivo."
    ko: "자연으로부터 모은\n생명의 힘을 발사한다.\n상대의 특수방어를 떨어뜨릴 때가 있다."
    zh_simp: "发射从自然收集的生命力量。\n有时会降低对手的特防。"
    zh_trad: "發射從大自然匯聚而來的生命力量。\n有時會降低對手的特防。"
tr66:
  names:
    jp_kana: わざレコード６６
    jp_kanji: わざレコード６６
    en: TR66
    fr: DT66
    it: DT66
    de: TP66
    es: DT66
    ko: 기술레코드66
    zh_simp: 招式记录６６
    zh_trad: 招式紀錄６６
  descriptions:
    jp_kana: "はねを　おりたたみ\n低空飛行で　突撃する。\n自分も　かなり　ダメージを　受ける。"
    jp_kanji: "はねを　おりたたみ\n低空飛行で　突撃する。\n自分も　かなり　ダメージを　受ける。"
    en: "The user tucks in its wings and charges from a low\naltitude. This also damages the user quite a lot."
    fr: "Le lanceur replie ses ailes et charge en rase-mottes.\nBlesse gravement le lanceur."
    it: "Il Pokémon ripiega le ali e carica da bassa quota.\nTuttavia, subisce seri danni."
    de: "Anwender greift aus niedriger Höhe an. Er erleidet\nbei dieser Attacke selbst großen Schaden."
    es: "Pliega las alas y ataca con un vuelo rasante. El usuario\nse hiere seriamente a sí mismo."
    ko: "날개를 접어\n저공비행으로 돌격한다.\n자신도 상당한 데미지를 입는다."
    zh_simp: "收拢翅膀，\n通过低空飞行突击对手。\n自己也会受到不小的伤害。"
    zh_trad: "收起翅膀，\n低空飛行突擊對手。\n自己也會受到不小的傷害。"
tr67:
  names:
    jp_kana: わざレコード６７
    jp_kanji: わざレコード６７
    en: TR67
    fr: DT67
    it: DT67
    de: TP67
    es: DT67
    ko: 기술레코드67
    zh_simp: 招式记录６７
    zh_trad: 招式紀錄６７
  descriptions:
    jp_kana: "相手の　足下へ　大地の力を\n放出する。相手の　特防を\nさげることが　ある。"
    jp_kanji: "相手の　足下へ　大地の力を\n放出する。相手の　特防を\nさげることが　ある。"
    en: "The user makes the ground under the target erupt\nwith power. This may also lower the target’s\nSp. Def stat."
    fr: "De terribles séismes secouent la cible et peuvent aussi\nbaisser sa Défense Spéciale."
    it: "Una forza devastante si sprigiona dal terreno sotto\nil bersaglio. Può anche ridurne la Difesa Speciale."
    de: "Der Boden unter dem Ziel erzittert durch die Kraft\nder Erde. Senkt eventuell Spezial-Verteidigung."
    es: "La tierra a los pies del objetivo erupciona\nviolentamente. Puede reducir la Defensa Especial\ndel objetivo."
    ko: "상대의 발밑에 대지의 힘을\n방출한다. 상대의 특수방어를\n떨어뜨릴 때가 있다."
    zh_simp: "向对手脚下释放出大地之力。\n有时会降低对手的特防。"
    zh_trad: "向對手腳下\n釋放出大地之力。\n有時會降低對手的特防。"
tr68:
  names:
    jp_kana: わざレコード６８
    jp_kanji: わざレコード６８
    en: TR68
    fr: DT68
    it: DT68
    de: TP68
    es: DT68
    ko: 기술레코드68
    zh_simp: 招式记录６８
    zh_trad: 招式紀錄６８
  descriptions:
    jp_kana: "悪いことを　考えて\n頭を　活性化させる。\n自分の　特攻を　ぐーんと　あげる。"
    jp_kanji: "悪いことを　考えて\n頭を　活性化させる。\n自分の　特攻を　ぐーんと　あげる。"
    en: "The user stimulates its brain by thinking bad\nthoughts. This sharply raises the user’s Sp. Atk stat."
    fr: "Stimule l’esprit par de mauvaises pensées.\nAugmente beaucoup l’Attaque Spéciale du lanceur."
    it: "Il Pokémon stimola il cervello pensando a cose\ncattive. Aumenta di molto l’Attacco Speciale."
    de: "Anwender stimuliert sein Gehirn und hat finstere\nGedanken. Erhöht Spezial-Angriff stark."
    es: "Estimula su cerebro pensando en cosas malas.\nAumenta mucho el Ataque Especial."
    ko: "나쁜 일을 생각해서\n머리를 활성화시킨다.\n자신의 특수공격을 크게 올린다."
    zh_simp: "谋划诡计，激活头脑。\n大幅提高自己的特攻。"
    zh_trad: "動歪腦筋，活化大腦。\n大幅提高自己的特攻。"
tr69:
  names:
    jp_kana: わざレコード６９
    jp_kanji: わざレコード６９
    en: TR69
    fr: DT69
    it: DT69
    de: TP69
    es: DT69
    ko: 기술레코드69
    zh_simp: 招式记录６９
    zh_trad: 招式紀錄６９
  descriptions:
    jp_kana: "思念の　力を\n額に　集めて　攻撃する。\n相手を　ひるませることが　ある。"
    jp_kanji: "思念の　力を\n額に　集めて　攻撃する。\n相手を　ひるませることが　ある。"
    en: "The user focuses its willpower to its head and\nattacks the target. This may also make the\ntarget flinch."
    fr: "Le lanceur concentre sa volonté et donne un coup\nde tête à la cible, ce qui peut aussi apeurer celle-ci."
    it: "Il Pokémon concentra le energie psichiche nella testa\ne attacca il bersaglio. Può anche farlo tentennare."
    de: "Anwender konzentriert seinen Willen und rammt das\nZiel. Dieses schreckt eventuell zurück."
    es: "Concentra su energía psíquica en la cabeza para\ngolpear. Puede hacer que el objetivo se amedrente."
    ko: "사념의 힘을\n이마에 모아서 공격한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "将思念的力量\n集中在前额进行攻击。\n有时会使对手畏缩。"
    zh_trad: "將意念的力量集中在\n前額進行攻擊。\n有時會讓對手畏縮。"
tr70:
  names:
    jp_kana: わざレコード７０
    jp_kanji: わざレコード７０
    en: TR70
    fr: DT70
    it: DT70
    de: TP70
    es: DT70
    ko: 기술레코드70
    zh_simp: 招式记录７０
    zh_trad: 招式紀錄７０
  descriptions:
    jp_kana: "体の　光を　一点に　集めて\n力を　放つ。\n相手の　特防を　さげることが　ある。"
    jp_kanji: "体の　光を　一点に　集めて\n力を　放つ。\n相手の　特防を　さげることが　ある。"
    en: "The user gathers all its light energy and releases it\nall at once. This may also lower the target’s\nSp. Def stat."
    fr: "Le lanceur concentre son énergie lumineuse\net la fait exploser, ce qui peut aussi baisser\nla Défense Spéciale de la cible."
    it: "Il Pokémon attacca raccogliendo e rilasciando energia\nluminosa. Può ridurre la Difesa Speciale del bersaglio."
    de: "Anwender sammelt Lichtenergie und feuert sie auf\neinmal ab. Senkt eventuell Spezial-Verteidigung des\nZieles."
    es: "El usuario concentra toda la luz del cuerpo y la libera.\nPuede reducir la Defensa Especial del objetivo."
    ko: "몸의 빛을 한곳에 모아서\n힘을 방출한다. 상대의 특수방어를\n떨어뜨릴 때가 있다."
    zh_simp: "将身体的光芒聚集在一点\n释放出去。\n有时会降低对手的特防。"
    zh_trad: "將身體的光芒\n聚集在一個點後釋放出去。\n有時會降低對手的特防。"
tr71:
  names:
    jp_kana: わざレコード７１
    jp_kanji: わざレコード７１
    en: TR71
    fr: DT71
    it: DT71
    de: TP71
    es: DT71
    ko: 기술레코드71
    zh_simp: 招式记录７１
    zh_trad: 招式紀錄７１
  descriptions:
    jp_kana: "とがった　はっぱで　相手に　あらしを\nおこす。使うと　反動で\n自分の　特攻が　がくっと　さがる。"
    jp_kanji: "とがった　はっぱで　相手に　あらしを\nおこす。使うと　反動で\n自分の　特攻が　がくっと　さがる。"
    en: "The user whips up a storm of leaves around the\ntarget. The attack’s recoil harshly lowers the user’s\nSp. Atk stat."
    fr: "Invoque une tempête de feuilles acérées.\nLe contrecoup réduit beaucoup l’Attaque Spéciale\ndu lanceur."
    it: "Il Pokémon scatena sul bersaglio una tempesta\ndi foglie affilate. Il contraccolpo riduce di molto\nl’Attacco Speciale di chi la usa."
    de: "Anwender erzeugt einen Sturm aus scharfen Blättern.\nRückstoß senkt Spezial-Angriff des Anwenders stark."
    es: "Envuelve al objetivo con una lluvia de hojas afiladas,\npero reduce mucho el Ataque Especial del usuario."
    ko: "뾰족한 잎사귀로 상대에게 돌풍을\n일으킨다. 사용하면 반동으로\n자신의 특수공격이 크게 떨어진다."
    zh_simp: "用尖尖的叶片向对手卷起风暴。\n使用之后因为反作用力\n自己的特攻会大幅降低。"
    zh_trad: "用尖銳的葉子捲起風暴向對手進行攻擊。\n使用後因為反作用力，\n自己的特攻會大幅降低。"
tr72:
  names:
    jp_kana: わざレコード７２
    jp_kanji: わざレコード７２
    en: TR72
    fr: DT72
    it: DT72
    de: TP72
    es: DT72
    ko: 기술레코드72
    zh_simp: 招式记录７２
    zh_trad: 招式紀錄７２
  descriptions:
    jp_kana: "ツタや　触手を　激しく　ふるって\n相手を　たたきつけ　攻撃する。"
    jp_kanji: "ツタや　触手を　激しく　ふるって\n相手を　たたきつけ　攻撃する。"
    en: "The user violently whirls its vines, tentacles, or the\nlike to harshly lash the target."
    fr: "Le lanceur fait virevolter violemment ses lianes\nou ses tentacules pour fouetter la cible."
    it: "Il Pokémon attacca sferzando il bersaglio con liane\no tentacoli che agita violentemente."
    de: "Anwender wirbelt seine Ranken oder Tentakel\npeitschenartig gegen das Ziel."
    es: "El usuario agita violentamente sus lianas o tentáculos\npara golpear al objetivo."
    ko: "덩굴이나 촉수를 세차게 휘둘러\n상대를 힘껏 쳐서 공격한다."
    zh_simp: "激烈地挥舞青藤或触手\n摔打对手进行攻击。"
    zh_trad: "激烈地揮舞藤蔓或觸手\n向對手進行攻擊。"
tr73:
  names:
    jp_kana: わざレコード７３
    jp_kanji: わざレコード７３
    en: TR73
    fr: DT73
    it: DT73
    de: TP73
    es: DT73
    ko: 기술레코드73
    zh_simp: 招式记录７３
    zh_trad: 招式紀錄７３
  descriptions:
    jp_kana: "汚い　ゴミを\n相手に　ぶつけて　攻撃する。\n毒状態に　することが　ある。"
    jp_kanji: "汚い　ゴミを\n相手に　ぶつけて　攻撃する。\n毒状態に　することが　ある。"
    en: "The user shoots filthy garbage at the target to\nattack. This may also poison the target."
    fr: "Le lanceur envoie des détritus sur la cible, ce qui peut\naussi l’empoisonner."
    it: "Il Pokémon attacca con rifiuti sudici che possono anche\navvelenare il bersaglio."
    de: "Anwender schießt mit Müll auf das Ziel. Vergiftet dieses\neventuell."
    es: "Lanza contra el objetivo basura asquerosa y puede\nenvenenarlo."
    ko: "더러운 쓰레기를\n상대에게 부딪쳐서 공격한다.\n독 상태로 만들 때가 있다."
    zh_simp: "用肮脏的垃圾\n撞向对手进行攻击。\n有时会让对手陷入中毒状态。"
    zh_trad: "將骯髒的垃圾\n丟向對手進行攻擊。\n有時會讓對手陷入中毒狀態。"
tr74:
  names:
    jp_kana: わざレコード７４
    jp_kanji: わざレコード７４
    en: TR74
    fr: DT74
    it: DT74
    de: TP74
    es: DT74
    ko: 기술레코드74
    zh_simp: 招式记录７４
    zh_trad: 招式紀錄７４
  descriptions:
    jp_kana: "鋼の　ような\n硬い　頭で　攻撃する。\n相手を　ひるませることが　ある。"
    jp_kanji: "鋼の　ような\n硬い　頭で　攻撃する。\n相手を　ひるませることが　ある。"
    en: "The user slams the target with its steel-hard head.\nThis may also make the target flinch."
    fr: "Le lanceur heurte la cible avec sa tête dure\ncomme de l’acier, ce qui peut aussi l’apeurer."
    it: "Il Pokémon attacca il bersaglio con la sua testa dura\ncome l’acciaio. Può anche farlo tentennare."
    de: "Ziel wird durch stahlharten Kopf des Anwenders\ngetroffen und schreckt eventuell zurück."
    es: "Ataca con su cabeza dura como el hierro. Puede hacer\nque el objetivo se amedrente."
    ko: "강철과 같은\n단단한 머리로 공격한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "用钢铁般坚硬的头部进行攻击。\n有时会使对手畏缩。"
    zh_trad: "用如同鋼鐵般\n堅硬的頭部進行攻擊。\n有時會讓對手畏縮。"
tr75:
  names:
    jp_kana: わざレコード７５
    jp_kanji: わざレコード７５
    en: TR75
    fr: DT75
    it: DT75
    de: TP75
    es: DT75
    ko: 기술레코드75
    zh_simp: 招式记录７５
    zh_trad: 招式紀錄７５
  descriptions:
    jp_kana: "とがった　岩を\n相手に　突き刺して　攻撃する。\n急所に　当たりやすい。"
    jp_kanji: "とがった　岩を\n相手に　突き刺して　攻撃する。\n急所に　当たりやすい。"
    en: "The user stabs the target from below with\nsharpened stones. Critical hits land more easily."
    fr: "Le lanceur transperce la cible avec des rochers aiguisés.\nTaux de critiques élevé."
    it: "Il Pokémon attacca il bersaglio infilzandolo con pietre\naffilate. Probabile brutto colpo."
    de: "Anwender schleudert scharfe Steine auf das Ziel.\nHohe Volltrefferquote."
    es: "Clava piedras muy afiladas al objetivo. Suele asestar\nun golpe crítico."
    ko: "뾰족한 바위를\n상대에게 꿰찔러서 공격한다.\n급소에 맞기 쉽다."
    zh_simp: "用尖尖的岩石\n刺入对手进行攻击。\n容易击中要害。"
    zh_trad: "用尖銳的岩石\n刺進對手進行攻擊。\n容易擊中要害。"
tr76:
  names:
    jp_kana: わざレコード７６
    jp_kanji: わざレコード７６
    en: TR76
    fr: DT76
    it: DT76
    de: TP76
    es: DT76
    ko: 기술레코드76
    zh_simp: 招式记录７６
    zh_trad: 招式紀錄７６
  descriptions:
    jp_kana: "相手の　周りに　無数の　岩を\n浮かべて　交代で　でてきた　相手の\nポケモンに　ダメージを　与える。"
    jp_kanji: "相手の　周りに　無数の　岩を\n浮かべて　交代で　でてきた　相手の\nポケモンに　ダメージを　与える。"
    en: "The user lays a trap of levitating stones around the\nopposing team. The trap hurts opposing Pokémon\nthat switch into battle."
    fr: "Le lanceur fait flotter des pierres autour de la cible\nqui blessent tout adversaire entrant au combat."
    it: "Il Pokémon piazza una trappola di rocce sospese che\ndanneggia gli avversari che entrano in campo."
    de: "Der Anwender legt eine Falle aus schwebenden Steinen\naus, die gegnerische Pokémon verletzen, die in den\nKampf gerufen werden."
    es: "Hace flotar innumerables rocas alrededor del objetivo\nque hieren a los rivales que entran en combate."
    ko: "상대의 주위에 무수한 바위를 띄워\n교체되어 나온 상대 포켓몬에게\n데미지를 준다."
    zh_simp: "将无数岩石悬浮在对手的周围，\n从而对替换出场的\n对手的宝可梦给予伤害。"
    zh_trad: "在對手周圍撒下無數飄浮的岩石，\n讓對手替換出場的寶可夢受到傷害。"
tr77:
  names:
    jp_kana: わざレコード７７
    jp_kanji: わざレコード７７
    en: TR77
    fr: DT77
    it: DT77
    de: TP77
    es: DT77
    ko: 기술레코드77
    zh_simp: 招式记录７７
    zh_trad: 招式紀錄７７
  descriptions:
    jp_kana: "草を　からませて　相手を\n転ばせる。相手が　重いほど\n威力が　あがる。"
    jp_kanji: "草を　からませて　相手を\n転ばせる。相手が　重いほど\n威力が　あがる。"
    en: "The user snares the target with grass and trips it.\nThe heavier the target, the greater the\nmove’s power."
    fr: "Le lanceur fait des nœuds dans l’herbe pour faire\ntrébucher la cible. Plus la cible est lourde, plus\nla puissance de cette capacité augmente."
    it: "Il Pokémon intrappola il bersaglio con l’erba e lo\nfa cadere. Più il bersaglio è pesante, maggiore è\nla potenza della mossa."
    de: "Ziel wird durch Gras ins Straucheln gebracht.\nJe schwerer das Ziel, desto mehr Schaden."
    es: "Enreda al objetivo con hierba y lo derriba. Cuanto\nmás pesado es el objetivo, más potencia tiene el\nmovimiento."
    ko: "풀을 휘감아서 상대를\n쓰러뜨린다. 상대가 무거울수록\n위력이 올라간다."
    zh_simp: "用草缠住并绊倒对手。\n对手越重，威力越大。"
    zh_trad: "用打結的草絆倒對手。\n對手越重，威力越大。"
tr78:
  names:
    jp_kana: わざレコード７８
    jp_kanji: わざレコード７８
    en: TR78
    fr: DT78
    it: DT78
    de: TP78
    es: DT78
    ko: 기술레코드78
    zh_simp: 招式记录７８
    zh_trad: 招式紀錄７８
  descriptions:
    jp_kana: "ヘドロの　波で　自分の\n周りに　いるものを　攻撃する。\n毒状態に　することが　ある。"
    jp_kanji: "ヘドロの　波で　自分の\n周りに　いるものを　攻撃する。\n毒状態に　することが　ある。"
    en: "The user strikes everything around it by swamping\nthe area with a giant sludge wave. This may also\npoison those hit."
    fr: "Une vague de détritus attaque tous les Pokémon\nautour du lanceur. Peut aussi empoisonner."
    it: "Chi la usa attacca con un’onda di fango gli altri Pokémon\nattorno. Può anche avvelenarli."
    de: "Greift alle Pokémon im Umkreis mit einer Schlammwelle\nan. Diese werden eventuell auch vergiftet."
    es: "Una onda tóxica que daña a los Pokémon adyacentes.\nPuede envenenar."
    ko: "오물 파도로 자신의\n주위에 있는 포켓몬을 공격한다.\n독 상태로 만들 때가 있다."
    zh_simp: "用污泥波攻击\n自己周围所有的宝可梦。\n有时会陷入中毒状态。"
    zh_trad: "用污泥波攻擊\n自己周圍所有的寶可夢。\n有時會讓對手陷入中毒狀態。"
tr79:
  names:
    jp_kana: わざレコード７９
    jp_kanji: わざレコード７９
    en: TR79
    fr: DT79
    it: DT79
    de: TP79
    es: DT79
    ko: 기술레코드79
    zh_simp: 招式记录７９
    zh_trad: 招式紀錄７９
  descriptions:
    jp_kana: "重たい　体で　相手に　ぶつかって\n攻撃する。　自分が　相手より\n重いほど　威力が　あがる。"
    jp_kanji: "重たい　体で　相手に　ぶつかって\n攻撃する。　自分が　相手より\n重いほど　威力が　あがる。"
    en: "The user slams into the target with its heavy body.\nThe more the user outweighs the target, the greater\nthe move’s power."
    fr: "Le lanceur se jette sur la cible de tout son poids.\nPlus il est lourd par rapport à la cible, plus la puissance\nde cette capacité augmente."
    it: "Il Pokémon si lancia contro il bersaglio con tutto\nil proprio peso. Più è pesante rispetto al bersaglio,\nmaggiore è la potenza della mossa."
    de: "Anwender rammt das Ziel mit massivem Körper.\nJe schwerer er im Vergleich zum Ziel ist, desto\nstärker die Attacke."
    es: "El usuario golpea con todo su cuerpo. Cuanto mayor\nsea su peso comparado con el del objetivo, mayor será\nla potencia del movimiento."
    ko: "무거운 몸으로 상대에게 부딪쳐\n공격한다. 자신이 상대보다\n무거울수록 위력이 올라간다."
    zh_simp: "用沉重的身体撞向对手进行攻击。\n自己比对手越重，威力越大。"
    zh_trad: "用沉重的身體衝撞對手進行攻擊。\n體重比對手重越多，威力越大。"
tr80:
  names:
    jp_kana: わざレコード８０
    jp_kanji: わざレコード８０
    en: TR80
    fr: DT80
    it: DT80
    de: TP80
    es: DT80
    ko: 기술레코드80
    zh_simp: 招式记录８０
    zh_trad: 招式紀錄８０
  descriptions:
    jp_kana: "電気の　塊を　相手に\nぶつける。相手より　素早さが\n速いほど　威力が　あがる。"
    jp_kanji: "電気の　塊を　相手に\nぶつける。相手より　素早さが\n速いほど　威力が　あがる。"
    en: "The user hurls an electric orb at the target. The\nfaster the user is than the target, the greater the\nmove’s power."
    fr: "Le lanceur envoie une boule d’électricité. Plus la Vitesse\ndu lanceur est élevée par rapport à celle de la cible,\nplus la puissance de la capacité augmente."
    it: "Il Pokémon colpisce il bersaglio con una sfera d’energia\nelettrica. Più è rapido rispetto al bersaglio, maggiore è\nla potenza della mossa."
    de: "Je höher die Initiative des Anwenders im Vergleich\nzum Ziel ist, desto stärker trifft dieses eine geballte\nLadung Strom."
    es: "Lanza una bola eléctrica. Cuanto mayor sea la\nVelocidad del usuario en comparación con la del\nobjetivo, mayor será la potencia del movimiento."
    ko: "전기 덩어리를 상대에게 부딪쳐서\n공격한다. 상대보다 스피드가\n빠를수록 위력이 올라간다."
    zh_simp: "用电气团撞向对手。\n自己比对手速度越快，威力越大。"
    zh_trad: "用電球攻擊對手。\n速度比對手快越多，\n威力越大。"
tr81:
  names:
    jp_kana: わざレコード８１
    jp_kanji: わざレコード８１
    en: TR81
    fr: DT81
    it: DT81
    de: TP81
    es: DT81
    ko: 기술레코드81
    zh_simp: 招式记录８１
    zh_trad: 招式紀錄８１
  descriptions:
    jp_kana: "相手の　力を　利用する。\n戦っている　相手の　攻撃が\n高いほど　ダメージが　あがる。"
    jp_kanji: "相手の　力を　利用する。\n戦っている　相手の　攻撃が\n高いほど　ダメージが　あがる。"
    en: "The user turns the target’s power against it.\nThe higher the target’s Attack stat, the greater\nthe damage it deals."
    fr: "Le lanceur utilise la force de la cible. Plus l’Attaque de\ncelle-ci est élevée, plus le lanceur inflige de dégâts."
    it: "Il Pokémon sfrutta la forza del bersaglio. Il danno\ninflitto è proporzionale all’Attacco dell’avversario."
    de: "Anwender macht sich die Kraft des Zieles zunutze.\nJe höher dessen Angriff, desto mehr Schaden richtet\ndie Attacke an."
    es: "El usuario emplea la fuerza del objetivo para atacarlo.\nCuanto mayor es el Ataque del objetivo, más daño\nprovoca."
    ko: "상대의 힘을 이용한다.\n싸우고 있는 상대의 공격이\n높을수록 데미지가 올라간다."
    zh_simp: "利用对手的力量进行攻击。\n正和自己战斗的对手，\n其攻击越高，伤害越大。"
    zh_trad: "利用對手的力量進行攻擊。\n對手的攻擊越高，\n給予對手的傷害越大。"
tr82:
  names:
    jp_kana: わざレコード８２
    jp_kanji: わざレコード８２
    en: TR82
    fr: DT82
    it: DT82
    de: TP82
    es: DT82
    ko: 기술레코드82
    zh_simp: 招式记录８２
    zh_trad: 招式紀錄８２
  descriptions:
    jp_kana: "蓄積された　パワーで　相手を\n攻撃する。自分の　能力が\nあがっているほど　威力が　あがる。"
    jp_kanji: "蓄積された　パワーで　相手を\n攻撃する。自分の　能力が\nあがっているほど　威力が　あがる。"
    en: "The user attacks the target with stored power.\nThe more the user’s stats are raised, the greater\nthe move’s power."
    fr: "Le lanceur attaque la cible avec une force cumulée.\nPlus les stats du lanceur sont augmentées,\nplus la puissance de cette capacité augmente."
    it: "Il Pokémon attacca il bersaglio con l’energia\naccumulata. Più sono state aumentate le\nstatistiche, maggiore è la potenza della mossa."
    de: "Angriff mit angesparter Energie. Je stärker die\nStatuswerte des Anwenders erhöht wurden, desto mehr\nSchaden richtet diese Attacke an."
    es: "Acumula poder para golpear. Cuanto más suban las\ncaracterísticas del usuario, mayor será la potencia del\nmovimiento."
    ko: "축적된 파워로 상대를 공격한다.\n자신의 능력이 올라가 있는 만큼\n위력이 오른다."
    zh_simp: "用蓄积起来的力量攻击对手。\n自己的能力提高得越多，威力就越大。"
    zh_trad: "用蓄積的力量攻擊對手。\n自己的能力提高越多，\n招式的威力越大。"
tr83:
  names:
    jp_kana: わざレコード８３
    jp_kanji: わざレコード８３
    en: TR83
    fr: DT83
    it: DT83
    de: TP83
    es: DT83
    ko: 기술레코드83
    zh_simp: 招式记录８３
    zh_trad: 招式紀錄８３
  descriptions:
    jp_kana: "不思議な　力で　テレポートして\n自分と　味方の　居場所を\n入れ替える。"
    jp_kanji: "不思議な　力で　テレポートして\n自分と　味方の　居場所を\n入れ替える。"
    en: "The user teleports using a strange power and\nswitches places with one of its allies."
    fr: "Le lanceur se téléporte à l’aide d’un pouvoir mystérieux.\nIl échange sa place avec celle d’un allié sur le terrain."
    it: "Il Pokémon cambia di posto con un alleato\nin campo grazie a un misterioso potere."
    de: "Wundersame Kräfte teleportieren den Anwender an\nden Platz eines Mitstreiters."
    es: "Extraño poder que intercambia la posición del usuario\ncon la de un aliado sobre el terreno de combate."
    ko: "이상한 힘으로 순간이동하여\n자신과 같은 편의 위치를 바꾼다."
    zh_simp: "用神奇的力量瞬间移动，\n互换自己和同伴所在的位置。"
    zh_trad: "用神奇的力量瞬間移動，\n讓自己和同伴的所在位置互換。"
tr84:
  names:
    jp_kana: わざレコード８４
    jp_kanji: わざレコード８４
    en: TR84
    fr: DT84
    it: DT84
    de: TP84
    es: DT84
    ko: 기술레코드84
    zh_simp: 招式记录８４
    zh_trad: 招式紀錄８４
  descriptions:
    jp_kana: "熱く　煮えたぎる　水を\n相手に　発射して　攻撃する。\nやけど状態に　することが　ある。"
    jp_kanji: "熱く　煮えたぎる　水を\n相手に　発射して　攻撃する。\nやけど状態に　することが　ある。"
    en: "The user shoots boiling hot water at its target.\nThis may also leave the target with a burn."
    fr: "Le lanceur projette un jet d’eau bouillante sur la cible,\nce qui peut aussi la brûler."
    it: "Il Pokémon attacca il bersaglio con un getto\nd’acqua bollente che può anche scottarlo."
    de: "Heizt dem Ziel mit einem Schwall siedend heißen\nKochwassers ein. Das Ziel erleidet dabei eventuell\nVerbrennungen."
    es: "Ataca arrojando agua hirviendo al objetivo. Puede\ncausar quemaduras."
    ko: "뜨겁게 끓어오르는 물을\n상대에게 발사해서 공격한다.\n화상 상태로 만들 때가 있다."
    zh_simp: "向对手喷射煮得翻滚的开水进行攻击。\n有时会让对手陷入灼伤状态。"
    zh_trad: "向對手噴射\n滾燙的熱水進行攻擊。\n有時會讓對手陷入灼傷狀態。"
tr85:
  names:
    jp_kana: わざレコード８５
    jp_kanji: わざレコード８５
    en: TR85
    fr: DT85
    it: DT85
    de: TP85
    es: DT85
    ko: 기술레코드85
    zh_simp: 招式记录８５
    zh_trad: 招式紀錄８５
  descriptions:
    jp_kana: "自分を　奮いたてて\n攻撃と　特攻を　あげる。"
    jp_kanji: "自分を　奮いたてて\n攻撃と　特攻を　あげる。"
    en: "The user is roused, and its Attack and Sp. Atk\nstats increase."
    fr: "Le lanceur se rengorge et augmente son Attaque\net son Attaque Spéciale."
    it: "Il Pokémon si tira su di morale, aumentando\nil proprio Attacco e l’Attacco Speciale."
    de: "Anwender erhält einen Kraftschub, der seinen Angriff\nund Spezial-Angriff erhöht."
    es: "El usuario se concentra y aumenta su Ataque y su Ataque\nEspecial."
    ko: "스스로 분발해서\n공격과 특수공격을 올린다."
    zh_simp: "激励自己，\n从而提高攻击和特攻。"
    zh_trad: "激勵自己，\n提高自己的攻擊和特攻。"
tr86:
  names:
    jp_kana: わざレコード８６
    jp_kanji: わざレコード８６
    en: TR86
    fr: DT86
    it: DT86
    de: TP86
    es: DT86
    ko: 기술레코드86
    zh_simp: 招式记录８６
    zh_trad: 招式紀錄８６
  descriptions:
    jp_kana: "電気を　まとって\n相手に　ぶつかって　攻撃する。\n自分も　少し　ダメージを　受ける。"
    jp_kanji: "電気を　まとって\n相手に　ぶつかって　攻撃する。\n自分も　少し　ダメージを　受ける。"
    en: "The user shrouds itself in electricity and smashes\ninto its target. This also damages the user a little."
    fr: "Une charge électrique violente qui blesse aussi\nlégèrement le lanceur."
    it: "Il Pokémon si carica di elettricità per poi scagliarsi\nsul bersaglio, ma subisce un po’ di danni."
    de: "Anwender erzeugt Spannung und greift an, indem er\nauf Kollisionskurs geht. Er erleidet selbst leichten\nSchaden."
    es: "El usuario se envuelve de electricidad y carga contra el\nobjetivo, pero también se hiere ligeramente a sí mismo."
    ko: "전기를 두르고\n상대에게 부딪쳐 공격한다.\n자신도 조금 데미지를 입는다."
    zh_simp: "让电流覆盖全身，\n撞向对手进行攻击。\n自己也会受到少许伤害。"
    zh_trad: "讓電流圍繞全身，\n衝撞對手進行攻擊。\n自己也會受到少許傷害。"
tr87:
  names:
    jp_kana: わざレコード８７
    jp_kanji: わざレコード８７
    en: TR87
    fr: DT87
    it: DT87
    de: TP87
    es: DT87
    ko: 기술레코드87
    zh_simp: 招式记录８７
    zh_trad: 招式紀錄８７
  descriptions:
    jp_kana: "ドリルのように　体を　回転しながら\n相手に　体当たりする。\n急所に　当たりやすい。"
    jp_kanji: "ドリルのように　体を　回転しながら\n相手に　体当たりする。\n急所に　当たりやすい。"
    en: "The user crashes into its target while rotating its\nbody like a drill. Critical hits land more easily."
    fr: "Le lanceur tourne sur lui-même comme une perceuse\net se jette sur la cible. Taux de critiques élevé."
    it: "Il Pokémon si scaglia sul bersaglio ruotando su se stesso\ncome un trapano perforante. Probabile brutto colpo."
    de: "Anwender rammt das Ziel, während er seinen Körper\nwie einen Bohrer dreht. Hohe Volltrefferquote."
    es: "El usuario golpea usando su cuerpo como un taladro.\nSuele asestar un golpe crítico."
    ko: "드릴처럼 몸을 회전시켜서\n상대에게 몸통박치기한다.\n급소에 맞기 쉽다."
    zh_simp: "像钢钻一样，\n一边旋转身体一边撞击对手。\n容易击中要害。"
    zh_trad: "像鑽頭一樣旋轉身體，\n猛烈地撞擊對手。\n容易擊中要害。"
tr88:
  names:
    jp_kana: わざレコード８８
    jp_kanji: わざレコード８８
    en: TR88
    fr: DT88
    it: DT88
    de: TP88
    es: DT88
    ko: 기술레코드88
    zh_simp: 招式记录８８
    zh_trad: 招式紀錄８８
  descriptions:
    jp_kana: "燃える　体で　相手に　ぶつかって\n攻撃する。　自分が　相手より\n重いほど　威力が　あがる。"
    jp_kanji: "燃える　体で　相手に　ぶつかって\n攻撃する。　自分が　相手より\n重いほど　威力が　あがる。"
    en: "The user slams its target with its flame-covered\nbody. The more the user outweighs the target, the\ngreater the move’s power."
    fr: "Le lanceur projette son corps enflammé contre la cible.\nPlus il est lourd par rapport à la cible, plus la puissance\nde cette capacité augmente."
    it: "Il Pokémon carica con il suo corpo rovente. Più è\npesante rispetto al bersaglio, maggiore è la potenza\ndella mossa."
    de: "Rempelattacke mit brennendem Körper. Je schwerer\nder Anwender im Vergleich zum Ziel ist, desto stärker\ndie Attacke."
    es: "El usuario ataca con su cuerpo ardiente. Cuanto mayor\nsea su peso comparado con el del objetivo, mayor será\nla potencia del movimiento."
    ko: "불타는 몸으로 상대에게 부딪쳐서\n공격한다. 자신이 상대보다\n무거울수록 위력이 올라간다."
    zh_simp: "用燃烧的身体\n撞向对手进行攻击。\n自己比对手越重，威力越大。"
    zh_trad: "用燃燒的身體重壓對手\n進行攻擊。體重比對手\n重越多，威力越大。"
tr89:
  names:
    jp_kana: わざレコード８９
    jp_kanji: わざレコード８９
    en: TR89
    fr: DT89
    it: DT89
    de: TP89
    es: DT89
    ko: 기술레코드89
    zh_simp: 招式记录８９
    zh_trad: 招式紀錄８９
  descriptions:
    jp_kana: "強烈な　風で　相手を\n包みこんで　攻撃する。\n相手を　混乱させることが　ある。"
    jp_kanji: "強烈な　風で　相手を\n包みこんで　攻撃する。\n相手を　混乱させることが　ある。"
    en: "The user attacks by wrapping its opponent in a\nfierce wind that flies up into the sky. This may also\nconfuse the target."
    fr: "Le lanceur déclenche une tempête de vents violents\nqui s’abat sur la cible, et peut aussi la rendre confuse."
    it: "Il Pokémon attacca il bersaglio avvolgendolo con\nun vento fortissimo. Può anche confonderlo."
    de: "Anwender greift das Ziel an, indem er es mit heftigen\nWindböen umgibt. Ziel wird eventuell verwirrt."
    es: "Golpea al objetivo con un fuerte torbellino que\nlo envuelve y puede confundirlo."
    ko: "강렬한 바람으로 상대를\n둘러싸서 공격한다.\n상대를 혼란시킬 때가 있다."
    zh_simp: "用强烈的风\n席卷对手进行攻击。\n有时会使对手混乱。"
    zh_trad: "用強烈的風席捲\n對手進行攻擊。\n有時會使對手混亂。"
tr90:
  names:
    jp_kana: わざレコード９０
    jp_kanji: わざレコード９０
    en: TR90
    fr: DT90
    it: DT90
    de: TP90
    es: DT90
    ko: 기술레코드90
    zh_simp: 招式记录９０
    zh_trad: 招式紀錄９０
  descriptions:
    jp_kana: "相手に　じゃれついて\n攻撃する。　相手の\n攻撃を　さげる　ことがある。"
    jp_kanji: "相手に　じゃれついて\n攻撃する。　相手の\n攻撃を　さげる　ことがある。"
    en: "The user plays rough with the target and attacks it.\nThis may also lower the target’s Attack stat."
    fr: "Le lanceur attaque la cible en lui faisant des câlineries,\nce qui peut aussi diminuer l’Attaque de celle-ci."
    it: "Il Pokémon attacca il bersaglio con delle carinerie.\nPuò anche ridurne l’Attacco."
    de: "Der Anwender knuddelt das Ziel und greift es an.\nSenkt eventuell den Angriffs-Wert des Zieles."
    es: "El usuario le hace cucamonas al objetivo y lo ataca.\nPuede reducir el Ataque del objetivo."
    ko: "상대에게 치근거리며\n공격한다. 상대의\n공격을 떨어뜨릴 때가 있다."
    zh_simp: "与对手嬉闹并攻击。\n有时会降低对手的攻击。"
    zh_trad: "在和對手嬉鬧的同時進行攻擊。\n有時會降低對手的攻擊。"
tr91:
  names:
    jp_kana: わざレコード９１
    jp_kanji: わざレコード９１
    en: TR91
    fr: DT91
    it: DT91
    de: TP91
    es: DT91
    ko: 기술레코드91
    zh_simp: 招式记录９１
    zh_trad: 招式紀錄９１
  descriptions:
    jp_kana: "特殊な　毒液を　浴びせかける。\n毒状態の　相手は\n攻撃　特攻　素早さが　さがる。"
    jp_kanji: "特殊な　毒液を　浴びせかける。\n毒状態の　相手は\n攻撃　特攻　素早さが　さがる。"
    en: "Opposing Pokémon are drenched in an odd\npoisonous liquid. This lowers the Attack, Sp. Atk, and\nSpeed stats of a poisoned target."
    fr: "Le lanceur projette un liquide toxique spécial,\nce qui diminue l’Attaque, l’Attaque Spéciale et\nla Vitesse de la cible si elle était déjà empoisonnée."
    it: "Il Pokémon emette un liquido particolare che riduce\nl’Attacco, l’Attacco Speciale e la Velocità degli\navversari avvelenati."
    de: "Anwender bespritzt das Ziel mit einer speziellen\nGiftflüssigkeit. Senkt den Angriff, den Spezial-Angriff\nund die Initiative von vergifteten Zielen."
    es: "Impregna a su objetivo con un líquido venenoso que\nreduce el Ataque, el Ataque Especial y la Velocidad.\nSolo afecta a Pokémon ya envenenados."
    ko: "특수한 독액을 끼얹는다.\n독 상태인 상대는\n공격, 특수공격, 스피드가 떨어진다."
    zh_simp: "将特殊的毒液泼向对手。\n对处于中毒状态的对手，\n其攻击、特攻和速度都会降低。"
    zh_trad: "向對手發射特殊的毒液。\n陷入中毒狀態的對手\n攻擊、特攻和速度會降低。"
tr92:
  names:
    jp_kana: わざレコード９２
    jp_kanji: わざレコード９２
    en: TR92
    fr: DT92
    it: DT92
    de: TP92
    es: DT92
    ko: 기술레코드92
    zh_simp: 招式记录９２
    zh_trad: 招式紀錄９２
  descriptions:
    jp_kana: "強力な　光を　放ち\n相手に　ダメージを　与える。"
    jp_kanji: "強力な　光を　放ち\n相手に　ダメージを　与える。"
    en: "The user damages opposing Pokémon by emitting a\npowerful flash."
    fr: "Le lanceur libère une puissante décharge lumineuse\nqui inflige des dégâts à l’ennemi."
    it: "Il Pokémon emette una luce potentissima che infligge\ndanni agli avversari."
    de: "Der Anwender feuert einen mächtigen Lichtblitz ab,\nder gegnerischen Pokémon Schaden zufügt."
    es: Inflige daño al objetivo con una potente luz.
    ko: "강력한 빛을 내어\n상대에게 데미지를 준다."
    zh_simp: "向对手发射强光，\n并给予伤害。"
    zh_trad: "發出強烈的閃光，\n給予對手傷害。"
tr93:
  names:
    jp_kana: わざレコード９３
    jp_kanji: わざレコード９３
    en: TR93
    fr: DT93
    it: DT93
    de: TP93
    es: DT93
    ko: 기술레코드93
    zh_simp: 招式记录９３
    zh_trad: 招式紀錄９３
  descriptions:
    jp_kana: "両腕を　回し　相手に　当てる。\n相手の　能力変化に\n関係なく　ダメージを　与える。"
    jp_kanji: "両腕を　回し　相手に　当てる。\n相手の　能力変化に\n関係なく　ダメージを　与える。"
    en: "The user swings both arms and hits the target.\nThe target’s stat changes don’t affect this\nattack’s damage."
    fr: "Le lanceur étend les bras et frappe l’adversaire\nen tournant violemment. Il inflige des dégâts et\nignore les changements de stats de la cible."
    it: "Il Pokémon colpisce il bersaglio mulinando gli arti.\nIl danno inflitto ignora le modifiche alle statistiche\ndel bersaglio."
    de: "Der Anwender wirbelt mit beiden Armen und prallt\nso auf das Ziel. Richtet unabhängig von den\nStatusveränderungen des Zieles Schaden an."
    es: "Gira sobre sí mismo y golpea al objetivo con ambos\nbrazos. Ignora los cambios en las características del\nobjetivo."
    ko: "양팔을 돌려 상대에게 부딪친다.\n상대의 능력 변화에\n상관없이 데미지를 준다."
    zh_simp: "旋转双臂打向对手。\n无视对手的能力变化，\n直接给予伤害。"
    zh_trad: "旋轉雙臂並打向對手。\n可不顧對手的能力變化\n給予傷害。"
tr94:
  names:
    jp_kana: わざレコード９４
    jp_kanji: わざレコード９４
    en: TR94
    fr: DT94
    it: DT94
    de: TP94
    es: DT94
    ko: 기술레코드94
    zh_simp: 招式记录９４
    zh_trad: 招式紀錄９４
  descriptions:
    jp_kana: "全身を　使って\n相手に　猛アタックする。"
    jp_kanji: "全身を　使って\n相手に　猛アタックする。"
    en: "The user fiercely attacks the target using its\nentire body."
    fr: "Le lanceur attaque violemment en utilisant\ntout son poids."
    it: "Il Pokémon travolge il bersaglio con un attacco\npossente."
    de: "Der Anwender greift das Ziel mit einer heftigen\nGanzkörper-Attacke an."
    es: Asesta un golpe devastador usando todo su cuerpo.
    ko: "온몸을 써서 상대를\n맹렬히 공격한다."
    zh_simp: "使出全身力量，\n猛攻对手。"
    zh_trad: "使出全身力量，\n猛攻對手。"
tr95:
  names:
    jp_kana: わざレコード９５
    jp_kanji: わざレコード９５
    en: TR95
    fr: DT95
    it: DT95
    de: TP95
    es: DT95
    ko: 기술레코드95
    zh_simp: 招式记录９５
    zh_trad: 招式紀錄９５
  descriptions:
    jp_kana: "この　技を　受けた　相手は\n地獄の　苦しみから　２ターンの間\n音の　技を　出すことが　できなくなる。"
    jp_kanji: "この　技を　受けた　相手は\n地獄の　苦しみから　２ターンの間\n音の　技を　出すことが　できなくなる。"
    en: "The user attacks the target’s throat, and the\nresultant suffering prevents the target from using\nmoves that emit sound for two turns."
    fr: "Inflige une douleur tellement violente à la cible\nqu’elle ne peut plus émettre de sons pendant deux tours."
    it: "Chi viene colpito da questa mossa prova un\ndolore lancinante e non può più usare mosse\nbasate sul suono per due turni."
    de: "Das Pokémon, das von dieser Attacke getroffen wird,\nerleidet starke Schmerzen und kann deswegen zwei\nRunden lang keine Geräusch-Attacken mehr einsetzen."
    es: "Inflige al objetivo un dolor tan abrumador que le impide\nutilizar durante dos turnos movimientos que usan sonido."
    ko: "이 기술에 맞은 상대는\n지옥의 고통 때문에 2턴 동안\n소리 기술을 낼 수 없다."
    zh_simp: "受到此招式攻击的对手，\n会因为地狱般的痛苦，在２回合内，\n变得无法使出声音类招式。"
    zh_trad: "受到此招式攻擊的對手，\n會因為地獄般的痛苦，在２回合內\n無法使用會發出聲音的招式。"
tr96:
  names:
    jp_kana: わざレコード９６
    jp_kanji: わざレコード９６
    en: TR96
    fr: DT96
    it: DT96
    de: TP96
    es: DT96
    ko: 기술레코드96
    zh_simp: 招式记录９６
    zh_trad: 招式紀錄９６
  descriptions:
    jp_kana: "敵には　爆発する　だんごを\n使って　攻撃。　味方には\n回復する　だんごを　与える。"
    jp_kanji: "敵には　爆発する　だんごを\n使って　攻撃。　味方には\n回復する　だんごを　与える。"
    en: "The user attacks the enemy with a pollen puff that\nexplodes. If the target is an ally, it gives the ally a\npollen puff that restores its HP instead."
    fr: "Sur un ennemi, le lanceur envoie une boule explosive\nqui fait des dégâts. Sur un allié, il envoie du bon\npollen nutritif qui fait récupérer des PV."
    it: "Il Pokémon attacca l’avversario con una sfera esplosiva.\nSe colpisce degli alleati, fa recuperare loro dei PS."
    de: "Der Anwender greift mit einem Ball aus Pollen an,\nder beim Ziel explodiert. Mitstreiter werden von\neinem Ball getroffen, der ihre KP auffüllt."
    es: "Ataca al objetivo con una bola explosiva. Si esta alcanza\na un aliado, le hará recuperar PS."
    ko: "상대에게는 폭발하는 경단을\n사용하여 공격한다. 같은 편에게는\n회복하는 경단을 준다."
    zh_simp: "对敌人使用是会爆炸的团子。\n对我方使用则是给予回复的团子。"
    zh_trad: "對敵人使用時，用會爆炸的花粉團來攻擊。\n對我方同伴使用時，\n則給予有回復效果的花粉團。"
tr97:
  names:
    jp_kana: わざレコード９７
    jp_kanji: わざレコード９７
    en: TR97
    fr: DT97
    it: DT97
    de: TP97
    es: DT97
    ko: 기술레코드97
    zh_simp: 招式记录９７
    zh_trad: 招式紀錄９７
  descriptions:
    jp_kana: "サイコパワーで　かみついて\n相手を　攻撃する。　ひかりのかべや\nリフレクター　なども　破壊できる。"
    jp_kanji: "サイコパワーで　かみついて\n相手を　攻撃する。　ひかりのかべや\nリフレクター　なども　破壊できる。"
    en: "The user bites the target with its psychic\ncapabilities. This can also destroy Light Screen\nand Reflect."
    fr: "Le lanceur mord la cible avec ses pouvoirs psychiques.\nBrise aussi les barrières comme Mur Lumière\net Protection."
    it: "Il Pokémon attacca il bersaglio mordendolo con delle\nzanne generate con l’energia psichica. Può rompere\nbarriere come Riflesso e Schermoluce."
    de: "Der Anwender beißt das Ziel mithilfe von\nPsycho-Kräften. Die Attacke durchbricht auch\nBarrieren wie Lichtschild und Reflektor."
    es: "Ataca a su objetivo con poderes psíquicos que además\ndestruyen barreras como Pantalla de Luz y Reflejo."
    ko: "사이코 파워로 물어서\n상대를 공격한다. 빛의장막이나\n리플렉터 등도 파괴할 수 있다."
    zh_simp: "利用精神力量咬住对手进行攻击。\n还可以破坏光墙和反射壁等。"
    zh_trad: "利用精神力量咬住對手進行攻擊。\n並可破壞光牆和反射壁等。"
tr98:
  names:
    jp_kana: わざレコード９８
    jp_kanji: わざレコード９８
    en: TR98
    fr: DT98
    it: DT98
    de: TP98
    es: DT98
    ko: 기술레코드98
    zh_simp: 招式记录９８
    zh_trad: 招式紀錄９８
  descriptions:
    jp_kana: "水の　力で　相手に\nぶつかって　攻撃する。\n相手の　防御を　さげる　ことがある。"
    jp_kanji: "水の　力で　相手に\nぶつかって　攻撃する。\n相手の　防御を　さげる　ことがある。"
    en: "The user slams into the target using a full-force\nblast of water. This may also lower the target’s\nDefense stat."
    fr: "Le lanceur utilise la force de l’eau pour attaquer.\nPeut aussi baisser la Défense de la cible."
    it: "Il Pokémon attacca colpendo il bersaglio con la forza\ndell’acqua. Può anche ridurne la Difesa."
    de: "Der Anwender greift das Ziel mit der Kraft des Wassers\nan. Senkt eventuell die Verteidigung des Zieles."
    es: "Ataca golpeando gracias a la fuerza del agua.\nTambién puede reducir la Defensa del objetivo."
    ko: "물의 힘으로 상대에게\n부딪쳐서 공격한다.\n상대의 방어를 떨어뜨릴 때가 있다."
    zh_simp: "用水之力量\n撞向对手进行攻击。\n有时会降低对手的防御。"
    zh_trad: "用水之力量撞向對手進行攻擊。\n有時會降低對手的防禦。"
tr99:
  names:
    jp_kana: わざレコード９９
    jp_kanji: わざレコード９９
    en: TR99
    fr: DT99
    it: DT99
    de: TP99
    es: DT99
    ko: 기술레코드99
    zh_simp: 招式记录９９
    zh_trad: 招式紀錄９９
  descriptions:
    jp_kana: "体を　ぶつけて　攻撃。\n防御が　高いほど\n与える　ダメージが　増える。"
    jp_kanji: "体を　ぶつけて　攻撃。\n防御が　高いほど\n与える　ダメージが　増える。"
    en: "The user attacks by slamming its body into the target.\nThe higher the user’s Defense, the more damage it can\ninflict on the target."
    fr: "Le lanceur utilise son corps pour attaquer sa cible.\nPlus la Défense du lanceur est élevée,\nplus les dégâts infligés sont importants."
    it: "Il Pokémon attacca schiacciando il bersaglio con il suo\ncorpo. Più la Difesa è alta, maggiori sono i danni inflitti."
    de: "Der Anwender greift mit seinem ganzen Körper an.\nJe höher seine Verteidigung ist, desto mehr Schaden\nrichtet er an."
    es: "El usuario usa el cuerpo para lanzar su ataque. Cuanto\nmayor es la Defensa del usuario, más daño provoca."
    ko: "몸을 부딪쳐서 공격한다.\n방어가 높을수록\n주는 데미지가 올라간다."
    zh_simp: "用身体撞向对手进行攻击。\n防御越高，\n给予的伤害就越高。"
    zh_trad: "用身體撞向對手進行攻擊。\n自己的防禦越高，\n給予對手的傷害越大。"
trapinch_shell:
  names:
    jp_kana: ナックラーのから
    jp_kanji: ナックラーのから
    en: Trapinch Shell
    fr: Carapace de Kraknoix
    it: Guscio di Trapinch
    de: Knacklion-Schale
    es: Coraza de Trapinch
    ko: 톱치의껍데기
    zh_simp: 大颚蚁的壳
    zh_trad: 大顎蟻的殼
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
travel_trunk:gold:
  names:
    jp_kana: いしょうトランク
    jp_kanji: いしょうトランク
    en: Travel Trunk
    fr: Malle Penderie
    it: Baule per abiti
    de: Kleiderkoffer
    es: Maleta
    ko: 의상트렁크
    zh_simp: 衣物箱
    zh_trad: 衣物箱
  descriptions:
    jp_kana: "どんな　ファッションアイテムでも\n詰めこんでおける　収納力\n抜群の　軽い　トランク。"
    jp_kanji: "どんな　ファッションアイテムでも\n詰めこんでおける　収納力\n抜群の　軽い　トランク。"
    en: "A light and yet incredibly effective trunk, which can\ncontain every last piece of clothing that can be bought."
    fr: "Une valise extrêmement légère, parfaite pour ranger\nun grand nombre de vêtements et d’accessoires\nde mode."
    it: "Un baule leggero ma estremamente capiente che\npuò contenere qualsiasi capo d’abbigliamento."
    de: "Ein leichter und sehr hilfreicher Koffer mit so viel\nStauraum, dass jedes erdenkliche Kleidungsstück\nund Accessoire darin aufbewahrt werden kann."
    es: "Maleta ligera de increíble capacidad donde podrás\nguardar todas las prendas de ropa que quieras."
    ko: "어떤 패션 아이템이라도\n담아 둘 수 있고 가벼우며\n수납력이 뛰어난 트렁크."
    zh_simp: "能塞入任意时尚物品，\n收纳能力极佳的轻箱子。"
    zh_trad: "能夠塞入各種時尚物品的\n收納能力極佳的輕箱子。"
tropical_shell:
  names:
    jp_kana: なんごくかいがら
    jp_kanji: なんごくかいがら
    en: Tropical Shell
    fr: Coquille du Sud
    it: Tropiconchiglia
    de: Tropenmuschel
    es: Concha Tropical
    ko: 트로피컬조개껍질
    zh_simp: 南国贝壳
    zh_trad: 南國貝殼
  descriptions:
    jp_kana: "あたたかい　地方の　海から\n流れついた　かも　しれない\n白くて　きれいな　貝がら。"
    jp_kanji: "あたたかい　地方の　海から\n流れついた　かも　しれない\n白くて　きれいな　貝がら。"
    en: "A beautiful white shell that may have drifted from\na sea in a warm region."
    fr: "Un joli coquillage blanc. Il a peut-être été porté\npar les vagues depuis une région tropicale."
    it: "Una bellissima conchiglia bianca, forse arrivata dalle\nregioni calde sulla scia delle correnti marine."
    de: "Eine wunderschöne weiße Muschelschale. Vermutlich\nstammt sie aus dem Meer einer wärmeren Region und\nwurde von der Strömung angespült."
    es: "Preciosa concha de color blanco que quizá haya sido\narrastrada por las corrientes marinas desde mares de\nregiones más cálidas."
    ko: "따뜻한 지방의 바다에서\n흘러들어 왔을지도 모르는\n하얗고 예쁜 조개껍질."
    zh_simp: "美丽的白色贝壳。\n或许是从温暖的海域那里\n漂流到这里的。"
    zh_trad: "美麗的白色貝殼。\n可能是從溫暖的海域\n漂流過來的。"
tropius_leaf:
  names:
    jp_kana: トロピウスのはっぱ
    jp_kanji: トロピウスのはっぱ
    en: Tropius Leaf
    fr: Feuille de Tropius
    it: Foglia di Tropius
    de: Tropius-Blatt
    es: Hoja de Tropius
    ko: 트로피우스의잎
    zh_simp: 热带龙的叶片
    zh_trad: 熱帶龍的葉片
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
tumblestone:
  names:
    jp_kana: たまいし
    jp_kanji: たまいし
    en: Tumblestone
    fr: Galet
    it: Ciottolo
    de: Glanzstein
    es: Guijarro Rojo
    ko: 옥돌
    zh_simp: 玉石
    zh_trad: 玉石
  descriptions:
    jp_kana: "ぼんぐりと組み合わせることで\nモンスターボールの性能をひきだす\n不思議な丸い石。"
    jp_kanji: "ぼんぐりと組み合わせることで\nモンスターボールの性能をひきだす\n不思議な丸い石。"
    en: "When combined with an Apricorn, this mysterious\ntumbled stone can draw out the properties required\nto forge a Poké Ball."
    fr: "Lorsqu’on combine cette étrange pierre arrondie\nà un Noigrume, elle présente les propriétés\nnécessaires à la confection d’une Poké Ball."
    it: "Strana pietra arrotondata che, se combinata con\nuna Bacca ghicocca, innesca le proprietà necessarie\nalla creazione di una Poké Ball."
    de: "Kombiniert man diesen mysteriösen glänzenden Stein\nmit einer Aprikoko, kann ein Pokéball daraus gefertigt\nwerden."
    es: "Misteriosa piedra redondeada que, al combinarse con\nun Bonguri, presenta las cualidades necesarias para\nfabricar una Poké Ball."
    ko: "규토리와 조합하면\n몬스터볼의 성능을 끌어내는\n신비하고 둥근 돌."
    zh_simp: "不可思议的圆形石头。\n与球果组合后，能够\n激发出精灵球的性能。"
    zh_trad: "不可思議的圓形石頭。\n與球果組合後，能夠\n激發出精靈球的性能。"
twice_spiced_radish:
  names:
    jp_kana: にばいづけ
    jp_kanji: にばいづけ
    en: Twice-Spiced Radish
    fr: Bouchée Double
    it: Doppiaceto
    de: Doppelrettich
    es: Encurtidoble
    ko: 두배절임
    zh_simp: 双倍腌菜
    zh_trad: 雙倍醃菜
  descriptions:
    jp_kana: "使うと　一時的に　ポケモンの技で\n与えるダメージが　１．５倍になる\n倍付けの効果を　得る　漬物。"
    jp_kanji: "使うと　一時的に　ポケモンの技で\n与えるダメージが　１．５倍になる\n倍付けの効果を　得る　漬物。"
    en: "These pickled vegetables prime a Pokémon for battle.\nThe Pokémon takes a hard-hitting stance, which boosts\nthe damage dealt by its moves by 50 percent."
    fr: "Ce mets permet à un Pokémon de frapper une fois\net demie plus fort temporairement. Les effets sont\nsimilaires à ceux de la capacité Coup Double."
    it: "Sottaceto che ha un effetto moltiplicatore sui danni\ndelle mosse. Aumenta temporaneamente del 50%\ni danni inflitti dai Pokémon."
    de: "Durch dieses eingelegte Gemüse verursachen die\nAttacken eines Pokémon vorübergehend 50 % mehr\nSchaden."
    es: "Este encurtido hace que los movimientos de un Pokémon\ncausen un 50 % más de daño temporalmente."
    ko: "사용하면 일시적으로 포켓몬이\n기술로 주는 데미지가 1.5배가 되는\n배가 효과를 얻게 되는 무절임."
    zh_simp: "可让宝可梦获得加倍效果的腌菜。\n使用后宝可梦的招式造成的伤害\n会暂时变成１.５倍。"
    zh_trad: "可讓寶可夢獲得加倍效果的醃菜。\n使用後寶可夢的招式給予的傷害\n會暫時變成１.５倍。"
twice_spiced_radish:recipe:
  names:
    jp_kana: にばいづけ
    jp_kanji: にばいづけ
    en: Twice-Spiced Radish
    fr: Bouchée Double
    it: Doppiaceto
    de: Doppelrettich
    es: Encurtidoble
    ko: 두배절임
    zh_simp: 双倍腌菜
    zh_trad: 雙倍醃菜
  descriptions:
    jp_kana: "にばいづけのレシピ。　材料は\nスナハマダイコン×２　ごりごりミネラル×２\nころころマメ×２　キングリーフ×２"
    jp_kanji: "にばいづけのレシピ。　材料は\nスナハマダイコン×２　ごりごりミネラル×２\nころころマメ×２　キングリーフ×２"
    en: "A recipe for crafting Twice-Spiced Radishes from scratch.\nRequired materials: 2 Sand Radishes, 2 hunks of Crunchy\nSalt, 2 pods of Plump Beans, and 2 bunches of King’s Leaf."
    fr: "Méthode pour Bouchée Double. Ressources requises :\n2 Radis des Plages, 2 cristaux de Sel Rochedur,\n2 Fèves Dodues et 2 bouquets d’Herbe Souveraine."
    it: "Ricetta per un Doppiaceto. Richiede 2 Rafani costieri,\n2 pezzi di Minerale duro, 2 baccelli di Fagioli paffuti\ne 2 ciuffi di Foglia regina."
    de: "Die Anleitung zur Herstellung von Doppelrettich.\nBenötigte Materialien: 2 Strandrettiche, 2 Brocken\nKnirschmineral, 2 Kullerbohnen und 2 Königsblätter."
    es: "Receta para crear Encurtidobles. Materiales:\n2 Rábanos Areneros, 2 Minerales Crocantes, 2 Habas\nSuculentas y 2 Hierbas Regias."
    ko: "두배절임의 레시피.\n재료: 모래해변무×2 단단미네랄×2\n통통콩×2 킹리프×2"
    zh_simp: "双倍腌菜的材料单。材料是：\n沙滩萝卜×２　坚坚矿×２\n滚滚豆×２　皇叶×２"
    zh_trad: "雙倍醃菜的材料單。材料是：\n沙灘蘿蔔×２　堅堅礦×２\n滾滾豆×２　皇葉×２"
twisted_spoon:
  names:
    jp_kana: まがったスプーン
    jp_kanji: まがったスプーン
    en: Twisted Spoon
    fr: Cuillère Tordue
    it: Cucchiaio torto
    de: Krummlöffel
    es: Cuchara Torcida
    ko: 휘어진스푼
    zh_simp: 弯曲的汤匙
    zh_trad: 彎曲的湯匙
  descriptions:
    jp_kana: "念力を　こめた　スプーン。\n持たせると　エスパータイプの\n技の威力が　あがる。"
    jp_kanji: "念力を　こめた　スプーン。\n持たせると　エスパータイプの\n技の威力が　あがる。"
    en: "An item to be held by a Pokémon. This spoon is imbued\nwith telekinetic energy and boosts the power of the\nholder’s Psychic-type moves."
    fr: "Objet à tenir. Une cuillère contenant un pouvoir\ntélékinétique qui augmente la puissance des capacités\nde type Psy."
    it: "Strumento da dare a un Pokémon. Cucchiaio dotato di\npotere telecinetico che potenzia le mosse di tipo Psico."
    de: "Ein Item zum Tragen. Ein Löffel voller telekinetischer\nEnergie, der Attacken vom Typ Psycho verstärkt."
    es: "Cuchara imbuida de energía telequinética que potencia\nlos movimientos de tipo Psíquico. Debe llevarla un\nPokémon."
    ko: "염동력을 담은 숟가락.\n지니게 하면 에스퍼타입\n기술의 위력이 올라간다."
    zh_simp: "注入了念力的汤匙。\n携带后，超能力属性的\n招式威力就会提高。"
    zh_trad: "注入了念力的湯匙。\n攜帶後，超能力屬性的\n招式威力就會提高。"
tynamo_slime:
  names:
    jp_kana: シビシラスのねんえき
    jp_kanji: シビシラスのねんえき
    en: Tynamo Slime
    fr: Mucus d’Anchwatt
    it: Muco di Tynamo
    de: Zapplardin-Schleim
    es: Secreción de Tynamo
    ko: 저리어의점액
    zh_simp: 麻麻小鱼的黏液
    zh_trad: 麻麻小魚的黏液
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
