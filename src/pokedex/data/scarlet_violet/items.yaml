gracidea:
  names:
    jp_kana: グラシデアのはな
    jp_kanji: グラシデアのはな
    en: Gracidea
    fr: Gracidée
    it: Gracidea
    de: Gracidea
    es: Gracídea
    ko: 그라시데아꽃
    zh_simp: 葛拉西蒂亚花
    zh_trad: 葛拉西蒂亞花
  descriptions:
    jp_kana: "誕生日や　記念日などに\n感謝の気持ちを　伝えるため\nブーケにして　贈ることが　ある。"
    jp_kanji: "誕生日や　記念日などに\n感謝の気持ちを　伝えるため\nブーケにして　贈ることが　ある。"
    en: "A flower sometimes bundled into a bouquet to be given\nas an expression of gratitude on special occasions,\nsuch as birthdays and anniversaries."
    fr: "Une fleur que l’on offre en gage de reconnaissance,\nnotamment à l’occasion d’un anniversaire."
    it: "Un fiore, a volte offerto in bouquet, che esprime\ngratitudine in occasioni particolari, come i compleanni."
    de: "Mit dieser Blume, manchmal auch als Teil eines\nBouquets, kann man an speziellen Tagen seine\nDankbarkeit ausdrücken."
    es: "Una flor que se suele regalar en ramos para expresar\nagradecimiento en ocasiones especiales, como\ncumpleaños."
    ko: "생일이나 기념일 등에\n감사의 마음을 전하기 위해\n부케로 만들어 보내는 일이 있다."
    zh_simp: "在生日或纪念日等日子里，\n为了表达感激之情，\n有时会将其扎成花束送出。"
    zh_trad: "在生日或紀念日等日子裡，\n為了表達感激之情，\n有時會將其紮成花束送出。"
grain_cake:
  names:
    jp_kana: イナホよせだま
    jp_kanji: イナホよせだま
    en: Grain Cake
    fr: Appât Zélé
    it: Polpetta spighe
    de: Reisköder
    es: Cebo de Grano
    ko: 이삭유인환
    zh_simp: 谷诱团
    zh_trad: 穀誘糰
  descriptions:
    jp_kana: "イナホとよせだまのもとを練りこんだもの。\n陸上のポケモンなどを\n強く引き寄せることができる。"
    jp_kanji: "イナホとよせだまのもとを練りこんだもの。\n陸上のポケモンなどを\n強く引き寄せることができる。"
    en: "A cake made by combining grains with a Cake-Lure Base.\nThese cakes are potently effective at attracting Pokémon\nthat dwell and wander among the fields."
    fr: "Obtenu en pétrissant une boule d’Appâte mélangée à\ndu riz, cet appât attire fortement les Pokémon terrestres."
    it: "Strumento creato aggiungendo delle spighe a una\nPolpetta base. Esercita una forte attrattiva in particolare\nsui Pokémon campestri."
    de: "Eine Mischung aus Köderteig und Reis, von der am\nBoden lebende Pokémon stark angezogen werden."
    es: "Bola de cebo creada con grano y masa que atrae a\nlos Pokémon terrestres."
    ko: "이삭과 유인환반죽을 섞어서 반죽한 것.\n육상의 포켓몬 등을\n강하게 유인하는 효과가 있다."
    zh_simp: "由谷物与诱团原料糅合而成。\n对陆地上的宝可梦\n有着很强的吸引力。"
    zh_trad: "由穀物與誘糰原料揉合而成。\n對陸地上的寶可夢\n有著很強的吸引力。"
grain_cake:recipe:
  names:
    jp_kana: イナホよせだま
    jp_kanji: イナホよせだま
    en: Grain Cake
    fr: Appât Zélé
    it: Polpetta spighe
    de: Reisköder
    es: Cebo de Grano
    ko: 이삭유인환
    zh_simp: 谷诱团
    zh_trad: 穀誘糰
  descriptions:
    jp_kana: "イナホよせだまのレシピ。　材料は\nいきいきイナホ×１　よせだまのもと×１"
    jp_kanji: "イナホよせだまのレシピ。　材料は\nいきいきイナホ×１　よせだまのもと×１"
    en: "A recipe for crafting Grain Cakes from scratch.\nRequired materials: 1 stalk of Hearty Grains and\n1 Cake-Lure Base."
    fr: "Méthode pour Appât Zélé. Ressources requises :\n1 épi de Riz Zélé et 1 boule d’Appâte."
    it: "Ricetta per una Polpetta spighe. Richiede 1 Spiga\nrigogliosa e 1 Polpetta base."
    de: "Die Anleitung zur Herstellung eines Reisköders.\nBenötigte Materialien: 1 Ähre Munterreis und\n1 Portion Köderteig."
    es: "Receta para crear Cebos de Grano. Materiales:\n1 Espiga Vivaz y 1 bola de Masa para Cebo."
    ko: "이삭유인환의 레시피.\n재료: 싱싱이삭×1 유인환반죽×1"
    zh_simp: "谷诱团的材料单。材料是：\n旺旺谷×１　诱团原料×１"
    zh_trad: "穀誘糰的材料單。材料是：\n旺旺穀×１　誘糰原料×１"
