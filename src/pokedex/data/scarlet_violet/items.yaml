    es: "Máscara de madera con cristales engarzados. Si la lleva\nOgerpon, le permite adoptar el tipo Roca para luchar."
    ko: "결정이 장식되어 있는 목각 가면.\n오거폰에게 지니게 하면\n바위타입을 두르고 싸울 수 있다."
    zh_simp: "用结晶装饰的木雕面具。\n让厄诡椪携带后，就会用\n岩石属性覆盖全身进行战斗。"
    zh_trad: "用結晶裝飾的木雕面具。\n讓厄鬼椪攜帶後，戰鬥時\n就會有岩石屬性附上其身。"
cornn_berry:
  names:
    jp_kana: モコシのみ
    jp_kanji: モコシのみ
