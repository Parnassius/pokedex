    jp_kana: ジャラランガＺ
    jp_kanji: ジャラランガＺ
    en: Kommonium Z
    fr: Ékaïzélite
    it: Kommonium Z
    de: Grandirasium Z
    es: Kommostal Z
    ko: 짜랑고우거Z
