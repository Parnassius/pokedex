    fr: Capsule d’Argent
    it: Tappo d’argento
    de: Silberkronkorken
    es: Chapa Plateada
    ko: 은색병뚜껑
    zh_simp: 银色王冠
    zh_trad: 銀色王冠
  descriptions:
    jp_kana: "銀色の　きれいな王冠。\n渡すと　よろこぶ人も　いる。"
    jp_kanji: "銀色の　きれいな王冠。\n渡すと　よろこぶ人も　いる。"
    en: "A lovely silver bottle cap. Certain people are delighted\nto be given one of these."
    fr: "Une jolie capsule en argent.\nCertaines personnes adorent en recevoir."
    it: "Un bel tappo a corona color argento, molto apprezzato\nda alcuni."
    de: "Ein hübscher silberner Kronkorken. Es gibt Leute,\ndie sich sehr darüber freuen würden, einen zu erhalten."
    es: "Una bonita chapa de color plata. Hay gente que las\naprecia mucho."
    ko: "은색의 아름다운 병뚜껑.\n받으면 좋아하는 사람도 있다."
    zh_simp: "银色的美丽王冠。\n有些人收到它会很高兴。"
    zh_trad: "銀色的美麗王冠。\n有些人收到它會很高興。"
