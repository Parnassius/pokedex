    jp_kanji: きせきのタネ
    en: Miracle Seed
    fr: Graine Miracle
    it: Miracolseme
    de: Wundersaat
    es: Semilla Milagro
    ko: 기적의씨
    zh_simp: 奇迹种子
    zh_trad: 奇跡種子
  descriptions:
    jp_kana: "生命が宿る　タネ。\n持たせると　くさタイプの\n技の威力が　あがる。"
    jp_kanji: "生命が宿る　タネ。\n持たせると　くさタイプの\n技の威力が　あがる。"
    en: "An item to be held by a Pokémon. It’s a seed imbued\nwith life-force that boosts the power of the holder’s\nGrass-type moves."
    fr: "Objet à tenir. Une graine remplie de vie qui augmente\nla puissance des capacités de type Plante."
    it: "Strumento da dare a un Pokémon. Seme intriso di vita\nche potenzia le mosse di tipo Erba."
    de: "Ein Item zum Tragen. Ein Samen voller Lebenskraft,\nder Attacken vom Typ Pflanze verstärkt."
    es: "La vitalidad de la semilla potencia los movimientos de\ntipo Planta. Debe llevarla un Pokémon."
    ko: "생명이 깃든 씨앗.\n지니게 하면 풀타입\n기술의 위력이 올라간다."
    zh_simp: "孕育生命的种子。\n携带后，草属性的\n招式威力就会提高。"
    zh_trad: "蘊藏生命的種子。\n攜帶後，草屬性的\n招式威力就會提高。"
miraidons_poke_ball:
  names:
    jp_kana: ミライドンのボール
    jp_kanji: ミライドンのボール
    en: Miraidon’s Poké Ball
    fr: Poké Ball de Miraidon
    it: Poké Ball Miraidon
    de: Miraidons Pokéball
    es: Poké Ball de Miraidon
    ko: 미라이돈의 볼
    zh_simp: 密勒顿的球
    zh_trad: 密勒頓的球
  descriptions:
    jp_kana: "謎のポケモン　ミライドンを\n入れる　モンスターボール。\nペパーという　男の子から　もらった。"
    jp_kanji: "謎のポケモン　ミライドンを\n入れる　モンスターボール。\nペパーという　男の子から　もらった。"
    en: "A Poké Ball that can hold the mysterious Pokémon\nknown as Miraidon. A boy named Arven gave it to you."
    fr: "Une Poké Ball qui peut contenir le mystérieux\nPokémon Miraidon. Elle vous a été confiée par\nun garçon du nom de Pepper."
    it: "Una Poké Ball ricevuta da un ragazzo di nome Pepe.\nPuò contenere il misterioso Pokémon Miraidon."
    de: "Das ist Miraidons Pokéball. Du hast ihn von einem\nJungen namens Pepper erhalten."
    es: "La Poké Ball del misterioso Pokémon Miraidon.\nTe la entregó un chico llamado Damián."
    ko: "정체불명의 포켓몬\n미라이돈을 넣을 수 있는 몬스터볼.\n페퍼라는 남자아이에게 받았다."
    zh_simp: "用来装神秘的宝可梦\n密勒顿的精灵球。\n是从名为派帕的男生那里得到的。"
    zh_trad: "用來裝神秘的寶可夢\n密勒頓的精靈球。\n是從名叫派帕的男生那裡得到的。"
mirror_herb:
  names:
    jp_kana: ものまねハーブ
    jp_kanji: ものまねハーブ
    en: Mirror Herb
    fr: Feuille Copieuse
    it: Foglia carbone
    de: Kopierkraut
    es: Hierba Copia
    ko: 흉내허브
    zh_simp: 模仿香草
    zh_trad: 模仿香草
  descriptions:
    jp_kana: "持たせたポケモンは　１度だけ\n相手の　能力が　あがったとき\nまねして　同じように　能力を　あげる。"
    jp_kanji: "持たせたポケモンは　１度だけ\n相手の　能力が　あがったとき\nまねして　同じように　能力を　あげる。"
    en: "An item to be held by a Pokémon. This herb will allow\nthe holder to mirror an opponent’s stat increases to\nboost its own stats—but only once."
    fr: "Objet à tenir. Lorsqu’un adversaire bénéficie\nd’une augmentation de stats, permet une fois\nseulement au porteur d’en bénéficier également."
    it: "Strumento monouso da dare a un Pokémon. Permette\ndi fare propri gli aumenti di statistiche di un Pokémon\navversario."
    de: "Ein Item zum Tragen. Es ermöglicht dem Träger einmalig,\ndie Statuswerterhöhungen eines Gegners zu kopieren."
    es: "Si el rival aumenta sus características, permite al\nPokémon que la lleva imitarlo y aumentar las suyas\ntambién, pero solo una vez."
    ko: "지니게 한 포켓몬은 한 번에 한해\n상대의 능력이 올랐을 때\n흉내 내어 똑같이 능력을 올린다."
    zh_simp: "携带它的宝可梦仅有１次机会\n可以在对手提高能力时，\n对其进行模仿并提高同样的能力。"
    zh_trad: "攜帶它的寶可夢將有１次機會，\n在對手的能力提高時\n自己也跟著提高能力。"
misdreavus_tears:
  names:
    jp_kana: ムウマのなみだ
    jp_kanji: ムウマのなみだ
    en: Misdreavus Tears
    fr: Larme de Feuforêve
    it: Lacrime di Misdreavus
    de: Traunfugil-Träne
    es: Lágrima de Misdreavus
    ko: 무우마의눈물
    zh_simp: 梦妖的眼泪
    zh_trad: 夢妖的眼淚
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
misty_seed:
  names:
    jp_kana: ミストシード
    jp_kanji: ミストシード
    en: Misty Seed
    fr: Graine Brume
    it: Nebbiaseme
    de: Nebel-Samen
    es: Semilla Bruma
    ko: 미스트시드
    zh_simp: 薄雾种子
    zh_trad: 薄霧種子
  descriptions:
    jp_kana: "ポケモンに　持たせると\nミストフィールドのときに　使って\n特防が　あがる。"
    jp_kanji: "ポケモンに　持たせると\nミストフィールドのときに　使って\n特防が　あがる。"
    en: "An item to be held by a Pokémon. If the terrain becomes\nMisty Terrain, the holder will use this seed to boost its\nown Sp. Def stat."
    fr: "Objet à tenir. Lorsqu’un champ brumeux est actif,\nla graine est consommée pour augmenter la Défense\nSpéciale du porteur."
    it: "Strumento da dare a un Pokémon. Fa aumentare\nla Difesa Speciale in presenza di un Campo Nebbioso."
    de: "Gibst du den Samen einem Pokémon zum Tragen, setzt\nes ihn ein, wenn ein Nebelfeld aktiv ist, und erhöht\ndadurch seine Spezial-Verteidigung."
    es: "Si la lleva un Pokémon, la usa y aumenta su Defensa\nEspecial cuando el terreno está cubierto por un campo\nde niebla."
    ko: "포켓몬에게 지니게 하면\n미스트필드일 때 사용하여\n특수방어가 올라간다."
    zh_simp: "让宝可梦携带后，\n在薄雾场地上使用，\n特防就会提高。"
    zh_trad: "讓寶可夢攜帶後，\n在薄霧場地上使用，\n就會提高特防。"
mixed_mushrooms:
  names:
    jp_kana: キノコパック
    jp_kanji: キノコパック
    en: Mixed Mushrooms
    fr: Champignons
    it: Funghi
    de: Pilzmix
    es: Setas
    ko: 버섯팩
    zh_simp: 袋装蕈菇
    zh_trad: 袋裝蕈菇
  descriptions:
    jp_kana: "キャンプの　料理に　使う\n食材の　一種。いろんな　キノコの\n歯応えが　食感を　変えてくれる。"
    jp_kanji: "キャンプの　料理に　使う\n食材の　一種。いろんな　キノコの\n歯応えが　食感を　変えてくれる。"
    en: "One of the many ingredients that can be used for\ncooking at your camp. The chewy texture of the\nmushrooms transforms any dish they’re added to."
    fr: "Un ingrédient de cuisine pour le camping.\nLa texture unique de chaque champignon\ninfluence la sensation en bouche du curry."
    it: "Uno degli ingredienti che puoi usare per cucinare\nin campeggio. La diversa consistenza dei vari tipi\ndi funghi dona al piatto un sapore ancora più ricco."
    de: "Eine Zutat für PokéCamping-Mahlzeiten. Die Konsistenz\nder verschiedenen Pilzsorten verleiht dem Curry eine\nbesondere Note."
    es: "Un ingrediente para cocinar en el campamento. Los\ndistintos tipos de setas aportan diferentes texturas al\ncurri."
    ko: "캠프 요리에 사용되는\n식재료 중 하나. 다양한 버섯의\n질감이 식감을 바꿔 준다."
    zh_simp: "在露营营地制作料理时会使用的\n一种食材。各种菌菇混在一起的嚼劲\n会为口感带来变化。"
    zh_trad: "製作露營料理時使用的食材之一。\n各種菇類的嚼勁\n會改變料理的口感。"
modest_mint:
  names:
    jp_kana: ひかえめミント
    jp_kanji: ひかえめミント
    en: Modest Mint
    fr: Aromate Modeste
    it: Menta Modesta
    de: Mäßig-Minze
    es: Menta Modesta
    ko: 조심민트
    zh_simp: 内敛薄荷
    zh_trad: 內斂薄荷
  descriptions:
    jp_kana: "ポケモンに　香りを　かがせると\n特攻が　上がりやすく　なるが\n攻撃は　上がりにくくなる　ミント。"
    jp_kanji: "ポケモンに　香りを　かがせると\n特攻が　上がりやすく　なるが\n攻撃は　上がりにくくなる　ミント。"
    en: "Having a Pokémon smell this mint can make its Sp. Atk\nstat grow stronger. However, its Attack stat may suffer."
    fr: "Si un Pokémon hume cet aromate, son Attaque Spéciale\nmontera plus facilement, mais son Attaque\nse développera plus lentement."
    it: "Quando un Pokémon ne sente il profumo,\nil suo Attacco Speciale aumenta più facilmente\na scapito dell’Attacco."
    de: "Lässt man ein Pokémon an dieser Minze schnuppern,\nsteigt sein Spezial-Angriff schneller, aber sein Angriff\numso langsamer."
    es: "Cuando un Pokémon percibe su aroma, aumenta con\nmás facilidad su Ataque Especial, en detrimento de su\nAtaque."
    ko: "포켓몬에게 향기를 맡게 하면\n특수공격이 오르기 쉬워지지만\n공격이 오르기 어려워지는 민트."
    zh_simp: "宝可梦闻了这种薄荷之后，\n会令特攻容易提高，\n而攻击则难以提高。"
    zh_trad: "讓寶可夢聞這種薄荷的氣味，\n會令特攻變得容易提高，\n但攻擊則難以提高。"
moltres_candy:
  names:
    jp_kana: ファイヤーのアメ
    jp_kanji: ファイヤーのアメ
    en: Moltres Candy
    fr: Bonbon Sulfura
    it: Caramella Moltres
    de: Lavados-Bonbon
    es: Caramelo Moltres
    ko: 파이어의사탕
    zh_simp: 火焰鸟的糖果
    zh_trad: 火焰鳥的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de cierto Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
moltres_treat:
  names:
    jp_kana: ファイヤーのおやつ
    jp_kanji: ファイヤーのおやつ
    en: Moltres Treat
    fr: Friandise Sulfura
    it: Spuntino per Moltres
    de: Lavados-Snack
    es: Galleta Moltres
    ko: 파이어의간식
    zh_simp: 火焰鸟的点心
    zh_trad: 火焰鳥的點心
  descriptions:
    jp_kana: "伝説のポケモン　ファイヤーが\n好む食材で　作られた　おやつ。"
    jp_kanji: "伝説のポケモン　ファイヤーが\n好む食材で　作られた　おやつ。"
    en: "A snack made from ingredients favored by the\nLegendary Pokémon Moltres."
    fr: "Une friandise préparée avec les ingrédients favoris\ndu Pokémon légendaire Sulfura."
    it: "Uno spuntino fatto con gli ingredienti preferiti\ndal Pokémon leggendario Moltres."
    de: "Dieser Snack wurde mit den Lieblingszutaten des\nLegendären Pokémon Lavados zubereitet."
    es: "Galleta preparada con los ingredientes favoritos\ndel Pokémon legendario Moltres."
    ko: "전설의 포켓몬 파이어가\n좋아하는 식재료로 만들어진 간식."
    zh_simp: "用传说的宝可梦火焰鸟\n喜欢的食材制作的点心。"
    zh_trad: "用傳說的寶可夢火焰鳥\n喜愛的食材製成的點心。"
monstrous_chairs:
  names:
    jp_kana: かいじゅうチェア
    jp_kanji: かいじゅうチェア
    en: Monstrous Chairs
    fr: Sièges Kaiju
    it: Sedie mostruose
    de: Ungeheuer-Stühle
    es: Sillas Monstruosas
    ko: 괴수 체어
    zh_simp: 怪兽椅子
    zh_trad: 怪獸椅子
  descriptions:
    jp_kana: "ピクニックで　使いやすい　イス。\nかいじゅうクロスの　デザインを\nもとに　作ってもらった。"
    jp_kanji: "ピクニックで　使いやすい　イス。\nかいじゅうクロスの　デザインを\nもとに　作ってもらった。"
    en: "A set of chairs that are ideal for picnicking. Their design\nwas inspired by the Monstrous Tablecloth."
    fr: "Des sièges parfaits pour les pique-niques.\nLeur design est inspiré de la Nappe Kaiju."
    it: "Pratiche sedie, perfette per i picnic, ispirate al design\ndella Tovaglia mostruosa."
    de: "Diese Stühle sind gut geeignet für Picknicks.\nIhr Design basiert auf dem Ungeheuer-Tischtuch."
    es: "Unas sillas ideales para irse de pícnic. Su diseño está\nbasado en el del Mantel Monstruoso."
    ko: "피크닉에서 사용하기 편한 의자.\n괴수 테이블보의\n디자인을 토대로 만들어졌다."
    zh_simp: "在野餐时很好用的椅子。\n根据怪兽桌巾的设计制作而成。"
    zh_trad: "野餐時很好用的椅子。\n根據怪獸桌巾的設計製作而成。"
monstrous_tablecloth:
  names:
    jp_kana: かいじゅうクロス
    jp_kanji: かいじゅうクロス
    en: Monstrous Tablecloth
    fr: Nappe Kaiju
    it: Tovaglia mostruosa
    de: Ungeheuer-Tischtuch
    es: Mantel Monstruoso
    ko: 괴수 테이블보
    zh_simp: 怪兽桌巾
    zh_trad: 怪獸桌巾
  descriptions:
    jp_kana: "ニビ科学博物館　監修の　テーブルクロス。\nアカデミックな　雰囲気の色柄は\n子供にも　大人にも　大人気。"
    jp_kanji: "ニビ科学博物館　監修の　テーブルクロス。\nアカデミックな　雰囲気の色柄は\n子供にも　大人にも　大人気。"
    en: "A tablecloth designed by the Pewter Museum of Science.\nThe academic air of the pattern is a big hit with kids and\nadults alike."
    fr: "Une nappe créée au Musée des Sciences d’Argenta.\nSon motif rappelant des schémas scientifiques la rend\npopulaire auprès de tous, de 7 à 77 ans."
    it: "Tovaglia creata con la supervisione del Museo della\nScienza di Plumbeopoli. Il design dall’aria accademica\nriscuote grande successo tra grandi e piccini."
    de: "Das Marmoria City-Wissenschaftsmuseum war bei der\nGestaltung dieses Tischtuchs federführend. Es findet mit\nseiner kultivierten Farbgebung Anklang bei Jung und Alt."
    es: "Diseñado bajo la supervisión del Museo de la Ciencia\nde Ciudad Plateada. Los colores y motivos académicos\nde este mantel agradan tanto a niños como adultos."
    ko: "회색시티 과학 박물관이 감수한 테이블보.\n학구적인 분위기의 색상과 무늬는\n어른과 아이 모두에게 인기가 좋다."
    zh_simp: "由深灰科学博物馆监制的桌巾。\n充满学术氛围的配色与图案\n小孩大人都喜欢。"
    zh_trad: "經過深灰科學博物館監修的桌巾。\n散發學院氣氛的花紋\n從小孩子到大人都愛不釋手。"
moomoo_cheese:
  names:
    jp_kana: モーモーチーズ
    jp_kanji: モーモーチーズ
    en: Moomoo Cheese
    fr: Fromage Meumeu
    it: Formaggio Mumu
    de: Kuhmuh-Käse
    es: Queso Mu-mu
    ko: 튼튼치즈
    zh_simp: 哞哞乳酪
    zh_trad: 哞哞乳酪
  descriptions:
    jp_kana: "キャンプの　料理に　使う\n食材の　一種。溶けた　チーズが\nカレーに　コクを　与えてくれる。"
    jp_kanji: "キャンプの　料理に　使う\n食材の　一種。溶けた　チーズが\nカレーに　コクを　与えてくれる。"
    en: "One of the many ingredients that can be used for\ncooking at your camp. Melted cheese can really give a\ncurry some richness."
    fr: "Un ingrédient de cuisine pour le camping.\nUne fois fondu, il apporte une dose d’onctuosité\nau curry."
    it: "Uno degli ingredienti che puoi usare per cucinare\nin campeggio. Il formaggio fuso dona al curry\nun sapore intenso."
    de: "Eine Zutat für PokéCamping-Mahlzeiten. Dieser\nzartschmelzende Käse gibt dem Curry einen besonders\nvollen Geschmack."
    es: "Un ingrediente para cocinar en el campamento.\nEl queso derretido aporta intensidad a la salsa."
    ko: "캠프 요리에 사용되는\n식재료 중 하나. 녹아내린 치즈가\n카레의 감칠맛을 더해 준다."
    zh_simp: "在露营营地制作料理时会使用的\n一种食材。融化的芝士\n能为咖喱增添一份独特的浓郁。"
    zh_trad: "製作露營料理時使用的食材之一。\n融化的乳酪令咖哩的味道\n更有層次感。"
moomoo_milk:
  names:
    jp_kana: モーモーミルク
    jp_kanji: モーモーミルク
    en: Moomoo Milk
    fr: Lait Meumeu
    it: Latte Mumu
    de: Kuhmuh-Milch
    es: Leche Mu-mu
    ko: 튼튼밀크
    zh_simp: 哞哞鲜奶
    zh_trad: 哞哞鮮奶
  descriptions:
    jp_kana: "栄養満点の　ミルク。\nポケモン　１匹の　ＨＰを\n１００だけ　回復する。"
    jp_kanji: "栄養満点の　ミルク。\nポケモン　１匹の　ＨＰを\n１００だけ　回復する。"
    en: "A bottle of highly nutritious milk. It can be used to\nrestore 100 HP to a Pokémon."
    fr: "Un lait très nourrissant.\nRestaure 100 PV d’un Pokémon."
    it: "Latte ricco di sostanze nutrienti. Restituisce 100 PS\na un Pokémon."
    de: "Eine äußerst nährstoffreiche Milch, die die KP eines\nPokémon um 100 Punkte auffüllt."
    es: "Leche de alto valor nutritivo que restaura 100 PS de un\nPokémon."
    ko: "영양 만점의 우유.\n포켓몬 1마리의 HP를\n100만큼 회복한다."
    zh_simp: "营养百分百的牛奶。\n能让１只宝可梦\n回复１００ＨＰ。"
    zh_trad: "營養滿分的鮮奶。\n能讓１隻寶可夢\n回復１００ＨＰ。"
moon_ball:
  names:
    jp_kana: ムーンボール
    jp_kanji: ムーンボール
    en: Moon Ball
    fr: Lune Ball
    it: Luna Ball
    de: Mondball
    es: Luna Ball
    ko: 문볼
    zh_simp: 月亮球
    zh_trad: 月亮球
  descriptions:
    jp_kana: "つきのいしで　進化する\nポケモンが　捕まえやすくなる\nちょっと変わった　ボール。"
    jp_kanji: "つきのいしで　進化する\nポケモンが　捕まえやすくなる\nちょっと変わった　ボール。"
    en: "A somewhat different Poké Ball that is more effective\nwhen catching Pokémon that can be evolved using a\nMoon Stone."
    fr: "Une Poké Ball un peu spéciale qui fonctionne\nparticulièrement bien sur les Pokémon évoluant\navec une Pierre Lune."
    it: "Poké Ball un po’ diversa che funziona particolarmente\nbene con i Pokémon che si evolvono con\nuna Pietralunare."
    de: "Ein Ball, mit dem sich Pokémon, die sich durch einen\nMondstein entwickeln, leichter fangen lassen."
    es: "Poké Ball algo distinta a las demás que captura con más\nfacilidad Pokémon que evolucionan con la Piedra Lunar."
    ko: "달의돌로 진화하는 포켓몬이\n잡기 쉬워지는\n조금 특이한 볼."
    zh_simp: "有点与众不同的球。\n能很容易地捕捉\n使用月之石进化的宝可梦。"
    zh_trad: "有點與眾不同的球。\n能更容易地捉到\n使用月之石進化的寶可夢。"
moon_flute:
  names:
    jp_kana: つきのふえ
    jp_kanji: つきのふえ
    en: Moon Flute
    fr: Flûte de la Lune
    it: Flauto lunare
    de: Mondflöte
    es: Flauta Lunar
    ko: 달의피리
    zh_simp: 月亮之笛
    zh_trad: 月亮之笛
  descriptions:
    jp_kana: "月の　伝説ポケモンに\n感謝の　気持ちを　表すため\n音色を　捧げていた　という。"
    jp_kanji: "月の　伝説ポケモンに\n感謝の　気持ちを　表すため\n音色を　捧げていた　という。"
    en: "It is said that the tones it produces were offered\nup as an expression of gratitude to the Legendary\nPokémon of the moon."
    fr: "Une flûte dont le timbre permettait d’exprimer\nsa reconnaissance au Pokémon légendaire de la lune."
    it: "Flauto il cui dolce suono esprime la riconoscenza degli\nesseri umani verso il Pokémon leggendario della luna."
    de: "Auf dieser Flöte soll eine Melodie gespielt worden sein,\num dem Legendären Mond-Pokémon Dank zu sagen."
    es: "Flauta que se hace sonar como muestra de gratitud\nhacia el Pokémon legendario de la luna."
    ko: "달의 전설포켓몬에게\n감사의 마음을 표현하기 위해\n음색을 바쳤다고 한다."
    zh_simp: "为了对月亮的\n传说的宝可梦表达感激之情，\n据说会用它来献上美乐。"
    zh_trad: "為了對月亮的\n傳說的寶可夢表達感激之情，\n據說會用它來獻上美樂。"
moon_stone:
  names:
    jp_kana: つきのいし
    jp_kanji: つきのいし
    en: Moon Stone
    fr: Pierre Lune
    it: Pietralunare
    de: Mondstein
    es: Piedra Lunar
    ko: 달의돌
    zh_simp: 月之石
    zh_trad: 月之石
  descriptions:
    jp_kana: "ある特定の　ポケモンを\n進化させる　不思議な石。\n夜空のように　黒い。"
    jp_kanji: "ある特定の　ポケモンを\n進化させる　不思議な石。\n夜空のように　黒い。"
    en: "A peculiar stone that can make certain species of\nPokémon evolve. It is dark like the night sky."
    fr: "Une pierre étrange qui fait évoluer certaines espèces\nde Pokémon. Elle est sombre comme la nuit."
    it: "Pietra particolare che fa evolvere determinate specie\ndi Pokémon. È nera come la notte."
    de: "Dieser besondere Stein löst bei bestimmten Pokémon\ndie Entwicklung aus. Er ist dunkel wie die Nacht."
    es: "Curiosa piedra que hace evolucionar a determinadas\nespecies de Pokémon. Es oscura como el cielo nocturno."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 돌.\n밤하늘처럼 까맣다."
    zh_simp: "能让某些特定宝可梦\n进化的神奇石头。\n像夜空一样乌黑。"
    zh_trad: "能讓特定寶可夢\n進化的神奇石頭。\n像夜空一樣深黑。"
morpeko_snack:
  names:
    jp_kana: モルペコのたね
    jp_kanji: モルペコのたね
    en: Morpeko Snack
    fr: Graine de Morpeko
    it: Seme di Morpeko
    de: Morpeko-Samen
    es: Semilla de Morpeko
    ko: 모르페코의씨앗
    zh_simp: 莫鲁贝可的种子
    zh_trad: 莫魯貝可的種子
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
mountain_balm:
  names:
    jp_kana: やまのシズメダマ
    jp_kanji: やまのシズメダマ
    en: Mountain Balm
    fr: Pacifi-Montagne
    it: Sferazen monte
    de: Bergruhegabe
    es: Calmasfera Montaña
    ko: 산의진정환
    zh_simp: 山之镇宝
    zh_trad: 山之鎮寶
  descriptions:
    jp_kana: "荒ぶる洞窟キング　マルマインを\n鎮めることができる\n不思議な香りを発する。"
    jp_kanji: "荒ぶる洞窟キング　マルマインを\n鎮めることができる\n不思議な香りを発する。"
    en: "A mysterious balm that gives off a soothing scent.\nIt can be used to help calm the frenzy of the Lord of\nthe Hollow, Electrode."
    fr: "L’étrange parfum que dégage cet objet permet d’apaiser\nla frénésie d’Électrode, le Roi des Grottes."
    it: "Emana un misterioso profumo in grado di calmare\nla collera di Electrode, il Re delle grotte."
    de: "Dieses Säckchen verströmt einen mysteriösen Duft.\nMit ihm kann man Lektrobal, den König der Höhle,\nbesänftigen."
    es: "Esfera que emana un peculiar aroma capaz de calmar a\nElectrode, el Señor de las Cavernas, cuando se\nencuentra furioso."
    ko: "폭주하는 동굴의 왕 붐볼을\n진정시킬 수 있는\n신비한 향기가 난다."
    zh_simp: "能让狂暴的洞窟王\n顽皮雷弹镇静下来。\n散发着不可思议的香气。"
    zh_trad: "能讓狂暴的洞窟王\n頑皮雷彈鎮靜下來。\n散發著不可思議的香氣。"
mr_mime_candy:
  names:
    jp_kana: バリヤードのアメ
    jp_kanji: バリヤードのアメ
    en: Mr. Mime Candy
    fr: Bonbon M. Mime
    it: Caramella Mr. Mime
    de: Pantimos-Bonbon
    es: Caramelo Mr. Mime
    ko: 마임맨의사탕
    zh_simp: 魔墙人偶的糖果
    zh_trad: 魔牆人偶的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de cierto Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
mudbray_mud:
  names:
    jp_kana: ドロバンコのどろ
    jp_kanji: ドロバンコのどろ
    en: Mudbray Mud
    fr: Boue de Tiboudet
    it: Fango di Mudbray
    de: Pampuli-Schlamm
    es: Lodo de Mudbray
    ko: 머드나기의진흙
    zh_simp: 泥驴仔的泥巴
    zh_trad: 泥驢仔的泥巴
  descriptions:
