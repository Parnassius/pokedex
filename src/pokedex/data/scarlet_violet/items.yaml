    jp_kanji: "ポケスロンの　記録が　はいっている。\nポケモンを　タッチした　回数が\n記録された　カード。"
    en: "It holds Pokéathlon records. It is a card that shows how\nmany times you instructed your Pokémon."
    fr: "Contient vos données du Pokéathlon.\nIl y est inscrit le nombre de fois où vous avez\ntouché vos Pokémon."
