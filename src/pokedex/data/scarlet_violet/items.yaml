drowzee_candy:
  names:
    jp_kana: スリープのアメ
    jp_kanji: スリープのアメ
    en: Drowzee Candy
    fr: Bonbon Soporifik
    it: Caramella Drowzee
    de: Traumato-Bonbon
    es: Caramelo Drowzee
