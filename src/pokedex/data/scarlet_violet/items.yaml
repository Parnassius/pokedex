olive_oil:
  names:
    jp_kana: オリーブオイル
    jp_kanji: オリーブオイル
    en: Olive Oil
    fr: Huile d’Olive
    it: Olio d’oliva
    de: Olivenöl
    es: Aceite de Oliva
    ko: 올리브오일
    zh_simp: 橄榄油
    zh_trad: 橄欖油
  descriptions:
    jp_kana: "酸味と　苦味を　わずかに　感じる　調味料。\nミニーブが　好む　においの　オイルは\n質が高いため　特に　珍重されている。"
    jp_kanji: "酸味と　苦味を　わずかに　感じる　調味料。\nミニーブが　好む　においの　オイルは\n質が高いため　特に　珍重されている。"
    en: "A condiment offering faint notes of sour and bitter\nflavors. The most prized varieties are the ones Smoliv\nlove the smell of—such oils’ quality is assured."
    fr: "Un condiment au goût légèrement acide et amer.\nLes huiles les plus prisées sont celles dont les Olivini\napprécient l’odeur, ce qui est un gage de qualité certain."
    it: "Un condimento leggermente aspro e amaro. Gli oli\ncon un profumo amato dagli Smoliv sono molto ricercati\nperché di alta qualità."
    de: "Dieses Würzmittel versprüht einen Hauch saurer und\nbitterer Aromen. Öle, deren Duft Olini zusagt, gelten als\nsehr hochwertig und sind heißbegehrt."
    es: "Un condimento de sabor ligeramente ácido y amargo.\nEl aceite más preciado es aquel cuyo aroma aprecian\nlos Smoliv, pues significa que es de mejor calidad."
    ko: "신맛과 쓴맛을 살짝 느낄 수 있는 조미료.\n미니브가 좋아하는 향의 오일은\n품질이 좋아서 특히 더 귀하게 여겨진다."
    zh_simp: "能稍微尝到酸味和苦味的调味料。\n带有迷你芙喜欢味道的油品质很高，\n所以会特别受到珍重。"
    zh_trad: "會隱約感覺到酸味和苦味的調味料。\n帶有迷你芙喜歡的氣味的油屬高品質，\n因此格外受到珍惜。"
omanyte_candy:
  names:
    jp_kana: オムナイトのアメ
    jp_kanji: オムナイトのアメ
    en: Omanyte Candy
    fr: Bonbon Amonita
    it: Caramella Omanyte
    de: Amonitas-Bonbon
    es: Caramelo Omanyte
    ko: 암나이트의사탕
    zh_simp: 菊石兽的糖果
    zh_trad: 菊石獸的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
onion:
  names:
    jp_kana: たまねぎスライス
    jp_kanji: たまねぎスライス
    en: Onion
    fr: Oignon
    it: Cipolla
    de: Zwiebel
    es: Cebolla
    ko: 양파슬라이스
    zh_simp: 洋葱片
    zh_trad: 洋蔥片
  descriptions:
    jp_kana: "辛味が　ある　食材。\nサンドウィッチには　欠かせない　野菜。\n脂が多い　食材との　相性が　よい。"
    jp_kanji: "辛味が　ある　食材。\nサンドウィッチには　欠かせない　野菜。\n脂が多い　食材との　相性が　よい。"
    en: "This spicy veggie is indispensable to many sandwiches.\nIt goes well with rich ingredients."
    fr: "Un ingrédient au goût épicé. Un légume indispensable\nà tout bon Sandwich. Se marie bien avec les ingrédients\nplutôt gras."
    it: "Un ingrediente piccante. Questa verdura, che non può\nmancare in un panino, si abbina bene con ingredienti\nmolto grassi."
    de: "Diese scharfe Zutat darf auf keinem Sandwich fehlen.\nSie harmoniert besonders gut mit fettreichen Zutaten."
    es: "Esta hortaliza de sabor picante no puede faltar en\nningún bocadillo. Combina especialmente bien con\ningredientes con alto contenido graso."
    ko: "매운맛이 나는 식재료.\n샌드위치에 빠지지 않는 채소다.\n느끼한 식재료와 궁합이 잘 맞는다."
    zh_simp: "带有辣味的食材。\n三明治中不可或缺的蔬菜。\n和油腻的食材很搭配。"
    zh_trad: "帶有辣味的食材。\n是三明治中不可或缺的蔬菜。\n和油脂多的食材非常搭配。"
