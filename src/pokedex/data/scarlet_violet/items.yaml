    jp_kana: "みずみずしい大粒のマメ。\n鳥ポケモンや魚ポケモンの好物で\n投げた場所に引き寄せることができる。"
    jp_kanji: "みずみずしい大粒のマメ。\n鳥ポケモンや魚ポケモンの好物で\n投げた場所に引き寄せることができる。"
    en: "Large, juicy beans that grow in pods. These beans are\nbeloved by fish Pokémon, as well as bird Pokémon and\ntheir flying ilk, so throw one and they will gather around."
    fr: "Une fève aussi juteuse que dodue. Particulièrement\nappréciée des Pokémon pareils à des oiseaux ou\nà des poissons, elle les attire là où vous la lancez."
    it: "Baccello contenente fagioli grandi e succosi.\nMolto apprezzato, tra gli altri, dai Pokémon alati e\nda quelli acquatici, li attira laddove viene lanciato."
    de: "Eine saftige, dicke Bohne. Vogel- sowie Fisch-Pokémon\nlieben sie besonders und lassen sich anlocken, wenn sie\nihnen zugeworfen wird."
    es: "Jugosa y enorme haba. Adorada por los Pokémon pájaro\ny los Pokémon pez, que se verán atraídos allá donde la\nlances."
    ko: "풋풋하고 알이 굵은 콩.\n새포켓몬이나 물고기포켓몬이 좋아해서\n던진 곳으로 유인할 수 있다."
    zh_simp: "结实饱满的大颗豆子。\n是鸟宝可梦和鱼宝可梦喜爱的食物，\n能吸引它们聚集到投向的地方。"
    zh_trad: "結實飽滿的大顆豆子。\n是鳥寶可夢和魚寶可夢喜愛的食物，\n能吸引牠們聚集到投向的地方。"
plusle_fur:
