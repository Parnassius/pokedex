    zh_simp: 熔岩增幅器
    zh_trad: 熔岩增幅器
  descriptions:
    jp_kana: "とてつもない　マグマの　エネルギーが\n蓄えられている　箱。\nあるポケモンが　好んでいる。"
    jp_kanji: "とてつもない　マグマの　エネルギーが\n蓄えられている　箱。\nあるポケモンが　好んでいる。"
    en: "A box packed with a tremendous amount of magma\nenergy. It’s loved by a certain Pokémon."
    fr: "Une boîte remplie d’une énorme quantité d’énergie\nmagmatique. Appréciée d’un certain Pokémon."
    it: "Scatola strapiena di energia lavica.\nPiace a un Pokémon in particolare."
    de: "Eine Schachtel mit Magma-Energie.\nDas Lieblingsstück eines bestimmten Pokémon."
    es: "Este dispositivo contiene una enorme cantidad de\nenergía magmática. Cierto Pokémon lo adora."
    ko: "엄청난 마그마의 에너지가\n비축되어 있는 상자.\n어떤 포켓몬이 좋아하는 물건이다."
    zh_simp: "积蓄着庞大熔岩能量的箱子。\n某种宝可梦很喜欢它。"
    zh_trad: "蓄積著龐大\n熔岩能量的箱子。\n某種寶可夢很喜歡它。"
