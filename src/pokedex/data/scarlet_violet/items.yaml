    jp_kanji: "急所率が　大きく　あがる。\n使うたびに　効果が　アップする。\nひっこめると　元に　戻る。"
    en: "Can be used many times to greatly boost a Pokémon’s\ncritical-hit ratio. These effects disappear if the Pokémon\nleaves the battle."
    fr: "Augmente fortement le taux de critiques.\nPlus efficace à chaque utilisation.\nL’effet se dissipe si le Pokémon est retiré."
