lotad_leaf:
  names:
    jp_kana: ハスボーのはっぱ
    jp_kanji: ハスボーのはっぱ
    en: Lotad Leaf
    fr: Feuille de Nénupiot
    it: Foglia di Lotad
    de: Loturzel-Blatt
    es: Hoja de Lotad
    ko: 연꽃몬의잎
    zh_simp: 莲叶童子的叶片
    zh_trad: 蓮葉童子的葉片
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
love_ball:
  names:
    jp_kana: ラブラブボール
    jp_kanji: ラブラブボール
    en: Love Ball
    fr: Love Ball
    it: Love Ball
    de: Sympaball
    es: Amor Ball
    ko: 러브러브볼
    zh_simp: 甜蜜球
    zh_trad: 甜蜜球
  descriptions:
    jp_kana: "自分のポケモンと　性別が\n違うと　捕まえやすくなる\nちょっと変わった　ボール。"
    jp_kanji: "自分のポケモンと　性別が\n違うと　捕まえやすくなる\nちょっと変わった　ボール。"
    en: "A somewhat different Poké Ball that is more effective\nwhen catching Pokémon of the opposite gender to your\nown Pokémon."
    fr: "Une Poké Ball un peu spéciale qui fonctionne\nparticulièrement bien sur un Pokémon de sexe\nopposé à celui du vôtre."
    it: "Poké Ball un po’ diversa che funziona meglio con\ni Pokémon di sesso opposto a quello del proprio."
    de: "Ein Ball, mit dem sich Pokémon leichter fangen lassen,\ndie ein anderes Geschlecht haben als dein Pokémon."
    es: "Poké Ball algo distinta a las demás que funciona\nespecialmente bien con Pokémon del sexo opuesto\nal del Pokémon propio."
    ko: "자신의 포켓몬과 성별이\n다르면 잡기 쉬워지는\n조금 특이한 볼."
    zh_simp: "有点与众不同的球。\n能很容易地捕捉\n和自己宝可梦性别不同的宝可梦。"
    zh_trad: "有點與眾不同的球。\n能更容易地捉到\n與自己的寶可夢性別不同的寶可夢。"
love_sweet:
  names:
    jp_kana: ハートアメざいく
    jp_kanji: ハートアメざいく
    en: Love Sweet
    fr: Cœur en Sucre
    it: Bonboncuore
    de: Zucker-Herz
    es: Confite Corazón
    ko: 하트사탕공예
    zh_simp: 爱心糖饰
    zh_trad: 愛心糖飾
  descriptions:
    jp_kana: "ハートの形をした　アメ細工。\nマホミルに　持たせてあげると\nくるくる　回って　喜ぶ。"
    jp_kanji: "ハートの形をした　アメ細工。\nマホミルに　持たせてあげると\nくるくる　回って　喜ぶ。"
    en: "A heart-shaped sweet. When a Milcery holds this,\nit spins around happily."
    fr: "Un bonbon en forme de cœur.\nQuand on le donne à un Crèmy, il se réjouit en tournant\nsur lui-même."
    it: "Bonbon a forma di cuore. Se dato a Milcery,\nil Pokémon farà le piroette per la felicità."
    de: "Zuckerwerk in Form eines Herzchens. Gibt man es\nHokumil zum Tragen, dreht es sich vor Freude im Kreis."
    es: "Figura de caramelo con forma de corazón. Al dárselo a\nMilcery, se pone a girar rebosante de alegría."
    ko: "하트 모양의 사탕공예.\n마빌크에게 지니게 하면\n빙빙 돌며 기뻐한다."
    zh_simp: "爱心形状的工艺糖果。\n让小仙奶携带的话，\n会高兴地转圈圈。"
    zh_trad: "愛心形狀的工藝糖果。\n讓小仙奶攜帶的話，\n牠會高興得轉圈圈。"
lucarionite:
  names:
    jp_kana: ルカリオナイト
    jp_kanji: ルカリオナイト
    en: Lucarionite
    fr: Lucarite
    it: Lucarite
    de: Lucarionit
    es: Lucarita
    ko: 루카리오나이트
    zh_simp: 路卡利欧进化石
    zh_trad: 路卡利歐進化石
  descriptions:
    jp_kana: "ルカリオに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    jp_kanji: "ルカリオに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Lucario hold it, and this stone will enable it to\nMega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Lucario, elle lui permet de\nméga-évoluer durant un combat."
    it: "Una delle misteriose Megapietre. Data a Lucario,\ngli permette di megaevolversi durante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Lucario getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Lucario en combate."
    ko: "루카리오에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让路卡利欧携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓路卡利歐攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
luck_incense:
  names:
    jp_kana: こううんのおこう
    jp_kanji: こううんのおこう
    en: Luck Incense
    fr: Encens Veine
    it: Fortunaroma
    de: Glücksrauch
    es: Incienso Duplo
    ko: 행운의향로
    zh_simp: 幸运薰香
    zh_trad: 幸運薰香
  descriptions:
    jp_kana: "持たせた　ポケモンが　１度でも\n戦闘に　顔を　だすと\nお金が　２倍　もらえる。"
    jp_kanji: "持たせた　ポケモンが　１度でも\n戦闘に　顔を　だすと\nお金が　２倍　もらえる。"
    en: "An item to be held by a Pokémon. It doubles any prize\nmoney received as long as the holder joins the battle at\nleast once."
    fr: "Objet à tenir. Double l’argent gagné si le porteur\nse joint au combat."
    it: "Strumento da dare a un Pokémon. Se chi ce l’ha\npartecipa alla lotta anche una sola volta, i guadagni\nraddoppiano."
    de: "Ein Item zum Tragen. Dieses exotische Räucherwerk\nverdoppelt das Preisgeld, wenn der Träger am Kampf\nteilnimmt."
    es: "Si el Pokémon que lo lleva lucha en un combate,\nse duplica el dinero ganado."
    ko: "지니게 한 포켓몬이\n한 번이라도 배틀에 나가면\n돈을 2배로 받을 수 있다."
    zh_simp: "只要携带它的宝可梦\n在战斗时出场一次，\n就能获得２倍金钱。"
    zh_trad: "只要攜帶它的寶可夢\n在戰鬥時出場一次，\n就能獲得２倍金錢。"
lucky_egg:
  names:
    jp_kana: しあわせタマゴ
    jp_kanji: しあわせタマゴ
    en: Lucky Egg
    fr: Œuf Chance
    it: Fortunuovo
    de: Glücks-Ei
    es: Huevo Suerte
    ko: 행복의알
    zh_simp: 幸运蛋
    zh_trad: 幸運蛋
  descriptions:
    jp_kana: "しあわせが　つまった　タマゴ。\n持たせたポケモンは　もらえる\n経験値が　少し増える。"
    jp_kanji: "しあわせが　つまった　タマゴ。\n持たせたポケモンは　もらえる\n経験値が　少し増える。"
    en: "An item to be held by a Pokémon. It’s an egg filled with\nhappiness that earns the holder extra Exp. Points."
    fr: "Objet à tenir. Un œuf rempli de joie qui augmente\nle nombre de Points d’Expérience gagnés au combat."
    it: "Strumento da dare a un Pokémon. Uovo pieno\ndi felicità che aumenta di poco i Punti Esperienza\nottenuti nelle lotte."
    de: "Ein Item zum Tragen, das mit Glück gefüllt ist und für\nzusätzliche Erfahrungspunkte im Kampf sorgt."
    es: "Huevo lleno de felicidad que aumenta ligeramente los\npuntos de experiencia del Pokémon que lo lleva."
    ko: "행복이 가득한 알.\n지니게 한 포켓몬은 받을 수 있는\n경험치가 조금 늘어난다."
    zh_simp: "满载着幸福的蛋。\n携带它的宝可梦获得的\n经验值会少量增加。"
    zh_trad: "滿載著幸福的蛋。\n攜帶它的寶可夢獲得的\n經驗值會少量增加。"
lucky_punch:
  names:
    jp_kana: ラッキーパンチ
    jp_kanji: ラッキーパンチ
    en: Lucky Punch
    fr: Poing Chance
    it: Fortunpugno
    de: Lucky Punch
    es: Puño Suerte
    ko: 럭키펀치
    zh_simp: 吉利拳
    zh_trad: 吉利拳
  descriptions:
    jp_kana: "幸運を　呼ぶ　グローブ。\nラッキーに　持たせると　技が\n急所に　当たりやすくなる。"
    jp_kanji: "幸運を　呼ぶ　グローブ。\nラッキーに　持たせると　技が\n急所に　当たりやすくなる。"
    en: "An item to be held by Chansey. This lucky boxing glove\nboosts the critical-hit ratio of Chansey’s moves."
    fr: "Objet à faire tenir à Leveinard.\nUne paire de gants qui augmente son taux de critiques."
    it: "Strumento da dare a Chansey. Guanti portafortuna\nche aumentano la probabilità di sferrare brutti colpi."
    de: "Ein Item, das von Chaneira getragen werden kann.\nDiese Glück bringenden Handschuhe erhöhen die\nVolltrefferquote des Trägers."
    es: "Un guante que aumenta la probabilidad de asestar\nun golpe crítico. Debe llevarlo Chansey."
    ko: "행운을 부르는 글러브다.\n럭키에게 지니게 하면 기술이\n급소에 맞기 쉬워진다."
    zh_simp: "能带来幸运的拳套。\n让吉利蛋携带后，\n招式会变得容易击中要害。"
    zh_trad: "能帶來幸運的拳套。\n讓吉利蛋攜帶後，招式會\n變得容易擊中要害。"
lugia_treat:
  names:
    jp_kana: ルギアのおやつ
    jp_kanji: ルギアのおやつ
    en: Lugia Treat
    fr: Friandise Lugia
    it: Spuntino per Lugia
    de: Lugia-Snack
    es: Galleta Lugia
    ko: 루기아의간식
    zh_simp: 洛奇亚的点心
    zh_trad: 洛奇亞的點心
  descriptions:
    jp_kana: "伝説のポケモン　ルギアが\n好む食材で　作られた　おやつ。"
    jp_kanji: "伝説のポケモン　ルギアが\n好む食材で　作られた　おやつ。"
    en: "A snack made from ingredients favored by the\nLegendary Pokémon Lugia."
    fr: "Une friandise préparée avec les ingrédients favoris\ndu Pokémon légendaire Lugia."
    it: "Uno spuntino fatto con gli ingredienti preferiti\ndal Pokémon leggendario Lugia."
    de: "Dieser Snack wurde mit den Lieblingszutaten des\nLegendären Pokémon Lugia zubereitet."
    es: "Galleta preparada con los ingredientes favoritos\ndel Pokémon legendario Lugia."
    ko: "전설의 포켓몬 루기아가\n좋아하는 식재료로 만들어진 간식."
    zh_simp: "用传说的宝可梦洛奇亚\n喜欢的食材制作的点心。"
    zh_trad: "用傳說的寶可夢洛奇亞\n喜愛的食材製成的點心。"
lum_berry:
  names:
    jp_kana: ラムのみ
    jp_kanji: ラムのみ
    en: Lum Berry
    fr: Baie Prine
    it: Baccaprugna
    de: Prunusbeere
    es: Baya Ziuela
    ko: 리샘열매
    zh_simp: 木子果
    zh_trad: 木子果
  descriptions:
    jp_kana: "ポケモンに　持たせると\nすべての　状態異常を　回復する。"
    jp_kanji: "ポケモンに　持たせると\nすべての　状態異常を　回復する。"
    en: "If a Pokémon holds one of these Berries, it will be able\nto cure itself of any status condition it may have."
    fr: "Une Baie qui soigne toutes les altérations de statut\nlorsqu’elle est tenue par un Pokémon."
    it: "Se un Pokémon ha questa bacca, guarisce da qualsiasi\nproblema di stato."
    de: "Als getragenes Item behebt diese Beere alle\nStatusprobleme des Pokémon."
    es: "Los Pokémon pueden llevarla y usarla para recuperarse\nde problemas de estado."
    ko: "포켓몬에게 지니게 하면\n모든 상태 이상을\n회복한다."
    zh_simp: "让宝可梦携带后，\n可以治愈所有异常状态。"
    zh_trad: "讓寶可夢攜帶後，\n可以治癒所有異常狀態。"
luminous_moss:
  names:
    jp_kana: ひかりごけ
    jp_kanji: ひかりごけ
    en: Luminous Moss
    fr: Lichen Lumineux
    it: Muschioluce
    de: Leuchtmoos
    es: Musgo Brillante
    ko: 빛이끼
    zh_simp: 光苔
    zh_trad: 光苔
  descriptions:
    jp_kana: "使い捨ての　ひかりごけ。\n持たせて　みずの技の　ダメージを\n受けると　特防が　あがる。"
    jp_kanji: "使い捨ての　ひかりごけ。\n持たせて　みずの技の　ダメージを\n受けると　特防が　あがる。"
    en: "An item to be held by a Pokémon. This single-use\nluminous moss boosts the Sp. Def stat if the holder is\ndamaged by a Water-type move."
    fr: "Objet à tenir. Du lichen à usage unique qui augmente\nla Défense Spéciale du porteur lorsqu’il subit des dégâts\nà cause d’une capacité de type Eau."
    it: "Muschio luminoso monouso. Se il Pokémon che ha\nquesto strumento subisce danni da una mossa di tipo\nAcqua, la sua Difesa Speciale aumenta."
    de: "Nimmt der Träger dieses Leuchtmooses durch eine\nWasser-Attacke Schaden, steigt seine\nSpezial-Verteidigung und das Item verschwindet."
    es: "Musgo brillante que aumenta la Defensa Especial del\nportador si lo alcanza un ataque de tipo Agua. Es de un\nsolo uso."
    ko: "단 한 번 쓰면 없어지는 빛이끼.\n지니게 하고 물 기술에 데미지를 받으면\n특수방어가 올라간다."
    zh_simp: "一次性使用的光苔。\n携带它的宝可梦如果受到水属性\n招式的伤害，特防就会提高。"
    zh_trad: "只能使用一次的光苔。\n攜帶它的寶可夢如果受到水屬性\n招式的傷害，特防就會提高。"
lumiose_galette:
  names:
    jp_kana: ミアレガレット
    jp_kanji: ミアレガレット
    en: Lumiose Galette
    fr: Galette Illumis
    it: Pan di Lumi
    de: Illumina-Galette
    es: Crêpe Luminalia
    ko: 미르갈레트
    zh_simp: 密阿雷格雷派饼
    zh_trad: 密阿雷格雷派餅
  descriptions:
    jp_kana: "ミアレシティで　人気のお菓子。\nポケモン　１匹の　状態の\n異常を　すべて　回復する。"
    jp_kanji: "ミアレシティで　人気のお菓子。\nポケモン　１匹の　状態の\n異常を　すべて　回復する。"
    en: "A popular treat in Lumiose City. It can be used to cure\nany status condition a Pokémon may have."
    fr: "Une spécialité d’Illumis.\nSoigne toutes les altérations de statut d’un Pokémon."
    it: "Un famoso dolce di Luminopoli. Può guarire un Pokémon\nda tutti i problemi di stato."
    de: "Diese Süßigkeit ist eine Spezialität aus Illumina City.\nSie behebt alle Statusprobleme eines Pokémon."
    es: "El dulce estrella de Ciudad Luminalia. Cura los\nproblemas de estado de un Pokémon."
    ko: "미르시티에서 인기 있는 과자.\n포켓몬 1마리의 상태 이상을\n모두 회복한다."
    zh_simp: "在密阿雷市很受欢迎的点心。\n能治愈１只宝可梦的\n所有异常状态。"
    zh_trad: "在密阿雷市很受歡迎的點心。\n能治癒１隻寶可夢的\n所有異常狀態。"
lunala_treat:
  names:
    jp_kana: ルナアーラのおやつ
    jp_kanji: ルナアーラのおやつ
    en: Lunala Treat
    fr: Friandise Lunala
    it: Spuntino per Lunala
    de: Lunala-Snack
    es: Galleta Lunala
    ko: 루나아라의간식
    zh_simp: 露奈雅拉的点心
    zh_trad: 露奈雅拉的點心
  descriptions:
    jp_kana: "伝説のポケモン　ルナアーラが\n好む食材で　作られた　おやつ。"
    jp_kanji: "伝説のポケモン　ルナアーラが\n好む食材で　作られた　おやつ。"
    en: "A snack made from ingredients favored by the\nLegendary Pokémon Lunala."
    fr: "Une friandise préparée avec les ingrédients favoris\ndu Pokémon légendaire Lunala."
    it: "Uno spuntino fatto con gli ingredienti preferiti\ndal Pokémon leggendario Lunala."
    de: "Dieser Snack wurde mit den Lieblingszutaten des\nLegendären Pokémon Lunala zubereitet."
    es: "Galleta preparada con los ingredientes favoritos\ndel Pokémon legendario Lunala."
    ko: "전설의 포켓몬 루나아라가\n좋아하는 식재료로 만들어진 간식."
    zh_simp: "用传说的宝可梦露奈雅拉\n喜欢的食材制作的点心。"
    zh_trad: "用傳說的寶可夢露奈雅拉\n喜愛的食材製成的點心。"
lunalium_z:bag:
  names:
    jp_kana: ルナアーラＺ
    jp_kanji: ルナアーラＺ
    en: Lunalium Z
    fr: Lunazélite
    it: Lunalium Z
    de: Lunalium Z
    es: Lunalastal Z
    ko: 루나아라Z
    zh_simp: 露奈雅拉Ｚ
    zh_trad: 露奈雅拉Ｚ
  descriptions:
    jp_kana: "ルナアーラの　シャドーレイを\nＺワザに　グレードアップする\nＺパワーの　結晶を　つくりだす。"
    jp_kanji: "ルナアーラの　シャドーレイを\nＺワザに　グレードアップする\nＺパワーの　結晶を　つくりだす。"
    en: "It converts Z-Power into crystals that upgrade\nLunala’s Moongeist Beam to a Z-Move."
    fr: "Permet de concentrer la Force Z en un cristal qui,\ntenu, autorise Lunala à transformer son Rayon Spectral\nen capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono a Lunala di trasformare la mossa\nRaggio d’Ombra in una mossa Z."
    de: "Kristallisierte Z-Kraft, die Lunalas Attacke Schattenstrahl\nzu einer Z-Attacke aufstuft. Wird bei Bedarf\nautomatisch vervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a\nLunala convertir su Rayo Umbrío en un movimiento Z."
    ko: "루나아라의 섀도레이를\nZ기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将露奈雅拉的暗影之光\n升级成Ｚ招式的Ｚ力量结晶。"
    zh_trad: "可用來製造將\n露奈雅拉的暗影之光\n升級為Ｚ招式的Ｚ力量結晶。"
lunalium_z:held:
  names:
    jp_kana: ルナアーラＺ
    jp_kanji: ルナアーラＺ
    en: Lunalium Z
    fr: Lunazélite
    it: Lunalium Z
    de: Lunalium Z
    es: Lunalastal Z
    ko: 루나아라Z
    zh_simp: 露奈雅拉Ｚ
    zh_trad: 露奈雅拉Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　結晶。\nルナアーラの　シャドーレイを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nルナアーラの　シャドーレイを\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Lunala’s Moongeist Beam to a Z-Move."
    fr: "Une cristallisation de la Force Z, permettant\nde transformer le Rayon Spectral de Lunala\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare la mossa Raggio d’Ombra\ndi Lunala in una mossa Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft Lunalas\nAttacke Schattenstrahl zu einer Z-Attacke auf."
    es: "Cristal que confiere el Poder Z al movimiento Rayo\nUmbrío de Lunala."
    ko: "Z파워의 결정.\n루나아라의 섀도레이를\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将露奈雅拉的暗影之光\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n可將露奈雅拉的暗影之光\n升級為Ｚ招式。"
lunar_feather:
  names:
    jp_kana: みかづきのはね
    jp_kanji: みかづきのはね
    en: Lunar Feather
    fr: Plume Lune
    it: Piumalunare
    de: Lunarfeder
    es: Pluma Lunar
    ko: 초승달깃털
    zh_simp: 新月之羽
    zh_trad: 新月之羽
  descriptions:
    jp_kana: "つきのような　輝きを　はなつ\nはね。　悪夢を　ふりはらう　力を\n秘めていると　伝えられている。"
    jp_kanji: "つきのような　輝きを　はなつ\nはね。　悪夢を　ふりはらう　力を\n秘めていると　伝えられている。"
    en: "A feather that glows like the moon. It’s said to possess\nthe power to dispel nightmares."
    fr: "Une plume qui brille comme la lune.\nOn dit qu’elle a le pouvoir de chasser les cauchemars."
    it: "Piuma che brilla come la luna. Pare che abbia\nil potere di allontanare gli incubi."
    de: "Diese Feder leuchtet wie der Mond. Kann angeblich\nAlpträume vertreiben."
    es: "Pluma que brilla como la luna. Se dice que tiene el\npoder de disipar pesadillas."
    ko: "달처럼 반짝임을 발산하는 깃털.\n악몽을 뿌리치는 힘을\n간직하고 있다고 전해진다."
    zh_simp: "散发着月辉般光芒的羽毛。\n据说隐藏着可以驱散恶梦的力量。"
    zh_trad: "散發著月輝般光芒的羽毛。\n據說隱藏著可以驅除\n惡夢的力量。"
lure:
  names:
    jp_kana: むしよせコロン
    jp_kanji: むしよせコロン
    en: Lure
    fr: Parfum
    it: Profumo invito
    de: Lockparfüm
    es: Colonia
    ko: 벌레유인코롱
    zh_simp: 引虫香水
    zh_trad: 引蟲香水
  descriptions:
    jp_kana: "使うと　少しのあいだ\n珍しい　ポケモンが\n出てきやすくなる　香水。"
    jp_kanji: "使うと　少しのあいだ\n珍しい　ポケモンが\n出てきやすくなる　香水。"
    en: "A bottle of perfume that makes rare Pokémon more\nlikely to appear for a short time when sprayed about."
    fr: "Une substance qui fait apparaître les Pokémon rares\nplus facilement pendant un court moment."
    it: Profumo che attira Pokémon rari per un po’ di tempo.
    de: "Ein Parfüm, das für kurze Zeit vermehrt seltene\nPokémon erscheinen lässt."
    es: "Colonia que atrae a los Pokémon raros durante un breve\nespacio de tiempo."
    ko: "사용하면 잠시 동안\n희귀한 포켓몬이\n나오기 쉬워지는 향수."
    zh_simp: "使用该香水后的一小段时间内，\n稀有宝可梦会更容易出现。"
    zh_trad: "使用後的一小段期間，\n讓稀有寶可夢變得\n容易出現的香水。"
lure_ball:
  names:
    jp_kana: ルアーボール
    jp_kanji: ルアーボール
    en: Lure Ball
    fr: Appât Ball
    it: Esca Ball
    de: Köderball
    es: Cebo Ball
    ko: 루어볼
    zh_simp: 诱饵球
    zh_trad: 誘餌球
  descriptions:
    jp_kana: "水の世界で　暮らしている\nポケモンが　捕まえやすくなる\nちょっと変わった　ボール。"
    jp_kanji: "水の世界で　暮らしている\nポケモンが　捕まえやすくなる\nちょっと変わった　ボール。"
    en: "A somewhat different Poké Ball that is more effective\nwhen catching Pokémon in or on the water."
    fr: "Une Poké Ball un peu spéciale qui fonctionne\nparticulièrement bien sur les Pokémon qui vivent\nen milieu aquatique."
    it: "Poké Ball un po’ diversa. Risulta particolarmente\nefficace sui Pokémon che vivono in acqua."
    de: "Ein Ball, mit dem sich Pokémon, die auf oder im Wasser\nleben, leichter fangen lassen."
    es: "Poké Ball algo distinta a las demás que funciona\nespecialmente bien con los Pokémon que viven en\nel agua."
    ko: "물의 세계에서 사는\n포켓몬을 잡기 쉬운\n조금 특이한 볼."
    zh_simp: "有点与众不同的球。\n能很容易地捕捉\n生活在水世界里的宝可梦。"
    zh_trad: "有點與眾不同的球。\n能更容易地捉到\n生活在水中世界的寶可夢。"
lustrous_globe:
  names:
    jp_kana: だいしらたま
    jp_kanji: だいしらたま
    en: Lustrous Globe
    fr: Globe Perlé
    it: Splendisferoide
    de: Weißkristall
    es: Gran Lustresfera
    ko: 큰백옥
    zh_simp: 大白宝玉
    zh_trad: 大白寶玉
  descriptions:
    jp_kana: "パルキアに　持たせると\n力がみなぎり　姿が変わる\n光り輝く　大きな珠。"
    jp_kanji: "パルキアに　持たせると\n力がみなぎり　姿が変わる\n光り輝く　大きな珠。"
    en: "An item to be held by Palkia. This large, glowing orb\nwells with power and allows the Pokémon to change\nform."
    fr: "Cette grande sphère brillante débordant de puissance\npermet à Palkia de changer de forme quand\ncelui-ci la tient."
    it: "Grande cristallo scintillante che, se dato a Palkia,\nlo riempie di energia e gli permette di cambiare forma."
    de: "Ein Item, das von Palkia getragen werden kann.\nDurch diesen großen, funkelnden Kristall wird es von\nKraft erfüllt und nimmt eine andere Form an."
    es: "Gema brillante de gran tamaño que, cuando la lleva\nPalkia, lo imbuye de poder y le permite cambiar de\nforma."
    ko: "눈부시게 빛나는 큰 구슬.\n펄기아에게 지니게 하면\n힘이 넘쳐서 모습이 바뀐다."
    zh_simp: "光辉灿烂的大珠子。\n让帕路奇亚携带后，\n能使之力量高涨并改变形态。"
    zh_trad: "光輝燦爛的大珠子。\n讓帕路奇亞攜帶的話，\n能使之力量高漲並改變形態。"
lustrous_orb:
  names:
    jp_kana: しらたま
    jp_kanji: しらたま
    en: Lustrous Orb
    fr: Orbe Perlé
    it: Splendisfera
    de: Weiß-Orb
    es: Lustresfera
    ko: 백옥
    zh_simp: 白玉宝珠
    zh_trad: 白玉寶珠
  descriptions:
    jp_kana: "パルキアに　持たせると　ドラゴンと\nみずタイプの　技の威力が\nあがる　美しく輝く　珠。"
    jp_kanji: "パルキアに　持たせると　ドラゴンと\nみずタイプの　技の威力が\nあがる　美しく輝く　珠。"
    en: "A beautifully shining gem to be held by Palkia. It boosts\nthe power of Palkia’s Dragon- and Water-type moves."
    fr: "Un bel orbe luisant qui augmente la puissance\ndes capacités de types Dragon et Eau\ns’il est porté par Palkia."
    it: "Sfera splendente da dare a Palkia.\nPotenzia le mosse di tipo Drago e Acqua."
    de: "Ein Item, das von Palkia getragen werden kann.\nDieser schön leuchtende Orb verstärkt Attacken vom\nTyp Drache und Wasser."
    es: "Una bonita esfera que potencia los movimientos de tipo\nDragón y Agua. Debe llevarla Palkia."
    ko: "펄기아에게 지니게 하면 드래곤과\n물타입 기술의 위력이 올라가는\n아름답게 반짝이는 구슬."
    zh_simp: "让帕路奇亚携带的话，\n龙和水属性的招式威力就会提高。\n散发着美丽光辉的宝珠。"
    zh_trad: "讓帕路奇亞攜帶的話，\n龍和水屬性的招式威力就會提高。\n散發著美麗光輝的寶珠。"
luvdisc_scales:
  names:
    jp_kana: ラブカスのウロコ
    jp_kanji: ラブカスのウロコ
    en: Luvdisc Scales
    fr: Écaille de Lovdisc
    it: Squama di Luvdisc
    de: Liebiskus-Schuppe
    es: Escama de Luvdisc
    ko: 사랑동이의비늘
    zh_simp: 爱心鱼的鳞片
    zh_trad: 愛心魚的鱗片
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
luxury_ball:
  names:
    jp_kana: ゴージャスボール
    jp_kanji: ゴージャスボール
    en: Luxury Ball
    fr: Luxe Ball
    it: Chic Ball
    de: Luxusball
    es: Lujo Ball
    ko: 럭셔리볼
    zh_simp: 豪华球
    zh_trad: 豪華球
  descriptions:
    jp_kana: "捕まえた　野生ポケモンが\nとてもなかよく　なりやすくなる\nいごこちのいい　ボール。"
    jp_kanji: "捕まえた　野生ポケモンが\nとてもなかよく　なりやすくなる\nいごこちのいい　ボール。"
    en: "A particularly comfortable Poké Ball that makes a wild\nPokémon quickly grow friendlier after being caught."
    fr: "Une Poké Ball pratique qui permet de gagner\nrapidement l’amitié d’un Pokémon sauvage attrapé."
    it: "Poké Ball accogliente che aumenta il livello di amicizia\ndei Pokémon selvatici catturati."
    de: "Ein behaglicher Ball, der wilde Pokémon veranlasst,\nnach dem Fang schneller zutraulich zu werden."
    es: "Poké Ball acogedora que hace que los Pokémon\nsalvajes capturados se vuelvan amistosos más\nrápido."
    ko: "잡은 야생 포켓몬이\n매우 친밀해지기 쉬운\n편안한 볼."
    zh_simp: "舒适宜居的球。\n捉到的野生宝可梦会\n变得非常容易和训练家亲密。"
    zh_trad: "住起來十分舒適的球。\n捉到的野生寶可夢會\n非常容易和訓練家變得友好。"
lycanium_z:bag:
  names:
    jp_kana: ルガルガンＺ
    jp_kanji: ルガルガンＺ
    en: Lycanium Z
    fr: Lougarozélite
    it: Lycanrochium Z
    de: Wolwerockium Z
    es: Lycanrostal Z
    ko: 루가루암Z
    zh_simp: 鬃岩狼人Ｚ
    zh_trad: 鬃岩狼人Ｚ
  descriptions:
    jp_kana: "ルガルガンの　ストーンエッジを\nＺワザに　グレードアップする\nＺパワーの　結晶を　つくりだす。"
    jp_kanji: "ルガルガンの　ストーンエッジを\nＺワザに　グレードアップする\nＺパワーの　結晶を　つくりだす。"
    en: "It converts Z-Power into crystals that upgrade\nLycanroc’s Stone Edge to a Z-Move."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise le Lougaroc qui le tient à transformer\nsa capacité Lame de Roc en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono a Lycanroc di trasformare la mossa\nPietrataglio in una mossa Z."
    de: "Kristallisierte Z-Kraft, die Wolwerocks Attacke\nSteinkante zu einer Z-Attacke aufstuft. Wird bei Bedarf\nautomatisch vervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a\nLycanroc convertir su Roca Afilada en un movimiento Z."
    ko: "루가루암의 스톤에지를\nZ기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将鬃岩狼人的尖石攻击\n升级成Ｚ招式的Ｚ力量结晶。"
    zh_trad: "可用來製造將\n鬃岩狼人的尖石攻擊\n升級為Ｚ招式的Ｚ力量結晶。"
lycanium_z:held:
  names:
    jp_kana: ルガルガンＺ
    jp_kanji: ルガルガンＺ
    en: Lycanium Z
    fr: Lougarozélite
    it: Lycanrochium Z
    de: Wolwerockium Z
    es: Lycanrostal Z
    ko: 루가루암Z
    zh_simp: 鬃岩狼人Ｚ
    zh_trad: 鬃岩狼人Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　結晶。\nルガルガンの　ストーンエッジを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nルガルガンの　ストーンエッジを\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Lycanroc’s Stone Edge to a Z-Move."
    fr: "Une cristallisation de la Force Z, permettant\nde transformer la capacité Lame de Roc d’un Lougaroc\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare la mossa Pietrataglio\ndi Lycanroc in una mossa Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft Wolwerocks\nAttacke Steinkante zu einer Z-Attacke auf."
    es: "Cristal que confiere el Poder Z al movimiento Roca\nAfilada de Lycanroc."
    ko: "Z파워의 결정.\n루가루암의 스톤에지를\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将鬃岩狼人的尖石攻击\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n可將鬃岩狼人的尖石攻擊\n升級為Ｚ招式。"
mach_bike:
  names:
    jp_kana: マッハじてんしゃ
    jp_kanji: マッハじてんしゃ
    en: Mach Bike
    fr: Vélo de Course
    it: Bici da corsa
    de: Eilrad
    es: Bici de Carreras
    ko: 마하자전거
    zh_simp: 音速自行车
    zh_trad: 音速自行車
  descriptions:
    jp_kana: "２倍　以上の\n速さで　移動できる\nおりたたみの　自転車。"
    jp_kanji: "２倍　以上の\n速さで　移動できる\nおりたたみの　自転車。"
    en: "This folding bike more than doubles your\nmovement speed."
    fr: "Un vélo pliable qui roule jusqu’à deux fois plus vite\nqu’une bicyclette ordinaire."
    it: "Bici pieghevole che permette di spostarsi al doppio\ndella velocità normale."
    de: "Ein Klapprad, mit dem du dich doppelt so schnell\nfortbewegen kannst wie gewöhnlich."
    es: "Bicicleta plegable que va a más del doble de velocidad\nque otras."
    ko: "2배 이상의\n스피드로 이동할 수 있는\n접이식 자전거다."
    zh_simp: "能以２倍以上的速度移动的\n折叠式自行车。"
    zh_trad: "能以２倍以上速度移動的\n折疊式自行車。"
machine_part:
  names:
    jp_kana: きかいのぶひん
    jp_kanji: きかいのぶひん
    en: Machine Part
    fr: Partie Machine
    it: Pezzo di macchinario
    de: Spule
    es: Maquinaria
    ko: 기계부품
    zh_simp: 机械零件
    zh_trad: 機械零件
  descriptions:
    jp_kana: "発電所から　ぬすまれた\n発電機の　たいせつな　部品。"
    jp_kanji: "発電所から　ぬすまれた\n発電機の　たいせつな　部品。"
    en: "An important part of a machine that was stolen from the\nPower Plant."
    fr: Une pièce essentielle du générateur de la Centrale.
    it: "Pezzo rubato alla Centrale Elettrica, essenziale\nper il generatore."
    de: "Ein unentbehrliches Maschinenteil, das aus dem\nKraftwerk entwendet wurde."
    es: "Valiosa pieza robada de una máquina de la Central\nEnergía."
    ko: "발전소에서 도둑맞은\n발전기의 중요한 부품."
    zh_simp: "发电厂里被盗的，\n用于发电机的重要零件。"
    zh_trad: "被人從發電廠裡偷走的\n發電機的重要零件。"
macho_brace:
  names:
    jp_kana: きょうせいギプス
    jp_kanji: きょうせいギプス
    en: Macho Brace
    fr: Bracelet Macho
    it: Crescicappa
    de: Machoschiene
    es: Brazal Firme
    ko: 교정깁스
    zh_simp: 强制锻炼器
    zh_trad: 強制鍛鍊器
  descriptions:
    jp_kana: "硬くて　重い　ギプス。\n持たせると　バトル中の　素早さは　さがるが\nふつうより　強く　育ちやすい。"
    jp_kanji: "硬くて　重い　ギプス。\n持たせると　バトル中の　素早さは　さがるが\nふつうより　強く　育ちやすい。"
    en: "An item to be held by a Pokémon. Holding this stiff,\nheavy brace reduces a Pokémon’s Speed in battle but\nallows its stats to grow more quickly."
    fr: "Objet à tenir. Un bracelet dur et lourd qui permet\nau porteur de progresser plus vite, mais qui réduit\nsa Vitesse pendant le combat."
    it: "Strumento da dare a un Pokémon. Attrezzo pesante\nche riduce la Velocità nella lotta ma aiuta la crescita\ndelle statistiche."
    de: "Ein Item zum Tragen. Diese harte und schwere Schiene\nsenkt während des Kampfes die Initiative, lässt dafür aber\nden Träger nach dem Kampf schneller stärker werden."
    es: "Sólido y pesado brazal que reduce la Velocidad en\ncombate, pero permite que las características aumenten\nmás rápidamente. Debe llevarlo un Pokémon."
    ko: "단단하고 무거운 깁스.\n지니게 하면 배틀 중 스피드는 떨어지지만\n여느 때보다 강하게 키우기 쉽다."
    zh_simp: "又硬又重的锻炼器。\n虽然携带后对战时的速度会降低，\n但会比平时更容易茁壮成长。"
    zh_trad: "又硬又重的鍛鍊器。\n雖然攜帶後對戰時的速度會降低，\n但會比平時更容易茁壯成長。"
machop_candy:
  names:
    jp_kana: ワンリキーのアメ
    jp_kanji: ワンリキーのアメ
    en: Machop Candy
    fr: Bonbon Machoc
    it: Caramella Machop
    de: Machollo-Bonbon
    es: Caramelo Machop
    ko: 알통몬의사탕
    zh_simp: 腕力的糖果
    zh_trad: 腕力的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
magby_hair:
  names:
    jp_kana: ブビィのけ
    jp_kanji: ブビィのけ
    en: Magby Hair
    fr: Poils de Magby
    it: Pelo di Magby
    de: Magby-Haar
    es: Pelo de Magby
    ko: 마그비의털
    zh_simp: 鸭嘴宝宝的毛
    zh_trad: 鴨嘴寶寶的毛
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
magical_heart_pick:
  names:
    jp_kana: マジカルハートピック
    jp_kanji: マジカルハートピック
    en: Magical Heart Pick
    fr: Pique Cœur Magique
    it: Stecchino magicuore
    de: Zauberherz-Pikser
    es: Palillo Corazón
    ko: 매지컬 하트 픽
    zh_simp: 魔法甜心三明治签
    zh_trad: 魔法甜心三明治籤
  descriptions:
    jp_kana: "魔法のステッキ型の　ピック。　お弁当を\n作った人の　おいしくなあれ　という\n気持ちこそが　魔法なのかもしれない。"
    jp_kanji: "魔法のステッキ型の　ピック。　お弁当を\n作った人の　おいしくなあれ　という\n気持ちこそが　魔法なのかもしれない。"
    en: "A pick shaped after a magic wand. Perhaps the real\nmagic is the food maker’s wish for a delicious dish."
    fr: "Une pique en forme de baguette magique. Peut-être que\nce qu’il y a de magique là-dedans, c’est de mettre tout\nson cœur à préparer un bon repas pour ses amis ?"
    it: "Stecchino a forma di bacchetta magica. Forse la vera\nmagia la fa la cura che ci mette chi prepara il panino."
    de: "Ein Pikser in Form eines Zauberstabs. Vielleicht liegt die\nwahre Magie in der Hingabe, die in die Zubereitung\neines derart verzierten Gerichts gesteckt wurde."
    es: "Tiene forma de báculo mágico, lo que podría explicar\npor qué las comidas en las que se ensarta siempre salen\nbuenísimas."
    ko: "요술봉 모양의 픽. 맛있게 먹어 줬으면 하는\n도시락을 만든 사람의 마음이야말로\n진정한 요술일지도 모른다."
    zh_simp: "魔法棒形的签子。制作便当的人\n那希望做得好吃的心愿或许就是魔法。"
    zh_trad: "以魔法杖為造型的小籤。\n製作便當的人想做出美味佳餚的心念\n說不定才是真正的魔法。"
magical_star_pick:
  names:
    jp_kana: マジカルスターピック
    jp_kanji: マジカルスターピック
    en: Magical Star Pick
    fr: Pique Étoile Magique
    it: Stecchino magistella
    de: Zauberstern-Pikser
    es: Palillo Estrella
    ko: 매지컬 스타 픽
    zh_simp: 魔法星星三明治签
    zh_trad: 魔法星星三明治籤
  descriptions:
    jp_kana: "魔法のステッキ型の　ピック。　お弁当を\n作った人の　おいしくなあれ　という\n気持ちこそが　魔法なのかもしれない。"
    jp_kanji: "魔法のステッキ型の　ピック。　お弁当を\n作った人の　おいしくなあれ　という\n気持ちこそが　魔法なのかもしれない。"
    en: "A pick shaped after a magic wand. Perhaps the real\nmagic is the food maker’s wish for a delicious dish."
    fr: "Une pique en forme de baguette magique. Peut-être que\nce qu’il y a de magique là-dedans, c’est de mettre tout\nson cœur à préparer un bon repas pour ses amis ?"
    it: "Stecchino a forma di bacchetta magica. Forse la vera\nmagia la fa la cura che ci mette chi prepara il panino."
    de: "Ein Pikser in Form eines Zauberstabs. Vielleicht liegt die\nwahre Magie in der Hingabe, die in die Zubereitung\neines derart verzierten Gerichts gesteckt wurde."
    es: "Tiene forma de báculo mágico, lo que podría explicar\npor qué las comidas en las que se ensarta siempre salen\nbuenísimas."
    ko: "요술봉 모양의 픽. 맛있게 먹어 줬으면 하는\n도시락을 만든 사람의 마음이야말로\n진정한 요술일지도 모른다."
    zh_simp: "魔法棒形的签子。制作便当的人\n那希望做得好吃的心愿或许就是魔法。"
    zh_trad: "以魔法杖為造型的小籤。\n製作便當的人想做出美味佳餚的心念\n說不定才是真正的魔法。"
magikarp_candy:
  names:
    jp_kana: コイキングのアメ
    jp_kanji: コイキングのアメ
    en: Magikarp Candy
    fr: Bonbon Magicarpe
    it: Caramella Magikarp
    de: Karpador-Bonbon
    es: Caramelo Magikarp
    ko: 잉어킹의사탕
    zh_simp: 鲤鱼王的糖果
    zh_trad: 鯉魚王的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
magikarp_scales:
  names:
    jp_kana: コイキングのウロコ
    jp_kanji: コイキングのウロコ
