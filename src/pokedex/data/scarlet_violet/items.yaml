    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Lahmus getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Slowbro en combate."
    ko: "야도란에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
