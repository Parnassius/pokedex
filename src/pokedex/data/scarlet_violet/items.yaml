origin_ball:
  names:
    jp_kana: オリジンボール
    jp_kanji: オリジンボール
    en: Origin Ball
    fr: Origine Ball
    it: Origin Ball
    de: Urball
    es: Origen Ball
    ko: 오리진볼
    zh_simp: 起源球
    zh_trad: 起源球
  descriptions:
    jp_kana: "シンオウ神殿で荒ぶるポケモンを\n捕らえることができる唯一無二の\n特殊なモンスターボール。"
    jp_kanji: "シンオウ神殿で荒ぶるポケモンを\n捕らえることができる唯一無二の\n特殊なモンスターボール。"
    en: "A singular and irreplicable Poké Ball that can be used\nto catch the frenzied Pokémon raging at the Temple\nof Sinnoh."
    fr: "Une Poké Ball singulière et unique qui permet d’attraper\nle Pokémon pris de frénésie au Temple de Sinnoh."
    it: "Poké Ball unica al mondo con cui è possibile catturare\nil Pokémon in collera al Tempio di Sinnoh."
    de: "Mit diesem einzigartigen und besonderen Ball kannst\ndu das Pokémon fangen, das im Sinnoh-Tempel\nherumwütet."
    es: "Poké Ball única y especial que permite capturar al\nPokémon furioso del Templo de Sinnoh."
    ko: "신오신전에서 폭주하는 포켓몬을 잡을 수 있는\n유일무이하면서도 특수한 몬스터볼."
    zh_simp: "独一无二的特殊精灵球。\n能够捕捉在神奥神殿\n狂暴大闹的宝可梦。"
    zh_trad: "獨一無二的特殊精靈球。\n能夠捕捉在神奧神殿\n狂暴大鬧的寶可夢。"
origin_ore:
  names:
    jp_kana: オリジンこうせき
    jp_kanji: オリジンこうせき
    en: Origin Ore
    fr: Minerai Origine
    it: Rocciorigine
    de: Urerz
    es: Mena Origen
    ko: 오리진광석
    zh_simp: 起源矿石
    zh_trad: 起源礦石
  descriptions:
    jp_kana: "シンオウさまの力を宿すと\n神話に伝えられている\n不思議な力を秘めた鉱石。"
    jp_kanji: "シンオウさまの力を宿すと\n神話に伝えられている\n不思議な力を秘めた鉱石。"
    en: "An ore of mysterious power, spoken of in ancient myths\nand said to contain the power of almighty Sinnoh itself."
    fr: "Un minerai abritant une force mystérieuse.\nLes légendes racontent qu’il renfermerait\nle pouvoir du Grand Sinnoh lui-même."
    it: "Minerale che cela un potere misterioso appartenente,\nsecondo le leggende, al Sommo Sinnoh."
    de: "Dieses Erz birgt eine mysteriöse Energie. Legenden\nzufolge wohnt ihm die Kraft des Ehrwürdigen Sinnoh\ninne."
    es: "Mineral imbuido de una misteriosa energía que, según\nuna antigua leyenda, contiene el poder del mismísimo\nGran Sinnoh."
    ko: "신오님의 힘이 깃들어 있다고\n신화 속에서 전해 내려오는\n신비한 힘을 가진 광석."
    zh_simp: "有着不可思议力量的矿石。\n世间流传着此物蕴含有\n神奥大尊之力的神话。"
    zh_trad: "有著不可思議力量的礦石。\n世間流傳著此物蘊含有\n神奧大尊之力的神話。"
orthworm_tarnish:
  names:
    jp_kana: ミミズズのさび
    jp_kanji: ミミズズのさび
