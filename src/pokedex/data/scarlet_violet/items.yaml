    it: "Strumento da dare a un Pokémon. È tremendamente\npesante e rende più lenti del normale."
    de: "Ein Item zum Tragen. Es ist immens schwer und lässt\nden Träger langsamer agieren."
    es: "Es muy pesada y hace que el Pokémon que la lleva se\nmueva más lento de lo normal."
    ko: "매우 무거운 무언가의 꼬리.\n지니게 하면 여느 때보다\n행동이 느려진다."
    zh_simp: "非常沉重的某种尾巴。\n携带后，行动会比平时更加迟缓。"
    zh_trad: "非常沉重的某種尾巴。\n攜帶後，行動會比\n平時更加緩慢。"
lansat_berry:
  names:
    jp_kana: サンのみ
    jp_kanji: サンのみ
    en: Lansat Berry
    fr: Baie Lansat
    it: Baccalangsa
    de: Lansatbeere
    es: Baya Zonlan
    ko: 랑사열매
    zh_simp: 兰萨果
    zh_trad: 蘭薩果
  descriptions:
    jp_kana: "ポケモンに　持たせると\nピンチのとき　攻撃が\n急所に　当たりやすくなる。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　攻撃が\n急所に　当たりやすくなる。"
    en: "If a Pokémon holds one of these Berries, its critical-hit\nratio will be boosted should it find itself in a pinch."
    fr: "Tenue, cette Baie augmente le taux de critiques\nen cas de besoin."
    it: "Se il Pokémon che ha questa bacca si trova in difficoltà,\nla probabilità di sferrare brutti colpi aumenta."
    de: "Als getragenes Item erhöht diese Beere die\nVolltrefferquote des Pokémon, sobald es in einer\nNotlage steckt."
    es: "Si la lleva un Pokémon, le aumenta la probabilidad de\nasestar un golpe crítico en un momento de apuro."
    ko: "포켓몬에게 지니게 하면\n위급할 때 공격이\n급소를 맞히기 쉬워진다."
    zh_simp: "让宝可梦携带后，危机时，\n攻击会变得容易击中要害。"
    zh_trad: "讓寶可夢攜帶後，\n危機時，攻擊會變得\n容易擊中要害。"
lapras_candy:
  names:
    jp_kana: ラプラスのアメ
    jp_kanji: ラプラスのアメ
    en: Lapras Candy
    fr: Bonbon Lokhlass
    it: Caramella Lapras
    de: Lapras-Bonbon
    es: Caramelo Lapras
    ko: 라프라스의사탕
    zh_simp: 拉普拉斯的糖果
    zh_trad: 拉普拉斯的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt. Erhöht dauerhaft\nsämtliche Statuswerte eines bestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de cierto Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
lapras_teardrop:
  names:
    jp_kana: ラプラスのなみだ
    jp_kanji: ラプラスのなみだ
    en: Lapras Teardrop
    fr: Larme de Lokhlass
    it: Lacrime di Lapras
    de: Lapras-Träne
    es: Lágrima de Lapras
    ko: 라프라스의눈물
    zh_simp: 拉普拉斯的眼泪
    zh_trad: 拉普拉斯的眼淚
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
large_leek:
  names:
    jp_kana: ふといながねぎ
    jp_kanji: ふといながねぎ
    en: Large Leek
    fr: Gros Poireau
    it: Grosso porro
    de: Dicker Lauch
    es: Puerro Grueso
    ko: 굵은대파
    zh_simp: 粗枝大葱
    zh_trad: 粗枝大蔥
  descriptions:
    jp_kana: "キャンプの　料理に　使う\n食材の　一種。ポケモン　カモネギが\n好む　植物の　クキなのかは　謎。"
    jp_kanji: "キャンプの　料理に　使う\n食材の　一種。ポケモン　カモネギが\n好む　植物の　クキなのかは　謎。"
    en: "One of the many ingredients that can be used for\ncooking at your camp. Whether this is the kind of\nvegetable stalk that Farfetch’d like is unknown."
    fr: "Un ingrédient de cuisine pour le camping.\nOn ignore s’il s’agit de la variété que les Canarticho\naffectionnent tant."
    it: "Uno degli ingredienti che puoi usare per cucinare\nin campeggio. Nessuno sa se questo sia lo stesso\ntipo di gambo che piace tanto ai Farfetch’d."
    de: "Eine Zutat für PokéCamping-Mahlzeiten. Es ist unklar,\nob es dieselbe Sorte Lauch ist, die bei Porenta so hoch\nim Kurs steht."
    es: "Un ingrediente para cocinar en el campamento. No se\nsabe si este es el tipo de verdura que le gusta a\nFarfetch’d."
    ko: "캠프 요리에 사용되는\n식재료 중 하나. 포켓몬 파오리가\n좋아하는 식물의 줄기인지는 불명이다."
    zh_simp: "在露营营地制作料理时会使用的\n一种食材。不知是不是宝可梦\n大葱鸭最爱的那种植物的茎。"
    zh_trad: "製作露營料理時使用的食材之一。\n不知道是不是寶可夢大蔥鴨\n所喜愛的那種植物的莖。"
larvesta_fuzz:
  names:
    jp_kana: メラルバのけ
    jp_kanji: メラルバのけ
    en: Larvesta Fuzz
    fr: Poils de Pyronille
    it: Pelo di Larvesta
    de: Ignivor-Haar
    es: Pelo de Larvesta
    ko: 활화르바의털
    zh_simp: 燃烧虫的毛
    zh_trad: 燃燒蟲的毛
