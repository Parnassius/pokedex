damp_mulch:
  names:
    jp_kana: じめじめこやし
    jp_kanji: じめじめこやし
    en: Damp Mulch
    fr: Fertihumide
    it: Fertilidro
    de: Feuchtmulch
    es: Abono Lento
    ko: 축축이비료
    zh_simp: 湿湿肥
    zh_trad: 濕濕肥
  descriptions:
    jp_kana: "きのみを　育てるときの　肥料。\nしかし　ホウエン地方の　土には\nまるで　なじまないので　効果が　ない。"
    jp_kanji: "きのみを　育てるときの　肥料。\nしかし　ホウエン地方の　土には\nまるで　なじまないので　効果が　ない。"
    en: "A fertilizer for growing Berries. However, it appears\nto be unsuitable for the soil in the Hoenn region and\nhas no effect."
    fr: "Un engrais à utiliser sur un sol meuble.\nIl n’est cependant pas adapté aux terres de Hoenn\net n’y a aucun effet."
    it: "Fertilizzante usato per coltivare le bacche. Tuttavia,\nnon ha effetto a Hoenn, perché non è adatto al terreno\ndella regione."
    de: "Mulch zur Nutzung auf Beerenfeldern. Durch seine\nUnverträglichkeit mit den Böden in Hoenn bleibt sein\nEinsatz dort ohne Wirkung."
    es: "Un fertilizante usado para el cultivo de bayas. Parece\nque no se asienta bien en el suelo de Hoenn, por lo\nque no tiene efecto en esta región."
    ko: "나무열매를 키울 때 사용하는 비료.\n그러나 호연지방의 흙에는\n전혀 맞지 않기에 효과가 없다."
    zh_simp: "培育树果时的肥料。\n但完全不适合丰缘地区的土壤，\n所以没什么效果。"
    zh_trad: "培育樹果時的肥料。\n但完全不適合豐緣地區的土壤，\n所以沒什麼效果。"
damp_rock:
  names:
    jp_kana: しめったいわ
    jp_kanji: しめったいわ
    en: Damp Rock
    fr: Roche Humide
    it: Rocciaumida
    de: Nassbrocken
    es: Roca Lluvia
    ko: 축축한바위
    zh_simp: 潮湿岩石
    zh_trad: 潮濕岩石
  descriptions:
    jp_kana: "持たせた　ポケモンが\n天気を　あめにすると　いつもより\nあめの時間が　長くなる。"
    jp_kanji: "持たせた　ポケモンが\n天気を　あめにすると　いつもより\nあめの時間が　長くなる。"
    en: "An item to be held by a Pokémon. When the holder\nchanges the weather to rain, the rain will persist for\nlonger than usual."
    fr: "Objet à tenir. Prolonge la durée de la pluie\nquand elle est déclenchée par le porteur."
    it: "Allunga la durata della piogga provocata dal Pokémon\nche ha questo strumento."
    de: "Ein Item zum Tragen. Verlängert die Dauer von\nRegen, den der Träger verursacht."
    es: "Prolonga la duración de la lluvia provocada por el\nPokémon que la lleva."
    ko: "지니게 한 포켓몬이\n날씨를 비로 만들면 여느 때보다\n비의 지속 시간이 길어진다."
    zh_simp: "携带它的宝可梦将天气变为下雨的话，\n下雨的时间就会比平时更长。"
    zh_trad: "攜帶它的寶可夢\n將天氣變為下雨的話，\n下雨的時間就會比平時更長。"
dark_gem:
  names:
    jp_kana: あくのジュエル
    jp_kanji: あくのジュエル
    en: Dark Gem
    fr: Joyau Ténèbres
    it: Bijoubuio
    de: Unlichtjuwel
    es: Gema Siniestro
    ko: 악주얼
    zh_simp: 恶之宝石
    zh_trad: 惡之寶石
  descriptions:
    jp_kana: "あくのタイプの　ジュエル。\n持たせると　１度だけ　あくの\n技の威力が　強まる。"
    jp_kanji: "あくのタイプの　ジュエル。\n持たせると　１度だけ　あくの\n技の威力が　強まる。"
    en: "An item to be held by a Pokémon. This gem is imbued\nwith the essence of darkness and will boost the power\nof a Dark-type move—but only once."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Ténèbres."
    it: "Strumento da dare a un Pokémon. Gioiello che potenzia\nuna sola volta le mosse di tipo Buio."
    de: "Ein Item zum Tragen. Dieses Juwel verstärkt einmalig\neine Attacke vom Typ Unlicht."
    es: "Joya de un solo uso que potencia un movimiento de\ntipo Siniestro. Debe llevarla un Pokémon."
    ko: "악타입의 주얼.\n지니게 하면 한 번만 악\n기술의 위력이 강해진다."
    zh_simp: "恶属性的宝石。\n携带后，恶属性的\n招式威力仅会增强１次。"
    zh_trad: "惡屬性的寶石。\n攜帶後，惡屬性招式的\n威力會僅增強１次。"
dark_memory:
  names:
    jp_kana: ダークメモリ
    jp_kanji: ダークメモリ
    en: Dark Memory
    fr: ROM Ténèbres
    it: ROM Buio
    de: Unlicht-Disc
    es: Disco Siniestro
    ko: 다크메모리
    zh_simp: 黑暗存储碟
    zh_trad: 黑暗記憶碟
  descriptions:
    jp_kana: "あくタイプの　データが　入った\nメモリ。　特定のポケモンが　持つと\nタイプが　変わる。"
    jp_kanji: "あくタイプの　データが　入った\nメモリ。　特定のポケモンが　持つと\nタイプが　変わる。"
    en: "A memory disc that contains Dark-type data.\nIt changes the type of the holder if held by\na certain species of Pokémon."
    fr: "Une carte mémoire contenant des données sur\nle type Ténèbres. Un certain Pokémon peut changer\nde type en l’équipant."
    it: "ROM contenente dati sul tipo Buio in formato digitale.\nPermette a un certo Pokémon di cambiare tipo."
    de: "Eine Disc mit Daten zum Typ Unlicht. Sie löst bei einem\nbestimmten Pokémon einen Typenwechsel aus."
    es: "Disco de datos que contiene información relativa al tipo\nSiniestro. Permite cambiar de tipo a cierto Pokémon."
    ko: "악타입의 데이터가 들어 있는\n메모리. 특정 포켓몬이\n지니면 타입이 바뀐다."
    zh_simp: "装有恶属性数据的存储碟。\n特定宝可梦携带后，\n属性就会发生变化。"
    zh_trad: "裝有惡屬性資料的記憶碟。\n特定寶可夢攜帶後，\n就會產生屬性的變化。"
dark_stone:
  names:
    jp_kana: ダークストーン
    jp_kanji: ダークストーン
    en: Dark Stone
    fr: Galet Noir
    it: Scurolite
    de: Dunkelstein
    es: Orbe Oscuro
    ko: 다크스톤
    zh_simp: 黑暗石
    zh_trad: 黑闇石
  descriptions:
    jp_kana: "ゼクロムの肉体が　滅び\n変化した姿。　英雄の\n登場を　待っていると　される。"
    jp_kanji: "ゼクロムの肉体が　滅び\n変化した姿。　英雄の\n登場を　待っていると　される。"
    en: "Zekrom’s body was destroyed and changed into\nthis stone. It is said to be waiting for the\nemergence of a hero."
    fr: "Ce sont les derniers restes du corps de Zekrom.\nOn dit qu’ils attendent l’apparition d’un héros."
    it: "Pietra in cui si è tramutato Zekrom quando ha perso\nla sua forma corporea. Attende la venuta di un eroe."
    de: "Nach dem Zerfall seines Körpers nahm Zekrom diese\nGestalt an. Man sagt, es warte auf die Ankunft eines\nHelden."
    es: "Forma que adoptó Zekrom al perder su cuerpo.\nEspera la llegada de un nuevo héroe."
    ko: "제크로무의 육체가 허물어져\n변화한 모습. 영웅의\n등장을 기다린다고 여겨진다."
    zh_simp: "捷克罗姆的肉体\n毁灭后变成的样子。\n据说它在等待着英雄的到来。"
    zh_trad: "捷克羅姆的肉體\n毀滅後變成的樣子。\n據說它在等待著英雄的到來。"
dark_tera_shard:
  names:
    jp_kana: テラピースあく
    jp_kanji: テラピースあく
    en: Dark Tera Shard
    fr: Téra-Éclat Ténèbres
    it: Teralite Buio
    de: Tera-Stück (Unlicht)
    es: Teralito Siniestro
    ko: 테라피스 악
    zh_simp: 恶太晶碎块
    zh_trad: 惡太晶碎塊
  descriptions:
    jp_kana: "テラスタルポケモンが　倒れたとき\n砕けた　テラスタルジュエルが\nまれに　結晶化したもの。"
    jp_kanji: "テラスタルポケモンが　倒れたとき\n砕けた　テラスタルジュエルが\nまれに　結晶化したもの。"
    en: "On rare occasions, these shards form when a Tera\nPokémon falls in battle and its Tera Jewel shatters."
    fr: "Un fragment cristallisé qui se forme rarement lors\nde l’éclatement d’un Joyau Téracristal après qu’un\nPokémon Téracristal a été mis K.O."
    it: "Cristallizzazione che raramente si forma quando\nun Pokémon Teracristal viene sconfitto e la sua gemma\nTeracristal va in frantumi."
    de: "In äußerst seltenen Fällen kristallisieren Bruchstücke\ndes Terakristalls von im Kampf besiegten Terakristall-\nPokémon zu solchen Tera-Stücken."
    es: "Esquirla que se forma muy raramente cuando la joya\nTeracristal de un Pokémon teracristalizado se quiebra\ntras derrotarlo."
    ko: "테라스탈 포켓몬이 쓰러졌을 때\n부서진 테라스탈 주얼이\n드물게 결정화한 조각."
    zh_simp: "打倒太晶宝可梦时，\n破碎掉的太晶宝石有\n极低概率会结晶成此物。"
    zh_trad: "太晶寶可夢倒下時，\n碎裂的太晶寶石在罕見的情況下\n會結晶化，而形成此物。"
darkinium_z:bag:
  names:
    jp_kana: アクＺ
    jp_kanji: アクＺ
    en: Darkinium Z
    fr: Ténébrozélite
    it: Obscurium Z
    de: Noctium Z
    es: Nictostal Z
    ko: 악Z
    zh_simp: 恶Ｚ
    zh_trad: 惡Ｚ
  descriptions:
    jp_kana: "あくタイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    jp_kanji: "あくタイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nDark-type moves to Dark-type Z-Moves."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise son porteur à transformer ses capacités\nde type Ténèbres en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono ai Pokémon di trasformare le mosse\ndi tipo Buio in mosse Z."
    de: "Kristallisierte Z-Kraft, die Unlicht-Attacken zu\nZ-Attacken aufstuft. Wird bei Bedarf automatisch\nvervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a los\nportadores convertir sus movimientos de tipo Siniestro\nen movimientos Z."
    ko: "악타입 기술을\nZ기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将恶属性招式升级成\nＺ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把惡屬性招式\n升級為Ｚ招式的Ｚ力量結晶。"
darkinium_z:held:
  names:
    jp_kana: アクＺ
    jp_kanji: アクＺ
    en: Darkinium Z
    fr: Ténébrozélite
    it: Obscurium Z
    de: Noctium Z
    es: Nictostal Z
    ko: 악Z
    zh_simp: 恶Ｚ
    zh_trad: 惡Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　結晶。\nあくタイプの　技を\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nあくタイプの　技を\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Dark-type moves to Z-Moves."
    fr: "Une cristallisation de la Force Z, permettant\nde transformer les capacités de type Ténèbres\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare le mosse di tipo Buio\nin mosse Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt. Er stuft\nUnlicht-Attacken zu Z-Attacken auf."
    es: "Cristal que confiere el Poder Z a los movimientos\nde tipo Siniestro."
    ko: "Z파워의 결정.\n악타입 기술을\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将恶属性的招式\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把惡屬性的招式\n升級為Ｚ招式。"
data_card_01:
  names:
    jp_kana: データカード０１
    jp_kanji: データカード０１
    en: Data Card 01
    fr: Carte Mémo01
    it: Scheda dati 01
    de: Datenkarte01
    es: Tarjeta Datos 01
    ko: 데이터카드01
    zh_simp: 数据卡０１
    zh_trad: 資料卡０１
  descriptions:
    jp_kana: "ポケスロンの　記録が　はいっている。\n優勝　回数が\n記録された　カード。"
    jp_kanji: "ポケスロンの　記録が　はいっている。\n優勝　回数が\n記録された　カード。"
    en: "It holds Pokéathlon records. It is a card that shows how\nmany victories you have had in the Pokéathlon."
    fr: "Contient vos données du Pokéathlon.\nSur cette carte est inscrit votre nombre de victoires\nau Pokéathlon."
    it: "Contiene i tuoi dati Pokéathlon. Su questa Scheda\nè registrato il numero totale di vittorie."
    de: "Speichert deine Pokéathlon-Rekorde. Die Karte zeigt,\nwie oft du ein Turnier gewonnen hast."
    es: "Contiene los datos del Pokéathlon con el número de\nvictorias."
    ko: "포켓슬론의 기록이 들어 있다.\n우승 횟수가\n기록된 카드."
    zh_simp: "ー\nー\nー"
    zh_trad: "ー\nー\nー"
data_card_02:
  names:
    jp_kana: データカード０２
    jp_kanji: データカード０２
    en: Data Card 02
    fr: Carte Mémo02
    it: Scheda dati 02
    de: Datenkarte02
    es: Tarjeta Datos 02
    ko: 데이터카드02
    zh_simp: 数据卡０２
    zh_trad: 資料卡０２
  descriptions:
    jp_kana: "ポケスロンの　記録が　はいっている。\nビリになった　回数が\n記録された　カード。"
    jp_kanji: "ポケスロンの　記録が　はいっている。\nビリになった　回数が\n記録された　カード。"
    en: "It holds Pokéathlon records. It is a card that shows how\nmany losses you have had in the Pokéathlon."
    fr: "Contient vos données du Pokéathlon.\nSur cette carte est inscrit le nombre de fois\noù vous avez fini en dernier."
    it: "Contiene i tuoi dati Pokéathlon. Su questa Scheda\nè registrato il numero di ultimi posti."
    de: "Speichert deine Pokéathlon-Rekorde. Die Karte zeigt,\nwie oft du bei einem Turnier Letzter geworden bist."
    es: "Contiene los datos del Pokéathlon con el número de\nveces que se ha quedado en último lugar."
    ko: "포켓슬론의 기록이 들어 있다.\n꼴찌가 된 횟수가\n기록된 카드."
    zh_simp: "ー\nー\nー"
    zh_trad: "ー\nー\nー"
data_card_03:
  names:
    jp_kana: データカード０３
    jp_kanji: データカード０３
    en: Data Card 03
    fr: Carte Mémo03
    it: Scheda dati 03
    de: Datenkarte03
    es: Tarjeta Datos 03
    ko: 데이터카드03
    zh_simp: 数据卡０３
    zh_trad: 資料卡０３
  descriptions:
    jp_kana: "ポケスロンの　記録が　はいっている。\nポケモンの　ダッシュした　回数が\n記録された　カード。"
    jp_kanji: "ポケスロンの　記録が　はいっている。\nポケモンの　ダッシュした　回数が\n記録された　カード。"
    en: "It holds Pokéathlon records. It is a card that shows how\nmany times your Pokémon dashed in the Pokéathlon."
    fr: "Contient vos données du Pokéathlon.\nSur cette carte est inscrit le nombre de sprints\nde vos Pokémon."
    it: "Contiene i tuoi dati Pokéathlon. Su questa Scheda\nè registrato il numero di sprint dei tuoi Pokémon."
    de: "Speichert deine Pokéathlon-Rekorde. Die Karte zeigt,\nwie viele Sprints du schon hinter dir hast."
    es: "Contiene los datos del Pokéathlon con el número de\nsprints de los Pokémon."
    ko: "포켓슬론의 기록이 들어 있다.\n포켓몬이 대시한 횟수가\n기록된 카드."
    zh_simp: "ー\nー\nー"
    zh_trad: "ー\nー\nー"
data_card_04:
  names:
    jp_kana: データカード０４
    jp_kanji: データカード０４
    en: Data Card 04
    fr: Carte Mémo04
    it: Scheda dati 04
    de: Datenkarte04
    es: Tarjeta Datos 04
    ko: 데이터카드04
    zh_simp: 数据卡０４
    zh_trad: 資料卡０４
  descriptions:
    jp_kana: "ポケスロンの　記録が　はいっている。\nポケモンの　ジャンプした　回数が\n記録された　カード。"
    jp_kanji: "ポケスロンの　記録が　はいっている。\nポケモンの　ジャンプした　回数が\n記録された　カード。"
    en: "It holds Pokéathlon records. It is a card that shows how\nmany times your Pokémon jumped in the Pokéathlon."
    fr: "Contient vos données du Pokéathlon.\nSur cette carte est inscrit le nombre de sauts\nde vos Pokémon."
    it: "Contiene i tuoi dati Pokéathlon. Su questa Scheda\nè registrato il numero di salti dei tuoi Pokémon."
    de: "Speichert deine Pokéathlon-Rekorde. Die Karte zeigt,\nwie oft du gesprungen bist."
    es: "Contiene los datos del Pokéathlon con el número de\nsaltos de los Pokémon."
    ko: "포켓슬론의 기록이 들어 있다.\n포켓몬이 점프한 횟수가\n기록된 카드."
    zh_simp: "ー\nー\nー"
    zh_trad: "ー\nー\nー"
data_card_05:
  names:
    jp_kana: データカード０５
    jp_kanji: データカード０５
    en: Data Card 05
    fr: Carte Mémo05
    it: Scheda dati 05
    de: Datenkarte05
    es: Tarjeta Datos 05
    ko: 데이터카드05
    zh_simp: 数据卡０５
    zh_trad: 資料卡０５
  descriptions:
    jp_kana: "ポケスロンの　記録が　はいっている。\nダッシュハードル　１位　回数が\n記録された　カード。"
    jp_kanji: "ポケスロンの　記録が　はいっている。\nダッシュハードル　１位　回数が\n記録された　カード。"
    en: "It holds Pokéathlon records. It is a card that shows how\nmany times you won the Pokéathlon’s Hurdle Dash."
    fr: "Contient vos données du Pokéathlon.\nSur cette carte est inscrit le nombre de victoires\nà la Cours’Obstacles."
    it: "Contiene i tuoi dati Pokéathlon. Su questa Scheda\nè registrato il numero di vittorie a Corsostacoli."
    de: "Speichert deine Pokéathlon-Rekorde. Die Karte zeigt,\nwie oft du beim Hürdenlauf den 1. Platz belegt hast."
    es: "Contiene los datos del Pokéathlon con el número de\nvictorias en Saltaobstáculos."
    ko: "포켓슬론의 기록이 들어 있다.\n대시허들 1위 횟수가\n기록된 카드."
    zh_simp: "ー\nー\nー"
    zh_trad: "ー\nー\nー"
data_card_06:
  names:
    jp_kana: データカード０６
    jp_kanji: データカード０６
    en: Data Card 06
    fr: Carte Mémo06
    it: Scheda dati 06
    de: Datenkarte06
    es: Tarjeta Datos 06
    ko: 데이터카드06
    zh_simp: 数据卡０６
    zh_trad: 資料卡０６
  descriptions:
    jp_kana: "ポケスロンの　記録が　はいっている。\nチェンジリレー　１位　回数が\n記録された　カード。"
    jp_kanji: "ポケスロンの　記録が　はいっている。\nチェンジリレー　１位　回数が\n記録された　カード。"
    en: "It holds Pokéathlon records. It is a card that shows how\nmany times you won the Pokéathlon’s Relay Run."
    fr: "Contient vos données du Pokéathlon.\nSur cette carte est inscrit le nombre de victoires\nà la Course de Relais."
    it: "Contiene i tuoi dati Pokéathlon. Su questa Scheda\nè registrato il numero di vittorie a Staffetta."
    de: "Speichert deine Pokéathlon-Rekorde. Die Karte zeigt,\nwie oft du beim Staffellauf den 1. Platz belegt hast."
    es: "Contiene los datos del Pokéathlon con el número de\nvictorias en Carrera de Relevos."
    ko: "포켓슬론의 기록이 들어 있다.\n체인지릴레이 1위 횟수가\n기록된 카드."
    zh_simp: "ー\nー\nー"
    zh_trad: "ー\nー\nー"
data_card_07:
  names:
    jp_kana: データカード０７
    jp_kanji: データカード０７
    en: Data Card 07
    fr: Carte Mémo07
    it: Scheda dati 07
    de: Datenkarte07
    es: Tarjeta Datos 07
    ko: 데이터카드07
    zh_simp: 数据卡０７
    zh_trad: 資料卡０７
  descriptions:
    jp_kana: "ポケスロンの　記録が　はいっている。\nスティールフラッグ　１位　回数が\n記録された　カード。"
    jp_kanji: "ポケスロンの　記録が　はいっている。\nスティールフラッグ　１位　回数が\n記録された　カード。"
    en: "It holds Pokéathlon records. It is a card that shows how\nmany times you won the Pokéathlon’s Pennant Capture."
    fr: "Contient vos données du Pokéathlon.\nSur cette carte est inscrit le nombre de victoires\nau Capture Drapeau."
    it: "Contiene i tuoi dati Pokéathlon. Su questa Scheda\nè registrato il numero di vittorie a Bandierina."
    de: "Speichert deine Pokéathlon-Rekorde. Die Karte zeigt,\nwie oft du beim Flaggenschnappen den 1. Platz belegt\nhast."
    es: "Contiene los datos del Pokéathlon con el número de\nvictorias en Atrapabanderas."
    ko: "포켓슬론의 기록이 들어 있다.\n스틸플래그 1위 횟수가\n기록된 카드."
    zh_simp: "ー\nー\nー"
    zh_trad: "ー\nー\nー"
data_card_08:
  names:
    jp_kana: データカード０８
    jp_kanji: データカード０８
    en: Data Card 08
    fr: Carte Mémo08
    it: Scheda dati 08
    de: Datenkarte08
    es: Tarjeta Datos 08
