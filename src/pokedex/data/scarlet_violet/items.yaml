    fr: Gaz de Fantominus
    it: Gas di Gastly
    de: Nebulak-Gas
    es: Gas de Gastly
    ko: 고오스의가스
    zh_simp: 鬼斯的气体
    zh_trad: 鬼斯的氣體
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
gb_sounds:
  names:
    jp_kana: ＧＢプレイヤー
    jp_kanji: ＧＢプレイヤー
    en: GB Sounds
    fr: Lecteur GB
    it: Lettore GB
    de: GB-Player
    es: Reproductor GB
    ko: GB플레이어
    zh_simp: ＧＢ播放器
    zh_trad: ＧＢ播放器
  descriptions:
    jp_kana: "なつかしい曲が　きける\n音楽プレイヤー。\nスイッチ　ひとつで　きりかえられる。"
    jp_kanji: "なつかしい曲が　きける\n音楽プレイヤー。\nスイッチ　ひとつで　きりかえられる。"
    en: "A music player that allows you to listen to nostalgic\nsongs. It’s operated with the flip of a single switch."
    fr: "Un lecteur de musique qui permet de se plonger\ndans une atmosphère rétro. Une pression suffit\npour changer de mode."
    it: "Lettore di musica che permette di immergersi\nin atmosfere rétro. Funziona con un solo tasto."
    de: "Ein Abspielgerät, das Musik aus einer längst\nvergangenen Zeit spielt. Lässt sich durch simplen\nKnopfdruck bedienen."
    es: "Reproductor con el que se pueden escuchar aquellas\ncanciones tan nostálgicas. Se cambia de canción con\nun solo botón."
    ko: "그리운 곡을 들을 수 있는\n음악 플레이어.\n스위치 하나로 전환할 수 있다."
    zh_simp: "可以听到怀旧歌曲的音乐播放器。\n可用一个开关切换歌曲。"
    zh_trad: "可以聽到懷舊歌曲的\n音樂播放機。\n可一鍵切換歌曲。"
gengarite:
