    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
room_service:
  names:
    jp_kana: ルームサービス
    jp_kanji: ルームサービス
    en: Room Service
    fr: Chariot Distordu
    it: Distorservizio
    de: Bizarroservice
    es: Servicio Raro
    ko: 룸서비스
    zh_simp: 客房服务
    zh_trad: 客房服務
  descriptions:
    jp_kana: "ポケモンに　持たせると\nトリックルームのときに　使って\n素早さが　下がる。"
    jp_kanji: "ポケモンに　持たせると\nトリックルームのときに　使って\n素早さが　下がる。"
    en: "An item to be held by a Pokémon. If Trick Room takes\neffect, this item will lower the holder’s Speed stat."
    fr: "Objet à tenir. Lorsqu’une distorsion est active, l’objet\nest consommé pour baisser la Vitesse du porteur."
    it: "Se un Pokémon ha questo strumento quando il campo\ndi lotta è sotto l’effetto di Distortozona, la sua Velocità\ndiminuisce."
    de: Senkt die Initiative des Trägers, wenn Bizarroraum wirkt.
    es: "Si lo lleva un Pokémon, reduce su Velocidad cuando se\nusa Espacio Raro."
    ko: "포켓몬에게 지니게 하면\n트릭룸일 때 사용하여\n스피드가 떨어진다."
    zh_simp: "让宝可梦携带后，\n在戏法空间使用时，\n速度会下降。"
    zh_trad: "讓寶可夢攜帶後，\n當戲法空間成功時，\n速度會降低。"
root_fossil:
  names:
    jp_kana: ねっこのカセキ
    jp_kanji: ねっこのカセキ
    en: Root Fossil
    fr: Fossile Racine
    it: Radifossile
    de: Wurzelfossil
    es: Fósil Raíz
    ko: 뿌리화석
    zh_simp: 根状化石
    zh_trad: 根狀化石
  descriptions:
    jp_kana: "大昔　海に　すんでいた\n古代ポケモンの　カセキ。\nねっこの一部　らしい。"
    jp_kanji: "大昔　海に　すんでいた\n古代ポケモンの　カセキ。\nねっこの一部　らしい。"
    en: "A fossil from a prehistoric Pokémon that once lived\nin the sea. It looks as if it could be part of a\nplant’s root."
    fr: "Le fossile d’un ancien Pokémon aquatique.\nOn dirait un morceau de racine."
    it: "Fossile di un Pokémon preistorico che viveva in mare.\nSembra essere parte di una radice."
    de: "Das Fossil eines urzeitlichen Pokémon, das in der Tiefsee\nlebte. Es sieht wie ein Teil einer Pflanzenwurzel aus."
    es: "Fósil de un Pokémon prehistórico que vivía en el fondo\ndel mar. Parece ser parte de una raíz."
    ko: "오랜 옛날 바다에 살았던\n고대 포켓몬의 화석.\n뿌리의 일부인 듯하다."
    zh_simp: "很久以前栖息在海里的\n古代宝可梦的化石。\n好像是根的一部分。"
    zh_trad: "很久以前棲息在海裡的\n古代寶可夢的化石。\n好像是根的一部分。"
rose_incense:
  names:
    jp_kana: おはなのおこう
    jp_kanji: おはなのおこう
    en: Rose Incense
    fr: Encens Fleur
    it: Rosaroma
    de: Rosenrauch
    es: Incienso Floral
    ko: 꽃향로
    zh_simp: 花朵薰香
    zh_trad: 花朵薰香
  descriptions:
    jp_kana: "不思議な香りの　御香。\n持たせると　くさタイプの\n技の威力が　あがる。"
    jp_kanji: "不思議な香りの　御香。\n持たせると　くさタイプの\n技の威力が　あがる。"
    en: "An item to be held by a Pokémon. This incense has\na curious aroma that boosts the power of the holder’s\nGrass-type moves."
    fr: "Objet à tenir. Un encens au parfum curieux\naugmentant la puissance des capacités de type Plante."
    it: "Strumento da dare a un Pokémon. Incenso dal profumo\nesotico che potenzia le mosse di tipo Erba."
    de: "Ein Item zum Tragen. Dieses exotische Räucherwerk\nverstärkt Attacken vom Typ Pflanze."
    es: "Incienso de exótico aroma que potencia los movimientos\nde tipo Planta. Debe llevarlo un Pokémon."
    ko: "이상한 향기의 향로.\n지니게 하면 풀타입\n기술의 위력이 올라간다."
    zh_simp: "有着神奇香气的薰香。\n携带后，草属性的\n招式威力就会提高。"
    zh_trad: "有著神奇香氣的薰香。\n攜帶後，草屬性的\n招式威力就會提高。"
roseli_berry:
  names:
    jp_kana: ロゼルのみ
    jp_kanji: ロゼルのみ
    en: Roseli Berry
    fr: Baie Selro
    it: Baccarcadè
    de: Hibisbeere
    es: Baya Hibis
    ko: 로셀열매
    zh_simp: 洛玫果
    zh_trad: 洛玫果
  descriptions:
    jp_kana: "ポケモンに　持たせると\n効果バツグンの　フェアリー技を\n受けたとき　威力が　弱まる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　フェアリー技を\n受けたとき　威力が　弱まる。"
    en: "If a Pokémon holding this Berry is hit with a\nsupereffective Fairy-type move, the power of that\nmove will be weakened."
    fr: "Tenue, cette Baie réduit les dégâts subis lorsque\nle Pokémon est touché par une capacité super efficace\nde type Fée."
    it: "Se il Pokémon che ha questa bacca subisce una mossa\nsuperefficace di tipo Folletto, la potenza della mossa\nviene indebolita."
    de: "Als getragenes Item schwächt diese Beere eine\nsehr effektive Feen-Attacke, von der das Pokémon\ngetroffen wird."
    es: "Si la lleva un Pokémon, debilita un ataque supereficaz\nde tipo Hada que reciba."
    ko: "포켓몬에게 지니게 하면\n효과가 굉장한 페어리 기술로\n공격받았을 때 위력이 약해진다."
    zh_simp: "让宝可梦携带后，\n在受到效果绝佳的妖精属性招式\n攻击时，能令其威力减弱。"
    zh_trad: "讓寶可夢攜帶後，\n在受到效果絕佳的妖精屬性招式\n攻擊時，能使其威力減弱。"
roto_bargain:
  names:
    jp_kana: やすうりポン
    jp_kanji: やすうりポン
    en: Roto Bargain
    fr: Moti-Promo
    it: Sconto’n’roll
    de: Schnäppchenbon
    es: Cupón Rebaja
    ko: 할인캡슐토이
    zh_simp: 优惠碰碰
    zh_trad: 優惠碰碰
  descriptions:
    jp_kana: "ロトムパワーの　ひとつ。\n使うと　フレンドリィショップの\n商品が　半額に　なる。"
    jp_kanji: "ロトムパワーの　ひとつ。\n使うと　フレンドリィショップの\n商品が　半額に　なる。"
    en: "One of the Rotom Powers. When used, it reduces the\nprices of products at Poké Marts by half."
    fr: "Une des Motism’Auras. Elle permet de réduire de moitié\nle coût des objets vendus dans les Boutiques Pokémon."
    it: "Potere Rotom che consente di acquistare i prodotti\ndel Pokémon-Market a metà prezzo."
    de: "Diese Rotom-Kraft bewirkt, dass die Preise im\nPokémon-Supermarkt halbiert werden."
    es: "Poder Rotom que reduce a la mitad el coste de los\nartículos en las Tiendas Pokémon."
    ko: "로토무파워 중 하나.\n사용하면 프렌들리숍의\n상품이 반값이 된다."
    zh_simp: "洛托姆之力的一种。\n使用后，友好商店的\n商品就会变成半价。"
    zh_trad: "洛托姆之力的一種。\n使用後，友好商店的\n商品就會變成半價。"
roto_boost:
  names:
    jp_kana: おうえんポン
    jp_kanji: おうえんポン
    en: Roto Boost
    fr: Moti-Soutien
    it: Stat’n’roll
    de: Statuswertebon
    es: Cupón Refuerzo
    ko: 응원캡슐토이
    zh_simp: 加油碰碰
    zh_trad: 加油碰碰
  descriptions:
    jp_kana: "ロトムパワーの　ひとつ。\n戦っている　自分の　ポケモンの\n能力が　すべて　あがる。"
    jp_kanji: "ロトムパワーの　ひとつ。\n戦っている　自分の　ポケモンの\n能力が　すべて　あがる。"
    en: "One of the Rotom Powers. When used, it boosts all stats\nfor your battling Pokémon."
    fr: "Une des Motism’Auras. Elle permet d’augmenter\ntoutes les stats de vos Pokémon en combat."
    it: "Potere Rotom che fa aumentare tutte le statistiche\ndei propri Pokémon impegnati in una lotta."
    de: "Diese Rotom-Kraft bewirkt, dass im Kampf die\nStatuswerte der eigenen Pokémon auf der\nMitstreiterseite erhöht werden."
    es: "Poder Rotom que hace aumentar las características\nde los Pokémon de tu equipo que estén combatiendo."
    ko: "로토무파워 중 하나.\n싸우고 있는 자신의 포켓몬의\n능력이 모두 올라간다."
    zh_simp: "洛托姆之力的一种。\n正在战斗的我方宝可梦的\n所有能力都会提高。"
    zh_trad: "洛托姆之力的一種。\n可以提升戰鬥中的\n我方寶可夢的所有能力。"
roto_catch:
  names:
    jp_kana: つかまえポン
    jp_kanji: つかまえポン
    en: Roto Catch
    fr: Moti-Capture
    it: Acchiappa’n’roll
    de: Fangbon
    es: Cupón Captura
    ko: 잡기캡슐토이
    zh_simp: 捕捉碰碰
    zh_trad: 捕捉碰碰
  descriptions:
    jp_kana: "ロトムパワーの　ひとつ。　使うと\n目の前にいる　野生ポケモンが\nとても　捕まえやすくなる。"
    jp_kanji: "ロトムパワーの　ひとつ。　使うと\n目の前にいる　野生ポケモンが\nとても　捕まえやすくなる。"
    en: "One of the Rotom Powers. When used, it makes you far\nlikelier to succeed at catching the wild Pokémon in the\nimmediate area."
    fr: "Une des Motism’Auras. Elle permet d’attraper\nbeaucoup plus facilement le Pokémon sauvage\nque vous affrontez."
    it: "Potere Rotom che rende considerevolmente\npiù facile catturare i Pokémon selvatici."
    de: "Diese Rotom-Kraft bewirkt, dass wilde Pokémon mit\nhöherer Wahrscheinlichkeit gefangen werden."
    es: "Poder Rotom que aumenta mucho la probabilidad\nde capturar al Pokémon salvaje al que te estés\nenfrentando."
    ko: "로토무파워 중 하나. 사용하면\n눈앞에 있는 야생 포켓몬을\n매우 잡기 쉬워진다."
    zh_simp: "洛托姆之力的一种。\n使用后，眼前的野生宝可梦\n会变得非常容易捕捉。"
    zh_trad: "洛托姆之力的一種。\n使用後，可以讓眼前的\n野生寶可夢變得非常容易捕捉。"
roto_encounter:
  names:
    jp_kana: みっけポン
    jp_kanji: みっけポン
    en: Roto Encounter
    fr: Moti-Appât
    it: Incontra’n’roll
    de: Lockbon
    es: Cupón Reclamo
    ko: 발견캡슐토이
    zh_simp: 相遇碰碰
    zh_trad: 相遇碰碰
  descriptions:
    jp_kana: "ロトムパワーの　ひとつ。\n一定時間　レベルの　高い\n野生ポケモンと　出会いやすくなる。"
    jp_kanji: "ロトムパワーの　ひとつ。\n一定時間　レベルの　高い\n野生ポケモンと　出会いやすくなる。"
    en: "One of the Rotom Powers. When used, it increases the\nchance of encountering high-level wild Pokémon for a\ncertain period of time."
    fr: "Une des Motism’Auras. Elle permet de rencontrer\nplus de Pokémon sauvages de haut niveau durant\nune période déterminée."
    it: "Potere Rotom che aumenta le probabilità di incontrare\nPokémon selvatici di livello alto per un certo lasso\ndi tempo."
    de: "Diese Rotom-Kraft bewirkt, dass wilde Pokémon mit\nhohem Level für eine bestimmte Zeit viel häufiger\nerscheinen."
    es: "Poder Rotom que aumenta la probabilidad de encontrar\nPokémon salvajes de nivel alto durante un tiempo\ndeterminado."
    ko: "로토무파워 중 하나.\n일정 시간 레벨이 높은\n야생 포켓몬과 만나기 쉬워진다."
    zh_simp: "洛托姆之力的一种。\n一定时间内，会变得容易\n遇到高等级的野生宝可梦。"
    zh_trad: "洛托姆之力的一種。\n在一定時間內可以變得\n容易遇見等級高的野生寶可夢。"
roto_exp_points:
  names:
    jp_kana: けいけんポン
    jp_kanji: けいけんポン
    en: Roto Exp. Points
    fr: Moti-Exp
    it: Esp’n’roll
    de: EP-Bon
    es: Cupón Exp
    ko: 경험캡슐토이
    zh_simp: 经验碰碰
    zh_trad: 經驗碰碰
  descriptions:
    jp_kana: "ロトムパワーの　ひとつ。\n勝負の　あとに　もらえる\n経験値が　少し　増える。"
    jp_kanji: "ロトムパワーの　ひとつ。\n勝負の　あとに　もらえる\n経験値が　少し　増える。"
    en: "One of the Rotom Powers. When used, it slightly\nincreases the Exp. Points your Pokémon receive\nafter battle."
    fr: "Une des Motism’Auras. Elle permet d’augmenter\nlégèrement la quantité de Points d’Expérience\ngagnés par vos Pokémon en combat."
    it: "Potere Rotom che fa aumentare un po’ i Punti\nEsperienza ottenuti dopo ogni lotta."
    de: "Diese Rotom-Kraft bewirkt, dass Pokémon im Kampf\nmehr Erfahrungspunkte erhalten."
    es: "Poder Rotom que incrementa ligeramente los puntos de\nexperiencia obtenidos en combate."
    ko: "로토무파워 중 하나.\n승부 후에 얻는\n경험치가 조금 늘어난다."
    zh_simp: "洛托姆之力的一种。\n对战后能得到的\n经验值会稍微增加。"
    zh_trad: "洛托姆之力的一種。\n對戰後可獲得的\n經驗值將會稍微增加。"
roto_friendship:
  names:
    jp_kana: なつきポン
    jp_kanji: なつきポン
    en: Roto Friendship
    fr: Moti-Cœur
    it: Affetto’n’roll
    de: Freundschaftsbon
    es: Cupón Amistad
    ko: 친밀도캡슐토이
    zh_simp: 亲密碰碰
    zh_trad: 親密碰碰
  descriptions:
    jp_kana: "ロトムパワーの　ひとつ。\n連れている　ポケモンが\nかなり　なかよく　なりやすくなる。"
    jp_kanji: "ロトムパワーの　ひとつ。\n連れている　ポケモンが\nかなり　なかよく　なりやすくなる。"
    en: "One of the Rotom Powers. When used, it helps Pokémon\nin your party grow friendly quite a lot faster."
    fr: "Une des Motism’Auras. Elle permet d’augmenter\nplus rapidement l’amitié que vous portent les Pokémon\nde votre équipe."
    it: "Potere Rotom che fa sì che i Pokémon in squadra\naumentino il loro livello di amicizia molto più facilmente."
    de: "Diese Rotom-Kraft bewirkt, dass im Team mitgeführte\nPokémon viel schneller zutraulich werden."
    es: "Poder Rotom que hace que el grado de amistad de los\nPokémon del equipo aumente más rápido."
    ko: "로토무파워 중 하나.\n데리고 있는 포켓몬과\n상당히 친밀해지기 쉬워진다."
    zh_simp: "洛托姆之力的一种。\n带在身边的宝可梦\n会变得非常容易亲近。"
    zh_trad: "洛托姆之力的一種。\n帶在身邊的寶可夢\n會非常容易和訓練家變得友好。"
roto_hatch:
  names:
    jp_kana: タマゴふかポン
    jp_kanji: タマゴふかポン
    en: Roto Hatch
    fr: Moti-Couveuse
    it: Cova’n’roll
    de: Brutbon
    es: Cupón Eclosión
    ko: 알부화캡슐토이
    zh_simp: 孵蛋碰碰
    zh_trad: 孵蛋碰碰
  descriptions:
    jp_kana: "ロトムパワーの　ひとつ。\n使うと　タマゴが\nとても　かえりやすくなる。"
    jp_kanji: "ロトムパワーの　ひとつ。\n使うと　タマゴが\nとても　かえりやすくなる。"
    en: "One of the Rotom Powers. When used, it helps Eggs\nhatch faster."
    fr: "Une des Motism’Auras. Elle permet de faire éclore\nles Œufs beaucoup plus rapidement."
    it: "Potere Rotom che aumenta considerevolmente\nla rapidità con cui si schiudono le Uova."
    de: "Diese Rotom-Kraft bewirkt, dass Pokémon schneller aus\nEiern schlüpfen."
    es: "Poder Rotom que hace que los Huevos eclosionen\nmucho antes."
    ko: "로토무파워 중 하나.\n사용하면 알이\n매우 부화하기 쉬워진다."
    zh_simp: "洛托姆之力的一种。\n使用后，蛋就会变得\n非常容易孵化。"
    zh_trad: "洛托姆之力的一種。\n使用後，蛋就會變得\n非常容易孵化。"
roto_hp_restore:
  names:
    jp_kana: ＨＰかいふくポン
    jp_kanji: ＨＰかいふくポン
    en: Roto HP Restore
    fr: Moti-Récup’ PV
    it: PS’n’roll
    de: KP-Bon
    es: Cupón PS
    ko: HP회복캡슐토이
    zh_simp: ＨＰ回复碰碰
    zh_trad: ＨＰ回復碰碰
  descriptions:
    jp_kana: "ロトムパワーの　ひとつ。\n戦っている　自分の　ポケモンの\nＨＰが　すべて　回復する。"
    jp_kanji: "ロトムパワーの　ひとつ。\n戦っている　自分の　ポケモンの\nＨＰが　すべて　回復する。"
    en: "One of the Rotom Powers. When used, it fully restores\nthe max HP of your battling Pokémon."
    fr: "Une des Motism’Auras. Elle permet à vos Pokémon\nen combat de récupérer la totalité de leurs PV."
    it: "Potere Rotom che permette ai propri Pokémon\nimpegnati in una lotta di recuperare tutti i PS."
    de: "Diese Rotom-Kraft bewirkt, dass im Kampf die KP der\neigenen Pokémon auf der Mitstreiterseite vollständig\nwiederaufgefüllt werden."
    es: "Poder Rotom que restaura todos los PS de los Pokémon\nde tu equipo que estén combatiendo."
    ko: "로토무파워 중 하나.\n싸우고 있는 자신의 포켓몬의\nHP가 모두 회복한다."
    zh_simp: "洛托姆之力的一种。\n正在战斗的我方宝可梦的\nＨＰ会全部回复。"
    zh_trad: "洛托姆之力的一種。\n可以回復戰鬥中的\n我方寶可夢所有的ＨＰ。"
roto_pp_restore:
  names:
    jp_kana: ＰＰかいふくポン
    jp_kanji: ＰＰかいふくポン
    en: Roto PP Restore
    fr: Moti-Récup’ PP
    it: PP’n’roll
    de: AP-Bon
    es: Cupón PP
    ko: PP회복캡슐토이
    zh_simp: ＰＰ回复碰碰
    zh_trad: ＰＰ回復碰碰
  descriptions:
    jp_kana: "ロトムパワーの　ひとつ。\n戦っている　自分の　ポケモンの\nＰＰが　すべて　回復する。"
    jp_kanji: "ロトムパワーの　ひとつ。\n戦っている　自分の　ポケモンの\nＰＰが　すべて　回復する。"
    en: "One of the Rotom Powers. When used, it fully restores\nthe max PP of your battling Pokémon."
    fr: "Une des Motism’Auras. Elle permet à vos Pokémon\nen combat de récupérer la totalité de leurs PP."
    it: "Potere Rotom che permette ai propri Pokémon\nimpegnati in una lotta di recuperare tutti i PP."
    de: "Diese Rotom-Kraft bewirkt, dass im Kampf die AP der\neigenen Pokémon auf der Mitstreiterseite vollständig\nwiederaufgefüllt werden."
    es: "Poder Rotom que restaura todos los PP de los Pokémon\nde tu equipo que estén combatiendo."
    ko: "로토무파워 중 하나.\n싸우고 있는 자신의 포켓몬의\nPP가 모두 회복한다."
    zh_simp: "洛托姆之力的一种。\n正在战斗的我方宝可梦的\nＰＰ会全部回复。"
    zh_trad: "洛托姆之力的一種。\n可以回復戰鬥中的\n我方寶可夢所有的ＰＰ。"
roto_prize_money:
  names:
    jp_kana: おこづかいポン
    jp_kanji: おこづかいポン
    en: Roto Prize Money
    fr: Moti-Magot
    it: Soldi’n’roll
    de: Preisgeldbon
    es: Cupón Botín
    ko: 용돈캡슐토이
    zh_simp: 零花钱碰碰
    zh_trad: 零用錢碰碰
  descriptions:
    jp_kana: "ロトムパワーの　ひとつ。\n勝負の　あとに　もらえる\nおこづかいが　３倍に　なる。"
    jp_kanji: "ロトムパワーの　ひとつ。\n勝負の　あとに　もらえる\nおこづかいが　３倍に　なる。"
    en: "One of the Rotom Powers. When used, it triples the\nprize money you receive after battle."
    fr: "Une des Motism’Auras. Elle permet de tripler\nles gains d’argent à la fin d’un combat."
    it: "Potere Rotom che triplica la quantità di soldi ottenuti\ndopo ogni lotta."
    de: "Diese Rotom-Kraft bewirkt, dass sich das nach einem\ngewonnenen Kampf erhaltene Preisgeld verdreifacht."
    es: "Poder Rotom que triplica el dinero ganado tras un\ncombate."
    ko: "로토무파워 중 하나.\n승부 후에 받는\n용돈이 3배가 된다."
    zh_simp: "洛托姆之力的一种。\n对战后能得到的\n零花钱会变成３倍。"
    zh_trad: "洛托姆之力的一種。\n對戰後可獲得的\n零用錢將會變成３倍。"
roto_stealth:
  names:
    jp_kana: かくれポン
    jp_kanji: かくれポン
    en: Roto Stealth
    fr: Moti-Camouflage
    it: Repelle’n’roll
    de: Schutzbon
    es: Cupón Sigilo
    ko: 숨기캡슐토이
    zh_simp: 隐身碰碰
    zh_trad: 隱身碰碰
  descriptions:
    jp_kana: "ロトムパワーの　ひとつ。\n一定時間　野生ポケモンと\nぜんぜん　出会わなくなる。"
    jp_kanji: "ロトムパワーの　ひとつ。\n一定時間　野生ポケモンと\nぜんぜん　出会わなくなる。"
    en: "One of the Rotom Powers. When used, it prevents\nyou from encountering any wild Pokémon for a certain\nperiod of time."
    fr: "Une des Motism’Auras. Elle permet de ne plus\nrencontrer de Pokémon sauvages durant\nune période déterminée."
    it: "Potere Rotom che permette di evitare l’incontro\ncon i Pokémon selvatici per un certo lasso di tempo."
    de: "Diese Rotom-Kraft bewirkt, dass für eine bestimmte\nZeit keine wilden Pokémon erscheinen."
    es: "Poder Rotom que permite evitar por completo los\nencuentros con Pokémon salvajes durante un tiempo\ndeterminado."
    ko: "로토무파워 중 하나.\n일정 시간 야생 포켓몬과\n전혀 만나지 않게 된다."
    zh_simp: "洛托姆之力的一种。\n一定时间内，会变得完全\n不会遇到野生宝可梦。"
    zh_trad: "洛托姆之力的一種。\n在一定時間內會變得\n完全無法遇見野生寶可夢。"
roto_stick:
  names:
    jp_kana: ロトりぼう
    jp_kanji: ロトりぼう
    en: Roto-Stick
    fr: Perche à Motismart
    it: Bastone Rotoselfie
    de: Rotom-Stick
    es: Paloselfi Rotom
    ko: 로토무셀카봉
    zh_simp: 洛拍棒
    zh_trad: 洛拍棒
  descriptions:
    jp_kana: "スマホロトムが　乗ってくれる棒。\n自撮りモードで　使うと\nもう少し　遠くから　撮影できる。"
    jp_kanji: "スマホロトムが　乗ってくれる棒。\n自撮りモードで　使うと\nもう少し　遠くから　撮影できる。"
    en: "A stick to rest a Rotom Phone on. It allows you to take\nselfies from a little bit farther away than you could on\nyour own."
    fr: "Une perche compatible avec les Motismart. Elle permet\nde se photographier d’un peu plus loin lorsqu’on prend\ndes selfies."
    it: "Bastone su cui montare lo Smart Rotom. Permette\ndi fare selfie da un po’ più lontano."
    de: "Ein Stab, an dem man sein Smart-Rotom befestigen\nkann, um Selfies von weiter weg zu machen."
    es: "Un palo en el que se puede montar el SmartRotom.\nPermite sacar fotos desde una distancia mayor en el\nmodo selfi."
    ko: "스마트로토무가 올라탈 수 있는 봉.\n셀프 카메라 모드일 때 사용하면\n좀 더 멀리서 촬영할 수 있다."
    zh_simp: "可供手机洛托姆搭乘的棒子。\n在自拍模式中使用\n就能从稍远的地方拍照。"
    zh_trad: "能讓手機洛托姆搭上來的棒子。\n在自拍模式中使用，\n就能從更遠一點的地方拍攝。"
rotom_bike:glistening_black:
  names:
    jp_kana: ロトムじてんしゃ
    jp_kanji: ロトムじてんしゃ
    en: Rotom Bike
    fr: Moticyclette
    it: Bici Rotom
    de: Rotom-Rad
    es: Bici Rotom
    ko: 로토무자전거
    zh_simp: 洛托姆自行车
    zh_trad: 洛托姆自行車
  descriptions:
    jp_kana: "ロトムの　力で　ターボが　でき\n水上も　走れる　じてんしゃ。\n赤黒く　光る　ギラギラブラック。"
    jp_kanji: "ロトムの　力で　ターボが　でき\n水上も　走れる　じてんしゃ。\n赤黒く　光る　ギラギラブラック。"
    en: "This bike can do a turbo boost and run on the water\nusing Rotom’s power. It’s a glistening black that\nshines reddish-black."
    fr: "Une bicyclette qui permet de mettre le turbo\net de se déplacer sur l’eau grâce à Motisma.\nSon noir crépusculaire brille d’une lueur rouge."
    it: "Una bicicletta dotata del turbo che può anche spostarsi\nin acqua grazie ai poteri di Rotom. È di colore nero\nscintillante ed emana una luce rossastra."
    de: "Ein gleißend schwarzes Fahrrad, das dank Rotom über\neinen Turbo verfügt und auf dem Wasser gefahren\nwerden kann. Versprüht schwarz-rote Funken."
    es: "Gracias al poder de Rotom, esta bicicleta permite usar\nel turbo y desplazarse sobre el agua. De color negro y\ncon una fulgurante estela rojinegra."
    ko: "로토무의 힘으로 터보를 사용할 수 있고\n물 위에서도 달릴 수 있는 자전거.\n검붉게 빛나는 글리터링 블랙 디자인이다."
    zh_simp: "能借助洛托姆的力量进行涡轮加速，\n且可在水面上骑行的自行车。\n闪烁着红黑色光泽的炫耀黑。"
    zh_trad: "能用洛托姆的力量進行渦輪加速，\n還能在水上移動的自行車。\n會閃閃發出赤黑亮光的炫耀黑。"
rotom_bike:land:
  names:
    jp_kana: ロトムじてんしゃ
    jp_kanji: ロトムじてんしゃ
    en: Rotom Bike
    fr: Moticyclette
    it: Bici Rotom
    de: Rotom-Rad
    es: Bici Rotom
    ko: 로토무자전거
    zh_simp: 洛托姆自行车
    zh_trad: 洛托姆自行車
  descriptions:
    jp_kana: "ポケモンの　ロトムが\nモーターに　入ったことで\nターボが　できるようになった　じてんしゃ。"
    jp_kanji: "ポケモンの　ロトムが\nモーターに　入ったことで\nターボが　できるようになった　じてんしゃ。"
    en: "This bike can be combined with the Pokémon Rotom to\nuse a turbo boost."
    fr: "Motisma est entré dans le moteur de cette bicyclette\nà assistance électrique et permet désormais de mettre\nle turbo."
    it: "Una bicicletta che permette di mettere il turbo\ngrazie al Rotom che è entrato nel suo motore."
    de: "Ein Fahrrad mit einem Motor, in dem sich ein Rotom\nbefindet. Dank des Rotom-Turbos erreicht das Rad\nabsolute Spitzengeschwindigkeiten."
    es: "Una bicicleta en la que puede activarse el turbo, al\nllevar al Pokémon Rotom incorporado en el motor."
    ko: "포켓몬 로토무가\n모터에 들어가서\n터보를 사용할 수 있게 된 자전거."
    zh_simp: "宝可梦洛托姆潜入马达后，\n这辆自行车变得可以\n通过涡轮发动机加速了。"
    zh_trad: "由於寶可夢洛托姆\n進入了這輛自行車的馬達中，\n使得它變得可以進行渦輪加速。"
rotom_bike:sparkling_white:
  names:
    jp_kana: ロトムじてんしゃ
    jp_kanji: ロトムじてんしゃ
    en: Rotom Bike
    fr: Moticyclette
    it: Bici Rotom
    de: Rotom-Rad
    es: Bici Rotom
    ko: 로토무자전거
    zh_simp: 洛托姆自行车
    zh_trad: 洛托姆自行車
  descriptions:
    jp_kana: "ロトムの　力で　ターボが　でき\n水上も　走れる　じてんしゃ。\n白く　輝く　ぴかぴかホワイト。"
    jp_kanji: "ロトムの　力で　ターボが　でき\n水上も　走れる　じてんしゃ。\n白く　輝く　ぴかぴかホワイト。"
    en: "This bike can do a turbo boost and run on the water\nusing Rotom’s power. It’s a sparkling white that\nshines brilliantly."
    fr: "Une bicyclette qui permet de mettre le turbo et de\nse déplacer sur l’eau grâce à Motisma. D’une blancheur\néclatante, elle projette des étincelles sur son passage."
    it: "Una bicicletta dotata del turbo che può anche spostarsi\nin acqua grazie ai poteri di Rotom. È di un bianco\nsfavillante."
    de: "Ein glitzernd weißes Fahrrad, das dank Rotom über\neinen Turbo verfügt und auf dem Wasser gefahren\nwerden kann. Versprüht weiße Funken."
    es: "Gracias al poder de Rotom, esta bicicleta permite usar\nel turbo y desplazarse sobre el agua. Tiene un color\nblanco centelleante."
    ko: "로토무의 힘으로 터보를 사용할 수 있고\n물 위에서도 달릴 수 있는 자전거.\n하얗게 빛나는 스파클링 화이트 디자인이다."
    zh_simp: "能借助洛托姆的力量进行涡轮加速，\n且可在水面上骑行的自行车。\n洁白耀眼的闪亮白。"
    zh_trad: "能用洛托姆的力量進行渦輪加速，\n還能在水上移動的自行車。\n潔白耀眼的閃亮白。"
rotom_bike:water:
  names:
    jp_kana: ロトムじてんしゃ
    jp_kanji: ロトムじてんしゃ
    en: Rotom Bike
    fr: Moticyclette
    it: Bici Rotom
    de: Rotom-Rad
    es: Bici Rotom
    ko: 로토무자전거
    zh_simp: 洛托姆自行车
    zh_trad: 洛托姆自行車
  descriptions:
    jp_kana: "ポケモンの　ロトムを　組み合わせ\nターボが　できるようになった　だけでなく\n水上も　走れる　じてんしゃ。"
    jp_kanji: "ポケモンの　ロトムを　組み合わせ\nターボが　できるようになった　だけでなく\n水上も　走れる　じてんしゃ。"
    en: "This bike can be combined with the Pokémon Rotom to\nnot only do a turbo boost but also run on the water."
    fr: "Sous l’influence de Motisma, cette bicyclette permet\nnon seulement de mettre le turbo, mais également\nde se déplacer sur l’eau."
    it: "La presenza di Rotom non permette solo di usare\nil turbo, ma anche di correre sulla superficie dell’acqua."
    de: "Ein Fahrrad, in dem sich ein Rotom befindet. Es wurde\nnicht nur um den Rotom-Turbo erweitert, sondern kann\nsich jetzt auch auf dem Wasser fortbewegen."
    es: "Combinada con el Pokémon Rotom, esta bicicleta te\npermite usar un turbo y también desplazarte por encima\ndel agua."
    ko: "포켓몬 로토무와의 조합으로\n터보를 사용할 수 있을 뿐만 아니라\n물 위에서도 달릴 수 있는 자전거."
    zh_simp: "自行车和宝可梦洛托姆组合后，\n不仅可以通过涡轮发动机加速，\n而且可以在水面上骑行。"
    zh_trad: "和寶可夢洛托姆結合的自行車。\n不僅可以進行渦輪加速，\n還能在水上移動。"
rotom_catalog:
  names:
    jp_kana: ロトムのカタログ
    jp_kanji: ロトムのカタログ
    en: Rotom Catalog
    fr: Moti-Catalogue
    it: Catalogo Rotom
    de: Rotom-Katalog
    es: Catálogo Rotom
    ko: 로토무카탈로그
    zh_simp: 洛托姆型录
    zh_trad: 洛托姆型錄
  descriptions:
    jp_kana: "ロトムが　好きな　家電が　載っている。\nカタログを　使うことで　ロトムを\n家電に　いれたり　だすことが　できる。"
    jp_kanji: "ロトムが　好きな　家電が　載っている。\nカタログを　使うことで　ロトムを\n家電に　いれたり　だすことが　できる。"
    en: "A catalog of devices that Rotom like. Use the catalog\nto have Rotom hop in and out of the various devices\nlisted within."
    fr: "Un catalogue présentant divers appareils ménagers\nque Motisma apprécie. À utiliser pour faire entrer\nMotisma dans ces appareils ou l’en faire sortir."
    it: "Contiene una lista degli apparecchi che piacciono\na Rotom. Può essere usato per far entrare Rotom\nnel motore degli elettrodomestici o per farlo uscire."
    de: "Ein Katalog, der Rotoms Lieblingsgeräte auflistet.\nMit diesem Katalog kann Rotom in Geräte schlüpfen\nund sie wieder verlassen."
    es: "Un catálogo de los aparatos favoritos de Rotom que le\npermite introducirse o salir fácilmente de los mismos."
    ko: "로토무가 좋아하는 가전제품이 실려 있다.\n카탈로그를 사용하면 로토무를\n가전제품에 넣거나 꺼낼 수 있다."
    zh_simp: "上面记载着洛托姆喜欢的家电。\n通过使用这本指南，可以\n让洛托姆潜入或脱离家电。"
    zh_trad: "記載著洛托姆喜歡的電器。\n透過使用這本型錄，可以讓\n洛托姆進入或離開電器。"
rotom_phone:
  names:
    jp_kana: スマホロトム
    jp_kanji: スマホロトム
    en: Rotom Phone
    fr: Motismart
    it: Smart Rotom
    de: Smart-Rotom
    es: SmartRotom
    ko: 스마트로토무
    zh_simp: 手机洛托姆
    zh_trad: 手機洛托姆
  descriptions:
    jp_kana: "ロトムという　ポケモンが　入っている\n最新型の　スマートフォン。\n便利なアプリを　起動できる。"
    jp_kanji: "ロトムという　ポケモンが　入っている\n最新型の　スマートフォン。\n便利なアプリを　起動できる。"
    en: "The latest model of smartphone. A Pokémon called\nRotom lives within it, and it can be used to run all sorts\nof handy apps."
    fr: "Un Smartphone de dernière génération dans lequel\nun Pokémon du nom de Motisma a élu domicile.\nContient toutes sortes d’applications bien pratiques."
    it: "Uno Smartphone di ultima generazione al cui interno\nvive un Pokémon chiamato Rotom. È pieno di app utili."
    de: "Das neueste Smartphone-Modell, in dem sich ein\nPokémon namens Rotom befindet. Dieses Mobiltelefon\nermöglicht die Nutzung allerlei praktischer Apps."
    es: "Un móvil inteligente de última generación en cuyo\ninterior se halla un Pokémon llamado Rotom. Cuenta\ncon una buena variedad de aplicaciones útiles."
    ko: "로토무라는 포켓몬이 들어 있는\n최신형 스마트폰.\n편리한 앱을 사용할 수 있다."
    zh_simp: "被一种叫洛托姆的宝可梦\n潜入到了里面的最新型智能手机。\n能够启动便利的App。"
    zh_trad: "內藏著洛托姆這種寶可夢的\n最新型智慧型手機。\n可啟動方便的App來使用。"
rotom_sparks:
  names:
    jp_kana: ロトムのでんき
    jp_kanji: ロトムのでんき
    en: Rotom Sparks
    fr: Électricité de Motisma
    it: Elettricità di Rotom
    de: Rotom-Strom
    es: Electricidad de Rotom
    ko: 로토무의전기
    zh_simp: 洛托姆的电力
    zh_trad: 洛托姆的電力
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
rowap_berry:
  names:
    jp_kana: レンブのみ
    jp_kanji: レンブのみ
    en: Rowap Berry
    fr: Baie Pommo
    it: Baccaroam
    de: Roselbeere
    es: Baya Magua
    ko: 애터열매
    zh_simp: 雾莲果
    zh_trad: 霧蓮果
  descriptions:
    jp_kana: "ポケモンに　持たせると\n特殊技を　受けたとき\n相手にも　ダメージを　あたえる。"
    jp_kanji: "ポケモンに　持たせると\n特殊技を　受けたとき\n相手にも　ダメージを　あたえる。"
    en: "If a Pokémon holding this Berry is hit with a special\nmove, the attacker will also take damage."
    fr: "Si le Pokémon qui tient cette Baie est touché par\nune capacité spéciale, son attaquant subit des dégâts."
    it: "Se un Pokémon ha questa bacca, chi attacca\nsubirà danni se la sua mossa speciale va a segno."
    de: "Als getragenes Item verursacht diese Beere Schaden\nbei einem Angreifer, der das Pokémon mit einer\nSpezial-Attacke trifft."
    es: "Si la lleva un Pokémon y recibe un ataque especial,\nel atacante también recibe daño."
    ko: "포켓몬에게 지니게 하면\n특수 기술로 공격받았을 때\n상대에게도 데미지를 준다."
    zh_simp: "让宝可梦携带后，\n在受到特殊招式攻击时，\n能给予对手伤害。"
    zh_trad: "讓寶可夢攜帶後，\n在受到特殊招式攻擊時，\n也能給予對手傷害。"
rsvp_mail:
  names:
    jp_kana: おさそいメール
    jp_kanji: おさそいメール
    en: RSVP Mail
    fr: Lettre Invit
    it: Messaggio Invito
    de: Einladebrief
    es: Carta Invitar
    ko: 권유메일
    zh_simp: 邀请邮件
    zh_trad: 邀請郵件
  descriptions:
    jp_kana: "相手を　お誘いする　メールが\n書きやすい　レターペーパー。\nポケモンに　持たせて　使う。"
    jp_kanji: "相手を　お誘いする　メールが\n書きやすい　レターペーパー。\nポケモンに　持たせて　使う。"
    en: "Stationery designed to allow you to extend an invitation\nto the recipient. Have a Pokémon hold it for delivery."
    fr: "Un papier à lettres idéal pour les invitations.\nPeut être tenu et livré par un Pokémon."
    it: "Carta da lettere ideale per scrivere un invito.\nSi usa dandola a un Pokémon."
    de: "Briefpapier, mit dem man eine andere Person zu etwas\neinladen kann. Gib es einem Pokémon zum Tragen."
    es: "Carta para invitar a un compañero. Debe llevarla un\nPokémon para entregarla."
    ko: "상대를 초대하는 메일을\n쉽게 쓸 수 있는 편지지.\n포켓몬에게 지니게 해서 쓴다."
    zh_simp: "方便写邀请对方这类邮件的信纸。\n使用该道具时，\n需要让宝可梦携带着来用。"
    zh_trad: "方便寫邀請對方這類郵件的信紙。\n需讓寶可夢攜帶使用。"
rufflet_feather:
  names:
    jp_kana: ワシボンのはね
    jp_kanji: ワシボンのはね
    en: Rufflet Feather
    fr: Plume de Furaiglon
    it: Penna di Rufflet
    de: Geronimatz-Feder
    es: Pluma de Rufflet
    ko: 수리둥보의깃털
    zh_simp: 毛头小鹰的羽毛
    zh_trad: 毛頭小鷹的羽毛
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    en: "Material accidentally dropped by a Pokémon. It can be\nused to make TMs."
    fr: "Un échantillon laissé par un Pokémon. Il peut être utilisé\npour fabriquer des CT."
    it: "Oggetto lasciato accidentalmente cadere da un\nPokémon. Serve per creare MT."
    de: "Dieses Material hat ein Pokémon unbewusst fallen lassen.\nEs wird zur Herstellung von TMs benötigt."
    es: "Material que ha dejado caer un Pokémon y que puede\nutilizarse para fabricar MT."
    ko: "포켓몬이 우연히 떨어뜨린 유실물.\n기술머신을 만드는 데 필요하다."
    zh_simp: "宝可梦不小心掉落的东西。\n制作招式学习器时需要用到。"
    zh_trad: "寶可夢不小心掉落的東西。\n是製作招式學習器所需的材料。"
rule_book:
  names:
    jp_kana: ルールブック
    jp_kanji: ルールブック
    en: Rule Book
    fr: Livre Règles
    it: Libro regole
    de: Regelbuch
    es: Reglamento
    ko: 룰북
    zh_simp: 规则书
    zh_trad: 規則書
  descriptions:
    jp_kana: "対戦のルールが　かかれている。\n通信対戦するとき\nルールを　選ぶことが　できる。"
    jp_kanji: "対戦のルールが　かかれている。\n通信対戦するとき\nルールを　選ぶことが　できる。"
    en: "It lists the rules for holding battles.\nFor Link Battles, you may choose which set of rules\nyou wish to use."
    fr: "La liste des règles de combat.\nPermet de choisir les règles des combats en réseau."
    it: "Elenca le regole per le lotte. Nelle lotte in link\npuoi scegliere diversi set di regole da utilizzare."
    de: "Enthält die Kampfregeln. Bei Link-Kämpfen kannst du\ndaraus die gewünschten Regeln wählen."
    es: "Recoge las normas de los combates. En los combates\nen conexión permite elegir el conjunto de reglas que\nse quiera usar."
    ko: "대전에 대한 룰이 적혀 있다.\n통신대전을 할 때\n룰을 선택할 수 있다."
    zh_simp: "写着对战规则。\n在进行连接对战时，\n可以选择规则。"
    zh_trad: "寫著對戰規則。\n在進行連線對戰時，\n可以選擇規則。"
rusted_shield:
  names:
    jp_kana: くちたたて
    jp_kanji: くちたたて
    en: Rusted Shield
    fr: Bouclier Rouillé
    it: Scudo rovinato
    de: Rostiger Schild
    es: Escudo Oxidado
    ko: 녹슨방패
    zh_simp: 腐朽的盾
    zh_trad: 腐朽的盾
  descriptions:
    jp_kana: "大昔の　英雄が　災厄を\n討ち払ったと　伝えられる　盾　だが\nいまは　さびて　ボロボロに　なっている。"
    jp_kanji: "大昔の　英雄が　災厄を\n討ち払ったと　伝えられる　盾　だが\nいまは　さびて　ボロボロに　なっている。"
    en: "It is said that a hero used this shield to halt a terrible\ndisaster in ancient times. But it’s grown rusty and worn."
    fr: "On raconte que ce bouclier fut jadis utilisé\npar un héros pour vaincre une calamité.\nÀ présent, il est tout usé et rouillé."
    it: "Si racconta che in passato un eroe riuscì a respingere\nla calamità servendosi di questo scudo. Ora è tutto\narrugginito e rovinato."
    de: "Mit diesem Schild soll ein Held einstmals großes Unheil\nabgewendet haben. Rost sowie der Zahn der Zeit haben\njedoch ihre Spuren hinterlassen."
    es: "Cuenta una antigua leyenda que un valiente héroe\nasió este escudo para hacer frente a un cataclismo,\npero ahora está oxidado y en un estado lamentable."
    ko: "먼 옛날의 영웅이 재앙을 막는 데\n사용했다고 전해지는 방패지만\n지금은 녹이 슬고 닳아 버렸다."
    zh_simp: "据说很久以前，英雄就是\n拿着这面盾驱走了灾厄。\n而现在早已变得锈迹斑斑。"
    zh_trad: "據說在很久以前，英雄就是\n用這面盾來擊退災厄。\n但現在已經生鏽，變得破爛不堪。"
rusted_sword:
  names:
    jp_kana: くちたけん
    jp_kanji: くちたけん
    en: Rusted Sword
    fr: Épée Rouillée
    it: Spada rovinata
    de: Rostiges Schwert
    es: Espada Oxidada
    ko: 녹슨검
    zh_simp: 腐朽的剑
    zh_trad: 腐朽的劍
  descriptions:
    jp_kana: "大昔の　英雄が　災厄を\n討ち払ったと　伝えられる　剣　だが\nいまは　さびて　ボロボロに　なっている。"
    jp_kanji: "大昔の　英雄が　災厄を\n討ち払ったと　伝えられる　剣　だが\nいまは　さびて　ボロボロに　なっている。"
    en: "It is said that a hero used this sword to halt a terrible\ndisaster in ancient times. But it’s grown rusty and worn."
    fr: "On raconte que cette épée fut jadis utilisée\npar un héros pour vaincre une calamité.\nÀ présent, elle est tout usée et rouillée."
    it: "Si racconta che in passato un eroe riuscì a respingere\nla calamità servendosi di questa spada. Ora è tutta\narrugginita e rovinata."
    de: "Mit diesem Schwert soll ein Held einstmals großes\nUnheil abgewendet haben. Rost sowie der Zahn der\nZeit haben jedoch ihre Spuren hinterlassen."
    es: "Cuenta una antigua leyenda que un valiente héroe\nblandió esta espada para hacer frente a un cataclismo,\npero ahora está oxidada y en un estado lamentable."
    ko: "먼 옛날의 영웅이 재앙을 막는 데\n사용했다고 전해지는 검이지만\n지금은 녹이 슬고 닳아 버렸다."
    zh_simp: "据说很久以前，英雄就是\n拿着这把剑驱走了灾厄。\n而现在早已变得锈迹斑斑。"
    zh_trad: "據說在很久以前，英雄就是\n用這把劍來擊退災厄。\n但現在已經生鏽，變得破爛不堪。"
sablenite:
  names:
    jp_kana: ヤミラミナイト
    jp_kanji: ヤミラミナイト
    en: Sablenite
    fr: Ténéfixite
    it: Sableyite
    de: Zobirisnit
    es: Sableynita
    ko: 깜까미나이트
    zh_simp: 勾魂眼进化石
    zh_trad: 勾魂眼進化石
  descriptions:
    jp_kana: "ヤミラミに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    jp_kanji: "ヤミラミに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Sableye hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Ténéfix, elle lui permet de méga-évoluer\ndurant un combat."
    it: "Una delle misteriose Megapietre. Data a Sableye,\ngli permette di megaevolversi durante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Zobiris getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Sableye en combate."
    ko: "깜까미에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让勾魂眼携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓勾魂眼攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
sableye_gem:
  names:
    jp_kana: ヤミラミのほうせき
    jp_kanji: ヤミラミのほうせき
    en: Sableye Gem
    fr: Joyau de Ténéfix
    it: Gemma di Sableye
    de: Zobiris-Edelstein
    es: Gema de Sableye
    ko: 깜까미의보석
    zh_simp: 勾魂眼的宝石
    zh_trad: 勾魂眼的寶石
  descriptions:
    jp_kana: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
    jp_kanji: "ポケモンが　うっかり　落としたもの。\nわざマシンを　作るために　必要。"
