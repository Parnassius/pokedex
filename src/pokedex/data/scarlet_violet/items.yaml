destiny_knot:
  names:
    jp_kana: あかいいと
    jp_kanji: あかいいと
    en: Destiny Knot
    fr: Nœud Destin
    it: Destincomune
    de: Fatumknoten
    es: Lazo Destino
    ko: 빨간실
    zh_simp: 红线
    zh_trad: 紅線
  descriptions:
    jp_kana: "細くて　長い　真っ赤な糸。\n持たせると　メロメロに　なったとき\n相手も　メロメロに　できる。"
    jp_kanji: "細くて　長い　真っ赤な糸。\n持たせると　メロメロに　なったとき\n相手も　メロメロに　できる。"
    en: "An item to be held by a Pokémon. Should the holder of\nthis bright-red thread become infatuated, the Pokémon\nit is infatuated with will be similarly afflicted."
    fr: "Un long fil rouge vif à faire tenir à un Pokémon.\nSi le porteur tombe amoureux, l’ennemi aussi."
    it: "Gomitolo di filo rosso sottile da dare a un Pokémon.\nSe il Pokémon rimane infatuato, contagia anche\nl’avversario."
    de: "Ein Item zum Tragen. Wird der Träger betört, gilt dies\nauch für den Angreifer."
    es: "Un hilo largo y delgado de color rojo que transmite\nel enamoramiento del portador al Pokémon del que\nse ha enamorado."
    ko: "가늘고 긴 새빨간 실.\n지니게 하면 자신이 헤롱헤롱해졌을 때\n상대도 헤롱헤롱해지게 된다."
    zh_simp: "长长的鲜红色细线。\n携带后，在自己着迷时\n能让对手也着迷。"
    zh_trad: "長長的大紅色細線。\n攜帶後，陷入著迷狀態時，\n也能使對手陷入著迷狀態。"
devon_parts:
  names:
    jp_kana: デボンのにもつ
    jp_kanji: デボンのにもつ
    en: Devon Parts
    fr: Pack Devon
    it: Merce Devon
    de: Devon-Waren
    es: Piezas Devon
    ko: 데봉화물
    zh_simp: 得文的物品
    zh_trad: 得文的物品
  descriptions:
    jp_kana: "デボンで　つくられた\n何かの　パーツが\n入っている　にもつ。"
    jp_kanji: "デボンで　つくられた\n何かの　パーツが\n入っている　にもつ。"
    en: "A case that contains mechanical parts of some sort\nmade by the Devon Corporation."
    fr: "Une valise qui contient des pièces mécaniques\nfabriquées par la société Devon."
    it: "Questa valigetta contiene pezzi meccanici prodotti\ndalla Devon."
    de: "Ein Metallkoffer mit irgendwelchen Bauteilen, die von\nder Devon Corporation angefertigt wurden."
    es: Contiene piezas de algo fabricado por Devon S. A.
    ko: "데봉에서 만들어진\n무언가의 파츠가\n들어 있는 화물."
    zh_simp: "此物品里面放着的是\n得文制造的某种零件。"
    zh_trad: "裡面放有得文製造的\n某種零件的物品。"
devon_scope:
  names:
    jp_kana: デボンスコープ
    jp_kanji: デボンスコープ
    en: Devon Scope
    fr: Devon Scope
    it: Devonscopio
    de: Devon-Scope
    es: Detector Devon
    ko: 데봉스코프
    zh_simp: 得文侦测镜
    zh_trad: 得文偵測鏡
  descriptions:
    jp_kana: "見えない　ポケモンに\n反応して　音をだす\nデボンの　特製品。"
    jp_kanji: "見えない　ポケモンに\n反応して　音をだす\nデボンの　特製品。"
    en: "A special device made by Devon Corporation that\nsignals the presence of any unseen Pokémon."
    fr: "Ce produit en série limitée de Devon émet un signal\nsonore pour indiquer la présence de Pokémon invisibles."
    it: "Congegno prodotto dalla Devon che rileva la presenza\ndi Pokémon nascosti emettendo un segnale sonoro."
    de: "Ein von der Devon Corporation hergestelltes Gerät,\ndas mit einem Signalton auf unsichtbare Pokémon\nreagiert."
    es: "Artilugio creado por Devon S. A. que reacciona a la\npresencia de Pokémon invisibles emitiendo sonidos."
    ko: "보이지 않는 포켓몬에\n반응하여 소리를 내는\n데봉의 특제품."
    zh_simp: "会对看不见的宝可梦起反应，\n并发出声音的得文特制产品。"
    zh_trad: "會對看不見的寶可夢起反應，\n並發出聲音的得文特製產品。"
devon_scuba_gear:
  names:
    jp_kana: デボンボンベ
    jp_kanji: デボンボンベ
    en: Devon Scuba Gear
    fr: Plongeur Devon
    it: Maschera Devon
    de: Devon-Atemgerät
    es: Bombona Devon
    ko: 데봉봄베
    zh_simp: 得文潜水装备
    zh_trad: 得文潛水裝備
  descriptions:
    jp_kana: "ダイビング中に　身につける\n酸素補給用の　マスク。\nデボンで　つくられた。"
    jp_kanji: "ダイビング中に　身につける\n酸素補給用の　マスク。\nデボンで　つくられた。"
    en: "A device made by Devon Corporation that provides\noxygen to users during the use of Dive."
    fr: "Un masque à oxygène fabriqué par la société Devon\net utilisé pour la plongée sous-marine."
    it: "Maschera di ossigeno prodotta dalla Devon,\nutile durante le immersioni."
    de: "Eine von der Devon Corporation hergestellte Maske,\ndie Taucher unter Wasser mit ausreichend Sauerstoff\nversorgt."
    es: "Máscara que surte de oxígeno durante las inmersiones\nen el agua. Producto de Devon S. A."
    ko: "다이빙할 때 몸에 착용하는\n산소 호흡용 마스크.\n데봉에서 만들어졌다."
    zh_simp: "潜水时装备在身上\n用来呼吸氧气的面罩。\n得文制造。"
    zh_trad: "潛水時裝備在身上\n用來呼吸氧氣的面罩。\n得文製造。"
