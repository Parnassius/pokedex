    zh_trad: 焦點鏡
  descriptions:
    jp_kana: "弱点が　見える　レンズ。\n持たせた　ポケモンの技が\n急所に　当たりやすくなる。"
    jp_kanji: "弱点が　見える　レンズ。\n持たせた　ポケモンの技が\n急所に　当たりやすくなる。"
    en: "An item to be held by a Pokémon. It’s a lens for scoping\nout weak points. It boosts the holder’s critical-hit ratio."
    fr: "Objet à tenir. Une lentille qui augmente le taux\nde critiques du porteur."
    it: "Strumento da dare a un Pokémon. Lente che aumenta\nla probabilità di sferrare brutti colpi."
    de: Ein Item zum Tragen. Es erhöht die Volltrefferquote.
    es: "Su lente permite detectar los puntos débiles de un\nPokémon y aumentar con ello la probabilidad de asestar\nun golpe crítico. Debe llevarlo un Pokémon."
    ko: "약점이 보이는 렌즈.\n지니게 한 포켓몬의 기술이\n급소에 맞기 쉬워진다."
    zh_simp: "能看见弱点的镜片。\n携带它的宝可梦的招式\n会变得容易击中要害。"
    zh_trad: "能看見弱點的鏡片。\n攜帶它的寶可夢的招式\n會變得容易擊中要害。"
