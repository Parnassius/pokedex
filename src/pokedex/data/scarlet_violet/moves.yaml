infestation:
  names:
    jp_kana: まとわりつく
    jp_kanji: まとわりつく
    en: Infestation
    fr: Harcèlement
    it: Assillo
    de: Plage
    es: Acoso
    ko: 엉겨붙기
    zh_simp: 纠缠不休
    zh_trad: 死纏爛打
  descriptions:
    jp_kana: "４ー５ターンの　間　相手に\nまとわりついて　攻撃する。\nそのあいだ　相手は　逃げられない。"
    jp_kanji: "４ー５ターンの　間　相手に\nまとわりついて　攻撃する。\nそのあいだ　相手は　逃げられない。"
    en: "The target is infested and attacked for four to five turns.\nThe target can’t flee during this time."
    fr: "Cette attaque perdure pendant quatre à cinq tours.\nLa cible ne peut pas quitter le terrain pendant\ncette période."
    it: "Il Pokémon attacca il bersaglio tormentandolo per\nquattro o cinque turni, durante i quali gli impedisce\ndi lasciare il campo."
    de: "Der Anwender fällt vier bis fünf Runden lang wie eine\nPlage über das Ziel her und greift es an. Dabei wird es an\nder Flucht beziehungsweise am Auswechseln gehindert."
    es: "Hostiga al objetivo durante cuatro o cinco turnos e\nimpide que pueda huir o ser cambiado por otro mientras\ntanto."
    ko: "4~5턴 동안 상대에게\n엉겨 붙어서 공격한다.\n그동안 상대는 도망갈 수 없다."
    zh_simp: "在４～５回合内\n死缠烂打地进行攻击。\n在此期间对手将无法逃走。"
    zh_trad: "在４～５回合內\n死纏爛打地進行攻擊。\n在此期間對手將無法逃走。"
ingrain:
  names:
    jp_kana: ねをはる
    jp_kanji: ねをはる
    en: Ingrain
    fr: Racines
    it: Radicamento
    de: Verwurzler
    es: Arraigo
    ko: 뿌리박기
    zh_simp: 扎根
    zh_trad: 扎根
  descriptions:
    jp_kana: "大地に　根を　張り\n毎ターン　自分の　ＨＰを　回復する。\n根を　張っているので　入れ替えられない。"
    jp_kanji: "大地に　根を　張り\n毎ターン　自分の　ＨＰを　回復する。\n根を　張っているので　入れ替えられない。"
    en: "The user lays roots that restore its own HP every turn.\nBecause the user is now rooted, it can’t switch out."
    fr: "Le lanceur plante ses racines et récupère des PV\nà chaque tour. Une fois enraciné, il ne peut plus quitter\nle terrain."
    it: "Il Pokémon mette delle radici che gli fanno recuperare\nPS a ogni turno. Non può più essere sostituito."
    de: "Die Verwurzelung des Anwenders füllt jede Runde\nseine KP auf, aber hindert ihn dafür an der Flucht\nbeziehungsweise am Auswechseln."
    es: "Echa raíces para recuperar PS en cada turno,\npero impide que pueda huir o ser cambiado por otro."
    ko: "대지에 뿌리를 박아\n매 턴마다 자신의 HP를 회복한다.\n뿌리 박고 있으므로 교체할 수 없다."
    zh_simp: "在大地上扎根，\n每回合回复自己的ＨＰ。\n因为扎根了，所以不能替换宝可梦。"
    zh_trad: "在大地上扎根，\n每回合會回復自己的ＨＰ。\n但扎根之後無法進行替換。"
instruct:
  names:
    jp_kana: さいはい
    jp_kanji: さいはい
    en: Instruct
    fr: Sommation
    it: Imposizione
    de: Kommando
    es: Mandato
    ko: 지휘
    zh_simp: 号令
    zh_trad: 號令
  descriptions:
    jp_kana: "相手が　出した　技を\n指示して　もう一度\n出させることが　できる。"
    jp_kanji: "相手が　出した　技を\n指示して　もう一度\n出させることが　できる。"
    en: "The user instructs the target to reuse the move last used\nby the target."
    fr: "Force la cible à lancer immédiatement la dernière\ncapacité qu’elle a utilisée."
    it: "Il Pokémon può costringere il bersaglio a ripetere\nimmediatamente l’ultima mossa che ha sferrato."
    de: "Der Anwender befiehlt dem Ziel, dessen zuletzt\nausgeführte Attacke sofort wieder einzusetzen."
    es: "Fuerza al objetivo a repetir inmediatamente su último\nmovimiento."
    ko: "상대에게 지시하여\n상대가 쓴 기술을\n다시 한번 쓰게 할 수 있다."
    zh_simp: "向对手下达指示，\n让其再次使出刚才的招式。"
    zh_trad: "對手使出招式之後，\n能夠透過指令讓對手\n再次使出相同招式。"
ion_deluge:
  names:
    jp_kana: プラズマシャワー
    jp_kanji: プラズマシャワー
    en: Ion Deluge
    fr: Déluge Plasmique
    it: Pioggiaplasma
    de: Plasmaschauer
    es: Cortina Plasma
    ko: 플라스마샤워
    zh_simp: 等离子浴
    zh_trad: 等離子浴
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
iron_defense:
  names:
    jp_kana: てっぺき
    jp_kanji: てっぺき
    en: Iron Defense
    fr: Mur de Fer
    it: Ferroscudo
    de: Eisenabwehr
    es: Defensa Férrea
    ko: 철벽
    zh_simp: 铁壁
    zh_trad: 鐵壁
  descriptions:
    jp_kana: "皮膚を　鉄のように\n硬くする　ことで\n自分の　防御を　ぐーんと　あげる。"
    jp_kanji: "皮膚を　鉄のように\n硬くする　ことで\n自分の　防御を　ぐーんと　あげる。"
    en: "The user hardens its body’s surface like iron, sharply\nboosting its Defense stat."
    fr: "L’épiderme du lanceur devient dur comme du fer,\nce qui augmente beaucoup sa Défense."
    it: "Il corpo del Pokémon si indurisce come il ferro,\nfacendone aumentare di molto la Difesa."
    de: "Anwender stärkt den Körper, um den\nVerteidigungs-Wert stark zu erhöhen."
    es: "Fortalece el cuerpo como si fuera de hierro y aumenta\nmucho la Defensa."
    ko: "피부를 쇠처럼\n단단하게 만듦으로써\n자신의 방어를 크게 올린다."
    zh_simp: "将皮肤变得坚硬如铁，\n从而大幅提高自己的防御。"
    zh_trad: "將皮膚變得堅硬如鐵，\n大幅提高自己的防禦。"
iron_head:
  names:
    jp_kana: アイアンヘッド
    jp_kanji: アイアンヘッド
    en: Iron Head
    fr: Tête de Fer
    it: Metaltestata
    de: Eisenschädel
    es: Cabeza de Hierro
    ko: 아이언헤드
    zh_simp: 铁头
    zh_trad: 鐵頭
  descriptions:
    jp_kana: "鋼の　ような\n硬い　頭で　攻撃する。\n相手を　ひるませることが　ある。"
    jp_kanji: "鋼の　ような\n硬い　頭で　攻撃する。\n相手を　ひるませることが　ある。"
    en: "The user slams the target with its steel-hard head.\nThis may also make the target flinch."
    fr: "Le lanceur heurte la cible avec sa tête dure\ncomme de l’acier, ce qui peut aussi l’apeurer."
    it: "Il Pokémon attacca il bersaglio con la sua testa dura\ncome l’acciaio. Può anche farlo tentennare."
    de: "Ziel wird durch stahlharten Kopf des Anwenders\ngetroffen und schreckt eventuell zurück."
    es: "Ataca con su cabeza dura como el hierro. Puede hacer\nque el objetivo se amedrente."
    ko: "강철과 같은\n단단한 머리로 공격한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "用钢铁般\n坚硬的头部进行攻击。\n有时会使对手畏缩。"
    zh_trad: "用如同鋼鐵般\n堅硬的頭部進行攻擊。\n有時會讓對手畏縮。"
iron_tail:
  names:
    jp_kana: アイアンテール
    jp_kanji: アイアンテール
    en: Iron Tail
    fr: Queue de Fer
    it: Codacciaio
    de: Eisenschweif
    es: Cola Férrea
    ko: 아이언테일
    zh_simp: 铁尾
    zh_trad: 鐵尾
  descriptions:
    jp_kana: "硬い　しっぽで\n相手を　たたきつけて　攻撃する。\n相手の　防御を　さげることが　ある。"
    jp_kanji: "硬い　しっぽで\n相手を　たたきつけて　攻撃する。\n相手の　防御を　さげることが　ある。"
    en: "The target is slammed with a steel-hard tail. This may\nalso lower the target’s Defense stat."
    fr: "Le lanceur attaque la cible avec une queue de fer,\nce qui peut aussi baisser la Défense de la cible."
    it: "Il Pokémon attacca colpendo il bersaglio con una\nrobusta coda che può anche ridurne la Difesa."
    de: "Attacke mit hartem Eisenschweif. Senkt eventuell den\nVerteidigungs-Wert des Zieles."
    es: "Ataca con una cola férrea y puede reducir la Defensa\ndel objetivo."
    ko: "단단한 꼬리로\n상대를 힘껏 쳐서 공격한다.\n상대의 방어를 떨어뜨릴 때가 있다."
    zh_simp: "使用坚硬的尾巴\n摔打对手进行攻击。\n有时会降低对手的防御。"
    zh_trad: "將堅硬的尾巴\n甩向對手進行攻擊。\n有時會降低對手的防禦。"
ivy_cudgel:
  names:
    jp_kana: ツタこんぼう
    jp_kanji: ツタこんぼう
    en: Ivy Cudgel
    fr: Massue Liane
    it: Clava di Liane
    de: Rankenkeule
    es: Garrote Liana
    ko: 덩굴방망이
    zh_simp: 棘藤棒
    zh_trad: 棘藤棒
  descriptions:
    jp_kana: "ツタを　まきつけた　こん棒で　なぐる。\nかぶっている　お面で　タイプが　変わる。\n急所に　当たりやすい。"
    jp_kanji: "ツタを　まきつけた　こん棒で　なぐる。\nかぶっている　お面で　タイプが　変わる。\n急所に　当たりやすい。"
    en: "The user strikes with an ivy-wrapped cudgel. This move’s\ntype changes depending on the mask worn by the user,\nand it has a heightened chance of landing a critical hit."
    fr: "Le lanceur frappe la cible à l’aide d’une massue entourée\nd’une liane. Le type de cette capacité varie en fonction\ndu masque que porte le lanceur. Taux de critiques élevé."
    it: "Il Pokémon colpisce con una clava avvolta da liane.\nIl tipo della mossa varia in base alla maschera\nindossata. Probabile brutto colpo."
    de: "Der Anwender schlägt mit einer rankenumschlungenen\nKeule zu. Der Typ dieser Attacke hängt von der Maske\ndes Anwenders ab. Hohe Volltrefferquote."
    es: "Golpea con un garrote que forma enrollando su liana.\nEl tipo del movimiento varía según la máscara que lleve\npuesta el usuario. Suele asestar un golpe crítico."
    ko: "덩굴을 휘감은 방망이로 때린다.\n쓰고 있는 가면에 따라 타입이 바뀐다.\n급소에 맞기 쉽다."
    zh_simp: "用缠有藤蔓的棍棒殴打。\n属性会随所戴的面具而改变。\n容易击中要害。"
    zh_trad: "用纏繞著藤蔓的棍棒毆打。\n屬性會隨著所戴的面具而改變。\n容易擊中要害。"
jaw_lock:
  names:
    jp_kana: くらいつく
    jp_kanji: くらいつく
    en: Jaw Lock
    fr: Croque Fort
    it: Morsostretto
    de: Fesselbiss
    es: Presa Maxilar
    ko: 물고버티기
    zh_simp: 紧咬不放
    zh_trad: 緊咬不放
  descriptions:
    jp_kana: "お互い　ひんしに　なるまで\n交代が　できなくなる。　どちらかの\nポケモンが　いなくなると　効果は消える。"
    jp_kanji: "お互い　ひんしに　なるまで\n交代が　できなくなる。　どちらかの\nポケモンが　いなくなると　効果は消える。"
    en: "This move prevents the user and the target from\nswitching out until either of them faints. The effect\ngoes away if either of the Pokémon leaves the field."
    fr: "Le lanceur et sa cible ne peuvent plus être échangés\njusqu’à ce que l’un d’entre eux tombe K.O. L’effet est\nannulé si l’un des deux Pokémon quitte le terrain."
    it: "Il Pokémon e il bersaglio non possono essere sostituiti\nfinché non vanno KO. L’effetto svanisce se uno dei due\nlascia il campo."
    de: "Anwender und Ziel können nicht ausgetauscht werden,\nbis einer von ihnen kampfunfähig wird. Der Effekt\nendet, wenn eines der Pokémon das Kampffeld verlässt."
    es: "Impide que tanto el atacante como el defensor puedan\nhuir o ser cambiados por otros hasta que uno de ellos se\ndebilite o abandone el terreno de combate."
    ko: "어느 한쪽이 기절할 때까지\n교체할 수 없게 된다. 한쪽의\n포켓몬이 없어지면 효과가 사라진다."
    zh_simp: "使双方直到一方昏厥为止\n无法替换宝可梦。\n其中一方退场则可以解除效果。"
    zh_trad: "使攻擊對象及自己在陷入瀕死前\n都無法進行替換。當兩隻寶可夢\n其中一方退場時，效果就會消失。"
jet_punch:
  names:
    jp_kana: ジェットパンチ
    jp_kanji: ジェットパンチ
    en: Jet Punch
    fr: Poing Sonique
    it: Pugnojet
    de: Düsenhieb
    es: Puño Jet
    ko: 제트펀치
    zh_simp: 喷射拳
    zh_trad: 噴射拳
  descriptions:
    jp_kana: "激流を　こぶしに　まとって\n目にも　留まらぬ　パンチを　くりだす。\n必ず　先制攻撃　できる。"
    jp_kanji: "激流を　こぶしに　まとって\n目にも　留まらぬ　パンチを　くりだす。\n必ず　先制攻撃　できる。"
    en: "The user summons a torrent around its fist and punches\nat blinding speed. This move always goes first."
    fr: "Le lanceur enveloppe son poing d’un torrent furieux\net attaque si rapidement qu’on peine à le discerner.\nFrappe en priorité."
    it: "Il Pokémon avvolge il pugno in una corrente impetuosa\ne sferra un colpo a una tale velocità da rendersi quasi\ninvisibile. Questo attacco ha priorità alta."
    de: "Bei dieser Erstschlag-Attacke hüllt der Anwender seine\nFaust in einen Strudel und greift mit einem extrem\nschnellen Hieb an."
    es: "Se envuelve el puño con un torrente y propina un\ngolpe a tal velocidad que resulta casi imperceptible.\nEste movimiento tiene prioridad alta."
    ko: "거센 물살을 주먹에 둘러\n눈에 보이지 않는 속도로 펀치를 날린다.\n반드시 선제공격할 수 있다."
    zh_simp: "将激流覆盖于拳头，\n以肉眼无法辨识的速度打出拳击。\n必定能够先制攻击。"
    zh_trad: "讓激流圍繞在拳頭上，\n以迅雷不及掩耳之勢出拳。\n必定能夠發動先制攻擊。"
judgment:
  names:
    jp_kana: さばきのつぶて
    jp_kanji: さばきのつぶて
    en: Judgment
    fr: Jugement
    it: Giudizio
    de: Urteilskraft
    es: Sentencia
    ko: 심판의뭉치
    zh_simp: 制裁光砾
    zh_trad: 制裁光礫
  descriptions:
    jp_kana: "無数の　光弾を　相手に　放出する。\n自分の　持つ　プレートに　より\nタイプが　変わる。"
    jp_kanji: "無数の　光弾を　相手に　放出する。\n自分の　持つ　プレートに　より\nタイプが　変わる。"
    en: "The user releases countless shots of light at the target.\nThis move’s type changes depending on the kind of\nplate held by the user."
    fr: "Le lanceur libère une myriade de rayons de lumière.\nLe type varie selon la plaque que tient le lanceur."
    it: "Il Pokémon rilascia numerosi colpi di luce. Il tipo varia\na seconda della lastra che ha."
    de: "Anwender feuert unzählige Lichtstrahlen ab. Deren Typ\nhängt von der getragenen Tafel ab."
    es: "Emite incontables haces de luz. El tipo del movimiento\nvaría según la tabla que lleve el usuario."
    ko: "무수한 광탄을 상대에게 방출한다.\n자신이 가지고 있는 플레이트에 따라\n타입이 바뀐다."
    zh_simp: "向对手放出无数的光弹。\n属性会根据自己\n携带的石板不同而改变。"
    zh_trad: "向對手放出無數的光彈。\n招式的屬性會隨著自己\n攜帶的石板不同而改變。"
jump_kick:
  names:
    jp_kana: とびげり
    jp_kanji: とびげり
    en: Jump Kick
    fr: Pied Sauté
    it: Calciosalto
    de: Sprungkick
    es: Patada Salto
    ko: 점프킥
    zh_simp: 飞踢
    zh_trad: 飛踢
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
jungle_healing:
  names:
    jp_kana: ジャングルヒール
    jp_kanji: ジャングルヒール
    en: Jungle Healing
    fr: Selve Salvatrice
    it: Giunglacura
    de: Dschungelheilung
    es: Cura Selvática
    ko: 정글힐
    zh_simp: 丛林治疗
    zh_trad: 叢林治療
  descriptions:
    jp_kana: "ジャングルと　一体化して\n自分と　場にいる　味方の\nＨＰと　状態を　回復する。"
    jp_kanji: "ジャングルと　一体化して\n自分と　場にいる　味方の\nＨＰと　状態を　回復する。"
    en: "The user becomes one with the jungle, restoring HP and\ncuring status conditions for itself and its ally Pokémon\ncurrently in the battle."
    fr: "Le lanceur fait appel au pouvoir de la jungle pour\nrestaurer les PV et soigner les altérations d’état\nde ses alliés et de lui-même."
    it: "Il Pokémon diventa tutt’uno con la giungla,\nripristinando i PS e curando i problemi di stato\nper sé e per gli alleati in campo."
    de: "Der Anwender wird eins mit dem Dschungel und heilt\nbei sich und seinen am Kampf beteiligten Mitstreitern\nKP und hebt jegliche Statusprobleme auf."
    es: "Al entrar en plena armonía con la selva, el usuario cura\nproblemas de estado y restaura PS no solo de sí mismo,\nsino también de los aliados presentes en el terreno."
    ko: "정글과 하나가 되어\n자신과 배틀에 나와 있는 같은 편의\nHP와 모든 상태를 회복한다."
    zh_simp: "与丛林融为一体，\n回复自己和场上同伴的ＨＰ和状态。"
    zh_trad: "和叢林化為一體，\n回復自己和場上同伴的ＨＰ和狀態。"
karate_chop:
  names:
    jp_kana: からてチョップ
    jp_kanji: からてチョップ
    en: Karate Chop
    fr: Poing Karaté
    it: Colpokarate
    de: Karateschlag
    es: Golpe Kárate
    ko: 태권당수
    zh_simp: 空手劈
    zh_trad: 空手劈
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
