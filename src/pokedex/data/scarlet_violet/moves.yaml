    fr: "La cible est prise dans un tourbillon de feu qui dure\nde quatre à cinq tours."
    it: "Il Pokémon intrappola il bersaglio in un turbine di fuoco\nche dura per quattro o cinque turni."
    de: "Das Ziel wird in einen Feuersog gezogen, der vier bis\nfünf Runden aktiv ist."
    es: "El objetivo queda atrapado en una tormenta de fuego\nque dura de cuatro a cinco turnos."
    ko: "세차게 타오르는 불꽃 속에\n4~5턴 동안 상대를\n가두어 공격한다."
    zh_simp: "将对手困在\n熊熊燃烧的火焰中，\n在４～５回合内进行攻击。"
    zh_trad: "將對手困在\n熊熊燃燒的火焰中，\n在４～５回合內進行攻擊。"
