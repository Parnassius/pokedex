    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
slack_off:
  names:
    jp_kana: なまける
    jp_kanji: なまける
    en: Slack Off
    fr: Paresse
    it: Pigro
    de: Tagedieb
    es: Relajo
    ko: 게으름피우기
    zh_simp: 偷懒
    zh_trad: 偷懶
  descriptions:
    jp_kana: "怠けて　やすむ。\n自分の　ＨＰを　最大ＨＰの\n半分　回復する。"
    jp_kanji: "怠けて　やすむ。\n自分の　ＨＰを　最大ＨＰの\n半分　回復する。"
    en: "The user slacks off, restoring its own HP by up to half its\nmax HP."
    fr: "Le lanceur se tourne les pouces et récupère\njusqu’à la moitié de ses PV max."
    it: "Il Pokémon si rilassa recuperando metà dei propri\nPS massimi."
    de: "Durch Müßiggang werden KP des Anwenders um 50 %\nder maximalen KP aufgefüllt."
    es: "El usuario se relaja y restaura la mitad de sus PS\nmáximos."
    ko: "게으름 피우며 쉰다.\n자신의 HP를 최대 HP의\n절반만큼 회복한다."
    zh_simp: "偷懒休息。\n回复自己最大ＨＰ的一半。"
    zh_trad: "偷懶休息。\n回復自己最大ＨＰ的一半。"
slam:
  names:
    jp_kana: たたきつける
    jp_kanji: たたきつける
    en: Slam
    fr: Souplesse
    it: Schianto
    de: Slam
    es: Atizar
    ko: 힘껏치기
    zh_simp: 摔打
    zh_trad: 摔打
  descriptions:
    jp_kana: "長い　しっぽや　つるなどを　使い\n相手を　たたきつけて　攻撃する。"
    jp_kanji: "長い　しっぽや　つるなどを　使い\n相手を　たたきつけて　攻撃する。"
    en: "The target is slammed with a long tail, vines, or the like\nto inflict damage."
    fr: "Le lanceur utilise l’un de ses membres, tels qu’une queue\nou une liane, pour infliger des dégâts à la cible."
    it: "Il Pokémon attacca il bersaglio con la coda, con una\nliana o con qualcosa di simile."
    de: "Schlag mit einem langen Schweif, einer Ranke oder\nÄhnlichem."
    es: "Golpea con la cola o con lianas, por ejemplo, para\ncausar daño al objetivo."
    ko: "긴 꼬리나 덩굴 등을 사용해\n상대를 힘껏 쳐서 공격한다."
    zh_simp: "使用长长的尾巴或藤蔓等\n摔打对手进行攻击。"
    zh_trad: "將長長的尾巴或藤蔓等\n甩向對手進行攻擊。"
slash:
  names:
    jp_kana: きりさく
    jp_kanji: きりさく
    en: Slash
    fr: Tranche
    it: Lacerazione
    de: Schlitzer
    es: Cuchillada
    ko: 베어가르기
    zh_simp: 劈开
    zh_trad: 劈開
  descriptions:
    jp_kana: "ツメや　カマなどで\n相手を　切り裂いて　攻撃する。\n急所に　当たりやすい。"
    jp_kanji: "ツメや　カマなどで\n相手を　切り裂いて　攻撃する。\n急所に　当たりやすい。"
    en: "The target is attacked with a slash of claws, scythes, or\nthe like. This move has a heightened chance of landing\na critical hit."
    fr: "Le lanceur donne un coup de griffe ou de faux.\nTaux de critiques élevé."
    it: "Il Pokémon attacca il bersaglio lacerandolo con artigli,\nfalci o altro. Probabile brutto colpo."
    de: "Hieb mit Klauen oder Ähnlichem.\nHohe Volltrefferquote."
    es: "Ataca con cuchillas o con pinzas. Suele asestar un\ngolpe crítico."
    ko: "발톱이나 낫 등으로\n상대를 베어 갈라서 공격한다.\n급소에 맞기 쉽다."
    zh_simp: "用爪子或镰刀等\n劈开对手进行攻击。\n容易击中要害。"
    zh_trad: "用爪子或鐮刀等\n劈開對手進行攻擊。\n容易擊中要害。"
sleep_powder:
  names:
    jp_kana: ねむりごな
    jp_kanji: ねむりごな
    en: Sleep Powder
    fr: Poudre Dodo
    it: Sonnifero
    de: Schlafpuder
    es: Somnífero
    ko: 수면가루
    zh_simp: 催眠粉
    zh_trad: 催眠粉
  descriptions:
    jp_kana: "眠くなる　粉を\nたくさん　ふりまいて\n相手を　眠り状態に　する。"
    jp_kanji: "眠くなる　粉を\nたくさん　ふりまいて\n相手を　眠り状態に　する。"
    en: "The user scatters a cloud of soporific dust that puts the\ntarget to sleep."
    fr: "Le lanceur répand une poudre soporifique\nqui endort la cible."
    it: "Investe il bersaglio con una grande nuvola\ndi polvere soporifera che lo fa addormentare."
    de: Verstreut Schlafpuder, der das Ziel in Schlaf versetzt.
    es: Esparce polvo que duerme al objetivo.
    ko: "잠이 오는 가루를\n많이 흩뿌려서\n상대를 잠듦 상태로 만든다."
    zh_simp: "撒出催眠粉，\n从而让对手陷入睡眠状态。"
    zh_trad: "撒出大量令人想睡的粉末，\n讓對手陷入睡眠狀態。"
sleep_talk:
  names:
    jp_kana: ねごと
    jp_kanji: ねごと
    en: Sleep Talk
    fr: Blabla Dodo
    it: Sonnolalia
    de: Schlafrede
    es: Sonámbulo
    ko: 잠꼬대
    zh_simp: 梦话
    zh_trad: 夢話
  descriptions:
    jp_kana: "自分が　おぼえている　技の　うち\nどれか　１つを　くりだす。\n自分が　寝ているときだけ　使える。"
    jp_kanji: "自分が　おぼえている　技の　うち\nどれか　１つを　くりだす。\n自分が　寝ているときだけ　使える。"
    en: "The user randomly uses one of the moves it knows.\nThis move can only be used while the user is asleep."
    fr: "Le lanceur utilise une de ses capacités au hasard.\nIl ne peut utiliser cette capacité que quand il dort."
    it: "Il Pokémon sferra a caso una delle proprie mosse, solo\nmentre dorme."
    de: "Anwender setzt per Zufall eine ihm bekannte Attacke\nein. Klappt nur, wenn der Anwender gerade schläft."
    es: "Mientras duerme, usa uno de sus movimientos elegido\nal azar."
    ko: "자신이 배운 기술 중\n하나를 무작위로 날린다.\n자신이 잠들어 있을 때만 쓸 수 있다."
    zh_simp: "从自己已学会的招式中\n任意使出１个。\n只能在自己睡觉时使用。"
    zh_trad: "從自己已學會的招式中\n隨機選出１個使出。\n只有在睡眠狀態時可以使用。"
sludge:
  names:
    jp_kana: ヘドロこうげき
    jp_kanji: ヘドロこうげき
    en: Sludge
    fr: Détritus
    it: Fango
    de: Schlammbad
    es: Residuos
    ko: 오물공격
    zh_simp: 污泥攻击
    zh_trad: 污泥攻擊
  descriptions:
    jp_kana: "汚い　ヘドロを\n相手に　投げつけて　攻撃する。\n毒状態に　することが　ある。"
    jp_kanji: "汚い　ヘドロを\n相手に　投げつけて　攻撃する。\n毒状態に　することが　ある。"
    en: "The user hurls unsanitary sludge at the target to inflict\ndamage. This may also poison the target."
    fr: "Des détritus toxiques sont projetés sur la cible,\nce qui peut aussi l’empoisonner."
    it: "Il Pokémon attacca lanciando fango malsano\nsul bersaglio. Può anche avvelenarlo."
    de: "Wirft Schlamm auf das Ziel. Dieses wird eventuell\nvergiftet."
    es: Arroja residuos al objetivo. Puede llegar a envenenar.
    ko: "더러운 오물을\n상대에게 내던져서 공격한다.\n독 상태로 만들 때가 있다."
    zh_simp: "用污泥投掷对手进行攻击。\n有时会让对手陷入中毒状态。"
    zh_trad: "向對手投擲污泥進行攻擊。\n有時會讓對手陷入中毒狀態。"
sludge_bomb:
  names:
    jp_kana: ヘドロばくだん
    jp_kanji: ヘドロばくだん
    en: Sludge Bomb
    fr: Bombe Beurk
    it: Fangobomba
    de: Matschbombe
    es: Bomba Lodo
    ko: 오물폭탄
    zh_simp: 污泥炸弹
    zh_trad: 污泥炸彈
  descriptions:
    jp_kana: "汚い　ヘドロを\n相手に　投げつけて　攻撃する。\n毒状態に　することが　ある。"
    jp_kanji: "汚い　ヘドロを\n相手に　投げつけて　攻撃する。\n毒状態に　することが　ある。"
    en: "The user hurls unsanitary sludge at the target to inflict\ndamage. This may also poison the target."
    fr: "Des détritus toxiques sont projetés sur la cible, ce qui\npeut aussi l’empoisonner."
    it: "Il Pokémon attacca lanciando fango malsano\nsul bersaglio. Può anche avvelenarlo."
    de: "Wirft Schlamm auf das Ziel. Dieses wird eventuell\nvergiftet."
    es: Arroja residuos al objetivo. Puede llegar a envenenar.
    ko: "더러운 오물을\n상대에게 내던져서 공격한다.\n독 상태로 만들 때가 있다."
    zh_simp: "用污泥投掷对手进行攻击。\n有时会让对手陷入中毒状态。"
    zh_trad: "向對手投擲污泥進行攻擊。\n有時會讓對手陷入中毒狀態。"
sludge_wave:
  names:
    jp_kana: ヘドロウェーブ
    jp_kanji: ヘドロウェーブ
    en: Sludge Wave
    fr: Cradovague
    it: Fangonda
    de: Schlammwoge
    es: Onda Tóxica
    ko: 오물웨이브
    zh_simp: 污泥波
    zh_trad: 污泥波
  descriptions:
    jp_kana: "ヘドロの　波で　自分の\n周りに　いるものを　攻撃する。\n毒状態に　することが　ある。"
    jp_kanji: "ヘドロの　波で　自分の\n周りに　いるものを　攻撃する。\n毒状態に　することが　ある。"
    en: "The user strikes everything around it by swamping the\narea with a giant sludge wave. This may also poison\nthose it hits."
    fr: "Une vague de détritus attaque tous les Pokémon\nautour du lanceur. Peut aussi empoisonner."
    it: "Chi la usa attacca con un’onda di fango gli altri Pokémon\nattorno. Può anche avvelenarli."
    de: "Greift alle Pokémon im Umkreis mit einer Schlammwelle\nan. Diese werden eventuell auch vergiftet."
    es: "Una onda tóxica que daña a los Pokémon adyacentes.\nPuede envenenar."
    ko: "오물 파도로 자신의\n주위에 있는 포켓몬을 공격한다.\n독 상태로 만들 때가 있다."
    zh_simp: "用污泥波攻击\n自己周围所有的宝可梦。\n有时会陷入中毒状态。"
    zh_trad: "用污泥波攻擊\n自己周圍所有的寶可夢。\n有時會讓對手陷入中毒狀態。"
smack_down:
  names:
    jp_kana: うちおとす
    jp_kanji: うちおとす
    en: Smack Down
    fr: Anti-Air
    it: Abbattimento
    de: Katapult
    es: Antiaéreo
    ko: 떨어뜨리기
    zh_simp: 击落
    zh_trad: 擊落
  descriptions:
    jp_kana: "石や　弾を　投げて　飛んでいる\n相手を　攻撃する。　相手は\nうち落とされて　地面に　落ちる。"
    jp_kanji: "石や　弾を　投げて　飛んでいる\n相手を　攻撃する。　相手は\nうち落とされて　地面に　落ちる。"
    en: "The user throws a stone or similar projectile to attack\nthe target. If the target is in the air, it will be knocked\ndown to the ground."
    fr: "Le lanceur jette un projectile sur la cible.\nSi cette dernière vole, elle tombe au sol."
    it: "Il Pokémon lancia una pietra o un proiettile\ncontro un bersaglio in volo e lo fa cadere."
    de: "Greift das Ziel mit Steinen und Wurfgeschossen an.\nFliegende Ziele fallen dabei vom Himmel und landen\nauf dem Boden."
    es: "Ataca lanzando una piedra o un proyectil. Si el objetivo\nestá en el aire, lo estrella contra el suelo."
    ko: "돌이나 구슬을 던져서 날고 있는\n상대를 공격한다.\n맞은 상대는 땅에 떨어진다."
    zh_simp: "扔石头或炮弹，\n攻击飞行的对手。\n对手会被击落，掉到地面。"
    zh_trad: "向空中的對手投擲石頭或炮彈等物體\n進行攻擊。對手會被擊落，掉到地面。"
smart_strike:
  names:
    jp_kana: スマートホーン
    jp_kanji: スマートホーン
    en: Smart Strike
    fr: Estocorne
    it: Sottilcorno
    de: Schmalhorn
    es: Cuerno Certero
    ko: 스마트혼
    zh_simp: 修长之角
    zh_trad: 修長之角
  descriptions:
    jp_kana: "とがった　つので　相手を\n突き刺して　攻撃する。\n攻撃は　必ず　命中する。"
    jp_kanji: "とがった　つので　相手を\n突き刺して　攻撃する。\n攻撃は　必ず　命中する。"
    en: "The user stabs the target with a sharp horn. This attack\nnever misses."
    fr: "Le lanceur transperce la cible avec sa corne effilée.\nN’échoue jamais."
    it: "Il Pokémon attacca il bersaglio con un corno appuntito.\nQuesto attacco va sempre a segno."
    de: "Der Anwender durchbohrt das Ziel mit seinem\nspitzen Horn. Diese Attacke trifft immer."
    es: "El usuario ensarta al objetivo con su afilada cornamenta.\nNo falla nunca."
    ko: "뾰족한 뿔로 상대를\n꿰찔러서 공격한다.\n공격은 반드시 명중한다."
    zh_simp: "用尖尖的角刺入对手进行攻击。\n攻击必定会命中。"
    zh_trad: "用尖尖的角刺進對手進行攻擊。\n攻擊必定會命中。"
smelling_salts:
  names:
    jp_kana: きつけ
    jp_kanji: きつけ
    en: Smelling Salts
    fr: Stimulant
    it: Maniereforti
    de: Riechsalz
    es: Estímulo
    ko: 정신차리기
    zh_simp: 清醒
    zh_trad: 清醒
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
smog:
  names:
    jp_kana: スモッグ
    jp_kanji: スモッグ
    en: Smog
    fr: Purédpois
    it: Smog
    de: Smog
    es: Polución
    ko: 스모그
    zh_simp: 浊雾
    zh_trad: 濁霧
  descriptions:
    jp_kana: "汚れた　ガスを\n相手に　吹きつけて　攻撃する。\n毒状態に　することが　ある。"
    jp_kanji: "汚れた　ガスを\n相手に　吹きつけて　攻撃する。\n毒状態に　することが　ある。"
    en: "The target is attacked with a discharge of filthy gases.\nThis may also poison the target."
    fr: "Le lanceur attaque à l’aide d’une éruption de gaz\nrépugnants qui peuvent aussi empoisonner la cible."
    it: "Il Pokémon attacca il bersaglio con una scarica di gas\nmaleodoranti. Può anche avvelenarlo."
    de: "Angriff mit Gas. Das Ziel kann eventuell vergiftet\nwerden."
    es: "Lanza un ataque con gases tóxicos que pueden llegar a\nenvenenar."
    ko: "더러운 가스를\n상대에게 내뿜어 공격한다.\n독 상태로 만들 때가 있다."
    zh_simp: "将肮脏的浓雾\n吹向对手进行攻击。\n有时会让对手陷入中毒状态。"
    zh_trad: "將骯髒的濃霧\n吹向對手進行攻擊。\n有時會讓對手陷入中毒狀態。"
smokescreen:
  names:
    jp_kana: えんまく
    jp_kanji: えんまく
    en: Smokescreen
    fr: Brouillard
    it: Muro di Fumo
    de: Rauchwolke
    es: Pantalla de Humo
    ko: 연막
    zh_simp: 烟幕
    zh_trad: 煙幕
  descriptions:
    jp_kana: "煙や　墨などを　吹きかけて\n相手の　命中率を　さげる。"
    jp_kanji: "煙や　墨などを　吹きかけて\n相手の　命中率を　さげる。"
    en: "The user releases an obscuring cloud of smoke or ink.\nThis lowers the target’s accuracy."
    fr: "Le lanceur disperse un nuage d’encre ou de fumée\nqui réduit la Précision de la cible."
    it: "Nuvola di fumo o inchiostro che riduce\nla precisione del bersaglio."
    de: "Senkt Genauigkeit des Zieles mit Rauch, Tinte oder\nÄhnlichem."
    es: "Reduce la Precisión del objetivo con una nube de humo\no tinta."
    ko: "연기나 먹물을 내뿜어\n상대의 명중률을 떨어뜨린다."
    zh_simp: "向对手喷出烟或墨汁等，\n从而降低对手的命中率。"
    zh_trad: "向對手噴出煙霧或墨汁等，\n降低對手的命中率。"
snap_trap:
  names:
    jp_kana: トラバサミ
    jp_kanji: トラバサミ
    en: Snap Trap
    fr: Troquenard
    it: Tagliola
    de: Fangeisen
    es: Cepo
    ko: 집게덫
    zh_simp: 捕兽夹
    zh_trad: 捕獸夾
  descriptions:
    jp_kana: "トラバサミで　捕らえて\n４－５ターンの　間\n相手を　はさんで　攻撃する。"
    jp_kanji: "トラバサミで　捕らえて\n４－５ターンの　間\n相手を　はさんで　攻撃する。"
    en: "The user snares the target in a snap trap that inflicts\ndamage for four to five turns."
    fr: "Le lanceur attrape sa cible dans un piège et lui inflige\ndes dégâts pendant quatre ou cinq tours."
    it: "Il Pokémon intrappola il bersaglio in una tagliola\ne lo attacca per quattro o cinque turni."
    de: "Das Ziel wird vier bis fünf Runden lang in einem\nFangeisen festgehalten und angegriffen."
    es: "Cepo que atrapa al objetivo durante cuatro o cinco\nturnos y le causa daño mientras se encuentra preso."
    ko: "집게덫으로 붙잡은 뒤\n4~5턴 동안\n상대를 끼워서 공격한다."
    zh_simp: "使用捕兽夹，\n在４～５回合内，\n夹住对手进行攻击。"
    zh_trad: "用捕獸夾，\n在４～５回合內\n夾住對手進行攻擊。"
snarl:
  names:
    jp_kana: バークアウト
    jp_kanji: バークアウト
    en: Snarl
    fr: Aboiement
    it: Urlorabbia
    de: Standpauke
    es: Alarido
    ko: 바크아웃
    zh_simp: 大声咆哮
    zh_trad: 大聲咆哮
  descriptions:
    jp_kana: "まくしたてる　ように　怒鳴りつけて\n相手の　特攻を　さげる。"
    jp_kanji: "まくしたてる　ように　怒鳴りつけて\n相手の　特攻を　さげる。"
    en: "The user yells as if it’s ranting about something, which\nlowers the Sp. Atk stats of opposing Pokémon."
    fr: "Le lanceur hurle sur la cible et baisse l’Attaque Spéciale\nde celle-ci."
    it: "Il Pokémon si mette a urlare per un po’, riducendo\nl’Attacco Speciale degli avversari."
    de: "Wäscht gegnerischen Pokémon mit einer ausführlichen\nStandpauke den Kopf und senkt dabei deren\nSpezial-Angriff."
    es: "Chillido desagradable que reduce el Ataque Especial del\nobjetivo."
    ko: "호되게 호통을 쳐서\n상대의 특수공격을 떨어뜨린다."
    zh_simp: "没完没了地大声斥责，\n从而降低对手的特攻。"
    zh_trad: "沒完沒了地向對手大聲咆哮，\n降低對手的特攻。"
snatch:
  names:
    jp_kana: よこどり
    jp_kanji: よこどり
    en: Snatch
    fr: Saisie
    it: Scippo
    de: Übernahme
    es: Robo
    ko: 가로채기
    zh_simp: 化为己用
    zh_trad: 搶奪
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
snipe_shot:
  names:
    jp_kana: ねらいうち
    jp_kanji: ねらいうち
    en: Snipe Shot
    fr: Tir de Précision
    it: Tiromirato
    de: Präzisionsschuss
    es: Disparo Certero
    ko: 노려맞히기
    zh_simp: 狙击
    zh_trad: 狙擊
  descriptions:
    jp_kana: "相手の　技を　引き受ける\n特性や　技の　影響を　無視して\n選んだ　相手を　攻撃　できる。"
    jp_kanji: "相手の　技を　引き受ける\n特性や　技の　影響を　無視して\n選んだ　相手を　攻撃　できる。"
    en: "The user ignores the effects of opposing Pokémon’s\nmoves and Abilities that draw in moves, allowing this\nmove to hit the chosen target."
    fr: "Le lanceur parvient toujours à viser la cible voulue,\nen ignorant l’effet des talents et des capacités capables\nde détourner les attaques."
    it: "Il Pokémon può attaccare un bersaglio ignorando\ngli effetti di mosse e abilità che attirano altre mosse."
    de: "Die Attacke richtet sich gegen das ausgewählte Ziel,\nunabhängig von Fähigkeiten oder Attacken, die Angriffe\nauf sich ziehen."
    es: "Permite atacar al objetivo seleccionado ignorando las\nhabilidades o movimientos que permiten a un Pokémon\ncentrar la atención sobre sí."
    ko: "상대의 기술을 끌어모으는\n특성이나 기술의 영향을 무시하고\n선택한 상대를 공격할 수 있다."
    zh_simp: "能无视具有吸引对手招式效果的\n特性或招式的影响。\n可以向选定的对手进行攻击。"
    zh_trad: "能不受具有吸引對手招式\n效果的特性或招式影響，\n向選定的對手進行攻擊。"
snore:
  names:
    jp_kana: いびき
    jp_kanji: いびき
    en: Snore
    fr: Ronflement
    it: Russare
    de: Schnarcher
    es: Ronquido
    ko: 코골기
    zh_simp: 打鼾
    zh_trad: 打鼾
  descriptions:
    jp_kana: "自分が　寝ているときに\n雑音を　だして　攻撃する。\n相手を　ひるませることが　ある。"
    jp_kanji: "自分が　寝ているときに\n雑音を　だして　攻撃する。\n相手を　ひるませることが　ある。"
    en: "This attack can be used only if the user is asleep.\nThe harsh noise may also make the target flinch."
    fr: "Une attaque qui ne fonctionne que si le lanceur\nest endormi. Le boucan peut aussi apeurer la cible."
    it: "Attacco che può essere usato solo mentre si dorme.\nIl chiasso assordante può anche far tentennare il\nbersaglio."
    de: "Attacke nur im Schlaf möglich. Ziel schreckt\neventuell zurück."
    es: "Fuerte ronquido que solo puede usarse dormido.\nPuede amedrentar al objetivo."
    ko: "자신이 잠들어 있을 때\n소음을 내어 공격한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "在自己睡觉时，\n发出噪音进行攻击。\n有时会使对手畏缩。"
    zh_trad: "在自己睡著時，\n發出噪音進行攻擊。\n有時會讓對手畏縮。"
snowscape:
  names:
    jp_kana: ゆきげしき
    jp_kanji: ゆきげしき
    en: Snowscape
    fr: Chute de Neige
    it: Vista Innevata
    de: Schneelandschaft
    es: Paisaje Nevado
    ko: 설경
    zh_simp: 雪景
    zh_trad: 雪景
  descriptions:
    jp_kana: "５ターンの　間　ゆきを　降らせる。\nこおりタイプの　防御が　あがる。"
    jp_kanji: "５ターンの　間　ゆきを　降らせる。\nこおりタイプの　防御が　あがる。"
    en: "The user summons a snowstorm lasting five turns.\nThis boosts the Defense stats of Ice types."
    fr: "Le lanceur invoque une tempête de neige qui\ndure cinq tours, ce qui augmente la Défense\ndes Pokémon de type Glace."
    it: "Il Pokémon causa una nevicata che dura per cinque turni\ne aumenta la Difesa dei Pokémon di tipo Ghiaccio."
    de: "Erzeugt fünf Runden lang Schnee. Dadurch wird die\nVerteidigung von Eis-Pokémon erhöht."
    es: "Desata una nevada que dura cinco turnos y aumenta la\nDefensa de los Pokémon de tipo Hielo."
    ko: "5턴 동안 눈을 내리게 한다.\n얼음타입의 방어가 올라간다."
    zh_simp: "在５回合内会下雪。\n冰属性的防御会提高。"
    zh_trad: "在５回合內會下雪。\n冰屬性寶可夢的防禦會提高。"
soak:
  names:
    jp_kana: みずびたし
    jp_kanji: みずびたし
    en: Soak
    fr: Détrempage
    it: Inondazione
    de: Überflutung
    es: Empapar
    ko: 물붓기
    zh_simp: 浸水
    zh_trad: 浸水
  descriptions:
    jp_kana: "たくさんの　水を　浴びせかけて\n相手を　みずタイプに　する。"
    jp_kanji: "たくさんの　水を　浴びせかけて\n相手を　みずタイプに　する。"
    en: "The user shoots a torrent of water that changes the\ntarget’s type to Water."
    fr: "Le lanceur projette beaucoup d’eau sur sa cible,\nqui devient de type Eau."
    it: "Il Pokémon proietta un lungo getto d’acqua contro\nil bersaglio e lo rende di tipo Acqua."
    de: "Überschüttet das Ziel mit Unmengen an Wasser und\nändert den Typ damit in Wasser um."
    es: "Potente tromba de agua que transforma al objetivo en\nun Pokémon de tipo Agua."
    ko: "많은 물을 끼얹어서\n상대를 물타입으로 바꾼다."
    zh_simp: "将大量的水泼向对手，\n从而使其变成水属性。"
    zh_trad: "朝對手灑下大量的水，\n讓對手變成水屬性。"
soft_boiled:
  names:
    jp_kana: タマゴうみ
    jp_kanji: タマゴうみ
    en: Soft-Boiled
    fr: E-Coque
    it: Covauova
    de: Weichei
    es: Ovocuración
    ko: 알낳기
    zh_simp: 生蛋
    zh_trad: 生蛋
  descriptions:
    jp_kana: "最大ＨＰの　半分\n自分の　ＨＰを　回復する。"
    jp_kanji: "最大ＨＰの　半分\n自分の　ＨＰを　回復する。"
    en: The user restores its own HP by up to half its max HP.
    fr: Le lanceur récupère jusqu’à la moitié de ses PV max.
    it: Il Pokémon recupera metà dei propri PS massimi.
    de: "KP des Anwenders werden um 50 % der maximalen KP\naufgefüllt."
    es: Restaura la mitad de los PS máximos del usuario.
    ko: "자신의 최대 HP 절반을\n회복한다."
    zh_simp: 回复自己最大ＨＰ的一半。
    zh_trad: 回復自己最大ＨＰ的一半。
solar_beam:
  names:
    jp_kana: ソーラービーム
    jp_kanji: ソーラービーム
    en: Solar Beam
    fr: Lance-Soleil
    it: Solarraggio
    de: Solarstrahl
    es: Rayo Solar
    ko: 솔라빔
    zh_simp: 日光束
    zh_trad: 日光束
  descriptions:
    jp_kana: "１ターン目に　光を　いっぱいに　集め\n２ターン目に　光の　束を\n発射して　攻撃する。"
    jp_kanji: "１ターン目に　光を　いっぱいに　集め\n２ターン目に　光の　束を\n発射して　攻撃する。"
    en: "The user gathers light on the first turn, then blasts a\nbundled beam on the next turn."
    fr: "Le lanceur absorbe une grande quantité de lumière\nau premier tour et envoie un rayon puissant au tour\nsuivant."
    it: "Il Pokémon assorbe luce al primo turno per attaccare\ncon un raggio intenso al turno successivo."
    de: "Absorbiert Licht in Runde 1. In Runde 2 erfolgt der\nAngriff."
    es: "El usuario absorbe luz en el primer turno y, en el\nsegundo, lanza un potente rayo de energía."
    ko: "1턴째에 빛을 가득 모아\n2턴째에 빛의 다발을\n발사하여 공격한다."
    zh_simp: "第１回合收集满满的日光，\n第２回合发射光束进行攻击。"
    zh_trad: "使用後的第１回合吸收大量日光，\n並於第２回合發射光束進行攻擊。"
solar_blade:
  names:
    jp_kana: ソーラーブレード
    jp_kanji: ソーラーブレード
    en: Solar Blade
    fr: Lame Solaire
    it: Lama Solare
    de: Solarklinge
    es: Cuchilla Solar
    ko: 솔라블레이드
    zh_simp: 日光刃
    zh_trad: 日光刃
  descriptions:
    jp_kana: "１ターン目に　光を　いっぱいに　集め\n２ターン目に　その　力を\n剣に　込めて　攻撃する。"
    jp_kanji: "１ターン目に　光を　いっぱいに　集め\n２ターン目に　その　力を\n剣に　込めて　攻撃する。"
    en: "The user gathers light on the first turn, then fills a blade\nwith the light’s energy and attacks on the next turn."
    fr: "Le lanceur absorbe une grande quantité de lumière au\npremier tour et attaque au second tour en libérant\ncette énergie sous la forme d’une lame."
    it: "Il Pokémon assorbe la luce al primo turno per poi\ncondensarla in una lama e attaccare al turno successivo."
    de: "In Runde 1 absorbiert der Anwender Licht, das er in\nRunde 2 zu einem Schwert formt, mit dem er dann\nangreift."
    es: "El usuario dedica un turno a absorber energía lumínica\ny concentrarla en forma de cuchilla, con la que ataca al\nobjetivo en el siguiente turno."
    ko: "1턴째에 빛을 가득 모아\n2턴째에 그 힘을\n검에 담아 공격한다."
    zh_simp: "第１回合收集满满的日光，\n第２回合将此力量\n集中在剑上进行攻击。"
    zh_trad: "使用後的第１回合吸收大量日光，\n並於第２回合把力量\n注入劍裡進行攻擊。"
sonic_boom:
  names:
    jp_kana: ソニックブーム
    jp_kanji: ソニックブーム
    en: Sonic Boom
    fr: Sonic Boom
    it: Sonicboom
    de: Ultraschall
    es: Bomba Sónica
    ko: 소닉붐
    zh_simp: 音爆
    zh_trad: 音爆
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
