    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
sucker_punch:
  names:
    jp_kana: ふいうち
    jp_kanji: ふいうち
    en: Sucker Punch
    fr: Coup Bas
    it: Sbigoattacco
    de: Tiefschlag
    es: Golpe Bajo
    ko: 기습
    zh_simp: 突袭
    zh_trad: 突襲
  descriptions:
    jp_kana: "相手より　先に　攻撃　できる。\n相手が　だす技が\n攻撃技でないと　失敗する。"
    jp_kanji: "相手より　先に　攻撃　できる。\n相手が　だす技が\n攻撃技でないと　失敗する。"
    en: "This move enables the user to attack first. This move fails\nif the target is not readying an attack."
    fr: "Permet au lanceur de frapper en priorité.\nÉchoue si la cible ne prépare pas une attaque."
    it: "Il Pokémon può attaccare per primo, ma fallisce\nse il bersaglio sferra una mossa che non è di attacco."
    de: "Erstschlag-Attacke, die aber nur gelingt, wenn das Ziel\ngerade eine Attacke vorbereitet, die KP-Schaden\nzufügen würde."
    es: "Permite atacar con prioridad. Falla si el objetivo no está\npreparando ningún ataque."
    ko: "상대보다 먼저 공격할 수 있다.\n상대가 쓴 기술이\n공격 기술이 아니면 실패한다."
    zh_simp: "可以比对手先攻击。\n对手使出的招式\n如果不是攻击招式则会失败。"
    zh_trad: "可以搶先對手一步進行攻擊。\n若對手使用的不是攻擊招式則會失敗。"
sunny_day:
  names:
    jp_kana: にほんばれ
    jp_kanji: にほんばれ
    en: Sunny Day
    fr: Zénith
    it: Giornodisole
    de: Sonnentag
    es: Día Soleado
    ko: 쾌청
    zh_simp: 大晴天
    zh_trad: 大晴天
  descriptions:
    jp_kana: "５ターンの　間　日差しを　強くして\nほのおタイプの　威力を　あげる。\nみずタイプの　威力は　さがる。"
    jp_kanji: "５ターンの　間　日差しを　強くして\nほのおタイプの　威力を　あげる。\nみずタイプの　威力は　さがる。"
    en: "The user intensifies the sun for five turns, powering up\nFire-type attacks. The sunlight also lowers the power of\nWater-type attacks."
    fr: "Fait briller le soleil pendant cinq tours, augmentant\nla puissance des capacités de type Feu et baissant\ncelle des capacités de type Eau."
    it: "Il Pokémon intensifica i raggi solari per cinque turni,\naumentando la potenza delle mosse di tipo Fuoco e\nriducendo la potenza di quelle di tipo Acqua."
    de: "Die Sonne brennt unbarmherzig fünf Runden lang.\nDadurch werden Attacken vom Typ Feuer verstärkt,\nwährend Wasser-Attacken abgeschwächt werden."
    es: "Hace que se intensifique el efecto del sol durante\ncinco turnos, lo que potencia los movimientos de tipo\nFuego y debilita los de tipo Agua."
    ko: "5턴 동안 햇살을 강하게 해서\n불꽃타입 기술의 위력을 올린다.\n물타입의 위력은 떨어진다."
    zh_simp: "在５回合内让日照变得强烈，\n从而提高火属性的招式威力。\n水属性的招式威力则降低。"
    zh_trad: "讓日照增強，在５回合內\n提高火屬性招式的威力。\n水屬性招式的威力會降低。"
sunsteel_strike:
  names:
    jp_kana: メテオドライブ
    jp_kanji: メテオドライブ
    en: Sunsteel Strike
    fr: Choc Météore
    it: Astrocarica
    de: Stahlgestirn
    es: Meteoimpacto
    ko: 메테오드라이브
    zh_simp: 流星闪冲
    zh_trad: 流星閃衝
  descriptions:
    jp_kana: "流星の　ような　勢いで\n突進する。　相手の　特性を\n無視して　攻撃　することが　できる。"
    jp_kanji: "流星の　ような　勢いで\n突進する。　相手の　特性を\n無視して　攻撃　することが　できる。"
    en: "The user slams into the target with the force of a meteor.\nThis move can be used on the target regardless of\nits Ability."
    fr: "Le lanceur fonce sur la cible avec la puissance\nd’une météorite. Ignore le talent de la cible."
    it: "Il Pokémon travolge il bersaglio con la potenza\ndi una meteora. Questo attacco ignora l’abilità\ndel bersaglio."
    de: "Der Anwender stürzt mit der Gewalt eines Meteors auf\ndas Ziel. Die Fähigkeit des Zieles wird dabei ignoriert."
    es: "Ataca al objetivo con la potencia de un meteoro,\nignorando su habilidad."
    ko: "유성 같은 기세로\n돌진한다. 상대의 특성을\n무시하고 공격할 수 있다."
    zh_simp: "以流星般的气势猛撞对手。\n可以无视对手的特性进行攻击。"
    zh_trad: "以流星般的氣勢猛撞對手。\n可不顧對手的特性進行攻擊。"
super_fang:
  names:
    jp_kana: いかりのまえば
    jp_kanji: いかりのまえば
    en: Super Fang
    fr: Croc Fatal
    it: Superzanna
    de: Superzahn
    es: Superdiente
    ko: 분노의앞니
    zh_simp: 愤怒门牙
    zh_trad: 憤怒門牙
  descriptions:
    jp_kana: "鋭い　前歯で\n激しく　かみついて　攻撃する。\n相手の　ＨＰは　半分に　なる。"
    jp_kanji: "鋭い　前歯で\n激しく　かみついて　攻撃する。\n相手の　ＨＰは　半分に　なる。"
    en: "The user chomps hard on the target with its sharp\nfront fangs. This cuts the target’s HP in half."
    fr: "Une vilaine morsure d’incisives qui réduit de moitié\nles PV de la cible."
    it: "Il Pokémon attacca il bersaglio azzannandolo con i suoi\nincisivi affilati e facendogli perdere metà dei PS."
    de: "Greift mit scharfen Reißzähnen an. KP des Zieles\nwerden halbiert."
    es: "Asesta una dentellada con sus afilados incisivos que\nreduce a la mitad los PS del objetivo."
    ko: "날카로운 앞니로\n강하게 물어서 공격한다.\n상대의 HP는 절반이 된다."
    zh_simp: "用锋利的门牙\n猛烈地咬住对手进行攻击。\n对手的ＨＰ减半。"
    zh_trad: "用銳利的門牙\n猛烈地咬住對手進行攻擊。\n對手的ＨＰ將會減半。"
supercell_slam:
  names:
    jp_kana: サンダーダイブ
    jp_kanji: サンダーダイブ
    en: Supercell Slam
    fr: Volt Assaut
    it: Elettrotuffo
    de: Donnerstoß
    es: Plancha Voltaica
    ko: 썬더다이브
    zh_simp: 闪电强袭
    zh_trad: 閃電強襲
  descriptions:
    jp_kana: "体を　帯電させて　相手に　のしかかる。\nはずすと　自分が　ダメージを　受ける。"
    jp_kanji: "体を　帯電させて　相手に　のしかかる。\nはずすと　自分が　ダメージを　受ける。"
    en: "The user electrifies its body and drops onto the target\nto inflict damage. If this move misses, the user takes\ndamage instead."
    fr: "Le lanceur se charge en électricité et fond sur la cible.\nS’il échoue, le lanceur se blesse."
    it: "Il Pokémon si schianta sul bersaglio dopo essersi\nelettrificato. Se la mossa fallisce, il Pokémon subisce\ndei danni."
    de: "Der Anwender lädt seinen Körper mit elektrischer\nEnergie auf und stürzt sich auf das Ziel. Bei Misserfolg\nverletzt sich der Anwender selbst."
    es: "El usuario electrifica su cuerpo y salta en plancha sobre\nel objetivo. Si falla, se hiere a sí mismo."
    ko: "몸에 전기를 두르고 상대를 덮친다.\n빗나가면 자신이 데미지를 입는다."
    zh_simp: "让身体带电后压向对手。\n如果没有命中则自己会受到伤害。"
    zh_trad: "讓身體帶電然後壓向對手。\n沒命中對手時自己會受到傷害。"
superpower:
  names:
    jp_kana: ばかぢから
    jp_kanji: ばかぢから
    en: Superpower
    fr: Surpuissance
    it: Troppoforte
    de: Kraftkoloss
    es: Fuerza Bruta
    ko: 엄청난힘
    zh_simp: 蛮力
    zh_trad: 蠻力
  descriptions:
    jp_kana: "すごい　力を　発揮して\n相手を　攻撃する。自分の\n攻撃と　防御が　さがる。"
    jp_kanji: "すごい　力を　発揮して\n相手を　攻撃する。自分の\n攻撃と　防御が　さがる。"
    en: "The user attacks the target with great power. This also\nlowers the user’s Attack and Defense stats."
    fr: "Une attaque puissante, mais qui baisse l’Attaque\net la Défense du lanceur."
    it: "Il Pokémon attacca il bersaglio con grande forza,\nma il suo Attacco e la sua Difesa diminuiscono."
    de: "Starke Attacke, die jedoch auch den Angriff und die\nVerteidigung des Anwenders senkt."
    es: "Ataque de gran potencia, pero que reduce el Ataque y\nla Defensa del usuario."
    ko: "엄청난 힘을 발휘하여\n상대를 공격한다. 자신의\n공격과 방어가 떨어진다."
    zh_simp: "发挥惊人的力量攻击对手。\n自己的攻击和防御会降低。"
    zh_trad: "發揮驚人的力量攻擊對手。\n自己的攻擊和防禦會降低。"
supersonic:
  names:
    jp_kana: ちょうおんぱ
    jp_kanji: ちょうおんぱ
    en: Supersonic
    fr: Ultrason
    it: Supersuono
    de: Superschall
    es: Supersónico
    ko: 초음파
    zh_simp: 超音波
    zh_trad: 超音波
  descriptions:
    jp_kana: "特殊な　音波を\n体から　発して\n相手を　混乱させる。"
    jp_kanji: "特殊な　音波を\n体から　発して\n相手を　混乱させる。"
    en: "The user generates odd sound waves from its body\nthat confuse the target."
    fr: "Le lanceur produit d’étranges ondes sonores\nqui rendent la cible confuse."
    it: "Il Pokémon genera dal proprio corpo strane onde\nacustiche che confondono il bersaglio."
    de: Ausstoß bizarrer Schallwellen. Das Ziel wird verwirrt.
    es: "El cuerpo del usuario emite unas ondas sónicas raras que\nconfunden al objetivo."
    ko: "특수한 음파를\n몸에서 발산하여\n상대를 혼란시킨다."
    zh_simp: "从身体发出\n特殊的音波，\n从而使对手混乱。"
    zh_trad: "從身上發出\n特殊的音波，\n讓對手陷入混亂狀態。"
supersonic_skystrike:physical:
  names:
    jp_kana: ファイナルダイブクラッシュ
    jp_kanji: ファイナルダイブクラッシュ
    en: Supersonic Skystrike
    fr: Piqué Supersonique
    it: Picchiata Devastante
    de: Finaler Steilflug
    es: Picado Supersónico
    ko: 파이널다이브클래시
    zh_simp: 极速俯冲轰烈撞
    zh_trad: 極速俯衝轟烈撞
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
supersonic_skystrike:special:
  names:
    jp_kana: ファイナルダイブクラッシュ
    jp_kanji: ファイナルダイブクラッシュ
    en: Supersonic Skystrike
    fr: Piqué Supersonique
    it: Picchiata Devastante
    de: Finaler Steilflug
    es: Picado Supersónico
    ko: 파이널다이브클래시
    zh_simp: 极速俯冲轰烈撞
    zh_trad: 極速俯衝轟烈撞
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
surf:
  names:
    jp_kana: なみのり
    jp_kanji: なみのり
    en: Surf
    fr: Surf
    it: Surf
    de: Surfer
    es: Surf
    ko: 파도타기
    zh_simp: 冲浪
    zh_trad: 衝浪
  descriptions:
    jp_kana: "大きな　波で　自分の\n周りに　いるものを　攻撃する。"
    jp_kanji: "大きな　波で　自分の\n周りに　いるものを　攻撃する。"
    en: "The user attacks everything around it by swamping\nits surroundings with a giant wave."
    fr: "Une énorme vague s’abat sur le champ de bataille\net inflige des dégâts à tous les Pokémon autour\ndu lanceur."
    it: "Chi la usa attacca gli altri Pokémon attorno con un’onda\nenorme."
    de: "Anwender greift mit einer gewaltigen Welle\nalle Pokémon im Umkreis an."
    es: "Inunda el terreno de combate con una ola gigante\nque golpea a los Pokémon adyacentes."
    ko: "큰 파도로 자신의\n주위에 있는 포켓몬을 공격한다."
    zh_simp: "利用大浪\n攻击自己周围所有的宝可梦。"
    zh_trad: "使用大浪\n攻擊自己周圍所有的寶可夢。"
surging_strikes:
  names:
    jp_kana: すいりゅうれんだ
    jp_kanji: すいりゅうれんだ
    en: Surging Strikes
    fr: Torrent de Coups
    it: Idroraffica
    de: Trefferschwall
    es: Azote Torrencial
    ko: 수류연타
    zh_simp: 水流连打
    zh_trad: 水流連打
  descriptions:
    jp_kana: "みずの型を　極めし\n流れるような　３回の　連撃。\n必ず　急所に　当たる。"
    jp_kanji: "みずの型を　極めし\n流れるような　３回の　連撃。\n必ず　急所に　当たる。"
    en: "The user, having mastered the Water style, strikes the\ntarget with a flowing motion three times in a row. This\nmove always lands a critical hit."
    fr: "Le lanceur assène trois coups fluides à la cible.\nCette technique qui inflige toujours un coup critique\nest réservée à ceux qui maîtrisent la puissance de l’Eau."
    it: "Il Pokémon sferra una fluida serie di tre attacchi,\nmassima espressione dello stile di tipo Acqua.\nBrutto colpo assicurato."
    de: "Der Anwender hat den Stil des Wassers gemeistert und\nführt mit fließenden Bewegungen drei Angriffe in Folge\nmit Volltreffergarantie aus."
    es: "El usuario, dominador absoluto del líquido elemento,\ngolpea tres veces seguidas con movimientos fluidos.\nSiempre asesta un golpe crítico."
    ko: "물의 태세가 극에 달하여\n물 흐르듯 3회의 연격을 날린다.\n반드시 급소에 맞는다."
    zh_simp: "将水之流派修炼至大成的\n仿若行云流水般的３次连击。\n必定会击中要害。"
    zh_trad: "將水之流派鍛鍊到了極致，\n猶如行雲流水的３次連擊。\n必定會擊中要害。"
swagger:
  names:
    jp_kana: いばる
    jp_kanji: いばる
    en: Swagger
    fr: Vantardise
    it: Bullo
    de: Angeberei
    es: Contoneo
    ko: 뽐내기
    zh_simp: 虚张声势
    zh_trad: 虛張聲勢
  descriptions:
    jp_kana: "相手を　怒らせて　混乱させる。\n怒りで　相手の　攻撃は\nぐーんと　あがってしまう。"
    jp_kanji: "相手を　怒らせて　混乱させる。\n怒りで　相手の　攻撃は\nぐーんと　あがってしまう。"
    en: "The user enrages and confuses the target. However, this\nalso sharply boosts the target’s Attack stat."
    fr: "Fait enrager la cible et la plonge dans la confusion,\nmais augmente beaucoup son Attaque."
    it: "Il Pokémon provoca il bersaglio e lo confonde,\nfacendo aumentare di molto il suo Attacco."
    de: Verwirrt das Ziel und erhöht dessen Angriffs-Wert stark.
    es: "Hace enfurecer y confunde al objetivo, pero también\naumenta mucho su Ataque."
    ko: "상대를 화내게 해서 혼란시킨다.\n분노로 상대의 공격은\n크게 올라가 버린다."
    zh_simp: "激怒对手，使其混乱。\n因为愤怒，对手的攻击\n会大幅提高。"
    zh_trad: "讓對手火大並陷入混亂。\n但對手的攻擊會因憤怒\n而大幅提高。"
swallow:
  names:
    jp_kana: のみこむ
    jp_kanji: のみこむ
    en: Swallow
    fr: Avale
    it: Introenergia
    de: Verzehrer
    es: Tragar
    ko: 꿀꺽
    zh_simp: 吞下
    zh_trad: 吞下
  descriptions:
    jp_kana: "蓄えた　力を　のみこんで\n自分の　ＨＰを　回復する。\n蓄えているほど　回復する。"
    jp_kanji: "蓄えた　力を　のみこんで\n自分の　ＨＰを　回復する。\n蓄えているほど　回復する。"
    en: "The power stored using the move Stockpile is absorbed\nby the user to restore its own HP. The more power is\nstored, the more HP is restored."
    fr: "Le lanceur absorbe l’énergie emmagasinée avec Stockage\npour restaurer ses PV. Le nombre de PV soignés augmente\nen fonction du nombre de fois où Stockage a été utilisée."
    it: "Il Pokémon assorbe l’energia raccolta con la mossa\nAccumulo e recupera PS. Maggiore è l’energia, più PS\nsi recuperano."
    de: "Absorbiert die gehortete Kraft, um KP aufzufüllen.\nJe mehr Energie gehortet wurde, desto mehr KP\nwerden aufgefüllt."
    es: "Absorbe la energía acumulada con Reserva para\nrecobrar salud. Cuanta más se haya acumulado,\nmayor será el número de PS que se recuperen."
    ko: "비축된 힘을 삼켜서\n자신의 HP를 회복한다.\n비축된 만큼 회복한다."
    zh_simp: "将积蓄的力量吞下，\n从而回复自己的ＨＰ。\n积蓄得越多，回复越大。"
    zh_trad: "將蓄積的力量吞下，\n回復自己的ＨＰ。\n蓄積得越多，回復越多。"
sweet_kiss:
  names:
    jp_kana: てんしのキッス
    jp_kanji: てんしのキッス
    en: Sweet Kiss
    fr: Doux Baiser
    it: Dolcebacio
    de: Bitterkuss
    es: Beso Dulce
    ko: 천사의키스
    zh_simp: 天使之吻
    zh_trad: 天使之吻
  descriptions:
    jp_kana: "天使のように　かわいく　キスして\n相手を　混乱させる。"
    jp_kanji: "天使のように　かわいく　キスして\n相手を　混乱させる。"
    en: "The user kisses the target with a sweet, angelic cuteness\nthat causes confusion."
    fr: "Le lanceur envoie un bisou si mignon et désarmant\nqu’il plonge la cible dans la confusion."
    it: "Il Pokémon bacia il bersaglio con una dolcezza angelica,\nconfondendolo."
    de: "Anwender küsst das Ziel, das durch diese Niedlichkeit\nverwirrt wird."
    es: Da un beso con tal dulzura que causa confusión.
    ko: "천사처럼 귀엽게 키스하여\n상대를 혼란시킨다."
    zh_simp: "像天使般可爱地亲吻对手，\n从而使对手混乱。"
    zh_trad: "像天使般可愛地親吻對手，\n進而使對手混亂。"
sweet_scent:
  names:
    jp_kana: あまいかおり
    jp_kanji: あまいかおり
    en: Sweet Scent
    fr: Doux Parfum
    it: Profumino
    de: Lockduft
    es: Dulce Aroma
    ko: 달콤한향기
    zh_simp: 甜甜香气
    zh_trad: 甜甜香氣
  descriptions:
    jp_kana: "香りで　相手の　回避率を\nがくっと　さげる。"
    jp_kanji: "香りで　相手の　回避率を\nがくっと　さげる。"
    en: "The user releases a scent that harshly lowers opposing\nPokémon’s evasiveness."
    fr: "Un doux parfum qui réduit beaucoup l’Esquive\nde la cible."
    it: "Il Pokémon riduce di molto l’elusione degli avversari\ncon un dolce profumo."
    de: "Senkt den Ausweichwert der gegnerischen Pokémon\nstark."
    es: "Un dulce aroma engatusa al objetivo, por lo que se\nreduce mucho su Evasión."
    ko: "향기로 상대의 회피율을\n크게 떨어뜨린다."
    zh_simp: 用香气大幅降低对手的闪避率。
    zh_trad: 用香氣大幅降低對手的閃避率。
swift:
  names:
    jp_kana: スピードスター
    jp_kanji: スピードスター
    en: Swift
    fr: Météores
    it: Comete
    de: Sternschauer
    es: Meteoros
    ko: 스피드스타
    zh_simp: 高速星星
    zh_trad: 高速星星
  descriptions:
    jp_kana: "星型の　光を　発射して\n相手を　攻撃する。\n攻撃は　必ず　命中する。"
    jp_kanji: "星型の　光を　発射して\n相手を　攻撃する。\n攻撃は　必ず　命中する。"
    en: "Star-shaped rays are shot at opposing Pokémon.\nThis attack never misses."
    fr: "Le lanceur envoie des rayons d’étoiles qui touchent\ntoujours la cible."
    it: "Il Pokémon attacca il bersaglio con raggi\na forma di stella. Questo attacco va sempre a segno."
    de: "Verschießt sternförmige Strahlen, die stets treffen,\nauf gegnerische Pokémon."
    es: Lanza rayos en forma de estrella que no fallan nunca.
    ko: "별 모양의 빛을 발사해서\n상대를 공격한다.\n공격은 반드시 명중한다."
    zh_simp: "发射星形的光攻击对手。\n攻击必定会命中。"
    zh_trad: "發射星型光線攻擊對手。\n攻擊必定會命中。"
switcheroo:
  names:
    jp_kana: すりかえ
    jp_kanji: すりかえ
    en: Switcheroo
    fr: Passe-Passe
    it: Rapidscambio
    de: Wechseldich
    es: Trapicheo
    ko: 바꿔치기
    zh_simp: 掉包
    zh_trad: 掉包
  descriptions:
    jp_kana: "目にも　とまらぬ　速さで\n自分と　相手の\n持ち物を　交換する。"
    jp_kanji: "目にも　とまらぬ　速さで\n自分と　相手の\n持ち物を　交換する。"
    en: "The user trades held items with the target faster than the\neye can follow."
    fr: "Le lanceur échange son objet avec celui de la cible\nà une vitesse que l’œil a du mal à suivre."
    it: "Il Pokémon scambia lo strumento che ha con quello\ndel bersaglio a una velocità impressionante."
    de: "Anwender tauscht in Windeseile sein getragenes Item\nmit dem des Zieles."
    es: "Intercambia con el objetivo los objetos que llevan tan\nrápido que es imposible verlo a simple vista."
    ko: "눈에 보이지 않는 속도로\n자신과 상대가\n지닌 물건을 교환한다."
    zh_simp: "用一闪而过的速度\n交换自己和对手的持有物。"
    zh_trad: "以肉眼看不清的速度\n將自己和對手的持有物互相交換。"
swords_dance:
  names:
    jp_kana: つるぎのまい
    jp_kanji: つるぎのまい
    en: Swords Dance
    fr: Danse Lames
    it: Danzaspada
    de: Schwerttanz
    es: Danza Espada
    ko: 칼춤
    zh_simp: 剑舞
    zh_trad: 劍舞
  descriptions:
    jp_kana: "戦いの舞を　激しく　おどって\n気合を　高める。\n自分の　攻撃を　ぐーんと　あげる。"
    jp_kanji: "戦いの舞を　激しく　おどって\n気合を　高める。\n自分の　攻撃を　ぐーんと　あげる。"
    en: "A frenetic dance to uplift the fighting spirit. This sharply\nboosts the user’s Attack stat."
    fr: "Une danse frénétique qui exalte l’esprit combatif.\nAugmente beaucoup l’Attaque du lanceur."
    it: "Danza frenetica che incrementa lo spirito\ncombattivo. Chi la usa aumenta di molto\nil suo Attacco."
    de: "Ein wilder Tanz, der den Kampfgeist wecken soll.\nDer Angriffs-Wert des Anwenders wird stark erhöht."
    es: "Este frenético baile de combate eleva el espíritu y\naumenta mucho el Ataque."
    ko: "싸움의 춤을 격렬하게 춰서\n기세를 높인다.\n자신의 공격을 크게 올린다."
    zh_simp: "激烈地跳起战舞提高气势。\n大幅提高自己的攻击。"
    zh_trad: "激烈地跳起戰舞提升氣勢，\n大幅提高自己的攻擊。"
synchronoise:
  names:
    jp_kana: シンクロノイズ
    jp_kanji: シンクロノイズ
    en: Synchronoise
    fr: Synchropeine
    it: Sincrumore
    de: Synchrolärm
    es: Sincrorruido
    ko: 싱크로노이즈
    zh_simp: 同步干扰
    zh_trad: 同步干擾
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
synthesis:
  names:
    jp_kana: こうごうせい
    jp_kanji: こうごうせい
    en: Synthesis
    fr: Synthèse
    it: Sintesi
    de: Synthese
    es: Síntesis
    ko: 광합성
    zh_simp: 光合作用
    zh_trad: 光合作用
  descriptions:
    jp_kana: "自分の　ＨＰを　回復する。\n天気に　よって\n回復の　量が　変化する。"
    jp_kanji: "自分の　ＨＰを　回復する。\n天気に　よって\n回復の　量が　変化する。"
    en: "The user restores its own HP. The amount of HP regained\nvaries with the weather."
    fr: "Un soin qui restaure des PV au lanceur.\nSon efficacité varie en fonction de la météo."
    it: "Il Pokémon recupera PS. Il numero di PS recuperati\ndipende dalle condizioni atmosferiche."
    de: "Füllt KP des Anwenders auf. Die Menge hängt vom\nWetter ab."
    es: "Restaura PS del usuario. La cantidad varía según\nel tiempo que haga."
    ko: "자신의 HP를 회복한다.\n날씨에 따라\n회복량이 변한다."
    zh_simp: "回复自己的ＨＰ。\n根据天气的不同，\n回复量也会有所变化。"
    zh_trad: "回復自己的ＨＰ。\n回復量會隨著天氣的不同\n而有所變化。"
syrup_bomb:
  names:
    jp_kana: みずあめボム
    jp_kanji: みずあめボム
    en: Syrup Bomb
    fr: Bombe au Sirop
    it: Bomba Sciroppata
    de: Sirupbombe
    es: Bomba Caramelo
    ko: 시럽봄
    zh_simp: 糖浆炸弹
    zh_trad: 糖漿炸彈
  descriptions:
    jp_kana: "ねっとりした　みずあめを　爆発させ\n相手を　あめまみれ　状態に　して\n３ターンの間　素早さを　さげ続ける。"
    jp_kanji: "ねっとりした　みずあめを　爆発させ\n相手を　あめまみれ　状態に　して\n３ターンの間　素早さを　さげ続ける。"
    en: "The user sets off an explosion of sticky candy syrup,\nwhich coats the target and causes the target’s Speed\nstat to drop each turn for three turns."
    fr: "Le lanceur jette une bombe qui recouvre la cible\nde sirop gluant et fait progressivement baisser\nla Vitesse de la cible pendant trois tours."
    it: "Il Pokémon fa esplodere dello sciroppo viscoso\nsul bersaglio, ricoprendolo e facendogli diminuire\nla Velocità per tre turni."
    de: "Der Anwender feuert eine klebrige Sirupbombe auf das\nZiel, wodurch es in Sirup gehüllt und seine Initiative drei\nRunden in Folge gesenkt wird."
    es: "Impregna al objetivo con una explosión de su viscoso\nnéctar y lo carameliza, lo que hace que su Velocidad\nse reduzca progresivamente durante tres turnos."
    ko: "끈적끈적한 물엿을 폭발시킨다.\n상대를 물엿범벅 상태로 만들어서\n3턴 동안 계속 스피드를 떨어뜨린다."
    zh_simp: "使粘稠的麦芽糖浆爆炸，\n让对手陷入满身糖状态，\n在３回合内持续降低其速度。"
    zh_trad: "使黏稠的糖漿爆炸，\n使對手陷入滿身糖狀態，\n在３回合內持續降低對手的速度。"
tachyon_cutter:
  names:
    jp_kana: タキオンカッター
    jp_kanji: タキオンカッター
    en: Tachyon Cutter
    fr: Lame Tachyonique
    it: Tachiontaglio
    de: Tachyon-Schnitt
    es: Tajo Taquión
    ko: 타키온커터
    zh_simp: 迅子利刃
    zh_trad: 迅子利刃
  descriptions:
    jp_kana: "粒子の刃を　たて続けに　発射して\n２回連続で　ダメージを　与える。\n攻撃は　必ず　命中する。"
    jp_kanji: "粒子の刃を　たて続けに　発射して\n２回連続で　ダメージを　与える。\n攻撃は　必ず　命中する。"
    en: "The user attacks by launching particle blades at the\ntarget twice in a row. This attack never misses."
    fr: "Le lanceur concentre des particules élémentaires\npour créer une lame qui inflige des dégâts à la cible\ndeux fois d’affilée. N’échoue jamais."
    it: "Il Pokémon emette delle lame particellari in successione,\ninfliggendo danni due volte di fila. Questo attacco va\nsempre a segno."
    de: "Der Anwender greift das Ziel zweimal hintereinander\nmit Partikelklingen an. Der Angriff trifft garantiert."
    es: "Lanza una ráfaga de cuchillas formadas por partículas\ncontra el objetivo y le inflige daño dos veces seguidas.\nNo falla nunca."
    ko: "입자로 된 칼날을 연이어 발사해서\n2회 연속으로 데미지를 준다.\n공격은 반드시 명중한다."
    zh_simp: "接连发射出粒子的利刃，\n连续２次给予伤害。\n攻击必定会命中。"
    zh_trad: "連續發射粒子的利刃，\n連續２次給予傷害。\n攻擊必定會命中。"
tackle:
  names:
    jp_kana: たいあたり
    jp_kanji: たいあたり
    en: Tackle
    fr: Charge
    it: Azione
    de: Tackle
    es: Placaje
    ko: 몸통박치기
    zh_simp: 撞击
    zh_trad: 撞擊
  descriptions:
    jp_kana: "相手に　むかって　全身で\nぶつかっていき　攻撃する。"
    jp_kanji: "相手に　むかって　全身で\nぶつかっていき　攻撃する。"
    en: "A physical attack in which the user charges and slams\ninto the target with its whole body."
    fr: "Le lanceur charge la cible et la percute de tout\nson poids."
    it: "Il Pokémon attacca il bersaglio lanciandosi contro di lui\ncon tutto il suo corpo."
    de: Trifft das Ziel mit vollem Körpereinsatz.
    es: Embestida con todo el cuerpo.
    ko: "상대를 향해서 몸 전체를\n부딪쳐가며 공격한다."
    zh_simp: "用整个身体\n撞向对手进行攻击。"
    zh_trad: "用整個身體\n撞向對手進行攻擊。"
tail_glow:
  names:
    jp_kana: ほたるび
    jp_kanji: ほたるび
    en: Tail Glow
    fr: Lumi-Queue
    it: Codadiluce
    de: Schweifglanz
    es: Luminicola
    ko: 반딧불
    zh_simp: 萤火
    zh_trad: 螢火
  descriptions:
    jp_kana: "点滅する　光を　眺めて\n自分の　精神を　統一し\n特攻を　ぐぐーんと　あげる。"
    jp_kanji: "点滅する　光を　眺めて\n自分の　精神を　統一し\n特攻を　ぐぐーんと　あげる。"
    en: "The user stares at flashing lights to focus its mind,\ndrastically boosting its Sp. Atk stat."
    fr: "Le lanceur regarde un flash lumineux fixement.\nAugmente énormément son Attaque Spéciale."
    it: "Il Pokémon fissa una luce intermittente per concentrarsi\ne aumentare moltissimo l’Attacco Speciale."
    de: "Ein blinkendes Licht, das den Spezial-Angriff drastisch\nerhöht."
    es: "Se concentra mirando fijamente los parpadeos de la luz\ny aumenta muchísimo su Ataque Especial."
    ko: "깜빡거리는 빛을 바라보면서\n자신의 정신을 통일하여\n특수공격을 매우 크게 올린다."
    zh_simp: "凝视闪烁的光芒，\n集中自己的精神，\n从而巨幅提高特攻。"
    zh_trad: "凝視閃爍的光芒\n集中自己的精神，\n極大幅提高自己的特攻。"
tail_slap:
  names:
    jp_kana: スイープビンタ
    jp_kanji: スイープビンタ
    en: Tail Slap
    fr: Plumo-Queue
    it: Spazzasberla
    de: Kehrschelle
    es: Plumerazo
    ko: 스위프뺨치기
    zh_simp: 扫尾拍打
    zh_trad: 掃尾拍打
  descriptions:
    jp_kana: "硬い　しっぽで\n相手を　たたいて　攻撃する。\n２ー５回の　間　連続で　だす。"
    jp_kanji: "硬い　しっぽで\n相手を　たたいて　攻撃する。\n２ー５回の　間　連続で　だす。"
    en: "The user attacks by striking the target with its hard tail.\nThis move hits two to five times in a row."
    fr: "Le lanceur frappe la cible de deux à cinq fois d’affilée\navec sa queue robuste."
    it: "Il Pokémon attacca colpendo il bersaglio con la sua\ncoda dura da due a cinque volte di fila."
    de: "Anwender greift das Ziel mit seiner schlagfesten Rute\nzwei- bis fünfmal hintereinander an."
    es: Golpea con la cola de dos a cinco veces seguidas.
    ko: "단단한 꼬리로\n상대를 때려서 공격한다.\n2~5회 연속으로 쓴다."
    zh_simp: "用坚硬的尾巴\n拍打对手进行攻击。\n连续攻击２～５次。"
    zh_trad: "將堅硬的尾巴\n掃向對手進行攻擊。\n可連續攻擊２～５次。"
tail_whip:
  names:
    jp_kana: しっぽをふる
    jp_kanji: しっぽをふる
    en: Tail Whip
    fr: Mimi-Queue
    it: Colpocoda
    de: Rutenschlag
    es: Látigo
    ko: 꼬리흔들기
    zh_simp: 摇尾巴
    zh_trad: 搖尾巴
  descriptions:
    jp_kana: "しっぽを　左右に　かわいく　ふって\n油断を　誘う。\n相手の　防御を　さげる。"
    jp_kanji: "しっぽを　左右に　かわいく　ふって\n油断を　誘う。\n相手の　防御を　さげる。"
    en: "The user wags its tail cutely, making opposing Pokémon\nless wary. This lowers their Defense stats."
    fr: "Le lanceur remue son adorable queue pour tromper\nla vigilance de la cible et baisser sa Défense."
    it: "Il Pokémon agita la coda per distrarre gli avversari,\nriducendone la Difesa."
    de: "Der Anwender wedelt niedlich mit dem Schweif und\nveranlasst Gegner dadurch, nachlässig zu werden.\nSenkt die Verteidigung der gegnerischen Pokémon."
    es: "Agita la cola para despistar al objetivo y reducir\nsu Defensa."
    ko: "꼬리를 좌우로 귀엽게 흔들어\n방심을 유도한다.\n상대의 방어를 떨어뜨린다."
    zh_simp: "可爱地左右摇晃尾巴，\n诱使对手疏忽大意。\n会降低对手的防御。"
    zh_trad: "可愛地左右搖晃尾巴，\n誘使對手疏忽大意。\n可降低對手的防禦。"
tailwind:
  names:
    jp_kana: おいかぜ
    jp_kanji: おいかぜ
    en: Tailwind
    fr: Vent Arrière
    it: Ventoincoda
    de: Rückenwind
    es: Viento Afín
    ko: 순풍
    zh_simp: 顺风
    zh_trad: 順風
  descriptions:
    jp_kana: "激しく　吹きあれる\n風の渦を　つくり　４ターンの　間\n味方　全員の　素早さを　あげる。"
    jp_kanji: "激しく　吹きあれる\n風の渦を　つくり　４ターンの　間\n味方　全員の　素早さを　あげる。"
    en: "The user whips up a turbulent whirlwind that boosts the\nSpeed stats of itself and its allies for four turns."
    fr: "Génère une rafale de vent qui augmente la Vitesse\ndes Pokémon de l’équipe pendant quatre tours."
    it: "Il Pokémon scatena un turbine che aumenta la Velocità\ndi tutti i Pokémon della squadra per quattro turni."
    de: "Anwender erzeugt einen Wirbelwind, der die Initiative\naller Pokémon im Team für vier Runden erhöht."
    es: "Crea un fuerte remolino que aumenta la Velocidad del\nbando del usuario durante cuatro turnos."
    ko: "세차게 불어 대는\n바람의 소용돌이를 만들어 4턴 동안\n같은 편 모두의 스피드를 올린다."
    zh_simp: "刮起猛烈的旋风，\n在４回合内\n提高我方全员的速度。"
    zh_trad: "刮起猛烈的強風，\n在４回合內\n提高我方全體的速度。"
take_down:
  names:
    jp_kana: とっしん
    jp_kanji: とっしん
    en: Take Down
    fr: Bélier
    it: Riduttore
    de: Bodycheck
    es: Derribo
    ko: 돌진
    zh_simp: 猛撞
    zh_trad: 猛撞
  descriptions:
    jp_kana: "すごい　勢いで\n相手に　ぶつかって　攻撃する。\n自分も　少し　ダメージを　受ける。"
    jp_kanji: "すごい　勢いで\n相手に　ぶつかって　攻撃する。\n自分も　少し　ダメージを　受ける。"
    en: "A reckless full-body charge attack for slamming into\nthe target. This also damages the user a little."
    fr: "Une charge violente qui blesse aussi légèrement\nle lanceur."
    it: "Il Pokémon attacca lanciandosi contro il bersaglio\ncon forza straordinaria, ma subisce un po’ di danni."
    de: "Rücksichtslose Attacke, bei der sich der Anwender\nselbst leicht verletzt."
    es: "Carga desmedida que también hiere ligeramente al\nusuario."
    ko: "굉장한 기세로\n상대에게 부딪쳐 공격한다.\n자신도 조금 데미지를 입는다."
    zh_simp: "以惊人的气势\n撞向对手进行攻击。\n自己也会受到少许伤害。"
    zh_trad: "以驚人的氣勢\n撞向對手進行攻擊。\n自己也會受到少許傷害。"
take_heart:
  names:
    jp_kana: ブレイブチャージ
    jp_kanji: ブレイブチャージ
    en: Take Heart
    fr: Extravaillance
    it: Baldimpulso
    de: Mutschub
    es: Bálsamo Osado
    ko: 브레이브차지
    zh_simp: 勇气填充
    zh_trad: 勇氣填充
  descriptions:
    jp_kana: "心を　奮わせて\n自分の　状態異常を　治し\nさらには　特攻と　特防を　あげる。"
    jp_kanji: "心を　奮わせて\n自分の　状態異常を　治し\nさらには　特攻と　特防を　あげる。"
    en: "The user lifts its spirits, curing its own status conditions\nand boosting its Sp. Atk and Sp. Def stats."
    fr: "Le lanceur fait preuve de bravoure pour soigner\nses altérations de statut et augmenter son Attaque\nSpéciale ainsi que sa Défense Spéciale."
    it: "Il Pokémon prende coraggio e guarisce dai problemi\ndi stato. Inoltre, aumenta l’Attacco Speciale e la Difesa\nSpeciale."
    de: "Der Anwender fasst sich ein Herz, befreit sich von\nStatusproblemen und erhöht außerdem seinen\nSpezial-Angriff und seine Spezial-Verteidigung."
    es: "El usuario se envalentona y se cura de los problemas\nde estado. Además, aumenta su Ataque Especial y su\nDefensa Especial."
    ko: "기운을 고조시켜서\n자신의 상태 이상을 회복하고\n특수공격과 특수방어를 올린다."
    zh_simp: "鼓起冲劲，治愈自己的异常状态，\n同时提高自己的特攻和特防。"
    zh_trad: "鼓起衝勁，\n治癒自己的異常狀態，\n同時提高自己的特攻和特防。"
tar_shot:
  names:
    jp_kana: タールショット
    jp_kanji: タールショット
    en: Tar Shot
    fr: Goudronnage
    it: Colpocatrame
    de: Teerschuss
    es: Alquitranazo
    ko: 타르샷
    zh_simp: 沥青射击
    zh_trad: 瀝青射擊
  descriptions:
    jp_kana: "ねばねばの　タールを　浴びせて\n相手の　素早さを　下げる。\n相手は　ほのおが　弱点に　なる。"
    jp_kanji: "ねばねばの　タールを　浴びせて\n相手の　素早さを　下げる。\n相手は　ほのおが　弱点に　なる。"
    en: "The user pours sticky tar over the target, lowering the\ntarget’s Speed stat. The target becomes weaker to\nFire-type moves."
    fr: "Le lanceur recouvre sa cible de goudron liquide\npour baisser sa Vitesse et la rendre vulnérable au feu."
    it: "Il Pokémon getta catrame appiccicoso sul bersaglio\nabbassandone la Velocità e rendendolo vulnerabile\nal tipo Fuoco."
    de: "Der Anwender übergießt das Ziel mit klebrigem Teer\nund senkt so dessen Initiative. Dadurch wird es schwach\ngegenüber Feuer-Attacken."
    es: "Cubre al objetivo de un alquitrán pegajoso que reduce\nsu Velocidad y lo vuelve débil contra el fuego."
    ko: "끈적끈적한 타르를 날려서\n상대의 스피드를 떨어뜨린다.\n상대는 불꽃이 약점이 된다."
    zh_simp: "泼洒黏糊糊的沥青，\n降低对手的速度。\n火属性会变成对手的弱点。"
    zh_trad: "射出黏黏的瀝青，\n降低對手的速度。\n火屬性會變成對手的弱點。"
taunt:
  names:
    jp_kana: ちょうはつ
    jp_kanji: ちょうはつ
    en: Taunt
    fr: Provoc
    it: Provocazione
    de: Verhöhner
    es: Mofa
    ko: 도발
    zh_simp: 挑衅
    zh_trad: 挑釁
  descriptions:
    jp_kana: "相手を　怒らせる。　３ターンの\n間　相手は　ダメージを\n与える　技しか　だせなくなる。"
    jp_kanji: "相手を　怒らせる。　３ターンの\n間　相手は　ダメージを\n与える　技しか　だせなくなる。"
    en: "The target is taunted into a rage that allows it to use\nonly attack moves for three turns."
    fr: "Le lanceur provoque la cible, ce qui oblige celle-ci\nà n’utiliser que des capacités qui infligent des dégâts\npendant trois tours."
    it: "Il Pokémon provoca il bersaglio inducendolo a usare\nsolo mosse che infliggono danni per tre turni."
    de: "Bringt das Ziel in Rage. Dieses kann über drei Runden\nhinweg nur noch angreifen."
    es: "Enfurece al objetivo para que solo use movimientos de\nataque durante tres turnos."
    ko: "상대를 화나게 한다.\n3턴 동안 상대는 데미지를\n주는 기술밖에 쓸 수 없게 된다."
    zh_simp: "使对手愤怒。\n在３回合内让对手\n只能使出给予伤害的招式。"
    zh_trad: "激怒對手。\n在３回合內讓對手\n只能使出給予傷害的招式。"
tearful_look:
  names:
    jp_kana: なみだめ
    jp_kanji: なみだめ
    en: Tearful Look
    fr: Larme à l’Œil
    it: Occhionilucidi
    de: Tränendrüse
    es: Ojos Llorosos
    ko: 눈물그렁그렁
    zh_simp: 泪眼汪汪
    zh_trad: 淚眼汪汪
  descriptions:
    jp_kana: "なみだめに　なって\n相手の　戦力を　喪失させる。\n相手の　攻撃と　特攻が　さがる。"
    jp_kanji: "なみだめに　なって\n相手の　戦力を　喪失させる。\n相手の　攻撃と　特攻が　さがる。"
    en: "The user gets teary-eyed to make the target lose its\ncombative spirit. This lowers the target’s Attack and\nSp. Atk stats."
    fr: "Le lanceur regarde la cible avec des yeux remplis\nde larmes. Celle-ci perd toute combativité et voit\nson Attaque et son Attaque Spéciale baisser."
    it: "Il Pokémon guarda il bersaglio con gli occhi pieni\ndi lacrime e gli fa perdere lo spirito combattivo,\nriducendone l’Attacco e l’Attacco Speciale."
    de: "Dem Anwender stehen Tränen in den Augen, wodurch\ndas Ziel seinen Kampfeswillen verliert. Angriff und\nSpezial-Angriff des Zieles sinken."
    es: "Mira al objetivo con ojos llorosos para hacerle perder\nsu espíritu combativo y reduce su Ataque y su Ataque\nEspecial."
    ko: "눈물을 그렁그렁거려\n상대의 전의를 상실하게 한다.\n상대의 공격과 특수공격이 떨어진다."
    zh_simp: "变得泪眼汪汪，\n让对手丧失斗志。\n从而降低对手的攻击和特攻。"
    zh_trad: "變得淚眼汪汪，\n令對手喪失鬥志。\n進而降低對手的攻擊和特攻。"
teatime:
  names:
    jp_kana: おちゃかい
    jp_kanji: おちゃかい
    en: Teatime
    fr: Thérémonie
    it: Ora del Tè
    de: Teatime
    es: Hora del Té
    ko: 다과회
    zh_simp: 茶会
    zh_trad: 茶會
  descriptions:
    jp_kana: "おちゃかいを　ひらいて\n場にいる　ポケモンが　それぞれ\n持っている　きのみを　食べる。"
    jp_kanji: "おちゃかいを　ひらいて\n場にいる　ポケモンが　それぞれ\n持っている　きのみを　食べる。"
    en: "The user has teatime with all the Pokémon currently in\nthe battle. Each Pokémon eats its held Berry."
    fr: "Le lanceur invite tous les Pokémon sur le terrain\nà prendre le goûter autour d’une tasse de thé.\nCeux qui tiennent une Baie la mangent."
    it: "Chi la usa invita tutti i Pokémon in campo a prendere\nil tè. Quelli che hanno con sé una bacca la mangiano."
    de: "Der Anwender lädt alle am Kampf beteiligten Pokémon\nzu einem Teekränzchen ein, woraufhin diese die Beeren\nessen, die sie bei sich tragen."
    es: "El usuario invita a tomar el té a todos los presentes en\nel terreno de combate, lo que hace que ingieran las\nbayas que lleven equipadas."
    ko: "다과회를 열어서\n배틀에 나와 있는 포켓몬이\n각각 지니고 있는 나무열매를 먹는다."
    zh_simp: "举办一场茶会，\n场上的所有宝可梦都会\n吃掉自己携带的树果。"
    zh_trad: "舉辦茶會，\n在場上的寶可夢都會\n吃掉自己攜帶的樹果。"
techno_blast:
  names:
    jp_kana: テクノバスター
    jp_kanji: テクノバスター
    en: Techno Blast
    fr: Techno-Buster
    it: Tecnobotto
    de: Techblaster
    es: Tecno Shock
    ko: 테크노버스터
    zh_simp: 高科技光炮
    zh_trad: 高科技光炮
  descriptions:
    jp_kana: "光弾を　相手に　放出する。\n自分の　持つ\nカセットにより　タイプが　変わる。"
    jp_kanji: "光弾を　相手に　放出する。\n自分の　持つ\nカセットにより　タイプが　変わる。"
    en: "The user attacks by firing a beam of light at the target.\nThis move’s type changes depending on the kind of\ndrive held by the user."
    fr: "Le lanceur projette un rayon lumineux sur la cible.\nLe type varie selon le module que tient le lanceur."
    it: "Il Pokémon rilascia un colpo di luce contro il bersaglio.\nIl tipo varia a seconda del modulo che ha."
    de: "Anwender feuert ein Lichtgeschoss auf das Ziel ab.\nDer Typ der Attacke hängt von dem des Moduls ab."
    es: "Ataca al objetivo con un gran láser. El tipo del ataque\nlo determina el cartucho que porta el usuario."
    ko: "광탄을 상대에게 방출한다.\n자신이 지니고 있는\n카세트에 의해 타입이 바뀐다."
    zh_simp: "向对手放出光弹。\n属性会根据自己\n携带的卡带不同而改变。"
    zh_trad: "向對手發射光彈。\n招式的屬性會隨著自己\n攜帶的卡帶不同而改變。"
tectonic_rage:physical:
  names:
    jp_kana: ライジングランドオーバー
    jp_kanji: ライジングランドオーバー
    en: Tectonic Rage
    fr: Éruption Géo-Sismique
    it: Furore della Terra
    de: Seismische Eruption
    es: Barrena Telúrica
    ko: 라이징랜드오버
    zh_simp: 地隆啸天大终结
    zh_trad: 地隆嘯天大終結
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
tectonic_rage:special:
  names:
    jp_kana: ライジングランドオーバー
    jp_kanji: ライジングランドオーバー
