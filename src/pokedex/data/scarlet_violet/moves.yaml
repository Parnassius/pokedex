    es: "-\n-\n-"
    ko: "―\n―\n―"
    zh_simp: "―\n―\n―"
    zh_trad: "―\n―\n―"
nuzzle:
  names:
    jp_kana: ほっぺすりすり
    jp_kanji: ほっぺすりすり
    en: Nuzzle
    fr: Frotte-Frimousse
    it: Elettrococcola
    de: Wangenrubbler
    es: Moflete Estático
    ko: 볼부비부비
    zh_simp: 蹭蹭脸颊
    zh_trad: 蹭蹭臉頰
  descriptions:
    jp_kana: "電気を　帯びた　ほっぺを\nすりつけて　攻撃。\n相手を　まひ状態に　する。"
    jp_kanji: "電気を　帯びた　ほっぺを\nすりつけて　攻撃。\n相手を　まひ状態に　する。"
    en: "The user attacks by nuzzling its electrified cheeks against\nthe target. This also leaves the target with paralysis."
    fr: "Le lanceur attaque en frottant ses bajoues chargées\nd’électricité, ce qui paralyse la cible."
    it: "Il Pokémon attacca strofinando le guance elettrizzate\ncontro il bersaglio, paralizzandolo."
    de: "Der Anwender lädt seine Wangen elektrisch auf und\ngreift an, indem er sich damit am Ziel reibt. Das Ziel\nwird paralysiert."
    es: "El usuario frota sus mofletes cargados de electricidad\ncontra el objetivo y consigue paralizarlo."
    ko: "전기가 흐르는 볼을\n비벼서 공격한다.\n상대를 마비 상태로 만든다."
    zh_simp: "将带电的脸颊\n蹭蹭对手进行攻击。\n让对手陷入麻痹状态。"
    zh_trad: "用帶電的臉頰\n磨蹭對手進行攻擊。\n能讓對手陷入麻痺狀態。"
oblivion_wing:
  names:
    jp_kana: デスウイング
    jp_kanji: デスウイング
    en: Oblivion Wing
    fr: Mort’Ailes
    it: Ali del Fato
    de: Unheilsschwingen
    es: Ala Mortífera
    ko: 데스윙
    zh_simp: 归天之翼
    zh_trad: 死亡之翼
  descriptions:
    jp_kana: "ねらいを　定めた　相手から　ＨＰを\n吸い取る。　与えた　ダメージの\n半分以上　ＨＰを　回復する。"
    jp_kanji: "ねらいを　定めた　相手から　ＨＰを\n吸い取る。　与えた　ダメージの\n半分以上　ＨＰを　回復する。"
    en: "The user absorbs the target’s HP. The user’s HP is\nrestored by over half the damage taken by the target."
    fr: "Vole l’énergie de la cible.\nRend au lanceur un nombre de PV supérieur ou égal\nà la moitié des dégâts infligés."
    it: "Il Pokémon assorbe energia dal bersaglio recuperando\nuna quantità di PS pari o superiore alla metà del danno\ninferto."
    de: "Der Anwender raubt dem Ziel KP. Die Höhe der\nHeilung beträgt mehr als die Hälfte des beim Ziel\nangerichteten Schadens."
    es: "El usuario absorbe energía del objetivo y recupera PS\nen una cantidad igual o superior a la mitad del daño\ninfligido."
    ko: "조준한 상대로부터 HP를\n흡수한다. 준 데미지의\n반 이상 HP를 회복한다."
    zh_simp: "从锁定的对手身上吸取ＨＰ。\n回复给予对手\n伤害的一半以上的ＨＰ。"
    zh_trad: "從鎖定的對手身上吸取ＨＰ。\n可以回復給予對手\n傷害的一半以上的ＨＰ。"
obstruct:
  names:
    jp_kana: ブロッキング
    jp_kanji: ブロッキング
    en: Obstruct
    fr: Blocage
    it: Sbarramento
    de: Abblocker
    es: Obstrucción
    ko: 블로킹
    zh_simp: 拦堵
    zh_trad: 攔堵
  descriptions:
    jp_kana: "相手の　攻撃を　まったく　受けない。\n連続で　だすと　失敗しやすい。\n触れると　防御が　がくっと　下がる。"
    jp_kanji: "相手の　攻撃を　まったく　受けない。\n連続で　だすと　失敗しやすい。\n触れると　防御が　がくっと　下がる。"
    en: "This move enables the user to protect itself from all\nattacks. Its chance of failing rises if used in succession.\nDirect contact harshly lowers the attacker’s Defense stat."
    fr: "Le lanceur se protège de toutes les attaques. Peut\néchouer si utilisée plusieurs fois de suite. Baisse beaucoup\nla Défense de l’assaillant s’il utilise une attaque directe."
    it: "Il Pokémon elude tutti gli attacchi. Se la mossa è usata\nin successione può fallire. Chi entra in contatto con\nil Pokémon vede diminuire la propria Difesa di molto."
    de: "Der Anwender wehrt jede Attacke ab. Berührt ihn\nwährenddessen ein Pokémon, sinkt dessen Verteidigung\nstark. Scheitert eventuell bei Wiederholung."
    es: "Frena todos los ataques, pero puede fallar si se usa\nrepetidamente. Reduce mucho la Defensa de quien\nejecute un movimiento de contacto contra el usuario."
    ko: "상대의 공격을 전혀 받지 않는다.\n연속으로 쓰면 실패하기 쉽다.\n접촉한 상대의 방어를 크게 떨어뜨린다."
    zh_simp: "完全抵挡对手的攻击。\n连续使出则容易失败。\n一旦触碰，防御就会大幅降低。"
    zh_trad: "完全防住對手的所有攻擊。\n連續使用時容易失敗。\n一旦觸碰到，防禦會大幅降低。"
