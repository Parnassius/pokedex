    fr: Appel des Ombres Éternelles
    it: Abbraccio Spettrale
    de: Ewige Nacht
    es: Presa Espectral
    ko: 무한암야로의유인
    zh_simp: 无尽暗夜之诱惑
    zh_trad: 無盡暗夜之誘惑
