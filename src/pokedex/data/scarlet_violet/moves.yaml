    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
kinesis:
  names:
    jp_kana: スプーンまげ
    jp_kanji: スプーンまげ
    en: Kinesis
    fr: Télékinésie
    it: Cinèsi
    de: Psykraft
    es: Kinético
    ko: 숟가락휘기
    zh_simp: 折弯汤匙
    zh_trad: 折彎湯匙
  descriptions:
    jp_kana: "スプーンを　まげて　注意を　ひき\n相手の　命中率を　さげる。"
    jp_kanji: "スプーンを　まげて　注意を　ひき\n相手の　命中率を　さげる。"
    en: "The user distracts the target by bending a spoon.\nThis lowers the target’s accuracy."
    fr: "Le lanceur distrait la cible en pliant une cuillère,\nce qui baisse sa Précision."
    it: "Il Pokémon distrae il bersaglio piegando un cucchiaio\ne ne riduce la precisione."
    de: "Lenkt das Ziel durch Verbiegen eines Löffels ab\nund senkt so dessen Genauigkeit."
    es: "Dobla una cuchara para distraer al objetivo y reducir\nsu Precisión."
    ko: "숟가락을 휘어서 주의를 끌어\n상대의 명중률을 낮춘다."
    zh_simp: "折弯汤匙引开注意，\n从而降低对手的命中率。"
    zh_trad: "折彎湯匙引起注意，\n降低對手的命中率。"
kings_shield:
  names:
    jp_kana: キングシールド
    jp_kanji: キングシールド
    en: King’s Shield
    fr: Bouclier Royal
    it: Scudo Reale
    de: Königsschild
    es: Escudo Real
    ko: 킹실드
    zh_simp: 王者盾牌
    zh_trad: 王者盾牌
  descriptions:
    jp_kana: "相手の　攻撃を　防ぐと　同時に\n防御態勢になる。　触れた\n相手の　攻撃を　さげる。"
    jp_kanji: "相手の　攻撃を　防ぐと　同時に\n防御態勢になる。　触れた\n相手の　攻撃を　さげる。"
    en: "The user takes a defensive stance while it protects itself\nfrom damage. This also lowers the Attack stat of any\nattacker that makes direct contact."
    fr: "Le lanceur prend une posture défensive pour bloquer\nles dégâts. Cela diminue l’Attaque de tout assaillant\nqui entre en contact avec le lanceur."
    it: "Il Pokémon si protegge dagli attacchi assumendo\nuna posizione di difesa e riducendo l’Attacco di\nchiunque entri in contatto con lui."
    de: "Der Anwender geht in die Defensive und wird vor\nAngriffen geschützt. Berührt ihn nun ein Angreifer,\nsinkt dessen Angriffs-Wert."
    es: "El usuario adopta una postura defensiva y se protege de\ncualquier daño. Reduce el Ataque de cualquier Pokémon\ncon el que entre en contacto."
    ko: "상대의 공격을 막음과 동시에\n방어 태세를 갖춘다. 접촉한\n상대의 공격을 떨어뜨린다."
    zh_simp: "防住对手攻击的同时，\n自己变为防御姿态。\n能够降低所接触到的对手的攻击。"
    zh_trad: "防住對手攻擊的同時，\n使自己變為防禦姿態。\n降低接觸到的對手的攻擊。"
knock_off:
  names:
    jp_kana: はたきおとす
    jp_kanji: はたきおとす
    en: Knock Off
    fr: Sabotage
    it: Privazione
    de: Abschlag
    es: Desarme
    ko: 탁쳐서떨구기
    zh_simp: 拍落
    zh_trad: 拍落
  descriptions:
    jp_kana: "相手の　持ち物を　はたき　落として\n戦闘が　終わるまで　使えなくする。\n物を持つ　相手には　ダメージが増す。"
    jp_kanji: "相手の　持ち物を　はたき　落として\n戦闘が　終わるまで　使えなくする。\n物を持つ　相手には　ダメージが増す。"
    en: "The user slaps down the target’s held item, making it\nunusable for that battle. This move does more damage\nif the target has a held item."
    fr: "Fait plus de dégâts aux cibles qui tiennent un objet.\nDe plus, fait tomber cet objet et empêche la cible\nde l’utiliser jusqu’à la fin du combat."
    it: "Il Pokémon fa cadere lo strumento del bersaglio,\nimpedendone l’uso nella lotta. Infligge più danni se\nil bersaglio ha uno strumento."
    de: "Schlägt das Item des Zieles weg und vereitelt so dessen\nGebrauch während des Kampfes. Mehr Schaden gegen\nZiele, die ein Item bei sich tragen."
    es: "Hace que el objetivo suelte el objeto que lleva y le\nimpide usarlo hasta que concluye el combate. Inflige\nmás daño si el objetivo lleva un objeto."
    ko: "상대의 지닌 물건을 탁 쳐서 떨어뜨려\n배틀이 끝날 때까지 사용할 수 없게 한다.\n물건을 가진 상대에게는 데미지를 더 준다."
    zh_simp: "拍落对手的持有物，\n直到战斗结束都不能使用。\n对手携带道具时会增加伤害。"
    zh_trad: "拍落對手的持有物，\n讓對手在戰鬥結束前都無法使用。\n對手有攜帶物品時，傷害會增加。"
kowtow_cleave:
  names:
    jp_kana: ドゲザン
    jp_kanji: ドゲザン
    en: Kowtow Cleave
    fr: Génusection
    it: Genufendente
    de: Kniefallspalter
    es: Genufendiente
    ko: 도각참
    zh_simp: 仆刀
    zh_trad: 仆斬
  descriptions:
    jp_kana: "土下座して　相手を\n油断させておいて　切りかかる。\n攻撃は　必ず　命中する。"
    jp_kanji: "土下座して　相手を\n油断させておいて　切りかかる。\n攻撃は　必ず　命中する。"
    en: "The user slashes at the target after kowtowing to make\nthe target let down its guard. This attack never misses."
    fr: "Le lanceur se prosterne devant la cible et profite\nde cette distraction pour l’attaquer avec une lame.\nN’échoue jamais."
    it: "Il Pokémon si genuflette per far abbassare la guardia\nal bersaglio e poi fenderlo. Questo attacco va sempre\na segno."
    de: "Der Anwender fällt auf die Knie und verleitet das Ziel zu\nUnachtsamkeit, bevor er mit einer Klinge zuschlägt.\nDiese Attacke trifft garantiert."
    es: "Se postra en ademán de reverencia para hacer que el\nobjetivo baje la guardia y aprovecha el descuido para\natacar. No falla nunca."
    ko: "머리를 조아려 상대를\n방심하게 만든 뒤에 베어 버린다.\n공격은 반드시 명중한다."
    zh_simp: "下跪让对手大意后\n发起袭击劈向对手。\n攻击必定会命中。"
    zh_trad: "向對手下跪使其大意，\n接著對其劈斬。\n攻擊必定會命中。"
lands_wrath:
  names:
    jp_kana: グランドフォース
    jp_kanji: グランドフォース
    en: Land’s Wrath
    fr: Force Chtonienne
    it: Forza Tellurica
    de: Bodengewalt
    es: Fuerza Telúrica
    ko: 그라운드포스
    zh_simp: 大地神力
    zh_trad: 大地神力
  descriptions:
    jp_kana: "大地の　パワーを　集め\n力を　相手に　集中させて\nダメージを　与える。"
    jp_kanji: "大地の　パワーを　集め\n力を　相手に　集中させて\nダメージを　与える。"
    en: "The user gathers the energy of the land and focuses\nthat power on opposing Pokémon to inflict damage."
    fr: "Le lanceur utilise la puissance du sol et la concentre\nsur la cible pour infliger des dégâts."
    it: "Il Pokémon raccoglie energia tellurica e ne concentra\nil potere sugli avversari, infliggendogli danni."
    de: "Der Anwender sammelt die Kraft des weiten Landes und\ngreift an, indem er sie gebündelt auf gegnerische\nPokémon lenkt."
    es: "Acumula energía de la corteza terrestre y la concentra\ncontra el objetivo para dañarlo."
    ko: "대지의 힘을 모으고\n그 힘을 상대에게 집중시켜서\n데미지를 준다."
    zh_simp: "聚集大地的力量，\n将此力量集中攻击对手，\n并给予伤害。"
    zh_trad: "聚集大地的能量後，\n將力量集中攻擊對手給予傷害。"
laser_focus:
  names:
    jp_kana: とぎすます
    jp_kanji: とぎすます
    en: Laser Focus
    fr: Affilage
    it: Concentrazione
    de: Konzentration
    es: Aguzar
    ko: 예민해지기
    zh_simp: 磨砺
    zh_trad: 磨礪
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
lash_out:
  names:
    jp_kana: うっぷんばらし
    jp_kanji: うっぷんばらし
    en: Lash Out
    fr: Cent Rancunes
    it: Sfogarabbia
    de: Frustventil
    es: Desahogo
    ko: 분풀이
    zh_simp: 泄愤
    zh_trad: 洩憤
  descriptions:
    jp_kana: "相手への　いらだちを　ぶつけて　攻撃。\nそのターンに　能力を　さげられていると\n技の　威力が　２倍に　なる。"
    jp_kanji: "相手への　いらだちを　ぶつけて　攻撃。\nそのターンに　能力を　さげられていると\n技の　威力が　２倍に　なる。"
    en: "The user lashes out to vent its frustration toward the\ntarget. This move’s power is doubled if the user’s stats\nwere lowered during this turn."
    fr: "Le lanceur frappe la cible avec toute sa rancune.\nSi les stats du lanceur ont diminué pendant ce tour,\nla puissance de cette attaque est doublée."
    it: "Il Pokémon attacca il bersaglio con tutta la propria ira.\nSe ha subito riduzioni delle statistiche durante quel\nturno, la potenza della mossa raddoppia."
    de: "Der Anwender entlädt seinen Frust in einem Angriff.\nDie Stärke der Attacke wird verdoppelt, wenn seine\nStatuswerte in dieser Runde gesenkt wurden."
    es: "Ataca al objetivo presa de la rabia. Si el usuario ha\nsufrido una reducción de características en ese turno,\nla potencia del movimiento se duplica."
    ko: "상대에 대한 울분이 담긴 공격을 한다.\n그 턴에 능력이 떨어져 있으면\n기술의 위력이 2배가 된다."
    zh_simp: "攻击对手以发泄对其感到的恼怒情绪。\n如果在该回合内自身能力遭到降低，\n招式的威力会变成２倍。"
    zh_trad: "將惱怒砸向對手進行攻擊。\n如果此回合已被降低能力，\n招式威力就會變成２倍。"
last_resort:
  names:
    jp_kana: とっておき
    jp_kanji: とっておき
    en: Last Resort
    fr: Dernier Recours
    it: Ultimascelta
    de: Zuflucht
    es: Última Baza
    ko: 비장의무기
    zh_simp: 珍藏
    zh_trad: 珍藏
  descriptions:
    jp_kana: "戦闘中に　おぼえている　技を\nすべて　使うと　はじめて　だせる\nとっておきの　技。"
    jp_kanji: "戦闘中に　おぼえている　技を\nすべて　使うと　はじめて　だせる\nとっておきの　技。"
    en: "This move can be used only after the user has used all\nthe other moves it knows in the battle."
    fr: "Cette capacité ne peut être utilisée qu’après\nque le lanceur a utilisé toutes les autres."
    it: "Per usare questa mossa, bisogna prima avvalersi\nnella lotta di tutte le altre mosse conosciute."
    de: "Diese Attacke kann nur eingesetzt werden, nachdem\nalle verfügbaren Attacken ausgeführt worden sind."
    es: "Este movimiento solo puede utilizarse tras haber usado\nal menos una vez todos los demás conocidos por el\nPokémon."
    ko: "배틀 중에 기억하고 있는 기술을\n모두 사용하면 그때부터 쓸 수 있는\n비장의 기술."
    zh_simp: "当战斗中已学会的招式\n全部使用过后，\n才能开始使出珍藏的招式。"
    zh_trad: "在戰鬥中將其他已學會的招式\n全部使用過後，\n才能夠使出的珍藏招式。"
last_respects:
  names:
    jp_kana: おはかまいり
    jp_kanji: おはかまいり
    en: Last Respects
    fr: Hommage Posthume
    it: Omaggio ai KO
    de: Letzte Ehre
    es: Homenaje Póstumo
    ko: 성묘
    zh_simp: 扫墓
    zh_trad: 掃墓
  descriptions:
    jp_kana: "仲間の　無念を　晴らすため　攻撃する。\n倒された　味方のポケモンが　多いほど\n技の　威力が　増える。"
    jp_kanji: "仲間の　無念を　晴らすため　攻撃する。\n倒された　味方のポケモンが　多いほど\n技の　威力が　増える。"
    en: "The user attacks to avenge its allies. The more defeated\nallies there are in the user’s party, the greater the move’s\npower."
    fr: "Le lanceur attaque pour venger ses alliés. Plus le nombre\nde Pokémon alliés mis K.O. est élevé, plus la puissance\nde cette capacité augmente."
    it: "Il Pokémon attacca per placare il risentimento dei suoi\ncompagni di squadra. Più sono quelli andati KO, più\nla potenza della mossa aumenta."
    de: "Der Anwender rächt gefallene Mitstreiter. Je mehr\nkampfunfähige Pokémon sich im Team befinden,\ndesto stärker ist die Attacke."
    es: "Ataca para vengar a sus compañeros caídos y aplacar\nsu desazón. Cuantos más miembros del equipo se hayan\ndebilitado, mayor será la potencia del movimiento."
    ko: "동료의 한을 풀어 주기 위해 공격한다.\n쓰러진 같은 편 포켓몬이 많을수록\n기술의 위력이 올라간다."
    zh_simp: "为了化解伙伴的悔恨而进行攻击。\n被打倒的我方宝可梦越多，\n招式的威力越高。"
    zh_trad: "為了替夥伴雪恨而攻擊。\n被打倒的我方寶可夢越多，\n招式威力就會越強。"
lava_plume:
  names:
    jp_kana: ふんえん
    jp_kanji: ふんえん
    en: Lava Plume
    fr: Ébullilave
    it: Lavasbuffo
    de: Flammensturm
    es: Humareda
    ko: 분연
    zh_simp: 喷烟
    zh_trad: 噴煙
  descriptions:
    jp_kana: "真っ赤な　炎で　自分の\n周りに　いるものを　攻撃する。\nやけど状態に　することが　ある。"
    jp_kanji: "真っ赤な　炎で　自分の\n周りに　いるものを　攻撃する。\nやけど状態に　することが　ある。"
    en: "The user torches everything around it in an inferno\nof scarlet flames. This may also leave those it hits\nwith a burn."
    fr: "Des flammes s’abattent sur tous les Pokémon autour\ndu lanceur, ce qui peut aussi les brûler."
    it: "Chi la usa attacca gli altri Pokémon attorno con fiamme\nscarlatte. Può anche scottarli."
    de: "Anwender greift alle Pokémon im Umkreis mit tiefroten\nFlammen an. Ziele erleiden eventuell Verbrennungen."
    es: "Un infierno de llamas daña a los Pokémon adyacentes\nen combate. Puede causar quemaduras."
    ko: "새빨간 불꽃으로 자신의\n주위에 있는 포켓몬을 공격한다.\n화상 상태로 만들 때가 있다."
    zh_simp: "用熊熊烈火\n攻击自己周围所有的宝可梦。\n有时会陷入灼伤状态。"
    zh_trad: "用熊熊烈火\n攻擊自己周圍所有的寶可夢。\n有時會讓對手陷入灼傷狀態。"
leaf_blade:
  names:
    jp_kana: リーフブレード
    jp_kanji: リーフブレード
    en: Leaf Blade
    fr: Lame Feuille
    it: Fendifoglia
    de: Laubklinge
    es: Hoja Aguda
    ko: 리프블레이드
    zh_simp: 叶刃
    zh_trad: 葉刃
  descriptions:
    jp_kana: "はっぱを　剣のように　あやつり\n相手を　切りつけて　攻撃する。\n急所に　当たりやすい。"
    jp_kanji: "はっぱを　剣のように　あやつり\n相手を　切りつけて　攻撃する。\n急所に　当たりやすい。"
    en: "The user handles a sharp leaf like a sword and cuts the\ntarget to inflict damage. This move has a heightened\nchance of landing a critical hit."
    fr: "Une feuille coupante comme une lame entaille la cible.\nTaux de critiques élevé."
    it: "Il Pokémon attacca il bersaglio manovrando una foglia\ncome se fosse una spada. Probabile brutto colpo."
    de: Hieb mit scharfkantigem Blatt. Hohe Volltrefferquote.
    es: "Acuchilla con una hoja fina. Suele asestar un golpe\ncrítico."
    ko: "잎사귀를 칼처럼 이용해\n상대를 베어 공격한다.\n급소에 맞기 쉽다."
    zh_simp: "像用剑一般操纵叶片\n切斩对手进行攻击。\n容易击中要害。"
    zh_trad: "如用劍般操控葉子\n切斬對手進行攻擊。\n容易擊中要害。"
leaf_storm:
  names:
    jp_kana: リーフストーム
    jp_kanji: リーフストーム
    en: Leaf Storm
    fr: Tempête Verte
    it: Verdebufera
    de: Blättersturm
    es: Lluevehojas
    ko: 리프스톰
    zh_simp: 飞叶风暴
    zh_trad: 飛葉風暴
  descriptions:
    jp_kana: "とがった　はっぱで　相手に　あらしを\nおこす。使うと　反動で\n自分の　特攻が　がくっと　さがる。"
    jp_kanji: "とがった　はっぱで　相手に　あらしを\nおこす。使うと　反動で\n自分の　特攻が　がくっと　さがる。"
    en: "The user whips up a storm of leaves around the target.\nThe recoil from this move harshly lowers the user’s\nSp. Atk stat."
    fr: "Invoque une tempête de feuilles acérées.\nLe contrecoup réduit beaucoup l’Attaque Spéciale\ndu lanceur."
    it: "Il Pokémon scatena sul bersaglio una tempesta\ndi foglie affilate. Il contraccolpo riduce di molto\nl’Attacco Speciale di chi la usa."
    de: "Anwender erzeugt einen Sturm aus scharfen Blättern.\nRückstoß senkt Spezial-Angriff des Anwenders stark."
    es: "Envuelve al objetivo con una lluvia de hojas afiladas,\npero reduce mucho el Ataque Especial del usuario."
    ko: "뾰족한 잎사귀로 상대에게 돌풍을\n일으킨다. 사용하면 반동으로\n자신의 특수공격이 크게 떨어진다."
    zh_simp: "用尖尖的叶片向对手卷起风暴。\n使用之后因为反作用力\n自己的特攻会大幅降低。"
    zh_trad: "用尖銳的葉子捲起風暴向對手進行攻擊。\n使用後因為反作用力，\n自己的特攻會大幅降低。"
leaf_tornado:
  names:
    jp_kana: グラスミキサー
    jp_kanji: グラスミキサー
    en: Leaf Tornado
    fr: Phytomixeur
    it: Vorticerba
    de: Grasmixer
    es: Ciclón de Hojas
    ko: 그래스믹서
    zh_simp: 青草搅拌器
    zh_trad: 青草攪拌器
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
leafage:
  names:
    jp_kana: このは
    jp_kanji: このは
    en: Leafage
    fr: Feuillage
    it: Fogliame
    de: Blattwerk
    es: Follaje
    ko: 나뭇잎
    zh_simp: 树叶
    zh_trad: 樹葉
  descriptions:
    jp_kana: "はっぱを　相手に　当てて\n攻撃する。"
    jp_kanji: "はっぱを　相手に　当てて\n攻撃する。"
    en: The user attacks by pelting the target with leaves.
    fr: Le lanceur attaque la cible avec des feuilles.
    it: Il Pokémon attacca il bersaglio con delle foglie.
    de: Der Anwender greift das Ziel mit Blättern an.
    es: Ataca al objetivo lanzando hojas.
    ko: 잎사귀를 상대에게 맞혀서 공격한다.
    zh_simp: "将叶片打向对手，\n进行攻击。"
    zh_trad: "將葉片打向對手，\n進行攻擊。"
leech_life:
  names:
    jp_kana: きゅうけつ
    jp_kanji: きゅうけつ
    en: Leech Life
    fr: Vampirisme
    it: Sanguisuga
    de: Blutsauger
    es: Chupavidas
    ko: 흡혈
    zh_simp: 汲取
    zh_trad: 吸血
  descriptions:
    jp_kana: "血を　吸い取って　相手を\n攻撃する。　与えた　ダメージの\n半分の　ＨＰを　回復できる。"
    jp_kanji: "血を　吸い取って　相手を\n攻撃する。　与えた　ダメージの\n半分の　ＨＰを　回復できる。"
    en: "The user drains the target’s blood. The user’s HP is\nrestored by up to half the damage taken by the target."
    fr: "Une attaque qui aspire le sang de la cible.\nLa moitié des dégâts sont convertis en PV\npour le lanceur."
    it: "Il Pokémon succhia il sangue del bersaglio e lo attacca,\nrecuperando una quantità di PS pari alla metà del danno\ninflitto."
    de: "Der Anwender saugt dem Ziel Blut ab. Die Hälfte des\nzugefügten Schadens wird dem Anwender als KP\ngutgeschrieben."
    es: "Chupa sangre al objetivo. El usuario recupera la mitad\nde los PS del daño que produce."
    ko: "피를 빨아서 상대를\n공격한다. 준 데미지의\n절반을 HP로 회복한다."
    zh_simp: "吸取血液攻击对手。\n可以回复给予对手\n伤害的一半ＨＰ。"
    zh_trad: "吸取對手的血液進行攻擊。\n可以回復給予對手\n傷害的一半ＨＰ。"
leech_seed:
  names:
    jp_kana: やどりぎのタネ
    jp_kanji: やどりぎのタネ
    en: Leech Seed
    fr: Vampigraine
    it: Parassiseme
    de: Egelsamen
    es: Drenadoras
    ko: 씨뿌리기
    zh_simp: 寄生种子
    zh_trad: 寄生種子
  descriptions:
    jp_kana: "植えつけた　相手の　ＨＰを\n毎ターン　少しだけ　吸い取り\n自分の　ＨＰを　回復する。"
    jp_kanji: "植えつけた　相手の　ＨＰを\n毎ターン　少しだけ　吸い取り\n自分の　ＨＰを　回復する。"
    en: "A seed is planted on the target. It steals some HP from\nthe target every turn."
    fr: "Une graine est semée sur la cible. À chaque tour,\nelle lui dérobe des PV que le lanceur récupère."
    it: "Vengono piantati semi sul bersaglio. Questi\nsottraggono PS a ogni turno permettendo\na chi la usa di curarsi."
    de: "Ziel wird bepflanzt und verliert jede Runde KP, die ein\nPokémon aus dem Team des Anwenders heilen."
    es: "Planta semillas que absorben PS del objetivo en cada\nturno y que le sirven para recuperarse."
    ko: "씨가 뿌려진 상대의 HP를\n매 턴 조금씩 흡수하여\n자신의 HP를 회복한다."
    zh_simp: "植入寄生种子后，将在每回合\n一点一点吸取对手的ＨＰ，\n从而用来回复自己的ＨＰ。"
    zh_trad: "在對手身上植入種子，\n每回合吸取對手少許的ＨＰ，\n用來回復自己的ＨＰ。"
leer:
  names:
    jp_kana: にらみつける
    jp_kanji: にらみつける
    en: Leer
    fr: Groz’Yeux
    it: Fulmisguardo
    de: Silberblick
    es: Malicioso
    ko: 째려보기
    zh_simp: 瞪眼
    zh_trad: 瞪眼
  descriptions:
    jp_kana: "鋭い　目つきで　おびえさせて\n相手の　防御を　さげる。"
    jp_kanji: "鋭い　目つきで　おびえさせて\n相手の　防御を　さげる。"
    en: "The user gives opposing Pokémon an intimidating leer\nthat lowers their Defense stats."
    fr: "Le lanceur fait les gros yeux à la cible pour l’intimider\net baisser sa Défense."
    it: "Il Pokémon terrorizza gli avversari con uno sguardo\nfulminante e intimidatorio, riducendone la Difesa."
    de: "Der Verteidigungs-Wert gegnerischer Pokémon wird\ndurch einen angsteinflößenden Blick gesenkt."
    es: "Intimida al objetivo con una mirada torva para reducir\nsu Defensa."
    ko: "날카로운 눈초리로 겁을 주어\n상대의 방어를 떨어뜨린다."
    zh_simp: "用犀利的眼神使其害怕，\n从而降低对手的防御。"
    zh_trad: "用犀利的眼神使對手害怕，\n降低對手的防禦。"
lets_snuggle_forever:
  names:
    jp_kana: ぽかぼかフレンドタイム
    jp_kanji: ぽかぼかフレンドタイム
    en: Let’s Snuggle Forever
    fr: Patati-Patattrape
    it: Dolcesacco di Botte
    de: Herzliche Knuddelkloppe
    es: Somanta Amistosa
    ko: 투닥투닥프렌드타임
    zh_simp: 亲密无间大乱揍
    zh_trad: 親密無間大亂揍
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
lick:
  names:
    jp_kana: したでなめる
    jp_kanji: したでなめる
    en: Lick
    fr: Léchouille
    it: Leccata
    de: Schlecker
    es: Lengüetazo
    ko: 핥기
    zh_simp: 舌舔
    zh_trad: 舌舔
  descriptions:
    jp_kana: "長い　舌で\n相手を　なめまわして　攻撃する。\nまひ状態に　することが　ある。"
    jp_kanji: "長い　舌で\n相手を　なめまわして　攻撃する。\nまひ状態に　することが　ある。"
    en: "The user licks the target with a long tongue to inflict\ndamage. This may also leave the target with paralysis."
    fr: "Un grand coup de langue qui inflige des dégâts\nà la cible et peut aussi la paralyser."
    it: "Il Pokémon attacca il bersaglio leccandolo con la sua\nlingua lunga. Può anche paralizzarlo."
    de: "Leck-Attacke mit langer Zunge. Das Ziel wird eventuell\nparalysiert."
    es: "El usuario ataca al objetivo lamiéndolo con su larga\nlengua. Puede causar parálisis."
    ko: "긴 혀로\n상대를 핥아서 공격한다.\n마비 상태로 만들 때가 있다."
    zh_simp: "用长长的舌头，\n舔遍对手进行攻击。\n有时会让对手陷入麻痹状态。"
    zh_trad: "用長長的舌頭，\n舔遍對手進行攻擊。\n有時會讓對手陷入麻痺狀態。"
life_dew:
  names:
    jp_kana: いのちのしずく
    jp_kanji: いのちのしずく
    en: Life Dew
    fr: Fontaine de Vie
    it: Goccia Vitale
    de: Lebenstropfen
    es: Gota Vital
    ko: 생명의물방울
    zh_simp: 生命水滴
    zh_trad: 生命水滴
  descriptions:
    jp_kana: "不思議な　水を　ふりまいて\n自分と　場にいる\n味方の　ＨＰを　回復する。"
    jp_kanji: "不思議な　水を　ふりまいて\n自分と　場にいる\n味方の　ＨＰを　回復する。"
    en: "The user scatters mysterious water around and restores\nthe HP of itself and its ally Pokémon currently in\nthe battle."
    fr: "Le lanceur projette une eau mystérieuse sur le terrain\npour restaurer ses PV et ceux de ses alliés au combat."
    it: "Il Pokémon sparge tutt’intorno dell’acqua misteriosa\nche fa recuperare PS a sé e agli alleati in campo."
    de: "Wundersames Wasser heilt die KP des Anwenders und\nseiner am Kampf beteiligten Mitstreiter."
    es: "Vierte un agua misteriosa y balsámica que restaura\ntanto sus propios PS como los de aquellos aliados\npresentes en el terreno de combate."
    ko: "신비한 물을 흩뿌려서\n자신과 배틀에 나와 있는\n같은 편의 HP를 회복한다."
    zh_simp: "喷洒出神奇的水，\n回复自己和场上同伴的ＨＰ。"
    zh_trad: "灑出神奇之水，\n回復自己和場上同伴的ＨＰ。"
light_of_ruin:
  names:
    jp_kana: はめつのひかり
    jp_kanji: はめつのひかり
    en: Light of Ruin
    fr: Lumière du Néant
    it: Luce Nefasta
    de: Lux Calamitatis
    es: Luz Aniquiladora
    ko: 파멸의빛
    zh_simp: 破灭之光
    zh_trad: 破滅之光
  descriptions:
    jp_kana: "永遠の花　の　パワーを　かりて\n強力な　光線を　撃ちだす。\n自分も　ものすごい　ダメージを　受ける。"
    jp_kanji: "永遠の花　の　パワーを　かりて\n強力な　光線を　撃ちだす。\n自分も　ものすごい　ダメージを　受ける。"
    en: "Drawing power from the Eternal Flower, the user\nfires a powerful beam of light. This also damages\nthe user terribly."
    fr: "Le lanceur utilise la puissance de la fleur Éternelle pour\nlancer un formidable rayon d’énergie. Cela blesse aussi\ntrès gravement le lanceur."
    it: "Il Pokémon concentra il potere del Fiore Eterno\nper sparare un raggio di luce potentissimo, ma\nsubisce danni considerevoli."
    de: "Die Attacke basiert auf der Kraft des Ewigblütlers,\ndie als mächtiger Lichtstrahl abgefeuert wird.\nDer Anwender nimmt dabei selbst enormen Schaden."
    es: "El usuario emplea el poder de la Flor Eterna para\nlanzar un potente rayo de luz, pero también se hiere\ngravemente a sí mismo."
    ko: "영원의 꽃의 파워를 빌려서\n강력한 광선을 쏜다.\n자신도 굉장한 데미지를 입는다."
    zh_simp: "借用永恒之花的力量，\n发射出强力光线。\n自己也会受到非常大的伤害。"
    zh_trad: "借用永恆之花的力量，\n發射出強力光線。\n自己也會受到非常大的傷害。"
light_screen:
  names:
    jp_kana: ひかりのかべ
    jp_kanji: ひかりのかべ
    en: Light Screen
    fr: Mur Lumière
    it: Schermoluce
    de: Lichtschild
    es: Pantalla de Luz
    ko: 빛의장막
    zh_simp: 光墙
    zh_trad: 光牆
  descriptions:
    jp_kana: "５ターンの　間　不思議な　かべで\n相手から　受ける　特殊攻撃の\nダメージを　弱める。"
    jp_kanji: "５ターンの　間　不思議な　かべで\n相手から　受ける　特殊攻撃の\nダメージを　弱める。"
    en: "A wondrous wall of light is put up to reduce damage\nfrom special moves for five turns."
    fr: "Crée un fabuleux mur de lumière qui réduit les dégâts\ncausés par les capacités spéciales pendant cinq tours."
    it: "Il Pokémon innalza una barriera misteriosa che riduce\ni danni degli attacchi speciali subiti per mano\ndell’avversario per cinque turni."
    de: "Erzeugt eine Lichtwand und senkt den Schaden durch\nSpezial-Attacken für fünf Runden."
    es: "Barrera misteriosa que reduce durante cinco turnos el\ndaño producido por los ataques especiales del rival."
    ko: "5턴 동안 이상한 장막을 쳐서\n상대로부터 받는 특수공격의\n데미지를 약하게 한다."
    zh_simp: "利用神奇的墙壁，\n在５回合内减弱从对手那里\n受到的特殊攻击的伤害。"
    zh_trad: "利用神奇的屏障，\n在５回合內減輕\n來自對手的特殊攻擊傷害。"
light_that_burns_the_sky:
  names:
    jp_kana: てんこがすめつぼうのひかり
    jp_kanji: てんこがすめつぼうのひかり
    en: Light That Burns the Sky
    fr: Apocalypsis Luminis
    it: Fotodistruzione Apocalittica
    de: Licht des Erlöschens
    es: Fotodestrucción Apocalíptica
    ko: 하늘을태우는멸망의빛
    zh_simp: 焚天灭世炽光爆
    zh_trad: 焚天滅世熾光爆
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
liquidation:
  names:
    jp_kana: アクアブレイク
    jp_kanji: アクアブレイク
    en: Liquidation
    fr: Aqua-Brèche
    it: Idrobreccia
    de: Aquadurchstoß
    es: Hidroariete
    ko: 아쿠아브레이크
    zh_simp: 水流裂破
    zh_trad: 水流裂破
  descriptions:
    jp_kana: "水の　力で　相手に\nぶつかって　攻撃する。\n相手の　防御を　さげる　ことがある。"
    jp_kanji: "水の　力で　相手に\nぶつかって　攻撃する。\n相手の　防御を　さげる　ことがある。"
    en: "The user slams into the target using a full-force blast of\nwater. This may also lower the target’s Defense stat."
    fr: "Le lanceur utilise la force de l’eau pour attaquer.\nPeut aussi baisser la Défense de la cible."
    it: "Il Pokémon attacca colpendo il bersaglio con la forza\ndell’acqua. Può anche ridurne la Difesa."
    de: "Der Anwender greift das Ziel mit der Kraft des Wassers\nan. Senkt eventuell die Verteidigung des Zieles."
    es: "Ataca golpeando gracias a la fuerza del agua.\nTambién puede reducir la Defensa del objetivo."
    ko: "물의 힘으로 상대에게\n부딪쳐서 공격한다.\n상대의 방어를 떨어뜨릴 때가 있다."
    zh_simp: "用水之力量撞向对手进行攻击。\n有时会降低对手的防御。"
    zh_trad: "用水之力量撞向對手進行攻擊。\n有時會降低對手的防禦。"
lock_on:
  names:
    jp_kana: ロックオン
    jp_kanji: ロックオン
    en: Lock-On
    fr: Verrouillage
    it: Localizza
    de: Zielschuss
    es: Fijar Blanco
    ko: 록온
    zh_simp: 锁定
    zh_trad: 鎖定
  descriptions:
    jp_kana: "照準を　しっかり　あわせて\n次の　攻撃が　必ず\n相手に　当たるように　する。"
    jp_kanji: "照準を　しっかり　あわせて\n次の　攻撃が　必ず\n相手に　当たるように　する。"
    en: "The user takes sure aim at the target. This ensures\nthe user’s next move does not miss that target."
    fr: "Le lanceur verrouille la cible pour ne pas la rater\nau tour suivant."
    it: "Il Pokémon punta il bersaglio con precisione.\nL’attacco successivo andrà sicuramente a segno."
    de: "Der Anwender visiert das Ziel an und trifft in der\nnächsten Runde garantiert."
    es: Fija el blanco para que el siguiente movimiento no falle.
    ko: "조준을 잘 맞춰\n다음 공격이 반드시\n상대에게 명중하도록 한다."
    zh_simp: "紧紧瞄准对手，\n下次攻击必定会打中。"
    zh_trad: "精確地瞄準，\n下次攻擊時一定\n會命中對手。"
lovely_kiss:
  names:
    jp_kana: あくまのキッス
    jp_kanji: あくまのキッス
    en: Lovely Kiss
    fr: Grobisou
    it: Demonbacio
    de: Todeskuss
    es: Beso Amoroso
    ko: 악마의키스
    zh_simp: 恶魔之吻
    zh_trad: 惡魔之吻
  descriptions:
    jp_kana: "恐ろしい　顔で　キスを　せまる。\n相手を　眠り状態に　する。"
    jp_kanji: "恐ろしい　顔で　キスを　せまる。\n相手を　眠り状態に　する。"
    en: "With a scary face, the user tries to kiss the target.\nIf it succeeds, the target falls asleep."
    fr: "Le lanceur fait un bisou à la cible en prenant\nune mine effrayante, ce qui la fait s’endormir."
    it: "Il Pokémon intimidisce il bersaglio con una faccia\npaurosa e gli schiocca un bacio che lo fa addormentare."
    de: "Anwender zwingt dem Ziel einen Kuss auf, der Schlaf\nverursacht."
    es: "Intimida al objetivo con una cara que asusta y le da\nun beso que lo deja dormido."
    ko: "무서운 얼굴로 키스한다.\n상대를 잠듦 상태로 만든다."
    zh_simp: "用恐怖的脸强吻对手。\n让对手陷入睡眠状态。"
    zh_trad: "用恐怖的臉強吻對手。\n能讓對手陷入睡眠狀態。"
low_kick:
  names:
    jp_kana: けたぐり
    jp_kanji: けたぐり
    en: Low Kick
    fr: Balayage
    it: Colpo Basso
    de: Fußkick
    es: Patada Baja
    ko: 안다리걸기
    zh_simp: 踢倒
    zh_trad: 踢倒
  descriptions:
    jp_kana: "足を　強く　けり\n相手を　転ばせて　攻撃する。\n相手が　重いほど　威力が　あがる。"
    jp_kanji: "足を　強く　けり\n相手を　転ばせて　攻撃する。\n相手が　重いほど　威力が　あがる。"
    en: "A powerful low kick that makes the target fall over.\nThe heavier the target, the greater the move’s power."
    fr: "Un grand coup de pied bas qui fauche la cible.\nPlus celle-ci est lourde, plus la puissance de\ncette capacité augmente."
    it: "Il Pokémon attacca il bersaglio con un calcio basso e\npotente che lo fa cadere. Più il bersaglio è pesante,\nmaggiore è la potenza della mossa."
    de: "Ein Tritt, der das Ziel umwirft. Je schwerer das Ziel ist,\ndesto mehr Schaden fügt ihm die Attacke zu."
    es: "Patada baja que derriba al objetivo. Cuanto más pesa\neste, más daño le causa."
    ko: "발을 강하게 걸고\n상대를 넘어뜨려 공격한다.\n상대가 무거울수록 위력이 올라간다."
    zh_simp: "用力踢对手的脚，\n使其摔倒进行攻击。\n对手越重，威力越大。"
    zh_trad: "用力踢對手的腳，\n讓對手摔倒進行攻擊。\n對手越重，威力越大。"
low_sweep:
  names:
    jp_kana: ローキック
    jp_kanji: ローキック
    en: Low Sweep
    fr: Balayette
    it: Calciobasso
    de: Fußtritt
    es: Puntapié
    ko: 로킥
    zh_simp: 下盘踢
    zh_trad: 下盤踢
  descriptions:
    jp_kana: "素早い　動きで　相手の　足を\nねらって　攻撃する。\n相手の　素早さを　さげる。"
    jp_kanji: "素早い　動きで　相手の　足を\nねらって　攻撃する。\n相手の　素早さを　さげる。"
    en: "The user makes a swift attack on the target’s legs,\nwhich lowers the target’s Speed stat."
    fr: "Un coup rapide qui affecte la mobilité de la cible\net diminue sa Vitesse."
    it: "Il Pokémon colpisce con un attacco fulmineo\nla parte inferiore del corpo del bersaglio,\nriducendone la Velocità."
    de: "Anwender greift mit blitzschnellen Bewegungen die\nBeine des Zieles an und senkt dessen Initiative."
    es: "Ataque rápido dirigido a los pies del objetivo que le\nhace perder Velocidad."
    ko: "재빠른 움직임으로\n상대의 다리를 노려 공격한다.\n상대의 스피드를 떨어뜨린다."
    zh_simp: "以敏捷的动作瞄准\n对手的脚进行攻击。\n会降低对手的速度。"
    zh_trad: "瞄準對手的腳，\n以敏捷的動作進行攻擊。\n可降低對手的速度。"
lucky_chant:
  names:
    jp_kana: おまじない
    jp_kanji: おまじない
    en: Lucky Chant
    fr: Air Veinard
    it: Fortuncanto
    de: Beschwörung
    es: Conjuro
    ko: 주술
    zh_simp: 幸运咒语
    zh_trad: 幸運咒語
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
lumina_crash:
  names:
    jp_kana: ルミナコリジョン
    jp_kanji: ルミナコリジョン
    en: Lumina Crash
    fr: Lumino-Impact
    it: Fotocollisione
    de: Lichteinschlag
    es: Fotocolisión
    ko: 루미나콜리전
    zh_simp: 琉光冲激
    zh_trad: 琉光衝激
  descriptions:
    jp_kana: "精神にも　作用する\n奇妙な光を　放って　攻撃する。\n相手の　特防を　がくっと　さげる。"
    jp_kanji: "精神にも　作用する\n奇妙な光を　放って　攻撃する。\n相手の　特防を　がくっと　さげる。"
    en: "The user attacks by unleashing a peculiar light that even\naffects the mind. This also harshly lowers the target’s\nSp. Def stat."
    fr: "Le lanceur attaque en émettant une étrange lumière\nqui ébranle l’esprit de la cible. Cela baisse beaucoup\nla Défense Spéciale de la cible."
    it: "Il Pokémon attacca sparando una luce bizzarra che\nagisce anche sulla psiche. Riduce di molto la Difesa\nSpeciale del bersaglio."
    de: "Der Anwender greift an, indem er ein sonderbares Licht\nfreisetzt, das sich auch auf die Psyche auswirkt. Zudem\nwird die Spezial-Verteidigung des Zieles stark gesenkt."
    es: "Ataca proyectando una extraña luz que afecta a\nla mente. Reduce mucho la Defensa Especial del\nobjetivo."
    ko: "정신에도 작용하는\n기묘한 빛을 발산해서 공격한다.\n상대의 특수방어를 크게 떨어뜨린다."
    zh_simp: "放出连精神都能影响到的\n奇妙怪光进行攻击。\n会大幅降低对方的特防。"
    zh_trad: "發出對精神也會起作用的\n奇異光線進行攻擊。\n大幅降低對手的特防。"
lunar_blessing:
  names:
    jp_kana: みかづきのいのり
    jp_kanji: みかづきのいのり
    en: Lunar Blessing
    fr: Prière Lunaire
    it: Invocaluna
    de: Lunargebet
    es: Plegaria Lunar
    ko: 초승달의기도
    zh_simp: 新月祈祷
    zh_trad: 新月祈禱
  descriptions:
    jp_kana: "みかづきに　いのりを　ささげて\n自分と　場にいる　味方の\nＨＰと　状態を　回復する。"
    jp_kanji: "みかづきに　いのりを　ささげて\n自分と　場にいる　味方の\nＨＰと　状態を　回復する。"
    en: "The user receives a blessing from the crescent moon,\nrestoring HP and curing status conditions for itself and\nits ally Pokémon currently in the battle."
    fr: "Le lanceur adresse une prière à la lune pour restaurer\nles PV et soigner ses altérations de statut ainsi que\ncelles de ses alliés."
    it: "Il Pokémon rivolge una preghiera alla luna crescente,\nripristinando i PS e curando i problemi di stato per sé\ne per gli alleati in campo."
    de: "Der Anwender richtet ein Gebet an den Mond und heilt\nbei sich und seinen am Kampf beteiligten Mitstreitern KP\nund hebt jegliche Statusprobleme auf."
    es: "Dedica una oración a la luna creciente que restaura\nlos PS y cura los problemas de estado del bando del\nusuario."
    ko: "초승달에 기도를 하여\n자신과 배틀에 나와 있는 같은 편의\nHP와 모든 상태를 회복한다."
    zh_simp: "向新月献上祈祷，\n回复自己和场上\n同伴的ＨＰ和状态。"
    zh_trad: "向新月獻上祈禱，\n回復自己和場上同伴的ＨＰ和狀態。"
lunar_dance:
  names:
    jp_kana: みかづきのまい
    jp_kanji: みかづきのまい
    en: Lunar Dance
    fr: Danse Lune
    it: Lunardanza
    de: Lunartanz
    es: Danza Lunar
    ko: 초승달춤
    zh_simp: 新月舞
    zh_trad: 新月舞
  descriptions:
    jp_kana: "自分は　ひんしに　なるが\n控えから　でてくる　ポケモンの\nすべての　状態を　回復する。"
    jp_kanji: "自分は　ひんしに　なるが\n控えから　でてくる　ポケモンの\nすべての　状態を　回復する。"
    en: "The user faints. In return, the Pokémon taking its place\nwill have its HP and PP restored and its status conditions\ncured."
    fr: "Le lanceur tombe K.O. pour soigner totalement\nle Pokémon qui prendra sa place au combat."
    it: "Chi la usa va KO. Il Pokémon che lo sostituisce\nguarisce dai propri problemi di stato e recupera\ntutti i PS e i PP."
    de: "Anwender geht K.O. Das an seine Stelle tretende\nPokémon hat dafür volle KP sowie AP und wird von\nStatusproblemen geheilt."
    es: "El usuario se debilita, pero cura los problemas de\nestado del Pokémon que lo sustituye y restaura sus PS\ny sus PP."
    ko: "자신은 기절하지만\n교대하여 나오는 포켓몬의\n모든 상태를 회복한다."
    zh_simp: "虽然自己陷入昏厥，\n但可以治愈后备上场的\n宝可梦的全部状态。"
    zh_trad: "雖然自己會陷入瀕死，\n但可以讓接替上場的\n寶可夢回復到萬全狀態。"
lunge:
  names:
    jp_kana: とびかかる
    jp_kanji: とびかかる
    en: Lunge
    fr: Furie-Bond
    it: Assalto
    de: Anfallen
    es: Plancha
    ko: 덤벼들기
    zh_simp: 猛扑
    zh_trad: 猛撲
  descriptions:
    jp_kana: "全力で　相手に\n飛びかかって　攻撃。\n相手の　攻撃を　さげる。"
    jp_kanji: "全力で　相手に\n飛びかかって　攻撃。\n相手の　攻撃を　さげる。"
    en: "The user makes a lunge at the target, attacking with\nfull force. This also lowers the target’s Attack stat."
    fr: "Le lanceur se jette sur la cible de toutes ses forces\npour lui infliger des dégâts et baisser son Attaque."
    it: "Il Pokémon attacca lanciandosi con tutte le sue forze\nsul bersaglio e ne riduce l’Attacco."
    de: "Der Anwender greift das Ziel mit ganzer Kraft an,\nwodurch auch der Angriffs-Wert des Zieles sinkt."
    es: "Ataca al objetivo abalanzándose sobre él con todas\nsus fuerzas y reduce su Ataque."
    ko: "전력으로 상대에게\n덤벼들며 공격한다.\n상대의 공격을 떨어뜨린다."
    zh_simp: "全力猛扑对手进行攻击。\n从而降低对手的攻击。"
    zh_trad: "全力猛撲對手進行攻擊。\n進而降低對手的攻擊。"
luster_purge:
  names:
    jp_kana: ラスターパージ
    jp_kanji: ラスターパージ
    en: Luster Purge
    fr: Lumi-Éclat
    it: Abbagliante
    de: Scheinwerfer
    es: Resplandor
    ko: 러스터퍼지
    zh_simp: 洁净光芒
    zh_trad: 潔淨光芒
  descriptions:
    jp_kana: "まばゆい　光を\n解放して　攻撃する。\n相手の　特防を　さげることが　ある。"
    jp_kanji: "まばゆい　光を\n解放して　攻撃する。\n相手の　特防を　さげることが　ある。"
    en: "The user lets loose a damaging burst of light. This may\nalso lower the target’s Sp. Def stat."
    fr: "Le lanceur libère un éclair lumineux qui peut aussi\nbaisser la Défense Spéciale de la cible."
    it: "Il Pokémon sprigiona una luce abbagliante che può\nanche ridurre la Difesa Speciale del bersaglio."
    de: "Angriff mit einem grellen Licht, der die\nSpezial-Verteidigung des Zieles eventuell senkt."
    es: "Fogonazo de luz que inflige daño al objetivo y puede\nreducir su Defensa Especial."
    ko: "눈부신 빛을 발산하여\n공격한다. 상대의 특수방어를\n떨어뜨릴 때가 있다."
    zh_simp: "释放耀眼的光芒进行攻击。\n有时会降低对手的特防。"
    zh_trad: "放出耀眼的光芒進行攻擊。\n有時會降低對手的特防。"
mach_punch:
  names:
    jp_kana: マッハパンチ
    jp_kanji: マッハパンチ
    en: Mach Punch
    fr: Mach Punch
    it: Pugnorapido
    de: Tempohieb
    es: Ultrapuño
    ko: 마하펀치
    zh_simp: 音速拳
    zh_trad: 音速拳
  descriptions:
    jp_kana: "目にも　留まらぬ　ものすごい　速さで\nパンチを　くりだす。\n必ず　先制攻撃　できる。"
    jp_kanji: "目にも　留まらぬ　ものすごい　速さで\nパンチを　くりだす。\n必ず　先制攻撃　できる。"
    en: "The user throws a punch at blinding speed. This move\nalways goes first."
    fr: "Coup de poing fulgurant.\nFrappe en priorité."
    it: "Il Pokémon tira un pugno a una tale velocità da rendersi\nquasi invisibile. Questo attacco ha priorità alta."
    de: "Bei dieser Erstschlag-Attacke greift der Anwender\nmit einem extrem schnellen Hieb an."
    es: "Puñetazo de velocidad fulminante. Este movimiento\ntiene prioridad alta."
    ko: "눈에 보이지 않는 굉장한 속도로\n펀치를 날린다.\n반드시 선제공격을 할 수 있다."
    zh_simp: "以迅雷不及掩耳之势出拳。\n必定能够先制攻击。"
    zh_trad: "以迅雷不及掩耳之勢出拳。\n必定能夠發動先制攻擊。"
magic_coat:
  names:
    jp_kana: マジックコート
    jp_kanji: マジックコート
    en: Magic Coat
    fr: Reflet Magik
    it: Magivelo
    de: Magiemantel
    es: Capa Mágica
    ko: 매직코트
    zh_simp: 魔法反射
    zh_trad: 魔法反射
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
magic_powder:
