    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
acid_spray:
  names:
    jp_kana: アシッドボム
    jp_kanji: アシッドボム
    en: Acid Spray
    fr: Bombe Acide
    it: Acidobomba
    de: Säurespeier
    es: Bomba Ácida
    ko: 애시드봄
    zh_simp: 酸液炸弹
    zh_trad: 酸液炸彈
  descriptions:
    jp_kana: "相手を　とかす　液体を\n吐きだして　攻撃する。\n相手の　特防を　がくっと　さげる。"
    jp_kanji: "相手を　とかす　液体を\n吐きだして　攻撃する。\n相手の　特防を　がくっと　さげる。"
    en: "The user attacks by spitting fluid that works to melt the\ntarget. This also harshly lowers the target’s Sp. Def stat."
    fr: "Le lanceur projette un liquide acide qui fait fondre\nla cible, ce qui diminue beaucoup la Défense Spéciale\nde celle-ci."
    it: "Il Pokémon attacca il bersaglio con un acido\naltamente corrosivo, riducendone di molto\nla Difesa Speciale."
    de: "Anwender greift an, indem er eine ätzende Flüssigkeit\nauf das Ziel speit. Senkt dessen Spezial-Verteidigung\nstark."
    es: "Ataca con un líquido corrosivo que reduce mucho la\nDefensa Especial del objetivo."
    ko: "상대를 녹이는 액체를\n토해 내서 공격한다.\n상대의 특수방어를 크게 떨어뜨린다."
    zh_simp: "喷出能溶化对手的液体进行攻击。\n会大幅降低对手的特防。"
    zh_trad: "噴出能溶化對手的液體進行攻擊。\n可大幅降低對手的特防。"
acrobatics:
  names:
    jp_kana: アクロバット
    jp_kanji: アクロバット
    en: Acrobatics
    fr: Acrobatie
    it: Acrobazia
    de: Akrobatik
    es: Acróbata
    ko: 애크러뱃
    zh_simp: 杂技
    zh_trad: 雜技
  descriptions:
    jp_kana: "軽やかに　相手を　攻撃する。\n自分が　道具を　持っていないとき\n大きな　ダメージを　与える。"
    jp_kanji: "軽やかに　相手を　攻撃する。\n自分が　道具を　持っていないとき\n大きな　ダメージを　与える。"
    en: "The user nimbly strikes the target. This attack does\nmassive damage if the user isn’t holding an item."
    fr: "Le lanceur frappe la cible avec agilité. S’il ne tient pas\nd’objet, l’attaque inflige davantage de dégâts."
    it: "Il Pokémon attacca rapidamente il bersaglio.\nSe chi la usa non ha uno strumento, infligge\ngrossi danni."
    de: "Ein graziler Angriff auf das Ziel. Trägt der Anwender\nkein Item bei sich, richtet die Attacke großen\nSchaden an."
    es: "Golpea ágilmente. Si el usuario no lleva ningún objeto,\nel objetivo resulta seriamente dañado."
    ko: "경쾌하게 상대를 공격한다.\n자신이 도구를 지니고 있지 않을 때\n큰 데미지를 준다."
    zh_simp: "轻巧地攻击对手。\n自己没有携带道具时，\n会给予较大的伤害。"
    zh_trad: "輕巧地攻擊對手。\n自己沒有攜帶道具時，\n能給予對手較大的傷害。"
acupressure:
  names:
    jp_kana: つぼをつく
    jp_kanji: つぼをつく
    en: Acupressure
    fr: Acupression
    it: Acupressione
    de: Akupressur
    es: Acupresión
    ko: 경혈찌르기
    zh_simp: 点穴
    zh_trad: 點穴
  descriptions:
    jp_kana: "つぼおしで　体を　活性化させる。\n能力の　どれか　１つを\nぐーんと　あげる。"
    jp_kanji: "つぼおしで　体を　活性化させる。\n能力の　どれか　１つを\nぐーんと　あげる。"
    en: "The user applies pressure to stress points, sharply\nboosting one of its or its allies’ stats."
    fr: "Le lanceur utilise sa connaissance des points de pression\npour beaucoup augmenter une stat."
    it: "Il Pokémon esercita pressione su alcuni punti nevralgici\ne aumenta di molto una statistica a caso."
    de: "Anwender übt Druck auf Stresspunkte aus und erhöht\neinen Statuswert stark."
    es: "Aplica presión en puntos clave del cuerpo para\naumentar mucho una característica al azar."
    ko: "경혈을 눌러 몸을 활성화시킨다.\n능력 중 하나를 크게 올린다."
    zh_simp: "通过点穴\n让身体舒筋活络。\n大幅提高某１项能力。"
    zh_trad: "利用點穴激發身體的活力，\n大幅提高某一項能力。"
aerial_ace:
  names:
    jp_kana: つばめがえし
    jp_kanji: つばめがえし
    en: Aerial Ace
    fr: Aéropique
    it: Aeroassalto
    de: Aero-Ass
    es: Golpe Aéreo
    ko: 제비반환
    zh_simp: 燕返
    zh_trad: 燕返
  descriptions:
    jp_kana: "素早い　動きで\n相手を　ほんろうして　切りつける。\n攻撃は　必ず　命中する。"
    jp_kanji: "素早い　動きで\n相手を　ほんろうして　切りつける。\n攻撃は　必ず　命中する。"
    en: "The user confounds the target with speed, then slashes.\nThis attack never misses."
    fr: "Le lanceur prend la cible de vitesse et la lacère.\nN’échoue jamais."
    it: "Il Pokémon sconvolge il bersaglio con movimenti\nvelocissimi e lo assale. Questo attacco va sempre\na segno."
    de: "Eine extrem schnelle Attacke, der das Ziel nicht\nausweichen kann."
    es: "Desconcierta al objetivo con movimientos muy rápidos\nantes de cercenarlo. No falla nunca."
    ko: "재빠른 움직임으로\n상대를 농락해 벤다.\n공격은 반드시 명중한다."
    zh_simp: "以敏捷的动作\n戏弄对手后进行切斩。\n攻击必定会命中。"
    zh_trad: "以敏捷的動作\n戲弄對手後進行切斬。\n攻擊必定會命中。"
aeroblast:
  names:
    jp_kana: エアロブラスト
    jp_kanji: エアロブラスト
    en: Aeroblast
    fr: Aéroblast
    it: Aerocolpo
    de: Luftstoß
    es: Aerochorro
    ko: 에어로블라스트
    zh_simp: 气旋攻击
    zh_trad: 氣旋攻擊
  descriptions:
    jp_kana: "空気の　渦を\n発射して　攻撃する。\n急所に　当たりやすい。"
    jp_kanji: "空気の　渦を\n発射して　攻撃する。\n急所に　当たりやすい。"
    en: "A vortex of air is shot at the target to inflict damage.\nThis move has a heightened chance of landing a\ncritical hit."
    fr: "Le lanceur projette une tornade sur la cible\npour infliger des dégâts. Taux de critiques élevé."
    it: "Il Pokémon attacca il bersaglio con un vortice d’aria.\nProbabile brutto colpo."
    de: "Erzeugt Luftstrudel gegen das Ziel.\nHohe Volltrefferquote."
    es: "Lanza un chorro de aire que suele asestar un golpe\ncrítico."
    ko: "공기의 소용돌이를\n발사하여 공격한다.\n급소에 맞기 쉽다."
    zh_simp: "发射空气旋涡\n进行攻击。\n容易击中要害。"
    zh_trad: "向對手發射空氣旋渦\n進行攻擊。\n容易擊中要害。"
after_you:
  names:
    jp_kana: おさきにどうぞ
    jp_kanji: おさきにどうぞ
    en: After You
    fr: Après Vous
    it: Cortesia
    de: Galanterie
    es: Cede Paso
    ko: 당신먼저
    zh_simp: 您先请
    zh_trad: 您先請
  descriptions:
    jp_kana: "相手の　行動を　サポートして\n自分の　行動の　あとに\n続けて　動けるように　する。"
    jp_kanji: "相手の　行動を　サポートして\n自分の　行動の　あとに\n続けて　動けるように　する。"
    en: "The user helps the target and makes it use its move right\nafter the user."
    fr: "S’il est le premier à agir, le lanceur permet à sa cible\nd’utiliser une capacité juste après lui."
    it: "Il Pokémon aiuta un bersaglio permettendogli\ndi agire subito dopo."
    de: "Anwender ermöglicht dem Ziel, direkt nach ihm zu\nhandeln, solange der Anwender als Erstes zum Zug\nkommt."
    es: "Si el usuario es el más rápido, permite al objetivo usar\nun movimiento justo tras él, adelantándose a Pokémon\nmás rápidos."
    ko: "상대의 행동을 도와서\n자신이 행동한 뒤에 바로\n움직일 수 있도록 한다."
    zh_simp: "支援我方或对手的行动，\n使其紧接着此招式之后行动。"
    zh_trad: "支援對手，\n讓對手緊接在自己之後行動。"
agility:
  names:
    jp_kana: こうそくいどう
    jp_kanji: こうそくいどう
    en: Agility
    fr: Hâte
    it: Agilità
    de: Agilität
    es: Agilidad
    ko: 고속이동
    zh_simp: 高速移动
    zh_trad: 高速移動
  descriptions:
    jp_kana: "力を　ぬいて　体を　軽くして\n高速で　動く。\n自分の　素早さを　ぐーんと　あげる。"
    jp_kanji: "力を　ぬいて　体を　軽くして\n高速で　動く。\n自分の　素早さを　ぐーんと　あげる。"
    en: "The user relaxes and lightens its body to move faster.\nThis sharply boosts its Speed stat."
    fr: "Le lanceur se relaxe et allège son corps pour beaucoup\naugmenter sa Vitesse."
    it: "Il Pokémon rilassa e alleggerisce il proprio corpo\nper far aumentare di molto la Velocità."
    de: "Entspannt den Körper, um den Initiative-Wert stark\nzu erhöhen."
    es: "Relaja y aligera el cuerpo para aumentar mucho la\nVelocidad."
    ko: "힘을 빼고 몸을 가볍게 해서\n고속으로 움직인다.\n자신의 스피드를 크게 올린다."
    zh_simp: "让身体放松变得轻盈，\n以便高速移动。\n大幅提高自己的速度。"
    zh_trad: "放鬆身體，\n讓自己變得輕盈以進行高速移動。\n可大幅提高自己的速度。"
air_cutter:
  names:
    jp_kana: エアカッター
    jp_kanji: エアカッター
    en: Air Cutter
    fr: Tranch’Air
    it: Aerasoio
    de: Windschnitt
    es: Aire Afilado
    ko: 에어커터
    zh_simp: 空气利刃
    zh_trad: 空氣利刃
  descriptions:
    jp_kana: "鋭い　風で\n相手を　切りつけて　攻撃する。\n急所に　当たりやすい。"
    jp_kanji: "鋭い　風で\n相手を　切りつけて　攻撃する。\n急所に　当たりやすい。"
    en: "The user launches razor-like wind to slash opposing\nPokémon. This move has a heightened chance of landing\na critical hit."
    fr: "Le lanceur appelle des vents tranchants qui lacèrent\nla cible. Taux de critiques élevé."
    it: "Il Pokémon provoca un vento tagliente che sferza\nil bersaglio. Probabile brutto colpo."
    de: "Greift gegnerische Pokémon mit rasierklingenartigem\nWind an. Hohe Volltrefferquote."
    es: "Viento cortante que azota. Suele asestar un golpe\ncrítico."
    ko: "날카로운 바람으로\n상대를 베어 공격한다.\n급소에 맞기 쉽다."
    zh_simp: "用锐利的风\n切斩对手进行攻击。\n容易击中要害。"
    zh_trad: "用鋒利的風刃\n斬切對手進行攻擊。\n容易擊中要害。"
air_slash:
  names:
    jp_kana: エアスラッシュ
    jp_kanji: エアスラッシュ
    en: Air Slash
    fr: Lame d’Air
    it: Eterelama
    de: Luftschnitt
    es: Tajo Aéreo
    ko: 에어슬래시
    zh_simp: 空气之刃
    zh_trad: 空氣斬
  descriptions:
    jp_kana: "空をも　切り裂く\n空気の　刃で　攻撃する。\n相手を　ひるませることが　ある。"
    jp_kanji: "空をも　切り裂く\n空気の　刃で　攻撃する。\n相手を　ひるませることが　ある。"
    en: "The user attacks with a blade of air that slices even the\nsky. This may also make the target flinch."
    fr: "Le lanceur attaque avec une lame d’air capable\nde fendre le ciel, ce qui peut aussi apeurer la cible."
    it: "Il Pokémon attacca con un vento tagliente che squarcia\nil cielo. Può anche far tentennare il bersaglio."
    de: "Das Ziel wird mit einer Luftklinge angegriffen.\nZiel schreckt eventuell zurück."
    es: "Ataca con un viento afilado que incluso corta el aire.\nTambién puede amedrentar al objetivo."
    ko: "하늘까지 베어 가르는\n공기의 칼날로 공격한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "用连天空也能劈开的\n空气之刃进行攻击。\n有时会使对手畏缩。"
    zh_trad: "用連天空也能劈開的\n空氣之刃進行攻擊。\n有時會使對手畏縮。"
all_out_pummeling:physical:
  names:
    jp_kana: ぜんりょくむそうげきれつけん
    jp_kanji: ぜんりょくむそうげきれつけん
    en: All-Out Pummeling
    fr: Combo Hyper-Furie
    it: Iperscarica Furiosa
    de: Fulminante Faustschläge
    es: Ráfaga Demoledora
    ko: 전력무쌍격렬권
    zh_simp: 全力无双激烈拳
    zh_trad: 全力無雙激烈拳
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
all_out_pummeling:special:
  names:
    jp_kana: ぜんりょくむそうげきれつけん
    jp_kanji: ぜんりょくむそうげきれつけん
    en: All-Out Pummeling
    fr: Combo Hyper-Furie
    it: Iperscarica Furiosa
    de: Fulminante Faustschläge
    es: Ráfaga Demoledora
    ko: 전력무쌍격렬권
    zh_simp: 全力无双激烈拳
    zh_trad: 全力無雙激烈拳
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
alluring_voice:
  names:
    jp_kana: みわくのボイス
    jp_kanji: みわくのボイス
    en: Alluring Voice
    fr: Voix Envoûtante
    it: Ammaliavoce
    de: Lockstimme
    es: Canto Encantador
    ko: 매혹의보이스
    zh_simp: 魅诱之声
    zh_trad: 魅誘之聲
  descriptions:
    jp_kana: "天使のような　歌声で　相手を　攻撃。\nそのターン　能力が　あがった　ポケモンを\n混乱の　状態に　する。"
    jp_kanji: "天使のような　歌声で　相手を　攻撃。\nそのターン　能力が　あがった　ポケモンを\n混乱の　状態に　する。"
    en: "The user attacks the target using its angelic voice.\nThis also confuses the target if its stats have been\nboosted during the turn."
    fr: "Le lanceur attaque sa cible avec sa voix angélique.\nCette capacité rend la cible confuse si ses stats\nont augmenté pendant ce tour."
    it: "Il Pokémon attacca sfruttando il suo canto angelico,\nconfondendo il bersaglio se le sue statistiche sono\naumentate nello stesso turno."
    de: "Der Anwender greift mit engelsgleichem Gesang an.\nFalls die Statuswerte des Zieles in dieser Runde erhöht\nwurden, wird es zusätzlich verwirrt."
    es: "Ataca con un canto angelical y, si las características del\nobjetivo han aumentado en ese turno, lo deja confuso."
    ko: "천사와도 같은 노랫소리로 상대를 공격한다.\n그 턴에 능력이 올라간 포켓몬을\n혼란 상태로 만든다."
    zh_simp: "用天使般的歌声攻击对手。\n会让此回合内能力有提高的\n宝可梦陷入混乱状态。"
    zh_trad: "用天使般的歌聲攻擊對手。\n讓此回合內能力提高的\n寶可夢陷入混亂狀態。"
ally_switch:
  names:
    jp_kana: サイドチェンジ
    jp_kanji: サイドチェンジ
    en: Ally Switch
    fr: Interversion
    it: Cambiaposto
    de: Seitentausch
    es: Cambio de Banda
    ko: 사이드체인지
    zh_simp: 交换场地
    zh_trad: 交換場地
  descriptions:
    jp_kana: "不思議な　力で　テレポートして\n自分と　味方の　居場所を　入れ替える。\n連続で　だすと　失敗しやすい。"
    jp_kanji: "不思議な　力で　テレポートして\n自分と　味方の　居場所を　入れ替える。\n連続で　だすと　失敗しやすい。"
    en: "The user teleports using a strange power and switches\nplaces with one of its allies. This move’s chance of failing\nrises if it is used in succession."
    fr: "Le lanceur se téléporte à l’aide d’un pouvoir mystérieux.\nIl échange sa place avec celle d’un allié sur le terrain.\nPeut échouer si utilisée plusieurs fois de suite."
    it: "Il Pokémon cambia di posto con un alleato in campo\ngrazie a un misterioso potere. Se la mossa è usata\nin successione può fallire."
    de: "Wundersame Kräfte teleportieren den Anwender an\nden Platz eines Mitstreiters. Scheitert eventuell bei\nWiederholung."
    es: "Extraño poder que intercambia la posición del usuario\ncon la de un aliado sobre el terreno de combate. Puede\nfallar si se usa repetidamente."
    ko: "이상한 힘으로 순간이동하여\n자신과 같은 편의 위치를 바꾼다.\n연속으로 쓰면 실패하기 쉽다."
    zh_simp: "用神奇的力量瞬间移动，\n互换自己和同伴所在的位置。\n连续使出则容易失败。"
    zh_trad: "用神奇的力量瞬間移動，\n讓自己和同伴的所在位置互換。\n連續使用時容易失敗。"
amnesia:
  names:
    jp_kana: ドわすれ
    jp_kanji: ドわすれ
    en: Amnesia
    fr: Amnésie
    it: Amnesia
    de: Amnesie
    es: Amnesia
    ko: 망각술
    zh_simp: 瞬间失忆
    zh_trad: 瞬間失憶
  descriptions:
    jp_kana: "頭を　からにして\n一瞬　なにかを　忘れることで\n自分の　特防を　ぐーんと　あげる。"
    jp_kanji: "頭を　からにして\n一瞬　なにかを　忘れることで\n自分の　特防を　ぐーんと　あげる。"
    en: "The user temporarily empties its mind to forget its\nconcerns. This sharply boosts the user’s Sp. Def stat."
    fr: "Le lanceur fait le vide dans son esprit pour oublier\nses soucis. Augmente beaucoup sa Défense Spéciale."
    it: "Il Pokémon svuota per un po’ la mente per dimenticare\ni problemi. La Difesa Speciale aumenta di molto."
    de: "Gedächtnisverlust, der die Spezial-Verteidigung\nstark erhöht."
    es: "El usuario olvida sus preocupaciones y aumenta mucho\nla Defensa Especial."
    ko: "머리를 비워서 순간적으로\n무언가를 잊어버림으로써\n자신의 특수방어를 크게 올린다."
    zh_simp: "将头脑清空，\n瞬间忘记某事，\n从而大幅提高自己的特防。"
    zh_trad: "將頭腦清空，\n藉由在一瞬間遺忘某些事\n大幅提高自己的特防。"
anchor_shot:
  names:
    jp_kana: アンカーショット
    jp_kanji: アンカーショット
    en: Anchor Shot
    fr: Ancrage
    it: Colpo d’Ancora
    de: Ankerschuss
    es: Anclaje
    ko: 앵커샷
    zh_simp: 掷锚
    zh_trad: 擲錨
  descriptions:
    jp_kana: "アンカーを　相手に　からませて\n攻撃する。　相手は\n逃げることが　できなくなる。"
    jp_kanji: "アンカーを　相手に　からませて\n攻撃する。　相手は\n逃げることが　できなくなる。"
    en: "The user entangles the target with its anchor chain while\nattacking. The target becomes unable to flee."
    fr: "Le lanceur jette son ancre sur la cible pour l’attaquer.\nUne fois accrochée, elle l’empêche de quitter le terrain."
    it: "Il Pokémon attacca il bersaglio con un’ancora e lo\nintrappola nella catena impedendogli di lasciare\nil campo."
    de: "Der Anwender greift das Ziel an, indem er es mit einer\nAnkerkette umwickelt. Das Ziel wird dadurch an der\nFlucht beziehungsweise am Auswechseln gehindert."
    es: "Ataca lanzando un ancla al objetivo, que queda\natrapado y no puede huir ni ser cambiado por otro."
    ko: "앵커를 상대에게 휘감아서\n공격한다. 상대는\n도망칠 수 없게 된다."
    zh_simp: "将锚缠住对手进行攻击。\n使对手无法逃走。"
    zh_trad: "將錨纏住對手進行攻擊。\n使對手無法逃走。"
ancient_power:
  names:
    jp_kana: げんしのちから
    jp_kanji: げんしのちから
    en: Ancient Power
    fr: Pouvoir Antique
    it: Forzantica
    de: Antik-Kraft
    es: Poder Pasado
    ko: 원시의힘
    zh_simp: 原始之力
    zh_trad: 原始之力
  descriptions:
    jp_kana: "原始の　力で　攻撃する。\n自分の　すべての\n能力が　あがることが　ある。"
    jp_kanji: "原始の　力で　攻撃する。\n自分の　すべての\n能力が　あがることが　ある。"
    en: "The user attacks with a prehistoric power. This may also\nboost all the user’s stats at once."
    fr: "Une attaque préhistorique qui peut augmenter\ntoutes les stats du lanceur d’un seul coup."
    it: "Il Pokémon attacca il bersaglio con una forza\nprimordiale. Può aumentare tutte le proprie statistiche."
    de: "Angriff mit antiker Kraft, der alle Statuswerte\nerhöhen kann."
    es: "Canaliza un poder prehistórico con el que ataca al\nobjetivo. Puede aumentar todas las características\ndel usuario."
    ko: "원시의 힘으로 공격한다.\n자신의 모든 능력이\n올라갈 때가 있다."
    zh_simp: "用原始之力进行攻击。\n有时会提高\n自己所有的能力。"
    zh_trad: "用原始之力進行攻擊。\n有時會提高\n自己的所有能力。"
apple_acid:
  names:
    jp_kana: りんごさん
    jp_kanji: りんごさん
    en: Apple Acid
    fr: Acide Malique
    it: Acido Malico
    de: Apfelsäure
    es: Ácido Málico
    ko: 사과산
    zh_simp: 苹果酸
    zh_trad: 蘋果酸
  descriptions:
    jp_kana: "すっぱい　りんごから　つくりだした\n酸性の　液体で　攻撃。\n相手の　特防を　下げる。"
    jp_kanji: "すっぱい　りんごから　つくりだした\n酸性の　液体で　攻撃。\n相手の　特防を　下げる。"
    en: "The user attacks the target with an acidic liquid created\nfrom tart apples. This also lowers the target’s\nSp. Def stat."
    fr: "Le lanceur projette un liquide corrosif créé à partir\nd’une pomme acide sur la cible, ce qui baisse\nla Défense Spéciale de celle-ci."
    it: "Il Pokémon attacca il bersaglio con un liquido acido\nricavato da mele aspre riducendone la Difesa Speciale."
    de: "Der Anwender greift mit einer aus einem sauren Apfel\nhergestellten säurehaltigen Flüssigkeit an. Dabei wird\ndie Spezial-Verteidigung des Zieles gesenkt."
    es: "Ataca al objetivo con el fluido corrosivo que desprende\nuna manzana ácida, lo que también reduce la Defensa\nEspecial de este."
    ko: "새콤한 사과에서 만들어 낸\n산성 액체로 공격한다.\n상대의 특수방어를 떨어뜨린다."
    zh_simp: "使用从酸苹果中提取出来的\n酸性液体进行攻击。\n降低对手的特防。"
    zh_trad: "使用從酸蘋果提煉出的\n酸性液體進行攻擊。\n可降低對手的特防。"
aqua_cutter:
  names:
    jp_kana: アクアカッター
    jp_kanji: アクアカッター
    en: Aqua Cutter
    fr: Tranch’Aqua
    it: Idrotaglio
    de: Aquaschnitt
    es: Tajo Acuático
    ko: 아쿠아커터
    zh_simp: 水波刀
    zh_trad: 水波刀
  descriptions:
    jp_kana: "加圧された　水を　刃のように\n噴射して　相手を　切り裂く。\n急所に　当たりやすい。"
    jp_kanji: "加圧された　水を　刃のように\n噴射して　相手を　切り裂く。\n急所に　当たりやすい。"
    en: "The user expels pressurized water to cut at the target like\na blade. This move has a heightened chance of landing a\ncritical hit."
    fr: "Le lanceur projette de l’eau pressurisée qui entaille\nla cible comme une lame. Taux de critiques élevé."
    it: "Il Pokémon espelle acqua ad alta pressione e falcia\nil bersaglio con un fendente tagliente quanto una lama.\nProbabile brutto colpo."
    de: "Der Anwender stößt Wasser unter Druck aus,\num das Ziel wie mit einer Klinge anzugreifen.\nHohe Volltrefferquote."
    es: "Expele agua a presión con la que corta al objetivo como\nsi de una hoja se tratara. Suele asestar un golpe crítico."
    ko: "압력을 가한 물을 칼날처럼\n분사해서 상대를 베어 가른다.\n급소에 맞기 쉽다."
    zh_simp: "如刀刃般喷射出\n加压的水切开对手。\n容易击中要害。"
    zh_trad: "噴射出經過加壓的水，\n如刀刃似地劈開對手。\n容易擊中要害。"
aqua_jet:
  names:
    jp_kana: アクアジェット
    jp_kanji: アクアジェット
    en: Aqua Jet
    fr: Aqua-Jet
    it: Acquagetto
    de: Wasserdüse
    es: Acua Jet
    ko: 아쿠아제트
    zh_simp: 水流喷射
    zh_trad: 水流噴射
  descriptions:
    jp_kana: "目にも　留まらぬ　ものすごい　速さで\n相手に　つっこむ。\n必ず　先制攻撃　できる。"
    jp_kanji: "目にも　留まらぬ　ものすごい　速さで\n相手に　つっこむ。\n必ず　先制攻撃　できる。"
    en: "The user lunges at the target to inflict damage, moving\nat blinding speed. This move always goes first."
    fr: "Le lanceur fonce sur la cible si rapidement qu’on\nparvient à peine à le discerner. Frappe en priorité."
    it: "Il Pokémon colpisce a una tale velocità da rendersi\nquasi invisibile. Questo attacco ha priorità alta."
    de: "Bei dieser Erstschlag-Attacke stürzt sich der Anwender\nso schnell auf das Ziel, dass er quasi unsichtbar wird."
    es: "Ataca al objetivo a tal velocidad que es casi\nimperceptible. Este movimiento tiene prioridad alta."
    ko: "눈에 보이지 않는 굉장한 속도로\n상대에게 돌진한다.\n반드시 선제공격할 수 있다."
    zh_simp: "以迅雷不及掩耳之势\n扑向对手。\n必定能够先制攻击。"
    zh_trad: "以迅雷不及掩耳之勢\n撲向對手。\n必定能夠發動先制攻擊。"
aqua_ring:
  names:
    jp_kana: アクアリング
    jp_kanji: アクアリング
    en: Aqua Ring
    fr: Anneau Hydro
    it: Acquanello
    de: Wasserring
    es: Acua Aro
    ko: 아쿠아링
    zh_simp: 水流环
    zh_trad: 水流環
  descriptions:
    jp_kana: "自分の　体の　周りを\n水で　つくった　ベールで　おおう。\n毎ターン　ＨＰを　回復する。"
    jp_kanji: "自分の　体の　周りを\n水で　つくった　ベールで　おおう。\n毎ターン　ＨＰを　回復する。"
    en: "The user envelops itself in a veil made of water.\nIt regains some HP every turn."
    fr: "Un voile d’eau recouvre le lanceur et régénère ses PV\nà chaque tour."
    it: "Il Pokémon si avvolge in un velo d’acqua. Recupera\nPS a ogni turno."
    de: "Anwender umgibt sich mit einem Schleier aus Wasser.\nDabei regeneriert er einige KP pro Runde."
    es: "El usuario se cubre con un manto de agua. Recupera\nalgunos PS en cada turno."
    ko: "자신의 몸 주변을\n물로 만든 베일로 덮는다.\n매 턴 HP를 회복한다."
    zh_simp: "在自己身体的周围\n覆盖用水制造的幕。\n每回合回复ＨＰ。"
    zh_trad: "在自己的身邊套上水流環。\n每回合會回復自己的ＨＰ。"
aqua_step:
  names:
    jp_kana: アクアステップ
    jp_kanji: アクアステップ
    en: Aqua Step
    fr: Danse Aquatique
    it: Idroballetto
    de: Wogentanz
    es: Danza Acuática
    ko: 아쿠아스텝
    zh_simp: 流水旋舞
    zh_trad: 流水旋舞
  descriptions:
    jp_kana: "水もしたたる　かろやかな　足どりで\n相手を　翻弄し　ダメージを　与える。\n自分の　素早さを　あげる。"
    jp_kanji: "水もしたたる　かろやかな　足どりで\n相手を　翻弄し　ダメージを　与える。\n自分の　素早さを　あげる。"
    en: "The user toys with the target and attacks it using\nlight and fluid dance steps. This also boosts the\nuser’s Speed stat."
    fr: "Le lanceur se joue de la cible et lui inflige des dégâts\navec ses pas de danse gracieux et légers. Cette capacité\naugmente la Vitesse du lanceur."
    it: "Il Pokémon si prende gioco del bersaglio con passi\ndi danza leggiadri e fluidi come l’acqua, infliggendogli\ndanni. Inoltre, la sua Velocità aumenta."
    de: "Der Anwender neckt das Ziel mit flinken, fließenden\nTanzschritten und greift es dann an. Dadurch steigt\nauch die Initiative des Anwenders."
    es: "Juguetea con el objetivo mientras ejecuta una elegante\ny fluida danza y le inflige daño. Aumenta la Velocidad\ndel usuario."
    ko: "물 흐르듯 민첩하고 경쾌한 발재간으로\n상대를 농락하며 데미지를 준다.\n자신의 스피드를 올린다."
    zh_simp: "以盈盈欲滴的轻快步伐\n戏耍对手并给予其伤害。\n会提高自己的速度。"
    zh_trad: "以盈盈欲滴的輕巧步伐\n戲弄對手，給予傷害。\n會提高自己的速度。"
aqua_tail:
  names:
    jp_kana: アクアテール
    jp_kanji: アクアテール
    en: Aqua Tail
    fr: Hydro-Queue
    it: Idrondata
    de: Nassschweif
    es: Acua Cola
    ko: 아쿠아테일
    zh_simp: 水流尾
    zh_trad: 水流尾
  descriptions:
    jp_kana: "激しく　あれくるう　荒波の　ように\n大きな　しっぽを　ふって\n相手を　攻撃する。"
    jp_kanji: "激しく　あれくるう　荒波の　ように\n大きな　しっぽを　ふって\n相手を　攻撃する。"
    en: "The user attacks by swinging its tail as if it were a vicious\nwave in a raging storm."
    fr: "Le lanceur attaque en balançant sa queue comme\nune lame de fond en pleine tempête."
    it: "Il Pokémon attacca agitando la coda come se fosse\nuna violenta ondata in una tempesta furiosa."
    de: "Anwender attackiert mit dem Schweif, als ob dieser\neine brutale Welle in einem tosenden Sturm sei."
    es: "Ataca agitando la cola como si fuera una ola rabiosa en\nuna tormenta devastadora."
    ko: "세차게 날뛰는 거친 파도와 같이\n큰 꼬리를 휘둘러서\n상대를 공격한다."
    zh_simp: "如惊涛骇浪般挥动\n大尾巴攻击对手。"
    zh_trad: "如驚濤駭浪般地甩動\n大尾巴攻擊對手。"
arm_thrust:
  names:
    jp_kana: つっぱり
    jp_kanji: つっぱり
    en: Arm Thrust
    fr: Cogne
    it: Sberletese
    de: Armstoß
    es: Empujón
    ko: 손바닥치기
    zh_simp: 猛推
    zh_trad: 猛推
  descriptions:
    jp_kana: "ひらいた　両手で\n相手を　つっぱって　攻撃する。\n２ー５回の　間　連続で　だす。"
    jp_kanji: "ひらいた　両手で\n相手を　つっぱって　攻撃する。\n２ー５回の　間　連続で　だす。"
    en: "The user attacks the target with open-palmed arm\nthrusts. This move hits two to five times in a row."
    fr: "Un déluge de coups adressés avec la paume qui frappe\nde deux à cinq fois d’affilée."
    it: "Il Pokémon attacca con una raffica di ceffoni che\ncolpisce da due a cinque volte di fila."
    de: "Schläge mit geradem Arm, die das Ziel zwei- bis\nfünfmal treffen."
    es: "Golpea fuertemente al objetivo con la palma de las\nmanos de dos a cinco veces seguidas."
    ko: "펼친 양손으로\n상대를 번갈아 쳐서 공격한다.\n2~5회 연속으로 쓴다."
    zh_simp: "用张开着的双手\n猛推对手进行攻击。\n连续攻击２～５次。"
    zh_trad: "用張開的雙手\n猛推對手進行攻擊。\n連續攻擊２～５次。"
armor_cannon:
  names:
    jp_kana: アーマーキャノン
    jp_kanji: アーマーキャノン
    en: Armor Cannon
    fr: Canon Blindé
    it: Corazza Cannone
    de: Rüstungskanone
    es: Cañón Armadura
    ko: 아머캐논
    zh_simp: 铠农炮
    zh_trad: 鎧農炮
  descriptions:
    jp_kana: "みずからの　ヨロイを　燃えたぎる\n弾として　撃ち出して　攻撃する。\n自分の　防御と　特防が　さがる。"
    jp_kanji: "みずからの　ヨロイを　燃えたぎる\n弾として　撃ち出して　攻撃する。\n自分の　防御と　特防が　さがる。"
    en: "The user shoots its own armor out as blazing projectiles.\nThis also lowers the user’s Defense and Sp. Def stats."
    fr: "Le lanceur tire un boulet de canon ardent provenant\nde sa propre armure sur la cible. Cela baisse la Défense\net la Défense Spéciale du lanceur."
    it: "Il Pokémon si libera della sua corazza, scagliandola sul\nbersaglio come una raffica di proiettili incandescenti.\nLa sua Difesa e la sua Difesa Speciale diminuiscono."
    de: "Der Anwender schießt die eigene Rüstung als glühendes\nProjektil auf das Ziel. Dadurch sinken die Verteidigung\nund Spezial-Verteidigung des Anwenders."
    es: "Se deshace de su armadura y arroja las partes al objetivo\ncuales proyectiles ardientes. Reduce la Defensa y la\nDefensa Especial del usuario."
    ko: "자신의 갑옷을 활활 타오르는\n탄환으로 발사해서 공격한다.\n자신의 방어와 특수방어가 떨어진다."
    zh_simp: "熊熊燃烧自己的铠甲，\n将其做成炮弹射出攻击。\n自己的防御和特防会降低。"
    zh_trad: "將自身的鎧甲做成熊熊燃燒的\n砲彈擊發進行攻擊。\n自己的防禦和特防會降低。"
aromatherapy:
  names:
    jp_kana: アロマセラピー
    jp_kanji: アロマセラピー
    en: Aromatherapy
    fr: Aromathérapie
    it: Aromaterapia
    de: Aromakur
    es: Aromaterapia
    ko: 아로마테라피
    zh_simp: 芳香治疗
    zh_trad: 芳香治療
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
aromatic_mist:
  names:
    jp_kana: アロマミスト
    jp_kanji: アロマミスト
    en: Aromatic Mist
    fr: Brume Capiteuse
    it: Nebularoma
    de: Duftwolke
    es: Niebla Aromática
    ko: 아로마미스트
    zh_simp: 芳香薄雾
    zh_trad: 芳香薄霧
  descriptions:
    jp_kana: "不思議な　アロマの　香りによって\n味方の　特防を　あげる。"
    jp_kanji: "不思議な　アロマの　香りによって\n味方の　特防を　あげる。"
    en: "The user boosts the Sp. Def stat of an ally Pokémon\nby using a mysterious aroma."
    fr: "Grâce à un parfum mystérieux, augmente la Défense\nSpéciale d’un allié."
    it: "Il Pokémon aumenta la Difesa Speciale di un alleato\ntramite un misterioso aroma."
    de: "Der Anwender erhöht mithilfe eines mysteriösen\nDuftes die Spezial-Verteidigung eines Mitstreiters."
    es: "Consigue aumentar la Defensa Especial de un aliado con\nuna fragancia misteriosa."
    ko: "신비한 아로마 향으로\n같은 편의 특수방어를 올린다."
    zh_simp: "通过神奇的芳香，\n提高我方宝可梦的特防。"
    zh_trad: "利用神奇的芳香，\n提高我方寶可夢的特防。"
assist:
  names:
    jp_kana: ねこのて
    jp_kanji: ねこのて
    en: Assist
    fr: Assistance
    it: Assistente
    de: Zuschuss
    es: Ayuda
    ko: 조수
    zh_simp: 借助
    zh_trad: 借助
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
assurance:
  names:
    jp_kana: ダメおし
    jp_kanji: ダメおし
    en: Assurance
    fr: Assurance
    it: Garanzia
    de: Gewissheit
    es: Buena Baza
    ko: 승부굳히기
    zh_simp: 恶意追击
    zh_trad: 惡意追擊
  descriptions:
    jp_kana: "そのターンに　相手が\nすでに　ダメージを　受けていたら\n技の　威力は　２倍に　なる。"
    jp_kanji: "そのターンに　相手が\nすでに　ダメージを　受けていたら\n技の　威力は　２倍に　なる。"
    en: "This move’s power is doubled if the target has already\ntaken some damage in the same turn."
    fr: "La puissance de cette capacité est deux fois plus élevée\nsi la cible a déjà été blessée durant ce tour."
    it: "Se il bersaglio ha già subito dei danni nello stesso\nturno, la potenza di questa mossa raddoppia."
    de: "Hat das Ziel während der Runde schon Schaden\ngenommen, wird die Stärke der Attacke verdoppelt."
    es: "Si el objetivo ya ha sufrido daño en ese turno,\nla potencia del movimiento se duplica."
    ko: "그 턴에 상대가\n이미 데미지를 입었다면\n기술의 위력은 2배가 된다."
    zh_simp: "如果此回合内对手\n已经受到伤害的话，\n招式威力会变成２倍。"
    zh_trad: "如果此回合內對手\n已受到傷害，\n招式威力會變成２倍。"
astonish:
  names:
    jp_kana: おどろかす
    jp_kanji: おどろかす
    en: Astonish
    fr: Étonnement
    it: Sgomento
    de: Erstauner
    es: Impresionar
    ko: 놀래키기
    zh_simp: 惊吓
    zh_trad: 驚嚇
  descriptions:
    jp_kana: "大きな　声などで\n不意に　驚かして　攻撃する。\n相手を　ひるませることが　ある。"
    jp_kanji: "大きな　声などで\n不意に　驚かして　攻撃する。\n相手を　ひるませることが　ある。"
    en: "The user attacks the target by crying out in a startling\nfashion. This may also make the target flinch."
    fr: "Le lanceur attaque la cible en poussant un cri\nterrifiant qui peut aussi l’apeurer."
    it: "Il Pokémon attacca il bersaglio emettendo un verso\nterrificante. Può anche farlo tentennare."
    de: "Anwender greift mit einem Schrei an. Ein Angriff,\nder das Ziel eventuell zurückschrecken lässt."
    es: "Asusta al objetivo con, por ejemplo, un grito y le\npropina un ataque que puede amedrentarlo."
    ko: "큰 소리 등으로\n불시에 놀래켜서 공격한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "用尖叫声等\n突然惊吓对手进行攻击。\n有时会使对手畏缩。"
    zh_trad: "用巨大的聲響等\n突然驚嚇對手進行攻擊。\n有時會讓對手畏縮。"
astral_barrage:
  names:
    jp_kana: アストラルビット
    jp_kanji: アストラルビット
    en: Astral Barrage
    fr: Éclat Spectral
    it: Schegge Astrali
    de: Astralfragmente
    es: Orbes Espectro
    ko: 아스트랄비트
    zh_simp: 星碎
    zh_trad: 星碎
  descriptions:
    jp_kana: "たくさんの　小さな　霊体を\n相手に　ぶつけて　攻撃する。"
    jp_kanji: "たくさんの　小さな　霊体を\n相手に　ぶつけて　攻撃する。"
    en: "The user attacks by sending a frightful amount of small\nghosts at opposing Pokémon."
    fr: "Le lanceur attaque la cible avec une multitude\nde petits spectres."
    it: "Il Pokémon attacca il bersaglio scatenandogli contro\nuna miriade di piccoli spettri."
    de: "Der Anwender greift gegnerische Pokémon mit vielen\nkleinen Spukgestalten an."
    es: "El usuario ataca al objetivo lanzándole una ingente\ncantidad de pequeños fantasmas."
    ko: "수많은 작은 영체를\n상대에게 부딪쳐서 공격한다."
    zh_simp: "用大量的小灵体向\n对手发起攻击。"
    zh_trad: "向對手釋出大量的\n小靈體進行攻擊。"
attack_order:
  names:
    jp_kana: こうげきしれい
    jp_kanji: こうげきしれい
    en: Attack Order
    fr: Appel Attaque
    it: Comandourto
    de: Schlagbefehl
    es: Al Ataque
    ko: 공격지령
    zh_simp: 攻击指令
    zh_trad: 攻擊指令
  descriptions:
    jp_kana: "しもべを　呼びだして\n相手に　むかって　攻撃させる。\n急所に　当たりやすい。"
    jp_kanji: "しもべを　呼びだして\n相手に　むかって　攻撃させる。\n急所に　当たりやすい。"
    en: "The user calls out its underlings to pummel the target.\nThis move has a heightened chance of landing a\ncritical hit."
    fr: "Le lanceur appelle ses subalternes pour frapper la cible.\nTaux de critiques élevé."
    it: "Il Pokémon raduna i suoi sgherri per attaccare\nil bersaglio. Probabile brutto colpo."
    de: "Anwender ruft seine Untergebenen zum Angriff.\nHat eine hohe Volltrefferquote."
    es: "El usuario llama a sus súbditos para que ataquen al\nobjetivo. Suele asestar un golpe crítico."
    ko: "부하를 불러내어\n상대를 향해서 공격시킨다.\n급소에 맞기 쉽다."
    zh_simp: "召唤手下，\n让其朝对手发起攻击。\n容易击中要害。"
    zh_trad: "呼喚手下，\n向對手發動攻擊。\n容易擊中要害。"
attract:
  names:
    jp_kana: メロメロ
    jp_kanji: メロメロ
    en: Attract
    fr: Attraction
    it: Attrazione
    de: Anziehung
    es: Atracción
    ko: 헤롱헤롱
    zh_simp: 迷人
    zh_trad: 迷人
  descriptions:
    jp_kana: "♂なら♀を　♀なら♂を　誘惑して\nメロメロに　する。\n相手は　技が　だしにくくなる。"
    jp_kanji: "♂なら♀を　♀なら♂を　誘惑して\nメロメロに　する。\n相手は　技が　だしにくくなる。"
    en: "If the target is of the opposite gender to the user, it\nbecomes infatuated with the user and will sometimes be\nunable to use its moves."
    fr: "Si la cible est du sexe opposé, elle tombe amoureuse\net rechigne alors à attaquer."
    it: "Se il bersaglio è del sesso opposto, s’infatua\ne diventa riluttante ad attaccare."
    de: "Wenn das Ziel nicht dem Geschlecht des Anwenders\nangehört, fühlt es sich zu ihm hingezogen und greift\neventuell nicht an."
    es: "Si el objetivo es del sexo opuesto, se enamorará y\nbajará la posibilidad de que ataque."
    ko: "수컷은 암컷을, 암컷은 수컷을 유혹하여\n헤롱헤롱하게 만든다.\n상대가 기술을 쓰기 어려워진다."
    zh_simp: "♂诱惑♀或♀诱惑♂，\n让对手着迷。\n对手将很难使出招式。"
    zh_trad: "♂誘惑♀而♀誘惑♂，\n讓對手著迷。\n對手將難以使用招式。"
aura_sphere:
  names:
    jp_kana: はどうだん
    jp_kanji: はどうだん
    en: Aura Sphere
    fr: Aurasphère
    it: Sferapulsar
    de: Aurasphäre
    es: Esfera Aural
    ko: 파동탄
    zh_simp: 波导弹
    zh_trad: 波導彈
  descriptions:
    jp_kana: "体の　奥から　波導の　力を\n相手に　うち放つ。\n攻撃は　必ず　命中する。"
    jp_kanji: "体の　奥から　波導の　力を\n相手に　うち放つ。\n攻撃は　必ず　命中する。"
    en: "The user lets loose a pulse of aura power from deep\nwithin its body at the target. This attack never misses."
    fr: "Le lanceur puise au fond de lui-même pour dégager\nune aura et projeter de l’énergie sur la cible.\nN’échoue jamais."
    it: "Il Pokémon rilascia l’aura dal profondo del corpo e la\nspara verso il bersaglio. Questo attacco va sempre\na segno."
    de: "Tief aus dem Inneren des Anwenders löst sich ein\nkraftvoller Stoß Aura-Energie. Diese Attacke trifft\ngarantiert."
    es: "Libera una inmensa descarga de aura desde su interior.\nNo falla nunca."
    ko: "몸속에서 파동의 힘을\n끌어내 상대에게 쏜다.\n공격은 반드시 명중한다."
    zh_simp: "从体内产生出波导之力，\n然后向对手发出。\n攻击必定会命中。"
    zh_trad: "將來自體內深處的波導之力\n擊向對手。\n攻擊必定會命中。"
aura_wheel:
  names:
    jp_kana: オーラぐるま
    jp_kanji: オーラぐるま
    en: Aura Wheel
    fr: Roue Libre
    it: Ruota d’Aura
    de: Aura-Rad
    es: Rueda Aural
    ko: 오라휠
    zh_simp: 气场轮
    zh_trad: 氣場輪
  descriptions:
    jp_kana: "ほほぶくろに　溜めた　エネルギーで\n攻撃し　自分の　素早さを　あげる。\nモルペコの　姿で　タイプが　変わる。"
    jp_kanji: "ほほぶくろに　溜めた　エネルギーで\n攻撃し　自分の　素早さを　あげる。\nモルペコの　姿で　タイプが　変わる。"
    en: "Morpeko attacks and boosts its Speed stat with the\nenergy stored in its cheeks. This move’s type changes\ndepending on the user’s form."
    fr: "Morpeko libère l’énergie stockée dans ses joues\npour attaquer et augmenter sa Vitesse. Le type de cette\ncapacité change en fonction de la forme de Morpeko."
    it: "Il Pokémon emette l’energia accumulata nelle guance\nper attaccare e aumentare la Velocità. Il tipo della\nmossa cambia in base alla forma assunta da Morpeko."
    de: "Mithilfe der in den Backentaschen gespeicherten Energie\ngreift der Anwender an und erhöht seine Initiative.\nDer Typ der Attacke hängt von Morpekos Form ab."
    es: "La energía que acumula en las mejillas le sirve para\natacar y aumentar su Velocidad. Este movimiento\ncambia de tipo según la forma que adopte Morpeko."
    ko: "볼주머니에 저장해 둔 에너지로\n공격하고 자신의 스피드를 올린다.\n모르페코의 모습에 따라 타입이 바뀐다."
    zh_simp: "用储存在颊囊里的能量\n进行攻击，并提高自己的速度。\n其属性会随着莫鲁贝可的样子而改变。"
    zh_trad: "用儲存在頰囊中的能量進行攻擊，\n並提高自己的速度。招式屬性\n會隨著莫魯貝可的樣子而改變。"
aurora_beam:
  names:
    jp_kana: オーロラビーム
    jp_kanji: オーロラビーム
    en: Aurora Beam
    fr: Onde Boréale
    it: Raggiaurora
    de: Aurorastrahl
    es: Rayo Aurora
    ko: 오로라빔
    zh_simp: 极光束
    zh_trad: 極光束
  descriptions:
    jp_kana: "にじいろの　ビームを\n相手に　発射して　攻撃する。\n攻撃を　さげる　ことが　ある。"
    jp_kanji: "にじいろの　ビームを\n相手に　発射して　攻撃する。\n攻撃を　さげる　ことが　ある。"
    en: "The target is hit with a rainbow-colored beam. This may\nalso lower the target’s Attack stat."
    fr: "Le lanceur envoie un rayon arc-en-ciel sur la cible,\nce qui peut aussi baisser son Attaque."
    it: "Il Pokémon attacca il bersaglio con un raggio dai colori\ndell’iride. Può anche ridurne l’Attacco."
    de: "Regenbogenfarbener Strahl, der eventuell den\nAngriffs-Wert des Zieles senkt."
    es: Rayo multicolor que puede reducir el Ataque.
    ko: "무지개색의 빔을\n상대에게 발사하여 공격한다.\n공격을 떨어뜨릴 때가 있다."
    zh_simp: "向对手发射\n虹色光束进行攻击。\n有时会降低对手的攻击。"
    zh_trad: "向對手發射\n七彩光束進行攻擊。\n有時會降低對手的攻擊。"
aurora_veil:
  names:
    jp_kana: オーロラベール
    jp_kanji: オーロラベール
    en: Aurora Veil
    fr: Voile Aurore
    it: Velaurora
    de: Auroraschleier
    es: Velo Aurora
    ko: 오로라베일
    zh_simp: 极光幕
    zh_trad: 極光幕
  descriptions:
    jp_kana: "５ターンの　間　物理と\n特殊の　ダメージを　弱める。\nゆきの　時しか　出すことが　できない。"
    jp_kanji: "５ターンの　間　物理と\n特殊の　ダメージを　弱める。\nゆきの　時しか　出すことが　できない。"
    en: "This move reduces damage from physical and special\nmoves for five turns. This can be used only when it is\nsnowing."
    fr: "Réduit les dégâts causés par les capacités physiques\net spéciales durant cinq tours. Ne peut être utilisée\nque lorsqu’il neige."
    it: "Questa mossa riduce i danni subiti dalle mosse\nfisiche e dalle mosse speciali per cinque turni.\nSi può usare solo quando nevica."
    de: "Diese Attacke schwächt fünf Runden lang den durch\nphysische sowie durch Spezial-Attacken erhaltenen\nSchaden. Kann nur bei Schnee eingesetzt werden."
    es: "Reduce el daño de los ataques físicos y especiales\ndurante cinco turnos. Solo puede usarse cuando está\nnevando."
    ko: "5턴 동안 물리와 특수 기술의\n데미지를 약하게 한다.\n눈일 때만 쓸 수 있다."
    zh_simp: "在５回合内减弱\n物理和特殊的伤害。\n只有下雪时才能使出。"
    zh_trad: "在５回合內減弱\n物理和特殊的傷害。\n只有下雪時才能使出。"
autotomize:
  names:
    jp_kana: ボディパージ
    jp_kanji: ボディパージ
    en: Autotomize
    fr: Allègement
    it: Sganciapesi
    de: Autotomie
    es: Aligerar
    ko: 바디퍼지
    zh_simp: 身体轻量化
    zh_trad: 身體輕量化
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
avalanche:
  names:
    jp_kana: ゆきなだれ
    jp_kanji: ゆきなだれ
    en: Avalanche
    fr: Avalanche
    it: Slavina
    de: Lawine
    es: Alud
    ko: 눈사태
    zh_simp: 雪崩
    zh_trad: 雪崩
  descriptions:
    jp_kana: "相手から　技を　受けていると\nその　相手に　対して\n技の　威力が　２倍に　なる。"
    jp_kanji: "相手から　技を　受けていると\nその　相手に　対して\n技の　威力が　２倍に　なる。"
    en: "This move’s power is doubled if the target has inflicted\ndamage on the user in the same turn."
    fr: "Une capacité dont la puissance est doublée si le lanceur\na été blessé par la cible durant ce tour."
    it: "La potenza della mossa raddoppia se chi la usa è stato\ncolpito dal bersaglio nello stesso turno."
    de: "Wurde der Anwender in dieser Runde vom Ziel\ngetroffen, verdoppelt sich die Stärke der Attacke\nbei Angriffen auf dieses Ziel."
    es: "La potencia de este movimiento se duplica si el usuario\nha sido golpeado por el objetivo en ese mismo turno."
    ko: "상대에게 기술로 공격받으면\n그 상대에 대해서\n기술의 위력이 2배가 된다."
    zh_simp: "如果受到对手的招式攻击，\n就能给予该对手\n２倍威力的攻击。"
    zh_trad: "如果受到對手的招式攻擊，\n給予該對手的招式威力就會變成２倍。"
axe_kick:
  names:
    jp_kana: かかとおとし
    jp_kanji: かかとおとし
    en: Axe Kick
    fr: Talon-Marteau
    it: Calcio ad Ascia
    de: Fersenkick
    es: Patada Hacha
    ko: 발꿈치찍기
    zh_simp: 下压踢
    zh_trad: 下壓踢
  descriptions:
    jp_kana: "蹴りあげた　かかとを　落として　攻撃する。\n相手を　混乱させることが　ある。\nはずすと　自分が　ダメージを　受ける。"
    jp_kanji: "蹴りあげた　かかとを　落として　攻撃する。\n相手を　混乱させることが　ある。\nはずすと　自分が　ダメージを　受ける。"
    en: "The user attacks by kicking up into the air and slamming\nits heel down upon the target. This may also confuse the\ntarget. If it misses, the user takes damage instead."
    fr: "Le lanceur donne un coup de talon descendant\nà la cible, ce qui peut aussi la rendre confuse.\nS’il échoue, le lanceur se blesse."
    it: "Il Pokémon attacca sferrando un calcio dall’alto verso\nil basso che può confondere il bersaglio. Se la mossa\nfallisce, il Pokémon subisce dei danni."
    de: "Der Anwender greift an, indem er seine erhobene Ferse\nhinunterschnellen lässt. Das Ziel wird eventuell verwirrt.\nBei Misserfolg verletzt sich der Anwender selbst."
    es: "Lanza una patada al aire para, acto seguido, golpear con\nel talón. Si falla, se hiere a sí mismo. Puede confundir al\nobjetivo."
    ko: "발꿈치를 들어 올린 뒤 내리찍어 공격한다.\n상대를 혼란시킬 때가 있다.\n빗나가면 자신이 데미지를 입는다."
    zh_simp: "将踢起的脚跟往下劈向对手进行攻击。\n有时会使对手混乱。\n如果劈偏则自己会受到伤害。"
    zh_trad: "劈下踢起的腳跟攻擊對手。\n有時會使對手混亂。\n沒命中對手時自己會受到傷害。"
baby_doll_eyes:
  names:
    jp_kana: つぶらなひとみ
    jp_kanji: つぶらなひとみ
    en: Baby-Doll Eyes
    fr: Regard Touchant
    it: Occhioni Teneri
    de: Kulleraugen
    es: Ojitos Tiernos
    ko: 초롱초롱눈동자
    zh_simp: 圆瞳
    zh_trad: 圓瞳
  descriptions:
    jp_kana: "つぶらなひとみで　相手を　みつめて\n攻撃を　さげる。\n必ず　先制攻撃　できる。"
    jp_kanji: "つぶらなひとみで　相手を　みつめて\n攻撃を　さげる。\n必ず　先制攻撃　できる。"
    en: "The user stares at the target with its baby-doll eyes,\nwhich lowers the target’s Attack stat. This move always\ngoes first."
    fr: "Le lanceur fixe la cible d’un air très attendrissant qui la\ntouche et diminue son Attaque. Agit en priorité."
    it: "Il Pokémon rivolge i propri occhioni languidi\nal bersaglio, riducendone l’Attacco.\nQuesto attacco ha priorità alta."
    de: "Bei dieser Erstschlag-Attacke erobert der Anwender\ndas Herz des Zieles, indem er es mit Kulleraugen\nansieht, und senkt dabei dessen Angriffs-Wert."
    es: "Lanza una mirada al objetivo con ojos acaramelados,\ncon lo que logra que su Ataque se reduzca. Este\nmovimiento tiene prioridad alta."
    ko: "초롱초롱한 눈동자로 상대를\n바라보며 공격을 떨어뜨린다.\n반드시 선제공격할 수 있다."
    zh_simp: "用圆瞳凝视对手，\n从而降低其攻击。\n必定能够先制攻击。"
    zh_trad: "用圓圓的眼睛凝視對手，\n降低對手的攻擊。\n必定能夠發動先制攻擊。"
baddy_bad:
  names:
    jp_kana: わるわるゾーン
    jp_kanji: わるわるゾーン
    en: Baddy Bad
    fr: Évo-Ténébro
    it: Zona Buiabuia
    de: Quälzone
    es: Umbreozona
    ko: 아그아그존
    zh_simp: 坏坏领域
    zh_trad: 壞壞領域
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
baneful_bunker:
  names:
    jp_kana: トーチカ
    jp_kanji: トーチカ
    en: Baneful Bunker
    fr: Blockhaus
    it: Fortino
    de: Bunker
    es: Búnker
    ko: 토치카
    zh_simp: 碉堡
    zh_trad: 碉堡
  descriptions:
    jp_kana: "相手の　攻撃を　防ぐと\n同時に　触れた　相手に\n毒を　与えてしまう。"
    jp_kanji: "相手の　攻撃を　防ぐと\n同時に　触れた　相手に\n毒を　与えてしまう。"
    en: "In addition to protecting the user from attacks, this move\nalso poisons any attacker that makes direct contact."
    fr: "Le lanceur se protège contre les attaques, et si\nun assaillant utilise une attaque directe contre lui,\nil l’empoisonne."
    it: "Il Pokémon si protegge dagli attacchi e avvelena\nchiunque entri in contatto con lui."
    de: "Der Anwender wird vor Angriffen geschützt.\nGleichzeitig werden alle Pokémon, die mit ihm\nin Berührung kommen, vergiftet."
    es: "Protege de los ataques y, al mismo tiempo, envenena\nal Pokémon que use un movimiento de contacto contra\nel usuario."
    ko: "상대의 공격을 막음과\n동시에 접촉한 상대에게\n독을 퍼뜨린다."
    zh_simp: "防住对手攻击的同时，\n让接触到自己的对手中毒。"
    zh_trad: "防住對手攻擊的同時，\n讓碰觸到自己的對手中毒。"
barb_barrage:
  names:
    jp_kana: どくばりセンボン
    jp_kanji: どくばりセンボン
    en: Barb Barrage
    fr: Multitoxik
    it: Mille Fielespine
    de: Giftstachelregen
    es: Mil Púas Tóxicas
    ko: 독침천발
    zh_simp: 毒千针
    zh_trad: 毒千針
  descriptions:
    jp_kana: "無数の毒針で　相手を　毒状態に\nすることもある。　相手が　毒状態だと\n威力は　２倍になる。"
    jp_kanji: "無数の毒針で　相手を　毒状態に\nすることもある。　相手が　毒状態だと\n威力は　２倍になる。"
    en: "The user launches countless toxic barbs to inflict\ndamage. This may also poison the target. This move’s\npower is doubled if the target is already poisoned."
    fr: "Une multitude de pointes toxiques frappent la cible\net peuvent l’empoisonner. La puissance est doublée\nsi celle-ci est déjà empoisonnée."
    it: "Il bersaglio viene colpito da una miriade di spine\ntossiche che possono anche avvelenarlo. Se il bersaglio\nè già avvelenato, la potenza della mossa raddoppia."
    de: "Der Anwender greift mit unzähligen Giftstacheln an und\nvergiftet das Ziel eventuell. Doppelt so stark gegen\nvergiftete Ziele."
    es: "Dispara un sinfín de púas tóxicas que pueden envenenar\nal objetivo. La potencia del movimiento se duplica si\neste ya está envenenado."
    ko: "무수히 많은 독침으로 공격한다.\n상대를 독 상태로 만들 때가 있다.\n상대가 독 상태인 경우 위력이 2배가 된다."
    zh_simp: "用无数的毒针进行攻击。\n有时还会让对手陷入中毒状态。\n攻击处于中毒状态的对手时，威力会变成２倍。"
    zh_trad: "用無數的毒針進行攻擊。\n有時還會讓對手陷入中毒狀態。\n攻擊處於中毒狀態的對手時，威力會變成２倍。"
barrage:
  names:
    jp_kana: たまなげ
    jp_kanji: たまなげ
    en: Barrage
    fr: Pilonnage
    it: Sferattacco
    de: Stakkato
    es: Bombardeo
    ko: 구슬던지기
    zh_simp: 投球
    zh_trad: 投球
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
barrier:
  names:
    jp_kana: バリアー
    jp_kanji: バリアー
    en: Barrier
    fr: Bouclier
    it: Barriera
    de: Barriere
    es: Barrera
    ko: 배리어
    zh_simp: 屏障
    zh_trad: 屏障
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
baton_pass:
  names:
    jp_kana: バトンタッチ
    jp_kanji: バトンタッチ
    en: Baton Pass
    fr: Relais
    it: Staffetta
    de: Stafette
    es: Relevo
    ko: 배턴터치
    zh_simp: 接棒
    zh_trad: 接棒
  descriptions:
    jp_kana: "控えの　ポケモンと　入れ替わる。\n能力変化は　替わった\nポケモンが　そのまま　受けつぐ。"
    jp_kanji: "控えの　ポケモンと　入れ替わる。\n能力変化は　替わった\nポケモンが　そのまま　受けつぐ。"
    en: "The user switches places with a party Pokémon in waiting\nand passes along any stat changes."
    fr: "Le lanceur échange sa place et tout changement\nde stats avec un Pokémon de l’équipe."
    it: "Il Pokémon è sostituito da un altro della squadra,\nche eredita anche ogni modifica alle statistiche."
    de: "Tauscht den Anwender aus und überträgt alle\nStatusveränderungen auf das eingewechselte\nPokémon."
    es: "Cambia el puesto con otro miembro del equipo y le\npasa los cambios en las características."
    ko: "교대 포켓몬과 교체한다.\n능력 변화는 교대 포켓몬이\n그대로 이어받는다."
    zh_simp: "和后备宝可梦进行替换。\n换上的宝可梦能直接继承\n其能力的变化。"
    zh_trad: "與後備寶可夢進行替換。\n替換上場的寶可夢，\n將承接目前寶可夢的能力變化。"
beak_blast:
  names:
    jp_kana: くちばしキャノン
    jp_kanji: くちばしキャノン
    en: Beak Blast
    fr: Bec-Canon
    it: Cannonbecco
    de: Schnabelkanone
    es: Pico Cañón
    ko: 부리캐논
    zh_simp: 鸟嘴加农炮
    zh_trad: 鳥嘴加農炮
  descriptions:
    jp_kana: "最初に　クチバシを　加熱してから\n攻撃を　くりだす。\n加熱中に　さわると　やけどする。"
    jp_kanji: "最初に　クチバシを　加熱してから\n攻撃を　くりだす。\n加熱中に　さわると　やけどする。"
    en: "The user first heats up its beak, and then it attacks the\ntarget. Making direct contact with the user while it’s\nheating up its beak results in a burn."
    fr: "Le lanceur fait chauffer son bec avant d’attaquer.\nS’il subit une attaque directe pendant la montée\nen température, l’attaquant sera brûlé."
    it: "Chi la usa arroventa il proprio becco e poi attacca.\nSe un Pokémon entra in contatto con lui mentre\nsta accumulando calore, resta scottato."
    de: "Der Anwender erhitzt zuerst seinen Schnabel und greift\ndann an. Pokémon, die ihn während des Erhitzens\nberühren, erleiden Verbrennungen."
    es: "Primero aumenta la temperatura de su pico y, luego,\nejecuta un ataque. Quema a quien use un movimiento\nde contacto contra él mientras está calentando el pico."
    ko: "먼저 부리를 가열시킨 다음\n공격을 날린다.\n가열 중에 만지면 화상을 입는다."
    zh_simp: "先加热鸟嘴后再进行攻击。\n鸟嘴在加热时对手触碰的话，\n就会使其灼伤。"
    zh_trad: "先加熱鳥嘴後再進行攻擊。\n若對手在加熱時觸碰的話，\n就會灼傷。"
beat_up:
  names:
    jp_kana: ふくろだたき
    jp_kanji: ふくろだたき
    en: Beat Up
    fr: Baston
    it: Picchiaduro
    de: Prügler
    es: Paliza
    ko: 집단구타
    zh_simp: 围攻
    zh_trad: 圍攻
  descriptions:
    jp_kana: "味方　全員で　攻撃する。\n仲間の　ポケモンが　多いほど\n技の　攻撃回数が　増える。"
    jp_kanji: "味方　全員で　攻撃する。\n仲間の　ポケモンが　多いほど\n技の　攻撃回数が　増える。"
    en: "The user gets all party Pokémon to attack the target.\nThe more party Pokémon, the greater the number\nof attacks."
    fr: "Le lanceur appelle tous les Pokémon de son équipe\nà attaquer. Plus ils sont nombreux, plus il y a d’attaques."
    it: "Il Pokémon attacca con tutti gli altri Pokémon della\nsquadra: più ce ne sono, maggiore è il numero\ndi attacchi."
    de: "Der Anwender greift zusammen mit allen Mitgliedern\nseines Teams das Ziel an. Je mehr Pokémon sich im\nTeam befinden, desto höher die Anzahl der Angriffe."
    es: "Ataque de todo el equipo Pokémon. Cuantos más haya,\nmás veces se atacará."
    ko: "같은 편 전원이 공격한다.\n동료 포켓몬이 많을수록\n기술의 공격 횟수가 증가한다."
    zh_simp: "我方全员进行攻击。\n同行的宝可梦越多，\n招式的攻击次数越多。"
    zh_trad: "讓我方所有寶可夢進行攻擊。\n同行的寶可夢越多，\n招式的攻擊次數越多。"
behemoth_bash:
  names:
    jp_kana: きょじゅうだん
    jp_kanji: きょじゅうだん
    en: Behemoth Bash
    fr: Aegis Maxima
    it: Colpo Maestoso
    de: Gigantenstoß
    es: Embate Supremo
    ko: 거수탄
    zh_simp: 巨兽弹
    zh_trad: 巨獸彈
  descriptions:
    jp_kana: "全身を　強固な盾へと　変化させ\n勢いよく　ぶつかって　攻撃する。"
    jp_kanji: "全身を　強固な盾へと　変化させ\n勢いよく　ぶつかって　攻撃する。"
    en: "The user’s body becomes a firm shield and slams into\nthe target fiercely."
    fr: "Le lanceur se transforme en bouclier extrêmement solide\net charge vigoureusement sa cible."
    it: "Il Pokémon trasforma il suo corpo in un robusto scudo\ne attacca caricando con forza."
    de: "Der Anwender greift an, indem er seinen Körper in einen\nunverwüstlichen Schild verwandelt und das Ziel mit\nenormer Wucht rammt."
    es: "El usuario se convierte en un escudo gigante para\ngolpear con vigor al objetivo."
    ko: "온몸을 강하고 튼튼한 방패로 바꾼 다음\n기세 좋게 부딪쳐서 공격한다."
    zh_simp: "将全身变化为坚固的盾，\n猛烈地撞向对手进行攻击。"
    zh_trad: "將全身變為堅固的盾，\n猛烈地撞向對手進行攻擊。"
behemoth_blade:
  names:
    jp_kana: きょじゅうざん
    jp_kanji: きょじゅうざん
    en: Behemoth Blade
    fr: Gladius Maximus
    it: Taglio Maestoso
    de: Gigantenhieb
    es: Tajo Supremo
    ko: 거수참
    zh_simp: 巨兽斩
    zh_trad: 巨獸斬
  descriptions:
    jp_kana: "全身で　強大な剣を　振りかざし\n勢いよく　切りかかって　攻撃する。"
    jp_kanji: "全身で　強大な剣を　振りかざし\n勢いよく　切りかかって　攻撃する。"
    en: "The user wields a large, powerful sword using its whole\nbody and cuts the target in a vigorous attack."
    fr: "Le lanceur se transforme en épée extrêmement grande\net pourfend vigoureusement sa cible."
    it: "Il Pokémon brandisce un’enorme spada e attacca\nvibrando un poderoso fendente."
    de: "Der Anwender greift an, indem er ein riesiges Schwert\nmit vollem Körpereinsatz schwingt und das Ziel mit\nenormer Wucht trifft."
    es: "El usuario se convierte en una espada gigante para\nrebanar con vigor al objetivo."
    ko: "크고 강한 검을 온몸으로 치켜든 다음\n기세 좋게 베어서 공격한다."
    zh_simp: "以全身力气举起强大的剑，\n猛烈地劈向对手进行攻击。"
    zh_trad: "用全身的力量舉起強大的劍，\n猛烈地斬向對手進行攻擊。"
belch:
  names:
    jp_kana: ゲップ
    jp_kanji: ゲップ
    en: Belch
    fr: Éructation
    it: Rutto
    de: Rülpser
    es: Eructo
    ko: 트림
    zh_simp: 打嗝
    zh_trad: 打嗝
  descriptions:
    jp_kana: "相手に　向かって　ゲップを\n浴びせて　ダメージを　与える。\nきのみを　食べないと　だせない。"
    jp_kanji: "相手に　向かって　ゲップを\n浴びせて　ダメージを　与える。\nきのみを　食べないと　だせない。"
    en: "The user lets out a damaging belch at the target.\nThe user must eat a held Berry to use this move."
    fr: "Le lanceur se tourne vers la cible et lui éructe dessus,\ninfligeant des dégâts. Ne fonctionne que si le lanceur\nconsomme une Baie tenue."
    it: "Il Pokémon attacca il bersaglio con un rutto potente.\nPer utilizzare questa mossa, deve aver mangiato\nla propria bacca o quella di un altro Pokémon."
    de: "Der Anwender fügt dem Ziel Schaden zu, indem er es\nanrülpst. Diese Attacke gelingt nur nach dem Konsum\neiner getragenen Beere."
    es: "El usuario causa daño a su objetivo lanzándole\nun eructo. Para poder utilizar este movimiento,\ntiene que haberse comido una baya equipada."
    ko: "상대를 향해 트림을 하여\n데미지를 준다.\n나무열매를 먹지 않으면 쓸 수 없다."
    zh_simp: "朝着对手打嗝，\n并给予伤害。\n如果不吃树果则无法使出。"
    zh_trad: "朝著對手打嗝進行攻擊。\n沒吃下樹果時無法使用。"
belly_drum:
  names:
    jp_kana: はらだいこ
    jp_kanji: はらだいこ
    en: Belly Drum
    fr: Cognobidon
    it: Panciamburo
    de: Bauchtrommel
    es: Tambor
    ko: 배북
    zh_simp: 腹鼓
    zh_trad: 腹鼓
  descriptions:
    jp_kana: "自分の　ＨＰを　最大ＨＰの\n半分　減らして　自分の　攻撃を\n最大に　あげる。"
    jp_kanji: "自分の　ＨＰを　最大ＨＰの\n半分　減らして　自分の　攻撃を\n最大に　あげる。"
    en: "The user maximizes its Attack stat but loses HP equal to\nhalf its max HP."
    fr: "Améliore l’Attaque au maximum en sacrifiant la moitié\ndes PV max."
    it: "Il Pokémon massimizza l’Attacco in cambio di metà\ndei PS massimi."
    de: "Der Anwender maximiert den Angriffs-Wert auf Kosten\nder Hälfte seiner maximalen KP."
    es: "Sacrifica la mitad de los PS máximos para aumentar al\nmáximo el Ataque."
    ko: "자신의 HP를 최대 HP의\n절반만큼 감소시켜 자신의 공격을\n최대로 올린다."
    zh_simp: "将自己的ＨＰ减少到\n最大ＨＰ的一半，\n从而最大限度提高自己的攻击。"
    zh_trad: "將現有的ＨＰ\n減去最大ＨＰ的一半，\n讓自己的攻擊提高至最大值。"
bestow:
  names:
    jp_kana: ギフトパス
    jp_kanji: ギフトパス
    en: Bestow
    fr: Passe-Cadeau
    it: Cediregalo
    de: Offerte
    es: Ofrenda
    ko: 기프트패스
    zh_simp: 传递礼物
    zh_trad: 傳遞禮物
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
bide:
  names:
    jp_kana: がまん
    jp_kanji: がまん
    en: Bide
    fr: Patience
    it: Pazienza
    de: Geduld
    es: Venganza
    ko: 참기
    zh_simp: 忍耐
    zh_trad: 忍耐
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
bind:
  names:
    jp_kana: しめつける
    jp_kanji: しめつける
    en: Bind
    fr: Étreinte
    it: Legatutto
    de: Klammergriff
    es: Atadura
    ko: 조이기
    zh_simp: 绑紧
    zh_trad: 綁緊
  descriptions:
    jp_kana: "長い　体や　つるなどを　使い\n４ー５ターンの　間\n相手を　締めつけて　攻撃する。"
    jp_kanji: "長い　体や　つるなどを　使い\n４ー５ターンの　間\n相手を　締めつけて　攻撃する。"
    en: "A long body, tentacles, or the like are used to bind\nand squeeze the target for four to five turns."
    fr: "Le lanceur ligote la cible avec son corps allongé ou\nses tentacules pour la compresser durant quatre\nà cinq tours."
    it: "Il Pokémon attacca il bersaglio stritolandolo per quattro\no cinque turni con il suo lungo corpo o le sue liane."
    de: "Umklammert und quetscht das Ziel über vier bis fünf\nRunden."
    es: "Usa el cuerpo o las extremidades para atar y oprimir\nal objetivo e infligirle daño de cuatro a cinco turnos."
    ko: "긴 몸이나 덩굴 등을 써서\n4~5턴 동안\n상대를 조여 공격한다."
    zh_simp: "使用长长的身体或藤蔓等，\n在４～５回合内\n绑紧对手进行攻击。"
    zh_trad: "使用長長的身體或藤蔓等，\n在４～５回合內\n綁緊對手進行攻擊。"
bite:
  names:
    jp_kana: かみつく
    jp_kanji: かみつく
    en: Bite
    fr: Morsure
    it: Morso
    de: Biss
    es: Mordisco
    ko: 물기
    zh_simp: 咬住
    zh_trad: 咬住
  descriptions:
    jp_kana: "鋭く　とがった　歯で\nかみついて　攻撃する。\n相手を　ひるませることが　ある。"
    jp_kanji: "鋭く　とがった　歯で\nかみついて　攻撃する。\n相手を　ひるませることが　ある。"
    en: "The target is bitten with viciously sharp fangs. This may\nalso make the target flinch."
    fr: "Le lanceur utilise ses canines tranchantes pour mordre\nla cible, ce qui peut aussi l’apeurer."
    it: "Il bersaglio viene morso da denti affilatissimi\nche possono farlo tentennare."
    de: Beißt zu und lässt das Ziel eventuell zurückschrecken.
    es: "Un voraz bocado con dientes afilados que puede\namedrentar al objetivo."
    ko: "날카롭고 뾰족한 이빨로\n물어서 공격한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "用尖锐的牙\n咬住对手进行攻击。\n有时会使对手畏缩。"
    zh_trad: "用尖銳的牙齒\n咬住對手進行攻擊。\n有時會使對手畏縮。"
bitter_blade:
  names:
    jp_kana: むねんのつるぎ
    jp_kanji: むねんのつるぎ
    en: Bitter Blade
    fr: Lame en Peine
    it: Lama del Rimorso
    de: Reueschwert
    es: Espada Lamento
    ko: 원념의칼
    zh_simp: 悔念剑
    zh_trad: 悔念劍
  descriptions:
    jp_kana: "この世への　未練を　剣先に　こめて\n切りつける。　与えた　ダメージの\n半分の　ＨＰを　回復できる。"
    jp_kanji: "この世への　未練を　剣先に　こめて\n切りつける。　与えた　ダメージの\n半分の　ＨＰを　回復できる。"
    en: "The user focuses its bitter feelings toward the world of\nthe living into a slashing attack. The user’s HP is restored\nby up to half the damage taken by the target."
    fr: "Le lanceur concentre son amertume du monde des vivants\ndans la pointe de ses épées et tranche la cible. La moitié\ndes dégâts infligés sont convertis en PV pour le lanceur."
    it: "Il Pokémon concentra nelle lame tutti i rimorsi accumulati\nnel mondo dei vivi e assale il bersaglio, recuperando\nuna quantità di PS pari a metà del danno inflitto."
    de: "Der Anwender tränkt seine Klinge in Bedauern und Reue\nund greift damit an. Die Hälfte des zugefügten Schadens\nwird dem Anwender als KP gutgeschrieben."
    es: "Imbuye la punta de su espada con su desazón por el\nmundo y asesta una estocada llena de rencor. El usuario\nrecupera la mitad de los PS del daño que produce."
    ko: "현세의 미련을 칼끝에 담아\n베어 버린다. 입힌 데미지의 절반에\n해당하는 HP를 회복할 수 있다."
    zh_simp: "将对世间的留恋聚集于剑尖，\n并斩击对手。可以回复\n给予对手伤害的一半ＨＰ。"
    zh_trad: "將對這個世界的牽掛注入劍尖\n進行劈斬。可以回復給予對手\n傷害的一半ＨＰ。"
bitter_malice:
  names:
    jp_kana: うらみつらみ
    jp_kanji: うらみつらみ
    en: Bitter Malice
    fr: Cœur de Rancœur
    it: Livore
    de: Niedertracht
    es: Rencor Reprimido
    ko: 천추지한
    zh_simp: 冤冤相报
    zh_trad: 冤冤相報
  descriptions:
    jp_kana: "背筋が　凍るような　怨念で　攻撃して\n相手の　攻撃を　さげる。"
    jp_kanji: "背筋が　凍るような　怨念で　攻撃して\n相手の　攻撃を　さげる。"
    en: "The user attacks the target with spine-chilling resentment.\nThis also lowers the target’s Attack stat."
    fr: "Une rancœur glaciale frappe la cible et baisse\nson Attaque."
    it: "Il Pokémon attacca con una furia che fa raggelare\nil sangue nelle vene del bersaglio, riducendone\nl’Attacco."
    de: "Der Anwender greift mit eiskaltem, schaudererregendem\nHass an und senkt dabei den Angriff des Zieles."
    es: "Ataca al objetivo sometiéndolo a su frío rencor y reduce\nsu Ataque."
    ko: "등골이 서늘해지는 원념으로 공격해서\n상대의 공격을 떨어뜨린다."
    zh_simp: "用令人毛骨悚然的怨念进行攻击。\n会降低对手的攻击。"
    zh_trad: "用令人毛骨悚然的怨念進行攻擊，\n降低對手的攻擊。"
black_hole_eclipse:physical:
  names:
    jp_kana: ブラックホールイクリプス
    jp_kanji: ブラックホールイクリプス
    en: Black Hole Eclipse
    fr: Trou Noir des Ombres
    it: Buco Nero del Non Ritorno
    de: Schwarzes Loch des Grauens
    es: Agujero Negro Aniquilador
    ko: 블랙홀이클립스
    zh_simp: 黑洞吞噬万物灭
    zh_trad: 黑洞吞噬萬物滅
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
black_hole_eclipse:special:
  names:
    jp_kana: ブラックホールイクリプス
    jp_kanji: ブラックホールイクリプス
