    jp_kana: "相手を　追跡する\n不思議な　はっぱを　まきちらす。\n攻撃は　必ず　命中する。"
    jp_kanji: "相手を　追跡する\n不思議な　はっぱを　まきちらす。\n攻撃は　必ず　命中する。"
    en: "The user scatters curious leaves that chase the target.\nThis attack never misses."
    fr: "Le lanceur disperse d’étranges feuilles qui poursuivent\nla cible. N’échoue jamais."
