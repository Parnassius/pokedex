hyper_beam:
  names:
    jp_kana: はかいこうせん
    jp_kanji: はかいこうせん
    en: Hyper Beam
    fr: Ultralaser
    it: Iper Raggio
    de: Hyperstrahl
    es: Hiperrayo
    ko: 파괴광선
    zh_simp: 破坏光线
    zh_trad: 破壞光線
  descriptions:
    jp_kana: "強い　光線を\n相手に　発射して　攻撃する。\n次の　ターンは　動けなくなる。"
    jp_kanji: "強い　光線を\n相手に　発射して　攻撃する。\n次の　ターンは　動けなくなる。"
    en: "The target is attacked with a powerful beam. The user\ncan’t move on the next turn."
    fr: "Le lanceur projette un puissant rayon sur la cible,\nmais doit se reposer au tour suivant."
    it: "Il Pokémon attacca il bersaglio con un potente raggio,\nma al turno successivo non può muoversi."
    de: "Starke Attacke, die den Anwender zwingt, eine Runde\nauszusetzen."
    es: "El usuario ataca al objetivo con un potente haz de luz,\npero deberá descansar en el siguiente turno."
    ko: "강한 광선을\n상대에게 발사하여 공격한다.\n다음 턴은 움직일 수 없다."
    zh_simp: "向对手发射\n强烈的光线进行攻击。\n下一回合自己将无法动弹。"
    zh_trad: "向對手發射\n強烈的光線進行攻擊。\n下一回合自己將無法動彈。"
hyper_drill:
  names:
    jp_kana: ハイパードリル
    jp_kanji: ハイパードリル
    en: Hyper Drill
    fr: Hyperceuse
    it: Ipertrapano
    de: Hyperbohrer
    es: Hipertaladro
    ko: 하이퍼드릴
    zh_simp: 强力钻
    zh_trad: 強力鑽
  descriptions:
    jp_kana: "とがった　体の部位を\n急速に　回転させ　つらぬく。\nまもるや　みきり　なども　無視　できる。"
    jp_kanji: "とがった　体の部位を\n急速に　回転させ　つらぬく。\nまもるや　みきり　なども　無視　できる。"
    en: "The user spins the pointed part of its body at high speed\nto pierce the target. This attack can hit a target using a\nmove such as Protect or Detect."
    fr: "Le lanceur fait tourner à toute vitesse la partie pointue\nde son corps afin de transpercer la cible. Ignore même\nles capacités comme Abri ou Détection."
    it: "Il Pokémon fa roteare rapidamente la parte appuntita\ndel suo corpo, perforando il bersaglio ed eludendo\nmosse come Protezione e Individua."
    de: "Der Anwender lässt einen spitzen Teil seines Körpers\nrasant rotieren, sticht zu und durchbricht dabei auch die\nWirkung von Attacken wie Schutzschild und Scanner."
    es: "El usuario hace rotar la parte puntiaguda de su cuerpo a\ngran velocidad para atacar al objetivo. Pasa por alto los\nefectos de movimientos como Protección o Detección."
    ko: "뾰족한 신체 부위를\n급속도로 회전시켜 관통한다.\n방어나 판별 등도 무시할 수 있다."
    zh_simp: "急速旋转尖锐的身体部位贯穿对手。\n可以无视守住和看穿等招式。"
    zh_trad: "高速旋轉尖銳的身體部位進行貫穿。\n可無視對手的守住和看穿等招式。"
hyper_fang:
  names:
    jp_kana: ひっさつまえば
    jp_kanji: ひっさつまえば
    en: Hyper Fang
    fr: Croc de Mort
    it: Iperzanna
    de: Hyperzahn
    es: Hipercolmillo
    ko: 필살앞니
    zh_simp: 终结门牙
    zh_trad: 必殺門牙
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
