    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
teleport:
  names:
    jp_kana: テレポート
    jp_kanji: テレポート
    en: Teleport
    fr: Téléport
    it: Teletrasporto
    de: Teleport
    es: Teletransporte
    ko: 순간이동
    zh_simp: 瞬间移动
    zh_trad: 瞬間移動
  descriptions:
    jp_kana: "ひかえの　ポケモンが　いるときに\n使うと　入れ替わる。\n野生の　ポケモンは　逃げてしまう。"
    jp_kanji: "ひかえの　ポケモンが　いるときに\n使うと　入れ替わる。\n野生の　ポケモンは　逃げてしまう。"
    en: "The user switches places with a party Pokémon in\nwaiting, if any. If a wild Pokémon uses this move, it flees."
    fr: "Permet de changer de place avec un autre Pokémon\nde l’équipe s’il y en a. Quand cette capacité est utilisée\npar un Pokémon sauvage, celui-ci fuit le combat."
    it: "Il Pokémon viene sostituito se ci sono altri Pokémon in\nsquadra. Se un Pokémon selvatico usa questa mossa,\nfugge dalla lotta."
    de: "Der Anwender tauscht den Platz mit einem anderen\nTeam-Mitglied, sofern vorhanden. Setzen wilde\nPokémon die Attacke ein, ergreifen diese die Flucht."
    es: "Permite al usuario cambiarse por otro Pokémon\ndel equipo, si lo hay. Si un Pokémon salvaje usa\neste movimiento, huye del combate."
    ko: "교대할 포켓몬이 있을 때\n사용하면 교체한다.\n야생 포켓몬은 도망가 버린다."
    zh_simp: "当有后备宝可梦时使用，\n就可以进行替换。\n野生的宝可梦使用则会逃走。"
    zh_trad: "在有後備寶可夢時使用，\n可進行替換。\n野生寶可夢則會逃走。"
temper_flare:
  names:
    jp_kana: やけっぱち
    jp_kanji: やけっぱち
    en: Temper Flare
    fr: Indignition
    it: Rabbia Bruciante
    de: Frustflamme
    es: Cólera Ardiente
    ko: 열불내기
    zh_simp: 豁出去
    zh_trad: 豁出去
  descriptions:
    jp_kana: "自棄になった　勢いで　攻撃する。\n前の　ターンに　技を　外していると\n威力が　倍に　なる。"
    jp_kanji: "自棄になった　勢いで　攻撃する。\n前の　ターンに　技を　外していると\n威力が　倍に　なる。"
    en: "Spurred by desperation, the user attacks the target.\nThis move’s power is doubled if the user’s previous\nmove failed."
    fr: "Le lanceur utilise la force de son dépit pour attaquer.\nS’il a utilisé une capacité qui a échoué au tour\nprécédent, la puissance d’Indignition est doublée."
    it: "Il Pokémon attacca con l’impeto di chi è pronto a tutto.\nSe la mossa usata al turno precedente non è andata\na segno, la potenza raddoppia."
    de: "Der Anwender greift das Ziel voller Verzweiflung an.\nWenn seine vorige Attacke fehlgeschlagen ist,\nverdoppelt sich die Stärke der Attacke."
    es: "Arremete contra el objetivo tras dejarse llevar por la ira.\nSu potencia se duplica si el movimiento del usuario falló\nen el turno anterior."
    ko: "자포자기하는 기세로 공격한다.\n앞 턴에서 기술이 빗나갔다면\n위력이 배가 된다."
    zh_simp: "以自暴自弃的气势进行攻击。\n如果上一回合招式没有命中，\n威力就会翻倍。"
    zh_trad: "用自暴自棄的狠勁攻擊對手。\n如果上一回合的招式沒有命中，\n威力就會加倍。"
tera_blast:
  names:
    jp_kana: テラバースト
    jp_kanji: テラバースト
    en: Tera Blast
    fr: Téra Explosion
    it: Terascoppio
    de: Tera-Ausbruch
    es: Teraexplosión
    ko: 테라버스트
    zh_simp: 太晶爆发
    zh_trad: 太晶爆發
  descriptions:
    jp_kana: "テラスタルだと　テラスタイプの　エネルギーを\n放出して　攻撃する。　攻撃と　特攻を　比べて\n高いほうで　ダメージを　与える。"
    jp_kanji: "テラスタルだと　テラスタイプの　エネルギーを\n放出して　攻撃する。　攻撃と　特攻を　比べて\n高いほうで　ダメージを　与える。"
    en: "If the user has Terastallized, it unleashes energy of its\nTera Type. This move inflicts damage using the Attack or\nSp. Atk stat—whichever is higher for the user."
    fr: "Si le lanceur est téracristallisé, il libère l’énergie de son\ntype Téracristal. La capacité utilise l’Attaque ou l’Attaque\nSpéciale, selon ce qui infligera le plus de dégâts."
    it: "Se il Pokémon è teracristallizzato, attacca con l’energia\ndel suo teratipo. Infligge danni in base all’Attacco o\nall’Attacco Speciale scegliendo il più alto tra i due."
    de: "Ist der Anwender terakristallisiert, greift er mit Energie\nseines Tera-Typs an. Der Schaden hängt vom Angriff oder\nSpezial-Angriff ab, je nachdem, welcher Wert höher ist."
    es: "Si el usuario se ha teracristalizado, ataca con la energía\nde su teratipo. Compara sus valores de Ataque y Ataque\nEspecial para infligir daño con el más alto de los dos."
    ko: "테라스탈 중이면, 테라스탈타입의 에너지를\n방출해서 공격한다. 공격과 특수공격을 비교해서\n높은 쪽으로 데미지를 준다."
    zh_simp: "太晶化时，会放出太晶属性的能量攻击。\n比较自己的攻击和特攻，\n用数值相对较高的一项给予对方伤害。"
    zh_trad: "若是在太晶化時，將釋放太晶屬性的能量\n進行攻擊。會比較自己的攻擊和特攻，\n以數值較高的一方進行攻擊。"
tera_blast:stellar:
  names:
    jp_kana: テラバースト
    jp_kanji: テラバースト
    en: Tera Blast
    fr: Téra Explosion
    it: Terascoppio
    de: Tera-Ausbruch
    es: Teraexplosión
    ko: 테라버스트
    zh_simp: 太晶爆发
    zh_trad: 太晶爆發
  descriptions:
    jp_kana: "攻撃と　特攻　高いほうで　ダメージを　与える。\n相手が　テラスタルだと　効果は　バツグン。\n自分の　攻撃と　特攻が　さがる。"
    jp_kanji: "攻撃と　特攻　高いほうで　ダメージを　与える。\n相手が　テラスタルだと　効果は　バツグン。\n自分の　攻撃と　特攻が　さがる。"
    en: "Inflicts damage with the user’s Attack or Sp. Atk stat—\nwhichever is higher. Super effective against Terastallized\ntargets. This lowers the user’s Attack and Sp. Atk stats."
    fr: "Utilise l’Attaque ou l’Atq. Spé., selon ce qui infligera\nle plus de dégâts. Super efficace si la cible est\ntéracristallisée. Baisse l’Attaque et l’Atq. Spé. du lanceur."
    it: "Il Pokémon infligge danni in base al più alto tra Attacco\no Attacco Speciale, ma entrambi diminuiscono. La mossa\nè superefficace se il bersaglio è teracristallizzato."
    de: "Verursacht Schaden mit Angriffs- oder Sp.-Ang.-Wert,\nje nachdem, welcher höher ist. Ang. und Sp.-Ang. des\nAnw. sinken. Sehr effektiv gegen terakristallisierte Ziele."
    es: "Inflige daño con el valor más alto entre Ataque y Ataque\nEspecial, pero reduce ambas características del usuario.\nSi el objetivo se ha teracristalizado, es supereficaz."
    ko: "공격과 특수공격 중 높은 쪽으로 데미지를 준다.\n상대가 테라스탈 중이면 효과가 굉장해진다.\n자신의 공격과 특수공격이 떨어진다."
    zh_simp: "用攻击和特攻数值较高的一项给予伤害。\n对正处于太晶化的对手效果绝佳。\n自己的攻击和特攻会降低。"
    zh_trad: "用攻擊和特攻中數值較高的一方攻擊。\n對手處於太晶化時效果絕佳。\n自己的攻擊和特攻會降低。"
tera_starstorm:
  names:
    jp_kana: テラクラスター
    jp_kanji: テラクラスター
    en: Tera Starstorm
    fr: Pluie Térastrale
    it: Teracluster
    de: Tera-Sternhagel
    es: Teraclúster
    ko: 테라클러스터
    zh_simp: 晶光星群
    zh_trad: 晶光星群
  descriptions:
    jp_kana: "結晶の力を　照射し　敵を　排除する。\nテラパゴスが　ステラフォルムで　放つと\nすべての　相手に　ダメージを　与える。"
    jp_kanji: "結晶の力を　照射し　敵を　排除する。\nテラパゴスが　ステラフォルムで　放つと\nすべての　相手に　ダメージを　与える。"
    en: "With the power of its crystals, the user bombards and\neliminates the target. When used by Terapagos in its\nStellar Form, this move damages all opposing Pokémon."
    fr: "Le lanceur bombarde la cible afin de l’éliminer grâce au\npouvoir des cristaux. Si le lanceur est Terapagos sous sa\nForme Stellaire, la capacité touche tous les ennemis."
    it: "Il Pokémon elimina il bersaglio irradiando il potere\ndei cristalli. Se Terapagos assume la Forma Astrale,\nla mossa infligge danni a tutti gli avversari."
    de: "Der Anwender greift das Ziel mit gebündelter Kristall-\nenergie an. Wenn Terapagos diese Attacke in seiner\nStellarform einsetzt, erleiden alle Gegner Schaden."
    es: "Ataca al objetivo irradiando el poder de sus cristales.\nSi Terapagos usa este movimiento en su Forma Astral,\ninflige daño a todos los rivales."
    ko: "결정의 힘을 내리쬐어 적을 없애 버린다.\n테라파고스가 스텔라폼일 때 사용하면\n모든 상대에게 데미지를 준다."
    zh_simp: "照射出结晶的力量来驱逐敌人。\n太乐巴戈斯在星晶形态下使出时，\n能对所有对手造成伤害。"
    zh_trad: "投射結晶之力來掃除敵人。\n當太樂巴戈斯以星晶形態使出時，\n能給予所有對手傷害。"
terrain_pulse:
  names:
    jp_kana: だいちのはどう
    jp_kanji: だいちのはどう
    en: Terrain Pulse
    fr: Champlification
    it: Campopulsar
    de: Feldimpuls
    es: Pulso de Campo
    ko: 대지의파동
    zh_simp: 大地波动
    zh_trad: 大地波動
  descriptions:
    jp_kana: "フィールドの力を　借りて　攻撃。\n使った時の　フィールドの状態に　よって\n技の　タイプと　威力が　変わる。"
    jp_kanji: "フィールドの力を　借りて　攻撃。\n使った時の　フィールドの状態に　よって\n技の　タイプと　威力が　変わる。"
    en: "The user utilizes the energy of the terrain to attack.\nThis move’s type and power change depending on\nthe terrain at the time the move is used."
    fr: "Une attaque qui utilise la force des champs pour\nprojeter une aura. Son type et sa puissance varient\nselon le champ actif."
    it: "Il Pokémon attacca sfruttando l’energia del terreno\ndi lotta. Il tipo e la potenza della mossa variano\na seconda dello stato del terreno stesso."
    de: "Der Anwender nutzt die Kraft des aktiven Feldes für\nseinen Angriff. Der Typ und die Stärke der Attacke\nändern sich je nach Art des aktiven Feldes."
    es: "El usuario ataca aprovechando la energía del campo\nactivo, que determina tanto el tipo como la potencia\ndel movimiento."
    ko: "필드의 힘을 빌려서 공격한다.\n사용했을 때의 필드 상태에 따라서\n기술 타입과 위력이 바뀐다."
    zh_simp: "借助场地的力量进行攻击。\n视使出招式时场地状态不同，\n招式的属性和威力会有所变化。"
    zh_trad: "藉助場地的力量進行攻擊。\n視使出招式時場地狀態不同，\n招式的屬性和威力會有所變化。"
thief:
  names:
    jp_kana: どろぼう
    jp_kanji: どろぼう
    en: Thief
    fr: Larcin
    it: Furto
    de: Raub
    es: Ladrón
    ko: 도둑질
    zh_simp: 小偷
    zh_trad: 小偷
  descriptions:
    jp_kana: "攻撃と　同時に　道具を　盗む。\n自分が　道具を　持っている　場合は\n盗めない。"
    jp_kanji: "攻撃と　同時に　道具を　盗む。\n自分が　道具を　持っている　場合は\n盗めない。"
    en: "The user attacks and steals the target’s held item\nsimultaneously. The user can’t steal anything if it\nalready holds an item."
    fr: "Le lanceur attaque la cible et vole son objet.\nLe lanceur ne peut rien voler s’il tient déjà un objet."
    it: "Il Pokémon attacca il bersaglio e può rubargli\nlo strumento, se non ne ha già uno."
    de: "Ermöglicht es, das Item des Zieles zu stehlen, solang\nder Anwender selbst keins bei sich trägt."
    es: "El usuario ataca y le roba el objeto al objetivo. Si ya\nlleva uno, el robo no se produce."
    ko: "공격과 동시에 도구를 훔친다.\n자신이 도구를 지니고 있을 경우에는\n훔칠 수 없다."
    zh_simp: "攻击的同时盗取道具。\n当自己携带道具时，\n不会去盗取。"
    zh_trad: "在攻擊的同時偷取道具。\n當寶可夢自己有攜帶道具時，\n則無法偷取。"
thousand_arrows:
  names:
    jp_kana: サウザンアロー
    jp_kanji: サウザンアロー
    en: Thousand Arrows
    fr: Myria-Flèches
    it: Mille Frecce
    de: Tausend Pfeile
    es: Mil Flechas
    ko: 사우전드애로
    zh_simp: 千箭齐发
    zh_trad: 千箭齊發
  descriptions:
    jp_kana: "浮いている　ポケモンにも　当たる。\n浮いていた　相手は\n撃ち落とされて　地面に　落ちる。"
    jp_kanji: "浮いている　ポケモンにも　当たる。\n浮いていた　相手は\n撃ち落とされて　地面に　落ちる。"
    en: "This move can hit opposing Pokémon that are in the air.\nThose Pokémon will be knocked down to the ground."
    fr: "Touche même les Pokémon dans les airs.\nDans ce cas, la cible retombe au sol."
    it: "Il Pokémon colpisce gli avversari scaraventando\na terra quelli che si trovano in aria."
    de: "Die Attacke erfasst auch fliegende und schwebende\nPokémon. Werden sie getroffen, fallen sie zu Boden."
    es: "Acierta incluso a Pokémon que estén en el aire y los\nhace caer al suelo."
    ko: "떠 있는 포켓몬도 맞힐 수 있다.\n떠 있던 상대는\n맞아서 땅에 떨어진다."
    zh_simp: "可以击中浮在空中的宝可梦。\n空中的对手被击落后，\n会掉到地面。"
    zh_trad: "能夠命中飄浮在空中的寶可夢。\n飄浮在空中的對手\n會被擊落掉到地面。"
thousand_waves:
  names:
    jp_kana: サウザンウェーブ
    jp_kanji: サウザンウェーブ
    en: Thousand Waves
    fr: Myria-Vagues
    it: Mille Onde
    de: Tausend Wellen
    es: Mil Temblores
    ko: 사우전드웨이브
    zh_simp: 千波激荡
    zh_trad: 千波激盪
  descriptions:
    jp_kana: "地をはう　波によって　攻撃。\n波に　巻き込まれた　相手は\n戦闘から　逃げられなくなる。"
    jp_kanji: "地をはう　波によって　攻撃。\n波に　巻き込まれた　相手は\n戦闘から　逃げられなくなる。"
    en: "The user attacks with a wave that crawls along the\nground. Those it hits can’t flee from battle."
    fr: "Le lanceur attaque avec des vagues glissant au sol.\nLa cible y est prise et ne peut pas quitter le terrain."
    it: "Il Pokémon attacca con delle onde striscianti che\ninvestono il bersaglio e gli impediscono di lasciare\nil campo."
    de: "Der Anwender greift mit einer Welle an, die dicht über\ndem Boden verläuft und alle Pokémon, die sie erfasst,\nan der Flucht beziehungsweise am Auswechseln hindert."
    es: "El usuario genera ondas sísmicas que se propagan por\nel suelo y sacuden al objetivo. Los Pokémon alcanzados\nno podrán huir del combate ni ser cambiados por otros."
    ko: "땅 위를 뻗어 나가는 파도로 공격한다.\n파도에 휩쓸린 상대는\n전투에서 도망칠 수 없게 된다."
    zh_simp: "从地面掀起波浪进行攻击。\n被掀入波浪中的对手，\n将无法从战斗中逃走。"
    zh_trad: "化成波浪從地面進行攻擊。\n被捲入波浪中的對手\n將無法從戰鬥中逃走。"
thrash:
  names:
    jp_kana: あばれる
    jp_kanji: あばれる
    en: Thrash
    fr: Mania
    it: Colpo
    de: Fuchtler
    es: Saña
    ko: 난동부리기
    zh_simp: 大闹一番
    zh_trad: 大鬧一番
  descriptions:
    jp_kana: "２ー３ターンの　間\n暴れまくって　相手を　攻撃する。\n暴れたあとは　混乱する。"
    jp_kanji: "２ー３ターンの　間\n暴れまくって　相手を　攻撃する。\n暴れたあとは　混乱する。"
    en: "The user rampages and attacks for two to three turns.\nThe user then becomes confused."
    fr: "Une attaque furieuse qui dure de deux à trois tours.\nLe lanceur devient confus."
    it: "Il Pokémon s’infuria e attacca il bersaglio per due o\ntre turni, ma rimane confuso."
    de: "Attacke über zwei bis drei Runden, die den Anwender\ndanach verwirrt."
    es: "El usuario ataca enfurecido durante dos o tres turnos\ny, después, se queda confuso."
    ko: "2~3턴 동안\n마구 난동 부려서 상대를 공격한다.\n난동 부린 뒤에는 혼란에 빠진다."
    zh_simp: "在２～３回合内，\n乱打一气地攻击对手。\n大闹一番后自己会陷入混乱。"
    zh_trad: "在２～３回合內\n瘋狂亂打對手進行攻擊。\n大鬧一番後自己會陷入混亂。"
throat_chop:
  names:
    jp_kana: じごくづき
    jp_kanji: じごくづき
    en: Throat Chop
    fr: Exécu-Son
    it: Colpo Infernale
    de: Neck Strike
    es: Golpe Mordaza
    ko: 지옥찌르기
    zh_simp: 深渊突刺
    zh_trad: 地獄突刺
  descriptions:
    jp_kana: "この　技を　受けた　相手は\n地獄の　苦しみから　２ターンの間\n音の　技を　出すことが　できなくなる。"
    jp_kanji: "この　技を　受けた　相手は\n地獄の　苦しみから　２ターンの間\n音の　技を　出すことが　できなくなる。"
    en: "The user attacks the target’s throat, and the resultant\nsuffering prevents the target from using sound-based\nmoves for two turns."
    fr: "Inflige une douleur tellement violente à la cible\nqu’elle ne peut plus émettre de sons pendant deux tours."
    it: "Chi viene colpito da questa mossa prova un\ndolore lancinante e non può più usare mosse\nbasate sul suono per due turni."
    de: "Das Pokémon, das von dieser Attacke getroffen wird,\nerleidet starke Schmerzen und kann deswegen zwei\nRunden lang keine Geräusch-Attacken mehr einsetzen."
    es: "Inflige al objetivo un dolor tan abrumador que le impide\nutilizar durante dos turnos movimientos que usan sonido."
    ko: "이 기술에 맞은 상대는\n지옥의 고통 때문에 2턴 동안\n소리 기술을 낼 수 없다."
    zh_simp: "受到此招式攻击的对手，\n会因为地狱般的痛苦，在２回合内，\n变得无法使出声音类招式。"
    zh_trad: "受到此招式攻擊的對手，\n會因為地獄般的痛苦，在２回合內\n無法使用會發出聲音的招式。"
thunder:
  names:
    jp_kana: かみなり
    jp_kanji: かみなり
    en: Thunder
    fr: Fatal-Foudre
    it: Tuono
    de: Donner
    es: Trueno
    ko: 번개
    zh_simp: 打雷
    zh_trad: 打雷
  descriptions:
    jp_kana: "激しい　雷を\n相手に　落として　攻撃する。\nまひ状態に　することが　ある。"
    jp_kanji: "激しい　雷を\n相手に　落として　攻撃する。\nまひ状態に　することが　ある。"
    en: "A wicked thunderbolt is dropped on the target to inflict\ndamage. This may also leave the target with paralysis."
    fr: "La foudre tombe sur la cible pour lui infliger\ndes dégâts, ce qui peut aussi la paralyser."
    it: "Il Pokémon attacca il bersaglio con un fulmine molto\nviolento che può anche paralizzarlo."
    de: "Eine verheerende Elektro-Attacke, die das Ziel\neventuell paralysiert."
    es: "Un poderoso rayo que daña al objetivo y puede\nparalizarlo."
    ko: "강한 번개를\n상대에게 떨어뜨려 공격한다.\n마비 상태로 만들 때가 있다."
    zh_simp: "向对手劈下暴雷进行攻击。\n有时会让对手陷入麻痹状态。"
    zh_trad: "向對手劈下暴雷進行攻擊。\n有時會讓對手陷入麻痺狀態。"
thunder_cage:
  names:
    jp_kana: サンダープリズン
    jp_kanji: サンダープリズン
    en: Thunder Cage
    fr: Voltageôle
    it: Elettrogabbia
    de: Blitzgefängnis
    es: Electrojaula
    ko: 썬더프리즌
    zh_simp: 雷电囚笼
    zh_trad: 雷電囚籠
  descriptions:
    jp_kana: "ほとばしる　電気の　おりの　中に\n４ー５ターンの　間\n相手を　閉じこめて　攻撃する。"
    jp_kanji: "ほとばしる　電気の　おりの　中に\n４ー５ターンの　間\n相手を　閉じこめて　攻撃する。"
    en: "The user traps the target inside a cage of sparking\nelectricity that inflicts damage for four to five turns."
    fr: "Le lanceur frappe la cible, et le piège dans une prison\nélectrique qui dure de quatre à cinq tours."
    it: "Il Pokémon attacca il bersaglio imprigionandolo\nin una gabbia di elettricità, che sprigiona corrente\nper quattro o cinque turni."
    de: "Das Ziel wird für vier bis fünf Runden in einem\nelektrischen Käfig gefangen."
    es: "El objetivo queda atrapado en una jaula electrificada\nque permanece en el terreno de cuatro a cinco turnos."
    ko: "전기가 흐르는 우리 안에\n4~5턴 동안\n상대를 가두어 공격한다."
    zh_simp: "将对手困在\n电流四溅的囚笼中，\n在４～５回合内进行攻击。"
    zh_trad: "將對手困在\n電流奔竄的電牢中，\n在４～５回合內進行攻擊。"
thunder_fang:
  names:
    jp_kana: かみなりのキバ
    jp_kanji: かみなりのキバ
    en: Thunder Fang
    fr: Crocs Éclair
    it: Fulmindenti
    de: Donnerzahn
    es: Colmillo Rayo
    ko: 번개엄니
    zh_simp: 雷电牙
    zh_trad: 雷電牙
  descriptions:
    jp_kana: "電気を　ためた　キバで　かみつく。\n相手を　ひるませたり\nまひ状態に　することが　ある。"
    jp_kanji: "電気を　ためた　キバで　かみつく。\n相手を　ひるませたり\nまひ状態に　することが　ある。"
    en: "The user bites with electrified fangs. This may also make\nthe target flinch or leave it with paralysis."
    fr: "Le lanceur utilise une morsure électrifiée qui peut aussi\nparalyser ou apeurer la cible."
    it: "Il Pokémon morde con denti elettrificati che possono\nanche paralizzare o far tentennare il bersaglio."
    de: "Anwender beißt mit elektrifizierten Reißzähnen zu.\nZiel schreckt eventuell zurück oder wird paralysiert."
    es: "El usuario muerde al objetivo con colmillos\nelectrificados y puede hacer que se amedrente\no se paralice."
    ko: "전기를 모은 이빨로 문다.\n상대를 풀죽게 하거나\n마비 상태로 만들 때가 있다."
    zh_simp: "用蓄满电流的牙齿咬住对手。\n有时会使对手畏缩\n或陷入麻痹状态。"
    zh_trad: "用蓄滿電流的牙齒咬住對手。\n有時會讓對手畏縮\n或陷入麻痺狀態。"
thunder_punch:
  names:
    jp_kana: かみなりパンチ
    jp_kanji: かみなりパンチ
    en: Thunder Punch
    fr: Poing Éclair
    it: Tuonopugno
    de: Donnerschlag
    es: Puño Trueno
    ko: 번개펀치
    zh_simp: 雷电拳
    zh_trad: 雷電拳
  descriptions:
    jp_kana: "電撃を　こめた　パンチで\n相手を　攻撃する。\nまひ状態に　することが　ある。"
    jp_kanji: "電撃を　こめた　パンチで\n相手を　攻撃する。\nまひ状態に　することが　ある。"
    en: "The target is attacked with an electrified punch. This may\nalso leave the target with paralysis."
    fr: "Un coup de poing électrique vient frapper la cible,\nce qui peut la paralyser."
    it: "Il Pokémon attacca il bersaglio con un pugno elettrico\nche può paralizzarlo."
    de: "Ein elektrischer Schlag, der das Ziel eventuell\nparalysiert."
    es: Puñetazo eléctrico que puede paralizar.
    ko: "전격을 담은 펀치로\n상대를 공격한다.\n마비 상태로 만들 때가 있다."
    zh_simp: "用充满电流的拳头攻击对手。\n有时会让对手陷入麻痹状态。"
    zh_trad: "用帶有電流的拳頭\n攻擊對手。\n有時會讓對手陷入麻痺狀態。"
thunder_shock:
  names:
    jp_kana: でんきショック
    jp_kanji: でんきショック
    en: Thunder Shock
    fr: Éclair
    it: Tuonoshock
    de: Donnerschock
    es: Impactrueno
    ko: 전기쇼크
    zh_simp: 电击
    zh_trad: 電擊
  descriptions:
    jp_kana: "電気の　刺激を\n相手に　浴びせて　攻撃する。\nまひ状態に　することが　ある。"
    jp_kanji: "電気の　刺激を\n相手に　浴びせて　攻撃する。\nまひ状態に　することが　ある。"
    en: "The user attacks the target with a jolt of electricity.\nThis may also leave the target with paralysis."
    fr: "Une décharge électrique tombe sur la cible,\nce qui peut aussi la paralyser."
    it: "Il Pokémon attacca il bersaglio con una scarica elettrica\nche può anche paralizzarlo."
    de: Eine Elektro-Attacke, die das Ziel eventuell paralysiert.
    es: Ataque eléctrico que puede paralizar al objetivo.
    ko: "전기 자극을\n상대에게 날려서 공격한다.\n마비 상태로 만들 때가 있다."
    zh_simp: "发出电流刺激对手进行攻击。\n有时会让对手陷入麻痹状态。"
    zh_trad: "發出電流刺激對手進行攻擊。\n有時會讓對手陷入麻痺狀態。"
thunder_wave:
  names:
    jp_kana: でんじは
    jp_kanji: でんじは
    en: Thunder Wave
    fr: Cage Éclair
    it: Tuononda
    de: Donnerwelle
    es: Onda Trueno
    ko: 전기자석파
    zh_simp: 电磁波
    zh_trad: 電磁波
  descriptions:
    jp_kana: "弱い　電撃を　浴びせることで\n相手を　まひ状態に　する。"
    jp_kanji: "弱い　電撃を　浴びせることで\n相手を　まひ状態に　する。"
    en: "The user launches a weak jolt of electricity that\nparalyzes the target."
    fr: Un faible choc électrique paralyse la cible.
    it: "Il Pokémon colpisce il bersaglio con una debole scarica\nelettrica che lo paralizza."
    de: Ein schwacher Stromstoß, der das Ziel paralysiert.
    es: Una ligera descarga que paraliza al objetivo.
    ko: "약한 전격을 날려서\n상대를 마비 상태로 만든다."
    zh_simp: "向对手发出\n微弱的电击，\n从而让对手陷入麻痹状态。"
    zh_trad: "放出微弱的電流。\n讓對手陷入麻痺狀態。"
thunderbolt:
  names:
    jp_kana: １０まんボルト
    jp_kanji: １０まんボルト
    en: Thunderbolt
    fr: Tonnerre
    it: Fulmine
    de: Donnerblitz
    es: Rayo
    ko: 10만볼트
    zh_simp: 十万伏特
    zh_trad: 十萬伏特
  descriptions:
    jp_kana: "強い　電撃を\n相手に　浴びせて　攻撃する。\nまひ状態に　することが　ある。"
    jp_kanji: "強い　電撃を\n相手に　浴びせて　攻撃する。\nまひ状態に　することが　ある。"
    en: "The user attacks the target with a strong electric blast.\nThis may also leave the target with paralysis."
    fr: "Une grosse décharge électrique tombe sur la cible,\nce qui peut aussi la paralyser."
    it: "Il Pokémon attacca il bersaglio con una potente scarica\nelettrica che può anche paralizzarlo."
    de: "Eine starke Elektro-Attacke, die das Ziel eventuell\nparalysiert."
    es: "Potente ataque eléctrico que puede paralizar al\nobjetivo."
    ko: "강한 전격을\n상대에게 날려서 공격한다.\n마비 상태로 만들 때가 있다."
    zh_simp: "向对手发出\n强力电击进行攻击。\n有时会让对手陷入麻痹状态。"
    zh_trad: "向對手放出強力電流進行攻擊。\n有時會讓對手陷入麻痺狀態。"
thunderclap:
  names:
    jp_kana: じんらい
    jp_kanji: じんらい
    en: Thunderclap
    fr: Vif Éclair
    it: Saetta
    de: Sturmblitz
    es: Relámpago Súbito
    ko: 질풍신뢰
    zh_simp: 迅雷
    zh_trad: 迅雷
  descriptions:
    jp_kana: "相手より　先に　電撃を　浴びせる。\n相手が　だす技が\n攻撃技でないと　失敗する。"
    jp_kanji: "相手より　先に　電撃を　浴びせる。\n相手が　だす技が\n攻撃技でないと　失敗する。"
    en: "This move enables the user to attack first with a jolt of\nelectricity. This move fails if the target is not readying\nan attack."
    fr: "Permet au lanceur d’attaquer la cible en priorité avec\nune décharge électrique. Échoue si la cible ne prépare\npas une attaque."
    it: "Il Pokémon abbatte una scarica elettrica sul bersaglio\nprima che questi possa attaccare. La mossa fallisce\nse il bersaglio sferra una mossa che non è di attacco."
    de: "Bei dieser Erstschlag-Attacke lässt der Anwender\neinen Blitz auf das Ziel einschlagen. Sie gelingt nur,\nwenn dieses gerade eine Angriffsattacke vorbereitet."
    es: "Invoca un rayo que cae sobre el objetivo antes de que\neste pueda realizar cualquier acción. Falla si el objetivo\nno está preparando ningún ataque."
    ko: "상대보다 먼저 전격을 퍼붓는다.\n상대가 쓴 기술이\n공격 기술이 아니면 실패한다."
    zh_simp: "可以比对手先使出电击进行攻击。\n对手使出的招式\n如果不是攻击招式则会失败。"
    zh_trad: "可以搶先對手一步用電擊進行攻擊。\n若對手使用的不是攻擊招式則會失敗。"
thunderous_kick:
  names:
    jp_kana: らいめいげり
    jp_kanji: らいめいげり
    en: Thunderous Kick
    fr: Coup Fulgurant
    it: Calcio Tonante
    de: Donnernder Tritt
    es: Patada Relámpago
    ko: 천둥차기
    zh_simp: 雷鸣蹴击
    zh_trad: 雷鳴蹴擊
  descriptions:
    jp_kana: "雷の　ような　動きで\n相手を　翻弄しながら　キックする。\n相手の　防御を　さげる。"
    jp_kanji: "雷の　ような　動きで\n相手を　翻弄しながら　キックする。\n相手の　防御を　さげる。"
    en: "The user overwhelms the target with lightning-like\nmovement before delivering a kick. This also lowers\nthe target’s Defense stat."
    fr: "Le lanceur assène un coup de pied à la cible\nà la vitesse de l’éclair. Baisse aussi la Défense\nde la cible."
    it: "Il Pokémon sferra calci al bersaglio dopo averlo\ndistratto con movimenti fulminei, riducendone\nla Difesa."
    de: "Der Anwender bringt das Ziel mit blitzschnellen\nBewegungen durcheinander und tritt dann zu.\nSenkt die Verteidigung des Zieles."
    es: "El usuario desconcierta al objetivo con movimientos\ncentelleantes y le propina una patada que, además,\nreduce su Defensa."
    ko: "번개 같은 움직임으로\n상대를 농락하며 킥을 날린다.\n상대의 방어를 떨어뜨린다."
    zh_simp: "以雷电般的动作\n戏耍对手的同时使出脚踢。\n可降低对手的防御。"
    zh_trad: "以雷電般的動作\n一邊戲弄對手一邊使出踢擊。\n可降低對手的防禦。"
tickle:
  names:
    jp_kana: くすぐる
    jp_kanji: くすぐる
    en: Tickle
    fr: Chatouille
    it: Solletico
    de: Spaßkanone
    es: Cosquillas
    ko: 간지르기
    zh_simp: 挠痒
    zh_trad: 搔癢
  descriptions:
    jp_kana: "体を　くすぐり　笑わせる　ことで\n相手の　攻撃と　防御を　さげる。"
    jp_kanji: "体を　くすぐり　笑わせる　ことで\n相手の　攻撃と　防御を　さげる。"
    en: "The user tickles the target into laughing, lowering its\nAttack and Defense stats."
    fr: "Le lanceur chatouille la cible, ce qui baisse\nson Attaque et sa Défense."
    it: "Il Pokémon solletica il bersaglio e lo fa ridere,\nriducendone l’Attacco e la Difesa."
    de: "Bringt das Ziel zum Lachen und senkt dadurch dessen\nAngriff und Verteidigung."
    es: "Hace reír al objetivo para reducir su Ataque y su\nDefensa."
    ko: "몸을 간질여 웃게 만들어서\n상대의 공격과 방어를 떨어뜨린다."
    zh_simp: "给对手挠痒，使其发笑，\n从而降低对手的攻击和防御。"
    zh_trad: "搔癢對手的身體，讓對手發笑，\n降低對手的攻擊和防禦。"
tidy_up:
  names:
    jp_kana: おかたづけ
    jp_kanji: おかたづけ
    en: Tidy Up
    fr: Grand Nettoyage
    it: Pulizie
    de: Aufräumen
    es: Limpieza General
    ko: 정리정돈
    zh_simp: 大扫除
    zh_trad: 大掃除
  descriptions:
    jp_kana: "まきびし　ステルスロック　ねばねばネット\nどくびし　みがわりを　すべて　かたづける。\n自分の　攻撃と　素早さが　あがる。"
    jp_kanji: "まきびし　ステルスロック　ねばねばネット\nどくびし　みがわりを　すべて　かたづける。\n自分の　攻撃と　素早さが　あがる。"
    en: "The user tidies up and removes the effects of Spikes,\nStealth Rock, Sticky Web, Toxic Spikes, and Substitute.\nThis also boosts the user’s Attack and Speed stats."
    fr: "Le lanceur fait le ménage sur le terrain, ce qui annule les\neffets de Picots, Piège de Roc, Toile Gluante, Pics Toxik,\net Clonage. Augmente l’Attaque et la Vitesse du lanceur."
    it: "Il Pokémon fa le pulizie, annullando gli effetti di Punte,\nLevitoroccia, Rete Vischiosa, Fielepunte e Sostituto.\nInoltre, aumenta il suo Attacco e la sua Velocità."
    de: "Die Effekte von Stachler, Tarnsteine, Klebenetz,\nGiftspitzen und Delegator werden aufgehoben. Zudem\nsteigen der Angriff und die Initiative des Anwenders."
    es: "Efectúa una limpieza a fondo que anula los efectos\nde Púas, Trampa Rocas, Red Viscosa, Púas Tóxicas y\nSustituto. Aumenta el Ataque y la Velocidad del usuario."
    ko: "압정뿌리기, 스텔스록, 끈적끈적네트,\n독압정, 대타출동을 모두 정리한다.\n자신의 공격과 스피드가 올라간다."
    zh_simp: "将撒菱、隐形岩、黏黏网、\n毒菱、替身全部扫除掉。\n自己的攻击和速度会提高。"
    zh_trad: "將撒菱、隱形岩、黏黏網、\n毒菱、替身全部清理乾淨。\n自己的攻擊和速度會提高。"
topsy_turvy:
  names:
    jp_kana: ひっくりかえす
    jp_kanji: ひっくりかえす
    en: Topsy-Turvy
    fr: Renversement
    it: Sottosopra
    de: Invertigo
    es: Reversión
    ko: 뒤집어엎기
    zh_simp: 颠倒
    zh_trad: 顛倒
  descriptions:
    jp_kana: "相手に　かかっている\nすべての　能力変化を\nひっくり返して　逆にする。"
    jp_kanji: "相手に　かかっている\nすべての　能力変化を\nひっくり返して　逆にする。"
    en: "All stat changes affecting the target turn topsy-turvy\nand become the opposite of what they were."
    fr: Inverse tous les changements de stats de la cible.
    it: "Questa mossa inverte tutte le modifiche alle statistiche\ndel bersaglio."
    de: Invertiert alle Statusveränderungen des Zieles.
    es: "Invierte por completo los cambios en las características\ndel objetivo."
    ko: "상대에게 걸려 있는\n모든 능력 변화를\n뒤집어서 반대로 만든다."
    zh_simp: "颠倒对手身上的\n所有能力变化，\n变成和原来相反的状态。"
    zh_trad: "讓對手身上所有的\n能力變化顛倒過來，\n變成和原來相反的狀態。"
torch_song:
  names:
    jp_kana: フレアソング
    jp_kanji: フレアソング
    en: Torch Song
    fr: Chant Flamboyant
    it: Canzone Ardente
    de: Loderlied
    es: Canto Ardiente
    ko: 플레어송
    zh_simp: 闪焰高歌
    zh_trad: 閃焰高歌
  descriptions:
    jp_kana: "燃えたぎる　火炎を　歌うように\n吹きつけて　相手を　焦がす。\n自分の　特攻を　あげる。"
    jp_kanji: "燃えたぎる　火炎を　歌うように\n吹きつけて　相手を　焦がす。\n自分の　特攻を　あげる。"
    en: "The user blows out raging flames as if singing a song,\nscorching the target. This also boosts the user’s\nSp. Atk stat."
    fr: "Le lanceur carbonise la cible en projetant sur elle\nde vives flammes créées par un chant. Cette capacité\naugmente l’Attaque Spéciale du lanceur."
    it: "Il Pokémon abbrustolisce il bersaglio soffiandogli\naddosso fiamme ardenti come se intonasse una\ncanzone. Inoltre, il suo Attacco Speciale aumenta."
    de: "Der Anwender spuckt inbrünstig lodernde Flammen,\nals würde er singen, und versengt das Ziel. Dadurch\nsteigt auch der Spezial-Angriff des Anwenders."
    es: "Expele tórridas llamaradas como si entonara una canción\ny abrasa al objetivo con ellas. Aumenta el Ataque\nEspecial del usuario."
    ko: "활활 타오르는 불꽃을\n노래하듯 뿜어서 상대를 태워 버린다.\n자신의 특수공격을 올린다."
    zh_simp: "如唱歌一样喷出\n熊熊燃烧的火焰烧焦对手。\n会提高自己的特攻。"
    zh_trad: "將熊熊燃燒的火焰如唱歌般地\n吹向對手將其燒焦。\n會提高自己的特攻。"
torment:
  names:
    jp_kana: いちゃもん
    jp_kanji: いちゃもん
    en: Torment
    fr: Tourmente
    it: Attaccalite
    de: Folterknecht
    es: Tormento
    ko: 트집
    zh_simp: 无理取闹
    zh_trad: 無理取鬧
  descriptions:
    jp_kana: "相手に　いちゃもんを　つけて\n同じ　技を　２回連続で\nだせなくする。"
    jp_kanji: "相手に　いちゃもんを　つけて\n同じ　技を　２回連続で\nだせなくする。"
    en: "The user torments and enrages the target, making it\nincapable of using the same move twice in a row."
    fr: "Le lanceur irrite la cible pour l’empêcher d’utiliser\nla même capacité deux fois de suite."
    it: "Il Pokémon tormenta e fa infuriare il bersaglio,\nimpedendogli di usare la stessa mossa due volte di fila."
    de: "Erzürnt das Ziel, um wiederholten Einsatz derselben\nAttacke zu verhindern."
    es: "Atormenta y enfurece al objetivo, que no puede usar\ndos veces seguidas el mismo movimiento."
    ko: "상대에게 트집을 잡아서\n똑같은 기술을 2회 연속으로\n쓸 수 없게 한다."
    zh_simp: "向对手无理取闹，\n令其不能连续２次\n使出相同招式。"
    zh_trad: "無理取鬧，\n讓對手不能連續２次\n使出相同招式。"
toxic:
  names:
    jp_kana: どくどく
    jp_kanji: どくどく
    en: Toxic
    fr: Toxik
    it: Tossina
    de: Toxin
    es: Tóxico
    ko: 맹독
    zh_simp: 剧毒
    zh_trad: 劇毒
  descriptions:
    jp_kana: "相手を　猛毒の　状態に　する。\nターンが　すすむほど\n毒の　ダメージが　増えていく。"
    jp_kanji: "相手を　猛毒の　状態に　する。\nターンが　すすむほど\n毒の　ダメージが　増えていく。"
    en: "A move that leaves the target badly poisoned. Its poison\ndamage worsens every turn."
    fr: "Le lanceur empoisonne gravement la cible.\nLes dégâts dus au poison augmentent à chaque tour."
    it: "Iperavvelena il bersaglio con una potente tossina.\nIl danno peggiora a ogni turno."
    de: "Vergiftet das Ziel mit einem potenten Toxin schwer.\nDie Vergiftung wird von Runde zu Runde stärker."
    es: "Envenena gravemente al objetivo y causa un daño\nmayor en cada turno."
    ko: "상대를 맹독 상태로 만든다.\n턴이 진행될수록\n독의 데미지가 증가한다."
    zh_simp: "让对手陷入剧毒状态。\n随着回合的推进，\n中毒伤害会增加。"
    zh_trad: "讓對手陷入劇毒狀態。\n中毒傷害會隨著\n回合的進行而增加。"
toxic_spikes:
  names:
    jp_kana: どくびし
    jp_kanji: どくびし
    en: Toxic Spikes
    fr: Pics Toxik
    it: Fielepunte
    de: Giftspitzen
    es: Púas Tóxicas
    ko: 독압정
    zh_simp: 毒菱
    zh_trad: 毒菱
  descriptions:
    jp_kana: "相手の　足下に　どくびしを\nしかける。　交代で　でてきた　相手の\nポケモンに　毒を　おわせる。"
    jp_kanji: "相手の　足下に　どくびしを\nしかける。　交代で　でてきた　相手の\nポケモンに　毒を　おわせる。"
    en: "The user lays a trap of poison spikes at the feet of\nthe opposing team. The spikes will poison opposing\nPokémon that switch into battle."
    fr: "Le lanceur éparpille des pics autour de la cible,\nce qui empoisonne les Pokémon entrant au combat\nde ce côté."
    it: "Il Pokémon piazza una trappola di punte velenose che\navvelenano gli avversari quando entrano in campo."
    de: "Anwender legt eine Falle mit giftigen Stacheln aus.\nIn den Kampf eingewechselte gegnerische Pokémon\nwerden vergiftet."
    es: "Lanza una trampa de púas tóxicas a los pies del objetivo\nque envenena a los rivales que entran en combate."
    ko: "상대의 발밑에 독 압정을\n뿌린다. 교체로 나온 상대\n포켓몬에게 독을 퍼지게 한다."
    zh_simp: "在对手的脚下撒毒菱。\n使对手替换出场的宝可梦中毒。"
    zh_trad: "在對手腳下散布毒菱。\n讓對手替換出場的寶可夢\n陷入中毒狀態。"
toxic_thread:
  names:
    jp_kana: どくのいと
    jp_kanji: どくのいと
    en: Toxic Thread
    fr: Fil Toxique
    it: Velenotela
    de: Giftfaden
    es: Hilo Venenoso
    ko: 독실
    zh_simp: 毒丝
    zh_trad: 毒絲
  descriptions:
    jp_kana: "毒の　混じった　糸を　吹き付ける。\n相手を　毒にして\n素早さを　さげる。"
    jp_kanji: "毒の　混じった　糸を　吹き付ける。\n相手を　毒にして\n素早さを　さげる。"
    en: "The user shoots poisonous threads to poison the target\nand lower the target’s Speed stat."
    fr: "Tisse un fil imprégné de venin. Empoisonne la cible\net baisse sa Vitesse."
    it: "Il Pokémon avvelena il bersaglio avvolgendolo con\nfilamenti tossici e ne riduce la Velocità."
    de: "Der Anwender schießt giftige Fäden auf das Ziel,\ndas dadurch vergiftet wird. Außerdem sinkt seine\nInitiative."
    es: "Ataca al objetivo con hilillos venenosos que reducen\nsu Velocidad y lo envenenan."
    ko: "독이 섞인 실을 뿜어낸다.\n상대를 독 상태로 만들고\n스피드를 떨어뜨린다."
    zh_simp: "将混有毒的丝吐向对手。\n使其中毒，\n从而降低对手的速度。"
    zh_trad: "將混有毒的絲吐向對手。\n使其中毒，\n進而降低對手的速度。"
trailblaze:
  names:
    jp_kana: くさわけ
    jp_kanji: くさわけ
    en: Trailblaze
    fr: Désherbaffe
    it: Apripista
    de: Wegbereiter
    es: Abrecaminos
    ko: 개척하기
    zh_simp: 起草
    zh_trad: 起草
  descriptions:
    jp_kana: "草むらから　飛びだすように　攻撃する。\n軽快な　足どりに　よって\n自分の　素早さを　あげる。"
    jp_kanji: "草むらから　飛びだすように　攻撃する。\n軽快な　足どりに　よって\n自分の　素早さを　あげる。"
    en: "The user attacks suddenly as if leaping out from tall\ngrass. The user’s nimble footwork boosts its Speed stat."
    fr: "Le lanceur surgit des hautes herbes pour attaquer\nla cible. Les mouvements agiles du lanceur augmentent\nsa Vitesse."
    it: "Il Pokémon attacca come se saltasse fuori dall’erba alta\ne si muove con passo leggiadro, aumentando la propria\nVelocità."
    de: "Der Anwender greift an, als würde er aus hohem Gras\nhervorspringen. Mit wendigen Schritten erhöht er seine\nInitiative."
    es: "Ataca de pronto como si saltara desde la hierba alta.\nEl usuario se mueve con gran agilidad y aumenta su\nVelocidad."
    ko: "풀숲에서 튀어나오듯이 공격한다.\n경쾌한 발재간으로\n자신의 스피드를 올린다."
    zh_simp: "跳出草丛进行攻击。\n通过轻快的步伐\n会提高自己的速度。"
    zh_trad: "從草叢裡跳出來進行攻擊。\n輕快的腳步會使得\n自己的速度提高。"
transform:
  names:
    jp_kana: へんしん
    jp_kanji: へんしん
    en: Transform
    fr: Morphing
    it: Trasformazione
    de: Wandler
    es: Transformación
    ko: 변신
    zh_simp: 变身
    zh_trad: 變身
  descriptions:
    jp_kana: "相手の　ポケモンに　変身することで\n相手と　まったく\n同じ　技が　使える。"
    jp_kanji: "相手の　ポケモンに　変身することで\n相手と　まったく\n同じ　技が　使える。"
    en: "The user transforms into a copy of the target, right down\nto having the same move set."
    fr: "Le lanceur devient une copie de sa cible et obtient\nla même palette de capacités."
    it: "Il Pokémon si trasforma in una copia esatta del bersaglio\nper sfruttarne le mosse."
    de: "Anwender verwandelt sich in ein Abbild des Zieles und\nkann so auf die gleichen Attacken zugreifen."
    es: "El usuario se transforma en una copia del objetivo, con\nlos mismos movimientos."
    ko: "상대 포켓몬으로 변신하여\n상대와 완전히 똑같은\n기술을 사용할 수 있다."
    zh_simp: "变身成对手宝可梦的样子，\n能够使用和对手\n完全相同的招式。"
    zh_trad: "變身成對手寶可夢的樣子，\n能夠使用和對手\n完全相同的招式。"
tri_attack:
  names:
    jp_kana: トライアタック
    jp_kanji: トライアタック
    en: Tri Attack
    fr: Triplattaque
    it: Tripletta
    de: Triplette
    es: Triataque
    ko: 트라이어택
    zh_simp: 三重攻击
    zh_trad: 三重攻擊
  descriptions:
    jp_kana: "３つの　光線で　攻撃する。\nまひか　やけどか　こおり状態の\nどれかに　することが　ある。"
    jp_kanji: "３つの　光線で　攻撃する。\nまひか　やけどか　こおり状態の\nどれかに　することが　ある。"
    en: "The user strikes with a simultaneous three-beam attack.\nThis may also burn, freeze, or paralyze the target."
    fr: "Le lanceur envoie trois boules d’énergie simultanément\nqui peuvent aussi paralyser, brûler ou geler la cible."
    it: "Il Pokémon attacca il bersaglio con tre raggi di luce\nche possono paralizzarlo, scottarlo o congelarlo."
    de: "Feuert drei Strahlen ab. Verursacht eventuell Paralyse,\nVerbrennungen oder Einfrieren."
    es: "Ataque con tres rayos de luz que puede paralizar,\nquemar o congelar al objetivo."
    ko: "3개의 광선으로 공격한다.\n마비, 화상 또는 얼음 상태 중\n어느 하나로 만들 때가 있다."
    zh_simp: "用３种光线进行攻击。\n有时会让对手陷入\n麻痹、灼伤或冰冻的状态。"
    zh_trad: "用３種光線進行攻擊。\n有時會讓對手陷入\n麻痺、灼傷或冰凍的狀態。"
trick:
  names:
    jp_kana: トリック
    jp_kanji: トリック
    en: Trick
    fr: Tour de Magie
    it: Raggiro
    de: Trickbetrug
    es: Truco
    ko: 트릭
    zh_simp: 戏法
    zh_trad: 戲法
  descriptions:
    jp_kana: "相手の　すきを　ついて\n自分と　相手の\n持ち物を　交換する。"
    jp_kanji: "相手の　すきを　ついて\n自分と　相手の\n持ち物を　交換する。"
    en: "The user catches the target off guard and swaps the\ntarget’s held item with its own."
    fr: "Le lanceur prend la cible au dépourvu et l’oblige\nà échanger son objet contre le sien."
    it: "Il Pokémon coglie il bersaglio in contropiede e lo\nobbliga a scambiare il suo strumento con il proprio."
    de: "Der Anwender überrumpelt das Ziel und tauscht mit\nihm die getragenen Items."
    es: "Engaña al objetivo desprevenido e intercambia su\nobjeto con él."
    ko: "상대의 빈틈을 노려\n자신과 상대가 지닌 물건을\n바꿔치기한다."
    zh_simp: "抓住对手的空隙，\n交换自己和对手的持有物。"
    zh_trad: "在對手露出空隙時，\n趁機交換自己和對手的持有物。"
trick_or_treat:
  names:
    jp_kana: ハロウィン
    jp_kanji: ハロウィン
    en: Trick-or-Treat
    fr: Halloween
    it: Halloween
    de: Halloween
    es: Halloween
    ko: 핼러윈
    zh_simp: 万圣夜
    zh_trad: 萬聖夜
  descriptions:
    jp_kana: "相手を　ハロウィンに　誘う。\n相手の　タイプに\nゴーストタイプが　追加される。"
    jp_kanji: "相手を　ハロウィンに　誘う。\n相手の　タイプに\nゴーストタイプが　追加される。"
    en: "The user takes the target trick-or-treating. This adds\nGhost type to the target’s type."
    fr: "Insuffle à la cible l’esprit d’Halloween, et ajoute le type\nSpectre à ses types actuels."
    it: "Il Pokémon invita il bersaglio a festeggiare Halloween,\nfacendogli così acquisire anche il tipo Spettro."
    de: "Der Anwender lehrt das Ziel das Fürchten. Dieses\nnimmt dadurch zusätzlich den Typ Geist an."
    es: "Invita al objetivo a celebrar Halloween, lo que añade\nel tipo Fantasma a los tipos de este."
    ko: "상대를 핼러윈으로 초대한다.\n상대 타입에\n고스트타입이 추가된다."
    zh_simp: "邀请对手参加万圣夜。\n使对手被追加幽灵属性。"
    zh_trad: "邀請對手參加萬聖夜。\n讓對手追加幽靈屬性。"
trick_room:
  names:
    jp_kana: トリックルーム
    jp_kanji: トリックルーム
    en: Trick Room
    fr: Distorsion
    it: Distortozona
    de: Bizarroraum
    es: Espacio Raro
    ko: 트릭룸
    zh_simp: 戏法空间
    zh_trad: 戲法空間
  descriptions:
    jp_kana: "まか不思議な　空間を　つくる。\n５ターンの　間\n遅い　ポケモンから　行動できる。"
    jp_kanji: "まか不思議な　空間を　つくる。\n５ターンの　間\n遅い　ポケモンから　行動できる。"
    en: "The user creates a bizarre area in which slower Pokémon\nget to move first for five turns."
    fr: "Le lanceur crée une zone mystérieuse où les Pokémon\nles plus lents frappent en priorité pendant cinq tours."
    it: "Chi la usa crea una dimensione in cui i Pokémon\npiù lenti agiscono per primi per cinque turni."
    de: "Anwender erzeugt einen bizarren Raum, in dem\nlangsame Pokémon fünf Runden lang zuerst agieren."
    es: "Crea un espacio misterioso en el que los Pokémon lentos\nse mueven primero durante cinco turnos."
    ko: "이상한 공간을 만든다.\n5턴 동안 느린 포켓몬부터\n행동할 수 있다."
    zh_simp: "制造出离奇的空间。\n在５回合内\n速度慢的宝可梦可以先行动。"
    zh_trad: "創造出非常不可思議的空間。\n在５回合內，\n速度慢的寶可夢可以先行動。"
triple_arrows:
  names:
    jp_kana: ３ぼんのや
    jp_kanji: ３ぼんのや
    en: Triple Arrows
    fr: Triple Flèche
    it: Triplodardo
    de: Drillingspfeile
    es: Triple Flecha
    ko: 3연화살
    zh_simp: 三连箭
    zh_trad: 三連箭
  descriptions:
    jp_kana: "足技のあと　３本の矢を　同時に放つ。\n相手の　防御を　さげたり　ひるませることが\nある。　急所に　当たりやすい。"
    jp_kanji: "足技のあと　３本の矢を　同時に放つ。\n相手の　防御を　さげたり　ひるませることが\nある。　急所に　当たりやすい。"
    en: "The user kicks, then fires three arrows. This move has a\nheightened chance of landing a critical hit and may also\nlower the target’s Defense stat or make it flinch."
    fr: "Le lanceur donne un coup de pied et tire trois flèches\nsimultanément, ce qui peut baisser la Défense de la cible\nou l’apeurer. Taux de critiques élevé."
    it: "Il Pokémon sferra un calcio per poi scoccare tre dardi\ninsieme. Può ridurre la Difesa del bersaglio o farlo\ntentennare. Probabile brutto colpo."
    de: "Der Anwender tritt zu und schießt dann drei Pfeile ab.\nSenkt eventuell die Verteidigung des Zieles oder lässt\nes zurückschrecken. Hohe Volltrefferquote."
    es: "Propina un talonazo y lanza tres flechas. Suele asestar un\ngolpe crítico y puede reducir la Defensa del objetivo o\namedrentarlo."
    ko: "발 기술을 사용하고 3개의 화살을 동시에 발사한다.\n상대의 방어를 떨어뜨리거나\n풀죽게 만들 때가 있다. 급소에 맞기 쉽다."
    zh_simp: "使出一记腿技后同时发射３箭。\n有时会降低对手的防御或\n使对手畏缩。容易击中要害。"
    zh_trad: "使出腿技後同時發射３箭。\n有時會降低對手的防禦或讓對手畏縮。\n容易擊中要害。"
triple_axel:
  names:
    jp_kana: トリプルアクセル
    jp_kanji: トリプルアクセル
    en: Triple Axel
    fr: Triple Axel
    it: Triplo Axel
    de: Dreifach-Axel
    es: Triple Axel
    ko: 트리플악셀
    zh_simp: 三旋击
    zh_trad: 三旋擊
  descriptions:
    jp_kana: "３回連続で　キックを　くりだして\n攻撃する。　技が　当たるたびに\n威力は　あがる。"
    jp_kanji: "３回連続で　キックを　くりだして\n攻撃する。　技が　当たるたびに\n威力は　あがる。"
    en: "A consecutive three-kick attack that becomes more\npowerful with each successful hit."
    fr: "Une série d’un à trois coups de pied distincts dont\nla puissance augmente à chaque fois que la capacité\ntouche sa cible."
    it: "Il Pokémon attacca sferrando fino a tre calci consecutivi.\nOgni volta che la mossa va a segno, la sua potenza\naumenta."
    de: "Tritt das Ziel ein- bis dreimal nacheinander. Die Härte\nder Tritte nimmt von Treffer zu Treffer zu."
    es: "Propina hasta tres patadas seguidas, la potencia de las\ncuales aumenta cada vez que acierta."
    ko: "3회 연속으로 킥을 날려\n공격한다. 기술이 맞을 때마다\n위력이 올라간다."
    zh_simp: "连续３次踢对手进行攻击。\n每踢中一次，威力就会提高。"
    zh_trad: "連續踢對手３次進行攻擊。\n每踢中一次，威力就會提高。"
triple_dive:
  names:
    jp_kana: トリプルダイブ
    jp_kanji: トリプルダイブ
    en: Triple Dive
    fr: Triple Plongeon
    it: Triplo Tuffo
    de: Tauchtriade
    es: Triple Inmersión
    ko: 트리플다이브
    zh_simp: 三连钻
    zh_trad: 三連鑽
  descriptions:
    jp_kana: "息のあった　飛びこみを　することで\n相手に　水しぶきを　あてる。\n３回連続で　ダメージを　与える。"
    jp_kanji: "息のあった　飛びこみを　することで\n相手に　水しぶきを　あてる。\n３回連続で　ダメージを　与える。"
    en: "The user performs a perfectly timed triple dive, hitting\nthe target with splashes of water three times in a row."
    fr: "Le lanceur effectue des plongeons parfaitement\ncadencés pour éclabousser la cible et lui infliger\ndes dégâts trois fois d’affilée."
    it: "Il Pokémon si lancia in un triplo tuffo perfettamente\ncoordinato, colpendo il bersaglio con degli schizzi\nd’acqua e infliggendogli danni tre volte di fila."
    de: "Der Anwender taucht mit perfekt abgestimmtem Timing\nab und trifft das Ziel mit Wasserspritzern. Dabei richtet\ner dreimal hintereinander Schaden an."
    es: "Ejecuta una inmersión triple en perfecta sincronía que\ngolpea al objetivo con salpicaduras de agua tres veces\nseguidas."
    ko: "호흡이 척척 맞게 다이빙해서\n상대에게 물보라를 끼얹는다.\n3회 연속으로 데미지를 준다."
    zh_simp: "以默契的跳跃溅起水花击向对手。\n连续３次给予伤害。"
    zh_trad: "默契十足地飛身鑽入水中，\n將水花濺向對手。\n連續３次給予傷害。"
triple_kick:
  names:
    jp_kana: トリプルキック
    jp_kanji: トリプルキック
    en: Triple Kick
    fr: Triple Pied
    it: Triplocalcio
    de: Dreifachkick
    es: Triple Patada
    ko: 트리플킥
    zh_simp: 三连踢
    zh_trad: 三連踢
  descriptions:
    jp_kana: "３回連続で　キックを　くりだして\n攻撃する。　技が　当たるたびに\n威力は　あがる。"
    jp_kanji: "３回連続で　キックを　くりだして\n攻撃する。　技が　当たるたびに\n威力は　あがる。"
    en: "A consecutive three-kick attack that becomes more\npowerful with each successful hit."
    fr: "Une série d’un à trois coups de pied distincts dont\nla puissance augmente à chaque fois que la capacité\ntouche sa cible."
    it: "Il Pokémon attacca sferrando fino a tre calci consecutivi.\nOgni volta che la mossa va a segno, la sua potenza\naumenta."
    de: "Tritt das Ziel ein- bis dreimal nacheinander. Die Härte\nder Tritte nimmt von Treffer zu Treffer zu."
    es: "Propina hasta tres patadas seguidas, la potencia de las\ncuales aumenta cada vez que acierta."
    ko: "3회 연속으로 킥을 날려\n공격한다. 기술이 맞을 때마다\n위력이 올라간다."
    zh_simp: "连续３次踢对手进行攻击。\n每踢中一次，威力就会提高。"
    zh_trad: "連續踢對手３次進行攻擊。\n每踢中一次，威力就會提高。"
trop_kick:
  names:
    jp_kana: トロピカルキック
    jp_kanji: トロピカルキック
    en: Trop Kick
    fr: Botte Sucrette
    it: Tropicalcio
    de: Tropenkick
    es: Patada Tropical
    ko: 트로피컬킥
    zh_simp: 热带踢
    zh_trad: 熱帶踢
  descriptions:
    jp_kana: "南国　由来の　熱い\nキックを　相手に　浴びせる。\n相手の　攻撃を　さげる。"
    jp_kanji: "南国　由来の　熱い\nキックを　相手に　浴びせる。\n相手の　攻撃を　さげる。"
    en: "The user lands an intense kick of tropical origins on\nthe target. This also lowers the target’s Attack stat."
    fr: "Un coup de pied chaud comme les tropiques qui inflige\ndes dégâts à la cible et baisse son Attaque."
    it: "Sfruttando una tecnica originaria dei paesi tropicali,\nil Pokémon sferra un potente calcio contro il bersaglio\ne ne riduce l’Attacco."
    de: "Der Anwender greift das Ziel mit einem heftigen\nTritt tropischer Herkunft an. Dabei sinkt auch der\nAngriffs-Wert des Zieles."
    es: "Lanza una patada con la fuerza del trópico que golpea\nal objetivo y reduce su Ataque."
    ko: "남쪽 나라에서 유래된\n뜨거운 킥을 상대에게 날린다.\n상대의 공격을 떨어뜨린다."
    zh_simp: "向对手使出来自南国的火热脚踢。\n从而降低对手的攻击。"
    zh_trad: "向對手使出來自南國的火熱腳踢。\n進而降低對手的攻擊。"
trump_card:
  names:
    jp_kana: きりふだ
    jp_kanji: きりふだ
    en: Trump Card
    fr: Atout
    it: Asso
    de: Trumpfkarte
    es: As Oculto
    ko: 마지막수단
    zh_simp: 王牌
    zh_trad: 王牌
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
twin_beam:
  names:
    jp_kana: ツインビーム
    jp_kanji: ツインビーム
    en: Twin Beam
    fr: Double Laser
    it: Doppioraggio
    de: Doppelstrahl
    es: Láser Doble
    ko: 트윈빔
    zh_simp: 双光束
    zh_trad: 雙光束
  descriptions:
    jp_kana: "両目から　不可思議な\n光線を　発射して　攻撃する。\n２回連続で　ダメージを　与える。"
    jp_kanji: "両目から　不可思議な\n光線を　発射して　攻撃する。\n２回連続で　ダメージを　与える。"
    en: "The user shoots mystical beams from its eyes to inflict\ndamage. The target is hit twice in a row."
    fr: "Le lanceur projette d’étranges rayons lumineux avec\nses yeux et inflige des dégâts deux fois d’affilée."
    it: "Il Pokémon attacca il bersaglio con misteriosi raggi\ndi luce emessi dagli occhi che infliggono danni due\nvolte di fila."
    de: "Der Anwender greift mit übernatürlichen Lichtstrahlen\nan, die er aus seinen Augen abfeuert, und trifft das Ziel\nzweimal hintereinander."
    es: "Ataca emitiendo dos misteriosos haces lumínicos por los\nojos que infligen daño dos veces seguidas."
    ko: "두 눈에서 불가사의한\n광선을 발사해서 공격한다.\n2회 연속으로 데미지를 준다."
    zh_simp: "从两眼发射出神奇的光线攻击。\n连续２次给予伤害。"
    zh_trad: "從雙眼發射不可思議的\n光線進行攻擊。\n連續２次給予傷害。"
twineedle:
  names:
    jp_kana: ダブルニードル
    jp_kanji: ダブルニードル
    en: Twineedle
    fr: Double Dard
    it: Doppio Ago
    de: Duonadel
    es: Doble Ataque
    ko: 더블니들
    zh_simp: 双针
    zh_trad: 雙針
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
