blast_burn:
  names:
    jp_kana: ブラストバーン
    jp_kanji: ブラストバーン
    en: Blast Burn
    fr: Rafale Feu
    it: Incendio
    de: Lohekanonade
    es: Anillo Ígneo
    ko: 블라스트번
    zh_simp: 爆炸烈焰
    zh_trad: 爆炸烈焰
  descriptions:
    jp_kana: "爆発の　炎で\n相手を　焼きつくして　攻撃する。\n次の　ターンは　動けなくなる。"
    jp_kanji: "爆発の　炎で\n相手を　焼きつくして　攻撃する。\n次の　ターンは　動けなくなる。"
    en: "The target is razed by a fiery explosion. The user can’t\nmove on the next turn."
    fr: "Une explosion ardente consume la cible.\nLe lanceur doit se reposer au tour suivant."
    it: "Il Pokémon attacca incenerendo il bersaglio con\nle fiamme di una potente esplosione, ma al turno\nsuccessivo non può muoversi."
    de: "Das Ziel wird von einer starken Explosion getroffen.\nAnwender setzt eine Runde aus."
    es: "Calcina al objetivo con una explosión de fuego.\nEl usuario deberá descansar en el siguiente turno."
    ko: "폭발하는 불꽃으로\n상대를 태워서 공격한다.\n다음 턴은 움직일 수 없다."
    zh_simp: "用爆炸的火焰\n烧尽对手进行攻击。\n下一回合自己将无法动弹。"
    zh_trad: "用爆炸的火焰\n燒盡對手進行攻擊。\n下一回合自己將無法動彈。"
blaze_kick:
  names:
    jp_kana: ブレイズキック
    jp_kanji: ブレイズキック
    en: Blaze Kick
    fr: Pied Brûleur
    it: Calciardente
    de: Feuerfeger
    es: Patada Ígnea
    ko: 블레이즈킥
    zh_simp: 火焰踢
    zh_trad: 火焰踢
  descriptions:
    jp_kana: "攻撃した　相手を\nやけど状態に　することが　ある。\n急所にも　当たりやすい。"
    jp_kanji: "攻撃した　相手を\nやけど状態に　することが　ある。\n急所にも　当たりやすい。"
    en: "The user launches a kick that has a heightened chance of\nlanding a critical hit. This may also leave the target with\na burn."
    fr: "Le lanceur envoie un coup de pied au taux de critiques\nélevé. Peut aussi brûler la cible."
    it: "Il Pokémon attacca il bersaglio e può anche scottarlo.\nProbabile brutto colpo."
    de: "Starker Tritt mit hoher Volltrefferquote. Verursacht\neventuell Verbrennungen."
    es: "Patada que suele asestar un golpe crítico y puede causar\nquemaduras."
    ko: "공격한 상대를\n화상 상태로 만들 때가 있다.\n급소에도 맞기 쉽다."
    zh_simp: "攻击对手后，\n有时会使其陷入灼伤状态。\n也容易击中要害。"
    zh_trad: "有時會讓受到攻擊的對手\n陷入灼傷狀態。\n且容易擊中要害。"
blazing_torque:
  names:
    jp_kana: バーンアクセル
    jp_kanji: バーンアクセル
    en: Blazing Torque
    fr: Crash Brûlant
    it: Turboustione
    de: Hitzeturbo
    es: Pirochoque
    ko: 번액셀
    zh_simp: 灼热暴冲
    zh_trad: 灼熱暴衝
  descriptions:
    jp_kana: "―\n―\n―"
    jp_kanji: "―\n―\n―"
    en: "-\n-\n-"
    fr: "-\n-\n-"
    it: "―\n―\n―"
    de: ー
    es: "-\n-\n-"
    ko: "―\n―\n―"
    zh_simp: "―\n―\n―"
    zh_trad: "―\n―\n―"
bleakwind_storm:
  names:
    jp_kana: こがらしあらし
    jp_kanji: こがらしあらし
    en: Bleakwind Storm
    fr: Typhon Hivernal
    it: Tempesta Boreale
    de: Polarorkan
    es: Vendaval Gélido
    ko: 찬바람폭풍
    zh_simp: 枯叶风暴
    zh_trad: 枯葉風暴
  descriptions:
    jp_kana: "身も心も　震える　冷たく\n激しい風で　攻撃する。\n相手の　素早さを　さげることが　ある。"
    jp_kanji: "身も心も　震える　冷たく\n激しい風で　攻撃する。\n相手の　素早さを　さげることが　ある。"
    en: "The user attacks with savagely cold winds that cause\nboth body and spirit to tremble. This may also lower the\nSpeed stats of opposing Pokémon."
    fr: "Le lanceur déclenche un typhon froid et brutal qui fait\ntrembler le cœur et le corps de la cible, ce qui peut\naussi baisser sa Vitesse."
    it: "Il Pokémon attacca il bersaglio con venti gelidi e\nsferzanti che lo fanno tremare anima e corpo.\nPuò anche ridurne la Velocità."
    de: "Der Anwender greift mit starken, kalten Winden an,\ndie Körper und Geist erzittern lassen. Senkt eventuell\ndie Initiative gegnerischer Pokémon."
    es: "Ataca con un viento muy frío que estremece el cuerpo y\nla mente y que, además, puede reducir la Velocidad del\nobjetivo."
    ko: "심신을 모두 떨게 만드는\n차갑고도 거친 바람으로 공격한다.\n상대의 스피드를 떨어뜨릴 때가 있다."
    zh_simp: "用足以让身心都止不住颤抖的\n冰冷狂风进行攻击。\n有时会降低对手的速度。"
    zh_trad: "用足以讓身心都止不住顫抖的\n冰冷狂風進行攻擊。\n有時會降低對手的速度。"
blizzard:
  names:
    jp_kana: ふぶき
    jp_kanji: ふぶき
    en: Blizzard
    fr: Blizzard
    it: Bora
    de: Blizzard
    es: Ventisca
    ko: 눈보라
    zh_simp: 暴风雪
    zh_trad: 暴風雪
  descriptions:
    jp_kana: "激しい　吹雪を\n相手に　吹きつけて　攻撃する。\nこおり状態に　することが　ある。"
    jp_kanji: "激しい　吹雪を\n相手に　吹きつけて　攻撃する。\nこおり状態に　することが　ある。"
    en: "A howling blizzard is summoned to strike opposing\nPokémon. This may also leave the opposing Pokémon\nfrozen."
    fr: "Une violente tempête de neige s’abat sur la cible,\nce qui peut aussi la geler."
    it: "Il Pokémon attacca il bersaglio con una tremenda\ntempesta di ghiaccio che può anche congelarlo."
    de: "Ein Schneesturm wütet, der gegnerische Pokémon\neinfrieren kann."
    es: Tormenta de hielo que puede llegar a congelar.
    ko: "세찬 눈보라를\n상대에게 내뿜어 공격한다.\n얼음 상태로 만들 때가 있다."
    zh_simp: "将猛烈的暴风雪\n刮向对手进行攻击。\n有时会让对手陷入冰冻状态。"
    zh_trad: "將猛烈的暴風雪\n吹向對手進行攻擊。\n有時會讓對手陷入冰凍狀態。"
block:
  names:
    jp_kana: とおせんぼう
    jp_kanji: とおせんぼう
    en: Block
    fr: Barrage
    it: Blocco
    de: Rückentzug
    es: Bloqueo
    ko: 블록
    zh_simp: 挡路
    zh_trad: 擋路
  descriptions:
    jp_kana: "両手を　ひろげて　たちはだかり\n相手の　逃げ道を　ふさいで\n逃げられなくする。"
    jp_kanji: "両手を　ひろげて　たちはだかり\n相手の　逃げ道を　ふさいで\n逃げられなくする。"
    en: "The user blocks the target’s way with arms spread wide\nto prevent the target from fleeing."
    fr: "Le lanceur bloque la route de la cible pour empêcher\nsa fuite."
    it: "Il Pokémon sbarra la strada al bersaglio impedendogli\ndi lasciare il campo."
    de: "Der Anwender breitet seine Arme aus, um dem Ziel den\nFluchtweg zu versperren und es so an der Flucht\nbeziehungsweise am Auswechseln zu hindern."
    es: "Le corta el paso al objetivo para que no pueda huir ni\nser cambiado por otro."
    ko: "양팔을 벌리고 서서\n상대의 도주로를 가로막아\n도망칠 수 없게 한다."
    zh_simp: "张开双手进行阻挡，\n封住对手的退路，\n使其不能逃走。"
    zh_trad: "張開雙手進行阻擋，\n封住對手的退路，\n讓對手無法逃走。"
blood_moon:
  names:
    jp_kana: ブラッドムーン
    jp_kanji: ブラッドムーン
    en: Blood Moon
    fr: Lune Rouge
    it: Luna Rossa
    de: Blutmond
    es: Luna Roja
    ko: 블러드문
    zh_simp: 血月
    zh_trad: 血月
  descriptions:
    jp_kana: "血のように　赤い満月から\nありったけの　気迫を　撃ちだす。\nこの技は　２回連続で　だせない。"
    jp_kanji: "血のように　赤い満月から\nありったけの　気迫を　撃ちだす。\nこの技は　２回連続で　だせない。"
    en: "The user unleashes the full brunt of its spirit from a full\nmoon that shines as red as blood. This move can’t be\nused twice in a row."
    fr: "Le lanceur concentre toute son énergie dans la lune\nrouge sang sur son front et la projette sur la cible. Cette\ncapacité ne peut pas être utilisée deux fois d’affilée."
    it: "Il Pokémon attacca rilasciando tutta la sua energia,\nconfluita in una luna piena rossa come il sangue.\nQuesta mossa non può essere usata due volte di fila."
    de: "Der Anwender entfesselt eine gewaltige Energieladung\naus einem blutroten Vollmond. Diese Attacke kann nicht\nzweimal in Folge eingesetzt werden."
    es: "Ataca canalizando toda su fuerza y proyectándola\na través de una luna llena de color rojo intenso.\nEste movimiento no puede usarse dos veces seguidas."
    ko: "피와 같이 붉은 보름달에서\n혼신의 기백을 발사한다.\n이 기술은 2회 연속으로 쓸 수 없다."
    zh_simp: "从赤红如血的满月\n发射出全部的气势。\n这个招式无法连续使出２次。"
    zh_trad: "從鮮血般赤紅的滿月\n發射出渾身的氣勢。\n這個招式無法連續２次使用。"
