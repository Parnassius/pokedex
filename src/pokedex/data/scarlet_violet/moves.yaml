    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
grass_knot:
  names:
    jp_kana: くさむすび
    jp_kanji: くさむすび
    en: Grass Knot
    fr: Nœud Herbe
    it: Laccioerboso
    de: Strauchler
    es: Hierba Lazo
    ko: 풀묶기
    zh_simp: 打草结
    zh_trad: 打草結
  descriptions:
    jp_kana: "草を　からませて　相手を\n転ばせる。相手が　重いほど\n威力が　あがる。"
    jp_kanji: "草を　からませて　相手を\n転ばせる。相手が　重いほど\n威力が　あがる。"
    en: "The user snares the target with grass and trips it.\nThe heavier the target, the greater the move’s power."
    fr: "Le lanceur fait des nœuds dans l’herbe pour faire\ntrébucher la cible. Plus la cible est lourde, plus\nla puissance de cette capacité augmente."
    it: "Il Pokémon intrappola il bersaglio con l’erba e lo\nfa cadere. Più il bersaglio è pesante, maggiore è\nla potenza della mossa."
    de: "Ziel wird durch Gras ins Straucheln gebracht.\nJe schwerer das Ziel, desto mehr Schaden."
    es: "Enreda al objetivo con hierba y lo derriba. Cuanto\nmás pesado es el objetivo, más potencia tiene el\nmovimiento."
    ko: "풀을 휘감아서 상대를\n쓰러뜨린다. 상대가 무거울수록\n위력이 올라간다."
    zh_simp: "用草缠住并绊倒对手。\n对手越重，威力越大。"
    zh_trad: "用打結的草絆倒對手。\n對手越重，威力越大。"
grass_pledge:
  names:
    jp_kana: くさのちかい
    jp_kanji: くさのちかい
    en: Grass Pledge
    fr: Aire d’Herbe
    it: Erbapatto
    de: Pflanzensäulen
    es: Voto Planta
    ko: 풀의맹세
    zh_simp: 草之誓约
    zh_trad: 草之誓約
  descriptions:
    jp_kana: "草の柱で　攻撃する。\nみずと　組みあわせると　威力が\nあがって　あたりが　湿原に　なる。"
    jp_kanji: "草の柱で　攻撃する。\nみずと　組みあわせると　威力が\nあがって　あたりが　湿原に　なる。"
    en: "A column of grass hits the target. When used with its\nwater counterpart, this move’s power is boosted and\na vast swamp appears."
    fr: "Une masse végétale s’abat sur la cible. Si cette capacité\nest utilisée en même temps qu’Aire d’Eau, la puissance\naugmente et un marécage apparaît."
    it: "Il Pokémon attacca il bersaglio con una colonna\nd’erba. Se usata con Acquapatto, la potenza\naumenta e il campo diventa una palude."
    de: "Ein Angriff mit Pflanzensäulen. Mit Wassersäulen\nkombiniert steigt die Wirkung und die Umgebung\nwird zu einem Sumpf."
    es: "Ataca con columnas de hojas. Combinado con\nVoto Agua, crea un pantano y aumenta su potencia."
    ko: "풀기둥으로 공격한다.\n물과 조합하면 위력이\n올라가고 주변이 습지초원이 된다."
    zh_simp: "用草柱进行攻击。\n如果和水组合，威力就会提高，\n周围会变成湿地。"
    zh_trad: "用草柱進行攻擊。\n和水之誓約同時使用時，威力會提高，\n周圍會變成濕地。"
grass_whistle:
  names:
    jp_kana: くさぶえ
    jp_kanji: くさぶえ
    en: Grass Whistle
    fr: Siffl’Herbe
    it: Meloderba
    de: Grasflöte
    es: Silbato
    ko: 풀피리
    zh_simp: 草笛
    zh_trad: 草笛
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
grassy_glide:
  names:
    jp_kana: グラススライダー
    jp_kanji: グラススライダー
    en: Grassy Glide
    fr: Gliss’Herbe
    it: Erboscivolata
    de: Grasrutsche
    es: Fitoimpulso
    ko: 그래스슬라이더
    zh_simp: 青草滑梯
    zh_trad: 青草滑梯
  descriptions:
    jp_kana: "地面を　滑るように　相手を　攻撃。\nグラスフィールドの時\n必ず　先制攻撃　できる。"
    jp_kanji: "地面を　滑るように　相手を　攻撃。\nグラスフィールドの時\n必ず　先制攻撃　できる。"
    en: "Gliding on the ground, the user attacks the target.\nThis move always goes first on Grassy Terrain."
    fr: "Le lanceur attaque la cible en glissant sur le terrain.\nFrappe toujours en priorité si un champ herbu est actif."
    it: "Il Pokémon attacca il bersaglio scivolando sul terreno.\nSe usato quando è attivo un Campo Erboso, questo\nattacco ha priorità alta."
    de: "Der Anwender rutscht über den Boden und greift das\nZiel an. Ermöglicht den Erstschlag, wenn ein Grasfeld\naktiv ist."
    es: "Ataca al objetivo deslizándose sobre el terreno de\ncombate. Este movimiento tiene prioridad alta cuando\nel terreno está cubierto por un campo de hierba."
    ko: "지면에 미끄러지듯 상대를 공격한다.\n그래스필드일 때\n반드시 선제공격할 수 있다."
    zh_simp: "仿佛在地面上滑行般地攻击对手。\n在青草场地上，\n必定能够先制攻击。"
    zh_trad: "在地面上滑行般地攻擊對手。\n在青草場地時，\n必定能夠發動先制攻擊。"
grassy_terrain:
  names:
    jp_kana: グラスフィールド
    jp_kanji: グラスフィールド
    en: Grassy Terrain
    fr: Champ Herbu
    it: Campo Erboso
    de: Grasfeld
    es: Campo de Hierba
    ko: 그래스필드
    zh_simp: 青草场地
    zh_trad: 青草場地
  descriptions:
    jp_kana: "５ターンの　間　グラスフィールドにする。\n地面にいると　毎ターン　回復する。\nくさタイプの　威力が　あがる。"
    jp_kanji: "５ターンの　間　グラスフィールドにする。\n地面にいると　毎ターン　回復する。\nくさタイプの　威力が　あがる。"
    en: "The user turns the ground into Grassy Terrain for five\nturns. This restores the HP of Pokémon on the ground a\nlittle every turn and powers up Grass-type moves."
    fr: "Pendant cinq tours, les Pokémon au sol récupèrent\nquelques PV à chaque tour et la puissance\ndes capacités de type Plante augmente."
    it: "Per cinque turni il terreno entra nello stato di Campo\nErboso: i Pokémon a terra recuperano PS a ogni turno\ne la potenza delle mosse di tipo Erba aumenta."
    de: "Regeneriert fünf Runden lang in jeder neuen Runde\nein paar KP aller Pokémon, die den Boden berühren.\nErhöht die Stärke von Pflanzen-Attacken."
    es: "Durante cinco turnos, se potencian los movimientos de\ntipo Planta y los Pokémon que están en contacto con el\nsuelo recuperan PS en cada turno."
    ko: "5턴 동안 그래스필드로 만든다.\n땅에 있으면 매 턴 회복한다.\n풀타입의 위력이 올라간다."
    zh_simp: "在５回合内变成青草场地。\n地面上的宝可梦每回合都能回复。\n草属性的招式威力还会提高。"
    zh_trad: "在５回合內將腳下變成青草場地。\n地面上的寶可夢每回合都會回復ＨＰ。\n草屬性招式的威力會提高。"
grav_apple:
  names:
    jp_kana: Ｇのちから
    jp_kanji: Ｇのちから
    en: Grav Apple
    fr: Force G
    it: Forza G
    de: Gravitation
    es: Fuerza G
    ko: G의힘
    zh_simp: 万有引力
    zh_trad: 萬有引力
  descriptions:
    jp_kana: "高いところから　りんごを　落として\nダメージを　与える。\n相手の　防御を　下げる。"
    jp_kanji: "高いところから　りんごを　落として\nダメージを　与える。\n相手の　防御を　下げる。"
    en: "The user inflicts damage by dropping an apple from\nhigh above. This also lowers the target’s Defense stat."
    fr: "Le lanceur fait tomber une pomme de très haut sur\nla cible, ce qui baisse la Défense de celle-ci."
    it: "Il Pokémon fa cadere una mela sul bersaglio da una\ngrande altezza, infliggendogli danni e riducendone\nla Difesa."
    de: "Ein Apfel fällt aus großer Höhe herab und richtet\nSchaden an. Dabei wird die Verteidigung des Zieles\ngesenkt."
    es: "El usuario ataca haciendo caer una manzana desde gran\naltura. Reduce la Defensa del objetivo."
    ko: "높은 곳에서 사과를 떨어뜨려서\n데미지를 준다.\n상대의 방어를 떨어뜨린다."
    zh_simp: "从高处落下苹果，\n给予对手伤害。\n可降低对手的防御。"
    zh_trad: "讓蘋果從高處落下，\n給予對手傷害。\n可降低對手的防禦。"
gravity:
  names:
    jp_kana: じゅうりょく
    jp_kanji: じゅうりょく
    en: Gravity
    fr: Gravité
    it: Gravità
    de: Erdanziehung
    es: Gravedad
    ko: 중력
    zh_simp: 重力
    zh_trad: 重力
  descriptions:
    jp_kana: "５ターンの間　ふゆうや　ひこうタイプに\nじめんタイプの　技が　当たるようになる。\n空中に　飛ぶ　技も　使えない。"
    jp_kanji: "５ターンの間　ふゆうや　ひこうタイプに\nじめんタイプの　技が　当たるようになる。\n空中に　飛ぶ　技も　使えない。"
    en: "Enables Flying types or Pokémon with the Levitate\nAbility to be hit by Ground-type moves for five turns.\nMoves that involve flying can’t be used."
    fr: "Pendant cinq tours, les Pokémon Vol ou qui ont\nLévitation deviennent sensibles aux capacités Sol,\net les capacités volantes deviennent inutilisables."
    it: "Per cinque turni i Pokémon con Levitazione o di tipo\nVolante sono vulnerabili alle mosse di tipo Terra.\nNon è possibile usare mosse che fanno volare."
    de: "Ermöglicht es, Flug-Pokémon oder Pokémon mit der\nFähigkeit Schwebe mit Boden-Attacken zu treffen.\nVerhindert Attacken, bei denen der Anwender fliegt."
    es: "Durante cinco turnos, se anulan los movimientos que\nalzan el vuelo y los Pokémon de tipo Volador o que\nlevitan son vulnerables a movimientos de tipo Tierra."
    ko: "5턴 동안 부유나 비행타입에\n땅타입의 기술이 맞게 된다.\n공중으로 나는 기술도 사용할 수 없다."
    zh_simp: "在５回合内，飘浮特性和飞行属性的\n宝可梦会被地面属性的招式击中。\n飞向空中的招式也将无法使用。"
    zh_trad: "在５回合內，飄浮特性和飛行屬性的\n寶可夢會被地面屬性的招式擊中。\n且無法使用飛向空中的招式。"
growl:
  names:
    jp_kana: なきごえ
    jp_kanji: なきごえ
    en: Growl
    fr: Rugissement
    it: Ruggito
    de: Heuler
    es: Gruñido
    ko: 울음소리
    zh_simp: 叫声
    zh_trad: 叫聲
  descriptions:
    jp_kana: "かわいい　なきごえを　聞かせて\n気を　ひき　油断を　させて\n相手の　攻撃を　さげる。"
    jp_kanji: "かわいい　なきごえを　聞かせて\n気を　ひき　油断を　させて\n相手の　攻撃を　さげる。"
    en: "The user growls in an endearing way, making opposing\nPokémon less wary. This lowers their Attack stats."
    fr: "Le lanceur pousse un cri tout mimi pour tromper\nla vigilance de la cible et baisser son Attaque."
    it: "Il Pokémon distrae gli avversari con un tenero ruggito\ne ne riduce l’Attacco."
    de: "Der Anwender heult herzzerreißend, um gegnerische\nPokémon nachlässig werden zu lassen und deren\nAngriffs-Wert zu senken."
    es: "Dulce gruñido que distrae al objetivo para que baje\nla guardia y reduce su Ataque."
    ko: "귀여운 울음소리를 들려주고\n관심을 끌어 방심한 사이에\n상대의 공격을 떨어뜨린다."
    zh_simp: "让对手听可爱的叫声，\n引开注意力使其疏忽，\n从而降低对手的攻击。"
    zh_trad: "發出可愛的叫聲，\n誘使對手疏忽大意，\n降低對手的攻擊。"
growth:
  names:
    jp_kana: せいちょう
    jp_kanji: せいちょう
    en: Growth
    fr: Croissance
    it: Crescita
    de: Wachstum
    es: Desarrollo
    ko: 성장
    zh_simp: 生长
    zh_trad: 生長
  descriptions:
    jp_kana: "体を　一気に\n大きく　生長させて\n攻撃と　特攻を　あげる。"
    jp_kanji: "体を　一気に\n大きく　生長させて\n攻撃と　特攻を　あげる。"
    en: "The user’s body grows all at once, boosting the Attack\nand Sp. Atk stats."
    fr: "Le corps du lanceur se développe.\nAugmente l’Attaque et l’Attaque Spéciale."
    it: "Provoca la crescita immediata del corpo\ne l’aumento dell’Attacco e dell’Attacco Speciale\ndi chi la usa."
    de: "Der Körper wächst. Dadurch steigen Angriff und\nSpezial-Angriff."
    es: "Hace que su cuerpo crezca a marchas forzadas, con lo\nque aumenta su Ataque y su Ataque Especial."
    ko: "몸을 단숨에 크게 성장시켜\n공격과 특수공격을 올린다."
    zh_simp: "让身体一下子长大，\n从而提高攻击和特攻。"
    zh_trad: "讓身體瞬間長大，\n提高自己的攻擊和特攻。"
grudge:
  names:
    jp_kana: おんねん
    jp_kanji: おんねん
    en: Grudge
    fr: Rancune
    it: Rancore
    de: Nachspiel
    es: Rabia
    ko: 원념
    zh_simp: 怨念
    zh_trad: 怨念
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
guard_split:
  names:
    jp_kana: ガードシェア
    jp_kanji: ガードシェア
    en: Guard Split
    fr: Partage Garde
    it: Paridifesa
    de: Schutzteiler
    es: Isoguardia
    ko: 가드셰어
    zh_simp: 防守平分
    zh_trad: 防守平分
  descriptions:
    jp_kana: "超能力で　自分と　相手の\n防御と　特防を　たして\n半分に　わける。"
    jp_kanji: "超能力で　自分と　相手の\n防御と　特防を　たして\n半分に　わける。"
    en: "The user employs its psychic power to average its\nDefense and Sp. Def stats with those of the target."
    fr: "Additionne la Défense et la Défense Spéciale\ndu lanceur et de sa cible et les redistribue\néquitablement entre les deux."
    it: "Il Pokémon sfrutta la sua forza psichica per sommare\nDifesa e Difesa Speciale a quelle del bersaglio e\ndividerle equamente."
    de: "Durch Psycho-Kräfte werden Verteidigung und\nSpezial-Verteidigung des Anwenders und des\nZieles addiert und in zwei gleiche Hälften geteilt."
    es: "El usuario emplea sus poderes para hacer la media de\nsu Defensa y su Defensa Especial con las del objetivo y\ncompartirlas."
    ko: "초능력으로 자신과 상대의\n방어와 특수방어를 더해서\n반으로 나눈다."
    zh_simp: "利用超能力将自己和对手的\n防御和特防相加，\n再进行平分。"
    zh_trad: "用超能力將自己和對手的\n防禦和特防各別相加後，\n再進行平分。"
guard_swap:
  names:
    jp_kana: ガードスワップ
    jp_kanji: ガードスワップ
    en: Guard Swap
    fr: Permugarde
    it: Barattoscudo
    de: Schutztausch
    es: Cambiadefensa
    ko: 가드스왑
    zh_simp: 防守互换
    zh_trad: 防守互換
  descriptions:
    jp_kana: "超能力で　自分と　相手の\n防御と　特防の\n能力変化を　入れ替える。"
    jp_kanji: "超能力で　自分と　相手の\n防御と　特防の\n能力変化を　入れ替える。"
    en: "The user employs its psychic power to switch changes to\nits Defense and Sp. Def stats with the target."
    fr: "Le lanceur utilise un pouvoir psychique qui échange\nles changements de sa Défense et de sa Défense\nSpéciale avec celles de la cible."
    it: "Il Pokémon sfrutta la sua forza psichica per scambiare\nle modifiche a Difesa e Difesa Speciale con il bersaglio."
    de: "Psychische Kräfte tauschen Änderungen an Verteidigung\nund Spezial-Verteidigung mit denen des Zieles."
    es: "El usuario emplea su poder mental para intercambiar\nlos cambios en la Defensa y la Defensa Especial con\nel objetivo."
    ko: "초능력으로 자신과 상대의\n방어와 특수방어의\n능력 변화를 교체한다."
    zh_simp: "利用超能力互换\n自己和对手的防御\n以及特防的能力变化。"
    zh_trad: "用超能力將自己和對手的\n防禦與特防的能力變化互相交換。"
guardian_of_alola:
  names:
    jp_kana: ガーディアン・デ・アローラ
    jp_kanji: ガーディアン・デ・アローラ
    en: Guardian of Alola
    fr: Colère du Gardien d’Alola
    it: Collera del Guardiano
    de: Alolas Wächter
    es: Cólera del Guardián
    ko: 알로라의수호자
    zh_simp: 巨人卫士・阿罗拉
    zh_trad: 巨人衛士・阿羅拉
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
guillotine:
  names:
    jp_kana: ハサミギロチン
    jp_kanji: ハサミギロチン
    en: Guillotine
    fr: Guillotine
    it: Ghigliottina
    de: Guillotine
    es: Guillotina
    ko: 가위자르기
    zh_simp: 极落钳
    zh_trad: 斷頭鉗
  descriptions:
    jp_kana: "大きな　ハサミで\n相手を　切り裂いて　攻撃する。\n当たれば　一撃で　ひんしに　する。"
    jp_kanji: "大きな　ハサミで\n相手を　切り裂いて　攻撃する。\n当たれば　一撃で　ひんしに　する。"
    en: "A vicious tearing attack with big pincers. The target\nfaints instantly if this attack hits."
    fr: "Des pinces lacèrent violemment la cible, la mettant\nK.O. sur le coup si elle est touchée."
    it: "Il Pokémon attacca il bersaglio con pericolose tenaglie.\nSe la mossa va a segno, il Pokémon colpito va KO."
    de: "Ein Angriff mit einer großen Schere. Trifft die Attacke,\nführt sie beim Ziel sofort zum K.O."
    es: "Ataque cortante con grandes pinzas que fulmina al\nobjetivo de un solo golpe si acierta."
    ko: "큰 집게로\n상대를 베어 갈라 공격한다.\n맞으면 일격에 기절한다."
    zh_simp: "用大钳子或剪刀等\n夹断对手进行攻击。\n只要命中就会一击昏厥。"
    zh_trad: "用巨大的鉗子或剪刀等\n撕裂對手進行攻擊。\n只要命中就會一擊瀕死。"
gunk_shot:
  names:
    jp_kana: ダストシュート
    jp_kanji: ダストシュート
    en: Gunk Shot
    fr: Détricanon
    it: Sporcolancio
    de: Mülltreffer
    es: Lanzamugre
    ko: 더스트슈트
    zh_simp: 垃圾射击
    zh_trad: 垃圾射擊
  descriptions:
    jp_kana: "汚い　ゴミを\n相手に　ぶつけて　攻撃する。\n毒状態に　することが　ある。"
    jp_kanji: "汚い　ゴミを\n相手に　ぶつけて　攻撃する。\n毒状態に　することが　ある。"
    en: "The user shoots filthy garbage at the target to attack.\nThis may also poison the target."
    fr: "Le lanceur envoie des détritus sur la cible, ce qui peut\naussi l’empoisonner."
    it: "Il Pokémon attacca con rifiuti sudici che possono anche\navvelenare il bersaglio."
    de: "Anwender schießt mit Müll auf das Ziel. Vergiftet dieses\neventuell."
    es: "Lanza contra el objetivo basura asquerosa y puede\nenvenenarlo."
    ko: "더러운 쓰레기를\n상대에게 부딪쳐서 공격한다.\n독 상태로 만들 때가 있다."
    zh_simp: "用肮脏的垃圾\n撞向对手进行攻击。\n有时会让对手陷入中毒状态。"
    zh_trad: "將骯髒的垃圾\n丟向對手進行攻擊。\n有時會讓對手陷入中毒狀態。"
gust:
  names:
    jp_kana: かぜおこし
    jp_kanji: かぜおこし
    en: Gust
    fr: Tornade
    it: Raffica
    de: Windstoß
    es: Tornado
    ko: 바람일으키기
    zh_simp: 起风
    zh_trad: 起風
  descriptions:
    jp_kana: "翼で　おこした　激しい　風を\n相手に　ぶつけて　攻撃する。"
    jp_kanji: "翼で　おこした　激しい　風を\n相手に　ぶつけて　攻撃する。"
    en: "A gust of wind is whipped up by wings and launched\nat the target to inflict damage."
    fr: "Le lanceur bat des ailes pour générer une bourrasque\nqui blesse la cible."
    it: "Il Pokémon attacca il bersaglio con una folata di vento\nsollevata dalle ali."
    de: "Trifft das Ziel mit einem Windstoß, den es mit seinen\nFlügeln erzeugt."
    es: "Crea un tornado con las alas y lo lanza contra el\nobjetivo."
    ko: "날개로 일으킨 격한 바람을\n상대에게 부딪쳐서 공격한다."
    zh_simp: "用翅膀将刮起的狂风\n袭向对手进行攻击。"
    zh_trad: "用翅膀刮起狂風，\n吹向對手進行攻擊。"
gyro_ball:
  names:
    jp_kana: ジャイロボール
    jp_kanji: ジャイロボール
    en: Gyro Ball
    fr: Gyroballe
    it: Vortexpalla
    de: Gyroball
    es: Giro Bola
    ko: 자이로볼
    zh_simp: 陀螺球
    zh_trad: 陀螺球
  descriptions:
    jp_kana: "体を　高速に　回転させて\n体当たりする。相手より　素早さが\n低いほど　強い。"
    jp_kanji: "体を　高速に　回転させて\n体当たりする。相手より　素早さが\n低いほど　強い。"
    en: "The user tackles the target with a high-speed spin.\nThe slower the user is than the target, the greater\nthe move’s power."
    fr: "Le lanceur effectue une rotation rapide et frappe\nla cible. Plus la Vitesse du lanceur est basse par\nrapport à celle de la cible, plus il inflige de dégâts."
    it: "Il Pokémon si scaglia sul bersaglio facendo ruotare\nvorticosamente il proprio corpo. Più è lento rispetto\nal bersaglio, più è forte."
    de: "Angriff mit hoher Geschwindigkeit. Je niedriger die\nInitiative des Anwenders im Vergleich zum Ziel ist,\ndesto höher der Schaden."
    es: "Embiste al objetivo con un potente ataque giratorio.\nCuanto menor es la Velocidad del usuario respecto a\nla del objetivo, más daño causa."
    ko: "몸을 고속으로 회전시켜\n몸통박치기한다. 상대보다 스피드가\n낮을수록 위력은 올라간다."
    zh_simp: "让身体高速旋转并撞击对手。\n速度比对手越慢，威力越大。"
    zh_trad: "高速旋轉身體，撞擊對手。\n速度比對手越慢，威力越大。"
hail:
  names:
    jp_kana: あられ
    jp_kanji: あられ
    en: Hail
    fr: Grêle
    it: Grandine
    de: Hagelsturm
    es: Granizo
    ko: 싸라기눈
    zh_simp: 冰雹
    zh_trad: 冰雹
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
hammer_arm:
  names:
    jp_kana: アームハンマー
    jp_kanji: アームハンマー
    en: Hammer Arm
    fr: Marto-Poing
    it: Martelpugno
    de: Hammerarm
    es: Machada
    ko: 암해머
    zh_simp: 臂锤
    zh_trad: 臂錘
  descriptions:
    jp_kana: "強くて　重い　こぶしを\nふるって　ダメージを　与える。\n自分の　素早さが　さがる。"
    jp_kanji: "強くて　重い　こぶしを\nふるって　ダメージを　与える。\n自分の　素早さが　さがる。"
    en: "The user swings its strong, heavy fist at the target to\ninflict damage. This also lowers the user’s Speed stat."
    fr: "Le lanceur donne un puissant coup de poing à la cible,\nce qui réduit la Vitesse du lanceur."
    it: "Il Pokémon infligge danni al bersaglio colpendolo con\nun pugno molto potente, ma la sua Velocità diminuisce."
    de: "Anwender trifft mit einem starken Hieb. Senkt Initiative\ndes Anwenders."
    es: "Propina un golpe devastador con el puño, pero reduce\nla Velocidad del usuario."
    ko: "강하고 무거운 주먹을\n휘둘러 데미지를 준다.\n자신의 스피드가 떨어진다."
    zh_simp: "挥舞强力而沉重的拳头，\n给予对手伤害。\n自己的速度会降低。"
    zh_trad: "揮出強力而沉重的拳頭，\n給予對手傷害。\n自己的速度會降低。"
happy_hour:
  names:
    jp_kana: ハッピータイム
    jp_kanji: ハッピータイム
    en: Happy Hour
    fr: Étrennes
    it: Cuccagna
    de: Goldene Zeiten
    es: Paga Extra
    ko: 해피타임
    zh_simp: 欢乐时光
    zh_trad: 歡樂時光
  descriptions:
    jp_kana: "ハッピータイムの　技を　使うと\n戦闘の　あとで　もらえる\nお金が　倍になる。"
    jp_kanji: "ハッピータイムの　技を　使うと\n戦闘の　あとで　もらえる\nお金が　倍になる。"
    en: "Using Happy Hour doubles the amount of prize money\nreceived after battle."
    fr: "Utilisée pendant un combat, multiplie par deux l’argent\ngagné à la fin."
    it: "Questa mossa raddoppia la ricompensa ricevuta\ndopo aver vinto una lotta."
    de: "Nach Einsatz der Attacke Goldene Zeiten verdoppelt\nsich das Preisgeld, das du im Falle eines Sieges\nerhältst."
    es: "Al usar este movimiento, se duplica el dinero recibido\ntras el combate."
    ko: "해피타임 기술을 쓰면\n배틀 후에 받을 수 있는\n돈이 배가 된다."
    zh_simp: "如果使用欢乐时光，\n战斗后得到的钱会翻倍。"
    zh_trad: "使用歡樂時光後，\n戰鬥結束時獲得的錢會加倍。"
hard_press:
  names:
    jp_kana: ハードプレス
    jp_kanji: ハードプレス
    en: Hard Press
    fr: Pression Extrême
    it: Pressa d’Acciaio
    de: Stahlpresse
    es: Prensa Metálica
    ko: 하드프레스
    zh_simp: 硬压
    zh_trad: 硬壓
  descriptions:
    jp_kana: "腕やハサミで　相手を　圧迫する。\n相手の　ＨＰが　残っているほど\n威力が　あがる。"
    jp_kanji: "腕やハサミで　相手を　圧迫する。\n相手の　ＨＰが　残っているほど\n威力が　あがる。"
    en: "The target is crushed with an arm, a claw, or the like to\ninflict damage. The more HP the target has left, the\ngreater the move’s power."
    fr: "Le lanceur écrase la cible avec ses bras ou ses pinces.\nPlus il reste de PV à la cible, plus la puissance\nde la capacité augmente."
    it: "Il Pokémon schiaccia il bersaglio usando i propri arti.\nPiù PS rimangono al bersaglio, maggiore è la potenza\ndella mossa."
    de: "Der Anwender nimmt das Ziel mit Armen oder Scheren\nin die Mangel. Je höher die KP des Zieles, desto stärker\ndie Attacke."
    es: "Oprime con los brazos o las pinzas. Cuantos más PS\nle queden al objetivo, mayor será la potencia del\nmovimiento."
    ko: "팔이나 집게로 상대를 압박한다.\n상대의 HP가 남아 있을수록 위력이 올라간다."
    zh_simp: "用手臂或钳子压迫对手。\n对手剩余的ＨＰ越多，\n威力越大。"
    zh_trad: "用手臂或鉗子壓迫對手。\n對手現有的ＨＰ越多，\n招式的威力越大。"
harden:
  names:
    jp_kana: かたくなる
    jp_kanji: かたくなる
    en: Harden
    fr: Armure
    it: Rafforzatore
    de: Härtner
    es: Fortaleza
    ko: 단단해지기
    zh_simp: 变硬
    zh_trad: 變硬
  descriptions:
    jp_kana: "全身に　力を　こめて\n体を　硬くして\n自分の　防御を　あげる。"
    jp_kanji: "全身に　力を　こめて\n体を　硬くして\n自分の　防御を　あげる。"
    en: "The user stiffens all the muscles in its body to boost\nits Defense stat."
    fr: "Le lanceur contracte tous ses muscles pour augmenter\nsa Défense."
    it: "Tutti i muscoli del corpo si tonificano\nper aumentare la Difesa."
    de: "Stärkt die Muskulatur und erhöht den\nVerteidigungs-Wert."
    es: "El usuario tensa su musculatura para aumentar la\nDefensa."
    ko: "전신에 힘을 주어\n몸을 단단하게 해서\n자신의 방어를 올린다."
    zh_simp: "全身使劲，让身体变硬，\n从而提高自己的防御。"
    zh_trad: "使用全身的力量讓身體硬化，\n提高自己的防禦。"
haze:
  names:
    jp_kana: くろいきり
    jp_kanji: くろいきり
    en: Haze
    fr: Buée Noire
    it: Nube
    de: Dunkelnebel
    es: Niebla
    ko: 흑안개
    zh_simp: 黑雾
    zh_trad: 黑霧
  descriptions:
    jp_kana: "黒い霧を　だして　戦闘に\nでている　ポケモン　全員の\n能力変化を　もとに　もどす。"
    jp_kanji: "黒い霧を　だして　戦闘に\nでている　ポケモン　全員の\n能力変化を　もとに　もどす。"
    en: "The user creates a haze that eliminates every stat change\namong all the Pokémon engaged in battle."
    fr: "Crée un brouillard qui annule les changements\nde stats de tous les Pokémon au combat."
    it: "Il Pokémon crea una nube nera che annulla ogni modifica\nalle statistiche di tutti i Pokémon in campo."
    de: "Erzeugt einen dunklen Nebel. Alle Veränderungen der\nStatuswerte der Kampfteilnehmer werden annulliert."
    es: "Neblina oscura que elimina los cambios en las\ncaracterísticas de todos los Pokémon en combate."
    ko: "흑안개를 뿜어 배틀에\n참가 중인 포켓몬 전원의\n능력 변화를 원래대로 되돌린다."
    zh_simp: "升起黑雾，将正在场上战斗的\n全体宝可梦的能力变回原点。"
    zh_trad: "放出黑霧，讓場上全體寶可夢的\n能力變化回到初始狀態。"
head_charge:
  names:
    jp_kana: アフロブレイク
    jp_kanji: アフロブレイク
    en: Head Charge
    fr: Peignée
    it: Ricciolata
    de: Steinschädel
    es: Ariete
    ko: 아프로브레이크
    zh_simp: 爆炸头突击
    zh_trad: 爆炸頭突擊
  descriptions:
    jp_kana: "すごい　アフロの　頭で\n相手に　突進して　攻撃する。\n自分も　少し　ダメージを　受ける。"
    jp_kanji: "すごい　アフロの　頭で\n相手に　突進して　攻撃する。\n自分も　少し　ダメージを　受ける。"
    en: "The user charges its head into the target, using its\npowerful guard hair. This also damages the user a little."
    fr: "Le lanceur donne un coup avec sa tête couronnée\nd’une fière crinière. Blesse aussi légèrement le lanceur."
    it: "Il Pokémon carica il bersaglio con la testa riccioluta,\nma subisce un po’ di danni."
    de: "Rempelattacke mit ausgeflippter Retrofrisur. Anwender\nnimmt selbst leichten Schaden."
    es: "Propina un tremendo cabezazo. El usuario se hiere\nligeramente a sí mismo."
    ko: "굉장한 아프로 머리로\n상대에게 돌진하여 공격한다.\n자신도 조금 데미지를 입는다."
    zh_simp: "用厉害的爆炸头\n猛撞向对手进行攻击。\n自己也会受到少许伤害。"
    zh_trad: "用帥氣的爆炸頭\n猛撞對手進行攻擊。\n自己也會受到少許傷害。"
head_smash:
  names:
    jp_kana: もろはのずつき
    jp_kanji: もろはのずつき
    en: Head Smash
    fr: Fracass’Tête
    it: Zuccata
    de: Kopfstoß
    es: Testarazo
    ko: 양날박치기
    zh_simp: 双刃头锤
    zh_trad: 雙刃頭錘
  descriptions:
    jp_kana: "命を　懸けて　こん身の　力で\n相手に　ずつきを　する。　自分も\nものすごい　ダメージを　受ける。"
    jp_kanji: "命を　懸けて　こん身の　力で\n相手に　ずつきを　する。　自分も\nものすごい　ダメージを　受ける。"
    en: "The user attacks the target with a hazardous full-power\nheadbutt. This also damages the user terribly."
    fr: "Le lanceur assène un coup de tête désespéré,\nce qui le blesse aussi très gravement."
    it: "Il Pokémon dà una testata al bersaglio con tutta\nla potenza di cui dispone, ma subisce danni\nconsiderevoli."
    de: "Der Anwender greift unter Einsatz seines Lebens mit\neinem Kopfstoß an. Dabei nimmt er selbst enormen\nSchaden."
    es: "El usuario arriesga su vida y lanza un cabezazo con toda\nsu fuerza, pero también se hiere gravemente a sí mismo."
    ko: "목숨을 걸고 혼신의 힘으로\n상대에게 박치기를 한다.\n자신도 굉장한 데미지를 입는다."
    zh_simp: "拼命使出浑身力气，\n向对手进行头锤攻击。\n自己也会受到非常大的伤害。"
    zh_trad: "使出渾身力量，\n捨身向對手進行頭錘攻擊。\n自己也會受到非常大的傷害。"
headbutt:
  names:
    jp_kana: ずつき
    jp_kanji: ずつき
    en: Headbutt
    fr: Coup d’Boule
    it: Bottintesta
    de: Kopfnuss
    es: Golpe Cabeza
    ko: 박치기
    zh_simp: 头锤
    zh_trad: 頭錘
  descriptions:
    jp_kana: "頭を　突きだして\nまっすぐ　つっこんで　攻撃する。\n相手を　ひるませることが　ある。"
    jp_kanji: "頭を　突きだして\nまっすぐ　つっこんで　攻撃する。\n相手を　ひるませることが　ある。"
    en: "The user sticks out its head and attacks by charging\nstraight into the target. This may also make the\ntarget flinch."
    fr: "Le lanceur donne un coup de tête à la cible qui peut\naussi l’apeurer."
    it: "Il Pokémon attacca lanciandosi diritto di testa contro\nil bersaglio. Può anche farlo tentennare."
    de: "Rammt das Ziel mit einer Kopfnuss. Ziel schreckt\neventuell zurück."
    es: Potente cabezazo que puede amedrentar al objetivo.
    ko: "머리를 내밀고\n곧장 돌진하여 공격한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "将头伸出，\n笔直地扑向对手进行攻击。\n有时会使对手畏缩。"
    zh_trad: "將頭伸出，\n直直衝向對手進行攻擊。\n有時會讓對手畏縮。"
headlong_rush:
  names:
    jp_kana: ぶちかまし
    jp_kanji: ぶちかまし
    en: Headlong Rush
    fr: Assaut Frontal
    it: Scontro Frontale
    de: Schmetterramme
    es: Arremetida
    ko: 들이받기
    zh_simp: 突飞猛扑
    zh_trad: 突飛猛撲
  descriptions:
    jp_kana: "全身全霊の　たいあたりを　くらわせる。\n自分の　防御と　特防が　さがる。"
    jp_kanji: "全身全霊の　たいあたりを　くらわせる。\n自分の　防御と　特防が　さがる。"
    en: "The user smashes into the target in a full-body tackle.\nThis also lowers the user’s Defense and Sp. Def stats."
    fr: "Le lanceur charge la cible de toutes ses forces, ce qui\nbaisse la Défense et la Défense Spéciale du lanceur."
    it: "Il Pokémon si schianta sul bersaglio con tutte le forze.\nLa sua Difesa e la sua Difesa Speciale diminuiscono."
    de: "Der Anwender rammt das Ziel mit dem ganzen Körper.\nDadurch sinken die Verteidigung und Spezial-\nVerteidigung des Anwenders."
    es: "El usuario arremete con todas sus fuerzas, pero se\nreducen su Defensa y su Defensa Especial."
    ko: "온 힘을 다한 몸통박치기를 날린다.\n자신의 방어와 특수방어가 떨어진다."
    zh_simp: "向对手使出灌注了全心全力的撞击。\n自己的防御和特防会降低。"
    zh_trad: "向對手使出灌注了全心全力的撞擊。\n自己的防禦和特防會降低。"
heal_bell:
  names:
    jp_kana: いやしのすず
    jp_kanji: いやしのすず
    en: Heal Bell
    fr: Glas de Soin
    it: Rintoccasana
    de: Vitalglocke
    es: Cascabel Cura
    ko: 치료방울
    zh_simp: 治愈铃声
    zh_trad: 治癒鈴聲
  descriptions:
    jp_kana: "心地好い　鈴の　音色を　聞かせて\n味方　全員の\n状態異常を　回復　する。"
    jp_kanji: "心地好い　鈴の　音色を　聞かせて\n味方　全員の\n状態異常を　回復　する。"
    en: "The user makes a soothing bell chime to cure the status\nconditions of all its fellow party Pokémon and allies."
    fr: "Carillon apaisant qui soigne les altérations de statut\nde tous les Pokémon de l’équipe."
    it: "Il Pokémon produce uno scampanellio che cura\ni problemi di stato suoi e degli alleati."
    de: "Läutet beruhigend und heilt alle Statusprobleme\nim Team."
    es: "Tañido que cura los problemas de estado del bando\ndel usuario."
    ko: "기분 좋은 방울소리를\n들려주어 같은 편 전원의\n상태 이상을 회복한다."
    zh_simp: "让同伴听舒适的铃音，\n从而治愈我方全员的异常状态。"
    zh_trad: "發出悅耳的鈴聲，\n治癒我方全體的異常狀態。"
heal_block:
  names:
    jp_kana: かいふくふうじ
    jp_kanji: かいふくふうじ
    en: Heal Block
    fr: Anti-Soin
    it: Anticura
    de: Heilblockade
    es: Anticura
    ko: 회복봉인
    zh_simp: 回复封锁
    zh_trad: 回復封鎖
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
heal_order:
  names:
    jp_kana: かいふくしれい
    jp_kanji: かいふくしれい
    en: Heal Order
    fr: Appel Soins
    it: Comandocura
    de: Heilbefehl
    es: Auxilio
    ko: 회복지령
    zh_simp: 回复指令
    zh_trad: 回復指令
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
heal_pulse:
  names:
    jp_kana: いやしのはどう
    jp_kanji: いやしのはどう
    en: Heal Pulse
    fr: Vibra Soin
    it: Curapulsar
    de: Heilwoge
    es: Pulso Cura
    ko: 치유파동
    zh_simp: 治愈波动
    zh_trad: 治癒波動
  descriptions:
    jp_kana: "いやしのはどうを　とばして\n最大ＨＰの　半分\n相手の　ＨＰを　回復する。"
    jp_kanji: "いやしのはどうを　とばして\n最大ＨＰの　半分\n相手の　ＨＰを　回復する。"
    en: "The user emits a healing pulse that restores the target’s\nHP by up to half its max HP."
    fr: "Le lanceur projette une aura de bien-être qui fait\nrécupérer la moitié de ses PV max à la cible."
    it: "Il Pokémon lancia un’onda rilassante che fa recuperare\nal bersaglio metà dei suoi PS massimi."
    de: "Anwender löst eine Schmerzen lindernde Welle aus\nund heilt dabei das Ziel mit der Hälfte von dessen\nmaximalen KP."
    es: "Una onda curativa restaura la mitad de los PS máximos\ndel objetivo."
    ko: "치유파동을 날려서\n최대 HP의 절반만큼\n상대의 HP를 회복한다."
    zh_simp: "放出治愈波动，\n从而回复对手\n最大ＨＰ的一半。"
    zh_trad: "釋放出治癒波動，\n讓對手回復\n最大ＨＰ的一半。"
healing_wish:
  names:
    jp_kana: いやしのねがい
    jp_kanji: いやしのねがい
    en: Healing Wish
    fr: Vœu Soin
    it: Curardore
    de: Heilopfer
    es: Deseo Cura
    ko: 치유소원
    zh_simp: 治愈之愿
    zh_trad: 治癒之願
  descriptions:
    jp_kana: "自分は　ひんしに　なるが\n控えから　でてくる　ポケモンの\n状態異常と　ＨＰを　回復する。"
    jp_kanji: "自分は　ひんしに　なるが\n控えから　でてくる　ポケモンの\n状態異常と　ＨＰを　回復する。"
    en: "The user faints. In return, the Pokémon taking its place\nwill have its HP restored and status conditions cured."
    fr: "Le lanceur tombe K.O. pour soigner les altérations de\nstatut et les PV du Pokémon qui viendra le remplacer\nsur le terrain."
    it: "Il Pokémon va KO, ma chi lo sostituisce recupera tutti\ni PS e guarisce dai problemi di stato."
    de: "Anwender geht K.O. Das an seine Stelle tretende\nPokémon hat volle KP. Statusprobleme werden\ngeheilt."
    es: "El usuario se debilita, pero cura los problemas de\nestado del Pokémon que lo sustituye y restaura sus PS."
    ko: "자신은 기절하지만\n교대하여 나오는 포켓몬의\n상태 이상과 HP를 회복한다."
    zh_simp: "虽然自己陷入昏厥，\n但可以治愈后备上场的\n宝可梦的异常状态以及回复ＨＰ。"
    zh_trad: "雖然自己會陷入瀕死，\n但可以治癒接替上場的\n寶可夢的異常狀態並回復ＨＰ。"
heart_stamp:
  names:
    jp_kana: ハートスタンプ
    jp_kanji: ハートスタンプ
    en: Heart Stamp
    fr: Crève-Cœur
    it: Cuorestampo
    de: Herzstempel
    es: Arrumaco
    ko: 하트스탬프
    zh_simp: 爱心印章
    zh_trad: 愛心印章
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
heart_swap:
  names:
    jp_kana: ハートスワップ
    jp_kanji: ハートスワップ
    en: Heart Swap
    fr: Permucœur
    it: Cuorbaratto
    de: Statustausch
    es: Cambiaalmas
    ko: 하트스왑
    zh_simp: 心灵互换
    zh_trad: 心靈互換
  descriptions:
    jp_kana: "超能力で　自分と　相手に\nかかっている　能力変化を\n入れ替える。"
    jp_kanji: "超能力で　自分と　相手に\nかかっている　能力変化を\n入れ替える。"
    en: "The user employs its psychic power to switch stat\nchanges with the target."
    fr: "Le lanceur utilise un pouvoir psychique pour\néchanger ses changements de stats avec la cible."
    it: "Il Pokémon sfrutta i propri poteri psichici per scambiare\nle modifiche alle statistiche con quelle del bersaglio."
    de: "Anwender setzt Psycho-Kräfte ein, um\nStatusveränderungen des Zieles mit den\neigenen zu tauschen."
    es: "Usa la fuerza mental para intercambiar con el objetivo\nlos cambios en las características."
    ko: "초능력으로\n자신과 상대에게 걸려 있는\n능력 변화를 교체한다."
    zh_simp: "利用超能力互换\n自己和对手之间的\n能力变化。"
    zh_trad: "用超能力將自己和對手的\n能力變化互相交換。"
heat_crash:
  names:
    jp_kana: ヒートスタンプ
    jp_kanji: ヒートスタンプ
    en: Heat Crash
    fr: Tacle Feu
    it: Marchiafuoco
    de: Brandstempel
    es: Golpe Calor
    ko: 히트스탬프
    zh_simp: 高温重压
    zh_trad: 高溫重壓
  descriptions:
    jp_kana: "燃える　体で　相手に　ぶつかって\n攻撃する。　自分が　相手より\n重いほど　威力が　あがる。"
    jp_kanji: "燃える　体で　相手に　ぶつかって\n攻撃する。　自分が　相手より\n重いほど　威力が　あがる。"
    en: "The user slams into the target with its flame-covered\nbody. The more the user outweighs the target, the\ngreater the move’s power."
    fr: "Le lanceur projette son corps enflammé contre la cible.\nPlus il est lourd par rapport à la cible, plus la puissance\nde cette capacité augmente."
    it: "Il Pokémon carica con il suo corpo rovente. Più è\npesante rispetto al bersaglio, maggiore è la potenza\ndella mossa."
    de: "Rempelattacke mit brennendem Körper. Je schwerer\nder Anwender im Vergleich zum Ziel ist, desto stärker\ndie Attacke."
    es: "El usuario ataca con su cuerpo ardiente. Cuanto mayor\nsea su peso comparado con el del objetivo, mayor será\nla potencia del movimiento."
    ko: "불타는 몸으로 상대에게 부딪쳐서\n공격한다. 자신이 상대보다\n무거울수록 위력이 올라간다."
    zh_simp: "用燃烧的身体撞向对手进行攻击。\n自己比对手越重，威力越大。"
    zh_trad: "用燃燒的身體重壓對手\n進行攻擊。體重比對手\n重越多，威力越大。"
heat_wave:
  names:
    jp_kana: ねっぷう
    jp_kanji: ねっぷう
    en: Heat Wave
    fr: Canicule
    it: Ondacalda
    de: Hitzewelle
    es: Onda Ígnea
    ko: 열풍
    zh_simp: 热风
    zh_trad: 熱風
  descriptions:
    jp_kana: "熱い　息を\n相手に　吹きつけて　攻撃する。\nやけど状態に　することが　ある。"
    jp_kanji: "熱い　息を\n相手に　吹きつけて　攻撃する。\nやけど状態に　することが　ある。"
    en: "The user attacks by exhaling hot breath on opposing\nPokémon. This may also leave them with a burn."
    fr: "Le lanceur provoque une vague de chaleur qui\npeut aussi brûler la cible."
    it: "Il Pokémon attacca investendo il bersaglio con un soffio\nd’aria calda. Può anche scottarlo."
    de: "Gegnerische Pokémon werden von einem Sturm aus\nheißer Luft getroffen und erleiden eventuell\nVerbrennungen."
    es: "Provoca un viento abrasador que daña al objetivo y\npuede causar quemaduras."
    ko: "뜨거운 숨결을\n상대에게 내뿜어 공격한다.\n화상 상태로 만들 때가 있다."
    zh_simp: "将炎热的气息\n吹向对手进行攻击。\n有时会让对手陷入灼伤状态。"
    zh_trad: "將炎熱的氣息\n吹向對手進行攻擊。\n有時會讓對手陷入灼傷狀態。"
heavy_slam:
  names:
    jp_kana: ヘビーボンバー
    jp_kanji: ヘビーボンバー
    en: Heavy Slam
    fr: Tacle Lourd
    it: Pesobomba
    de: Rammboss
    es: Cuerpo Pesado
    ko: 헤비봄버
    zh_simp: 重磅冲撞
    zh_trad: 重磅衝撞
  descriptions:
    jp_kana: "重たい　体で　相手に　ぶつかって\n攻撃する。　自分が　相手より\n重いほど　威力が　あがる。"
    jp_kanji: "重たい　体で　相手に　ぶつかって\n攻撃する。　自分が　相手より\n重いほど　威力が　あがる。"
    en: "The user slams into the target with its heavy body.\nThe more the user outweighs the target, the greater\nthe move’s power."
    fr: "Le lanceur se jette sur la cible de tout son poids.\nPlus il est lourd par rapport à la cible, plus la puissance\nde cette capacité augmente."
    it: "Il Pokémon si lancia contro il bersaglio con tutto\nil proprio peso. Più è pesante rispetto al bersaglio,\nmaggiore è la potenza della mossa."
    de: "Anwender rammt das Ziel mit massivem Körper.\nJe schwerer er im Vergleich zum Ziel ist, desto\nstärker die Attacke."
    es: "El usuario golpea con todo su cuerpo. Cuanto mayor\nsea su peso comparado con el del objetivo, mayor será\nla potencia del movimiento."
    ko: "무거운 몸으로 상대에게 부딪쳐\n공격한다. 자신이 상대보다\n무거울수록 위력이 올라간다."
    zh_simp: "用沉重的身体撞向对手进行攻击。\n自己比对手越重，威力越大。"
    zh_trad: "用沉重的身體衝撞對手進行攻擊。\n體重比對手重越多，威力越大。"
helping_hand:
  names:
    jp_kana: てだすけ
    jp_kanji: てだすけ
    en: Helping Hand
    fr: Coup d’Main
    it: Altruismo
    de: Rechte Hand
    es: Refuerzo
    ko: 도우미
    zh_simp: 帮助
    zh_trad: 幫助
  descriptions:
    jp_kana: "仲間を　助ける。\nてだすけ　された　ポケモンの　技の\n威力は　いつもより　大きくなる。"
    jp_kanji: "仲間を　助ける。\nてだすけ　された　ポケモンの　技の\n威力は　いつもより　大きくなる。"
    en: "The user assists an ally by boosting the power of that\nally’s attack."
    fr: "Le lanceur donne un coup de main à son allié, qui voit\nla puissance de ses capacités augmenter."
    it: "Il Pokémon aiuta un alleato aumentandone la potenza\ndella mossa."
    de: "Anwender steigert die Stärke der Attacke eines\nMitstreiters."
    es: "El usuario ayuda a un aliado reforzando la potencia de\nsu ataque."
    ko: "동료를 돕는다.\n도움받은 포켓몬이 쓰는 기술의\n위력은 여느 때보다 커진다."
    zh_simp: "帮助伙伴。\n被帮助的宝可梦，\n其招式威力变得比平时大。"
    zh_trad: "幫助夥伴。\n被幫助的寶可夢，\n招式的威力會比原來更大。"
hex:
  names:
    jp_kana: たたりめ
    jp_kanji: たたりめ
    en: Hex
    fr: Châtiment
    it: Sciagura
    de: Bürde
    es: Infortunio
    ko: 병상첨병
    zh_simp: 祸不单行
    zh_trad: 禍不單行
  descriptions:
    jp_kana: "たたみかける　ように　攻撃する。\n状態異常の　相手に\n大きな　ダメージを　与える。"
    jp_kanji: "たたみかける　ように　攻撃する。\n状態異常の　相手に\n大きな　ダメージを　与える。"
    en: "This relentless attack does massive damage to a target\naffected by status conditions."
    fr: "Une attaque acharnée qui cause davantage de dégâts\nà la cible si elle a une altération de statut."
    it: "Il Pokémon attacca in modo implacabile.\nInfligge grossi danni se il bersaglio ha problemi di stato."
    de: "Eine Attacke, bei der der Anwender das Ziel bedrängt.\nFügt Zielen mit Statusproblemen hohen Schaden zu."
    es: "Ataque que causa un gran daño a los objetivos que\nsufren problemas de estado."
    ko: "엎친 데 덮친 격으로 공격한다.\n상태 이상인 상대에게\n큰 데미지를 준다."
    zh_simp: "接二连三地进行攻击。\n对处于异常状态的对手\n给予较大的伤害。"
    zh_trad: "接二連三地向對手進行攻擊。\n攻擊陷入異常狀態的對手時，\n能給予較大的傷害。"
hidden_power:
  names:
    jp_kana: めざめるパワー
    jp_kanji: めざめるパワー
    en: Hidden Power
    fr: Puissance Cachée
    it: Introforza
    de: Kraftreserve
    es: Poder Oculto
    ko: 잠재파워
    zh_simp: 觉醒力量
    zh_trad: 覺醒力量
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
high_horsepower:
  names:
    jp_kana: １０まんばりき
    jp_kanji: １０まんばりき
    en: High Horsepower
    fr: Cavalerie Lourde
    it: Forza Equina
    de: Pferdestärke
    es: Fuerza Equina
    ko: 10만마력
    zh_simp: 十万马力
    zh_trad: 十萬馬力
  descriptions:
    jp_kana: "全身を　使って\n相手に　猛アタックする。"
    jp_kanji: "全身を　使って\n相手に　猛アタックする。"
    en: The user fiercely attacks the target using its entire body.
    fr: "Le lanceur attaque violemment en utilisant\ntout son poids."
    it: "Il Pokémon travolge il bersaglio con un attacco\npossente."
    de: "Der Anwender greift das Ziel mit einer heftigen\nGanzkörper-Attacke an."
    es: Asesta un golpe devastador usando todo su cuerpo.
    ko: "온몸을 써서 상대를\n맹렬히 공격한다."
    zh_simp: "使出全身力量，\n猛攻对手。"
    zh_trad: "使出全身力量，\n猛攻對手。"
high_jump_kick:
  names:
    jp_kana: とびひざげり
    jp_kanji: とびひざげり
    en: High Jump Kick
    fr: Pied Voltige
    it: Calcinvolo
    de: Turmkick
    es: Pat. Salto Alta
    ko: 무릎차기
    zh_simp: 飞膝踢
    zh_trad: 飛膝踢
  descriptions:
    jp_kana: "ジャンプからの　ひざげりで\n相手を　攻撃する。\nはずすと　自分が　ダメージを　受ける。"
    jp_kanji: "ジャンプからの　ひざげりで\n相手を　攻撃する。\nはずすと　自分が　ダメージを　受ける。"
    en: "The target is attacked with a knee kick from a jump.\nIf this move misses, the user takes damage instead."
    fr: "Le lanceur s’élance pour effectuer un coup de genou\nsauté. S’il échoue, le lanceur se blesse."
    it: "Il Pokémon attacca il bersaglio con una ginocchiata\nin volo. Se la mossa fallisce, il Pokémon subisce\ndei danni."
    de: "Sprungtritt mit Knie. Bei Misserfolg verletzt sich der\nAnwender selbst."
    es: "El usuario salta muy alto y propina un rodillazo al\nobjetivo. Si falla, se hiere a sí mismo."
    ko: "점프해서 무릎차기로\n상대를 공격한다.\n빗나가면 자신이 데미지를 입는다."
    zh_simp: "跳起后用膝盖撞对手进行攻击。\n如果撞偏则自己会受到伤害。"
    zh_trad: "跳起後用膝蓋踢擊對手。\n沒踢中對手時自己會受到傷害。"
hold_back:
  names:
    jp_kana: てかげん
    jp_kanji: てかげん
    en: Hold Back
    fr: Retenue
    it: Riguardo
    de: Zurückhaltung
    es: Clemencia
    ko: 적당히손봐주기
    zh_simp: 手下留情
    zh_trad: 手下留情
  descriptions:
    jp_kana: "手加減　した　攻撃で\n相手の　ＨＰを\n必ず　１だけ　残す。"
    jp_kanji: "手加減　した　攻撃で\n相手の　ＨＰを\n必ず　１だけ　残す。"
    en: "The user holds back when it attacks, and the target is left\nwith at least 1 HP."
    fr: "Le lanceur attaque avec retenue, et laisse au moins\n1 PV à la cible."
    it: "Il Pokémon modula l’attacco in modo da lasciare\nal bersaglio almeno 1 PS."
    de: "Der Anwender hält sich beim Angriff zurück und sorgt\nauf diese Weise dafür, dass dem Ziel danach mindestens\n1 KP verbleibt."
    es: "El usuario se contiene a la hora de atacar y deja al\nobjetivo con al menos 1 PS."
    ko: "적당히 공격하여\n상대의 HP를\n반드시 1은 남긴다."
    zh_simp: "在攻击的时候手下留情，\n从而使对手的ＨＰ\n至少会留下１ＨＰ。"
    zh_trad: "在攻擊的時候手下留情，\n讓對手的ＨＰ一定會剩下１。"
hold_hands:
  names:
    jp_kana: てをつなぐ
    jp_kanji: てをつなぐ
    en: Hold Hands
    fr: Mains Jointes
    it: Mano nella Mano
    de: Händchenhalten
    es: Manos Juntas
    ko: 손에손잡기
    zh_simp: 牵手
    zh_trad: 牽手
  descriptions:
    jp_kana: "味方の　ポケモン　同士が\n手をつなぐ。　とっても　幸せな\n気持ちに　なれる。"
    jp_kanji: "味方の　ポケモン　同士が\n手をつなぐ。　とっても　幸せな\n気持ちに　なれる。"
    en: "The user and an ally hold hands. This makes them\nvery happy."
    fr: "Le lanceur et un allié se prennent la main,\nce qui les rend heureux."
    it: "Il Pokémon e un alleato si prendono per mano\ne la cosa li riempie di felicità."
    de: "Der Anwender und ein Mitstreiter reichen einander\ndie Hände und verfallen in einen Zustand tiefster\nZufriedenheit."
    es: "El usuario le da la mano a un aliado y ambos se sienten\nmuy felices."
    ko: "같은 편 포켓몬끼리\n손에 손을 잡는다. 굉장히\n행복한 기분이 들게 된다."
    zh_simp: "我方宝可梦之间牵手。\n能带来非常幸福的心情。"
    zh_trad: "我方的寶可夢手牽手。\n心情會變得非常幸福。"
hone_claws:
  names:
    jp_kana: つめとぎ
    jp_kanji: つめとぎ
    en: Hone Claws
    fr: Aiguisage
    it: Unghiaguzze
    de: Klauenwetzer
    es: Afilagarras
    ko: 손톱갈기
    zh_simp: 磨爪
    zh_trad: 磨爪
  descriptions:
    jp_kana: "ツメを　磨いて　鋭く　する。\n自分の　攻撃と\n命中率を　あげる。"
    jp_kanji: "ツメを　磨いて　鋭く　する。\n自分の　攻撃と\n命中率を　あげる。"
    en: "The user sharpens its claws to boost its Attack stat\nand accuracy."
    fr: "Le lanceur s’aiguise les griffes.\nAugmente l’Attaque et la Précision."
    it: "Il Pokémon affila i propri artigli aumentando\nAttacco e precisione."
    de: "Wetzt seine Klauen, um sie zu schärfen. Erhöht Angriff\nund Genauigkeit des Anwenders."
    es: "El usuario se afila las garras para aumentar su Ataque y\nsu Precisión."
    ko: "손톱을 갈아 날카롭게 한다.\n자신의 공격과\n명중률을 올린다."
    zh_simp: "将爪子磨得更加锋利。\n提高自己的攻击和命中率。"
    zh_trad: "將爪子磨得更加鋒利。\n可提高自己的攻擊和命中率。"
horn_attack:
  names:
    jp_kana: つのでつく
    jp_kanji: つのでつく
    en: Horn Attack
    fr: Koud’Korne
    it: Incornata
    de: Hornattacke
    es: Cornada
    ko: 뿔찌르기
    zh_simp: 角撞
    zh_trad: 角撞
  descriptions:
    jp_kana: "鋭く　とがった　つので\n相手を　攻撃する。"
    jp_kanji: "鋭く　とがった　つので\n相手を　攻撃する。"
    en: "The target is jabbed with a sharply pointed horn to\ninflict damage."
    fr: "Frappe la cible d’un coup de corne pointue pour\ninfliger des dégâts."
    it: "Il Pokémon attacca il bersaglio infilzandolo con un corno\naffilato."
    de: Spießt das Ziel mit einem spitzen Horn auf.
    es: Ataca al objetivo con una cornada punzante.
    ko: "날카롭고 뾰족한 뿔로\n상대를 공격한다."
    zh_simp: 用尖锐的角攻击对手。
    zh_trad: 用尖銳的角攻擊對手。
horn_drill:
  names:
    jp_kana: つのドリル
    jp_kanji: つのドリル
    en: Horn Drill
    fr: Empal’Korne
    it: Perforcorno
    de: Hornbohrer
    es: Perforador
    ko: 뿔드릴
    zh_simp: 角钻
    zh_trad: 角鑽
  descriptions:
    jp_kana: "回転する　つのを\n相手に　突き刺して　攻撃する。\n当たれば　一撃で　ひんしに　する。"
    jp_kanji: "回転する　つのを\n相手に　突き刺して　攻撃する。\n当たれば　一撃で　ひんしに　する。"
    en: "The user stabs the target with a horn that rotates like a\ndrill. The target faints instantly if this attack hits."
    fr: "Un coup de corne en vrille qui empale la cible,\nla mettant K.O. sur le coup si elle est touchée."
    it: "Il Pokémon attacca il bersaglio infilzandolo con un corno\nrotante. Se la mossa va a segno, il Pokémon colpito\nva KO."
    de: "Attacke, bei der ein Horn als Bohrer eingesetzt wird.\nIst sie erfolgreich, führt sie zu einem K.O."
    es: "Ataque con un cuerno giratorio que fulmina al objetivo\nde un solo golpe si acierta."
    ko: "회전하는 뿔을\n상대에게 꿰찔러서 공격한다.\n맞으면 일격에 기절한다."
    zh_simp: "用旋转的角\n刺入对手进行攻击。\n只要命中就会一击昏厥。"
    zh_trad: "用旋轉的角\n刺進對手進行攻擊。\n只要命中就會一擊瀕死。"
horn_leech:
  names:
    jp_kana: ウッドホーン
    jp_kanji: ウッドホーン
    en: Horn Leech
    fr: Encornebois
    it: Legnicorno
    de: Holzgeweih
    es: Asta Drenaje
    ko: 우드혼
    zh_simp: 木角
    zh_trad: 木角
  descriptions:
    jp_kana: "つのを　突き刺して　相手の　養分を\n吸い取る。　与えた　ダメージの\n半分の　ＨＰを　回復できる。"
    jp_kanji: "つのを　突き刺して　相手の　養分を\n吸い取る。　与えた　ダメージの\n半分の　ＨＰを　回復できる。"
    en: "The user drains the target’s energy with its horns.\nThe user’s HP is restored by up to half the damage\ntaken by the target."
    fr: "Un coup de cornes qui draine l’énergie de la cible.\nLa capacité convertit la moitié des dégâts infligés\nen PV pour le lanceur."
    it: "Il Pokémon infilza il bersaglio con le corna e assorbe\nuna quantità di PS pari a metà del danno inflitto."
    de: "Greift Ziel mit einem Astgeweih an und zapft diesem\nEnergie ab. Anwender wird um die Hälfte des\nzugefügten Schadens geheilt."
    es: "El usuario ensarta al objetivo con su cornamenta y\nabsorbe su energía. El Pokémon recupera la mitad\nde los PS arrebatados al objetivo."
    ko: "뿔을 꿰찔러서 상대의 양분을\n흡수한다. 입힌 데미지의 절반에\n해당하는 HP를 회복할 수 있다."
    zh_simp: "将角刺入，吸取对手的养分。\n可以回复给予对手\n伤害的一半ＨＰ。"
    zh_trad: "將角刺進對手，吸取養分。\n可以回復給予對手\n傷害的一半ＨＰ。"
howl:
  names:
    jp_kana: とおぼえ
    jp_kanji: とおぼえ
    en: Howl
    fr: Grondement
    it: Gridodilotta
    de: Jauler
    es: Aullido
    ko: 멀리짖기
    zh_simp: 长嚎
    zh_trad: 長嚎
  descriptions:
    jp_kana: "大声で　ほえて　気合を　高め\n自分と　味方の　攻撃を　あげる。"
    jp_kanji: "大声で　ほえて　気合を　高め\n自分と　味方の　攻撃を　あげる。"
    en: "The user howls loudly to rouse itself and its allies.\nThis boosts their Attack stats."
    fr: "Le lanceur pousse un grand cri d’encouragement,\nce qui augmente son Attaque et celle de ses alliés."
    it: "Il Pokémon emette un forte verso per farsi coraggio\ne aumentare il proprio Attacco e quello degli alleati."
    de: "Der Kampfgeist sowie der Angriffs-Wert des Anwenders\nund seiner Mitstreiter werden durch lautes Jaulen\nerhöht."
    es: "Aullido que sube el ánimo y aumenta el Ataque del\nbando del usuario."
    ko: "큰 소리로 짖어 기합을 높여서\n자신과 같은 편의 공격을 올린다."
    zh_simp: "大声吼叫提高气势，\n从而提高自己和同伴的攻击。"
    zh_trad: "大聲地吼叫提升氣勢，\n提高自己和同伴的攻擊。"
hurricane:
  names:
    jp_kana: ぼうふう
    jp_kanji: ぼうふう
    en: Hurricane
    fr: Vent Violent
    it: Tifone
    de: Orkan
    es: Vendaval
    ko: 폭풍
    zh_simp: 暴风
    zh_trad: 暴風
  descriptions:
    jp_kana: "強烈な　風で　相手を\n包みこんで　攻撃する。\n相手を　混乱させることが　ある。"
    jp_kanji: "強烈な　風で　相手を\n包みこんで　攻撃する。\n相手を　混乱させることが　ある。"
    en: "The user attacks by wrapping the target in a fierce wind.\nThis may also confuse the target."
    fr: "Le lanceur déclenche une tempête de vents violents\nqui s’abat sur la cible, et peut aussi la rendre confuse."
    it: "Il Pokémon attacca il bersaglio avvolgendolo con\nun vento fortissimo. Può anche confonderlo."
    de: "Anwender greift das Ziel an, indem er es mit heftigen\nWindböen umgibt. Ziel wird eventuell verwirrt."
    es: "Golpea al objetivo con un fuerte torbellino que\nlo envuelve y puede confundirlo."
    ko: "강렬한 바람으로 상대를\n둘러싸서 공격한다.\n상대를 혼란시킬 때가 있다."
    zh_simp: "用强烈的风席卷\n对手进行攻击。\n有时会使对手混乱。"
    zh_trad: "用強烈的風席捲\n對手進行攻擊。\n有時會使對手混亂。"
hydro_cannon:
  names:
    jp_kana: ハイドロカノン
    jp_kanji: ハイドロカノン
    en: Hydro Cannon
    fr: Hydroblast
    it: Idrocannone
    de: Aquahaubitze
    es: Hidrocañón
    ko: 하이드로캐논
    zh_simp: 加农水炮
    zh_trad: 加農水炮
  descriptions:
    jp_kana: "水の　大砲を\n相手に　発射して　攻撃する。\n次の　ターンは　動けなくなる。"
    jp_kanji: "水の　大砲を\n相手に　発射して　攻撃する。\n次の　ターンは　動けなくなる。"
    en: "The target is hit with a watery blast. The user can’t move\non the next turn."
    fr: "Le lanceur projette un missile d’eau sur la cible,\nmais il doit se reposer au tour suivant."
    it: "Il Pokémon attacca il bersaglio con un potente getto\nd’acqua, ma al turno successivo non può muoversi."
    de: "Das Ziel wird von einer Wasserkanone getroffen.\nAnwender setzt eine Runde aus."
    es: "Ataca al objetivo con un cañonazo de agua. El usuario\ndeberá descansar en el siguiente turno."
    ko: "물의 대포를\n상대에게 발사해서 공격한다.\n다음 턴은 움직일 수 없다."
    zh_simp: "向对手喷射水炮进行攻击。\n下一回合自己将无法动弹。"
    zh_trad: "向對手發射水炮進行攻擊。\n下一回合自己將無法動彈。"
hydro_pump:
  names:
    jp_kana: ハイドロポンプ
    jp_kanji: ハイドロポンプ
    en: Hydro Pump
    fr: Hydrocanon
    it: Idropompa
    de: Hydropumpe
    es: Hidrobomba
    ko: 하이드로펌프
    zh_simp: 水炮
    zh_trad: 水炮
  descriptions:
    jp_kana: "大量の　水を\n激しい　勢いで\n相手に　発射して　攻撃する。"
    jp_kanji: "大量の　水を\n激しい　勢いで\n相手に　発射して　攻撃する。"
    en: "The target is blasted by a huge volume of water\nlaunched under great pressure."
    fr: Un puissant jet d’eau est dirigé sur la cible.
    it: "Il Pokémon attacca il bersaglio travolgendolo con un\npotente getto d’acqua spruzzato ad altissima pressione."
    de: Spritzt eine Menge Wasser mit Hochdruck auf das Ziel.
    es: Lanza una gran masa de agua a presión para atacar.
    ko: "대량의 물을 세찬 기세로\n상대에게 발사하여 공격한다."
    zh_simp: "向对手猛烈地喷射\n大量水流进行攻击。"
    zh_trad: "向對手猛烈地噴射\n大量水流進行攻擊。"
hydro_steam:
  names:
    jp_kana: ハイドロスチーム
    jp_kanji: ハイドロスチーム
    en: Hydro Steam
    fr: Hydrovapeur
    it: Idrovapore
    de: Hydrodampf
    es: Hidrovapor
    ko: 하이드로스팀
    zh_simp: 水蒸气
    zh_trad: 水蒸氣
  descriptions:
    jp_kana: "煮えたぎる水を　勢いよく　浴びせる。\n日差しが　強いとき　技の威力が\nさがるどころか　１．５倍に　なる。"
    jp_kanji: "煮えたぎる水を　勢いよく　浴びせる。\n日差しが　強いとき　技の威力が\nさがるどころか　１．５倍に　なる。"
    en: "The user blasts the target with boiling-hot water. This\nmove’s power is not lowered in harsh sunlight but rather\nboosted by 50 percent."
    fr: "Le lanceur asperge la cible avec un puissant jet d’eau\nbouillante. Quand le soleil brille, la puissance de cette\ncapacité augmente de 50 % au lieu de baisser."
    it: "Il Pokémon ricopre con forza il bersaglio di acqua\nbollente. Con la luce solare intensa, la potenza\ndi questa mossa aumenta del 50% anziché diminuire."
    de: "Das Ziel wird kraftvoll mit brodelndem Wasser\nübergossen. Wider Erwarten sinkt die Stärke der Attacke\nbei starkem Sonnenlicht nicht, sondern steigt um 50 %."
    es: "Vierte agua hirviendo sobre el objetivo. Cuando hace\nsol, la potencia del movimiento aumenta un 50 % en\nlugar de reducirse."
    ko: "펄펄 끓는 물을 기세 좋게 뿜어낸다.\n햇살이 강할 때 기술의 위력이\n떨어지기는커녕 1.5배가 된다."
    zh_simp: "将煮得翻滚的开水猛烈地喷向对手。\n日照强烈时，招式威力不但\n不会降低，还会变成１．５倍。"
    zh_trad: "將滾燙的水猛烈地噴向對手。\n日照很強時，招式威力不但\n不會降低，還會變成１.５倍。"
hydro_vortex:physical:
  names:
    jp_kana: スーパーアクアトルネード
    jp_kanji: スーパーアクアトルネード
    en: Hydro Vortex
    fr: Super Tourbillon Abyssal
    it: Idrovortice Abissale
    de: Super-Wassertornado
    es: Hidrovórtice Abisal
    ko: 슈퍼아쿠아토네이도
    zh_simp: 超级水流大漩涡
    zh_trad: 超級水流大漩渦
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
