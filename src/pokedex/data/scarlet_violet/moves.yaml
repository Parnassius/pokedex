geomancy:
  names:
    jp_kana: ジオコントロール
    jp_kanji: ジオコントロール
    en: Geomancy
    fr: Géo-Contrôle
    it: Geocontrollo
    de: Geokontrolle
    es: Geocontrol
    ko: 지오컨트롤
    zh_simp: 大地掌控
    zh_trad: 大地掌控
  descriptions:
    jp_kana: "１ターン目で　エネルギーを\n吸収し　２ターン目に　特攻\n特防　素早さを　ぐーんと　あげる。"
    jp_kanji: "１ターン目で　エネルギーを\n吸収し　２ターン目に　特攻\n特防　素早さを　ぐーんと　あげる。"
    en: "The user absorbs energy on the first turn, then sharply\nboosts its Sp. Atk, Sp. Def, and Speed stats on the\nnext turn."
    fr: "Le lanceur absorbe de l’énergie au premier tour\net augmente beaucoup son Attaque Spéciale,\nsa Défense Spéciale et sa Vitesse au second."
    it: "Il Pokémon assorbe energia nel primo turno per\naumentare poi di molto l’Attacco Speciale, la Difesa\nSpeciale e la Velocità in quello seguente."
    de: "Der Anwender saugt in Runde 1 Energie auf. In Runde 2\nsteigen der Spezial-Angriff, die Spezial-Verteidigung\nund die Initiative stark."
    es: "Concentra energía durante el primer turno, de forma\nque su Velocidad, su Ataque Especial y su Defensa\nEspecial aumenten mucho en el segundo."
    ko: "1턴째에 에너지를 흡수하여\n2턴째에 특수공격, 특수방어,\n스피드를 크게 올린다."
    zh_simp: "第１回合吸收能量，\n第２回合大幅提高\n特攻、特防和速度。"
    zh_trad: "使用後的第１回合吸收能量，\n並於第２回合大幅提高\n自己的特攻、特防和速度。"
giga_drain:
  names:
    jp_kana: ギガドレイン
    jp_kanji: ギガドレイン
    en: Giga Drain
    fr: Giga-Sangsue
    it: Gigassorbimento
    de: Gigasauger
    es: Gigadrenado
    ko: 기가드레인
    zh_simp: 终极吸取
    zh_trad: 終極吸取
  descriptions:
    jp_kana: "養分を　吸い取り　攻撃する。\n与えた　ダメージの\n半分の　ＨＰを　回復できる。"
    jp_kanji: "養分を　吸い取り　攻撃する。\n与えた　ダメージの\n半分の　ＨＰを　回復できる。"
    en: "A nutrient-draining attack. The user’s HP is restored by\nup to half the damage taken by the target."
    fr: "Une attaque qui absorbe les nutriments et convertit\nla moitié des dégâts infligés en PV pour le lanceur."
    it: "Il Pokémon attacca assorbendo PS.\nLa quantità di PS recuperati è pari alla\nmetà del danno inflitto."
    de: "Das Ziel wird angegriffen und die Hälfte des zugefügten\nSchadens dem Anwender als KP gutgeschrieben."
    es: "Un ataque que absorbe nutrientes. El usuario recupera\nla mitad de los PS del daño que produce."
    ko: "양분을 흡수하여 공격한다.\n입힌 데미지의 절반에 해당하는\nHP를 회복할 수 있다."
    zh_simp: "吸取对手的养分进行攻击。\n可以回复给予对手\n伤害的一半ＨＰ。"
    zh_trad: "吸取對手的養分進行攻擊。\n可以回復給予對手\n傷害的一半ＨＰ。"
giga_impact:
  names:
    jp_kana: ギガインパクト
    jp_kanji: ギガインパクト
    en: Giga Impact
    fr: Giga Impact
    it: Gigaimpatto
    de: Gigastoß
    es: Gigaimpacto
    ko: 기가임팩트
    zh_simp: 终极冲击
    zh_trad: 終極衝擊
  descriptions:
    jp_kana: "持てる　力を　すべて　使って\n相手に　突撃する。\n次の　ターンは　動けなくなる。"
    jp_kanji: "持てる　力を　すべて　使って\n相手に　突撃する。\n次の　ターンは　動けなくなる。"
    en: "The user charges at the target using every bit of its\npower. The user can’t move on the next turn."
    fr: "Le lanceur charge la cible de toute ses forces et doit\nensuite se reposer au tour suivant."
    it: "Il Pokémon carica il bersaglio usando tutta la propria\nforza, ma al turno successivo deve riposarsi."
    de: "Anwender rennt mit seiner ganzen Kraft gegen das\nZiel an und muss dann eine Runde ruhen."
    es: "El usuario carga contra el objetivo con toda la fuerza\nque tiene y descansa en el siguiente turno."
    ko: "가진 힘을 모두 사용해서\n상대에게 돌격한다.\n다음 턴은 움직일 수 없다."
    zh_simp: "使出自己浑身力量突击对手。\n下一回合自己将无法动弹。"
    zh_trad: "使出全身上下所有力量突擊對手。\n下一回合自己將無法動彈。"
gigaton_hammer:
  names:
    jp_kana: デカハンマー
    jp_kanji: デカハンマー
    en: Gigaton Hammer
    fr: Marteau Mastoc
    it: Granmartello
    de: Riesenhammer
    es: Martillo Colosal
    ko: 거대해머
    zh_simp: 巨力锤
    zh_trad: 巨力錘
  descriptions:
    jp_kana: "大きな　ハンマーを　体ごと\nぶんまわして　攻撃する。\nこの技は　２回連続で　だせない。"
    jp_kanji: "大きな　ハンマーを　体ごと\nぶんまわして　攻撃する。\nこの技は　２回連続で　だせない。"
    en: "The user swings its whole body around to attack with its\nhuge hammer. This move can’t be used twice in a row."
    fr: "Le lanceur met tout son corps à contribution pour\nattaquer la cible avec un immense marteau. Cette\ncapacité ne peut pas être utilisée deux fois d’affilée."
    it: "Il Pokémon attacca con un grosso martello mettendoci\ntutta la forza che ha in corpo. Questa mossa non può\nessere usata due volte di fila."
    de: "Der Anwender greift mit einem großen Hammer an,\nden er mit vollem Körpereinsatz um sich schwingt. Diese\nAttacke kann nicht zweimal in Folge eingesetzt werden."
    es: "El usuario se ayuda de su propio peso corporal para\npropinar un golpe con un enorme martillo. Este\nmovimiento no puede usarse dos veces seguidas."
    ko: "거대한 해머를 온몸으로\n휘둘러서 공격한다.\n이 기술은 2회 연속으로 쓸 수 없다."
    zh_simp: "连同身体转起巨大的锤子进行攻击。\n这个招式无法连续使出２次。"
    zh_trad: "將大錘連同身體\n一起揮舞進行攻擊。\n這個招式無法連續２次使用。"
