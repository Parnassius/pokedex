    jp_kana: "相手の　顔などに\n墨を　吹きかけて　攻撃する。\n命中率を　さげることが　ある。"
    jp_kanji: "相手の　顔などに\n墨を　吹きかけて　攻撃する。\n命中率を　さげることが　ある。"
    en: "The user attacks by spraying ink in the target’s face.\nThis may also lower the target’s accuracy."
    fr: "Le lanceur attaque en projetant de l’encre au visage\nde la cible, ce qui peut aussi baisser sa Précision."
    it: "Chi la usa spruzza inchiostro in faccia al bersaglio.\nPuò anche ridurne la precisione."
    de: "Schießt mit Tinte, um Schaden anzurichten und die\nGenauigkeit zu senken."
    es: "Dispara tinta a la cara del objetivo y le inflige daño.\nPuede reducir la Precisión."
    ko: "상대의 얼굴 등에\n먹물을 내뿜어 공격한다.\n명중률을 떨어뜨릴 때가 있다."
    zh_simp: "向对手的脸等\n喷出墨汁进行攻击。\n有时会降低对手的命中率。"
    zh_trad: "向對手的臉等\n噴出墨汁進行攻擊。\n有時會降低對手的命中率。"
octolock:
  names:
    jp_kana: たこがため
    jp_kanji: たこがため
    en: Octolock
    fr: Octoprise
    it: Tentacolock
    de: Octoklammer
    es: Octopresa
    ko: 문어굳히기
    zh_simp: 蛸固
    zh_trad: 蛸固
  descriptions:
    jp_kana: "相手を　逃げられなくする。\nかためられた　相手は　毎ターン\n防御と　特防が　下がる。"
    jp_kanji: "相手を　逃げられなくする。\nかためられた　相手は　毎ターン\n防御と　特防が　下がる。"
    en: "The user locks the target in and prevents it from fleeing.\nThis move also lowers the target’s Defense and Sp. Def\nevery turn."
    fr: "Le lanceur empêche la cible de quitter le terrain.\nÀ chaque tour qui passe, cette capacité baisse\nla Défense et la Défense Spéciale de celle-ci."
    it: "Il Pokémon immobilizza il bersaglio impedendogli di\nlasciare il campo e ne diminuisce la Difesa e la Difesa\nSpeciale a ogni turno."
    de: "Das Ziel wird an der Flucht beziehungsweise am\nAuswechseln gehindert. Seine Verteidigung und\nSpezial-Verteidigung sinken jede Runde."
    es: "Retiene al objetivo e impide que pueda huir o ser\ncambiado por otro, a la vez que reduce su Defensa\ny su Defensa Especial cada turno."
    ko: "상대를 도망칠 수 없게 한다.\n굳히기에 당한 상대는 매 턴\n방어와 특수방어가 떨어진다."
    zh_simp: "让对手无法逃走。\n对手被固定后，\n每回合都会降低防御和特防。"
    zh_trad: "讓對手無法逃走。\n對手被纏住後，\n防禦和特防每回合都會降低。"
