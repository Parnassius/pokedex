    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
springtide_storm:
  names:
    jp_kana: はるのあらし
    jp_kanji: はるのあらし
    en: Springtide Storm
    fr: Typhon Passionné
    it: Tempesta Zefirea
    de: Frühlingsorkan
    es: Ciclón Primavera
    ko: 봄의폭풍
    zh_simp: 阳春风暴
    zh_trad: 陽春風暴
  descriptions:
    jp_kana: "愛憎　入りまじった　強烈な風で\n相手を　包みこんで　攻撃する。\n相手の　攻撃を　さげることが　ある。"
    jp_kanji: "愛憎　入りまじった　強烈な風で\n相手を　包みこんで　攻撃する。\n相手の　攻撃を　さげることが　ある。"
    en: "The user attacks by wrapping opposing Pokémon in\nfierce winds brimming with love and hate. This may also\nlower their Attack stats."
    fr: "Le lanceur déclenche un violent typhon de haine et\nd’amour qui s’abat sur la cible. Peut baisser l’Attaque\nde celle-ci."
    it: "Il Pokémon attacca il bersaglio avvolgendolo con un\nvento fortissimo di odio e amore. Può anche ridurne\nl’Attacco."
    de: "Der Anwender greift gegnerische Pokémon an, indem er\nsie mit heftigen Windböen voller Hassliebe umgibt.\nEventuell sinkt ihr Angriff."
    es: "Desata una tormenta de amor y odio con la que\nenvuelve y ataca al objetivo. También puede reducir\nsu Ataque."
    ko: "애증 섞인 강렬한 바람으로\n상대를 둘러싸서 공격한다.\n상대의 공격을 떨어뜨릴 때가 있다."
    zh_simp: "用交织着爱与恨的烈风\n席卷对手进行攻击。\n有时会降低对手的攻击。"
    zh_trad: "用交織著愛與恨的烈風\n席捲對手進行攻擊。\n有時會降低對手的攻擊。"
stealth_rock:
  names:
    jp_kana: ステルスロック
    jp_kanji: ステルスロック
    en: Stealth Rock
    fr: Piège de Roc
    it: Levitoroccia
    de: Tarnsteine
    es: Trampa Rocas
    ko: 스텔스록
    zh_simp: 隐形岩
    zh_trad: 隱形岩
  descriptions:
    jp_kana: "相手の　周りに　無数の　岩を\n浮かべて　交代で　でてきた　相手の\nポケモンに　ダメージを　与える。"
    jp_kanji: "相手の　周りに　無数の　岩を\n浮かべて　交代で　でてきた　相手の\nポケモンに　ダメージを　与える。"
    en: "The user lays a trap of levitating stones around the\nopposing team. The trap damages opposing Pokémon\nthat switch into battle."
    fr: "Le lanceur fait flotter des pierres autour de la cible\nqui blessent tout adversaire entrant au combat."
    it: "Il Pokémon piazza una trappola di rocce sospese che\ndanneggia gli avversari quando entrano in campo."
    de: "Der Anwender legt eine Falle aus schwebenden Steinen\naus, die gegnerische Pokémon verletzen, die in den\nKampf gerufen werden."
    es: "Hace flotar innumerables rocas alrededor del objetivo\nque hieren a los rivales que entran en combate."
    ko: "상대의 주위에 무수한 바위를 띄워\n교체되어 나온 상대 포켓몬에게\n데미지를 준다."
    zh_simp: "将无数岩石悬浮在对手的周围，\n从而对替换出场的对手的\n宝可梦给予伤害。"
    zh_trad: "在對手周圍撒下無數飄浮的岩石，\n讓對手替換出場的寶可夢受到傷害。"
steam_eruption:
  names:
    jp_kana: スチームバースト
    jp_kanji: スチームバースト
    en: Steam Eruption
    fr: Jet de Vapeur
    it: Vaporscoppio
    de: Dampfschwall
    es: Chorro de Vapor
    ko: 스팀버스트
    zh_simp: 蒸汽爆炸
    zh_trad: 蒸汽爆炸
  descriptions:
    jp_kana: "ものすごく　熱い　蒸気を\n相手に　浴びせる。\n相手は　やけどする　ことがある。"
    jp_kanji: "ものすごく　熱い　蒸気を\n相手に　浴びせる。\n相手は　やけどする　ことがある。"
    en: "The user immerses the target in superheated steam.\nThis may also leave the target with a burn."
    fr: "Le lanceur projette de la vapeur extrêmement chaude\nsur la cible, ce qui peut aussi la brûler."
    it: "Il Pokémon travolge il bersaglio con un’ondata di vapore\nrovente che può anche scottarlo."
    de: "Der Anwender feuert einen siedend heißen\nDampfschwall auf das Ziel ab. Dieses kann\ndabei Verbrennungen erleiden."
    es: "Envuelve al objetivo con vapor extremadamente caliente\nque puede causar quemaduras."
    ko: "상대에게 굉장히 뜨거운\n증기를 뿜는다.\n상대는 화상을 입기도 한다."
    zh_simp: "将滚烫的蒸汽喷向对手。\n有时会让对手灼伤。"
    zh_trad: "將超高溫的蒸汽噴向對手。\n有時會讓對手陷入灼傷狀態。"
steamroller:
  names:
    jp_kana: ハードローラー
    jp_kanji: ハードローラー
    en: Steamroller
    fr: Bulldoboule
    it: Rulloduro
    de: Quetschwalze
    es: Rodillo de Púas
    ko: 하드롤러
    zh_simp: 疯狂滚压
    zh_trad: 瘋狂滾壓
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
