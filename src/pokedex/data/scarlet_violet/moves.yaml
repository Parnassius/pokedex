purify:
  names:
    jp_kana: じょうか
    jp_kanji: じょうか
    en: Purify
    fr: Purification
    it: Purificazione
    de: Läuterung
    es: Purificación
    ko: 정화
    zh_simp: 净化
    zh_trad: 淨化
  descriptions:
    jp_kana: "相手の　状態異常を　治す。\n治すと　自分は　ＨＰを\n回復　することが　できる。"
    jp_kanji: "相手の　状態異常を　治す。\n治すと　自分は　ＨＰを\n回復　することが　できる。"
    en: "The user cures the target’s status condition. If the move\nsucceeds, it also restores the user’s own HP."
    fr: "Le lanceur soigne les altérations de statut de la cible,\nce qui lui permet de regagner des PV."
    it: "Il Pokémon cura i problemi di stato del bersaglio\ne in cambio può recuperare PS."
    de: "Der Anwender heilt das Statusproblem des Zieles und\nfüllt dadurch seine eigenen KP auf."
    es: "Cura los problemas de estado del objetivo y, a cambio,\nrecupera PS propios."
    ko: "상대의 상태 이상을 회복한다.\n회복하면 자신은 HP를\n회복할 수 있다."
    zh_simp: "治愈对手的异常状态。\n治愈后可以回复自己的ＨＰ。"
    zh_trad: "治癒對手的異常狀態。\n治癒後可以回復自己的ＨＰ。"
pursuit:
