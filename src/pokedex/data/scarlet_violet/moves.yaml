mist:
  names:
    jp_kana: しろいきり
    jp_kanji: しろいきり
    en: Mist
    fr: Brume
    it: Nebbia
    de: Weißnebel
    es: Neblina
    ko: 흰안개
    zh_simp: 白雾
    zh_trad: 白霧
  descriptions:
    jp_kana: "白い霧で　体を　おおう。\n５ターンの　間　相手に\n能力を　さげられなく　なる。"
    jp_kanji: "白い霧で　体を　おおう。\n５ターンの　間　相手に\n能力を　さげられなく　なる。"
    en: "The user cloaks itself and its allies in a white mist\nthat prevents any of their stats from being lowered\nfor five turns."
    fr: "Une brume blanche enveloppe le lanceur et ses alliés\net empêche la réduction des stats pour cinq tours."
    it: "Il Pokémon attira una nebbia che per cinque turni\nblocca la riduzione delle statistiche causata\nda altri."
    de: "Anwender schützt das Team mit einem Nebel.\nVerhindert Statussenkungen für fünf Runden."
    es: "Rodea de una niebla blanquecina al bando del usuario\ne impide que el rival reduzca sus características durante\ncinco turnos."
    ko: "하얀 안개로 몸을 덮는다.\n5턴 동안 상대에 의해\n능력이 떨어지지 않게 된다."
    zh_simp: "用白雾覆盖身体。\n在５回合内不会让对手\n降低自己的能力。"
    zh_trad: "用白霧覆蓋身體。\n在５回合內不會讓對手\n降低自己的能力。"
mist_ball:
  names:
    jp_kana: ミストボール
    jp_kanji: ミストボール
    en: Mist Ball
    fr: Ball’Brume
    it: Foschisfera
    de: Nebelball
    es: Bola Neblina
    ko: 미스트볼
    zh_simp: 薄雾球
    zh_trad: 薄霧球
  descriptions:
    jp_kana: "霧状の　羽毛で　包みこみ\n攻撃する。\n相手の　特攻を　さげることが　ある。"
    jp_kanji: "霧状の　羽毛で　包みこみ\n攻撃する。\n相手の　特攻を　さげることが　ある。"
    en: "A mist-like flurry of down envelops and damages the\ntarget. This may also lower the target’s Sp. Atk stat."
    fr: "Une bulle de brume inflige des dégâts à la cible et\npeut aussi réduire son Attaque Spéciale."
    it: "Il Pokémon attacca avvolgendo il bersaglio in una sfera\ndi nebbia. Può anche ridurne l’Attacco Speciale."
    de: "Angriff mit einer Nebelwolke aus Daunen. Senkt\neventuell den Spezial-Angriff des Zieles."
    es: "Bola de plumas neblinosas que inflige daño al objetivo\ny puede reducir su Ataque Especial."
    ko: "안개의 깃털로 둘러싸\n공격한다. 상대의 특수공격을\n떨어뜨릴 때가 있다."
    zh_simp: "用围绕着雾状\n羽毛的球进行攻击。\n有时会降低对手的特攻。"
    zh_trad: "將霧狀的羽毛聚集成團進行攻擊。\n有時會降低對手的特攻。"
misty_explosion:
  names:
    jp_kana: ミストバースト
    jp_kanji: ミストバースト
    en: Misty Explosion
    fr: Explo-Brume
    it: Nebbioscoppio
    de: Nebelexplosion
    es: Bruma Explosiva
    ko: 미스트버스트
    zh_simp: 薄雾炸裂
    zh_trad: 薄霧炸裂
  descriptions:
    jp_kana: "自分の　周りに　いる　すべてを\n攻撃するが　使うと　瀕死になる。\nミストフィールドで　威力が　あがる。"
    jp_kanji: "自分の　周りに　いる　すべてを\n攻撃するが　使うと　瀕死になる。\nミストフィールドで　威力が　あがる。"
    en: "The user attacks everything around it and faints upon\nusing this move. This move’s power is boosted on\nMisty Terrain."
    fr: "Le lanceur frappe tous les Pokémon autour de lui\nen explosant, ce qui le met K.O. La puissance de\ncette attaque augmente si un champ brumeux est actif."
    it: "Chi la usa attacca tutti i Pokémon che ha intorno,\nma poi va KO. La potenza della mossa aumenta\nquando è attivo un Campo Nebbioso."
    de: "Der Anwender greift alle Pokémon im Umkreis an und\nwird danach kampfunfähig. Die Stärke dieser Attacke\nsteigt, wenn ein Nebelfeld aktiv ist."
    es: "Ataca a los Pokémon adyacentes, pero se debilita de\ninmediato. La potencia del movimiento aumenta si el\nterreno está cubierto por un campo de niebla."
    ko: "자신의 주위에 있는 모두를\n공격하지만 사용하면 기절한다.\n미스트필드일 때 위력이 올라간다."
    zh_simp: "对自己周围的所有宝可梦进行攻击，\n但使出后，自己会陷入昏厥。\n在薄雾场地上，招式威力会提高。"
    zh_trad: "對自己周圍的所有寶可夢進行攻擊，\n但使出後，自己會陷入瀕死。\n在薄霧場地時，招式威力會提高。"
misty_terrain:
  names:
    jp_kana: ミストフィールド
    jp_kanji: ミストフィールド
    en: Misty Terrain
    fr: Champ Brumeux
    it: Campo Nebbioso
    de: Nebelfeld
    es: Campo de Niebla
    ko: 미스트필드
    zh_simp: 薄雾场地
    zh_trad: 薄霧場地
  descriptions:
    jp_kana: "５ターンの　間　地面にいると\n状態異常に　ならず　ドラゴン技の\nダメージも　半分になる。"
    jp_kanji: "５ターンの　間　地面にいると\n状態異常に　ならず　ドラゴン技の\nダメージも　半分になる。"
    en: "This protects Pokémon on the ground from status\nconditions and halves damage from Dragon-type\nmoves for five turns."
    fr: "Pendant cinq tours, les Pokémon au sol ne peuvent\npas subir d’altération de statut et les dégâts infligés\npar les capacités de type Dragon sont divisés par deux."
    it: "Per cinque turni il terreno entra nello stato di Campo\nNebbioso: i Pokémon a terra sono immuni ai problemi\ndi stato e la potenza delle mosse Drago è dimezzata."
    de: "Schützt fünf Runden lang alle Pokémon, die den Boden\nberühren, vor Statusproblemen. Der erlittene Schaden\ndurch Drachen-Attacken wird halbiert."
    es: "Durante cinco turnos, los Pokémon que están en el\nsuelo no sufren problemas de estado y se reduce a la\nmitad el daño de los movimientos de tipo Dragón."
    ko: "5턴 동안 땅에 있으면\n상태 이상이 되지 않고\n드래곤타입 기술의 데미지도 절반이 된다."
    zh_simp: "在５回合内，\n地面上的宝可梦不会陷入异常状态。\n龙属性招式的伤害也会减半。"
    zh_trad: "在５回合內，\n地面上的寶可夢不會陷入異常狀態。\n龍屬性招式的傷害也會減半。"
moonblast:
  names:
    jp_kana: ムーンフォース
    jp_kanji: ムーンフォース
    en: Moonblast
    fr: Pouvoir Lunaire
    it: Forza Lunare
    de: Mondgewalt
    es: Fuerza Lunar
    ko: 문포스
    zh_simp: 月亮之力
    zh_trad: 月亮之力
  descriptions:
    jp_kana: "月の　パワーを　かりて\n相手を　攻撃する。　相手の\n特攻を　さげる　ことがある。"
    jp_kanji: "月の　パワーを　かりて\n相手を　攻撃する。　相手の\n特攻を　さげる　ことがある。"
    en: "Borrowing the power of the moon, the user attacks\nthe target. This may also lower the target’s Sp. Atk stat."
    fr: "Le lanceur attaque la cible grâce au pouvoir de la lune,\nce qui peut diminuer l’Attaque Spéciale de celle-ci."
    it: "Il Pokémon sfrutta il potere della luna per attaccare\nil bersaglio. Può anche ridurne l’Attacco Speciale."
    de: "Der Anwender macht sich die Kraft des Mondes\nzunutze, um anzugreifen. Gelegentlich wird dabei\nder Spezial-Angriff des Zieles gesenkt."
    es: "Invoca el poder de la luna para atacar al objetivo.\nPuede reducir su Ataque Especial."
    ko: "달의 파워를 빌려서\n상대를 공격한다. 상대의\n특수공격을 떨어뜨릴 때가 있다."
    zh_simp: "借用月亮的力量攻击对手。\n有时会降低对手的特攻。"
    zh_trad: "借用月亮的力量攻擊對手。\n有時會降低對手的特攻。"
moongeist_beam:
  names:
    jp_kana: シャドーレイ
    jp_kanji: シャドーレイ
    en: Moongeist Beam
    fr: Rayon Spectral
    it: Raggio d’Ombra
    de: Schattenstrahl
    es: Rayo Umbrío
    ko: 섀도레이
    zh_simp: 暗影之光
    zh_trad: 暗影之光
  descriptions:
    jp_kana: "怪しい　光線を　放って\n攻撃する。相手の　特性を\n無視して　攻撃　することが　できる。"
    jp_kanji: "怪しい　光線を　放って\n攻撃する。相手の　特性を\n無視して　攻撃　することが　できる。"
    en: "The user emits a sinister ray to attack the target.\nThis move can be used on the target regardless of\nits Ability."
    fr: "Le lanceur attaque avec un rayon de lumière mystérieux.\nIgnore le talent de la cible."
    it: "Il Pokémon proietta sul bersaglio un misterioso raggio di\nluce. Questo attacco può ignorare l’abilità del bersaglio."
    de: "Der Anwender greift mit einem unheimlichen Lichtstrahl\nan. Diese Attacke ignoriert die Fähigkeit des Zieles."
    es: "Ataca con un rayo misterioso que ignora la habilidad\ndel objetivo."
    ko: "괴상한 광선을 쏘아\n공격한다. 상대의 특성을\n무시하고 공격할 수 있다."
    zh_simp: "放出奇怪的光线攻击对手。\n可以无视对手的特性进行攻击。"
    zh_trad: "放出奇怪的光線攻擊對手。\n可不顧對手的特性進行攻擊。"
moonlight:
  names:
    jp_kana: つきのひかり
    jp_kanji: つきのひかり
    en: Moonlight
    fr: Rayon Lune
    it: Lucelunare
    de: Mondschein
    es: Luz Lunar
    ko: 달빛
    zh_simp: 月光
    zh_trad: 月光
  descriptions:
    jp_kana: "自分の　ＨＰを　回復する。\n天気に　よって\n回復の　量が　変化する。"
    jp_kanji: "自分の　ＨＰを　回復する。\n天気に　よって\n回復の　量が　変化する。"
    en: "The user restores its own HP. The amount of HP regained\nvaries with the weather."
    fr: "Un soin qui restaure des PV au lanceur.\nSon efficacité varie en fonction de la météo."
    it: "Il Pokémon recupera PS. Il numero di PS recuperati\ndipende dalle condizioni atmosferiche."
    de: "Füllt KP des Anwenders auf. Die Menge hängt vom\nWetter ab."
    es: "Restaura PS del usuario. La cantidad varía según\nel tiempo que haga."
    ko: "자신의 HP를 회복한다.\n날씨에 따라\n회복량이 변한다."
    zh_simp: "回复自己的ＨＰ。\n根据天气的不同，\n回复量也会有所变化。"
    zh_trad: "回復自己的ＨＰ。\n回復量會隨著天氣的不同\n而有所變化。"
morning_sun:
  names:
    jp_kana: あさのひざし
    jp_kanji: あさのひざし
    en: Morning Sun
    fr: Aurore
    it: Mattindoro
    de: Morgengrauen
    es: Sol Matinal
    ko: 아침햇살
    zh_simp: 晨光
    zh_trad: 晨光
  descriptions:
    jp_kana: "自分の　ＨＰを　回復する。\n天気に　よって\n回復の　量が　変化する。"
    jp_kanji: "自分の　ＨＰを　回復する。\n天気に　よって\n回復の　量が　変化する。"
    en: "The user restores its own HP. The amount of HP regained\nvaries with the weather."
    fr: "Un soin qui restaure des PV au lanceur.\nSon efficacité varie en fonction de la météo."
    it: "Il Pokémon recupera PS. Il numero di PS recuperati\ndipende dalle condizioni atmosferiche."
    de: "Füllt KP des Anwenders auf. Die Menge hängt vom\nWetter ab."
    es: "Restaura PS del usuario. La cantidad varía según\nel tiempo que haga."
    ko: "자신의 HP를 회복한다.\n날씨에 따라\n회복량이 변한다."
    zh_simp: "回复自己的ＨＰ。\n根据天气的不同，\n回复量也会有所变化。"
    zh_trad: "回復自己的ＨＰ。\n回復量會隨著天氣的不同\n而有所變化。"
mortal_spin:
  names:
    jp_kana: キラースピン
    jp_kanji: キラースピン
    en: Mortal Spin
    fr: Toupie Éclat
    it: Glitturbine
    de: Letalwirbler
    es: Giro Mortífero
    ko: 킬러스핀
    zh_simp: 晶光转转
    zh_trad: 晶光轉轉
  descriptions:
    jp_kana: "回転して　相手を　攻撃する。\nしめつける　まきつく　やどりぎのタネ　など\n吹きとばす。　相手を　毒状態に　する。"
    jp_kanji: "回転して　相手を　攻撃する。\nしめつける　まきつく　やどりぎのタネ　など\n吹きとばす。　相手を　毒状態に　する。"
    en: "The user performs a spin attack that can also eliminate\nthe effects of such moves as Bind, Wrap, and Leech\nSeed. This also poisons opposing Pokémon."
    fr: "Le lanceur attaque en tournant sur lui-même et\nempoisonne la cible. Il se libère également des effets\nde capacités comme Étreinte, Ligotage ou Vampigraine."
    it: "Attacco rotante che elimina gli effetti di mosse come\nLegatutto, Avvolgibotta e Parassiseme. Inoltre, avvelena\ngli avversari."
    de: "Der Anwender greift mit einer wirbelnden Attacke an,\ndie Gegner auch vergiftet. Befreit den Anwender unter\nanderem von Wickel, Klammergriff und Egelsamen."
    es: "Ataque giratorio que envenena al objetivo y anula los\nefectos de movimientos como Atadura, Constricción y\nDrenadoras."
    ko: "회전해서 상대를 공격한다.\n조이기, 김밥말이, 씨뿌리기 등의 효과를\n날려 버린다. 상대를 독 상태로 만든다."
    zh_simp: "通过旋转来攻击对手。\n可以摆脱绑紧、紧束、寄生种子\n等招式。还能让对手陷入中毒状态。"
    zh_trad: "藉由旋轉來攻擊對手。\n也可以擺脫綁緊、緊束、寄生種子等招式。\n讓對手陷入中毒狀態。"
mountain_gale:
  names:
    jp_kana: ひょうざんおろし
    jp_kanji: ひょうざんおろし
    en: Mountain Gale
    fr: Bise Glaciaire
    it: Soffio d’Iceberg
    de: Frostfallwind
    es: Viento Carámbano
    ko: 빙산바람
    zh_simp: 冰山风
    zh_trad: 冰山風
  descriptions:
    jp_kana: "氷山のような　大きな\n氷塊を　ぶつけて　攻撃する。\n相手を　ひるませることが　ある。"
    jp_kanji: "氷山のような　大きな\n氷塊を　ぶつけて　攻撃する。\n相手を　ひるませることが　ある。"
    en: "The user hurls giant chunks of ice at the target to inflict\ndamage. This may also make the target flinch."
    fr: "Le lanceur envoie un bloc de glace de la taille\nd’un iceberg sur la cible, ce qui peut aussi l’apeurer."
    it: "Il Pokémon attacca colpendo il bersaglio con un blocco\ndi ghiaccio grande come un iceberg. Può anche far\ntentennare il bersaglio."
    de: "Der Anwender wirft gigantische Eisbrocken auf das Ziel.\nDieses schreckt eventuell zurück."
    es: "Ataca con unos carámbanos grandes como icebergs que\npueden amedrentar al objetivo."
    ko: "빙산처럼 커다란\n얼음덩어리를 부딪쳐서 공격한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "将冰山般巨大的冰块\n砸向对手进行攻击。\n有时会使对手畏缩。"
    zh_trad: "將冰山般巨大的冰塊\n砸向對手進行攻擊。\n有時會使對手畏縮。"
mud_bomb:
  names:
    jp_kana: どろばくだん
    jp_kanji: どろばくだん
    en: Mud Bomb
    fr: Boue-Bombe
    it: Pantanobomba
    de: Schlammbombe
    es: Bomba Fango
    ko: 진흙폭탄
    zh_simp: 泥巴炸弹
    zh_trad: 泥巴炸彈
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
mud_shot:
  names:
    jp_kana: マッドショット
    jp_kanji: マッドショット
    en: Mud Shot
    fr: Tir de Boue
    it: Colpodifango
    de: Lehmschuss
    es: Disparo Lodo
    ko: 머드샷
    zh_simp: 泥巴射击
    zh_trad: 泥巴射擊
  descriptions:
    jp_kana: "泥の　塊を\n相手に　投げつけて　攻撃する。\n同時に　相手の　素早さを　さげる。"
    jp_kanji: "泥の　塊を\n相手に　投げつけて　攻撃する。\n同時に　相手の　素早さを　さげる。"
    en: "The user attacks by hurling a blob of mud at the target.\nThis also lowers the target’s Speed stat."
    fr: "Le lanceur attaque en projetant de la boue sur la cible,\nce qui réduit aussi la Vitesse de celle-ci."
    it: "Il Pokémon attacca lanciando fango sul bersaglio,\nriducendone anche la Velocità."
    de: "Angriff mit Lehm, der den Initiative-Wert des Zieles\nsenkt."
    es: "El usuario ataca lanzando una bola de lodo al objetivo\nque también reduce su Velocidad."
    ko: "진흙 덩어리를\n상대에게 내던져서 공격한다.\n동시에 상대의 스피드를 떨어뜨린다."
    zh_simp: "向对手投掷\n泥块进行攻击。\n同时降低对手的速度。"
    zh_trad: "向對手投擲\n泥塊進行攻擊。\n同時降低對手的速度。"
mud_slap:
  names:
    jp_kana: どろかけ
    jp_kanji: どろかけ
    en: Mud-Slap
    fr: Coud’Boue
    it: Fangosberla
    de: Lehmschelle
    es: Bofetón Lodo
    ko: 진흙뿌리기
    zh_simp: 掷泥
    zh_trad: 擲泥
  descriptions:
    jp_kana: "相手の　顔などに\n泥を　投げつけて　攻撃する。\n命中率を　さげる。"
    jp_kanji: "相手の　顔などに\n泥を　投げつけて　攻撃する。\n命中率を　さげる。"
    en: "The user hurls mud in the target’s face to inflict damage\nand lower its accuracy."
    fr: "Le lanceur envoie de la boue au visage de la cible\npour infliger des dégâts et baisser sa Précision."
    it: "Il Pokémon attacca buttando fango in faccia al bersaglio,\nriducendone la precisione."
    de: "Schadet dem Ziel durch Matsch. Dessen Genauigkeit\nsinkt."
    es: "Echa lodo en la cara del objetivo para infligirle daño\ny reducir su Precisión."
    ko: "상대의 얼굴 등에\n진흙을 내던져서 공격한다.\n명중률을 떨어뜨린다."
    zh_simp: "向对手的脸等\n投掷泥块进行攻击。\n会降低对手的命中率。"
    zh_trad: "向對手的臉等處\n投擲泥巴進行攻擊。\n可降低對手的命中率。"
mud_sport:
  names:
    jp_kana: どろあそび
    jp_kanji: どろあそび
    en: Mud Sport
    fr: Lance-Boue
    it: Fangata
    de: Lehmsuhler
    es: Chapoteo Lodo
    ko: 흙놀이
    zh_simp: 玩泥巴
    zh_trad: 玩泥巴
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
muddy_water:
  names:
    jp_kana: だくりゅう
    jp_kanji: だくりゅう
    en: Muddy Water
    fr: Ocroupi
    it: Fanghiglia
    de: Lehmbrühe
    es: Agua Lodosa
    ko: 탁류
    zh_simp: 浊流
    zh_trad: 濁流
  descriptions:
    jp_kana: "濁った　水を\n相手に　発射して　攻撃する。\n命中率を　さげることが　ある。"
    jp_kanji: "濁った　水を\n相手に　発射して　攻撃する。\n命中率を　さげることが　ある。"
    en: "The user attacks by shooting muddy water at opposing\nPokémon. This may also lower their accuracy."
    fr: "Le lanceur attaque en projetant de l’eau boueuse.\nPeut aussi réduire la Précision de la cible."
    it: "Il Pokémon attacca il bersaglio con un getto di fango\nche può anche ridurne la precisione."
    de: "Greift mit Matsch an und senkt eventuell die\nGenauigkeit der gegnerischen Pokémon."
    es: "Ataque con agua lodosa que puede reducir la Precisión\ndel objetivo."
    ko: "탁해진 물을\n상대에게 발사하여 공격한다.\n명중률을 떨어뜨릴 때가 있다."
    zh_simp: "向对手喷射\n浑浊的水进行攻击。\n有时会降低对手的命中率。"
    zh_trad: "用渾濁的污水攻擊對手。\n有時會降低對手的命中率。"
multi_attack:
  names:
    jp_kana: マルチアタック
    jp_kanji: マルチアタック
    en: Multi-Attack
    fr: Coup Varia-Type
    it: Multiattacco
    de: Multi-Angriff
    es: Multiataque
    ko: 멀티어택
    zh_simp: 多属性攻击
    zh_trad: 多屬性攻擊
  descriptions:
    jp_kana: "高い　エネルギーを　まといつつ\n相手に　ぶつかって　攻撃する。\nメモリに　より　タイプが　変わる。"
    jp_kanji: "高い　エネルギーを　まといつつ\n相手に　ぶつかって　攻撃する。\nメモリに　より　タイプが　変わる。"
    en: "Cloaking itself in powerful energy, the user slams into\nthe target to inflict damage. This move’s type changes\ndepending on the kind of memory disc held by the user."
    fr: "Le Pokémon s’entoure d’une puissante énergie\navant de foncer sur sa cible. Le type de la capacité\ndépend de la ROM installée."
    it: "Il Pokémon si avvolge in un potente campo energetico\ne attacca scontrandosi contro il bersaglio. Il tipo della\nmossa varia in base alla ROM installata."
    de: "Der Anwender sammelt eine große Menge Energie und\ngreift das Ziel damit an. Der Typ der Attacke hängt von\ndem der Disc ab."
    es: "El Pokémon se rodea de una potente energía con la que\ngolpea al objetivo. El tipo del movimiento depende del\ndisco que lleva el usuario."
    ko: "높은 에너지를 둘러싸\n상대에게 부딪쳐 공격한다.\n메모리에 따라 타입이 바뀐다."
    zh_simp: "一边覆盖高能量，\n一边撞向对手进行攻击。\n根据存储碟不同，属性会改变。"
    zh_trad: "讓強大能量圍繞全身，\n撞向對手進行攻擊。\n招式屬性會隨著記憶碟而改變。"
mystical_fire:
  names:
    jp_kana: マジカルフレイム
    jp_kanji: マジカルフレイム
    en: Mystical Fire
    fr: Feu Ensorcelé
    it: Magifiamma
    de: Magieflamme
    es: Llama Embrujada
    ko: 매지컬플레임
    zh_simp: 魔法火焰
    zh_trad: 魔法火焰
  descriptions:
    jp_kana: "口から　吐きだす　特別\n熱い　炎で　攻撃する。\n相手の　特攻を　さげる。"
    jp_kanji: "口から　吐きだす　特別\n熱い　炎で　攻撃する。\n相手の　特攻を　さげる。"
    en: "The user attacks by breathing a special, hot fire.\nThis also lowers the target’s Sp. Atk stat."
    fr: "Le lanceur attaque en soufflant des flammes brûlantes\npar la bouche et diminue l’Attaque Spéciale de la cible."
    it: "Il Pokémon attacca il bersaglio soffiandogli contro\ndelle fiammate incredibilmente roventi, riducendone\nl’Attacco Speciale."
    de: "Der Anwender greift das Ziel an, indem er ihm\neine besondere, heiße Flamme entgegenbläst.\nDer Spezial-Angriff des Zieles sinkt."
    es: "El usuario lanza por la boca una singular llama a gran\ntemperatura con la que ataca a su objetivo y reduce\nsu Ataque Especial."
    ko: "입에서 내뱉는 아주\n뜨거운 불꽃으로 공격한다.\n상대의 특수공격을 떨어뜨린다."
    zh_simp: "从口中喷出特别灼热的\n火焰进行攻击。\n降低对手的特攻。"
    zh_trad: "從口中吐出特別灼熱的\n火焰進行攻擊。\n可降低對手的特攻。"
mystical_power:
  names:
    jp_kana: しんぴのちから
    jp_kanji: しんぴのちから
    en: Mystical Power
    fr: Force Mystique
    it: Forza Mistica
    de: Mythenkraft
    es: Poder Místico
    ko: 신비의힘
    zh_simp: 神秘之力
    zh_trad: 神秘之力
  descriptions:
    jp_kana: "不思議な力を　放出して　攻撃する。\n自分の　特攻が　あがる。"
    jp_kanji: "不思議な力を　放出して　攻撃する。\n自分の　特攻が　あがる。"
    en: "The user attacks by emitting a mysterious power.\nThis also boosts the user’s Sp. Atk stat."
    fr: "Le lanceur attaque en libérant un pouvoir mystique.\nCela augmente également son Attaque Spéciale."
    it: "Il Pokémon attacca emettendo un misterioso potere.\nInoltre, aumenta il proprio Attacco Speciale."
    de: "Der Anwender greift mit einer wundersamen Kraft an.\nAußerdem steigt sein Spezial-Angriff."
    es: "Ataca desatando un misterioso poder, que también\naumenta su Ataque Especial."
    ko: "신비한 힘을 방출해서 공격한다.\n자신의 특수공격이 올라간다."
    zh_simp: "放出不可思议的力量攻击。\n会提高自己的特攻。"
    zh_trad: "放出不可思議的力量進行攻擊。\n自己的特攻會提高。"
nasty_plot:
  names:
    jp_kana: わるだくみ
    jp_kanji: わるだくみ
    en: Nasty Plot
    fr: Machination
    it: Congiura
    de: Ränkeschmied
    es: Maquinación
    ko: 나쁜음모
    zh_simp: 诡计
    zh_trad: 詭計
  descriptions:
    jp_kana: "悪いことを　考えて\n頭を　活性化させる。\n自分の　特攻を　ぐーんと　あげる。"
    jp_kanji: "悪いことを　考えて\n頭を　活性化させる。\n自分の　特攻を　ぐーんと　あげる。"
    en: "The user stimulates its brain by thinking bad thoughts.\nThis sharply boosts the user’s Sp. Atk stat."
    fr: "Stimule l’esprit par de mauvaises pensées.\nAugmente beaucoup l’Attaque Spéciale du lanceur."
    it: "Il Pokémon stimola il cervello pensando a cose\ncattive. Aumenta di molto l’Attacco Speciale."
    de: "Anwender stimuliert sein Gehirn und hat finstere\nGedanken. Erhöht Spezial-Angriff stark."
    es: "Estimula su cerebro pensando en cosas malas.\nAumenta mucho el Ataque Especial."
    ko: "나쁜 일을 생각해서\n머리를 활성화시킨다.\n자신의 특수공격을 크게 올린다."
    zh_simp: "谋划诡计，激活头脑。\n大幅提高自己的特攻。"
    zh_trad: "動歪腦筋，活化大腦。\n大幅提高自己的特攻。"
natural_gift:
  names:
    jp_kana: しぜんのめぐみ
    jp_kanji: しぜんのめぐみ
    en: Natural Gift
    fr: Don Naturel
    it: Dononaturale
    de: Beerenkräfte
    es: Don Natural
    ko: 자연의은혜
    zh_simp: 自然之恩
    zh_trad: 自然之恩
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
