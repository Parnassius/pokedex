no_retreat:
  names:
    jp_kana: はいすいのじん
    jp_kanji: はいすいのじん
    en: No Retreat
    fr: Ultime Bastion
    it: Spalle al Muro
    de: Finalformation
    es: Bastión Final
    ko: 배수의진
    zh_simp: 背水一战
    zh_trad: 背水一戰
  descriptions:
    jp_kana: "自分の　すべての\n能力が　上がるが　交代　したり\n逃げることが　できなくなる。"
    jp_kanji: "自分の　すべての\n能力が　上がるが　交代　したり\n逃げることが　できなくなる。"
    en: "This move boosts all the user’s stats but prevents\nthe user from switching out or fleeing."
    fr: "Le lanceur voit toutes ses stats augmenter, mais\nen contrepartie, il ne peut plus quitter le terrain."
    it: "Il Pokémon aumenta tutte le sue statistiche ma non\npuò più fuggire o essere sostituito."
    de: "Alle Statuswerte des Anwenders werden erhöht,\naber dafür kann er nicht fliehen oder ausgewechselt\nwerden."
    es: "El usuario aumenta todas sus características, pero ya no\npuede huir ni ser cambiado por otro."
    ko: "자신의 모든 능력이\n올라가지만 교체하거나\n도망칠 수 없게 된다."
    zh_simp: "提高自己的所有能力，\n但无法替换或逃走。"
    zh_trad: "提高自己所有的能力，\n但無法進行替換或逃走。"
noble_roar:
  names:
    jp_kana: おたけび
    jp_kanji: おたけび
    en: Noble Roar
    fr: Râle Mâle
    it: Urlo
    de: Kampfgebrüll
    es: Rugido de Guerra
    ko: 부르짖기
    zh_simp: 战吼
    zh_trad: 戰吼
  descriptions:
    jp_kana: "おたけびを　あげて\n相手を　威嚇し　相手の\n攻撃と　特攻を　さげる。"
    jp_kanji: "おたけびを　あげて\n相手を　威嚇し　相手の\n攻撃と　特攻を　さげる。"
    en: "Letting out a noble roar, the user intimidates the target\nand lowers the target’s Attack and Sp. Atk stats."
    fr: "Le lanceur pousse un rugissement qui intimide la cible\net diminue l’Attaque et l’Attaque Spéciale de celle-ci."
    it: "Il Pokémon emette un urlo potente che intimidisce\nil bersaglio, riducendone l’Attacco e l’Attacco\nSpeciale."
    de: "Der Anwender stößt ein Kampfgebrüll aus, das das\nZiel einschüchtert und zugleich seinen Angriffs- und\nSpezial-Angriffs-Wert senkt."
    es: "Intimida a su objetivo con un rugido de guerra, lo que\nreduce tanto su Ataque como su Ataque Especial."
    ko: "우렁차게 부르짖어서\n상대를 위협하여 상대의 공격과\n특수공격을 떨어뜨린다."
    zh_simp: "发出战吼威吓对手，\n从而降低对手的攻击和特攻。"
    zh_trad: "發出戰吼威嚇對手，\n降低對手的\n攻擊和特攻。"
noxious_torque:
  names:
    jp_kana: ポイズンアクセル
