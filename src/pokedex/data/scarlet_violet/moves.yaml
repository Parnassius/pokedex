    jp_kanji: "全力で　踊って　攻撃する。\nこの　技の　タイプは\n自分の　タイプと　同じになる。"
    en: "The user attacks the target by dancing with all its might.\nThis move becomes the same type as the user’s type."
    fr: "Le lanceur attaque en dansant avec enthousiasme.\nLe type de la capacité est le même que celui du lanceur."
    it: "Il Pokémon si lancia in una danza e attacca con tutte\nle sue forze. Il tipo della mossa corrisponde al tipo\ndi chi la usa."
    de: "Der Anwender tanzt und greift dabei das Ziel mit voller\nKraft an. Die Attacke hat denselben Typ wie das\nPokémon, das sie einsetzt."
    es: "Ataque que consiste en un baile muy enérgico. El tipo\nde este ataque se corresponde con el del usuario."
    ko: "전력으로 춤추며 공격한다.\n이 기술의 타입은\n자신의 타입과 같아진다."
    zh_simp: "全力跳舞进行攻击。\n此招式的属性将\n变得和自己的属性相同。"
    zh_trad: "全力跳舞進行攻擊。\n此招式的屬性將\n變得和自己的屬性相同。"
