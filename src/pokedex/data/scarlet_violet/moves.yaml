twister:
  names:
    jp_kana: たつまき
    jp_kanji: たつまき
    en: Twister
    fr: Ouragan
    it: Tornado
    de: Windhose
    es: Ciclón
    ko: 회오리
    zh_simp: 龙卷风
    zh_trad: 龍捲風
  descriptions:
    jp_kana: "竜巻を　おこして\n相手を　まきこみ　攻撃する。\n相手を　ひるませることが　ある。"
    jp_kanji: "竜巻を　おこして\n相手を　まきこみ　攻撃する。\n相手を　ひるませることが　ある。"
    en: "The user whips up a vicious tornado to tear at opposing\nPokémon. This may also make them flinch."
    fr: "Le lanceur déclenche un terrible ouragan sur la cible,\nce qui peut aussi apeurer celle-ci."
    it: "Il Pokémon attacca scatenando un potente tornado\nche si abbatte sul bersaglio. Può anche farlo tentennare."
    de: "Trifft gegnerische Pokémon mit einem heftigen\nWirbelsturm, was diese eventuell zurückschrecken\nlässt."
    es: "Crea un violento tornado para hacer trizas al objetivo.\nPuede amedrentarlo."
    ko: "회오리를 일으켜\n상대를 휩쓸어 공격한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "兴起龙卷风，\n将对手卷入进行攻击。\n有时会使对手畏缩。"
    zh_trad: "刮起龍捲風，\n將對手捲入進行攻擊。\n有時會使對手畏縮。"
u_turn:
  names:
    jp_kana: とんぼがえり
    jp_kanji: とんぼがえり
    en: U-turn
    fr: Demi-Tour
    it: Retromarcia
    de: Kehrtwende
    es: Ida y Vuelta
    ko: 유턴
    zh_simp: 急速折返
    zh_trad: 急速折返
  descriptions:
    jp_kana: "攻撃したあと\nものすごい　スピードで　もどってきて\n控えの　ポケモンと　入れ替わる。"
    jp_kanji: "攻撃したあと\nものすごい　スピードで　もどってきて\n控えの　ポケモンと　入れ替わる。"
    en: "After making its attack, the user rushes back to switch\nplaces with a party Pokémon in waiting."
    fr: "Après son attaque, le lanceur revient à toute vitesse\net change de place avec un Pokémon de l’équipe\nprêt à combattre."
    it: "Il Pokémon fa marcia indietro per farsi sostituire\nsubito dopo aver sferrato l’attacco."
    de: "Nach der Attacke eilt der Anwender zurück und\ntauscht den Platz mit einem anderen Pokémon."
    es: "Tras atacar, el usuario vuelve a toda prisa para dar paso\na otro Pokémon del equipo."
    ko: "공격한 뒤\n굉장한 스피드로 돌아와서\n교대 포켓몬과 교체한다."
    zh_simp: "在攻击之后急速返回，\n和后备宝可梦进行替换。"
    zh_trad: "攻擊後迅速返回，\n和後備寶可夢進行替換。"
upper_hand:
  names:
    jp_kana: はやてがえし
    jp_kanji: はやてがえし
    en: Upper Hand
    fr: Prio-Parade
    it: Colpo di Mano
    de: Schnellkonter
    es: Palma Rauda
    ko: 기선제압
    zh_simp: 快手还击
    zh_trad: 快手還擊
  descriptions:
    jp_kana: "動きに　反応して　掌底を　打ちこみ\n相手を　ひるませる。　相手が　だす技が\n先制攻撃でないと　失敗する。"
    jp_kanji: "動きに　反応して　掌底を　打ちこみ\n相手を　ひるませる。　相手が　だす技が\n先制攻撃でないと　失敗する。"
    en: "The user reacts to the target’s movement and strikes\nwith the heel of its palm, making the target flinch. This\nmove fails if the target is not readying a priority move."
    fr: "Le lanceur réagit instinctivement au moindre mouvement\net donne un coup de paume qui apeure la cible. Échoue\nsi cette dernière n’a pas utilisé une attaque prioritaire."
    it: "Il Pokémon reagisce al movimento del bersaglio e,\ncolpendo con il palmo, lo fa tentennare. Se il bersaglio\nnon sferra un attacco ad alta priorità, la mossa fallisce."
    de: "Der Anwender reagiert auf Bewegungen des Zieles und\nlässt es durch einen Schlag zurückschrecken. Gelingt nur,\nwenn das Ziel gerade eine Erstschlag-Attacke vorbereitet."
    es: "Se anticipa al objetivo golpeándolo rápidamente con\nla palma y lo amedrenta. Falla si el objetivo no está\npreparando un movimiento de prioridad alta."
    ko: "움직임에 반응하여 손바닥으로 밀쳐서\n상대를 풀죽게 한다. 상대가 쓴 기술이\n선제공격 기술이 아니면 실패한다."
    zh_simp: "察觉到对手的动作后用掌根攻击，\n让对手畏缩。如果对手使出的招式\n不是先制攻击，则会失败。"
    zh_trad: "察覺對手動作並以掌底攻擊來反應，\n讓對手畏縮。若對手使用的招式\n不是先制攻擊則會失敗。"
uproar:
  names:
    jp_kana: さわぐ
    jp_kanji: さわぐ
    en: Uproar
    fr: Brouhaha
    it: Baraonda
    de: Aufruhr
    es: Alboroto
    ko: 소란피기
    zh_simp: 吵闹
    zh_trad: 吵鬧
  descriptions:
    jp_kana: "３ターンの　間\n騒いで　相手を　攻撃する。\nそのあいだは　だれも　眠れなくなる。"
    jp_kanji: "３ターンの　間\n騒いで　相手を　攻撃する。\nそのあいだは　だれも　眠れなくなる。"
    en: "The user attacks in an uproar for three turns. During that\ntime, no Pokémon can fall asleep."
    fr: "Le lanceur attaque en rugissant durant trois tours.\nPendant ce temps, aucun Pokémon ne peut s’endormir."
    it: "Il Pokémon attacca per tre turni con un frastuono\nche non fa dormire nessuno."
    de: "Anwender greift an, indem er über drei Runden hinweg\neinen Aufruhr erzeugt. Verhindert Schlaf."
    es: "Ataca de forma alborotada durante tres turnos.\nMantiene despiertos a todos."
    ko: "3턴 동안\n소란 피워 공격한다.\n그동안은 아무도 잠들지 않게 된다."
    zh_simp: "在３回合内\n大吵大闹攻击对手。\n在此期间谁都不能入眠。"
    zh_trad: "在３回合內\n大吵大鬧攻擊對手。\n在此期間誰都無法入眠。"
v_create:
  names:
    jp_kana: Ｖジェネレート
    jp_kanji: Ｖジェネレート
    en: V-create
    fr: Coup Victoire
    it: Generatore V
    de: V-Generator
    es: V de Fuego
    ko: V제너레이트
    zh_simp: Ｖ热焰
    zh_trad: Ｖ熱焰
  descriptions:
    jp_kana: "灼熱の　炎を　額から\n発生させて　捨て身の　体当たり。\n防御　特防　素早さが　さがる。"
    jp_kanji: "灼熱の　炎を　額から\n発生させて　捨て身の　体当たり。\n防御　特防　素早さが　さがる。"
    en: "The user emits a hot flame from its forehead and hurls\nitself at the target to inflict damage. This also lowers the\nuser’s Defense, Sp. Def, and Speed stats."
    fr: "Le lanceur fait jaillir des flammes ardentes de son front\net se jette sur la cible, ce qui baisse la Défense,\nla Défense Spéciale et la Vitesse du lanceur."
    it: "Il Pokémon carica emettendo fiamme ardenti\ndalla fronte, a costo di una riduzione di Difesa,\nDifesa Speciale e Velocità."
    de: "Eine Verzweiflungsattacke. Anwender entfacht glühend\nheißes Feuer. Senkt dessen Verteidigung,\nSpezial-Verteidigung und Initiative."
    es: "De su frente mana una ardiente llama con la que se\narroja contra el objetivo. Reduce la Defensa, la Defensa\nEspecial y la Velocidad del usuario."
    ko: "작열하는 불꽃을 이마에서\n발생시켜 이판사판으로 몸통박치기한다.\n방어, 특수방어, 스피드가 떨어진다."
    zh_simp: "从前额产生灼热的火焰，\n舍身撞击对手。\n防御、特防和速度会降低。"
    zh_trad: "在前額產生灼熱的火焰，\n然後捨身撞擊對手。\n自己的防禦、特防和速度會降低。"
vacuum_wave:
  names:
    jp_kana: しんくうは
    jp_kanji: しんくうは
    en: Vacuum Wave
    fr: Onde Vide
    it: Vuotonda
    de: Vakuumwelle
    es: Onda Vacío
    ko: 진공파
    zh_simp: 真空波
    zh_trad: 真空波
  descriptions:
    jp_kana: "こぶしを　ふって\n真空の　波を　まきおこす。\n必ず　先制攻撃できる。"
    jp_kanji: "こぶしを　ふって\n真空の　波を　まきおこす。\n必ず　先制攻撃できる。"
    en: "The user whirls its fists to send a wave of pure vacuum at\nthe target. This move always goes first."
    fr: "Le lanceur agite son poing pour projeter une onde\nde vide. Frappe en priorité."
    it: "Il Pokémon rotea i pugni per lanciare un’onda di vuoto\nassoluto verso il bersaglio. Questo attacco ha priorità\nalta."
    de: "Erstschlag-Attacke, bei der ein Faustwirbel eine\nVakuumwelle auf das Ziel sendet."
    es: "Gira los puños y libera una onda de vacío contra el\nobjetivo. Este movimiento tiene prioridad alta."
    ko: "주먹을 휘둘러\n진공의 파도를 일으킨다.\n반드시 선제공격을 할 수 있다."
    zh_simp: "挥动拳头，\n掀起真空波。\n必定能够先制攻击。"
    zh_trad: "揮動拳頭，\n捲起真空波。\n必定能夠發動先制攻擊。"
veevee_volley:
  names:
    jp_kana: ブイブイブレイク
    jp_kanji: ブイブイブレイク
