    fr: Piqué
    it: Aeroattacco
    de: Himmelsfeger
    es: Ataque Aéreo
    ko: 불새
    zh_simp: 神鸟猛击
    zh_trad: 神鳥猛擊
  descriptions:
    jp_kana: "２ターン目に　相手を　攻撃する。\nたまに　ひるませる。\n急所にも　当たりやすい。"
    jp_kanji: "２ターン目に　相手を　攻撃する。\nたまに　ひるませる。\n急所にも　当たりやすい。"
    en: "The user attacks the turn after using this move. This move\nhas a heightened chance of landing a critical hit and may\nalso make the target flinch."
    fr: "Une attaque en deux tours au taux de critiques élevé,\nqui peut aussi apeurer la cible."
    it: "Attacco in due turni e probabile brutto colpo.\nPuò anche far tentennare il bersaglio."
    de: "Anwender greift in der zweiten Runde mit hoher\nVolltrefferquote an. Ziel schreckt eventuell zurück."
    es: "Ataca en el segundo turno y suele asestar un golpe\ncrítico. También puede amedrentar al objetivo."
    ko: "2턴째에 상대를 공격한다.\n가끔 풀죽게 만든다.\n급소에도 맞기 쉽다."
    zh_simp: "第２回合攻击对手。\n偶尔使对手畏缩。\n也容易击中要害。"
    zh_trad: "在使用後的下一回合進行攻擊。\n有時會使對手畏縮。\n且容易擊中要害。"
