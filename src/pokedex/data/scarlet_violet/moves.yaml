    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
conversion:
  names:
    jp_kana: テクスチャー
    jp_kanji: テクスチャー
    en: Conversion
    fr: Conversion
    it: Conversione
    de: Umwandlung
    es: Conversión
    ko: 텍스처
    zh_simp: 纹理
    zh_trad: 紋理
  descriptions:
    jp_kana: "自分の　タイプを\nおぼえている　技で　一番　上の\n技と　同じ　タイプに　する。"
    jp_kanji: "自分の　タイプを\nおぼえている　技で　一番　上の\n技と　同じ　タイプに　する。"
    en: "The user changes its type to become the same type\nas the move at the top of the list of moves it knows."
    fr: "Le lanceur change de type pour prendre celui\nde la première capacité de sa liste."
    it: "Il tipo del Pokémon muta in quello della prima mossa\nnella lista delle sue mosse."
    de: "Wandelt den Typ des Anwenders in den Typ seiner\nersten Attacke um."
    es: "Cambia el tipo del usuario por el del primer movimiento\nen su lista."
    ko: "자신의 타입을 배운 기술 중\n가장 위에 있는 기술과\n같은 타입으로 바꾼다."
    zh_simp: "将自己的属性转换成\n和已学会的招式中\n第一个招式相同的属性。"
    zh_trad: "將自己的屬性轉換成\n與已學會的招式中\n第１個招式相同的屬性。"
conversion_2:
  names:
    jp_kana: テクスチャー２
    jp_kanji: テクスチャー２
    en: Conversion 2
    fr: Conversion 2
    it: Conversione2
    de: Umwandlung 2
    es: Conversión2
    ko: 텍스처2
    zh_simp: 纹理２
    zh_trad: 紋理２
  descriptions:
    jp_kana: "相手が　最後に　使った技に\n抵抗できる　ように\n自分の　タイプを　変化させる。"
    jp_kanji: "相手が　最後に　使った技に\n抵抗できる　ように\n自分の　タイプを　変化させる。"
    en: "The user changes its type to make itself resistant to\nthe type of the move the target used last."
    fr: "Le lanceur change de type pour être résistant au type\nde la dernière attaque lancée par sa cible."
    it: "Il Pokémon cambia tipo per rendersi resistente\nal tipo dell’ultima mossa usata dal bersaglio."
    de: "Anwender ändert Typ und wird gegen letzten\nAngriffstyp resistent."
    es: "El usuario cambia de tipo para hacerse resistente al\ntipo del último movimiento usado por el objetivo."
    ko: "상대가 마지막으로 쓴 기술에\n저항할 수 있도록\n자신의 타입을 변화시킨다."
    zh_simp: "为了可以抵抗对手\n最后使用的招式，\n从而使自己的属性发生变化。"
    zh_trad: "改變屬性，\n讓自己能夠抵抗對手\n最近一次使出的招式。"
copycat:
  names:
    jp_kana: まねっこ
    jp_kanji: まねっこ
    en: Copycat
    fr: Photocopie
    it: Copione
    de: Imitator
    es: Copión
    ko: 흉내쟁이
    zh_simp: 仿效
    zh_trad: 仿效
  descriptions:
    jp_kana: "直前に　でた　技を　まねして\n同じ　技を　だす。\n技が　でていないと　失敗する。"
    jp_kanji: "直前に　でた　技を　まねして\n同じ　技を　だす。\n技が　でていないと　失敗する。"
    en: "The user mimics the move used immediately before it.\nThis move fails if no other move has been used yet."
    fr: "Le lanceur imite la dernière capacité employée.\nÉchoue si aucune capacité n’a été utilisée."
    it: "Il Pokémon mima l’ultima mossa eseguita.\nFallisce se non è stata ancora usata alcuna\nmossa."
    de: "Anwender imitiert die gerade verwendete Attacke.\nDies schlägt fehl, falls zuvor keine Attacke\nverwendet wurde."
    es: "Imita el movimiento usado justo antes. El movimiento\nfalla si no se ha usado aún ninguno."
    ko: "직전에 나온 기술을 흉내 내어\n같은 기술을 쓴다.\n아무런 기술이 사용되지 않았다면 실패한다."
    zh_simp: "模仿对手刚才使出的招式，\n并使出相同招式。\n如果对手还没出招则会失败。"
    zh_trad: "模仿對手最近一次使用的招式，\n若對手沒有成功出招則會失敗。"
core_enforcer:
  names:
    jp_kana: コアパニッシャー
    jp_kanji: コアパニッシャー
    en: Core Enforcer
    fr: Sanction Suprême
    it: Nucleocastigo
    de: Sanktionskern
    es: Núcleo Castigo
    ko: 코어퍼니셔
    zh_simp: 核心惩罚者
    zh_trad: 核心懲罰者
  descriptions:
    jp_kana: "ダメージを　与えた　相手が\nすでに　行動を　終えていたら\n相手の　特性を　消してしまう。"
    jp_kanji: "ダメージを　与えた　相手が\nすでに　行動を　終えていたら\n相手の　特性を　消してしまう。"
    en: "If the Pokémon damaged by this move have already\nused their moves that turn, this move eliminates the\neffects of those Pokémon’s Abilities."
    fr: "La cible subit des dégâts et, si elle a déjà agi pendant\nce tour, elle perd aussi son talent."
    it: "Il bersaglio subisce dei danni e, se ha già agito\nnel turno, perde la sua abilità."
    de: "Hat das gegnerische Pokémon, das durch diese Attacke\nSchaden genommen hat, in dieser Runde bereits\ngehandelt, verliert es seine Fähigkeit."
    es: "Inflige daño al objetivo y, si este ya ha hecho uso de\nalgún movimiento, pierde su habilidad."
    ko: "데미지를 준 상대가\n이미 행동을 끝냈다면\n상대의 특성을 없애 버린다."
    zh_simp: "如果给予过伤害的对手\n已经结束行动，\n其特性就会被消除。"
    zh_trad: "如果攻擊的對手在該回合\n已經結束行動，\n對手的特性就會被消除。"
corkscrew_crash:physical:
  names:
    jp_kana: ちょうぜつらせんれんげき
    jp_kanji: ちょうぜつらせんれんげき
    en: Corkscrew Crash
    fr: Vrille Maximum
    it: Spirale Perforante
    de: Turbo-Spiralkombo
    es: Hélice Trepanadora
    ko: 초월나선연격
    zh_simp: 超绝螺旋连击
    zh_trad: 超絕螺旋連擊
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
