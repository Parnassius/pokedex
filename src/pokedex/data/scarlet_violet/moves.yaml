10_000_000_volt_thunderbolt:
  names:
    jp_kana: １０００まんボルト
    jp_kanji: １０００まんボルト
    en: 10,000,000 Volt Thunderbolt
    fr: Giga-Tonnerre
    it: Iperfulmine
    de: Tausendfacher Donnerblitz
    es: Gigarrayo Fulminante
    ko: 1000만볼트
    zh_simp: 千万伏特
    zh_trad: 千萬伏特
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
absorb:
  names:
    jp_kana: すいとる
    jp_kanji: すいとる
    en: Absorb
    fr: Vole-Vie
    it: Assorbimento
    de: Absorber
    es: Absorber
    ko: 흡수
    zh_simp: 吸取
    zh_trad: 吸取
  descriptions:
    jp_kana: "養分を　吸い取り　攻撃する。\n相手に　与えた　ダメージの\n半分の　ＨＰを　回復できる。"
    jp_kanji: "養分を　吸い取り　攻撃する。\n相手に　与えた　ダメージの\n半分の　ＨＰを　回復できる。"
    en: "A nutrient-draining attack. The user’s HP is restored\nby up to half the damage taken by the target."
    fr: "Une attaque qui absorbe les nutriments et convertit\nla moitié des dégâts infligés en PV pour le lanceur."
    it: "Il Pokémon attacca assorbendo sostanze nutritive e\nrecupera una quantità di PS pari alla metà del danno\ninflitto."
    de: "Entzieht dem Ziel Nährstoffe. Die Hälfte des\nzugefügten Schadens wird dem Anwender\nals KP gutgeschrieben."
    es: "Un ataque que absorbe nutrientes. El usuario recupera\nla mitad de los PS del daño que produce."
    ko: "양분을 흡수하여 공격한다.\n상대에게 입힌 데미지의\n절반에 해당하는 HP를 회복할 수 있다."
    zh_simp: "吸取对手的养分进行攻击。\n可以回复给予对手\n伤害的一半ＨＰ。"
    zh_trad: "吸取對手的養分進行攻擊。\n可以回復給予對手\n傷害的一半ＨＰ。"
accelerock:
  names:
    jp_kana: アクセルロック
    jp_kanji: アクセルロック
    en: Accelerock
    fr: Vif Roc
    it: Rocciarapida
    de: Turbofelsen
    es: Roca Veloz
    ko: 액셀록
    zh_simp: 冲岩
    zh_trad: 衝岩
  descriptions:
    jp_kana: "素早い　スピードで\n相手に　ぶつかって　攻撃する。\n必ず　先制攻撃　できる。"
    jp_kanji: "素早い　スピードで\n相手に　ぶつかって　攻撃する。\n必ず　先制攻撃　できる。"
    en: "The user smashes into the target at high speed.\nThis move always goes first."
    fr: "Le lanceur charge la cible à toute vitesse.\nFrappe en priorité."
    it: "Il Pokémon attacca il bersaglio colpendolo a tutta\nvelocità. Questo attacco ha priorità alta."
    de: "Bei dieser Erstschlag-Attacke prallt der Anwender mit\ngroßer Geschwindigkeit auf das Ziel."
    es: "El usuario se lanza contra el objetivo a gran velocidad.\nEste movimiento tiene prioridad alta."
    ko: "재빠른 스피드로\n상대에게 부딪쳐서 공격한다.\n반드시 선제공격할 수 있다."
    zh_simp: "迅速撞向对手进行攻击。\n必定能够先制攻击。"
    zh_trad: "迅速撞向對手進行攻擊。\n必定能夠發動先制攻擊。"
acid:
  names:
    jp_kana: ようかいえき
    jp_kanji: ようかいえき
    en: Acid
    fr: Acide
    it: Acido
    de: Säure
    es: Ácido
    ko: 용해액
    zh_simp: 溶解液
    zh_trad: 溶解液
  descriptions:
    jp_kana: "強い　酸を　相手に　かけて\n攻撃する。　相手の　特防を\nさげることが　ある。"
    jp_kanji: "強い　酸を　相手に　かけて\n攻撃する。　相手の　特防を\nさげることが　ある。"
    en: "Opposing Pokémon are attacked with a spray of harsh\nacid. This may also lower their Sp. Def stats."
    fr: "Le lanceur attaque la cible avec un jet d’acide\ncorrosif qui peut aussi baisser sa Défense Spéciale."
    it: "Il Pokémon attacca il bersaglio spruzzando un acido\ncorrosivo. Può anche ridurne la Difesa Speciale."
    de: "Versprüht ätzende Flüssigkeit, die eventuell die\nSpezial-Verteidigung der gegnerischen Pokémon senkt."
    es: "Rocía al objetivo con un ácido corrosivo. Puede reducir\nla Defensa Especial."
    ko: "강한 산을 상대에게 끼얹어\n공격한다. 상대의 특수방어를\n떨어뜨릴 때가 있다."
    zh_simp: "将强酸泼向对手进行攻击。\n有时会降低对手的特防。"
    zh_trad: "將強酸潑向對手進行攻擊。\n有時會降低對手的特防。"
acid_armor:
  names:
    jp_kana: とける
    jp_kanji: とける
    en: Acid Armor
    fr: Acidarmure
    it: Scudo Acido
    de: Säurepanzer
    es: Armadura Ácida
    ko: 녹기
    zh_simp: 溶化
    zh_trad: 溶化
  descriptions:
    jp_kana: "細胞の　変化で　液状に　なり\n自分の　防御を　ぐーんと　あげる。"
    jp_kanji: "細胞の　変化で　液状に　なり\n自分の　防御を　ぐーんと　あげる。"
    en: "The user alters its cellular structure to liquefy itself,\nsharply boosting its Defense stat."
    fr: "Le lanceur modifie sa structure moléculaire pour\nse liquéfier et beaucoup augmenter sa Défense."
    it: "Il Pokémon altera la sua struttura cellulare passando\nallo stato liquido e aumentando di molto la sua Difesa."
    de: "Verflüssigt Körperzellen des Anwenders. Erhöht den\nVerteidigungs-Wert stark."
    es: "Transforma su estructura celular para hacerse líquido y\naumentar mucho la Defensa."
    ko: "세포의 변화로 액체가 되어\n자신의 방어를 크게 올린다."
    zh_simp: "通过细胞的变化进行液化，\n从而大幅提高自己的防御。"
    zh_trad: "藉由細胞的變化讓身體液化，\n大幅提高自己的防禦。"
acid_downpour:physical:
  names:
    jp_kana: アシッドポイズンデリート
    jp_kanji: アシッドポイズンデリート
    en: Acid Downpour
    fr: Déluge Causti-Toxique
    it: Acidiluvio Corrosivo
    de: Vernichtender Säureregen
    es: Diluvio Corrosivo
    ko: 애시드포이즌딜리트
    zh_simp: 强酸剧毒灭绝雨
    zh_trad: 強酸劇毒滅絕雨
