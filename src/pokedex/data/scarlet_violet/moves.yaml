spore:
  names:
    jp_kana: キノコのほうし
    jp_kanji: キノコのほうし
    en: Spore
    fr: Spore
    it: Spora
    de: Pilzspore
    es: Espora
    ko: 버섯포자
    zh_simp: 蘑菇孢子
    zh_trad: 蘑菇孢子
  descriptions:
    jp_kana: "催眠効果の　ある\n胞子を　パラパラと　ふりまき\n相手を　眠り状態に　する。"
    jp_kanji: "催眠効果の　ある\n胞子を　パラパラと　ふりまき\n相手を　眠り状態に　する。"
    en: The user scatters bursts of spores that induce sleep.
    fr: Le lanceur répand un nuage de spores qui endort.
    it: "Il Pokémon sparge una nube di spore che fa\naddormentare il bersaglio."
    de: "Erzeugt eine Sporenwolke, die das Ziel in Schlaf\nversetzt."
    es: Esparce esporas que inducen el sueño.
    ko: "최면 효과가 있는\n포자를 훌훌 흩뿌려서\n상대를 잠듦 상태로 만든다."
    zh_simp: "沙沙沙地撒满具有\n催眠效果的孢子，\n从而让对手陷入睡眠状态。"
    zh_trad: "大把撒出有催眠效果的孢子，\n讓對手陷入睡眠狀態。"
spotlight:
  names:
    jp_kana: スポットライト
    jp_kanji: スポットライト
    en: Spotlight
    fr: Projecteur
    it: Riflettore
    de: Rampenlicht
    es: Foco
    ko: 스포트라이트
    zh_simp: 聚光灯
    zh_trad: 聚光燈
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
