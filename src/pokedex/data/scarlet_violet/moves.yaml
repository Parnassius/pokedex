pyro_ball:
  names:
    jp_kana: かえんボール
    jp_kanji: かえんボール
    en: Pyro Ball
    fr: Ballon Brûlant
    it: Palla Infuocata
    de: Feuerball
    es: Balón Ígneo
    ko: 화염볼
    zh_simp: 火焰球
    zh_trad: 火焰球
  descriptions:
    jp_kana: "小石を　燃やした　炎の　ボールで\n相手を　攻撃する。\nやけど　状態に　することが　ある。"
    jp_kanji: "小石を　燃やした　炎の　ボールで\n相手を　攻撃する。\nやけど　状態に　することが　ある。"
    en: "The user attacks by igniting a small stone and launching\nit as a fiery ball at the target. This may also leave the\ntarget with a burn."
    fr: "Le lanceur attaque avec un ballon fait à partir\nd’un caillou enflammé. Peut aussi brûler la cible."
    it: "Il Pokémon attacca con una palla creata incendiando\nuna piccola pietra. Può anche scottare il bersaglio."
    de: "Der Anwender greift mit einem Ball aus Feuer an,\nden er durch Anzünden eines kleinen Steins erzeugt.\nFügt dem Ziel eventuell Verbrennungen zu."
    es: "El usuario prende una pequeña piedra para crear una\nbola de fuego con la que ataca al objetivo. Puede causar\nquemaduras."
    ko: "작은 돌을 태운 불꽃의 공으로\n상대를 공격한다.\n화상 상태로 만들 때가 있다."
    zh_simp: "点燃小石子，形成火球攻击对手。\n有时会使对手陷入灼伤状态。"
    zh_trad: "燃燒小石子，\n形成火球攻擊對手。\n有時會讓對手陷入灼傷狀態。"
quash:
  names:
    jp_kana: さきおくり
    jp_kanji: さきおくり
    en: Quash
    fr: À la Queue
    it: Spintone
    de: Verzögerung
    es: Último Lugar
    ko: 순서미루기
    zh_simp: 延后
    zh_trad: 延後
  descriptions:
    jp_kana: "相手を　おさえつけて\n行動の　順番を\n最後に　する。"
    jp_kanji: "相手を　おさえつけて\n行動の　順番を\n最後に　する。"
    en: "The user suppresses the target and makes its move\ngo last."
    fr: Retient la cible de force, l’obligeant à agir en dernier.
    it: "Il Pokémon spinge via il bersaglio, costringendolo\nad agire per ultimo."
    de: "Anwender stemmt sich gegen das Ziel und bewirkt,\ndass dieses erst als Letztes angreift."
    es: Consigue que el objetivo sea el último en moverse.
    ko: "상대를 억눌러서\n행동의 순서를\n마지막으로 만든다."
    zh_simp: "压制对手，\n从而将其行动顺序放到最后。"
    zh_trad: "壓制對手，讓對手在\n回合的最後才能行動。"
quick_attack:
  names:
    jp_kana: でんこうせっか
    jp_kanji: でんこうせっか
    en: Quick Attack
    fr: Vive-Attaque
    it: Attacco Rapido
    de: Ruckzuckhieb
    es: Ataque Rápido
    ko: 전광석화
    zh_simp: 电光一闪
    zh_trad: 電光一閃
  descriptions:
    jp_kana: "目にも　留まらぬ　ものすごい　速さで\n相手に　つっこむ。\n必ず　先制攻撃　できる。"
    jp_kanji: "目にも　留まらぬ　ものすごい　速さで\n相手に　つっこむ。\n必ず　先制攻撃　できる。"
    en: "The user lunges at the target to inflict damage, moving\nat blinding speed. This move always goes first."
    fr: "Le lanceur fonce sur la cible si rapidement qu’on\nparvient à peine à le discerner. Frappe en priorité."
    it: "Il Pokémon colpisce a una tale velocità da rendersi\nquasi invisibile. Questo attacco ha priorità alta."
    de: "Bei dieser Erstschlag-Attacke stürzt sich der Anwender\nso schnell auf das Ziel, dass er quasi unsichtbar wird."
    es: "Ataca al objetivo a tal velocidad que es casi\nimperceptible. Este movimiento tiene prioridad alta."
    ko: "눈에 보이지 않는 굉장한 속도로\n상대에게 돌진한다.\n반드시 선제공격할 수 있다."
    zh_simp: "以迅雷不及掩耳之势扑向对手。\n必定能够先制攻击。"
    zh_trad: "以迅雷不及掩耳之勢\n撲向對手。\n必定能夠發動先制攻擊。"
quick_guard:
  names:
    jp_kana: ファストガード
    jp_kanji: ファストガード
    en: Quick Guard
    fr: Prévention
    it: Anticipo
    de: Rapidschutz
    es: Anticipo
    ko: 패스트가드
    zh_simp: 快速防守
    zh_trad: 快速防守
  descriptions:
    jp_kana: "自分と　味方を　相手の\n先制攻撃から　守る。"
    jp_kanji: "自分と　味方を　相手の\n先制攻撃から　守る。"
    en: The user protects itself and its allies from priority moves.
    fr: Protège le lanceur et ses alliés des attaques prioritaires.
    it: "Il Pokémon protegge sé e gli alleati dagli attacchi\nad alta priorità."
    de: "Schützt Anwender und Mitstreiter vor\nErstschlag-Attacken."
    es: "Se protege a sí mismo y a sus aliados de movimientos\ncon prioridad."
    ko: "자신과 같은 편을 상대의\n선제공격으로부터 지킨다."
    zh_simp: "守护自己和同伴，\n以防对手的先制攻击。"
    zh_trad: "保護自己和同伴，\n防禦來自對手的先制攻擊。"
quiver_dance:
  names:
    jp_kana: ちょうのまい
    jp_kanji: ちょうのまい
    en: Quiver Dance
    fr: Papillodanse
    it: Eledanza
    de: Falterreigen
    es: Danza Aleteo
    ko: 나비춤
    zh_simp: 蝶舞
    zh_trad: 蝶舞
  descriptions:
    jp_kana: "神秘的で　美しい　舞を\n軽やかに　おどる。　自分の　特攻と\n特防と　素早さを　あげる。"
    jp_kanji: "神秘的で　美しい　舞を\n軽やかに　おどる。　自分の　特攻と\n特防と　素早さを　あげる。"
    en: "The user lightly performs a beautiful, mystic dance.\nThis boosts the user’s Sp. Atk, Sp. Def, and Speed stats."
    fr: "Une danse mystique dont le rythme parfait augmente\nl’Attaque Spéciale, la Défense Spéciale et la Vitesse\ndu lanceur."
    it: "Danza leggiadra ed elegante che aumenta\nl’Attacco Speciale, la Difesa Speciale e la Velocità\ndi chi la usa."
    de: "Anwender legt behände einen mystischen,\nformvollendeten Tanz aufs Parkett. Spezial-Angriff,\nSpezial-Verteidigung und Initiative steigen."
    es: "Danza mística que aumenta el Ataque Especial,\nla Defensa Especial y la Velocidad."
    ko: "신비롭고 아름다운 춤을\n경쾌하게 춘다. 자신의 특수공격과\n특수방어, 스피드를 올린다."
    zh_simp: "轻巧地跳起神秘而又美丽的舞蹈。\n提高自己的特攻、特防和速度。"
    zh_trad: "輕巧地跳起神秘又美麗的舞蹈。\n提高自己的特攻、特防和速度。"
rage:
  names:
    jp_kana: いかり
    jp_kanji: いかり
    en: Rage
    fr: Frénésie
    it: Ira
    de: Raserei
    es: Furia
    ko: 분노
    zh_simp: 愤怒
    zh_trad: 憤怒
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
rage_fist:
  names:
    jp_kana: ふんどのこぶし
    jp_kanji: ふんどのこぶし
    en: Rage Fist
    fr: Poing de Colère
    it: Pugno Furibondo
    de: Zornesfaust
    es: Puño Furia
    ko: 분노의주먹
    zh_simp: 愤怒之拳
    zh_trad: 憤怒之拳
  descriptions:
    jp_kana: "怒りを　エネルギーに　変えて　攻撃。\n受けた　攻撃の　回数が　多いほど\n技の　威力が　あがる。"
    jp_kanji: "怒りを　エネルギーに　変えて　攻撃。\n受けた　攻撃の　回数が　多いほど\n技の　威力が　あがる。"
    en: "The user converts its rage into energy to attack. The\nmore times the user has been hit by attacks, the greater\nthe move’s power."
    fr: "Le lanceur transforme sa colère en énergie pour\nattaquer. Plus il a subi d’attaques, plus la puissance\nde cette capacité augmente."
    it: "Il Pokémon trasforma la sua furia in energia e la utilizza\nper attaccare. Più attacchi ha subito il Pokémon, più\nla potenza della mossa aumenta."
    de: "Ein Angriff, für den der Anwender seinen Zorn in Energie\numwandelt. Je häufiger der Anwender getroffen wurde,\ndesto stärker wird diese Attacke."
    es: "Convierte su rabia en energía para atacar. Cuantos más\ngolpes haya recibido el usuario, mayor será la potencia\ndel movimiento."
    ko: "분노를 에너지로 바꿔서 공격한다.\n받은 공격의 횟수가 많을수록\n기술의 위력이 올라간다."
    zh_simp: "将愤怒化为力量攻击。\n受到攻击的次数越多，\n招式的威力越高。"
    zh_trad: "將憤怒化為能量進行攻擊。\n受到的攻擊次數越多，\n招式的威力越大。"
rage_powder:
  names:
    jp_kana: いかりのこな
    jp_kanji: いかりのこな
    en: Rage Powder
    fr: Poudre Fureur
    it: Polverabbia
    de: Wutpulver
    es: Polvo Ira
    ko: 분노가루
    zh_simp: 愤怒粉
    zh_trad: 憤怒粉
  descriptions:
    jp_kana: "イライラさせる　粉を　自分に\nふりかけて　注意を　ひく。　相手の\n攻撃を　すべて　自分に　むける。"
    jp_kanji: "イライラさせる　粉を　自分に\nふりかけて　注意を　ひく。　相手の\n攻撃を　すべて　自分に　むける。"
    en: "The user scatters a cloud of irritating powder to draw\nattention to itself. Opposing Pokémon aim only at\nthe user."
    fr: "Le lanceur s’asperge d’une poudre irritante pour attirer\nl’attention et diriger toutes les attaques ennemies sur lui."
    it: "Il Pokémon attira l’attenzione degli avversari\ncospargendosi di una polvere irritante\ne diventando bersaglio di tutti gli attacchi."
    de: "Anwender zieht gegnerische Aufmerksamkeit und\nAngriffe auf sich, indem er ein Wut erzeugendes\nPulver über sich streut."
    es: "Usa un polvo que enerva a los rivales y hace que centren\nen el usuario su atención y sus movimientos."
    ko: "상대를 자극하는 가루를\n자신에게 뿌려서 주의를 끈다.\n상대의 공격은 모두 자신에게 향한다."
    zh_simp: "将令人烦躁的粉末撒在自己身上，\n用以吸引对手的注意。\n使对手的攻击全部指向自己。"
    zh_trad: "將令人煩躁的粉末撒在自己身上，\n吸引對手的注意。進而將對手的攻擊\n全部轉移到自己身上。"
raging_bull:
  names:
    jp_kana: レイジングブル
    jp_kanji: レイジングブル
    en: Raging Bull
    fr: Taurogne
    it: Scatenatoro
    de: Rasender Stier
    es: Furia Taurina
    ko: 레이징불
    zh_simp: 怒牛
    zh_trad: 怒牛
  descriptions:
    jp_kana: "怒り狂う　あばれうしの　猛烈な　タックル。\nフォルムで　技のタイプが　変わり\nひかりのかべや　リフレクターなども　破壊できる。"
    jp_kanji: "怒り狂う　あばれうしの　猛烈な　タックル。\nフォルムで　技のタイプが　変わり\nひかりのかべや　リフレクターなども　破壊できる。"
    en: "The user performs a tackle like a raging bull. This move’s\ntype depends on the user’s form. It can also break\nbarriers, such as Light Screen and Reflect."
    fr: "Le lanceur charge la cible comme un taureau enragé.\nLe type de cette capacité dépend de la race du lanceur,\net brise les barrières comme Mur Lumière et Protection."
    it: "Il Pokémon carica il bersaglio con furia cieca, rompendo\nbarriere come Schermoluce e Riflesso. Il tipo di questa\nmossa dipende dalla forma di chi la usa."
    de: "Ein rasender Angriff eines wilden Stiers, der auch\nBarrieren wie Lichtschild und Reflektor durchbricht.\nDer Attacken-Typ hängt von der Form des Anwenders ab."
    es: "Embiste con tremenda fiereza. Este movimiento cambia\nde tipo en función de la variedad del usuario y es capaz\nde destruir barreras como Pantalla de Luz y Reflejo."
    ko: "분노해 날뛰는 성난소의 맹렬한 태클.\n폼에 따라 기술의 타입이 달라지고\n빛의장막이나 리플렉터 등도 파괴할 수 있다."
    zh_simp: "狂怒暴牛的猛烈冲撞。\n招式的属性随形态改变，\n光墙和反射壁等招式也能破坏。"
    zh_trad: "憤怒狂亂的暴牛發動之猛烈衝撞。\n招式的屬性會依形態而改變，\n並可破壞光牆和反射壁等。"
raging_fury:
  names:
    jp_kana: だいふんげき
    jp_kanji: だいふんげき
    en: Raging Fury
    fr: Grand Courroux
    it: Ira Furente
    de: Flammenwut
    es: Erupción de Ira
    ko: 대격분
    zh_simp: 大愤慨
    zh_trad: 大憤慨
  descriptions:
    jp_kana: "２ー３ターンの　間\n炎を　放ちながら　暴れまわる。\n暴れたあとは　混乱する。"
    jp_kanji: "２ー３ターンの　間\n炎を　放ちながら　暴れまわる。\n暴れたあとは　混乱する。"
    en: "The user rampages around spewing flames for two to\nthree turns. The user then becomes confused."
    fr: "Le lanceur se déchaîne et attaque en projetant\nde violentes flammes pendant deux ou trois tours.\nIl devient ensuite confus."
    it: "Il Pokémon s’infuria e sputa fiammate per due o tre\nturni, ma rimane confuso."
    de: "Der Anwender wütet zwei bis drei Runden lang und speit\nheftige Flammen aus. Danach wird er verwirrt."
    es: "El usuario ataca con unas violentas llamas de dos a tres\nturnos seguidos y, después, se queda confuso."
    ko: "2~3턴 동안\n불꽃을 마구 뿜어 대며 난동을 부린다.\n난동 부린 뒤에는 혼란에 빠진다."
    zh_simp: "在２～３回合内，\n一边放出火焰，一边疯狂乱打。\n大闹一番后自己会陷入混乱。"
    zh_trad: "在２～３回合內放出火焰，\n同時瘋狂亂打。\n大鬧一番後自己會陷入混亂。"
rain_dance:
  names:
    jp_kana: あまごい
    jp_kanji: あまごい
    en: Rain Dance
    fr: Danse Pluie
    it: Pioggiadanza
    de: Regentanz
    es: Danza Lluvia
    ko: 비바라기
    zh_simp: 求雨
    zh_trad: 求雨
  descriptions:
    jp_kana: "５ターンの　間　雨を　降らせて\nみずタイプの　威力を　あげる。\nほのおタイプの　威力は　さがる。"
    jp_kanji: "５ターンの　間　雨を　降らせて\nみずタイプの　威力を　あげる。\nほのおタイプの　威力は　さがる。"
    en: "The user summons a heavy rain that falls for five turns,\npowering up Water-type attacks. The rain also lowers the\npower of Fire-type attacks."
    fr: "Invoque de fortes pluies qui durent cinq tours,\naugmentant la puissance des capacités de type Eau\net baissant celle des capacités de type Feu."
    it: "Il Pokémon provoca una forte pioggia per cinque turni,\naumentando la potenza delle mosse di tipo Acqua e\nriducendo la potenza di quelle di tipo Fuoco."
    de: "Anwender erzeugt starken Regen. Die Stärke von\nWasser-Attacken erhöht sich fünf Runden lang,\nwährend die Stärke von Feuer-Attacken sinkt."
    es: "Genera una fuerte lluvia que dura cinco turnos, lo que\npotencia los movimientos de tipo Agua y debilita los de\ntipo Fuego."
    ko: "5턴 동안 비를 내리게 해서\n물타입 기술의 위력을 올린다.\n불꽃타입의 위력은 떨어진다."
    zh_simp: "在５回合内一直降雨，\n从而提高水属性的招式威力。\n火属性的招式威力则降低。"
    zh_trad: "降下大雨，在５回合內\n提高水屬性招式的威力。\n火屬性招式的威力會降低。"
rapid_spin:
  names:
    jp_kana: こうそくスピン
    jp_kanji: こうそくスピン
    en: Rapid Spin
    fr: Tour Rapide
    it: Rapigiro
    de: Turbodreher
    es: Giro Rápido
    ko: 고속스핀
    zh_simp: 高速旋转
    zh_trad: 高速旋轉
  descriptions:
    jp_kana: "回転して　相手を　攻撃する。\nしめつける　まきつく　やどりぎのタネ　など\n吹きとばす。自分の　素早さも　あがる。"
    jp_kanji: "回転して　相手を　攻撃する。\nしめつける　まきつく　やどりぎのタネ　など\n吹きとばす。自分の　素早さも　あがる。"
    en: "The user performs a spin attack that can also eliminate\nthe effects of such moves as Bind, Wrap, and Leech\nSeed. This also boosts the user’s Speed stat."
    fr: "Le lanceur attaque en tournant sur lui-même. Sa Vitesse\naugmente également. Il se libère également des effets\nde capacités comme Étreinte, Ligotage ou Vampigraine."
    it: "Attacco rotante che elimina gli effetti di mosse come\nLegatutto, Avvolgibotta e Parassiseme. Aumenta anche\nla Velocità di chi la usa."
    de: "Trifft das Ziel mit einer Dreh-Attacke. Befreit den\nAnwender unter anderem von Wickel, Klammergriff\nund Egelsamen. Erhöht die Initiative des Anwenders."
    es: "Ataque giratorio que anula los efectos de movimientos\ncomo Atadura, Constricción y Drenadoras. También\naumenta la Velocidad del usuario."
    ko: "회전해서 상대를 공격한다.\n조이기, 김밥말이, 씨뿌리기 등의 효과를\n날려 버린다. 자신의 스피드도 올라간다."
    zh_simp: "通过旋转来攻击对手。\n可以摆脱绑紧、紧束、寄生种子\n等招式。还能提高自己的速度。"
    zh_trad: "藉由旋轉來攻擊對手。\n也可以擺脫綁緊、緊束、寄生種子等招式。\n自己的速度也會提高。"
razor_leaf:
  names:
    jp_kana: はっぱカッター
    jp_kanji: はっぱカッター
    en: Razor Leaf
    fr: Tranch’Herbe
    it: Foglielama
    de: Rasierblatt
    es: Hoja Afilada
    ko: 잎날가르기
    zh_simp: 飞叶快刀
    zh_trad: 飛葉快刀
  descriptions:
    jp_kana: "はっぱを　とばして\n相手を　切りつけて　攻撃する。\n急所に　当たりやすい。"
    jp_kanji: "はっぱを　とばして\n相手を　切りつけて　攻撃する。\n急所に　当たりやすい。"
    en: "Sharp-edged leaves are launched to slash at opposing\nPokémon. This move has a heightened chance of landing\na critical hit."
    fr: "Des feuilles aiguisées comme des rasoirs entaillent\nla cible. Taux de critiques élevé."
    it: "Il Pokémon attacca con foglie taglienti che sferzano\nil bersaglio. Probabile brutto colpo."
    de: "Greift gegnerische Pokémon mithilfe von Blättern an.\nHohe Volltrefferquote."
    es: Corta con hojas afiladas. Suele asestar un golpe crítico.
    ko: "잎사귀를 날려\n상대를 베어 공격한다.\n급소에 맞기 쉽다."
    zh_simp: "飞出叶片，\n切斩对手进行攻击。\n容易击中要害。"
    zh_trad: "飛射葉子，\n切斬對手進行攻擊。\n容易擊中要害。"
razor_shell:
  names:
    jp_kana: シェルブレード
    jp_kanji: シェルブレード
    en: Razor Shell
    fr: Coqui-Lame
    it: Conchilama
    de: Kalkklinge
    es: Concha Filo
    ko: 셸블레이드
    zh_simp: 贝壳刃
    zh_trad: 貝殼刃
  descriptions:
    jp_kana: "鋭い　貝殻で　切りつけて\n攻撃する。　相手の　防御を\nさげることが　ある。"
    jp_kanji: "鋭い　貝殻で　切りつけて\n攻撃する。　相手の　防御を\nさげることが　ある。"
    en: "The user cuts the target with sharp shells to inflict\ndamage. This may also lower the target’s Defense stat."
    fr: "Un coquillage aiguisé lacère la cible et peut aussi baisser\nsa Défense."
    it: "Il Pokémon attacca il bersaglio con il proprio guscio\ntagliente e può anche ridurne la Difesa."
    de: "Schneideangriff mit einer scharfen Muschelschale.\nSenkt eventuell die Verteidigung des Zieles."
    es: "Ataca con una afilada vieira al objetivo y puede reducir\nsu Defensa."
    ko: "날카로운 조개껍질로 베어\n공격한다. 상대의 방어를\n떨어뜨릴 때가 있다."
    zh_simp: "用锋利的贝壳切斩\n对手进行攻击。\n有时会降低对手的防御。"
    zh_trad: "用鋒利的貝殼斬切\n對手進行攻擊。\n有時會降低對手的防禦。"
razor_wind:
  names:
    jp_kana: かまいたち
    jp_kanji: かまいたち
    en: Razor Wind
    fr: Coupe-Vent
    it: Ventagliente
    de: Klingensturm
    es: Viento Cortante
    ko: 칼바람
    zh_simp: 旋风刀
    zh_trad: 旋風刀
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
recover:
  names:
    jp_kana: じこさいせい
    jp_kanji: じこさいせい
    en: Recover
    fr: Soin
    it: Ripresa
    de: Genesung
    es: Recuperación
    ko: HP회복
    zh_simp: 自我再生
    zh_trad: 自我再生
  descriptions:
    jp_kana: "細胞を　再生させて\n自分の　最大ＨＰの\n半分の　ＨＰを　回復する。"
    jp_kanji: "細胞を　再生させて\n自分の　最大ＨＰの\n半分の　ＨＰを　回復する。"
    en: "The user regenerates its cells, restoring its own HP by up\nto half its max HP."
    fr: "Un soin qui permet au lanceur de récupérer\njusqu’à la moitié de ses PV max."
    it: "Mossa autocurativa. Il Pokémon recupera metà dei PS\nmassimi."
    de: "Eine Selbstheilung. KP des Anwenders werden um\n50 % des maximalen Wertes aufgefüllt."
    es: "El usuario regenera sus células y recupera una cantidad\nde PS equivalente a la mitad de sus PS máximos."
    ko: "세포를 재생시켜\n자신의 최대 HP의\n절반만큼 HP를 회복한다."
    zh_simp: "让细胞再生，\n从而回复自己\n最大ＨＰ的一半。"
    zh_trad: "讓細胞再生，\n回復自己最大ＨＰ的一半。"
recycle:
  names:
    jp_kana: リサイクル
    jp_kanji: リサイクル
    en: Recycle
    fr: Recyclage
    it: Riciclo
    de: Aufbereitung
    es: Reciclaje
    ko: 리사이클
    zh_simp: 回收利用
    zh_trad: 回收利用
  descriptions:
    jp_kana: "戦闘中に　使って　なくなった\n自分の　持ち物を　再生させて\n使えるように　する。"
    jp_kanji: "戦闘中に　使って　なくなった\n自分の　持ち物を　再生させて\n使えるように　する。"
    en: "The user recycles a held item that has been used in\nbattle so it can be used again."
    fr: "Recycle un objet tenu à usage unique déjà utilisé\nlors du combat pour pouvoir l’utiliser à nouveau."
    it: "Il Pokémon ricicla uno strumento che ha usato nella lotta\ne può riutilizzarlo."
    de: "Recycling eines getragenen Items, das zuvor im Kampf\nverwendet wurde."
    es: "Recicla y así recupera un objeto equipado de un solo\nuso que ya haya sido empleado durante el combate."
    ko: "배틀 중에 사용하여 없어진\n자신의 지닌 물건을 재생시켜\n사용할 수 있게 한다."
    zh_simp: "使战斗中已经消耗掉的\n自己的持有物再生，\n并可以再次使用。"
    zh_trad: "將在戰鬥中已消耗完的\n寶可夢持有物回收後，\n回復成可以使用的狀態。"
reflect:
  names:
    jp_kana: リフレクター
    jp_kanji: リフレクター
    en: Reflect
    fr: Protection
    it: Riflesso
    de: Reflektor
    es: Reflejo
    ko: 리플렉터
    zh_simp: 反射壁
    zh_trad: 反射壁
  descriptions:
    jp_kana: "５ターンの　間　不思議な　かべで\n相手から　受ける　物理攻撃の\nダメージを　弱める。"
    jp_kanji: "５ターンの　間　不思議な　かべで\n相手から　受ける　物理攻撃の\nダメージを　弱める。"
    en: "A wondrous wall of light is put up to reduce damage\nfrom physical moves for five turns."
    fr: "Crée un fabuleux mur de lumière qui réduit les dégâts\ncausés par les capacités physiques pendant cinq tours."
    it: "Il Pokémon innalza una barriera misteriosa che riduce\ni danni degli attacchi fisici subiti per mano\ndell’avversario per cinque turni."
    de: "Eine mysteriöse Wand, die für fünf Runden den Schaden\nvon physischen gegnerischen Treffern reduziert."
    es: "Barrera misteriosa que reduce durante cinco turnos el\ndaño producido por los ataques físicos del rival."
    ko: "5턴 동안 이상한 장막을 쳐서\n상대로부터 받는 물리공격의\n데미지를 약하게 한다."
    zh_simp: "利用神奇的墙壁，\n在５回合内减弱从对手那里\n受到的物理攻击的伤害。"
    zh_trad: "利用神奇的屏障，\n在５回合內減輕\n來自對手的物理攻擊傷害。"
reflect_type:
  names:
    jp_kana: ミラータイプ
    jp_kanji: ミラータイプ
    en: Reflect Type
    fr: Copie-Type
    it: Riflettipo
    de: Typenspiegel
    es: Clonatipo
    ko: 미러타입
    zh_simp: 镜面属性
    zh_trad: 鏡面屬性
  descriptions:
    jp_kana: "相手の　タイプを　反射して\n自分も　同じ　タイプに　なる。"
    jp_kanji: "相手の　タイプを　反射して\n自分も　同じ　タイプに　なる。"
    en: "The user reflects the target’s type to become the same\ntype as the target."
    fr: Le lanceur adopte le même type que la cible.
    it: "Il Pokémon cambia il proprio tipo in quello\ndel bersaglio."
    de: "Anwender ahmt das Ziel nach und nimmt dabei\ndessen Typ an."
    es: "Cambia el tipo del usuario al mismo tipo que el del\nobjetivo."
    ko: "상대의 타입을 반사해서\n자신도 똑같은 타입이 된다."
    zh_simp: "反射对手的属性，\n让自己也变成一样的属性。"
    zh_trad: "在自己身上反映出對手的屬性，\n讓自己也變成相同的屬性。"
refresh:
  names:
    jp_kana: リフレッシュ
    jp_kanji: リフレッシュ
    en: Refresh
    fr: Régénération
    it: Rinfrescata
    de: Heilung
    es: Alivio
    ko: 리프레시
