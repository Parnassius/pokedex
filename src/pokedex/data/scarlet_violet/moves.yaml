mirror_coat:
  names:
    jp_kana: ミラーコート
    jp_kanji: ミラーコート
    en: Mirror Coat
    fr: Voile Miroir
    it: Specchiovelo
    de: Spiegelcape
    es: Manto Espejo
    ko: 미러코트
    zh_simp: 镜面反射
    zh_trad: 鏡面反射
  descriptions:
    jp_kana: "相手から　受けた　特殊攻撃の\nダメージを　２倍に　して\nその相手に　返す。"
    jp_kanji: "相手から　受けた　特殊攻撃の\nダメージを　２倍に　して\nその相手に　返す。"
    en: "A retaliatory attack that counters any special move,\ninflicting double the damage taken."
    fr: "Une riposte qui contre n’importe quelle capacité\nspéciale en infligeant le double des dégâts subis."
    it: "Il Pokémon risponde a un attacco speciale infliggendo\nal bersaglio il doppio dei danni subiti."
    de: "Kontert die Spezial-Attacke des Gegners mit doppeltem\nSchaden."
    es: "Responde a un ataque especial ocasionando el doble\ndel daño recibido."
    ko: "상대에게 받은 특수공격의\n데미지를 2배로 만들어\n그 상대에게 돌려준다."
    zh_simp: "从对手那里受到\n特殊攻击的伤害将以\n２倍返还给同一个对手。"
    zh_trad: "將來自對手的特殊攻擊傷害加倍後，\n返還給該對手。"
mirror_move:
  names:
    jp_kana: オウムがえし
    jp_kanji: オウムがえし
    en: Mirror Move
    fr: Mimique
    it: Speculmossa
    de: Spiegeltrick
    es: Espejo
    ko: 따라하기
    zh_simp: 鹦鹉学舌
    zh_trad: 鸚鵡學舌
