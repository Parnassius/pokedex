venoshock:
  names:
    jp_kana: ベノムショック
    jp_kanji: ベノムショック
    en: Venoshock
    fr: Choc Venin
    it: Velenoshock
    de: Giftschock
    es: Carga Tóxica
    ko: 베놈쇼크
    zh_simp: 毒液冲击
    zh_trad: 毒液衝擊
  descriptions:
    jp_kana: "特殊な　毒液を　浴びせかける。\n毒状態の　相手には\n威力が　２倍に　なる。"
    jp_kanji: "特殊な　毒液を　浴びせかける。\n毒状態の　相手には\n威力が　２倍に　なる。"
    en: "The user drenches the target in a special poisonous\nliquid. This move’s power is doubled if the target\nis poisoned."
    fr: "Le lanceur asperge la cible d’un poison spécial.\nLa puissance de la capacité est doublée si la cible\nest empoisonnée."
    it: "Il Pokémon lancia uno speciale liquido tossico\nsul bersaglio. Se questi è avvelenato, la potenza\nraddoppia."
    de: "Überschüttet das Ziel mit einer speziellen toxischen\nFlüssigkeit. Doppelt so stark gegen vergiftete Ziele."
    es: "Cubre al objetivo con un líquido venenoso. La potencia\ndel movimiento se duplica si este ya está envenenado."
    ko: "특수한 독액을 끼얹는다.\n독 상태의 상대에게는\n위력이 2배가 된다."
    zh_simp: "将特殊的毒液泼向对手。\n对处于中毒状态的对手，\n威力会变成２倍。"
    zh_trad: "將特殊的毒液潑向對手。\n攻擊陷入中毒狀態的對手時，\n威力會變成２倍。"
victory_dance:
  names:
    jp_kana: しょうりのまい
    jp_kanji: しょうりのまい
    en: Victory Dance
    fr: Danse Victoire
    it: Danzavittoria
    de: Siegestanz
    es: Danza Triunfal
    ko: 승리의춤
    zh_simp: 胜利之舞
    zh_trad: 勝利之舞
  descriptions:
    jp_kana: "勝利を　呼びこむ　舞を\n激しく　踊って　自分の\n攻撃と　防御と　素早さを　あげる。"
    jp_kanji: "勝利を　呼びこむ　舞を\n激しく　踊って　自分の\n攻撃と　防御と　素早さを　あげる。"
    en: "The user performs an intense dance to usher in victory,\nboosting its Attack, Defense, and Speed stats."
    fr: "Le lanceur danse vigoureusement pour invoquer\nla victoire, ce qui augmente son Attaque, sa Défense\net sa Vitesse."
    it: "Il Pokémon si lancia in una danza sfrenata per invocare\nla vittoria e aumenta l’Attacco, la Difesa e la Velocità."
    de: "Der Anwender führt einen wilden Tanz auf, der den\nSieg herbeiführen soll. Dies erhöht seinen Angriff,\nseine Verteidigung und seine Initiative."
    es: "Ejecuta una danza frenética que invoca la victoria y\naumenta el Ataque, la Defensa y la Velocidad."
    ko: "승리를 부르는 춤을 격렬하게 춘다.\n자신의 공격과 방어, 스피드를 올린다."
    zh_simp: "激烈地跳起唤来\n胜利的舞蹈，提高自己的\n攻击、防御和速度。"
    zh_trad: "激烈地跳起喚來勝利的舞蹈，\n提高自己的攻擊、防禦和速度。"
vine_whip:
  names:
    jp_kana: つるのムチ
    jp_kanji: つるのムチ
    en: Vine Whip
    fr: Fouet Lianes
    it: Frustata
    de: Rankenhieb
    es: Látigo Cepa
    ko: 덩굴채찍
    zh_simp: 藤鞭
    zh_trad: 藤鞭
  descriptions:
    jp_kana: "ムチのように　しなる　細長い　つるで\n相手を　たたきつけて　攻撃する。"
    jp_kanji: "ムチのように　しなる　細長い　つるで\n相手を　たたきつけて　攻撃する。"
    en: "The target is struck with slender, whiplike vines to\ninflict damage."
    fr: "Fouette la cible avec de fines lianes pour infliger\ndes dégâts."
    it: "Il Pokémon attacca il bersaglio sferzandolo con liane\nsottili simili a fruste."
    de: Peitschenähnlicher Schlag mit Ranken.
    es: "Azota al objetivo con lianas delgadas y largas tan\nflexibles como látigos."
    ko: "채찍처럼 휘어지는 가늘고 긴 덩굴로\n상대를 힘껏 쳐서 공격한다."
    zh_simp: "用如同鞭子般弯曲而细长的藤蔓\n摔打对手进行攻击。"
    zh_trad: "將如同鞭子般彎曲而細長的藤蔓\n甩向對手進行攻擊。"
vise_grip:
  names:
    jp_kana: はさむ
    jp_kanji: はさむ
    en: Vise Grip
    fr: Force Poigne
    it: Presa
    de: Klammer
    es: Agarre
    ko: 찝기
    zh_simp: 夹住
    zh_trad: 夾住
  descriptions:
    jp_kana: "相手を　両側から　はさんで\nダメージを　あたえる。"
    jp_kanji: "相手を　両側から　はさんで\nダメージを　あたえる。"
    en: "The target is gripped and squeezed from both sides\nto inflict damage."
    fr: La cible est attrapée et compressée par les côtés.
    it: "Il Pokémon stringe il bersaglio in una morsa,\ninfliggendogli danni."
    de: Das Ziel wird umklammert und zusammengequetscht.
    es: Atenaza al objetivo y le inflige daño.
    ko: "상대를 양쪽에서 집어서\n데미지를 준다."
    zh_simp: "将对手从两侧夹住，\n给予伤害。"
    zh_trad: "從兩側夾住對手，\n給予傷害。"
vital_throw:
  names:
    jp_kana: あてみなげ
    jp_kanji: あてみなげ
    en: Vital Throw
    fr: Corps Perdu
    it: Vitaltiro
    de: Überwurf
    es: Llave Vital
    ko: 받아던지기
    zh_simp: 借力摔
    zh_trad: 借力摔
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
volt_switch:
  names:
    jp_kana: ボルトチェンジ
    jp_kanji: ボルトチェンジ
    en: Volt Switch
    fr: Change-Éclair
    it: Invertivolt
    de: Voltwechsel
    es: Voltiocambio
    ko: 볼트체인지
    zh_simp: 伏特替换
    zh_trad: 伏特替換
  descriptions:
    jp_kana: "攻撃したあと\nものすごい　スピードで　もどってきて\n控えポケモンと　入れ替わる。"
    jp_kanji: "攻撃したあと\nものすごい　スピードで　もどってきて\n控えポケモンと　入れ替わる。"
    en: "After making its attack, the user rushes back to switch\nplaces with a party Pokémon in waiting."
    fr: "Après son attaque, le lanceur revient à toute vitesse\net change de place avec un Pokémon de l’équipe\nprêt à combattre."
    it: "Il Pokémon fa marcia indietro per farsi sostituire\nsubito dopo aver sferrato l’attacco."
    de: "Nach der Attacke eilt der Anwender zurück und\ntauscht den Platz mit einem anderen Pokémon."
    es: "Tras atacar, el usuario vuelve a toda prisa para dar paso\na otro Pokémon del equipo."
    ko: "공격한 뒤\n굉장한 스피드로 돌아와서\n교대 포켓몬과 교체한다."
    zh_simp: "在攻击之后急速返回，\n和后备宝可梦进行替换。"
    zh_trad: "攻擊後迅速返回，\n和後備寶可夢進行替換。"
volt_tackle:
  names:
    jp_kana: ボルテッカー
    jp_kanji: ボルテッカー
    en: Volt Tackle
    fr: Électacle
    it: Locomovolt
    de: Volttackle
    es: Placaje Eléc
    ko: 볼트태클
    zh_simp: 伏特攻击
    zh_trad: 伏特攻擊
  descriptions:
    jp_kana: "電気を　まとって　突進する。\n自分も　かなり　ダメージを　受ける。\nまひ状態に　することが　ある。"
    jp_kanji: "電気を　まとって　突進する。\n自分も　かなり　ダメージを　受ける。\nまひ状態に　することが　ある。"
    en: "The user electrifies itself and charges the target to inflict\ndamage. This also damages the user quite a lot and may\nleave the target with paralysis."
    fr: "Le lanceur électrifie son corps avant de charger.\nLe choc blesse aussi gravement le lanceur\net peut paralyser la cible."
    it: "Il Pokémon si carica di elettricità e poi attacca, ma\nsubisce seri danni. Può paralizzare il bersaglio."
    de: "Angriff mit Elektro-Tackle. Der Anwender nimmt dabei\nselbst großen Schaden. Das Ziel wird eventuell\nparalysiert."
    es: "El usuario electrifica su cuerpo para luego atacar, pero\ntambién se hiere seriamente a sí mismo. Puede paralizar\nal objetivo."
    ko: "전기를 한데 모아 돌진한다.\n자신도 상당한 데미지를 입는다.\n마비 상태로 만들 때가 있다."
    zh_simp: "让电流覆盖全身猛撞向对手。\n自己也会受到不小的伤害。\n有时会让对手陷入麻痹状态。"
    zh_trad: "用電流圍繞全身後猛撞對手。\n自己也會受到不小的傷害。\n有時會讓對手陷入麻痺狀態。"
wake_up_slap:
  names:
    jp_kana: めざましビンタ
    jp_kanji: めざましビンタ
    en: Wake-Up Slap
    fr: Réveil Forcé
    it: Svegliopacca
    de: Weckruf
    es: Espabila
    ko: 잠깨움뺨치기
    zh_simp: 唤醒巴掌
    zh_trad: 喚醒巴掌
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
water_gun:
  names:
    jp_kana: みずでっぽう
    jp_kanji: みずでっぽう
    en: Water Gun
    fr: Pistolet à O
    it: Pistolacqua
    de: Aquaknarre
    es: Pistola Agua
    ko: 물대포
    zh_simp: 水枪
    zh_trad: 水槍
  descriptions:
    jp_kana: "水を　勢いよく\n相手に　発射して　攻撃する。"
    jp_kanji: "水を　勢いよく\n相手に　発射して　攻撃する。"
    en: The target is blasted with a forceful shot of water.
    fr: De l’eau est projetée avec force sur la cible.
    it: "Il Pokémon attacca il bersaglio con un potente getto\nd’acqua."
    de: Das Ziel wird mit Wasser bespritzt.
    es: Ataca disparando agua con gran potencia.
    ko: "물을 기세 좋게\n상대에게 발사하여 공격한다."
    zh_simp: "向对手猛烈地喷射\n水流进行攻击。"
    zh_trad: "向對手噴射\n強烈水流進行攻擊。"
water_pledge:
  names:
    jp_kana: みずのちかい
    jp_kanji: みずのちかい
    en: Water Pledge
    fr: Aire d’Eau
    it: Acquapatto
    de: Wassersäulen
    es: Voto Agua
    ko: 물의맹세
    zh_simp: 水之誓约
    zh_trad: 水之誓約
  descriptions:
    jp_kana: "水の柱で　攻撃する。\nほのおと　組みあわせると　威力が\nあがって　空に　にじが　かかる。"
    jp_kanji: "水の柱で　攻撃する。\nほのおと　組みあわせると　威力が\nあがって　空に　にじが　かかる。"
    en: "A column of water hits the target. When used with its fire\ncounterpart, this move’s power is boosted and a rainbow\nappears."
    fr: "Une masse d’eau s’abat sur la cible. Si cette capacité\nest utilisée en même temps qu’Aire de Feu, la puissance\naugmente et un arc-en-ciel apparaît."
    it: "Il Pokémon attacca il bersaglio con una colonna\nd’acqua. Se usata con Fiammapatto, la potenza\naumenta e appare un arcobaleno."
    de: "Ein Angriff mit Wassersäulen. Mit Feuersäulen\nkombiniert steigt die Wirkung und ein Regenbogen\nerscheint."
    es: "Ataca con columnas de agua. Combinado con\nVoto Fuego, crea un arcoíris y aumenta su potencia."
    ko: "물기둥으로 공격한다.\n불꽃과 조합하면 위력이\n올라가고 하늘에 무지개가 걸린다."
    zh_simp: "用水柱进行攻击。\n如果和火组合，威力就会提高，\n天空中会挂上彩虹。"
    zh_trad: "用水柱進行攻擊。\n和火之誓約同時使用時，威力會提高，\n天空會出現彩虹。"
water_pulse:
  names:
    jp_kana: みずのはどう
    jp_kanji: みずのはどう
    en: Water Pulse
    fr: Vibraqua
    it: Idropulsar
    de: Aquawelle
    es: Hidropulso
    ko: 물의파동
    zh_simp: 水之波动
    zh_trad: 水之波動
  descriptions:
    jp_kana: "水の　振動を\n相手に　与えて　攻撃する。\n相手を　混乱させることが　ある。"
    jp_kanji: "水の　振動を\n相手に　与えて　攻撃する。\n相手を　混乱させることが　ある。"
    en: "The user attacks the target with a pulsing blast of water.\nThis may also confuse the target."
    fr: "Le lanceur projette une aura aquatique sur la cible, et\npeut la rendre confuse."
    it: "Il Pokémon attacca lanciando sul bersaglio un getto\nd’acqua potentissimo che può anche confonderlo."
    de: "Angriff mit Wasserwelle, die das Ziel eventuell\nverwirren kann."
    es: "Ataca con una potente onda de agua. Puede confundir\nal objetivo."
    ko: "물의 진동을\n상대에게 가하여 공격한다.\n상대를 혼란시킬 때가 있다."
    zh_simp: "用水的震动攻击对手。\n有时会使对手混乱。"
    zh_trad: "用水的震動攻擊對手。\n有時會使對手混亂。"
water_shuriken:
  names:
    jp_kana: みずしゅりけん
    jp_kanji: みずしゅりけん
    en: Water Shuriken
    fr: Sheauriken
    it: Acqualame
    de: Wasser-Shuriken
    es: Shuriken de Agua
    ko: 물수리검
    zh_simp: 飞水手里剑
    zh_trad: 飛水手裡劍
  descriptions:
    jp_kana: "粘液で　できた　手裏剣を\n２ー５回の　間　連続で　だす。\n必ず　先制攻撃　できる。"
    jp_kanji: "粘液で　できた　手裏剣を\n２ー５回の　間　連続で　だす。\n必ず　先制攻撃　できる。"
    en: "The user hits the target with throwing stars two to five\ntimes in a row. This move always goes first."
    fr: "Le lanceur attaque la cible avec des shuriken\nde mucus. Cette capacité frappe en priorité\ndeux à cinq fois d’affilée en un tour."
    it: "Il Pokémon attacca il bersaglio con degli shuriken\ndi muco da due a cinque volte di fila. Questo attacco\nha priorità alta."
    de: "Der Anwender schleudert dem Ziel Wurfsterne\naus einem verdickten Sekret entgegen. Diese\nErstschlag-Attacke trifft zwei- bis fünfmal."
    es: "Golpea al objetivo de dos a cinco veces seguidas\ncon estrellas arrojadizas hechas de mucosidad. Este\nmovimiento tiene prioridad alta."
    ko: "점액으로 만든 수리검을\n2~5회 연속으로 던진다.\n반드시 선제공격할 수 있다."
    zh_simp: "用粘液制成的手里剑，\n连续攻击２～５次。\n必定能够先制攻击。"
    zh_trad: "射出用黏液製成的手裡劍，\n連續攻擊２～５次。\n必定能夠發動先制攻擊。"
water_sport:
  names:
    jp_kana: みずあそび
    jp_kanji: みずあそび
    en: Water Sport
    fr: Tourniquet
    it: Docciascudo
    de: Nassmacher
    es: Hidrochorro
    ko: 물놀이
    zh_simp: 玩水
    zh_trad: 玩水
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
