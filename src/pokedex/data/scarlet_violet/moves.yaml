    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
soul_stealing_7_star_strike:
  names:
    jp_kana: しちせいだっこんたい
    jp_kanji: しちせいだっこんたい
    en: Soul-Stealing 7-Star Strike
    fr: Fauche-Âme des Sept Étoiles
    it: Colpo Eptastellare Rubanima
    de: Sternbild des Seelenraubes
    es: Constelación Robaalmas
    ko: 칠성탈혼퇴
    zh_simp: 七星夺魂腿
    zh_trad: 七星奪魂腿
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
spacial_rend:
  names:
    jp_kana: あくうせつだん
    jp_kanji: あくうせつだん
    en: Spacial Rend
    fr: Spatio-Rift
    it: Fendispazio
    de: Raumschlag
    es: Corte Vacío
    ko: 공간절단
    zh_simp: 亚空裂斩
    zh_trad: 亞空裂斬
  descriptions:
    jp_kana: "周りの　空間ごと　相手を\n引き裂き　ダメージを　与える。\n急所に　当たりやすい。"
    jp_kanji: "周りの　空間ごと　相手を\n引き裂き　ダメージを　与える。\n急所に　当たりやすい。"
    en: "The user tears the target along with the space around it.\nThis move has a heightened chance of landing a\ncritical hit."
    fr: "Le lanceur déchire la cible et l’espace autour de lui.\nTaux de critiques élevé."
    it: "Il Pokémon lacera il bersaglio e lo spazio che\nlo circonda. Probabile brutto colpo."
    de: "Anwender attackiert mit einer Kraft, die selbst den Raum\num das Ziel herum zerreißt. Hohe Volltrefferquote."
    es: "Desgarra al objetivo y el espacio a su alrededor.\nSuele asestar un golpe crítico."
    ko: "주위의 공간과 더불어 상대를\n찢어서 데미지를 준다.\n급소에 맞기 쉽다."
    zh_simp: "将对手连同周围的空间一起\n撕裂并给予伤害。\n容易击中要害。"
    zh_trad: "將對手連同周圍的空間\n一起切開，給予對手傷害。\n容易擊中要害。"
spark:
  names:
    jp_kana: スパーク
    jp_kanji: スパーク
    en: Spark
    fr: Étincelle
    it: Scintilla
    de: Funkensprung
    es: Chispa
    ko: 스파크
    zh_simp: 电光
    zh_trad: 電光
  descriptions:
    jp_kana: "電気を　まとい\n相手に　突進して　攻撃する。\nまひ状態に　することが　ある。"
    jp_kanji: "電気を　まとい\n相手に　突進して　攻撃する。\nまひ状態に　することが　ある。"
    en: "The user attacks the target with an electrically charged\ntackle. This may also leave the target with paralysis."
    fr: "Le lanceur envoie une charge électrique sur la cible qui\npeut aussi la paralyser."
    it: "Il Pokémon attacca il bersaglio con una scarica elettrica\ne può anche paralizzarlo."
    de: Eine Elektro-Attacke, die das Ziel paralysieren kann.
    es: "Se envuelve de electricidad y arremete contra el\nobjetivo. Puede llegar a paralizar."
    ko: "전기를 둘러\n상대에게 돌진하여 공격한다.\n마비 상태로 만들 때가 있다."
    zh_simp: "让电流覆盖全身，\n猛撞向对手进行攻击。\n有时会让对手陷入麻痹状态。"
    zh_trad: "用電流圍繞身體，\n猛撞對手進行攻擊。\n有時會讓對手陷入麻痺狀態。"
sparkling_aria:
  names:
    jp_kana: うたかたのアリア
    jp_kanji: うたかたのアリア
    en: Sparkling Aria
    fr: Aria de l’Écume
    it: Canto Effimero
    de: Schaumserenade
    es: Aria Burbuja
    ko: 물거품아리아
    zh_simp: 泡影的咏叹调
    zh_trad: 泡影的詠歎調
  descriptions:
    jp_kana: "歌うことによって　たくさんの\nバルーンを　放出する。\n技を　受けると　やけどが　治る。"
    jp_kanji: "歌うことによって　たくさんの\nバルーンを　放出する。\n技を　受けると　やけどが　治る。"
    en: "The user bursts into song, emitting many bubbles.\nAny Pokémon suffering from a burn will be cured\nby the touch of these bubbles."
    fr: "Le lanceur émet plusieurs bulles en chantant.\nSoigne les brûlures des Pokémon touchés par ces bulles."
    it: "Il Pokémon si mette a cantare emettendo tanti\npalloncini d’acqua. Chiunque viene colpito da\nquesta mossa guarisce dalle scottature."
    de: "Durch Gesang erzeugte Blasen werden auf das Ziel\ngeschleudert. Alle Pokémon, die dadurch Schaden\nerleiden, werden auch von Verbrennungen geheilt."
    es: "Libera burbujas al cantar. Este movimiento cura las\nquemaduras de los Pokémon que reciban daño."
    ko: "노래 부르는 것으로 많은\n벌룬을 방출한다.\n기술에 맞으면 화상이 낫는다."
    zh_simp: "随着唱歌会放出很多气球。\n受到此招式攻击时，\n灼伤会被治愈。"
    zh_trad: "隨著歌聲放出許多水球。\n受此招式攻擊時，\n灼傷會被治癒。"
sparkly_swirl:
  names:
    jp_kana: きらきらストーム
    jp_kanji: きらきらストーム
    en: Sparkly Swirl
    fr: Évo-Fabulo
    it: Sbrilluccibufera
    de: Glitzersturm
    es: Sylveotornado
    ko: 반짝반짝스톰
    zh_simp: 亮亮风暴
    zh_trad: 亮亮風暴
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
spectral_thief:
  names:
    jp_kana: シャドースチール
    jp_kanji: シャドースチール
    en: Spectral Thief
    fr: Clepto-Mânes
    it: Ombrafurto
    de: Diebesschatten
    es: Robasombra
    ko: 섀도스틸
    zh_simp: 暗影偷盗
    zh_trad: 暗影偷盜
  descriptions:
    jp_kana: "相手の　影に　潜り込み\n相手の　能力アップを\n奪って　攻撃する。"
    jp_kanji: "相手の　影に　潜り込み\n相手の　能力アップを\n奪って　攻撃する。"
    en: "The user hides in the target’s shadow, steals the target’s\nstat boosts, and then attacks."
    fr: "Le lanceur plonge dans l’ombre de la cible,\nvole ses augmentations de stats et l’attaque."
    it: "Il Pokémon ruba gli aumenti delle statistiche\ndel bersaglio, poi si nasconde nella sua ombra\ne lo attacca."
    de: "Der Anwender schleicht sich in den Schatten des Zieles,\nstiehlt dessen erhöhte Statuswerte und fügt ihm\nSchaden zu."
    es: "El usuario se esconde en la sombra del objetivo y lo\nataca tras robarle las mejoras en sus características."
    ko: "상대의 그림자에 숨어들어\n상대의 능력이 올라가는 것을\n뺏어 공격한다."
    zh_simp: "潜入对手的影子进行攻击。\n会夺取对手的能力提升。"
    zh_trad: "潛入對手的影子，\n奪取對手的能力提升進行攻擊。"
speed_swap:
  names:
    jp_kana: スピードスワップ
    jp_kanji: スピードスワップ
    en: Speed Swap
    fr: Permuvitesse
    it: Velociscambio
    de: Initiativetausch
    es: Cambiavelocidad
    ko: 스피드스왑
    zh_simp: 速度互换
    zh_trad: 速度互換
  descriptions:
    jp_kana: "相手の　素早さと\n自分の　素早さを\n入れ替えてしまう。"
    jp_kanji: "相手の　素早さと\n自分の　素早さを\n入れ替えてしまう。"
    en: The user exchanges Speed stats with the target.
    fr: Intervertit la Vitesse du lanceur et celle de la cible.
    it: "Il Pokémon scambia la propria Velocità con quella\ndel bersaglio."
    de: "Der Anwender tauscht seinen Initiative-Wert mit dem\ndes Zieles."
    es: Intercambia su Velocidad por la del objetivo.
    ko: "상대의 스피드와\n자신의 스피드를\n교체한다."
    zh_simp: "将对手和自己的速度\n进行互换。"
    zh_trad: "將對手和自己的速度\n進行互換。"
spicy_extract:
  names:
    jp_kana: ハバネロエキス
    jp_kanji: ハバネロエキス
    en: Spicy Extract
    fr: Habanerage
    it: Essenza Piccante
    de: Chili-Essenz
    es: Extracto Picante
    ko: 하바네로엑기스
    zh_simp: 辣椒精华
    zh_trad: 辣椒精華
  descriptions:
    jp_kana: "とんでもなく　辛いエキスを　出す。\n相手の　攻撃が　ぐーんと　あがり\n防御が　がくっと　さがる。"
    jp_kanji: "とんでもなく　辛いエキスを　出す。\n相手の　攻撃が　ぐーんと　あがり\n防御が　がくっと　さがる。"
    en: "The user emits an incredibly spicy extract, sharply\nboosting the target’s Attack stat and harshly lowering\nthe target’s Defense stat."
    fr: "Le lanceur relâche un concentré extrêmement pimenté\nsur la cible, ce qui augmente beaucoup l’Attaque de\ncelle-ci, mais baisse aussi beaucoup sa Défense."
    it: "Il Pokémon secerne un’essenza straordinariamente\npiccante. Aumenta di molto l’Attacco del bersaglio\nma ne diminuisce di molto la Difesa."
    de: "Der Anwender setzt eine unglaublich scharfe Essenz frei,\ndie den Angriff des Zieles stark erhöht, aber seine\nVerteidigung stark senkt."
    es: "Libera un extracto extraordinariamente picante que\naumenta mucho el Ataque del objetivo, pero también\nreduce mucho su Defensa."
    ko: "어마어마하게 매운 엑기스를 발사한다.\n상대의 공격이 크게 오르고\n방어는 크게 떨어진다."
    zh_simp: "放出极为辛辣的精华。\n对手的攻击会大幅提高，\n防御会大幅降低。"
    zh_trad: "放出相當強勁的辣味精華。\n對手的攻擊會大幅提高，\n防禦會大幅降低。"
spider_web:
  names:
    jp_kana: クモのす
    jp_kanji: クモのす
    en: Spider Web
    fr: Toile
    it: Ragnatela
    de: Spinnennetz
    es: Telaraña
    ko: 거미집
    zh_simp: 蛛网
    zh_trad: 蛛網
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
spike_cannon:
  names:
    jp_kana: とげキャノン
    jp_kanji: とげキャノン
    en: Spike Cannon
    fr: Picanon
    it: Sparalance
    de: Dornkanone
    es: Clavo Cañón
    ko: 가시대포
    zh_simp: 尖刺加农炮
    zh_trad: 尖刺加農炮
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
spikes:
  names:
    jp_kana: まきびし
    jp_kanji: まきびし
    en: Spikes
    fr: Picots
    it: Punte
    de: Stachler
    es: Púas
    ko: 압정뿌리기
    zh_simp: 撒菱
    zh_trad: 撒菱
  descriptions:
    jp_kana: "相手の　足下に　まきびしを\nしかける。交代で　でてきた　相手の\nポケモンに　ダメージを　与える。"
    jp_kanji: "相手の　足下に　まきびしを\nしかける。交代で　でてきた　相手の\nポケモンに　ダメージを　与える。"
    en: "The user lays a trap of spikes at the feet of the\nopposing team. The spikes will damage opposing\nPokémon that switch into battle."
    fr: "Le lanceur disperse des picots sur le sol pour blesser\ntout ennemi qui entre au combat."
    it: "Il Pokémon piazza sul terreno una trappola di punte\nche danneggia gli avversari quando entrano in campo."
    de: "Der Anwender legt Stacheln aus, die gegnerische\nPokémon verletzen, die in den Kampf gerufen\nwerden."
    es: "Lanza una trampa de púas a los pies del objetivo que\nhiere a los rivales que entran en combate."
    ko: "상대의 발밑에 압정을\n뿌린다. 교체된 상대\n포켓몬에게 데미지를 준다."
    zh_simp: "在对手的脚下扔撒菱。\n对替换出场的对手的宝可梦\n给予伤害。"
    zh_trad: "將撒菱散布在對手的腳下。\n讓對手替換出場的寶可夢\n受到傷害。"
spiky_shield:
  names:
    jp_kana: ニードルガード
    jp_kanji: ニードルガード
    en: Spiky Shield
    fr: Pico-Défense
    it: Agodifesa
    de: Schutzstacheln
    es: Barrera Espinosa
    ko: 니들가드
    zh_simp: 尖刺防守
    zh_trad: 尖刺防守
  descriptions:
    jp_kana: "相手の　攻撃を　防ぐと\n同時に　触れた　相手の\n体力を　削って　しまう。"
    jp_kanji: "相手の　攻撃を　防ぐと\n同時に　触れた　相手の\n体力を　削って　しまう。"
    en: "In addition to protecting the user from attacks, this move\nalso damages any attacker that makes direct contact."
    fr: "Protège des attaques, et diminue les PV de tout\nassaillant qui entre en contact avec le lanceur."
    it: "Il Pokémon si protegge dagli attacchi, riducendo\ninoltre i PS di chi entra in contatto con lui."
    de: "Der Anwender wird vor Angriffen geschützt.\nGleichzeitig nehmen alle Pokémon, die mit\nihm in Berührung kommen, Schaden."
    es: "Protege al usuario de ataques e inflige daño a quien se\nlos lance si entra en contacto con él."
    ko: "상대의 공격을 막음과\n동시에 접촉한 상대의\n체력을 떨어뜨린다."
    zh_simp: "防住对手攻击的同时，\n削减接触到自己的对手的体力。"
    zh_trad: "防禦來自對手的攻擊，\n同時削減接觸到自己的\n對手的ＨＰ。"
spin_out:
  names:
    jp_kana: ホイールスピン
    jp_kanji: ホイールスピン
    en: Spin Out
    fr: Dérapage
    it: Slittaruote
    de: Reifendrehung
    es: Quemarrueda
    ko: 휠스핀
    zh_simp: 疾速转轮
    zh_trad: 疾速轉輪
  descriptions:
    jp_kana: "足に　負荷を　かけることにより\n激しく　回転して　ダメージを　与える。\n自分の　素早さが　がくっと　さがる。"
    jp_kanji: "足に　負荷を　かけることにより\n激しく　回転して　ダメージを　与える。\n自分の　素早さが　がくっと　さがる。"
    en: "The user spins furiously by straining its legs, inflicting\ndamage on the target. This also harshly lowers the user’s\nSpeed stat."
    fr: "Le lanceur met tout son poids sur ses pattes et effectue\nde violentes rotations, ce qui inflige des dégâts à\nla cible, mais baisse beaucoup la Vitesse du lanceur."
    it: "Il Pokémon infligge danni caricando le estremità e\nruotandole vorticosamente. La sua Velocità diminuisce\ndi molto."
    de: "Der Anwender wirbelt wild umher, indem er sein Gewicht\nauf seine Extremitäten verlagert, und richtet so Schaden\nan. Seine eigene Initiative sinkt dadurch stark."
    es: "Inflige daño al objetivo ejerciendo presión sobre sus\nextremidades y girando violentamente sobre sí. Reduce\nmucho la Velocidad del usuario."
    ko: "발에 부하를 걸어\n격렬하게 회전하며 데미지를 준다.\n자신의 스피드가 크게 떨어진다."
    zh_simp: "通过往腿上增加负荷，\n以激烈的旋转给予对手伤害。\n自己的速度会大幅降低。"
    zh_trad: "藉由在腳上負重\n來劇烈地旋轉並給予傷害。\n自己的速度會大幅降低。"
spirit_break:
  names:
    jp_kana: ソウルクラッシュ
    jp_kanji: ソウルクラッシュ
    en: Spirit Break
    fr: Choc Émotionnel
    it: Frantumanima
    de: Seelenbruch
    es: Choque Anímico
    ko: 소울크래시
    zh_simp: 灵魂冲击
    zh_trad: 靈魂衝擊
  descriptions:
    jp_kana: "食らうと　くじけるほどの\n勢いで　攻撃。\n相手の　特攻を　下げる。"
    jp_kanji: "食らうと　くじけるほどの\n勢いで　攻撃。\n相手の　特攻を　下げる。"
    en: "The user attacks the target with so much force that it\ncould break the target’s spirit. This also lowers the\ntarget’s Sp. Atk stat."
    fr: "Le lanceur attaque la cible avec une telle force\nque celle-ci peut s’en retrouver profondément\ntroublée et voir son Attaque Spéciale baisser."
    it: "Il Pokémon attacca il bersaglio con un tale impeto\nda fargli perdere la voglia di lottare e ne riduce\nl’Attacco Speciale."
    de: "Die Attacke trifft das Ziel mit so viel Wucht, dass es\nden Mut verliert. Dabei wird sein Spezial-Angriff\ngesenkt."
    es: "El usuario ataca al objetivo con tal ímpetu que acaba\nminando su moral y, en consecuencia, reduce su Ataque\nEspecial."
    ko: "맞으면 기가 꺾여 버릴 것 같은\n기세로 공격한다.\n상대의 특수공격을 떨어뜨린다."
    zh_simp: "用足以让对手一蹶不振的\n气势进行攻击。\n会降低对手的特攻。"
    zh_trad: "用足以讓對手一蹶不振的\n氣勢進行攻擊。\n可降低對手的特攻。"
spirit_shackle:
  names:
    jp_kana: かげぬい
    jp_kanji: かげぬい
    en: Spirit Shackle
    fr: Tisse Ombre
    it: Cucitura d’Ombra
    de: Schattenfessel
    es: Puntada Sombría
    ko: 그림자꿰매기
    zh_simp: 缝影
    zh_trad: 縫影
  descriptions:
    jp_kana: "攻撃と　同時に\n相手の　影を　縫い付けて\n逃げられなくする。"
    jp_kanji: "攻撃と　同時に\n相手の　影を　縫い付けて\n逃げられなくする。"
    en: "The user attacks while simultaneously stitching the\ntarget’s shadow to the ground to prevent the target\nfrom fleeing."
    fr: "Une attaque qui coud la cible à son ombre,\nce qui l’empêche de s’enfuir."
    it: "Il Pokémon attacca il bersaglio e fissa la sua ombra\na terra impedendogli di lasciare il campo."
    de: "Der Anwender greift das Ziel an und näht zugleich\ndessen Schatten am Boden fest, um es so an der Flucht\nbeziehungsweise am Auswechseln zu hindern."
    es: "Ataca al objetivo y, al mismo tiempo, fija su sombra\nal terreno para impedir su huida o que pueda ser\ncambiado por otro."
    ko: "공격과 동시에\n상대의 그림자를 꿰매\n도망칠 수 없게 한다."
    zh_simp: "攻击的同时，\n缝住对手的影子，\n使其无法逃走。"
    zh_trad: "攻擊的同時，\n縫住對手的影子，\n使其無法逃走。"
spit_up:
  names:
    jp_kana: はきだす
    jp_kanji: はきだす
    en: Spit Up
    fr: Relâche
    it: Sfoghenergia
    de: Entfessler
    es: Escupir
    ko: 토해내기
    zh_simp: 喷出
    zh_trad: 噴出
  descriptions:
    jp_kana: "蓄えた　力を\n相手に　ぶつけて　攻撃する。\n蓄えているほど　威力が　あがる。"
    jp_kanji: "蓄えた　力を\n相手に　ぶつけて　攻撃する。\n蓄えているほど　威力が　あがる。"
    en: "The power stored using the move Stockpile is released\nat once in an attack. The more power is stored, the\ngreater the move’s power."
    fr: "Libère dans une attaque l’énergie précédemment\nemmagasinée avec Stockage. La puissance augmente en\nfonction du nombre de fois où Stockage a été utilisée."
    it: "Tutta l’energia accumulata in precedenza con Accumulo\nè rilasciata nell’attacco. Maggiore è l’energia, più\nla potenza aumenta."
    de: "Entlädt die Kraft, die während des Einsatzes von Horter\ngesammelt wurde. Je mehr Energie gehortet wurde,\ndesto stärker der Angriff."
    es: "Libera de una vez la energía acumulada con Reserva.\nLa potencia del movimiento será proporcional a la\ncantidad de energía acumulada."
    ko: "비축된 힘을\n상대에게 부딪쳐서 공격한다.\n비축된 만큼 위력이 올라간다."
    zh_simp: "将积蓄的力量\n撞向对手进行攻击。\n积蓄得越多，威力越大。"
    zh_trad: "將蓄積的力量\n撞向對手進行攻擊。\n蓄積得越多，威力越大。"
spite:
  names:
    jp_kana: うらみ
    jp_kanji: うらみ
    en: Spite
    fr: Dépit
    it: Dispetto
    de: Groll
    es: Rencor
    ko: 원한
    zh_simp: 怨恨
    zh_trad: 怨恨
  descriptions:
    jp_kana: "相手が　最後に　使った技に\n恨みを　抱いて\nその技の　ＰＰを　４だけ　減らす。"
    jp_kanji: "相手が　最後に　使った技に\n恨みを　抱いて\nその技の　ＰＰを　４だけ　減らす。"
    en: "The user unleashes its grudge on the move last used\nby the target by cutting 4 PP from it."
    fr: "Le lanceur exprime son ressentiment en retirant 4 PP\nà la dernière capacité utilisée par la cible."
    it: "Il Pokémon sfoga la propria rabbia sull’ultima mossa\nusata dal bersaglio e le sottrae quattro PP."
    de: AP der letzten Attacke des Zieles werden um 4 gesenkt.
    es: "Da rienda suelta a su rencor para reducir 4 PP del último\nmovimiento usado por el objetivo."
    ko: "상대가 마지막으로\n사용한 기술에 원한을 품어\n그 기술의 PP를 4만큼 줄인다."
    zh_simp: "对对手最后使用的招式\n怀有怨恨，\n减少４ＰＰ该招式。"
    zh_trad: "向對手最近一次使用的招式\n發出怨念，\n讓該招式減少４ＰＰ。"
splash:
  names:
    jp_kana: はねる
    jp_kanji: はねる
    en: Splash
    fr: Trempette
    it: Splash
    de: Platscher
    es: Salpicadura
    ko: 튀어오르기
    zh_simp: 跃起
    zh_trad: 躍起
  descriptions:
    jp_kana: "攻撃もせずに　ピョン　ピョンと\n跳ねるだけで　なにも　おこらない……。"
    jp_kanji: "攻撃もせずに　ピョン　ピョンと\n跳ねるだけで　なにも　おこらない……。"
    en: "The user just flops and splashes around to no effect\nat all..."
    fr: "Le lanceur barbote et éclabousse les environs.\nCette capacité n’a aucun effet."
    it: "Il Pokémon sguazza nell’acqua, senza ottenere\nalcun effetto."
    de: Nur ein Platscher, der überhaupt nichts bewirkt.
    es: No tiene ningún efecto. Solo salpica.
    ko: "공격도 하지 않고 팔딱팔딱 튈 뿐\n아무 일도 일어나지 않는다..."
    zh_simp: "也不攻击只是一蹦一蹦地跳，\n什么都不会发生……"
    zh_trad: "不攻擊對手，只是蹦蹦跳跳的，\n什麼事也不會發生……"
splintered_stormshards:
  names:
    jp_kana: ラジアルエッジストーム
    jp_kanji: ラジアルエッジストーム
    en: Splintered Stormshards
    fr: Hurlement des Roches-Lames
    it: Litotempesta Radiale
    de: Fataler Steinregen
    es: Tempestad Rocosa
    ko: 레이디얼에지스톰
    zh_simp: 狼啸石牙飓风暴
    zh_trad: 狼嘯石牙颶風暴
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
