corrosive_gas:
  names:
    jp_kana: ふしょくガス
    jp_kanji: ふしょくガス
    en: Corrosive Gas
    fr: Gaz Corrosif
    it: Gas Corrosivo
    de: Korrosionsgas
    es: Gas Corrosivo
    ko: 부식가스
    zh_simp: 腐蚀气体
    zh_trad: 腐蝕氣體
  descriptions:
    jp_kana: "強い　酸性の　ガスで\n周りに　いるものを　包みこみ\n持っている　道具を　溶かしてしまう。"
    jp_kanji: "強い　酸性の　ガスで\n周りに　いるものを　包みこみ\n持っている　道具を　溶かしてしまう。"
    en: "The user surrounds everything around it with highly\nacidic gas and melts away items held by other Pokémon."
    fr: "Un gaz corrosif qui enveloppe tous les Pokémon\nalentour et qui dissout les objets qu’ils tiennent."
    it: "Chi la usa avvolge gli altri Pokémon attorno in un gas\naltamente acido, dissolvendo i loro strumenti."
    de: "Der Anwender greift alle Pokémon im Umkreis mit\neinem ätzenden Gas an. Getragene Items werden\ndadurch zersetzt."
    es: "El usuario libera un gas cáustico que envuelve a los\nPokémon adyacentes y derrite por completo los objetos\nque lleven equipados."
    ko: "주위에 있는 모든 것을\n강력한 산성 가스로 뒤덮어서\n지니고 있는 도구를 녹여 버린다."
    zh_simp: "用具有强酸性的气体\n包裹住自己周围所有的宝可梦，\n并融化其所携带的道具。"
    zh_trad: "用強烈的酸性氣體\n包圍周圍所有的寶可夢，\n並將攜帶的道具融化掉。"
cosmic_power:
  names:
    jp_kana: コスモパワー
    jp_kanji: コスモパワー
    en: Cosmic Power
    fr: Force Cosmique
    it: Cosmoforza
    de: Kosmik-Kraft
    es: Masa Cósmica
    ko: 코스믹파워
    zh_simp: 宇宙力量
    zh_trad: 宇宙力量
  descriptions:
    jp_kana: "宇宙から　神秘の　力を\nとりこむ　ことで\n自分の　防御と　特防を　あげる。"
    jp_kanji: "宇宙から　神秘の　力を\nとりこむ　ことで\n自分の　防御と　特防を　あげる。"
    en: "The user absorbs a mystical power from space to boost\nits Defense and Sp. Def stats."
    fr: "Le lanceur absorbe un pouvoir mystique spatial\nqui augmente sa Défense et sa Défense Spéciale."
    it: "Il Pokémon assorbe una forza mistica dallo spazio\nche aumenta la Difesa e la Difesa Speciale."
    de: "Erhöht Verteidigung und Spezial-Verteidigung durch\neine mystische Kraft."
    es: "Absorbe una energía mística proveniente del espacio\nque aumenta su Defensa y su Defensa Especial."
    ko: "우주로부터 신비한 힘을\n손에 넣음으로써\n자신의 방어와 특수방어를 올린다."
    zh_simp: "汲取宇宙中神秘的力量，\n从而提高自己的防御和特防。"
    zh_trad: "吸取來自宇宙的神秘力量，\n提高自己的防禦和特防。"
cotton_guard:
  names:
    jp_kana: コットンガード
    jp_kanji: コットンガード
    en: Cotton Guard
    fr: Cotogarde
    it: Cotonscudo
    de: Watteschild
    es: Rizo Algodón
    ko: 코튼가드
    zh_simp: 棉花防守
    zh_trad: 棉花防守
  descriptions:
    jp_kana: "フワフワの　綿毛で　自分の\n体を　包みこんで　守る。\n防御を　ぐぐーんと　あげる。"
    jp_kanji: "フワフワの　綿毛で　自分の\n体を　包みこんで　守る。\n防御を　ぐぐーんと　あげる。"
    en: "The user protects itself by wrapping its body in soft\ncotton, drastically boosting its Defense stat."
    fr: "Le lanceur se protège en s’emmitouflant dans du coton.\nSa Défense augmente énormément."
    it: "Il Pokémon avvolge il proprio corpo con del cotone\nmolto morbido, proteggendosi e aumentando\nmoltissimo la propria Difesa."
    de: "Anwender schützt sich, indem er sich in einen luftigen\nFlaum hüllt. Erhöht die Verteidigung drastisch."
    es: "Cubre al Pokémon con una madeja protectora.\nAumenta muchísimo la Defensa."
    ko: "푹신푹신한 솜털로 자신의\n몸을 둘러싸서 지킨다.\n방어를 매우 크게 올린다."
    zh_simp: "用软绵绵的绒毛包裹住\n自己的身体进行守护。\n巨幅提高自己的防御。"
    zh_trad: "用軟綿綿的絨毛\n保護自己的身體。\n極大幅提高自己的防禦。"
cotton_spore:
  names:
    jp_kana: わたほうし
    jp_kanji: わたほうし
    en: Cotton Spore
    fr: Spore Coton
    it: Cotonspora
    de: Baumwollsaat
    es: Esporagodón
    ko: 목화포자
    zh_simp: 棉孢子
    zh_trad: 棉孢子
  descriptions:
    jp_kana: "綿のような　フワフワの　胞子を\nまとわり　つかせて\n相手の　素早さを　がくっと　さげる。"
    jp_kanji: "綿のような　フワフワの　胞子を\nまとわり　つかせて\n相手の　素早さを　がくっと　さげる。"
    en: "The user releases cotton-like spores that cling to\nopposing Pokémon. This harshly lowers their Speed stats."
    fr: "Le lanceur libère des spores cotonneuses qui collent\nà la cible et baissent beaucoup sa Vitesse."
    it: "Il Pokémon rilascia spore simili al cotone che si\nattaccano agli avversari e ne riducono di molto\nla Velocità."
    de: "Wattebäusche heften sich an gegnerische Pokémon,\nderen Initiative-Wert dadurch stark sinkt."
    es: "Adhiere esporas al objetivo para reducir mucho su\nVelocidad."
    ko: "솜처럼 폭신폭신한 포자를\n착 달라붙게 해서\n상대의 스피드를 크게 떨어뜨린다."
    zh_simp: "将棉花般柔软的孢子\n紧贴对手，\n从而大幅降低对手的速度。"
    zh_trad: "將棉花般柔軟的孢子\n纏繞對手，\n大幅降低對手的速度。"
counter:
  names:
    jp_kana: カウンター
    jp_kanji: カウンター
    en: Counter
    fr: Riposte
    it: Contrattacco
    de: Konter
    es: Contraataque
    ko: 카운터
    zh_simp: 双倍奉还
    zh_trad: 雙倍奉還
  descriptions:
    jp_kana: "相手から　受けた　物理攻撃の\nダメージを　２倍に　して\n同じ　相手に　返す。"
    jp_kanji: "相手から　受けた　物理攻撃の\nダメージを　２倍に　して\n同じ　相手に　返す。"
    en: "A retaliatory attack that counters any physical move,\ninflicting double the damage taken."
    fr: "Une riposte qui répond à toute attaque physique\nen infligeant le double de dégâts."
    it: "Mossa che contrasta ogni attacco fisico,\narrecando il doppio del danno ricevuto."
    de: "Kontert physische Treffer und fügt dem Ziel das\nDoppelte des Schadens zu, den der Anwender\nerlitten hat."
    es: Devuelve un ataque físico por duplicado.
    ko: "상대로부터 받은 물리공격의\n데미지를 2배로 만들어\n같은 상대에게 돌려준다."
    zh_simp: "从对手那里受到\n物理攻击的伤害将以\n２倍返还给同一个对手。"
    zh_trad: "將來自對手的物理攻擊傷害加倍後，\n返還給該對手。"
court_change:
  names:
    jp_kana: コートチェンジ
    jp_kanji: コートチェンジ
    en: Court Change
    fr: Change-Côté
    it: Cambiocampo
    de: Seitenwechsel
    es: Cambio de Cancha
    ko: 코트체인지
    zh_simp: 换场
    zh_trad: 換場
  descriptions:
    jp_kana: "不思議な　力で\nお互いの　場の　効果を　入れ替える。"
    jp_kanji: "不思議な　力で\nお互いの　場の　効果を　入れ替える。"
    en: "With its mysterious power, the user swaps the effects on\neither side of the field."
    fr: "Une force mystérieuse intervertit les effets\naffectant chaque côté du terrain."
    it: "Il Pokémon inverte gli effetti attivi sul campo alleato\ne sul campo avversario grazie a una forza misteriosa."
    de: "Durch eine mysteriöse Macht werden wirksame Effekte\nauf Mitstreiterseite und gegnerischer Seite getauscht."
    es: "Extraño poder que intercambia los efectos en el terreno\nde combate de ambos bandos."
    ko: "이상한 힘으로\n서로의 필드 효과를 교체한다."
    zh_simp: "用神奇的力量\n交换双方的场地效果。"
    zh_trad: "用神奇的力量\n與對手交換場地效果。"
covet:
  names:
    jp_kana: ほしがる
    jp_kanji: ほしがる
    en: Covet
    fr: Implore
    it: Supplica
    de: Bezirzer
    es: Antojo
    ko: 탐내기
    zh_simp: 渴望
    zh_trad: 渴望
  descriptions:
    jp_kana: "かわいく　あまえながら\n相手に　ちかづき\n持っている　道具を　うばう。"
    jp_kanji: "かわいく　あまえながら\n相手に　ちかづき\n持っている　道具を　うばう。"
    en: "The user endearingly approaches the target, then steals\nthe target’s held item."
    fr: "Le lanceur s’approche de la cible avec un air angélique\nafin de dérober l’objet qu’elle tient."
    it: "Il Pokémon si avvicina al bersaglio con fare accattivante\ne gli ruba lo strumento."
    de: "Der Anwender schmeichelt sich beim Ziel ein und\nstiehlt dann das von ihm getragene Item."
    es: "Se acerca con ternura al objetivo y le roba el objeto\nque lleve."
    ko: "귀엽게 애교 부리며\n상대에게 다가가\n지니고 있는 도구를 뺏는다."
    zh_simp: "一边可爱地撒娇，\n一边靠近对手进行攻击，\n还能夺取对手携带的道具。"
    zh_trad: "一邊可愛地撒嬌，\n一邊靠近對手，\n奪取對手攜帶的道具。"
crabhammer:
  names:
    jp_kana: クラブハンマー
    jp_kanji: クラブハンマー
    en: Crabhammer
    fr: Pince-Masse
    it: Martellata
    de: Krabbhammer
    es: Martillazo
    ko: 집게해머
    zh_simp: 蟹钳锤
    zh_trad: 蟹鉗錘
  descriptions:
    jp_kana: "大きな　ハサミを\n相手に　たたきつけて　攻撃する。\n急所に　当たりやすい。"
    jp_kanji: "大きな　ハサミを\n相手に　たたきつけて　攻撃する。\n急所に　当たりやすい。"
    en: "The target is hammered with a large pincer. This move\nhas a heightened chance of landing a critical hit."
    fr: "Une grande pince martèle la cible.\nTaux de critiques élevé."
    it: "Il Pokémon attacca il bersaglio servendosi di una grande\ntenaglia. Probabile brutto colpo."
    de: Schlägt mit Schere zu. Hohe Volltrefferquote.
    es: "Golpea con fuerza con una pinza enorme. Suele asestar\nun golpe crítico."
    ko: "큰 집게를\n상대에게 내리쳐서 공격한다.\n급소에 맞기 쉽다."
    zh_simp: "用大钳子\n敲打对手进行攻击。\n容易击中要害。"
    zh_trad: "用巨大的鉗子\n敲打對手進行攻擊。\n容易擊中要害。"
crafty_shield:
  names:
    jp_kana: トリックガード
    jp_kanji: トリックガード
    en: Crafty Shield
    fr: Vigilance
    it: Truccodifesa
    de: Trickschutz
    es: Truco Defensa
    ko: 트릭가드
    zh_simp: 戏法防守
    zh_trad: 戲法防守
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
cross_chop:
  names:
    jp_kana: クロスチョップ
    jp_kanji: クロスチョップ
    en: Cross Chop
    fr: Coup Croix
    it: Incrocolpo
    de: Kreuzhieb
    es: Tajo Cruzado
    ko: 크로스촙
    zh_simp: 十字劈
    zh_trad: 十字劈
  descriptions:
    jp_kana: "両手チョップを\n相手に　たたきつけて　攻撃する。\n急所に　当たりやすい。"
    jp_kanji: "両手チョップを\n相手に　たたきつけて　攻撃する。\n急所に　当たりやすい。"
    en: "The user delivers a double chop with its forearms\ncrossed. This move has a heightened chance of landing\na critical hit."
    fr: "Le lanceur délivre un coup double en croisant\nles avant-bras. Taux de critiques élevé."
    it: "Il Pokémon attacca investendo il bersaglio con un colpo\nsferrato con entrambe le braccia incrociate. Probabile\nbrutto colpo."
    de: "Doppelter Hieb mit den Unterarmen.\nHohe Volltrefferquote."
    es: "Golpe doble con las manos que suele asestar un golpe\ncrítico."
    ko: "양손으로 당수를\n상대에게 힘껏 쳐서 공격한다.\n급소에 맞기 쉽다."
    zh_simp: "用两手呈十字\n劈打对手进行攻击。\n容易击中要害。"
    zh_trad: "用左右手刀\n劈打對手進行攻擊。\n容易擊中要害。"
cross_poison:
  names:
    jp_kana: クロスポイズン
    jp_kanji: クロスポイズン
    en: Cross Poison
    fr: Poison Croix
    it: Velenocroce
    de: Giftstreich
    es: Veneno X
    ko: 크로스포이즌
    zh_simp: 十字毒刃
    zh_trad: 十字毒刃
  descriptions:
    jp_kana: "毒の　刃で　相手を　切り裂く。\n毒状態に　することが　あり\n急所にも　当たりやすい。"
    jp_kanji: "毒の　刃で　相手を　切り裂く。\n毒状態に　することが　あり\n急所にも　当たりやすい。"
    en: "A slashing attack with a poisonous blade that may also\npoison the target. This move has a heightened chance of\nlanding a critical hit."
    fr: "Un coup tranchant qui peut empoisonner la cible.\nTaux de critiques élevé."
    it: "Il Pokémon attacca con zanne tossiche che possono\nanche avvelenare il bersaglio. Probabile brutto colpo."
    de: "Ein schneidender Hieb, der das Ziel eventuell vergiftet.\nHat eine hohe Volltrefferquote."
    es: "Tajo que puede envenenar al objetivo. Suele asestar\nun golpe crítico."
    ko: "독 칼날로 상대를 베어 가른다.\n독 상태로 만들 때가 있고\n급소에도 맞기 쉽다."
    zh_simp: "用毒刃劈开对手。\n有时会让对手陷入中毒状态，\n也容易击中要害。"
    zh_trad: "用毒刃劈開對手。\n有時會讓對手陷入中毒狀態，\n也容易擊中要害。"
crunch:
  names:
    jp_kana: かみくだく
    jp_kanji: かみくだく
    en: Crunch
    fr: Mâchouille
    it: Sgranocchio
    de: Knirscher
    es: Triturar
    ko: 깨물어부수기
    zh_simp: 咬碎
    zh_trad: 咬碎
  descriptions:
    jp_kana: "鋭い　歯で\n相手を　かみくだいて　攻撃する。\n相手の　防御を　さげることが　ある。"
    jp_kanji: "鋭い　歯で\n相手を　かみくだいて　攻撃する。\n相手の　防御を　さげることが　ある。"
    en: "The user crunches up the target with sharp fangs.\nThis may also lower the target’s Defense stat."
    fr: "Le lanceur mord la cible de ses crocs pointus, ce qui\npeut aussi baisser sa Défense."
    it: "Il Pokémon attacca mordendo il bersaglio con denti\naffilati. Può anche ridurne la Difesa."
    de: "Beißt mit scharfen Reißzähnen zu und senkt eventuell\ndie Verteidigung."
    es: "Tritura con afilados colmillos y puede reducir la Defensa\ndel objetivo."
    ko: "날카로운 이빨로\n상대를 깨물어 부숴서 공격한다.\n상대의 방어를 떨어뜨릴 때가 있다."
    zh_simp: "用利牙咬碎对手进行攻击。\n有时会降低对手的防御。"
    zh_trad: "用尖銳的牙齒咬碎對手進行攻擊。\n有時會降低對手的防禦。"
crush_claw:
  names:
    jp_kana: ブレイククロー
    jp_kanji: ブレイククロー
    en: Crush Claw
    fr: Éclate Griffe
    it: Tritartigli
    de: Zermalmklaue
    es: Garra Brutal
    ko: 브레이크클로
    zh_simp: 撕裂爪
    zh_trad: 撕裂爪
  descriptions:
    jp_kana: "硬く　鋭い　ツメで\n切り裂いて　攻撃する。\n相手の　防御を　さげることが　ある。"
    jp_kanji: "硬く　鋭い　ツメで\n切り裂いて　攻撃する。\n相手の　防御を　さげることが　ある。"
    en: "The user slashes the target with hard and sharp claws.\nThis may also lower the target’s Defense stat."
    fr: "Le lanceur lacère la cible avec des griffes solides\net aiguisées, ce qui peut aussi baisser la Défense\nde celle-ci."
    it: "Il Pokémon attacca il bersaglio con artigli robusti\ne affilati che possono ridurne la Difesa."
    de: "Angriff mit scharfen Klauen. Senkt eventuell den\nVerteidigungs-Wert."
    es: "Hace trizas al objetivo con garras afiladas y puede\nreducir su Defensa."
    ko: "단단하고 날카로운 손톱으로\n베어 갈라서 공격한다.\n상대의 방어를 떨어뜨릴 때가 있다."
    zh_simp: "用坚硬的锐爪\n劈开对手进行攻击。\n有时会降低对手的防御。"
    zh_trad: "用堅硬的銳爪\n撕裂對手進行攻擊。\n有時會降低對手的防禦。"
crush_grip:
  names:
    jp_kana: にぎりつぶす
    jp_kanji: にぎりつぶす
    en: Crush Grip
    fr: Presse
    it: Sbriciolmano
    de: Quetschgriff
    es: Agarrón
    ko: 묵사발
    zh_simp: 捏碎
    zh_trad: 捏碎
  descriptions:
    jp_kana: "すさまじい　力で　相手を　にぎりつぶす。\n相手の　ＨＰが　残っているほど\n威力が　あがる。"
    jp_kanji: "すさまじい　力で　相手を　にぎりつぶす。\n相手の　ＨＰが　残っているほど\n威力が　あがる。"
    en: "The target is crushed with great force. The more HP the\ntarget has left, the greater the move’s power."
    fr: "Une force oppressante écrase la cible. Plus il lui reste\nde PV, plus la puissance de la capacité augmente."
    it: "Il Pokémon stringe il bersaglio con grande forza.\nPiù PS rimangono al bersaglio, maggiore è\nla potenza della mossa."
    de: "Ziel wird mit großer Kraft getroffen. Je höher die KP\ndes Zieles, desto stärker die Attacke."
    es: "Estruja al objetivo con gran fuerza. Cuantos más PS\nle queden al objetivo, mayor potencia tendrá el\nmovimiento."
    ko: "굉장한 힘으로 상대를 묵사발로 만든다.\n상대의 HP가 남아 있을수록 위력이 올라간다."
    zh_simp: "用骇人的力量捏碎对手。\n对手剩余的ＨＰ越多，\n威力越大。"
    zh_trad: "用驚人的力量捏碎對手。\n對手現有的ＨＰ越多，\n招式的威力越大。"
curse:
  names:
    jp_kana: のろい
    jp_kanji: のろい
    en: Curse
    fr: Malédiction
    it: Maledizione
    de: Fluch
    es: Maldición
    ko: 저주
    zh_simp: 咒术
    zh_trad: 詛咒
  descriptions:
    jp_kana: "使う　ポケモンが\nゴーストタイプと　それ以外　とでは\n効果が　変わる。"
    jp_kanji: "使う　ポケモンが\nゴーストタイプと　それ以外　とでは\n効果が　変わる。"
    en: "A move that has different effects depending on whether\nthe user is a Ghost type or not."
    fr: "Une capacité à l’effet différent selon que le lanceur\nest un Pokémon Spectre ou non."
    it: "Una mossa che agisce in modo diverso\nse chi la usa è di tipo Spettro."
    de: "Attacke, deren Wirkung davon abhängt, ob der\nAnwender ein Geister-Pokémon ist."
    es: "Un movimiento que tiene efectos distintos si el usuario\nes de tipo Fantasma o no."
    ko: "기술을 쓰는 포켓몬이\n고스트타입일 때와 그 이외의\n타입일 때는 효과가 다르다."
    zh_simp: "使用该招式的宝可梦，\n其属性是幽灵属性或其他属性时，\n效果会不一样。"
    zh_trad: "使用詛咒時，\n幽靈屬性的寶可夢和其他屬性的寶可夢，\n會獲得不同的招式效果。"
cut:
  names:
    jp_kana: いあいぎり
    jp_kanji: いあいぎり
    en: Cut
    fr: Coupe
    it: Taglio
    de: Zerschneider
    es: Corte
    ko: 풀베기
    zh_simp: 居合劈
    zh_trad: 居合斬
  descriptions:
    jp_kana: "カマや　ツメなどで\n相手を　切りつけて　攻撃する。"
    jp_kanji: "カマや　ツメなどで\n相手を　切りつけて　攻撃する。"
    en: "The target is cut with a scythe, a claw, or the like\nto inflict damage."
    fr: Coupe la cible avec des lames ou des griffes.
    it: Il Pokémon attacca il bersaglio con artigli o falci affilate.
    de: Ein Basisangriff mit Schere oder Klaue.
    es: Corta al objetivo con garras, guadañas o similares.
    ko: "낫이나 발톱 등으로\n상대를 베어 공격한다."
    zh_simp: "用镰刀或爪子等\n切斩对手进行攻击。"
    zh_trad: "用鐮刀或爪子等\n斬切對手進行攻擊。"
dark_pulse:
  names:
    jp_kana: あくのはどう
    jp_kanji: あくのはどう
    en: Dark Pulse
    fr: Vibrobscur
    it: Neropulsar
    de: Finsteraura
    es: Pulso Umbrío
    ko: 악의파동
    zh_simp: 恶之波动
    zh_trad: 惡之波動
  descriptions:
    jp_kana: "体から　悪意に　みちた\n恐ろしい　オーラを　発する。\n相手を　ひるませることが　ある。"
    jp_kanji: "体から　悪意に　みちた\n恐ろしい　オーラを　発する。\n相手を　ひるませることが　ある。"
    en: "The user releases a horrible aura imbued with ill intent.\nThis may also make the target flinch."
    fr: "Le lanceur projette une horrible aura chargée\nde pensées maléfiques, ce qui peut aussi apeurer\nla cible."
    it: "Il Pokémon emana un’aura impregnata di oscuri pensieri.\nPuò anche far tentennare il bersaglio."
    de: "Anwender greift mit fürchterlicher Aura schlechter\nGedanken an. Ziel schreckt eventuell zurück."
    es: "Libera una horrible aura llena de malos pensamientos\nque puede amedrentar al objetivo."
    ko: "몸에서 악의로 가득한\n무서운 오라를 발한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "从体内发出\n充满恶意的恐怖气场。\n有时会使对手畏缩。"
    zh_trad: "從身體散發出\n充滿惡意的恐怖氣場。\n有時會使對手畏縮。"
dark_void:
  names:
    jp_kana: ダークホール
    jp_kanji: ダークホール
    en: Dark Void
    fr: Trou Noir
    it: Vuototetro
    de: Schlummerort
    es: Brecha Negra
    ko: 다크홀
    zh_simp: 暗黑洞
    zh_trad: 暗黑洞
  descriptions:
    jp_kana: "暗黒の　世界に　ひきずり　落として\n相手を　眠り状態に　する。"
    jp_kanji: "暗黒の　世界に　ひきずり　落として\n相手を　眠り状態に　する。"
    en: "Opposing Pokémon are dragged into a world of total\ndarkness that puts them to sleep."
    fr: "La cible est plongée dans les ténèbres et\ntombe dans un profond sommeil."
    it: "Il Pokémon trascina gli avversari in un mondo di totale\noscurità e li fa addormentare."
    de: "Gegnerische Pokémon werden in eine Welt der\nDunkelheit gezogen und in Schlaf versetzt."
    es: "El objetivo es enviado a un mundo de tinieblas que lo\nhace dormir."
    ko: "암흑의 세계로 끌고 가서\n상대를 잠듦 상태로 만든다."
    zh_simp: "将对手强制拖入黑暗的世界，\n从而让对手陷入睡眠状态。"
    zh_trad: "將對手強制拉進黑暗的世界，\n讓對手陷入睡眠狀態。"
darkest_lariat:
  names:
    jp_kana: ＤＤラリアット
    jp_kanji: ＤＤラリアット
    en: Darkest Lariat
    fr: Dark Lariat
    it: Braccioteso
    de: Dark Lariat
    es: Lariat Oscuro
    ko: DD래리어트
    zh_simp: ＤＤ金勾臂
    zh_trad: ＤＤ金勾臂
  descriptions:
    jp_kana: "両腕を　回し　相手に　当てる。\n相手の　能力変化に\n関係なく　ダメージを　与える。"
    jp_kanji: "両腕を　回し　相手に　当てる。\n相手の　能力変化に\n関係なく　ダメージを　与える。"
    en: "The user swings both arms and hits the target.\nThe target’s stat changes don’t affect the damage\ninflicted by this move."
    fr: "Le lanceur étend les bras et frappe l’adversaire\nen tournant violemment. Il inflige des dégâts et\nignore les changements de stats de la cible."
    it: "Il Pokémon colpisce il bersaglio mulinando gli arti.\nIl danno inflitto ignora le modifiche alle statistiche\ndel bersaglio."
    de: "Der Anwender wirbelt mit beiden Armen und prallt\nso auf das Ziel. Richtet unabhängig von den\nStatusveränderungen des Zieles Schaden an."
    es: "Gira sobre sí mismo y golpea al objetivo con ambos\nbrazos. Ignora los cambios en las características del\nobjetivo."
    ko: "양팔을 돌려 상대에게 부딪친다.\n상대의 능력 변화에\n상관없이 데미지를 준다."
    zh_simp: "旋转双臂打向对手。\n无视对手的能力变化，\n直接给予伤害。"
    zh_trad: "旋轉雙臂並打向對手。\n可不顧對手的能力變化\n給予傷害。"
dazzling_gleam:
  names:
    jp_kana: マジカルシャイン
    jp_kanji: マジカルシャイン
    en: Dazzling Gleam
    fr: Éclat Magique
    it: Magibrillio
    de: Zauberschein
    es: Brillo Mágico
    ko: 매지컬샤인
    zh_simp: 魔法闪耀
    zh_trad: 魔法閃耀
  descriptions:
    jp_kana: "強力な　光を　放ち\n相手に　ダメージを　与える。"
    jp_kanji: "強力な　光を　放ち\n相手に　ダメージを　与える。"
    en: "The user damages opposing Pokémon by emitting a\npowerful flash."
    fr: "Le lanceur libère une puissante décharge lumineuse\nqui inflige des dégâts à l’ennemi."
    it: "Il Pokémon emette una luce potentissima che infligge\ndanni agli avversari."
    de: "Der Anwender feuert einen mächtigen Lichtblitz ab,\nder gegnerischen Pokémon Schaden zufügt."
    es: Inflige daño al objetivo con una potente luz.
    ko: "강력한 빛을 내어\n상대에게 데미지를 준다."
    zh_simp: "向对手发射强光，\n并给予伤害。"
    zh_trad: "發出強烈的閃光，\n給予對手傷害。"
decorate:
  names:
    jp_kana: デコレーション
    jp_kanji: デコレーション
    en: Decorate
    fr: Nappage
    it: Decorazione
    de: Verzierung
    es: Decoración
    ko: 데코레이션
    zh_simp: 装饰
    zh_trad: 裝飾
  descriptions:
    jp_kana: "かざりつけを　することで\n相手の　攻撃と　特攻を\nぐーんと　上げる。"
    jp_kanji: "かざりつけを　することで\n相手の　攻撃と　特攻を\nぐーんと　上げる。"
    en: "The user sharply boosts the target’s Attack and Sp. Atk\nstats by decorating the target."
    fr: "Le lanceur augmente beaucoup l’Attaque et l’Attaque\nSpéciale de la cible en la nappant de glaçage."
    it: "Il Pokémon agghinda il bersaglio con delle decorazioni\naumentandone di molto l’Attacco e l’Attacco Speciale."
    de: "Durch Verzierungen werden der Angriff und\nSpezial-Angriff des Zieles stark erhöht."
    es: "Aumenta mucho el Ataque y el Ataque Especial del\nobjetivo al decorarlo."
    ko: "데코레이션을 해서\n상대의 공격과 특수공격을\n크게 올린다."
    zh_simp: "通过装饰，\n大幅提高对方的\n攻击和特攻。"
    zh_trad: "透過裝飾，\n大幅提高對手的\n攻擊和特攻。"
defend_order:
  names:
    jp_kana: ぼうぎょしれい
    jp_kanji: ぼうぎょしれい
    en: Defend Order
    fr: Appel Défense
    it: Comandoscudo
    de: Blockbefehl
    es: A Defender
    ko: 방어지령
    zh_simp: 防御指令
    zh_trad: 防禦指令
  descriptions:
    jp_kana: "しもべを　呼びだして　自分の　体に\nおおい　つかせる。防御と　特防を\nあげることが　できる。"
    jp_kanji: "しもべを　呼びだして　自分の　体に\nおおい　つかせる。防御と　特防を\nあげることが　できる。"
    en: "The user calls out its underlings to shield its body,\nboosting its Defense and Sp. Def stats."
    fr: "Le lanceur appelle ses subalternes pour former\nun bouclier qui augmente sa Défense et sa Défense\nSpéciale."
    it: "Il Pokémon raduna i suoi sgherri per creare\nuno scudo, aumentando Difesa e Difesa Speciale."
    de: "Untergebene bilden einen lebenden Schild um\nden Anwender. Erhöht Verteidigung und\nSpezial-Verteidigung."
    es: "El usuario llama a sus súbditos para que formen un\nescudo viviente. Aumenta la Defensa y la Defensa\nEspecial."
    ko: "부하를 불러내어 자신의 몸을\n뒤덮게 한다. 방어와 특수방어를\n올릴 수 있다."
    zh_simp: "召唤手下，\n让其附在自己的身体上。\n可以提高自己的防御和特防。"
    zh_trad: "呼喚手下，覆蓋住自己的身體。\n可提高自己的防禦和特防。"
defense_curl:
  names:
    jp_kana: まるくなる
    jp_kanji: まるくなる
    en: Defense Curl
    fr: Boul’Armure
    it: Ricciolscudo
    de: Einigler
    es: Rizo Defensa
    ko: 웅크리기
    zh_simp: 变圆
    zh_trad: 變圓
  descriptions:
    jp_kana: "体を　まるめて　ちぢこまり\n自分の　防御を　あげる。"
    jp_kanji: "体を　まるめて　ちぢこまり\n自分の　防御を　あげる。"
    en: The user curls up and boosts its Defense stat.
    fr: "Le lanceur s’enroule pour cacher ses points faibles,\nce qui augmente sa Défense."
    it: "Il Pokémon si raggomitola per nascondere i punti deboli\ne aumentare la propria Difesa."
    de: "Verbirgt Schwächen durch Einrollen und hebt\ngleichzeitig den Verteidigungs-Wert."
    es: "Se enrosca para ocultar sus puntos débiles y aumentar\nla Defensa."
    ko: "몸을 둥글게 웅크려서\n자신의 방어를 올린다."
    zh_simp: "将身体蜷曲变圆，\n从而提高自己的防御。"
    zh_trad: "將身體蜷縮成圓形，\n提高自己的防禦。"
defog:
  names:
    jp_kana: きりばらい
    jp_kanji: きりばらい
    en: Defog
    fr: Anti-Brume
    it: Scacciabruma
    de: Auflockern
    es: Despejar
    ko: 안개제거
    zh_simp: 清除浓雾
    zh_trad: 清除濃霧
  descriptions:
    jp_kana: "強い風で　相手の　リフレクターや\nひかりのかべ　などを　はらいのける。\n回避率も　さげる。"
    jp_kanji: "強い風で　相手の　リフレクターや\nひかりのかべ　などを　はらいのける。\n回避率も　さげる。"
    en: "A strong wind blows away the target’s barriers such as\nReflect or Light Screen. This also lowers the target’s\nevasiveness."
    fr: "Un grand coup de vent disperse Protection ou\nMur Lumière de la cible et diminue également\nson Esquive."
    it: "Il Pokémon spazza via barriere come Riflesso e\nSchermoluce con un forte vento e riduce\nla capacità d’elusione del bersaglio."
    de: "Starker Wind hebt Attacken wie Reflektor und\nLichtschild des Zieles auf. Senkt außerdem den\nAusweichwert."
    es: "Potente viento que barre los efectos de movimientos\ncomo Reflejo o Pantalla de Luz usados por el objetivo.\nTambién reduce su Evasión."
    ko: "강한 바람으로 상대의 리플렉터나\n빛의장막 등을 제거한다.\n회피율도 떨어뜨린다."
    zh_simp: "用强风吹开对手的\n反射壁或光墙等。\n也会降低对手的闪避率。"
    zh_trad: "用強風吹開對手的\n反射壁或光牆等。\n也會降低對手的閃避率。"
destiny_bond:
  names:
    jp_kana: みちづれ
    jp_kanji: みちづれ
    en: Destiny Bond
    fr: Lien du Destin
    it: Destinobbligato
    de: Abgangsbund
    es: Mismo Destino
    ko: 길동무
    zh_simp: 同命
    zh_trad: 同命
  descriptions:
    jp_kana: "技のあと　相手の　攻撃で　ひんしに\nなると　攻撃　相手も　ひんしにする。\n連続して　出すと　失敗する。"
    jp_kanji: "技のあと　相手の　攻撃で　ひんしに\nなると　攻撃　相手も　ひんしにする。\n連続して　出すと　失敗する。"
    en: "If the user is knocked out after using this move, the\nPokémon that knocked it out will also faint. This move’s\nchance of failing rises if it is used in succession."
    fr: "Si un assaillant porte un coup fatal au lanceur après qu’il\na activé cette capacité, ils sont tous les deux mis K.O.\nLa capacité échoue si elle est immédiatement réutilisée."
    it: "Se il Pokémon va KO a causa di un attacco, chi ha\nsferrato il colpo da KO fa la stessa fine.\nSe usata in successione fallisce."
    de: "Wird der Anwender nach Einsatz dieser Attacke\nkampfunfähig, führt dies auch beim Pokémon, das\nihn besiegt hat, zum K.O. Scheitert bei Wiederholung."
    es: "Si el usuario se debilita por un ataque rival antes de\nusar otro movimiento, el Pokémon rival se debilitará\ntambién. Puede fallar si se usa repetidamente."
    ko: "기술을 쓴 뒤 상대의 공격으로 기절했을 때\n공격 상대도 기절하게 한다.\n연속으로 쓰면 실패한다."
    zh_simp: "使出招式后，当受到对手攻击\n陷入昏厥时，对手也会一同昏厥。\n连续使出则会失败。"
    zh_trad: "使出招式後，當受到對手攻擊，\n陷入瀕死時，對手也會一同陷入瀕死。\n連續使用時會失敗。"
detect:
  names:
    jp_kana: みきり
    jp_kanji: みきり
    en: Detect
    fr: Détection
    it: Individua
    de: Scanner
    es: Detección
    ko: 판별
    zh_simp: 看穿
    zh_trad: 看穿
  descriptions:
    jp_kana: "相手の　攻撃を\nまったく　受けない。\n連続で　だすと　失敗しやすい。"
    jp_kanji: "相手の　攻撃を\nまったく　受けない。\n連続で　だすと　失敗しやすい。"
    en: "This move enables the user to protect itself from\nall attacks. Its chance of failing rises if it is used\nin succession."
    fr: "Le lanceur se protège de toutes les attaques.\nPeut échouer si utilisée plusieurs fois de suite."
    it: "Questa mossa permette di eludere tutti gli attacchi.\nSe usata in successione può fallire."
    de: "Anwender wehrt jede Attacke ab. Scheitert eventuell\nbei Wiederholung."
    es: "Frena todos los ataques, pero puede fallar si se usa\nrepetidamente."
    ko: "상대의 공격을\n전혀 받지 않는다.\n연속으로 쓰면 실패하기 쉽다."
    zh_simp: "完全抵挡\n对手的攻击。\n连续使出则容易失败。"
    zh_trad: "完全防住對手的所有攻擊。\n連續使用時容易失敗。"
devastating_drake:physical:
  names:
    jp_kana: アルティメットドラゴンバーン
    jp_kanji: アルティメットドラゴンバーン
    en: Devastating Drake
    fr: Chaos Draconique
    it: Dragoschianto Finale
    de: Drastisches Drachendröhnen
    es: Dracoaliento Devastador
    ko: 얼티메이트드래곤번
    zh_simp: 究极巨龙震天地
    zh_trad: 究極巨龍震天地
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
devastating_drake:special:
  names:
    jp_kana: アルティメットドラゴンバーン
    jp_kanji: アルティメットドラゴンバーン
    en: Devastating Drake
    fr: Chaos Draconique
    it: Dragoschianto Finale
    de: Drastisches Drachendröhnen
    es: Dracoaliento Devastador
    ko: 얼티메이트드래곤번
    zh_simp: 究极巨龙震天地
    zh_trad: 究極巨龍震天地
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
diamond_storm:
  names:
    jp_kana: ダイヤストーム
    jp_kanji: ダイヤストーム
    en: Diamond Storm
    fr: Orage Adamantin
    it: Diamantempesta
    de: Diamantsturm
    es: Torm. Diamantes
    ko: 다이아스톰
    zh_simp: 钻石风暴
    zh_trad: 鑽石風暴
  descriptions:
    jp_kana: "ダイヤの　嵐を　巻き起こし\nダメージを　与える。　自分の\n防御を　ぐーんと　あげることが　ある。"
    jp_kanji: "ダイヤの　嵐を　巻き起こし\nダメージを　与える。　自分の\n防御を　ぐーんと　あげることが　ある。"
    en: "The user whips up a storm of diamonds to damage\nopposing Pokémon. This may also sharply boost the\nuser’s Defense stat."
    fr: "Provoque une tempête de diamants qui inflige\ndes dégâts. Peut beaucoup augmenter la Défense\ndu lanceur."
    it: "Il Pokémon infligge danni con una tempesta di diamanti.\nPuò anche aumentare di molto la propria Difesa."
    de: "Der Anwender beschwört einen zerstörerischen\nDiamantsturm herauf. Kann die Verteidigung des\nAnwenders stark erhöhen."
    es: "Desata un devastador vendaval de diamantes para\ndañar al objetivo. Puede aumentar mucho la Defensa\ndel usuario."
    ko: "다이아 폭풍을 일으켜\n데미지를 준다. 자신의\n방어를 크게 올릴 때가 있다."
    zh_simp: "掀起钻石风暴给予伤害。\n有时会大幅提高自己的防御。"
    zh_trad: "吹起鑽石風暴給予對手傷害。\n有時會大幅提高自己的防禦。"
dig:
  names:
    jp_kana: あなをほる
    jp_kanji: あなをほる
    en: Dig
    fr: Tunnel
    it: Fossa
    de: Schaufler
    es: Excavar
    ko: 구멍파기
    zh_simp: 挖洞
    zh_trad: 挖洞
  descriptions:
    jp_kana: "１ターン目に　潜り　２ターン目で\n相手を　攻撃する。"
    jp_kanji: "１ターン目に　潜り　２ターン目で\n相手を　攻撃する。"
    en: "The user burrows into the ground on the first turn, then\nattacks on the next turn."
    fr: Le lanceur creuse au premier tour et frappe au second.
    it: Il Pokémon scava al primo turno e attacca al successivo.
    de: "In Runde 1 gräbt sich der Anwender ein und in Runde 2\ngreift er an."
    es: "El usuario cava durante el primer turno y ataca en el\nsegundo."
    ko: "1턴째에 땅속으로 파고들어\n2턴째에 상대를 공격한다."
    zh_simp: "第１回合钻入地底，\n第２回合攻击对手。"
    zh_trad: "使用後的第１回合潛入地底，\n並於第２回合攻擊對手。"
dire_claw:
  names:
    jp_kana: フェイタルクロー
    jp_kanji: フェイタルクロー
    en: Dire Claw
    fr: Griffes Funestes
    it: Artigli Fatali
    de: Unheilsklauen
    es: Garra Nociva
    ko: 페이탈클로
    zh_simp: 克命爪
    zh_trad: 剋命爪
  descriptions:
    jp_kana: "破滅的なツメで　攻撃する。\n相手を　どく　まひ　ねむりの\nいずれかの状態に　することも　ある。"
    jp_kanji: "破滅的なツメで　攻撃する。\n相手を　どく　まひ　ねむりの\nいずれかの状態に　することも　ある。"
    en: "The user lashes out at the target with ruinous claws.\nThis may also leave the target poisoned, paralyzed, or\nasleep."
    fr: "Le lanceur attaque avec des griffes destructrices.\nLa cible peut aussi être empoisonnée, paralysée,\nou endormie."
    it: "Il Pokémon attacca il bersaglio con artigli distruttori.\nPuò anche causargli avvelenamento, paralisi o sonno."
    de: "Der Anwender greift mit zerstörerischen Klauen an.\nDas Ziel wird eventuell vergiftet, paralysiert oder in\nSchlaf versetzt."
    es: "Ataca al objetivo con unas garras letales que pueden\nenvenenarlo, paralizarlo o dormirlo."
    ko: "치명적인 손톱으로 공격한다.\n상대를 독, 마비, 잠듦 중\n하나의 상태로 만들 때가 있다."
    zh_simp: "以破灭之爪进行攻击。\n有时还会让对手陷入中毒、\n麻痹、睡眠之中的一种状态。"
    zh_trad: "以破滅之爪進行攻擊。\n有時還會讓對手陷入中毒、\n麻痺、睡眠之中的一種狀態。"
disable:
  names:
    jp_kana: かなしばり
    jp_kanji: かなしばり
    en: Disable
    fr: Entrave
    it: Inibitore
    de: Aussetzer
    es: Anulación
    ko: 사슬묶기
    zh_simp: 定身法
    zh_trad: 定身法
  descriptions:
    jp_kana: "相手の　動きを　とめて\n直前に　だしていた　技を\n４ターンの　間　使えなくする。"
    jp_kanji: "相手の　動きを　とめて\n直前に　だしていた　技を\n４ターンの　間　使えなくする。"
    en: "For four turns, the target will be unable to use whichever\nmove it last used."
    fr: "Empêche la cible de répéter sa dernière attaque.\nDure quatre tours."
    it: "Per quattro turni, questa mossa impedisce al bersaglio\ndi riutilizzare l’ultima mossa usata."
    de: "Die zuletzt eingesetzte Attacke des Zieles wird für\nvier Runden blockiert."
    es: "Anula el último movimiento usado por el objetivo\ndurante cuatro turnos."
    ko: "상대의 움직임을 막아\n바로 전에 쓴 기술을\n4턴 동안 사용할 수 없게 만든다."
    zh_simp: "阻碍对手行动，\n之前使出的招式\n将在４回合内无法使用。"
    zh_trad: "阻止對手出招，\n最近一次使用的招式\n在４回合內無法使用。"
disarming_voice:
  names:
    jp_kana: チャームボイス
    jp_kanji: チャームボイス
    en: Disarming Voice
    fr: Voix Enjôleuse
    it: Incantavoce
    de: Säuselstimme
    es: Voz Cautivadora
    ko: 차밍보이스
    zh_simp: 魅惑之声
    zh_trad: 魅惑之聲
  descriptions:
    jp_kana: "魅惑の　鳴き声を　だして　相手に\n精神的な　ダメージを　与える。\n攻撃は　必ず　命中　する。"
    jp_kanji: "魅惑の　鳴き声を　だして　相手に\n精神的な　ダメージを　与える。\n攻撃は　必ず　命中　する。"
    en: "Letting out a charming cry, the user does emotional\ndamage to opposing Pokémon. This attack never misses."
    fr: "Le lanceur laisse s’échapper une voix enchanteresse\nqui inflige des dégâts psychiques à la cible.\nN’échoue jamais."
    it: "Il Pokémon infligge un danno spirituale agli avversari con\nuna voce suadente. Questo attacco va sempre a segno."
    de: "Der Anwender stößt einen bezirzenden Ruf aus, mit\ndem er gegnerische Pokémon in seinen Bann schlägt\nund ihnen mentalen Schaden zufügt. Trifft garantiert."
    es: "Obnubila al objetivo con su fascinante voz y le provoca\ndaños emocionales. No falla nunca."
    ko: "매혹적인 울음소리를 내어\n상대에게 정신적 데미지를 준다.\n공격은 반드시 명중한다."
    zh_simp: "发出魅惑的叫声，\n给予对手精神上的伤害。\n攻击必定会命中。"
    zh_trad: "發出迷人的叫聲，\n給予對手精神上的傷害。\n攻擊必定會命中。"
discharge:
  names:
    jp_kana: ほうでん
    jp_kanji: ほうでん
    en: Discharge
    fr: Coup d’Jus
    it: Scarica
    de: Ladungsstoß
    es: Chispazo
    ko: 방전
    zh_simp: 放电
    zh_trad: 放電
  descriptions:
    jp_kana: "まばゆい　電撃で　自分の\n周りに　いるものを　攻撃する。\nまひ状態に　することが　ある。"
    jp_kanji: "まばゆい　電撃で　自分の\n周りに　いるものを　攻撃する。\nまひ状態に　することが　ある。"
    en: "The user strikes everything around it by letting loose\na flare of electricity. This may also leave those hit by the\nattack with paralysis."
    fr: "Un flamboiement d’électricité frappe tous les Pokémon\nautour du lanceur. Peut aussi les paralyser."
    it: "Chi la usa attacca gli altri Pokémon attorno\ncon un bagliore elettrico. Può anche paralizzarli."
    de: "Anwender greift alle Pokémon im Umkreis mit\nElektrizität an. Diese werden eventuell auch paralysiert."
    es: "Una deslumbradora onda eléctrica afecta a los Pokémon\nadyacentes. Puede paralizar."
    ko: "눈부신 전격으로 자신의\n주위에 있는 포켓몬을 공격한다.\n마비 상태로 만들 때가 있다."
    zh_simp: "用耀眼的电击\n攻击自己周围所有的宝可梦。\n有时会陷入麻痹状态。"
    zh_trad: "用耀眼的電流\n攻擊自己周圍所有的寶可夢。\n有時會讓對手陷入麻痺狀態。"
dive:
  names:
    jp_kana: ダイビング
    jp_kanji: ダイビング
    en: Dive
    fr: Plongée
    it: Sub
    de: Taucher
    es: Buceo
    ko: 다이빙
    zh_simp: 潜水
    zh_trad: 潛水
  descriptions:
    jp_kana: "１ターン目で　潜り　２ターン目に\n浮きあがって　攻撃する。"
    jp_kanji: "１ターン目で　潜り　２ターン目に\n浮きあがって　攻撃する。"
    en: "The user dives on the first turn, then floats up and\nattacks on the next turn."
    fr: "Le lanceur plonge sous l’eau au premier tour\net frappe au second."
    it: "Il Pokémon si tuffa in acqua per emergere e attaccare\nal turno successivo."
    de: "Anwender taucht in Runde 1 ab und greift in Runde 2\naus der Tiefe an."
    es: "El usuario se sumerge en el primer turno y ataca en el\nsegundo."
    ko: "1턴째에 잠수했다가\n2턴째에 떠올라 공격한다."
    zh_simp: "第１回合潜入水中，\n第２回合浮上来进行攻击。"
    zh_trad: "使用後的第１回合潛入水中，\n並於第２回合浮上來進行攻擊。"
dizzy_punch:
  names:
    jp_kana: ピヨピヨパンチ
    jp_kanji: ピヨピヨパンチ
    en: Dizzy Punch
    fr: Uppercut
    it: Stordipugno
    de: Irrschlag
    es: Puño Mareo
    ko: 잼잼펀치
    zh_simp: 迷昏拳
    zh_trad: 迷昏拳
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
doodle:
  names:
    jp_kana: うつしえ
    jp_kanji: うつしえ
    en: Doodle
    fr: Décalquage
    it: Ricalco
    de: Abpausen
    es: Decalcomanía
    ko: 베껴그리기
    zh_simp: 描绘
    zh_trad: 描繪
  descriptions:
    jp_kana: "相手の本質を　とらえて　うつしだし\n自分と　味方を　相手と\n同じ　特性に　変化させる。"
    jp_kanji: "相手の本質を　とらえて　うつしだし\n自分と　味方を　相手と\n同じ　特性に　変化させる。"
    en: "The user captures the very essence of the target in a\nsketch. This changes the Abilities of the user and its ally\nPokémon to that of the target."
    fr: "Le lanceur capture l’essence de la cible et la décalque.\nLe talent du lanceur et de ses alliés devient alors\nidentique à celui de la cible."
    it: "Il Pokémon cattura l’essenza del bersaglio con un ricalco,\ncopiandone l’abilità e applicandola a se stesso e ai suoi\nalleati."
    de: "Der Anwender kopiert die wahre Essenz des Zieles.\nDadurch erhalten alle Pokémon auf der Mitstreiterseite\ndie Fähigkeit des Zieles."
    es: "Calca la esencia misma del objetivo para atribuir su\nhabilidad a sí mismo y a sus aliados."
    ko: "상대의 본질을 꿰뚫어 보고 베껴서\n자신과 같은 편을\n상대와 같은 특성으로 바꾼다."
    zh_simp: "把握并映射出对手的本质，\n让自己和同伴宝可梦的特性\n变得和对手相同。"
    zh_trad: "掌握對手的本質，予以描繪，\n使自己和同伴的特性\n變得和對手相同。"
doom_desire:
  names:
    jp_kana: はめつのねがい
    jp_kanji: はめつのねがい
    en: Doom Desire
    fr: Vœu Destructeur
    it: Desiderio Fatale
    de: Kismetwunsch
    es: Deseo Oculto
    ko: 파멸의소원
    zh_simp: 破灭之愿
    zh_trad: 破滅之願
  descriptions:
    jp_kana: "技を　使った　２ターン後に\n無数の　光の　束で\n相手を　攻撃する。"
    jp_kanji: "技を　使った　２ターン後に\n無数の　光の　束で\n相手を　攻撃する。"
    en: "Two turns after this move is used, a concentrated bundle\nof light blasts the target."
    fr: "Le lanceur génère une sphère lumineuse qu’il projette\nsur l’ennemi deux tours plus tard."
    it: "Il Pokémon attacca il bersaglio con un intenso fascio\ndi luce due turni dopo l’uso della mossa."
    de: "Angriff mit gebündeltem Licht erfolgt zwei Runden\nnach Attackeneinsatz."
    es: "Ataca al objetivo con innumerables haces de luz\ndos turnos después de haber usado el movimiento."
    ko: "기술을 사용한 2턴 뒤에\n무수한 빛의 다발이\n상대를 공격한다."
    zh_simp: "使用招式２回合后，\n会用无数道光束攻击对手。"
    zh_trad: "使用招式的２回合後，\n向對手發射無數道光束進行攻擊。"
double_edge:
  names:
    jp_kana: すてみタックル
    jp_kanji: すてみタックル
    en: Double-Edge
    fr: Damoclès
    it: Sdoppiatore
    de: Risikotackle
    es: Doble Filo
    ko: 이판사판태클
    zh_simp: 舍身冲撞
    zh_trad: 捨身衝撞
  descriptions:
    jp_kana: "命を　懸けて\n相手に　突進して　攻撃する。\n自分も　かなり　ダメージを　受ける。"
    jp_kanji: "命を　懸けて\n相手に　突進して　攻撃する。\n自分も　かなり　ダメージを　受ける。"
    en: "A reckless life-risking tackle in which the user rushes\nthe target. This also damages the user quite a lot."
    fr: "Une charge dangereuse et imprudente.\nBlesse aussi gravement le lanceur."
    it: "Il Pokémon attacca il bersaglio lanciandosi in una carica\nspericolata, ma subisce seri danni."
    de: "Lebensgefährlicher Angriff, bei dem sich der Anwender\nselbst verletzt."
    es: "Ataque arriesgado que también hiere seriamente\nal usuario."
    ko: "목숨을 걸고\n상대에게 돌진하여 공격을 한다.\n자신도 상당한 데미지를 입는다."
    zh_simp: "拼命地猛撞向对手进行攻击。\n自己也会受到不小的伤害。"
    zh_trad: "捨身衝撞對手進行攻擊。\n自己也會受到不小的傷害。"
double_hit:
  names:
    jp_kana: ダブルアタック
    jp_kanji: ダブルアタック
    en: Double Hit
    fr: Coup Double
    it: Doppiosmash
    de: Doppelschlag
    es: Doble Golpe
    ko: 더블어택
    zh_simp: 二连击
    zh_trad: 二連擊
  descriptions:
    jp_kana: "しっぽなどを　使い\n相手を　たたいて　攻撃する。\n２回連続で　ダメージを　与える。"
    jp_kanji: "しっぽなどを　使い\n相手を　たたいて　攻撃する。\n２回連続で　ダメージを　与える。"
    en: "The user slams the target with a tail or the like.\nThe target is hit twice in a row."
    fr: "Le lanceur frappe la cible deux fois d’affilée à l’aide\nde sa queue ou d’un autre membre."
    it: "Il Pokémon attacca il bersaglio colpendolo due volte\ndi fila con la coda, una liana o simili."
    de: "Anwender trifft das Ziel mit dem Schweif oder\nÄhnlichem. Ziel wird doppelt getroffen."
    es: "Golpea al objetivo dos veces seguidas con la cola u\notras partes de su cuerpo."
    ko: "꼬리 등을 써서\n상대를 때려 공격한다.\n2회 연속으로 데미지를 준다."
    zh_simp: "使用尾巴等\n拍打对手进行攻击。\n连续２次给予伤害。"
    zh_trad: "用尾巴等\n向對手進行攻擊。\n連續２次給予傷害。"
double_iron_bash:
  names:
    jp_kana: ダブルパンツァー
    jp_kanji: ダブルパンツァー
    en: Double Iron Bash
    fr: Écrous d’Poing
    it: Pugni Corazzati
    de: Panzerfäuste
    es: Ferropuño Doble
    ko: 더블펀처
    zh_simp: 钢拳双击
    zh_trad: 鋼拳雙擊
  descriptions:
    jp_kana: "胸の　ナットを　軸に　回転して\n２回　続けて　うでを　たたきつける。\n相手を　ひるませる　ことが　ある。"
    jp_kanji: "胸の　ナットを　軸に　回転して\n２回　続けて　うでを　たたきつける。\n相手を　ひるませる　ことが　ある。"
    en: "The user uses the hex nut in its chest as an axis to spin,\nstriking the target with its arms twice in a row. This may\nalso make the target flinch."
    fr: "Le lanceur fait pivoter l’écrou de sa poitrine pour\nfrapper la cible avec ses bras deux fois d’affilée,\nce qui peut aussi apeurer celle-ci."
    it: "Il Pokémon colpisce il bersaglio due volte con le braccia\nruotando su se stesso. Può anche farlo tentennare."
    de: "Der Anwender rotiert um die Schraubenmutter in\nseinem Brustkorb und schlägt zweimal hintereinander\nmit den Armen zu. Das Ziel schreckt eventuell zurück."
    es: "Usando la tuerca del pecho como eje, gira sobre sí\nmismo y golpea con los brazos dos veces seguidas.\nPuede amedrentar al objetivo."
    ko: "가슴의 너트를 축으로 회전시켜\n2번 연속 팔로 힘껏 친다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "以胸口的螺帽为中心旋转，\n并连续２次挥动手臂打击对手。\n有时会使对手畏缩。"
    zh_trad: "以胸口的螺帽為軸心旋轉，\n連續２次揮動手臂痛擊對手。\n有時會使對手畏縮。"
double_kick:
  names:
    jp_kana: にどげり
    jp_kanji: にどげり
    en: Double Kick
    fr: Double Pied
    it: Doppiocalcio
    de: Doppelkick
    es: Doble Patada
    ko: 두번차기
    zh_simp: 二连踢
    zh_trad: 二連踢
  descriptions:
    jp_kana: "２本の　足で　相手を　けとばして\n攻撃する。　２回連続で\nダメージを　与える。"
    jp_kanji: "２本の　足で　相手を　けとばして\n攻撃する。　２回連続で\nダメージを　与える。"
    en: "The user attacks by kicking the target twice in a row\nusing two feet."
    fr: "Deux coups de pied qui frappent la cible deux fois\nd’affilée."
    it: "Il Pokémon attacca il bersaglio calciandolo con entrambi\ni piedi, infliggendogli danni due volte di fila."
    de: Der Anwender tritt in einer Runde zweimal schnell zu.
    es: Propina dos patadas seguidas, una con cada pie.
    ko: "2개의 다리로 상대를 걷어차서\n공격한다. 2회 연속으로\n데미지를 준다."
    zh_simp: "用２只脚踢飞对手进行攻击。\n连续２次给予伤害。"
    zh_trad: "用２隻腳踢飛對手進行攻擊。\n連續２次給予傷害。"
double_shock:
  names:
    jp_kana: でんこうそうげき
    jp_kanji: でんこうそうげき
    en: Double Shock
    fr: Double Décharge
    it: Doppiolampo
    de: Zweifachladung
    es: Electropalmas
    ko: 전광쌍격
    zh_simp: 电光双击
    zh_trad: 電光雙擊
  descriptions:
    jp_kana: "全身の　でんきを　すべて\n放って　大ダメージを　与える。\n自分の　でんきタイプが　なくなる。"
    jp_kanji: "全身の　でんきを　すべて\n放って　大ダメージを　与える。\n自分の　でんきタイプが　なくなる。"
    en: "The user discharges all the electricity from its body to\nperform a high-damage attack. After using this move,\nthe user will no longer be Electric type."
    fr: "Le lanceur libère toute l’électricité contenue dans\nson corps pour infliger des dégâts élevés à la cible.\nLe lanceur perd le type Électrik."
    it: "Il Pokémon libera tutta la sua potenza elettrica\nper infliggere gravi danni al bersaglio, ma come\nconseguenza perde il tipo Elettro."
    de: "Der Anwender nutzt die gesamte Elektrizität in seinem\nKörper, um großen Schaden auszuteilen. Die restliche\nKampfdauer gehört er nicht mehr dem Typ Elektro an."
    es: "Libera toda la electricidad de su cuerpo para lanzar\nun ataque devastador. Tras ejecutar el movimiento,\nel usuario deja de ser de tipo Eléctrico."
    ko: "전신의 전기를 모두 방출해서\n큰 데미지를 준다.\n자신의 전기타입이 없어진다."
    zh_simp: "将全身所有的电力放出，\n给予对手大大的伤害。\n自己的电属性将会消失。"
    zh_trad: "施放全身的所有電力\n給予對手巨大的傷害。\n自己的電屬性將會消失。"
double_slap:
  names:
    jp_kana: おうふくビンタ
    jp_kanji: おうふくビンタ
    en: Double Slap
    fr: Torgnoles
    it: Doppiasberla
    de: Duplexhieb
    es: Doble Bofetón
    ko: 연속뺨치기
    zh_simp: 连环巴掌
    zh_trad: 連環巴掌
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
double_team:
  names:
    jp_kana: かげぶんしん
    jp_kanji: かげぶんしん
    en: Double Team
    fr: Reflet
    it: Doppioteam
    de: Doppelteam
    es: Doble Equipo
    ko: 그림자분신
    zh_simp: 影子分身
    zh_trad: 影子分身
  descriptions:
    jp_kana: "素早い　動きで　分身を　つくり\n相手を　まどわせて\n回避率を　あげる。"
    jp_kanji: "素早い　動きで　分身を　つくり\n相手を　まどわせて\n回避率を　あげる。"
    en: "By moving rapidly, the user makes illusory copies of\nitself to boost its evasiveness."
    fr: "Le lanceur se déplace si vite qu’il crée des copies\nillusoires de lui-même, augmentant son Esquive."
    it: "Il Pokémon si muove in fretta e crea copie illusorie\ndi se stesso che aumentano l’elusione."
    de: "Erzeugt durch schnelle Bewegungen Ebenbilder,\num den Ausweichwert zu erhöhen."
    es: "El usuario se mueve a velocidad vertiginosa y crea\ncopias ilusorias de sí mismo, con lo que aumenta su\nEvasión al desconcertar al rival."
    ko: "재빠른 움직임으로 분신을 만들어\n상대에게 혼동을 유발해\n회피율을 올린다."
    zh_simp: "通过快速移动来制造分身，\n扰乱对手，从而提高闪避率。"
    zh_trad: "利用快速移動\n製造出分身擾亂對手，\n提高自己的閃避率。"
draco_meteor:
  names:
    jp_kana: りゅうせいぐん
    jp_kanji: りゅうせいぐん
    en: Draco Meteor
    fr: Draco-Météore
    it: Dragobolide
    de: Draco Meteor
    es: Cometa Draco
    ko: 용성군
    zh_simp: 流星群
    zh_trad: 流星群
  descriptions:
    jp_kana: "天空から　隕石を\n相手に　落とす。使うと　反動で\n自分の　特攻が　がくっと　さがる。"
    jp_kanji: "天空から　隕石を\n相手に　落とす。使うと　反動で\n自分の　特攻が　がくっと　さがる。"
    en: "Comets are summoned down from the sky onto the\ntarget. The recoil from this move harshly lowers the\nuser’s Sp. Atk stat."
    fr: "Le lanceur invoque des comètes.\nLe contrecoup réduit beaucoup son Attaque Spéciale."
    it: "Il Pokémon attacca con meteore che cadono dal cielo,\nma il contraccolpo riduce di molto il suo Attacco\nSpeciale."
    de: "Kometen werden heraufbeschworen. Der Rückstoß\nreduziert den Spezial-Angriff des Anwenders stark."
    es: "Hace que grandes cometas caigan del cielo sobre el\nobjetivo. Reduce mucho el Ataque Especial del usuario."
    ko: "천공에서 운석을 상대에게\n떨어뜨린다. 사용하면 반동으로\n자신의 특수공격이 크게 떨어진다."
    zh_simp: "从天空中向对手落下陨石。\n使用之后因为反作用力，\n自己的特攻会大幅降低。"
    zh_trad: "讓隕石從空中落下以攻擊對手。\n使用後因為反作用力，\n自己的特攻會大幅降低。"
dragon_ascent:
  names:
    jp_kana: ガリョウテンセイ
    jp_kanji: ガリョウテンセイ
    en: Dragon Ascent
    fr: Draco-Ascension
    it: Ascesa del Drago
    de: Zenitstürmer
    es: Ascenso Draco
    ko: 화룡점정
    zh_simp: 画龙点睛
    zh_trad: 畫龍點睛
  descriptions:
    jp_kana: "大空から　急速落下　して\n相手を　攻撃する。\n自分の　防御と　特防が　さがる。"
    jp_kanji: "大空から　急速落下　して\n相手を　攻撃する。\n自分の　防御と　特防が　さがる。"
    en: "The user attacks the target by dropping out of the sky\nat high speed. This also lowers the user’s Defense and\nSp. Def stats."
    fr: "Le Pokémon s’abat à toute vitesse sur la cible\ndepuis les hautes couches de l’atmosphère.\nBaisse la Défense et la Défense Spéciale du lanceur."
    it: "Il Pokémon attacca fiondandosi sul bersaglio dal cielo\nad altissima velocità, ma la sua Difesa e la sua Difesa\nSpeciale diminuiscono."
    de: "Der Anwender greift das Ziel aus atemberaubender\nHöhe im Sturzflug an. Senkt Verteidigung und\nSpezial-Verteidigung des Anwenders."
    es: "El usuario se precipita desde el cielo a una velocidad\nde vértigo para atacar al objetivo, pero reduce su\nDefensa y su Defensa Especial."
    ko: "넓은 하늘에서 급속으로 강하하여\n상대를 공격한다.\n자신의 방어와 특수방어가 떨어진다."
    zh_simp: "从天空中急速下降攻击对手。\n自己的防御和特防会降低。"
    zh_trad: "從天空中急速下降攻擊對手。\n自己的防禦和特防會降低。"
dragon_breath:
  names:
    jp_kana: りゅうのいぶき
    jp_kanji: りゅうのいぶき
    en: Dragon Breath
    fr: Draco-Souffle
    it: Dragospiro
    de: Feuerodem
    es: Dragoaliento
    ko: 용의숨결
    zh_simp: 龙息
    zh_trad: 龍息
  descriptions:
    jp_kana: "ものすごい　息を\n相手に　吹きつけて　攻撃する。\nまひ状態に　することが　ある。"
    jp_kanji: "ものすごい　息を\n相手に　吹きつけて　攻撃する。\nまひ状態に　することが　ある。"
    en: "The user exhales a mighty gust that inflicts damage.\nThis may also leave the target with paralysis."
    fr: "Le lanceur souffle fort sur la cible pour lui infliger\ndes dégâts, ce qui peut aussi la paralyser."
    it: "Il Pokémon attacca investendo il bersaglio con un\nsoffio d’aria potentissimo. Può anche paralizzarlo."
    de: "Fegt das Ziel mit zerstörerisch heißem Atem weg.\nParalysiert das Ziel eventuell."
    es: "Poderosa ráfaga de aliento que golpea al objetivo y\npuede paralizarlo."
    ko: "굉장한 숨결을\n상대에게 내뿜어 공격한다.\n마비 상태로 만들 때가 있다."
    zh_simp: "将强烈的气息\n吹向对手进行攻击。\n有时会让对手陷入麻痹状态。"
    zh_trad: "將強烈的氣息\n吹向對手進行攻擊。\n有時會讓對手陷入麻痺狀態。"
dragon_cheer:
  names:
    jp_kana: ドラゴンエール
    jp_kanji: ドラゴンエール
    en: Dragon Cheer
    fr: Cri Draconique
    it: Grido del Drago
    de: Drachenschrei
    es: Bramido Dragón
    ko: 드래곤옐
    zh_simp: 龙声鼓舞
    zh_trad: 龍聲鼓舞
  descriptions:
    jp_kana: "竜の鼓舞で　士気を　上げて\n味方の技が　急所に　当たりやすくなる。\nドラゴンタイプだと　より　鼓舞される。"
    jp_kanji: "竜の鼓舞で　士気を　上げて\n味方の技が　急所に　当たりやすくなる。\nドラゴンタイプだと　より　鼓舞される。"
    en: "The user raises its allies’ morale with a draconic cry so\nthat their future attacks have a heightened chance of\nlanding critical hits. This rouses Dragon types more."
    fr: "Le lanceur galvanise ses alliés avec un encouragement\ndraconique qui augmente leur taux de critiques.\nL’effet est plus puissant si les alliés ont le type Dragon."
    it: "Il Pokémon incita gli alleati con un inno ai draghi,\naumentando la probabilità che sferrino brutti colpi.\nParticolarmente efficace con alleati di tipo Drago."
    de: "Das anspornende Drachengebrüll hebt die Moral aller\nMitstreiter und erhöht ihre Volltrefferquote. Der Effekt\nist stärker, wenn sie dem Typ Drache angehören."
    es: "Bramido de dragón que sube la moral de los aliados y\naumenta sus probabilidades de asestar un golpe crítico.\nEs especialmente efectivo con aliados de tipo Dragón."
    ko: "용의 북돋움으로 사기를 높여서\n같은 편의 기술이 급소에 맞기 쉬워진다.\n드래곤타입이면 더욱더 사기가 북돋는다."
    zh_simp: "以龙之鼓舞提高士气，\n让我方的招式变得容易击中要害。\n对龙属性的鼓舞效果会更强。"
    zh_trad: "以龍之鼓舞提高士氣。\n我方的招式會變得容易擊中要害。\n對龍屬性的鼓舞效果更強。"
dragon_claw:
  names:
    jp_kana: ドラゴンクロー
    jp_kanji: ドラゴンクロー
    en: Dragon Claw
    fr: Draco-Griffe
    it: Dragartigli
    de: Drachenklaue
    es: Garra Dragón
    ko: 드래곤클로
    zh_simp: 龙爪
    zh_trad: 龍爪
  descriptions:
    jp_kana: "鋭く　とがった　巨大な　ツメで\n相手を　切り裂いて　攻撃する。"
    jp_kanji: "鋭く　とがった　巨大な　ツメで\n相手を　切り裂いて　攻撃する。"
    en: "The user slashes the target with huge, sharp claws to\ninflict damage."
    fr: "Le lanceur lacère la cible de ses grandes griffes\naiguisées."
    it: "Il Pokémon attacca con artigli affilati che graffiano\nil bersaglio con grande forza."
    de: "Der Anwender greift das Ziel mit riesigen, scharfen\nKlauen an."
    es: Araña al objetivo con unas enormes garras afiladas.
    ko: "날카롭고 뾰족하며 거대한 발톱으로\n상대를 베어 갈라서 공격한다."
    zh_simp: "用尖锐的巨爪\n劈开对手进行攻击。"
    zh_trad: "用尖銳的巨爪\n撕裂對手進行攻擊。"
dragon_dance:
  names:
    jp_kana: りゅうのまい
    jp_kanji: りゅうのまい
    en: Dragon Dance
    fr: Danse Draco
    it: Dragodanza
    de: Drachentanz
    es: Danza Dragón
    ko: 용의춤
    zh_simp: 龙之舞
    zh_trad: 龍之舞
  descriptions:
    jp_kana: "神秘的で　力強い　舞を\n激しく　おどる。　自分の\n攻撃と　素早さを　あげる。"
    jp_kanji: "神秘的で　力強い　舞を\n激しく　おどる。　自分の\n攻撃と　素早さを　あげる。"
    en: "The user vigorously performs a mystic, powerful dance\nthat boosts its Attack and Speed stats."
    fr: "Une danse mystique dont le rythme effréné\naugmente l’Attaque et la Vitesse du lanceur."
    it: "Il Pokémon esegue una danza mistica e vigorosa che\naumenta il suo Attacco e la sua Velocità."
    de: "Ein mystischer Tanz, der den Angriffs- und\nInitiative-Wert erhöht."
    es: "Frenética danza mística que aumenta el Ataque y la\nVelocidad."
    ko: "신비롭고 힘센 춤을\n격렬하게 춘다. 자신의\n공격과 스피드를 올린다."
    zh_simp: "激烈地跳起神秘\n且强有力的舞蹈。\n从而提高自己的攻击和速度。"
    zh_trad: "激烈地跳起神秘又強而有力的舞蹈。\n提高自己的攻擊和速度。"
dragon_darts:
  names:
    jp_kana: ドラゴンアロー
    jp_kanji: ドラゴンアロー
    en: Dragon Darts
    fr: Draco-Flèches
    it: Dragofrecce
    de: Drachenpfeile
    es: Dracoflechas
    ko: 드래곤애로
    zh_simp: 龙箭
    zh_trad: 龍箭
  descriptions:
    jp_kana: "ドラメシヤで　２回　攻撃。\n相手が　２匹　いるときは\nそれぞれに　１回ずつ　攻撃する。"
    jp_kanji: "ドラメシヤで　２回　攻撃。\n相手が　２匹　いるときは\nそれぞれに　１回ずつ　攻撃する。"
    en: "The user attacks twice using Dreepy. If there are two\nopposing Pokémon, this move hits each of them once."
    fr: "Le lanceur attaque en propulsant deux Fantyrm.\nS’il y a deux cibles, chacune d’entre elles est frappée\npar un Fantyrm."
    it: "Il Pokémon attacca due volte sparando Dreepy.\nQuando sono presenti due bersagli, vengono attaccati\nentrambi una sola volta."
    de: "Der Anwender greift zweimal mit Grolldra an. Bei zwei\nZielen werden beide jeweils einmal angegriffen."
    es: "El usuario ataca propulsando a ambos Dreepy. En caso\nde haber dos rivales, cada Dreepy golpea a cada uno\npor separado."
    ko: "드라꼰으로 2번 공격한다.\n상대가 2마리일 때는\n각각 1번씩 공격한다."
    zh_simp: "让多龙梅西亚进行２次攻击。\n如果对手有２只宝可梦，\n则对它们各进行１次攻击。"
    zh_trad: "讓多龍梅西亞進行２次攻擊。\n當對手場上有２隻寶可夢時，\n則向牠們各進行１次攻擊。"
dragon_energy:
  names:
    jp_kana: ドラゴンエナジー
    jp_kanji: ドラゴンエナジー
    en: Dragon Energy
    fr: Draco-Énergie
    it: Dragoenergia
    de: Drachenkräfte
    es: Dracoenergía
    ko: 드래곤에너지
    zh_simp: 巨龙威能
    zh_trad: 巨龍威能
  descriptions:
    jp_kana: "生命力を　パワーに　変え　相手を\n攻撃する。　自分の　ＨＰが　少ないほど\n技の　威力は　さがる。"
    jp_kanji: "生命力を　パワーに　変え　相手を\n攻撃する。　自分の　ＨＰが　少ないほど\n技の　威力は　さがる。"
    en: "Converting its life-force into power, the user attacks\nopposing Pokémon. The lower the user’s HP, the lower\nthe move’s power."
    fr: "Le lanceur utilise son énergie vitale pour attaquer\nla cible. Moins il a de PV, moins l’attaque est puissante."
    it: "Il Pokémon attacca il bersaglio convertendo la propria\nforza vitale in energia. Più i suoi PS sono bassi, più la\npotenza della mossa diminuisce."
    de: "Der Anwender wandelt seine Lebenskraft in Energie um\nund greift gegnerische Pokémon an. Je höher seine\nKP sind, desto mehr Schaden wird angerichtet."
    es: "El usuario convierte su fuerza vital en una energía con\nla que ataca al objetivo. Cuantos menos PS tenga el\nusuario, menor será la potencia del movimiento."
    ko: "생명력을 파워로 바꿔서 상대를 공격한다.\n자신의 HP가 적을수록\n기술의 위력이 떨어진다."
    zh_simp: "把生命力转换为力量攻击对手。\n自己的ＨＰ越少，招式的威力越小。"
    zh_trad: "將生命力化為力量攻擊對手。\n自己的ＨＰ越少，招式的威力越小。"
dragon_hammer:
  names:
    jp_kana: ドラゴンハンマー
    jp_kanji: ドラゴンハンマー
    en: Dragon Hammer
    fr: Draco-Marteau
    it: Marteldrago
    de: Drachenhammer
    es: Martillo Dragón
    ko: 드래곤해머
    zh_simp: 龙锤
    zh_trad: 龍錘
  descriptions:
    jp_kana: "体を　ハンマーのように\n使って　相手に　襲いかかり\nダメージを　与える。"
    jp_kanji: "体を　ハンマーのように\n使って　相手に　襲いかかり\nダメージを　与える。"
    en: "The user wields its body like a hammer to attack the\ntarget and inflict damage."
    fr: "Le lanceur utilise son corps comme un véritable\nmarteau pour écraser la cible."
    it: "Il Pokémon infligge danni al bersaglio usando\nil proprio corpo come se fosse un martello."
    de: "Der Anwender nutzt seinen Körper wie einen Hammer\nund stürzt sich auf das Ziel, wodurch dieses Schaden\nerleidet."
    es: "Usa el cuerpo como un martillo para abalanzarse sobre\nsu objetivo y causarle daño."
    ko: "몸을 해머처럼 써서\n상대를 덮쳐\n데미지를 준다."
    zh_simp: "将身体当作锤子，\n向对手发动袭击，\n给予伤害。"
    zh_trad: "像錘子般地使用身體\n向對手發動襲擊，\n給予傷害。"
dragon_pulse:
  names:
    jp_kana: りゅうのはどう
    jp_kanji: りゅうのはどう
    en: Dragon Pulse
    fr: Draco-Choc
    it: Dragopulsar
    de: Drachenpuls
    es: Pulso Dragón
    ko: 용의파동
    zh_simp: 龙之波动
    zh_trad: 龍之波動
  descriptions:
    jp_kana: "大きな　口から　衝撃波を\nまきおこして　相手を　攻撃する。"
    jp_kanji: "大きな　口から　衝撃波を\nまきおこして　相手を　攻撃する。"
    en: "The target is attacked with a shock wave generated by\nthe user’s gaping mouth."
    fr: "Le lanceur ouvre la bouche pour projeter une aura\nqui frappe la cible."
    it: "Il Pokémon attacca il bersaglio generando un’onda\nd’urto dalla bocca."
    de: "Das Ziel wird mit einer Schockwelle angegriffen,\ndie aus dem offenen Maul des Anwenders kommt."
    es: "Abre mucho la boca y libera una onda de choque con\nla que ataca al objetivo."
    ko: "큰 입으로 충격파를\n일으켜서 상대를 공격한다."
    zh_simp: "从大大的口中\n掀起冲击波攻击对手。"
    zh_trad: "從張大的口中\n發射衝擊波攻擊對手。"
dragon_rage:
  names:
    jp_kana: りゅうのいかり
    jp_kanji: りゅうのいかり
    en: Dragon Rage
    fr: Draco-Rage
    it: Ira di Drago
    de: Drachenwut
    es: Furia Dragón
    ko: 용의분노
    zh_simp: 龙之怒
    zh_trad: 龍之怒
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
dragon_rush:
  names:
    jp_kana: ドラゴンダイブ
    jp_kanji: ドラゴンダイブ
    en: Dragon Rush
    fr: Draco-Charge
    it: Dragofuria
    de: Drachenstoß
    es: Carga Dragón
    ko: 드래곤다이브
    zh_simp: 龙之俯冲
    zh_trad: 龍之俯衝
  descriptions:
    jp_kana: "すさまじい　殺気で　威圧しながら\n体当たりする。\n相手を　ひるませることが　ある。"
    jp_kanji: "すさまじい　殺気で　威圧しながら\n体当たりする。\n相手を　ひるませることが　ある。"
    en: "The user tackles the target while exhibiting\noverwhelming menace. This may also make the\ntarget flinch."
    fr: "Le lanceur frappe la cible en prenant un air menaçant,\nce qui peut aussi l’apeurer."
    it: "Il Pokémon colpisce il bersaglio con fare minaccioso.\nPuò anche farlo tentennare."
    de: "Anwender führt einen furchteinflößenden Angriff aus.\nDas Ziel schreckt eventuell zurück."
    es: "Ataca de forma brutal mientras intimida al objetivo.\nPuede amedrentarlo."
    ko: "굉장한 살기로 위압하면서\n몸통박치기한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "释放出骇人的杀气，\n一边威慑一边撞击对手。\n有时会使对手畏缩。"
    zh_trad: "釋放出駭人的殺氣，\n威嚇並撞擊對手。\n有時會使對手畏縮。"
dragon_tail:
  names:
    jp_kana: ドラゴンテール
    jp_kanji: ドラゴンテール
    en: Dragon Tail
    fr: Draco-Queue
    it: Codadrago
    de: Drachenrute
    es: Cola Dragón
    ko: 드래곤테일
    zh_simp: 龙尾
    zh_trad: 龍尾
  descriptions:
    jp_kana: "相手を　はじきとばして\n控えの　ポケモンを　ひきずりだす。\n野生の　場合は　戦闘が　終わる。"
    jp_kanji: "相手を　はじきとばして\n控えの　ポケモンを　ひきずりだす。\n野生の　場合は　戦闘が　終わる。"
    en: "The target is knocked away, and a different Pokémon\nis dragged out. In the wild, this ends a battle against\na single Pokémon."
    fr: "Un coup puissant qui blesse la cible et l’envoie au loin.\nLors d’un combat contre un Pokémon sauvage seul,\nmet fin au combat."
    it: "Il Pokémon fa volar via il bersaglio in modo che\nvenga sostituito. Se il bersaglio è un Pokémon\nselvatico, la lotta finisce."
    de: "Putzt das Ziel vom Feld und wechselt es mit einem\nanderen Pokémon aus. Beendet Kämpfe gegen wilde\nPokémon."
    es: "Ataca al objetivo y lo obliga a cambiarse por otro\nPokémon. Si es uno salvaje, acaba el combate."
    ko: "상대를 튕겨 내서\n교대할 포켓몬을 끌어낸다.\n야생의 경우에는 배틀이 끝난다."
    zh_simp: "弹飞对手，强制拉后备宝可梦上场。\n如果对手为野生宝可梦，\n战斗将直接结束。"
    zh_trad: "彈飛對手，\n強制讓後備寶可夢上場。\n對手為野生寶可夢時，戰鬥將直接結束。"
drain_punch:
  names:
    jp_kana: ドレインパンチ
    jp_kanji: ドレインパンチ
    en: Drain Punch
    fr: Vampi-Poing
    it: Assorbipugno
    de: Ableithieb
    es: Puño Drenaje
    ko: 드레인펀치
    zh_simp: 吸取拳
    zh_trad: 吸取拳
  descriptions:
    jp_kana: "こぶしから　相手の　力を　吸い取る。\n与えた　ダメージの\n半分の　ＨＰを　回復できる。"
    jp_kanji: "こぶしから　相手の　力を　吸い取る。\n与えた　ダメージの\n半分の　ＨＰを　回復できる。"
    en: "The user attacks with an energy-draining punch. The\nuser’s HP is restored by up to half the damage taken\nby the target."
    fr: "Un coup de poing qui draine l’énergie.\nConvertit la moitié des dégâts infligés en PV\npour le lanceur."
    it: "Pugno che assorbe energia. Fa recuperare una\nquantità di PS pari alla metà del danno inflitto."
    de: "Entzieht dem Ziel Energie. Die Hälfte des Schadens\nwird den KP des Anwenders zugerechnet."
    es: "Un golpe que drena energía. El usuario recupera la\nmitad de los PS arrebatados al objetivo."
    ko: "주먹으로 상대의 힘을 흡수한다.\n입힌 데미지의 절반에\n해당하는 HP를 회복할 수 있다."
    zh_simp: "用拳头吸取对手的力量。\n可以回复给予对手\n伤害的一半ＨＰ。"
    zh_trad: "從拳頭吸取對手的力量。\n可以回復給予對手\n傷害的一半ＨＰ。"
draining_kiss:
  names:
    jp_kana: ドレインキッス
    jp_kanji: ドレインキッス
    en: Draining Kiss
    fr: Vampibaiser
    it: Assorbibacio
    de: Diebeskuss
    es: Beso Drenaje
    ko: 드레인키스
    zh_simp: 吸取之吻
    zh_trad: 吸取之吻
  descriptions:
    jp_kana: "キッスによって　相手から　ＨＰを\n吸い取る。　与えた　ダメージの\n半分以上　ＨＰを　回復する。"
    jp_kanji: "キッスによって　相手から　ＨＰを\n吸い取る。　与えた　ダメージの\n半分以上　ＨＰを　回復する。"
    en: "The user steals the target’s HP with a kiss. The user’s HP\nis restored by over half the damage taken by the target."
    fr: "Le lanceur aspire la force vitale de la cible par un baiser\nqui rend au lanceur un nombre de PV supérieur ou égal\nà la moitié des dégâts infligés."
    it: "Il Pokémon assorbe energia dal bersaglio con un bacio,\nrecuperando così PS in quantità pari o superiore alla\nmetà del danno inflitto."
    de: "Der Anwender stiehlt dem Ziel mit einem Kuss KP.\nDie Höhe der Heilung beträgt mehr als die Hälfte des\nbeim Ziel angerichteten Schadens."
    es: "El usuario absorbe energía del objetivo con un beso y\nrestaura sus propios PS en una cantidad igual o superior\na la mitad del daño infligido."
    ko: "키스로 상대의 HP를\n흡수한다. 준 데미지의\n반 이상 HP를 회복한다."
    zh_simp: "用一个吻吸取对手的ＨＰ。\n回复给予对手\n伤害的一半以上的ＨＰ。"
    zh_trad: "親吻對手來吸取對手的ＨＰ。\n可以回復給予對手\n傷害的一半以上的ＨＰ。"
dream_eater:
  names:
    jp_kana: ゆめくい
    jp_kanji: ゆめくい
    en: Dream Eater
    fr: Dévorêve
    it: Mangiasogni
    de: Traumfresser
    es: Comesueños
    ko: 꿈먹기
    zh_simp: 食梦
    zh_trad: 食夢
  descriptions:
    jp_kana: "寝ている　相手の　夢を　食べて\n攻撃する。　ダメージの　半分の\nＨＰを　回復する。"
    jp_kanji: "寝ている　相手の　夢を　食べて\n攻撃する。　ダメージの　半分の\nＨＰを　回復する。"
    en: "The user eats the dreams of a sleeping target.\nThe user’s HP is restored by up to half the damage\ntaken by the target."
    fr: "Le lanceur mange le rêve de la cible endormie\net récupère en PV la moitié des dégâts infligés."
    it: "Attacco che funziona solo su un bersaglio\nche dorme. Chi lo usa riceve metà dei PS\npersi dal Pokémon colpito."
    de: "Frisst die Träume eines schlafenden Zieles. Anwender\nwird um die Hälfte des zugefügten Schadens geheilt."
    es: "Engulle los sueños de un objetivo dormido. El usuario\nrecupera la mitad de los PS del daño que produce."
    ko: "잠자고 있는 상대의 꿈을 먹어\n공격한다. 데미지의 절반을\nHP로 회복한다."
    zh_simp: "吃掉正在睡觉的对手的梦\n进行攻击。回复对手\n所受到伤害的一半ＨＰ。"
    zh_trad: "吃掉熟睡中對手的夢\n進行攻擊。可以回復給予對手\n傷害的一半ＨＰ。"
drill_peck:
  names:
    jp_kana: ドリルくちばし
    jp_kanji: ドリルくちばし
    en: Drill Peck
    fr: Bec Vrille
    it: Perforbecco
    de: Bohrschnabel
    es: Pico Taladro
    ko: 회전부리
    zh_simp: 啄钻
    zh_trad: 啄鑽
  descriptions:
    jp_kana: "回転しながら　とがった　くちばしを\n相手に　突き刺して　攻撃する。"
    jp_kanji: "回転しながら　とがった　くちばしを\n相手に　突き刺して　攻撃する。"
    en: "A corkscrewing attack that strikes the target with a sharp\nbeak acting as a drill."
    fr: Une attaque utilisant le bec comme une perceuse.
    it: "Il Pokémon attacca il bersaglio infilzandolo con l’aguzzo\nbecco rotante."
    de: "Korkenzieherangriff, bei dem der Schnabel als\nBohrer dient."
    es: Picotazo giratorio y perforador muy potente.
    ko: "회전하면서 뾰족한 부리를\n상대에게 꿰찔러 공격한다."
    zh_simp: "一边旋转，一边将尖喙\n刺入对手进行攻击。"
    zh_trad: "一邊旋轉，一邊將尖喙\n刺進對手進行攻擊。"
drill_run:
  names:
    jp_kana: ドリルライナー
    jp_kanji: ドリルライナー
    en: Drill Run
    fr: Tunnelier
    it: Giravvita
    de: Schlagbohrer
    es: Taladradora
    ko: 드릴라이너
    zh_simp: 直冲钻
    zh_trad: 直衝鑽
  descriptions:
    jp_kana: "ドリルのように　体を　回転しながら\n相手に　体当たりする。\n急所に　当たりやすい。"
    jp_kanji: "ドリルのように　体を　回転しながら\n相手に　体当たりする。\n急所に　当たりやすい。"
    en: "The user crashes into the target while rotating its body\nlike a drill. This move has a heightened chance of landing\na critical hit."
    fr: "Le lanceur tourne sur lui-même comme une perceuse\net se jette sur la cible. Taux de critiques élevé."
    it: "Il Pokémon si scaglia sul bersaglio ruotando su se stesso\ncome un trapano perforante. Probabile brutto colpo."
    de: "Anwender rammt das Ziel, während er seinen Körper\nwie einen Bohrer dreht. Hohe Volltrefferquote."
    es: "El usuario golpea usando su cuerpo como un taladro.\nSuele asestar un golpe crítico."
    ko: "드릴처럼 몸을 회전시켜서\n상대에게 몸통박치기한다.\n급소에 맞기 쉽다."
    zh_simp: "像钢钻一样，一边旋转身体\n一边撞击对手。\n容易击中要害。"
    zh_trad: "像鑽頭一樣旋轉身體，\n猛烈地撞擊對手。\n容易擊中要害。"
drum_beating:
  names:
    jp_kana: ドラムアタック
    jp_kanji: ドラムアタック
    en: Drum Beating
    fr: Tambour Battant
    it: Tamburattacco
    de: Trommelschläge
    es: Batería Asalto
    ko: 드럼어택
    zh_simp: 鼓击
    zh_trad: 鼓擊
  descriptions:
    jp_kana: "ドラムの　根っこを　ドラミングで\nコントロールして　こうげき　することで\n相手の　素早さを　下げる。"
    jp_kanji: "ドラムの　根っこを　ドラミングで\nコントロールして　こうげき　することで\n相手の　素早さを　下げる。"
    en: "The user plays its drum, controlling the drum’s roots\nto attack the target. This also lowers the target’s\nSpeed stat."
    fr: "Le lanceur bat son tambour pour en diriger les racines\nsur la cible, l’attaquer, et baisser sa Vitesse."
    it: "Il Pokémon percuote il proprio tamburo per\ncontrollarne le radici e attaccare il bersaglio,\nriducendone la Velocità."
    de: "Der Anwender kontrolliert durch Trommeln Wurzeln,\ndie das Ziel angreifen und dessen Initiative senken."
    es: "El usuario controla un tocón mediante la percusión y al\natacar reduce la Velocidad del objetivo."
    ko: "드럼 연주로 뿌리를\n조종해서 공격한다.\n상대의 스피드를 떨어뜨린다."
    zh_simp: "用鼓点来控制\n鼓的根部进行攻击，\n从而降低对手的速度。"
    zh_trad: "用打鼓來控制\n鼓的根部進行攻擊，\n進而降低對手的速度。"
dual_chop:
  names:
    jp_kana: ダブルチョップ
    jp_kanji: ダブルチョップ
    en: Dual Chop
    fr: Double Baffe
    it: Doppiocolpo
    de: Doppelhieb
    es: Golpe Bis
    ko: 더블촙
    zh_simp: 二连劈
    zh_trad: 二連劈
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
dual_wingbeat:
  names:
    jp_kana: ダブルウイング
    jp_kanji: ダブルウイング
    en: Dual Wingbeat
    fr: Double Volée
    it: Doppia Ala
    de: Doppelflügel
    es: Ala Bis
    ko: 더블윙
    zh_simp: 双翼
    zh_trad: 雙翼
  descriptions:
    jp_kana: "翼を　相手に　ぶつけて\n攻撃する。　２回連続で\nダメージを　与える。"
    jp_kanji: "翼を　相手に　ぶつけて\n攻撃する。　２回連続で\nダメージを　与える。"
    en: "The user slams the target with its wings to inflict damage.\nThe target is hit twice in a row."
    fr: "Le lanceur frappe la cible avec ses ailes deux fois\nd’affilée."
    it: "Il Pokémon attacca il bersaglio urtandolo con le ali\ne infliggendogli danni due volte di fila."
    de: "Der Anwender trifft das Ziel zweimal hintereinander mit\nseinen Flügeln und fügt ihm so Schaden zu."
    es: "Ataca al objetivo golpeándolo dos veces seguidas con\nlas alas."
    ko: "날개를 상대에게 부딪쳐서\n공격한다. 2회 연속으로\n데미지를 준다."
    zh_simp: "将翅膀撞向对手进行攻击。\n连续２次给予伤害。"
    zh_trad: "用翅膀撞向對手進行攻擊。\n連續２次給予傷害。"
dynamax_cannon:
  names:
    jp_kana: ダイマックスほう
    jp_kanji: ダイマックスほう
    en: Dynamax Cannon
    fr: Canon Dynamax
    it: Cannone Dynamax
    de: Dynamax-Kanone
    es: Cañón Dinamax
    ko: 다이맥스포
    zh_simp: 极巨炮
    zh_trad: 極巨炮
  descriptions:
    jp_kana: "体内で　凝縮した　エネルギーを\nコアから　放って　攻撃する。"
    jp_kanji: "体内で　凝縮した　エネルギーを\nコアから　放って　攻撃する。"
    en: "The user condenses energy within its body and unleashes\nthat energy from its core to inflict damage."
    fr: "Le lanceur attaque en libérant l’énergie concentrée\ndans son noyau."
    it: "Il Pokémon attacca emettendo dal suo nucleo l’energia\nconcentrata nel corpo."
    de: "Der Anwender greift an, indem er die in seinem Körper\nangesammelte Energie bündelt und aus seinem Kern\nabschießt."
    es: "Ataca liberando desde su núcleo la energía concentrada\nen el interior del cuerpo."
    ko: "체내에서 응축한 에너지를\n코어를 통해 발사해서 공격한다."
    zh_simp: "将凝缩在体内的能量\n从核心放出进行攻击。"
    zh_trad: "從核心發射凝聚在體內的\n能量進行攻擊。"
dynamic_punch:
  names:
    jp_kana: ばくれつパンチ
    jp_kanji: ばくれつパンチ
    en: Dynamic Punch
    fr: Dynamo-Poing
    it: Dinamipugno
    de: Wuchtschlag
    es: Puño Dinámico
    ko: 폭발펀치
    zh_simp: 爆裂拳
    zh_trad: 爆裂拳
  descriptions:
    jp_kana: "こん身の　力で\nパンチを　くりだして　攻撃する。\n相手を　必ず　混乱させる。"
    jp_kanji: "こん身の　力で\nパンチを　くりだして　攻撃する。\n相手を　必ず　混乱させる。"
    en: "The user attacks by punching the target with full\nconcentrated power. This also confuses the target."
    fr: "Le lanceur rassemble ses forces et envoie un coup\nde poing à la cible, ce qui la rend confuse à coup sûr."
    it: "Il Pokémon attacca con un pugno davvero forte.\nIl bersaglio viene sicuramente confuso."
    de: Kräftiger Schlag, der das Ziel bei Erfolg verwirrt.
    es: "Puñetazo con toda la fuerza concentrada que causa\nconfusión."
    ko: "혼신의 힘으로\n펀치를 날려서 공격한다.\n상대를 반드시 혼란시킨다."
    zh_simp: "使出浑身力气出拳进行攻击。\n必定会使对手混乱。"
    zh_trad: "使出渾身力量出拳進行攻擊。\n必定會使對手混亂。"
earth_power:
  names:
    jp_kana: だいちのちから
    jp_kanji: だいちのちから
    en: Earth Power
    fr: Telluriforce
    it: Geoforza
    de: Erdkräfte
    es: Tierra Viva
    ko: 대지의힘
    zh_simp: 大地之力
    zh_trad: 大地之力
  descriptions:
    jp_kana: "相手の　足下へ　大地の力を\n放出する。相手の　特防を\nさげることが　ある。"
    jp_kanji: "相手の　足下へ　大地の力を\n放出する。相手の　特防を\nさげることが　ある。"
    en: "The user makes the ground under the target erupt with\npower. This may also lower the target’s Sp. Def stat."
    fr: "De terribles séismes secouent la cible et peuvent aussi\nbaisser sa Défense Spéciale."
    it: "Una forza devastante si sprigiona dal terreno sotto\nil bersaglio. Può anche ridurne la Difesa Speciale."
    de: "Der Boden unter dem Ziel erzittert durch die Kraft\nder Erde. Senkt eventuell Spezial-Verteidigung."
    es: "La tierra a los pies del objetivo erupciona\nviolentamente. Puede reducir la Defensa Especial\ndel objetivo."
    ko: "상대의 발밑에 대지의 힘을\n방출한다. 상대의 특수방어를\n떨어뜨릴 때가 있다."
    zh_simp: "向对手脚下\n释放出大地之力。\n有时会降低对手的特防。"
    zh_trad: "向對手腳下\n釋放出大地之力。\n有時會降低對手的特防。"
earthquake:
  names:
    jp_kana: じしん
    jp_kanji: じしん
    en: Earthquake
    fr: Séisme
    it: Terremoto
    de: Erdbeben
    es: Terremoto
    ko: 지진
    zh_simp: 地震
    zh_trad: 地震
  descriptions:
    jp_kana: "地震の　衝撃で　自分の\n周りに　いるものを　攻撃する。"
    jp_kanji: "地震の　衝撃で　自分の\n周りに　いるものを　攻撃する。"
    en: "The user sets off an earthquake that strikes every\nPokémon around it."
    fr: "Le lanceur provoque un tremblement de terre\ntouchant tous les Pokémon autour de lui."
    it: "Chi la usa attacca gli altri Pokémon attorno provocando\nun potente sisma."
    de: "Ein mächtiges Beben, das alle Pokémon im Umkreis\ntrifft."
    es: Un terremoto que afecta a los Pokémon adyacentes.
    ko: "지진의 충격으로 자신의\n주위에 있는 포켓몬을 공격한다."
    zh_simp: "利用地震的冲击，\n攻击自己周围所有的宝可梦。"
    zh_trad: "用地震的衝擊，\n攻擊自己周圍所有的寶可夢。"
echoed_voice:
  names:
    jp_kana: エコーボイス
    jp_kanji: エコーボイス
    en: Echoed Voice
    fr: Écho
    it: Echeggiavoce
    de: Widerhall
    es: Eco Voz
    ko: 에코보이스
    zh_simp: 回声
    zh_trad: 回聲
  descriptions:
    jp_kana: "響く　声で　相手を　攻撃する。\n毎ターン　だれかが　技を\n使い続けると　威力が　あがる。"
    jp_kanji: "響く　声で　相手を　攻撃する。\n毎ターン　だれかが　技を\n使い続けると　威力が　あがる。"
    en: "The user attacks the target with an echoing voice.\nIf this move is used consecutively by any Pokémon,\nits power is boosted."
    fr: "Un cri retentissant blesse la cible. Si le lanceur\nou d’autres Pokémon utilisent cette capacité à\nchaque tour, la puissance augmente."
    it: "Chi la usa attacca il bersaglio con la propria voce\necheggiante. Se usata a ripetizione da uno o più\nPokémon, la potenza della mossa aumenta."
    de: "Angriff mit widerhallender Stimme. Wenn in jeder\nRunde ein Teilnehmer wiederholt die Attacke einsetzt,\nsteigt die Stärke."
    es: "Un susurro que aumenta de potencia conforme el\nusuario y otros Pokémon lo van utilizando."
    ko: "울리는 목소리로 상대를 공격한다.\n매 턴 누군가 이 기술을\n계속해서 쓰면 위력이 올라간다."
    zh_simp: "用回声攻击对手。\n如果每回合都有宝可梦接着\n使用该招式，威力就会提高。"
    zh_trad: "用回聲攻擊對手。\n每回合有寶可夢持續使用回聲時，\n招式的威力會提高。"
eerie_impulse:
  names:
    jp_kana: かいでんぱ
    jp_kanji: かいでんぱ
    en: Eerie Impulse
    fr: Ondes Étranges
    it: Elettromistero
    de: Mystowellen
    es: Onda Anómala
    ko: 괴전파
    zh_simp: 怪异电波
    zh_trad: 怪異電波
  descriptions:
    jp_kana: "体から　かいでんぱを　放ち\n相手に　浴びせる　ことによって\n特攻を　がくっと　さげる。"
    jp_kanji: "体から　かいでんぱを　放ち\n相手に　浴びせる　ことによって\n特攻を　がくっと　さげる。"
    en: "The user’s body generates an eerie impulse. Exposing\nthe target to it harshly lowers the target’s Sp. Atk stat."
    fr: "Le corps du lanceur produit des ondes anormales\nqui enveloppent la cible et diminuent beaucoup\nson Attaque Spéciale."
    it: "Il Pokémon emette dal corpo onde anomale\nche investono il bersaglio, riducendone di molto\nl’Attacco Speciale."
    de: "Der Körper des Anwenders erzeugt mysteriöse Wellen\nund senkt den Spezial-Angriff des Zieles dadurch stark."
    es: "El usuario irradia unas raras ondas que, al alcanzar al\nobjetivo, reducen mucho su Ataque Especial."
    ko: "몸에서 발생시킨 괴전파를\n상대에게 쏘아\n특수공격을 크게 떨어뜨린다."
    zh_simp: "从身体放射出怪异电波，\n让对手沐浴其中，\n从而大幅降低其特攻。"
    zh_trad: "從身體發出怪異電波\n影響對手，\n大幅降低對手的特攻。"
eerie_spell:
  names:
    jp_kana: ぶきみなじゅもん
    jp_kanji: ぶきみなじゅもん
    en: Eerie Spell
    fr: Sort Sinistre
    it: Inquietantesimo
    de: Schauderspruch
    es: Conjuro Funesto
    ko: 섬뜩한주문
    zh_simp: 诡异咒语
    zh_trad: 詭異咒語
  descriptions:
    jp_kana: "強力な　サイコパワーで　攻撃。\n相手が　最後に　使った技の\nＰＰを　３だけ　減らす。"
    jp_kanji: "強力な　サイコパワーで　攻撃。\n相手が　最後に　使った技の\nＰＰを　３だけ　減らす。"
    en: "The user attacks with its tremendous psychic power.\nThis also drains 3 PP from the move last used by the\ntarget."
    fr: "Le lanceur attaque avec de puissants pouvoirs\npsychiques et retire 3 PP de la dernière capacité\nutilisée par la cible."
    it: "Il Pokémon attacca con i suoi potenti poteri psichici.\nSottrae 3 PP all’ultima mossa usata dall’avversario."
    de: "Der Anwender greift mit gewaltigen Psycho-Kräften an.\nDie AP der letzten Attacke des Zieles werden um\n3 Punkte gesenkt."
    es: "El usuario ataca con un poder psíquico de inmensa\npotencia y elimina 3 PP del último movimiento que\nhaya usado el objetivo."
    ko: "강력한 사이코 파워로 공격한다.\n상대가 마지막으로 사용한 기술의\nPP를 3만큼 줄인다."
    zh_simp: "用强大的精神力量攻击。\n让对手最后使用的招式\n减少３ＰＰ。"
    zh_trad: "用強大的精神力量攻擊。\n讓對手最近一次使用的招式\n減少３ＰＰ。"
egg_bomb:
  names:
    jp_kana: タマゴばくだん
    jp_kanji: タマゴばくだん
    en: Egg Bomb
    fr: Bombe Œuf
    it: Uovobomba
    de: Eierbombe
    es: Bomba Huevo
    ko: 알폭탄
    zh_simp: 炸蛋
    zh_trad: 炸蛋
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
electric_terrain:
  names:
    jp_kana: エレキフィールド
    jp_kanji: エレキフィールド
    en: Electric Terrain
    fr: Champ Électrifié
    it: Campo Elettrico
    de: Elektrofeld
    es: Campo Eléctrico
    ko: 일렉트릭필드
    zh_simp: 电气场地
    zh_trad: 電氣場地
  descriptions:
    jp_kana: "５ターンの　間　エレキフィールドにする。\n地面にいる　ポケモンは　眠らない。\nでんきタイプの　威力が　あがる。"
    jp_kanji: "５ターンの　間　エレキフィールドにする。\n地面にいる　ポケモンは　眠らない。\nでんきタイプの　威力が　あがる。"
    en: "The user turns the ground into Electric Terrain for five\nturns, powering up Electric-type moves. Pokémon on\nthe ground can no longer fall asleep."
    fr: "Pendant cinq tours, le terrain se charge d’électricité.\nLes Pokémon au sol ne peuvent pas s’endormir\net la puissance des capacités de type Électrik augmente."
    it: "Per cinque turni il terreno entra nello stato di Campo\nElettrico: i Pokémon a terra non si addormentano e la\npotenza delle mosse di tipo Elettro aumenta."
    de: "Hindert fünf Runden lang alle Pokémon, die den Boden\nberühren, am Einschlafen. Erhöht die Stärke von\nElektro-Attacken."
    es: "Durante cinco turnos, se potencian los movimientos de\ntipo Eléctrico y los Pokémon que están en contacto con\nel suelo no pueden quedarse dormidos."
    ko: "5턴 동안 일렉트릭필드로 만든다.\n땅에 있는 포켓몬은 잠들지 않는다.\n전기타입의 위력이 올라간다."
    zh_simp: "在５回合内变成电气场地。\n地面上的宝可梦将无法入眠。\n电属性的招式威力还会提高。"
    zh_trad: "在５回合內將腳下變成電氣場地。\n地面上的寶可夢將不會陷入睡眠狀態。\n電屬性招式的威力會提高。"
electrify:
  names:
    jp_kana: そうでん
    jp_kanji: そうでん
    en: Electrify
    fr: Électrisation
    it: Elettrocontagio
    de: Elektrifizierung
    es: Electrificación
    ko: 송전
    zh_simp: 输电
    zh_trad: 輸電
  descriptions:
    jp_kana: "相手が　技を　だす前に\nそうでん　すると　そのターン\n相手の　技は　でんきタイプになる。"
    jp_kanji: "相手が　技を　だす前に\nそうでん　すると　そのターン\n相手の　技は　でんきタイプになる。"
    en: "If the target is electrified before it uses a move, the\ntarget’s move becomes Electric type for that turn."
    fr: "Si le lanceur attaque avant la cible, les capacités\nde celle-ci seront de type Électrik jusqu’à la fin du tour."
    it: "Se il bersaglio viene contagiato prima che usi la sua\nmossa, per quel turno questa sarà di tipo Elettro."
    de: "Kommt die Attacke zum Einsatz, bevor das Ziel seine\nAttacke ausführt, nimmt diese für die Dauer dieser\nRunde den Typ Elektro an."
    es: "Si el objetivo queda electrificado antes de usar un\nmovimiento, este será de tipo Eléctrico."
    ko: "상대가 기술을 쓰기 전에\n송전하면 그 턴에 상대가\n사용하는 기술은 전기타입이 된다."
    zh_simp: "对手使出招式前，\n如果输电，则该回合\n对手的招式变成电属性。"
    zh_trad: "如果在對手使用招式前輸電，\n該回合對手的招式會變成電屬性。"
electro_ball:
  names:
    jp_kana: エレキボール
    jp_kanji: エレキボール
    en: Electro Ball
    fr: Boule Élek
    it: Energisfera
    de: Elektroball
    es: Bola Voltio
    ko: 일렉트릭볼
    zh_simp: 电球
    zh_trad: 電球
  descriptions:
    jp_kana: "電気の　塊を　相手に\nぶつける。相手より　素早さが\n速いほど　威力が　あがる。"
    jp_kanji: "電気の　塊を　相手に\nぶつける。相手より　素早さが\n速いほど　威力が　あがる。"
    en: "The user hurls an electric orb at the target. The faster the\nuser is than the target, the greater the move’s power."
    fr: "Le lanceur envoie une boule d’électricité. Plus la Vitesse\ndu lanceur est élevée par rapport à celle de la cible,\nplus la puissance de la capacité augmente."
    it: "Il Pokémon colpisce il bersaglio con una sfera d’energia\nelettrica. Più è rapido rispetto al bersaglio, maggiore è\nla potenza della mossa."
    de: "Je höher die Initiative des Anwenders im Vergleich\nzum Ziel ist, desto stärker trifft dieses eine geballte\nLadung Strom."
    es: "Lanza una bola eléctrica. Cuanto mayor sea la\nVelocidad del usuario en comparación con la del\nobjetivo, mayor será la potencia del movimiento."
    ko: "전기 덩어리를 상대에게 부딪쳐서\n공격한다. 상대보다 스피드가\n빠를수록 위력이 올라간다."
    zh_simp: "用电气团撞向对手。\n自己比对手速度越快，\n威力越大。"
    zh_trad: "用電球攻擊對手。\n速度比對手快越多，\n威力越大。"
electro_drift:
  names:
    jp_kana: イナズマドライブ
    jp_kanji: イナズマドライブ
    en: Electro Drift
    fr: Turbo Volt
    it: Fulmiscatto
    de: Blitztour
    es: Electroderrape
    ko: 라이트닝드라이브
    zh_simp: 闪电猛冲
    zh_trad: 閃電猛衝
  descriptions:
    jp_kana: "変形しながら　超高速で　走行し\n未知なる　電撃が　相手を　つらぬく。\n弱点をつくと　さらに　威力が　増す。"
    jp_kanji: "変形しながら　超高速で　走行し\n未知なる　電撃が　相手を　つらぬく。\n弱点をつくと　さらに　威力が　増す。"
    en: "The user races forward at ultrafast speeds, piercing its\ntarget with futuristic electricity. This move’s power is\nboosted more than usual if it’s a supereffective hit."
    fr: "Le lanceur change de forme et fonce sur la cible en la\nperforant d’électricité futuriste. Si la capacité est super\nefficace, sa puissance augmente encore plus que d’habitude."
    it: "Il Pokémon saetta mentre si trasforma, trafiggendo\nil bersaglio con una scossa futuristica. La potenza della\nmossa aumenta se questa è superefficace sul bersaglio."
    de: "Der Anwender wechselt bei rasantem Tempo seine Form\nund trifft das Ziel mit einem futuristischen Elektroschlag.\nIst die Attacke sehr effektiv, steigt ihre Stärke noch mehr."
    es: "Se abalanza sobre el objetivo mientras se transforma y\nlo atraviesa con electricidad futurista. La potencia del\nmovimiento aumenta si el ataque es supereficaz."
    ko: "변형하며 초고속으로 달려서\n미지의 전격으로 상대를 관통한다.\n약점인 상대에게는 위력이 더욱 올라간다."
    zh_simp: "边变形边高速奔走，\n并以未知的电击贯穿对手。\n若针对到弱点，威力会进一步。"
    zh_trad: "一邊變形，一邊以超高速度奔馳，\n未知的電流將貫穿對手。\n打到弱點時威力會更為增加。"
electro_shot:
  names:
    jp_kana: エレクトロビーム
    jp_kanji: エレクトロビーム
    en: Electro Shot
    fr: Fulgurayon
    it: Elettroraggio
    de: Stromstrahl
    es: Electrorrayo
    ko: 일렉트로빔
    zh_simp: 电光束
    zh_trad: 電光束
  descriptions:
    jp_kana: "１ターン目に　電気を　集めて　特攻が　あがり\n２ターン目に　高圧の　電気を　発射する。\n天気が　雨のときは　すぐに　発射できる。"
    jp_kanji: "１ターン目に　電気を　集めて　特攻が　あがり\n２ターン目に　高圧の　電気を　発射する。\n天気が　雨のときは　すぐに　発射できる。"
    en: "The user gathers electricity on the first turn, boosting its\nSp. Atk stat, then fires a high-voltage shot on the next\nturn. The shot will be fired immediately in rain."
    fr: "Le lanceur absorbe de l’électricité au premier tour, ce qui\naugmente son Attaque Spéciale, et envoie une puissante\ndécharge au second. S’il pleut, il l’envoie au premier tour."
    it: "Il Pokémon accumula elettricità e aumenta l’Attacco\nSpeciale al primo turno, per poi rilasciare una potente\nscarica al turno successivo o, se piove, immediatamente."
    de: "Sammelt in Runde 1 Elektrizität, um den Spezial-Angriff\nzu erhöhen, und greift dann in Runde 2 mit Starkstrom\nan. Bei Regen erfolgt der Angriff sofort in Runde 1."
    es: "Acumula electricidad y aumenta su Ataque Especial en el\nprimer turno y dispara una descarga de alto voltaje en el\nsegundo. Si llueve, puede atacar en el primer turno."
    ko: "1턴째에 전기를 모아서 특수공격을 올리고\n2턴째에 고압의 전기를 발사한다.\n비가 오는 날씨일 때는 바로 발사할 수 있다."
    zh_simp: "第１回合收集电力提高特攻，\n第２回合将高压的电力发射出去。\n下雨天气时能立刻发射。"
    zh_trad: "使用後的第１回合會收集電力來提高特攻，\n並於第２回合發射出高壓電。\n天氣為下雨時可立即發射。"
electroweb:
  names:
    jp_kana: エレキネット
    jp_kanji: エレキネット
    en: Electroweb
    fr: Toile Élek
    it: Elettrotela
    de: Elektronetz
    es: Electrotela
    ko: 일렉트릭네트
    zh_simp: 电网
    zh_trad: 電網
  descriptions:
    jp_kana: "電気の　ネットで\n相手を　捕まえて　攻撃する。\n相手の　素早さを　さげる。"
    jp_kanji: "電気の　ネットで\n相手を　捕まえて　攻撃する。\n相手の　素早さを　さげる。"
    en: "The user captures opposing Pokémon in an electric net\nto inflict damage. This also lowers their Speed stats."
    fr: "Le lanceur attaque la cible en l’attrapant dans un filet\nélectrique. Baisse aussi la Vitesse de la cible."
    it: "Il Pokémon attacca il bersaglio catturandolo con\nuna ragnatela elettrica e riducendone la Velocità."
    de: "Fängt gegnerische Pokémon mit einem elektrischen\nNetz und senkt deren Initiative."
    es: "Atrapa y ataca al objetivo con una telaraña eléctrica.\nTambién reduce su Velocidad."
    ko: "전기 네트로\n상대를 붙잡아서 공격한다.\n상대의 스피드를 떨어뜨린다."
    zh_simp: "用电网捉住对手进行攻击。\n会降低对手的速度。"
    zh_trad: "用電網捉住對手進行攻擊。\n可降低對手的速度。"
embargo:
  names:
    jp_kana: さしおさえ
    jp_kanji: さしおさえ
    en: Embargo
    fr: Embargo
    it: Divieto
    de: Itemsperre
    es: Embargo
    ko: 금제
    zh_simp: 查封
    zh_trad: 查封
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
ember:
  names:
    jp_kana: ひのこ
    jp_kanji: ひのこ
    en: Ember
    fr: Flammèche
    it: Braciere
    de: Glut
    es: Ascuas
    ko: 불꽃세례
    zh_simp: 火花
    zh_trad: 火花
  descriptions:
    jp_kana: "小さな　炎を\n相手に　発射して　攻撃する。\nやけど状態に　することが　ある。"
    jp_kanji: "小さな　炎を\n相手に　発射して　攻撃する。\nやけど状態に　することが　ある。"
    en: "The target is attacked with small flames. This may also\nleave the target with a burn."
    fr: "La cible est attaquée par une faible flamme qui peut\naussi la brûler."
    it: "Il Pokémon attacca il bersaglio lanciando fiammelle\nche possono anche scottarlo."
    de: "Schwache Feuer-Attacke, durch die das Ziel eventuell\nVerbrennungen erleidet."
    es: "Ataca con llamas pequeñas que pueden causar\nquemaduras."
    ko: "작은 불꽃을\n상대에게 발사하여 공격한다.\n화상 상태로 만들 때가 있다."
    zh_simp: "向对手发射\n小型火焰进行攻击。\n有时会让对手陷入灼伤状态。"
    zh_trad: "向對手發射\n小火焰進行攻擊。\n有時會讓對手陷入灼傷狀態。"
encore:
  names:
    jp_kana: アンコール
    jp_kanji: アンコール
    en: Encore
    fr: Encore
    it: Ripeti
    de: Zugabe
    es: Otra Vez
    ko: 앙코르
    zh_simp: 再来一次
    zh_trad: 再來一次
  descriptions:
    jp_kana: "相手に　アンコールした　技を\n３回　続けて　出させる。"
    jp_kanji: "相手に　アンコールした　技を\n３回　続けて　出させる。"
    en: "The user compels the target to keep using the move it\nencored for three turns."
    fr: "Le lanceur oblige la cible à répéter la dernière capacité\nutilisée durant trois tours."
    it: "Il Pokémon obbliga il bersaglio a ripetere per tre turni\nl’ultima mossa eseguita."
    de: Das Ziel wiederholt die letzte Attacke drei Runden lang.
    es: "El objetivo repite su último movimiento durante tres\nturnos."
    ko: "상대에게 앙코르를 외쳐서\n기술을 3번 연속으로 쓰게 한다."
    zh_simp: "让对手接受再来一次，\n连续３次使出最后使用的招式。"
    zh_trad: "要求對手再來一次，\n讓對手連續３次\n使出最近一次使用的招式。"
endeavor:
  names:
    jp_kana: がむしゃら
    jp_kanji: がむしゃら
    en: Endeavor
    fr: Effort
    it: Rimonta
    de: Notsituation
    es: Esfuerzo
    ko: 죽기살기
    zh_simp: 蛮干
    zh_trad: 蠻幹
  descriptions:
    jp_kana: "相手の　ＨＰが　自分の　ＨＰと\n同じくらいに　なるように\nダメージを　与える。"
    jp_kanji: "相手の　ＨＰが　自分の　ＨＰと\n同じくらいに　なるように\nダメージを　与える。"
    en: "The user inflicts damage by cutting down the target’s HP\nto roughly equal the user’s HP."
    fr: "Une attaque qui réduit les PV de la cible au niveau\ndes PV du lanceur."
    it: "Il Pokémon riduce i PS del bersaglio a una quantità pari\nai propri PS."
    de: "Trifft nur, wenn KP des Anwenders geringer als KP des\nZieles sind. Senkt dessen KP auf die Höhe der KP des\nAnwenders."
    es: "Reduce los PS del objetivo para que igualen a los del\nusuario."
    ko: "상대의 HP가 자신의 HP와\n같아지도록\n데미지를 준다."
    zh_simp: "给予伤害，\n使对手的ＨＰ变得\n和自己的ＨＰ一样。"
    zh_trad: "給予傷害，\n使對手的ＨＰ變得\n和自己的ＨＰ一樣。"
endure:
  names:
    jp_kana: こらえる
    jp_kanji: こらえる
    en: Endure
    fr: Ténacité
    it: Resistenza
    de: Ausdauer
    es: Aguante
    ko: 버티기
    zh_simp: 挺住
    zh_trad: 挺住
  descriptions:
    jp_kana: "攻撃を　受けても\nＨＰを　必ず　１だけ　残せる。\n連続で　だすと　失敗しやすい。"
    jp_kanji: "攻撃を　受けても\nＨＰを　必ず　１だけ　残せる。\n連続で　だすと　失敗しやすい。"
    en: "The user endures any attack with at least 1 HP.\nThis move’s chance of failing rises if used in succession."
    fr: "Le lanceur résiste aux attaques avec 1 PV.\nPeut échouer si utilisée plusieurs fois de suite."
    it: "Il Pokémon resta con 1 PS qualunque attacco subisca.\nSe la mossa è usata in successione può fallire."
    de: "Nach fatalen Attacken bleibt stets 1 KP übrig.\nMisserfolg bei Wiederholung möglich."
    es: "Resiste cualquier ataque y deja al menos 1 PS.\nPuede fallar si se usa repetidamente."
    ko: "공격을 받아도\nHP를 반드시 1만큼은 남긴다.\n연속으로 쓰면 실패하기 쉽다."
    zh_simp: "即使受到攻击，\n也至少会留下１ＨＰ。\n连续使出则容易失败。"
    zh_trad: "即使受到再強烈的攻擊，\n也一定會剩下１ＨＰ。\n連續使用時容易失敗。"
energy_ball:
  names:
    jp_kana: エナジーボール
    jp_kanji: エナジーボール
    en: Energy Ball
    fr: Éco-Sphère
    it: Energipalla
    de: Energieball
    es: Energibola
    ko: 에너지볼
    zh_simp: 能量球
    zh_trad: 能量球
  descriptions:
    jp_kana: "自然から　集めた\n命の力を　発射する。\n相手の　特防を　さげることがある。"
    jp_kanji: "自然から　集めた\n命の力を　発射する。\n相手の　特防を　さげることがある。"
    en: "The user draws power from nature and fires it at the\ntarget. This may also lower the target’s Sp. Def stat."
    fr: "Le lanceur utilise les pouvoirs de la nature pour attaquer\nla cible, ce qui peut aussi baisser la Défense Spéciale de\ncelle-ci."
    it: "Il Pokémon attinge energia dalla natura e la scaglia\ncontro il bersaglio. Può anche ridurne la Difesa Speciale."
    de: "Anwender zieht Kraft aus der Natur und feuert sie auf\ndas Ziel. Senkt eventuell Spezial-Verteidigung des\nZieles."
    es: "Aúna fuerzas de la naturaleza y libera su ataque.\nPuede reducir la Defensa Especial del objetivo."
    ko: "자연으로부터 모은\n생명의 힘을 발사한다.\n상대의 특수방어를 떨어뜨릴 때가 있다."
    zh_simp: "发射从自然收集的生命力量。\n有时会降低对手的特防。"
    zh_trad: "發射從大自然匯聚而來的生命力量。\n有時會降低對手的特防。"
entrainment:
  names:
    jp_kana: なかまづくり
    jp_kanji: なかまづくり
    en: Entrainment
    fr: Ten-Danse
    it: Saltamicizia
    de: Zwango
    es: Danza Amiga
    ko: 동료만들기
    zh_simp: 找伙伴
    zh_trad: 找夥伴
  descriptions:
    jp_kana: "不思議な　リズムで　おどる。\n動きを　まねさせて　自分と　相手の\n特性を　同じに　する。"
    jp_kanji: "不思議な　リズムで　おどる。\n動きを　まねさせて　自分と　相手の\n特性を　同じに　する。"
    en: "The user dances with an odd rhythm that compels the\ntarget to mimic it, making the target’s Ability the same\nas the user’s."
    fr: "Le lanceur danse sur un rythme étrange.\nIl force sa cible à l’imiter, ce qui lui fait adopter\nson talent."
    it: "Il Pokémon saltella con un buffo ritmo, inducendo\nil bersaglio a imitarlo e rendendo la sua abilità\nidentica alla propria."
    de: "Anwender tanzt zu einem seltsamen Rhythmus und\nzwingt das Ziel mitzumachen. Dieses nimmt dabei die\nFähigkeit des Anwenders an."
    es: "Una extraña danza que induce al objetivo a imitarla y\ncambia su habilidad por la misma que la del usuario."
    ko: "이상한 리듬으로 춤춘다.\n움직임을 흉내 내게 해서\n자신과 상대의 특성을 똑같게 만든다."
    zh_simp: "用神奇的节奏跳舞。\n使对手模仿自己的动作，\n从而将特性变成一样。"
    zh_trad: "用神奇的節奏跳舞。\n讓對手模仿自己的動作，\n變成和自己一樣的特性。"
eruption:
  names:
    jp_kana: ふんか
    jp_kanji: ふんか
    en: Eruption
    fr: Éruption
    it: Eruzione
    de: Eruption
    es: Estallido
    ko: 분화
    zh_simp: 喷火
    zh_trad: 噴火
  descriptions:
    jp_kana: "怒りを　爆発させて　相手を\n攻撃する。　自分の　ＨＰが\n少ないほど　技の　威力は　さがる。"
    jp_kanji: "怒りを　爆発させて　相手を\n攻撃する。　自分の　ＨＰが\n少ないほど　技の　威力は　さがる。"
    en: "The user attacks opposing Pokémon with explosive fury.\nThe lower the user’s HP, the lower the move’s power."
    fr: "Le lanceur laisse exploser sa colère.\nPlus ses PV sont bas, moins l’attaque est puissante."
    it: "Il Pokémon attacca il bersaglio con una furia esplosiva.\nPiù i suoi PS sono bassi, più la potenza della mossa\ndiminuisce."
    de: "Explosiver Angriff gegen gegnerische Pokémon.\nJe höher die KP des Anwenders sind, desto mehr\nSchaden wird angerichtet."
    es: "Furia explosiva. Cuanto menor sea el número de PS del\nusuario, menos potencia tendrá el movimiento."
    ko: "분노를 폭발시켜 상대를\n공격한다. 자신의 HP가\n적을수록 기술의 위력이 떨어진다."
    zh_simp: "爆发怒火攻击对手。\n自己的ＨＰ越少，\n招式的威力越小。"
    zh_trad: "爆發怒火攻擊對手。\n自己的ＨＰ越少，\n招式的威力越小。"
esper_wing:
  names:
    jp_kana: オーラウイング
    jp_kanji: オーラウイング
    en: Esper Wing
    fr: Ailes Psycho
    it: Ali d’Aura
    de: Auraschwingen
    es: Ala Aural
    ko: 오라윙
    zh_simp: 气场之翼
    zh_trad: 氣場之翼
  descriptions:
    jp_kana: "オーラで　強化した翼で　切り裂く。\n急所に　当たりやすい。\n自分の　素早さを　あげる。"
    jp_kanji: "オーラで　強化した翼で　切り裂く。\n急所に　当たりやすい。\n自分の　素早さを　あげる。"
    en: "The user slashes the target with aura-enriched wings.\nThis also boosts the user’s Speed stat. This move has\na heightened chance of landing a critical hit."
    fr: "Le lanceur entaille la cible avec ses ailes renforcées\npar une émanation psychique. Taux de critiques élevé.\nCela augmente la Vitesse du lanceur."
    it: "Il Pokémon falcia il bersaglio con ali rafforzate da\nun’aura. Probabile brutto colpo. Inoltre, la Velocità\naumenta."
    de: "Ein schneidender Angriff mit durch eine Aura verstärkten\nSchwingen, der außerdem die Initiative des Anwenders\nerhöht. Hohe Volltrefferquote."
    es: "Corta con unas alas imbuidas de aura. Suele asestar un\ngolpe crítico y aumenta la Velocidad del usuario."
    ko: "오라로 강화한 날개로 베어 가른다.\n급소에 맞기 쉽다.\n자신의 스피드를 올린다."
    zh_simp: "用经过气场强化的翅膀撕裂对手。\n容易击中要害。\n会提高自己的速度。"
    zh_trad: "用經過氣場強化的翅膀撕裂對手。\n容易擊中要害。\n自己的速度會提高。"
eternabeam:
  names:
    jp_kana: ムゲンダイビーム
    jp_kanji: ムゲンダイビーム
    en: Eternabeam
    fr: Laser Infinimax
    it: Raggio Infinito
    de: Unendynastrahlen
    es: Rayo Infinito
    ko: 무한다이빔
    zh_simp: 无极光束
    zh_trad: 無極光束
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
expanding_force:
  names:
    jp_kana: ワイドフォース
    jp_kanji: ワイドフォース
    en: Expanding Force
    fr: Vaste Pouvoir
    it: Vastenergia
    de: Flächenmacht
    es: Vasta Fuerza
    ko: 와이드포스
    zh_simp: 广域战力
    zh_trad: 廣域戰力
  descriptions:
    jp_kana: "サイコパワーで　相手を　攻撃する。\nサイコフィールドの時　威力が　あがり\nすべての　相手に　ダメージを　与える。"
    jp_kanji: "サイコパワーで　相手を　攻撃する。\nサイコフィールドの時　威力が　あがり\nすべての　相手に　ダメージを　与える。"
    en: "The user attacks the target with its psychic power.\nWhen the ground is Psychic Terrain, this move’s power\nis boosted and it damages all opposing Pokémon."
    fr: "Le lanceur attaque la cible avec ses pouvoirs psychiques.\nSi un champ psychique est actif, la puissance de cette\ncapacité augmente et elle touche tous les ennemis."
    it: "Il Pokémon attacca il bersaglio con energia psichica.\nSe usata quando è attivo un Campo Psichico, la mossa\naumenta di potenza e danneggia tutti gli avversari."
    de: "Der Anwender greift das Ziel mit Psycho-Kräften an.\nWenn ein Psychofeld aktiv ist, steigt die Stärke und es\nwird allen gegnerischen Pokémon Schaden zugefügt."
    es: "El usuario ataca al objetivo con sus poderes psíquicos.\nCuando se usa en conjunción con un campo psíquico,\naumenta su potencia y daña a los rivales adyacentes."
    ko: "사이코 파워로 상대를 공격한다.\n사이코필드일 때는 위력이 오르며\n모든 상대에게 데미지를 준다."
    zh_simp: "利用精神力量攻击对手。\n在精神场地上威力会有所提高，\n能对所有对手造成伤害。"
    zh_trad: "用精神力量攻擊對手。\n在精神場地時，威力會提高，\n能給予所有對手傷害。"
explosion:
  names:
    jp_kana: だいばくはつ
    jp_kanji: だいばくはつ
    en: Explosion
    fr: Explosion
    it: Esplosione
    de: Explosion
    es: Explosión
    ko: 대폭발
    zh_simp: 大爆炸
    zh_trad: 大爆炸
  descriptions:
    jp_kana: "大きな　爆発で　自分の\n周りに　いるものを　攻撃する。\n使ったあとに　ひんしに　なる。"
    jp_kanji: "大きな　爆発で　自分の\n周りに　いるものを　攻撃する。\n使ったあとに　ひんしに　なる。"
    en: "The user attacks everything around it by causing a\ntremendous explosion. The user faints upon using\nthis move."
    fr: "Le lanceur explose et inflige des dégâts à tous\nles Pokémon autour de lui. Met K.O. le lanceur."
    it: "Chi la usa attacca gli altri Pokémon attorno causando\nuna grande esplosione, ma poi va KO."
    de: "Anwender explodiert, richtet bei allen Pokémon\nim Umkreis großen Schaden an und wird selbst\nkampfunfähig."
    es: "El atacante causa una grandísima explosión y hiere\na los Pokémon adyacentes. El usuario se debilita de\ninmediato."
    ko: "큰 폭발로 자신의\n주위에 있는 포켓몬을 공격한다.\n쓰고 나서는 기절한다."
    zh_simp: "引发大爆炸，\n攻击自己周围所有的宝可梦。\n使用后自己会陷入昏厥。"
    zh_trad: "引起大爆炸，\n攻擊自己周圍所有的寶可夢。\n使用後自己會陷入瀕死。"
extrasensory:
  names:
    jp_kana: じんつうりき
    jp_kanji: じんつうりき
    en: Extrasensory
    fr: Extrasenseur
    it: Extrasenso
    de: Sondersensor
    es: Paranormal
    ko: 신통력
    zh_simp: 神通力
    zh_trad: 神通力
  descriptions:
    jp_kana: "みえない　不思議な　力を\n送って　攻撃する。\n相手を　ひるませることが　ある。"
    jp_kanji: "みえない　不思議な　力を\n送って　攻撃する。\n相手を　ひるませることが　ある。"
    en: "The user attacks with an odd, unseeable power. This may\nalso make the target flinch."
    fr: "Le lanceur attaque avec un pouvoir étrange\net invisible qui peut aussi apeurer la cible."
    it: "Il Pokémon attacca con una misteriosa forza invisibile.\nPuò far tentennare il bersaglio."
    de: "Besonderer Angriff mit einer unsichtbaren Kraft,\ndie das Ziel eventuell zurückschrecken lässt."
    es: "Emite una energía muy extraña que puede amedrentar\nal objetivo."
    ko: "보이지 않는 이상한 힘을\n보내어 공격한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "发出看不见的\n神奇力量进行攻击。\n有时会使对手畏缩。"
    zh_trad: "發送看不見的\n神奇力量進行攻擊。\n有時會使對手畏縮。"
extreme_evoboost:
  names:
    jp_kana: ナインエボルブースト
    jp_kanji: ナインエボルブースト
    en: Extreme Evoboost
    fr: Neuf pour Un
    it: Potenziamento Eevolutivo
    de: Macht der Neun
    es: Novena Potencia
    ko: 나인이볼부스트
    zh_simp: 九彩升华齐聚顶
    zh_trad: 九彩昇華齊聚頂
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
extreme_speed:
  names:
    jp_kana: しんそく
    jp_kanji: しんそく
    en: Extreme Speed
    fr: Vitesse Extrême
    it: Extrarapido
    de: Turbotempo
    es: Veloc. Extrema
    ko: 신속
    zh_simp: 神速
    zh_trad: 神速
  descriptions:
    jp_kana: "目にも　留まらぬ　ものすごい　速さで\n相手に　突進して　攻撃する。\n必ず　先制攻撃　できる。"
    jp_kanji: "目にも　留まらぬ　ものすごい　速さで\n相手に　突進して　攻撃する。\n必ず　先制攻撃　できる。"
    en: "The user charges the target at blinding speed. This move\nalways goes first."
    fr: "Le lanceur charge à une vitesse renversante.\nFrappe en priorité."
    it: "Il Pokémon carica il bersaglio a una tale velocità da\nrendersi quasi invisibile. Questo attacco ha priorità alta."
    de: Extrem schnelle und kraftvolle Erstschlag-Attacke.
    es: "Ataque de una velocidad extrema. Este movimiento\ntiene prioridad alta."
    ko: "눈에 보이지 않는 굉장한 속도로\n상대에게 돌진하여 공격한다.\n반드시 선제공격을 할 수 있다."
    zh_simp: "以迅雷不及掩耳之势\n猛撞向对手进行攻击。\n必定能够先制攻击。"
    zh_trad: "以迅雷不及掩耳之勢\n猛撞向對手進行攻擊。\n必定能夠發動先制攻擊。"
facade:
  names:
    jp_kana: からげんき
    jp_kanji: からげんき
    en: Facade
    fr: Façade
    it: Facciata
    de: Fassade
    es: Imagen
    ko: 객기
    zh_simp: 硬撑
    zh_trad: 硬撐
  descriptions:
    jp_kana: "自分が　毒　まひ　やけど\n状態のとき　相手に　くりだすと\n技の　威力が　２倍に　なる。"
    jp_kanji: "自分が　毒　まひ　やけど\n状態のとき　相手に　くりだすと\n技の　威力が　２倍に　なる。"
    en: "This move’s power is doubled if the user is poisoned,\nburned, or paralyzed."
    fr: "Une capacité dont la puissance double lorsque\nle lanceur est empoisonné, paralysé ou brûlé."
    it: "Mossa la cui potenza raddoppia se chi la usa è scottato,\navvelenato o paralizzato."
    de: "Ist der Anwender vergiftet, paralysiert oder leidet er\nunter Verbrennungen, verdoppelt sich die Kraft der\nAttacke."
    es: "Si el usuario está quemado, paralizado o envenenado,\nse duplica la potencia del movimiento."
    ko: "자신이 독, 마비, 화상\n상태일 때 날리면\n기술의 위력이 2배가 된다."
    zh_simp: "当自己处于中毒、麻痹、灼伤状态时，\n向对手使出此招式的话，\n威力会变成２倍。"
    zh_trad: "當自己陷入中毒、麻痺、灼傷等\n狀態時，向對手使用此招式，\n威力會變成２倍。"
fairy_lock:
  names:
    jp_kana: フェアリーロック
    jp_kanji: フェアリーロック
    en: Fairy Lock
    fr: Verrou Enchanté
    it: Blocco Fatato
    de: Feenschloss
    es: Cerrojo Feérico
    ko: 페어리록
    zh_simp: 妖精之锁
    zh_trad: 妖精之鎖
  descriptions:
    jp_kana: "ロックを　かけることによって\n次のターン　すべての\nポケモンを　逃げられなくする。"
    jp_kanji: "ロックを　かけることによって\n次のターン　すべての\nポケモンを　逃げられなくする。"
    en: "By locking down the battlefield, the user keeps all\nPokémon from fleeing during the next turn."
    fr: "Des chaînes entourent la zone de combat, empêchant\ntous les Pokémon de quitter le terrain au tour suivant."
    it: "Chi la usa impone un blocco al terreno di lotta che nel\nturno successivo impedisce a tutti i Pokémon di lasciare\nil campo."
    de: "Der Anwender sperrt alle Pokémon ein und hindert sie\nso in der nächsten Runde an der Flucht beziehungsweise\nam Auswechseln."
    es: "Consigue que ningún Pokémon pueda huir ni ser\ncambiado por otro en el siguiente turno echando\nun cerrojo."
    ko: "록을 걸어\n다음 턴의 모든 포켓몬을\n도망가지 못하게 한다."
    zh_simp: "通过封锁，\n下一回合所有的\n宝可梦都无法逃走。"
    zh_trad: "封鎖對戰場地，\n下一回合所有的\n寶可夢都無法逃走。"
fairy_wind:
  names:
    jp_kana: ようせいのかぜ
    jp_kanji: ようせいのかぜ
    en: Fairy Wind
    fr: Vent Féérique
    it: Vento di Fata
    de: Feenbrise
    es: Viento Feérico
    ko: 요정의바람
    zh_simp: 妖精之风
    zh_trad: 妖精之風
  descriptions:
    jp_kana: "ようせいのかぜを　起こし\n相手に　吹きつけて　攻撃する。"
    jp_kanji: "ようせいのかぜを　起こし\n相手に　吹きつけて　攻撃する。"
    en: "The user attacks by stirring up a fairy wind to strike\nthe target."
    fr: Le lanceur déchaîne un vent magique qui cingle la cible.
    it: "Il Pokémon solleva un vento fatato che investe\nil bersaglio."
    de: "Lässt eine Feenbrise aufkommen, die das Ziel erfasst\nund ihm Schaden zufügt."
    es: "El usuario desata un vendaval feérico que arremete\ncontra el objetivo."
    ko: "요정의 바람을 일으켜\n상대에게 몰아쳐서 공격한다."
    zh_simp: "刮起妖精之风，\n吹向对手进行攻击。"
    zh_trad: "刮起妖精之風，\n吹向對手進行攻擊。"
fake_out:
  names:
    jp_kana: ねこだまし
    jp_kanji: ねこだまし
    en: Fake Out
    fr: Bluff
    it: Bruciapelo
    de: Mogelhieb
    es: Sorpresa
    ko: 속이기
    zh_simp: 击掌奇袭
    zh_trad: 擊掌奇襲
  descriptions:
    jp_kana: "先制攻撃で　相手を　ひるませる。\n戦闘に　でたら\nすぐに　ださないと　成功しない。"
    jp_kanji: "先制攻撃で　相手を　ひるませる。\n戦闘に　でたら\nすぐに　ださないと　成功しない。"
    en: "This attack hits first and makes the target flinch. It works\nonly on the first turn each time the user enters battle."
    fr: "Le lanceur frappe en priorité et apeure la cible.\nLa capacité ne fonctionne que si elle est utilisée\nimmédiatement en entrant au combat."
    it: "Attacco ad alta priorità che fa tentennare il bersaglio.\nFunziona solo appena scesi in campo."
    de: "Erstschlag-Attacke, die das Ziel zurückschrecken lässt.\nGelingt nur, wenn sie sofort eingesetzt wird, nachdem\nder Anwender das Kampffeld betreten hat."
    es: "Amedrenta al objetivo con este movimiento de prioridad\nalta. Solo tiene efecto si el usuario lo usa nada más\nentrar en combate."
    ko: "선제공격으로 상대를 풀죽게 한다.\n배틀에 나가서\n바로 쓰지 않으면 성공할 수 없다."
    zh_simp: "进行先制攻击，使对手畏缩。\n要在出场后立刻使出才能成功。"
    zh_trad: "利用先制攻擊使對手畏縮。\n要在上場後立即使用才會成功。"
fake_tears:
  names:
    jp_kana: うそなき
    jp_kanji: うそなき
    en: Fake Tears
    fr: Croco Larme
    it: Falselacrime
    de: Trugträne
    es: Llanto Falso
    ko: 거짓울음
    zh_simp: 假哭
    zh_trad: 假哭
  descriptions:
    jp_kana: "ないた　ふりをして　涙を　流す。\nこまらせる　ことで\n相手の　特防を　がくっと　さげる。"
    jp_kanji: "ないた　ふりをして　涙を　流す。\nこまらせる　ことで\n相手の　特防を　がくっと　さげる。"
    en: "The user feigns crying to fluster the target. This harshly\nlowers the target’s Sp. Def stat."
    fr: "Le lanceur fait semblant de pleurer pour troubler\nla cible et beaucoup baisser sa Défense Spéciale."
    it: "Il Pokémon inscena un pianto teatrale per turbare\nil bersaglio. Ne riduce di molto la Difesa Speciale."
    de: "Täuscht Weinen vor, um die Spezial-Verteidigung des\nZieles stark zu senken."
    es: "Lágrimas de cocodrilo que reducen mucho la Defensa\nEspecial del objetivo."
    ko: "우는 척을 하며 눈물을 흘린다.\n난처하게 만들어\n상대의 특수방어를 크게 떨어뜨린다."
    zh_simp: "装哭流泪。\n使对手不知所措，\n从而大幅降低对手的特防。"
    zh_trad: "裝哭掉眼淚。\n讓對手不知所措，\n大幅降低對手的特防。"
false_surrender:
  names:
    jp_kana: どげざつき
    jp_kanji: どげざつき
    en: False Surrender
    fr: Fourbette
    it: Supplicolpo
    de: Kniefalltrick
    es: Irreverencia
    ko: 사죄의찌르기
    zh_simp: 假跪真撞
    zh_trad: 假跪真撞
  descriptions:
    jp_kana: "頭を　下げる　ふりを　しながら\n振りみだした　髪の毛を　突き刺す。\n攻撃は　必ず　命中する。"
    jp_kanji: "頭を　下げる　ふりを　しながら\n振りみだした　髪の毛を　突き刺す。\n攻撃は　必ず　命中する。"
    en: "The user pretends to bow its head, but then it stabs the\ntarget with its disheveled hair. This attack never misses."
    fr: "Le lanceur fait semblant de se prosterner et utilise\nses cheveux pour transpercer sa cible. N’échoue jamais."
    it: "Il Pokémon finge di abbassare la testa a mo’ di supplica\ne attacca il bersaglio con i suoi capelli scarmigliati.\nQuesto attacco va sempre a segno."
    de: "Der Anwender tut so, als würde er sich verneigen, und\nsticht dann mit seinem zerzausten Fell zu. Diese Attacke\ntrifft immer."
    es: "El usuario finge hacer una reverencia y aprovecha\nla ocasión para ensartar al objetivo con su cabello\nalborotado. No falla nunca."
    ko: "고개를 숙이는 척하면서\n흐트러진 머리카락으로 찌른다.\n공격은 반드시 명중한다."
    zh_simp: "装作低头认错的样子，\n用凌乱的头发进行突刺。\n攻击必定会命中。"
    zh_trad: "假裝低頭道歉，\n用凌亂的頭髮刺向對手。\n攻擊必定會命中。"
false_swipe:
  names:
    jp_kana: みねうち
    jp_kanji: みねうち
    en: False Swipe
    fr: Faux-Chage
    it: Falsofinale
    de: Trugschlag
    es: Falso Tortazo
    ko: 칼등치기
    zh_simp: 点到为止
    zh_trad: 點到為止
  descriptions:
    jp_kana: "相手の　ＨＰが\n必ず　１だけ　残るように\n手加減して　攻撃する。"
    jp_kanji: "相手の　ＨＰが\n必ず　１だけ　残るように\n手加減して　攻撃する。"
    en: "A restrained attack that prevents the target from\nfainting. The target is left with at least 1 HP."
    fr: "Le lanceur retient ses coups pour que la cible\ngarde au moins 1 PV et ne tombe pas K.O."
    it: "Il Pokémon attacca in modo contenuto, lasciando\nil bersaglio con 1 PS."
    de: Ein Angriff, der dem Ziel zumindest 1 KP lässt.
    es: "Ataque moderado que no debilita al objetivo y le deja\nal menos 1 PS."
    ko: "상대의 HP가\n반드시 1만 남도록\n조절하여 공격한다."
    zh_simp: "对手的ＨＰ\n至少会留下１ＨＰ，\n如此般手下留情地攻击。"
    zh_trad: "手下留情地攻擊對手，\n一定會讓對手剩下１ＨＰ。"
feather_dance:
  names:
    jp_kana: フェザーダンス
    jp_kanji: フェザーダンス
    en: Feather Dance
    fr: Danse Plumes
    it: Danzadipiume
    de: Daunenreigen
    es: Danza Pluma
    ko: 깃털댄스
    zh_simp: 羽毛舞
    zh_trad: 羽毛舞
  descriptions:
    jp_kana: "羽毛を　ふりまいて\n相手の　体に　からませる。\n相手の　攻撃を　がくっと　さげる。"
    jp_kanji: "羽毛を　ふりまいて\n相手の　体に　からませる。\n相手の　攻撃を　がくっと　さげる。"
    en: "The user covers the target’s body with a mass of down\nthat harshly lowers its Attack stat."
    fr: "Une montagne de plumes ensevelit la cible\net réduit beaucoup son Attaque."
    it: "Il Pokémon circonda il bersaglio con un turbinio di piume\nriducendo di molto il suo Attacco."
    de: "Hüllt das Ziel in Daunen und senkt dessen\nAngriffs-Wert stark."
    es: "Envuelve al objetivo con un manto de plumas para\nreducir mucho su Ataque."
    ko: "깃털을 흩뿌려\n상대의 몸에 휘감는다.\n상대의 공격을 크게 떨어뜨린다."
    zh_simp: "撒出羽毛，\n笼罩在对手的周围。\n大幅降低对手的攻击。"
    zh_trad: "撒出羽毛，\n纏住對手的身體。\n大幅降低對手的攻擊。"
feint:
  names:
    jp_kana: フェイント
    jp_kanji: フェイント
    en: Feint
    fr: Ruse
    it: Fintoattacco
    de: Offenlegung
    es: Amago
    ko: 페인트
    zh_simp: 佯攻
    zh_trad: 佯攻
  descriptions:
    jp_kana: "まもるや　みきり　などを　している\n相手に　攻撃が　できる。\n守りの　効果を　解除させる。"
    jp_kanji: "まもるや　みきり　などを　している\n相手に　攻撃が　できる。\n守りの　効果を　解除させる。"
    en: "This attack can hit a target using a move such as Protect\nor Detect. This also lifts the effects of those moves."
    fr: "Une attaque capable de toucher une cible qui utilise\nune capacité similaire à Détection ou Abri, et annule\nl’effet de cette capacité."
    it: "Il Pokémon può attaccare anche un bersaglio che ha\nusato mosse come Protezione e Individua, annullandone\ngli effetti."
    de: "Ziele, die Attacken wie Schutzschild oder Scanner\neingesetzt haben, werden getroffen. Entfernt Effekte\ndieser Attacken."
    es: "Permite golpear a objetivos que han utilizado\nmovimientos como Protección o Detección y anula\nsus efectos."
    ko: "방어나 판별 등을 하고 있는\n상대에게 공격할 수 있다.\n방어 효과를 해제시킨다."
    zh_simp: "能够攻击正在使用\n守住或看穿等招式的对手。\n解除其守护效果。"
    zh_trad: "能夠攻擊使用了\n守住或看穿的對手。\n並解除對手的防守效果。"
feint_attack:
  names:
    jp_kana: だましうち
    jp_kanji: だましうち
    en: Feint Attack
    fr: Feinte
    it: Finta
    de: Finte
    es: Finta
    ko: 속여때리기
    zh_simp: 出奇一击
    zh_trad: 出奇一擊
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
fell_stinger:
  names:
    jp_kana: とどめばり
    jp_kanji: とどめばり
    en: Fell Stinger
    fr: Dard Mortel
    it: Pungiglione
    de: Stachelfinale
    es: Aguijón Letal
    ko: 마지막일침
    zh_simp: 致命针刺
    zh_trad: 致命針刺
  descriptions:
    jp_kana: "この　技を　使って\n相手を　倒すと\n攻撃が　ぐぐーんと　あがる。"
    jp_kanji: "この　技を　使って\n相手を　倒すと\n攻撃が　ぐぐーんと　あがる。"
    en: "When the user knocks out a target with this move, the\nuser’s Attack stat is boosted drastically."
    fr: "Le lanceur augmente énormément son Attaque\nsi une cible est mise K.O. par cette capacité."
    it: "Quando il Pokémon manda KO il bersaglio con questa\nmossa, aumenta moltissimo il suo Attacco."
    de: "Gelingt es dem Anwender, das Ziel mit dieser Attacke\nzu besiegen, steigt sein Angriffs-Wert drastisch."
    es: "Si se derrota al objetivo utilizando este movimiento,\naumenta muchísimo el Ataque del usuario."
    ko: "이 기술을 사용하여\n상대를 쓰러뜨리면\n공격이 매우 크게 올라간다."
    zh_simp: "如果使用此招式打倒对手，\n攻击会巨幅提高。"
    zh_trad: "使用此招式打倒對手時，\n自己的攻擊會極大幅提高。"
fickle_beam:
  names:
    jp_kana: きまぐレーザー
    jp_kanji: きまぐレーザー
    en: Fickle Beam
    fr: Laser Hasard
    it: Irregolaser
    de: Launenlaser
    es: Láser Veleidoso
    ko: 변덕레이저
    zh_simp: 随机光
    zh_trad: 隨機光
  descriptions:
    jp_kana: "光線を　発射して　攻撃する。\nときどき　ほかの首も　協力して\nレーザーを　放ち　威力が　２倍に　なる。"
    jp_kanji: "光線を　発射して　攻撃する。\nときどき　ほかの首も　協力して\nレーザーを　放ち　威力が　２倍に　なる。"
    en: "The user shoots a beam of light to inflict damage.\nSometimes all the user’s heads shoot beams in unison,\ndoubling the move’s power."
    fr: "Le lanceur attaque en tirant un rayon lumineux.\nIl arrive parfois que toutes les têtes agissent ensemble,\nce qui double la puissance de la capacité."
    it: "Il Pokémon attacca rilasciando raggi di luce. Talvolta\ni laser vengono emessi da tutte le teste, contribuendo\na raddoppiare la potenza della mossa."
    de: "Der Anwender greift mit einem Laserstrahl an.\nManchmal feuern mehrere seiner Köpfe Laser ab,\nwodurch sich die Stärke dieser Attacke verdoppelt."
    es: "Ataca disparando un haz de luz. En ocasiones, el resto\nde sus cabezas se unen al ataque. Cuando esto sucede,\nla potencia del movimiento se duplica."
    ko: "광선을 발사해서 공격한다.\n가끔 다른 머리도 협력해서\n레이저를 발사하여 위력이 2배가 된다."
    zh_simp: "发射光线进行攻击。\n有时其他的头也会合力发射镭射，\n让招式威力变成２倍。"
    zh_trad: "發射光線進行攻擊。\n有時會和其他的頭合力發射雷射，\n讓招式威力變成２倍。"
fiery_dance:
  names:
    jp_kana: ほのおのまい
    jp_kanji: ほのおのまい
    en: Fiery Dance
    fr: Danse du Feu
    it: Voldifuoco
    de: Feuerreigen
    es: Danza Llama
    ko: 불꽃춤
    zh_simp: 火之舞
    zh_trad: 火之舞
  descriptions:
    jp_kana: "炎を　まとい　はばたいて　相手を\n攻撃する。自分の　特攻が\nあがることが　ある。"
    jp_kanji: "炎を　まとい　はばたいて　相手を\n攻撃する。自分の　特攻が\nあがることが　ある。"
    en: "Cloaked in flames, the user attacks the target by dancing\nand flapping its wings. This may also boost the user’s\nSp. Atk stat."
    fr: "Le lanceur s’enveloppe de flammes et attaque la cible,\nCela peut aussi augmenter l’Attaque Spéciale du lanceur."
    it: "Il Pokémon attacca il bersaglio avvolgendosi di fiamme\ne sbattendo le ali. Può anche aumentare il proprio\nAttacco Speciale."
    de: "Hüllt das Ziel mit einer Feuerhose in Flammen.\nKann den Spezial-Angriff des Anwenders erhöhen."
    es: "Se envuelve en llamas y agita las alas para dañar al\nobjetivo. Puede aumentar el Ataque Especial del usuario."
    ko: "불꽃을 두른 날개를 쳐서 공격한다.\n자신의 특수공격이 올라갈 때가 있다."
    zh_simp: "让火焰覆盖全身，\n振翅攻击对手。\n有时会提高自己的特攻。"
    zh_trad: "讓火焰圍繞全身後，\n振翅攻擊對手。\n有時會提高自己的特攻。"
fiery_wrath:
  names:
    jp_kana: もえあがるいかり
    jp_kanji: もえあがるいかり
    en: Fiery Wrath
    fr: Fureur Ardente
    it: Furia Ardente
    de: Brennender Zorn
    es: Furia Candente
    ko: 타오르는분노
    zh_simp: 怒火中烧
    zh_trad: 怒火中燒
  descriptions:
    jp_kana: "怒りを　炎の　ような\nオーラに　変えて　攻撃する。\n相手を　ひるませることが　ある。"
    jp_kanji: "怒りを　炎の　ような\nオーラに　変えて　攻撃する。\n相手を　ひるませることが　ある。"
    en: "The user transforms its wrath into a fire-like aura to\nattack. This may also make opposing Pokémon flinch."
    fr: "Le lanceur canalise sa colère et la transforme en\némanation brûlante, avec laquelle il attaque la cible,\nce qui peut aussi apeurer celle-ci."
    it: "Il Pokémon attacca trasformando la sua rabbia\nin un’aura simile a fiamme. Può anche far tentennare\nil bersaglio."
    de: "Der Anwender wandelt seinen Zorn in eine flammende\nAura um und greift damit gegnerische Pokémon an.\nDiese schrecken eventuell zurück."
    es: "El usuario convierte su ira en un aura flamígera para\nlanzar su ataque. Puede amedrentar al objetivo."
    ko: "분노를 불꽃 같은\n오라로 바꿔서 공격한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "将愤怒转化为火焰般的气场进行攻击。\n有时会使对手畏缩。"
    zh_trad: "將憤怒化為火焰般的氣場進行攻擊。\n有時會讓對手畏縮。"
fillet_away:
  names:
    jp_kana: みをけずる
    jp_kanji: みをけずる
    en: Fillet Away
    fr: Décharnement
    it: Alleggerimento
    de: Abspaltung
    es: Deslome
    ko: 제살깎기
    zh_simp: 甩肉
    zh_trad: 甩肉
  descriptions:
    jp_kana: "自分の　ＨＰを　けずって\n自分の　攻撃と　特攻と\n素早さを　ぐーんと　あげる。"
    jp_kanji: "自分の　ＨＰを　けずって\n自分の　攻撃と　特攻と\n素早さを　ぐーんと　あげる。"
    en: "The user sharply boosts its Attack, Sp. Atk, and Speed\nstats by using its own HP."
    fr: "Le lanceur sacrifie des PV pour beaucoup augmenter\nson Attaque, son Attaque Spéciale, et sa Vitesse."
    it: "Il Pokémon sacrifica dei PS per far aumentare di molto\nl’Attacco, l’Attacco Speciale e la Velocità."
    de: "Der Anwender setzt seine KP ein, um seinen Angriff,\nseinen Spezial-Angriff und seine Initiative stark zu\nerhöhen."
    es: "Aumenta mucho el Ataque, el Ataque Especial y la\nVelocidad del usuario a costa de parte de sus PS."
    ko: "자신의 HP를 깎아서\n자신의 공격, 특수공격,\n스피드를 크게 올린다."
    zh_simp: "削减自己的ＨＰ，\n大幅提高攻击和特攻以及速度。"
    zh_trad: "削減自己的ＨＰ，\n大幅提高自己的攻擊、特攻和速度。"
final_gambit:
  names:
    jp_kana: いのちがけ
    jp_kanji: いのちがけ
    en: Final Gambit
    fr: Tout ou Rien
    it: Azzardo
    de: Wagemut
    es: Sacrificio
    ko: 목숨걸기
    zh_simp: 搏命
    zh_trad: 搏命
  descriptions:
    jp_kana: "命懸けで　相手を　攻撃する。\n自分は　ひんしに　なるが　相手に\nＨＰ分の　ダメージを　与える。"
    jp_kanji: "命懸けで　相手を　攻撃する。\n自分は　ひんしに　なるが　相手に\nＨＰ分の　ダメージを　与える。"
    en: "The user risks everything to attack the target. The user\nfaints but inflicts damage equal to its own HP."
    fr: "Une attaque très risquée. Le lanceur perd tous ses PV\nrestants et inflige autant de dégâts à la cible."
    it: "Il Pokémon attacca rischiando il tutto per tutto.\nVa KO, ma infligge al bersaglio un danno pari\nai PS che ha perso."
    de: "Ein Angriff, der dem Ziel Schaden in Höhe der aktuellen\nKP des Anwenders zufügt. Letzterer wird dadurch selbst\nbesiegt."
    es: "El usuario se sacrifica causándole un daño al objetivo\nequivalente a sus propios PS perdidos."
    ko: "목숨을 걸고 상대를 공격한다.\n자신은 기절하게 되지만 상대에게\nHP만큼의 데미지를 준다."
    zh_simp: "拼命攻击对手。\n虽然自己陷入昏厥，但会给予对手\n和自己目前ＨＰ等量的伤害。"
    zh_trad: "捨身攻擊對手。\n雖然自己會陷入瀕死，但能夠給予對手\n和自己現有ＨＰ相同的傷害。"
fire_blast:
  names:
    jp_kana: だいもんじ
    jp_kanji: だいもんじ
    en: Fire Blast
    fr: Déflagration
    it: Fuocobomba
    de: Feuersturm
    es: Llamarada
    ko: 불대문자
    zh_simp: 大字爆炎
    zh_trad: 大字爆炎
  descriptions:
    jp_kana: "大の字の　炎で\n相手を　焼きつくす。\nやけど状態に　することが　ある。"
    jp_kanji: "大の字の　炎で\n相手を　焼きつくす。\nやけど状態に　することが　ある。"
    en: "The target is attacked with an intense blast of all-\nconsuming fire. This may also leave the target with\na burn."
    fr: "Un déluge de flammes ardentes submerge la cible,\nce qui peut aussi la brûler."
    it: "Investe il bersaglio con un’intensa fiammata\nche fa terra bruciata. Può anche scottarlo."
    de: "Feuersbrunst, die das Ziel versengt und ihm eventuell\nVerbrennungen zufügt."
    es: "Llama intensa que chamusca y puede causar\nquemaduras."
    ko: "큰대자의 불꽃으로\n상대를 불태운다.\n화상 상태로 만들 때가 있다."
    zh_simp: "用大字形状的火焰烧尽对手。\n有时会让对手陷入灼伤状态。"
    zh_trad: "用大字形狀的火焰燒盡對手。\n有時會讓對手陷入灼傷狀態。"
fire_fang:
  names:
    jp_kana: ほのおのキバ
    jp_kanji: ほのおのキバ
    en: Fire Fang
    fr: Crocs Feu
    it: Rogodenti
    de: Feuerzahn
    es: Colmillo Ígneo
    ko: 불꽃엄니
    zh_simp: 火焰牙
    zh_trad: 火焰牙
  descriptions:
    jp_kana: "炎を　まとった　キバで　かみつく。\n相手を　ひるませたり\nやけど状態に　することが　ある。"
    jp_kanji: "炎を　まとった　キバで　かみつく。\n相手を　ひるませたり\nやけど状態に　することが　ある。"
    en: "The user bites with flame-cloaked fangs. This may also\nmake the target flinch or leave it with a burn."
    fr: "Le lanceur utilise une morsure enflammée qui peut aussi\nbrûler ou apeurer la cible."
    it: "Il Pokémon morde con denti infuocati. Può anche\nscottare o far tentennare il bersaglio."
    de: "Anwender beißt mit flammenden Reißzähnen zu.\nZiel schreckt eventuell zurück oder erleidet\nVerbrennungen."
    es: "El usuario muerde al objetivo con colmillos en llamas y\npuede hacer que se amedrente o sufra quemaduras."
    ko: "불꽃을 두른 이빨로 문다.\n상대를 풀죽게 하거나\n화상 상태로 만들 때가 있다."
    zh_simp: "用覆盖着火焰的牙齿咬住对手。\n有时会使对手畏缩\n或陷入灼伤状态。"
    zh_trad: "用纏繞火焰的牙齒咬住對手。\n有時會讓對手畏縮\n或陷入灼傷狀態。"
fire_lash:
  names:
    jp_kana: ほのおのムチ
    jp_kanji: ほのおのムチ
    en: Fire Lash
    fr: Fouet de Feu
    it: Frusta di Fuoco
    de: Feuerpeitsche
    es: Látigo Ígneo
    ko: 불꽃채찍
    zh_simp: 火焰鞭
    zh_trad: 火焰鞭
  descriptions:
    jp_kana: "焼けたムチで　相手を　打ちつける。\n攻撃を　受けた　相手は\n防御が　さがる。"
    jp_kanji: "焼けたムチで　相手を　打ちつける。\n攻撃を　受けた　相手は\n防御が　さがる。"
    en: "The user strikes the target with a burning lash. This also\nlowers the target’s Defense stat."
    fr: "Frappe la cible avec un fouet incandescent et baisse\nsa Défense."
    it: "Il Pokémon colpisce il bersaglio con una frusta infuocata\ne ne riduce la Difesa."
    de: "Der Anwender greift das Ziel mit einer brennenden\nPeitsche an und senkt dabei zusätzlich dessen\nVerteidigungs-Wert."
    es: "Golpea al objetivo con un látigo incandescente y\nreduce su Defensa."
    ko: "불타는 채찍으로 상대를 친다.\n공격을 받은 상대는\n방어가 떨어진다."
    zh_simp: "用燃烧的鞭子抽打对手。\n受到攻击的对手防御会降低。"
    zh_trad: "用燃燒的鞭子抽打對手。\n受到攻擊的對手防禦會降低。"
fire_pledge:
  names:
    jp_kana: ほのおのちかい
    jp_kanji: ほのおのちかい
    en: Fire Pledge
    fr: Aire de Feu
    it: Fiammapatto
    de: Feuersäulen
    es: Voto Fuego
    ko: 불꽃의맹세
    zh_simp: 火之誓约
    zh_trad: 火之誓約
  descriptions:
    jp_kana: "炎の柱で　攻撃する。\nくさと　組みあわせると　威力が\nあがって　周りが　火の海に　なる。"
    jp_kanji: "炎の柱で　攻撃する。\nくさと　組みあわせると　威力が\nあがって　周りが　火の海に　なる。"
    en: "A column of fire hits the target. When used with its grass\ncounterpart, this move’s power is boosted and a vast sea\nof fire appears."
    fr: "Une masse de feu s’abat sur la cible. Si cette capacité\nest utilisée en même temps qu’Aire d’Herbe, la puissance\naugmente et une mer de feu apparaît."
    it: "Il Pokémon attacca il bersaglio con una colonna\ndi fuoco. Se usata con Erbapatto, la potenza\naumenta e il campo diventa un mare di fuoco."
    de: "Ein Angriff mit Feuersäulen. Mit Pflanzensäulen\nkombiniert steigt die Wirkung und die Umgebung\nwird zu einem Meer aus Feuer."
    es: "Ataca con columnas de fuego. Combinado con\nVoto Planta, crea un mar de llamas y aumenta su\npotencia."
    ko: "불꽃기둥으로 공격한다.\n풀과 조합하면 위력이\n올라가고 주위가 불바다가 된다."
    zh_simp: "用火柱进行攻击。\n如果和草组合，威力就会提高，\n周围会变成火海。"
    zh_trad: "用火柱進行攻擊。\n和草之誓約同時使用時，威力會提高，\n周圍會變成火海。"
fire_punch:
  names:
    jp_kana: ほのおのパンチ
    jp_kanji: ほのおのパンチ
    en: Fire Punch
    fr: Poing Feu
    it: Fuocopugno
    de: Feuerschlag
    es: Puño Fuego
    ko: 불꽃펀치
    zh_simp: 火焰拳
    zh_trad: 火焰拳
  descriptions:
    jp_kana: "炎を　こめた　パンチで\n相手を　攻撃する。\nやけど状態に　することが　ある。"
    jp_kanji: "炎を　こめた　パンチで\n相手を　攻撃する。\nやけど状態に　することが　ある。"
    en: "The target is attacked with a fiery punch. This may also\nleave the target with a burn."
    fr: "Un coup de poing enflammé vient frapper la cible,\nce qui peut la brûler."
    it: "Il Pokémon attacca il bersaglio con un pugno ardente\nche può scottarlo."
    de: "Ein feuriger Schlag, der dem Ziel eventuell\nVerbrennungen zufügt."
    es: Puñetazo ardiente que puede causar quemaduras.
    ko: "불꽃을 담은 펀치로\n상대를 공격한다.\n화상 상태로 만들 때가 있다."
    zh_simp: "用充满火焰的拳头攻击对手。\n有时会让对手陷入灼伤状态。"
    zh_trad: "用帶有火焰的拳頭\n攻擊對手。\n有時會讓對手陷入灼傷狀態。"
fire_spin:
  names:
    jp_kana: ほのおのうず
    jp_kanji: ほのおのうず
    en: Fire Spin
    fr: Danse Flammes
    it: Turbofuoco
    de: Feuerwirbel
    es: Giro Fuego
    ko: 회오리불꽃
    zh_simp: 火焰旋涡
    zh_trad: 火焰旋渦
  descriptions:
    jp_kana: "激しく　渦をまく　炎の中に\n４ー５ターンの　間\n相手を　閉じこめて　攻撃する。"
    jp_kanji: "激しく　渦をまく　炎の中に\n４ー５ターンの　間\n相手を　閉じこめて　攻撃する。"
    en: "The user traps the target inside a fierce vortex of fire\nthat inflicts damage for four to five turns."
    fr: "Un tourbillon de flammes emprisonne la cible\npendant quatre à cinq tours."
    it: "Il Pokémon attacca il bersaglio intrappolandolo in un\nturbine di fuoco che dura per quattro o cinque turni."
    de: "Das Ziel wird für vier bis fünf Runden in einem\nFeuerkreis gefangen."
    es: "Un aro de fuego que atrapa y daña al objetivo de cuatro\na cinco turnos."
    ko: "세차게 소용돌이치는 불꽃 속에\n4~5턴 동안\n상대를 가두어 공격한다."
    zh_simp: "将对手困在\n激烈的火焰旋涡中，\n在４～５回合内进行攻击。"
    zh_trad: "將對手困在\n熊熊燃燒的火焰旋渦中，\n在４～５回合內進行攻擊。"
first_impression:
  names:
    jp_kana: であいがしら
    jp_kanji: であいがしら
    en: First Impression
    fr: Escarmouche
    it: Schermaglia
    de: Überrumpler
    es: Escaramuza
    ko: 만나자마자
    zh_simp: 迎头一击
    zh_trad: 迎頭一擊
  descriptions:
    jp_kana: "威力が　高い　技　だが\n戦闘に　出たら\nすぐに　出さないと　成功　しない。"
    jp_kanji: "威力が　高い　技　だが\n戦闘に　出たら\nすぐに　出さないと　成功　しない。"
    en: "Although this move has great power, it works only on\nthe first turn each time the user enters battle."
    fr: "Une capacité très puissante, mais qui ne fonctionne\nque lorsque le lanceur entre au combat."
    it: "È una mossa molto potente, ma funziona\nsolo appena scesi in campo."
    de: "Eine sehr starke Attacke, die jedoch nur erfolgreich ist,\nwenn sie sofort eingesetzt wird, nachdem der Anwender\ndas Kampffeld betreten hat."
    es: "Movimiento de gran potencia que solo puede usarse en\nel turno en que el usuario entra en combate."
    ko: "위력이 높은 기술이지만\n배틀에 나가서\n바로 쓰지 않으면 성공할 수 없다."
    zh_simp: "威力很高的招式，\n但只有在出场战斗时，\n立刻使出才能成功。"
    zh_trad: "招式的威力雖高，\n但只有在出場戰鬥時，\n立刻使出才能成功。"
fishious_rend:
  names:
    jp_kana: エラがみ
    jp_kanji: エラがみ
    en: Fishious Rend
    fr: Branchicrok
    it: Branchiomorso
    de: Kiemenbiss
    es: Branquibocado
    ko: 아가미물기
    zh_simp: 鳃咬
    zh_trad: 鰓咬
  descriptions:
    jp_kana: "かたい　エラで　かみつく。\n相手より　先に　攻撃できると\n技の　威力は　２倍に　なる。"
    jp_kanji: "かたい　エラで　かみつく。\n相手より　先に　攻撃できると\n技の　威力は　２倍に　なる。"
    en: "The user rends the target with its hard gills. This move’s\npower is doubled if the user moves before the target."
    fr: "Le lanceur mord sa cible avec ses solides branchies.\nSi cette capacité est lancée avant que la cible n’attaque,\nelle infligera deux fois plus de dégâts."
    it: "Il Pokémon morde il bersaglio con le dure branchie.\nSe attacca per primo, la potenza della mossa\nraddoppia."
    de: "Der Anwender beißt mit seinen harten Kiemen zu.\nKommt er vor dem Ziel zum Zug, verdoppelt sich die\nStärke der Attacke."
    es: "El usuario agarra al objetivo con sus duras branquias.\nEn caso de atacar antes que este último, la potencia del\nmovimiento se duplica."
    ko: "단단한 아가미로 문다.\n상대보다 먼저 공격하면\n기술의 위력은 2배가 된다."
    zh_simp: "用坚硬的腮咬住对手。\n如果比对手先出手攻击，\n招式的威力会变成２倍。"
    zh_trad: "用堅硬的鰓咬住對手。\n若在對手之前進行攻擊，\n招式的威力會變成２倍。"
fissure:
  names:
    jp_kana: じわれ
    jp_kanji: じわれ
    en: Fissure
    fr: Abîme
    it: Abisso
    de: Geofissur
    es: Fisura
    ko: 땅가르기
    zh_simp: 地裂
    zh_trad: 地裂
  descriptions:
    jp_kana: "地割れの　裂け目に\n相手を　落として　攻撃する。\n当たれば　一撃で　ひんしに　する。"
    jp_kanji: "地割れの　裂け目に\n相手を　落として　攻撃する。\n当たれば　一撃で　ひんしに　する。"
    en: "The user opens up a fissure in the ground and drops the\ntarget in. The target faints instantly if this attack hits."
    fr: "Le lanceur fait tomber la cible dans une crevasse.\nSi cette attaque réussit, elle met K.O. sur le coup."
    it: "Il Pokémon attacca il bersaglio gettandolo in una\nspaccatura nel terreno. Se la mossa va a segno,\nil Pokémon colpito va KO."
    de: "Das Ziel wird in eine Erdspalte geworfen. Ist die Attacke\nerfolgreich, führt sie zu einem K.O."
    es: "Abre una grieta en el suelo y mete al objetivo en ella.\nFulmina al objetivo de un solo golpe si acierta."
    ko: "땅이 갈라진 곳에\n상대를 떨어뜨려 공격한다.\n맞으면 일격에 기절한다."
    zh_simp: "让对手掉落于地裂的\n裂缝中进行攻击。\n只要命中就会一击昏厥。"
    zh_trad: "讓對手掉進地面的\n裂縫中進行攻擊。\n只要命中就會一擊瀕死。"
flail:
  names:
    jp_kana: じたばた
    jp_kanji: じたばた
    en: Flail
    fr: Gigotage
    it: Flagello
    de: Dreschflegel
    es: Azote
    ko: 바둥바둥
    zh_simp: 抓狂
    zh_trad: 抓狂
  descriptions:
    jp_kana: "じたばた　暴れて　攻撃する。\n自分の　ＨＰが　少ないほど\n技の　威力は　あがる。"
    jp_kanji: "じたばた　暴れて　攻撃する。\n自分の　ＨＰが　少ないほど\n技の　威力は　あがる。"
    en: "The user flails about aimlessly to attack. The less HP\nthe user has, the greater the move’s power."
    fr: "Le lanceur attaque en gigotant dans tous les sens.\nPlus ses PV sont bas, plus l’attaque est puissante."
    it: "Il Pokémon si dimena per attaccare. Più i suoi PS sono\nbassi, più la potenza della mossa aumenta."
    de: "Attacke richtet mehr Schaden an, wenn eigene KP\nniedrig sind."
    es: "Ataque frenético. Cuantos menos PS tenga el usuario,\nmás daño producirá."
    ko: "바둥바둥 난동 부려서 공격한다.\n자신의 HP가 적을수록\n기술의 위력이 올라간다."
    zh_simp: "抓狂般乱打进行攻击。\n自己的ＨＰ越少，\n招式的威力越大。"
    zh_trad: "抓狂般亂打進行攻擊。\n自己的ＨＰ越少，\n招式的威力越大。"
flame_burst:
  names:
    jp_kana: はじけるほのお
    jp_kanji: はじけるほのお
    en: Flame Burst
    fr: Rebondifeu
    it: Pirolancio
    de: Funkenflug
    es: Pirotecnia
    ko: 불꽃튀기기
    zh_simp: 烈焰溅射
    zh_trad: 烈焰濺射
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
flame_charge:
  names:
    jp_kana: ニトロチャージ
    jp_kanji: ニトロチャージ
    en: Flame Charge
    fr: Nitrocharge
    it: Nitrocarica
    de: Nitroladung
    es: Nitrocarga
    ko: 니트로차지
    zh_simp: 蓄能焰袭
    zh_trad: 蓄能焰襲
  descriptions:
    jp_kana: "炎を　まとい　相手を　攻撃する。\n力を　ためて　自分の\n素早さを　あげる。"
    jp_kanji: "炎を　まとい　相手を　攻撃する。\n力を　ためて　自分の\n素早さを　あげる。"
    en: "Cloaking itself in flame, the user attacks the target.\nThen, building up momentum, the user boosts its\nSpeed stat."
    fr: "Le lanceur s’entoure de flammes pour attaquer la cible.\nIl se concentre et sa Vitesse augmente."
    it: "Il Pokémon si copre di fuoco e attacca il bersaglio.\nConcentrandosi aumenta, inoltre, la propria\nVelocità."
    de: "Anwender hüllt sich in Flammen und greift das Ziel an.\nSammelt seine Energie und erhöht dadurch die eigene\nInitiative."
    es: "Llamas que golpean al objetivo y aumentan la Velocidad\ndel usuario."
    ko: "불꽃을 둘러 상대를 공격한다.\n힘을 모아서 자신의\n스피드를 올린다."
    zh_simp: "让火焰覆盖全身，攻击对手。\n积蓄力量来提高自己的速度。"
    zh_trad: "讓火焰圍繞全身後攻擊對手。\n同時蓄積力量來提高自己的速度。"
flame_wheel:
  names:
    jp_kana: かえんぐるま
    jp_kanji: かえんぐるま
    en: Flame Wheel
    fr: Roue de Feu
    it: Ruotafuoco
    de: Flammenrad
    es: Rueda Fuego
    ko: 화염바퀴
    zh_simp: 火焰轮
    zh_trad: 火焰輪
  descriptions:
    jp_kana: "炎を　まとい\n相手に　突進して　攻撃する。\nやけど状態に　することが　ある。"
    jp_kanji: "炎を　まとい\n相手に　突進して　攻撃する。\nやけど状態に　することが　ある。"
    en: "The user attacks by cloaking itself in fire and charging\nat the target. This may also leave the target with a burn."
    fr: "Le lanceur s’entoure de feu et charge la cible,\nce qui peut aussi la brûler."
    it: "Il Pokémon si copre di fuoco e attacca scagliandosi\ncontro il bersaglio. Può anche scottarlo."
    de: "Anwender hüllt sich in Flammen und rammt das Ziel.\nVerursacht beim Ziel eventuell Verbrennungen."
    es: Ataca envuelto en fuego. Puede causar quemaduras.
    ko: "불꽃을 둘러\n상대에게 돌진하여 공격한다.\n화상 상태로 만들 때가 있다."
    zh_simp: "让火焰覆盖全身，\n猛撞向对手进行攻击。\n有时会让对手陷入灼伤状态。"
    zh_trad: "用火焰圍繞身體，\n猛撞對手進行攻擊。\n有時會讓對手陷入灼傷狀態。"
flamethrower:
  names:
    jp_kana: かえんほうしゃ
    jp_kanji: かえんほうしゃ
    en: Flamethrower
    fr: Lance-Flammes
    it: Lanciafiamme
    de: Flammenwurf
    es: Lanzallamas
    ko: 화염방사
    zh_simp: 喷射火焰
    zh_trad: 噴射火焰
  descriptions:
    jp_kana: "激しい　炎を\n相手に　発射して　攻撃する。\nやけど状態に　することが　ある。"
    jp_kanji: "激しい　炎を\n相手に　発射して　攻撃する。\nやけど状態に　することが　ある。"
    en: "The target is scorched with an intense blast of fire.\nThis may also leave the target with a burn."
    fr: "La cible reçoit un torrent de flammes qui peut aussi\nla brûler."
    it: "Il Pokémon attacca il bersaglio lanciando intense\nfiammate che possono anche scottarlo."
    de: "Starke Feuer-Attacke, durch die das Ziel eventuell\nVerbrennungen erleidet."
    es: "Ataca con una gran ráfaga de fuego que puede causar\nquemaduras."
    ko: "세찬 불꽃을\n상대에게 발사하여 공격한다.\n화상 상태로 만들 때가 있다."
    zh_simp: "向对手发射\n烈焰进行攻击。\n有时会让对手陷入灼伤状态。"
    zh_trad: "向對手發射\n強烈火焰進行攻擊。\n有時會讓對手陷入灼傷狀態。"
flare_blitz:
  names:
    jp_kana: フレアドライブ
    jp_kanji: フレアドライブ
    en: Flare Blitz
    fr: Boutefeu
    it: Fuococarica
    de: Flammenblitz
    es: Envite Ígneo
    ko: 플레어드라이브
    zh_simp: 闪焰冲锋
    zh_trad: 閃焰衝鋒
  descriptions:
    jp_kana: "炎を　まとって　突進する。\n自分も　かなり　ダメージを　受ける。\nやけど状態に　することが　ある。"
    jp_kanji: "炎を　まとって　突進する。\n自分も　かなり　ダメージを　受ける。\nやけど状態に　することが　ある。"
    en: "The user cloaks itself in fire and charges the target to\ninflict damage. This also damages the user quite a lot\nand may leave the target with a burn."
    fr: "Le lanceur s’embrase avant de charger la cible, ce qui\npeut la brûler. Le choc blesse aussi gravement le lanceur."
    it: "Il Pokémon si ricopre di fuoco e carica il bersaglio,\nma subisce seri danni. Può anche scottare il bersaglio."
    de: "Anwender hüllt sich in Flammen und stürmt auf das\nZiel zu, das dadurch eventuell Verbrennungen\nerleidet. Anwender nimmt selbst großen Schaden."
    es: "El usuario se cubre de llamas y carga contra el objetivo,\naunque se hiere seriamente a sí mismo. Puede causar\nquemaduras."
    ko: "불꽃을 두르고 돌진한다.\n자신도 상당한 데미지를 입는다.\n화상 상태로 만들 때가 있다."
    zh_simp: "让火焰覆盖全身猛撞向对手。\n自己也会受到不小的伤害。\n有时会让对手陷入灼伤状态。"
    zh_trad: "將火焰圍繞全身後猛撞對手。\n自己也會受到不小的傷害。\n有時會讓對手陷入灼傷狀態。"
flash:
  names:
    jp_kana: フラッシュ
    jp_kanji: フラッシュ
    en: Flash
    fr: Flash
    it: Flash
    de: Blitz
    es: Destello
    ko: 플래시
    zh_simp: 闪光
    zh_trad: 閃光
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
flash_cannon:
  names:
    jp_kana: ラスターカノン
    jp_kanji: ラスターカノン
    en: Flash Cannon
    fr: Luminocanon
    it: Cannonflash
    de: Lichtkanone
    es: Foco Resplandor
    ko: 러스터캐논
    zh_simp: 加农光炮
    zh_trad: 加農光炮
  descriptions:
    jp_kana: "体の　光を　一点に　集めて\n力を　放つ。\n相手の　特防を　さげることが　ある。"
    jp_kanji: "体の　光を　一点に　集めて\n力を　放つ。\n相手の　特防を　さげることが　ある。"
    en: "The user gathers all its light energy and releases it at\nonce. This may also lower the target’s Sp. Def stat."
    fr: "Le lanceur concentre son énergie lumineuse\net la fait exploser, ce qui peut aussi baisser\nla Défense Spéciale de la cible."
    it: "Il Pokémon attacca raccogliendo e rilasciando energia\nluminosa. Può ridurre la Difesa Speciale del bersaglio."
    de: "Anwender sammelt Lichtenergie und feuert sie auf\neinmal ab. Senkt eventuell Spezial-Verteidigung des\nZieles."
    es: "El usuario concentra toda la luz del cuerpo y la libera.\nPuede reducir la Defensa Especial del objetivo."
    ko: "몸의 빛을 한곳에 모아서\n힘을 방출한다. 상대의 특수방어를\n떨어뜨릴 때가 있다."
    zh_simp: "将身体的光芒\n聚集在一点释放出去。\n有时会降低对手的特防。"
    zh_trad: "將身體的光芒\n聚集在一個點後釋放出去。\n有時會降低對手的特防。"
flatter:
  names:
    jp_kana: おだてる
    jp_kanji: おだてる
    en: Flatter
    fr: Flatterie
    it: Adulazione
    de: Schmeichler
    es: Camelo
    ko: 부추기기
    zh_simp: 吹捧
    zh_trad: 吹捧
  descriptions:
    jp_kana: "相手を　おだてて　混乱させる。\n同時に　相手の　特攻も\nあげてしまう。"
    jp_kanji: "相手を　おだてて　混乱させる。\n同時に　相手の　特攻も\nあげてしまう。"
    en: "Flattery is used to confuse the target. However, this also\nboosts the target’s Sp. Atk stat."
    fr: "Rend la cible confuse, mais augmente\nson Attaque Spéciale."
    it: "Il Pokémon adula il bersaglio e lo confonde.\nAllo stesso tempo ne aumenta l’Attacco Speciale."
    de: "Schmeichelt dem Ziel, um es zu verwirren.\nErhöht dessen Spezial-Angriff."
    es: "Halaga al objetivo y lo confunde, pero también aumenta\nsu Ataque Especial."
    ko: "상대를 부추겨서 혼란시킨다.\n동시에 상대의 특수공격도\n올라가 버린다."
    zh_simp: "吹捧对手，使其混乱。\n同时还会提高对手的特攻。"
    zh_trad: "吹捧對手，使其混亂。\n同時還會提高對手的特攻。"
fleur_cannon:
  names:
    jp_kana: フルールカノン
    jp_kanji: フルールカノン
    en: Fleur Cannon
    fr: Canon Floral
    it: Cannonfiore
    de: Kanonenbouquet
    es: Cañón Floral
    ko: 플뢰르캐논
    zh_simp: 花朵加农炮
    zh_trad: 花朵加農炮
  descriptions:
    jp_kana: "強力な　ビームを　放ったあと\n自分の　特攻が　がくっと　さがる。"
    jp_kanji: "強力な　ビームを　放ったあと\n自分の　特攻が　がくっと　さがる。"
    en: "The user unleashes a strong beam. The recoil from this\nmove harshly lowers the user’s Sp. Atk stat."
    fr: "Envoie un rayon laser dévastateur.\nBaisse beaucoup l’Attaque Spéciale du lanceur."
    it: "Il Pokémon emette un potente raggio, ma riduce\ndi molto il suo Attacco Speciale."
    de: "Der Anwender greift das Ziel mit einem gewaltigen\nStrahl an. Sein eigener Spezial-Angriff sinkt dadurch\nstark."
    es: "El usuario emite un potente rayo, pero su Ataque\nEspecial se reduce mucho."
    ko: "강력한 빔을 발산한 후\n자신의 특수공격이 크게 떨어진다."
    zh_simp: "放出强力光束后，\n自己的特攻会大幅降低。"
    zh_trad: "放出強力光束後，\n自己的特攻會大幅降低。"
fling:
  names:
    jp_kana: なげつける
    jp_kanji: なげつける
    en: Fling
    fr: Dégommage
    it: Lancio
    de: Schleuder
    es: Lanzamiento
    ko: 내던지기
    zh_simp: 投掷
    zh_trad: 投擲
  descriptions:
    jp_kana: "持たせた　道具を\n素早く　投げつけて　攻撃する。\n道具で　威力と　効果が　変わる。"
    jp_kanji: "持たせた　道具を\n素早く　投げつけて　攻撃する。\n道具で　威力と　効果が　変わる。"
    en: "The user flings its held item at the target to attack.\nThis move’s power and effects depend on the item."
    fr: "Le lanceur envoie l’objet qu’il tient sur la cible.\nLa puissance et les effets dépendent de l’objet."
    it: "Il Pokémon lancia il suo strumento addosso al bersaglio.\nLa potenza e l’effetto dipendono dallo strumento."
    de: "Anwender schleudert sein Item auf das Ziel. Stärke und\nEffekt der Attacke hängen vom Item ab."
    es: "El usuario lanza contra el objetivo el objeto que lleva.\nLa potencia del movimiento y su efecto varían según el\nobjeto."
    ko: "지니게 한 도구를\n재빠르게 내던져서 공격한다.\n도구에 따라 위력과 효과가 바뀐다."
    zh_simp: "快速投掷携带的道具进行攻击。\n根据道具不同，\n威力和效果会改变。"
    zh_trad: "快速投擲攜帶的道具進行攻擊。\n招式威力和效果會隨著\n道具不同而改變。"
flip_turn:
  names:
    jp_kana: クイックターン
    jp_kanji: クイックターン
    en: Flip Turn
    fr: Eau Revoir
    it: Virata
    de: Rollwende
    es: Viraje
    ko: 퀵턴
    zh_simp: 快速折返
    zh_trad: 快速折返
  descriptions:
    jp_kana: "攻撃した　あと\nものすごい　スピードで　戻ってきて\n控えの　ポケモンと　入れ替わる。"
    jp_kanji: "攻撃した　あと\nものすごい　スピードで　戻ってきて\n控えの　ポケモンと　入れ替わる。"
    en: "After making its attack, the user rushes back to switch\nplaces with a party Pokémon in waiting."
    fr: "Après son attaque, le lanceur revient à toute vitesse\net change de place avec un Pokémon de l’équipe prêt\nà combattre."
    it: "Il Pokémon fa marcia indietro per farsi sostituire\nsubito dopo aver sferrato l’attacco."
    de: "Nach der Attacke eilt der Anwender zurück und\ntauscht den Platz mit einem anderen Pokémon."
    es: "Tras atacar, el usuario da paso a toda prisa a otro\nPokémon del equipo."
    ko: "공격한 뒤\n굉장한 스피드로 돌아와서\n교대 포켓몬과 교체한다."
    zh_simp: "在攻击之后急速返回，\n和后备宝可梦进行替换。"
    zh_trad: "攻擊後迅速返回，\n和後備寶可夢進行替換。"
floaty_fall:
  names:
    jp_kana: ふわふわフォール
    jp_kanji: ふわふわフォール
    en: Floaty Fall
    fr: Pika-Piqué
    it: Piombaflap
    de: Schwebesturz
    es: Pikapicado
    ko: 둥실둥실폴
    zh_simp: 飘飘坠落
    zh_trad: 飄飄墜落
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
floral_healing:
  names:
    jp_kana: フラワーヒール
    jp_kanji: フラワーヒール
    en: Floral Healing
    fr: Soin Floral
    it: Cura Floreale
    de: Florakur
    es: Cura Floral
    ko: 플라워힐
    zh_simp: 花疗
    zh_trad: 花療
  descriptions:
    jp_kana: "最大ＨＰの　半分\n相手の　ＨＰを　回復する。\nグラスフィールドの時　効果が　あがる。"
    jp_kanji: "最大ＨＰの　半分\n相手の　ＨＰを　回復する。\nグラスフィールドの時　効果が　あがる。"
    en: "The user restores the target’s HP by up to half its\nmax HP. More HP is restored when the ground is\nGrassy Terrain."
    fr: "Rend la moitié de ses PV max à la cible.\nPlus efficace sur un champ herbu."
    it: "Il Pokémon fa recuperare metà dei PS massimi al\nbersaglio. Questa mossa è più efficace quando\nil terreno di lotta è nello stato di Campo Erboso."
    de: "KP des Zieles werden um 50 % der maximalen KP\naufgefüllt. Die Wirkung steigt, wenn der Untergrund\nin ein Grasfeld verwandelt wurde."
    es: "Restaura la mitad de los PS máximos del objetivo.\nEs más efectivo cuando se usa en conjunción con\nCampo de Hierba."
    ko: "최대 HP의 절반만큼\n상대의 HP를 회복한다.\n그래스필드일 때 효과가 올라간다."
    zh_simp: "回复对手最大ＨＰ的一半。\n在青草场地时，效果会提高。"
    zh_trad: "回復對手最大ＨＰ的一半。\n在青草場地時，效果會提高。"
flower_shield:
  names:
    jp_kana: フラワーガード
    jp_kanji: フラワーガード
    en: Flower Shield
    fr: Garde Florale
    it: Fiordifesa
    de: Floraschutz
    es: Defensa Floral
    ko: 플라워가드
    zh_simp: 鲜花防守
    zh_trad: 鮮花防守
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
flower_trick:
  names:
    jp_kana: トリックフラワー
    jp_kanji: トリックフラワー
    en: Flower Trick
    fr: Magie Florale
    it: Prestigiafiore
    de: Blumentrick
    es: Truco Floral
    ko: 트릭플라워
    zh_simp: 千变万花
    zh_trad: 千變萬花
  descriptions:
    jp_kana: "細工がある　花たばを\n相手に　投げて　攻撃する。\n必ず　命中して　急所にも　当たる。"
    jp_kanji: "細工がある　花たばを\n相手に　投げて　攻撃する。\n必ず　命中して　急所にも　当たる。"
    en: "The user throws a rigged bouquet of flowers at the\ntarget. This attack never misses and always lands a\ncritical hit."
    fr: "Le lanceur attaque en jetant un bouquet de fleurs piégé\nsur la cible. N’échoue jamais et inflige toujours un coup\ncritique."
    it: "Il Pokémon attacca il bersaglio lanciandogli addosso\nun mazzo di fiori truccato. Questo attacco va sempre\na segno, infliggendo anche un brutto colpo."
    de: "Der Anwender greift an, indem er dem Ziel einen\nTrick-Strauß zuwirft. Diese Attacke trifft immer und\nhat zudem Volltreffergarantie."
    es: "Ataca al objetivo lanzándole un ramo de flores trucado.\nNo falla nunca y siempre asesta un golpe crítico."
    ko: "숨겨진 장치가 있는 꽃다발을\n상대에게 던져서 공격한다.\n반드시 명중하며 급소에 맞는다."
    zh_simp: "将做了手脚的花束\n扔向对手进行攻击。\n必定会命中，且会击中要害。"
    zh_trad: "將動過手腳的花束\n投向對手進行攻擊。\n必定會命中並擊中要害。"
fly:
  names:
    jp_kana: そらをとぶ
    jp_kanji: そらをとぶ
    en: Fly
    fr: Vol
    it: Volo
    de: Fliegen
    es: Vuelo
    ko: 공중날기
    zh_simp: 飞翔
    zh_trad: 飛翔
  descriptions:
    jp_kana: "１ターン目で　空へ　飛び\n２ターン目に　相手を　攻撃する。"
    jp_kanji: "１ターン目で　空へ　飛び\n２ターン目に　相手を　攻撃する。"
    en: "The user flies up into the sky on the first turn, then\nattacks on the next turn."
    fr: Le lanceur s’envole au premier tour et frappe au second.
    it: "Il Pokémon si alza in volo per attaccare al turno\nseguente."
    de: Steigt in Runde 1 empor und trifft das Ziel in Runde 2.
    es: "El usuario vuela en el primer turno y ataca en el\nsegundo."
    ko: "1턴째에 하늘을 날아\n2턴째에 상대를 공격한다."
    zh_simp: "第１回合飞上天空，\n第２回合攻击对手。"
    zh_trad: "使用後的第１回合飛上天空，\n並於第２回合攻擊對手。"
flying_press:
  names:
    jp_kana: フライングプレス
    jp_kanji: フライングプレス
    en: Flying Press
    fr: Flying Press
    it: Schiacciatuffo
    de: Flying Press
    es: Plancha Voladora
    ko: 플라잉프레스
    zh_simp: 飞身重压
    zh_trad: 飛身重壓
  descriptions:
    jp_kana: "空中から　相手に　ダイブする。\nこの技は　かくとうタイプと　同時に\nひこうタイプでも　ある。"
    jp_kanji: "空中から　相手に　ダイブする。\nこの技は　かくとうタイプと　同時に\nひこうタイプでも　ある。"
    en: "The user dives down onto the target from the sky.\nThis move is Fighting and Flying type simultaneously."
    fr: "Une attaque en piqué depuis le ciel, à la fois\nde type Combat et de type Vol."
    it: "Il Pokémon si tuffa sul bersaglio dall’alto. È una\nmossa di tipo Lotta e Volante allo stesso tempo."
    de: "Der Anwender stürzt sich aus der Luft auf das Ziel.\nDie Attacke gehört sowohl dem Typ Kampf als auch\ndem Typ Flug an."
    es: "El usuario se lanza sobre su objetivo. Este movimiento\nes de tipo Lucha y tipo Volador al mismo tiempo."
    ko: "공중에서 상대에게 다이브한다.\n이 기술은 격투타입임과 동시에\n비행타입이기도 하다."
    zh_simp: "从空中俯冲向对手。\n此招式同时带有\n格斗属性和飞行属性。"
    zh_trad: "從空中俯衝向對手進行攻擊。\n此招式同時具有\n格鬥屬性和飛行屬性。"
focus_blast:
  names:
    jp_kana: きあいだま
    jp_kanji: きあいだま
    en: Focus Blast
    fr: Exploforce
    it: Focalcolpo
    de: Fokusstoß
    es: Onda Certera
    ko: 기합구슬
    zh_simp: 真气弹
    zh_trad: 真氣彈
  descriptions:
    jp_kana: "気合を　高めて\nありったけの　力を　放出する。\n相手の　特防を　さげることが　ある。"
    jp_kanji: "気合を　高めて\nありったけの　力を　放出する。\n相手の　特防を　さげることが　ある。"
    en: "The user heightens its mental focus and unleashes its\npower. This may also lower the target’s Sp. Def stat."
    fr: "Le lanceur rassemble ses forces et laisse éclater\nson pouvoir, ce qui peut aussi baisser la Défense\nSpéciale de la cible."
    it: "Il Pokémon si concentra e rilascia la sua forza.\nPuò ridurre la Difesa Speciale del bersaglio."
    de: "Anwender erhöht seinen mentalen Fokus und greift\ndann an. Senkt eventuell Spezial-Verteidigung des\nZieles."
    es: "Agudiza la concentración mental y libera su poder.\nPuede reducir la Defensa Especial del objetivo."
    ko: "기합을 높여서\n혼신의 힘을 방출한다. 상대의\n특수방어를 떨어뜨릴 때가 있다."
    zh_simp: "提高气势，\n释放出全部力量。\n有时会降低对手的特防。"
    zh_trad: "提高氣勢，\n釋放全身所有力量。\n有時會降低對手的特防。"
focus_energy:
  names:
    jp_kana: きあいだめ
    jp_kanji: きあいだめ
    en: Focus Energy
    fr: Puissance
    it: Focalenergia
    de: Energiefokus
    es: Foco Energía
    ko: 기충전
    zh_simp: 聚气
    zh_trad: 聚氣
  descriptions:
    jp_kana: "深く　息を　吸い　気合を　こめる。\n自分の　攻撃が\n急所に　当たりやすくなる。"
    jp_kanji: "深く　息を　吸い　気合を　こめる。\n自分の　攻撃が\n急所に　当たりやすくなる。"
    en: "The user takes a deep breath and focuses so that its\nfuture attacks have a heightened chance of landing\ncritical hits."
    fr: "Le lanceur prend une profonde inspiration et se\nconcentre pour augmenter son taux de critiques."
    it: "Il Pokémon fa un profondo respiro e si concentra\nper rendere più probabili i brutti colpi."
    de: "Anwender atmet ein und bündelt Kraft.\nDie Volltrefferquote steigt dadurch."
    es: "Concentra energía para aumentar las posibilidades de\nasestar un golpe crítico."
    ko: "깊게 숨을 들이마셔 기합을 넣는다.\n자신의 공격이\n급소에 맞기 쉬워진다."
    zh_simp: "深深地吸口气，集中精神。\n自己的攻击\n会变得容易击中要害。"
    zh_trad: "深呼吸後集中精神。\n讓自己的攻擊\n變得容易擊中要害。"
focus_punch:
  names:
    jp_kana: きあいパンチ
    jp_kanji: きあいパンチ
    en: Focus Punch
    fr: Mitra-Poing
    it: Centripugno
    de: Power-Punch
    es: Puño Certero
    ko: 힘껏펀치
    zh_simp: 真气拳
    zh_trad: 真氣拳
  descriptions:
    jp_kana: "精神を　高めて　パンチを　くりだす。\n技を　だすまでに\n攻撃を　受けると　失敗する。"
    jp_kanji: "精神を　高めて　パンチを　くりだす。\n技を　だすまでに\n攻撃を　受けると　失敗する。"
    en: "The user focuses its mind before launching a punch.\nThis move fails if the user is hit before using the move."
    fr: "Le lanceur se concentre avant d’attaquer.\nÉchoue s’il est touché avant d’avoir frappé."
    it: "Il Pokémon prende la mira prima di sferrare un pugno.\nFallisce se subisce un attacco prima di eseguire la mossa."
    de: "Anwender konzentriert sich, bevor er angreift. Wird er\nvorher getroffen, ist die Attacke erfolglos."
    es: "Se concentra para dar un puñetazo. Falla si se sufre un\ngolpe antes de su uso."
    ko: "정신을 집중해 펀치를 날린다.\n기술을 쓰기 전에\n공격을 받으면 실패한다."
    zh_simp: "集中精神出拳。\n在招式使出前\n若受到攻击则会失败。"
    zh_trad: "集中精神後出拳。\n若出拳前受到攻擊，\n則會失敗。"
follow_me:
  names:
    jp_kana: このゆびとまれ
    jp_kanji: このゆびとまれ
    en: Follow Me
    fr: Par Ici
    it: Sonoqui
    de: Spotlight
    es: Señuelo
    ko: 날따름
    zh_simp: 看我嘛
    zh_trad: 看我嘛
  descriptions:
    jp_kana: "自分に　注目させて\n相手からの　攻撃を\nすべて　自分に　むけさせる。"
    jp_kanji: "自分に　注目させて\n相手からの　攻撃を\nすべて　自分に　むけさせる。"
    en: "The user draws attention to itself, making all opposing\nPokémon take aim only at the user."
    fr: "Le lanceur attire l’attention des cibles présentes pour\nles forcer à n’attaquer que le lanceur."
    it: "Il Pokémon attira l’attenzione su di sé, costringendo\ngli avversari a sceglierlo sempre come bersaglio."
    de: "Zieht Aufmerksamkeit auf sich. Gegner greifen nur den\nAnwender an."
    es: "Llama la atención para centrar sobre sí todos los\nmovimientos de los rivales."
    ko: "자신에게 시선을 집중시켜\n상대로부터의 공격을\n모두 자신에게 향하게 한다."
    zh_simp: "引起对手的注意，\n将对手的攻击\n全部转移到自己身上。"
    zh_trad: "吸引對手的注意，\n將對手的攻擊\n全部轉移到自己身上。"
force_palm:
  names:
    jp_kana: はっけい
    jp_kanji: はっけい
    en: Force Palm
    fr: Forte-Paume
    it: Palmoforza
    de: Kraftwelle
    es: Palmeo
    ko: 발경
    zh_simp: 发劲
    zh_trad: 發勁
  descriptions:
    jp_kana: "相手の　体に\n衝撃波を　当てて　攻撃する。\nまひ状態に　することが　ある。"
    jp_kanji: "相手の　体に\n衝撃波を　当てて　攻撃する。\nまひ状態に　することが　ある。"
    en: "The target is attacked with a shock wave. This may also\nleave the target with paralysis."
    fr: "Une onde de choc frappe la cible, ce qui peut aussi\nla paralyser."
    it: "Il Pokémon attacca con un’onda d’urto che può anche\nparalizzare il bersaglio."
    de: "Das Ziel wird mit einer Schockwelle angegriffen,\ndie es eventuell paralysiert."
    es: "Ataca al objetivo con una onda de choque y puede\nllegar a paralizarlo."
    ko: "상대의 몸에\n충격파를 부딪쳐 공격한다.\n마비 상태로 만들 때가 있다."
    zh_simp: "向对手的身体\n发出冲击波进行攻击。\n有时会让对手陷入麻痹状态。"
    zh_trad: "向對手的身體\n發出衝擊波進行攻擊。\n有時會讓對手陷入麻痺狀態。"
foresight:
  names:
    jp_kana: みやぶる
    jp_kanji: みやぶる
    en: Foresight
    fr: Clairvoyance
    it: Preveggenza
    de: Scharfblick
    es: Profecía
    ko: 꿰뚫어보기
    zh_simp: 识破
    zh_trad: 識破
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
forests_curse:
  names:
    jp_kana: もりののろい
    jp_kanji: もりののろい
    en: Forest’s Curse
    fr: Maléfice Sylvain
    it: Boscomalocchio
    de: Waldesfluch
    es: Condena Silvana
    ko: 숲의저주
    zh_simp: 森林咒术
    zh_trad: 森林詛咒
  descriptions:
    jp_kana: "相手に　森ののろいを　かける。\nのろいを　かけられた　相手は\nタイプに　くさタイプが　追加される。"
    jp_kanji: "相手に　森ののろいを　かける。\nのろいを　かけられた　相手は\nタイプに　くさタイプが　追加される。"
    en: "The user puts a forest curse on the target. This adds\nGrass type to the target’s type."
    fr: "La cible est charmée par l’esprit de la forêt.\nLe type Plante est ajouté à ses types actuels."
    it: "Il Pokémon invoca la maledizione del bosco sul\nbersaglio, che acquisisce così anche il tipo Erba."
    de: "Der Anwender belegt das Ziel mit einem Waldesfluch,\ndurch den dieses zusätzlich den Typ Pflanze annimmt."
    es: "El objetivo es presa de la maldición del bosque, por lo\nque pasa a ser un Pokémon de tipo Planta, además de\nconservar sus tipos habituales."
    ko: "상대에게 숲의 저주를 건다.\n저주에 걸린 상대는\n타입에 풀타입이 추가된다."
    zh_simp: "向对手施加森林咒术。\n中了咒术的对手\n会被追加草属性。"
    zh_trad: "向對手施加森林詛咒。\n中了詛咒的對手\n會被追加草屬性。"
foul_play:
  names:
    jp_kana: イカサマ
    jp_kanji: イカサマ
    en: Foul Play
    fr: Tricherie
    it: Ripicca
    de: Schmarotzer
    es: Juego Sucio
    ko: 속임수
    zh_simp: 移花接木
    zh_trad: 欺詐
  descriptions:
    jp_kana: "相手の　力を　利用する。\n戦っている　相手の　攻撃が\n高いほど　ダメージが　あがる。"
    jp_kanji: "相手の　力を　利用する。\n戦っている　相手の　攻撃が\n高いほど　ダメージが　あがる。"
    en: "The user turns the target’s strength against it. The higher\nthe target’s Attack stat, the greater the damage this\nmove inflicts."
    fr: "Le lanceur utilise la force de la cible. Plus l’Attaque de\ncelle-ci est élevée, plus le lanceur inflige de dégâts."
    it: "Il Pokémon sfrutta la forza del bersaglio. Il danno\ninflitto è proporzionale all’Attacco dell’avversario."
    de: "Anwender macht sich die Kraft des Zieles zunutze.\nJe höher dessen Angriff, desto mehr Schaden richtet\ndie Attacke an."
    es: "El usuario emplea la fuerza del objetivo para atacarlo.\nCuanto mayor es el Ataque del objetivo, más daño\nprovoca."
    ko: "상대의 힘을 이용한다.\n싸우고 있는 상대의 공격이\n높을수록 데미지가 올라간다."
    zh_simp: "利用对手的力量进行攻击。\n正和自己战斗的对手，\n其攻击越高，伤害越大。"
    zh_trad: "利用對手的力量進行攻擊。\n對手的攻擊越高，\n給予對手的傷害越大。"
freeze_dry:
  names:
    jp_kana: フリーズドライ
    jp_kanji: フリーズドライ
    en: Freeze-Dry
    fr: Lyophilisation
    it: Liofilizzazione
    de: Gefriertrockner
    es: Liofilización
    ko: 프리즈드라이
    zh_simp: 冷冻干燥
    zh_trad: 冷凍乾燥
  descriptions:
    jp_kana: "相手を　急激に　冷やして\nこおり　状態に　することが　ある。\nみずタイプにも　効果バツグンになる。"
    jp_kanji: "相手を　急激に　冷やして\nこおり　状態に　することが　ある。\nみずタイプにも　効果バツグンになる。"
    en: "The user rapidly cools the target. This may also leave\nthe target frozen. This move is super effective on\nWater types."
    fr: "Le lanceur refroidit violemment la cible et peut la geler.\nSuper efficace sur les Pokémon de type Eau."
    it: "Chi la usa raffredda istantaneamente il bersaglio\ne può congelarlo. Risulta superefficace contro\ni Pokémon di tipo Acqua."
    de: "Das Ziel wird stark abgekühlt und manchmal sogar\neingefroren. Die Attacke ist sehr effektiv gegen\nWasser-Pokémon."
    es: "Enfría súbitamente al objetivo e incluso puede\ncongelarlo. Es supereficaz contra Pokémon de tipo\nAgua."
    ko: "상대를 급격히 차갑게 하여\n얼음 상태로 만들 때가 있다.\n물타입 포켓몬에게도 효과가 굉장해진다."
    zh_simp: "急剧冷冻对手，\n有时会让对手陷入冰冻状态。\n对于水属性宝可梦也是效果绝佳。"
    zh_trad: "急速冷凍對手，\n有時會讓對手陷入冰凍狀態。\n對水屬性寶可夢也是效果絕佳。"
freeze_shock:
  names:
    jp_kana: フリーズボルト
    jp_kanji: フリーズボルト
    en: Freeze Shock
    fr: Éclair Gelé
    it: Elettrogelo
    de: Frostvolt
    es: Rayo Gélido
    ko: 프리즈볼트
    zh_simp: 冰冻伏特
    zh_trad: 冰凍伏特
  descriptions:
    jp_kana: "電気を　まとった　氷の　塊で\n２ターン目に　相手を　たたきつける。\nまひ状態に　することが　ある。"
    jp_kanji: "電気を　まとった　氷の　塊で\n２ターン目に　相手を　たたきつける。\nまひ状態に　することが　ある。"
    en: "The turn after using this move, the user hits the target\nwith electrically charged ice to inflict damage. This may\nalso leave the target with paralysis."
    fr: "Le lanceur projette un bloc de glace électrifié sur\nla cible au second tour, ce qui peut aussi la paralyser."
    it: "Il Pokémon lancia al turno successivo una sfera di\nghiaccio ricoperta di elettricità. Può anche paralizzare\nil bersaglio."
    de: "Feuert in der zweiten Runde elektrisch geladene\nEisklumpen auf das Ziel ab. Paralysiert das Ziel\neventuell."
    es: "El usuario carga un bloque de hielo con electricidad en\nel primer turno y ataca con él en el segundo. Puede\nparalizar."
    ko: "전기를 두른 얼음덩어리로\n2턴째에 상대를 내리친다.\n마비 상태로 만들 때가 있다."
    zh_simp: "用覆盖着电流的冰块，\n在第２回合撞向对手。\n有时会让对手陷入麻痹状态。"
    zh_trad: "製造出帶有電流的冰塊，\n在下一回合攻擊對手。\n有時會讓對手陷入麻痺狀態。"
freezing_glare:
  names:
    jp_kana: いてつくしせん
    jp_kanji: いてつくしせん
    en: Freezing Glare
    fr: Regard Glaçant
    it: Sguardo Gelido
    de: Eisiger Blick
    es: Mirada Heladora
    ko: 얼어붙는시선
    zh_simp: 冰冷视线
    zh_trad: 冰冷視線
  descriptions:
    jp_kana: "両目から　サイコパワーを\n撃ちだして　攻撃する。\nこおり状態に　することが　ある。"
    jp_kanji: "両目から　サイコパワーを\n撃ちだして　攻撃する。\nこおり状態に　することが　ある。"
    en: "The user shoots its psychic power from its eyes to attack.\nThis may also leave the target frozen."
    fr: "Les yeux du lanceur tirent des rayons psychiques qui\nattaquent la cible et peuvent aussi la geler."
    it: "Il Pokémon attacca rilasciando energia psichica\ndagli occhi. Può congelare il bersaglio."
    de: "Der Anwender greift das Ziel mit Psycho-Kräften an,\ndie er aus seinen Augen abschießt. Das Ziel friert\neventuell ein."
    es: "A través de sus ojos emite poderes psíquicos con los\nque ataca al objetivo, al que puede llegar a congelar."
    ko: "두 눈에서 사이코 파워를\n발사해서 공격한다.\n얼음 상태로 만들 때가 있다."
    zh_simp: "从双眼发射精神力量进行攻击。\n有时会让对手陷入冰冻状态。"
    zh_trad: "從雙眼釋放出精神力量進行攻擊。\n有時會讓對手陷入冰凍狀態。"
freezy_frost:
  names:
    jp_kana: こちこちフロスト
    jp_kanji: こちこちフロスト
    en: Freezy Frost
    fr: Évo-Congélo
    it: Scricchiagelo
    de: Klirrfrost
    es: Glaceoprisma
    ko: 꽁꽁프로스트
    zh_simp: 冰冰霜冻
    zh_trad: 冰冰霜凍
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
frenzy_plant:
  names:
    jp_kana: ハードプラント
    jp_kanji: ハードプラント
    en: Frenzy Plant
    fr: Végé-Attaque
    it: Radicalbero
    de: Flora-Statue
    es: Planta Feroz
    ko: 하드플랜트
    zh_simp: 疯狂植物
    zh_trad: 瘋狂植物
  descriptions:
    jp_kana: "大きな　樹木で\n相手を　たたきつけて　攻撃する。\n次の　ターンは　動けなくなる。"
    jp_kanji: "大きな　樹木で\n相手を　たたきつけて　攻撃する。\n次の　ターンは　動けなくなる。"
    en: "The user slams the target with the roots of an enormous\ntree. The user can’t move on the next turn."
    fr: "Un violent coup de racines s’abat sur la cible.\nLe lanceur doit se reposer au tour suivant."
    it: "Il Pokémon attacca colpendo il bersaglio con un\ngroviglio di radici, ma al turno successivo non può\nmuoversi."
    de: "Mächtiger Angriff mit Ästen. Der Anwender muss eine\nRunde aussetzen."
    es: "Golpea con una enorme planta. El usuario deberá\ndescansar en el siguiente turno."
    ko: "큰 나무로\n상대를 힘껏 쳐서 공격한다.\n다음 턴은 움직일 수 없다."
    zh_simp: "用大树摔打对手进行攻击。\n下一回合自己将无法动弹。"
    zh_trad: "將大大的樹木\n甩向對手進行攻擊。\n下一回合自己將無法動彈。"
frost_breath:
  names:
    jp_kana: こおりのいぶき
    jp_kanji: こおりのいぶき
    en: Frost Breath
    fr: Souffle Glacé
    it: Alitogelido
    de: Eisesodem
    es: Vaho Gélido
    ko: 얼음숨결
    zh_simp: 冰息
    zh_trad: 冰息
  descriptions:
    jp_kana: "冷たい　息を\n相手に　吹きつけて　攻撃する。\n必ず　急所に　当たる。"
    jp_kanji: "冷たい　息を\n相手に　吹きつけて　攻撃する。\n必ず　急所に　当たる。"
    en: "The user attacks by blowing its cold breath on the target.\nThis move always lands a critical hit."
    fr: "Un souffle froid blesse la cible.\nL’effet est toujours critique."
    it: "Il Pokémon attacca investendo il bersaglio con un soffio\nd’aria gelida. Brutto colpo assicurato."
    de: "Anwender greift an, indem er dem Ziel eisigen Atem\nentgegenhaucht. Volltreffergarantie."
    es: "El usuario ataca expulsando un aliento gélido. Siempre\nasesta un golpe crítico."
    ko: "차가운 숨결을\n상대에게 내뿜어 공격한다.\n반드시 급소에 맞는다."
    zh_simp: "将冰冷的气息\n吹向对手进行攻击。\n必定会击中要害。"
    zh_trad: "將冰冷的氣息\n吹向對手進行攻擊。\n必定會擊中要害。"
frustration:
  names:
    jp_kana: やつあたり
    jp_kanji: やつあたり
    en: Frustration
    fr: Frustration
    it: Frustrazione
    de: Frustration
    es: Frustración
    ko: 화풀이
    zh_simp: 迁怒
    zh_trad: 遷怒
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
fury_attack:
  names:
    jp_kana: みだれづき
    jp_kanji: みだれづき
    en: Fury Attack
    fr: Furie
    it: Furia
    de: Furienschlag
    es: Ataque Furia
    ko: 마구찌르기
    zh_simp: 乱击
    zh_trad: 亂擊
  descriptions:
    jp_kana: "つのや　くちばしで\n相手を　つついて　攻撃する。\n２ー５回の　間　連続で　だす。"
    jp_kanji: "つのや　くちばしで\n相手を　つついて　攻撃する。\n２ー５回の　間　連続で　だす。"
    en: "The user attacks by jabbing the target with a horn,\na beak, or the like. This move hits two to five times\nin a row."
    fr: "Frappe la cible deux à cinq fois d’affilée avec\nun membre pointu tel qu’un bec ou une corne."
    it: "Il Pokémon attacca il bersaglio infilzandolo con corna\naffilate o con il becco da due a cinque volte di fila."
    de: "Spießt das Ziel zwei- bis fünfmal mit spitzem Horn\noder Schnabel auf."
    es: "Cornea o picotea al objetivo de dos a cinco veces\nseguidas."
    ko: "뿔이나 부리로\n상대를 찔러서 공격한다.\n2~5회 연속으로 쓴다."
    zh_simp: "用角或喙\n刺向对手进行攻击。\n连续攻击２～５次。"
    zh_trad: "用角或喙\n刺向對手進行攻擊。\n連續攻擊２～５次。"
fury_cutter:
  names:
    jp_kana: れんぞくぎり
    jp_kanji: れんぞくぎり
    en: Fury Cutter
    fr: Taillade
    it: Tagliofuria
    de: Zornklinge
    es: Corte Furia
    ko: 연속자르기
    zh_simp: 连斩
    zh_trad: 連斬
  descriptions:
    jp_kana: "カマや　ツメなどで　相手を\n切りつけて　攻撃する。\n連続で　当てると　威力が　あがる。"
    jp_kanji: "カマや　ツメなどで　相手を\n切りつけて　攻撃する。\n連続で　当てると　威力が　あがる。"
    en: "The user attacks by slashing the target with scythes,\nclaws, or the like. This attack becomes more powerful\nif it hits in succession."
    fr: "Un coup de faux ou de griffe dont la puissance\naugmente quand il touche plusieurs fois d’affilée."
    it: "Il Pokémon attacca il bersaglio con falci o artigli.\nSe la mossa colpisce in successione, la sua potenza\naumenta."
    de: "Eine Attacke mit Scheren oder Klauen, deren Härte bei\naufeinanderfolgenden Treffern zunimmt."
    es: "Ataque lacerante con garras, cuchillas o similares cuya\npotencia aumenta si se usa varias veces seguidas."
    ko: "낫이나 발톱 등으로 상대를\n베어 공격한다.\n연속으로 맞히면 위력이 올라간다."
    zh_simp: "用镰刀或爪子等\n切斩对手进行攻击。\n连续击中，威力就会提高。"
    zh_trad: "用鐮刀或爪子等\n斬切對手進行攻擊。\n連續命中時威力會提高。"
fury_swipes:
  names:
    jp_kana: みだれひっかき
    jp_kanji: みだれひっかき
    en: Fury Swipes
    fr: Combo-Griffe
    it: Sfuriate
    de: Kratzfurie
    es: Golpes Furia
    ko: 마구할퀴기
    zh_simp: 乱抓
    zh_trad: 亂抓
  descriptions:
    jp_kana: "ツメや　カマなどで\n相手を　ひっかいて　攻撃する。\n２ー５回の　間　連続で　だす。"
    jp_kanji: "ツメや　カマなどで\n相手を　ひっかいて　攻撃する。\n２ー５回の　間　連続で　だす。"
    en: "The user attacks by raking the target with claws, scythes,\nor the like. This move hits two to five times in a row."
    fr: "La cible est lacérée par des faux ou des griffes\nde deux à cinq fois d’affilée."
    it: "Il Pokémon attacca il bersaglio graffiandolo con artigli\no falci da due a cinque volte in rapida successione."
    de: "Beharkt das Ziel zwei- bis fünfmal mit scharfen Klauen\noder Sicheln."
    es: "Araña al objetivo con uñas, cuchillas o similares de dos\na cinco veces seguidas."
    ko: "손톱이나 낫 등으로\n상대를 할퀴어서 공격한다.\n2~5회 연속으로 쓴다."
    zh_simp: "用爪子或镰刀等\n抓对手进行攻击。\n连续攻击２～５次。"
    zh_trad: "用爪子或鐮刀等\n向對手進行攻擊。\n可連續攻擊２～５次。"
fusion_bolt:
  names:
    jp_kana: クロスサンダー
    jp_kanji: クロスサンダー
    en: Fusion Bolt
    fr: Éclair Croix
    it: Incrotuono
    de: Kreuzdonner
    es: Rayo Fusión
    ko: 크로스썬더
    zh_simp: 交错闪电
    zh_trad: 交錯閃電
  descriptions:
    jp_kana: "巨大な　雷を　たたきつける。\n巨大な　炎の　影響を受け\n技の　威力が　あがる。"
    jp_kanji: "巨大な　雷を　たたきつける。\n巨大な　炎の　影響を受け\n技の　威力が　あがる。"
    en: "The user throws down a giant lightning bolt. This\nmove’s power is boosted when influenced by an\nenormous flame."
    fr: "Le lanceur projette un orbe électrique gigantesque.\nLa puissance de la capacité augmente sous l’influence\nde Flamme Croix."
    it: "Il Pokémon lancia un fulmine enorme. Se usata in\ncombinazione con una fiamma poderosa, la potenza\ndella mossa aumenta."
    de: "Feuert einen monströsen Blitz ab. Wird die Attacke\ndurch eine gigantische Flamme modifiziert, steigt die\nStärke."
    es: "Ataca con una enorme descarga eléctrica. Aumenta\nsu potencia si es influenciada por una gigantesca\nllamarada."
    ko: "거대한 천둥을 내리친다.\n거대한 불꽃의 영향을 받아\n기술의 위력이 올라간다."
    zh_simp: "释放出巨大的闪电。\n受到巨大的火焰影响时，\n招式威力会提高。"
    zh_trad: "放出巨大的閃電攻擊對手。\n受到巨大的火焰影響時，\n招式的威力會提高。"
fusion_flare:
  names:
    jp_kana: クロスフレイム
    jp_kanji: クロスフレイム
    en: Fusion Flare
    fr: Flamme Croix
    it: Incrofiamma
    de: Kreuzflamme
    es: Llama Fusión
    ko: 크로스플레임
    zh_simp: 交错火焰
    zh_trad: 交錯火焰
  descriptions:
    jp_kana: "巨大な　炎を　たたきつける。\n巨大な　雷の　影響を受け\n技の　威力が　あがる。"
    jp_kanji: "巨大な　炎を　たたきつける。\n巨大な　雷の　影響を受け\n技の　威力が　あがる。"
    en: "The user brings down a giant flame. This move’s\npower is boosted when influenced by an enormous\nlightning bolt."
    fr: "Le lanceur projette une boule de feu gigantesque.\nLa puissance de la capacité augmente sous l’influence\nd’Éclair Croix."
    it: "Il Pokémon lancia una fiammata enorme. Se usata\nin combinazione con un tuono poderoso, la potenza\ndella mossa aumenta."
    de: "Feuert eine monströse Flamme ab. Wird die Attacke\ndurch einen gigantischen Blitz modifiziert, steigt die\nStärke."
    es: "Ataca con una llamarada gigantesca. Aumenta su\npotencia si es influenciada por una gran energía\neléctrica."
    ko: "거대한 불꽃을 내리친다.\n거대한 천둥의 영향을 받아\n기술의 위력이 올라간다."
    zh_simp: "释放出巨大的火焰。\n受到巨大的闪电影响时，\n招式威力会提高。"
    zh_trad: "放出巨大的火焰攻擊對手。\n受到巨大的閃電影響時，\n招式的威力會提高。"
future_sight:
  names:
    jp_kana: みらいよち
    jp_kanji: みらいよち
    en: Future Sight
    fr: Prescience
    it: Divinazione
    de: Seher
    es: Premonición
    ko: 미래예지
    zh_simp: 预知未来
    zh_trad: 預知未來
  descriptions:
    jp_kana: "技を　使った　２ターン後に\n相手に　念力の\n塊を　送って　攻撃する。"
    jp_kanji: "技を　使った　２ターン後に\n相手に　念力の\n塊を　送って　攻撃する。"
    en: "Two turns after this move is used, a hunk of psychic\nenergy attacks the target."
    fr: "De l’énergie psychique vient frapper la cible\ndeux tours après l’utilisation de cette capacité."
    it: "Due turni dopo l’utilizzo di questa mossa, il Pokémon\nattacca il bersaglio con energia psichica."
    de: "Zwei Runden, nachdem Seher eingesetzt wurde,\nerfolgt ein Angriff mit Psycho-Energie."
    es: "Concentra energía psíquica para golpear al objetivo dos\nturnos después."
    ko: "기술을 사용한 2턴 뒤에\n상대에게 염동력 덩어리를\n보내어 공격한다."
    zh_simp: "在使用招式２回合后，\n向对手发送一团念力进行攻击。"
    zh_trad: "使用招式的２回合後，\n向對手發送一團念力進行攻擊。"
gastro_acid:
  names:
    jp_kana: いえき
    jp_kanji: いえき
    en: Gastro Acid
    fr: Suc Digestif
    it: Gastroacido
    de: Magensäfte
    es: Bilis
    ko: 위액
    zh_simp: 胃液
    zh_trad: 胃液
  descriptions:
    jp_kana: "胃液を　相手の\n体に　吐きつける。　ついた　胃液は\n相手の　特性の　効果を　消す。"
    jp_kanji: "胃液を　相手の\n体に　吐きつける。　ついた　胃液は\n相手の　特性の　効果を　消す。"
    en: "The user hurls up its stomach acids on the target.\nThe fluid eliminates the effect of the target’s Ability."
    fr: "Le lanceur répand ses sucs digestifs sur la cible.\nLe fluide neutralise le talent de celle-ci."
    it: "Il Pokémon lancia acidi gastrici sul bersaglio e ne annulla\nl’abilità."
    de: "Anwender greift das Ziel mit eigenen Magensäften an.\nEntfernt Effekte von dessen Fähigkeit."
    es: "El usuario arroja sus jugos biliares al objetivo, lo que\nanula el efecto de la habilidad en uso."
    ko: "상대의 몸에 위액을 내뱉는다.\n달라붙은 위액은 상대의\n특성 효과를 지운다."
    zh_simp: "将胃液吐向对手的身体。\n沾上的胃液会消除\n对手的特性效果。"
    zh_trad: "將胃液吐向對手的身體。\n沾到的胃液會消除\n對手的特性效果。"
gear_grind:
  names:
    jp_kana: ギアソーサー
    jp_kanji: ギアソーサー
    en: Gear Grind
    fr: Lancécrou
    it: Ingracolpo
    de: Klikkdiskus
    es: Rueda Doble
    ko: 기어소서
    zh_simp: 齿轮飞盘
    zh_trad: 齒輪飛盤
  descriptions:
    jp_kana: "鋼鉄の　ギアを　相手に\n投げつけて　攻撃する。\n２回連続で　ダメージを　与える。"
    jp_kanji: "鋼鉄の　ギアを　相手に\n投げつけて　攻撃する。\n２回連続で　ダメージを　与える。"
    en: "The user attacks by throwing steel gears at the target\ntwice in a row."
    fr: "Le lanceur jette deux écrous d’acier qui frappent\nla cible deux fois d’affilée."
    it: "Il Pokémon attacca il bersaglio due volte di fila\nlanciandogli contro degli ingranaggi d’acciaio."
    de: "Anwender greift an, indem er stählerne Zahnräder\nauf das Ziel schleudert. Angriff erfolgt zweimal\nhintereinander."
    es: "Arroja dos engranajes de hierro sobre el objetivo.\nGolpea dos veces seguidas."
    ko: "강철의 기어를 상대에게\n던져서 공격한다.\n2회 연속으로 데미지를 준다."
    zh_simp: "向对手投掷\n钢铁齿轮进行攻击。\n连续２次给予伤害。"
    zh_trad: "向對手投擲\n鋼鐵齒輪進行攻擊。\n連續２次給予傷害。"
gear_up:
  names:
    jp_kana: アシストギア
    jp_kanji: アシストギア
    en: Gear Up
    fr: Engrenage
    it: Marciainpiù
    de: Hilfsmechanik
    es: Piñón Auxiliar
    ko: 어시스트기어
    zh_simp: 辅助齿轮
    zh_trad: 輔助齒輪
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
