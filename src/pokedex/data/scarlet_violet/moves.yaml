relic_song:
  names:
    jp_kana: いにしえのうた
    jp_kanji: いにしえのうた
    en: Relic Song
    fr: Chant Antique
    it: Cantoantico
    de: Urgesang
    es: Canto Arcaico
    ko: 옛노래
    zh_simp: 古老之歌
    zh_trad: 古老之歌
  descriptions:
    jp_kana: "いにしえのうたを　相手に　聞かせて\n心に　うったえて　攻撃する。\n眠り状態に　することが　ある。"
    jp_kanji: "いにしえのうたを　相手に　聞かせて\n心に　うったえて　攻撃する。\n眠り状態に　することが　ある。"
    en: "The user sings an ancient song and attacks by appealing\nto the hearts of the listening opposing Pokémon.\nThis may also induce sleep."
    fr: "Le lanceur attaque la cible en lui chantant une chanson\nd’un autre temps qui peut aussi l’endormir."
    it: "Il Pokémon attacca il bersaglio intonando un’antica\nmelodia che ne colpisce lo spirito. Può anche farlo\naddormentare."
    de: "Anwender greift mit Urgesang an, der gegnerische\nPokémon im tiefsten Inneren anspricht. Diese schlafen\neventuell ein."
    es: "Ataca conmoviendo al objetivo con un antiguo canto.\nPuede dormirlo."
    ko: "옛 노래를 상대에게 들려주고\n마음에 호소하여 공격한다.\n잠듦 상태로 만들 때가 있다."
    zh_simp: "让对手听古老之歌，\n打动对手的内心进行攻击。\n有时会让对手陷入睡眠状态。"
    zh_trad: "唱出古老之歌，\n打動對手的心進行攻擊。\n有時會讓對手陷入睡眠狀態。"
rest:
  names:
    jp_kana: ねむる
    jp_kanji: ねむる
    en: Rest
    fr: Repos
    it: Riposo
    de: Erholung
    es: Descanso
    ko: 잠자기
    zh_simp: 睡觉
    zh_trad: 睡覺
  descriptions:
    jp_kana: "２ターンの　間　眠り続ける。\n自分の　ＨＰと　状態異常を\nすべて　回復する。"
    jp_kanji: "２ターンの　間　眠り続ける。\n自分の　ＨＰと　状態異常を\nすべて　回復する。"
    en: "The user goes to sleep for two turns. This fully restores\nthe user’s HP and cures any status conditions."
    fr: "Le lanceur regagne tous ses PV et ses altérations de\nstatut sont soignées, puis il dort pendant deux tours."
    it: "Il Pokémon recupera tutti i PS e guarisce da tutti\ni suoi problemi di stato, ma dorme per due turni."
    de: "Anwender wird vollkommen geheilt, von allen\nStatusproblemen befreit und schläft die folgenden\nzwei Runden."
    es: "Restaura todos los PS y cura todos los problemas de\nestado del usuario, que se duerme los dos turnos\nsiguientes."
    ko: "2턴 동안 계속 잠잔다.\n자신의 HP와 상태 이상을\n모두 회복한다."
    zh_simp: "连续睡上２回合。\n回复自己的全部ＨＰ\n以及治愈所有异常状态。"
    zh_trad: "連續睡２回合。\n回復自己的全部ＨＰ\n以及治癒所有異常狀態。"
retaliate:
  names:
    jp_kana: かたきうち
    jp_kanji: かたきうち
    en: Retaliate
    fr: Vengeance
    it: Nemesi
    de: Heimzahlung
    es: Represalia
    ko: 원수갚기
    zh_simp: 报仇
    zh_trad: 報仇
  descriptions:
    jp_kana: "倒れた　味方の　かたきを　討つ。\n前の　ターンに　味方が\n倒されていると　威力が　あがる。"
    jp_kanji: "倒れた　味方の　かたきを　討つ。\n前の　ターンに　味方が\n倒されていると　威力が　あがる。"
    en: "The user takes revenge for a fainted ally. This move’s\npower is boosted if an ally fainted in the previous turn."
    fr: "Le lanceur venge un allié K.O. Si un Pokémon\nde l’équipe a été mis K.O. au tour d’avant,\nla puissance augmente."
    it: "Il Pokémon vendica un alleato messo KO.\nSe ciò è accaduto al turno precedente,\nla potenza della mossa aumenta."
    de: "Anwender nimmt Rache für einen besiegten Mitstreiter.\nWurde in der vorigen Runde ein Mitstreiter besiegt,\nsteigt die Stärke."
    es: "Venga a los aliados caídos. Si en el turno anterior\nhan derrotado a alguno, la potencia del movimiento\naumentará."
    ko: "쓰러진 같은 편의 원수를 갚는다.\n앞 턴에서 같은 편이 쓰러지면\n위력이 올라간다."
    zh_simp: "为倒下的同伴报仇。\n如果上一回合有同伴倒下，\n威力就会提高。"
    zh_trad: "為倒下的同伴報仇。\n前一回合有同伴被打倒時，\n招式的威力會提高。"
return:
