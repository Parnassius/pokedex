ceaseless_edge:
  names:
    jp_kana: ひけん・ちえなみ
    jp_kanji: ひけん・ちえなみ
    en: Ceaseless Edge
    fr: Vagues à Lames
    it: Lama Milleflutti
    de: Klingenschwall
    es: Tajo Metralla
    ko: 비검천중파
    zh_simp: 秘剑・千重涛
    zh_trad: 秘劍・千重濤
  descriptions:
    jp_kana: "貝殻の剣で　攻撃する。\nばらまかれた　貝殻の破片は　相手の\n足下に　まきびし　となって　散らばる。"
    jp_kanji: "貝殻の剣で　攻撃する。\nばらまかれた　貝殻の破片は　相手の\n足下に　まきびし　となって　散らばる。"
    en: "The user slashes its shell blade at the target. Shell\nsplinters left behind by this attack remain scattered\nunder the target as spikes."
    fr: "Le lanceur entaille la cible avec des lames de\ncoquillages. Des débris de coquillage se répandent\nsous la forme de picots aux pieds de la cible."
    it: "Il Pokémon attacca il bersaglio con la spada conchiglia.\nI frammenti di conchiglie formano una trappola di punte\nai piedi del bersaglio."
    de: "Der Anwender greift mit einer klingengleichen\nMuschelschale an und verstreut Muschelsplitter,\ndie Stacheln zu Füßen des Zieles werden."
    es: "Ataca con una espada de conchas y, al hacerlo, se\nesparcen fragmentos a modo de metralla a los pies\ndel objetivo."
    ko: "조개껍질 검으로 공격한다.\n조개껍질 파편은 압정이 되어\n상대의 발밑에 흩어진다."
    zh_simp: "用贝壳之剑进行攻击。\n散落的贝壳碎片会散落在\n对手脚下成为撒菱。"
    zh_trad: "用貝殼之劍進行攻擊。\n碎裂開的貝殼碎片會變成撒菱\n散落在對手腳下。"
celebrate:
  names:
    jp_kana: おいわい
    jp_kanji: おいわい
    en: Celebrate
    fr: Célébration
    it: Auguri
    de: Ehrentag
    es: Celebración
    ko: 축하
    zh_simp: 庆祝
    zh_trad: 慶祝
  descriptions:
    jp_kana: "ポケモンが　とっても\nハッピーな　あなたのことを\nお祝い　してくれる。"
    jp_kanji: "ポケモンが　とっても\nハッピーな　あなたのことを\nお祝い　してくれる。"
    en: The Pokémon congratulates you on your special day!
    fr: "Le Pokémon vous souhaite plein de bonnes choses\npour cet évènement spécial."
    it: Il Pokémon ti fa gli auguri nel tuo giorno speciale.
    de: Das Pokémon gratuliert dir zu deinem Geburtstag!
    es: El Pokémon te felicita en un día muy especial para ti.
    ko: "포켓몬이 매우 행복한 당신을\n축하해 준다."
    zh_simp: "宝可梦为十分\n开心的你庆祝。"
    zh_trad: "寶可夢會為了\n非常開心的你而慶祝。"
charge:
  names:
    jp_kana: じゅうでん
    jp_kanji: じゅうでん
    en: Charge
    fr: Chargeur
    it: Sottocarica
    de: Ladevorgang
    es: Carga
    ko: 충전
    zh_simp: 充电
    zh_trad: 充電
  descriptions:
    jp_kana: "じゅうでん状態に　なり　次にだす\nでんきタイプの　技の　威力を　あげる。\n自分の　特防も　あがる。"
    jp_kanji: "じゅうでん状態に　なり　次にだす\nでんきタイプの　技の　威力を　あげる。\n自分の　特防も　あがる。"
    en: "The user becomes charged, boosting the power of the\nnext Electric-type move it uses. This also boosts the\nuser’s Sp. Def stat."
    fr: "Le lanceur se charge en électricité, ce qui augmente\nla puissance de la prochaine capacité Électrik qu’il\nutilisera. Sa Défense Spéciale augmente également."
    it: "Il Pokémon si carica di elettricità e aumenta la potenza\ndella sua prossima mossa di tipo Elettro. Aumenta anche\nla propria Difesa Speciale."
    de: "Der Anwender beginnt einen Ladevorgang, was die\nStärke seiner nächsten Elektro-Attacke erhöht.\nAußerdem steigt seine Spezial-Verteidigung."
    es: "Recarga energía para potenciar su siguiente movimiento\nde tipo Eléctrico. También aumenta la Defensa Especial."
    ko: "충전 상태가 되어 다음에 사용하는\n전기타입 기술의 위력을 올린다.\n자신의 특수방어도 올라간다."
    zh_simp: "变为充电状态，提高下次\n使出的电属性的招式威力。\n自己的特防也会提高。"
    zh_trad: "變成充電狀態，提高下次使出的\n電屬性的招式威力。\n也會提高自己的特防。"
charge_beam:
  names:
    jp_kana: チャージビーム
    jp_kanji: チャージビーム
    en: Charge Beam
    fr: Rayon Chargé
    it: Raggioscossa
    de: Ladestrahl
    es: Rayo Carga
    ko: 차지빔
    zh_simp: 充电光束
    zh_trad: 充電光束
  descriptions:
    jp_kana: "電撃の　束を　相手に\n発射する。電気を　ためて　自分の\n特攻を　あげることが　ある。"
    jp_kanji: "電撃の　束を　相手に\n発射する。電気を　ためて　自分の\n特攻を　あげることが　ある。"
    en: "The user attacks the target with an electric charge.\nThe residual electricity may also boost the user’s\nSp. Atk stat."
    fr: "Le lanceur tire un rayon chargé d’électricité.\nPeut aussi augmenter son Attaque Spéciale."
    it: "Il Pokémon lancia al bersaglio un fascio di elettricità\nmolto intensa. Può anche aumentare il proprio Attacco\nSpeciale."
    de: "Ziel wird von einem Elektrostrahl getroffen. Erhöht\neventuell Spezial-Angriff des Anwenders."
    es: "Lanza un rayo eléctrico contra el objetivo. Puede\naumentar el Ataque Especial del usuario."
    ko: "전격의 다발을 상대에게\n발사한다. 전기를 모아서 자신의\n특수공격을 올릴 때가 있다."
    zh_simp: "向对手发射电击光束。\n由于蓄满电流，\n有时会提高自己的特攻。"
    zh_trad: "向對手發射電擊光束。\n有時會因電流蓄積，\n提高自己的特攻。"
charm:
  names:
    jp_kana: あまえる
    jp_kanji: あまえる
    en: Charm
    fr: Charme
    it: Fascino
    de: Charme
    es: Encanto
    ko: 애교부리기
    zh_simp: 撒娇
    zh_trad: 撒嬌
  descriptions:
    jp_kana: "かわいく　みつめて　油断を　誘い\n相手の　攻撃を　がくっと　さげる。"
    jp_kanji: "かわいく　みつめて　油断を　誘い\n相手の　攻撃を　がくっと　さげる。"
    en: "The user gazes at the target rather charmingly, making it\nless wary. This harshly lowers the target’s Attack stat."
    fr: "Le lanceur fait les yeux doux pour berner la cible\net beaucoup réduire son Attaque."
    it: "Il Pokémon ammalia il bersaglio con lo sguardo\nper renderlo meno cauto. Ne riduce di molto l’Attacco."
    de: Betört das Ziel und reduziert dessen Angriffs-Wert stark.
    es: Engatusa al objetivo y reduce mucho su Ataque.
    ko: "귀엽게 바라보고 방심을 유도하여\n상대의 공격을 크게 떨어뜨린다."
    zh_simp: "可爱地凝视，\n诱使对手疏忽大意，\n从而大幅降低对手的攻击。"
    zh_trad: "用撒嬌的眼神\n誘使對手疏忽大意，\n大幅降低對手的攻擊。"
chatter:
  names:
    jp_kana: おしゃべり
    jp_kanji: おしゃべり
    en: Chatter
    fr: Babil
    it: Schiamazzo
    de: Geschwätz
    es: Cháchara
    ko: 수다
    zh_simp: 喋喋不休
    zh_trad: 喋喋不休
  descriptions:
    jp_kana: "とても　うるさい　おしゃべりの\n音波で　相手を　攻撃する。\n相手を　混乱させる。"
    jp_kanji: "とても　うるさい　おしゃべりの\n音波で　相手を　攻撃する。\n相手を　混乱させる。"
    en: "The user attacks the target with sound waves of\ndeafening chatter. This also confuses the target."
    fr: "Le lanceur attaque avec les ondes sonores\nassourdissantes qu’il émet en bavardant,\nce qui rend la cible confuse."
    it: "Il Pokémon attacca creando un’onda sonora di parole\na vanvera e confonde il bersaglio."
    de: "Der Anwender labert das Ziel zu und greift es mit den\ndadurch entstehenden Schallwellen an, wodurch das\nZiel verwirrt wird."
    es: "Ataca con una onda de sonido muy ruidosa compuesta\npor palabras y confunde al objetivo."
    ko: "매우 시끄럽고 수다스러운\n음파로 상대를 공격한다.\n상대를 혼란시킨다."
    zh_simp: "用非常烦人的，\n喋喋不休的音波攻击对手。\n使对手混乱。"
    zh_trad: "用非常煩人且喋喋不休的\n音波攻擊對手。\n使對手混亂。"
chilling_water:
  names:
    jp_kana: ひやみず
    jp_kanji: ひやみず
    en: Chilling Water
    fr: Douche Froide
    it: Doccia Fredda
    de: Kalte Dusche
    es: Agua Fría
    ko: 찬물끼얹기
    zh_simp: 泼冷水
    zh_trad: 潑冷水
  descriptions:
    jp_kana: "相手の　元気を　失わせるくらい\n冷たい水を　浴びせて　攻撃する。\n相手の　攻撃を　さげる。"
    jp_kanji: "相手の　元気を　失わせるくらい\n冷たい水を　浴びせて　攻撃する。\n相手の　攻撃を　さげる。"
    en: "The user attacks the target by showering it with water\nthat’s so cold it saps the target’s power. This also lowers\nthe target’s Attack stat."
    fr: "Le lanceur attaque la cible en l’arrosant d’une eau\nsi froide qu’elle détériore son esprit combatif.\nBaisse l’Attaque de la cible."
    it: "Il Pokémon attacca il bersaglio con una doccia d’acqua\ntalmente fredda da farlo demoralizzare, riducendone\nl’Attacco."
    de: "Der Anwender greift an, indem er das Ziel mit eiskaltem\nWasser überschüttet. Das raubt dem Ziel seinen\nKampfgeist und senkt so seinen Angriff."
    es: "Ataca al objetivo rociándolo con un agua gélida y\ndesalentadora que reduce su Ataque."
    ko: "상대의 기운이 빠질 정도로\n차가운 물을 끼얹어서 공격한다.\n상대의 공격을 떨어뜨린다."
    zh_simp: "泼洒冰冷得足以让对手\n失去活力的水进行攻击。\n会降低对手的攻击。"
    zh_trad: "潑灑冰冷到足以讓對手\n失去活力的水進行攻擊。\n可降低對手的攻擊。"
chilly_reception:
  names:
    jp_kana: さむいギャグ
    jp_kanji: さむいギャグ
    en: Chilly Reception
    fr: Neigeux de Mots
    it: Freddura
    de: Eisige Stimmung
    es: Fría Acogida
    ko: 썰렁개그
    zh_simp: 冷笑话
    zh_trad: 冷笑話
  descriptions:
    jp_kana: "場を　凍らせる　ギャグを　言い残し\n控えの　ポケモンと　入れ替わる。\n５ターンの　間　ゆきを　降らす。"
    jp_kanji: "場を　凍らせる　ギャグを　言い残し\n控えの　ポケモンと　入れ替わる。\n５ターンの　間　ゆきを　降らす。"
    en: "The user tells a chillingly bad joke before switching\nplaces with a party Pokémon in waiting. This summons a\nsnowstorm lasting five turns."
    fr: "Le lanceur fait un si mauvais jeu de mots qu’il jette un\nfroid et échange sa place avec un Pokémon de l’équipe\nprêt à combattre. La neige tombe pendant cinq tours."
    it: "Chi la usa dice una freddura che fa raggelare i presenti\nper poi farsi sostituire da un altro Pokémon della\nsquadra. Causa una nevicata che dura per cinque turni."
    de: "Der Anwender sorgt mit einem schlechten Witz für\neisige Stimmung und tauscht den Platz mit einem\nanderen Pokémon. Erzeugt fünf Runden lang Schnee."
    es: "El usuario se cambia por otro Pokémon del equipo,\npero antes cuenta un chiste que tiene una acogida tan\nfría que hace que nieve durante cinco turnos."
    ko: "자리를 얼어붙게 만드는 개그를 하고\n교대 포켓몬과 교체한다.\n5턴 동안 눈을 내리게 한다."
    zh_simp: "留下冷场的冷笑话后，\n和后备宝可梦进行替换。\n在５回合内会下雪。"
    zh_trad: "留下使場面凍結的笑話後，\n和後備寶可夢進行替換。\n在５回合內會下雪。"
chip_away:
  names:
    jp_kana: なしくずし
    jp_kanji: なしくずし
    en: Chip Away
    fr: Attrition
    it: Insidia
    de: Zermürben
    es: Guardia Baja
    ko: 야금야금
    zh_simp: 逐步击破
    zh_trad: 逐步擊破
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
chloroblast:
  names:
    jp_kana: クロロブラスト
    jp_kanji: クロロブラスト
    en: Chloroblast
    fr: Herblast
    it: Clorofillaser
    de: Chlorostrahl
    es: Clorofiláser
    ko: 클로로블라스트
    zh_simp: 叶绿爆震
    zh_trad: 葉綠爆震
  descriptions:
    jp_kana: "自身の　葉緑素を　集約し\n放出して　攻撃する。\n自分も　ダメージを　受けてしまう。"
    jp_kanji: "自身の　葉緑素を　集約し\n放出して　攻撃する。\n自分も　ダメージを　受けてしまう。"
    en: "The user launches its amassed chlorophyll to inflict\ndamage on the target. This also damages the user."
    fr: "Le lanceur tire un concentré de sa propre chlorophylle\nsur la cible, ce qui le blesse également."
    it: "Il Pokémon attacca concentrando la clorofilla nel proprio\ncorpo per poi lanciarla, ma subisce danni."
    de: "Der Anwender greift mit einer hohen Konzentration\nseines Chlorophylls an, wobei er selbst Schaden erleidet."
    es: "El usuario concentra clorofila y la dispara en forma de\nrayo, pero también se hiere a sí mismo."
    ko: "엽록소를 모은 뒤\n발사하여 공격한다.\n자신도 데미지를 입는다."
    zh_simp: "将自己的叶绿素凝聚起来后\n放出去进行攻击。\n自己也会受到伤害，"
    zh_trad: "將自身的葉綠素凝聚起來後\n放出去進行攻擊。\n自己也會受到傷害。"
circle_throw:
  names:
    jp_kana: ともえなげ
    jp_kanji: ともえなげ
    en: Circle Throw
    fr: Projection
    it: Ribaltiro
    de: Überkopfwurf
    es: Llave Giro
    ko: 배대뒤치기
    zh_simp: 巴投
    zh_trad: 巴投
  descriptions:
    jp_kana: "相手を　投げとばして\n控えの　ポケモンを　ひきずりだす。\n野生の　場合は　戦闘が　終わる。"
    jp_kanji: "相手を　投げとばして\n控えの　ポケモンを　ひきずりだす。\n野生の　場合は　戦闘が　終わる。"
    en: "The target is thrown, and a different Pokémon is\ndragged out. In the wild, this ends a battle against\na single Pokémon."
    fr: "Le lanceur fait une projection sur un Pokémon ennemi\net le remplace par un autre. Lors d’un combat contre\nun Pokémon sauvage seul, cela met fin au combat."
    it: "Il Pokémon scaraventa via il bersaglio, costringendolo\na lasciare il posto a un altro. Mette fine alle lotte contro\nsingoli Pokémon selvatici."
    de: "Schleudert das Ziel davon und bewirkt damit, dass ein\nanderes Pokémon eingewechselt wird. Beendet Kämpfe\ngegen wilde Pokémon."
    es: "Lanza por los aires al objetivo y hace que salga otro\nPokémon. Si es uno salvaje, acaba el combate."
    ko: "상대를 내던져서\n교대할 포켓몬을 끌어낸다.\n야생의 경우에는 배틀이 끝난다."
    zh_simp: "扔飞对手，强制拉后备宝可梦上场。\n如果对手为野生宝可梦，\n战斗将直接结束。"
    zh_trad: "摔飛對手，\n強制讓後備寶可夢上場。\n對手為野生寶可夢時，戰鬥將直接結束。"
clamp:
  names:
    jp_kana: からではさむ
    jp_kanji: からではさむ
    en: Clamp
    fr: Claquoir
    it: Tenaglia
    de: Schnapper
    es: Tenaza
    ko: 껍질끼우기
    zh_simp: 贝壳夹击
    zh_trad: 貝殼夾擊
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
