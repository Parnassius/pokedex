    jp_kana: まほうのこな
    jp_kanji: まほうのこな
    en: Magic Powder
    fr: Poudre Magique
    it: Magipolvere
    de: Magiepuder
    es: Polvo Mágico
    ko: 마법가루
    zh_simp: 魔法粉
    zh_trad: 魔法粉
  descriptions:
    jp_kana: "まほうのこなを　浴びせて\n相手を　エスパータイプに　変化させる。"
    jp_kanji: "まほうのこなを　浴びせて\n相手を　エスパータイプに　変化させる。"
    en: "The user scatters a cloud of magic powder that changes\nthe target’s type to Psychic."
    fr: "Le lanceur recouvre sa cible d’une poudre magique\nqui change son type en Psy."
    it: "Il Pokémon getta addosso al bersaglio una polvere\nmagica che lo rende di tipo Psico."
    de: "Das Ziel wird mit magischem Puder bestreut und\nnimmt den Typ Psycho an."
    es: "Cubre al objetivo con unos polvos mágicos que le\nhacen adquirir el tipo Psíquico."
    ko: "마법가루를 날려서\n상대를 에스퍼타입으로 바꾼다."
    zh_simp: "向对手喷洒魔法粉，\n使对手变为超能力属性。"
    zh_trad: "撒出魔法粉末，\n使對手變為超能力屬性。"
magic_room:
  names:
    jp_kana: マジックルーム
    jp_kanji: マジックルーム
    en: Magic Room
    fr: Zone Magique
    it: Magicozona
    de: Magieraum
    es: Zona Mágica
    ko: 매직룸
    zh_simp: 魔法空间
    zh_trad: 魔法空間
  descriptions:
    jp_kana: "まか不思議な　空間を　つくる。\n５ターンの間　すべてのポケモンの\n道具の　効果が　なくなる。"
    jp_kanji: "まか不思議な　空間を　つくる。\n５ターンの間　すべてのポケモンの\n道具の　効果が　なくなる。"
    en: "The user creates a bizarre area in which Pokémon’s held\nitems lose their effects for five turns."
    fr: "Le lanceur crée une zone mystérieuse où les objets\ntenus par tous les Pokémon n’ont plus aucun effet\npendant cinq tours."
    it: "Chi la usa crea una dimensione in cui l’effetto\ndegli strumenti di tutti i Pokémon è annullato\nper cinque turni."
    de: "Anwender erzeugt einen bizarren Raum, in dem über\nfünf Runden die Wirkung aller von Pokémon getragenen\nItems aufgehoben ist."
    es: "Crea un espacio misterioso que inutiliza todos los\nobjetos de los Pokémon durante cinco turnos."
    ko: "이상한 공간을 만든다.\n5턴 동안 모든 포켓몬의\n도구의 효과가 사라진다."
    zh_simp: "制造出离奇的空间。\n在５回合内所有宝可梦\n携带道具的效果都会消失。"
    zh_trad: "創造出非常不可思議的空間。\n在５回合內，所有寶可夢\n攜帶的道具都會失去效果。"
magical_leaf:
  names:
    jp_kana: マジカルリーフ
    jp_kanji: マジカルリーフ
