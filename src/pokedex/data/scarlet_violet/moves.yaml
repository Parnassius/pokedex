night_daze:
  names:
    jp_kana: ナイトバースト
    jp_kanji: ナイトバースト
    en: Night Daze
    fr: Explonuit
    it: Urtoscuro
    de: Nachtflut
    es: Pulso Noche
    ko: 나이트버스트
    zh_simp: 暗黑爆破
    zh_trad: 暗黑爆破
  descriptions:
    jp_kana: "暗黒の　衝撃波を\nとばして　相手を　攻撃する。\n命中率を　さげることが　ある。"
    jp_kanji: "暗黒の　衝撃波を\nとばして　相手を　攻撃する。\n命中率を　さげることが　ある。"
    en: "The user looses a pitch-black shock wave at the target to\ninflict damage. This may also lower the target’s accuracy."
    fr: "Le lanceur attaque avec une onde de choc ténébreuse\nqui peut aussi baisser la Précision de la cible."
    it: "Il Pokémon attacca il bersaglio con un’onda d’urto\noscura che può anche ridurne la precisione."
    de: "Anwender greift das Ziel mit finsteren Schockwellen an.\nSenkt eventuell die Genauigkeit des Zieles."
    es: "Ataca al objetivo con una onda siniestra. Puede reducir\nsu Precisión."
    ko: "암흑의 충격파를\n날려서 상대를 공격한다.\n명중률을 떨어뜨릴 때가 있다."
    zh_simp: "放出黑暗的冲击波攻击对手。\n有时会降低对手的命中率。"
    zh_trad: "放出黑暗的衝擊波攻擊對手。\n有時會降低對手的命中率。"
night_shade:
  names:
    jp_kana: ナイトヘッド
    jp_kanji: ナイトヘッド
    en: Night Shade
    fr: Ombre Nocturne
    it: Ombra Notturna
    de: Nachtnebel
    es: Tinieblas
    ko: 나이트헤드
    zh_simp: 黑夜魔影
    zh_trad: 黑夜魔影
  descriptions:
    jp_kana: "恐ろしい　幻を　みせて\n自分の　レベルと　同じだけの\nダメージを　相手に　与える。"
    jp_kanji: "恐ろしい　幻を　みせて\n自分の　レベルと　同じだけの\nダメージを　相手に　与える。"
    en: "The user makes the target see a frightening mirage.\nIt inflicts damage equal to the user’s level."
    fr: "Le lanceur invoque un mirage et inflige des dégâts égaux\nau niveau du lanceur."
    it: "Il Pokémon fa apparire un orribile miraggio al bersaglio\ne infligge un danno pari al proprio livello."
    de: "Das Ziel sieht eine Illusion. Richtet Schaden gemäß dem\nLevel des Anwenders an."
    es: "Produce un espejismo ante el objetivo, que pierde\ntantos PS como nivel tenga el usuario."
    ko: "무시무시한 환상을 보게 해서\n자신의 레벨과 똑같은 만큼의\n데미지를 상대에게 준다."
    zh_simp: "显示恐怖幻影，\n只给予对手\n和自己等级相同的伤害。"
    zh_trad: "讓對手看見恐怖幻影，\n給予對手和自己等級\n相同的傷害。"
night_slash:
  names:
    jp_kana: つじぎり
    jp_kanji: つじぎり
    en: Night Slash
    fr: Tranche-Nuit
    it: Nottesferza
    de: Nachthieb
    es: Tajo Umbrío
    ko: 깜짝베기
    zh_simp: 暗袭要害
    zh_trad: 暗襲要害
  descriptions:
    jp_kana: "一瞬の　すきを　ついて\n相手を　切りはらう。\n急所に　当たりやすい。"
    jp_kanji: "一瞬の　すきを　ついて\n相手を　切りはらう。\n急所に　当たりやすい。"
    en: "The user slashes the target the instant an opportunity\narises. This move has a heightened chance of landing\na critical hit."
    fr: "Le lanceur lacère la cible à la première occasion.\nTaux de critiques élevé."
    it: "Il Pokémon colpisce il bersaglio appena si presenta\nl’occasione. Probabile brutto colpo."
    de: "Anwender greift bei der ersten Gelegenheit mit\nscharfen Klauen an. Hohe Volltrefferquote."
    es: "Ataca al objetivo a la primera oportunidad. Suele asestar\nun golpe crítico."
    ko: "순간적으로 틈을 노려\n상대를 베어 버린다.\n급소에 맞기 쉽다."
    zh_simp: "抓住瞬间的空隙\n切斩对手。\n容易击中要害。"
    zh_trad: "抓住瞬間的空隙\n斬切對手。\n容易擊中要害。"
nightmare:
  names:
    jp_kana: あくむ
    jp_kanji: あくむ
    en: Nightmare
    fr: Cauchemar
    it: Incubo
    de: Nachtmahr
    es: Pesadilla
    ko: 악몽
    zh_simp: 恶梦
    zh_trad: 惡夢
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
