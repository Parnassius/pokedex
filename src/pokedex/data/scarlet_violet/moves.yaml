    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
ice_beam:
  names:
    jp_kana: れいとうビーム
    jp_kanji: れいとうビーム
    en: Ice Beam
    fr: Laser Glace
    it: Geloraggio
    de: Eisstrahl
    es: Rayo Hielo
    ko: 냉동빔
    zh_simp: 冰冻光束
    zh_trad: 冰凍光束
  descriptions:
    jp_kana: "凍える　ビームを\n相手に　発射して　攻撃する。\nこおり状態に　することが　ある。"
    jp_kanji: "凍える　ビームを\n相手に　発射して　攻撃する。\nこおり状態に　することが　ある。"
    en: "The target is struck with an icy-cold beam of energy.\nThis may also leave the target frozen."
    fr: "Un rayon de glace frappe la cible, ce qui peut aussi\nla geler."
    it: "Il Pokémon attacca il bersaglio con un raggio di energia\ngelida che può anche congelarlo."
    de: "Das Ziel wird von einem Eisstrahl getroffen und friert\neventuell ein."
    es: Rayo de hielo que puede llegar a congelar.
    ko: "냉동빔을\n상대에게 발사하여 공격한다.\n얼음 상태로 만들 때가 있다."
    zh_simp: "向对手发射\n冰冻光束进行攻击。\n有时会让对手陷入冰冻状态。"
    zh_trad: "向對手發射\n冰凍光束進行攻擊。\n有時會讓對手陷入冰凍狀態。"
ice_burn:
  names:
    jp_kana: コールドフレア
    jp_kanji: コールドフレア
    en: Ice Burn
    fr: Feu Glacé
    it: Vampagelida
    de: Frosthauch
    es: Llama Gélida
    ko: 콜드플레어
    zh_simp: 极寒冷焰
    zh_trad: 極寒冷焰
  descriptions:
    jp_kana: "すべてを　凍らせる　激しい　冷気で\n２ターン目に　相手を　包みこむ。\nやけど状態に　することが　ある。"
    jp_kanji: "すべてを　凍らせる　激しい　冷気で\n２ターン目に　相手を　包みこむ。\nやけど状態に　することが　ある。"
    en: "The turn after using this move, the user surrounds the\ntarget with an ultracold, freezing wind to inflict damage.\nThis may also leave the target with a burn."
    fr: "Au second tour, le lanceur projette un souffle de vent\nglacial dévastateur sur la cible, ce qui peut aussi la\nbrûler."
    it: "Il Pokémon attacca il bersaglio al turno successivo e\nlo avvolge in un soffio d’aria gelida. Può anche scottarlo."
    de: "Umgibt das Ziel in der nächsten Runde mit heftigen,\nalles gefrierenden Eisböen. Fügt dem Ziel eventuell\nVerbrennungen zu."
    es: "Ataca al objetivo en el segundo turno rodeándolo de\nun aire gélido. Puede causar quemaduras."
    ko: "모든 것을 얼려 버리는 격렬한 냉기로\n2턴째에 상대를 둘러싼다.\n화상 상태로 만들 때가 있다."
    zh_simp: "用能够冻结一切的强烈冷气，\n在第２回合包裹住对手。\n有时会让对手陷入灼伤状态。"
    zh_trad: "在使用後的下一回合，\n用能夠凍結一切的強烈寒氣包圍對手。\n有時會讓對手陷入灼傷狀態。"
ice_fang:
  names:
    jp_kana: こおりのキバ
    jp_kanji: こおりのキバ
    en: Ice Fang
    fr: Crocs Givre
    it: Gelodenti
    de: Eiszahn
    es: Colmillo Hielo
    ko: 얼음엄니
    zh_simp: 冰冻牙
    zh_trad: 冰凍牙
  descriptions:
    jp_kana: "冷気を　ひめた　キバで　かみつく。\n相手を　ひるませたり\nこおり状態に　することが　ある。"
    jp_kanji: "冷気を　ひめた　キバで　かみつく。\n相手を　ひるませたり\nこおり状態に　することが　ある。"
    en: "The user bites with cold-infused fangs. This may also\nmake the target flinch or leave it frozen."
    fr: "Le lanceur utilise une morsure glaciale qui peut aussi\ngeler ou apeurer la cible."
    it: "Il Pokémon morde con denti ghiacciati. Può anche\ncongelare o far tentennare il bersaglio."
    de: "Anwender beißt mit eiskalten Reißzähnen zu.\nZiel schreckt eventuell zurück oder friert ein."
    es: "El usuario muerde al objetivo con colmillos helados y\npuede hacer que se amedrente o se congele."
    ko: "냉기를 품은 이빨로 문다.\n상대를 풀죽게 하거나\n얼음 상태로 만들 때가 있다."
    zh_simp: "用藏有冷气的牙齿咬住对手。\n有时会使对手畏缩\n或陷入冰冻状态。"
    zh_trad: "用帶有寒氣的牙齒咬住對手。\n有時會讓對手畏縮\n或陷入冰凍狀態。"
ice_hammer:
  names:
    jp_kana: アイスハンマー
    jp_kanji: アイスハンマー
    en: Ice Hammer
    fr: Marteau de Glace
    it: Martelgelo
    de: Eishammer
    es: Martillo Hielo
    ko: 아이스해머
    zh_simp: 冰锤
    zh_trad: 冰錘
  descriptions:
    jp_kana: "強くて　重い　こぶしを\nふるって　ダメージを　与える。\n自分の　素早さが　さがる。"
    jp_kanji: "強くて　重い　こぶしを\nふるって　ダメージを　与える。\n自分の　素早さが　さがる。"
    en: "The user swings its strong, heavy fist at the target to\ninflict damage. This also lowers the user’s Speed stat."
    fr: "Le lanceur donne un puissant coup de poing à la cible,\nce qui réduit la Vitesse du lanceur."
    it: "Il Pokémon infligge danni al bersaglio colpendolo con\nun pugno molto potente, ma la sua Velocità diminuisce."
    de: "Anwender trifft mit einem starken Hieb. Senkt Initiative\ndes Anwenders."
    es: "Propina un golpe devastador con el puño, pero reduce\nla Velocidad del usuario."
    ko: "강하고 무거운 주먹을\n휘둘러 데미지를 준다.\n자신의 스피드가 떨어진다."
    zh_simp: "挥舞强力而沉重的拳头，\n给予对手伤害。\n自己的速度会降低。"
    zh_trad: "揮出強力而沉重的拳頭，\n給予對手傷害。\n自己的速度會降低。"
ice_punch:
  names:
    jp_kana: れいとうパンチ
    jp_kanji: れいとうパンチ
    en: Ice Punch
    fr: Poing Glace
    it: Gelopugno
    de: Eishieb
    es: Puño Hielo
    ko: 냉동펀치
    zh_simp: 冰冻拳
    zh_trad: 冰凍拳
  descriptions:
    jp_kana: "冷気を　こめた　パンチで\n相手を　攻撃する。\nこおり状態に　することが　ある。"
    jp_kanji: "冷気を　こめた　パンチで\n相手を　攻撃する。\nこおり状態に　することが　ある。"
    en: "The target is attacked with an icy punch. This may also\nleave the target frozen."
    fr: "Un coup de poing glacé vient frapper la cible,\nce qui peut la geler."
    it: "Il Pokémon attacca il bersaglio con un pugno di ghiaccio\nche può congelarlo."
    de: Ein eisiger Schlag, der das Ziel eventuell einfriert.
    es: Puñetazo helado que puede llegar a congelar.
    ko: "냉기를 담은 펀치로\n상대를 공격한다.\n얼음 상태로 만들 때가 있다."
    zh_simp: "用充满寒气的拳头攻击对手。\n有时会让对手陷入冰冻状态。"
    zh_trad: "用帶有寒氣的拳頭\n攻擊對手。\n有時會讓對手陷入冰凍狀態。"
ice_shard:
  names:
    jp_kana: こおりのつぶて
    jp_kanji: こおりのつぶて
    en: Ice Shard
    fr: Éclats Glace
    it: Geloscheggia
    de: Eissplitter
    es: Esquirla Helada
    ko: 얼음뭉치
    zh_simp: 冰砾
    zh_trad: 冰礫
  descriptions:
    jp_kana: "氷の塊を　一瞬で　つくり\n相手に　素早く　放つ。\n必ず　先制攻撃　できる。"
    jp_kanji: "氷の塊を　一瞬で　つくり\n相手に　素早く　放つ。\n必ず　先制攻撃　できる。"
    en: "The user flash-freezes chunks of ice and hurls them at the\ntarget. This move always goes first."
    fr: "Le lanceur crée des éclats de glace qu’il envoie\nsur la cible. Frappe en priorité."
    it: "Il Pokémon crea pezzi di ghiaccio che scaglia subito\ncontro il bersaglio. Questo attacco ha priorità alta."
    de: "Erstschlag-Attacke, bei der das Ziel mit Eisklumpen\nbeworfen wird."
    es: "Crea esquirlas de hielo y las lanza a gran velocidad.\nEste movimiento tiene prioridad alta."
    ko: "얼음덩어리를 순식간에 만들어\n상대에게 빠르게 쏜다.\n반드시 선제공격을 할 수 있다."
    zh_simp: "瞬间制作冰块，\n快速地扔向对手。\n必定能够先制攻击。"
    zh_trad: "將瞬間製造出的冰塊\n快速地扔向對手。\n必定能夠發動先制攻擊。"
ice_spinner:
  names:
    jp_kana: アイススピナー
    jp_kanji: アイススピナー
    en: Ice Spinner
    fr: Cryo-Pirouette
    it: Vortighiaccio
    de: Eiskreisel
    es: Pirueta Helada
    ko: 아이스스피너
    zh_simp: 冰旋
    zh_trad: 冰旋
  descriptions:
    jp_kana: "足に　薄い氷を　まとい\nクルクルと　回りながら　ぶつかる。\n回転の　動きによって　フィールドを　壊す。"
    jp_kanji: "足に　薄い氷を　まとい\nクルクルと　回りながら　ぶつかる。\n回転の　動きによって　フィールドを　壊す。"
    en: "The user covers its feet in thin ice and twirls around,\nslamming into the target. This move’s spinning motion\nalso destroys the terrain."
    fr: "Le lanceur enveloppe ses jambes d’une fine couche\nde glace et heurte la cible en tournant sur lui-même.\nSes rotations détruisent le champ actif sur le terrain."
    it: "Il Pokémon avvolge gli arti inferiori in un sottile strato\ndi ghiaccio e si scontra con il bersaglio piroettando.\nIl movimento rotatorio distrugge il terreno di lotta."
    de: "Der Anwender hüllt seine Füße in dünnes Eis, wirbelt\nherum und greift so das Ziel an. Die Drehung zerstört\netwaige Felder."
    es: "Se recubre las extremidades con una fina capa de hielo\ny se abalanza sobre el objetivo girando sobre sí.\nDestruye el campo activo en el terreno de combate."
    ko: "발에 얇은 얼음을 두르고\n빙글빙글 회전하며 부딪친다.\n회전 운동에 의해 필드가 파괴된다."
    zh_simp: "脚上覆盖薄冰，\n旋转着撞击对手。\n通过旋转的动作破坏场地。"
    zh_trad: "在腳上包覆薄冰，\n骨碌碌地旋轉並進行撞擊。\n以旋轉的動作破壞場地。"
icicle_crash:
  names:
    jp_kana: つららおとし
    jp_kanji: つららおとし
    en: Icicle Crash
    fr: Chute Glace
    it: Scagliagelo
    de: Eiszapfhagel
    es: Chuzos
    ko: 고드름떨구기
    zh_simp: 冰柱坠击
    zh_trad: 冰柱墜擊
  descriptions:
    jp_kana: "大きな　氷柱を\n激しく　ぶつけて　攻撃する。\n相手を　ひるませることが　ある。"
    jp_kanji: "大きな　氷柱を\n激しく　ぶつけて　攻撃する。\n相手を　ひるませることが　ある。"
    en: "The user attacks by crashing large icicles onto the target.\nThis may also make the target flinch."
    fr: "Le lanceur envoie de gros blocs de glace sur la cible\npour lui infliger des dégâts, ce qui peut aussi l’apeurer."
    it: "Il Pokémon attacca violentemente il bersaglio con\ngrosse stalattiti di ghiaccio che possono anche\nfarlo tentennare."
    de: "Lässt große, schwere Eiszapfen auf das Ziel\nherabregnen. Ziel schreckt eventuell zurück."
    es: "Lanza grandes carámbanos. Puede amedrentar al\nobjetivo."
    ko: "큰 고드름으로\n격렬하게 부딪쳐서 공격한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "用大冰柱激烈地\n撞向对手进行攻击。\n有时会使对手畏缩。"
    zh_trad: "將巨大冰柱猛烈地\n砸向對手進行攻擊。\n有時會使對手畏縮。"
icicle_spear:
  names:
    jp_kana: つららばり
    jp_kanji: つららばり
    en: Icicle Spear
    fr: Stalactite
    it: Gelolancia
    de: Eisspeer
    es: Carámbano
    ko: 고드름침
    zh_simp: 冰锥
    zh_trad: 冰錐
  descriptions:
    jp_kana: "鋭い　氷柱を\n相手に　発射して　攻撃する。\n２ー５回の　間　連続で　だす。"
    jp_kanji: "鋭い　氷柱を\n相手に　発射して　攻撃する。\n２ー５回の　間　連続で　だす。"
    en: "The user attacks by launching sharp icicles at the target.\nThis move hits two to five times in a row."
    fr: "Le lanceur jette des pics de glace sur la cible,\nde deux à cinq fois de suite."
    it: "Il Pokémon attacca sparando ghiaccioli affilati contro\nil bersaglio da due a cinque volte di fila."
    de: Feuert zwei bis fünf Eiszapfen auf das Ziel.
    es: "Lanza carámbanos afilados al objetivo de dos a cinco\nveces seguidas."
    ko: "날카로운 고드름을\n상대에게 발사하여 공격한다.\n2~5회 연속으로 쓴다."
    zh_simp: "向对手发射\n锋利的冰柱进行攻击。\n连续攻击２～５次。"
    zh_trad: "向對手發射\n尖銳的冰柱進行攻擊。\n可連續攻擊２～５次。"
icy_wind:
  names:
    jp_kana: こごえるかぜ
    jp_kanji: こごえるかぜ
    en: Icy Wind
    fr: Vent Glace
    it: Ventogelato
    de: Eissturm
    es: Viento Hielo
    ko: 얼어붙은바람
    zh_simp: 冰冻之风
    zh_trad: 冰凍之風
  descriptions:
    jp_kana: "凍てつく　冷気を\n相手に　吹きつけて　攻撃する。\n相手の　素早さを　さげる。"
    jp_kanji: "凍てつく　冷気を\n相手に　吹きつけて　攻撃する。\n相手の　素早さを　さげる。"
    en: "The user attacks with a gust of chilled air. This also\nlowers opposing Pokémon’s Speed stats."
    fr: "Une bourrasque de vent froid blesse la cible et\nréduit sa Vitesse."
    it: "Il Pokémon attacca il bersaglio con una folata di aria\ngelida e ne riduce anche la Velocità."
    de: "Eis-Attacke, die gegnerischen Pokémon Schaden zufügt\nund ihren Initiative-Wert senkt."
    es: "Ataque con aire helado que reduce la Velocidad del\nobjetivo."
    ko: "차가운 냉기를\n상대에게 내뿜어 공격한다.\n상대의 스피드를 떨어뜨린다."
    zh_simp: "将结冰的冷气\n吹向对手进行攻击。\n会降低对手的速度。"
    zh_trad: "將冰冷的寒氣\n吹向對手進行攻擊。\n可降低對手的速度。"
imprison:
  names:
    jp_kana: ふういん
    jp_kanji: ふういん
    en: Imprison
    fr: Possessif
    it: Esclusiva
    de: Begrenzer
    es: Sellar
    ko: 봉인
    zh_simp: 封印
    zh_trad: 封印
  descriptions:
    jp_kana: "相手が　自分と　同じ　技を\nおぼえていたら　相手だけ\nその技を　使えなくする。"
    jp_kanji: "相手が　自分と　同じ　技を\nおぼえていたら　相手だけ\nその技を　使えなくする。"
    en: "If opposing Pokémon know any move also known by the\nuser, they are prevented from using it."
    fr: "Si la cible et le lanceur ont des capacités en commun,\nla cible ne pourra pas les utiliser."
    it: "Il Pokémon impedisce all’avversario di usare mosse\nche conoscono entrambi."
    de: "Hindert Gegner am Einsatz von Attacken, die der\nAnwender selbst auch kennt."
    es: "Impide a los rivales usar movimientos conocidos por el\nusuario durante el combate."
    ko: "상대가 자신과 같은 기술을\n배웠다면 상대만 그 기술을\n사용할 수 없게 한다."
    zh_simp: "如果对手有和自己相同的招式，\n那么只有对手无法使用该招式。"
    zh_trad: "如果對手也學會了和自己\n相同的招式，則對手將\n不能使用該招式。"
incinerate:
  names:
    jp_kana: やきつくす
    jp_kanji: やきつくす
    en: Incinerate
    fr: Calcination
    it: Bruciatutto
    de: Einäschern
    es: Calcinación
    ko: 불태우기
    zh_simp: 烧净
    zh_trad: 燒盡
  descriptions:
    jp_kana: "炎で　相手を　攻撃する。\n相手が　きのみなどを　持っているとき\n燃やして　使えなくする。"
    jp_kanji: "炎で　相手を　攻撃する。\n相手が　きのみなどを　持っているとき\n燃やして　使えなくする。"
    en: "The user attacks opposing Pokémon with fire. If a\nPokémon is holding a certain item, such as a Berry,\nthe item becomes burned up and unusable."
    fr: "Des flammes calcinent la cible. Si elle tient un objet,\nune Baie par exemple, celui-ci est brûlé et devient\ninutilisable."
    it: "Chi la usa attacca il bersaglio con una fiammata.\nIl fuoco distruggerà le bacche o alcuni tipi di\nstrumenti che i Pokémon hanno con sé."
    de: "Eine Feuer-Attacke. Trägt ein gegnerisches Pokémon\neine Beere oder ein ähnliches Item bei sich, wird dieses\nvon den Flammen verzehrt und geht verloren."
    es: "Llamas que golpean al objetivo. Si este lleva una baya\no ciertos objetos, se quemarán y ya no se podrán usar."
    ko: "불꽃으로 상대를 공격한다.\n상대가 나무열매 등을 지니고 있을 때\n불태워서 쓸 수 없게 만든다."
    zh_simp: "用火焰攻击对手。\n对手携带树果等时，\n会烧掉，使其不能使用。"
    zh_trad: "用火焰攻擊對手。\n能夠燒掉對手攜帶的樹果等道具，\n讓對手無法使用。"
infernal_parade:
  names:
    jp_kana: ひゃっきやこう
    jp_kanji: ひゃっきやこう
    en: Infernal Parade
    fr: Cortège Funèbre
    it: Corteo Spettrale
    de: Phantomparade
    es: Marcha Espectral
    ko: 백귀야행
    zh_simp: 群魔乱舞
    zh_trad: 群魔亂舞
  descriptions:
    jp_kana: "無数の火の玉で　攻撃して\nやけど状態に　することが　ある。\n相手が　状態異常だと　威力は　２倍。"
    jp_kanji: "無数の火の玉で　攻撃して\nやけど状態に　することが　ある。\n相手が　状態異常だと　威力は　２倍。"
    en: "The user attacks with myriad fireballs. This may also\nleave the target with a burn. This move’s power is\ndoubled if the target has a status condition."
    fr: "Une multitude de boules de feu frappent la cible,\nce qui peut aussi la brûler. La puissance est doublée\nsi celle-ci souffre d’une altération de statut."
    it: "Il Pokémon attacca con innumerevoli sfere di fuoco che\npossono anche scottare il bersaglio. Se questo è affetto\nda problemi di stato, la potenza della mossa raddoppia."
    de: "Angriff mit unzähligen Feuerkugeln, der dem Ziel\neventuell Verbrennungen zufügt. Doppelt so stark\ngegen Ziele mit Statusproblemen."
    es: "Lanza innumerables bolas de fuego al objetivo que\npueden causar quemaduras. La potencia del movimiento\nse duplica si este ya sufre un problema de estado."
    ko: "무수히 많은 불덩이로 공격한다.\n화상 상태로 만들 때가 있다.\n상대가 상태 이상인 경우 위력이 2배가 된다."
    zh_simp: "用无数的火球进行攻击。\n有时会让对手陷入灼伤状态。\n攻击处于异常状态的对手时，威力会变成２倍。"
    zh_trad: "用無數的火球進行攻擊，\n有時會讓對手陷入灼傷狀態。\n攻擊處於異常狀態的對手時，威力會變成２倍。"
inferno:
  names:
    jp_kana: れんごく
    jp_kanji: れんごく
    en: Inferno
    fr: Feu d’Enfer
    it: Marchiatura
    de: Inferno
    es: Infierno
    ko: 연옥
    zh_simp: 烈火深渊
    zh_trad: 煉獄
  descriptions:
    jp_kana: "激しい　炎で\n相手を　包みこみ　攻撃する。\nやけど状態に　する。"
    jp_kanji: "激しい　炎で\n相手を　包みこみ　攻撃する。\nやけど状態に　する。"
    en: "The user attacks by engulfing the target in an intense\nfire. This leaves the target with a burn."
    fr: "La cible est entourée d’un torrent de flammes ardentes\nqui la brûlent."
    it: "Il Pokémon attacca il bersaglio avvolgendolo in intense\nfiammate che causano scottature."
    de: "Anwender greift das Ziel an, indem er es mit dichten\nFlammen umhüllt. Ziel erleidet Verbrennungen."
    es: "Ataca con una gran ráfaga de fuego que causa\nquemaduras."
    ko: "격렬한 불꽃으로\n상대를 둘러싸 공격한다.\n화상 상태로 만든다."
    zh_simp: "用烈焰包裹住对手进行攻击。\n让对手陷入灼伤状态。"
    zh_trad: "用猛烈的火焰\n包圍對手進行攻擊。\n能讓對手陷入灼傷狀態。"
inferno_overdrive:physical:
  names:
    jp_kana: ダイナミックフルフレイム
    jp_kanji: ダイナミックフルフレイム
    en: Inferno Overdrive
    fr: Pyro-Explosion Cataclysmique
    it: Fiammobomba Detonante
    de: Dynamische Maxiflamme
    es: Hecatombe Pírica
    ko: 다이내믹풀플레임
    zh_simp: 超强极限爆焰弹
    zh_trad: 超強極限爆焰彈
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
inferno_overdrive:special:
  names:
    jp_kana: ダイナミックフルフレイム
    jp_kanji: ダイナミックフルフレイム
    en: Inferno Overdrive
    fr: Pyro-Explosion Cataclysmique
    it: Fiammobomba Detonante
    de: Dynamische Maxiflamme
    es: Hecatombe Pírica
    ko: 다이내믹풀플레임
    zh_simp: 超强极限爆焰弹
    zh_trad: 超強極限爆焰彈
