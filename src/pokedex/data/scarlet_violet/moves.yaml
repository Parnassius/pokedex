    jp_kana: スケッチ
    jp_kanji: スケッチ
    en: Sketch
    fr: Gribouille
    it: Schizzo
    de: Nachahmer
    es: Esquema
    ko: 스케치
    zh_simp: 写生
    zh_trad: 寫生
  descriptions:
    jp_kana: "相手が　使った　技を\n自分の　ものに　する。\n１回　使うと　スケッチは　消える。"
    jp_kanji: "相手が　使った　技を\n自分の　ものに　する。\n１回　使うと　スケッチは　消える。"
    en: "This move enables the user to permanently learn\nthe move last used by the target. Once used,\nSketch disappears."
    fr: "Le lanceur apprend la dernière capacité utilisée\npar la cible. Gribouille disparaît après utilisation."
    it: "Il Pokémon impara l’ultima mossa usata dal bersaglio.\nLa nuova mossa appresa sostituisce Schizzo."
    de: "Anwender erlernt die letzte Attacke des Zieles\ndauerhaft. Nachahmer verschwindet nach Gebrauch."
    es: "Aprende de forma permanente el último movimiento\nutilizado por el objetivo. Es de un solo uso."
    ko: "상대가 쓴 기술을\n자신의 것으로 만든다.\n한 번 사용하면 스케치는 사라진다."
    zh_simp: "将对手使用的招式\n变成自己的招式。\n使用１次后写生消失。"
    zh_trad: "將對手使用的招式變成自己的。\n寫生在使用１次之後就會消失。"
skill_swap:
  names:
    jp_kana: スキルスワップ
    jp_kanji: スキルスワップ
    en: Skill Swap
    fr: Échange
    it: Baratto
    de: Fähigkeitstausch
    es: Intercambio
    ko: 스킬스왑
    zh_simp: 特性互换
    zh_trad: 特性互換
  descriptions:
    jp_kana: "超能力で　自分の　特性と\n相手の　特性を　入れ替える。"
    jp_kanji: "超能力で　自分の　特性と\n相手の　特性を　入れ替える。"
    en: "The user employs its psychic power to exchange Abilities\nwith the target."
    fr: "Le lanceur utilise ses pouvoirs psychiques pour échanger\nson talent avec la cible."
    it: "Il Pokémon sfrutta i suoi poteri psichici per scambiare\nl’abilità con quella del bersaglio."
    de: Anwender tauscht seine Fähigkeit mit der des Zieles.
    es: "Usa el poder psíquico para intercambiar habilidades\ncon el objetivo."
    ko: "초능력으로 자신의 특성과\n상대의 특성을 바꾼다."
    zh_simp: "利用超能力互换\n自己和对手的特性。"
    zh_trad: "用超能力將自己和\n對手的特性互相交換。"
skitter_smack:
  names:
    jp_kana: はいよるいちげき
    jp_kanji: はいよるいちげき
    en: Skitter Smack
    fr: Ravage Rampant
    it: Strisciacolpo
    de: Krabbelkracher
    es: Golpe Rastrero
    ko: 엄습하는일격
    zh_simp: 爬击
    zh_trad: 爬擊
  descriptions:
    jp_kana: "背後から　はいより　攻撃する。\n相手の　特攻を　さげる。"
    jp_kanji: "背後から　はいより　攻撃する。\n相手の　特攻を　さげる。"
    en: "The user skitters behind the target to attack. This also\nlowers the target’s Sp. Atk stat."
    fr: "Le lanceur rampe derrière la cible pour l’attaquer,\nce qui baisse l’Attaque Spéciale de celle-ci."
    it: "Il Pokémon attacca il bersaglio strisciandogli alle spalle\ne riducendo il suo Attacco Speciale."
    de: "Der Anwender kriecht hinter das Ziel, greift es an und\nsenkt dabei dessen Spezial-Angriff."
    es: "Ataca al objetivo por la espalda de forma subrepticia\ny, además, reduce su Ataque Especial."
    ko: "배후에서 엄습해서 공격한다.\n상대의 특수공격을 떨어뜨린다."
    zh_simp: "从对手背后爬近后进行攻击。\n会降低对手的特攻。"
    zh_trad: "從對手背後爬近後進行攻擊。\n會降低對手的特攻。"
