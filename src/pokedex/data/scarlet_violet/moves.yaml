    jp_kanji: "大量のコインを　ぶちまけて　攻撃。\n自分の　特攻が　さがる。\n戦闘の　あとで　お金も　もらえる。"
    en: "The user attacks by throwing out a mass of coins. This\nalso lowers the user’s Sp. Atk stat. Money is earned after\nthe battle."
    fr: "Le lanceur attaque en lançant de nombreuses pièces,\nce qui baisse son Attaque Spéciale.\nPermet d’obtenir plus d’argent à la fin du combat."
