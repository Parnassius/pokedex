shed_tail:
  names:
    jp_kana: しっぽきり
    jp_kanji: しっぽきり
    en: Shed Tail
    fr: Queulonage
    it: Tagliacoda
    de: Schwanzabwurf
    es: Autotomía
    ko: 꼬리자르기
    zh_simp: 断尾
    zh_trad: 斷尾
  descriptions:
    jp_kana: "自分の　ＨＰを　削って\n分身を　だしたあと　もどってきて\n控えの　ポケモンと　入れ替わる。"
    jp_kanji: "自分の　ＨＰを　削って\n分身を　だしたあと　もどってきて\n控えの　ポケモンと　入れ替わる。"
    en: "The user creates a substitute for itself using its own HP\nbefore switching places with a party Pokémon in waiting."
    fr: "Le lanceur crée un clone en sacrifiant des PV,\npuis il revient et échange sa place avec un Pokémon\nde l’équipe prêt à combattre."
    it: "Chi la usa crea una copia di se stesso usando parte\ndei suoi PS e si fa sostituire da un altro Pokémon\ndella squadra."
    de: "Der Anwender setzt seine KP ein, um einen\nDoppelgänger zu erzeugen, und tauscht dann\nden Platz mit einem anderen Pokémon."
    es: "El usuario se cambia por otro Pokémon del equipo,\npero antes utiliza parte de los PS propios para crear\nun sustituto para su relevo."
    ko: "자신의 HP를 깎아서\n분신을 만든 뒤, 돌아와서\n교대 포켓몬과 교체한다."
    zh_simp: "削减自己的ＨＰ，\n制造分身后会返回，\n并和后备宝可梦进行替换。"
    zh_trad: "削減自己的ＨＰ，\n製造分身後返回，\n和後備寶可夢進行替換。"
sheer_cold:
  names:
    jp_kana: ぜったいれいど
    jp_kanji: ぜったいれいど
    en: Sheer Cold
    fr: Glaciation
    it: Purogelo
    de: Eiseskälte
    es: Frío Polar
    ko: 절대영도
    zh_simp: 绝对零度
    zh_trad: 絕對零度
  descriptions:
    jp_kana: "相手を　一撃で　瀕死に　する。\nこおりタイプ　以外の　ポケモンが\n使うと　当たりにくい。"
    jp_kanji: "相手を　一撃で　瀕死に　する。\nこおりタイプ　以外の　ポケモンが\n使うと　当たりにくい。"
    en: "The target faints instantly. This move is less likely to hit\nthe target if used by Pokémon other than Ice types."
    fr: "Une vague de froid glacial frappe la cible pour la mettre\nK.O. en un coup. Cela a peu de chances de réussir si\nle lanceur ne possède pas le type Glace."
    it: "Il Pokémon manda KO il bersaglio in un colpo solo.\nSe la mossa viene usata da Pokémon che non sono\ndi tipo Ghiaccio, difficilmente va a segno."
    de: "Diese Attacke führt beim Ziel sofort zum K.O. Wird sie\nvon einem Pokémon eingesetzt, das nicht dem Typ Eis\nangehört, trifft sie seltener."
    es: "Fulmina al objetivo de un solo golpe. Si lo usa un\nPokémon que no sea de tipo Hielo, es difícil que\nacierte."
    ko: "상대를 일격에 기절시킨다.\n얼음타입 이외의 포켓몬이\n사용하면 잘 맞지 않는다."
    zh_simp: "给对手一击昏厥。\n如果是冰属性以外的宝可梦使用，\n就会难以打中。"
    zh_trad: "一擊讓對手陷入瀕死。\n冰屬性以外的寶可夢使用時，\n會比較不易命中對手。"
shell_side_arm:
  names:
    jp_kana: シェルアームズ
    jp_kanji: シェルアームズ
    en: Shell Side Arm
    fr: Kokiyarme
    it: Armaguscio
    de: Muschelwaffe
    es: Moluscañón
    ko: 셸암즈
    zh_simp: 臂贝武器
    zh_trad: 臂貝武器
  descriptions:
    jp_kana: "物理か　特殊か　より多く　ダメージを\n与えられる　能力で　攻撃する。\n毒状態に　することが　ある。"
    jp_kanji: "物理か　特殊か　より多く　ダメージを\n与えられる　能力で　攻撃する。\n毒状態に　することが　ある。"
    en: "This move is either physical or special—whichever will\ninflict more damage. This may also poison the target."
    fr: "Une attaque physique ou spéciale, en fonction\nde ce qui inflige le plus de dégâts à la cible.\nPeut aussi empoisonner."
    it: "Il Pokémon esegue un attacco fisico o speciale, in base\na quale causa danni maggiori. Può anche avvelenare\nil bersaglio."
    de: "Je nachdem, was höher ausfällt, richtet diese Attacke\nentweder physischen oder Spezial-Schaden an.\nDas Ziel wird eventuell vergiftet."
    es: "El usuario lanza un ataque físico o especial en función\nde cuál inflija más daño. Puede envenenar al objetivo."
    ko: "물리와 특수 중 더 많은 데미지를\n줄 수 있는 능력으로 공격한다.\n독 상태로 만들 때가 있다."
    zh_simp: "从物理攻击和特殊攻击中选择\n可造成较多伤害的方式进行攻击。\n有时会让对手陷入中毒状态。"
    zh_trad: "用物理攻擊和特殊攻擊中\n能夠給予更大傷害的能力進行攻擊。\n有時會讓對手陷入中毒狀態。"
shell_smash:
  names:
    jp_kana: からをやぶる
    jp_kanji: からをやぶる
    en: Shell Smash
    fr: Exuviation
    it: Gettaguscio
    de: Hausbruch
    es: Rompecoraza
    ko: 껍질깨기
    zh_simp: 破壳
    zh_trad: 破殼
  descriptions:
    jp_kana: "殻を　やぶって　自分の　防御\n特防を　さげるが　攻撃　特攻\n素早さを　ぐーんと　あげる。"
    jp_kanji: "殻を　やぶって　自分の　防御\n特防を　さげるが　攻撃　特攻\n素早さを　ぐーんと　あげる。"
    en: "The user breaks its shell, which lowers its Defense and\nSp. Def stats but sharply boosts its Attack, Sp. Atk, and\nSpeed stats."
    fr: "Le lanceur brise sa carapace. Il baisse sa Défense\net sa Défense Spéciale, mais augmente beaucoup\nson Attaque, son Attaque Spéciale et sa Vitesse."
    it: "Il Pokémon si disfa del guscio. Difesa e Difesa\nSpeciale diminuiscono, ma aumentano di molto\nAttacco, Attacco Speciale e Velocità."
    de: "Anwender zerbricht seine Schale und senkt seine\nVerteidigung und Spezial-Verteidigung, aber dafür\nsteigen Angriff, Spezial-Angriff und Initiative stark."
    es: "El usuario rompe su coraza y reduce su Defensa y su\nDefensa Especial, pero aumenta mucho su Ataque,\nsu Ataque Especial y su Velocidad."
    ko: "껍질을 깨서 자신의 방어와\n특수방어를 떨어뜨리지만 공격과\n특수공격, 스피드를 크게 올린다."
    zh_simp: "打破外壳，\n降低自己的防御和特防，\n但大幅提高攻击、特攻和速度。"
    zh_trad: "破殼而出。\n自己的防禦和特防會降低，\n但能大幅提高攻擊、特攻和速度。"
shell_trap:
  names:
    jp_kana: トラップシェル
    jp_kanji: トラップシェル
    en: Shell Trap
    fr: Carapiège
    it: Gusciotrappola
    de: Panzerfalle
    es: Coraza Trampa
    ko: 트랩셸
    zh_simp: 陷阱甲壳
    zh_trad: 陷阱甲殼
  descriptions:
    jp_kana: "こうらの　トラップを　しかける。\n相手が　物理技を　出すと\n爆発して　ダメージを　与える。"
    jp_kanji: "こうらの　トラップを　しかける。\n相手が　物理技を　出すと\n爆発して　ダメージを　与える。"
    en: "The user sets a shell trap. If the user is hit by a physical\nmove, the trap will explode and inflict damage on\nopposing Pokémon."
    fr: "Le lanceur utilise sa carapace comme un appât piégé.\nSi un Pokémon l’attaque avec une capacité physique,\nla carapace explose et lui inflige des dégâts."
    it: "Il guscio del Pokémon diventa una trappola.\nSe un avversario sferra una mossa fisica,\ninnesca un’esplosione e subisce dei danni."
    de: "Der Anwender legt eine Panzerfalle. Wird er von einer\nphysischen Attacke getroffen, explodiert die Falle und\nfügt gegnerischen Pokémon Schaden zu."
    es: "El caparazón del Pokémon se convierte en una trampa.\nSi lo alcanza un ataque físico, la trampa estalla y los\nrivales sufren daño."
    ko: "껍질의 트랩을 설치한다.\n상대가 물리 기술을 쓰면\n폭발해서 데미지를 준다."
    zh_simp: "设下甲壳陷阱。\n如果对手使出物理招式，\n陷阱就会爆炸并给予对手伤害。"
    zh_trad: "設下甲殼陷阱。\n若對手使出物理招式，\n就會爆炸並給予傷害。"
shelter:
  names:
    jp_kana: たてこもる
    jp_kanji: たてこもる
    en: Shelter
    fr: Mur Fumigène
    it: Barricata
    de: Refugium
    es: Retracción
    ko: 농성
    zh_simp: 闭关
    zh_trad: 閉關
  descriptions:
    jp_kana: "皮膚を　鉄の盾のように　硬くすることで\n自分の　防御を　ぐーんと　あげる。"
    jp_kanji: "皮膚を　鉄の盾のように　硬くすることで\n自分の　防御を　ぐーんと　あげる。"
    en: "The user makes its skin as hard as an iron shield, sharply\nboosting its Defense stat."
    fr: "Rend la peau du lanceur dure comme un mur de fer,\nce qui augmente beaucoup sa Défense."
    it: "Il Pokémon indurisce la propria pelle come uno scudo\ndi ferro, aumentando di molto la Difesa."
    de: "Der Anwender macht seine Haut so hart wie Eisen und\nerhöht dadurch seine Verteidigung stark."
    es: "La piel del usuario se vuelve dura como un escudo de\nacero, lo que aumenta mucho su Defensa."
    ko: "피부를 강철 방패처럼 단단하게 만들어서\n자신의 방어를 크게 올린다."
    zh_simp: "将皮肤变得坚硬如铁盾，\n从而大幅提高自己的防御。"
    zh_trad: "讓皮膚變得像鐵盾般堅硬，\n大幅提高自己的防禦。"
shift_gear:
  names:
    jp_kana: ギアチェンジ
    jp_kanji: ギアチェンジ
    en: Shift Gear
    fr: Change-Vitesse
    it: Cambiomarcia
    de: Gangwechsel
    es: Cambio de Marcha
    ko: 기어체인지
    zh_simp: 换档
    zh_trad: 換檔
  descriptions:
    jp_kana: "歯車を　回して\n自分の　攻撃を　あげる　だけでなく\n素早さも　ぐーんと　あげる。"
    jp_kanji: "歯車を　回して\n自分の　攻撃を　あげる　だけでなく\n素早さも　ぐーんと　あげる。"
    en: "The user rotates its gears, boosting its Attack stat and\nsharply boosting its Speed stat."
    fr: "Le lanceur fait tourner ses engrenages.\nCela augmente son Attaque et augmente beaucoup\nsa Vitesse."
    it: "Facendo ruotare gli ingranaggi, il Pokémon aumenta\nnon solo il proprio Attacco, ma anche di molto\nla propria Velocità."
    de: "Durch Drehen der Zahnräder erhöht sich nicht nur\nder Angriffs-Wert, sondern auch die Initiative des\nAnwenders stark."
    es: "Al hacer girar los engranajes, el usuario aumenta su\nAtaque y aumenta mucho su Velocidad."
    ko: "톱니바퀴를 돌려서 자신의\n공격을 올리는 것뿐만 아니라\n스피드도 크게 올린다."
    zh_simp: "转动齿轮，\n不仅提高自己的攻击，\n还会大幅提高速度。"
    zh_trad: "轉動齒輪，\n提高自己的攻擊，\n同時大幅提高自己的速度。"
shock_wave:
  names:
    jp_kana: でんげきは
    jp_kanji: でんげきは
    en: Shock Wave
    fr: Onde de Choc
    it: Ondashock
    de: Schockwelle
    es: Onda Voltio
    ko: 전격파
    zh_simp: 电击波
    zh_trad: 電擊波
  descriptions:
    jp_kana: "電撃を　素早く\n相手に　浴びせる。\n攻撃は　必ず　命中する。"
    jp_kanji: "電撃を　素早く\n相手に　浴びせる。\n攻撃は　必ず　命中する。"
    en: "The user strikes the target with a quick jolt of electricity.\nThis attack never misses."
    fr: "Le lanceur envoie un choc électrique rapide à la cible.\nN’échoue jamais."
    it: "Il Pokémon colpisce il bersaglio con una scossa\ndi elettricità. Questo attacco va sempre a segno."
    de: "Angriff mit schnellem Elektro-Schlag. Ausweichen nicht\nmöglich."
    es: Ataque eléctrico muy rápido que no falla nunca.
    ko: "전격을 재빠르게\n상대에게 날린다.\n공격은 반드시 명중한다."
    zh_simp: "向对手快速发出电击。\n攻击必定会命中。"
    zh_trad: "向對手迅速放出電流。\n攻擊一定會命中。"
shore_up:
  names:
    jp_kana: すなあつめ
    jp_kanji: すなあつめ
    en: Shore Up
    fr: Amass’Sable
    it: Sabbiaccumulo
    de: Sandsammler
    es: Recogearena
    ko: 모래모으기
    zh_simp: 集沙
    zh_trad: 集沙
  descriptions:
    jp_kana: "最大ＨＰの　半分\n自分の　ＨＰを　回復する。\nすなあらしの時は　多く　回復。"
    jp_kanji: "最大ＨＰの　半分\n自分の　ＨＰを　回復する。\nすなあらしの時は　多く　回復。"
    en: "The user restores its own HP by up to half its max HP.\nIt regains more HP in a sandstorm."
    fr: "Le lanceur récupère jusqu’à la moitié de ses PV max.\nDurant une tempête de sable, il en récupère encore plus."
    it: "Il Pokémon recupera metà dei propri PS massimi.\nDurante le tempeste di sabbia ne recupera di più."
    de: "KP des Anwenders werden um 50 % der maximalen KP\naufgefüllt. Tobt ein Sandsturm, werden noch mehr KP\naufgefüllt."
    es: "Restaura la mitad de los PS máximos del usuario.\nDurante las tormentas de arena, restaura aún más PS."
    ko: "자신의 최대 HP 절반을\n회복한다. 모래바람일 때는\n많이 회복한다."
    zh_simp: "回复自己最大ＨＰ的一半。\n在沙暴中回复得更多。"
    zh_trad: "回復自己最大ＨＰ的一半。\n在沙暴中回復得更多。"
signal_beam:
  names:
    jp_kana: シグナルビーム
    jp_kanji: シグナルビーム
    en: Signal Beam
    fr: Rayon Signal
    it: Segnoraggio
    de: Ampelleuchte
    es: Rayo Señal
    ko: 시그널빔
    zh_simp: 信号光束
    zh_trad: 信號光束
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
silk_trap:
  names:
    jp_kana: スレッドトラップ
    jp_kanji: スレッドトラップ
    en: Silk Trap
    fr: Piège de Fil
    it: Telatrappola
    de: Fadenfalle
    es: Telatrampa
    ko: 스레드트랩
    zh_simp: 线阱
    zh_trad: 線阱
  descriptions:
    jp_kana: "糸の罠を　はりめぐらせる。\n相手の　攻撃を　防ぐと　同時に\n触れた　相手の　素早さを　さげる。"
    jp_kanji: "糸の罠を　はりめぐらせる。\n相手の　攻撃を　防ぐと　同時に\n触れた　相手の　素早さを　さげる。"
    en: "The user spins a silken trap, protecting itself from\ndamage while lowering the Speed stat of any attacker\nthat makes direct contact."
    fr: "Le lanceur déploie un piège de fil pour se protéger\ncontre les attaques, et si un assaillant utilise une attaque\ndirecte contre lui, la Vitesse de l’assaillant baisse."
    it: "Il Pokémon tesse una trappola di tela che lo protegge\ndagli attacchi e riduce la Velocità di chi entra in contatto\ncon lui."
    de: "Der Anwender spannt eine Falle aus Fäden und wird so\nvor Angriffen geschützt. Berührt ihn nun ein Angreifer,\nsinkt dessen Initiative."
    es: "Tiende una trampa sedosa que protege al usuario de los\nataques al tiempo que reduce la Velocidad de cualquier\nPokémon con el que entre en contacto."
    ko: "실로 함정을 만들어 둘러친다.\n상대의 공격을 막음과 동시에\n접촉한 상대의 스피드를 떨어뜨린다."
    zh_simp: "用丝设置陷阱。\n防住对方攻击的同时，\n能够降低所接触到的对手的速度。"
    zh_trad: "布下線製成的陷阱。\n防住對手攻擊的同時，\n降低接觸到的對手的速度。"
silver_wind:
  names:
    jp_kana: ぎんいろのかぜ
    jp_kanji: ぎんいろのかぜ
    en: Silver Wind
    fr: Vent Argenté
    it: Ventargenteo
    de: Silberhauch
    es: Viento Plata
    ko: 은빛바람
    zh_simp: 银色旋风
    zh_trad: 銀色旋風
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
simple_beam:
  names:
    jp_kana: シンプルビーム
    jp_kanji: シンプルビーム
    en: Simple Beam
    fr: Rayon Simple
    it: Ondisinvolta
    de: Wankelstrahl
    es: Onda Simple
    ko: 심플빔
    zh_simp: 单纯光束
    zh_trad: 單純光束
  descriptions:
    jp_kana: "なぞの　念波を　相手に　送る。\n念波を　受けとった　相手は\n特性が　たんじゅんに　なる。"
    jp_kanji: "なぞの　念波を　相手に　送る。\n念波を　受けとった　相手は\n特性が　たんじゅんに　なる。"
    en: "The user emits a mysterious psychic wave that changes\nthe target’s Ability to Simple."
    fr: "Le lanceur envoie des ondes mystérieuses à la cible,\ndont le talent est remplacé par le talent Simple."
    it: "Il Pokémon emette un misterioso raggio psichico che\ntrasforma l’abilità del bersaglio in Disinvoltura."
    de: "Bestrahlt das Ziel mit mysteriösen Energiewellen. Bei\neinem Treffer wird dessen Fähigkeit zu Wankelmut."
    es: "Lanza una onda psíquica que hace que la habilidad del\nobjetivo pase a ser Simple."
    ko: "수수께끼의 염력파를 상대에게 보낸다.\n염력파를 받은 상대는\n특성이 단순으로 바뀐다."
    zh_simp: "向对手发送谜之念波。\n接收到念波的对手，\n其特性会变为单纯。"
    zh_trad: "向對手發射謎樣的念力波。\n接收了念力波的對手，\n特性會變成單純。"
sing:
  names:
    jp_kana: うたう
    jp_kanji: うたう
    en: Sing
    fr: Berceuse
    it: Canto
    de: Gesang
    es: Canto
    ko: 노래하기
    zh_simp: 唱歌
    zh_trad: 唱歌
  descriptions:
    jp_kana: "心地好い　きれいな\n歌声を　聞かせて\n相手を　眠り状態に　する。"
    jp_kanji: "心地好い　きれいな\n歌声を　聞かせて\n相手を　眠り状態に　する。"
    en: "A soothing lullaby is sung in a beautiful voice that puts\nthe target to sleep."
    fr: Une berceuse plonge la cible dans un profond sommeil.
    it: "Dolce ninnananna, cantata da una voce suadente,\nche fa addormentare il bersaglio."
    de: Ein Lied, das das Ziel in tiefen Schlaf versetzt.
    es: "Cancioncilla que hace dormir profundamente al\nobjetivo."
    ko: "기분 좋게 예쁜\n노랫소리를 들려주어\n상대를 잠듦 상태로 만든다."
    zh_simp: "让对手听舒适、\n美妙的歌声，\n从而陷入睡眠状态。"
    zh_trad: "唱出舒服美妙的歌聲，\n讓對手陷入睡眠狀態。"
sinister_arrow_raid:
  names:
    jp_kana: シャドーアローズストライク
