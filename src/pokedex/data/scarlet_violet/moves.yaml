    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
clear_smog:
  names:
    jp_kana: クリアスモッグ
    jp_kanji: クリアスモッグ
    en: Clear Smog
    fr: Bain de Smog
    it: Pulifumo
    de: Klärsmog
    es: Niebla Clara
    ko: 클리어스모그
    zh_simp: 清除之烟
    zh_trad: 清除之煙
  descriptions:
    jp_kana: "特殊な　泥の　塊を\n相手に　投げつけて　攻撃する。\n能力変化を　もとに　もどす。"
    jp_kanji: "特殊な　泥の　塊を\n相手に　投げつけて　攻撃する。\n能力変化を　もとに　もどす。"
    en: "The user attacks the target by throwing a clump of\nspecial mud. All stat changes are eliminated."
    fr: "Le lanceur projette de la boue bizarre sur la cible.\nLes changements de stats de la cible sont annulés."
    it: "Il Pokémon attacca il bersaglio lanciandogli contro\nun ammasso di fango speciale, che annulla ogni\nmodifica alle statistiche."
    de: "Anwender greift das Ziel mit spezialgefertigtem Smog\nan. Setzt dessen Statusveränderungen zurück."
    es: "Ataca al objetivo con una singular bola de lodo que\nelimina cualquier cambio en sus características."
    ko: "특수한 진흙 덩어리를\n상대에게 내던져서 공격한다.\n능력 변화를 원래대로 되돌린다."
    zh_simp: "向对手投掷\n特殊的泥块进行攻击。\n使其能力变回原点。"
    zh_trad: "向對手投擲特殊的泥塊進行攻擊。\n能讓對手的能力變化\n回復到初始狀態。"
close_combat:
  names:
    jp_kana: インファイト
    jp_kanji: インファイト
    en: Close Combat
    fr: Close Combat
    it: Zuffa
    de: Nahkampf
    es: A Bocajarro
    ko: 인파이트
    zh_simp: 近身战
    zh_trad: 近身戰
  descriptions:
    jp_kana: "守りを　捨てて　相手の　ふところに\n突撃する。　自分の\n防御と　特防が　さがる。"
    jp_kanji: "守りを　捨てて　相手の　ふところに\n突撃する。　自分の\n防御と　特防が　さがる。"
    en: "The user fights the target up close, inflicting damage\nwithout guarding itself. This also lowers the user’s\nDefense and Sp. Def stats."
    fr: "Le lanceur ne pense plus à se protéger et frappe\nsa cible violemment au corps à corps. Cette capacité\nbaisse la Défense et la Défense Spéciale du lanceur."
    it: "Il Pokémon attacca abbassando la guardia.\nLa sua Difesa e la sua Difesa Speciale diminuiscono."
    de: "Nahkampf-Attacke ohne Rücksicht auf Verluste. Senkt\nVerteidigung und Spezial-Verteidigung des Anwenders."
    es: "Ataca ferozmente al objetivo sin protegerse, lo cual\nreduce la Defensa y la Defensa Especial del usuario."
    ko: "방어를 포기하고 상대 쪽으로\n깊숙이 돌격한다. 자신의\n방어와 특수방어가 떨어진다."
    zh_simp: "放弃守护，\n向对手的怀里突击。\n自己的防御和特防会降低。"
    zh_trad: "反守為攻，近身突擊對手。\n自己的防禦和特防會降低。"
coaching:
  names:
    jp_kana: コーチング
    jp_kanji: コーチング
    en: Coaching
    fr: Coaching
    it: Coaching
    de: Coaching
    es: Motivación
    ko: 코칭
    zh_simp: 指导
    zh_trad: 指導
  descriptions:
    jp_kana: "的確な　指導を　おこなうことで\n味方　全員の\n攻撃と　防御を　上げる。"
    jp_kanji: "的確な　指導を　おこなうことで\n味方　全員の\n攻撃と　防御を　上げる。"
    en: "The user properly coaches its ally Pokémon, boosting\ntheir Attack and Defense stats."
    fr: "Le lanceur coache ses alliés, augmentant ainsi\nleur Attaque et leur Défense."
    it: "Il Pokémon aumenta l’Attacco e la Difesa di tutti\ngli alleati dando loro indicazioni precise."
    de: "Der Anwender sorgt durch geschickte Anweisungen\ndafür, dass der Angriff und die Verteidigung seiner\nMitstreiter steigen."
    es: "El usuario imparte indicaciones precisas a sus aliados,\nque ven aumentados su Ataque y su Defensa."
    ko: "적절한 지도를 통해서\n같은 편 전원의\n공격과 방어를 올린다."
    zh_simp: "通过进行正确合理的指导，\n提高我方全员的攻击和防御。"
    zh_trad: "透過適切的指導，\n提高我方全體的攻擊和防禦。"
coil:
  names:
    jp_kana: とぐろをまく
    jp_kanji: とぐろをまく
    en: Coil
    fr: Enroulement
    it: Arrotola
    de: Einrollen
    es: Enrosque
    ko: 똬리틀기
    zh_simp: 盘蜷
    zh_trad: 盤蜷
  descriptions:
    jp_kana: "とぐろを　まいて　集中する。\n自分の　攻撃と　防御と\n命中率を　あげる。"
    jp_kanji: "とぐろを　まいて　集中する。\n自分の　攻撃と　防御と\n命中率を　あげる。"
    en: "The user coils up and concentrates. This boosts its\nAttack and Defense stats as well as its accuracy."
    fr: "Le lanceur s’enroule sur lui-même et se concentre.\nSon Attaque, sa Défense et sa Précision augmentent."
    it: "Il Pokémon si concentra aumentando Attacco,\nDifesa e precisione."
    de: "Anwender rollt sich zusammen und sammelt sich. Dabei\nwerden Angriff, Verteidigung und Genauigkeit erhöht."
    es: "El usuario se concentra, lo que le permite aumentar\nsu Ataque, su Defensa y su Precisión."
    ko: "똬리를 틀어서 집중한다.\n자신의 공격과 방어,\n명중률을 올린다."
    zh_simp: "盘蜷着集中精神。\n提高自己的攻击、防御和命中率。"
    zh_trad: "盤蜷身體集中精神。\n可提高自己的攻擊、防禦和命中率。"
collision_course:
  names:
    jp_kana: アクセルブレイク
    jp_kanji: アクセルブレイク
    en: Collision Course
    fr: Nitro Crash
    it: Turboschianto
    de: Kollisionskurs
    es: Nitrochoque
    ko: 액셀브레이크
    zh_simp: 全开猛撞
    zh_trad: 全開猛撞
  descriptions:
    jp_kana: "変形しながら　荒々しく　落下し\nいにしえの　大爆発を　引き起こす。\n弱点をつくと　さらに　威力が　増す。"
    jp_kanji: "変形しながら　荒々しく　落下し\nいにしえの　大爆発を　引き起こす。\n弱点をつくと　さらに　威力が　増す。"
    en: "The user transforms and crashes to the ground, causing\na massive prehistoric explosion. This move’s power is\nboosted more than usual if it’s a supereffective hit."
    fr: "Le lanceur change de forme et s’écrase sur la cible dans\nune explosion antique. Si la capacité est super efficace,\nsa puissance augmente encore plus que d’habitude."
    it: "Il Pokémon si schianta al suolo mentre si trasforma,\ncausando un’esplosione primordiale. La potenza della\nmossa aumenta se questa è superefficace sul bersaglio."
    de: "Der Anwender wechselt seine Form, während er sich gen\nBoden stürzt, und verursacht eine riesige Ur-Explosion.\nIst die Attacke sehr effektiv, steigt ihre Stärke noch mehr."
    es: "El usuario choca contra el suelo mientras se transforma\ny provoca una explosión primigenia. La potencia del\nmovimiento aumenta si el ataque es supereficaz."
    ko: "변형하며 거칠게 낙하한 다음\n고대의 대폭발을 일으킨다.\n약점인 상대에게는 위력이 더욱 올라간다."
    zh_simp: "边变形边凶暴地落下，\n并引发起古老的大爆炸。\n若针对到弱点，威力会进一步。"
    zh_trad: "一邊變形，一邊氣勢洶洶地落下，\n引發古代的大爆炸。\n打到弱點時威力會更為增加。"
combat_torque:
  names:
    jp_kana: ファイトアクセル
    jp_kanji: ファイトアクセル
    en: Combat Torque
    fr: Crash Musclé
    it: Turborissa
    de: Raufturbo
    es: Pugnachoque
    ko: 파이트액셀
    zh_simp: 格斗暴冲
    zh_trad: 格鬥暴衝
  descriptions:
    jp_kana: "―\n―\n―"
    jp_kanji: "―\n―\n―"
    en: "-\n-\n-"
    fr: "-\n-\n-"
    it: "―\n―\n―"
    de: ー
    es: "-\n-\n-"
    ko: "―\n―\n―"
    zh_simp: "―\n―\n―"
    zh_trad: "―\n―\n―"
comet_punch:
  names:
    jp_kana: れんぞくパンチ
    jp_kanji: れんぞくパンチ
    en: Comet Punch
    fr: Poing Comète
    it: Cometapugno
    de: Kometenhieb
    es: Puño Cometa
    ko: 연속펀치
    zh_simp: 连续拳
    zh_trad: 連續拳
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
comeuppance:
  names:
    jp_kana: ほうふく
    jp_kanji: ほうふく
    en: Comeuppance
    fr: Vindicte
    it: Ritorsione
    de: Vendetta
    es: Resarcimiento
    ko: 앙갚음
    zh_simp: 复仇
    zh_trad: 復仇
  descriptions:
    jp_kana: "技を　だす前に\n最後に　受けた　技の　ダメージを\n大きくして　だした　相手に　やり返す。"
    jp_kanji: "技を　だす前に\n最後に　受けた　技の　ダメージを\n大きくして　だした　相手に　やり返す。"
    en: "The user retaliates with much greater force against\nthe opponent that last inflicted damage on it."
    fr: "Le lanceur contre-attaque avec un coup infligeant\ndes dégâts supérieurs à ceux de la dernière capacité\nqui l’a blessé."
    it: "Il Pokémon restituisce con gli interessi i danni subiti\nall’ultimo avversario che l’ha colpito."
    de: "Der Anwender rächt sich an dem Gegner, der ihm zuletzt\nmit einer Attacke Schaden zugefügt hat, indem er ihm\nden Schaden mit erhöhter Kraft zurückzahlt."
    es: "Devuelve al rival el último ataque recibido, pero con\nmucha más fuerza."
    ko: "기술을 쓰기 전에\n마지막으로 받은 기술의 데미지를 늘려서\n기술을 쓴 상대에게 돌려준다."
    zh_simp: "使出招式前，\n将最后受到的招式的伤害\n大力返还给对手。"
    zh_trad: "將發動攻擊前\n最後受到的招式傷害放大，\n向對手進行報復。"
confide:
  names:
    jp_kana: ないしょばなし
    jp_kanji: ないしょばなし
    en: Confide
    fr: Confidence
    it: Confidenza
    de: Vertrauenssache
    es: Confidencia
    ko: 비밀이야기
    zh_simp: 密语
    zh_trad: 密語
  descriptions:
    jp_kana: "ないしょばなしを　することで　相手の\n集中力を　失わせ\n相手の　特攻を　さげる。"
    jp_kanji: "ないしょばなしを　することで　相手の\n集中力を　失わせ\n相手の　特攻を　さげる。"
    en: "The user tells the target a secret, and the target loses\nits ability to concentrate. This lowers the target’s\nSp. Atk stat."
    fr: "Le lanceur dévoile des secrets à la cible, qui perd alors\nsa concentration et voit son Attaque Spéciale diminuer."
    it: "Il Pokémon svela dei segreti al bersaglio, distraendolo\ne riducendone l’Attacco Speciale."
    de: "Der Anwender vertraut dem Ziel ein Geheimnis an\nund stört auf diese Weise dessen Konzentration.\nDer Spezial-Angriff des Zieles sinkt."
    es: "Hace que el objetivo pierda la concentración\ncontándole un secreto y reduce su Ataque Especial."
    ko: "비밀 이야기를 해서\n상대의 집중력을 잃게 하여\n특수공격을 떨어뜨린다."
    zh_simp: "和对手进行密语，\n使其失去集中力，\n从而降低对手的特攻。"
    zh_trad: "向對手低聲密語，\n使對手失去集中力，\n降低對手的特攻。"
confuse_ray:
  names:
    jp_kana: あやしいひかり
    jp_kanji: あやしいひかり
    en: Confuse Ray
    fr: Onde Folie
    it: Stordiraggio
    de: Konfusstrahl
    es: Rayo Confuso
    ko: 이상한빛
    zh_simp: 奇异之光
    zh_trad: 奇異之光
  descriptions:
    jp_kana: "怪しい　光を\n相手に　みせて　まどわせる。\n相手を　混乱させる。"
    jp_kanji: "怪しい　光を\n相手に　みせて　まどわせる。\n相手を　混乱させる。"
    en: "The target is exposed to a sinister ray that causes\nconfusion."
    fr: "Une lumière étrange qui plonge la cible dans un état\nde confusion."
    it: "Colpisce il bersaglio con un raggio funesto\nche lo confonde."
    de: Ein fieser Strahl, der das Ziel verwirrt.
    es: Rayo siniestro que confunde al objetivo.
    ko: "이상한 빛을\n상대에게 비춰 당황하게 한다.\n상대를 혼란시킨다."
    zh_simp: "显示奇怪的光，\n扰乱对手。\n使对手混乱。"
    zh_trad: "讓對手看奇怪的光線\n擾亂對手。\n使對手混亂。"
confusion:
  names:
    jp_kana: ねんりき
    jp_kanji: ねんりき
    en: Confusion
    fr: Choc Mental
    it: Confusione
    de: Konfusion
    es: Confusión
    ko: 염동력
    zh_simp: 念力
    zh_trad: 念力
  descriptions:
    jp_kana: "弱い　念力を\n相手に　送って　攻撃する。\n相手を　混乱させることが　ある。"
    jp_kanji: "弱い　念力を\n相手に　送って　攻撃する。\n相手を　混乱させることが　ある。"
    en: "The target is hit with a weak telekinetic force to inflict\ndamage. This may also confuse the target."
    fr: "Une faible vague télékinétique frappe la cible,\nce qui peut aussi la plonger dans la confusion."
    it: "Il Pokémon attacca il bersaglio con una leggera forza\ntelecinetica che può anche confonderlo."
    de: "Das Ziel wird von schwacher telekinetischer Energie\ngetroffen und eventuell verwirrt."
    es: Débil ataque telequinético que puede causar confusión.
    ko: "약한 염동력을\n상대에게 보내어 공격한다.\n상대를 혼란시킬 때가 있다."
    zh_simp: "向对手发送\n微弱的念力进行攻击。\n有时会使对手混乱。"
    zh_trad: "向對手發送\n微弱的念力進行攻擊。\n有時會使對手混亂。"
constrict:
  names:
    jp_kana: からみつく
    jp_kanji: からみつく
    en: Constrict
    fr: Constriction
    it: Limitazione
    de: Umklammerung
    es: Restricción
    ko: 휘감기
    zh_simp: 缠绕
    zh_trad: 纏繞
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
