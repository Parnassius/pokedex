scald:
  names:
    jp_kana: ねっとう
    jp_kanji: ねっとう
    en: Scald
    fr: Ébullition
    it: Idrovampata
    de: Siedewasser
    es: Escaldar
    ko: 열탕
    zh_simp: 热水
    zh_trad: 熱水
  descriptions:
    jp_kana: "熱く　煮えたぎる　水を\n相手に　発射して　攻撃する。\nやけど状態に　することが　ある。"
    jp_kanji: "熱く　煮えたぎる　水を\n相手に　発射して　攻撃する。\nやけど状態に　することが　ある。"
    en: "The user attacks by shooting boiling hot water at\nthe target. This may also leave the target with a burn."
    fr: "Le lanceur projette un jet d’eau bouillante sur la cible,\nce qui peut aussi la brûler."
    it: "Il Pokémon attacca il bersaglio con un getto\nd’acqua bollente che può anche scottarlo."
    de: "Heizt dem Ziel mit einem Schwall siedend heißen\nKochwassers ein. Das Ziel erleidet dabei eventuell\nVerbrennungen."
    es: "Ataca arrojando agua hirviendo al objetivo. Puede\ncausar quemaduras."
    ko: "뜨겁게 끓어오르는 물을\n상대에게 발사해서 공격한다.\n화상 상태로 만들 때가 있다."
    zh_simp: "向对手喷射\n煮得翻滚的开水进行攻击。\n有时会让对手陷入灼伤状态。"
    zh_trad: "向對手噴射\n滾燙的熱水進行攻擊。\n有時會讓對手陷入灼傷狀態。"
scale_shot:
  names:
    jp_kana: スケイルショット
    jp_kanji: スケイルショット
    en: Scale Shot
    fr: Rafale Écailles
    it: Squamacolpo
    de: Schuppenschuss
    es: Ráfaga Escamas
    ko: 스케일샷
    zh_simp: 鳞射
    zh_trad: 鱗射
  descriptions:
    jp_kana: "ウロコを　撃ちだして　攻撃する。\n２ー５回の　間　連続で　だす。\n素早さが　あがるが　防御が　さがる。"
    jp_kanji: "ウロコを　撃ちだして　攻撃する。\n２ー５回の　間　連続で　だす。\n素早さが　あがるが　防御が　さがる。"
    en: "The user attacks by shooting scales two to five times\nin a row. This move boosts the user’s Speed stat but\nlowers its Defense stat."
    fr: "Le lanceur projette des écailles sur la cible de deux à\ncinq fois d’affilée. Augmente la Vitesse, mais diminue\nla Défense."
    it: "Il Pokémon attacca lanciando delle squame da due\na cinque volte di fila. La sua Velocità aumenta, ma\nla Difesa diminuisce."
    de: "Der Anwender greift das Ziel zwei- bis fünfmal\nhintereinander mit Schuppen-Geschossen an. Erhöht\ndie eigene Initiative, aber senkt die Verteidigung."
    es: "Lanza escamas al objetivo de dos a cinco veces\nseguidas. Aumenta la Velocidad del usuario, pero\nreduce su Defensa."
    ko: "비늘을 쏘아서 공격한다.\n2~5회 연속으로 쓴다.\n스피드가 올라가지만 방어가 떨어진다."
    zh_simp: "发射鳞片进行攻击。\n连续攻击２～５次。\n速度会提高但防御会降低。"
    zh_trad: "射出鱗片進行攻擊。\n可連續攻擊２～５次。\n速度會提高但防禦會降低。"
scary_face:
  names:
    jp_kana: こわいかお
    jp_kanji: こわいかお
    en: Scary Face
    fr: Grimace
    it: Visotruce
    de: Grimasse
    es: Cara Susto
    ko: 겁나는얼굴
    zh_simp: 可怕面孔
    zh_trad: 鬼面
  descriptions:
    jp_kana: "恐ろしい　顔で　にらみ　おびえさせて\n相手の　素早さを　がくっと　さげる。"
    jp_kanji: "恐ろしい　顔で　にらみ　おびえさせて\n相手の　素早さを　がくっと　さげる。"
    en: "The user frightens the target with a scary face to harshly\nlower its Speed stat."
    fr: "Le lanceur fait une grimace qui effraie la cible\net réduit beaucoup sa Vitesse."
    it: "Il Pokémon spaventa il bersaglio con una faccia terribile\ne ne riduce di molto la Velocità."
    de: "Jagt dem Ziel mit einer Grimasse Angst ein.\nDessen Initiative-Wert sinkt stark."
    es: Asusta al objetivo para reducir mucho su Velocidad.
    ko: "무서운 얼굴로 노려보고 겁주어\n상대의 스피드를 크게 떨어뜨린다."
    zh_simp: "用恐怖的表情瞪着对手，\n使其害怕，\n从而大幅降低对手的速度。"
    zh_trad: "用恐怖的表情瞪著對手，\n讓對手害怕，\n大幅降低對手的速度。"
scorching_sands:
  names:
    jp_kana: ねっさのだいち
    jp_kanji: ねっさのだいち
    en: Scorching Sands
    fr: Sable Ardent
    it: Sabbiardente
    de: Brandsand
    es: Arenas Ardientes
    ko: 열사의대지
    zh_simp: 热沙大地
    zh_trad: 熱沙大地
  descriptions:
    jp_kana: "熱く　焼けた　砂を\n相手に　ぶつけて　攻撃する。\nやけど状態に　することが　ある。"
    jp_kanji: "熱く　焼けた　砂を\n相手に　ぶつけて　攻撃する。\nやけど状態に　することが　ある。"
    en: "The user throws scorching sand at the target to attack.\nThis may also leave the target with a burn."
    fr: "Le lanceur projette du sable chauffé à blanc\nsur la cible, ce qui peut aussi la brûler."
    it: "Il Pokémon attacca il bersaglio scagliandogli addosso\ndella sabbia incandescente. Può anche scottarlo."
    de: "Der Anwender greift das Ziel mit brennend heißem\nSand an und fügt ihm eventuell Verbrennungen zu."
    es: "Ataca al objetivo arrojándole arena a temperaturas muy\nelevadas. Puede causar quemaduras."
    ko: "뜨겁게 달궈진 모래를\n상대에게 부딪쳐서 공격한다.\n화상 상태로 만들 때가 있다."
    zh_simp: "将滚烫的沙子砸向对手进行攻击。\n有时会让对手陷入灼伤状态。"
    zh_trad: "向對手投灑熾熱的沙子進行攻擊。\n有時會讓對手陷入灼傷狀態。"
scratch:
  names:
    jp_kana: ひっかく
    jp_kanji: ひっかく
    en: Scratch
    fr: Griffe
    it: Graffio
    de: Kratzer
    es: Arañazo
    ko: 할퀴기
    zh_simp: 抓
    zh_trad: 抓
  descriptions:
    jp_kana: "硬く　とがった　鋭い　ツメで\n相手を　ひっかいて　攻撃する。"
    jp_kanji: "硬く　とがった　鋭い　ツメで\n相手を　ひっかいて　攻撃する。"
    en: "Hard, pointed, sharp claws rake the target to inflict\ndamage."
    fr: "Lacère la cible avec des griffes acérées pour lui\ninfliger des dégâts."
    it: "Il Pokémon attacca il bersaglio graffiandolo con artigli\nacuminati, duri e affilati."
    de: Das Ziel wird mit scharfen Klauen zerkratzt.
    es: Araña con afiladas garras.
    ko: "단단하고 뾰족하며 날카로운 손톱으로\n상대를 할퀴어서 공격한다."
    zh_simp: "用坚硬且无比锋利的爪子\n抓对手进行攻击。"
    zh_trad: "用堅硬且無比鋒利的爪子\n抓對手進行攻擊。"
screech:
  names:
    jp_kana: いやなおと
    jp_kanji: いやなおと
    en: Screech
    fr: Grincement
    it: Stridio
    de: Kreideschrei
    es: Chirrido
    ko: 싫은소리
    zh_simp: 刺耳声
    zh_trad: 刺耳聲
  descriptions:
    jp_kana: "おもわず　耳を　ふさぎたくなる\nいやなおとを　だして\n相手の　防御を　がくっと　さげる。"
    jp_kanji: "おもわず　耳を　ふさぎたくなる\nいやなおとを　だして\n相手の　防御を　がくっと　さげる。"
    en: "An earsplitting screech harshly lowers the target’s\nDefense stat."
    fr: "Le lanceur émet un son strident qui donne envie de\nse boucher les oreilles. Baisse beaucoup la Défense\nde la cible."
    it: "Stridio assordante che riduce di molto la Difesa\ndel bersaglio."
    de: "Stößt einen Schrei aus, um die Verteidigung des Zieles\nstark zu senken."
    es: "Alarido agudo que reduce mucho la Defensa del\nobjetivo."
    ko: "그만 귀를 막아 버리고 싶은\n싫은 소리를 내어\n상대의 방어를 크게 떨어뜨린다."
    zh_simp: "发出不由自主想要\n捂起耳朵的刺耳声，\n从而大幅降低对手的防御。"
    zh_trad: "發出令人不由自主想要\n摀起耳朵的刺耳聲，\n大幅降低對手的防禦。"
searing_shot:
  names:
    jp_kana: かえんだん
    jp_kanji: かえんだん
    en: Searing Shot
    fr: Incendie
    it: Sparafuoco
    de: Flammenball
    es: Bomba Ígnea
    ko: 화염탄
    zh_simp: 火焰弹
    zh_trad: 火焰彈
  descriptions:
    jp_kana: "真っ赤な　炎で　自分の\n周りに　いるものを　攻撃する。\nやけど状態に　することが　ある。"
    jp_kanji: "真っ赤な　炎で　自分の\n周りに　いるものを　攻撃する。\nやけど状態に　することが　ある。"
    en: "The user torches everything around it in an inferno\nof scarlet flames. This may also leave those it hits\nwith a burn."
    fr: "Des flammes s’abattent sur tous les Pokémon autour\ndu lanceur, ce qui peut aussi les brûler."
    it: "Chi la usa attacca gli altri Pokémon attorno con fiamme\nscarlatte. Può anche scottarli."
    de: "Anwender greift alle Pokémon im Umkreis mit tiefroten\nFlammen an. Ziele erleiden eventuell Verbrennungen."
    es: "Un infierno de llamas daña a los Pokémon adyacentes\nen combate. Puede causar quemaduras."
    ko: "새빨간 불꽃으로 자신의\n주위에 있는 포켓몬을 공격한다.\n화상 상태로 만들 때가 있다."
    zh_simp: "用熊熊烈火\n攻击自己周围所有的宝可梦。\n有时会陷入灼伤状态。"
    zh_trad: "用熊熊烈火\n攻擊自己周圍所有的寶可夢。\n有時會讓對手陷入灼傷狀態。"
searing_sunraze_smash:
  names:
    jp_kana: サンシャインスマッシャー
    jp_kanji: サンシャインスマッシャー
    en: Searing Sunraze Smash
    fr: Hélio-Choc Dévastateur
    it: Supercollisione Solare
    de: Schmetternde Sonnenwalze
    es: Embestida Solar
    ko: 선샤인스매셔
    zh_simp: 日光回旋下苍穹
    zh_trad: 日光迴旋下蒼穹
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
secret_power:
  names:
    jp_kana: ひみつのちから
    jp_kanji: ひみつのちから
    en: Secret Power
    fr: Force Cachée
    it: Forzasegreta
    de: Geheimpower
    es: Daño Secreto
    ko: 비밀의힘
    zh_simp: 秘密之力
    zh_trad: 秘密之力
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
secret_sword:
  names:
    jp_kana: しんぴのつるぎ
    jp_kanji: しんぴのつるぎ
    en: Secret Sword
    fr: Lame Ointe
    it: Spadamistica
    de: Mystoschwert
    es: Sable Místico
    ko: 신비의칼
    zh_simp: 神秘之剑
    zh_trad: 神秘之劍
  descriptions:
    jp_kana: "長い　つので　切りつけ　攻撃する。\nつのが　まとった　不思議な　力は\n物理的な　ダメージを　与える。"
    jp_kanji: "長い　つので　切りつけ　攻撃する。\nつのが　まとった　不思議な　力は\n物理的な　ダメージを　与える。"
    en: "The user cuts with its long horn. The odd power\ncontained in the horn deals physical damage to\nthe target."
    fr: "La cible est lacérée par une longue corne dont\nle pouvoir mystérieux inflige des dégâts physiques."
    it: "Il Pokémon attacca il bersaglio tagliandolo con una\nspada mistica. La misteriosa energia sprigionata\nprovoca danni fisici."
    de: "Schneideangriff mit dem langen Horn des Anwenders.\nDie mysteriöse Kraft aus dem Horn erzeugt physischen\nSchaden."
    es: "Ensarta al objetivo con un largo cuerno dotado de un\npoder místico que provoca daño físico."
    ko: "긴 뿔로 베어 공격한다.\n뿔이 머금은 이상한 힘은\n물리적인 데미지를 준다."
    zh_simp: "用长角切斩对手进行攻击。\n角上拥有的神奇力量\n将给予物理伤害。"
    zh_trad: "用長角斬切對手進行攻擊。\n角上擁有的神奇力量\n會給予對手物理傷害。"
seed_bomb:
  names:
    jp_kana: タネばくだん
    jp_kanji: タネばくだん
    en: Seed Bomb
    fr: Canon Graine
    it: Semebomba
    de: Samenbomben
    es: Bomba Germen
    ko: 씨폭탄
    zh_simp: 种子炸弹
    zh_trad: 種子炸彈
  descriptions:
    jp_kana: "硬い　殻を　もつ　大きな　タネを\n上から　たたきつけて\n相手を　攻撃する。"
    jp_kanji: "硬い　殻を　もつ　大きな　タネを\n上から　たたきつけて\n相手を　攻撃する。"
    en: "The user attacks by slamming a barrage of hard-shelled\nseeds down on the target from above."
    fr: "Le lanceur déclenche un déluge de grosses graines\nà la coque solide sur la cible."
    it: "Il Pokémon attacca il bersaglio dall’alto emettendo\nuna raffica di semi dal guscio duro."
    de: "Anwender lässt eine Menge Samen mit harter Schale\nvon oben auf das Ziel fallen."
    es: "Lanza al objetivo una descarga de enormes semillas\nde cáscara muy dura desde arriba."
    ko: "단단한 껍질을 가지고 있는\n큰 씨앗을 위에서 힘껏 내던져\n상대를 공격한다."
    zh_simp: "将外壳坚硬的大种子，\n从上方砸下攻击对手。"
    zh_trad: "從上方砸下外殼堅硬的\n大種子，攻擊對手。"
seed_flare:
  names:
    jp_kana: シードフレア
    jp_kanji: シードフレア
    en: Seed Flare
    fr: Fulmigraine
    it: Infuriaseme
    de: Schocksamen
    es: Fulgor Semilla
    ko: 시드플레어
    zh_simp: 种子闪光
    zh_trad: 種子閃光
  descriptions:
    jp_kana: "体の　中から　衝撃波を\n発生させる。相手の　特防を\nがくっと　さげることが　ある。"
    jp_kanji: "体の　中から　衝撃波を\n発生させる。相手の　特防を\nがくっと　さげることが　ある。"
    en: "The user emits a shock wave from its body to attack\nthe target. This may also harshly lower the target’s\nSp. Def stat."
    fr: "Le corps du lanceur émet une onde de choc.\nPeut aussi beaucoup baisser la Défense Spéciale\nde la cible."
    it: "Il Pokémon genera un’onda d’urto dal suo corpo.\nPuò anche ridurre di molto la Difesa Speciale\ndel bersaglio."
    de: "Anwender erzeugt eine Schockwelle.\nSpezial-Verteidigung des Zieles wird\neventuell stark gesenkt."
    es: "El usuario libera una onda de choque de su cuerpo.\nPuede reducir mucho la Defensa Especial del objetivo."
    ko: "몸속에서 충격파를\n발생시킨다. 상대의 특수방어를\n크게 떨어뜨릴 때가 있다."
    zh_simp: "从身体里产生冲击波。\n有时会大幅降低对手的特防。"
    zh_trad: "從身體裡發出衝擊波攻擊對手。\n有時會大幅降低對手的特防。"
seismic_toss:
  names:
    jp_kana: ちきゅうなげ
    jp_kanji: ちきゅうなげ
    en: Seismic Toss
    fr: Frappe Atlas
    it: Movim. Sismico
    de: Geowurf
    es: Sísmico
    ko: 지구던지기
    zh_simp: 地球上投
    zh_trad: 地球上投
  descriptions:
    jp_kana: "引力を　使い　投げとばす。\n自分の　レベルと　同じ　ダメージを\n相手に　与える。"
    jp_kanji: "引力を　使い　投げとばす。\n自分の　レベルと　同じ　ダメージを\n相手に　与える。"
    en: "The target is thrown using the power of gravity. It inflicts\ndamage equal to the user’s level."
    fr: "La cible est projetée grâce au pouvoir de la gravité.\nCette capacité inflige des dégâts égaux au niveau\ndu lanceur."
    it: "Il Pokémon attacca il bersaglio sfruttando la forza\ndi gravità. Infligge un danno pari al proprio livello."
    de: "Ziel wird mit der Kraft der Gravitation umgeworfen.\nRichtet Schaden gemäß dem Level des Anwenders an."
    es: "Aprovecha la gravedad para derribar al objetivo.\nLe resta tantos PS como nivel tenga el usuario."
    ko: "인력을 사용해 내던진다.\n자신의 레벨과 똑같은 데미지를\n상대에게 준다."
    zh_simp: "利用引力将对手甩飞出去。\n给予对手和自己等级相同的伤害。"
    zh_trad: "利用引力將對手甩飛出去。\n給予對手和自己等級相同的傷害。"
self_destruct:
  names:
    jp_kana: じばく
    jp_kanji: じばく
    en: Self-Destruct
    fr: Destruction
    it: Autodistruzione
    de: Finale
    es: Autodestrucción
    ko: 자폭
    zh_simp: 玉石俱碎
    zh_trad: 自爆
  descriptions:
    jp_kana: "爆発を　おこして　自分の\n周りに　いるものを　攻撃する。\n使ったあとに　ひんしに　なる。"
    jp_kanji: "爆発を　おこして　自分の\n周りに　いるものを　攻撃する。\n使ったあとに　ひんしに　なる。"
    en: "The user attacks everything around it by causing an\nexplosion. The user faints upon using this move."
    fr: "Le lanceur explose en blessant tous les Pokémon\nautour de lui. Le lanceur tombe K.O."
    it: "Chi la usa attacca gli altri Pokémon attorno causando\nun’esplosione, ma poi va KO."
    de: "Der Anwender verursacht eine Explosion, mit der er bei\nallen Pokémon im Umkreis Riesenschaden anrichtet und\nselbst kampfunfähig wird."
    es: "El atacante explota y hiere a los Pokémon adyacentes.\nEl usuario se debilita de inmediato."
    ko: "폭발을 일으켜서 자신의\n주위에 있는 포켓몬을 공격한다.\n쓰고 나서 기절하게 된다."
    zh_simp: "引发爆炸，\n攻击自己周围所有的宝可梦。\n使用后陷入昏厥。"
    zh_trad: "引起爆炸，\n攻擊自己周圍所有的寶可夢。\n使用後自己會陷入瀕死。"
shadow_ball:
  names:
    jp_kana: シャドーボール
    jp_kanji: シャドーボール
    en: Shadow Ball
    fr: Ball’Ombre
    it: Palla Ombra
    de: Spukball
    es: Bola Sombra
    ko: 섀도볼
    zh_simp: 暗影球
    zh_trad: 暗影球
  descriptions:
    jp_kana: "黒い影の　塊を　投げつけて\n攻撃する。　相手の　特防を\nさげることが　ある。"
    jp_kanji: "黒い影の　塊を　投げつけて\n攻撃する。　相手の　特防を\nさげることが　ある。"
    en: "The user attacks by hurling a shadowy blob at the target.\nThis may also lower the target’s Sp. Def stat."
    fr: "Le lanceur projette une grande ombre sur la cible qui\npeut aussi faire baisser la Défense Spéciale de celle-ci."
    it: "Il Pokémon attacca lanciando sul bersaglio un grumo\ndi ombre nere. Può anche ridurne la Difesa Speciale."
    de: "Bewirft das Ziel mit einem gruseligen Ball und senkt\neventuell dessen Spezial-Verteidigung."
    es: "Lanza una bola oscura que puede reducir la Defensa\nEspecial del objetivo."
    ko: "까만 그림자 덩어리를 내던져서\n공격한다. 상대의 특수방어를\n떨어뜨릴 때가 있다."
    zh_simp: "投掷一团黑影进行攻击。\n有时会降低对手的特防。"
    zh_trad: "投擲一團黑影進行攻擊。\n有時會降低對手的特防。"
shadow_bone:
  names:
    jp_kana: シャドーボーン
    jp_kanji: シャドーボーン
    en: Shadow Bone
    fr: Os Ombre
    it: Ossotetro
    de: Schattenknochen
    es: Hueso Sombrío
    ko: 섀도본
    zh_simp: 暗影之骨
    zh_trad: 暗影之骨
  descriptions:
    jp_kana: "魂の　宿った　ホネで\n相手を　なぐりつけて　攻撃する。\n相手の　防御を　さげる　ことがある。"
    jp_kanji: "魂の　宿った　ホネで\n相手を　なぐりつけて　攻撃する。\n相手の　防御を　さげる　ことがある。"
    en: "The user attacks by beating the target with a bone\nthat contains a spirit. This may also lower the target’s\nDefense stat."
    fr: "Le lanceur frappe avec un os possédé par l’âme\nd’un défunt. Peut aussi baisser la Défense de la cible."
    it: "Il Pokémon attacca colpendo il bersaglio con un osso\nin cui alberga uno spirito. Può anche ridurne la Difesa."
    de: "Der Anwender greift das Ziel mit einem Knochen an,\nin dem eine Seele haust. Senkt eventuell die\nVerteidigung des Zieles."
    es: "Ataca golpeando con un hueso poseído por un espíritu.\nPuede reducir la Defensa del objetivo."
    ko: "영혼이 머물고 있는 뼈로\n상대를 세게 때려서 공격한다.\n상대의 방어를 떨어뜨릴 때가 있다."
    zh_simp: "用附有灵魂的骨头\n殴打对手进行攻击。\n有时会降低对手的防御。"
    zh_trad: "用寄宿了靈魂的骨頭\n毆打對手進行攻擊。\n有時會降低對手的防禦。"
shadow_claw:
  names:
    jp_kana: シャドークロー
    jp_kanji: シャドークロー
    en: Shadow Claw
    fr: Griffe Ombre
    it: Ombrartigli
    de: Dunkelklaue
    es: Garra Umbría
    ko: 섀도클로
    zh_simp: 暗影爪
    zh_trad: 暗影爪
  descriptions:
    jp_kana: "影から　つくった　鋭い　ツメで\n相手を　切り裂く。\n急所に　当たりやすい。"
    jp_kanji: "影から　つくった　鋭い　ツメで\n相手を　切り裂く。\n急所に　当たりやすい。"
    en: "The user attacks by slashing the target with a sharp claw\nmade from shadows. This move has a heightened chance\nof landing a critical hit."
    fr: "Attaque avec une griffe puissante faite d’ombres.\nTaux de critiques élevé."
    it: "Il Pokémon attacca il bersaglio con taglienti artigli\nd’ombra. Probabile brutto colpo."
    de: "Greift das Ziel mit einer scharfen Klaue aus Schatten an.\nHohe Volltrefferquote."
    es: "Ataca con una garra afilada hecha de sombras. Suele\nasestar un golpe crítico."
    ko: "그림자로 만든 날카로운 발톱으로\n상대를 베어 가른다.\n급소에 맞기 쉽다."
    zh_simp: "以影子做成的锐爪，\n劈开对手。\n容易击中要害。"
    zh_trad: "用黑影化成的銳利爪子\n撕裂對手。\n容易擊中要害。"
shadow_force:
  names:
    jp_kana: シャドーダイブ
    jp_kanji: シャドーダイブ
    en: Shadow Force
    fr: Revenant
    it: Oscurotuffo
    de: Schemenkraft
    es: Golpe Umbrío
    ko: 섀도다이브
    zh_simp: 暗影潜袭
    zh_trad: 暗影潛襲
  descriptions:
    jp_kana: "１ターン目で　姿を　消して\n２ターン目に　相手を　攻撃する。\n守っていても　攻撃は　当たる。"
    jp_kanji: "１ターン目で　姿を　消して\n２ターン目に　相手を　攻撃する。\n守っていても　攻撃は　当たる。"
    en: "The user disappears on the first turn, then attacks on the\nnext turn. This move hits even if the target protects itself."
    fr: "Le lanceur disparaît au premier tour et frappe\nla cible au deuxième. Cette capacité fonctionne\nmême si la cible se protège."
    it: "Il Pokémon sparisce e poi attacca il bersaglio\nal turno successivo. Colpisce anche se\nquest’ultimo si sta proteggendo."
    de: "Anwender verschwindet in Runde 1 und attackiert in\nRunde 2. Trifft auch, wenn sich das Ziel selbst schützt."
    es: "En el primer turno, desaparece. En el segundo, golpea\nal objetivo aunque se esté protegiendo."
    ko: "1턴째에 모습을 감춰\n2턴째에 상대를 공격한다.\n방어하고 있어도 공격은 맞는다."
    zh_simp: "第１回合消失踪影，\n第２回合攻击对手。\n即使对手正受保护，也能击中。"
    zh_trad: "使用後的第１回合消失身影，\n並於第２回合攻擊對手。\n處於守護的對手也能擊中。"
shadow_punch:
  names:
    jp_kana: シャドーパンチ
    jp_kanji: シャドーパンチ
    en: Shadow Punch
    fr: Poing Ombre
    it: Pugnodombra
    de: Finsterfaust
    es: Puño Sombra
    ko: 섀도펀치
    zh_simp: 暗影拳
    zh_trad: 暗影拳
  descriptions:
    jp_kana: "影に　まぎれて　パンチを　くりだす。\n攻撃は　必ず　命中する。"
    jp_kanji: "影に　まぎれて　パンチを　くりだす。\n攻撃は　必ず　命中する。"
    en: "The user throws a punch from the shadows. This attack\nnever misses."
    fr: "Le lanceur se fond dans les ombres pour porter\nun coup de poing. N’échoue jamais."
    it: "Il Pokémon tira un pugno col favore delle tenebre.\nQuesto attacco va sempre a segno."
    de: "Angriff mit der Faust aus dem Schattenreich.\nAusweichen unmöglich."
    es: Puñetazo procedente de las sombras que no falla nunca.
    ko: "그림자에 섞여 펀치를 날린다.\n공격은 반드시 명중한다."
    zh_simp: "使出混影之拳。\n攻击必定会命中。"
    zh_trad: "暗藏在陰影之中出拳。\n攻擊必定會命中。"
shadow_sneak:
  names:
    jp_kana: かげうち
    jp_kanji: かげうち
    en: Shadow Sneak
    fr: Ombre Portée
    it: Furtivombra
    de: Schattenstoß
    es: Sombra Vil
    ko: 야습
    zh_simp: 影子偷袭
    zh_trad: 影子偷襲
  descriptions:
    jp_kana: "影を　のばして\n相手の　背後から　攻撃する。\n必ず　先制攻撃　できる。"
    jp_kanji: "影を　のばして\n相手の　背後から　攻撃する。\n必ず　先制攻撃　できる。"
    en: "The user extends its shadow and attacks the target from\nbehind. This move always goes first."
    fr: "Le lanceur étend son ombre pour frapper par-derrière.\nFrappe en priorité."
    it: "Il Pokémon estende la sua ombra e attacca il bersaglio\nalle spalle. Questo attacco ha priorità alta."
    de: "Bei dieser Erstschlag-Attacke erweitert der Anwender\nseinen Schatten und greift das Ziel von hinten an."
    es: "Extiende su sombra y ataca al objetivo por la espalda.\nEste movimiento tiene prioridad alta."
    ko: "그림자를 늘려\n상대의 배후에서 공격한다.\n반드시 선제공격할 수 있다."
    zh_simp: "伸长影子，\n从对手的背后进行攻击。\n必定能够先制攻击。"
    zh_trad: "伸長自己的影子，\n從對手的背後進行攻擊。\n必定能夠發動先制攻擊。"
sharpen:
  names:
    jp_kana: かくばる
    jp_kanji: かくばる
    en: Sharpen
    fr: Affûtage
    it: Affilatore
    de: Schärfer
    es: Afilar
    ko: 각지기
    zh_simp: 棱角化
    zh_trad: 稜角化
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
shattered_psyche:physical:
  names:
    jp_kana: マキシマムサイブレイカー
    jp_kanji: マキシマムサイブレイカー
    en: Shattered Psyche
    fr: Psycho-Pulvérisation EX
    it: Impatto Psicocinetico
    de: Psycho-Schmetterschlag
    es: Disruptor Psíquico
    ko: 맥시멈사이브레이커
    zh_simp: 至高精神破坏波
    zh_trad: 至高精神破壞波
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
