    jp_kana: "力を　ふりしぼり　攻撃する。\n自分の　ＨＰが　少ないほど\n技の　威力は　あがる。"
    jp_kanji: "力を　ふりしぼり　攻撃する。\n自分の　ＨＰが　少ないほど\n技の　威力は　あがる。"
    en: "An all-out attack that becomes more powerful the\nless HP the user has."
    fr: "Le lanceur ne retient plus ses coups.\nPlus ses PV sont bas, plus la puissance\nde cette capacité augmente."
    it: "Il Pokémon attacca con tutte le sue forze.\nPiù i suoi PS sono bassi, più la potenza della mossa\naumenta."
    de: Richtet mehr Schaden an, wenn eigene KP niedrig sind.
    es: "Ataque desesperado que causa más daño cuantos\nmenos PS tenga el usuario."
    ko: "힘을 쥐어짜서 공격한다.\n자신의 HP가 적을수록\n기술의 위력이 올라간다."
    zh_simp: "竭尽全力进行攻击。\n自己的ＨＰ越少，\n招式的威力越大。"
    zh_trad: "竭盡全力進行攻擊。\n自己的ＨＰ越少，\n招式的威力越大。"
revival_blessing:
  names:
    jp_kana: さいきのいのり
    jp_kanji: さいきのいのり
    en: Revival Blessing
    fr: Second Souffle
    it: Preghiera Vitale
    de: Vitalsegen
    es: Plegaria Vital
    ko: 회생의기도
    zh_simp: 复生祈祷
    zh_trad: 復生祈禱
  descriptions:
    jp_kana: "慈愛の心で　いのることにより\n控えにいる　ひんしの　ポケモンを\nＨＰを　半分の状態で　復活させる。"
    jp_kanji: "慈愛の心で　いのることにより\n控えにいる　ひんしの　ポケモンを\nＨＰを　半分の状態で　復活させる。"
    en: "The user bestows a loving blessing, reviving a party\nPokémon that has fainted and restoring half that\nPokémon’s max HP."
    fr: "Dans un élan de compassion, le lanceur adresse une\nprière afin de ranimer un Pokémon de l’équipe K.O.\nen lui rendant la moitié de ses PV."
    it: "Il Pokémon intona una preghiera compassionevole,\nrianimando un Pokémon della squadra esausto\ne restituendogli metà dei suoi PS."
    de: "Der Anwender belebt mit einem Wunsch voller Mitgefühl\nein kampfunfähiges Team-Mitglied wieder und stellt die\nHälfte dessen maximaler KP wieder her."
    es: "Pronuncia una benévola oración que revive a un\nPokémon del equipo que se haya debilitado y\nrestaura la mitad de sus PS máximos."
    ko: "자애로운 마음으로 기도를 하여\n기절한 교대 포켓몬을\nHP가 절반인 상태로 부활시킨다."
    zh_simp: "通过以慈爱之心祈祷，\n让陷入昏厥的后备宝可梦\n以回复一半ＨＰ的状态复活。"
    zh_trad: "懷著慈愛之心祈禱，\n使後備中瀕死的寶可夢\n以一半的ＨＰ復活。"
rising_voltage:
  names:
    jp_kana: ライジングボルト
    jp_kanji: ライジングボルト
    en: Rising Voltage
    fr: Monte-Tension
    it: Elettroimpennata
    de: Hochspannung
    es: Alto Voltaje
    ko: 라이징볼트
    zh_simp: 电力上升
    zh_trad: 電力上升
  descriptions:
    jp_kana: "地面から　立ちのぼる　電撃で　攻撃。\n相手が　エレキフィールドに　いる時\n技の　威力が　２倍に　なる。"
    jp_kanji: "地面から　立ちのぼる　電撃で　攻撃。\n相手が　エレキフィールドに　いる時\n技の　威力が　２倍に　なる。"
    en: "The user attacks with electricity rising from the ground.\nThis move’s power is doubled if the target is on\nElectric Terrain."
    fr: "Des éclairs surgissent du sol et frappent la cible.\nLa puissance de cette attaque est doublée si la cible\nest sur un champ électrifié."
    it: "Il Pokémon attacca con dell’elettricità che si alza\ndal suolo. La potenza della mossa raddoppia quando\nl’avversario si trova in un Campo Elettrico."
    de: "Der Anwender greift mit aus dem Boden aufsteigender\nElektrizität an. Die Stärke der Attacke wird verdoppelt,\nwenn beim Gegner ein Elektrofeld aktiv ist."
    es: "Ataca con una descarga eléctrica que surge del terreno\nde combate. La potencia del movimiento se duplica si\nel objetivo se ve afectado por un campo eléctrico."
    ko: "지면에서 올라오는 전격으로 공격한다.\n상대가 일렉트릭필드 위에 있을 때\n기술의 위력이 2배가 된다."
    zh_simp: "用从地面升腾而起的电击进行攻击。\n当对手处于电气场地上时，\n招式威力会变成２倍。"
    zh_trad: "用從地面升騰的電擊攻擊。\n當對手在電氣場地時，\n招式威力會變成２倍。"
roar:
  names:
    jp_kana: ほえる
    jp_kanji: ほえる
    en: Roar
    fr: Hurlement
    it: Boato
    de: Brüller
    es: Rugido
    ko: 울부짖기
    zh_simp: 吼叫
    zh_trad: 吼叫
  descriptions:
    jp_kana: "相手を　逃がして\n控えの　ポケモンを　ひきずりだす。\n野生の　場合は　戦闘が　終わる。"
    jp_kanji: "相手を　逃がして\n控えの　ポケモンを　ひきずりだす。\n野生の　場合は　戦闘が　終わる。"
    en: "The target is scared off, and a different Pokémon is\ndragged out. In the wild, this ends a battle against a\nsingle Pokémon."
    fr: "Effraie le Pokémon ennemi et le remplace par un autre.\nLors d’un combat contre un Pokémon sauvage seul,\nmet fin au combat."
    it: "Il bersaglio lascia il campo e viene sostituito.\nMette fine alle lotte contro singoli Pokémon\nselvatici."
    de: "Verjagt das Ziel und ersetzt es durch ein anderes\nPokémon. Beendet den Kampf in der Wildnis."
    es: "Se lleva al objetivo, que es cambiado por otro Pokémon.\nSi es un Pokémon salvaje, acaba el combate."
    ko: "상대를 도망가게 해서\n교대할 포켓몬을 끌어낸다.\n야생의 경우에는 배틀이 끝난다."
    zh_simp: "放走对手，强制拉后备宝可梦上场。\n如果对手为野生宝可梦，\n战斗将直接结束。"
    zh_trad: "趕走對手，\n強制讓後備寶可夢上場。\n對手為野生寶可夢時，戰鬥將直接結束。"
roar_of_time:
  names:
    jp_kana: ときのほうこう
    jp_kanji: ときのほうこう
    en: Roar of Time
    fr: Hurle-Temps
    it: Fragortempo
    de: Zeitenlärm
    es: Distorsión
    ko: 시간의포효
    zh_simp: 时光咆哮
    zh_trad: 時光咆哮
  descriptions:
    jp_kana: "時間が　ゆがむほどの　力を\nうちだして　相手を　攻撃する。\n次の　ターンは　動けなくなる。"
    jp_kanji: "時間が　ゆがむほどの　力を\nうちだして　相手を　攻撃する。\n次の　ターンは　動けなくなる。"
    en: "The user blasts the target with power that distorts even\ntime. The user can’t move on the next turn."
    fr: "Le lanceur frappe si fort qu’il affecte le cours du temps.\nIl se repose au tour suivant."
    it: "Il Pokémon attacca il bersaglio con una forza\ncapace di alterare il tempo, ma deve stare fermo\nal turno successivo."
    de: "Anwender attackiert mit einer Kraft, die selbst die\nZeit verzerrt. In der nächsten Runde muss er ruhen."
    es: "Ataca al objetivo usando tal energía que el tiempo se\ndistorsiona. El usuario deberá descansar en el siguiente\nturno."
    ko: "시간이 뒤틀릴 정도의\n힘을 사용해서 상대를 공격한다.\n다음 턴은 움직일 수 없다."
    zh_simp: "释放出扭曲时间般的\n强大力量攻击对手。\n下一回合自己将无法动弹。"
    zh_trad: "釋放出足以扭曲時間的\n強大力量攻擊對手。\n下一回合自己將無法動彈。"
rock_blast:
  names:
    jp_kana: ロックブラスト
    jp_kanji: ロックブラスト
    en: Rock Blast
    fr: Boule Roc
    it: Cadutamassi
    de: Felswurf
    es: Pedrada
    ko: 록블라스트
    zh_simp: 岩石爆击
    zh_trad: 岩石爆擊
  descriptions:
    jp_kana: "硬い　岩石を\n相手に　発射して　攻撃する。\n２ー５回の　間　連続で　だす。"
    jp_kanji: "硬い　岩石を\n相手に　発射して　攻撃する。\n２ー５回の　間　連続で　だす。"
    en: "The user attacks by hurling hard rocks at the target.\nThis move hits two to five times in a row."
    fr: "Le lanceur projette un rocher sur la cible de deux à cinq\nfois d’affilée."
    it: "Il Pokémon attacca il bersaglio con dei massi pesanti\nlanciati in rapida successione da due a cinque volte."
    de: Wirft zwei- bis fünfmal in Folge Felsblöcke auf das Ziel.
    es: "Lanza pedruscos al objetivo de dos a cinco veces\nseguidas."
    ko: "단단한 암석을\n상대에게 발사하여 공격한다.\n2~5회 연속으로 쓴다."
    zh_simp: "向对手发射\n坚硬的岩石进行攻击。\n连续攻击２～５次。"
    zh_trad: "向對手發射\n堅硬的岩石進行攻擊。\n連續攻擊２～５次。"
rock_climb:
  names:
    jp_kana: ロッククライム
    jp_kanji: ロッククライム
    en: Rock Climb
    fr: Escalade
    it: Scalaroccia
    de: Kraxler
    es: Treparrocas
    ko: 록클라임
    zh_simp: 攀岩
    zh_trad: 攀岩
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
rock_polish:
  names:
    jp_kana: ロックカット
    jp_kanji: ロックカット
    en: Rock Polish
    fr: Poliroche
    it: Lucidatura
    de: Steinpolitur
    es: Pulimento
    ko: 록커트
    zh_simp: 岩石打磨
    zh_trad: 岩石打磨
  descriptions:
    jp_kana: "自分の　体を　磨いて　空気の\n抵抗を　少なくする。素早さを\nぐーんと　あげることが　できる。"
    jp_kanji: "自分の　体を　磨いて　空気の\n抵抗を　少なくする。素早さを\nぐーんと　あげることが　できる。"
    en: "The user polishes its body to reduce drag. This sharply\nboosts the user’s Speed stat."
    fr: "Le lanceur polit son corps pour diminuer sa résistance\nau vent. Augmente beaucoup la Vitesse."
    it: "Il Pokémon leviga il proprio corpo per ridurne l’attrito\ncon l’aria. Aumenta di molto la Velocità."
    de: "Anwender reduziert so gut wie möglich den\nLuftwiderstand. Erhöht den Initiative-Wert stark."
    es: "Pule su cuerpo para reducir la resistencia al aire y\naumentar mucho su Velocidad."
    ko: "자신의 몸을 갈아\n공기의 저항을 적게 한다.\n스피드를 크게 올릴 수 있다."
    zh_simp: "打磨自己的身体，\n减少空气阻力。\n可以大幅提高自己的速度。"
    zh_trad: "打磨自己的身體，\n減少空氣阻力。\n可大幅提高自己的速度。"
rock_slide:
  names:
    jp_kana: いわなだれ
    jp_kanji: いわなだれ
    en: Rock Slide
    fr: Éboulement
    it: Frana
    de: Steinhagel
    es: Avalancha
    ko: 스톤샤워
    zh_simp: 岩崩
    zh_trad: 岩崩
  descriptions:
    jp_kana: "大きな　岩を\n激しく　ぶつけて　攻撃する。\n相手を　ひるませることが　ある。"
    jp_kanji: "大きな　岩を\n激しく　ぶつけて　攻撃する。\n相手を　ひるませることが　ある。"
    en: "Large boulders are hurled at opposing Pokémon to\ninflict damage. This may also make the opposing\nPokémon flinch."
    fr: "Le lanceur envoie de gros rochers sur la cible pour\nlui infliger des dégâts, ce qui peut aussi l’apeurer."
    it: "Il Pokémon attacca il bersaglio colpendolo\nviolentemente con grandi massi che possono anche farlo\ntentennare."
    de: "Schleudert riesige Felsen auf gegnerische Pokémon,\ndie eventuell zurückschrecken."
    es: Lanza grandes pedruscos. Puede amedrentar al objetivo.
    ko: "큰 바위를\n세차게 부딪쳐서 공격한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "将大岩石\n猛烈地撞向对手进行攻击。\n有时会使对手畏缩。"
    zh_trad: "將大岩石\n猛烈地砸向對手進行攻擊。\n有時會讓對手畏縮。"
rock_smash:
  names:
    jp_kana: いわくだき
    jp_kanji: いわくだき
    en: Rock Smash
    fr: Éclate-Roc
    it: Spaccaroccia
    de: Zertrümmerer
    es: Golpe Roca
    ko: 바위깨기
    zh_simp: 碎岩
    zh_trad: 碎岩
  descriptions:
    jp_kana: "パンチで　攻撃する。相手の\n防御を　さげる　ことが　ある。"
    jp_kanji: "パンチで　攻撃する。相手の\n防御を　さげる　ことが　ある。"
    en: "The user attacks with a punch. This may also lower the\ntarget’s Defense stat."
    fr: "Le lanceur porte un coup de poing à la cible, ce qui\npeut baisser la Défense de celle-ci."
    it: "Il Pokémon attacca il bersaglio con un pugno che può\nanche ridurne la Difesa."
    de: "Der Anwender greift mit einem Hieb an und kann so\nden Verteidigungs-Wert des Zieles senken."
    es: "Propina un gran puñetazo que puede reducir la Defensa\ndel objetivo."
    ko: "펀치로 공격한다.\n상대의 방어를 떨어뜨릴 때가 있다."
    zh_simp: "用拳头进行攻击。\n有时会降低对手的防御。"
    zh_trad: "用拳頭進行攻擊。\n有時會降低對手的防禦。"
rock_throw:
  names:
    jp_kana: いわおとし
    jp_kanji: いわおとし
    en: Rock Throw
    fr: Jet-Pierres
    it: Sassata
    de: Steinwurf
    es: Lanzarrocas
    ko: 돌떨구기
    zh_simp: 落石
    zh_trad: 落石
  descriptions:
    jp_kana: "小さな　岩を　持ちあげて\n相手に　投げつけて　攻撃する。"
    jp_kanji: "小さな　岩を　持ちあげて\n相手に　投げつけて　攻撃する。"
    en: "The user picks up and throws a small rock at the target\nto inflict damage."
    fr: Le lanceur soulève une pierre et la lance sur la cible.
    it: "Il Pokémon raccoglie una pietra e attacca il bersaglio\nlanciandogliela contro."
    de: Das Ziel wird mit einem kleinen Stein beworfen.
    es: Tira una pequeña roca al objetivo.
    ko: "작은 바위를 들어 올려\n상대에게 내던져서 공격한다."
    zh_simp: "拿起小岩石，\n投掷对手进行攻击。"
    zh_trad: "舉起小岩石，\n向對手投擲進行攻擊。"
rock_tomb:
  names:
    jp_kana: がんせきふうじ
    jp_kanji: がんせきふうじ
    en: Rock Tomb
    fr: Tomberoche
    it: Rocciotomba
    de: Felsgrab
    es: Tumba Rocas
    ko: 암석봉인
    zh_simp: 岩石封锁
    zh_trad: 岩石封鎖
  descriptions:
    jp_kana: "岩石を　投げつけて　攻撃する。\n相手の　動きを　封じることで\n素早さを　さげる。"
    jp_kanji: "岩石を　投げつけて　攻撃する。\n相手の　動きを　封じることで\n素早さを　さげる。"
    en: "The user hurls boulders at the target to inflict damage.\nThis also lowers the target’s Speed stat by cutting off\nits movement."
    fr: Des rochers frappent la cible et baissent sa Vitesse.
    it: "Il Pokémon attacca il bersaglio lanciando rocce.\nInoltre, ne riduce la Velocità bloccando i suoi movimenti."
    de: "Angriff mit Felsen. Bei Erfolg wird der Initiative-Wert\ndes Zieles gesenkt."
    es: "Lanza rocas que infligen daño al objetivo y reducen su\nVelocidad al dificultar sus movimientos."
    ko: "암석을 내던져서 공격한다.\n상대의 움직임을 봉인함으로써\n스피드를 떨어뜨린다."
    zh_simp: "投掷岩石进行攻击。\n封住对手的行动，\n从而降低速度。"
    zh_trad: "投擲岩石進行攻擊。\n封住對手的行動，\n進而降低其速度。"
rock_wrecker:
  names:
    jp_kana: がんせきほう
    jp_kanji: がんせきほう
    en: Rock Wrecker
    fr: Roc-Boulet
    it: Devastomasso
    de: Felswerfer
    es: Romperrocas
    ko: 암석포
    zh_simp: 岩石炮
    zh_trad: 岩石炮
  descriptions:
    jp_kana: "巨大な　岩を\n相手に　発射して　攻撃する。\n次の　ターンは　動けなくなる。"
    jp_kanji: "巨大な　岩を\n相手に　発射して　攻撃する。\n次の　ターンは　動けなくなる。"
    en: "The user launches a huge boulder at the target to attack.\nThe user can’t move on the next turn."
    fr: "Le lanceur attaque en projetant un gros rocher\nsur la cible. Il doit se reposer au tour suivant."
    it: "Il Pokémon attacca il bersaglio con un enorme\nmasso, ma si deve riposare al turno successivo."
    de: "Anwender wirft einen riesigen Felsen auf das Ziel.\nIn der nächsten Runde muss der Anwender ruhen."
    es: "Lanza una piedra enorme contra el objetivo. El usuario\ndeberá descansar en el siguiente turno."
    ko: "거대한 바위를\n상대에게 발사하여 공격한다.\n다음 턴은 움직일 수 없다."
    zh_simp: "向对手发射\n巨大的岩石进行攻击。\n下一回合自己将无法动弹。"
    zh_trad: "向對手發射\n巨大的岩石進行攻擊。\n下一回合自己將無法動彈。"
role_play:
  names:
    jp_kana: なりきり
    jp_kanji: なりきり
    en: Role Play
    fr: Imitation
    it: Giocodiruolo
    de: Rollenspiel
    es: Imitación
    ko: 역할
    zh_simp: 扮演
    zh_trad: 扮演
  descriptions:
    jp_kana: "相手に　なりきって　自分も　相手と\n同じ　特性に　変化する。"
    jp_kanji: "相手に　なりきって　自分も　相手と\n同じ　特性に　変化する。"
    en: "The user mimics the target completely, copying the\ntarget’s Ability."
    fr: Imite la cible et copie son talent.
    it: "Il Pokémon mima in tutto e per tutto il bersaglio,\ncopiandone l’abilità."
    de: Ahmt das Ziel nach und kopiert seine Fähigkeit.
    es: Imita al objetivo por completo y copia su habilidad.
    ko: "상대의 역할을 하여 자신도 상대와\n같은 특성으로 변화한다."
    zh_simp: "扮演对手，\n让自己的特性\n变得和对手相同。"
    zh_trad: "扮演成對手，\n讓自己的特性\n也變得和對手相同。"
rolling_kick:
  names:
    jp_kana: まわしげり
    jp_kanji: まわしげり
    en: Rolling Kick
    fr: Mawashi Geri
    it: Calciorullo
    de: Fegekick
    es: Patada Giro
    ko: 돌려차기
    zh_simp: 回旋踢
    zh_trad: 迴旋踢
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
rollout:
  names:
    jp_kana: ころがる
    jp_kanji: ころがる
    en: Rollout
    fr: Roulade
    it: Rotolamento
    de: Walzer
    es: Rodar
    ko: 구르기
    zh_simp: 滚动
    zh_trad: 滾動
  descriptions:
    jp_kana: "５ターンの　間　転がり続けて\n攻撃する。　技が　当たるたびに\n威力が　あがる。"
    jp_kanji: "５ターンの　間　転がり続けて\n攻撃する。　技が　当たるたびに\n威力が　あがる。"
    en: "The user continually rolls into the target over five turns.\nThis attack becomes more powerful each time it hits."
    fr: "Un rocher roule sur la cible pendant cinq tours.\nL’attaque gagne en puissance à chaque coup."
    it: "Il Pokémon attacca rotolando per cinque turni.\nOgni volta che la mossa va a segno, la sua potenza\naumenta."
    de: "Attacke, die fünf Runden dauert. Mit jedem Treffer\nsteigt die Stärke."
    es: "El usuario rueda contra el objetivo durante cinco\nturnos y, cada vez que acierta, aumenta la potencia\ndel movimiento."
    ko: "5턴 동안 구르기를 반복하여\n공격한다. 기술이 맞을 때마다\n위력이 올라간다."
    zh_simp: "在５回合内连续滚动攻击对手。\n招式每次击中，威力就会提高。"
    zh_trad: "在５回合內連續滾動攻擊對手。\n每擊中一次，威力就會提高。"
roost:
  names:
    jp_kana: はねやすめ
    jp_kanji: はねやすめ
    en: Roost
    fr: Atterrissage
    it: Trespolo
    de: Ruheort
    es: Respiro
    ko: 날개쉬기
    zh_simp: 羽栖
    zh_trad: 羽棲
  descriptions:
    jp_kana: "地面に　降りて　体を　やすめる。\n最大ＨＰの　半分の\nＨＰを　回復する。"
    jp_kanji: "地面に　降りて　体を　やすめる。\n最大ＨＰの　半分の\nＨＰを　回復する。"
    en: "The user lands and rests its body. This move restores the\nuser’s HP by up to half its max HP."
    fr: "Le lanceur atterrit et se repose.\nRestaure jusqu’à la moitié de ses PV max."
    it: "Il Pokémon scende a terra e si riposa, recuperando\nmetà dei propri PS massimi."
    de: "Anwender landet und ruht sich aus. KP des Anwenders\nwerden um 50 % der maximalen KP aufgefüllt."
    es: "Aterriza sobre la superficie para descansar.\nRestaura hasta la mitad de sus PS máximos."
    ko: "땅에 내려와 몸을 쉬게 한다.\n최대 HP의 절반만큼\nHP를 회복한다."
    zh_simp: "降到地面，使身体休息。\n回复自己最大ＨＰ的一半。"
    zh_trad: "降落到地面，讓身體休息。\n回復自己最大ＨＰ的一半。"
rototiller:
  names:
    jp_kana: たがやす
    jp_kanji: たがやす
    en: Rototiller
    fr: Fertilisation
    it: Aracampo
    de: Pflüger
    es: Fertilizante
    ko: 일구기
    zh_simp: 耕地
    zh_trad: 耕地
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
round:
  names:
    jp_kana: りんしょう
    jp_kanji: りんしょう
    en: Round
    fr: Chant Canon
    it: Coro
    de: Kanon
    es: Canon
    ko: 돌림노래
    zh_simp: 轮唱
    zh_trad: 輪唱
  descriptions:
    jp_kana: "歌で　相手を　攻撃する。\nみんなで　輪唱すると　続けて\nだすことが　でき　威力も　あがる。"
    jp_kanji: "歌で　相手を　攻撃する。\nみんなで　輪唱すると　続けて\nだすことが　でき　威力も　あがる。"
    en: "The user attacks the target with a song. If others use this\nmove, they will act immediately after the initial user, and\nthe power of their Rounds will be boosted."
    fr: "Le lanceur attaque la cible en chantant. Si plusieurs\nPokémon déclenchent cette attaque à la suite,\nla puissance augmente."
    it: "Chi la usa attacca il bersaglio con una melodia.\nSe usata durante lo stesso turno da più Pokémon,\nla potenza della mossa aumenta."
    de: "Angriff mit Gesang. Singt der Anwender mit allen im\nKanon, steigt die Stärke."
    es: "Entona una canción que daña al objetivo. Si otro\nPokémon lo usa en el mismo turno, ataca justo a\ncontinuación y la potencia del movimiento aumenta."
    ko: "노래로 상대를 공격한다.\n함께 돌림노래를 하면\n계속해서 쓸 수 있고 위력도 올라간다."
    zh_simp: "用歌声攻击对手。\n大家一起轮唱便可以接连使出，\n威力也会提高。"
    zh_trad: "用歌聲攻擊對手。\n大家一起輪唱便可以接連使出，\n威力也會提高。"
ruination:
  names:
    jp_kana: カタストロフィ
    jp_kanji: カタストロフィ
    en: Ruination
    fr: Cataclysme
    it: Catastrofe
    de: Verderben
    es: Calamidad
    ko: 카타스트로피
    zh_simp: 大灾难
    zh_trad: 大災難
  descriptions:
    jp_kana: "破滅的な　災厄を　巻き起こし\n相手の　ＨＰを　半分に　する。"
    jp_kanji: "破滅的な　災厄を　巻き起こし\n相手の　ＨＰを　半分に　する。"
    en: "The user summons a ruinous disaster. This cuts the\ntarget’s HP in half."
    fr: "Le lanceur déclenche un cataclysme qui baisse\nles PV de la cible de moitié."
    it: "Il Pokémon invoca una terribile disgrazia, dimezzando\ni PS del bersaglio."
    de: "Der Anwender beschwört Verderben bringendes Unheil\nherauf und halbiert die KP des Zieles."
    es: "Provoca una catástrofe devastadora que reduce a la\nmitad los PS del objetivo."
    ko: "파멸적인 재앙에 휩쓸리게 하여\n상대의 HP를 절반으로 만든다."
    zh_simp: "引发毁灭性的灾厄，\n使对手的ＨＰ减半。"
    zh_trad: "捲起破滅之災厄，\n使對手的ＨＰ減半。"
sacred_fire:
  names:
    jp_kana: せいなるほのお
    jp_kanji: せいなるほのお
    en: Sacred Fire
    fr: Feu Sacré
    it: Magifuoco
    de: Läuterfeuer
    es: Fuego Sagrado
    ko: 성스러운불꽃
    zh_simp: 神圣之火
    zh_trad: 神聖之火
  descriptions:
    jp_kana: "神秘の　炎で\n相手を　焼きつくして　攻撃する。\nやけど状態に　することが　ある。"
    jp_kanji: "神秘の　炎で\n相手を　焼きつくして　攻撃する。\nやけど状態に　することが　ある。"
    en: "The target is razed with a mystical fire of great intensity.\nThis may also leave the target with a burn."
    fr: "Le lanceur génère un feu mystique d’une intensité\nredoutable pour attaquer la cible, ce qui peut aussi\nla brûler."
    it: "Il Pokémon attacca il bersaglio con un fuoco mistico di\nenorme intensità che può anche causargli una scottatura."
    de: "Mystische Feuer-Attacke, durch die das Ziel eventuell\nVerbrennungen erleidet."
    es: "Fuego místico de gran intensidad que puede causar\nquemaduras."
    ko: "신비한 불꽃으로\n상대를 태워서 공격한다.\n화상 상태로 만들 때가 있다."
    zh_simp: "用神秘的火焰\n烧尽对手进行攻击。\n有时会让对手陷入灼伤状态。"
    zh_trad: "用神秘的火焰\n燒盡對手進行攻擊。\n有時會讓對手陷入灼傷狀態。"
sacred_sword:
  names:
    jp_kana: せいなるつるぎ
    jp_kanji: せいなるつるぎ
    en: Sacred Sword
    fr: Lame Sainte
    it: Spadasolenne
    de: Sanctoklinge
    es: Espada Santa
    ko: 성스러운칼
    zh_simp: 圣剑
    zh_trad: 聖劍
  descriptions:
    jp_kana: "つるぎで　切りつけ　攻撃する。\n相手の　能力変化に\n関係なく　ダメージを　与える。"
    jp_kanji: "つるぎで　切りつけ　攻撃する。\n相手の　能力変化に\n関係なく　ダメージを　与える。"
    en: "The user attacks by slicing with a sword. The target’s stat\nchanges don’t affect the damage inflicted by this move."
    fr: "Un violent coup d’épée qui lacère la cible et lui inflige\ndes dégâts en ignorant ses changements de stats."
    it: "Il Pokémon taglia il bersaglio con una spada magica.\nIl danno inflitto ignora le modifiche alle statistiche\ndel bersaglio."
    de: "Schneideangriff mit einer Klinge. Richtet unabhängig\nvon den Statusveränderungen des Zieles Schaden an."
    es: "El usuario ataca con una espada, ignorando cualquier\ncambio en las características del objetivo."
    ko: "칼로 베어 공격한다.\n상대의 능력 변화에\n관계없이 데미지를 준다."
    zh_simp: "用剑切斩对手进行攻击。\n无视对手的能力变化，\n直接给予伤害。"
    zh_trad: "用劍斬切對手進行攻擊。\n可不顧對手的能力變化\n給予傷害。"
safeguard:
  names:
    jp_kana: しんぴのまもり
    jp_kanji: しんぴのまもり
    en: Safeguard
    fr: Rune Protect
    it: Salvaguardia
    de: Bodyguard
    es: Velo Sagrado
    ko: 신비의부적
    zh_simp: 神秘守护
    zh_trad: 神秘守護
  descriptions:
    jp_kana: "５ターンの　間\n不思議な　力に　守られて\n状態異常に　ならなくなる。"
    jp_kanji: "５ターンの　間\n不思議な　力に　守られて\n状態異常に　ならなくなる。"
    en: "The user creates a protective field that prevents status\nconditions for five turns."
    fr: "Crée un champ protecteur qui empêche toutes\nles altérations de statut pendant cinq tours."
    it: "Il Pokémon crea un campo protettivo che previene\ni problemi di stato per cinque turni."
    de: "Team des Anwenders ist fünf Runden lang vor\nStatusproblemen geschützt."
    es: "Un poder misterioso que protege de problemas de\nestado durante cinco turnos."
    ko: "5턴 동안\n이상한 힘의 보호를 받아\n상태 이상이 되지 않는다."
    zh_simp: "在５回合内\n被神奇的力量守护，\n从而不会陷入异常状态。"
    zh_trad: "在５回合內\n被神奇的力量守護，\n不會陷入異常狀態。"
salt_cure:
  names:
    jp_kana: しおづけ
    jp_kanji: しおづけ
    en: Salt Cure
    fr: Salaison
    it: Sotto Sale
    de: Pökelsalz
    es: Salazón
    ko: 소금절이
    zh_simp: 盐腌
    zh_trad: 鹽醃
  descriptions:
    jp_kana: "相手を　しおづけ状態に　して\n毎ターン　ダメージを　与える。\nはがね　みずタイプは　より　苦しむ。"
    jp_kanji: "相手を　しおづけ状態に　して\n毎ターン　ダメージを　与える。\nはがね　みずタイプは　より　苦しむ。"
    en: "The user salt cures the target, inflicting damage every\nturn. Steel and Water types are more strongly affected\nby this move."
    fr: "Le lanceur couvre la cible de sel, ce qui lui inflige\ndes dégâts à chaque tour. Si la cible est de type Acier\nou Eau, ces dégâts sont plus élevés."
    it: "Il Pokémon mette sotto sale il bersaglio, infliggendogli\ndanni a ogni turno. I Pokémon di tipo Acciaio e di tipo\nAcqua sono particolarmente vulnerabili a questa mossa."
    de: "Der Anwender pökelt das Ziel mit Salz ein, wodurch\ndieses jede Runde Schaden erleidet. Stahl- und\nWasser-Pokémon leiden besonders darunter."
    es: "Deja en salazón al objetivo, que pierde PS cada turno.\nAfecta especialmente a Pokémon de tipo Acero y tipo\nAgua."
    ko: "상대를 소금절이 상태로 만들어\n매 턴 데미지를 준다.\n강철타입이나 물타입에게 더 고통스럽다."
    zh_simp: "使对手陷入盐腌状态，\n每回合给予对手伤害。\n对手为钢或水属性时会更痛苦。"
    zh_trad: "讓對手陷入鹽醃狀態，\n每回合都會受到傷害。\n鋼、水屬性的寶可夢還會更痛苦。"
sand_attack:
  names:
    jp_kana: すなかけ
    jp_kanji: すなかけ
    en: Sand Attack
    fr: Jet de Sable
    it: Turbosabbia
    de: Sandwirbel
    es: Ataque Arena
    ko: 모래뿌리기
    zh_simp: 泼沙
    zh_trad: 潑沙
  descriptions:
    jp_kana: "相手の　顔に　砂を　かけて\n命中率を　さげる。"
    jp_kanji: "相手の　顔に　砂を　かけて\n命中率を　さげる。"
    en: "Sand is hurled in the target’s face, lowering the\ntarget’s accuracy."
    fr: "Lance du sable au visage de la cible pour baisser\nsa Précision."
    it: "Il Pokémon getta sabbia in faccia al bersaglio e\nne riduce la precisione."
    de: "Senkt Genauigkeit des Zieles, indem ihm Sand ins\nGesicht geworfen wird."
    es: Arroja arena a la cara del objetivo y reduce su Precisión.
    ko: "상대의 얼굴에 모래를 뿌려서\n명중률을 떨어뜨린다."
    zh_simp: "向对手脸上泼沙子，\n从而降低命中率。"
    zh_trad: "向對手的臉上潑沙，\n降低對手的命中率。"
sand_tomb:
  names:
    jp_kana: すなじごく
    jp_kanji: すなじごく
    en: Sand Tomb
    fr: Tourbi-Sable
    it: Sabbiotomba
    de: Sandgrab
    es: Bucle Arena
    ko: 모래지옥
    zh_simp: 流沙深渊
    zh_trad: 流沙地獄
  descriptions:
    jp_kana: "激しく　吹きあれる　砂あらしの\n中に　４ー５ターンの　間\n相手を　閉じこめて　攻撃する。"
    jp_kanji: "激しく　吹きあれる　砂あらしの\n中に　４ー５ターンの　間\n相手を　閉じこめて　攻撃する。"
    en: "The user traps the target inside a harshly raging\nsandstorm that inflicts damage for four to five turns."
    fr: "Le lanceur emprisonne la cible dans une tempête\nde sable terrifiante qui dure de quatre à cinq tours."
    it: "Il Pokémon intrappola il bersaglio in una tempesta\ndi sabbia per quattro o cinque turni."
    de: "Das Ziel leidet für vier bis fünf Runden in einer\nSandhose."
    es: "Envuelve al objetivo en un violento remolino de arena\nque le inflige daño de cuatro a cinco turnos."
    ko: "세차게 불어 대는\n모래바람 속에 4~5턴 동안\n상대를 가두어 공격한다."
    zh_simp: "将对手困在\n铺天盖地的沙暴中，\n在４～５回合内进行攻击。"
    zh_trad: "將對手困在\n鋪天蓋地的沙暴中，\n在４～５回合內進行攻擊。"
sandsear_storm:
  names:
    jp_kana: ねっさのあらし
    jp_kanji: ねっさのあらし
    en: Sandsear Storm
    fr: Typhon Pyrosable
    it: Tempesta Ardente
    de: Wüstenorkan
    es: Simún de Arena
    ko: 열사의폭풍
    zh_simp: 热沙风暴
    zh_trad: 熱沙風暴
  descriptions:
    jp_kana: "熱く焼けた砂と　強烈な風で\n包みこんで　攻撃する。\n相手を　やけど状態に　することがある。"
    jp_kanji: "熱く焼けた砂と　強烈な風で\n包みこんで　攻撃する。\n相手を　やけど状態に　することがある。"
    en: "The user attacks by wrapping opposing Pokémon in\nfierce winds and searingly hot sand. This may also leave\nthem with a burn."
    fr: "Le lanceur déclenche un violent typhon mêlé à du sable\nardent qui s’abat sur la cible, ce qui peut la brûler."
    it: "Il Pokémon attacca il bersaglio avvolgendolo con sabbia\nardente e un vento fortissimo che possono scottarlo."
    de: "Der Anwender greift gegnerische Pokémon an, indem er\nsie mit heftigen Windböen und brennend heißem Sand\numgibt. Eventuell erleiden sie Verbrennungen."
    es: "Ataca al objetivo envolviéndolo en unas arenas tórridas\ny un fuerte vendaval que pueden causar quemaduras."
    ko: "뜨겁게 달궈진 모래와 강렬한 바람으로\n상대를 둘러싸서 공격한다.\n상대를 화상 상태로 만들 때가 있다."
    zh_simp: "用灼热的沙子和强烈的风\n席卷对手进行攻击。\n有时会让对手陷入灼伤状态。"
    zh_trad: "用灼熱的沙子和強烈的風\n席捲對手進行攻擊。\n有時會讓對手陷入灼傷狀態。"
sandstorm:
  names:
    jp_kana: すなあらし
    jp_kanji: すなあらし
    en: Sandstorm
    fr: Tempête de Sable
    it: Terrempesta
    de: Sandsturm
    es: Tormenta Arena
    ko: 모래바람
    zh_simp: 沙暴
    zh_trad: 沙暴
  descriptions:
    jp_kana: "５ターンの　間　砂あらしで　いわ\nじめん　はがねタイプ　以外に　ダメージ。\nいわタイプの　特防が　あがる。"
    jp_kanji: "５ターンの　間　砂あらしで　いわ\nじめん　はがねタイプ　以外に　ダメージ。\nいわタイプの　特防が　あがる。"
    en: "A five-turn sandstorm is summoned to damage all\nPokémon except Rock, Ground, and Steel types. The\nsandstorm also boosts the Sp. Def stats of Rock types."
    fr: "Une tempête de sable blesse tous les Pokémon pendant\ncinq tours, sauf ceux de type Roche, Sol ou Acier.\nAugmente la Défense Spéciale des Pokémon Roche."
    it: "Per cinque turni, chi la usa causa una tempesta di sabbia\nche danneggia tutti i tipi esclusi Terra, Roccia e Acciaio.\nAumenta la Difesa Speciale dei Pokémon di tipo Roccia."
    de: "Sandsturm für fünf Runden. Schadet Pokémon aller\nTypen außer Gestein, Boden und Stahl. Erhöht die\nSpezial-Verteidigung von Gesteins-Pokémon."
    es: "Tormenta de arena que dura cinco turnos y hiere a\ntodos, excepto a los de tipo Roca, Tierra y Acero,\ny aumenta la Defensa Especial de los de tipo Roca."
    ko: "5턴 동안 모래바람을 일으켜\n바위, 땅, 강철타입 이외의 상대에게 데미지를 준다.\n바위타입의 특수방어가 올라간다."
    zh_simp: "在５回合内扬起沙暴，除岩石、地面和\n钢属性以外的宝可梦，都会受到伤害。\n岩石属性的特防还会提高。"
    zh_trad: "揚起沙暴，在５回合內給予\n岩石、地面和鋼屬性以外的寶可夢傷害。\n岩石屬性寶可夢的特防會提高。"
sappy_seed:
  names:
    jp_kana: すくすくボンバー
    jp_kanji: すくすくボンバー
    en: Sappy Seed
    fr: Évo-Écolo
    it: Bombafrush
    de: Sprießbomben
    es: Leafitobombas
    ko: 쑥쑥봄버
    zh_simp: 茁茁炸弹
    zh_trad: 茁茁轟炸
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
savage_spin_out:physical:
  names:
    jp_kana: ぜったいほしょくかいてんざん
    jp_kanji: ぜったいほしょくかいてんざん
    en: Savage Spin-Out
    fr: Cocon Fatal
    it: Bozzolo Fatale
    de: Wirbelnder Insektenhieb
    es: Guadaña Sedosa
    ko: 절대포식회전참
    zh_simp: 绝对捕食回旋斩
    zh_trad: 絕對捕食迴旋斬
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
