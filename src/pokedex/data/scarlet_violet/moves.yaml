    fr: Pikachute Foudroyante
    it: Super Pikaboom
    de: Perfektes Pika-Projektil
    es: Pikavoltio Letal
    ko: 필살피카슛
    zh_simp: 皮卡皮卡必杀击
    zh_trad: 皮卡皮卡必殺擊
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
