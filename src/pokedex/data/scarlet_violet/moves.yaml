    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
mega_drain:
  names:
    jp_kana: メガドレイン
    jp_kanji: メガドレイン
    en: Mega Drain
    fr: Méga-Sangsue
    it: Megassorbimento
    de: Megasauger
    es: Megaagotar
    ko: 메가드레인
    zh_simp: 超级吸取
    zh_trad: 超級吸取
  descriptions:
    jp_kana: "養分を　吸い取り　攻撃する。\n相手に　与えた　ダメージの\n半分の　ＨＰを　回復できる。"
    jp_kanji: "養分を　吸い取り　攻撃する。\n相手に　与えた　ダメージの\n半分の　ＨＰを　回復できる。"
    en: "A nutrient-draining attack. The user’s HP is restored\nby up to half the damage taken by the target."
    fr: "Une attaque qui absorbe les nutriments et convertit\nla moitié des dégâts infligés en PV pour le lanceur."
    it: "Il Pokémon attacca assorbendo sostanze nutritive e\nrecupera una quantità di PS pari alla metà del danno\ninflitto."
    de: "Entzieht dem Ziel Nährstoffe. Die Hälfte des\nzugefügten Schadens wird dem Anwender\nals KP gutgeschrieben."
    es: "Un ataque que absorbe nutrientes. El usuario recupera\nla mitad de los PS del daño que produce."
    ko: "양분을 흡수하여 공격한다.\n상대에게 입힌 데미지의\n절반에 해당하는 HP를 회복할 수 있다."
    zh_simp: "吸取对手的养分进行攻击。\n可以回复给予对手\n伤害的一半ＨＰ。"
    zh_trad: "吸取對手的養分進行攻擊。\n可以回復給予對手\n傷害的一半ＨＰ。"
mega_kick:
  names:
    jp_kana: メガトンキック
    jp_kanji: メガトンキック
    en: Mega Kick
    fr: Ultimawashi
    it: Megacalcio
    de: Megakick
    es: Megapatada
    ko: 메가톤킥
    zh_simp: 百万吨重踢
    zh_trad: 百萬噸重踢
  descriptions:
    jp_kana: "ものすごい　力を　こめた　キックで\n相手を　けとばして　攻撃する。"
    jp_kanji: "ものすごい　力を　こめた　キックで\n相手を　けとばして　攻撃する。"
    en: "The target is attacked by a kick launched with muscle-\npacked power."
    fr: Un coup de pied surpuissant qui frappe la cible.
    it: "Il Pokémon attacca il bersaglio con un calcio sferrato\ncon la forza di muscoli poderosi."
    de: "Das Ziel wird mit einem extrem heftigen Tritt\nangegriffen."
    es: Patada de extrema fuerza.
    ko: "굉장한 힘을 담은 킥으로\n상대를 걷어차서 공격한다."
    zh_simp: "使出力大无穷的重踢\n踢飞对手进行攻击。"
    zh_trad: "用灌注了巨大力量的重踢\n踢飛對手進行攻擊。"
mega_punch:
  names:
    jp_kana: メガトンパンチ
    jp_kanji: メガトンパンチ
    en: Mega Punch
    fr: Ultimapoing
    it: Megapugno
    de: Megahieb
    es: Megapuño
    ko: 메가톤펀치
    zh_simp: 百万吨重拳
    zh_trad: 百萬噸重拳
  descriptions:
    jp_kana: "力を　こめた　パンチで\n相手を　攻撃する。"
    jp_kanji: "力を　こめた　パンチで\n相手を　攻撃する。"
    en: "The target is slugged by a punch thrown with muscle-\npacked power."
    fr: "La cible reçoit un coup de poing d’une grande\npuissance."
    it: Il Pokémon attacca il bersaglio con un pugno poderoso.
    de: Ein unglaublich kräftiger Hieb.
    es: Puñetazo de gran potencia.
    ko: "힘을 담은 펀치로\n상대를 공격한다."
    zh_simp: 用充满力量的拳头攻击对手。
    zh_trad: "用帶有強大力量的拳頭\n攻擊對手。"
megahorn:
  names:
    jp_kana: メガホーン
    jp_kanji: メガホーン
    en: Megahorn
    fr: Mégacorne
    it: Megacorno
    de: Vielender
    es: Megacuerno
    ko: 메가혼
    zh_simp: 超级角击
    zh_trad: 超級角擊
  descriptions:
    jp_kana: "硬くて　りっぱな　つので　おもいっきり\n相手を　突き刺して　攻撃する。"
    jp_kanji: "硬くて　りっぱな　つので　おもいっきり\n相手を　突き刺して　攻撃する。"
    en: "Using its tough and impressive horn, the user rams into\nthe target with no letup."
    fr: Le lanceur inflige un grand coup de corne à la cible.
    it: "Il Pokémon usa il suo robusto e imponente corno\nper attaccare il bersaglio con tutto se stesso."
    de: "Brutaler Ramm-Angriff mit spitzem,\nbeeindruckendem Horn."
    es: "Ensarta al objetivo con su imponente cuerno\no cornamenta."
    ko: "단단하고 훌륭한 뿔로 힘껏\n상대를 꿰찔러서 공격한다."
    zh_simp: "用坚硬且华丽的角狠狠地\n刺入对手进行攻击。"
    zh_trad: "用堅硬且華麗的角狠狠地\n刺進對手進行攻擊。"
memento:
  names:
    jp_kana: おきみやげ
    jp_kanji: おきみやげ
    en: Memento
    fr: Souvenir
    it: Memento
    de: Memento-Mori
    es: Legado
    ko: 추억의선물
    zh_simp: 临别礼物
    zh_trad: 臨別禮物
  descriptions:
    jp_kana: "自分は　ひんしに　なるが　そのかわりに\n相手の　攻撃と　特攻を\nがくっと　さげる。"
    jp_kanji: "自分は　ひんしに　なるが　そのかわりに\n相手の　攻撃と　特攻を\nがくっと　さげる。"
    en: "The user faints. In return, the target’s Attack and Sp. Atk\nstats are harshly lowered."
    fr: "Le lanceur est mis K.O., mais l’Attaque et\nl’Attaque Spéciale de la cible baissent beaucoup."
    it: "Il Pokémon va KO. Tuttavia, riduce di molto l’Attacco\ne l’Attacco Speciale del bersaglio."
    de: "Der Anwender wird besiegt. Gleichzeitig werden der\nAngriff und Spezial-Angriff des Zieles stark gesenkt."
    es: "El usuario se debilita, pero reduce mucho tanto el\nAtaque como el Ataque Especial del objetivo."
    ko: "자신은 기절하게 되지만 그 대신\n상대의 공격과 특수공격을\n크게 떨어뜨린다."
    zh_simp: "虽然会使自己陷入昏厥，\n但是能够大幅降低\n对手的攻击和特攻。"
    zh_trad: "雖然自己會陷入瀕死，\n但可以大幅降低\n對手的攻擊和特攻。"
menacing_moonraze_maelstrom:
  names:
    jp_kana: ムーンライトブラスター
    jp_kanji: ムーンライトブラスター
    en: Menacing Moonraze Maelstrom
    fr: Rayons Séléno-Explosifs
    it: Deflagrazione Lunare
    de: Geballter Mondlaser
    es: Deflagración Lunar
    ko: 문라이트블래스터
    zh_simp: 月华飞溅落灵霄
    zh_trad: 月華飛濺落靈霄
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
metal_burst:
  names:
    jp_kana: メタルバースト
    jp_kanji: メタルバースト
    en: Metal Burst
    fr: Fulmifer
    it: Metalscoppio
    de: Metallstoß
    es: Represión Metal
    ko: 메탈버스트
    zh_simp: 金属爆炸
    zh_trad: 金屬爆炸
  descriptions:
    jp_kana: "技を　だす前に\n最後に　受けた　技の　ダメージを\n大きくして　だした　相手に　返す。"
    jp_kanji: "技を　だす前に\n最後に　受けた　技の　ダメージを\n大きくして　だした　相手に　返す。"
    en: "The user retaliates with much greater force against the\nopponent that last inflicted damage on it."
    fr: "Le lanceur contre-attaque avec un coup infligeant\ndes dégâts supérieurs à ceux de la dernière capacité\nqui l’a blessé."
    it: "Il Pokémon restituisce con gli interessi i danni subiti\nall’ultimo avversario che l’ha colpito."
    de: "Der Anwender rächt sich an dem Gegner, der ihm mit\neiner Attacke zuletzt Schaden zugefügt hat, indem\ner ihm den Schaden mit erhöhter Kraft zurückzahlt."
    es: "Devuelve al rival el último ataque recibido, pero con\nmucha más fuerza."
    ko: "기술을 쓰기 전에\n마지막으로 받은 기술의 데미지를 늘려서\n기술을 쓴 상대에게 돌려준다."
    zh_simp: "使出招式前，\n将最后受到的招式的伤害\n大力返还给对手。"
    zh_trad: "將發動攻擊前\n最後受到的招式傷害放大，\n向對手進行反擊。"
metal_claw:
  names:
    jp_kana: メタルクロー
    jp_kanji: メタルクロー
    en: Metal Claw
    fr: Griffe Acier
    it: Ferrartigli
    de: Metallklaue
    es: Garra Metal
    ko: 메탈클로
    zh_simp: 金属爪
    zh_trad: 金屬爪
  descriptions:
    jp_kana: "鋼鉄の　ツメで\n相手を　切り裂いて　攻撃する。\n自分の　攻撃が　あがることが　ある。"
    jp_kanji: "鋼鉄の　ツメで\n相手を　切り裂いて　攻撃する。\n自分の　攻撃が　あがることが　ある。"
    en: "The target is raked with steel claws. This may also boost\nthe user’s Attack stat."
    fr: "Attaque avec des griffes d’acier.\nPeut aussi augmenter l’Attaque du lanceur."
    it: "Il Pokémon attacca il bersaglio con artigli d’acciaio.\nPuò anche aumentare il proprio Attacco."
    de: "Klauen-Attacke, die eventuell den Angriffs-Wert des\nAnwenders erhöht."
    es: "Ataque con garras de acero que puede aumentar el\nAtaque del usuario."
    ko: "강철의 발톱으로\n상대를 베어 갈라 공격한다.\n자신의 공격이 올라갈 때도 있다."
    zh_simp: "用钢铁之爪\n劈开对手进行攻击。\n有时会提高自己的攻击。"
    zh_trad: "用鋼鐵之爪\n撕裂對手進行攻擊。\n有時會提高自己的攻擊。"
metal_sound:
  names:
    jp_kana: きんぞくおん
    jp_kanji: きんぞくおん
    en: Metal Sound
    fr: Strido-Son
    it: Ferrostrido
    de: Metallsound
    es: Eco Metálico
    ko: 금속음
    zh_simp: 金属音
    zh_trad: 金屬音
  descriptions:
    jp_kana: "金属を　こすって　でるような\nいやな　音を　聞かせる。\n相手の　特防を　がくっと　さげる。"
    jp_kanji: "金属を　こすって　でるような\nいやな　音を　聞かせる。\n相手の　特防を　がくっと　さげる。"
    en: "A horrible sound like scraping metal harshly lowers the\ntarget’s Sp. Def stat."
    fr: "Un cri horrible tel un crissement métallique qui\nréduit beaucoup la Défense Spéciale de la cible."
    it: "Orribile stridio, simile a quello prodotto sfregando\nil metallo, che riduce di molto la Difesa Speciale\ndel bersaglio."
    de: "Stößt einen spitzen Schrei aus, der die\nSpezial-Verteidigung des Zieles stark senkt."
    es: "Horrible chirrido metálico que reduce mucho la Defensa\nEspecial del objetivo."
    ko: "금속을 긁을 때 나는 듯한\n싫은 소리를 들려준다.\n상대의 특수방어를 크게 떨어뜨린다."
    zh_simp: "让对手听摩擦金属般\n讨厌的声音。\n大幅降低对手的特防。"
    zh_trad: "讓對手聽如同金屬摩擦般\n的刺耳聲。\n大幅降低對手的特防。"
meteor_assault:
  names:
    jp_kana: スターアサルト
    jp_kanji: スターアサルト
    en: Meteor Assault
    fr: Joute Astrale
    it: Sfolgorassalto
    de: Sternensturm
    es: Asalto Estelar
    ko: 스타어설트
    zh_simp: 流星突击
    zh_trad: 流星突擊
  descriptions:
    jp_kana: "太い　クキを　ふりまわして　攻撃。\nただし　自分も　よろめいてしまうため\n次の　ターンは　動けなくなる。"
    jp_kanji: "太い　クキを　ふりまわして　攻撃。\nただし　自分も　よろめいてしまうため\n次の　ターンは　動けなくなる。"
    en: "The user attacks wildly with its thick leek. The user can’t\nmove on the next turn, because the force of this move\nmakes it stagger."
    fr: "Le lanceur attaque la cible avec son poireau.\nToutefois, cette action le fait vaciller et il doit\nse reposer au tour suivant."
    it: "Il Pokémon attacca il bersaglio brandendo un grosso\ngambo, ma perde l’equilibrio e nel turno successivo\nnon può agire."
    de: "Der Anwender greift mit seiner Lauchstange an. Von der\nWucht der Attacke wird ihm jedoch so schwindelig,\ndass er in der nächsten Runde nicht handeln kann."
    es: "El usuario agita violentamente su grueso puerro para\natacar, pero el mareo que le provocan las sacudidas le\nobliga a descansar en el siguiente turno."
    ko: "굵은 줄기를 휘둘러서 공격한다.\n단, 자신도 비틀거리기 때문에\n다음 턴은 움직일 수 없다."
    zh_simp: "大力挥舞粗壮的茎进行攻击。\n但同时自己也会被晃晕，\n下一回合自己将无法动弹。"
    zh_trad: "揮舞粗壯的莖進行攻擊。\n但同時自己也會站不穩，\n下一回合將無法動彈。"
meteor_beam:
  names:
    jp_kana: メテオビーム
    jp_kanji: メテオビーム
    en: Meteor Beam
    fr: Laser Météore
    it: Raggiometeora
    de: Meteorstrahl
    es: Rayo Meteórico
    ko: 메테오빔
    zh_simp: 流星光束
    zh_trad: 流星光束
  descriptions:
    jp_kana: "１ターン目に　宇宙の　力を\n集めることで　特攻が　あがり\n２ターン目に　相手を　攻撃する。"
    jp_kanji: "１ターン目に　宇宙の　力を\n集めることで　特攻が　あがり\n２ターン目に　相手を　攻撃する。"
    en: "The user gathers energy from space and boosts its\nSp. Atk stat on the first turn, then attacks on the\nnext turn."
    fr: "Le lanceur concentre l’énergie cosmique au premier\ntour, ce qui augmente son Attaque Spéciale, et frappe\nau second."
    it: "Il Pokémon accumula l’energia dello spazio nel primo\nturno per aumentare l’Attacco Speciale, quindi\nattacca nel turno successivo."
    de: "Der Anwender sammelt in Runde 1 kosmische Kräfte\nund erhöht damit seinen Spezial-Angriff, bevor er in\nRunde 2 das Ziel angreift."
    es: "El usuario dedica el primer turno a aumentar su\nAtaque Especial acumulando energía cósmica y lanza\nsu ofensiva contra el objetivo en el segundo."
    ko: "1턴째에 우주의 힘을 모아서\n특수공격을 올리고\n2턴째에 상대를 공격한다."
    zh_simp: "第１回合聚集宇宙之力提高特攻，\n第２回合攻击对手。"
    zh_trad: "使用後的第１回合會聚集\n宇宙的力量來提高特攻，\n並於第２回合攻擊對手。"
meteor_mash:
  names:
    jp_kana: コメットパンチ
    jp_kanji: コメットパンチ
    en: Meteor Mash
    fr: Poing Météore
    it: Meteorpugno
    de: Sternenhieb
    es: Puño Meteoro
    ko: 코멧펀치
    zh_simp: 彗星拳
    zh_trad: 彗星拳
  descriptions:
    jp_kana: "すい星の　ごとく　パンチを　くりだして\n相手を　攻撃する。　自分の\n攻撃が　あがることが　ある。"
    jp_kanji: "すい星の　ごとく　パンチを　くりだして\n相手を　攻撃する。　自分の\n攻撃が　あがることが　ある。"
    en: "The target is hit with a hard punch fired like a meteor.\nThis may also boost the user’s Attack stat."
    fr: "Un coup de poing lancé à la vitesse d’un météore.\nPeut aussi augmenter l’Attaque du lanceur."
    it: "Il Pokémon attacca il bersaglio con un pugno veloce\ncome una meteora. Può anche aumentare il proprio\nAttacco."
    de: "Angriff mit einem harten, schnellen Schlag. Erhöht\neventuell Angriffs-Wert des Anwenders."
    es: "Puñetazo que impacta como un meteorito y puede\naumentar el Ataque del usuario."
    ko: "혜성과 같은 펀치를 날려서\n상대를 공격한다. 자신의\n공격이 올라갈 때가 있다."
    zh_simp: "使出彗星般的拳头攻击对手。\n有时会提高自己的攻击。"
    zh_trad: "使出如同彗星般的拳頭攻擊對手。\n有時會提高自己的攻擊。"
metronome:
  names:
    jp_kana: ゆびをふる
    jp_kanji: ゆびをふる
    en: Metronome
    fr: Métronome
    it: Metronomo
    de: Metronom
    es: Metrónomo
    ko: 손가락흔들기
    zh_simp: 挥指
    zh_trad: 揮指
  descriptions:
    jp_kana: "指をふり　自分の　脳を　刺激して\nたくさんの技の　なかから\nどれか　１つを　くりだす。"
    jp_kanji: "指をふり　自分の　脳を　刺激して\nたくさんの技の　なかから\nどれか　１つを　くりだす。"
    en: "The user waggles a finger and stimulates its brain into\nrandomly using nearly any move."
    fr: "Le lanceur agite un doigt et stimule son cerveau pour\nutiliser presque n’importe quelle capacité au hasard."
    it: "Il Pokémon fa di no con il dito e stimola il cervello\na usare a caso una delle tante mosse esistenti."
    de: "Der Anwender wackelt mit dem Finger und stimuliert so\nsein Gehirn, um aus fast allen existierenden Attacken\neine nach Zufallsprinzip auszuwählen und einzusetzen."
    es: "Mueve un dedo y estimula su cerebro para usar al azar\ncasi cualquier movimiento."
    ko: "손가락을 흔들어 자신의 뇌를\n자극해서 다양한 기술 중\n어느 하나를 날린다."
    zh_simp: "挥动手指刺激自己的大脑，\n从许多的招式中\n随机使出１个。"
    zh_trad: "揮動手指刺激自己的大腦，\n從許多的招式中\n隨機選出１招使出。"
mighty_cleave:
  names:
    jp_kana: パワフルエッジ
    jp_kanji: パワフルエッジ
    en: Mighty Cleave
    fr: Lame Puissante
    it: Taglio Poderoso
    de: Wuchtklinge
    es: Filo Potente
    ko: 파워풀에지
    zh_simp: 强刃攻击
    zh_trad: 強刃攻擊
  descriptions:
    jp_kana: "頭部に　蓄積した　光で　切断する。\n守りを　無視して　攻撃できる。"
    jp_kanji: "頭部に　蓄積した　光で　切断する。\n守りを　無視して　攻撃できる。"
    en: "The user wields the light that has accumulated atop its\nhead to cleave the target. This move hits even if the\ntarget protects itself."
    fr: "Le lanceur pourfend la cible avec la lumière accumulée\nsur sa tête. Cette attaque passe outre les protections."
    it: "Il Pokémon fende il bersaglio con la luce immagazzinata\nnella testa, ignorando gli effetti delle mosse protettive."
    de: "Der Anwender führt mit dem in seinem Kopf\ngespeicherten Licht einen Schnitt aus. Diese Attacke\ntrifft auch, wenn das Ziel sich selbst schützt."
    es: "Rebana al objetivo con la luz que ha acumulado en la\ntesta. Permite acertar aunque el objetivo esté\nprotegiéndose."
    ko: "머리에 축적된 빛으로 절단한다.\n기술 방어를 무시하고 공격할 수 있다."
    zh_simp: "用积蓄在头部的光来斩切对手。\n可以无视守护进行攻击。"
    zh_trad: "用積蓄在頭部的光斬斷對手。\n可不顧對手的守護進行攻擊。"
milk_drink:
  names:
    jp_kana: ミルクのみ
    jp_kanji: ミルクのみ
    en: Milk Drink
    fr: Lait à Boire
    it: Buonlatte
    de: Milchgetränk
    es: Batido
    ko: 우유마시기
    zh_simp: 喝牛奶
    zh_trad: 喝牛奶
  descriptions:
    jp_kana: "最大ＨＰの　半分\n自分の　ＨＰを　回復する。"
    jp_kanji: "最大ＨＰの　半分\n自分の　ＨＰを　回復する。"
    en: The user restores its own HP by up to half its max HP.
    fr: Le lanceur récupère jusqu’à la moitié de ses PV max.
    it: Il Pokémon recupera metà dei propri PS massimi.
    de: "KP des Anwenders werden um 50 % der maximalen KP\naufgefüllt."
    es: Restaura la mitad de los PS máximos del usuario.
    ko: "자신의 최대 HP 절반을\n회복한다."
    zh_simp: 回复自己最大ＨＰ的一半。
    zh_trad: 回復自己最大ＨＰ的一半。
mimic:
  names:
    jp_kana: ものまね
    jp_kanji: ものまね
    en: Mimic
    fr: Copie
    it: Mimica
    de: Mimikry
    es: Mimético
    ko: 흉내내기
    zh_simp: 模仿
    zh_trad: 模仿
  descriptions:
    jp_kana: "相手が　最後に　使った　技を\n戦闘の　あいだ\n自分の　技に　することが　できる。"
    jp_kanji: "相手が　最後に　使った　技を\n戦闘の　あいだ\n自分の　技に　することが　できる。"
    en: "The user copies the move last used by the target.\nThe copied move can be used until the user of Mimic\nleaves the battle."
    fr: "Le lanceur copie la dernière capacité utilisée par\nla cible et la conserve tant qu’il reste au combat."
    it: "Il Pokémon copia l’ultima mossa usata dal bersaglio\ne la conserva finché rimane in campo."
    de: "Kopiert die zuvor ausgeführte Attacke des Zieles.\nDiese kann im Kampf bis zur Auswechslung verwendet\nwerden."
    es: "Copia el último movimiento usado por el objetivo,\ny puede utilizarlo mientras esté en el combate."
    ko: "상대가 마지막에 사용한 기술을\n배틀을 하는 동안\n자신의 기술로 만들 수 있다."
    zh_simp: "可以将对手\n最后使用的招式，\n在战斗内变成自己的招式。"
    zh_trad: "在戰鬥期間，\n將對手最近一次使用的招式\n變成自己的招式。"
mind_blown:
  names:
    jp_kana: ビックリヘッド
    jp_kanji: ビックリヘッド
    en: Mind Blown
    fr: Caboche-Kaboum
    it: Sbalorditesta
    de: Knallkopf
    es: Cabeza Sorpresa
    ko: 깜짝헤드
    zh_simp: 惊爆大头
    zh_trad: 驚爆大頭
  descriptions:
    jp_kana: "自分の　頭を　爆発　させて\n周りの　すべてを　攻撃する。\n自分も　ダメージを　受けてしまう。"
    jp_kanji: "自分の　頭を　爆発　させて\n周りの　すべてを　攻撃する。\n自分も　ダメージを　受けてしまう。"
    en: "The user attacks everything around it by causing its own\nhead to explode. This also damages the user."
    fr: "Le lanceur fait exploser sa tête pour attaquer\ntoutes les cibles autour de lui.\nIl subit aussi des dégâts."
    it: "Chi la usa fa esplodere la propria testa per\nattaccare tutti i Pokémon che ha intorno,\nma subisce danni."
    de: "Der Anwender greift alle Pokémon im Umkreis an,\nindem er seinen Kopf explodieren lässt. Dabei verletzt\ner sich auch selbst."
    es: "El usuario hace explotar su cabeza para atacar a los\nPokémon adyacentes, aunque también se hiere a sí\nmismo."
    ko: "자신의 머리를 폭발시켜\n주위의 모든 것을 공격한다.\n자신도 데미지를 받는다."
    zh_simp: "让自己的头爆炸，\n来攻击周围的一切。\n自己也会受到伤害。"
    zh_trad: "會讓自己的頭爆炸，\n來攻擊周遭的一切。\n自己也會受到傷害。"
mind_reader:
  names:
    jp_kana: こころのめ
    jp_kanji: こころのめ
    en: Mind Reader
    fr: Lire-Esprit
    it: Leggimente
    de: Willensleser
    es: Telépata
    ko: 마음의눈
    zh_simp: 心之眼
    zh_trad: 心之眼
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
minimize:
  names:
    jp_kana: ちいさくなる
    jp_kanji: ちいさくなる
    en: Minimize
    fr: Lilliput
    it: Minimizzato
    de: Komprimator
    es: Reducción
    ko: 작아지기
    zh_simp: 变小
    zh_trad: 變小
  descriptions:
    jp_kana: "体を　ちぢめて　小さく　みせて\n自分の　回避率を\nぐーんと　あげる。"
    jp_kanji: "体を　ちぢめて　小さく　みせて\n自分の　回避率を\nぐーんと　あげる。"
    en: "The user compresses its body to make itself look smaller,\nwhich sharply boosts its evasiveness."
    fr: "Le lanceur comprime son corps pour se faire tout petit\net beaucoup augmenter son Esquive."
    it: "Il corpo del Pokémon si comprime e diventa più piccolo.\nLa sua elusione aumenta di molto."
    de: "Anwender schrumpft, um seinen Ausweichwert stark zu\nerhöhen."
    es: El usuario mengua para aumentar mucho la Evasión.
    ko: "몸을 축소하여 작게 보임으로써\n자신의 회피율을 크게 올린다."
    zh_simp: "蜷缩身体显得很小，\n从而大幅提高\n自己的闪避率。"
    zh_trad: "蜷縮身體使自己顯得很小，\n大幅提高\n自己的閃避率。"
miracle_eye:
  names:
    jp_kana: ミラクルアイ
    jp_kanji: ミラクルアイ
