  names:
    jp_kana: ミラーショット
    jp_kanji: ミラーショット
    en: Mirror Shot
    fr: Miroi-Tir
    it: Cristalcolpo
    de: Spiegelsalve
    es: Disparo Espejo
    ko: 미러샷
    zh_simp: 镜光射击
    zh_trad: 鏡光射擊
  descriptions:
