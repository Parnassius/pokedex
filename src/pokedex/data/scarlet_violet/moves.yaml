    jp_kanji: "毒でできた鎖を　相手に　巻きつけ\n毒素を　流しこんで　蝕む。\n猛毒の　状態に　することが　ある。"
    en: "The user pours toxins into the target by wrapping them\nin a toxic, corrosive chain. This may also leave the target\nbadly poisoned."
    fr: "Le lanceur ligote la cible avec une chaîne faite de\npoison et lui injecte un venin corrosif, ce qui peut\naussi gravement l’empoisonner."
    it: "Il Pokémon logora il bersaglio avvolgendolo\ncon le sue catene fatte di veleno e iniettandogli\ndelle tossine che possono anche iperavvelenarlo."
    de: "Der Anwender umwickelt das Ziel mit einer Kette aus\nToxinen, die in dessen Körper eindringen und ihm\nschaden. Das Ziel wird eventuell schwer vergiftet."
    es: "Apresa al objetivo con una cadena hecha de ponzoña\nque le inocula toxinas para minarle las fuerzas. Puede\nenvenenar gravemente."
    ko: "독으로 된 사슬로 상대를 휘감은 뒤\n독소를 흘려보내어 해치운다.\n맹독 상태로 만들 때가 있다."
    zh_simp: "用由毒形成的锁链缠住对手\n注入毒素加以侵蚀。\n有时会让对手陷入剧毒状态。"
    zh_trad: "用毒素形成的鎖鏈纏住對手，\n注入毒素加以侵蝕。\n有時會讓對手陷入劇毒狀態。"
mat_block:
  names:
    jp_kana: たたみがえし
    jp_kanji: たたみがえし
    en: Mat Block
    fr: Tatamigaeshi
    it: Ribaltappeto
    de: Tatami-Schild
    es: Escudo Tatami
    ko: 마룻바닥세워막기
    zh_simp: 掀榻榻米
    zh_trad: 掀榻榻米
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
matcha_gotcha:
  names:
    jp_kana: シャカシャカほう
    jp_kanji: シャカシャカほう
    en: Matcha Gotcha
    fr: Mortier Matcha
    it: Spruzzatè
    de: Quirlschuss
    es: Cañón Batidor
    ko: 휘적휘적포
    zh_simp: 刷刷茶炮
    zh_trad: 刷刷茶炮
  descriptions:
    jp_kana: "かきまぜた　お茶の　大砲は　与えた\nダメージの　半分の　ＨＰを　回復して\nやけど状態に　することも　ある。"
    jp_kanji: "かきまぜた　お茶の　大砲は　与えた\nダメージの　半分の　ＨＰを　回復して\nやけど状態に　することも　ある。"
    en: "The user fires a blast of tea that it mixed. The user’s HP\nis restored by up to half the damage taken by the target.\nThis may also leave the target with a burn."
    fr: "Le lanceur remue son thé et en bombarde la cible.\nLa moitié des dégâts infligés sont convertis en PV pour\nle lanceur. Cette capacité peut aussi brûler la cible."
    it: "Il Pokémon attacca mescolando del tè e spruzzandolo,\nrecuperando una quantità di PS pari alla metà del danno\ninflitto. Può anche scottare il bersaglio."
    de: "Der Anwender verschießt gequirlten Tee. Die Hälfte des\nzugefügten Schadens wird ihm als KP gutgeschrieben.\nDas Ziel erleidet eventuell Verbrennungen."
    es: "Rocía al objetivo con té recién batido y recupera\nla mitad de los PS del daño que produce. Puede\ncausar quemaduras."
    ko: "휘저은 차를 대포처럼 발사해\n준 데미지의 절반을 HP로 회복한다.\n화상 상태로 만들 때도 있다."
    zh_simp: "发射经搅拌的茶的大炮，\n可以回复给予对手伤害的一半ＨＰ，\n有时会让对手陷入灼伤状态。"
    zh_trad: "像大炮般發射攪拌過的茶。\n可以回復給予對手傷害的一半ＨＰ，\n有時還會讓對手陷入灼傷狀態。"
max_airstream:
  names:
    jp_kana: ダイジェット
    jp_kanji: ダイジェット
    en: Max Airstream
    fr: Aéromax
    it: Dynajet
    de: Dyna-Düse
    es: Maxiciclón
    ko: 다이제트
    zh_simp: 极巨飞冲
    zh_trad: 極巨飛衝
  descriptions:
    jp_kana: "ダイマックスした　ポケモンが\n繰りだす　ひこうタイプの　攻撃。\n味方の　素早さを　上げる。"
    jp_kanji: "ダイマックスした　ポケモンが\n繰りだす　ひこうタイプの　攻撃。\n味方の　素早さを　上げる。"
    en: "This is a Flying-type attack Dynamax Pokémon use.\nThis boosts ally Pokémon’s Speed stats."
    fr: "Une attaque de type Vol que seuls\nles Pokémon Dynamax peuvent utiliser.\nAugmente la Vitesse des alliés."
    it: "Un attacco di tipo Volante che può essere eseguito\ndai Pokémon dynamaxizzati. Aumenta la Velocità\ndegli alleati."
    de: "Eine Flug-Attacke, die nur Dynamax-Pokémon\neinsetzen können. Erhöht die Initiative der\nMitstreiterseite."
    es: "Ataque de tipo Volador ejecutado por un Pokémon\nDinamax. Aumenta la Velocidad de tu bando."
    ko: "다이맥스한 포켓몬이 날리는\n비행타입의 공격.\n같은 편의 스피드를 올린다."
    zh_simp: "极巨化宝可梦使出的飞行属性攻击。\n会提高我方的速度。"
    zh_trad: "極巨化寶可夢\n所使出的飛行屬性攻擊。\n可提高我方的速度。"
max_darkness:
  names:
    jp_kana: ダイアーク
    jp_kanji: ダイアーク
    en: Max Darkness
    fr: Sinistromax
    it: Dynatenebre
    de: Dyna-Dunkel
    es: Maxisombra
    ko: 다이아크
    zh_simp: 极巨恶霸
    zh_trad: 極巨惡霸
  descriptions:
    jp_kana: "ダイマックスした　ポケモンが\n繰りだす　あくタイプの　攻撃。\n相手の　特防を　下げる。"
    jp_kanji: "ダイマックスした　ポケモンが\n繰りだす　あくタイプの　攻撃。\n相手の　特防を　下げる。"
    en: "This is a Dark-type attack Dynamax Pokémon use.\nThis lowers the target’s Sp. Def stat."
    fr: "Une attaque de type Ténèbres que seuls\nles Pokémon Dynamax peuvent utiliser.\nBaisse la Défense Spéciale de la cible."
    it: "Un attacco di tipo Buio che può essere eseguito\ndai Pokémon dynamaxizzati. Riduce la Difesa Speciale\ndegli avversari."
    de: "Eine Unlicht-Attacke, die nur Dynamax-Pokémon\neinsetzen können. Senkt die Spezial-Verteidigung\nder Gegnerseite."
    es: "Ataque de tipo Siniestro ejecutado por un Pokémon\nDinamax. Reduce la Defensa Especial del objetivo."
    ko: "다이맥스한 포켓몬이 날리는\n악타입의 공격.\n상대의 특수방어를 떨어뜨린다."
    zh_simp: "极巨化宝可梦使出的恶属性攻击。\n会降低对手的特防。"
    zh_trad: "極巨化寶可夢\n所使出的惡屬性攻擊。\n可降低對手的特防。"
max_flare:
  names:
    jp_kana: ダイバーン
    jp_kanji: ダイバーン
    en: Max Flare
    fr: Pyromax
    it: Dynafiammata
    de: Dyna-Brand
    es: Maxignición
    ko: 다이번
    zh_simp: 极巨火爆
    zh_trad: 極巨火爆
  descriptions:
    jp_kana: "ダイマックスした　ポケモンが\n繰りだす　ほのおタイプの　攻撃。\n５ターンの　間　日差しを　強くする。"
    jp_kanji: "ダイマックスした　ポケモンが\n繰りだす　ほのおタイプの　攻撃。\n５ターンの　間　日差しを　強くする。"
    en: "This is a Fire-type attack Dynamax Pokémon use.\nThe user intensifies the sun for five turns."
    fr: "Une attaque de type Feu que seuls\nles Pokémon Dynamax peuvent utiliser.\nFait briller le soleil pendant cinq tours."
    it: "Un attacco di tipo Fuoco che può essere eseguito\ndai Pokémon dynamaxizzati. Intensifica i raggi solari\nper cinque turni."
    de: "Eine Feuer-Attacke, die nur Dynamax-Pokémon\neinsetzen können. Die Sonne brennt unbarmherzig\nfünf Runden lang."
    es: "Ataque de tipo Fuego ejecutado por un Pokémon\nDinamax. Hace que se intensifique el efecto del sol\ndurante cinco turnos."
    ko: "다이맥스한 포켓몬이 날리는\n불꽃타입의 공격.\n5턴 동안 햇살을 강하게 만든다."
    zh_simp: "极巨化宝可梦使出的火属性攻击。\n可在５回合内让日照变得强烈。"
    zh_trad: "極巨化寶可夢\n所使出的火屬性攻擊。\n可在５回合內讓日照增強。"
max_flutterby:
  names:
    jp_kana: ダイワーム
    jp_kanji: ダイワーム
    en: Max Flutterby
    fr: Insectomax
    it: Dynainsetto
    de: Dyna-Schwarm
    es: Maxinsecto
    ko: 다이웜
    zh_simp: 极巨虫蛊
    zh_trad: 極巨蟲蠱
  descriptions:
    jp_kana: "ダイマックスした　ポケモンが\n繰りだす　むしタイプの　攻撃。\n相手の　特攻を　下げる。"
    jp_kanji: "ダイマックスした　ポケモンが\n繰りだす　むしタイプの　攻撃。\n相手の　特攻を　下げる。"
    en: "This is a Bug-type attack Dynamax Pokémon use.\nThis lowers the target’s Sp. Atk stat."
    fr: "Une attaque de type Insecte que seuls\nles Pokémon Dynamax peuvent utiliser.\nBaisse l’Attaque Spéciale de la cible."
    it: "Un attacco di tipo Coleottero che può essere eseguito\ndai Pokémon dynamaxizzati. Riduce l’Attacco Speciale\ndegli avversari."
    de: "Eine Käfer-Attacke, die nur Dynamax-Pokémon\neinsetzen können. Senkt den Spezial-Angriff der\nGegnerseite."
    es: "Ataque de tipo Bicho ejecutado por un Pokémon\nDinamax. Reduce el Ataque Especial del objetivo."
    ko: "다이맥스한 포켓몬이 날리는\n벌레타입의 공격.\n상대의 특수공격을 떨어뜨린다."
    zh_simp: "极巨化宝可梦使出的虫属性攻击。\n会降低对手的特攻。"
    zh_trad: "極巨化寶可夢\n所使出的蟲屬性攻擊。\n可降低對手的特攻。"
max_geyser:
  names:
    jp_kana: ダイストリーム
    jp_kanji: ダイストリーム
    en: Max Geyser
    fr: Hydromax
    it: Dynaflusso
    de: Dyna-Flut
    es: Maxichorro
    ko: 다이스트림
    zh_simp: 极巨水流
    zh_trad: 極巨水流
  descriptions:
    jp_kana: "ダイマックスした　ポケモンが\n繰りだす　みずタイプの　攻撃。\n５ターンの　間　雨を　降らせる。"
    jp_kanji: "ダイマックスした　ポケモンが\n繰りだす　みずタイプの　攻撃。\n５ターンの　間　雨を　降らせる。"
    en: "This is a Water-type attack Dynamax Pokémon use.\nThe user summons a heavy rain that falls for five turns."
    fr: "Une attaque de type Eau que seuls\nles Pokémon Dynamax peuvent utiliser.\nInvoque de fortes pluies qui durent cinq tours."
    it: "Un attacco di tipo Acqua che può essere eseguito\ndai Pokémon dynamaxizzati. Provoca una forte pioggia\nper cinque turni."
    de: "Eine Wasser-Attacke, die nur Dynamax-Pokémon\neinsetzen können. Löst fünf Runden lang strömenden\nRegen aus."
    es: "Ataque de tipo Agua ejecutado por un Pokémon\nDinamax. Desata un aguacero que dura cinco turnos."
    ko: "다이맥스한 포켓몬이 날리는\n물타입의 공격.\n5턴 동안 비를 내리게 한다."
    zh_simp: "极巨化宝可梦使出的水属性攻击。\n可在５回合内降下大雨。"
    zh_trad: "極巨化寶可夢\n所使出的水屬性攻擊。\n在５回合內會降下大雨。"
max_guard:
  names:
    jp_kana: ダイウォール
    jp_kanji: ダイウォール
    en: Max Guard
    fr: Gardomax
    it: Dynabarriera
    de: Dyna-Wall
    es: Maxibarrera
    ko: 다이월
    zh_simp: 极巨防壁
    zh_trad: 極巨防壁
  descriptions:
    jp_kana: "相手の　攻撃を\nまったく　受けない。\n連続で　だすと　失敗しやすい。"
    jp_kanji: "相手の　攻撃を\nまったく　受けない。\n連続で　だすと　失敗しやすい。"
    en: "This move enables the user to protect itself from\nall attacks. Its chance of failing rises if it is used\nin succession."
    fr: "Le lanceur se protège de toutes les attaques.\nPeut échouer si utilisée plusieurs fois de suite."
    it: "Questa mossa permette di eludere tutti gli attacchi.\nSe usata in successione può fallire."
    de: "Anwender wehrt jede Attacke ab. Scheitert eventuell\nbei Wiederholung."
    es: "Frena todos los ataques, pero puede fallar si se usa\nrepetidamente."
    ko: "상대의 공격을\n전혀 받지 않는다.\n연속으로 쓰면 실패하기 쉽다."
    zh_simp: "完全抵挡\n对手的攻击。\n连续使出则容易失败。"
    zh_trad: "完全防住對手的所有攻擊。\n連續使用時容易失敗。"
max_hailstorm:
  names:
    jp_kana: ダイアイス
    jp_kanji: ダイアイス
    en: Max Hailstorm
    fr: Cryomax
    it: Dynagelo
    de: Dyna-Frost
    es: Maxihelada
    ko: 다이아이스
    zh_simp: 极巨寒冰
    zh_trad: 極巨寒冰
  descriptions:
    jp_kana: "ダイマックスした　ポケモンが\n繰りだす　こおりタイプの　攻撃。\n５ターンの　間　ゆきを　降らす。"
    jp_kanji: "ダイマックスした　ポケモンが\n繰りだす　こおりタイプの　攻撃。\n５ターンの　間　ゆきを　降らす。"
    en: "This is an Ice-type attack Dynamax Pokémon use.\nThe user summons a snowstorm lasting five turns."
    fr: "Une attaque de type Glace que seuls les Pokémon\nDynamax peuvent utiliser. Invoque une tempête de\nneige qui dure cinq tours."
    it: "Un attacco di tipo Ghiaccio che può essere eseguito\ndai Pokémon dynamaxizzati. Causa una nevicata che\ndura per cinque turni."
    de: "Eine Eis-Attacke, die nur Dynamax-Pokémon\neinsetzen können. Erzeugt fünf Runden lang Schnee."
    es: "Ataque de tipo Hielo ejecutado por un Pokémon\nDinamax. Crea una tormenta de nieve que dura cinco\nturnos."
    ko: "다이맥스한 포켓몬이 날리는\n얼음타입의 공격.\n5턴 동안 눈을 내리게 한다."
    zh_simp: "极巨化宝可梦使出的冰属性攻击。\n在５回合内会下雪。"
    zh_trad: "極巨化寶可夢\n所使出的冰屬性攻擊。\n在５回合內會下雪。"
max_knuckle:
  names:
    jp_kana: ダイナックル
    jp_kanji: ダイナックル
    en: Max Knuckle
    fr: Pugilomax
    it: Dynapugno
    de: Dyna-Faust
    es: Maxipuño
    ko: 다이너클
    zh_simp: 极巨拳斗
    zh_trad: 極巨拳鬥
  descriptions:
    jp_kana: "ダイマックスした　ポケモンが\n繰りだす　かくとうタイプの　攻撃。\n味方の　攻撃を　上げる。"
    jp_kanji: "ダイマックスした　ポケモンが\n繰りだす　かくとうタイプの　攻撃。\n味方の　攻撃を　上げる。"
    en: "This is a Fighting-type attack Dynamax Pokémon use.\nThis boosts ally Pokémon’s Attack stats."
    fr: "Une attaque de type Combat que seuls\nles Pokémon Dynamax peuvent utiliser.\nAugmente l’Attaque des alliés."
    it: "Un attacco di tipo Lotta che può essere eseguito\ndai Pokémon dynamaxizzati. Aumenta l’Attacco\ndegli alleati."
    de: "Eine Kampf-Attacke, die nur Dynamax-Pokémon\neinsetzen können. Erhöht den Angriff der\nMitstreiterseite."
    es: "Ataque de tipo Lucha ejecutado por un Pokémon\nDinamax. Aumenta el Ataque de tu bando."
    ko: "다이맥스한 포켓몬이 날리는\n격투타입의 공격.\n같은 편의 공격을 올린다."
    zh_simp: "极巨化宝可梦使出的格斗属性攻击。\n会提高我方的攻击。"
    zh_trad: "極巨化寶可夢\n所使出的格鬥屬性攻擊。\n可提高我方的攻擊。"
max_lightning:
  names:
    jp_kana: ダイサンダー
    jp_kanji: ダイサンダー
    en: Max Lightning
    fr: Fulguromax
    it: Dynasaetta
    de: Dyna-Gewitter
    es: Maxitormenta
    ko: 다이썬더
    zh_simp: 极巨闪电
    zh_trad: 極巨閃電
  descriptions:
    jp_kana: "ダイマックスした　ポケモンが\n繰りだす　でんきタイプの　攻撃。\n５ターンの　間　エレキフィールドにする。"
    jp_kanji: "ダイマックスした　ポケモンが\n繰りだす　でんきタイプの　攻撃。\n５ターンの　間　エレキフィールドにする。"
    en: "This is an Electric-type attack Dynamax Pokémon use.\nThe user turns the ground into Electric Terrain for\nfive turns."
    fr: "Une attaque de type Électrik que seuls\nles Pokémon Dynamax peuvent utiliser.\nCrée un champ électrifié qui dure cinq tours."
    it: "Un attacco di tipo Elettro che può essere eseguito\ndai Pokémon dynamaxizzati. Per cinque turni il terreno\nentra nello stato di Campo Elettrico."
    de: "Eine Elektro-Attacke, die nur Dynamax-Pokémon\neinsetzen können. Erzeugt fünf Runden lang ein\nElektrofeld."
    es: "Ataque de tipo Eléctrico ejecutado por un Pokémon\nDinamax. Crea un campo eléctrico durante cinco turnos."
    ko: "다이맥스한 포켓몬이 날리는\n전기타입의 공격.\n5턴 동안 일렉트릭필드로 만든다."
    zh_simp: "极巨化宝可梦使出的电属性攻击。\n可在５回合内将脚下变成电气场地。"
    zh_trad: "極巨化寶可夢\n所使出的電屬性攻擊。\n可在５回合內將腳下變成電氣場地。"
max_mindstorm:
  names:
    jp_kana: ダイサイコ
    jp_kanji: ダイサイコ
    en: Max Mindstorm
    fr: Psychomax
    it: Dynapsiche
    de: Dyna-Kinese
    es: Maxionda
    ko: 다이사이코
    zh_simp: 极巨超能
    zh_trad: 極巨超能
  descriptions:
    jp_kana: "ダイマックスした　ポケモンが\n繰りだす　エスパータイプの　攻撃。\n５ターンの　間　サイコフィールドにする。"
