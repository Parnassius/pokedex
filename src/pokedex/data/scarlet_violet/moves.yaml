hyper_voice:
  names:
    jp_kana: ハイパーボイス
    jp_kanji: ハイパーボイス
    en: Hyper Voice
    fr: Mégaphone
    it: Granvoce
    de: Schallwelle
    es: Vozarrón
    ko: 하이퍼보이스
    zh_simp: 巨声
    zh_trad: 巨聲
  descriptions:
    jp_kana: "うるさく　響く　大きな　振動を\n相手に　与えて　攻撃する。"
    jp_kanji: "うるさく　響く　大きな　振動を\n相手に　与えて　攻撃する。"
    en: "The user attacks by letting loose a horribly loud,\nresounding cry."
    fr: "Le lanceur pousse un cri dont l’écho terrifiant\na le pouvoir d’infliger des dégâts à la cible."
    it: "Il Pokémon attacca il bersaglio lanciando un urlo\nstraziante."
    de: "Eine laute Attacke, bei der gegnerische Pokémon mit\nSchallwellen angegriffen werden."
    es: Grito desgarrador que inflige daño al objetivo.
    ko: "시끄럽게 울리는 큰 진동을\n상대에게 전달하여 공격한다."
    zh_simp: "给予对手又吵又响的\n巨大震动进行攻击。"
    zh_trad: "製造出震耳欲聾的\n巨大聲波攻擊對手。"
hyperspace_fury:
  names:
    jp_kana: いじげんラッシュ
    jp_kanji: いじげんラッシュ
    en: Hyperspace Fury
    fr: Furie Dimension
    it: Urtodimensionale
    de: Dimensionswahn
    es: Cerco Dimensión
    ko: 이차원러시
    zh_simp: 异次元猛攻
    zh_trad: 異次元猛攻
  descriptions:
    jp_kana: "たくさんの　腕で　まもるや　みきり\nなどを　無視した　連続攻撃。\n自分の　防御が　さがる。"
    jp_kanji: "たくさんの　腕で　まもるや　みきり\nなどを　無視した　連続攻撃。\n自分の　防御が　さがる。"
    en: "Using its many arms, the user unleashes a barrage of\nattacks that ignore the effects of moves like Protect\nand Detect. This also lowers the user’s Defense stat."
    fr: "Le Pokémon utilise sa multitude de bras pour infliger\nune nuée de coups qui ignorent les capacités telles\nqu’Abri ou Détection. Baisse la Défense du lanceur."
    it: "Il Pokémon attacca in successione con i suoi molti arti,\nignorando mosse come Protezione o Individua, ma la\nsua Difesa diminuisce."
    de: "Eine Angriffsserie mit vielen Armen, die die Wirkung\nvon Attacken wie Schutzschild und Scanner durchbricht.\nDabei sinkt die Verteidigung des Anwenders."
    es: "Ataca al objetivo con una ráfaga de golpes que pasan\npor alto los efectos de movimientos como Protección o\nDetección. Reduce la Defensa del usuario."
    ko: "많은 팔로 방어와 판별 등을\n무시하는 연속 공격이다.\n자신의 방어가 떨어진다."
    zh_simp: "用许多手臂，无视对手的\n守住或看穿等招式进行连续攻击，\n自己的防御会降低。"
    zh_trad: "使用許多手臂，發動可\n不顧守住和看穿的連續攻擊。\n自己的防禦會降低。"
hyperspace_hole:
  names:
    jp_kana: いじげんホール
    jp_kanji: いじげんホール
    en: Hyperspace Hole
    fr: TrouDimensionnel
    it: Forodimensionale
    de: Dimensionsloch
    es: Paso Dimensional
    ko: 이차원홀
    zh_simp: 异次元洞
    zh_trad: 異次元洞
  descriptions:
    jp_kana: "異次元ホールで　突然　相手の\n真横に　現れ　攻撃する。\nまもるや　みきり　なども　無視　できる。"
    jp_kanji: "異次元ホールで　突然　相手の\n真横に　現れ　攻撃する。\nまもるや　みきり　なども　無視　できる。"
    en: "Using a hyperspace hole, the user appears right next to\nthe target and strikes. This attack can hit a target using a\nmove such as Protect or Detect."
    fr: "Le lanceur crée une faille dimensionnelle pour\nattaquer soudainement la cible de côté. Ignore\nmême les capacités comme Abri ou Détection."
    it: "Il Pokémon sfrutta un passaggio interdimensionale\nper comparire a fianco del bersaglio e attaccarlo,\neludendo mosse come Protezione e Individua."
    de: "Der Anwender positioniert sich mithilfe eines\nDimensionslochs direkt neben dem Ziel und\ndurchbricht selbst Schutzschild, Scanner etc."
    es: "El usuario aparece junto al objetivo usando un agujero\ndimensional y le asesta un golpe que movimientos\ncomo Protección o Detección no pueden evitar."
    ko: "이차원홀로 갑자기 상대\n바로 옆에 나타나 공격한다.\n방어나 판별 등도 무시할 수 있다."
    zh_simp: "通过异次元洞，\n突然出现在对手的侧面进行攻击。\n还可以无视守住和看穿等招式。"
    zh_trad: "利用異次元洞，\n突然出現在對手的側面進行攻擊。\n可避開對手的守住和看穿等招式。"
hypnosis:
  names:
    jp_kana: さいみんじゅつ
    jp_kanji: さいみんじゅつ
    en: Hypnosis
    fr: Hypnose
    it: Ipnosi
    de: Hypnose
    es: Hipnosis
    ko: 최면술
    zh_simp: 催眠术
    zh_trad: 催眠術
  descriptions:
    jp_kana: "眠気を　誘う　暗示を　かけて\n相手を　眠り状態に　する。"
    jp_kanji: "眠気を　誘う　暗示を　かけて\n相手を　眠り状態に　する。"
    en: "The user employs hypnotic suggestion to make the\ntarget fall asleep."
    fr: "Le lanceur hypnotise la cible pour la plonger\ndans un profond sommeil."
    it: "Il Pokémon si avvale della suggestione ipnotica\nper far addormentare il bersaglio."
    de: Hypnose-Attacke, die das Ziel in Schlaf versetzt.
    es: "Ataque hipnótico que hace dormir profundamente al\nobjetivo."
    ko: "졸음을 유도하는 암시를 걸어서\n상대를 잠듦 상태로 만든다."
    zh_simp: "施以诱导睡意的暗示，\n让对手陷入睡眠状态。"
    zh_trad: "施加引發睡意的暗示，\n讓對手陷入睡眠狀態。"
ice_ball:
  names:
    jp_kana: アイスボール
    jp_kanji: アイスボール
    en: Ice Ball
    fr: Ball’Glace
    it: Palla Gelo
    de: Frostbeule
    es: Bola Hielo
    ko: 아이스볼
    zh_simp: 冰球
    zh_trad: 冰球
