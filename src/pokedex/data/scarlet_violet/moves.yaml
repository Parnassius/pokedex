steel_beam:
  names:
    jp_kana: てっていこうせん
    jp_kanji: てっていこうせん
    en: Steel Beam
    fr: Métalaser
    it: Raggio d’Acciaio
    de: Stahlstrahl
    es: Metaláser
    ko: 철제광선
    zh_simp: 铁蹄光线
    zh_trad: 鐵蹄光線
  descriptions:
    jp_kana: "全身から　集めた　はがねを\nビームとして　激しく　撃ちだす。\n自分も　ダメージを　受けてしまう。"
    jp_kanji: "全身から　集めた　はがねを\nビームとして　激しく　撃ちだす。\n自分も　ダメージを　受けてしまう。"
    en: "The user fires a beam of steel that it collected from its\nentire body. This also damages the user."
    fr: "Le lanceur concentre du métal issu de tout son corps\nen un rayon qu’il projette violemment sur sa cible.\nIl subit aussi des dégâts."
    it: "Il Pokémon utilizza l’acciaio del proprio corpo per\nsparare un violento raggio, ma subisce danni."
    de: "Der Anwender schießt Stahl, den er in seinem ganzen\nKörper angesammelt hat, in Form eines mächtigen\nStrahls ab. Dabei verletzt er sich auch selbst."
    es: "Utiliza el acero de su cuerpo para disparar un potente\nrayo. El usuario se hiere a sí mismo."
    ko: "전신에서 끌어모은 강철을\n빔으로 바꿔 세차게 발사한다.\n자신도 데미지를 입는다."
    zh_simp: "将从全身聚集的钢铁\n化为光束，激烈地发射出去。\n自己也会受到伤害。"
    zh_trad: "將從全身匯聚起來的鋼鐵\n化為光束激烈地發射出去。\n自己也會受到傷害。"
steel_roller:
  names:
    jp_kana: アイアンローラー
    jp_kanji: アイアンローラー
    en: Steel Roller
    fr: Métalliroue
    it: Ferrorullo
    de: Eisenwalze
    es: Allanador Férreo
    ko: 아이언롤러
    zh_simp: 铁滚轮
    zh_trad: 鐵滾輪
  descriptions:
    jp_kana: "フィールドを　破壊しながら　攻撃。\nなんらかの　フィールド状態に\n変わっていないと　技は　失敗する。"
    jp_kanji: "フィールドを　破壊しながら　攻撃。\nなんらかの　フィールド状態に\n変わっていないと　技は　失敗する。"
    en: "The user attacks while destroying the terrain. This move\nfails if the ground hasn’t turned into a terrain."
    fr: "Une attaque qui inflige des dégâts et fait disparaître\nle champ actif, mais qui échoue s’il n’y en a pas\nà ce moment."
    it: "Il Pokémon attacca eliminando lo stato del terreno\ndi lotta. La mossa fallisce se nel terreno non è attivo\nalcuno stato."
    de: "Der Anwender greift an und zerstört dabei etwaige\nFelder. Ist kein Feld aktiv, schlägt die Attacke fehl."
    es: "El usuario lanza su ataque y destruye el campo activo\nen el terreno de combate. Si no hay ninguno en ese\nmomento, el movimiento falla."
    ko: "필드를 파괴하면서 공격한다.\n필드가 어떤 상태로든 변해 있지 않은 경우\n기술은 실패한다."
    zh_simp: "在破坏场地的同时攻击对手。\n如果脚下没有任何场地状态存在，\n使出此招式时便会失败。"
    zh_trad: "一邊破壞場地，一邊進行攻擊。\n在不是特殊狀態的場地上使用，\n招式就會失敗。"
steel_wing:
  names:
    jp_kana: はがねのつばさ
    jp_kanji: はがねのつばさ
    en: Steel Wing
    fr: Ailes d’Acier
    it: Alacciaio
    de: Stahlflügel
    es: Ala de Acero
    ko: 강철날개
    zh_simp: 钢翼
    zh_trad: 鋼翼
  descriptions:
    jp_kana: "硬い　翼を　相手に　たたきつけて\n攻撃する。　自分の　防御が\nあがることが　ある。"
    jp_kanji: "硬い　翼を　相手に　たたきつけて\n攻撃する。　自分の　防御が\nあがることが　ある。"
    en: "The target is hit with wings of steel. This may also boost\nthe user’s Defense stat."
    fr: "Le lanceur frappe la cible avec des ailes d’acier,\nce qui peut aussi augmenter la Défense du lanceur."
    it: "Il Pokémon attacca colpendo il bersaglio con ali\nd’acciaio. Può anche aumentare la propria Difesa."
    de: "Trifft das Ziel mit Stahlflügeln. Verteidigungs-Wert des\nAnwenders steigt eventuell."
    es: "Golpea al objetivo con unas alas robustas y macizas.\nPuede aumentar la Defensa del usuario."
    ko: "단단한 날개를 상대에게 부딪쳐서\n공격한다. 자신의 방어가\n올라갈 때가 있다."
    zh_simp: "用坚硬的翅膀敲打\n对手进行攻击。\n有时会提高自己的防御。"
    zh_trad: "用堅硬的翅膀撞擊\n對手進行攻擊。\n有時會提高自己的防禦。"
sticky_web:
  names:
    jp_kana: ねばねばネット
    jp_kanji: ねばねばネット
    en: Sticky Web
    fr: Toile Gluante
    it: Rete Vischiosa
    de: Klebenetz
    es: Red Viscosa
    ko: 끈적끈적네트
    zh_simp: 黏黏网
    zh_trad: 黏黏網
  descriptions:
    jp_kana: "相手の　周りに　ねばねばした\nネットを　はりめぐらせ　交代で\nでてきた　相手の　素早さを　さげる。"
    jp_kanji: "相手の　周りに　ねばねばした\nネットを　はりめぐらせ　交代で\nでてきた　相手の　素早さを　さげる。"
    en: "The user weaves a sticky net around the opposing team,\nwhich lowers their Speed stats upon switching into battle."
    fr: "Le lanceur déploie une toile visqueuse autour de la cible\nqui ralentit la Vitesse de tout adversaire entrant\nau combat."
    it: "Il Pokémon intreccia una rete appiccicosa attorno\nalla squadra opposta, diminuendo la Velocità dei\nPokémon avversari che entrano in campo."
    de: "Der Anwender spinnt in der Umgebung des\ngegnerischen Teams ein klebriges Netz und senkt\nso die Initiative neu eingewechselter Pokémon."
    es: "Coloca una red pegajosa alrededor del objetivo\nque reduce la Velocidad de los rivales que entran\nen combate."
    ko: "상대의 주위에 끈적끈적한\n네트를 둘러 펼쳐 교체되어\n나온 상대의 스피드를 떨어뜨린다."
    zh_simp: "在对手周围围上黏黏的网，\n降低替换出场的对手的速度。"
    zh_trad: "在對手周圍撒下黏黏的網，\n降低替換出場的對手的速度。"
stockpile:
  names:
    jp_kana: たくわえる
    jp_kanji: たくわえる
    en: Stockpile
    fr: Stockage
    it: Accumulo
    de: Horter
    es: Reserva
    ko: 비축하기
    zh_simp: 蓄力
    zh_trad: 蓄力
  descriptions:
    jp_kana: "力を　蓄えて　自分の\n防御と　特防を　あげる。\n最大　３回まで　蓄えられる。"
    jp_kanji: "力を　蓄えて　自分の\n防御と　特防を　あげる。\n最大　３回まで　蓄えられる。"
    en: "The user stores power and boosts its Defense and\nSp. Def stats. This move can be used up to three times."
    fr: "Le lanceur emmagasine de l’énergie et augmente\nsa Défense et sa Défense Spéciale.\nPeut être utilisée trois fois."
    it: "Il Pokémon accumula energia aumentando la Difesa e\nla Difesa Speciale. Si può utilizzare massimo tre volte."
    de: "Lädt Kraft für später auf. Erhöht Verteidigung und\nSpezial-Verteidigung. Kann bis zu dreimal eingesetzt\nwerden."
    es: "Acumula energía hasta un máximo de tres veces para\naumentar la Defensa y la Defensa Especial."
    ko: "힘을 비축해서 자신의\n방어와 특수방어를 올린다.\n최대 3회까지 비축할 수 있다."
    zh_simp: "积蓄力量，\n提高自己的防御和特防。\n最多积蓄３次。"
    zh_trad: "蓄積力量，\n提高自己的防禦和特防。\n最多蓄積３次。"
stoked_sparksurfer:
  names:
    jp_kana: ライトニングサーフライド
    jp_kanji: ライトニングサーフライド
    en: Stoked Sparksurfer
    fr: Électro-Surf Survolté
    it: Elettrosurf Folgorante
    de: Blitz-Wellenritt
    es: Surfeo Galvánico
    ko: 라이트닝서프라이드
    zh_simp: 驾雷驭电戏冲浪
    zh_trad: 駕雷馭電戲衝浪
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
stomp:
  names:
    jp_kana: ふみつけ
    jp_kanji: ふみつけ
    en: Stomp
    fr: Écrasement
    it: Pestone
    de: Stampfer
    es: Pisotón
    ko: 짓밟기
    zh_simp: 踩踏
    zh_trad: 踩踏
  descriptions:
    jp_kana: "大きな　足で\n相手を　踏みつけて　攻撃する。\n相手を　ひるませることが　ある。"
    jp_kanji: "大きな　足で\n相手を　踏みつけて　攻撃する。\n相手を　ひるませることが　ある。"
    en: "The user attacks by stomping on the target with a big\nfoot. This may also make the target flinch."
    fr: "Écrase la cible avec un énorme pied, ce qui peut aussi\nl’apeurer."
    it: "Il Pokémon attacca il bersaglio pestandolo con un grosso\npiede e può anche farlo tentennare."
    de: "Stampfen mit dem Fuß. Das Ziel schreckt eventuell\nzurück."
    es: "Tremendo pisotón que puede hacer que el objetivo se\namedrente."
    ko: "큰 발로\n상대를 짓밟아서 공격한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "用大脚踩踏对手进行攻击。\n有时会使对手畏缩。"
    zh_trad: "用大腳踩踏對手進行攻擊。\n有時會讓對手畏縮。"
stomping_tantrum:
  names:
    jp_kana: じだんだ
    jp_kanji: じだんだ
    en: Stomping Tantrum
    fr: Trépignement
    it: Battipiedi
    de: Fruststampfer
    es: Pataleta
    ko: 분함의발구르기
    zh_simp: 跺脚
    zh_trad: 跺腳
  descriptions:
    jp_kana: "悔しさを　バネにして　攻撃する。\n前の　ターンに　技を　外していると\n威力が　倍に　なる。"
    jp_kanji: "悔しさを　バネにして　攻撃する。\n前の　ターンに　技を　外していると\n威力が　倍に　なる。"
    en: "Driven by frustration, the user attacks the target.\nThis move’s power is doubled if the user’s previous\nmove failed."
    fr: "Le lanceur attaque en utilisant sa frustration. S’il a\nutilisé une capacité qui a échoué au tour précédent,\nla puissance de Trépignement est doublée."
    it: "Il Pokémon attacca battendo i piedi per la rabbia.\nSe la mossa usata al turno precedente non è andata\na segno, la potenza raddoppia."
    de: "Von Frust getrieben greift der Anwender an.\nWenn seine vorige Attacke fehlgeschlagen ist,\nverdoppelt sich die Stärke der Attacke."
    es: "Usa la frustración como revulsivo para atacar.\nLa potencia de Pataleta se duplica si el usuario\nha fallado el último movimiento usado."
    ko: "분함을 발판 삼아 공격한다.\n앞 턴에서 기술이 빗나갔다면\n위력이 배가 된다."
    zh_simp: "化悔恨为力量进行攻击。\n如果上一回合招式没有打中，\n威力就会翻倍。"
    zh_trad: "化悔恨為力量進行攻擊。\n如果上一回合的招式沒有命中，\n威力就會加倍。"
stone_axe:
  names:
    jp_kana: がんせきアックス
    jp_kanji: がんせきアックス
    en: Stone Axe
    fr: Hache de Pierre
    it: Rocciascure
    de: Felsaxt
    es: Hachazo Pétreo
    ko: 암석액스
    zh_simp: 岩斧
    zh_trad: 岩斧
  descriptions:
    jp_kana: "岩の斧で　攻撃する。\nばらまかれた　岩の破片が\n相手の　周りに　浮かぶ。"
    jp_kanji: "岩の斧で　攻撃する。\nばらまかれた　岩の破片が\n相手の　周りに　浮かぶ。"
    en: "The user swings its stone axes at the target. Stone\nsplinters left behind by this attack float around the\ntarget."
    fr: "Le lanceur attaque avec sa hache de pierre.\nDes débris de pierre se répandent alors et se mettent\nà flotter autour de la cible."
    it: "Il Pokémon attacca il bersaglio con delle scuri di roccia.\nI frammenti rocciosi dispersi dall’attacco restano sospesi\nintorno al bersaglio."
    de: "Der Anwender greift mit seinen Felsäxten an.\nDadurch verstreut er schwebende Felssplitter\nim Umkreis des Zieles."
    es: "Ataca con un hacha de piedra y, al hacerlo, se\ndesprenden fragmentos que rodean al objetivo."
    ko: "암석 도끼로 공격한다.\n흩어진 암석 파편은\n상대의 주위에 떠다니게 된다."
    zh_simp: "用岩石之斧进行攻击。\n散落的岩石碎片\n会飘浮在对手周围。"
    zh_trad: "用岩石之斧進行攻擊。\n散落的岩石碎片\n會在對手周圍飄浮。"
stone_edge:
  names:
    jp_kana: ストーンエッジ
    jp_kanji: ストーンエッジ
    en: Stone Edge
    fr: Lame de Roc
    it: Pietrataglio
    de: Steinkante
    es: Roca Afilada
    ko: 스톤에지
    zh_simp: 尖石攻击
    zh_trad: 尖石攻擊
  descriptions:
    jp_kana: "とがった　岩を\n相手に　突き刺して　攻撃する。\n急所に　当たりやすい。"
    jp_kanji: "とがった　岩を\n相手に　突き刺して　攻撃する。\n急所に　当たりやすい。"
    en: "The user stabs the target with sharpened stones.\nThis move has a heightened chance of landing a\ncritical hit."
    fr: "Le lanceur transperce la cible avec des rochers aiguisés.\nTaux de critiques élevé."
    it: "Il Pokémon attacca il bersaglio infilzandolo con pietre\naffilate. Probabile brutto colpo."
    de: "Anwender schleudert scharfe Steine auf das Ziel.\nHohe Volltrefferquote."
    es: "Clava piedras muy afiladas al objetivo. Suele asestar\nun golpe crítico."
    ko: "뾰족한 바위를\n상대에게 꿰찔러서 공격한다.\n급소에 맞기 쉽다."
    zh_simp: "用尖尖的岩石\n刺入对手进行攻击。\n容易击中要害。"
    zh_trad: "用尖銳的岩石\n刺進對手進行攻擊。\n容易擊中要害。"
stored_power:
  names:
    jp_kana: アシストパワー
    jp_kanji: アシストパワー
    en: Stored Power
    fr: Force Ajoutée
    it: Veicolaforza
    de: Kraftvorrat
    es: Poder Reserva
    ko: 어시스트파워
    zh_simp: 辅助力量
    zh_trad: 輔助力量
  descriptions:
    jp_kana: "蓄積された　パワーで　相手を\n攻撃する。自分の　能力が\nあがっているほど　威力が　あがる。"
    jp_kanji: "蓄積された　パワーで　相手を\n攻撃する。自分の　能力が\nあがっているほど　威力が　あがる。"
    en: "The user attacks the target with stored power.\nThe more the user’s stats are boosted, the greater\nthe move’s power."
    fr: "Le lanceur attaque la cible avec une force cumulée.\nPlus les stats du lanceur sont augmentées,\nplus la puissance de cette capacité augmente."
    it: "Il Pokémon attacca il bersaglio con l’energia\naccumulata. Più sono state aumentate le\nstatistiche, maggiore è la potenza della mossa."
    de: "Angriff mit angesparter Energie. Je stärker die\nStatuswerte des Anwenders erhöht wurden, desto mehr\nSchaden richtet diese Attacke an."
    es: "Acumula poder para golpear. Cuanto más suban las\ncaracterísticas del usuario, mayor será la potencia del\nmovimiento."
    ko: "축적된 파워로 상대를 공격한다.\n자신의 능력이 올라가 있는 만큼\n위력이 올라간다."
    zh_simp: "用蓄积起来的力量攻击对手。\n自己的能力提高得越多，\n威力就越大。"
    zh_trad: "用蓄積的力量攻擊對手。\n自己的能力提高越多，\n招式的威力越大。"
storm_throw:
  names:
    jp_kana: やまあらし
    jp_kanji: やまあらし
    en: Storm Throw
    fr: Yama Arashi
    it: Tempestretta
    de: Bergsturm
    es: Llave Corsé
    ko: 업어후리기
    zh_simp: 山岚摔
    zh_trad: 山嵐摔
  descriptions:
    jp_kana: "強烈な　一撃を\n相手に　くりだす。攻撃は\n必ず　急所に　当たる。"
    jp_kanji: "強烈な　一撃を\n相手に　くりだす。攻撃は\n必ず　急所に　当たる。"
    en: "The user attacks by striking the target with a fierce blow.\nThis move always lands a critical hit."
    fr: Un coup très puissant dont l’effet est toujours critique.
    it: "Il Pokémon sferra un colpo micidiale al bersaglio.\nBrutto colpo assicurato."
    de: Ein Angriff mit voller Wucht und Volltreffergarantie.
    es: "Lanza un golpe devastador. Siempre asesta un golpe\ncrítico."
    ko: "강렬한 일격을\n상대에게 날린다. 공격은\n반드시 급소에 맞는다."
    zh_simp: "向对手使出强烈的一击。\n攻击必定会击中要害。"
    zh_trad: "向對手發動強烈的一擊。\n一定會擊中要害。"
strange_steam:
  names:
    jp_kana: ワンダースチーム
    jp_kanji: ワンダースチーム
    en: Strange Steam
    fr: Vapeur Féérique
    it: Vapore Incantato
    de: Wunderdampf
    es: Cautivapor
    ko: 원더스팀
    zh_simp: 神奇蒸汽
    zh_trad: 神奇蒸汽
  descriptions:
    jp_kana: "煙を　噴出して\n相手を　攻撃。\n混乱　させることが　ある。"
    jp_kanji: "煙を　噴出して\n相手を　攻撃。\n混乱　させることが　ある。"
    en: "The user attacks the target by emitting steam. This may\nalso confuse the target."
    fr: "Le lanceur émet de la vapeur pour attaquer sa cible.\nPeut aussi la rendre confuse."
    it: "Il Pokémon attacca il bersaglio con getti di vapore\nche possono anche confonderlo."
    de: "Der Anwender stößt Dampf aus, mit dem er das Ziel\nangreift. Dieses wird eventuell verwirrt."
    es: "Desprende un humo con el que ataca al objetivo, que\npuede acabar confundido."
    ko: "연기를 분출해서\n상대를 공격한다.\n혼란시킬 때가 있다."
    zh_simp: "喷出烟雾攻击对手。\n有时会使对手混乱。"
    zh_trad: "噴出煙霧攻擊對手。\n有時會使對手混亂。"
strength:
  names:
    jp_kana: かいりき
    jp_kanji: かいりき
    en: Strength
    fr: Force
    it: Forza
    de: Stärke
    es: Fuerza
    ko: 괴력
    zh_simp: 怪力
    zh_trad: 怪力
  descriptions:
    jp_kana: "こん身の　力で\n相手を　なぐりつけて　攻撃する。"
    jp_kanji: "こん身の　力で\n相手を　なぐりつけて　攻撃する。"
    en: "The target is slugged with a punch thrown at maximum\npower."
    fr: Le lanceur cogne la cible de toutes ses forces.
    it: "Il Pokémon attacca il bersaglio colpendolo con tutte\nle sue forze."
    de: Das Ziel wird extrem stark getroffen.
    es: Ataca al objetivo golpeándolo con todas sus fuerzas.
    ko: "혼신의 힘으로\n상대를 세게 때려서 공격한다."
    zh_simp: "使出浑身力气\n殴打对手进行攻击。"
    zh_trad: "使出渾身力量\n毆打對手進行攻擊。"
strength_sap:
  names:
    jp_kana: ちからをすいとる
    jp_kanji: ちからをすいとる
    en: Strength Sap
    fr: Vole-Force
    it: Assorbiforza
    de: Kraftabsorber
    es: Absorbefuerza
    ko: 힘흡수
    zh_simp: 吸取力量
    zh_trad: 吸取力量
  descriptions:
    jp_kana: "相手の　攻撃力と　同じだけ\n自分の　ＨＰを　回復する。\nそして　相手の　攻撃を　さげる。"
    jp_kanji: "相手の　攻撃力と　同じだけ\n自分の　ＨＰを　回復する。\nそして　相手の　攻撃を　さげる。"
    en: "The user restores its own HP by the same amount as\nthe target’s Attack stat. It then lowers the target’s\nAttack stat."
    fr: "Rend au lanceur une quantité de PV équivalente\nà la stat d’Attaque de la cible, puis baisse celle-ci."
    it: "Il Pokémon recupera una quantità di PS pari all’Attacco\ndel bersaglio, che vedrà diminuire questa statistica."
    de: "Ein Angriff, der die KP des Anwenders um die Höhe des\nAngriffs-Werts des Zieles heilt. Anschließend wird der\nAngriff des Zieles gesenkt."
    es: "Restaura una cantidad de PS equivalente al valor de\nAtaque del objetivo, que además verá reducida esta\ncaracterística."
    ko: "상대 공격력과 동일하게\n자신의 HP를 회복한다.\n그리고 상대의 공격을 떨어뜨린다."
    zh_simp: "给自己回复和对手攻击力\n相同数值的ＨＰ，\n然后降低对手的攻击。"
    zh_trad: "將自己的ＨＰ回復到和\n對手的攻擊力相同。\n然後降低對手的攻擊。"
string_shot:
  names:
    jp_kana: いとをはく
    jp_kanji: いとをはく
    en: String Shot
    fr: Sécrétion
    it: Millebave
    de: Fadenschuss
    es: Disparo Demora
    ko: 실뿜기
    zh_simp: 吐丝
    zh_trad: 吐絲
  descriptions:
    jp_kana: "口から　吹きだした\n糸を　まきつけて　相手の\n素早さを　がくっと　さげる。"
    jp_kanji: "口から　吹きだした\n糸を　まきつけて　相手の\n素早さを　がくっと　さげる。"
    en: "The user blows silk from its mouth that binds opposing\nPokémon and harshly lowers their Speed stats."
    fr: "Le lanceur crache de la soie pour ligoter la cible\net beaucoup baisser sa Vitesse."
    it: "Il Pokémon produce della seta che avvolge gli avversari\ne ne riduce di molto la Velocità."
    de: "Umwickelt gegnerische Pokémon mit Fäden aus dem\nMund und senkt ihren Initiative-Wert."
    es: "Lanza seda por la boca al objetivo y reduce mucho su\nVelocidad."
    ko: "입에서 뿜어낸\n실을 휘감아서 상대의\n스피드를 크게 떨어뜨린다."
    zh_simp: "用口中吐出的丝缠绕对手，\n从而大幅降低对手的速度。"
    zh_trad: "用口中吐出的絲纏繞對手，\n大幅降低對手的速度。"
struggle:
  names:
    jp_kana: わるあがき
    jp_kanji: わるあがき
    en: Struggle
    fr: Lutte
    it: Scontro
    de: Verzweifler
    es: Forcejeo
    ko: 발버둥
    zh_simp: 挣扎
    zh_trad: 掙扎
  descriptions:
    jp_kana: "自分の　ＰＰが　なくなると\nあがいて　相手を　攻撃する。\n自分も　少し　ダメージを　受ける。"
    jp_kanji: "自分の　ＰＰが　なくなると\nあがいて　相手を　攻撃する。\n自分も　少し　ダメージを　受ける。"
    en: "This attack is used in desperation only if the user has\nno remaining PP. It also damages the user a little."
    fr: "Une attaque désespérée, utilisée quand le lanceur\nn’a plus de PP. Le blesse aussi légèrement."
    it: "Attacco da usare solo in caso estremo, quando non si\nhanno più PP. Chi lo usa subisce un po’ di danni."
    de: "Angriff nur bei verbrauchten AP. Anwender verletzt\nsich selbst leicht."
    es: "Solo se usa como último recurso al acabarse los PP.\nEl usuario se hiere ligeramente a sí mismo."
    ko: "자신의 PP가 떨어지면\n발버둥 쳐 상대를 공격한다.\n자신도 조금 데미지를 입는다."
    zh_simp: "当自己的ＰＰ耗尽时，\n努力挣扎攻击对手。\n自己也会受到少许伤害。"
    zh_trad: "在自己的ＰＰ耗盡時，\n努力掙扎攻擊對手。\n自己也會受到少許傷害。"
struggle_bug:
  names:
    jp_kana: むしのていこう
    jp_kanji: むしのていこう
    en: Struggle Bug
    fr: Survinsecte
    it: Entomoblocco
    de: Käfertrutz
    es: Estoicismo
    ko: 벌레의저항
    zh_simp: 虫之抵抗
    zh_trad: 蟲之抵抗
  descriptions:
    jp_kana: "抵抗して　相手を　攻撃する。\n相手の　特攻を　さげる。"
    jp_kanji: "抵抗して　相手を　攻撃する。\n相手の　特攻を　さげる。"
    en: "The user attacks by struggling against opposing\nPokémon. This also lowers their Sp. Atk stats."
    fr: "Le lanceur frappe en se débattant de toutes ses forces,\net baisse l’Attaque Spéciale de la cible."
    it: "Il Pokémon attacca il bersaglio opponendo resistenza\ne riducendone l’Attacco Speciale."
    de: "Anwender leistet Widerstand und greift an.\nDer Spezial-Angriff der gegnerischen Pokémon sinkt."
    es: "El usuario opone resistencia y ataca al objetivo.\nTambién reduce su Ataque Especial."
    ko: "저항해서 상대를 공격한다.\n상대의 특수공격을 떨어뜨린다."
    zh_simp: "抵抗并攻击对手。\n会降低对手的特攻。"
    zh_trad: "抵抗對手進行攻擊。\n可降低對手的特攻。"
stuff_cheeks:
  names:
    jp_kana: ほおばる
    jp_kanji: ほおばる
    en: Stuff Cheeks
    fr: Garde-à-Joues
    it: Riempiguance
    de: Backenstopfer
    es: Atiborramiento
    ko: 볼가득넣기
    zh_simp: 大快朵颐
    zh_trad: 大快朵頤
  descriptions:
    jp_kana: "持っている　きのみを　食べて\n防御を　ぐーんと　あげる。"
    jp_kanji: "持っている　きのみを　食べて\n防御を　ぐーんと　あげる。"
    en: "The user eats its held Berry, then sharply boosts its\nDefense stat."
    fr: "Le lanceur mange la Baie qu’il tient, ce qui augmente\nbeaucoup sa Défense."
    it: "Se il Pokémon ha con sé una bacca, la mangia\ne la sua Difesa aumenta di molto."
    de: "Der Anwender frisst die Beere, die er trägt,\nwodurch seine Verteidigung stark erhöht wird."
    es: "El usuario ingiere la baya que lleva equipada para\naumentar mucho su Defensa."
    ko: "지니고 있는 나무열매를 먹고\n방어를 크게 올린다."
    zh_simp: "吃掉携带的树果，\n大幅提高防御。"
    zh_trad: "吃掉攜帶的樹果，\n大幅提高自己的防禦。"
stun_spore:
  names:
    jp_kana: しびれごな
    jp_kanji: しびれごな
    en: Stun Spore
    fr: Para-Spore
    it: Paralizzante
    de: Stachelspore
    es: Paralizador
    ko: 저리가루
    zh_simp: 麻痹粉
    zh_trad: 麻痺粉
  descriptions:
    jp_kana: "しびれる　粉を\nたくさん　ふりまいて\n相手を　まひ状態に　する。"
    jp_kanji: "しびれる　粉を\nたくさん　ふりまいて\n相手を　まひ状態に　する。"
    en: "The user scatters a cloud of numbing powder that\nparalyzes the target."
    fr: "Le lanceur répand sur la cible une poudre\nqui la paralyse."
    it: "Investe il bersaglio con una nuvola di polvere\nche paralizza."
    de: Verstreut lähmenden Puder, der das Ziel paralysiert.
    es: Esparce polvo que paraliza al objetivo.
    ko: "저리가루를 많이 흩뿌려서\n상대를 마비 상태로 만든다."
    zh_simp: "撒出麻痹粉，\n从而让对手陷入麻痹状态。"
    zh_trad: "撒出大量令人麻痺的粉末，\n讓對手陷入麻痺狀態。"
submission:
  names:
    jp_kana: じごくぐるま
    jp_kanji: じごくぐるま
    en: Submission
    fr: Sacrifice
    it: Sottomissione
    de: Überroller
    es: Sumisión
    ko: 지옥의바퀴
    zh_simp: 深渊翻滚
    zh_trad: 地獄翻滾
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
substitute:
  names:
    jp_kana: みがわり
    jp_kanji: みがわり
    en: Substitute
    fr: Clonage
    it: Sostituto
    de: Delegator
    es: Sustituto
    ko: 대타출동
    zh_simp: 替身
    zh_trad: 替身
  descriptions:
    jp_kana: "自分の　ＨＰを　少し　削って\n分身を　だす。\n分身は　自分の　身代わりに　なる。"
    jp_kanji: "自分の　ＨＰを　少し　削って\n分身を　だす。\n分身は　自分の　身代わりに　なる。"
    en: "The user creates a substitute for itself using some of\nits own HP. The substitute serves as the user’s decoy."
    fr: "Le lanceur crée un clone en sacrifiant quelques PV.\nCe clone sert de leurre."
    it: "Il Pokémon crea una copia di se stesso usando alcuni PS.\nLa copia serve come esca per l’avversario."
    de: "Anwender setzt eine kleine Menge an KP ein, um einen\nDoppelgänger zu erzeugen, der für ihn Schläge\neinsteckt."
    es: "Utiliza parte de los PS propios para crear un sustituto\nque actúa como señuelo."
    ko: "자신의 HP를 조금 깎아서\n분신을 만든다.\n분신은 자신의 대타가 된다."
    zh_simp: "削减少许自己的ＨＰ，\n制造分身。\n分身将成为自己的替身。"
    zh_trad: "消耗一些自己的ＨＰ，\n製造分身。\n分身將成為自己的替身。"
subzero_slammer:physical:
  names:
    jp_kana: レイジングジオフリーズ
    jp_kanji: レイジングジオフリーズ
    en: Subzero Slammer
    fr: Laser Cryogénique
    it: Criodistruzione Polare
    de: Tobender Geofrost
    es: Crioaliento Despiadado
    ko: 레이징지오프리즈
    zh_simp: 激狂大地万里冰
    zh_trad: 激狂大地萬里冰
  descriptions:
