    en: Twinkle Tackle
    fr: Impact Choupinova
    it: Astroimpatto Fatato
    de: Entzückender Sternenstoß
    es: Arrumaco Sideral
    ko: 러블리스타임팩트
    zh_simp: 可爱星星飞天撞
