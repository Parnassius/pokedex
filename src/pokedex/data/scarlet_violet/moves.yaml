    zh_trad: 上菜
  descriptions:
    jp_kana: "いなせな　身のこなしで　攻撃。\n口の中に　シャリタツが　いると\nそのすがたによって　能力が　あがる。"
    jp_kanji: "いなせな　身のこなしで　攻撃。\n口の中に　シャリタツが　いると\nそのすがたによって　能力が　あがる。"
    en: "The user attacks with elegant poise. If the user has a\nTatsugiri in its mouth, this move boosts one of the user’s\nstats based on the Tatsugiri’s form."
    fr: "Le lanceur attaque avec adresse et élégance.\nS’il a un Nigirigon dans la gueule, une de ses stats\naugmente en fonction de la forme de celui-ci."
    it: "Il Pokémon attacca con deliziose movenze.\nSe ha in bocca un Tatsugiri, una sua statistica aumenta\nin base alla forma di quest’ultimo."
    de: "Eine Attacke mit geübten Bewegungen. Trägt der\nAnwender ein Nigiragi im Maul, erhöht sich je nach\ndessen Form ein Statuswert des Anwenders."
    es: "Ataca con porte gallardo. Si lleva un Tatsugiri en la\nboca, aumenta una de sus características en función\nde la forma de este último."
    ko: "멋들어진 몸놀림으로 공격한다.\n입속에 싸리용이 있으면\n싸리용의 모습에 따라 능력이 올라간다."
    zh_simp: "以潇洒的身手进行攻击。\n若口中有米立龙，\n会按其样子提高能力。"
    zh_trad: "以瀟灑的身段進行攻擊。\n若口中有米立龍，\n會依米立龍的姿勢而提高不同能力。"
origin_pulse:
  names:
    jp_kana: こんげんのはどう
    jp_kanji: こんげんのはどう
    en: Origin Pulse
    fr: Onde Originelle
    it: Primopulsar
    de: Ursprungswoge
    es: Pulso Primigenio
    ko: 근원의파동
    zh_simp: 根源波动
    zh_trad: 根源波動
  descriptions:
    jp_kana: "青白く　輝く　無数の　光線で\n相手を　攻撃する。"
    jp_kanji: "青白く　輝く　無数の　光線で\n相手を　攻撃する。"
    en: "The user attacks opposing Pokémon with countless\nbeams of light that glow a deep and brilliant blue."
    fr: "Le lanceur projette une aura, et d’innombrables rayons\nlumineux d’un bleu étincelant s’abattent sur la cible."
    it: "Il Pokémon attacca il bersaglio colpendolo con miriadi\ndi raggi di luce blu."
    de: "Der Anwender greift gegnerische Pokémon mit\nunzähligen blau leuchtenden Strahlen an."
    es: "Ataca al objetivo con una infinidad de rayos de luz\nazulada."
    ko: "파랗게 빛나는 무수한 광선으로\n상대를 공격한다."
    zh_simp: "用无数青白色\n且闪耀的光线攻击对手。"
    zh_trad: "放出無數閃耀著青白色光輝的\n光線攻擊對手。"
outrage:
  names:
    jp_kana: げきりん
    jp_kanji: げきりん
    en: Outrage
    fr: Colère
    it: Oltraggio
    de: Wutanfall
    es: Enfado
    ko: 역린
    zh_simp: 逆鳞
    zh_trad: 逆鱗
  descriptions:
    jp_kana: "２ー３ターンの　間\n暴れまくって　攻撃する。\n暴れたあとは　混乱する。"
    jp_kanji: "２ー３ターンの　間\n暴れまくって　攻撃する。\n暴れたあとは　混乱する。"
    en: "The user rampages and attacks for two to three turns.\nThe user then becomes confused."
    fr: "Le lanceur enrage et attaque pendant deux ou trois tours\navant de devenir confus."
    it: "Il Pokémon s’infuria e attacca per due o tre turni,\nma rimane confuso."
    de: "Attacke über zwei bis drei Runden, die den Anwender\ndanach verwirrt."
    es: "El usuario ataca enfurecido durante dos o tres turnos\ny, después, se queda confuso."
    ko: "2~3턴 동안\n마구 난동 부려서 공격한다.\n난동 부린 뒤에는 혼란에 빠진다."
    zh_simp: "在２～３回合内，\n乱打一气地进行攻击。\n大闹一番后自己会陷入混乱。"
    zh_trad: "在２～３回合內\n瘋狂亂打對手進行攻擊。\n大鬧一番後自己會陷入混亂。"
overdrive:
  names:
    jp_kana: オーバードライブ
    jp_kanji: オーバードライブ
    en: Overdrive
    fr: Overdrive
    it: Overdrive
    de: Overdrive
    es: Amplificador
    ko: 오버드라이브
    zh_simp: 破音
    zh_trad: 破音
  descriptions:
    jp_kana: "ギターや　ベースを　かきならして\n激しく　響く　大きな　振動を\n相手に　与えて　攻撃する。"
    jp_kanji: "ギターや　ベースを　かきならして\n激しく　響く　大きな　振動を\n相手に　与えて　攻撃する。"
    en: "The user attacks opposing Pokémon by twanging a guitar\nor bass guitar, causing a huge echo and strong vibration."
    fr: "Le lanceur gratte ses cordes de guitare ou de basse\npour créer de violentes vibrations sonores qui blessent\nla cible."
    it: "Il Pokémon suona la chitarra o il basso creando un’onda\nsonora potentissima con cui attacca il bersaglio."
    de: "Der Anwender haut in die Saiten seiner Gitarre oder\nseines Basses und erzeugt dröhnende, kraftvolle\nVibrationen, die gegnerischen Pokémon schaden."
    es: "El usuario rasguea la guitarra o el bajo para generar\nenormes vibraciones de intensa reverberación con las\nque ataca al objetivo."
    ko: "기타나 베이스를 쳐서\n큰 울림과 강한 진동을\n상대에게 전달하여 공격한다."
    zh_simp: "奏响吉他和贝斯，释放出\n发出巨响的剧烈震动\n攻击对手。"
    zh_trad: "彈奏吉他和貝斯，\n用發出巨響的激烈震動\n攻擊對手。"
overheat:
  names:
    jp_kana: オーバーヒート
    jp_kanji: オーバーヒート
    en: Overheat
    fr: Surchauffe
    it: Vampata
    de: Hitzekoller
    es: Sofoco
    ko: 오버히트
    zh_simp: 过热
    zh_trad: 過熱
  descriptions:
    jp_kana: "フルパワーで　相手を　攻撃する。\n使うと　反動で\n自分の　特攻が　がくっと　さがる。"
    jp_kanji: "フルパワーで　相手を　攻撃する。\n使うと　反動で\n自分の　特攻が　がくっと　さがる。"
    en: "The user attacks the target with all its might. The recoil\nfrom this move harshly lowers the user’s Sp. Atk stat."
    fr: "Le lanceur attaque la cible à pleine puissance, mais\nle contrecoup baisse beaucoup l’Attaque Spéciale\ndu lanceur."
    it: "Il Pokémon sferra un potente attacco, ma il contraccolpo\nriduce di molto il suo Attacco Speciale."
    de: "Angriff mit voller Kraft, der den Spezial-Angriff des\nAnwenders durch den Rückstoß stark senkt."
    es: "Ataca al objetivo con toda su fuerza, pero reduce mucho\nel Ataque Especial del usuario."
    ko: "풀 파워로 상대를 공격한다.\n사용하면 반동으로\n자신의 특수공격이 크게 떨어진다."
    zh_simp: "使出全部力量攻击对手。\n使用之后会因为反作用力，\n自己的特攻大幅降低。"
    zh_trad: "釋放全部能量攻擊對手。\n使用後因為反作用力，\n自己的特攻會大幅降低。"
pain_split:
  names:
    jp_kana: いたみわけ
    jp_kanji: いたみわけ
    en: Pain Split
    fr: Balance
    it: Malcomune
    de: Leidteiler
    es: Divide Dolor
    ko: 아픔나누기
    zh_simp: 分担痛楚
    zh_trad: 分擔痛楚
  descriptions:
    jp_kana: "自分の　ＨＰと　相手の　ＨＰを\nあわせて　それを　自分と　相手で\nなかよく　わける。"
    jp_kanji: "自分の　ＨＰと　相手の　ＨＰを\nあわせて　それを　自分と　相手で\nなかよく　わける。"
    en: "The user adds its HP to the target’s HP, then equally\nsplits the combined HP between the target and itself."
    fr: "Le lanceur ajoute ses PV à ceux de sa cible\net les répartit équitablement."
    it: "Il Pokémon somma i propri PS a quelli del bersaglio\nper poi dividerli in parti uguali."
    de: Addiert KP von Anwender und Ziel. Teilt sie gerecht auf.
    es: "Suma los PS del usuario a los del objetivo y los reparte\na partes iguales."
    ko: "자신의 HP와 상대의 HP를\n합친 것을 자신과 상대가\n사이좋게 나눈다."
    zh_simp: "将自己的ＨＰ和\n对手的ＨＰ相加，\n然后自己和对手友好地平分。"
    zh_trad: "將自己的ＨＰ和\n對手的ＨＰ相加，\n然後雙方友好地平分。"
parabolic_charge:
  names:
    jp_kana: パラボラチャージ
    jp_kanji: パラボラチャージ
    en: Parabolic Charge
    fr: Parabocharge
    it: Caricaparabola
    de: Parabolladung
    es: Carga Parábola
    ko: 파라볼라차지
    zh_simp: 抛物面充电
    zh_trad: 拋物面充電
  descriptions:
    jp_kana: "周りにいる　ポケモン　全員に\nダメージ。　与えた　ダメージの\n半分を　自分が　回復する。"
    jp_kanji: "周りにいる　ポケモン　全員に\nダメージ。　与えた　ダメージの\n半分を　自分が　回復する。"
    en: "The user attacks everything around it. The user’s HP is\nrestored by half the damage taken by those hit."
    fr: "Inflige des dégâts à tous les Pokémon autour du lanceur.\nIl récupère en PV la moitié des dégâts infligés."
    it: "Infligge danni a tutti i Pokémon attorno. Chi la\nusa recupera una quantità di PS pari alla metà\ndel danno inflitto."
    de: "Fügt allen Pokémon im Umkreis Schaden zu.\nDer Anwender wird um die Hälfte des insgesamt\nangerichteten Schadens geheilt."
    es: "Inflige daño a los Pokémon adyacentes. El usuario\nabsorbe la mitad del daño producido para restaurar\nsus propios PS."
    ko: "주위에 있는 모든 포켓몬에게\n데미지를 준다. 준 데미지의\n절반을 자신이 회복한다."
    zh_simp: "给周围全体宝可梦造成伤害。\n可以回复给予伤害的一半HP。"
    zh_trad: "攻擊自己周圍所有的寶可夢。\n可以回復給予傷害的一半ＨＰ。"
parting_shot:
  names:
    jp_kana: すてゼリフ
    jp_kanji: すてゼリフ
    en: Parting Shot
    fr: Dernier Mot
    it: Monito
    de: Abgangstirade
    es: Última Palabra
    ko: 막말내뱉기
    zh_simp: 抛下狠话
    zh_trad: 拋下狠話
  descriptions:
    jp_kana: "すてゼリフで　相手を　いかくし\n攻撃と　特攻を　さげたのち\n控えの　ポケモンと　入れ替わる。"
    jp_kanji: "すてゼリフで　相手を　いかくし\n攻撃と　特攻を　さげたのち\n控えの　ポケモンと　入れ替わる。"
    en: "With a parting threat, the user lowers the target’s Attack\nand Sp. Atk stats. Then it switches places with a party\nPokémon in waiting."
    fr: "Le lanceur menace la cible dans une ultime tirade avant\nde changer de place avec un autre Pokémon.\nRéduit l’Attaque et l’Attaque Spéciale de la cible."
    it: "Chi la usa lancia un monito intimidatorio al bersaglio,\nriducendone l’Attacco e l’Attacco Speciale, e si fa\nsostituire da un altro Pokémon della squadra."
    de: "Schüchtert das Ziel mit einer Abgangstirade ein,\nsodass dessen Angriffs- und Spezial-Angriffs-Wert\nsinken. Danach wird der Anwender ausgewechselt."
    es: "El usuario se cambia por otro Pokémon del equipo,\npero antes intimida al objetivo y reduce su Ataque y\nsu Ataque Especial."
    ko: "막말을 내뱉어 상대를 위협하여\n공격과 특수공격을 떨어뜨린 후\n교대 포켓몬과 교체한다."
    zh_simp: "抛下狠话威吓对手，\n降低攻击和特攻后，\n和后备宝可梦进行替换。"
    zh_trad: "拋下狠話恐嚇對手，\n降低對手的攻擊和特攻後，\n和後備寶可夢進行替換。"
pay_day:
  names:
    jp_kana: ネコにこばん
    jp_kanji: ネコにこばん
    en: Pay Day
    fr: Jackpot
    it: Giornopaga
    de: Zahltag
    es: Día de Pago
    ko: 고양이돈받기
    zh_simp: 聚宝功
    zh_trad: 聚寶功
  descriptions:
    jp_kana: "相手の　体に\n小判を　投げつけて　攻撃する。\n戦闘の　あとで　お金が　もらえる。"
    jp_kanji: "相手の　体に\n小判を　投げつけて　攻撃する。\n戦闘の　あとで　お金が　もらえる。"
    en: "Coins are hurled at the target to inflict damage.\nMoney is earned after the battle."
    fr: "Des pièces sont lancées sur la cible.\nPermet d’obtenir de l’argent à la fin du combat."
    it: "Il Pokémon attacca il bersaglio con una gran quantità\ndi monete recuperabili dopo la lotta."
    de: "Das Ziel wird mit Münzen beworfen. Das Geld wird\nnach dem Kampf aufgesammelt."
    es: "Ataca al objetivo arrojándole monedas. Al finalizar el\ncombate, las recupera en forma de ganancias."
    ko: "상대의 몸에\n돈을 세게 던져서 공격한다.\n배틀 후에 돈을 받을 수 있다."
    zh_simp: "向对手的身体\n投掷小金币进行攻击。\n战斗后可以拿到钱。"
    zh_trad: "往對手身上\n投擲金幣進行攻擊。\n戰鬥後可以得到錢。"
payback:
  names:
    jp_kana: しっぺがえし
    jp_kanji: しっぺがえし
    en: Payback
    fr: Représailles
    it: Rivincita
    de: Gegenstoß
    es: Vendetta
    ko: 보복
    zh_simp: 以牙还牙
    zh_trad: 以牙還牙
  descriptions:
    jp_kana: "ためこんで　攻撃する。\n相手より　あとに　攻撃できると\n技の　威力は　２倍に　なる。"
    jp_kanji: "ためこんで　攻撃する。\n相手より　あとに　攻撃できると\n技の　威力は　２倍に　なる。"
    en: "The user stores power, then attacks. This move’s power\nis doubled if the user moves after the target."
    fr: "Le lanceur charge son énergie, puis attaque.\nLa puissance de la capacité est doublée si\nle lanceur agit après la cible."
    it: "Il Pokémon accumula forza e attacca. La potenza\nraddoppia se agisce dopo il bersaglio."
    de: "Der Anwender lädt die Attacke auf. Handelt das Ziel vor\ndem Anwender, verdoppelt sich die Stärke der Attacke."
    es: "El usuario contraataca con el doble de potencia si el\nobjetivo usa un movimiento antes."
    ko: "모아서 공격한다.\n상대보다 나중에 공격할 수 있으면\n기술의 위력은 2배가 된다."
    zh_simp: "蓄力攻击。\n如果能在对手之后攻击，\n招式的威力会变成２倍。"
    zh_trad: "累積力量進行攻擊。\n若在對手之後進行攻擊，\n招式的威力會變成２倍。"
peck:
  names:
    jp_kana: つつく
    jp_kanji: つつく
    en: Peck
    fr: Picpic
    it: Beccata
    de: Pikser
    es: Picotazo
    ko: 쪼기
    zh_simp: 啄
    zh_trad: 啄
  descriptions:
    jp_kana: "鋭く　とがった　くちばしや　つので\n相手を　突いて　攻撃する。"
    jp_kanji: "鋭く　とがった　くちばしや　つので\n相手を　突いて　攻撃する。"
    en: "The target is jabbed with a sharply pointed beak or horn\nto inflict damage."
    fr: "Le lanceur frappe la cible d’un bec acéré ou\nd’une corne pointue pour infliger des dégâts."
    it: "Il Pokémon attacca il bersaglio con il becco appuntito\no con un corno."
    de: Greift das Ziel mit dem Schnabel oder Horn an.
    es: Ensarta al objetivo con un cuerno o pico punzante.
    ko: "날카롭고 뾰족한 부리나 뿔로\n상대를 쪼아서 공격한다."
    zh_simp: "用尖锐的喙或角\n刺向对手进行攻击。"
    zh_trad: "用尖銳的喙或角\n刺向對手進行攻擊。"
perish_song:
  names:
    jp_kana: ほろびのうた
    jp_kanji: ほろびのうた
    en: Perish Song
    fr: Requiem
    it: Ultimocanto
    de: Abgesang
    es: Canto Mortal
    ko: 멸망의노래
    zh_simp: 终焉之歌
    zh_trad: 滅亡之歌
  descriptions:
    jp_kana: "歌を　聴いた　ポケモンは\n３ターン　たつと　ひんしに　なる。\n交代すると　効果は　なくなる。"
    jp_kanji: "歌を　聴いた　ポケモンは\n３ターン　たつと　ひんしに　なる。\n交代すると　効果は　なくなる。"
    en: "Any Pokémon that hears this song faints in three turns,\nunless it switches out of battle."
    fr: "Tout Pokémon qui entend ce requiem est K.O.\ndans trois tours à moins qu’il ne soit remplacé."
    it: "Qualunque Pokémon che senta questo canto va\nKO in tre turni, se non lo si sostituisce."
    de: "Wer diese Musik hört, wird nach drei Runden besiegt.\nRettung ist durch den Eintausch eines neuen Pokémon\nmöglich."
    es: "Si un Pokémon escucha este canto y no es cambiado\npor otro en tres turnos, acaba debilitándose."
    ko: "노래를 들은 포켓몬은\n3턴이 지나면 기절한다.\n교체되면 효과가 없어진다."
    zh_simp: "倾听歌声的宝可梦\n经过３回合陷入昏厥。\n替换后效果消失。"
    zh_trad: "聽了歌聲的寶可夢\n３回合後將陷入瀕死。\n替換寶可夢後效果就會消失。"
petal_blizzard:
  names:
    jp_kana: はなふぶき
    jp_kanji: はなふぶき
    en: Petal Blizzard
    fr: Tempête Florale
    it: Fiortempesta
    de: Blütenwirbel
    es: Tormenta Floral
    ko: 꽃보라
    zh_simp: 落英缤纷
    zh_trad: 落英繽紛
  descriptions:
    jp_kana: "激しい　花吹雪を　起こし\n周りに　いるものに　攻撃して\nダメージを　与える。"
    jp_kanji: "激しい　花吹雪を　起こし\n周りに　いるものに　攻撃して\nダメージを　与える。"
    en: "The user stirs up a violent petal blizzard and damages\neverything around it."
    fr: "Déclenche une violente tempête de fleurs qui inflige\ndes dégâts à tous les Pokémon alentour."
    it: "Chi la usa infligge danni agli altri Pokémon attorno\nattaccandoli con una tempesta di fiori."
    de: "Der Anwender erzeugt einen turbulenten Blütenwirbel,\nder alle Pokémon im Umkreis erfasst und ihnen Schaden\nzufügt."
    es: "El usuario desata un intenso vendaval de pétalos que\ndaña a los Pokémon adyacentes."
    ko: "세찬 꽃보라를 일으켜서\n주위에 있는 포켓몬을 공격하여\n데미지를 준다."
    zh_simp: "猛烈地刮起飞雪般的落花，\n攻击周围所有的宝可梦，\n并给予伤害。"
    zh_trad: "猛烈地刮起飛雪般的落花，\n攻擊自己周圍所有的寶可夢。"
petal_dance:
  names:
    jp_kana: はなびらのまい
    jp_kanji: はなびらのまい
    en: Petal Dance
    fr: Danse Fleurs
    it: Petalodanza
    de: Blättertanz
    es: Danza Pétalo
    ko: 꽃잎댄스
    zh_simp: 花瓣舞
    zh_trad: 花瓣舞
  descriptions:
    jp_kana: "２ー３ターンの　間　花を\nまきちらして　相手を　攻撃する。\nまきちらした　あとは　混乱する。"
    jp_kanji: "２ー３ターンの　間　花を\nまきちらして　相手を　攻撃する。\nまきちらした　あとは　混乱する。"
    en: "The user attacks the target by scattering petals for\ntwo to three turns. The user then becomes confused."
    fr: "Le lanceur attaque en projetant des pétales pendant\ndeux à trois tours avant de céder à la confusion."
    it: "Il Pokémon attacca il bersaglio cospargendolo di petali\nper due o tre turni, ma rimane confuso."
    de: "Angriff mit Blütenblättern für zwei bis drei Runden.\nDanach wird der Angreifer verwirrt."
    es: "Ataca al objetivo lanzando pétalos de dos a tres turnos\ny, al finalizar, el usuario se queda confuso."
    ko: "2~3턴 동안 꽃을\n흩뿌려서 상대를 공격한다.\n흩뿌린 뒤에는 혼란에 빠진다."
    zh_simp: "在２～３回合内，\n散落花瓣攻击对手。\n之后自己会陷入混乱。"
    zh_trad: "在２～３回合內\n不斷灑出花瓣攻擊對手。\n招式結束後自己會陷入混亂狀態。"
phantom_force:
  names:
    jp_kana: ゴーストダイブ
    jp_kanji: ゴーストダイブ
    en: Phantom Force
    fr: Hantise
    it: Spettrotuffo
    de: Phantomkraft
    es: Golpe Fantasma
    ko: 고스트다이브
    zh_simp: 潜灵奇袭
    zh_trad: 潛靈奇襲
  descriptions:
    jp_kana: "１ターンめで　どこかに　消えて\n２ターンめに　相手を　攻撃する。\n守りを　無視して　攻撃できる。"
    jp_kanji: "１ターンめで　どこかに　消えて\n２ターンめに　相手を　攻撃する。\n守りを　無視して　攻撃できる。"
    en: "The user vanishes somewhere, then strikes the target on\nthe next turn. This move hits even if the target protects\nitself."
    fr: "Le lanceur disparaît au premier tour et frappe au second.\nCette attaque passe outre les protections."
    it: "Il Pokémon scompare improvvisamente per attaccare\npoi nel turno seguente. Questa mossa neutralizza\nle protezioni del bersaglio."
    de: "Der Anwender verschwindet in Runde 1, um seine Kraft\nzu sammeln, und attackiert in Runde 2. Trifft auch,\nwenn sich das Ziel selbst schützt."
    es: "El usuario desaparece en el primer turno y ataca a su\nobjetivo en el segundo. Permite acertar aunque el\nobjetivo esté protegiéndose."
    ko: "1턴째에 어디론가 사라져서\n2턴째에 상대를 공격한다.\n기술 방어를 무시하고 공격할 수 있다."
    zh_simp: "第１回合消失在某处，\n第２回合攻击对手。\n可以无视守护进行攻击。"
    zh_trad: "使用後的第１回合消失到某處，\n並於第２回合攻擊對手。\n可不顧對手的守護進行攻擊。"
photon_geyser:
  names:
    jp_kana: フォトンゲイザー
    jp_kanji: フォトンゲイザー
    en: Photon Geyser
    fr: Photo-Geyser
    it: Geyser Fotonico
    de: Photonen-Geysir
    es: Géiser Fotónico
    ko: 포톤가이저
    zh_simp: 光子喷涌
    zh_trad: 光子噴湧
  descriptions:
    jp_kana: "光の　柱で　攻撃する。\n攻撃と　特攻を　比べて\n高いほうで　ダメージを　与える。"
    jp_kanji: "光の　柱で　攻撃する。\n攻撃と　特攻を　比べて\n高いほうで　ダメージを　与える。"
    en: "The user attacks the target with a pillar of light. This\nmove inflicts damage using the Attack or Sp. Atk stat—\nwhichever is higher for the user."
    fr: "Le lanceur fait jaillir un pilier de lumière.\nCompare l’Attaque et l’Attaque Spéciale, et utilise\ncelle qui infligera le plus de dégâts."
    it: "Il Pokémon attacca il bersaglio con una colonna di luce.\nInfligge danni in base all’Attacco o all’Attacco\nSpeciale scegliendo il più alto tra i due."
    de: "Ein Angriff mit einer Lichtsäule. Ist der Angriff höher\nals der Spezial-Angriff, wird die Höhe des Schadens\ndurch den Angriff bestimmt und umgekehrt."
    es: "El usuario ataca con una gran columna de luz. Compara\nsus valores de Ataque y Ataque Especial para infligir\ndaño con el más alto de los dos."
    ko: "빛의 기둥으로 공격한다.\n공격과 특수공격을 비교해서\n높은 쪽으로 데미지를 준다."
    zh_simp: "用光柱来进行攻击。\n比较自己的攻击和特攻，\n用数值相对较高的一项给予对方伤害。"
    zh_trad: "以光柱進行攻擊。\n會比較自己的攻擊和特攻，\n以數值較高的一方進行攻擊。"
pika_papow:
  names:
    jp_kana: ピカピカサンダー
    jp_kanji: ピカピカサンダー
    en: Pika Papow
    fr: Pika-Fracas
    it: Pikasaetta
    de: Pika-Flash
    es: Pikatormenta
    ko: 피카피카썬더
    zh_simp: 闪闪雷光
    zh_trad: 閃閃雷光
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
pin_missile:
  names:
    jp_kana: ミサイルばり
    jp_kanji: ミサイルばり
    en: Pin Missile
    fr: Dard-Nuée
    it: Missilspillo
    de: Nadelrakete
    es: Pin Misil
    ko: 바늘미사일
    zh_simp: 飞弹针
    zh_trad: 飛彈針
  descriptions:
    jp_kana: "鋭い　ハリを\n相手に　発射して　攻撃する。\n２ー５回の　間　連続で　だす。"
    jp_kanji: "鋭い　ハリを\n相手に　発射して　攻撃する。\n２ー５回の　間　連続で　だす。"
    en: "The user attacks by shooting sharp spikes at the target.\nThis move hits two to five times in a row."
    fr: "Envoie une rafale de dards.\nPeut toucher de deux à cinq fois."
    it: "Il Pokémon attacca il bersaglio da due a cinque volte\nin rapida successione con delle spine."
    de: "Spitze Nadeln treffen das Ziel zwei- bis fünfmal\nhintereinander."
    es: "Lanza afiladas púas que hieren al objetivo de dos a\ncinco veces seguidas."
    ko: "날카로운 침을\n상대에게 발사해서 공격한다.\n2~5회 연속으로 쓴다."
    zh_simp: "向对手发射\n锐针进行攻击。\n连续攻击２～５次。"
    zh_trad: "向對手發射\n銳利的針進行攻擊。\n可連續攻擊２～５次。"
plasma_fists:
  names:
    jp_kana: プラズマフィスト
    jp_kanji: プラズマフィスト
    en: Plasma Fists
    fr: Plasma Punch
    it: Pugni Plasma
    de: Plasmafäuste
    es: Puños Plasma
    ko: 플라스마피스트
    zh_simp: 等离子闪电拳
    zh_trad: 等離子閃電拳
  descriptions:
    jp_kana: "電気を　まとった　こぶしで\n攻撃。　ノーマルタイプの　技を\nでんきタイプに　してしまう。"
    jp_kanji: "電気を　まとった　こぶしで\n攻撃。　ノーマルタイプの　技を\nでんきタイプに　してしまう。"
    en: "The user attacks with electrically charged fists. This move\nchanges Normal-type moves to Electric-type moves."
    fr: "Le lanceur attaque en projetant de l’électricité\navec ses poings. Convertit les capacités de type Normal\nen type Électrik."
    it: "Il Pokémon attacca con pugni carichi di elettricità.\nTrasforma le mosse di tipo Normale in mosse di tipo\nElettro."
    de: "Ein Angriff mit elektrisch geladenen Fäusten, der\nbewirkt, dass Normal-Attacken den Typ Elektro\nannehmen."
    es: "El usuario ataca con puños cargados de electricidad.\nConvierte los movimientos de tipo Normal en\nmovimientos de tipo Eléctrico."
    ko: "전기를 두른 주먹으로\n공격한다. 노말타입 기술을\n전기타입으로 바꿔 버린다."
    zh_simp: "用覆盖着电流的拳头进行攻击。\n使一般属性的招式变成电属性。"
    zh_trad: "用帶有電流的拳頭進行攻擊。\n可以將一般屬性的\n招式轉變為電屬性。"
play_nice:
  names:
    jp_kana: なかよくする
    jp_kanji: なかよくする
    en: Play Nice
    fr: Camaraderie
    it: Simpatia
    de: Kameradschaft
    es: Camaradería
    ko: 친해지기
    zh_simp: 和睦相处
    zh_trad: 和睦相處
  descriptions:
    jp_kana: "相手と　なかよくなって\n戦う　気力を　失わせ\n相手の　攻撃を　さげる。"
    jp_kanji: "相手と　なかよくなって\n戦う　気力を　失わせ\n相手の　攻撃を　さげる。"
    en: "The user and the target become friends, and the target\nloses its will to fight. This lowers the target’s Attack stat."
    fr: "La cible se lie d’amitié avec le lanceur et perd\nsa combativité, ce qui diminue son Attaque."
    it: "Il Pokémon diventa amico del bersaglio, rabbonendolo\ne riducendone così l’Attacco."
    de: "Der Anwender schließt mit dem Ziel Freundschaft\nund nimmt ihm seine Angriffslust. Der Angriffs-Wert\ndes Zieles sinkt."
    es: "Se hace amigo de su objetivo y consigue que a este\nse le quiten las ganas de combatir, lo que reduce su\nAtaque."
    ko: "상대와 친해져서\n싸울 마음을 잃게 하여\n상대의 공격을 떨어뜨린다."
    zh_simp: "和对手和睦相处，\n使其失去战斗的气力，\n从而降低对手的攻击。"
    zh_trad: "和對手和睦相處，\n讓對手失去戰鬥意志，\n降低對手的攻擊。"
play_rough:
  names:
    jp_kana: じゃれつく
    jp_kanji: じゃれつく
    en: Play Rough
    fr: Câlinerie
    it: Carineria
    de: Knuddler
    es: Carantoña
    ko: 치근거리기
    zh_simp: 嬉闹
    zh_trad: 嬉鬧
  descriptions:
    jp_kana: "相手に　じゃれついて\n攻撃する。　相手の\n攻撃を　さげる　ことがある。"
    jp_kanji: "相手に　じゃれついて\n攻撃する。　相手の\n攻撃を　さげる　ことがある。"
    en: "The user attacks by playing rough with the target.\nThis may also lower the target’s Attack stat."
    fr: "Le lanceur attaque la cible en lui faisant des câlineries,\nce qui peut aussi diminuer l’Attaque de celle-ci."
    it: "Il Pokémon attacca il bersaglio con delle carinerie.\nPuò anche ridurne l’Attacco."
    de: "Der Anwender knuddelt das Ziel und greift es an.\nSenkt eventuell den Angriffs-Wert des Zieles."
    es: "El usuario le hace cucamonas al objetivo y lo ataca.\nPuede reducir el Ataque del objetivo."
    ko: "상대에게 치근거리며\n공격한다. 상대의\n공격을 떨어뜨릴 때가 있다."
    zh_simp: "与对手嬉闹并攻击。\n有时会降低对手的攻击。"
    zh_trad: "在和對手嬉鬧的同時進行攻擊。\n有時會降低對手的攻擊。"
pluck:
  names:
    jp_kana: ついばむ
    jp_kanji: ついばむ
    en: Pluck
    fr: Picore
    it: Spennata
    de: Pflücker
    es: Picoteo
    ko: 쪼아대기
    zh_simp: 啄食
    zh_trad: 啄食
  descriptions:
    jp_kana: "くちばしで　攻撃。\n相手が　きのみを　持っているとき\n食べて　きのみの　効果を　受けられる。"
    jp_kanji: "くちばしで　攻撃。\n相手が　きのみを　持っているとき\n食べて　きのみの　効果を　受けられる。"
    en: "The user attacks by pecking the target. If the target is\nholding a Berry, the user eats it and gains its effect."
    fr: "Le lanceur picore la cible.\nSi cette dernière tient une Baie, le lanceur la mange\net profite de ses effets."
    it: "Il Pokémon attacca beccando. Se il bersaglio ha\nuna bacca, gliela mangia e ne può sfruttare gli effetti."
    de: "Anwender pickt das Ziel, nimmt die Beere, falls das\nZiel eine trägt, und erhält ihren Effekt."
    es: "Picotea al objetivo. Si este sostiene una baya, la picotea\ntambién y obtiene sus efectos."
    ko: "부리로 공격한다.\n상대가 나무열매를 지니고 있을 때\n먹어서 나무열매의 효과를 받을 수 있다."
    zh_simp: "用喙进行攻击。\n当对手携带树果时，\n可以食用并获得其效果。"
    zh_trad: "用鳥喙進行攻擊。\n可以吃下對手攜帶的樹果，\n並獲得樹果的效果。"
poison_fang:
  names:
    jp_kana: どくどくのキバ
    jp_kanji: どくどくのキバ
    en: Poison Fang
    fr: Crochet Venin
    it: Velenodenti
    de: Giftzahn
    es: Colmillo Veneno
    ko: 맹독엄니
    zh_simp: 剧毒牙
    zh_trad: 劇毒牙
  descriptions:
    jp_kana: "毒の　ある　キバで\n相手に　かみついて　攻撃する。\n猛毒を　おわせる　ことが　ある。"
    jp_kanji: "毒の　ある　キバで\n相手に　かみついて　攻撃する。\n猛毒を　おわせる　ことが　ある。"
    en: "The user bites the target with toxic fangs. This may also\nleave the target badly poisoned."
    fr: "Le lanceur mord la cible avec ses crocs toxiques, ce qui\npeut aussi l’empoisonner gravement."
    it: "Il Pokémon attacca il bersaglio mordendolo con denti\navvelenati che possono anche iperavvelenarlo."
    de: "Angriff mit giftigen Reißzähnen. Das Ziel wird eventuell\nschwer vergiftet."
    es: "Mordedura con colmillos venenosos que inflige daño\nal objetivo y puede envenenarlo gravemente."
    ko: "독이 있는 이빨로\n상대를 물어서 공격한다.\n맹독을 주입할 때가 있다."
    zh_simp: "用有毒的牙齿\n咬住对手进行攻击。\n有时会使对手中剧毒。"
    zh_trad: "用有毒的牙齒\n咬住對手進行攻擊。\n有時會讓對手陷入劇毒狀態。"
poison_gas:
  names:
    jp_kana: どくガス
    jp_kanji: どくガス
    en: Poison Gas
    fr: Gaz Toxik
    it: Velenogas
    de: Giftwolke
    es: Gas Venenoso
    ko: 독가스
    zh_simp: 毒瓦斯
    zh_trad: 毒瓦斯
  descriptions:
    jp_kana: "毒ガスを　相手の　顔に　吹きかけて\n毒の　状態に　する。"
    jp_kanji: "毒ガスを　相手の　顔に　吹きかけて\n毒の　状態に　する。"
    en: "A cloud of poison gas is sprayed in the faces of\nopposing Pokémon, poisoning those it hits."
    fr: "Le lanceur empoisonne la cible en lui projetant\nun nuage de gaz toxique au visage."
    it: "Il Pokémon spruzza in faccia agli avversari una nuvola\ndi gas tossico che li avvelena."
    de: "Hüllt gegnerische Pokémon in ein Gas ein, das sie\nvergiftet."
    es: "Lanza una nube de gas tóxico al rostro del objetivo.\nProduce envenenamiento."
    ko: "독가스를 상대의 얼굴에 내뿜어\n독 상태로 만든다."
    zh_simp: "将毒瓦斯吹到对手的脸上，\n从而让对手陷入中毒状态。"
    zh_trad: "將毒瓦斯吹到對手的臉上，\n讓對手陷入中毒狀態。"
poison_jab:
  names:
    jp_kana: どくづき
    jp_kanji: どくづき
    en: Poison Jab
    fr: Direct Toxik
    it: Velenpuntura
    de: Gifthieb
    es: Puya Nociva
    ko: 독찌르기
    zh_simp: 毒击
    zh_trad: 毒擊
  descriptions:
    jp_kana: "毒に　そまった　触手や　腕で\n相手を　突き刺す。\n毒状態に　することが　ある。"
    jp_kanji: "毒に　そまった　触手や　腕で\n相手を　突き刺す。\n毒状態に　することが　ある。"
    en: "The target is stabbed with a tentacle, an arm, or the like\nsteeped in poison. This may also poison the target."
    fr: "Le lanceur attaque la cible avec un tentacule, un bras,\nou un autre membre imprégné de poison, ce qui peut\naussi empoisonner la cible."
    it: "Il Pokémon infilza il bersaglio con un tentacolo o un arto\nintriso di una sostanza tossica che può anche\navvelenarlo."
    de: "Der Anwender greift mit giftigen Gliedmaßen wie\nTentakeln oder Armen an. Das Ziel wird dabei\neventuell vergiftet."
    es: "Pincha al objetivo con un tentáculo o brazo envenenado.\nPuede llegar a envenenar al objetivo."
    ko: "독에 물든 촉수나 팔로\n상대를 꿰찌른다.\n독 상태로 만들 때가 있다."
    zh_simp: "用带毒的触手或手臂刺入对手。\n有时会让对手陷入中毒状态。"
    zh_trad: "以帶有毒性的觸手或手臂刺進對手。\n有時會讓對手陷入中毒狀態。"
poison_powder:
  names:
    jp_kana: どくのこな
    jp_kanji: どくのこな
    en: Poison Powder
    fr: Poudre Toxik
    it: Velenpolvere
    de: Giftpuder
    es: Polvo Veneno
    ko: 독가루
    zh_simp: 毒粉
    zh_trad: 毒粉
  descriptions:
    jp_kana: "毒の　ある　粉を\nたくさん　ふりまいて\n相手を　毒状態に　する。"
    jp_kanji: "毒の　ある　粉を\nたくさん　ふりまいて\n相手を　毒状態に　する。"
    en: "The user scatters a cloud of poisonous dust that poisons\nthe target."
    fr: Une poudre toxique empoisonne la cible.
    it: "Investe il bersaglio con una nuvola di polvere\ntossica che avvelena."
    de: Verstreut giftigen Puder, der das Ziel vergiftet.
    es: Esparce polvo tóxico que envenena al objetivo.
    ko: "독이 있는 가루를\n많이 흩뿌려서\n상대를 독 상태로 만든다."
    zh_simp: "撒出毒粉，\n从而让对手陷入中毒状态。"
    zh_trad: "撒出大量的有毒粉末\n讓對手陷入中毒狀態。"
poison_sting:
  names:
    jp_kana: どくばり
    jp_kanji: どくばり
    en: Poison Sting
    fr: Dard-Venin
    it: Velenospina
    de: Giftstachel
    es: Picotazo Veneno
    ko: 독침
    zh_simp: 毒针
    zh_trad: 毒針
  descriptions:
    jp_kana: "毒の　ある　ハリを\n相手に　突き刺して　攻撃する。\n毒状態に　することが　ある。"
    jp_kanji: "毒の　ある　ハリを\n相手に　突き刺して　攻撃する。\n毒状態に　することが　ある。"
    en: "The user stabs the target with a poisonous stinger to\ninflict damage. This may also poison the target."
    fr: "Un dard toxique transperce la cible et peut aussi\nl’empoisonner."
    it: "Il Pokémon attacca il bersaglio con un aculeo tossico\nche può anche avvelenarlo."
    de: Angriff mit Giftstachel. Das Ziel wird eventuell vergiftet.
    es: "Lanza un aguijón tóxico que puede envenenar al\nobjetivo."
    ko: "독이 있는 침을\n상대에게 꿰찔러서 공격한다.\n독 상태로 만들 때가 있다."
    zh_simp: "将有毒的针\n刺入对手进行攻击。\n有时会让对手陷入中毒状态。"
    zh_trad: "將有毒的針\n刺進對手進行攻擊。\n有時會讓對手陷入中毒狀態。"
poison_tail:
  names:
    jp_kana: ポイズンテール
    jp_kanji: ポイズンテール
    en: Poison Tail
    fr: Queue-Poison
    it: Velenocoda
    de: Giftschweif
    es: Cola Veneno
    ko: 포이즌테일
    zh_simp: 毒尾
    zh_trad: 毒尾
  descriptions:
    jp_kana: "しっぽで　たたく。\n毒状態に　することが　あり\n急所にも　当たりやすい。"
    jp_kanji: "しっぽで　たたく。\n毒状態に　することが　あり\n急所にも　当たりやすい。"
    en: "The user hits the target with its tail. This move has a\nheightened chance of landing a critical hit and may also\npoison the target."
    fr: "Le lanceur attaque la cible avec sa queue, ce qui peut\naussi l’empoisonner. Taux de critiques élevés."
    it: "Il Pokémon colpisce con la coda e può avvelenare\nil bersaglio. Probabile brutto colpo."
    de: "Angriff mit hoher Volltrefferquote. Diese Schweifattacke\nvergiftet das Ziel eventuell."
    es: "Propina un golpe con la cola que puede envenenar al\nobjetivo. Suele asestar un golpe crítico."
    ko: "꼬리로 때린다.\n독 상태로 만들 때가 있고\n급소에도 맞기 쉽다."
    zh_simp: "用尾巴拍打。\n有时会让对手陷入中毒状态，\n也容易击中要害。"
    zh_trad: "將尾巴甩向對手進行攻擊。\n有時會讓對手陷入中毒狀態，\n且容易擊中要害。"
pollen_puff:
  names:
    jp_kana: かふんだんご
    jp_kanji: かふんだんご
    en: Pollen Puff
    fr: Boule Pollen
    it: Sferapolline
    de: Pollenknödel
    es: Bola de Polen
    ko: 꽃가루경단
    zh_simp: 花粉团
    zh_trad: 花粉團
  descriptions:
    jp_kana: "敵には　爆発する　だんごを\n使って　攻撃。　味方には\n回復する　だんごを　与える。"
    jp_kanji: "敵には　爆発する　だんごを\n使って　攻撃。　味方には\n回復する　だんごを　与える。"
    en: "The user attacks the enemy with a pollen puff that\nexplodes. If the target is an ally, it gives the ally a\npollen puff that restores its HP instead."
    fr: "Sur un ennemi, le lanceur envoie une boule explosive\nqui fait des dégâts. Sur un allié, il envoie du bon\npollen nutritif qui fait récupérer des PV."
    it: "Il Pokémon attacca l’avversario con una sfera esplosiva.\nSe colpisce degli alleati, fa recuperare loro dei PS."
    de: "Der Anwender greift mit einem Ball aus Pollen an,\nder beim Ziel explodiert. Mitstreiter werden von\neinem Ball getroffen, der ihre KP auffüllt."
    es: "Ataca al objetivo con una bola explosiva. Si esta alcanza\na un aliado, le hará recuperar PS."
    ko: "상대에게는 폭발하는 경단을\n사용하여 공격한다. 같은 편에게는\n회복하는 경단을 준다."
    zh_simp: "对敌人使用是会爆炸的团子。\n对我方使用则是给予回复的团子。"
    zh_trad: "對敵人使用時，用會爆炸的花粉團來攻擊。\n對我方同伴使用時，\n則給予有回復效果的花粉團。"
poltergeist:
  names:
    jp_kana: ポルターガイスト
    jp_kanji: ポルターガイスト
    en: Poltergeist
    fr: Esprit Frappeur
    it: Poltergeist
    de: Poltergeist
    es: Poltergeist
    ko: 폴터가이스트
    zh_simp: 灵骚
    zh_trad: 靈騷
  descriptions:
    jp_kana: "相手の　持ち物を　あやつって　攻撃。\n相手が　道具を　持っていない　場合は\n失敗する。"
    jp_kanji: "相手の　持ち物を　あやつって　攻撃。\n相手が　道具を　持っていない　場合は\n失敗する。"
    en: "The user attacks by controlling the target’s item.\nThis move fails if the target isn’t holding an item."
    fr: "Le lanceur manipule l’objet tenu par la cible pour\nl’attaquer. Cette capacité échoue si celle-ci ne tient rien."
    it: "Il Pokémon attacca utilizzando lo strumento\ndel bersaglio. La mossa fallisce se quest’ultimo\nnon ha uno strumento."
    de: "Der Anwender greift das Ziel mit dessen getragenem\nItem an. Die Attacke schlägt fehl, wenn das Ziel kein\nItem trägt."
    es: "El usuario ataca utilizando el objeto que lleva el\nobjetivo. Si no tiene ninguno equipado, el movimiento\nfalla."
    ko: "상대의 지닌 물건을 조종해서 공격한다.\n상대가 도구를 지니고 있지 않으면 실패한다."
    zh_simp: "操纵对手的持有物进行攻击。\n当对手没有携带道具时，\n使出此招式时便会失败。"
    zh_trad: "操控對手的持有物進行攻擊。\n對手沒有攜帶道具時，\n則會失敗。"
population_bomb:
  names:
    jp_kana: ネズミざん
    jp_kanji: ネズミざん
    en: Population Bomb
    fr: Prolifération
    it: Infestazione
    de: Mäuseplage
    es: Proliferación
    ko: 찍찍베기
    zh_simp: 鼠数儿
    zh_trad: 鼠數兒
  descriptions:
    jp_kana: "仲間たちが　わらわらと　集まって\nコンビネーションで　攻撃を　与えていく。\n１ー１０回の　間　連続で　あたる。"
    jp_kanji: "仲間たちが　わらわらと　集まって\nコンビネーションで　攻撃を　与えていく。\n１ー１０回の　間　連続で　あたる。"
    en: "The user’s fellows gather in droves to perform a combo\nattack that hits the target one to ten times in a row."
    fr: "Le lanceur et ses congénères prolifèrent en masse\net attaquent ensemble d’une à dix fois d’affilée."
    it: "Il Pokémon si riunisce con i suoi simili in un gruppo\nbrulicante che collabora per attaccare e colpisce da\nuna a dieci volte di fila."
    de: "Der Anwender versammelt eine Schar von Artgenossen,\ndie dann geschlossen angreift und das Ziel ein- bis\nzehnmal hintereinander trifft."
    es: "Los congéneres del usuario se agrupan y ejecutan un\nataque conjunto que golpea al objetivo de una a diez\nveces seguidas."
    ko: "여기저기서 동료들을 모아서\n화려한 콤비네이션으로 공격한다.\n1~10회 연속으로 공격한다."
    zh_simp: "伙伴们会纷纷赶来集合，\n以群体行动给予对手攻击。\n连续命中１～１０次。"
    zh_trad: "夥伴們紛紛聚集而來，\n以群體形式逐一給予攻擊。\n連續命中１～１０次。"
pounce:
  names:
    jp_kana: とびつく
    jp_kanji: とびつく
    en: Pounce
    fr: Bond
    it: Balzo
    de: Anspringen
    es: Brinco
    ko: 달려들기
    zh_simp: 虫扑
    zh_trad: 蟲撲
  descriptions:
    jp_kana: "相手に　飛びついて　攻撃する。\n相手の　素早さを　さげる。"
    jp_kanji: "相手に　飛びついて　攻撃する。\n相手の　素早さを　さげる。"
    en: "The user attacks by pouncing on the target. This also\nlowers the target’s Speed stat."
    fr: "Le lanceur attaque en bondissant sur la cible, ce qui\nbaisse la Vitesse de celle-ci."
    it: "Il Pokémon fa un balzo e attacca il bersaglio,\nriducendone inoltre la Velocità."
    de: "Der Anwender greift an, indem er das Ziel anspringt.\nDadurch sinkt auch die Initiative des Zieles."
    es: "Ataca abalanzándose sobre el objetivo y le reduce la\nVelocidad."
    ko: "상대에게 달려들어 공격한다.\n상대의 스피드를 떨어뜨린다."
    zh_simp: "飞扑向对手攻击。\n会降低对手的速度。"
    zh_trad: "撲向對手進行攻擊。\n可降低對手的速度。"
pound:
  names:
    jp_kana: はたく
    jp_kanji: はたく
    en: Pound
    fr: Écras’Face
    it: Botta
    de: Klaps
    es: Destructor
    ko: 막치기
    zh_simp: 拍击
    zh_trad: 拍擊
  descriptions:
    jp_kana: "長い　しっぽや　手などを　使って\n相手を　はたいて　攻撃する。"
    jp_kanji: "長い　しっぽや　手などを　使って\n相手を　はたいて　攻撃する。"
    en: "The target is physically pounded with a long tail, a\nforeleg, or the like."
    fr: "Le lanceur écrase la cible avec l’un de ses membres,\ntels qu’une de ses pattes avant ou sa longue queue."
    it: "Il Pokémon attacca il bersaglio con la coda o le zampe\nanteriori."
    de: Ein Hieb mit den Vorderbeinen oder dem Schweif.
    es: "Golpea al objetivo con las extremidades, la cola\no similares."
    ko: "긴 꼬리나 손 등을 사용하여\n상대를 때려서 공격한다."
    zh_simp: "使用长长的尾巴或手等\n拍打对手进行攻击。"
    zh_trad: "使用長長的尾巴或手等\n拍打對手進行攻擊。"
powder:
  names:
    jp_kana: ふんじん
    jp_kanji: ふんじん
    en: Powder
    fr: Nuée de Poudre
    it: Pulviscoppio
    de: Pulverschleuder
    es: Polvo Explosivo
    ko: 분진
    zh_simp: 粉尘
    zh_trad: 粉塵
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
powder_snow:
  names:
    jp_kana: こなゆき
    jp_kanji: こなゆき
    en: Powder Snow
    fr: Poudreuse
    it: Polneve
    de: Pulverschnee
    es: Nieve Polvo
    ko: 눈싸라기
    zh_simp: 细雪
    zh_trad: 細雪
  descriptions:
    jp_kana: "冷たい　粉雪を\n相手に　吹きつけて　攻撃する。\nこおり状態に　することが　ある。"
    jp_kanji: "冷たい　粉雪を\n相手に　吹きつけて　攻撃する。\nこおり状態に　することが　ある。"
    en: "The user attacks with a chilling gust of powdery snow.\nThis may also leave opposing Pokémon frozen."
    fr: "Le lanceur projette de la neige poudreuse qui peut\naussi geler la cible."
    it: "Il Pokémon attacca il bersaglio con una raffica\ndi neve farinosa e può anche congelarlo."
    de: "Angriff mit Schnee, durch den gegnerische Pokémon\neventuell eingefroren werden."
    es: Lanza nieve que puede llegar a congelar.
    ko: "차가운 가랑눈을\n상대에게 내뿜어 공격한다.\n얼음 상태로 만들 때가 있다."
    zh_simp: "将冰冷的细雪\n吹向对手进行攻击。\n有时会让对手陷入冰冻状态。"
    zh_trad: "將冰冷的細雪\n吹向對手進行攻擊。\n有時會讓對手陷入冰凍狀態。"
power_gem:
  names:
    jp_kana: パワージェム
    jp_kanji: パワージェム
    en: Power Gem
    fr: Rayon Gemme
    it: Gemmoforza
    de: Juwelenkraft
    es: Joya de Luz
    ko: 파워젬
    zh_simp: 力量宝石
    zh_trad: 力量寶石
  descriptions:
    jp_kana: "宝石のように　きらめく　光を\n発射して　相手を　攻撃する。"
    jp_kanji: "宝石のように　きらめく　光を\n発射して　相手を　攻撃する。"
    en: "The user attacks with a ray of light that sparkles as if it\nwere made of gemstones."
    fr: "Le lanceur attaque avec un rayon de lumière\nqui scintille comme s’il était composé de gemmes."
    it: "Il Pokémon attacca con un raggio di luce che brilla\ncome se fosse fatto di pietre preziose."
    de: "Anwender attackiert mit einem Lichtstrahl, der funkelt,\nals sei er aus Juwelen."
    es: "Ataca con un rayo de luz que centellea como si lo\nformaran miles de joyas."
    ko: "보석처럼 반짝이는 빛을 발사하여\n상대를 공격한다."
    zh_simp: "发射如宝石般\n闪耀的光芒攻击对手。"
    zh_trad: "發射如寶石般\n閃耀的光芒攻擊對手。"
power_shift:
  names:
    jp_kana: パワーシフト
    jp_kanji: パワーシフト
    en: Power Shift
    fr: Échange Force
    it: Scambioforza
    de: Kraftwechsel
    es: Cambiapoder
    ko: 파워시프트
    zh_simp: 力量转换
    zh_trad: 力量轉換
  descriptions:
    jp_kana: "自分の　攻撃と\n防御を　入れ替える。"
    jp_kanji: "自分の　攻撃と\n防御を　入れ替える。"
    en: The user swaps its Attack and Defense stats.
    fr: Le lanceur échange son Attaque avec sa Défense.
    it: Il Pokémon scambia il suo Attacco con la Difesa.
    de: "Der Anwender tauscht seinen Angriff mit seiner\nVerteidigung."
    es: Intercambia su Ataque por su Defensa.
    ko: 자신의 공격과 방어를 바꾼다.
    zh_simp: "将自己的攻击\n与防御互相交换。"
    zh_trad: "將自己的攻擊\n與防禦互相交換。"
power_split:
  names:
    jp_kana: パワーシェア
    jp_kanji: パワーシェア
    en: Power Split
    fr: Partage Force
    it: Pariattacco
    de: Kraftteiler
    es: Isofuerza
    ko: 파워셰어
    zh_simp: 力量平分
    zh_trad: 力量平分
  descriptions:
    jp_kana: "超能力で　自分と　相手の\n攻撃と　特攻を　たして\n半分に　わける。"
    jp_kanji: "超能力で　自分と　相手の\n攻撃と　特攻を　たして\n半分に　わける。"
    en: "The user employs its psychic power to average its Attack\nand Sp. Atk stats with those of the target."
    fr: "Additionne l’Attaque Spéciale et l’Attaque du lanceur\net de sa cible et les redistribue équitablement\nentre les deux."
    it: "Il Pokémon sfrutta la sua forza psichica per sommare\nAttacco e Attacco Speciale a quelli del bersaglio e\ndividerli equamente."
    de: "Durch Psycho-Kräfte werden Angriff und Spezial-Angriff\ndes Anwenders und des Zieles addiert und in zwei\ngleiche Hälften geteilt."
    es: "El usuario emplea sus poderes para hacer la media de\nsu Ataque y su Ataque Especial con los del objetivo y\ncompartirlos."
    ko: "초능력으로 자신과 상대의\n공격과 특수공격을 더해서\n반으로 나눈다."
    zh_simp: "利用超能力将自己和对手的\n攻击和特攻相加，\n再进行平分。"
    zh_trad: "用超能力將自己和對手的\n攻擊和特攻各別相加後，\n再進行平分。"
power_swap:
  names:
    jp_kana: パワースワップ
    jp_kanji: パワースワップ
    en: Power Swap
    fr: Permuforce
    it: Barattoforza
    de: Krafttausch
    es: Cambiafuerza
    ko: 파워스왑
    zh_simp: 力量互换
    zh_trad: 力量互換
  descriptions:
    jp_kana: "超能力で　自分と　相手の\n攻撃と　特攻の\n能力変化を　入れ替える。"
    jp_kanji: "超能力で　自分と　相手の\n攻撃と　特攻の\n能力変化を　入れ替える。"
    en: "The user employs its psychic power to switch changes to\nits Attack and Sp. Atk stats with the target."
    fr: "Le lanceur utilise un pouvoir psychique qui échange\nles changements de son Attaque et de son Attaque\nSpéciale avec celles de la cible."
    it: "Il Pokémon sfrutta la sua forza psichica per scambiare\nle modifiche ad Attacco e Attacco Speciale\ncon il bersaglio."
    de: "Psychische Kräfte tauschen Änderungen an Angriff\nund Spezial-Angriff mit denen des Zieles."
    es: "El usuario emplea su poder mental para intercambiar\nlos cambios en el Ataque y el Ataque Especial con el\nobjetivo."
    ko: "초능력으로 자신과 상대의\n공격과 특수공격의\n능력 변화를 교체한다."
    zh_simp: "利用超能力互换\n自己和对手的攻击\n以及特攻的能力变化。"
    zh_trad: "用超能力將自己和對手的\n攻擊與特攻的能力變化互相交換。"
power_trick:
  names:
    jp_kana: パワートリック
    jp_kanji: パワートリック
    en: Power Trick
    fr: Astuce Force
    it: Ingannoforza
    de: Krafttrick
    es: Truco Fuerza
    ko: 파워트릭
    zh_simp: 力量戏法
    zh_trad: 力量戲法
  descriptions:
    jp_kana: "超能力で\n自分の　攻撃と　防御の\n力を　交換する。"
    jp_kanji: "超能力で\n自分の　攻撃と　防御の\n力を　交換する。"
    en: "The user employs its psychic power to switch its Attack\nstat with its Defense stat."
    fr: "Le lanceur utilise ses pouvoirs psychiques pour\néchanger sa Défense et son Attaque."
    it: "Mossa psichica che permette al Pokémon di scambiare\ni valori delle sue statistiche di Attacco e Difesa."
    de: "Anwender setzt Psycho-Kräfte ein, um eigenen\nAngriffs- mit Verteidigungs-Wert auszutauschen."
    es: "El usuario emplea su poder mental para intercambiar\nsu Ataque y su Defensa."
    ko: "초능력으로\n자신의 공격과 방어의\n힘을 교환한다."
    zh_simp: "利用超能力交换\n自己的攻击和\n防御的力量。"
    zh_trad: "利用超能力，\n將自己的攻擊和\n防禦互相交換。"
power_trip:
  names:
    jp_kana: つけあがる
    jp_kanji: つけあがる
    en: Power Trip
    fr: Arrogance
    it: Tracotanza
    de: Überheblichkeit
    es: Chulería
    ko: 기어오르기
    zh_simp: 嚣张
    zh_trad: 囂張
  descriptions:
    jp_kana: "自分の　強さを　鼻高々に\n攻撃する。自分の　能力が\nあがって　いるほど　威力が　あがる。"
    jp_kanji: "自分の　強さを　鼻高々に\n攻撃する。自分の　能力が\nあがって　いるほど　威力が　あがる。"
    en: "The user boasts its strength and attacks the target.\nThe more the user’s stats are boosted, the greater the\nmove’s power."
    fr: "Ivre de puissance, le lanceur attaque de toutes\nses forces. Plus ses stats ont été augmentées,\nplus la puissance de cette capacité augmente."
    it: "Il Pokémon attacca il bersaglio sfoggiando la propria\nforza. Più le sue statistiche sono state aumentate,\npiù la potenza della mossa aumenta."
    de: "Der Anwender prahlt mit seiner Stärke und greift das\nZiel an. Dieser Angriff ist umso stärker, je weiter die\nStatuswerte des Anwenders erhöht sind."
    es: "Ataca al objetivo presumiendo de su fuerza. Cuanto\nmás hayan subido las características del usuario,\nmayor será la potencia del movimiento."
    ko: "자신의 강함을 뻐기며 공격한다.\n자신의 능력이 올라가 있는 만큼\n위력이 올라간다."
    zh_simp: "耀武扬威地攻击对手，\n自己的能力提高得越多，\n威力就越大。"
    zh_trad: "耀武揚威地攻擊對手，\n自己的能力提高得越多，\n威力就越大。"
power_up_punch:
  names:
    jp_kana: グロウパンチ
    jp_kanji: グロウパンチ
    en: Power-Up Punch
    fr: Poing Boost
    it: Crescipugno
    de: Steigerungshieb
    es: Puño Incremento
    ko: 그로우펀치
    zh_simp: 增强拳
    zh_trad: 增強拳
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
power_whip:
  names:
    jp_kana: パワーウィップ
    jp_kanji: パワーウィップ
    en: Power Whip
    fr: Mégafouet
    it: Vigorcolpo
    de: Blattgeißel
    es: Latigazo
    ko: 파워휩
    zh_simp: 强力鞭打
    zh_trad: 強力鞭打
  descriptions:
    jp_kana: "ツタや　触手を　激しく　ふるって\n相手を　たたきつけ　攻撃する。"
    jp_kanji: "ツタや　触手を　激しく　ふるって\n相手を　たたきつけ　攻撃する。"
    en: "The user violently whirls its vines, tentacles, or the like to\nlash the target."
    fr: "Le lanceur fait virevolter violemment ses lianes\nou ses tentacules pour fouetter la cible."
    it: "Il Pokémon attacca sferzando il bersaglio con liane\no tentacoli che agita violentemente."
    de: "Anwender wirbelt seine Ranken oder Tentakel\npeitschenartig gegen das Ziel."
    es: "El usuario agita violentamente sus lianas o tentáculos\npara golpear al objetivo."
    ko: "덩굴이나 촉수를 세차게 휘둘러\n상대를 힘껏 쳐서 공격한다."
    zh_simp: "激烈地挥舞青藤或触手\n摔打对手进行攻击。"
    zh_trad: "激烈地揮舞藤蔓或觸手\n向對手進行攻擊。"
precipice_blades:
  names:
    jp_kana: だんがいのつるぎ
    jp_kanji: だんがいのつるぎ
    en: Precipice Blades
    fr: Lame Pangéenne
    it: Spade Telluriche
    de: Abgrundsklinge
    es: Filo del Abismo
    ko: 단애의칼
    zh_simp: 断崖之剑
    zh_trad: 斷崖之劍
  descriptions:
    jp_kana: "大地の　力を　刃に　変えて\n相手を　攻撃する。"
    jp_kanji: "大地の　力を　刃に　変えて\n相手を　攻撃する。"
    en: "The user attacks opposing Pokémon by manifesting\nthe power of the land in fearsome blades of stone."
    fr: "Le Pokémon transforme la puissance de la terre\net attaque la cible avec une lame acérée."
    it: "Il Pokémon attacca il bersaglio trasformando la potenza\ndella terra in lame."
    de: "Der Anwender wandelt die Kraft des Erdreichs in\nKlingen um, mit denen er gegnerische Pokémon\nangreift."
    es: "Hace que el poder latente de la tierra se manifieste en\nforma de hojas afiladas y ataca al objetivo con ellas."
    ko: "대지의 힘을 칼날로 바꿔\n상대를 공격한다."
    zh_simp: "将大地的力量变化为利刃\n攻击对手。"
    zh_trad: "將大地的力量化為利刃\n攻擊對手。"
present:
  names:
    jp_kana: プレゼント
    jp_kanji: プレゼント
    en: Present
    fr: Cadeau
    it: Regalino
    de: Geschenk
    es: Presente
    ko: 프레젠트
    zh_simp: 礼物
    zh_trad: 禮物
  descriptions:
    jp_kana: "わなを　しかけた　箱を\n相手に　わたして　攻撃する。ＨＰが\n回復して　しまうことも　ある。"
    jp_kanji: "わなを　しかけた　箱を\n相手に　わたして　攻撃する。ＨＰが\n回復して　しまうことも　ある。"
    en: "The user attacks by giving the target a gift with a hidden\ntrap. The gift restores HP sometimes, however."
    fr: "Le lanceur attaque en offrant un cadeau piégé à la cible,\nmais le cadeau peut parfois restaurer les PV de celle-ci\nà la place."
    it: "Il Pokémon attacca dando un regalo trappola\nal bersaglio. A volte, però, può fargli recuperare PS."
    de: "Eine Bombe als Geschenk. Kann auch KP des Zieles\nwiederherstellen."
    es: "El usuario ataca al objetivo dándole un regalo con\nuna bomba trampa. Sin embargo, a veces restaura sus\nPS."
    ko: "덫을 설치한 상자를\n상대에게 건네어 공격한다.\nHP가 회복돼 버릴 때도 있다."
    zh_simp: "递给对手设有圈套的\n盒子进行攻击。\n也有可能回复对手ＨＰ。"
    zh_trad: "將暗藏機關的盒子\n遞給對手進行攻擊。\n但也有可能回復對手的ＨＰ。"
prismatic_laser:
  names:
    jp_kana: プリズムレーザー
    jp_kanji: プリズムレーザー
    en: Prismatic Laser
    fr: Laser Prisme
    it: Prismalaser
    de: Prisma-Laser
    es: Láser Prisma
    ko: 프리즘레이저
    zh_simp: 棱镜镭射
    zh_trad: 稜鏡鐳射
  descriptions:
    jp_kana: "プリズムの　力で　強力な\n光線を　発射する。\n次の　ターンは　動けなくなる。"
    jp_kanji: "プリズムの　力で　強力な\n光線を　発射する。\n次の　ターンは　動けなくなる。"
    en: "The user shoots powerful lasers using the power of\na prism. The user can’t move on the next turn."
    fr: "Le lanceur utilise la puissance d’un prisme pour envoyer\nun laser destructeur, mais il doit se reposer\nau tour suivant."
    it: "Il Pokémon proietta degli intensi raggi di luce grazie\nalla potenza del suo prisma, ma non può agire nel turno\nsuccessivo."
    de: "Der Anwender feuert mithilfe von Prisma-Kraft mächtige\nLichtstrahlen ab. In der nächsten Runde kann er nicht\nhandeln."
    es: "El usuario utiliza un prisma para emitir un rayo de\ngran potencia, pero deberá descansar en el siguiente\nturno."
    ko: "프리즘의 힘으로 강력한\n광선을 발사한다.\n다음 턴은 움직일 수 없다."
    zh_simp: "用棱镜的力量发射强烈光线。\n下一回合自己将无法动弹。"
    zh_trad: "用稜鏡的力量發射強烈光線。\n下一回合自己將無法動彈。"
protect:
  names:
    jp_kana: まもる
    jp_kanji: まもる
    en: Protect
    fr: Abri
    it: Protezione
    de: Schutzschild
    es: Protección
    ko: 방어
    zh_simp: 守住
    zh_trad: 守住
  descriptions:
    jp_kana: "相手の　攻撃を\nまったく　受けない。\n連続で　だすと　失敗しやすい。"
    jp_kanji: "相手の　攻撃を\nまったく　受けない。\n連続で　だすと　失敗しやすい。"
    en: "This move enables the user to protect itself from\nall attacks. Its chance of failing rises if it is used\nin succession."
    fr: "Le lanceur se protège de toutes les attaques.\nPeut échouer si utilisée plusieurs fois de suite."
    it: "Questa mossa permette di eludere tutti gli attacchi.\nSe usata in successione può fallire."
    de: "Anwender wehrt jede Attacke ab. Scheitert eventuell\nbei Wiederholung."
    es: "Frena todos los ataques, pero puede fallar si se usa\nrepetidamente."
    ko: "상대의 공격을\n전혀 받지 않는다.\n연속으로 쓰면 실패하기 쉽다."
    zh_simp: "完全抵挡\n对手的攻击。\n连续使出则容易失败。"
    zh_trad: "完全防住對手的所有攻擊。\n連續使用時容易失敗。"
psybeam:
  names:
    jp_kana: サイケこうせん
    jp_kanji: サイケこうせん
    en: Psybeam
    fr: Rafale Psy
    it: Psicoraggio
    de: Psystrahl
    es: Psicorrayo
    ko: 환상빔
    zh_simp: 幻象光线
    zh_trad: 幻象光線
  descriptions:
    jp_kana: "不思議な　光線を\n相手に　発射して　攻撃する。\n混乱させることが　ある。"
    jp_kanji: "不思議な　光線を\n相手に　発射して　攻撃する。\n混乱させることが　ある。"
    en: "The target is attacked with a peculiar ray. This may also\nconfuse the target."
    fr: "Un étrange rayon frappe la cible, ce qui peut aussi\nla rendre confuse."
    it: "Il Pokémon attacca il bersaglio con un raggio speciale.\nPuò anche confonderlo."
    de: Feuert einen Strahl ab, der das Ziel verwirren kann.
    es: Extraño rayo que puede causar confusión.
    ko: "이상한 광선을\n상대에게 발사하여 공격한다.\n혼란시킬 때가 있다."
    zh_simp: "向对手发射\n神奇的光线进行攻击。\n有时会使对手混乱。"
    zh_trad: "向對手發射\n神奇的光線進行攻擊。\n有時會使對手混亂。"
psyblade:
  names:
    jp_kana: サイコブレイド
    jp_kanji: サイコブレイド
    en: Psyblade
    fr: Lame Psychique
    it: Psicolama
    de: Psychoschneide
    es: Psicohojas
    ko: 사이코블레이드
    zh_simp: 精神剑
    zh_trad: 精神劍
  descriptions:
    jp_kana: "実体のない刃で　相手を　切り裂く。\nエレキフィールドに　いるとき\n技の威力が　１．５倍に　なる。"
    jp_kanji: "実体のない刃で　相手を　切り裂く。\nエレキフィールドに　いるとき\n技の威力が　１．５倍に　なる。"
    en: "The user rends the target with an ethereal blade. This\nmove’s power is boosted by 50 percent if the user is on\nElectric Terrain."
    fr: "Le lanceur lacère la cible à l’aide d’une lame intangible.\nS’il se trouve dans un champ électrifié, la puissance\nde cette capacité augmente de 50 %."
    it: "Il Pokémon falcia il bersaglio con una lama eterea.\nLa potenza della mossa aumenta del 50% quando\nè attivo un Campo Elettrico."
    de: "Das Ziel wird mit einer immateriellen Klinge angegriffen.\nDie Stärke der Attacke steigt um 50 %, wenn beim\nAnwender ein Elektrofeld aktiv ist."
    es: "El usuario rebana al objetivo con una espada inmaterial.\nCuando se usa en conjunción con un campo eléctrico,\nla potencia del movimiento aumenta un 50 %."
    ko: "실체가 없는 칼날로 상대를 베어 가른다.\n일렉트릭필드 위에 있을 때\n기술의 위력이 1.5배가 된다."
    zh_simp: "用无形的利刃劈开对手。\n处于电气场地时，\n招式威力会变成１．５倍。"
    zh_trad: "用無形的刀刃劈開對手。\n在電氣場地時，\n招式威力會變成１.５倍。"
psych_up:
  names:
    jp_kana: じこあんじ
    jp_kanji: じこあんじ
    en: Psych Up
    fr: Boost
    it: Psicamisù
    de: Psycho-Plus
    es: Autosugestión
    ko: 자기암시
    zh_simp: 自我暗示
    zh_trad: 自我暗示
  descriptions:
    jp_kana: "自分に　暗示を　かけることで\n能力変化の　状態を\n相手と　同じにする。"
    jp_kanji: "自分に　暗示を　かけることで\n能力変化の　状態を\n相手と　同じにする。"
    en: "The user hypnotizes itself into copying any stat change\nmade by the target."
    fr: "Une autohypnose qui permet au lanceur de copier\nles changements de stats de la cible."
    it: "Il Pokémon s’ipnotizza per copiare ogni modifica\nalle statistiche del bersaglio."
    de: "Der Anwender hypnotisiert sich selbst, um die\nStatusveränderungen des Zieles zu kopieren."
    es: "El usuario se sume en un trance y copia cualquier cambio\nque haya en las características de su objetivo."
    ko: "자신에게 암시를 걸어서\n능력 변화 상태를\n상대와 똑같은 상태로 만든다."
    zh_simp: "向自己施以自我暗示，\n将能力变化的状态\n变得和对手一样。"
    zh_trad: "向自己施加自我暗示，\n讓能力變化的狀態\n變得與對手相同。"
psychic:
  names:
    jp_kana: サイコキネシス
    jp_kanji: サイコキネシス
    en: Psychic
    fr: Psyko
    it: Psichico
    de: Psychokinese
    es: Psíquico
    ko: 사이코키네시스
    zh_simp: 精神强念
    zh_trad: 精神強念
  descriptions:
    jp_kana: "強い　念力を　相手に　送って\n攻撃する。　相手の　特防を\nさげることが　ある。"
    jp_kanji: "強い　念力を　相手に　送って\n攻撃する。　相手の　特防を\nさげることが　ある。"
    en: "The target is hit with a strong telekinetic force to inflict\ndamage. This may also lower the target’s Sp. Def stat."
    fr: "Une puissante force télékinétique frappe la cible,\nce qui peut aussi faire baisser sa Défense Spéciale."
    it: "Il Pokémon attacca il bersaglio con una potente forza\ntelecinetica che può anche ridurne la Difesa Speciale."
    de: "Starke Psycho-Attacke, die eventuell die\nSpezial-Verteidigung des Zieles senkt."
    es: "Fuerte ataque telequinético que puede reducir la\nDefensa Especial del objetivo."
    ko: "강한 염동력을 상대에게 보내어\n공격한다. 상대의 특수방어를\n떨어뜨릴 때가 있다."
    zh_simp: "向对手发送\n强大的念力进行攻击。\n有时会降低对手的特防。"
    zh_trad: "向對手發送\n強大的念力進行攻擊。\n有時會降低對手的特防。"
psychic_fangs:
  names:
    jp_kana: サイコファング
    jp_kanji: サイコファング
    en: Psychic Fangs
    fr: Psycho-Croc
    it: Psicozanna
    de: Psychobeißer
    es: Psicocolmillo
    ko: 사이코팽
    zh_simp: 精神之牙
    zh_trad: 精神之牙
  descriptions:
    jp_kana: "サイコパワーで　かみついて\n相手を　攻撃する。　ひかりのかべや\nリフレクター　なども　破壊できる。"
    jp_kanji: "サイコパワーで　かみついて\n相手を　攻撃する。　ひかりのかべや\nリフレクター　なども　破壊できる。"
    en: "The user attacks by biting the target with its psychic\ncapabilities. This move can also break barriers, such as\nLight Screen and Reflect."
    fr: "Le lanceur mord la cible avec ses pouvoirs psychiques.\nBrise aussi les barrières comme Mur Lumière\net Protection."
    it: "Il Pokémon attacca il bersaglio mordendolo con delle\nzanne generate con l’energia psichica. Può rompere\nbarriere come Riflesso e Schermoluce."
    de: "Der Anwender beißt das Ziel mithilfe von\nPsycho-Kräften. Die Attacke durchbricht auch\nBarrieren wie Lichtschild und Reflektor."
    es: "Ataca a su objetivo con poderes psíquicos que además\ndestruyen barreras como Pantalla de Luz y Reflejo."
    ko: "사이코 파워로 물어서\n상대를 공격한다. 빛의장막이나\n리플렉터 등도 파괴할 수 있다."
    zh_simp: "利用精神力量咬住对手进行攻击。\n还可以破坏光墙和反射壁等。"
    zh_trad: "利用精神力量咬住對手進行攻擊。\n並可破壞光牆和反射壁等。"
psychic_noise:
  names:
    jp_kana: サイコノイズ
    jp_kanji: サイコノイズ
    en: Psychic Noise
    fr: Dissonance Psy
    it: Psicorumore
    de: Psycholärm
    es: Psicorruido
    ko: 사이코노이즈
    zh_simp: 精神噪音
    zh_trad: 精神噪音
  descriptions:
    jp_kana: "不快な音波を　相手に　浴びせて　攻撃。\n２ターンの間　技や　特性や　持っている\n道具によって　ＨＰを　回復できなくなる。"
    jp_kanji: "不快な音波を　相手に　浴びせて　攻撃。\n２ターンの間　技や　特性や　持っている\n道具によって　ＨＰを　回復できなくなる。"
    en: "The user attacks the target with unpleasant sound waves.\nFor two turns, the target is prevented from recovering\nHP through moves, Abilities, or held items."
    fr: "Le lanceur attaque avec des ondes sonores dissonantes.\nCela empêche la cible de récupérer des PV à l’aide de\ncapacités, talents ou objets tenus pendant deux tours."
    it: "Il Pokémon investe il bersaglio con insopportabili onde\nsonore che gli impediscono di recuperare PS con mosse,\nabilità o strumenti che ha con sé per due turni."
    de: "Der Anwender greift mit unerträglichen Schallwellen an,\nwodurch das Ziel zwei Runden lang nicht durch Attacken,\nFähigkeiten oder getragene Items geheilt werden kann."
    es: "Ataca emitiendo una onda sonora desagradable que\nimpide al objetivo usar movimientos, habilidades y\nobjetos equipados que recuperan PS durante dos turnos."
    ko: "불쾌한 음파를 상대에게 날려서 공격한다.\n2턴 동안 상대는 기술이나 특성 또는\n지니고 있는 도구로 HP를 회복할 수 없게 된다."
    zh_simp: "用令对手不舒服的音波进行攻击。\n让对手在２回合内无法通过\n招式、特性或携带的道具回复ＨＰ。"
    zh_trad: "用令人不快的音波攻擊對手，\n使對手在２回合內變得無法透過\n招式、特性或攜帶的道具回復ＨＰ。"
psychic_terrain:
  names:
    jp_kana: サイコフィールド
    jp_kanji: サイコフィールド
    en: Psychic Terrain
    fr: Champ Psychique
    it: Campo Psichico
    de: Psychofeld
    es: Campo Psíquico
    ko: 사이코필드
    zh_simp: 精神场地
    zh_trad: 精神場地
  descriptions:
    jp_kana: "５ターンの間　地面にいると\n先制技を　受けない。\nエスパータイプの　威力が　あがる。"
    jp_kanji: "５ターンの間　地面にいると\n先制技を　受けない。\nエスパータイプの　威力が　あがる。"
    en: "This protects Pokémon on the ground from priority\nmoves and powers up Psychic-type moves for five turns."
    fr: "Pendant cinq tours, les Pokémon au sol ne peuvent\nplus subir d’attaques prioritaires et la puissance\ndes capacités de type Psy augmente."
    it: "Per cinque turni il terreno entra nello stato di Campo\nPsichico: i Pokémon a terra non subiscono mosse ad alta\npriorità e la potenza delle mosse di tipo Psico aumenta."
    de: "Verhindert für fünf Runden, dass Pokémon am Boden\nvon Erstschlag-Attacken getroffen werden. Erhöht die\nStärke von Psycho-Attacken."
    es: "Durante cinco turnos, se potencian los movimientos\nde tipo Psíquico y los Pokémon que están en el suelo\nquedan protegidos contra movimientos con prioridad."
    ko: "5턴 동안 땅에 있으면\n선제공격을 받지 않는다.\n에스퍼타입의 위력이 올라간다."
    zh_simp: "在５回合内，地面上的宝可梦\n不会受到先制招式的攻击。\n超能力属性的招式威力会提高。"
    zh_trad: "在５回合內，地面上的寶可夢\n不會受到先制招式攻擊。\n超能力屬性的招式威力會提高。"
psycho_boost:
  names:
    jp_kana: サイコブースト
    jp_kanji: サイコブースト
    en: Psycho Boost
    fr: Psycho-Boost
    it: Psicoslancio
    de: Psyschub
    es: Psicoataque
    ko: 사이코부스트
    zh_simp: 精神突进
    zh_trad: 精神突進
  descriptions:
    jp_kana: "フルパワーで　相手を　攻撃する。 \n使うと　反動で　自分の　特攻が \nがくっと　さがる。"
    jp_kanji: "フルパワーで　相手を　攻撃する。 \n使うと　反動で　自分の　特攻が \nがくっと　さがる。"
    en: "The user attacks the target with all its might. The recoil\nfrom this move harshly lowers the user’s Sp. Atk stat."
    fr: "Le lanceur attaque la cible à pleine puissance, mais\nle contrecoup baisse beaucoup l’Attaque Spéciale\ndu lanceur."
    it: "Il Pokémon sferra un potente attacco, ma il contraccolpo\nriduce di molto il suo Attacco Speciale."
    de: "Angriff mit voller Kraft, der den Spezial-Angriff des\nAnwenders durch den Rückstoß stark senkt."
    es: "Ataca al objetivo con toda su fuerza, pero reduce mucho\nel Ataque Especial del usuario."
    ko: "풀 파워로 상대를 공격한다.\n쓰면 반동으로\n자신의 특수공격이 크게 떨어진다."
    zh_simp: "使出全部力量攻击对手。\n使用之后会因为反作用力，\n自己的特攻大幅降低。"
    zh_trad: "釋放全部能量攻擊對手。\n使用後因為反作用力，\n自己的特攻會大幅降低。"
psycho_cut:
  names:
    jp_kana: サイコカッター
    jp_kanji: サイコカッター
    en: Psycho Cut
    fr: Coupe Psycho
    it: Psicotaglio
    de: Psychoklinge
    es: Psicocorte
    ko: 사이코커터
    zh_simp: 精神利刃
    zh_trad: 精神利刃
  descriptions:
    jp_kana: "実体化させた\n心の　刃で　相手を　切り裂く。\n急所に　当たりやすい。"
    jp_kanji: "実体化させた\n心の　刃で　相手を　切り裂く。\n急所に　当たりやすい。"
    en: "The user tears at the target with blades formed by\npsychic power. This move has a heightened chance of\nlanding a critical hit."
    fr: "Le lanceur entaille la cible grâce à des lames faites\nd’énergie psychique. Taux de critiques élevé."
    it: "Il Pokémon colpisce il bersaglio con lame fatte\ndi forza psichica. Probabile brutto colpo."
    de: "Das Ziel wird mit Klingen attackiert, die aus\nPsycho-Energie bestehen. Hohe Volltrefferquote."
    es: "Ataca al objetivo con cuchillas formadas por energía\npsíquica. Suele asestar un golpe crítico."
    ko: "실체화시킨 마음의 칼날로\n상대를 베어 가른다.\n급소에 맞기 쉽다."
    zh_simp: "用实体化的\n心之利刃劈开对手。\n容易击中要害。"
    zh_trad: "用實體化的\n精神利刃斬向對手。\n容易擊中要害。"
psycho_shift:
  names:
    jp_kana: サイコシフト
    jp_kanji: サイコシフト
    en: Psycho Shift
    fr: Échange Psy
    it: Psicotransfer
    de: Psybann
    es: Psicocambio
    ko: 사이코시프트
    zh_simp: 精神转移
    zh_trad: 精神轉移
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
psyshield_bash:
  names:
    jp_kana: バリアーラッシュ
    jp_kanji: バリアーラッシュ
    en: Psyshield Bash
    fr: Sprint Bouclier
    it: Barrierassalto
    de: Barrierenstoß
    es: Asalto Barrera
    ko: 배리어러시
    zh_simp: 屏障猛攻
    zh_trad: 屏障猛攻
  descriptions:
    jp_kana: "思念のエネルギーを　まといながら\n相手に　ぶつかっていく。\n自分の　防御を　あげる。"
    jp_kanji: "思念のエネルギーを　まといながら\n相手に　ぶつかっていく。\n自分の　防御を　あげる。"
    en: "Cloaking itself in psychic energy, the user slams into\nthe target. This also boosts the user’s Defense stat."
    fr: "Le lanceur s’enveloppe d’énergie psychique et frappe\nsa cible de plein fouet. Cela augmente également\nla Défense du lanceur."
    it: "Il Pokémon si carica di energia psichica per poi\nschiantarsi sul bersaglio. Inoltre, aumenta\nla propria Difesa."
    de: "Der Anwender hüllt sich in Psycho-Energie und rammt\ndas Ziel. Außerdem steigt seine Verteidigung."
    es: "El usuario ataca envuelto en una energía psíquica que\nademás aumenta su Defensa."
    ko: "사념의 에너지를 두른 채로\n상대에게 부딪친다.\n자신의 방어를 올린다."
    zh_simp: "让意念的能量覆盖全身，\n撞向对手进行攻击。\n会提高自己的防御。"
    zh_trad: "讓意念的能量圍繞全身，\n撞向對手進行攻擊。\n提高自己的防禦。"
psyshock:
  names:
    jp_kana: サイコショック
    jp_kanji: サイコショック
    en: Psyshock
    fr: Choc Psy
    it: Psicoshock
    de: Psychoschock
    es: Psicocarga
    ko: 사이코쇼크
    zh_simp: 精神冲击
    zh_trad: 精神衝擊
  descriptions:
    jp_kana: "不思議な　念波を　実体化して\n相手を　攻撃する。\n物理的な　ダメージを　与える。"
    jp_kanji: "不思議な　念波を　実体化して\n相手を　攻撃する。\n物理的な　ダメージを　与える。"
    en: "The user materializes an odd psychic wave to attack\nthe target. This move deals physical damage."
    fr: "Le lanceur matérialise des ondes mystérieuses\nqu’il projette sur la cible, ce qui inflige des dégâts\nphysiques à celle-ci."
    it: "Il Pokémon attacca il bersaglio facendo materializzare\nmisteriose onde psichiche che provocano danni fisici."
    de: "Anwender erzeugt eine seltsame Energiewelle, die dem\nZiel physischen Schaden zufügt."
    es: "Crea una onda psíquica que causa daño físico al\nobjetivo."
    ko: "이상한 염력파를 실체화하여\n상대를 공격한다.\n물리적인 데미지를 준다."
    zh_simp: "将神奇的念波实体化攻击对手。\n给予物理伤害。"
    zh_trad: "將神奇的念力波實體化後攻擊對手。\n給予對手物理傷害。"
psystrike:
  names:
    jp_kana: サイコブレイク
    jp_kanji: サイコブレイク
    en: Psystrike
    fr: Frappe Psy
    it: Psicobotta
    de: Psychostoß
    es: Onda Mental
    ko: 사이코브레이크
    zh_simp: 精神击破
    zh_trad: 精神擊破
