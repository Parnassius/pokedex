    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
water_spout:
  names:
    jp_kana: しおふき
    jp_kanji: しおふき
    en: Water Spout
    fr: Giclédo
    it: Zampillo
    de: Fontränen
    es: Salpicar
    ko: 해수스파우팅
    zh_simp: 喷水
    zh_trad: 噴水
  descriptions:
    jp_kana: "潮を　吹きつけて　攻撃する。\n自分の　ＨＰが　少ないほど\n技の　威力は　さがる。"
    jp_kanji: "潮を　吹きつけて　攻撃する。\n自分の　ＨＰが　少ないほど\n技の　威力は　さがる。"
    en: "The user spouts water to damage opposing Pokémon.\nThe lower the user’s HP, the lower the move’s power."
    fr: "Le lanceur attaque avec un jet d’eau.\nMoins il a de PV et moins l’attaque est puissante."
    it: "Il Pokémon attacca lanciando un getto d’acqua.\nPiù i suoi PS sono bassi, più la potenza della mossa\ndiminuisce."
    de: "Eine Wasser-Attacke gegen gegnerische Pokémon.\nJe höher die KP des Anwenders sind, desto mehr\nSchaden richtet sie an."
    es: "Chorro de agua. Cuantos menos PS tenga el usuario,\nmenos potencia tendrá el movimiento."
    ko: "바닷물을 내뿜어 공격한다.\n자신의 HP가 적을수록\n기술의 위력이 떨어진다."
    zh_simp: "掀起潮水进行攻击。\n自己的ＨＰ越少，\n招式的威力越小。"
    zh_trad: "噴起潮水進行攻擊。\n自己的ＨＰ越少，\n招式的威力越小。"
waterfall:
  names:
    jp_kana: たきのぼり
    jp_kanji: たきのぼり
    en: Waterfall
    fr: Cascade
    it: Cascata
    de: Kaskade
    es: Cascada
    ko: 폭포오르기
    zh_simp: 攀瀑
    zh_trad: 攀瀑
  descriptions:
    jp_kana: "すごい　勢いで　相手に　つっこむ。\n相手を　ひるませることが　ある。"
    jp_kanji: "すごい　勢いで　相手に　つっこむ。\n相手を　ひるませることが　ある。"
    en: The user charges at the target and may make it flinch.
    fr: "Le lanceur charge la cible avec une intensité\nremarquable, ce qui peut l’apeurer."
    it: "Il Pokémon carica il bersaglio a grande velocità e può\nfarlo tentennare."
    de: "Eine mächtige Attacke, durch die das Ziel eventuell\nzurückschreckt."
    es: "Embiste con un gran impulso y puede llegar a\namedrentar al objetivo."
    ko: "굉장한 기세로 상대에게 돌진한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "以惊人的气势扑向对手。\n有时会使对手畏缩。"
    zh_trad: "以驚人的氣勢撲向對手。\n有時會讓對手畏縮。"
wave_crash:
  names:
    jp_kana: ウェーブタックル
    jp_kanji: ウェーブタックル
    en: Wave Crash
    fr: Aquatacle
    it: Ondaschianto
    de: Wellentackle
    es: Envite Acuático
    ko: 웨이브태클
    zh_simp: 波动冲
    zh_trad: 波動衝
  descriptions:
    jp_kana: "水を　まといつつ\n全身で　相手に　ぶつかるが\n自分も　かなりの　ダメージ　を受ける。"
    jp_kanji: "水を　まといつつ\n全身で　相手に　ぶつかるが\n自分も　かなりの　ダメージ　を受ける。"
    en: "The user shrouds itself in water and slams into the target\nwith its whole body to inflict damage. This also damages\nthe user quite a lot."
    fr: "Le lanceur se recouvre entièrement d’eau avant\nde charger sa cible. Cela blesse aussi gravement\nle lanceur."
    it: "Il Pokémon si avvolge in uno strato d’acqua e si lancia\nsul bersaglio, ma subisce seri danni."
    de: "Der Anwender hüllt sich in Wasser und stürzt sich mit\ndem ganzen Körper auf das Ziel, wobei er selbst großen\nSchaden erleidet."
    es: "El usuario se envuelve en agua y embiste contra el\nobjetivo, pero también se hiere seriamente a sí mismo."
    ko: "물을 두르고\n온몸으로 상대에게 부딪친다.\n자신도 상당한 데미지를 입는다."
    zh_simp: "让水覆盖全身后撞向对手。\n自己也会受到不少伤害。"
    zh_trad: "用水圍繞全身並撞向對手，\n但自己也會受到不小的傷害。"
weather_ball:
  names:
    jp_kana: ウェザーボール
    jp_kanji: ウェザーボール
    en: Weather Ball
    fr: Ball’Météo
    it: Palla Clima
    de: Meteorologe
    es: Meteorobola
    ko: 웨더볼
    zh_simp: 气象球
    zh_trad: 氣象球
  descriptions:
    jp_kana: "使ったときの　天気に　よって\n技の　タイプと　威力が　変わる。"
    jp_kanji: "使ったときの　天気に　よって\n技の　タイプと　威力が　変わる。"
    en: "This move’s type and power change depending on the\nweather at the time the move is used."
    fr: "Une capacité dont la puissance et le type varient\nen fonction du temps qu’il fait."
    it: "Mossa il cui tipo e la cui potenza variano in base\nalle condizioni atmosferiche."
    de: "Typ und Stärke der Attacke sind vom Wetter zum\nZeitpunkt der Anwendung abhängig."
    es: "El tipo y la potencia del movimiento varían según el\ntiempo que haga."
    ko: "사용했을 때의 날씨에 따라서\n기술 타입과 위력이 바뀐다."
    zh_simp: "根据使用时的天气，\n招式属性和威力会改变。"
    zh_trad: "招式屬性和威力會隨著\n使用時天氣的不同而改變。"
whirlpool:
  names:
    jp_kana: うずしお
    jp_kanji: うずしお
    en: Whirlpool
    fr: Siphon
    it: Mulinello
    de: Whirlpool
    es: Torbellino
    ko: 바다회오리
    zh_simp: 潮旋
    zh_trad: 潮旋
  descriptions:
    jp_kana: "激しく　渦をまく　水の中に\n４ー５ターンの　間\n相手を　閉じこめて　攻撃する。"
    jp_kanji: "激しく　渦をまく　水の中に\n４ー５ターンの　間\n相手を　閉じこめて　攻撃する。"
    en: "The user traps the target inside a violent, swirling\nwhirlpool that inflicts damage for four to five turns."
    fr: "Le lanceur piège la cible dans une trombe d’eau\npendant quatre à cinq tours."
    it: "Il Pokémon attacca intrappolando il bersaglio\nin un turbine d’acqua per quattro o cinque turni."
    de: "Das Ziel wird für vier bis fünf Runden in einer\nWasserhose gefangen."
    es: "Una tromba de agua atrapa y daña al objetivo durante\ncuatro o cinco turnos."
    ko: "세차게 소용돌이치는\n물속에 4~5턴 동안\n상대를 가두어 공격한다."
    zh_simp: "将对手困在激烈的\n水流旋涡中，\n在４～５回合内进行攻击。"
    zh_trad: "將對手困在激烈的\n水流漩渦中，\n在４～５回合內進行攻擊。"
whirlwind:
  names:
    jp_kana: ふきとばし
    jp_kanji: ふきとばし
    en: Whirlwind
    fr: Cyclone
    it: Turbine
    de: Wirbelwind
    es: Remolino
    ko: 날려버리기
    zh_simp: 吹飞
    zh_trad: 吹飛
  descriptions:
    jp_kana: "相手を　吹きとばして\n控えの　ポケモンを　ひきずりだす。\n野生の　場合は　戦闘が　終わる。"
    jp_kanji: "相手を　吹きとばして\n控えの　ポケモンを　ひきずりだす。\n野生の　場合は　戦闘が　終わる。"
    en: "The target is blown away, and a different Pokémon is\ndragged out. In the wild, this ends a battle against a\nsingle Pokémon."
    fr: "Éjecte le Pokémon ennemi et le remplace par un autre.\nLors d’un combat contre un Pokémon sauvage seul,\nmet fin au combat."
    it: "Il bersaglio lascia il campo e viene sostituito.\nMette fine alle lotte contro singoli Pokémon selvatici."
    de: "Weht das Ziel weg und ersetzt es durch ein anderes\nPokémon. In der Wildnis endet der Kampf."
    es: "Se lleva al objetivo, que es cambiado por otro Pokémon.\nSi es un Pokémon salvaje, acaba el combate."
    ko: "상대를 날려 버려서\n교대할 포켓몬을 끌어낸다.\n야생의 경우에는 배틀이 끝난다."
    zh_simp: "吹飞对手，强制拉后备宝可梦上场。\n如果对手为野生宝可梦，\n战斗将直接结束。"
    zh_trad: "吹飛對手，\n強制讓後備寶可夢上場。\n對手為野生寶可夢時，戰鬥將直接結束。"
wicked_blow:
  names:
    jp_kana: あんこくきょうだ
    jp_kanji: あんこくきょうだ
    en: Wicked Blow
    fr: Poing Obscur
    it: Pugnotenebra
    de: Finstertreffer
    es: Golpe Oscuro
    ko: 암흑강타
    zh_simp: 暗冥强击
    zh_trad: 暗冥強擊
  descriptions:
    jp_kana: "あくの型を　極めし\n強烈な　一撃。\n必ず　急所に　当たる。"
    jp_kanji: "あくの型を　極めし\n強烈な　一撃。\n必ず　急所に　当たる。"
    en: "The user, having mastered the Dark style, strikes the\ntarget with a fierce blow. This move always lands\na critical hit."
    fr: "Le lanceur assène un coup puissant à la cible.\nCette technique qui inflige toujours un coup critique est\nréservée à ceux qui maîtrisent la puissance des Ténèbres."
    it: "Il Pokémon sferra un singolo colpo potentissimo,\nmassima espressione dello stile di tipo Buio.\nBrutto colpo assicurato."
    de: "Der Anwender hat den Stil des Unlichts gemeistert\nund führt einen fokussierten, harten Schlag mit\nVolltreffergarantie aus."
    es: "Golpe devastador que requiere un absoluto dominio de\nlas artes siniestras. Siempre asesta un golpe crítico."
    ko: "악의 태세가 극에 달하여\n강렬한 일격을 날린다.\n반드시 급소에 맞는다."
    zh_simp: "将恶之流派修炼至大成的\n猛烈一击。\n必定会击中要害。"
    zh_trad: "將惡之流派鍛鍊到了\n極致的強烈一擊。\n必定會擊中要害。"
wicked_torque:
  names:
    jp_kana: ダークアクセル
    jp_kanji: ダークアクセル
    en: Wicked Torque
    fr: Crash Obscur
    it: Turbotenebra
    de: Finsterturbo
    es: Ominochoque
    ko: 다크액셀
    zh_simp: 黑暗暴冲
    zh_trad: 黑暗暴衝
  descriptions:
    jp_kana: "―\n―\n―"
    jp_kanji: "―\n―\n―"
    en: "-\n-\n-"
    fr: "-\n-\n-"
    it: "―\n―\n―"
    de: ー
    es: "-\n-\n-"
    ko: "―\n―\n―"
    zh_simp: "―\n―\n―"
    zh_trad: "―\n―\n―"
wide_guard:
  names:
    jp_kana: ワイドガード
    jp_kanji: ワイドガード
    en: Wide Guard
    fr: Garde Large
    it: Bodyguard
    de: Rundumschutz
    es: Vasta Guardia
    ko: 와이드가드
    zh_simp: 广域防守
    zh_trad: 廣域防守
  descriptions:
    jp_kana: "味方全員に　当たる　攻撃を\n１ターンの　間　防ぐ。"
    jp_kanji: "味方全員に　当たる　攻撃を\n１ターンの　間　防ぐ。"
    en: "The user and its allies are protected from wide-ranging\nattacks for one turn."
    fr: "Bloque les attaques visant tous les alliés pendant\nun tour."
    it: "Il Pokémon protegge sé e gli alleati da attacchi\nad ampio raggio per un turno."
    de: "Schützt eine Runde lang vor Angriffen, die alle\nPokémon auf der Seite des Anwenders treffen."
    es: "Bloquea los ataques de objetivo múltiple lanzados\ncontra el bando del usuario durante un turno."
    ko: "같은 편 전원에게 향하는 공격을\n1턴 동안 막는다."
    zh_simp: "在１回合内防住\n击打我方全员的攻击。"
    zh_trad: "在１回合內，\n防禦住攻擊我方全體的攻擊招式。"
wild_charge:
  names:
    jp_kana: ワイルドボルト
    jp_kanji: ワイルドボルト
    en: Wild Charge
    fr: Éclair Fou
    it: Sprizzalampo
    de: Stromstoß
    es: Voltio Cruel
    ko: 와일드볼트
    zh_simp: 疯狂伏特
    zh_trad: 瘋狂伏特
  descriptions:
    jp_kana: "電気を　まとって\n相手に　ぶつかって　攻撃する。\n自分も　少し　ダメージを　受ける。"
    jp_kanji: "電気を　まとって\n相手に　ぶつかって　攻撃する。\n自分も　少し　ダメージを　受ける。"
    en: "The user shrouds itself in electricity and smashes into the\ntarget. This also damages the user a little."
    fr: "Une charge électrique violente qui blesse aussi\nlégèrement le lanceur."
    it: "Il Pokémon si carica di elettricità per poi scagliarsi\nsul bersaglio, ma subisce un po’ di danni."
    de: "Anwender erzeugt Spannung und greift an, indem er\nauf Kollisionskurs geht. Er erleidet selbst leichten\nSchaden."
    es: "El usuario se envuelve de electricidad y carga contra el\nobjetivo, pero también se hiere ligeramente a sí mismo."
    ko: "전기를 두르고\n상대에게 부딪쳐 공격한다.\n자신도 조금 데미지를 입는다."
    zh_simp: "让电流覆盖全身，\n撞向对手进行攻击。\n自己也会受到少许伤害。"
    zh_trad: "讓電流圍繞全身，\n衝撞對手進行攻擊。\n自己也會受到少許傷害。"
wildbolt_storm:
  names:
    jp_kana: かみなりあらし
    jp_kanji: かみなりあらし
    en: Wildbolt Storm
    fr: Typhon Fulgurant
    it: Tempesta Tonante
    de: Donnerorkan
    es: Electormenta
    ko: 번개폭풍
    zh_simp: 鸣雷风暴
    zh_trad: 鳴雷風暴
  descriptions:
    jp_kana: "嵐を　起こし　雷雲を　呼びよせ\n雷と風で　激しく　攻撃をする。\n相手を　まひ状態に　することもある。"
    jp_kanji: "嵐を　起こし　雷雲を　呼びよせ\n雷と風で　激しく　攻撃をする。\n相手を　まひ状態に　することもある。"
    en: "The user summons a thunderous tempest and savagely\nattacks with lightning and wind. This may also leave\nopposing Pokémon with paralysis."
    fr: "Le lanceur déclenche un violent typhon orageux\ndont les rafales et la foudre frappent la cible,\nce qui peut aussi la paralyser."
    it: "Il Pokémon chiama a sé una tempesta di fulmini\ne raffiche di vento con cui attacca violentemente\nil bersaglio. Può anche paralizzarlo."
    de: "Der Anwender ruft ein heftiges Unwetter herbei, um mit\nWind und Blitzen anzugreifen. Gegnerische Pokémon\nwerden eventuell paralysiert."
    es: "Invoca una tormenta eléctrica que ataca al objetivo con\nfuertes vientos y relámpagos y puede paralizarlo."
    ko: "폭풍을 일으키고 뇌운을 불러서\n번개와 바람으로 매섭게 공격한다.\n상대를 마비 상태로 만들 때가 있다."
    zh_simp: "呼唤雷云引起风暴，\n用雷与风进行激烈的攻击。\n有时会让对手陷入麻痹状态。"
    zh_trad: "呼喚雷雲引起風暴，\n用雷與風進行激烈的攻擊。\n有時還會讓對手陷入麻痺狀態。"
will_o_wisp:
  names:
    jp_kana: おにび
    jp_kanji: おにび
    en: Will-O-Wisp
    fr: Feu Follet
    it: Fuocofatuo
    de: Irrlicht
    es: Fuego Fatuo
    ko: 도깨비불
    zh_simp: 磷火
    zh_trad: 鬼火
  descriptions:
    jp_kana: "不気味で　怪しい　炎を　放って\n相手を　やけどの　状態に　する。"
    jp_kanji: "不気味で　怪しい　炎を　放って\n相手を　やけどの　状態に　する。"
    en: "The user shoots a sinister flame at the target to inflict\na burn."
    fr: "Le lanceur projette des flammes maléfiques\nà la cible pour lui infliger une brûlure."
    it: "Il Pokémon lancia fiamme sinistre e misteriose\nche causano una scottatura al bersaglio."
    de: "Anwender feuert unheimliche Flammen ab, die beim\nZiel Verbrennungen verursachen."
    es: Siniestras llamas moradas que producen quemaduras.
    ko: "으스스하고 괴상한 불꽃을 쏘아\n상대를 화상 상태로 만든다."
    zh_simp: "放出怪异的火焰，\n从而让对手陷入灼伤状态。"
    zh_trad: "放出詭異的火焰，\n讓對手陷入灼傷狀態。"
wing_attack:
  names:
    jp_kana: つばさでうつ
    jp_kanji: つばさでうつ
    en: Wing Attack
    fr: Cru-Ailes
    it: Attacco d’Ala
    de: Flügelschlag
    es: Ataque Ala
    ko: 날개치기
    zh_simp: 翅膀攻击
    zh_trad: 翅膀攻擊
  descriptions:
    jp_kana: "大きく　ひろげた　りっぱな　翼を\n相手に　ぶつけて　攻撃する。"
    jp_kanji: "大きく　ひろげた　りっぱな　翼を\n相手に　ぶつけて　攻撃する。"
    en: "The target is struck with large, imposing wings spread\nwide to inflict damage."
    fr: "Le lanceur déploie largement ses ailes majestueuses\npour attaquer la cible."
    it: "Il Pokémon attacca il bersaglio spiegando delle grandi\nali possenti."
    de: Trifft das Ziel mit ausgebreiteten Flügeln.
    es: "Extiende totalmente sus majestuosas alas para golpear\nal objetivo con ellas."
    ko: "크게 펼친 훌륭한 날개를\n상대에게 부딪쳐서 공격한다."
    zh_simp: "大大地展开美丽的翅膀，\n将其撞向对手进行攻击。"
    zh_trad: "用大大伸展開來的美麗翅膀，\n撞向對手進行攻擊。"
wish:
  names:
    jp_kana: ねがいごと
    jp_kanji: ねがいごと
    en: Wish
    fr: Vœu
    it: Desiderio
    de: Wunschtraum
    es: Deseo
    ko: 희망사항
    zh_simp: 祈愿
    zh_trad: 祈願
  descriptions:
    jp_kana: "次の　ターンに　自分　もしくは\n入れ替わった　ポケモンの　ＨＰを\n最大ＨＰの　半分　回復する。"
    jp_kanji: "次の　ターンに　自分　もしくは\n入れ替わった　ポケモンの　ＨＰを\n最大ＨＰの　半分　回復する。"
    en: "One turn after this move is used, the user’s or its\nreplacement’s HP is restored by up to half the user’s\nmax HP."
    fr: "Un vœu qui permet au lanceur ou au Pokémon\nentrant sur le terrain au tour suivant de récupérer\nla moitié des PV max du lanceur."
    it: "Il Pokémon o chi lo sostituisce recupera metà dei PS\nmassimi al turno successivo."
    de: "Ein Wunsch füllt in der nächsten Runde 50 % der KP\ndes Anwenders bei diesem oder einem eingewechselten\nPokémon auf."
    es: "Restaura en el siguiente turno la mitad de los PS\nmáximos del usuario o se los pasa al Pokémon que lo\nsustituye."
    ko: "다음 턴에 자신 또는\n교체한 포켓몬의 HP를\n최대 HP의 절반만큼 회복한다."
    zh_simp: "在下一回合回复自己或是\n替换出场的宝可梦最大ＨＰ的一半。"
    zh_trad: "在下一回合回復自己或是\n替換上場的寶可夢最大ＨＰ的一半。"
withdraw:
  names:
    jp_kana: からにこもる
    jp_kanji: からにこもる
    en: Withdraw
    fr: Repli
    it: Ritirata
    de: Panzerschutz
    es: Refugio
    ko: 껍질에숨기
    zh_simp: 缩入壳中
    zh_trad: 縮入殼中
  descriptions:
    jp_kana: "殻に　潜りこんで　身を守り\n自分の　防御を　あげる。"
    jp_kanji: "殻に　潜りこんで　身を守り\n自分の　防御を　あげる。"
    en: "The user withdraws its body into its hard shell,\nboosting its Defense stat."
    fr: "Le lanceur se recroqueville dans sa carapace,\nce qui augmente sa Défense."
    it: "Il Pokémon si ritira nel suo duro guscio per aumentare\nla Difesa."
    de: "Rückzug in den harten Panzer. Erhöht den\nVerteidigungs-Wert."
    es: "El usuario se resguarda en su coraza, por lo que le\naumenta la Defensa."
    ko: "껍질에 숨어 몸을 보호하여\n자신의 방어를 올린다."
    zh_simp: "缩入壳里保护身体，\n从而提高自己的防御。"
    zh_trad: "縮入殼中保護身體，\n提高自己的防禦。"
wonder_room:
  names:
    jp_kana: ワンダールーム
    jp_kanji: ワンダールーム
    en: Wonder Room
    fr: Zone Étrange
    it: Mirabilzona
    de: Wunderraum
    es: Zona Extraña
    ko: 원더룸
    zh_simp: 奇妙空间
    zh_trad: 奇妙空間
  descriptions:
    jp_kana: "まか不思議な　空間を　つくる。\n５ターンのあいだ　すべてのポケモンの\n防御と　特防が　入れ替わる。"
    jp_kanji: "まか不思議な　空間を　つくる。\n５ターンのあいだ　すべてのポケモンの\n防御と　特防が　入れ替わる。"
    en: "The user creates a bizarre area in which Pokémon’s\nDefense and Sp. Def stats are swapped for five turns."
    fr: "Le lanceur crée une zone mystérieuse\noù la Défense et la Défense Spéciale de tous\nles Pokémon sont inversées pendant cinq tours."
    it: "Il Pokémon crea una dimensione in cui Difesa\ne Difesa Speciale di tutti i Pokémon vengono\nscambiate per cinque turni."
    de: "Anwender erzeugt einen bizarren Raum, in dem über\nfünf Runden die Verteidigung aller Pokémon mit ihrer\nSpezial-Verteidigung getauscht wird."
    es: "Crea un espacio misterioso donde se intercambian la\nDefensa y la Defensa Especial de todos los Pokémon\ndurante cinco turnos."
    ko: "이상한 공간을 만든다.\n5턴 동안 모든 포켓몬의\n방어와 특수방어가 바뀐다."
    zh_simp: "制造出离奇的空间。\n在５回合内互换\n所有宝可梦的防御和特防。"
    zh_trad: "創造出非常不可思議的空間。\n在５回合內，讓所有寶可夢的\n防禦和特防互相交換。"
wood_hammer:
  names:
    jp_kana: ウッドハンマー
    jp_kanji: ウッドハンマー
    en: Wood Hammer
    fr: Martobois
    it: Mazzuolegno
    de: Holzhammer
    es: Mazazo
    ko: 우드해머
    zh_simp: 木槌
    zh_trad: 木槌
  descriptions:
    jp_kana: "硬い　胴体を\n相手に　たたきつけて　攻撃する。\n自分も　かなり　ダメージを　受ける。"
    jp_kanji: "硬い　胴体を\n相手に　たたきつけて　攻撃する。\n自分も　かなり　ダメージを　受ける。"
    en: "The user slams its rugged body into the target to attack.\nThis also damages the user quite a lot."
    fr: "Le lanceur heurte la cible de son corps robuste, ce qui\nblesse aussi gravement le lanceur."
    it: "Il Pokémon attacca scagliandosi con il suo corpo robusto\ncontro il bersaglio, ma subisce anche seri danni."
    de: "Anwender attackiert mit seinem robusten Körper.\nEr erleidet dabei auch selbst großen Schaden."
    es: "Arremete contra el objetivo con su robusto cuerpo.\nEl usuario se hiere seriamente a sí mismo."
    ko: "단단한 몸통을\n상대에게 부딪쳐서 공격한다.\n자신도 상당한 데미지를 입는다."
    zh_simp: "用坚硬的躯体\n撞击对手进行攻击。\n自己也会受到不小的伤害。"
    zh_trad: "用堅硬的軀體\n撞擊對手進行攻擊。\n自己也會受到不小的傷害。"
work_up:
  names:
    jp_kana: ふるいたてる
    jp_kanji: ふるいたてる
    en: Work Up
    fr: Rengorgement
    it: Cuordileone
    de: Kraftschub
    es: Avivar
    ko: 분발
    zh_simp: 自我激励
    zh_trad: 自我激勵
  descriptions:
    jp_kana: "自分を　奮いたてて\n攻撃と　特攻を　あげる。"
    jp_kanji: "自分を　奮いたてて\n攻撃と　特攻を　あげる。"
    en: "The user is roused, and its Attack and Sp. Atk stats\nare boosted."
    fr: "Le lanceur se rengorge et augmente son Attaque\net son Attaque Spéciale."
    it: "Il Pokémon si tira su di morale, aumentando\nil proprio Attacco e l’Attacco Speciale."
    de: "Anwender erhält einen Kraftschub, der seinen Angriff\nund Spezial-Angriff erhöht."
    es: "El usuario se concentra y aumenta su Ataque y su Ataque\nEspecial."
    ko: "스스로 분발해서\n공격과 특수공격을 올린다."
    zh_simp: "激励自己，\n从而提高攻击和特攻。"
    zh_trad: "激勵自己，\n提高自己的攻擊和特攻。"
worry_seed:
  names:
    jp_kana: なやみのタネ
    jp_kanji: なやみのタネ
    en: Worry Seed
    fr: Soucigraine
    it: Affannoseme
    de: Sorgensamen
    es: Abatidoras
    ko: 고민씨
    zh_simp: 烦恼种子
    zh_trad: 煩惱種子
  descriptions:
    jp_kana: "心を　なやませる　タネを\n植えつける。　相手を　眠れなくして\n特性を　ふみんに　する。"
    jp_kanji: "心を　なやませる　タネを\n植えつける。　相手を　眠れなくして\n特性を　ふみんに　する。"
    en: "A seed that causes worry is planted on the target.\nIt prevents sleep by making the target’s Ability Insomnia."
    fr: "Plante sur la cible une graine qui la rend soucieuse\net remplace son talent par Insomnia, l’empêchant\nainsi de dormir."
    it: "Il Pokémon pianta un seme che causa ansia, mutando\nl’abilità del bersaglio in Insonnia e impedendogli\ndi dormire."
    de: "Ziel wird bepflanzt. Seine Fähigkeit wandelt sich zu\nInsomnia und hindert es daran, einzuschlafen."
    es: "Planta una semilla en el objetivo que le causa pesar.\nSustituye la habilidad del objetivo por Insomnio y le\nimpide dormirse."
    ko: "마음을 괴롭히는 씨앗을\n심는다. 상대를 잠잘 수 없게 해서\n특성을 불면으로 만든다."
    zh_simp: "种植心神不宁的种子。\n使对手不能入眠，\n并将特性变成不眠。"
    zh_trad: "埋下令人心煩意亂的種子，\n讓對手睡不著，\n將對手的特性變成不眠。"
wrap:
  names:
    jp_kana: まきつく
    jp_kanji: まきつく
    en: Wrap
    fr: Ligotage
    it: Avvolgibotta
    de: Wickel
    es: Constricción
    ko: 김밥말이
    zh_simp: 紧束
    zh_trad: 緊束
  descriptions:
    jp_kana: "長い　体や　つるなどを　使って\n４ー５ターンの　間\n相手に　まきついて　攻撃する。"
    jp_kanji: "長い　体や　つるなどを　使って\n４ー５ターンの　間\n相手に　まきついて　攻撃する。"
    en: "A long body, vines, or the like are used to wrap and\nsqueeze the target for four to five turns."
    fr: "Le lanceur ligote la cible avec son corps allongé ou\nses tentacules pour la compresser durant quatre\nà cinq tours."
    it: "Il Pokémon attacca il bersaglio stritolandolo con il suo\nlungo corpo o le sue liane per quattro o cinque turni."
    de: "Umwickelt das Ziel über vier bis fünf Runden mit\nRanken oder Ähnlichem und fügt ihm Schaden zu."
    es: "Oprime al objetivo de cuatro a cinco turnos con lianas\no con su cuerpo."
    ko: "긴 몸이나 덩굴 등을 사용해\n4~5턴 동안\n상대를 휘감아 공격한다."
    zh_simp: "使用长长的身体或藤蔓等，\n在４～５回合内\n紧束对手进行攻击。"
    zh_trad: "使用長長的身體或藤蔓等，\n在４～５回合內\n緊束對手進行攻擊。"
wring_out:
  names:
    jp_kana: しぼりとる
    jp_kanji: しぼりとる
    en: Wring Out
    fr: Essorage
    it: Strizzata
    de: Auswringen
    es: Estrujón
    ko: 쥐어짜기
    zh_simp: 绞紧
    zh_trad: 絞緊
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
x_scissor:
  names:
    jp_kana: シザークロス
    jp_kanji: シザークロス
    en: X-Scissor
    fr: Plaie Croix
    it: Forbice X
    de: Kreuzschere
    es: Tijera X
    ko: 시저크로스
    zh_simp: 十字剪
    zh_trad: 十字剪
  descriptions:
    jp_kana: "カマや　ツメを　ハサミのように\n交差させながら　相手を　切り裂く。"
    jp_kanji: "カマや　ツメを　ハサミのように\n交差させながら　相手を　切り裂く。"
    en: "The user slashes at the target by crossing its scythes,\nclaws, or the like as if they were a pair of scissors."
    fr: "Le lanceur taillade la cible en utilisant ses faux\nou ses griffes comme une paire de ciseaux."
    it: "Il Pokémon squarcia il bersaglio con un attacco\nche ricorda un colpo di forbici."
    de: "Der Anwender führt eine Attacke aus, die einer\nScherenbewegung ähnelt."
    es: "Cruza las guadañas o las garras para atacar al objetivo\ncomo si fueran unas tijeras."
    ko: "낫이나 발톱을 가위처럼\n교차시키면서 상대를 베어 가른다."
    zh_simp: "将镰刀或爪子像剪刀般地交叉，\n顺势劈开对手。"
    zh_trad: "將鐮刀或爪子像剪刀般地交叉，\n順勢劈開對手。"
yawn:
  names:
    jp_kana: あくび
    jp_kanji: あくび
    en: Yawn
    fr: Bâillement
    it: Sbadiglio
    de: Gähner
    es: Bostezo
    ko: 하품
    zh_simp: 哈欠
    zh_trad: 哈欠
  descriptions:
    jp_kana: "大きな　あくびで　眠気を　誘う。\n次の　ターンに\n相手を　眠り状態に　する。"
    jp_kanji: "大きな　あくびで　眠気を　誘う。\n次の　ターンに\n相手を　眠り状態に　する。"
    en: "The user lets loose a huge yawn that lulls the target into\nfalling asleep on the next turn."
    fr: "Le lanceur fait bâiller la cible, qui s’endort au tour\nsuivant."
    it: "Il Pokémon fa un grande sbadiglio che addormenta\nil bersaglio al turno seguente."
    de: "Anwender gähnt und das Ziel schläft in der nächsten\nRunde ein."
    es: "Gran bostezo que induce el sueño en el objetivo en el\nsiguiente turno."
    ko: "큰 하품으로 졸음을 유도한다.\n다음 턴에 상대를\n잠듦 상태로 만든다."
    zh_simp: "打个大哈欠引起睡意。\n在下一回合让对手陷入睡眠状态。"
    zh_trad: "打個大哈欠引起睡意。\n在下一回合\n讓對手陷入睡眠狀態。"
zap_cannon:
  names:
    jp_kana: でんじほう
    jp_kanji: でんじほう
    en: Zap Cannon
    fr: Élecanon
    it: Elettrocannone
    de: Blitzkanone
    es: Electrocañón
    ko: 전자포
    zh_simp: 电磁炮
    zh_trad: 電磁炮
  descriptions:
    jp_kana: "大砲の　ような\n電気を　発射して　攻撃する。\n相手を　まひの　状態に　する。"
    jp_kanji: "大砲の　ような\n電気を　発射して　攻撃する。\n相手を　まひの　状態に　する。"
    en: "The user attacks by firing an electric blast like a cannon.\nThis also leaves the target with paralysis."
    fr: "Un boulet de canon électrifié qui inflige des dégâts\nà la cible et la paralyse."
    it: "Il Pokémon attacca scagliando una sfera elettrica.\nParalizza il bersaglio."
    de: "Kanonenähnlicher Elektro-Schuss, der schadet und\nparalysiert."
    es: "Dispara una descarga eléctrica que causa daño y\nparálisis."
    ko: "대포처럼\n전기를 발사해서 공격한다.\n상대를 마비 상태로 만든다."
    zh_simp: "发射大炮一样的\n电流进行攻击。\n让对手陷入麻痹状态。"
    zh_trad: "發射如大炮般的\n電流進行攻擊。\n能讓對手陷入麻痺狀態。"
zen_headbutt:
  names:
    jp_kana: しねんのずつき
    jp_kanji: しねんのずつき
    en: Zen Headbutt
    fr: Psykoud’Boul
    it: Cozzata Zen
    de: Zen-Kopfstoß
    es: Cabezazo Zen
    ko: 사념의박치기
    zh_simp: 意念头锤
    zh_trad: 意念頭錘
  descriptions:
    jp_kana: "思念の　力を\n額に　集めて　攻撃する。\n相手を　ひるませることが　ある。"
    jp_kanji: "思念の　力を\n額に　集めて　攻撃する。\n相手を　ひるませることが　ある。"
    en: "The user focuses its willpower to its head and attacks\nthe target. This may also make the target flinch."
    fr: "Le lanceur concentre sa volonté et donne un coup\nde tête à la cible, ce qui peut aussi apeurer celle-ci."
    it: "Il Pokémon concentra le energie psichiche nella testa\ne attacca il bersaglio. Può anche farlo tentennare."
    de: "Anwender konzentriert seinen Willen und rammt das\nZiel. Dieses schreckt eventuell zurück."
    es: "Concentra su energía psíquica en la cabeza para\ngolpear. Puede hacer que el objetivo se amedrente."
    ko: "사념의 힘을\n이마에 모아서 공격한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "将思念的力量集中在\n前额进行攻击。\n有时会使对手畏缩。"
    zh_trad: "將意念的力量集中在\n前額進行攻擊。\n有時會讓對手畏縮。"
zing_zap:
  names:
    jp_kana: びりびりちくちく
    jp_kanji: びりびりちくちく
    en: Zing Zap
    fr: Électrikipik
    it: Elettropizzico
    de: Elektropikser
    es: Electropunzada
    ko: 찌리리따끔따끔
    zh_simp: 麻麻刺刺
    zh_trad: 麻麻刺刺
  descriptions:
    jp_kana: "相手に　ぶつかって　強力な\n電気を浴びせ　びりびりちくちく　させる。\n相手を　ひるませる　ことが　ある。"
    jp_kanji: "相手に　ぶつかって　強力な\n電気を浴びせ　びりびりちくちく　させる。\n相手を　ひるませる　ことが　ある。"
    en: "The user crashes into the target, delivering a powerful\nelectric shock. This may also make the target flinch."
    fr: "Le lanceur fonce sur la cible et lui envoie un puissant\nchoc électrique, ce qui peut aussi l’effrayer."
    it: "Il Pokémon colpisce il bersaglio investendolo con una\npotente scarica elettrica che può anche farlo tentennare."
    de: "Der Anwender rammt das Ziel und schockt es mit\nstarkem Strom. Das Ziel schreckt eventuell zurück."
    es: "Se lanza contra el objetivo y le suelta una potente\ndescarga eléctrica que puede hacer que se amedrente."
    ko: "상대에게 부딪쳐 강력한\n전기를 날려서 찌리리따끔따끔하게 만든다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "撞向对手，并发出强电，\n使其感到麻麻刺刺的。\n有时会使对手畏缩。"
    zh_trad: "撞向對手，並利用\n強電流使其感到麻麻刺刺的。\n有時會使對手畏縮。"
zippy_zap:
  names:
    jp_kana: ばちばちアクセル
    jp_kanji: ばちばちアクセル
    en: Zippy Zap
    fr: Pika-Sprint
    it: Sprintaboom
    de: Britzelturbo
    es: Pikaturbo
    ko: 파찌파찌액셀
    zh_simp: 电电加速
    zh_trad: 電電加速
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used. It’s recommended that this\nmove is forgotten. Once forgotten, this move can’t\nbe remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
