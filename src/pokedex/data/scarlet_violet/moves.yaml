teeter_dance:
  names:
    jp_kana: フラフラダンス
    jp_kanji: フラフラダンス
    en: Teeter Dance
    fr: Danse Folle
    it: Strampadanza
    de: Taumeltanz
    es: Danza Caos
    ko: 흔들흔들댄스
    zh_simp: 摇晃舞
    zh_trad: 搖晃舞
  descriptions:
    jp_kana: "フラフラと　ダンスを　おどって\n自分の　周りに　いるものを\n混乱状態に　させる。"
    jp_kanji: "フラフラと　ダンスを　おどって\n自分の　周りに　いるものを\n混乱状態に　させる。"
    en: "The user performs a wobbly dance that confuses every\nPokémon around it."
    fr: "Danse qui rend confus tous les Pokémon autour\ndu lanceur."
    it: "Chi la usa esegue una danza goffa che confonde\ngli altri Pokémon attorno."
    de: Ein Wackeltanz, der alle Pokémon im Umkreis verwirrt.
    es: "Danza histérica que confunde a los Pokémon\nadyacentes."
    ko: "흔들흔들 댄스를 춰서\n주위에 있는 포켓몬을\n혼란 상태로 만든다."
    zh_simp: "摇摇晃晃地跳起舞蹈，\n让自己周围的宝可梦\n陷入混乱状态。"
    zh_trad: "搖搖晃晃地跳起舞，\n讓自己周圍的寶可夢\n陷入混亂狀態。"
telekinesis:
  names:
    jp_kana: テレキネシス
    jp_kanji: テレキネシス
    en: Telekinesis
    fr: Lévikinésie
    it: Telecinesi
    de: Telekinese
    es: Telequinesis
    ko: 텔레키네시스
    zh_simp: 意念移物
    zh_trad: 意念移物
  descriptions:
    jp_kana: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
