natures_madness:
  names:
    jp_kana: しぜんのいかり
    jp_kanji: しぜんのいかり
    en: Nature’s Madness
    fr: Ire de la Nature
    it: Ira della Natura
    de: Naturzorn
    es: Furia Natural
    ko: 자연의분노
    zh_simp: 自然之怒
    zh_trad: 自然之怒
  descriptions:
    jp_kana: "自然の　怒りを　相手に　ぶつける。\n相手の　ＨＰは　半分に　なる。"
    jp_kanji: "自然の　怒りを　相手に　ぶつける。\n相手の　ＨＰは　半分に　なる。"
    en: "The user hits the target with the full wrath of nature.\nThis cuts the target’s HP in half."
    fr: "Le lanceur déchaîne toute la colère de la nature\npour baisser les PV de la cible de moitié."
    it: "Il Pokémon scatena l’ira della natura sul bersaglio\ne ne dimezza i PS."
    de: "Das Ziel wird vom Zorn der Natur getroffen und verliert\ndadurch die Hälfte seiner KP."
    es: "Golpea al objetivo con la furia de la naturaleza y\nreduce sus PS a la mitad."
    ko: "자연의 분노를 상대에게 부딪친다.\n상대의 HP는 절반이 된다."
    zh_simp: "向对手释放自然之怒。\n对手的ＨＰ会减半。"
    zh_trad: "向對手發洩自然之怒。\n會使對手的ＨＰ減半。"
needle_arm:
  names:
    jp_kana: ニードルアーム
    jp_kanji: ニードルアーム
    en: Needle Arm
    fr: Poing Dard
    it: Pugnospine
    de: Nietenranke
    es: Brazo Pincho
    ko: 바늘팔
    zh_simp: 尖刺臂
    zh_trad: 尖刺臂
  descriptions:
