glacial_lance:
  names:
    jp_kana: ブリザードランス
    jp_kanji: ブリザードランス
    en: Glacial Lance
    fr: Lance de Glace
    it: Lancia Glaciale
    de: Blizzardlanze
    es: Lanza Glacial
    ko: 블리자드랜스
    zh_simp: 雪矛
    zh_trad: 雪矛
  descriptions:
    jp_kana: "吹雪を　まとった　氷の　槍を\n相手に　投げつけて　攻撃する。"
    jp_kanji: "吹雪を　まとった　氷の　槍を\n相手に　投げつけて　攻撃する。"
    en: "The user attacks by hurling a blizzard-cloaked icicle\nlance at opposing Pokémon."
    fr: "Le lanceur attaque la cible avec une lance de glace\nentourée d’un blizzard."
    it: "Il Pokémon attacca il bersaglio scagliando una lancia\ndi ghiaccio accompagnata da una tormenta di neve."
    de: "Der Anwender wirft eine in einen Blizzard gehüllte\nLanze aus Eis auf gegnerische Pokémon."
    es: "El usuario ataca al objetivo lanzándole un carámbano de\nhielo envuelto en una ventisca."
    ko: "눈보라를 두른 얼음의 창을\n상대에게 던져서 공격한다."
    zh_simp: "向对手投掷\n掀起暴风雪的冰矛进行攻击。"
    zh_trad: "向對手投擲\n捲著暴風雪的冰矛進行攻擊。"
glaciate:
  names:
    jp_kana: こごえるせかい
    jp_kanji: こごえるせかい
    en: Glaciate
    fr: Ère Glaciaire
    it: Gelamondo
    de: Eiszeit
    es: Mundo Gélido
    ko: 얼어붙은세계
    zh_simp: 冰封世界
    zh_trad: 冰封世界
  descriptions:
    jp_kana: "凍えるような　冷気を\n相手に　吹きつけて　攻撃する。\n相手の　素早さを　さげる。"
    jp_kanji: "凍えるような　冷気を\n相手に　吹きつけて　攻撃する。\n相手の　素早さを　さげる。"
    en: "The user attacks by blowing freezing cold air at\nopposing Pokémon. This also lowers their Speed stats."
    fr: "Un souffle de vent qui congèle tout sur son passage\ns’abat sur la cible et réduit aussi sa Vitesse."
    it: "Il Pokémon attacca il bersaglio con una folata d’aria\ngelida e ne riduce anche la Velocità."
    de: "Anwender greift an, indem er gegnerischen Pokémon\nklirrend kalte Luft entgegenbläst und dabei ihre\nInitiative senkt."
    es: "Ataque con aire helado que reduce la Velocidad del\nobjetivo."
    ko: "차가운 냉기를\n상대에게 내뿜어 공격한다.\n상대의 스피드를 떨어뜨린다."
    zh_simp: "将冰冻的冷气\n吹向对手进行攻击。\n会降低对手的速度。"
    zh_trad: "放出冰凍的寒氣\n向對手進行攻擊。\n可降低對手的速度。"
glaive_rush:
  names:
    jp_kana: きょけんとつげき
    jp_kanji: きょけんとつげき
    en: Glaive Rush
    fr: Charge Glaive
    it: Spadoncarica
    de: Großklingenstoß
    es: Asalto Espadón
    ko: 대검돌격
    zh_simp: 巨剑突击
    zh_trad: 巨劍突擊
  descriptions:
    jp_kana: "体を　投げだす　無謀な突撃。\n技のあと　相手からの　攻撃は　必ず\n命中し　ダメージが　２倍に　なってしまう。"
    jp_kanji: "体を　投げだす　無謀な突撃。\n技のあと　相手からの　攻撃は　必ず\n命中し　ダメージが　２倍に　なってしまう。"
    en: "The user throws its entire body into a reckless charge.\nAfter this move is used, attacks on the user cannot miss\nand will inflict double damage until the user’s next turn."
    fr: "Le lanceur se jette dans une charge inconsciente sur la\ncible. Une fois cette capacité utilisée, toute attaque sur\nle lanceur inflige le double de dégâts et n’échoue jamais."
    it: "Il Pokémon si lancia in una carica avventata. Fino al suo\nprossimo turno, il Pokémon riceverà il doppio dei danni\ndagli attacchi altrui, che andranno sempre a segno."
    de: "Der Anwender stürzt sich waghalsig auf das Ziel. Bis zum\nnächsten Zug des Anwenders treffen ihn gegnerische\nAngriffe garantiert und richten doppelten Schaden an."
    es: "Embiste de forma temeraria con todo el cuerpo.\nLos ataques que reciba antes de su siguiente turno\nno fallarán y causarán el doble de daño."
    ko: "몸을 내던지는 무모한 돌격.\n기술을 사용한 다음, 상대의 공격이\n반드시 명중하고 데미지를 2배로 입게 된다."
    zh_simp: "有勇无谋的舍身突击。\n使出招式后，对手的攻击必定\n会命中，且伤害会变成２倍。"
    zh_trad: "豁出己身的魯莽突擊。\n使出招式後對手的攻擊必定會命中，\n且傷害會變成２倍。"
glare:
  names:
    jp_kana: へびにらみ
    jp_kanji: へびにらみ
    en: Glare
    fr: Regard Médusant
    it: Sguardo Feroce
    de: Schlangenblick
    es: Deslumbrar
    ko: 뱀눈초리
    zh_simp: 大蛇瞪眼
    zh_trad: 大蛇瞪眼
  descriptions:
    jp_kana: "おなかの　模様で　おびえさせて\n相手を　まひの　状態に　する。"
    jp_kanji: "おなかの　模様で　おびえさせて\n相手を　まひの　状態に　する。"
    en: "The user intimidates the target with the pattern on\nits belly to cause paralysis."
    fr: "Le lanceur intimide la cible grâce à son regard\nterrifiant pour la paralyser."
    it: "Il Pokémon spaventa il bersaglio con uno sguardo\nterrificante e ne causa la paralisi."
    de: Schüchtert Ziel ein, sodass dieses paralysiert wird.
    es: "Intimida y asusta al objetivo con la mirada para dejarlo\nparalizado."
    ko: "배의 무늬로 겁을 주어\n상대를 마비 상태로 만든다."
    zh_simp: "用腹部的花纹使对手害怕，\n从而让其陷入麻痹状态。"
    zh_trad: "用腹部的花紋使對手心生恐懼，\n讓對手陷入麻痺狀態。"
