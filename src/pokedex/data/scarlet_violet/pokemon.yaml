      hidden_ability: damp
      descriptions:
        jp_kana:
          scarlet: "￹岩￺いわ￻のように　￹硬￺かた￻い　￹腕￺うで￻を\n￹一振￺ひとふ￻り　するだけで　￹巨大￺きょだい￻な　￹岩￺いわ￻を\nコナゴナに　￹砕￺くだ￻くぞ。"
          violet: "￹両腕￺りょううで￻は　￹岩￺いわ￻のように　￹硬￺かた￻く\n￹一振￺ひとふ￻りで　￹相手￺あいて￻を　￹叩￺たた￻きのめす。\n￹美￺うつく￻しい　￹砂浜￺すなはま￻で　￹巣作￺すづく￻り。"
        jp_kanji:
          scarlet: "￹岩￺いわ￻のように　￹硬￺かた￻い　￹腕￺うで￻を\n￹一振￺ひとふ￻り　するだけで　￹巨大￺きょだい￻な　￹岩￺いわ￻を\nコナゴナに　￹砕￺くだ￻くぞ。"
          violet: "￹両腕￺りょううで￻は　￹岩￺いわ￻のように　￹硬￺かた￻く\n￹一振￺ひとふ￻りで　￹相手￺あいて￻を　￹叩￺たた￻きのめす。\n￹美￺うつく￻しい　￹砂浜￺すなはま￻で　￹巣作￺すづく￻り。"
        en:
          scarlet: "Its arms are hard as rock. With one swing, it can\nbreak an enormous boulder into pieces."
          violet: "Swampert’s arms are rock-hard. With one swing,\nthey can batter down Swampert’s foes. This\nPokémon makes its nest on beautiful beaches."
        fr:
          scarlet: "Ses bras sont solides comme la pierre. Un seul\ncoup suffit pour réduire en miettes les rochers\nles plus imposants."
          violet: "Ses bras sont aussi durs que la roche. Il peut\nterrasser ses adversaires d’un simple coup.\nIl aime faire son nid sur les jolies plages."
        it:
          scarlet: "Ha braccia dure come roccia, capaci\ndi frantumare in mille pezzi un masso\ncon un colpo solo."
          violet: "Ha braccia dure come roccia, capaci\ndi abbattere l’avversario in un colpo.\nNidifica su splendide spiagge."
        de:
          scarlet: "Schon ein einziger Hieb mit seinen steinharten\nArmen genügt, um selbst die größten Felsen\nzu Staub zu verwandeln."
          violet: "Seine Arme sind steinhart. Mit nur einem\nSchlag kann es Gegner zu Boden strecken.\nEs baut sein Nest an pittoresken Stränden."
        es:
          scarlet: "Con sus brazos duros como una roca puede\npartir pedruscos gigantescos en mil pedazos\nde un solo golpe."
          violet: "Tiene unos brazos duros como la roca, con los\nque puede dejar molido al enemigo de un solo\ngolpe. Construye su nido en playas bonitas."
        ko:
          scarlet: "돌처럼 딱딱한 팔을\n한 번 휘두르는 것만으로 거대한\n돌을 조각조각으로 부순다."
          violet: "양팔은 바위처럼 단단하며\n한 번에 상대를 때려눕힌다.\n아름다운 해변에 거처를 만든다."
        zh_simp:
          scarlet: "只要挥一挥如岩石般坚硬的手臂，\n就能将巨大的岩石打得粉碎。"
          violet: "双臂硬如岩石，\n只要挥一挥就能击垮对手。\n会在美丽的沙滩筑巢。"
        zh_trad:
          scarlet: "只要揮一下如岩石般\n堅硬的手臂，就能將\n巨大的岩石打得粉碎。"
          violet: "雙臂堅硬如岩石，\n只要揮一下就能擊倒對手。\n會在美麗的沙灘築巢。"
