      descriptions:
        jp_kana:
          scarlet: "￹尾￺お￻びれの　￹水￺みず￻のリングで　￹仲間￺なかま￻と\n￹遊￺あそ￻ぶのが　￹好￺す￻き。　￹超音波￺ちょうおんぱ￻で\n￹生￺い￻き￹物￺もの￻の　￹気持￺きも￻ちを　￹察知￺さっち￻する。"
          violet: "￹水￺みず￻のリングは　￹頭￺あたま￻の　￹穴￺あな￻から　￹出￺で￻る\n￹粘着液￺ねんちゃくえき￻と　￹海￺うみ￻の￹水￺みず￻を　￹混￺ま￻ぜて\n￹作￺つく￻り￹出￺だ￻したものなのだ。"
        jp_kanji:
          scarlet: "￹尾￺お￻びれの　￹水￺みず￻のリングで　￹仲間￺なかま￻と\n￹遊￺あそ￻ぶのが　￹好￺す￻き。　￹超音波￺ちょうおんぱ￻で\n￹生￺い￻き￹物￺もの￻の　￹気持￺きも￻ちを　￹察知￺さっち￻する。"
          violet: "￹水￺みず￻のリングは　￹頭￺あたま￻の　￹穴￺あな￻から　￹出￺で￻る\n￹粘着液￺ねんちゃくえき￻と　￹海￺うみ￻の￹水￺みず￻を　￹混￺ま￻ぜて\n￹作￺つく￻り￹出￺だ￻したものなのだ。"
        en:
          scarlet: "It likes playing with others of its kind using the\nwater ring on its tail. It uses ultrasonic waves to\nsense the emotions of other living creatures."
          violet: "Its water ring is made from seawater mixed with\na sticky fluid that Finizen secretes from\nits blowhole."
        fr:
          scarlet: "Il aime utiliser l’anneau d’eau de sa queue quand\nil joue avec ses congénères et se sert d’ultrasons\npour comprendre les émotions des autres."
          violet: "Il a confectionné l’anneau autour de sa queue\nà partir d’eau de mer et du liquide collant\nque son évent sécrète."
        it:
          scarlet: "Ama giocare assieme ai suoi simili con l’anello\nd’acqua che ha sulla coda. Utilizza gli ultrasuoni\nper percepire i sentimenti di altri esseri viventi."
          violet: "Crea il suo anello mescolando acqua di mare al\nliquido viscoso che fuoriesce dal foro sulla testa."
        de:
          scarlet: "Mit dem Wasserring an der Schwanzflosse spielt\nes gerne mit Artgenossen. Über Ultraschallwellen\nkann es die Gefühle anderer Lebewesen erfassen."
          violet: "Sein Wasserring besteht aus einer Mischung aus\nMeerwasser und einer klebrigen Flüssigkeit,\ndie aus dem Blasloch auf seinem Kopf austritt."
        es:
          scarlet: "Le gusta jugar con sus congéneres con el anillo\nde agua de su aleta caudal. Utiliza ultrasonidos\npara percibir las emociones de otros seres."
          violet: "Su anillo de agua está compuesto por una\nmezcla de agua marina y de un líquido\naglutinante que segrega por el espiráculo."
        ko:
          scarlet: "꼬리지느러미에 있는 물의 고리를 가지고\n동료와 노는 것을 좋아한다.\n초음파로 생명체의 기분을 감지한다."
          violet: "물의 고리는\n머리의 구멍에서 나오는 점액질과\n바닷물을 섞어서 만들어 낸 것이다."
        zh_simp:
          scarlet: "喜欢用尾鳍的水环和\n伙伴一起玩耍。会通过\n超音波来感知生物的心情。"
          violet: "水环是由从头部的洞\n冒出的黏胶与海水\n混合之后制作而成的。"
        zh_trad:
          scarlet: "喜歡用尾鰭的水環和\n夥伴一起玩耍。能透過\n超音波察覺生物的心情。"
          violet: "牠的水環是頭部的洞\n冒出來的黏膠與海水\n混合後製造出來的。"
