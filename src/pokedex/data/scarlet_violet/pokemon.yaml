        jp_kanji:
          scarlet: "￹多￺おお￻くの　￹武勲￺ぶくん￻を　￹立￺た￻てた　￹戦士￺せんし￻の\n￹鎧￺よろい￻によって　￹進化￺しんか￻した　￹姿￺すがた￻。\n￹忠誠心￺ちゅうせいしん￻の　￹厚￺あつ￻い　ポケモン。"
          violet: "エスパーと　￹炎￺ほのお￻の　エネルギーで\n￹強化￺きょうか￻された　￹鎧￺よろい￻を　まとう。\n￹灼熱￺しゃくねつ￻の　￹火￺ひ￻の￹玉￺たま￻を　￹放￺はな￻つ。"
        en:
          scarlet: "Armarouge evolved through the use of a set of\narmor that belonged to a distinguished warrior.\nThis Pokémon is incredibly loyal."
          violet: "This Pokémon clads itself in armor that has been\nfortified by psychic and fire energy, and it shoots\nblazing fireballs."
        fr:
          scarlet: "Il a évolué grâce à l’armure d’une illustre âme\nguerrière. Ce Pokémon est extrêmement loyal."
          violet: "Ce Pokémon porte une armure renforcée par\nde l’énergie de type Psy et de type Feu. Il lance\ndes boules de feu à très haute température."
        it:
          scarlet: "Si è evoluto in questa forma grazie all’armatura\ndi un guerriero distintosi sul campo di battaglia.\nÈ noto per la sua estrema fedeltà."
          violet: "Questo Pokémon indossa un’armatura rinforzata\ndall’energia Psico e Fuoco. Lancia palle di fuoco\nincandescenti contro i suoi nemici."
        de:
          scarlet: "Es entwickelte sich durch die Rüstung eines\nheldenhaften Kriegers zu dieser Form. Crimanzo\nbesitzt einen ausgeprägten Sinn für Loyalität."
          violet: "Es trägt eine Rüstung, die mit Psycho- sowie\nFeuer-Energie verstärkt wurde, und verschießt\nglühend heiße Feuerbälle."
        es:
          scarlet: "Evolucionó al portar la armadura de un guerrero\nde renombre. Este Pokémon destaca por su gran\nlealtad."
          violet: "Porta una armadura reforzada con energía\npsíquica e ígnea. Ataca lanzando bolas de\nfuego incandescentes."
        ko:
          scarlet: "많은 무공을 세운 전사의\n갑옷에 의해 진화한 모습.\n충성심이 강한 포켓몬이다."
          violet: "에스퍼와 불꽃의 에너지로\n강화된 갑옷을 두르고 있다.\n작열하는 불덩이를 발사한다."
        zh_simp:
          scarlet: "借助立下诸多功勋的战士\n所穿的铠甲进化而来的样子。\n是忠心耿耿的宝可梦。"
          violet: "身上包裹着通过超能力和火焰\n的能量而得到强化的铠甲。\n会释放灼热的火球。"
        zh_trad:
          scarlet: "藉由立下眾多勛績的戰士\n所穿的鎧甲進化成的樣子。\n是忠心耿耿的寶可夢。"
          violet: "身上包裹著受到超能力\n和火焰能量強化的鎧甲。\n會釋放熾熱的火球。"
