exeggcute:
  species_id: 102
  names:
    jp_kana: タマタマ
    jp_kanji: タマタマ
    en: Exeggcute
    fr: Noeunoeuf
    it: Exeggcute
    de: Owei
    es: Exeggcute
    ko: 아라리
    zh_simp: 蛋蛋
    zh_trad: 蛋蛋
  forms:
    exeggcute:
      form_id: 0
      base_stats:
        hp: 60
        attack: 40
        defense: 80
        special_attack: 60
        special_defense: 45
        speed: 40
      evs_yield:
        hp: 0
        attack: 0
        defense: 1
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - grass
        - psychic
      egg_groups:
        - grass
      abilities:
        - chlorophyll
      hidden_ability: harvest
      descriptions:
        jp_kana:
          scarlet: "タマゴだと　￹思￺おも￻って　￹触￺さわ￻ると\n￹仲間￺なかま￻が　どんどん　￹集￺あつ￻まってきて\n￹集団攻撃￺しゅうだんこうげき￻に　あう。"
          violet: "タマタマだけに　￹伝￺つた￻わる\nテレパシーを　￹出￺だ￻し￹合￺あ￻っているので\nどんなときでも　６￹匹￺ぴき￻　￹集￺あつ￻まれる。"
        jp_kanji:
          scarlet: "タマゴだと　￹思￺おも￻って　￹触￺さわ￻ると\n￹仲間￺なかま￻が　どんどん　￹集￺あつ￻まってきて\n￹集団攻撃￺しゅうだんこうげき￻に　あう。"
          violet: "タマタマだけに　￹伝￺つた￻わる\nテレパシーを　￹出￺だ￻し￹合￺あ￻っているので\nどんなときでも　６￹匹￺ぴき￻　￹集￺あつ￻まれる。"
        en:
          scarlet: "If you touch one of Exeggcute’s heads,\nmistaking it for an egg, the other heads will\nquickly gather and attack you in a swarm."
          violet: "Using telepathy only fellow Exeggcute can\npick up on, they always form a cluster of six."
        fr:
          scarlet: "Ses têtes sont souvent prises\npour des œufs. Si l’on en touche une,\nles autres se regroupent pour attaquer."
          violet: "En utilisant un pouvoir télépathique que\nseuls les Noeunoeuf perçoivent, ses six têtes\npeuvent rester groupées en toutes circonstances."
        it:
          scarlet: "Se gli si tocca una delle teste scambiandola\nper un uovo, le altre non esitano ad attaccare\nin gruppo."
          violet: "Usando un richiamo telepatico percepito solo\ndai suoi simili, riesce in qualsiasi momento\na formare un gruppo di sei individui."
        de:
          scarlet: "Berührt man einen seiner Köpfe, weil man\nihn für ein Ei hält, tun die übrigen sich rasch\nzusammen und gehen zum Angriff über."
          violet: "Die Köpfe nutzen untereinander Telepathie,\ndie nur sie wahrnehmen können, um stets eine\nGruppe von sechs Exemplaren zu bilden."
        es:
          scarlet: "Si alguien confunde a una de sus cabezas con\nun huevo y la toca, se reagrupa con las otras\npara atacar todas juntas."
          violet: "Utilizan entre ellos un tipo de telepatía que\nsolo pueden entender los Exeggcute para\nmantenerse siempre en grupos de seis cabezas."
        ko:
          scarlet: "알로 착각하여 건드리면\n동료들이 모여들어서\n집단으로 공격한다."
          violet: "아라리에게만 전해지는\n텔레파시를 주고받고 있어서\n어떤 때든 6마리가 함께 모여 있다."
        zh_simp:
          scarlet: "如果把它当成是蛋\n去触摸的话，它的伙伴就会\n不断聚集过来发起集体攻击。"
          violet: "因为会互相发出仅能在\n蛋蛋之间传递的心灵感应，\n所以无论何时都能集齐６只。"
        zh_trad:
          scarlet: "若以為是蛋而去觸摸牠，\n就會被不斷聚集而來的\n蛋蛋的夥伴集體攻擊。"
          violet: "會發出只有蛋蛋才能收到的\n心靈感應，因此不論何時\n都能６隻聚集在一起。"
exeggutor:
  species_id: 103
  names:
    jp_kana: ナッシー
    jp_kanji: ナッシー
    en: Exeggutor
    fr: Noadkoko
    it: Exeggutor
    de: Kokowei
    es: Exeggutor
    ko: 나시
    zh_simp: 椰蛋树
    zh_trad: 椰蛋樹
  forms:
    exeggutor:
      form_id: 0
      base_stats:
        hp: 95
        attack: 95
        defense: 85
        special_attack: 125
        special_defense: 75
        speed: 55
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 2
        special_defense: 0
        speed: 0
      types:
        - grass
        - psychic
      egg_groups:
        - grass
      abilities:
        - chlorophyll
      hidden_ability: harvest
      descriptions:
        jp_kana:
          scarlet: "￹歩￺ある￻く　￹熱帯雨林￺ねったいうりん￻　と￹呼￺よ￻ばれる。\n￹実￺み￻の　ひとつひとつに　￹顔￺かお￻があって\nそれぞれ　￹意思￺いし￻を　￹持￺も￻っている。"
          violet: "ごくまれに　￹頭￺あたま￻の　どれか\nひとつが　￹地面￺じめん￻に　￹落￺お￻ちると\nタマタマになって　￹動￺うご￻きだすという。"
        jp_kanji:
          scarlet: "￹歩￺ある￻く　￹熱帯雨林￺ねったいうりん￻　と￹呼￺よ￻ばれる。\n￹実￺み￻の　ひとつひとつに　￹顔￺かお￻があって\nそれぞれ　￹意思￺いし￻を　￹持￺も￻っている。"
          violet: "ごくまれに　￹頭￺あたま￻の　どれか\nひとつが　￹地面￺じめん￻に　￹落￺お￻ちると\nタマタマになって　￹動￺うご￻きだすという。"
        en:
          scarlet: "It is called the Walking Jungle. Each of the nuts\nhas a face and a will of its own."
          violet: "It is said that on rare occasions, one of its heads\nwill drop off and continue on as an Exeggcute."
        fr:
          scarlet: "On le surnomme « la jungle ambulante ».\nChacune de ses noix est dotée d’un visage\net d’une volonté qui lui sont propres."
          violet: "On raconte qu’en de très rares occasions, une de\nses têtes tombe au sol et devient un Noeunoeuf."
        it:
          scarlet: "Viene chiamato \"giungla ambulante\".\nOgnuno dei frutti ha una faccia e una volontà\nproprie."
          violet: "Si dice che, in rare occasioni, una delle sue teste\ncada al suolo e cominci a muoversi, diventando\nun Exeggcute."
        de:
          scarlet: "Man nennt es den „Laufenden Dschungel“.\nJede der Nüsse hat ein eigenes Gesicht und\neinen eigenen Willen."
          violet: "Es heißt, in sehr seltenen Fällen falle einer seiner\nKöpfe zu Boden und lebe als Owei weiter."
        es:
          scarlet: "Se lo llama la Selva Andante. Cada fruto tiene\nuna cara distinta y voluntad propia."
          violet: "Se dice que, en muy raras ocasiones, una de sus\ncabezas cae al suelo y comienza a desplazarse\nconvertida en Exeggcute."
        ko:
          scarlet: "걸어 다니는 열대우림이라고도 불린다.\n열매 하나하나마다 얼굴이 있으며,\n각자 의지를 가지고 있다."
          violet: "매우 드물게 머리 중 하나가\n땅에 떨어지면\n아라리가 되어 움직인다고 한다."
        zh_simp:
          scarlet: "被称为会走路的热带雨林。\n每个果实都有自己的脸，\n而且拥有各自的想法。"
          violet: "据说在极少数的情况下，\n当有其中一个头掉落到地面，\n就会变成蛋蛋动起来。"
        zh_trad:
          scarlet: "被稱為會走路的熱帶雨林。\n每個果實都有自己的臉，\n而且各有各的思想。"
          violet: "聽說在極少數的情況下，\n當其中一顆頭掉落到地面，\n就會變成蛋蛋並且動起來。"
    exeggutor_alolan_form:
