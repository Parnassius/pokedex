          scarlet: "￹気￺き￻に￹入￺い￻った　￹人間￺にんげん￻や　ポケモンを\n￹冷気￺れいき￻で　￹凍￺こお￻らせる。\n￹巣穴￺すあな￻に　￹持￺も￻って￹帰￺かえ￻って　￹飾￺かざ￻るのだ。"
          violet: "マイナス５０￹度￺ど￻の　￹息￺いき￻を　￹吹￺ふ￻きかけ\n￹凍￺こお￻らせた　￹獲物￺えもの￻を　￹秘密￺ひみつ￻の\n￹場所￺ばしょ￻に　￹飾￺かざ￻っていると　￹言￺い￻われる。"
        jp_kanji:
          scarlet: "￹気￺き￻に￹入￺い￻った　￹人間￺にんげん￻や　ポケモンを\n￹冷気￺れいき￻で　￹凍￺こお￻らせる。\n￹巣穴￺すあな￻に　￹持￺も￻って￹帰￺かえ￻って　￹飾￺かざ￻るのだ。"
          violet: "マイナス５０￹度￺ど￻の　￹息￺いき￻を　￹吹￺ふ￻きかけ\n￹凍￺こお￻らせた　￹獲物￺えもの￻を　￹秘密￺ひみつ￻の\n￹場所￺ばしょ￻に　￹飾￺かざ￻っていると　￹言￺い￻われる。"
        en:
          scarlet: "When it finds humans or Pokémon it likes,\nit freezes them and takes them to its chilly\nden, where they become decorations."
          violet: "It freezes prey by blowing its −58 degree\nFahrenheit breath. It is said to then secretly\ndisplay its prey."
        fr:
          scarlet: "Il congèle les êtres humains et les Pokémon qui\nlui plaisent. Il les emmène ensuite dans sa tanière\npour les admirer à loisir."
          violet: "On dit que Momartik gèle ses proies grâce\nà son souffle à -50 °C avant de les exposer\ndans sa tanière."
        it:
          scarlet: "Con il suo alito glaciale congela gli esseri umani\ne i Pokémon che gli piacciono e li usa per\ndecorare la sua tana."
          violet: "Congela le prede con un alito glaciale a -50 ºC.\nSi dice che poi le metta in mostra in un luogo\nsegreto."
        de:
          scarlet: "Menschen und Pokémon, die ihm gefallen,\nfriert es mit eisiger Luft ein. Dann nimmt es sie\nmit in seinen Bau und stellt sie dort aus."
          violet: "Sein −50 ℃ kalter Atem friert Beute ein. Es soll\ndiese dann an geheimen Orten ausstellen."
        es:
          scarlet: "Con su gélido aliento congela a todo Pokémon o\nhumano que le llame la atención y se lo lleva a su\nguarida para usarlo como objeto decorativo."
          violet: "Congela a sus presas con su aliento gélido a\n-50 ºC. Se dice que luego las dispone como\ndecoración en algún lugar secreto."
        ko:
          scarlet: "마음에 든 인간과 포켓몬을\n냉기로 얼린 다음\n보금자리에 가져가서 장식한다."
          violet: "영하 50도의 숨결을 뿜어서\n얼린 먹이를 비밀 장소에\n장식해 둔다고 전해진다."
        zh_simp:
          scarlet: "用冷气把中意的人类\n或宝可梦都冻起来。\n然后带回巢穴当装饰用。"
          violet: "据说它会吐出零下５０度的气息\n冻结猎物，然后将其带到\n秘密的地方装饰起来。"
        zh_trad:
          scarlet: "會用寒氣把喜歡的人類\n或寶可夢都凍結起來，\n然後帶回巢穴當成裝飾。"
          violet: "據說會吐出零下５０度的\n氣息凍結獵物，然後帶到\n秘密的地方裝飾起來。"
