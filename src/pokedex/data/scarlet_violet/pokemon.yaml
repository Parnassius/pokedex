          violet: "￹体￺からだ￻の　￹約￺やく￻２￹倍￺ばい￻の　￹長￺なが￻さの　￹尻尾￺しっぽ￻で\n￹木￺き￻から　￹落￺お￻とした　￹木￺き￻の￹実￺み￻を\nごっそり　￹包￺つつ￻んで　￹持￺も￻ち￹去￺さ￻るぞ。"
        jp_kanji:
          scarlet: "￹木￺き￻の￹実￺み￻の　￹木￺き￻を　￹見￺み￻つけると　たとえ\n￹戦￺たたか￻いの　￹最中￺さいちゅう￻であっても\n￹一目散￺いちもくさん￻に　￹収穫￺しゅうかく￻に　￹行￺い￻く。"
          violet: "￹体￺からだ￻の　￹約￺やく￻２￹倍￺ばい￻の　￹長￺なが￻さの　￹尻尾￺しっぽ￻で\n￹木￺き￻から　￹落￺お￻とした　￹木￺き￻の￹実￺み￻を\nごっそり　￹包￺つつ￻んで　￹持￺も￻ち￹去￺さ￻るぞ。"
        en:
          scarlet: "If it spots a berry tree, it will immediately go to\ngather berries without a sideways glance—even if\nit’s in the middle of a battle."
          violet: "This Pokémon makes off with heaps of fallen\nberries by wrapping them in its tail, which is\nroughly twice the length of its body."
        fr:
          scarlet: "Même en plein combat, s’il aperçoit des Baies\nsur un arbre, il interrompra tout sans hésitation\npour aller les cueillir."
          violet: "Sa queue, qui est environ deux fois plus longue\nque son corps, lui permet d’emmagasiner et\nde transporter les Baies tombées des arbres."
        it:
          scarlet: "Quando avvista un albero di bacche si precipita\nimmediatamente a raccoglierle, anche nel\nbel mezzo della lotta."
          violet: "Fa cadere grandi quantità di bacche dagli alberi\ne poi se le porta via tutte avvolgendole con la\ncoda lunga due volte il resto del corpo."
        de:
          scarlet: "Entdeckt es einen Baum voller Beeren, lässt es\nselbst in der Hitze des Gefechts alles stehen\nund liegen, um sie einzusammeln."
          violet: "Sein Schweif ist etwa doppelt so lang wie sein\nKörper. Es umwickelt damit von Bäumen gefallene\nBeeren und trägt sie mit sich fort."
        es:
          scarlet: "Incluso en medio de un combate, si ve un\nárbol con bayas, no duda ni un segundo en\nir a recolectarlas."
          violet: "Su cola es el doble de larga que su cuerpo.\nEnvuelve con ella las bayas que tira de los\nárboles para llevárselas consigo."
        ko:
          scarlet: "나무열매가 열린 나무를 발견하면\n한창 싸우던 중이더라도\n쏜살같이 모으러 간다."
          violet: "몸 길이의 약 2배나 되는 꼬리로\n나무에서 떨어진 나무열매를\n몽땅 싸서 가져가 버린다."
        zh_simp:
          scarlet: "只要发现长有树果的树，\n即使是在对战当中也会\n一溜烟地前去采集。"
          violet: "会用约有身体２倍长的尾巴\n把树上掉下来的树果\n全部裹起来带走。"
        zh_trad:
          scarlet: "只要發現長有樹果的樹，\n即使是在對戰當中，\n也會一溜煙地前去採集。"
          violet: "會用約有身體２倍長的尾巴\n把樹上掉下來的樹果\n全都裹起來帶走。"
