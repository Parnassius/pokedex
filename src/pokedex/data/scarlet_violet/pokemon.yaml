      descriptions:
        jp_kana:
          scarlet: "￹木￺き￻の￹枝￺えだ￻や　￹天井￺てんじょう￻に　￹糸￺いと￻で　￹張￺は￻りつき\n￹音￺おと￻もなく　￹行動￺こうどう￻する。\n￹獲物￺えもの￻に　￹気￺き￻づかれる￹前￺まえ￻に　￹倒￺たお￻す。"
          violet: "￹丈夫￺じょうぶ￻で　ネバネバの　￹糸￺いと￻を\n￹縄張￺なわば￻りの　￹中￺なか￻に　￹張￺は￻り￹巡￺めぐ￻らせて\n￹侵入者￺しんにゅうしゃ￻を　￹罠￺わな￻にかけるのだ。"
        jp_kanji:
          scarlet: "￹木￺き￻の￹枝￺えだ￻や　￹天井￺てんじょう￻に　￹糸￺いと￻で　￹張￺は￻りつき\n￹音￺おと￻もなく　￹行動￺こうどう￻する。\n￹獲物￺えもの￻に　￹気￺き￻づかれる￹前￺まえ￻に　￹倒￺たお￻す。"
          violet: "￹丈夫￺じょうぶ￻で　ネバネバの　￹糸￺いと￻を\n￹縄張￺なわば￻りの　￹中￺なか￻に　￹張￺は￻り￹巡￺めぐ￻らせて\n￹侵入者￺しんにゅうしゃ￻を　￹罠￺わな￻にかけるのだ。"
        en:
          scarlet: "It clings to branches and ceilings using its\nthreads and moves without a sound. It takes\nout its prey before the prey even notices it."
          violet: "Spidops covers its territory in tough, sticky\nthreads to set up traps for intruders."
        fr:
          scarlet: "Ce Pokémon s’accroche aux branches ou aux\nplafonds grâce à son fil et se déplace en silence.\nIl élimine ses proies sans qu’elles le remarquent."
          violet: "Il recouvre son territoire de fil solide et collant\npour piéger les indésirables qui s’y aventurent."
        it:
          scarlet: "Usando il suo filo per appendersi ai rami e ai\nsoffitti, può muoversi senza far rumore. Finisce\nla preda prima che questa se ne renda conto."
          violet: "Protegge il proprio territorio dagli intrusi\npiazzandovi tele resistenti e appiccicose\nche usa come trappole."
        de:
          scarlet: "Spinsidias hängt sich mit seinem Faden an Äste\noder Decken und bewegt sich lautlos. Es erlegt\nseine Beute, bevor diese es bemerken kann."
          violet: "In seinem Revier spannt es überall kräftige,\nklebrige Fäden, um Fallen für Eindringlinge zu\nlegen."
        es:
          scarlet: "Se adhiere con su hilo a ramas y techos, por los\nque se desplaza en silencio. Acaba con su presa\nantes de que esta se percate de su presencia."
          violet: "Protege su territorio cubriéndolo con una tela\nde hilo resistente y pegajoso que actúa como\nuna trampa frente a los intrusos."
        ko:
          scarlet: "나뭇가지나 천장에\n실로 달라붙어 소리 없이 행동한다.\n먹잇감에게 들키기 전에 쓰러뜨린다."
          violet: "튼튼하고 끈끈한 실을\n영역 안에 둘러쳐서\n침입자를 함정에 빠트린다."
        zh_simp:
          scarlet: "用丝线吸附在树枝或天花板上\n无声无息地行动。会在自己\n被发现之前将猎物打倒。"
          violet: "会在自己的地盘里布下\n坚固又黏糊糊的丝线，\n来当做捕捉入侵者的陷阱。"
        zh_trad:
          scarlet: "用絲線吸附在樹枝或天花板上\n無聲無息地移動。會在自己\n被察覺到之前將獵物打倒。"
          violet: "會在自己的地盤裡布下\n既堅固又黏答答的絲線，\n作為捕捉入侵者的陷阱。"
