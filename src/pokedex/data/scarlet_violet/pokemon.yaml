      descriptions:
        jp_kana:
          scarlet: "ほんのり　￹甘￺あま￻い　￹香￺かお￻りがして\nよく　￹弾￺はず￻む　￹柔￺やわ￻らかい　￹体￺からだ￻は\n￹一度￺いちど￻　￹弾￺はず￻みだすと　￹止￺と￻まらない。"
          violet: "￹歌￺うた￻うのが　￹好￺す￻きだが　まだ　￹下手￺へた￻。\nちゃんと　ほめてあげると　￹少￺すこ￻しずつ\n￹上手￺じょうず￻に　なっていくよ。"
        jp_kanji:
          scarlet: "ほんのり　￹甘￺あま￻い　￹香￺かお￻りがして\nよく　￹弾￺はず￻む　￹柔￺やわ￻らかい　￹体￺からだ￻は\n￹一度￺いちど￻　￹弾￺はず￻みだすと　￹止￺と￻まらない。"
          violet: "￹歌￺うた￻うのが　￹好￺す￻きだが　まだ　￹下手￺へた￻。\nちゃんと　ほめてあげると　￹少￺すこ￻しずつ\n￹上手￺じょうず￻に　なっていくよ。"
        en:
          scarlet: "Its body has a faintly sweet scent and is bouncy\nand soft. If it bounces even once, it cannot stop."
          violet: "It likes to sing but is not yet good at it. With\npraise and encouragement, it will get better little\nby little."
        fr:
          scarlet: "Son corps mou dégage un parfum sucré. Quand\nil commence à rebondir, on ne peut plus l’arrêter."
          violet: "Ce Pokémon adore chanter, mais il n’est pas\nencore très doué. Il s’améliore progressivement\nsi on le complimente suffisamment."
        it:
          scarlet: "Il suo corpo morbido ed elastico emette\nun profumo dolce e delicato. Se inizia\na rimbalzare è impossibile fermarlo."
          violet: "Gli piace molto cantare, ma è ancora inesperto.\nSe incoraggiato nel modo giusto, migliora a poco\na poco."
        de:
          scarlet: "Es duftet süßlich. Fängt sein weicher, elastischer\nKörper einmal an zu hüpfen, ist er nicht mehr zu\nstoppen."
          violet: "Es liebt das Singen, ist aber noch nicht sehr gut\ndarin. Lobt man es regelmäßig, verbessern sich\nseine Gesangskünste jedoch nach und nach."
        es:
          scarlet: "Su cuerpo suave y elástico desprende un aroma\nligeramente dulce. Cuando empieza a botar,\nno puede parar."
          violet: "Le apasiona cantar, pero no se le da muy bien.\nCuantos más elogios reciba, más mejorarán sus\ndotes de cantante."
        ko:
          scarlet: "은은하게 달콤한 향기가 나며\n잘 튕기는 부드러운 몸은\n한번 튀기 시작하면 멈추지 않는다."
          violet: "노래 부르기를 좋아하지만\n아직 서툴다. 제대로 칭찬해 주면\n조금씩 잘하게 된다."
        zh_simp:
          scarlet: "散发着微微的甘甜香气，\n弹性十足的柔软身体\n一旦开始弹跳就停不下来。"
          violet: "喜欢唱歌，但还不怎么在行。\n如果能给予恰当的表扬，\n就会渐渐有所提高哦。"
        zh_trad:
          scarlet: "散發著微微的甜甜香氣，\n富有彈性的柔軟身軀一旦\n開始彈跳，就完全停不下來。"
          violet: "很喜歡唱歌，但唱得不怎麼樣。\n如果好好地稱讚牠，\n就會越唱越好哦。"
