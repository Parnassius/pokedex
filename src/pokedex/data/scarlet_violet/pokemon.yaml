      descriptions:
        jp_kana:
          scarlet: "￹昔￺むかし￻は　￹過酷￺かこく￻な　￹環境￺かんきょう￻で\n￹暮￺く￻らしていたため　￹今￺いま￻よりも\nサイコパワーが　￹強￺つよ￻かったらしい。"
          violet: "￹外敵￺がいてき￻の　￹多￺おお￻かった　￹昔￺むかし￻は\nもっと　￹強￺つよ￻く　￹自分￺じぶん￻の　￹力￺ちから￻で\n￹進化￺しんか￻もしていたと　￹言￺い￻われる。"
        jp_kanji:
          scarlet: "￹昔￺むかし￻は　￹過酷￺かこく￻な　￹環境￺かんきょう￻で\n￹暮￺く￻らしていたため　￹今￺いま￻よりも\nサイコパワーが　￹強￺つよ￻かったらしい。"
          violet: "￹外敵￺がいてき￻の　￹多￺おお￻かった　￹昔￺むかし￻は\nもっと　￹強￺つよ￻く　￹自分￺じぶん￻の　￹力￺ちから￻で\n￹進化￺しんか￻もしていたと　￹言￺い￻われる。"
        en:
          scarlet: "This Pokémon apparently used to live in much\nharsher environments, and thus it once had\nstronger psychic powers than it does now."
          violet: "It’s said that this Pokémon used to be stronger\nlong ago when it had many enemies, and that it\nwas even able to evolve under its own power."
        fr:
          scarlet: "Il paraît qu’autrefois, il était doté de plus\ngrands pouvoirs psychiques, car il vivait\ndans un environnement hostile."
          violet: "On dit qu’il était autrefois plus puissant\net même capable d’évoluer, car il avait\ndavantage de rivaux."
        it:
          scarlet: "Pare che in passato vivesse in ambienti\nestremamente inospitali, e per questo avesse\npoteri psichici ancora più potenti di adesso."
          violet: "In passato aveva molti nemici. Si dice che per\nquesto fosse più forte e addirittura capace\ndi evolversi con le proprie forze."
        de:
          scarlet: "Da dieses Pokémon einst in einer unwirtlichen\nUmgebung lebte, verfügte es damals offenbar\nüber stärkere Psycho-Kräfte als heutzutage."
          violet: "Vor langer Zeit, als es zahlreiche natürliche\nFeinde hatte, soll es stärker gewesen sein und\nsich aus eigener Kraft entwickelt haben."
        es:
          scarlet: "Antaño habitaba en entornos inhóspitos, por\nlo que sus poderes psíquicos eran supuestamente\nmás potentes aún que en la actualidad."
          violet: "Se dice que antaño había alcanzado un estadio\nevolutivo superior como respuesta a la profusión\nde enemigos."
        ko:
          scarlet: "옛날에는 가혹한 환경에서 살았기 때문에\n오늘날보다도 사이코 파워가\n강력했다고 전해진다."
          violet: "외부의 적이 많았던 옛날에는\n훨씬 강하고 스스로의 힘으로\n진화도 했던 것으로 전해진다."
        zh_simp:
          scarlet: "过去生活在严苛的环境下，\n因此当时的精神力量\n似乎比现在还要强。"
          violet: "据说在过去外敌众多的\n时候实力更强，甚至还\n靠着自己的力量进化过。"
        zh_trad:
          scarlet: "過去生活在嚴苛的環境下，\n因此當時的精神力量\n似乎比現在還要強。"
          violet: "據說過去外敵眾多，實力\n比現在來得強，甚至還\n靠著自己的力量進化過。"
