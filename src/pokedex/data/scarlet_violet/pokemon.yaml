          scarlet: "￹粘液￺ねんえき￻まみれの　￹長￺なが￻い　￹舌￺した￻を\n￹目￺め￻にも　￹留￺と￻まらない　￹速￺はや￻さで　￹伸￺の￻ばし\n￹獲物￺えもの￻を　￹見事￺みごと￻に　￹仕留￺しと￻めてみせる。"
          violet: "￹面倒￺めんどう￻くさがりな　￹性格￺せいかく￻だが\n￹知能￺ちのう￻は　￹高￺たか￻く　￹罠￺わな￻を　￹仕掛￺しか￻けて\n￹自分￺じぶん￻の　￹棲￺す￻み￹処￺か￻を　￹守￺まも￻っている。"
        jp_kanji:
          scarlet: "￹粘液￺ねんえき￻まみれの　￹長￺なが￻い　￹舌￺した￻を\n￹目￺め￻にも　￹留￺と￻まらない　￹速￺はや￻さで　￹伸￺の￻ばし\n￹獲物￺えもの￻を　￹見事￺みごと￻に　￹仕留￺しと￻めてみせる。"
          violet: "￹面倒￺めんどう￻くさがりな　￹性格￺せいかく￻だが\n￹知能￺ちのう￻は　￹高￺たか￻く　￹罠￺わな￻を　￹仕掛￺しか￻けて\n￹自分￺じぶん￻の　￹棲￺す￻み￹処￺か￻を　￹守￺まも￻っている。"
        en:
          scarlet: "It extends its long, slimy tongue at blinding\nspeeds and finishes off its prey with great skill."
          violet: "Highly intelligent but also very lazy, it defends its\nhome by laying traps."
        fr:
          scarlet: "Il abat habilement ses proies en déployant\nen un éclair sa longue langue recouverte\nde mucus."
          violet: "Paresseux mais intelligent, ce Pokémon pose\ndes pièges pour protéger son territoire."
        it:
          scarlet: "Estende istantaneamente la lunga lingua\nricoperta di muco e finisce la preda\ncon mirabile maestria."
          violet: "Naturalmente svogliato ma di grande\nintelligenza, protegge la tana piazzando\ndelle trappole."
        de:
          scarlet: "Seine lange Zunge ist von Schleim überzogen.\nEs kann sie blitzschnell ausstrecken, um seiner\nBeute geschickt den Garaus zu machen."
          violet: "Es ist hochintelligent, aber zugleich lustlos und\nfaul. Daher verteidigt es sein Revier, indem es\nFallen aufstellt."
        es:
          scarlet: "Extiende su larga lengua recubierta de una\nsustancia viscosa a una velocidad imperceptible\npara abatir a sus presas hábilmente."
          violet: "Pese a su falta de interés en general, es muy\ninteligente y protege su hogar colocando\ntrampas."
        ko:
          scarlet: "점액으로 가득한 긴 혀를\n눈에 보이지 않는 속도로 뻗어서\n먹잇감을 멋지게 잡아낸다."
          violet: "만사를 귀찮아하는 성격이지만\n지능이 높아 함정을 설치해서\n자신의 거처를 지킨다."
        zh_simp:
          scarlet: "会用迅雷不及掩耳的速度\n伸出布满粘液的长舌头，\n漂亮地给予猎物致命一击。"
          violet: "虽然性格上很怕麻烦，\n但智商很高，会设置\n陷阱来保护自己的住所。"
        zh_trad:
          scarlet: "會用迅雷不及掩耳的速度\n伸出滿是黏液的長舌頭，\n漂亮地給予獵物致命一擊。"
          violet: "雖然個性上很怕麻煩，\n但智商非常高，會設置\n陷阱來保護自己的住處。"
