        jp_kanji:
          scarlet: "￹甘￺あま￻い　￹香￺かお￻りで　バルビートを　￹誘導￺ゆうどう￻して\n２００　￹以上￺いじょう￻の　￹模様￺もよう￻を\n￹夜空￺よぞら￻に　￹描￺えが￻く。"
          violet: "バルビートを　￹誘導￺ゆうどう￻して　￹夜空￺よぞら￻に\nサインを　￹描￺えが￻く。　サインの　￹意味￺いみ￻を\n￹研究￺けんきゅう￻する　￹学者￺がくしゃ￻も　いる。"
        en:
          scarlet: "Illumise uses its sweet scent to guide Volbeat,\nhaving them form over 200 patterns in the\nnight sky."
          violet: "It guides Volbeat to draw signs in the night sky.\nThere are scholars who research the meaning\nof these signs."
        fr:
          scarlet: "Son doux parfum lui permet de guider\nles Muciole afin de dessiner plus\nde 200 motifs dans le ciel nocturne."
          violet: "La nuit, il guide des Muciole pour dessiner\ndes symboles dans le ciel. Des scientifiques\nen étudient les significations."
        it:
          scarlet: "Con il suo dolce aroma dirige il volo dei Volbeat,\nche così disegnano più di 200 figure luminose\nnel cielo stellato."
          violet: "Dirige i Volbeat, disegnando con loro figure\nnel cielo. Questi disegni sono oggetto di studio\ndi scienziati che vogliono scoprirne il significato."
        de:
          scarlet: "Da Volbeat seinem süßen Duft folgen, bringt\nIllumise sie dazu, über 200 verschiedene\nLichtmuster an den Nachthimmel zu malen."
          violet: "Es veranlasst Volbeat dazu, Zeichen in den\nNachthimmel zu malen. Manche Forscher\nuntersuchen die Bedeutung dieser Muster."
        es:
          scarlet: "Con su dulce aroma guía a los Volbeat para\ntrazar con ellos más de 200 dibujos distintos\nen el cielo nocturno."
          violet: "De noche, guía a los Volbeat para dibujar señales\nen el cielo, cuyo significado es objeto de estudio\npor parte de algunos investigadores."
        ko:
          scarlet: "달콤한 향기로 볼비트를\n유도해서 200개 이상의\n모양을 밤하늘에 그린다."
          violet: "볼비트를 유도해서\n밤하늘에 사인을 그린다.\n사인의 뜻을 연구하는 학자도 있다."
        zh_simp:
          scarlet: "会利用甜甜的香气诱导电萤虫\n在夜空中描绘２００种以上的图形。"
          violet: "会诱导电萤虫在夜空中\n描绘记号。也有学者\n在研究记号的含意。"
        zh_trad:
          scarlet: "會利用香甜氣味誘導\n電螢蟲在夜空中描繪出\n２００種以上的圖形。"
          violet: "會誘導電螢蟲在夜空中\n描繪記號。也有些學者\n在研究記號的含意。"
