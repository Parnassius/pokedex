      descriptions:
        jp_kana:
          scarlet: "￹大￺おお￻きな　キバを　￹剥￺む￻いて　さかんに\n￹吠￺ほ￻えたてて　￹相手￺あいて￻を　￹威嚇￺いかく￻するのは\n￹臆病￺おくびょう￻な　￹性格￺せいかく￻の　￹表￺あらわ￻れ。"
          violet: "￹群￺む￻れで　￹獲物￺えもの￻を　￹追￺お￻いかけまわす。\n￹疲￺つか￻れきったところを　￹仕留￺しと￻めるが\nたまに　￹反撃￺はんげき￻されて　￹逃￺に￻げだす。"
        jp_kanji:
          scarlet: "￹大￺おお￻きな　キバを　￹剥￺む￻いて　さかんに\n￹吠￺ほ￻えたてて　￹相手￺あいて￻を　￹威嚇￺いかく￻するのは\n￹臆病￺おくびょう￻な　￹性格￺せいかく￻の　￹表￺あらわ￻れ。"
          violet: "￹群￺む￻れで　￹獲物￺えもの￻を　￹追￺お￻いかけまわす。\n￹疲￺つか￻れきったところを　￹仕留￺しと￻めるが\nたまに　￹反撃￺はんげき￻されて　￹逃￺に￻げだす。"
        en:
          scarlet: "It bares its large fangs and barks vigorously to\ntry to intimidate opponents, but this is actually\na manifestation of its cowardly nature."
          violet: "Poochyena pursue their prey in packs. Once the\nprey is exhausted, the pack finishes it off. But\nsometimes the prey retaliates, and the pack flees."
        fr:
          scarlet: "Il intimide ses adversaires en montrant ses longs\ncrocs et en aboyant frénétiquement, mais ce\nn’est que l’expression de sa nature craintive."
          violet: "Ils chassent leurs proies en meute et les achèvent\nquand elles sont à bout de force. Dans les rares\ncas où elles ripostent, ils préfèrent fuir."
        it:
          scarlet: "I tentativi di intimidire l’avversario mostrando\nle grandi zanne e abbaiando vigorosamente\nsono un segno della sua indole pavida."
          violet: "Inseguono la preda in branco e la finiscono\nquando è esausta, ma se capita che questa\ncontrattacchi scappano."
        de:
          scarlet: "Es fletscht seine großen Zähne und bellt heftig,\num Gegner einzuschüchtern. In Wirklichkeit\ndeutet dies aber auf sein ängstliches Wesen hin."
          violet: "Es jagt Beute im Rudel nach. Ist diese erschöpft,\nbringt es sie zur Strecke. Stößt Fiffyen jedoch auf\nWiderstand, ergreift es auch mal die Flucht."
        es:
          scarlet: "Enseña sus enormes colmillos y ladra con fuerza\npara intimidar a sus rivales, lo cual no es más\nque una manera de esconder su cobardía."
          violet: "Persiguen a su presa en jaurías. Esperan a que se\nagote para darle el golpe de gracia, pero, si esta\ncontraataca, salen corriendo."
        ko:
          scarlet: "큰 이빨을 드러낸 채 맹렬히 짖어 대며\n상대를 위협하는 것은\n사실 겁이 많기 때문이다."
          violet: "무리 지어 먹잇감을 추격한다.\n지치게 만든 뒤 마무리하지만\n가끔씩 반격당해서 도망칠 때도 있다."
        zh_simp:
          scarlet: "露出大大的獠牙\n猛吠威吓对手的行为\n是它性格胆小的表现。"
          violet: "会成群地追捕猎物，\n趁目标筋疲力尽时干掉对方，\n但有时会因遭到反击而逃跑。"
        zh_trad:
          scarlet: "會露出大大的獠牙\n不停猛叫來威嚇對手，\n這是牠膽小性格的表現。"
          violet: "會成群追擊獵物，並在其\n筋疲力盡時給予致命一擊，\n但有時會因遭到反擊而逃走。"
