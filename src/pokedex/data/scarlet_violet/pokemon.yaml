        jp_kana:
          scarlet: "￹体内￺たいない￻の　￹時間￺じかん￻の　￹間隔￺かんかく￻は\nどんなときでも　￹正確￺せいかく￻で\n￹決￺き￻まった　リズムで　￹首￺くび￻をかしげる。"
          violet: "￹正確￺せいかく￻に　￹時￺とき￻を　￹告￺つ￻げることから\n￹世界￺せかい￻の　ことわりを　わきまえた\n￹知恵￺ちえ￻の￹神様￺かみさま￻　とする　￹国￺くに￻もある。"
        jp_kanji:
          scarlet: "￹体内￺たいない￻の　￹時間￺じかん￻の　￹間隔￺かんかく￻は\nどんなときでも　￹正確￺せいかく￻で\n￹決￺き￻まった　リズムで　￹首￺くび￻をかしげる。"
          violet: "￹正確￺せいかく￻に　￹時￺とき￻を　￹告￺つ￻げることから\n￹世界￺せかい￻の　ことわりを　わきまえた\n￹知恵￺ちえ￻の￹神様￺かみさま￻　とする　￹国￺くに￻もある。"
        en:
          scarlet: "Hoothoot’s internal clock is precise at all times.\nIt tilts its head in a fixed rhythm."
          violet: "Since it tells time precisely, some countries\nconsider it to be a deity of wisdom, versed in\nthe ways of the world."
        fr:
          scarlet: "Ce Pokémon ressent avec précision le temps\nqui passe, ce qui permet à sa tête d’osciller\ndans un rythme parfait en toutes circonstances."
          violet: "Il donne l’heure avec exactitude. Certains\npeuples voient donc en lui une divinité de la\nsagesse, versée dans les lois immuables du monde."
        it:
          scarlet: "Ha un orologio interno precisissimo. Scandisce\nil tempo piegando la testa a intervalli regolari."
          violet: "Segna il tempo con precisione, perciò in alcuni\npaesi è considerato una divinità della saggezza,\nesperta del mondo."
        de:
          scarlet: "Dank seiner stets präzisen inneren Uhr neigt es\nden Kopf in einem gleichbleibenden Rhythmus."
          violet: "Da es die Uhrzeit präzise ansagt, gilt es in\nmanchen Ländern als Gottheit der Weisheit,\ndie mit den Regeln der Welt vertraut ist."
        es:
          scarlet: "Mece la cabeza a un ritmo constante gracias\na su reloj interno, el cual no pierde su\nextraordinaria precisión en ningún momento."
          violet: "Su gran exactitud al dar la hora ha hecho que\nen algunas zonas lo consideren una deidad de la\nsabiduría con un vasto conocimiento del mundo."
        ko:
          scarlet: "체내의 시간 감각은\n어느 때든 정확해서\n규칙적인 리듬으로 목을 기울인다."
          violet: "정확하게 시간을 알리기 때문에\n세상의 이치를 깨우친\n지혜의 신으로 섬기는 나라도 있다."
        zh_simp:
          scarlet: "不管在什么时候，\n体内的生物钟都准确无比，\n会用固定的节奏倾斜头部。"
          violet: "因为它能够准确报时，\n所以在某些国家它被当成\n通晓世界真理的智慧之神。"
        zh_trad:
          scarlet: "不管什麼時候，\n體內的生理時鐘都精準無比，\n會以固定的間隔傾斜頭部。"
          violet: "由於能準確地報時，\n因此在某些國家被視為是\n明白世間一切事理的智慧之神。"
