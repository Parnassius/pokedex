      descriptions:
        jp_kana:
          scarlet: "￹古￺ふる￻い　￹探検記￺たんけんき￻に　￹記録￺きろく￻された\nテツノオロチという　￹謎￺なぞ￻の　￹物体￺ぶったい￻と\n￹特徴￺とくちょう￻が　￹一致￺いっち￻。"
          violet: "ミライドンという　￹名前￺なまえ￻は\n￹発見者￺はっけんしゃ￻の　￹博士￺はかせ￻が　￹名￺な￻づけた。\n￹生態￺せいたい￻などは　わかっていない。"
        jp_kanji:
          scarlet: "￹古￺ふる￻い　￹探検記￺たんけんき￻に　￹記録￺きろく￻された\nテツノオロチという　￹謎￺なぞ￻の　￹物体￺ぶったい￻と\n￹特徴￺とくちょう￻が　￹一致￺いっち￻。"
          violet: "ミライドンという　￹名前￺なまえ￻は\n￹発見者￺はっけんしゃ￻の　￹博士￺はかせ￻が　￹名￺な￻づけた。\n￹生態￺せいたい￻などは　わかっていない。"
        en:
          scarlet: "Its characteristics match those of a mysterious\nobject recorded in an old expedition journal as\nthe Iron Serpent."
          violet: "It was given the name Miraidon by the professor\nwho discovered it. Its ecology and other details\nare unknown."
        fr:
          scarlet: "Ses caractéristiques correspondent à celles de\nl’entité mystérieuse évoquée dans un vieux récit\nd’exploration sous le nom de « Serpent-de-Fer »."
          violet: "Le Professeur qui l’a découvert l’a baptisé\nMiraidon. On ignore tout de son mode de vie."
        it:
          scarlet: "Le sue caratteristiche corrispondono a quelle\ndi un oggetto misterioso chiamato Serpeferrea,\nmenzionato in un vecchio diario di viaggio."
          violet: "È stato il Professore che l’ha scoperto a dargli\nil nome Miraidon. Non si conoscono il suo\nhabitat o altre sue caratteristiche."
        de:
          scarlet: "Es weist ähnliche Merkmale wie ein rätselhaftes\nObjekt namens Eisenschlange auf, das in einem\nalten Expeditionsbericht Erwähnung findet."
          violet: "Der Name Miraidon stammt von dem Professor,\nder es entdeckte. Über die Lebensweise dieses\nPokémon ist nichts bekannt."
        es:
          scarlet: "Comparte rasgos con un misterioso objeto\ndescrito en un viejo diario de exploración\ny que era conocido como Ferromandra."
          violet: "El profesor que lo descubrió lo nombró\nMiraidon. Se desconoce todo lo relativo a su\nbiología y otras características."
        ko:
          scarlet: "오래된 탐험기에 기록된\n“무쇠이무기”라 불리는\n정체불명의 존재와 특징이 일치한다."
          violet: "미라이돈이라는 이름은\n발견자인 박사에 의해 붙여졌다.\n생태 등은 밝혀진 것이 없다."
        zh_simp:
          scarlet: "古老的探险记中记载的\n一种叫做铁大蛇的\n神秘物体与它的特征一致。"
          violet: "密勒顿这个名字是\n由发现它的博士命名而来。\n生态等详情尚且不明。"
        zh_trad:
          scarlet: "古老的探險記裡記載的\n一種叫做鐵大蛇的\n神秘物體與牠的特徵一致。"
          violet: "密勒頓這個名字是\n發現牠的博士所命名的。\n生態等詳情仍然不明。"
