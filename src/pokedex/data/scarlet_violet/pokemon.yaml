        jp_kanji:
          scarlet: "￹光￺ひかり￻の　￹届￺とど￻かない　￹海底￺かいてい￻に\n￹暮￺く￻らす。　￹触手￺しょくしゅ￻を　￹光￺ひか￻らせ\n￹仲間￺なかま￻と　コミュニケーション。"
          violet: "２つの　￹触手￺しょくしゅ￻の　￹先￺さき￻から\nプラスと　マイナスの　￹電気￺でんき￻を　￹流￺なが￻して\n￹相手￺あいて￻を　しびれさせる。"
        en:
          scarlet: "It lives in ocean depths beyond the reach\nof sunlight. It flashes lights on its antennae\nto communicate with others of its kind."
          violet: "It shoots positively and negatively charged\nelectricity from the tips of its two antennae\nand stuns its opponents."
        fr:
          scarlet: "Ce Pokémon vit dans les profondeurs marines\nque le soleil n’atteint pas. Il communique avec ses\ncongénères à l’aide de ses antennes lumineuses."
          violet: "L’extrémité de ses deux antennes envoie\ndes décharges électriques positives et\nnégatives qui étourdissent les adversaires."
        it:
          scarlet: "Vive nelle profondità marine al riparo dalla\nluce del sole. Comunica con i propri simili\nemettendo luce dalle antenne."
          violet: "Tra le punte delle due antenne scorre\nelettricità positiva e negativa, di cui si serve\nper colpire i nemici."
        de:
          scarlet: "Es lebt in den Tiefen des Meeres, zu denen kein\nLicht durchdringt. Es kommuniziert mit anderen\nLampi, indem es seine Antennen aufblitzen lässt."
          violet: "Über die Enden seiner Antennen setzt es\npositive und negative elektrische Ladung\nfrei, um seine Gegner zu betäuben."
        es:
          scarlet: "Vive en lo más profundo del océano, donde\nya no alcanza la luz. Se comunica con los de\nsu especie emitiendo luces con las antenas."
          violet: "Libera cargas eléctricas positivas y\nnegativas con la punta de las antenas\npara aturdir a sus enemigos."
        ko:
          scarlet: "빛이 닿지 않는 해저에 산다.\n촉수를 빛내 동료들과\n커뮤니케이션을 한다."
          violet: "2개의 촉수 끝에서\n플러스와 마이너스의 전기를\n흘려보내 상대를 마비시킨다."
        zh_simp:
          scarlet: "在光线都无法到达的海底生活。\n让触手发光来与伙伴们交流。"
          violet: "会从２根触手的前端\n释放正负电来电麻对手。"
        zh_trad:
          scarlet: "在光線無法觸及的海底生活。\n讓觸手發光來與夥伴們交流。"
          violet: "會從２根觸手的前端\n釋放正負電流來麻痺對手。"
