        jp_kana:
          scarlet: "￹普段￺ふだん￻は　￹墓場￺はかば￻で　￹眠￺ねむ￻っている。\n￹数￺かず￻いる　￹犬￺いぬ￻ポケモンの￹中￺なか￻でも\nもっとも　￹主￺あるじ￻に　￹忠実￺ちゅうじつ￻だ。"
          violet: "￹大切￺たいせつ￻に　￹弔￺とむら￻われた　ポケモンが\n￹生￺う￻まれ￹変￺か￻わった　￹姿￺すがた￻。\n￹頭￺あたま￻の　￹突起￺とっき￻を　￹触￺さわ￻られるのは　￹嫌￺きら￻い。"
        jp_kanji:
          scarlet: "￹普段￺ふだん￻は　￹墓場￺はかば￻で　￹眠￺ねむ￻っている。\n￹数￺かず￻いる　￹犬￺いぬ￻ポケモンの￹中￺なか￻でも\nもっとも　￹主￺あるじ￻に　￹忠実￺ちゅうじつ￻だ。"
          violet: "￹大切￺たいせつ￻に　￹弔￺とむら￻われた　ポケモンが\n￹生￺う￻まれ￹変￺か￻わった　￹姿￺すがた￻。\n￹頭￺あたま￻の　￹突起￺とっき￻を　￹触￺さわ￻られるのは　￹嫌￺きら￻い。"
        en:
          scarlet: "Houndstone spends most of its time sleeping\nin graveyards. Among all the dog Pokémon,\nthis one is most loyal to its master."
          violet: "A lovingly mourned Pokémon was reborn as\nHoundstone. It doesn’t like anyone touching\nthe protuberance atop its head."
        fr:
          scarlet: "Il passe la majeure partie de son temps à dormir\ndans des cimetières. C’est le Pokémon chien\nle plus loyal au monde."
          violet: "Il est la réincarnation d’un Pokémon\nregretté et il n’aime pas que l’on touche\nla protubérance sur sa tête."
        it:
          scarlet: "Di solito dorme nei cimiteri. Tra i tanti\nPokémon canidi, è quello più fedele\na chi lo alleva."
          violet: "È la reincarnazione di un Pokémon molto amato\nin vita e altrettanto compianto. Detesta che gli\nsi tocchi la protuberanza che ha sulla testa."
        de:
          scarlet: "Man findet es meist schlafend auf Friedhöfen.\nFriedwuff ist das loyalste aller Hunde-Pokémon."
          violet: "Friedwuff ist die Reinkarnation eines liebevoll\nbetrauerten Pokémon. Es wird nur ungern am\nFortsatz auf seinem Kopf berührt."
        es:
          scarlet: "Pasa la mayor parte del tiempo durmiendo en\ncementerios. De todos los Pokémon perro, es el\nque profesa una mayor lealtad por su Entrenador."
          violet: "La reencarnación de un Pokémon muy\nquerido y llorado. Odia que le toquen\nla protuberancia de la cabeza."
        ko:
          scarlet: "평소에는 묘지에서 자고 있다.\n수많은 개포켓몬 중에서도\n가장 주인에게 충직하다."
          violet: "정성스럽게 추모를 받은\n포켓몬이 환생한 모습.\n머리의 돌기를 만지는 것을 싫어한다."
        zh_simp:
          scarlet: "平时都在墓地里睡觉。\n在为数众多的犬宝可梦中，\n它是对主人最为忠诚的。"
          violet: "被深深悼念的宝可梦\n转生而成的样子。\n不喜欢被摸到头上的突起物。"
        zh_trad:
          scarlet: "平時都在墳場裡睡覺。\n在為數眾多的犬寶可夢中，\n牠是對主人最為忠實的。"
          violet: "受到深摯悼念的寶可夢\n轉生而成的樣子。\n不喜歡被摸到頭上的突起物。"
