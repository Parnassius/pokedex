          violet: "￹群￺む￻れで　￹暮￺く￻らす　トリデプスたちは\n￹敵￺てき￻に　￹襲￺おそ￻われると　￹横￺よこ￻に　￹並￺なら￻び\n￹硬￺かた￻い　￹顔￺かお￻で　￹攻撃￺こうげき￻を　￹防￺ふせ￻ぐ。"
        jp_kanji:
          scarlet: "￹正面￺しょうめん￻からであれば　あらゆる\n￹攻撃￺こうげき￻を　ガードできるが\n￹後￺うし￻ろを　￹取￺と￻られると　なす￹術￺すべ￻なし。"
          violet: "￹群￺む￻れで　￹暮￺く￻らす　トリデプスたちは\n￹敵￺てき￻に　￹襲￺おそ￻われると　￹横￺よこ￻に　￹並￺なら￻び\n￹硬￺かた￻い　￹顔￺かお￻で　￹攻撃￺こうげき￻を　￹防￺ふせ￻ぐ。"
        en:
          scarlet: "While it can guard against any sort of\nattack from the front, it is left without\nrecourse when attacked from behind."
          violet: "Bastiodon live in herds. When assaulted by\nenemies, they line up side by side and use\ntheir hard faces to block attacks."
        fr:
          scarlet: "Il peut parer quasiment toutes les attaques\nde face, mais il est extrêmement vulnérable\naux attaques par-derrière."
          violet: "Les Bastiodon vivent en troupeaux. En\ncas d’attaque, ils se mettent côte à côte et\nse protègent à l’aide de leurs têtes robustes."
        it:
          scarlet: "Può bloccare qualsiasi attacco frontale,\nma se preso alle spalle è del tutto indifeso."
          violet: "Vivono in branco. Quando vengono aggrediti\ndai nemici si schierano uno di fianco all’altro,\nrespingendo gli attacchi con i loro musi duri."
        de:
          scarlet: "Alle möglichen Angriffe von vorn kann es\nabwehren, aber von hinten ist es schutzlos."
          violet: "Wird ihre Herde attackiert, stellen sich Bollterus\nSeite an Seite auf, um mit ihren harten Gesichtern\ndie Angriffe des Feindes abzuwehren."
        es:
          scarlet: "Es capaz de repeler cualquier ataque\nfrontal, pero se encuentra totalmente a\nmerced de los ataques por la retaguardia."
          violet: "Viven en manada. Cuando los agrede un\nenemigo, forman una línea defensiva y previenen\nulteriores ataques con sus duros rostros."
        ko:
          scarlet: "정면에서라면 어떤 공격이든\n가드할 수 있지만\n뒤에서 습격당하면 방법이 없다."
          violet: "무리를 이루어 생활하는 바리톱스는\n적에게 습격당하면 옆으로 늘어서서\n딱딱한 얼굴로 공격을 막는다."
        zh_simp:
          scarlet: "如果是从正面的话，\n可以防住所有的攻击，\n但从后方被袭的话就束手无策了。"
          violet: "群居的护城龙们在遭到\n敌人袭击时，会排成横排，\n用坚硬的脸来抵挡攻击。"
        zh_trad:
          scarlet: "如果是從正面的話，\n可以防住所有的攻擊，\n但從後方遇襲的話就束手無策了。"
          violet: "群居生活的護城龍們在遭受\n外敵襲擊時，會橫著排成一排，\n以堅硬的臉抵擋攻擊。"
