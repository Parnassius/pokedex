          violet: "￹食￺た￻べた　￹雪￺ゆき￻から　￹得￺え￻た　￹冷気￺れいき￻を\n￹体内￺たいない￻の　￹器官￺きかん￻で　￹増幅￺ぞうふく￻して\n￹氷柱￺つらら￻のような　トゲを　￹作￺つく￻る。"
        en:
          scarlet: "It eats snow that has accumulated on the ground.\nIt prefers soft, freshly fallen snow, so it will eat its\nway up a mountain, aiming for the peak."
          violet: "Within its internal organs, Snom amplifies the\nfrigid air it gets from eating snow and then uses\nthis amplified air to create icicle-like spikes."
        fr:
          scarlet: "Il se nourrit de la neige qui s’accumule au sol.\nIl la préfère fraîche et va jusqu’au sommet des\nmontagnes en mangeant la neige sur son chemin."
          violet: "Il amplifie l’air froid qu’il absorbe en mangeant\nde la neige, ce qui lui permet de créer ses pointes\nsemblables à des pics de glace."
        it:
          scarlet: "Si nutre della neve accumulata sul terreno.\nPredilige quella fresca e soffice, che mangia\nman mano che avanza verso la cima dei monti."
          violet: "Mangiando neve immagazzina aria gelida, poi ne\namplifica l’effetto tramite gli organi interni per\ncreare gli aculei di ghiaccio che ha sul dorso."
        de:
          scarlet: "Es ernährt sich von am Boden angesammeltem\nSchnee. Da es weichen Neuschnee bevorzugt,\nfrisst es sich bergauf bis zum Gipfel vor."
          violet: "Mit den inneren Organen verstärkt es die Kälte,\ndie es mit dem Schnee aufnimmt. Dadurch kann\nes Stacheln formen, die wie Eiszapfen aussehen."
        es:
          scarlet: "Se alimenta de la nieve acumulada en el terreno.\nComo adora la suave nieve virgen, irá comiendo\nmontaña arriba hasta llegar a la cima."
          violet: "Amplifica en sus órganos internos el frío que\nconsigue al comer nieve y lo usa para crear sus\npúas como carámbanos."
        ko:
          scarlet: "땅에 쌓인 눈이 먹이다.\n새로 내린 부드러운 눈을 좋아해서\n산꼭대기를 향해 먹으며 움직인다."
          violet: "먹은 눈을 통해 얻은 냉기를\n체내 기관에서 증폭시켜서\n고드름 같은 가시를 만든다."
        zh_simp:
          scarlet: "地面的积雪是它的食物。\n尤其喜爱刚下的松软白雪，\n会朝着山顶一路吃过去。"
          violet: "会吃掉雪来获得寒气，并利用\n体内的器官加强冰冷的程度，\n以此来制作如冰柱般的尖刺。"
        zh_trad:
          scarlet: "地面的積雪是牠的主食。\n對新下的鬆軟白雪情有獨鍾，\n會朝著山頂一路吃過去。"
          violet: "會吃掉雪來獲得寒氣，並利用\n體內的器官使其變得更加冰冷，\n好讓牠能做出如冰柱般的尖刺。"
