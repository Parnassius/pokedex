        jp_kanji:
          scarlet: "￹切￺き￻れ￹味￺あじ￻　￹鋭￺するど￻い　カマを　￹使￺つか￻って\n￹草￺くさ￻むらを　￹切￺き￻り￹進￺すす￻む。　あまりに\n￹速￺はや￻い　￹動￺うご￻きで　￹目￺め￻が　￹追￺お￻いつかない。"
          violet: "￹両手￺りょうて￻の　￹鋭￺するど￻い　カマは\n￹硬￺かた￻いものを　￹切￺き￻れば￹切￺き￻るほど\nさらに　￹切￺き￻れ￹味￺あじ￻を　￹増￺ま￻していく。"
        en:
          scarlet: "It slashes through grass with its sharp\nscythes, moving too fast for the human\neye to track."
          violet: "The sharp scythes on its forearms become\nincreasingly sharp by cutting through hard\nobjects."
        fr:
          scarlet: "Il fauche les herbes avec ses lames acérées.\nSes mouvements sont si rapides qu’ils sont\nimperceptibles à l’œil nu."
          violet: "À force de trancher des objets solides,\nses avant-bras en forme de faux deviennent\nde plus en plus acérés."
        it:
          scarlet: "Si fa strada tra l’erba grazie alle lame\naffilate, muovendosi troppo velocemente\nper l’occhio umano."
          violet: "Le falci sulle sue zampe anteriori diventano\nsempre più affilate man mano che\ntranciano oggetti duri."
        de:
          scarlet: "Es bahnt sich mit seinen scharfen Sicheln so\nschnell einen Weg durch das Gras, dass es dabei\nfür das menschliche Auge unsichtbar ist."
          violet: "Die scharfen Sicheln an den Unterarmen\nwerden durch das Schneiden harter\nObjekte noch schärfer."
        es:
          scarlet: "Avanza por la hierba con sus afiladas\nguadañas, más rápido de lo que el ojo\nhumano puede percibir."
          violet: "Las cortantes guadañas de sus antebrazos\nse vuelven más afiladas cada vez que\ncortan objetos duros."
        ko:
          scarlet: "아주 예리한 낫을 이용해\n풀숲을 베며 나아간다.\n매우 빠른 움직임에 눈이 따라가지 못한다."
          violet: "양손의 날카로운 낫은\n단단한 것을 자르면 자를수록\n더욱더 날카로워진다."
        zh_simp:
          scarlet: "会用锋利的镰刀割开草丛前进。\n因为动作实在太快，\n眼睛来不及看清。"
          violet: "双手的镰刀锋利无比，\n砍断越多坚硬的东西，\n锋利的程度就越能得到提升。"
        zh_trad:
          scarlet: "會用鋒利的鐮刀割開草叢前進。\n因為動作實在太快，\n甚至無法用肉眼看清。"
          violet: "雙手的鐮刀鋒利無比，\n砍斷越多堅硬的東西，\n其鋒利程度也會隨之提升。"
electabuzz:
  species_id: 125
  names:
    jp_kana: エレブー
