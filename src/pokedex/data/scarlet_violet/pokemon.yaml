          scarlet: "￹真綿￺まわた￻のような　￹翼￺つばさ￻の　￹手入￺てい￻れは\n￹絶対￺ぜったい￻に　￹欠￺か￻かさない。　￹汚￺よご￻れると\n￹水浴￺みずあ￻びをして　きれいに　￹洗￺あら￻う。"
          violet: "￹自分￺じぶん￻も　まわりも　きれいでないと\n￹落￺お￻ち￹着￺つ￻かない　￹性格￺せいかく￻。\n￹汚￺よご￻れを　￹見￺み￻つけると　￹羽￺はね￻で　ふき￹取￺と￻る。"
        jp_kanji:
          scarlet: "￹真綿￺まわた￻のような　￹翼￺つばさ￻の　￹手入￺てい￻れは\n￹絶対￺ぜったい￻に　￹欠￺か￻かさない。　￹汚￺よご￻れると\n￹水浴￺みずあ￻びをして　きれいに　￹洗￺あら￻う。"
          violet: "￹自分￺じぶん￻も　まわりも　きれいでないと\n￹落￺お￻ち￹着￺つ￻かない　￹性格￺せいかく￻。\n￹汚￺よご￻れを　￹見￺み￻つけると　￹羽￺はね￻で　ふき￹取￺と￻る。"
        en:
          scarlet: "It constantly grooms its cotton-like wings.\nIt takes a shower to clean itself if it becomes\ndirty."
          violet: "It can’t relax if it or its surroundings are not\nclean. It wipes off dirt with its wings."
        fr:
          scarlet: "Il toilette constamment ses ailes duveteuses.\nÀ la moindre salissure, il se dépêche de se laver\npour qu’elles restent aussi blanches que possible."
          violet: "Tylton repousse les saletés avec ses ailes. Il ne\nse sent à l’aise que lorsque l’endroit dans lequel\nil se trouve est aussi propre que lui."
        it:
          scarlet: "Non tralascia mai la cura delle sue ali simili\nal cotone. Appena si sporca, provvede subito\na lavarsi."
          violet: "Non riesce a star tranquillo se c’è sporcizia\nsu di sé o attorno a sé. Quando la trova,\nla spazza subito via con le ali."
        de:
          scarlet: "Ständig pflegt es seine watteartigen Flügel.\nFalls es schmutzig wird, badet es und putzt sich\nsauber."
          violet: "Es kann nicht entspannen, solange es selbst oder\nseine Umgebung dreckig sind. Wenn es Schmutz\nbemerkt, wischt es diesen mit seinen Flügeln weg."
        es:
          scarlet: "Está continuamente acicalándose las alas\nde algodón que tiene. Si se ensucia, se da\nun baño para limpiarse enseguida."
          violet: "Si su cuerpo o su entorno no están limpios,\nno puede relajarse. En cuanto ve algo de\nmugre, la limpia con las alas."
        ko:
          scarlet: "솜 같은 날개를 손질하는 일은\n절대 거르지 않는다.\n더러워지면 물로 깨끗하게 씻는다."
          violet: "자신도 주변도 깨끗하지 않으면\n진정되지 않는 성격이다.\n더러운 것을 발견하면 날개로 닦는다."
        zh_simp:
          scarlet: "绝不会忽视对丝绵一样的\n翅膀进行保养。如果脏了\n就会去水里冲洗干净。"
          violet: "如果自己和周围不干净，\n就无法静下心来的性格。\n见到脏东西就会用羽毛擦掉。"
        zh_trad:
          scarlet: "從不疏於打理絲綿般\n的翅膀。一弄髒就會\n到水裡洗乾淨。"
          violet: "如果自己和周圍不乾淨，\n就靜不下心來的性格。\n見到髒污會用羽毛擦掉。"
altaria:
