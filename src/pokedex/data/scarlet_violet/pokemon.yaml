      types:
        - normal
        - flying
      egg_groups:
        - flying
      abilities:
        - intimidate
        - hustle
      hidden_ability: sheer_force
      descriptions:
        jp_kana:
          scarlet: "￹気性￺きしょう￻が　￹荒￺あら￻く　￹戦￺たたか￻い￹方￺かた￻も　￹荒々￺あらあら￻しい。\n￹相手￺あいて￻の　￹懐￺ふところ￻に　￹飛￺と￻び￹込￺こ￻み\n￹肉弾戦￺にくだんせん￻を　￹仕掛￺しか￻ける。"
          violet: "￹黄色￺きいろ￻の　イキリンコは　とくに\n￹荒￺あら￻っぽい。　ほかの　￹鳥￺とり￻ポケモンを\n￹街￺まち￻から　￹追￺お￻い￹出￺だ￻したこともある。"
        jp_kanji:
          scarlet: "￹気性￺きしょう￻が　￹荒￺あら￻く　￹戦￺たたか￻い￹方￺かた￻も　￹荒々￺あらあら￻しい。\n￹相手￺あいて￻の　￹懐￺ふところ￻に　￹飛￺と￻び￹込￺こ￻み\n￹肉弾戦￺にくだんせん￻を　￹仕掛￺しか￻ける。"
          violet: "￹黄色￺きいろ￻の　イキリンコは　とくに\n￹荒￺あら￻っぽい。　ほかの　￹鳥￺とり￻ポケモンを\n￹街￺まち￻から　￹追￺お￻い￹出￺だ￻したこともある。"
        en:
          scarlet: "These Squawkabilly are hotheaded, and their\nfighting style is vicious. They’ll leap within reach\nof their foes to engage in close combat."
          violet: "The yellow Squawkabilly are especially fierce.\nThey’ve even been known to drive other bird\nPokémon out of town."
        fr:
          scarlet: "Son style de combat brutal reflète son agressivité.\nIl fonce droit sur son adversaire afin de se battre\nau corps à corps."
          violet: "Les Tapatoès de couleur jaune sont extrêmement\nagressifs. Ils vont même jusqu’à chasser les autres\nPokémon oiseaux des villes."
        it:
          scarlet: "Ha un carattere impetuoso che si riflette nella\nfuria con cui lotta. Si lancia sull’avversario\nper lottare corpo a corpo."
          violet: "Gli Squawkabilly gialli sono particolarmente\naggressivi. Capita anche che caccino via dalle\ncittà gli altri Pokémon alati."
        de:
          scarlet: "Sein Temperament ist so wild wie sein Kampfstil.\nEs springt in Reichweite seines Gegners, um ihn\nin einen Nahkampf zu verwickeln."
          violet: "Gelbe Krawalloro neigen besonders zu Grobheit.\nEs ist schon vorgekommen, dass sie andere\nVogel-Pokémon aus der Stadt vertrieben haben."
        es:
          scarlet: "Su carácter agresivo se ve reflejado en su estilo\nde combate. Se lanza en picado sobre sus rivales\npara enfrentarse cuerpo a cuerpo."
          violet: "Los de color amarillo son especialmente\nagresivos. En más de una ocasión han echado a\notros grupos de Pokémon pájaro de las ciudades."
        ko:
          scarlet: "성질이 사납고 싸우는 방식도 매우 거칠다.\n상대의 품으로 파고들어\n육탄전을 벌인다."
          violet: "노란 깃털의 시비꼬는\n특히 더 사나워서, 다른 새포켓몬들을\n마을에서 몰아낸 적도 있다."
        zh_simp:
          scarlet: "性情和战斗方式都很粗暴。\n会冲进对手的怀里，\n用自己的肉身发动攻击。"
          violet: "黄色的怒鹦哥最为粗暴。\n有时还会把其他\n鸟宝可梦赶出城镇。"
        zh_trad:
          scarlet: "性情和戰鬥方式都很粗暴。\n會衝進對手的懷裡，\n以自己的肉身發動攻擊。"
          violet: "黃色的怒鸚哥最為粗暴。\n有時還會把其他鳥寶可夢\n趕到城鎮外面去。"
    squawkabilly_white_plumage:
      form_id: 3
      names:
        jp_kana: ホワイトフェザー
        jp_kanji: ホワイトフェザー
        en: White Plumage
        fr: Plumage Blanc
        it: Piume Bianche
        de: Weißgefiedert
        es: Plumaje Blanco
        ko: 화이트 페더
        zh_simp: 白羽毛
        zh_trad: 白羽毛
      base_stats:
        hp: 82
        attack: 96
        defense: 51
        special_attack: 45
        special_defense: 51
        speed: 92
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - normal
        - flying
      egg_groups:
        - flying
      abilities:
        - intimidate
        - hustle
      hidden_ability: sheer_force
      descriptions:
        jp_kana:
          scarlet: "￹単独行動￺たんどくこうどう￻は　￹苦手￺にがて￻。\n￹連帯感￺れんたいかん￻が　￹強￺つよ￻く　￹仲間同士￺なかまどうし￻\n￹助￺たす￻け￹合￺あ￻いながら　￹生￺い￻き￹抜￺ぬ￻いている。"
          violet: "いちばん　￹数￺かず￻の　￹少￺すく￻ない　￹色￺いろ￻だが\n￹建物￺たてもの￻の　￹色￺いろ￻に　￹紛￺まぎ￻れるため\n￹街中￺まちなか￻では　￹暮￺く￻らしやすいのだ。"
        jp_kanji:
          scarlet: "￹単独行動￺たんどくこうどう￻は　￹苦手￺にがて￻。\n￹連帯感￺れんたいかん￻が　￹強￺つよ￻く　￹仲間同士￺なかまどうし￻\n￹助￺たす￻け￹合￺あ￻いながら　￹生￺い￻き￹抜￺ぬ￻いている。"
          violet: "いちばん　￹数￺かず￻の　￹少￺すく￻ない　￹色￺いろ￻だが\n￹建物￺たてもの￻の　￹色￺いろ￻に　￹紛￺まぎ￻れるため\n￹街中￺まちなか￻では　￹暮￺く￻らしやすいのだ。"
        en:
          scarlet: "This Pokémon dislikes being alone. It has a\nstrong sense of community and survives by\ncooperating with allies."
          violet: "Though these Squawkabilly are the fewest in\nnumber, they have no trouble living in towns\nsince they blend in with the white buildings."
        fr:
          scarlet: "Ces Pokémon n’aiment pas être seuls.\nIls possèdent un sens aigu de la solidarité\net survivent en s’entraidant."
          violet: "Les spécimens de cette couleur sont moins\nnombreux, mais comme ils se fondent dans le\ndécor urbain, ils peuvent facilement vivre en ville."
        it:
          scarlet: "Questi Pokémon non amano agire\nsingolarmente. Hanno un forte spirito\ndi solidarietà e vivono aiutandosi a vicenda."
          violet: "Gli esemplari di questo colore sono i meno\nnumerosi ma, confondendosi meglio con il colore\ndegli edifici, vivono agevolmente nelle città."
        de:
          scarlet: "Es agiert nicht gern im Alleingang, sondern hat\neinen starken Sinn für Solidarität und überlebt,\nindem es mit seinen Artgenossen kooperiert."
          violet: "Obwohl diese Krawalloro in der Minderheit sind,\nliegt ihnen das Stadtleben, da sie sich durch ihre\nFarbe kaum von den Gebäuden abheben."
        es:
          scarlet: "No se valen bien sin la ayuda de sus congéneres.\nPoseen un gran sentido de la solidaridad y\nsobreviven ayudándose los unos a los otros."
          violet: "Aunque los de este color sean la minoría, viven\nsin problemas en la civilización porque su color\nles permite camuflarse bien entre los edificios."
        ko:
          scarlet: "단독 행동은 서툴다.\n연대감이 강한 동료끼리\n서로 도우며 살아가고 있다."
          violet: "가장 수가 적은 색이지만\n건물 색에 섞여들 수 있기 때문에\n마을에서 살기 유리하다."
        zh_simp:
          scarlet: "不擅长单独行动。\n凝聚力很强，靠着与伙伴\n互相合作而生存了下来。"
          violet: "虽然这种颜色的数量最少，\n但由于能融入建筑物的颜色里，\n因此在城镇中生活起来很容易。"
        zh_trad:
          scarlet: "不擅長單獨行動。\n凝聚力很強，靠著與夥伴\n互助合作而生存了下來。"
          violet: "雖然這種顏色的數量最少，\n但因為能融入建築物的顏色裡，\n待在城鎮生活起來會容易許多。"
