      descriptions:
        jp_kana:
          scarlet: "￹呼吸￺こきゅう￻を　していないので\nどんなところでも　￹活躍￺かつやく￻できると\n￹期待￺きたい￻される　￹人工￺じんこう￻の　ポケモン。"
          violet: "￹最高￺さいこう￻の　￹科学力￺かがくりょく￻で\n￹生￺う￻み￹出￺だ￻された　￹人工￺じんこう￻の　ポケモン。\n￹電子空間￺でんしくうかん￻を　￹移動￺いどう￻できる。"
        jp_kanji:
          scarlet: "￹呼吸￺こきゅう￻を　していないので\nどんなところでも　￹活躍￺かつやく￻できると\n￹期待￺きたい￻される　￹人工￺じんこう￻の　ポケモン。"
          violet: "￹最高￺さいこう￻の　￹科学力￺かがくりょく￻で\n￹生￺う￻み￹出￺だ￻された　￹人工￺じんこう￻の　ポケモン。\n￹電子空間￺でんしくうかん￻を　￹移動￺いどう￻できる。"
        en:
          scarlet: "It is an artificial Pokémon. Since it doesn’t\nbreathe, people are excited by its potential\nto be useful in any environment."
          violet: "Porygon is an artificial Pokémon created using\nadvanced scientific means. It can move freely\nthrough cyberspace."
        fr:
          scarlet: "Ce Pokémon artificiel ne respire pas. De\ngrands espoirs reposent donc sur sa capacité\nà s’adapter à tous types d’environnements."
          violet: "Ce Pokémon artificiel a été conçu\ngrâce à des technologies de pointe.\nIl peut parcourir le cyberespace."
        it:
          scarlet: "Dato che questo Pokémon artificiale non ha\nbisogno di respirare, si pensa che sia capace\ndi operare in ogni tipo di ambiente."
          violet: "Un Pokémon creato dall’uomo con metodi\nscientifici avanzatissimi. Si muove liberamente\nnel ciberspazio."
        de:
          scarlet: "Dieses künstliche Pokémon atmet nicht.\nDaher zählt man darauf, dass es in jeder\nUmgebung eingesetzt werden kann."
          violet: "Dieses künstliche Pokémon wurde mithilfe\nneuester Technologien erschaffen. Es kann\ndurch den Cyberspace reisen."
        es:
          scarlet: "Un Pokémon artificial que no respira, por lo que\nse le supone la capacidad de desenvolverse sin\nproblemas en cualquier entorno."
          violet: "Un Pokémon artificial creado con la tecnología\nmás avanzada. Puede viajar por el ciberespacio."
        ko:
          scarlet: "호흡을 하지 않기 때문에\n어디서나 활약할 수 있을 것으로\n기대되는 인공의 포켓몬이다."
          violet: "최고의 과학 기술로\n만들어진 인공 포켓몬이다.\n전자 공간을 이동할 수 있다."
        zh_simp:
          scarlet: "因为不需要呼吸\n而被期待在任何地方都能\n大显身手的人工宝可梦。"
          violet: "利用最顶尖的科学力量\n创造出的人工宝可梦。\n能够在电子空间移动。"
        zh_trad:
          scarlet: "人工創造的寶可夢。\n沒有呼吸，因此被期待在\n任何地方都能大展身手。"
          violet: "以最尖端的科學力量\n創造出來的人工寶可夢。\n能在電子空間移動。"
