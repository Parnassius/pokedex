          scarlet: "￹体￺からだ￻の　￹岩石￺がんせき￻の　￹成分￺せいぶん￻は\n￹生息地￺せいそくち￻から　￹遠￺とお￻く　￹離￺はな￻れた\n￹土地￺とち￻の　￹岩盤￺がんばん￻と　￹一致￺いっち￻した。"
          violet: "￹陽￺ひ￻の　￹傾￺かたむ￻きを　￹眺￺なが￻めて　￹暮￺く￻らす。\n２００キロを　￹超￺こ￻える　￹岩￺いわ￻の　￹脚￺あし￻で\nゆうゆうと　￹草原￺そうげん￻を　￹闊歩￺かっぽ￻する。"
        jp_kanji:
          scarlet: "￹体￺からだ￻の　￹岩石￺がんせき￻の　￹成分￺せいぶん￻は\n￹生息地￺せいそくち￻から　￹遠￺とお￻く　￹離￺はな￻れた\n￹土地￺とち￻の　￹岩盤￺がんばん￻と　￹一致￺いっち￻した。"
          violet: "￹陽￺ひ￻の　￹傾￺かたむ￻きを　￹眺￺なが￻めて　￹暮￺く￻らす。\n２００キロを　￹超￺こ￻える　￹岩￺いわ￻の　￹脚￺あし￻で\nゆうゆうと　￹草原￺そうげん￻を　￹闊歩￺かっぽ￻する。"
        en:
          scarlet: "The elemental composition of the rocks that\nform its body were found to match the bedrock\nof a land far away from this Pokémon’s habitat."
          violet: "This Pokémon spends its life gazing at the setting\nsun. It strides leisurely across grassy plains on\nlegs of rock that weigh over 400 pounds each."
        fr:
          scarlet: "Les éléments rocheux qui constituent son corps\ncorrespondent à ceux qu’on trouve dans le sol\nd’une zone très éloignée de son habitat actuel."
          violet: "Il passe son temps à suivre le parcours du soleil\ndans le ciel et arpente tranquillement les plaines\navec ses jambes rocheuses de plus de 200 kg."
        it:
          scarlet: "La composizione delle pietre che formano\nil suo corpo coincide con quella di basamenti\nrocciosi molto distanti dal suo habitat."
          violet: "Trascorre le giornate osservando il passaggio\ndel sole. Con le gambe rocciose pesanti più\ndi 200 kg percorre calmo e maestoso le praterie."
        de:
          scarlet: "Sein Körper setzt sich aus Steinen zusammen,\ndie mit dem Grundgestein einer weit von seinem\nLebensraum entfernten Gegend identisch sind."
          violet: "Es verbringt sein Leben damit, Sonnenuntergänge\nzu beobachten und mit seinen 200 kg schweren\nBeinen aus Stein über Wiesen zu spazieren."
        es:
          scarlet: "Los elementos que componen las rocas de\nsu cuerpo se han encontrado en lechos de\nroca muy alejados de su hábitat."
          violet: "Pasa el día observando el recorrido del sol.\nSe pasea con tranquilidad por las praderas\ncon sus rocosas patas de más de 200 kg."
        ko:
          scarlet: "몸의 암석 성분이\n서식지에서 멀리 떨어진 땅의\n암반과 일치했다."
          violet: "해가 기우는 것을 바라보며 지낸다.\n200kg이 넘는 바위로 된 다리로\n초원을 유유히 활보한다."
        zh_simp:
          scarlet: "在距离它生息地很远的地方，\n有岩盘和它身体的\n岩石成分是一致的。"
          violet: "每天眺望着日升日落。\n会用超过２００公斤的双脚\n悠然自得地在草原上阔步。"
        zh_trad:
          scarlet: "在距離牠棲息地很遠\n的地方，有岩盤和牠\n身體的岩石成分一致。"
          violet: "每天眺望著日升日落。\n會用超過２００公斤的雙腳\n悠然自得地闊步在草原上。"
