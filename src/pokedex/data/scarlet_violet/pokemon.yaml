      descriptions:
        jp_kana:
          scarlet: "￹落￺お￻ちこんでいる　￹人￺ひと￻や　ポケモンの\n￹気持￺きも￻ちを　￹感￺かん￻じ￹取￺と￻っては　￹手作￺てづく￻りの\n￹花粉団子￺かふんだんご￻で　￹元気￺げんき￻づけたりする。"
          violet: "￹名人￺めいじん￻と　￹呼￺よ￻ばれる　アブリボンが\n￹作￺つく￻る　￹花粉団子￺かふんだんご￻は　￹疲￺つか￻れが\n￹取￺と￻れるので　￹人気￺にんき￻の　￹商品￺しょうひん￻だ。"
        jp_kanji:
          scarlet: "￹落￺お￻ちこんでいる　￹人￺ひと￻や　ポケモンの\n￹気持￺きも￻ちを　￹感￺かん￻じ￹取￺と￻っては　￹手作￺てづく￻りの\n￹花粉団子￺かふんだんご￻で　￹元気￺げんき￻づけたりする。"
          violet: "￹名人￺めいじん￻と　￹呼￺よ￻ばれる　アブリボンが\n￹作￺つく￻る　￹花粉団子￺かふんだんご￻は　￹疲￺つか￻れが\n￹取￺と￻れるので　￹人気￺にんき￻の　￹商品￺しょうひん￻だ。"
        en:
          scarlet: "Ribombee can sense when people or Pokémon\nare feeling down, and it will cheer them up with\nhandmade pollen puffs."
          violet: "Pollen puffs created by skilled Ribombee can\nrelieve fatigue, making the puffs a popular\ncommodity."
        fr:
          scarlet: "S’il perçoit les émotions d’un être humain ou d’un\nPokémon déprimé, il lui remonte le moral grâce\nà une boule de pollen qu’il a confectionnée."
          violet: "Certains Rubombelle excellent dans l’art de\nconfectionner des boules de pollen tonifiantes,\nqui sont très recherchées sur le marché."
        it:
          scarlet: "Quando sente che un Pokémon o un essere\numano è triste, lo rincuora con le sfere di polline\nche produce."
          violet: "Le sfere di polline create dai Ribombee esperti\nsono prodotti molto popolari perché efficaci\ncontro la stanchezza."
        de:
          scarlet: "Wenn es die Gefühle niedergeschlagener\nMenschen oder Pokémon wahrnimmt, heitert es\nsie mit selbstgemachten Pollenknödeln auf."
          violet: "Manche Bandelby sind wahre Meister im\nHerstellen von Pollenknödeln. Ihre Knödel\nlindern Müdigkeit und sind daher sehr beliebt."
        es:
          scarlet: "Si percibe un ser humano o Pokémon invadido\npor la desazón, le insufla ánimos con las bolas\nde polen que produce."
          violet: "Las bolas de polen producidas por los Ribombee\nmás expertos en este arte son muy populares por\nsu capacidad de aliviar el cansancio."
        ko:
          scarlet: "기운이 없는 사람이나 포켓몬의\n감정을 감지하면 직접 만든\n꽃가루경단으로 기운을 북돋워 준다."
          violet: "명인으로 불리는 에리본이 만든\n꽃가루경단은 피로가 싹 풀리는\n인기 상품이다."
        zh_simp:
          scarlet: "只要感受到人和宝可梦\n失落的情绪，便会送上\n自制的花粉团来为其打气。"
          violet: "被称为高手的蝶结萌虻\n所制作的花粉团能消除疲倦，\n因此是很受欢迎的商品。"
        zh_trad:
          scarlet: "只要感覺到人類或寶可夢\n沮喪的情緒，就會送上\n自製的花粉團來為其打氣。"
          violet: "有高手之稱的蝶結萌虻所\n製作的花粉團能消除疲勞，\n因此是很受歡迎的商品。"
