        jp_kana:
          scarlet: "４￹枚￺まい￻の　￹羽￺はね￻で　￹浮￺う￻かび￹上￺あ￻がり\n￹前後￺ぜんご￻　￹左右￺さゆう￻　￹自由自在￺じゆうじざい￻に\n￹飛￺と￻びまわることが　できる。"
          violet: "￹雨￺あめ￻に　￹濡￺ぬ￻れると　￹特徴的￺とくちょうてき￻な\n￹目玉模様￺めだまもよう￻の　￹触角￺しょっかく￻が　￹重￺おも￻くなり\n￹飛￺と￻べなくなって　しまう。"
        jp_kanji:
          scarlet: "４￹枚￺まい￻の　￹羽￺はね￻で　￹浮￺う￻かび￹上￺あ￻がり\n￹前後￺ぜんご￻　￹左右￺さゆう￻　￹自由自在￺じゆうじざい￻に\n￹飛￺と￻びまわることが　できる。"
          violet: "￹雨￺あめ￻に　￹濡￺ぬ￻れると　￹特徴的￺とくちょうてき￻な\n￹目玉模様￺めだまもよう￻の　￹触角￺しょっかく￻が　￹重￺おも￻くなり\n￹飛￺と￻べなくなって　しまう。"
        en:
          scarlet: "It flaps its four wings to hover and fly freely in\nany direction—to and fro and sideways."
          violet: "The antennae have distinctive patterns that look\nlike eyes. When it rains, they grow heavy, making\nflight impossible."
        fr:
          scarlet: "Il plane à l’aide de ses quatre ailes, qui lui\npermettent également de voler à sa guise\ndans toutes les directions."
          violet: "Quand il pleut, ses antennes semblables à des\nyeux s’imprègnent d’eau et l’empêchent de voler."
        it:
          scarlet: "Le sue quattro ali gli permettono di volare\na piacimento in ogni direzione."
          violet: "Quando piove, le sue antenne con motivi\na forma di occhio si appesantiscono tanto\nda impedirgli di librarsi in volo."
        de:
          scarlet: "Dank seiner vier Flügel kann es frei in alle\nRichtungen fliegen, sogar seitwärts und rückwärts."
          violet: "Die Fühler haben ein unverkennbares Muster,\ndas Augen ähnelt. Bei Regen werden sie schwer\nund es kann nicht fliegen."
        es:
          scarlet: "Sus cuatro alas le permiten volar en cualquier\ndirección a su antojo."
          violet: "En las antenas tiene un par de ojos dibujados.\nCuando llueve, se le vuelven muy pesadas y le\nimpiden volar."
        ko:
          scarlet: "4장의 날개로 떠올라\n전후좌우 자유자재로\n날아다닐 수 있다."
          violet: "비에 젖으면 특징적인\n눈알 모양의 더듬이가\n무거워져서 날 수 없게 된다."
        zh_simp:
          scarlet: "能用４根翅膀浮在空中，\n并前后左右自由地飞来飞去。"
          violet: "如果淋到雨，独特的\n眼珠花纹触角就会变重，\n使它连飞都飞不起来。"
        zh_trad:
          scarlet: "能用４片翅膀浮在空中，\n並前後左右自在地飛來飛去。"
          violet: "一旦被雨淋濕，獨特的\n眼珠花紋觸角就會變重，\n使牠連飛都飛不起來。"
