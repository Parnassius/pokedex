      descriptions:
        jp_kana:
          scarlet: "￹別名￺べつめい￻　アルキメンデス。\n￹夜￺よる￻になると　２￹本￺ほん￻の　￹根￺ね￻っこで\n３００メートルも　￹歩￺ある￻くという。"
          violet: "￹月￺つき￻の￹光￺ひかり￻を　￹浴￺あ￻びて　￹目覚￺めざ￻めると\nあちこち　￹動￺うご￻きまわる。　￹昼間￺ひるま￻は\n￹地面￺じめん￻の￹中￺なか￻で　じっとしている。"
        jp_kanji:
          scarlet: "￹別名￺べつめい￻　アルキメンデス。\n￹夜￺よる￻になると　２￹本￺ほん￻の　￹根￺ね￻っこで\n３００メートルも　￹歩￺ある￻くという。"
          violet: "￹月￺つき￻の￹光￺ひかり￻を　￹浴￺あ￻びて　￹目覚￺めざ￻めると\nあちこち　￹動￺うご￻きまわる。　￹昼間￺ひるま￻は\n￹地面￺じめん￻の￹中￺なか￻で　じっとしている。"
        en:
          scarlet: "Its scientific name is Oddium wanderus. It is said\nto cover distances as far as 1,000 feet when\nnight falls, walking on its two roots."
          violet: "When it is woken by moonlight, it wanders about.\nBut during the day, it stays still underground."
        fr:
          scarlet: "Son nom scientifique est « Têtkim Archus ».\nOn dit que lorsqu’il fait nuit, il peut marcher sur\nplus de 300 mètres à l’aide de ses deux racines."
          violet: "Il vagabonde la nuit, réveillé par la lumière\nde la lune. En journée, il reste immobile,\nenfoui sous terre."
        it:
          scarlet: "Nome scientifico: \"Oddium Viandantis\". Percorre\nfino a 300 m in una notte sulle due radici."
          violet: "Gira di notte, svegliandosi con la luce lunare.\nDi giorno se ne sta tranquillamente sottoterra."
        de:
          scarlet: "Es ist auch als „Oddium Wanderus“ bekannt.\nNachts kann es knapp 300 m auf seinen zwei\nWurzeln zurücklegen."
          violet: "Es erwacht bei Mondschein und wandert umher.\nTagsüber verharrt es still unter der Erde."
        es:
          scarlet: "Su nombre científico es Oddium viandantis.\nSe dice que, cuando cae la noche, puede llegar\na desplazarse hasta 300 m con sus dos raíces."
          violet: "Vaga durante la noche, despertado por la luz de\nla luna. De día permanece inmóvil bajo la tierra."
        ko:
          scarlet: "별명은 걸어 다니는 독초.\n밤이 되면 2개의 뿌리로\n300m나 걷는다고 한다."
          violet: "달빛을 받아 눈을 뜨면\n여기저기를 돌아다닌다.\n낮에는 땅속에서 움직이지 않고 있다."
        zh_simp:
          scarlet: "别名谜行草。\n据说到了晚上，会用２条根\n走上长达３００米的距离。"
          violet: "沐浴月光醒来后，\n会到处走动，白天则\n一动不动待在地里。"
        zh_trad:
          scarlet: "別名謎行草。\n據說每到夜裡，牠會用２條根\n走上長達３００公尺的距離。"
          violet: "沐浴到月光就會醒來\n四處活動，白天則會\n靜靜地待在地面下。"
