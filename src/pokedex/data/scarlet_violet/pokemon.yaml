      abilities:
        - defiant
      descriptions:
        jp_kana:
          scarlet: "￹身￺み￻に￹着￺つ￻ける　￹仮面￺かめん￻によって　タイプが\n￹変￺か￻わる。　￹俊敏￺しゅんびん￻な　￹身￺み￻のこなしと\n￹蹴￺け￻り￹技￺わざ￻で　￹敵￺てき￻を　￹翻弄￺ほんろう￻する。"
          violet: "いたずら￹好￺ず￻きで　￹好奇心旺盛￺こうきしんおうせい￻。\n￹仮面￺かめん￻に　こめられた　タイプの\nエネルギーを　￹引￺ひ￻き￹出￺だ￻して　￹戦￺たたか￻う。"
        jp_kanji:
          scarlet: "￹身￺み￻に￹着￺つ￻ける　￹仮面￺かめん￻によって　タイプが\n￹変￺か￻わる。　￹俊敏￺しゅんびん￻な　￹身￺み￻のこなしと\n￹蹴￺け￻り￹技￺わざ￻で　￹敵￺てき￻を　￹翻弄￺ほんろう￻する。"
          violet: "いたずら￹好￺ず￻きで　￹好奇心旺盛￺こうきしんおうせい￻。\n￹仮面￺かめん￻に　こめられた　タイプの\nエネルギーを　￹引￺ひ￻き￹出￺だ￻して　￹戦￺たたか￻う。"
        en:
          scarlet: "This Pokémon’s type changes based on which\nmask it’s wearing. It confounds its enemies with\nnimble movements and kicks."
          violet: "This mischief-loving Pokémon is full of curiosity.\nIt battles by drawing out the type-based energy\ncontained within its masks."
        fr:
          scarlet: "Son type change selon le masque qu’il porte.\nSon agilité et ses coups de pied habiles lui\npermettent de malmener ses adversaires."
          violet: "Ce Pokémon est curieux et facétieux. Lorsqu’il\nse bat, il puise dans l’énergie de son masque.\nCette énergie est du même type que ce dernier."
        it:
          scarlet: "Il suo tipo cambia in base alla maschera che\nindossa. Tiene in scacco i nemici con agili\nmovimenti e calci."
          violet: "È dispettoso e ha una spiccata curiosità.\nIl tipo dell’energia che sfrutta per lottare\ndipende da quella contenuta nella maschera."
        de:
          scarlet: "Sein Typ ändert sich je nach aufgesetzter Maske.\nEs führt Gegner mit seinen flinken Bewegungen\nund Tritten an der Nase herum."
          violet: "Es liebt Streiche und steckt voller Neugier.\nZum Kämpfen nutzt es die typenspezifische\nEnergie der Maske, die es trägt."
        es:
          scarlet: "Cambia de tipo según la máscara que lleve.\nSe vale de sus rápidos movimientos y patadas\npara jugar a su antojo con sus enemigos."
          violet: "Es bromista y extremadamente curioso. A la hora\nde combatir, se sirve del tipo de energía que\ncontenga la máscara que lleve puesta."
        ko:
          scarlet: "쓰고 있는 가면에 따라 타입이 변한다.\n날렵한 움직임과 발차기 기술로\n상대를 농락한다."
          violet: "장난기가 많고 호기심이 왕성하다.\n가면에 담긴 타입의 에너지를\n끌어올려서 싸운다."
        zh_simp:
          scarlet: "属性根据身着的面具而改变。\n会以敏捷的身手和踢技\n将敌人玩弄于鼓掌之中。"
          violet: "喜欢恶作剧，好奇心旺盛。\n会释出蕴藏在面具内的\n属性的能量战斗。"
        zh_trad:
          scarlet: "屬性會根據戴上的面具而改變。\n會用矯捷的身手和踢技\n將敵人玩弄於股掌之上。"
          violet: "喜歡惡作劇，好奇心旺盛。\n能激發出面具蘊藏的\n屬性的能量來戰鬥。"
