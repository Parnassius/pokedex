          scarlet: "￹大￺おお￻きな　￹岩￺いわ￻を　コナゴナに　￹砕￺くだ￻く\nパワーを　もつ。　￹川底￺かわぞこ￻の　￹泥￺どろ￻に\n￹体￺からだ￻を　￹埋￺うず￻めて　￹休￺やす￻む。"
          violet: "￹大￺おお￻きな　￹尾￺お￻びれで　￹水￺みず￻を　かけば\nぐんぐん　スピードが　￹上￺あ￻がる。\n￹小￺ちい￻さい　￹体￺からだ￻でも　￹力持￺ちからも￻ち。"
        jp_kanji:
          scarlet: "￹大￺おお￻きな　￹岩￺いわ￻を　コナゴナに　￹砕￺くだ￻く\nパワーを　もつ。　￹川底￺かわぞこ￻の　￹泥￺どろ￻に\n￹体￺からだ￻を　￹埋￺うず￻めて　￹休￺やす￻む。"
          violet: "￹大￺おお￻きな　￹尾￺お￻びれで　￹水￺みず￻を　かけば\nぐんぐん　スピードが　￹上￺あ￻がる。\n￹小￺ちい￻さい　￹体￺からだ￻でも　￹力持￺ちからも￻ち。"
        en:
          scarlet: "It has the power to crush large boulders into\npieces. To rest, it buries itself in mud at the\nbottom of a river."
          violet: "When it uses its large tail fin, it picks up speed\nrapidly in the water. It is strong in spite of its\nsmall size."
        fr:
          scarlet: "Ce Pokémon peut pulvériser de gros rocs.\nPour se reposer, il s’enfouit dans la boue\nau fond des rivières."
          violet: "Dans l’eau, les battements de sa grande nageoire\ncaudale le font accélérer de manière fulgurante.\nMalgré sa petite taille, il est très costaud."
        it:
          scarlet: "Riesce a frantumare grandi rocce. Riposa\nnascosto nel fango che si trova sul fondo\ndei fiumi."
          violet: "Può acquisire una straordinaria velocità agitando\nla grande pinna caudale nell’acqua. È minuto, ma\nforte."
        de:
          scarlet: "Es ist stark genug, um große Felsen zu zerbröseln.\nZum Schlafen gräbt es sich in den Schlamm am\nFlussboden."
          violet: "Wenn es seine große Schwanzflosse einsetzt,\nkann es im Wasser schnell beschleunigen. Es ist\nüberraschend stark für seine geringe Größe."
        es:
          scarlet: "Puede reducir a añicos grandes rocas. Descansa\nenterrado en el lodo del lecho de los ríos."
          violet: "Batir su gran aleta caudal en el agua le permite\nnadar muy rápido. A pesar de su reducido\ntamaño, tiene mucha fuerza."
        ko:
          scarlet: "큰 돌을 조각조각으로 부수는\n파워를 가졌다. 강바닥에 쌓인\n진흙에 몸을 묻고 쉰다."
          violet: "커다란 꼬리지느러미로 물을 헤치면\n스피드가 쑥쑥 오른다.\n작은 몸이지만 힘이 장사다."
        zh_simp:
          scarlet: "拥有能粉碎巨大岩石的力量。\n会把自己的身体埋在\n河底的泥土中休息。"
          violet: "如果用大大的尾鳍划水的话，\n速度就会快速提升。\n身体虽小却充满了力量。"
        zh_trad:
          scarlet: "擁有能擊碎巨大岩石的力量。\n會把身體埋進河底的\n泥巴裡休息。"
          violet: "如果用大大的尾鰭划水，\n速度就會快速提升。\n身體雖小卻很有力氣。"
