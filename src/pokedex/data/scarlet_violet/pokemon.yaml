      descriptions:
        jp_kana:
          scarlet: "いつも　￹頭痛￺ずつう￻に　￹悩￺なや￻まされている。\nこの　￹頭痛￺ずつう￻が　￹激￺はげ￻しくなると\n￹不思議￺ふしぎ￻な　￹力￺ちから￻を　￹使￺つか￻いはじめる。"
          violet: "いつもの　￹頭痛￺ずつう￻が　￹激￺はげ￻しくなると\n￹不思議￺ふしぎ￻な　￹力￺ちから￻を　￹発揮￺はっき￻するが\nそのときの　￹記憶￺きおく￻は　ないらしい。"
        jp_kanji:
          scarlet: "いつも　￹頭痛￺ずつう￻に　￹悩￺なや￻まされている。\nこの　￹頭痛￺ずつう￻が　￹激￺はげ￻しくなると\n￹不思議￺ふしぎ￻な　￹力￺ちから￻を　￹使￺つか￻いはじめる。"
          violet: "いつもの　￹頭痛￺ずつう￻が　￹激￺はげ￻しくなると\n￹不思議￺ふしぎ￻な　￹力￺ちから￻を　￹発揮￺はっき￻するが\nそのときの　￹記憶￺きおく￻は　ないらしい。"
        en:
          scarlet: "It is constantly wracked by a headache. When the\nheadache turns intense, it begins using mysterious\npowers."
          violet: "If its chronic headache peaks, it may exhibit\nodd powers. It seems unable to recall such an\nepisode."
        fr:
          scarlet: "Ce Pokémon a tout le temps la migraine.\nQuand la douleur devient trop intense,\nil se met à utiliser des pouvoirs mystérieux."
          violet: "Quand son éternelle migraine devient trop forte,\nil manifeste d’étranges pouvoirs, mais il ne\nsemble jamais s’en souvenir par la suite."
        it:
          scarlet: "È costantemente tormentato dal mal di testa.\nQuando il dolore si fa particolarmente intenso,\ninizia a usare strani poteri."
          violet: "Se il suo mal di testa cronico si acuisce, può\nmanifestare strani poteri di cui in seguito non ha\nmemoria."
        de:
          scarlet: "Es wird permanent von Kopfschmerzen geplagt.\nWird der Schmerz stärker, setzt es geheimnisvolle\nKräfte ein."
          violet: "Wenn seine chronischen Kopfschmerzen stärker\nwerden, kann es mysteriöse Kräfte entfalten.\nDanach erinnert es sich anscheinend nicht daran."
        es:
          scarlet: "Padece continuamente dolores de cabeza.\nCuando son muy fuertes, empieza a usar\nmisteriosos poderes."
          violet: "Cuando su jaqueca crónica empeora, desata\nunos poderes misteriosos, pero después no\nparece recordar nada de lo ocurrido."
        ko:
          scarlet: "항상 두통에 시달리고 있다.\n이 두통이 심해지면\n이상한 힘을 쓰기 시작한다."
          violet: "평상시보다 두통이 심해지면\n이상한 힘을 발산하지만\n그때의 기억은 없는 듯하다."
        zh_simp:
          scarlet: "一直受到头痛的困扰。\n在头痛欲裂时，\n就会开始使用神奇的力量。"
          violet: "总是会在头痛欲裂时\n发挥出神奇的力量，\n但似乎没有当时的记忆。"
        zh_trad:
          scarlet: "一直受到頭痛的困擾。\n當頭痛欲裂時，\n就會開始使用神奇的力量。"
          violet: "總是會在頭痛欲裂時\n發揮出神奇的力量，\n但似乎沒有當下的記憶。"
