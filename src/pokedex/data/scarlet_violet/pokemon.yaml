      descriptions:
        jp_kana:
          scarlet: "３つの　￹頭￺あたま￻が　￹互￺たが￻い￹違￺ちが￻いに\n￹動￺うご￻くのは　まわりの　￹土￺つち￻を\n￹柔￺やわ￻らかくして　￹掘￺ほ￻りやすくするため。"
          violet: "￹地中￺ちちゅう￻を　￹掘￺ほ￻りすすんで\n￹相手￺あいて￻が　￹油断￺ゆだん￻しているところを\n￹別￺べつ￻の　￹場所￺ばしょ￻から　￹攻撃￺こうげき￻する。"
        jp_kanji:
          scarlet: "３つの　￹頭￺あたま￻が　￹互￺たが￻い￹違￺ちが￻いに\n￹動￺うご￻くのは　まわりの　￹土￺つち￻を\n￹柔￺やわ￻らかくして　￹掘￺ほ￻りやすくするため。"
          violet: "￹地中￺ちちゅう￻を　￹掘￺ほ￻りすすんで\n￹相手￺あいて￻が　￹油断￺ゆだん￻しているところを\n￹別￺べつ￻の　￹場所￺ばしょ￻から　￹攻撃￺こうげき￻する。"
        en:
          scarlet: "Its three heads bob separately up and down to\nloosen the soil nearby, making it easier for it\nto burrow."
          violet: "In battle, it digs through the ground and strikes\nthe unsuspecting foe from an unexpected\ndirection."
        fr:
          scarlet: "Ses trois têtes pilonnent le sol pour le rendre\nfriable et ainsi faciliter l’excavation."
          violet: "En combat, il s’enfouit sous terre pour pouvoir\nfrapper ses adversaires par surprise depuis\nn’importe quelle direction."
        it:
          scarlet: "Le tre teste si muovono alternativamente per\nammorbidire il terreno e renderlo così più facile\nda scavare."
          violet: "Durante la lotta, scava tunnel nel terreno\nper sorprendere il nemico attaccandolo\nda una direzione imprevedibile."
        de:
          scarlet: "Seine drei Köpfe bewegen sich abwechselnd\nhinauf und hinunter, um das Erdreich um sich\nherum zu lockern und leichter graben zu können."
          violet: "Im Kampf gräbt es sich ein und attackiert den\nGegner plötzlich aus einer unvorhersehbaren\nRichtung."
        es:
          scarlet: "Sus tres cabezas suben y bajan para remover\nla tierra cercana y facilitar así la excavación."
          violet: "En combate, cava la tierra, se esconde y sale\nde repente para golpear a su rival. Nunca se\nsabe por dónde puede aparecer."
        ko:
          scarlet: "3개의 머리가 교차하며\n움직이는 것은 주변의 흙을\n부드럽게 해 파기 쉽게 하기 위해서다."
          violet: "땅속을 파고들어 가\n상대가 방심하고 있을 때\n다른 곳에서 공격한다."
        zh_simp:
          scarlet: "３个脑袋会轮流行动，\n是为了让周围的土地\n变得松软而容易挖掘。"
          violet: "在地下挖洞前进，\n会趁对手不注意的时候，\n从其他地方发动攻击。"
        zh_trad:
          scarlet: "三顆頭會輪流活動，\n是為了讓周圍的土\n變得更鬆更好挖。"
          violet: "會在地底下挖洞前進，\n趁對手不注意的時候\n從其他地方發動攻擊。"
