      descriptions:
        jp_kana:
          scarlet: "￹浮￺う￻き￹袋￺ぶくろ￻を　ふくらませると　￹人￺ひと￻を\n￹背中￺せなか￻に　￹乗￺の￻せることが　できる。\n￹浮￺う￻き￹袋￺ぶくろ￻を　しぼませて　￹潜￺もぐ￻る。"
          violet: "￹漁師町￺りょうしまち￻に　￹多￺おお￻く　￹暮￺く￻らし\nおぼれた　￹人￺ひと￻を　￹助￺たす￻けたり\n￹捕￺と￻った　￹獲物￺えもの￻を　￹運￺はこ￻んでいる。"
        jp_kanji:
          scarlet: "￹浮￺う￻き￹袋￺ぶくろ￻を　ふくらませると　￹人￺ひと￻を\n￹背中￺せなか￻に　￹乗￺の￻せることが　できる。\n￹浮￺う￻き￹袋￺ぶくろ￻を　しぼませて　￹潜￺もぐ￻る。"
          violet: "￹漁師町￺りょうしまち￻に　￹多￺おお￻く　￹暮￺く￻らし\nおぼれた　￹人￺ひと￻を　￹助￺たす￻けたり\n￹捕￺と￻った　￹獲物￺えもの￻を　￹運￺はこ￻んでいる。"
        en:
          scarlet: "With its flotation sac inflated, it can carry people\non its back. It deflates the sac before it dives."
          violet: "It is a common sight around fishing ports. It is\nknown to rescue people and help fishers carry\nwhat they caught."
        fr:
          scarlet: "Il gonfle sa bouée pour permettre aux gens\nde monter sur son dos et il la dégonfle pour\nplonger."
          violet: "Il vit souvent près des ports de pêche, où il aide\nau transport des prises et secourt les personnes\ntombées à l’eau."
        it:
          scarlet: "Col galleggiante gonfio, può trasportare delle\npersone sul dorso. Per immergersi lo sgonfia."
          violet: "Vive per lo più nelle città di pescatori. Mette\nin salvo le persone cadute in mare e aiuta a\ntrasportare il pescato."
        de:
          scarlet: "Mit gefüllter Schwimmblase kann es Menschen\nauf seinem Rücken tragen. Lässt es Luft aus ihr\nheraus, taucht es unter."
          violet: "Man findet es oft in der Nähe von Häfen, wo es\nFischern dabei hilft, ihren Fang zu transportieren,\nund Menschen vor dem Ertrinken rettet."
        es:
          scarlet: "Con la vejiga natatoria inflada, puede llevar\na personas sobre su espalda. Antes de bucear,\nla desinfla."
          violet: "Habita en los puertos pesqueros, donde se\nle puede ver ayudando a los pescadores a\ntransportar sus capturas o rescatando a gente."
        ko:
          scarlet: "부낭을 부풀리면 사람을\n등에 태울 수 있다.\n부낭을 오그라들게 하여 잠수한다."
          violet: "어촌에서 많이 살고 있으며\n물에 빠진 사람을 구하거나\n잡은 먹이를 운반한다."
        zh_simp:
          scarlet: "浮囊膨胀起来后，\n就能让人乘坐在背上。\n会排出浮囊的气来潜水。"
          violet: "大量栖息在渔村，\n不仅会去帮助溺水的人，\n还会帮忙搬运捕获的猎物。"
        zh_trad:
          scarlet: "膨脹起浮囊後就能\n讓人坐在自己背上。\n排出浮囊的氣來潛水。"
          violet: "大量棲息在漁村，\n除了會去救助溺水的人，\n還會幫忙搬捕獲的獵物。"
