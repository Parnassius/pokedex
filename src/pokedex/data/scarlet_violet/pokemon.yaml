        jp_kanji:
          scarlet: "￹大￺おお￻きな　￹耳￺みみ￻から　￹超音波￺ちょうおんぱ￻を\n￹出￺だ￻して　エサの　￹果物￺くだもの￻を　￹探￺さが￻す。\nカジッチュを　エサと　￹間違￺まちが￻える。"
          violet: "￹音波￺おんぱ￻の　￹周波数￺しゅうはすう￻を　￹自在￺じざい￻に\n￹変￺か￻える。　￹最大￺さいだい￻　２０￹万￺まん￻ヘルツの\n￹超音波￺ちょうおんぱ￻を　￹出￺だ￻すことができる。"
        en:
          scarlet: "This Pokémon emits ultrasonic waves from its\nlarge ears to search for fruit to eat. It mistakes\nApplin for its food."
          violet: "Noibat can change the frequency of its sound\nwaves at will, and it generates ultrasonic waves of\nup to 200,000 hertz."
        fr:
          scarlet: "À l’aide de leurs grandes oreilles, ces Pokémon\némettent des ultrasons pour trouver des fruits.\nIls prennent les Verpom pour de la nourriture."
          violet: "Il est capable de modifier la fréquence\nde ses ondes sonores à volonté et produit\ndes ultrasons allant jusqu’à 200 000 Hz."
        it:
          scarlet: "Riesce a individuare i frutti di cui si ciba grazie\nagli ultrasuoni che emette dalle grandi orecchie.\nA volte scambia gli Applin per cibo."
          violet: "Può cambiare a piacimento la frequenza\ndelle proprie onde sonore, fino a raggiungere\nultrasuoni di un massimo di 200.000 hertz."
        de:
          scarlet: "Seine großen Ohren setzen Ultraschallwellen\nfrei, mit denen es nach reifem Obst sucht.\nDabei verwechselt es Knapfel mit seinem Futter."
          violet: "Es kann die Frequenz seiner Schallwellen nach\nBelieben ändern und sogar Ultraschallwellen\nvon bis zu 200 000 Hz freisetzen."
        es:
          scarlet: "Emite ondas ultrasónicas a través de sus grandes\norejas para buscar fruta con la que alimentarse.\nSiempre confunde a los Applin con comida."
          violet: "Es capaz de modificar a su antojo la frecuencia\nde las ondas ultrasónicas que emite, las cuales\npueden alcanzar hasta 200 000 Hz."
        ko:
          scarlet: "큰 귀로 초음파를 내보내서\n먹이인 과일을 찾는다.\n과사삭벌레를 먹이로 착각하기도 한다."
          violet: "음파의 주파수를 자유자재로 바꿀 수 있다.\n최대 20만 Hz의 초음파를 내보낼 수 있다."
        zh_simp:
          scarlet: "从大大的耳朵发出超音波，\n寻找水果来填饱肚子。\n会把啃果虫错认为食物。"
          violet: "可以自由自在地改变\n音波的频率。最高能够\n发出２０万赫兹的超音波。"
        zh_trad:
          scarlet: "從大大的耳朵發出超音波，\n尋找水果來填飽肚子。\n會把啃果蟲誤認成食物。"
          violet: "可以自由自在地改變\n音波的頻率。最高能夠\n發出２０萬赫茲的超音波。"
