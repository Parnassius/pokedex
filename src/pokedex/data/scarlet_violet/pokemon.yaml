      descriptions:
        jp_kana:
          scarlet: "お￹腹￺なか￻の　￹模様￺もよう￻が　￹怖￺こわ￻い￹顔￺かお￻に\n￹見￺み￻える。　￹弱￺よわ￻い￹敵￺てき￻は　その￹模様￺もよう￻を\n￹見￺み￻ただけで　￹逃￺に￻げだしてしまう。"
          violet: "とても　￹執念深￺しゅうねんぶか￻い　￹性格￺せいかく￻。\n￹一度￺いちど￻　ターゲットに　￹決￺き￻めた\n￹獲物￺えもの￻は　どこまでも　￹追￺お￻い￹続￺つづ￻ける。"
        jp_kanji:
          scarlet: "お￹腹￺なか￻の　￹模様￺もよう￻が　￹怖￺こわ￻い￹顔￺かお￻に\n￹見￺み￻える。　￹弱￺よわ￻い￹敵￺てき￻は　その￹模様￺もよう￻を\n￹見￺み￻ただけで　￹逃￺に￻げだしてしまう。"
          violet: "とても　￹執念深￺しゅうねんぶか￻い　￹性格￺せいかく￻。\n￹一度￺いちど￻　ターゲットに　￹決￺き￻めた\n￹獲物￺えもの￻は　どこまでも　￹追￺お￻い￹続￺つづ￻ける。"
        en:
          scarlet: "The pattern on its belly appears to be a\nfrightening face. Weak foes will flee just\nat the sight of the pattern."
          violet: "This Pokémon is very tenacious. Once it targets\nits prey, it won’t give up the chase, no matter\nhow far the prey goes."
        fr:
          scarlet: "Le motif sur son corps ressemble à un visage\nmenaçant. Les adversaires les plus craintifs\nfuient à la seule vue de ce Pokémon."
          violet: "De nature tenace, il ne lâche jamais sa proie\nune fois qu’il a décidé de la prendre en chasse."
        it:
          scarlet: "Il motivo sulla pancia sembra una faccia\nspaventosa. Al solo vederlo, i nemici più pavidi\nsi danno alla fuga."
          violet: "Estremamente tenace, se individua una preda\nnon si dà pace finché non la raggiunge, a costo\ndi seguirla in capo al mondo."
        de:
          scarlet: "Das Muster auf seinem Bauch ähnelt einer Fratze.\nSchwache Gegner nehmen bereits beim Anblick\nReißaus."
          violet: "Es ist sehr hartnäckig und verfolgt seine Beute\nüberallhin, wenn es sie einmal erspäht hat."
        es:
          scarlet: "El dibujo que tiene en el vientre parece una cara\nterrorífica. Los rivales más débiles salen huyendo\nnada más verlo."
          violet: "De naturaleza muy obstinada, cuando se fija en\nuna presa, no cejará en su empeño e irá tras ella\nhasta donde haga falta."
        ko:
          scarlet: "배의 무늬가 무서운 얼굴로 보인다.\n약한 적은 그 무늬만 보고도\n도망치고 만다."
          violet: "매우 집념이 강한 성격이다.\n한번 타깃으로 정한 먹이는\n어디든지 쫓아간다."
        zh_simp:
          scarlet: "腹部的花纹看起来像一张可怕的脸。\n弱小的敌人只要看到\n这个花纹就会被吓跑。"
          violet: "个性非常执着，\n一旦锁定了猎物，\n就会穷追不舍。"
        zh_trad:
          scarlet: "腹部的花紋看起來像一張可怕的臉。\n弱小的敵人只要看到\n這個花紋就會被嚇跑。"
          violet: "性情非常執著。\n一旦鎖定了獵物，\n便會窮追不捨。"
