      abilities:
        - rivalry
        - unnerve
      hidden_ability: moxie
      descriptions:
        jp_kana:
          scarlet: "￹幼￺おさな￻いうちに　メスの　カエンジシに\n￹狩￺か￻りを　￹教￺おそ￻わるが　￹成長￺せいちょう￻すると\n￹群￺む￻れを　￹離￺はな￻れて　￹独￺ひと￻り￹立￺だ￻ちする。"
          violet: "￹強敵￺きょうてき￻と　￹戦￺たたか￻い　￹体￺からだ￻と　￹心￺こころ￻が\n￹鍛￺きた￻えられた　シシコほど\nたてがみの　￹温度￺おんど￻は　￹高￺たか￻くなる。"
        jp_kanji:
          scarlet: "￹幼￺おさな￻いうちに　メスの　カエンジシに\n￹狩￺か￻りを　￹教￺おそ￻わるが　￹成長￺せいちょう￻すると\n￹群￺む￻れを　￹離￺はな￻れて　￹独￺ひと￻り￹立￺だ￻ちする。"
          violet: "￹強敵￺きょうてき￻と　￹戦￺たたか￻い　￹体￺からだ￻と　￹心￺こころ￻が\n￹鍛￺きた￻えられた　シシコほど\nたてがみの　￹温度￺おんど￻は　￹高￺たか￻くなる。"
        en:
          scarlet: "When Litleo are young, female Pyroar will teach\nthem how to hunt. Once the Litleo mature, they\nwill leave the pride and set out on their own."
          violet: "The more a Litleo trains its body and spirit by\nbattling mighty enemies, the hotter its mane\nwill grow."
        fr:
          scarlet: "Les Némélios femelles leur apprennent à chasser.\nLorsqu’ils grandissent, ils quittent la troupe\net deviennent indépendants."
          violet: "Plus il se bat contre un adversaire puissant qui\nmet sa force physique et mentale à rude épreuve,\nplus la température de sa crinière monte."
        it:
          scarlet: "Da cucciolo impara a cacciare dalle femmine\ndi Pyroar. Una volta cresciuto, si allontana\ndal gruppo per vivere in autonomia."
          violet: "Più un Litleo ha allenato corpo e spirito lottando\ncontro nemici potenti, più alta è la temperatura\ndella sua criniera."
        de:
          scarlet: "Als Junges lernt es die Jagd von weiblichen\nPyroleo. Sobald es herangewachsen ist, verlässt\nes das Rudel, um auf eigenen Pfoten zu stehen."
          violet: "Je mehr ein Leufeo seinen Körper und Geist im\nKampf gegen starke Gegner stählt, desto heißer\nwird seine Mähne."
        es:
          scarlet: "Mientras es un cachorro, los Pyroar hembra lo\ninstruyen en la caza, pero, en cuanto madura,\nse separa de la manada y se independiza."
          violet: "Cuanto más ha fortalecido cuerpo y espíritu a\nbase de batirse contra enemigos fuertes, mayor\nes el calor que llega a desprender su mechón."
        ko:
          scarlet: "어릴 때는 암컷 화염레오에게\n사냥 방법을 배우고\n성장하면 무리를 떠나 독립한다."
          violet: "강한 상대와 싸우며\n몸과 마음이 단련된 레오꼬일수록\n갈기의 온도가 높아진다."
        zh_simp:
          scarlet: "年幼时会由雌性的火炎狮\n来教导它如何狩猎，\n等到长大后就会离群索居。"
          violet: "小狮狮会通过与强敌战斗\n来锻炼身心。越多的锻炼\n能使它鬃毛的温度变得越高。"
        zh_trad:
          scarlet: "年幼時雌性的火炎獅\n會教導自己如何狩獵，\n長大後就會離群索居。"
          violet: "小獅獅會透過與強敵戰鬥\n來鍛鍊身心。越多的鍛鍊\n能使牠的鬃毛溫度變得越高。"
