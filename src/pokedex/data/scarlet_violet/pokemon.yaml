          violet: "￹頬￺ほほ￻の　￹電気袋￺でんきぶくろ￻に　￹溜￺た￻まった\n￹電気￺でんき￻が　￹最大量￺さいだいりょう￻になると\n￹両耳￺りょうみみ￻は　まっすぐ　￹伸￺の￻びる。"
        jp_kanji:
          scarlet: "￹尻尾￺しっぽ￻が　アースの　￹役目￺やくめ￻をはたして\n￹電気￺でんき￻を　￹地面￺じめん￻に　￹逃￺に￻がすので\n￹自分自身￺じぶんじしん￻は　しびれたりしない。"
          violet: "￹頬￺ほほ￻の　￹電気袋￺でんきぶくろ￻に　￹溜￺た￻まった\n￹電気￺でんき￻が　￹最大量￺さいだいりょう￻になると\n￹両耳￺りょうみみ￻は　まっすぐ　￹伸￺の￻びる。"
        en:
          scarlet: "Its tail discharges electricity into the ground,\nprotecting it from getting shocked."
          violet: "If the electric pouches in its cheeks become fully\ncharged, both ears will stand straight up."
        fr:
          scarlet: "Il se protège des décharges grâce à sa queue,\nqui dissipe l’électricité dans le sol."
          violet: "Ses oreilles se dressent lorsque les poches\nd’électricité sur ses joues sont chargées."
        it:
          scarlet: "La sua coda scarica elettricità a terra,\nproteggendolo dalle scosse elettriche."
          violet: "Quando le sacche elettriche sulle sue guance\nsi caricano completamente, gli si rizzano\nle orecchie."
        de:
          scarlet: "Mithilfe seines Schweifs entlädt es Elektrizität\nin den Boden, um sich auf diese Weise vor\nelektrischen Schlägen zu schützen."
          violet: "Wenn seine Backentaschen voll aufgeladen sind,\nstehen seine beiden Ohren senkrecht nach oben."
        es:
          scarlet: "Su cola actúa como toma de tierra y descarga\nelectricidad al suelo, lo que le protege de los\ncalambrazos."
          violet: "Si las bolsas de sus mejillas se cargan por\ncompleto de electricidad, se le ponen las\norejas de punta."
        ko:
          scarlet: "꼬리가 어스 역할을 하여\n전기를 지면으로 흘려보내므로\n자신은 감전되거나 하지 않는다."
          violet: "양 볼의 전기 주머니에 모인\n전기가 가득 차게 되면\n두 귀가 곧게 선다."
        zh_simp:
          scarlet: "尾巴会发挥接地线的\n作用把电导入地面，\n因此自己不会被电到。"
          violet: "如果脸颊上的电囊\n储存的电力达到最大时，\n两支耳朵就会直直地竖起。"
        zh_trad:
          scarlet: "尾巴會發揮接地線的作用\n把電氣導入地面，\n所以自己不會被電得發麻。"
          violet: "如果雙頰上的電囊\n儲存了飽滿的電力，\n兩隻耳朵就會直直地豎起。"
