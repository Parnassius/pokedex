      hidden_ability: long_reach
      descriptions:
        jp_kana:
          scarlet: "￹一切￺いっさい￻　￹音￺おと￻を　￹立￺た￻てず　￹滑空￺かっくう￻し\n￹敵￺てき￻に　￹急接近￺きゅうせっきん￻。　￹気￺き￻づかぬ￹間￺ま￻に\n￹強烈￺きょうれつ￻な　￹蹴￺け￻りを　￹浴￺あ￻びせる。"
          violet: "￹狭￺せま￻くて　￹暗￺くら￻い￹場所￺ばしょ￻が　￹落￺お￻ち￹着￺つ￻く。\nトレーナーの　ふところや　バッグを\n￹巣￺す￻の　￹代￺か￻わりに　することも　あるぞ。"
        jp_kanji:
          scarlet: "￹一切￺いっさい￻　￹音￺おと￻を　￹立￺た￻てず　￹滑空￺かっくう￻し\n￹敵￺てき￻に　￹急接近￺きゅうせっきん￻。　￹気￺き￻づかぬ￹間￺ま￻に\n￹強烈￺きょうれつ￻な　￹蹴￺け￻りを　￹浴￺あ￻びせる。"
          violet: "￹狭￺せま￻くて　￹暗￺くら￻い￹場所￺ばしょ￻が　￹落￺お￻ち￹着￺つ￻く。\nトレーナーの　ふところや　バッグを\n￹巣￺す￻の　￹代￺か￻わりに　することも　あるぞ。"
        en:
          scarlet: "Silently it glides, streaking toward its targets to\nget close to them. Before they even notice it,\nit begins to pelt them with vicious kicks."
          violet: "It feels relaxed in tight, dark places and has been\nknown to nestle into its Trainer’s bag or the front\nof their jacket."
        fr:
          scarlet: "Il plane sans bruit dans les airs pour se rapprocher\nrapidement de sa cible, et il la prend au dépourvu\nen lui assénant de puissants coups de patte."
          violet: "Il se sent à l’aise dans les endroits sombres\net étroits. Il se niche parfois dans les vêtements\nou le sac de son Dresseur ou sa Dresseuse."
        it:
          scarlet: "Si avvicina ai nemici ignari planando su di loro\nsenza produrre il minimo rumore e li tempesta\ndi poderosi calci."
          violet: "Si sente a suo agio in luoghi stretti e bui. A volte\nsi infila nei vestiti o nella Borsa di chi lo allena\ncome se ne volesse fare il proprio nido."
        de:
          scarlet: "Nachdem es sich seinem Feind lautlos\nim Gleitflug genähert hat, wird dieser\nmit heftigen Tritten völlig überrascht."
          violet: "An engen, dunklen Orten fühlt es sich wohl.\nManchmal schlüpft es in die Jacke oder den\nBeutel des Trainers und nutzt diese als Nest."
        es:
          scarlet: "Se aproxima a sus enemigos planeando por el\naire sin hacer el menor ruido y les propina unas\npatadas de lo más poderosas."
          violet: "Se siente a gusto en lugares angostos y oscuros.\nEn ocasiones se mete en la chaqueta o la mochila\nde su Entrenador y la utiliza a modo de nido."
        ko:
          scarlet: "전혀 소리를 내지 않고 활공하여\n적에게 빠르게 접근한다. 눈치채기 전에\n강렬한 발차기를 퍼붓는다."
          violet: "좁고 어두운 곳을 편안해한다.\n트레이너의 품이나 가방을\n둥지로 삼을 때도 있다."
        zh_simp:
          scarlet: "不发出一丝声响地滑翔，\n急速接近敌人。在对方还未发觉时，\n就使出猛烈的脚踢。"
          violet: "在狭窄黑暗的地方会很平静。\n有时候也会用训练家的怀抱\n或包包代替巢穴。"
        zh_trad:
          scarlet: "能不發出一絲聲響地滑翔，\n極速接近敵人。在對方還未發覺時，\n使出猛烈的腳踢來攻擊。"
          violet: "在狹窄陰暗的地方才會感到安穩。\n有時也會用訓練家的懷抱\n或是包包代替巢穴。"
