      descriptions:
        jp_kana:
          scarlet: "まとっている　￹泥￺どろ￻は　￹食￺た￻べた　￹土￺つち￻を\n￹反芻￺はんすう￻したもの。　￹長時間￺ちょうじかん￻\n￹日差￺ひざ￻しを　￹浴￺あ￻びても　￹乾￺かわ￻かないのだ。"
          violet: "￹歩￺あゆ￻みは　のろいが　￹力持￺ちからも￻ち。\n￹体重￺たいじゅう￻の　５０￹倍￺ばい￻ある　￹荷物￺にもつ￻を\n￹背負￺せお￻っても　￹歩￺あゆ￻みは　￹変￺か￻わらない。"
        jp_kanji:
          scarlet: "まとっている　￹泥￺どろ￻は　￹食￺た￻べた　￹土￺つち￻を\n￹反芻￺はんすう￻したもの。　￹長時間￺ちょうじかん￻\n￹日差￺ひざ￻しを　￹浴￺あ￻びても　￹乾￺かわ￻かないのだ。"
          violet: "￹歩￺あゆ￻みは　のろいが　￹力持￺ちからも￻ち。\n￹体重￺たいじゅう￻の　５０￹倍￺ばい￻ある　￹荷物￺にもつ￻を\n￹背負￺せお￻っても　￹歩￺あゆ￻みは　￹変￺か￻わらない。"
        en:
          scarlet: "This Pokémon covers itself in mud that it has\nregurgitated. The mud won’t dry out even if it’s\nexposed to the sun for a long time."
          violet: "Though a slow walker, Mudbray is plenty strong.\nIts pace doesn’t change even when it’s loaded\nwith 50 times its own body weight."
        fr:
          scarlet: "Il s’enduit d’une boue qu’il a préalablement\nmâchée. Elle ne sèche jamais, même quand\nelle est exposée au soleil pendant des heures."
          violet: "Malgré sa démarche un peu gauche, ce Pokémon\nest fort. Il peut transporter une charge qui fait\ncinquante fois son poids sans pour autant ralentir."
        it:
          scarlet: "Il fango che ricopre il suo corpo è terra ruminata\ndal Pokémon stesso e non si secca mai, neppure\nse esposto al sole per molto tempo."
          violet: "Cammina piano, ma ha molta forza. Riesce a\ntrasportare carichi fino a cinquanta volte il suo\npeso senza rallentare."
        de:
          scarlet: "Der Schlamm, der es bedeckt, besteht aus\nwiedergekäuter Erde. Dieser trocknet selbst dann\nnicht aus, wenn er lange der Sonne ausgesetzt ist."
          violet: "Es bewegt sich zwar langsam, ist aber sehr kräftig.\nSein Gang ändert sich auch dann nicht, wenn es\ndas Fünfzigfache seines eigenen Gewichts trägt."
        es:
          scarlet: "El lodo con el que se recubre es tierra que ha\ningerido y regurgitado. No se seca por mucho\ntiempo que pase al sol."
          violet: "De andares lánguidos, posee una gran fuerza\nfísica. Camina del mismo modo aunque lleve a\nlomos una carga 50 veces más pesada que él."
        ko:
          scarlet: "두르고 있는 진흙은 먹었던 흙을\n되새김해서 만든 것이다.\n장시간 햇볕을 쬐어도 마르지 않는다."
          violet: "걸음걸이는 느리지만 힘이 장사다.\n체중의 50배나 되는 짐을 짊어지고도\n걷는 속도에는 변화가 없다."
        zh_simp:
          scarlet: "裹在身上的泥巴是它吃下的土\n反刍而成的。就算长时间\n晒在阳光下也不会干掉。"
          violet: "走路虽慢，力气却很大。\n即使背着比自己重５０倍的行李，\n走路速度也不会有变化。"
        zh_trad:
          scarlet: "裹在身上的泥巴是吃下的土\n反芻而成的。就算長時間\n曝曬在陽光下也不會乾掉。"
          violet: "走路雖然慢，力氣卻很大。\n即使背著比自己重５０倍的行李，\n走路速度也不會有變化。"
mudsdale:
  species_id: 750
  names:
