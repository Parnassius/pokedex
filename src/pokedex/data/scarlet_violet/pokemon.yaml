      descriptions:
        jp_kana:
          scarlet: "￹腕￺うで￻の　￹力￺ちから￻で　￹海￺うみ￻から　はい￹出￺だ￻し\n￹水辺￺みずべ￻の　￹獲物￺えもの￻に　￹襲￺おそ￻いかかる。\n￹一瞬￺いっしゅん￻で　￹海￺うみ￻へ　￹引￺ひ￻きずりこむ。"
          violet: "￹吸盤￺きゅうばん￻に　なっている　￹口￺くち￻で\nはりついて　キバを　￹刺￺さ￻しこみ\n￹強力￺きょうりょく￻な　￹電気￺でんき￻を　￹流￺なが￻す。"
        jp_kanji:
          scarlet: "￹腕￺うで￻の　￹力￺ちから￻で　￹海￺うみ￻から　はい￹出￺だ￻し\n￹水辺￺みずべ￻の　￹獲物￺えもの￻に　￹襲￺おそ￻いかかる。\n￹一瞬￺いっしゅん￻で　￹海￺うみ￻へ　￹引￺ひ￻きずりこむ。"
          violet: "￹吸盤￺きゅうばん￻に　なっている　￹口￺くち￻で\nはりついて　キバを　￹刺￺さ￻しこみ\n￹強力￺きょうりょく￻な　￹電気￺でんき￻を　￹流￺なが￻す。"
        en:
          scarlet: "They crawl out of the ocean using their arms.\nThey will attack prey on shore and immediately\ndrag it into the ocean."
          violet: "It latches on to prey with its sucker mouth,\nsinking in its fangs and shocking the prey with\npowerful electricity."
        fr:
          scarlet: "Il peut sortir de l’eau à la force de ses bras\npour attaquer des proies sur la rive et les\nentraîner avec lui dans l’eau en un instant."
          violet: "Sa bouche agit comme une ventouse\naux crocs acérés qu’il plante dans sa proie\nen envoyant une décharge électrique."
        it:
          scarlet: "Striscia fuori dal mare con la sola forza dei\npropri arti. Poi attacca la preda a riva e con\nun guizzo la trascina con sé in acqua."
          violet: "Si attacca alla preda con la bocca a\nventosa, conficca i denti nel suo corpo\ne rilascia una potente scarica elettrica."
        de:
          scarlet: "Es kriecht mithilfe seiner Arme an Land,\nstürzt sich auf seine Beute und zerrt sie\naugenblicklich ins Meer."
          violet: "Es hakt sich mit seinem Maul, das als Saugnapf\nfungiert, an seiner Beute fest und verpasst ihr\nmit seinen Fangzähnen starke Stromschläge."
        es:
          scarlet: "Sale del mar con la fuerza de sus brazos\ny ataca a sus presas en la costa. Luego\nse las lleva de vuelta al mar."
          violet: "Pega la ventosa de su boca en su presa y la\nelectrocuta con una gran descarga al clavarle\nlos colmillos."
        ko:
          scarlet: "팔 힘으로 바다에서 기어 나와\n물가에 있는 먹이를 덮친다.\n한순간에 바다로 끌고 들어간다."
          violet: "흡반으로 되어 있는 입으로\n들러붙어 이빨을 찔러 넣은 뒤\n강력한 전기를 흘려보낸다."
        zh_simp:
          scarlet: "用手臂的力量从海里爬出，\n袭击水边的猎物。\n在一瞬间将对方拖入海中。"
          violet: "会用吸盘的嘴吸附在\n对手身上，然后用牙齿\n刺入并放出强大的电流。"
        zh_trad:
          scarlet: "用手臂的力量從大海裡爬出，\n襲擊水邊的獵物。\n會瞬間將獵物拖入海中。"
          violet: "會用吸盤的嘴吸附在\n對手身上，然後刺進\n牙齒放出強大的電流。"
