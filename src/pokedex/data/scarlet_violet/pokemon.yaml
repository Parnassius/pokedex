          violet: "￹生￺い￻き￹物￺もの￻の　￹気持￺きも￻ちを　キャッチする。\n￹強￺つよ￻い　￹感情￺かんじょう￻を　￹浴￺あ￻び￹続￺つづ￻けると\nくたびれてしまうため　￹要注意￺ようちゅうい￻。"
        jp_kanji:
          scarlet: "つねに　￹生￺い￻き￹物￺もの￻の　￹感情￺かんじょう￻が\n￹頭￺あたま￻に　￹流￺なが￻れ￹込￺こ￻むため\n￹近￺ちか￻くに　だれもいない　￹環境￺かんきょう￻を　￹好￺この￻む。"
          violet: "￹生￺い￻き￹物￺もの￻の　￹気持￺きも￻ちを　キャッチする。\n￹強￺つよ￻い　￹感情￺かんじょう￻を　￹浴￺あ￻び￹続￺つづ￻けると\nくたびれてしまうため　￹要注意￺ようちゅうい￻。"
        en:
          scarlet: "Because the emotions of others constantly flow\ninto its head, this Pokémon prefers environments\nwhere no other creatures live."
          violet: "It senses the feelings of other living creatures.\nBe careful not to expose it to strong emotions\nfor too long, or it will end up exhausted."
        fr:
          scarlet: "Ce Pokémon capte en permanence les émotions\ndes êtres vivants. Il affectionne donc les lieux\ninhabités."
          violet: "Ce Pokémon perçoit les sentiments des êtres\nvivants. Il faut éviter de l’exposer à de fortes\némotions, car cela l’épuise totalement."
        it:
          scarlet: "Poiché le emozioni delle creature che lo\ncircondano penetrano costantemente nella sua\ntesta, preferisce starsene in luoghi isolati."
          violet: "Percepisce lo stato d’animo degli esseri viventi.\nBisogna fare attenzione a non esporlo troppo a\nlungo alle emozioni forti, perché lo debilitano."
        de:
          scarlet: "Da die Gefühle anderer Lebewesen unablässig\nin seinen Kopf strömen, zieht es Umgebungen\nvor, in denen sich niemand sonst aufhält."
          violet: "Es nimmt die Gefühle anderer Lebewesen wahr.\nMan sollte es jedoch nicht allzu lang starken\nEmotionen aussetzen, da es sonst ermattet."
        es:
          scarlet: "Las emociones de los seres vivos que tiene\nalrededor fluyen en su cabeza constantemente,\npor lo que prefiere los entornos solitarios."
          violet: "Percibe los sentimientos de otros seres vivos.\nHay que cuidar que no se exponga a emociones\nintensas mucho tiempo, pues le resulta agotador."
        ko:
          scarlet: "항상 생명체의 감정이\n머릿속으로 흘러들어 오기 때문에\n주위에 아무도 없는 환경을 좋아한다."
          violet: "생물의 기분을 감지한다.\n강한 감정을 계속해서 느끼면\n지쳐 버리기 때문에 주의가 필요하다."
        zh_simp:
          scarlet: "总是有生物的情感会\n传进它的大脑里，因此平时\n喜欢待在只有自己的环境。"
          violet: "能够捕捉生物的心情。\n如果持续接收强烈的情感\n就会累坏，因此要当心。"
        zh_trad:
          scarlet: "由於隨時都會有生物的情感\n流進大腦裡，因此平時喜好\n待在附近沒有任何生物的環境。"
          violet: "能夠察覺生物的心情。\n小心別讓牠不停接收強烈\n的情感，否則牠會累壞的。"
