      hidden_ability: competitive
      descriptions:
        jp_kana:
          scarlet: "￹歩￺ある￻くのは　￹苦手￺にがて￻で　こけたりするが\nポッチャマの　プライドは　￹高￺たか￻く\n￹気￺き￻にせず　￹堂々￺どうどう￻と　￹胸￺むね￻を　はる。"
          violet: "￹世話￺せわ￻を　￹焼￺や￻かれることが　￹嫌￺きら￻い。\nトレーナーの　￹指示￺しじ￻を　￹聞￺き￻かないので\n￹仲良￺なかよ￻くなるのが　￹難￺むずか￻しい。"
        jp_kanji:
          scarlet: "￹歩￺ある￻くのは　￹苦手￺にがて￻で　こけたりするが\nポッチャマの　プライドは　￹高￺たか￻く\n￹気￺き￻にせず　￹堂々￺どうどう￻と　￹胸￺むね￻を　はる。"
          violet: "￹世話￺せわ￻を　￹焼￺や￻かれることが　￹嫌￺きら￻い。\nトレーナーの　￹指示￺しじ￻を　￹聞￺き￻かないので\n￹仲良￺なかよ￻くなるのが　￹難￺むずか￻しい。"
        en:
          scarlet: "A poor walker, it often falls down. However, its\nstrong pride makes it puff up its chest without\na care."
          violet: "It doesn’t like to be taken care of. It’s difficult to\nbond with since it won’t listen to its Trainer."
        fr:
          scarlet: "Sa démarche est maladroite et il perd souvent\nl’équilibre. Malgré cela, son orgueil le pousse\nà toujours bomber fièrement le torse."
          violet: "Ce Pokémon très désobéissant déteste\nque l’on prenne soin de lui. Nouer des liens\navec lui s’avère donc difficile."
        it:
          scarlet: "Non è molto bravo a camminare e gli capita\nspesso di cadere. Essendo orgoglioso, però,\ngonfia il petto e fa finta di niente."
          violet: "Non gli piace che gli altri si prendano cura di lui.\nÈ difficile farci amicizia perché non ascolta mai\ni consigli di chi lo allena."
        de:
          scarlet: "Es stolpert häufig, weil es nicht gut laufen kann.\nAllerdings ist es sehr stolz, und so rappelt es sich\nimmer wieder unbeirrt auf."
          violet: "Plinfa hasst es, wenn man sich um es kümmert.\nEs ist schwer, Vertrauen zu ihm aufzubauen, da es\nden Befehlen seines Trainers nicht gehorcht."
        es:
          scarlet: "No se le da bien andar. Se tropieza mucho, pero\nsu orgullo le hace sacar pecho como si nada."
          violet: "No le gusta que lo cuiden. Hace caso omiso\nde las indicaciones de su Entrenador, por lo\nque resulta difícil trabar amistad con él."
        ko:
          scarlet: "걷는 것이 서툴러서 넘어질 때도 있지만\n프라이드가 높은 팽도리는\n신경 쓰지 않고 당당하게 가슴을 편다."
          violet: "신세 지는 것을 싫어한다.\n트레이너의 지시를 듣지 않아\n친해지기 어렵다."
        zh_simp:
          scarlet: "不擅长走路，有时还会跌到，\n但波加曼强烈的自尊心\n会让它挺起胸膛，毫不在意。"
          violet: "讨厌被别人照顾。\n因为不听训练家的指示，\n所以要和它关系变好是很困难的。"
        zh_trad:
          scarlet: "不擅長走路，有時還會跌倒，\n但波加曼強烈的自尊心會讓牠\n威風地挺起胸膛，不當一回事。"
          violet: "討厭被別人照顧。\n因為不肯聽訓練家的指示，\n要和牠變得親密是很困難的。"
