      descriptions:
        jp_kana:
          scarlet: "オカルト￹雑誌￺ざっし￻が　￹取￺と￻り￹上￺あ￻げた\n￹未来￺みらい￻の　ビリジオンの　￹姿￺すがた￻と\n￹多￺おお￻くの　￹特徴￺とくちょう￻が　￹一致￺いっち￻する。"
          violet: "わずかな　￹目撃談￺もくげきだん￻によると\n￹光￺ひか￻り￹輝￺かがや￻く　￹剣￺つるぎ￻で　￹大木￺たいぼく￻や\n￹大岩￺おおいわ￻を　なます￹切￺ぎ￻りにしたという。"
        jp_kanji:
          scarlet: "オカルト￹雑誌￺ざっし￻が　￹取￺と￻り￹上￺あ￻げた\n￹未来￺みらい￻の　ビリジオンの　￹姿￺すがた￻と\n￹多￺おお￻くの　￹特徴￺とくちょう￻が　￹一致￺いっち￻する。"
          violet: "わずかな　￹目撃談￺もくげきだん￻によると\n￹光￺ひか￻り￹輝￺かがや￻く　￹剣￺つるぎ￻で　￹大木￺たいぼく￻や\n￹大岩￺おおいわ￻を　なます￹切￺ぎ￻りにしたという。"
        en:
          scarlet: "Many of its physical characteristics match those\nof a Virizion from the future that was covered in\na paranormal magazine."
          violet: "According to the few eyewitness accounts that\nexist, it used its shining blades to julienne large\ntrees and boulders."
        fr:
          scarlet: "Il présente de nombreuses similitudes avec\nle Viridium du futur évoqué dans une revue\nsur les phénomènes paranormaux."
          violet: "D’après de rares témoins, il aurait coupé en\nlamelles des arbres et des rochers immenses\nà l’aide de ses épées lumineuses."
        it:
          scarlet: "Ha molte caratteristiche in comune con\nun Virizion del futuro citato in una rivista\ndi paranormale."
          violet: "Secondo alcune testimonianze isolate, avrebbe\nfatto a fettine grandi alberi e rocce con delle\nspade luminose."
        de:
          scarlet: "Viele seiner Merkmale entsprechen denen eines\nViridium aus der Zukunft, welches in einer\nesoterischen Zeitschrift vorgestellt wurde."
          violet: "Einigen wenigen Augenzeugenberichten zufolge\nhat dieses Pokémon mit seinen leuchtenden\nSchwertern riesige Bäume und Felsen zerkleinert."
        es:
          scarlet: "Presenta numerosas características en común con\nel Virizion del futuro que apareció publicado en\ncierta revista esotérica."
          violet: "Unos pocos testimonios afirman haberlo visto\ncortar en tiras árboles y rocas de gran tamaño\nmediante sus espadas luminosas."
        ko:
          scarlet: "오컬트 잡지에서 다뤘던\n미래 비리디온의 모습과\n많은 특징이 일치한다."
          violet: "얼마 없는 목격담에 의하면\n눈부시게 빛나는 검으로\n큰 나무나 바위를 채 썰듯 베었다고 한다."
        zh_simp:
          scarlet: "与超自然杂志中介绍过的\n未来的毕力吉翁的样子\n有多个特征相吻合。"
          violet: "根据极少的目击报告，\n它用散发着光辉的剑\n将大树和大石头切成了丝。"
        zh_trad:
          scarlet: "與超自然雜誌曾報導的\n未來的畢力吉翁的樣子\n有多項特徵一致。"
          violet: "根據極少數的目擊紀錄，\n牠似乎用光輝燦爛的劍\n將大樹與巨岩切成了絲。"
