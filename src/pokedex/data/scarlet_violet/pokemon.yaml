      descriptions:
        jp_kana:
          scarlet: "￹見境￺みさかい￻なく　￹勝負￺しょうぶ￻を　￹挑￺いど￻む。\n￹倒￺たお￻れるたびに　￹傷￺きず￻つくたびに\n￹強￺つよ￻く　たくましく　￹育￺そだ￻っていく。"
          violet: "￹尖￺とが￻ったツメを　￹獲物￺えもの￻に　￹突￺つ￻き￹立￺た￻て\nついばんでいる。　￹木￺き￻の￹実￺み￻も　￹食￺た￻べるが\n￹基本的￺きほんてき￻に　￹肉食￺にくしょく￻のポケモン。"
        jp_kanji:
          scarlet: "￹見境￺みさかい￻なく　￹勝負￺しょうぶ￻を　￹挑￺いど￻む。\n￹倒￺たお￻れるたびに　￹傷￺きず￻つくたびに\n￹強￺つよ￻く　たくましく　￹育￺そだ￻っていく。"
          violet: "￹尖￺とが￻ったツメを　￹獲物￺えもの￻に　￹突￺つ￻き￹立￺た￻て\nついばんでいる。　￹木￺き￻の￹実￺み￻も　￹食￺た￻べるが\n￹基本的￺きほんてき￻に　￹肉食￺にくしょく￻のポケモン。"
        en:
          scarlet: "They pick fights indiscriminately. They grow\nstronger and more powerful each time they\nfaint or are injured."
          violet: "With its sharp claws, this Pokémon pierces its\nprey, and then it pecks at them. Although it also\nconsumes berries, it’s a carnivore at heart."
        fr:
          scarlet: "Il s’attaque à tout ce qui bouge, sans\ndiscrimination. Ses blessures et échecs\nne font que le rendre plus fort et robuste."
          violet: "Il agrippe ses proies avec ses serres effilées\net les picore. Il lui arrive de manger des Baies,\nmais au fond c’est un carnivore."
        it:
          scarlet: "Si scaglia indiscriminatamente contro qualsiasi\navversario. Diventa più forte ogni volta che viene\nferito o sconfitto."
          violet: "Infilza le prede con i suoi artigli affilati e le\nattacca a beccate. È principalmente carnivoro,\nma può mangiare anche le bacche."
        de:
          scarlet: "Es zettelt willkürlich Kämpfe an und gewinnt mit\njeder Niederlage und Blessur an Stärke."
          violet: "Mit seinen scharfen Fängen packt es seine\nBeute und pickt danach. Generell ist es ein\nFleischfresser, es isst aber auch Beeren."
        es:
          scarlet: "Desafía indiscriminadamente a cualquier rival.\nCada vez que le hieren en combate o se debilita,\nno hace sino aumentar su fortaleza."
          violet: "Es un Pokémon carnívoro, aunque no les hace\nascos a las bayas. Clava con ahínco sus garras\nafiladas en su presa para picotearla sin cesar."
        ko:
          scarlet: "무작정 싸움을 건다.\n쓰러지고 다칠 때마다\n강하고 늠름하게 성장한다."
          violet: "뾰족한 발톱을 사냥감에게 꽂고\n쪼아 먹는다. 나무열매도 먹지만\n기본적으로 육식 포켓몬이다."
        zh_simp:
          scarlet: "会不由分说挑起战斗。\n随着每次被打倒，每次受伤，\n成长得更强更壮。"
          violet: "用尖尖的爪子刺穿猎物\n并进行啄食。也会吃树果，\n但基本上是肉食类宝可梦。"
        zh_trad:
          scarlet: "會不由分說挑起戰鬥。\n隨著每次被打倒，每次受傷，\n會成長得更強更壯。"
          violet: "用尖尖的爪子刺穿獵物\n後啄食。雖然也會吃樹果，\n但基本上是肉食性寶可夢。"
