      descriptions:
        jp_kana:
          scarlet: "￹草原￺そうげん￻を　￹駆￺か￻け￹抜￺ぬ￻ける　￹様子￺ようす￻は\n￹人々￺ひとびと￻の　￹心￺こころ￻を　￹虜￺とりこ￻にしたと\n￹昔￺むかし￻の　￹絵巻￺えまき￻に　￹記￺しる￻されていた。"
          violet: "￹堂々￺どうどう￻とした　￹鳴￺な￻き￹声￺ごえ￻は\n￹威厳￺いげん￻に　あふれ　￹聞￺き￻いたものは\n￹思￺おも￻わず　ひれ￹伏￺ふ￻してしまう。"
        jp_kanji:
          scarlet: "￹草原￺そうげん￻を　￹駆￺か￻け￹抜￺ぬ￻ける　￹様子￺ようす￻は\n￹人々￺ひとびと￻の　￹心￺こころ￻を　￹虜￺とりこ￻にしたと\n￹昔￺むかし￻の　￹絵巻￺えまき￻に　￹記￺しる￻されていた。"
          violet: "￹堂々￺どうどう￻とした　￹鳴￺な￻き￹声￺ごえ￻は\n￹威厳￺いげん￻に　あふれ　￹聞￺き￻いたものは\n￹思￺おも￻わず　ひれ￹伏￺ふ￻してしまう。"
        en:
          scarlet: "An ancient picture scroll shows that people\nwere captivated by its movement as it ran\nthrough prairies."
          violet: "Its magnificent bark conveys a sense of majesty.\nAnyone hearing it can’t help but grovel before it."
        fr:
          scarlet: "Une vieille estampe montre que les êtres humains\nétaient fascinés par ses mouvements lorsqu’il\ncourait dans les champs."
          violet: "Son aboiement est tout simplement majestueux.\nOn ne peut que se prosterner à ses pieds après\nl’avoir entendu."
        it:
          scarlet: "Dal disegno su un’antica pergamena si vede\ncome le sue corse sui prati incantassero\nle persone."
          violet: "Il suo maestoso ruggito ispira un senso\ndi ammirazione. Chiunque lo senta non può\nfar a meno di prostrarsi."
        de:
          scarlet: "Eine alte Bildrolle zeigt, dass die Menschen von\ndem Anblick über Wiesen rennender Arkani\nverzaubert waren."
          violet: "Sein imposantes Bellen klingt so majestätisch,\ndass sich jeder, der es vernimmt, unwillkürlich\nzu Boden wirft."
        es:
          scarlet: "Cuenta un antiguo pergamino que la gente\nse quedaba fascinada al verlo correr por las\npraderas."
          violet: "Su imponente ladrido rebosa majestuosidad\nde tal forma que todo el que lo escucha no\npuede sino postrarse ante él."
        ko:
          scarlet: "초원을 내달리는 모습은\n사람들의 마음을 사로잡았다고\n옛날 그림에 묘사되어 있다."
          violet: "위풍당당한 울음소리는\n위엄이 넘쳐 소리를 들은 상대는\n무의식중에 몸을 움츠리게 된다."
        zh_simp:
          scarlet: "根据过去的画卷记载，\n它在草原上奔驰的姿态\n俘虏了众多人心。"
          violet: "威风凛凛的叫声充满威严，\n不管是谁听到后，\n都会不由自主地跪倒下去。"
        zh_trad:
          scarlet: "根據過去的畫軸記載，\n牠在草原上奔馳的姿態\n擄獲了眾多人心。"
          violet: "威風凜凜的叫聲充滿威嚴，\n不管是誰聽到後，\n都會不由自主地跪倒下去。"
