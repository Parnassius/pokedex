      descriptions:
        jp_kana:
          scarlet: "￹虫￺むし￻ポケモンを　￹狙￺ねら￻って　￹野山￺のやま￻を\n￹大勢￺おおぜい￻の　￹群￺む￻れで　￹飛￺と￻びまわる。\n￹鳴￺な￻き￹声￺ごえ￻が　とても　やかましい。"
          violet: "￹群￺む￻れを　￹作￺つく￻ることで　１￹匹￺ぴき￻での\n￹弱￺よわ￻さを　カバーし￹合￺あ￻っているが\n￹群￺む￻れが　￹大￺おお￻きくなると　もめだす。"
        jp_kanji:
          scarlet: "￹虫￺むし￻ポケモンを　￹狙￺ねら￻って　￹野山￺のやま￻を\n￹大勢￺おおぜい￻の　￹群￺む￻れで　￹飛￺と￻びまわる。\n￹鳴￺な￻き￹声￺ごえ￻が　とても　やかましい。"
          violet: "￹群￺む￻れを　￹作￺つく￻ることで　１￹匹￺ぴき￻での\n￹弱￺よわ￻さを　カバーし￹合￺あ￻っているが\n￹群￺む￻れが　￹大￺おお￻きくなると　もめだす。"
        en:
          scarlet: "They flock around mountains and fields,\nchasing after bug Pokémon. Their singing\nis noisy and annoying."
          violet: "Because they are weak individually, they\nform groups. However, they bicker if the\ngroup grows too big."
        fr:
          scarlet: "Ils cherchent des Pokémon Insecte par monts\net par vaux en grandes volées. Leur chant est\ntrès bruyant."
          violet: "Leur faiblesse les force à vivre en groupe,\nmais quand ils deviennent trop nombreux,\nils finissent par se quereller."
        it:
          scarlet: "Sorvola i campi in grandi stormi a caccia\ndi Pokémon Coleottero. Il suo canto è\nalquanto fastidioso."
          violet: "Da soli sono deboli, quindi si muovono\nin gruppo. Tuttavia, se sono troppi\nfiniscono per litigare."
        de:
          scarlet: "Auf der Suche nach Käfer-Pokémon fliegen\nSchwärme von ihnen durchs Land. Ihr Ruf erzeugt\ngroßen Lärm."
          violet: "Einzeln sind sie schwach, daher bilden sie\nSchwärme. Werden diese jedoch zu groß,\nzanken sie sich."
        es:
          scarlet: "Sobrevuela los campos en bandada buscando\nPokémon de tipo Bicho. Chilla de forma muy\nestridente."
          violet: "Son débiles cuando van solos, por lo que forman\ngrupos. Sin embargo, se pelean si el grupo crece\ndemasiado."
        ko:
          scarlet: "벌레포켓몬을 노리고 산과 들을\n많은 무리로 날아다닌다.\n울음소리가 무척 시끄럽다."
          violet: "무리를 만드는 것으로 한 마리로는\n약하다는 단점을 커버하고 있지만\n무리가 커지면 다투기 시작한다."
        zh_simp:
          scarlet: "以庞大的群体在山野间飞来飞去，\n追捕虫宝可梦。\n叫声非常吵闹。"
          violet: "会成群结队来弥补\n单枪匹马的弱小，然而\n群体一旦变大又会起争执。"
        zh_trad:
          scarlet: "為了獵捕蟲寶可夢，\n以龐大的群體在山野間飛來飛去。\n叫聲非常吵鬧。"
          violet: "會成群結隊來互補單獨\n１隻時的弱小，然而群體\n一旦變大卻又會起爭執。"
