          scarlet: "￹相手￺あいて￻の　￹動￺うご￻きを　￹予知￺よち￻するとき\nふたまたに　なっている　￹尻尾￺しっぽ￻の　￹先￺さき￻は\n￹微妙￺びみょう￻に　￹揺￺ゆ￻れている。"
          violet: "￹全身￺ぜんしん￻の　￹細￺こま￻かな　￹体毛￺たいもう￻で\n￹空気￺くうき￻の　￹流￺なが￻れを　￹感￺かん￻じとり\n￹相手￺あいて￻の　￹行動￺こうどう￻を　￹予測￺よそく￻する。"
        en:
          scarlet: "The tip of its forked tail quivers when it is\npredicting its opponent’s next move."
          violet: "It uses the fine hair that covers its body to sense\nair currents and predict its enemy’s actions."
        fr:
          scarlet: "Quand il prédit la prochaine attaque\nde son adversaire, l’extrémité fourchue\nde sa queue frémit."
          violet: "Son fin pelage lui permet de percevoir tout\nchangement dans l’air et ainsi de prédire\nles mouvements de ses adversaires."
        it:
          scarlet: "Mentre prevede la prossima mossa del nemico,\nle punte della sua coda biforcuta tremano\nlievemente."
          violet: "Il pelo sottile che ricopre il suo corpo gli\npermette di percepire le correnti d’aria e\nprevedere le mosse del nemico."
        de:
          scarlet: "Die Spitze seines geteilten Schweifs bebt, wenn\nes die nächste Attacke seines Feindes voraussagt."
          violet: "Mit den feinen Haaren, die seinen ganzen Körper\nbedecken, nimmt es Luftströmungen wahr.\nDadurch sagt es gegnerische Attacken voraus."
        es:
          scarlet: "Al predecir el siguiente movimiento de su rival,\nlos extremos de su cola bífida tiemblan\nligeramente."
          violet: "Usa el corto pelaje que cubre su cuerpo para\nsentir el viento y predecir las acciones enemigas."
        ko:
          scarlet: "상대의 움직임을 예지할 때\n두 갈래로 갈라져 있는 꼬리의\n끝이 미세하게 떨린다."
          violet: "전신의 촘촘한 털로\n공기의 흐름을 감지해\n상대방의 행동을 예측한다."
        zh_simp:
          scarlet: "预知对手的行动时，\n分叉的尾巴前端就会微妙地摆动。"
          violet: "会用全身纤细的体毛\n来感受空气的流动，\n以此来预测对手的行动。"
        zh_trad:
          scarlet: "預知對手的行動時，\n分叉的尾巴前端就會\n微妙地擺動。"
          violet: "會用全身細緻的體毛\n感受空氣的流動，\n藉以預測對手的行動。"
