          scarlet: "￹背￺せ￻びれで　￹熱￺ねつ￻を　￹吸収￺きゅうしゅう￻して\n￹氷￺こおり￻エネルギーに　￹変換￺へんかん￻する。\n￹高温￺こうおん￻ほど　エネルギーが　￹溜￺た￻まる。"
          violet: "￹岩場￺いわば￻や　￹森林￺しんりん￻に　￹生息￺せいそく￻する。\n￹背￺せ￻びれの　￹力￺ちから￻で　￹巣穴￺すあな￻の￹中￺なか￻を\n￹冷凍庫￺れいとうこ￻のように　￹冷￺ひ￻やしている。"
        jp_kanji:
          scarlet: "￹背￺せ￻びれで　￹熱￺ねつ￻を　￹吸収￺きゅうしゅう￻して\n￹氷￺こおり￻エネルギーに　￹変換￺へんかん￻する。\n￹高温￺こうおん￻ほど　エネルギーが　￹溜￺た￻まる。"
          violet: "￹岩場￺いわば￻や　￹森林￺しんりん￻に　￹生息￺せいそく￻する。\n￹背￺せ￻びれの　￹力￺ちから￻で　￹巣穴￺すあな￻の￹中￺なか￻を\n￹冷凍庫￺れいとうこ￻のように　￹冷￺ひ￻やしている。"
        en:
          scarlet: "Frigibax absorbs heat through its dorsal fin and\nconverts the heat into ice energy. The higher the\ntemperature, the more energy Frigibax stores."
          violet: "This Pokémon lives in forests and craggy areas.\nUsing the power of its dorsal fin, it cools the\ninside of its nest like a refrigerator."
        fr:
          scarlet: "Sa crête dorsale absorbe la chaleur et la convertit\nen énergie de type Glace. Plus la chaleur est\nintense, plus il emmagasine de l’énergie."
          violet: "Il vit dans les zones rocheuses et les forêts.\nSa crête dorsale lui permet de refroidir l’intérieur\nde son nid à la manière d’un congélateur."
        it:
          scarlet: "Assorbe il calore con la pinna dorsale e\nlo trasforma in energia Ghiaccio. Più alta\nè la temperatura, più energia accumula."
          violet: "Vive nelle foreste e in aree rocciose.\nUsa la cresta dorsale per raffreddare l’interno\ndella tana quasi come fosse un frigorifero."
        de:
          scarlet: "Mit seiner Rückenflosse absorbiert es Wärme und\nwandelt diese in Eis-Energie um. Je wärmer es ist,\ndesto mehr Energie kann es speichern."
          violet: "Es lebt in Wäldern und Felsgebieten. Mit der\nKraft seiner Rückenflosse kühlt es sein Nest wie\neine Gefriertruhe herunter."
        es:
          scarlet: "Absorbe el calor a través de la placa dorsal y lo\nconvierte en energía gélida. Cuanto más alta es\nla temperatura, más energía acumula."
          violet: "Vive en bosques y entornos pedregosos. Se vale\ndel poder de su placa dorsal para refrigerar su\nmadriguera como si fuera un frigorífico."
        ko:
          scarlet: "등지느러미로 열을 흡수해서\n얼음 에너지로 변환한다.\n고온일수록 에너지가 많이 모인다."
          violet: "암석 지대나 삼림에 서식한다.\n등지느러미의 힘으로 굴 안을\n냉장고처럼 차갑게 만든다."
        zh_simp:
          scarlet: "会用背鳍来吸收热量，\n并将其转换成冰之能量。\n温度越高，积累的能量就越多。"
          violet: "栖息在岩石地带或森林里。\n会用背鳍的力量将巢穴里的\n温度降到如冷冻库般寒冷。"
        zh_trad:
          scarlet: "會用背鰭吸收熱能\n以轉換成冰之能量。\n溫度越高，累積的能量就越多。"
          violet: "棲息在岩石地帶或森林裡。\n會用背鰭的力量將巢穴裡的\n溫度降到如冷凍庫般寒冷。"
