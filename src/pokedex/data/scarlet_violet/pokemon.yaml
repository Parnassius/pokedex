          violet: "￹近年￺きんねん￻　￹目撃例￺もくげきれい￻が　ある。\n￹古￺ふる￻い　￹探検記￺たんけんき￻に　￹記￺しる￻された\n￹謎￺なぞ￻の　￹物体￺ぶったい￻に　￹似￺に￻た　ポケモン。"
        jp_kanji:
          scarlet: "オカルト￹雑誌￺ざっし￻が　￹紹介￺しょうかい￻した\n￹宇宙人￺うちゅうじん￻が　￹送￺おく￻り￹込￺こ￻んできた\n￹科学兵器￺かがくへいき￻に　よく　￹似￺に￻ている。"
          violet: "￹近年￺きんねん￻　￹目撃例￺もくげきれい￻が　ある。\n￹古￺ふる￻い　￹探検記￺たんけんき￻に　￹記￺しる￻された\n￹謎￺なぞ￻の　￹物体￺ぶったい￻に　￹似￺に￻た　ポケモン。"
        en:
          scarlet: "This Pokémon closely resembles a scientific\nweapon that a paranormal magazine claimed\nwas sent to this planet by aliens."
          violet: "Sightings of this Pokémon have occurred in\nrecent years. It resembles a mysterious object\ndescribed in an old expedition journal."
        fr:
          scarlet: "Il ressemble beaucoup à une arme sophistiquée\nqui serait d’origine extraterrestre, selon une\nrevue consacrée aux phénomènes paranormaux."
          violet: "Ce Pokémon a été aperçu à plusieurs reprises ces\ndernières années. Il ressemble à une mystérieuse\nentité évoquée dans un vieux récit d’exploration."
        it:
          scarlet: "Somiglia molto a un’arma ad alta tecnologia\nche, secondo una rivista di paranormale,\nsarebbe stata inviata qui dagli alieni."
          violet: "Alcuni riportano di averlo avvistato negli\nultimi anni. Somiglia a un oggetto misterioso\ndescritto in un antico diario di viaggio."
        de:
          scarlet: "Es ähnelt stark einer wissenschaftlichen Waffe,\ndie einer esoterischen Zeitschrift zufolge von\nAußerirdischen auf den Planeten geschickt wurde."
          violet: "In den letzten Jahren gab es Sichtungen dieses\nPokémon. Ein alter Expeditionsbericht erwähnt\nein mysteriöses Objekt, dem es ähnelt."
        es:
          scarlet: "Su aspecto recuerda al de un arma científica\nde origen extraterrestre que apareció en un\nartículo de una revista esotérica."
          violet: "Se han constatado avistamientos en los\núltimos años. Su aspecto se asemeja al de un\nmisterioso objeto descrito en un diario antiguo."
        ko:
          scarlet: "오컬트 잡지에서 소개된 적 있는\n우주인이 보낸 과학 병기와 많이 닮았다."
          violet: "근년에 목격된 사례가 있다.\n오래된 탐험기에 기록된\n정체불명의 물체를 닮은 포켓몬."
        zh_simp:
          scarlet: "它与超自然杂志中\n所介绍的外星人送来的\n科学兵器十分相似。"
          violet: "近年有人目击到它。\n是与古老的探险记中记载的\n不明物体长得很像的宝可梦。"
        zh_trad:
          scarlet: "與超自然雜誌裡介紹的\n外星人送來的科學兵器\n長得極為相似。"
          violet: "近年曾經有人目擊到牠。\n是與古老的探險記裡記載的\n不明物體長得很像的寶可夢。"
