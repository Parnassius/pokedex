          violet: "￹頭￺あたま￻を　￹激￺はげ￻しく　￹揺￺ゆ￻さぶっても\n￹首￺くび￻の　￹筋肉￺きんにく￻が　￹強￺つよ￻いおかげで\nダメージは　まったく　ない。"
        jp_kanji:
          scarlet: "どれだけ　￹堅￺かた￻い　￹樹木￺じゅもく￻でも\n￹秒間￺びょうかん￻　１６￹連打￺れんだ￻の　クチバシ\n￹攻撃￺こうげき￻で　￹穴￺あな￻を　あけてしまう。"
          violet: "￹頭￺あたま￻を　￹激￺はげ￻しく　￹揺￺ゆ￻さぶっても\n￹首￺くび￻の　￹筋肉￺きんにく￻が　￹強￺つよ￻いおかげで\nダメージは　まったく　ない。"
        en:
          scarlet: "Using its beak to strike 16 times per second,\nit opens holes in even the hardest of trees."
          violet: "Pikipek has strong muscles in its neck, so it won’t\nhurt itself even if it violently shakes its head."
        fr:
          scarlet: "Capable de donner seize coups de bec\nen l’espace d’une seconde, il peut perforer\nles troncs d’arbre les plus coriaces."
          violet: "Les muscles de son cou sont très puissants,\nce qui le protège de toute blessure quand\nil secoue violemment la tête."
        it:
          scarlet: "Riesce a fare buchi anche negli alberi più coriacei\ngrazie al suo becco in grado di colpire al ritmo\ndi 16 volte al secondo."
          violet: "Grazie ai forti muscoli del collo,\nnon subisce danni alla testa neanche\nse la agita violentemente."
        de:
          scarlet: "Mit seinem Schnabel kann es 16-mal pro\nSekunde zuschlagen und dadurch in jeden\nnoch so harten Baum Löcher hacken."
          violet: "Selbst wenn sein Kopf heftig durchgerüttelt wird,\nschadet ihm das dank seiner starken Halsmuskeln\nüberhaupt nicht."
        es:
          scarlet: "Puede perforar los troncos más duros gracias\na una impresionante cadencia de 16 picotazos\npor segundo."
          violet: "Gracias a la robusta musculatura de su cuello,\npuede picotear a ritmo frenético sin hacerse\ndaño."
        ko:
          scarlet: "아무리 튼튼한 나무라도\n초당 16연타의 부리 공격으로\n구멍을 뚫어 버린다."
          violet: "머리를 격렬하게 흔들어도\n강한 목 근육 덕분에\n전혀 데미지를 입지 않는다."
        zh_simp:
          scarlet: "无论多么坚硬的树木\n都会被它每秒１６连击的\n鸟嘴攻击啄出洞。"
          violet: "颈部的肌肉很强壮，\n因此即使激烈摇晃头部，\n也完全不会有损伤。"
        zh_trad:
          scarlet: "無論多麼堅硬的樹木\n都會被牠每秒１６連擊的\n鳥嘴攻擊啄出洞來。"
          violet: "幸虧頸部的肌肉強韌，\n因此即使激烈地搖晃頭部，\n也不會造成任何傷害。"
