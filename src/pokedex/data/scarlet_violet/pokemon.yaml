          violet: "￹触角￺しょっかく￻　￹同士￺どうし￻が　ぶつかると\nコロン　コロンと　￹木琴￺もっきん￻に　￹似￺に￻た\n￹音色￺ねいろ￻を　￹奏￺かな￻でる。"
        jp_kanji:
          scarlet: "￹足￺あし￻が　￹短￺みじか￻く　こけそうになるたび\n￹硬￺かた￻い　￹触角￺しょっかく￻が　こすれあって\n￹木琴￺もっきん￻のような　￹音￺おと￻が　￹響￺ひび￻く。"
          violet: "￹触角￺しょっかく￻　￹同士￺どうし￻が　ぶつかると\nコロン　コロンと　￹木琴￺もっきん￻に　￹似￺に￻た\n￹音色￺ねいろ￻を　￹奏￺かな￻でる。"
        en:
          scarlet: "Its legs are short. Whenever it stumbles, its stiff\nantennae clack with a xylophone-like sound."
          violet: "When its antennae hit each other, it sounds like\nthe music of a xylophone."
        fr:
          scarlet: "Il possède de courtes pattes. Quand il tombe,\nses antennes solides s’entrechoquent et émettent\ndes sons semblables à ceux d’un xylophone."
          violet: "Quand ses antennes s’entrechoquent, elles\nproduisent des sons agréables qui rappellent\nceux d’un xylophone."
        it:
          scarlet: "Quando inciampa con le sue zampe corte,\nle antenne si urtano producendo un suono simile\na quello di uno xilofono."
          violet: "Quando le antenne si scontrano, producono\nun suono simile a quello di uno xilofono:\nklon, klon!"
        de:
          scarlet: "Seine Beine sind kurz. Stolpert es, reiben seine\nstarren Antennen aneinander und klingen dabei\nwie ein Xylofon."
          violet: "Wenn seine zwei Antennen einander berühren,\nerinnert dies an den Klang eines Xylofons."
        es:
          scarlet: "Tiene las patas cortas. Cada vez que se tropieza,\nsus antenas chocan y suenan como un xilófono."
          violet: "Si choca sus antenas, emite un sonido similar al\nde un xilófono."
        ko:
          scarlet: "다리가 짧아 넘어지려고 할 때마다\n단단한 더듬이가 서로 비벼져서\n실로폰 같은 소리가 울린다."
          violet: "더듬이가 서로 부딪히면\n딩동딩동 실로폰 같은\n음색을 연주한다."
        zh_simp:
          scarlet: "每当腿短的它快要跌倒时，\n坚硬的触角就会互相摩擦，\n发出如木琴般的声音。"
          violet: "触角之间互相碰撞的话，\n就会奏出叮叮咚咚\n如同木琴一般的音色。"
        zh_trad:
          scarlet: "每當腳短短的牠快要跌倒時，\n堅硬的觸角就會互相摩擦，\n發出如木琴般的聲響。"
          violet: "觸角之間互相碰撞時，\n會叮叮咚咚地奏出\n如同木琴一般的音色。"
