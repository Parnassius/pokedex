        jp_kanji:
          scarlet: "￹鼻先￺はなさき￻で　￹地面￺じめん￻を　￹掘￺ほ￻って\n￹食￺た￻べるものを　￹探￺さが￻しだす。\n￹凍￺こお￻った　￹地面￺じめん￻も　へっちゃらだ。"
          violet: "￹鼻先￺はなさき￻を　こすりあわせ　￹地面￺じめん￻を\n￹掘￺ほ￻りながら　エサを　￹探￺さが￻している。\nたまに　￹温泉￺おんせん￻を　￹掘￺ほ￻り￹当￺あ￻てる。"
        en:
          scarlet: "It searches for food by digging into the ground\nwith its snout. Even frozen ground doesn’t give it\nany trouble."
          violet: "It rubs its snout against the ground, digging\nthrough the soil as it searches for food.\nSometimes it digs up hot springs."
        fr:
          scarlet: "Il creuse la terre avec le bout de son nez pour\ntrouver de la nourriture. Même un sol gelé\nne lui résiste pas."
          violet: "Il fouille le sol avec sa truffe à la recherche\nde nourriture et découvre parfois des sources\nchaudes."
        it:
          scarlet: "Scava con la punta del naso alla ricerca di cibo.\nPuò penetrare persino il terreno ghiacciato."
          violet: "Scava alla ricerca di cibo sfregando il naso\ncontro il terreno. A volte finisce per scoprire\ndelle sorgenti termali."
        de:
          scarlet: "Mit seiner Nase gräbt es nach Nahrung.\nSelbst gefrorener Boden bereitet ihm keine\nProbleme."
          violet: "Auf Nahrungssuche wühlt es sich mit der Nase\ndurch das Erdreich. Manchmal stößt es dabei\nauf heiße Quellen."
        es:
          scarlet: "Usa la punta del hocico para escarbar el suelo en\nbusca de alimento. Ni siquiera la tierra congelada\nle supone obstáculo alguno."
          violet: "Frota la punta del hocico contra el suelo para\ndesenterrar comida. A veces descubre aguas\ntermales."
        ko:
          scarlet: "코끝으로 땅을 파서\n먹을 것을 찾아낸다.\n얼어붙은 땅도 문제없다."
          violet: "코끝을 비벼\n땅을 파면서 먹이를 찾는다.\n가끔 온천도 파낸다."
        zh_simp:
          scarlet: "会用鼻子的前端挖掘\n地面寻找食物，即使是\n结冰的地面也毫无问题。"
          violet: "会通过摩擦鼻尖\n来挖掘地面并觅食。\n偶尔会挖到温泉。"
        zh_trad:
          scarlet: "會用鼻子先端在地面挖洞\n找出食物。即使地面結了冰\n也絲毫不會受阻礙。"
          violet: "會用鼻子前端摩擦地面\n一邊挖地一邊覓食。\n偶爾會挖到溫泉。"
