          violet: "￹磯辺￺いそべ￻で　￹見￺み￻かけることが　￹多￺おお￻い。\nある￹程度￺ていど￻の　￹時間￺じかん￻であれば\n￹陸上￺りくじょう￻でも　￹活動￺かつどう￻できる。"
        jp_kanji:
          scarlet: "この￹姿￺すがた￻の　カラナクシは\n￹減￺へ￻りつつあるという　￹論文￺ろんぶん￻が\n￹最近￺さいきん￻　￹発表￺はっぴょう￻された。"
          violet: "￹磯辺￺いそべ￻で　￹見￺み￻かけることが　￹多￺おお￻い。\nある￹程度￺ていど￻の　￹時間￺じかん￻であれば\n￹陸上￺りくじょう￻でも　￹活動￺かつどう￻できる。"
        en:
          scarlet: "A recently published research paper states that\nthis form of Shellos is gradually decreasing\nin number."
          violet: "This Pokémon can often be seen along seashores.\nIt’s capable of spending a limited amount of time\non land."
        fr:
          scarlet: "Selon un article de recherche publié récemment,\nles Sancoki ayant cette apparence sont de moins\nen moins nombreux."
          violet: "On les aperçoit souvent le long des côtes.\nIls ne peuvent pas rester trop longtemps\nsur la terre ferme."
        it:
          scarlet: "Secondo studi recenti, gli esemplari di Shellos\nin questa forma stanno diminuendo."
          violet: "Si trova spesso sulle coste rocciose ma è in grado\nanche di restare sulla terraferma per qualche\ntempo."
        de:
          scarlet: "Kürzlich wurde eine Studie veröffentlicht, aus der\nhervorgeht, dass die Zahl der Schalellos in dieser\nForm allmählich abnimmt."
          violet: "Dieses Pokémon ist oft an der Küste anzutreffen.\nFür eine begrenzte Zeit kann es auch an Land\nverweilen."
        es:
          scarlet: "Según un artículo publicado recientemente,\nel número de ejemplares que presentan esta\nforma está disminuyendo."
          violet: "Se suelen avistar cerca de las orillas. No pueden\npermanecer mucho tiempo en tierra firme."
        ko:
          scarlet: "이 모습을 한 깝질무의 수가\n점점 줄어들고 있다는 논문이\n최근 발표되었다."
          violet: "바닷가에서 많이 발견된다.\n어느 정도의 시간이라면\n육지에서도 활동할 수 있다."
        zh_simp:
          scarlet: "最近有论文指出，\n这个样子的无壳海兔\n正在逐渐减少。"
          violet: "经常能在岩岸发现它的身影。\n如果只是一定程度的时间，\n它也能在陆地上活动。"
        zh_trad:
          scarlet: "最近的論文指出，\n這個樣子的無殼海兔\n數量正在逐漸減少。"
          violet: "經常能在岩岸發現牠的身影。\n即使是在陸地上，也有辦法\n活動上一定程度的時間。"
