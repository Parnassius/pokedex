      descriptions:
        jp_kana:
          scarlet: "３￹個￺こ￻の　チビノーズと　￹呼￺よ￻ばれる\nユニットを　￹磁力￺じりょく￻で　￹操￺あやつ￻り\n３￹方向￺ほうこう￻から　￹相手￺あいて￻を　￹仕留￺しと￻める。"
          violet: "￹強￺つよ￻い　￹磁力￺じりょく￻を　￹放￺はな￻っているので\n￹近￺ちか￻くにある　￹電化製品￺でんかせいひん￻は\n￹使￺つか￻いものに　ならなくなってしまう。"
        jp_kanji:
          scarlet: "３￹個￺こ￻の　チビノーズと　￹呼￺よ￻ばれる\nユニットを　￹磁力￺じりょく￻で　￹操￺あやつ￻り\n３￹方向￺ほうこう￻から　￹相手￺あいて￻を　￹仕留￺しと￻める。"
          violet: "￹強￺つよ￻い　￹磁力￺じりょく￻を　￹放￺はな￻っているので\n￹近￺ちか￻くにある　￹電化製品￺でんかせいひん￻は\n￹使￺つか￻いものに　ならなくなってしまう。"
        en:
          scarlet: "It controls three units called Mini-Noses using\nmagnetic force. With them, it can attack a foe\nfrom three directions."
          violet: "Probopass radiates such a powerful magnetic\nfield that nearby electrical appliances are\nrendered useless while it’s around."
        fr:
          scarlet: "Il dirige par magnétisme trois petites unités\nappelées Mini-nez qui lui permettent d’éliminer\nses adversaires en les attaquant de trois côtés."
          violet: "Il émet un puissant champ magnétique\nqui rend tous les appareils électriques\ndes alentours inutilisables."
        it:
          scarlet: "Controllando magneticamente tre piccole\nunità dette Mininasi, può battere il nemico\nattaccandolo da tre punti diversi."
          violet: "Emette un forte campo magnetico che rende\ninutilizzabili le apparecchiature elettriche\nnelle vicinanze."
        de:
          scarlet: "Mit magnetischer Kraft steuert es drei Einheiten,\ndie „Mininasen“ genannt werden. So greift es\nGegner aus drei Richtungen an."
          violet: "Es strahlt eine starke magnetische Kraft aus,\nweshalb Elektrogeräte in seiner Nähe\nunbrauchbar werden."
        es:
          scarlet: "Controla magnéticamente tres unidades\nllamadas mininarices, con las que ataca\nal rival desde tres direcciones diferentes."
          violet: "Emite un magnetismo tan potente que\ninutiliza cualquier electrodoméstico\nmientras se encuentre cerca."
        ko:
          scarlet: "꼬마코파스라고 불리는\n3개의 유닛을 자력으로 조종해\n3방향에서 상대를 꼼짝 못 하게 한다."
          violet: "강한 자력을 뿜어내기 때문에\n가까이 있는 전기 제품은\n망가져 버리고 만다."
        zh_simp:
          scarlet: "会用磁力操纵３个\n被称为小朝北鼻的组件，\n从３个方向干掉对手。"
          violet: "因为会释放强大的磁力，\n所以导致附近的电器都变得无法使用。"
        zh_trad:
          scarlet: "會以磁力操縱３個\n被稱為小朝北鼻的組件，\n從３個方向解決對手。"
          violet: "因為會釋放強大的磁力，\n導致附近的電器都變得\n無法使用。"
