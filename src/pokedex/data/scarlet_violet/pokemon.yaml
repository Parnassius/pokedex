          violet: "￹尻尾￺しっぽ￻の　￹先￺さき￻から　くさい　￹臭￺にお￻いの\n￹液体￺えきたい￻を　￹飛￺と￻ばして　￹攻撃￺こうげき￻。\n￹連射￺れんしゃ￻すると　￹臭￺にお￻いは　￹弱￺よわ￻まる。"
        jp_kanji:
          scarlet: "￹尻尾￺しっぽ￻の　￹先￺さき￻から　ひどい　￹臭￺にお￻いの\n￹液体￺えきたい￻を　￹飛￺と￻ばして　￹攻撃￺こうげき￻するが\n￹上￺うえ￻から　￹狙￺ねら￻われると　￹戸惑￺とまど￻う。"
          violet: "￹尻尾￺しっぽ￻の　￹先￺さき￻から　くさい　￹臭￺にお￻いの\n￹液体￺えきたい￻を　￹飛￺と￻ばして　￹攻撃￺こうげき￻。\n￹連射￺れんしゃ￻すると　￹臭￺にお￻いは　￹弱￺よわ￻まる。"
        en:
          scarlet: "It attacks by spraying a horribly smelly\nfluid from the tip of its tail. Attacks from\nabove confound it."
          violet: "It attacks by spraying a repugnant fluid\nfrom its tail, but the stench dulls after\na few squirts."
        fr:
          scarlet: "Du bout de sa queue, il projette un liquide\nfétide sur ses adversaires. Les attaques\naériennes le prennent de court."
          violet: "Il attaque en projetant un liquide nauséabond\nsur ses adversaires. L’odeur s’atténue quand\nil tire en rafale."
        it:
          scarlet: "Attacca spruzzando un fluido\npuzzolente dalla punta della coda.\nGli attacchi dall’alto lo confondono."
          violet: "Attacca spruzzando un liquido mefitico\ndalla punta della coda. Se attacca a\nripetizione, l’odore si affievolisce."
        de:
          scarlet: "Es greift mit einer übel riechenden Substanz\nan, die es aus der Spitze seines Schweifs\nversprüht. Angriffe von oben verblüffen es."
          violet: "Es greift an, indem es eine stinkende Flüssigkeit\naus der Spitze seines Schweifs versprüht. Feuert\nes sie wiederholt ab, lässt der Geruch nach."
        es:
          scarlet: "Ataca emitiendo un fluido maloliente\npor la punta de la cola. Los ataques\naéreos lo confunden."
          violet: "Ataca expulsando un líquido maloliente por\nla punta de su cola. Sin embargo, el hedor\nse va debilitando si lo hace repetidamente."
        ko:
          scarlet: "꼬리 끝에서 심한 냄새가 나는\n액체를 날려 공격하지만\n위에서 공격을 받게 되면 당황한다."
          violet: "꼬리 끝에서 역한 냄새가 나는\n액체를 뿌려 공격한다.\n연속해서 뿌리면 냄새가 약해진다."
        zh_simp:
          scarlet: "会从尾巴尖端喷出奇臭无比的\n液体进行攻击，然而面对来自\n上方的攻击时会不知所措。"
          violet: "从尾巴尖端喷出\n散发臭味的液体进行攻击。\n连发时臭味会减轻。"
        zh_trad:
          scarlet: "會從尾巴尖端噴出惡臭無比\n的液體進行攻擊，但對來自\n上方的襲擊卻會不知所措。"
          violet: "會從尾巴尖端噴出\n充滿臭味的液體進行攻擊。\n連發時臭味會減輕。"
