          scarlet: "￹水￺みず￻の　きれいな　￹池￺いけ￻に　￹生息￺せいそく￻。\n￹夜￺よる￻に　なると　お￹尻￺しり￻が　￹光￺ひか￻り\n￹点滅￺てんめつ￻させて　￹仲間￺なかま￻と　￹会話￺かいわ￻。"
          violet: "お￹尻￺しり￻の　￹光￺ひかり￻を　￹点滅￺てんめつ￻させて\n￹仲間￺なかま￻と　￹会話￺かいわ￻する。　イルミーゼの\n￹出￺だ￻す　￹甘￺あま￻い　￹香￺かお￻りが　￹大好￺だいす￻き。"
        jp_kanji:
          scarlet: "￹水￺みず￻の　きれいな　￹池￺いけ￻に　￹生息￺せいそく￻。\n￹夜￺よる￻に　なると　お￹尻￺しり￻が　￹光￺ひか￻り\n￹点滅￺てんめつ￻させて　￹仲間￺なかま￻と　￹会話￺かいわ￻。"
          violet: "お￹尻￺しり￻の　￹光￺ひかり￻を　￹点滅￺てんめつ￻させて\n￹仲間￺なかま￻と　￹会話￺かいわ￻する。　イルミーゼの\n￹出￺だ￻す　￹甘￺あま￻い　￹香￺かお￻りが　￹大好￺だいす￻き。"
        en:
          scarlet: "It lives around clean ponds. At night, its rear\nlights up. It converses with others by flashing\nits light."
          violet: "It flashes the light on its rear to communicate\nwith other Volbeat. It loves the sweet aroma\ngiven off by Illumise."
        fr:
          scarlet: "Il vit aux abords des étangs limpides.\nLa nuit, il fait clignoter son postérieur\nafin de communiquer avec ses congénères."
          violet: "Pour communiquer avec ses semblables,\nce Pokémon fait clignoter son postérieur. Il adore\nle doux parfum que dégagent les Lumivole."
        it:
          scarlet: "Vive vicino a stagni puliti. Di notte comunica\ncon i suoi simili utilizzando la luce intermittente\ndella coda."
          violet: "Comunica con i suoi simili grazie alla luce\nintermittente della coda. Adora il dolce\naroma di Illumise."
        de:
          scarlet: "Es lebt bei Teichen mit reinem Wasser. Nachts\nleuchtet sein Hinterteil und es kommuniziert\ndurch dessen Blinken mit Artgenossen."
          violet: "Volbeat kommuniziert mit seinen Artgenossen,\nindem es mit dem Licht an seinem Hinterteil\nblinkt. Es liebt den süßen Duft von Illumise."
        es:
          scarlet: "Vive cerca de estanques de agua clara.\nDe noche, hace parpadear la luz de la cola\npara comunicarse con otros de su especie."
          violet: "Se comunica con sus congéneres haciendo\nparpadear la luz de la cola. Adora el dulce\naroma que desprende Illumise."
        ko:
          scarlet: "물이 깨끗한 연못에 서식한다.\n밤이 되면 엉덩이가 빛나며\n이를 깜빡여서 동료와 대화한다."
          violet: "엉덩이의 빛을 반짝거려\n동료와 대화한다. 네오비트가\n내는 달콤한 향기를 아주 좋아한다."
        zh_simp:
          scarlet: "栖息在水质清澈的池塘里。\n到了晚上臀部就会发光，然后它会\n通过那闪烁的光芒来和伙伴交流。"
          violet: "会闪烁臀部的光\n来和伙伴交流。非常喜欢\n甜甜萤放出的甜甜香气。"
        zh_trad:
          scarlet: "棲息在水質清澈的池塘裡。\n到了晚上臀部就會發光，\n透過光芒的閃爍來和夥伴對話。"
          violet: "會閃爍臀部的光芒\n來與夥伴交流。最喜歡\n甜甜螢放出的甜甜香氣。"
