          scarlet: "￹面倒見￺めんどうみ￻の　いい　￹性格￺せいかく￻。\nエサの￹他￺ほか￻に　シズクモも　￹水泡￺すいほう￻の\n￹中￺なか￻で　￹守￺まも￻りつつ　￹歩￺ある￻き￹回￺まわ￻る。"
          violet: "ねばねばの　￹水泡￺すいほう￻を　￹発射￺はっしゃ￻。\n￹閉￺と￻じこめた　￹敵￺てき￻が　￹気￺き￻を　￹失￺うしな￻うと\n￹大￺おお￻あごで　￹噛￺か￻み￹砕￺くだ￻いてしまう。"
        jp_kanji:
          scarlet: "￹面倒見￺めんどうみ￻の　いい　￹性格￺せいかく￻。\nエサの￹他￺ほか￻に　シズクモも　￹水泡￺すいほう￻の\n￹中￺なか￻で　￹守￺まも￻りつつ　￹歩￺ある￻き￹回￺まわ￻る。"
          violet: "ねばねばの　￹水泡￺すいほう￻を　￹発射￺はっしゃ￻。\n￹閉￺と￻じこめた　￹敵￺てき￻が　￹気￺き￻を　￹失￺うしな￻うと\n￹大￺おお￻あごで　￹噛￺か￻み￹砕￺くだ￻いてしまう。"
        en:
          scarlet: "A caring Pokémon, Araquanid carries Dewpider\naround inside its water bubble to protect them as\nit walks. It protects its food in its bubble too."
          violet: "It launches sticky water bubbles. Foes who lose\nconsciousness while trapped inside these bubbles\nwill get torn apart by Araquanid’s gnashing jaws."
        fr:
          scarlet: "Ce Pokémon très attentionné protège les Araqua\nen les abritant dans sa bulle lorsqu’il se déplace.\nIl emmagasine aussi sa nourriture dans sa bulle."
          violet: "Il projette une bulle d’eau visqueuse pour piéger\nsa cible. Une fois que celle-ci est inconsciente,\nil se sert de ses mandibules pour la dévorer."
        it:
          scarlet: "Ha un carattere molto premuroso. Nella sua\nbolla d’acqua non porta con sé solo il cibo,\nma anche i Dewpider per proteggerli."
          violet: "Lancia delle bolle d’acqua appiccicose per\ninglobare il nemico. Quando questi perde i sensi,\nlo fa a pezzi con le grosse mandibole."
        de:
          scarlet: "Dieses sehr fürsorgliche Pokémon trägt\nnicht nur Futter in seiner Wasserblase herum,\nsondern auch Araqua, um sie zu schützen."
          violet: "Es verschießt klebrige Wasserblasen, um Feinde\ndarin einzuschließen. Werden diese bewusstlos,\nzerlegt es sie mit seinem großen Mundwerkzeug."
        es:
          scarlet: "Es un Pokémon muy solícito. Además de guardar\nalimento dentro de su burbuja, también protege\nDewpider en su interior mientras se desplaza."
          violet: "Dispara burbujas viscosas en las que encierra\nal enemigo. Cuando este pierde el conocimiento,\nlo hace picadillo con sus grandes mandíbulas."
        ko:
          scarlet: "남을 잘 돌보는 성격이다.\n먹이가 아닌 물거미도\n수포로 감싸 보호하며 돌아다닌다."
          violet: "끈적끈적한 수포를 발사한다.\n안에 갇힌 적이 정신을 잃으면\n큰턱으로 깨물어 부순다."
        zh_simp:
          scarlet: "性格体贴。除了食物之外，\n出于保护也会将滴蛛放进水泡，\n同时到处走来走去。"
          violet: "会发射黏糊糊的水泡。\n当被它困住的敌人昏掉后，\n它就会用大颚将其咬碎。"
        zh_trad:
          scarlet: "性格非常體貼。四處走動時\n不只會把食物放進水泡，\n還會把滴蛛也放進去保護。"
          violet: "會發射黏答答的水泡。\n等被困在水泡中的敵人失去意識後，\n牠就會用大顎將其咬成碎片。"
