        special_attack: 0
        special_defense: 0
        speed: 2
      types:
        - dragon
        - ghost
      egg_groups:
        - amorphous
        - dragon
      abilities:
        - clear_body
        - infiltrator
      hidden_ability: cursed_body
      descriptions:
        jp_kana:
          scarlet: "￹時速￺じそく￻　２００キロで　￹飛￺と￻びまわる。\n￹戦￺たたか￻いに　￹負￺ま￻けると　ドラメシヤは\nあっさり　どこかへ　￹行￺い￻ってしまう。"
          violet: "￹肺￺はい￻に　エネルギーを￹溜￺た￻め　￹撃￺う￻ち￹出￺だ￻す。\nドラメシヤが　￹立派￺りっぱ￻に　￹育￺そだ￻つまで\n￹一緒￺いっしょ￻に　￹戦￺たたか￻い　￹世話￺せわ￻もする。"
        jp_kanji:
          scarlet: "￹時速￺じそく￻　２００キロで　￹飛￺と￻びまわる。\n￹戦￺たたか￻いに　￹負￺ま￻けると　ドラメシヤは\nあっさり　どこかへ　￹行￺い￻ってしまう。"
          violet: "￹肺￺はい￻に　エネルギーを￹溜￺た￻め　￹撃￺う￻ち￹出￺だ￻す。\nドラメシヤが　￹立派￺りっぱ￻に　￹育￺そだ￻つまで\n￹一緒￺いっしょ￻に　￹戦￺たたか￻い　￹世話￺せわ￻もする。"
        en:
          scarlet: "This Pokémon flies around at over 120 miles per\nhour. If a Drakloak is defeated in a battle, its\nDreepy will wander off without a second thought."
          violet: "This Pokémon stores up energy in its lungs, then\nshoots it out. It takes care of Dreepy and battles\nalongside them until they’re all grown up."
        fr:
          scarlet: "Ce Pokémon vole à une vitesse de 200 km/h.\nS’il perd un combat, son Fantyrm s’en ira sans\ndemander son reste."
          violet: "Il accumule de l’énergie dans ses poumons puis\nl’expulse. Il prend soin de son Fantyrm et se bat\nà ses côtés jusqu’à ce qu’il grandisse."
        it:
          scarlet: "Vola a una velocità di 200 km/h. Se viene\nsconfitto in una lotta, il Dreepy che è con lui\nlo pianta in asso senza troppi complimenti."
          violet: "Accumula energia nei polmoni per poi spararla\nfuori. Lotta assieme a Dreepy e se ne prende\ncura finché questo non raggiunge la maturità."
        de:
          scarlet: "Beim Fliegen ist es bis zu 200 km/h schnell.\nVerliert es im Kampf, macht sich sein Grolldra\nohne zu zögern aus dem Staub."
          violet: "In der Lunge sammelt es Energie, die es dann\nabschießt. Es kümmert sich so lange um Grolldra,\nbis dieses ausgewachsen ist."
        es:
          scarlet: "Vuela a 200 km/h. Si pierde un combate,\nel Dreepy que lo acompaña no dudará un\nsegundo en emprender la huida."
          violet: "Almacena en los pulmones energía que luego\nexpulsa. Lucha junto a un Dreepy y cuida de él\nhasta que alcanza la madurez."
        ko:
          scarlet: "시속 200km로 날아다닌다.\n싸움에서 지면 드라꼰은\n금세 어딘가로 가 버린다."
          violet: "폐에 에너지를 모아 발사한다.\n드라꼰이 훌륭히 자랄 때까지\n함께 싸우며 돌본다."
        zh_simp:
          scarlet: "能以时速２００公里四处飞行。\n一旦输了对战，多龙梅西亚\n会二话不说地消失无踪。"
          violet: "会在肺部储存能量并进行攻击。\n在多龙梅西亚能独当一面之前，\n会和它一起战斗并照顾它。"
        zh_trad:
          scarlet: "能以時速２００公里四處飛行。\n一旦輸了對戰，多龍梅西亞\n就會二話不說地消失無蹤。"
          violet: "會用儲存在肺部的能量進行攻擊。\n在多龍梅西亞能獨當一面前，\n都會一起戰鬥並照顧起居。"
