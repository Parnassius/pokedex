          violet: "￹目￺め￻の￹前￺まえ￻で　￹動￺うご￻くもの　すべてに\n￹噛￺か￻みつく　￹暴￺あば￻れん￹坊￺ぼう￻。　うかつに\n￹後￺うし￻ろを　￹見￺み￻せては　いけない。"
        jp_kanji:
          scarlet: "￹発達￺はったつ￻した　あごは　パワフルで\nなんでも　￹噛￺か￻み￹砕￺くだ￻いて　しまうので\n￹親￺おや￻のトレーナーでも　￹要注意￺ようちゅうい￻。"
          violet: "￹目￺め￻の￹前￺まえ￻で　￹動￺うご￻くもの　すべてに\n￹噛￺か￻みつく　￹暴￺あば￻れん￹坊￺ぼう￻。　うかつに\n￹後￺うし￻ろを　￹見￺み￻せては　いけない。"
        en:
          scarlet: "Its powerful, well-developed jaws are capable\nof crushing anything. Even its Trainer must be\ncareful."
          violet: "This rough critter chomps at any moving\nobject it sees. Turning your back on it is\nnot recommended."
        fr:
          scarlet: "La mâchoire bien développée de ce Pokémon est\nsi puissante qu’elle peut broyer n’importe quoi.\nMême son partenaire doit s’en méfier."
          violet: "Ce petit Pokémon turbulent mord tout ce qui\nbouge. Il est déconseillé de lui tourner le dos."
        it:
          scarlet: "Le sue mandibole ben sviluppate sono così\npotenti da frantumare qualsiasi cosa, perciò\nanche chi lo allena deve agire con cautela."
          violet: "Particolarmente violento, azzanna qualsiasi cosa\nveda muoversi. È bene non dargli le spalle."
        de:
          scarlet: "Seine kräftigen, stark entwickelten Kiefer können\nalles zermalmen. Selbst sein Trainer muss sich vor\nihm in Acht nehmen."
          violet: "Dieser kleine Rabauke beißt alles, was sich\nvor ihm bewegt. Man sollte ihm nie den Rücken\nzudrehen."
        es:
          scarlet: "Sus desarrolladas y potentes mandíbulas pueden\ntriturar cualquier cosa, por lo que hasta su propio\nEntrenador debe andarse con cuidado."
          violet: "Esta violenta criatura le clava los dientes a\ntodo lo que se mueve. Conviene no cometer\nla imprudencia de darle la espalda."
        ko:
          scarlet: "발달한 턱은 파워풀해서\n뭐든지 깨물어 부수기 때문에\n어버이 트레이너라도 주의해야 한다."
          violet: "눈앞에 움직이는 것은\n모조리 물어뜯을 정도로 난폭하다.\n섣불리 등을 보여서는 안 된다."
        zh_simp:
          scarlet: "因为它发达的颚充满了力量，\n不管是什么都能咬碎，\n所以就算是它的训练家也要当心。"
          violet: "性格粗暴，眼前所有\n会动的东西它都会咬上去。\n一定不能轻易地背对它。"
        zh_trad:
          scarlet: "發達的雙顎充滿了力量，\n不管什麼東西都能咬碎，\n因此就算是牠的訓練家也要當心。"
          violet: "脾氣暴躁，只要是自己眼前\n有東西在動，就會一口咬上去。\n千萬不可輕易地背對牠。"
