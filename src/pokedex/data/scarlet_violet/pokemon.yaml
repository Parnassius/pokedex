      descriptions:
        jp_kana:
          scarlet: "２￹本￺ほん￻の　スティックを　￹使￺つか￻いこなし\n￹激￺はげ￻しい　ビートを　￹刻￺きざ￻むだけでなく\n￹戦￺たたか￻いでも　￹相手￺あいて￻を　￹打￺う￻ちのめす。"
          violet: "￹激￺はげ￻しい　ビートを　￹刻￺きざ￻むことに\n￹夢中￺むちゅう￻に　なりすぎて　トレーナーの\n￹指示￺しじ￻を　￹聞￺き￻かなくなることも　ある。"
        jp_kanji:
          scarlet: "２￹本￺ほん￻の　スティックを　￹使￺つか￻いこなし\n￹激￺はげ￻しい　ビートを　￹刻￺きざ￻むだけでなく\n￹戦￺たたか￻いでも　￹相手￺あいて￻を　￹打￺う￻ちのめす。"
          violet: "￹激￺はげ￻しい　ビートを　￹刻￺きざ￻むことに\n￹夢中￺むちゅう￻に　なりすぎて　トレーナーの\n￹指示￺しじ￻を　￹聞￺き￻かなくなることも　ある。"
        en:
          scarlet: "It skillfully uses its two sticks not only for\ndrumming out rapid beats but also for\npummeling opponents during battle."
          violet: "It becomes intensely focused while it drums out\nvigorous beats—so much so that sometimes it\nwon’t listen to its Trainer’s commands."
        fr:
          scarlet: "Il manie ses deux bâtons avec brio non seulement\npour battre la mesure à un rythme effréné, mais\naussi pour rosser ses adversaires en combat."
          violet: "Il est tellement concentré à battre la mesure à\nun rythme effréné qu’il lui arrive parfois de ne\nplus écouter les ordres qu’on lui donne."
        it:
          scarlet: "Utilizza le due bacchette per produrre un ritmo\nforsennato e per riempire di colpi gli avversari\ndurante la lotta."
          violet: "Si concentra a tal punto nel tenere il suo ritmo\nforsennato che a volte ignora le indicazioni di\nchi lo allena."
        de:
          scarlet: "Es schwingt seine zwei Schlägel mit viel Geschick\nund kann so nicht nur einen wilden Beat auflegen,\nsondern auch im Kampf auf Gegner eintrommeln."
          violet: "Verliert es sich in seinem wilden Beat, so kann es\nvorkommen, dass es die Befehle seines Trainers\nnicht mehr wahrnimmt."
        es:
          scarlet: "Usa con habilidad sus dos baquetas, no solo\npara marcar ritmos contundentes, sino también\npara aporrear a sus adversarios en combate."
          violet: "Se concentra tanto en marcar un ritmo frenético\nque a veces ni oye las órdenes de su Entrenador."
        ko:
          scarlet: "두 개의 스틱을 능숙하게 사용해서\n격렬한 비트를 만들어 낼 뿐만 아니라\n싸움에서도 상대를 압도한다."
          violet: "격렬한 비트를 내는 데 열중한 나머지\n트레이너의 지시를 듣지 못할 때도 있다."
        zh_simp:
          scarlet: "把２根木棒用得炉火纯青，\n不仅能敲奏出激烈节拍，\n也能在战斗中击溃对手。"
          violet: "有时会过于忘我地\n敲打激烈的节拍，\n以致于不听训练家的指示。"
        zh_trad:
          scarlet: "把２根木棒用得爐火純青，\n不僅能敲奏出激烈的節拍，\n還能在對戰中擊垮對手。"
          violet: "在敲打著激烈的節拍時，\n有時會因為過於忘我\n而不聽訓練家的指示。"
