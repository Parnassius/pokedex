      descriptions:
        jp_kana:
          scarlet: "￹頬￺ほほ￻の　￹電気袋￺でんきぶくろ￻は　￹未発達￺みはったつ￻。\n￹前脚￺まえあし￻の　￹肉球￺にくきゅう￻で　￹懸命￺けんめい￻に　￹擦￺こす￻ると\nようやく　￹発電￺はつでん￻できる。"
          violet: "￹手￺て￻の　￹肉球￺にくきゅう￻が　￹放電器官￺ほうでんきかん￻。\n￹後￺うし￻ろ￹脚￺あし￻で　ようやく　￹立￺た￻ち￹上￺あ￻がると\n￹手￺て￻のひらから　￹電撃￺でんげき￻を　￹放￺はな￻つ。"
        jp_kanji:
          scarlet: "￹頬￺ほほ￻の　￹電気袋￺でんきぶくろ￻は　￹未発達￺みはったつ￻。\n￹前脚￺まえあし￻の　￹肉球￺にくきゅう￻で　￹懸命￺けんめい￻に　￹擦￺こす￻ると\nようやく　￹発電￺はつでん￻できる。"
          violet: "￹手￺て￻の　￹肉球￺にくきゅう￻が　￹放電器官￺ほうでんきかん￻。\n￹後￺うし￻ろ￹脚￺あし￻で　ようやく　￹立￺た￻ち￹上￺あ￻がると\n￹手￺て￻のひらから　￹電撃￺でんげき￻を　￹放￺はな￻つ。"
        en:
          scarlet: "It has underdeveloped electric sacs on its cheeks.\nThese sacs can produce electricity only if Pawmi\nrubs them furiously with the pads on its forepaws."
          violet: "The pads of its paws are electricity-discharging\norgans. Pawmi fires electricity from its forepaws\nwhile standing unsteadily on its hind legs."
        fr:
          scarlet: "Les poches sur ses joues sont peu développées.\nElles ne produisent de l’électricité que lorsqu’il\nles frotte avec ses coussinets."
          violet: "Ses coussinets servent à projeter de l’électricité.\nQuand il parvient à se tenir sur ses pattes arrière,\nil envoie des décharges avec ses pattes avant."
        it:
          scarlet: "Le sacche elettriche sulle sue guance non si sono\nsviluppate del tutto e per generare energia deve\nsfregarle vigorosamente con le zampe anteriori."
          violet: "I cuscinetti delle zampe anteriori sono organi che\nscaricano elettricità. Quando riesce a stare sulle\nzampe posteriori può lanciare attacchi elettrici."
        de:
          scarlet: "Seine elektrischen Backentaschen sind nicht ganz\nausgebildet. Um Strom zu erzeugen, muss es mit\nden Ballen der Vorderpfoten kräftig daran reiben."
          violet: "Seine Pfotenballen sind Organe zur elektrischen\nEntladung. Gelingt es ihm, auf den Hinterbeinen\nzu stehen, schießt es Strom aus den Vorderpfoten."
        es:
          scarlet: "Como las bolsas de sus mejillas están poco\ndesarrolladas, genera electricidad frotándolas\ncon las almohadillas de sus patas delanteras."
          violet: "Sus almohadillas le permiten liberar electricidad.\nCuando logra erguirse sobre las patas traseras,\nusa las palmas para soltar descargas eléctricas."
        ko:
          scarlet: "볼의 전기 주머니가 아직 발달하지 않았다.\n앞발의 볼록살을 열심히 비벼야\n겨우 전기가 만들어진다."
          violet: "손의 볼록살이 방전 기관이다.\n뒷발로 겨우 일어선 다음\n손바닥에서 전격을 내보낸다."
        zh_simp:
          scarlet: "脸颊上的电囊尚未发达。\n必须拼命摩擦前脚的肉球\n才得以制造出电力。"
          violet: "手部的肉球是放电器官。\n努力用后脚站立起来，\n然后从手掌释放出电击。"
        zh_trad:
          scarlet: "臉頰上的電囊尚未發達。\n必須拼命摩擦前腳的肉球，\n才終於能製造出電力。"
          violet: "手的肉球是放電的器官。\n會費勁地用後腳站起來，\n然後從手掌釋放出電擊。"
