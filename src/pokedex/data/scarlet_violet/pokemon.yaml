        jp_kanji:
          scarlet: "だれかを　￹守￺まも￻ろうと　したとき\nひじを￹伸￺の￻ばし　￹刀￺かたな￻のように\n￹変化￺へんか￻させて　￹激￺はげ￻しく　￹戦￺たたか￻う。"
          violet: "￹相手￺あいて￻の　￹考￺かんが￻えを　￹敏感￺びんかん￻に\nキャッチする　￹能力￺のうりょく￻を　￹持￺も￻つため\n￹先￺さき￻に　￹攻撃￺こうげき￻が　できるのだ。"
        en:
          scarlet: "When trying to protect someone, it extends its\nelbows as if they were swords and fights savagely."
          violet: "Because it can sense what its foe is thinking,\nits attacks burst out first, fast, and fierce."
        fr:
          scarlet: "Toujours prêt à protéger son prochain,\nil se bat férocement en utilisant ses coudes\ncomme des épées."
          violet: "Il est capable de lire dans les pensées de ses\nadversaires et frappe donc toujours en premier."
        it:
          scarlet: "Quando protegge qualcuno estende i gomiti\ncome se fossero spade e combatte furiosamente."
          violet: "Il suo intuito gli consente di capire cosa pensa\nil nemico: può così attaccare per primo."
        de:
          scarlet: "Will es jemanden beschützen, verlängert es seine\nEllbogen, um sie wie Schwerter zu nutzen, und\nkämpft auf wilde Art."
          violet: "Da es selbst die leisesten Gedanken seines\nGegners lesen kann, kann es immer zuerst\nangreifen."
        es:
          scarlet: "Cuando quiere proteger a alguien, extiende\nlos codos como si fueran espadas y lucha con\nfiereza."
          violet: "Puede presentir los movimientos de sus rivales\ny, por eso, ataca siempre antes que ellos."
        ko:
          scarlet: "누군가를 지키려고 할 때는\n팔꿈치를 늘여서 칼처럼\n변화시키고 격렬하게 싸운다."
          violet: "상대의 생각을 민감하게\n포착하는 능력을 가졌기 때문에\n먼저 공격할 수 있다."
        zh_simp:
          scarlet: "在为了保护谁时会伸出肘部，\n使其变得如刀锋般锋利后\n与对手展开激烈的战斗。"
          violet: "因为有着能敏锐感知\n对手想法的能力，\n所以可以率先攻击。"
        zh_trad:
          scarlet: "在保護著誰時會伸出肘部，\n並使其變得如刀般鋒利後，\n與對手展開激烈的戰鬥。"
          violet: "擁有能夠敏銳察覺\n對方想法的能力，\n因此能搶先發動攻擊。"
