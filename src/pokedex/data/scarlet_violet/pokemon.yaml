          scarlet: "Offenbar ist dies die Kreatur Schwingenkönig,\nvon der es in einem alten Expeditionsbericht hieß,\nsie habe die Erde mit bloßen Fäusten gespalten."
          violet: "Es ähnelt Mopex, ist aber deutlich kräftiger\nund brutaler. Über seine Lebensweise ist nichts\nbekannt."
