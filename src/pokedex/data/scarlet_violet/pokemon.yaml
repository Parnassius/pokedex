      descriptions:
        jp_kana:
          scarlet: "￹飛￺と￻び￹跳￺は￻ねていないと　￹死￺し￻んでしまう。\n￹頭￺あたま￻に　￹乗￺の￻せている　￹真珠￺しんじゅ￻が\nサイコパワーを　￹増幅￺ぞうふく￻させるのだ。"
          violet: "￹尻尾￺しっぽ￻を　バネがわりにして\n￹飛￺と￻び￹跳￺は￻ねることで　￹心臓￺しんぞう￻を\n￹動￺うご￻かしているので　￹止￺と￻まると　￹死￺し￻ぬ。"
        jp_kanji:
          scarlet: "￹飛￺と￻び￹跳￺は￻ねていないと　￹死￺し￻んでしまう。\n￹頭￺あたま￻に　￹乗￺の￻せている　￹真珠￺しんじゅ￻が\nサイコパワーを　￹増幅￺ぞうふく￻させるのだ。"
          violet: "￹尻尾￺しっぽ￻を　バネがわりにして\n￹飛￺と￻び￹跳￺は￻ねることで　￹心臓￺しんぞう￻を\n￹動￺うご￻かしているので　￹止￺と￻まると　￹死￺し￻ぬ。"
        en:
          scarlet: "Spoink will die if it stops bouncing. The pearl on\nits head amplifies its psychic powers."
          violet: "Using its tail like a spring, it keeps its heart\nbeating by bouncing constantly. If it stops,\nit dies."
        fr:
          scarlet: "Si Spoink arrêtait de sauter partout, il mourrait.\nLa perle sur sa tête amplifie ses pouvoirs\npsychiques."
          violet: "Il utilise sa queue comme un ressort afin\nde rebondir et de faire battre son cœur.\nS’il s’arrête, il meurt."
        it:
          scarlet: "Se dovesse smettere di saltellare, morirebbe.\nLa perla che porta sul capo amplifica i suoi\npoteri psichici."
          violet: "Usa la coda come una molla, rimbalzando\nper mantenere vivo il battito del cuore.\nSe dovesse mai fermarsi, morirebbe."
        de:
          scarlet: "Hört es je auf umherzuspringen, stirbt es.\nDie Perle auf seinem Kopf verstärkt seine\nPsycho-Kräfte."
          violet: "Es nutzt seinen Schweif als Sprungfeder, um sein\nHerz am Pumpen zu halten. Hört es auf zu\nspringen, stirbt es."
        es:
          scarlet: "Si dejara de saltar, se debilitaría. La perla\nque lleva en la cabeza amplifica sus poderes\npsíquicos."
          violet: "Utiliza su cola a modo de muelle y bota sin cesar\npara hacer que su corazón lata. Si se detiene, su\ncorazón, también."
        ko:
          scarlet: "뛰어오르는 것을 멈추면 죽는다고 한다.\n머리에 이고 있는 진주가\n사이코 파워를 증폭시켜 준다."
          violet: "꼬리를 용수철 대용으로 사용해\n뛰어오르며 심장을 움직이고 있기 때문에\n멈추면 죽는다."
        zh_simp:
          scarlet: "如果不保持跳动就会死亡。\n头上戴着的珍珠能让\n自己的精神力量增强。"
          violet: "用尾巴代替弹簧，\n通过弹跳来让心脏跳动。\n一旦停下来就会死亡。"
        zh_trad:
          scarlet: "如果不保持跳動就會死亡。\n戴在頭上的珍珠能讓\n自己的精神力量增強。"
          violet: "用尾巴代替彈簧，藉著\n彈跳讓自己的心臟搏動，\n一旦停下來就會死亡。"
