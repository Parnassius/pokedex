          scarlet: "３０００￹度￺ど￻の　￹炎￺ほのお￻を　￹操￺あやつ￻る。\n￹岩￺いわ￻や　￹砂利￺じゃり￻を　￹溶￺と￻かして　￹作￺つく￻った\nマグマの￹海￺うみ￻を　ゆうゆうと　￹泳￺およ￻ぐ。"
          violet: "￹多￺おお￻くの　￹争￺あらそ￻いの　￹火種￺ひだね￻となった\n￹勾玉￺マガタマ￻に　￹集￺あつ￻まった　￹妬￺ねた￻みが\n￹炎￺ほのお￻を　まとい　ポケモンとなった。"
        jp_kanji:
          scarlet: "３０００￹度￺ど￻の　￹炎￺ほのお￻を　￹操￺あやつ￻る。\n￹岩￺いわ￻や　￹砂利￺じゃり￻を　￹溶￺と￻かして　￹作￺つく￻った\nマグマの￹海￺うみ￻を　ゆうゆうと　￹泳￺およ￻ぐ。"
          violet: "￹多￺おお￻くの　￹争￺あらそ￻いの　￹火種￺ひだね￻となった\n￹勾玉￺マガタマ￻に　￹集￺あつ￻まった　￹妬￺ねた￻みが\n￹炎￺ほのお￻を　まとい　ポケモンとなった。"
        en:
          scarlet: "It controls flames burning at over 5,400 degrees\nFahrenheit. It casually swims through the sea of\nlava it creates by melting rock and sand."
          violet: "The envy accumulated within curved beads that\nsparked multiple conflicts has clad itself in fire\nand become a Pokémon."
        fr:
          scarlet: "Ce Pokémon manipule des flammes à 3 000 °C. Il\nnage tranquillement dans une mer de magma qu’il\na créée en faisant fondre de la roche et du gravier."
          violet: "La convoitise intense qu’attisaient des magatama\nà l’origine de nombreux conflits s’est mêlée à\ndes flammes et a pris vie."
        it:
          scarlet: "Riesce a manipolare fiamme di 3.000 ºC.\nNuota tranquillamente nei mari di magma\nche crea fondendo ghiaia e massi."
          violet: "Prese vita quando il livore accumulatosi nei\ngioielli ricurvi che causarono svariati conflitti\nsi ammantò di fiamme."
        de:
          scarlet: "Es kontrolliert Flammen von 3000 ℃. Mühelos\nschwimmt es durch das Meer aus Lava, das es\ndurch Schmelzen von Gestein und Kies erzeugt."
          violet: "Der Neid, der sich in Krummjuwelen sammelte,\ndie viel Streit heraufbeschworen, hüllte sich in\nFeuer und wurde zu diesem Pokémon."
        es:
          scarlet: "Controla a su voluntad llamas de hasta 3000 ºC.\nNada tranquilamente por los mares de magma\nque crea al derretir las rocas y la grava a su paso."
          violet: "Este Pokémon nació al imbuirse en llamas\nla envidia acumulada en ciertos abalorios que\ndesencadenaron un gran número de conflictos."
        ko:
          scarlet: "3000도의 불꽃을 조종한다.\n바위와 자갈을 녹여서 만든\n마그마의 바다를 유유히 헤엄친다."
          violet: "여러 분쟁의 불씨가 된\n곡옥에 모여든 질투가\n불꽃을 두르고 포켓몬이 되었다."
        zh_simp:
          scarlet: "会操控３０００度的火焰。\n熔化岩石和沙砾来做成熔岩海，\n并在里边悠闲自在地游泳。"
          violet: "曾引起无数斗争的勾玉\n聚集了嫉妒之情。这些嫉妒\n缠绕了火焰，变成了宝可梦。"
        zh_trad:
          scarlet: "能操控３０００度的火焰。\n會熔化岩石和沙礫做成熔岩海，\n並在裡面悠閒自在地游泳。"
          violet: "曾引起無數鬥爭的勾玉聚集了\n嫉妒之情。這些嫉妒之情\n纏繞了火焰，變成了寶可夢。"
