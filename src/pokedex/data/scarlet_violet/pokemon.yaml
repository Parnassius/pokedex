      descriptions:
        jp_kana:
          scarlet: "￹縄張￺なわば￻りに　￹入￺はい￻り￹込￺こ￻んだ　￹相手￺あいて￻を\n￹見境￺みさかい￻なく　￹毒液￺どくえき￻で　￹攻撃￺こうげき￻。\n￹船底￺ふなぞこ￻を　￹腐￺くさ￻らせる　￹猛毒￺もうどく￻だ。"
          violet: "￹泳￺およ￻ぎは　ナミイルカに　￹勝￺か￻てないので\n￹藻屑￺もくず￻に　￹紛￺まぎ￻れて　￹近￺ちか￻づき\n￹毒攻撃￺どくこうげき￻で　￹動￺うご￻けなくするのだ。"
        jp_kanji:
          scarlet: "￹縄張￺なわば￻りに　￹入￺はい￻り￹込￺こ￻んだ　￹相手￺あいて￻を\n￹見境￺みさかい￻なく　￹毒液￺どくえき￻で　￹攻撃￺こうげき￻。\n￹船底￺ふなぞこ￻を　￹腐￺くさ￻らせる　￹猛毒￺もうどく￻だ。"
          violet: "￹泳￺およ￻ぎは　ナミイルカに　￹勝￺か￻てないので\n￹藻屑￺もくず￻に　￹紛￺まぎ￻れて　￹近￺ちか￻づき\n￹毒攻撃￺どくこうげき￻で　￹動￺うご￻けなくするのだ。"
        en:
          scarlet: "Using a liquid poison, Dragalge indiscriminately\nattacks anything that wanders into its territory.\nThis poison can corrode the undersides of boats."
          violet: "Since Finizen is the better swimmer, Dragalge\nwill approach it under the cover of seaweed,\nthen immobilize it with a poisonous attack."
        fr:
          scarlet: "Il attaque tout intrus pénétrant sur son territoire\navec un poison si puissant qu’il est capable\nde dissoudre la coque des bateaux."
          violet: "Ce Pokémon ne peut pas battre les Dofin\nà la nage. Il se cache donc dans les algues\net les immobilise avec son poison."
        it:
          scarlet: "Attacca chiunque osi entrare nel suo territorio\ncon un veleno talmente potente da corrodere\npersino il fondo delle barche."
          violet: "Poiché nel nuoto non riesce a eguagliare\nFinizen, si nasconde tra le alghe e lo attacca\nimmobilizzandolo con il suo veleno."
        de:
          scarlet: "Die giftige Flüssigkeit, mit der es wahllos jeden\nEindringling in seinem Revier angreift, ist ätzend\ngenug, um sich durch Schiffsrümpfe zu fressen."
          violet: "Da Normifin ein weitaus besserer Schwimmer ist,\nversteckt sich Tandrak zwischen Algen, um sich\nihm zu nähern und es dann mit Gift zu lähmen."
        es:
          scarlet: "Ataca indiscriminadamente a quien ose invadir\nsu territorio escupiéndole un veneno tan cáustico\nque es capaz de corroer el casco de un barco."
          violet: "Al tener una capacidad natatoria inferior a\nla de los Finizen, se oculta entre las algas para\nacercarse a ellos e inmovilizarlos con veneno."
        ko:
          scarlet: "영역에 들어온 상대를\n다짜고짜 독액으로 공격한다.\n배의 밑바닥을 썩게 만드는 맹독을 지녔다."
          violet: "헤엄으로는 맨돌핀을 이길 수 없기 때문에\n해초에 섞여서 접근한 다음\n독 공격으로 움직일 수 없게 만든다."
        zh_simp:
          scarlet: "会不由分说地用毒液攻击\n闯入自己地盘的对手。\n这种剧毒可以腐蚀船底。"
          violet: "由于游泳游不赢波普海豚，\n因此会混在碎藻里来靠近它，\n然后使出带毒的攻击让它动弹不得。"
        zh_trad:
          scarlet: "會不分青紅皂白地用毒液\n攻擊闖入自己地盤的對手。\n毒液所含的劇毒能夠腐蝕船底。"
          violet: "由於游泳游不贏波普海豚，\n因此會混在海藻屑裡接近後，\n以帶毒的攻擊使其動彈不得。"
