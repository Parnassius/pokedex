      descriptions:
        jp_kana:
          scarlet: "テラスタルエネルギーが　￹異常￺いじょう￻に\n￹増幅￺ぞうふく￻した　￹姿￺すがた￻。　￹古代人￺こだいじん￻が　￹考￺かんが￻えた\n￹世界￺せかい￻に　￹似￺に￻ている。"
          violet: "￹地底￺ちてい￻に　￹埋￺う￻もれた　￹姿￺すがた￻は\nまるで　￹宇宙￺うちゅう￻に　￹浮￺う￻かぶ　￹星￺ほし￻のようだと\n￹古￺ふる￻い　￹探検記￺たんけんき￻に　￹記￺しる￻される。"
        jp_kanji:
          scarlet: "テラスタルエネルギーが　￹異常￺いじょう￻に\n￹増幅￺ぞうふく￻した　￹姿￺すがた￻。　￹古代人￺こだいじん￻が　￹考￺かんが￻えた\n￹世界￺せかい￻に　￹似￺に￻ている。"
          violet: "￹地底￺ちてい￻に　￹埋￺う￻もれた　￹姿￺すがた￻は\nまるで　￹宇宙￺うちゅう￻に　￹浮￺う￻かぶ　￹星￺ほし￻のようだと\n￹古￺ふる￻い　￹探検記￺たんけんき￻に　￹記￺しる￻される。"
        en:
          scarlet: "In this form, Terapagos resembles the world\nas the ancients saw it, and its Terastal energy\nis abnormally amplified."
          violet: "An old expedition journal describes the sight of\nthis Pokémon buried in the depths of the earth as\nresembling a planet floating in space."
        fr:
          scarlet: "Sous cette forme, son énergie Téracristal est\ndécuplée et son apparence évoque le monde tel\nque les êtres humains le concevaient autrefois."
          violet: "Selon un vieux récit d’exploration, lorsqu’il est\nenfoui profondément dans le sol, ce Pokémon\nressemble à une planète flottant dans l’espace."
        it:
          scarlet: "Forma assunta quando l’energia Teracristal\naumenta oltremisura. Ricorda il mondo così\ncome lo immaginavano i popoli antichi."
          violet: "In un vecchio diario di viaggio, questa forma\nsepolta nelle profondità della terra viene\nparagonata a un astro sospeso nello spazio."
        de:
          scarlet: "Diese Form verfügt über eine enorm verstärkte\nTerakristall-Energie. Ihr Aussehen ähnelt der\nWelt, wie uralte Völker sie sich vorgestellt haben."
          violet: "In einem alten Expeditionsbericht wird diese\ntief im Boden vergrabene Form mit einem im\nWeltall schwebenden Planeten verglichen."
        es:
          scarlet: "Adopta esta forma cuando su energía Teracristal\nse ve amplificada descomunalmente. Se asemeja\na la imagen del mundo que la gente tenía antaño."
          violet: "Según un antiguo diario de exploración, cuando\nestá enterrado en las profundidades de la tierra,\nse asemeja a un planeta que flota en el espacio."
        ko:
          scarlet: "테라스탈 에너지가\n이상할 정도로 증폭된 모습.\n고대인이 생각하던 세계를 닮았다."
          violet: "땅속에 묻혀 있던 모습은\n마치 우주에 떠 있는 별 같았다고\n오래된 탐험기에 기록되어 있다."
        zh_simp:
          scarlet: "太晶能量异常增强后的样子。\n与古代人所认为的世界很像。"
          violet: "跟据古老的探险记记载，\n它被掩埋在地底的样子\n就像浮在宇宙的星星一样。"
        zh_trad:
          scarlet: "太晶能量異常增強後\n變成的樣子。與古代人\n所想的世界很相似。"
          violet: "根據古老的探險記所記載，\n牠被掩埋在地底下的樣子\n就猶如懸浮在宇宙的星星。"
