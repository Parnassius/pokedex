      descriptions:
        jp_kana:
          scarlet: "￹火山地帯￺かざんちたい￻で　ごくまれに　￹見￺み￻つかる\n￹鉱石￺こうせき￻によって　￹体￺からだ￻の　￹一部￺いちぶ￻が\n￹岩￺いわ￻へと　￹変￺か￻わる　￹進化￺しんか￻を　￹遂￺と￻げた。"
          violet: "￹粗野￺そや￻で　がさつな　￹乱暴者￺らんぼうもの￻。\n￹大￺おお￻きく　￹重￺おも￻い　￹岩￺いわ￻の　オノを\nぶん￹回￺まわ￻して　￹獲物￺えもの￻を　￹仕留￺しと￻める。"
        jp_kanji:
          scarlet: "￹火山地帯￺かざんちたい￻で　ごくまれに　￹見￺み￻つかる\n￹鉱石￺こうせき￻によって　￹体￺からだ￻の　￹一部￺いちぶ￻が\n￹岩￺いわ￻へと　￹変￺か￻わる　￹進化￺しんか￻を　￹遂￺と￻げた。"
          violet: "￹粗野￺そや￻で　がさつな　￹乱暴者￺らんぼうもの￻。\n￹大￺おお￻きく　￹重￺おも￻い　￹岩￺いわ￻の　オノを\nぶん￹回￺まわ￻して　￹獲物￺えもの￻を　￹仕留￺しと￻める。"
        en:
          scarlet: "Parts of its body turned to stone when\nit evolved thanks to an extremely rare\nore found in volcanic areas."
          violet: "This Pokémon is a rough, crude, and\nviolent sort. It swings around its large,\nheavy stone axes to finish off its prey."
        fr:
          scarlet: "Il a évolué grâce à un minerai très rare que l’on\ntrouve dans les zones volcaniques, et certaines\nparties de son corps se sont changées en pierre."
          violet: "Ce Pokémon rustre et violent élimine ses proies\nen faisant furieusement tournoyer ses grandes\net lourdes haches de pierre."
        it:
          scarlet: "Si è evoluto grazie a un minerale molto raro\nche si trova in zone vulcaniche. Per questo,\nparte del suo corpo si è tramutata in pietra."
          violet: "Di indole violenta, rozza e brutale. Abbatte\nla preda mulinando le grosse e pesanti asce\ndi pietra."
        de:
          scarlet: "Ein extrem seltenes Erz, das in Vulkanregionen\nzu finden ist, löste seine Entwicklung aus, bei der\nTeile seines Körpers zu Stein wurden."
          violet: "Dieses grobe, ungehobelte und aggressive\nPokémon wirbelt wild mit seinen wuchtigen\nÄxten aus Stein, um Beute niederzustrecken."
        es:
          scarlet: "Gracias a un mineral extremadamente escaso\nque se encuentra en zonas volcánicas, parte\nde su cuerpo se volvió pétreo al evolucionar."
          violet: "Un Pokémon violento, tosco y rudo. Blande sus\nenormes y pesadas hachas de piedra para acabar\ncon sus presas."
        ko:
          scarlet: "화산 지대에서 매우 드물게 발견되는\n광석에 의해 몸의 일부가\n바위로 변하는 진화를 이뤄 냈다."
          violet: "사나우면서 거칠고 난폭한 존재.\n크고 무거운 바위로 된 도끼를 휘둘러서\n먹잇감을 쓰러뜨린다."
        zh_simp:
          scarlet: "在火山地带能以极低概率\n发现的矿石让它实现了\n部分身体变为岩石的进化。"
          violet: "野蛮、粗鲁又狂暴的家伙。\n通过挥舞巨大沉重的\n岩石斧头来干掉猎物。"
        zh_trad:
          scarlet: "在火山地帶能以極低機率\n發現的礦石，使牠在進化時\n身體的一部份變成了岩石。"
          violet: "野蠻粗魯又凶暴的寶可夢。\n會揮舞巨大沉重的岩斧\n給予獵物致命一擊。"
