      descriptions:
        jp_kana:
          scarlet: "￹本気￺ほんき￻で　￹怒￺おこ￻った　リザードンの\n￹尻尾￺しっぽ￻の　￹先￺さき￻の　￹炎￺ほのお￻は\n￹青白￺あおじろ￻く　￹燃￺も￻え￹上￺あ￻がる。"
          violet: "￹翼￺つばさ￻で　￹大空高￺おおぞらたか￻く　￹舞￺ま￻う。\n￹戦￺たたか￻いの　￹経験￺けいけん￻を　￹積￺つ￻むほど\n￹炎￺ほのお￻の　￹温度￺おんど￻は　￹上￺あ￻がっていく。"
        jp_kanji:
          scarlet: "￹本気￺ほんき￻で　￹怒￺おこ￻った　リザードンの\n￹尻尾￺しっぽ￻の　￹先￺さき￻の　￹炎￺ほのお￻は\n￹青白￺あおじろ￻く　￹燃￺も￻え￹上￺あ￻がる。"
          violet: "￹翼￺つばさ￻で　￹大空高￺おおぞらたか￻く　￹舞￺ま￻う。\n￹戦￺たたか￻いの　￹経験￺けいけん￻を　￹積￺つ￻むほど\n￹炎￺ほのお￻の　￹温度￺おんど￻は　￹上￺あ￻がっていく。"
        en:
          scarlet: "If Charizard becomes truly angered, the flame\nat the tip of its tail burns in a light blue shade."
          violet: "It uses its wings to fly sky-high. The more\nexperience it gains in battle, the greater the\ntemperature at which its flames burn."
        fr:
          scarlet: "Quand Dracaufeu s’énerve réellement,\nla flamme au bout de sa queue devient bleue."
          violet: "Ses ailes lui permettent de voler très haut dans\nle ciel. Plus il accumule d’expérience en combat,\nplus la température de ses flammes augmente."
        it:
          scarlet: "Se s’infuria, la fiamma che ha sulla punta\ndella coda si colora di un blu biancastro."
          violet: "Si libra alto in cielo grazie alle sue ali.\nPiù acquisisce esperienza nella lotta, più\nla temperatura delle sue fiamme aumenta."
        de:
          scarlet: "Wenn Glurak richtig wütend wird, flackert die\nFlamme an seiner Schwanzspitze in einem\nbläulichen Ton."
          violet: "Mit seinen Flügeln fliegt es hoch empor.\nDie Temperatur seiner Flamme steigt mit\nder Kampferfahrung."
        es:
          scarlet: "Cuando se enfurece de verdad, la llama de la\npunta de su cola se vuelve de color azul claro."
          violet: "Utiliza las alas para volar a gran altura. Cuanta\nmás experiencia gane en batalla, mayor será la\ntemperatura de sus llamas."
        ko:
          scarlet: "정말 화가 난 리자몽의\n꼬리 끝 불꽃은\n푸르스름하게 불타오른다."
          violet: "날개로 넓은 하늘을 높이 난다.\n싸움의 경험이 쌓일수록\n불꽃의 온도가 올라간다."
        zh_simp:
          scarlet: "当喷火龙真的生气时，\n它的尾巴前端就会\n燃起青白色的火焰。"
          violet: "用翅膀在高空翱翔。\n积累的战斗经验越多，\n火焰的温度越高。"
        zh_trad:
          scarlet: "當噴火龍憤怒至極時，\n尾巴前端就會燃起\n藍白色的火焰。"
          violet: "用翅膀在高空翱翔。\n累積越多戰鬥經驗，\n火焰溫度就會越高。"
squirtle:
