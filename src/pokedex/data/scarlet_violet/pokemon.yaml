      egg_groups:
        - water_2
      abilities:
        - rattled
        - adaptability
      hidden_ability: mold_breaker
      descriptions:
        jp_kana:
          scarlet: "￹極寒￺ごっかん￻の　￹海￺うみ￻で　￹群￺む￻れを　￹作￺つく￻り\nエサを　￹分￺わ￻け￹合￺あ￻って　￹暮￺く￻らす。　￹時￺とき￻が\n￹来￺く￻ると　￹生￺う￻まれた　￹川￺かわ￻に　￹帰￺かえ￻る。"
          violet: "￹生態￺せいたい￻が　あまりにも　￹異￺こと￻なるため\nバスラオとは　￹別種￺べっしゅ￻という　￹説￺せつ￻が\n￹近年￺きんねん￻は　￹有力視￺ゆうりょくし￻されている。"
        jp_kanji:
          scarlet: "￹極寒￺ごっかん￻の　￹海￺うみ￻で　￹群￺む￻れを　￹作￺つく￻り\nエサを　￹分￺わ￻け￹合￺あ￻って　￹暮￺く￻らす。　￹時￺とき￻が\n￹来￺く￻ると　￹生￺う￻まれた　￹川￺かわ￻に　￹帰￺かえ￻る。"
          violet: "￹生態￺せいたい￻が　あまりにも　￹異￺こと￻なるため\nバスラオとは　￹別種￺べっしゅ￻という　￹説￺せつ￻が\n￹近年￺きんねん￻は　￹有力視￺ゆうりょくし￻されている。"
        en:
          scarlet: "They live in frigid seas, forming schools and\nsharing food among themselves. When the time\ncomes, they return to the river they were born in."
          violet: "Its ecology is starkly different from that of other\nBasculin, so theories that it’s a totally different\nspecies have gained traction in recent years."
        fr:
          scarlet: "Ces Pokémon vivent en bancs dans les océans\nglacés et se partagent la nourriture. Quand le\ntemps est venu, ils retournent à leur fleuve natal."
          violet: "Son mode de vie diffère tant de celui des autres\nBargantua qu’on pense de plus en plus\nqu’il appartient à une autre espèce."
        it:
          scarlet: "Vive in banchi nei mari gelidi, condividendo\nil cibo con i propri simili. Quando arriva\nil momento, torna al fiume in cui è nato."
          violet: "Date le marcate differenze di abitudini rispetto\nagli altri Basculin, negli ultimi anni ha preso\npiede la teoria che si tratti di specie distinte."
        de:
          scarlet: "Sie bilden Schwärme in extrem kalten Meeren\nund teilen sich ihr Futter. Wenn die Zeit reif ist,\nkehren sie zum Fluss ihrer Geburt zurück."
          violet: "Wegen ihrer anderen Lebensweise fand jüngst\ndie These Zuspruch, dass es sich hierbei um eine\nvöllig andere Pokémon-Art als Barschuft handele."
        es:
          scarlet: "Forman bancos en mares de aguas gélidas y\ncomparten la comida entre ellos. Llegado el\nmomento, regresan al río en el que nacieron."
          violet: "En los últimos años han ganado peso las teorías\nque arguyen que se trata de una especie distinta\na Basculin porque presentan biologías diferentes."
        ko:
          scarlet: "혹한의 바다에서 무리를 이루어\n먹이를 나눠 먹으며 지낸다.\n때가 되면 태어났던 강으로 돌아간다."
          violet: "생태가 너무나도 다른 탓에 최근에는\n배쓰나이와 다른 종이라는 설이\n유력해지고 있다."
        zh_simp:
          scarlet: "群居在极其寒冷的海里，\n通过互相分享食物生活。\n时机一到，就会返回出生的河川。"
          violet: "与野蛮鲈鱼的生态相差甚远，\n因此它们是不同种类的说法\n在近年以来备受支持。"
        zh_trad:
          scarlet: "會在極其寒冷的大海群居\n並共享食物。一旦時機成熟，\n就會回到自己出生的河川。"
          violet: "由於與野蠻鱸魚的生態相差甚鉅，\n故將兩者視為不同種類的說法\n在近年被認為最為有力。"
