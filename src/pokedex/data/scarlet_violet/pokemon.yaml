      hidden_ability: sand_veil
      descriptions:
        jp_kana:
          scarlet: "スコップを　なくすと　￹木￺き￻の￹枝￺えだ￻などを\n￹代￺か￻わりに　￹挿￺さ￻し　￹新￺あら￻たな　スコップが\n￹見￺み￻つかるまで　￹気￺き￻を　￹紛￺まぎ￻らわす。"
          violet: "￹獲物￺えもの￻の　￹目￺め￻を　￹砂￺すな￻で　￹潰￺つぶ￻し\nその￹隙￺すき￻に　￹近￺ちか￻づこうとするが\n￹動￺うご￻きが　￹遅￺おそ￻いので　￹逃￺に￻げられる。"
        jp_kanji:
          scarlet: "スコップを　なくすと　￹木￺き￻の￹枝￺えだ￻などを\n￹代￺か￻わりに　￹挿￺さ￻し　￹新￺あら￻たな　スコップが\n￹見￺み￻つかるまで　￹気￺き￻を　￹紛￺まぎ￻らわす。"
          violet: "￹獲物￺えもの￻の　￹目￺め￻を　￹砂￺すな￻で　￹潰￺つぶ￻し\nその￹隙￺すき￻に　￹近￺ちか￻づこうとするが\n￹動￺うご￻きが　￹遅￺おそ￻いので　￹逃￺に￻げられる。"
        en:
          scarlet: "If it loses its shovel, it will stick something else—\nlike a branch—in its head to make do until it finds\nanother shovel."
          violet: "It flings sand into the eyes of its prey and tries to\nclose in on them while they’re blinded, but since\nSandygast is so slow, the prey tends to escape."
        fr:
          scarlet: "S’il perd sa pelle, il la remplacera par\nun autre objet, comme une branche,\nen attendant d’en trouver une nouvelle."
          violet: "Il aveugle ses proies en leur jetant du sable dans\nles yeux, puis il tente de les approcher, mais il est\nsi lent qu’elles parviennent souvent à s’échapper."
        it:
          scarlet: "Se gli capita di perdere la paletta si infila in testa\nun ramo o un altro oggetto per distrarsi in attesa\ndi trovarne una nuova."
          violet: "Acceca il nemico lanciandogli della sabbia negli\nocchi e ne approfitta per cercare di avvicinarsi,\nma è così lento che spesso la preda fugge via."
        de:
          scarlet: "Wenn es seine Schaufel verliert, steckt es etwas\nanderes in seinen Kopf, zum Beispiel einen Zweig.\nSo lenkt es sich ab, bis es eine neue findet."
          violet: "Es wirft seiner Beute Sand in die Augen, wodurch\ndiese nichts sieht, und nähert sich ihr dann. Es ist\njedoch so langsam, dass die Beute oft entkommt."
        es:
          scarlet: "Si pierde su pala, busca otra cosa para clavarse\nen la cabeza, como una rama, y así salir del paso\nhasta que encuentre otra pala."
          violet: "Lanza arena a los ojos de sus presas e intenta\nacercarse a ellas aprovechando su falta de visión,\npero, como es muy lento, se le suelen escapar."
        ko:
          scarlet: "삽을 잃어버리면\n나뭇가지 등을 대신 꽂고 다니며\n새로운 삽을 찾을 때까지 마음을 달랜다."
          violet: "모래로 먹잇감의 눈을 멀게 하고\n그 틈에 접근하려 하지만\n움직임이 느려서 놓치고 만다."
        zh_simp:
          scarlet: "如果小铲子弄丢了，就会插上\n树枝之类的来作为代替，好让它\n在找到新铲子前分散注意力。"
          violet: "会用沙子攻击猎物的眼睛后\n趁机接近，但却总是因为\n行动缓慢而让猎物逃走。"
        zh_trad:
          scarlet: "萬一鏟子弄丟了，就會用樹枝\n等東西插著代替，好讓牠在\n找到新鏟子前能分散注意力。"
          violet: "會用沙子攻擊獵物的眼睛後\n趁機接近，但卻總是因為\n行動緩慢而讓獵物逃走。"
palossand:
  species_id: 770
  names:
    jp_kana: シロデスナ
    jp_kanji: シロデスナ
    en: Palossand
    fr: Trépassable
    it: Palossand
    de: Colossand
    es: Palossand
    ko: 모래성이당
    zh_simp: 噬沙堡爷
    zh_trad: 噬沙堡爺
  forms:
    palossand:
      form_id: 0
      base_stats:
        hp: 85
        attack: 75
        defense: 110
        special_attack: 100
        special_defense: 75
        speed: 35
      evs_yield:
        hp: 0
