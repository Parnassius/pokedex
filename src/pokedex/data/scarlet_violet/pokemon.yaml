      descriptions:
        jp_kana:
          scarlet: "￹群￺む￻れの　メスが　￹協力￺きょうりょく￻して\n￹獲物￺えもの￻を　￹仕留￺しと￻める。　メスたちの\nおかげで　￹群￺む￻れが　￹飢￺う￻えないのだ。"
          violet: "オスの　たてがみは　￹戦￺たたか￻いになると\n￹摂氏￺せっし￻２０００￹度￺ど￻の　￹高温￺こうおん￻になる。\n￹近寄￺ちかよ￻るだけで　￹大火傷￺おおやけど￻だ。"
        jp_kanji:
          scarlet: "￹群￺む￻れの　メスが　￹協力￺きょうりょく￻して\n￹獲物￺えもの￻を　￹仕留￺しと￻める。　メスたちの\nおかげで　￹群￺む￻れが　￹飢￺う￻えないのだ。"
          violet: "オスの　たてがみは　￹戦￺たたか￻いになると\n￹摂氏￺せっし￻２０００￹度￺ど￻の　￹高温￺こうおん￻になる。\n￹近寄￺ちかよ￻るだけで　￹大火傷￺おおやけど￻だ。"
        en:
          scarlet: "The females of a pride work together to bring\ndown prey. It’s thanks to them that their pride\ndoesn’t starve."
          violet: "The mane of a male Pyroar heats up to over\n3,600 degrees Fahrenheit during battle. Merely\napproaching it will cause severe burns."
        fr:
          scarlet: "Les femelles travaillent de concert afin d’abattre\nleurs proies. Grâce à leurs efforts, le groupe\nmange à sa faim."
          violet: "En combat, la crinière des mâles atteint une\ntempérature de 2 000 °C, ce qui peut infliger\nde graves brûlures à quiconque s’approche."
        it:
          scarlet: "Le femmine collaborano per procacciare\nil cibo e grazie a loro il branco non patisce\nla fame."
          violet: "Durante la lotta, la criniera dei maschi si scalda\nfino a raggiungere i 2.000 °C. Basta avvicinarsi\na questo Pokémon per subire gravi scottature."
        de:
          scarlet: "Die Weibchen arbeiten zusammen, um Beute zu\nerlegen, und stellen so sicher, dass ihr Rudel\nnicht hungern muss."
          violet: "Im Kampf erreicht die Mähne männlicher Pyroleo\nTemperaturen von 2000 ℃. Wer sich ihnen dann\nauch nur nähert, erleidet schwere Verbrennungen."
        es:
          scarlet: "Las hembras colaboran para dar caza y abatir\na las presas. De este modo, aseguran el sustento\ny la supervivencia de la manada."
          violet: "La melena de los machos alcanza temperaturas\nde 2000 ºC en combate, lo que provoca graves\nquemaduras solo con acercarse."
        ko:
          scarlet: "무리의 암컷들이 협력해서\n먹잇감을 처리한다. 암컷들 덕분에\n무리가 굶지 않을 수 있는 것이다."
          violet: "수컷의 갈기는 싸움이 시작되면\n섭씨 2000도의 고온을 낸다.\n접근하기만 해도 크게 화상을 입는다."
        zh_simp:
          scarlet: "雌性的火炎狮会合力\n捕杀猎物，因此群体中\n不会有谁挨饿。"
          violet: "在战斗时，雄性的鬃毛\n会提升到摄氏２０００度。\n光是靠近都会造成重度灼伤。"
        zh_trad:
          scarlet: "雌性們會合力捕殺獵物，\n所以群體內不會發生\n有誰挨餓的狀況。"
          violet: "在戰鬥時，雄性的鬃毛\n會提升到攝氏２０００度。\n光是靠近都會造成重度灼傷。"
