      descriptions:
        jp_kana:
          scarlet: "￹大￺おお￻きい　グループは　５０￹匹￺ぴき￻を\n￹超￺こ￻える。　エサを　￹求￺もと￻め　￹街中￺まちなか￻や　￹森￺もり￻を\n￹騒￺さわ￻がしく　￹飛￺と￻びまわる。"
          violet: "￹青￺あお￻い　￹羽￺はね￻の　グループは\n￹最大勢力￺さいだいせいりょく￻である　￹緑￺みどり￻の　￹羽￺はね￻の\nグループを　ライバル￹視￺し￻している。"
        jp_kanji:
          scarlet: "￹大￺おお￻きい　グループは　５０￹匹￺ぴき￻を\n￹超￺こ￻える。　エサを　￹求￺もと￻め　￹街中￺まちなか￻や　￹森￺もり￻を\n￹騒￺さわ￻がしく　￹飛￺と￻びまわる。"
          violet: "￹青￺あお￻い　￹羽￺はね￻の　グループは\n￹最大勢力￺さいだいせいりょく￻である　￹緑￺みどり￻の　￹羽￺はね￻の\nグループを　ライバル￹視￺し￻している。"
        en:
          scarlet: "The largest of their flocks can contain more\nthan 50 individuals. They fly around towns and\nforests, searching for food and making a racket."
          violet: "Blue-feathered Squawkabilly view their green-\nfeathered counterparts as rivals, since the latter\nmake up the largest, most powerful groups."
        fr:
          scarlet: "Les plus grandes volées de ce Pokémon comptent\nplus de 50 membres. Ils volent bruyamment dans\nles villes et les forêts à la recherche de nourriture."
          violet: "Les Tapatoès aux plumes bleues considèrent les\nspécimens aux plumes vertes comme leurs rivaux,\ncar ces derniers sont plus nombreux et puissants."
        it:
          scarlet: "I gruppi più grandi possono superare anche\ni 50 esemplari. Volano chiassosamente in boschi\ne città alla ricerca di cibo."
          violet: "Gli esemplari dalle piume blu vedono come\nrivali quelli dalle piume verdi, che costituiscono\nil gruppo più numeroso e potente."
        de:
          scarlet: "Große Schwärme können über 50 Exemplare\numfassen. Auf der Suche nach Nahrung fliegen\nsie lärmend durch Städte und Wälder."
          violet: "Schwärme mit blauem Gefieder betrachten ihre\nArtgenossen mit grünem Gefieder als Rivalen,\nda diese den größten Einfluss haben."
        es:
          scarlet: "Las bandadas más nutridas superan los 50\nindividuos. Sobrevuelan ruidosamente ciudades\ny bosques en busca de sustento."
          violet: "Los ejemplares de plumaje azulado sienten\nrivalidad por los de plumas verdes, pues sus\ngrupos son mayores y, por tanto, más fuertes."
        ko:
          scarlet: "큰 그룹은 50마리가 넘는다.\n먹이를 찾아 마을이나 숲을\n시끄럽게 날아다닌다."
          violet: "파란 깃털 그룹은\n최대 세력인 녹색 깃털 그룹을\n라이벌로 여기고 있다."
        zh_simp:
          scarlet: "庞大的队里成员能超过５０只。\n觅食时会在街上或森林里\n吵吵闹闹地四处盘旋。"
          violet: "蓝色羽毛的群体把\n势力最大的绿色羽毛的\n群体视为竞争对手。"
        zh_trad:
          scarlet: "龐大的團隊能達到５０隻以上。\n覓食時會在街上或森林裡\n吵吵鬧鬧地四處盤旋。"
          violet: "藍色羽毛的群體將\n勢力最大的綠色羽毛的\n群體視為勁敵。"
    squawkabilly_yellow_plumage:
      form_id: 2
      names:
        jp_kana: イエローフェザー
        jp_kanji: イエローフェザー
        en: Yellow Plumage
        fr: Plumage Jaune
        it: Piume Gialle
        de: Gelbgefiedert
        es: Plumaje Amarillo
        ko: 옐로 페더
        zh_simp: 黄羽毛
        zh_trad: 黃羽毛
      base_stats:
        hp: 82
        attack: 96
        defense: 51
        special_attack: 45
        special_defense: 51
