          scarlet: "某本书中记载的一种\n叫做猛恶菇的生物\n有可能就是这只宝可梦。"
          violet: "可疑的杂志曾介绍过某种\n恐龙与蘑菇合成的宝可梦，\n该宝可梦与它有些相似。"
        zh_trad:
