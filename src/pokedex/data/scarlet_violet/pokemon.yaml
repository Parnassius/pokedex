      descriptions:
        jp_kana:
          scarlet: "わずかな　￹風￺かぜ￻の￹流￺なが￻れに　うまく\n￹乗￺の￻ると　１￹度￺ど￻も　￹羽￺は￻ばたくことなく\nこの￹星￺ほし￻を　１￹周￺しゅう￻　できる。"
          violet: "￹羽音￺はおと￻を　￹立￺た￻てずに　￹空￺そら￻を　￹飛￺と￻ぶ。\n￹長￺なが￻い　￹尻尾￺しっぽ￻で　￹獲物￺えもの￻を　￹捕￺つか￻まえ\nキバで　￹急所￺きゅうしょ￻を　￹一突￺ひとつ￻き。"
        jp_kanji:
          scarlet: "わずかな　￹風￺かぜ￻の￹流￺なが￻れに　うまく\n￹乗￺の￻ると　１￹度￺ど￻も　￹羽￺は￻ばたくことなく\nこの￹星￺ほし￻を　１￹周￺しゅう￻　できる。"
          violet: "￹羽音￺はおと￻を　￹立￺た￻てずに　￹空￺そら￻を　￹飛￺と￻ぶ。\n￹長￺なが￻い　￹尻尾￺しっぽ￻で　￹獲物￺えもの￻を　￹捕￺つか￻まえ\nキバで　￹急所￺きゅうしょ￻を　￹一突￺ひとつ￻き。"
        en:
          scarlet: "If it succeeds in catching even a faint breeze\nproperly, it can circle the globe without\nflapping once."
          violet: "It flies soundlessly through the sky. It catches\nprey with its long tail, then lunges at the\nprey’s vulnerable spots with its fangs."
        fr:
          scarlet: "Le moindre courant d’air peut lui donner\nassez d’élan pour faire le tour du monde\nsans donner un seul coup d’aile."
          violet: "Il vole sans un bruit et capture ses proies\navec sa longue queue, puis il plante\nses crocs là où elles sont vulnérables."
        it:
          scarlet: "Se riesce a prendere correttamente una corrente\nd’aria, per quanto debole, può compiere\nun giro del globo senza mai sbattere le ali."
          violet: "Vola senza far rumore. Afferra le prede con\nla lunga coda e perfora il loro punto vitale\ncon i canini."
        de:
          scarlet: "Erwischt es auch nur ein Lüftchen auf die richtige\nWeise, kann es den Planeten umkreisen, ohne\nein einziges Mal mit den Flügeln zu schlagen."
          violet: "Skorgro fliegt lautlos durch die Luft. Beute fängt\nes mit seinem langen Schwanz, ehe es mit seinen\nFangzähnen ihre Schwachstelle attackiert."
        es:
          scarlet: "Si consigue aprovechar bien las leves\ncorrientes del aire, puede dar la vuelta\nal globo sin aletear ni una sola vez."
          violet: "Vuela sin hacer nada de ruido. Con su larga\ncola captura a sus presas y perfora sus\npuntos vitales con los colmillos."
        ko:
          scarlet: "적절히 바람의 흐름을 잘 타면\n한 번도 날개 치는 일 없이\n이 별을 일주할 수 있다."
          violet: "날갯소리를 내지 않고 하늘을 난다.\n긴 꼬리로 먹이를 잡아\n송곳니로 급소를 공격한다."
        zh_simp:
          scarlet: "只要顺利乘上微风，\n哪怕一次翅膀都不拍，\n也能环绕这个星球一周。"
          violet: "可以不发出振翅声而在空中飞行。\n用长长的尾巴捕捉猎物，\n再用牙齿一击刺中要害。"
        zh_trad:
          scarlet: "即使是微風，只要順利乘風滑翔，\n就能一次也不拍動翅膀地\n環繞這個星球一周。"
          violet: "可不發出振翅聲而在空中飛行。\n先用長長的尾巴攫住獵物，\n再用牙齒朝弱點給予一刺。"
