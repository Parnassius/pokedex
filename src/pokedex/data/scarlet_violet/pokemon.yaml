      descriptions:
        jp_kana:
          scarlet: "￹自分￺じぶん￻の　￹弱￺よわ￻さを　わきまえており\nいつも　￹群￺む￻れで　￹暮￺く￻らしている。\n１￹匹￺ぴき￻になると　やかましく　￹鳴￺な￻く。"
          violet: "￹大￺おお￻きな　グループを　￹作￺つく￻って\n￹行動￺こうどう￻する　￹習性￺しゅうせい￻。\nグループ￹同士￺どうし￻の　￹争￺あらそ￻いは　￹激￺はげ￻しい。"
        jp_kanji:
          scarlet: "￹自分￺じぶん￻の　￹弱￺よわ￻さを　わきまえており\nいつも　￹群￺む￻れで　￹暮￺く￻らしている。\n１￹匹￺ぴき￻になると　やかましく　￹鳴￺な￻く。"
          violet: "￹大￺おお￻きな　グループを　￹作￺つく￻って\n￹行動￺こうどう￻する　￹習性￺しゅうせい￻。\nグループ￹同士￺どうし￻の　￹争￺あらそ￻いは　￹激￺はげ￻しい。"
        en:
          scarlet: "Recognizing their own weakness, they\nalways live in a group. When alone, a\nStaravia cries noisily."
          violet: "They maintain huge flocks, although\nfierce scuffles break out between\nvarious flocks."
        fr:
          scarlet: "Conscient de sa faiblesse, il vit toujours en\ngroupe. Quand il se retrouve seul, il se met\nà piailler bruyamment."
          violet: "Il a coutume de vivre en larges volées.\nLes combats qui éclatent entre elles sont\ntrès violents."
        it:
          scarlet: "Conscio della propria debolezza, forma grandi\ngruppi con i propri simili. Quando si ritrova\nsolo, canta con voce insistente e fastidiosa."
          violet: "Ha l’abitudine di riunirsi in grandi stormi.\nLe zuffe tra gruppi diversi sono\nparticolarmente intense."
        de:
          scarlet: "Da sie sich ihrer eigenen Schwäche bewusst sind,\nleben Staravia stets in Schwärmen. Sind sie allein,\nstoßen sie laute Rufe aus."
          violet: "Es neigt dazu, sich in großen Schwärmen zu\nbewegen. Zwischen diesen kommt es zu heftigen\nKämpfen."
        es:
          scarlet: "Son conscientes de su debilidad, así que siempre\nviven en grupo. Si se encuentran solos, lloran a\ngritos."
          violet: "Viven siempre en grandes grupos y las disputas\nentre ellos son muy intensas."
        ko:
          scarlet: "자신의 약함을 잘 알고 있기에\n항상 무리를 지어 살고 있다.\n혼자가 되면 요란하게 운다."
          violet: "큰 그룹을 만들어\n행동하는 습성이 있다.\n그룹 간의 분쟁이 격하다."
        zh_simp:
          scarlet: "对自己的弱小心知肚明，\n所以平时总是群体生活。\n独处时会发出吵闹的叫声。"
          violet: "有组成庞大的团队来行动的习性。\n各个团队之间的争斗很激烈。"
        zh_trad:
          scarlet: "心知肚明自己的弱小，\n所以平時都是群體生活。\n單獨行動時會發出吵鬧的叫聲。"
          violet: "有組成龐大團隊\n來行動的習性。\n各個團隊之間的爭鬥很激烈。"
