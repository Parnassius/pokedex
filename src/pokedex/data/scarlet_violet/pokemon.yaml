      descriptions:
        jp_kana:
          scarlet: "￹森￺もり￻の　ポケモンたちに\nつぎつぎと　￹指示￺しじ￻を　だす　￹姿￺すがた￻から\n￹昔￺むかし￻は　￹人間￺にんげん￻だと　￹思￺おも￻われていた。"
          violet: "￹森￺もり￻の￹奥￺おく￻で　￹静￺しず￻かに　￹暮￺く￻らす。\nマントのような　￹紫￺むらさき￻の　￹毛￺け￻は\n￹歳￺とし￻を　￹重￺かさ￻ねるほどに　￹長￺なが￻くなる。"
        jp_kanji:
          scarlet: "￹森￺もり￻の　ポケモンたちに\nつぎつぎと　￹指示￺しじ￻を　だす　￹姿￺すがた￻から\n￹昔￺むかし￻は　￹人間￺にんげん￻だと　￹思￺おも￻われていた。"
          violet: "￹森￺もり￻の￹奥￺おく￻で　￹静￺しず￻かに　￹暮￺く￻らす。\nマントのような　￹紫￺むらさき￻の　￹毛￺け￻は\n￹歳￺とし￻を　￹重￺かさ￻ねるほどに　￹長￺なが￻くなる。"
        en:
          scarlet: "People used to mistake Oranguru for a human\nwhen they saw it issue command after\ncommand to the other Pokémon of the forest."
          violet: "This Pokémon lives quietly in the depths of the\nforest. The purple, cape-like fur gets longer\nand longer as Oranguru ages."
        fr:
          scarlet: "On le prenait autrefois pour un être humain,\ncar on le voyait souvent donner des ordres\naux Pokémon de la forêt."
          violet: "Il vit paisiblement au fin fond de la forêt.\nSa fourrure violette, qui ressemble à une cape,\ns’allonge au fil des années."
        it:
          scarlet: "Vedendolo dare ordini agli altri Pokémon\nnella foresta, in passato la gente lo\nscambiava spesso per un essere umano."
          violet: "Vive tranquillo nel profondo della foresta.\nI peli viola che lo ricoprono a mo’ di mantello\nsi allungano con il passare degli anni."
        de:
          scarlet: "Wegen der Art und Weise, wie sie den Pokémon\ndes Waldes ständig Befehle erteilen, hielt man\nsie vor langer Zeit für Menschen."
          violet: "Es lebt friedlich in den Tiefen des Waldes.\nSein lilafarbenes, umhangähnliches Fell wird\nimmer länger, je älter das Pokémon wird."
        es:
          scarlet: "Por la forma que tiene de dar una orden tras\notra a los Pokémon del bosque, en la antigüedad\nse pensaba que se trataba de un ser humano."
          violet: "Vive tranquilamente en las profundidades\ndel bosque. El pelo morado que le crece a\nmodo de capa se va alargando con los años."
        ko:
          scarlet: "숲의 포켓몬들에게\n계속해서 지시를 내리는 모습 때문에\n옛날에는 인간이었던 것으로 여겨지고 있다."
          violet: "숲속 깊은 곳에서 조용히 지낸다.\n망토처럼 생긴 보랏빛 털은\n나이를 먹을수록 점점 길어진다."
        zh_simp:
          scarlet: "它那对着森林的宝可梦们\n接二连三下达指示的样子，\n使其曾经被认为是人类。"
          violet: "在森林深处过着安静的生活。\n如同斗篷般的紫色体毛\n会随着年龄越来越长。"
        zh_trad:
          scarlet: "牠對著森林的寶可夢們\n接二連三下達指示的樣子，\n讓牠以前被認為是人類。"
          violet: "在森林深處過著安靜的生活。\n如同斗蓬般的紫色體毛\n會隨著年齡而越變越長。"
