          scarlet: "￹寒￺さむ￻い　￹季節￺きせつ￻に　￹現￺あらわ￻れる。\n￹雪山￺ゆきやま￻で　￹亡￺な￻くなった　ポケモンや\n￹人￺ひと￻の　￹生￺う￻まれ￹変￺か￻わりと　￹言￺い￻われる。"
          violet: "￹氷￺こおり￻で　できた　￹鎖￺くさり￻を　￹使￺つか￻い\n￹相手￺あいて￻を　￹締￺し￻め￹上￺あ￻げると　そのまま\n￹一気￺いっき￻に　￹凍￺こお￻らせてしまうのだ。"
        jp_kanji:
          scarlet: "￹寒￺さむ￻い　￹季節￺きせつ￻に　￹現￺あらわ￻れる。\n￹雪山￺ゆきやま￻で　￹亡￺な￻くなった　ポケモンや\n￹人￺ひと￻の　￹生￺う￻まれ￹変￺か￻わりと　￹言￺い￻われる。"
          violet: "￹氷￺こおり￻で　できた　￹鎖￺くさり￻を　￹使￺つか￻い\n￹相手￺あいて￻を　￹締￺し￻め￹上￺あ￻げると　そのまま\n￹一気￺いっき￻に　￹凍￺こお￻らせてしまうのだ。"
        en:
          scarlet: "Cryogonal appear during cold seasons. It is said\nthat people and Pokémon who die on snowy\nmountains are reborn into these Pokémon."
          violet: "Cryogonal uses its chains of ice to constrict its\nopponents and then flash-freezes them where\nthey stand."
        fr:
          scarlet: "Il apparaît lors des saisons froides. On dit\nqu’il est la réincarnation des personnes et des\nPokémon disparus dans la neige des montagnes."
          violet: "Il enserre ses ennemis à l’aide de ses chaînes\nde glace et les gèle en un instant."
        it:
          scarlet: "Appare nelle stagioni fredde. Si dice sia\nla reincarnazione di Pokémon ed esseri umani\nscomparsi sulle montagne innevate."
          violet: "Avvolge il nemico usando delle catene fatte\ndi ghiaccio e lo congela così com’è in un istante."
        de:
          scarlet: "Sie erscheinen in der kalten Jahreszeit. Man sagt,\nsie seien Reinkarnationen von Pokémon und\nMenschen, die auf verschneiten Bergen starben."
          violet: "Dieses Pokémon nutzt seine Ketten aus Eis,\num Gegner zu umschlingen und sie auf der\nStelle gefrieren zu lassen."
        es:
          scarlet: "Aparece en las estaciones frías. Se dice que es\nla reencarnación de las personas y los Pokémon\nque han desaparecido en las montañas nevadas."
          violet: "Rodea al rival con cadenas de cristales de hielo\ny, una vez inmovilizado, lo congela al instante."
        ko:
          scarlet: "추운 계절에 나타난다.\n설산에서 죽은 포켓몬이나 사람이\n환생한 것이라고 전해진다."
          violet: "얼음으로 된 사슬로\n상대를 휘감은 다음\n그대로 단숨에 얼려 버린다."
        zh_simp:
          scarlet: "会出现在寒冷的季节。\n据说它是由在雪山死去的\n宝可梦或人类转生而来的。"
          violet: "会用冰制的锁链\n把对手勒紧之后，\n一口气将其冻成冰块。"
        zh_trad:
          scarlet: "會出現在寒冷的季節。\n據說牠是在雪山死去的\n寶可夢或人類轉生而來的。"
          violet: "會用冰製的鎖鏈\n把對手勒緊之後，\n就這樣一口氣凍成冰塊。"
