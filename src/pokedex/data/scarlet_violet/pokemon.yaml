          scarlet: "￹敵￺てき￻に　￹襲￺おそ￻われると　￹太￺ふと￻い　￹棘￺とげ￻を\n￹胴体￺どうたい￻から　￹突￺つ￻き￹出￺だ￻して　￹反撃￺はんげき￻。\n￹身￺み￻を￹切￺き￻る　￹覚悟￺かくご￻の　￹危険￺きけん￻な　￹技￺わざ￻。"
          violet: "￹池￺いけ￻や　￹沼￺ぬま￻の　￹水底￺みなそこ￻で　￹暮￺く￻らす。\n￹背中￺せなか￻に　ウパーを　￹乗￺の￻せて　￹泳￺およ￻ぎ\n￹対岸￺たいがん￻まで　￹運￺はこ￻んであげる。"
        jp_kanji:
          scarlet: "￹敵￺てき￻に　￹襲￺おそ￻われると　￹太￺ふと￻い　￹棘￺とげ￻を\n￹胴体￺どうたい￻から　￹突￺つ￻き￹出￺だ￻して　￹反撃￺はんげき￻。\n￹身￺み￻を￹切￺き￻る　￹覚悟￺かくご￻の　￹危険￺きけん￻な　￹技￺わざ￻。"
          violet: "￹池￺いけ￻や　￹沼￺ぬま￻の　￹水底￺みなそこ￻で　￹暮￺く￻らす。\n￹背中￺せなか￻に　ウパーを　￹乗￺の￻せて　￹泳￺およ￻ぎ\n￹対岸￺たいがん￻まで　￹運￺はこ￻んであげる。"
        en:
          scarlet: "When attacked, this Pokémon will retaliate\nby sticking thick spines out from its body. It’s\na risky move that puts everything on the line."
          violet: "It lives at the bottom of ponds and swamps.\nIt will carry Wooper on its back and ferry\nthem across water from one shore to the other."
        fr:
          scarlet: "Quand on l’attaque, il riposte en faisant sortir\nde grosses épines de son tronc, une dangereuse\ntechnique qui montre qu’il est prêt à tout risquer."
          violet: "Ce Pokémon vit au fond des étangs et des marais.\nIl porte des Axoloto sur son dos et nage jusqu’à\nla rive opposée pour les aider à traverser."
        it:
          scarlet: "Quando si trova sotto attacco, controbatte\nsfoderando le spesse spine retrattili,\nmettendo così a repentaglio anche se stesso."
          violet: "Vive sui fondali degli stagni e delle paludi.\nSi carica i Wooper sulla schiena e li traghetta\nda una sponda all’altra."
        de:
          scarlet: "Wird Suelord angegriffen, wehrt es sich, indem es\ndicke Stacheln ausfährt. Setzt es diese riskante\nAttacke ein, ist es bereit, aufs Ganze zu gehen."
          violet: "Es lebt auf dem Grund von Teichen und Sümpfen.\nMan kann beobachten, wie es Felino auf seinem\nRücken von einem Ufer zum anderen befördert."
        es:
          scarlet: "Cuando se siente amenazado, repele al\nenemigo con sus gruesas púas retráctiles. Esta\ntécnica tan peligrosa es un arma de doble filo."
          violet: "Vive en el fondo de los estanques y\npantanos. Nada con Wooper sobre el lomo\npara ayudarlos a cruzar de una orilla a otra."
        ko:
          scarlet: "적에게 공격을 받으면 몸에서\n굵은 가시를 내지르며 반격한다.\n몸이 끊어질 각오가 필요한 위험한 기술이다."
          violet: "연못이나 늪의 밑바닥에서 산다.\n등에 우파를 태우고 헤엄치며\n건너편까지 옮겨다 준다."
        zh_simp:
          scarlet: "一旦遭到敌人袭击，就会从\n躯体伸出粗粗的刺来反击。\n此招式很危险，需有切断身体的觉悟。"
          violet: "栖息在池塘或沼泽的底部。\n会让乌波坐在自己背上，\n然后游着泳把它送到对岸去。"
        zh_trad:
          scarlet: "一旦遭到敵人襲擊，就會從\n胴體伸出粗壯的刺來反擊。\n是需有覺悟承受劇痛的危險招式。"
          violet: "棲息在池塘和沼澤底部。\n會讓烏波坐在自己背上，\n然後游泳送到對岸去。"
