          scarlet: "Covered by a shaggy coat, it is resistant to the\ncold. Its tusks of ice thicken when it snows."
          violet: "Because the long hair all over its body\nobscures its sight, it just keeps charging\nrepeatedly."
        fr:
          scarlet: "Sa longue et épaisse fourrure le protège\ndu froid. Ses défenses de glace deviennent\nplus épaisses quand il neige."
          violet: "Ses longs poils masquent ses yeux et\nl’empêchent de voir. Cela peut le pousser\nà charger plusieurs fois d’affilée."
        it:
          scarlet: "Il suo fitto pelo lo protegge dal freddo.\nHa zanne di ghiaccio che si ispessiscono\nquando nevica."
          violet: "Poiché il lungo pelo sul suo corpo gli\nimpedisce di vedere, non fa che caricare\nil nemico senza tregua."
        de:
          scarlet: "Durch sein langes Fell ist es resistent\ngegen Kälte. Seine Stoßzähne aus Eis\nwerden dicker, wenn es schneit."
          violet: "Da sein langes Fell ihm die Sicht verdeckt,\nprescht es einfach unablässig immer wieder\nnach vorne."
        es:
          scarlet: "Su tupido pelaje lo protege del frío.\nSus colmillos de hielo se engruesan\ncuando nieva."
          violet: "Como su largo pelaje le impide ver\ncon claridad, carga hacia delante\nrepetidamente."
        ko:
          scarlet: "긴 털에 뒤덮여 있기에\n추위에도 강하며 얼음 이빨은\n눈이 내리면 더욱 두꺼워진다."
          violet: "긴 털로 덮여 있어서\n눈앞의 상태를 모르고\n한결같이 돌진만을 반복한다."
        zh_simp:
          scarlet: "全身被长长的体毛覆盖着，\n非常耐寒。它的冰牙在\n下雪时会变得更粗。"
          violet: "由于被长长的体毛所覆盖，\n所以看不清眼前的情况，\n只会一个劲地猛冲。"
        zh_trad:
          scarlet: "全身被長長的體毛覆蓋，\n非常耐寒。冰的獠牙在\n下雪時會變得更粗。"
          violet: "由於被長長的體毛覆蓋，\n所以看不清眼前的情況，\n只會不斷地往前猛衝。"
