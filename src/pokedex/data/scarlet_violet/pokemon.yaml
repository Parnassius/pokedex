          violet: "のんびりとした　￹性格￺せいかく￻で\n￹泳￺およ￻いでいては　￹川底￺かわぞこ￻の　￹岩￺いわ￻や\n￹船底￺ふなぞこ￻に　￹頭￺あたま￻を　ぶつけている。"
        jp_kanji:
          scarlet: "のんびりとした　￹性格￺せいかく￻で\n￹気￺き￻ままに　￹泳￺およ￻いでは　いつも\n￹船底￺ふなぞこ￻に　￹頭￺あたま￻を　ぶつけている。"
          violet: "のんびりとした　￹性格￺せいかく￻で\n￹泳￺およ￻いでいては　￹川底￺かわぞこ￻の　￹岩￺いわ￻や\n￹船底￺ふなぞこ￻に　￹頭￺あたま￻を　ぶつけている。"
        en:
          scarlet: "This carefree Pokémon has an easygoing nature.\nWhile swimming, it always bumps into boat hulls."
          violet: "Due to its relaxed and carefree attitude, it often\nbumps its head on riverbed boulders and boat\nhulls as it swims."
        fr:
          scarlet: "Maraiste est un Pokémon décontracté.\nComme il nage avec insouciance, il se cogne\ntoujours la tête contre la coque des bateaux."
          violet: "C’est un Pokémon très distrait. Quand il nage,\nil se cogne souvent la tête sur les rochers dans\nles rivières ou sur les coques de bateaux."
        it:
          scarlet: "Ha un carattere tranquillo e quando nuota\nspensierato urta sempre la testa contro\ngli scafi delle barche."
          violet: "Per via della sua indole rilassata e noncurante,\nquando nuota urta spesso i fondali rocciosi dei\nfiumi e gli scafi delle barche."
        de:
          scarlet: "Dieses unbekümmerte Pokémon schwimmt\ngemächlich umher und stößt dabei mit seinem\nKopf ständig gegen Schiffsrümpfe."
          violet: "Dieses unbekümmerte Pokémon stößt beim\nSchwimmen oft mit dem Kopf gegen Felsen im\nFlussbett oder gegen Schiffsrümpfe."
        es:
          scarlet: "Este Pokémon de carácter tranquilo nada\ndespreocupado y siempre termina chocando\nde cabeza contra el casco de los barcos."
          violet: "Debido a su despreocupada actitud, al nadar\nsuele chocar de cabeza contra las rocas del\nlecho de los ríos y el casco de los barcos."
        ko:
          scarlet: "느긋한 성격으로\n늘 제멋대로 헤엄치다가\n배의 밑바닥에 머리를 들이받곤 한다."
          violet: "느긋한 성격으로\n헤엄치다가 강바닥의 돌과\n배의 밑바닥에 머리를 들이받곤 한다."
        zh_simp:
          scarlet: "性格悠闲自得。\n随心所欲游动时，\n头总会撞到船底。"
          violet: "性格悠闲自得。\n游动时头总会撞到\n河底的岩石或船底。"
        zh_trad:
          scarlet: "性格悠閒自得。\n漫無目的地隨意游動時，\n頭總會撞到船底。"
          violet: "性格悠閒自得，\n游泳時腦袋會撞到\n河底的岩石或船底。"
