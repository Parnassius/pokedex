      descriptions:
        jp_kana:
          scarlet: "ゴムボールのように　よく　￹弾￺はず￻む。\n￹尻尾￺しっぽ￻を　￹振￺ふ￻りまわし　￹自分￺じぶん￻よりも\n￹大￺おお￻きな　￹相手￺あいて￻に　￹立￺た￻ち￹向￺む￻かう。"
          violet: "まるくて　￹大￺おお￻きな　￹尻尾￺しっぽ￻には\n￹成長￺せいちょう￻に　￹必要￺ひつよう￻な　￹栄養￺えいよう￻が\nたっぷりと　￹詰￺つ￻まっているのだ。"
        jp_kanji:
          scarlet: "ゴムボールのように　よく　￹弾￺はず￻む。\n￹尻尾￺しっぽ￻を　￹振￺ふ￻りまわし　￹自分￺じぶん￻よりも\n￹大￺おお￻きな　￹相手￺あいて￻に　￹立￺た￻ち￹向￺む￻かう。"
          violet: "まるくて　￹大￺おお￻きな　￹尻尾￺しっぽ￻には\n￹成長￺せいちょう￻に　￹必要￺ひつよう￻な　￹栄養￺えいよう￻が\nたっぷりと　￹詰￺つ￻まっているのだ。"
        en:
          scarlet: "Its tail bounces like a rubber ball. It flings that tail\naround to fight opponents bigger than itself."
          violet: "Its tail is packed full of the nutrients it needs\nto grow."
        fr:
          scarlet: "Sa queue est une véritable balle rebondissante.\nIl s’en sert comme d’une massue lorsqu’il affronte\ndes adversaires de taille imposante."
          violet: "La sphère au bout de sa queue contient\nles nutriments nécessaires à sa croissance."
        it:
          scarlet: "Rimbalza su e giù come una pallina di gomma.\nLotta contro avversari più grandi di lui agitando\nla coda."
          violet: "Nella sua grande coda rotonda conserva\ntutte le sostanze nutritive di cui ha bisogno\nper crescere sano e forte."
        de:
          scarlet: "Es hüpft wie ein Gummiball und bekämpft\ngrößere Gegner, indem es seinen Schweif\nnach ihnen schwingt."
          violet: "Sein großer, runder Schweif steckt voller\nNährstoffe, die es für sein Wachstum braucht."
        es:
          scarlet: "Rebota como una pelota. Para luchar contra\nenemigos más grandes, agita la cola en el aire."
          violet: "Almacena los nutrientes necesarios para su\ncrecimiento en una bola al final de su cola."
        ko:
          scarlet: "고무공처럼 잘 튀는\n꼬리를 휘두르며 자신보다도\n커다란 상대에게 맞선다."
          violet: "둥글고 큰 꼬리에는\n성장에 필요한 영양이\n듬뿍 담겨 있다."
        zh_simp:
          scarlet: "像皮球一般弹性十足。\n会挥舞尾巴来对抗\n体形比自己还大的对手。"
          violet: "又圆又大的尾巴里\n贮满了它在成长时\n所需要的营养。"
        zh_trad:
          scarlet: "身體就像皮球般彈性十足。\n會揮甩尾巴來對抗\n體型比自己還大的對手。"
          violet: "圓圓大大的尾巴裡\n充滿了牠在成長時\n所需要的營養。"
