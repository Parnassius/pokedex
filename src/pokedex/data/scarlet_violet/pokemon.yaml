      descriptions:
        jp_kana:
          scarlet: "￹大￺おお￻きくて　￹頑丈￺がんじょう￻な　ハンマーを\n￹作￺つく￻るために　キリキザンの　￹群￺む￻れを\n￹襲￺おそ￻って　￹金属￺きんぞく￻を　￹集￺あつ￻める。"
          violet: "￹金属￺きんぞく￻の　ガラクタ￹山￺やま￻が　￹棲￺す￻み￹処￺か￻。\nハンマーの　￹強度￺きょうど￻を　￹試￺ため￻すため\n￹仲間同士￺なかまどうし￻で　￹激￺はげ￻しく　￹打￺う￻ち￹合￺あ￻う。"
        jp_kanji:
          scarlet: "￹大￺おお￻きくて　￹頑丈￺がんじょう￻な　ハンマーを\n￹作￺つく￻るために　キリキザンの　￹群￺む￻れを\n￹襲￺おそ￻って　￹金属￺きんぞく￻を　￹集￺あつ￻める。"
          violet: "￹金属￺きんぞく￻の　ガラクタ￹山￺やま￻が　￹棲￺す￻み￹処￺か￻。\nハンマーの　￹強度￺きょうど￻を　￹試￺ため￻すため\n￹仲間同士￺なかまどうし￻で　￹激￺はげ￻しく　￹打￺う￻ち￹合￺あ￻う。"
        en:
          scarlet: "This Pokémon will attack groups of Pawniard and\nBisharp, gathering metal from them in order to\ncreate a large and sturdy hammer."
          violet: "These Pokémon make their homes in piles of\nscrap metal. They test the strength of each\nother’s hammers by smashing them together."
        fr:
          scarlet: "Ce Pokémon attaque des cohortes de Scalpion et\nde Scalproie pour rassembler le métal nécessaire\nà la confection d’un grand marteau robuste."
          violet: "Ce Pokémon vit dans des tas de ferraille.\nPour tester la force de ses marteaux, il les\ncogne contre ceux de ses congénères."
        it:
          scarlet: "Assalta i branchi capeggiati da Bisharp per\nprocurarsi il metallo necessario a realizzare\nil suo martello grande e resistente."
          violet: "Nidifica in montagne di ferraglia e testa la forza\ndel proprio martello battendolo violentemente\ncontro quello dei propri simili."
        de:
          scarlet: "Es überfällt Gruppen von Gladiantri und Caesurio,\num Metall zu sammeln, das es zum Herstellen\nseines großen, robusten Hammers benötigt."
          violet: "Sie wohnen in Haufen aus Metallschrott. Um die\nStärke ihrer Hämmer zu testen, schlagen sie diese\nkräftig gegeneinander."
        es:
          scarlet: "Asalta el séquito entero de un Bisharp para\nreunir metal con el que forjar su enorme y\nrobusto martillo."
          violet: "Convierte montañas de chatarra en su guarida.\nEstos Pokémon suelen medir la fuerza de sus\nmartillos golpeándolos contra los de los demás."
        ko:
          scarlet: "크고 튼튼한 해머를 만들기 위해\n절각참 무리를 습격해서\n금속을 모은다."
          violet: "금속으로 가득한 고철더미를 거처로 삼는다.\n해머의 강도를 시험하기 위해\n동료끼리 격렬하게 부딪친다."
        zh_simp:
          scarlet: "为了制造又大又坚固的锤子，\n会去袭击劈斩司令的群体\n然后收集金属。"
          violet: "栖息在堆满破铜烂铁的地方。\n为了测试锤子的强度，\n会和伙伴们激烈地敲打彼此。"
        zh_trad:
          scarlet: "為了製作又大又堅固的\n錘子，會去襲擊劈斬司令\n的群體，藉以收集金屬。"
          violet: "棲息在堆滿破銅爛鐵的地方。\n為了測試錘子的強度，\n會和夥伴們激烈地敲打彼此。"
