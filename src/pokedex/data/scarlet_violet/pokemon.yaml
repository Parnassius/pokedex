      descriptions:
        jp_kana:
          scarlet: "￹杖￺つえ￻の　￹先￺さき￻の　￹炎￺ほのお￻で　￹焦￺こ￻げ￹跡￺あと￻を\n￹地面￺じめん￻に　￹残￺のこ￻す。　￹昔￺むかし￻の　￹人￺ひと￻は\nその　￹形￺かたち￻で　￹占￺うらな￻いをしていた。"
          violet: "￹念力￺ねんりき￻で　￹炎￺ほのお￻を　￹操￺あやつ￻る。\n￹摂氏￺せっし￻３０００￹度￺ど￻の　￹炎￺ほのお￻の　￹渦￺うず￻が\n￹相手￺あいて￻を　￹包￺つつ￻みこみ　￹焼￺や￻きつくす。"
        jp_kanji:
          scarlet: "￹杖￺つえ￻の　￹先￺さき￻の　￹炎￺ほのお￻で　￹焦￺こ￻げ￹跡￺あと￻を\n￹地面￺じめん￻に　￹残￺のこ￻す。　￹昔￺むかし￻の　￹人￺ひと￻は\nその　￹形￺かたち￻で　￹占￺うらな￻いをしていた。"
          violet: "￹念力￺ねんりき￻で　￹炎￺ほのお￻を　￹操￺あやつ￻る。\n￹摂氏￺せっし￻３０００￹度￺ど￻の　￹炎￺ほのお￻の　￹渦￺うず￻が\n￹相手￺あいて￻を　￹包￺つつ￻みこみ　￹焼￺や￻きつくす。"
        en:
          scarlet: "It leaves burn marks in the ground with the flame\nat the tip of its wand. Long ago, people used the\nshapes of these burn marks for divination."
          violet: "It controls flames telekinetically, trapping its\nfoes in a fiery vortex surpassing 5,400 degrees\nFahrenheit and burning them to a crisp."
        fr:
          scarlet: "Il laisse des traces de brûlure sur le sol avec\nla flamme au bout de son bâton. Les formes de\nces marques étaient jadis utilisées en divination."
          violet: "Il manipule le feu avec ses pouvoirs télékinétiques\net consume ses adversaires en les enveloppant\ndans un tourbillon de flammes à 3 000 °C."
        it:
          scarlet: "Usa la fiamma sulla bacchetta per lasciare a terra\ntracce di bruciato. Gli antichi ne interpretavano\nla forma nelle loro pratiche divinatorie."
          violet: "Controlla il fuoco con i suoi poteri psichici.\nAvvolge i nemici in un vortice di fiamme\na 3.000 ºC e li incenerisce."
        de:
          scarlet: "Mit der Flamme an der Spitze seines Stabes\nzeichnet es Brandspuren auf den Boden. Früher\nhaben Menschen daraus Weissagungen gelesen."
          violet: "Es kontrolliert Flammen mithilfe von Telekinese\nund hüllt Gegner in 3000 ℃ heiße Wirbel aus\nFeuer, die sie zu Asche verbrennen."
        es:
          scarlet: "Deja marcas en el suelo con la punta candente\nde su varita. Las gentes de antaño practicaban\nla adivinación interpretando dichas marcas."
          violet: "Maneja las llamas con sus poderes psíquicos.\nEnvuelve a su oponente en un vórtice de fuego\na 3000 ºC y lo calcina."
        ko:
          scarlet: "지팡이 끝의 불꽃으로\n땅에 탄 흔적을 남긴다.\n옛날 사람들은 그 형태를 보고 점을 쳤다."
          violet: "염력으로 불꽃을 조종한다.\n섭씨 3000도의 불꽃으로 된 소용돌이로\n상대를 휘감은 다음 태워 버린다."
        zh_simp:
          scarlet: "会用木杖前端的火焰在地上\n留下烧焦的痕迹。以前的人会\n通过该痕迹的形状来占卜。"
          violet: "会用念力操纵火焰。\n摄氏３０００度的火焰旋涡\n能包住对手并将其烧成灰烬。"
        zh_trad:
          scarlet: "會用木杖前端的火焰在地上\n留下燒焦的痕跡。過去的人\n會透過該痕跡的形狀來占卜。"
          violet: "能用念力操控火焰。\n攝氏３０００度的火焰旋渦會\n包圍對手並將其燒成灰燼。"
