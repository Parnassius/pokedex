        - healer
        - anticipation
      hidden_ability: magic_bounce
      descriptions:
        jp_kana:
          scarlet: "たとえ　￹幸￺しあわ￻せな　￹気持￺きも￻ちであっても\n￹昂￺たかぶ￻った　￹感情￺かんじょう￻は　￹凄￺すさ￻まじい\n￹騒音￺そうおん￻として　￹感￺かん￻じるらしい。"
          violet: "￹強￺つよ￻い　￹感情￺かんじょう￻を　￹発￺はっ￻するものを\n￹見￺み￻つけしだい　おさげで　￹叩￺たた￻きのめし\n￹意識￺いしき￻を　￹奪￺うば￻って　￹黙￺だま￻らせる。"
        jp_kanji:
          scarlet: "たとえ　￹幸￺しあわ￻せな　￹気持￺きも￻ちであっても\n￹昂￺たかぶ￻った　￹感情￺かんじょう￻は　￹凄￺すさ￻まじい\n￹騒音￺そうおん￻として　￹感￺かん￻じるらしい。"
          violet: "￹強￺つよ￻い　￹感情￺かんじょう￻を　￹発￺はっ￻するものを\n￹見￺み￻つけしだい　おさげで　￹叩￺たた￻きのめし\n￹意識￺いしき￻を　￹奪￺うば￻って　￹黙￺だま￻らせる。"
        en:
          scarlet: "To this Pokémon, strong emotions apparently feel\nlike incredibly loud noises—even if the emotions\nare happy ones."
          violet: "The moment this Pokémon finds someone who’s\nemitting strong emotions, it will pummel them\nsenseless with its braids to silence them."
        fr:
          scarlet: "On dit que lorsqu’il perçoit des émotions intenses,\nc’est comme s’il entendait un bruit effroyable,\nmême quand il s’agit de sentiments de joie."
          violet: "S’il croise un être qui ressent des émotions trop\nfortes, pour faire taire celles-ci, il le frappera de\nses tresses jusqu’à ce qu’il perde connaissance."
        it:
          scarlet: "Pare che percepisca come un frastuono\nintollerabile qualsiasi emozione forte,\ncompresa la felicità."
          violet: "Non appena s’imbatte in qualcuno che trasmette\nemozioni troppo forti, lo colpisce con i codini\nper tramortirlo e metterlo così a tacere."
        de:
          scarlet: "Starke Emotionen anderer Lebewesen sind für\ndieses Pokémon offenbar wie ohrenbetäubender\nLärm. Das gilt auch für Glücksgefühle."
          violet: "Entdeckt es jemanden, der starke Emotionen\naussendet, bringt es ihn sofort zum Schweigen,\nindem es ihn mit den Zöpfen bewusstlos schlägt."
        es:
          scarlet: "Parece que percibe cualquier emoción exaltada\ncomo si fuera un ruido intolerable, incluso la\nfelicidad."
          violet: "En cuanto encuentra a alguien que transmite\nemociones intensas, lo golpea con sus\nmechones para dejarlo sin sentido y acallarlas."
        ko:
          scarlet: "아무리 행복한 감정일지라도\n고조된 감정이라면 무엇이든\n엄청난 소음으로 느낀다고 한다."
          violet: "강한 감정을 발산하는 것을 발견하면\n머리의 술로 곧장 때려눕혀서\n의식을 빼앗아 조용하게 만든다."
        zh_simp:
          scarlet: "高昂的情绪在它看来\n似乎都是强烈的噪音，\n即使是幸福的情绪也不例外。"
          violet: "一旦发现了情绪激昂的对象，\n就会用辫子毒打，直到对方\n失去意识而沉默下来为止。"
        zh_trad:
          scarlet: "高亢的情緒在牠看來\n似乎都是強烈的噪音，\n即使是幸福的心情也不例外。"
          violet: "只要一發現情緒激昂的傢伙，\n就會用辮子毒打，直到對方\n失去意識而沉默下來為止。"
