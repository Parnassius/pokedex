      descriptions:
        jp_kana:
          scarlet: "￹同￺おな￻じ￹色￺いろ￻で　￹集￺あつ￻まり　￹群￺む￻れる。\nいちばんの　￹敵￺てき￻は　￹赤￺あか￻い￹色￺いろ￻の\nバスラオの　￹群￺む￻れなのだ。"
          violet: "あごの　￹力￺ちから￻が　とても　￹強￺つよ￻く\n￹鉄板￺てっぱん￻に　￹歯形￺はがた￻が　つくほど。\n￹性格￺せいかく￻も　￹非常￺ひじょう￻に　￹獰猛￺どうもう￻。"
        jp_kanji:
          scarlet: "￹同￺おな￻じ￹色￺いろ￻で　￹集￺あつ￻まり　￹群￺む￻れる。\nいちばんの　￹敵￺てき￻は　￹赤￺あか￻い￹色￺いろ￻の\nバスラオの　￹群￺む￻れなのだ。"
          violet: "あごの　￹力￺ちから￻が　とても　￹強￺つよ￻く\n￹鉄板￺てっぱん￻に　￹歯形￺はがた￻が　つくほど。\n￹性格￺せいかく￻も　￹非常￺ひじょう￻に　￹獰猛￺どうもう￻。"
        en:
          scarlet: "These Pokémon form schools with others of the\nsame color. The greatest foe of a school of blue\nBasculin is a school of red Basculin."
          violet: "The power of its jaws is immense—enough to\nleave teeth marks in iron sheets. Its personality\nis also extremely vicious."
        fr:
          scarlet: "Ils forment des bancs entre spécimens de\nmême couleur. Leurs plus grands ennemis\nsont les Bargantua rouges."
          violet: "Ce Pokémon extrêmement féroce est doté d’une\nmâchoire si puissante qu’il peut laisser la marque\nde ses dents sur des plaques de métal."
        it:
          scarlet: "Gli esemplari dello stesso colore si riuniscono\na formare dei banchi. I loro acerrimi nemici sono\ni banchi di Basculin di colore rosso."
          violet: "Ha una forza tale nelle mascelle da lasciare\nil segno dei denti su una lastra di ferro.\nHa anche un carattere estremamente feroce."
        de:
          scarlet: "Sie schließen sich mit gleichfarbigen Artgenossen\nzu Schwärmen zusammen. Ihre Erzfeinde sind\nSchwärme von rotlinigen Barschuft."
          violet: "Es ist von Natur aus sehr brutal. Sein Kiefer ist\nso stark, dass es Zahnabdrücke auf Stahlplatten\nhinterlassen kann."
        es:
          scarlet: "Forman bancos de ejemplares del mismo color.\nSus enemigos acérrimos son los Basculin de raya\nroja."
          violet: "Tiene una mandíbula tan fuerte que puede dejar\nla marca de sus dientes en láminas de acero.\nPosee un carácter extremadamente violento."
        ko:
          scarlet: "같은 색끼리 모여서 무리를 이룬다.\n최대의 적은 빨간색 배쓰나이 무리다."
          violet: "무는 힘이 매우 강하여\n철판에 이빨 자국이 남을 정도다.\n성격도 매우 사납다."
        zh_simp:
          scarlet: "颜色相同的会集结成群。\n最大的敌人是红色的\n野蛮鲈鱼的群体。"
          violet: "颚部的力道强大无比，\n连铁板都能留下齿痕。\n性格也是非常地凶猛。"
        zh_trad:
          scarlet: "會依體色集結成群。\n最大的敵人是紅色的\n野蠻鱸魚的群體。"
          violet: "顎部的力道強大無比，\n連鐵板都能留下齒痕。\n性格也是非常地凶猛。"
    basculin_white_striped_form:
