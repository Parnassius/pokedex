      descriptions:
        jp_kana:
          scarlet: "￹太陽￺たいよう￻を　￹盗￺ぬす￻んだ　￹幼虫￺ようちゅう￻と\n￹呼￺よ￻ばれていた。　ツノから　￹噴￺ふ￻き￹出￺だ￻す\n￹炎￺ほのお￻は　￹鉄板￺てっぱん￻も　￹焼￺や￻き￹切￺き￻る。"
          violet: "￹大昔￺おおむかし￻は　￹太陽￺たいよう￻の￹遣￺つか￻い　と\n￹崇￺あが￻められたが　しばしば　￹山火事￺やまかじ￻を\n￹起￺お￻こすこともあり　￹煙￺けむ￻たがられた。"
        jp_kanji:
          scarlet: "￹太陽￺たいよう￻を　￹盗￺ぬす￻んだ　￹幼虫￺ようちゅう￻と\n￹呼￺よ￻ばれていた。　ツノから　￹噴￺ふ￻き￹出￺だ￻す\n￹炎￺ほのお￻は　￹鉄板￺てっぱん￻も　￹焼￺や￻き￹切￺き￻る。"
          violet: "￹大昔￺おおむかし￻は　￹太陽￺たいよう￻の￹遣￺つか￻い　と\n￹崇￺あが￻められたが　しばしば　￹山火事￺やまかじ￻を\n￹起￺お￻こすこともあり　￹煙￺けむ￻たがられた。"
        en:
          scarlet: "This Pokémon was called the Larva That Stole\nthe Sun. The fire Larvesta spouts from its horns\ncan cut right through a sheet of iron."
          violet: "In ancient times, Larvesta was worshiped as the\nemissary of the sun. However, it was also viewed\nas a burden since it often caused forest fires."
        fr:
          scarlet: "On l’appelait autrefois « la larve qui a dérobé\nle soleil ». Les flammes qui jaillissent de ses\ncornes peuvent découper une plaque de fer."
          violet: "On le vénérait autrefois comme s’il avait été\nenvoyé par le soleil, mais on se méfiait aussi\nde lui à cause des feux de forêt qu’il provoquait."
        it:
          scarlet: "Veniva chiamato la \"larva che ha rubato il sole\".\nCon le fiamme che lancia dalle corna può\ntagliare anche lastre di ferro."
          violet: "Nell’antichità veniva adorato come messaggero\ndel sole, ma era anche malvisto a causa della sua\npropensione a provocare incendi boschivi."
        de:
          scarlet: "Man nannte es die „Larve, welche die Sonne\nstahl“. Die Flammen, die es aus seinen Hörnern\nfeuert, können selbst Eisenplatten zerteilen."
          violet: "Vor langer Zeit wurde es zwar als Bote der Sonne\nverehrt, aber da es öfter Waldbrände verursachte,\nhüteten sich die Leute auch vor ihm."
        es:
          scarlet: "Antaño lo llamaron la Larva que Hurtó el Sol.\nLas llamas que brotan de sus cuernos pueden\nfundir sin problema una plancha de acero."
          violet: "Antaño se lo reverenciaba como mensajero del\nsol, pero también era objeto de recelo por los\nincendios forestales que provocaba a menudo."
        ko:
          scarlet: "태양을 훔친 유충이라 불렸었다.\n뿔을 통해 분출하는 불꽃은\n철판도 끊어 버릴 수 있다."
          violet: "먼 옛날에는 태양의 사자라며\n떠받들어졌으나, 여러 차례\n산불을 일으킨 까닭에 멀리하게 되었다."
        zh_simp:
          scarlet: "过去被称为盗日幼虫。\n从角喷出来的火焰\n就连铁板都能烧断。"
          violet: "在遥远的过去曾被信奉成\n太阳的使者，但却因为常常\n引发森林大火而被人们疏远。"
        zh_trad:
          scarlet: "過去被稱為盜日幼蟲。\n從角噴出來的火焰，\n就連鐵板都能燒斷。"
          violet: "在遙遠的過去曾被信奉成\n太陽的使者，但卻因為常常\n引發森林大火而遭人們疏遠。"
