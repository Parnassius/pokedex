      descriptions:
        jp_kana:
          scarlet: "￹頭￺あたま￻の　￹吸盤￺きゅうばん￻で　￹木￺き￻の　￹枝￺えだ￻や\n￹家￺いえ￻の　￹軒下￺のきした￻に　ぶら￹下￺さ￻がる。\n７￹種類￺しゅるい￻　￹音色￺ねいろ￻を　￹使￺つか￻い￹分￺わ￻ける。"
          violet: "￹鳴￺な￻き￹声￺ごえ￻は　￹体￺からだ￻の　￹空洞￺くうどう￻で\n￹響￺ひび￻き￹合￺あ￻って　きれいな　￹音色￺ねいろ￻になり\n￹敵￺てき￻を￹驚￺おどろ￻かせ　￹追￺お￻いはらう。"
        jp_kanji:
          scarlet: "￹頭￺あたま￻の　￹吸盤￺きゅうばん￻で　￹木￺き￻の　￹枝￺えだ￻や\n￹家￺いえ￻の　￹軒下￺のきした￻に　ぶら￹下￺さ￻がる。\n７￹種類￺しゅるい￻　￹音色￺ねいろ￻を　￹使￺つか￻い￹分￺わ￻ける。"
          violet: "￹鳴￺な￻き￹声￺ごえ￻は　￹体￺からだ￻の　￹空洞￺くうどう￻で\n￹響￺ひび￻き￹合￺あ￻って　きれいな　￹音色￺ねいろ￻になり\n￹敵￺てき￻を￹驚￺おどろ￻かせ　￹追￺お￻いはらう。"
        en:
          scarlet: "It uses the sucker on its head to hang from a tree\nor from eaves. It can produce seven different\ntones."
          violet: "Its cries echo inside its hollow body to emerge\nas beautiful notes for startling and repelling foes."
        fr:
          scarlet: "La ventouse de sa tête lui permet de se\nsuspendre à une branche d’arbre ou à un auvent.\nIl peut décliner son cri en sept tons différents."
          violet: "Ses cris résonnent dans la partie creuse de son\ncorps et se transforment en notes mélodieuses\nqui stupéfient ses adversaires et les font fuir."
        it:
          scarlet: "Emette sette tipi di versi penzolando da rami\no cornicioni, a cui si attacca con la ventosa che\nha sul capo."
          violet: "I suoi versi riecheggiano dentro il corpo vuoto,\ncreando una piacevole melodia che usa\nper confondere e allontanare i nemici."
        de:
          scarlet: "Mit dem Saugnapf an seinem Kopf hängt es sich\nan Äste oder unter Vordächer. Es kann sieben\nverschiedene Klänge erzeugen."
          violet: "Sein Ruf hallt im Hohlraum seines Körpers\nwider und wird zu einem wunderschönen\nKlang, der Gegner erschreckt und verjagt."
        es:
          scarlet: "Se cuelga de ramas y aleros con la ventosa de\nla cabeza. Tiene siete tipos de gritos diferentes."
          violet: "Los gritos que resuenan en su cuerpo hueco\nemergen como hermosas notas que sorprenden\ny ahuyentan a los enemigos."
        ko:
          scarlet: "머리의 빨판으로 나뭇가지나\n집의 처마 밑에 매달린다.\n7종류의 음색을 나누어 쓴다."
          violet: "울음소리는 몸의 공동에서 메아리치며\n아름다운 음색이 되어\n상대를 놀라게 해 쫓아 버린다."
        zh_simp:
          scarlet: "用头部的吸盘悬挂在\n树枝或是房子的屋檐下。\n会灵活运用７种音色。"
          violet: "叫声会在身体的空洞中\n回响并化为美丽的音色，\n它会以此将敌人吓跑。"
        zh_trad:
          scarlet: "用頭部的吸盤懸掛在\n樹枝或是房子的屋簷下。\n能夠運用７種不同的音色。"
          violet: "叫聲會在身體的空洞裡\n迴盪出美麗的音色，\n趕走被嚇到的敵人。"
