      descriptions:
        jp_kana:
          scarlet: "￹土￺つち￻で　できた　￹背中￺せなか￻の　￹甲羅￺こうら￻を\n￹触￺さわ￻って　ほどよく　￹湿￺しめ￻っていたなら\nその　ナエトルは　とても　￹元気￺げんき￻だ。"
          violet: "￹太陽￺たいよう￻の　￹光￺ひかり￻を　￹浴￺あ￻びて\n￹全身￺ぜんしん￻で　￹光合成￺こうごうせい￻を　する。\n￹甲羅￺こうら￻は　￹土￺つち￻が　￹硬￺かた￻くなったもの。"
        jp_kanji:
          scarlet: "￹土￺つち￻で　できた　￹背中￺せなか￻の　￹甲羅￺こうら￻を\n￹触￺さわ￻って　ほどよく　￹湿￺しめ￻っていたなら\nその　ナエトルは　とても　￹元気￺げんき￻だ。"
          violet: "￹太陽￺たいよう￻の　￹光￺ひかり￻を　￹浴￺あ￻びて\n￹全身￺ぜんしん￻で　￹光合成￺こうごうせい￻を　する。\n￹甲羅￺こうら￻は　￹土￺つち￻が　￹硬￺かた￻くなったもの。"
        en:
          scarlet: "The shell on its back is made of soil. If the shell\nis moist to the touch, Turtwig is very healthy."
          violet: "It uses its whole body to photosynthesize when\nexposed to sunlight. Its shell is made from\nhardened soil."
        fr:
          scarlet: "Lorsque Tortipouss est en bonne santé,\nsa carapace, qui est composée de terre,\nest humide au toucher."
          violet: "Il s’expose à la lumière du soleil pour que\nson corps l’assimile par photosynthèse.\nSa carapace est composée de terre durcie."
        it:
          scarlet: "Il guscio sulla sua schiena è fatto di terra.\nSe un Turtwig è in forma, il suo guscio è umido."
          violet: "Si espone ai raggi solari ed esegue la fotosintesi\ncon tutto il corpo. La sua corazza è fatta di terra\nrassodata."
        de:
          scarlet: "Der Panzer auf seinem Rücken besteht aus Lehm.\nBei gesunden Chelast sollte er sich leicht feucht\nanfühlen."
          violet: "Es badet im Sonnenlicht und betreibt dabei mit\ndem ganzen Körper Fotosynthese. Sein Panzer\nbesteht aus hartem Lehm."
        es:
          scarlet: "Si su caparazón, hecho de tierra, está húmedo al\ntacto, es señal de que Turtwig se encuentra en\nplena forma."
          violet: "Al bañarlo los rayos de sol, realiza la fotosíntesis\ncon todo el cuerpo. Su caparazón está formado\npor tierra endurecida."
        ko:
          scarlet: "흙으로 만들어진 등껍질을\n만져 보아 적당히 젖어 있다면\n그 모부기는 매우 건강한 것이다."
          violet: "태양의 빛을 쬐어\n전신으로 광합성을 한다.\n등껍질은 흙이 딱딱해진 것이다."
        zh_simp:
          scarlet: "触摸背上由泥土构成的甲壳时，\n如果感觉到湿润度适中，\n就证明那只草苗龟非常健康。"
          violet: "沐浴着阳光，\n用全身进行光合作用。\n甲壳是泥土变硬后形成的。"
        zh_trad:
          scarlet: "觸摸牠背上由泥土形成的甲殼，\n若甲殼濕潤得恰到好處，\n就代表那隻草苗龜活力十足。"
          violet: "沐浴著陽光，\n用全身進行光合作用。\n甲殼是泥土變硬後形成的。"
