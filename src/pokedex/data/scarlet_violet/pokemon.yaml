      abilities:
        - snow_cloak
      hidden_ability: snow_warning
      descriptions:
        jp_kana:
          scarlet: "￹群￺む￻れで　￹助￺たす￻け￹合￺あ￻って　￹生￺い￻きている。\nマイナス　５０￹度￺ど￻の　￹息￺いき￻で　￹獲物￺えもの￻を\nしっかり　￹凍￺こお￻らせてから　￹食￺た￻べる。"
          violet: "￹暑￺あつ￻いときには　６￹本￺ぽん￻の　￹尻尾￺しっぽ￻で\n￹氷￺こおり￻の￹礫￺つぶて￻を　￹作￺つく￻り　あたりに\nばらまいて　￹体￺からだ￻を　￹冷￺ひ￻やす。"
        jp_kanji:
          scarlet: "￹群￺む￻れで　￹助￺たす￻け￹合￺あ￻って　￹生￺い￻きている。\nマイナス　５０￹度￺ど￻の　￹息￺いき￻で　￹獲物￺えもの￻を\nしっかり　￹凍￺こお￻らせてから　￹食￺た￻べる。"
          violet: "￹暑￺あつ￻いときには　６￹本￺ぽん￻の　￹尻尾￺しっぽ￻で\n￹氷￺こおり￻の￹礫￺つぶて￻を　￹作￺つく￻り　あたりに\nばらまいて　￹体￺からだ￻を　￹冷￺ひ￻やす。"
        en:
          scarlet: "They live together in a skulk, helping one another.\nBefore eating their prey, they freeze it solid with\ntheir −58 degree Fahrenheit breath."
          violet: "In hot weather, this Pokémon makes ice shards\nwith its six tails and sprays them around to cool\nitself off."
        fr:
          scarlet: "Ces Pokémon s’entraident en formant\ndes meutes. Ils congèlent leurs proies avec\nleur souffle à -50 °C avant de les dévorer."
          violet: "Quand il fait chaud, il crée des fragments\nde glace avec ses six queues et les disperse\nautour de lui pour se rafraîchir."
        it:
          scarlet: "I Vulpix vivono in branco aiutandosi a vicenda.\nDivorano le prede dopo averle congelate\ncon il loro soffio a -50 ºC."
          violet: "Quando fa caldo, abbassa la temperatura\ncorporea sparpagliando tutto attorno a sé\npezzi di ghiaccio che crea dalle sue sei code."
        de:
          scarlet: "Vulpix helfen sich in ihrem Rudel gegenseitig.\nMit seinem eisigen Atem von −50 ℃ friert es\nseine Beute ein, bevor es sie verspeist."
          violet: "Bei heißem Wetter erzeugt es mit seinen sechs\nSchweifen Kiesel aus Eis. Diese verteilt es in der\nNähe, um seinen Körper abzukühlen."
        es:
          scarlet: "Los miembros de la manada se ayudan entre sí.\nCongela a sus presas con su aliento gélido a\n-50 ºC antes de devorarlas."
          violet: "Cuando hace calor, crea rocas de hielo con sus\nseis colas y las disemina por los alrededores para\nenfriar su cuerpo."
        ko:
          scarlet: "무리가 서로 도우면서 살아간다.\n영하 50도의 숨결로 먹이를\n꽁꽁 얼려서 먹는다."
          violet: "더울 때는 6개의 꼬리로\n얼음 뭉치를 만든 뒤\n주변에 뿌려서 몸을 식힌다."
        zh_simp:
          scarlet: "会成群结队地互助生活。\n能以零下５０度的吐息\n将猎物冻结实后再进食。"
          violet: "在炎热的时候，用６根尾巴\n制作冰砾在周围挥洒，\n让身体冷却下来。"
        zh_trad:
          scarlet: "成群結隊地互助生活。\n會吐出零下５０度的氣息，\n將獵物牢牢凍住後再進食。"
          violet: "天氣熱的時候會用６根尾巴\n製造冰礫再撒向周圍，\n藉此讓身體冷卻下來。"
