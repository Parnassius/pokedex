        jp_kanji:
          scarlet: "￹昼間￺ひるま￻は　￹寝￺ね￻てばかりいる。\n￹夜￺よる￻になると　￹目￺め￻が　￹輝￺かがや￻き\n￹縄張￺なわば￻りを　￹歩￺ある￻きまわる。"
          violet: "￹眩￺まぶ￻しく　￹光￺ひか￻るものが　￹大好￺だいす￻き。\n￹光￺ひか￻るものを　￹見￺み￻つけたとき　なぜか\n￹額￺ひたい￻の￹小判￺こばん￻も　￹輝￺かがや￻く。"
        en:
          scarlet: "All it does is sleep during the daytime. At night,\nit patrols its territory with its eyes aglow."
          violet: "It loves things that sparkle. When it sees a shiny\nobject, the gold coin on its head shines, too."
        fr:
          scarlet: "Il passe ses journées à dormir. La nuit venue,\nil patrouille sur son territoire, les yeux brillants."
          violet: "Il est fasciné par les objets brillants. Lorsqu’il\nen voit un, la pièce sur son front se met à luire."
        it:
          scarlet: "Di giorno non fa che dormire, mentre la notte\nperlustra il suo territorio con gli occhi luccicanti."
          violet: "Ama gli oggetti scintillanti. Se nota qualcosa che\nbrilla, anche la moneta sulla sua fronte risplende."
        de:
          scarlet: "Es schläft den ganzen Tag. Nachts patrouilliert es\nsein Revier mit glühenden Augen."
          violet: "Glänzende Dinge faszinieren es. Findet es etwas\nSchimmerndes, leuchtet auch die Münze an\nseinem Kopf aus unbekanntem Grund auf."
        es:
          scarlet: "Durante el día, se dedica a dormir. De noche,\nvigila su territorio con un brillo en los ojos."
          violet: "Le fascina todo lo que brilla. Si ve algo que\ndestelle, la moneda de oro que tiene en la\nfrente brillará."
        ko:
          scarlet: "낮에는 거의 잠만 잔다.\n밤이 되면 눈을 반짝이며\n영역을 돌아다닌다."
          violet: "눈부시게 빛나는 것을 매우 좋아한다.\n빛나는 것을 발견하면 어째선지\n이마에 있는 금화도 빛이 난다."
        zh_simp:
          scarlet: "白天一直在睡觉。\n一到夜晚眼睛就会放光，\n在自己的地盘徘徊。"
          violet: "最喜欢耀眼发光的物品。\n当它找到发光物时，不知为何\n额头上的金币也会跟着发光。"
        zh_trad:
          scarlet: "白天一直都在睡覺。\n到了晚上眼睛就會發光，\n在自己的地盤徘徊。"
          violet: "非常喜歡耀眼的發光物。\n找到發光物時，不知為何\n額頭的金幣也會跟著發光。"
