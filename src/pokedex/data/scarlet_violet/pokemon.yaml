      descriptions:
        jp_kana:
          scarlet: "￹毒袋￺どくぶくろ￻を　ふくらませて　￹鳴￺な￻らし\nあたりに　￹不気味￺ぶきみ￻な　￹音￺おと￻を　￹響￺ひび￻かせ\n￹相手￺あいて￻が　ひるむと　どくづきをする。"
          violet: "￹正々堂々￺せいせいどうどう￻と　￹戦￺たたか￻うことは　￹少￺すく￻ないが\nそれも　￹生￺い￻き￹延￺の￻びるため。\nマスコットとして　￹人気￺にんき￻が　￹高￺たか￻い。"
        jp_kanji:
          scarlet: "￹毒袋￺どくぶくろ￻を　ふくらませて　￹鳴￺な￻らし\nあたりに　￹不気味￺ぶきみ￻な　￹音￺おと￻を　￹響￺ひび￻かせ\n￹相手￺あいて￻が　ひるむと　どくづきをする。"
          violet: "￹正々堂々￺せいせいどうどう￻と　￹戦￺たたか￻うことは　￹少￺すく￻ないが\nそれも　￹生￺い￻き￹延￺の￻びるため。\nマスコットとして　￹人気￺にんき￻が　￹高￺たか￻い。"
        en:
          scarlet: "Inflating its poison sacs, it fills the area with an\nodd sound and hits flinching opponents with a\npoison jab."
          violet: "It rarely fights fairly, but that is strictly to ensure\nsurvival. It is popular as a mascot."
        fr:
          scarlet: "Il fait gonfler ses glandes venimeuses tout en\némettant un son effrayant, ce qui lui permet\nd’empoisonner ses proies pétrifiées."
          violet: "Son instinct de survie le pousse à se battre de\nfaçon déloyale. C’est une mascotte populaire."
        it:
          scarlet: "Gonfia le sue sacche di veleno emettendo un\nverso sinistro che fa impietrire l’avversario,\npoi lo avvelena."
          violet: "Combatte spesso slealmente, ma lo fa per\nsopravvivere. È molto apprezzato come\nmascotte."
        de:
          scarlet: "Bläst es seine Giftbeutel auf, ertönt ein\nunheimliches Geräusch. Wenn Gegner\ndadurch zurückschrecken, vergiftet es sie."
          violet: "Aufgrund seines starken Überlebensdrangs\nkämpft es selten fair. Es ist als Maskottchen\näußerst beliebt."
        es:
          scarlet: "Infla sus bolsas venenosas para emitir un sonido\nmacabro a su alrededor y envenena al rival en\ncuanto se amedrenta."
          violet: "Rara vez combate limpio, pero es para asegurar\nsu supervivencia. Es muy popular como mascota."
        ko:
          scarlet: "독주머니를 부풀리며 울어서\n주변에 으스스한 소리를 퍼트린 후\n상대가 풀죽으면 독찌르기를 한다."
          violet: "정정당당하게 싸우는 일은\n드물지만 그것도 살아남기 위함이다.\n마스코트로서 인기가 높다."
        zh_simp:
          scarlet: "鼓起毒囊鸣叫，\n让周围响起诡异的声音，\n如果对手畏缩了，便施以毒击。"
          violet: "很少会堂堂正正地战斗，\n但那都是为了生存。\n作为吉祥物非常受欢迎。"
        zh_trad:
          scarlet: "會鼓起毒囊鳴叫。\n讓四周響起詭異的聲音，\n等對手畏縮，便施以毒擊。"
          violet: "很少會堂堂正正地戰鬥，\n但那都是為了要生存下去。\n作為吉祥物非常受歡迎。"
