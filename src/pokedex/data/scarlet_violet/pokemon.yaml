          violet: "Guarda un leve parecido con un Pokémon\nmitad dinosaurio y mitad seta que apareció en\nun artículo de cierta revista de dudosa veracidad."
        ko:
          scarlet: "어떤 책에 “사나운버섯”이라는\n이름으로 기록된 생물이\n이 포켓몬일 가능성이 있다."
          violet: "괴상한 잡지에서 공룡과 버섯이\n합쳐진 생물이라며 소개했던\n포켓몬과 조금 닮은 것 같다."
