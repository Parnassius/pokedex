        - dark
      egg_groups:
        - amorphous
      abilities:
        - poison_touch
        - gluttony
      hidden_ability: power_of_alchemy
      descriptions:
        jp_kana:
          scarlet: "￹体内￺たいない￻に　￹毒素￺どくそ￻を　￹溜￺た￻めこむので\n￹別地方￺べつちほう￻の　ベトベターと　￹違￺ちが￻って\n￹近￺ちか￻づいても　￹臭￺くさ￻くないぞ。"
          violet: "どんな　ゴミでも　おいしく　￹食￺た￻べて\nくれるので　ゴミ￹処分場￺しょぶんじょう￻では\n￹大活躍￺だいかつやく￻の　￹人気者￺にんきもの￻。"
        jp_kanji:
          scarlet: "￹体内￺たいない￻に　￹毒素￺どくそ￻を　￹溜￺た￻めこむので\n￹別地方￺べつちほう￻の　ベトベターと　￹違￺ちが￻って\n￹近￺ちか￻づいても　￹臭￺くさ￻くないぞ。"
          violet: "どんな　ゴミでも　おいしく　￹食￺た￻べて\nくれるので　ゴミ￹処分場￺しょぶんじょう￻では\n￹大活躍￺だいかつやく￻の　￹人気者￺にんきもの￻。"
        en:
          scarlet: "They store their toxins inside their bodies, so\nunlike Grimer from other regions, they don’t\nsmell bad even up close."
          violet: "Alolan Grimer will gladly gobble up any kind\nof trash, making it a widely used and popular\nPokémon at garbage disposal facilities."
        fr:
          scarlet: "Contrairement aux Tadmorv des autres régions,\nil retient ses toxines dans son corps. On peut\ndonc s’approcher de lui sans se boucher le nez."
          violet: "On apprécie son travail dans les décharges, car\nil se délecte de n’importe quel type d’ordures."
        it:
          scarlet: "Trattiene le tossine all’interno del corpo. Perciò,\na differenza dei Grimer delle altre regioni, non\nse ne sente il puzzo neanche da vicino."
          violet: "Mangia di gusto ogni sorta di immondizia e per\nquesto il suo contributo è apprezzatissimo negli\nimpianti di smaltimento rifiuti."
        de:
          scarlet: "Da es seine Toxine im Inneren seines Körpers\nspeichert, stinkt es im Gegensatz zu den Sleima\nanderer Regionen selbst aus der Nähe nicht."
          violet: "Da es sämtliche Arten von Müll mit Freuden\nverschlingt, gilt es als großer Star einer jeden\nAbfallentsorgungsanlage."
        es:
          scarlet: "Almacena las toxinas en el interior de su cuerpo,\npor lo que, a diferencia de los Grimer de otras\nregiones, no apesta por más que uno se acerque."
          violet: "Se comen con ganas cualquier tipo de basura,\npor lo que son muy útiles y bien recibidos en\nlos vertederos."
        ko:
          scarlet: "체내에 독소를 저장하고 있어서\n다른 지방의 질퍽이와는 달리\n가까이 가도 고약한 냄새가 나지 않는다."
          violet: "어떤 쓰레기든 맛있게 먹기 때문에\n쓰레기 처리장에서는\n맹활약하는 인기 스타다."
        zh_simp:
          scarlet: "因为会将毒素储存在体内，\n所以和别的地区的臭泥不同，\n即使接近它也不会觉得臭。"
          violet: "任何垃圾都能吃得很美味，\n因此在处理垃圾的地方\n它能大显身手，十分受欢迎。"
        zh_trad:
          scarlet: "由於會把毒素儲存在體內，\n因此和其他地區的臭泥不同，\n即使靠近牠也不會覺得臭。"
          violet: "任何垃圾都會美味地吃下肚，\n因此在垃圾處理場不僅能\n大顯身手，還非常受歡迎。"
