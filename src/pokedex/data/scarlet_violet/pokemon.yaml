      descriptions:
        jp_kana:
          scarlet: "￹本気￺ほんき￻になると　￹畳￺たた￻んでいた　￹脚￺あし￻で\n￹立￺た￻ち￹上￺あ￻がり　￹決戦￺けっせん￻モードになる。\n￹短時間￺たんじかん￻で　￹敵￺てき￻を　￹制圧￺せいあつ￻する。"
          violet: "￹畳￺たた￻まれた　￹第￺だい￻３の￹脚￺あし￻を　￹使￺つか￻う\n￹決戦￺けっせん￻モードは　￹体￺からだ￻の　￹負担￺ふたん￻が\n￹大￺おお￻きいため　￹長￺なが￻くは　￹続￺つづ￻かない。"
        jp_kanji:
          scarlet: "￹本気￺ほんき￻になると　￹畳￺たた￻んでいた　￹脚￺あし￻で\n￹立￺た￻ち￹上￺あ￻がり　￹決戦￺けっせん￻モードになる。\n￹短時間￺たんじかん￻で　￹敵￺てき￻を　￹制圧￺せいあつ￻する。"
          violet: "￹畳￺たた￻まれた　￹第￺だい￻３の￹脚￺あし￻を　￹使￺つか￻う\n￹決戦￺けっせん￻モードは　￹体￺からだ￻の　￹負担￺ふたん￻が\n￹大￺おお￻きいため　￹長￺なが￻くは　￹続￺つづ￻かない。"
        en:
          scarlet: "When it decides to fight all out, it stands on its\npreviously folded legs to enter Showdown Mode.\nIt neutralizes its enemies in short order."
          violet: "It uses its normally folded third set of legs when\nin Showdown Mode. This places a huge burden\non its body, so it can’t stay in this mode for long."
        fr:
          scarlet: "Quand les choses deviennent sérieuses, il passe\nen mode assaut et se tient sur son autre paire de\npattes. Il neutralise ses ennemis en un clin d’œil."
          violet: "En mode assaut, il se tient sur sa troisième paire\nde pattes habituellement repliée, mais il s’épuise\nrelativement rapidement."
        it:
          scarlet: "Quando la lotta si fa seria, si erge sulle zampe\nche di solito tiene ripiegate e assume lo stile\nassalto per sopraffare il nemico in un lampo."
          violet: "Non può mantenere a lungo lo stile assalto, nel\nquale sfrutta il paio di zampe che di solito tiene\nripiegate, perché gli costa moltissima fatica."
        de:
          scarlet: "Macht es ernst, so stellt es sich auf sein zuvor\neingeklapptes Beinpaar und schaltet in den\nShowdown-Modus. So bezwingt es Gegner im Nu."
          violet: "Es kann den Showdown-Modus, bei dem es sein\neingeklapptes drittes Beinpaar nutzt, nicht lange\naufrechterhalten, da er seinen Körper strapaziert."
        es:
          scarlet: "Cuando decide luchar sin cuartel, se alza con\nsu tercer par de patas y entra en modo asalto.\nAcaba con el rival en un abrir y cerrar de ojos."
          violet: "Es incapaz de mantener durante mucho tiempo\nsu modo asalto, con el tercer par de patas\nextendido, por el agotamiento que le produce."
        ko:
          scarlet: "진심을 다하게 되면 접었던 다리로\n일어나 결전 모드로 변하여\n단시간에 적을 제압한다."
          violet: "접혀 있던 제3의 다리를 사용하는\n결전 모드는 몸에 오는 부담이 크기 때문에\n길게는 사용할 수 없다."
        zh_simp:
          scarlet: "认真起来时会靠折起的脚\n站起来进入决战模式。\n会在短时间内压制敌人。"
          violet: "进入决战模式时会使用折叠\n起来的第３双脚，这会给它身体\n造成很大的负担，因此无法久战。"
        zh_trad:
          scarlet: "認真起來時會用折起的腳\n站起來，進入決戰模式。\n會在短時間內鎮壓住敵人。"
          violet: "進入決戰模式時會使用折疊起的\n第３對腳，但由於會造成身體\n很大的負擔，因此無法久戰。"
