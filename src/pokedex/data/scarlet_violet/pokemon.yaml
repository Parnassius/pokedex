          scarlet: "￹火山￺かざん￻の　￹火口￺かこう￻で　￹生活￺せいかつ￻する。\n１０￹年￺ねん￻ごとに　￹背中￺せなか￻の　コブが\n￹大噴火￺だいふんか￻することで　￹有名￺ゆうめい￻だ。"
          violet: "￹怒￺おこ￻ると　￹灼熱￺しゃくねつ￻の　マグマを\n￹背中￺せなか￻の　コブから　￹噴￺ふ￻き￹上￺あ￻げる。\n￹火山￺かざん￻の　￹火口￺かこう￻に　￹棲￺す￻み￹処￺か￻が　ある。"
        jp_kanji:
          scarlet: "￹火山￺かざん￻の　￹火口￺かこう￻で　￹生活￺せいかつ￻する。\n１０￹年￺ねん￻ごとに　￹背中￺せなか￻の　コブが\n￹大噴火￺だいふんか￻することで　￹有名￺ゆうめい￻だ。"
          violet: "￹怒￺おこ￻ると　￹灼熱￺しゃくねつ￻の　マグマを\n￹背中￺せなか￻の　コブから　￹噴￺ふ￻き￹上￺あ￻げる。\n￹火山￺かざん￻の　￹火口￺かこう￻に　￹棲￺す￻み￹処￺か￻が　ある。"
        en:
          scarlet: "It lives in the crater of a volcano. It is well\nknown that the humps on its back erupt\nevery 10 years."
          violet: "If angered, the humps on its back erupt in a\nshower of molten lava. It lives in the craters\nof volcanoes."
        fr:
          scarlet: "Camérupt vit dans les cratères des volcans.\nIl est connu pour ses bosses qui entrent\nen éruption tous les dix ans."
          violet: "Camérupt vit dans les cratères des volcans.\nS’il s’énerve, de la lave en fusion jaillit des\nbosses sur son dos."
        it:
          scarlet: "Vive nei crateri dei vulcani. È noto\nper la gigantesca eruzione delle sue\ngobbe, che avviene ogni dieci anni."
          violet: "Costruisce la tana nei crateri dei vulcani.\nQuando è adirato, erutta una pioggia di lava\nincandescente dalle gobbe che ha sul dorso."
        de:
          scarlet: "Es lebt in Vulkankratern und ist bekannt\ndafür, dass die Höcker auf seinem Rücken\nalle zehn Jahre heftig ausbrechen."
          violet: "Wenn es wütend wird, speit es aus den\nHöckern auf seinem Rücken glühend heiße\nLava. Es lebt in den Kratern von Vulkanen."
        es:
          scarlet: "Vive en cráteres de volcanes. Es famoso\npor las jorobas de su lomo, que entran en\nerupción cada diez años."
          violet: "Cuando se enfada, las jorobas del lomo\nentran en erupción y expulsan lava.\nHabita los cráteres de los volcanes."
        ko:
          scarlet: "화산의 분화구에서 생활한다.\n10년마다 등의 혹이\n대분화하는 것으로 유명하다."
          violet: "화나면 작열하는 마그마를\n등의 혹에서 분출한다.\n화산의 분화구에 거처가 있다."
        zh_simp:
          scarlet: "平时生活在火山口。\n它背上的驼峰每１０年都会\n大爆发一次，便因而闻名。"
          violet: "发怒后会从背上的驼峰里\n喷出灼热的熔岩。\n在火山口有它的住所。"
        zh_trad:
          scarlet: "平時生活在火山口。\n以背上的駝峰每１０年\n會大爆發一次而聞名。"
          violet: "發怒時會從背上的駝峰裡\n噴出灼熱的熔岩。\n在火山口有牠的住所。"
