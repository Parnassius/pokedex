          violet: "￹深￺ふか￻い　￹海￺うみ￻の　￹底￺そこ￻で　￹光￺ひか￻る　ネオラントは\nまるで　￹夜空￺よぞら￻に　￹輝￺かがや￻く\n￹星￺ほし￻のように　￹見￺み￻える。"
        jp_kanji:
          scarlet: "￹光￺ひかり￻で　￹獲物￺えもの￻を　おびき￹寄￺よ￻せるが\n￹天敵￺てんてき￻である　￹獰猛￺どうもう￻な\n￹魚￺さかな￻ポケモンまで　￹寄￺よ￻ってくるのだ。"
          violet: "￹深￺ふか￻い　￹海￺うみ￻の　￹底￺そこ￻で　￹光￺ひか￻る　ネオラントは\nまるで　￹夜空￺よぞら￻に　￹輝￺かがや￻く\n￹星￺ほし￻のように　￹見￺み￻える。"
        en:
          scarlet: "With its shining light, it lures its prey close.\nHowever, the light also happens to attract\nferocious fish Pokémon—its natural predators."
          violet: "Lumineon swimming in the darkness of the deep\nsea look like stars shining in the night sky."
        fr:
          scarlet: "La lumière qu’il émet pour attirer ses proies\nattire également ses prédateurs, des Pokémon\npoissons féroces."
          violet: "Les Luminéon scintillent au fond des mers\ncomme des étoiles dans le ciel nocturne."
        it:
          scarlet: "Con la sua luce attira le prede, ma anche\ni feroci Pokémon acquatici che sono suoi\npredatori naturali."
          violet: "I Lumineon che brillano negli abissi marini\nsembrano proprio stelle che risplendono\nnel cielo notturno."
        de:
          scarlet: "Mit seinem Licht lockt es Beute an. Leider\nwerden dadurch auch grausame Fisch-Pokémon\nangezogen – seine natürlichen Fressfeinde."
          violet: "In der Tiefsee funkelt ein Schwarm Lumineon fast\nso wie der Sternenhimmel."
        es:
          scarlet: "Atrae a sus presas con el destello que emite,\naunque eso también llama la atención de sus\nferoces depredadores marinos."
          violet: "Al nadar iluminados por el fondo del mar,\nlos Lumineon recuerdan al cielo en una noche\nestrellada."
        ko:
          scarlet: "빛으로 먹이를 유인하지만\n천적인 사나운 물고기포켓몬까지\n다가온다."
          violet: "깊은 바다의 밑바닥에서 빛나는\n네오라이트는 마치 밤하늘에\n반짝이는 별처럼 보인다."
        zh_simp:
          scarlet: "利用光来诱惑猎物靠近，\n但是作为天敌的凶猛\n鱼宝可梦也靠了过来。"
          violet: "在深海海底发光的霓虹鱼\n看起来就像是夜空中\n闪闪发光的星星。"
        zh_trad:
          scarlet: "利用光來引誘獵物靠近，\n但往往連天敵的兇猛\n魚寶可夢也引了過來。"
          violet: "在深海的海底發光的霓虹魚\n看起來就像是夜空中\n閃閃發亮的星星。"
