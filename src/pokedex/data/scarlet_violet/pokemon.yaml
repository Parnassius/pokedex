          scarlet: "￹昔￺むかし￻は　￹背中￺せなか￻に　￹貝￺かい￻がらを\n￹背負￺せお￻っていた。　シェルダーなどに\n￹近￺ちか￻い　￹種類￺しゅるい￻の　ポケモン。"
          violet: "￹紫￺むらさき￻の　￹汁￺しる￻を　にじませて\n￹外敵￺がいてき￻を　￹威嚇￺いかく￻。　￹昔￺むかし￻よりも\nこの￹姿￺すがた￻が　￹増￺ふ￻えているらしい。"
        jp_kanji:
          scarlet: "￹昔￺むかし￻は　￹背中￺せなか￻に　￹貝￺かい￻がらを\n￹背負￺せお￻っていた。　シェルダーなどに\n￹近￺ちか￻い　￹種類￺しゅるい￻の　ポケモン。"
          violet: "￹紫￺むらさき￻の　￹汁￺しる￻を　にじませて\n￹外敵￺がいてき￻を　￹威嚇￺いかく￻。　￹昔￺むかし￻よりも\nこの￹姿￺すがた￻が　￹増￺ふ￻えているらしい。"
        en:
          scarlet: "It used to have a shell on its back long ago.\nThis species is closely related to Pokémon\nlike Shellder."
          violet: "It oozes a purple fluid to deter enemies.\nApparently, there are more West Sea Shellos\nnow than there were in the past."
        fr:
          scarlet: "Il avait autrefois une coquille sur le dos.\nC’est un proche parent de Kokiyas et d’autres\nespèces de Pokémon similaires."
          violet: "Ce Pokémon sécrète un liquide mauve\nqui repousse ses ennemis. Il semblerait que\ncette forme soit plus répandue qu’autrefois."
        it:
          scarlet: "In passato aveva una conchiglia sul dorso.\nLa sua specie è strettamente imparentata con\nquella di Shellder e altri Pokémon simili."
          violet: "Secerne un liquido viola per intimidire il nemico.\nIl numero di esemplari con questa forma è\naumentato rispetto al passato."
        de:
          scarlet: "Vor langer Zeit hatte es eine Muschelschale\nauf dem Rücken. Diese Art ist eng verwandt\nmit Pokémon wie Muschas."
          violet: "Es sondert eine lilafarbene Flüssigkeit ab,\num Feinde abzuschrecken. Heute scheint diese\nForm weiter verbreitet zu sein als früher."
        es:
          scarlet: "Antiguamente cargaba con un caparazón al lomo.\nEs un Pokémon estrechamente emparentado con\nlos Shellder y otras especies similares."
          violet: "Secreta un fluido morado para intimidar a los\nintrusos. Al parecer, su número es mayor ahora\nque en el pasado."
        ko:
          scarlet: "옛날에는 등에\n조개껍질을 지고 있었다.\n셀러 등과 가까운 종류의 포켓몬."
          violet: "보라색 점액을 만들어 내서\n외부의 적을 위협한다.\n옛날보다 이 모습이 더 늘어났다고 한다."
        zh_simp:
          scarlet: "以前它的背上曾有贝壳。\n与大舌贝等宝可梦\n属于相近的物种。"
          violet: "会渗透出紫色的汁液\n来威吓敌人。跟过去相比，\n这个样子的群体似乎更多了。"
        zh_trad:
          scarlet: "過去背上曾經有貝殼。\n與大舌貝等寶可夢\n是相近的物種。"
          violet: "會滲透出紫色的汁液\n來威嚇外敵。跟過去相比，\n這個樣子的數量似乎增加了。"
