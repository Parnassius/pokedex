        jp_kanji:
          scarlet: "￹吸￺す￻いこんだ　￹空気￺くうき￻を　￹体内￺たいない￻の\n￹炎袋￺ほのおぶくろ￻に　￹送￺おく￻りこみ\n１７００￹度￺ど￻の　￹炎￺ほのお￻にして　￹吹￺ふ￻く。"
          violet: "￹首￺くび￻のまわりの　ふかふかした\n￹体毛￺たいもう￻を　￹広￺ひろ￻げ　９００￹度￺ど￻まで\n￹上￺あ￻がった　￹体温￺たいおん￻を　￹冷￺さ￻ましている。"
        en:
          scarlet: "Inhaled air is carried to its flame sac, heated, and\nexhaled as fire that reaches over 3,000 degrees\nFahrenheit."
          violet: "It fluffs out its fur collar to cool down its body\ntemperature, which can reach 1,650 degrees\nFahrenheit."
        fr:
          scarlet: "Sa glande enflammée chauffe l’air qu’il inspire.\nIl l’exhale ensuite sous forme de flamme\natteignant les 1 700 °C."
          violet: "Il ébouriffe sa collerette pour baisser\nsa température corporelle, qui peut\navoisiner les 900 °C."
        it:
          scarlet: "L’aria che inspira si infiamma passando per la\nsacca ardente che ha nel corpo, per poi essere\nespirata alla temperatura di 1.700 ºC."
          violet: "Arruffa il folto pelo intorno al collo per\nraffreddare il corpo, che può raggiungere\ni 900 ºC."
        de:
          scarlet: "Es speichert Atemluft in einem Flammensack.\nDort erhitzt es sie auf 1700 ℃, um sie als\nFlammen auszuspucken."
          violet: "Es plustert das Fell um seinen Hals auf, um seine\nKörpertemperatur zu senken, die bis auf 900 ℃\nsteigen kann."
        es:
          scarlet: "Calienta el aire que inhala en su saca de fuego y\nlo expulsa a 1700 ºC."
          violet: "Ahueca el pelaje de su cuello para bajar\nla temperatura de su cuerpo, que puede llegar\na 900 ºC."
        ko:
          scarlet: "들이마신 공기를 체내의\n불꽃 주머니에 보내\n1700도의 불꽃으로 내뿜는다."
          violet: "목 주위의 푹신푹신한\n털을 펼쳐 900도까지\n올라간 체온을 식힌다."
        zh_simp:
          scarlet: "会将吸入的空气传送到\n自己体内的火囊里，\n制造成１７００度的火焰再吐出。"
          violet: "展开颈部蓬松的体毛，\n使上升到９００度的\n体温冷却下来。"
        zh_trad:
          scarlet: "會將吸入的空氣送進\n體內的火囊轉化成\n１７００度的火焰後再吐出來。"
          violet: "會展開頸部膨鬆的體毛，\n使上升到了９００度的\n體溫能夠冷卻下來。"
