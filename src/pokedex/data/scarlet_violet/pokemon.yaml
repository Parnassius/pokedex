        jp_kana:
          scarlet: "コインに　￹染￺し￻みついた　￹情念￺じょうねん￻から\n￹生￺う￻まれた。　もとの　￹宝箱￺たからばこ￻に\n￹戻￺もど￻るため　さまよっているらしい。"
          violet: "￹古￺ふる￻い　コインを　￹背負￺せお￻い　さまよう。\nコインを　￹拾￺ひろ￻おうとした　￹人￺ひと￻の\n￹生気￺せいき￻を　￹吸￺す￻い￹取￺と￻って　￹生￺い￻きている。"
        jp_kanji:
          scarlet: "コインに　￹染￺し￻みついた　￹情念￺じょうねん￻から\n￹生￺う￻まれた。　もとの　￹宝箱￺たからばこ￻に\n￹戻￺もど￻るため　さまよっているらしい。"
          violet: "￹古￺ふる￻い　コインを　￹背負￺せお￻い　さまよう。\nコインを　￹拾￺ひろ￻おうとした　￹人￺ひと￻の\n￹生気￺せいき￻を　￹吸￺す￻い￹取￺と￻って　￹生￺い￻きている。"
        en:
          scarlet: "This Pokémon was born from passion that seeped\ninto a coin. It wanders, apparently seeking to\nreturn to the treasure chest it once inhabited."
          violet: "It wanders around, carrying an old coin on its\nback. It survives by draining the life-force from\nhumans who try to pick up its coin."
        fr:
          scarlet: "Ce Pokémon est né d’une pièce de monnaie\nimprégnée de passion. Il semble errer\nà la recherche de son coffre d’origine."
          violet: "Ce Pokémon erre en portant une vieille pièce\nsur son dos. Il aspire la vitalité des personnes\nqui tentent de la ramasser."
        it:
          scarlet: "È nato da una moneta pervasa di sentimenti\nintensi. Vaga cercando di tornare nel forziere\nda cui proviene."
          violet: "Vaga portando sulla schiena una moneta antica e\nper vivere assorbe l’energia vitale delle persone\nche cercano di raccoglierla."
        de:
          scarlet: "Geboren aus starken Gefühlen, die in eine Münze\ndrangen, wandert es offenbar auf der Suche nach\nder Schatztruhe umher, die es einst bewohnte."
          violet: "Es wandert mit einer alten Münze auf dem Rücken\numher und überlebt dank der Lebenskraft, die es\njenen aussaugt, die diese Münze nehmen wollen."
        es:
          scarlet: "Nació de una moneda imbuida de sentimientos.\nAl parecer, vaga de un lado para otro con el fin\nde regresar al cofre que una vez lo contuvo."
          violet: "Vaga con una moneda cargada a la espalda.\nPara sobrevivir, absorbe la fuerza vital de\naquellos que se agachan a recogerla."
        ko:
          scarlet: "코인에 깃든 정념으로 인해 태어났다.\n원래 있던 보물 상자로 돌아가기 위해\n떠돌고 있다고 한다."
          violet: "오래된 코인을 짊어진 채 떠돈다.\n코인을 주우려 하는 사람의\n생기를 흡수하며 살아간다."
        zh_simp:
          scarlet: "从渗入硬币里的热情中诞生。\n似乎会为了回到原本的\n宝箱里而在四处徘徊。"
          violet: "背着古老的硬币四处徘徊。\n会吸取试图捡起硬币的\n人的生命力来维生。"
        zh_trad:
          scarlet: "從滲入硬幣裡的熱情中誕生。\n為了回到原來的寶箱，\n似乎會在四處徘徊。"
          violet: "背著古老的硬幣到處徘徊。\n會吸取試圖撿起硬幣的人\n的生命力來維生。"
