      descriptions:
        jp_kana:
          scarlet: "￹指先￺ゆびさき￻を　￹擦￺す￻りあわせて　￹塩￺しお￻を\nケガした　ポケモンに　￹振￺ふ￻りかけると\nひどい　￹傷￺きず￻も　たちまち　￹治￺なお￻る。"
          violet: "ミネラル￹豊富￺ほうふ￻な　￹塩￺しお￻を　￹舐￺な￻めたくて\nキョジオーンの　まわりに　たくさんの\nポケモンが　￹集￺あつ￻まってくる。"
        jp_kanji:
          scarlet: "￹指先￺ゆびさき￻を　￹擦￺す￻りあわせて　￹塩￺しお￻を\nケガした　ポケモンに　￹振￺ふ￻りかけると\nひどい　￹傷￺きず￻も　たちまち　￹治￺なお￻る。"
          violet: "ミネラル￹豊富￺ほうふ￻な　￹塩￺しお￻を　￹舐￺な￻めたくて\nキョジオーンの　まわりに　たくさんの\nポケモンが　￹集￺あつ￻まってくる。"
        en:
          scarlet: "Garganacl will rub its fingertips together and\nsprinkle injured Pokémon with salt. Even severe\nwounds will promptly heal afterward."
          violet: "Many Pokémon gather around Garganacl,\nhoping to lick at its mineral-rich salt."
        fr:
          scarlet: "Le sel dont il saupoudre les Pokémon blessés\nen frottant le bout de ses doigts guérit aussitôt\ntoutes les blessures, même les plus graves."
          violet: "Nombreux sont les Pokémon qui se rassemblent\nautour des Gigansel dans l’espoir de pouvoir\nlécher leur sel riche en minéraux."
        it:
          scarlet: "Sfrega le dita per cospargere di sale i Pokémon\nferiti e guarire all’istante anche le lesioni più\ngravi."
          violet: "Sono molti i Pokémon che si raccolgono\nattorno a Garganacl per leccare il suo sale\nricchissimo di minerali."
        de:
          scarlet: "Es reibt seine Fingerspitzen aneinander,\num Salz auf verwundete Pokémon zu streuen.\nDieses heilt selbst schwere Verletzungen im Nu."
          violet: "Viele Pokémon scharen sich um Saltigant,\nin der Hoffnung, an seinem mineralreichen\nSalz lecken zu können."
        es:
          scarlet: "Cuando encuentra a un Pokémon herido, frota\nlas puntas de los dedos para rociarlo con sal y\ncurar rápidamente incluso las heridas más graves."
          violet: "Muchos Pokémon se arremolinan alrededor de\nGarganacl para lamer su sal rica en minerales."
        ko:
          scarlet: "손끝을 문질러서 나온 소금을\n다친 포켓몬에게 뿌리면\n심한 상처도 금방 낫는다."
          violet: "미네랄이 풍부한 소금을 핥기 위해\n콜로솔트의 주위에는\n수많은 포켓몬들이 모여든다."
        zh_simp:
          scarlet: "只要它摩擦指尖，搓出盐来\n撒在受伤的宝可梦身上，\n无论再重的伤都能瞬间愈合。"
          violet: "盐石巨灵的周围总会有\n大量的宝可梦聚集而来，\n为了一舔它那富含矿物质的盐。"
        zh_trad:
          scarlet: "只要合起指尖，搓出鹽來\n灑在受傷的寶可夢身上，\n就算再重的傷都會瞬間痊癒。"
          violet: "為了舔牠富含礦物質的鹽，\n鹽石巨靈的周圍總是會有\n大量的寶可夢聚集而來。"
