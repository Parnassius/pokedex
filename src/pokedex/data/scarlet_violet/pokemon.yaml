          scarlet: "モンメンの　￹吐￺は￻く　￹綿￺わた￻を　￹使￺つか￻った\n￹枕￺まくら￻や　￹布団￺ふとん￻は　￹軽￺かる￻くて\n￹通気￺つうき￻の　￹良￺よ￻い　￹高級品￺こうきゅうひん￻だ。"
          violet: "￹襲￺おそ￻われると　￹体￺からだ￻から　￹綿￺わた￻を　￹飛￺と￻ばす。\n￹敵￺てき￻が　￹綿￺わた￻を　モンメンと\n￹間違￺まちが￻えている　￹隙￺すき￻に　￹逃￺に￻げるのだ。"
        jp_kanji:
          scarlet: "モンメンの　￹吐￺は￻く　￹綿￺わた￻を　￹使￺つか￻った\n￹枕￺まくら￻や　￹布団￺ふとん￻は　￹軽￺かる￻くて\n￹通気￺つうき￻の　￹良￺よ￻い　￹高級品￺こうきゅうひん￻だ。"
          violet: "￹襲￺おそ￻われると　￹体￺からだ￻から　￹綿￺わた￻を　￹飛￺と￻ばす。\n￹敵￺てき￻が　￹綿￺わた￻を　モンメンと\n￹間違￺まちが￻えている　￹隙￺すき￻に　￹逃￺に￻げるのだ。"
        en:
          scarlet: "Pillows and beds stuffed with cotton exhaled by\nCottonee are soft and puffy, light and airy—\naltogether top quality."
          violet: "When attacked, it escapes by shooting cotton\nfrom its body. The cotton serves as a decoy to\ndistract the attacker."
        fr:
          scarlet: "Le coton qu’il produit est utilisé dans\nla confection d’oreillers et de couettes de\nhaute qualité, qui allient légèreté et fraîcheur."
          violet: "Si on l’attaque, il projette un nuage de coton\nqui lui ressemble pour tromper son adversaire.\nIl profite alors de la confusion pour s’enfuir."
        it:
          scarlet: "Cuscini, materassi e piumoni realizzati con\nil cotone prodotto da Cottonee sono leggeri,\ntraspiranti e di ottima qualità."
          violet: "Se viene attaccato, crea una nuvola di cotone\nsimile a se stesso per confondere il nemico,\npoi ne approfitta per fuggire."
        de:
          scarlet: "Kissen und Bettdecken, die mit Watte von\nWaumboll gefüllt sind, gelten als Artikel von\nhoher Qualität, da sie leicht und luftig sind."
          violet: "Wird es angegriffen, verstreut es zur Täuschung\nWatte. Es flieht, während der Gegner nach dem\nwahren Waumboll sucht."
        es:
          scarlet: "Los edredones y almohadas rellenos del algodón\nque suelta Cottonee son un producto de alta\ncalidad por su ligereza y transpirabilidad."
          violet: "Despide bolas de algodón cuando lo atacan\npara que el enemigo las confunda con él y así\npoder poner pies en polvorosa."
        ko:
          scarlet: "소미안이 뿜는 솜을 사용한\n베개와 이불은 가볍고\n통기성이 좋은 고급품이다."
          violet: "공격당하면 몸에서 솜을 날린다.\n상대가 솜을 소미안으로\n착각하고 있는 동안 도망친다."
        zh_simp:
          scarlet: "使用木棉球吐出的棉花\n制作而成的枕头和被褥\n是又轻又透气的高级商品。"
          violet: "一旦被袭击就会从体内喷出棉花。\n趁着敌人把棉花错认为木棉球时\n逃之夭夭。"
        zh_trad:
          scarlet: "使用木棉球吐出的棉花\n製作而成的枕頭和被褥\n是又輕又透氣的高級商品。"
          violet: "受到襲擊時會從身體噴出棉花，\n趁著敵人把棉花誤以為是\n木棉球時逃之夭夭。"
