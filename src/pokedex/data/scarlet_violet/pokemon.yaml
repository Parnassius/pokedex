          violet: "￹大口￺おおぐち￻を　￹開￺あ￻けて　￹攻撃￺こうげき￻。\n￹噛￺か￻みついたとき　￹抜￺ぬ￻けた　キバは\n￹次￺つぎ￻から￹次￺つぎ￻に　￹生￺は￻えてくる。"
        jp_kanji:
          scarlet: "￹一度￺いちど￻　￹咥￺くわ￻えた　￹獲物￺えもの￻は\nぜったい　￹離￺はな￻さないように\nキバの　￹先￺さき￻が　￹反￺そ￻り￹返￺かえ￻っている。"
          violet: "￹大口￺おおぐち￻を　￹開￺あ￻けて　￹攻撃￺こうげき￻。\n￹噛￺か￻みついたとき　￹抜￺ぬ￻けた　キバは\n￹次￺つぎ￻から￹次￺つぎ￻に　￹生￺は￻えてくる。"
        en:
          scarlet: "The tips of its fangs are slanted backward.\nOnce those fangs clamp down, the prey has\nno hope of escape."
          violet: "It opens its huge jaws wide to attack. If it loses\nfangs while biting, they’ll just keep on growing\nback, one after another."
        fr:
          scarlet: "La pointe de ses crocs est recourbée. Lorsqu’il\nmord une proie, celle-ci n’a donc aucune chance\nde s’échapper."
          violet: "Il attaque en ouvrant grand la mâchoire.\nS’il perd des crocs quand il mord, ces derniers\nrepoussent à chaque fois."
        it:
          scarlet: "La punta delle sue zanne è curvata verso\nl’interno in modo da non lasciare scampo\nalle prede che addenta."
          violet: "Quando attacca, spalanca la sua grande bocca.\nSe azzannando perde dei denti, questi ricrescono\nuno dopo l’altro."
        de:
          scarlet: "Seine Zähne sind nach hinten gerichtet, damit es\nnicht mehr abzuschütteln ist, wenn es sich einmal\nin seiner Beute festgebissen hat."
          violet: "Zum Angriff reißt es seinen großen Kiefer auf.\nVerliert es beim Zubeißen Zähne, wachsen sie\neiner nach dem anderen wieder nach."
        es:
          scarlet: "Sus colmillos están curvados hacia dentro, por\nlo que, una vez que muerde a una presa, esta\nno tiene forma de escapar."
          violet: "Abre sus grandes fauces para atacar. Si pierde\nalgún colmillo al morder, este le vuelve a crecer\ntodas las veces que haga falta."
        ko:
          scarlet: "한번 문 먹잇감을\n무슨 일이 있어도 놓치지 않도록\n이빨 끝이 뒤로 휘어져 있다."
          violet: "큰 입을 벌려서 공격한다.\n물었을 때 빠진 이빨은\n금방 다시 돋아난다."
        zh_simp:
          scarlet: "向后弯曲的牙齿尖端\n让它一旦叼住猎物，\n就绝不会松口。"
          violet: "会张开大嘴进行攻击。\n在咬住时弄掉的牙齿会\n一个接一个地重新长出。"
        zh_trad:
          scarlet: "牙齒尖端向後彎曲，\n讓牠一旦叼住獵物，\n就絕不讓獵物掉落。"
          violet: "會張開大嘴發動攻擊。\n在咬住獵物時脫落的牙齒\n會不斷重新長出來。"
