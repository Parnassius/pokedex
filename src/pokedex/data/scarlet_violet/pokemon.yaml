      descriptions:
        jp_kana:
          scarlet: "￹蹴￺け￻り￹技￺わざ￻が　ヒットする　￹瞬間￺しゅんかん￻に\n￹足裏￺あしうら￻の　￹筋肉￺きんにく￻を　￹硬￺かた￻くさせて\n￹威力￺いりょく￻を　￹最大￺さいだい￻まで　￹高￺たか￻める。"
          violet: "￹脚￺あし￻の　じん￹帯￺たい￻を　￹自由自在￺じゆうじざい￻に\n￹伸￺の￻び￹縮￺ちぢ￻みさせて　￹蹴￺け￻り￹技￺わざ￻の\n￹間合￺まあ￻いを　２￹倍￺ばい￻に　￹広￺ひろ￻げるのだ。"
        jp_kanji:
          scarlet: "￹蹴￺け￻り￹技￺わざ￻が　ヒットする　￹瞬間￺しゅんかん￻に\n￹足裏￺あしうら￻の　￹筋肉￺きんにく￻を　￹硬￺かた￻くさせて\n￹威力￺いりょく￻を　￹最大￺さいだい￻まで　￹高￺たか￻める。"
          violet: "￹脚￺あし￻の　じん￹帯￺たい￻を　￹自由自在￺じゆうじざい￻に\n￹伸￺の￻び￹縮￺ちぢ￻みさせて　￹蹴￺け￻り￹技￺わざ￻の\n￹間合￺まあ￻いを　２￹倍￺ばい￻に　￹広￺ひろ￻げるのだ。"
        en:
          scarlet: "At the exact moment it lands a kick on its target,\nHitmonlee hardens the muscles on the sole of its\nfoot, maximizing the power of the kick."
          violet: "It has complete control over the ligaments in its\nlegs, expanding and contracting them to double\nthe reach of its kicks."
        fr:
          scarlet: "Au moment de frapper sa cible, il durcit\nles muscles de la plante de son pied pour\ninfliger un maximum de dégâts."
          violet: "Il peut étirer et rétracter les ligaments\nde ses jambes à volonté, ce qui lui permet\nde doubler la portée de ses coups de pied."
        it:
          scarlet: "Indurisce i muscoli della pianta del piede quando\nil suo calcio colpisce per aumentarne al massimo\nla potenza."
          violet: "Può allungare o accorciare i legamenti delle\ngambe a piacere, raddoppiando così la portata\ndei suoi calci."
        de:
          scarlet: "In dem Moment, in dem es mit einem Tritt einen\nTreffer landet, verhärtet es die Muskeln seiner\nFußsohle und erreicht so das Maximum an Kraft."
          violet: "Es kann die Bänder in seinen Beinen nach\nBelieben dehnen und zusammenziehen, wodurch\nsich die Reichweite seiner Tritte verdoppelt."
        es:
          scarlet: "Endurece los músculos de las plantas de los pies\nen el momento en el que impactan contra su rival\npara potenciar al máximo sus patadas."
          violet: "Es capaz de estirar y contraer los ligamentos\nde las piernas a su antojo. Cuando propina una\npatada, llega a doblar su alcance."
        ko:
          scarlet: "발차기가 적중하는 순간에\n발바닥의 근육을 단단하게 하여\n위력을 최대로 끌어올린다."
          violet: "다리 인대를 자유자재로\n늘였다 줄였다 하여\n발차기 기술의 거리를 두 배로 늘릴 수 있다."
        zh_simp:
          scarlet: "在踢技命中对手的瞬间，\n会让脚底的肌肉变硬，\n将威力提升到最高。"
          violet: "能自由地伸缩腿的韧带，\n让踢技的攻击范围扩大至２倍。"
        zh_trad:
          scarlet: "在踢技命中的瞬間，\n會讓腳底的肌肉變硬，\n使威力提升至極限。"
          violet: "能夠自由自在地伸縮\n雙腿的韌帶，讓踢技的\n攻擊範圍擴展至２倍。"
