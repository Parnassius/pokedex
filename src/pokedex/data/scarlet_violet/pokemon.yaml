        en:
          scarlet: "It will expand its body as much as it can\nand then contract itself, blasting out sand\nwith enough force to wash away a dump truck."
          violet: "The sand it spews contains sharp, pointy gravel,\nwhich is actually just sand that Sandaconda’s\nsaliva has hardened into irregular shapes."
        fr:
          scarlet: "Il gonfle puis contracte son corps de toutes\nses forces afin d’expulser du sable si violemment\nqu’il serait capable de déplacer un camion."
          violet: "Le gravier tranchant mélangé au sable qu’il crache\nest composé de morceaux de sable aux formes\nirrégulières solidifiés par sa salive."
        it:
          scarlet: "Contrae il suo corpo fino all’estremo per\npoi espellere sabbia con una potenza tale\nda trascinare via anche un mezzo pesante."
          violet: "La ghiaia appuntita che si trova nella\nsabbia che espelle è in realtà sabbia mista\na saliva solidificatasi in forme irregolari."
        de:
          scarlet: "Wenn es seinen Körper maximal ausdehnt und\nwieder zusammenzieht, kann es Sand mit einer\nWucht abfeuern, die einen Kipplaster hinwegfegt."
          violet: "Der von ihm ausgespiene Sand enthält spitzen\nKies, bei dem es sich eigentlich um Sand handelt,\nder durch seinen Speichel erhärtet wurde."
        es:
          scarlet: "Estira y contrae su cuerpo al máximo\npara expulsar arena con tal potencia\nque puede mover incluso un camión."
          violet: "La grava puntiaguda que mezcla con la arena\nque escupe se forma a partir de arena que\nha compactado irregularmente con su saliva."
        ko:
          scarlet: "몸을 있는 힘껏 신축시켜서\n덤프트럭도 밀어 버릴 정도의 기세로\n모래를 분사한다."
          violet: "뿜어내는 모래에 섞여 있는\n날카롭고 뾰족한 자갈은 침에 의해\n모래가 이상하게 굳어진 것이다."
        zh_simp:
          scarlet: "会把身体伸展到极限，\n用足以冲走翻斗车的\n气势喷射出沙子。"
          violet: "喷出的沙子里混着尖锐的沙砾，\n那是它用唾液凝固了沙子而成的，\n形状千奇百怪。"
        zh_trad:
          scarlet: "會把身體伸長到極限後，\n用足以沖走大卡車的\n氣勢噴射出沙子。"
          violet: "牠噴出的沙子裡會混著\n用唾液凝固沙子後形成的\n尖銳沙礫，形狀千奇百怪。"
cramorant:
