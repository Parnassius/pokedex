        jp_kana:
          scarlet: "￹大￺おお￻きな　のど￹袋￺ぶくろ￻に　エネルギーを\n￹蓄￺たくわ￻えることができる。\n￹一気￺いっき￻に　￹放出￺ほうしゅつ￻して　￹敵￺てき￻を　￹吹￺ふ￻き￹飛￺と￻ばす。"
          violet: "￹子￺こ￻どもと　￹遊￺あそ￻ぶことが　￹大好￺だいす￻き。\n￹普段￺ふだん￻は　￹温厚￺おんこう￻だが　￹家族￺かぞく￻を\n￹守￺まも￻るとき　￹形相￺ぎょうそう￻が　￹変￺か￻わる。"
        jp_kanji:
          scarlet: "￹大￺おお￻きな　のど￹袋￺ぶくろ￻に　エネルギーを\n￹蓄￺たくわ￻えることができる。\n￹一気￺いっき￻に　￹放出￺ほうしゅつ￻して　￹敵￺てき￻を　￹吹￺ふ￻き￹飛￺と￻ばす。"
          violet: "￹子￺こ￻どもと　￹遊￺あそ￻ぶことが　￹大好￺だいす￻き。\n￹普段￺ふだん￻は　￹温厚￺おんこう￻だが　￹家族￺かぞく￻を\n￹守￺まも￻るとき　￹形相￺ぎょうそう￻が　￹変￺か￻わる。"
        en:
          scarlet: "This Pokémon can store energy in its large\ndewlap. Mabosstiff unleashes this energy all\nat once to blow away enemies."
          violet: "Mabosstiff loves playing with children. Though\nusually gentle, it takes on an intimidating look\nwhen protecting its family."
        fr:
          scarlet: "Ce Pokémon emmagasine de l’énergie dans ses\ngrandes bajoues. Il la libère ensuite d’un coup\npour balayer ses adversaires au loin."
          violet: "Ce Pokémon adore jouer avec les enfants.\nIl est doux en général, mais lorsqu’il doit\nprotéger sa famille, il prend un air menaçant."
        it:
          scarlet: "È in grado di immagazzinare nella grossa sacca\ngiugulare energia che poi rilascia di colpo,\nspazzando via i nemici."
          violet: "Adora giocare con i bambini. Di solito è docile,\nma quando deve proteggere la sua famiglia\nassume un’espressione minacciosa."
        de:
          scarlet: "Dieses Pokémon kann in seiner großen Wamme\nEnergie speichern. Setzt es diese auf einen Schlag\nfrei, werden dadurch Feinde hinfortgeblasen."
          violet: "Dieses Pokémon liebt es, mit Kindern zu spielen.\nFür gewöhnlich ist es friedfertig, doch wenn es\nseine Familie beschützt, ändert sich das."
        es:
          scarlet: "Almacena energía en la papada y la libera\ntoda de golpe para arrasar con sus rivales."
          violet: "Le encanta jugar con los niños. Normalmente\nes afable, pero, cuando ha de proteger a su\nfamilia, adopta un aspecto amenazante."
        ko:
          scarlet: "커다란 목 주머니에\n에너지를 비축할 수 있다.\n단숨에 이를 방출하여 적을 날려 버린다."
          violet: "아이들과 노는 것을 좋아한다.\n평소에는 온화하지만\n가족을 지킬 때는 인상이 바뀐다."
        zh_simp:
          scarlet: "大大的喉囊里可以\n储存能量。会一口气\n释放能量将敌人轰飞。"
          violet: "非常喜欢和小孩玩耍。\n平时性情温和，但在保护\n家人时表情会发生改变。"
        zh_trad:
          scarlet: "大大的喉囊裡可以\n儲存能量。會一口氣\n釋放出去把敵人轟飛。"
          violet: "非常喜歡和小孩玩耍。\n平時性情溫和，但在保護\n家族時表情會為之一變。"
