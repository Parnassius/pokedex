      descriptions:
        jp_kana:
          scarlet: "￹人￺ひと￻と　￹関￺かか￻わることなく　￹命￺いのち￻を　￹落￺お￻とした\n￹野良￺のら￻の　￹犬￺いぬ￻ポケモンが\n￹生￺う￻まれ￹変￺か￻わったと　￹言￺い￻われている。"
          violet: "￹人懐￺ひとなつ￻っこくて　￹寂￺さび￻しがり。\nちょっと　かまっただけでも\nいつまでも　￹後￺あと￻を　ついてくるぞ。"
        jp_kanji:
          scarlet: "￹人￺ひと￻と　￹関￺かか￻わることなく　￹命￺いのち￻を　￹落￺お￻とした\n￹野良￺のら￻の　￹犬￺いぬ￻ポケモンが\n￹生￺う￻まれ￹変￺か￻わったと　￹言￺い￻われている。"
          violet: "￹人懐￺ひとなつ￻っこくて　￹寂￺さび￻しがり。\nちょっと　かまっただけでも\nいつまでも　￹後￺あと￻を　ついてくるぞ。"
        en:
          scarlet: "It is said that a dog Pokémon that died in the\nwild without ever interacting with a human was\nreborn as this Pokémon."
          violet: "This friendly Pokémon doesn’t like being alone.\nPay it even the slightest bit of attention, and it\nwill follow you forever."
        fr:
          scarlet: "On pense qu’il est la réincarnation d’un Pokémon\nchien errant qui a perdu la vie sans jamais avoir\neu d’interaction avec les êtres humains."
          violet: "Il est sociable et n’aime pas la solitude.\nUne fois qu’une personne lui accorde la moindre\nattention, il ne la quitte plus d’une semelle."
        it:
          scarlet: "Si dice sia rinato da un Pokémon canide selvatico\nche ha perso la vita senza aver mai avuto contatti\ncon gli esseri umani."
          violet: "Soffre la solitudine e si affeziona facilmente.\nSe qualcuno gli rivolge anche la più piccola\nattenzione, inizia a seguirlo ovunque vada."
        de:
          scarlet: "Es soll die Wiedergeburt eines streunenden\nHunde-Pokémon sein, das starb, ohne je in\nBerührung mit Menschen gekommen zu sein."
          violet: "Dieses anhängliche Pokémon ist nicht gern allein.\nAuch wenn man sich nur kurz um es kümmert,\nläuft es einem auf ewig nach."
        es:
          scarlet: "Se cree que es la reencarnación de un Pokémon\nperro vagabundo que murió sin haber tenido\ncontacto con humanos."
          violet: "Un Pokémon muy afable que no soporta la\nsoledad. Seguirá para siempre a quien le dé\nuna mínima muestra de atención."
        ko:
          scarlet: "사람과의 접점 없이\n숨을 거둔 들개포켓몬이\n환생한 것으로 여겨지고 있다."
          violet: "사람을 잘 따르며 외로움을 잘 탄다.\n조금만 관심을 줘도\n끝없이 뒤를 따라다닌다."
        zh_simp:
          scarlet: "据说它是由还未接触人类\n就去世的流浪犬宝可梦\n转生而来的。"
          violet: "爱亲近人，害怕寂寞。\n即使只和它玩了一小会儿，\n它也会一直跟在身后。"
        zh_trad:
          scarlet: "據說牠是不曾接觸過人類\n就死去的流浪犬寶可夢\n轉生而來的。"
          violet: "愛親近人，害怕寂寞。\n就算只跟牠玩了一下下，\n牠也會一直跟在後面。"
