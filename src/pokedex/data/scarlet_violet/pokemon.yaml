      descriptions:
        jp_kana:
          scarlet: "たいようのいしの　￹影響￺えいきょう￻で\n￹昼￺ひる￻に　￹活動￺かつどう￻するように　なった。\n￹陽￺ひ￻だまりのなかで　￹踊￺おど￻るのが　￹好￺す￻き。"
          violet: "￹生￺う￻まれ￹育￺そだ￻った　￹森￺もり￻を　￹離￺はな￻れ\nキレイハナだけで　￹群￺む￻れを　￹作￺つく￻る。\n￹気持￺きも￻ちが　￹昂￺たかぶ￻ると　￹踊￺おど￻りだす。"
        jp_kanji:
          scarlet: "たいようのいしの　￹影響￺えいきょう￻で\n￹昼￺ひる￻に　￹活動￺かつどう￻するように　なった。\n￹陽￺ひ￻だまりのなかで　￹踊￺おど￻るのが　￹好￺す￻き。"
          violet: "￹生￺う￻まれ￹育￺そだ￻った　￹森￺もり￻を　￹離￺はな￻れ\nキレイハナだけで　￹群￺む￻れを　￹作￺つく￻る。\n￹気持￺きも￻ちが　￹昂￺たかぶ￻ると　￹踊￺おど￻りだす。"
        en:
          scarlet: "Due to the effects of the Sun Stone, it is now\nactive during the daytime. It likes to dance in\npools of sunlight."
          violet: "After it grows up, it leaves the forest it was born\nin to form groups with other Bellossom. It breaks\ninto dance when it gets excited."
        fr:
          scarlet: "Influencé par la Pierre Soleil, il est devenu\ndiurne. Il aime particulièrement danser\nà la lumière du jour."
          violet: "Il a quitté la forêt qui l’a vu naître et grandir\npour former un groupe avec d’autres Joliflor.\nQuand il est excité, il se met à danser."
        it:
          scarlet: "È diventato diurno per effetto della Pietrasolare.\nAma danzare sotto i raggi del sole."
          violet: "Una volta cresciuto, lascia il bosco natio\nper formare un gruppo con i propri simili.\nQuando si emoziona, inizia a danzare."
        de:
          scarlet: "Durch den Einfluss des Sonnensteins ist es nun\ntagaktiv. Es tanzt gern in der Sonne."
          violet: "Es verlässt den Wald, in dem es aufgewachsen ist,\num sich mit anderen Blubella zusammenzutun.\nIst es aufgeregt, fängt es an zu tanzen."
        es:
          scarlet: "Se ha vuelto diurno gracias a la influencia de la\nPiedra Solar. Le gusta bailar en lugares bañados\npor el sol."
          violet: "Se alejan de sus bosques natales para formar\nmanadas. Cuando se emocionan, se ponen\na bailar."
        ko:
          scarlet: "태양의돌의 영향으로\n낮에 활동하게 되었다.\n양지에서 춤추는 것을 좋아한다."
          violet: "나고 자란 숲을 떠나\n아르코만의 무리를 만든다.\n기분이 좋으면 춤추기 시작한다."
        zh_simp:
          scarlet: "在日之石的影响下\n变成了昼行性宝可梦。\n喜欢在太阳底下跳舞。"
          violet: "会离开出生并长大的森林，\n组成仅有美丽花的群体。\n当情绪激昂起来就会开始跳舞。"
        zh_trad:
          scarlet: "在日之石的影響下，\n變成了會在白天活動。\n喜歡在暖暖的陽光下跳舞。"
          violet: "會離開出生長大的森林，\n組成只有美麗花的群體。\n興致高昂時就會跳起舞來。"
