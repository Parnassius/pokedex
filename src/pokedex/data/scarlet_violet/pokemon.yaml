      descriptions:
        jp_kana:
          scarlet: "￹怪￺あや￻しげな　￹炎￺ほのお￻で　￹燃￺も￻やされた\n￹魂￺たましい￻は　￹行￺い￻き￹場￺ば￻を　なくし\nこの￹世￺よ￻を　￹永遠￺えいえん￻に　さまよう。"
          violet: "￹魂￺たましい￻を　￹吸￺す￻い￹取￺と￻って　￹燃￺も￻やす。\n￹腕￺うで￻の　￹炎￺ほのお￻を　￹揺￺ゆ￻らして\n￹相手￺あいて￻を　￹催眠状態￺さいみんじょうたい￻に　する。"
        jp_kanji:
          scarlet: "￹怪￺あや￻しげな　￹炎￺ほのお￻で　￹燃￺も￻やされた\n￹魂￺たましい￻は　￹行￺い￻き￹場￺ば￻を　なくし\nこの￹世￺よ￻を　￹永遠￺えいえん￻に　さまよう。"
          violet: "￹魂￺たましい￻を　￹吸￺す￻い￹取￺と￻って　￹燃￺も￻やす。\n￹腕￺うで￻の　￹炎￺ほのお￻を　￹揺￺ゆ￻らして\n￹相手￺あいて￻を　￹催眠状態￺さいみんじょうたい￻に　する。"
        en:
          scarlet: "The spirits burned up in its ominous flame lose\ntheir way and wander this world forever."
          violet: "It absorbs spirits, which it then burns. By waving\nthe flames on its arms, it puts its foes into a\nhypnotic trance."
        fr:
          scarlet: "Les âmes consumées par ses flammes\nétranges sont condamnées à l’errance\npour l’éternité."
          violet: "Ce Pokémon aspire les âmes puis\nles brûle. Il hypnotise ses adversaires\nen faisant osciller les flammes de ses bras."
        it:
          scarlet: "Le anime bruciate dalle sue fiamme cupe\nperdono la strada e rimangono a vagare\nin questo mondo per l’eternità."
          violet: "Consuma nel fuoco le anime che ha risucchiato.\nIpnotizza l’avversario facendo tremolare\nle fiammelle sugli arti."
        de:
          scarlet: "Seelen, die von seinen schaurigen Flammen\nverbrannt wurden, irren bis ans Ende aller Tage\nziellos durch diese Welt."
          violet: "Skelabra saugt Seelen ein und verbrennt sie.\nDurch das Schwenken der Flammen an seinen\nArmen hypnotisiert es seine Gegner."
        es:
          scarlet: "Las almas que han ardido bajo sus\ninquietantes llamas no tienen adónde ir\ny vagan sin rumbo por este mundo eternamente."
          violet: "Absorbe almas y las quema. Mece las\nllamas de los brazos para hipnotizar\na sus enemigos."
        ko:
          scarlet: "괴상한 불꽃으로 태워진\n영혼은 갈 곳을 잃고\n이승을 영원히 헤맨다."
          violet: "영혼을 빨아들여 태운다.\n불꽃을 흔들어서 상대를\n최면 상태로 만든다."
        zh_simp:
          scarlet: "被怪异的火焰\n燃烧过的灵魂无处可去，\n只能永远游荡在这个世界上。"
          violet: "会吸取并燃烧灵魂。\n通过摇晃手臂的火焰\n来让对手陷入催眠状态。"
        zh_trad:
          scarlet: "被怪異的火焰燃燒掉的\n靈魂將無處可去，\n永遠在這個世界上徘徊。"
          violet: "會吸走並燃燒掉靈魂。\n透過搖晃手臂的火焰\n讓對手陷入催眠狀態。"
