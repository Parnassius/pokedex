        - gulp_missile
      descriptions:
        jp_kana:
          scarlet: "なんでも　￹丸飲￺まるの￻みする　￹習性￺しゅうせい￻。\n￹大￺おお￻きすぎる　￹獲物￺えもの￻を　￹詰￺つ￻まらせて\n￹困￺こま￻っている　ウッウほど　￹手強￺てごわ￻い。"
          violet: "￹物覚￺ものおぼ￻えは　￹悪￺わる￻すぎだが　￹脳￺のう￻に\n￹使￺つか￻う　エネルギーを　ぎりぎりにして\nそのぶんを　￹戦￺たたか￻いに　￹回￺まわ￻すのだ。"
        jp_kanji:
          scarlet: "なんでも　￹丸飲￺まるの￻みする　￹習性￺しゅうせい￻。\n￹大￺おお￻きすぎる　￹獲物￺えもの￻を　￹詰￺つ￻まらせて\n￹困￺こま￻っている　ウッウほど　￹手強￺てごわ￻い。"
          violet: "￹物覚￺ものおぼ￻えは　￹悪￺わる￻すぎだが　￹脳￺のう￻に\n￹使￺つか￻う　エネルギーを　ぎりぎりにして\nそのぶんを　￹戦￺たたか￻いに　￹回￺まわ￻すのだ。"
        en:
          scarlet: "Cramorant instinctively swallow everything whole.\nThey’re at their most formidable when they’re\nstruggling to swallow overly large prey."
          violet: "It’s an incredibly poor learner because it uses the\nbare minimum amount of energy for its brain.\nIt focuses on battling instead."
        fr:
          scarlet: "Les Nigosier avalent tout en une bouchée.\nIls sont particulièrement redoutables lorsqu’ils\nse démènent pour gober une proie trop grosse."
          violet: "Il a une très mauvaise mémoire, car il consacre\nl’essentiel de son énergie au combat. Il n’utilise\nque le strict minimum pour alimenter son cerveau."
        it:
          scarlet: "Ha l’abitudine di inghiottire tutto in un boccone.\nPiù grande è la fatica che fa per ingoiare\nuna preda troppo grossa, più temibile diventa."
          violet: "È molto smemorato, ma limitando al minimo\nl’energia usata per il cervello può destinarne\nuna maggiore quantità alla lotta."
        de:
          scarlet: "Es hat die Angewohnheit, alles in einem Stück zu\nverschlingen. Je mehr es damit ringt, übergroße\nBeute runterzuschlucken, desto zäher wird es."
          violet: "Sein Gedächtnis ist schlecht, aber indem es so\nwenig Energie wie möglich für sein Gehirn nutzt,\nkann es sie stattdessen zum Kämpfen verwenden."
        es:
          scarlet: "Tiene por costumbre engullir todo de un bocado.\nEs más temible cuando está intentando ingerir\nuna presa demasiado grande."
          violet: "Si bien es sumamente desmemoriado, reducir al\nmínimo indispensable la energía que suministra al\ncerebro le permite destinar el resto al combate."
        ko:
          scarlet: "무엇이든 통째로 삼키는 습성이 있다.\n지나치게 큰 먹이를 삼켜서\n버거워하는 윽우지일수록 강하다."
          violet: "기억력이 아주 나쁘다.\n뇌에 사용할 에너지를 최소한으로 남기고\n나머지는 싸움에 활용하기 때문이다."
        zh_simp:
          scarlet: "拥有将什么东西都一口吞下的习性。\n越是为喉咙卡住过大猎物而烦恼的\n古月鸟就越难对付。"
          violet: "记性相当差，会把\n大部分能量分配在战斗上，\n只留最低限度的能量给大脑。"
        zh_trad:
          scarlet: "擁有大口吞下任何東西的習性。\n越是為著喉嚨卡的過大獵物而\n煩惱的古月鳥，越是難以對付。"
          violet: "記性差到不行，但其實是只\n留了最低限度的能量給大腦，\n把大部分能量都用在戰鬥上。"
    cramorant_gulping_form:
      form_id: 1
