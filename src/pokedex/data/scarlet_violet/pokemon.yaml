        jp_kana:
          scarlet: "￹頭￺あたま￻を　￹包￺つつ￻み￹込￺こ￻む　￹水泡￺すいほう￻は\n￹粘￺ねば￻り￹気￺け￻の　ある　￹糸￺いと￻で　￹作￺つく￻るため\n￹割￺わ￻れることは　めったに　ない。"
          violet: "￹頭￺あたま￻を　￹包￺つつ￻み￹込￺こ￻む　￹水泡￺すいほう￻を\n３￹本￺ぼん￻の　￹脚￺あし￻で　￹支￺ささ￻えている。\nときどき　こっそり　￹入￺い￻れ￹替￺か￻えている。"
        jp_kanji:
          scarlet: "￹頭￺あたま￻を　￹包￺つつ￻み￹込￺こ￻む　￹水泡￺すいほう￻は\n￹粘￺ねば￻り￹気￺け￻の　ある　￹糸￺いと￻で　￹作￺つく￻るため\n￹割￺わ￻れることは　めったに　ない。"
          violet: "￹頭￺あたま￻を　￹包￺つつ￻み￹込￺こ￻む　￹水泡￺すいほう￻を\n３￹本￺ぼん￻の　￹脚￺あし￻で　￹支￺ささ￻えている。\nときどき　こっそり　￹入￺い￻れ￹替￺か￻えている。"
        en:
          scarlet: "Dewpider uses sticky threads to create the water\nbubble that covers its head, so the bubble very\nrarely bursts."
          violet: "It supports the water bubble that envelops its\nhead with three of its legs. Sometimes it secretly\nswaps which legs are holding up the bubble."
        fr:
          scarlet: "La bulle qui enveloppe sa tête est tissée d’un fil\ntrès robuste et visqueux. Elle n’éclate donc que\ntrès rarement."
          violet: "Trois de ses pattes soutiennent la bulle d’eau\nqui enveloppe sa tête. Il change parfois\nde pattes lorsque personne ne le regarde."
        it:
          scarlet: "La bolla d’acqua che avvolge la sua testa è fatta\ncon fili viscosi, perciò è molto raro che si rompa."
          violet: "Di tanto in tanto cambia furtivamente\nle tre zampe con cui sostiene la bolla\nche gli avvolge la testa."
        de:
          scarlet: "Die Wasserblase, in die es seinen Kopf einhüllt,\nstellt Araqua mit einem klebrigen Faden her,\nweshalb sie so gut wie nie zerplatzt."
          violet: "Araqua stützt die Wasserblase, die seinen\nKopf einhüllt, mit dreien seiner Beine.\nManchmal wechselt es diese heimlich."
        es:
          scarlet: "La burbuja que le rodea la cabeza está hecha de\nun hilo viscoso, por lo que raramente se rompe."
          violet: "Sujeta con tres patas la burbuja que le rodea la\ncabeza. No son siempre las mismas, ya que las\ncambia en ocasiones con disimulo."
        ko:
          scarlet: "머리를 감싸고 있는 수포는\n점성이 있는 실로 만들어져서\n터지는 일이 거의 없다."
          violet: "머리를 감싸고 있는 수포를\n세 개의 다리로 지탱하고 있다.\n가끔씩 몰래 새것으로 바꾼다."
        zh_simp:
          scarlet: "由于包裹头部的水泡\n是由粘稠的丝制作而成，\n因此很少会破掉。"
          violet: "用３条腿支撑\n包裹头部的水泡。\n有时会偷偷地换腿。"
        zh_trad:
          scarlet: "包裹住頭部的水泡是\n由有黏性的絲製成的，\n因此幾乎不會破掉。"
          violet: "用３隻腳支撐著\n包裹頭部的水泡。\n有時會偷偷地換腳。"
