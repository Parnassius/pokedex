          scarlet: "￹高￺たか￻い　￹木￺き￻の￹上￺うえ￻で　￹暮￺く￻らしている。\n￹枝￺えだ￻から　￹枝￺えだ￻へ　￹飛￺と￻び￹移￺うつ￻るとき\n￹尻尾￺しっぽ￻で　￹巧￺たく￻みに　バランスをとる。"
          violet: "￹手￺て￻よりも　￹自由自在￺じゆうじざい￻に　￹動￺うご￻く\n￹尻尾￺しっぽ￻を　￹巧￺たく￻みに　￹操￺あやつ￻りながら\n￹高￺たか￻い　￹木￺き￻の￹上￺うえ￻で　￹暮￺く￻らしている。"
        jp_kanji:
          scarlet: "￹高￺たか￻い　￹木￺き￻の￹上￺うえ￻で　￹暮￺く￻らしている。\n￹枝￺えだ￻から　￹枝￺えだ￻へ　￹飛￺と￻び￹移￺うつ￻るとき\n￹尻尾￺しっぽ￻で　￹巧￺たく￻みに　バランスをとる。"
          violet: "￹手￺て￻よりも　￹自由自在￺じゆうじざい￻に　￹動￺うご￻く\n￹尻尾￺しっぽ￻を　￹巧￺たく￻みに　￹操￺あやつ￻りながら\n￹高￺たか￻い　￹木￺き￻の￹上￺うえ￻で　￹暮￺く￻らしている。"
        en:
          scarlet: "It lives atop tall trees. When leaping from branch\nto branch, it deftly uses its tail for balance."
          violet: "Its tail moves with greater dexterity than its\nhands. Making deft use of this tail, Aipom lives\nhigh among the treetops."
        fr:
          scarlet: "Il vit dans les grands arbres. Sa queue lui assure\nun bon équilibre quand il saute de branche\nen branche."
          violet: "Il est encore plus agile avec sa queue qu’avec\nses mains, ce qui lui permet de vivre dans\nles grands arbres."
        it:
          scarlet: "Vive in cima agli alberi più alti. Usando\nabilmente la coda, mantiene l’equilibrio\nquando salta di ramo in ramo."
          violet: "Vive sulla cima degli alberi più alti controllando\ncon destrezza la coda, che ha più mobilità\nrispetto a una mano."
        de:
          scarlet: "Griffel lebt auf hohen Bäumen. Es nutzt seinen\nSchweif geschickt, um das Gleichgewicht zu\nhalten, wenn es von Ast zu Ast hüpft."
          violet: "Griffel lebt hoch oben in Baumwipfeln, wo es\nseinen Schweif geschickt einsetzt. Dieser ist viel\nbeweglicher als seine Hände."
        es:
          scarlet: "Vive en las copas de árboles de gran tamaño.\nCuando salta de rama en rama, utiliza la cola\ncon destreza para equilibrarse."
          violet: "Vive en las copas de árboles de gran tamaño.\nPuede usar la cola con mayor destreza incluso\nque las manos."
        ko:
          scarlet: "높은 나무 위에서 살고 있다.\n나뭇가지에서 가지로 건너뛸 때\n꼬리로 능숙하게 밸런스를 잡는다."
          violet: "꼬리를 능숙하게 사용하여\n손보다 자유자재로 움직이며\n높은 나무 위에서 지낸다."
        zh_simp:
          scarlet: "生活在高高的树上。\n在树枝间跳跃移动时，\n会用尾巴巧妙地保持平衡。"
          violet: "会巧妙地控制比手\n活动得还随心所欲的尾巴，\n并在高高的树上生活。"
        zh_trad:
          scarlet: "生活在高高的樹上。\n在樹枝間跳躍移動時，\n會用尾巴巧妙地保持平衡。"
          violet: "會巧妙地操縱比雙手\n還靈活的尾巴，\n生活在高高的樹上。"
