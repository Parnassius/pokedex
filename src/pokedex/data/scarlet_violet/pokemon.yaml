        jp_kanji:
          scarlet: "１￹億年￺おくねん￻ほど　￹前￺まえ￻の　￹密林￺みつりん￻で\n￹暮￺く￻らしていた。　￹得意￺とくい￻の　￹頭突￺ずつ￻きで\nプテラに　￹対抗￺たいこう￻　していた。"
          violet: "ズガイドス￹同士￺どうし￻が　￹頭￺あたま￻を\nぶつけあうことで　￹頑丈￺がんじょう￻な\n￹頭￺あたま￻が　さらに　￹鍛￺きた￻えられる。"
        en:
          scarlet: "It lived in jungles around a hundred million years\nago. It used its skillful headbutts to combat\nAerodactyl."
          violet: "Cranidos toughen up their already sturdy\nheads by headbutting one another."
        fr:
          scarlet: "Il peuplait les jungles il y a 100 millions d’années\net repoussait les Ptéra en leur assénant d’habiles\ncoups de tête."
          violet: "Les Kranidos renforcent leurs têtes déjà dures\nen les entrechoquant."
        it:
          scarlet: "Viveva nella giungla circa 100 milioni di anni fa.\nFronteggiava Aerodactyl sferrando poderose\ntestate."
          violet: "I Cranidos sbattono le dure teste l’uno\ncontro quella dell’altro per rinforzarle\nulteriormente."
        de:
          scarlet: "Vor ungefähr 100 Millionen Jahren lebte es im\nDschungel. Mit seinen erprobten Kopfstößen\nsetzte es sich gegen Aerodactyl zur Wehr."
          violet: "Indem sie ihre robusten Schädel aufeinander-\nprallen lassen, machen Koknodon sie noch härter."
        es:
          scarlet: "Vivía en la jungla hace cien millones de años.\nGracias a su destreza propinando cabezazos,\npodía hacer frente a los Aerodactyl."
          violet: "Hace chocar su ya robusta cabeza contra la de\notros Cranidos para fortalecerla aún más si cabe."
        ko:
          scarlet: "1억 년 정도 전의 밀림에서\n살았었다. 특기인 박치기로\n프테라에게 저항했었다."
          violet: "두개도스끼리\n머리를 부딪치는 것으로\n튼튼한 머리가 더욱 단련된다."
        zh_simp:
          scarlet: "生活在大约１亿年前的密林中。\n用最拿手的头锤对抗化石翼龙。"
          violet: "头盖龙之间会通过\n用头对撞来让坚硬的头部\n得到进一步的锻炼。"
        zh_trad:
          scarlet: "曾經生活在大約１億年前\n的密林中。用最拿手的\n頭錘對抗化石翼龍。"
          violet: "頭蓋龍之間會以頭互撞，\n堅硬的頭會藉此得到\n更進一步的鍛鍊。"
