          violet: "￹炎￺ほのお￻で　￹作￺つく￻った　ボールを\n￹操￺あやつ￻って　￹相手￺あいて￻を　￹牽制￺けんせい￻したり\n￹目￺め￻くらましに　￹使￺つか￻ったりする。"
        en:
          scarlet: "Although Cinderace loses its cool easily, it will\nbattle flawlessly for a Trainer it trusts."
          violet: "Using a ball that it made out of flames,\nCinderace blinds its opponents and\nkeeps them at bay."
        fr:
          scarlet: "Il a tendance à s’emporter facilement, mais\nquand il accompagne une personne de confiance,\nil donne le meilleur de lui-même en combat."
          violet: "Il crée des ballons de flammes et s’en sert\npour tenir ses adversaires à distance\nou pour les aveugler."
        it:
          scarlet: "Gli basta un nonnulla per agitarsi, ma quando\nha fiducia in chi lo allena ed è in sua compagnia,\nriesce a rimanere ben concentrato sulla lotta."
          violet: "Adopera la sua palla di fuoco per tenere a bada\nl’avversario e accecarlo."
        de:
          scarlet: "Es hat ein hitziges Gemüt. Bringt es einem Trainer\naber genügend Vertrauen entgegen, legt es eine\nfehlerfreie Kampfweise an den Tag."
          violet: "Es erschafft einen Ball aus Flammen, mit dem es\nseine Gegner blendet und in Schach hält."
        es:
          scarlet: "Es de temperamento irascible, pero da lo mejor\nde sí mismo en combate cuando cuenta con un\nEntrenador en el que confía."
          violet: "Maneja los balones de fuego que crea para\nmantener a raya a sus adversarios o cegarlos."
        ko:
          scarlet: "쉽게 흥분하는 성격이지만\n신뢰하는 트레이너가 있으면\n빈틈없는 전법을 구사한다."
          violet: "불꽃으로 만든 볼을 움직여\n상대를 견제하거나\n눈속임에 사용하거나 한다."
        zh_simp:
          scarlet: "虽然拥有容易亢奋的性格，\n但只要有它信赖的训练家在，\n就能展现毫无破绽的战斗方式。"
          violet: "会通过控制由火焰\n制成的球来牵制对手，\n或将球用在障眼法上。"
        zh_trad:
          scarlet: "雖然擁有容易亢奮的性格，\n但只要有牠信任的訓練家在，\n就能展現出毫無破綻的戰鬥方式。"
          violet: "會控制火焰做成的球\n來牽制對手，或將球\n用在障眼法上。"
