      descriptions:
        jp_kana:
          scarlet: "いつも　￹木￺き￻のふりを　している。\n￹体￺からだ￻の　つくりは　￹植物￺しょくぶつ￻より\n￹石￺いし￻や　￹岩￺いわ￻などに　￹近￺ちか￻いようだ。"
          violet: "￹攻撃￺こうげき￻　されないように　ひたすら\n￹木￺き￻のマネをしているが　￹水￺みず￻は￹苦手￺にがて￻で\n￹雨￺あめ￻になると　どこかに　￹逃￺に￻げ￹出￺だ￻す。"
        jp_kanji:
          scarlet: "いつも　￹木￺き￻のふりを　している。\n￹体￺からだ￻の　つくりは　￹植物￺しょくぶつ￻より\n￹石￺いし￻や　￹岩￺いわ￻などに　￹近￺ちか￻いようだ。"
          violet: "￹攻撃￺こうげき￻　されないように　ひたすら\n￹木￺き￻のマネをしているが　￹水￺みず￻は￹苦手￺にがて￻で\n￹雨￺あめ￻になると　どこかに　￹逃￺に￻げ￹出￺だ￻す。"
        en:
          scarlet: "Although it always pretends to be a tree,\nits composition appears more similar to\nrock than to vegetation."
          violet: "To avoid being attacked, it does nothing but\nmimic a tree. It hates water and flees from rain."
        fr:
          scarlet: "Bien qu’il fasse semblant d’être un arbre,\npar sa composition, il semble plus proche\nd’un minéral que d’un végétal."
          violet: "Il prend l’apparence d’un arbre pour éviter\nles attaques, mais il déteste l’eau et fuit la pluie."
        it:
          scarlet: "Sebbene finga di essere un albero, il suo corpo\nha una composizione più simile a quella di una\nroccia che a quella di un vegetale."
          violet: "Finge di essere un albero per evitare di venire\nattaccato, ma odia l’acqua e quando piove\nfugge altrove."
        de:
          scarlet: "Obwohl es vorgibt, ein Baum zu sein, kommt\nseine Zusammensetzung einem Stein näher als\neiner Pflanze."
          violet: "Um nicht angegriffen zu werden, gibt es vor,\nein Baum zu sein. Es hasst jedoch Wasser und\nflieht vor Regen."
        es:
          scarlet: "Aunque pretende ser un árbol, en su\ncomposición se parece más a una roca\nque a una planta."
          violet: "Para evitar que lo ataquen, se limita a imitar\nun árbol. Odia el agua y huye de la lluvia."
        ko:
          scarlet: "항상 나무인 척하고 있다.\n몸의 구조는 식물보다\n돌이나 바위에 가까운 듯하다."
          violet: "공격받지 않기 위해 필사적으로\n나무 흉내를 내며, 물을 싫어하여\n비가 올 때는 어딘가로 사라진다."
        zh_simp:
          scarlet: "总是伪装成树的样子。\n身体构造比起植物来，\n好像更接近石头或岩石一类的东西。"
          violet: "为了不受到攻击而一直\n模仿成树的样子。但因为怕水，\n所以只要下雨就会逃得无影无踪。"
        zh_trad:
          scarlet: "總是偽裝成樹的樣子。\n身體構造比起植物來，\n好像更接近石頭或岩石之類的東西。"
          violet: "為了不讓自己受到攻擊，而不停\n模仿著樹的樣子，但因為很怕水，\n所以一下起雨就會逃得無影無蹤。"
