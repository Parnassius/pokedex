      descriptions:
        jp_kana:
          scarlet: "￹頭￺あたま￻どうしの　￹仲￺なか￻は　￹悪￺わる￻い。\n２つの　￹頭￺あたま￻を　￹可愛￺かわい￻がらないと\n￹嫉妬￺しっと￻で　￹大喧嘩￺おおゲンカ￻を　￹始￺はじ￻める。"
          violet: "２つの　￹頭￺あたま￻は　￹好￺この￻みが　￹違￺ちが￻う。\n￹頭同士￺あたまどうし￻　￹争￺あらそ￻うことで　だれの\n￹力￺ちから￻も　￹借￺か￻りずに　￹強￺つよ￻くなるのだ。"
        jp_kanji:
          scarlet: "￹頭￺あたま￻どうしの　￹仲￺なか￻は　￹悪￺わる￻い。\n２つの　￹頭￺あたま￻を　￹可愛￺かわい￻がらないと\n￹嫉妬￺しっと￻で　￹大喧嘩￺おおゲンカ￻を　￹始￺はじ￻める。"
          violet: "２つの　￹頭￺あたま￻は　￹好￺この￻みが　￹違￺ちが￻う。\n￹頭同士￺あたまどうし￻　￹争￺あらそ￻うことで　だれの\n￹力￺ちから￻も　￹借￺か￻りずに　￹強￺つよ￻くなるのだ。"
        en:
          scarlet: "The two heads do not get along at all. If you\ndon’t give each head the same amount of\nattention, they’ll begin fighting out of jealousy."
          violet: "The two heads have different likes and dislikes.\nBecause the heads fight with each other, Zweilous\ngets stronger without needing to rely on others."
        fr:
          scarlet: "Ses deux têtes s’entendent mal. Elles sont très\njalouses et peuvent se quereller violemment\nsi l’une reçoit plus d’affection que l’autre."
          violet: "Ses deux têtes aiment des choses différentes.\nComme elles se disputent constamment, elles se\nrenforcent sans avoir besoin de qui que ce soit."
        it:
          scarlet: "Le due teste non vanno d’accordo fra di loro.\nSe non si rivolgono le stesse attenzioni a\nentrambe, si ingelosiscono e litigano."
          violet: "Le due teste hanno preferenze diverse. Non ha\nbisogno dell’aiuto di nessuno per diventare\npiù forte, gli bastano le zuffe tra le sue teste."
        de:
          scarlet: "Seine Köpfe vertragen sich nicht. Schenkt man\nbeiden nicht das gleiche Maß an Aufmerksamkeit,\nbeginnen sie aus Eifersucht einen heftigen Streit."
          violet: "Seine beiden Köpfe haben unterschiedliche\nVorlieben. Da sie sich ständig bekämpfen,\nwerden sie auch ohne die Hilfe anderer stärker."
        es:
          scarlet: "Sus dos cabezas se llevan fatal. Si no reciben\nel mismo afecto por igual, se enzarzan en una\ngran pelea a causa de los celos."
          violet: "Las dos cabezas tienen gustos distintos. Como\nestán en lucha constante, su fortaleza aumenta\nsin necesidad de combatir contra otros Pokémon."
        ko:
          scarlet: "머리끼리는 사이가 좋지 않다.\n두 머리 모두 귀여워해 주지 않으면\n질투하여 큰 싸움이 난다."
          violet: "두 개의 머리는 취향이 서로 다르다.\n머리끼리 벌이는 싸움을 통해\n남의 힘을 빌리지 않고도 점점 강해진다."
        zh_simp:
          scarlet: "２颗头之间关系的很糟糕。\n如果没有得到公平对等的疼爱，\n就会因争风吃醋而开始大吵。"
          violet: "２个头各有喜好。\n由于头之间也互相争斗，\n因此不靠外力也能变强。"
        zh_trad:
          scarlet: "２顆頭的感情很差。\n如果兩邊疼愛的程度不同，\n就會因爭風吃醋而開始大吵。"
          violet: "２顆頭各有喜好。\n由於頭之間會互相爭鬥，\n因此不靠外力也能變強。"
