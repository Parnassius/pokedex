      descriptions:
        jp_kana:
          scarlet: "￹浮￺う￻いているように　￹見￺み￻える　￹花￺はな￻は\nマント￹裏￺うら￻の　￹毛￺け￻の　￹反射￺はんしゃ￻で\n￹茎￺くき￻を　カモフラージュしているのだ。"
          violet: "￹敵￺てき￻の　￹意識￺いしき￻を　￹巧￺たく￻みに　そらし\n￹花粉￺かふん￻が　￹詰￺つ￻まった　￹花爆弾￺はなバクダン￻を\nいつの￹間￺ま￻にか　￹取￺と￻りつけ　￹爆破￺ばくは￻する。"
        jp_kanji:
          scarlet: "￹浮￺う￻いているように　￹見￺み￻える　￹花￺はな￻は\nマント￹裏￺うら￻の　￹毛￺け￻の　￹反射￺はんしゃ￻で\n￹茎￺くき￻を　カモフラージュしているのだ。"
          violet: "￹敵￺てき￻の　￹意識￺いしき￻を　￹巧￺たく￻みに　そらし\n￹花粉￺かふん￻が　￹詰￺つ￻まった　￹花爆弾￺はなバクダン￻を\nいつの￹間￺ま￻にか　￹取￺と￻りつけ　￹爆破￺ばくは￻する。"
        en:
          scarlet: "This Pokémon uses the reflective fur lining its\ncape to camouflage the stem of its flower,\ncreating the illusion that the flower is floating."
          violet: "With skillful misdirection, it rigs foes with pollen-\npacked flower bombs. Meowscarada sets off the\nbombs before its foes realize what’s going on."
        fr:
          scarlet: "Il se sert de la réverbération de la lumière sur la\nfourrure de sa cape pour camoufler sa tige, ce qui\ndonne l’illusion que sa fleur flotte dans les airs."
          violet: "Il détourne habilement l’attention de ses ennemis\net disperse subrepticement des bombes florales\nbourrées de pollen qu’il fait ensuite exploser."
        it:
          scarlet: "I riflessi del pelo all’interno del mantello\ncamuffano lo stelo del suo fiore, che così\nsembra fluttuare nell’aria."
          violet: "Svia abilmente l’attenzione del nemico e,\nsenza farsi notare, piazza bombe floreali\ncariche di polline che poi fa esplodere."
        de:
          scarlet: "Es erweckt den Eindruck, als würde seine Blume\nschweben, indem es ihren Stiel mit der Reflexion\ndes Fells an der Innenseite seines Mantels tarnt."
          violet: "Es lenkt seine Gegner geschickt ab, um ihnen\nunbemerkt Blumenbomben voller Pollen\nunterzuschieben, die es dann explodieren lässt."
        es:
          scarlet: "Se sirve de la luz que reflejan los tricomas de\nsu manto de hojas para camuflar la vid y crear\nla ilusión óptica de que la flor flota en el aire."
          violet: "Después de desviar hábilmente la atención del\noponente, le lanza sus bombas florales rellenas\nde polen y las hace estallar sin que se dé cuenta."
        ko:
          scarlet: "꽃이 떠 있는 것처럼 보이는 것은\n망토 뒷면의 털이 빛을 반사해서\n줄기를 보이지 않게 하기 때문이다."
          violet: "교묘하게 상대의 주의를 돌린 뒤\n꽃가루가 가득 담긴 꽃폭탄을\n눈치채지 못하게 붙여 폭파시킨다."
        zh_simp:
          scarlet: "花看似浮在空中，\n其实它是通过斗篷内的\n毛的反射来隐藏住了茎。"
          violet: "会巧妙地引开敌人的注意力，\n然后引爆它在神不知鬼不觉间\n设置好的装满花粉的花炸弹。"
        zh_trad:
          scarlet: "看似浮在空中的花，\n是牠利用斗蓬內側的毛的反射\n將莖隱藏後呈現出的假象。"
          violet: "會巧妙引開敵人的注意力，\n然後引爆牠在神不知鬼不覺間\n設置好的裝滿花粉的花炸彈。"
