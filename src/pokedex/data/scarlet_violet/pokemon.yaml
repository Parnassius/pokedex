          scarlet: "￹潮￺しお￻の　￹流￺なが￻れが　￹激￺はげ￻しい　￹海￺うみ￻に\n￹生息￺せいそく￻している　パルシェンの\n￹殻￺から￻の　トゲは　￹大￺おお￻きく　￹鋭￺するど￻い。"
          violet: "￹攻撃￺こうげき￻を　￹受￺う￻けると　￹表面￺ひょうめん￻の\nトゲが　つぎつぎと　￹飛￺と￻んでくる。\n￹内部￺ないぶ￻の　￹正体￺しょうたい￻は　￹不明￺ふめい￻。"
        jp_kanji:
          scarlet: "￹潮￺しお￻の　￹流￺なが￻れが　￹激￺はげ￻しい　￹海￺うみ￻に\n￹生息￺せいそく￻している　パルシェンの\n￹殻￺から￻の　トゲは　￹大￺おお￻きく　￹鋭￺するど￻い。"
          violet: "￹攻撃￺こうげき￻を　￹受￺う￻けると　￹表面￺ひょうめん￻の\nトゲが　つぎつぎと　￹飛￺と￻んでくる。\n￹内部￺ないぶ￻の　￹正体￺しょうたい￻は　￹不明￺ふめい￻。"
        en:
          scarlet: "Cloyster that live in seas with harsh tidal currents\ngrow large, sharp spikes on their shells."
          violet: "When attacked, it launches its spikes in quick\nvolleys. Its innards have never been seen."
        fr:
          scarlet: "Les Crustabri vivant dans des mers aux courants\nforts développent des dards particulièrement\nimposants et aiguisés sur leur coquille."
          violet: "Lorsqu’il est menacé, il envoie de rapides volées\nde dards. On ignore ce qui se trouve à l’intérieur\nde sa carapace."
        it:
          scarlet: "Ai Cloyster che vivono in mari con forti correnti\ncrescono grandi aculei appuntiti sul guscio."
          violet: "Se attaccato, scaglia gli aculei di cui è dotato\nin rapida successione. Nessuno sa cosa si celi\nal suo interno."
        de:
          scarlet: "Austos, die in Meeren mit starker Strömung\nleben, entwickeln große und scharfe Stacheln\nan ihrer Schale."
          violet: "Niemand weiß, wie Austos ohne Schale aussieht.\nWird es angegriffen, schießt es ununterbrochen\nmit seinen Stacheln."
        es:
          scarlet: "A los Cloyster que viven en las fuertes\ncorrientes marinas les crecen largas y\nafiladas púas en la concha."
          violet: "Cuando lo atacan, se defiende lanzando púas\nen sucesión. Nadie sabe realmente qué se oculta\nbajo la concha."
        ko:
          scarlet: "조수의 흐름이 격한 바다에 서식하는\n파르셀의 껍데기에 붙은 가시는\n크고 날카롭다."
          violet: "공격받으면 표면에 있는\n가시를 끊임없이 날린다.\n내부의 정체는 밝혀지지 않았다."
        zh_simp:
          scarlet: "刺甲贝栖息在激流涌动的海里，\n它壳上的刺又大又尖锐。"
          violet: "一旦遭受攻击，外壳的刺\n就会接二连三地飞出来，\n内部的真面目无人知晓。"
        zh_trad:
          scarlet: "刺甲貝棲息在\n潮流湍急的海裡，\n殼上的刺又大又尖銳。"
          violet: "只要受到攻擊，表面的刺\n就會一根接一根地飛過來。\n殼裡的真面目無人知曉。"
