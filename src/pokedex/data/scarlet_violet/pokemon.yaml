          scarlet: "￹両頬￺りょうほほ￻には　￹電気￺でんき￻を　￹溜￺た￻めこむ\n￹袋￺ふくろ￻がある。　￹怒￺おこ￻ると　￹溜￺た￻めこんだ\n￹電気￺でんき￻を　￹一気￺いっき￻に　￹放￺はな￻ってくる。"
          violet: "￹何匹￺なんびき￻かが　￹集￺あつ￻まっていると\nそこに　￹猛烈￺もうれつ￻な　￹電気￺でんき￻が　￹溜￺た￻まり\n￹稲妻￺いなずま￻が　￹落￺お￻ちることがあるという。"
        jp_kanji:
          scarlet: "￹両頬￺りょうほほ￻には　￹電気￺でんき￻を　￹溜￺た￻めこむ\n￹袋￺ふくろ￻がある。　￹怒￺おこ￻ると　￹溜￺た￻めこんだ\n￹電気￺でんき￻を　￹一気￺いっき￻に　￹放￺はな￻ってくる。"
          violet: "￹何匹￺なんびき￻かが　￹集￺あつ￻まっていると\nそこに　￹猛烈￺もうれつ￻な　￹電気￺でんき￻が　￹溜￺た￻まり\n￹稲妻￺いなずま￻が　￹落￺お￻ちることがあるという。"
        en:
          scarlet: "When it is angered, it immediately discharges the\nenergy stored in the pouches in its cheeks."
          violet: "When several of these Pokémon gather, their\nelectricity can build and cause lightning storms."
        fr:
          scarlet: "Quand il s’énerve, il libère instantanément\nl’énergie emmagasinée dans les poches de\nses joues."
          violet: "Quand plusieurs de ces Pokémon se réunissent,\nils provoquent de gigantesques orages."
        it:
          scarlet: "Quando s’arrabbia, libera subito l’energia\naccumulata nelle sacche sulle guance."
          violet: "Quando vari Pokémon di questa specie si\nradunano, la loro energia si accumula e\ngenera fulmini."
        de:
          scarlet: "Ist es wütend, entlädt sich augenblicklich die\nElektrizität, die es in seinen Backentaschen\ngespeichert hat."
          violet: "Wenn sich mehrere dieser Pokémon versammeln,\nkann ihre geballte Energie Blitzgewitter erzeugen."
        es:
          scarlet: "Cuando se enfada, este Pokémon descarga\nla energía que almacena en el interior de las\nbolsas de las mejillas."
          violet: "Cuando varios de estos Pokémon se juntan,\nsu energía puede causar fuertes tormentas."
        ko:
          scarlet: "양 볼에는 전기를 저장하는 주머니가 있다.\n화가 나면 저장한 전기를 단숨에 방출한다."
          violet: "여러 마리가 모여 있으면\n그 자리에 맹렬하게 전기가 모여서\n벼락이 떨어질 때가 있다고 한다."
        zh_simp:
          scarlet: "两颊上有储存电力的囊袋。\n一旦生气就会把储存的电力\n一口气释放出来。"
          violet: "据说当好几只聚在一起时，\n那里就会凝聚强烈的电力，\n还可能会落下闪电。"
        zh_trad:
          scarlet: "雙頰上有儲存電力的囊袋。\n一旦生氣就會把儲存的電力\n一口氣釋放出來。"
          violet: "據說同一處有好幾隻的時候，\n那裡就會凝集起強烈的電力，\n還可能造成閃電落於該處。"
