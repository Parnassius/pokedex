        special_attack: 25
        special_defense: 65
        speed: 65
      evs_yield:
        hp: 0
        attack: 0
        defense: 2
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ice
        - steel
      egg_groups:
        - field
      abilities:
        - snow_cloak
      hidden_ability: slush_rush
      descriptions:
        jp_kana:
          scarlet: "￹鋼￺はがね￻の￹針￺はり￻を　￹氷￺こおり￻が　￹覆￺おお￻う。\n￹刺￺さ￻さると　￹深￺ふか￻い　￹傷￺きず￻と　￹一緒￺いっしょ￻に\n￹凍傷￺とうしょう￻にも　なってしまうぞ。"
          violet: "￹大昔￺おおむかし￻は　￹砂漠￺さばく￻に　￹棲￺す￻んでいた。\n￹鋭￺するど￻いツメを　しっかり　￹突￺つ￻き￹立￺た￻てて\n￹氷山￺ひょうざん￻も　￹滑￺すべ￻らず　￹駆￺か￻け￹登￺のぼ￻る。"
        jp_kanji:
          scarlet: "￹鋼￺はがね￻の￹針￺はり￻を　￹氷￺こおり￻が　￹覆￺おお￻う。\n￹刺￺さ￻さると　￹深￺ふか￻い　￹傷￺きず￻と　￹一緒￺いっしょ￻に\n￹凍傷￺とうしょう￻にも　なってしまうぞ。"
          violet: "￹大昔￺おおむかし￻は　￹砂漠￺さばく￻に　￹棲￺す￻んでいた。\n￹鋭￺するど￻いツメを　しっかり　￹突￺つ￻き￹立￺た￻てて\n￹氷山￺ひょうざん￻も　￹滑￺すべ￻らず　￹駆￺か￻け￹登￺のぼ￻る。"
        en:
          scarlet: "This Pokémon’s steel spikes are sheathed\nin ice. Stabs from these spikes cause deep\nwounds and severe frostbite as well."
          violet: "A long, long time ago, it lived in the desert.\nWith its sharp claws fully extended, it can run\nright up an iceberg without slipping."
        fr:
          scarlet: "Ses épines d’acier sont recouvertes de glace.\nElles infligent de profondes blessures et des\nengelures à tout être qu’elles transpercent."
          violet: "Ce Pokémon vivait jadis dans les déserts.\nGrâce à ses griffes acérées, il peut gravir\ndes glaciers sans glisser."
        it:
          scarlet: "I suoi aculei d’acciaio sono rivestiti di ghiaccio.\nChi li tocca subisce una ferita profonda\ne allo stesso tempo anche un gelone."
          violet: "Anticamente viveva nel deserto. Piantando\nsaldamente gli artigli affilati, riesce a scalare\nsenza scivolare persino gli iceberg."
        de:
          scarlet: "Eis bedeckt seine stählernen Stacheln.\nEin Angriff mit diesen Stacheln führt neben\ntiefen Wunden auch zu Erfrierungen."
          violet: "Vor Urzeiten lebte es in der Wüste. Mithilfe\nseiner scharfen Krallen erklimmt es Eisberge,\nohne abzurutschen."
        es:
          scarlet: "Sus púas de acero están cubiertas de hielo.\nCuando pincha con ellas, además de profundas\nheridas, también causa daño por congelación."
          violet: "En la antigüedad vivía en el desierto. Sus\nafiladas garras le permiten incluso trepar\nicebergs sin resbalarse."
        ko:
          scarlet: "강철로 된 가시를 얼음이 둘러싸고 있다.\n찔리면 깊은 상처와 함께\n동상도 걸릴 수 있다."
          violet: "먼 옛날에는 사막에 살았다.\n날카로운 발톱을 단단히 꽂아서\n빙산도 미끄러지지 않고 오른다."
        zh_simp:
          scarlet: "钢针是用冰覆盖住的。\n被它刺中会造成很深的伤口，\n还会被冻伤。"
          violet: "很久以前曾栖息在沙漠里。\n会用利爪牢牢地插入山体，\n即便是攀爬冰山也不会滑落。"
        zh_trad:
          scarlet: "鋼針被冰覆蓋著。\n被刺中時不但會造成很深的傷口，\n同時也會凍傷。"
          violet: "很久以前曾經棲息在沙漠裡。\n會用銳利的爪子牢牢插進山壁，\n即使攀爬冰山也不會滑落。"
