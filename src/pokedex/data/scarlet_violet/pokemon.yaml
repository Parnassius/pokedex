        jp_kana:
          scarlet: "ハブネークとは　￹因縁￺いんねん￻の　あいだ。\n￹出会￺であ￻うと　すかさず　￹前足￺まえあし￻の\nツメを　￹広￺ひろ￻げて　￹威嚇￺いかく￻するのだ。"
          violet: "ハブネークに　￹出会￺であ￻うと　￹体毛￺たいもう￻が\n￹逆立￺さかだ￻ち　￹攻撃態勢￺こうげきたいせい￻になる。\n￹鋭￺するど￻い　ツメが　￹最大￺さいだい￻の　￹武器￺ぶき￻。"
        jp_kanji:
          scarlet: "ハブネークとは　￹因縁￺いんねん￻の　あいだ。\n￹出会￺であ￻うと　すかさず　￹前足￺まえあし￻の\nツメを　￹広￺ひろ￻げて　￹威嚇￺いかく￻するのだ。"
          violet: "ハブネークに　￹出会￺であ￻うと　￹体毛￺たいもう￻が\n￹逆立￺さかだ￻ち　￹攻撃態勢￺こうげきたいせい￻になる。\n￹鋭￺するど￻い　ツメが　￹最大￺さいだい￻の　￹武器￺ぶき￻。"
        en:
          scarlet: "It’s Seviper’s archrival. To threaten those\nit encounters, it fans out the claws on its\nfront paws."
          violet: "If it comes across a Seviper, its fur bristles and\nit assumes its battle pose. Its sharp claws are its\nbest weapon."
        fr:
          scarlet: "Mangriff est l’ennemi juré de Séviper. Quand\nil le croise, il sort instantanément ses griffes\npour l’intimider."
          violet: "S’il vient à croiser un Séviper, son poil se hérisse\net il adopte une posture de combat. Ses griffes\nacérées sont sa meilleure arme."
        it:
          scarlet: "Acerrimo nemico di Seviper. Quando lo incontra,\nsfodera subito gli artigli per minacciarlo."
          violet: "Appena scorge un Seviper rizza subito il pelo e\nassume una posizione d’attacco. Gli affilatissimi\nartigli sono la sua arma migliore."
        de:
          scarlet: "Dieses Pokémon ist der Erzfeind von Vipitis.\nBegegnet es ihm, fährt es unverzüglich die Klauen\nan den Vorderbeinen aus, um es einzuschüchtern."
          violet: "Wenn es Vipitis begegnet, sträubt sich sein Fell\nund es geht in Kampfstellung. Seine scharfen\nKlauen sind seine beste Waffe."
        es:
          scarlet: "Le une una relación de enemistad con Seviper.\nAl toparse con uno, alarga sus afiladas zarpas\npara intimidarlo."
          violet: "Cuando se encuentra con un Seviper, se le eriza\nel pelaje y se pone en guardia. Sus zarpas son\nsu mejor arma."
        ko:
          scarlet: "세비퍼와는 사연이 깊은 사이.\n만나면 곧바로\n앞발의 발톱을 펼쳐 위협한다."
          violet: "세비퍼와 만나면 털이 곤두서고\n공격 태세가 된다.\n날카로운 발톱이 최대의 무기다."
        zh_simp:
          scarlet: "与饭匙蛇是死对头。\n一旦遇到，就会立刻张开\n前脚的爪子来威吓对方。"
          violet: "一遇上饭匙蛇，体毛就会\n竖立起来，并摆出攻击的架势。\n锐利的爪子是它最大的武器。"
        zh_trad:
          scarlet: "和飯匙蛇是死對頭。\n一旦撞見彼此，就會立刻\n張開前腳的爪子來威嚇對方。"
          violet: "遇上飯匙蛇就會豎起體毛，\n擺出攻擊的架勢。\n銳利的爪子是最大的武器。"
