      descriptions:
        jp_kana:
          scarlet: "￹家￺いえ￻を　￹支￺ささ￻える　￹礎￺いしずえ￻のように\nどっしりと　￹衝撃￺しょうげき￻を　￹受￺う￻け￹止￺と￻める\n￹守￺まも￻りに　￹秀￺ひい￻でた　￹姿￺すがた￻。"
          violet: "￹岩￺いわ￻の￹力￺ちから￻を　￹引￺ひ￻き￹出￺だ￻す　￹姿￺すがた￻。\n￹頑丈￺がんじょう￻な　￹石￺いし￻の　￹体￺からだ￻で\nあらゆる　￹攻撃￺こうげき￻から　￹身￺み￻を￹守￺まも￻る。"
        jp_kanji:
          scarlet: "￹家￺いえ￻を　￹支￺ささ￻える　￹礎￺いしずえ￻のように\nどっしりと　￹衝撃￺しょうげき￻を　￹受￺う￻け￹止￺と￻める\n￹守￺まも￻りに　￹秀￺ひい￻でた　￹姿￺すがた￻。"
          violet: "￹岩￺いわ￻の￹力￺ちから￻を　￹引￺ひ￻き￹出￺だ￻す　￹姿￺すがた￻。\n￹頑丈￺がんじょう￻な　￹石￺いし￻の　￹体￺からだ￻で\nあらゆる　￹攻撃￺こうげき￻から　￹身￺み￻を￹守￺まも￻る。"
        en:
          scarlet: "This form has excellent defenses, absorbing\nimpacts solidly like the cornerstones that support\nhouses."
          violet: "In this form, it draws on the power of stone.\nIts body is rock-solid, protecting it from all\nmanner of attacks."
        fr:
          scarlet: "Sous cette forme spécialisée en défense,\nil encaisse les coups et reste inébranlable,\ntelles les fondations d’une maison."
          violet: "Sous cette forme, il puise dans le pouvoir\nde la roche. Son corps solide comme la pierre\nle protège de toute attaque."
        it:
          scarlet: "Forma che si distingue per le capacità difensive.\nResiste ai colpi con la robustezza delle\nfondamenta di una casa."
          violet: "Questa forma sfrutta la forza della roccia.\nIl solido corpo di pietra protegge il Pokémon\nda qualsiasi attacco."
        de:
          scarlet: "Diese Form ist auf die Defensive spezialisiert.\nWie das Fundament eines Hauses fängt dieses\nPokémon jegliche Stöße solide ab."
          violet: "In dieser Form macht es sich die Kraft des\nGesteins zunutze. Mit seinem soliden Steinkörper\nschützt es sich vor Angriffen aller Art."
        es:
          scarlet: "Esta forma se especializa en la defensiva. Resiste\nlos impactos con la robustez de los cimientos de\nuna casa."
          violet: "Esta forma emplea el poder de las rocas. Puede\nprotegerse de cualquier acometida gracias a su\ncuerpo sólido como la piedra."
        ko:
          scarlet: "집을 지탱하는 주춧돌처럼\n묵직하게 충격을 받아 내는\n방어에 뛰어난 모습."
          violet: "바위의 힘을 끌어올린 모습.\n튼튼한 돌 같은 상태로\n온갖 공격으로부터 몸을 보호한다."
        zh_simp:
          scarlet: "这是它防守优秀的样子，\n能够如支撑住家的地基般\n承受沉重的冲击。"
          violet: "激发出岩石之力量的样子。\n能以坚固的岩石身躯抵挡\n任何攻击，守护自身。"
        zh_trad:
          scarlet: "這是牠優於防禦的樣子。\n會如穩穩支撐房屋的地基一般，\n泰然自若地抵擋衝擊。"
          violet: "激發出岩石力量的樣子。\n會用結實的岩石身體\n從所有攻擊保護自己。"
