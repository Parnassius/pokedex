          violet: "メガニウムが　￹吐￺は￻き￹出￺だ￻す　￹息￺いき￻には\n￹枯￺か￻れた　￹草木￺くさき￻を　よみがえらせる\n￹力￺ちから￻が　￹秘￺ひ￻められている。"
        jp_kanji:
          scarlet: "メガニウムの　そばに　いると\n￹森林浴￺しんりんよく￻を　したような\nすがすがしい　￹気分￺きぶん￻に　なれる。"
          violet: "メガニウムが　￹吐￺は￻き￹出￺だ￻す　￹息￺いき￻には\n￹枯￺か￻れた　￹草木￺くさき￻を　よみがえらせる\n￹力￺ちから￻が　￹秘￺ひ￻められている。"
        en:
          scarlet: "Anyone who stands beside it becomes\nrefreshed, just as if they were soaking in\nthe soothing atmosphere of a forest."
          violet: "Meganium’s breath holds within it the power to\nrevive grasses and plants that have withered."
        fr:
          scarlet: "Toute personne se tenant près de lui se sent\nrevigorée, comme si elle respirait l’air frais\nde la forêt."
          violet: "Le souffle de Méganium a le pouvoir\nde redonner vie aux plantes flétries\net aux arbres morts."
        it:
          scarlet: "Chiunque gli stia vicino si sente rigenerato come\nse avesse fatto una rilassante passeggiata\nnel bosco."
          violet: "Il respiro di Meganium ha il potere di rigenerare\nla vegetazione avvizzita."
        de:
          scarlet: "Jeder, der neben Meganie steht, fühlt sich\nso erfrischt, als ob er einen entspannenden\nSpaziergang durch den Wald gemacht hätte."
          violet: "Seinem Atem wohnt eine Kraft inne, durch die\nes abgestorbene Pflanzen und Blumen mit einem\nHauch zu neuem Leben erwecken kann."
        es:
          scarlet: "Estar a su lado produce una sensación\nde frescor similar a la de un relajante\npaseo por el bosque."
          violet: "El aliento de Meganium tiene el poder\nde revivir las plantas y los árboles secos."
        ko:
          scarlet: "메가니움의 주변에 있으면\n삼림욕을 한 것처럼\n상쾌한 기분이 든다."
          violet: "메가니움이 뿜어내는 숨결에는\n말라 죽은 풀과 나무를 살려 내는\n힘이 담겨 있다."
        zh_simp:
          scarlet: "只要待在大竺葵身边，\n就会像享受了森林浴一样，\n让心情变得清新舒畅。"
          violet: "大竺葵呼出的气息中蕴含着\n能让枯萎的草木复苏的力量。"
        zh_trad:
          scarlet: "只要待在大竺葵身邊，\n就會像是做了森林浴，\n神清氣爽心情好。"
          violet: "大竺葵呼出的氣息中\n蘊含著能讓枯萎的草木\n復甦的力量。"
