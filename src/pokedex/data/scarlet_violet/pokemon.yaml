          violet: "ずば￹抜￺ぬ￻けた　ジャンプ￹力￺りょく￻を　￹活￺い￻かし\n￹敵￺てき￻の　￹頭上￺ずじょう￻から　もっちりした\n￹泡￺あわ￻を　￹投￺な￻げつけて　￹翻弄￺ほんろう￻する。"
        jp_kanji:
          scarlet: "￹呑気￺のんき￻に　￹見￺み￻えるが　￹敵￺てき￻を　￹欺￺あざむ￻く\n￹演技￺えんぎ￻。　￹一転￺いってん￻　￹目￺め￻にも￹留￺と￻まらない\nスピードで　￹敵￺てき￻を　￹圧倒￺あっとう￻する。"
          violet: "ずば￹抜￺ぬ￻けた　ジャンプ￹力￺りょく￻を　￹活￺い￻かし\n￹敵￺てき￻の　￹頭上￺ずじょう￻から　もっちりした\n￹泡￺あわ￻を　￹投￺な￻げつけて　￹翻弄￺ほんろう￻する。"
        en:
          scarlet: "Its happy-go-lucky look is an act intended to fool\nits enemies. It will suddenly drop the facade and\noverwhelm its foes with its blinding speed."
          violet: "It utilizes its extraordinary jumping abilities to\nflummox its foes, throwing springy bubbles\nat them from above their heads."
        fr:
          scarlet: "Son apparente nonchalance est trompeuse.\nIl change soudainement d’attitude et domine\nses adversaires en un clin d’œil."
          violet: "Il utilise sa puissance de saut extraordinaire\npour dominer ses adversaires en les arrosant\nde sa mousse visqueuse depuis les airs."
        it:
          scarlet: "La sua aria spensierata è solo una messinscena\nper ingannare il nemico e sopraffarlo\nd’improvviso a gran velocità."
          violet: "Sfrutta la sua eccezionale potenza di salto\nper sopraffare il nemico gettandogli addosso\nuna densa schiuma dall’alto."
        de:
          scarlet: "Es wirkt unbekümmert, doch damit täuscht es nur\nGegner, um sie dann plötzlich mit unbegreiflicher\nGeschwindigkeit zu überwältigen."
          violet: "Es nutzt seine herausragende Sprungkraft, um\nelastische Blasen über den Köpfen seiner Gegner\nabzuwerfen und diese so zum Narren zu halten."
        es:
          scarlet: "Su aire despreocupado no es más que una\nfachada con la que engaña a sus enemigos para\ndespués arrollarlos a una velocidad abrumadora."
          violet: "Gracias a sus poderosos saltos, es capaz de\nlanzar burbujas elásticas a sus enemigos desde\narriba para dejarlos a su merced."
        ko:
          scarlet: "태평해 보이는 것은\n적을 속이기 위한 연기다.\n눈에 보이지 않는 스피드로 적을 압도한다."
          violet: "뛰어난 점프력을 활용하여\n적의 머리 위에서\n끈적한 거품을 던지며 농락한다."
        zh_simp:
          scarlet: "看起来悠哉的样子其实是用来\n欺骗敌人的演技。会冷不防地用\n迅雷不及掩耳的速度压制敌人。"
          violet: "发挥卓越的弹跳力，\n从敌人头上扔下富有\n弹力的泡泡来玩弄对方。"
        zh_trad:
          scarlet: "看起來悠哉的樣子其實是\n欺瞞敵人的演技。會冷不防地用\n迅雷不及掩耳的速度壓制敵人。"
          violet: "會活用超乎尋常的跳躍力\n從敵人頭上扔下富有彈力\n的泡泡來耍弄對方。"
