      descriptions:
        jp_kana:
          scarlet: "￹体内￺たいない￻の　￹余計￺よけい￻な　￹水分￺すいぶん￻を\n￹目￺め￻　から　￹出￺だ￻して　￹調節￺ちょうせつ￻する。\n￹泣￺な￻いているように　￹見￺み￻えるだけ。"
          violet: "￹体￺からだ￻の　￹余計￺よけい￻な　￹水分￺すいぶん￻を\n￹目￺め￻から　￹外￺そと￻に　￹出￺だ￻す。\n￹成分￺せいぶん￻は　￹人間￺にんげん￻の　￹汗￺あせ￻に　￹似￺に￻ている。"
        jp_kanji:
          scarlet: "￹体内￺たいない￻の　￹余計￺よけい￻な　￹水分￺すいぶん￻を\n￹目￺め￻　から　￹出￺だ￻して　￹調節￺ちょうせつ￻する。\n￹泣￺な￻いているように　￹見￺み￻えるだけ。"
          violet: "￹体￺からだ￻の　￹余計￺よけい￻な　￹水分￺すいぶん￻を\n￹目￺め￻から　￹外￺そと￻に　￹出￺だ￻す。\n￹成分￺せいぶん￻は　￹人間￺にんげん￻の　￹汗￺あせ￻に　￹似￺に￻ている。"
        en:
          scarlet: "In order to adjust the level of fluids in its body, it\nexudes water from its eyes. This makes it appear\nto be crying."
          violet: "From its eyes, it can expel excess moisture from\nits body. This liquid is similar in composition to\nhuman sweat."
        fr:
          scarlet: "Il régule le surplus d’eau de son corps\nen l’éliminant par les yeux, ce qui donne\nl’impression qu’il pleure."
          violet: "Il expulse les liquides superflus par les yeux.\nLeur composition chimique est semblable\nà celle de la sueur humaine."
        it:
          scarlet: "Regola il livello dei fluidi corporei espellendo\nquelli in eccesso dagli occhi. Per questo sembra\nche stia sempre piangendo."
          violet: "Espelle dagli occhi l’umidità corporea in eccesso\nsotto forma di un liquido dalla composizione\nchimica simile a quella del sudore umano."
        de:
          scarlet: "Es reguliert seinen Wasserhaushalt, indem es\nüberschüssige Flüssigkeit durch die Augen\nableitet. Es wirkt nur so, als würde es weinen."
          violet: "Überschüssiges Wasser in seinem Körper scheidet\nes über die Augen aus. Die Zusammensetzung der\nFlüssigkeit ähnelt dem Schweiß von Menschen."
        es:
          scarlet: "Aunque parece que llora, realmente lo que hace\nes expulsar el exceso de fluidos corporales por\nlos ojos."
          violet: "Expulsa por los ojos el líquido corporal que le\nsobra. La composición química de este líquido\nse parece a la del sudor de los seres humanos."
        ko:
          scarlet: "체내의 불필요한 수분을\n눈으로 내보내 조절한다.\n울고 있는 것처럼 보일 뿐이다."
          violet: "몸에 불필요한 수분은\n눈을 통해 밖으로 내보낸다.\n그 성분은 인간의 땀과 비슷하다."
        zh_simp:
          scarlet: "虽然看起来像在哭泣，但那不过是\n它在把多余的水从眼睛排出，\n从而调节体内的水分罢了。"
          violet: "会从眼睛排出\n体内多余的水分。\n该成分接近人类的汗液。"
        zh_trad:
          scarlet: "雖然看似在哭泣，但那不過是\n牠在把多餘的水從眼睛排出，\n以調節體內的水分罷了。"
          violet: "會從眼睛排出體內\n多餘的水分。\n該成分接近人類的汗液。"
