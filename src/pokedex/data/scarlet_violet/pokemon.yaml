          scarlet: "￹昔￺むかし￻　￹遠￺とお￻い　￹土地￺とち￻から　￹人￺ひと￻に\n￹連￺つ￻れられ　やって￹来￺き￻た。　￹飛行機￺ひこうき￻を\n￹軽々￺かるがる￻　￹引￺ひ￻っぱる　￹力持￺ちからも￻ち。"
          violet: "プライドが　￹高￺たか￻く　￹気難￺きむずか￻しい。\n￹鮮￺あざ￻やかな　￹緑￺みどり￻の　￹皮膚￺ひふ￻の　ものが\n￹仲間￺なかま￻の　￹尊敬￺そんけい￻を　￹集￺あつ￻める。"
        jp_kanji:
          scarlet: "￹昔￺むかし￻　￹遠￺とお￻い　￹土地￺とち￻から　￹人￺ひと￻に\n￹連￺つ￻れられ　やって￹来￺き￻た。　￹飛行機￺ひこうき￻を\n￹軽々￺かるがる￻　￹引￺ひ￻っぱる　￹力持￺ちからも￻ち。"
          violet: "プライドが　￹高￺たか￻く　￹気難￺きむずか￻しい。\n￹鮮￺あざ￻やかな　￹緑￺みどり￻の　￹皮膚￺ひふ￻の　ものが\n￹仲間￺なかま￻の　￹尊敬￺そんけい￻を　￹集￺あつ￻める。"
        en:
          scarlet: "This Pokémon was brought to Paldea long\nago by people from a faraway land. It’s so\nstrong that it can easily pull an airplane."
          violet: "Copperajah are prideful, cantankerous Pokémon.\nSpecimens with vibrant green skin command the\nrespect of others of their kind."
        fr:
          scarlet: "Ce Pokémon est originaire d’une région lointaine.\nOn l’a amené à Paldea il y a bien longtemps.\nIl est si fort qu’il peut facilement tirer un avion."
          violet: "Ce Pokémon très fier a plutôt mauvais caractère.\nLe vert éclatant de sa peau lui vaut le respect\nde ses congénères."
        it:
          scarlet: "Introdotto tempo fa nella regione da un\nluogo remoto, è dotato di una forza tale\nda poter trainare un aereo come nulla fosse."
          violet: "Ha un’indole orgogliosa e stizzosa.\nI Copperajah con la pelle di colore verde\nacceso sono riveriti dai propri simili."
        de:
          scarlet: "Vor langer Zeit haben Menschen es aus einer\nfernen Region mitgebracht. Es ist so stark, dass es\nselbst ein Flugzeug mühelos schleppen kann."
          violet: "Es ist sehr stolz und mürrisch. Exemplare mit\nleuchtend grüner Haut werden von ihren\nArtgenossen besonders stark respektiert."
        es:
          scarlet: "Llegó a Paldea hace mucho tiempo gracias a\npersonas de una tierra lejana. Con su fuerza,\npuede arrastrar un avión sin problemas."
          violet: "Es orgulloso y difícil de tratar. Aquellos\ncon un tono de piel verde más vivo se\nganan el respeto de sus congéneres."
        ko:
          scarlet: "과거 먼 곳에서\n인간들이 데리고 왔다.\n비행기도 가볍게 끌어당기는 천하장사."
          violet: "자존심이 강하고 성미가 까다롭다.\n선명한 녹색 피부를 띠는 개체일수록\n동료들에게 존경받는다."
        zh_simp:
          scarlet: "在很久以前，人类带着它\n从遥远的地方来到了这里。\n是个能轻松拖动飞机的大力士。"
          violet: "自尊心强，脾气刁钻。\n绿色的皮肤越是鲜艳，\n就越受到同伴的尊敬。"
        zh_trad:
          scarlet: "在很久以前被人類從遙遠\n的地方帶來了這裡。是個\n能輕易拖動飛機的大力士。"
          violet: "自尊心強，脾氣刁鑽。\n皮膚的綠色越是鮮豔，\n就越受到同伴的尊敬。"
