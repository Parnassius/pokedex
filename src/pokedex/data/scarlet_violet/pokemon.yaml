        jp_kana:
          scarlet: "￹晴￺は￻れた　￹日￺ひ￻は　￹草原￺そうげん￻に　￹出￺で￻てきて\n￹走￺はし￻りまわり　￹車輪￺しゃりん￻のような　￹脚￺あし￻に\n￹巻￺ま￻きこんだ　￹草￺くさ￻を　￹食￺た￻べる。"
          violet: "￹古￺ふる￻くなり　￹剥￺は￻がれ￹落￺お￻ちた　￹体￺からだ￻の　￹表面￺ひょうめん￻は\n￹石炭￺せきたん￻の　￹代￺か￻わりに\n￹燃料￺ねんりょう￻として　￹使￺つか￻われてきた。"
        jp_kanji:
          scarlet: "￹晴￺は￻れた　￹日￺ひ￻は　￹草原￺そうげん￻に　￹出￺で￻てきて\n￹走￺はし￻りまわり　￹車輪￺しゃりん￻のような　￹脚￺あし￻に\n￹巻￺ま￻きこんだ　￹草￺くさ￻を　￹食￺た￻べる。"
          violet: "￹古￺ふる￻くなり　￹剥￺は￻がれ￹落￺お￻ちた　￹体￺からだ￻の　￹表面￺ひょうめん￻は\n￹石炭￺せきたん￻の　￹代￺か￻わりに\n￹燃料￺ねんりょう￻として　￹使￺つか￻われてきた。"
        en:
          scarlet: "On sunny days, Rolycoly will come out onto\ngrassy plains and roll around. Then it will eat\nthe grass that gets tangled in its wheel-like leg."
          violet: "Chunks of the surface of this Pokémon’s body\nthat have grown old and flaked off have long\nbeen used for fuel as an alternative to coal."
        fr:
          scarlet: "Quand il fait beau, ce Pokémon sort se promener\ndans les hautes herbes. Il mange ensuite les brins\nemmêlés dans sa roue."
          violet: "Au fil du temps, de petits morceaux de ce\nPokémon se détachent. On s’en sert comme\ncombustible à la place du charbon."
        it:
          scarlet: "Nei giorni di sole esce all’aperto a scorrazzare\nper i prati e mangia l’erba che rimane attaccata\nalla zampa, che sembra una ruota."
          violet: "Con il tempo, alcuni pezzi sulla superficie del suo\ncorpo si staccano e cadono a terra. Vengono\nusati come combustibile al posto del carbone."
        de:
          scarlet: "An sonnigen Tagen rollt es gerne auf Wiesen\nherum und frisst dabei das Gras, das sich in\nseinem radähnlichen Bein verfangen hat."
          violet: "Bruchstücke der Oberfläche dieses Pokémon,\ndie altersbedingt herabfallen, werden seit jeher\nals Brennstoffersatz für Steinkohle verwendet."
        es:
          scarlet: "En días despejados, sale a corretear por los\nprados y se come las hierbas que se le queden\nenredadas en su pata con forma de rueda."
          violet: "Las partes envejecidas de la corteza que se le\ndesprenden se utilizan como combustible en\nlugar del carbón."
        ko:
          scarlet: "맑은 날에는 초원으로 나와 달리면서\n수레바퀴 같은 다리에 휘감긴 풀을 먹는다."
          violet: "오래되어 떨어진 몸의 표면은\n석탄을 대신하는 연료로\n사용되어 왔다."
        zh_simp:
          scarlet: "晴天时会在草原东奔西跑，\n然后吃掉被卷进它那\n仿佛是车轮的脚里的草。"
          violet: "脱落的老旧体表\n一直以来都被当成燃料\n来代替煤炭使用。"
        zh_trad:
          scarlet: "晴天時會到草原東奔西跑，\n然後吃掉被牠那長得像是\n車輪的腳捲進去的草。"
          violet: "脫落的老舊體表\n一直以來都當成燃料\n來代替煤炭使用。"
