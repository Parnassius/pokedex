      descriptions:
        jp_kana:
          scarlet: "こんこんと　￹湧￺わ￻き￹出￺で￻る　￹水￺みず￻のように\n￹絶￺た￻え￹間￺ま￻なく　￹技￺わざ￻を　￹繰￺く￻りだし￹続￺つづ￻ける\n￹攻守￺こうしゅ￻に　￹優￺すぐ￻れた　￹姿￺すがた￻。"
          violet: "￹水￺みず￻の￹力￺ちから￻を　￹引￺ひ￻き￹出￺だ￻す　￹姿￺すがた￻。\n￹蹴￺け￻り￹技￺わざ￻と　ツタによる　￹打撃￺だげき￻を\n￹途切￺とぎ￻れなく　￹仕掛￺しか￻け￹続￺つづ￻ける。"
        jp_kanji:
          scarlet: "こんこんと　￹湧￺わ￻き￹出￺で￻る　￹水￺みず￻のように\n￹絶￺た￻え￹間￺ま￻なく　￹技￺わざ￻を　￹繰￺く￻りだし￹続￺つづ￻ける\n￹攻守￺こうしゅ￻に　￹優￺すぐ￻れた　￹姿￺すがた￻。"
          violet: "￹水￺みず￻の￹力￺ちから￻を　￹引￺ひ￻き￹出￺だ￻す　￹姿￺すがた￻。\n￹蹴￺け￻り￹技￺わざ￻と　ツタによる　￹打撃￺だげき￻を\n￹途切￺とぎ￻れなく　￹仕掛￺しか￻け￹続￺つづ￻ける。"
        en:
          scarlet: "This form excels in both attack and defense.\nIt ceaselessly unleashes moves like a spring\ngushes water."
          violet: "In this form, it draws on the power of water.\nIt attacks unrelentingly with kicks and ivy strikes."
        fr:
          scarlet: "Sous cette forme, il excelle en attaque comme en\ndéfense, et peut enchaîner les capacités avec la\nmême fluidité qu’une source d’eau jaillissante."
          violet: "Sous cette forme, il puise dans le pouvoir\nde l’eau. Il attaque sans relâche en donnant\ndes coups de pied et de liane."
        it:
          scarlet: "Forma che eccelle sia in attacco che in difesa.\nSferra una raffica continua di mosse, implacabile\ncome uno scroscio d’acqua incessante."
          violet: "Questa forma sfrutta la forza dell’acqua.\nAttacca senza tregua con calci e colpi di liana."
        de:
          scarlet: "Diese Form glänzt in Offensive und Defensive.\nWie das sprudelnde Wasser eines Springbrunnens\ngreift dieses Pokémon Gegner pausenlos an."
          violet: "In dieser Form macht es sich die Kraft des\nWassers zunutze. Mit Tritten und Rankenschlägen\nteilt es ohne Unterlass hart aus."
        es:
          scarlet: "Esta forma destaca en la ofensiva y la defensiva.\nArremete con movimientos incesantes que se\nasemejan a un potente chorro de agua."
          violet: "Esta forma emplea el poder del agua. Ataca de\nforma repetida asestando patadas y golpeando\ncon su rama y su liana."
        ko:
          scarlet: "콸콸 용솟음치는 물처럼\n끊임없이 기술을 구사하는\n공수 양면에서 뛰어난 모습."
          violet: "물의 힘을 끌어올린 모습.\n발차기 기술과 덩굴을 이용한 타격을\n쉴 새 없이 퍼붓는다."
        zh_simp:
          scarlet: "这是它攻守兼备的样子，\n会像不断涌出的水一样\n无间断地使出招式。"
          violet: "激发出水之力量的样子。\n会以踢技和藤蔓\n发起无间断的打击。"
        zh_trad:
          scarlet: "這是牠攻守兼備的樣子。\n會如源源不絕的湧水一般，\n絲毫不間斷地使出招式。"
          violet: "激發出水之力量的樣子。\n會運用踢技和藤蔓\n接連不斷地發動攻擊。"
