      descriptions:
        jp_kana:
          scarlet: "￹水￺みず￻の　￹温度￺おんど￻が　￹下￺さ￻がる　￹夜￺よる￻\n￹食￺た￻べものを　￹求￺もと￻め　￹泳￺およ￻ぎまわる。\n￹昼間￺ひるま￻は　￹浅￺あさ￻い　￹海底￺かいてい￻で　￹寝￺ね￻る。"
          violet: "￹寒￺さむ￻さに　￹勝￺か￻つため　￹体￺からだ￻の￹中￺なか￻に\n￹熱￺ねつ￻エネルギーを　￹蓄￺たくわ￻える。\n￹寒￺さむ￻い　￹海￺うみ￻も　８ノットで　￹進￺すす￻む。"
        jp_kanji:
          scarlet: "￹水￺みず￻の　￹温度￺おんど￻が　￹下￺さ￻がる　￹夜￺よる￻\n￹食￺た￻べものを　￹求￺もと￻め　￹泳￺およ￻ぎまわる。\n￹昼間￺ひるま￻は　￹浅￺あさ￻い　￹海底￺かいてい￻で　￹寝￺ね￻る。"
          violet: "￹寒￺さむ￻さに　￹勝￺か￻つため　￹体￺からだ￻の￹中￺なか￻に\n￹熱￺ねつ￻エネルギーを　￹蓄￺たくわ￻える。\n￹寒￺さむ￻い　￹海￺うみ￻も　８ノットで　￹進￺すす￻む。"
        en:
          scarlet: "It sleeps under shallow ocean waters during\nthe day, then looks for food at night when\nit’s colder."
          violet: "It stores thermal energy in its body to fend off\nthe cold. It swims at eight knots even in\nfrigid waters."
        fr:
          scarlet: "Le jour, il dort dans les eaux peu profondes.\nLa nuit, quand la température de la mer\ndescend, il part à la recherche de nourriture."
          violet: "Pour lutter contre le froid, il emmagasine\nde l’énergie thermique. Il peut nager à une\nvitesse de huit nœuds, même dans l’eau glacée."
        it:
          scarlet: "Di giorno dorme su fondali marini poco profondi.\nDi notte, quando fa più freddo, va alla ricerca\ndi cibo."
          violet: "Accumula energia termica all’interno del corpo\nper resistere al freddo. Nuota a 8 nodi costanti\nanche in acque gelide."
        de:
          scarlet: "Des Nachts, wenn die Wassertemperatur fällt,\nschwimmt es auf der Suche nach Nahrung umher.\nTagsüber schläft es im seichten Meereswasser."
          violet: "Es speichert thermische Energie in seinem Körper,\num der Kälte standzuhalten. Selbst in eiskalten\nMeeren schwimmt es acht Knoten schnell."
        es:
          scarlet: "Duerme en aguas poco profundas durante el día\ny, por la noche, cuando baja la temperatura\ndel agua, nada en busca de comida."
          violet: "Conserva energía térmica en su interior para\nprotegerse del frío. Alcanza los 15 km/h\nhasta en los mares más fríos."
        ko:
          scarlet: "물의 온도가 내려가는 밤에\n먹이를 찾아 헤엄친다.\n낮에는 얕은 해저에서 잔다."
          violet: "추위를 이기기 위해 몸속에\n열에너지를 저장해 둔다.\n추운 바다도 8노트의 속도로 나아간다."
        zh_simp:
          scarlet: "会在水温下降的夜晚\n四处游动觅食。白天则会\n在较浅的海底睡觉。"
          violet: "为了战胜寒冷而在体内\n储存热能。即使在寒冷的大海\n也能以８节的速度前进。"
        zh_trad:
          scarlet: "會在水溫變低的夜晚\n為了尋找食物而四處游動。\n白天會在淺海的海底睡覺。"
          violet: "為了戰勝寒冷，會在體內\n儲存熱能。在寒冷的海中\n也能以８節的速度前進。"
grimer:
