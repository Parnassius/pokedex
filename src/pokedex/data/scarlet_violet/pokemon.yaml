          violet: "￹変幻自在￺へんげんじざい￻の　￹鳴￺な￻き￹声￺ごえ￻を\n￹競￺きそ￻い￹合￺あ￻わせる　￹鳴￺な￻き￹比￺くら￻べ　という\n￹遊￺あそ￻びを　￹楽￺たの￻しむ　￹村￺むら￻がある。"
        jp_kanji:
          scarlet: "￹体￺からだ￻の　￹中￺なか￻にある　￹空洞￺くうどう￻で\n￹音￺おと￻を　￹反響￺はんきょう￻させることで\nきれいな　￹鳴￺な￻き￹声￺ごえ￻に　なるのだ。"
          violet: "￹変幻自在￺へんげんじざい￻の　￹鳴￺な￻き￹声￺ごえ￻を\n￹競￺きそ￻い￹合￺あ￻わせる　￹鳴￺な￻き￹比￺くら￻べ　という\n￹遊￺あそ￻びを　￹楽￺たの￻しむ　￹村￺むら￻がある。"
        en:
          scarlet: "By allowing its cry to resonate in the hollow of its\nbelly, it produces a captivating sound."
          violet: "There is a village that hosts a contest based on\nthe amazingly variable cries of this Pokémon."
        fr:
          scarlet: "Les cavités de son corps amplifient les sons,\nce qui lui permet d’émettre un cri mélodieux."
          violet: "Ses cris sont tellement variés qu’on organise\nun concours en leur honneur dans un certain\nvillage."
        it:
          scarlet: "Usa delle cavità all’interno del proprio corpo\ncome casse di risonanza per produrre melodie\naffascinanti."
          violet: "C’è un villaggio che organizza una gara basata\nsulle melodie incredibilmente varie di questo\nPokémon."
        de:
          scarlet: "Seinen wunderschönen Ruf erzeugt es mithilfe\neines Hohlraums im Körper, der als Verstärker\nfungiert."
          violet: "Es gibt ein Dorf, wo ein Wettbewerb abgehalten\nwird, bei dem man Zirpeise mit ihren vielseitigen\nRufen gegeneinander antreten lässt."
        es:
          scarlet: "Puede hacer que el sonido resuene en las\ncavidades de su cuerpo y producir un hermoso\ncanto."
          violet: "Hay un pueblo en el que celebran un concurso\nbasado en la increíble variedad de sus gritos."
        ko:
          scarlet: "몸 안에 있는 빈 공간으로\n소리를 메아리치게 해\n아름다운 울음소리가 된다."
          violet: "변화무쌍한 울음소리를 겨루는\n울음소리 비교 놀이를\n즐기는 마을이 있다."
        zh_simp:
          scarlet: "通过让声音在体内的\n空洞回响来使自己的\n叫声变得悦耳。"
          violet: "有村子会让它们互相\n比拼变化多端的叫声，\n当成娱乐活动。"
        zh_trad:
          scarlet: "透過讓聲音在身體裡的\n空洞迴響，自己的叫聲\n就可以變得清脆悅耳。"
          violet: "有村子會讓牠們互相\n比拼變化多端的叫聲，\n當成娛樂活動。"
