      descriptions:
        jp_kana:
          scarlet: "￹全身￺ぜんしん￻が　￹温￺あたた￻まることで\n￹本来￺ほんらい￻の　パワーを　￹発揮￺はっき￻できる。\nそのため　￹準備運動￺じゅんびうんどう￻を　する。"
          violet: "￹炎￺ほのお￻エネルギーが　￹集￺あつ￻まる\n￹足￺あし￻の　￹肉球￺にくきゅう￻は　￹高温￺こうおん￻になり\n￹相手￺あいて￻に　￹大￺だい￻ダメージを　￹与￺あた￻える。"
        jp_kanji:
          scarlet: "￹全身￺ぜんしん￻が　￹温￺あたた￻まることで\n￹本来￺ほんらい￻の　パワーを　￹発揮￺はっき￻できる。\nそのため　￹準備運動￺じゅんびうんどう￻を　する。"
          violet: "￹炎￺ほのお￻エネルギーが　￹集￺あつ￻まる\n￹足￺あし￻の　￹肉球￺にくきゅう￻は　￹高温￺こうおん￻になり\n￹相手￺あいて￻に　￹大￺だい￻ダメージを　￹与￺あた￻える。"
        en:
          scarlet: "Once its body has heated up, Scorbunny can use\nthe full extent of its power. That’s why it does\nwarm-up exercises."
          violet: "Fire energy gathers in the pads of its feet,\nraising their temperature. Once hot, Scorbunny’s\nfootpads can deal heavy damage to opponents."
        fr:
          scarlet: "Ce Pokémon peut déployer tout son potentiel\nune fois que sa température est élevée. C’est\npourquoi il fait des exercices d’échauffement."
          violet: "Lorsqu’il concentre son énergie incandescente\ndans ses coussinets, ses pattes deviennent\nbrûlantes et il peut infliger d’énormes dégâts."
        it:
          scarlet: "Quando la temperatura corporea sale, sprigiona\ntutta la sua potenza. Perciò fa sempre esercizi\ndi riscaldamento."
          violet: "L’energia Fuoco si concentra nei cuscinetti sotto\ni suoi piedi, rendendoli roventi e consentendogli\ndi infliggere ingenti danni agli avversari."
        de:
          scarlet: "Erst wenn sein Körper ausreichend warm ist,\nkann es seine wahre Kraft entfesseln. Deshalb\nmacht es Aufwärmübungen."
          violet: "Die Ballen an seinen Läufen werden aufgrund der\nFeuer-Energie, die sich dort sammelt, sehr heiß\nund können Gegnern großen Schaden zufügen."
        es:
          scarlet: "Desata su verdadera fuerza cuando su cuerpo\nentra en calor. Por eso hace ejercicios de\ncalentamiento."
          violet: "Las almohadillas de las patas concentran energía\nígnea y, cuando alcanzan temperaturas muy altas,\npueden causar un gran daño a sus adversarios."
        ko:
          scarlet: "전신이 따뜻해지면\n본래의 힘을 발휘할 수 있다.\n그러기 위해 준비 운동을 한다."
          violet: "불꽃 에너지가 집중되는\n발의 볼록살은 고온이 되어\n상대에게 큰 데미지를 준다."
        zh_simp:
          scarlet: "通过提升全身的温度，\n便能发挥出真正的力量。\n它会为此而做准备运动。"
          violet: "能集中火之能量的\n脚底肉球会升至高温，\n给予对手巨大的伤害。"
        zh_trad:
          scarlet: "當全身的溫度提升後，\n就會發揮出真正的力量，\n因此會為此做熱身運動。"
          violet: "聚集了火之能量的\n腳底肉球會升至高溫，\n帶給對手巨大的傷害。"
