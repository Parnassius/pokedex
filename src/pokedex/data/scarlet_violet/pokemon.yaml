      descriptions:
        jp_kana:
          scarlet: "￹飛翔力￺ひしょうりょく￻は　トップクラス。\n１００キロ￹以上￺いじょう￻の　￹獲物￺えもの￻を\n￹掴￺つか￻んだまま　￹楽々￺らくらく￻　￹飛￺と￻びまわる。"
          violet: "￹興奮￺こうふん￻すると　￹羽毛￺うもう￻の　￹隙間￺すきま￻から\n￹火￺ひ￻の￹粉￺こ￻を　￹吹￺ふ￻く。　￹焦￺こ￻げない　￹羽毛￺うもう￻は\n￹防火素材￺ぼうかそざい￻として　￹利用￺りよう￻される。"
        jp_kanji:
          scarlet: "￹飛翔力￺ひしょうりょく￻は　トップクラス。\n１００キロ￹以上￺いじょう￻の　￹獲物￺えもの￻を\n￹掴￺つか￻んだまま　￹楽々￺らくらく￻　￹飛￺と￻びまわる。"
          violet: "￹興奮￺こうふん￻すると　￹羽毛￺うもう￻の　￹隙間￺すきま￻から\n￹火￺ひ￻の￹粉￺こ￻を　￹吹￺ふ￻く。　￹焦￺こ￻げない　￹羽毛￺うもう￻は\n￹防火素材￺ぼうかそざい￻として　￹利用￺りよう￻される。"
        en:
          scarlet: "It has top-notch flying capabilities. It flies\naround easily, even while carrying prey\nthat weighs more than 220 lbs."
          violet: "When it gets excited, it vents sparks from the\ngaps between its feathers. These unburnable\nfeathers are used as a fireproof material."
        fr:
          scarlet: "Ce Pokémon excelle dans l’art de voler.\nIl est même capable de transporter une proie\nde plus de 100 kg sans sourciller."
          violet: "Quand il est agité, des étincelles jaillissent des\ninterstices situés entre ses plumes. Ces dernières\nservent à créer des matériaux ignifuges."
        it:
          scarlet: "Le sue capacità di volo sono stupefacenti.\nRiesce a volare con estrema facilità anche\ndopo aver afferrato una preda di oltre 100 kg."
          violet: "Se si emoziona emette scintille dalle fessure fra\nle piume. Queste ultime non prendono fuoco e\nvengono spesso usate come materiale ignifugo."
        de:
          scarlet: "Es verfügt über erstklassige Flugfertigkeiten und\nkann selbst mit ergriffener Beute, die mehr als\n100 kg wiegt, problemlos umherfliegen."
          violet: "Ist es aufgeregt, versprüht es Funken aus den\nZwischenräumen seines Gefieders. Seine Federn\nwerden als feuerfestes Material verwendet."
        es:
          scarlet: "Su pericia en vuelo es excepcional. Revolotea\nsin inmutarse aun llevando en sus garras presas\nde más de 100 kg."
          violet: "Si se exalta, suelta chispas de los intersticios\nentre sus plumas. Este plumaje incombustible\nse emplea como material ignífugo."
        ko:
          scarlet: "비행 능력은 톱클래스다.\n100kg 이상의 먹이를 잡은 채로도\n가뿐히 날아다닌다."
          violet: "흥분하면 깃털 사이로 불티를 흩뿌린다.\n불에 타지 않는 깃털은\n방화 소재로 이용되기도 한다."
        zh_simp:
          scarlet: "它的飞行能力数一数二。\n能够抓着１００公斤以上的\n猎物轻轻松松地飞来飞去。"
          violet: "一旦兴奋就会从羽毛的空隙间\n喷出火花。它的羽毛不会烧焦，\n因此会被当成防火材料使用。"
        zh_trad:
          scarlet: "飛行能力數一數二。\n能夠攫著１００公斤以上的\n獵物輕輕鬆鬆地飛來飛去。"
          violet: "一旦興奮就會從羽毛間\n噴出火花。不會燒焦的\n羽毛會被當成防火材利用。"
