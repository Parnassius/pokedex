        jp_kanji:
          scarlet: "サイコパワーを　￹操￺あやつ￻り\nまわりの　￹空間￺くうかん￻を　ねじ￹曲￺ま￻げることで\n￹未来￺みらい￻を　￹見通￺みとお￻すことができる。"
          violet: "トレーナーの　￹明￺あか￻るい　￹気持￺きも￻ちが\nサイコパワーの　￹源￺みなもと￻。　￹楽￺たの￻しい\n￹気分￺きぶん￻に　なると　クルクル　￹踊￺おど￻る。"
        en:
          scarlet: "It has a psychic power that enables it to distort\nthe space around it and see into the future."
          violet: "The cheerful spirit of its Trainer gives it energy\nfor its psychokinetic power. It spins and dances\nwhen happy."
        fr:
          scarlet: "Grâce à ses pouvoirs psychiques, il peut distordre\nl’espace-temps et ainsi voir l’avenir."
          violet: "Kirlia tire ses pouvoirs psychiques de la bonne\nhumeur de son Dresseur. Il danse en tournant\nsur lui-même quand il est content."
        it:
          scarlet: "Sfruttando i suoi poteri psichici, può distorcere\nlo spazio circostante per prevedere l’avvenire."
          violet: "Più felice è la sua Allenatrice o il suo Allenatore,\npiù sono potenti i suoi poteri psichici. Quando è\ndi buonumore, si lancia in danze e piroette."
        de:
          scarlet: "Seine Psycho-Kräfte erlauben es ihm, den Raum\num sich selbst zu verformen und so in die Zukunft\nzu sehen."
          violet: "Die fröhliche Stimmung seines Trainers ist die\nQuelle seiner Psycho-Kräfte. Wenn es glücklich\nist, tanzt und dreht es sich."
        es:
          scarlet: "Con sus poderes psíquicos puede deformar\nel espacio a su alrededor y predecir el futuro."
          violet: "Al percibir la alegría de su Entrenador, refuerza\nsus ataques psicoquinéticos. Cuando está\ncontento, da vueltas y baila."
        ko:
          scarlet: "사이코 파워를 조작해\n주변의 공간을 일그러뜨려\n미래를 내다볼 수 있다."
          violet: "트레이너의 밝은 마음이\n사이코 파워의 근원이다.\n즐거워지면 빙글빙글 춤춘다."
        zh_simp:
          scarlet: "可以通过操纵精神力量\n扭曲周围的空间来看清未来。"
          violet: "训练家开朗的情绪\n是精神力量的源泉。\n开心时会旋转着跳舞。"
        zh_trad:
          scarlet: "能夠操縱精神力量\n來扭曲周圍的空間，\n讓自己看見未來。"
          violet: "訓練家開朗的情緒\n是牠的精神力量源泉。\n開心時會轉圈跳舞。"
