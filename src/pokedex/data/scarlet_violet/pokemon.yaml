      descriptions:
        jp_kana:
          scarlet: "まわりの　￹空気￺くうき￻を　￹凍￺こお￻らせて\n￹氷￺こおり￻のマスクで　￹顔￺かお￻を　￹守￺まも￻り\n￹背￺せ￻びれを　￹氷￺こおり￻の￹剣￺つるぎ￻に　￹変￺か￻える。"
          violet: "￹前方宙返￺ぜんぽうちゅうがえ￻りして　￹背￺せ￻びれを　￹凍￺こお￻らせた\n￹剣￺つるぎ￻で　￹攻撃￺こうげき￻する。\n￹強￺つよ￻い　￹足腰￺あしこし￻の　￹為￺な￻せる￹業￺わざ￻。"
        jp_kanji:
          scarlet: "まわりの　￹空気￺くうき￻を　￹凍￺こお￻らせて\n￹氷￺こおり￻のマスクで　￹顔￺かお￻を　￹守￺まも￻り\n￹背￺せ￻びれを　￹氷￺こおり￻の￹剣￺つるぎ￻に　￹変￺か￻える。"
          violet: "￹前方宙返￺ぜんぽうちゅうがえ￻りして　￹背￺せ￻びれを　￹凍￺こお￻らせた\n￹剣￺つるぎ￻で　￹攻撃￺こうげき￻する。\n￹強￺つよ￻い　￹足腰￺あしこし￻の　￹為￺な￻せる￹業￺わざ￻。"
        en:
          scarlet: "Arctibax freezes the air around it, protecting its\nface with an ice mask and turning its dorsal fin\ninto a blade of ice."
          violet: "It attacks with the blade of its frozen dorsal fin\nby doing a front flip in the air. Arctibax’s strong\nback and legs allow it to pull off this technique."
        fr:
          scarlet: "Il gèle l’air alentour pour protéger son visage\navec un masque de glace et doter sa crête\ndorsale de lames gelées."
          violet: "Ses pattes et son dos musclés lui permettent\nde faire des sauts périlleux puis d’attaquer ses\nadversaires avec les lames glacées de sa crête."
        it:
          scarlet: "Congela l’aria circostante per proteggere il muso\ncon una maschera di ghiaccio e ricoprire la cresta\ndorsale di lame di ghiaccio."
          violet: "Colpisce il nemico con le lame ghiacciate della\ncresta dorsale facendo una capriola in avanti.\nQuesto attacco richiede gambe molto potenti."
        de:
          scarlet: "Es friert die Luft ringsum ein, um sein Gesicht\nmit einer Maske aus Eis zu schützen und seine\nRückenflosse in Eisklingen zu verwandeln."
          violet: "Seine starken Beine ermöglichen es ihm, einen\nVorwärtssalto zu machen und mit den Klingen\nseiner gefrorenen Rückenflosse anzugreifen."
        es:
          scarlet: "Congela el aire a su alrededor para cubrirse\nel rostro con una máscara de hielo protectora\ny dotar su placa dorsal de cuchillas glaciales."
          violet: "Gracias a su poderoso tren inferior, da saltos\nmortales hacia delante y ataca a sus enemigos\ncon las cuchillas de su placa dorsal."
        ko:
          scarlet: "주변의 공기를 얼려서\n얼음 마스크로 얼굴을 보호하고\n등지느러미를 얼음 검으로 바꾼다."
          violet: "앞으로 공중제비를 돌며\n등지느러미를 얼려서 만든 검으로 공격한다.\n강한 하체를 요구하는 기술이다."
        zh_simp:
          scarlet: "会冻结周围的空气，\n以冰之面罩来保护脸部，\n并将背鳍变为冰剑。"
          violet: "冻住背鳍，并使其形成剑，\n再使出前空翻来攻击对手。\n完成此举需要强健的腰腿。"
        zh_trad:
          scarlet: "凍結周圍的空氣，\n以冰之面罩保護臉部，\n並將背鰭變成冰劍。"
          violet: "會使出前空翻，並利用凍住\n背鰭形成的劍來攻擊對手。\n唯有具備強健的下盤才能練就此功夫。"
