      descriptions:
        jp_kana:
          scarlet: "￹木￺き￻の　￹根本￺ねもと￻で　￹静￺しず￻かに　￹暮￺く￻らす。\n￹新鮮￺しんせん￻な　￹葉￺は￻っぱよりも　￹軟￺やわ￻らかく\nなった　￹落￺お￻ち￹葉￺ば￻を　エサに　￹好￺この￻む。"
          violet: "￹葉￺は￻っぱを　まとって　￹身￺み￻を　￹守￺まも￻る。\n￹空気￺くうき￻の　￹動￺うご￻きを　￹頭￺あたま￻の　￹葉￺は￻で\nキャッチして　￹周囲￺しゅうい￻を　￹探￺さぐ￻る。"
        jp_kanji:
          scarlet: "￹木￺き￻の　￹根本￺ねもと￻で　￹静￺しず￻かに　￹暮￺く￻らす。\n￹新鮮￺しんせん￻な　￹葉￺は￻っぱよりも　￹軟￺やわ￻らかく\nなった　￹落￺お￻ち￹葉￺ば￻を　エサに　￹好￺この￻む。"
          violet: "￹葉￺は￻っぱを　まとって　￹身￺み￻を　￹守￺まも￻る。\n￹空気￺くうき￻の　￹動￺うご￻きを　￹頭￺あたま￻の　￹葉￺は￻で\nキャッチして　￹周囲￺しゅうい￻を　￹探￺さぐ￻る。"
        en:
          scarlet: "Swadloon lives quietly at the feet of trees.\nIt prefers eating fallen leaves that have grown\nsoft rather than fresh ones."
          violet: "Swadloon wraps itself in leaves for protection.\nIt uses the two leaves atop its head to detect air\nmovements and feel out its surroundings."
        fr:
          scarlet: "Il mène une vie paisible près des racines des\narbres et préfère se nourrir de feuilles mortes\net ramollies plutôt que de feuilles fraîches."
          violet: "Il se couvre de feuilles pour se protéger. Celles\nqui sont sur sa tête lui permettent de sonder\nles environs en captant les mouvements de l’air."
        it:
          scarlet: "Vive quietamente ai piedi degli alberi.\nPreferisce nutrirsi di foglie morte perché\npiù morbide rispetto a quelle fresche."
          violet: "Si protegge avvolgendosi nelle foglie. Quelle\nsulla testa gli servono per percepire i movimenti\ndell’aria e sondare così l’area circostante."
        de:
          scarlet: "Es führt ein ruhiges Leben zwischen den Wurzeln\nvon Bäumen. Statt frischen Blättern nimmt es\nlieber weiches herabgefallenes Laub zu sich."
          violet: "Es wickelt sich zum Schutz in Laub und scannt\nseine Umgebung, indem es mit den Blättern\nauf seinem Kopf die Luftbewegungen erfasst."
        es:
          scarlet: "Vive tranquilo junto a las raíces de los árboles.\nPrefiere alimentarse de las hojas caídas y ya\nreblandecidas antes que de hojas frescas."
          violet: "Se protege cubriéndose con hojas. Emplea las\nque tiene en la cabeza para sondear el entorno\ncaptando el movimiento del aire."
        ko:
          scarlet: "나무뿌리에서 조용히 지낸다.\n신선한 잎사귀보다 부드러워진\n낙엽을 먹이로 선호한다."
          violet: "잎사귀를 둘러서 몸을 보호한다.\n공기의 흐름을 머리의 잎으로 감지해서\n주위를 살핀다."
        zh_simp:
          scarlet: "会在树木根部静静生活。\n比起新鲜的叶子，\n更爱吃变软的落叶。"
          violet: "用叶子包裹着身体保护自身。\n能通过头上的叶子感受\n空气的流动来探测周围事物。"
        zh_trad:
          scarlet: "會在樹根旁靜靜生活。\n比起新鮮的葉子，\n牠更愛吃變軟的落葉。"
          violet: "用葉子包裹身體來保護自己。\n能透過頭部的葉子捕捉空氣\n的流動，探測四周的狀況。"
