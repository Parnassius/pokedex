      descriptions:
        jp_kana:
          scarlet: "フレッシュな　￹香￺かお￻りの　￹美味￺おい￻しい\nオイルを　￹分￺わ￻けてくれる。　￹古￺ふる￻くから\n￹人間￺にんげん￻と　￹共存￺きょうぞん￻してきた。"
          violet: "￹日光￺にっこう￻を　￹存分￺ぞんぶん￻に　￹浴￺あ￻びて\n￹頭￺あたま￻の　￹実￺み￻が　￹熟￺じゅく￻してくると\n￹人里￺ひとざと￻を　￹離￺はな￻れ　￹旅￺たび￻に　￹出￺で￻る。"
        jp_kanji:
          scarlet: "フレッシュな　￹香￺かお￻りの　￹美味￺おい￻しい\nオイルを　￹分￺わ￻けてくれる。　￹古￺ふる￻くから\n￹人間￺にんげん￻と　￹共存￺きょうぞん￻してきた。"
          violet: "￹日光￺にっこう￻を　￹存分￺ぞんぶん￻に　￹浴￺あ￻びて\n￹頭￺あたま￻の　￹実￺み￻が　￹熟￺じゅく￻してくると\n￹人里￺ひとざと￻を　￹離￺はな￻れ　￹旅￺たび￻に　￹出￺で￻る。"
        en:
          scarlet: "Dolliv shares its tasty, fresh-scented oil with\nothers. This species has coexisted with humans\nsince times long gone."
          violet: "It basks in the sun to its heart’s content until the\nfruits on its head ripen. After that, Dolliv departs\nfrom human settlements and goes on a journey."
        fr:
          scarlet: "Ce Pokémon partage volontiers son huile fraîche\net délicieuse. Il vit en harmonie avec les êtres\nhumains depuis les temps anciens."
          violet: "Il s’expose au soleil jusqu’à ce que les fruits\nsur sa tête soient mûrs, puis il quitte les zones\nhabitées pour partir à l’aventure."
        it:
          scarlet: "Condivide con gli altri il suo delizioso olio dal\nfresco profumo. Convive con gli esseri umani\nfin da tempi antichi."
          violet: "Si espone alla luce solare e quando i frutti sulla\nsua testa sono maturi si mette in viaggio,\nlasciandosi alle spalle i luoghi abitati dagli umani."
        de:
          scarlet: "Bereitwillig teilt dieses Pokémon sein köstliches,\nfrisch duftendes Öl mit anderen. Seit langer Zeit\nschon lebt es Seite an Seite mit den Menschen."
          violet: "Es badet ausgiebig in der Sonne. Sind die Früchte\nauf seinem Kopf ausgereift, lässt es menschliche\nAnsiedlungen hinter sich und geht auf Reisen."
        es:
          scarlet: "No duda en compartir su delicioso aceite de\nfresco aroma. Convive con los seres humanos\ndesde hace mucho tiempo."
          violet: "Cuando los frutos de su cabeza han madurado\nlo suficiente tras haber estado expuesto al sol,\nabandona los asentamientos humanos."
        ko:
          scarlet: "신선한 향기가 나는\n맛있는 오일을 나눠 준다.\n오래전부터 인간과 공존해 왔다."
          violet: "햇빛을 충분히 쬐어\n머리의 열매가 익으면\n마을을 떠나 여행에 나선다."
        zh_simp:
          scarlet: "乐于分享自己香气新鲜\n又美味可口的油。自古以来\n直至今日都与人类共存。"
          violet: "当头上的果实沐浴了\n充足的阳光而开始成熟时，\n它就会远离人烟，踏上旅途。"
        zh_trad:
          scarlet: "會分享自己香氣新鮮、\n美味可口的油。自古以來\n就與人類共存，直到現在。"
          violet: "當頭上的果實沐浴了\n充分的陽光而開始成熟時，\n就會遠離人煙，踏上旅途。"
