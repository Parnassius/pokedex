      descriptions:
        jp_kana:
          scarlet: "キメ￹細￺こま￻やかな　￹毛皮￺けがわ￻の　￹持￺も￻ち￹主￺ぬし￻。\n￹怒￺おこ￻らせると　どんどん　ふくらみ\nのしかかってくるので　￹注意￺ちゅうい￻。"
          violet: "ふわふわの　￹体毛￺たいもう￻に　￹触￺さわ￻ると\n￹手触￺てざわ￻りが　とても　￹良￺よ￻いので\n￹離￺はな￻れられなくなってしまう。"
        jp_kanji:
          scarlet: "キメ￹細￺こま￻やかな　￹毛皮￺けがわ￻の　￹持￺も￻ち￹主￺ぬし￻。\n￹怒￺おこ￻らせると　どんどん　ふくらみ\nのしかかってくるので　￹注意￺ちゅうい￻。"
          violet: "ふわふわの　￹体毛￺たいもう￻に　￹触￺さわ￻ると\n￹手触￺てざわ￻りが　とても　￹良￺よ￻いので\n￹離￺はな￻れられなくなってしまう。"
        en:
          scarlet: "It has a very fine fur. Take care not to make it\nangry, or it may inflate steadily and hit with a\nbody slam."
          violet: "The rich, fluffy fur that covers its body feels\nso good that anyone who feels it can’t stop\ntouching it."
        fr:
          scarlet: "Il a une très belle fourrure. Mieux vaut éviter\nde le mettre en colère, ou il gonflera avant\nd’attaquer de tout son corps."
          violet: "Sa fourrure est si douce et soyeuse que si\non la caresse, on ne veut ni ne peut s’arrêter."
        it:
          scarlet: "Ha un pelo molto fino. Attenzione a non farlo\nadirare, perché può gonfiarsi e caricare con tutto\nil suo peso."
          violet: "Il suo folto pelo è così morbido che chiunque\nlo tocchi non può fare a meno di continuare\nad accarezzarlo."
        de:
          scarlet: "Es hat sehr feines Fell. Doch Vorsicht: Verärgert\nman Knuddeluff, bläst es sich stark auf und stürzt\nsich mit seinem ganzen Körper auf einen."
          violet: "Sein dichtes, flauschiges Fell fühlt sich so toll an,\ndass man nicht aufhören kann, es anzufassen."
        es:
          scarlet: "Tiene un pelaje muy fino. Se recomienda no\nenfadarlo, o se inflará y golpeará con todo\nsu cuerpo."
          violet: "Es como un peluche suave, tan agradable al\ntacto que, cuando alguien lo toca, no puede\ndejar de acariciarlo."
        ko:
          scarlet: "얇고 고운 털을 지니고 있다.\n화나게 하면 몸을 점점 부풀리며\n덮쳐 오기 때문에 주의가 필요하다."
          violet: "푹신푹신한 털을 만지면\n감촉이 아주 좋아서\n떨어지지 못하게 된다고 한다."
        zh_simp:
          scarlet: "拥有细腻的毛皮。\n注意别惹它生气，否则它\n会不断膨胀并向你压过来。"
          violet: "松松软软的体毛\n触感绝佳，会让人\n一摸就舍不得离手。"
        zh_trad:
          scarlet: "擁有細緻的毛皮。\n小心別惹牠生氣，否則牠會\n不斷膨脹並朝著你壓過來。"
          violet: "膨膨鬆鬆的體毛\n觸感絕佳，會令人\n一摸就捨不得離手。"
