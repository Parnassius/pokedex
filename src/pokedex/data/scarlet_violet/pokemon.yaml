          scarlet: "￹巣穴￺すあな￻に　￹迷￺まよ￻い￹込￺こ￻んだ　ポケモンを\n￹背中￺せなか￻に　￹乗￺の￻せて　￹入￺い￻り￹口￺ぐち￻まで\n￹運￺はこ￻んであげる　￹温厚￺おんこう￻な　￹気質￺きしつ￻。"
          violet: "￹体￺からだ￻の　￹節￺ふし￻の　￹数￺かず￻は\n￹遺伝子￺いでんし￻で　￹決￺き￻まる　ということが\n￹最近￺さいきん￻の　￹研究￺けんきゅう￻によって　￹判明￺はんめい￻した。"
        jp_kanji:
          scarlet: "￹巣穴￺すあな￻に　￹迷￺まよ￻い￹込￺こ￻んだ　ポケモンを\n￹背中￺せなか￻に　￹乗￺の￻せて　￹入￺い￻り￹口￺ぐち￻まで\n￹運￺はこ￻んであげる　￹温厚￺おんこう￻な　￹気質￺きしつ￻。"
          violet: "￹体￺からだ￻の　￹節￺ふし￻の　￹数￺かず￻は\n￹遺伝子￺いでんし￻で　￹決￺き￻まる　ということが\n￹最近￺さいきん￻の　￹研究￺けんきゅう￻によって　￹判明￺はんめい￻した。"
        en:
          scarlet: "The gentle Dudunsparce will put Pokémon\nthat wander into its nest onto its back and\ncarry them to the entrance."
          violet: "A recent study uncovered that the number\nof segments a Dudunsparce’s body has is\ndetermined by the Pokémon’s genes."
        fr:
          scarlet: "D’un caractère doux, il prend sur son dos\nles Pokémon égarés dans son terrier\net il les reconduit jusqu’à la sortie."
          violet: "Une étude récente a démontré que\nle nombre de segments qui composent\nson corps est déterminé par ses gènes."
        it:
          scarlet: "Ha un temperamento docile. Fa salire sul\nsuo dorso i Pokémon che finiscono per sbaglio\nnella sua tana e li riaccompagna all’ingresso."
          violet: "Dalle ultime ricerche è emerso che\nil numero di segmenti del suo corpo\nè determinato a livello genetico."
        de:
          scarlet: "Es hat ein sehr sanftes Gemüt. Pokémon,\ndie sich in sein Nest verirren, trägt es auf\nseinem Rücken zurück zum Eingang."
          violet: "Neue Studien haben ergeben, dass die\nAnzahl seiner Körpersegmente von den\nGenen bestimmt wird."
        es:
          scarlet: "Es de carácter amable. Si un Pokémon se pierde\ny va a parar a su madriguera, deja que monte\nsobre su espalda y lo lleva hasta la entrada."
          violet: "En un estudio reciente se descubrió que\nel número de segmentos de su cuerpo\nestá determinado por su genética."
        ko:
          scarlet: "굴 안을 헤매는 포켓몬을\n등에 태우고 입구까지 데려다주는\n온화한 성질을 지녔다."
          violet: "몸의 마디의 개수가\n유전자에 의해 정해진다는 것이\n최근의 연구를 통해 밝혀졌다."
        zh_simp:
          scarlet: "性情温驯，会让误闯进\n巢穴的宝可梦骑到自己的\n背上，并将其送到入口。"
          violet: "最近的研究发现，\n它的身体会有多少节\n是由基因决定的。"
        zh_trad:
          scarlet: "性格溫馴，會讓誤闖進\n巢穴的寶可夢乘在自己\n的背上，將其送到入口。"
          violet: "最近的研究發現，\n牠的身體會有幾節，\n全是由基因決定的。"
