        jp_kanji:
          scarlet: "￹自由￺じゆう￻に　あごを　￹外￺はず￻せるので\n￹大￺おお￻きな　￹獲物￺えもの￻でも　￹飲￺の￻みこめるが\n￹重￺おも￻くなって　￹動￺うご￻けなくなる。"
          violet: "￹草地￺くさち￻などに　￹多￺おお￻く　￹生息￺せいそく￻する。\n￹舌￺した￻を　チロチロ　させて\nまわりの　￹危険￺きけん￻を　￹感￺かん￻じとる。"
        en:
          scarlet: "It can freely detach its jaw to swallow large\nprey whole. It can become too heavy to move,\nhowever."
          violet: "A very common sight in grasslands and such.\nIt flicks its tongue in and out to sense danger\nin its surroundings."
        fr:
          scarlet: "Sa mâchoire peut se désarticuler.\nIl est ainsi en mesure d’avaler de larges proies,\nmais ce faisant, il devient trop lourd pour bouger."
          violet: "On le croise très souvent dans les hautes herbes.\nIl agite rapidement sa langue pour détecter\nle danger."
        it:
          scarlet: "Può ingoiare grosse prede dislocando\na piacimento la mandibola, ma così facendo\nsi appesantisce e non riesce più a muoversi."
          violet: "Molto comune nelle zone erbose. Rileva\neventuali pericoli tramite i movimenti\nrepentini della lingua."
        de:
          scarlet: "Es hängt seinen Kiefer aus, um selbst größere\nBeute verschlingen zu können. Danach ist es\njedoch zu schwer, um sich zu bewegen."
          violet: "Ein Pokémon, das in hohem Gras weit verbreitet\nist. Es schnellt mit seiner Zunge vor und zurück,\num Gefahr in seiner Umgebung aufzuspüren."
        es:
          scarlet: "Puede desencajar la mandíbula libremente para\nengullir grandes presas, aunque esto le dificulte\nel movimiento por pesar demasiado."
          violet: "Es fácil encontrarlo en praderas y zonas similares.\nA este Pokémon le basta con sacar la lengua para\ndetectar el peligro."
        ko:
          scarlet: "자유롭게 턱을 뺄 수 있어서\n큰 먹이도 삼킬 수 있지만\n무거워져서 움직일 수 없게 된다."
          violet: "풀밭 등에 많이 서식한다.\n혀를 날름거리며\n주위의 위험을 감지한다."
        zh_simp:
          scarlet: "能自由地让颚部脱臼，\n因此很大的猎物也能吞下，\n但会因为变重而无法动弹。"
          violet: "大量栖息在草地等地方。\n会伸出舌头感知周围的危险。"
        zh_trad:
          scarlet: "能夠自由地讓下顎脫臼，因此\n就連體型大的獵物都吞得下去，\n但身體會變笨重而無法動彈。"
          violet: "大量棲息於草地等處。\n會快速顫動吐出的舌頭，\n藉此感知周遭的危險。"
