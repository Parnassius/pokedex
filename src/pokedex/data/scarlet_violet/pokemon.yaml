          violet: "￹非常￺ひじょう￻に　￹気性￺きしょう￻が　￹荒￺あら￻い。\n￹相手￺あいて￻を　￹仕留￺しと￻めるためなら\n￹自分￺じぶん￻が　￹傷￺きず￻つくことも　￹平気￺へいき￻。"
        jp_kanji:
          scarlet: "￹岩￺いわ￻の　たてがみで　￹近￺ちか￻づくものを\n￹切￺き￻りつける。　トレーナーの　￹指示￺しじ￻も\n￹気￺き￻に￹入￺い￻らなければ　￹従￺したが￻わない。"
          violet: "￹非常￺ひじょう￻に　￹気性￺きしょう￻が　￹荒￺あら￻い。\n￹相手￺あいて￻を　￹仕留￺しと￻めるためなら\n￹自分￺じぶん￻が　￹傷￺きず￻つくことも　￹平気￺へいき￻。"
        en:
          scarlet: "This Pokémon uses its rocky mane to slash any\nwho approach. It will even disobey its Trainer\nif it dislikes the orders it was given."
          violet: "This Lycanroc has an extremely vicious\ntemperament. It will happily sustain injuries\nfor the sake of taking down its opponent."
        fr:
          scarlet: "Ce Pokémon tranche de sa crinière rocheuse\nquiconque s’approche un peu trop. Il désobéit\naux ordres qui lui déplaisent."
          violet: "Ce Pokémon particulièrement féroce n’a pas\npeur de se blesser si cela lui permet d’achever\nson adversaire."
        it:
          scarlet: "Taglia con la criniera di rocce chi gli si avvicina.\nDisobbedisce addirittura al suo Allenatore se le\nindicazioni ricevute non sono di suo gradimento."
          violet: "Di indole estremamente aggressiva, non gli\nimporta di ferirsi se ciò gli permette di abbattere\nl’avversario."
        de:
          scarlet: "Mit seiner steinernen Mähne schaltet es jeden\naus, der sich ihm nähert. Den Anweisungen seines\nTrainers folgt es nur, wenn diese ihm zusagen."
          violet: "Es besitzt ein äußerst brutales Temperament.\nUm seine Gegner auszuschalten, nimmt dieses\nPokémon sogar Verletzungen in Kauf."
        es:
          scarlet: "Desgarra a cualquiera que se acerque con su\nmelena de piedra. Si no está de acuerdo con\nlas instrucciones de su Entrenador, las ignora."
          violet: "Es un Pokémon extremadamente violento. No le\nimporta sufrir heridas si eso le permite abatir a\nsu oponente."
        ko:
          scarlet: "바위로 된 갈기로 다가오는 자를\n베어 버린다. 트레이너의 지시도\n마음에 안 들면 따르지 않는다."
          violet: "매우 성질이 사납다.\n상대를 처리할 수만 있다면\n자신이 다치는 것도 아랑곳 않는다."
        zh_simp:
          scarlet: "会用岩石鬃毛斩断接近者。\n只要不合它意，那么就算是\n训练家的指示也不会顺从。"
          violet: "性情十分粗暴。\n只要是为了解决掉对手，\n就算会伤害到自己也无所谓。"
        zh_trad:
          scarlet: "會用岩石鬃毛斬斷接近者。\n只要不合自己的意，即使是\n訓練家下的指示也不會順從。"
          violet: "性情非常地粗暴。\n只要是為了解決掉對手，\n就算傷害自己也在所不辭。"
    lycanroc_dusk_form:
      form_id: 2
      names:
        jp_kana: たそがれのすがた
        jp_kanji: たそがれのすがた
        en: Dusk Form
        fr: Forme Crépusculaire
        it: Forma Crepuscolo
        de: Zwielichtform
        es: Forma Crepuscular
        ko: 황혼의 모습
        zh_simp: 黄昏的样子
        zh_trad: 黃昏的樣子
      base_stats:
        hp: 75
        attack: 117
        defense: 65
        special_attack: 55
        special_defense: 65
        speed: 110
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - rock
      egg_groups:
        - field
      abilities:
        - tough_claws
      descriptions:
        jp_kana:
          scarlet: "￹普段￺ふだん￻は　￹吠￺ほ￻えることも　ないが\nひとたび　￹戦￺たたか￻いに　なると\n￹容赦￺ようしゃ￻なく　￹相手￺あいて￻を　￹追￺お￻いつめる。"
          violet: "￹冷静￺れいせい￻　かつ　￹獰猛￺どうもう￻な　￹気質￺きしつ￻。\nこの￹姿￺すがた￻の　ルガルガンが　もっとも\n￹育成￺いくせい￻に　￹手間取￺てまど￻ると　￹言￺い￻われる。"
        jp_kanji:
          scarlet: "￹普段￺ふだん￻は　￹吠￺ほ￻えることも　ないが\nひとたび　￹戦￺たたか￻いに　なると\n￹容赦￺ようしゃ￻なく　￹相手￺あいて￻を　￹追￺お￻いつめる。"
          violet: "￹冷静￺れいせい￻　かつ　￹獰猛￺どうもう￻な　￹気質￺きしつ￻。\nこの￹姿￺すがた￻の　ルガルガンが　もっとも\n￹育成￺いくせい￻に　￹手間取￺てまど￻ると　￹言￺い￻われる。"
        en:
          scarlet: "Normally this Pokémon doesn’t even bark, but\nonce it enters battle, it will relentlessly drive the\nopponent into a corner."
          violet: "These Pokémon have both calm and ferocious\nqualities. It’s said that this form of Lycanroc is\nthe most troublesome to raise."
        fr:
          scarlet: "D’ordinaire, ce Pokémon n’aboie même pas,\nmais en combat, il est impitoyable et pousse ses\nadversaires dans leurs derniers retranchements."
          violet: "Ce Pokémon est tout aussi réfléchi que féroce.\nOn dit que cette forme de Lougaroc est la plus\ndifficile à élever."
        it:
          scarlet: "In genere non ulula nemmeno. Una volta che\ninizia a lottare, dà la caccia all’avversario senza\nalcuna pietà."
          violet: "Ha un temperamento controllato ma feroce.\nSi dice che i Lycanroc di questa forma siano\ni più impegnativi da allenare."
        de:
          scarlet: "Für gewöhnlich knurrt es nicht einmal, doch wenn\nes zu einem Kampf kommt, treibt dieses Pokémon\nseine Gegner erbarmungslos in die Enge."
          violet: "Es kann sowohl ruhig als auch ungestüm sein.\nMan sagt, diese Form von Wolwerock sei am\nschwierigsten zu trainieren."
        es:
          scarlet: "Por lo general, ni siquiera ladra, pero,\nen cuanto entra en combate, acorrala a\nsu rival sin ningún tipo de contemplación."
          violet: "Un Pokémon tranquilo y agresivo por igual.\nDicen que los Lycanroc que presentan esta\nforma son los más difíciles de criar."
        ko:
          scarlet: "평소에는 잘 짖지도 않지만\n일단 싸우기 시작하면\n자비 없이 상대를 몰아붙인다."
          violet: "냉정하면서도 사나운 성질을 가졌다.\n이 모습의 루가루암이\n가장 육성하기 까다로운 것으로 전해진다."
        zh_simp:
          scarlet: "虽然平时不会吼叫，\n但一旦进入战斗状态，就会\n毫不留情地将对手逼到绝境。"
          violet: "性情冷静又凶猛。\n据说这个样子的鬃岩狼人\n培育起来最费工夫。"
        zh_trad:
          scarlet: "雖然平時不會發出吼叫聲，\n但一旦進入戰鬥模式，就會\n毫不留情地將對手逼到絕境。"
          violet: "性情冷靜且凶猛。\n據說這個樣子的鬃岩狼人\n培育起來最費工夫。"
mareanie:
  species_id: 747
  names:
    jp_kana: ヒドイデ
    jp_kanji: ヒドイデ
    en: Mareanie
    fr: Vorastérie
    it: Mareanie
    de: Garstella
