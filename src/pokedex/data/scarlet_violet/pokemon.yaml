          violet: "￹両手￺りょうて￻の　ツメを　￹重￺かさ￻ね￹合￺あ￻わせて\n￹体￺からだ￻を　￹高速￺こうそく￻　￹回転￺かいてん￻させると\n￹猛￺もう￻スピードで　￹地中￺ちちゅう￻を　￹進￺すす￻む。"
        jp_kanji:
          scarlet: "￹地中￺ちちゅう￻を　￹掘￺ほ￻り￹進￺すす￻む　スピードは\n￹時速￺じそく￻５０キロ￹以上￺いじょう￻。　￹地上￺ちじょう￻を　￹走￺はし￻る\n￹自動車￺じどうしゃ￻と　いい￹勝負￺しょうぶ￻。"
          violet: "￹両手￺りょうて￻の　ツメを　￹重￺かさ￻ね￹合￺あ￻わせて\n￹体￺からだ￻を　￹高速￺こうそく￻　￹回転￺かいてん￻させると\n￹猛￺もう￻スピードで　￹地中￺ちちゅう￻を　￹進￺すす￻む。"
        en:
          scarlet: "It can dig through the ground at a speed of\n30 mph. It could give a car running aboveground\na good race."
          violet: "It makes its way swiftly through the soil by putting\nboth claws together and rotating at high speed."
        fr:
          scarlet: "Ce Pokémon peut se déplacer sous terre en\ncreusant à plus de 50 km/h. Il parvient à rivaliser\navec la vitesse d’une voiture roulant à la surface."
          violet: "Il se déplace rapidement sous terre en joignant\nses griffes et en tourbillonnant sur lui-même\nà grande vitesse."
        it:
          scarlet: "Avanza sottoterra a una velocità di oltre\n50 km/h, abbastanza da poter competere\ncon un’auto che circola in superficie."
          violet: "Congiunge le unghie e, avvitandosi su se stesso\na gran velocità, si fa strada nel sottosuolo rapido\ncome un lampo."
        de:
          scarlet: "Es gräbt sich mit über 50 km/h durch das\nErdreich und kann beinahe schon mit den\nAutos an der Oberfläche Schritt halten."
          violet: "Es führt seine beiden Klauen zusammen, dreht\nsich rasend schnell um die eigene Achse und\ngräbt sich ratzfatz durch das Erdreich."
        es:
          scarlet: "Es capaz de cavar bajo tierra a más de 50 km/h.\nCasi podría seguirle el ritmo a un coche que\ncircule por la superficie."
          violet: "Puede desplazarse bajo tierra muy velozmente\nal juntar las garras y hacer rotar su cuerpo a una\nvelocidad frenética."
        ko:
          scarlet: "시속 50km 이상의 스피드로\n땅속을 헤쳐 나간다.\n지상을 달리는 자동차와 견줄 만하다."
          violet: "양손의 손톱을 서로 겹치고\n몸을 고속 회전시키면서\n맹렬한 속도로 땅속을 헤쳐 나간다."
        zh_simp:
          scarlet: "在地底挖掘前进的速度\n高达时速５０公里以上，能和\n在地上行驶的汽车一决高下。"
          violet: "将双掌上的爪子并拢，\n并让身体高速旋转的话，\n就会以迅猛的速度在地里前进。"
        zh_trad:
          scarlet: "在地底挖掘前進的速度能達\n時速５０公里以上，足以和\n在地上行駛的車子並駕齊驅。"
          violet: "只要將兩手的爪子疊在一起，\n並高速旋轉身體，\n便能以驚人的速度在地底前進。"
excadrill:
