      descriptions:
        jp_kana:
          scarlet: "￹木￺き￻の￹上￺うえ￻で　￹群￺む￻れをつくって　￹暮￺く￻らす。\n￹群￺む￻れから　はぐれた　マンキーは\n￹寂￺さび￻しくて　すぐに　￹怒￺おこ￻りだす。"
          violet: "￹普段￺ふだん￻は　￹機嫌￺きげん￻が　￹良￺よ￻くても\nちょっとしたことで　いきなり\n￹暴￺あば￻れだすから　￹怖￺こわ￻いのだ。"
        jp_kanji:
          scarlet: "￹木￺き￻の￹上￺うえ￻で　￹群￺む￻れをつくって　￹暮￺く￻らす。\n￹群￺む￻れから　はぐれた　マンキーは\n￹寂￺さび￻しくて　すぐに　￹怒￺おこ￻りだす。"
          violet: "￹普段￺ふだん￻は　￹機嫌￺きげん￻が　￹良￺よ￻くても\nちょっとしたことで　いきなり\n￹暴￺あば￻れだすから　￹怖￺こわ￻いのだ。"
        en:
          scarlet: "It lives in groups in the treetops. If it loses sight of\nits group, it becomes infuriated by its loneliness."
          violet: "It is extremely quick to anger. It could be\ndocile one moment, then thrashing away\nthe next instant."
        fr:
          scarlet: "Il vit en groupe au sommet des arbres. S’il perd\nses congénères de vue, la solitude le rend furieux."
          violet: "Il se met en colère très facilement. Même quand\nil est calme, son humeur peut changer d’une\nseconde à l’autre."
        it:
          scarlet: "Vivono in branchi in cima agli alberi.\nSe perdono il contatto con il gruppo\ns’infuriano per la solitudine."
          violet: "Anche quando è di buon umore, solitamente\npuò abbandonarsi all’ira da un momento\nall’altro per un nonnulla."
        de:
          scarlet: "Es lebt mit Artgenossen in Baumkronen. Verliert\nes sie aus den Augen, wird es vor Einsamkeit\nsofort zornig."
          violet: "Auch wenn es guter Stimmung ist, kann es wegen\neiner Kleinigkeit plötzlich ausrasten und ist daher\ngefürchtet."
        es:
          scarlet: "Vive en grupos en las copas de los árboles.\nSi pierde de vista a su manada, se siente solo\ny se enfada."
          violet: "Da miedo porque, aunque habitualmente se\nmuestra tranquilo, monta en cólera al instante\npor la menor nimiedad."
        ko:
          scarlet: "나무 위에 무리 지어 산다.\n무리에서 떨어진 망키는\n외로운 나머지 금방 화를 낸다."
          violet: "평소에는 기분이 좋다가도\n사소한 일로 갑자기\n날뛰기 때문에 무섭다."
        zh_simp:
          scarlet: "在树上群居的宝可梦。\n和伙伴分散的猴怪会因\n寂寞而动不动就生气。"
          violet: "平时就算心情再怎么好，\n也会因为一点小事\n就突然暴怒，十分可怕。"
        zh_trad:
          scarlet: "在樹上群居的寶可夢。\n和夥伴走散的猴怪會因為\n按捺不住寂寞而動不動就生氣。"
          violet: "平時就算心情再怎麼好，\n也會因為一點芝麻小事\n而突然暴怒，令人害怕。"
