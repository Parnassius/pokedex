          violet: "￹雷鳴￺らいめい￻を　￹聞￺き￻くと　￹群￺む￻れの　シママが\n￹雷￺かみなり￻から　￹充電￺じゅうでん￻できるように\n￹群￺む￻れで　￹雷雲￺かみなりぐも￻を　￹追￺お￻いかける。"
        jp_kanji:
          scarlet: "￹気性￺きしょう￻が　￹荒￺あら￻く　￹攻撃的￺こうげきてき￻。\n￹興奮￺こうふん￻すると　たてがみを　￹黄色￺きいろ￻く\n￹輝￺かがや￻かせて　￹電撃￺でんげき￻を　￹放￺はな￻つ。"
          violet: "￹雷鳴￺らいめい￻を　￹聞￺き￻くと　￹群￺む￻れの　シママが\n￹雷￺かみなり￻から　￹充電￺じゅうでん￻できるように\n￹群￺む￻れで　￹雷雲￺かみなりぐも￻を　￹追￺お￻いかける。"
        en:
          scarlet: "This Pokémon is aggressive and has a volatile\ndisposition. When agitated, it will illuminate its\nmane in yellow and fire off bolts of electricity."
          violet: "Once the herd hears thunder, it chases after the\nstorm clouds so that the Blitzle in the group can\nuse the lightning to charge up."
        fr:
          scarlet: "Il est sauvage et violent de nature. Quand\nil s’agite, sa crinière émet une lueur jaune\net lance des éclairs."
          violet: "Lorsqu’ils entendent le tonnerre, ils courent après\nles nuages orageux en troupeau. Les Zébibron\nparmi eux se rechargent ainsi grâce à la foudre."
        it:
          scarlet: "Ha un temperamento impetuoso e aggressivo.\nQuando è agitato, fa brillare la criniera di giallo\ned emette scariche elettriche."
          violet: "Quando sentono il rombo di un tuono, seguono\nin gruppo le nubi temporalesche per permettere\nai Blitzle della mandria di caricarsi di elettricità."
        de:
          scarlet: "Dieses Pokémon hat ein angriffslustiges und\nwildes Gemüt. Ist es gereizt, lässt es seine Mähne\ngelb aufleuchten und feuert Stromsalven ab."
          violet: "Hören sie Donnergrollen, jagen sie in der Herde\nden Gewitterwolken hinterher, damit die Elezeba\nin ihren Reihen daraus Strom tanken können."
        es:
          scarlet: "Posee un temperamento salvaje y agresivo.\nCuando se solivianta, su crin desprende un\nfulgor dorado y lanza rayos."
          violet: "Cuando oyen un trueno, corren en tropel tras\nlos nubarrones para que los Blitzle de la manada\npuedan recargarse de electricidad con los rayos."
        ko:
          scarlet: "성질이 사납고 공격적이다.\n흥분하면 갈기를 노랗게 빛내며\n전격을 방출한다."
          violet: "우렛소리를 들으면 무리의 줄뮤마가\n벼락을 통해 충전할 수 있게\n무리 지어 뇌운을 뒤쫓는다."
        zh_simp:
          scarlet: "性格暴躁充满攻击性。\n兴奋起来时，就会让鬃毛\n亮起黄色光芒并放出电击。"
          violet: "一旦听到雷鸣声，就会为了让\n群体中的斑斑马能通过雷电充电\n而成群地追赶雷雨云。"
        zh_trad:
          scarlet: "性情暴躁且充滿攻擊性。\n興奮起來時會讓鬃毛發出\n黃色的光芒，釋放出電擊。"
          violet: "為了讓群體裡的斑斑馬能\n透過雷電充電，只要一聽到\n雷鳴聲，就會成群追趕雷雲。"
