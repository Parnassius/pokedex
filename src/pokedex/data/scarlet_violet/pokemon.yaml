          scarlet: "￹尻尾￺しっぽ￻の　￹炎￺ほのお￻の　￹勢￺いきお￻いを\nうまく　コントロールして\n￹自分￺じぶん￻の　￹得意￺とくい￻な　￹間合￺まあ￻いで　￹戦￺たたか￻うのだ。"
          violet: "￹尻尾￺しっぽ￻の　￹炎￺ほのお￻の　￹大￺おお￻きさと\n￹青￺あお￻い　くまどりが　￹鮮￺あざ￻やかなほど\n￹群￺む￻れの￹中￺なか￻で　￹地位￺ちい￻が　￹高￺たか￻いのだ。"
        jp_kanji:
          scarlet: "￹尻尾￺しっぽ￻の　￹炎￺ほのお￻の　￹勢￺いきお￻いを\nうまく　コントロールして\n￹自分￺じぶん￻の　￹得意￺とくい￻な　￹間合￺まあ￻いで　￹戦￺たたか￻うのだ。"
          violet: "￹尻尾￺しっぽ￻の　￹炎￺ほのお￻の　￹大￺おお￻きさと\n￹青￺あお￻い　くまどりが　￹鮮￺あざ￻やかなほど\n￹群￺む￻れの￹中￺なか￻で　￹地位￺ちい￻が　￹高￺たか￻いのだ。"
        en:
          scarlet: "It skillfully controls the intensity of the fire on its\ntail to keep its foes at an ideal distance."
          violet: "A bigger fire on its tail and a brighter blue\npattern on its face means it holds a higher\nrank in its troop."
        fr:
          scarlet: "Il contrôle habilement l’intensité de la flamme\nde sa queue pour maintenir une distance idéale\nentre lui et ses adversaires lors des combats."
          violet: "Plus la flamme de sa queue est grande et les\nmarques bleues sur son visage sont accentuées,\nplus son rang est élevé dans son groupe."
        it:
          scarlet: "Controlla abilmente l’intensità delle fiamme sulla\nsua coda per tenere i nemici alla distanza ideale."
          violet: "La grandezza della fiamma sulla coda e l’intensità\ndelle sfumature azzurre sulla faccia determinano\nil suo rango nel branco."
        de:
          scarlet: "Es kontrolliert die Stärke des Feuers an seinem\nSchweif geschickt, um Gegner auf idealer\nDistanz zu halten."
          violet: "Je intensiver das Blau seiner Gesichtszeichnung\nund je größer das Feuer an seinem Schweif,\ndesto höher ist sein Rang in der Gruppe."
        es:
          scarlet: "Controla hábilmente la intensidad del fuego\nde la cola para mantener al enemigo a una\ndistancia ideal."
          violet: "Cuanto más grande sea la llama de su cola y\nmás vivo el azul de su cara, más peso tiene en\nel grupo."
        ko:
          scarlet: "꼬리의 불꽃 세기를\n잘 컨트롤하여 자신에게\n맞는 거리를 두고 싸운다."
          violet: "꼬리의 불꽃 크기와\n파란 얼굴 무늬가 선명할수록\n무리에서 지위가 높다."
        zh_simp:
          scarlet: "能熟练控制尾部火焰的大小，\n以自己擅长的距离进行战斗。"
          violet: "尾巴上的火焰越大，\n蓝色脸谱的色泽越鲜艳，\n在群体中的地位就越高。"
        zh_trad:
          scarlet: "能熟練地控制尾部火焰的火勢，\n以自己擅長的距離進行戰鬥。"
          violet: "尾巴上的火焰越大\n且藍色臉譜越鮮豔的猛火猴，\n在群體中的地位就越高。"
