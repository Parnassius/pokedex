      descriptions:
        jp_kana:
          scarlet: "￹気位￺きぐらい￻が　￹高￺たか￻く　￹攻撃的￺こうげきてき￻だが\nヘタの　￹冠￺かんむり￻に　￹触￺さわ￻られると\nたちまち　￹大人￺おとな￻しくなるという。"
          violet: "すらりと　￹伸￺の￻びた　￹脚￺あし￻から　￹優雅￺ゆうが￻で\n￹苛烈￺かれつ￻な　￹蹴￺け￻り￹技￺わざ￻を　お￹見舞￺みま￻いする。\nウェーニバルを　￹敵視￺てきし￻している。"
        jp_kanji:
          scarlet: "￹気位￺きぐらい￻が　￹高￺たか￻く　￹攻撃的￺こうげきてき￻だが\nヘタの　￹冠￺かんむり￻に　￹触￺さわ￻られると\nたちまち　￹大人￺おとな￻しくなるという。"
          violet: "すらりと　￹伸￺の￻びた　￹脚￺あし￻から　￹優雅￺ゆうが￻で\n￹苛烈￺かれつ￻な　￹蹴￺け￻り￹技￺わざ￻を　お￹見舞￺みま￻いする。\nウェーニバルを　￹敵視￺てきし￻している。"
        en:
          scarlet: "This Pokémon is proud and aggressive. However,\nit is said that a Tsareena will instantly become\ncalm if someone touches the crown on its calyx."
          violet: "This Pokémon launches fierce yet elegant kicks\nwith its long, slender legs. It views Quaquaval as\nits rival."
        fr:
          scarlet: "Ce Pokémon est aussi fier qu’agressif. On dit\nnéanmoins qu’il se calme instantanément quand\non touche la couronne sur sa tête."
          violet: "Avec ses longues jambes, ce Pokémon donne\ndes coups de pied aussi puissants qu’élégants.\nIl considère Palmaval comme un rival."
        it:
          scarlet: "È un Pokémon aggressivo e orgoglioso, ma si\ndice che sia sufficiente toccare la coroncina\nche ha sul calice per farlo calmare."
          violet: "Usa le sue gambe lunghe e snelle per sferrare\ncalci tanto potenti quanto eleganti. Considera\ni Quaquaval suoi rivali."
        de:
          scarlet: "Zwar ist es stolz und aggressiv, aber wenn man\nseine Krone berührt, soll es sich augenblicklich\nberuhigen."
          violet: "Mit seinen langen Beinen verteilt es anmutige,\ndoch zugleich auch unerbittliche Tritte. Zwischen\nihm und Bailonda herrscht große Rivalität."
        es:
          scarlet: "Es un Pokémon muy orgulloso y agresivo.\nSin embargo, se dice que, si se le toca la corona\ndel cáliz, se tranquiliza de inmediato."
          violet: "Con sus esbeltas piernas propina unas patadas\ntan elegantes como brutales. Siente cierta\nrivalidad hacia Quaquaval."
        ko:
          scarlet: "자존심이 강하고 공격적이지만\n꼭지의 왕관을 건드리면\n금세 얌전해진다고 한다."
          violet: "늘씬하게 뻗은 다리로 우아하면서도\n맹렬한 발차기 기술을 선보인다.\n웨이니발을 적으로 여기고 있다."
        zh_simp:
          scarlet: "虽然性情高傲且具有攻击性，\n但据说只要摸摸它果蒂的冠，\n它就会立刻变得很温顺。"
          violet: "用苗条的双腿施展\n优雅而猛烈的踢技。\n敌视狂欢浪舞鸭。"
        zh_trad:
          scarlet: "雖然性情高傲且攻擊性強，\n但據說只要摸摸牠果蒂的冠，\n牠立刻會變得很溫順。"
          violet: "會用苗條的雙腿使出優雅\n而猛烈的踢技招呼對手。\n對狂歡浪舞鴨採敵視的態度。"
