          violet: "￹鼻￺はな￻で　ふくらませる　バルーンは\n￹日々￺ひび￻　￹練習￺れんしゅう￻を　￹重￺かさ￻ねることで\n￹少￺すこ￻しずつ　￹大￺おお￻きく　なっていく。"
        jp_kanji:
          scarlet: "￹水￺みず￻の　バルーンを　￹操￺あやつ￻る。\n￹大￺おお￻きな　バルーンを　￹作￺つく￻るため\nコツコツ　￹練習￺れんしゅう￻を　￹繰￺く￻り￹返￺かえ￻す。"
          violet: "￹鼻￺はな￻で　ふくらませる　バルーンは\n￹日々￺ひび￻　￹練習￺れんしゅう￻を　￹重￺かさ￻ねることで\n￹少￺すこ￻しずつ　￹大￺おお￻きく　なっていく。"
        en:
          scarlet: "This Pokémon can control balloons made of\nwater. It practices diligently so it can learn to\nmake big balloons."
          violet: "The balloons it inflates with its nose grow larger\nand larger as it practices day by day."
        fr:
          scarlet: "Otaquin peut contrôler les ballons d’eau\nqu’il crée. Il n’arrive à produire un gros ballon\nqu’après avoir suivi un entraînement rigoureux."
          violet: "Grâce à son entraînement quotidien,\nles ballons qu’il gonfle avec son nez\nsont de plus en plus gros."
        it:
          scarlet: "Controlla palloncini d’acqua e si allena\ncostantemente per riuscire a produrne\ndi grandi dimensioni."
          violet: "Grazie all’allenamento quotidiano, i palloncini\nche gonfia con il naso diventano a poco a poco\nsempre più grandi."
        de:
          scarlet: "Es kontrolliert Wasserblasen. Um eine große\nBlase zu erschaffen, muss es unermüdlich üben."
          violet: "Dank seines täglichen Trainings gelingt es ihm,\nmit seiner Nase immer größere Blasen zu\nerzeugen."
        es:
          scarlet: "Maneja con soltura los globos de agua que crea.\nPara poder hacer globos más grandes, necesita\npracticar sin descanso."
          violet: "Gracias al entrenamiento diario al que se\nsomete, es capaz de inflar globos cada vez\nmás grandes a través de la nariz."
        ko:
          scarlet: "물로 된 풍선을 조종한다.\n커다란 풍선을 만들기 위해\n꾸준히 연습을 반복한다."
          violet: "코로 부풀리는 벌룬은\n매일 연습을 반복하면서\n조금씩 커진다."
        zh_simp:
          scarlet: "操纵水做的气球。\n为了制作大大的球，\n孜孜不倦地反复练习。"
          violet: "通过每天不断地重复练习，\n用鼻子吹起来的气球\n一点点地变大起来。"
        zh_trad:
          scarlet: "操縱水做的氣球。\n為了製造大大的氣球，\n孜孜不倦地反復練習。"
          violet: "靠著每天不斷地練習，\n用鼻子吹出的氣球\n會一點一滴地漸漸變大。"
