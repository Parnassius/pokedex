        jp_kanji:
          scarlet: "￹海￺うみ￻に　￹漂￺ただよ￻う　￹藻屑￺もくず￻に　￹紛￺まぎ￻れて\n￹敵￺てき￻の　￹目￺め￻を　ごまかす。　￹腐￺くさ￻った\n￹海藻￺かいそう￻を　￹食￺た￻べて　￹毒￺どく￻を　￹作￺つく￻る。"
          violet: "￹泳￺およ￻ぎは　￹苦手￺にがて￻。　ひどい　￹嵐￺あらし￻に\n￹巻￺ま￻きこまれると　￹遠￺とお￻くまで　￹流￺なが￻され\n￹棲￺す￻み￹処￺か￻に　￹戻￺もど￻れなくなることもある。"
        en:
          scarlet: "Skrelp evades its enemies by hiding amid\ndrifting seaweed. It eats rotten seaweed to\ncreate its poison."
          violet: "This Pokémon is a poor swimmer. If it’s caught in\na fierce storm, it will sometimes get washed far\naway and become unable to return to its home."
        fr:
          scarlet: "Il dissimule sa présence en se mêlant aux algues\nqui flottent à la surface et mange celles qui sont\nen décomposition pour en faire du poison."
          violet: "La nage n’est pas son fort. S’il est pris dans une\ntempête, il peut être emporté au loin et ne pas\nréussir à rejoindre son habitat d’origine."
        it:
          scarlet: "Galleggia nel mare fra le alghe fluttuanti per\nnascondersi agli occhi dei nemici. Genera il suo\nveleno divorando alghe putrefatte."
          violet: "Non è molto abile a nuotare. A volte viene\ntrascinato lontano da una tempesta e non\nriesce più a far ritorno a casa."
        de:
          scarlet: "Algitt versteckt sich zwischen im Meer treibenden\nAlgen vor Feinden. Es frisst verfaulten Seetang,\num Gift herzustellen."
          violet: "Es ist ein miserabler Schwimmer. Gerät es in einen\nheftigen Sturm und wird weit weggespült, kann es\nmitunter nicht mehr nach Hause zurückkehren."
        es:
          scarlet: "Se oculta de sus enemigos mezclándose con las\nalgas que flotan a la deriva. Elabora su veneno\na partir de las algas podridas que ingiere."
          violet: "Es un pésimo nadador. Algunos ejemplares han\nsido incluso incapaces de volver a su hogar tras\nser arrastrados lejos por una intensa tormenta."
        ko:
          scarlet: "바다에 떠 있는 해초에 섞여서\n적의 눈을 속인다.\n썩은 해초를 먹어서 독을 만든다."
          violet: "헤엄치는 것이 서툴다.\n강한 폭풍에 휘말리면 먼 곳까지 떠내려가서\n보금자리로 돌아가지 못하는 경우도 있다."
        zh_simp:
          scarlet: "混进漂于海上的碎藻里，\n以此来避开敌方的耳目。\n吃下腐坏的海藻后就能制造出毒素。"
          violet: "不擅长游泳。一旦被卷进\n狂风暴雨里，就有可能\n被冲到远处而无法回家。"
        zh_trad:
          scarlet: "會把自己混進海上飄蕩的\n海藻屑裡以避開敵人的耳目。\n吃下腐爛的海藻後便能製造毒素。"
          violet: "不擅長游泳。一旦被捲進\n狂風暴雨裡，就有可能\n被沖到遠處而無法歸巢。"
