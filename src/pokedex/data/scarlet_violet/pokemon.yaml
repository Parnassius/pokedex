          violet: "￹少￺すこ￻しの　￹刺激￺しげき￻に　￹反応￺はんのう￻して\n￹爆発￺ばくはつ￻する。　バクダンボールという\nあだ￹名￺な￻で　￹怖￺こわ￻がられている。"
        jp_kanji:
          scarlet: "￹電気￺でんき￻エネルギーを　￹溜￺た￻めこむほど\n￹高速￺こうそく￻で　￹動￺うご￻けるようになるが\nそのぶん　￹爆発￺ばくはつ￻　しやすい。"
          violet: "￹少￺すこ￻しの　￹刺激￺しげき￻に　￹反応￺はんのう￻して\n￹爆発￺ばくはつ￻する。　バクダンボールという\nあだ￹名￺な￻で　￹怖￺こわ￻がられている。"
        en:
          scarlet: "The more energy it charges up, the faster\nit gets. But this also makes it more likely\nto explode."
          violet: "It explodes in response to even minor stimuli.\nIt is feared, with the nickname of the Bomb Ball."
        fr:
          scarlet: "Plus il accumule de l’énergie de type Électrik,\nplus il est rapide. Mais il a aussi davantage\nde chances d’exploser."
          violet: "Il explose au moindre choc. Son surnom,\n« Bombe Ball », suffit à effrayer ses adversaires."
        it:
          scarlet: "L’energia Elettro che immagazzina lo fa\nandare sempre più veloce, ma lo fa anche\nesplodere più facilmente."
          violet: "Può esplodere al minimo urto. Temuto\nda tutti, è conosciuto con il nomignolo\ndi \"Bomba Ball\"."
        de:
          scarlet: "Je mehr elektrische Energie es speichert, desto\nschneller ist es. Allerdings steigt dabei auch das\nRisiko, dass es explodiert."
          violet: "Es explodiert schon bei kleinsten Reizen und\nist unter dem Spitznamen „Bombenkugel“\ngefürchtet."
        es:
          scarlet: "Cuanta más energía almacena, mayor\nvelocidad alcanza, aunque aumenta\ntambién el riesgo de que explote."
          violet: "Como explotan a la mínima, se les tiene\nmucho miedo. Reciben el mote de Bomba\nBall."
        ko:
          scarlet: "전기 에너지를 모을수록\n고속으로 이동할 수 있게 되나\n그만큼 폭발하기도 쉬워진다."
          violet: "작은 자극에도 반응해서 폭발한다.\n폭탄볼이라 불리며\n두려움의 대상이 되고 있다."
        zh_simp:
          scarlet: "虽然存储的电能越多\n就越是能够高速移动，\n但同时也会更容易爆炸。"
          violet: "稍微受点刺激就会爆炸。\n有着炸弹球的外号\n而令人恐惧。"
        zh_trad:
          scarlet: "雖然儲存的電能越多，\n移動的速度也會變得越快，\n但同時也會變得更容易爆炸。"
          violet: "稍微受點刺激就會爆炸，\n因此得到了炸彈球的外號，\n被人們深深恐懼。"
