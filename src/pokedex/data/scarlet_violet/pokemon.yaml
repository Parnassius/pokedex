        jp_kanji:
          scarlet: "￹自分￺じぶん￻より ￹強￺つよ￻くて ￹大￺おお￻きな ￹相手￺あいて￻にも\n￹恐￺おそ￻れずに ￹立￺た￻ち￹向￺む￻かう\n￹勇敢￺ゆうかん￻で ￹頼￺たの￻もしい ￹性格￺せいかく￻。"
          violet: "￹人懐￺ひとなつ￻こく　￹誠実￺せいじつ￻な　￹性格￺せいかく￻。\n￹敵￺てき￻には　ほえて　かみつき\n￹追￺お￻い￹払￺はら￻おうとする。"
        en:
          scarlet: "It has a brave and trustworthy nature. It fearlessly\nstands up to bigger and stronger foes."
          violet: "It’s very friendly and faithful to people. It will try\nto repel enemies by barking and biting."
        fr:
          scarlet: "Courageux et fidèle, il se dresse vaillamment\ndevant ses ennemis même s’ils sont plus\npuissants que lui."
          violet: "Ce Pokémon est particulièrement affectueux\net loyal. Il aboie et mord pour se débarrasser\nde ses adversaires."
        it:
          scarlet: "Coraggioso e affidabile, si oppone senza paura\nanche a nemici più grandi e forti di lui."
          violet: "È un Pokémon molto socievole e fedele.\nAllontana i nemici abbaiando e mordendoli."
        de:
          scarlet: "Es ist von Natur aus tapfer und vertrauenswürdig\nund scheut auch vor Gegnern nicht zurück,\ndie größer und stärker sind als es selbst."
          violet: "Es ist sehr freundlich und treu. Durch Bellen und\nBeißen versucht es, Feinde zu verscheuchen."
        es:
          scarlet: "De naturaleza valiente y honrada, se enfrenta sin\nmiedo a enemigos más grandes y fuertes."
          violet: "Un Pokémon afectuoso y leal por naturaleza.\nPara ahuyentar al enemigo, se pone a ladrar\ny a dar bocados."
        ko:
          scarlet: "자신보다 강하고\n큰 상대라도 겁 없이 맞서는\n용감하고 믿음직스런 성격이다."
          violet: "사람을 잘 따르는 충실한 성격이다.\n적을 보면 짖거나 물어서\n쫓아내려고 한다."
        zh_simp:
          scarlet: "能毫无畏惧地去对抗\n比自己更强更大的对手。\n性格勇敢非常可靠。"
          violet: "性格诚实，容易和人亲近。\n对于敌人，它会吼叫追咬，\n并试着把其赶跑。"
        zh_trad:
          scarlet: "能毫不畏懼地去對抗\n比自己更強更大的對手。\n性格非常勇敢可靠。"
          violet: "性格誠實，容易和人親近。\n遇到敵人時牠會吼叫追咬，\n試著把敵人趕走。"
