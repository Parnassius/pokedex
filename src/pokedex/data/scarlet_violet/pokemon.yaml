          scarlet: "￹水￺みず￻を　￹飲￺の￻みこみはじめたら　￹危険￺きけん￻。\n￹全身￺ぜんしん￻に　￹生￺は￻えている　￹毒針￺どくばり￻を\nまき￹散￺ち￻らし　￹襲￺おそ￻いかかってくる。"
          violet: "￹毒針￺どくばり￻を　￹撃￺う￻ち￹出￺だ￻した　￹直後￺ちょくご￻の\n￹無防備￺むぼうび￻な　￹状態￺じょうたい￻を　￹狙￺ねら￻うと\nベテランの　￹漁師￺りょうし￻は　￹語￺かた￻る。"
        jp_kanji:
          scarlet: "￹水￺みず￻を　￹飲￺の￻みこみはじめたら　￹危険￺きけん￻。\n￹全身￺ぜんしん￻に　￹生￺は￻えている　￹毒針￺どくばり￻を\nまき￹散￺ち￻らし　￹襲￺おそ￻いかかってくる。"
          violet: "￹毒針￺どくばり￻を　￹撃￺う￻ち￹出￺だ￻した　￹直後￺ちょくご￻の\n￹無防備￺むぼうび￻な　￹状態￺じょうたい￻を　￹狙￺ねら￻うと\nベテランの　￹漁師￺りょうし￻は　￹語￺かた￻る。"
        en:
          scarlet: "Be cautious if this Pokémon starts sucking in\nwater—it will soon attack by scattering the toxic\nspikes that grow all over its body."
          violet: "Experienced fishers say they try to catch Qwilfish\nin the brief moment that these Pokémon become\ndefenseless just after launching poisonous spikes."
        fr:
          scarlet: "S’il se met à avaler de l’eau, cela signifie qu’il\ns’apprête à attaquer en projetant les épines\nempoisonnées qui poussent sur son corps."
          violet: "Les spécialistes de la pêche conseillent d’attraper\nles Qwilfish lorsqu’ils sont sans défense, après\nqu’ils ont projeté leurs épines empoisonnées."
        it:
          scarlet: "Se comincia a gonfiarsi d’acqua, bisogna fare\nattenzione: sta per attaccare lanciando gli aculei\nvelenosi che gli crescono su tutto il corpo."
          violet: "I pescatori esperti consigliano di aspettare\nil momento in cui i Qwilfish sono indifesi, cioè\nsubito dopo aver sparato i loro aculei velenosi."
        de:
          scarlet: "Wenn es sich mit Wasser vollsaugt, ist Vorsicht\ngeboten. Dann verschießt es nämlich bald die\ngiftigen Stacheln, die seinen Körper bedecken."
          violet: "Angelveteranen zufolge sollte man Baldorfish\nunmittelbar nach Abschuss seiner Giftstacheln\nversuchen zu fangen, weil es dann wehrlos ist."
        es:
          scarlet: "Si comienza a beber agua para hincharse, es\nseñal de amenaza. Ataca al rival arrojando las\npúas tóxicas que le recubren el cuerpo."
          violet: "Los pescadores veteranos aconsejan pescarlo\njusto después de que arroje sus púas tóxicas,\npues es cuando se encuentra indefenso."
        ko:
          scarlet: "물을 들이마시기 시작하면 위험하다.\n온몸에 난 독침을 흩뿌려서\n공격해 오기 때문이다."
          violet: "독침을 발사한 직후의\n무방비 상태를 노려야 한다는 것이\n베테랑 어부의 조언."
        zh_simp:
          scarlet: "当它开始喝水就代表危险了。\n它会挥洒长满全身的毒针，\n然后朝对手发动袭击。"
          violet: "资深的渔夫说道，在它刚刚\n射出毒针后的毫无防备的状态时，\n就是捕捉它的大好机会。"
        zh_trad:
          scarlet: "如果牠開始喝水那就危險了。\n牠會灑出長滿全身的毒針，\n然後朝著你襲擊過來。"
          violet: "資深的漁夫說道，在牠剛射出\n毒針而呈現毫無防備的狀態時，\n就是捕捉牠的大好機會。"
