      descriptions:
        jp_kana:
          scarlet: "ほっぺに　￹木￺き￻の￹実￺み￻を　￹蓄￺たくわ￻える。\n￹木￺き￻の￹実￺み￻が　なく　￹口寂￺くちさみ￻しいときは\n￹小石￺こいし￻を　ふくんで　￹耐￺た￻えしのぐ。"
          violet: "どんなに　お￹腹￺なか￻いっぱい　￹食￺た￻べても\nまた　￹腹￺はら￻ペコになるのが　￹不安￺ふあん￻で\n￹頬￺ほほ￻と　￹尻尾￺しっぽ￻に　￹木￺き￻の￹実￺み￻を　￹溜￺た￻める。"
        jp_kanji:
          scarlet: "ほっぺに　￹木￺き￻の￹実￺み￻を　￹蓄￺たくわ￻える。\n￹木￺き￻の￹実￺み￻が　なく　￹口寂￺くちさみ￻しいときは\n￹小石￺こいし￻を　ふくんで　￹耐￺た￻えしのぐ。"
          violet: "どんなに　お￹腹￺なか￻いっぱい　￹食￺た￻べても\nまた　￹腹￺はら￻ペコになるのが　￹不安￺ふあん￻で\n￹頬￺ほほ￻と　￹尻尾￺しっぽ￻に　￹木￺き￻の￹実￺み￻を　￹溜￺た￻める。"
        en:
          scarlet: "It stores berries in its cheeks. When there are no\nberries to be found, Skwovet will stuff pebbles\ninto its cheeks to stave off its cravings."
          violet: "No matter how much it stuffs its belly with food,\nit is always anxious about getting hungry again.\nSo, it stashes berries in its cheeks and tail."
        fr:
          scarlet: "Il emmagasine des Baies dans ses joues. Lorsqu’il\nn’en a plus, il essaie de compenser en accumulant\ndes cailloux à la place."
          violet: "Même lorsqu’il est rassasié, il a tellement peur\nd’avoir de nouveau faim qu’il emmagasine\ndes Baies dans ses joues et sa queue."
        it:
          scarlet: "Conserva le bacche all’interno delle guance.\nQuando non ne ha più, ci infila dei sassolini\nper non sentirne la mancanza."
          violet: "Anche dopo aver mangiato a più non posso viene\ntormentato dal timore che gli torni la fame, per\ncui si riempie le guance e la coda di bacche."
        de:
          scarlet: "Es hortet Beeren in seinen Backentaschen. Falls es\neinmal keine findet, stopft es stattdessen Kiesel\nhinein, um Heißhungerattacken zu überwinden."
          violet: "Egal, wie sehr es sich auch vollstopft, es lebt in\nständiger Sorge vor dem nächsten Hungeranfall\nund hortet daher Beeren in Schweif und Backen."
        es:
          scarlet: "Guarda bayas en los carrillos. Cuando no le\nquedan, mete en su lugar piedras pequeñas\npara lidiar con el antojo."
          violet: "Por mucho que se hinche a comer, le preocupa\nque le vuelva a entrar hambre, así que se guarda\nbayas en los carrillos y en la cola."
        ko:
          scarlet: "볼에 나무열매를 비축한다.\n나무열매가 없어서 입이 심심할 때는\n조약돌을 물면서 견딘다."
          violet: "아무리 배불리 먹어도\n나중에 배가 고파질 것이 불안해서\n볼과 꼬리에 나무열매를 비축한다."
        zh_simp:
          scarlet: "会把树果囤积在脸颊。\n嘴馋却又没有树果时，\n会含着小石子忍过去。"
          violet: "不管吃得再怎么饱都还是\n会担心肚子饿，因此会往\n脸颊和尾巴里储存树果。"
        zh_trad:
          scarlet: "會把樹果囤積在雙頰裡。\n沒有樹果而感到嘴裡空虛時，\n會含著小石子來忍過去。"
          violet: "不管吃得再怎麼飽，\n都還是因為會擔心肚子餓，\n而往頰囊和尾巴裡儲藏樹果。"
