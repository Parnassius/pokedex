      descriptions:
        jp_kana:
          scarlet: "￹上昇￺じょうしょう￻　￹気流￺きりゅう￻に　￹乗￺の￻って\nグライダーのように　￹大空￺おおぞら￻を　￹舞￺ま￻い\nくちばしに　￹挟￺はさ￻んだ　エサを￹運￺はこ￻ぶ。"
          violet: "￹海風￺うみかぜ￻を　￹受￺う￻けて　グライダーのように\n￹滑空￺かっくう￻する。　￹冬￺ふゆ￻になると\n￹巣￺す￻の　まわりに　エサを　￹隠￺かく￻す。"
        jp_kanji:
          scarlet: "￹上昇￺じょうしょう￻　￹気流￺きりゅう￻に　￹乗￺の￻って\nグライダーのように　￹大空￺おおぞら￻を　￹舞￺ま￻い\nくちばしに　￹挟￺はさ￻んだ　エサを￹運￺はこ￻ぶ。"
          violet: "￹海風￺うみかぜ￻を　￹受￺う￻けて　グライダーのように\n￹滑空￺かっくう￻する。　￹冬￺ふゆ￻になると\n￹巣￺す￻の　まわりに　エサを　￹隠￺かく￻す。"
        en:
          scarlet: "It soars high in the sky, riding on updrafts like a\nglider. It carries food tucked in its bill."
          violet: "It rides upon ocean winds as if it were a\nglider. In the winter, it hides food around\nits nest."
        fr:
          scarlet: "Ce Pokémon utilise les courants ascendants\npour planer en altitude. Il transporte de la\nnourriture dans son bec."
          violet: "Il utilise les vents marins comme un planeur.\nEn hiver, il cache de la nourriture autour\nde son nid."
        it:
          scarlet: "Si lascia trasportare ad alta quota dalle\ncorrenti ascensionali, librandosi nel cielo\ncome un aliante e trasportando il cibo nel becco."
          violet: "Vola scivolando sulla brezza marina come\nun aliante. D’inverno, nasconde il cibo\nattorno al nido."
        de:
          scarlet: "Es nutzt Aufwinde, um wie ein Segelflugzeug\nhoch oben in den Lüften zu schweben, und trägt\nFutter in seinem Schnabel umher."
          violet: "Es nutzt den Seewind, um wie ein Segelflugzeug\ndurch die Lüfte zu gleiten. Im Winter versteckt es\nNahrung bei seinem Nest."
        es:
          scarlet: "Aprovecha las corrientes ascendentes\npara ganar altura como si de un planeador\nse tratase. Suele llevar comida en el pico."
          violet: "Vuela y planea siguiendo la brisa marina.\nEn invierno esconde comida cerca de su nido."
        ko:
          scarlet: "상승 기류를 타고\n글라이더처럼 넓은 하늘을 돌며\n부리로 집은 먹이를 운반한다."
          violet: "바닷바람을 타고 글라이더처럼 활공한다.\n겨울이 되면 둥지 주변에 먹이를 숨긴다."
        zh_simp:
          scarlet: "能乘着上升气流\n像滑翔机一样在空中飞翔，\n搬运鸟嘴中衔着的食物。"
          violet: "迎着海风，像滑翔机一般地\n翱翔。到了冬天就会\n把食物藏在巢的周围。"
        zh_trad:
          scarlet: "會乘著上升氣流，\n如同滑翔機般地飛在空中\n輸送鳥嘴銜著的食物。"
          violet: "會迎著海風如滑翔機般\n滑翔。到了冬天就會\n將食物藏在巢的周圍。"
