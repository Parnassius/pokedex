      descriptions:
        jp_kana:
          scarlet: "お￹尻￺しり￻から￹飛￺と￻ばす　くさい　￹汁￺しる￻の\n￹臭￺にお￻いは　￹半径￺はんけい￻２キロに　￹広￺ひろ￻がり\nまわりの　ポケモンは　いなくなる。"
          violet: "お￹尻￺しり￻から　￹飛￺と￻ばす　￹液体￺えきたい￻の\n￹臭￺にお￻いは　２キロも　￹離￺はな￻れた　￹人￺ひと￻が\n￹具合￺ぐあい￻を　￹悪￺わる￻くするほど　くさい。"
        jp_kanji:
          scarlet: "お￹尻￺しり￻から￹飛￺と￻ばす　くさい　￹汁￺しる￻の\n￹臭￺にお￻いは　￹半径￺はんけい￻２キロに　￹広￺ひろ￻がり\nまわりの　ポケモンは　いなくなる。"
          violet: "お￹尻￺しり￻から　￹飛￺と￻ばす　￹液体￺えきたい￻の\n￹臭￺にお￻いは　２キロも　￹離￺はな￻れた　￹人￺ひと￻が\n￹具合￺ぐあい￻を　￹悪￺わる￻くするほど　くさい。"
        en:
          scarlet: "It sprays a foul fluid from its rear. Its stench\nspreads over a mile radius, driving Pokémon\naway."
          violet: "The foul fluid from its rear is so revolting that it\ncan make people feel queasy up to a mile and a\nquarter away."
        fr:
          scarlet: "Son derrière expulse un fluide nauséabond\ncapable de faire fuir les Pokémon dans un rayon\nde deux kilomètres."
          violet: "Le fluide nauséabond que son derrière expulse\npeut incommoder des gens dans un rayon\nde deux kilomètres."
        it:
          scarlet: "Emette un fluido puzzolente dal posteriore.\nIl tanfo tiene lontani i Pokémon nel raggio\ndi 2 km."
          violet: "Dal posteriore spruzza un liquido talmente\npuzzolente da far star male una persona\na due chilometri di distanza."
        de:
          scarlet: "Der Gestank der Substanz, die es aus seinem\nHinterleib versprüht, verbreitet sich in einem\nRadius von 2 km und vertreibt andere Pokémon."
          violet: "Der Gestank der Flüssigkeit, die es aus seinem\nHinterleib versprüht, dreht Menschen selbst auf\n2 km Entfernung den Magen um."
        es:
          scarlet: "Expulsa un fluido maloliente por sus cuartos\ntraseros. El hedor repele Pokémon en un radio\nde 2 km."
          violet: "Expulsa un líquido hediondo por su trasero que\npuede marear a personas a 2 km de distancia."
        ko:
          scarlet: "엉덩이에서 뿜어지는 역한 분비액의\n냄새는 반경 2km까지 멀리 퍼져\n주변의 포켓몬이 자리를 뜨게 한다."
          violet: "엉덩이에서 내뿜는 액체의 냄새는\n2km 떨어진 곳에 있는 사람이\n상태가 나빠질 정도로 역하다."
        zh_simp:
          scarlet: "从屁屁喷出的臭液的气味\n会扩散到半径２公里的范围，\n周围的宝可梦都会逃得无影无踪。"
          violet: "从屁屁喷出的液体\n臭到连２公里外的人\n都会感到不舒服。"
        zh_trad:
          scarlet: "從屁股噴出的臭液的氣味\n會擴散到半徑２公里的範圍，\n周圍的寶可夢都會逃得無影無蹤。"
          violet: "從屁股噴出的液體\n臭到連２公里外的人\n都會覺得不舒服。"
