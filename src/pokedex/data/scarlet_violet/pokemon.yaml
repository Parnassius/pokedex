      descriptions:
        jp_kana:
          scarlet: "￹両目￺りょうめ￻は　￹特殊￺とくしゅ￻な　つくり。\nわずかな　￹光￺ひかり￻を　￹集￺あつ￻めては\n￹暗闇￺くらやみ￻でも　まわりを　￹見分￺みわ￻ける。"
          violet: "￹非常￺ひじょう￻に　￹柔￺やわ￻らかい　￹羽￺はね￻は\n￹飛￺と￻ぶとき　￹音￺おと￻を　￹出￺だ￻さないので\nこっそり　￹獲物￺えもの￻に　￹近￺ちか￻づける。"
        jp_kanji:
          scarlet: "￹両目￺りょうめ￻は　￹特殊￺とくしゅ￻な　つくり。\nわずかな　￹光￺ひかり￻を　￹集￺あつ￻めては\n￹暗闇￺くらやみ￻でも　まわりを　￹見分￺みわ￻ける。"
          violet: "￹非常￺ひじょう￻に　￹柔￺やわ￻らかい　￹羽￺はね￻は\n￹飛￺と￻ぶとき　￹音￺おと￻を　￹出￺だ￻さないので\nこっそり　￹獲物￺えもの￻に　￹近￺ちか￻づける。"
        en:
          scarlet: "Its eyes are specially adapted. They concentrate\neven faint light and enable it to see in the dark."
          violet: "Its extremely soft wings make no sound in flight.\nIt silently sneaks up on prey without being\ndetected."
        fr:
          scarlet: "Ses yeux spéciaux lui permettent de distinguer\nson environnement même dans l’obscurité,\nen captant la plus faible des lueurs."
          violet: "Ses plumes d’une douceur exceptionnelle\nlui assurent un vol silencieux. Il peut ainsi\nsurprendre facilement ses proies."
        it:
          scarlet: "I suoi occhi speciali captano anche la luce\npiù fioca, permettendogli di vedere al buio."
          violet: "Mentre vola, le morbide penne sono\nsilenziosissime. Così, giunge sulla preda\nsenza farsi notare."
        de:
          scarlet: "Die besondere Beschaffenheit seiner Augen\nermöglicht es ihm, schwaches Licht zu bündeln,\num auch im Dunkeln klar sehen zu können."
          violet: "Aufgrund seiner geschmeidigen Flügel\nfliegt es so leise, dass es sich unbemerkt\nseiner Beute nähern kann."
        es:
          scarlet: "Posee unos ojos especialmente adaptados que\nle permiten aprovechar incluso la luz más tenue\npara ver en la oscuridad con total claridad."
          violet: "Su plumaje es extraordinariamente suave y no\nemite el menor sonido cuando vuela, lo que le\npermite acercarse a su presa sin ser detectado."
        ko:
          scarlet: "양쪽 눈이 특수한 구조다.\n적은 양의 빛이라도 잘 모아\n어둠 속에서도 주위를 분별한다."
          violet: "매우 부드러운 날개는\n날아오를 때 소리를 내지 않아서\n조용히 먹잇감에 접근할 수 있다."
        zh_simp:
          scarlet: "双眼有着特殊的构造。\n只要接收到一点点光线，\n即使是在黑暗中也能分辨四周的情况。"
          violet: "极为柔软的羽毛让它\n在飞行时不会发出声音，\n因此能够悄悄接近猎物。"
        zh_trad:
          scarlet: "雙眼有著特殊的構造。\n只要接收到一點點光線，\n即使在黑暗中也能分辨四周的景物。"
          violet: "極為柔軟的翅膀讓牠在\n飛行時不發一絲聲響，\n因此可以悄悄地接近獵物。"
