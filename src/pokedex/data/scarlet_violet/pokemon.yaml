          scarlet: "￹危険￺きけん￻を　￹察知￺さっち￻すると　テラスタルの\n￹結晶￺けっしょう￻で　￹頑丈￺がんじょう￻な　￹甲羅￺こうら￻を　￹作￺つく￻りだして\n￹戦￺たたか￻いに　￹備￺そな￻える。"
          violet: "テラスタルの　￹甲羅￺こうら￻は　￹相手￺あいて￻の\n￹技￺わざ￻を　￹受￺う￻けると　そのエネルギーを\n￹吸￺す￻い￹取￺と￻って　￹自分￺じぶん￻のものにする。"
        jp_kanji:
          scarlet: "￹危険￺きけん￻を　￹察知￺さっち￻すると　テラスタルの\n￹結晶￺けっしょう￻で　￹頑丈￺がんじょう￻な　￹甲羅￺こうら￻を　￹作￺つく￻りだして\n￹戦￺たたか￻いに　￹備￺そな￻える。"
          violet: "テラスタルの　￹甲羅￺こうら￻は　￹相手￺あいて￻の\n￹技￺わざ￻を　￹受￺う￻けると　そのエネルギーを\n￹吸￺す￻い￹取￺と￻って　￹自分￺じぶん￻のものにする。"
        en:
          scarlet: "Upon sensing danger, it prepares itself for\nbattle by creating a sturdy shell of crystallized\nTerastal energy."
          violet: "The shell is made of crystallized Terastal energy.\nWhen struck by a move, this shell absorbs the\nmove’s energy and transfers it to Terapagos."
        fr:
          scarlet: "Quand il perçoit un danger, il se prépare\nau combat en se fabriquant une carapace\nsolide par Téracristallisation."
          violet: "Sa carapace Téracristal lui permet d’absorber\nl’énergie des capacités qu’il subit et de\nse l’approprier."
        it:
          scarlet: "Quando percepisce un pericolo, si prepara\nalla lotta creando un robusto carapace\nTeracristal."
          violet: "Quando il suo carapace Teracristal subisce\nuna mossa, ne assorbe l’energia e la fa propria."
        de:
          scarlet: "Wenn es Gefahr wittert, bereitet es sich auf\neinen Kampf vor, indem es einen robusten\nPanzer aus Terakristallen erschafft."
          violet: "Wird sein Terakristall-Panzer von einer\ngegnerischen Attacke getroffen, absorbiert\nes deren Energie und macht sie sich zu eigen."
        es:
          scarlet: "Cuando presiente peligro, se prepara para\ncombatir formando un caparazón de cristales\nmuy resistente mediante la teracristalización."
          violet: "Su caparazón Teracristal le permite absorber\ny apropiarse de la energía de los movimientos\nque recibe."
        ko:
          scarlet: "위험을 감지하면 테라스탈의 결정으로\n튼튼한 등껍질을 만들어 싸움에 대비한다."
          violet: "테라스탈의 등껍질로\n상대의 기술을 받으면, 그 에너지를\n흡수해서 자신의 것으로 만든다."
        zh_simp:
          scarlet: "一旦察觉到危险，\n它就会用太晶的结晶\n制作出坚固的甲壳以备战。"
          violet: "若太晶的甲壳受到对手招式的攻击，\n就会将其能量吸收，供自己使用。"
        zh_trad:
          scarlet: "一旦察覺到危險，\n就會用太晶的結晶製造出\n堅固的甲殼來備戰。"
          violet: "太晶的甲殼若受到對手的\n招式攻擊，就會把該招式\n的能量吸收來供自己使用。"
