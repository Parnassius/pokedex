      descriptions:
        jp_kana:
          scarlet: "￹磁力￺じりょく￻を　￹帯￺お￻びた　￹石￺いし￻の￹体￺からだ￻。\n￹特￺とく￻に　￹磁力￺じりょく￻が　￹強￺つよ￻い　￹部分￺ぶぶん￻には\n￹砂鉄￺さてつ￻が　ビッシリ　ついてるよ。"
          violet: "￹地面￺じめん￻で　￹寝￺ね￻ている　イシツブテを\n￹踏￺ふ￻むと　バチンと　￹音￺おと￻が　して\nビリッと　￹全身￺ぜんしん￻が　しびれる。"
        jp_kanji:
          scarlet: "￹磁力￺じりょく￻を　￹帯￺お￻びた　￹石￺いし￻の￹体￺からだ￻。\n￹特￺とく￻に　￹磁力￺じりょく￻が　￹強￺つよ￻い　￹部分￺ぶぶん￻には\n￹砂鉄￺さてつ￻が　ビッシリ　ついてるよ。"
          violet: "￹地面￺じめん￻で　￹寝￺ね￻ている　イシツブテを\n￹踏￺ふ￻むと　バチンと　￹音￺おと￻が　して\nビリッと　￹全身￺ぜんしん￻が　しびれる。"
        en:
          scarlet: "Its body is a magnetic stone. Iron sand attaches\nfirmly to the portions of its body that are\nparticularly magnetic."
          violet: "If you step on a Geodude sleeping on the\nground, you’ll hear a zapping sound and feel\na tingling shock throughout your entire body."
        fr:
          scarlet: "Ce Pokémon est composé de roche magnétique.\nDe la poussière métallique recouvre les parties\nles plus magnétiques de son corps."
          violet: "Si on marche par inadvertance sur un Racaillou\nendormi par terre, un bruit sec retentit et une\ndécharge électrique nous parcourt le corps."
        it:
          scarlet: "Ha un corpo di pietra magnetizzato. Nei punti\nin cui il magnetismo è più intenso si accumula\ndella polvere metallica."
          violet: "Chi calpesta accidentalmente un Geodude\nche dorme a terra udirà uno schiocco e sentirà\nuna scarica elettrica corrergli lungo la schiena."
        de:
          scarlet: "Sein Steinkörper ist von Magnetkraft erfüllt.\nAn den Stellen, wo diese besonders stark wirkt,\nheften sich Schichten von Eisensand an."
          violet: "Wenn man auf ein am Boden schlafendes\nKleinstein tritt, hört man ein Knistern und\nbekommt einen Stromschlag ab."
        es:
          scarlet: "Su cuerpo de piedra está magnetizado. En los\npuntos donde su campo magnético se intensifica,\ntiene masas compactas de arena ferruginosa."
          violet: "Si alguien pisa por error a un Geodude que esté\ndurmiendo en el suelo, oirá un chasquido y un\ncalambre le recorrerá todo el cuerpo."
        ko:
          scarlet: "자력을 띤 돌의 몸을 가졌다.\n특히 자력이 강한 부분에는\n사철이 빽빽이 붙어 있다."
          violet: "땅에서 자는 꼬마돌을 밟으면\n파직 하는 소리가 난 뒤\n찌르르하고 전신이 마비된다."
        zh_simp:
          scarlet: "带有磁力的石头身体。\n在磁力特别强的部分，\n铁矿砂密密麻麻地附着哦。"
          violet: "如果踩到在地面睡觉的小拳石，\n就会发出叮——的响声，\n一下子全身都麻痹了。"
        zh_trad:
          scarlet: "石頭身體帶有磁力。\n在磁力特別強的部分\n附著密密麻麻的鐵砂哦。"
          violet: "如果踩到在地面睡覺的小拳石，\n就會發出叮──的響聲，\n全身會一下子變得麻痺。"
