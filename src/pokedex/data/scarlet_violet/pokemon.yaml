        jp_kana:
          scarlet: "￹頭￺あたま￻と　￹尻尾￺しっぽ￻の　２つの　￹脳波￺のうは￻が\n￹同期￺どうき￻したことで　エスパーパワーは\nキリンリキの　１０￹倍￺ばい￻　アップした。"
          violet: "￹硬￺かた￻い　テールヘッドで　￹本体￺ほんたい￻の　￹頭￺あたま￻を\n￹守￺まも￻りつつ　￹長￺なが￻い　￹首￺くび￻を　￹振￺ふ￻りまわして\n￹頭突￺ずつ￻きを　￹食￺く￻らわせる。"
        jp_kanji:
          scarlet: "￹頭￺あたま￻と　￹尻尾￺しっぽ￻の　２つの　￹脳波￺のうは￻が\n￹同期￺どうき￻したことで　エスパーパワーは\nキリンリキの　１０￹倍￺ばい￻　アップした。"
          violet: "￹硬￺かた￻い　テールヘッドで　￹本体￺ほんたい￻の　￹頭￺あたま￻を\n￹守￺まも￻りつつ　￹長￺なが￻い　￹首￺くび￻を　￹振￺ふ￻りまわして\n￹頭突￺ずつ￻きを　￹食￺く￻らわせる。"
        en:
          scarlet: "Now that the brain waves from the head and\ntail are synced up, the psychic power of this\nPokémon is 10 times stronger than Girafarig’s."
          violet: "The hardened head from the tail protects the\nhead of the main body as Farigiraf whips its long\nneck around to headbutt enemies."
        fr:
          scarlet: "Grâce à la synchronisation des ondes cérébrales\nde sa tête et de sa queue, ses pouvoirs psychiques\nsont dix fois plus puissants que ceux de Girafarig."
          violet: "Lorsqu’il fait tournoyer son cou pour frapper\nses adversaires, il protège sa tête principale\nà l’aide de sa tête noire, qui est plus dure."
        it:
          scarlet: "Le onde cerebrali della testa e della coda si sono\nsincronizzate, rendendo i suoi poteri psichici\ndieci volte superiori a quelli dei Girafarig."
          violet: "Protegge la testa principale con quella più dura\ndella coda e fa roteare il lungo collo per tirare\npotenti testate."
        de:
          scarlet: "Aufgrund der synchronisierten Gehirnströme von\nKopf und Schweif sind seine Psycho-Kräfte\nzehnmal so stark wie die von Girafarig."
          violet: "Während es seinen langen Hals umherschwingt\nund damit Stöße austeilt, wird sein Hauptkopf\nvom harten Schweifkopf geschützt."
        es:
          scarlet: "Las ondas cerebrales de la cola y la cabeza van\nal compás, lo que le confiere poderes psíquicos\ndiez veces más potentes que los de los Girafarig."
          violet: "La dura cabeza de la cola protege a la principal\ncuando agita su largo cuello para propinar\ncabezazos a sus enemigos."
        ko:
          scarlet: "머리와 꼬리 2개의 뇌파가\n동기화하여 에스퍼 파워가\n키링키의 10배로 강화되었다."
          violet: "단단한 테일 헤드로 본체의 머리를\n보호하면서 긴 목을 휘둘러\n박치기를 먹여 준다."
        zh_simp:
          scarlet: "通过同步头部和尾巴的脑波，\n来让自己的超能力提升\n到了麒麟奇的１０倍之高。"
          violet: "以坚硬的尾巴头保护着\n本体的头，并甩动长长的\n脖子让对手吃它一记头槌。"
        zh_trad:
          scarlet: "透過同步頭部和尾巴的腦波，\n使得牠的超能力提升到了\n有麒麟奇的１０倍之高。"
          violet: "會用堅硬的尾巴頭保護著\n本體的頭，並揮甩長長的\n脖子讓對手吃牠一記頭錘。"
