        jp_kana:
          scarlet: "ぶらりと　￹下￺さ￻げた　￹腕￺うで￻を　￹瞬時￺しゅんじ￻に\n￹振￺ふ￻り￹上￺あ￻げる　￹得意￺とくい￻の　パンチで\n￹相手￺あいて￻を　￹空高￺そらたか￻く　￹吹￺ふ￻っ￹飛￺と￻ばす。"
          violet: "ウロコを　￹打￺う￻ち￹鳴￺な￻らして　￹相手￺あいて￻の\n￹度胸￺どきょう￻を　￹試￺ため￻す。　￹弱￺よわ￻い￹者￺もの￻は\nその　￹音￺おと￻に　￹恐￺おそ￻れ　￹逃￺に￻げ￹出￺だ￻すのだ。"
        jp_kanji:
          scarlet: "ぶらりと　￹下￺さ￻げた　￹腕￺うで￻を　￹瞬時￺しゅんじ￻に\n￹振￺ふ￻り￹上￺あ￻げる　￹得意￺とくい￻の　パンチで\n￹相手￺あいて￻を　￹空高￺そらたか￻く　￹吹￺ふ￻っ￹飛￺と￻ばす。"
          violet: "ウロコを　￹打￺う￻ち￹鳴￺な￻らして　￹相手￺あいて￻の\n￹度胸￺どきょう￻を　￹試￺ため￻す。　￹弱￺よわ￻い￹者￺もの￻は\nその　￹音￺おと￻に　￹恐￺おそ￻れ　￹逃￺に￻げ￹出￺だ￻すのだ。"
        en:
          scarlet: "It lets its arm hang, and then—quick as a flash—\nswings upward to land its specialty punch and\nsend the opponent flying high into the sky."
          violet: "It bashes its scales to test its opponents’ mettle.\nThe sound of struck Kommo-o scales frightens\nweaker foes and sends them running."
        fr:
          scarlet: "Son bras ballant se lève subitement pour\ninfliger un coup de poing spécial à son\nadversaire, qu’il propulse très haut dans les airs."
          violet: "Il met à l’épreuve la bravoure de ses\nadversaires en entrechoquant ses écailles.\nCe son suffit à faire déguerpir les plus faibles."
        it:
          scarlet: "Sferra il suo speciale pugno che fa volare\nin aria gli avversari alzando le braccia che\ntiene a penzoloni."
          violet: "Fa risuonare le squame per mettere alla prova\nil coraggio degli avversari. I più deboli\nfuggono terrorizzati da quel suono."
        de:
          scarlet: "Es lässt einen Arm herabhängen, reißt ihn dann\nruckartig in die Höhe und schleudert Gegner\nmit diesem speziellen Schlag hoch in die Luft."
          violet: "Durch das Rasseln seiner Schuppen stellt es den\nMut seiner Gegner auf die Probe. Schwächlinge\nfürchten sich vor dem Geräusch und fliehen."
        es:
          scarlet: "Alza súbitamente sus brazos penduleantes\npara propinar al rival un puñetazo especial\ncapaz de enviarlo por los aires."
          violet: "Hace sonar las escamas para poner a prueba la\nosadía del rival. Aquellos que pecan de débiles\nemprenden la huida atemorizados por el sonido."
        ko:
          scarlet: "팔을 축 늘어뜨렸다가\n순식간에 치켜드는 특유의 펀치로\n상대를 하늘 높이 날려 버린다."
          violet: "비늘을 두들기며 상대의 배짱을 시험한다.\n약한 자는 그 소리에\n겁을 먹고 도망쳐 버린다."
        zh_simp:
          scarlet: "会瞬间挥起垂下的手臂，\n用擅长的拳击\n将对手击飞至高空。"
          violet: "会敲响鳞片来测试对手胆量。\n弱小的家伙会被那声音吓跑。"
        zh_trad:
          scarlet: "會瞬間揮起垂下的手臂\n使出拿手的拳擊，\n把對手打飛到高空中。"
          violet: "會敲響鱗片來測試對手的膽量。\n弱小的傢伙聽到那聲音\n就會嚇得逃之夭夭。"
