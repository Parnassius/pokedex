      hidden_ability: pickpocket
      descriptions:
        jp_kana:
          scarlet: "￹知能￺ちのう￻が　￹高￺たか￻く　とても　￹豪快￺ごうかい￻。\nハンマーで　￹岩￺いわ￻を　￹殴￺なぐ￻り￹飛￺と￻ばして\n￹空飛￺そらと￻ぶ　アーマーガアを　￹狙￺ねら￻う。"
          violet: "１００キロを　￹超￺こ￻える　ハンマーを\n￹軽々￺かるがる￻　￹振￺ふ￻りまわして　￹欲￺ほ￻しいものを\n￹奪￺うば￻い￹取￺と￻り　￹棲￺す￻み￹処￺か￻へと　￹持￺も￻ち￹帰￺かえ￻る。"
        jp_kanji:
          scarlet: "￹知能￺ちのう￻が　￹高￺たか￻く　とても　￹豪快￺ごうかい￻。\nハンマーで　￹岩￺いわ￻を　￹殴￺なぐ￻り￹飛￺と￻ばして\n￹空飛￺そらと￻ぶ　アーマーガアを　￹狙￺ねら￻う。"
          violet: "１００キロを　￹超￺こ￻える　ハンマーを\n￹軽々￺かるがる￻　￹振￺ふ￻りまわして　￹欲￺ほ￻しいものを\n￹奪￺うば￻い￹取￺と￻り　￹棲￺す￻み￹処￺か￻へと　￹持￺も￻ち￹帰￺かえ￻る。"
        en:
          scarlet: "This intelligent Pokémon has a very daring\ndisposition. It knocks rocks into the sky with\nits hammer, aiming for flying Corviknight."
          violet: "The hammer tops 220 pounds, yet it gets swung\naround easily by Tinkaton as it steals whatever it\npleases and carries its plunder back home."
        fr:
          scarlet: "Ce Pokémon très intelligent et hardi jette\ndes rochers dans les airs puis les frappe avec\nson marteau en visant les Corvaillus qui volent."
          violet: "Ce Pokémon s’empare de tout ce qu’il convoite\nen maniant sans effort son marteau de plus\nde 100 kg et ramène son butin chez lui."
        it:
          scarlet: "Possiede una notevole intelligenza e un’indole\nardita. Con il suo martello scaglia rocce in aria,\ncercando di abbattere i Corviknight in volo."
          violet: "È capace di brandire il suo martello pesante oltre\n100 kg come se niente fosse. Se vede qualcosa\nche gli piace, lo ruba e lo porta nella sua tana."
        de:
          scarlet: "Es ist intelligent und verwegen. Mit seinem\nHammer schlägt es Felsen in die Luft und zielt\ndamit auf fliegende Krarmor."
          violet: "Granforgita schwingt den über 100 kg schweren\nHammer mühelos umher. Es schleppt alles mit\nsich nach Hause, was ihm gefällt."
        es:
          scarlet: "Posee una notable inteligencia y una exacerbada\npersonalidad. Si ve Corviknight volando, golpea\ny lanza rocas con su martillo para derribarlos."
          violet: "Blande sin esfuerzo su pesado martillo de más\nde 100 kg. Cuando quiere algo, lo roba y se lo\nlleva de vuelta a su guarida."
        ko:
          scarlet: "지능이 높고 매우 호쾌하다.\n해머로 바위를 날려서\n하늘을 나는 아머까오를 노린다."
          violet: "100kg이 넘는 해머를 가볍게 휘둘러서\n원하는 것을 빼앗은 다음\n거처로 가지고 간다."
        zh_simp:
          scarlet: "智力高超，性格豪迈。\n会用锤子打飞岩石\n来攻击飞在空中的钢铠鸦。"
          violet: "会轻松地挥舞超过１００公斤的\n锤子来夺取想要的东西，\n然后带回自己的住处。"
        zh_trad:
          scarlet: "智商高超，性格豪邁。\n會用錘子打飛岩石來攻擊\n飛在空中的鋼鎧鴉。"
          violet: "會輕鬆地揮舞著超過１００公斤\n的錘子來奪取想要的東西，\n然後帶回自己的住處。"
