      descriptions:
        jp_kana:
          scarlet: "￹地面￺じめん￻に　￹作￺つく￻った　￹巣穴￺すあな￻に　￹棲￺す￻む。\n￹大昔￺おおむかし￻の　￹人￺ひと￻は　キバを\n￹包丁￺ほうちょう￻の　￹代￺か￻わりにしていた。"
          violet: "￹岩￺いわ￻や　￹樹木￺じゅもく￻に　￹独特￺どくとく￻の\n￹歯形￺はがた￻を　￹見￺み￻かけたら　￹近￺ちか￻くに\nキバゴが　￹棲￺す￻んでいるはずだ。"
        jp_kanji:
          scarlet: "￹地面￺じめん￻に　￹作￺つく￻った　￹巣穴￺すあな￻に　￹棲￺す￻む。\n￹大昔￺おおむかし￻の　￹人￺ひと￻は　キバを\n￹包丁￺ほうちょう￻の　￹代￺か￻わりにしていた。"
          violet: "￹岩￺いわ￻や　￹樹木￺じゅもく￻に　￹独特￺どくとく￻の\n￹歯形￺はがた￻を　￹見￺み￻かけたら　￹近￺ちか￻くに\nキバゴが　￹棲￺す￻んでいるはずだ。"
        en:
          scarlet: "This Pokémon lives in nests that are made in the\nground. People in ancient times used its tusks as\ncooking knives."
          violet: "If you see peculiar teeth marks on boulders or\ntrees, it means an Axew is likely living nearby."
        fr:
          scarlet: "Il vit dans des terriers qu’il creuse dans le sol.\nOn utilisait autrefois ses crocs comme\ndes couteaux."
          violet: "Si on aperçoit les marques distinctives des crocs\nde Coupenotte sur les rochers et les arbres, c’est\nqu’il y en a un qui vit probablement tout près."
        it:
          scarlet: "Vive nelle tane che costruisce nel terreno.\nNell’antichità, gli esseri umani usavano le sue\nzanne a mo’ di coltelli."
          violet: "Se su alberi e rocce sono presenti i segni\ncaratteristici lasciati dalle sue zanne,\nè probabile che viva nelle vicinanze."
        de:
          scarlet: "Es wohnt in Erdlöchern, die es selbst gräbt.\nVor langer Zeit benutzten die Menschen seine\nStoßzähne als Küchenmesser."
          violet: "Sind an Felsen oder Bäumen eigenartige\nZahnabdrücke zu finden, lebt wahrscheinlich\nein Milza in der Nähe."
        es:
          scarlet: "Viven en madrigueras que horadan en la tierra.\nEn tiempos remotos, la gente usaba sus colmillos\na modo de cuchillos de cocina."
          violet: "Las dentelladas características que presentan\nlas rocas y los árboles de una zona suelen indicar\nque un Axew habita en los alrededores."
        ko:
          scarlet: "땅속에 만든 굴에 산다.\n먼 옛날 사람들은 어금니를\n식칼 대신 사용했다."
          violet: "바위나 나무에서 독특한\n이빨 자국을 발견했다면\n근처에 터검니가 살고 있는 것이다."
        zh_simp:
          scarlet: "居住在建造于地面的巢穴。\n很久以前的人们曾用\n它的牙齿来代替菜刀。"
          violet: "如果在岩石或树木上\n发现了独特的齿痕，\n牙牙一定就栖息在那附近。"
        zh_trad:
          scarlet: "居住在建造於地面的巢穴。\n古時候的人曾經拿牠的\n牙齒來代替菜刀。"
          violet: "如果在岩石或樹木上\n發現了獨特的齒痕，\n附近一定棲息著牙牙。"
