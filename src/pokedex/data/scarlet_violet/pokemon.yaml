      hidden_ability: sheer_force
      descriptions:
        jp_kana:
          scarlet: "￹大￺おお￻きく　￹力強￺ちからづよ￻い　あごで\n￹噛￺か￻みつくと　そのまま　￹首￺くび￻を￹振￺ふ￻って\n￹相手￺あいて￻を　ずたずたに　￹引￺ひ￻きちぎる。"
          violet: "￹大￺おお￻きな　￹体￺からだ￻を　￹持￺も￻っているが\n￹力強￺ちからづよ￻い　￹後￺うし￻ろ￹脚￺あし￻を　￹使￺つか￻って\n￹地上￺ちじょう￻でも　￹素早￺すばや￻く　￹動￺うご￻く。"
        jp_kanji:
          scarlet: "￹大￺おお￻きく　￹力強￺ちからづよ￻い　あごで\n￹噛￺か￻みつくと　そのまま　￹首￺くび￻を￹振￺ふ￻って\n￹相手￺あいて￻を　ずたずたに　￹引￺ひ￻きちぎる。"
          violet: "￹大￺おお￻きな　￹体￺からだ￻を　￹持￺も￻っているが\n￹力強￺ちからづよ￻い　￹後￺うし￻ろ￹脚￺あし￻を　￹使￺つか￻って\n￹地上￺ちじょう￻でも　￹素早￺すばや￻く　￹動￺うご￻く。"
        en:
          scarlet: "When it bites with its massive and\npowerful jaws, it shakes its head and\nsavagely tears its victim up."
          violet: "Although it has a massive body, its\npowerful hind legs enable it to move\nquickly, even on land."
        fr:
          scarlet: "Après avoir mordu sa proie avec sa\ngrande mâchoire puissante, il secoue\nla tête pour déchiqueter sa victime."
          violet: "Malgré son corps imposant, ses puissantes\npattes arrière lui permettent de se déplacer\nrapidement, même sur la terre ferme."
        it:
          scarlet: "Azzanna l’avversario con le sue grandi e\npotenti mandibole e, senza lasciare la presa,\nagita la testa riducendolo a brandelli."
          violet: "Nonostante le sue grandi dimensioni,\ncon le potenti zampe posteriori si muove\nrapidamente anche sulla terraferma."
        de:
          scarlet: "Wenn es mit seinem großen, kräftigen\nKiefer zugebissen hat, schüttelt es seinen\nKopf und reißt den Gegner in Stücke."
          violet: "Trotz seines massigen Körpers kann es\nmit den kräftigen Hinterbeinen auch an\nLand sehr schnell laufen."
        es:
          scarlet: "Tras morder a su víctima con sus\nenormes y potentes mandíbulas, agita\nla cabeza con fuerza para despedazarla."
          violet: "A pesar de su corpulencia, sus fuertes\npatas traseras le permiten desplazarse\ncon rapidez incluso en tierra firme."
        ko:
          scarlet: "크고 힘센 턱으로 한번 물면\n그대로 목을 흔들어\n상대를 갈기갈기 찢는다."
          violet: "커다란 몸집을 하고 있으나\n힘센 뒷발을 사용해서\n지상에서도 재빠르게 움직인다."
        zh_simp:
          scarlet: "会用大而有力的颚咬住对手，\n然后就那样甩动脖子\n将对手撕得粉碎。"
          violet: "虽然身体庞大，\n但在陆地上也能使用\n强壮的后腿敏捷行动。"
        zh_trad:
          scarlet: "會用大而有力的雙顎\n咬住對手然後甩動脖子，\n將對手撕成碎片。"
          violet: "雖然擁有龐大的身體，\n但強而有力的後腳使牠\n在陸地上也能迅速行動。"
