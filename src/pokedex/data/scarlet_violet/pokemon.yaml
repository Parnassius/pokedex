      descriptions:
        jp_kana:
          scarlet: "￹命￺いのち￻を　￹奪￺うば￻おうと　￹決￺き￻めた\n￹獲物￺えもの￻の　￹影￺かげ￻に　￹潜￺もぐ￻り￹込￺こ￻み\nじっと　チャンスを　￹狙￺ねら￻ってる。"
          violet: "￹夜中￺よなか￻　￹人￺ひと￻の　￹影￺かげ￻に　￹潜￺もぐ￻り￹込￺こ￻み\n￹少￺すこ￻しずつ　￹体温￺たいおん￻を　￹奪￺うば￻う。\n￹狙￺ねら￻われると　￹寒気￺さむけ￻が　￹止￺と￻まらない。"
        jp_kanji:
          scarlet: "￹命￺いのち￻を　￹奪￺うば￻おうと　￹決￺き￻めた\n￹獲物￺えもの￻の　￹影￺かげ￻に　￹潜￺もぐ￻り￹込￺こ￻み\nじっと　チャンスを　￹狙￺ねら￻ってる。"
          violet: "￹夜中￺よなか￻　￹人￺ひと￻の　￹影￺かげ￻に　￹潜￺もぐ￻り￹込￺こ￻み\n￹少￺すこ￻しずつ　￹体温￺たいおん￻を　￹奪￺うば￻う。\n￹狙￺ねら￻われると　￹寒気￺さむけ￻が　￹止￺と￻まらない。"
        en:
          scarlet: "To steal the life of its target, it slips into\nthe prey’s shadow and silently waits for\nan opportunity."
          violet: "Hiding in people’s shadows at night, it absorbs\ntheir heat. The chill it causes makes the victims\nshake."
        fr:
          scarlet: "Il se cache dans l’ombre de sa victime et attend\npatiemment le bon moment pour lui voler sa vie."
          violet: "La nuit, il se cache dans l’ombre des passants\net vole leur chaleur petit à petit. Ses victimes\nressentent alors des frissons interminables."
        it:
          scarlet: "Per sottrarre energia alla vittima si nasconde\nnella sua ombra e attende in silenzio il momento\nopportuno."
          violet: "Di notte si cela nell’ombra delle persone per\nassorbirne il calore poco a poco, provocando\nloro tremiti irrefrenabili."
        de:
          scarlet: "Um Beute zu erlegen, versteckt es sich in deren\nSchatten und wartet still auf eine günstige\nGelegenheit."
          violet: "Es versteckt sich nachts im Schatten der\nMenschen und absorbiert deren Wärme,\nsodass sie unaufhörlich schaudern."
        es:
          scarlet: "Para quitarle la vida a su presa, se desliza en su\nsombra y espera su oportunidad en silencio."
          violet: "De noche, se oculta en las sombras y\nabsorbe el calor de sus víctimas, que\nsufren escalofríos irrefrenables."
        ko:
          scarlet: "생명을 빼앗기로 정한 먹잇감의\n그림자에 숨어들어\n꼼짝하지 않고 기회를 노린다."
          violet: "한밤중 사람의 그림자에 숨어들어\n조금씩 체온을 뺏는다.\n숨어들면 한기가 멈추지 않는다."
        zh_simp:
          scarlet: "会藏进猎物的影子里，\n然后悄悄地等待\n夺取性命的机会到来。"
          violet: "会在半夜潜入人的影子，\n一点点地夺走人的体温。\n如果被它盯上，就会全身不停地发冷。"
        zh_trad:
          scarlet: "會潛進獵物的影子裡，\n然後靜靜地等待\n奪取性命的機會到來。"
          violet: "會在半夜潛入人的影子，\n一點點地奪走人的體溫。\n如果被牠盯上，全身就會不停發冷。"
