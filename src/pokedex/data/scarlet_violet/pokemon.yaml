          scarlet: "ジャングルを　￹身軽￺みがる￻に　￹走￺はし￻りまわり\n￹腕￺うで￻に　￹生￺は￻えた　￹切￺き￻れ￹味￺あじ￻　￹鋭￺するど￻い　￹葉￺は￻っぱで\n￹獲物￺えもの￻を　￹仕留￺しと￻めるのだ。"
          violet: "￹腕￺うで￻に　￹生￺は￻えた　￹葉￺は￻っぱは　￹刀￺かたな￻の\n￹切￺き￻れ￹味￺あじ￻。　￹木￺き￻の￹枝￺えだ￻を　￹身軽￺みがる￻に\n￹飛￺と￻び￹移￺うつ￻り　￹敵￺てき￻に　￹襲￺おそ￻いかかる。"
        jp_kanji:
          scarlet: "ジャングルを　￹身軽￺みがる￻に　￹走￺はし￻りまわり\n￹腕￺うで￻に　￹生￺は￻えた　￹切￺き￻れ￹味￺あじ￻　￹鋭￺するど￻い　￹葉￺は￻っぱで\n￹獲物￺えもの￻を　￹仕留￺しと￻めるのだ。"
          violet: "￹腕￺うで￻に　￹生￺は￻えた　￹葉￺は￻っぱは　￹刀￺かたな￻の\n￹切￺き￻れ￹味￺あじ￻。　￹木￺き￻の￹枝￺えだ￻を　￹身軽￺みがる￻に\n￹飛￺と￻び￹移￺うつ￻り　￹敵￺てき￻に　￹襲￺おそ￻いかかる。"
        en:
          scarlet: "It agilely flits through the jungle and uses the\nsharp-edged leaves on its arms to cut down its\nprey."
          violet: "The leaves on its arms are as sharp as swords.\nIt agilely leaps about the branches of trees to\nstrike its enemies."
        fr:
          scarlet: "Il parcourt rapidement et agilement la jungle\nen éliminant ses proies grâce aux feuilles\ntranchantes sur ses bras."
          violet: "Les feuilles sur ses bras sont aussi tranchantes\nque des épées. Il saute habilement de branche\nen branche avant de fondre sur sa cible."
        it:
          scarlet: "Percorre agile e veloce la giungla abbattendo\nle prede con le affilate foglie che ha sugli arti\nanteriori."
          violet: "Le foglie sugli arti anteriori sono affilate\ncome lame. Assale i nemici saltando\nagilmente di ramo in ramo."
        de:
          scarlet: "Es huscht agil durch den Dschungel und erlegt\nseine Beute mit den scharfen Blättern an seinen\nArmen."
          violet: "Die Blätter an seinen Armen sind so scharf wie\nSchwerter. Es hüpft mühelos von Ast zu Ast und\nstürzt sich dann auf seine Feinde."
        es:
          scarlet: "Corretea ágil y veloz por la selva y emplea\nlas afiladas hojas de sus brazos para darles\nel golpe de gracia a sus presas."
          violet: "Las hojas que le crecen en los brazos están\nafiladas como cuchillas. Ataca a sus enemigos\nsaltando grácilmente de rama en rama."
        ko:
          scarlet: "정글을 가볍게 뛰어다니며\n팔에 자란 예리하고 잘 드는 잎날로\n먹이를 꼼짝 못 하게 한다."
          violet: "팔에 자란 잎사귀는 칼날처럼 예리하다.\n나뭇가지 사이를 가뿐하게 뛰어다니며\n적을 습격한다."
        zh_simp:
          scarlet: "会轻快地在丛林里跑来跑去，\n并用手臂上长出的锋利叶子解决猎物。"
          violet: "手臂上长出的叶子锋利如刀。\n能轻巧地在树枝之间跳跃，\n向敌人发起袭击。"
        zh_trad:
          scarlet: "會輕快地在叢林裡跑來跑去，\n用長在手臂上的鋒利葉子解決獵物。"
          violet: "長在手臂上的葉子鋒利如刀。\n會在枝頭間輕巧地跳躍移動，\n飛撲襲擊敵人。"
