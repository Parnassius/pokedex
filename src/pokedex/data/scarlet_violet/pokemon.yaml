      descriptions:
        jp_kana:
          scarlet: "￹仲間同士￺なかまどうし￻で　￹波動￺はどう￻を　￹出￺だ￻して\nコミュニケーションを　とっている。\n￹一晩中￺ひとばんじゅう￻　￹走￺はし￻り￹続￺つづ￻けられる。"
          violet: "￹喜￺よろこ￻びや　￹怒￺いか￻りと　いった　￹感情￺かんじょう￻を\n￹波￺なみ￻の￹形￺かたち￻　として　￹見分￺みわ￻ける\n￹不思議￺ふしぎ￻な￹力￺ちから￻を　￹持￺も￻つ。"
        jp_kanji:
          scarlet: "￹仲間同士￺なかまどうし￻で　￹波動￺はどう￻を　￹出￺だ￻して\nコミュニケーションを　とっている。\n￹一晩中￺ひとばんじゅう￻　￹走￺はし￻り￹続￺つづ￻けられる。"
          violet: "￹喜￺よろこ￻びや　￹怒￺いか￻りと　いった　￹感情￺かんじょう￻を\n￹波￺なみ￻の￹形￺かたち￻　として　￹見分￺みわ￻ける\n￹不思議￺ふしぎ￻な￹力￺ちから￻を　￹持￺も￻つ。"
        en:
          scarlet: "They communicate with one another using their\nauras. They are able to run all through the night."
          violet: "It has the peculiar power of being able to see\nemotions, such as joy and rage, in the form\nof waves."
        fr:
          scarlet: "Les Riolu communiquent entre eux à l’aide de\nleur aura. Ils sont capables de courir toute la nuit."
          violet: "Il possède la faculté unique de visualiser\nles émotions telles que la joie ou la colère\nsous forme d’ondes."
        it:
          scarlet: "Comunica con i suoi simili tramite l’aura.\nPuò correre un’intera notte senza stancarsi."
          violet: "È dotato di un potere misterioso che gli permette\ndi vedere emozioni come rabbia e gioia sotto\nforma di onde."
        de:
          scarlet: "Dieses Pokémon nutzt seine Aura, um mit seinen\nArtgenossen zu kommunizieren. Es kann eine\nganze Nacht lang laufen."
          violet: "Es hat die eigenartige Fähigkeit, Gefühle wie\nFreude oder Wut in Wellenform zu sehen."
        es:
          scarlet: "Se comunica con los suyos emitiendo ondas.\nPuede pasarse toda una noche corriendo."
          violet: "Tiene un poder peculiar: puede ver emociones\ncomo el odio y la alegría en forma de ondas."
        ko:
          scarlet: "파동을 내서\n동료끼리 의사소통을 한다.\n밤새도록 계속 달릴 수 있다."
          violet: "기쁨과 분노 등의 감정을\n물결의 형태로 만들어 분별하는\n이상한 힘을 지녔다."
        zh_simp:
          scarlet: "伙伴之间会通过发出\n波导来进行与彼此的沟通。\n可以持续奔跑一整晚。"
          violet: "它所拥有的神奇力量\n可以通过波形来分辨\n喜悦和愤怒这样的情感。"
        zh_trad:
          scarlet: "夥伴們之間會透過發出\n波導來與彼此溝通。\n跑步可以跑上一整晚。"
          violet: "擁有能夠透過波形\n來分辨出喜悅及憤怒\n等情感的神奇力量。"
