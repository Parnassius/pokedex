      descriptions:
        jp_kana:
          scarlet: "オスが　￹子供￺こども￻を　￹育￺そだ￻てる。\nそのとき　￹近￺ちか￻づくものは　￹猛毒￺もうどく￻の\nトゲを　￹使￺つか￻って　￹追￺お￻い￹払￺はら￻う。"
          violet: "ヒレの　￹先￺さき￻から　￹毒￺どく￻を　￹分泌￺ぶんぴつ￻。\nヒレや　￹骨￺ほね￻は　￹漢方薬￺かんぽうやく￻の\n￹材料￺ざいりょう￻として　￹重宝￺ちょうほう￻される。"
        jp_kanji:
          scarlet: "オスが　￹子供￺こども￻を　￹育￺そだ￻てる。\nそのとき　￹近￺ちか￻づくものは　￹猛毒￺もうどく￻の\nトゲを　￹使￺つか￻って　￹追￺お￻い￹払￺はら￻う。"
          violet: "ヒレの　￹先￺さき￻から　￹毒￺どく￻を　￹分泌￺ぶんぴつ￻。\nヒレや　￹骨￺ほね￻は　￹漢方薬￺かんぽうやく￻の\n￹材料￺ざいりょう￻として　￹重宝￺ちょうほう￻される。"
        en:
          scarlet: "The male raises the young. If it is approached\nwhile caring for young, it will use its toxic spines\nto fend off the intruder."
          violet: "Its fin tips leak poison. Its fins and bones are\nhighly valued as ingredients in herbal medicine."
        fr:
          scarlet: "C’est le mâle qui élève les petits. Il repousse\nquiconque l’approche avec ses pointes\nempoisonnées."
          violet: "Les extrémités de ses nageoires sécrètent\ndu poison. Ces dernières ainsi que ses os\nsont très recherchés en médecine naturelle."
        it:
          scarlet: "Il maschio si occupa dei piccoli e li protegge\nscacciando con i suoi aculei velenosi chiunque\nsi avvicini."
          violet: "Secerne veleno dalla punta delle pinne.\nLe pinne e le ossa sono pregiati ingredienti\nnella preparazione di rimedi naturali."
        de:
          scarlet: "Das Männchen zieht den Nachwuchs auf. Nähert\nsich in dieser Zeit ein Störenfried, setzt es\nhochgiftige Stacheln ein, um ihn zu vertreiben."
          violet: "Aus seinen Flossenspitzen tritt Gift aus. Seine\nFlossen und Knochen stehen als Inhaltsstoffe\nfür traditionelle Medizin hoch im Kurs."
        es:
          scarlet: "En esta especie, es el macho quien se ocupa de\ncuidar a las crías, a las que defiende con sus púas\nvenenosas de cualquiera que se les acerque."
          violet: "Segrega veneno por la punta de las aletas. Estas\ny sus huesos son ingredientes muy valorados en\nla medicina tradicional."
        ko:
          scarlet: "수컷이 새끼를 키운다.\n이때 접근하는 자가 있으면\n맹독을 띠는 가시로 쫓아낸다."
          violet: "지느러미 끝에서 독을 분비한다.\n지느러미와 뼈는 한약의 재료로\n소중하게 여겨지고 있다."
        zh_simp:
          scarlet: "由雄性负责抚养孩子。\n育儿期间会用带剧毒的刺\n赶走靠近它们的东西。"
          violet: "能从鳍的前端分泌出毒。\n鳍和骨头是好用的中药材。"
        zh_trad:
          scarlet: "是由雄性來養育孩子。\n育兒時會用帶有劇毒的刺\n趕走靠近牠們的對象。"
          violet: "會從鰭的前端分泌毒。\n牠的鰭和骨頭很適合\n拿來當作中藥材。"
