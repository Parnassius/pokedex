          scarlet: "￹未熟￺みじゅく￻な　￹翅￺はね￻は　￹飛￺と￻ぶことよりも\n￹擦￺こす￻って　￹超音波￺ちょうおんぱ￻を　￹出￺だ￻して\n￹敵￺てき￻を　￹攻撃￺こうげき￻するのに　￹使￺つか￻う。"
          violet: "￹翅￺はね￻を　￹激￺はげ￻しく　￹振動￺しんどう￻させて\n￹超音波￺ちょうおんぱ￻を　￹発生￺はっせい￻。　￹気絶￺きぜつ￻した　￹獲物￺えもの￻を\n￹消化液￺しょうかえき￻で　￹溶￺と￻かす。"
        jp_kanji:
          scarlet: "￹未熟￺みじゅく￻な　￹翅￺はね￻は　￹飛￺と￻ぶことよりも\n￹擦￺こす￻って　￹超音波￺ちょうおんぱ￻を　￹出￺だ￻して\n￹敵￺てき￻を　￹攻撃￺こうげき￻するのに　￹使￺つか￻う。"
          violet: "￹翅￺はね￻を　￹激￺はげ￻しく　￹振動￺しんどう￻させて\n￹超音波￺ちょうおんぱ￻を　￹発生￺はっせい￻。　￹気絶￺きぜつ￻した　￹獲物￺えもの￻を\n￹消化液￺しょうかえき￻で　￹溶￺と￻かす。"
        en:
          scarlet: "Rather than using its underdeveloped wings for\nflight, it rubs them together, emitting ultrasonic\nwaves to attack its enemies."
          violet: "It generates ultrasonic waves by vigorously\nvibrating its wings. After making its prey faint,\nit dissolves the prey with its digestive juices."
        fr:
          scarlet: "Ses ailes encore peu développées lui servent\nmoins à voler qu’à envoyer des ultrasons créés\npar frottement pour attaquer ses adversaires."
          violet: "Ce Pokémon émet des ondes ultrasoniques en\nbattant violemment des ailes pour assommer ses\nproies, qu’il dissout ensuite avec ses sucs digestifs."
        it:
          scarlet: "Le sue ali non sono del tutto sviluppate. Più che\nper volare, le usa per attaccare i nemici con le\nonde ultrasoniche che produce sfregandole."
          violet: "Facendo vibrare le ali con violenza genera onde\nultrasoniche per far svenire la preda, che poi\nscioglie con i propri succhi gastrici."
        de:
          scarlet: "Vibravas Flügel sind zum Fliegen kaum geeignet.\nEs reibt sie aneinander, um Ultraschallwellen zu\nerzeugen und so seine Gegner anzugreifen."
          violet: "Durch gewaltiges Schlagen seiner Flügel\nentstehen Ultraschallwellen. Ohnmächtig\ngewordene Beute löst es mittels Säure auf."
        es:
          scarlet: "Las alas de Vibrava están subdesarrolladas.\nMás que para volar, las frota para crear ondas\nultrasónicas con las que ataca a sus enemigos."
          violet: "Crea ondas ultrasónicas haciendo vibrar las alas\ncon violencia. Una vez que su presa pierde el\nconocimiento, la disuelve con sus jugos gástricos."
        ko:
          scarlet: "미숙한 날개는 나는 것보다는\n비벼서 발생하는 초음파로\n적을 공격하는 데 사용한다."
          violet: "날개를 격렬하게 진동시켜서\n초음파를 발생시킨다.\n기절한 먹이를 소화액으로 녹인다."
        zh_simp:
          scarlet: "还不发达的翅膀，\n比起飞行，反而更多地用于\n通过摩擦产生超音波攻击敌人。"
          violet: "会剧烈地振动翅膀来产生超音波。\n能用消化液来溶化昏迷的猎物。"
        zh_trad:
          scarlet: "還未發達的翅膀比起用於飛行，\n更常用來摩擦發出超音波，\n從而攻擊敵人。"
          violet: "會劇烈地振動翅膀\n來產生超音波。\n能用消化液來溶解昏迷的獵物。"
