          scarlet: "When its wings catch the wind, the bones within\nproduce electricity. This Pokémon dives into the\nocean, catching prey by electrocuting them."
          violet: "These Pokémon make their nests on coastal\ncliffs. The nests have a strange, crackling\ntexture, and they’re a popular delicacy."
        fr:
          scarlet: "Les os de ses ailes produisent de l’électricité\ngrâce au vent. Pour chasser, ce Pokémon plonge\ndans la mer et électrocute ses proies."
          violet: "Il niche sur les falaises côtières. Son nid possède\nune texture particulière et un goût naturellement\npétillant, ce qui en fait un mets très recherché."
        it:
          scarlet: "Le ossa delle sue ali generano energia elettrica\nsfruttando il vento. Si tuffa in mare e folgora\nle prede per poi catturarle."
          violet: "Nidifica sui dirupi a picco sul mare.\nIl suo nido è una prelibatezza molto amata\nper l’insolita consistenza scoppiettante."
        de:
          scarlet: "Trifft Wind auf seine Flügel, erzeugen deren\nKnochen Strom. Es fängt Beute, indem es ins\nMeer taucht und ihr einen Stromschlag verpasst."
          violet: "Es nistet an Steilküsten. Seine Nester sind als\nDelikatesse geschätzt, da ihre Textur ein\nseltsames Knistergefühl im Mund erzeugt."
        es:
          scarlet: "Los huesos de sus alas producen electricidad con\nlas corrientes de aire. Para cazar, se zambulle en\nel mar y electrocuta a su presa."
          violet: "Anida en acantilados costeros. Su nido se\nconsidera un auténtico manjar debido a su\nextraña textura chisporroteante."
        ko:
          scarlet: "날개의 뼈는 바람을 받으면\n전기를 만들어 낸다. 바다에 뛰어들어\n먹이를 감전시켜서 잡는다."
          violet: "바닷가 절벽에 둥지를 짓는다.\n둥지는 바삭바삭한 식감 덕에\n인기 있는 별미다."
        zh_simp:
          scarlet: "当翅膀的骨头受到风吹时，\n就能制造电力。会冲进海里\n让猎物触电后将其捕获。"
          violet: "在海岸的悬崖上筑巢。\n它的巢具有在嘴里蹦跳的神奇口感，\n因此是受欢迎的珍味佳肴。"
        zh_trad:
          scarlet: "當翅膀的骨頭受到風吹時，\n就能製造出電力。會衝進\n海裡讓獵物觸電後將其捕獲。"
          violet: "會在海岸的懸崖上築巢。\n吃起來劈哩啪啦跳的神奇口感，\n讓牠的巢成了受歡迎的珍奇美食。"
