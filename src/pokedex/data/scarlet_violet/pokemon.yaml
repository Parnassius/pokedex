      descriptions:
        jp_kana:
          scarlet: "ダイヤモンドの　￹原石￺げんせき￻を　￹砕￺くだ￻く\n￹威力￺いりょく￻の　ツノを　￹仲間同士￺なかまどうし￻で\nぶつけあって　￹磨￺みが￻きあげている。"
          violet: "￹後￺うし￻ろ￹脚￺あし￻だけで　￹歩￺ある￻けるように\n￹進化￺しんか￻したので　￹険￺けわ￻しい　￹山￺やま￻にも\n￹生息地￺せいそくち￻を　￹広￺ひろ￻げられたのだ。"
        jp_kanji:
          scarlet: "ダイヤモンドの　￹原石￺げんせき￻を　￹砕￺くだ￻く\n￹威力￺いりょく￻の　ツノを　￹仲間同士￺なかまどうし￻で\nぶつけあって　￹磨￺みが￻きあげている。"
          violet: "￹後￺うし￻ろ￹脚￺あし￻だけで　￹歩￺ある￻けるように\n￹進化￺しんか￻したので　￹険￺けわ￻しい　￹山￺やま￻にも\n￹生息地￺せいそくち￻を　￹広￺ひろ￻げられたのだ。"
        en:
          scarlet: "The horn of a Rhydon is powerful enough\nto crush raw diamonds. These Pokémon polish\ntheir horns by bashing them together."
          violet: "It evolved to walk using only its hind legs,\nwhich has allowed it to expand its habitat\neven onto steep mountains."
        fr:
          scarlet: "Il frappe sa corne contre celle de ses congénères\nafin de la renforcer. Celle-ci est assez robuste\npour briser un diamant à l’état brut."
          violet: "Grâce à son évolution, il peut se déplacer sur\nses pattes arrière, ce qui lui a permis d’étendre\nson territoire aux montagnes escarpées."
        it:
          scarlet: "Si scontra con i suoi simili per affinare\nil corno che può fracassare perfino\ni diamanti grezzi."
          violet: "Grazie all’evoluzione può camminare sulle sole\nzampe posteriori, per questo il suo habitat si è\nesteso fino a comprendere anche monti scoscesi."
        de:
          scarlet: "Mit seinem Horn kann es selbst Rohdiamanten\nzertrümmern. Artgenossen stoßen ihre Hörner\naneinander, um sie zu schärfen."
          violet: "Da es nach seiner Entwicklung aufrecht auf\nseinen Hinterbeinen gehen kann, erstreckt sich\nsein Lebensraum nun auch über raue Berge."
        es:
          scarlet: "Hace chocar el cuerno con el de sus\ncongéneres para afilarlo. Es capaz de\nhoradar diamantes en bruto con él."
          violet: "Al evolucionar aprendió a andar sobre sus\npatas traseras, lo que le permitió expandir\nsu hábitat a montañas escarpadas."
        ko:
          scarlet: "다이아몬드 원석도 부숴 버리는\n위력을 자랑하는 뿔을\n동료들과 부딪치며 단련한다."
          violet: "뒷발로만 걸을 수 있게\n진화하면서 험준한 산까지\n서식지를 넓힐 수 있었다."
        zh_simp:
          scarlet: "角的威力足以粉碎钻石原石。\n会和伙伴碰撞彼此的角，\n来对角进行打磨。"
          violet: "因为进化成仅靠后腿便能\n走路了，所以即使在险要的\n山上，也能扩展栖息地了。"
        zh_trad:
          scarlet: "角的威力足以粉碎鑽石原石。\n會與夥伴碰撞彼此的角，\n藉此來打磨打亮它。"
          violet: "進化後變得可以只用\n後腳步行，因此將棲息地\n拓展到了險峻的山地。"
