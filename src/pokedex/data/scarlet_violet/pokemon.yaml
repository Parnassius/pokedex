          scarlet: "￹頭￺あたま￻の　￹葉￺は￻っぱは　￹汚￺よご￻れを　￹弾￺はじ￻く\n￹性質￺せいしつ￻。　￹泥￺どろ￻だらけの　ポケモンを\n￹乗￺の￻せても　￹葉￺は￻っぱは　きれいなままだ。"
          violet: "￹水質￺すいしつ￻の　￹良￺よ￻い　￹池￺いけ￻は　ハスボーが\nたくさん　￹集￺あつ￻まるので　￹葉￺は￻っぱで\n￹水面￺すいめん￻が　￹覆￺おお￻われることもある。"
        jp_kanji:
          scarlet: "￹頭￺あたま￻の　￹葉￺は￻っぱは　￹汚￺よご￻れを　￹弾￺はじ￻く\n￹性質￺せいしつ￻。　￹泥￺どろ￻だらけの　ポケモンを\n￹乗￺の￻せても　￹葉￺は￻っぱは　きれいなままだ。"
          violet: "￹水質￺すいしつ￻の　￹良￺よ￻い　￹池￺いけ￻は　ハスボーが\nたくさん　￹集￺あつ￻まるので　￹葉￺は￻っぱで\n￹水面￺すいめん￻が　￹覆￺おお￻われることもある。"
        en:
          scarlet: "The leaf on its head is naturally dirt repellent\nand will stay clean even after transporting\nPokémon that are covered in mud."
          violet: "Lotad will gather in lakes that have good water\nquality. The surfaces of these lakes sometimes\nbecome covered in Lotad leaves."
        fr:
          scarlet: "La feuille sur sa tête repousse la saleté\net reste toujours propre, même s’il est\namené à transporter un Pokémon boueux."
          violet: "Les Nénupiot se rassemblent dans les étangs\nà l’eau pure. Ils sont parfois si nombreux que\nleurs feuilles en recouvrent totalement la surface."
        it:
          scarlet: "La foglia che ha in testa possiede la proprietà\ndi repellere lo sporco, perciò resta pulita anche\nse ci salgono dei Pokémon tutti infangati."
          violet: "Si concentrano nei laghi dall’acqua pulita,\narrivando a volte a ricoprirne l’intera superficie\ncon le loro foglie."
        de:
          scarlet: "Das Blatt auf seinem Kopf ist schmutzabweisend.\nDaher bleibt es selbst dann sauber, wenn ein\nfurchtbar dreckiges Pokémon darauf reitet."
          violet: "Loturzel versammeln sich in Scharen auf Teichen\nmit guter Wasserqualität. Dabei kommt es vor,\ndass ihre Blätter die ganze Oberfläche bedecken."
        es:
          scarlet: "La hoja que tiene en la cabeza puede repeler la\nsuciedad, por lo que permanece limpia aunque\ntransporte un Pokémon lleno de lodo."
          violet: "Se reúnen en masa en estanques de agua limpia,\nlo que en ocasiones provoca que la superficie\nquede completamente cubierta por sus hojas."
        ko:
          scarlet: "머리의 잎사귀는 먼지를 튕겨 내는\n성질을 가졌다. 진흙투성이인 포켓몬을\n태워도 잎사귀는 여전히 깨끗하다."
          violet: "수질이 좋은 연못에는\n연꽃몬이 잔뜩 모여 있어서\n수면이 잎사귀로 뒤덮이기도 한다."
        zh_simp:
          scarlet: "头上的叶子拥有防污的特性。\n即使承载满身泥巴的宝可梦，\n也能保持叶子洁净。"
          violet: "在水质好的池塘会有\n大量莲叶童子聚集，因此\n有时水面会被叶子覆盖。"
        zh_trad:
          scarlet: "頭上的葉子具有防污的性質。\n即使載了滿身是泥的寶可夢，\n葉子也能常保乾淨。"
          violet: "水質良好的池塘會有許多\n蓮葉童子聚集，因此水面\n有時會被葉子給覆蓋住。"
