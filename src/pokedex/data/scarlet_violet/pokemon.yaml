      descriptions:
        jp_kana:
          scarlet: "￹溶岩￺ようがん￻で　できた　￹体￺からだ￻は\n￹冷￺ひ￻えて　￹欠￺か￻けてしまうこともあるが\nマグマに　￹浸￺つ￻かると　￹治￺なお￻るのだ。"
          violet: "￹火山￺かざん￻が　￹活発￺かっぱつ￻だった　￹太古￺たいこ￻の\n￹世界￺せかい￻では　￹今￺いま￻よりも　たくさんの\nマグマッグが　￹暮￺く￻らしていたという。"
        jp_kanji:
          scarlet: "￹溶岩￺ようがん￻で　できた　￹体￺からだ￻は\n￹冷￺ひ￻えて　￹欠￺か￻けてしまうこともあるが\nマグマに　￹浸￺つ￻かると　￹治￺なお￻るのだ。"
          violet: "￹火山￺かざん￻が　￹活発￺かっぱつ￻だった　￹太古￺たいこ￻の\n￹世界￺せかい￻では　￹今￺いま￻よりも　たくさんの\nマグマッグが　￹暮￺く￻らしていたという。"
        en:
          scarlet: "Its lava body can cool and chip away at times,\nbut a magma bath will heal it right up."
          violet: "It’s said that in ancient times, when volcanoes\nwere more active, there were many more Slugma\nthan there are now."
        fr:
          scarlet: "Lorsqu’il se refroidit, son corps constitué de lave\npeut parfois se fissurer. Il lui suffit alors de\ns’immerger dans le magma pour se régénérer."
          violet: "Il paraît qu’à la lointaine époque où les volcans\nétaient plus actifs, les Limagma étaient\nbien plus nombreux qu’aujourd’hui."
        it:
          scarlet: "A volte il suo corpo fatto di lava si raffredda e\nperde dei pezzi. Tuttavia, gli basta immergersi\nnel magma per rigenerarsi."
          violet: "Pare che nel mondo antico, quando c’era\npiù attività vulcanica, esistevano molti\npiù Slugma di oggi."
        de:
          scarlet: "Es kommt vor, dass sein Lavakörper zu bröckeln\nbeginnt, wenn er auskühlt. Badet es in Magma,\nregeneriert es sich aber wieder."
          violet: "Vor Urzeiten, als die Vulkane noch aktiver waren,\nsoll es viel mehr Schneckmag gegeben haben als\nheutzutage."
        es:
          scarlet: "Si se enfría, su cuerpo de magma puede llegar a\nresquebrajarse, pero le basta un baño de lava\npara que se regenere."
          violet: "Se cree que en tiempos remotos, cuando había\nmás actividad volcánica, el número de Slugma\nera mayor que ahora."
        ko:
          scarlet: "용암으로 된 몸은\n식어서 허물어질 때도 있지만\n마그마에 들어가면 낫는다."
          violet: "화산 활동이 활발했던\n태곳적 세계에서는 오늘날보다 많은 수의\n마그마그가 살았다고 한다."
        zh_simp:
          scarlet: "由熔岩构成的身体有时\n会因变冷而缺损，但只要\n泡到熔岩中就能恢复。"
          violet: "据说在火山活动频繁的\n太古时代，世界上生活着\n比现在还多的熔岩虫。"
        zh_trad:
          scarlet: "由熔岩構成的身體有時會因\n冷卻而碎缺，但只要浸泡在\n岩漿中就會恢復了。"
          violet: "聽說在火山活動頻繁的\n太古時代，世界上生活著\n比現在更多的熔岩蟲。"
