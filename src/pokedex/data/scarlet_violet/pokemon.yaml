      hidden_ability: slush_rush
      descriptions:
        jp_kana:
          scarlet: "￹雪山￺ゆきやま￻に　￹棲￺す￻む。　￹鋼￺はがね￻の￹甲羅￺こうら￻は\nとても　￹頑丈￺がんじょう￻だが　￹硬￺かた￻すぎて\n￹体￺からだ￻を　￹丸￺まる￻めることが　できない。"
          violet: "￹氷￺こおり￻の　￹上￺うえ￻で　サンドを　￹滑￺すべ￻らせ\nその￹距離￺きょり￻を　￹競￺きそ￻う。　￹古来￺こらい￻から\n￹続￺つづ￻く　アローラの￹祭￺まつ￻りの　ひとつ。"
        jp_kanji:
          scarlet: "￹雪山￺ゆきやま￻に　￹棲￺す￻む。　￹鋼￺はがね￻の￹甲羅￺こうら￻は\nとても　￹頑丈￺がんじょう￻だが　￹硬￺かた￻すぎて\n￹体￺からだ￻を　￹丸￺まる￻めることが　できない。"
          violet: "￹氷￺こおり￻の　￹上￺うえ￻で　サンドを　￹滑￺すべ￻らせ\nその￹距離￺きょり￻を　￹競￺きそ￻う。　￹古来￺こらい￻から\n￹続￺つづ￻く　アローラの￹祭￺まつ￻りの　ひとつ。"
        en:
          scarlet: "It lives on snowy mountains. Its steel shell is\nvery hard—so much so, it can’t roll its body up\ninto a ball."
          violet: "An ancient tradition of Alolan festivals, still\ncarried on to this day, is a competition to slide\nSandshrew across ice as far as one can."
        fr:
          scarlet: "Il vit dans les montagnes enneigées. Sa carapace\nd’acier est très solide, mais elle est trop rigide\npour qu’il puisse se rouler en boule."
          violet: "L’une des plus vieilles traditions festives d’Alola\nest un concours qui consiste à faire glisser\ndes Sabelette sur la glace le plus loin possible."
        it:
          scarlet: "Vive sulle montagne innevate. La sua corazza\nd’acciaio è molto robusta, ma anche così dura\nda non permettergli di appallottolarsi del tutto."
          violet: "In una delle feste tradizionali della regione\ndi Alola, i partecipanti gareggiano a far scivolare\nun Sandshrew più lontano possibile sul ghiaccio."
        de:
          scarlet: "Es lebt auf verschneiten Bergen. Sein stählerner\nPanzer ist zwar robust, aber so hart, dass es den\nKörper nicht vollständig zusammenrollen kann."
          violet: "Bei einem der traditionellen Feste Alolas messen\nsich die Teilnehmer darin, ihre Sandan so weit\nwie möglich über Eisflächen gleiten zu lassen."
        es:
          scarlet: "Vive en montañas nevadas. Su caparazón de\nacero es muy resistente, pero tiene tal dureza\nque no le permite enrollarse del todo."
          violet: "Un festival ancestral que se sigue celebrando en\nAlola consiste en hacer deslizar a un Sandshrew\nsobre el hielo para ver quién lo lanza más lejos."
        ko:
          scarlet: "설산에 산다. 강철의 등껍질은\n아주 튼튼하지만 너무 딱딱해서\n몸을 구부릴 수가 없다."
          violet: "얼음 위에 모래두지를 미끄러뜨려\n그 거리를 겨루는 것은 먼 옛날부터\n이어진 알로라의 축제 중 하나다."
        zh_simp:
          scarlet: "栖息在雪山。钢的甲壳\n非常坚固，但因为过于坚硬，\n身体没法蜷缩起来。"
          violet: "让穿山鼠在冰上滑行，\n比赛滑行的距离。\n这是自古就有的阿罗拉的庆典之一。"
        zh_trad:
          scarlet: "棲息在雪山。鋼鐵的甲殼\n非常堅固，但因為過於堅硬，\n身體沒法蜷縮起來。"
          violet: "讓穿山鼠在冰上滑行，\n比賽滑行的距離。\n這是阿羅拉自古就有的慶典之一。"
