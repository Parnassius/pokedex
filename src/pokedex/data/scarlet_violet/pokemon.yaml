        - slush_rush
      hidden_ability: rattled
      descriptions:
        jp_kana:
          scarlet: "￹寒￺さむ￻い　￹地域￺ちいき￻の　￹海辺￺うみべ￻に　￹多￺おお￻い。\n￹鼻水￺はなみず￻が　￹垂￺た￻れていない　ときは\n￹病気￺びょうき￻の　￹可能性￺かのうせい￻が　ある。"
          violet: "くしゃみを　￹始￺はじ￻めたら　￹注意￺ちゅうい￻。\n￹冷気￺れいき￻を　まとった　￹鼻水￺はなみず￻を\n￹浴￺あ￻びると　￹凍傷￺とうしょう￻になるぞ。"
        jp_kanji:
          scarlet: "￹寒￺さむ￻い　￹地域￺ちいき￻の　￹海辺￺うみべ￻に　￹多￺おお￻い。\n￹鼻水￺はなみず￻が　￹垂￺た￻れていない　ときは\n￹病気￺びょうき￻の　￹可能性￺かのうせい￻が　ある。"
          violet: "くしゃみを　￹始￺はじ￻めたら　￹注意￺ちゅうい￻。\n￹冷気￺れいき￻を　まとった　￹鼻水￺はなみず￻を\n￹浴￺あ￻びると　￹凍傷￺とうしょう￻になるぞ。"
        en:
          scarlet: "Many of this species can be found along the\nshorelines of cold regions. If a Cubchoo lacks\ndangling snot, there’s a chance it is sick."
          violet: "When Cubchoo starts sneezing, watch out!\nIf it spatters you with its frosty snot, you’ll\nget frostbite."
        fr:
          scarlet: "On le trouve abondamment sur les côtes\ndes zones froides. S’il n’a pas sa goutte au nez,\nc’est peut-être qu’il est malade."
          violet: "La prudence est de mise lorsqu’il s’apprête\nà éternuer, car sa morve est si froide qu’elle\nprovoque des engelures sur ceux qu’elle touche."
        it:
          scarlet: "Se ne trovano molti esemplari sulle coste delle\nzone più fredde. Se non ha il naso gocciolante,\npotrebbe essere malato."
          violet: "Attenzione se comincia a starnutire: il contatto\ncon il suo muco gelido provoca geloni."
        de:
          scarlet: "Sie kommen verstärkt an den Küsten kalter\nGebiete vor. Wenn einem Petznief kein Schleim\naus der Nase hängt, ist es womöglich krank."
          violet: "Man sollte sich in Acht nehmen, wenn es niesen\nmuss. Bekommt man den eisigen Nasenschleim\nab, führt das zu Frostbeulen."
        es:
          scarlet: "Abundan en las costas de las regiones más frías.\nSi no le cuelga un moco, es probable que esté\nenfermo."
          violet: "Conviene apartarse si hace amago de estornudar,\npues el contacto directo con su gélido moco\npuede provocar lesiones por congelación."
        ko:
          scarlet: "추운 지역의 바닷가에 많다.\n콧물을 흘리고 있지 않으면\n병에 걸렸을 수도 있다."
          violet: "재채기하기 시작했다면 조심해야 한다.\n냉기를 두른 콧물에 닿으면\n동상을 입게 되기 때문이다."
        zh_simp:
          scarlet: "经常出现在寒冷地区的海边。\n当它没有挂着鼻涕时，\n就代表它可能生病了。"
          violet: "当它要打喷嚏时就得小心了。\n如果被它那带有寒气的\n鼻涕喷到，可是会冻伤的。"
        zh_trad:
          scarlet: "經常出現在寒冷地帶的海邊。\n沒掛著一沱鼻涕的時候，\n就代表牠可能是生病了。"
          violet: "當牠開始打噴嚏時，就要提高\n警覺了。如果被牠那帶著寒氣\n的鼻涕噴到，可是會凍傷的。"
