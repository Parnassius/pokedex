      hidden_ability: symbiosis
      descriptions:
        jp_kana:
          scarlet: "￹黄色￺きいろ￻の￹花￺はな￻に　￹乗￺の￻った　フラベベ。\n￹花￺はな￻を　￹見￺み￻つけて　その　￹力￺ちから￻を\n￹貰￺もら￻うまでは　￹無防備￺むぼうび￻で　￹危険￺きけん￻。"
          violet: "￹花￺はな￻の　￹力￺ちから￻を　￹引￺ひ￻き￹出￺だ￻すことで\n￹様々￺さまざま￻な　￹技￺わざ￻を　￹繰￺く￻り￹出￺だ￻すのだ。\nとくに　￹黄色￺きいろ￻の￹花￺はな￻が　￹好￺す￻き。"
        jp_kanji:
          scarlet: "￹黄色￺きいろ￻の￹花￺はな￻に　￹乗￺の￻った　フラベベ。\n￹花￺はな￻を　￹見￺み￻つけて　その　￹力￺ちから￻を\n￹貰￺もら￻うまでは　￹無防備￺むぼうび￻で　￹危険￺きけん￻。"
          violet: "￹花￺はな￻の　￹力￺ちから￻を　￹引￺ひ￻き￹出￺だ￻すことで\n￹様々￺さまざま￻な　￹技￺わざ￻を　￹繰￺く￻り￹出￺だ￻すのだ。\nとくに　￹黄色￺きいろ￻の￹花￺はな￻が　￹好￺す￻き。"
        en:
          scarlet: "This Flabébé rides a yellow flower. The Pokémon\nis defenseless and vulnerable before it has found\nand received power from a flower."
          violet: "It unleashes a variety of moves by drawing forth\nthe power hidden within flowers. This Pokémon is\nparticularly fond of yellow flowers."
        fr:
          scarlet: "Ce Flabébé est perché sur une fleur jaune.\nAvant de la trouver et de se nourrir de\nsa puissance, il était sans défense."
          violet: "Ce Pokémon utilise des capacités variées\ngrâce à l’énergie qu’il extrait des fleurs.\nIl aime particulièrement les fleurs jaunes."
        it:
          scarlet: "Un Flabébé su un fiore giallo. Finché non trova\nun fiore da cui ricavare la forza è indifeso e\nvulnerabile."
          violet: "Sferra una varietà di mosse sfruttando la forza\ndei fiori. Predilige i fiori gialli."
        de:
          scarlet: "Dieses Flabébé umklammert eine gelbe Blume.\nBevor es eine Blume findet, die ihm Kraft gibt,\nist es allen Gefahren schutzlos ausgeliefert."
          violet: "Es entlockt Blumen ihre Kräfte und setzt diese für\neine Vielzahl von Attacken ein. Gelbe Blumen\nhaben es ihm besonders angetan."
        es:
          scarlet: "Cabalga una flor amarilla. Hasta que encuentra\nuna flor y se nutre de su poder, se halla sin\ndefensas y en peligro."
          violet: "Usa un amplio abanico de movimientos gracias\nal poder que le confieren las flores. Las que más\nle gustan son las amarillas."
        ko:
          scarlet: "노란 꽃을 탄 플라베베.\n꽃을 찾아서 그 힘을 얻기 전까지는\n무방비하기 때문에 위험하다."
          violet: "꽃의 힘을 끌어내서\n다양한 기술을 사용한다.\n특히 노란 꽃을 좋아한다."
        zh_simp:
          scarlet: "乘着黄花的花蓓蓓。\n在它找到花并获其力量之前\n都会毫无防备，暴露在危险中。"
          violet: "激发花的力量，\n以此来使出各种各样的招式。\n尤其喜欢黄花。"
        zh_trad:
          scarlet: "乘著黃花的花蓓蓓。\n在牠找到花並獲得其力量前\n會毫無防備，處境十分危險。"
          violet: "藉著激發花的力量\n來使用各式各樣的招式。\n對黃花最為鍾愛。"
    flabebe_orange_flower:
