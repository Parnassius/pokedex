      descriptions:
        jp_kana:
          scarlet: "ダンスが　￹得意￺とくい￻で　￹踊￺おど￻りながら\n￹次々￺つぎつぎ￻に　￹水￺みず￻の　バルーンを\n￹作￺つく￻りだし　￹敵￺てき￻に　ぶつけるぞ。"
          violet: "￹仲間￺なかま￻を　￹思￺おも￻う　￹気持￺きも￻ちが　￹強￺つよ￻い。\nトレーナーが　￹落￺お￻ち￹込￺こ￻んでいると\nダンスを　￹踊￺おど￻って　￹励￺はげ￻まそうとする。"
        jp_kanji:
          scarlet: "ダンスが　￹得意￺とくい￻で　￹踊￺おど￻りながら\n￹次々￺つぎつぎ￻に　￹水￺みず￻の　バルーンを\n￹作￺つく￻りだし　￹敵￺てき￻に　ぶつけるぞ。"
          violet: "￹仲間￺なかま￻を　￹思￺おも￻う　￹気持￺きも￻ちが　￹強￺つよ￻い。\nトレーナーが　￹落￺お￻ち￹込￺こ￻んでいると\nダンスを　￹踊￺おど￻って　￹励￺はげ￻まそうとする。"
        en:
          scarlet: "A skillful dancer, it creates a sequence of water\nballoons as it dances, then briskly bombards its\nenemies."
          violet: "It cares deeply for its companions. When its\nTrainer is feeling down, it performs a cheery\ndance to try to help."
        fr:
          scarlet: "Ce danseur hors pair produit des ballons d’eau\nà la chaîne et les lance sur ses adversaires tout\nen exécutant des pas de danse."
          violet: "Ce Pokémon très soucieux du bien-être des\nautres n’hésite pas à exécuter une petite danse si\nson Dresseur ou sa Dresseuse a le moral à zéro."
        it:
          scarlet: "È un provetto ballerino e scaglia contro il nemico\nuna serie di palloncini d’acqua, che crea a ritmo\ndi danza."
          violet: "Stringe profondi legami d’amicizia e, se sente\nche chi lo allena è un po’ giù di morale, cerca\ndi aiutare eseguendo una danza rincuorante."
        de:
          scarlet: "Dieser begnadete Tänzer erzeugt beim Tanzen\neine Wasserblase nach der anderen und greift\ndamit seine Feinde an."
          violet: "Das Wohlergehen seiner Freunde ist ihm sehr\nwichtig. Wenn sein Trainer schlechte Laune hat,\nversucht es, ihn mit einem Tänzchen aufzuheitern."
        es:
          scarlet: "Un bailarín consumado. Crea globos de agua\ncon los que golpea a sus rivales una y otra vez\nsin dejar de bailar."
          violet: "Tiene un gran sentido de la camaradería y, si ve\nque su Entrenador está con la moral baja, no\nduda en echarse a bailar para intentar animarlo."
        ko:
          scarlet: "댄스가 특기다.\n춤추면서 물의 풍선을 계속 만들어\n적에게 부딪친다."
          violet: "동료를 생각하는 마음이 강하다.\n트레이너가 풀이 죽어 있으면\n춤을 추며 격려해 주려 한다."
        zh_simp:
          scarlet: "擅长跳舞，能够边跳舞，\n边一个接一个地\n制作水做的气球扔向敌人。"
          violet: "非常关心自己的伙伴。\n训练家如果情绪低落，\n就会跳舞给予鼓励。"
        zh_trad:
          scarlet: "很擅長跳舞，會邊跳舞\n邊一個接一個地\n製造水氣球扔向敵人。"
          violet: "非常關心自己的夥伴。\n訓練家如果情緒低落，\n就會跳舞給予鼓勵。"
