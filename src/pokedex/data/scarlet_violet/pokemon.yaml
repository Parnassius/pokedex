      descriptions:
        jp_kana:
          scarlet: "￹太陽￺たいよう￻の　￹光￺ひかり￻を　￹浴￺あ￻びるほど\n￹体内￺たいない￻で　￹辛￺から￻み￹成分￺せいぶん￻が　￹増￺ふ￻えて\n￹技￺わざ￻が　どんどん　￹辛￺から￻くなるのだ。"
          violet: "パルデアの　￹郷土料理￺きょうどりょうり￻は\n￹抜￺ぬ￻け￹落￺お￻ちた　カプサイジの　￹前歯￺まえば￻が\n￹使￺つか￻われているので　￹激辛￺げきから￻なのだ。"
        jp_kanji:
          scarlet: "￹太陽￺たいよう￻の　￹光￺ひかり￻を　￹浴￺あ￻びるほど\n￹体内￺たいない￻で　￹辛￺から￻み￹成分￺せいぶん￻が　￹増￺ふ￻えて\n￹技￺わざ￻が　どんどん　￹辛￺から￻くなるのだ。"
          violet: "パルデアの　￹郷土料理￺きょうどりょうり￻は\n￹抜￺ぬ￻け￹落￺お￻ちた　カプサイジの　￹前歯￺まえば￻が\n￹使￺つか￻われているので　￹激辛￺げきから￻なのだ。"
        en:
          scarlet: "The more sunlight this Pokémon bathes in, the\nmore spicy chemicals are produced by its body,\nand thus the spicier its moves become."
          violet: "Traditional Paldean dishes can be extremely spicy\nbecause they include the shed front teeth of\nCapsakid among their ingredients."
        fr:
          scarlet: "Plus ce Pokémon s’expose au soleil, plus son\ncorps produit une substance piquante, ce qui\napporte un peu de piment à ses capacités."
          violet: "Une fois tombée, l’incisive de ce Pokémon\nsert à relever les plats de la région de Paldea."
        it:
          scarlet: "Più si espone alla luce solare e più all’interno\ndel suo corpo aumentano le sostanze che\ndeterminano la piccantezza delle sue mosse."
          violet: "La cucina di Paldea fa ampio uso degli incisivi\ncaduti dei Capsakid, che rendono i piatti\nestremamente piccanti."
        de:
          scarlet: "Je länger es Sonnenlicht tankt, desto intensiver\nwerden die Scharfstoffe in seinem Körper und\numso pikanter fallen seine Attacken aus."
          violet: "Die regionale Küche Paldeas ist sehr scharf, weil\ndie ausgefallenen Vorderzähne von Chilingel\nzum Würzen verwendet werden."
        es:
          scarlet: "Cuanto más se expone al sol, más aumenta\nla cantidad de capsaicinoides de su cuerpo y,\npor lo tanto, la pungencia de sus movimientos."
          violet: "En Paldea es común emplear los incisivos caídos\nde los Capsakid como ingrediente, lo que aporta\nun toque muy picante a los platos."
        ko:
          scarlet: "태양 빛을 쬐면 쬘수록\n체내의 매운 성분이 늘어나서\n기술이 점점 더 매워진다."
          violet: "팔데아의 향토 요리에는\n떨어져 나온 캡싸이의\n앞니가 쓰이기 때문에 불같이 맵다."
        zh_simp:
          scarlet: "沐浴在太阳下越久，体内的\n辣味成分就会变得越多，\n招式也会变得越来越辣。"
          violet: "帕底亚的当地特色菜会用\n热辣娃掉落的门牙来做料理，\n因此味道极其辛辣。"
        zh_trad:
          scarlet: "沐浴在太陽下越久，體內的\n辣味成分就會增加得越多，\n招式也會變得越來越辣。"
          violet: "帕底亞當地會用熱辣娃\n掉落的門牙來做料理，\n所以超級無敵霹靂辣。"
