      descriptions:
        jp_kana:
          scarlet: "￹触角￺しょっかく￻で　￹大気￺たいき￻の　￹流￺なが￻れを　￹察知￺さっち￻する。\nりんぷんに　￹冷気￺れいき￻を　￹織￺お￻り￹交￺ま￻ぜ\n￹雪￺ゆき￻のように　￹降￺ふ￻らせる。"
          violet: "￹冷気￺れいき￻を　￹発￺はっ￻する　￹大￺おお￻きな　￹翅￺はね￻で\n￹飛￺と￻びまわり　￹猛吹雪￺もうふぶき￻を　￹起￺お￻こす。\n￹綺麗￺きれい￻な　￹雪解￺ゆきど￻け￹水￺みず￻が　￹好物￺こうぶつ￻。"
        jp_kanji:
          scarlet: "￹触角￺しょっかく￻で　￹大気￺たいき￻の　￹流￺なが￻れを　￹察知￺さっち￻する。\nりんぷんに　￹冷気￺れいき￻を　￹織￺お￻り￹交￺ま￻ぜ\n￹雪￺ゆき￻のように　￹降￺ふ￻らせる。"
          violet: "￹冷気￺れいき￻を　￹発￺はっ￻する　￹大￺おお￻きな　￹翅￺はね￻で\n￹飛￺と￻びまわり　￹猛吹雪￺もうふぶき￻を　￹起￺お￻こす。\n￹綺麗￺きれい￻な　￹雪解￺ゆきど￻け￹水￺みず￻が　￹好物￺こうぶつ￻。"
        en:
          scarlet: "Frosmoth senses air currents with its antennae.\nIt sends its scales drifting on frigid air, making\nthem fall like snow."
          violet: "It causes blizzards as it flies around with its huge,\nchill-emanating wings. Clean meltwater is its\nfavorite thing to drink."
        fr:
          scarlet: "Ce Pokémon perçoit les courants d’air grâce\nà ses antennes. Il lance ses écailles dans l’air\nglacé, et elles tombent comme de la neige."
          violet: "Ce Pokémon provoque des blizzards en battant\nde ses grandes ailes, qui dégagent de l’air froid.\nIl aime l’eau pure de la neige fraîchement fondue."
        it:
          scarlet: "Percepisce le correnti d’aria grazie alle antenne.\nImpregna di aria gelida le sue scaglie per farle\npoi cadere a mo’ di nevicata."
          violet: "Vola generando con le grandi ali delle correnti\ngelide che causano tempeste di neve.\nAdora dissetarsi d’acqua limpida del disgelo."
        de:
          scarlet: "Mit seinen Fühlern kann es Veränderungen in der\nAtmosphäre wahrnehmen. Seinen mit Kälte\nversetzten Flügelstaub lässt es wie Schnee rieseln."
          violet: "Seine großen Flügel setzen beim Fliegen eine\nEiseskälte frei, wodurch es Schneestürme auslöst.\nKlares Schmelzwasser trinkt es besonders gern."
        es:
          scarlet: "Puede percibir con sus antenas las corrientes\natmosféricas. Impregna sus escamas de frío y\nlas hace caer como si fuera nieve."
          violet: "Cuando revolotea, provoca ventiscas con sus\nenormes alas que liberan frío. Le encanta el agua\nlimpia del deshielo."
        ko:
          scarlet: "더듬이로 대기의 흐름을 감지한다.\n날개 가루에 냉기를 섞어서\n눈처럼 내리게 한다."
          violet: "냉기를 발산하는 커다란 날개로\n날아다니며 눈보라를 일으킨다.\n눈이 녹은 깨끗한 물을 좋아한다."
        zh_simp:
          scarlet: "触角能够感知大气的流动。\n会把冷气混入鳞粉之中，\n然后如同降雪般地撒下。"
          violet: "会用能释放寒气的巨大翅膀\n飞来飞去，引发暴风雪。\n喜欢干净的雪融水。"
        zh_trad:
          scarlet: "觸角能用來察覺大氣的\n流動。會如同降雪般地\n灑下混進了寒氣的鱗粉。"
          violet: "會用能釋放寒氣的巨大翅膀\n飛來飛去，引發暴風雪。\n喜歡乾淨的雪融水。"
