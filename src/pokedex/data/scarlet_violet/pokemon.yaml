      descriptions:
        jp_kana:
          scarlet: "ハートの　￹形￺かたち￻が　￹大人気￺だいにんき￻。\n￹好￺す￻きな　￹人￺ひと￻に　ラブカスを　￹贈￺おく￻る\n￹風習￺ふうしゅう￻の　￹残￺のこ￻る　￹土地￺とち￻が　ある。"
          violet: "￹繁殖￺はんしょく￻シーズンには　たくさんの\nラブカスが　サンゴ￹礁￺しょう￻に　￹集￺あつ￻まり\n￹海面￺かいめん￻が　ピンク￹色￺いろ￻に　￹染￺そ￻まる。"
        jp_kanji:
          scarlet: "ハートの　￹形￺かたち￻が　￹大人気￺だいにんき￻。\n￹好￺す￻きな　￹人￺ひと￻に　ラブカスを　￹贈￺おく￻る\n￹風習￺ふうしゅう￻の　￹残￺のこ￻る　￹土地￺とち￻が　ある。"
          violet: "￹繁殖￺はんしょく￻シーズンには　たくさんの\nラブカスが　サンゴ￹礁￺しょう￻に　￹集￺あつ￻まり\n￹海面￺かいめん￻が　ピンク￹色￺いろ￻に　￹染￺そ￻まる。"
        en:
          scarlet: "Its heart-shaped body makes it popular. In some\nplaces, you would give a Luvdisc to someone\nyou love."
          violet: "During the spawning season, countless Luvdisc\ncongregate at coral reefs, turning the waters pink."
        fr:
          scarlet: "Ce Pokémon est très populaire grâce à sa forme.\nDans certaines régions, la coutume est d’en offrir\nun à la personne qu’on aime."
          violet: "Pendant la saison des amours, d’innombrables\nLovdisc se réunissent près des barrières de corail\net donnent l’impression que la mer est rose."
        it:
          scarlet: "Ricercato per la sua forma a cuore. In qualche\nregione si usa ancora regalare un Luvdisc\nalla persona amata."
          violet: "Durante il periodo riproduttivo, numerosi Luvdisc\nsi riuniscono intorno alla barriera corallina,\ncolorando l’acqua di rosa."
        de:
          scarlet: "Seine Herzform macht es sehr beliebt. In einigen\nGegenden besteht noch heute der Brauch, einer\nPerson, die man liebt, ein Liebiskus zu schenken."
          violet: "Während der Laichzeit versammeln sich zahllose\nLiebiskus in Korallenriffen, wodurch die dortigen\nGewässer rosafarben erscheinen."
        es:
          scarlet: "Popular por su forma de corazón. En algunos\nsitios es costumbre que las parejas se regalen\nLuvdisc."
          violet: "Durante el desove, multitud de Luvdisc se\nconcentran en los arrecifes de coral y colorean\nde rosa el agua."
        ko:
          scarlet: "하트 모양이 인기가 많다.\n좋아하는 사람에게 사랑동이를 보내는\n풍습이 남아 있는 곳이 있다."
          violet: "번식기에는 많은 사랑동이가\n산호초에 모여들어서\n해수면이 핑크색으로 물든다."
        zh_simp:
          scarlet: "心形的体型很受欢迎。\n有些地方留有这样的习俗，\n会把爱心鱼送给心上人。"
          violet: "在繁殖的季节，\n会有大量爱心鱼聚集在珊瑚礁，\n海面都会染成粉红色。"
        zh_trad:
          scarlet: "心形的外型很受歡迎。\n有些地方仍留有送愛心魚\n給心上人的習俗。"
          violet: "在繁殖的季節，\n會有大量愛心魚聚集在珊瑚礁，\n把海面都染成粉紅色。"
