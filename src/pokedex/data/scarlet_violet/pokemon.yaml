        jp_kanji:
          scarlet: "￹燃￺も￻えさかる　￹体毛￺たいもう￻を　こすり￹合￺あ￻わせ\n￹爆風￺ばくふう￻を　￹起￺お￻こして　￹攻撃￺こうげき￻する\n￹大技￺おおわざ￻を　￹隠￺かく￻し￹持￺も￻っている。"
          violet: "￹怒￺いか￻りが　￹最高潮￺さいこうちょう￻のとき\n￹触￺さわ￻ったもの　すべて　￹一瞬￺いっしゅん￻で\n￹燃￺も￻え￹上￺あ￻がらせるほどに　￹熱￺あつ￻い。"
        en:
          scarlet: "It has a secret, devastating move. It rubs its\nblazing fur to cause huge explosions."
          violet: "If its rage peaks, it becomes so hot that anything\nthat touches it will instantly go up in flames."
        fr:
          scarlet: "Il maîtrise un coup secret dévastateur : il crée\ndes rafales explosives en frottant sa fourrure\nardente."
          violet: "Quand sa colère atteint son paroxysme,\nson corps devient si chaud que tout ce\nqu’il touche s’enflamme instantanément."
        it:
          scarlet: "Ha una devastante mossa segreta: causa forti\nesplosioni sfregando la pelliccia infuocata."
          violet: "Quando la sua rabbia raggiunge l’apice, diventa\ncosì caldo da incendiare in un istante qualsiasi\ncosa tocchi."
        de:
          scarlet: "Es verfügt über eine verheerende Geheimattacke,\nbei der es sein flammendes Fell reibt, um so\nExplosionen zu erzeugen."
          violet: "Wenn sein Zorn das Maximum erreicht, wird es\nso heiß, dass alles, was es berührt, augenblicklich\nin Flammen aufgeht."
        es:
          scarlet: "Posee una técnica secreta y devastadora que\nconsiste en atacar frotando su pelaje ardiente\npara provocar explosiones."
          violet: "Cuando su furia alcanza su apogeo, se calienta\ntanto que cualquier cosa que toque prenderá\nal instante."
        ko:
          scarlet: "활활 타오르는 털을 문질러\n폭풍을 일으켜서 공격하는\n큰 기술을 감추어 놓고 있다."
          violet: "분노가 정점에 달했을 때\n건드린 자를 모두 순식간에\n불태워 버릴 정도로 뜨겁다."
        zh_simp:
          scarlet: "该宝可梦藏有大绝招。\n会摩擦熊熊燃烧着的体毛，\n掀起爆炸气浪进行攻击。"
          violet: "愤怒到极点时，\n它热得能将碰到的\n所有东西瞬间点燃。"
        zh_trad:
          scarlet: "會摩擦熊熊燃燒著的體毛，\n掀起爆炸氣浪進行攻擊。\n擁有深藏不露的大絕招。"
          violet: "當牠憤怒到極點時，\n會熱到能將碰到的\n所有東西瞬間點燃。"
