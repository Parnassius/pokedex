          scarlet: "This Pokémon uses its ribbonlike feelers to send\na soothing aura into its opponents, erasing\ntheir hostility."
          violet: "Sylveon cuts an elegant figure as it dances lightly\naround, feelers fluttering, but its piercing moves\naim straight for its opponents’ weak spots."
        fr:
          scarlet: "Ses antennes en forme de ruban émettent\ndes ondes apaisantes en direction de ses\nadversaires et neutralisent toute hostilité."
          violet: "Il danse élégamment en faisant onduler\nses antennes, mais lorsqu’il attaque, il vise\ndirectement les points faibles de ses adversaires."
        it:
          scarlet: "Le antenne simili a fiocchetti emettono onde\ncalmanti che placano l’ostilità dei nemici."
          violet: "Malgrado il suo aspetto elegante mentre danza\nleggiadro facendo fluttuare le antenne, quando\nattacca va dritto ai punti deboli degli avversari."
        de:
          scarlet: "Von seinen bandförmigen Fühlern gehen\nberuhigende Wellen aus, mit denen es die\nFeindseligkeit von Gegnern verschwinden lässt."
          violet: "Es sieht zwar elegant aus, wenn es mit wehenden\nFühlern leichtfüßig tänzelt, doch seine Attacken\nzielen gewieft auf Schwachpunkte ab."
        es:
          scarlet: "Con sus apéndices sensoriales con forma de\ncinta, emite unas ondas tranquilizadoras capaces\nde neutralizar la hostilidad de sus rivales."
          violet: "Sus apéndices sensoriales ondean grácilmente y\nle confieren un aspecto elegante, pero, cuando\nataca, va directo al punto débil de sus enemigos."
        ko:
          scarlet: "리본 같은 더듬이를 통해\n적의를 없애는 치유의 파동을\n상대에게 보낸다."
          violet: "더듬이를 나부끼며 경쾌하게\n춤추는 모습은 우아하지만\n기술은 날카롭게 급소를 노린다."
        zh_simp:
          scarlet: "会从蝴蝶结般的触角中\n释放能够消除敌意的波动，\n并将其传送进对手的体内。"
          violet: "摇曳着触角跳着轻快的\n舞蹈的样子十分优雅，\n但招式却会直击对手要害。"
        zh_trad:
          scarlet: "會從如蝴蝶結般的觸角\n把消除敵意的波動\n傳送進對手的體內。"
          violet: "搖曳著觸角跳著輕快\n舞蹈的樣子相當優雅，\n但招式卻會直搗對手要害。"
