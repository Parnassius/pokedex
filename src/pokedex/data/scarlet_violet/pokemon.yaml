          scarlet: "もげた　ハサミは　とても　￹美味￺おい￻しい。\nわざわざ　￹山￺やま￻に　グルトンを　￹連￺つ￻れて\n￹探￺さが￻しにくる　トレーナーも　いるぞ。"
          violet: "パンチは　￹強力￺きょうりょく￻だが　￹動￺うご￻きが　￹遅￺おそ￻い。\n￹口￺くち￻から　￹氷￺こおり￻の　￹泡￺あわ￻を　￹吹￺ふ￻いて\n￹相手￺あいて￻の　￹動￺うご￻きを　￹止￺と￻める。"
        jp_kanji:
          scarlet: "もげた　ハサミは　とても　￹美味￺おい￻しい。\nわざわざ　￹山￺やま￻に　グルトンを　￹連￺つ￻れて\n￹探￺さが￻しにくる　トレーナーも　いるぞ。"
          violet: "パンチは　￹強力￺きょうりょく￻だが　￹動￺うご￻きが　￹遅￺おそ￻い。\n￹口￺くち￻から　￹氷￺こおり￻の　￹泡￺あわ￻を　￹吹￺ふ￻いて\n￹相手￺あいて￻の　￹動￺うご￻きを　￹止￺と￻める。"
        en:
          scarlet: "The detached pincers of these Pokémon are\ndelicious. Some Trainers bring Lechonk into\nthe mountains just to search for them."
          violet: "Though its punches are powerful, this Pokémon’s\nmovements are sluggish. It blows icy bubbles\nfrom its mouth to immobilize its opponents."
        fr:
          scarlet: "Ses pinces, qu’il perd parfois, sont délicieuses.\nPour les trouver, certaines personnes emmènent\nleur Gourmelet dans les montagnes."
          violet: "Ses coups sont puissants, mais il se\ndéplace lentement. Il immobilise ses\nadversaires en leur envoyant une écume glacée."
        it:
          scarlet: "Le sue chele, una volta staccatesi, sono una rara\nprelibatezza. C’è chi porta con sé un Lechonk\nin montagna proprio per trovarne alcune."
          violet: "Sferra pugni potentissimi, ma le sue movenze\nsono alquanto lente. Le bolle glaciali che spara\ndalla bocca possono immobilizzare gli avversari."
        de:
          scarlet: "Krawells abgeworfene Scheren sind köstlich.\nManche Trainer suchen sogar gezielt mit Ferkuli\nin den Bergen danach."
          violet: "Seine Schläge sind stark, aber es kann sich nur\nlangsam bewegen. Aus seinem Mund schießt es\neisige Blasen, die seine Gegner immobilisieren."
        es:
          scarlet: "Las pinzas que se le desprenden son un manjar.\nAlgunos Entrenadores llevan a sus Lechonk a la\nmontaña con el único objetivo de recolectarlas."
          violet: "Sus puñetazos son temibles, pero se\nmueve muy lentamente. Escupe burbujas\ngélidas a sus rivales para inmovilizarlos."
        ko:
          scarlet: "떨어진 집게는 매우 맛있다.\n일부러 맛보돈을 데리고 산에 올라\n찾아다니는 트레이너도 있을 정도다."
          violet: "펀치는 강력하지만 움직임이 둔하다.\n입에서 얼음 거품을 뿜어서\n상대의 움직임을 저지한다."
        zh_simp:
          scarlet: "掉落的钳子十分美味。\n还有训练家会特意带着\n爱吃豚到山里找它。"
          violet: "拳击虽强，动作却慢。\n会从口里喷出结冰的泡沫\n来封住对手的行动。"
        zh_trad:
          scarlet: "脫落的鉗子十分美味。\n還有些訓練家會特地\n帶著愛吃豚到山裡找牠。"
          violet: "拳擊雖強，動作卻慢。\n會從口裡噴出結冰的泡沫\n來封住對手的行動。"
