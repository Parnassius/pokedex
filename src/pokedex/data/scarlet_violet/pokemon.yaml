      descriptions:
        jp_kana:
          scarlet: "￹真夜中￺まよなか￻　￹人￺ひと￻を　￹驚￺おどろ￻かせては\n￹怖￺こわ￻がる￹心￺こころ￻を　￹集￺あつ￻めて　￹自分￺じぶん￻の\nエネルギーに　している　ポケモン。"
          violet: "いきなり　￹後￺うし￻ろ￹髪￺がみ￻に　￹噛￺か￻みつき\n￹引￺ひ￻っぱっては　￹人￺ひと￻の　￹驚￺おどろ￻く\n￹姿￺すがた￻を￹見￺み￻て　￹喜￺よろこ￻んでいる。"
        jp_kanji:
          scarlet: "￹真夜中￺まよなか￻　￹人￺ひと￻を　￹驚￺おどろ￻かせては\n￹怖￺こわ￻がる￹心￺こころ￻を　￹集￺あつ￻めて　￹自分￺じぶん￻の\nエネルギーに　している　ポケモン。"
          violet: "いきなり　￹後￺うし￻ろ￹髪￺がみ￻に　￹噛￺か￻みつき\n￹引￺ひ￻っぱっては　￹人￺ひと￻の　￹驚￺おどろ￻く\n￹姿￺すがた￻を￹見￺み￻て　￹喜￺よろこ￻んでいる。"
        en:
          scarlet: "This Pokémon startles people in the middle of\nthe night. It gathers fear as its energy."
          violet: "It loves to bite and yank people’s hair from\nbehind without warning, just to see their\nshocked reactions."
        fr:
          scarlet: "Il fait peur aux gens en pleine nuit et se nourrit\nde leur frayeur."
          violet: "Il adore mordre les gens et leur tirer les cheveux\npar surprise, juste pour voir leur réaction."
        it:
          scarlet: "Un Pokémon che terrorizza la gente nel cuore\ndella notte. Assorbe la paura per usarla come\nenergia."
          violet: "Gli piace mordere e tirare i capelli delle persone\nall’improvviso, tanto per spaventarle un po’."
        de:
          scarlet: "Ein Pokémon, das Menschen mitten in der Nacht\nerschreckt. Es sammelt die Angst als seine\nEnergie."
          violet: "Es zieht Leute gerne von hinten an den Haaren\noder beißt sich plötzlich in ihren Schopf fest,\num sich an der verdutzten Reaktion zu erfreuen."
        es:
          scarlet: "Sorprende a la gente en mitad de la noche y\nacumula su miedo como energía."
          violet: "Le gusta morder y tirar del pelo de la gente\ndesde atrás sin avisar, solo para ver su reacción."
        ko:
          scarlet: "한밤중에 사람을 놀라게 하고\n무서워하는 마음을 모아 자신의\n에너지로 만드는 포켓몬이다."
          violet: "갑자기 뒷머리를 물고 잡아당기고는\n사람들이 놀라는 모습을 보며 즐거워한다."
        zh_simp:
          scarlet: "在深夜里惊吓人类，\n然后把收集到的恐惧之心\n转化为自己的能量的宝可梦。"
          violet: "会突然咬住或是拉扯\n人的头发，然后看着对方\n大吃一惊的样子来取乐。"
        zh_trad:
          scarlet: "會在半夜嚇唬人類，\n然後把收集到的恐懼之心\n轉化成自身能量的寶可夢。"
          violet: "會冷不防地去咬住或拉扯\n人的頭髮，然後看著對方\n大吃一驚的樣子來取樂。"
