        jp_kana:
          scarlet: "￹筋骨隆々￺きんこつりゅうりゅう￻の　￹体￺からだ￻で\n￹格闘戦￺かくとうせん￻が　￹得意￺とくい￻。\n￹短￺みじか￻い　ツノで　￹急所￺きゅうしょ￻を　￹狙￺ねら￻う。"
          violet: "ぶ￹厚￺あつ￻く　￹力強￺ちからづよ￻い　￹筋肉￺きんにく￻と\n￹気性￺きしょう￻の　￹荒￺あら￻さが　￹特徴￺とくちょう￻。\nコンバット￹種￺しゅ￻と　￹呼￺よ￻ばれる。"
        jp_kanji:
          scarlet: "￹筋骨隆々￺きんこつりゅうりゅう￻の　￹体￺からだ￻で\n￹格闘戦￺かくとうせん￻が　￹得意￺とくい￻。\n￹短￺みじか￻い　ツノで　￹急所￺きゅうしょ￻を　￹狙￺ねら￻う。"
          violet: "ぶ￹厚￺あつ￻く　￹力強￺ちからづよ￻い　￹筋肉￺きんにく￻と\n￹気性￺きしょう￻の　￹荒￺あら￻さが　￹特徴￺とくちょう￻。\nコンバット￹種￺しゅ￻と　￹呼￺よ￻ばれる。"
        en:
          scarlet: "This Pokémon has a muscular body and excels at\nclose-quarters combat. It uses its short horns to\nstrike the opponent’s weak spots."
          violet: "This kind of Tauros, known as the Combat Breed,\nis distinguished by its thick, powerful muscles and\nits fierce disposition."
        fr:
          scarlet: "Ce Pokémon aux muscles développés excelle\nen combat rapproché. Il vise le point faible\nde ses adversaires avec ses courtes cornes."
          violet: "Le Tauros de la Race Combative se caractérise\npar son tempérament agressif et par ses muscles\naussi puissants que développés."
        it:
          scarlet: "Grazie al suo corpo muscoloso, eccelle negli\nscontri ravvicinati. Con le sue corte corna mira\na colpire i punti deboli."
          violet: "È caratterizzato da muscoli grossi e possenti\ne da un’indole violenta. Questa forma viene\nchiamata Varietà Combattiva."
        de:
          scarlet: "Es hat einen muskulösen Körper und zeichnet sich\nim Nahkampf aus. Mit seinen kurzen Hörnern zielt\nes auf die Schwachstellen des Gegners ab."
          violet: "Es zeichnet sich durch seine dicken Muskeln und\nsein wildes Temperament aus. Diese Form wird\n„Gefechtvariante“ genannt."
        es:
          scarlet: "Destaca en el combate cuerpo a cuerpo gracias\na su constitución musculosa. Ataca los puntos\nvitales del enemigo con sus cortos cuernos."
          violet: "La Variedad Combatiente se distingue por\nsu fornida y poderosa musculatura y por su\ntemperamento especialmente agresivo."
        ko:
          scarlet: "체격이 우람하고 육탄전이 특기다.\n짧은 뿔로 급소를 노린다."
          violet: "두껍고도 강한 근육과\n사나운 성질이 특징이다.\n컴뱃종이라고 불린다."
        zh_simp:
          scarlet: "擅长以肌肉发达的身体\n打格斗战。会用短短的角\n瞄准对手的要害。"
          violet: "特征是厚实有力的肌肉\n以及粗鲁暴躁的性格。\n这种样子被称为斗战种。"
        zh_trad:
          scarlet: "擅長以肌肉發達的身體\n打格鬥戰。會用短短的角\n瞄準對手的要害。"
          violet: "特徵是厚實有力的肌肉，\n以及粗魯暴躁的性格。\n這種樣子被稱為鬥戰種。"
