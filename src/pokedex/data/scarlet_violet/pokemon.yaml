      descriptions:
        jp_kana:
          scarlet: "￹強￺つよ￻く　￹歯￺は￻ぎしり　することで　￹脳￺のう￻を\n￹刺激￺しげき￻。　￹生￺う￻みだした　サイコパワーを\n￹頭￺あたま￻の　￹突起￺とっき￻から　￹撃￺う￻ち￹出￺だ￻す。"
          violet: "￹歯￺は￻ぎしりで　￹起￺お￻こる　￹波紋￺はもん￻に\n￹陽￺ひ￻の￹光￺ひかり￻が　￹反射￺はんしゃ￻するとき　まわりの\n￹水￺みず￻は　￹眩￺まばゆ￻いばかりに　きらめく。"
        jp_kanji:
          scarlet: "￹強￺つよ￻く　￹歯￺は￻ぎしり　することで　￹脳￺のう￻を\n￹刺激￺しげき￻。　￹生￺う￻みだした　サイコパワーを\n￹頭￺あたま￻の　￹突起￺とっき￻から　￹撃￺う￻ち￹出￺だ￻す。"
          violet: "￹歯￺は￻ぎしりで　￹起￺お￻こる　￹波紋￺はもん￻に\n￹陽￺ひ￻の￹光￺ひかり￻が　￹反射￺はんしゃ￻するとき　まわりの\n￹水￺みず￻は　￹眩￺まばゆ￻いばかりに　きらめく。"
        en:
          scarlet: "It grinds its teeth with great force to stimulate\nits brain. It fires the psychic energy created by\nthis process from the protuberance on its head."
          violet: "When sunlight reflects on the ripples created by\na Bruxish grinding its teeth, the water all around\nsparkles brilliantly."
        fr:
          scarlet: "Ce Pokémon grince fortement des dents afin de\nstimuler son cerveau. Il projette ensuite l’énergie\npsychique ainsi créée par l’appendice sur sa tête."
          violet: "Quand les rayons du soleil se réfléchissent sur\nles ondes formées par ses grincements de\ndents, l’eau autour de lui brille de mille feux."
        it:
          scarlet: "Fa stridere i denti per stimolare il proprio\ncervello e creare così onde psichiche, che\npoi emette dalla protuberanza sulla testa."
          violet: "Quando i raggi solari si riflettono sull’acqua\nincrespata dallo stridore dei suoi denti,\nproducono bagliori accecanti."
        de:
          scarlet: "Es knirscht stark mit den Zähnen, um sein Gehirn\nzu stimulieren. Die dabei erzeugten Psycho-Kräfte\nsetzt es über den Fortsatz an seinem Kopf frei."
          violet: "Wenn Sonnenlicht von den Wellen reflektiert\nwird, die durch sein Zähneknirschen entstehen,\nglitzert das Wasser um es herum blendend hell."
        es:
          scarlet: "Estimula su cerebro al rechinar los dientes con\nfuerza. Libera el poder psíquico que genera\npor la protuberancia que tiene en la cabeza."
          violet: "Cuando la luz del sol se refleja en las ondas\nque produce al rechinar los dientes, el agua\na su alrededor adquiere un brillo deslumbrante."
        ko:
          scarlet: "강하게 이를 갈아서 뇌를 자극한다.\n이를 통해 만들어 낸 사이코 파워를\n머리의 돌기를 통해 발사한다."
          violet: "이를 갈 때 발생하는 파문에\n햇빛이 반사되면\n주위의 물이 눈부시게 반짝인다."
        zh_simp:
          scarlet: "通过用力磨牙来刺激大脑。\n以此产生的精神力量会从\n头部的突起物中放射而出。"
          violet: "磨牙时会泛起波纹。\n当阳光反射在上面，周围的水\n会闪起令人目眩的亮光。"
        zh_trad:
          scarlet: "會用力磨牙刺激大腦，\n然後從頭部的突起物發射\n藉其產生的精神力量。"
          violet: "磨牙時會泛起波紋。當陽光\n反射在上面時，周圍的水會\n閃起令人目眩神迷的亮光。"
