      descriptions:
        jp_kana:
          scarlet: "いつもは　とっても　￹無邪気￺むじゃき￻。\n￹見￺み￻えない　なにかを　￹見￺み￻ているときは\n￹瞬￺まばた￻きも　せずに　ずっと　￹無言￺むごん￻。"
          violet: "サイコパワーを　コントロールする\nリボン￹型￺がた￻の　￹触角￺しょっかく￻に　￹触￺ふ￻れると\n￹激￺はげ￻しく　￹泣￺な￻きだすので　￹注意￺ちゅうい￻。"
        jp_kanji:
          scarlet: "いつもは　とっても　￹無邪気￺むじゃき￻。\n￹見￺み￻えない　なにかを　￹見￺み￻ているときは\n￹瞬￺まばた￻きも　せずに　ずっと　￹無言￺むごん￻。"
          violet: "サイコパワーを　コントロールする\nリボン￹型￺がた￻の　￹触角￺しょっかく￻に　￹触￺ふ￻れると\n￹激￺はげ￻しく　￹泣￺な￻きだすので　￹注意￺ちゅうい￻。"
        en:
          scarlet: "This Pokémon is normally very innocent. When it\nis staring at something invisible, it is unblinking\nand utterly silent."
          violet: "Beware of touching the ribbon-shaped feelers\nthat control its psychic power. Gothita will begin\nbawling if you do."
        fr:
          scarlet: "Ce Pokémon fait toujours preuve d’une grande\ncandeur. Lorsqu’il aperçoit une chose invisible,\nil la fixe en silence sans cligner des yeux."
          violet: "Ses antennes en forme de ruban contrôlent\nses pouvoirs psychiques. Il faut éviter de les\ntoucher, sinon il pleure de façon incontrôlable."
        it:
          scarlet: "Di solito è molto puro e innocente. Quando\nvede qualcosa di invisibile agli occhi, resta\nmuto senza battere ciglio."
          violet: "Controlla i suoi poteri psichici con le antenne\na forma di fiocchetti. Attenzione a non toccarle,\no si metterà a piangere a dirotto."
        de:
          scarlet: "Für gewöhnlich ist es überaus unschuldig.\nEntdeckt es etwas Unsichtbares, so starrt es\nstumm und ohne zu blinzeln in dessen Richtung."
          violet: "Die schleifenförmigen Fühler, mit denen es\nseine Psycho-Kräfte kontrolliert, sollte man nicht\nberühren, da es sonst heftig zu weinen beginnt."
        es:
          scarlet: "Un Pokémon que encarna la inocencia absoluta.\nAl fijar la mirada en algo invisible, permanece en\nsilencio sin siquiera pestañear."
          violet: "Cuidado con tocar los órganos con forma de lazo\nque controlan su poder psíquico, pues se corre el\nriesgo de que rompa a llorar desaforadamente."
        ko:
          scarlet: "평소에는 매우 천진난만하다.\n보이지 않는 무언가를 보고 있을 때는\n눈도 깜빡이지 않고 계속 말이 없다."
          violet: "사이코 파워를 제어하는\n리본형 기관을 만지면\n마구 울어 대므로 주의해야 한다."
        zh_simp:
          scarlet: "总是一副天真无邪的样子。\n当它看着原本不可见的东西时，\n就会眼都不眨地一语不发。"
          violet: "一旦触碰它那能够操控\n精神力量的蝴蝶结型触角，\n就会让它放声大哭，千万小心。"
        zh_trad:
          scarlet: "總是一副天真無邪的樣子。\n看見肉眼看不見的東西時，\n就會眼都不眨地一語不發。"
          violet: "一旦觸碰到牠那用來\n控制精神力量的觸角，\n牠就會放聲大哭，千萬要小心。"
