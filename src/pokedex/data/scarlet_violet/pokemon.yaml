          violet: "いつも　￹同￺おな￻じ　￹果物￺くだもの￻ばかり\n￹食￺た￻べていたら　のど￹元￺もと￻に　とても\n￹美味￺おい￻しい　￹果物￺くだもの￻が　￹生￺は￻えてきた。"
        jp_kanji:
          scarlet: "￹熱帯￺ねったい￻の　ジャングルに　￹生息￺せいそく￻。\n￹首￺くび￻の　フサは　￹甘￺あま￻くて　￹美味￺おい￻しい。\n１￹年￺ねん￻に　２￹回￺かい￻　￹実￺み￻を　つける。"
          violet: "いつも　￹同￺おな￻じ　￹果物￺くだもの￻ばかり\n￹食￺た￻べていたら　のど￹元￺もと￻に　とても\n￹美味￺おい￻しい　￹果物￺くだもの￻が　￹生￺は￻えてきた。"
        en:
          scarlet: "It lives in tropical jungles. The bunch of fruit\naround its neck is delicious. The fruit grows\ntwice a year."
          violet: "Delicious fruits grew out from around its neck\nbecause it always ate the same kind of fruit."
        fr:
          scarlet: "Tropius vit dans les jungles tropicales. Les fruits\nsur son cou sont sucrés et succulents. Ils poussent\ndeux fois par an."
          violet: "Comme il mangeait toujours le même type de\nfruit, ce dernier a fini par pousser sur son cou."
        it:
          scarlet: "Vive in giungle tropicali. Due volte all’anno\ngli crescono attorno al collo dei frutti dolci\ndal sapore squisito."
          violet: "A forza di mangiare sempre gli stessi frutti,\nattorno al collo gliene sono cresciuti alcuni\ndi rara bontà."
        de:
          scarlet: "Es lebt im tropischen Dschungel. Die süßen,\nleckeren Früchte an seinem Hals wachsen zweimal\nim Jahr."
          violet: "Da es immer nur die gleichen Früchte aß,\nbegannen köstliche Früchte an seinem Hals\nzu wachsen."
        es:
          scarlet: "Habita en las junglas tropicales. Le crece un\ndelicioso racimo de fruta dulce en el cuello\ndos veces al año."
          violet: "Como solo comía un tipo de fruta, al final acabó\ncreciéndole en el cuello."
        ko:
          scarlet: "열대 정글에 서식한다.\n목에 달린 송이는 달고 맛있다.\n1년에 2번 열매를 맺는다."
          violet: "항상 같은 과일만 먹었더니\n목 주변에 매우 맛있는\n열매가 열렸다."
        zh_simp:
          scarlet: "栖息在热带丛林里。\n脖子上的果实甘甜可口。\n每年会结果２次。"
          violet: "平时总是吃同样的水果，\n以至于自己的喉咙上\n都结出了非常美味的水果。"
        zh_trad:
          scarlet: "棲息在熱帶叢林裡。\n脖子上的果實香甜美味。\n每年會結果２次。"
          violet: "因為平時不斷吃著同種水果，\n以至於自己的喉嚨上\n結出了極為美味的水果來。"
