      egg_groups:
        - monster
        - water_1
      abilities:
        - curious_medicine
        - own_tempo
      hidden_ability: regenerator
      descriptions:
        jp_kana:
          scarlet: "￹弱￺よわ￻った　ポケモンを　みかけると\n￹毒液￺どくえき￻から　￹作￺つく￻った　￹薬￺くすり￻を\nツノの　￹穴￺あな￻から　￹出￺だ￻して　￹与￺あた￻える。"
          violet: "￹食￺た￻べたものと　￹毒液￺どくえき￻を　￹混￺ま￻ぜて\n￹薬￺くすり￻を　￹作￺つく￻ってくれるが　￹効果￺こうか￻は\nヤドキング￹自身￺じしん￻も　わからない。"
        jp_kanji:
          scarlet: "￹弱￺よわ￻った　ポケモンを　みかけると\n￹毒液￺どくえき￻から　￹作￺つく￻った　￹薬￺くすり￻を\nツノの　￹穴￺あな￻から　￹出￺だ￻して　￹与￺あた￻える。"
          violet: "￹食￺た￻べたものと　￹毒液￺どくえき￻を　￹混￺ま￻ぜて\n￹薬￺くすり￻を　￹作￺つく￻ってくれるが　￹効果￺こうか￻は\nヤドキング￹自身￺じしん￻も　わからない。"
        en:
          scarlet: "It administers its potions to weakened Pokémon\nit sees. These potions are derived from poison\nand secreted from holes in Slowking’s horns."
          violet: "It creates potions by mixing toxins with the food\nit’s eaten. Not even Slowking itself knows what\neffects the potions will have."
        fr:
          scarlet: "Lorsqu’il croise un Pokémon affaibli, il lui\nadministre un remède fortifiant composé de ses\ntoxines en le versant par les trous de ses cornes."
          violet: "Roigada prépare des potions pour autrui\nen mélangeant ce qu’il ingère à ses toxines,\nmais lui-même en ignore les effets."
        it:
          scarlet: "Quando trova un Pokémon indebolito, gli dà\nun farmaco che secerne dai buchi sulle corna,\ncreato a partire da un liquido velenoso."
          violet: "Mescola ciò che ha mangiato al suo liquido\ntossico per creare un intruglio di cui lui stesso\nnon conosce gli effetti."
        de:
          scarlet: "Erblickt es geschwächte Pokémon, verabreicht es\nihnen Arznei, die es aus flüssigen Toxinen herstellt\nund aus Löchern an seinen Hörnern absondert."
          violet: "Es mischt seinen Mageninhalt mit flüssigen\nToxinen, um Arznei herzustellen. Deren Wirkung\nkennt es allerdings selbst nicht."
        es:
          scarlet: "Cuando se topa con un Pokémon sin fuerzas,\nsegrega un brebaje medicinal hecho con veneno\npor los orificios de los cuernos y se lo ofrece."
          violet: "Puede elaborar brebajes mezclando lo que\ningiere con su veneno, pero él mismo desconoce\nel efecto que estos tienen."
        ko:
          scarlet: "약해진 포켓몬을 발견하면\n독액으로 만든 약을\n뿔에 난 구멍을 통해 나눠 준다."
          violet: "먹은 것과 독액을 섞어서\n약을 만들지만, 그 효과는\n야도킹 자신도 모른다."
        zh_simp:
          scarlet: "一旦发现虚弱的宝可梦，\n它就会从角上的洞取出\n由毒液制成的药给对方。"
          violet: "虽然会混合吃掉的东西和\n毒液来制造药物，但其效果\n连呆呆王自己也不知道。"
        zh_trad:
          scarlet: "發現虛弱的寶可夢時，\n就會從角上的洞取出\n由毒液製成的藥給對方。"
          violet: "會混合吃進的東西和毒液\n來幫忙製藥，但藥效如何\n就連呆呆王自己也不知道。"
