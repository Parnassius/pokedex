      descriptions:
        jp_kana:
          scarlet: "￹地面￺じめん￻　￹深￺ふか￻くで　￹生￺う￻まれ\n￹山￺やま￻ほどの　￹土￺つち￻を　￹食￺た￻べ￹終￺お￻わると\n￹体￺からだ￻を　つくるため　サナギになる。"
          violet: "￹地中￺ちちゅう￻　￹深￺ふか￻くで　￹生￺う￻まれる。\nまわりの　￹土￺つち￻を　たいらげないと\n￹地上￺ちじょう￻に　￹出￺で￻てこれない。"
        jp_kanji:
          scarlet: "￹地面￺じめん￻　￹深￺ふか￻くで　￹生￺う￻まれ\n￹山￺やま￻ほどの　￹土￺つち￻を　￹食￺た￻べ￹終￺お￻わると\n￹体￺からだ￻を　つくるため　サナギになる。"
          violet: "￹地中￺ちちゅう￻　￹深￺ふか￻くで　￹生￺う￻まれる。\nまわりの　￹土￺つち￻を　たいらげないと\n￹地上￺ちじょう￻に　￹出￺で￻てこれない。"
        en:
          scarlet: "Born deep underground, this Pokémon becomes\na pupa after eating enough dirt to make a\nmountain."
          violet: "It is born deep underground. It can’t emerge until\nit has entirely consumed the soil around it."
        fr:
          scarlet: "Il naît dans les profondeurs terrestres. Après\navoir englouti une quantité de terre équivalente\nà une montagne, il se transforme en chrysalide."
          violet: "Il naît dans les profondeurs terrestres et ne peut\natteindre la surface qu’une fois qu’il a mangé\ntoute la terre qui l’entoure."
        it:
          scarlet: "Nasce nel profondo sottosuolo e dopo aver\nmangiato una montagna di terra si trasforma\nin una crisalide."
          violet: "Nasce nel profondo sottosuolo e non può\nemergere in superficie finché non ha consumato\ntutto il terreno intorno a sé."
        de:
          scarlet: "Es wird tief im Erdreich geboren. Hat es einen\nBerg Erde gefressen, verpuppt sich dieses\nPokémon."
          violet: "Es wird tief unter der Erde geboren und kann erst\nan die Oberfläche, wenn es die Erde ringsum\naufgefressen hat."
        es:
          scarlet: "Nacido en las profundidades subterráneas,\neste Pokémon se convierte en pupa al comer\nla cantidad de tierra equivalente a una montaña."
          violet: "Nace muy profundo en el suelo y no podrá salir\nhasta que se haya comido la tierra que lo rodea."
        ko:
          scarlet: "땅속 깊은 곳에서 태어나\n산을 이룰 정도의 흙을 먹고 나면\n몸을 만들기 위해 번데기가 된다."
          violet: "땅속 깊은 곳에서 태어난다.\n주변의 흙을 먹어 치우지 않으면\n지상으로 나올 수 없다."
        zh_simp:
          scarlet: "诞生于地下深处。\n它吃完整座山的土壤后，\n就会为了成长而变成蛹。"
          violet: "出生在地下深处。\n不把周围的泥土吃光，\n就无法到地面上来。"
        zh_trad:
          scarlet: "誕生在地底深處。\n當牠吃完滿山的土壤後，\n就會為了成長而變成蛹。"
          violet: "出生在地下深處。\n不吃光周圍的泥土，\n就無法到地面上來。"
