      descriptions:
        jp_kana:
          scarlet: "￹火山￺かざん￻の　￹火口近￺かこうちか￻くで　￹見￺み￻つかった。\n￹口￺くち￻から　￹炎￺ほのお￻を　￹吐￺は￻く。\n￹体温￺たいおん￻は　１２００￹度￺ど￻もある。"
          violet: "￹体￺からだ￻の　￹表面￺ひょうめん￻には　￹太陽￺たいよう￻と\n￹同￺おな￻じような　￹炎￺ほのお￻の　ゆらめきが\n￹発生￺はっせい￻している。"
        jp_kanji:
          scarlet: "￹火山￺かざん￻の　￹火口近￺かこうちか￻くで　￹見￺み￻つかった。\n￹口￺くち￻から　￹炎￺ほのお￻を　￹吐￺は￻く。\n￹体温￺たいおん￻は　１２００￹度￺ど￻もある。"
          violet: "￹体￺からだ￻の　￹表面￺ひょうめん￻には　￹太陽￺たいよう￻と\n￹同￺おな￻じような　￹炎￺ほのお￻の　ゆらめきが\n￹発生￺はっせい￻している。"
        en:
          scarlet: "Found near the mouth of a volcano. This\nfire-breather’s body temperature is nearly\n2,200 degrees Fahrenheit."
          violet: "Wavering flames similar to those of the sun\nappear on the surface of this Pokémon’s body."
        fr:
          scarlet: "On trouve ce Pokémon cracheur de feu près\ndes cratères des volcans. La température\nde son corps atteint les 1 200 °C."
          violet: "Son corps émet des flammes ondoyantes\ncomparables à celles du soleil."
        it:
          scarlet: "È stato scoperto presso il cratere di un\nvulcano. Sputa fiamme dalla bocca e la sua\ntemperatura corporea si aggira sui 1.200 ºC."
          violet: "La superficie del suo corpo emana fiamme\ntremolanti simili a quelle del sole."
        de:
          scarlet: "Dieses Feuer speiende Pokémon wurde in\nder Nähe eines Vulkankraters entdeckt. Seine\nKörpertemperatur beträgt ganze 1200 ℃."
          violet: "Auf der Oberfläche seines Körpers entstehen\nlodernde Flammen, die an die der Sonne\nerinnern."
        es:
          scarlet: "Fue descubierto junto al cráter de un volcán.\nEscupe llamaradas y su temperatura corporal\nalcanza los 1200 ºC."
          violet: "La superficie de su cuerpo desprende unas\nondeantes llamaradas que recuerdan a las\nfulguraciones solares."
        ko:
          scarlet: "화산의 분화구 근처에서 발견되었다.\n입에서 불꽃을 뿜어낸다.\n체온은 1200도나 된다."
          violet: "몸의 표면에는\n태양과 같은 정도로\n불꽃의 이글거림이 발생하고 있다."
        zh_simp:
          scarlet: "它是在火山口附近被发现的。\n会从嘴里吐出火焰。\n体温高达１２００度。"
          violet: "身体的表面产生着\n像太阳一样的火焰热浪。"
        zh_trad:
          scarlet: "在火山口附近被發現。\n會從口中吐出火焰。\n體溫高達１２００度。"
          violet: "身體表面會產生\n像太陽一樣的火焰熱浪。"
