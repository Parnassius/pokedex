      descriptions:
        jp_kana:
          scarlet: "ドーミラーの　￹背中￺せなか￻の　￹模様￺もよう￻には\n￹神秘的￺しんぴてき￻な　￹力￺ちから￻が　￹宿￺やど￻ると\n￹昔￺むかし￻の　￹人￺ひと￻たちは　￹信￺しん￻じていた。"
          violet: "￹古￺ふる￻い　お￹墓￺はか￻から　みつかる。\n￹背中￺せなか￻の　￹模様￺もよう￻には　￹神秘的￺しんぴてき￻な\n￹力￺ちから￻が　￹宿￺やど￻っていると　いわれる。"
        jp_kanji:
          scarlet: "ドーミラーの　￹背中￺せなか￻の　￹模様￺もよう￻には\n￹神秘的￺しんぴてき￻な　￹力￺ちから￻が　￹宿￺やど￻ると\n￹昔￺むかし￻の　￹人￺ひと￻たちは　￹信￺しん￻じていた。"
          violet: "￹古￺ふる￻い　お￹墓￺はか￻から　みつかる。\n￹背中￺せなか￻の　￹模様￺もよう￻には　￹神秘的￺しんぴてき￻な\n￹力￺ちから￻が　￹宿￺やど￻っていると　いわれる。"
        en:
          scarlet: "Ancient people believed that the pattern on\nBronzor’s back contained a mysterious power."
          violet: "They are found in ancient tombs. The patterns on\ntheir backs are said to be imbued with mysterious\npower."
        fr:
          scarlet: "On croyait autrefois que les motifs qui ornent\nson dos renfermaient une puissance mystique."
          violet: "On les trouve dans de vieilles tombes. Les motifs\nmystiques sur leur dos renfermeraient un pouvoir\nmagique."
        it:
          scarlet: "Nell’antichità si credeva che una forza misteriosa\ndimorasse nei disegni sul dorso di Bronzor."
          violet: "Si trova in vecchie tombe. Si dice che nel disegno\nsulla sua schiena risieda una forza misteriosa."
        de:
          scarlet: "Früher glaubten die Menschen, dem Muster auf\nseinem Rücken wohne eine mysteriöse Kraft inne."
          violet: "Man findet sie in alten Grabstätten. Es heißt,\ndie Muster auf ihrem Rücken bergen mystische\nKräfte."
        es:
          scarlet: "Antaño se creía que en el dibujo de su parte\nposterior residía una fuerza misteriosa."
          violet: "Puede encontrarse en tumbas antiguas.\nSe dice que los símbolos inscritos en su espalda\nle confieren poderes extraños."
        ko:
          scarlet: "옛날 사람들은 동미러의\n등 무늬에 신비한 힘이\n깃들어 있다고 믿었다."
          violet: "오래된 묘에서 발견된다.\n등의 무늬에는 신비한 힘이\n깃들어 있다고 전해진다."
        zh_simp:
          scarlet: "过去的人们相信，\n铜镜怪背上的花纹里\n蕴藏着神秘的力量。"
          violet: "能在古墓找到它。\n据说它背上的花纹\n蕴藏着神秘的力量。"
        zh_trad:
          scarlet: "過去的人們相信，\n銅鏡怪背上的花紋裡\n蘊藏著神秘的力量。"
          violet: "能在古墓發現到牠。\n據說牠背上的花紋\n寄宿著神秘的力量。"
