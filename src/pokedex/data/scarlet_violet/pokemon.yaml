      descriptions:
        jp_kana:
          scarlet: "ひたすらに　￹浅瀬￺あさせ￻を　￹走￺はし￻り￹込￺こ￻んで\n￹足腰￺あしこし￻を　￹鍛￺きた￻え　￹仲間同士￺なかまどうし￻で\n￹足技￺あしわざ￻の　￹華麗￺かれい￻さを　￹競￺きそ￻いあう。"
          violet: "￹様々￺さまざま￻な　￹地方￺ちほう￻の　ポケモンや\n￹人￺ひと￻の　￹動￺うご￻きを　￹見￺み￻て　￹自￺みずか￻らの\n￹踊￺おど￻りに　￹取￺と￻り￹入￺い￻れる　￹努力家￺どりょくか￻。"
        jp_kanji:
          scarlet: "ひたすらに　￹浅瀬￺あさせ￻を　￹走￺はし￻り￹込￺こ￻んで\n￹足腰￺あしこし￻を　￹鍛￺きた￻え　￹仲間同士￺なかまどうし￻で\n￹足技￺あしわざ￻の　￹華麗￺かれい￻さを　￹競￺きそ￻いあう。"
          violet: "￹様々￺さまざま￻な　￹地方￺ちほう￻の　ポケモンや\n￹人￺ひと￻の　￹動￺うご￻きを　￹見￺み￻て　￹自￺みずか￻らの\n￹踊￺おど￻りに　￹取￺と￻り￹入￺い￻れる　￹努力家￺どりょくか￻。"
        en:
          scarlet: "These Pokémon constantly run through shallow\nwaters to train their legs, then compete with each\nother to see which of them kicks most gracefully."
          violet: "The hardworking Quaxwell observes people and\nPokémon from various regions and incorporates\ntheir movements into its own dance routines."
        fr:
          scarlet: "Ils courent dans les hauts-fonds pour renforcer\nles muscles de leurs pattes et rivalisent entre eux\npour voir qui a le coup de pied le plus élégant."
          violet: "Très diligent, il observe les mouvements de\nPokémon et d’individus d’origines diverses\npour s’en inspirer quand il danse."
        it:
          scarlet: "Corre senza sosta in acque poco profonde per\nallenare gli arti inferiori così da fare a gara con\ni propri simili a chi ha le movenze più eleganti."
          violet: "Estremamente diligente, osserva le movenze\ndi esseri umani e Pokémon di altre regioni\nper incorporarle nelle proprie danze."
        de:
          scarlet: "Es rennt eifrig durch seichte Gewässer, um seine\nBeine zu stärken, und konkurriert mit Artgenossen\ndarum, wer die anmutigste Beinarbeit vorweist."
          violet: "Dieses fleißige Pokémon beobachtet Menschen\nsowie Pokémon aus diversen Regionen und baut\nihre Bewegungen in seine eigenen Tänze ein."
        es:
          scarlet: "Fortalece las extremidades corriendo con tesón\npor los bajíos. Compite con los suyos para ver\ncuál posee una técnica más grácil con las patas."
          violet: "Un Pokémon diligente que ha creado su propio\nestilo de danza tras observar los movimientos de\nhumanos y Pokémon de varias regiones."
        ko:
          scarlet: "열심히 얕은 여울을 달리며\n하반신을 단련하고, 동료들끼리\n발 기술의 화려함을 겨룬다."
          violet: "다양한 지방의 포켓몬과\n사람의 움직임을 보고\n자신의 춤으로 승화시키는 노력가."
        zh_simp:
          scarlet: "通过在浅滩持续奔跑\n来锻炼腰腿，借此与伙伴\n比拼谁的腿技更为华丽。"
          violet: "性情勤奋。会观察各个地区的\n人和宝可梦的动作\n来吸取到自己的舞蹈里。"
        zh_trad:
          scarlet: "會在淺灘不斷跑步來鍛鍊\n下盤的筋骨，好跟夥伴們\n競爭誰的腿技最為華麗。"
          violet: "個性勤奮，會觀察各地區的\n人和寶可夢，並將其動作\n融入自己的舞蹈裡。"
