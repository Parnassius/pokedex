      descriptions:
        jp_kana:
          scarlet: "￹甘￺あま￻いミツが　￹大好￺だいす￻きで\n￹独￺ひと￻り￹占￺じ￻め　するため　￹自慢￺じまん￻のツノを\n￹使￺つか￻って　￹相手￺あいて￻を　ぶん￹投￺な￻げる。"
          violet: "ものすごい　￹怪力￺かいりき￻の　￹持￺も￻ち￹主￺ぬし￻。\n￹自分￺じぶん￻の　￹体重￺たいじゅう￻の　１００￹倍￺ばい￻の\n￹重￺おも￻さでも　￹楽￺らく￻に　ぶん￹投￺な￻げる。"
        jp_kanji:
          scarlet: "￹甘￺あま￻いミツが　￹大好￺だいす￻きで\n￹独￺ひと￻り￹占￺じ￻め　するため　￹自慢￺じまん￻のツノを\n￹使￺つか￻って　￹相手￺あいて￻を　ぶん￹投￺な￻げる。"
          violet: "ものすごい　￹怪力￺かいりき￻の　￹持￺も￻ち￹主￺ぬし￻。\n￹自分￺じぶん￻の　￹体重￺たいじゅう￻の　１００￹倍￺ばい￻の\n￹重￺おも￻さでも　￹楽￺らく￻に　ぶん￹投￺な￻げる。"
        en:
          scarlet: "It loves sweet nectar. To keep all the nectar to\nitself, it hurls rivals away with its prized horn."
          violet: "With its herculean powers, it can easily throw\naround an object that is 100 times its own\nweight."
        fr:
          scarlet: "Il aime tellement la sève qu’il la défend\njalousement : à l’aide de son imposante corne,\nil projette quiconque s’en approche dans les airs."
          violet: "Sa force colossale lui permet de soulever\net de jeter facilement plus de cent fois\nson poids."
        it:
          scarlet: "È ghiotto della dolce linfa degli alberi e per\nnon farsela rubare scaglia lontano i nemici\ncon il suo possente corno."
          violet: "La forza erculea gli permette di lanciare\noggetti 100 volte più pesanti di lui\ncon facilità."
        de:
          scarlet: "Es liebt süßen Baumsaft. Mit seinem Horn, auf\ndas es sehr stolz ist, schleudert es Rivalen hinfort,\num allen Baumsaft für sich zu beanspruchen."
          violet: "Mit seiner gewaltigen Kraft kann es Objekte,\ndie hundertmal sein Körpergewicht haben,\nmühelos werfen."
        es:
          scarlet: "Le encanta la savia dulce y usa su cuerno\npara lanzar por los aires a cualquiera que\nse acerque a ella."
          violet: "Tiene una fuerza descomunal. Puede arrojar\nobjetos que superen su peso cien veces sin\ngran esfuerzo."
        ko:
          scarlet: "달콤한 꿀을 아주 좋아해서\n혼자 독차지하기 위해\n자랑스런 뿔을 써서 상대를 내동댕이친다."
          violet: "엄청난 괴력의 소유자.\n자신 체중의 100배나 되는\n무게도 가뿐히 내던진다."
        zh_simp:
          scarlet: "非常喜爱甜甜蜜，\n为了全部占为己有，\n会用引以为豪的角扔飞对手。"
          violet: "有着十分惊人的怪力。\n即使是自己体重１００倍的\n重量也能轻松扔飞。"
        zh_trad:
          scarlet: "對甜甜蜜愛不釋手，\n為了全都佔為己有，\n會用引以為傲的角扔飛對手。"
          violet: "擁有十分驚人的怪力。\n就連重量是自己體重１００倍的\n物體也能輕鬆扔飛。"
