      descriptions:
        jp_kana:
          scarlet: "￹全身￺ぜんしん￻　￹透明￺とうめい￻な　￹粘膜￺ねんまく￻で\n￹覆￺おお￻われており　￹素手￺すで￻で　￹触￺さわ￻ると\nピリピリ　しびれてくる。"
          violet: "￹地上￺ちじょう￻を　￹歩￺ある￻きまわるときは\nぬるぬるした　￹毒￺どく￻の　￹粘膜￺ねんまく￻で\n￹体￺からだ￻の￹表面￺ひょうめん￻を　￹覆￺おお￻っている。"
        jp_kanji:
          scarlet: "￹全身￺ぜんしん￻　￹透明￺とうめい￻な　￹粘膜￺ねんまく￻で\n￹覆￺おお￻われており　￹素手￺すで￻で　￹触￺さわ￻ると\nピリピリ　しびれてくる。"
          violet: "￹地上￺ちじょう￻を　￹歩￺ある￻きまわるときは\nぬるぬるした　￹毒￺どく￻の　￹粘膜￺ねんまく￻で\n￹体￺からだ￻の￹表面￺ひょうめん￻を　￹覆￺おお￻っている。"
        en:
          scarlet: "A transparent mucous membrane covers its body.\nTouching it bare-handed will cause a tingling\nnumbness."
          violet: "When it walks around on land, it coats its body\nwith a slimy, poisonous film."
        fr:
          scarlet: "Son corps est recouvert d’une membrane\ntransparente qui provoque des engourdissements\net des picotements si on la touche."
          violet: "Quand il se déplace sur la terre ferme,\nil recouvre son corps d’une membrane\ntoxique et visqueuse."
        it:
          scarlet: "Il suo corpo è ricoperto da una pellicola\ntrasparente che causa formicolio e\nintorpidimento se toccata a mani nude."
          violet: "Quando si muove sulla terraferma, ricopre\nil corpo con una pellicola di muco viscido\ne velenoso."
        de:
          scarlet: "Sein Körper ist von einem durchsichtigen Schleim\nüberzogen. Berührt man es mit der bloßen Hand,\nverursacht das eine prickelnde Taubheit."
          violet: "Bewegt es sich an Land, bedeckt es seinen\ngesamten Körper mit einem schleimigen Giftfilm."
        es:
          scarlet: "Está cubierto por una membrana mucosa\ntransparente. El contacto directo provoca\nescozor y entumecimiento."
          violet: "Cuando sale a caminar en tierra firme, se recubre\nel cuerpo con una membrana mucosa y venenosa."
        ko:
          scarlet: "온몸이 투명한 점막으로\n뒤덮여 있으며\n맨손으로 만지면 따끔따끔 저려 온다."
          violet: "지상을 돌아다닐 때는\n미끈미끈한 독의 점막으로\n몸의 표면을 덮고 있다."
        zh_simp:
          scarlet: "全身被透明的粘膜覆盖，\n如果赤手去触摸它，\n就会感到麻麻的。"
          violet: "在地面上四处走动时，\n会用滑溜溜的毒粘膜\n覆盖着身体的表面。"
        zh_trad:
          scarlet: "全身覆蓋著透明的黏膜，\n一旦赤手觸碰牠\n就會感到麻麻的。"
          violet: "在陸地上走來走去時，\n會用滑溜溜的毒黏膜\n覆蓋著身體的表面。"
    wooper_paldean_form:
