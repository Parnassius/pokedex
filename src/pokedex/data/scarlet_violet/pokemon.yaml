        special_attack: 0
        special_defense: 2
        speed: 0
      types:
        - ghost
        - fairy
      egg_groups:
        - amorphous
      abilities:
        - disguise
      descriptions:
        jp_kana:
          scarlet: "￹陽￺ひ￻の　￹当￺あ￻たらない　￹暗￺くら￻がりに　￹棲￺す￻む。\n￹人前￺ひとまえ￻に　￹出￺で￻るときは　ピカチュウに\n￹似￺に￻せた　￹布￺ぬの￻で　￹全身￺ぜんしん￻を　￹隠￺かく￻す。"
          violet: "ポケモンだと　￹認識￺にんしき￻されたのは\n￹最近￺さいきん￻のこと。　それまでは　￹布￺ぬの￻を\n￹被￺かぶ￻った　おばけと　￹思￺おも￻われていた。"
        jp_kanji:
          scarlet: "￹陽￺ひ￻の　￹当￺あ￻たらない　￹暗￺くら￻がりに　￹棲￺す￻む。\n￹人前￺ひとまえ￻に　￹出￺で￻るときは　ピカチュウに\n￹似￺に￻せた　￹布￺ぬの￻で　￹全身￺ぜんしん￻を　￹隠￺かく￻す。"
          violet: "ポケモンだと　￹認識￺にんしき￻されたのは\n￹最近￺さいきん￻のこと。　それまでは　￹布￺ぬの￻を\n￹被￺かぶ￻った　おばけと　￹思￺おも￻われていた。"
        en:
          scarlet: "This Pokémon lives in dark places untouched by\nsunlight. When it appears before humans, it hides\nitself under a cloth that resembles a Pikachu."
          violet: "Mimikyu was only recently identified as a\nPokémon. Previously, people thought it was\njust a ghost wearing a cloth."
        fr:
          scarlet: "Il vit dans les lieux sombres, à l’abri du soleil.\nLorsqu’il se montre, il dissimule tout son corps\nsous un déguisement qui rappelle Pikachu."
          violet: "Depuis peu, on sait qu’il s’agit d’un Pokémon.\nAvant cela, on le prenait pour un fantôme vêtu\nd’un drap."
        it:
          scarlet: "Vive nell’ombra, lontano dalla luce del sole.\nQuando appare davanti alle persone si nasconde\nsotto un panno che somiglia a un Pikachu."
          violet: "È stato identificato come Pokémon in tempi\nabbastanza recenti: prima di allora si pensava\nche fosse solo uno spettro coperto da un panno."
        de:
          scarlet: "Es lebt an dunklen Orten ohne Sonnenlicht.\nMenschen zeigt es sich nur, wenn es mit einem\nLumpen bedeckt ist, der aussieht wie ein Pikachu."
          violet: "Erst kürzlich wurde es als Pokémon identifiziert.\nZuvor hielt man es für ein Gespenst, das sich\neinen Lumpen übergeworfen hat."
        es:
          scarlet: "Vive en lugares oscuros donde no llega el sol.\nCuando se deja ver por la gente, oculta todo\nsu cuerpo bajo un saco con aspecto de Pikachu."
          violet: "No hace mucho que se comprendió que se trata\nde un Pokémon. Hasta entonces, se pensaba que\nera un fantasma cubierto con un saco."
        ko:
          scarlet: "볕이 들지 않는 어두운 곳에 산다.\n사람들 앞에 나타날 때는\n피카츄를 본뜬 천으로 온몸을 가린다."
          violet: "최근에야 포켓몬으로 인식되기 시작했다.\n그전까지는 천을 뒤집어쓴\n유령으로만 여겨졌었다."
        zh_simp:
          scarlet: "栖息在阳光照射不到的阴暗处。\n在人们面前现身时会用\n酷似皮卡丘的布来盖住全身。"
          violet: "最近才被认定为宝可梦。\n在这之前，大家一直\n以为它是穿着布的幽灵。"
        zh_trad:
          scarlet: "棲息在陽光照射不到的陰暗處。\n在人們面前現身時會用\n看似皮卡丘的布來隱藏全身。"
          violet: "最近才被認定成寶可夢。\n在那之前，牠一直被大家\n認為是穿著布的幽靈。"
    mimikyu_busted_form:
      form_id: 1
      names:
        jp_kana: ばれたすがた
