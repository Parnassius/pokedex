      descriptions:
        jp_kana:
          scarlet: "￹街中￺まちなか￻で　￹暮￺く￻らすことを　￹好￺この￻む。\n￹羽￺はね￻の　￹色￺いろ￻で　グループを　￹作￺つく￻り\n￹縄張￺なわば￻り￹争￺あらそ￻いを　￹繰￺く￻り￹広￺ひろ￻げる。"
          violet: "￹緑色￺みどりいろ￻の　￹羽￺はね￻の　イキリンコが\n￹最大勢力￺さいだいせいりょく￻。　エサを　￹探￺さが￻す\n￹朝￺あさ￻と　￹晩￺ばん￻は　とても　￹騒￺さわ￻がしい。"
        jp_kanji:
          scarlet: "￹街中￺まちなか￻で　￹暮￺く￻らすことを　￹好￺この￻む。\n￹羽￺はね￻の　￹色￺いろ￻で　グループを　￹作￺つく￻り\n￹縄張￺なわば￻り￹争￺あらそ￻いを　￹繰￺く￻り￹広￺ひろ￻げる。"
          violet: "￹緑色￺みどりいろ￻の　￹羽￺はね￻の　イキリンコが\n￹最大勢力￺さいだいせいりょく￻。　エサを　￹探￺さが￻す\n￹朝￺あさ￻と　￹晩￺ばん￻は　とても　￹騒￺さわ￻がしい。"
        en:
          scarlet: "These Pokémon prefer to live in cities.\nThey form flocks based on the color of\ntheir feathers, and they fight over territory."
          violet: "Green-feathered flocks hold the most sway.\nWhen they’re out searching for food in the\nmornings and evenings, it gets very noisy."
        fr:
          scarlet: "Ces Pokémon préfèrent vivre en ville. Ils forment\ndes groupes selon la couleur de leur plumage\net se livrent à des luttes de territoire."
          violet: "Ceux qui arborent un plumage vert ont le plus\nd’influence. Ils font un véritable vacarme le matin\net le soir, quand ils cherchent de la nourriture."
        it:
          scarlet: "Preferiscono vivere in centri abitati. Formano\nstormi in base al colore del piumaggio e lottano\nper espandere il loro dominio sul territorio."
          violet: "Gli Squawkabilly dal piumaggio verde sono i più\npotenti. Quando vanno alla ricerca di cibo, di\nmattina e di sera, fanno sempre molto baccano."
        de:
          scarlet: "Diese Pokémon leben bevorzugt in Städten.\nSie bilden nach Gefiederfarbe sortierte Gruppen\nund tragen untereinander Revierkämpfe aus."
          violet: "Krawalloro mit grünem Gefieder haben den\ngrößten Einfluss. Die Futtersuche am Morgen\nund Abend ist mit sehr viel Lärm verbunden."
        es:
          scarlet: "Prefieren vivir en las ciudades. Forman bandadas\nsegún el color de su plumaje y libran disputas por\nel control de los territorios."
          violet: "Los Squawkabilly de plumas verdes son los\npredominantes. Arman mucho ruido al buscar\ncomida por las mañanas y las noches."
        ko:
          scarlet: "마을에서 사는 것을 선호한다.\n깃털 색에 따라 그룹을 만들고는\n영역 다툼을 벌인다."
          violet: "녹색 깃털의 시비꼬가\n가장 세력이 크다. 먹이를 찾는\n아침과 밤에는 매우 시끄럽다."
        zh_simp:
          scarlet: "喜欢栖息在街道上。\n会以羽毛的颜色来组队，\n然后展开领地之争。"
          violet: "拥有绿色羽毛的怒鹦哥\n势力最为庞大。在觅食时段的\n早晨和夜晚会非常吵。"
        zh_trad:
          scarlet: "喜歡棲息在街上。\n會以羽毛的顏色組隊，\n展開爭奪地盤之戰。"
          violet: "綠色羽毛的怒鸚哥勢力\n最為龐大。在覓食時段的\n早晨和夜晚會非常吵鬧。"
    squawkabilly_blue_plumage:
