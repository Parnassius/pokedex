      hidden_ability: grassy_surge
      descriptions:
        jp_kana:
          scarlet: "￹持￺も￻っている　スティックは　サルノリの\n￹体内￺たいない￻からの　エネルギーを　￹浴￺あ￻びて\n￹堅￺かた￻さと　しなやかさが　￹増￺ま￻している。"
          violet: "あらゆるものを　スティックで\n￹叩￺たた￻くうちに　どんどん　￹楽￺たの￻しくなり\nリズムの　ノリも　よくなっていく。"
        jp_kanji:
          scarlet: "￹持￺も￻っている　スティックは　サルノリの\n￹体内￺たいない￻からの　エネルギーを　￹浴￺あ￻びて\n￹堅￺かた￻さと　しなやかさが　￹増￺ま￻している。"
          violet: "あらゆるものを　スティックで\n￹叩￺たた￻くうちに　どんどん　￹楽￺たの￻しくなり\nリズムの　ノリも　よくなっていく。"
        en:
          scarlet: "The stick Grookey holds has grown harder and\nmore flexible after soaking in the energy that\nemanates from inside Grookey’s body."
          violet: "As Grookey strikes everything in sight with its\nstick, it has more and more fun, and its rhythm\nbecomes livelier."
        fr:
          scarlet: "Le bâton de Ouistempo est devenu plus solide\net plus souple après avoir absorbé l’énergie\nqui émane de son corps."
          violet: "Quand il frappe tout ce qu’il voit avec son bâton,\nil se laisse emporter par son enthousiasme,\nce qui rend son rythme encore plus entraînant."
        it:
          scarlet: "La bacchetta che ha con sé assorbe energia\ndall’interno del suo corpo, diventando\nal contempo più resistente e flessibile."
          violet: "Man mano che percuote ogni cosa con la sua\nbacchetta, si diverte sempre di più e il ritmo\nche produce si fa più animato."
        de:
          scarlet: "Der Schlägel, den es bei sich trägt, nimmt\nEnergie aus Chimpeps Körper auf und wird\ndadurch robuster und biegsamer."
          violet: "Wenn es mit seinem Schlägel auf allerhand Dinge\neintrommelt, lässt es sich immer mehr mitreißen\nund sein Rhythmus wird immer schwungvoller."
        es:
          scarlet: "La baqueta que posee Grookey se vuelve más\nflexible y resistente cuando absorbe la energía\nque emana de su cuerpo."
          violet: "Al golpear con su baqueta todo lo que ve, se\ndeja llevar por la emoción y su ritmo se vuelve\ncada vez más animado."
        ko:
          scarlet: "지니고 있는 스틱은\n흥나숭의 체내에서 나오는 에너지를 받아\n더 단단해지고 탄력이 생긴다."
          violet: "온갖 것들을 스틱으로 때리다 보면\n점점 흥이 나서 리듬감도 더 좋아진다."
        zh_simp:
          scarlet: "拿着的木棒在沐浴了\n来自敲音猴体内的能量后，\n坚硬度和柔韧度都有了提升。"
          violet: "在用木棒敲打各种东西的\n过程中变得越来越愉快，\n节奏也会变得越来越好。"
        zh_trad:
          scarlet: "手中的木棒因為沐浴著\n來自敲音猴體內的能量，\n於是變得更加堅硬且柔韌。"
          violet: "用木棒見到什麼就敲什麼，\n隨著牠越敲越覺得開心，\n節奏感也變得越來越好。"
