          scarlet: "スクラップ￹工場￺こうじょう￻に　￹放置￺ほうち￻された\nエンジンに　￹謎￺なぞ￻の　￹毒￺どく￻ポケモンが\n￹入￺はい￻り￹込￺こ￻んで　￹生￺う￻まれたと　￹言￺い￻われる。"
          violet: "￹鋼￺はがね￻の　￹体￺からだ￻が　￹本体￺ほんたい￻。\n￹岩￺いわ￻に　￹張￺は￻りつき　その￹成分￺せいぶん￻を\nエネルギーに　￹変￺か￻えて　￹活動￺かつどう￻する。"
        jp_kanji:
          scarlet: "スクラップ￹工場￺こうじょう￻に　￹放置￺ほうち￻された\nエンジンに　￹謎￺なぞ￻の　￹毒￺どく￻ポケモンが\n￹入￺はい￻り￹込￺こ￻んで　￹生￺う￻まれたと　￹言￺い￻われる。"
          violet: "￹鋼￺はがね￻の　￹体￺からだ￻が　￹本体￺ほんたい￻。\n￹岩￺いわ￻に　￹張￺は￻りつき　その￹成分￺せいぶん￻を\nエネルギーに　￹変￺か￻えて　￹活動￺かつどう￻する。"
        en:
          scarlet: "It is said that this Pokémon was born when an\nunknown poison Pokémon entered and inspirited\nan engine left at a scrap-processing factory."
          violet: "The steel section is Varoom’s actual body.\nThis Pokémon clings to rocks and converts the\nminerals within into energy to fuel its activities."
        fr:
          scarlet: "On raconte qu’il est né lorsqu’un mystérieux\nPokémon Poison a pris possession d’un moteur\nlaissé à l’abandon dans une casse."
          violet: "Son corps correspond à la partie en acier.\nIl s’accroche à des roches et convertit les\nminéraux qu’elles contiennent en énergie."
        it:
          scarlet: "Pare sia nato quando un misterioso Pokémon\ndi tipo Veleno prese possesso di un motore\nabbandonato in un deposito di rottami."
          violet: "Il suo corpo è la parte d’acciaio. Si attacca alle\nrocce per trasformare la materia di cui sono\ncomposte nell’energia che usa per muoversi."
        de:
          scarlet: "Es soll entstanden sein, als ein unbekanntes\nGift-Pokémon von einem Motor Besitz ergriff,\nder in einer Schrottfabrik zurückgelassen wurde."
          violet: "Der stählerne Teil ist sein eigentlicher Körper.\nEs heftet sich an Felsen, um deren Bestandteile\nin Energie für sich selbst umzuwandeln."
        es:
          scarlet: "Se dice que surgió cuando un misterioso\nPokémon venenoso tomó posesión de un\nmotor abandonado en un desguace."
          violet: "La parte metálica es su verdadero cuerpo. Se\nadhiere a rocas para procesar sus minerales y\ngenerar energía para moverse."
        ko:
          scarlet: "고철 처리장에 방치된 엔진에\n정체불명의 독포켓몬이 들어가\n탄생한 것으로 전해지고 있다."
          violet: "강철로 된 몸이 본체다.\n바위에 달라붙은 다음,\n그 성분을 에너지로 바꿔 활동한다."
        zh_simp:
          scarlet: "据说是神秘的毒宝可梦\n钻进了放置于废弃工厂的\n引擎里，从而诞生了它。"
          violet: "钢铁的身躯才是本体。\n会贴在岩石上将其成分\n转换为活动所需的能量。"
        zh_trad:
          scarlet: "據說牠是神秘的毒寶可夢\n鑽進了被放置在廢鐵工廠\n的引擎裡而誕生的。"
          violet: "鋼鐵身軀才是本體。\n會貼在岩石上將其成分\n轉換成活動用的能量。"
