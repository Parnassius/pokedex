          violet: "いつも　￹暴￺あば￻れているので　すぐに\nお￹腹￺なか￻が　￹空￺す￻いてしまうが　￹食事￺しょくじ￻の\nときも　じっとして　いられない。"
        jp_kanji:
          scarlet: "￹体￺からだ￻を　￹動￺うご￻かしていないと\nストレスが　￹溜￺た￻まりすぎて\n￹具合￺ぐあい￻が　￹悪￺わる￻くなってしまうのだ。"
          violet: "いつも　￹暴￺あば￻れているので　すぐに\nお￹腹￺なか￻が　￹空￺す￻いてしまうが　￹食事￺しょくじ￻の\nときも　じっとして　いられない。"
        en:
          scarlet: "Its stress level rises if it cannot keep moving\nconstantly. Too much stress makes it feel sick."
          violet: "It is always hungry because it won’t stop\nrampaging. Even while it is eating, it can’t\nkeep still."
        fr:
          scarlet: "Quand il est immobile, il accumule du stress\net son état se détériore."
          violet: "Ce Pokémon ne cesse de s’agiter et de semer\nla discorde, ce qui lui ouvre l’appétit. Il ne\nreste jamais immobile, même lorsqu’il se nourrit."
        it:
          scarlet: "Quando è costretto a stare fermo raggiunge\nun tale livello di stress da rimetterci in salute."
          violet: "Smania di continuo e non sta fermo un attimo,\ncosa che gli causa sempre una gran fame.\nTuttavia, non sta fermo neppure quando mangia."
        de:
          scarlet: "Wenn es sich nicht bewegt, steigt sein\nStresslevel ins Unermessliche und es\ngeht ihm schlecht."
          violet: "Es hat immer Hunger, da es ständig randaliert.\nAuch während des Essens kann es nicht still\nsitzen."
        es:
          scarlet: "Si no puede estar en continuo movimiento,\nsu nivel de estrés se dispara y puede llegar\na enfermar."
          violet: "Siempre tiene hambre porque no para.\nNo puede estarse quieto ni comiendo."
        ko:
          scarlet: "몸을 움직이지 않으면\n스트레스가 너무 쌓여서\n상태가 나빠져 버린다."
          violet: "항상 날뛰고 있기 때문에\n금방 배고파하지만, 밥을 먹을 때도\n가만히 있지를 못한다."
        zh_simp:
          scarlet: "如果不活动活动身体，\n压力就会堆积过度，\n使身体状况变糟。"
          violet: "由于它每时每刻都在大闹，\n所以很快就会觉得饿，\n但它却连吃饭时都静不下来。"
        zh_trad:
          scarlet: "如果不活動身體，\n就會累積過多的壓力，\n使身體狀況變糟。"
          violet: "由於無時無刻都在大鬧，\n肚子馬上就會覺得餓，\n但牠卻連吃飯時也靜不下來。"
