      types:
        - ground
        - steel
      egg_groups:
        - field
      abilities:
        - sand_veil
        - tangling_hair
      hidden_ability: sand_force
      descriptions:
        jp_kana:
          scarlet: "￹頭￺あたま￻から　￹生￺は￻えているのは　￹髭￺ひげ￻が\n￹変化￺へんか￻　したもので　￹金属質￺きんぞくしつ￻。\nゆらゆら　￹動￺うご￻き　￹仲間￺なかま￻と　￹交信￺こうしん￻。"
          violet: "￹金色￺きんいろ￻の　￹髭￺ひげ￻は　センサー￹機能￺きのう￻を\n￹持￺も￻っている。　￹穴￺あな￻から　だして\n￹周￺まわ￻りの　￹様子￺ようす￻を　うかがっている。"
        jp_kanji:
          scarlet: "￹頭￺あたま￻から　￹生￺は￻えているのは　￹髭￺ひげ￻が\n￹変化￺へんか￻　したもので　￹金属質￺きんぞくしつ￻。\nゆらゆら　￹動￺うご￻き　￹仲間￺なかま￻と　￹交信￺こうしん￻。"
          violet: "￹金色￺きんいろ￻の　￹髭￺ひげ￻は　センサー￹機能￺きのう￻を\n￹持￺も￻っている。　￹穴￺あな￻から　だして\n￹周￺まわ￻りの　￹様子￺ようす￻を　うかがっている。"
        en:
          scarlet: "The things growing from its head are whiskers\nthat have become metallic. Diglett communicates\nwith its comrades by waving them."
          violet: "Its golden whiskers function as sensors.\nIt pokes them out of its burrow to monitor\nits surroundings."
        fr:
          scarlet: "Les vibrisses métalliques qui poussent sur sa tête\nrésultent d’une mutation. Il communique avec\nses congénères en les faisant osciller doucement."
          violet: "Les vibrisses dorées sur sa tête lui servent\nd’antennes. Elles dépassent de son terrier\net sondent les alentours."
        it:
          scarlet: "I peli sulla testa, frutto di una mutazione dei suoi\nbaffi, sono fili metallici che fa oscillare per\ncomunicare con i propri simili."
          violet: "I suoi capelli dorati fungono da sensori\nche fa sporgere dal buco dove si nasconde\nper esplorare i dintorni."
        de:
          scarlet: "Die metallischen Fortsätze auf seinem Kopf\nwaren ursprünglich Haare. Es wackelt mit ihnen,\num mit anderen Digda zu kommunizieren."
          violet: "Seine goldenen Haare verfügen über sensorische\nFunktionen. Es streckt sie aus Löchern heraus,\num die Umgebung zu erkunden."
        es:
          scarlet: "Los pelillos metálicos de su cabeza son fruto de\nuna mutación. Se comunica con sus compañeros\nmeneándolos."
          violet: "Los pelillos dorados de su cabeza funcionan\ncomo sensores. Para explorar su entorno, los\nasoma por el agujero en el que se esconde."
        ko:
          scarlet: "머리에 돋아나 있는 것은 수염이\n변화한 것으로 금속질이다.\n흔들거리며 동료와 교신한다."
          violet: "금색 수염은 센서 기능을\n가지고 있으며, 구멍에서 내밀어\n주변의 상황을 살피곤 한다."
        zh_simp:
          scarlet: "从头上长出的金属物体\n是由胡子变化而来的。\n通过摆动跟伙伴进行交流。"
          violet: "金色的胡子拥有感应器的功能。\n从洞里伸出，查探周围的状态。"
        zh_trad:
          scarlet: "從頭上長出來的是\n鬍鬚變化而來的金屬物體。\n隨著擺動跟夥伴進行交流。"
          violet: "金色的鬍子擁有感應器的功能。\n會從洞裡伸出，查探周圍的狀態。"
