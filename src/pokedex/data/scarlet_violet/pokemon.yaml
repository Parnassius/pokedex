      descriptions:
        jp_kana:
          scarlet: "￹首￺くび￻の　￹付￺つ￻け￹根￺ね￻に　￹炎￺ほのお￻の　￹鈴￺すず￻が\nある。　￹炎￺ほのお￻が　￹噴￺ふ￻きだすとき\nリンリンと　￹高￺たか￻い￹音￺おと￻が　￹鳴￺な￻る。"
          violet: "なつくと　トレーナーにも　￹甘￺あま￻えるが\n￹力￺ちから￻は　￹強￺つよ￻く　ツメも　￹鋭￺するど￻い。\n￹全身￺ぜんしん￻　￹傷￺きず￻だらけに　されるぞ。"
        jp_kanji:
          scarlet: "￹首￺くび￻の　￹付￺つ￻け￹根￺ね￻に　￹炎￺ほのお￻の　￹鈴￺すず￻が\nある。　￹炎￺ほのお￻が　￹噴￺ふ￻きだすとき\nリンリンと　￹高￺たか￻い￹音￺おと￻が　￹鳴￺な￻る。"
          violet: "なつくと　トレーナーにも　￹甘￺あま￻えるが\n￹力￺ちから￻は　￹強￺つよ￻く　ツメも　￹鋭￺するど￻い。\n￹全身￺ぜんしん￻　￹傷￺きず￻だらけに　されるぞ。"
        en:
          scarlet: "At its throat, it bears a bell of fire. The bell rings\nbrightly whenever fire spews out."
          violet: "Torracat will let its Trainer coddle it once they’ve\ngrown close, but it’s a powerful, sharp-clawed\nPokémon, so its Trainer gets covered in scratches."
        fr:
          scarlet: "Il porte un grelot de feu autour du cou.\nLorsqu’il crache des flammes, ce grelot\nse met à tinter bruyamment."
          violet: "Il faut d’abord gagner sa confiance pour pouvoir\nle câliner. Mais attention, il est puissant et ses\ngriffes acérées peuvent causer des égratignures."
        it:
          scarlet: "Quando si mette a sputare fuoco, il sonaglio\ninfuocato che tiene al collo emette un forte\ntintinnio."
          violet: "Quando si affeziona, si lascia coccolare da chi\nlo allena, ma essendo forte e dotato di artigli\naffilati, c’è il rischio di ritrovarsi pieni di graffi."
        de:
          scarlet: "Es trägt ein feuriges Glöckchen am Hals.\nImmer, wenn es Flammen ausstößt, ertönt\nein helles Läuten."
          violet: "Zutrauliche Miezunder schmiegen sich zwar an\nihren Trainer an, da sie aber stark und ihre Krallen\nscharf sind, erleidet dieser überall Kratzwunden."
        es:
          scarlet: "Luce al cuello un cascabel incandescente que\ntintinea con fuerza cuando desprende llamas."
          violet: "Si le coge cariño a su Entrenador, se muestra\nafectuoso, pero es tan fuerte y sus garras tan\nafiladas que lo puede dejar lleno de arañazos."
        ko:
          scarlet: "목 주변에 불꽃의 방울이 있다.\n불꽃을 뿜어낼 때\n딸랑딸랑 높은 소리가 난다."
          violet: "친해지면 트레이너에게도 응석 부리지만,\n힘이 강하고 발톱도 날카롭기 때문에\n온몸을 상처투성이로 만들 위험이 있다."
        zh_simp:
          scarlet: "脖子上挂有火焰铃铛。\n喷出火焰的时候，\n会叮铃铃地发出很响的声音。"
          violet: "如果亲近了，也会对训练家撒娇，\n但是力量很强，爪子也很锋利，\n所以会被弄得全身是伤。"
        zh_trad:
          scarlet: "脖子上掛著火焰鈴鐺。\n噴出火焰的時候，\n會叮鈴鈴地發出響亮的聲音。"
          violet: "變得親近後也會對訓練家撒嬌。\n但因為力氣很大，爪子又很銳利，\n訓練家會被弄得全身是傷。"
