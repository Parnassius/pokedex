      descriptions:
        jp_kana:
          scarlet: "￹風￺かぜ￻に　￹流￺なが￻され　かなりの　￹距離￺きょり￻を\n￹移動￺いどう￻する。　パルデアの　ハネッコが\nどこから　￹来￺き￻たのかは　はっきりしない。"
          violet: "￹寒￺さむ￻い　￹地域￺ちいき￻を　￹除￺のぞ￻けば　わりと\nどこにでも　いるのは　￹風￺かぜ￻に　￹乗￺の￻り\n￹各地￺かくち￻を　￹移動￺いどう￻しているからだ。"
        jp_kanji:
          scarlet: "￹風￺かぜ￻に　￹流￺なが￻され　かなりの　￹距離￺きょり￻を\n￹移動￺いどう￻する。　パルデアの　ハネッコが\nどこから　￹来￺き￻たのかは　はっきりしない。"
          violet: "￹寒￺さむ￻い　￹地域￺ちいき￻を　￹除￺のぞ￻けば　わりと\nどこにでも　いるのは　￹風￺かぜ￻に　￹乗￺の￻り\n￹各地￺かくち￻を　￹移動￺いどう￻しているからだ。"
        en:
          scarlet: "This Pokémon is blown across vast distances\nby the wind. It is unclear where the Hoppip of\nPaldea originally came from."
          violet: "Outside of cold regions, Hoppip can be found\npractically everywhere. This is because the wind\ncarries this species all over the world."
        fr:
          scarlet: "Les Granivol parcourent de grandes distances,\nemportés par le vent. On ignore d’où viennent\nceux qui ont atterri à Paldea."
          violet: "On trouve des Granivol à peu près partout,\ncar le vent les porte aux quatre coins du monde.\nIls évitent toutefois les régions froides."
        it:
          scarlet: "Percorre distanze notevoli trasportato dal vento.\nLa provenienza esatta degli esemplari che\npopolano Paldea è tuttora sconosciuta."
          violet: "Va dove lo porta il vento. Per questo motivo,\nescluse le regioni più fredde, è possibile\nincontrare Hoppip praticamente in ogni luogo."
        de:
          scarlet: "Dieses Pokémon lässt sich vom Wind treiben\nund legt so weite Strecken zurück. Woher die\nHoppspross aus Paldea stammen, ist ungewiss."
          violet: "Abgesehen von kalten Gegenden sind sie nahezu\nüberall anzutreffen. Das liegt daran, dass sie sich\nvom Wind an alle möglichen Orte tragen lassen."
        es:
          scarlet: "Recorre largas distancias arrastrado por el viento.\nSe desconoce la procedencia exacta de los\nejemplares que habitan en Paldea."
          violet: "Se deja llevar por el viento, por lo que se hallan\nejemplares repartidos prácticamente por todo el\nmundo, salvo en las regiones más frías."
        ko:
          scarlet: "바람을 타고 상당히 먼 거리를 이동한다.\n팔데아의 통통코가 어디서 온 것인지는\n확실히 밝혀진 것이 없다."
          violet: "추운 지역을 제외하면\n의외로 어디에나 존재하는데\n이는 바람을 타고 각지를 이동하기 때문이다."
        zh_simp:
          scarlet: "会随着风移动到很远的地方。\n没有人知道帕底亚的\n毽子草具体是从哪里来的。"
          violet: "由于会乘着风在各地移动，\n因此除了寒冷的地方，\n几乎随处可见它的身影。"
        zh_trad:
          scarlet: "會隨著風移動到很遠的地方。\n沒有人能具體指出帕底亞的\n毽子草是從哪裡來的。"
          violet: "由於會乘著風在各地移動，\n因此除了寒冷的地區以外，\n幾乎隨處可見牠們的身影。"
