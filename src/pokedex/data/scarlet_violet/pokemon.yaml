      descriptions:
        jp_kana:
          scarlet: "￹相手￺あいて￻を　￹操￺あやつ￻るときの　￹不思議￺ふしぎ￻な\nステップは　￹昔￺むかし￻　￹外国￺がいこく￻で\n￹大流行￺だいりゅうこう￻したことが　ある。"
          violet: "￹黒真珠￺くろしんじゅ￻で　サイコパワーを\n￹強￺つよ￻め　￹奇妙￺きみょう￻な　ステップで\n￹相手￺あいて￻の　￹心￺こころ￻を　￹操￺あやつ￻るぞ。"
        jp_kanji:
          scarlet: "￹相手￺あいて￻を　￹操￺あやつ￻るときの　￹不思議￺ふしぎ￻な\nステップは　￹昔￺むかし￻　￹外国￺がいこく￻で\n￹大流行￺だいりゅうこう￻したことが　ある。"
          violet: "￹黒真珠￺くろしんじゅ￻で　サイコパワーを\n￹強￺つよ￻め　￹奇妙￺きみょう￻な　ステップで\n￹相手￺あいて￻の　￹心￺こころ￻を　￹操￺あやつ￻るぞ。"
        en:
          scarlet: "It can perform odd dance steps to influence\nfoes. Its style of dancing became hugely\npopular overseas."
          violet: "It uses black pearls to amplify its psychic\npower. It does a strange dance to control\nfoes’ minds."
        fr:
          scarlet: "La danse singulière qu’il exécute pour manipuler\nses adversaires fut autrefois très populaire\nà l’étranger."
          violet: "Ses perles noires accroissent ses pouvoirs\npsychiques, qui lui permettent de contrôler\nses adversaires avec sa danse étrange."
        it:
          scarlet: "La strana danza che esegue per controllare\nil nemico era di gran moda tempo fa,\nin una regione lontana."
          violet: "Amplifica i propri poteri psichici con le perle\nnere e si esibisce in danze bizzarre\nper controllare la mente dei nemici."
        de:
          scarlet: "Die seltsamen Tanzschritte, mit denen es seine\nGegner kontrolliert, erfreuten sich einst in\nanderen Regionen großer Beliebtheit."
          violet: "Mit schwarzen Perlen verstärkt es seine\nPsycho-Kräfte. Es kontrolliert seine Gegner\nmit seltsamen Tanzschritten."
        es:
          scarlet: "Para controlar a su rival usa unos curiosos\npasos de baile, antaño muy populares en el\nextranjero."
          violet: "Las perlas negras aumentan sus poderes\npsíquicos. Controla las mentes de sus rivales\ncon un extraño baile."
        ko:
          scarlet: "상대를 조종할 때 사용하는\n이상한 스텝은 옛날에 외국에서\n크게 유행했던 적이 있다."
          violet: "흑진주로 사이코 파워를\n증폭시킨다. 이상한 스텝으로\n상대의 마음을 조종한다."
        zh_simp:
          scarlet: "它在操纵对手时所跳的\n奇异舞步，过去曾在\n外国掀起一阵风潮。"
          violet: "会用黑珍珠增强自己的\n精神力量，并用奇妙的\n舞步操纵对手的心。"
        zh_trad:
          scarlet: "操縱對手時跳的奇異舞步，\n過去曾在外國掀起過\n一陣風潮。"
          violet: "會用黑珍珠增強自己\n的精神力量，並用奇妙\n的舞步操縱對手的心。"
