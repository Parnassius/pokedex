      descriptions:
        jp_kana:
          scarlet: "￹畑￺はたけ￻に　￹入￺はい￻ってこないように\n￹天敵￺てんてき￻の　ルガルガンに　￹見張￺みは￻りを\nまかせる　￹農家￺のうか￻は　￹多￺おお￻いのだ。"
          violet: "￹季節￺きせつ￻で　￹匂￺にお￻いも　￹変化￺へんか￻する。\n￹独特￺どくとく￻の　￹青臭￺あおくさ￻い　￹匂￺にお￻いが\n￹香￺かお￻ってきたら　￹夏￺なつ￻の　￹始￺はじ￻まりだ。"
        jp_kanji:
          scarlet: "￹畑￺はたけ￻に　￹入￺はい￻ってこないように\n￹天敵￺てんてき￻の　ルガルガンに　￹見張￺みは￻りを\nまかせる　￹農家￺のうか￻は　￹多￺おお￻いのだ。"
          violet: "￹季節￺きせつ￻で　￹匂￺にお￻いも　￹変化￺へんか￻する。\n￹独特￺どくとく￻の　￹青臭￺あおくさ￻い　￹匂￺にお￻いが\n￹香￺かお￻ってきたら　￹夏￺なつ￻の　￹始￺はじ￻まりだ。"
        en:
          scarlet: "To prevent Deerling from entering their fields,\nmany farmers will have several Lycanroc stand\nguard, as they are the natural enemy of Deerling."
          violet: "Deerling have different scents depending on the\nseason. When a distinct grassy smell starts to waft\nfrom one, you know that summer has begun."
        fr:
          scarlet: "De nombreux fermiers font surveiller leurs\nchamps par des Lougaroc, ennemis naturels des\nVivaldaim, pour empêcher ces derniers d’y entrer."
          violet: "Son odeur varie selon les saisons. Lorsqu’il se met\nà sentir l’herbe fraîchement coupée, cela annonce\nle début de l’été."
        it:
          scarlet: "Per evitare che entri nei campi coltivati, molti\nagricoltori si servono dei Lycanroc, suoi predatori\nnaturali, per fare la guardia."
          violet: "Il suo odore cambia con le stagioni. Quando\nemette un particolare profumo di erba fresca,\nsignifica che è iniziata l’estate."
        de:
          scarlet: "Um es von ihren Feldern fernzuhalten, setzen\nviele Landwirte seinen natürlichen Fressfeind\nWolwerock als Wächter ein."
          violet: "Sein Geruch ändert sich mit der Jahreszeit.\nVerströmt es einen unverwechselbaren Duft nach\nfrischem Gras, so hat der Sommer begonnen."
        es:
          scarlet: "Muchos granjeros encomiendan la custodia de\nsus cosechas a los Lycanroc, enemigos naturales\nde los Deerling, para mantenerlos alejados."
          violet: "Su fragancia cambia según la estación. Cuando\ncomienza a despedir un olor herbáceo, es señal\nde que ha llegado el verano."
        ko:
          scarlet: "밭에 들어오지 못하도록\n천적인 루가루암에게\n경비를 맡기는 농가가 많다."
          violet: "계절에 따라 냄새도 변한다.\n독특하면서도 풋풋한 냄새가 난다면\n여름이 시작된 것이다."
        zh_simp:
          scarlet: "为了防止田地被它入侵，\n许多农家会拜托它的天敌，\n也就是鬃岩狼人来站岗。"
          violet: "随着季节流动，气味也会变化。\n如果它身上散发出了独特的\n青草味，那就代表夏天到了。"
        zh_trad:
          scarlet: "為了防止田地受牠入侵，\n有不少農家都會拜託\n天敵的鬃岩狼人來站崗。"
          violet: "隨著季節，氣味也會有變化。\n如果牠身上散發出了獨特的\n青草味，就代表夏天到了。"
    deerling_autumn_form:
      form_id: 2
      names:
