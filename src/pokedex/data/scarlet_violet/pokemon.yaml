      descriptions:
        jp_kana:
          scarlet: "￹動￺うご￻きが　のろく　￹間抜￺まぬ￻け。\n￹叩￺たた￻かれても　５￹秒￺びょう￻　たってから\n￹痛￺いた￻さを　￹感￺かん￻じるほどだ。"
          violet: "いつも　ボーッとしていて　なにを\n￹考￺かんが￻えているか　わからない。\n￹尻尾￺しっぽ￻で　エサを　￹釣￺つ￻るのが　￹得意￺とくい￻。"
        jp_kanji:
          scarlet: "￹動￺うご￻きが　のろく　￹間抜￺まぬ￻け。\n￹叩￺たた￻かれても　５￹秒￺びょう￻　たってから\n￹痛￺いた￻さを　￹感￺かん￻じるほどだ。"
          violet: "いつも　ボーッとしていて　なにを\n￹考￺かんが￻えているか　わからない。\n￹尻尾￺しっぽ￻で　エサを　￹釣￺つ￻るのが　￹得意￺とくい￻。"
        en:
          scarlet: "It is incredibly slow and dopey. It takes five\nseconds for it to feel pain when under attack."
          violet: "It is always vacantly lost in thought, but no one\nknows what it is thinking about. It is good at\nfishing with its tail."
        fr:
          scarlet: "Ce Pokémon est très lent et apathique.\nIl lui faut cinq secondes pour ressentir\nla douleur provoquée par une attaque."
          violet: "Ramoloss semble toujours distrait, mais personne\nne sait vraiment à quoi il pense. Il adore pêcher\nà l’aide de sa queue."
        it:
          scarlet: "Incredibilmente lento e tonto, ci mette cinque\nsecondi a percepire il dolore dopo essere stato\ncolpito."
          violet: "È sempre assorto, ma nessuno sa a cosa stia\npensando. Si serve della coda per pescare."
        de:
          scarlet: "Ein unglaublich träges und einfältiges Pokémon.\nWenn es angegriffen wird, bemerkt es den\nSchmerz erst fünf Sekunden später."
          violet: "Flegmon ist stets in Gedanken versunken,\naber niemand weiß, worüber es nachdenkt.\nSeine Rute nutzt es geschickt zum Angeln."
        es:
          scarlet: "Increíblemente lento y torpe. Tarda cinco\nsegundos en sentir dolor si lo atacan."
          violet: "Está siempre en su mundo, pero nadie sabe en\nqué piensa. Suele pescar con la cola."
        ko:
          scarlet: "움직임이 둔하고 멍청하다.\n맞아도 5초는 지나야\n아픔을 느낄 정도다."
          violet: "항상 멍하니 있어서\n무슨 생각을 하고 있는지 알 수 없다.\n꼬리로 먹이를 낚는 것이 특기다."
        zh_simp:
          scarlet: "动作迟缓又呆头呆脑。\n就算挨打也要过５秒\n才能感受到疼痛。"
          violet: "总是在发呆，\n不知道它在想些什么。\n很擅长用尾巴来钓食物。"
        zh_trad:
          scarlet: "動作遲鈍且呆頭呆腦。\n就算挨打也得花上５秒\n才會感受到疼痛。"
          violet: "總是一副在發呆的樣子，\n不知道在想些什麼。\n擅長用尾巴來釣食物。"
