      descriptions:
        jp_kana:
          scarlet: "￹穏￺おだ￻やかな　￹気質￺きしつ￻。　キュウコンの\nリージョンフォームと　わかるまでは\n￹神￺かみ￻の￹化身￺けしん￻と　￹敬￺うやま￻われていた。"
          violet: "￹体毛￺たいもう￻から　￹氷￺こおり￻の￹粒￺つぶ￻を　￹生￺う￻み\n￹敵￺てき￻に　￹浴￺あ￻びせかける。　￹怒￺おこ￻らせると\n￹一瞬￺いっしゅん￻で　￹氷漬￺こおりづ￻けに　される。"
        jp_kanji:
          scarlet: "￹穏￺おだ￻やかな　￹気質￺きしつ￻。　キュウコンの\nリージョンフォームと　わかるまでは\n￹神￺かみ￻の￹化身￺けしん￻と　￹敬￺うやま￻われていた。"
          violet: "￹体毛￺たいもう￻から　￹氷￺こおり￻の￹粒￺つぶ￻を　￹生￺う￻み\n￹敵￺てき￻に　￹浴￺あ￻びせかける。　￹怒￺おこ￻らせると\n￹一瞬￺いっしゅん￻で　￹氷漬￺こおりづ￻けに　される。"
        en:
          scarlet: "Possessing a calm demeanor, this Pokémon was\nrevered as a deity incarnate before it was\nidentified as a regional variant of Ninetales."
          violet: "It creates drops of ice in its coat and showers\nthem over its enemies. Anyone who angers it will\nbe frozen stiff in an instant."
        fr:
          scarlet: "Il est de nature très calme. Jusqu’à ce qu’on\nl’identifie comme une forme régionale de\nFeunard, il était adoré comme un avatar divin."
          violet: "Il tire sur ses adversaires des rafales de petites\nboules de glace générées par sa fourrure. Il peut\ncongeler sur place quiconque le met en colère."
        it:
          scarlet: "Ha un’indole tranquilla. Prima di scoprire che si\ntratta di una forma regionale di Ninetales, era\nvenerato come incarnazione di una divinità."
          violet: "Colpisce il nemico con una pioggia di cristalli\ndi ghiaccio che genera dal suo manto. Chi lo fa\narrabbiare si ritrova congelato all’istante."
        de:
          scarlet: "Dieses sanftmütige Pokémon wurde als Gottheit\nverehrt, bis man herausfand, dass es sich um eine\nRegionalform Vulnonas handelt."
          violet: "Es greift seine Feinde mittels Eiskristallen an,\ndie es mit seinem Fell erzeugt. Wer es wütend\nmacht, wird in Sekundenschnelle tiefgefroren."
        es:
          scarlet: "De temperamento tranquilo. Hasta que se supo\nque era la forma regional de Ninetales, se lo\nveneraba como la encarnación de una deidad."
          violet: "En su pelaje se crean cristales de hielo con los\nque cubre al enemigo. Quien lo enfada acaba\ncongelado al instante."
        ko:
          scarlet: "온화한 기질을 가졌다. 나인테일의\n리전폼으로 알려지기 전에는\n신의 화신으로 숭상받아 왔다."
          violet: "털에서 얼음 알갱이를 만들어\n적에게 퍼붓는다. 화나게 하면\n한순간에 얼려 버린다."
        zh_simp:
          scarlet: "性格温和。在被人知道是\n九尾的地区形态之前，\n人们一直把它敬为神的化身。"
          violet: "从体毛中生出冰粒，泼向敌人。\n如果惹恼它，一瞬间就会被冰镇。"
        zh_trad:
          scarlet: "性格穩重。被人知道是\n九尾的地區形態之前，\n一直被尊敬為神的化身。"
          violet: "從體毛中生出冰粒，潑向敵人。\n如果惹惱牠，一瞬間就會被冰鎮。"
