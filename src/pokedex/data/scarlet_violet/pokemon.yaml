          scarlet: "￹大昔￺おおむかし￻から　￹人￺ひと￻を　￹背中￺せなか￻に\n￹乗￺の￻せていたらしい。　１￹万年前￺まんねんまえ￻の\n￹壁画￺へきが￻に　￹様子￺ようす￻が　￹描￺えが￻かれている。"
          violet: "￹人￺ひと￻を　￹乗￺の￻せて　￹時速￺じそく￻１２０キロで\n￹疾走￺しっそう￻する。　￹人￺ひと￻の　￹体温￺たいおん￻で\n￹背中￺せなか￻が　￹温￺あたた￻まり　￹元気￺げんき￻になる。"
        jp_kanji:
          scarlet: "￹大昔￺おおむかし￻から　￹人￺ひと￻を　￹背中￺せなか￻に\n￹乗￺の￻せていたらしい。　１￹万年前￺まんねんまえ￻の\n￹壁画￺へきが￻に　￹様子￺ようす￻が　￹描￺えが￻かれている。"
          violet: "￹人￺ひと￻を　￹乗￺の￻せて　￹時速￺じそく￻１２０キロで\n￹疾走￺しっそう￻する。　￹人￺ひと￻の　￹体温￺たいおん￻で\n￹背中￺せなか￻が　￹温￺あたた￻まり　￹元気￺げんき￻になる。"
        en:
          scarlet: "Apparently Cyclizar has been allowing people to\nride on its back since ancient times. Depictions of\nthis have been found in 10,000-year-old murals."
          violet: "It can sprint at over 70 mph while carrying a\nhuman. The rider’s body heat warms Cyclizar’s\nback and lifts the Pokémon’s spirit."
        fr:
          scarlet: "Des fresques vieilles de 10 000 ans laissent\npenser que ce Pokémon transporte des êtres\nhumains sur son dos depuis les temps anciens."
          violet: "Il peut courir à 120 km/h avec un être humain sur\nle dos. La chaleur corporelle des personnes qu’il\ntransporte le réchauffe et lui donne de l’énergie."
        it:
          scarlet: "Sembra che trasportasse esseri umani sul dorso\ngià nell’antichità. È rappresentato in pitture\nrupestri risalenti a 10.000 anni fa."
          violet: "Trasporta esseri umani sfrecciando a una velocità\ndi 120 km/h. La temperatura corporea di chi\ntrasporta gli scalda il dorso, dandogli energia."
        de:
          scarlet: "Seit uralten Zeiten soll es Menschen auf seinem\nRücken reiten lassen. Darstellungen davon finden\nsich auf 10 000 Jahre alten Wandmalereien."
          violet: "Es kann mit 120 km/h umherdüsen, während es\neinen Menschen trägt. Die Körperwärme der\nPerson wärmt seinen Rücken und gibt ihm Kraft."
        es:
          scarlet: "Según parece, ha permitido que los humanos\nmonten en él desde tiempos remotos. Aparece\nen pinturas rupestres de hace diez mil años."
          violet: "Puede correr a 120 km/h con una persona a\ncuestas. El calor corporal del jinete calienta su\nlomo y le da energía."
        ko:
          scarlet: "먼 옛날부터 인간을\n등에 태우고 다녔다고 한다.\n1만 년 전 벽화에도 그 모습이 그려져 있다."
          violet: "사람을 태우고 시속 120km로 질주한다.\n사람의 체온으로 등이 따뜻해지면\n기운이 난다."
        zh_simp:
          scarlet: "似乎自古以来就会让人类\n坐在背上。１万年前的\n壁画里描绘着那样的情景。"
          violet: "以时速１２０公里载着人飞驰。\n它可以借由人类的体温\n来温暖背部，恢复活力。"
        zh_trad:
          scarlet: "似乎自古就會讓人類\n坐在背上。１萬年前的\n壁畫上描繪著該模樣。"
          violet: "會以時速１２０公里載著\n人類飛馳，並藉著人類的\n體溫來溫熱背部，恢復活力。"
