        jp_kanji:
          scarlet: "￹寒￺さむ￻い　￹季節￺きせつ￻は　￹山￺やま￻の　ふもとまで\n￹降￺お￻りてくるが　￹春￺はる￻に　なると\n￹雪￺ゆき￻が　￹残￺のこ￻る　￹山頂￺さんちょう￻に　￹戻￺もど￻っていく。"
          violet: "￹人間￺にんげん￻に　￹興味￺きょうみ￻が　あるのか\n￹雪山￺ゆきやま￻で　￹足跡￺あしあと￻を　￹見￺み￻つけると\nそのまわりに　￹集￺あつ￻まって￹来￺く￻る。"
        en:
          scarlet: "During cold seasons, it migrates to the\nmountain’s lower reaches. It returns to the\nsnow-covered summit in the spring."
          violet: "Seemingly curious about people, they\ngather around footsteps they find on\nsnowy mountains."
        fr:
          scarlet: "Il descend au pied des montagnes en hiver,\npuis il rejoint les pics enneigés au printemps."
          violet: "Ces Pokémon semblent éprouver de la curiosité\npour les êtres humains. Ils se rassemblent autour\ndes traces de pas trouvées dans la montagne."
        it:
          scarlet: "In inverno scende fino ai piedi delle\nmontagne, ma in primavera se ne torna\nsulle cime montuose dove c’è ancora neve."
          violet: "Sembrano essere incuriositi dagli esseri umani, e\nse trovano delle impronte umane sulle montagne\ninnevate si raccolgono in gruppo tutt’intorno."
        de:
          scarlet: "In der kalten Jahreszeit steigt es bis zum Fuß\nder Berge hinab. Im Frühjahr kehrt es auf die\nGipfel zurück, wo noch Schnee liegt."
          violet: "Sie scheinen neugierig auf Menschen zu sein\nund versammeln sich bei Fußspuren, die sie\nauf verschneiten Bergen finden."
        es:
          scarlet: "En las estaciones frías baja al pie de la\nmontaña, pero regresa a las cimas nevadas\nen primavera."
          violet: "Sienten mucha curiosidad por los humanos.\nSi alguno encuentra huellas en la nieve,\nacuden todos a mirar."
        ko:
          scarlet: "추운 계절에는 산기슭까지\n내려오지만 봄이 되면\n눈이 남아 있는 산 정상으로 돌아간다."
          violet: "인간에게 흥미가 있는지\n설산에서 발자국을 발견하면\n그 주변에 모여든다."
        zh_simp:
          scarlet: "在寒冷的季节里，会迁移到山脚下，\n一到春天就会返回积雪残留的山顶。"
          violet: "或许是对人类感兴趣，\n只要在雪山发现了脚印，\n就会聚集到那周围去。"
        zh_trad:
          scarlet: "在寒冷的季節裡會\n移動到山腳下，一到春天就會\n返回積雪尚存的山頂。"
          violet: "或許是因為對人類有興趣，\n只要在雪山裡發現了腳印，\n就會聚集到那周圍去。"
