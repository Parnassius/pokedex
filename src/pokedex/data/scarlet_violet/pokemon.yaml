        jp_kana:
          scarlet: "￹踊￺おど￻るような　￹蹴￺け￻り￹技￺わざ￻が　￹得意￺とくい￻。\n￹頭￺あたま￻の　ツノは　￹体毛￺たいもう￻や　ツメと\n￹同￺おな￻じ　￹成分￺せいぶん￻で　できている。"
          violet: "ツノを　￹軸￺じく￻に　￹回転￺かいてん￻しながら\n￹華麗￺かれい￻な　キックを　お￹見舞￺みま￻いする。\nツノは　￹生涯￺しょうがい￻　￹伸￺の￻び￹続￺つづ￻ける。"
        jp_kanji:
          scarlet: "￹踊￺おど￻るような　￹蹴￺け￻り￹技￺わざ￻が　￹得意￺とくい￻。\n￹頭￺あたま￻の　ツノは　￹体毛￺たいもう￻や　ツメと\n￹同￺おな￻じ　￹成分￺せいぶん￻で　できている。"
          violet: "ツノを　￹軸￺じく￻に　￹回転￺かいてん￻しながら\n￹華麗￺かれい￻な　キックを　お￹見舞￺みま￻いする。\nツノは　￹生涯￺しょうがい￻　￹伸￺の￻び￹続￺つづ￻ける。"
        en:
          scarlet: "This Pokémon is adept at dance-like kicks.\nThe horn atop its head is made from the same\nsubstance that generally forms fur and claws."
          violet: "It spins on its horn while dealing out elegant\nkicks. Its horn grows continuously through its\nlifetime."
        fr:
          scarlet: "Ses coups de pied évoquent une danse.\nLa corne qui surmonte sa tête est faite de\nla même matière que les poils et les ongles."
          violet: "Il assène de gracieux coups de pied tout\nen tournoyant sur sa corne. Cette dernière\ncontinue de pousser tout au long de sa vie."
        it:
          scarlet: "La sua specialità sono i calci, che sferra come\nin una danza. Il corno che ha in testa è fatto\ndella stessa sostanza che forma peli e unghie."
          violet: "Sferra eleganti calci ruotando su se stesso.\nUsa come perno il corno, che continua a crescere\nper tutta la sua vita."
        de:
          scarlet: "Tanzartige Tritte sind Kapoeras Spezialität.\nDas Horn auf seinem Kopf besteht aus dem\ngleichen Material wie Haare und Krallen."
          violet: "Es dreht sich auf seinem Horn um die eigene\nAchse und teilt dabei elegante Tritte aus.\nDas Horn wächst sein ganzes Leben lang weiter."
        es:
          scarlet: "Su especialidad son las patadas danzarinas.\nEl cuerno que tiene en la cabeza está hecho\ndel mismo material que el pelo y las garras."
          violet: "Su cuerno, que no deja de crecerle durante toda\nla vida, le sirve como eje para girar mientras\npropina sus elegantes patadas."
        ko:
          scarlet: "춤추는 듯한 발차기 기술이 특기다.\n머리의 뿔은 털이나 발톱과\n같은 성분으로 되어 있다."
          violet: "뿔을 축으로 회전하면서\n화려한 킥을 선보인다.\n뿔은 평생 자라난다."
        zh_simp:
          scarlet: "擅长如舞蹈般的踢技。\n头上的角拥有与\n体毛和指甲相同的成分。"
          violet: "会以角为轴旋转\n并施展华丽的踢击。\n角会在一生中不停生长。"
        zh_trad:
          scarlet: "擅長如跳舞般的踢技。\n構成頭上的角的成分\n和體毛與指甲是相同的。"
          violet: "會以角為軸心旋轉，\n並施展華麗的踢擊。\n角會一輩子不停地生長。"
