    zh_simp: 小火龙
    zh_trad: 小火龍
  forms:
    charmander:
      form_id: 0
      base_stats:
        hp: 39
        attack: 52
        defense: 43
        special_attack: 60
        special_defense: 50
        speed: 65
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - fire
      egg_groups:
        - monster
        - dragon
      abilities:
        - blaze
      hidden_ability: solar_power
      descriptions:
        jp_kana:
          scarlet: "￹尻尾￺しっぽ￻で　￹燃￺も￻える　￹炎￺ほのお￻は\n￹生命力￺せいめいりょく￻の　￹表￺あらわ￻れ。\n￹元気￺げんき￻がないと　￹炎￺ほのお￻は　￹弱￺よわ￻まる。"
          violet: "￹尻尾￺しっぽ￻の　￹先￺さき￻の　￹炎￺ほのお￻は\n￹元気￺げんき￻なら　￹少￺すこ￻しくらい　￹濡￺ぬ￻れても\n￹消￺き￻えることなく　￹燃￺も￻え￹盛￺さか￻る。"
        jp_kanji:
          scarlet: "￹尻尾￺しっぽ￻で　￹燃￺も￻える　￹炎￺ほのお￻は\n￹生命力￺せいめいりょく￻の　￹表￺あらわ￻れ。\n￹元気￺げんき￻がないと　￹炎￺ほのお￻は　￹弱￺よわ￻まる。"
          violet: "￹尻尾￺しっぽ￻の　￹先￺さき￻の　￹炎￺ほのお￻は\n￹元気￺げんき￻なら　￹少￺すこ￻しくらい　￹濡￺ぬ￻れても\n￹消￺き￻えることなく　￹燃￺も￻え￹盛￺さか￻る。"
        en:
          scarlet: "The flame on its tail shows the strength of its\nlife-force. If Charmander is weak, the flame\nalso burns weakly."
          violet: "If Charmander is healthy, the flame on the tip of\nits tail will burn vigorously and won’t go out even\nif it gets a bit wet."
        fr:
          scarlet: "La flamme au bout de sa queue représente\nsa vitalité. Quand Salamèche n’est pas\nau meilleur de sa forme, elle faiblit."
          violet: "Quand il est en bonne santé, la flamme\nau bout de sa queue continue de flamboyer\nmême si elle est légèrement aspergée d’eau."
        it:
          scarlet: "La fiamma che ha sulla coda indica lo stato\ndella sua forza vitale: quando è fiacco,\nla fiamma è fioca."
          violet: "Se è in forma, la fiamma che ha sulla punta\ndella coda brucia con forza e non si spegne\nneanche se la coda si bagna un po’."
        de:
          scarlet: "Die Flamme an seiner Schwanzspitze zeigt seine\nLebensenergie an. Geht es ihm nicht gut, wird die\nFlamme schwächer."
          violet: "Ist es gesund, strahlt die Flamme an seiner\nSchwanzspitze leuchtend hell und erlischt selbst\ndann nicht, wenn sie ein wenig nass wird."
        es:
          scarlet: "La llama de su cola indica su fuerza vital.\nSi está débil, la llama arderá más tenue."
          violet: "Si está sano, la llama de la punta de su cola\narderá vigorosamente, aunque se le moje un\npoco."
        ko:
          scarlet: "꼬리에서 타오르는 불꽃은\n생명력의 상징.\n기운이 없으면 불꽃이 약해진다."
          violet: "꼬리 끝의 불꽃은\n건강할 때라면 조금 젖어도\n꺼지지 않고 활활 타오른다."
        zh_simp:
          scarlet: "在尾巴上燃烧的火焰\n是它生命力的象征。\n没有活力时火焰就会变弱。"
          violet: "只要它精力充沛，\n尾巴尖端的火焰即使被稍微弄湿\n也会猛烈燃烧，而不会熄灭。"
        zh_trad:
          scarlet: "尾巴上燃燒的火焰\n是小火龍生命力的象徵。\n在牠沒有活力時，火勢會變弱。"
          violet: "如果小火龍的活力十足，\n那麼尾巴前端的火焰即使稍微\n淋濕也會熊熊燃燒，不會熄滅。"
