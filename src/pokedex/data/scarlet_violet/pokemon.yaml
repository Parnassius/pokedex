      descriptions:
        jp_kana:
          scarlet: "￹温￺あたた￻かい　￹岩￺いわ￻の￹上￺うえ￻で　￹寝転￺ねころ￻び\n￹四角￺しかく￻い　うろこから　￹取￺と￻り￹込￺こ￻んだ　￹熱￺ねつ￻で\n￹炎￺ほのお￻エネルギーを　￹作￺つく￻る。"
          violet: "￹炎袋￺ほのおぶくろ￻が　￹小￺ちい￻さく　あふれ￹出￺で￻た\nエネルギーが　￹頭￺あたま￻の　くぼみから\n￹放出￺ほうしゅつ￻され　ゆらゆら　￹揺￺ゆ￻れる。"
        jp_kanji:
          scarlet: "￹温￺あたた￻かい　￹岩￺いわ￻の￹上￺うえ￻で　￹寝転￺ねころ￻び\n￹四角￺しかく￻い　うろこから　￹取￺と￻り￹込￺こ￻んだ　￹熱￺ねつ￻で\n￹炎￺ほのお￻エネルギーを　￹作￺つく￻る。"
          violet: "￹炎袋￺ほのおぶくろ￻が　￹小￺ちい￻さく　あふれ￹出￺で￻た\nエネルギーが　￹頭￺あたま￻の　くぼみから\n￹放出￺ほうしゅつ￻され　ゆらゆら　￹揺￺ゆ￻れる。"
        en:
          scarlet: "It lies on warm rocks and uses the heat absorbed\nby its square-shaped scales to create fire energy."
          violet: "Its flame sac is small, so energy is always leaking\nout. This energy is released from the dent atop\nFuecoco’s head and flickers to and fro."
        fr:
          scarlet: "Il s’allonge sur des pierres chaudes et produit\nde l’énergie de type Feu grâce à la chaleur\nabsorbée par ses écailles rectangulaires."
          violet: "Sa poche à flammes est trop petite pour contenir\ntoute l’énergie qu’il produit. Le surplus s’échappe\nen vacillant par la cavité sur sa tête."
        it:
          scarlet: "Le sue squame rettangolari gli permettono di\nassorbire il calore dalle rocce calde su cui si\nsdraia per trasformarlo in energia Fuoco."
          violet: "La sua sacca ignea è piccola e l’energia trabocca,\nfuoriuscendo sotto forma di fiammelle tremule\nda una fessura sulla testa."
        de:
          scarlet: "Es legt sich auf warme Steine und nimmt so über\nseine rechteckigen Schuppen Hitze auf, mit der\nes Feuer-Energie erzeugt."
          violet: "Sein Flammensack ist noch klein, weshalb\nüberquellende Energie über die Vertiefung an\nseinem Kopf flackernd freigesetzt wird."
        es:
          scarlet: "Yace sobre rocas calientes, cuyo calor transforma\nen energía ígnea tras absorberlo por sus escamas\nrectangulares."
          violet: "Como su saca de fuego es pequeña, la energía\nígnea que rebosa se libera por la muesca de su\ncabeza en forma de una trémula llama."
        ko:
          scarlet: "따뜻한 바위 위에 드러누워서\n네모난 비늘을 통해 흡수한 열로\n불꽃 에너지를 만든다."
          violet: "불꽃 주머니가 작기 때문에\n흘러넘친 에너지가 머리의 움푹한 곳을 통해\n새어 나와 일렁거린다."
        zh_simp:
          scarlet: "会躺在温暖的岩石上，\n利用四边形的鳞片吸收的\n热量来制造火之能量。"
          violet: "火囊很小，因此能量会\n从头部的凹陷处溢出来，\n并摇曳晃动着。"
        zh_trad:
          scarlet: "會躺在溫熱的岩石上，\n用四角形的鱗片所吸收的\n熱能來製造火之能量。"
          violet: "火囊很小，因此能量會\n溢出來，在牠頭上的\n凹槽那裡搖曳晃動。"
