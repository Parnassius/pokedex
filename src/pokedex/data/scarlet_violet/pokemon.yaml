        jp_kanji:
          scarlet: "￹自分￺じぶん￻が　￹目立￺めだ￻たないよう　￹暗闇￺くらやみ￻に\nまぎれて　￹獲物￺えもの￻に　￹襲￺おそ￻いかかる\nとても　ずる￹賢￺がしこ￻い　ポケモン。"
          violet: "ずる￹賢￺がしこ￻く　１￹匹￺ぴき￻が　￹親￺おや￻を　￹誘￺おび￻き￹寄￺よ￻せ\nもう１￹匹￺ぴき￻が　タマゴを　￹取￺と￻るという\nチームプレーも　￹見￺み￻せる。"
        en:
          scarlet: "This cunning Pokémon hides under the cover of\ndarkness, waiting to attack its prey."
          violet: "This is a smart and sneaky Pokémon. A pair may\nwork together to steal eggs by having one lure\nthe parents away."
        fr:
          scarlet: "Ce Pokémon rusé se cache dans l’ombre et\nattend patiemment de fondre sur sa proie."
          violet: "Ces Pokémon rusés agissent parfois à deux\npour voler des Œufs : l’un d’eux fait diversion,\npendant que l’autre commet le méfait."
        it:
          scarlet: "Questo scaltro Pokémon si cela nell’oscurità\nper lanciarsi sulla preda."
          violet: "Sono Pokémon furbi e subdoli. A volte lavorano\nin squadra: mentre uno Sneasel attira i Pokémon\nlontano dal loro nido, l’altro ne ruba le Uova."
        de:
          scarlet: "Dieses hinterlistige Pokémon nutzt den Schutz\nder Dunkelheit, um ahnungsloser Beute\naufzulauern."
          violet: "Diese raffinierten Pokémon arbeiten bisweilen zu\nzweit, um Nester auszurauben. Während eines die\nEltern weglockt, holt sich das andere die Eier."
        es:
          scarlet: "Este Pokémon es muy astuto. Se vale de la\noscuridad de la noche para atacar a su presa."
          violet: "Es muy inteligente. Se empareja para robar\nhuevos: uno distrae a los padres y el otro se\nlos lleva."
        ko:
          scarlet: "눈에 띄지 않도록\n어둠 속에 숨어서 먹이를 습격하는\n매우 교활한 포켓몬이다."
          violet: "약삭빠르게 한 마리가 어미를\n유인하고 다른 한 마리가 알을\n훔치는 팀플레이를 보여 준다."
        zh_simp:
          scarlet: "潜藏在黑暗中让自己不显眼，\n然后对猎物展开袭击，\n是非常狡猾的宝可梦。"
          violet: "会施展团队合作，一只负责\n引开双亲，另一只负责偷走蛋。\n是非常狡猾的宝可梦。"
        zh_trad:
          scarlet: "會潛藏在黑暗中使自己變得\n不起眼，然後伺機襲擊獵物，\n是非常狡詐的寶可夢。"
          violet: "會透過團隊合作，一隻負責\n引開雙親的注意，一隻負責\n偷走蛋，非常地狡猾奸詐。"
