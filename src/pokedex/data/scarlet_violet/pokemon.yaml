      descriptions:
        jp_kana:
          scarlet: "￹鳴￺な￻き￹声￺ごえ￻が　￹響￺ひび￻きわたると\nあちこちから　ニョロモや\nニョロゾたちが　￹集￺あつ￻まってくる。"
          violet: "ニョロモや　ニョロゾの　リーダー。\nニョロトノが　￹一喝￺いっかつ￻　すると\n￹皆￺みな￻　￹怯￺おび￻えて　その￹場￺ば￻に　￹伏￺ふ￻せる。"
        jp_kanji:
          scarlet: "￹鳴￺な￻き￹声￺ごえ￻が　￹響￺ひび￻きわたると\nあちこちから　ニョロモや\nニョロゾたちが　￹集￺あつ￻まってくる。"
          violet: "ニョロモや　ニョロゾの　リーダー。\nニョロトノが　￹一喝￺いっかつ￻　すると\n￹皆￺みな￻　￹怯￺おび￻えて　その￹場￺ば￻に　￹伏￺ふ￻せる。"
        en:
          scarlet: "If Poliwag and Poliwhirl hear its echoing cry, they\nrespond by gathering from far and wide."
          violet: "It’s the leader of Poliwag and Poliwhirl.\nWhen Politoed roars, they all cower in fear."
        fr:
          scarlet: "Quand les cris de ce Pokémon retentissent,\ndes Ptitard et des Têtarte arrivent de toutes\nles directions pour se rassembler autour de lui."
          violet: "Tarpaud commande les Ptitard et les Têtarte.\nQuand il hurle, ces derniers prennent peur\net se cachent."
        it:
          scarlet: "Se i Poliwag o i Poliwhirl odono riecheggiare\nil suo verso si radunano anche da enormi\ndistanze."
          violet: "È il capo dei Poliwag e dei Poliwhirl.\nIl suo verso tonante incute in loro un timore\ntale da indurli a prostrarsi immediatamente."
        de:
          scarlet: "Hören Quapsel und Quaputzi seinen Ruf,\nversammeln sie sich von nah und fern."
          violet: "Es ist der Anführer von Quapsel und Quaputzi.\nFängt Quaxo an, laut seinen Unmut zu äußern,\nwerfen sich alle vor lauter Angst direkt zu Boden."
        es:
          scarlet: "Cuando su grito resuena, acuden a su llamada\nPoliwag y Poliwhirl de todos los rincones."
          violet: "Lidera a los Poliwag y a los Poliwhirl. Cuando un\nPolitoed emite un bramido, todos se esconden\nen el acto asustados."
        ko:
          scarlet: "울음소리가 울려 퍼지면\n여기저기에서 발챙이와\n슈륙챙이들이 모인다."
          violet: "발챙이와 슈륙챙이의 리더.\n왕구리가 크게 꾸짖으면\n모두 겁을 먹고 그 자리에 엎드린다."
        zh_simp:
          scarlet: "叫声响彻四周后，\n蚊香蝌蚪和蚊香君们\n就会从各地聚集过来。"
          violet: "蚊香蝌蚪和蚊香君的头领。\n蚊香蛙皇一声吼，\n大家都吓得伏在地上一动不动。"
        zh_trad:
          scarlet: "發出響徹四周的叫聲時，\n蚊香蝌蚪和蚊香君們\n就會從各處聚集過來。"
          violet: "蚊香蝌蚪和蚊香君的領袖。\n蚊香蛙皇一聲吼，\n大家都嚇得伏在地上一動不動。"
