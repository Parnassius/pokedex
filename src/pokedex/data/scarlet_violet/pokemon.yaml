          violet: "￹温￺あたた￻かい　６￹本￺ぽん￻の　￹尻尾￺しっぽ￻は\n￹体￺からだ￻が　￹育￺そだ￻つごとに　￹毛並￺けな￻みが\n￹良￺よ￻くなり　￹美￺うつく￻しく　なっていく。"
        jp_kanji:
          scarlet: "￹自分￺じぶん￻より　￹強￺つよ￻い　￹相手￺あいて￻に\n￹襲￺おそ￻われると　キズついた　ふりをして\n￹惑￺まど￻わせ　その￹隙￺すき￻に　￹逃￺に￻げてしまう。"
          violet: "￹温￺あたた￻かい　６￹本￺ぽん￻の　￹尻尾￺しっぽ￻は\n￹体￺からだ￻が　￹育￺そだ￻つごとに　￹毛並￺けな￻みが\n￹良￺よ￻くなり　￹美￺うつく￻しく　なっていく。"
        en:
          scarlet: "If it is attacked by an enemy that is stronger\nthan itself, it feigns injury to fool the enemy\nand escapes."
          violet: "As its body grows larger, its six warm tails\nbecome more beautiful, with a more luxurious\ncoat of fur."
        fr:
          scarlet: "S’il est attaqué par plus redoutable que lui,\nil feint la blessure et s’échappe à la première\noccasion."
          violet: "Ses six queues dégagent de la chaleur.\nQuand Goupix grandit, elles embellissent\net leur fourrure devient plus épaisse."
        it:
          scarlet: "Se è attaccato da un nemico più forte, si finge\nferito per ingannarlo e fuggire."
          violet: "Man mano che cresce, le sue sei calde code\nsviluppano una pelliccia sempre più bella."
        de:
          scarlet: "Wird es von einem stärkeren Gegner angegriffen,\ntäuscht es eine Verletzung vor, um im richtigen\nMoment vor ihm zu flüchten."
          violet: "Während es wächst, wird das Fell seiner sechs\nwarmen Schweife noch schöner und weicher."
        es:
          scarlet: "Si lo ataca un enemigo más fuerte que él, finge\nestar herido para confundirlo y huir en cuanto\nbaja la guardia."
          violet: "A medida que crece, el pelo de sus seis cálidas\ncolas se va volviendo más suave, lustroso y bello."
        ko:
          scarlet: "자신보다 강한 상대에게\n공격을 받으면 다친 척을 해서\n속이고 그 틈을 타서 도망친다."
          violet: "따뜻한 6개의 꼬리는\n몸이 자랄수록 털에 윤기가 나고\n점점 더 아름다워진다."
        zh_simp:
          scarlet: "遭到比自己强大的对手\n袭击时，会假装受伤来\n迷惑对手，再趁机逃走。"
          violet: "随着身体的成长，\n６根温暖的尾巴的\n毛发也会变得更漂亮。"
        zh_trad:
          scarlet: "遭到比自己強大的對手襲擊時，\n會假裝受傷來迷惑對手，\n然後趁機逃走。"
          violet: "隨著身體的成長，\n溫暖的６根尾巴的\n毛髮也會變得更漂亮。"
    vulpix_alolan_form:
