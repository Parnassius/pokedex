          scarlet: "￹様々￺さまざま￻な　￹相手￺あいて￻と　￹戦￺たたか￻うなかで\n￹自分￺じぶん￻に　￹合￺あ￻った　￹格闘￺かくとう￻スタイルを\n￹模索￺もさく￻する　ひたむきな　ポケモン。"
          violet: "もっともっと　￹強￺つよ￻く　なりたくて\nがむしゃらに　￹体￺からだ￻を　￹鍛￺きた￻えては\n￹手当￺てあ￻たり￹次第￺しだい￻　￹戦￺たたか￻いを　￹挑￺いど￻む。"
        jp_kanji:
          scarlet: "￹様々￺さまざま￻な　￹相手￺あいて￻と　￹戦￺たたか￻うなかで\n￹自分￺じぶん￻に　￹合￺あ￻った　￹格闘￺かくとう￻スタイルを\n￹模索￺もさく￻する　ひたむきな　ポケモン。"
          violet: "もっともっと　￹強￺つよ￻く　なりたくて\nがむしゃらに　￹体￺からだ￻を　￹鍛￺きた￻えては\n￹手当￺てあ￻たり￹次第￺しだい￻　￹戦￺たたか￻いを　￹挑￺いど￻む。"
        en:
          scarlet: "This earnest Pokémon battles all sorts of\nopponents, searching for the fighting style\nthat suits it best."
          violet: "Its intense desire to become stronger and\nstronger drives it to recklessly train its body and\nchallenge any opponent it can find to battle."
        fr:
          scarlet: "Ce Pokémon déterminé affronte toutes sortes\nd’adversaires à la recherche du style de combat\nqui lui convient le mieux."
          violet: "Son désir de devenir toujours plus fort\nle pousse à entraîner son corps sans relâche\net à défier tout ce qui bouge."
        it:
          scarlet: "Questo Pokémon determinato ricerca lo stile\ndi lotta più adatto a sé affrontando avversari\ndi ogni tipo."
          violet: "Punta a diventare sempre più forte, perciò\nsi allena ossessivamente sfidando chiunque\nsi ritrovi di fronte."
        de:
          scarlet: "Dieses zielstrebige Pokémon kämpft mit vielen\nverschiedenen Gegnern, um den Kampfstil zu\nfinden, der am besten zu ihm passt."
          violet: "Um immer stärker zu werden, stählt es seinen\nKörper wie besessen und fordert absolut jeden\nzum Kampf heraus, der ihm über den Weg läuft."
        es:
          scarlet: "Este Pokémon tan decidido combate contra todo\ntipo de rivales en su búsqueda de un estilo de\nlucha propio."
          violet: "Con el fin de volverse cada vez más fuerte,\ncombate contra todo el que se le ponga por\ndelante para entrenar su cuerpo sin mesura."
        ko:
          scarlet: "다양한 상대와 싸우면서\n자신에게 맞는 격투 스타일을\n모색하는 진지한 포켓몬이다."
          violet: "훨씬 더 강해지고자\n악착같이 몸을 단련하고\n닥치는 대로 싸움을 걸어온다."
        zh_simp:
          scarlet: "做事一心一意的宝可梦。\n会在与各种对手战斗的过程中\n摸索出适合自己的格斗风格。"
          violet: "因为想要变得更强，\n所以会疯狂锻炼身体，\n遇到谁都会上前挑战。"
        zh_trad:
          scarlet: "會透過與各式各樣的對手戰鬥，\n來摸索出適合自己的格鬥風格。\n是總是全力以赴的寶可夢。"
          violet: "想讓自己變得更強更壯，\n因此一昧地猛鍛鍊身體，\n逢見任何對手都會發起對戰。"
