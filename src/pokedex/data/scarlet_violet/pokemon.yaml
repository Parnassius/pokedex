        jp_kana:
          scarlet: "￹眠￺ねむ￻っているとき￹以外￺いがい￻は　つねに\nエサを　￹食￺た￻べている　￹大食￺おおぐ￻らい。\n１￹日￺にち￻に　４００キロも　たいらげる。"
          violet: "￹胃袋￺いぶくろ￻の　￹消化液￺しょうかえき￻は　どんな\n￹毒￺どく￻も　￹消化￺しょうか￻できる。\n￹落￺お￻ちているものを　￹食￺た￻べても　￹平気￺へいき￻。"
        jp_kanji:
          scarlet: "￹眠￺ねむ￻っているとき￹以外￺いがい￻は　つねに\nエサを　￹食￺た￻べている　￹大食￺おおぐ￻らい。\n１￹日￺にち￻に　４００キロも　たいらげる。"
          violet: "￹胃袋￺いぶくろ￻の　￹消化液￺しょうかえき￻は　どんな\n￹毒￺どく￻も　￹消化￺しょうか￻できる。\n￹落￺お￻ちているものを　￹食￺た￻べても　￹平気￺へいき￻。"
        en:
          scarlet: "This gluttonous Pokémon eats constantly,\napart from when it’s asleep. It devours\nnearly 900 pounds of food per day."
          violet: "Its stomach’s digestive juices can dissolve any\nkind of poison. Eating things off the ground\ndoesn’t bother it at all."
        fr:
          scarlet: "Quand il ne dort pas, ce glouton passe\nson temps à manger. Il peut ingurgiter jusqu’à\n400 kg de nourriture en une seule journée."
          violet: "Ses sucs digestifs peuvent dissoudre\nn’importe quel poison. Il n’a donc pas peur\nde manger des aliments trouvés par terre."
        it:
          scarlet: "È un ghiottone che smette di mangiare solo\nper dormire. Divora ben 400 kg di cibo\nal giorno."
          violet: "I suoi succhi gastrici possono neutralizzare\nqualsiasi veleno. Non si fa problemi a mangiare\nnemmeno del cibo che è caduto a terra."
        de:
          scarlet: "Dieser Nimmersatt isst unentwegt, wenn er\nnicht gerade schläft. Relaxo verschlingt mehr\nals 400 kg Nahrung am Tag."
          violet: "Seine Magensäfte können jedes Gift\nzersetzen. Es macht ihm nichts aus,\nDinge vom Boden zu fressen."
        es:
          scarlet: "Este Pokémon es un glotón que lo único que\nhace aparte de comer es dormir. Puede ingerir\nhasta 400 kg de comida en un solo día."
          violet: "Sus jugos gástricos pueden digerir cualquier\ntoxina, lo que le permite comer sin problema\ntodo lo que encuentra por el suelo."
        ko:
          scarlet: "자고 있을 때를 제외하고는\n항상 먹이를 먹고 있는 대식가.\n하루에 400kg은 먹어 치운다."
          violet: "위 안의 소화액은\n어떠한 독도 소화할 수 있다.\n땅에 떨어진 것을 먹어도 괜찮다."
        zh_simp:
          scarlet: "是个睡觉之外的时间\n都在吃个不停的大胃王。\n１天能吃光４００公斤的食物。"
          violet: "胃里的消化液能消化掉\n任何毒。即使吃了掉在\n地上的东西也没有问题。"
        zh_trad:
          scarlet: "除了睡著時之外，總是不斷\n在進食。是個一天能吃光\n４００公斤食物的大胃王。"
          violet: "胃裡的消化液能夠消化掉\n所有的毒。就算吃下掉在\n地上的東西也沒問題。"
