      descriptions:
        jp_kana:
          scarlet: "￹硬￺かた￻い　￹岩￺いわ￻で　￹刀￺かたな￻の　￹尻尾￺しっぽ￻を　￹研￺と￻ぐ。\nしげみに　￹隠￺かく￻れて　￹獲物￺えもの￻に　￹近寄￺ちかよ￻り\n￹毒￺どく￻の　キバで　￹襲￺おそ￻う。"
          violet: "￹尻尾￺しっぽ￻の　￹刀￺かたな￻は　いつも　￹岩￺いわ￻で\n￹研￺と￻いでいるので　￹切￺き￻れ￹味￺あじ￻　ばつぐん。\nザングースとは　￹因縁￺いんねん￻の　あいだ。"
        jp_kanji:
          scarlet: "￹硬￺かた￻い　￹岩￺いわ￻で　￹刀￺かたな￻の　￹尻尾￺しっぽ￻を　￹研￺と￻ぐ。\nしげみに　￹隠￺かく￻れて　￹獲物￺えもの￻に　￹近寄￺ちかよ￻り\n￹毒￺どく￻の　キバで　￹襲￺おそ￻う。"
          violet: "￹尻尾￺しっぽ￻の　￹刀￺かたな￻は　いつも　￹岩￺いわ￻で\n￹研￺と￻いでいるので　￹切￺き￻れ￹味￺あじ￻　ばつぐん。\nザングースとは　￹因縁￺いんねん￻の　あいだ。"
        en:
          scarlet: "It sharpens its swordlike tail on hard rocks.\nIt hides in tall grass and strikes unwary prey\nwith venomous fangs."
          violet: "Constant polishing makes the edge of\nthe blade on its tail extremely sharp.\nIt’s Zangoose’s archrival."
        fr:
          scarlet: "Il affûte sa queue tranchante comme une épée\nsur les rochers et se cache dans les hautes herbes\npour attaquer sa proie avec ses crocs venimeux."
          violet: "C’est l’ennemi naturel de Mangriff. Sa queue\nen forme de lame est bien tranchante, car\nil passe son temps à l’affûter sur des rochers."
        it:
          scarlet: "Affila la coda simile a una lama utilizzando\nle rocce più dure. Striscia nascosto nell’erba alta,\nattaccando le prede con le sue zanne velenose."
          violet: "Affila di continuo sulle rocce la sua coda\na forma di lama, rendendola sempre più\ntagliente. È l’acerrimo nemico di Zangoose."
        de:
          scarlet: "Es schärft den klingenartigen Schwanz an Steinen.\nIm Dickicht versteckt nähert es sich ahnungsloser\nBeute und greift diese mit seinen Giftzähnen an."
          violet: "Es hält die Klinge an seinem Schwanz extrem\nscharf, indem es sie ständig an Steinen wetzt.\nVipitis ist der Erzfeind von Sengo."
        es:
          scarlet: "Usa rocas para afilarse la cola en forma de\nespada. Sale de la hierba de repente y ataca\ncon sus colmillos tóxicos."
          violet: "Le une una relación de enemistad con\nZangoose. Se lima con las rocas su cola\nen forma de espada para tenerla afilada."
        ko:
          scarlet: "단단한 바위로 칼날 같은 꼬리를 간다.\n수풀에 숨어서 먹이에 접근한 다음\n독 이빨로 공격한다."
          violet: "꼬리의 칼은 항상 바위로 갈고 있어\n날카로움이 뛰어나다.\n쟝고와는 사연이 깊은 사이다."
        zh_simp:
          scarlet: "会用坚硬的岩石来打磨\n刀刃般的尾巴。会躲在草丛里，\n趁猎物靠近时用毒牙袭击。"
          violet: "因为一直在用岩石打磨\n尾巴上的刀刃，所以异常锋利。\n和猫鼬斩是死对头。"
        zh_trad:
          scarlet: "平時都用堅硬的岩石來打磨\n刀刃般的尾巴。會躲在樹叢裡，\n然後趁獵物靠近時用毒牙襲擊。"
          violet: "總是用岩石打磨尾巴上的刀刃，\n所以刀刃非常鋒利。\n和貓鼬斬是死對頭。"
