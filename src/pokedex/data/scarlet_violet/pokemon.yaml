      descriptions:
        jp_kana:
          scarlet: "￹尻尾￺しっぽ￻を　￹振￺ふ￻って　￹発電￺はつでん￻する。\n￹危険￺きけん￻を　￹感￺かん￻じると　￹頭￺あたま￻を　￹点滅￺てんめつ￻させて\n￹仲間￺なかま￻に　￹伝￺つた￻える。"
          violet: "￹体￺からだ￻に　￹蓄￺たくわ￻えた　￹電力￺でんりょく￻で　￹浮遊￺ふゆう￻する。\n￹雷雲￺らいうん￻のときは　いつもより\n￹高￺たか￻く　￹浮￺う￻き￹上￺あ￻がるのだ。"
        jp_kanji:
          scarlet: "￹尻尾￺しっぽ￻を　￹振￺ふ￻って　￹発電￺はつでん￻する。\n￹危険￺きけん￻を　￹感￺かん￻じると　￹頭￺あたま￻を　￹点滅￺てんめつ￻させて\n￹仲間￺なかま￻に　￹伝￺つた￻える。"
          violet: "￹体￺からだ￻に　￹蓄￺たくわ￻えた　￹電力￺でんりょく￻で　￹浮遊￺ふゆう￻する。\n￹雷雲￺らいうん￻のときは　いつもより\n￹高￺たか￻く　￹浮￺う￻き￹上￺あ￻がるのだ。"
        en:
          scarlet: "Tadbulb shakes its tail to generate electricity.\nIf it senses danger, it will make its head blink on\nand off to alert its allies."
          violet: "It floats using the electricity stored in its body.\nWhen thunderclouds are around, Tadbulb will\nfloat higher off the ground."
        fr:
          scarlet: "Ce Pokémon produit de l’électricité en agitant\nsa queue. Lorsqu’il perçoit un danger, sa tête\nclignote pour avertir ses congénères."
          violet: "Il flotte dans les airs grâce à l’électricité\nemmagasinée dans son corps. Les jours d’orage,\nil lévite un peu plus haut qu’à l’accoutumée."
        it:
          scarlet: "Genera energia elettrica muovendo la coda.\nSe percepisce un pericolo fa lampeggiare la\ntesta per avvisare i suoi simili."
          violet: "Fluttua grazie all’elettricità immagazzinata nel\nsuo corpo. Quando in cielo compaiono nubi\ntemporalesche fluttua più in alto del solito."
        de:
          scarlet: "Es erzeugt Strom, indem es mit seinem Schwanz\nwedelt. Bei Gefahr warnt es seine Artgenossen,\nindem es seinen Kopf aufblinken lässt."
          violet: "Durch den in seinem Körper gespeicherten Strom\nkann es schweben. Bei Gewittern schwebt es\nhöher über dem Boden als gewöhnlich."
        es:
          scarlet: "Produce electricidad agitando la cola. Si siente\npeligro, hace parpadear su cabeza para alertar\na sus compañeros."
          violet: "Flota en el aire gracias a la electricidad\nalmacenada en su cuerpo. Con nubarrones de\ntormenta, lo hace a mayor altura de lo habitual."
        ko:
          scarlet: "꼬리를 흔들어서 전기를 발생시킨다.\n위험을 감지하면 머리를 깜빡여서\n동료에게 알린다."
          violet: "몸에 비축된 전력으로 부유한다.\n뇌운이 있을 때는 평소보다 높게\n떠오른다고 한다."
        zh_simp:
          scarlet: "通过摇晃尾巴来发电。\n若感知到有危险，\n会闪烁头部来通知伙伴。"
          violet: "会靠储存在体内的电力\n来浮在空中。出现雷云时\n能比平时浮得更高。"
        zh_trad:
          scarlet: "會搖尾巴來發電。\n感覺到有危險時，\n會閃爍頭部通知夥伴。"
          violet: "會用蓄積在體內的電力\n浮在空中。出現雷雲時\n則能浮得比平時還要高。"
