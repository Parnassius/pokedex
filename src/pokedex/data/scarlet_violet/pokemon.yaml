      descriptions:
        jp_kana:
          scarlet: "￹気性￺きしょう￻は　￹荒￺あら￻く　￹攻撃的￺こうげきてき￻。\n￹生命力￺せいめいりょく￻も　￹高￺たか￻いので\n￹知￺し￻らないうちに　みるみる　￹増￺ふ￻える。"
          violet: "￹川￺かわ￻のチンピラと　￹呼￺よ￻ばれるほど\n￹獰猛￺どうもう￻だが　ヘイラッシャや\nオトシドリなどに　￹狙￺ねら￻われる。"
        jp_kanji:
          scarlet: "￹気性￺きしょう￻は　￹荒￺あら￻く　￹攻撃的￺こうげきてき￻。\n￹生命力￺せいめいりょく￻も　￹高￺たか￻いので\n￹知￺し￻らないうちに　みるみる　￹増￺ふ￻える。"
          violet: "￹川￺かわ￻のチンピラと　￹呼￺よ￻ばれるほど\n￹獰猛￺どうもう￻だが　ヘイラッシャや\nオトシドリなどに　￹狙￺ねら￻われる。"
        en:
          scarlet: "Its temperament is vicious and aggressive.\nThis Pokémon is also full of vitality and can\nmultiply rapidly before anyone notices."
          violet: "It’s so vicious that it’s called the Thug of the\nRiver. Yet Basculin is still targeted by predators,\nsuch as Dondozo and Bombirdier."
        fr:
          scarlet: "Ce Pokémon possède un tempérament sauvage\net agressif. Il est particulièrement vigoureux et\na tendance à se multiplier en un rien de temps."
          violet: "Il est si agressif qu’on l’appelle « le voyou des\nrivières ». Toutefois, il est notamment la cible\nd’Oyacata ou de Lestombaile."
        it:
          scarlet: "Hanno una natura violenta e impetuosa. Sono\nuna specie molto vitale, capace di moltiplicare\nil proprio numero in men che non si dica."
          violet: "La loro ferocia gli ha dato la nomea di \"canaglie\ndei fiumi\", ma anche loro possono essere preda\ndi Dondozo e Bombirdier."
        de:
          scarlet: "Es hat ein raues und aggressives Temperament.\nZudem ist es sehr widerstandsfähig und vermehrt\nsich deshalb äußerst schnell."
          violet: "Es ist so brutal, dass man es „Rowdy des Flusses“\nnennt. Dennoch wird es bisweilen von Pokémon\nwie Heerashai und Adebom als Beute gejagt."
        es:
          scarlet: "Un Pokémon agresivo y feroz cuya fortaleza y\ncapacidad de adaptación le permiten multiplicar\nsu número rápidamente."
          violet: "Lo llaman el Matón de los Ríos por su ferocidad,\naunque eso no impide que le den caza Pokémon\ncomo Dondozo o Bombirdier."
        ko:
          scarlet: "성질이 사납고 공격적이다.\n생명력도 대단해서\n모르는 사이에 수가 늘어나 있다."
          violet: "호수의 불량배라 불릴 정도로\n난폭하지만, 어써러셔나\n떨구새의 목표가 되곤 한다."
        zh_simp:
          scarlet: "性情狂暴，充满攻击性。\n并且拥有顽强的生命力，\n会在不知不觉间数量增多。"
          violet: "性情凶恶，甚至被称为\n河里的小混混，其实它是\n吃吼霸和下石鸟等的袭击目标。"
        zh_trad:
          scarlet: "性情暴躁，極具攻擊性。\n同時還擁有極高的生命力，\n數量會在不知不覺間增多。"
          violet: "猙獰凶猛，甚至被稱為\n河裡的小混混，然而卻是\n吃吼霸和下石鳥的襲擊對象。"
