          scarlet: "お￹腹￺なか￻の　￹袋￺ふくろ￻に　￹白￺しろ￻くて　￹丸￺まる￻い\n￹石￺いし￻を　￹入￺い￻れている。　￹仲良￺なかよ￻くなると\n￹分￺わ￻けてくれることも　あるよ。"
          violet: "￹白￺しろ￻くて　￹丸￺まる￻い　￹石￺いし￻を　タマゴと\n￹思￺おも￻いこんで　￹大事￺だいじ￻に　￹持￺も￻っている。\n￹巻￺ま￻き￹毛￺げ￻の　￹形￺かたち￻を　￹気￺き￻にしている。"
        jp_kanji:
          scarlet: "お￹腹￺なか￻の　￹袋￺ふくろ￻に　￹白￺しろ￻くて　￹丸￺まる￻い\n￹石￺いし￻を　￹入￺い￻れている。　￹仲良￺なかよ￻くなると\n￹分￺わ￻けてくれることも　あるよ。"
          violet: "￹白￺しろ￻くて　￹丸￺まる￻い　￹石￺いし￻を　タマゴと\n￹思￺おも￻いこんで　￹大事￺だいじ￻に　￹持￺も￻っている。\n￹巻￺ま￻き￹毛￺げ￻の　￹形￺かたち￻を　￹気￺き￻にしている。"
        en:
          scarlet: "It carries a round, white rock in its belly pouch.\nIf it gets along well with someone, it will\nsometimes give that person the rock."
          violet: "It carefully carries a round, white rock that it\nthinks is an egg. It’s bothered by how curly its\nhair looks."
        fr:
          scarlet: "Ce Pokémon transporte un petit caillou rond\net blanc dans sa poche ventrale. Il arrive même\nqu’il le donne aux personnes qu’il aime bien."
          violet: "Il prend soin de ses bouclettes et couve son petit\ncaillou blanc comme si c’était son Œuf."
        it:
          scarlet: "Trasporta nella tasca ventrale una roccia a forma\ndi uovo, che a volte regala ai suoi amici."
          violet: "Trasporta con cura un sasso bianco e tondo\ntrattandolo come un uovo. Adora il ricciolo che\nha in testa."
        de:
          scarlet: "In seinem Beutel trägt es einen runden, weißen\nStein. Freundet man sich mit ihm an, kann es\nvorkommen, dass man ihn geschenkt bekommt."
          violet: "Es hält den runden, weißen Stein für ein Ei und\nkümmert sich um ihn. Es achtet sehr auf seine\nHaarlocke."
        es:
          scarlet: "En la bolsa de su panza transporta una roca\nredonda y blanca. Cuando hace amigos puede\nllegar a regalársela."
          violet: "Cuida de una pequeña roca blanca y redonda\ncreyendo que es un huevo. Le gusta arreglarse\nel tirabuzón."
        ko:
          scarlet: "배의 주머니에 하얗고 동그란\n돌을 넣고 있다. 사이가 좋아지면\n나누어 주는 일도 있다."
          violet: "하얗고 둥근 돌을 알이라고\n생각하고는 소중히 가지고 있다.\n말려 있는 머리 모양을 신경 쓰고 있다."
        zh_simp:
          scarlet: "腹部的袋子里装着白色的\n圆形石头。如果关系变好，\n也可能会分给你哦。"
          violet: "深信白白圆圆的石头是蛋，\n很小心翼翼地拿着。\n很在意自己卷毛的形状。"
        zh_trad:
          scarlet: "腹部的袋子裡裝著白色的\n圓形石頭。如果和牠變得友好，\n也可能會分一點給你哦。"
          violet: "深信白白圓圓的石頭是蛋，\n很小心翼翼地拿著。\n很在意自己捲毛的形狀。"
