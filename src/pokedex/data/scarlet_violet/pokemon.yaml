          scarlet: "￹勇猛果敢￺ゆうもうかかん￻な　￹大空￺おおぞら￻の￹戦士￺せんし￻。\n￹体￺からだ￻の　￹傷￺きず￻が　￹多￺おお￻いほど\n￹仲間￺なかま￻から　￹尊敬￺そんけい￻されるという。"
          violet: "￹仲間￺なかま￻の　ためなら　どれだけ\n￹傷￺きず￻つこうとも　￹戦￺たたか￻いを　やめない\n￹勇敢￺ゆうかん￻な　￹大空￺おおぞら￻の　￹戦士￺せんし￻。"
        jp_kanji:
          scarlet: "￹勇猛果敢￺ゆうもうかかん￻な　￹大空￺おおぞら￻の￹戦士￺せんし￻。\n￹体￺からだ￻の　￹傷￺きず￻が　￹多￺おお￻いほど\n￹仲間￺なかま￻から　￹尊敬￺そんけい￻されるという。"
          violet: "￹仲間￺なかま￻の　ためなら　どれだけ\n￹傷￺きず￻つこうとも　￹戦￺たたか￻いを　やめない\n￹勇敢￺ゆうかん￻な　￹大空￺おおぞら￻の　￹戦士￺せんし￻。"
        en:
          scarlet: "The more scars they have, the more\nrespect these brave soldiers of the\nsky get from their peers."
          violet: "For the sake of its friends, this brave\nwarrior of the sky will not stop battling,\neven if injured."
        fr:
          scarlet: "Un guerrier du ciel brave et intrépide.\nPlus son corps porte de cicatrices,\nplus ses congénères le respectent."
          violet: "Un guerrier du ciel, brave et intrépide.\nPour les siens, il combat au mépris du danger,\nsans jamais fléchir."
        it:
          scarlet: "È l’intrepido guerriero del cielo. Si dice\nche sia tanto più rispettato dai suoi\nsimili quante più sono le sue cicatrici."
          violet: "È l’intrepido guerriero del cielo.\nPer difendere i suoi simili, lotta fino\nall’ultimo senza badare alle ferite."
        de:
          scarlet: "Ein kühner Krieger der Lüfte. Man sagt, je mehr\nNarben es vorweisen kann, desto mehr Respekt\nzollen ihm seine Artgenossen."
          violet: "Ein tapferer Krieger der Lüfte, der für seine\nKameraden ohne Rücksicht auf eigene\nVerletzungen immer weiterkämpft."
        es:
          scarlet: "Guerrero avezado de los cielos. Su número\nde cicatrices es directamente proporcional\nal respeto que recibe de los suyos."
          violet: "Un valiente guerrero del cielo que no duda en\nluchar por sus compañeros por graves que sean\nsus heridas."
        ko:
          scarlet: "용맹 과감한 창공의 전사이다.\n몸의 상처가 많을수록\n동료에게 존경받는다고 한다."
          violet: "동료를 위해서라면 아무리\n상처를 입더라도 싸움을 포기하지 않는\n드넓은 하늘의 용감한 전사."
        zh_simp:
          scarlet: "勇猛果敢的天空战士。\n身上受的伤越多，\n就越会受到伙伴的尊敬。"
          violet: "为了伙伴的话，无论受\n多重的伤都不会放弃战斗，\n是勇敢的天空战士。"
        zh_trad:
          scarlet: "勇猛果敢的天空戰士。\n身上受的傷越多，\n就越會受到夥伴的尊敬。"
          violet: "只要是為了夥伴，\n即使身受重傷也不會停止戰鬥。\n是勇敢的天空戰士。"
