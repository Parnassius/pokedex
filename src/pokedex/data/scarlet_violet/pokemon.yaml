          violet: "ある￹研究者￺けんきゅうしゃ￻の　￹学説￺がくせつ￻では\nモンスターボールの　￹中￺なか￻でも\nオコリザルは　￹怒￺おこ￻っているらしい。"
        jp_kanji:
          scarlet: "だれかの　￹視線￺しせん￻を　￹感￺かん￻じただけで\n￹猛烈￺もうれつ￻に　￹怒￺おこ￻りだす。　そして\n￹目￺め￻が￹合￺あ￻った　ものを　￹追￺お￻いかけるのだ。"
          violet: "ある￹研究者￺けんきゅうしゃ￻の　￹学説￺がくせつ￻では\nモンスターボールの　￹中￺なか￻でも\nオコリザルは　￹怒￺おこ￻っているらしい。"
        en:
          scarlet: "It becomes wildly furious if it even senses\nsomeone looking at it. It chases anyone\nthat meets its glare."
          violet: "Some researchers theorize that Primeape\nremains angry even when inside a Poké Ball."
        fr:
          scarlet: "Il devient fou furieux s’il se sent observé\net pourchasse tout être qui croise son regard."
          violet: "Selon certaines recherches scientifiques,\nles Colossinge continuent de bouillonner de\nfureur même à l’intérieur d’une Poké Ball."
        it:
          scarlet: "Diventa furioso se si sente osservato.\nInsegue chiunque incontri il suo sguardo."
          violet: "Secondo le teorie di certi studiosi,\ni Primeape sono arrabbiati anche\nquando si trovano dentro la Poké Ball."
        de:
          scarlet: "Spürt Rasaff, dass jemand es anblickt, wird es\nrasend vor Wut. Es verfolgt jeden, der es wagt,\nseinen Blick zu erwidern."
          violet: "Der Theorie eines Forschers zufolge schäumt\nRasaff sogar im Inneren von Pokébällen weiter\nvor Wut."
        es:
          scarlet: "Se pone furioso si nota que alguien lo\nestá mirando. Persigue a cualquiera que\nestablezca contacto visual con él."
          violet: "Según muestran los estudios de un\ninvestigador Pokémon, Primeape sigue\nenfadado incluso dentro de la Poké Ball."
        ko:
          scarlet: "누군가의 시선을 느끼기만 해도\n대단히 화를 낸다. 그리고\n눈이 마주친 상대를 쫓아다닌다."
          violet: "어느 연구자의 학설에 의하면\n몬스터볼 안에서도\n성원숭은 화나 있다는 듯하다."
        zh_simp:
          scarlet: "仅是感觉到他方的视线\n都会暴怒起来，然后去追\n与它对上视线的家伙。"
          violet: "根据某位研究者的论文，\n即使在精灵球里，\n火暴猴好像也在发怒。"
        zh_trad:
          scarlet: "光是感覺到他方的視線\n都會暴怒起來，然後去追\n和牠對到眼的傢伙。"
          violet: "某位研究者的學說中提到，\n即使在精靈球裡，\n火爆猴好像也在發怒。"
