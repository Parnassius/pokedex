        hp: 0
        attack: 1
        defense: 0
        special_attack: 1
        special_defense: 0
        speed: 0
      types:
        - rock
        - flying
      egg_groups:
        - mineral
      abilities:
        - shields_down
      descriptions:
        jp_kana:
          scarlet: "￹地上￺ちじょう￻に　￹落￺お￻ちてきた　メテノは\n￹宇宙￺うちゅう￻に　￹戻￺もど￻ろうとしているが\n￹想￺おも￻いは　￹叶￺かな￻わず　￹消￺き￻えていくのみ。"
          violet: "￹大気中￺たいきちゅう￻の　チリが　エサ。\nチリに　￹含￺ふく￻まれる　￹成分￺せいぶん￻によって\nコアの　￹色￺いろ￻が　￹決￺き￻まるという。"
        jp_kanji:
          scarlet: "￹地上￺ちじょう￻に　￹落￺お￻ちてきた　メテノは\n￹宇宙￺うちゅう￻に　￹戻￺もど￻ろうとしているが\n￹想￺おも￻いは　￹叶￺かな￻わず　￹消￺き￻えていくのみ。"
          violet: "￹大気中￺たいきちゅう￻の　チリが　エサ。\nチリに　￹含￺ふく￻まれる　￹成分￺せいぶん￻によって\nコアの　￹色￺いろ￻が　￹決￺き￻まるという。"
        en:
          scarlet: "Minior that fall to the ground try to return to\nspace, but their wish will not come true—all they\ncan do is fade away."
          violet: "It feeds on dust in the atmosphere. The color\nof its core is said to be determined by the\ncomposition of the dust it eats."
        fr:
          scarlet: "Les Météno qui s’écrasent au sol cherchent à\nretourner dans l’espace, mais ils finissent par\ndisparaître sans que leur souhait se réalise."
          violet: "Il se nourrit de particules en suspension dans\nl’atmosphère. La composition de ces dernières\ninfluerait sur la couleur de son noyau."
        it:
          scarlet: "I Minior caduti sul nostro pianeta cercano\ndi tornare nello spazio, ma finiscono per\ndisgregarsi senza realizzare il proprio desiderio."
          violet: "Pare che il colore del suo nucleo sia dovuto\nagli elementi contenuti nel pulviscolo\natmosferico di cui si nutre."
        de:
          scarlet: "Ein aus dem Weltall herabgefallenes Meteno\nversucht stets, dorthin zurückzukehren, doch es\nerlischt, ohne dass dieser Wunsch je wahr wird."
          violet: "Partikel in der Atmosphäre sind seine Nahrung.\nMan sagt, die Farbe seines Kerns hänge von den\nInhaltsstoffen dieser Partikel ab."
        es:
          scarlet: "Los Minior que caen a la superficie tratan de\nregresar al espacio, pero están condenados a\ndesvanecerse sin ver este deseo cumplido."
          violet: "Su alimentación se basa en partículas que flotan\nen la atmósfera. Dicen que el color de su núcleo\ndepende de la composición de estas."
        ko:
          scarlet: "지상에 떨어진 메테노는\n우주로 돌아가려 하지만\n이를 이루지 못한 채 점점 사라질 뿐이다."
          violet: "대기 중의 먼지가 먹이다.\n먼지에 포함된 성분에 따라\n코어의 색이 결정된다고 한다."
        zh_simp:
          scarlet: "掉落到地上的小陨星\n虽然会试图回到宇宙，\n但却无法如愿，只能逐渐消逝。"
          violet: "以大气中的尘埃为食物。\n据说核心的颜色是根据\n尘埃含有的成分而定。"
        zh_trad:
          scarlet: "掉到地上的小隕星雖然會\n試圖回到宇宙，但終將無法\n實現心願，只能逐漸消失。"
          violet: "以大氣中的塵埃為食物。\n據說核心的顏色會根據\n塵埃所含的成分而定。"
