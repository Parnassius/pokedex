        - dragon
      abilities:
        - overgrow
      hidden_ability: unburden
      descriptions:
        jp_kana:
          scarlet: "￹足￺あし￻の　￹裏￺うら￻の　￹小￺ちい￻さな　トゲが\n￹壁￺かべ￻や　￹天井￺てんじょう￻に　￹引￺ひ￻っかかるので\n￹逆￺さか￻さまに　なっても　￹落￺お￻ちないのだ。"
          violet: "￹垂直￺すいちょく￻の　￹壁￺かべ￻も　すいすい　￹登￺のぼ￻る。\n￹尻尾￺しっぽ￻で　￹空気￺くうき￻の　￹湿度￺しつど￻を　￹感￺かん￻じ\n￹明日￺あした￻の　￹天気￺てんき￻を　￹当￺あ￻てる。"
        jp_kanji:
          scarlet: "￹足￺あし￻の　￹裏￺うら￻の　￹小￺ちい￻さな　トゲが\n￹壁￺かべ￻や　￹天井￺てんじょう￻に　￹引￺ひ￻っかかるので\n￹逆￺さか￻さまに　なっても　￹落￺お￻ちないのだ。"
          violet: "￹垂直￺すいちょく￻の　￹壁￺かべ￻も　すいすい　￹登￺のぼ￻る。\n￹尻尾￺しっぽ￻で　￹空気￺くうき￻の　￹湿度￺しつど￻を　￹感￺かん￻じ\n￹明日￺あした￻の　￹天気￺てんき￻を　￹当￺あ￻てる。"
        en:
          scarlet: "The small hooks on the soles of its feet latch\non to walls and ceilings, so it will never fall even\nwhile hanging upside down."
          violet: "Treecko can quickly scale even vertical surfaces.\nIt senses humidity with its tail to predict the next\nday’s weather."
        fr:
          scarlet: "Ses plantes de pieds ont de petites épines qui lui\npermettent de s’accrocher aux murs et au plafond\net d’être suspendu la tête en bas sans tomber."
          violet: "Il grimpe sur les murs avec une grande agilité.\nSa queue lui permet de mesurer l’humidité et\nde prédire ainsi le temps qu’il fera le lendemain."
        it:
          scarlet: "Le piccole setole sulle piante dei piedi si\nancorano a pareti e soffitti, permettendogli\ndi restarvi aggrappato anche a testa in giù."
          violet: "Riesce a scalare rapidamente anche pareti\nverticali. Rileva l’umidità attraverso la coda\nper prevedere il tempo dell’indomani."
        de:
          scarlet: "Dank seiner mit winzigen Stacheln besetzten\nFußsohlen haftet es sogar kopfüber an Wänden\nund Decken, ohne herunterzufallen."
          violet: "Es kann selbst Wände blitzschnell emporklettern.\nMit seinem Schwanz misst es die Luftfeuchtigkeit,\num das Wetter des nächsten Tages vorherzusagen."
        es:
          scarlet: "Tiene pequeñas púas en las plantas de los pies\nque le permiten andar por techos y paredes sin\ncaerse."
          violet: "Escala con rapidez incluso superficies verticales.\nPercibe la humedad ambiental con la cola y así\nprevé el tiempo que hará al día siguiente."
        ko:
          scarlet: "발바닥의 작은 가시가\n벽이나 천장에 걸리므로\n거꾸로 매달려도 떨어지지 않는다."
          violet: "수직으로 된 벽도 쭉쭉 타고 올라간다.\n꼬리로 공기 중의 습도를\n감지해서 내일 날씨를 맞힌다."
        zh_simp:
          scarlet: "脚底的小刺能钩在墙壁或天花板上，\n所以就算倒挂着也不会掉下来。"
          violet: "在垂直的墙壁上也能轻快地攀爬。\n会用尾巴感知空气的湿度，\n以此来判断明天的天气。"
        zh_trad:
          scarlet: "腳底的小刺能鉤在牆壁\n或天花板上，所以就算\n倒掛著也不會掉下來。"
          violet: "在垂直的牆壁上也能輕快地攀爬。\n會用尾巴感知空氣的濕度，\n以此來判斷明天的天氣。"
