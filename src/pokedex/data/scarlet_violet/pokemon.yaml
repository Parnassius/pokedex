      descriptions:
        jp_kana:
          scarlet: "￹体￺からだ￻に　まとった　￹仲間￺なかま￻たちの\n￹魂￺たましい￻が　￹推進力￺すいしんりょく￻となり\n￹激流￺げきりゅう￻を　ものともせず　￹泳￺およ￻ぐ。"
          violet: "￹恐￺おそ￻ろしい　￹幻覚￺げんかく￻を　￹操￺あやつ￻る。\n￹仲間￺なかま￻の　￹魂￺たましい￻の　￹悲￺かな￻しみが\n￹深￺ふか￻いほど　￹体￺からだ￻は　￹白￺しろ￻くなる。"
        jp_kanji:
          scarlet: "￹体￺からだ￻に　まとった　￹仲間￺なかま￻たちの\n￹魂￺たましい￻が　￹推進力￺すいしんりょく￻となり\n￹激流￺げきりゅう￻を　ものともせず　￹泳￺およ￻ぐ。"
          violet: "￹恐￺おそ￻ろしい　￹幻覚￺げんかく￻を　￹操￺あやつ￻る。\n￹仲間￺なかま￻の　￹魂￺たましい￻の　￹悲￺かな￻しみが\n￹深￺ふか￻いほど　￹体￺からだ￻は　￹白￺しろ￻くなる。"
        en:
          scarlet: "The souls of its comrades cloak its body and\npropel it effortlessly through even raging rapids."
          violet: "It can afflict a target with terrifying illusions that\nare under its control. The deeper the sadness in\nits friends’ souls, the paler Basculegion becomes."
        fr:
          scarlet: "Les âmes de ses congénères qui enveloppent\nson corps lui permettent de se propulser et de\nnager sans effort dans les rapides."
          violet: "Ce Pokémon crée des illusions terrifiantes.\nPlus la tristesse des âmes de ses congénères\nest profonde, plus son corps devient blanc."
        it:
          scarlet: "Gli spiriti dei suoi simili che lo avvolgono gli\ndanno la forza propulsiva per nuotare senza\nsforzo anche nelle correnti più impetuose."
          violet: "Può suscitare e controllare visioni terrificanti.\nPiù profonda è la tristezza delle anime dei suoi\nsimili, più il corpo si fa bianco."
        de:
          scarlet: "Die Seelen seiner Artgenossen umhüllen seinen\nKörper und werden zu der Antriebskraft, die es\nselbst durch reißende Ströme schwimmen lässt."
          violet: "Es erzeugt grauenvolle Halluzinationen. Je mehr\ndie Seelen seiner Artgenossen in tiefer Traurigkeit\nversinken, desto weißer wird sein Körper."
        es:
          scarlet: "Las almas de los compañeros que envuelven\nsu cuerpo lo impulsan y le permiten remontar\nhasta los rápidos más impetuosos."
          violet: "Puede causar alucinaciones horripilantes.\nCuanto mayor es la pena de las almas de sus\ncamaradas, más blanco se le vuelve el cuerpo."
        ko:
          scarlet: "몸에 두른 동료들의 영혼을 추진력 삼아\n거센 물살에서도 거침없이 헤엄친다."
          violet: "무서운 환각을 조종한다.\n동료들의 영혼에 맺힌 슬픔이\n깊을수록 몸이 하얘진다."
        zh_simp:
          scarlet: "缠绕在身上的伙伴们的\n灵魂化为了推进力，\n能若无其事地在激流中游泳。"
          violet: "能操控恐怖的幻觉。\n伙伴的灵魂的悲痛越深，\n它的身体就会变得越白。"
        zh_trad:
          scarlet: "纏繞在身上的夥伴們的靈魂\n成為了推進力，使牠能\n一派輕鬆地在激流中游泳。"
          violet: "會操控令人毛骨聳然的幻覺。\n夥伴的靈魂背負的悲傷越深，\n牠的身體就會越蒼白。"
