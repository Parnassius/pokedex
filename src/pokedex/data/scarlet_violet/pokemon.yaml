        jp_kanji:
          scarlet: "￹夕暮￺ゆうぐ￻れに　￹群￺む￻れで　￹海￺うみ￻の￹上￺うえ￻を\n￹高速￺こうそく￻で　￹回遊￺かいゆう￻し　￹水中￺すいちゅう￻の\nポケモンを　つついて　￹遊￺あそ￻ぶ。"
          violet: "￹食￺た￻べもしないのに　ウデッポウに\n￹食￺く￻らいつくのは　￹生￺い￻きていたころの\n￹行動￺こうどう￻の　￹名残￺なご￻りと　￹言￺い￻われている。"
        en:
          scarlet: "In the evening, groups of Dreepy will fly at high\nspeeds over the ocean and poke at Pokémon in\nthe water for fun."
          violet: "It has a habit of biting at Clauncher even though\nit doesn’t feed on them. This is said to be\nvestigial behavior from when Dreepy was alive."
        fr:
          scarlet: "Au crépuscule, on voit des groupes de Fantyrm\nqui volent à vive allure au-dessus des mers et\ns’amusent à taquiner les Pokémon dans l’eau."
          violet: "Il a tendance à croquer les Flingouste, alors\nqu’il ne s’en nourrit pas. Cette habitude serait un\nvestige de sa vie passée, lorsqu’il était bien vivant."
        it:
          scarlet: "Quando cala la sera, gruppi di Dreepy sorvolano\nad altissima velocità la superficie marina,\ndivertendosi a punzecchiare i Pokémon in acqua."
          violet: "Morde i Clauncher, nonostante non facciano\nparte della sua dieta. Pare che questa abitudine\nsia un retaggio di quando era in vita."
        de:
          scarlet: "Gruppen von ihnen fliegen abends in hohem\nTempo übers Meer und machen sich einen Spaß\ndaraus, nach Pokémon im Wasser zu schnappen."
          violet: "Es beißt sich oft an Scampisto fest, ohne dieses\nzu fressen. Das hält man für eine Angewohnheit\naus einer Zeit, als Grolldra noch am Leben war."
        es:
          scarlet: "Al atardecer, recorren en manada la superficie\nmarina a toda velocidad y juegan a darles\ngolpecitos a los Pokémon que hay en el agua."
          violet: "Se lanza a morder a los Clauncher a pesar de no\nalimentarse de ellos. Se dice que este hábito es\nun vestigio de cuando estaba vivo."
        ko:
          scarlet: "해 질 녘에 무리 지어\n바다 위를 고속으로 돌아다니며\n물속의 포켓몬을 쪼면서 논다."
          violet: "먹지도 않으면서 완철포를\n물려고 하는 것은 살아 있었을 당시의\n습관이 남아 있기 때문이라고 한다."
        zh_simp:
          scarlet: "傍晚时会成群结队地\n快速环游在海上，\n戳水里的宝可梦玩。"
          violet: "明明不吃却又会咬住\n铁臂枪虾不放。听说这是它\n生前遗留下来的活动习性。"
        zh_trad:
          scarlet: "傍晚時會成群結隊\n飛快地環繞在海上，\n戳著水裡的寶可夢玩。"
          violet: "明明不吃卻又愛死咬著\n鐵臂槍蝦不放，聽說是牠\n生前殘留下來的活動習性。"
drakloak:
  species_id: 886
  names:
    jp_kana: ドロンチ
    jp_kanji: ドロンチ
    en: Drakloak
    fr: Dispareptil
    it: Drakloak
    de: Phandra
    es: Drakloak
    ko: 드래런치
    zh_simp: 多龙奇
    zh_trad: 多龍奇
  forms:
    drakloak:
      form_id: 0
      base_stats:
        hp: 68
        attack: 80
