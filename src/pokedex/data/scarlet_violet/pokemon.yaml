      descriptions:
        jp_kana:
          scarlet: "￹発光体￺はっこうたい￻を　￹点滅￺てんめつ￻させて\n￹相手￺あいて￻の　やる￹気￺き￻を　なくさせることで\n￹強敵￺きょうてき￻から　￹身￺み￻を　￹守￺まも￻っている。"
          violet: "￹逆立￺さかだ￻ちすると　￹血行￺けっこう￻が　￹良￺よ￻くなり\n￹頭￺あたま￻が　￹冴￺さ￻えるので　エスパー￹技￺わざ￻の\n￹威力￺いりょく￻も　￹上￺あ￻がりまくるのだ。"
        jp_kanji:
          scarlet: "￹発光体￺はっこうたい￻を　￹点滅￺てんめつ￻させて\n￹相手￺あいて￻の　やる￹気￺き￻を　なくさせることで\n￹強敵￺きょうてき￻から　￹身￺み￻を　￹守￺まも￻っている。"
          violet: "￹逆立￺さかだ￻ちすると　￹血行￺けっこう￻が　￹良￺よ￻くなり\n￹頭￺あたま￻が　￹冴￺さ￻えるので　エスパー￹技￺わざ￻の\n￹威力￺いりょく￻も　￹上￺あ￻がりまくるのだ。"
        en:
          scarlet: "It protects itself from tough foes by flashing its\nluminescent spots to discourage them."
          violet: "Being upside-down improves its blood flow and\nclears its mind, causing the power of its psychic\nmoves to increase dramatically."
        fr:
          scarlet: "Il se protège des ennemis puissants en faisant\nclignoter les points lumineux sur son corps,\nce qui sape leur volonté de l’attaquer."
          violet: "Avoir la tête en bas améliore sa circulation\nsanguine et aiguise son esprit, ce qui décuple\nla puissance de ses capacités Psy."
        it:
          scarlet: "Fa perdere la motivazione agli avversari facendo\nlampeggiare i motivi che ha sul corpo. In questo\nmodo riesce a difendersi dai nemici più forti."
          violet: "Stare capovolto migliora la sua circolazione\nsanguigna. Ciò incrementa le sue facoltà mentali,\npotenziando grandemente le mosse di tipo Psico."
        de:
          scarlet: "Es schützt sich vor starken Feinden, indem es\ndie Punkte auf seinem Körper blinken lässt\nund Gegnern so den Kampfeswillen raubt."
          violet: "Steht es kopf, wird seine Blutzirkulation angeregt\nund sein Verstand geschärft, was die Stärke seiner\nPsycho-Attacken deutlich ansteigen lässt."
        es:
          scarlet: "Los destellos de luz intermitente que emiten sus\nórganos luminosos aplacan el ánimo del rival, lo\nque le permite protegerse de enemigos fuertes."
          violet: "Colocarse boca abajo mejora su circulación\nsanguínea, lo que agudiza su mente y potencia\nsus poderes psíquicos."
        ko:
          scarlet: "발광체를 깜빡여서\n상대의 의욕을 상실시키는 방식으로\n강적으로부터 몸을 지킨다."
          violet: "거꾸로 서면 피의 흐름이 좋아지면서\n머리가 맑아지기 때문에\n에스퍼 기술의 위력도 크게 상승한다."
        zh_simp:
          scarlet: "会闪烁发光体来让对手\n丧失斗志，从而保护自己\n不受强敌袭击。"
          violet: "倒立会让它血流通畅，头脑清晰，\n因此超能力招式的威力也会大大提高。"
        zh_trad:
          scarlet: "會閃爍發光體讓對手\n提不起勁，從而保護\n自己免受強敵襲擊。"
          violet: "倒立能使牠血流暢通、頭腦清晰，\n因此超能力屬性的招式威力\n也會變得強上加強。"
