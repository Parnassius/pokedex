        jp_kana:
          scarlet: "￹闘争心￺とうそうしん￻に　￹火￺ひ￻が　つくと\n￹腰￺こし￻の　まわりに　ある　￹炎￺ほのお￻も\nひと￹際￺きわ￻　￹激￺はげ￻しく　￹燃￺も￻え￹上￺あ￻がる。"
          violet: "￹強烈￺きょうれつ￻な　パンチや　キックを\nお￹見舞￺みま￻いしたあと　へその　あたりから\n￹炎￺ほのお￻を　￹吹￺ふ￻き￹出￺だ￻し　とどめを　￹刺￺さ￻す。"
        jp_kanji:
          scarlet: "￹闘争心￺とうそうしん￻に　￹火￺ひ￻が　つくと\n￹腰￺こし￻の　まわりに　ある　￹炎￺ほのお￻も\nひと￹際￺きわ￻　￹激￺はげ￻しく　￹燃￺も￻え￹上￺あ￻がる。"
          violet: "￹強烈￺きょうれつ￻な　パンチや　キックを\nお￹見舞￺みま￻いしたあと　へその　あたりから\n￹炎￺ほのお￻を　￹吹￺ふ￻き￹出￺だ￻し　とどめを　￹刺￺さ￻す。"
        en:
          scarlet: "When its fighting spirit is set alight, the flames\naround its waist become especially intense."
          violet: "After hurling ferocious punches and flinging\nfurious kicks, it finishes opponents off by spewing\nfire from around its navel."
        fr:
          scarlet: "Lorsque son esprit combatif s’embrase, les\nflammes autour de ses hanches redoublent\nd’ardeur."
          violet: "Après avoir asséné une pluie de coups de pied\net de coups de poing à son adversaire, il tire\ndes flammes par son nombril pour l’achever."
        it:
          scarlet: "Quando arde dalla voglia di lottare, anche\nle fiamme intorno alla vita bruciano\npiù intensamente."
          violet: "Stordisce il nemico con pugni e calci di grande\npotenza per poi metterlo KO con le fiammate\nche emette dall’ombelico."
        de:
          scarlet: "Entbrennt sein Kampfeswille, lodern die\nFlammen um seine Hüfte noch heftiger auf."
          violet: "Nach einer Reihe heftiger Schläge und Tritte\nschießt es Feuer aus seinem Bauchnabel,\num dem Gegner den Garaus zu machen."
        es:
          scarlet: "Cuando se aviva su espíritu combativo, las llamas\nque le rodean la cintura también arden de forma\nespecialmente intensa."
          violet: "Descarga ráfagas de demoledores puñetazos y\npatadas sobre sus rivales, a los que luego remata\ncon las llamas que manan de su vientre."
        ko:
          scarlet: "투쟁심에 불이 붙으면\n허리 주변에 있는 불꽃도\n한층 격렬하게 타오른다."
          violet: "강렬한 펀치와 킥을\n가한 후 배꼽 부근에서\n불꽃을 뿜어내 마무리한다."
        zh_simp:
          scarlet: "如果燃起了斗志，腰周围的火焰\n也会燃烧得格外猛烈。"
          violet: "在使出猛烈的拳击或脚踢后，\n会从肚脐周围喷出火焰，\n将敌人一击毙命。"
        zh_trad:
          scarlet: "當牠燃起鬥志的時候，\n腰部周圍的火焰也會\n燃燒得特別猛烈。"
          violet: "在使出猛烈的拳擊或腳踢後，\n會從肚臍周圍噴出火焰，\n將敵人一擊斃命。"
