      abilities:
        - flame_body
      hidden_ability: gale_wings
      descriptions:
        jp_kana:
          scarlet: "￹虫￺むし￻ポケモンが　￹潜￺ひそ￻んでいそうな\n￹草￺くさ￻むらに　￹火￺ひ￻の￹粉￺こ￻を　まき￹散￺ち￻らして\n￹飛￺と￻び￹出￺だ￻してきたところを　￹捕￺つか￻まえる。"
          violet: "￹半径￺はんけい￻　２～３キロの　￹縄張￺なわば￻りを　￹持￺も￻つ。\n￹縄張￺なわば￻りに　￹入￺はい￻ってきた\n￹鳥￺とり￻ポケモンは　￹容赦￺ようしゃ￻しない。"
        jp_kanji:
          scarlet: "￹虫￺むし￻ポケモンが　￹潜￺ひそ￻んでいそうな\n￹草￺くさ￻むらに　￹火￺ひ￻の￹粉￺こ￻を　まき￹散￺ち￻らして\n￹飛￺と￻び￹出￺だ￻してきたところを　￹捕￺つか￻まえる。"
          violet: "￹半径￺はんけい￻　２～３キロの　￹縄張￺なわば￻りを　￹持￺も￻つ。\n￹縄張￺なわば￻りに　￹入￺はい￻ってきた\n￹鳥￺とり￻ポケモンは　￹容赦￺ようしゃ￻しない。"
        en:
          scarlet: "Fletchinder scatters embers in tall grass\nwhere bug Pokémon might be hiding and\nthen catches them as they come leaping out."
          violet: "Its territory has a radius of just over a mile.\nIf any bird Pokémon should enter, it will show\nthem no mercy."
        fr:
          scarlet: "Il disperse des étincelles dans les hautes herbes\nqui pourraient abriter des Pokémon Insecte\net attrape ceux qui en sortent pour s’enfuir."
          violet: "Son territoire s’étend sur un rayon de deux\nou trois kilomètres. Il se montrerait impitoyable\nsi un Pokémon oiseau osait s’y aventurer."
        it:
          scarlet: "Sparge scintille nell’erba alta tra cui pensa\nsiano nascosti dei Pokémon Coleottero e,\nnon appena saltano fuori, li acchiappa."
          violet: "Il suo territorio ha un raggio di 2-3 km.\nNon mostra alcuna pietà per i Pokémon\nalati che ne varcano i confini."
        de:
          scarlet: "Es versprüht Funken in hohem Gras, in dem es\nKäfer-Pokémon vermutet, und schnappt sich\ndiese, sobald sie daraus hervorhuschen."
          violet: "Sein Revier hat einen Radius von 2 bis 3 km.\nDringen Vogel-Pokémon darin ein, zeigt es keine\nGnade."
        es:
          scarlet: "Lanza chispas en zonas de hierba alta donde\npodrían habitar Pokémon de tipo Bicho y, en\ncuanto intentan escapar, los atrapa."
          violet: "No muestra piedad con los Pokémon pájaro que\nosen invadir su territorio, que abarca un radio de\n2 a 3 km."
        ko:
          scarlet: "벌레포켓몬이 숨어 있을 것 같은\n풀숲에 불똥을 흩뿌려서\n튀어나오는 순간 잡아챈다."
          violet: "반경 2~3km의 영역을 가지고 있다.\n자신의 영역에 들어온\n새포켓몬에게는 자비가 없다."
        zh_simp:
          scarlet: "往可能潜伏着虫宝可梦的\n草丛洒出火花，接着趁\n它们跳出来时捕猎。"
          violet: "拥有半径２～３公里的地盘。\n对于任何进到地盘里的\n鸟宝可梦，它绝不轻饶。"
        zh_trad:
          scarlet: "會朝著似乎潛伏著\n蟲寶可夢的草叢灑出火花，\n然後趁牠們跳出來時獵捕。"
          violet: "擁有半徑２～３公里的地盤。\n絕不會輕饒任何進到\n地盤裡的鳥寶可夢。"
talonflame:
