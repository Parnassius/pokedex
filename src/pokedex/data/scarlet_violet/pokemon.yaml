          violet: "￹生￺う￻まれたときから　３￹匹￺びき￻　￹一緒￺いっしょ￻。\nビークインに　￹喜￺よろこ￻んでもらうため\nいつも　￹花￺はな￻の￹蜜￺みつ￻を　￹集￺あつ￻めている。"
        jp_kanji:
          scarlet: "￹夜￺よる￻に　なると　１００￹匹￺ぴき￻　ほどの\nミツハニーが　￹寄￺よ￻り￹添￺そ￻い￹合￺あ￻って\n￹大￺おお￻きな　かたまりで　￹眠￺ねむ￻る。"
          violet: "￹生￺う￻まれたときから　３￹匹￺びき￻　￹一緒￺いっしょ￻。\nビークインに　￹喜￺よろこ￻んでもらうため\nいつも　￹花￺はな￻の￹蜜￺みつ￻を　￹集￺あつ￻めている。"
        en:
          scarlet: "At night, Combee sleep in a group of about a\nhundred, packed closely together in a lump."
          violet: "The trio is together from birth. It constantly\ngathers nectar from flowers to please Vespiquen."
        fr:
          scarlet: "À la nuit tombée, les Apitrini s’agglutinent\npar grappes de cent pour dormir."
          violet: "Ce trio inséparable depuis la naissance passe\nson temps à récolter le nectar des fleurs pour\nsatisfaire Apireine."
        it:
          scarlet: "Scesa la notte, formano dei grandi alveari\ndi circa 100 esemplari e dormono\nraggruppati."
          violet: "Il trio è insieme dalla nascita. Passa il tempo\na raccogliere il nettare dei fiori per far felice\nVespiquen."
        de:
          scarlet: "Des Nachts schmiegen sich bis zu 100 Wadribie\naneinander und formieren sich so zum Schlafen\nzu einem großen Gebilde."
          violet: "Dieses Trio ist von Geburt an zusammen.\nEs sammelt fleißig Blütennektar, um Honweisel\neine Freude zu bereiten."
        es:
          scarlet: "Cuando llega la noche, se juntan unos cien\nCombee y duermen formando una gran colmena."
          violet: "El trío se forma al nacer y se pasa la vida\nrecogiendo néctar de las flores para satisfacer\na Vespiquen."
        ko:
          scarlet: "밤이 되면 100마리 정도의\n세꿀버리가 모여\n커다란 덩어리가 되어 잠잔다."
          violet: "태어났을 때부터 3마리가 함께한다.\n비퀸을 기쁘게 하기 위해\n항상 꽃의 꿀을 모으고 있다."
        zh_simp:
          scarlet: "到了夜晚就会有大约\n１００只的三蜜蜂聚成一团，\n互相依偎着入睡。"
          violet: "从出生时起就是３只一起。\n为了取悦蜂女王，\n一直都在采集着花蜜。"
        zh_trad:
          scarlet: "到了晚上就會有１００隻\n左右的三蜜蜂集聚成堆，\n依偎著彼此睡覺。"
          violet: "從出生那時起就是３隻一起。\n為了取悅蜂女王，\n一直都在採集著花蜜。"
