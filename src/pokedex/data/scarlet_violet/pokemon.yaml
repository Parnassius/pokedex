          violet: "￹高温￺こうおん￻の　￹鼻息￺はないき￻を　￹吹￺ふ￻きだすので\nブレイズ￹種￺しゅ￻と　￹名￺な￻づけられた。\n３￹本￺ぼん￻の　￹尻尾￺しっぽ￻を　￹束￺たば￻ねている。"
        jp_kanji:
          scarlet: "￹炎￺ほのお￻のエネルギーで　￹熱￺ねっ￻した　ツノは\n￹摂氏￺せっし￻１０００￹度￺ど￻になり　￹突￺つ￻き￹刺￺さ￻された\n￹敵￺てき￻は　￹傷￺きず￻と　￹火傷￺やけど￻に　￹苦￺くる￻しむ。"
          violet: "￹高温￺こうおん￻の　￹鼻息￺はないき￻を　￹吹￺ふ￻きだすので\nブレイズ￹種￺しゅ￻と　￹名￺な￻づけられた。\n３￹本￺ぼん￻の　￹尻尾￺しっぽ￻を　￹束￺たば￻ねている。"
        en:
          scarlet: "When heated by fire energy, its horns can get\nhotter than 1,800 degrees Fahrenheit. Those\ngored by them will suffer both wounds and burns."
          violet: "People call this kind of Tauros the Blaze Breed\ndue to the hot air it snorts from its nostrils.\nIts three tails are intertwined."
        fr:
          scarlet: "Ses cornes atteignent les 1 000 °C lorsqu’elles\nsont chauffées par énergie incandescente. Elles\ninfligent blessures et brûlures à ses adversaires."
          violet: "Le Tauros de la Race Flamboyante doit son\nnom au fait qu’il expire de l’air brûlant par\nles naseaux. Il possède trois queues tressées."
        it:
          scarlet: "Le corna arroventate dalla sua energia Fuoco\nraggiungono i 1.000 ºC e causano al nemico\ntrafitto sia ferite che ustioni."
          violet: "Emette sbuffi di fiato caldissimo, da cui deriva\nil nome Varietà Infuocata. Le tre code sono\nintrecciate insieme."
        de:
          scarlet: "Seine Hörner erreichen mithilfe von Feuer-Energie\n1000 ℃. Spießt es damit Gegner auf, so erleiden\ndiese Verletzungen und Verbrennungen."
          violet: "Diese Form heißt „Flammenvariante“, da sie beim\nSchnauben heiße Luft aus der Nase ausstößt.\nDie drei Schweife sind miteinander verflochten."
        es:
          scarlet: "Sus cuernos alcanzan los 1000 ºC cuando los\ncalienta con energía ígnea. Quienes reciben una\nde sus cornadas sufren heridas y quemaduras."
          violet: "La Variedad Ardiente debe su nombre a la\ncapacidad de exhalar aire a altas temperaturas\npor el hocico. Lleva las tres colas trenzadas."
        ko:
          scarlet: "불꽃 에너지로 가열된 뿔은\n섭씨 1000도에 달하며, 뿔에 찔린 상대는\n상처와 화상에 고통받게 된다."
          violet: "고온의 콧김을 불어 대는 까닭에\n블레이즈종이라는 이름이 붙었다.\n세 개의 꼬리를 한데 묶고 있다."
        zh_simp:
          scarlet: "用火之能量加热过的角高达\n摄氏１０００度，被它刺中的\n敌人会遭受创伤和灼伤之苦。"
          violet: "会喷出高温的鼻息，\n因此被命名为火炽种。\n３根尾巴总是拧在一起。"
        zh_trad:
          scarlet: "會用火焰能量將角加熱到\n攝氏１０００度，被刺中的\n敵人會受創傷和灼傷所苦。"
          violet: "噴出的鼻息溫度很高，\n因此被命名為火熾種。\n３根尾巴總是束在一起。"
    tauros_paldean_form_aqua_breed:
      form_id: 3
      names:
        jp_kana: パルデアのすがた
        jp_kanji: パルデアのすがた
        en: Paldean Form
        fr: Forme de Paldea
        it: Forma di Paldea
        de: Paldea-Form
        es: Forma de Paldea
        ko: 팔데아의 모습
        zh_simp: 帕底亚的样子
        zh_trad: 帕底亞的樣子
      base_stats:
        hp: 75
        attack: 110
        defense: 105
        special_attack: 30
        special_defense: 70
        speed: 100
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fighting
        - water
      egg_groups:
        - field
      abilities:
        - intimidate
        - anger_point
      hidden_ability: cud_chew
      descriptions:
        jp_kana:
          scarlet: "ツノの　￹先端￺せんたん￻の　￹穴￺あな￻から　￹水￺みず￻を\n￹勢￺いきお￻いよく　￹吹￺ふ￻きだし　￹高圧￺こうあつ￻の　￹水流￺すいりゅう￻で\n￹敵￺てき￻を　￹貫￺つらぬ￻く。"
          violet: "ツノから　￹水￺みず￻を　￹吹￺ふ￻きだし　￹泳￺およ￻ぐ。\n￹脂肪分￺しぼうぶん￻が　￹多￺おお￻く　￹浮￺う￻きやすいのが\nウォーター￹種￺しゅ￻の　￹特徴￺とくちょう￻。"
        jp_kanji:
          scarlet: "ツノの　￹先端￺せんたん￻の　￹穴￺あな￻から　￹水￺みず￻を\n￹勢￺いきお￻いよく　￹吹￺ふ￻きだし　￹高圧￺こうあつ￻の　￹水流￺すいりゅう￻で\n￹敵￺てき￻を　￹貫￺つらぬ￻く。"
          violet: "ツノから　￹水￺みず￻を　￹吹￺ふ￻きだし　￹泳￺およ￻ぐ。\n￹脂肪分￺しぼうぶん￻が　￹多￺おお￻く　￹浮￺う￻きやすいのが\nウォーター￹種￺しゅ￻の　￹特徴￺とくちょう￻。"
        en:
          scarlet: "This Pokémon blasts water from holes on the\ntips of its horns—the high-pressure jets pierce\nright through Tauros’s enemies."
          violet: "It swims by jetting water from its horns. The\nmost notable characteristic of the Aqua Breed\nis its high body fat, which allows it to float easily."
        fr:
          scarlet: "Il expulse de l’eau à haute pression par le trou\nsitué à l’extrémité de ses cornes. Ces jets d’eau\ntranspercent ses adversaires."
          violet: "Le Tauros de la Race Aquatique expulse de l’eau\npar les cornes pour nager. Il se caractérise par\nsa graisse abondante, qui lui permet de flotter."
        it:
          scarlet: "Spara acqua dai fori sulla punta delle corna e\ntrapassa i nemici con getti ad alta pressione."
          violet: "L’abbondante grasso corporeo che caratterizza\nla Varietà Acquatica gli permette di galleggiare\ncon facilità. Nuota spruzzando acqua dalle corna."
        de:
          scarlet: "Es spritzt Wasser aus den Öffnungen an seinen\nHornenden. Die mit Hochdruck abgefeuerten\nWasserstrahlen durchbohren seine Gegner."
          violet: "Es schwimmt durch den Ausstoß von Wasser aus\nseinen Hörnern. Der hohe Körperfettanteil lässt\ndiese „Flutenvariante“ auf dem Wasser treiben."
        es:
          scarlet: "Perfora a sus rivales lanzando chorros de agua\na alta presión por la cavidad que tiene en la\npunta de los cuernos."
          violet: "Su elevado nivel de grasa corporal permite\na la Variedad Acuática flotar en el agua.\nSe propulsa expulsando agua por los cuernos."
        ko:
          scarlet: "뿔 끝에 난 구멍을 통해\n물을 강하게 분출하여\n고압의 물줄기로 상대를 관통한다."
          violet: "뿔에서 물을 분출해서 헤엄친다.\n지방이 많아서 물에 뜨기 쉬운 점이\n워터종의 특징이다."
        zh_simp:
          scarlet: "从角尖端的洞猛烈地\n喷射出水，以形成\n高压的水流将敌人贯穿。"
          violet: "会从角喷出水来游泳。\n因脂肪含量高而容易浮在水面上，\n这是水澜种的特征。"
        zh_trad:
          scarlet: "會從角尖端的洞噴射出\n力道強勁的水流，以其\n高壓來貫穿敵人的身體。"
          violet: "會從角噴出水來游泳。\n脂肪含量高而容易浮在水上\n是水瀾種的特徵。"
magikarp:
