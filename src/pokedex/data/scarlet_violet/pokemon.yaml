          violet: "￹背中￺せなか￻から　￹吹￺ふ￻き￹出￺だ￻す　￹炎￺ほのお￻は\n￹怒￺おこ￻ったときが　いちばん　￹強￺つよ￻く\n￹燃￺も￻え￹上￺あ￻がり　￹敵￺てき￻を　￹驚￺おどろ￻かせる。"
        jp_kanji:
          scarlet: "いつもは　￹背中￺せなか￻を　まるめている。\n￹怒￺おこ￻ったとき　￹驚￺おどろ￻いたとき\n￹背中￺せなか￻から　￹炎￺ほのお￻が　￹吹￺ふ￻き￹出￺だ￻す。"
          violet: "￹背中￺せなか￻から　￹吹￺ふ￻き￹出￺だ￻す　￹炎￺ほのお￻は\n￹怒￺おこ￻ったときが　いちばん　￹強￺つよ￻く\n￹燃￺も￻え￹上￺あ￻がり　￹敵￺てき￻を　￹驚￺おどろ￻かせる。"
        en:
          scarlet: "It usually stays hunched over. If it is angry or\nsurprised, it shoots flames out of its back."
          violet: "The fire that spouts from its back burns hottest\nwhen it is angry. The flaring flames intimidate\nfoes."
        fr:
          scarlet: "Il se tient toujours courbé. Des flammes jaillissent\nde son dos quand il est surpris ou en colère."
          violet: "Les flammes qui émanent de son dos atteignent\nleur pic d’intensité lorsqu’il est en colère. Elles\nlui permettent ainsi d’intimider ses adversaires."
        it:
          scarlet: "Di solito tiene la schiena arcuata. Se ha paura\no è sorpreso, lancia fiamme dal dorso."
          violet: "Quando è adirato, le fiamme sul dorso\nraggiungono la massima intensità\ne intimoriscono i nemici."
        de:
          scarlet: "Man sieht es stets in einer gekrümmten Haltung.\nIst es zornig oder überrascht, schießen Flammen\naus seinem Rücken."
          violet: "Die Flammen auf seinem Rücken lodern am\nstärksten, wenn es zornig ist. Dadurch schüchtert\nes seine Feinde ein."
        es:
          scarlet: "Suele estar encorvado. Si se enfada o se asusta,\nlanzará llamas por el lomo."
          violet: "Cuando se enfada, las llamas que emite por\nel lomo arden con más vigor que nunca, lo cual\nintimida a sus rivales."
        ko:
          scarlet: "평소에는 몸을 웅크리고 있다.\n화가 났을 때와 놀랐을 때\n등에서 불꽃을 뿜어낸다."
          violet: "등에서 내뿜는 불꽃은\n화났을 때 가장 강하게 타오르며\n적을 놀라게 한다."
        zh_simp:
          scarlet: "平时会将背部蜷起。\n但当它发怒或受惊时，\n会从背部喷出火焰。"
          violet: "背上喷出的火焰在它\n生气时燃烧得最为强烈，\n能够用来吓唬敌人。"
        zh_trad:
          scarlet: "總是蜷起背把身體縮成一團。\n生氣或受到驚嚇的時候，\n背上就會噴出火焰。"
          violet: "從背上噴出的火焰會在\n生氣時燃燒得最強烈，\n令敵手大嚇一跳。"
