          violet: "Ce Pokémon est très prudent. Quand il ne peut\npas échapper au combat, il se camoufle avant\nd’attaquer."
        it:
          scarlet: "Spara proiettili d’acqua dalla bocca per far\ncadere dagli alberi le bacche di cui si nutre.\nLa sua mira è infallibile."
          violet: "È molto cauto. Quando è costretto a lottare,\nsferra i suoi attacchi solo dopo essersi\nmimetizzato."
        de:
          scarlet: "Es feuert Wassergeschosse aus seinem Mund,\num Beeren herabzuschießen und dann zu fressen.\nJeder Schuss ist ein Treffer."
          violet: "Es ist extrem vorsichtig. Wenn sich ein Kampf\nnicht vermeiden lässt, greift es erst an, nachdem\nes sich getarnt hat."
        es:
          scarlet: "Dispara proyectiles de agua por la boca para\nhacer caer bayas de los árboles y comérselas.\nSu puntería es infalible."
          violet: "Es tan precavido que, cuando no le queda más\nremedio que combatir, siempre se camufla antes\nde atacar."
        ko:
          scarlet: "입에서 뿜어내는 물의 탄환으로\n나무열매를 떨어뜨려서 먹는다.\n조준은 백발백중이다."
          violet: "경계심이 강하다.\n반드시 싸워야만 할 때는\n모습을 감춘 다음 공격한다."
        zh_simp:
          scarlet: "利用从口中喷出的\n水弹击落树果来吃。\n能够做到百发百中。"
          violet: "警戒心十分强，\n当实在不得不战斗时，\n会先隐藏身影再进行攻击。"
        zh_trad:
          scarlet: "會利用口中噴出的\n水彈擊落樹果來吃。\n彈無虛發，百發百中。"
          violet: "警戒心十分強，\n遇到無論如何都得戰鬥時，\n會先讓身影消失再發動攻擊。"
