      descriptions:
        jp_kana:
          scarlet: "￹見￺み￻かけによらず　￹身軽￺みがる￻な　￹動￺うご￻きで\n￹敵￺てき￻を　￹翻弄￺ほんろう￻。　￹左右￺さゆう￻の　￹鼻￺はな￻の\n￹穴￺あな￻から　￹火￺ひ￻の￹玉￺たま￻を　￹連射￺れんしゃ￻する。"
          violet: "￹食￺く￻いしん￹坊￺ぼう￻の　￹大食漢￺たいしょくかん￻。\nよく￹利￺き￻く　￹鼻￺はな￻で　エサを　￹見￺み￻つけだし\nこんがり　￹焼￺や￻きあげてから　いただく。"
        jp_kanji:
          scarlet: "￹見￺み￻かけによらず　￹身軽￺みがる￻な　￹動￺うご￻きで\n￹敵￺てき￻を　￹翻弄￺ほんろう￻。　￹左右￺さゆう￻の　￹鼻￺はな￻の\n￹穴￺あな￻から　￹火￺ひ￻の￹玉￺たま￻を　￹連射￺れんしゃ￻する。"
          violet: "￹食￺く￻いしん￹坊￺ぼう￻の　￹大食漢￺たいしょくかん￻。\nよく￹利￺き￻く　￹鼻￺はな￻で　エサを　￹見￺み￻つけだし\nこんがり　￹焼￺や￻きあげてから　いただく。"
        en:
          scarlet: "It’s more nimble than it looks, and it uses its\nspeed to confound its enemies. It rapidly\nlaunches fireballs from both nostrils."
          violet: "This Pokémon is a ravenous glutton. It uses its\nexcellent sense of smell to find food, then cooks\nit to a crisp before eating."
        fr:
          scarlet: "Contrairement à ce que suggère son apparence,\nil se joue de ses adversaires grâce à son agilité.\nIl tire des boules de feu par les narines."
          violet: "Ce Pokémon glouton possède un appétit vorace.\nIl trouve sa nourriture grâce à son odorat fin\net la grille avant de la déguster."
        it:
          scarlet: "Si beffa dei nemici muovendosi con un’agilità\nsorprendente per il suo aspetto. Spara palle\ndi fuoco a raffica dalle narici."
          violet: "È un insaziabile ghiottone. Usa il suo\nsensibilissimo naso per scovare il cibo, che\nmangia dopo averlo abbrustolito a puntino."
        de:
          scarlet: "Mit unerwartet schnellen Bewegungen hält\nes Feinde zum Narren. Aus seinen beiden\nNasenlöchern schießt es Feuerbälle ab."
          violet: "Dieser gierige Nimmersatt spürt Nahrung mit\nseinem ausgezeichneten Geruchssinn auf und\nröstet diese, bevor er sie verspeist."
        es:
          scarlet: "Maneja a su rival moviéndose con una agilidad\nsorprendente para su apariencia. Lanza ráfagas\nde bolas de fuego por ambas fosas nasales."
          violet: "Es un glotón insaciable. Encuentra alimento con\nsu agudo sentido del olfato, para luego tostarlo\nbien antes de ingerirlo."
        ko:
          scarlet: "겉보기와 다르게 가벼운 몸놀림으로\n상대를 농락한다. 좌우의 콧구멍에서\n불덩이를 연사한다."
          violet: "먹을 것을 좋아하는 대식가다.\n뛰어난 후각으로 먹이를 찾아낸 다음\n바싹 익혀서 먹는다."
        zh_simp:
          scarlet: "能以有别外表的轻巧动作\n玩弄敌人。可从左右两个\n鼻孔连续发射出火球。"
          violet: "爱吃的大胃王。会把\n用灵敏的鼻子找出的\n食物烤到刚刚好再享用。"
        zh_trad:
          scarlet: "會用有別外表的輕盈動作\n戲弄敵人。可從左右兩邊\n的鼻孔連續發射火球。"
          violet: "貪吃無比的大胃王。\n會用靈敏的鼻子找出食物，\n將其烤到恰到好處再享用。"
