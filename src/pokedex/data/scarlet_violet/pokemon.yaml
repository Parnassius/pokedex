          scarlet: "バルチャイの　ために　いつも　エサを\n￹探￺さが￻している。　￹弱￺よわ￻った　ポケモンを\n￹見￺み￻つけ￹次第￺しだい￻　￹巣￺す￻まで　￹連￺つ￻れ￹去￺さ￻るぞ。"
          violet: "￹空￺そら￻から　￹地上￺ちじょう￻を　￹観察￺かんさつ￻して\n￹弱￺よわ￻った　￹獲物￺えもの￻に　￹襲￺おそ￻いかかる。\n￹骨￺ほね￻で　￹着飾￺きかざ￻る　￹習性￺しゅうせい￻。"
        jp_kanji:
          scarlet: "バルチャイの　ために　いつも　エサを\n￹探￺さが￻している。　￹弱￺よわ￻った　ポケモンを\n￹見￺み￻つけ￹次第￺しだい￻　￹巣￺す￻まで　￹連￺つ￻れ￹去￺さ￻るぞ。"
          violet: "￹空￺そら￻から　￹地上￺ちじょう￻を　￹観察￺かんさつ￻して\n￹弱￺よわ￻った　￹獲物￺えもの￻に　￹襲￺おそ￻いかかる。\n￹骨￺ほね￻で　￹着飾￺きかざ￻る　￹習性￺しゅうせい￻。"
        en:
          scarlet: "It’s always searching for food for Vullaby. When\nit finds a weak Pokémon, Mandibuzz swoops it\nright off to its nest."
          violet: "Watching from the sky, they attack weakened\nprey on the ground. They have a habit of\ndecorating themselves with bones."
        fr:
          scarlet: "Il est toujours à la recherche de nourriture pour\nVostourno. Quand il trouve un Pokémon affaibli,\nil fond sur lui et l’emmène dans son nid."
          violet: "Ce Pokémon guette le sol depuis les airs\net fond sur les proies affaiblies.\nIl aime se parer d’ossements."
        it:
          scarlet: "È sempre in cerca di cibo per Vullaby. Appena\ntrova un Pokémon indebolito, lo trasporta\nsubito al suo nido."
          violet: "Osserva la terra dal cielo e si lancia\nsulle prede in difficoltà. Ha l’abitudine\ndi farsi delle decorazioni con le ossa."
        de:
          scarlet: "Für Skallyk geht es pausenlos auf Futtersuche.\nFindet es ein geschwächtes Pokémon, schnappt\nes sich dieses und verschleppt es in sein Nest."
          violet: "Aus der Luft überblickt Grypheldis das Areal und\nstürzt sich auf geschwächte Beute. Es hat die\nAngewohnheit, sich mit Knochen zu schmücken."
        es:
          scarlet: "Busca sin cesar comida para alimentar a Vullaby.\nAtrapa al instante a cualquier Pokémon cansado\nque aviste y se lo lleva al nido."
          violet: "Otea la superficie desde el cielo en busca\nde presas cansadas a las que atacar. Tiene\npor costumbre engalanarse con huesos."
        ko:
          scarlet: "벌차이를 위해 언제나 먹이를\n찾고 있다. 약해진 포켓몬을\n발견하는 대로 둥지로 데려간다."
          violet: "하늘에서 지상을 관찰하다\n쇠약해진 먹이를 덮친다.\n뼈로 몸치장하는 습성이 있다."
        zh_simp:
          scarlet: "为了秃鹰丫头而一直寻找着食物。\n一旦找到体弱的宝可梦\n就会掳去自己的巢穴。"
          violet: "从空中观察地面情况，\n袭击衰弱的猎物。\n有用骨头做装饰的习性。"
        zh_trad:
          scarlet: "為了禿鷹丫頭不斷尋找食物。\n只要發現衰弱的寶可夢，\n就會捉起來帶回巢穴去。"
          violet: "從空中觀察地面，\n襲擊衰弱的獵物。\n有用骨頭裝扮的習性。"
