      descriptions:
        jp_kana:
          scarlet: "￹弾力￺だんりょく￻のある　￹体￺からだ￻の￹中￺なか￻に\n￹行￺い￻き￹場￺ば￻のない　￹魂￺たましい￻を　￹取￺と￻りこんで\nあの￹世￺よ￻に　￹連￺つ￻れていくと　￹言￺い￻われる。"
          violet: "この￹世￺よ￻と　あの￹世￺よ￻を　￹行￺い￻ったり￹来￺き￻たり。\nさまよう　￹魂￺たましい￻を　￹吸￺す￻い￹込￺こ￻んで\n￹運￺はこ￻ぶと　いわれ　￹恐￺おそ￻れられている。"
        jp_kanji:
          scarlet: "￹弾力￺だんりょく￻のある　￹体￺からだ￻の￹中￺なか￻に\n￹行￺い￻き￹場￺ば￻のない　￹魂￺たましい￻を　￹取￺と￻りこんで\nあの￹世￺よ￻に　￹連￺つ￻れていくと　￹言￺い￻われる。"
          violet: "この￹世￺よ￻と　あの￹世￺よ￻を　￹行￺い￻ったり￹来￺き￻たり。\nさまよう　￹魂￺たましい￻を　￹吸￺す￻い￹込￺こ￻んで\n￹運￺はこ￻ぶと　いわれ　￹恐￺おそ￻れられている。"
        en:
          scarlet: "It is said to take lost spirits into its pliant body\nand take them to the afterlife."
          violet: "It comes and goes between this world and the\nafterlife. People fear this Pokémon because it is\nsaid to suck in lost spirits and take them along."
        fr:
          scarlet: "On raconte qu’il emprisonne les esprits\négarés dans son corps élastique pour\nles emmener dans l’au-delà."
          violet: "Ce Pokémon va et vient entre ce monde\net l’au-delà. Il inspire la crainte, car on dit qu’il\nabsorbe les âmes errantes et les emporte avec lui."
        it:
          scarlet: "Si dice che inglobi le anime smarrite nel suo\ncorpo flessibile per condurle all’altro mondo."
          violet: "Fa la spola tra questo mondo e l’altro. È temuto\nperché assorbe gli spiriti vaganti e li porta via."
        de:
          scarlet: "Man sagt, dass es verlorene Seelen in seinen\nbiegsamen Körper aufnimmt und ins Jenseits\ngeleitet."
          violet: "Es reist zwischen dem Dies- und dem Jenseits.\nDie Menschen fürchten es, da es umherirrende\nSeelen aufsaugen und davontragen soll."
        es:
          scarlet: "Se dice que recoge en su cuerpo flexible a los\nespíritus extraviados y los guía hasta el más allá."
          violet: "Viaja a su antojo entre este mundo y el\nmás allá. Es temido porque se cree que\nabsorbe y acarrea consigo las almas errantes."
        ko:
          scarlet: "탄력 있는 몸 안에\n갈 곳 없는 영혼을 가두어\n저승으로 데려간다고 전해진다."
          violet: "이승과 저승을 오가며\n헤매는 영혼을 흡수해\n옮긴다고 하여 사람들이 두려워한다."
        zh_simp:
          scarlet: "据说，会把无处可去的魂魄\n吸入它那具有弹力的身体中，\n并带往另一个世界。"
          violet: "往来于这个世界与另一个世界。\n因据说会吸收并带走\n徘徊的灵魂而遭人畏惧。"
        zh_trad:
          scarlet: "據說會把無處可去的靈魂\n吸入富有彈性的身體裡，\n並帶往另一個世界。"
          violet: "在這個世界與另一個世界間往返。\n據說會吸入並帶走遊蕩的靈魂，\n因此遭到人們畏懼。"
