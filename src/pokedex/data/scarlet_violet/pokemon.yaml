        it:
          scarlet: "Ricorda per alcuni aspetti un Pokémon citato in\nuna rivista di dubbia attendibilità, descritto come\nun Tyranitar di un miliardo di anni nel futuro."
          violet: "Ha caratteristiche che coincidono con quelle di\nun oggetto chiamato \"Spineferree\" in un certo\ndiario di viaggio."
        de:
          scarlet: "Es hat Ähnlichkeit mit einem Pokémon, das eine\nfragwürdige Zeitschrift als ein Despotar vorstellte,\ndas eine Milliarde Jahre aus der Zukunft stammt."
          violet: "Einige seiner Merkmale decken sich mit einem\nObjekt, das in einem gewissen Expeditionsbericht\nals Eisendorn dokumentiert wurde."
        es:
          scarlet: "Guarda similitudes con el supuesto aspecto que,\nsegún cierta revista de dudosa veracidad,\ntendrá Tyranitar dentro de mil millones de años."
          violet: "Algunos de sus rasgos distintivos coinciden\ncon los de Ferropúas, un objeto que aparece\nmencionado en cierto diario."
        ko:
          scarlet: "10억 년 후의 마기라스라며\n괴상한 잡지에서 다뤘던\n포켓몬과 닮은 점이 있다."
          violet: "어느 탐험기에서\n“무쇠가시”라고 소개했던 물체와\n일치하는 특징이 있다."
        zh_simp:
          scarlet: "它与可疑杂志所报道的\n１０亿年后的班基拉斯\n有部分特征相似。"
