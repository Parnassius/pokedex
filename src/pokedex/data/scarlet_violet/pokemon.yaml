          scarlet: "￹傷￺きず￻ついたり　￹弱￺よわ￻った　ポケモンを\nヒレで　￹優￺やさ￻しく　￹抱￺かか￻えながら\n￹特殊￺とくしゅ￻な　￹粘膜￺ねんまく￻で　￹治￺なお￻すのだ。"
          violet: "￹大海原￺おおうなばら￻を　￹漂￺ただよ￻って　￹暮￺く￻らす。\nママンボウの　まわりには　￹多￺おお￻くの\n￹水￺みず￻ポケモンが　￹集￺あつ￻まってくる。"
        jp_kanji:
          scarlet: "￹傷￺きず￻ついたり　￹弱￺よわ￻った　ポケモンを\nヒレで　￹優￺やさ￻しく　￹抱￺かか￻えながら\n￹特殊￺とくしゅ￻な　￹粘膜￺ねんまく￻で　￹治￺なお￻すのだ。"
          violet: "￹大海原￺おおうなばら￻を　￹漂￺ただよ￻って　￹暮￺く￻らす。\nママンボウの　まわりには　￹多￺おお￻くの\n￹水￺みず￻ポケモンが　￹集￺あつ￻まってくる。"
        en:
          scarlet: "It gently holds injured and weak Pokémon in its\nfins. Its special membrane heals their wounds."
          violet: "They float upon the open sea. Many water\nPokémon gather in the area around Alomomola."
        fr:
          scarlet: "Il berce les Pokémon blessés ou affaiblis dans\nses nageoires et les guérit grâce à la membrane\ndont il est recouvert."
          violet: "Il se laisse dériver au gré des courants\nocéaniques profonds. De nombreux Pokémon\nEau se rassemblent toujours autour de lui."
        it:
          scarlet: "Abbraccia dolcemente con le sue pinne\ni Pokémon deboli o feriti e li guarisce grazie\na una speciale membrana mucosa."
          violet: "Vive in mare aperto, lasciandosi trasportare\ndalle onde. Attorno gli si radunano molti\nPokémon di tipo Acqua."
        de:
          scarlet: "Es umarmt verletzte und geschwächte Pokémon\nliebevoll mit seinen Flossen und heilt sie mithilfe\nseiner speziellen Schleimschicht."
          violet: "Es treibt durch den Ozean. Um Mamolida\nversammeln sich stets viele Wasser-Pokémon."
        es:
          scarlet: "Abraza gentilmente con sus aletas a Pokémon\nque están lastimados y cura sus heridas con su\nmembrana especial."
          violet: "Vive flotando a la deriva en mar abierto.\nMuchos Pokémon acuáticos se arremolinan\na su alrededor."
        ko:
          scarlet: "상처 입거나 약해진 포켓몬을\n지느러미로 부드럽게 안으며\n특수한 점막으로 치료한다."
          violet: "넓은 바다를 떠돌아다니며 산다.\n맘복치 주변에는 많은\n물포켓몬들이 모여든다."
        zh_simp:
          scarlet: "会用鱼鳍温柔地抱住受伤的\n或是虚弱的宝可梦，\n然后用特殊的粘膜治疗。"
          violet: "漂浮在汪洋大海上生活。\n保姆曼波的周围\n会聚集起许多水属性宝可梦。"
        zh_trad:
          scarlet: "會用魚鰭溫柔地抱住\n受傷或是虛弱的寶可夢，\n並用特殊的黏膜加以治療。"
          violet: "漂浮在汪洋大海上生活。\n保母曼波的周圍\n會聚集起許多水屬性寶可夢。"
