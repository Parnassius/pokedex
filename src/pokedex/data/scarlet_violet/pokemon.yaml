        jp_kana:
          scarlet: "￹発揮￺はっき￻した　サイコパワーを　￹使￺つか￻い\n￹特殊￺とくしゅ￻な　￹液体￺えきたい￻で　つくられた\n￹腕￺うで￻を　￹操￺あやつ￻り　￹岩￺いわ￻を　￹砕￺くだ￻く。"
          violet: "ランクルス￹同士￺どうし￻が　￹握手￺あくしゅ￻すると\n￹脳￺のう￻みそが　ネットワークで　つながり\nサイコパワーが　￹増幅￺ぞうふく￻されるのだ。"
        jp_kanji:
          scarlet: "￹発揮￺はっき￻した　サイコパワーを　￹使￺つか￻い\n￹特殊￺とくしゅ￻な　￹液体￺えきたい￻で　つくられた\n￹腕￺うで￻を　￹操￺あやつ￻り　￹岩￺いわ￻を　￹砕￺くだ￻く。"
          violet: "ランクルス￹同士￺どうし￻が　￹握手￺あくしゅ￻すると\n￹脳￺のう￻みそが　ネットワークで　つながり\nサイコパワーが　￹増幅￺ぞうふく￻されるのだ。"
        en:
          scarlet: "Their arms are made of a special liquid. They\nuse psychic power to control these arms and\ncrush boulders."
          violet: "When Reuniclus shake hands, a network\nforms between their brains, increasing their\npsychic power."
        fr:
          scarlet: "Ses bras sont composés d’un liquide\nparticulier et peuvent broyer des rochers.\nIl les contrôle grâce à ses pouvoirs psychiques."
          violet: "Quand ces Pokémon se tiennent par\nla main, leurs cerveaux forment un réseau\nqui démultiplie leurs pouvoirs psychiques."
        it:
          scarlet: "Con i suoi poteri psichici manovra\nle braccia, formate da un liquido speciale,\nper frantumare le rocce."
          violet: "Quando i Reuniclus si tengono per\nmano, i loro cervelli si interconnettono\ne i poteri psichici si amplificano."
        de:
          scarlet: "Mit Psycho-Kräften kontrolliert es seine Arme,\ndie aus einer speziellen Flüssigkeit bestehen,\nund kann so Felsen zerschmettern."
          violet: "Fassen sich Zytomega bei den Händen, verbinden\nsich ihre Denkapparate zu einem Netzwerk und\nihre Psycho-Kräfte werden verstärkt."
        es:
          scarlet: "Hacen gala de su poder psíquico\npara controlar sus brazos compuestos de\nun líquido especial y hacer añicos las rocas."
          violet: "Cuando los Reuniclus se dan la\nmano, sus cerebros se conectan\ny multiplican sus poderes psíquicos."
        ko:
          scarlet: "사이코 파워를 사용해\n특수한 액체로 만들어진 팔을\n조종해서 바위를 부순다."
          violet: "란쿨루스끼리 악수를 하면\n뇌가 네트워크처럼 연결되어\n사이코 파워가 증폭된다."
        zh_simp:
          scarlet: "使用发出的精神力量，\n操纵特殊液体做成的手臂\n将岩石击碎。"
          violet: "如果人造细胞卵互相握住手，\n大脑就像通过网络连接一样，\n精神力量得以增强。"
        zh_trad:
          scarlet: "使用發出的精神力量，\n操縱特殊液體形成的手臂\n破壞岩石。"
          violet: "當人造細胞卵彼此握手時，\n大腦就會如網路般連接，\n精神力量將得到提升。"
