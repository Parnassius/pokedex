          violet: "￹金属質￺きんぞくしつ￻の　ボディらしい。\n￹名前￺なまえ￻は　￹古￺ふる￻い　￹本￺ほん￻に　￹記￺しる￻された\n￹謎￺なぞ￻の　￹物体￺ぶったい￻から　つけられた。"
        jp_kanji:
          scarlet: "￹悪￺あく￻の　￹組織￺そしき￻に　￹改造￺かいぞう￻された\nテラキオン　と　￹怪￺あや￻しい￹雑誌￺ざっし￻が\nとりあげた　ポケモンに　￹似￺に￻ている。"
          violet: "￹金属質￺きんぞくしつ￻の　ボディらしい。\n￹名前￺なまえ￻は　￹古￺ふる￻い　￹本￺ほん￻に　￹記￺しる￻された\n￹謎￺なぞ￻の　￹物体￺ぶったい￻から　つけられた。"
        en:
          scarlet: "It resembles a Pokémon described in a\ndubious magazine as a Terrakion that had\nbeen modified by an evil organization."
          violet: "It was named after a mysterious object\nrecorded in an old book. Its body seems\nto be metallic."
        fr:
          scarlet: "Il ressemble à un Terrakium qui, selon\nune revue douteuse, aurait été modifié\npar une organisation maléfique."
          violet: "Son corps serait composé de métal.\nCe Pokémon doit son nom à une entité\nmystérieuse mentionnée dans un livre ancien."
        it:
          scarlet: "Ricorda un Pokémon descritto in una rivista\ndi dubbia attendibilità come un Terrakion\nmodificato da un’organizzazione malvagia."
          violet: "Sembra che il suo corpo sia composto\ndi metallo. Deve il suo nome a un oggetto\nmisterioso descritto in un vecchio libro."
        de:
          scarlet: "Es ähnelt einem Pokémon, das eine fragwürdige\nZeitschrift als ein Terrakium vorstellte, das von\neiner bösartigen Organisation modifiziert wurde."
          violet: "Es scheint einen Körper aus Metall zu haben.\nSeinen Namen erhielt es in Anlehnung an ein\nrätselhaftes Objekt aus einem alten Buch."
        es:
          scarlet: "Recuerda a un Pokémon descrito en cierta\nrevista de dudosa veracidad como \"un Terrakion\nmodificado por una malvada organización\"."
          violet: "Su cuerpo parece estar compuesto\nenteramente de metal. Debe su nombre\na un objeto descrito en un tomo antiguo."
        ko:
          scarlet: "악의 조직에 개조당한 테라키온이라며\n괴상한 잡지에서 다뤘던 포켓몬을 닮았다."
          violet: "몸은 금속질로 되어 있다고 한다.\n이름은 오래된 책에 기록된\n정체불명의 물체에서 유래됐다."
        zh_simp:
          scarlet: "与可疑杂志中提到的\n由邪恶组织改造代拉基翁\n而成的宝可梦长得很相似。"
          violet: "身体似乎是金属质地。\n名字来自古书中\n所记载的神秘物体。"
        zh_trad:
          scarlet: "與可疑的雜誌當成\n被邪惡組織改造的代拉基翁\n來報導的寶可夢很相似。"
          violet: "身體似乎是由金屬構成。\n牠的名字來自記載於\n古老書籍裡的神秘物體。"
