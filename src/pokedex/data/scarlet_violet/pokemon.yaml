      descriptions:
        jp_kana:
          scarlet: "￹争￺あらそ￻いを　￹嫌￺きら￻い　￹縄張￺なわば￻りで\nケンカが　￹始￺はじ￻まると　サイコパワーで\n￹物￺もの￻を　￹投￺な￻げつけ　￹追￺お￻い￹出￺だ￻そうとする。"
          violet: "￹喜￺よろこ￻びや　￹感謝￺かんしゃ￻など　ハッピーな\n￹気持￺きも￻ちを　￹求￺もと￻め　￹人￺ひと￻や　ポケモンを\nかいがいしく　￹世話￺せわ￻して　まわる。"
        jp_kanji:
          scarlet: "￹争￺あらそ￻いを　￹嫌￺きら￻い　￹縄張￺なわば￻りで\nケンカが　￹始￺はじ￻まると　サイコパワーで\n￹物￺もの￻を　￹投￺な￻げつけ　￹追￺お￻い￹出￺だ￻そうとする。"
          violet: "￹喜￺よろこ￻びや　￹感謝￺かんしゃ￻など　ハッピーな\n￹気持￺きも￻ちを　￹求￺もと￻め　￹人￺ひと￻や　ポケモンを\nかいがいしく　￹世話￺せわ￻して　まわる。"
        en:
          scarlet: "It dislikes conflict. If a fight occurs in its territory,\nit uses psychic power to throw things at the\ncombatants in an effort to drive them away."
          violet: "In search of happy feelings—such as joy and\ngratitude—Indeedee bustles around, taking\ndiligent care of people and other Pokémon."
        fr:
          scarlet: "Il déteste les conflits. Il repousse de son territoire\ntous les êtres qui en déclenchent en leur lançant\ndes objets à l’aide de ses pouvoirs psychiques."
          violet: "En quête de sentiments positifs comme la joie\net la gratitude, il prend grand soin des êtres\nhumains et des Pokémon."
        it:
          scarlet: "Detesta i conflitti e, se inizia una lite nel suo\nterritorio, cerca di cacciare i contendenti\nlanciando oggetti con i suoi poteri psichici."
          violet: "Si prende amorevole cura di persone e Pokémon\nintorno a sé, alla ricerca di sentimenti positivi\ncome la felicità e la gratitudine."
        de:
          scarlet: "Es verabscheut Konflikte. Entflammen Kämpfe\nin seinem Revier, wirft es mit Psycho-Kräften\nObjekte auf die Streitenden, um sie zu vertreiben."
          violet: "Auf der Suche nach positiven Gefühlen wie\nFreude und Dankbarkeit kümmert es sich\nunablässig um Menschen und Pokémon."
        es:
          scarlet: "Detesta los conflictos, por lo que ahuyenta a\nquienes los inicien en su territorio empleando\nsus poderes psíquicos para lanzarles cosas."
          violet: "Su búsqueda de emociones positivas, como la\nfelicidad y la gratitud, lo empuja a desvivirse por\ncuidar de la gente y los Pokémon."
        ko:
          scarlet: "싸움을 싫어하여 영역에서\n싸움이 일어나면 사이코 파워로\n물건을 집어던져 쫓아내려 한다."
          violet: "기쁨이나 감사 등의\n행복한 감정을 얻기 위해\n부지런히 인간이나 포켓몬을 돌보러 다닌다."
        zh_simp:
          scarlet: "厌恶斗争，只要地盘里\n发生争执，就会使用\n精神力量扔出东西来驱逐对方。"
          violet: "为了寻求喜悦和感谢等\n快乐的心情，会勤快地\n到处照顾人和宝可梦。"
        zh_trad:
          scarlet: "厭惡紛爭，只要地盤裡\n一發生爭執，就會使用\n精神力量扔東西來驅逐。"
          violet: "為了尋求喜悅和感謝等\n快樂的心情，會殷勤地\n到處找人和寶可夢來照顧。"
