          scarlet: "￹岩盤￺がんばん￻のような　￹硬￺かた￻い　￹殻￺から￻で\n￹覆￺おお￻われている。　１￹年￺ねん￻に　１￹回￺かい￻\n￹脱皮￺だっぴ￻して　￹大￺おお￻きくなる。"
          violet: "わざと　￹体￺からだ￻を　￹爆発￺ばくはつ￻させ\nその　￹勢￺いきお￻いを　￹利用￺りよう￻して\n￹山￺やま￻から　￹山￺やま￻へと　￹飛￺と￻んでいく。"
        jp_kanji:
          scarlet: "￹岩盤￺がんばん￻のような　￹硬￺かた￻い　￹殻￺から￻で\n￹覆￺おお￻われている。　１￹年￺ねん￻に　１￹回￺かい￻\n￹脱皮￺だっぴ￻して　￹大￺おお￻きくなる。"
          violet: "わざと　￹体￺からだ￻を　￹爆発￺ばくはつ￻させ\nその　￹勢￺いきお￻いを　￹利用￺りよう￻して\n￹山￺やま￻から　￹山￺やま￻へと　￹飛￺と￻んでいく。"
        en:
          scarlet: "It is enclosed in a hard shell that is as\nrugged as slabs of rock. It sheds skin\nonce a year to grow larger."
          violet: "It deliberately blows itself up, then uses\nthis explosive force to jump from mountain\nto mountain."
        fr:
          scarlet: "Il est recouvert d’une carapace aussi dure\net rugueuse que la roche. Il s’en débarrasse une\nfois par an pendant sa mue pour pouvoir grandir."
          violet: "Il est capable de se faire exploser.\nL’impulsion de l’explosion lui permet\nde sauter de montagne en montagne."
        it:
          scarlet: "È avvolto in un guscio duro come\nla roccia, che muta una volta\nall’anno diventando più grosso."
          violet: "Si fa esplodere di proposito, dandosi così\nla spinta per saltare da una montagna all’altra."
        de:
          scarlet: "Es ist von einem harten, felsartigen\nPanzer umgeben und häutet sich jährlich,\num zu wachsen."
          violet: "Es kann sich in die Luft sprengen und\nnutzt die Kraft dieser Explosionen,\num von Berg zu Berg zu springen."
        es:
          scarlet: "Está cubierto por un duro caparazón\nformado por losas de piedra. Lo muda\nuna vez al año para aumentar de tamaño."
          violet: "Es capaz de explotar a voluntad. Utiliza\nel impulso de la explosión para saltar\nde una montaña a otra."
        ko:
          scarlet: "암반처럼 단단한 껍질에 싸여 있다.\n1년에 1번 탈피하여 커진다."
          violet: "고의로 몸을 폭발시켜\n그 기세를 이용하여\n산에서 산으로 날아간다."
        zh_simp:
          scarlet: "被如岩盘般坚硬的壳包裹着。\n１年蜕皮１次来变大。"
          violet: "会故意让自己的身体爆炸，\n再借助爆炸的力量\n来飞跃于山与山之间。"
        zh_trad:
          scarlet: "身上覆蓋著像岩盤般堅硬的殼。\n隨著１年１次的蛻皮，\n身體會變得越來越大。"
          violet: "會故意讓自己的身體爆炸，\n然後利用爆炸的衝力讓自己\n從一座山飛向另一座山。"
