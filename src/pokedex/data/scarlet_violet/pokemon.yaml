      descriptions:
        jp_kana:
          scarlet: "￹全身￺ぜんしん￻の　￹体毛￺たいもう￻は\n￹水￺みず￻を　￹弾￺はじ￻く　￹性質￺せいしつ￻を　￹持￺も￻ち\n￹水浴￺みずあ￻び　しても　￹乾￺かわ￻いている。"
          violet: "￹脂￺あぶら￻が　￹詰￺つ￻まっている　￹尻尾￺しっぽ￻が\n￹浮￺う￻き￹袋￺ぶくろ￻の　￹代￺か￻わりと　なるので\n￹流￺なが￻れの　￹速￺はや￻い　￹川￺かわ￻も　￹平気￺へいき￻。"
        jp_kanji:
          scarlet: "￹全身￺ぜんしん￻の　￹体毛￺たいもう￻は\n￹水￺みず￻を　￹弾￺はじ￻く　￹性質￺せいしつ￻を　￹持￺も￻ち\n￹水浴￺みずあ￻び　しても　￹乾￺かわ￻いている。"
          violet: "￹脂￺あぶら￻が　￹詰￺つ￻まっている　￹尻尾￺しっぽ￻が\n￹浮￺う￻き￹袋￺ぶくろ￻の　￹代￺か￻わりと　なるので\n￹流￺なが￻れの　￹速￺はや￻い　￹川￺かわ￻も　￹平気￺へいき￻。"
        en:
          scarlet: "The fur on its body naturally repels water. It can\nstay dry even when it plays in the water."
          violet: "The oil-filled tail functions as a buoy, so it’s fine\neven in rivers with strong currents."
        fr:
          scarlet: "Sa fourrure est imperméable, si bien qu’il reste\nsec même quand il joue dans l’eau."
          violet: "Sa queue à l’extrémité remplie d’huile fait\noffice de flotteur et lui permet de nager\ndans les rapides sans problème."
        it:
          scarlet: "La pelliccia è idrorepellente. Così, rimane\nasciutto anche giocando nell’acqua."
          violet: "La sua coda contiene grasso e funge da\ngalleggiante, permettendogli di nuotare\nsicuro anche nei fiumi dalla corrente impetuosa."
        de:
          scarlet: "Sein Fell ist von Natur aus wasserabweisend.\nEs bleibt trocken, auch wenn es im Wasser spielt."
          violet: "Sein ölgefüllter Schweif dient ihm als\nRettungsboje, die es vor der Strömung\nreißender Flüsse schützt."
        es:
          scarlet: "Tiene un pelaje que repele el agua, por lo que\nestá seco incluso después de bañarse."
          violet: "Su cola, llena de aceite, hace las veces de boya,\ncon la que se desenvuelve con soltura hasta en\nríos de aguas bravas."
        ko:
          scarlet: "전신의 털은\n물을 튕겨 내는 성질을 지녀\n물을 끼얹어도 말라 있다."
          violet: "기름이 가득 차 있는 꼬리가\n부낭을 대신하기 때문에\n물살이 빠른 강에서도 문제없다."
        zh_simp:
          scarlet: "全身的体毛有着能将水弹开的特性，\n所以就算碰到水也不会弄湿。"
          violet: "存满了油脂的尾巴能用来\n代替浮囊，因此面对\n湍急的河流也不成问题。"
        zh_trad:
          scarlet: "全身的體毛有著\n能將水彈開的特性，\n所以就算碰到水也不會弄濕。"
          violet: "儲滿了油脂的尾巴能用來\n代替浮囊，因此即使河川\n的流速再急也不成問題。"
