          scarlet: "￹抜￺ぬ￻け￹落￺お￻ちても　すぐに　￹生￺は￻えてくる\n￹頭￺あたま￻の　￹葉￺は￻っぱは　とても　￹苦￺にが￻いが\nかじれば　すぐ　￹元気￺げんき￻に　なれる。"
          violet: "たまに　￹葉￺は￻っぱを　トリミングすると\n￹丸々￺まるまる￻とした　￹立派￺りっぱ￻な　￹姿￺すがた￻に\n￹育￺そだ￻っていくのだ。"
        jp_kanji:
          scarlet: "￹抜￺ぬ￻け￹落￺お￻ちても　すぐに　￹生￺は￻えてくる\n￹頭￺あたま￻の　￹葉￺は￻っぱは　とても　￹苦￺にが￻いが\nかじれば　すぐ　￹元気￺げんき￻に　なれる。"
          violet: "たまに　￹葉￺は￻っぱを　トリミングすると\n￹丸々￺まるまる￻とした　￹立派￺りっぱ￻な　￹姿￺すがた￻に\n￹育￺そだ￻っていくのだ。"
        en:
          scarlet: "The leaves on its head grow right back even if\nthey fall out. These bitter leaves refresh those\nwho eat them."
          violet: "If the leaves on its head are pruned with\nregularity, this Pokémon can be grown into\na fine plump shape."
        fr:
          scarlet: "Les feuilles sur sa tête repoussent très vite.\nElles sont fort amères, mais elles revigorent\nles corps les plus éreintés."
          violet: "Si on taille ses feuilles de temps à autre,\ncela lui donne une forme parfaitement\nronde et harmonieuse."
        it:
          scarlet: "Se le foglie sul suo capo cadono, ricrescono\nsubito. Sono molto amare, ma se masticate\nrimettono subito in forze."
          violet: "Le foglie che ha sul capo vanno spuntate\ndi tanto in tanto per permettergli di crescere\nflorido e bello rotondo."
        de:
          scarlet: "Die Blätter auf seinem Kopf schmecken äußerst\nbitter, wirken aber erfrischend. Fallen sie aus,\nwachsen sie sofort nach."
          violet: "Wenn man ab und zu seine Blätter schneidet,\nwächst sein Körper rund und prächtig heran."
        es:
          scarlet: "Las hojas de su cabeza vuelven a crecer\nrápidamente aunque se caigan. A pesar de ser\namargas, restablecen la vitalidad."
          violet: "Adquiere un aspecto esplendoroso cuando se\nle recortan las hojas de la cabeza con cierta\nasiduidad."
        ko:
          scarlet: "빠져도 바로 자라나는\n머리의 잎사귀는 아주 쓰지만\n갉아 먹으면 바로 기운이 난다."
          violet: "가끔 잎을 손질해 주면\n둥글둥글하게 훌륭한 모습으로\n자라난다."
        zh_simp:
          scarlet: "头上的叶子就算落了也会\n立马长回来。叶子的味道很苦，\n但用来一咬就能瞬间恢复精神。"
          violet: "如果时不时修剪叶子，\n就会长成圆鼓鼓\n很华丽的样子。"
        zh_trad:
          scarlet: "頭上的葉子就算掉了也會\n立刻長回來。葉子味道很苦，\n但拿來嚼卻能瞬間恢復精神。"
          violet: "如果偶爾修剪葉子，\n就會長成圓鼓鼓\n很華麗的樣子。"
