          violet: "￹片腕￺かたうで￻を　￹動￺うご￻かしただけで\n￹山￺やま￻を￹崩￺くず￻し　￹地響￺じひび￻きを　￹起￺お￻こす\nとてつもない　パワーを　￹秘￺ひ￻める。"
        jp_kanji:
          scarlet: "あたりの　￹地形￺ちけい￻を　￹変￺か￻えるぐらい\n￹朝飯前￺あさめしまえ￻の　￹力持￺ちからも￻ち。\nまわりを　￹気￺き￻にしない　ふてぶてしさ。"
          violet: "￹片腕￺かたうで￻を　￹動￺うご￻かしただけで\n￹山￺やま￻を￹崩￺くず￻し　￹地響￺じひび￻きを　￹起￺お￻こす\nとてつもない　パワーを　￹秘￺ひ￻める。"
        en:
          scarlet: "Extremely strong, it can change the landscape.\nIt is so insolent that it doesn’t care about others."
          violet: "In just one of its mighty hands, it has the power\nto make the ground shake and mountains\ncrumble."
        fr:
          scarlet: "Ce Pokémon est si fort qu’il est capable\nde modifier la topographie d’un lieu.\nIl ne se préoccupe pas des autres."
          violet: "Il a assez de force pour faire trembler la terre\net faire s’écrouler une montagne d’une seule\nmain."
        it:
          scarlet: "Con la sua forza smisurata riesce a trasformare\nil paesaggio con estrema facilità. La sua indole\ninsolente lo rende indifferente al mondo."
          violet: "Racchiude in sé una potenza tale\nda permettergli di scuotere la terra e\nsbriciolare le montagne con un solo arto."
        de:
          scarlet: "Dieses kaltblütige und rücksichtslose Pokémon ist\nso stark, dass es mit Leichtigkeit das Aussehen\nganzer Landstriche verändern kann."
          violet: "Es besitzt so viel Kraft, dass es mit nur einer\nHand die Erde erbeben und Berge zerbröckeln\nlassen kann."
        es:
          scarlet: "Tiene tanta fuerza que puede cambiar el\npaisaje. Su naturaleza insolente le hace\nser muy egoísta."
          violet: "Su poder es tan descomunal que le basta un\nsolo brazo para derribar montañas y provocar\nterremotos."
        ko:
          scarlet: "주변 지형을 바꾸는 정도쯤은\n쉽게 해낼 정도의 힘을 가지고 있다.\n주위를 신경 쓰지 않는 대담한 성격."
          violet: "한쪽 팔을 움직이는 것만으로도\n산을 무너뜨리고 땅을 울리게 하는\n엄청난 힘을 감추고 있다."
        zh_simp:
          scarlet: "力气之大，就连改变自己\n周围的地形也是小菜一碟。\n个性狂妄，不顾周遭的感受。"
          violet: "体内蕴含着只需要\n动一只手就能让大山崩塌，\n并引起地震的绝世力量。"
        zh_trad:
          scarlet: "即便是改變周圍的地形\n也是小事一樁的大力士。\n個性狂妄，不顧周遭的感受。"
          violet: "體內蘊含著只要揮動\n一隻手就能讓大山崩塌，\n並引起地震的絕大力量。"
