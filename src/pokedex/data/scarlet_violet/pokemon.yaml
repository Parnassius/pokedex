          scarlet: "コンクリートを　￹作￺つく￻る　￹技術￺ぎじゅつ￻は\n２０００￹年前￺ねんまえ￻に　ローブシンから\n￹教￺おそ￻わったと　￹考￺かんが￻えられている。"
          violet: "￹力￺ちから￻に　￹頼￺たよ￻らず　￹遠心力￺えんしんりょく￻を\nうまく　￹活￺い￻かして　コンクリートを\n￹振￺ふ￻り￹回￺まわ￻す　￹技￺わざ￻を　￹使￺つか￻いこなせる。"
        jp_kanji:
          scarlet: "コンクリートを　￹作￺つく￻る　￹技術￺ぎじゅつ￻は\n２０００￹年前￺ねんまえ￻に　ローブシンから\n￹教￺おそ￻わったと　￹考￺かんが￻えられている。"
          violet: "￹力￺ちから￻に　￹頼￺たよ￻らず　￹遠心力￺えんしんりょく￻を\nうまく　￹活￺い￻かして　コンクリートを\n￹振￺ふ￻り￹回￺まわ￻す　￹技￺わざ￻を　￹使￺つか￻いこなせる。"
        en:
          scarlet: "It is thought that Conkeldurr taught\nhumans how to make concrete more\nthan 2,000 years ago."
          violet: "Rather than rely on their strength, they master\nmoves that make good use of centrifugal force\nto swing around concrete."
        fr:
          scarlet: "On pense que c’est un Bétochef\nqui a appris aux êtres humains à\nfabriquer du ciment il y a 2 000 ans."
          violet: "Au lieu de se reposer sur sa musculature,\nil tire parti de la force centrifuge et attaque ses\nennemis en faisant tournoyer ses piliers de béton."
        it:
          scarlet: "Si pensa che la tecnica per fare\nil cemento sia stata diffusa proprio\nda Conkeldurr, 2.000 anni fa."
          violet: "Utilizza con maestria mosse con cui fa roteare\npilastri di cemento, sfruttando a dovere\nla forza centrifuga più che i propri muscoli."
        de:
          scarlet: "Man nimmt an, dass es der Menschheit\nvor circa 2000 Jahren das Betonmischen\nbeigebracht hat."
          violet: "Anstatt sich auf seine Stärke zu verlassen, setzt es\nAttacken ein, bei denen es seine Betonpfeiler\nmithilfe der Zentrifugalkraft umherschwingt."
        es:
          scarlet: "Se cree que Conkeldurr enseñó a\nlos humanos la técnica para elaborar\nhormigón hace más de 2000 años."
          violet: "En vez de depender de su propia fuerza, sus\nmovimientos hacen perfecto uso de la fuerza\ncentrífuga para blandir pilares de hormigón."
        ko:
          scarlet: "콘크리트를 만드는 기술은\n2000년 전에 노보청에게\n배운 것이라고 여겨지고 있다."
          violet: "힘에 의지하지 않고 원심력을\n잘 활용하여 콘크리트를\n휘두르는 기술을 구사한다."
        zh_simp:
          scarlet: "制作混凝土的技术，\n被认为是２０００年前\n从修建老匠那儿学来的。"
          violet: "熟练掌握了不依赖力量，\n灵活运用离心力挥舞混凝土的招式。"
        zh_trad:
          scarlet: "製作水泥的技術，\n被認為是２０００年前\n從修建老匠那裡學來的。"
          violet: "能夠不憑蠻力，\n而是巧妙利用離心力\n來揮舞水泥柱使出招式。"
