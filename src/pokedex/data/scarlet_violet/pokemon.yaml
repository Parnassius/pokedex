          violet: "いっぺんに　￹大勢￺おおぜい￻の　￹人￺ひと￻を　￹化￺ば￻かす\n￹力￺ちから￻を　￹持￺も￻つ。　￹幻￺まぼろし￻の　￹景色￺けしき￻を　￹見￺み￻せて\n￹棲￺す￻み￹処￺か￻を　￹守￺まも￻る。"
        jp_kanji:
          scarlet: "ゾロアークを　￹捕￺と￻らえようとした　￹人￺ひと￻を\n￹幻￺まぼろし￻の　￹景色￺けしき￻の￹中￺なか￻に　￹閉￺と￻じこめ\nこらしめた　といわれる。"
          violet: "いっぺんに　￹大勢￺おおぜい￻の　￹人￺ひと￻を　￹化￺ば￻かす\n￹力￺ちから￻を　￹持￺も￻つ。　￹幻￺まぼろし￻の　￹景色￺けしき￻を　￹見￺み￻せて\n￹棲￺す￻み￹処￺か￻を　￹守￺まも￻る。"
        en:
          scarlet: "Stories say those who tried to catch Zoroark\nwere trapped in an illusion and punished."
          violet: "Each has the ability to fool a large group of\npeople simultaneously. They protect their lair\nwith illusory scenery."
        fr:
          scarlet: "On dit que ceux qui osent tenter de le capturer\nrestent prisonniers des paysages illusoires\nqu’il peut créer."
          violet: "Ce Pokémon peut mystifier instantanément des\nfoules d’êtres humains. Il protège son habitat\nen créant des illusions de paysages."
        it:
          scarlet: "Gira voce che quelli che osano cercare di\ncatturarlo restano imprigionati dentro mondi\ndi fantasia che lui stesso crea."
          violet: "Ha la capacità di trarre in inganno una folla di\npersone. Protegge la tana creando paesaggi\nillusori."
        de:
          scarlet: "Es heißt, Zoroark verbanne jeden, der es zu\nfangen versucht, zur Strafe in eine Welt der\nIllusionen."
          violet: "Es kann auf einen Schlag große Massen von\nMenschen täuschen und kreiert Illusionen,\num sein Revier zu schützen."
        es:
          scarlet: "Se dice que Zoroark atrapa en un mundo de\nilusiones a quien lo intenta capturar y que, de\nesta manera, lo castiga."
          violet: "Tiene la facultad de confundir a muchos\nhumanos a la vez. Protege su guarida\ncreando un paisaje ilusorio."
        ko:
          scarlet: "조로아크를 잡으려 한 사람을\n환영의 경치 속에 가둬서\n혼내 줬다고 전해진다."
          violet: "한 번에 많은 사람을\n속이는 힘을 가졌다.\n환영의 경치를 보여 줘서 거처를 지킨다."
        zh_simp:
          scarlet: "据说索罗亚克会把企图\n捕捉它的人关在虚幻的\n场景里并给予惩罚。"
          violet: "拥有一下子迷惑许多人的力量。\n展现出虚幻的景色\n来保护自己的住所。"
        zh_trad:
          scarlet: "據說索羅亞克會把\n企圖捕捉牠的人關在\n虛幻的景色裡給予教訓。"
          violet: "有著一口氣迷惑許多人的力量。\n會讓人看見虛幻的景色，\n以保護自己的居所。"
