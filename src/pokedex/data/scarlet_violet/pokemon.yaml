      descriptions:
        jp_kana:
          scarlet: "￹息￺いき￻の￹合￺あ￻った　コンビネーションで\n￹巣￺す￻の　￹材料￺ざいりょう￻に　なりそうなものを\n￹前歯￺まえば￻で　￹切￺き￻り￹出￺だ￻して　￹運￺はこ￻び￹去￺さ￻る。"
          violet: "どんなときでも　２￹匹￺ひき￻は　￹一緒￺いっしょ￻。\n￹見￺み￻つけた　エサは　ぴったりと\n￹半分￺はんぶん￻こして　￹仲良￺なかよ￻く　￹食￺た￻べる。"
        jp_kanji:
          scarlet: "￹息￺いき￻の￹合￺あ￻った　コンビネーションで\n￹巣￺す￻の　￹材料￺ざいりょう￻に　なりそうなものを\n￹前歯￺まえば￻で　￹切￺き￻り￹出￺だ￻して　￹運￺はこ￻び￹去￺さ￻る。"
          violet: "どんなときでも　２￹匹￺ひき￻は　￹一緒￺いっしょ￻。\n￹見￺み￻つけた　エサは　ぴったりと\n￹半分￺はんぶん￻こして　￹仲良￺なかよ￻く　￹食￺た￻べる。"
        en:
          scarlet: "Exhibiting great teamwork, they use their incisors\nto cut pieces out of any material that might be\nuseful for a nest, then make off with them."
          violet: "The pair sticks together no matter what. They\nsplit any food they find exactly in half and then\neat it together."
        fr:
          scarlet: "Ces Pokémon travaillent en équipe. À l’aide de\nleur incisive, ils extraient les matériaux nécessaires\npour construire leur nid, puis ils les emportent."
          violet: "Ces Pokémon vont toujours par paire. Lorsqu’ils\ntrouvent de la nourriture, ils la divisent en deux\nparts égales avant de la déguster."
        it:
          scarlet: "Sono una coppia molto affiatata. Se trovano\ndel materiale utile per la loro tana, lo ritagliano\ncon gli incisivi e lo portano via."
          violet: "Si muovono in coppia in ogni circostanza.\nSe trovano del cibo, lo dividono esattamente\na metà e lo mangiano tutti contenti."
        de:
          scarlet: "Zwieps arbeiten perfekt im Team zusammen.\nSie nagen mit den Vorderzähnen Material für\nden Nestbau ab und tragen es dann davon."
          violet: "Die beiden sind unzertrennlich. Finden sie\nFutter, teilen sie dieses in zwei identische\nHälften, ehe sie es zu fressen beginnen."
        es:
          scarlet: "Cuando encuentran un material que les parece\nútil para su nido, lo recortan con sus incisivos y\nlo acarrean, todo en perfecta compenetración."
          violet: "Siempre van en pareja. Cuando encuentran\ncomida, la dividen en dos partes idénticas para\ncompartirla."
        ko:
          scarlet: "호흡이 척척 맞는 콤비네이션으로\n집의 재료가 될 만한 것을\n앞니로 잘라 내어 가지고 간다."
          violet: "언제나 두 마리가 함께한다.\n발견한 먹이는 정확히 반으로 나눠서\n사이좋게 먹는다."
        zh_simp:
          scarlet: "凭借默契十足的团队合作，\n用门牙切断能当作巢穴的\n材料的东西，并将其搬走。"
          violet: "无论何时２只待都在一起。\n会把寻获的食物均分成两半，\n亲密无间地一起进食。"
        zh_trad:
          scarlet: "會以絕佳的團隊合作，\n把能當成巢穴建材的東西\n用門牙切斷後搬走。"
          violet: "無論何時２隻都待在一起。\n會把尋獲的食物均分成兩半，\n親密無間地一同進食。"
