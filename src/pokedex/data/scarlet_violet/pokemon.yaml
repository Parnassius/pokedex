          violet: "￹黄色￺きいろ￻い　￹花￺はな￻の　パワーを　￹引￺ひ￻き￹出￺だ￻し\n￹戦￺たたか￻う。　￹草花￺くさばな￻を　￹荒￺あ￻らした　ものは\n￹容赦￺ようしゃ￻なく　￹痛￺いた￻めつける。"
        jp_kanji:
          scarlet: "３００￹年以上￺ねんいじょう￻もの　あいだ\nお￹城￺しろ￻の　￹庭園￺ていえん￻を　￹守￺まも￻り￹続￺つづ￻けた\nフラージェスも　いたという。"
          violet: "￹黄色￺きいろ￻い　￹花￺はな￻の　パワーを　￹引￺ひ￻き￹出￺だ￻し\n￹戦￺たたか￻う。　￹草花￺くさばな￻を　￹荒￺あ￻らした　ものは\n￹容赦￺ようしゃ￻なく　￹痛￺いた￻めつける。"
        en:
          scarlet: "It is said that there was once a Florges that\nprotected the garden of a castle for over\n300 years."
          violet: "This Pokémon battles by drawing forth the power\nof yellow flowers. It ruthlessly punishes anyone\nwho tramples on flowering plants."
        fr:
          scarlet: "On raconte qu’un Florges aurait protégé\nles jardins d’un château pendant plus de\n300 ans."
          violet: "Ce Pokémon extrait la puissance des fleurs\njaunes pour combattre. Il punit sans pitié\nquiconque piétine les plantes en fleurs."
        it:
          scarlet: "Si dice che un Florges abbia protetto il giardino\nfiorito del suo castello per più di 300 anni."
          violet: "Lotta traendo il potere dai fiori gialli.\nFa soffrire senza pietà chi danneggia le piante."
        de:
          scarlet: "Einst soll es ein Florges gegeben haben, das den\nGarten eines Schlosses über eine Zeitspanne von\nmehr als 300 Jahren beschützt und gepflegt hat."
          violet: "Dieses Pokémon schöpft aus gelben Blumen Kraft\nund nutzt diese im Kampf. Es bestraft gnadenlos\njeden, der Wiesenblumen Schaden zufügt."
        es:
          scarlet: "Existen historias de un ejemplar de Florges que\ncustodió los jardines de un castillo durante más\nde 300 años."
          violet: "Extrae poder de las flores amarillas para luchar.\nCastiga sin clemencia a aquellos que se atreven\na dañar las plantas en flor."
        ko:
          scarlet: "300년이 넘는 세월 동안\n성의 정원을 지켜 온\n플라제스도 있다고 한다."
          violet: "노란 꽃의 파워를 끌어내서 싸운다.\n화초를 어지럽히는 자는\n자비 없이 공격한다."
        zh_simp:
          scarlet: "据说曾有花洁夫人\n持续保护城堡的庭院\n长达３００年以上。"
          violet: "能激发出黄花的力量来战斗。\n会狠狠地教训糟蹋花草的家伙，\n绝不会手下留情。"
        zh_trad:
          scarlet: "據說曾經有花潔夫人\n保護城堡的庭園\n長達３００年以上。"
          violet: "能激發出黃花的力量來戰鬥。\n會狠狠教訓糟蹋花草的傢伙，\n不會手下留情。"
