          scarlet: "￹髪￺かみ￻の￹毛￺け￻を　￹自在￺じざい￻に　￹操￺あやつ￻る。\n￹普段￺ふだん￻は　￹全身￺ぜんしん￻に　￹巻￺ま￻きつけ\n￹筋肉￺きんにく￻を　サポートしている。"
          violet: "￹森￺もり￻の　￹奥深￺おくぶか￻くに　￹暮￺く￻らしている。\n￹立派￺りっぱ￻に　￹進化￺しんか￻しても　くだらない\n￹悪￺わる￻さと　￹悪戯￺いたずら￻は　やめないのだ。"
        jp_kanji:
          scarlet: "￹髪￺かみ￻の￹毛￺け￻を　￹自在￺じざい￻に　￹操￺あやつ￻る。\n￹普段￺ふだん￻は　￹全身￺ぜんしん￻に　￹巻￺ま￻きつけ\n￹筋肉￺きんにく￻を　サポートしている。"
          violet: "￹森￺もり￻の　￹奥深￺おくぶか￻くに　￹暮￺く￻らしている。\n￹立派￺りっぱ￻に　￹進化￺しんか￻しても　くだらない\n￹悪￺わる￻さと　￹悪戯￺いたずら￻は　やめないのだ。"
        en:
          scarlet: "This Pokémon has complete control over its\nhair. Grimmsnarl normally keeps its hair\nwrapped around its body to support its muscles."
          violet: "It lives deep within the forest. Even after\nevolving into this splendid form, it hasn’t\ngiven up on its petty misdeeds and pranks."
        fr:
          scarlet: "Ce Pokémon contrôle sa chevelure à sa guise.\nIl l’enroule généralement autour de son corps\npour fortifier ses muscles."
          violet: "Il vit au fin fond des forêts. Il a beau avoir\névolué en une créature majestueuse, il continue\nà faire des farces et à jouer de mauvais tours."
        it:
          scarlet: "Manovra la chioma come preferisce.\nSolitamente la tiene avvolta attorno\nal corpo per supportare i muscoli."
          violet: "Vive nelle profondità dei boschi. Per quanto\nsi sia evoluto in questa splendida forma, non\nha perso il vizio di fare dispetti e cattiverie."
        de:
          scarlet: "Es kann seine Haare gezielt bewegen.\nNormalerweise hält es sie um seinen Körper\ngewickelt, um so seine Muskelkraft zu verstärken."
          violet: "Es ist in den Tiefen von Wäldern zu Hause.\nTrotz seiner stattlichen Entwicklung hört es\nnicht auf, Schabernack zu treiben."
        es:
          scarlet: "Controla su cabello a placer. Suele enrollarse\nel pelo por todo el cuerpo para que le sirva\nde soporte muscular."
          violet: "Vive en lo más profundo del bosque.\nA pesar de haber evolucionado, no\nabandona las pequeñas bromas y las trastadas."
        ko:
          scarlet: "머리카락을 자유자재로 조종한다.\n평소에는 온몸에 휘감아서\n근육을 보조하는 데 쓴다."
          violet: "깊은 숲속에 살고 있다.\n늠름하게 진화했어도\n실없는 장난과 나쁜 짓을 멈추지 않는다."
        zh_simp:
          scarlet: "能够自由自在地操作头发。\n平时会用头发裹住全身，\n借此来辅助自己的肌肉。"
          violet: "生活在森林深处。\n即使进化后变得挺拔强壮，\n还是会继续做无聊的坏事和恶作剧。"
        zh_trad:
          scarlet: "能自由自在地操縱頭髮。\n平時會把頭髮裹住全身\n以輔助自己的肌肉。"
          violet: "生活在森林深處。即使因進化\n而變得強壯挺拔，也改不掉做\n無謂的壞事和惡作劇的習慣。"
