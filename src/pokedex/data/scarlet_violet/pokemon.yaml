      descriptions:
        jp_kana:
          scarlet: "￹詳細￺しょうさい￻は　よく　わかっていない。\nモトトカゲに　￹似￺に￻た　￹印象￺いんしょう￻だが\nはるかに　￹強￺つよ￻く　￹冷酷￺れいこく￻なのだ。"
          violet: "￹古￺ふる￻い　￹書物￺しょもつ￻に　￹名￺な￻が　ある\nテツノオロチらしい。　￹雷￺いかずち￻で\n￹大地￺だいち￻を　￹灰￺はい￻に　￹変￺か￻えたという。"
        jp_kanji:
          scarlet: "￹詳細￺しょうさい￻は　よく　わかっていない。\nモトトカゲに　￹似￺に￻た　￹印象￺いんしょう￻だが\nはるかに　￹強￺つよ￻く　￹冷酷￺れいこく￻なのだ。"
          violet: "￹古￺ふる￻い　￹書物￺しょもつ￻に　￹名￺な￻が　ある\nテツノオロチらしい。　￹雷￺いかずち￻で\n￹大地￺だいち￻を　￹灰￺はい￻に　￹変￺か￻えたという。"
        en:
          scarlet: "Much remains unknown about this\ncreature. It resembles Cyclizar, but it\nis far more ruthless and powerful."
          violet: "This seems to be the Iron Serpent mentioned\nin an old book. The Iron Serpent is said to have\nturned the land to ash with its lightning."
        fr:
          scarlet: "On manque d’informations à son sujet.\nIl ressemble à Motorizard, mais en bien\nplus fort et cruel."
          violet: "Il semble être le « Serpent-de-Fer » mentionné\ndans un livre ancien. Il aurait réduit la terre\nen cendres en la foudroyant."
        it:
          scarlet: "Per lo più ancora sconosciuto, presenta\nsimilitudini con Cyclizar, ma è notevolmente\npiù forte e spietato."
          violet: "Sembra che sia il Serpeferrea di cui si\nparla in un vecchio libro. Si dice che con\ni suoi fulmini abbia tramutato la terra in cenere."
        de:
          scarlet: "Es sind kaum Einzelheiten zu diesem Wesen\nbekannt, welches zwar Mopex ähnelt, aber\nweitaus stärker und grausamer ist."
          violet: "Offenbar ist dies das Objekt Eisenschlange,\ndas in einer alten Schrift erwähnt wurde. Es soll\ndas Land mit Blitzen zu Asche verwandelt haben."
        es:
          scarlet: "Pese a las similitudes con los Cyclizar,\nes mucho más fuerte y despiadado que\nellos. Está rodeado de incógnitas."
          violet: "Parece tratarse de la criatura\nFerromandra, que, según unos viejos escritos,\ntransformó la tierra en cenizas con sus rayos."
        ko:
          scarlet: "자세한 것은 잘 알려지지 않았다.\n모토마를 닮았지만\n그보다 훨씬 강하고 냉혹하다."
          violet: "오래된 서적에 “무쇠이무기”라는\n이름으로 기록된 존재인 것 같다.\n벼락으로 대지를 잿더미로 만들었다고 한다."
        zh_simp:
          scarlet: "关于它的详情尚且不明。\n与摩托蜥有着相似的印象，\n但强大与冷酷的程度远超摩托蜥。"
          violet: "它似乎就是古老的书籍中\n提及的铁大蛇。传说它\n曾用雷电将大地变为灰烬。"
        zh_trad:
          scarlet: "詳情目前仍然不明。雖然給人\n貌似摩托蜥的印象，但力量和\n冷酷的程度可說是天壤之別。"
          violet: "牠似乎就是古書裡所提及的\n鐵大蛇。傳說牠曾用雷電\n將大地化成了一片灰。"
