          scarlet: "￹大人￺おとな￻になると　￹仲間￺なかま￻から\n￹背中￺せなか￻に　￹足跡￺あしあと￻の　マークを\nつけられる　￹習性￺しゅうせい￻を　￹持￺も￻つ。"
          violet: "￹尻尾￺しっぽ￻の　￹先￺さき￻から　￹分泌￺ぶんぴつ￻する\n￹謎￺なぞ￻の　￹液体￺えきたい￻の　￹色￺いろ￻は\nドーブルごとに　￹決￺き￻まっている。"
        jp_kanji:
          scarlet: "￹大人￺おとな￻になると　￹仲間￺なかま￻から\n￹背中￺せなか￻に　￹足跡￺あしあと￻の　マークを\nつけられる　￹習性￺しゅうせい￻を　￹持￺も￻つ。"
          violet: "￹尻尾￺しっぽ￻の　￹先￺さき￻から　￹分泌￺ぶんぴつ￻する\n￹謎￺なぞ￻の　￹液体￺えきたい￻の　￹色￺いろ￻は\nドーブルごとに　￹決￺き￻まっている。"
        en:
          scarlet: "Once a Smeargle reaches adulthood, it will have\nother members of its species leave paw prints on\nits back."
          violet: "The color of the mysterious fluid secreted from\nthe tip of the tail is predetermined for each\nSmeargle."
        fr:
          scarlet: "Ces Pokémon ont pour coutume d’apposer\nl’empreinte de leur patte sur le dos de leurs\ncongénères ayant atteint l’âge adulte."
          violet: "La couleur du mystérieux fluide sécrété par le\nbout de sa queue varie selon chaque individu."
        it:
          scarlet: "Fra gli esemplari adulti è usanza portare\nsul dorso le impronte delle zampe dei\npropri compagni."
          violet: "Il colore del fluido misterioso che secerne\ndalla coda cambia da esemplare a esemplare."
        de:
          scarlet: "Sobald Farbeagle das Erwachsenenalter erreicht\nhaben, ist es üblich, dass Artgenossen mit den\nPfoten Abdrücke auf ihren Rücken hinterlassen."
          violet: "Die Farbe des mysteriösen Sekrets, das aus\nihrer Schweifspitze austritt, variiert je nach\nFarbeagle."
        es:
          scarlet: "Cuando un ejemplar alcanza la edad adulta,\nes costumbre que sus congéneres le impriman\nla marca de sus patas en el lomo."
          violet: "El color del misterioso fluido que segrega\npor la punta de la cola varía en función de\ncada individuo."
        ko:
          scarlet: "어른이 되면 동료로부터\n등에 발자국 마크를\n받는 습성을 가진다."
          violet: "꼬리 끝에서 분비되는\n알 수 없는 액체의 색은\n루브도마다 정해져 있다."
        zh_simp:
          scarlet: "有着成年后让伙伴在自己\n背上画下脚印标记的习性。"
          violet: "每只图图犬从尾巴前端\n渗出的神秘体液\n都有自己固定的颜色。"
        zh_trad:
          scarlet: "有著成年後讓夥伴在自己\n背上印下腳印標記的習性。"
          violet: "每隻圖圖犬從尾巴尖端\n分泌出的神秘液體，\n都有自己固定的顏色。"
