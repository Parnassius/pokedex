      descriptions:
        jp_kana:
          scarlet: "まわりで　￹動￺うご￻くものが　あると\nどんなときでも　すぐに　￹反応￺はんのう￻して\n￹細￺ほそ￻い　ツルを　￹伸￺の￻ばしてくる。"
          violet: "￹脚￺あし￻を　￹地面￺じめん￻　￹深￺ふか￻くまで　￹伸￺の￻ばして\n￹水分￺すいぶん￻を　￹補給￺ほきゅう￻する。　そのとき\n￹襲￺おそ￻われると　￹逃￺に￻げだせない。"
        jp_kanji:
          scarlet: "まわりで　￹動￺うご￻くものが　あると\nどんなときでも　すぐに　￹反応￺はんのう￻して\n￹細￺ほそ￻い　ツルを　￹伸￺の￻ばしてくる。"
          violet: "￹脚￺あし￻を　￹地面￺じめん￻　￹深￺ふか￻くまで　￹伸￺の￻ばして\n￹水分￺すいぶん￻を　￹補給￺ほきゅう￻する。　そのとき\n￹襲￺おそ￻われると　￹逃￺に￻げだせない。"
        en:
          scarlet: "No matter what Bellsprout is doing, if it detects\nmovement nearby, it will immediately react by\nreaching out with its thin vines."
          violet: "It plants its feet deep underground to rehydrate\nitself. While doing so, it’s unable to run away if\nit’s attacked."
        fr:
          scarlet: "S’il détecte un mouvement, il déploie\nimmédiatement ses fines lianes dans\ncette direction."
          violet: "Il enfonce ses pieds profondément dans le sol\npour y puiser de l’eau. Dans cette position,\nil ne peut pas fuir en cas d’attaque."
        it:
          scarlet: "Se qualcosa si muove intorno a lui, reagisce\nistantaneamente tendendo i suoi viticci."
          violet: "Penetra il terreno con le zampe per rifornirsi\nd’acqua. Se in quel momento viene attaccato,\nnon può scappare."
        de:
          scarlet: "Bewegt sich etwas in seinem Umfeld, reagiert\nes sofort und streckt seine dünnen Ranken aus."
          violet: "Es bohrt seine Füße tief in die Erde, um Wasser\naufzunehmen. Wird es dabei angegriffen, kann es\nnicht fliehen."
        es:
          scarlet: "Si detecta algún movimiento a su alrededor,\nsea cuando sea, reacciona enseguida\nextendiendo sus finas lianas en esa dirección."
          violet: "Entierra las patas profundamente en el suelo\npara absorber agua. Si lo atacan mientras está\narraigado, no puede escapar."
        ko:
          scarlet: "주변에 움직이는 것이 있으면\n언제든지 바로 반응해서\n가느다란 덩굴을 뻗는다."
          violet: "다리를 지면 깊이 뻗어서\n수분을 보충한다.\n그때 공격을 받으면 도망치지 못한다."
        zh_simp:
          scarlet: "只要周围有会动的东西，\n它随时都会马上作出反应，\n将细细的藤蔓伸过去。"
          violet: "会把脚伸到地下深处\n补充水分，但若在此时\n遭到袭击就会无法逃脱。"
        zh_trad:
          scarlet: "只要周圍有會動的東西，\n不論何時都會立即作出反應，\n將細細的藤蔓伸往該處去。"
          violet: "會把腳伸到地面深處\n補充水分，但若在此時\n遭到襲擊就會無法逃脫。"
