        jp_kana:
          scarlet: "￹大￺おお￻きな　￹相手￺あいて￻に　￹襲￺おそ￻われても\n￹発達￺はったつ￻した　￹背￺せ￻びれを　￹操￺あやつ￻り\n￹水中￺すいちゅう￻を　￹自由￺じゆう￻に　￹逃￺に￻げる。"
          violet: "ぜんまいのように　クルクル￹巻￺ま￻かれた\n￹尻尾￺しっぽ￻で　￹体￺からだ￻の　バランスをとる。\n￹口￺くち￻から　スミを　￹吐￺は￻くことが　ある。"
        jp_kanji:
          scarlet: "￹大￺おお￻きな　￹相手￺あいて￻に　￹襲￺おそ￻われても\n￹発達￺はったつ￻した　￹背￺せ￻びれを　￹操￺あやつ￻り\n￹水中￺すいちゅう￻を　￹自由￺じゆう￻に　￹逃￺に￻げる。"
          violet: "ぜんまいのように　クルクル￹巻￺ま￻かれた\n￹尻尾￺しっぽ￻で　￹体￺からだ￻の　バランスをとる。\n￹口￺くち￻から　スミを　￹吐￺は￻くことが　ある。"
        en:
          scarlet: "If attacked—even by a large enemy—Horsea\neffortlessly swims to safety by utilizing its\nwell-developed dorsal fin."
          violet: "It maintains balance using its tail, which is wound\nup like a coil. It may spray ink from its mouth."
        fr:
          scarlet: "S’il est attaqué par des adversaires de grande\ntaille, il s’enfuit en nageant agilement grâce\nà sa nageoire dorsale développée."
          violet: "Ce Pokémon se maintient en équilibre grâce\nà sa queue enroulée. Il peut cracher de l’encre."
        it:
          scarlet: "Anche se viene attaccato da un nemico di grandi\ndimensioni, si mette facilmente in salvo nuotando\nagilmente con la pinna dorsale ben sviluppata."
          violet: "Si mantiene in equilibrio grazie alla coda avvolta\na spirale. Può sputare inchiostro dalla bocca."
        de:
          scarlet: "Auch bei Angriffen durch größere Gegner kann\nes mühelos davonschwimmen, indem es seine\ngut ausgebildete Rückenflosse einsetzt."
          violet: "Es hält mithilfe seines Schwanzes, der wie eine\nSpule aufgewickelt ist, das Gleichgewicht.\nManchmal spuckt es Tinte aus seinem Mund."
        es:
          scarlet: "Si es atacado por un enemigo, por muy grande\nque sea, nada veloz a un lugar seguro gracias a\nsu fornida aleta dorsal."
          violet: "Se vale de su cola enroscada para mantener\nel equilibrio. En ocasiones, expulsa tinta por\nla boca."
        ko:
          scarlet: "커다란 상대에게 습격당해도\n발달한 등지느러미를 사용해\n수중에서 자유롭게 도망친다."
          violet: "태엽처럼 돌돌 말린 꼬리로\n몸의 균형을 잡는다.\n주둥이에서 먹물을 뿜을 수 있다."
        zh_simp:
          scarlet: "即使被体型大的对手袭击，\n也能操控发达的背鳍，\n在水中自由自在地逃跑。"
          violet: "会用像发条一样圆圆卷起的\n尾巴来保持身体平衡。\n有时会从口中吐出墨汁。"
        zh_trad:
          scarlet: "即使被體型大的對手襲擊，\n也能操控發達的背鰭，\n在水中自由自在地逃跑。"
          violet: "會用像蕨菜那樣捲起的尾巴\n來保持身體的平衡。\n有時候會從口中吐出墨汁。"
