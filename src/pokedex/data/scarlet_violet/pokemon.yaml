      descriptions:
        jp_kana:
          scarlet: "￹左右￺さゆう￻の　コンビネーションパンチで\n￹敵￺てき￻を　￹追￺お￻いつめ　￹時速￺じそく￻５００キロの\nストレートで　￹一気￺いっき￻に　￹仕留￺しと￻める。"
          violet: "￹拳￺こぶし￻は　￹筋肉￺きんにく￻の　￹塊￺かたまり￻。\n３￹分間￺ぶんかん￻ごとに　ひと￹休￺やす￻みして\n￹呼吸￺こきゅう￻と　￹気持￺きも￻ちを　￹整￺ととの￻える。"
        jp_kanji:
          scarlet: "￹左右￺さゆう￻の　コンビネーションパンチで\n￹敵￺てき￻を　￹追￺お￻いつめ　￹時速￺じそく￻５００キロの\nストレートで　￹一気￺いっき￻に　￹仕留￺しと￻める。"
          violet: "￹拳￺こぶし￻は　￹筋肉￺きんにく￻の　￹塊￺かたまり￻。\n３￹分間￺ぶんかん￻ごとに　ひと￹休￺やす￻みして\n￹呼吸￺こきゅう￻と　￹気持￺きも￻ちを　￹整￺ととの￻える。"
        en:
          scarlet: "It corners its foes with combo punches from both\nsides, then finishes them off with a single straight\npunch launched at over 300 mph."
          violet: "Its fists are masses of muscle. It takes a break\nevery three minutes to steady its breath and\nmood."
        fr:
          scarlet: "Il accule ses adversaires en alternant des crochets\ndu gauche et du droit, puis il les achève avec un\ncoup direct dont la vitesse atteint les 500 km/h."
          violet: "Ses poings sont des boules de muscles. Toutes\nles trois minutes, il fait une pause pour reprendre\nson souffle et retrouver sa concentration."
        it:
          scarlet: "Incalza il nemico con una combinazione di pugni\nda sinistra e da destra, per poi finirlo con un solo\ndiretto sferrato a 500 km/h."
          violet: "I suoi pugni sono un concentrato di muscoli.\nOgni tre minuti fa una pausa per riprendere\nfiato e ritrovare la calma."
        de:
          scarlet: "Mit rasanten Schlägen von beiden Seiten treibt es\nseine Gegner in die Enge und erledigt sie dann\nmit einer 500 km/h schnellen gezielten Geraden."
          violet: "Seine Fäuste bestehen aus reiner Muskelmasse.\nAlle drei Minuten muss es kurz Pause machen,\num Luft zu schnappen und sich zu sammeln."
        es:
          scarlet: "Acorrala a sus enemigos con combinaciones de\npuñetazos con ambos puños, para luego darles\nel golpe de gracia con un directo a 500 km/h."
          violet: "Sus puños son un manojo de puro músculo.\nCada tres minutos se toma un descanso para\nrespirar y recuperar la concentración."
        ko:
          scarlet: "좌우 콤비네이션 펀치로\n상대를 몰아붙인 뒤, 시속 500km의\n스트레이트로 단숨에 마무리한다."
          violet: "주먹은 근육 덩어리다.\n3분마다 휴식을 취하며\n호흡과 마음을 정리한다."
        zh_simp:
          scarlet: "会用左右组合拳把敌人逼入绝境，\n再使出时速５００公里的\n直拳一口气打败对手。"
          violet: "整个拳头都是肌肉。\n每隔３分钟就要休息一下\n来调整呼吸和情绪。"
        zh_trad:
          scarlet: "會左右使出組合拳把敵手\n逼入絕境，再以時速高達\n５００公里的直拳一口氣打倒對方。"
          violet: "整個拳頭都是肌肉。\n每隔３分鐘就會休息一下，\n調整自己的呼吸與心情。"
