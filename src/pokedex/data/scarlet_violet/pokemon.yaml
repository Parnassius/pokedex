      descriptions:
        jp_kana:
          scarlet: "￹乾燥￺かんそう￻した　￹砂漠￺さばく￻に　￹生息￺せいそく￻。\nすり￹鉢状￺ばちじょう￻の　￹巣穴￺すあな￻の￹中￺なか￻で\n￹獲物￺えもの￻を　じっと　￹待￺ま￻ち￹続￺つづ￻ける。"
          violet: "￹大￺おお￻きな　あごで　￹邪魔￺じゃま￻な　￹岩￺いわ￻を\n￹砕￺くだ￻きながら　￹砂￺すな￻を　￹掘￺ほ￻る。\n￹巣穴￺すあな￻の　￹形￺かたち￻は　スリ￹鉢状￺ばちじょう￻。"
        jp_kanji:
          scarlet: "￹乾燥￺かんそう￻した　￹砂漠￺さばく￻に　￹生息￺せいそく￻。\nすり￹鉢状￺ばちじょう￻の　￹巣穴￺すあな￻の￹中￺なか￻で\n￹獲物￺えもの￻を　じっと　￹待￺ま￻ち￹続￺つづ￻ける。"
          violet: "￹大￺おお￻きな　あごで　￹邪魔￺じゃま￻な　￹岩￺いわ￻を\n￹砕￺くだ￻きながら　￹砂￺すな￻を　￹掘￺ほ￻る。\n￹巣穴￺すあな￻の　￹形￺かたち￻は　スリ￹鉢状￺ばちじょう￻。"
        en:
          scarlet: "This Pokémon lives in arid deserts.\nIt patiently awaits prey inside its funnel-\nshaped nest."
          violet: "As it digs through the sand, its giant jaws\ncrush any rocks that obstruct its path. It\nbuilds a funnel-shaped nest."
        fr:
          scarlet: "Ce Pokémon vit dans les déserts arides.\nIl attend patiemment ses proies dans\nson terrier en forme d’entonnoir."
          violet: "Il creuse des trous dans le sable et brise\nles rochers qui le gênent d’un coup de\nmâchoire. Son terrier ressemble à un entonnoir."
        it:
          scarlet: "Vive nei deserti più aridi. Scava tane\na forma di imbuto e vi si apposta,\nattendendo che le prede vi caschino dentro."
          violet: "Scava una tana a forma di imbuto nella\nsabbia frantumando le rocce che lo ostacolano\ncon le sue possenti mascelle."
        de:
          scarlet: "Es lebt in trockenen Wüstengebieten,\nwo es in seinem trichterförmigen Bau\ngeduldig auf Beute wartet."
          violet: "Es gräbt im Sand und zermalmt dabei mit\nseinem großen Kiefer störende Felsen.\nSein Bau hat die Form eines Trichters."
        es:
          scarlet: "Habita desiertos áridos. Cava nidos con\nforma de embudo, en los que espera\npacientemente a que caiga su presa."
          violet: "Destroza con sus grandes mandíbulas las rocas\nque va encontrando a su paso mientras cava en\nla arena. Sus nidos tienen forma de embudo."
        ko:
          scarlet: "건조한 사막에 서식한다.\n원뿔형의 보금자리 속에서\n조용히 먹잇감을 계속 기다린다."
          violet: "커다란 턱으로 방해되는 바위를\n부수며 모래를 판다.\n둥지 모양은 원뿔형."
        zh_simp:
          scarlet: "栖息在干燥的沙漠里。\n会待在捣蒜钵状的巢穴中，\n一动不动地持续等着猎物出现。"
          violet: "一边用大大的颚把挡道的\n岩石咬碎，一边挖沙子。\n巢穴的形状是捣蒜钵那样的。"
        zh_trad:
          scarlet: "棲息在乾燥的沙漠裡。\n會待在缽狀的巢穴中，\n動也不動地不斷等候獵物出現。"
          violet: "一邊用大大的顎把礙事的\n岩石咬碎，一邊挖沙子。\n巢穴的形狀就像研磨缽一樣。"
