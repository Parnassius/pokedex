        jp_kana:
          scarlet: "￹目撃報告￺もくげきほうこく￻は　ごくわずか。\n￹火柱￺ひばしら￻を　￹噴￺ふ￻き　￹暴￺あば￻れる　￹姿￺すがた￻の\n￹短￺みじか￻い　￹映像￺えいぞう￻が　￹存在￺そんざい￻する。"
          violet: "￹化石￺かせき￻から　￹復元￺ふくげん￻された　エンテイ\nと　オカルト￹雑誌￺ざっし￻が　￹掲載￺けいさい￻した\n￹怪￺あや￻しい　ポケモンに　￹似￺に￻ている。"
        jp_kanji:
          scarlet: "￹目撃報告￺もくげきほうこく￻は　ごくわずか。\n￹火柱￺ひばしら￻を　￹噴￺ふ￻き　￹暴￺あば￻れる　￹姿￺すがた￻の\n￹短￺みじか￻い　￹映像￺えいぞう￻が　￹存在￺そんざい￻する。"
          violet: "￹化石￺かせき￻から　￹復元￺ふくげん￻された　エンテイ\nと　オカルト￹雑誌￺ざっし￻が　￹掲載￺けいさい￻した\n￹怪￺あや￻しい　ポケモンに　￹似￺に￻ている。"
        en:
          scarlet: "There are scant few reports of this creature\nbeing sighted. One short video shows it\nrampaging and spouting pillars of flame."
          violet: "It resembles an eerie Pokémon once shown in a\nparanormal magazine. That Pokémon was said to\nbe an Entei regenerated from a fossil."
        fr:
          scarlet: "Cette créature n’a été que rarement aperçue,\nmais elle apparaît dans une courte vidéo où on\nla voit enrager et faire jaillir des piliers de feu."
          violet: "Il ressemble à un Pokémon étrange qu’une revue\nsur les phénomènes paranormaux présentait\ncomme un Entei ressuscité à partir d’un fossile."
        it:
          scarlet: "È stato avvistato pochissime volte.\nEsiste però un breve filmato che lo mostra\nsputare colonne di fuoco in preda all’ira."
          violet: "Ricorda un Pokémon che, stando alla rivista\ndi paranormale che lo ha descritto, sarebbe\nun Entei rigenerato a partire da un fossile."
        de:
          scarlet: "Es gibt nur sehr wenige bestätigte Sichtungen,\ndoch es existiert ein kurzes Video, auf dem es\numherwütet und Flammensäulen ausspeit."
          violet: "Es ähnelt einem fragwürdigen Pokémon, das von\neiner esoterischen Zeitschrift als ein aus einem\nFossil wiedererwecktes Entei bezeichnet wurde."
        es:
          scarlet: "Apenas constan avistamientos de este Pokémon,\npero existe una breve grabación donde aparece\ndesbocado y escupiendo ráfagas de fuego."
          violet: "Se asemeja a un supuesto Pokémon\ndescrito en una revista esotérica como\n\"un Entei restaurado a partir de un fósil\"."
        ko:
          scarlet: "목격 보고는 매우 드물다.\n불기둥을 뿜어내며 날뛰는 모습이 담긴\n짧은 영상이 존재한다."
          violet: "화석에서 복원된 앤테이라며\n오컬트 잡지에 게재됐던\n수상한 포켓몬을 닮았다."
        zh_simp:
          scarlet: "目击报告十分少。\n有把它喷出火柱大闹的样子\n拍摄下来的短片存在。"
          violet: "与超自然杂志所刊登的可疑的\n宝可梦很相似。该杂志声称\n那是从化石中复原的炎帝。"
        zh_trad:
          scarlet: "目擊報告極為稀少。\n有將牠噴出火柱大鬧的\n樣子拍攝下來的短片。"
          violet: "與超自然雜誌刊登的可疑寶可夢\n長得很相似。報導中的寶可夢\n據說是從化石復原的炎帝。"
