      descriptions:
        jp_kana:
          scarlet: "￹意識￺いしき￻を　￹研￺と￻ぎ￹澄￺す￻ますと　￹全身￺ぜんしん￻を\n￹透明￺とうめい￻に　できる。　ツノの　￹中￺なか￻の\nドラメシヤも　￹見￺み￻えなくなるのだ。"
          violet: "￹群￺む￻れで　いちばん　￹速￺はや￻い　￹個体￺こたい￻は\n￹音速飛行￺おんそくひこう￻をしたい　ドラメシヤに\nいつも　￹囲￺かこ￻まれて　いるぞ。"
        jp_kanji:
          scarlet: "￹意識￺いしき￻を　￹研￺と￻ぎ￹澄￺す￻ますと　￹全身￺ぜんしん￻を\n￹透明￺とうめい￻に　できる。　ツノの　￹中￺なか￻の\nドラメシヤも　￹見￺み￻えなくなるのだ。"
          violet: "￹群￺む￻れで　いちばん　￹速￺はや￻い　￹個体￺こたい￻は\n￹音速飛行￺おんそくひこう￻をしたい　ドラメシヤに\nいつも　￹囲￺かこ￻まれて　いるぞ。"
        en:
          scarlet: "Dragapult can make its whole body transparent\nby clearing its mind and focusing. Even the\nDreepy in Dragapult’s horns become invisible."
          violet: "The fastest Dragapult of the group is always\nsurrounded by Dreepy that want to fly at\nsonic speed."
        fr:
          scarlet: "Il est capable de devenir transparent en se\nconcentrant intensément. Même les Fantyrm\nnichés dans ses cornes deviennent alors invisibles."
          violet: "Le spécimen le plus rapide d’un groupe de\nLanssorien est toujours entouré de Fantyrm\ndésireux de se déplacer à la vitesse du son."
        it:
          scarlet: "Con la sola forza della concentrazione può\nrendere completamente invisibile se stesso\ne i Dreepy all’interno delle sue corna."
          violet: "Il più rapido del gruppo è costantemente\nattorniato da Dreepy desiderosi di essere\nsparati via alla velocità del suono."
        de:
          scarlet: "Konzentriert es sich stark, kann es sich unsichtbar\nmachen. Selbst die Grolldra in seinen Hörnern\nsind dann nicht mehr zu sehen."
          violet: "Das schnellste Exemplar einer Gruppe ist\nimmer von Grolldra umgeben, die darauf aus\nsind, mit Schallgeschwindigkeit zu fliegen."
        es:
          scarlet: "Es capaz de volver todo su cuerpo transparente\nal agudizar la mente. Los Dreepy que residen\nen sus cuernos también se vuelven invisibles."
          violet: "El más veloz de la manada siempre está\nrodeado de Dreepy deseosos de volar a\nvelocidades supersónicas."
        ko:
          scarlet: "신경을 곤두세우면\n온몸을 투명하게 만들 수 있다.\n뿔 안의 드라꼰도 보이지 않게 된다."
          violet: "무리에서 가장 빠른 개체는 언제나\n음속 비행을 하고 싶어 하는\n드라꼰에게 둘러싸여 있다."
        zh_simp:
          scarlet: "磨炼意志，就能让全身\n变透明。就连角里的\n多龙梅西亚也变得看不到。"
          violet: "群体里飞得最快的个体\n总是被想要体验音速飞行的\n多龙梅西亚包围。"
        zh_trad:
          scarlet: "只要集中精神，就能夠\n讓全身變透明。甚至連角裡的\n多龍梅西亞也會變得看不見。"
          violet: "群體裡飛得最快的個體，\n身邊經常都圍繞著想體驗\n音速飛行的多龍梅西亞。"
