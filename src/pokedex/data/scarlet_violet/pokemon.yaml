          violet: "￹捕獲例￺ほかくれい￻は　ゼロ。　データ￹不足￺ぶそく￻。\n￹古￺ふる￻い　￹書物￺しょもつ￻に　￹記￺しる￻された　￹物体￺ぶったい￻と\n￹特徴￺とくちょう￻が　￹一致￺いっち￻。"
        jp_kanji:
          scarlet: "￹人類￺じんるい￻を　￹監視￺かんし￻する　ＵＦＯだと\nオカルト￹雑誌￺ざっし￻が　￹紹介￺しょうかい￻した\n￹未知￺みち￻の　￹物体￺ぶったい￻に　￹似￺に￻ている。"
          violet: "￹捕獲例￺ほかくれい￻は　ゼロ。　データ￹不足￺ぶそく￻。\n￹古￺ふる￻い　￹書物￺しょもつ￻に　￹記￺しる￻された　￹物体￺ぶったい￻と\n￹特徴￺とくちょう￻が　￹一致￺いっち￻。"
        en:
          scarlet: "This Pokémon resembles an unknown object\ndescribed in a paranormal magazine as a UFO\nsent to observe humanity."
          violet: "No records exist of this species being caught.\nData is lacking, but the Pokémon’s traits match\nup with an object described in an old book."
        fr:
          scarlet: "Il ressemble à une entité étrange décrite dans une\nrevue sur les phénomènes paranormaux. D’après\ncelle-ci, ce serait un ovni qui épie la race humaine."
          violet: "Ses attributs correspondent à ceux d’une entité\névoquée dans un livre ancien. On manque de\ndonnées sur lui, car nul n’en a jamais attrapé."
        it:
          scarlet: "Ricorda molto un oscuro oggetto descritto\nin una rivista di paranormale come un ufo\ninviato qui per spiare le attività umane."
          violet: "Mancano dati su questo Pokémon, mai catturato\nin passato. Le sue caratteristiche coincidono con\nquelle di un oggetto descritto in un antico testo."
        de:
          scarlet: "Es ähnelt einem unbekannten Objekt, das einer\nesoterischen Zeitschrift nach ein zur Beobachtung\nder Menschheit entsandtes UFO sein soll."
          violet: "Da es noch nie gefangen wurde, ist die Datenlage\ndürftig. Seine Merkmale decken sich mit einem\nObjekt, das in einer alten Schrift erwähnt wurde."
        es:
          scarlet: "Se asemeja a un extraño objeto descrito en\nuna revista esotérica como \"un ovni enviado\ncon el objetivo de espiar a la raza humana\"."
          violet: "Nunca se había capturado uno, ergo los datos\nson escasos. Su descripción coincide con la de\nun objeto mencionado en unos viejos escritos."
        ko:
          scarlet: "인류를 감시하기 위한 UFO라며\n오컬트 잡지에서 소개된 적 있는\n미지의 물체와 닮았다."
          violet: "포획된 사례는 없으며 데이터도 부족하다.\n오래된 서적에 기록된 물체와\n특징이 일치한다."
        zh_simp:
          scarlet: "与超自然杂志中所介绍的\n监视人类的ＵＦＯ\n这种未知物体很相似。"
          violet: "没有捕获记录。资料不足。\n其特征与古老的书籍里\n所记载的物体一致。"
        zh_trad:
          scarlet: "與超自然雜誌裡以監視\n人類的ＵＦＯ來介紹的\n未知物體長得很相似。"
          violet: "無捕獲紀錄。資料不足。\n其特徵與古書裡\n所記載的物體一致。"
