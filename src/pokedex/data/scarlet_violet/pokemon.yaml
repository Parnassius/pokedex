        jp_kanji:
          scarlet: "￹強力￺きょうりょく￻な　あごで　￹噛￺か￻みつくと\nそのまま　￹思￺おも￻い￹切￺き￻り　￹体￺からだ￻を\nひねり　￹獲物￺えもの￻を　￹切断￺せつだん￻する。"
          violet: "￹砂嵐￺すなあらし￻でも　５０キロ￹先￺さき￻に　いる\n￹小￺ちい￻さな　￹獲物￺えもの￻も　￹発見￺はっけん￻する\n￹特殊￺とくしゅ￻な　￹両目￺りょうめ￻を　￹持￺も￻つ。"
        en:
          scarlet: "After clamping down with its powerful jaws, it\ntwists its body around to rip its prey in half."
          violet: "Its unique faculty of sight can detect small prey\nmore than 30 miles away, even in the midst of\na sandstorm."
        fr:
          scarlet: "Une fois qu’il a attrapé une proie avec ses\npuissantes mâchoires, il secoue son corps de\ntoutes ses forces pour la déchiqueter."
          violet: "Ses yeux perçants lui permettent de détecter\nune petite proie à 50 km, même au cœur\nd’une tempête de sable."
        it:
          scarlet: "Cattura la preda con le possenti mandibole\ne torce il proprio corpo con tutte le forze\nfino a tranciarla."
          violet: "I suoi occhi gli permettono di individuare\nprede minuscole a 50 km di distanza persino\nnelle tempeste di sabbia."
        de:
          scarlet: "Wenn es mit seinem mächtigen Kiefer zubeißt,\nzerteilt es seine Beute mit einer Drehung seines\nKörpers."
          violet: "Seine Augen sind so außergewöhnlich, dass es\nsogar in einem Sandsturm kleinste Beute aus\n50 km Entfernung entdecken kann."
        es:
          scarlet: "En cuanto le hinca el diente a su presa con sus\npotentes mandíbulas, retuerce el cuerpo con\nviolencia hasta despedazarla."
          violet: "Su vista es tan perspicaz que puede divisar\npresas de pequeño tamaño a 50 km de\ndistancia, incluso en plena tormenta de arena."
        ko:
          scarlet: "강력한 턱으로 물고\n그대로 힘껏 몸을 비틀어\n먹이를 절단한다."
          violet: "모래 폭풍 속에서도 50km 앞에 있는\n작은 먹이를 발견하는\n특수한 두 눈을 가졌다."
        zh_simp:
          scarlet: "用强力的颚咬住后，\n就这么拼命扭转身体，\n将猎物切断。"
          violet: "拥有特殊的双眼，\n即使在沙暴中也能发现\n前方５０公里处的小猎物。"
        zh_trad:
          scarlet: "用強力的顎咬住後，\n狠狠地扭動身體，\n將獵物切斷。"
          violet: "擁有特殊的雙眼，\n即使在沙暴中也能發現\n前方５０公里處的小獵物。"
