          violet: "くれないのミツを　￹吸￺す￻った　￹姿￺すがた￻。\n￹情熱的￺じょうねつてき￻な　ステップを　￹踏￺ふ￻み\n￹激￺はげ￻しい　￹炎￺ほのお￻を　￹巻￺ま￻き￹起￺お￻こす。"
        jp_kanji:
          scarlet: "￹情熱的￺じょうねつてき￻に　￹踊￺おど￻るさまが\nパルデアの　￹人々￺ひとびと￻の　￹気質￺きしつ￻に　￹合￺あ￻うのか\n￹非常￺ひじょう￻に　￹人気￺にんき￻だ。"
          violet: "くれないのミツを　￹吸￺す￻った　￹姿￺すがた￻。\n￹情熱的￺じょうねつてき￻な　ステップを　￹踏￺ふ￻み\n￹激￺はげ￻しい　￹炎￺ほのお￻を　￹巻￺ま￻き￹起￺お￻こす。"
        en:
          scarlet: "This Pokémon is incredibly popular, possibly\nbecause its passionate dancing is a great match\nwith the temperament of Paldean people."
          violet: "This form of Oricorio has sipped red nectar.\nIt whips up blazing flames as it moves to the\nsteps of its passionate dance."
        fr:
          scarlet: "Il est très populaire, sans doute car ses danses\npassionnées sont en parfait accord avec le\ntempérament des personnes qui vivent à Paldea."
          violet: "Cette forme est celle qui se nourrit de\nNectar Rouge. Ses pas de danse fougueux\ns’accompagnent souvent de torrents de flammes."
        it:
          scarlet: "È estremamente popolare tra gli abitanti di\nPaldea, forse perché il suo appassionato stile di\ndanza si accorda bene con il loro temperamento."
          violet: "Forma assunta da un Oricorio che si è nutrito\ndi Nettare rosso. Con i suoi ardenti passi di\ndanza crea impetuosi turbini fiammeggianti."
        de:
          scarlet: "Es ist in Paldea überaus beliebt, da sein feuriger\nTanzstil gut zum Temperament der Bewohner\nzu passen scheint."
          violet: "Dieses Choreogel hat Roten Nektar geschlürft.\nMit seinen feurigen Tanzschritten lässt es\nlodernde Flammen aufwirbeln."
        es:
          scarlet: "Es increíblemente popular, tal vez gracias a que\nsus apasionados bailes encajan a la perfección\ncon el carácter de los habitantes de Paldea."
          violet: "Forma que toma Oricorio al libar Néctar Rojo.\nSus pasos de baile cargados de pasión suelen ir\nacompañados de violentas llamaradas."
        ko:
          scarlet: "정열적으로 춤추는 모습이\n팔데아 사람들의 취향에 맞는지\n인기가 매우 좋다."
          violet: "다홍꿀을 빨아들인 모습.\n정열적인 스텝을 밟으며\n격렬한 불꽃을 일으킨다."
        zh_simp:
          scarlet: "热情的舞蹈与帕底亚\n人们的性情似乎很合得来，\n因此非常受欢迎。"
          violet: "吸食了朱红色花蜜的样子。\n会踩着热情的舞步，\n卷起猛烈的火焰。"
        zh_trad:
          scarlet: "熱情的舞姿似乎很符合\n帕底亞人們的性情，\n因此非常地受歡迎。"
          violet: "吸食了朱紅色花蜜的樣子。\n會踩著熱情的舞步，\n席捲起猛烈的火焰。"
