      hidden_ability: protean
      descriptions:
        jp_kana:
          scarlet: "フワフワの　￹体毛￺たいもう￻は　￹植物￺しょくぶつ￻に　￹近￺ちか￻い\n￹成分￺せいぶん￻。　こまめに　￹顔￺かお￻を　￹洗￺あら￻って\n￹乾燥￺かんそう￻を　￹防￺ふせ￻ぐ。"
          violet: "￹体￺からだ￻から　￹発￺はっ￻する　￹甘￺あま￻い￹香￺かお￻りで　まわりを\n￹魅了￺みりょう￻する。　￹日光￺にっこう￻に　￹当￺あ￻たると\n￹香￺かお￻りは　さらに￹強￺つよ￻まる。"
        jp_kanji:
          scarlet: "フワフワの　￹体毛￺たいもう￻は　￹植物￺しょくぶつ￻に　￹近￺ちか￻い\n￹成分￺せいぶん￻。　こまめに　￹顔￺かお￻を　￹洗￺あら￻って\n￹乾燥￺かんそう￻を　￹防￺ふせ￻ぐ。"
          violet: "￹体￺からだ￻から　￹発￺はっ￻する　￹甘￺あま￻い￹香￺かお￻りで　まわりを\n￹魅了￺みりょう￻する。　￹日光￺にっこう￻に　￹当￺あ￻たると\n￹香￺かお￻りは　さらに￹強￺つよ￻まる。"
        en:
          scarlet: "Its fluffy fur is similar in composition to plants.\nThis Pokémon frequently washes its face to keep\nit from drying out."
          violet: "The sweet scent its body gives off mesmerizes\nthose around it. The scent grows stronger when\nthis Pokémon is in the sun."
        fr:
          scarlet: "Ce Pokémon lave assidûment son visage pour\néviter qu’il ne s’assèche. La composition de son\npelage soyeux est proche de celle des plantes."
          violet: "Il dégage une odeur sucrée qui fascine les êtres\nalentour. Celle-ci est plus forte lorsqu’il est\nexposé au soleil."
        it:
          scarlet: "Il suo pelo vellutato ha una composizione simile\na quella delle piante. Si lava il muso di frequente\nper evitare che si disidrati."
          violet: "Il dolce profumo che emana dal corpo incanta\nchiunque si trovi nelle vicinanze e si intensifica\nquando il Pokémon si espone al sole."
        de:
          scarlet: "Die Zusammensetzung seines weichen Fells ähnelt\nder von Pflanzen. Es reinigt penibel sein Gesicht,\num zu verhindern, dass dieses austrocknet."
          violet: "Es verzaubert alle in seiner Umgebung mit dem\nsüßen Duft, der von ihm ausgeht. Dieser wird\ndurch Sonnenschein noch intensiver."
        es:
          scarlet: "Su sedoso pelaje se asemeja en composición\na las plantas. Se lava la cara con diligencia para\nque no se le seque."
          violet: "Su cuerpo desprende una dulce fragancia que\nembriaga a quien tiene a su alrededor. Esta se\nintensifica al exponerse a los rayos del sol."
        ko:
          scarlet: "복슬복슬한 털은 식물에 가까운 성분으로\n이루어져 있다. 수시로 세수를 하면서\n건조해지는 것을 방지한다."
          violet: "몸에서 나오는 달콤한 향기로\n주위를 매료시킨다.\n햇빛에 닿으면 향기가 더욱 강해진다."
        zh_simp:
          scarlet: "毛茸茸的体毛有着\n近似于植物的成分。\n会勤于洗脸以防止干燥。"
          violet: "通过身体发出的甜甜香气\n来让周围的一切为之倾倒。\n晒到阳光后香气会更加浓郁。"
        zh_trad:
          scarlet: "毛茸茸的體毛有著\n近似於植物的成分。\n會勤快地洗臉以防止乾燥。"
          violet: "會用身體發出甜甜香氣，\n讓周圍的一切為之傾倒。\n照到陽光後香氣會變得更濃郁。"
