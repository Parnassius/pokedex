        jp_kanji:
          scarlet: "￹首￺くび￻の　まわりから　￹出￺だ￻される\nスパイシーな　￹香￺かお￻りを　￹嗅￺か￻いでいると\nなぜだか　￹戦￺たたか￻いたくなる。"
          violet: "￹首￺くび￻の　まわりの　￹葉￺は￻っぱから\n￹漂￺ただよ￻う　￹香￺かお￻りを　かいだ　￹人￺ひと￻は\n￹体￺からだ￻に　￹力￺ちから￻が　みなぎってくる。"
        en:
          scarlet: "The spicy scent that wafts from around Bayleef’s\nneck somehow makes those who smell it want to\nfight."
          violet: "The scent that wafts from the leaves on its neck\ncauses anyone who smells it to become energetic."
        fr:
          scarlet: "L’odeur épicée que dégage son cou donne\nétrangement l’envie de se battre à quiconque\nla sent."
          violet: "Le parfum que dégagent les feuilles\nsur son cou donne du tonus\naux personnes qui le hument."
        it:
          scarlet: "Dal suo collo si spande un profumo di spezie\nche, per qualche motivo, spinge alla lotta chi\nlo avverte."
          violet: "Il profumo che emana dalle foglie sul collo\nriempie di energia le persone che lo avvertono."
        de:
          scarlet: "Der würzige Geruch, der von seinem Hals\nausgeht, regt beim Einatmen aus irgendeinem\nGrund den Kampfgeist an."
          violet: "Der Duft der Blätter um seinen Hals setzt bei\njedem, der ihn riecht, neue Energien frei."
        es:
          scarlet: "Su cuello desprende un aroma especiado que,\npor alguna razón, incita a combatir a quienes\nlo huelen."
          violet: "Las hojas que le adornan el cuello emiten un\naroma que resulta vigorizante para quien lo\nperciba."
        ko:
          scarlet: "목 주변에서 나는\n향긋한 향기를 맡으면\n왠지 싸우고 싶어진다."
          violet: "목 주변의 잎사귀에서 나는\n향기를 맡은 사람은\n몸에 힘이 넘쳐흐르게 된다."
        zh_simp:
          scarlet: "只要闻到从它脖子周围\n散发出的像香辛料一样的香味，\n不知为何就会想要对战。"
          violet: "从脖子周围的叶子\n散发出的香味会让\n闻到的人力量高涨。"
        zh_trad:
          scarlet: "聞著從牠脖子周圍\n散發出的香辛料般的香味，\n就會莫名其妙地想要戰鬥。"
          violet: "從脖子周圍的葉子\n散發出的香氣能讓\n聞到的人充滿力量。"
