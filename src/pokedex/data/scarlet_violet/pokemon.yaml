          violet: "とっても　くさい！\n￹体￺からだ￻の　￹成分￺せいぶん￻は　￹猛毒￺もうどく￻で　ベトベトンが\n￹通￺とお￻ると　どんな　￹草木￺くさき￻も　￹枯￺か￻れる。"
        jp_kanji:
          scarlet: "￹汚￺きたな￻い　ヘドロが　￹全身￺ぜんしん￻に\nまとわりつく。　￹足跡￺あしあと￻に\n￹触￺さわ￻っただけで　￹毒￺どく￻に　￹侵￺おか￻される。"
          violet: "とっても　くさい！\n￹体￺からだ￻の　￹成分￺せいぶん￻は　￹猛毒￺もうどく￻で　ベトベトンが\n￹通￺とお￻ると　どんな　￹草木￺くさき￻も　￹枯￺か￻れる。"
        en:
          scarlet: "It’s thickly covered with a filthy, vile\nsludge. It is so toxic, even its footprints\ncontain poison."
          violet: "It’s so stinky! Muk’s body contains toxic\nelements, and any plant will wilt when it\npasses by."
        fr:
          scarlet: "Ce Pokémon est recouvert d’une épaisse couche\nde boue crasseuse. Il est si toxique que même\nses traces de pas sont empoisonnées."
          violet: "Il dégage une odeur pestilentielle. Son corps\nest si toxique que là où il passe, la végétation\ntrépasse."
        it:
          scarlet: "Coperto di melma sudicia, è così\ntossico che persino le sue impronte\nsono velenose."
          violet: "Ha un odore estremamente sgradevole e il suo\ncorpo è un concentrato di veleni. Non c’è pianta\nche rimanga in vita dopo il suo passaggio."
        de:
          scarlet: "Der schmutzige Schleim dieses Pokémon ist\nextrem toxisch. Selbst die Spuren, die es\nhinterlässt, enthalten Gift."
          violet: "Sein Gestank ist unerträglich. Das starke\nGift, aus dem sein Körper besteht, macht\njeder Pflanze in seinem Weg den Garaus."
        es:
          scarlet: "Está cubierto por un repugnante lodo.\nEs tan tóxico que hasta su rastro es\nvenenoso."
          violet: "Es pestilente y los componentes tóxicos\nde su cuerpo hacen que, a su paso,\ncualquier planta se marchite."
        ko:
          scarlet: "더러운 오물이 온몸에 달라붙었다.\n지나간 자리를 건드리기만 해도\n독이 퍼져 버린다."
          violet: "냄새가 지독하다!\n몸의 성분은 맹독이며, 질뻐기가\n지나가면 어떤 초목이라도 시든다."
        zh_simp:
          scarlet: "全身上下沾满污泥。\n光是碰到它的足迹\n都会遭到毒素的侵袭。"
          violet: "奇臭无比！\n身体带有剧毒，只要是它\n所经之处，任何草木都会枯萎。"
        zh_trad:
          scarlet: "全身上下沾滿污泥。\n光是碰到牠的足跡，\n都會受到毒素的侵襲。"
          violet: "奇臭無比！\n身體帶有劇毒，舉凡所經\n之處，任何草木都會枯萎。"
