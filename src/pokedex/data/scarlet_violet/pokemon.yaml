      descriptions:
        jp_kana:
          scarlet: "￹子供￺こども￻の　￹持￺も￻つ　￹生体￺せいたい￻エネルギーが\n￹大好物￺だいこうぶつ￻。　￹真夜中￺まよなか￻　￹子供￺こども￻を\n￹探￺さが￻して　￹街中￺まちなか￻を　￹歩￺ある￻きまわる。"
          violet: "￹真￺ま￻っ￹赤￺か￻な　ひとつ￹目￺め￻で　￹睨￺にら￻みつけられ\n￹生体￺せいたい￻エネルギーを　￹吸￺す￻われるとき\nひどい　￹寒気￺さむけ￻に　￹襲￺おそ￻われる。"
        jp_kanji:
          scarlet: "￹子供￺こども￻の　￹持￺も￻つ　￹生体￺せいたい￻エネルギーが\n￹大好物￺だいこうぶつ￻。　￹真夜中￺まよなか￻　￹子供￺こども￻を\n￹探￺さが￻して　￹街中￺まちなか￻を　￹歩￺ある￻きまわる。"
          violet: "￹真￺ま￻っ￹赤￺か￻な　ひとつ￹目￺め￻で　￹睨￺にら￻みつけられ\n￹生体￺せいたい￻エネルギーを　￹吸￺す￻われるとき\nひどい　￹寒気￺さむけ￻に　￹襲￺おそ￻われる。"
        en:
          scarlet: "In the dead of night, these Pokémon wander\nthrough towns in search of children, whose\nvital energy is a Duskull’s favorite food."
          violet: "Duskull’s victims suffer an intense chill as the\nPokémon siphons their life-force away, glaring\nat them with its bright red eye all the while."
        fr:
          scarlet: "Il raffole de l’énergie vitale des enfants.\nLa nuit, il sillonne les villes à leur recherche."
          violet: "Il vole l’énergie vitale de ses victimes en les\nfixant de son unique œil rouge. Cela provoque\nde terribles frissons chez ces dernières."
        it:
          scarlet: "Adora l’energia vitale dei bambini, che\ncerca vagando per le città a notte fonda."
          violet: "Quando fissa il suo occhio rosso acceso\nsu una vittima e ne risucchia l’energia vitale,\nle provoca terribili brividi gelidi."
        de:
          scarlet: "In tiefster Nacht durchstreift es auf der Suche\nnach Kindern die Stadt. Ihre Lebensenergie ist\nseine Leibspeise."
          violet: "Fixiert es mit seinem feuerroten Auge ein Opfer,\nsaugt es ihm Lebensenergie aus und lässt einen\nschrecklichen Schauer über dessen Rücken laufen."
        es:
          scarlet: "Al caer la noche, ronda ciudades y pueblos\nen busca de niños, cuya energía vital adora."
          violet: "Cuando fija su ojo escarlata en una presa para\nabsorber su energía vital, le provoca escalofríos."
        ko:
          scarlet: "아이가 가진 생체 에너지를 즐겨 먹는다.\n한밤중에 아이를 찾아 마을을 배회한다."
          violet: "새빨간 외눈으로 노려보며\n생체 에너지를 빨아들이면\n어마어마한 한기에 휩싸이게 된다."
        zh_simp:
          scarlet: "最爱小孩的生物能量。\n会为了寻找孩子而在\n深夜的街上四处徘徊。"
          violet: "被它鲜红的独眼瞪着\n吸收生物能量时，\n就会受到恶寒侵袭。"
        zh_trad:
          scarlet: "小孩的生物能量是牠的最愛。\n會為了尋找小孩而在\n深夜的街上四處徘徊。"
          violet: "遭到牠鮮紅的獨眼瞪視\n並且被吸取生物能量時，\n會受到嚴重的寒氣侵襲。"
