      descriptions:
        jp_kana:
          scarlet: "￹陽気￺ようき￻な　リズムの　￹音波￺おんぱ￻を\n￹受￺う￻けると　エネルギーを　￹作￺つく￻りだす\n￹仕組￺しく￻みを　￹全身￺ぜんしん￻に　￹持￺も￻っている。"
          violet: "￹陽気￺ようき￻な　リズムで　￹踊￺おど￻っていると\n￹気分￺きぶん￻が　￹上￺あ￻がり　￹敵￺てき￻を　￹恐￺おそ￻れない\n￹精神￺せいしん￻　￹状態￺じょうたい￻に　なるのだ。"
        jp_kanji:
          scarlet: "￹陽気￺ようき￻な　リズムの　￹音波￺おんぱ￻を\n￹受￺う￻けると　エネルギーを　￹作￺つく￻りだす\n￹仕組￺しく￻みを　￹全身￺ぜんしん￻に　￹持￺も￻っている。"
          violet: "￹陽気￺ようき￻な　リズムで　￹踊￺おど￻っていると\n￹気分￺きぶん￻が　￹上￺あ￻がり　￹敵￺てき￻を　￹恐￺おそ￻れない\n￹精神￺せいしん￻　￹状態￺じょうたい￻に　なるのだ。"
        en:
          scarlet: "There are structures throughout its whole\nbody that produce energy when hit by\nsound waves with a cheerful rhythm."
          violet: "Dancing with an upbeat rhythm energizes\nand emboldens it, letting it face any foe\nwithout fear."
        fr:
          scarlet: "Lorsqu’il ressent les vibrations d’un rythme\nentraînant, son corps tout entier génère\nde l’énergie."
          violet: "Danser sur un rythme endiablé lui insuffle\nun tel dynamisme qu’il finit par ne plus\ncraindre aucun ennemi."
        it:
          scarlet: "Il suo corpo è dotato di un sistema che\ngenera energia quando vengono captate\nle onde acustiche di un ritmo festoso."
          violet: "Quando danza al ritmo di una musica\nfestosa, si esalta al punto da perdere\nogni paura del nemico."
        de:
          scarlet: "Sein gesamter Körper ist mit einem Mechanismus\nausgestattet, der Energie erzeugt, sobald es die\nSchallwellen eines fröhlichen Rhythmus empfängt."
          violet: "Tanzt es zu fröhlichen Rhythmen, steigt\nseine Stimmung und jegliche Angst vor\nseinen Feinden verfliegt."
        es:
          scarlet: "Todo su cuerpo cuenta con la capacidad\nde producir energía al percibir ondas\nsonoras de música alegre."
          violet: "Cuando baila al son de un ritmo alegre,\nsu humor mejora y entra en un estado\nmental en el que no teme a ningún enemigo."
        ko:
          scarlet: "경쾌한 리듬의 음파를 받으면\n에너지를 만들어 내는 능력을\n온몸에 갖추고 있다."
          violet: "경쾌한 리듬으로 춤을 추다 보면\n기분이 고조되어 적을 두려워하지 않는\n정신 상태가 된다."
        zh_simp:
          scarlet: "全身都有着接收到\n节奏欢快的音波\n便能制作出能量的结构。"
          violet: "以欢快的节奏跳起舞来，\n就能让情绪高昂，变成\n无惧敌人的精神状态。"
        zh_trad:
          scarlet: "全身都有著獨特的結構，\n讓牠一接收歡樂節奏的\n音波就會製造出能量。"
          violet: "只要跳著節奏歡樂的舞蹈，\n情緒就會高昂起來，變成\n毫不畏敵的精神狀態。"
