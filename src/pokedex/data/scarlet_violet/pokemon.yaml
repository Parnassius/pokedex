      descriptions:
        jp_kana:
          scarlet: "￹獲物￺えもの￻の　￹痕跡￺こんせき￻を　￹見￺み￻つけると\n￹日￺ひ￻が　￹落￺お￻ちるまで　その￹場￺ば￻に　￹留￺とど￻まり\n￹忍耐強￺にんたいづよ￻く　￹張￺は￻り￹込￺こ￻み￹続￺つづ￻ける。"
          violet: "￹獲物￺えもの￻の　￹跡￺あと￻を　￹執念深￺しゅうねんぶか￻く\n￹追￺お￻うのが　￹得意￺とくい￻だが　ホシガリスは\n￹単純￺たんじゅん￻で　￹物足￺ものた￻りないらしい。"
        jp_kanji:
          scarlet: "￹獲物￺えもの￻の　￹痕跡￺こんせき￻を　￹見￺み￻つけると\n￹日￺ひ￻が　￹落￺お￻ちるまで　その￹場￺ば￻に　￹留￺とど￻まり\n￹忍耐強￺にんたいづよ￻く　￹張￺は￻り￹込￺こ￻み￹続￺つづ￻ける。"
          violet: "￹獲物￺えもの￻の　￹跡￺あと￻を　￹執念深￺しゅうねんぶか￻く\n￹追￺お￻うのが　￹得意￺とくい￻だが　ホシガリスは\n￹単純￺たんじゅん￻で　￹物足￺ものた￻りないらしい。"
        en:
          scarlet: "Once it finds signs of prey, it will patiently stake\nout the location, waiting until the sun goes down."
          violet: "Gumshoos specializes in relentlessly tracking\ndown prey. The simple-minded Skwovet doesn’t\nseem to provide Gumshoos enough challenge."
        fr:
          scarlet: "Lorsqu’il détecte les traces d’une proie, il attend\npatiemment à cet endroit et surveille les environs\njusqu’au coucher du soleil."
          violet: "Il est passé maître dans l’art de suivre la trace\nde ses proies, mais il n’a aucun plaisir à traquer\nles Rongourmand, qui sont trop insouciants."
        it:
          scarlet: "Appena trova una traccia della sua preda, si\napposta pazientemente fino al calar del sole."
          violet: "È un investigatore ostinato, ma non prova alcun\npiacere nell’inseguire Skwovet, poiché le sue\ntracce sono sin troppo semplici da scovare."
        de:
          scarlet: "Findet Manguspektor Spuren potenzieller Beute,\nlegt es sich geduldig auf die Lauer und verharrt\nbis Sonnenuntergang am selben Ort."
          violet: "Spuren potenzieller Beute beharrlich zu folgen,\nist seine Spezialität. Es jagt aber ungern Raffel,\nda sie ihm keine Herausforderung bieten."
        es:
          scarlet: "Cuando detecta el rastro de una presa,\nse aposta pacientemente en ese lugar y\npermanece al acecho hasta que cae el sol."
          violet: "Es experto en seguir meticulosamente el rastro\nque dejan sus presas, pero los Skwovet son tan\nsimplones que no le suponen reto alguno."
        ko:
          scarlet: "먹잇감의 흔적을 발견하면\n해가 떨어질 때까지 그 자리에 머물며\n끈질기게 잠복한다."
          violet: "먹잇감의 흔적을 집요하게 쫓는 것이\n특기지만, 탐리스는 너무 단순해서\n마음에 들어 하지 않는 것 같다."
        zh_simp:
          scarlet: "只要发现猎物的踪迹，\n就会充满耐心地蹲守\n在该地点直到日落。"
          violet: "擅长专心致志地追寻猎物的足迹。\n然而它似乎觉得个性单纯的\n贪心栗鼠追起来不够过瘾。"
        zh_trad:
          scarlet: "一旦發現獵物的蹤跡，\n就會發揮十足的耐心\n蹲守在該處直到日落。"
          violet: "擅長追著獵物的足跡不放。\n然而牠似乎覺得個性單純的\n貪心栗鼠追起來不夠過癮。"
