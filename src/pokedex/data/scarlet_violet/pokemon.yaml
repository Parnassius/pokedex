      egg_groups:
        - field
      abilities:
        - keen_eye
        - infiltrator
      hidden_ability: competitive
      descriptions:
        jp_kana:
          scarlet: "オスよりも　￹攻撃的￺こうげきてき￻。\nどれだけ　￹強力￺きょうりょく￻な　サイコパワーを\n￹使￺つか￻っても　￹無表情￺むひょうじょう￻の　まま。"
          violet: "￹危険￺きけん￻を　￹感￺かん￻じると　サイコパワーを\n￹最大出力￺さいだいしゅつりょく￻で　￹放射￺ほうしゃ￻。\n￹相手￺あいて￻のことなど　￹気￺き￻にしていない。"
        jp_kanji:
          scarlet: "オスよりも　￹攻撃的￺こうげきてき￻。\nどれだけ　￹強力￺きょうりょく￻な　サイコパワーを\n￹使￺つか￻っても　￹無表情￺むひょうじょう￻の　まま。"
          violet: "￹危険￺きけん￻を　￹感￺かん￻じると　サイコパワーを\n￹最大出力￺さいだいしゅつりょく￻で　￹放射￺ほうしゃ￻。\n￹相手￺あいて￻のことなど　￹気￺き￻にしていない。"
        en:
          scarlet: "Female Meowstic are more aggressive than\nmales. Their expression remains blank even\nwhile they’re wielding immense psychic power."
          violet: "When they sense danger, they exert their psychic\npower at its maximum output. They have no\nregard for their opponents."
        fr:
          scarlet: "Les femelles sont plus agressives que les mâles.\nElles restent impassibles, quelle que soit la force\ndes pouvoirs psychiques qu’elles déchaînent."
          violet: "Quand ce Pokémon se sent menacé, il déchaîne\nla totalité de ses pouvoirs psychiques sans\naucune considération pour son adversaire."
        it:
          scarlet: "È più aggressiva del maschio. Per quanto potenti\nsiano i poteri psichici che usa, rimane comunque\ninespressiva."
          violet: "Quando avverte un pericolo, sprigiona il suo\npotere psichico alla massima potenza senza\ncurarsi di chi ha davanti."
        de:
          scarlet: "Weibliche Psiaugon sind aggressiver als\nmännliche. Ihr Gesicht bleibt ausdruckslos, selbst\nwenn sie enorme Psycho-Kräfte einsetzen."
          violet: "Wenn es Gefahr wittert, setzt es die maximale\nLadung seiner Psycho-Kräfte frei. Auf Gegner\nnimmt es keine Rücksicht."
        es:
          scarlet: "Las hembras son más agresivas que los machos.\nPese a la potencia de los poderes psíquicos que\nutilizan, su expresión permanece impasible."
          violet: "Cuando una hembra se siente amenazada, libera\nal máximo su poder psíquico, sin importarle\nlas consecuencias."
        ko:
          scarlet: "수컷보다 더 공격적이다.\n강력한 사이코 파워를 사용할 때에도\n계속 무표정을 유지한다."
          violet: "위험을 감지하면 사이코 파워를\n최대 출력으로 방출한다.\n상대가 어떻게 되든 신경 쓰지 않는다."
        zh_simp:
          scarlet: "性格要比雄性更具攻击性。\n无论使出多强的精神力量，\n它都会保持面无表情。"
          violet: "一旦察觉到危险就会\n以最大输出释放精神力量。\n它可不会在意对手的事情。"
        zh_trad:
          scarlet: "性格比雄性更具攻擊性。\n不論使出多麼強的精神力量，\n都仍是面無表情。"
          violet: "一旦感知到危險，\n就會釋放最高強度的精神力量。\n絲毫都不會去顧慮對手的事。"
