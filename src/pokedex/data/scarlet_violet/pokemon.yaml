          scarlet: "エスパーエネルギーを　￹混￺ま￻ぜこみながら\n￹土￺つち￻と　￹砂￺すな￻で　￹泥玉￺どろだま￻を　￹作￺つく￻る。\n￹泥玉￺どろだま￻は　￹命￺いのち￻より　￹大切￺たいせつ￻。"
          violet: "￹泥玉￺どろだま￻を　￹転￺ころ￻がしながら\n￹進化￺しんか￻の　エネルギーを　￹熟成￺じゅくせい￻させる。\nやがて　￹進化￺しんか￻のときを　￹迎￺むか￻える。"
        jp_kanji:
          scarlet: "エスパーエネルギーを　￹混￺ま￻ぜこみながら\n￹土￺つち￻と　￹砂￺すな￻で　￹泥玉￺どろだま￻を　￹作￺つく￻る。\n￹泥玉￺どろだま￻は　￹命￺いのち￻より　￹大切￺たいせつ￻。"
          violet: "￹泥玉￺どろだま￻を　￹転￺ころ￻がしながら\n￹進化￺しんか￻の　エネルギーを　￹熟成￺じゅくせい￻させる。\nやがて　￹進化￺しんか￻のときを　￹迎￺むか￻える。"
        en:
          scarlet: "This Pokémon creates a mud ball by mixing\nsand and dirt with psychic energy. It treasures\nits mud ball more than its own life."
          violet: "It rolls its mud ball around while the energy it\nneeds for evolution matures. Eventually the\ntime comes for it to evolve."
        fr:
          scarlet: "Il confectionne une boule de boue en mélangeant\nde la terre, du sable et de l’énergie de type Psy.\nÀ ses yeux, elle importe plus que sa propre vie."
          violet: "Il fait rouler sa boule de boue jusqu’à ce qu’il\nait accumulé l’énergie nécessaire à son évolution."
        it:
          scarlet: "Mischiando energia Psico a terra e sabbia crea\nuna palla di fango che considera più preziosa\ndella sua stessa vita."
          violet: "Rotola una palla di fango per accumulare\nl’energia necessaria alla sua evoluzione.\nQuando i tempi sono maturi, si evolve."
        de:
          scarlet: "Es vermischt Erde und Sand mit Psycho-Kräften,\num eine Schlammkugel zu formen. Diese schätzt\nes mehr als sein eigenes Leben."
          violet: "Relluk wälzt seine Schlammkugel umher,\nwährend es die Energie für seine anstehende\nEntwicklung heranreifen lässt."
        es:
          scarlet: "Mezcla tierra, arena y energía psíquica para\ncrear una bola de barro que atesora por\nencima de su propia vida."
          violet: "Hace rodar la bola de barro para madurar\nenergía hasta que alcanza el grado necesario\npara su evolución."
        ko:
          scarlet: "에스퍼 에너지를 섞어서\n흙과 모래로 진흙구슬을 만든다.\n진흙구슬을 목숨보다 소중히 여긴다."
          violet: "진흙구슬을 굴리면서\n진화를 위한 에너지를 숙성시킨다.\n이윽고 진화의 때를 맞이하게 된다."
        zh_simp:
          scarlet: "将超能力混进泥土\n和沙子里制作泥球。\n泥球比自己的命还重要。"
          violet: "会一边滚着泥巴球，\n一边让进化所需的能量成熟。\n最终迎接进化的时刻。"
        zh_trad:
          scarlet: "會將超能力混進泥土\n和沙子裡製作出泥球。\n泥球比自己的命還重要。"
          violet: "會一邊滾著泥巴球，\n一邊使進化的能量成熟。\n最終會迎接進化的時刻。"
