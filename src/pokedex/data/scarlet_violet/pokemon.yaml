      descriptions:
        jp_kana:
          scarlet: "ほかの　￹生￺い￻き￹物￺もの￻の　ポジティブな\n￹感情￺かんじょう￻を　ツノで　キャッチして\n￹自分￺じぶん￻の　エネルギーにしているぞ。"
          violet: "つねに　トレーナーの　そばに　いる。\nサイコパワーで　￹行動￺こうどう￻を　￹予知￺よち￻して\n￹身￺み￻のまわりの　￹世話￺せわ￻をする。"
        jp_kanji:
          scarlet: "ほかの　￹生￺い￻き￹物￺もの￻の　ポジティブな\n￹感情￺かんじょう￻を　ツノで　キャッチして\n￹自分￺じぶん￻の　エネルギーにしているぞ。"
          violet: "つねに　トレーナーの　そばに　いる。\nサイコパワーで　￹行動￺こうどう￻を　￹予知￺よち￻して\n￹身￺み￻のまわりの　￹世話￺せわ￻をする。"
        en:
          scarlet: "This Pokémon picks up on the positive emotions\nof other creatures via its horns and uses those\nemotions to fuel itself."
          violet: "This Pokémon never leaves its Trainer’s side.\nIt predicts their actions with its psychic power\nand takes care of their day-to-day needs."
        fr:
          scarlet: "Il capte les émotions positives des autres êtres\nvivants grâce à ses cornes et s’en nourrit."
          violet: "Wimessir reste toujours près de son Dresseur.\nGrâce à ses pouvoirs psychiques, il peut prédire\nses actions et ainsi prendre soin de lui."
        it:
          scarlet: "Con le corna percepisce le emozioni positive\ndegli esseri viventi e le usa come fonte\ndi energia."
          violet: "Resta sempre al fianco del proprio Allenatore.\nUsa i poteri psichici per prevederne le azioni\ne per prendersene cura."
        de:
          scarlet: "Mit den Hörnern auf seinem Kopf erfasst es\npositive Gefühle anderer Lebewesen und\ngewinnt daraus Energie für sich."
          violet: "Es hält sich stets an der Seite seines Trainers auf\nund nutzt Psycho-Kräfte, um dessen Handlungen\nzu erahnen und sich um ihn kümmern zu können."
        es:
          scarlet: "Percibe con los cuernos los sentimientos positivos\nde otros seres vivos y los utiliza como energía."
          violet: "Siempre permanece junto a su Entrenador.\nUsa sus poderes psíquicos para predecir su\nconducta y atiende todas sus necesidades."
        ko:
          scarlet: "다른 생명체의 긍정적인 감정을\n뿔을 통해 감지하여\n자신의 에너지로 삼는다."
          violet: "항상 트레이너의 곁에 있다.\n사이코 파워로 행동을 예지하여\n일상적인 일에 도움을 준다."
        zh_simp:
          scarlet: "会用角来接收其他生物的\n正面情绪，然后将其\n转换为自身的能量。"
          violet: "时时刻刻都待在训练家身边。\n它会用精神力量来预知训练家的\n行动，并照顾其日常起居。"
        zh_trad:
          scarlet: "會用角接收其他生物的\n正面情緒，然後轉換成\n自身的能量。"
          violet: "時時刻刻都待在訓練家身邊。\n牠會以精神力量預知訓練家\n的行動，以照料其日常起居。"
