          scarlet: "１００トンの　￹積雪￺せきせつ￻を　￹操￺あやつ￻る。\n￹雪崩￺なだれ￻を　￹起￺お￻こして　その￹中￺なか￻を\n￹出入￺ではい￻りして　￹無邪気￺むじゃき￻に　￹遊￺あそ￻ぶ。"
          violet: "￹大昔￺おおむかし￻に　￹剣￺つるぎ￻によって　￹露￺つゆ￻と￹消￺き￻えた\n￹者￺もの￻たちの　￹憎￺にく￻しみが\n￹雪￺ゆき￻を　まとい　ポケモンになった。"
        jp_kanji:
          scarlet: "１００トンの　￹積雪￺せきせつ￻を　￹操￺あやつ￻る。\n￹雪崩￺なだれ￻を　￹起￺お￻こして　その￹中￺なか￻を\n￹出入￺ではい￻りして　￹無邪気￺むじゃき￻に　￹遊￺あそ￻ぶ。"
          violet: "￹大昔￺おおむかし￻に　￹剣￺つるぎ￻によって　￹露￺つゆ￻と￹消￺き￻えた\n￹者￺もの￻たちの　￹憎￺にく￻しみが\n￹雪￺ゆき￻を　まとい　ポケモンになった。"
        en:
          scarlet: "This Pokémon can control 100 tons of\nfallen snow. It plays around innocently by\nleaping in and out of avalanches it has caused."
          violet: "The hatred of those who perished by the\nsword long ago has clad itself in snow\nand become a Pokémon."
        fr:
          scarlet: "Ce Pokémon peut contrôler 100 tonnes\nde neige tombée. Il s’amuse en sautant\njoyeusement dans les avalanches qu’il provoque."
          violet: "La haine de personnes ayant jadis\nsuccombé au fil de l’épée s’est mêlée\nà de la neige et a pris vie."
        it:
          scarlet: "Può controllare ammassi di neve pesanti anche\ncento tonnellate. Gioca spensierato saltando\nin mezzo alle valanghe che lui stesso causa."
          violet: "Prese vita quando l’odio degli antichi che\nperirono a causa della spada si ammantò\ndi neve."
        de:
          scarlet: "Baojian kann bis zu 100 t Schnee\nkontrollieren. In den Lawinen, die es\nauslöst, tollt es ganz arglos herum."
          violet: "Der Hass derjenigen, die vor langer Zeit\ndurch das Schwert umkamen, hüllte sich in\nSchnee und wurde zu diesem Pokémon."
        es:
          scarlet: "Controla a su voluntad masas de nieve de\nhasta cien toneladas. Se divierte zambulléndose\ny saltando felizmente en los aludes que provoca."
          violet: "Este Pokémon nació al imbuirse en las nieves\nel odio que sentían aquellos que perecieron\nante la espada en tiempos inmemoriales."
        ko:
          scarlet: "100t의 눈을 조종한다.\n눈사태를 일으키고는\n그 안을 드나들며 천진난만하게 논다."
          violet: "먼 옛날, 검에 의해\n이슬이 되어 사라진 자들의 증오가\n눈을 두르고 포켓몬이 되었다."
        zh_simp:
          scarlet: "会操控１００吨的积雪。\n在自己引起的雪崩中\n自由进出，天真无邪地玩耍。"
          violet: "很久以前，丧命于剑下者的\n憎恨之情缠绕在雪上，\n变成了宝可梦。"
        zh_trad:
          scarlet: "能操控１００噸的積雪。\n會自由進出在自己引起的\n雪崩裡，天真無邪地玩耍。"
          violet: "遙遠過去喪命於劍下者\n的憎恨之情纏繞在雪上，\n變成了寶可夢。"
