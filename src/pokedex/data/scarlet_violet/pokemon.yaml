          scarlet: "キバは　￹折￺お￻れると　￹生￺は￻えてこないので\nここぞというとき　￹以外￺いがい￻は\n￹使￺つか￻わないように　しているらしい。"
          violet: "￹太￺ふと￻い　キバを　￹使￺つか￻って　￹獲物￺えもの￻を\nきれいに　￹捌￺さば￻いて　￹食￺た￻べるものと\n￹保存￺ほぞん￻する　ものに　￹分￺わ￻けるのだ。"
        jp_kanji:
          scarlet: "キバは　￹折￺お￻れると　￹生￺は￻えてこないので\nここぞというとき　￹以外￺いがい￻は\n￹使￺つか￻わないように　しているらしい。"
          violet: "￹太￺ふと￻い　キバを　￹使￺つか￻って　￹獲物￺えもの￻を\nきれいに　￹捌￺さば￻いて　￹食￺た￻べるものと\n￹保存￺ほぞん￻する　ものに　￹分￺わ￻けるのだ。"
        en:
          scarlet: "Because its tusks don’t grow back once they\nbreak, this Pokémon apparently won’t use them\nunless truly necessary."
          violet: "Fraxure uses its thick tusks to neatly cut prey into\ntwo portions—one to eat now and one to save\nfor later."
        fr:
          scarlet: "Comme ses crocs ne repoussent pas une fois\ncassés, on dit qu’il ne s’en sert qu’en cas\nd’extrême nécessité."
          violet: "Il utilise ses crocs imposants pour découper\nminutieusement ses proies, et prépare des\nportions à consommer et d’autres à conserver."
        it:
          scarlet: "Dato che le sue zanne non ricrescono se si\nspezzano, cerca di usarle soltanto nei momenti\ncruciali."
          violet: "Usa le grosse zanne per tranciare la preda con\nprecisione e suddividerla in parti da mangiare\nsubito e parti da conservare."
        de:
          scarlet: "Da seine Stoßzähne nicht mehr nachwachsen,\nwenn sie abbrechen, setzt es sie anscheinend\nnur im Falle absoluter Notwendigkeit ein."
          violet: "Mit seinen dicken Stoßzähnen zerteilt es seine\nBeute säuberlich. Einen Teil frisst es sofort,\nden Rest hebt es sich für später auf."
        es:
          scarlet: "Al parecer, procura usar los colmillos únicamente\nen caso de extrema necesidad, ya que no le\nvuelven a crecer si se rompen."
          violet: "Emplea los gruesos colmillos para despedazar a\nsus presas en porciones: algunas para su consumo\ninmediato y otras destinadas a su conservación."
        ko:
          scarlet: "어금니는 부러지면\n다시 자라지 않기 때문에\n결정적인 순간에만 사용한다고 한다."
          violet: "굵은 어금니를 사용해\n먹이를 깔끔하게 손질하여\n먹을 것과 보관할 것을 나눈다."
        zh_simp:
          scarlet: "牙齿一旦折断就不会再次生长。\n因此除了关键时刻之外，\n它都会避免使用牙齿。"
          violet: "会使用粗壮的牙齿利落地\n分解猎物，然后把当下\n要吃的份和存粮的份分开。"
        zh_trad:
          scarlet: "牙齒一旦折斷就不會再次生長，\n因此除非是關鍵時刻，\n牠都會避免使用牙齒。"
          violet: "會使用粗壯的牙齒俐落地\n分解獵物，然後把當下\n要吃的份與存糧的份分開。"
