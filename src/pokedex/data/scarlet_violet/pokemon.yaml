        jp_kanji:
          scarlet: "￹体￺からだ￻を　￹大￺おお￻きく　￹振￺ふ￻り￹動￺うご￻かし\n￹燃￺も￻え￹上￺あ￻がる　￹背中￺せなか￻から　￹石炭￺せきたん￻を\nあたりに　ばら￹撒￺ま￻いて　￹威嚇￺いかく￻する。"
          violet: "￹温厚￺おんこう￻な　￹気質￺きしつ￻だが　￹怒￺おこ￻ると　￹怖￺こわ￻い。\n１５００￹度￺ど￻の　￹燃￺も￻えあがる　￹体￺からだ￻で\nのしかかり　￹焼￺や￻きつくす。"
        en:
          scarlet: "To intimidate its opponents, Coalossal will\nvigorously shake its body, scattering coal from\nits smoldering back."
          violet: "It’s gentle usually but fearsome when angered.\nWith a body that burns at over 2,700 degrees\nFahrenheit, it crushes foes and turns them to ash."
        fr:
          scarlet: "Il balance vigoureusement son corps, ce qui\nlui permet de disséminer le charbon brûlant\nde son dos et d’intimider ses adversaires."
          violet: "Il est de nature paisible, mais ses colères sont\neffroyables. Il écrase ses adversaires de tout\nson corps, qui brûle à 1 500 °C, et les consume."
        it:
          scarlet: "Intimidisce gli avversari agitandosi\nvigorosamente per spargere tutt’intorno\ni carboni ardenti che porta sulle spalle."
          violet: "È d’indole mite, ma quando perde le staffe è\ndavvero temibile. Ustiona i nemici colpendoli\ncon il suo corpo che brucia a 1.500 ºC."
        de:
          scarlet: "Es schüttelt seinen Körper kräftig und verstreut\nso ringsum die Steinkohle von seinem lodernden\nRücken, um andere einzuschüchtern."
          violet: "Verärgert man dieses sanftmütige Pokémon, wird\nes rasend und stürzt sich mit seinem 1500 ℃\nheißen Körper auf Gegner, um sie zu verbrennen."
        es:
          scarlet: "Intimida a sus adversarios con sus exagerados\nmovimientos que esparcen a su alrededor el\ncarbón de su ardiente espalda."
          violet: "Es de disposición amable, pero resulta temible\nsi se enfada. Aplasta a sus adversarios con su\ncuerpo, que arde a 1500 ºC, y los calcina."
        ko:
          scarlet: "몸을 크게 휘둘러서\n타오르는 등에 있는 석탄을\n주위에 흩뿌리며 위협한다."
          violet: "성질은 온화하나 화가 나면 무섭다.\n1500도의 타오르는 몸으로\n압박한 다음 불태워 버린다."
        zh_simp:
          scarlet: "大幅晃动身体，让煤炭\n从它那熊熊燃烧的背上\n向四周喷洒，以此来威吓对手。"
          violet: "性情温厚，发怒时却十分可怕。\n它会用燃烧到１５００度的躯体\n压住对手，将其烧成灰烬。"
        zh_trad:
          scarlet: "會大幅晃動身體，好讓自己\n可以從熊熊燃燒的背部\n往四處噴灑煤炭來威嚇對手。"
          violet: "性情溫馴，發怒時卻十分可怕。\n牠會用燃燒到１５００度的軀體\n壓住對手，將其燒得只剩灰燼。"
