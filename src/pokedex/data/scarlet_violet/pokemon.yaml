        jp_kanji:
          scarlet: "￹群￺む￻れが　￹襲￺おそ￻われたときは\n￹電撃￺でんげき￻を　￹駆使￺くし￻した　￹格闘技￺かくとうぎ￻で\n￹真￺ま￻っ￹先￺さき￻に　￹戦￺たたか￻いを　￹挑￺いど￻み　￹敵￺てき￻を　￹倒￺たお￻す。"
          violet: "￹手￺て￻のひらで　￹打撃￺だげき￻を　￹加￺くわ￻えつつ\n￹肉球￺にくきゅう￻で　￹電撃￺でんげき￻を　￹浴￺あ￻びせる\n￹独特￺どくとく￻の　￹格闘技￺かくとうわざ￻を　￹使￺つか￻う。"
        en:
          scarlet: "When its group is attacked, Pawmo is the first\nto leap into battle, defeating enemies with a\nfighting technique that utilizes electric shocks."
          violet: "Pawmo uses a unique fighting technique in which\nit uses its forepaws to strike foes and zap them\nwith electricity from its paw pads simultaneously."
        fr:
          scarlet: "Quand on attaque son groupe, ce Pokémon est\nle premier à riposter. Il défait ses adversaires\navec un art martial qui repose sur l’électricité."
          violet: "Son style de combat unique consiste à frapper\nses adversaires avec ses paumes, tout en les\nélectrocutant avec ses coussinets."
        it:
          scarlet: "Quando il branco viene attaccato, lotta in prima\nfila contro il nemico per atterrarlo con tecniche\nmarziali che rilasciano scariche elettriche."
          violet: "Utilizza una tecnica speciale di lotta corpo a\ncorpo: colpisce il nemico con le zampe anteriori\nrilasciando al contempo elettricità dai cuscinetti."
        de:
          scarlet: "Wird seine Kolonie angegriffen, stürzt es sich\nsofort in den Kampf und besiegt den Feind mit\nKampftechniken, die auf Elektroschocks setzen."
          violet: "Es nutzt eine besondere Kampftechnik, bei der es\nmit den Vorderpfoten zuschlägt und zeitgleich\nElektroschocks aus den Pfotenballen schießt."
        es:
          scarlet: "Cuando su manada se ve amenazada, atacan a la\nvanguardia usando un arte marcial caracterizado\npor el empleo de descargas eléctricas."
          violet: "Usa un arte marcial caracterizado por emplear\nlas patas delanteras para asestar golpes y liberar\ndescargas eléctricas al mismo tiempo."
        ko:
          scarlet: "무리가 공격을 받으면\n전격을 날리는 격투기로\n먼저 싸움을 걸고 적을 쓰러뜨린다."
          violet: "손바닥으로 타격하면서\n볼록살을 통해 전격을 가한다.\n독특한 격투기를 구사한다."
        zh_simp:
          scarlet: "当群体受到袭击的时候，\n会率先挑起战斗，并活用\n电击的格斗招式打倒敌人。"
          violet: "使用的格斗技非常独特。\n会一边用手掌给予打击，\n一边用肉球释放电击。"
        zh_trad:
          scarlet: "當群體受到襲擊的時候，\n會率先挑起戰鬥，以結合了\n電擊的格鬥技撂倒敵人。"
          violet: "使用的格鬥技非常獨特，\n會一邊用手掌給予打擊，\n並一邊用肉球施放電擊。"
