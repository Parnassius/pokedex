      descriptions:
        jp_kana:
          scarlet: "ポポッコの　マニアは　￹頭￺あたま￻の\n￹花￺はな￻から　￹漂￺ただよ￻う　￹香￺かお￻りで\nどこで　￹生￺う￻まれたか　わかるらしい。"
          violet: "￹寒￺さむ￻くなると　￹花￺はな￻が　￹閉￺と￻じてしまう。\n￹光合成￺こうごうせい￻が　できなくなるので\n￹暖￺あたた￻かい　￹地域￺ちいき￻に　￹飛￺と￻んでいく。"
        jp_kanji:
          scarlet: "ポポッコの　マニアは　￹頭￺あたま￻の\n￹花￺はな￻から　￹漂￺ただよ￻う　￹香￺かお￻りで\nどこで　￹生￺う￻まれたか　わかるらしい。"
          violet: "￹寒￺さむ￻くなると　￹花￺はな￻が　￹閉￺と￻じてしまう。\n￹光合成￺こうごうせい￻が　できなくなるので\n￹暖￺あたた￻かい　￹地域￺ちいき￻に　￹飛￺と￻んでいく。"
        en:
          scarlet: "Skiploom enthusiasts can apparently tell where a\nSkiploom was born by the scent drifting from the\nflower on the Pokémon’s head."
          violet: "When the weather grows cold, Skiploom’s flower\ncloses and the Pokémon cannot photosynthesize,\nso it flies away to warmer regions."
        fr:
          scarlet: "On dit que les personnes passionnées de Floravol\npeuvent déterminer son lieu de naissance rien\nqu’à l’odeur de la fleur sur sa tête."
          violet: "À l’arrivée du froid, sa fleur se referme et il\ndevient incapable d’effectuer la photosynthèse.\nIl s’envole alors vers des contrées plus chaudes."
        it:
          scarlet: "Gli appassionati di questo Pokémon sanno\nriconoscerne il luogo di nascita dal profumo\nche emana il fiore sulla sua testa."
          violet: "Con il freddo il suo fiore si chiude e il processo\ndi fotosintesi si interrompe. Quando ciò accade,\nvola via verso regioni più calde."
        de:
          scarlet: "Bewunderer dieses Pokémon erkennen offenbar\nam Duft, den die Blüte auf seinem Kopf\nverströmt, wo ein Exemplar geboren wurde."
          violet: "Bei Kälte schließt sich seine Blüte, wodurch es\nkeine Fotosynthese mehr betreiben kann.\nGeschieht dies, so fliegt es in wärmere Gefilde."
        es:
          scarlet: "Al parecer, los admiradores de este Pokémon son\ncapaces de determinar su lugar de nacimiento\npor el aroma que desprende la flor de su cabeza."
          violet: "Su flor se cierra al descender las temperaturas,\nlo que le impide realizar la fotosíntesis. Cuando\nesto ocurre, migra a tierras más cálidas."
        ko:
          scarlet: "두코 마니아들은\n머리에 달린 꽃에서 나는 향기로\n어디서 태어났는지를 알 수 있다고 한다."
          violet: "추워지면 꽃이 닫힌다.\n광합성을 할 수 없게 되기 때문에\n따뜻한 지역으로 날아가 버린다."
        zh_simp:
          scarlet: "据说热爱毽子花的人能够\n通过它头上花朵散发的香味\n猜出它在哪里出生的。"
          violet: "一旦天气变冷就会关上花瓣。\n由此就无法进行光合作用了，\n所以会飞到温暖的地区去。"
        zh_trad:
          scarlet: "據說熱愛毽子花的人能夠\n透過牠頭上的花散發的香味，\n猜出牠是在哪裡出生的。"
          violet: "天氣一變冷就會闔上花瓣。\n由於無法進行光合作用，\n因此會飛到溫暖的地區去。"
