        jp_kana:
          scarlet: "￹鋭￺するど￻い　￹鳴￺な￻き￹声￺ごえ￻を　あげて\n￹集中力￺しゅうちゅうりょく￻を　￹高￺たか￻める。\n￹足技￺あしわざ￻は　￹破壊力￺はかいりょく￻　￹抜群￺ばつぐん￻。"
          violet: "￹戦￺たたか￻いに　なると　￹体内￺たいない￻の　￹炎￺ほのお￻が\n￹激￺はげ￻しく　￹燃￺も￻え￹上￺あ￻がる。\nキックは　￹破壊力￺はかいりょく￻　￹抜群￺ばつぐん￻だ。"
        jp_kanji:
          scarlet: "￹鋭￺するど￻い　￹鳴￺な￻き￹声￺ごえ￻を　あげて\n￹集中力￺しゅうちゅうりょく￻を　￹高￺たか￻める。\n￹足技￺あしわざ￻は　￹破壊力￺はかいりょく￻　￹抜群￺ばつぐん￻。"
          violet: "￹戦￺たたか￻いに　なると　￹体内￺たいない￻の　￹炎￺ほのお￻が\n￹激￺はげ￻しく　￹燃￺も￻え￹上￺あ￻がる。\nキックは　￹破壊力￺はかいりょく￻　￹抜群￺ばつぐん￻だ。"
        en:
          scarlet: "It boosts its concentration by emitting harsh cries.\nIts kicks have outstanding destructive power."
          violet: "When it enters battle, the flame inside its body\nburns stronger. Its kicks have outstanding\ndestructive power."
        fr:
          scarlet: "Pour mieux se concentrer, ce Pokémon émet\ndes cris stridents. Ses coups de pied sont\nparticulièrement dévastateurs."
          violet: "Quand il se bat, les flammes dans son corps\nse mettent à brûler ardemment. Ses coups\nde pied sont dévastateurs."
        it:
          scarlet: "Emette grida stridule per concentrarsi. Sferra\ncalci dalla straordinaria potenza distruttiva."
          violet: "Quando deve lottare, il suo fuoco interiore\nbrucia intensamente. Sferra calci dalla notevole\npotenza distruttiva."
        de:
          scarlet: "Es steigert seine Konzentration, indem es schrille\nSchreie ausstößt. Seine Tritte besitzen eine\naußergewöhnliche Zerstörungskraft."
          violet: "Im Kampf lodert das Feuer in seinem Körper auf.\nSeine Tritte besitzen eine außergewöhnliche\nZerstörungskraft."
        es:
          scarlet: "Propina unas patadas demoledoras. Profiere\npotentes gritos para aguzar su concentración."
          violet: "Al combatir, el fuego de su interior se intensifica.\nEs capaz de propinar unas patadas demoledoras."
        ko:
          scarlet: "날카로운 울음소리를 내서\n집중력을 높인다.\n발 기술은 뛰어난 파괴력을 자랑한다."
          violet: "싸우게 되면 체내의\n불꽃이 세차게 타오른다.\n킥은 파괴력이 굉장하다."
        zh_simp:
          scarlet: "会发出尖锐的叫声\n来提高注意力。\n腿技的破坏力超群。"
          violet: "战斗时体内的火焰便会熊熊燃烧。\n腿技极具破坏力。"
        zh_trad:
          scarlet: "會發出尖銳的叫聲\n來提高集中力。\n腿技極具破壞力。"
          violet: "戰鬥時體內的火焰會熊熊燃燒。\n踢腿極具破壞力。"
