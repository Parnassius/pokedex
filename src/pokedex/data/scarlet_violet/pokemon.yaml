          scarlet: "￹電気￺でんき￻を　￹蓄￺たくわ￻えすぎた　￹結果￺けっか￻\n￹体￺からだ￻の　￹表面￺ひょうめん￻に　￹産毛￺うぶげ￻すら\n￹生￺は￻えない　￹部分￺ぶぶん￻が　できてしまった。"
          violet: "￹電気￺でんき￻を　￹通￺とお￻さない　￹地肌￺じはだ￻は\nゴムのように　つるつるだが\n￹体毛￺たいもう￻は　￹電気￺でんき￻を　￹溜￺た￻めやすい。"
        jp_kanji:
          scarlet: "￹電気￺でんき￻を　￹蓄￺たくわ￻えすぎた　￹結果￺けっか￻\n￹体￺からだ￻の　￹表面￺ひょうめん￻に　￹産毛￺うぶげ￻すら\n￹生￺は￻えない　￹部分￺ぶぶん￻が　できてしまった。"
          violet: "￹電気￺でんき￻を　￹通￺とお￻さない　￹地肌￺じはだ￻は\nゴムのように　つるつるだが\n￹体毛￺たいもう￻は　￹電気￺でんき￻を　￹溜￺た￻めやすい。"
        en:
          scarlet: "As a result of storing too much electricity,\nit developed patches where even downy\nwool won’t grow."
          violet: "Because of its rubbery, electricity-resistant skin,\nit can store lots of electricity in its fur."
        fr:
          scarlet: "Il a emmagasiné tellement d’électricité que\nsa laine ne peut plus repousser à certains\nendroits de son corps."
          violet: "Bien que sa peau soit isolante et lisse\ncomme du caoutchouc, sa laine peut\nfacilement emmagasiner de l’électricité."
        it:
          scarlet: "Ha immagazzinato così tanta elettricità\nche su intere parti del corpo non cresce\nneppure la lanugine."
          violet: "La sua pelle è gommosa e isolante, ma il suo\nvello può immagazzinare moltissima elettricità."
        de:
          scarlet: "Es hat so viel Elektrizität gespeichert, dass an\nmanchen Stellen seines Körpers keinerlei Wolle\nwachsen kann."
          violet: "Die gummiartige Haut von Waaty leitet keinen\nStrom, aber seine Wolle kann viel Elektrizität\nspeichern."
        es:
          scarlet: "Como almacena tanta electricidad, en algunas\npartes de su cuerpo no le crece ni la lana."
          violet: "Como su piel es gomosa y aislante, puede\nalmacenar mucha electricidad en su pelaje\nsin problema."
        ko:
          scarlet: "전기를 너무 많이 모은 결과\n몸의 표면에 솜털조차\n자라지 않는 부분이 생겼다."
          violet: "전기가 통하지 않는 맨살은\n고무처럼 매끈하지만\n털은 전기를 모으기 쉽다."
        zh_simp:
          scarlet: "由于储存了过多电力，\n造成它身体表面有些部分\n连绒毛都长不出来了。"
          violet: "如同橡胶般光滑的\n肌肤虽不导电，\n但体毛却很容易蓄电。"
        zh_trad:
          scarlet: "儲存了過多電力的結果，\n造成牠身體表面有些部分\n連胎毛都長不出來。"
          violet: "如同橡膠般光滑\n的皮膚雖不導電，\n但體毛卻很容易蓄電。"
