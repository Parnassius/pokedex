      descriptions:
        jp_kana:
          scarlet: "￹頭￺あたま￻の　￹実￺み￻から　オイルを　￹出￺だ￻して\n￹敵￺てき￻から　￹身￺み￻を　￹守￺まも￻る。　オイルは\nとびあがるほど　￹苦￺にが￻くて　￹渋￺しぶ￻い。"
          violet: "￹栄養￺えいよう￻を　オイルにして　￹頭￺あたま￻の\n￹実￺み￻に　￹蓄￺たくわ￻える。　￹飲￺の￻まず￹食￺く￻わずでも\n１￹週間￺しゅうかん￻は　へっちゃら。"
        jp_kanji:
          scarlet: "￹頭￺あたま￻の　￹実￺み￻から　オイルを　￹出￺だ￻して\n￹敵￺てき￻から　￹身￺み￻を　￹守￺まも￻る。　オイルは\nとびあがるほど　￹苦￺にが￻くて　￹渋￺しぶ￻い。"
          violet: "￹栄養￺えいよう￻を　オイルにして　￹頭￺あたま￻の\n￹実￺み￻に　￹蓄￺たくわ￻える。　￹飲￺の￻まず￹食￺く￻わずでも\n１￹週間￺しゅうかん￻は　へっちゃら。"
        en:
          scarlet: "It protects itself from enemies by emitting oil\nfrom the fruit on its head. This oil is bitter and\nastringent enough to make someone flinch."
          violet: "This Pokémon converts nutrients into oil, which it\nstores in the fruit on its head. It can easily go a\nwhole week without eating or drinking."
        fr:
          scarlet: "Le fruit qui surmonte sa tête sécrète une huile\nqui le protège de ses adversaires. Ce liquide\na un goût si désagréable qu’il fait grimacer."
          violet: "Ce Pokémon convertit les nutriments en huile qu’il\nemmagasine dans le fruit qui surmonte sa tête.\nIl peut passer une semaine sans boire ni manger."
        it:
          scarlet: "Si protegge dai nemici secernendo un olio\ndal gusto incredibilmente amaro e allappante\ndal frutto che ha sulla testa."
          violet: "Trasforma in olio ciò di cui si nutre e lo conserva\nnel frutto sulla testa. Può facilmente resistere\nsenza bere né mangiare per una settimana intera."
        de:
          scarlet: "Um sich vor Feinden zu schützen, sondert es aus\nder Frucht auf seinem Kopf Öl ab. Dieses ist so\nbitter, dass es einen zusammenzucken lässt."
          violet: "Olini wandelt Nährstoffe in Öl um, welches es in\nder Frucht auf seinem Kopf speichert. Es kommt\nmühelos eine Woche ohne Essen und Trinken aus."
        es:
          scarlet: "Se defiende de sus rivales segregando por el\nfruto de su cabeza un aceite tan amargo y agrio\nque cualquiera daría un respingo al probarlo."
          violet: "Convierte los nutrientes de su dieta en aceite,\nque almacena en el fruto de la cabeza. Puede\npasar una semana sin beber ni comer nada."
        ko:
          scarlet: "머리의 열매에서 오일을 나오게 해서\n적으로부터 몸을 지킨다.\n오일은 펄쩍 뛸 만큼 떫고 쓰다."
          violet: "영양분을 오일로 바꿔서 머리의 열매에\n비축한다. 아무것도 먹거나 마시지 않아도\n일주일은 끄떡없다."
        zh_simp:
          scarlet: "从头上的果实喷出油，\n以此保护自己不受敌人攻击。\n那种油苦涩到能让人跳起来。"
          violet: "会把营养转换成油，\n并储存在头部的果实里。\n１个星期不吃不喝也无所谓。"
        zh_trad:
          scarlet: "會從頭上的果實噴出油\n來保護自己不受敵人攻擊。\n油的味道苦澀到會讓人跳起來。"
          violet: "會把營養轉換成油，\n儲存在頭部的果實裡。\n１個星期不吃不喝也無所謂。"
