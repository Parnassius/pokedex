      descriptions:
        jp_kana:
          scarlet: "９￹本￺ほん￻の　￹尻尾￺しっぽ￻には　それぞれ\n￹違￺ちが￻う　￹神秘的￺しんぴてき￻な　￹力￺ちから￻が\n￹秘￺ひ￻められている　という　￹話￺はなし￻だ。"
          violet: "￹黄金￺おうごん￻に　￹輝￺かがや￻く　￹体毛￺たいもう￻と\n９￹本￺ほん￻の　￹長￺なが￻い　￹尻尾￺しっぽ￻を　￹持￺も￻つ。\n１０００￹年￺ねん￻は　￹生￺い￻きると　￹言￺い￻われる。"
        jp_kanji:
          scarlet: "９￹本￺ほん￻の　￹尻尾￺しっぽ￻には　それぞれ\n￹違￺ちが￻う　￹神秘的￺しんぴてき￻な　￹力￺ちから￻が\n￹秘￺ひ￻められている　という　￹話￺はなし￻だ。"
          violet: "￹黄金￺おうごん￻に　￹輝￺かがや￻く　￹体毛￺たいもう￻と\n９￹本￺ほん￻の　￹長￺なが￻い　￹尻尾￺しっぽ￻を　￹持￺も￻つ。\n１０００￹年￺ねん￻は　￹生￺い￻きると　￹言￺い￻われる。"
        en:
          scarlet: "Some legends claim that each of its nine tails has\nits own unique type of special mystical power."
          violet: "It has nine long tails and fur that gleams gold.\nIt is said to live for 1,000 years."
        fr:
          scarlet: "Selon la légende, chacune de ses neuf queues\nposséderait un pouvoir magique unique."
          violet: "Il a neuf longues queues et une fourrure\nqui brille comme de l’or. On dit qu’il peut\nvivre 1 000 ans."
        it:
          scarlet: "Narra la leggenda che ognuna delle sue nove\ncode abbia uno specifico potere magico."
          violet: "Dotato di nove code e di una pelliccia dai riflessi\ndorati, si dice che viva 1.000 anni."
        de:
          scarlet: "Eine Legende besagt, dass jedem seiner neun\nSchweife eine einzigartige mystische Kraft\ninnewohnt."
          violet: "Es hat neun lange Schweife und sein Fell glänzt\ngülden. Man sagt, es soll mindestens 1000 Jahre\nlang leben."
        es:
          scarlet: "Cuentan algunas leyendas que cada una de\nsus nueve colas posee su propio y único poder\nsobrenatural."
          violet: "Tiene nueve largas colas y un pelaje con un\nbrillo dorado. Dicen que este Pokémon llega\na vivir mil años."
        ko:
          scarlet: "9개의 꼬리에는 각각\n다른 신비한 힘이\n숨어 있다고 한다."
          violet: "황금빛으로 빛나는 털과\n9개의 긴 꼬리를 지녔다.\n1000년을 산다고 한다."
        zh_simp:
          scarlet: "据传它的９条尾巴里\n各蕴藏着不同的神秘力量。"
          violet: "拥有金光灿灿的体毛\n以及９条长长的尾巴。\n据说它可以活上１０００年。"
        zh_trad:
          scarlet: "傳聞牠的９根尾巴，\n每一根都蘊藏著\n不同的神秘力量。"
          violet: "擁有金光閃閃的體毛\n以及９根長長的尾巴。\n據說壽命長達１０００年。"
