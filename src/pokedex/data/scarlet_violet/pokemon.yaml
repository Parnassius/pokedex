          violet: "￹空中￺くうちゅう￻に　￹浮￺う￻いたまま　￹移動￺いどう￻して\n￹左右￺さゆう￻の　ユニットから\n￹電磁波￺でんじは￻などを　￹放射￺ほうしゃ￻する。"
        jp_kanji:
          scarlet: "￹左右￺さゆう￻にある　ユニットから　だす\n￹電磁波￺でんじは￻で　￹重力￺じゅうりょく￻を\nさえぎって　￹空￺そら￻に　￹浮￺う￻かぶのだ。"
          violet: "￹空中￺くうちゅう￻に　￹浮￺う￻いたまま　￹移動￺いどう￻して\n￹左右￺さゆう￻の　ユニットから\n￹電磁波￺でんじは￻などを　￹放射￺ほうしゃ￻する。"
        en:
          scarlet: "The electromagnetic waves emitted by the units\nat the sides of its head expel antigravity, which\nallows it to float."
          violet: "It moves while constantly hovering. It discharges\nelectromagnetic waves and so on from the units\nat its sides."
        fr:
          scarlet: "Les ondes électromagnétiques émises\npar ses extrémités lui permettent de défier\nles lois de la gravité et de flotter."
          violet: "Ce Pokémon se déplace en flottant dans les airs.\nLes aimants situés sur ses côtés peuvent envoyer\ndes décharges électriques."
        it:
          scarlet: "Le onde elettromagnetiche generate dagli\nelementi laterali neutralizzano la gravità\npermettendogli di levitare a mezz’aria."
          violet: "Si sposta fluttuando nell’aria. Si serve\ndegli elementi laterali per emettere\nonde elettromagnetiche e simili."
        de:
          scarlet: "Die seitlichen Module halten es in der Luft,\nindem sie mit elektromagnetischen Wellen\ndie Schwerkraft überlisten."
          violet: "Es bewegt sich schwebend. Seine Magnete\nan den Seiten senden unter anderem\nelektromagnetische Wellen aus."
        es:
          scarlet: "Las unidades laterales crean ondas\nelectromagnéticas que contrarrestan la gravedad\ny le permiten flotar."
          violet: "Se desplaza flotando por el aire mientras emite\nondas electromagnéticas y similares a través de\nlas unidades laterales."
        ko:
          scarlet: "좌우에 있는 유닛에서 나오는\n전자파를 이용해\n중력을 거슬러 하늘에 떠 있다."
          violet: "공중에 뜬 채로 이동하며\n좌우의 유닛에서\n전자파를 방사한다."
        zh_simp:
          scarlet: "用左右的组件放出的\n电磁波来屏蔽重力，\n使自己浮在空中。"
          violet: "会浮在空中移动，\n并从左右的组件里\n发射电磁波什么的。"
        zh_trad:
          scarlet: "從左右兩邊的組件\n發出的電磁波能阻礙重力，\n使牠浮在空中。"
          violet: "會浮在空中移動，\n從左右兩邊的組件發射\n電磁波之類的東西。"
