      descriptions:
        jp_kana:
          scarlet: "エサを　￹消化￺しょうか￻するときに　￹電気￺でんき￻を\n￹生￺う￻みだす。　５￹本￺ほん￻の　￹硬￺かた￻い　￹歯￺は￻で\n￹海藻￺かいそう￻を　こそぎ￹落￺お￻とし　￹食￺た￻べる。"
          violet: "￹藻屑￺もくず￻が　￹触￺さわ￻っただけで　￹驚￺おどろ￻き\n￹放電￺ほうでん￻してしまうほど　￹臆病￺おくびょう￻。\n￹唇￺くちびる￻は　￹電気￺でんき￻を　￹通￺とお￻さない。"
        jp_kanji:
          scarlet: "エサを　￹消化￺しょうか￻するときに　￹電気￺でんき￻を\n￹生￺う￻みだす。　５￹本￺ほん￻の　￹硬￺かた￻い　￹歯￺は￻で\n￹海藻￺かいそう￻を　こそぎ￹落￺お￻とし　￹食￺た￻べる。"
          violet: "￹藻屑￺もくず￻が　￹触￺さわ￻っただけで　￹驚￺おどろ￻き\n￹放電￺ほうでん￻してしまうほど　￹臆病￺おくびょう￻。\n￹唇￺くちびる￻は　￹電気￺でんき￻を　￹通￺とお￻さない。"
        en:
          scarlet: "This Pokémon generates electricity when it\ndigests food. It uses its five hard teeth to scrape\nseaweed off surfaces and eat it."
          violet: "This Pokémon is so timid that even brushing\nagainst seaweed will make it discharge electricity\nin surprise. Its lips do not conduct electricity."
        fr:
          scarlet: "Il génère de l’électricité lorsqu’il digère. À l’aide\nde ses cinq dents très solides, il racle les algues\ndes rochers puis les mange."
          violet: "Il est si peureux que s’il effleure des algues,\ncela le surprend et il libère une décharge.\nSes lèvres ne conduisent pas l’électricité."
        it:
          scarlet: "Mentre digerisce il cibo, genera elettricità.\nUsa i cinque durissimi denti per raschiare via\ndalle cose le alghe di cui si nutre."
          violet: "È talmente fifone che gli basta sfiorare un’alga\nper emettere scariche elettriche dallo spavento.\nLe sue labbra non conducono elettricità."
        de:
          scarlet: "Bei der Verdauung erzeugt es Elektrizität.\nMit seinen fünf harten Zähnen schabt es Algen\nvon Oberflächen ab und frisst sie."
          violet: "Es ist so furchtsam, dass es schon durch die bloße\nBerührung mit einer Alge vor Schreck Strom\nentlädt. Seine Lippen leiten keine Elektrizität."
        es:
          scarlet: "Produce electricidad al digerir los alimentos.\nRaspa las algas de las rocas con los cinco duros\ndientes que tiene para comérselas."
          violet: "Es tan cobarde que le basta con rozar un alga a\nla deriva para asustarse y liberar descargas. Sus\nlabios no conducen la electricidad."
        ko:
          scarlet: "먹이를 소화시킬 때 전기를 만들어 낸다.\n5개의 단단한 이빨로\n해초를 갉아 먹는다."
          violet: "해초가 닿기만 해도 놀라서\n방전해 버릴 정도로 겁쟁이다.\n입술은 전기가 통하지 않는다."
        zh_simp:
          scarlet: "消化食物时会制造电力。\n５颗坚硬的牙齿能把\n海藻连根拔起来吃。"
          violet: "性情胆小，光是碰到碎藻\n就能让它吓到放电。\n嘴唇不会导电。"
        zh_trad:
          scarlet: "消化食物時會製造出電力。\n５顆堅硬的牙齒能用來\n把海藻連根拔起來吃。"
          violet: "生性膽小，光是碰到海藻屑\n就足以讓牠嚇得放電。\n嘴唇不會導電。"
