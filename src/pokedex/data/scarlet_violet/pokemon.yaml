        jp_kana:
          scarlet: "￹軽￺かろ￻やかな　ダンスが　￹健康維持￺けんこういじ￻に\n￹効果的￺こうかてき￻と　￹人気￺にんき￻の　スタイルだが\nパルデアでは　あまり　￹見￺み￻かけない。"
          violet: "うすもものミツを　￹吸￺す￻った　￹姿￺すがた￻。\n￹緩￺ゆる￻やかな　ステップで　￹精神￺せいしん￻を\n￹高￺たか￻め　サイコパワーを　￹放￺はな￻つ。"
        jp_kanji:
          scarlet: "￹軽￺かろ￻やかな　ダンスが　￹健康維持￺けんこういじ￻に\n￹効果的￺こうかてき￻と　￹人気￺にんき￻の　スタイルだが\nパルデアでは　あまり　￹見￺み￻かけない。"
          violet: "うすもものミツを　￹吸￺す￻った　￹姿￺すがた￻。\n￹緩￺ゆる￻やかな　ステップで　￹精神￺せいしん￻を\n￹高￺たか￻め　サイコパワーを　￹放￺はな￻つ。"
        en:
          scarlet: "The airy dance of these Oricorio is popular as\na means of maintaining good health, but the\nOricorio themselves are hard to find in Paldea."
          violet: "This form of Oricorio has sipped pink nectar.\nIt elevates its mind with the gentle steps of its\ndance, then unleashes its psychic energy."
        fr:
          scarlet: "Ils doivent leur popularité à leur danse légère,\nidéale pour garder la forme. Toutefois, on en\ntrouve rarement à Paldea."
          violet: "Ce Plumeline a bu du Nectar Rose. Il se concentre\nen effectuant de légers pas de danse, puis il libère\nson énergie psychique."
        it:
          scarlet: "A Paldea non si vede quasi mai. Pare che la sua\ndanza leggiadra sia efficace per stare in forma,\nperciò questo stile ha molto seguito."
          violet: "Forma di un Oricorio che si è nutrito di Nettare\nrosa. Aumenta le sue energie mentali con placidi\npassi di danza e poi scatena i suoi poteri psichici."
        de:
          scarlet: "Da der geschmeidige Tanzstil dieses Pokémon\ndie Gesundheit fördert, ist es zwar beliebt,\ndoch in Paldea trifft man es kaum an."
          violet: "Dieses Choreogel hat Rosa Nektar geschlürft.\nMit eleganten Tanzschritten erhöht es seine\nPsycho-Kräfte, ehe es diese freisetzt."
        es:
          scarlet: "Su delicada danza es beneficiosa para la salud y,\npor ello, goza de gran popularidad. Sin embargo,\nes un Pokémon difícil de encontrar en Paldea."
          violet: "Forma que toma Oricorio al libar Néctar Rosa.\nEmplea la energía psíquica que obtiene al centrar\nsu mente con delicados pasos de baile."
        ko:
          scarlet: "경쾌한 댄스가 건강을 유지하는 데\n효과적이란 소문 덕에 인기 있는 스타일이나\n팔데아에서는 보기 드문 편이다."
          violet: "연분홍꿀을 빨아들인 모습.\n사뿐한 스텝으로 정신력을 높여서\n사이코 파워를 방출한다."
        zh_simp:
          scarlet: "轻快的舞蹈有助于保持健康，\n也因此很受人们欢迎，\n但在帕底亚却很少见。"
          violet: "吸食了桃粉色花蜜的样子。\n会踏着缓慢的舞步来集中精神，\n然后释放精神力量。"
        zh_trad:
          scarlet: "這個風格的舞蹈輕快活潑，\n有助維持健康，相當受歡迎，\n但在帕底亞卻很少見。"
          violet: "吸食了桃粉色花蜜的樣子。\n會緩緩地踏著舞步來集中精神，\n然後釋放出精神力量。"
