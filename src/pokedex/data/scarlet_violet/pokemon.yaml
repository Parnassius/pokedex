          violet: "ふわふわの　￹体毛￺たいもう￻が　バッテリー。\n￹電気自動車￺でんきじどうしゃ￻と　￹同￺おな￻じ　￹量￺りょう￻の\n￹電気￺でんき￻を　￹蓄￺たくわ￻えることができる。"
