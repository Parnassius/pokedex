          violet: "￹花壇￺かだん￻を　￹荒￺あ￻らす　ものを　￹見￺み￻つけると\n￹容赦￺ようしゃ￻なく　￹攻撃￺こうげき￻する。　とくに\n￹白￺しろ￻い　￹花￺はな￻を　￹大事￺だいじ￻にしている。"
        jp_kanji:
          scarlet: "￹白￺しろ￻い￹花￺はな￻を　￹好￺この￻む　フラエッテは\nほかの　￹色￺いろ￻の　￹花￺はな￻とも　￹上手￺じょうず￻に\n￹波長￺はちょう￻を　￹合￺あ￻わせることができる。"
          violet: "￹花壇￺かだん￻を　￹荒￺あ￻らす　ものを　￹見￺み￻つけると\n￹容赦￺ようしゃ￻なく　￹攻撃￺こうげき￻する。　とくに\n￹白￺しろ￻い　￹花￺はな￻を　￹大事￺だいじ￻にしている。"
        en:
          scarlet: "Floette that are fond of white flowers can also\neasily sync with flowers of other colors."
          violet: "If it finds someone messing up a flower bed,\nit will attack them without mercy. This Floette\ntakes particularly good care of white flowers."
        fr:
          scarlet: "Les Floette qui aiment les fleurs blanches\npeuvent également se synchroniser avec\ndes fleurs d’autres couleurs."
          violet: "Ce Pokémon attaquera sans pitié quiconque s’en\nprend à un parterre de fleurs. Il chérit les fleurs\nblanches plus que tout."
        it:
          scarlet: "I Floette che prediligono i fiori bianchi riescono\na entrare facilmente in sintonia anche con fiori\ndi colori diversi."
          violet: "Se trova qualcuno intento a deturpare le aiuole,\nlo attacca senza pietà. Ha a cuore i fiori bianchi\nin particolare."
        de:
          scarlet: "Floette, die weiße Blumen bevorzugen,\nkönnen sich auch mit der Farbwellenlänge\nvon andersfarbigen Blumen synchronisieren."
          violet: "Wenn es sieht, wie jemand ein Blumenbeet\nverwüstet, greift es diesen erbarmungslos an.\nWeiße Blumen liegen ihm besonders am Herzen."
        es:
          scarlet: "Los ejemplares que prefieren las flores blancas\nson capaces de entrar en sintonía fácilmente con\nlas flores de otros colores."
          violet: "Cuando ve a alguien maltratando las flores de un\nparterre, ataca sin piedad alguna. Siente especial\ndevoción por las flores blancas."
        ko:
          scarlet: "하얀 꽃을 좋아하는 플라엣테는\n다른 색의 꽃과도\n능숙하게 파장을 맞출 수 있다."
          violet: "화단을 어지럽히는 자를 발견하면\n자비 없이 공격한다.\n하얀 꽃을 특히 소중히 여긴다."
        zh_simp:
          scarlet: "喜欢白花的花叶蒂\n也很擅长与其他\n颜色的花搭配。"
          violet: "如果发现有谁破坏了花坛，\n就会毫不留情地发动攻击。\n非常珍惜白花。"
        zh_trad:
          scarlet: "喜歡白花的花葉蒂\n與其他顏色的花結合波長時，\n也能有不錯的契合度。"
          violet: "如果發現有誰破壞了花壇，\n就會毫不留情地發動攻擊。\n非常珍惜白花。"
