      descriptions:
        jp_kana:
          scarlet: "あるアスリートが　￹改造￺かいぞう￻された\n￹姿￺すがた￻だと　オカルト￹雑誌￺ざっし￻が\nスクープした　サイボーグに　￹近￺ちか￻い。"
          violet: "ある￹探検記￺たんけんき￻に　￹記￺しる￻された\nテツノカイナという　￹物体￺ぶったい￻と\n￹似￺に￻た￹点￺てん￻が　￹多￺おお￻い　ポケモン。"
        jp_kanji:
          scarlet: "あるアスリートが　￹改造￺かいぞう￻された\n￹姿￺すがた￻だと　オカルト￹雑誌￺ざっし￻が\nスクープした　サイボーグに　￹近￺ちか￻い。"
          violet: "ある￹探検記￺たんけんき￻に　￹記￺しる￻された\nテツノカイナという　￹物体￺ぶったい￻と\n￹似￺に￻た￹点￺てん￻が　￹多￺おお￻い　ポケモン。"
        en:
          scarlet: "It is very similar to a cyborg covered exclusively\nby a paranormal magazine. The cyborg was said\nto be the modified form of a certain athlete."
          violet: "This Pokémon shares many similarities\nwith Iron Hands, an object mentioned in\na certain expedition journal."
        fr:
          scarlet: "Il ressemble à l’athlète transformé en cyborg\ndont l’histoire avait été révélée en exclusivité\ndans une revue sur les phénomènes paranormaux."
          violet: "Ce Pokémon présente de nombreuses similitudes\navec une entité nommée « Paume-de-Fer »,\nqui figure dans un certain récit d’exploration."
        it:
          scarlet: "Il suo aspetto è simile a quello di un atleta che,\nstando allo scoop di una rivista di paranormale,\nsarebbe stato trasformato in un cyborg."
          violet: "Ha molti aspetti in comune con\nManoferrea, un oggetto menzionato\nin un certo diario di viaggio."
        de:
          scarlet: "Es ähnelt stark einem Cyborg, der laut einer\nSonderausgabe einer esoterischen Zeitschrift\ndie modifizierte Form eines gewissen Athleten ist."
          violet: "Dieses Pokémon weist viele Ähnlichkeiten mit\neinem Objekt namens Eisenhand auf, das in einem\ngewissen Expeditionsbericht erwähnt wurde."
        es:
          scarlet: "Guarda parecido con un atleta, supuestamente\ntransformado en cíborg, que apareció\nentre las exclusivas de una revista esotérica."
          violet: "Este Pokémon comparte muchas\ncaracterísticas con Ferropalmas,\nun objeto descrito en cierto diario."
        ko:
          scarlet: "어떤 운동선수를 개조한 모습이라며\n오컬트 잡지에서 대서특필했던\n사이보그와 닮았다."
          violet: "어느 탐험기에 기록된\n“무쇠손”이라는 물체와\n닮은 점이 많은 포켓몬."
        zh_simp:
          scarlet: "与超自然杂志曾独家报道过的\n某运动员被改造成\n机械生化人的样子很相似。"
          violet: "这种宝可梦与某本探险记中\n记载的一种叫做铁臂膀的物体\n有许多相似之处。"
        zh_trad:
          scarlet: "長相近似於超自然雜誌\n以頭條來報導的某運動選手\n被改造成生化人後的樣子。"
          violet: "與某本探險記裡記載的一種\n叫做鐵臂膀的物體\n有許多相似處的寶可夢。"
