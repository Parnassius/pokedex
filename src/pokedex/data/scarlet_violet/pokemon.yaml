          violet: "￹危険￺きけん￻を　￹感￺かん￻じると　￹全身￺ぜんしん￻を\n￹覆￺おお￻う　￹粘液￺ねんえき￻の　￹濃度￺のうど￻が　￹上￺あ￻がり\nなんでも　￹溶￺と￻かすようになるのだ。"
        jp_kanji:
          scarlet: "￹背中￺せなか￻の　￹渦巻￺うずま￻き￹状￺じょう￻の　￹突起￺とっき￻に\n￹脳￺のう￻や　￹心臓￺しんぞう￻など　￹大事￺だいじ￻な\n￹器官￺きかん￻が　すべて　￹詰￺つ￻まっている。"
          violet: "￹危険￺きけん￻を　￹感￺かん￻じると　￹全身￺ぜんしん￻を\n￹覆￺おお￻う　￹粘液￺ねんえき￻の　￹濃度￺のうど￻が　￹上￺あ￻がり\nなんでも　￹溶￺と￻かすようになるのだ。"
        en:
          scarlet: "The swirly protrusion on its back is filled with all\nits vital organs, such as its brain and heart."
          violet: "When Sliggoo senses danger, the mucus coating\nits entire body becomes more concentrated—\nit’ll dissolve anything."
        fr:
          scarlet: "Ses organes vitaux, comme son cerveau et son\ncœur, se trouvent dans sa protubérance dorsale\nen forme de spirale."
          violet: "Lorsqu’il ressent un danger, la couche de mucus\nqui le recouvre s’épaissit et fait fondre tout\nce qu’il touche."
        it:
          scarlet: "I suoi organi vitali, come ad esempio il cuore e\nil cervello, sono tutti racchiusi nella protuberanza\na spirale che ha sulla schiena."
          violet: "Quando Sliggoo avverte il pericolo, la membrana\nche ricopre il suo corpo diventa molto più densa\ne può sciogliere qualsiasi cosa."
        de:
          scarlet: "Der spiralförmige Fortsatz auf seinem Rücken\nbeherbergt sein Herz und Gehirn sowie alle\nanderen wichtigen Organe."
          violet: "Wittert Viscargot Gefahr, verdickt sich die\nSchleimschicht, die seinen Körper bedeckt.\nSo kann sie alles zersetzen."
        es:
          scarlet: "La protuberancia en forma de espiral que tiene\nen el lomo contiene su cerebro y su corazón, así\ncomo el resto de sus órganos vitales."
          violet: "Al sentirse amenazado, la membrana mucosa que\nrecubre todo su cuerpo se vuelve más densa y lo\npuede corroer todo."
        ko:
          scarlet: "등에 달린 소용돌이 모양 돌기에\n뇌나 심장과 같은\n중요한 기관이 모두 들어 있다."
          violet: "위험을 느끼면 온몸을 뒤덮고 있는\n점액의 농도가 짙어져서\n무엇이든 녹일 수 있게 된다."
        zh_simp:
          scarlet: "背上漩涡状的突起物里\n装着它的大脑和心脏等\n所有重要的器官。"
          violet: "感知到危险时，覆盖着\n全身的黏液的浓度会提升，\n这样一来就能溶解任何东西。"
        zh_trad:
          scarlet: "大腦和心臟等重要的\n器官全都裝在背上\n漩渦狀的突起部分裡。"
          violet: "感覺到危險時，覆蓋著\n全身的黏液濃度會提升，\n變得能夠溶解任何東西。"
