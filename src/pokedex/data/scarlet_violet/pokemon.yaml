        jp_kana:
          scarlet: "￹洞窟￺どうくつ￻や　￹廃鉱山￺はいこうざん￻が　ねぐら。\nおとなしいが　キバに　￹触￺ふ￻れられると\n￹激￺はげ￻しく　￹怒￺おこ￻るので　￹要注意￺ようちゅうい￻。"
          violet: "￹自慢￺じまん￻の　キバで　￹敵￺てき￻を　￹圧倒￺あっとう￻。\n￹鉄塔￺てっとう￻を　￹一刀￺いっとう￻のもとに\n￹切￺き￻り￹捨￺す￻てる　￹切￺き￻れ￹味￺あじ￻を　￹誇￺ほこ￻る。"
        jp_kanji:
          scarlet: "￹洞窟￺どうくつ￻や　￹廃鉱山￺はいこうざん￻が　ねぐら。\nおとなしいが　キバに　￹触￺ふ￻れられると\n￹激￺はげ￻しく　￹怒￺おこ￻るので　￹要注意￺ようちゅうい￻。"
          violet: "￹自慢￺じまん￻の　キバで　￹敵￺てき￻を　￹圧倒￺あっとう￻。\n￹鉄塔￺てっとう￻を　￹一刀￺いっとう￻のもとに\n￹切￺き￻り￹捨￺す￻てる　￹切￺き￻れ￹味￺あじ￻を　￹誇￺ほこ￻る。"
        en:
          scarlet: "This Pokémon nests in caves and abandoned\nmines. It is docile, but it will become incredibly\nangry if its tusks are touched, so beware."
          violet: "It overwhelms enemies with its prized tusks,\nwhich are sharp enough to cut through a metal\ntransmission tower in one strike."
        fr:
          scarlet: "Il vit dans les cavernes et dans les mines à\nl’abandon. Bien qu’il soit plutôt calme, il entre\ndans une colère noire si on touche ses crocs."
          violet: "Il terrasse ses ennemis grâce à ses crocs, dont\nil est fier. Ceux-si sont si tranchants qu’ils peuvent\ndécouper un pylône en métal d’un seul coup."
        it:
          scarlet: "Nidifica in grotte e miniere abbandonate.\nÈ pacifico ma bisogna fare attenzione, perché\nsi arrabbia se le zanne gli vengono toccate."
          violet: "Soggioga il nemico con le zanne, di cui va fiero.\nQueste sono così affilate da poter tagliare un\ntraliccio d’acciaio con un solo colpo."
        de:
          scarlet: "Es schläft in Höhlen und stillgelegten Bergwerken.\nVorsicht: Normalerweise ist es sanftmütig, doch\nfasst man seine Stoßzähne an, wird es wütend."
          violet: "Die Stoßzähne, mit denen es Feinde überwältigt,\nsind so scharf, dass sie Hochspannungsmasten mit\neinem Streich zerteilen. Sie sind sein ganzer Stolz."
        es:
          scarlet: "Anida en cuevas y en minas abandonadas.\nEs dócil, pero conviene tener cuidado, ya que\nmonta en cólera si le tocan los colmillos."
          violet: "Abruma al enemigo con sus preciados colmillos,\ntan afilados que pueden cortar de un tajo una\ntorre metálica."
        ko:
          scarlet: "동굴이나 폐광산을 거처로 쓴다.\n온순하지만 어금니를 건드리면\n크게 화를 내기 때문에 주의가 필요하다."
          violet: "자랑스러운 어금니로 상대를 압도한다.\n철탑을 단칼에 베어 버리는\n예리함을 자랑한다."
        zh_simp:
          scarlet: "会把洞窟或废矿山当成睡床。\n平时很温顺，可一旦被摸到\n牙齿就会暴怒，千万要小心。"
          violet: "会以自傲的牙齿来压制敌人。\n獠牙的锋利程度无与伦比，\n就连铁塔都能一斩而断。"
        zh_trad:
          scarlet: "會把洞窟或廢礦山當成睡床。\n平時個性溫順，但牙齒一旦\n被摸到就會暴怒，千萬要小心。"
          violet: "會以自傲的牙齒壓制敵人。\n牙齒的鋒利程度無與倫比，\n就連鐵塔都能夠一斬而斷。"
