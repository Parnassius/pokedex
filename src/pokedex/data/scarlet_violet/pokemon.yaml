        jp_kanji:
          scarlet: "￹体内￺たいない￻にある　￹毒￺どく￻の　￹種類￺しゅるい￻は\n１００　￹以上￺いじょう￻。　￹毒￺どく￻と　￹毒￺どく￻の\n￹化学反応￺かがくはんのう￻が　￹命￺いのち￻の　￹源￺みなもと￻。"
          violet: "キバや　ツメに　￹見￺み￻えるのは　￹毒素￺どくそ￻の\n￹結晶￺けっしょう￻。　￹触￺ふ￻れるだけで　￹毒￺どく￻に\n￹侵￺おか￻されるので　￹近付￺ちかづ￻くのは　￹危険￺きけん￻。"
        en:
          scarlet: "There are over a hundred kinds of poison\ninside its body. Chemical reactions between\ndifferent poisons are the source of its vitality."
          violet: "What look like fangs and claws are actually\ncrystallized poison that will afflict you at a\nmere touch, so don’t get too close."
        fr:
          scarlet: "Il y a plus de cent toxines différentes dans\nson corps. Les réactions chimiques entre ces\npoisons constituent sa source d’énergie vitale."
          violet: "Ses « crocs » et ses « griffes » sont\ndes toxines cristallisées qui empoisonnent tout\nce qu’elles touchent. Mieux vaut rester à distance."
        it:
          scarlet: "Il suo corpo contiene più di 100 sostanze\ntossiche diverse dalle cui reazioni chimiche\ntrae energia vitale."
          violet: "Quelli che sembrano denti e artigli sono in\nrealtà tossine cristallizzate che avvelenano\nal solo contatto. Avvicinarsi è molto pericoloso."
        de:
          scarlet: "In seinem Inneren befinden sich mehr als 100\nverschiedene Toxine. Seine Lebenskraft zieht es\naus den chemischen Reaktionen zwischen ihnen."
          violet: "In seiner Nähe ist Vorsicht geboten. Was nach\nFangzähnen und Krallen aussieht, sind kristalline\nGiftstoffe, die bei bloßer Berührung vergiften."
        es:
          scarlet: "En su cuerpo alberga más de un centenar de\ntipos de veneno. Las reacciones químicas entre\nellos son su fuente de energía vital."
          violet: "Lo que parecen colmillos y uñas son en realidad\ntoxinas cristalizadas. Envenenan al contacto, por\nlo que no conviene acercarse demasiado."
        ko:
          scarlet: "체내에 있는 독은\n100종류 이상이다. 독과 독의\n화학 반응이 생명의 근원이다."
          violet: "이빨이나 손톱으로 보이는 것은\n독소의 결정이다. 만지기만 해도\n독에 중독되므로 다가가면 위험하다."
        zh_simp:
          scarlet: "体内的毒素有１００种以上。\n毒素和毒素之间的\n化学反应是其生命之源。"
          violet: "看上去像牙齿或爪子的东西其实是\n毒素的结晶。只要碰到就会中毒，\n所以靠近它很危险。"
        zh_trad:
          scarlet: "體內毒素的種類有１００種以上。\n毒素與毒素之間的化學反應\n是牠的生命之源。"
          violet: "看起來像牙齒和爪子的東西是\n毒素結晶。一旦碰到就會中毒，\n所以靠近牠是很危險的。"
