          violet: "￹艶￺あで￻やかな　￹翼￺つばさ￻を　￹羽￺は￻ばたかせて\nフェロモンを　￹振￺ふ￻りまき　￹人￺ひと￻や\nポケモンを　￹蠱惑￺こわく￻に　￹魅了￺みりょう￻する。"
        en:
          scarlet: "Fezandipiti owes its beautiful looks and lovely\nvoice to the toxic stimulants emanating from the\nchain wrapped around its body."
          violet: "Fezandipiti beats its glossy wings to scatter\npheromones that captivate people and Pokémon."
        fr:
          scarlet: "Il doit son apparence et sa voix majestueuses\nà la stimulation provoquée par les toxines qui\ns’échappent de la chaîne autour de son corps."
          violet: "Lorsqu’il agite ses ailes splendides, il libère\ndes phéromones capables d’envoûter\nles êtres humains comme les Pokémon."
        it:
          scarlet: "Ha sviluppato una voce e un aspetto ammalianti\ngrazie alla stimolazione delle tossine emesse\ndalla catena che ha attorno al corpo."
          violet: "Battendo le ali eleganti sparge feromoni\nche stregano sia esseri umani che Pokémon."
        de:
          scarlet: "Die Kette an seinem Körper sondert Gift ab,\ndurch dessen Stimulation es ein schönes Äußeres\nund eine bezaubernde Stimme erhalten hat."
          violet: "Schlägt es mit seinen anmutigen Flügeln,\nverteilt es Pheromone, durch die es Menschen\nund Pokémon in seinen Bann zieht."
        es:
          scarlet: "Ha desarrollado una forma y una voz muy bellas\ngracias a la estimulación causada por las toxinas\nde la cadena que lleva en torno al cuerpo."
          violet: "Al agitar sus majestuosas alas, libera unas\nferomonas que dejan embelesados tanto a\nhumanos como a Pokémon."
        ko:
          scarlet: "몸을 휘감고 있는 사슬에서 나오는\n독소에 자극을 받아\n아름다운 모습과 소리를 손에 넣었다."
          violet: "윤기가 흐르는 날개를 펄럭이며\n페로몬을 흩뿌리는 것으로\n사람과 포켓몬을 매료시킨다."
        zh_simp:
          scarlet: "受到卷在身上的锁链\n所释放的毒素刺激，\n获得了美妙的身姿和声音。"
          violet: "扇动艳丽的翅膀抛撒费洛蒙\n让人和宝可梦为其神魂颠倒。"
        zh_trad:
          scarlet: "受到纏繞在身上的鎖鏈\n所釋放的毒素刺激，使牠\n得到了美妙的身姿和聲音。"
          violet: "會拍動豔麗的翅膀散佈\n費洛蒙，使人類和寶可夢\n神魂顛倒，為牠著迷。"
