      descriptions:
        jp_kana:
          scarlet: "￹全身￺ぜんしん￻から　オーラが　￹出￺だ￻されると\nあたりの　￹天候￺てんこう￻が　みるみるうちに\n￹変￺か￻わっていく　という。"
          violet: "￹神聖￺しんせい￻な　ポケモンと　￹言￺い￻われる。\n￹全身￺ぜんしん￻が　ほのかに　￹光￺ひか￻ると\nあたりの　￹天気￺てんき￻が　￹様変￺さまが￻わりする。"
        jp_kanji:
          scarlet: "￹全身￺ぜんしん￻から　オーラが　￹出￺だ￻されると\nあたりの　￹天候￺てんこう￻が　みるみるうちに\n￹変￺か￻わっていく　という。"
          violet: "￹神聖￺しんせい￻な　ポケモンと　￹言￺い￻われる。\n￹全身￺ぜんしん￻が　ほのかに　￹光￺ひか￻ると\nあたりの　￹天気￺てんき￻が　￹様変￺さまが￻わりする。"
        en:
          scarlet: "They say that if it emits an aura from its whole\nbody, the weather will begin to change instantly."
          violet: "It is called the divine Pokémon. When its entire\nbody brightens slightly, the weather changes."
        fr:
          scarlet: "On dit que lorsque tout son corps émet une aura,\nles conditions climatiques se mettent à changer\nà vue d’œil."
          violet: "On dit de lui que c’est un Pokémon divin. Quand\nson corps se met à briller, la météo change."
        it:
          scarlet: "Dicono che quando il suo corpo emana un’aura,\nil tempo cambierà immediatamente."
          violet: "È chiamato il Pokémon sacro. Quando il corpo\nemana un lieve bagliore, cambia il tempo."
        de:
          scarlet: "Man sagt, wenn sein ganzer Körper eine Aura\nausstrahle, ändere sich augenblicklich das Wetter\nin seiner Umgebung."
          violet: "Es wird als heiliges Pokémon bezeichnet.\nWenn sein gesamter Körper ein wenig leuchtet,\nändert sich das Wetter."
        es:
          scarlet: "Dicen que, cuando su cuerpo desprende un aura,\nel tiempo empieza a cambiar inmediatamente."
          violet: "Se refieren a él como un Pokémon divino.\nCuando le brilla el cuerpo, el tiempo cambia\ninmediatamente."
        ko:
          scarlet: "전신에서 오라를 발산하면\n주변 날씨가 순식간에\n변한다고 한다."
          violet: "신성한 포켓몬이라 전해지고 있다.\n온몸이 은은하게 빛나면\n주변의 날씨가 바뀌어 버린다."
        zh_simp:
          scarlet: "据说它全身散发出气场时，\n周围的天气会在\n转眼间发生突变。"
          violet: "被称为是神圣的宝可梦。\n当它全身开始微微发光时，\n周围的天气也会随之改变。"
        zh_trad:
          scarlet: "據說牠全身上下散發出\n氣場時，周圍的天氣\n就會在轉眼間為之一變。"
          violet: "被稱作是神聖的寶可夢。\n當全身開始微微發光，\n周圍天氣也會為之一變。"
