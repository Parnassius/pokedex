      descriptions:
        jp_kana:
          scarlet: "￹飛￺と￻び￹跳￺は￻ねると　￹口￺くち￻の￹中￺なか￻にある\n￹玉￺たま￻が　あちこちに　￹反射￺はんしゃ￻して\n￹鈴￺すず￻のような　￹音色￺ねいろ￻と　なる。"
          violet: "￹人間￺にんげん￻の　￹耳￺みみ￻には　￹聴￺き￻き￹取￺と￻れない\n￹高￺たか￻い　￹周波数￺しゅうはすう￻で　￹鳴￺な￻く。\n￹鳴￺な￻きだすと　なかなか　￹止￺と￻まらない。"
        jp_kanji:
          scarlet: "￹飛￺と￻び￹跳￺は￻ねると　￹口￺くち￻の￹中￺なか￻にある\n￹玉￺たま￻が　あちこちに　￹反射￺はんしゃ￻して\n￹鈴￺すず￻のような　￹音色￺ねいろ￻と　なる。"
          violet: "￹人間￺にんげん￻の　￹耳￺みみ￻には　￹聴￺き￻き￹取￺と￻れない\n￹高￺たか￻い　￹周波数￺しゅうはすう￻で　￹鳴￺な￻く。\n￹鳴￺な￻きだすと　なかなか　￹止￺と￻まらない。"
        en:
          scarlet: "There is an orb inside its mouth. When it hops,\nthe orb bounces all over and makes a ringing\nsound."
          violet: "It emits high-frequency cries that people can’t\nhear. Once it starts, it can cry for an awfully\nlong time."
        fr:
          scarlet: "Quand il sautille, l’orbe qu’il a dans la bouche\ns’agite et tinte comme une cloche."
          violet: "Son cri à haute fréquence est inaudible pour\nl’oreille humaine. Quand il se met à pleurer,\nil a beaucoup de mal à s’arrêter."
        it:
          scarlet: "Quando saltella, la sfera che ha in bocca\nsbatacchia, creando un riverbero simile\na una campana."
          violet: "Emette un verso ad alta frequenza\nimpercettibile all’orecchio umano.\nSe comincia, non la finisce più."
        de:
          scarlet: "In seinem Maul befindet sich eine Kugel.\nWenn es hüpft, springt diese umher und\nerzeugt ein klingelndes Geräusch."
          violet: "Menschenohren können die hohe Frequenz seines\nRufs nicht hören. Fängt es einmal an zu schreien,\nhört es so bald nicht mehr auf."
        es:
          scarlet: "Emite un tintineo cuando salta, ya que la esfera\nque tiene en la boca rebota de un lado a otro."
          violet: "Emite gritos en unas frecuencias imperceptibles\npara el oído humano. Una vez que empieza a\ngritar, no se sabe cuándo parará."
        ko:
          scarlet: "뛰어오르면 입안에 있는\n구슬이 이리저리 부딪치며\n방울 같은 음색을 만들어 낸다."
          violet: "인간의 귀에는 들리지 않는\n높은 주파수로 운다.\n울기 시작하면 좀처럼 멈추지 않는다."
        zh_simp:
          scarlet: "如果跳起来，\n嘴里的珠子就会弹来弹去，\n发出铃铛一般的音色。"
          violet: "会以人类的耳朵无法听到的\n高频率来发出叫声。\n一旦开始叫就很难停下来。"
        zh_trad:
          scarlet: "如果跳起來，\n嘴裡的珠子就會到處反彈，\n發出鈴鐺一般的音色。"
          violet: "會以人類聽不到的高頻率\n來發出叫聲。\n一旦開始叫就很難停下來。"
