        jp_kanji:
          scarlet: "１０￹億年後￺おくねんご￻の　バンギラスと\n￹怪￺あや￻しい　￹雑誌￺ざっし￻が　￹取￺と￻り￹上￺あ￻げていた\nポケモンに　￹似￺に￻た　￹部分￺ぶぶん￻が　ある。"
          violet: "ある　￹探検記￺たんけんき￻で　テツノイバラと\n￹紹介￺しょうかい￻されている　￹物体￺ぶったい￻と\n￹一致￺いっち￻する　￹特徴￺とくちょう￻が　ある。"
