      descriptions:
        jp_kana:
          scarlet: "￹逆￺さか￻さまになって　￹崖￺がけ￻の　￹上￺うえ￻から\n￹獲物￺えもの￻を　￹狙￺ねら￻うが　￹頭￺あたま￻に　￹血￺ち￻が￹上￺のぼ￻るので\n￹長￺なが￻くは　￹待￺ま￻てない。"
          violet: "￹切￺き￻り￹立￺た￻った　￹崖￺がけ￻の￹上￺うえ￻で　￹暮￺く￻らす。\nサイドステップで　￹攻撃￺こうげき￻を　かわし\nハサミで　￹急所￺きゅうしょ￻を　￹狙￺ねら￻う。"
        jp_kanji:
          scarlet: "￹逆￺さか￻さまになって　￹崖￺がけ￻の　￹上￺うえ￻から\n￹獲物￺えもの￻を　￹狙￺ねら￻うが　￹頭￺あたま￻に　￹血￺ち￻が￹上￺のぼ￻るので\n￹長￺なが￻くは　￹待￺ま￻てない。"
          violet: "￹切￺き￻り￹立￺た￻った　￹崖￺がけ￻の￹上￺うえ￻で　￹暮￺く￻らす。\nサイドステップで　￹攻撃￺こうげき￻を　かわし\nハサミで　￹急所￺きゅうしょ￻を　￹狙￺ねら￻う。"
        en:
          scarlet: "Klawf hangs upside-down from cliffs, waiting\nfor prey. But Klawf can’t remain in this position\nfor long because its blood rushes to its head."
          violet: "This Pokémon lives on sheer cliffs.\nIt sidesteps opponents’ attacks, then\nlunges for their weak spots with its claws."
        fr:
          scarlet: "Il se poste la tête en bas sur une falaise, dans\nl’attente d’une proie, mais il ne peut pas rester\nlongtemps ainsi, car le sang lui monte à la tête."
          violet: "Il vit sur les falaises escarpées et esquive les\nattaques en se déplaçant sur le côté. Il vise les\npoints faibles de ses adversaires avec ses pinces."
        it:
          scarlet: "Si apposta a testa in giù sui dirupi per catturare\nle prede. Tuttavia, non può mantenere a lungo\ntale posizione perché gli va il sangue alla testa."
          violet: "Vive su ripidi dirupi. Schiva gli attacchi\nmuovendosi di lato mentre mira dritto\nal punto debole del nemico con le sue chele."
        de:
          scarlet: "Dieses Pokémon lauert seiner Beute kopfüber\nan Klippen hängend auf. Da ihm dabei das Blut in\nden Kopf steigt, kann es nicht lange so ausharren."
          violet: "Steile Klippen sind sein Zuhause. Es bewegt sich\nseitwärts, um Attacken auszuweichen, und greift\ngegnerische Schwachstellen mit den Scheren an."
        es:
          scarlet: "Acecha a sus presas colgado cabeza abajo de los\nacantilados, pero no puede aguantar así mucho\ntiempo porque se le sube la sangre a la cabeza."
          violet: "Habita en acantilados escarpados. Evade los\nataques enemigos echándose a un lado y\nluego apunta a sus puntos vitales con las pinzas."
        ko:
          scarlet: "거꾸로 매달린 채 절벽 위에서 먹이를\n노리지만, 머리에 피가 몰리기 때문에\n오랫동안은 버틸 수 없다고 한다."
          violet: "깎아지른 듯한 절벽 위에 산다.\n사이드 스텝으로 공격을 피하며\n집게로 급소를 노린다."
        zh_simp:
          scarlet: "会倒挂在悬崖上等待猎物。\n但那会让它的血液倒流，\n因此等不了太长的时间。"
          violet: "生活在陡峭的悬崖上。\n会通过侧步来闪避攻击，\n然后用钳子瞄准对手的要害。"
        zh_trad:
          scarlet: "會倒立在懸崖上等獵物上門，\n但由於那會讓牠的血液倒流，\n因此等不了太長的時間。"
          violet: "生活在陡峭的懸崖上。\n會左右移動閃避攻擊，\n然後用鉗子瞄準對手的要害。"
