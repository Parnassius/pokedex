      types:
        - grass
      egg_groups:
        - field
        - grass
      abilities:
        - overgrow
      hidden_ability: contrary
      descriptions:
        jp_kana:
          scarlet: "￹太陽￺たいよう￻の　￹光￺ひかり￻から　￹生成￺せいせい￻した\nエネルギーを　￹長￺なが￻い　￹体￺からだ￻の￹中￺なか￻で\n￹数十倍￺すうじゅうばい￻に　￹増幅￺ぞうふく￻させる。"
          violet: "￹相手￺あいて￻を　すくませる　￹眼光￺がんこう￻と\n￹威風堂々￺いふうどうどう￻たる　その　￹姿￺すがた￻から\n￹森￺もり￻の￹君主￺くんしゅ￻　と　￹呼￺よ￻ばれている。"
        jp_kanji:
          scarlet: "￹太陽￺たいよう￻の　￹光￺ひかり￻から　￹生成￺せいせい￻した\nエネルギーを　￹長￺なが￻い　￹体￺からだ￻の￹中￺なか￻で\n￹数十倍￺すうじゅうばい￻に　￹増幅￺ぞうふく￻させる。"
          violet: "￹相手￺あいて￻を　すくませる　￹眼光￺がんこう￻と\n￹威風堂々￺いふうどうどう￻たる　その　￹姿￺すがた￻から\n￹森￺もり￻の￹君主￺くんしゅ￻　と　￹呼￺よ￻ばれている。"
        en:
          scarlet: "It generates energy from sunlight, then\namplifies that energy dozens of times\nwithin its long body."
          violet: "An intimidating gaze and majestic appearance\nhave caused this Pokémon to be known as the\nLord of the Forest."
        fr:
          scarlet: "Il génère de l’énergie à partir de la lumière du\nsoleil, puis il amplifie cette énergie plusieurs\ndizaines de fois à l’intérieur de son long corps."
          violet: "On l’appelle « le monarque de la forêt ».\nIl doit ce surnom à son regard intimidant\net à son allure majestueuse."
        it:
          scarlet: "Produce energia grazie alla luce solare e\nl’amplifica di decine di volte all’interno\ndel suo lungo corpo."
          violet: "Il suo sguardo che immobilizza gli avversari\ne il suo aspetto solenne gli sono valsi\nl’appellativo di \"signore della foresta\"."
        de:
          scarlet: "Serpiroyal erzeugt Energie aus Sonnenlicht\nund verstärkt diese in seinem langen Körper\num ein Dutzendfaches."
          violet: "Dank seines würdevollen Aussehens und seines\nstechenden Blicks, der andere erstarren lässt,\nnennt man es auch den „Herrscher des Waldes“."
        es:
          scarlet: "Amplifica decenas de veces en el interior\nde su largo cuerpo la energía que genera\na partir de la luz solar."
          violet: "Su mirada capaz de amilanar al rival\ny su porte majestuoso le han valido el\nsobrenombre de Soberano de los Bosques."
        ko:
          scarlet: "햇빛으로 생성한 에너지를\n기다란 몸속에서\n수십 배로 증폭시킨다."
          violet: "상대를 움츠러들게 하는 눈빛과\n위풍당당한 자태로 인해\n숲의 군주라고 불리고 있다."
        zh_simp:
          scarlet: "能将由阳光制造出的能量\n在长长的身体内\n增强至原本的数十倍。"
          violet: "它拥有能让对手畏惧的\n眼神和威风凛凛的样子，\n因此被称为森林的君主。"
        zh_trad:
          scarlet: "利用陽光製造出能量後，\n會在長長的身體裡將其\n增強到原本的數十倍。"
          violet: "擁有能讓對手畏怯的眼神\n以及威風凜凜的身姿，\n因此被稱為森林的君主。"
