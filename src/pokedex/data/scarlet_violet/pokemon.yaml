      descriptions:
        jp_kana:
          scarlet: "￹腕￺うで￻の￹先￺さき￻から　￹摂氏￺せっし￻２０００￹度￺ど￻の\n￹火￺ひ￻の￹玉￺たま￻を　￹撃￺う￻ちだすとき　￹体￺からだ￻は\n￹熱￺ねつ￻のため　ほのかに　￹白￺しろ￻くなる。"
          violet: "￹火山￺かざん￻の　￹火口￺かこう￻に　￹棲￺す￻む。\n１つの　￹火山￺かざん￻には　ひとつがいの\nブーバーンしかいないと　いわれる。"
        jp_kanji:
          scarlet: "￹腕￺うで￻の￹先￺さき￻から　￹摂氏￺せっし￻２０００￹度￺ど￻の\n￹火￺ひ￻の￹玉￺たま￻を　￹撃￺う￻ちだすとき　￹体￺からだ￻は\n￹熱￺ねつ￻のため　ほのかに　￹白￺しろ￻くなる。"
          violet: "￹火山￺かざん￻の　￹火口￺かこう￻に　￹棲￺す￻む。\n１つの　￹火山￺かざん￻には　ひとつがいの\nブーバーンしかいないと　いわれる。"
        en:
          scarlet: "When shooting 3,600 degree Fahrenheit\nfireballs from its arms, its body takes on a\nwhitish hue from the intense heat."
          violet: "They dwell in volcanic craters. It’s said that\nonly a single pair of Magmortar will inhabit\nany given volcano."
        fr:
          scarlet: "Les boules de feu à 2 000 °C que\nses bras tirent font pratiquement\nchauffer son corps à blanc."
          violet: "Il vit dans les cratères volcaniques.\nOn dit que chaque volcan ne peut\nabriter qu’un seul couple de Maganon."
        it:
          scarlet: "Quando spara palle di fuoco di oltre\n2.000 ºC dagli arti superiori, il suo corpo assume\nuna tinta biancastra a causa del calore intenso."
          violet: "Vive nei crateri vulcanici. Sembra che in\nogni vulcano possa abitare solo una coppia\ndi Magmortar."
        de:
          scarlet: "Während es 2000 ℃ heiße Feuerbälle aus\nseinen Armen schießt, nimmt sein Körper\ndurch die Hitze einen weißlichen Farbton an."
          violet: "Es lebt in Vulkankratern. Angeblich gibt es\npro Vulkan immer nur ein Magbrant-Paar."
        es:
          scarlet: "Al lanzar bolas de fuego a 2000 ºC por los\nextremos de los brazos, su cuerpo adopta un\ntono blanquecino debido a la temperatura."
          violet: "Vive en cráteres volcánicos. Al parecer,\nen cada volcán solo habita una pareja de\nMagmortar."
        ko:
          scarlet: "팔 끝에서 섭씨 2000도의\n불구슬을 쏘아낼 때 몸은\n열 때문에 약간 하얘진다."
          violet: "화산의 화구에 산다.\n1개의 화산에는 암수 한 쌍의\n마그마번밖에 없다고 한다."
        zh_simp:
          scarlet: "从手臂前端发射出\n摄氏２０００度的火球时，\n身体会因为高温而稍稍变白。"
          violet: "栖息在火山口。\n据说一座火山只有一对鸭嘴炎兽。"
        zh_trad:
          scarlet: "從手腕前端射出\n攝氏２０００度的火球時，\n身體會因高溫而微微泛白。"
          violet: "棲息在火山口。\n據說１座火山\n只有一對鴨嘴炎獸。"
