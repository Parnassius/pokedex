          scarlet: "Sus rasgos distintivos encajan con la descripción\nde una criatura mencionada en cierto libro bajo\nel nombre de Melenaleteo."
          violet: "Sus rasgos distintivos se asemejan a los del\nespíritu de un reptil volador mencionado en\nuna revista esotérica."
        ko:
          scarlet: "어떤 서적에 등장하는\n“날개치는머리”라는 생물과\n비슷한 특징을 가진 포켓몬."
          violet: "오컬트 잡지에서 소개했던\n익룡의 유령과\n몇몇 특징이 닮았다."
        zh_simp:
          scarlet: "这只宝可梦与某本书中\n出现的一种叫振翼发的\n生物有着相似的特征。"
          violet: "它只有特征的部分\n与超自然杂志曾报道的\n翼龙的幽灵相似。"
        zh_trad:
          scarlet: "與某本書裡記載的一種\n叫做振翼髮的生物有著\n相似特徵的寶可夢。"
          violet: "只有特徵長得像是\n超自然雜誌所報導的\n翼龍的幽靈。"
