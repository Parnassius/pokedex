          scarlet: "￹不思議￺ふしぎ￻な　￹手￺て￻の　￹動￺うご￻きを　￹見￺み￻つめた\n￹相手￺あいて￻の　￹魂￺たましい￻を　￹体￺からだ￻から\n￹抜￺ぬ￻き￹取￺と￻るといわれ　￹怖￺こわ￻がられている。"
          violet: "￹体￺からだ￻の￹中￺なか￻で　￹燃￺も￻えている　￹真￺ま￻っ￹赤￺か￻な\nひとつ￹目￺め￻が　サマヨールの　￹本体￺ほんたい￻と\nいわれるが　￹誰￺だれ￻も　￹見￺み￻ていない。"
        jp_kanji:
          scarlet: "￹不思議￺ふしぎ￻な　￹手￺て￻の　￹動￺うご￻きを　￹見￺み￻つめた\n￹相手￺あいて￻の　￹魂￺たましい￻を　￹体￺からだ￻から\n￹抜￺ぬ￻き￹取￺と￻るといわれ　￹怖￺こわ￻がられている。"
          violet: "￹体￺からだ￻の￹中￺なか￻で　￹燃￺も￻えている　￹真￺ま￻っ￹赤￺か￻な\nひとつ￹目￺め￻が　サマヨールの　￹本体￺ほんたい￻と\nいわれるが　￹誰￺だれ￻も　￹見￺み￻ていない。"
        en:
          scarlet: "Dusclops is feared because it’s said to pull the\nsoul out of anyone who gazes upon the strange\nmovements of its hands."
          violet: "Dusclops’s true form is said to be a bright red\neye burning within its body, but no one has ever\nseen such a thing."
        fr:
          scarlet: "Il inspire la crainte, car on dit qu’il peut\nextraire l’âme des personnes qui ont observé\nles étranges mouvements de ses mains."
          violet: "On dit que sa véritable forme serait un œil\nrouge qui brûlerait à l’intérieur de son corps, mais\npersonne n’a jamais pu confirmer cette théorie."
        it:
          scarlet: "È temuto perché si dice sia in grado di\nstrappare via l’anima dal corpo di chi\nosserva i misteriosi movimenti delle sue mani."
          violet: "Si dice che il suo vero corpo sia in realtà\nun occhio rosso acceso che brucia al suo\ninterno, ma nessuno lo ha mai visto."
        de:
          scarlet: "Es wird gefürchtet, da es jenen, die auf die\nmysteriösen Bewegungen seiner Hände starren,\ndie Seele aus dem Leib ziehen soll."
          violet: "Es heißt, sein eigentlicher Körper sei ein\nfeuerrotes Auge, das in seinem Inneren lodert,\ndoch niemand hat es je gesehen."
        es:
          scarlet: "Se lo teme porque, según cuentan, extrae el\nalma del cuerpo de quienes ven los extraños\nmovimientos de sus manos."
          violet: "Se dice que su verdadero cuerpo es un ojo\nescarlata que arde en su interior, aunque\nnadie ha podido verificar esta teoría."
        ko:
          scarlet: "이상한 손의 움직임을 본 상대의 영혼을\n몸에서 끄집어낸다고 하여\n공포의 대상으로 여겨지고 있다."
          violet: "몸 안에서 타오르고 있는\n새빨간 외눈이 미라몽의 본체라고\n전해지고 있으나, 누구도 본 적은 없다."
        zh_simp:
          scarlet: "据说盯着它神秘手部动作看的话，\n灵魂会被它从身体里抽走，\n因此被大家所深深恐惧。"
          violet: "据说在体内燃烧着的鲜红独眼\n才是彷徨夜灵的真身，\n但并没有人亲眼见过。"
        zh_trad:
          scarlet: "據說要是盯著牠神秘的手部動作看，\n靈魂就會被牠從身體裡抽走，\n因此被人們深深恐懼。"
          violet: "據說在體內燃燒著的鮮紅獨眼\n是彷徨夜靈的本體，\n但沒有人親眼見過。"
