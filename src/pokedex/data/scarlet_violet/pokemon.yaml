      types:
        - steel
        - psychic
      egg_groups:
        - mineral
      abilities:
        - levitate
        - heatproof
      hidden_ability: heavy_metal
      descriptions:
        jp_kana:
          scarlet: "￹雨雲￺あまぐも￻を　￹呼￺よ￻べる　ポケモンとして\n￹大昔￺おおむかし￻から　￹祀￺まつ￻られていた。\nときどき　￹地面￺じめん￻に　￹埋￺う￻められている。"
          violet: "￹別世界￺べっせかい￻への　￹穴￺あな￻を　￹開￺あ￻けて\nそこから　￹雨￺あめ￻を　￹降￺ふ￻らしていた。\nそのため　￹豊作￺ほうさく￻の￹神￺かみ￻　とされる。"
        jp_kanji:
          scarlet: "￹雨雲￺あまぐも￻を　￹呼￺よ￻べる　ポケモンとして\n￹大昔￺おおむかし￻から　￹祀￺まつ￻られていた。\nときどき　￹地面￺じめん￻に　￹埋￺う￻められている。"
          violet: "￹別世界￺べっせかい￻への　￹穴￺あな￻を　￹開￺あ￻けて\nそこから　￹雨￺あめ￻を　￹降￺ふ￻らしていた。\nそのため　￹豊作￺ほうさく￻の￹神￺かみ￻　とされる。"
        en:
          scarlet: "In ages past, this Pokémon was revered as a\nbringer of rain. It was found buried in the ground."
          violet: "It brought rains by opening portals to\nanother world. It was revered as a bringer\nof plentiful harvests."
        fr:
          scarlet: "Il a longtemps été vénéré pour avoir apporté\nla pluie. On le trouve parfois enterré dans le sol."
          violet: "Ce Pokémon apportait la pluie en créant\nun portail vers une autre dimension.\nIl était synonyme de bonne récolte."
        it:
          scarlet: "È stato venerato per secoli come Pokémon\nche porta la pioggia. A volte lo si trova sepolto\nnel terreno."
          violet: "Apriva portali verso altri mondi dai quali\nfaceva giungere la pioggia. Per questo veniva\nvenerato come una divinità dei raccolti."
        de:
          scarlet: "Vor Urzeiten wurden sie als Regenmacher verehrt.\nManchmal findet man eines von ihnen im Boden\nvergraben."
          violet: "Ihm wurden reiche Ernten zugeschrieben,\nda es Portale zu anderen Welten öffnete,\num für Regen zu sorgen."
        es:
          scarlet: "Antaño se adoraba a este Pokémon para\nque propiciara lluvias abundantes. A veces,\npuede encontrarse enterrado bajo tierra."
          violet: "Traía lluvias abriendo portales a otro\nmundo. Era adorado como propiciador\nde buenas cosechas."
        ko:
          scarlet: "비구름을 부르는 포켓몬으로\n아주 옛날부터 떠받들어졌다.\n가끔 땅에 묻혀 있다."
          violet: "다른 세계로 이어지는 구멍을 열어\n비를 내리곤 했다.\n그 때문에 풍작의 신으로 여겨졌다."
        zh_simp:
          scarlet: "从遥远的过去开始就作为\n能召唤雨云的宝可梦被供奉着。\n时不时会被埋入地下。"
          violet: "打开通往其他世界的洞，\n然后就会从那里降下雨来。\n因此被叫做丰收之神。"
        zh_trad:
          scarlet: "從遙遠的過去開始就被人\n當成能召喚雨雲的寶可夢而供奉著。\n有時候會被埋進地下。"
          violet: "打開通往其他世界的洞，\n從那裡降下雨來。\n因此被叫做豐收之神。"
