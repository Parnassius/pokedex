      types:
        - poison
        - water
      egg_groups:
        - water_1
      abilities:
        - merciless
        - limber
      hidden_ability: regenerator
      descriptions:
        jp_kana:
          scarlet: "￹自分￺じぶん￻の　￹脚￺あし￻で　￹作￺つく￻った　ドームが\n￹棲￺す￻み￹処￺か￻。　￹潮￺しお￻の　￹流￺なが￻れを　ツノで\n￹察知￺さっち￻して　￹周囲￺しゅうい￻を　￹探￺さぐ￻る。"
          violet: "￹温￺あたた￻かな　￹海流￺かいりゅう￻が　￹流￺なが￻れ￹込￺こ￻む\n￹場所￺ばしょ￻を　￹巡￺めぐ￻って　ハギギシリと\n￹激￺はげ￻しく　￹争￺あらそ￻うが　￹分￺ぶ￻が￹悪￺わる￻い。"
        jp_kanji:
          scarlet: "￹自分￺じぶん￻の　￹脚￺あし￻で　￹作￺つく￻った　ドームが\n￹棲￺す￻み￹処￺か￻。　￹潮￺しお￻の　￹流￺なが￻れを　ツノで\n￹察知￺さっち￻して　￹周囲￺しゅうい￻を　￹探￺さぐ￻る。"
          violet: "￹温￺あたた￻かな　￹海流￺かいりゅう￻が　￹流￺なが￻れ￹込￺こ￻む\n￹場所￺ばしょ￻を　￹巡￺めぐ￻って　ハギギシリと\n￹激￺はげ￻しく　￹争￺あらそ￻うが　￹分￺ぶ￻が￹悪￺わる￻い。"
        en:
          scarlet: "This Pokémon lives within a dome made by its\nown legs. Toxapex monitors its surroundings by\nsensing the flow of the tide through its spikes."
          violet: "Toxapex gets into fierce battles with Bruxish\nover areas where warm ocean currents\nflow, but the odds are always against it."
        fr:
          scarlet: "Il vit sous le dôme formé par ses pattes. Ses\npointes lui permettent d’analyser les courants\nmarins et ainsi de surveiller les alentours."
          violet: "Ils se disputent violemment avec les Denticrisse\ndans les zones de courants marins chauds, mais\nils n’ont jamais l’avantage."
        it:
          scarlet: "Vive in una cupola creata coi suoi stessi\ntentacoli. Usa gli artigli per scandagliare\ni dintorni e percepire i movimenti della marea."
          violet: "Lotta ferocemente con i Bruxish per il controllo\ndelle zone in cui scorrono le correnti più\ncalde, ma raramente ha la meglio."
        de:
          scarlet: "Seine Beine bilden eine Kuppel, in der es lebt.\nMit seinen Hörnern erkennt es den Strom der\nGezeiten und erkundet seine Umgebung."
          violet: "Aggrostella kämpft mit Knirfish erbittert\num Gebiete mit warmer Meeresströmung,\ndoch es ist meist im Nachteil."
        es:
          scarlet: "Vive dentro de la cúpula que forma con las\nextremidades. Usa sus pinchos para sentir el\nflujo de las mareas y analizar sus alrededores."
          violet: "Se enfrenta a Bruxish en violentas disputas\npor las zonas de corrientes cálidas,\naunque siempre lleva las de perder."
        ko:
          scarlet: "자신의 다리로 만든 돔이 보금자리다.\n조류를 뿔로 감지해서 주위를 살핀다."
          violet: "따뜻한 해류가 흐르는 장소를 떠돌며\n치갈기와 격렬하게 싸우지만\n이쪽이 불리하다."
        zh_simp:
          scarlet: "会把自己的脚搭起的圆顶\n当成住处。通过角感知\n潮水的流动来探查四周。"
          violet: "虽然会为了争夺暖流的\n流向之处而跟磨牙彩皮鱼\n展开激战，但胜算不高。"
        zh_trad:
          scarlet: "會把自己的腳搭起的圓頂\n當成住處。能夠用角偵測\n海流來探查四周的狀況。"
          violet: "雖然會為了爭奪暖流的\n流入處，與磨牙彩皮魚\n展開激戰，但勝算不高。"
mudbray:
