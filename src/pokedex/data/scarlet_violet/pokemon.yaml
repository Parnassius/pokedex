      types:
        - psychic
      egg_groups:
        - monster
        - water_1
      abilities:
        - gluttony
        - own_tempo
      hidden_ability: regenerator
      descriptions:
        jp_kana:
          scarlet: "￹刺激的￺しげきてき￻に　￹香￺かお￻る　￹体臭￺たいしゅう￻は\n￹主食￺しゅしょく￻の　スパイスの　￹成分￺せいぶん￻が\n￹体￺からだ￻に　￹染￺し￻みついているからなのだ。"
          violet: "￹尻尾￺しっぽ￻を　￹垂￺た￻らし　￹釣￺つ￻りをするが\n￹染￺し￻みでる　スパイスの　￹香￺かお￻りのせいで\n￹釣果￺ちょうか￻は　いつも　いまひとつ。"
        jp_kanji:
          scarlet: "￹刺激的￺しげきてき￻に　￹香￺かお￻る　￹体臭￺たいしゅう￻は\n￹主食￺しゅしょく￻の　スパイスの　￹成分￺せいぶん￻が\n￹体￺からだ￻に　￹染￺し￻みついているからなのだ。"
          violet: "￹尻尾￺しっぽ￻を　￹垂￺た￻らし　￹釣￺つ￻りをするが\n￹染￺し￻みでる　スパイスの　￹香￺かお￻りのせいで\n￹釣果￺ちょうか￻は　いつも　いまひとつ。"
        en:
          scarlet: "It gives off a stimulating scent because of\nchemicals that have seeped into its body from\nthe spice that it eats as its staple food."
          violet: "It uses its tail to fish, but the scent of the spice\nemanating from its tail ensures its catches are\nalways lacking."
        fr:
          scarlet: "Il doit son parfum stimulant aux substances qui\nimprègnent son corps. Celles-ci proviennent\ndes épices dont il se nourrit principalement."
          violet: "Il pêche avec sa queue, mais à cause\ndu parfum d’épices que celle-ci dégage,\nles proies ne mordent pas beaucoup."
        it:
          scarlet: "L’odore pungente che emana è dovuto alla\nmassiccia presenza nel suo corpo delle sostanze\ncontenute nelle spezie di cui si nutre."
          violet: "Mette la coda in acqua per pescare ma, a causa\ndell’odore di spezie che emana, i risultati sono\nsempre scarsi."
        de:
          scarlet: "Sein anregender Duft stammt von einem Gewürz,\ndas seine Hauptnahrungsquelle bildet und dessen\nPartikel sich in seinem Körper ausgebreitet haben."
          violet: "Es hängt seine Rute zum Angeln ins Wasser,\ndoch aufgrund des würzigen Aromas, das von\nihr ausgeht, beißt kaum etwas an."
        es:
          scarlet: "El olor estimulante que desprende se debe a\nque su cuerpo está impregnado de la esencia\nde la especia que consume habitualmente."
          violet: "Emplea la cola para pescar, aunque nunca\nobtiene buenos resultados debido al aroma\nespeciado que esta desprende."
        ko:
          scarlet: "몸에서 자극적인 향기가 나는 것은\n주식인 향신료의 성분이\n몸에 배어들었기 때문이다."
          violet: "꼬리를 늘어뜨리고 낚시를 하나\n배어나는 향신료 냄새 때문에\n낚시 성과는 항상 변변치 않다."
        zh_simp:
          scarlet: "之所以会散发刺激的香味，\n是因为它以香料为主食，\n其成分会渗入身体。"
          violet: "虽然会用尾巴来垂钓，\n但渗出的香料味却\n害得它总是成果一般。"
        zh_trad:
          scarlet: "主食中的香料成分\n滲入了身體，使牠\n渾身帶著刺激的香味。"
          violet: "雖然會用尾巴來垂釣，\n但從尾巴滲出的香料味\n總是害牠釣不到什麼東西。"
