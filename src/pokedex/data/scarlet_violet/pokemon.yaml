      descriptions:
        jp_kana:
          scarlet: "￹森￺もり￻で　￹暮￺く￻らす　ハヤシガメは\n￹自分￺じぶん￻だけが　￹知￺し￻っている　きれいな\n￹湧￺わ￻き￹水￺みず￻の　￹場所￺ばしょ￻が　あるという。"
          violet: "きれいな　￹水￺みず￻が　わき￹出￺で￻る　￹場所￺ばしょ￻を\n￹知￺し￻っていて　￹仲間￺なかま￻の　ポケモンを\n￹背中￺せなか￻に　￹乗￺の￻せて　そこまで　￹運￺はこ￻ぶ。"
        jp_kanji:
          scarlet: "￹森￺もり￻で　￹暮￺く￻らす　ハヤシガメは\n￹自分￺じぶん￻だけが　￹知￺し￻っている　きれいな\n￹湧￺わ￻き￹水￺みず￻の　￹場所￺ばしょ￻が　あるという。"
          violet: "きれいな　￹水￺みず￻が　わき￹出￺で￻る　￹場所￺ばしょ￻を\n￹知￺し￻っていて　￹仲間￺なかま￻の　ポケモンを\n￹背中￺せなか￻に　￹乗￺の￻せて　そこまで　￹運￺はこ￻ぶ。"
        en:
          scarlet: "Grotle live in the forest. Each is said to have its\nown secret place for getting clean springwater."
          violet: "It knows where pure water wells up. It carries\nfellow Pokémon there on its back."
        fr:
          scarlet: "Les Boskara sont des Pokémon sylvestres. On dit\nque chacun d’entre eux s’abreuve à une source\nd’eau pure qu’il est le seul à connaître."
          violet: "Boskara sait où se trouvent les sources d’eau\npure. Il y transporte d’autres Pokémon sur\nson dos."
        it:
          scarlet: "Si dice che nelle foreste in cui vive ci siano\nsorgenti d’acqua pura che solo lui conosce."
          violet: "Conosce luoghi in cui sgorgano sorgenti\nincontaminate. Vi conduce i Pokémon\namici trasportandoli sul dorso."
        de:
          scarlet: "Sie sind in Wäldern zu Hause. Jedes Chelcarain\nsoll seine ganz eigene Stelle kennen, wo es stets\nreines Quellwasser findet."
          violet: "Es weiß, wo es reinstes Quellwasser finden kann.\nPokémon, mit denen es sich angefreundet hat,\nträgt es auf seinem Rücken dorthin."
        es:
          scarlet: "Viven en el bosque, donde se dice que hay\nmanantiales cristalinos que solo ellos conocen."
          violet: "Sabe dónde encontrar manantiales de agua pura\ny lleva a lomos a sus amigos Pokémon hasta allí."
        ko:
          scarlet: "숲에서 사는 수풀부기는\n아름다운 샘물이 있는 자신만의\n비밀 장소를 갖고 있다고 한다."
          violet: "깨끗한 물이 솟아나는 장소를\n알고 있어서 동료 포켓몬을\n등에 태우고 그곳까지 데려다준다."
        zh_simp:
          scarlet: "据说生活在森林的\n树林龟有着自己才\n知道位置的清澈涌泉。"
          violet: "知道哪里会涌出清澈的水，\n会让伙伴宝可梦骑在它背上，\n将其运到那个地方。"
        zh_trad:
          scarlet: "據說生活在森林裡的\n樹林龜會有只有自己\n才知道位置的清澈湧泉。"
          violet: "知道哪裡會湧出清澈的泉水，\n會讓夥伴寶可夢騎在牠背上，\n運到那個地方去。"
