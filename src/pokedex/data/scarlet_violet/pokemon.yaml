          violet: "￹大￺おお￻きな　￹鼻￺はな￻の￹穴￺あな￻は　￹砂￺すな￻を\n￹噴射￺ふんしゃ￻することに　￹特化￺とっか￻したため\n￹匂￺にお￻いを　￹嗅￺か￻ぎ￹分￺わ￻けることは　￹苦手￺にがて￻。"
        jp_kanji:
          scarlet: "￹風船￺ふうせん￻のように　￹伸￺の￻び￹縮￺ちぢ￻む　￹首￺くび￻の　￹袋￺ふくろ￻は\n￹脱皮￺だっぴ￻を　￹重￺かさ￻ねるたびに\n￹伸縮性￺しんしゅくせい￻が　￹増￺ま￻していく。"
          violet: "￹大￺おお￻きな　￹鼻￺はな￻の￹穴￺あな￻は　￹砂￺すな￻を\n￹噴射￺ふんしゃ￻することに　￹特化￺とっか￻したため\n￹匂￺にお￻いを　￹嗅￺か￻ぎ￹分￺わ￻けることは　￹苦手￺にがて￻。"
        en:
          scarlet: "Silicobra’s neck pouch, which can inflate and\ndeflate like a balloon, gets more elastic each\ntime Silicobra sheds its skin."
          violet: "Silicobra’s large nostrils are specialized for\nspraying sand, so this Pokémon is not very good\nat telling apart different smells."
        fr:
          scarlet: "La poche de son cou peut se gonfler et se\ndégonfler comme un ballon. Elle devient\nde plus en plus flexible chaque fois qu’il mue."
          violet: "Ses imposantes narines étant faites pour expulser\ndu sable, elles sont peu performantes lorsqu’il\ns’agit de discerner des odeurs."
        it:
          scarlet: "La sacca nel collo può gonfiarsi come un\npalloncino, e diventa più elastica ogni volta\nche fa la muta."
          violet: "Le sue grandi narici sono specializzate\nnell’espellere sabbia, quindi l’olfatto di questo\nPokémon è abbastanza limitato."
        de:
          scarlet: "Der Beutel an Salangas Hals, den es wie einen\nLuftballon dehnen und zusammenziehen kann,\ngewinnt mit jeder Häutung an Elastizität."
          violet: "Da seine großen Nasenlöcher darauf spezialisiert\nsind, Sand zu verschießen, eignen sie sich nicht\ngut dazu, Gerüche zu unterscheiden."
        es:
          scarlet: "La saca del cuello, que puede inflarse y\ndesinflarse como un globo, se vuelve más\nelástica con cada muda de piel."
          violet: "Puesto que sus enormes orificios nasales\nestán especializados en la expulsión de arena,\nno percibe bien los olores."
        ko:
          scarlet: "풍선처럼 늘었다 줄었다 하는\n목의 주머니는 탈피를 거듭할수록\n신축성이 좋아진다."
          violet: "커다란 콧구멍은\n모래를 분사하는 일에 특화되어 있어\n냄새를 맡고 구별하는 것은 서툴다."
        zh_simp:
          scarlet: "颈部的囊就像气球一样\n能伸缩自如，而随着不断\n蜕皮，伸缩性就会增加。"
          violet: "它大大的鼻孔是专门为了\n喷射沙子而特别进化的，\n因此很不擅长分辨气味。"
        zh_trad:
          scarlet: "頸部的囊袋就像氣球一樣\n能伸縮自如，而隨著不斷\n蛻皮，伸縮性會隨之增加。"
          violet: "牠大大的鼻孔是專為\n噴射沙子而演變而成的，\n因此很不擅長分辨氣味。"
