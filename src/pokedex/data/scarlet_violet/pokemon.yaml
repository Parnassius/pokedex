          violet: "￹古￺ふる￻い　￹書物￺しょもつ￻に　￹記￺しる￻された\nテツノコウベという　￹物体￺ぶったい￻は\nこのポケモンかも　しれない。"
        jp_kanji:
          scarlet: "ロボットに　￹恋￺こい￻した　サザンドラの\n￹子￺こ￻どもと　オカルト￹雑誌￺ざっし￻が\n￹取￺と￻り￹上￺あ￻げた　ポケモンに　￹似￺に￻ている。"
          violet: "￹古￺ふる￻い　￹書物￺しょもつ￻に　￹記￺しる￻された\nテツノコウベという　￹物体￺ぶったい￻は\nこのポケモンかも　しれない。"
        en:
          scarlet: "It resembles a certain Pokémon introduced in a\nparanormal magazine, described as the offspring\nof a Hydreigon that fell in love with a robot."
          violet: "It’s possible that Iron Jugulis, an object\ndescribed in an old book, may actually\nbe this Pokémon."
        fr:
          scarlet: "Il ressemble à un Pokémon qui serait l’enfant\nd’un Trioxhydre amoureux d’un robot, selon une\nrevue consacrée aux phénomènes paranormaux."
          violet: "Ce Pokémon pourrait être l’entité évoquée dans\nun livre ancien sous le nom de « Têtes-de-Fer »."
        it:
          scarlet: "Somiglia a un Pokémon presentato da una rivista\ndi paranormale come il frutto dell’amore tra un\nHydreigon e un robot."
          violet: "Questo Pokémon potrebbe essere l’oggetto\ndescritto in un antico testo con il nome\ndi \"Colloferreo\"."
        de:
          scarlet: "Es ähnelt einem Pokémon, das einer esoterischen\nZeitschrift nach der Nachwuchs eines Trikephalo\nsein soll, welches sich in einen Roboter verliebte."
          violet: "Womöglich handelt es sich bei diesem Pokémon\num ein Objekt namens Eisenhals, das in einer\nalten Schrift beschrieben wurde."
        es:
          scarlet: "Se asemeja a un Pokémon que apareció en una\nrevista esotérica descrito como \"el fruto de un\nromance entre un Hydreigon y un robot\"."
          violet: "Es posible que se trate de Ferrocuello,\nun objeto mencionado en unos viejos escritos."
        ko:
          scarlet: "로봇과 사랑에 빠진\n삼삼드래의 자식이라며\n오컬트 잡지에서 다뤘던 포켓몬을 닮았다."
          violet: "오래된 서적에 기록된\n“무쇠머리”라는 물체는\n이 포켓몬을 말하는 것일지도 모른다."
        zh_simp:
          scarlet: "它与超自然杂志曾报道过的\n宝可梦很相似。报道中的宝可梦\n是爱上机器人的三首恶龙所生的孩子。"
          violet: "古老的书籍中所记载的\n叫做铁脖颈的物体\n说不定就是这只宝可梦。"
        zh_trad:
          scarlet: "牠與超自然雜誌曾報導過的\n寶可夢很相似。報導中的寶可夢是\n愛上機器人的三首惡龍所生的孩子。"
          violet: "古書裡所記載的\n叫做鐵脖頸的物體，\n說不定就是這隻寶可夢。"
