          scarlet: "￹無駄￺むだ￻な　￹肉￺にく￻を　￹捨￺す￻て￹去￺さ￻ると　￹心￺こころ￻が\n￹研￺と￻ぎ￹澄￺す￻まされ　サイコパワーが　￹上￺あ￻がる。\n￹贅肉￺ぜいにく￻は　￹淡白￺たんぱく￻だが　￹美味￺おい￻しい。"
          violet: "￹高￺たか￻い　￹再生能力￺さいせいのうりょく￻を　￹持￺も￻つ。\n￹体￺からだ￻の　￹贅肉￺ぜいにく￻を　￹捨￺す￻てて\n￹身軽￺みがる￻になり　￹獲物￺えもの￻に　￹突撃￺とつげき￻。"
        jp_kanji:
          scarlet: "￹無駄￺むだ￻な　￹肉￺にく￻を　￹捨￺す￻て￹去￺さ￻ると　￹心￺こころ￻が\n￹研￺と￻ぎ￹澄￺す￻まされ　サイコパワーが　￹上￺あ￻がる。\n￹贅肉￺ぜいにく￻は　￹淡白￺たんぱく￻だが　￹美味￺おい￻しい。"
          violet: "￹高￺たか￻い　￹再生能力￺さいせいのうりょく￻を　￹持￺も￻つ。\n￹体￺からだ￻の　￹贅肉￺ぜいにく￻を　￹捨￺す￻てて\n￹身軽￺みがる￻になり　￹獲物￺えもの￻に　￹突撃￺とつげき￻。"
        en:
          scarlet: "When Veluza discards unnecessary flesh, its mind\nbecomes honed and its psychic power increases.\nThe spare flesh has a mild but delicious flavor."
          violet: "Veluza has excellent regenerative capabilities.\nIt sheds spare flesh from its body to boost its\nagility, then charges at its prey."
        fr:
          scarlet: "Pour aiguiser son esprit et renforcer ses pouvoirs\npsychiques, il se défait de sa chair en trop.\nCelle-ci a un goût léger, mais exquis."
          violet: "Passé maître dans l’art de la régénération,\nce Pokémon se débarrasse de sa chair en trop\npour gagner en agilité, puis il fond sur ses proies."
        it:
          scarlet: "Si libera della carne in eccesso per affinare\ni sensi e aumentare i suoi poteri psichici.\nLe parti superflue sono leggere ma saporite."
          violet: "Ha eccellenti capacità rigenerative.\nSi libera della carne in eccesso per scagliarsi\npiù agilmente sulla preda."
        de:
          scarlet: "Wirft es überflüssige Teile seines Körpers ab,\nsteigen seine Psycho-Kräfte. Der Geschmack des\nabgeworfenen Fleisches ist simpel, aber lecker."
          violet: "Es kann sich sehr schnell regenerieren. Wirft es\nTeile seines Körpers ab, wird es leichter und ist\nsomit imstande, seine Beute flink zu attackieren."
        es:
          scarlet: "Al desechar la carne que no necesita, agudiza\nla mente y sus poderes psíquicos se incrementan.\nDicha carne tiene un sabor suave pero exquisito."
          violet: "Posee una magnífica capacidad regenerativa.\nSe desprende de carne que no necesita para\nganar agilidad y arremeter contra sus presas."
        ko:
          scarlet: "불필요한 살을 분리하면\n정신이 예민해져 사이코 파워가 상승한다.\n떨어진 살은 담백하고 맛있다."
          violet: "높은 재생 능력을 자랑한다.\n군살을 버려서 몸을 가볍게 하고\n먹잇감을 향해 돌격한다."
        zh_simp:
          scarlet: "舍弃不必要的肉，能让心灵\n得以磨砺，精神力量得以提升。\n赘肉口味清淡，却十分美味。"
          violet: "拥有强大的再生能力。\n会丢弃身上的赘肉来让自己\n变得轻盈后再去突击猎物。"
        zh_trad:
          scarlet: "捨棄不必要的肉，能使其心靈\n受到磨練，精神力量得以提升。\n贅肉滋味清淡，但卻相當可口。"
          violet: "擁有強大的再生能力。\n會丟棄身上的贅肉讓自己\n變得輕盈後突擊獵物。"
