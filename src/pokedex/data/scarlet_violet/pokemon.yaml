          scarlet: "￹様々￺さまざま￻な　￹鳴￺な￻き￹声￺ごえ￻を　￹使￺つか￻い￹分￺わ￻け\n￹仲間￺なかま￻と　コミュニケーションしながら\n￹狩￺か￻りを　おこなう　￹賢￺かしこ￻さを￹持￺も￻つ。"
          violet: "￹仲間￺なかま￻に　￹連絡￺れんらく￻するときと\n￹獲物￺えもの￻を　￹追￺お￻いつめるときでは\n￹鳴￺な￻き￹声￺ごえ￻の　￹種類￺しゅるい￻が　￹違￺ちが￻うのだ。"
        jp_kanji:
          scarlet: "￹様々￺さまざま￻な　￹鳴￺な￻き￹声￺ごえ￻を　￹使￺つか￻い￹分￺わ￻け\n￹仲間￺なかま￻と　コミュニケーションしながら\n￹狩￺か￻りを　おこなう　￹賢￺かしこ￻さを￹持￺も￻つ。"
          violet: "￹仲間￺なかま￻に　￹連絡￺れんらく￻するときと\n￹獲物￺えもの￻を　￹追￺お￻いつめるときでは\n￹鳴￺な￻き￹声￺ごえ￻の　￹種類￺しゅるい￻が　￹違￺ちが￻うのだ。"
        en:
          scarlet: "It is smart enough to hunt in packs. It uses a\nvariety of cries for communicating with others."
          violet: "It uses different kinds of cries for communicating\nwith others of its kind and for pursuing its prey."
        fr:
          scarlet: "Ce Pokémon est rusé. Il chasse en meute\nen communiquant avec les siens grâce à\nune variété de cris."
          violet: "Quand il communique avec ses semblables,\nil ne pousse pas les mêmes cris que quand\nil poursuit une proie."
        it:
          scarlet: "È abbastanza intelligente da cacciare in branco,\nutilizzando una varietà di versi per comunicare\ncon i compagni."
          violet: "Usa versi differenti per comunicare con i suoi\nsimili e per braccare la preda."
        de:
          scarlet: "Es ist intelligent genug, um bei der Jagd über\neine ganze Reihe von Rufen mit seinem Rudel zu\nkommunizieren."
          violet: "Sein Ruf bei der Beutejagd unterscheidet sich\nvon dem Ruf, den es zum Kommunizieren mit\nArtgenossen verwendet."
        es:
          scarlet: "Tiene suficiente inteligencia para cazar en\nmanada. Se comunica con los demás a través\nde diversos aullidos."
          violet: "Usa diferentes tipos de aullidos para\ncomunicarse con los de su especie o para\nperseguir a su presa."
        ko:
          scarlet: "수많은 울음소리를 가려 써서\n동료들과 의사소통을 하며\n사냥을 하는 지능을 가지고 있다."
          violet: "동료에게 연락할 때와\n먹이를 쫓을 때\n울음소리의 종류가 다르다."
        zh_simp:
          scarlet: "拥有十足的智慧，\n会在狩猎时使用多种\n不同的叫声来与伙伴沟通。"
          violet: "在联络伙伴和追赶猎物的\n时候，会分别发出\n不同种类的叫声。"
        zh_trad:
          scarlet: "擁有在狩獵的時候\n能使用各式各樣的叫聲\n來與夥伴溝通的智慧。"
          violet: "聯絡夥伴和追趕獵物\n的時候，會分別發出\n不同種類的叫聲。"
