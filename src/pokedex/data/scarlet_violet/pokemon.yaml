      hidden_ability: magic_bounce
      descriptions:
        jp_kana:
          scarlet: "￹棲￺す￻み￹処￺か￻の　￹森￺もり￻に　￹立￺た￻ち￹入￺い￻る￹者￺もの￻を\nビームで　￹気絶￺きぜつ￻させ　サイコパワーで\n￹強化￺きょうか￻した　ツメで　￹切￺き￻り￹裂￺さ￻く。"
          violet: "￹生￺い￻き￹物￺もの￻の　￹気配￺けはい￻が　しない　￹森￺もり￻は\n￹要注意￺ようちゅうい￻。　ブリムオンの\n￹縄張￺なわば￻りに　￹入￺はい￻ったかも　しれない。"
        jp_kanji:
          scarlet: "￹棲￺す￻み￹処￺か￻の　￹森￺もり￻に　￹立￺た￻ち￹入￺い￻る￹者￺もの￻を\nビームで　￹気絶￺きぜつ￻させ　サイコパワーで\n￹強化￺きょうか￻した　ツメで　￹切￺き￻り￹裂￺さ￻く。"
          violet: "￹生￺い￻き￹物￺もの￻の　￹気配￺けはい￻が　しない　￹森￺もり￻は\n￹要注意￺ようちゅうい￻。　ブリムオンの\n￹縄張￺なわば￻りに　￹入￺はい￻ったかも　しれない。"
        en:
          scarlet: "Hatterene knocks out those that intrude in its\nhome forest by blasting them with a beam, then\nslashing with claws enhanced by psychic power."
          violet: "Beware of forests that show no signs of living\ncreatures within. You may have wandered into\nHatterene’s territory."
        fr:
          scarlet: "Ce Pokémon neutralise tout être qui s’introduit\ndans sa forêt en tirant un rayon, puis le lacère de\nses griffes renforcées par ses pouvoirs psychiques."
          violet: "Il faut se méfier des forêts dépourvues de tout\nsigne de vie : il s’agit peut-être des territoires\nde Sorcilence."
        it:
          scarlet: "Stordisce con un raggio chiunque osi addentrarsi\nnel bosco in cui vive e lo squarcia con gli artigli,\nfortificati tramite i suoi poteri psichici."
          violet: "Quando ci si imbatte in un bosco all’apparenza\ndesolato, meglio fare attenzione: potrebbe\ntrattarsi del territorio di un Hatterene."
        de:
          scarlet: "Eindringlingen in seinen Wald raubt es mit einem\nStrahl das Bewusstsein, ehe es sie mit seiner\ndurch Psycho-Kräfte verstärkten Klaue zerfetzt."
          violet: "Bei Wäldern ohne Anzeichen von Leben sollte\nman Vorsicht walten lassen. Es ist gut möglich,\ndass man sich im Revier eines Silembrim befindet."
        es:
          scarlet: "Inmoviliza con un rayo y destroza con su garra\nreforzada con poder psíquico a todo aquel que\nse adentre en el bosque que habita."
          violet: "Hay que ir con cuidado al adentrarse en un\nbosque en el que no haya indicio de seres vivos,\npues puede tratarse del territorio de Hatterene."
        ko:
          scarlet: "거처로 삼은 숲에 들어오는 자를\n빔으로 기절시킨 뒤\n사이코 파워로 강화된 손톱으로 찢어발긴다."
          violet: "생명체의 기척이 느껴지지 않는 숲은\n주의해야 한다. 브리무음의 영역을\n침범한 것일 수도 있다."
        zh_simp:
          scarlet: "若有谁踏进它所栖息的森林，\n它就会放出光束让对方晕厥，\n再用以精神力量强化后的爪子将其撕碎。"
          violet: "要小心没有任何生物气息的\n森林，因为那代表你可能\n进入了布莉姆温的地盘。"
        zh_trad:
          scarlet: "只要有誰踏進自己棲息的森林裡，\n牠就會釋放光束讓對方昏厥，\n再以精神力量強化爪子後將其撕碎。"
          violet: "要小心沒有任何生物氣息\n的森林，因為那代表你可能\n進入了布莉姆溫的地盤。"
