          violet: "￹敵￺てき￻に　￹出会￺であ￻うと　クチバシに\n￹溜￺た￻めこんでいた　￹多￺おお￻くの　￹木￺き￻の￹実￺み￻の\nタネを　￹放射状￺ほうしゃじょう￻に　￹撃￺う￻ちだす。"
        jp_kanji:
          scarlet: "１００￹種類￺しゅるい￻の　￹鳴￺な￻き￹声￺ごえ￻を\n￹使￺つか￻い￹分￺わ￻けて　￹自分￺じぶん￻の　￹縄張￺なわば￻りを\nアピールしながら　￹飛￺と￻び￹回￺まわ￻っている。"
          violet: "￹敵￺てき￻に　￹出会￺であ￻うと　クチバシに\n￹溜￺た￻めこんでいた　￹多￺おお￻くの　￹木￺き￻の￹実￺み￻の\nタネを　￹放射状￺ほうしゃじょう￻に　￹撃￺う￻ちだす。"
        en:
          scarlet: "It flies around using a hundred different cries in\nvarious ways to declare its territory to others."
          violet: "When it encounters foes, it launches the many\nseeds stored in its beak in a radial burst."
        fr:
          scarlet: "Il est capable de produire une centaine de cris\ndifférents qu’il utilise pour marquer son territoire\nlorsqu’il survole ce dernier."
          violet: "Les nombreux pépins de Baies qu’il garde\ndans son bec lui servent de projectiles\ndont il mitraille les adversaires qu’il croise."
        it:
          scarlet: "Marca il proprio territorio emettendo 100\ncinguettii differenti mentre lo sorvola."
          violet: "Conserva nel becco dei semi e quando incontra\nun nemico o una preda, gliene spara contro una\nsventagliata."
        de:
          scarlet: "Es kann 100 verschiedene Rufe ausstoßen\nund nutzt sie, um anderen sein Revier zu\ndemonstrieren, während es umherfliegt."
          violet: "Trifft es auf Feinde, feuert es eine Salve Samen,\ndie es in seinem Schnabel angesammelt hat,\nauf sie ab."
        es:
          scarlet: "Anuncia su territorio haciendo gala de su\ndominio de cien formas de gorjeo distintas\nmientras lo sobrevuela."
          violet: "Cuando se topa con un enemigo, dispara las\nnumerosas semillas de bayas que guarda en el\npico como si fueran perdigones."
        ko:
          scarlet: "100종류의 울음소리를\n구분하여 사용하면서\n자신의 영역임을 어필하며 날아다닌다."
          violet: "적과 마주치면 부리에 모아 둔\n무수한 나무열매 씨앗을\n방사형으로 발사한다."
        zh_simp:
          scarlet: "会一边灵活运用１００种叫声\n宣示自己的地盘，一边飞来飞去。"
          violet: "遇到敌人时，会把大量\n储藏在鸟嘴里的树果种子\n呈放射状地发射出去。"
        zh_trad:
          scarlet: "會到處飛來飛去，\n並靈活使用１００種叫聲\n來宣示自己的地盤。"
          violet: "當遇到敵人的時候，\n就會把大量儲藏在鳥嘴裡的\n樹果種子呈放射狀地發射出去。"
