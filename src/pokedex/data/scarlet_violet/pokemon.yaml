          violet: "￹全身￺ぜんしん￻から　￹甘￺あま￻く　￹妖艶￺ようえん￻な\n￹香￺かお￻りを　￹漂￺ただよ￻わせて　メスの\nポケモンたちを　￹骨抜￺ほねぬ￻きにする。"
        jp_kanji:
          scarlet: "きめ￹細￺こま￻かく　￹艶￺つや￻やかな　￹肌￺はだ￻が　￹自慢￺じまん￻。\n￹尻尾￺しっぽ￻の　￹先端￺せんたん￻から\n￹凝縮￺ぎょうしゅく￻した　￹香￺かお￻りを　￹放￺はな￻つ。"
          violet: "￹全身￺ぜんしん￻から　￹甘￺あま￻く　￹妖艶￺ようえん￻な\n￹香￺かお￻りを　￹漂￺ただよ￻わせて　メスの\nポケモンたちを　￹骨抜￺ほねぬ￻きにする。"
        en:
          scarlet: "Oinkologne is proud of its fine, glossy skin.\nIt emits a concentrated scent from the tip of\nits tail."
          violet: "It entrances female Pokémon with the sweet,\nalluring scent that wafts from all over its body."
        fr:
          scarlet: "Sa peau lisse à l’aspect satiné fait sa fierté.\nLe bout de sa queue dégage un parfum puissant."
          violet: "Leur corps entier exhale un doux parfum\nenvoûtant qui séduit les Pokémon femelles."
        it:
          scarlet: "La pelle liscia e luminosa è il suo orgoglio.\nDalla punta della coda spande un profumo\naltamente concentrato."
          violet: "Emana da tutto il corpo un dolce profumo\nammaliante, irresistibile per i Pokémon femmina."
        de:
          scarlet: "Seine glatte, glänzende Haut ist sein ganzer\nStolz. Über die Spitze seines Schwanzes setzt es\neinen konzentrierten Duft frei."
          violet: "Sein ganzer Körper verströmt einen süßen,\nbezaubernden Duft, der weibliche Pokémon\nschwach werden lässt."
        es:
          scarlet: "Su piel suave y lustrosa es su mayor orgullo.\nDesprende una fragancia concentrada por la\npunta de la cola."
          violet: "Emana una fragancia dulce y almizclada por\ntodo el cuerpo que desarma por completo a\nlos Pokémon hembra."
        ko:
          scarlet: "곱고 윤기가 흐르는 피부를 자랑한다.\n꼬리 끝에서 응축된 향기를 내보낸다."
          violet: "온몸에서 달콤하고\n요염한 향기를 풍겨서\n암컷 포켓몬들을 정신 차리지 못하게 만든다."
        zh_simp:
          scarlet: "以自己细致透亮的肌肤为傲。\n会从尾巴的前端\n释放出凝缩的香气。"
          violet: "会从全身散发出香甜\n妖艳的气味，令雌性的\n宝可梦为它神魂颠倒。"
        zh_trad:
          scarlet: "以自己細緻透亮的肌膚\n為傲。會從尾巴的前端\n釋放出凝縮的香氣。"
          violet: "會從全身散發出香甜\n妖豔的氣味，令雌性的\n寶可夢為牠神魂顛倒。"
    oinkologne_female:
