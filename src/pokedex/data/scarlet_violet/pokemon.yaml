          scarlet: "￹虹色￺にじいろ￻と　￹言￺い￻われる　きれいな\nウロコは　￹見￺み￻る￹方向￺ほうこう￻を　￹変￺か￻えると\n￹様々￺さまざま￻な　￹色￺いろ￻に　￹変化￺へんか￻する。"
          violet: "￹澄￺す￻んだ　￹湖￺みずうみ￻の　￹底￺そこ￻に　￹棲￺す￻む。\n￹戦争￺せんそう￻が　￹起￺お￻こるとき　￹現￺あらわ￻れ\n￹人々￺ひとびと￻の　￹心￺こころ￻を　いやす。"
        jp_kanji:
          scarlet: "￹虹色￺にじいろ￻と　￹言￺い￻われる　きれいな\nウロコは　￹見￺み￻る￹方向￺ほうこう￻を　￹変￺か￻えると\n￹様々￺さまざま￻な　￹色￺いろ￻に　￹変化￺へんか￻する。"
          violet: "￹澄￺す￻んだ　￹湖￺みずうみ￻の　￹底￺そこ￻に　￹棲￺す￻む。\n￹戦争￺せんそう￻が　￹起￺お￻こるとき　￹現￺あらわ￻れ\n￹人々￺ひとびと￻の　￹心￺こころ￻を　いやす。"
        en:
          scarlet: "Its lovely scales are described as rainbow-\ncolored. They change color depending on\nthe viewing angle."
          violet: "It lives at the bottom of clear lakes. In times of\nwar, it shows itself, which soothes people’s\nminds and hearts."
        fr:
          scarlet: "Ses splendides écailles, qu’on compare aux\ncouleurs de l’arc-en-ciel, changent de teinte\nselon l’angle de vue."
          violet: "Ce Pokémon vit au fond des lacs limpides.\nIl se manifeste auprès des êtres humains\nen temps de guerre et apaise leurs cœurs."
        it:
          scarlet: "Le sue bellissime scaglie, che hanno i riflessi\ndell’arcobaleno, cambiano colore a seconda\ndell’angolazione da cui le si guarda."
          violet: "Vive nelle profondità di laghi dalle acque\ncristalline. Quando scoppia una guerra, si\nmanifesta, placando i cuori degli esseri umani."
        de:
          scarlet: "Seine hübschen Schuppen werden als\nregenbogenfarben beschrieben. Ihre Farbe\nverändert sich je nach Blickwinkel."
          violet: "Es lebt auf dem Grund von klaren, ungetrübten\nSeen. Zu Kriegszeiten erscheint es, um die\nHerzen der Menschen zu besänftigen."
        es:
          scarlet: "Sus preciosas escamas tienen todos los\ncolores del arcoíris y cambian de color\nsegún el ángulo de visión."
          violet: "Habita en lo más profundo de lagos de agua\ncristalina. En tiempos de guerra, aparece\npara calmar el corazón de la gente."
        ko:
          scarlet: "무지개색이라고 전해지는\n아름다운 비늘은 보는 방향을 바꾸면\n여러 가지 색으로 변화한다."
          violet: "맑은 호수 바닥에 산다.\n전쟁이 일어날 때 나타나\n사람들의 마음을 치유한다."
        zh_simp:
          scarlet: "号称彩虹色的美丽鳞片\n只要从不同的方向观看，\n就会变化为各种颜色。"
          violet: "栖息在清澈的湖底。\n在发生战争时出现，\n治愈人们的心。"
        zh_trad:
          scarlet: "被稱為是虹色的美麗鱗片\n若是改變觀看的方向，\n就會變化成各種顏色。"
          violet: "棲息在清澈的湖底。\n在發生戰爭時出現，\n治癒人們的心。"
