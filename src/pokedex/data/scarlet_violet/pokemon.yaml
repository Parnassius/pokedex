          scarlet: "￹懐￺なつ￻いた　￹相手￺あいて￻に　￹意地悪￺いじわる￻するのは\n￹負￺ふ￻の　￹感情￺かんじょう￻を　￹取￺と￻り￹込￺こ￻まないと\n￹自分￺じぶん￻も　イライラしてしまうからだ。"
          violet: "￹群￺む￻れを　￹作￺つく￻って　￹暮￺く￻らし　おたがいに\n￹悪戯￺いたずら￻や　￹嫌￺いや￻がらせを　￹仕掛￺しか￻けて\nその￹腕￺うで￻を　￹磨￺みが￻いているぞ。"
        jp_kanji:
          scarlet: "￹懐￺なつ￻いた　￹相手￺あいて￻に　￹意地悪￺いじわる￻するのは\n￹負￺ふ￻の　￹感情￺かんじょう￻を　￹取￺と￻り￹込￺こ￻まないと\n￹自分￺じぶん￻も　イライラしてしまうからだ。"
          violet: "￹群￺む￻れを　￹作￺つく￻って　￹暮￺く￻らし　おたがいに\n￹悪戯￺いたずら￻や　￹嫌￺いや￻がらせを　￹仕掛￺しか￻けて\nその￹腕￺うで￻を　￹磨￺みが￻いているぞ。"
        en:
          scarlet: "The reason this Pokémon causes trouble for those\nit feels close to is because Impidimp itself gets\nirritable if it can’t absorb negative emotions."
          violet: "They live in groups, pestering and playing pranks\non each other to polish their troublemaking skills."
        fr:
          scarlet: "Ce Pokémon joue de mauvais tours à ses proches,\ncar il a besoin d’absorber des émotions négatives\npour être de bonne humeur."
          violet: "Ils vivent en groupe et se jouent mutuellement\nde mauvais tours afin d’affûter leurs esprits\nfacétieux."
        it:
          scarlet: "È intrattabile persino nei confronti di chi si è\nguadagnato il suo affetto. Questo perché se\nnon assorbe emozioni negative non è tranquillo."
          violet: "Vivono in gruppi. Si fanno dispetti e cattiverie\na vicenda per affinare la propria abilità nel\ncreare problemi."
        de:
          scarlet: "Bähmon ärgert gern jene, die ihm nahe stehen,\nweil es sich aufregt, wenn es keine negative\nEnergie absorbieren kann."
          violet: "Bähmon leben in Gruppen, innerhalb derer sie\nsich gegenseitig Streiche spielen und einander\närgern. So werden sie immer besser darin."
        es:
          scarlet: "Trata mal a aquellos por los que siente apego\nporque se irrita si no absorbe sentimientos\nnegativos."
          violet: "Forman manadas en las cuales se hacen rabiar los\nunos a los otros a base de trastadas para pulir sus\ndesvergonzadas habilidades."
        ko:
          scarlet: "친해진 상대에게 장난을 치는 것은\n부정한 감정을 흡수하지 못하면\n자신도 짜증이 나기 때문이다."
          violet: "무리를 만들어 지내면서\n서로에게 장난을 치거나 짓궂은 짓을 하며\n실력을 갈고닦는다."
        zh_simp:
          scarlet: "它之所以会欺负与自己\n亲密的对象，是因为如果\n不吸收负面情绪，就会很烦躁。"
          violet: "成群结队地生活。\n彼此之间会恶作剧和找不痛快，\n以此来磨炼制造麻烦的技能。"
        zh_trad:
          scarlet: "之所以會欺負與自己親密\n的對象，是因為如果不攝取\n負面情緒，就會變得很煩躁。"
          violet: "會成群住在一起，並透過\n惡搞對方和彼此找碴\n來磨練製造麻煩的身手。"
