        jp_kana:
          scarlet: "￹一度￺いちど￻　￹姿￺すがた￻を　￹現￺あらわ￻すと\nまわりを　すべて　￹焼￺や￻き￹尽￺つ￻くさないと\n￹怒￺いか￻りが　￹鎮￺しず￻まらない　という。"
          violet: "￹世￺よ￻の￹中￺なか￻で　￹争￺あらそ￻いが　￹多￺おお￻くなると\nどこからともなく　￹現￺あらわ￻れて\nあたりを　￹焼野原￺やけのはら￻に　していく。"
        jp_kanji:
          scarlet: "￹一度￺いちど￻　￹姿￺すがた￻を　￹現￺あらわ￻すと\nまわりを　すべて　￹焼￺や￻き￹尽￺つ￻くさないと\n￹怒￺いか￻りが　￹鎮￺しず￻まらない　という。"
          violet: "￹世￺よ￻の￹中￺なか￻で　￹争￺あらそ￻いが　￹多￺おお￻くなると\nどこからともなく　￹現￺あらわ￻れて\nあたりを　￹焼野原￺やけのはら￻に　していく。"
        en:
          scarlet: "Once it appears, it goes on a rampage.\nIt remains enraged until it demolishes\neverything around it."
          violet: "It appears whenever there is world conflict,\nburning down any place it travels through."
        fr:
          scarlet: "Lorsqu’il apparaît, il saccage tout. Sa fureur\nne se calme pas tant qu’il n’a pas tout détruit."
          violet: "Il apparaît à chaque conflit mondial, semant\nchaos et destruction sur son passage."
        it:
          scarlet: "Quando esce allo scoperto in preda\nalla furia, non si placa finché non ha\nraso al suolo ogni cosa."
          violet: "Quando nel mondo regnano i conflitti,\nappare dal nulla e mette a ferro e fuoco\ntutto ciò che incontra sul proprio cammino."
        de:
          scarlet: "Taucht es auf, randaliert es. Es beruhigt sich erst,\nwenn es alles um sich zerstört hat."
          violet: "Es taucht aus dem Nichts auf, wenn die Welt sich\nim Konflikt befindet, und brennt jeden Ort nieder,\nden es passiert."
        es:
          scarlet: "Cuando aparece, monta en cólera.\nNo deja de estar furioso hasta que\nlo destruye todo."
          violet: "Cuando reina el conflicto en el mundo,\naparece de la nada y reduce a cenizas\ntodo lo que se cruza en su camino."
        ko:
          scarlet: "한번 모습을 나타내면\n주변 전체를 태워 버리지 않고는\n분노가 가라앉지 않는다고 전해진다."
          violet: "세상에 다툼이 많아지면\n어디선가 나타나서\n주위를 불바다로 만들어 버린다."
        zh_simp:
          scarlet: "据说暴鲤龙一旦现身，\n不把周围的一切都燃烧殆尽，\n它的怒火就不会平息。"
          violet: "世上的斗争一旦增多，\n它就会不知从何处出现，\n将周围烧成一片荒野。"
        zh_trad:
          scarlet: "據說暴鯉龍一旦現身，\n如果不把周圍的一切都\n燃燒殆盡，怒火就不會平息。"
          violet: "世上的紛爭一旦增多，\n就會不知從何處出現，\n將周圍燒成一片荒野。"
