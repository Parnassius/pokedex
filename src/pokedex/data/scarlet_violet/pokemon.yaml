      descriptions:
        jp_kana:
          scarlet: "ムクホークになると　￹群￺む￻れから\n￹離￺はな￻れて　１￹匹￺ぴき￻で　￹生￺い￻きていく。\n￹強靭￺きょうじん￻な　￹翼￺つばさ￻を　￹持￺も￻っている。"
          violet: "￹自分￺じぶん￻の　￹体￺からだ￻が　￹傷￺きず￻つこうとも\n￹攻撃￺こうげき￻を　やめなくなった。\nトサカの　￹形￺かたち￻を　￹気￺き￻にしている。"
        jp_kanji:
          scarlet: "ムクホークになると　￹群￺む￻れから\n￹離￺はな￻れて　１￹匹￺ぴき￻で　￹生￺い￻きていく。\n￹強靭￺きょうじん￻な　￹翼￺つばさ￻を　￹持￺も￻っている。"
          violet: "￹自分￺じぶん￻の　￹体￺からだ￻が　￹傷￺きず￻つこうとも\n￹攻撃￺こうげき￻を　やめなくなった。\nトサカの　￹形￺かたち￻を　￹気￺き￻にしている。"
        en:
          scarlet: "When Staravia evolve into Staraptor,\nthey leave the flock to live alone.\nThey have sturdy wings."
          violet: "It never stops attacking even if it is\ninjured. It fusses over the shape of\nits comb."
        fr:
          scarlet: "Quand Étourvol évolue en Étouraptor, il quitte\nson groupe pour vivre seul. Ses ailes sont très\nsouples et puissantes."
          violet: "Même blessé, ce Pokémon combattra sans\nrelâche. Il se soucie beaucoup de la forme\nde sa huppe."
        it:
          scarlet: "Non appena si evolve, lascia lo stormo e\naffronta la vita da solo. Le sue ali sono\nestremamente robuste."
          violet: "Non smette di attaccare neanche\nquando è ferito. Si premura di avere\nla cresta sempre in ordine."
        de:
          scarlet: "Entwickelt sich Staravia zu Staraptor, verlässt es\nden Schwarm und lebt allein. Die Spannweite\nseiner Flügel ist gigantisch."
          violet: "Selbst mit einer Verletzung greift es immer weiter\nan. Es legt großen Wert auf das Aussehen seines\nKamms."
        es:
          scarlet: "Al evolucionar a Staraptor, deja su bandada y\npasa a vivir en soledad. Sus alas son inmensas."
          violet: "Jamás deja de atacar, aunque lo hayan herido.\nLe preocupa mucho la forma de su cresta."
        ko:
          scarlet: "찌르호크가 되면 무리에서\n떨어져 혼자서 살아간다.\n강인한 날개를 가지고 있다."
          violet: "자신의 몸이 상처를 입더라도\n공격을 그만두지 않게 되었다.\n볏의 모양을 신경 쓴다."
        zh_simp:
          scarlet: "变为姆克鹰后，\n就会脱离群体独自生活。\n拥有强韧的翅膀。"
          violet: "即使自己的身体受了伤\n也不会停止攻击。\n很在意自己头冠的形状。"
        zh_trad:
          scarlet: "變成姆克鷹後，\n就會脫離群體獨自生活。\n擁有強韌的翅膀。"
          violet: "即使自己受了傷\n也不會停止攻擊。\n很在意自己頭冠的形狀。"
