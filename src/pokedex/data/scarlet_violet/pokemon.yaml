          violet: "￹体温￺たいおん￻を　￹下￺さ￻げることで　￹全身￺ぜんしん￻の\n￹体毛￺たいもう￻を　￹凍￺こお￻らせて　￹鋭￺するど￻く　￹尖￺とが￻った\n￹針￺ハリ￻のようにして　￹飛￺と￻ばす。"
        jp_kanji:
          scarlet: "￹体温￺たいおん￻を　￹自在￺じざい￻に　コントロールし\n￹大気￺たいき￻の　￹水分￺すいぶん￻を　￹凍￺こお￻らせて\nダイヤモンドダストを　￹巻￺ま￻き￹起￺お￻こす。"
          violet: "￹体温￺たいおん￻を　￹下￺さ￻げることで　￹全身￺ぜんしん￻の\n￹体毛￺たいもう￻を　￹凍￺こお￻らせて　￹鋭￺するど￻く　￹尖￺とが￻った\n￹針￺ハリ￻のようにして　￹飛￺と￻ばす。"
        en:
          scarlet: "It can control its body temperature at will.\nThis enables it to freeze the moisture in the\natmosphere, creating flurries of diamond dust."
          violet: "It lowers its body heat to freeze its fur. The hairs\nthen become like needles it can fire."
        fr:
          scarlet: "Il peut contrôler la température de son corps\nà volonté et créer des cristaux de glace en gelant\nl’humidité de l’air."
          violet: "Il abaisse la température de son corps\npour transformer ses poils en aiguilles\nde glace qu’il projette sur l’ennemi."
        it:
          scarlet: "Può modificare a piacimento la sua temperatura\ncorporea. Così può congelare l’umidità dell’aria\ne creare cristalli di ghiaccio intorno a sé."
          violet: "Abbassa la temperatura del corpo per ghiacciare\ni propri peli e lanciarli come aghi sottilissimi."
        de:
          scarlet: "Es kann seine Körpertemperatur frei regulieren.\nIndem es die Wasserbestandteile der Luft\ngefrieren lässt, wirbelt es Diamantstaub auf."
          violet: "Wenn es seine Körpertemperatur senkt, erstarren\ndie Haare seines Fells zu Eis und dienen ihm als\nnadelartige Geschosse."
        es:
          scarlet: "Controla a su antojo la temperatura corporal y\ncongela las partículas de agua que flotan en el\naire para provocar ráfagas de nieve en polvo."
          violet: "Al reducir su temperatura corporal, su pelaje se\ncongela y se convierte en afilados pinchos que\npuede disparar."
        ko:
          scarlet: "체온을 자유자재로 컨트롤해\n대기의 수분을 얼려서\n다이아몬드더스트를 일으킨다."
          violet: "체온을 내리는 것으로\n전신의 털을 얼려서 날카롭고\n뾰족한 바늘처럼 만들어 날린다."
        zh_simp:
          scarlet: "自由地控制体温，\n让大气中的水分冻结，\n卷起冰晶。"
          violet: "通过降低体温让全身的体毛\n冻得像锐利的尖针一样，\n然后射出。"
        zh_trad:
          scarlet: "能自由地控制體溫，\n讓大氣中的水分凍結，\n捲起冰晶。"
          violet: "透過使體溫下降，\n讓全身的體毛結凍，\n並像尖銳的針一般發射。"
