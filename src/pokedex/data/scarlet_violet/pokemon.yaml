      descriptions:
        jp_kana:
          scarlet: "￹常￺つね￻に　￹角材￺かくざい￻を　￹持￺も￻ち￹歩￺ある￻き\n￹土木工事￺どぼくこうじ￻を　￹手伝￺てつだ￻う。　￹育￺そだ￻つと\n￹大￺おお￻きな　￹角材￺かくざい￻に　￹持￺も￻ち￹替￺か￻える。"
          violet: "￹角材￺かくざい￻を　￹振￺ふ￻り￹回￺まわ￻して　￹戦￺たたか￻う。\n￹重￺おも￻い　￹角材￺かくざい￻を　￹苦￺く￻もなく\n￹持￺も￻つようになると　￹進化￺しんか￻は　￹近￺ちか￻い。"
        jp_kanji:
          scarlet: "￹常￺つね￻に　￹角材￺かくざい￻を　￹持￺も￻ち￹歩￺ある￻き\n￹土木工事￺どぼくこうじ￻を　￹手伝￺てつだ￻う。　￹育￺そだ￻つと\n￹大￺おお￻きな　￹角材￺かくざい￻に　￹持￺も￻ち￹替￺か￻える。"
          violet: "￹角材￺かくざい￻を　￹振￺ふ￻り￹回￺まわ￻して　￹戦￺たたか￻う。\n￹重￺おも￻い　￹角材￺かくざい￻を　￹苦￺く￻もなく\n￹持￺も￻つようになると　￹進化￺しんか￻は　￹近￺ちか￻い。"
        en:
          scarlet: "Always carrying squared logs, they help out\nwith construction. As they grow, they carry\nbigger logs."
          violet: "It fights by swinging a piece of lumber around.\nIt is close to evolving when it can handle heavy\nlumber without difficulty."
        fr:
          scarlet: "Ce Pokémon porte toujours une poutre en bois\net aime aider aux travaux. Il passe à une plus\ngrande poutre quand il grandit."
          violet: "Il combat en faisant tournoyer une poutre. Quand\nil parvient à transporter de lourds madriers sans\nproblème, cela indique qu’il va bientôt évoluer."
        it:
          scarlet: "Porta sempre con sé una trave di legno e aiuta\nnei lavori edilizi. Quando cresce si sceglie\nuna trave più grande."
          violet: "Lotta brandendo una trave di legno. Quando\narriva a portarla senza sforzo, l’evoluzione\nè vicina."
        de:
          scarlet: "Es trägt stets einen Holzbalken bei sich und hilft\nauf Baustellen aus. Im Laufe der Zeit sucht es sich\neinen größeren Balken."
          violet: "Es kämpft, indem es einen Holzbalken schwingt.\nFällt es ihm leicht, den schweren Balken zu\ntragen, ist seine Entwicklung nah."
        es:
          scarlet: "Siempre lleva una viga de madera y ayuda en\nlas construcciones. Se busca vigas más grandes\nconforme crece."
          violet: "Lucha bamboleando vigas de madera. Cuando\ntransporta vigas muy pesadas sin dificultad, es\nseñal de que va a evolucionar."
        ko:
          scarlet: "항상 각재를 들고 다니며\n토목 공사를 도와준다.\n자라면 큰 각재로 바꿔 든다."
          violet: "각목을 휘두르며 싸운다.\n무거운 각목도 어렵지 않게 들 수 있으면\n곧 진화한다는 뜻이다."
        zh_simp:
          scarlet: "经常拿着方材走，\n帮忙做土木工程。\n长大后会换大的方材拿。"
          violet: "会挥舞方材战斗。如果能\n毫不费劲地拿起沉重的方材，\n就代表它进化的日子要到了。"
        zh_trad:
          scarlet: "總是隨身帶著方形木材，\n在土木工程中幫忙。\n成長後會改拿更大的方形木材。"
          violet: "會亂揮木材來戰鬥。如果可以\n不費勁地搬起沉重的木材，\n就代表牠即將要進化了。"
