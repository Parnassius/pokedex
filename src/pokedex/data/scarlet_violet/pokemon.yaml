      hidden_ability: corrosion
      descriptions:
        jp_kana:
          scarlet: "￹危険￺きけん￻を　￹察知￺さっち￻すると\n￹結晶￺けっしょう￻の　￹花￺はな￻びらを　￹開￺ひら￻いて　￹円錐形￺えんすいけい￻の\n￹体￺からだ￻から　ビームを　￹発射￺はっしゃ￻する。"
          violet: "￹毒￺どく￻エネルギーが　￹結晶化￺けっしょうか￻した　￹花￺はな￻びらは\nテラスタルの　￹宝石￺ほうせき￻に　￹似￺に￻ていると\n￹最近￺さいきん￻　￹判明￺はんめい￻した。"
        jp_kanji:
          scarlet: "￹危険￺きけん￻を　￹察知￺さっち￻すると\n￹結晶￺けっしょう￻の　￹花￺はな￻びらを　￹開￺ひら￻いて　￹円錐形￺えんすいけい￻の\n￹体￺からだ￻から　ビームを　￹発射￺はっしゃ￻する。"
          violet: "￹毒￺どく￻エネルギーが　￹結晶化￺けっしょうか￻した　￹花￺はな￻びらは\nテラスタルの　￹宝石￺ほうせき￻に　￹似￺に￻ていると\n￹最近￺さいきん￻　￹判明￺はんめい￻した。"
        en:
          scarlet: "When this Pokémon detects danger, it will open\nup its crystalline petals and fire beams from its\nconical body."
          violet: "Glimmora’s petals are made of crystallized\npoison energy. It has recently become evident\nthat these petals resemble Tera Jewels."
        fr:
          scarlet: "Lorsqu’il détecte un danger, il ouvre ses pétales\ncristallins et son corps conique tire un rayon\nlaser."
          violet: "On a récemment découvert que ses pétales\nconstitués d’énergie toxique cristallisée\nressemblent à des Joyaux Téracristal."
        it:
          scarlet: "Se avverte un pericolo, schiude i petali\ndi cristallo ed emette dei raggi dal suo\ncorpo conico."
          violet: "Recentemente è emerso che i suoi petali fatti\ndi energia Veleno cristallizzata sono affini\nalle pietre preziose del fenomeno Teracristal."
        de:
          scarlet: "Erkennt es Gefahr, öffnet es seine kristallenen\nBlütenblätter, um aus seinem kegelförmigen\nKörper Strahlen abzufeuern."
          violet: "Vor Kurzem wurde festgestellt, dass seine\nBlütenblätter, die aus kristallisierter toxischer\nEnergie bestehen, Terakristallen ähneln."
        es:
          scarlet: "En cuanto percibe peligro, abre sus pétalos de\ncristal y despide rayos por su cuerpo en forma\nde cono."
          violet: "Sus pétalos están hechos de energía venenosa\ncristalizada. Recientemente se ha puesto de\nmanifiesto su parecido con las joyas Teracristal."
        ko:
          scarlet: "위험을 감지하면\n결정으로 된 꽃잎을 펼친 뒤\n원뿔 모양의 몸에서 빔을 발사한다."
          violet: "독 에너지가 결정화한 꽃잎은\n테라스탈의 보석을 닮은 것으로\n최근에 밝혀졌다."
        zh_simp:
          scarlet: "只要感应到危险，\n就会张开结晶的花瓣，\n从圆锥形的身体发射光束。"
          violet: "最近发现它的毒之能量\n结晶化之后所形成的花瓣\n与太晶的宝石类似。"
        zh_trad:
          scarlet: "只要察覺到危險，\n就會張開結晶的花瓣，\n從圓錐形的身體發射光束。"
          violet: "最近發現牠的毒能量\n結晶化後所形成的花瓣\n與太晶的寶石類似。"
