          violet: "１０８￹個￺こ￻の　￹魂￺たましい￻で　できている。\n￹二度￺にど￻と　￹悪￺わる￻さを　しないように\n￹要石￺かなめいし￻に　￹縛￺しば￻りつけられている。"
        jp_kanji:
          scarlet: "いつも　￹悪￺わる￻さばかり　していたら\n￹不思議￺ふしぎ￻な　￹術￺じゅつ￻で　￹本体￺ほんたい￻を\n￹要石￺かなめいし￻に　￹縛￺しば￻りつけられた。"
          violet: "１０８￹個￺こ￻の　￹魂￺たましい￻で　できている。\n￹二度￺にど￻と　￹悪￺わる￻さを　しないように\n￹要石￺かなめいし￻に　￹縛￺しば￻りつけられている。"
        en:
          scarlet: "Its constant mischief and misdeeds resulted\nin it being bound to an Odd Keystone by a\nmysterious spell."
          violet: "It was formed by uniting 108 spirits. It has been\nbound to the Odd Keystone to keep it from\ndoing any mischief."
        fr:
          scarlet: "Son mauvais comportement lui a valu d’être\nenchaîné à une Clé de Voûte par un mystérieux\nsortilège."
          violet: "Ce Pokémon composé de 108 esprits a été\nenchaîné à une Clé de Voûte pour l’empêcher\nde nuire à nouveau."
        it:
          scarlet: "A causa del suo comportamento molesto\nè stato imprigionato in una Roccianima\ncon un misterioso incantesimo."
          violet: "È formato da 108 spiriti che sono stati sigillati\nin una Roccianima affinché non facessero mai\npiù del male."
        de:
          scarlet: "Aufgrund seiner ständigen Untaten wurde es\nmit mysteriösen Künsten an einen Spiritkern\ngebunden."
          violet: "Es besteht aus 108 Geistern, die an einen\nSpiritkern gebunden sind, damit sie nichts mehr\nanstellen."
        es:
          scarlet: "Por sus constantes fechorías se le acabó\nuniendo a una Piedra Espíritu con un misterioso\nhechizo."
          violet: "Está compuesto de 108 espíritus. Fue unido a\nuna Piedra Espíritu para evitar que hiciera más\nfechorías."
        ko:
          scarlet: "항상 나쁜 짓만 하고 있었기에\n신비한 술법에 의해 본모습을\n쐐기돌에 속박당했다."
          violet: "108개의 영혼으로 되어 있다.\n두 번 다시 나쁜 짓을 하지 못하게\n쐐기돌에 묶여 있다."
        zh_simp:
          scarlet: "总是作恶多端，\n不料有一天本体被神奇的\n法术绑缚在了楔石上。"
          violet: "由１０８个魂魄构成。\n为了防止再度作恶，\n而被绑缚在了楔石上。"
        zh_trad:
          scarlet: "總是作惡多端，\n不料有一天本體被\n神奇法術綁縛到了楔石上。"
          violet: "由１０８個靈魂構成。\n為了防止自己再度作惡，\n而被綁縛到了楔石上。"
