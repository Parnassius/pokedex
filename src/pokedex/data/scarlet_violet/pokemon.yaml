      descriptions:
        jp_kana:
          scarlet: "１￹匹￺ぴき￻の　￹電力￺でんりょく￻は　￹小￺ちい￻さいが\nたくさんの　シビシラスが　つながると\n￹雷￺かみなり￻と　￹同￺おな￻じ　￹威力￺いりょく￻になる。"
          violet: "￹群￺む￻れで　￹行動￺こうどう￻する　ポケモン。\n￹電気￺でんき￻を　￹作￺つく￻る　￹器官￺きかん￻を　￹持￺も￻ち\nピンチになると　￹発電￺はつでん￻する。"
        jp_kanji:
          scarlet: "１￹匹￺ぴき￻の　￹電力￺でんりょく￻は　￹小￺ちい￻さいが\nたくさんの　シビシラスが　つながると\n￹雷￺かみなり￻と　￹同￺おな￻じ　￹威力￺いりょく￻になる。"
          violet: "￹群￺む￻れで　￹行動￺こうどう￻する　ポケモン。\n￹電気￺でんき￻を　￹作￺つく￻る　￹器官￺きかん￻を　￹持￺も￻ち\nピンチになると　￹発電￺はつでん￻する。"
        en:
          scarlet: "While one alone doesn’t have much power,\na chain of many Tynamo can be as powerful\nas lightning."
          violet: "These Pokémon move in schools. They have an\nelectricity-generating organ, so they discharge\nelectricity if in danger."
        fr:
          scarlet: "Tout seuls, ils ne dégagent pas beaucoup\nd’électricité, mais un banc d’Anchwatt produit\nla même puissance qu’un éclair."
          violet: "Les Anchwatt agissent en groupe. Ils possèdent\nun organe produisant de l’électricité et lancent\ndes décharges en cas de danger."
        it:
          scarlet: "La carica elettrica di un Tynamo è debole, ma se\npiù esemplari si uniscono raggiungono la potenza\ndi un fulmine."
          violet: "Pokémon che agisce in gruppo. Dotato di un\napparato che genera elettricità, nei momenti\ncritici emette scariche elettriche."
        de:
          scarlet: "Allein erzeugt es nur wenig Strom, doch wenn\nsich viele Zapplardin miteinander verbinden,\ngleicht ihre Kraft der eines Blitzes."
          violet: "Es besitzt ein Organ, mit dem es im Notfall\nElektrizität erzeugen kann. Es tritt stets in\nSchwärmen auf."
        es:
          scarlet: "La electricidad de uno solo es insignificante,\npero, si multitud de Tynamo se conectan,\nconsiguen la potencia de un rayo."
          violet: "Actúa siempre en su cardumen. Cuenta con\nun órgano que genera electricidad y la libera\ncuando está en peligro."
        ko:
          scarlet: "한 마리의 전력은 적지만\n많은 저리어가 연결되면\n번개와 같은 위력이 된다."
          violet: "무리 지어 행동하는 포켓몬이다.\n전기를 만드는 기관이 있으며\n위급해지면 전기를 방출한다."
        zh_simp:
          scarlet: "１条的电力虽小，\n但是许多麻麻小鱼聚在一起，\n其威力可以比得上雷电。"
          violet: "会成群行动的宝可梦。\n拥有制造电力的器官，\n遇到危机时就会发电。"
        zh_trad:
          scarlet: "１隻的電力雖小，\n但只要多隻麻麻小魚聚集在一起，\n威力便可媲美雷電。"
          violet: "集體行動的寶可夢。\n擁有製造電力的器官，\n遇到危機時就會發電。"
