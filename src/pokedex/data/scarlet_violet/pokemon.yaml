          violet: "￹夕暮￺ゆうぐ￻れ￹時￺どき￻になると　￹自分￺じぶん￻と　￹同￺おな￻じ\n￹白色￺しろいろ￻の　￹花￺はな￻が　￹咲￺さ￻く　￹土地￺とち￻を　￹見￺み￻つけて\n￹眠￺ねむ￻りに　つく。"
        jp_kanji:
          scarlet: "￹白￺しろ￻い￹花￺はな￻に　￹乗￺の￻った　フラベベ。\n￹風￺かぜ￻に　￹吹￺ふ￻かれて　￹流￺なが￻されるまま\n￹漂￺ただよ￻い　￹花畑￺はなばたけ￻を　￹目指￺めざ￻す。"
          violet: "￹夕暮￺ゆうぐ￻れ￹時￺どき￻になると　￹自分￺じぶん￻と　￹同￺おな￻じ\n￹白色￺しろいろ￻の　￹花￺はな￻が　￹咲￺さ￻く　￹土地￺とち￻を　￹見￺み￻つけて\n￹眠￺ねむ￻りに　つく。"
        en:
          scarlet: "This Flabébé rides a white flower. The wind\nblows this Pokémon around as it drifts in search\nof flower gardens."
          violet: "When evening falls, it searches out a place\nblooming with flowers of the same white color\nas itself, and then it goes to sleep."
        fr:
          scarlet: "Ce Flabébé est perché sur une fleur blanche.\nIl se laisse porter par le vent, à la recherche\nde champs de fleurs."
          violet: "À la nuit tombée, il cherche un endroit\noù poussent des fleurs du même blanc\nque la sienne, afin de dormir dessus."
        it:
          scarlet: "Un Flabébé su un fiore bianco. Si lascia\ntrasportare dal vento alla ricerca di un prato\nfiorito."
          violet: "Al tramonto cerca un terreno in cui siano\nsbocciati fiori bianchi come il suo per andare\na dormire."
        de:
          scarlet: "Dieses Flabébé umklammert eine weiße Blume.\nKommt Wind auf, lässt es sich von diesem durch\ndie Luft bis zur nächsten Blumenwiese treiben."
          violet: "In der Abenddämmerung sucht es nach Orten,\nan denen Blumen so weiß wie seine eigene\nblühen. Dort legt es sich dann schlafen."
        es:
          scarlet: "Cabalga una flor blanca. Se deja llevar por el\nviento mientras va en busca de un campo de\nflores."
          violet: "Cuando cae la tarde, busca lugares donde\nflorezcan flores de un blanco como el suyo\npara pasar la noche."
        ko:
          scarlet: "하얀 꽃을 탄 플라베베.\n바람에 날려가는 대로\n떠다니며 꽃밭을 찾아간다."
          violet: "해 질 녘이 되면 자신의 것과 같은\n하얀 꽃이 핀 땅을 찾은 다음\n그곳에서 잔다."
        zh_simp:
          scarlet: "乘着白花的花蓓蓓。\n会以花海为目的地\n随着风四处飘荡。"
          violet: "一到黄昏，它就会去找\n和自己一样绽放着\n白花的地方睡觉。"
        zh_trad:
          scarlet: "乘著白花的花蓓蓓。\n會以花海為目的地，\n隨風四處飄蕩。"
          violet: "一到黃昏，牠就會去找\n盛開著和自己的花\n一樣是白花的地方睡覺。"
