          violet: "￹胃袋￺いぶくろ￻が　￹小￺ちい￻さいので　ポケットに\n￹入￺い￻れた　タネを　いつも　￹食￺た￻べてないと\nすぐに　お￹腹￺なか￻が　￹空￺す￻いてしまうのだ。"
        jp_kanji:
          scarlet: "いつも　タネを　￹食￺た￻べて　￹空腹￺くうふく￻を\n￹抑￺おさ￻えているが　￹空腹￺くうふく￻が　￹過￺す￻ぎると\n￹心￺こころ￻が　￹荒￺すさ￻んで　￹粗暴￺そぼう￻になる。"
          violet: "￹胃袋￺いぶくろ￻が　￹小￺ちい￻さいので　ポケットに\n￹入￺い￻れた　タネを　いつも　￹食￺た￻べてないと\nすぐに　お￹腹￺なか￻が　￹空￺す￻いてしまうのだ。"
        en:
          scarlet: "Morpeko eats seeds constantly to keep its hunger\nat bay. If it’s hungry for too long, it grows wild\nand brutish."
          violet: "It has a small stomach. If it isn’t constantly eating\nthe seeds it keeps in its pockets, it will get hungry\nimmediately."
        fr:
          scarlet: "Il mange constamment des graines pour satisfaire\nson appétit. Quand il est trop affamé, il s’énerve\net devient violent."
          violet: "S’il ne mange pas constamment les graines qu’il\nemmagasine dans ses poches, son petit estomac\nse vide et il a immédiatement faim."
        it:
          scarlet: "Mangia semi in continuazione per cercare\ndi placare la fame, ma quando ne ha troppa\ns’innervosisce e diventa una furia."
          violet: "Dato che ha uno stomaco piccolo, deve mangiare\ncostantemente i semi che tiene nelle tasche,\naltrimenti gli viene subito fame."
        de:
          scarlet: "Es frisst immerzu Samen, um seinen Hunger zu\nstillen. Wird dieser jedoch zu groß, verliert es\ndie Nerven und verfällt in rasende Wut."
          violet: "Da sein Magen klein ist, wird es sofort hungrig,\nwenn es nicht ständig die Samen aus seinen\nTaschen frisst."
        es:
          scarlet: "Come semillas continuamente para aplacar el\napetito, pero, cuando tiene demasiada hambre,\npierde los estribos y se pone hecho una furia."
          violet: "Debido al pequeño tamaño de su estómago, si\nno come constantemente las semillas que guarda\nen los bolsillos, le entra hambre de inmediato."
        ko:
          scarlet: "항상 씨앗을 먹으며 배고픔을\n억누르고 있으나, 너무 배가 고프면\n성격이 거칠고 난폭해진다."
          violet: "위가 작아서 주머니에 넣어 둔\n씨앗을 계속 먹지 않으면\n금방 배가 고파진다."
        zh_simp:
          scarlet: "虽然总是在靠吃种子来\n抑制饥饿感，但若是饿过头，\n就会心烦意乱变得粗暴。"
          violet: "胃很小，所以不常吃\n袋子里的种子的话，\n肚子马上就会饿。"
        zh_trad:
          scarlet: "總是靠吃種子來抑制飢餓感。\n但若是餓肚子餓過了頭，\n就會心煩意亂，變得粗暴。"
          violet: "胃很小，所以如果不一直\n拿口袋裡的種子來吃的話，\n馬上就會因空腹而感到餓。"
