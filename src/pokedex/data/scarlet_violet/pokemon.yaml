        jp_kanji:
          scarlet: "￹目撃例￺もくげきれい￻は　￹過去￺かこ￻　１￹件￺けん￻のみ。\n￹古￺ふる￻い　￹探検記￺たんけんき￻に　￹記￺しる￻された\n￹謎￺なぞ￻の　￹生物￺せいぶつ￻に　￹似￺に￻た　ポケモン。"
          violet: "１０￹億年前￺おくねんまえ￻の　プリンと\nオカルト￹雑誌￺ざっし￻が　￹紹介￺しょうかい￻した\n￹謎￺なぞ￻の　ポケモンに　￹似￺に￻ている。"
        en:
          scarlet: "There has been only one reported sighting of this\nPokémon. It resembles a mysterious creature\ndepicted in an old expedition journal."
          violet: "It resembles a mysterious Pokémon described\nin a paranormal magazine as a Jigglypuff from\none billion years ago."
        fr:
          scarlet: "Ce Pokémon n’avait été aperçu qu’une seule fois\njusqu’ici. Il ressemble à une créature mystérieuse\névoquée dans un vieux récit d’exploration."
          violet: "Il ressemble à un Pokémon mystérieux qui serait\nun Rondoudou d’il y a un milliard d’années, selon\nune revue sur les phénomènes paranormaux."
        it:
          scarlet: "È stato avvistato una sola volta in passato.\nRicorda molto una creatura misteriosa\ndescritta in un vecchio diario di viaggio."
          violet: "Somiglia a un Pokémon enigmatico presentato\nin una rivista di paranormale come un Jigglypuff\ndi un miliardo di anni fa."
        de:
          scarlet: "Bisher wurde es nur ein Mal gesichtet. Es ähnelt\neiner rätselhaften Kreatur, die in einem alten\nExpeditionsbericht beschrieben wurde."
          violet: "Es ähnelt einem rätselhaften Pokémon, das in\neiner esoterischen Zeitschrift als ein Pummeluff\nvon vor einer Milliarde Jahren vorgestellt wurde."
        es:
          scarlet: "Solo se había avistado una vez en el pasado. Su\naspecto se asemeja al de una misteriosa criatura\ndescrita en cierto diario antiguo."
          violet: "Guarda similitud con el supuesto aspecto que,\nsegún una revista esotérica, tenía Jigglypuff\nhace mil millones de años."
        ko:
          scarlet: "목격된 사례는 과거에 단 1건뿐이다.\n오래된 탐험기에 기록된\n정체불명의 생물을 닮은 포켓몬."
          violet: "10억 년 전의 푸린이라며\n오컬트 잡지에 소개됐던\n정체불명의 포켓몬을 닮았다."
        zh_simp:
          scarlet: "过去只有１次目击纪录。\n这只宝可梦与古老的探险记\n所记载的神秘生物长得很像。"
          violet: "超自然杂志曾将某只神秘的\n宝可梦介绍为１０亿年前的胖丁，\n该宝可梦与它长得很相似。"
        zh_trad:
          scarlet: "過去只有過１次目擊紀錄。\n是與古老的探險記裡記載的\n神秘生物長得很像的寶可夢。"
          violet: "與超自然雜誌裡被當成\n１０億年前的胖丁來介紹的\n謎之寶可夢長得很相似。"
