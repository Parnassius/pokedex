      hidden_ability: serene_grace
      descriptions:
        jp_kana:
          scarlet: "￹季節￺きせつ￻で　￹匂￺にお￻いも　￹変化￺へんか￻する。\n￹春先￺はるさき￻は　ふんわりと　￹甘￺あま￻くて\n￹落￺お￻ち￹着￺つ￻く　￹香￺かお￻りがするのだ。"
          violet: "かわいい　￹見￺み￻た￹目￺め￻だが　￹草木￺くさき￻の\n￹新芽￺しんめ￻を　￹好￺この￻んで　￹食￺た￻べてしまうので\n￹農家￺のうか￻の　￹人￺ひと￻には　￹煙￺けむ￻たがられる。"
        jp_kanji:
          scarlet: "￹季節￺きせつ￻で　￹匂￺にお￻いも　￹変化￺へんか￻する。\n￹春先￺はるさき￻は　ふんわりと　￹甘￺あま￻くて\n￹落￺お￻ち￹着￺つ￻く　￹香￺かお￻りがするのだ。"
          violet: "かわいい　￹見￺み￻た￹目￺め￻だが　￹草木￺くさき￻の\n￹新芽￺しんめ￻を　￹好￺この￻んで　￹食￺た￻べてしまうので\n￹農家￺のうか￻の　￹人￺ひと￻には　￹煙￺けむ￻たがられる。"
        en:
          scarlet: "Deerling have different scents depending on the\nseason. In early spring, these Pokémon give off a\ndelicate, sweet, and calming scent."
          violet: "Despite Deerling’s adorable appearance, farmers\nconsider it a nuisance since it loves plant shoots\nand will eat them all up."
        fr:
          scarlet: "Son odeur change au fil des saisons.\nÀ l’arrivée du printemps, il dégage\nun parfum doux et apaisant."
          violet: "Malgré son apparence charmante, il s’attire\nl’antipathie des agriculteurs à cause de\nson goût pour les bourgeons."
        it:
          scarlet: "L’odore dei Deerling cambia con le stagioni.\nA inizio primavera è delicato, dolce e molto\nrilassante."
          violet: "Sono Pokémon molto carini, ma siccome\namano nutrirsi di germogli non sono visti\ndi buon occhio dagli agricoltori."
        de:
          scarlet: "Sein Geruch ändert sich mit der Jahreszeit.\nZu Frühlingsbeginn duftet es angenehm süß\nund beruhigend."
          violet: "Es sieht zwar niedlich aus, frisst aber gerne junge\nPflanzentriebe. Bei Landwirten ist es daher nicht\nsehr beliebt."
        es:
          scarlet: "Su fragancia, que cambia con las estaciones,\nadquiere un agradable matiz dulce al comienzo\nde la primavera."
          violet: "A pesar de su adorable aspecto, su afición por\nlos brotes tiernos le ha granjeado antipatía entre\nlos agricultores."
        ko:
          scarlet: "계절에 따라 냄새도 변한다.\n초봄에는 은은하게 달콤하면서\n마음이 차분해지는 향기가 난다."
          violet: "겉모습은 귀엽지만\n초목의 새싹을 즐겨 먹기 때문에\n농가 사람들은 꺼려 한다."
        zh_simp:
          scarlet: "气味会随着季节而改变，\n初春的气味略带甘甜，\n能使情绪稳定下来。"
          violet: "虽然外形很可爱，\n却因为喜爱吃草木的\n新芽而被农民们疏远。"
        zh_trad:
          scarlet: "氣味會隨季節變遷而改變。\n初春的氣味略帶香甜，\n能使情緒穩定下來。"
          violet: "雖然長相可愛，卻因為\n喜歡吃草木長出的新芽\n而遭到農民們的疏遠。"
