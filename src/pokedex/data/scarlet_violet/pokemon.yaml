        jp_kana:
          scarlet: "￹森￺もり￻の￹奥￺おく￻で　ひっそりと　￹暮￺く￻らす。\n￹縄張￺なわば￻りに　￹入￺はい￻り￹込￺こ￻んだ　￹相手￺あいて￻に\n￹草笛￺くさぶえ￻の　￹音色￺ねいろ￻で　￹警告￺けいこく￻する。"
          violet: "￹感覚機能￺かんかくきのう￻が　￹集中￺しゅうちゅう￻する\n￹尖￺とが￻った　￹鼻￺はな￻で　まわりの　￹様子￺ようす￻を\nキャッチするが　￹弱点￺じゃくてん￻でもある。"
        jp_kanji:
          scarlet: "￹森￺もり￻の￹奥￺おく￻で　ひっそりと　￹暮￺く￻らす。\n￹縄張￺なわば￻りに　￹入￺はい￻り￹込￺こ￻んだ　￹相手￺あいて￻に\n￹草笛￺くさぶえ￻の　￹音色￺ねいろ￻で　￹警告￺けいこく￻する。"
          violet: "￹感覚機能￺かんかくきのう￻が　￹集中￺しゅうちゅう￻する\n￹尖￺とが￻った　￹鼻￺はな￻で　まわりの　￹様子￺ようす￻を\nキャッチするが　￹弱点￺じゃくてん￻でもある。"
        en:
          scarlet: "It leads a quiet life deep in the forest. If anything\nwanders into its territory, Nuzleaf will warn the\nintruder by sounding its grass flute."
          violet: "Its sensory functions are concentrated in its\npointed nose, which it uses to sense its\nsurroundings. The nose is also its weak point."
        fr:
          scarlet: "Il vit paisiblement au fond des forêts. Sa feuille\német un son de flûte qui sert d’avertissement\nà quiconque s’introduit sur son territoire."
          violet: "Son nez pointu regroupe plusieurs fonctions\nsensorielles qui lui permettent d’analyser son\nenvironnement. C’est également son point faible."
        it:
          scarlet: "Vive nella calma delle foreste. Il suono del\nsuo flauto di foglia serve da avvertimento\na chi si introduce nel suo territorio."
          violet: "Il suo naso appuntito concentra in sé le funzioni\nsensoriali e gli permette di percepire ciò che lo\ncirconda. Tuttavia, è anche il suo punto debole."
        de:
          scarlet: "Es lebt still und leise in den Tiefen der Wälder.\nMit dem Klang seiner Blattflöte warnt es jene,\ndie in sein Revier eindringen."
          violet: "In seiner spitzen Nase konzentrieren sich viele\nSinnesrezeptoren, mit denen es seine Umgebung\nwahrnimmt, doch sie ist auch sein Schwachpunkt."
        es:
          scarlet: "Vive tranquilamente en lo profundo del bosque.\nSe lleva la hoja de la cabeza a la boca y silba\npara advertir a quienes invaden su territorio."
          violet: "En su puntiaguda nariz se concentran varios\nreceptores que le permiten percibir su entorno,\npero también es su punto débil."
        ko:
          scarlet: "깊은 숲속에서 조용히 지낸다.\n영역을 침범한 상대에게\n풀피리 소리로 경고한다."
          violet: "감각 기능이 집중되어 있는\n뾰족한 코로 주위의 상황을\n감지할 수 있으나, 약점이기도 하다."
        zh_simp:
          scarlet: "静静地栖息于森林深处。\n会以草笛声来警告\n踏进自己地盘的对手。"
          violet: "集中了知觉功能的尖鼻子\n能够洞察周围的状况，\n但同时也是它的弱点。"
        zh_trad:
          scarlet: "在森林深處靜靜地生活。\n會以草笛聲來警告\n踏進自己地盤的對手。"
          violet: "集中了感覺功能的尖鼻子\n能夠讓牠感知周遭的狀況，\n但同時也是牠的弱點。"
