          violet: "￹磁力￺じりょく￻を　￹放￺はな￻つ　￹鉱物￺こうぶつ￻が\n￹好物￺こうぶつ￻。　￹時速￺じそく￻　１００キロで\nノズパスを　￹追￺お￻いつめるぞ。"
        jp_kanji:
          scarlet: "２￹匹￺ひき￻の　ダンバルが　￹合体￺がったい￻した。\n２つの　￹脳￺のう￻みそが　￹連結￺れんけつ￻したので\nサイコパワーは　より　￹強￺つよ￻くなった。"
          violet: "￹磁力￺じりょく￻を　￹放￺はな￻つ　￹鉱物￺こうぶつ￻が\n￹好物￺こうぶつ￻。　￹時速￺じそく￻　１００キロで\nノズパスを　￹追￺お￻いつめるぞ。"
        en:
          scarlet: "It is formed by two Beldum joining\ntogether. Its two brains are linked,\namplifying its psychic power."
          violet: "It adores magnetic minerals, so it pursues\nNosepass at speeds exceeding 60 mph."
        fr:
          scarlet: "Il est formé de deux Terhal soudés. Leurs\ndeux cerveaux étant liés, ses pouvoirs\npsychiques sont devenus très puissants."
          violet: "Ce Pokémon raffole des minéraux qui\némettent des ondes magnétiques. Il peut\npourchasser un Tarinor à une vitesse de 100 km/h."
        it:
          scarlet: "È nato dalla fusione di due Beldum.\nL’unione di due cervelli rende ancora\npiù forti i suoi poteri psichici."
          violet: "È ghiotto di minerali dotati di proprietà\nmagnetiche. Quando dà la caccia ai\nNosepass, può raggiungere i 100 km/h."
        de:
          scarlet: "Es besteht aus zwei Tanhel. Dank der\nVereinigung der beiden Hirne verfügt es\nüber gesteigerte Psycho-Kräfte."
          violet: "Es liebt Mineralien, die Magnetfelder\nerzeugen, weshalb es Nasgnet mit einem\nTempo von 100 km/h hinterherjagt."
        es:
          scarlet: "Está formado por dos Beldum fusionados.\nSus dos cerebros están conectados, así que\ncuenta con poderes psíquicos amplificados."
          violet: "Le encanta comer minerales con\npropiedades magnéticas. Se desplaza\na más de 100 km/h rastreando Nosepass."
        ko:
          scarlet: "2마리의 메탕이 합체했다.\n2개의 뇌가 연결되었기 때문에\n사이코 파워는 보다 강해졌다."
          violet: "자력을 발산하는 광물을\n좋아한다. 시속 100km로\n코코파스를 몰아넣는다."
        zh_simp:
          scarlet: "由２只铁哑铃组合而成。\n因为２个大脑结合了，\n所以精神力量也变得更强了。"
          violet: "非常喜欢能放出磁力的矿物。\n会以１００公里的时速穷追朝北鼻。"
        zh_trad:
          scarlet: "由２隻鐵啞鈴組合而成。\n因為２個大腦互相連結，\n所以精神力量變得更強了。"
          violet: "非常喜歡能放出磁力的礦物。\n會以１００公里的時速窮追朝北鼻。"
