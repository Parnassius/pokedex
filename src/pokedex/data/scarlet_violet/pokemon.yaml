          scarlet: "￹人￺ひと￻の　￹感情￺かんじょう￻を　￹頭￺あたま￻の\n￹赤￺あか￻い　ツノで　￹敏感￺びんかん￻に\nキャッチする　￹力￺ちから￻を　￹持￺も￻つ。"
          violet: "￹人￺ひと￻や　ポケモンの　￹感情￺かんじょう￻を\n￹敏感￺びんかん￻に　キャッチ。\n￹敵意￺てきい￻を　￹感￺かん￻じると　￹物陰￺ものかげ￻に　￹隠￺かく￻れる。"
        jp_kanji:
          scarlet: "￹人￺ひと￻の　￹感情￺かんじょう￻を　￹頭￺あたま￻の\n￹赤￺あか￻い　ツノで　￹敏感￺びんかん￻に\nキャッチする　￹力￺ちから￻を　￹持￺も￻つ。"
          violet: "￹人￺ひと￻や　ポケモンの　￹感情￺かんじょう￻を\n￹敏感￺びんかん￻に　キャッチ。\n￹敵意￺てきい￻を　￹感￺かん￻じると　￹物陰￺ものかげ￻に　￹隠￺かく￻れる。"
        en:
          scarlet: "The horns on its head provide a strong power\nthat enables it to sense people’s emotions."
          violet: "It is highly attuned to the emotions of people\nand Pokémon. It hides if it senses hostility."
        fr:
          scarlet: "Il perçoit très précisément les émotions humaines\ngrâce aux cornes rouges sur sa tête."
          violet: "Très sensible aux émotions des êtres humains\net des Pokémon, il se cache au moindre signe\nd’hostilité."
        it:
          scarlet: "Ha la capacità di percepire le emozioni delle\npersone grazie alle corna rosse che ha sul capo."
          violet: "È molto sensibile all’umore delle persone\ne degli altri Pokémon. Non appena avverte\nostilità, si nasconde subito nell’ombra."
        de:
          scarlet: "Mit den roten Hörnern auf seinem Kopf kann es\ndie Gefühle der Menschen genau erspüren."
          violet: "Es hat ein feines Gespür für die Gefühle der\nMenschen und Pokémon. Wenn es Feindseligkeit\nwahrnimmt, versteckt es sich."
        es:
          scarlet: "Gracias a los cuernos rojos de su cabeza, puede\ncaptar lo que sienten las personas."
          violet: "Capta muy bien lo que sienten las personas\ny los Pokémon. Cuando nota cierta hostilidad,\nse esconde."
        ko:
          scarlet: "사람의 감정을 머리의\n빨간 뿔로 민감하게\n감지하는 힘을 가졌다."
          violet: "사람이나 포켓몬의 감정을\n민감하게 캐치한다.\n적의가 느껴지면 그늘로 숨는다."
        zh_simp:
          scarlet: "它可以使用头上\n红色的角来敏锐地\n捕捉到人类的情感。"
          violet: "能敏锐地捕捉\n人和宝可梦的感情。\n感受到敌意后就会躲进暗处。"
        zh_trad:
          scarlet: "擁有使用頭上的紅角\n就可以敏銳察覺\n人類感情的能力。"
          violet: "能敏銳地感知人和寶可夢\n的感情。一旦感受到敵意\n就會躲進暗處。"
