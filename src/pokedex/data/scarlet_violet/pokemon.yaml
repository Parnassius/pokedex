      descriptions:
        jp_kana:
          scarlet: "￹強力￺きょうりょく￻すぎる　さいみんじゅつ。\n￹操￺あやつ￻られていた　￹相手￺あいて￻は\n￹前後￺ぜんご￻の　￹記憶￺きおく￻を　￹失￺うしな￻っている。"
          violet: "￹発光体￺はっこうたい￻の　￹点滅￺てんめつ￻によって\n￹相手￺あいて￻を　￹催眠状態￺さいみんじょうたい￻にして\n￹自由自在￺じゆうじざい￻に　￹操￺あやつ￻ってしまう。"
        jp_kanji:
          scarlet: "￹強力￺きょうりょく￻すぎる　さいみんじゅつ。\n￹操￺あやつ￻られていた　￹相手￺あいて￻は\n￹前後￺ぜんご￻の　￹記憶￺きおく￻を　￹失￺うしな￻っている。"
          violet: "￹発光体￺はっこうたい￻の　￹点滅￺てんめつ￻によって\n￹相手￺あいて￻を　￹催眠状態￺さいみんじょうたい￻にして\n￹自由自在￺じゆうじざい￻に　￹操￺あやつ￻ってしまう。"
        en:
          scarlet: "Its hypnotic powers are dangerously strong.\nAnyone who falls under Malamar’s control\nloses their memories surrounding the event."
          violet: "It flashes the luminescent spots on its body\nto hypnotize its opponents, gaining total\ncontrol over them."
        fr:
          scarlet: "Ses pouvoirs hypnotiques sont sans égal, si bien\nque ses victimes ne gardent aucun souvenir\ndu moment où elles étaient sous son contrôle."
          violet: "Il hypnotise ses adversaires en faisant\nclignoter son corps lumineux, ce qui\nlui permet de les manipuler à sa guise."
        it:
          scarlet: "Ha poteri ipnotici straordinariamente forti, tanto\nche chi cade in suo controllo ne perde poi ogni\nricordo."
          violet: "Fa lampeggiare i motivi sul corpo per ipnotizzare\nl’avversario e manovrarlo a suo piacimento."
        de:
          scarlet: "Seine hypnotischen Kräfte sind unfassbar stark.\nHat es sich ein Opfer gefügig gemacht, verliert\ndieses jegliche Erinnerung an den Vorfall."
          violet: "Es lässt das Muster auf seinem Körper blinken,\num seine Gegner zu hypnotisieren und sie so\nnach Belieben kontrollieren zu können."
        es:
          scarlet: "Sus potentes poderes hipnóticos no tienen rival.\nAquellos a los que controla no recuerdan en\nabsoluto haber estado sometidos a su voluntad."
          violet: "Los destellos que emite sumen en un estado\nhipnótico al rival, que queda bajo su control."
        ko:
          scarlet: "어마어마하게 강한 최면술을 쓴다.\n조종당한 상대는\n전후의 기억을 잃어버린다."
          violet: "발광체를 깜빡여서\n상대를 최면 상태로 만들고\n자유자재로 조종한다."
        zh_simp:
          scarlet: "由于它的催眠术过于强大，\n所以对手会失去被控制\n前后那段时间的记忆。"
          violet: "通过闪烁发光体\n来让对手陷入催眠状态，\n并自由自在地控制对手。"
        zh_trad:
          scarlet: "由於牠的催眠術過於強大，\n導致被操控的對手會失去\n在那前後的記憶。"
          violet: "會閃爍發光體\n讓對手陷入催眠狀態，\n並自由自在地操控對方。"
