        jp_kana:
          scarlet: "￹首￺くび￻に　￹巻￺ま￻きつけた　ながーい　￹舌￺した￻に\n￹触￺ふ￻れる　￹空気￺くうき￻の　￹動￺うご￻きで　￹見￺み￻えない\n￹敵￺てき￻の　￹様子￺ようす￻を　￹察知￺さっち￻するのだ。"
          violet: "￹太￺ふと￻ももから　￹染￺し￻み￹出￺だ￻した　￹粘液￺ねんえき￻で\n￹作￺つく￻った　￹手裏剣￺しゅりけん￻は　￹鋼鉄￺こうてつ￻の\nワイヤーを　すぱりと　￹断￺た￻ち￹切￺き￻るぞ。"
        jp_kanji:
          scarlet: "￹首￺くび￻に　￹巻￺ま￻きつけた　ながーい　￹舌￺した￻に\n￹触￺ふ￻れる　￹空気￺くうき￻の　￹動￺うご￻きで　￹見￺み￻えない\n￹敵￺てき￻の　￹様子￺ようす￻を　￹察知￺さっち￻するのだ。"
          violet: "￹太￺ふと￻ももから　￹染￺し￻み￹出￺だ￻した　￹粘液￺ねんえき￻で\n￹作￺つく￻った　￹手裏剣￺しゅりけん￻は　￹鋼鉄￺こうてつ￻の\nワイヤーを　すぱりと　￹断￺た￻ち￹切￺き￻るぞ。"
        en:
          scarlet: "The movement of air against the long tongue\nGreninja keeps wrapped around its neck allows\nit to sense enemies it can’t see."
          violet: "It makes shuriken out of mucus excreted from its\nthighs. These shuriken can cut cleanly through\nsteel cables."
        fr:
          scarlet: "Sa longue langue enroulée autour de son cou\npeut sentir les mouvements de l’air. Cela l’aide\nà détecter les adversaires qu’il ne peut pas voir."
          violet: "Les shuriken qu’il crée à partir du mucus qui\ncoule de ses cuisses sont capables de trancher\nnet un câble en acier."
        it:
          scarlet: "Sente il movimento dell’aria con la lunga lingua\narrotolata attorno al collo. Così può percepire\nanche nemici al di fuori del suo campo visivo."
          violet: "Gli shuriken creati con il muco prodotto\ndalle sue cosce sono in grado di recidere\ndi netto cavi di acciaio."
        de:
          scarlet: "Mithilfe der langen Zunge, die es um seinen Hals\ngewickelt hat, kann es Luftströme spüren und so\ndie Präsenz verborgener Gegner erahnen."
          violet: "Aus dem Schleim, der aus seinen Oberschenkeln\ndringt, formt es Wurfsterne, die selbst Stahldraht\nmit Leichtigkeit durchtrennen können."
        es:
          scarlet: "Puede detectar enemigos fuera de su campo\nvisual al captar los movimientos del aire con su\nlarga lengua enroscada alrededor del cuello."
          violet: "Los shuriken que crea con la mucosidad que\nsecreta por las ancas pueden cortar cables de\nacero en dos."
        ko:
          scarlet: "목에 휘감은 기다란 혀에 닿는\n공기의 흐름을 통해\n보이지 않는 적의 동태를 살핀다."
          violet: "넓적다리에서 배어 나온\n점액으로 만든 수리검은\n강철 와이어도 싹둑 자를 수 있다."
        zh_simp:
          scarlet: "能通过卷在脖子上的长～舌头\n所接触到的空气流动来察觉\n看不见身影的敌人的动静。"
          violet: "用大腿渗出的粘液\n所制成的手里剑\n能利落地切断钢丝。"
        zh_trad:
          scarlet: "即使是看不見身影的敵人，\n牠也能透過繞在脖子上的長～舌頭\n所接觸的空氣流動來察覺其動靜。"
          violet: "由大腿滲出的黏液\n做成的手裡劍\n能俐落地切斷鋼絲。"
