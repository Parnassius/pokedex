        jp_kanji:
          scarlet: "お￹腹￺なか￻に　￹炎袋￺ほのおぶくろ￻を　￹持￺も￻つ。\n￹抱￺だ￻きしめると　ぽかぽか　￹温￺あたた￻かい。\n￹命￺いのち￻ある　￹限￺かぎ￻り　￹燃￺も￻え￹続￺つづ￻ける。"
          violet: "お￹腹￺なか￻に　￹炎￺ほのお￻を　￹燃￺も￻やす　￹袋￺ふくろ￻を\n￹持￺も￻っているので　￹抱￺だ￻きしめると\n￹湯￺ゆ￻たんぽのように　￹温￺あたた￻かい。"
        en:
          scarlet: "Torchic feels toasty warm if you hug it. It has a\nflame sac inside its belly, and the flames burn\ncontinuously as long as Torchic has life in it."
          violet: "In its belly, it has a sac filled with burning fire,\nmeaning that Torchic feels as warm as a hot-water\nbottle if you hug it."
        fr:
          scarlet: "Quand on le serre contre soi, on sent une chaleur\nréconfortante, car une poche à flammes brûle en\ncontinu dans son ventre tout au long de sa vie."
          violet: "Une poche à flammes brûle dans son ventre.\nQuand on le câline, on a donc l’impression\nd’avoir une bouillotte dans les bras."
        it:
          scarlet: "La sacca di fuoco che ha nel ventre continua a\nbruciare per tutta la sua vita. Abbracciandolo\nsi avverte un piacevole tepore."
          violet: "Nel ventre ha una sacca di fuoco. Per questo,\nabbracciarlo dà la stessa sensazione di stringere\nuna borsa d’acqua calda."
        de:
          scarlet: "Flemmli fühlt sich wohlig warm an, wenn man\nes umarmt. In seinem Bauch hat es einen\nFlammensack, der brennt, solange es lebt."
          violet: "Flemmli trägt einen Flammensack in seinem\nBauch. Daher fühlt es sich so warm wie eine\nWärmflasche an, wenn man es im Arm hält."
        es:
          scarlet: "Posee una saca de fuego en el abdomen, cuya\nllama arderá durante toda su vida. El calor que\ndesprende resulta muy agradable al abrazarlo."
          violet: "La saca de fuego que arde en el interior de su\nabdomen hace que al abrazarlo esté tan caliente\ncomo un calientapiés."
        ko:
          scarlet: "몸속에 불꽃 주머니를 지니고 있어서\n껴안으면 따끈따끈하다.\n불꽃은 살아 있는 한 계속 불타오른다."
          violet: "배에 불꽃을 태우는 주머니를\n가지고 있어 껴안으면\n난로처럼 따뜻하다."
        zh_simp:
          scarlet: "肚子里有火袋。\n抱在怀里暖烘烘的很温暖。\n只要生命尚存火焰就会持续燃烧。"
          violet: "肚子里有燃烧火焰的囊袋，\n所以紧紧抱住它的时候，\n会感到像热水袋一样温暖。"
        zh_trad:
          scarlet: "肚子裡有火袋。\n抱在懷裡暖烘烘的很溫暖。\n只要生命尚存火焰就會持續燃燒。"
          violet: "肚子裡有燃燒著火焰的\n囊袋，抱在懷裡就像\n熱水袋一樣溫暖。"
