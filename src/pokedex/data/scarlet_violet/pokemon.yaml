      hidden_ability: adaptability
      descriptions:
        jp_kana:
          scarlet: "￹好戦的￺こうせんてき￻な　ポケモンで　￹自分￺じぶん￻の\n￹縄張￺なわば￻りから　あらゆる　ポケモンを\nハサミで　つまんで　￹投￺な￻げ￹飛￺と￻ばすぞ！"
          violet: "￹巨大￺きょだい￻な　ハサミを　￹振￺ふ￻りまわす\n￹暴￺あば￻れ￹者￺もの￻。　￹育￺そだ￻てるのが　とても\n￹難￺むずか￻しい　ポケモンと　いわれる。"
        jp_kanji:
          scarlet: "￹好戦的￺こうせんてき￻な　ポケモンで　￹自分￺じぶん￻の\n￹縄張￺なわば￻りから　あらゆる　ポケモンを\nハサミで　つまんで　￹投￺な￻げ￹飛￺と￻ばすぞ！"
          violet: "￹巨大￺きょだい￻な　ハサミを　￹振￺ふ￻りまわす\n￹暴￺あば￻れ￹者￺もの￻。　￹育￺そだ￻てるのが　とても\n￹難￺むずか￻しい　ポケモンと　いわれる。"
        en:
          scarlet: "Loving to battle, this Pokémon pinches all\nPokémon that enter its territory with its\npincers and throws them out."
          violet: "A rough customer that wildly flails its giant\nclaws. It is said to be extremely hard to raise."
        fr:
          scarlet: "Les Colhomard sont belliqueux et attrapent\nles autres Pokémon avec leurs pinces pour\nles expulser de leur territoire."
          violet: "Ce Pokémon agite violemment ses énormes\npinces. Il faut beaucoup de patience pour\nle dresser."
        it:
          scarlet: "Pokémon molto bellicoso che afferra con\nle chele chiunque osi entrare nel suo\nterritorio, per poi scaraventarlo fuori."
          violet: "Di indole violenta, agita selvaggiamente\nle sue enormi chele. Sembra che sia molto\ndifficile da allenare."
        de:
          scarlet: "Dieses rauflustige Pokémon nimmt alle anderen\nPokémon, die sich in seinem Revier befinden, mit\nseinen Scheren in die Zange und wirft sie hinaus."
          violet: "Ein grobes Pokémon, das mit seinen riesigen\nScheren wild um sich schlägt. Man sagt,\ndass es sehr schwer zu trainieren sei."
        es:
          scarlet: "De naturaleza combativa, agarra con las\npinzas y arroja por los aires a todo aquel\nPokémon que ose aventurarse en su territorio."
          violet: "Este violento Pokémon agita de forma\nsalvaje las gigantes pinzas que tiene.\nSegún dicen, es muy difícil criarlo."
        ko:
          scarlet: "호전적인 포켓몬으로\n자신의 영역에서 모든 포켓몬을\n집게로 집어서 내던진다!"
          violet: "거대한 집게를 휘두르는\n난폭한 포켓몬. 키우는 것이\n매우 어렵다고 전해진다."
        zh_simp:
          scarlet: "好战的宝可梦，\n会用钳子把自己领地里的\n所有宝可梦夹住后扔飞出去！"
          violet: "不停挥舞自己巨大的钳子，\n是个性格粗暴的家伙。\n被认为是很难培育的宝可梦。"
        zh_trad:
          scarlet: "性情好戰的寶可夢。\n會用鉗子把自己地盤裡所有的\n寶可夢夾起來然後扔飛出去！"
          violet: "不停揮舞自己巨大的鉗子，\n是個性情粗暴的傢伙。\n被認為是很難培育的寶可夢。"
