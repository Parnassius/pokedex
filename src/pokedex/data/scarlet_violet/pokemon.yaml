      descriptions:
        jp_kana:
          scarlet: "４￹本脚￺ほんあし￻を　￹折￺お￻りたたんで　￹飛￺と￻ぶ。\n４つの　￹脳￺のう￻は　スーパーコンピュータ\nよりも　￹優￺すぐ￻れていると　いわれる。"
          violet: "４つの　ツメと　￹大￺おお￻きな　￹体￺からだ￻で\n￹獲物￺えもの￻を　しっかり　￹押￺お￻さえつけると\nお￹腹￺なか￻の　￹歯￺は￻で　バリバリ　かじる。"
        jp_kanji:
          scarlet: "４￹本脚￺ほんあし￻を　￹折￺お￻りたたんで　￹飛￺と￻ぶ。\n４つの　￹脳￺のう￻は　スーパーコンピュータ\nよりも　￹優￺すぐ￻れていると　いわれる。"
          violet: "４つの　ツメと　￹大￺おお￻きな　￹体￺からだ￻で\n￹獲物￺えもの￻を　しっかり　￹押￺お￻さえつけると\nお￹腹￺なか￻の　￹歯￺は￻で　バリバリ　かじる。"
        en:
          scarlet: "It folds its four legs when flying. Its\nfour brains are said to be superior to\na supercomputer."
          violet: "It firmly pins its prey using its four claws and\nlarge body. Then Metagross uses the mouth\non its stomach to chew its prey to bits."
        fr:
          scarlet: "Il vole en repliant ses quatre pattes.\nOn raconte que ses quatre cerveaux\nsont plus performants qu’un superordinateur."
          violet: "Grâce à ses quatre pattes griffues et son corps\nimposant, il immobilise ses victimes pour ensuite\nles broyer avec les dents situées sur son ventre."
        it:
          scarlet: "Ripiega i quattro arti e si libra in volo.\nI suoi quattro cervelli sono più potenti\npersino di un supercomputer."
          violet: "Blocca la preda al suolo con le quattro\nzampe artigliate e il corpo massiccio, poi\nla divora con i denti sulla pancia."
        de:
          scarlet: "Wenn es fliegt, sind seine vier Beine eingeklappt.\nEs heißt, seine vier Gehirne seien sogar einem\nSupercomputer überlegen."
          violet: "Mit seinen vier Beinkrallen und dem massigen\nKörper drückt es seine Beute zu Boden und\nzerkaut sie dann mit seinen Zähnen am Bauch."
        es:
          scarlet: "Dicen que sus cuatro cerebros\nsuperan a un superordenador.\nVuela plegando las cuatro patas."
          violet: "Con sus cuatro garras y su descomunal cuerpo\naprisiona a sus presas para luego triturarlas con\nlos dientes de la boca en su vientre."
        ko:
          scarlet: "4개의 다리를 접어서 난다.\n4개의 뇌는 슈퍼컴퓨터보다\n우수하다고 전해진다."
          violet: "4개의 발톱과 큰 몸집으로\n먹이를 확실하게 누른 후\n배의 이빨로 으드득 씹는다."
        zh_simp:
          scarlet: "能收起４条腿飞行。\n它的４个头脑据说比\n超级计算机还优秀。"
          violet: "用４只爪子和庞大的身体\n牢牢地按住猎物后，\n用腹部的牙齿嘎嘣嘎嘣地啃咬。"
        zh_trad:
          scarlet: "會收起４隻腳飛行。\n據說４個大腦比\n超級電腦更優秀。"
          violet: "用４隻爪子和龐大的身體\n牢牢地按住獵物後，\n用腹部的牙齒嚼食。"
