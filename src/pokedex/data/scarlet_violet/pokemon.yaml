        jp_kana:
          scarlet: "￹毛並￺けな￻みが　￹美￺うつく￻しく\nペットにしたがる　￹人￺ひと￻も　￹多￺おお￻いが　すぐ\nひっかいたり　するので　￹手強￺てごわ￻いぞ。"
          violet: "￹気性￺きしょう￻が　￹激￺はげ￻しく　￹尻尾￺しっぽ￻を\nまっすぐ　￹立￺た￻てたら　￹要注意￺ようちゅうい￻。\nとびかかって　￹噛￺か￻みつく　￹前触￺まえぶ￻れだ。"
        jp_kanji:
          scarlet: "￹毛並￺けな￻みが　￹美￺うつく￻しく\nペットにしたがる　￹人￺ひと￻も　￹多￺おお￻いが　すぐ\nひっかいたり　するので　￹手強￺てごわ￻いぞ。"
          violet: "￹気性￺きしょう￻が　￹激￺はげ￻しく　￹尻尾￺しっぽ￻を\nまっすぐ　￹立￺た￻てたら　￹要注意￺ようちゅうい￻。\nとびかかって　￹噛￺か￻みつく　￹前触￺まえぶ￻れだ。"
        en:
          scarlet: "Although its fur has many admirers, it is tough to\nraise as a pet because of its fickle meanness."
          violet: "It has a vicious temperament. Beware if it raises\nits tail straight up. This is a signal that it is about\nto pounce and bite."
        fr:
          scarlet: "Sa magnifique fourrure suscite l’admiration,\nmais il est difficile à apprivoiser en raison\nde son caractère rétif."
          violet: "Ce Pokémon a un comportement féroce.\nS’il lève la queue, cela signifie qu’il s’apprête\nà mordre."
        it:
          scarlet: "Molti lo vogliono come Pokémon da compagnia\nper via dello splendido pelo, ma non va preso\nsotto gamba perché graffia facilmente."
          violet: "Pokémon dal temperamento impetuoso. Quando\nrizza la coda, meglio stargli alla larga: è segno\nche sta per scattare e mordere."
        de:
          scarlet: "Aufgrund seines schönen Fells wollen viele ein\nSnobilikat im Haus haben. Es ist jedoch schwer\nerziehbar, da es sehr schnell kratzt."
          violet: "Es ist aufbrausend. Richtet es seinen Schweif auf,\nist Vorsicht geboten. Das ist ein Anzeichen dafür,\ndass Snobilikat gleich losspringt und zubeißt."
        es:
          scarlet: "Aunque es muy admirado por el pelaje, es difícil\nde entrenar como mascota porque enseguida\nsuelta arañazos."
          violet: "Tiene un carácter muy fuerte. Cuando estira la\ncola, conviene tener cuidado, pues podría indicar\nque está a punto de abalanzarse y morder."
        ko:
          scarlet: "털의 결이 아름다워 애완용으로\n기르려는 사람이 많지만,\n곧잘 할퀴려 들기 때문에 쉽지 않다."
          violet: "성격이 거칠기 때문에 꼬리를\n바짝 세우고 있으면 주의해야 한다.\n달려들어서 물겠다는 경고이기 때문이다."
        zh_simp:
          scarlet: "有着漂亮的毛色，\n很多人想把它当宠物养，\n但它很爱乱抓，所以很难养熟。"
          violet: "性情凶暴，当它竖起尾巴时\n要多加小心。那是它要\n飞扑过来咬你的前兆。"
        zh_trad:
          scarlet: "有著漂亮的毛色，\n很多人想養牠當寵物，\n但牠很愛亂抓，所以並不好養。"
          violet: "性情凶暴，豎起尾巴時\n要多加小心。那是牠將\n飛撲過來咬你的前兆。"
