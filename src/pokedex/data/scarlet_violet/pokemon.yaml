      descriptions:
        jp_kana:
          scarlet: "￹鋼鉄￺こうてつ￻を　￹含￺ふく￻んでいる　ハサミで\n￹捕￺と￻らえたものは　どんなに　￹硬￺かた￻くても\nコナゴナに　￹砕￺くだ￻く。"
          violet: "￹目玉模様￺めだまもよう￻の　ついた　ハサミを\n￹振￺ふ￻り￹上￺あ￻げて　￹相手￺あいて￻を　￹威嚇￺いかく￻すると\n￹頭￺あたま￻が　３つ　あるように　￹見￺み￻える。"
        jp_kanji:
          scarlet: "￹鋼鉄￺こうてつ￻を　￹含￺ふく￻んでいる　ハサミで\n￹捕￺と￻らえたものは　どんなに　￹硬￺かた￻くても\nコナゴナに　￹砕￺くだ￻く。"
          violet: "￹目玉模様￺めだまもよう￻の　ついた　ハサミを\n￹振￺ふ￻り￹上￺あ￻げて　￹相手￺あいて￻を　￹威嚇￺いかく￻すると\n￹頭￺あたま￻が　３つ　あるように　￹見￺み￻える。"
        en:
          scarlet: "This Pokémon’s pincers, which contain steel,\ncan crush any hard object they get ahold of\ninto bits."
          violet: "It swings its eye-patterned pincers up to\nscare its foes. This makes it look like it has\nthree heads."
        fr:
          scarlet: "Les pinces de ce Pokémon contiennent\nde l’acier et peuvent réduire quasiment\nn’importe quoi en miettes."
          violet: "Lorsqu’il agite ses pinces en forme d’yeux,\nil donne l’impression d’avoir trois têtes,\nce qui effraie ses ennemis."
        it:
          scarlet: "Le chele, che contengono acciaio, possono\nfare a pezzi qualsiasi oggetto afferrino,\nanche se durissimo."
          violet: "I motivi sulle sue chele assomigliano a occhi.\nQuando le agita per spaventare i nemici, pare\navere tre teste."
        de:
          scarlet: "Scherox’ Scheren bestehen zum Teil aus Stahl,\nwodurch es mit ihnen jedes noch so harte Objekt\nzerkleinern kann, das es zu fassen bekommt."
          violet: "Es erhebt seine mit Augenmustern versehenen\nScheren, um Gegner einzuschüchtern. Dabei\nsieht es aus, als habe es drei Köpfe."
        es:
          scarlet: "Las pinzas que posee contienen acero y\npueden hacer trizas cualquier objeto por\nduro que sea."
          violet: "Intimida a los enemigos agitando sus pinzas\ncon dibujos de ojos. Al hacerlo, da la impresión\nde tener tres cabezas."
        ko:
          scarlet: "강철이 함유된 집게로 잡은 것은\n아무리 딱딱해도 산산조각이 난다."
          violet: "눈알 무늬가 있는 집게를 치켜들어\n상대를 위협하면\n머리가 3개 있는 것처럼 보인다."
        zh_simp:
          scarlet: "不管抓到的东西有多坚硬，\n都能用含有钢铁成分的钳子\n将其夹得粉碎。"
          violet: "当它举起带有眼珠花纹的\n钳子威吓对手时，看起来\n就像是拥有３颗头一样。"
        zh_trad:
          scarlet: "不管抓到多麼堅硬的東西，\n都能用含有鋼鐵成分的鉗子\n夾得粉碎。"
          violet: "當牠舉起帶有眼珠花紋的\n鉗子威嚇對手的時候，\n會看起來像是有３顆頭。"
