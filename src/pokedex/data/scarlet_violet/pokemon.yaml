      descriptions:
        jp_kana:
          scarlet: "￹体￺からだ￻の　￹中￺なか￻で　ガスを　￹作￺つく￻ったり\n￹吐￺は￻き￹出￺だ￻したり　することで　￹空￺そら￻を\n￹飛￺と￻ぶ　￹高￺たか￻さを　￹調節￺ちょうせつ￻する。"
          violet: "￹人￺ひと￻や　ポケモンを　￹運￺はこ￻ぶ。\nただし　￹風￺かぜ￻に　￹流￺なが￻されてしまうので\n￹行￺い￻き￹先￺さき￻を　￹決￺き￻められない。"
        jp_kanji:
          scarlet: "￹体￺からだ￻の　￹中￺なか￻で　ガスを　￹作￺つく￻ったり\n￹吐￺は￻き￹出￺だ￻したり　することで　￹空￺そら￻を\n￹飛￺と￻ぶ　￹高￺たか￻さを　￹調節￺ちょうせつ￻する。"
          violet: "￹人￺ひと￻や　ポケモンを　￹運￺はこ￻ぶ。\nただし　￹風￺かぜ￻に　￹流￺なが￻されてしまうので\n￹行￺い￻き￹先￺さき￻を　￹決￺き￻められない。"
        en:
          scarlet: "It can generate and release gas within its body.\nThat’s how it can control the altitude of its drift."
          violet: "They carry people and Pokémon, but the\nwind can catch them, so there can’t be a\nfixed destination."
        fr:
          scarlet: "Il contrôle son altitude en produisant des gaz\nà l’intérieur de son corps puis en les expulsant."
          violet: "Il aime servir de moyen de transport. Le seul\ninconvénient est qu’il ne va que dans la direction\ndu vent."
        it:
          scarlet: "Può regolare l’altitudine di volo grazie alla\ncapacità di produrre gas all’interno del proprio\ncorpo e di espellerli."
          violet: "Trasporta Pokémon e persone, ma poiché\nsi lascia trascinare dal vento, non sa mai dove\nandrà a finire."
        de:
          scarlet: "Indem es Gas in seinem Körper erzeugt und\nwieder ausstößt, reguliert es seine Flughöhe."
          violet: "Es transportiert Menschen und Pokémon.\nWohin sie fliegen, bestimmt jedoch ganz\nalleine die Windrichtung."
        es:
          scarlet: "Crea en su interior gases y los expulsa. De esta\nforma es capaz de volar y controlar su altura."
          violet: "Pueden transportar a gente y Pokémon. Sin\nembargo, por culpa de las corrientes de aire,\nno pueden fijar un destino."
        ko:
          scarlet: "몸 안에서 가스를\n만들거나 토해 내며\n하늘을 나는 높이를 조절한다."
          violet: "사람이나 포켓몬을 운반한다.\n단, 바람에 의해 날려가 버리기 때문에\n목적지를 정할 수 없다."
        zh_simp:
          scarlet: "会在体内制造或是\n吐出气体，以此来\n调节飞在空中的高度。"
          violet: "会搬运人和宝可梦。\n但因为只能跟着风飘动，\n因此无法自行决定目的地。"
        zh_trad:
          scarlet: "會在體內製造氣體\n或是吐出氣體\n來調節飛在空中的高度。"
          violet: "會搬運人和寶可夢。\n但由於牠只能隨風漂流，\n因此無法自行決定目的地。"
