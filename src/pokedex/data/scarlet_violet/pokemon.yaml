      descriptions:
        jp_kana:
          scarlet: "￹鼻￺はな￻の　￹穴￺あな￻を　ピタリと　￹閉￺と￻じてから\n￹砂￺すな￻の￹中￺なか￻を　￹歩￺ある￻くように　￹進￺すす￻む。\n１０￹匹程度￺ぴきていど￻の　￹群￺む￻れで　￹暮￺く￻らす。"
          violet: "￹砂￺すな￻で　￹体￺からだ￻を　￹覆￺おお￻うことで\nばい￹菌￺きん￻から　￹身￺み￻を　￹守￺まも￻る。\n￹砂漠￺さばく￻の　￹砂￺すな￻の　￹中￺なか￻を　￹移動￺いどう￻。"
        jp_kanji:
          scarlet: "￹鼻￺はな￻の　￹穴￺あな￻を　ピタリと　￹閉￺と￻じてから\n￹砂￺すな￻の￹中￺なか￻を　￹歩￺ある￻くように　￹進￺すす￻む。\n１０￹匹程度￺ぴきていど￻の　￹群￺む￻れで　￹暮￺く￻らす。"
          violet: "￹砂￺すな￻で　￹体￺からだ￻を　￹覆￺おお￻うことで\nばい￹菌￺きん￻から　￹身￺み￻を　￹守￺まも￻る。\n￹砂漠￺さばく￻の　￹砂￺すな￻の　￹中￺なか￻を　￹移動￺いどう￻。"
        en:
          scarlet: "It shuts its nostrils tight, then travels through\nsand as if walking. They form colonies of\naround 10."
          violet: "It shrouds itself in sand to ward off germs.\nIt travels easily through the sands of the\ndesert."
        fr:
          scarlet: "Ce Pokémon peut obturer ses narines et\navancer dans le sable avec aisance. Il vit\nen colonies d’environ dix individus."
          violet: "Il se déplace dans les sables du désert\net s’en recouvre le corps pour se protéger\ndes microbes."
        it:
          scarlet: "Chiude le narici e poi avanza nella sabbia\nin tutta tranquillità. Vive in gruppi di una\ndecina di esemplari."
          violet: "Si ricopre di sabbia per proteggersi\ndai germi. Si sposta immerso nella\nsabbia del deserto."
        de:
          scarlet: "Dieses Pokémon schließt seine Nasenlöcher und\nreist dann durch den Sand. Es lebt in Kolonien\nmit einer Größe von circa zehn Hippopotas."
          violet: "Es bedeckt sich mit Sand, um Keime\nabzuhalten, und bewegt sich durch den\nWüstensand fort."
        es:
          scarlet: "Cierra los orificios nasales y luego se\ndesplaza por la arena con total tranquilidad.\nSuele formar colonias de diez individuos."
          violet: "Se desplaza por la arena del desierto y se\nembadurna de ella para protegerse de los\ngérmenes."
        ko:
          scarlet: "콧구멍을 꽉 막고\n모래 속을 걸어 다니듯 이동한다.\n10마리 정도가 무리 지어 생활한다."
          violet: "모래로 몸을 덮어\n세균으로부터 몸을 지킨다.\n사막의 모래 안에서 이동한다."
        zh_simp:
          scarlet: "会紧紧闭上鼻孔，然后在\n沙子里如同步行般地前进。\n组成约１０只的群体一起生活。"
          violet: "以沙子覆盖全身，\n让自己免受细菌侵害。\n会在沙漠的沙子里移动。"
        zh_trad:
          scarlet: "會緊閉鼻孔，然後如同\n步行般地在沙子裡前進。\n會組成約１０隻的群體一起生活。"
          violet: "透過用沙子覆蓋全身，\n使自己免於細菌侵害。\n會在沙漠的沙子裡移動。"
