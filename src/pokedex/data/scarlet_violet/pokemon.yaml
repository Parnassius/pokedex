      types:
        - water
      egg_groups:
        - water_1
      abilities:
        - water_absorb
        - damp
      hidden_ability: swift_swim
      descriptions:
        jp_kana:
          scarlet: "お￹腹￺なか￻の　￹渦巻￺うずま￻きは　￹皮膚￺ひふ￻が\n￹透￺す￻けて　￹見￺み￻えた　￹内臓￺ないぞう￻の　￹一部￺いちぶ￻。\nエサを￹食￺た￻べたあと　くっきり　￹見￺み￻える。"
          violet: "まだ　￹脚￺あし￻が　￹生￺は￻えた　ばかりで\nうまく　￹歩￺ある￻けない。　￹水￺みず￻の￹中￺なか￻を\n￹泳￺およ￻いでる　ほうが　￹好￺す￻きなようだ。"
        jp_kanji:
          scarlet: "お￹腹￺なか￻の　￹渦巻￺うずま￻きは　￹皮膚￺ひふ￻が\n￹透￺す￻けて　￹見￺み￻えた　￹内臓￺ないぞう￻の　￹一部￺いちぶ￻。\nエサを￹食￺た￻べたあと　くっきり　￹見￺み￻える。"
          violet: "まだ　￹脚￺あし￻が　￹生￺は￻えた　ばかりで\nうまく　￹歩￺ある￻けない。　￹水￺みず￻の￹中￺なか￻を\n￹泳￺およ￻いでる　ほうが　￹好￺す￻きなようだ。"
        en:
          scarlet: "The swirl on its belly is its insides showing\nthrough the skin. It appears more clearly after\nPoliwag eats."
          violet: "Its legs are newly grown, and it can’t walk very\nwell. It seems to prefer swimming through the\nwater instead."
        fr:
          scarlet: "La spirale sur son ventre est un organe interne\nqu’on voit à travers sa peau. Elle est encore plus\nvisible lorsqu’il vient de manger."
          violet: "Ce Pokémon peine à marcher, car ses pattes\nviennent seulement de pousser. Il semble\npréférer la nage."
        it:
          scarlet: "La spirale sulla pancia è una parte dei suoi\norgani interni che traspare dalla pelle. Si vede\npiù distintamente dopo che ha mangiato."
          violet: "Non riesce a camminare agevolmente per via\ndelle zampe ancora poco sviluppate. Per questo\nmotivo preferisce nuotare."
        de:
          scarlet: "Die Spirale auf seinem Bauch ist ein Teil seiner\nInnereien, die durchscheinen. Hat es gefressen,\nsind diese klarer zu sehen."
          violet: "Da sich seine Beine gerade erst herausgebildet\nhaben, kann es noch nicht gut laufen. Es scheint\nlieber im Wasser zu schwimmen."
        es:
          scarlet: "La espiral que tiene en el vientre son sus vísceras,\nvisibles a través de la piel. Cuando acaba de\ncomer, se ven de manera aún más nítida."
          violet: "Parece que prefiere nadar a caminar, pues las\npatas le acaban de crecer y aún no le permiten\nandar bien."
        ko:
          scarlet: "배의 소용돌이는 피부 너머로\n비쳐 보이는 내장의 일부다.\n먹이를 먹으면 선명하게 보인다."
          violet: "다리가 생긴 지 얼마 되지 않아서\n잘 걷지 못한다. 물속을 헤엄치는 쪽을\n더 좋아하는 것 같다."
        zh_simp:
          scarlet: "腹部的漩涡是透过皮肤\n所能看到的部分内脏。\n进食后能看得很清楚。"
          violet: "因为刚刚长出腿来，\n所以还不能好好走路。\n似乎更喜欢在水中游泳。"
        zh_trad:
          scarlet: "腹部的漩渦是透過皮膚\n可以看到的部分內臟。\n在牠進食後可以明顯看到。"
          violet: "由於腳才剛長出來，\n因此還不太擅長走路。\n似乎更喜歡在水中游泳。"
poliwhirl:
