          violet: "￹垂直￺すいちょく￻の　￹壁￺かべ￻に　￹指先￺ゆびさき￻で\nぴたりと　￹張￺は￻りついて　￹高層￺こうそう￻ビルも\nすいすいと　￹登￺のぼ￻りきることができる。"
        jp_kanji:
          scarlet: "￹地形￺ちけい￻を　￹活￺い￻かした　￹戦法￺せんぽう￻が\n￹得意￺とくい￻。　￹小石￺こいし￻を　￹泡￺あわ￻で　￹包￺つつ￻んだ\nつぶては　￹百発百中￺ひゃっぱつひゃくちゅう￻だ。"
          violet: "￹垂直￺すいちょく￻の　￹壁￺かべ￻に　￹指先￺ゆびさき￻で\nぴたりと　￹張￺は￻りついて　￹高層￺こうそう￻ビルも\nすいすいと　￹登￺のぼ￻りきることができる。"
        en:
          scarlet: "It excels at devising battle strategies that make\nuse of the terrain, and it never misses its mark\nwhen throwing bubble-covered pebbles."
          violet: "The tips of its fingers and toes stick firmly to\nvertical surfaces. Frogadier can scale skyscrapers\nwith ease."
        fr:
          scarlet: "Ce fin stratège sait se servir du terrain\nà son avantage. Quand il lance des cailloux\nrecouverts d’écume, il ne manque jamais sa cible."
          violet: "Le bout des doigts de ses mains et de ses pieds\nadhère fermement aux parois verticales. Il peut\nmême gravir les gratte-ciel sans aucune difficulté."
        it:
          scarlet: "È un genio delle tattiche che sfruttano al meglio\nla configurazione del terreno. Lancia sassi avvolti\nnella schiuma che non mancano mai il bersaglio."
          violet: "Può restare aggrappato a pareti verticali con\nle estremità delle dita. Questo gli permette di\nscalare con facilità anche i grattacieli."
        de:
          scarlet: "Seine Stärke sind Kampfstrategien, bei denen es\ndie Umgebung nutzt. Es wirft kleine, in Blasen\ngehüllte Steine und trifft so garantiert sein Ziel."
          violet: "Mit den Finger- und Zehenspitzen kann es sich\nan Wände heften und so selbst hohe Gebäude\nin Windeseile emporklettern."
        es:
          scarlet: "Es muy hábil ideando tácticas que usan el terreno\na su favor. Dispara piedras envueltas en burbujas\ncon tal puntería que no falla nunca."
          violet: "Es capaz de adherirse a superficies verticales con\nla punta de los dedos, lo cual le permite escalar\nincluso rascacielos sin dificultad."
        ko:
          scarlet: "지형을 활용한 전법이 특기다.\n조약돌을 거품으로 감싸서\n날리는 기술은 백발백중이다."
          violet: "수직 벽에 손끝으로 찰싹 붙어서\n고층 빌딩도 척척 오를 수 있다."
        zh_simp:
          scarlet: "擅长活用地形的战术。\n投掷被泡泡包着的\n小石头时百发百中。"
          violet: "指尖能紧贴垂直的墙壁，\n即使是高楼大厦，\n它也能轻松登顶。"
        zh_trad:
          scarlet: "擅長活用地形的戰術。\n投擲用泡泡包著的\n小石頭時是百發百中。"
          violet: "指尖能完美貼在垂直的\n壁面上，即使是高樓大廈\n也能輕鬆地爬到最頂端。"
