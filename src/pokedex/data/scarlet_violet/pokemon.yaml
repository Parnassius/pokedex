      hidden_ability: harvest
      descriptions:
        jp_kana:
          scarlet: "￹長￺なが￻い￹首￺くび￻を　ムチのように　しならせ\n￹頭￺あたま￻を　￹相手￺あいて￻に　￹叩￺たた￻きつける。\n￹自分￺じぶん￻も　￹少￺すこ￻しだけ　￹目￺め￻を￹回￺まわ￻す。"
          violet: "￹伸￺の￻び￹伸￺の￻び　￹育￺そだ￻って　サイコパワーは\nいらなくなり　￹眠￺ねむ￻れる　ドラゴンの\n￹力￺ちから￻が　￹覚醒￺かくせい￻　したのだ。"
        jp_kanji:
          scarlet: "￹長￺なが￻い￹首￺くび￻を　ムチのように　しならせ\n￹頭￺あたま￻を　￹相手￺あいて￻に　￹叩￺たた￻きつける。\n￹自分￺じぶん￻も　￹少￺すこ￻しだけ　￹目￺め￻を￹回￺まわ￻す。"
          violet: "￹伸￺の￻び￹伸￺の￻び　￹育￺そだ￻って　サイコパワーは\nいらなくなり　￹眠￺ねむ￻れる　ドラゴンの\n￹力￺ちから￻が　￹覚醒￺かくせい￻　したのだ。"
        en:
          scarlet: "It swings its long neck like a whip and smacks its\nhead into opponents. This makes Exeggutor itself\na little dizzy too."
          violet: "As it grew taller and taller, it outgrew its reliance\non psychic powers, while within it awakened the\npower of the sleeping dragon."
        fr:
          scarlet: "Il utilise son grand cou comme un fouet et assène\ndes coups de tête à ses adversaires. Ces attaques\nl’étourdissent aussi un peu."
          violet: "Au fil de sa croissance, ses pouvoirs psychiques\nsont devenus inutiles, tandis que le pouvoir des\ndragons qui sommeillait en lui s’est réveillé."
        it:
          scarlet: "Agita il lungo collo come una frusta per colpire\nl’avversario con le teste, però rimane un po’\nstordito anche lui."
          violet: "Essendo cresciuto a dismisura, ha smesso di usare\ni propri poteri psichici, ma in compenso si è\nrisvegliata in lui la forza latente di un drago."
        de:
          scarlet: "Es greift mit seinen Köpfen an, indem es\nden langen Hals wie eine Peitsche schwingt.\nDabei wird ihm jedoch leicht schwindelig."
          violet: "Der Wachstumsschub machte seine Psycho-Kräfte\nüberflüssig. Stattdessen wurden die in ihm\nschlummernden Drachen-Kräfte geweckt."
        es:
          scarlet: "Asesta cabezazos al oponente chasqueando\nel cuello como un látigo. Se marea un poco al\nhacerlo."
          violet: "Al crecer, ha dejado de necesitar su poder\npsíquico, pero ha despertado en cambio el\npoder dragontino que tenía latente."
        ko:
          scarlet: "긴 목을 채찍처럼 휘둘러서\n머리로 상대를 힘껏 친다.\n자신도 조금 어질어질해진다."
          violet: "무럭무럭 자라 사이코 파워는\n필요 없게 되어 잠들어 있던\n드래곤의 힘이 각성했다."
        zh_simp:
          scarlet: "能让长脖子像鞭子一样弯曲，\n并用头重重地敲打对手。\n自己也会有些头晕眼花。"
          violet: "悠然惬意地长大之后，\n它便不再需要原来的精神力量，\n沉睡于体内的龙之力量已经觉醒。"
        zh_trad:
          scarlet: "能像甩鞭子一樣揮動長脖子，\n用頭重重地敲擊對手。\n自己也會有些頭暈眼花。"
          violet: "悠悠地成長，\n變得不再需要精神力量，\n沉睡的龍之力也覺醒了。"
