        jp_kana:
          scarlet: "オレンジ￹色￺いろ￻の￹花￺はな￻に　￹乗￺の￻っている。\n￹癒￺いや￻しの　￹効果￺こうか￻を　￹持￺も￻つ　￹花粉￺かふん￻の　￹冠￺かんむり￻を\n￹頭￺あたま￻に　￹乗￺の￻せている。"
          violet: "￹花￺はな￻から　￹力￺ちから￻を　￹貰￺もら￻うかわりに\n￹花￺はな￻に　エネルギーを　￹分￺わ￻け￹与￺あた￻える。\nオレンジ￹色￺いろ￻の￹花￺はな￻が　お￹気￺き￻に￹入￺い￻り。"
        jp_kanji:
          scarlet: "オレンジ￹色￺いろ￻の￹花￺はな￻に　￹乗￺の￻っている。\n￹癒￺いや￻しの　￹効果￺こうか￻を　￹持￺も￻つ　￹花粉￺かふん￻の　￹冠￺かんむり￻を\n￹頭￺あたま￻に　￹乗￺の￻せている。"
          violet: "￹花￺はな￻から　￹力￺ちから￻を　￹貰￺もら￻うかわりに\n￹花￺はな￻に　エネルギーを　￹分￺わ￻け￹与￺あた￻える。\nオレンジ￹色￺いろ￻の￹花￺はな￻が　お￹気￺き￻に￹入￺い￻り。"
        en:
          scarlet: "This Flabébé rides an orange flower. On its\nhead, it wears a crown of pollen that has\nhealing properties."
          violet: "It receives strength from flowers and gives them\nsome of its energy in return. This Pokémon likes\norange flowers best of all."
        fr:
          scarlet: "Ce Flabébé est perché sur une fleur orange.\nIl porte une couronne de pollen aux vertus\napaisantes."
          violet: "Ce Pokémon absorbe la puissance des fleurs, et\nen échange, il partage son énergie avec elles.\nIl préfère les fleurs orange."
        it:
          scarlet: "Un Flabébé su un fiore arancione. Porta sulla\ntesta una corona di polline dalle proprietà\ncurative."
          violet: "Riceve la forza dai fiori e dà loro in cambio\nparte della sua energia. Gli piacciono i fiori\narancioni."
        de:
          scarlet: "Dieses Flabébé umklammert eine orange Blume.\nDie Krone auf seinem Kopf besteht aus Pollen\nund besitzt eine heilende Wirkung."
          violet: "Es bezieht seine Kraft aus Blumen und gibt ihnen\nim Gegenzug einen Teil seiner Energie. Orange\nBlumen haben es ihm besonders angetan."
        es:
          scarlet: "Cabalga una flor naranja. La tiara de polen que\nlleva en la cabeza tiene propiedades curativas."
          violet: "Extrae el poder de las flores y, a cambio, les\nda a estas su energía. Las flores naranjas son\nsus favoritas."
        ko:
          scarlet: "오렌지색 꽃을 타고 있다.\n치유 효과를 가진 꽃가루 왕관을\n머리에 쓰고 있다."
          violet: "꽃에서 힘을 얻는 대신\n꽃에 에너지를 나눠 준다.\n오렌지색 꽃을 좋아한다."
        zh_simp:
          scarlet: "乘坐在橙花上。\n会把具有治愈效果的\n花粉冠戴在头上。"
          violet: "由于从花那里得到力量，\n因此相应地会分出能量给花。\n它最喜欢的是橙花。"
        zh_trad:
          scarlet: "乘著橙花的花蓓蓓。\n會把具備療癒效果的\n花粉冠戴在頭上。"
          violet: "因為從花那裡得到力量，\n所以會分出自己的能量給花。\n最喜歡的是橙花。"
