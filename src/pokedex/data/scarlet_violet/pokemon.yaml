          violet: "￹近寄￺ちかよ￻るものを　￹恐￺おそ￻れさせるため\n￹体￺からだ￻の　￹輪￺わ￻っか￹模様￺もよう￻は\n￹暗￺くら￻くなると　￹自然￺しぜん￻に￹光￺ひか￻り￹出￺だ￻す。"
        jp_kanji:
          scarlet: "￹月￺つき￻の　￹波動￺はどう￻を　￹体￺からだ￻に　￹浴￺あ￻びると\n￹輪￺わ￻っか￹模様￺もよう￻が　ほのかに　￹輝￺かがや￻き\n￹不思議￺ふしぎ￻な　￹力￺ちから￻に　￹目覚￺めざ￻めるのだ。"
          violet: "￹近寄￺ちかよ￻るものを　￹恐￺おそ￻れさせるため\n￹体￺からだ￻の　￹輪￺わ￻っか￹模様￺もよう￻は\n￹暗￺くら￻くなると　￹自然￺しぜん￻に￹光￺ひか￻り￹出￺だ￻す。"
        en:
          scarlet: "When exposed to the moon’s aura, the rings on\nits body glow faintly and it gains a mysterious\npower."
          violet: "When darkness falls, the rings on the body\nbegin to glow, striking fear in the hearts of\nanyone nearby."
        fr:
          scarlet: "Quand il s’expose aux ondes lunaires,\nses anneaux brillent légèrement et\nil acquiert un mystérieux pouvoir."
          violet: "Quand la nuit tombe, les anneaux sur son corps\nse mettent à luire et terrorisent quiconque\ns’approche de lui."
        it:
          scarlet: "Quando è esposto alla luce lunare i cerchi sul suo\ncorpo brillano e acquisisce uno strano potere."
          violet: "Nell’oscurità, i cerchi sul suo corpo brillano,\nterrorizzando chi si trova nelle vicinanze."
        de:
          scarlet: "Wird es der Aura des Mondes ausgesetzt, glühen\ndie ringförmigen Muster auf seinem Körper leicht\nund es erhält eine mysteriöse Kraft."
          violet: "Die ringförmigen Muster auf seinem Körper\nbeginnen bei Einbruch der Nacht zu leuchten,\num all jene zu verängstigen, die sich ihm nähern."
        es:
          scarlet: "Si se expone al aura de la luna, los anillos de su\ncuerpo relucen y adquiere un poder misterioso."
          violet: "Cuando oscurece, los anillos de su cuerpo\ncomienzan a brillar y asustan a cualquiera\nque se acerque."
        ko:
          scarlet: "달의 파동을 몸에 쬐면\n고리 모양이 희미하게 빛나며\n이상한 힘에 눈을 뜬다."
          violet: "접근하는 무리에게 겁을 주기 위해\n몸에 있는 고리 모양의 무늬는\n어두워지면 자연적으로 빛을 낸다."
        zh_simp:
          scarlet: "当身体沐浴了月亮波动后，\n圈圈一样的花纹就会微微发光，\n继而使神奇的力量觉醒。"
          violet: "为了使靠近它的家伙感到害怕，\n它身上圆圈形的花纹会在\n天色变暗时自然地发出光芒。"
        zh_trad:
          scarlet: "當身體沐浴了月亮波動後，\n圓形花紋就會微微發光，\n使神秘的力量因而覺醒。"
          violet: "為了讓靠近牠的傢伙感到害怕，\n每當天色一暗，身上圈圈\n一樣的花紋就會自然發光。"
