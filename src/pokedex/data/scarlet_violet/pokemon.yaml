          scarlet: "￹大￺おお￻きな　￹口￺くち￻から　￹吐￺は￻く　￹冷気￺れいき￻で\n￹獲物￺えもの￻は　￹一瞬￺いっしゅん￻で　カチコチ。\nそのまま　バリバリ　￹頂￺いただ￻くのだ。"
          violet: "￹空気中￺くうきちゅう￻の　￹水分￺すいぶん￻を\n￹一瞬￺いっしゅん￻で　￹凍￺こお￻らせることで\n￹獲物￺えもの￻が　￹逃￺に￻げられないように　する。"
        jp_kanji:
          scarlet: "￹大￺おお￻きな　￹口￺くち￻から　￹吐￺は￻く　￹冷気￺れいき￻で\n￹獲物￺えもの￻は　￹一瞬￺いっしゅん￻で　カチコチ。\nそのまま　バリバリ　￹頂￺いただ￻くのだ。"
          violet: "￹空気中￺くうきちゅう￻の　￹水分￺すいぶん￻を\n￹一瞬￺いっしゅん￻で　￹凍￺こお￻らせることで\n￹獲物￺えもの￻が　￹逃￺に￻げられないように　する。"
        en:
          scarlet: "Its prey is instantaneously frozen stiff by the cold\nair it exhales from its huge mouth. While they’re\nin that frozen state, it gobbles them up."
          violet: "It prevents prey from escaping by\ninstantaneously freezing moisture\nin the air."
        fr:
          scarlet: "Le souffle glacé qui sort de sa large gueule lui\npermet de congeler instantanément ses proies.\nIl les croque ensuite comme des glaçons."
          violet: "Il empêche ses proies de prendre la fuite\nen gelant instantanément l’humidité de l’air."
        it:
          scarlet: "Congela le prede in un istante soffiando aria\ngelida dalla grande bocca, poi le sgranocchia\nancora ghiacciate."
          violet: "Impedisce alla preda di fuggire congelando\nall’istante l’umidità nell’aria."
        de:
          scarlet: "Mit dem Eiseshauch aus seinem riesigen Mund\nfriert es seine Beute augenblicklich ein, um sie\ndann genüsslich zu verspeisen."
          violet: "Es verhindert, dass seine Beute flieht, indem es\ndie Feuchtigkeit in der Luft augenblicklich\ngefrieren lässt."
        es:
          scarlet: "Congela a sus presas instantáneamente con el\naire frío que expulsa por la boca y, acto seguido,\nlas devora."
          violet: "Impide que sus presas se escapen congelando la\nhumedad del aire en un instante."
        ko:
          scarlet: "커다란 입에서 뿜는 냉기로\n먹이는 한순간에 꽁꽁.\n그대로 아드득아드득 잡아먹는다."
          violet: "공기 중의 수분을\n일순간에 얼려 버리는 것으로\n먹이가 도망치지 못하게 한다."
        zh_simp:
          scarlet: "从大大的嘴巴里喷出冷气，\n把猎物瞬间冻得硬邦邦的。\n就这么嘎嘣嘎嘣地享用食物。"
          violet: "通过一瞬间冻住\n空气中的水分，\n让猎物无处可逃。"
        zh_trad:
          scarlet: "從大大的嘴巴裡噴出寒氣，\n把獵物瞬間凍得硬梆梆的，\n然後大口咬碎享用。"
          violet: "會透過瞬間凍結\n空氣中的水分，\n使獵物無法逃脫。"
