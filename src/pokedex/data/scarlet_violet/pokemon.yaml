        jp_kana:
          scarlet: "￹尻尾￺しっぽ￻を　スクリューのように　まわし\n￹水中￺すいちゅう￻を　￹泳￺およ￻ぐだけでなく\nまとわりつく　￹海草￺かいそう￻も　￹切￺き￻れる。"
          violet: "￹首￺くび￻の　￹浮￺う￻き￹袋￺ぶくろ￻を　ふくらませて\n￹水面￺すいめん￻に　￹顔￺かお￻を　￹出￺だ￻し　￹地上￺ちじょう￻の\n￹獲物￺えもの￻の　￹動￺うご￻きを　￹探￺さぐ￻るのだ。"
        jp_kanji:
          scarlet: "￹尻尾￺しっぽ￻を　スクリューのように　まわし\n￹水中￺すいちゅう￻を　￹泳￺およ￻ぐだけでなく\nまとわりつく　￹海草￺かいそう￻も　￹切￺き￻れる。"
          violet: "￹首￺くび￻の　￹浮￺う￻き￹袋￺ぶくろ￻を　ふくらませて\n￹水面￺すいめん￻に　￹顔￺かお￻を　￹出￺だ￻し　￹地上￺ちじょう￻の\n￹獲物￺えもの￻の　￹動￺うご￻きを　￹探￺さぐ￻るのだ。"
        en:
          scarlet: "It spins its two tails like a screw to propel itself\nthrough water. The tails also slice clinging\nseaweed."
          violet: "It inflates its flotation sac, keeping its face above\nwater in order to watch for prey movement."
        fr:
          scarlet: "Il se propulse sous l’eau et tranche les algues\nqui le gênent à l’aide de ses deux queues,\nqu’il utilise comme une hélice."
          violet: "La bouée autour de son cou lui permet de garder\nla tête hors de l’eau. Ainsi, il peut scruter les\nmouvements de ses proies sur la terre ferme."
        it:
          scarlet: "Facendo girare le sue code a mo’ di elica\nsi sposta nell’acqua e riesce anche a\nfalciare le alghe quando rimane impigliato."
          violet: "Gonfia il suo collare galleggiante e rimane con\nla testa fuori dall’acqua in cerca di prede\nsulla terraferma."
        de:
          scarlet: "Es lässt seine Ruten wie eine Schiffsschraube\nrotieren, um sich im Wasser fortzubewegen und\nAlgen zu zerschneiden, die an ihm haften."
          violet: "Füllt es die Schwimmblase um seinen Hals mit\nLuft, ragt sein Kopf aus dem Wasser und es kann\ndie Bewegungen von Beute an Land beobachten."
        es:
          scarlet: "Para impulsarse por el agua, gira sus dos colas\ncomo una hélice. Así también corta las algas\ndel camino."
          violet: "La vejiga natatoria alrededor del cuello le\npermite flotar en el agua con la cabeza fuera\npara divisar a sus presas."
        ko:
          scarlet: "꼬리를 스크루처럼 돌려서\n수중을 헤엄치는 것뿐만 아니라\n엉겨 붙는 해초도 자를 수 있다."
          violet: "목의 부낭을 부풀려\n수면에 얼굴을 내밀고 지상에 있는\n먹이의 움직임을 살핀다."
        zh_simp:
          scarlet: "像螺旋桨一样旋转着尾巴，\n不仅能让它在水里游泳，\n还能切断缠住自己的海草。"
          violet: "使脖子上的浮囊膨胀，\n来让脸部露出水面，\n以此探查岸上猎物的动静。"
        zh_trad:
          scarlet: "像螺旋槳一樣旋轉的尾巴\n除了能夠讓牠在水裡游泳，\n還能切斷纏住自己的海草。"
          violet: "會膨脹頸部的浮囊\n讓自己能把臉露出水面，\n以探查地上獵物的動靜。"
