      abilities:
        - levitate
      descriptions:
        jp_kana:
          scarlet: "￹扇風機￺せんぷうき￻に　￹入￺はい￻った　￹姿￺すがた￻。\nあたりのものを　￹吹￺ふ￻き￹飛￺と￻ばしては\nしてやったりと　ほくそ￹笑￺え￻んでいる。"
          violet: "ロトムが　￹入￺はい￻れる　￹家電製品￺かでんせいひん￻は\nいくつか　あるが　いちばん　￹初￺はじ￻めに\n￹開発￺かいはつ￻されたのは　￹扇風機￺せんぷうき￻だ。"
        jp_kanji:
          scarlet: "￹扇風機￺せんぷうき￻に　￹入￺はい￻った　￹姿￺すがた￻。\nあたりのものを　￹吹￺ふ￻き￹飛￺と￻ばしては\nしてやったりと　ほくそ￹笑￺え￻んでいる。"
          violet: "ロトムが　￹入￺はい￻れる　￹家電製品￺かでんせいひん￻は\nいくつか　あるが　いちばん　￹初￺はじ￻めに\n￹開発￺かいはつ￻されたのは　￹扇風機￺せんぷうき￻だ。"
        en:
          scarlet: "This Rotom has entered an electric fan. It smirks\nwith satisfaction over a prank well pulled after it\nblows away everything around it."
          violet: "There are several appliances that Rotom can\ninspirit, but the first one to be developed was\nthe electric fan."
        fr:
          scarlet: "Ce Motisma a pris possession d’un ventilateur.\nIl fait s’envoler tout objet à proximité puis\nricane, content de lui."
          violet: "Motisma est capable de prendre possession de\ndifférents types d’appareils ménagers, mais le\npremier à avoir été développé est le ventilateur."
        it:
          scarlet: "Ha assunto questa forma entrando in un\nventilatore. Fa volare via tutto ciò che ha intorno\nper poi gioire compiaciuto del risultato."
          violet: "Esistono diversi elettrodomestici in cui Rotom\npuò entrare, ma il primo a essere stato prodotto\nè il ventilatore."
        de:
          scarlet: "Dieses Rotom ist in einen Ventilator\neingedrungen. Es wirbelt Dinge ringsum wild\ndurch die Luft und lächelt dann hämisch."
          violet: "Es gibt eine Reihe elektrischer Haushaltsgeräte,\nin die Rotom eindringen kann, doch das erste,\ndas entwickelt wurde, war der Ventilator."
        es:
          scarlet: "Asume esta forma cuando toma posesión de un\nventilador. Hace volar por los aires los objetos\nque tiene alrededor y acto seguido ríe para sí."
          violet: "Rotom puede tomar posesión de una amplia\nselección de aparatos, pero el primero de ellos\nfue el ventilador."
        ko:
          scarlet: "선풍기에 들어간 모습.\n주위에 있는 물건을 날려 버리고는\n해냈다는 듯이 싱글벙글하고 있다."
          violet: "로토무가 들어가는 가전제품에는\n여러 종류가 있지만, 그중에서도\n가장 처음으로 개발된 것은 선풍기다."
        zh_simp:
          scarlet: "钻进电风扇里的样子。\n会吹飞四周的东西，\n然后发出得逞了的窃笑。"
          violet: "虽然能让洛托姆钻进去的\n家电产品有好几种，\n但最先被研发出来的是电风扇。"
        zh_trad:
          scarlet: "鑽進了電風扇裡的樣子。\n會把周圍的東西全都吹飛，\n然後如得逞般地竊笑著。"
          violet: "雖然能讓洛托姆鑽進去的\n家電用品有好幾種，\n但最先被研發出的是電風扇。"
    rotom_mow:
