      descriptions:
        jp_kana:
          scarlet: "￹深￺ふか￻い￹穴￺あな￻を　￹掘￺ほ￻って　￹生活￺せいかつ￻。\n￹危険￺きけん￻が　￹迫￺せま￻ると　￹体￺からだ￻を　￹丸￺まる￻め\n￹敵￺てき￻の　￹攻撃￺こうげき￻を　じっと　￹耐￺た￻える。"
          violet: "どんなに　￹高￺たか￻い　ところから\n￹落￺お￻ちても　￹体￺からだ￻を　￹丸￺まる￻めれば\nバウンドできて　￹助￺たす￻かるのだ。"
        jp_kanji:
          scarlet: "￹深￺ふか￻い￹穴￺あな￻を　￹掘￺ほ￻って　￹生活￺せいかつ￻。\n￹危険￺きけん￻が　￹迫￺せま￻ると　￹体￺からだ￻を　￹丸￺まる￻め\n￹敵￺てき￻の　￹攻撃￺こうげき￻を　じっと　￹耐￺た￻える。"
          violet: "どんなに　￹高￺たか￻い　ところから\n￹落￺お￻ちても　￹体￺からだ￻を　￹丸￺まる￻めれば\nバウンドできて　￹助￺たす￻かるのだ。"
        en:
          scarlet: "It digs deep burrows to live in. When in danger,\nit rolls up its body to withstand attacks."
          violet: "No matter how high a place it falls from, this\nPokémon can save itself by rolling into a ball\nand bouncing."
        fr:
          scarlet: "Il vit dans les profonds tunnels qu’il creuse.\nEn cas de danger, il se roule en boule pour\nencaisser les coups de ses adversaires."
          violet: "S’il tombe de haut, il peut s’en sortir indemne\nen se roulant en boule et en rebondissant,\nquelle que soit la hauteur de sa chute."
        it:
          scarlet: "Scava profondi tunnel in cui poi vive. Quando\nun pericolo si avvicina, si appallottola e incassa\nimmobile l’attacco."
          violet: "Se cade da una grande altezza, questo Pokémon\npuò salvarsi appallottolandosi e rimbalzando."
        de:
          scarlet: "Es gräbt tiefe Baue, um darin zu leben.\nBei Gefahr rollt es sich zusammen und\nsitzt den Angriff aus."
          violet: "Egal, aus welcher Höhe dieses Pokémon fällt,\nes kann den Sturz abfangen, indem es sich\nzusammenrollt und vom Boden abprallt."
        es:
          scarlet: "Excava madrigueras profundas en las que vive.\nCuando lo ataca algún enemigo, se hace una\nbola y aguanta pacientemente sus embates."
          violet: "Puede salvarse de una caída desde cualquier\naltura haciéndose una bola y rebotando contra\nel suelo."
        ko:
          scarlet: "깊은 구멍을 파서 생활한다.\n위험이 닥치면 몸을 말아\n상대의 공격을 가만히 견딘다."
          violet: "아무리 높은 곳에서\n떨어져도 몸을 둥글게 말면\n바운드해서 살 수 있다."
        zh_simp:
          scarlet: "会挖出深深的洞穴用来生活。\n当危险逼近时，会蜷起身体\n一动不动地忍受敌人的攻击。"
          violet: "无论从多高的地方掉下来，\n只要将身体蜷成一团\n便能反弹起来得救。"
        zh_trad:
          scarlet: "會挖掘深洞在裡頭生活。\n危險逼近時，會將身體蜷成一團\n一動也不動地忍受敵手的攻擊。"
          violet: "不管從多高的地方掉下，\n只要把身體蜷成一團\n就可以藉著反彈而得救。"
    sandshrew_alolan_form:
      form_id: 1
      names:
