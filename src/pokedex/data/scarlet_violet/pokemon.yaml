        - water_1
        - water_3
      abilities:
        - hyper_cutter
        - shell_armor
      hidden_ability: adaptability
      descriptions:
        jp_kana:
          scarlet: "￹外国￺がいこく￻から　やってきた。　￹汚￺よご￻れた\n￹川￺かわ￻でも　どんどん　￹増￺ふ￻えていく\n￹強￺つよ￻い　￹生命力￺せいめいりょく￻の　￹持￺も￻ち￹主￺ぬし￻。"
          violet: "￹水質￺すいしつ￻が　￹悪￺わる￻くても　￹平気￺へいき￻なので\nほかの　￹水￺みず￻ポケモンと　エサの\n￹奪￺うば￻い￹合￺あ￻いがなく　どんどん　￹増￺ふ￻えた。"
        jp_kanji:
          scarlet: "￹外国￺がいこく￻から　やってきた。　￹汚￺よご￻れた\n￹川￺かわ￻でも　どんどん　￹増￺ふ￻えていく\n￹強￺つよ￻い　￹生命力￺せいめいりょく￻の　￹持￺も￻ち￹主￺ぬし￻。"
          violet: "￹水質￺すいしつ￻が　￹悪￺わる￻くても　￹平気￺へいき￻なので\nほかの　￹水￺みず￻ポケモンと　エサの\n￹奪￺うば￻い￹合￺あ￻いがなく　どんどん　￹増￺ふ￻えた。"
        en:
          scarlet: "It came from overseas. It is a very hardy creature\nthat will quickly proliferate, even in polluted\nstreams."
          violet: "It can live in impure water, where it doesn’t need\nto compete with other water Pokémon for food,\nso its numbers have steadily increased."
        fr:
          scarlet: "Il vient d’un pays étranger.\nC’est un Pokémon très résistant qui prolifère,\nmême dans les rivières polluées."
          violet: "Cette espèce a proliféré, car elle peut vivre dans\nles eaux sales et donc s’alimenter sans disputer\nsa nourriture aux autres Pokémon aquatiques."
        it:
          scarlet: "Proviene da un’altra regione. È una creatura\nresistente che prolifera rapidamente anche\nnei corsi d’acqua più inquinati."
          violet: "Vivendo anche in acque inquinate non deve\ncontendersi il cibo con altri Pokémon acquatici,\ne ciò gli ha permesso di proliferare."
        de:
          scarlet: "Es kam von Übersee und ist sehr robust.\nAuch in verschmutzten Flüssen kann es sich\nrasch vermehren."
          violet: "Da ihm schmutziges Wasser nichts ausmacht, muss\nes nicht mit anderen Wasser-Pokémon ums Futter\nstreiten. Deshalb konnte es sich rasch vermehren."
        es:
          scarlet: "Esta criatura, procedente del extranjero,\nes resistente y se reproduce con rapidez,\nincluso en ríos sucios o contaminados."
          violet: "Puede vivir en aguas contaminadas, lo que le\nha permitido proliferar al no tener que competir\npor el sustento con otros Pokémon acuáticos."
        ko:
          scarlet: "외국에서 왔다. 더러운 강에서도\n개체 수가 증가할 만큼\n강한 생명력을 가졌다."
          violet: "수질이 나빠도 아랑곳하지 않아서\n다른 물포켓몬과 먹이를 두고\n다투는 일 없이 점점 늘어났다."
        zh_simp:
          scarlet: "来自外国。生命力很强，\n即使是在很脏的河川里，\n数量也会不断增加。"
          violet: "即使水质很差也不在乎，\n因此没有其他水宝可梦和它\n争夺食物，导致其数量不断增加。"
        zh_trad:
          scarlet: "來自外國，有著頑強生命力\n的寶可夢。即使河水很髒，\n也能接連不斷地繁衍後代。"
          violet: "即使水質惡劣也不以為意，因此\n不會和其他水寶可夢爭奪食物，\n使得牠們的數量不斷增加。"
