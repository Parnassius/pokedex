      descriptions:
        jp_kana:
          scarlet: "コマタナを　￹率￺ひき￻いて　￹群￺む￻れを　￹成￺な￻す。\n￹縄張￺なわば￻りを　￹賭￺か￻けて　￹争￺あらそ￻い　￹負￺ま￻けた\n￹群￺む￻れは　￹吸収￺きゅうしゅう￻されていくのだ。"
          violet: "￹体中￺からだじゅう￻の　￹鋭利￺えいり￻な　￹刃￺やいば￻で\n￹容赦￺ようしゃ￻なく　￹相手￺あいて￻を　￹切￺き￻り￹刻￺きざ￻む。\n￹勝￺か￻つために　￹手段￺しゅだん￻は　￹選￺えら￻ばない。"
        jp_kanji:
          scarlet: "コマタナを　￹率￺ひき￻いて　￹群￺む￻れを　￹成￺な￻す。\n￹縄張￺なわば￻りを　￹賭￺か￻けて　￹争￺あらそ￻い　￹負￺ま￻けた\n￹群￺む￻れは　￹吸収￺きゅうしゅう￻されていくのだ。"
          violet: "￹体中￺からだじゅう￻の　￹鋭利￺えいり￻な　￹刃￺やいば￻で\n￹容赦￺ようしゃ￻なく　￹相手￺あいて￻を　￹切￺き￻り￹刻￺きざ￻む。\n￹勝￺か￻つために　￹手段￺しゅだん￻は　￹選￺えら￻ばない。"
        en:
          scarlet: "This Pokémon commands a group of several\nPawniard. Groups that are defeated in territorial\ndisputes are absorbed by the winning side."
          violet: "Bisharp mercilessly cuts its opponents to pieces\nwith the sharp blades covering its body. It will do\nanything to win."
        fr:
          scarlet: "Il dirige des cohortes de Scalpion. Les groupes\nqui sont vaincus lors de guerres de territoires\nrejoignent les vainqueurs."
          violet: "Ce Pokémon découpe ses ennemis sans pitié\nà l’aide des lames tranchantes sur son corps.\nIl est prêt à tout pour remporter la victoire."
        it:
          scarlet: "Comanda dei gruppi di Pawniard.\nI gruppi che risultano perdenti nelle lotte per\nil territorio vengono assorbiti dai vincitori."
          violet: "Fa a pezzi l’avversario senza alcuna pietà\ncon le affilatissime lame al centro del suo corpo.\nUsa ogni mezzo pur di vincere."
        de:
          scarlet: "Es dient als Anführer einer Schar Gladiantri.\nNach Revierkämpfen werden die Verlierer in\ndie Gewinnerschar assimiliert."
          violet: "Mit den scharfen Klingen an seinem Körper hackt\nes Gegner gnadenlos in Stücke. Um den Sieg zu\nerringen, ist ihm jedes Mittel recht."
        es:
          scarlet: "Dirige a varios Pawniard para conformar grupos.\nTras una disputa territorial, el grupo victorioso\nincorpora a los vencidos."
          violet: "Rebana al enemigo sin piedad con las afiladas\nhojas que le recubren el cuerpo, pues siente que\nla victoria es un fin que justifica cualquier medio."
        ko:
          scarlet: "자망칼을 거느리며 무리를 만든다.\n영역을 건 싸움에서 진 무리는\n이긴 쪽에 흡수된다."
          violet: "온몸에 달린 예리한 칼날로\n자비 없이 상대를 베어 버린다.\n이기기 위해서라면 수단을 가리지 않는다."
        zh_simp:
          scarlet: "率领着驹刀小兵成群结队。\n在地盘之争中落败的群体，\n会一个接一个地被吸收。"
          violet: "会用全身上下的利刃\n毫不留情地斩断对手。\n为求胜利不择手段。"
        zh_trad:
          scarlet: "率領駒刀小兵成群結隊。\n輸掉賭上地盤之爭的群體，\n會一個接一個地遭到吸收。"
          violet: "會用全身上下的利刃\n毫不留情地斬斷對手。\n為求勝利不擇手段。"
