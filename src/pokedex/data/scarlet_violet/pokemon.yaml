      descriptions:
        jp_kana:
          scarlet: "￹砂漠￺さばく￻の￹精霊￺せいれい￻　と　￹呼￺よ￻ばれる。\nはばたくことで　￹巻￺ま￻き￹起￺お￻こした\n￹砂嵐￺すなあらし￻の　￹中￺なか￻に　￹隠￺かく￻れている。"
          violet: "￹羽音￺はおと￻は　まるで　￹歌声￺うたごえ￻。\n￹音￺おと￻に　￹魅￺み￻せられた￹者￺もの￻は　￹砂嵐￺すなあらし￻に\n￹巻￺ま￻き￹込￺こ￻まれ　フライゴンの　￹餌食￺えじき￻。"
        jp_kanji:
          scarlet: "￹砂漠￺さばく￻の￹精霊￺せいれい￻　と　￹呼￺よ￻ばれる。\nはばたくことで　￹巻￺ま￻き￹起￺お￻こした\n￹砂嵐￺すなあらし￻の　￹中￺なか￻に　￹隠￺かく￻れている。"
          violet: "￹羽音￺はおと￻は　まるで　￹歌声￺うたごえ￻。\n￹音￺おと￻に　￹魅￺み￻せられた￹者￺もの￻は　￹砂嵐￺すなあらし￻に\n￹巻￺ま￻き￹込￺こ￻まれ　フライゴンの　￹餌食￺えじき￻。"
        en:
          scarlet: "Known as the Desert Spirit, this Pokémon hides in\nthe sandstorms it causes by beating its wings."
          violet: "The sound of its wings flapping resembles\nsinging. Those entranced by this sound get lured\ninto a sandstorm and become Flygon’s prey."
        fr:
          scarlet: "On l’appelle « l’esprit du désert ».\nIl se dissimule dans des tempêtes de sable\nqu’il provoque en battant des ailes."
          violet: "Le battement de ses ailes ressemble à un chant.\nQuiconque l’entend est pris au piège dans une\ntempête de sable et lui sert de repas."
        it:
          scarlet: "Viene chiamato \"spirito del deserto\".\nSi nasconde nelle tempeste di sabbia che\ngenera battendo le ali."
          violet: "Le prede ammaliate dal suono delle sue ali,\nsimile a un canto, si ritrovano intrappolate\nin una tempesta di sabbia."
        de:
          scarlet: "Dieses auch als „Geist der Wüste“ bekannte\nPokémon versteckt sich in Sandstürmen, die es\ndurch das Schlagen seiner Flügel erzeugt."
          violet: "Mit den Flügeln erzeugt es Töne, die wie Gesang\nklingen. Wer so in seinen Bann gerät, wird von\neinem Sandsturm umgeben und zu seiner Beute."
        es:
          scarlet: "Se lo conoce como el Alma del Desierto.\nLevanta tormentas de arena al batir las alas\ny se oculta en su interior."
          violet: "Atrapa en tormentas de arena y convierte en sus\npresas a aquellos que quedan cautivados por el\nsonido del batir de sus alas, similar a un canto."
        ko:
          scarlet: "사막의 정령이라고 불린다.\n날개를 쳐서 일으킨\n모래바람 속에 숨어 있다."
          violet: "날개 치는 소리는 마치 노랫소리 같다.\n소리에 매혹된 자는 모래 폭풍에\n휩쓸려 플라이곤의 먹이가 된다."
        zh_simp:
          scarlet: "被称为沙漠精灵。\n隐藏在挥动翅膀掀起的沙暴中。"
          violet: "振翅声宛如歌声。若被声音\n夺走心神，便会被卷进沙暴，\n成为沙漠蜻蜓的食物。"
        zh_trad:
          scarlet: "被稱為沙漠精靈。\n會躲在拍動翅膀掀起的沙暴中。"
          violet: "振翅聲簡直有如歌聲。凡是\n被這聲音迷惑的，最終會被\n捲入沙暴成為沙漠蜻蜓的食物。"
