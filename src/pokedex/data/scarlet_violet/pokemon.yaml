      hidden_ability: rough_skin
      descriptions:
        jp_kana:
          scarlet: "￹穴倉￺あなぐら￻に　￹潜￺ひそ￻み　￹獲物￺えもの￻や　￹敵￺てき￻が\n￹横切￺よこぎ￻ると　￹飛￺と￻びだして　￹噛￺か￻みつく。\n￹勢￺いきお￻い￹余￺あま￻り　￹歯￺は￻が　￹欠￺か￻けることも。"
          violet: "￹地熱￺ちねつ￻で　￹温￺あたた￻められた　￹横穴￺よこあな￻で　￹暮￺く￻らす。\n￹敵￺てき￻が　￹近￺ちか￻づくと　￹穴￺あな￻を　￹飛￺と￻び￹出￺だ￻して\n￹大口￺おおぐち￻で　￹噛￺か￻みつく。"
        jp_kanji:
          scarlet: "￹穴倉￺あなぐら￻に　￹潜￺ひそ￻み　￹獲物￺えもの￻や　￹敵￺てき￻が\n￹横切￺よこぎ￻ると　￹飛￺と￻びだして　￹噛￺か￻みつく。\n￹勢￺いきお￻い￹余￺あま￻り　￹歯￺は￻が　￹欠￺か￻けることも。"
          violet: "￹地熱￺ちねつ￻で　￹温￺あたた￻められた　￹横穴￺よこあな￻で　￹暮￺く￻らす。\n￹敵￺てき￻が　￹近￺ちか￻づくと　￹穴￺あな￻を　￹飛￺と￻び￹出￺だ￻して\n￹大口￺おおぐち￻で　￹噛￺か￻みつく。"
        en:
          scarlet: "It skulks in caves, and when prey or an enemy\npasses by, it leaps out and chomps them.\nThe force of its attack sometimes chips its teeth."
          violet: "It nests in horizontal holes warmed by geothermal\nheat. Foes who get too close can expect to be\npounced on and bitten."
        fr:
          scarlet: "Il attend qu’une proie passe pour bondir hors\nde son trou et la croquer. Dans son élan, il se\ncasse parfois les dents."
          violet: "Il vit dans des cavités chauffées par géothermie,\ndont il bondit pour mordre tout intrus."
        it:
          scarlet: "Aspetta nemici e prede in agguato nella sua\ntana. Quando gli arrivano a tiro, li addenta con\ntale forza che a volte si spezza i denti."
          violet: "Vive in gallerie scaldate dal calore geotermico.\nSe sente un nemico arrivare, salta fuori e lo\naddenta."
        de:
          scarlet: "Es verbirgt sich in kleinen Höhlen, aus denen es\nherausspringt und vorbeilaufende Gegner oder\nBeute beißt. Manchmal bricht dabei ein Zahn ab."
          violet: "Dieses Pokémon lebt in Höhlen, die Erdwärme\nausgesetzt sind. Wenn Feinde sich nähern, springt\nes heraus und beißt mit seinem großen Maul zu."
        es:
          scarlet: "Permanece oculto en cuevas y, cuando pasa una\npresa, se abalanza sobre ella y la muerde con\ntanta fuerza que hasta se le rompen los dientes."
          violet: "Vive en agujeros en las cuevas, al amparo del\ncalor geotérmico. Si se acerca un enemigo, se\nabalanza sobre él y lo muerde con su gran boca."
        ko:
          scarlet: "구멍에 숨어서 먹이나 적이\n지나가면 뛰쳐나가 문다.\n기세가 대단해 이가 빠질 때도 있다."
          violet: "지열로 데워진 구멍에서 지낸다.\n적이 가까이 오면 구멍에서 뛰쳐나와\n커다란 입으로 물어 버린다."
        zh_simp:
          scarlet: "潜伏在地洞内，如果有猎物\n或敌人经过，就会扑出来咬住。\n有时会用力过猛牙齿豁掉。"
          violet: "生活在被地热加温的横洞里。\n如果有敌人靠近，\n就会从洞里扑出来，大口咬住。"
        zh_trad:
          scarlet: "潛伏在地洞內，如果有獵物\n或敵人經過，就會撲出來咬住。\n有時會用力過猛而咬壞牙齒。"
          violet: "生活在被地熱加溫的洞窟裡。\n如果有敵人靠近，\n就會從洞裡撲出來大口咬住。"
