          violet: "￹手足￺てあし￻に　￹炎￺ほのお￻を　まとった\n￹独特￺どくとく￻の　￹格闘技￺かくとうぎ￻を　￹使￺つか￻い\nどんな　￹相手￺あいて￻にも　￹立￺た￻ち￹向￺む￻かう。"
        jp_kanji:
          scarlet: "￹素早￺すばや￻さで　￹相手￺あいて￻を　￹翻弄￺ほんろう￻する。\n￹両手￺りょうて￻　￹両足￺りょうあし￻を　￹使￺つか￻った\n￹独特￺どくとく￻の　￹戦￺たたか￻い￹方￺かた￻を　する。"
          violet: "￹手足￺てあし￻に　￹炎￺ほのお￻を　まとった\n￹独特￺どくとく￻の　￹格闘技￺かくとうぎ￻を　￹使￺つか￻い\nどんな　￹相手￺あいて￻にも　￹立￺た￻ち￹向￺む￻かう。"
        en:
          scarlet: "This Pokémon confounds opponents with its\nspeed. It uses all its limbs to fight in its own\nunique style."
          violet: "It uses unique fighting moves with fire on its\nhands and feet. It will take on any opponent."
        fr:
          scarlet: "Il se joue de ses adversaires grâce à sa vitesse.\nSon style de combat spécial sollicite ses quatre\nmembres."
          violet: "Ses techniques de combat inventives, qui tirent\nparti de ses pieds et ses poings enflammés, lui\npermettent d’affronter n’importe quel adversaire."
        it:
          scarlet: "Confonde il nemico con la velocità. Ha uno stile\ndi lotta speciale, che prevede l’uso dei quattro\narti."
          violet: "Affronta qualsiasi avversario sferrando mosse\ndi lotta speciali con mani e piedi infuocati."
        de:
          scarlet: "Es hält den Gegner mit flinken Bewegungen zum\nNarren und wendet eine spezielle Kampfkunst an,\nbei der alle Gliedmaßen zum Einsatz kommen."
          violet: "Es nutzt einzigartige Kampftechniken, bei denen\nes seine Hände und Füße in Flammen hüllt, und\nstellt sich damit jedem Gegner."
        es:
          scarlet: "Desconcierta a sus rivales con su tremenda\nagilidad. Su característica forma de luchar utiliza\ntodos sus miembros."
          violet: "Utiliza unos movimientos de combate únicos\nen los que se envuelve las manos y los pies con\nllamas para enfrentarse a cualquier enemigo."
        ko:
          scarlet: "스피드로 상대를 농락한다.\n양팔 양다리를 활용한\n독특한 방식으로 싸운다."
          violet: "손발에 불꽃을 두르는\n독특한 격투 기술을 써서\n어떤 상대라도 맞서 싸운다."
        zh_simp:
          scarlet: "用速度玩弄对手。\n会使用手脚并用的独特战斗方式。"
          violet: "会使用手脚缠绕着\n火焰的独特格斗技，无论\n什么样的对手都会勇敢对抗。"
        zh_trad:
          scarlet: "用速度玩弄對手。\n會使用手腳並用的\n獨特戰鬥方式。"
          violet: "會使出手腳上纏繞著\n火焰的獨特格鬥技。\n面對任何對手都會勇於對抗。"
