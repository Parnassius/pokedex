      descriptions:
        jp_kana:
          scarlet: "￹毒￺どく￻ガスで　クラクラにした　￹相手￺あいて￻を\n￹妖艶￺ようえん￻な　￹身￺み￻のこなしで　￹誘惑￺ゆうわく￻し\n￹忠実￺ちゅうじつ￻な　しもべに　してしまう。"
          violet: "エンニュートの　￹群￺む￻れ￹同士￺どうし￻が\n￹鉢合￺はちあ￻わせると　フェロモンガスで\nオスを　￹奪￺うば￻い￹合￺あ￻う　￹争￺あらそ￻いになる。"
        jp_kanji:
          scarlet: "￹毒￺どく￻ガスで　クラクラにした　￹相手￺あいて￻を\n￹妖艶￺ようえん￻な　￹身￺み￻のこなしで　￹誘惑￺ゆうわく￻し\n￹忠実￺ちゅうじつ￻な　しもべに　してしまう。"
          violet: "エンニュートの　￹群￺む￻れ￹同士￺どうし￻が\n￹鉢合￺はちあ￻わせると　フェロモンガスで\nオスを　￹奪￺うば￻い￹合￺あ￻う　￹争￺あらそ￻いになる。"
        en:
          scarlet: "Salazzle makes its opponents light-headed with\npoisonous gas, then captivates them with alluring\nmovements to turn them into loyal servants."
          violet: "When two Salazzle meet, they will use their\npheromone gas to fight over the males in each\nother’s group."
        fr:
          scarlet: "Il étourdit ses adversaires avec son gaz toxique,\npuis il les asservit en exécutant une danse\nenvoûtante."
          violet: "Lorsque deux spécimens se rencontrent,\nils tentent de séduire les mâles du groupe\nopposé en utilisant leur gaz de phéromones."
        it:
          scarlet: "Trasforma gli avversari in seguaci stordendoli con\ndel gas tossico per poi sedurli con movenze\nammalianti."
          violet: "Quando due Salazzle si scontrano, si contendono\ni maschi dei rispettivi branchi usando del gas\ncarico di feromoni."
        de:
          scarlet: "Zuerst benebelt es Gegner mit Giftgas, um sie\ndanach mit fesselnden Körperbewegungen zu\nbetören und zu ergebenen Dienern zu machen."
          violet: "Wenn sich zwei Amfira begegnen, kämpfen sie\nmit Pheromongas um die Männchen in ihren\nGruppen."
        es:
          scarlet: "Convierte a sus rivales en devotos súbditos tras\nmarearlos con su gas venenoso y seducirlos con\nlos cautivadores movimientos de su cuerpo."
          violet: "Cuando dos Salazzle se encuentran, utilizarán\nsus gases con feromonas para disputarse a los\nmachos del séquito opuesto."
        ko:
          scarlet: "독가스에 어질어질해진 상대를\n요염한 몸놀림으로 유혹해서\n충실한 부하로 만들어 버린다."
          violet: "염뉴트 무리가 마주치게 되면\n페로몬 가스로 수컷을 쟁탈하는\n싸움이 일어난다."
        zh_simp:
          scarlet: "会以妖艳的身姿诱惑被它的\n毒瓦斯弄得头昏眼花的对手，\n使其成为自己忠实的仆人。"
          violet: "焰后蜥的群体之间一旦\n碰上彼此，就会利用\n费洛蒙气体来展开雄性争夺战。"
        zh_trad:
          scarlet: "會用妖豔的身姿誘惑被牠的\n毒瓦斯弄得頭昏眼花的對手，\n使其變成自己忠實的僕人。"
          violet: "焰后蜥的群體之間\n一旦碰上彼此，就會使用\n費洛蒙氣體展開雄性爭奪戰。"
