      types:
        - water
      egg_groups:
        - water_1
      abilities:
        - water_absorb
        - damp
      hidden_ability: swift_swim
      descriptions:
        jp_kana:
          scarlet: "２￹本￺ほん￻の　￹脚￺あし￻は　￹発達￺はったつ￻しており\n￹地上￺ちじょう￻で　￹暮￺く￻らせるのに　なぜか\n￹水中生活￺すいちゅうせいかつ￻が　￹好￺す￻き。"
          violet: "￹全身￺ぜんしん￻の　￹皮膚￺ひふ￻は　￹湿￺しめ￻っているが\nお￹腹￺なか￻の　￹渦巻￺うずま￻きの　￹部分￺ぶぶん￻の\n￹感触￺かんしょく￻は　すべすべとしている。"
        jp_kanji:
          scarlet: "２￹本￺ほん￻の　￹脚￺あし￻は　￹発達￺はったつ￻しており\n￹地上￺ちじょう￻で　￹暮￺く￻らせるのに　なぜか\n￹水中生活￺すいちゅうせいかつ￻が　￹好￺す￻き。"
          violet: "￹全身￺ぜんしん￻の　￹皮膚￺ひふ￻は　￹湿￺しめ￻っているが\nお￹腹￺なか￻の　￹渦巻￺うずま￻きの　￹部分￺ぶぶん￻の\n￹感触￺かんしょく￻は　すべすべとしている。"
        en:
          scarlet: "Its two legs are well developed. Even though it\ncan live on the ground, it prefers living in water."
          violet: "Its skin is moist all over its body. The skin on its\nbelly spiral also feels smooth."
        fr:
          scarlet: "Ses deux pattes très développées lui permettent\nde vivre sur la terre ferme, mais pour une raison\ninconnue, il préfère le milieu aquatique."
          violet: "Toute sa peau est moite. La partie\nde son ventre qui arbore une spirale\nest particulièrement lisse."
        it:
          scarlet: "I suoi arti inferiori ben sviluppati gli permettono\ndi vivere sulla terraferma, ma per qualche motivo\npreferisce stare nell’acqua."
          violet: "Ha la pelle umida su tutto il corpo.\nQuella in corrispondenza della spirale\nsulla pancia è liscia."
        de:
          scarlet: "Seine beiden Beine sind gewachsen, sodass es\nnun an Land leben kann, aber aus irgendeinem\nGrund bevorzugt es das Leben im Wasser."
          violet: "Die Haut seines gesamten Körpers ist\nfeucht. Auf der Bauchspirale fühlt sie sich\nzudem glatt und weich an."
        es:
          scarlet: "Aunque puede vivir en tierra firme gracias a que\nsus extremidades inferiores se han desarrollado,\npor algún motivo prefiere el medio acuático."
          violet: "Toda su piel está húmeda, pero la zona\ndel vientre, donde está la espiral, tiene\nun tacto especialmente suave."
        ko:
          scarlet: "두 다리가 발달하여\n지상에서 살 수 있는데도 어째서인지\n수중 생활을 좋아한다."
          violet: "전신의 피부는 젖어 있지만\n배의 소용돌이 부분의\n감촉은 미끈미끈하다."
        zh_simp:
          scarlet: "２条腿很发达，\n虽然可以在地上生活，\n但不知为何更喜欢生活在水里。"
          violet: "全身的皮肤都是湿的，\n但腹部旋涡的部分\n摸上去感觉很光滑。"
        zh_trad:
          scarlet: "２條腿很發達，\n雖然可以在陸地上生活，\n但不知為何更喜歡生活在水裡。"
          violet: "全身的皮膚都濕答答的，\n但肚子上的漩渦部分\n摸起來很光滑。"
