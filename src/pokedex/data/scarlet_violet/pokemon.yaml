          scarlet: "￹電気￺でんき￻のような　￹体￺からだ￻は　￹一部￺いちぶ￻の\n￹機械￺きかい￻に　￹入￺はい￻り￹込￺こ￻むことが　できる。\nそして　その￹体￺からだ￻で　いたずらする。"
          violet: "￹特殊￺とくしゅ￻な　モーターを　￹動￺うご￻かす\n￹動力源￺どうりょくげん￻として　￹長￺なが￻い　あいだ\n￹研究￺けんきゅう￻されていた　ポケモン。"
        jp_kanji:
          scarlet: "￹電気￺でんき￻のような　￹体￺からだ￻は　￹一部￺いちぶ￻の\n￹機械￺きかい￻に　￹入￺はい￻り￹込￺こ￻むことが　できる。\nそして　その￹体￺からだ￻で　いたずらする。"
          violet: "￹特殊￺とくしゅ￻な　モーターを　￹動￺うご￻かす\n￹動力源￺どうりょくげん￻として　￹長￺なが￻い　あいだ\n￹研究￺けんきゅう￻されていた　ポケモン。"
        en:
          scarlet: "Its electricity-like body can enter some kinds\nof machines and take control in order to make\nmischief."
          violet: "Research continues on this Pokémon, which\ncould be the power source of a unique motor."
        fr:
          scarlet: "Son corps semblable à de l’électricité lui permet\nde prendre le contrôle de certains appareils\nménagers pour jouer des tours aux autres."
          violet: "On étudie depuis longtemps sa capacité à servir\nde source d’énergie pour certains moteurs."
        it:
          scarlet: "Il suo corpo simile all’elettricità può introdursi\nin alcuni apparecchi, di cui prende il controllo\nper combinare guai."
          violet: "Questo Pokémon è stato a lungo oggetto\ndi studi per la sua capacità di alimentare\nmotori particolari."
        de:
          scarlet: "Sein Körper ähnelt Elektrizität und erlaubt es ihm,\nin einige Geräte einzudringen, um dann damit für\nChaos zu sorgen."
          violet: "Dieses Pokémon wurde lange Zeit erforscht,\num als Energiequelle für besondere Motoren\nzu dienen."
        es:
          scarlet: "Con su cuerpo eléctrico puede infiltrarse en\nalgunos aparatos para controlarlos y hacer\ntravesuras."
          violet: "Desde hace mucho tiempo se estudia como\nfuente de energía motriz para un motor especial."
        ko:
          scarlet: "전기 같은 몸은\n일부 기계에 들어갈 수 있다.\n그리고 그 몸으로 장난을 친다."
          violet: "특수한 모터를 움직이는\n동력원으로서 긴 시간 동안\n연구되었던 포켓몬이다."
        zh_simp:
          scarlet: "如同电一般的身体\n能够进入到一部分机器里，\n并将其作为躯体来恶作剧。"
          violet: "作为驱动特殊马达的\n动力能源而被长期\n研究的宝可梦。"
        zh_trad:
          scarlet: "如同電一般的身體\n能進到一部分的機器裡，\n並用其作為身體來惡作劇。"
          violet: "被當作驅動\n特殊馬達的動力源，\n而被長期研究的寶可夢。"
