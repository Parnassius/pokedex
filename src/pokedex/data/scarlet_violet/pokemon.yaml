          scarlet: "オゾン￹層￺そう￻で　￹生￺う￻まれる　ポケモン。\nコアを　￹包￺つつ￻みこむ　￹外￺そと￻の　￹殻￺から￻が\n￹重￺おも￻くなると　￹地上￺ちじょう￻に　￹落￺お￻ちる。"
          violet: "￹触￺さわ￻られたり　￹呼￺よ￻びかけられたりすると\nなにかしらの　￹反応￺はんのう￻を　みせるが\n￹意思￺いし￻によるものかは　わかっていない。"
        en:
          scarlet: "This Pokémon is born in the ozone layer. It falls\nto the ground once the outer shell enclosing its\ncore grows heavy."
          violet: "It will react when touched or called to, but it’s\nunknown whether such responses indicate\nconsciousness."
        fr:
          scarlet: "Ce Pokémon vient de la couche d’ozone.\nIl s’écrase parfois au sol, lorsque la carapace\nqui enveloppe son noyau devient trop lourde."
          violet: "Il semble réagir quand on le touche ou\nquand on lui adresse la parole, mais nul ne sait\ns’il s’agit d’une réponse consciente ou non."
        it:
          scarlet: "Nasce nello strato d’ozono. Quando il guscio\nesterno che avvolge il nucleo si appesantisce,\nprecipita a terra."
          violet: "Quando viene toccato o chiamato sembra\nreagire, ma non si sa se sia una risposta\nvolontaria."
        de:
          scarlet: "Es wird in der Ozonschicht geboren. Wenn die\näußere Schale, die seinen Kern umgibt, zu schwer\nwird, stürzt es zu Boden."
          violet: "Es scheint darauf zu reagieren, wenn es berührt\noder angesprochen wird, aber man weiß nicht,\nob es dies bewusst tut."
        es:
          scarlet: "Nacen en la capa de ozono. Si el caparazón\nque recubre su núcleo se vuelve demasiado\npesado, caen a la superficie de la tierra."
          violet: "Muestran un atisbo de reacción cuando alguien\nlos toca o les dirige la palabra, pero no se sabe\nsi se trata de una respuesta voluntaria."
        ko:
          scarlet: "오존층에서 태어나는 포켓몬.\n코어를 감싸고 있는 겉껍질이\n무거워지면 지상에 떨어진다."
          violet: "만지거나 부르면\n뭔가 반응을 보이기는 하나\n자신의 의사에 의한 것인지는 불분명하다."
        zh_simp:
          scarlet: "诞生于臭氧层的宝可梦。\n当包裹核心的外壳变重了，\n就会掉落到地面上。"
          violet: "摸它叫它，它都会作出些\n什么反应，但并不清楚这些\n反应是否出自它自身的意志。"
        zh_trad:
          scarlet: "誕生於臭氧層的寶可夢。\n包著核心的外殼變重後，\n就會掉落到地上。"
          violet: "不論是被觸摸或呼喚，\n牠都會有些某些反應，\n但不知道牠是否有意識。"
