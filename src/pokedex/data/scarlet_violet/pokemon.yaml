      descriptions:
        jp_kana:
          scarlet: "￹全身￺ぜんしん￻から　つねに　￹電気￺でんき￻が\n￹放￺はな￻たれているため　￹近￺ちか￻づくと\n￹髪￺かみ￻の￹毛￺け￻が　￹逆立￺さかだ￻ってしまう。"
          violet: "エレブーに　￹雷￺かみなり￻を　￹溜￺た￻めこませ\nいつでも　￹使￺つか￻えるようにする\n￹研究￺けんきゅう￻が　￹進￺すす￻められている。"
        jp_kanji:
          scarlet: "￹全身￺ぜんしん￻から　つねに　￹電気￺でんき￻が\n￹放￺はな￻たれているため　￹近￺ちか￻づくと\n￹髪￺かみ￻の￹毛￺け￻が　￹逆立￺さかだ￻ってしまう。"
          violet: "エレブーに　￹雷￺かみなり￻を　￹溜￺た￻めこませ\nいつでも　￹使￺つか￻えるようにする\n￹研究￺けんきゅう￻が　￹進￺すす￻められている。"
        en:
          scarlet: "Its body constantly discharges electricity.\nGetting close to it will make your hair stand\non end."
          violet: "Research is progressing on storing lightning in\nElectabuzz so this energy can be used at any\ntime."
        fr:
          scarlet: "Son corps libère constamment de l’électricité,\nsi bien que les personnes qui s’approchent de\nlui voient leurs cheveux se dresser sur leur tête."
          violet: "Des scientifiques étudient la possibilité de\nstocker l’énergie de la foudre dans des Élektek,\npour qu’elle soit disponible à tout moment."
        it:
          scarlet: "Il corpo scarica continuamente elettricità.\nA chi gli sta vicino si rizzano i capelli in testa."
          violet: "Si sta attualmente studiando la possibilità\ndi immagazzinare l’energia dei fulmini negli\nElectabuzz per poterla usare in seguito."
        de:
          scarlet: "Sein Körper entlädt sich ständig. Kommt\nman ihm zu nahe, stehen einem die Haare\nsenkrecht vom Kopf ab."
          violet: "Es wird danach geforscht, die Energie von\nBlitzen in Elektek zu speichern, um sie so\njederzeit verfügbar zu machen."
        es:
          scarlet: "Su cuerpo descarga electricidad\nconstantemente, por lo que eriza\nel cabello a cualquiera que se le acerque."
          violet: "La comunidad científica estudia la posibilidad\nde almacenar en los Electabuzz la energía\nde los rayos para su posterior utilización."
        ko:
          scarlet: "전신에 항상 전기가\n흐르고 있기 때문에 가까이 가면\n머리카락이 곤두서 버린다."
          violet: "에레브에게 번개를 비축시켜\n언제라도 쓸 수 있도록 하는\n연구가 진행되고 있다."
        zh_simp:
          scarlet: "全身总是在放电，\n因此接近它的话，\n头发就会竖起来。"
          violet: "人们正在研究如何把雷电\n储存到电击兽体内，\n以便随时使用。"
        zh_trad:
          scarlet: "身體隨時都在放電，\n所以只要靠近牠，\n頭髮就會倒豎起來。"
          violet: "人們正在研究如何把雷電\n儲存到電擊獸的體內，\n以便隨時使用。"
