      descriptions:
        jp_kana:
          scarlet: "エネルギーを　￹硬￺かた￻い　￹結晶￺けっしょう￻に\n￹変￺か￻える　￹能力￺のうりょく￻で　￹身￺み￻を　￹守￺まも￻る。\nテラスタルの　おおもとの　ポケモン。"
          violet: "￹古代￺こだい￻の　パルデアで　￹暮￺く￻らしていたが\n￹地殻変動￺ちかくへんどう￻に　￹巻￺ま￻きこまれてしまい\n￹絶滅￺ぜつめつ￻したと　￹考￺かんが￻えられていた。"
        jp_kanji:
          scarlet: "エネルギーを　￹硬￺かた￻い　￹結晶￺けっしょう￻に\n￹変￺か￻える　￹能力￺のうりょく￻で　￹身￺み￻を　￹守￺まも￻る。\nテラスタルの　おおもとの　ポケモン。"
          violet: "￹古代￺こだい￻の　パルデアで　￹暮￺く￻らしていたが\n￹地殻変動￺ちかくへんどう￻に　￹巻￺ま￻きこまれてしまい\n￹絶滅￺ぜつめつ￻したと　￹考￺かんが￻えられていた。"
        en:
          scarlet: "Terapagos protects itself using its power to\ntransform energy into hard crystals. This Pokémon\nis the source of the Terastal phenomenon."
          violet: "It’s thought that this Pokémon lived in ancient\nPaldea until it got caught in seismic shifts and\nwent extinct."
        fr:
          scarlet: "Il se protège en transformant de l’énergie\nen cristal solide. Ce Pokémon est à l’origine\ndu phénomène de Téracristallisation."
          violet: "Il vivait à Paldea en des temps reculés.\nOn le croyait disparu, emporté par\nun bouleversement tectonique."
        it:
          scarlet: "Sfrutta la sua capacità di trasformare l’energia\nin duri cristalli per proteggersi. Questo Pokémon\nè all’origine della teracristallizzazione."
          violet: "Si riteneva che questo Pokémon dell’antica\nPaldea fosse oramai estinto, vittima\ndei movimenti tettonici."
        de:
          scarlet: "Es schützt sich, indem es Energie in harten\nKristall umwandelt. Dieses Pokémon ist der\nUrsprung der Terakristallisierung."
          violet: "Es lebte im urzeitlichen Paldea, fiel jedoch den\ntektonischen Plattenbewegungen zum Opfer und\ngalt als ausgestorben."
        es:
          scarlet: "Se vale de su capacidad para transformar energía\nen duros cristales para protegerse. Este Pokémon\ndio origen a la teracristalización."
          violet: "Se creía que este Pokémon de la Paldea antigua\nse había extinguido, víctima de alteraciones en la\ncorteza terrestre debidas a la actividad tectónica."
        ko:
          scarlet: "에너지를 단단한 결정으로\n바꾸는 능력으로 몸을 지킨다.\n테라스탈의 근원이 되는 포켓몬이다."
          violet: "고대의 팔데아에 살았으나\n지각 변동에 휩쓸려서\n멸종된 것으로 여겨져 왔다."
        zh_simp:
          scarlet: "通过将能量变为\n坚硬的结晶来保护自身。\n堪称太晶之源的宝可梦。"
          violet: "人们以前一直认为\n它们曾生活在古代帕底亚，\n但因地壳变动影响而灭绝。"
        zh_trad:
          scarlet: "會用將能量變為堅硬\n結晶的能力來保護自己。\n是太晶之源的寶可夢。"
          violet: "人們認為牠曾經棲息在\n古代的帕底亞，但卻受到\n地殼變動的影響而滅絕了。"
