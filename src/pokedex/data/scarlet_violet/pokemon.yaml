        fr:
          scarlet: "Il aime s’adonner à des concours de force et\nil est capable d’arrêter un train lancé à pleine\nvitesse d’un simple coup du plat de la main."
          violet: "Il piétine violemment le sol pour concentrer\nson énergie. Il peut propulser un camion de dix\ntonnes dans les airs d’un coup du plat de la main."
        it:
          scarlet: "Adora le gare di forza. Sarebbe\ncapace di fermare un treno in\ncorsa con un colpo della mano."
          violet: "Pesta i piedi sul terreno per accumulare\nenergia. Con una sola manata può far prendere\nil volo a un camion pesante dieci tonnellate."
        de:
          scarlet: "Dieses Pokémon liebt ein ordentliches\nKräftemessen. Es ist stark genug, um mit der\nflachen Hand einen rasenden Zug aufzuhalten."
          violet: "Es stampft auf den Boden, um Kraft zu sammeln.\nMit einem Schlag seiner Handfläche kann es\neinen 10 t schweren LKW durch die Luft wirbeln."
        es:
          scarlet: "Le encanta medir sus fuerzas. Es tan\nfuerte que puede detener un tren en\nmarcha de un manotazo."
          violet: "Para aumentar su fuerza, da un pisotón\nen el suelo. Puede lanzar un camión de\ndiez toneladas por los aires de un manotazo."
        ko:
          scarlet: "힘겨루기를 매우 좋아한다.\n달리는 열차를 손바닥치기로\n멈추게 하는 파워를 가졌다."
          violet: "두 다리로 땅을 힘껏 밟아서\n파워를 모은다. 손바닥 치기 한 방으로\n10톤 트럭을 날려 버린다."
        zh_simp:
          scarlet: "喜欢和对手比试力气，\n它拥有的力量足以一掌\n挡下迎面驶来的列车。"
          violet: "会用双脚跺地积蓄力量。\n一巴掌就能打飞\n１０吨重的卡车。"
        zh_trad:
          scarlet: "最喜歡和對手比力氣。\n擁有的力量足以一掌擋下\n迎面馳來的列車。"
          violet: "會用雙腳跺地積蓄力量。\n一掌就能打飛\n１０噸重的卡車。"
