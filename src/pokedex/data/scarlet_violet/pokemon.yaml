      descriptions:
        jp_kana:
          scarlet: "￹主食￺しゅしょく￻は　￹甘￺あま￻い　りんご。\n￹甘￺あま￻い　￹蜜￺みつ￻に　￹誘￺さそ￻われ　￹寄￺よ￻ってくる\n￹小型￺こがた￻の　￹虫￺むし￻ポケモンも　￹食￺た￻べる。"
          violet: "￹背中￺せなか￻の　￹甘￺あま￻い￹蜜￺みつ￻を　￹舐￺な￻め￹取￺と￻りに\nやって￹来￺く￻る　グルトンに\nベトベトの　￹蜜￺みつ￻を　￹吐￺は￻きかけ　￹退￺しりぞ￻ける。"
        jp_kanji:
          scarlet: "￹主食￺しゅしょく￻は　￹甘￺あま￻い　りんご。\n￹甘￺あま￻い　￹蜜￺みつ￻に　￹誘￺さそ￻われ　￹寄￺よ￻ってくる\n￹小型￺こがた￻の　￹虫￺むし￻ポケモンも　￹食￺た￻べる。"
          violet: "￹背中￺せなか￻の　￹甘￺あま￻い￹蜜￺みつ￻を　￹舐￺な￻め￹取￺と￻りに\nやって￹来￺く￻る　グルトンに\nベトベトの　￹蜜￺みつ￻を　￹吐￺は￻きかけ　￹退￺しりぞ￻ける。"
        en:
          scarlet: "It feeds mainly on sweet apples. It will also eat\nsmall bug Pokémon that are attracted by its\nsweet nectar."
          violet: "When some Lechonk come along to lick the\nsweet nectar on Appletun’s back, Appletun will\nspew sticky nectar at them to drive them away."
        fr:
          scarlet: "Il se nourrit principalement de pommes sucrées,\nmais il peut aussi manger de petits Pokémon\nInsecte, attirés par son miel onctueux."
          violet: "Quand des Gourmelet viennent lécher le nectar\nsucré sur son dos, il les repousse en projetant\nsur eux une substance gluante."
        it:
          scarlet: "Si nutre principalmente di mele dolci, ma\nnon disdegna nemmeno i piccoli Pokémon\nColeottero attratti dal suo dolce sciroppo."
          violet: "Quando Lechonk si avvicina per leccare il dolce\nsciroppo che ha sulla schiena, Appletun lo\nallontana sputandogli addosso nettare vischioso."
        de:
          scarlet: "Es ernährt sich hauptsächlich von süßen Äpfeln,\nverspeist jedoch auch kleine Käfer-Pokémon,\ndie von seinem süßen Nektar angelockt werden."
          violet: "Nähern sich Ferkuli, um Schlapfel den süßen\nNektar vom Rücken zu schlecken, spuckt es\nklebrigen Nektar auf sie, um sie zu vertreiben."
        es:
          scarlet: "Se alimenta principalmente de manzanas dulces,\npero también de pequeños Pokémon de tipo\nBicho que se sienten atraídos por su dulce néctar."
          violet: "Escupen una sustancia pegajosa para ahuyentar\na los Lechonk que se acercan a lamerles el dulce\nnéctar de la espalda."
        ko:
          scarlet: "달콤한 사과가 주식이다.\n달콤한 꿀에 이끌려 찾아오는\n작은 벌레포켓몬을 먹을 때도 있다."
          violet: "등에 흐르는 달콤한 꿀을\n핥으러 다가오는 맛보돈에게\n끈끈한 꿀을 뱉어서 내쫓는다."
        zh_simp:
          scarlet: "主食是甜苹果。也会食用\n被它甜甜的蜜汁吸引\n而来的小型虫宝可梦。"
          violet: "当有爱吃豚来舔食\n自己背上的甜甜蜜时，\n会吐出黏糊糊的蜜汁来将其击退。"
        zh_trad:
          scarlet: "主食是甜蘋果。除此之外\n也會吃被牠甜甜的蜜汁\n吸引而來的小型蟲寶可夢。"
          violet: "當有愛吃豚跑來舔食\n自己背上的甜甜蜜時，\n會吐出黏糊糊的蜜來擊退。"
