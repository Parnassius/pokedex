        jp_kanji:
          scarlet: "￹空￺そら￻を　￹飛￺と￻ぶのは　まだまだ　￹下手￺へた￻。\n￹親￺おや￻の　スワンナの　￹踊￺おど￻りを　￹見￺み￻て\n￹翼￺つばさ￻の　￹動￺うご￻かし￹方￺かた￻を　￹学￺まな￻ぶ。"
          violet: "エサの　￹水苔￺みずごけ￻を　￹探￺さが￻し　￹池￺いけ￻の\n￹深￺ふか￻い￹場所￺ばしょ￻を　￹泳￺およ￻ぎまわりながら\n￹体￺からだ￻を　￹鍛￺きた￻えているのだ。"
        en:
          scarlet: "It’s not very good at flying yet. It watches the\ndances of its Swanna parents to learn how to\nmove its wings."
          violet: "It strengthens its body by diving into the depths\nof ponds, swimming around while looking for\nbog moss to eat."
        fr:
          scarlet: "Il ne sait pas encore très bien voler, alors\nil observe la danse de ses parents Lakmécygne\npour apprendre à battre des ailes correctement."
          violet: "Ce Pokémon muscle son corps en nageant\ndans les profondeurs des lacs. Il y recherche\ndes sphaignes pour se nourrir."
        it:
          scarlet: "Non è ancora bravo a volare. Osserva la danza\ndegli Swanna suoi genitori per imparare a\nmuovere le ali."
          violet: "Allena la muscolatura nuotando nelle profondità\ndegli specchi d’acqua in cerca di muschi\nacquatici con cui nutrirsi."
        de:
          scarlet: "Das Fliegen fällt diesem Pokémon noch schwer.\nUm die Flügelbewegungen zu üben, beobachtet\nes den Tanz von Swaroness, seinen Eltern."
          violet: "Auf der Suche nach Torfmoos, seiner Nahrung,\nschwimmt es tief unten in Teichen umher und\nstählt so seinen Körper."
        es:
          scarlet: "Aún no se le da muy bien volar. Observa con\natención la danza de sus progenitores Swanna\npara aprender a mover las alas."
          violet: "Fortalece su musculatura buceando por el lecho\nde los lagos en busca del musgo acuático del que\nse alimenta."
        ko:
          scarlet: "하늘을 나는 것은 아직 서툴다.\n부모 스완나의 춤을 보고\n날개를 움직이는 법을 터득한다."
          violet: "먹이인 이끼를 찾아\n연못의 깊은 곳을 헤엄치면서\n몸을 단련하고 있다."
        zh_simp:
          scarlet: "还不擅长飞行。\n会看着双亲舞天鹅跳舞\n来学习如何拍动翅膀。"
          violet: "为了寻找水苔来吃，\n会在池中水深的地方\n游来游去，顺便锻炼身体。"
        zh_trad:
          scarlet: "還不擅長在空中飛翔。\n會觀察親鳥舞天鵝的舞蹈\n來學習拍動翅膀的方式。"
          violet: "會在池塘水深的地方\n四處游動找水苔來吃，\n順便鍛鍊身體。"
