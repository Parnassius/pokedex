        en:
          scarlet: "Portions of its dorsal fin mutated, becoming the\nparts that glow brightly to lure prey."
          violet: "It blinds prey with an intense burst of light.\nWith the prey incapacitated, the Pokémon\nswallows it in a single gulp."
        fr:
          scarlet: "Les organes lumineux de ce Pokémon résultent\nde la mutation d’une partie de sa nageoire\ndorsale. Il s’en sert pour attirer ses proies."
          violet: "Il émet une lumière suffisamment intense\npour aveugler ses proies. Une fois celles-ci\nimmobilisées, il les avale tout rond."
        it:
          scarlet: "Parte della sua pinna dorsale è mutata\nnelle sfere luminose con cui attira le prede."
          violet: "Immobilizza la preda accecandola con\nun intenso lampo di luce per poi ingoiarla\nin un sol boccone."
        de:
          scarlet: "Die grell leuchtenden Fortsätze, mit denen\ndieses Pokémon Beute anlockt, haben sich\naus seiner Rückenflosse entwickelt."
          violet: "Es blendet seine Beute mit einem grellen\nLicht. Während diese sich nicht rühren kann,\nverschlingt es sie in einem Stück."
        es:
          scarlet: "Las esferas luminiscentes con las que atrae a\nsus presas son en realidad el resultado de la\nmutación parcial de su aleta dorsal."
          violet: "Emite una luz cegadora con la que deslumbra\na su presa y aprovecha que no puede moverse\npara engullirla de un bocado."
        ko:
          scarlet: "먹이를 유인하기 위해\n눈부시게 빛나는 부분은\n등지느러미의 일부가 변화한 것이다."
          violet: "눈부신 빛을 발산해 상대의 눈을\n멀게 만든 뒤, 움직이지 못하는\n동안에 통째로 삼켜 버린다."
        zh_simp:
          scarlet: "它身上为了吸引猎物\n而发出耀眼光芒的部分，\n是由背鳍的一部分变化而来的。"
          violet: "会放出刺眼的亮光眩晕对手，\n然后趁对手无法动弹时将其整个吞下。"
        zh_trad:
          scarlet: "為了引誘食物上門而\n發出耀眼亮光的部分，\n是由背鰭的一部分變化而成。"
          violet: "會放出刺眼的亮光\n讓對手看不見東西。\n然後趁對手無法動彈時一口吞下。"
