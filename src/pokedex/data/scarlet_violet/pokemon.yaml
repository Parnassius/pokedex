          scarlet: "オレンジ￹色￺いろ￻の　￹花々￺はなばな￻が　まるで\n￹砲台￺ほうだい￻のように　￹強力￺きょうりょく￻な\nビームを　￹撃￺う￻ち￹出￺だ￻し　￹攻撃￺こうげき￻する。"
          violet: "￹昔￺むかし￻の　￹城主￺じょうしゅ￻たちは　お￹城￺しろ￻の\n￹見事￺みごと￻な　￹庭園￺ていえん￻を　￹維持￺いじ￻するために\nフラージェスを　￹大事￺だいじ￻に　￹育￺そだ￻てた。"
        en:
          scarlet: "Its orange flowers fire off powerful beams,\nattacking as if they were a battery of artillery."
          violet: "In times long past, castle governors would\nlovingly raise Florges to care for their castles’\nexquisite gardens."
        fr:
          scarlet: "Ses fleurs orange attaquent ses adversaires\nen émettant de puissants rayons, comme\ndes canons."
          violet: "Autrefois, les propriétaires des châteaux élevaient\ndes Florges avec soin afin qu’ils s’occupent de\nleurs magnifiques jardins."
        it:
          scarlet: "I suoi fiori arancioni attaccano sparando potenti\nraggi proprio come una batteria di cannoni."
          violet: "Anticamente, i padroni dei castelli allevavano\ncon amore i Florges perché si prendessero cura\ndei loro meravigliosi giardini."
        de:
          scarlet: "Es greift an, indem es seine orangen Blumen wie\nGeschütze einsetzt und damit mächtige Strahlen\nabfeuert."
          violet: "Die Schlossherren vergangener Zeiten zogen\nFlorges mit Liebe auf, damit diese die prächtigen\nGärten ihrer Anwesen instand hielten."
        es:
          scarlet: "Las flores naranjas emiten poderosos rayos\ncontra sus enemigos como si se tratasen de\nuna batería de artillería."
          violet: "Antiguamente, los señores de los castillos criaban\nFlorges con mucho mimo para que mantuviesen\nsus exuberantes jardines."
        ko:
          scarlet: "오렌지색 꽃들을 통해\n포대처럼 강력한 빔을\n발사하여 공격한다."
          violet: "옛날 성주들은\n성의 화려한 정원을 유지하기 위해\n플라제스를 소중히 키웠다."
        zh_simp:
          scarlet: "橙花会如同炮台般\n发射威力强大的\n光束来展开攻击。"
          violet: "过去的城主们为了\n维护城堡庭院的美观，\n会精心培育花洁夫人。"
        zh_trad:
          scarlet: "橙花會如砲台般\n放射出威力強大的\n光束來攻擊對手。"
          violet: "古時候的城主們會為了\n要維持城裡庭園的美觀，\n而精心培育花潔夫人。"
