      descriptions:
        jp_kana:
          scarlet: "￹目￺め￻の　￹特殊￺とくしゅ￻な　レンズを￹使￺つか￻って\n￹相手￺あいて￻の　￹体温￺たいおん￻などを　￹感知￺かんち￻して\n￹急所￺きゅうしょ￻を　￹見抜￺みぬ￻き　￹攻撃￺こうげき￻する。"
          violet: "￹紳士的￺しんしてき￻な　￹振￺ふ￻る￹舞￺ま￻いを　みせるが\n￹根￺ね￻っこは　￹怠￺なま￻け￹者￺もの￻のまま　なので\nトレーナーが　￹見￺み￻ていないと　さぼる。"
        jp_kanji:
          scarlet: "￹目￺め￻の　￹特殊￺とくしゅ￻な　レンズを￹使￺つか￻って\n￹相手￺あいて￻の　￹体温￺たいおん￻などを　￹感知￺かんち￻して\n￹急所￺きゅうしょ￻を　￹見抜￺みぬ￻き　￹攻撃￺こうげき￻する。"
          violet: "￹紳士的￺しんしてき￻な　￹振￺ふ￻る￹舞￺ま￻いを　みせるが\n￹根￺ね￻っこは　￹怠￺なま￻け￹者￺もの￻のまま　なので\nトレーナーが　￹見￺み￻ていないと　さぼる。"
        en:
          scarlet: "It uses special lenses in its eyes to sense things\nabout its opponents—like their body heat—then\nattacks once it identifies a weak spot."
          violet: "It may present itself as being well-mannered,\nbut deep down, it still has a lazy side. It will\nslack off when its Trainer isn’t looking."
        fr:
          scarlet: "Ses lentilles spéciales lui permettent de détecter\nla chaleur. Il repère ainsi les points faibles\nde ses adversaires et les attaque."
          violet: "Il agit de manière distinguée, mais c’est en réalité\nun partenaire toujours aussi paresseux qui flâne\ndès qu’on a le dos tourné."
        it:
          scarlet: "Attacca l’avversario dopo averne individuato il\npunto debole grazie alle speciali lenti sugli occhi,\nche captano dati come la temperatura corporea."
          violet: "Sfoggia modi signorili, ma in realtà è un pigrone\nche approfitta di ogni distrazione di chi lo allena\nper battere la fiacca."
        de:
          scarlet: "Dank spezieller Linsen in den Augen erfasst es\nFaktoren wie die Körpertemperatur von Gegnern,\nerkennt so deren Schwachpunkte und greift an."
          violet: "Es präsentiert sich gern gesittet, aber im Herzen\nist und bleibt es ein Faulpelz. Lässt sein Trainer\nes aus den Augen, gönnt es sich eine Auszeit."
        es:
          scarlet: "Gracias a las lentes especiales de sus ojos, es\ncapaz de percibir la temperatura corporal del\nadversario y así atacar sus puntos débiles."
          violet: "Muestra un comportamiento educado, pero\nen el fondo sigue siendo perezoso. En cuanto\nsu Entrenador se gira, se pone a holgazanear."
        ko:
          scarlet: "눈의 특수한 렌즈로\n상대의 체온 등을 감지하고\n급소를 찾아내서 공격한다."
          violet: "신사적인 태도를 보이지만\n근본은 여전히 게으르기 때문에\n트레이너가 보지 않을 때는 농땡이를 피운다."
        zh_simp:
          scarlet: "能用眼睛的特殊晶状体\n感知对手的体温等信息，\n并在看穿其要害后进行攻击。"
          violet: "虽然表现得很有绅士风度，\n但它的本性仍然很懒惰，\n没有训练家盯着就会偷懒。"
        zh_trad:
          scarlet: "會用眼睛的特殊晶狀體\n感知對手的體溫等情報，\n並在看穿要害後進行攻擊。"
          violet: "雖然表現得很有紳士風度，\n但生性懶惰的部分依舊沒變，\n因此在訓練家沒看著牠時就會偷懶。"
