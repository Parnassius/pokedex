      hidden_ability: swarm
      descriptions:
        jp_kana:
          scarlet: "￹電気￺でんき￻を　￹帯￺お￻びた　￹糸￺いと￻で　￹罠￺わな￻を\n￹仕掛￺しか￻ける。　￹感電￺かんでん￻して　￹動￺うご￻けない\n￹獲物￺えもの￻を　ゆっくりと　いただくのだ。"
          violet: "￹敵￺てき￻に　￹襲￺おそ￻われると　￹電気￺でんき￻を　￹帯￺お￻びた\n￹糸￺いと￻を　たくさん　￹吐￺は￻き￹出￺だ￻して\n￹電気￺でんき￻の　バリアを　￹作￺つく￻る。"
        jp_kanji:
          scarlet: "￹電気￺でんき￻を　￹帯￺お￻びた　￹糸￺いと￻で　￹罠￺わな￻を\n￹仕掛￺しか￻ける。　￹感電￺かんでん￻して　￹動￺うご￻けない\n￹獲物￺えもの￻を　ゆっくりと　いただくのだ。"
          violet: "￹敵￺てき￻に　￹襲￺おそ￻われると　￹電気￺でんき￻を　￹帯￺お￻びた\n￹糸￺いと￻を　たくさん　￹吐￺は￻き￹出￺だ￻して\n￹電気￺でんき￻の　バリアを　￹作￺つく￻る。"
        en:
          scarlet: "They employ an electrically charged web\nto trap their prey. While it is immobilized\nby shock, they leisurely consume it."
          violet: "When attacked, they create an electric\nbarrier by spitting out many electrically\ncharged threads."
        fr:
          scarlet: "Ce Pokémon tend des pièges avec ses fils\nélectriques. Il déguste tranquillement ses\nproies une fois qu’elles sont électrocutées."
          violet: "Quand on l’attaque, il projette\nune multitude de fils électrifiés\npour créer une barrière électrique."
        it:
          scarlet: "Tende trappole con fili elettrificati. Consuma\npoi con comodo le prede immobilizzate\ndalla scarica elettrica."
          violet: "Quando viene attaccato, espelle una rete\ndi fili elettrificati per formare una barriera\nelettrica."
        de:
          scarlet: "Es legt Fallen aus elektrisch geladenen\nFäden und labt sich dann gemächlich an\nder durch Stromschläge gelähmten Beute."
          violet: "Wird es angegriffen, spuckt es mit vielen\nelektrisch geladenen Fäden um sich und\nbaut sich eine Elektrobarriere."
        es:
          scarlet: "Pone trampas con hilos electrificados. De\neste modo, electrocuta a sus presas y las\ninmoviliza para poder devorarlas lentamente."
          violet: "Cuando un enemigo lo ataca, expulsa\npor la boca hilos electrificados para\ncrear una barrera eléctrica."
        ko:
          scarlet: "전기를 띤 실로 함정을 설치한다.\n감전돼서 움직이지 못하는\n먹이를 천천히 먹어 치운다."
          violet: "상대에게 공격당하면\n전기를 띤 실을 무수히 뿜어내서\n전기 배리어를 만든다."
        zh_simp:
          scarlet: "会用带电的丝设下陷阱。\n会慢慢地享用触电后\n无法动弹的猎物。"
          violet: "被敌人袭击的话，\n会吐出大量带电的丝，\n制作成电的屏障。"
        zh_trad:
          scarlet: "用帶電的絲設下陷阱。\n會慢慢享用觸電後\n無法動彈的獵物。"
          violet: "遇到敵人襲擊時，\n會吐出許多帶電的絲，\n做出電的屏障。"
