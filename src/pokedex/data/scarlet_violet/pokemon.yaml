      descriptions:
        jp_kana:
          scarlet: "￹小型￺こがた￻の　ドラゴンポケモン。\nヘイラッシャの　￹口￺くち￻の￹中￺なか￻に　￹棲￺す￻み\n￹外敵￺がいてき￻から　￹身￺み￻を　￹守￺まも￻っている。"
          violet: "￹非常￺ひじょう￻に　￹悪賢￺わるがしこ￻い　ポケモン。\n￹弱￺よわ￻ったふりで　￹獲物￺えもの￻を　おびき￹寄￺よ￻せ\n￹仲間￺なかま￻の　ポケモンに　￹襲￺おそ￻わせる。"
        jp_kanji:
          scarlet: "￹小型￺こがた￻の　ドラゴンポケモン。\nヘイラッシャの　￹口￺くち￻の￹中￺なか￻に　￹棲￺す￻み\n￹外敵￺がいてき￻から　￹身￺み￻を　￹守￺まも￻っている。"
          violet: "￹非常￺ひじょう￻に　￹悪賢￺わるがしこ￻い　ポケモン。\n￹弱￺よわ￻ったふりで　￹獲物￺えもの￻を　おびき￹寄￺よ￻せ\n￹仲間￺なかま￻の　ポケモンに　￹襲￺おそ￻わせる。"
        en:
          scarlet: "This is a small dragon Pokémon. It lives inside the\nmouth of Dondozo to protect itself from enemies\non the outside."
          violet: "Tatsugiri is an extremely cunning Pokémon.\nIt feigns weakness to lure in prey, then orders\nits partner to attack."
        fr:
          scarlet: "Ce petit Pokémon Dragon vit dans la gueule\nd’Oyacata, à l’abri de ses adversaires."
          violet: "Très rusé, il fait mine d’être vulnérable et attire\nainsi des proies qui se font ensuite attaquer\npar son redoutable partenaire."
        it:
          scarlet: "Un Pokémon di tipo Drago di piccole dimensioni.\nVive all’interno della bocca di Dondozo,\nprotetto dagli attacchi dei nemici."
          violet: "È un Pokémon estremamente astuto. Attira\nla preda fingendosi stremato, lasciando che\nsia il suo alleato ad attaccarla."
        de:
          scarlet: "Dieses kleine Drachen-Pokémon lebt im Maul\nvon Heerashai, wodurch es vor Feinden\ngeschützt ist."
          violet: "Dieses äußerst gerissene Pokémon gibt vor,\ngeschwächt zu sein, um so Beute anzulocken,\ndie sein Partner daraufhin angreift."
        es:
          scarlet: "Pokémon dragón de pequeño tamaño. Vive en\nla boca de un Dondozo para protegerse de los\nataques de los depredadores."
          violet: "Es un Pokémon de gran astucia. Atrae a sus\npresas fingiendo estar débil para otorgarle\na su compañero la oportunidad de atacar."
        ko:
          scarlet: "작은 몸집의 드래곤포켓몬.\n어써러셔의 입안에 살며\n외부의 적으로부터 몸을 지킨다."
          violet: "매우 교활한 포켓몬이다.\n약해진 척하며 먹잇감을 유인하고는\n동료 포켓몬이 공격하게 한다."
        zh_simp:
          scarlet: "小型的龙宝可梦。\n会住在吃吼霸嘴里，\n保护自己免于外敌袭击。"
          violet: "非常狡猾奸诈的宝可梦。\n会假装虚弱来吸引猎物接近，\n接着让自己同伙的宝可梦发动攻击。"
        zh_trad:
          scarlet: "小型的龍寶可夢。\n會住在吃吼霸嘴裡，\n保護自己免於外敵襲擊。"
          violet: "極為奸詐狡猾的寶可夢。\n會假裝虛弱來吸引獵物接近，\n接著讓同夥的寶可夢發動攻擊。"
