      descriptions:
        jp_kana:
          scarlet: "￹胸￺むね￻の￹奥￺おく￻で　￹燃￺も￻えさかる　￹炎￺ほのお￻が\nあごから　￹勢￺いきお￻いよく　￹噴￺ふ￻き￹出￺だ￻して\n￹炎￺ほのお￻の￹髭￺ひげ￻に　なっているのだ。"
          violet: "ピンチになるほど　￹楽￺たの￻しくなるらしく\n￹首￺くび￻まわりの　￹炎￺ほのお￻は　￹燃￺も￻え￹盛￺さか￻り\nパワーと　スピードが　アップする。"
        jp_kanji:
          scarlet: "￹胸￺むね￻の￹奥￺おく￻で　￹燃￺も￻えさかる　￹炎￺ほのお￻が\nあごから　￹勢￺いきお￻いよく　￹噴￺ふ￻き￹出￺だ￻して\n￹炎￺ほのお￻の￹髭￺ひげ￻に　なっているのだ。"
          violet: "ピンチになるほど　￹楽￺たの￻しくなるらしく\n￹首￺くび￻まわりの　￹炎￺ほのお￻は　￹燃￺も￻え￹盛￺さか￻り\nパワーと　スピードが　アップする。"
        en:
          scarlet: "The flames blazing deep inside Emboar’s\nchest erupt vigorously from its chin, forming\na beard of fire."
          violet: "The direr the situation, the more it seems to\nenjoy itself. The flames around its neck intensify,\ntoo, increasing Emboar’s power and speed."
        fr:
          scarlet: "La flamme ardente qui brûle dans sa\npoitrine jaillit avec intensité de son menton\net forme une « barbe » de feu autour de son cou."
          violet: "Les situations critiques semblent l’amuser :\nles flammes de son cou deviennent plus intenses,\net sa puissance et sa vitesse augmentent."
        it:
          scarlet: "Il fuoco che brucia nel profondo del suo\npetto erutta con forza dalla mascella, creando\ncosì una barba fiammeggiante."
          violet: "Peggiore è la situazione in cui si trova, più pare\ndivertirsi: le fiamme intorno al collo divampano e\nla sua potenza e la sua velocità aumentano."
        de:
          scarlet: "Die Flammen, die tief in seiner Brust\nlodern, strömen kraftvoll aus seinem Kinn\nund bilden einen Bart aus Feuer."
          violet: "Je größer die Gefahr, desto mehr Spaß scheint es\nzu haben. Die Flammen an seinem Hals lodern\ndann auf und es wird stärker sowie schneller."
        es:
          scarlet: "Las llamas que le arden en el interior del pecho\nemanan con ímpetu hacia el exterior a través de\nla barbilla y le confieren una barba flamígera."
          violet: "Parece divertirse más cuanto más acorralado\nse halla. En esa situación, las llamas del cuello\nse avivan y se vuelve más rápido y poderoso."
        ko:
          scarlet: "가슴 속에서 활활 타오르는 불꽃이\n턱을 통해 기세 좋게 뿜어져 나와\n마치 불꽃의 턱수염처럼 되었다."
          violet: "위기에 처할수록 즐거운지\n목 주변의 불꽃이 활활 타오르고\n파워와 스피드가 상승한다."
        zh_simp:
          scarlet: "在胸内熊熊燃烧的火焰\n从颚部猛烈地喷出，\n形成了火焰的胡须。"
          violet: "据说越是陷入危机就越高兴，\n而且脖子上的火会烧得很旺，\n力量和速度都会得到提升。"
        zh_trad:
          scarlet: "在胸內熊熊燃燒的火焰\n從顎部猛烈噴出，\n形成了火焰鬍鬚。"
          violet: "越是身陷危機似乎就會越高興，\n使牠頸部周圍的火焰猛烈燃燒，\n力量和速度也隨之提升。"
