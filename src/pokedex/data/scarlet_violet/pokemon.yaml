          scarlet: "￹口￺くち￻から　￹吹￺ふ￻き￹出￺だ￻す　￹炎￺ほのお￻で\n￹火傷￺やけど￻すると　いつまでたっても\n￹傷口￺きずぐち￻が　うずいてしまう。"
          violet: "￹不気味￺ぶきみ￻な　￹遠吠￺とおぼ￻えを　￹聞￺き￻いた\nポケモンは　￹震￺ふる￻え　￹一目散￺いちもくさん￻に\n￹自分￺じぶん￻の　￹巣￺す￻に　￹戻￺もど￻る。"
        jp_kanji:
          scarlet: "￹口￺くち￻から　￹吹￺ふ￻き￹出￺だ￻す　￹炎￺ほのお￻で\n￹火傷￺やけど￻すると　いつまでたっても\n￹傷口￺きずぐち￻が　うずいてしまう。"
          violet: "￹不気味￺ぶきみ￻な　￹遠吠￺とおぼ￻えを　￹聞￺き￻いた\nポケモンは　￹震￺ふる￻え　￹一目散￺いちもくさん￻に\n￹自分￺じぶん￻の　￹巣￺す￻に　￹戻￺もど￻る。"
        en:
          scarlet: "If you are burned by the flames it shoots from its\nmouth, the pain will never go away."
          violet: "Upon hearing its eerie howls, other Pokémon get\nthe shivers and head straight back to their nests."
        fr:
          scarlet: "Les blessures provoquées par son souffle\nenflammé sont permanentes, et la douleur\nne disparaît jamais."
          violet: "Lorsqu’ils entendent ses hurlements sinistres,\nles autres Pokémon prennent peur et fuient\nvers leur nid."
        it:
          scarlet: "Se si viene ustionati dalle fiamme che sputa dalla\nbocca, il dolore rimarrà per sempre."
          violet: "I suoi terrificanti latrati fanno tremare gli altri\nPokémon, che si precipitano così nelle proprie\ntane."
        de:
          scarlet: "Wird man von den Flammen getroffen, die es\naus seinem Maul schießt, so erleidet man eine\nBrandwunde, deren Schmerz nie nachlässt."
          violet: "Wenn andere Pokémon sein gruseliges Geheul\nhören, erschaudern sie und eilen Hals über Kopf\nzurück in ihren Unterschlupf."
        es:
          scarlet: "Si alguien se quema con las llamas que lanza por\nla boca, el dolor no desaparecerá nunca."
          violet: "Al oír sus siniestros aullidos, los otros Pokémon\nse estremecen y huyen a sus nidos."
        ko:
          scarlet: "입에서 뿜어내는 불꽃에 의해\n화상을 입으면 시간이 아무리 지나도\n상처 난 자리가 욱신거린다."
          violet: "기분 나쁜 울음소리를 들은 포켓몬은\n겁이 나서 그대로 곧장\n자신의 둥지로 돌아간다."
        zh_simp:
          scarlet: "如果被它口中喷出的\n火焰所灼伤，那伤口\n无论过多久都会疼痛。"
          violet: "听到它恐怖的长嚎后，\n宝可梦会浑身发抖，\n一溜烟地回到自己的巢里。"
        zh_trad:
          scarlet: "要是被牠口中噴出的火焰灼傷，\n傷口的部分不管過了多久\n都依舊會感到疼痛。"
          violet: "聽見牠恐怖長嚎的\n寶可夢會渾身發抖，\n一溜煙地回到自己的巢裡。"
