        jp_kana:
          scarlet: "￹甲羅￺こうら￻の　￹内側￺うちがわ￻で　￹石炭￺せきたん￻を\n￹燃￺も￻やし　￹敵￺てき￻に　￹襲￺おそ￻われると\n￹黒￺くろ￻い￹煙￺けむり￻を　まき￹散￺ち￻らして　￹逃￺に￻げる。"
          violet: "￹石炭￺せきたん￻が　エネルギーの　￹源￺みなもと￻。\nコータスの　￹棲￺す￻んでいる　￹山￺やま￻には\n￹多￺おお￻くの　￹石炭￺せきたん￻が　￹眠￺ねむ￻っている。"
        jp_kanji:
          scarlet: "￹甲羅￺こうら￻の　￹内側￺うちがわ￻で　￹石炭￺せきたん￻を\n￹燃￺も￻やし　￹敵￺てき￻に　￹襲￺おそ￻われると\n￹黒￺くろ￻い￹煙￺けむり￻を　まき￹散￺ち￻らして　￹逃￺に￻げる。"
          violet: "￹石炭￺せきたん￻が　エネルギーの　￹源￺みなもと￻。\nコータスの　￹棲￺す￻んでいる　￹山￺やま￻には\n￹多￺おお￻くの　￹石炭￺せきたん￻が　￹眠￺ねむ￻っている。"
        en:
          scarlet: "It burns coal inside its shell for energy. It blows\nout black soot if it is endangered."
          violet: "Coal is the source of Torkoal’s energy. Large\namounts of coal can be found in the mountains\nwhere they live."
        fr:
          scarlet: "Ce Pokémon brûle du charbon dans sa carapace.\nQuand on l’attaque, il crache de la fumée noire\npour pouvoir s’enfuir."
          violet: "Les Chartor peuplent les montagnes qui abritent\nde grands gisements de charbon, qu’ils utilisent\ncomme source d’énergie."
        it:
          scarlet: "Brucia carbone all’interno della corazza.\nQuando è in pericolo, emette del fumo nero\nper poi battere in ritirata."
          violet: "Vive in montagne ricche di carbone, materiale\nda cui ricava tutta l’energia di cui ha bisogno."
        de:
          scarlet: "Im Inneren seines Panzers verbrennt es Kohle.\nWenn es angegriffen wird, stößt es dicken,\nschwarzen Rauch aus und flieht."
          violet: "Kohle ist die Quelle seiner Energie. Es lebt\ndaher meist in Bergen, die ein großes\nKohlevorkommen aufweisen."
        es:
          scarlet: "Quema carbón en su caparazón para obtener\nenergía. Si se ve amenazado, despide un hollín\nnegro que lo ayuda a huir."
          violet: "La fuente de su energía es el carbón. Torkoal\nsuele vivir en montañas donde yacen grandes\ncantidades de esta roca mineral."
        ko:
          scarlet: "등껍질 안에서 석탄을 태운다.\n적에게 공격받으면 검은 연기를\n흩뿌리고 도망친다."
          violet: "석탄이 에너지의 근원이다.\n코터스가 사는 산에는\n많은 석탄이 잠들어 있다."
        zh_simp:
          scarlet: "在甲壳内侧燃烧煤炭。\n遭到敌方攻击时\n会喷出黑烟然后逃走。"
          violet: "煤炭是其能量的来源。\n在煤炭龟栖息着的山里，\n沉睡着大量的煤炭。"
        zh_trad:
          scarlet: "會在甲殼的內側燃燒煤炭。\n遭受到敵人攻擊時，\n會噴灑黑煙然後逃走。"
          violet: "煤炭是牠的能量來源。\n在煤炭龜棲息著的山裡，\n沉睡著大量的煤炭。"
