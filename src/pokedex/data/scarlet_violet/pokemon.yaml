        jp_kana:
          scarlet: "１２００￹度￺ど￻の　マグマが　￹体内￺たいない￻で\n￹燃￺も￻えている。　￹寒￺さむ￻くなると　マグマが\n￹固￺かた￻まるので　￹動￺うご￻きが　￹鈍￺にぶ￻くなる。"
          violet: "￹背中￺せなか￻の　コブの　￹中￺なか￻で　￹燃￺も￻える\nマグマが　エネルギーとなって\nすごい　￹力￺ちから￻を　￹発揮￺はっき￻するのだ。"
        jp_kanji:
          scarlet: "１２００￹度￺ど￻の　マグマが　￹体内￺たいない￻で\n￹燃￺も￻えている。　￹寒￺さむ￻くなると　マグマが\n￹固￺かた￻まるので　￹動￺うご￻きが　￹鈍￺にぶ￻くなる。"
          violet: "￹背中￺せなか￻の　コブの　￹中￺なか￻で　￹燃￺も￻える\nマグマが　エネルギーとなって\nすごい　￹力￺ちから￻を　￹発揮￺はっき￻するのだ。"
        en:
          scarlet: "Magma of almost 2,200 degrees Fahrenheit\ncourses through its body. When it grows cold,\nthe magma hardens and slows it."
          violet: "The flaming magma it stores in the hump on its\nback is the source of its tremendous power."
        fr:
          scarlet: "Lorsque le magma à 1 200 °C qui circule\ndans tout le corps de Chamallot se refroidit,\nil se durcit et le ralentit dans ses déplacements."
          violet: "Il tire son incroyable puissance du magma\nen fusion emmagasiné dans sa bosse."
        it:
          scarlet: "All’interno del suo corpo scorre del magma che\nraggiunge i 1.200 ºC. Con il freddo questo\nmagma si indurisce, rallentandone i movimenti."
          violet: "Il magma che ribolle dentro la sua gobba\nsi trasforma in energia, donandogli\nuna forza straordinaria."
        de:
          scarlet: "Durch seinen Körper fließt bis zu 1200 ℃ heißes\nMagma. Wird es kalt, verfestigt sich das Magma\nund macht das Pokémon träge."
          violet: "Das heiße Magma in seinem Höcker dient ihm\nals Energiereserve und verleiht ihm enorme\nStärke."
        es:
          scarlet: "Magma a 1200 ºC le recorre el cuerpo. Cuando\nse enfría, el magma se solidifica y lo vuelve lento."
          violet: "Acumula magma en ebullición en la joroba\nde su lomo que transforma en una energía\nextraordinaria."
        ko:
          scarlet: "1200도의 마그마가 체내에서 끓고 있다.\n추워지면 마그마가 굳어서\n움직임이 둔해진다."
          violet: "등의 혹 안에서 끓고 있는\n마그마를 에너지로 만들어\n굉장한 힘을 발휘한다."
        zh_simp:
          scarlet: "体内燃烧着１２００度的熔岩。\n一旦气温变低，熔岩就会凝固。\n动作也会因此变得迟缓。"
          violet: "背上的驼峰里燃烧的\n熔岩会转换成能量，\n发挥出惊人的力量。"
        zh_trad:
          scarlet: "體內燃燒著１２００度的熔岩。\n一旦氣溫變低，熔岩就會凝固，\n動作也會因此變得遲緩。"
          violet: "背上的駝峰裡燃燒的\n熔岩會轉變成能量，\n發揮出驚人的力量。"
