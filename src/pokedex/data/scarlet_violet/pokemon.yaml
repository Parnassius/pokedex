        jp_kana:
          scarlet: "￹潮￺しお￻が　￹引￺ひ￻くと　￹砂浜￺すなはま￻に\n￹残￺のこ￻されて　￹干￺ひ￻からびた\nメノクラゲを　￹見￺み￻ることが　できる。"
          violet: "￹水晶￺すいしょう￻のように　￹透￺す￻き￹通￺とお￻った\n￹目玉￺めだま￻から　￹不思議￺ふしぎ￻な　￹光￺ひかり￻の\nビームを　￹発射￺はっしゃ￻する。"
        jp_kanji:
          scarlet: "￹潮￺しお￻が　￹引￺ひ￻くと　￹砂浜￺すなはま￻に\n￹残￺のこ￻されて　￹干￺ひ￻からびた\nメノクラゲを　￹見￺み￻ることが　できる。"
          violet: "￹水晶￺すいしょう￻のように　￹透￺す￻き￹通￺とお￻った\n￹目玉￺めだま￻から　￹不思議￺ふしぎ￻な　￹光￺ひかり￻の\nビームを　￹発射￺はっしゃ￻する。"
        en:
          scarlet: "When the tide goes out, dehydrated Tentacool\ncan be found left behind on the shore."
          violet: "Its eyes are as transparent as crystals. From\nthem, it shoots mysterious beams of light."
        fr:
          scarlet: "Quand la marée descend, on peut voir des\nTentacool desséchés échoués sur le sable."
          violet: "Ses globes rouges semblables à des yeux\nsont aussi transparents que du cristal.\nIls peuvent tirer d’étranges rayons lumineux."
        it:
          scarlet: "Con la bassa marea si possono trovare\ndei Tentacool disidratati sulla spiaggia."
          violet: "Ha occhi trasparenti come il cristallo, dai quali\nlancia misteriosi raggi di luce."
        de:
          scarlet: "Bei Ebbe kann man ausgetrocknete Tentacha\nam Strand finden."
          violet: "Seine Augen sind durchsichtig wie Kristalle.\nAus ihnen schießt es geheimnisvolle Lichtstrahlen."
        es:
          scarlet: "Cuando baja la marea, se pueden encontrar\nTentacool deshidratados junto a la orilla."
          violet: "Tiene unos órganos cristalinos que parecen ojos\ndesde los que dispara misteriosos rayos de luz."
        ko:
          scarlet: "바닷물이 빠지면\n모래 해변에 남아 바싹 마른\n왕눈해를 볼 수 있다."
          violet: "수정처럼 투명한 눈알에서\n이상하게 빛나는 빔을 발사한다."
        zh_simp:
          scarlet: "在潮退后，能看到\n被留在沙滩上晒得\n干巴巴的玛瑙水母。"
          violet: "会从水晶般晶莹剔透的\n眼珠里发射带有\n神奇光芒的光束。"
        zh_trad:
          scarlet: "退潮之後，能見到\n被留在沙灘上而曬得\n乾巴巴的瑪瑙水母。"
          violet: "會從透澈如水晶的\n眼珠裡發射帶有\n奇異光芒的光束。"
