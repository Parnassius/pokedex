          violet: "Lorsqu’il a faim, il subit un dérèglement hormonal\net l’énergie emmagasinée dans les poches de ses\njoues passe du type Électrik au type Ténèbres."
        it:
          scarlet: "Ha un’indole aggressiva e irrequieta, e anche\nse rilascia tutta la propria energia Buio non si\nrasserena finché non si riempie lo stomaco."
          violet: "La fame provoca in lui uno squilibrio ormonale\nche fa diventare di tipo Buio l’energia elettrica\ncontenuta nelle sue guance."
        de:
          scarlet: "Dieses Pokémon ist ungestüm und aufbrausend.\nSelbst wenn es seine Unlicht-Energie verbraucht\nhat, tobt es wütend weiter, bis es wieder satt ist."
          violet: "Wenn es Hunger hat, gerät sein Hormonhaushalt\naus dem Gleichgewicht und die Elektro-Energie in\nseinen Backentaschen nimmt den Typ Unlicht an."
        es:
          scarlet: "Es agresivo y revoltoso. Aunque haya usado\ntoda su energía de tipo Siniestro, no se calma\nhasta saciar su apetito."
          violet: "Cuando tiene hambre, sufre un desequilibrio\nhormonal que transforma la electricidad de sus\ncarrillos en energía de tipo Siniestro."
        ko:
          scarlet: "성질이 사납고 난폭하다.\n악의 에너지가 바닥이 나도\n배가 찰 때까지 계속 날뛴다."
          violet: "공복으로 호르몬의 균형이 무너져서\n볼주머니의 에너지가\n전기타입에서 악타입으로 변했다."
        zh_simp:
          scarlet: "性情凶恶又粗暴的家伙。\n即使用光了恶能量，\n也会大闹到填饱肚子为止。"
          violet: "因饥饿导致荷尔蒙失衡，\n使颊囊中的电能转化\n成了恶属性的能量。"
        zh_trad:
          scarlet: "脾氣暴躁，橫蠻無理。\n就算用盡了惡能量，\n也會繼續鬧到吃飽為止。"
          violet: "因飢餓造成的荷爾蒙失調，\n使牠頰囊中的電能\n轉化成了惡屬性的能量。"
