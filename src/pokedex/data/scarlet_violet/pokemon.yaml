      descriptions:
        jp_kana:
          scarlet: "￹抜群￺ばつぐん￻の　￹防御力￺ぼうぎょりょく￻を　￹持￺も￻つ。\nそのため　とくに　￹争￺あらそ￻うこともなく\n￹草￺くさ￻や　￹木￺き￻の￹実￺み￻を　￹食￺た￻べて　￹過￺す￻ごす。"
          violet: "￹頑丈￺がんじょう￻な　￹顔￺かお￻のおかげで\n￹敵￺てき￻は　￹少￺すく￻なかったと　￹思￺おも￻われる。\n￹太古￺たいこ￻の　ジャングルに　￹棲￺す￻んでいた。"
        jp_kanji:
          scarlet: "￹抜群￺ばつぐん￻の　￹防御力￺ぼうぎょりょく￻を　￹持￺も￻つ。\nそのため　とくに　￹争￺あらそ￻うこともなく\n￹草￺くさ￻や　￹木￺き￻の￹実￺み￻を　￹食￺た￻べて　￹過￺す￻ごす。"
          violet: "￹頑丈￺がんじょう￻な　￹顔￺かお￻のおかげで\n￹敵￺てき￻は　￹少￺すく￻なかったと　￹思￺おも￻われる。\n￹太古￺たいこ￻の　ジャングルに　￹棲￺す￻んでいた。"
        en:
          scarlet: "It is outstandingly armored. As a result, it has no\nparticular need to battle with others and can\nspend its time feeding on grass and berries."
          violet: "This Pokémon lived in primeval jungles. It’s\nthought that Shieldon had few enemies thanks\nto its sturdy face."
        fr:
          scarlet: "Ce Pokémon est si bien protégé qu’il a rarement\nbesoin de se battre. Il passe plutôt son temps\nà manger de l’herbe et des Baies."
          violet: "Sa tête très robuste laisse supposer qu’il avait\ntrès peu d’adversaires. Il vivait dans la jungle,\nil y a fort longtemps."
        it:
          scarlet: "Ha capacità difensive eccezionali, perciò passa\nil tempo a mangiare erba e bacche, senza\ndover competere con altri."
          violet: "Viveva nelle giungle preistoriche. Si pensa che\navesse pochi predatori per via del muso\nincredibilmente robusto."
        de:
          scarlet: "Da es extrem gut gepanzert ist, muss es nur\nsehr selten kämpfen und kann den Tag damit\nverbringen, Gras und Beeren zu fressen."
          violet: "Man nimmt an, dass es dank seines gepanzerten\nGesichts kaum Feinde hatte. Es lebte vor\nUrzeiten im Dschungel."
        es:
          scarlet: "Su imponente protección le exime de tener que\ncombatir, por lo que pasa el tiempo comiendo\nhierba y bayas."
          violet: "Debido a la extraordinaria dureza de su rostro,\nse piensa que tenía pocos enemigos. Vivía en las\njunglas prehistóricas."
        ko:
          scarlet: "뛰어난 방어력을 지녔다.\n그 덕분에 특별히 다투는 일도 없이\n풀이나 나무열매를 먹으며 지낸다."
          violet: "튼튼한 얼굴 덕분에\n적은 적었을 것으로 여겨진다.\n태고의 정글에 살았다."
        zh_simp:
          scarlet: "拥有超群的防御力，\n因此不会惹上什么争斗，\n能够安稳吃草和树果度日。"
          violet: "看来多亏了那张结实的脸，\n敌人也少了。\n栖息在太古时代的丛林里。"
        zh_trad:
          scarlet: "擁有超群的防禦力，\n因此不用爭爭鬥鬥，\n能平安地吃草和樹果度日。"
          violet: "多虧那張結實的臉，\n牠的敵人應該不多。\n棲息在太古時代的叢林裡。"
