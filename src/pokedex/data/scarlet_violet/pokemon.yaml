          scarlet: "￹長￺なが￻い　￹耳￺みみ￻は　￹優￺すぐ￻れた　センサー。\n￹水￺みず￻の￹中￺なか￻の　￹音￺おと￻を　￹聞￺き￻き￹分￺わ￻けて\nなにが　￹動￺うご￻いているのか　わかる。"
          violet: "じっと　￹耳￺みみ￻を　すますと\n￹激￺はげ￻しい　￹流￺なが￻れの　￹川￺かわ￻の　￹中￺なか￻に\nなにが　いるのか　￹聞￺き￻き￹分￺わ￻けられる。"
        jp_kanji:
          scarlet: "￹長￺なが￻い　￹耳￺みみ￻は　￹優￺すぐ￻れた　センサー。\n￹水￺みず￻の￹中￺なか￻の　￹音￺おと￻を　￹聞￺き￻き￹分￺わ￻けて\nなにが　￹動￺うご￻いているのか　わかる。"
          violet: "じっと　￹耳￺みみ￻を　すますと\n￹激￺はげ￻しい　￹流￺なが￻れの　￹川￺かわ￻の　￹中￺なか￻に\nなにが　いるのか　￹聞￺き￻き￹分￺わ￻けられる。"
        en:
          scarlet: "Its long ears are superb sensors. It can\ndistinguish the movements of things in\nwater and tell what they are."
          violet: "By keeping still and listening intently, it can\ntell what is in even wild, fast-moving rivers."
        fr:
          scarlet: "Ses longues oreilles lui permettent d’entendre\ntout ce qui se passe sous l’eau de manière très\ndistincte."
          violet: "S’il tend l’oreille en restant parfaitement\nimmobile, il peut discerner ce qu’il y a\nau fond des fleuves les plus agités."
        it:
          scarlet: "Le sue lunghe orecchie sono ricettori\nsensibilissimi. Riesce a distinguere e identificare\nogni minimo rumore perfino sott’acqua."
          violet: "Se rimane immobile e aguzza le orecchie,\nriesce a capire cosa si nasconde nelle acque\ndei fiumi, anche nelle rapide travolgenti."
        de:
          scarlet: "Seine langen Ohren sind hervorragende\nSensoren, mit denen es Geräusche unter\nWasser unterscheiden und zuordnen kann."
          violet: "Verhält es sich regungslos und lauscht, so kann\nes hören, was sich in reißenden Flüssen verbirgt."
        es:
          scarlet: "Sus largas orejas son unos sensores\nexcepcionales que le permiten diferenciar\ne identificar lo que oye dentro del agua."
          violet: "Guardando silencio y prestando mucha\natención puede saber lo que hay en ríos\nde corrientes rápidas y fuertes."
        ko:
          scarlet: "긴 귀는 뛰어난 센서.\n물속의 소리를 구별하여\n무엇이 움직이는지 알 수 있다."
          violet: "가만히 귀를 기울이면\n세차게 흐르는 강 안에\n무엇이 있는지 분간할 수 있다."
        zh_simp:
          scarlet: "长长的耳朵是灵敏的感应器。\n通过聆听水中的声音，\n能分辨出是什么在动。"
          violet: "只要静静地聆听，\n就能分辨出湍急的\n河流中有些什么。"
        zh_trad:
          scarlet: "長長的耳朵是靈敏的感應器。\n能夠藉著聆聽水中的聲音\n來分辨出是什麼在動。"
          violet: "只要細細聆聽，\n就能分辨出在湍急\n的河川中有些什麼。"
