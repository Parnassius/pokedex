      descriptions:
        jp_kana:
          scarlet: "￹両腕￺りょううで￻の　￹炎￺ほのお￻の￹剣￺けん￻は\n￹志半￺こころざしなか￻ばで　￹力￺ちから￻つきた\n￹剣士￺けんし￻の　￹怨念￺おんねん￻で　￹燃￺も￻え￹上￺あ￻がる。"
          violet: "￹怨念￺おんねん￻の　￹染￺し￻みついた\n￹古￺ふる￻い　￹鎧￺よろい￻により　￹進化￺しんか￻した　￹姿￺すがた￻。\n￹容赦￺ようしゃ￻なく　￹敵￺てき￻を　￹切￺き￻り￹刻￺きざ￻む。"
        jp_kanji:
          scarlet: "￹両腕￺りょううで￻の　￹炎￺ほのお￻の￹剣￺けん￻は\n￹志半￺こころざしなか￻ばで　￹力￺ちから￻つきた\n￹剣士￺けんし￻の　￹怨念￺おんねん￻で　￹燃￺も￻え￹上￺あ￻がる。"
          violet: "￹怨念￺おんねん￻の　￹染￺し￻みついた\n￹古￺ふる￻い　￹鎧￺よろい￻により　￹進化￺しんか￻した　￹姿￺すがた￻。\n￹容赦￺ようしゃ￻なく　￹敵￺てき￻を　￹切￺き￻り￹刻￺きざ￻む。"
        en:
          scarlet: "The fiery blades on its arms burn fiercely with the\nlingering resentment of a sword wielder who fell\nbefore accomplishing their goal."
          violet: "An old set of armor steeped in grudges caused\nthis Pokémon’s evolution. Ceruledge cuts its\nenemies to pieces without mercy."
        fr:
          scarlet: "Les flammes de ses épées sont animées par\nla rancœur d’une âme guerrière qui a péri\navant de pouvoir accomplir son but."
          violet: "Il a évolué grâce à une vieille armure imprégnée\nde rancœur. Ce Pokémon lacère ses ennemis\nsans aucune merci."
        it:
          scarlet: "Le lame fiammeggianti che ricoprono le sue\nbraccia ardono per il rimorso di uno spadaccino\ncaduto prima di compiere la propria missione."
          violet: "Taglia a pezzi i nemici senza pietà alcuna.\nUn’antica armatura impregnata di astio e rancore\nha causato l’evoluzione di questo Pokémon."
        de:
          scarlet: "Die Flammenschwerter an beiden Armen lodern\nmit dem Groll eines Schwertkämpfers, der fiel,\nehe er sein Ziel erreichen konnte."
          violet: "Es entwickelte sich durch eine von tiefem Groll\ndurchdrungene, alte Rüstung zu dieser Form.\nFeinde schneidet es ohne Erbarmen in Stücke."
        es:
          scarlet: "Las afiladas llamas que cubren sus brazos están\navivadas por la frustración de un espadachín\nque cayó antes de poder cumplir su cometido."
          violet: "Evolucionó al portar una vieja armadura cargada\nde rencor. Despedaza a sus enemigos sin piedad\nalguna."
        ko:
          scarlet: "양팔의 불꽃 검은\n뜻을 다 이루지 못한 채 스러진\n검사의 원념에 의해 타오르고 있다."
          violet: "원념이 깃든\n오래된 갑옷에 의해 진화한 모습.\n자비 없이 적을 베어 가른다."
        zh_simp:
          scarlet: "双臂的火焰之剑\n是靠着得志前就亡命的\n剑士的怨念而燃烧。"
          violet: "渗进了怨念的旧盔甲\n进化而成的样子。\n会毫不留情地斩断敌人。"
        zh_trad:
          scarlet: "雙臂的火焰之劍靠著\n在得志前就亡命的\n劍士怨念而燃燒。"
          violet: "憑藉滲進怨念的舊鎧甲\n而進化成的樣子。\n會毫不留情地斬斷敵人。"
