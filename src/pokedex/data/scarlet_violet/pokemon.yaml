      descriptions:
        jp_kana:
          scarlet: "ヘドロが　ポケモンになった。\n￹汚￺きたな￻い　￹場所￺ばしょ￻に　￹集￺あつ￻まって\n￹体￺からだ￻の　ばい￹菌￺きん￻を　￹増￺ふ￻やしていく。"
          violet: "ベトベター￹同士￺どうし￻が　くっつくと\nおたがいの　￹体￺からだ￻が　￹混￺ま￻ざりあって\n￹新￺あたら￻しい　￹毒￺どく￻が　￹生￺う￻みだされる。"
        jp_kanji:
          scarlet: "ヘドロが　ポケモンになった。\n￹汚￺きたな￻い　￹場所￺ばしょ￻に　￹集￺あつ￻まって\n￹体￺からだ￻の　ばい￹菌￺きん￻を　￹増￺ふ￻やしていく。"
          violet: "ベトベター￹同士￺どうし￻が　くっつくと\nおたがいの　￹体￺からだ￻が　￹混￺ま￻ざりあって\n￹新￺あたら￻しい　￹毒￺どく￻が　￹生￺う￻みだされる。"
        en:
          scarlet: "Born from sludge, these Pokémon now gather\nin polluted places and increase the bacteria in\ntheir bodies."
          violet: "When two of these Pokémon’s bodies are\ncombined together, new poisons are created."
        fr:
          scarlet: "Torrent de boue devenu Pokémon, il vit dans\nles lieux les plus insalubres pour que le nombre\nde microbes qu’il héberge augmente."
          violet: "Quand les corps de deux Tadmorv se combinent,\nde nouveaux poisons sont créés."
        it:
          scarlet: "Un Pokémon nato dalla melma. Predilige\ni posti sporchi perché gli permettono\ndi aumentare la sua carica batterica."
          violet: "Quando due esemplari combinano i propri\ncorpi, creano nuovi tipi di veleno."
        de:
          scarlet: "Diese aus Schlamm entstandenen Pokémon\nscharen sich an dreckigen Orten, um ihre\nkörpereigenen Bakterien zu kultivieren."
          violet: "Wenn die Körper von zwei Sleima miteinander\nkombiniert werden, so entstehen völlig neue\nArten von Gift."
        es:
          scarlet: "Formados a partir de lodo, los Grimer se\njuntan en lugares sucios para aumentar\nel número de gérmenes de su cuerpo."
          violet: "Cuando se une a otro compañero de\nsu especie, se generan nuevos tipos\nde sustancia venenosa."
        ko:
          scarlet: "오물이 포켓몬이 되었다.\n더러운 장소에 모여\n몸의 세균을 번식시킨다."
          violet: "질퍽이끼리 달라붙으면\n서로의 몸이 뒤섞여서\n새로운 독이 만들어진다."
        zh_simp:
          scarlet: "由污泥变成的宝可梦。\n会聚集在肮脏的地方\n来繁殖身体的细菌。"
          violet: "当臭泥彼此黏在一起，\n身体就会互相融合，\n从而产生新的毒素。"
        zh_trad:
          scarlet: "污泥變成的寶可夢。\n會聚集在骯髒的地方\n來繁殖身體的細菌。"
          violet: "當臭泥彼此黏在一起，\n身體就會互相融合，\n進而產生新種毒素。"
