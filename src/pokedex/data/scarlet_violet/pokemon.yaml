      descriptions:
        jp_kana:
          scarlet: "￹呪文￺じゅもん￻のような　￹鳴￺な￻き￹声￺ごえ￻だが\nまれに　￹相手￺あいて￻を　￹幸￺しあわ￻せにする\n￹効果￺こうか￻も　￹秘￺ひ￻めているという。"
          violet: "￹呪文￺じゅもん￻のような　￹怪￺あや￻しい　￹鳴￺な￻き￹声￺ごえ￻で\n￹相手￺あいて￻を　￹苦￺くる￻しめる。\n￹神出鬼没￺しんしゅつきぼつ￻の　ポケモン。"
        jp_kanji:
          scarlet: "￹呪文￺じゅもん￻のような　￹鳴￺な￻き￹声￺ごえ￻だが\nまれに　￹相手￺あいて￻を　￹幸￺しあわ￻せにする\n￹効果￺こうか￻も　￹秘￺ひ￻めているという。"
          violet: "￹呪文￺じゅもん￻のような　￹怪￺あや￻しい　￹鳴￺な￻き￹声￺ごえ￻で\n￹相手￺あいて￻を　￹苦￺くる￻しめる。\n￹神出鬼没￺しんしゅつきぼつ￻の　ポケモン。"
        en:
          scarlet: "Its cry sounds like an incantation. It is said the\ncry may rarely be imbued with happiness-giving\npower."
          violet: "Its cries sound like incantations to torment the\nfoe. It appears where you least expect it."
        fr:
          scarlet: "Son cri est semblable à une incantation.\nOn raconte qu’en de rares occasions,\nil emplit de joie quiconque l’entend."
          violet: "Ce Pokémon tourmente ses ennemis avec son cri\nsemblable à une incantation. Il apparaît toujours\nlà où l’on s’y attend le moins."
        it:
          scarlet: "Il suo verso sembra una formula magica e si dice\nche, in rari casi, abbia l’effetto di rendere felice\nchi lo ascolta."
          violet: "Tormenta i malcapitati con un verso sinistro simile\na formule magiche. È un Pokémon sfuggente che\nappare e scompare all’improvviso."
        de:
          scarlet: "Sein Ruf ähnelt einer Beschwörung. Man sagt,\ndass er in seltenen Fällen über die Kraft verfüge,\nglücklich zu machen."
          violet: "Sein bizarrer, bannfluchartiger Ruf quält seine\nGegner. Es verschwindet so plötzlich, wie es\nauftaucht."
        es:
          scarlet: "Sus gritos parecen cánticos. Se dice que, en\nalguna rara ocasión, han imbuido felicidad a\nquien los oía."
          violet: "Atormenta a sus rivales con gritos que parecen\nconjuros. Aparece en ocasiones y lugares\nimprevistos."
        ko:
          scarlet: "주문 같은 울음소리지만\n가끔 상대를 행복하게 만드는\n효과도 감춰져 있다고 한다."
          violet: "주문 같은 수상한\n울음소리로 상대를 괴롭힌다.\n신출귀몰한 포켓몬이다."
        zh_simp:
          scarlet: "叫声如同咒语一般，\n但据说也蕴藏着偶尔\n会让对手变得幸福的效果。"
          violet: "用咒语般的怪异\n叫声折磨对手。\n是神出鬼没的宝可梦。"
        zh_trad:
          scarlet: "如同咒語般的叫聲\n據說也蘊藏著偶而會讓\n對手變得幸福的效果。"
          violet: "用咒語般的怪異叫聲折磨對手。\n是神出鬼沒的寶可夢。"
