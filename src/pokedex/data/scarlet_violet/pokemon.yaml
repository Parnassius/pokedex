      hidden_ability: stalwart
      descriptions:
        jp_kana:
          scarlet: "まわりから　￹静電気￺せいでんき￻を　￹集￺あつ￻める。\n￹四￺よ￻つん￹這￺ば￻いの　￹体勢￺たいせい￻で　￹撃￺う￻ち￹出￺だ￻す\nビームは　￹絶大￺ぜつだい￻な　￹威力￺いりょく￻。"
          violet: "￹山中￺さんちゅう￻で　￹穴￺あな￻を　￹掘￺ほ￻り　エサを　￹探￺さが￻す。\n￹落盤￺らくばん￻に　￹巻￺ま￻きこまれても\nへっちゃらなくらい　￹頑丈￺がんじょう￻。"
        jp_kanji:
          scarlet: "まわりから　￹静電気￺せいでんき￻を　￹集￺あつ￻める。\n￹四￺よ￻つん￹這￺ば￻いの　￹体勢￺たいせい￻で　￹撃￺う￻ち￹出￺だ￻す\nビームは　￹絶大￺ぜつだい￻な　￹威力￺いりょく￻。"
          violet: "￹山中￺さんちゅう￻で　￹穴￺あな￻を　￹掘￺ほ￻り　エサを　￹探￺さが￻す。\n￹落盤￺らくばん￻に　￹巻￺ま￻きこまれても\nへっちゃらなくらい　￹頑丈￺がんじょう￻。"
        en:
          scarlet: "It gathers static electricity from its surroundings.\nThe beams it launches when down on all fours\nare tremendously powerful."
          violet: "It digs holes on mountains, searching for food.\nIt’s so durable that being caught in a cave-in\nwon’t faze it."
        fr:
          scarlet: "Il accumule l’électricité statique alentour.\nLe rayon qu’il tire quand il se met à quatre\npattes est d’une puissance colossale."
          violet: "Ce Pokémon creuse dans les montagnes à la\nrecherche de nourriture. Il est si robuste qu’être\npiégé dans un effondrement le laisse indifférent."
        it:
          scarlet: "Raccoglie elettricità statica dall’ambiente\ncircostante. Quando è a quattro zampe può\nemettere un raggio di enorme potenza."
          violet: "Scava buchi nelle montagne in cerca di cibo.\nÈ talmente robusto che non si fa un graffio\nneanche se viene travolto da una frana."
        de:
          scarlet: "Es sammelt statische Elektrizität aus der\nUmgebung. Die Strahlen, die es auf allen\nVieren abfeuert, sind extrem stark."
          violet: "Auf der Suche nach Futter gräbt es in den Bergen\nLöcher. Es ist so robust, dass es ihm auch nichts\nausmacht, wenn diese über ihm einstürzen."
        es:
          scarlet: "Acumula la electricidad estática de su\nentorno. El rayo que dispara cuando está\na cuatro patas posee una potencia colosal."
          violet: "Excava hoyos en las montañas para procurarse\nalimento. Su robustez es tal que apenas se\ninmuta aunque lo afecte de lleno un derrumbe."
        ko:
          scarlet: "주위로부터 정전기를 모은다.\n네발로 엎드려서 발사하는 빔은\n절대적인 위력을 자랑한다."
          violet: "산속에서 굴을 파며 먹이를 찾는다.\n낙반에 휩쓸려도\n아무렇지 않을 정도로 튼튼하다."
        zh_simp:
          scarlet: "从周围收集静电。\n以四肢着地的姿势\n射出的光束威力极强。"
          violet: "会在山里挖洞寻找食物。\n身体坚硬，即使遇到\n塌方也毫无问题。"
        zh_trad:
          scarlet: "會收集周圍的靜電。\n以四肢著地的姿勢發射的\n光束威力驚人無比。"
          violet: "會在山裡挖洞來尋找食物。\n身體非常堅硬，即使遇到\n洞穴坍塌也絲毫不會在意。"
