      descriptions:
        jp_kana:
          scarlet: "￹細長￺ほそなが￻い　￹巣穴￺すあな￻で　￹子育￺こそだ￻て。\n￹子供￺こども￻が　￹育￺そだ￻つと　￹巣穴￺すあな￻の　￹外￺そと￻で\n￹独￺ひと￻り￹立￺だ￻ちの　￹準備￺じゅんび￻を　させる。"
          violet: "すばしっこく　とても　￹体￺からだ￻が\n￹柔￺やわ￻らかいので　￹捕￺つか￻まえても\nするりと　￹腕￺うで￻から　￹抜￺ぬ￻け￹出￺だ￻すぞ。"
        jp_kanji:
          scarlet: "￹細長￺ほそなが￻い　￹巣穴￺すあな￻で　￹子育￺こそだ￻て。\n￹子供￺こども￻が　￹育￺そだ￻つと　￹巣穴￺すあな￻の　￹外￺そと￻で\n￹独￺ひと￻り￹立￺だ￻ちの　￹準備￺じゅんび￻を　させる。"
          violet: "すばしっこく　とても　￹体￺からだ￻が\n￹柔￺やわ￻らかいので　￹捕￺つか￻まえても\nするりと　￹腕￺うで￻から　￹抜￺ぬ￻け￹出￺だ￻すぞ。"
        en:
          scarlet: "It raises its offspring inside a long, narrow nest.\nOnce they’re old enough, it takes them outside\nthe nest to prepare them for independence."
          violet: "It is nimble and has a very flexible body.\nEven if you get ahold of it, it’ll slip right out\nof your arms."
        fr:
          scarlet: "Il élève ses petits dans des terriers longs et étroits.\nQuand ils sont assez grands, il les emmène\nà l’extérieur pour les préparer à l’indépendance."
          violet: "Il est si souple et agile que même si l’on parvient\nà en attraper un, il peut aisément nous glisser\nentre les doigts et s’enfuir."
        it:
          scarlet: "Alleva i piccoli in tane lunghe e strette.\nQuando questi crescono, li porta fuori\ndalla tana per prepararli all’indipendenza."
          violet: "Essendo veloce e molto flessibile, sfugge\nfacilmente dalle mani di chi lo ha catturato."
        de:
          scarlet: "Es zieht seine Jungen in einem langen, schmalen\nBau auf. Sind diese groß genug, bereitet es sie\nim Freien auf ein eigenständiges Leben vor."
          violet: "Es ist flink und sehr geschmeidig. Selbst wenn\nman es gefangen hat, kann es einem leicht\nwieder aus den Armen schlüpfen."
        es:
          scarlet: "Cuida de sus crías en una madriguera larga y\nestrecha. Cuando crecen, las lleva al exterior\ny les enseña a vivir de forma independiente."
          violet: "Gracias a su agilidad y a la flexibilidad de su\ncuerpo, es capaz de escabullirse con facilidad\ncuando alguien lo agarra."
        ko:
          scarlet: "가늘고 긴 굴에서 새끼를 키운다.\n새끼가 자라면 굴 밖에서\n독립할 준비를 시킨다."
          violet: "몸이 날렵하면서도 아주 유연해서\n붙잡아도 팔에서 스르륵 빠져나간다."
        zh_simp:
          scarlet: "在细长的巢穴中养育孩子。\n等孩子长大后，就会让孩子到\n巢穴外做独立生活的准备。"
          violet: "身手敏捷且身体十分柔软，\n即使被捉住也能一溜烟地\n从对方手中逃脱哦。"
        zh_trad:
          scarlet: "在細長的巢穴中養育孩子。\n孩子長大後，就會到巢穴外\n讓孩子準備獨立生活。"
          violet: "動作靈活且身體極為柔軟，\n因此就算被捉住也能\n一溜煙地從對方手中逃脫。"
