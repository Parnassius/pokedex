        jp_kana:
          scarlet: "￹炎￺ほのお￻エネルギーと\n￹有￺あ￻り￹余￺あま￻る　￹生命力￺せいめいりょく￻が　￹交￺ま￻じり\n￹頭上￺ずじょう￻に　タマゴ￹型￺がた￻の　￹火玉￺ひだま￻が　￹現￺あらわ￻れた。"
          violet: "￹声帯￺せいたい￻と　￹炎袋￺ほのおぶくろ￻の　￹弁￺べん￻は\n￹密接￺みっせつ￻な　￹関係￺かんけい￻。　だみ￹声￺ごえ￻を\n￹上￺あ￻げながら　￹炎￺ほのお￻を　￹吐￺は￻き￹散￺ち￻らす。"
        jp_kanji:
          scarlet: "￹炎￺ほのお￻エネルギーと\n￹有￺あ￻り￹余￺あま￻る　￹生命力￺せいめいりょく￻が　￹交￺ま￻じり\n￹頭上￺ずじょう￻に　タマゴ￹型￺がた￻の　￹火玉￺ひだま￻が　￹現￺あらわ￻れた。"
          violet: "￹声帯￺せいたい￻と　￹炎袋￺ほのおぶくろ￻の　￹弁￺べん￻は\n￹密接￺みっせつ￻な　￹関係￺かんけい￻。　だみ￹声￺ごえ￻を\n￹上￺あ￻げながら　￹炎￺ほのお￻を　￹吐￺は￻き￹散￺ち￻らす。"
        en:
          scarlet: "The combination of Crocalor’s fire energy and\noverflowing vitality has caused an egg-shaped\nfireball to appear on the Pokémon’s head."
          violet: "The valve in Crocalor’s flame sac is closely\nconnected to its vocal cords. This Pokémon utters\na guttural cry as it spews flames every which way."
        fr:
          scarlet: "La boule de feu en forme d’œuf qui surmonte\nsa tête résulte de la fusion entre son énergie\nde type Feu et son trop-plein de vitalité."
          violet: "Ses cordes vocales et la valve de sa poche à\nflammes sont étroitement liées, ce qui lui permet\nde pousser des cris gutturaux en crachant du feu."
        it:
          scarlet: "L’energia Fuoco e la forza vitale in eccesso\nsi sono combinate formando la palla di fuoco\novoidale sulla sua testa."
          violet: "Le sue corde vocali sono strettamente collegate\nalla valvola della sacca ignea. Mentre sputa\nfiammate tutt’intorno, emette versi rauchi."
        de:
          scarlet: "Seine Feuer-Energie und sein Überschuss an\nLebenskraft brachten gemeinsam den eiförmigen\nFeuerball auf seinem Kopf hervor."
          violet: "Das Ventil für seinen Flammensack ist eng mit\nden Stimmbändern verbunden. Wenn es Feuer\nspuckt, stößt es raue Laute aus."
        es:
          scarlet: "La mezcla de energía ígnea con el exceso de su\npropia fuerza vital ha tomado la forma de una\nbola de fuego de aspecto oval sobre su cabeza."
          violet: "Sus cuerdas vocales y la válvula de su saca\nde fuego están estrechamente relacionadas.\nEmite sonidos guturales al expeler llamas."
        ko:
          scarlet: "불꽃 에너지와\n남아도는 생명력이 섞여서\n머리 위에 알 모양의 불덩이가 생겨났다."
          violet: "성대와 불꽃 주머니는 밀접하게\n관계되어 있다. 탁한 소리를 내며\n불꽃을 토해 낸다."
        zh_simp:
          scarlet: "由于火之能量与过剩的\n生命力相互结合，使它\n头上出现了蛋状的火球。"
          violet: "声带和火囊的阀紧邻在一起。\n会一边发出嘶哑的声音，\n一边喷洒火焰。"
        zh_trad:
          scarlet: "火之能量與過剩的生命力\n相互結合，使得牠頭上\n出現了蛋狀的火球。"
          violet: "聲帶和火囊的閥緊鄰在一起。\n會一邊發出嘶啞的聲音，\n一邊噴灑火焰。"
