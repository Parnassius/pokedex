      descriptions:
        jp_kana:
          scarlet: "￹果物￺くだもの￻を　￹煮詰￺につ￻めたような　￹甘￺あま￻い\n￹汗￺あせ￻を　かくため　￹甘味￺かんみ￻の　￹少￺すく￻ない\n￹昔￺むかし￻は　とても　￹重宝￺ちょうほう￻された。"
          violet: "￹甘￺あま￻い　￹匂￺にお￻いに　￹釣￺つ￻られ　やって￹来￺き￻た\nヨクバリスに　￹木￺き￻の￹実￺み￻と　￹一緒￺いっしょ￻に\n￹尻尾￺しっぽ￻に　￹包￺つつ￻まれ　￹連￺つ￻れ￹去￺さ￻られる。"
        jp_kanji:
          scarlet: "￹果物￺くだもの￻を　￹煮詰￺につ￻めたような　￹甘￺あま￻い\n￹汗￺あせ￻を　かくため　￹甘味￺かんみ￻の　￹少￺すく￻ない\n￹昔￺むかし￻は　とても　￹重宝￺ちょうほう￻された。"
          violet: "￹甘￺あま￻い　￹匂￺にお￻いに　￹釣￺つ￻られ　やって￹来￺き￻た\nヨクバリスに　￹木￺き￻の￹実￺み￻と　￹一緒￺いっしょ￻に\n￹尻尾￺しっぽ￻に　￹包￺つつ￻まれ　￹連￺つ￻れ￹去￺さ￻られる。"
        en:
          scarlet: "Its sweat is sweet, like syrup made from boiled-\ndown fruit. Because of this, Bounsweet was highly\nvalued in the past, when sweeteners were scarce."
          violet: "A Greedent drawn in by the sweet scent of these\nPokémon will tuck the Bounsweet in among the\nberries in its tail and carry them all away."
        fr:
          scarlet: "Sa sueur est aussi sucrée qu’un jus de fruits.\nElle était donc très appréciée autrefois,\nquand les édulcorants étaient rares."
          violet: "Attirés par l’agréable parfum sucré des Croquine,\nles Rongrigou les enfouissent dans leur queue\navec leurs Baies, avant de les emporter."
        it:
          scarlet: "In tempi antichi, quando i cibi dolci erano rari,\nquesto Pokémon era molto apprezzato per via\ndel suo sudore dolce come marmellata."
          violet: "Attirati dal suo dolce profumo, i Greedent\nmettono spesso questo Pokémon tra le bacche\nche portano nella coda."
        de:
          scarlet: "Sein Schweiß schmeckt so süß wie eingekochtes\nObst und wurde daher früher, als es nur wenige\nSüßungsmittel gab, sehr geschätzt."
          violet: "Sein süßer Duft lockt oft Schlaraffel an,\ndie Frubberl dann zusammen mit Beeren\nin ihren Schweif packen und forttragen."
        es:
          scarlet: "En la antigüedad, cuando no eran comunes los\nsabores dulces, era muy apreciado por su sudor,\npues es tan dulce como un concentrado de fruta."
          violet: "Los Greedent que se les acercan atraídos por su\ndulce aroma se los suelen llevar envueltos en la\ncola junto a las bayas."
        ko:
          scarlet: "과일을 졸인 것만 같은 달콤한 땀을\n흘리기 때문에, 달콤한 음식이 적었던\n옛날에는 매우 귀하게 여겨졌다."
          violet: "달콤한 향기에 이끌려 찾아온\n요씽리스가 나무열매와 같이\n꼬리에 싸서 데려갈 때도 있다."
        zh_simp:
          scarlet: "它的汗水像是煮干的\n水果甜味，在甜食\n较少的过去颇受重视。"
          violet: "被它甜甜的香气吸引而来的\n藏饱栗鼠会用尾巴将它\n和树果一起裹起来带走。"
        zh_trad:
          scarlet: "汗水帶著像是經過熬煮的\n水果甜味，在過去甜食尚少\n的時代相當受到人們珍視。"
          violet: "被牠甜甜的香氣吸引而來的\n藏飽栗鼠，會把牠和樹果\n用尾巴裹起來一併帶走。"
