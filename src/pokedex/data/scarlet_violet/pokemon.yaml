      descriptions:
        jp_kana:
          scarlet: "￹生￺う￻まれたあと　￹背中￺せなか￻が　ふくらんで\n￹硬￺かた￻い　￹甲羅￺こうら￻が　できる。　￹口￺くち￻から\n￹強力￺きょうりょく￻な　￹泡￺あわ￻を　￹出￺だ￻す。"
          violet: "￹生￺う￻まれたては　￹柔￺やわ￻らかい　￹甲羅￺こうら￻も\nすぐに　￹指￺ゆび￻でつつくと　￹弾￺はじ￻くほどの\n￹弾力性￺だんりょくせい￻を　￹持￺も￻つようになる。"
        jp_kanji:
          scarlet: "￹生￺う￻まれたあと　￹背中￺せなか￻が　ふくらんで\n￹硬￺かた￻い　￹甲羅￺こうら￻が　できる。　￹口￺くち￻から\n￹強力￺きょうりょく￻な　￹泡￺あわ￻を　￹出￺だ￻す。"
          violet: "￹生￺う￻まれたては　￹柔￺やわ￻らかい　￹甲羅￺こうら￻も\nすぐに　￹指￺ゆび￻でつつくと　￹弾￺はじ￻くほどの\n￹弾力性￺だんりょくせい￻を　￹持￺も￻つようになる。"
        en:
          scarlet: "After birth, its back swells and hardens into a\nshell. It sprays a potent foam from its mouth."
          violet: "Its shell is soft immediately after it is born. In no\ntime at all, the shell becomes so resilient that a\nprodding finger will bounce right off it."
        fr:
          scarlet: "Ce Pokémon crache une écume redoutable.\nAprès sa naissance, son dos gonfle et durcit\npour former une carapace."
          violet: "Lorsqu’il naît, sa carapace est molle, mais elle\ngagne tout de suite en élasticité et reprend\nsa forme initiale quand on appuie dessus."
        it:
          scarlet: "Dopo la nascita, la sua schiena si gonfia\ne si trasforma in una dura corazza.\nSputa una potente schiuma dalla bocca."
          violet: "Il suo guscio, molle alla nascita, diventa presto\nabbastanza elastico da contrastare la pressione\nesercitata da un dito."
        de:
          scarlet: "Nach der Geburt schwillt sein Rücken an und\nverhärtet sich zu einem Panzer. Es versprüht\nstarken Schaum aus seinem Maul."
          violet: "Sein Panzer ist bei Geburt weich. Er wird jedoch\nsofort so elastisch, dass kleinere Stöße von ihm\nabprallen."
        es:
          scarlet: "Tras nacer, se le hincha el lomo y se le forma\nun caparazón. Escupe poderosa espuma por\nla boca."
          violet: "Su caparazón, blando al nacer, enseguida se\nvuelve lo suficientemente elástico como para\ncontrarrestar la presión ejercida por un dedo."
        ko:
          scarlet: "태어난 뒤 등이 부풀면서\n단단한 등껍질이 생긴다.\n입에서 강력한 거품을 발사한다."
          violet: "갓 태어났을 땐 부드러웠던 등껍질도\n곧 손으로 찌르면 튕길 정도의\n탄력성을 가지게 된다."
        zh_simp:
          scarlet: "出生后背部会隆起\n成为坚硬的甲壳。能从\n口中吐出强力的泡沫。"
          violet: "刚出生时柔软的甲壳\n会马上变得有弹性，\n足以弹开戳下来的手指。"
        zh_trad:
          scarlet: "出生後背部會鼓起形成\n堅硬的甲殼。能從口中\n吐出強而有力的泡沫。"
          violet: "剛出生時柔軟的甲殼\n會隨即變得極富彈性，\n足以彈開戳它的手指。"
