          violet: "￹民家￺みんか￻の　￹床下￺ゆかした￻や　￹棚￺たな￻の￹奥￺おく￻など\n￹冷暗所￺れいあんしょ￻を　￹好￺この￻む。　￹日没後￺にちぼつご￻\n￹獲物￺えもの￻を　￹探￺さが￻して　￹徘徊￺はいかい￻する。"
        jp_kanji:
          scarlet: "お￹茶￺ちゃ￻の　ふりをして　￹間違￺まちが￻えて\n￹飲￺の￻んでしまった　￹相手￺あいて￻の　￹生気￺せいき￻を\n￹吸￺す￻い￹取￺と￻ろうとするが　ばれがちだ。"
          violet: "￹民家￺みんか￻の　￹床下￺ゆかした￻や　￹棚￺たな￻の￹奥￺おく￻など\n￹冷暗所￺れいあんしょ￻を　￹好￺この￻む。　￹日没後￺にちぼつご￻\n￹獲物￺えもの￻を　￹探￺さが￻して　￹徘徊￺はいかい￻する。"
        en:
          scarlet: "It pretends to be tea, trying to fool people into\ndrinking it so it can drain their life-force. Its ruse\nis generally unsuccessful."
          violet: "It prefers cool, dark places, such as the back of a\nshelf or the space beneath a home’s floorboards.\nIt wanders in search of prey after sunset."
        fr:
          scarlet: "Il se fait passer pour un bol de thé afin d’aspirer\nla force vitale de quiconque ferait l’erreur de le\nboire, mais en général, personne n’est dupe."
          violet: "Il aime les endroits frais et sombres, comme le\ndessous d’un plancher ou le fond d’une étagère.\nÀ la nuit tombée, il erre en quête de proies."
        it:
          scarlet: "Finge di essere del tè e cerca di farsi bere da\nqualche malcapitato per rubargli l’energia\nvitale, ma spesso viene scoperto."
          violet: "Gli piace stare in posti bui e freschi, ad esempio\nin fondo agli scaffali o sotto i pavimenti delle\ncase. Dopo il tramonto vaga in cerca di prede."
        de:
          scarlet: "Es gibt sich als Tee aus und versucht jenen,\ndie es versehentlich trinken, die Lebensenergie\nauszusaugen. Allerdings wird es oft durchschaut."
          violet: "Es hält sich gern an dunklen und kalten Orten auf\nwie etwa unter Fußböden oder hinter Regalen.\nNach Sonnenuntergang geht es auf Beutejagd."
        es:
          scarlet: "Se hace pasar por té matcha para que algún\nincauto lo beba y así absorber su energía vital,\npero su plan suele fracasar."
          violet: "Prefiere los lugares fríos y oscuros, como el\nfondo de las estanterías o bajo el suelo de las\ncasas. Vaga en pos de presas tras el ocaso."
        ko:
          scarlet: "차로 위장하여 실수로 마셔 버린\n상대의 생기를 흡수하려 하나\n금방 들통나 버린다."
          violet: "민가의 마루 밑이나 선반 구석 등\n서늘하고 어두운 곳을 선호한다.\n일몰 후에 먹이를 찾아 돌아다닌다."
        zh_simp:
          scarlet: "虽然会假装成茶\n企图吸取误饮者的精气，\n但经常会被识破。"
          violet: "喜欢待在民宅的地板下和\n架子深处等阴凉的地方。\n日落后会四处徘徊寻找猎物。"
        zh_trad:
          scarlet: "雖然會假裝成茶\n企圖吸取誤飲者的精氣，\n但經常會被識破。"
          violet: "喜歡待在民宅的地板下或\n架子深處等陰涼的地方。\n日落後會四處徘徊尋找獵物。"
