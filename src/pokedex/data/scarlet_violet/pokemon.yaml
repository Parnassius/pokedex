      descriptions:
        jp_kana:
          scarlet: "￹根￺ね￻っこを　￹通￺つう￻じて　￹木々￺きぎ￻と　つながり\n￹森￺もり￻の　￹隅々￺すみずみ￻まで　￹監視￺かんし￻する。\n￹不審者￺ふしんしゃ￻は　￹呪￺のろ￻いで　￹撃退￺げきたい￻。"
          violet: "￹森￺もり￻に　￹棲￺す￻む　ポケモンには　とても\n￹優￺やさ￻しい。　￹頭￺あたま￻の　しげみを\n￹棲￺す￻み￹処￺か￻にされても　￹気￺き￻にしない。"
        jp_kanji:
          scarlet: "￹根￺ね￻っこを　￹通￺つう￻じて　￹木々￺きぎ￻と　つながり\n￹森￺もり￻の　￹隅々￺すみずみ￻まで　￹監視￺かんし￻する。\n￹不審者￺ふしんしゃ￻は　￹呪￺のろ￻いで　￹撃退￺げきたい￻。"
          violet: "￹森￺もり￻に　￹棲￺す￻む　ポケモンには　とても\n￹優￺やさ￻しい。　￹頭￺あたま￻の　しげみを\n￹棲￺す￻み￹処￺か￻にされても　￹気￺き￻にしない。"
        en:
          scarlet: "Using its roots, Trevenant connects itself\nto trees and monitors every corner of its forest.\nIt uses curses to drive intruders away."
          violet: "Trevenant is very kind to Pokémon living in the\nforest. It doesn’t even care if these Pokémon\ntake up residence in the greenery on its head."
        fr:
          scarlet: "Ce Pokémon surveille les moindres recoins\nde la forêt en se connectant aux arbres par les\nracines. Il repousse les intrus en les ensorcelant."
          violet: "Il est très amical avec les Pokémon de la\nforêt, allant même jusqu’à laisser ces derniers\nélire domicile dans le feuillage sur sa tête."
        it:
          scarlet: "Sorveglia l’intero bosco connettendosi\nagli alberi tramite le sue radici. Gli intrusi\nvengono respinti a suon di maledizioni."
          violet: "È molto gentile con i Pokémon che vivono nei\nboschi e li lascia tranquillamente nidificare\nnella sua chioma."
        de:
          scarlet: "Es überwacht den ganzen Wald, indem\nes sich durch seine Wurzeln mit den Bäumen\nverbindet. Eindringlinge vertreibt es mit Flüchen."
          violet: "Zu den im Wald lebenden Pokémon ist es sehr\nfreundlich. Es macht ihm auch nichts aus, wenn\nsie sich im Geäst auf seinem Kopf einquartieren."
        es:
          scarlet: "Se comunica con los árboles a través de\nsus raíces para vigilar cada rincón del bosque\ny expulsar a los indeseables con una maldición."
          violet: "Es muy amable con los Pokémon que\nmoran en el bosque, e incluso permite\nque habiten entre el follaje de su cabeza."
        ko:
          scarlet: "뿌리를 통해 나무들과 연결되어\n숲속 구석구석을 감시한다.\n수상한 자는 저주로 물리친다."
          violet: "숲에 사는 포켓몬에게는 매우 상냥하다.\n머리의 수풀을 거처로 삼아도\n신경 쓰지 않는다."
        zh_simp:
          scarlet: "通过根茎连接树木\n监视森林的每个角落。\n会用诅咒击退可疑分子。"
          violet: "对住在森林里的宝可梦很亲切，\n即使头上繁茂的叶子\n被当成住所也不会在意。"
        zh_trad:
          scarlet: "用樹根與樹木連結，\n監視森林的每個角落。\n會用詛咒擊退可疑份子。"
          violet: "對住在森林裡的寶可夢\n非常親切，就算被住進了\n頭上那叢葉子裡也毫不在意。"
