      descriptions:
        jp_kana:
          scarlet: "￹飛行中￺ひこうちゅう￻　￹天敵￺てんてき￻に　￹狙￺ねら￻われて\n￹客￺きゃく￻も　￹危険￺きけん￻なので　パルデアでは\nタクシーの　￹仕事￺しごと￻が　できないのだ。"
          violet: "￹羽￺はね￻の　￹一部￺いちぶ￻が　￹鋼￺はがね￻に　￹変化￺へんか￻。\n￹重￺おも￻たい　￹翼￺つばさ￻を　ものともせずに\n￹大空￺おおぞら￻を　ゆうゆうと　￹飛￺と￻びまわる。"
        jp_kanji:
          scarlet: "￹飛行中￺ひこうちゅう￻　￹天敵￺てんてき￻に　￹狙￺ねら￻われて\n￹客￺きゃく￻も　￹危険￺きけん￻なので　パルデアでは\nタクシーの　￹仕事￺しごと￻が　できないのだ。"
          violet: "￹羽￺はね￻の　￹一部￺いちぶ￻が　￹鋼￺はがね￻に　￹変化￺へんか￻。\n￹重￺おも￻たい　￹翼￺つばさ￻を　ものともせずに\n￹大空￺おおぞら￻を　ゆうゆうと　￹飛￺と￻びまわる。"
        en:
          scarlet: "Corviknight can’t serve as a taxi service in Paldea\nbecause the Pokémon’s natural predators will\nattack it while it flies, endangering the customer."
          violet: "Although its wings have partly turned to\nsteel and become heavy as a result, this\nPokémon flies through the skies with ease."
        fr:
          scarlet: "Il ne peut pas servir de taxi dans le ciel de Paldea\nen raison des attaques de ses adversaires, qui\npourraient mettre sa clientèle en danger."
          violet: "Une partie de ses ailes s’est transformée en acier.\nMalgré leur poids, il vole sans aucun problème."
        it:
          scarlet: "A Paldea non può fare da taxi, poiché gli attacchi\ndei suoi nemici naturali metterebbero in pericolo\ni passeggeri durante il volo."
          violet: "Una parte delle sue ali si è tramutata\nin acciaio, ma riesce a librarsi in volo\ntranquillamente malgrado il peso aggiuntivo."
        de:
          scarlet: "In Paldea dient es nicht als Flugtaxi, da die in\nder Luft erfolgenden Angriffe seiner natürlichen\nFeinde die Passagiere gefährden würden."
          violet: "Obwohl seine Flügel nun deutlich schwerer sind,\nda sie zum Teil aus Stahl bestehen, segelt es mit\nLeichtigkeit durch die Lüfte."
        es:
          scarlet: "Debido al peligro que supondrían los ataques de\nsus enemigos naturales para los pasajeros, este\nPokémon no puede ejercer de taxi en Paldea."
          violet: "Parte de sus alas se ha convertido en acero,\npero es capaz de surcar los cielos con facilidad\na pesar de su peso."
        ko:
          scarlet: "비행 중에 천적에게 공격을 받으면\n승객도 위험해질 수 있어서\n팔데아에서는 택시로 활용할 수 없다."
          violet: "깃털의 일부가 강철로 변화했다.\n무거운 날개에도 아랑곳하지 않고\n넓은 하늘을 유유히 날아다닌다."
        zh_simp:
          scarlet: "若在飞行中遭到天敌袭击的话，\n对乘客来说也很危险，因此无法\n在帕底亚从事出租车的工作。"
          violet: "羽毛的一部分变成了钢铁。\n即使翅膀沉重也能\n悠然地飞在空中。"
        zh_trad:
          scarlet: "如果在飛行中遭到天敵的襲擊，\n也會給乘客帶來危險，因此在\n帕底亞無法從事計程車的工作。"
          violet: "部分的羽毛變成了鋼鐵。\n即使翅膀沉重也能夠\n悠遊自在地飛在空中。"
