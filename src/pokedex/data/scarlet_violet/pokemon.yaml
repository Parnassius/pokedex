        jp_kana:
          scarlet: "￹晴￺は￻れた　￹日￺ひ￻に　￹寝￺ね￻ている　リーフィアは\n￹光合成￺こうごうせい￻をして　きれいな　￹空気￺くうき￻を\n￹作￺つく￻り￹出￺だ￻しているのだ。"
          violet: "￹若￺わか￻い　リーフィアほど　ツンとくる\n￹青臭￺あおくさ￻い　￹匂￺にお￻い。　￹年老￺としお￻いると\n￹落￺お￻ち￹葉￺ば￻のような　￹匂￺にお￻いになる。"
        jp_kanji:
          scarlet: "￹晴￺は￻れた　￹日￺ひ￻に　￹寝￺ね￻ている　リーフィアは\n￹光合成￺こうごうせい￻をして　きれいな　￹空気￺くうき￻を\n￹作￺つく￻り￹出￺だ￻しているのだ。"
          violet: "￹若￺わか￻い　リーフィアほど　ツンとくる\n￹青臭￺あおくさ￻い　￹匂￺にお￻い。　￹年老￺としお￻いると\n￹落￺お￻ち￹葉￺ば￻のような　￹匂￺にお￻いになる。"
        en:
          scarlet: "When you see Leafeon asleep in a patch of\nsunshine, you’ll know it is using photosynthesis\nto produce clean air."
          violet: "The younger they are, the more they smell like\nfresh grass. With age, their fragrance takes on the\nodor of fallen leaves."
        fr:
          scarlet: "Un Phyllali qui dort par beau temps produit\nun air frais et pur par photosynthèse."
          violet: "Les jeunes Phyllali sentent l’herbe fraîche.\nLorsqu’ils vieillissent, ils dégagent une odeur\nde feuilles mortes."
        it:
          scarlet: "Nelle belle giornate dorme al sole e usa\nla fotosintesi, producendo aria pulita."
          violet: "Quando è giovane emette un forte profumo\nd’erba fresca, ma nella vecchiaia odora di foglie\nmorte."
        de:
          scarlet: "An klaren Tagen erzeugt ein schlafendes\nFolipurba saubere Luft, indem es Fotosynthese\nbetreibt."
          violet: "Je jünger sie sind, desto stärker riechen sie nach\nfrischem Gras. Wenn sie älter werden, verströmen\nsie den Geruch von herabgefallenem Laub."
        es:
          scarlet: "En días soleados, duerme y hace la fotosíntesis,\ncon la que emite aire puro a su alrededor."
          violet: "Los Leafeon jóvenes desprenden un intenso\naroma a hierba fresca, mientras que el olor de\nlos mayores es más semejante a la hojarasca."
        ko:
          scarlet: "맑은 날에 잠든 리피아는\n광합성을 해서\n깨끗한 공기를 만들어 낸다."
          violet: "어린 리피아일수록 코를 찌르는\n풋내가 난다. 나이를 먹으면\n낙엽 같은 냄새로 바뀐다."
        zh_simp:
          scarlet: "在晴朗的日子里睡着的叶伊布\n会进行光合作用，\n制造出新鲜的空气。"
          violet: "越是年幼的叶伊布，\n越是有冲鼻的青草香味。\n年老后就变成好像落叶的味道。"
        zh_trad:
          scarlet: "在晴朗的日子裡，\n睡著的葉伊布會進行光合作用，\n製造出新鮮的空氣。"
          violet: "越是年幼的葉伊布，\n越是有刺鼻的青草味。\n年老後就會變成好像落葉的味道。"
