      descriptions:
        jp_kana:
          scarlet: "￹獲物￺えもの￻を　￹挑発￺ちょうはつ￻して　￹狭￺せま￻い\n￹岩場￺いわば￻に　￹誘￺さそ￻い￹込￺こ￻み　フラフラになる\n￹毒￺どく￻ガスを　￹吹￺ふ￻きかけ　￹仕留￺しと￻めるのだ。"
          violet: "メスのみが　フェロモンを　￹発￺はっ￻する\nガスを　￹作￺つく￻れる。　￹骨抜￺ほねぬ￻きにされた\nオスは　メスの　￹言￺い￻いなりになるぞ。"
        jp_kanji:
          scarlet: "￹獲物￺えもの￻を　￹挑発￺ちょうはつ￻して　￹狭￺せま￻い\n￹岩場￺いわば￻に　￹誘￺さそ￻い￹込￺こ￻み　フラフラになる\n￹毒￺どく￻ガスを　￹吹￺ふ￻きかけ　￹仕留￺しと￻めるのだ。"
          violet: "メスのみが　フェロモンを　￹発￺はっ￻する\nガスを　￹作￺つく￻れる。　￹骨抜￺ほねぬ￻きにされた\nオスは　メスの　￹言￺い￻いなりになるぞ。"
        en:
          scarlet: "It taunts its prey and lures them into narrow,\nrocky areas where it then sprays them with toxic\ngas to make them dizzy and take them down."
          violet: "Only female Salandit can produce gas laden\nwith pheromones. Males entranced by this gas\nwill do whatever the females tell them."
        fr:
          scarlet: "Il provoque ses proies afin de les attirer dans\nd’étroites zones rocheuses, puis il les étourdit\navec son gaz toxique avant de les achever."
          violet: "Les Tritox femelles sont capables de produire\nun gaz chargé de phéromones. Sous l’effet de\nce dernier, les mâles obéissent aveuglément."
        it:
          scarlet: "Provoca le sue prede e le attira in stretti luoghi\nrocciosi, per poi stordirle con il suo gas\nvelenoso e abbatterle."
          violet: "Le femmine di Salandit possono generare un gas\ncontenente feromoni che ammalia i maschi,\nlasciandoli completamente alla loro mercé."
        de:
          scarlet: "Es provoziert seine Beute und lockt sie in enge\nFelsspalten, wo es sie dann mit Giftgas ins\nTaumeln bringt und erlegt."
          violet: "Die Weibchen produzieren ein pheromonhaltiges\nGas. Kommt ein Männchen damit in Kontakt,\ngehorcht es dem Weibchen aufs Wort."
        es:
          scarlet: "Provoca a sus presas para conducirlas a zonas\nrocosas y estrechas, donde las aturde con\nun gas venenoso antes de acabar con ellas."
          violet: "Las hembras son las únicas que producen un gas\ncargado de feromonas. Este doblega la voluntad\nde los machos y hace que queden a su merced."
        ko:
          scarlet: "먹잇감을 도발해서\n좁은 암석 지대로 유인한 뒤\n어지러워지는 독가스를 뿜어서 마무리한다."
          violet: "암컷만이 페로몬을 발산하는\n가스를 만들 수 있다. 무기력해진 수컷은\n암컷이 시키는 대로 움직이게 된다."
        zh_simp:
          scarlet: "会挑衅猎物并将其引进狭窄的\n岩石地带，接着喷出能引起头晕的\n毒瓦斯后给予对方致命一击。"
          violet: "唯有雌性造出的气体会释放\n费洛蒙。被迷得神魂颠倒的\n雄性会对雌性唯命是从。"
        zh_trad:
          scarlet: "會挑釁獵物並引進狹窄的\n岩堆裡，接著噴出能造成\n頭暈的毒瓦斯後奪其性命。"
          violet: "唯有雌性製造的氣體會釋放\n費洛蒙。被迷得神魂顛倒的\n雄性會對雌性唯命是從。"
