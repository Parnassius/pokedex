      descriptions:
        jp_kana:
          scarlet: "フラフラ　￹飛￺と￻びながら　￹隙￺すき￻を　￹狙￺ねら￻い\n￹金属￺きんぞく￻も　￹溶￺と￻かす　￹強酸性￺きょうさんせい￻の\n￹液体￺えきたい￻を　￹吐￺は￻いて　￹攻撃￺こうげき￻する。"
          violet: "￹体液￺たいえき￻で　りんごを　￹補修￺ほしゅう￻する。\n￹歴戦￺れきせん￻の　￹強者￺つわもの￻の　りんごは\n￹全体的￺ぜんたいてき￻に　￹粘土色￺ねんどいろ￻。"
        jp_kanji:
          scarlet: "フラフラ　￹飛￺と￻びながら　￹隙￺すき￻を　￹狙￺ねら￻い\n￹金属￺きんぞく￻も　￹溶￺と￻かす　￹強酸性￺きょうさんせい￻の\n￹液体￺えきたい￻を　￹吐￺は￻いて　￹攻撃￺こうげき￻する。"
          violet: "￹体液￺たいえき￻で　りんごを　￹補修￺ほしゅう￻する。\n￹歴戦￺れきせん￻の　￹強者￺つわもの￻の　りんごは\n￹全体的￺ぜんたいてき￻に　￹粘土色￺ねんどいろ￻。"
        en:
          scarlet: "It flutters around while seeking an opening in\nthe opponent’s guard, then attacks by spitting\nacidic liquid strong enough to melt metal."
          violet: "It uses its own body fluid to repair its apple.\nStrong Flapple that have won many battles have\napples that are clay colored all over."
        fr:
          scarlet: "Ce Pokémon voltige en guettant ses adversaires.\nLe moment venu, il attaque en crachant un\nliquide si acide qu’il peut corroder le métal."
          violet: "Il renforce sa pomme avec ses fluides corporels.\nLes pommes des spécimens qui ont vaincu de\nnombreux ennemis prennent une couleur terreuse."
        it:
          scarlet: "Svolazza qua e là in attesa del momento\ngiusto per attaccare sputando un liquido\ntalmente acido da sciogliere persino il metallo."
          violet: "Utilizza i fluidi corporei per riparare la sua mela.\nQuelle dei Flapple reduci da mille battaglie\nassumono una colorazione che ricorda l’argilla."
        de:
          scarlet: "Erst sucht es herumflatternd nach gegnerischen\nSchwachstellen, um dann mit einer säurehaltigen\nFlüssigkeit zu spucken, die selbst Metall schmilzt."
          violet: "Schäden an seinem Apfel repariert es mit seiner\nKörperflüssigkeit. Die Äpfel von kampferprobten\nDrapfel sind lehmfarben."
        es:
          scarlet: "Revolotea hasta encontrar una brecha en la\ndefensa del rival, que aprovecha para atacar con\nun fluido tan ácido que puede disolver metales."
          violet: "Usa fluidos corporales para reparar su manzana.\nLas de los más fuertes y curtidos en combate se\nvuelven de un color terroso."
        ko:
          scarlet: "비틀비틀 날면서 틈을 노린 뒤\n금속조차 녹여 버리는\n강산성의 액체를 뱉어서 공격한다."
          violet: "체액으로 사과를 보수한다.\n많은 싸움을 거듭한 강자의 사과는\n전체적으로 찰흙빛이다."
        zh_simp:
          scarlet: "在空中摇摇晃晃地飞行，\n同时找准时机吐出连金属\n都能溶化的强酸性液体来展开攻击。"
          violet: "会用体液修补苹果。\n身经百战的强者的苹果\n会整体呈现出黏土色。"
        zh_trad:
          scarlet: "會搖搖晃晃地飛在空中尋找\n可乘之機，然後吐出連金屬都能\n溶化的強酸性液體來攻擊目標。"
          violet: "會用體液修補蘋果。\n身經百戰的強者，\n蘋果會佈滿黏土色。"
