      hidden_ability: competitive
      descriptions:
        jp_kana:
          scarlet: "￹仲間￺なかま￻を　￹作￺つく￻らずに　￹暮￺く￻らす。\n￹翼￺つばさ￻の　￹強烈￺きょうれつ￻な　￹一撃￺いちげき￻は\n￹大木￺たいぼく￻を　￹真￺ま￻っ￹二￺ぷた￻つに　へし￹折￺お￻る。"
          violet: "どの　ポッタイシも　￹自分￺じぶん￻が\n￹一番￺いちばん￻　￹偉￺えら￻いと　￹考￺かんが￻えるため\n￹群￺む￻れを　￹作￺つく￻ることは　￹不可能￺ふかのう￻だ。"
        jp_kanji:
          scarlet: "￹仲間￺なかま￻を　￹作￺つく￻らずに　￹暮￺く￻らす。\n￹翼￺つばさ￻の　￹強烈￺きょうれつ￻な　￹一撃￺いちげき￻は\n￹大木￺たいぼく￻を　￹真￺ま￻っ￹二￺ぷた￻つに　へし￹折￺お￻る。"
          violet: "どの　ポッタイシも　￹自分￺じぶん￻が\n￹一番￺いちばん￻　￹偉￺えら￻いと　￹考￺かんが￻えるため\n￹群￺む￻れを　￹作￺つく￻ることは　￹不可能￺ふかのう￻だ。"
        en:
          scarlet: "It lives a solitary life. Its wings deliver wicked\nblows that can snap even the thickest of trees\nin half with a single hit."
          violet: "Because every Prinplup considers itself to be the\nmost important, they can never form a group."
        fr:
          scarlet: "C’est un Pokémon solitaire. D’un seul coup\nde ses puissantes ailes, il peut fendre en deux\nles arbres les plus imposants."
          violet: "Tous les Prinplouf se croient supérieurs à leurs\nsemblables. Il leur est donc impossible de vivre\nen groupe."
        it:
          scarlet: "Vive senza riunirsi in gruppi. Con i suoi poderosi\ncolpi d’ala, può spaccare in due degli alberi\nenormi."
          violet: "Poiché ogni esemplare si considera\nil più importante, i Prinplup non riescono\nmai a creare un gruppo."
        de:
          scarlet: "Pliprin sind Einzelgänger. Mit ihren Flügeln teilen\nsie kräftige Schläge aus, die selbst große Bäume\nentzweihauen."
          violet: "Jedes Pliprin geht davon aus, dass es das\nwichtigste ist. Daher können sie keine Gruppen\nbilden."
        es:
          scarlet: "Vive por su cuenta, alejado de sus congéneres.\nPuede partir en dos un árbol gigantesco de un\nfuerte aletazo."
          violet: "Como cada uno se considera el más importante,\nles resulta imposible formar grupos."
        ko:
          scarlet: "무리를 만들지 않고 생활한다.\n날개의 강렬한 일격은\n큰 나무를 두 동강으로 꺾는다."
          violet: "팽태자들은 모두 자신이 제일\n훌륭하다고 생각하기 때문에\n무리를 만드는 것은 불가능하다."
        zh_simp:
          scarlet: "不结交伙伴，独自生活。\n翅膀的强烈一击能把大树一劈两半。"
          violet: "每一只波皇子都认为\n自己是最了不起的，\n因此它们无法形成群体。"
        zh_trad:
          scarlet: "從不結交夥伴，獨自生活。\n用翅膀發出的強烈一擊\n能把大樹劈成兩半。"
          violet: "所有的波皇子都認為\n自己是最了不起的，\n所以不可能組成群體。"
