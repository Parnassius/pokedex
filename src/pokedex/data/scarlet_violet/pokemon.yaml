        jp_kana:
          scarlet: "モンスターボールの　￹開発者￺かいはつしゃ￻は\nタマゲタケが　￹好￺す￻きだったという\n￹説￺せつ￻が　あるが　￹真偽￺しんぎ￻は　￹不明￺ふめい￻。"
          violet: "￹湿￺しめ￻った　￹土地￺とち￻を　￹好￺この￻んでいる。\n￹毒￺どく￻の　￹胞子￺ほうし￻を　￹吹￺ふ￻き￹出￺だ￻して\n￹近￺ちか￻づく　￹敵￺てき￻を　￹追￺お￻い￹払￺はら￻う。"
        jp_kanji:
          scarlet: "モンスターボールの　￹開発者￺かいはつしゃ￻は\nタマゲタケが　￹好￺す￻きだったという\n￹説￺せつ￻が　あるが　￹真偽￺しんぎ￻は　￹不明￺ふめい￻。"
          violet: "￹湿￺しめ￻った　￹土地￺とち￻を　￹好￺この￻んでいる。\n￹毒￺どく￻の　￹胞子￺ほうし￻を　￹吹￺ふ￻き￹出￺だ￻して\n￹近￺ちか￻づく　￹敵￺てき￻を　￹追￺お￻い￹払￺はら￻う。"
        en:
          scarlet: "There is a theory that the developer of the\nmodern-day Poké Ball really liked Foongus,\nbut this has not been confirmed."
          violet: "This Pokémon prefers damp places. It spurts out\npoison spores to repel approaching enemies."
        fr:
          scarlet: "Une théorie dit que l’inventeur de la Poké Ball\nse serait inspiré des Trompignon, qu’il aimait\nbeaucoup. Elle n’a cependant pas été confirmée."
          violet: "Ce Pokémon préfère les zones humides.\nIl libère des spores toxiques afin de repousser\nles ennemis qui s’approcheraient un peu trop."
        it:
          scarlet: "C’è chi teorizza che questo Pokémon piacesse\nmolto all’inventore delle Poké Ball. Nessuno però\nsa se sia vero o no."
          violet: "Preferisce i terreni umidi. Spruzza spore velenose\nper allontanare i nemici che si avvicinano."
        de:
          scarlet: "Einer Theorie zufolge fand der Entwickler des\nPokéballs Gefallen an Tarnpignon. Jedoch konnte\ndies bisher nicht bestätigt werden."
          violet: "Tarnpignon hält sich gerne an feuchten Orten auf.\nHerannahende Feinde verscheucht es, indem es\nsie mit Giftsporen besprüht."
        es:
          scarlet: "Ciertas teorías, cuya veracidad no ha podido\nconstatarse, afirman que quien desarrolló las\nPoké Balls admiraba con fervor a este Pokémon."
          violet: "Siente predilección por las zonas húmedas.\nEsparce esporas venenosas para ahuyentar\na los enemigos que se le acercan."
        ko:
          scarlet: "몬스터볼의 개발자가\n깜놀버슬을 좋아했다는\n설이 있지만, 진위는 불명하다."
          violet: "습한 땅을 좋아한다.\n독 포자를 뿜어내서\n다가오는 적을 쫓아낸다."
        zh_simp:
          scarlet: "据说开发精灵球的人\n很喜欢哎呀球菇，\n但不知此说法的真伪。"
          violet: "喜欢潮湿的土地。\n会喷出有毒的孢子\n驱散靠近自己的敌人。"
        zh_trad:
          scarlet: "據說開發精靈球的人\n很喜歡哎呀球菇，\n但不知是真是假。"
          violet: "喜歡潮濕的土地。\n會噴出有毒的孢子\n驅離靠近自己的敵人。"
