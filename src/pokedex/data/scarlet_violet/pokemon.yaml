      descriptions:
        jp_kana:
          scarlet: "￹尾￺お￻びれを　￹回転￺かいてん￻させ　￹勢￺いきお￻いよく\n￹跳￺と￻びあがり　￹水面￺すいめん￻　￹近￺ちか￻くを　￹飛￺と￻ぶ\nキャモメに　￹激￺はげ￻しく　￹食￺く￻らいつく。"
          violet: "１００ノットを　￹超￺こ￻える　￹速度￺そくど￻で\n￹泳￺およ￻ぐ。　ナミイルカの　￹群￺む￻れと\nエサを　めぐり　￹苛烈￺かれつ￻に　￹争￺あらそ￻う。"
        jp_kanji:
          scarlet: "￹尾￺お￻びれを　￹回転￺かいてん￻させ　￹勢￺いきお￻いよく\n￹跳￺と￻びあがり　￹水面￺すいめん￻　￹近￺ちか￻くを　￹飛￺と￻ぶ\nキャモメに　￹激￺はげ￻しく　￹食￺く￻らいつく。"
          violet: "１００ノットを　￹超￺こ￻える　￹速度￺そくど￻で\n￹泳￺およ￻ぐ。　ナミイルカの　￹群￺む￻れと\nエサを　めぐり　￹苛烈￺かれつ￻に　￹争￺あらそ￻う。"
        en:
          scarlet: "It spins its tail fins to leap from the water, then\nviciously bites down on Wingull flying close to\nthe water’s surface."
          violet: "It swims at speeds of over 100 knots and\nbattles fiercely with pods of Finizen over prey."
        fr:
          scarlet: "Il peut faire tourner sa nageoire caudale afin\nde sauter vigoureusement hors de l’eau. Il arrive\nainsi à dévorer les Goélise proches de la surface."
          violet: "Ils nagent à une vitesse de plus de 100 nœuds.\nLes Hastacuda et les bancs de Dofin\nse disputent férocement les mêmes proies."
        it:
          scarlet: "Facendo ruotare la pinna caudale, salta con\nimpeto fuori dall’acqua per divorare senza pietà\ni Wingull che volano più vicini alla superficie."
          violet: "Nuota a una velocità di oltre 100 nodi.\nSi contende ferocemente le prede con\ni banchi di Finizen."
        de:
          scarlet: "Durch Rotation der Schwanzflosse schnellt es mit\nSchwung aus dem Wasser und schnappt nach\nWingull, die dicht über der Oberfläche fliegen."
          violet: "Es schwimmt mit einer Geschwindigkeit von über\n100 Knoten und streitet sich mit Gruppen von\nNormifin erbittert um Futter."
        es:
          scarlet: "Hace girar la aleta caudal para impulsarse fuera\ndel agua y devorar con violencia a los Wingull\nque anden volando cerca de la superficie."
          violet: "Puede nadar a más de 100 nudos. Entabla\nencarnizadas batallas contra manadas de\nFinizen por la comida."
        ko:
          scarlet: "꼬리지느러미를 회전시켜서 힘차게 뛰어올라\n수면 가까이 나는 갈모매를\n거칠게 물어 버린다."
          violet: "100노트를 넘는 속도로 헤엄친다.\n맨돌핀 무리와\n먹이를 두고 치열하게 싸운다."
        zh_simp:
          scarlet: "旋转尾鳍猛地跳起，\n然后以强劲的力道咬住\n飞在水面附近的长翅鸥。"
          violet: "以超过１００节的速度游泳。\n会为了争夺食物和波普海豚的\n群体展开激烈的斗争。"
        zh_trad:
          scarlet: "會旋轉尾鰭猛然跳起，\n然後以強勁的力道咬住\n飛在水面附近的長翅鷗。"
          violet: "以超過１００節的速度游泳。\n會為了食物和波普海豚的\n群體展開激烈的爭鬥。"
