      descriptions:
        jp_kana:
          scarlet: "こだわりぬいた　カップや　￹紅茶￺こうちゃ￻を\n￹用意￺ようい￻し　ヤバチャが　￹取￺と￻り￹憑￺つ￻くのを\n￹待￺ま￻ち￹続￺つづ￻ける　マニアも　いるのだ。"
          violet: "アンティークの　ティーカップに\n￹棲￺す￻みついた　￹姿￺すがた￻。　￹貴重￺きちょう￻だが\nヤバチャの　￹不味￺まず￻さは　￹変￺か￻わらない。"
        jp_kanji:
          scarlet: "こだわりぬいた　カップや　￹紅茶￺こうちゃ￻を\n￹用意￺ようい￻し　ヤバチャが　￹取￺と￻り￹憑￺つ￻くのを\n￹待￺ま￻ち￹続￺つづ￻ける　マニアも　いるのだ。"
          violet: "アンティークの　ティーカップに\n￹棲￺す￻みついた　￹姿￺すがた￻。　￹貴重￺きちょう￻だが\nヤバチャの　￹不味￺まず￻さは　￹変￺か￻わらない。"
        en:
          scarlet: "Some fanatics will go to great pains to prepare\nthe perfect tea and teacup, eagerly waiting for\na Sinistea to come and possess their selections."
          violet: "This Sinistea lives in an antique teacup.\nAs valuable as this Pokémon is, its awful taste\nremains unchanged."
        fr:
          scarlet: "Des adeptes de Théffroi préparent une tasse et\ndu thé noir choisis avec grand soin et attendent\nqu’il en prenne possession."
          violet: "Cette forme a élu domicile dans une tasse de thé\nancienne. Elle a de la valeur, mais le goût de\nce Pokémon n’en est pas moins infect."
        it:
          scarlet: "Alcuni fanatici di questo Pokémon preparano\ndelle tazze e del tè con impeccabile cura e\naspettano che un Sinistea se ne impossessi."
          violet: "Assume questa forma vivendo in una tazza da tè\nd’antiquariato. È un Pokémon molto prezioso,\nma ha comunque un saporaccio."
        de:
          scarlet: "Manche Enthusiasten stellen eine erlesene Tasse\nund sorgfältig zubereiteten Tee bereit, in der\nHoffnung, dass Fatalitee davon Besitz ergreift."
          violet: "Diese Form von Fatalitee lebt in einer antiken\nTasse. Doch egal, wie kostbar das Pokémon auch\nsein mag, sein Geschmack bleibt scheußlich."
        es:
          scarlet: "Fanáticos de este Pokémon ponen gran esmero\nen la preparación del té y la selección de la taza\ncon la esperanza de que un Sinistea los posea."
          violet: "Esta forma de Sinistea reside en una taza que se\nconsidera una antigüedad. Por mucho valor que\nposea, el sabor del té sigue siendo horrible."
        ko:
          scarlet: "엄선하고 엄선한 찻잔과 홍차를\n준비해 놓고 데인차가 깃들기를\n하염없이 기다리는 마니아도 있다."
          violet: "앤티크한 찻잔에 깃든 모습.\n귀중한 찻잔이지만\n데인차가 맛없는 것은 변함없다."
        zh_simp:
          scarlet: "有些爱好者会准备好\n极为讲究的茶杯和红茶，\n然后一直等待来悲茶来附身。"
          violet: "住在古董茶杯里的样子。\n虽然十分贵重，但来悲茶\n还是一如既往地不好喝。"
        zh_trad:
          scarlet: "有一些愛好者會預備好\n極為講究的茶杯和紅茶，\n然後一直等著來悲茶來附身。"
          violet: "住在古董茶杯裡的樣子。\n雖然十分貴重，但來悲茶\n並沒有因此變得比較好喝。"
