          scarlet: "￹本体￺ほんたい￻の　￹頭￺あたま￻のみが　￹脳￺のう￻を　￹持￺も￻っている。\n￹知性￺ちせい￻は　￹高￺たか￻いが\n￹破壊￺はかい￻のことしか　￹考￺かんが￻えていない。"
          violet: "￹昔￺むかし￻　￹人￺ひと￻が　￹邪悪￺じゃあく￻　そのものと\n￹忌￺い￻み￹嫌￺きら￻い　￹攻撃￺こうげき￻し￹続￺つづ￻けたため\n￹凶暴￺きょうぼう￻になったと　￹言￺い￻われている。"
        jp_kanji:
          scarlet: "￹本体￺ほんたい￻の　￹頭￺あたま￻のみが　￹脳￺のう￻を　￹持￺も￻っている。\n￹知性￺ちせい￻は　￹高￺たか￻いが\n￹破壊￺はかい￻のことしか　￹考￺かんが￻えていない。"
          violet: "￹昔￺むかし￻　￹人￺ひと￻が　￹邪悪￺じゃあく￻　そのものと\n￹忌￺い￻み￹嫌￺きら￻い　￹攻撃￺こうげき￻し￹続￺つづ￻けたため\n￹凶暴￺きょうぼう￻になったと　￹言￺い￻われている。"
        en:
          scarlet: "Only the central head has a brain. It is very\nintelligent, but it thinks only of destruction."
          violet: "It’s said that Hydreigon grew ferocious because\npeople in times long past loathed it, considering\nit to be evil incarnate and attacking it relentlessly."
        fr:
          scarlet: "Seule sa tête centrale est dotée d’un cerveau.\nCe Pokémon est très intelligent, mais il ne pense\nqu’à tout détruire."
          violet: "Il serait devenu brutal à cause des êtres humains,\nqui le considéraient jadis comme le mal incarné\net s’en prenaient sans cesse à lui."
        it:
          scarlet: "Solo la testa centrale ha un cervello.\nÈ molto intelligente, ma non pensa ad altro\nche a distruggere."
          violet: "Pare che sia diventato così feroce per i continui\nattacchi subiti nell’antichità da parte degli esseri\numani, che lo credevano l’incarnazione del male."
        de:
          scarlet: "Nur der mittlere Kopf hat ein Gehirn. Dieses\nPokémon verfügt zwar über einen hohen Intellekt,\ndenkt aber an nichts anderes als Zerstörung."
          violet: "Man sagt, es sei so gewalttätig geworden, da die\nMenschen es einst als Verkörperung des Bösen\nverabscheuten und es ohne Unterlass angriffen."
        es:
          scarlet: "La cabeza central es la única dotada de cerebro.\nSi bien posee un gran intelecto, la destrucción es\nel único pensamiento que le ocupa."
          violet: "Se dice que su ferocidad se debe a que en el\npasado sufrió el acoso constante de los humanos,\nque lo consideraban la encarnación del mal."
        ko:
          scarlet: "본체의 머리만이 뇌를 가지고 있다.\n지능은 높지만\n파괴하는 일만 생각하고 있다."
          violet: "옛날 사람들이 사악 그 자체라며\n거듭해서 배척하고 공격했기 때문에\n흉포해진 것이라 전해지고 있다."
        zh_simp:
          scarlet: "只有本体上的头才有大脑。\n虽然智力很高，\n但满脑子都只想着搞破坏。"
          violet: "据说以前被视为邪恶的化身，\n不断遭受人们的厌恶与攻击，\n因此性情才会变得凶暴。"
        zh_trad:
          scarlet: "只有本體上的頭才有大腦。\n雖然智力很高，\n但卻滿腦子只想著要破壞。"
          violet: "據說以前被視為邪惡的化身，\n不斷受到人們的厭惡與攻擊，\n所以性情才會變得凶暴。"
