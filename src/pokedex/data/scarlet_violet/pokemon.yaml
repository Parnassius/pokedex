        jp_kanji:
          scarlet: "￹相手￺あいて￻の　￹姿￺すがた￻に　￹化￺ば￻けてみせて\n￹驚￺おどろ￻かせる。　￹無口￺むくち￻な　￹子￺こ￻どもに\n￹化￺ば￻けていることが　￹多￺おお￻いらしい。"
          violet: "￹人￺ひと￻や　ほかの　ポケモンに　￹化￺ば￻ける。\n￹自分￺じぶん￻の　￹正体￺しょうたい￻を　￹隠￺かく￻すことで\n￹危険￺きけん￻から　￹身￺み￻を　￹守￺まも￻っているのだ。"
        en:
          scarlet: "It changes into the forms of others to surprise\nthem. Apparently, it often transforms into a\nsilent child."
          violet: "To protect themselves from danger, they hide\ntheir true identities by transforming into people\nand Pokémon."
        fr:
          scarlet: "Il prend l’apparence des autres afin de les\nsurprendre. On dit qu’il se transforme\nsouvent en petit enfant silencieux."
          violet: "Il peut se transformer en être humain ou en\nd’autres Pokémon. Il se protège du danger\nen dissimulant sa véritable identité."
        it:
          scarlet: "Sorprende gli altri assumendo il loro aspetto.\nPare che si trasformi spesso in un bambino\ntaciturno."
          violet: "Assume le sembianze di un essere umano o\ndi un altro Pokémon per nascondere la sua vera\nidentità e proteggersi così dai pericoli."
        de:
          scarlet: "Es übertölpelt andere, indem es deren Gestalt\nannimmt. Angeblich tarnt es sich oft als\nwortkarges Kind."
          violet: "Es schützt sich vor Gefahren, indem es seine\nwahre Gestalt geheim hält und sich in Menschen\noder andere Pokémon verwandelt."
        es:
          scarlet: "Se transforma en otros para crear desconcierto.\nA menudo, adopta la forma de un niño parco en\npalabras."
          violet: "Se transforma en humanos o en otros Pokémon.\nSe defiende del peligro ocultando su verdadera\napariencia."
        ko:
          scarlet: "상대의 모습으로 둔갑하여\n놀라게 한다. 말수가 적은 아이로\n둔갑해 있을 때가 잦다고 한다."
          violet: "사람이나 다른 포켓몬으로 둔갑한다.\n자신의 정체를 감추어\n위험으로부터 몸을 지키는 것이다."
        zh_simp:
          scarlet: "会幻化成对手的外表\n来使其受到惊吓。似乎经常\n幻化成沉默寡言的小孩。"
          violet: "会幻化成人类或其他宝可梦。\n通过隐藏自己的本来面貌\n来保护自己不受危险侵害。"
        zh_trad:
          scarlet: "會幻化成對手的樣子\n嚇唬對方。似乎經常\n幻化成沉默寡言的小孩。"
          violet: "會化為人類或其他的寶可夢。\n透過隱藏自己原本的面貌，\n保護自己不遇危險。"
