        jp_kana:
          scarlet: "￹暑￺あつ￻い　￹土地￺とち￻では　￹燃￺も￻える　￹体￺からだ￻は\n￹嫌￺いや￻がられるが　￹寒￺さむ￻い　￹土地￺とち￻では\n￹太陽￺たいよう￻の￹化身￺けしん￻　と　￹崇￺あが￻められる。"
          violet: "￹炎￺ほのお￻の　りんぷんを　まき￹散￺ち￻らす。\n￹危険￺きけん￻なのは　￹高熱￺こうねつ￻よりも\nあたりの　￹酸素￺さんそ￻が　なくなること。"
        jp_kanji:
          scarlet: "￹暑￺あつ￻い　￹土地￺とち￻では　￹燃￺も￻える　￹体￺からだ￻は\n￹嫌￺いや￻がられるが　￹寒￺さむ￻い　￹土地￺とち￻では\n￹太陽￺たいよう￻の￹化身￺けしん￻　と　￹崇￺あが￻められる。"
          violet: "￹炎￺ほのお￻の　りんぷんを　まき￹散￺ち￻らす。\n￹危険￺きけん￻なのは　￹高熱￺こうねつ￻よりも\nあたりの　￹酸素￺さんそ￻が　なくなること。"
        en:
          scarlet: "Its burning body causes it to be unpopular in hot\nparts of the world, but in cold ones, Volcarona is\nrevered as an embodiment of the sun."
          violet: "This Pokémon scatters burning scales. Most of the\ndanger of these scales is not in their heat—it’s in\nthe way they rob the surrounding air of oxygen."
        fr:
          scarlet: "Son corps brûlant le rend impopulaire dans les\nrégions chaudes. Toutefois, on le vénère comme\nl’incarnation du soleil dans les régions froides."
          violet: "Il disperse des écailles enflammées. Le danger ne\nvient pas tant de leur chaleur que de la raréfaction\nde l’oxygène qu’elles provoquent aux alentours."
        it:
          scarlet: "Chi vive in regioni calde odia il suo corpo\ninfuocato, ma nelle terre più fredde viene\nvenerato come l’incarnazione stessa del sole."
          violet: "Sparge intorno a sé scaglie infuocate. Più che\nla loro temperatura rovente, il pericolo è che\nnon rimanga più ossigeno nell’aria circostante."
        de:
          scarlet: "In heißen Gebieten ist sein brennender Körper\nunbeliebt, aber in kalten Gegenden wird es als\nVerkörperung der Sonne verehrt."
          violet: "Es verstreut glühenden Flügelstaub. Doch noch\ngefährlicher als dessen Hitze ist der Umstand,\ndass er der Umgebung den Sauerstoff entzieht."
        es:
          scarlet: "El calor que irradia le granjea pocas simpatías en\ntierras cálidas. Por el contrario, en las regiones\nmás frías lo veneran como encarnación del sol."
          violet: "Esparce escamas flamígeras, más peligrosas por\nconsumir todo el oxígeno a su alrededor que por\nel intenso calor que desprenden."
        ko:
          scarlet: "더운 곳에서는 타오르는 몸 때문에\n미움을 받지만, 추운 곳에서는\n태양의 화신이라며 받들어진다."
          violet: "불꽃의 인분을 흩뿌린다.\n이것이 위험한 이유는 고열보다\n주위의 산소가 사라지기 때문이다."
        zh_simp:
          scarlet: "在炎热之地因其燃烧的身体\n而备受嫌弃，但在寒冷之地\n却被信奉为太阳的化身。"
          violet: "会撒出火焰鳞粉。\n最危险的不是高温，\n而是会耗尽周围的氧气。"
        zh_trad:
          scarlet: "燃燒的身體在炎熱之地\n備受嫌棄，但在寒冷之地\n卻被信奉為太陽的化身。"
          violet: "會朝四周灑出火焰鱗粉。\n最危險的不是高溫，\n而是會耗盡周圍的氧氣。"
