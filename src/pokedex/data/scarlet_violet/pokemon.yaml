        jp_kana:
          scarlet: "￹歩￺ある￻いても　￹遅￺おそ￻いので　￹転￺ころ￻がって\n￹移動￺いどう￻。　￹途中￺とちゅう￻に　なにがあっても\n￹気￺き￻にしない。"
          violet: "￹苔￺こけ￻まみれの　￹岩￺いわ￻が　￹大好物￺だいこうぶつ￻。\nボリボリと　￹音￺おと￻を　たてながら\n１￹日￺にち￻　１トン￹以上￺いじょう￻を　￹食￺た￻べる。"
        jp_kanji:
          scarlet: "￹歩￺ある￻いても　￹遅￺おそ￻いので　￹転￺ころ￻がって\n￹移動￺いどう￻。　￹途中￺とちゅう￻に　なにがあっても\n￹気￺き￻にしない。"
          violet: "￹苔￺こけ￻まみれの　￹岩￺いわ￻が　￹大好物￺だいこうぶつ￻。\nボリボリと　￹音￺おと￻を　たてながら\n１￹日￺にち￻　１トン￹以上￺いじょう￻を　￹食￺た￻べる。"
        en:
          scarlet: "A slow walker, it rolls to move. It pays no\nattention to any object that happens to be\nin its path."
          violet: "Moss-covered rocks are Graveler’s favorite\nfood. It consumes over a ton of them a day,\ncrunching loudly while it eats."
        fr:
          scarlet: "Ce Pokémon marche lentement, donc\nil se déplace en roulant. Il ne prête pas\nattention à ce qui se trouve sur sa route."
          violet: "Les cailloux couverts de mousse sont\nsa nourriture préférée. Il les broie bruyamment\net peut en engloutir plus d’une tonne par jour."
        it:
          scarlet: "Lento a camminare, si sposta rotolando.\nNon fa attenzione agli oggetti che trova\nsulla sua strada."
          violet: "Adora mangiare le rocce coperte di muschio.\nOgni giorno ne sgranocchia rumorosamente\npiù di 10 quintali."
        de:
          scarlet: "Da es nur langsam gehen kann, bewegt\nes sich rollend. Es nimmt dabei keine\nRücksicht auf Hindernisse."
          violet: "Mit Moos überzogene Steine sind seine\nabsolute Leibspeise. Es vertilgt täglich laut\nknirschend mindestens eine Tonne davon."
        es:
          scarlet: "Camina muy lentamente, por lo que se\ndesplaza rodando, sin importarle lo que\npueda haber en su camino."
          violet: "Su comida preferida son las rocas cubiertas\nde musgo. Llega a comer más de una tonelada\nal día y causa un gran estruendo al masticar."
        ko:
          scarlet: "걸음이 늦기 때문에 굴러서 이동한다.\n도중에 무슨 일이 있어도\n신경 쓰지 않는다."
          violet: "이끼가 낀 바위를 아주 좋아한다.\n어적어적 소리를 내면서\n1일 1톤 이상을 먹는다."
        zh_simp:
          scarlet: "因为走路很慢，所以\n靠滚来移动。途中遇到\n什么都不会在意。"
          violet: "非常喜欢吃长有苔藓的岩石。\n发着嘎吱嘎吱的声音，\n１天吃１吨以上。"
        zh_trad:
          scarlet: "因為走路也走不快，\n所以會翻滾來移動。\n途中有什麼牠都不在意。"
          violet: "最喜歡的食物是長滿青苔的岩石。\n吃的時候會發出咯吱咯吱的聲音，\n每天會吃１噸以上。"
