          scarlet: "￹体￺からだ￻から　￹放￺はな￻つ　￹良￺よ￻い￹香￺かお￻りが\n￹小麦￺こむぎ￻の　￹成長￺せいちょう￻を　￹助￺たす￻けるため\n￹農村￺のうそん￻で　￹大切￺たいせつ￻にされてきた。"
          violet: "￹皮膚￺ひふ￻の　￹表面￺ひょうめん￻は　￹強￺つよ￻い　￹熱￺ねつ￻を\n￹受￺う￻けると　￹硬￺かた￻くなる　￹性質￺せいしつ￻。\n￹体￺からだ￻は　￹香￺こう￻ばしい　￹匂￺にお￻いがする。"
        jp_kanji:
          scarlet: "￹体￺からだ￻から　￹放￺はな￻つ　￹良￺よ￻い￹香￺かお￻りが\n￹小麦￺こむぎ￻の　￹成長￺せいちょう￻を　￹助￺たす￻けるため\n￹農村￺のうそん￻で　￹大切￺たいせつ￻にされてきた。"
          violet: "￹皮膚￺ひふ￻の　￹表面￺ひょうめん￻は　￹強￺つよ￻い　￹熱￺ねつ￻を\n￹受￺う￻けると　￹硬￺かた￻くなる　￹性質￺せいしつ￻。\n￹体￺からだ￻は　￹香￺こう￻ばしい　￹匂￺にお￻いがする。"
        en:
          scarlet: "The pleasant aroma that emanates from this\nPokémon’s body helps wheat grow, so Dachsbun\nhas been treasured by farming villages."
          violet: "The surface of this Pokémon’s skin hardens\nwhen exposed to intense heat, and its body\nhas an appetizing aroma."
        fr:
          scarlet: "Il est très apprécié depuis longtemps dans\nles villages agricoles, car le délicieux parfum\nqu’il dégage aide à faire croître le blé."
          violet: "La surface de sa peau durcit lorsqu’elle est\nexposée à une forte chaleur. Son corps exhale\nun délicieux parfum."
        it:
          scarlet: "Le comunità agricole lo tengono da tempo\nin gran considerazione, poiché il buon profumo\nche emana favorisce la crescita del grano."
          violet: "La superficie della sua pelle ha la proprietà\ndi indurirsi se esposta ad alte temperature.\nIl suo corpo emana una fragranza deliziosa."
        de:
          scarlet: "Da der wohlige Duft, den sein Körper verströmt,\ndas Wachstum von Weizen begünstigt, schätzt\nman dieses Pokémon in Bauerndörfern sehr."
          violet: "Die Oberfläche seiner Haut erhärtet, wenn sie\nstarker Hitze ausgesetzt wird. Der Körper dieses\nPokémon duftet herrlich."
        es:
          scarlet: "El fragante aroma que despide su cuerpo\nfavorece el crecimiento del trigo, por lo que lo\naprecian mucho en las comunidades agrícolas."
          violet: "La superficie de su piel se endurece cuando se\nexpone a un calor intenso. Su cuerpo desprende\nun fragante aroma."
        ko:
          scarlet: "몸에서 나는 좋은 향기가\n밀의 성장을 돕기 때문에\n농촌에서 소중히 여겨진다."
          violet: "피부 표면은 뜨거운 열을 받으면\n딱딱해지는 성질을 가졌다.\n몸에서 구수한 냄새가 난다."
        zh_simp:
          scarlet: "身体散发出的迷人香气\n有助于小麦的成长，\n因此在农村一直备受重视。"
          violet: "它的皮肤表面拥有遇到\n高温就变硬的性质。\n身体散发着香香的气味。"
        zh_trad:
          scarlet: "身體散發出的迷人香氣能\n有助於小麥的成長，因此\n一直都備受農村人家的珍視。"
          violet: "牠的皮膚的表面擁有著\n遇到高溫就會變硬的性質。\n身體聞起來香噴噴的。"
