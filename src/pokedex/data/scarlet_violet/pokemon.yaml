        speed: 1
      types:
        - fire
      egg_groups:
        - monster
        - dragon
      abilities:
        - blaze
      hidden_ability: solar_power
      descriptions:
        jp_kana:
          scarlet: "￹燃￺も￻える　￹尻尾￺しっぽ￻を　￹振￺ふ￻りまわすと\nまわりの　￹温度￺おんど￻が　どんどん　￹上￺あ￻がって\n￹相手￺あいて￻を　￹苦￺くる￻しめる。"
          violet: "￹燃￺も￻えたぎるような　￹性格￺せいかく￻で　いつも\n￹戦￺たたか￻う　￹相手￺あいて￻を　￹探￺さが￻している。\n￹勝￺か￻たないと　￹血￺ち￻が　￹静￺しず￻まらない。"
        jp_kanji:
          scarlet: "￹燃￺も￻える　￹尻尾￺しっぽ￻を　￹振￺ふ￻りまわすと\nまわりの　￹温度￺おんど￻が　どんどん　￹上￺あ￻がって\n￹相手￺あいて￻を　￹苦￺くる￻しめる。"
          violet: "￹燃￺も￻えたぎるような　￹性格￺せいかく￻で　いつも\n￹戦￺たたか￻う　￹相手￺あいて￻を　￹探￺さが￻している。\n￹勝￺か￻たないと　￹血￺ち￻が　￹静￺しず￻まらない。"
        en:
          scarlet: "When it swings its burning tail, the temperature\naround it rises higher and higher, tormenting its\nopponents."
          violet: "It is very hotheaded by nature, so it constantly\nseeks opponents to battle against. Its aggression\nwill not be quelled if it doesn’t win."
        fr:
          scarlet: "En agitant sa queue enflammée, il peut élever la\ntempérature ambiante de manière exponentielle\net ainsi tourmenter ses adversaires."
          violet: "Ce Pokémon au sang chaud est constamment\nà la recherche d’adversaires. Il ne se calme\nqu’une fois qu’il a gagné."
        it:
          scarlet: "Quando agita la coda infuocata, la temperatura\ncircostante sale sempre di più, causando\ntormento ai suoi nemici."
          violet: "Turbolento di natura, è sempre alla ricerca\ndi avversari. Si placa solo dopo aver vinto."
        de:
          scarlet: "Wenn Glutexo seinen brennenden Schwanz\nschwingt, steigt die Temperatur um es herum\nimmer weiter an und setzt seinen Gegnern zu."
          violet: "Glutexo hat ein hitziges Gemüt und sucht ständig\nnach Gegnern. Es beruhigt sich nur, wenn es\ngewinnt."
        es:
          scarlet: "Al agitar su ardiente cola, eleva poco a poco\nla temperatura a su alrededor para sofocar\na sus rivales."
          violet: "Por naturaleza, se acalora con facilidad: siempre\nestá buscando adversarios. Solo se calma cuando\ngana."
        ko:
          scarlet: "불타는 꼬리를 휘두르면\n주위의 온도가 점점 올라가\n상대를 괴롭게 한다."
          violet: "타오르는 듯한 성격으로\n늘 싸울 상대를 찾는다.\n이겨야만 마음이 가라앉는다."
        zh_simp:
          scarlet: "如果挥舞燃烧着的尾巴，\n就能令周围温度不断上升，\n从而让对手陷入痛苦。"
          violet: "如烈火般的性格让它一直\n寻找对战的对手。在打赢\n之前沸腾的热血都不会平息。"
        zh_trad:
          scarlet: "當揮動燃燒著的尾巴時，\n周圍的溫度會不斷上升，\n讓對手陷入痛苦。"
          violet: "性情如烈火，無時無刻\n都在尋找對戰的對手。\n得要打贏才會冷靜下來。"
