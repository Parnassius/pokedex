      hidden_ability: water_absorb
      descriptions:
        jp_kana:
          scarlet: "￹砂漠￺さばく￻の　￹旅人￺たびびと￻の　￹後￺うし￻ろを\n￹集団￺しゅうだん￻で　つきまとい　￹疲￺つか￻れて\n￹動￺うご￻けなくなるのを　￹待￺ま￻つのだ。"
          violet: "￹砂漠￺さばく￻に　￹生息￺せいそく￻。　￹夜￺よる￻になると\n￹動￺うご￻きだし　￹砂漠￺さばく￻の　￹暑￺あつ￻さで\n￹疲￺つか￻れ￹果￺は￻てた　￹獲物￺えもの￻を　￹捕￺と￻らえる。"
        jp_kanji:
          scarlet: "￹砂漠￺さばく￻の　￹旅人￺たびびと￻の　￹後￺うし￻ろを\n￹集団￺しゅうだん￻で　つきまとい　￹疲￺つか￻れて\n￹動￺うご￻けなくなるのを　￹待￺ま￻つのだ。"
          violet: "￹砂漠￺さばく￻に　￹生息￺せいそく￻。　￹夜￺よる￻になると\n￹動￺うご￻きだし　￹砂漠￺さばく￻の　￹暑￺あつ￻さで\n￹疲￺つか￻れ￹果￺は￻てた　￹獲物￺えもの￻を　￹捕￺と￻らえる。"
        en:
          scarlet: "Packs of them follow travelers through the desert\nuntil the travelers can no longer move."
          violet: "It lives in deserts. It becomes active at night\nwhen it hunts for prey exhausted from the\ndesert’s heat."
        fr:
          scarlet: "Les Cacturne traquent en groupe les êtres qui\nvoyagent dans le désert, guettant les signes\nde fatigue avant de frapper."
          violet: "Ce Pokémon vit dans les déserts. La nuit, il part\nchasser des proies épuisées par la chaleur."
        it:
          scarlet: "Gruppi di Cacturne pedinano i viandanti\nnel deserto, aspettando che perdano i sensi\nin preda alla stanchezza."
          violet: "Vive nei deserti. È attivo durante la notte,\nquando va a caccia delle prede stremate\ndalla calura del deserto."
        de:
          scarlet: "Gruppen von Noktuska folgen Reisenden in der\nWüste und warten, bis diese vor Erschöpfung\nbewegungsunfähig werden."
          violet: "Es lebt in der Wüste. Nachts wird es aktiv und\njagt nach Beute, die von der Hitze, die tagsüber\nherrscht, erschöpft ist."
        es:
          scarlet: "Persiguen en grupo a los viajeros del desierto y\nlos acechan hasta que el cansancio los agote."
          violet: "Su medio es el desierto. Por la noche, se vuelve\nactivo y sale a cazar presas agotadas por el calor."
        ko:
          scarlet: "사막의 여행자 뒤를\n집단으로 쫓아\n지쳐 움직이지 못하기를 기다린다."
          violet: "사막에 서식한다. 밤이 되면\n움직이기 시작하여 사막의 더위에\n지쳐 버린 먹이를 사냥한다."
        zh_simp:
          scarlet: "会成群结队跟在沙漠旅行者的身后，\n并一直等到他累得无法动弹为止。"
          violet: "栖息在沙漠。到了夜晚就会\n开始活动，去捕捉因受不了\n沙漠的炎热而精疲力尽的猎物。"
        zh_trad:
          scarlet: "會成群跟在沙漠中的\n旅人後方，等待對方\n因疲累而變得無法動彈。"
          violet: "棲息在沙漠。一到晚上就會\n開始活動，去捕捉因受不了\n沙漠的炎熱而精疲力盡的獵物。"
