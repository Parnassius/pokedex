          scarlet: "マホイップが　デコレーションした\nスイーツは　￹深￺ふか￻みのある　あまさで\n￹食￺た￻べた　みんなを　￹幸￺しあわ￻せにする。"
          violet: "￹大事￺だいじ￻にされた　マホイップが　だす\nクリームは　￹絶品￺ぜっぴん￻のため　￹優￺やさ￻しく\n￹育￺そだ￻てる　トレーナーばかりだ。"
        jp_kanji:
          scarlet: "マホイップが　デコレーションした\nスイーツは　￹深￺ふか￻みのある　あまさで\n￹食￺た￻べた　みんなを　￹幸￺しあわ￻せにする。"
          violet: "￹大事￺だいじ￻にされた　マホイップが　だす\nクリームは　￹絶品￺ぜっぴん￻のため　￹優￺やさ￻しく\n￹育￺そだ￻てる　トレーナーばかりだ。"
        en:
          scarlet: "Desserts that Alcremie have decorated with\ntheir cream have a rich, sweet flavor and bring\nhappiness to all who eat them."
          violet: "Alcremie that have been cherished produce\nexquisite cream, so Trainers always raise them\nlovingly."
        fr:
          scarlet: "Les desserts nappés par Charmilly ont un goût\nsucré si intense qu’ils rendent heureuses toutes\nles personnes qui les mangent."
          violet: "Les Charmilly produisent une crème exquise\nlorsqu’ils sont choyés. C’est pourquoi ils sont\nélevés avec beaucoup de douceur."
        it:
          scarlet: "I dolci decorati da un Alcremie, con la loro\nprofonda dolcezza, rendono felici tutti quelli\nche li mangiano."
          violet: "La panna prodotta da un Alcremie trattato con\nriguardo è una vera prelibatezza, quindi tutti\ngli Allenatori sono amorevoli con loro."
        de:
          scarlet: "Von Pokusan verzierte Desserts haben solch eine\nvollmundige Süße, dass jeder glücklich wird,\nder davon kostet."
          violet: "Pokusan, die gut behandelt werden, produzieren\nbesonders leckere Sahne. Trainer kümmern sich\ndaher immer sehr liebevoll um diese Pokémon."
        es:
          scarlet: "Los dulces decorados por Alcremie hacen feliz\na todo aquel que los ingiere gracias a la suma\ndulzura que los caracteriza."
          violet: "La nata que producen los Alcremie tratados con\ncariño es un manjar tan exquisito que todos sus\nEntrenadores los colman de atenciones."
        ko:
          scarlet: "마휘핑이 데코레이션한 디저트는\n깊이 있는 달콤함을 자랑하며\n먹은 사람을 행복하게 만든다."
          violet: "정성껏 보살핌을 받은\n마휘핑이 만든 크림은 맛이 일품이라\n다정하게 키우는 트레이너들이 많다."
        zh_simp:
          scarlet: "霜奶仙装饰过的甜点\n甜味浓郁，不论是谁\n吃了之后都能变得幸福。"
          violet: "备受照料的霜奶仙\n产出的鲜奶油可谓极品，\n因此训练家都会温柔地培育它。"
        zh_trad:
          scarlet: "由霜奶仙裝飾的甜點\n帶有濃郁豐厚的甜味，\n任誰吃下都會感到幸福。"
          violet: "備受疼愛的霜奶仙\n做出的鮮奶油美味至極，\n令訓練家都會溫柔地培育牠。"
    alcremie_ruby_cream:
