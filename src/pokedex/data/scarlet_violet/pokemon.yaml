      descriptions:
        jp_kana:
          scarlet: "￹首￺くび￻に　ついた　￹毒素￺どくそ￻の　￹鎖￺くさり￻で\n￹全身￺ぜんしん￻の　￹筋肉￺きんにく￻が　￹刺激￺しげき￻され\nたくましい　￹体￺からだ￻に　￹変貌￺へんぼう￻した。"
          violet: "すぐ　￹頭￺あたま￻に　￹血￺ち￻が　￹上￺のぼ￻ってしまう\n￹荒￺あら￻くれもの。　￹首￺くび￻の　￹鎖￺くさり￻を\n￹振￺ふ￻り￹回￺まわ￻し　なんでも　￹叩￺たた￻き￹潰￺つぶ￻す。"
        jp_kanji:
          scarlet: "￹首￺くび￻に　ついた　￹毒素￺どくそ￻の　￹鎖￺くさり￻で\n￹全身￺ぜんしん￻の　￹筋肉￺きんにく￻が　￹刺激￺しげき￻され\nたくましい　￹体￺からだ￻に　￹変貌￺へんぼう￻した。"
          violet: "すぐ　￹頭￺あたま￻に　￹血￺ち￻が　￹上￺のぼ￻ってしまう\n￹荒￺あら￻くれもの。　￹首￺くび￻の　￹鎖￺くさり￻を\n￹振￺ふ￻り￹回￺まわ￻し　なんでも　￹叩￺たた￻き￹潰￺つぶ￻す。"
        en:
          scarlet: "After all its muscles were stimulated by\nthe toxic chain around its neck, Okidogi\ntransformed and gained a powerful physique."
          violet: "Okidogi is a ruffian with a short temper.\nIt can pulverize anything by swinging\naround the chain on its neck."
        fr:
          scarlet: "Les toxines de la chaîne empoisonnée\nautour de son cou ont stimulé tous ses\nmuscles et son corps est devenu massif."
          violet: "Ce Pokémon violent a le sang qui lui monte\nfacilement à la tête. Il détruit tout sur son passage\nen faisant tourner la chaîne autour de son cou."
        it:
          scarlet: "Le tossine della catena che porta al collo ne\nhanno stimolato i muscoli, rendendo poderoso\nil suo fisico."
          violet: "Un Pokémon rissoso a cui va subito il sangue\nalla testa. Distrugge qualunque cosa facendo\nroteare la catena che porta al collo."
        de:
          scarlet: "Die Giftstoffe aus der Kette um seinen Hals\nhaben all seine Muskeln stimuliert und ihm\neinen kräftigen Körper verliehen."
          violet: "Diesem ungehobelten Pokémon steigt das\nBlut schnell zu Kopf. Es schwingt die Kette\nan seinem Hals, um alles zu zerstören."
        es:
          scarlet: "Las toxinas de la cadena que lleva al cuello\nproducen una estimulación muscular que le\nha conferido un cuerpo de lo más robusto."
          violet: "Un Pokémon violento al que se le sube la sangre\na la cabeza enseguida. Hace girar en círculos la\ncadena que lleva al cuello para golpearlo todo."
        ko:
          scarlet: "목에 달린 독소로 된 사슬에 의해\n온몸의 근육이 자극을 받아\n듬직한 체격으로 변했다."
          violet: "쉽게 흥분해 버리는 난폭한 녀석.\n목에 달린 사슬을 휘두르며\n닥치는 대로 때려 부순다."
        zh_simp:
          scarlet: "脖子上的毒素锁链\n刺激了全身的肌肉，\n让身体变得更为强壮。"
          violet: "很容易失去冷静的粗暴家伙。\n会甩动脖子上的锁链击碎一切。"
        zh_trad:
          scarlet: "脖子上的毒素鎖鏈\n刺激了全身的肌肉，\n使牠的身體變得壯碩。"
          violet: "動不動就會怒火沖天的\n粗暴傢伙。會揮甩脖子的鎖鏈\n一股腦兒地擊碎東西。"
