      descriptions:
        jp_kana:
          scarlet: "￹警戒心￺けいかいしん￻が　￹強￺つよ￻い　ポケモン。\nしなやかに　￹動￺うご￻く　￹尻尾￺しっぽ￻は\n￹筋肉質￺きんにくしつ￻で　￹触￺さわ￻ると　￹硬￺かた￻い。"
          violet: "￹敵￺てき￻に　￹遭遇￺そうぐう￻すると　￹尻尾￺しっぽ￻で\n￹立￺た￻ち￹上￺あ￻がり　いつもより　￹体￺からだ￻を\n￹大￺おお￻きく　みせて　￹威嚇￺いかく￻する。"
        jp_kanji:
          scarlet: "￹警戒心￺けいかいしん￻が　￹強￺つよ￻い　ポケモン。\nしなやかに　￹動￺うご￻く　￹尻尾￺しっぽ￻は\n￹筋肉質￺きんにくしつ￻で　￹触￺さわ￻ると　￹硬￺かた￻い。"
          violet: "￹敵￺てき￻に　￹遭遇￺そうぐう￻すると　￹尻尾￺しっぽ￻で\n￹立￺た￻ち￹上￺あ￻がり　いつもより　￹体￺からだ￻を\n￹大￺おお￻きく　みせて　￹威嚇￺いかく￻する。"
        en:
          scarlet: "This Pokémon is extremely cautious. Its supple\ntail is well muscled and firm to the touch."
          violet: "If it encounters a foe, it will stand up on its tail,\nmaking itself look bigger than usual to intimidate\nthem."
        fr:
          scarlet: "Ce Pokémon est très prudent de nature.\nSa queue souple bouge avec élégance.\nElle est aussi très musclée et dure au toucher."
          violet: "Quand il croise un ennemi, il tente de l’intimider\nen se dressant sur sa queue pour paraître plus\ngrand qu’il ne l’est en réalité."
        it:
          scarlet: "Un Pokémon sempre all’erta. L’agile coda\nè muscolosa e dura al tatto."
          violet: "Quando s’imbatte in un nemico, cerca\ndi intimidirlo sollevandosi sulla coda\nper apparire più grande."
        de:
          scarlet: "Der Schweif dieses überaus vorsichtigen Pokémon\nbewegt sich geschmeidig. Da er sehr muskulös ist,\nfühlt er sich bei Berührung hart an."
          violet: "Trifft es auf Feinde, stellt es sich auf seinen\nSchweif, um größer zu erscheinen und sie so\neinzuschüchtern."
        es:
          scarlet: "Un Pokémon muy precavido. Su cola se mueve\ngrácilmente, pero al ser tan musculosa resulta\ndura al tacto."
          violet: "Cuando se encuentra con un rival, se yergue\nsobre la cola para aparentar un mayor tamaño\ne intimidarlo."
        ko:
          scarlet: "경계심이 강한 포켓몬이다.\n유연하게 움직이는 꼬리는\n근육질이라 만져 보면 단단하다."
          violet: "적과 조우하면 꼬리로 서서\n평소보다 몸집을 더\n커 보이게 하며 위협한다."
        zh_simp:
          scarlet: "警戒心很强的宝可梦。\n柔韧摆动的尾巴肌肉发达，\n摸上去很硬。"
          violet: "遭遇敌人时，会用尾巴站立，\n让身体显得比平时更大，\n并以此来威吓对手。"
        zh_trad:
          scarlet: "警戒心強的寶可夢。\n能夠柔韌擺動的尾巴\n肌肉發達，摸起來很硬。"
          violet: "遇到敵人時會用尾巴站立，\n讓自己的身體看起來比\n平時更大，藉此威嚇對手。"
