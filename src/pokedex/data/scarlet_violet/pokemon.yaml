          scarlet: "￹長￺なが￻くて　ふさふさの　￹尻尾￺しっぽ￻は\n￹長生￺ながい￻きの　シンボル。\nとくに　お￹年寄￺としよ￻りに　￹人気￺にんき￻がある。"
          violet: "しばしば　￹水中￺すいちゅう￻に　￹隠￺かく￻れ\n￹獲物￺えもの￻を　￹狙￺ねら￻う。　￹高速￺こうそく￻で　￹泳￺およ￻ぐとき\n￹耳￺みみ￻で　バランスをとる。"
        jp_kanji:
          scarlet: "￹長￺なが￻くて　ふさふさの　￹尻尾￺しっぽ￻は\n￹長生￺ながい￻きの　シンボル。\nとくに　お￹年寄￺としよ￻りに　￹人気￺にんき￻がある。"
          violet: "しばしば　￹水中￺すいちゅう￻に　￹隠￺かく￻れ\n￹獲物￺えもの￻を　￹狙￺ねら￻う。　￹高速￺こうそく￻で　￹泳￺およ￻ぐとき\n￹耳￺みみ￻で　バランスをとる。"
        en:
          scarlet: "Wartortle’s long, furry tail is a symbol of\nlongevity, so this Pokémon is quite popular\namong older people."
          violet: "It often hides in water to stalk unwary prey.\nWhile swimming quickly, it moves its ears to\nmaintain balance."
        fr:
          scarlet: "Sa longue queue touffue est un symbole\nde longévité. Les personnes âgées apprécient\ndonc particulièrement ce Pokémon."
          violet: "Il se cache souvent dans l’eau pour guetter\nses proies. Ses oreilles lui permettent de rester\nstable quand il nage à grande vitesse."
        it:
          scarlet: "La coda lunga e folta è simbolo di longevità.\nÈ un Pokémon particolarmente popolare\ntra le persone anziane."
          violet: "Spesso si nasconde in acqua per cacciare\nle prede. Quando nuota ad alta velocità si\nbilancia con le orecchie."
        de:
          scarlet: "Sein langer und buschiger Schweif zeugt von\nLanglebigkeit. Es ist besonders bei älteren\nMenschen beliebt."
          violet: "Dieses Pokémon lauert oft im Wasser auf Beute.\nBeim schnellen Schwimmen hält es mit seinen\nOhren das Gleichgewicht."
        es:
          scarlet: "Tiene una cola larga y peluda que simboliza la\nlongevidad y lo hace popular entre los mayores."
          violet: "Suele ocultarse en el agua para cazar a sus\npresas. Al nadar rápidamente, mueve las orejas\npara estabilizarse."
        ko:
          scarlet: "길고 탐스러운 꼬리는\n장수의 상징이다.\n노인층에게 특히 인기가 많다."
          violet: "종종 물속에 숨어서 먹잇감을 노린다.\n고속으로 헤엄칠 때는\n귀로 균형을 잡는다."
        zh_simp:
          scarlet: "长而蓬松的尾巴\n是长寿的象征，\n深受长者的喜爱。"
          violet: "经常潜伏在水中伺机\n袭击猎物。高速游泳时\n会用耳朵来保持平衡。"
        zh_trad:
          scarlet: "蓬蓬鬆鬆的長尾巴\n被視為是長壽的象徵。\n特別深受老年人喜愛。"
          violet: "經常躲在水中伺機\n襲擊獵物。高速游泳時\n會用耳朵來保持平衡。"
