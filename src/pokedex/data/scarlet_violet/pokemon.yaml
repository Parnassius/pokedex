      descriptions:
        jp_kana:
          scarlet: "￹不敵￺ふてき￻な　￹面構￺つらがま￻えだが　￹大好￺だいす￻きな\n￹蜜￺みつ￻を　￹舐￺な￻めるときは　￹嬉￺うれ￻しくて\n￹口￺くち￻もとが　￹緩￺ゆる￻みきってしまう。"
          violet: "￹木登￺きのぼ￻りが　￹得意￺とくい￻。　￹木￺き￻の￹上￺うえ￻で\n￹木￺き￻の￹実￺み￻を　￹探￺さが￻すうちに　オコリザルと\n￹鉢合￺はちあ￻わせて　ひと￹悶着￺もんちゃく￻。"
        jp_kanji:
          scarlet: "￹不敵￺ふてき￻な　￹面構￺つらがま￻えだが　￹大好￺だいす￻きな\n￹蜜￺みつ￻を　￹舐￺な￻めるときは　￹嬉￺うれ￻しくて\n￹口￺くち￻もとが　￹緩￺ゆる￻みきってしまう。"
          violet: "￹木登￺きのぼ￻りが　￹得意￺とくい￻。　￹木￺き￻の￹上￺うえ￻で\n￹木￺き￻の￹実￺み￻を　￹探￺さが￻すうちに　オコリザルと\n￹鉢合￺はちあ￻わせて　ひと￹悶着￺もんちゃく￻。"
        en:
          scarlet: "It usually wears a hardened expression, but\nwhen it’s licking up honey—which it loves—the\njoy it feels will cause it to break into a wide grin."
          violet: "It is quite skilled at climbing trees. If it comes\nacross a Primeape while searching for berries\nin the treetops, trouble will surely ensue."
        fr:
          scarlet: "Son visage austère s’illumine de joie lorsqu’il\nsavoure du miel, un aliment qu’il adore."
          violet: "Il escalade les arbres avec brio. Si au sommet,\nil croise un Colossinge alors qu’il cherche des\nBaies, une querelle éclate inévitablement."
        it:
          scarlet: "Ha un’aria temeraria, ma quando lecca\nil miele di cui è ghiotto gli si dipinge\nun sorriso sul muso."
          violet: "Si arrampica abilmente sugli alberi. Se\nquando è in cerca di bacche si imbatte\nin un Primeape, la lite è assicurata."
        de:
          scarlet: "Sein harter, kühner Gesichtsausdruck weicht\neinem breiten Grinsen, wenn es voller Freude\nseinen geliebten Honig schleckt."
          violet: "Dieser geschickte Kletterer erklimmt Bäume, um\nin deren Kronen nach Beeren zu suchen. Trifft er\ndort auf ein Rasaff, entbrennt sogleich ein Streit."
        es:
          scarlet: "Su expresión dura y adusta se convierte en\nuna sonrisa rebosante de felicidad en cuanto\nsaborea la miel que tanto le gusta."
          violet: "Trepa a los árboles con gran habilidad. Si se\ntopa con un Primeape mientras busca bayas\nen las copas, el conflicto está asegurado."
        ko:
          scarlet: "다부진 표정을 하고 있지만,\n좋아하는 꿀을 핥을 때는\n기쁜 나머지 입가가 절로 느슨해진다."
          violet: "나무 타기가 특기다.\n나무 위에서 나무열매를 찾다가\n성원숭과 마주쳐서 싸움이 나기도 한다."
        zh_simp:
          scarlet: "虽然看上去无所畏惧，\n但在舔食到最喜欢的蜜时，\n会高兴得笑逐颜开。"
          violet: "擅长爬树。在树上寻找\n树果时如果撞见火暴猴，\n那就免不了一场纠纷。"
        zh_trad:
          scarlet: "雖然面目猙獰，但在舔食\n最喜歡的蜜時，會開心到\n忍不住露出笑容。"
          violet: "擅長爬樹。在樹上尋找\n樹果時如果撞見火爆猴，\n就會免不了一場糾紛。"
