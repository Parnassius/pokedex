      descriptions:
        jp_kana:
          scarlet: "￹意外￺いがい￻と　￹怒￺おこ￻りっぽい　ポケモンで\n￹口￺くち￻を　￹大￺おお￻きく　￹開￺あ￻けることで\nまわりに　￹強￺つよ￻さを　アピールする。"
          violet: "￹大￺おお￻きく　￹口￺くち￻を　￹開￺あ￻けて\n￹自分￺じぶん￻の　￹強￺つよ￻さを　アピール。\n￹大量￺たいりょう￻の　￹砂￺すな￻を　￹巻￺ま￻き￹上￺あ￻げて　￹攻撃￺こうげき￻する。"
        jp_kanji:
          scarlet: "￹意外￺いがい￻と　￹怒￺おこ￻りっぽい　ポケモンで\n￹口￺くち￻を　￹大￺おお￻きく　￹開￺あ￻けることで\nまわりに　￹強￺つよ￻さを　アピールする。"
          violet: "￹大￺おお￻きく　￹口￺くち￻を　￹開￺あ￻けて\n￹自分￺じぶん￻の　￹強￺つよ￻さを　アピール。\n￹大量￺たいりょう￻の　￹砂￺すな￻を　￹巻￺ま￻き￹上￺あ￻げて　￹攻撃￺こうげき￻する。"
        en:
          scarlet: "It is surprisingly quick to anger. It holds its\nmouth agape as a display of its strength."
          violet: "It brandishes its gaping mouth in a\ndisplay of fearsome strength. It raises\nvast quantities of sand while attacking."
        fr:
          scarlet: "Ce Pokémon s’énerve facilement. Il ouvre\nses mâchoires au maximum pour intimider\nses adversaires."
          violet: "Il exhibe sa force en ouvrant grand la mâchoire\net attaque en provoquant des tornades de sable."
        it:
          scarlet: "Si infuria molto facilmente.\nPer mostrare la sua forza\ntiene la bocca spalancata."
          violet: "Mostra la propria forza spalancando\nle fauci. Attacca sollevando immani\nquantità di sabbia."
        de:
          scarlet: "Es wird überraschend schnell wütend. Als Zeichen\nseiner Stärke sperrt es sein Maul auf."
          violet: "Das weit aufgerissene Maul demonstriert\nseine Stärke. Es attackiert, indem es\nSandmassen aufwirbelt."
        es:
          scarlet: "Mantiene la boca abierta para mostrar\nsu fuerza. Se enfada con sorprendente\nrapidez."
          violet: "Hace gala de su fuerza abriendo su\nenorme boca. Para atacar levanta gran\ncantidad de arena."
        ko:
          scarlet: "의외로 화를 잘 내는 포켓몬으로\n입을 크게 벌려\n주위에 자신의 강함을 어필한다."
          violet: "크게 입을 벌려\n자신의 강함을 어필한다.\n대량의 모래를 일으켜 공격한다."
        zh_simp:
          scarlet: "这种宝可梦出乎意料地易怒。\n会通过张大嘴巴的行为\n来向周围展示自己的强大。"
          violet: "嘴巴张得大大的，\n炫耀自己的强大。\n向上卷起大量的沙子进行攻击。"
        zh_trad:
          scarlet: "這種寶可夢易怒得令人意外，\n會透過張大嘴巴\n向周圍宣示自己的強大。"
          violet: "會把嘴巴張得大大的\n來炫耀自己的強大。\n捲起大量的沙子進行攻擊。"
