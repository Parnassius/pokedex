          violet: "￹光￺ひか￻る　￹刃￺やいば￻を　￹撃￺う￻ちだし　あたりの\nすべてを　￹切￺き￻り￹裂￺さ￻いたらしいが\nほかに　￹情報￺じょうほう￻はなく　￹正体不明￺しょうたいふめい￻。"
        jp_kanji:
          scarlet: "コバルオン￹型￺がた￻の　￹最新￺さいしん￻　￹兵器￺へいき￻\nと　オカルト￹雑誌￺ざっし￻が　￹紹介￺しょうかい￻した\n￹謎￺なぞ￻の　￹物体￺ぶったい￻に　￹似￺に￻ている。"
          violet: "￹光￺ひか￻る　￹刃￺やいば￻を　￹撃￺う￻ちだし　あたりの\nすべてを　￹切￺き￻り￹裂￺さ￻いたらしいが\nほかに　￹情報￺じょうほう￻はなく　￹正体不明￺しょうたいふめい￻。"
        en:
          scarlet: "It resembles a mysterious object introduced in a\nparanormal magazine as a cutting-edge weapon\nshaped like a Cobalion."
          violet: "There was supposedly an incident in which it\nlaunched shining blades to cut everything around\nit to pieces. Little else is known about it."
        fr:
          scarlet: "Il ressemble à une entité mystérieuse qui, selon\nune revue sur les phénomènes paranormaux, serait\nune arme de pointe à l’effigie de Cobaltium."
          violet: "Outre le fait que ses lames lumineuses pourraient\ntrancher tout ce qui l’entoure, il n’existe aucune\nautre information sur cette entité inconnue."
        it:
          scarlet: "Ricorda molto un misterioso oggetto descritto\nin una rivista di paranormale come un’arma\ndi ultima generazione a forma di Cobalion."
          violet: "Si dice che possa tranciare tutto ciò che ha\nintorno sparando lame luminose. Questo è\ntutto ciò che si sa su questo Pokémon."
        de:
          scarlet: "Es ähnelt einem rätselhaften Objekt, das einer\nesoterischen Zeitschrift nach eine ultramoderne\nWaffe sein soll, die wie Kobalium aussieht."
          violet: "Angeblich hat es mit den leuchtenden Klingen,\ndie es abfeuert, seine Umgebung komplett\nverwüstet, aber mehr ist nicht über es bekannt."
        es:
          scarlet: "Se asemeja a un extraño objeto descrito en una\nrevista esotérica como \"un arma de tecnología\npunta con forma de Cobalion\"."
          violet: "Se dice que puede cortarlo todo a su alrededor\nlanzando afiladas hojas luminosas, pero nada\nmás se sabe acerca de esta criatura."
        ko:
          scarlet: "코바르온 형태의 최신 병기라며\n오컬트 잡지에 소개됐던\n정체불명의 물체를 닮았다."
          violet: "빛나는 칼날을 발사하며\n주위의 모든 것을 베어 버렸다고 하나\n그 밖의 정보는 전무하여 정체불명이다."
        zh_simp:
          scarlet: "与超自然杂志中介绍的\n名为勾帕路翁型最新兵器的\n神秘物体长得很相似。"
          violet: "据说它曾经射出发光的\n刀刃砍断了周围的一切，\n但无其他信息，身份不明。"
        zh_trad:
          scarlet: "與超自然雜誌裡介紹是\n勾帕路翁型最新兵器的\n神秘物體長得很相似。"
          violet: "據說牠曾射出發光的刀刃\n劈開了周遭的一切，但沒有\n能得知其真面目的其他資訊。"
