      descriptions:
        jp_kana:
          scarlet: "￹相手￺あいて￻と　￹目￺め￻が　￹合￺あ￻ったときに\n￹催眠術￺さいみんじゅつ￻など　￹数々￺かずかず￻の\n￹超能力￺ちょうのうりょく￻を　￹使￺つか￻うという。"
          violet: "どんなときでも　￹持￺も￻っている　￹振￺ふ￻り￹子￺こ￻を\n￹決￺き￻まったリズムで　￹揺￺ゆ￻らしている。\n￹近寄￺ちかよ￻ると　なぜか　￹眠￺ねむ￻くなる。"
        jp_kanji:
          scarlet: "￹相手￺あいて￻と　￹目￺め￻が　￹合￺あ￻ったときに\n￹催眠術￺さいみんじゅつ￻など　￹数々￺かずかず￻の\n￹超能力￺ちょうのうりょく￻を　￹使￺つか￻うという。"
          violet: "どんなときでも　￹持￺も￻っている　￹振￺ふ￻り￹子￺こ￻を\n￹決￺き￻まったリズムで　￹揺￺ゆ￻らしている。\n￹近寄￺ちかよ￻ると　なぜか　￹眠￺ねむ￻くなる。"
        en:
          scarlet: "When it locks eyes with an enemy, it will use\na mix of psi moves, such as Hypnosis and\nConfusion."
          violet: "Always holding a pendulum that it swings at a\nsteady rhythm, it causes drowsiness in anyone\nnearby."
        fr:
          scarlet: "Lorsqu’il croise le regard de son adversaire,\nil utilise de nombreux pouvoirs surnaturels\ncomme l’hypnose."
          violet: "Il tient toujours un pendule qui va et vient\nde façon régulière et peut endormir tout être\naux alentours."
        it:
          scarlet: "Quando cattura lo sguardo del nemico,\nusa una varietà di poteri psichici come,\nad esempio, l’ipnosi."
          violet: "Ha sempre con sé un pendolo che agita a ritmo\nregolare. Fa assopire chiunque gli si avvicini."
        de:
          scarlet: "Es heißt, wenn dieses Pokémon einem Gegner\nins Auge blicke, setze es zahlreiche Psycho-Kräfte\nwie beispielsweise Hypnose ein."
          violet: "Es hält immer ein Pendel, welches es in einem\ngleichmäßigen Rhythmus bewegt. Dies verursacht\nbei jedem in seiner Nähe Müdigkeit."
        es:
          scarlet: "Cuando mira al enemigo, usa diversos poderes\npsíquicos como la hipnosis."
          violet: "Lleva siempre un péndulo que hace oscilar a\nun ritmo constante y con el que causa sueño\na quien se acerque."
        ko:
          scarlet: "상대와 눈이 마주쳤을 때\n최면술 등의 다양한 초능력을\n사용한다고 전해진다."
          violet: "항상 지니고 있는 추를\n규칙적인 리듬으로 흔들고 있다.\n가까이 가면 어쩐지 졸린다."
        zh_simp:
          scarlet: "据说对手与它视线相对时，\n它就会使出催眠术等\n多种多样的超能力。"
          violet: "它会用固定的节奏摆动\n那形影不离的钟摆。一旦靠近\n就不由自主地昏昏欲睡。"
        zh_trad:
          scarlet: "據說牠和對手對到眼時，\n就會使出催眠術等\n各式各樣的超能力。"
          violet: "會以固定的節奏擺動著\n形影不離的鐘擺。一靠近牠\n就會不由自主地昏昏欲睡。"
