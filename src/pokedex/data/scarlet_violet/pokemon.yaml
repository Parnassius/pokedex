        - poison
      egg_groups:
        - human_like
      abilities:
        - punk_rock
        - minus
      hidden_ability: technician
      descriptions:
        jp_kana:
          scarlet: "どんな　￹相手￺あいて￻にも　￹動￺どう￻じず\n￹気￺け￻だるげに　ケンカを￹売￺う￻る　スタイルに\n￹憧￺あこが￻れる　￹若者￺わかもの￻も　￹多￺おお￻い。"
          violet: "￹淀￺よど￻んだ　￹水￺みず￻を　ガブ￹飲￺の￻みして\n￹体内￺たいない￻で　￹電気￺でんき￻を　￹生￺う￻みだすとき\nベースのような　ビートが　￹響￺ひび￻く。"
        jp_kanji:
          scarlet: "どんな　￹相手￺あいて￻にも　￹動￺どう￻じず\n￹気￺け￻だるげに　ケンカを￹売￺う￻る　スタイルに\n￹憧￺あこが￻れる　￹若者￺わかもの￻も　￹多￺おお￻い。"
          violet: "￹淀￺よど￻んだ　￹水￺みず￻を　ガブ￹飲￺の￻みして\n￹体内￺たいない￻で　￹電気￺でんき￻を　￹生￺う￻みだすとき\nベースのような　ビートが　￹響￺ひび￻く。"
        en:
          scarlet: "Many youths admire the way this Pokémon\nlistlessly picks fights and keeps its cool no\nmatter what opponent it faces."
          violet: "As it gulps down stagnant water and generates\nelectricity in its body, a sound like a rhythm\nplayed by a bass guitar reverberates all around."
        fr:
          scarlet: "Beaucoup de jeunes admirent son attitude\nimperturbable face à n’importe quel adversaire et\nla nonchalance avec laquelle il cherche la bagarre."
          violet: "Lorsqu’il avale de l’eau stagnante et génère de\nl’électricité à l’intérieur de son corps, cela crée\ndes vibrations semblables à celles d’une basse."
        it:
          scarlet: "Molti giovani lo ammirano per l’atteggiamento\nimperturbabile di fronte a qualunque avversario\ne la nonchalance con cui attacca briga."
          violet: "Quando ingurgita acqua stagnante e genera\nelettricità all’interno del corpo, si sente un suono\nritmico simile a quello di un basso elettrico."
        de:
          scarlet: "Kein Gegner kann es aus der Fassung bringen.\nDies und die Lässigkeit, mit der es Streit sucht,\nerklären wohl, warum die Jugend es so schätzt."
          violet: "Wenn es abgestandenes Wasser trinkt und Strom\nin seinem Körper erzeugt, erklingen rhythmische\nGeräusche, die an eine Bassgitarre erinnern."
        es:
          scarlet: "Muchos jóvenes lo admiran por la impavidez\ny aparente indiferencia que muestra al entablar\nun combate, sea cual sea el oponente."
          violet: "Cuando produce electricidad en su cuerpo tras\nbeber agua estancada, emite un sonido rítmico\nsimilar al de un bajo que resuena a su alrededor."
        ko:
          scarlet: "상대가 누구라도 동요하지 않고\n나른한 모습으로 싸움을 거는 스타일에\n동경하는 젊은이도 많다."
          violet: "고인 물을 벌컥 들이켜서\n체내에서 전기를 만들어 낼 때\n베이스 소리 같은 비트가 들린다."
        zh_simp:
          scarlet: "面对任何对手都能镇定自若，\n它那一脸慵懒地挑衅着对手的风格\n受到了不少年轻人的憧憬。"
          violet: "当它大口喝下淤水，\n并在体内制造电气的时候，\n会响起仿佛像是贝斯的节拍。"
        zh_trad:
          scarlet: "面對任何對手都能鎮定自若，\n一臉懶樣地挑釁對手的風格，\n受到了不少年輕人的憧憬。"
          violet: "當牠大口喝下渾水，\n在體內製造電氣的時候，\n會響起如貝斯般的節拍。"
