          scarlet: "どんなに　￹細￺ほそ￻い　￹隙間￺すきま￻でも\n￹風￺かぜ￻のように　￹潜￺くぐ￻り￹抜￺ぬ￻けてしまう。\n￹白￺しろ￻い　￹毛玉￺けだま￻を　￹残￺のこ￻していく。"
          violet: "￹風￺かぜ￻に　￹乗￺の￻り　￹民家￺みんか￻に　￹侵入￺しんにゅう￻。\n￹部屋中￺へやじゅう￻を　￹綿￺わた￻まみれにすると\nニコニコ　￹笑￺わら￻って　￹去￺さ￻っていく。"
        jp_kanji:
          scarlet: "どんなに　￹細￺ほそ￻い　￹隙間￺すきま￻でも\n￹風￺かぜ￻のように　￹潜￺くぐ￻り￹抜￺ぬ￻けてしまう。\n￹白￺しろ￻い　￹毛玉￺けだま￻を　￹残￺のこ￻していく。"
          violet: "￹風￺かぜ￻に　￹乗￺の￻り　￹民家￺みんか￻に　￹侵入￺しんにゅう￻。\n￹部屋中￺へやじゅう￻を　￹綿￺わた￻まみれにすると\nニコニコ　￹笑￺わら￻って　￹去￺さ￻っていく。"
        en:
          scarlet: "Like the wind, it can slip through any gap,\nno matter how small. It leaves balls of white\nfluff behind."
          violet: "It rides on the wind and slips into people’s\nhomes. After it has turned a room into a cotton-\nfilled mess, it giggles to itself and takes off."
        fr:
          scarlet: "Il se faufile comme un courant d’air dans\nles espaces les plus étroits en laissant\nune touffe de poils blancs derrière lui."
          violet: "Il s’introduit chez les gens à la faveur d’un\ncourant d’air, répand du coton aux quatre coins\nde la pièce, puis repart avec un sourire satisfait."
        it:
          scarlet: "Si infiltra nelle fessure più sottili, come un soffio\ndi vento, lasciando dietro di sé dei batuffoli\nbianchi."
          violet: "Entra nelle case trasportato dal vento. Dopo\naverle riempite di cotone, se ne va ridendo\nfelice."
        de:
          scarlet: "Es passiert wie ein Luftzug mühelos jeden noch so\nengen Spalt und hinterlässt weiße Fellknäuel auf\nseinem Weg."
          violet: "Über Luftzüge dringt es in Häuser ein, verstreut\nin allen Zimmern Watte und macht sich dann\nlächelnd davon."
        es:
          scarlet: "Es capaz de atravesar las más mínimas fisuras\ncual soplo de viento. A su paso, deja pelusillas\nblancas."
          violet: "Entra en las casas con las corrientes de aire y\nesparce algodón por todas partes. Desaparece\nentre risas tras su travesura."
        ko:
          scarlet: "아무리 좁은 틈이라도\n바람처럼 빠져나간다.\n하얀 털 뭉치를 남기고 간다."
          violet: "바람을 타고 민가에 침입한다.\n방 안을 솜투성이로 만들고\n싱글벙글 웃으며 떠난다."
        zh_simp:
          scarlet: "像风一样无孔不入，\n无论多细小的缝隙都能穿过。\n会留下白色的毛球。"
          violet: "乘着风侵入民居。\n把房间里弄得满是棉花后，\n咯咯咯地笑着离去。"
        zh_trad:
          scarlet: "無論是多麼窄小的縫隙，\n都能像風兒般地穿過。\n會留下白色的毛球。"
          violet: "乘著風侵入民居。\n把房間裡弄得滿是棉絮後，\n就會嘻嘻哈哈地笑著離去。"
