      types:
        - grass
      egg_groups:
        - field
      abilities:
        - sap_sipper
      hidden_ability: grass_pelt
      descriptions:
        jp_kana:
          scarlet: "￹最近￺さいきん￻まで　￹山岳￺さんがく￻で　￹暮￺く￻らす\n￹人￺ひと￻たちは　メェークルの　￹背中￺せなか￻に\n￹乗￺の￻って　￹山道￺やまみち￻を　￹移動￺いどう￻していた。"
          violet: "￹太陽￺たいよう￻と　￹水￺みず￻が　あれば　￹体￺からだ￻の\n￹葉￺は￻っぱで　エネルギーを　￹作￺つく￻れるので\nエサのない　￹岩山￺いわやま￻でも　￹生￺い￻きられる。"
        jp_kanji:
          scarlet: "￹最近￺さいきん￻まで　￹山岳￺さんがく￻で　￹暮￺く￻らす\n￹人￺ひと￻たちは　メェークルの　￹背中￺せなか￻に\n￹乗￺の￻って　￹山道￺やまみち￻を　￹移動￺いどう￻していた。"
          violet: "￹太陽￺たいよう￻と　￹水￺みず￻が　あれば　￹体￺からだ￻の\n￹葉￺は￻っぱで　エネルギーを　￹作￺つく￻れるので\nエサのない　￹岩山￺いわやま￻でも　￹生￺い￻きられる。"
        en:
          scarlet: "Until recently, people living in the mountains\nwould ride on the backs of these Pokémon to\ntraverse the mountain paths."
          violet: "As long as it has sunlight and water, Skiddo can\nmake energy with the leaves on its body, allowing\nit to live on rocky mountains barren of food."
        fr:
          scarlet: "Il y a encore peu, les personnes vivant dans\nles zones montagneuses se déplaçaient à dos\nde Cabriolaine."
          violet: "Ses feuilles lui permettent de générer de l’énergie\nà partir du soleil et de l’eau, et ainsi de survivre\ndans les montagnes où la nourriture est rare."
        it:
          scarlet: "Fino a poco tempo fa, la gente di montagna era\nsolita percorrere i sentieri montani in groppa\na degli Skiddo."
          violet: "Le sue foglie riescono a ricavare energia\ndal sole e dall’acqua, permettendogli di vivere\nanche su monti rocciosi in cui non c’è cibo."
        de:
          scarlet: "Bis vor Kurzem ritten die in den Bergen lebenden\nMenschen auf dem Rücken dieses Pokémon, um\nsich auf den Bergpfaden fortzubewegen."
          violet: "Solange es Wasser und Sonnenlicht hat, kann es\nmit den Blättern seines Körpers Energie erzeugen\nund so ohne Futter im Gebirge überleben."
        es:
          scarlet: "Hasta hace bien poco, los habitantes de las\nmontañas se desplazaban por sus senderos\na lomos de este Pokémon."
          violet: "Logra subsistir en montañas donde escasea el\nsustento gracias a que genera energía a partir\ndel agua y el sol con las hojas de su cuerpo."
        ko:
          scarlet: "최근까지도 산악 지대에 사는 사람들은\n메이클의 등에 올라타서\n산길을 이동했다."
          violet: "태양과 물만 있으면 몸의 잎사귀를 통해\n에너지를 만들 수 있기 때문에\n먹이가 없는 바위산에서도 살 수 있다."
        zh_simp:
          scarlet: "直到最近为止都还有山岳的\n居民乘坐在坐骑小羊的\n背上，在山路上移动。"
          violet: "如果有太阳和水，\n就能用身上的叶子制造能量，\n因此在没有食粮的岩山也能生存。"
        zh_trad:
          scarlet: "一直到最近為止，都還有\n山岳的住民乘在坐騎小羊\n的背上，在山路上移動。"
          violet: "有陽光和水就能用身上的\n葉子製造能量，因此在沒有\n糧食的岩山也能生存下去。"
