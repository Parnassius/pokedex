          scarlet: "애호가가 많은 포켓몬.\n뿔에서 늘어진 가지와 잎의 빨간색이\n짙을수록 멋진 것으로 여겨진다."
          violet: "가을의 모습인 바라철록은\n매우 성질이 난폭한 것으로 알려져 있다.\n수컷끼리는 싸움이 끊이지 않는다."
