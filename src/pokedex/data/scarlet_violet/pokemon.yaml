          scarlet: "ハピナスが　￹産￺う￻んだ　タマゴを\nひとくちでも　￹食￺た￻べた　￹人￺ひと￻は\nだれにでも　￹優￺やさ￻しく　なれる。"
          violet: "ハピナスの　￹産￺う￻む　タマゴには\n￹幸￺しあわ￻せが　つまっていて　ひとくち\n￹食￺た￻べると　だれでも　￹笑顔￺えがお￻になれる。"
        jp_kanji:
          scarlet: "ハピナスが　￹産￺う￻んだ　タマゴを\nひとくちでも　￹食￺た￻べた　￹人￺ひと￻は\nだれにでも　￹優￺やさ￻しく　なれる。"
          violet: "ハピナスの　￹産￺う￻む　タマゴには\n￹幸￺しあわ￻せが　つまっていて　ひとくち\n￹食￺た￻べると　だれでも　￹笑顔￺えがお￻になれる。"
        en:
          scarlet: "Anyone who takes even one taste of Blissey’s\negg becomes unfailingly caring and pleasant\nto everyone."
          violet: "The eggs it lays are filled with happiness. Eating\neven one bite will bring a smile to anyone."
        fr:
          scarlet: "Il suffit de manger une bouchée de l’œuf\nde Leuphorie pour devenir aimable avec\ntout le monde."
          violet: "Les œufs que pond Leuphorie sont un concentré\nde bonheur. Une bouchée de ces œufs suffit à\nfaire sourire n’importe qui."
        it:
          scarlet: "Basta un solo assaggio di una delle uova\ndeposte da Blissey per diventare gentili\ne premurosi nei confronti di chiunque."
          violet: "Le uova che depone sono un concentrato\ndi felicità: basta un assaggio per recuperare\nsubito il sorriso."
        de:
          scarlet: "Jeder, der von einem Ei kostet, das Heiteira\ngelegt hat, wird anderen gegenüber sorgsam\nund höflich."
          violet: "Eier, die es legt, stecken voller Fröhlichkeit.\nSchon ein Bissen erzeugt ein breites Lächeln."
        es:
          scarlet: "Cualquiera que pruebe un poco de huevo de\nBlissey, se volverá más amable y agradable\ncon todos."
          violet: "Los huevos que pone están llenos de\nfelicidad. Solo con probar un poquito\nde uno, cualquiera sonríe."
        ko:
          scarlet: "해피너스가 낳은 알을\n한 입이라도 먹은 사람은\n누구에게나 상냥해진다."
          violet: "해피너스가 낳은 알에는\n행복이 담겨 있어서 한 입 먹으면\n누구든지 웃음 띤 얼굴이 된다."
        zh_simp:
          scarlet: "只要吃下幸福蛋的蛋，\n哪怕只有一口也会\n对任何人都温柔和善。"
          violet: "幸福蛋生的蛋里饱含幸福，\n只要吃上一口，\n不管是谁都会笑逐颜开。"
        zh_trad:
          scarlet: "只要吃下幸福蛋的蛋，\n即便是只吃了一口，\n也能對任何人都溫和相待。"
          violet: "幸福蛋生的蛋裡富含幸福，\n只要吃上一口，\n不管是誰都會笑逐顏開。"
