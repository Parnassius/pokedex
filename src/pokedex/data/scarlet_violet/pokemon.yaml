      abilities:
        - sap_sipper
      hidden_ability: grass_pelt
      descriptions:
        jp_kana:
          scarlet: "ツノで　￹触￺ふ￻れると　￹相手￺あいて￻の　￹気持￺きも￻ちを\n￹感￺かん￻じとれる。　５０００￹年前￺ねんまえ￻から\n￹人￺ひと￻の　￹仕事￺しごと￻を　￹手伝￺てつだ￻ってきた。"
          violet: "￹山岳地帯￺さんがくちたい￻で　￹群￺む￻れで　￹暮￺く￻らす。\nツノを　ぶつけあう　￹勝負￺しょうぶ￻に\n￹勝￺か￻った　￹個体￺こたい￻が　リーダーになる。"
        jp_kanji:
          scarlet: "ツノで　￹触￺ふ￻れると　￹相手￺あいて￻の　￹気持￺きも￻ちを\n￹感￺かん￻じとれる。　５０００￹年前￺ねんまえ￻から\n￹人￺ひと￻の　￹仕事￺しごと￻を　￹手伝￺てつだ￻ってきた。"
          violet: "￹山岳地帯￺さんがくちたい￻で　￹群￺む￻れで　￹暮￺く￻らす。\nツノを　ぶつけあう　￹勝負￺しょうぶ￻に\n￹勝￺か￻った　￹個体￺こたい￻が　リーダーになる。"
        en:
          scarlet: "It can sense the feelings of others by touching\nthem with its horns. This species has assisted\npeople with their work since 5,000 years ago."
          violet: "These Pokémon live in herds in mountainous\nplaces. The victor in their contests of clashing\nhorns will become the leader of the herd."
        fr:
          scarlet: "Il peut ressentir les émotions de ses adversaires\nen les touchant avec ses cornes. Il aide les êtres\nhumains dans leurs travaux depuis 5 000 ans."
          violet: "Ces Pokémon vivent en troupeau dans les régions\nmontagneuses. Ils se livrent à des duels à coups\nde cornes, et les vainqueurs deviennent meneurs."
        it:
          scarlet: "Riesce a percepire lo stato d’animo di chiunque\ntocchi con le corna. Aiuta gli esseri umani nelle\nloro attività da 5.000 anni."
          violet: "I Gogoat vivono in grandi gruppi nelle regioni\nmontane. Il capobranco viene deciso tramite\nscontri a colpi di corna."
        de:
          scarlet: "Berührt es sein Gegenüber mit den Hörnern, kann\nes dessen Gefühle erspüren. Seit 5000 Jahren\ngeht es den Menschen bei der Arbeit zur Hand."
          violet: "In Herden bewohnen sie Gebirge. Der Anführer\nwird durch ein Kräftemessen bestimmt, bei dem\ndie Anwärter ihre Hörner gegeneinanderrammen."
        es:
          scarlet: "Puede percibir cómo se siente alguien tocándolo\ncon los cuernos. Lleva ayudando a los humanos\nen sus labores desde hace 5000 años."
          violet: "Habita en regiones montañosas. El líder de\nla manada se decide en un duelo en el que\nlos contendientes luchan con los cuernos."
        ko:
          scarlet: "뿔에 닿으면 상대의 기분을 느낄 수 있다.\n5천 년 전부터 인간의 일을 도왔다."
          violet: "산악 지대에 무리 지어 산다.\n뿔을 맞부딪치는 승부에서\n이긴 개체가 리더가 된다."
        zh_simp:
          scarlet: "用角一碰就可以感受到\n对方的心情。从５０００年前起\n就一直协助着人类工作至今。"
          violet: "在山岳地带成群生活。\n会用角互相顶撞来一较高下，\n胜利的个体将成为领袖。"
        zh_trad:
          scarlet: "用角一碰就可以感受到對手\n的心情。從５０００年前起\n就一直協助著人類工作至今。"
          violet: "在山岳地帶過著集體生活。\n會用角互相碰撞來一較高下，\n勝利的個體將成為領袖。"
espurr:
  species_id: 677
  names:
    jp_kana: ニャスパー
    jp_kanji: ニャスパー
    en: Espurr
    fr: Psystigri
