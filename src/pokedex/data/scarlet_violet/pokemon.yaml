      descriptions:
        jp_kana:
          scarlet: "ハハコモリに　￹着￺き￻せられた　￹葉￺は￻っぱの\n￹服￺ふく￻を　お￹手本￺てほん￻に　￹見￺み￻よう￹見￺み￻まねで\n￹木￺こ￻の￹葉￺は￻を　かじり　￹服￺ふく￻を　￹作￺つく￻る。"
          violet: "￹頭￺あたま￻の　こぶは　￹感覚器官￺かんかくきかん￻。\nクルミル￹同士￺どうし￻が　￹出会￺であ￻うと　こぶを\nすり￹合￺あ￻わせて　￹挨拶￺あいさつ￻するぞ。"
        jp_kanji:
          scarlet: "ハハコモリに　￹着￺き￻せられた　￹葉￺は￻っぱの\n￹服￺ふく￻を　お￹手本￺てほん￻に　￹見￺み￻よう￹見￺み￻まねで\n￹木￺こ￻の￹葉￺は￻を　かじり　￹服￺ふく￻を　￹作￺つく￻る。"
          violet: "￹頭￺あたま￻の　こぶは　￹感覚器官￺かんかくきかん￻。\nクルミル￹同士￺どうし￻が　￹出会￺であ￻うと　こぶを\nすり￹合￺あ￻わせて　￹挨拶￺あいさつ￻するぞ。"
        en:
          scarlet: "Sewaddle chews on leaves to make its clothing.\nIt’s trying to mimic the leafy garment Leavanny\nfirst dressed it in."
          violet: "The bumps on their heads are sensory organs.\nWhen Sewaddle meet, they greet each other\nby rubbing these bumps together."
        fr:
          scarlet: "Il fabrique des vêtements en rongeant les feuilles\ndes arbres et en prenant pour modèle l’habit\nvégétal dont Manternel l’a vêtu."
          violet: "Les boules sur sa tête sont des organes sensoriels.\nQuand deux Larveyette se rencontrent,\nils se les frottent mutuellement pour se saluer."
        it:
          scarlet: "Rosicchia le foglie degli alberi per crearsi vestiti\nprendendo a modello quello che gli ha fatto\nindossare Leavanny."
          violet: "Le protuberanze sulla testa sono organi di senso.\nQuando due Sewaddle s’incontrano, si salutano\nsfregandosele a vicenda."
        de:
          scarlet: "Es beißt Blätter zurecht und näht sich daraus ein\nKleid. Als Vorlage dient ihm das Blättergewand,\ndas Matrifol ihm übergestreift hat."
          violet: "Bei den Beulen auf seinem Kopf handelt es sich\num Sinnesorgane. Begegnen sich zwei Strawickl,\nreiben sie diese zur Begrüßung aneinander."
        es:
          scarlet: "Usa como patrón la ropa que le teje Leavanny\npara aprender a elaborar él mismo atavíos con\nlas hojas de los árboles que recorta."
          violet: "Las protuberancias de la cabeza son órganos\nsensoriales. Cuando dos Sewaddle se encuentran,\nlas frotan mutuamente a modo de saludo."
        ko:
          scarlet: "모아머가 입혀 준 잎사귀 옷을\n본보기 삼아 흉내 내어\n나뭇잎을 갉아서 옷을 만든다."
          violet: "머리에 난 혹은 감각 기관이다.\n두르보끼리 만나면\n혹을 비비는 것으로 인사를 한다."
        zh_simp:
          scarlet: "会仿照保姆虫为它穿上的\n叶子衣服，有样学样地\n啃咬树叶制作衣服。"
          violet: "头上的包包是感觉器官，\n两只虫宝包相遇时，会通过\n相互摩擦包包来打招呼哦。"
        zh_trad:
          scarlet: "會仿照保母蟲給牠穿上的\n葉子衣服，有樣學樣地\n去啃樹葉來做衣服。"
          violet: "頭部的小包包是感覺器官。\n當蟲寶包彼此相遇時，\n會互相磨蹭包包來打招呼。"
