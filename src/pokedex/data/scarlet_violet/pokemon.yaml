        jp_kana:
          scarlet: "￹尻尾￺しっぽ￻の　￹木￺き￻の￹枝￺えだ￻に　つけた　￹火￺ひ￻を\n￹振￺ふ￻って　￹仲間￺なかま￻に　￹合図￺あいず￻を　￹送￺おく￻る。\n￹危険￺きけん￻なときは　クルクル　￹回￺まわ￻す。"
          violet: "￹木￺き￻の￹枝￺えだ￻を　￹尻尾￺しっぽ￻から　￹引￺ひ￻き￹抜￺ぬ￻くとき\n￹着火￺ちゃっか￻。　その　￹炎￺ほのお￻を　￹火種￺ひだね￻に\n￹強力￺きょうりょく￻な　￹技￺わざ￻を　￹繰￺く￻りだす。"
        jp_kanji:
          scarlet: "￹尻尾￺しっぽ￻の　￹木￺き￻の￹枝￺えだ￻に　つけた　￹火￺ひ￻を\n￹振￺ふ￻って　￹仲間￺なかま￻に　￹合図￺あいず￻を　￹送￺おく￻る。\n￹危険￺きけん￻なときは　クルクル　￹回￺まわ￻す。"
          violet: "￹木￺き￻の￹枝￺えだ￻を　￹尻尾￺しっぽ￻から　￹引￺ひ￻き￹抜￺ぬ￻くとき\n￹着火￺ちゃっか￻。　その　￹炎￺ほのお￻を　￹火種￺ひだね￻に\n￹強力￺きょうりょく￻な　￹技￺わざ￻を　￹繰￺く￻りだす。"
        en:
          scarlet: "It ignites the twig from its tail and waves the twig\naround to signal its allies. To indicate danger,\nit draws circles in the air with the twig’s flame."
          violet: "Braixen’s branch ignites as it’s pulled from the\nPokémon’s tail. Braixen then uses the flame to\nspark powerful attacks."
        fr:
          scarlet: "Il envoie des signaux à ses congénères en mettant\nle feu à la branche de sa queue et en agitant\nla flamme. En cas de danger, il la fait tourner."
          violet: "Sa branche prend feu lorsqu’il la retire de\nsa queue. Il se sert alors de la flamme pour\nlancer de puissantes attaques."
        it:
          scarlet: "Invia segnali ai suoi compagni incendiando e\nagitando il rametto che ha nella coda.\nIn caso di pericolo lo fa roteare."
          violet: "Quando estrae il rametto dalla coda, questo\nprende fuoco. Le fiamme così generate possono\nessere usate per sferrare potenti mosse."
        de:
          scarlet: "Es entzündet den Zweig aus seinem Schweif und\nschwenkt ihn, um seinen Artgenossen Signale zu\ngeben. Bei Gefahr lässt es ihn kreisen."
          violet: "Es entzündet seinen Zweig beim Herausziehen\naus dem Schweif und nutzt diese Flamme,\num mächtige Attacken zu befeuern."
        es:
          scarlet: "Agita la rama candente de la cola para enviar\nseñales a sus compañeros. En caso de peligro,\nla mueve describiendo una trayectoria circular."
          violet: "La rama de la cola prende fuego al extraerla\ny genera una llama con la que Braixen ejecuta\npoderosos movimientos."
        ko:
          scarlet: "꼬리의 나뭇가지에 붙인 불꽃을 휘둘러서\n동료에게 신호를 보낸다.\n위험한 순간에는 빙글빙글 돌린다."
          violet: "나뭇가지를 꼬리에서 뽑을 때\n불이 붙는다. 그 불꽃을 불씨 삼아\n강력한 기술을 내보낸다."
        zh_simp:
          scarlet: "会点燃尾巴上的树枝\n并挥动它向伙伴传递信号。\n遇到危险时会转动树枝画圈。"
          violet: "从尾巴拔出树枝时会起火。\n能将这道火焰作为火种\n使出强而有力的招式。"
        zh_trad:
          scarlet: "會揮動尾巴的樹枝點燃的\n火焰，向夥伴發送信號。\n身陷危險時會轉動樹枝畫圈。"
          violet: "將樹枝從尾巴拔出時就會著火。\n牠會用點燃的火當火種，\n使出強力的招式。"
