      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 2
        special_defense: 1
        speed: 0
      types:
        - grass
        - poison
      egg_groups:
        - monster
        - grass
      abilities:
        - overgrow
      hidden_ability: chlorophyll
      descriptions:
        jp_kana:
          scarlet: "￹浴￺あ￻びた　￹太陽￺たいよう￻の　￹光￺ひかり￻を\nエネルギーに　￹変換￺へんかん￻できるので\n￹夏￺なつ￻の　ほうが　￹強￺つよ￻くなる。"
          violet: "￹大￺おお￻きな　￹花￺はな￻びらを　￹広￺ひろ￻げ\n￹太陽￺たいよう￻の　￹光￺ひかり￻を　￹浴￺あ￻びていると\n￹体￺からだ￻に　￹元気￺げんき￻が　みなぎっていく。"
        jp_kanji:
          scarlet: "￹浴￺あ￻びた　￹太陽￺たいよう￻の　￹光￺ひかり￻を\nエネルギーに　￹変換￺へんかん￻できるので\n￹夏￺なつ￻の　ほうが　￹強￺つよ￻くなる。"
          violet: "￹大￺おお￻きな　￹花￺はな￻びらを　￹広￺ひろ￻げ\n￹太陽￺たいよう￻の　￹光￺ひかり￻を　￹浴￺あ￻びていると\n￹体￺からだ￻に　￹元気￺げんき￻が　みなぎっていく。"
        en:
          scarlet: "While it basks in the sun, it can convert the\nlight into energy. As a result, it is more\npowerful in the summertime."
          violet: "By spreading the broad petals of its flower\nand catching the sun’s rays, it fills its body\nwith power."
        fr:
          scarlet: "Ce Pokémon est capable de transformer\nla lumière du soleil en énergie. Il est donc\nencore plus fort en été."
          violet: "Lorsqu’il déploie ses grands pétales pour\ncapter la lumière du soleil, de l’énergie\nlui parcourt tout le corps."
        it:
          scarlet: "Può convertire la luce solare in energia.\nPer questo è più forte in estate."
          violet: "Si riempie di energia grazie ai grandi petali\ndel fiore, che spalanca catturando i raggi solari."
        de:
          scarlet: "Da es Sonnenlicht in Energie umwandelt,\nist es im Sommer stärker."
          violet: "Es breitet seine großen Blütenblätter aus,\num im Sonnenlicht zu baden und seinen\nKörper mit Energie zu füllen."
        es:
          scarlet: "Puede convertir la luz del sol en energía.\nPor esa razón, es más poderoso en verano."
          violet: "Llena su cuerpo de energía con los rayos\nsolares que capta al extender los enormes\npétalos de su flor."
        ko:
          scarlet: "내리쪼이는 태양 빛을\n에너지로 변환할 수 있기 때문에\n여름에 더욱 강해진다."
          violet: "큰 꽃잎을 펼쳐\n햇빛을 받고 있으면\n몸에 힘이 넘쳐흐른다."
        zh_simp:
          scarlet: "因为能将沐浴到的\n太阳光转换成能量，\n所以在夏天会变得更强。"
          violet: "展开大片的花瓣沐浴阳光时，\n身体就会变得充满活力。"
        zh_trad:
          scarlet: "由於能將沐浴的\n陽光轉換成能量，\n夏天會變得更強。"
          violet: "每當張開大大的花瓣\n沐浴在陽光之下時，\n身體就會變得充滿活力。"
