      descriptions:
        jp_kana:
          scarlet: "￹奇妙￺きみょう￻な￹声￺こえ￻で　￹吠￺ほ￻えたら　￹危険￺きけん￻。\n￹目￺め￻にも￹留￺と￻まらぬ　キックや　チョップの\n￹連続攻撃￺れんぞくこうげき￻が　￹始￺はじ￻まるぞ。"
          violet: "￹両手￺りょうて￻の　￹体毛￺たいもう￻を　ムチのように\n￹使￺つか￻いこなし　￹連続攻撃￺れんぞくこうげき￻を\nはじめると　だれにも　￹止￺と￻められない。"
        jp_kanji:
          scarlet: "￹奇妙￺きみょう￻な￹声￺こえ￻で　￹吠￺ほ￻えたら　￹危険￺きけん￻。\n￹目￺め￻にも￹留￺と￻まらぬ　キックや　チョップの\n￹連続攻撃￺れんぞくこうげき￻が　￹始￺はじ￻まるぞ。"
          violet: "￹両手￺りょうて￻の　￹体毛￺たいもう￻を　ムチのように\n￹使￺つか￻いこなし　￹連続攻撃￺れんぞくこうげき￻を\nはじめると　だれにも　￹止￺と￻められない。"
        en:
          scarlet: "When Mienshao lets out a bizarre wail, you’re in\ndanger. A flurry of kicks and chops too fast to\nsee is about to be unleashed!"
          violet: "Using the long fur on its arms like whips, it\nlaunches into combo attacks that, once started,\nno one can stop."
        fr:
          scarlet: "L’étrange cri de Shaofouine annonce\nqu’il est sur le point d’asséner une pluie\nde coups si rapides qu’ils en sont invisibles."
          violet: "Les longs poils de ses pattes antérieures lui\nservent de fouets. Une fois qu’il commence\nà enchaîner les coups, rien ne l’arrête."
        it:
          scarlet: "Se emette un verso bizzarro, è meglio stargli\nalla larga: potrebbe scatenare una pioggia di\ncalci e pugni così rapidi da essere invisibili!"
          violet: "Usa i peli degli arti anteriori a mo’ di frusta\ne se inizia un attacco a catena non c’è\nnessuno che lo possa fermare."
        de:
          scarlet: "Gibt es einen sonderbaren Laut von sich, sollte\nman schnell in Deckung gehen, da eine rasante\nAngriffsserie aus Schlägen und Tritten folgt."
          violet: "Niemand kann es aufhalten, wenn es das Fell\nan seinen Armen geschickt wie Peitschen\neinsetzt, um eine Angriffsserie zu starten."
        es:
          scarlet: "Si emite extraños aullidos, hay que extremar\nla precaución: empezará a repartir un sinfín de\npatadas y puñetazos a una velocidad pasmosa."
          violet: "Usa el pelaje de los brazos a modo de\nlátigos para encadenar ataques que nadie\npuede parar una vez iniciados."
        ko:
          scarlet: "기묘한 울음소리를 낸다면 위험하다.\n눈에 보이지도 않는 킥과 촙의\n연속 공격이 시작된다."
          violet: "양손의 털을 채찍처럼\n능숙하게 다뤄 연속 공격을\n시작하면 아무도 멈출 수 없다."
        zh_simp:
          scarlet: "用奇妙的声音叫唤的话，就危险了。\n它会展开飞快的踢和劈来连续攻击。"
          violet: "双臂上的体毛使用得像鞭子一样熟练。\n一旦开始连续攻击，谁也无法阻止。"
        zh_trad:
          scarlet: "當牠用奇妙聲音發出叫喊時是很危險的。\n由快到無法看清的踢腿和手刀\n組成的連續攻擊將接踵而來。"
          violet: "將雙臂的毛如鞭子般靈活使用。\n一旦開始連續攻擊，誰也無法阻止。"
