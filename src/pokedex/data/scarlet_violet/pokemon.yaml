          violet: "ボスが　￹選￺えら￻んだ　１０￹匹￺ぴき￻で　￹狩￺か￻りに\n￹出￺で￻かけ　￹取￺と￻ってきた　エサを　￹群￺む￻れの\n￹仲間￺なかま￻で　￹平等￺びょうどう￻に　￹分￺わ￻け￹合￺あ￻う。"
        jp_kanji:
          scarlet: "￹硬￺かた￻い　￹木￺き￻の￹実￺み￻を　￹投￺な￻げて　￹戦￺たたか￻う。\nボールを　￹投￺な￻げるのが　￹下手￺へた￻くそな\nトレーナーの　￹言￺い￻うことは　￹聞￺き￻かない。"
          violet: "ボスが　￹選￺えら￻んだ　１０￹匹￺ぴき￻で　￹狩￺か￻りに\n￹出￺で￻かけ　￹取￺と￻ってきた　エサを　￹群￺む￻れの\n￹仲間￺なかま￻で　￹平等￺びょうどう￻に　￹分￺わ￻け￹合￺あ￻う。"
        en:
          scarlet: "This Pokémon battles by throwing hard berries.\nIt won’t obey a Trainer who throws Poké Balls\nwithout skill."
          violet: "The boss chooses 10 members of the group to\ngo out hunting. The hunting party will evenly split\nthe food they find with the rest of the group."
        fr:
          scarlet: "Il se bat en envoyant des Baies particulièrement\nfermes, et il ne se pliera jamais aux ordres des\nDresseurs incapables de bien lancer une Poké Ball."
          violet: "Le chef du groupe choisit dix individus qui iront\nà la récolte avec lui. Ils partagent ensuite\nla nourriture équitablement avec les autres."
        it:
          scarlet: "Lotta lanciando delle durissime bacche. Non ne\nvuole sapere di dar retta agli Allenatori incapaci\ndi lanciare le Poké Ball."
          violet: "Il capo sceglie dieci esemplari per andare a\ncaccia. Le prede catturate vengono poi divise\nequamente con il resto del branco."
        de:
          scarlet: "Es kämpft, indem es harte Beeren wirft. Trainern,\ndie Pokébälle nicht gut werfen können, gehorcht\nes nicht."
          violet: "Der Anführer wählt zehn Gruppenmitglieder aus,\ndie auf die Jagd gehen und danach ihre Beute\ngerecht mit dem Rest der Gruppe teilen."
        es:
          scarlet: "Combaten lanzando bayas duras. Ignoran por\ncompleto a los Entrenadores que no saben lanzar\nuna Poké Ball correctamente."
          violet: "Solo diez integrantes de la manada elegidos\npor el líder salen de caza, pero comparten el\nbotín de forma equitativa con los demás."
        ko:
          scarlet: "단단한 나무열매를 던져서 싸운다.\n볼을 던지는 것이 어설픈\n트레이너의 명령은 듣지 않는다."
          violet: "보스가 고른 10마리로 사냥을 나가\n모아 온 먹이를 무리의 동료들과\n공평하게 나눠 먹는다."
        zh_simp:
          scarlet: "投出坚硬的树果战斗。\n若是投球技术差的训练家\n来下指示，它不会听从。"
          violet: "老大会选出１０只外出狩猎，\n并把它们带回来的食物\n平均分配给群体中的伙伴。"
        zh_trad:
          scarlet: "會投出堅硬的樹果戰鬥。\n不會聽從投球技術差勁的\n訓練家所下的指示。"
          violet: "老大會選出１０隻出外狩獵，\n並把牠們帶回來的食物\n平均分配給群體內的夥伴。"
