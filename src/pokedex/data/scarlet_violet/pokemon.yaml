          scarlet: "￹糸￺いと￻を　￹張￺は￻り￹巡￺めぐ￻らして　￹作￺つく￻った\n￹巣￺す￻に　￹獲物￺えもの￻が　￹引￺ひ￻っかかっても\n￹暗￺くら￻くなるまで　じっと　￹待￺ま￻っている。"
          violet: "￹丈夫￺じょうぶ￻な　￹糸￺いと￻を　より￹合￺あ￻わせ\n￹魚￺さかな￻ポケモンを　￹捕￺と￻らえる　￹網￺あみ￻を\nこしらえる　￹漁師￺りょうし￻も　いるぞ。"
        jp_kanji:
          scarlet: "￹糸￺いと￻を　￹張￺は￻り￹巡￺めぐ￻らして　￹作￺つく￻った\n￹巣￺す￻に　￹獲物￺えもの￻が　￹引￺ひ￻っかかっても\n￹暗￺くら￻くなるまで　じっと　￹待￺ま￻っている。"
          violet: "￹丈夫￺じょうぶ￻な　￹糸￺いと￻を　より￹合￺あ￻わせ\n￹魚￺さかな￻ポケモンを　￹捕￺と￻らえる　￹網￺あみ￻を\nこしらえる　￹漁師￺りょうし￻も　いるぞ。"
        en:
          scarlet: "Even while there are prey ensnared in its nest of\nspun thread, Spinarak will wait motionlessly until\ndarkness falls."
          violet: "Some fishers weave its sturdy thread into nets to\ncatch fish Pokémon."
        fr:
          scarlet: "Ce Pokémon attend la tombée de la nuit\nsans bouger, même si une proie est prise\nau piège dans sa toile."
          violet: "Certains pêcheurs se servent de ses fils solides\npour tisser des filets et attraper des Pokémon\npoissons."
        it:
          scarlet: "Se una preda rimane irretita nella sua tela,\nnon le si avvicina finché non cala la notte."
          violet: "Alcuni pescatori usano il suo filo resistente\nper fabbricare le reti con cui pescano\ni Pokémon acquatici."
        de:
          scarlet: "Selbst wenn sich Beute in seinem aus Fäden\ngesponnenen Nest verfängt, verharrt Webarak\nregungslos bis zum Einbruch der Nacht."
          violet: "Einige Fischer knüpfen sich aus seinem robusten\nFaden Netze, mit denen sie dann Fisch-Pokémon\nfangen."
        es:
          scarlet: "Espera inmóvil hasta que se hace de noche,\nincluso cuando hay una presa atrapada en la\ntelaraña que teje con su hilo."
          violet: "Algunos pescadores confeccionan redes para\npescar Pokémon pez con el robusto hilo que\nproduce Spinarak."
        ko:
          scarlet: "실을 둘러쳐서 만든 둥지에\n먹잇감이 걸리더라도\n어두워질 때까지 가만히 기다린다."
          violet: "튼튼한 실을 꼬아서\n물고기포켓몬을 잡는 그물을\n만드는 어부도 있다."
        zh_simp:
          scarlet: "即使有猎物被困在它用\n丝做成的巢里，它也会\n一动不动地等待到天黑。"
          violet: "有些渔夫会用其坚韧的丝，\n编织制作成可以捕捉鱼宝可梦的网。"
        zh_trad:
          scarlet: "就算有獵物落入了牠用絲\n布置的巢裡，牠也會一動也\n不動地等待到天黑才行動。"
          violet: "也有漁夫會將堅韌的絲\n編織起來，製作成可以\n捕捉魚寶可夢的網。"
