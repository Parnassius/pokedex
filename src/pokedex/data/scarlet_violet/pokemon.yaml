          scarlet: "￹力￺ちから￻を　￹蓄￺たくわ￻えるため　￹深￺ふか￻い\n￹海底￺かいてい￻で　￹眠￺ねむ￻っているらしい。\n￹目覚￺めざ￻めると　￹竜巻￺たつまき￻に　なるという。"
          violet: "どんな　￹生￺い￻き￹物￺もの￻も　￹降￺お￻りられない\n￹深￺ふか￻い　￹海￺うみ￻の￹底￺そこ￻で　￹眠￺ねむ￻りながら\n￹力￺ちから￻を　￹蓄￺たくわ￻えている　という。"
        jp_kanji:
          scarlet: "￹力￺ちから￻を　￹蓄￺たくわ￻えるため　￹深￺ふか￻い\n￹海底￺かいてい￻で　￹眠￺ねむ￻っているらしい。\n￹目覚￺めざ￻めると　￹竜巻￺たつまき￻に　なるという。"
          violet: "どんな　￹生￺い￻き￹物￺もの￻も　￹降￺お￻りられない\n￹深￺ふか￻い　￹海￺うみ￻の￹底￺そこ￻で　￹眠￺ねむ￻りながら\n￹力￺ちから￻を　￹蓄￺たくわ￻えている　という。"
        en:
          scarlet: "It sleeps deep on the ocean floor to build its\nenergy. It is said to cause tornadoes as it wakes."
          violet: "This Pokémon is said to sleep at the bottom of\nthe sea—deeper than any other life-form can\ndescend—building its energy."
        fr:
          scarlet: "On raconte qu’il dort au plus profond de l’océan\npour accumuler de l’énergie, et qu’à son réveil,\nil déclenche une tornade."
          violet: "On dit qu’il emmagasine de l’énergie en dormant\nau plus profond des océans, là où nul autre\nêtre vivant ne peut s’aventurer."
        it:
          scarlet: "Si dice che dorma sul fondo dell’oceano\nper ricaricarsi di energia e che svegliandosi\nprovochi uragani."
          violet: "Si dice che accumuli energia dormendo\nsott’acqua, a profondità proibitive\nper ogni altra forma di vita."
        de:
          scarlet: "Es soll tief unten am Meeresboden schlafen,\num Kraft zu sammeln. Man sagt, wenn es\naufwacht, löse es einen Tornado aus."
          violet: "Dieses Pokémon soll Kraft sammeln, indem es\nin Meerestiefen schläft, in die kein anderes\nLebewesen vordringen kann."
        es:
          scarlet: "Se dice que duerme en el fondo del océano\npara recargar energía y que crea remolinos\ncuando despierta."
          violet: "Se dice que recarga energía durmiendo en los\nrincones más profundos del océano, allí donde\nningún otro ser puede llegar."
        ko:
          scarlet: "힘을 비축하기 위해\n깊은 해저에서 잠들어 있는 듯하다.\n눈을 뜨면 회오리를 일으킨다고 전해진다."
          violet: "어떤 생물도 접근할 수 없는\n깊은 해저에서 자면서\n힘을 비축하고 있다고 한다."
        zh_simp:
          scarlet: "似乎会为了积蓄力量\n而在深深的海底沉睡。\n据说醒来时会刮起龙卷风。"
          violet: "据说它会沉睡在任何生物\n都无法潜到的深海底部积蓄力量。"
        zh_trad:
          scarlet: "似乎會在深海的海底沉睡，\n藉此積蓄自身的力量。據說，\n當牠醒來就會刮起龍捲風。"
          violet: "據說牠會沉睡在\n任何生物都無法潛到的\n深海底部積蓄力量。"
