          violet: "エサの　￹豊富￺ほうふ￻な　￹水辺￺みずべ￻を　￹好￺この￻む。\n￹鳥￺とり￻ポケモンと　エサの　￹取￺と￻り￹合￺あ￻いを\nしないように　￹夜行性￺やこうせい￻になった。"
        jp_kanji:
          scarlet: "キタカミの　￹古￺ふる￻い　￹伝承￺でんしょう￻には\nいたずら￹好￺ず￻きの　￹子供￺こども￻が　ポケモンに\n￹生￺う￻まれ￹変￺か￻わったと　￹記￺しる￻されている。"
          violet: "エサの　￹豊富￺ほうふ￻な　￹水辺￺みずべ￻を　￹好￺この￻む。\n￹鳥￺とり￻ポケモンと　エサの　￹取￺と￻り￹合￺あ￻いを\nしないように　￹夜行性￺やこうせい￻になった。"
        en:
          scarlet: "Old folklore in Kitakami tells of a mischievous\nchild who was reborn as a Pokémon."
          violet: "It prefers waterfronts with plentiful food.\nIt became nocturnal so it wouldn’t have to\ncompete for food with bird Pokémon."
        fr:
          scarlet: "D’après d’anciennes légendes de Septentria,\nce Pokémon serait la réincarnation d’un enfant\nfarceur."
          violet: "Il aime les berges abondantes en nourriture\net il est devenu nocturne pour ne pas avoir\nà disputer ses repas aux Pokémon oiseaux."
        it:
          scarlet: "Secondo un’antica leggenda di Nordivia,\nquesto Pokémon sarebbe la reincarnazione\ndi un bambino dispettoso."
          violet: "Ama gli specchi d’acqua ricchi di cibo.\nÈ diventato notturno per non doverselo\ncontendere con i Pokémon alati."
        de:
          scarlet: "Einer alten Legende aus Kitakami zufolge soll es\nsich bei Lombrero um die Wiedergeburt eines\nKindes handeln, das gerne Schabernack trieb."
          violet: "Es bevorzugt Ufer, an denen es viel Futter findet.\nUm sich nicht mit Vogel-Pokémon darum streiten\nzu müssen, wurde es nachtaktiv."
        es:
          scarlet: "En las antiguas leyendas de Noroteo se cuenta\nque es la reencarnación de un niño amante de\nlas travesuras."
          violet: "Siente predilección por las riberas donde abunda\nel alimento. Se volvió nocturno para no tener\nque competir por él con los Pokémon pájaro."
        ko:
          scarlet: "북신의 오랜 전승에 의하면\n장난꾸러기 아이가 포켓몬으로\n다시 태어난 것이라고 기록되어 있다."
          violet: "먹이가 풍부한 물가를 선호한다.\n새포켓몬과 먹이를 두고\n싸우지 않기 위해 야행성이 되었다."
        zh_simp:
          scarlet: "根据北上的古老传说记载，\n这是喜爱恶作剧的小孩\n转生而来的宝可梦。"
          violet: "喜欢待在食物丰富的水边。\n为了不和鸟宝可梦争夺食物\n而变成了夜行性的宝可梦。"
        zh_trad:
          scarlet: "北上的古老傳說記載著\n牠是喜歡惡作劇的小孩\n轉生而來的寶可夢。"
          violet: "喜歡待在食物豐富的水邊。\n為了避免和鳥寶可夢互搶食物，\n於是變成了夜行性的寶可夢。"
