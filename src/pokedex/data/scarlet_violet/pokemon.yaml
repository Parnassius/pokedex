      descriptions:
        jp_kana:
          scarlet: "￹欲望￺よくぼう￻と　￹能力￺のうりょく￻を　￹引￺ひ￻き￹出￺だ￻す\n￹毒素￺どくそ￻の　￹餅￺もち￻を　￹食￺た￻べさせて　￹食￺た￻べた\n￹相手￺あいて￻を　￹鎖￺くさり￻で　￹操￺あやつ￻るのだ。"
          violet: "モモ￹型￺がた￻の　￹殻￺から￻は　￹猛毒￺もうどく￻の\n￹貯蔵庫￺ちょぞうこ￻。　￹毒￺どく￻の　￹餅￺もち￻を　￹作￺つく￻り\n￹人￺ひと￻や　ポケモンに　ふるまう。"
        jp_kanji:
          scarlet: "￹欲望￺よくぼう￻と　￹能力￺のうりょく￻を　￹引￺ひ￻き￹出￺だ￻す\n￹毒素￺どくそ￻の　￹餅￺もち￻を　￹食￺た￻べさせて　￹食￺た￻べた\n￹相手￺あいて￻を　￹鎖￺くさり￻で　￹操￺あやつ￻るのだ。"
          violet: "モモ￹型￺がた￻の　￹殻￺から￻は　￹猛毒￺もうどく￻の\n￹貯蔵庫￺ちょぞうこ￻。　￹毒￺どく￻の　￹餅￺もち￻を　￹作￺つく￻り\n￹人￺ひと￻や　ポケモンに　ふるまう。"
        en:
          scarlet: "It feeds others toxic mochi that draw out desires\nand capabilities. Those who eat the mochi fall\nunder Pecharunt’s control, chained to its will."
          violet: "Its peach-shaped shell serves as storage for\na potent poison. It makes poisonous mochi\nand serves them to people and Pokémon."
        fr:
          scarlet: "Il fait manger à sa cible un mochi empoisonné\nqui éveille les désirs et révèle le potentiel.\nIl la contrôle ensuite grâce à ses chaînes."
          violet: "Il conserve du poison dans sa carapace en forme\nde pêche. Il s’en sert pour préparer des mochis\nqu’il donne aux êtres humains et aux Pokémon."
        it:
          scarlet: "Fa mangiare alle sue vittime dei mochi tossici\nche ne risvegliano il potenziale e i desideri, per\npoi controllarle con una catena."
          violet: "Nel guscio a forma di pesca conserva un potente\nveleno con cui prepara dei mochi tossici che\noffre a persone e Pokémon."
        de:
          scarlet: "Es gibt anderen giftige Mochi zu essen,\ndie Kräfte und Begierden wecken, kettet sie\nso an sich und kontrolliert sie."
          violet: "In der wie ein Pfirsich geformten Schale speichert\nes Gift und stellt daraus giftige Mochi her, die es\nMenschen und Pokémon anbietet."
        es:
          scarlet: "Hace comer a su objetivo un mochi tóxico que\nsaca a relucir todo su potencial y su ambición,\npara después controlarlo con sus cadenas."
          violet: "Su caparazón con forma de melocotón alberga\nun potente veneno con el que prepara un mochi\ntóxico que ofrece a humanos y Pokémon."
        ko:
          scarlet: "욕망과 능력을 끌어올리는\n독소로 된 떡을 먹이고\n먹은 상대를 사슬로 조종한다."
          violet: "복숭아처럼 생긴 껍질은 그야말로\n맹독의 저장고다. 독이 든 떡을 만들어서\n사람과 포켓몬에게 대접한다."
        zh_simp:
          scarlet: "会让对手吃下能提升\n欲望和能力的毒粘糕，\n然后通过锁链控制对手。"
          violet: "桃形的壳是剧毒的储存库。\n会制作毒粘糕来款待人和宝可梦。"
        zh_trad:
          scarlet: "會讓對手吃下能激發\n慾望與能力的毒素麻糬，\n然後用鎖鏈來操控對手。"
          violet: "桃形的殼是劇毒的儲藏庫。\n會製作帶毒的麻糬\n送給人和寶可夢吃。"
