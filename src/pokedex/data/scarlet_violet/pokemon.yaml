      descriptions:
        jp_kana:
          scarlet: "￹先頭￺せんとう￻に　￹立￺た￻って　￹指示￺しじ￻を　￹出￺だ￻す\nヘイチョーは　６￹匹￺ぴき￻の　￹中￺なか￻で\nいちばん　￹強￺つよ￻くて　￹賢￺かしこ￻いのだ。"
          violet: "￹伸縮￺しんしゅく￻する　ツノで　ヘイチョーと\n￹呼￺よ￻ばれる　リーダーが　￹陣形￺じんけい￻を\n￹組￺く￻み￹替￺か￻える　￹指示￺しじ￻を　￹出￺だ￻しているぞ。"
        jp_kanji:
          scarlet: "￹先頭￺せんとう￻に　￹立￺た￻って　￹指示￺しじ￻を　￹出￺だ￻す\nヘイチョーは　６￹匹￺ぴき￻の　￹中￺なか￻で\nいちばん　￹強￺つよ￻くて　￹賢￺かしこ￻いのだ。"
          violet: "￹伸縮￺しんしゅく￻する　ツノで　ヘイチョーと\n￹呼￺よ￻ばれる　リーダーが　￹陣形￺じんけい￻を\n￹組￺く￻み￹替￺か￻える　￹指示￺しじ￻を　￹出￺だ￻しているぞ。"
        en:
          scarlet: "The brass, which is the one that stands at the\nfront and issues orders, is the strongest and\nsmartest of the six."
          violet: "The leader, known as the brass, uses its\nextendible horn to issue orders to the\nothers when it’s time to change formation."
        fr:
          scarlet: "Le chef se situe en tête et donne des ordres\naux autres. C’est le plus fort et le plus intelligent\ndes six."
          violet: "À l’aide de sa corne extensible, le chef donne\ndes ordres aux autres et leur fait changer de\nformation."
        it:
          scarlet: "L’elemento che sta davanti e che\ndà ordini al gruppo è il più forte\ne intelligente tra i sei."
          violet: "L’elemento che viene considerato il capo\nusa il proprio corno estensibile per indicare\nal gruppo in che tipo di formazione schierarsi."
        de:
          scarlet: "Der Anführer steht an erster Stelle und gibt\ndie Befehle. Er ist das stärkste und schlauste\nGlied dieses sechsteiligen Pokémon."
          violet: "Mit seinem ausfahrbaren Horn gibt der\nAnführer Befehle zur Formationsänderung."
        es:
          scarlet: "El líder, que es el más fuerte e inteligente\nde los seis, se encuentra al frente y da\nórdenes a los demás."
          violet: "El líder utiliza su cuerno, capaz de\nexpandirse y contraerse, para ordenar\na los demás que cambien la formación."
        ko:
          scarlet: "선두에 서서 지시를 내리는\n리더는 6마리 중에서\n가장 강하고 똑똑하다."
          violet: "늘었다 줄었다 하는 뿔을 이용해\n리더가 진형을 바꾸는 지시를 내린다."
        zh_simp:
          scarlet: "站在最前方下达指令的\n头头是６只里边\n最强最聪明的。"
          violet: "被称为头头的队长\n会用可伸缩的角\n做出变换阵型的指令。"
        zh_trad:
          scarlet: "站在最前面下達指示\n的頭頭是６隻裡面\n最強最聰明的。"
          violet: "被稱為頭頭的隊長\n會用可伸縮的角\n做出變換陣形的指令。"
