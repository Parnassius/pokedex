        speed: 1
      types:
        - normal
        - flying
      egg_groups:
        - flying
      abilities:
        - big_pecks
      hidden_ability: gale_wings
      descriptions:
        jp_kana:
          scarlet: "￹普段￺ふだん￻は　￹穏￺おだ￻やかな　￹気性￺きしょう￻だが\n￹戦￺たたか￻いになると　ホルモンバランスが\n￹変￺か￻わり　￹攻撃的￺こうげきてき￻になる。"
          violet: "￹野山￺のやま￻や　￹街中￺まちなか￻で　￹生活￺せいかつ￻する。\nイキリンコと　￹縄張￺なわば￻りを　￹争￺あらそ￻い\n￹街中￺まちなか￻で　￹大乱闘￺だいらんとう￻になった。"
        jp_kanji:
          scarlet: "￹普段￺ふだん￻は　￹穏￺おだ￻やかな　￹気性￺きしょう￻だが\n￹戦￺たたか￻いになると　ホルモンバランスが\n￹変￺か￻わり　￹攻撃的￺こうげきてき￻になる。"
          violet: "￹野山￺のやま￻や　￹街中￺まちなか￻で　￹生活￺せいかつ￻する。\nイキリンコと　￹縄張￺なわば￻りを　￹争￺あらそ￻い\n￹街中￺まちなか￻で　￹大乱闘￺だいらんとう￻になった。"
        en:
          scarlet: "This Pokémon is normally calm, but once it\nenters battle, its hormonal balance changes\nand it becomes aggressive."
          violet: "Fletchling can be found in both rural and urban\nareas. They once had a huge territorial dispute\nwith Squawkabilly. Fights broke out all over town."
        fr:
          scarlet: "Il a un tempérament généralement calme,\nmais son équilibre hormonal se modifie\nlors des combats et le rend plus agressif."
          violet: "Ils vivent dans les zones rurales et urbaines.\nLeurs conflits territoriaux avec les Tapatoès\nont mis des villes sens dessus dessous."
        it:
          scarlet: "Di solito ha un’indole molto tranquilla,\nma quando lotta il suo equilibrio ormonale\ncambia, rendendolo aggressivo."
          violet: "I Fletchling vivono sia in campagna che in città.\nUna contesa territoriale con gli Squawkabilly\nè sfociata in una grande rissa per la città."
        de:
          scarlet: "Normalerweise sind Dartiri friedfertig, doch wenn\nsie kämpfen, ändert sich ihr Hormonhaushalt und\nsie werden angriffslustig."
          violet: "Sie leben sowohl in der freien Natur als auch in\nStädten. Ein heftiger Revierstreit mit Krawalloro\nhat einmal eine ganze Stadt auf den Kopf gestellt."
        es:
          scarlet: "Por lo general se muestra calmado, pero, al\nentrar en combate, su equilibrio hormonal se\naltera y se vuelve agresivo."
          violet: "Vive en entornos tanto rurales como urbanos.\nSus disputas territoriales con los Squawkabilly\nhan causado auténticos estragos en las ciudades."
        ko:
          scarlet: "평소에는 온순하지만\n싸움에 들어가면 호르몬의\n균형이 바뀌어 공격적이게 된다."
          violet: "산과 들이나 마을에서 생활한다.\n시비꼬와 영역을 두고\n마을에서 대난투를 벌이기도 했다."
        zh_simp:
          scarlet: "平时性情温和，但在进入战斗后，\n荷尔蒙的平衡会发生变化，\n从而让它变得具有攻击性。"
          violet: "在山野间和街上生活。\n因为与怒鹦哥争地盘，\n而在街上展开大混战。"
        zh_trad:
          scarlet: "平時性情溫和，但在戰鬥\n開始後，荷爾蒙的平衡會\n發生變化而變得具有攻擊性。"
          violet: "在山野中和街上生活。\n曾為了與怒鸚哥爭地盤，\n而在街上展開了大混戰。"
