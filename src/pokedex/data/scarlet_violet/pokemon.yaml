          violet: "￹顔￺かお￻の　￹氷￺こおり￻は　￹舐￺な￻めると　ほんのり\nしょっぱい。　￹海流￺かいりゅう￻に　￹乗￺の￻って\n￹遠￺とお￻くの　￹寒￺さむ￻い　￹土地￺とち￻から　￹来￺き￻た。"
        en:
          scarlet: "On hot days, these Pokémon press their ice cube\nheads together and pass the time cooling each\nother down."
          violet: "If you lick the ice covering its face, you’ll find it\nhas a faintly salty taste. This species rode here on\nocean currents from a cold, faraway land."
        fr:
          scarlet: "Les jours de chaleur, ils collent leurs têtes\nde glace les unes aux autres pour se rafraîchir."
          violet: "Originaire de terres lointaines et froides, il a\nvoyagé jusqu’ici grâce aux courants marins.\nLa glace sur sa tête est légèrement salée."
        it:
          scarlet: "Trascorrono i giorni più caldi in gruppo, tenendo\nattaccati insieme i blocchi di ghiaccio sulle\nteste per raffreddarsi a vicenda."
          violet: "Il ghiaccio della testa ha un gusto leggermente\nsalato. È giunto da una lontana terra gelida\ntrasportato dalle correnti marine."
        de:
          scarlet: "An heißen Tagen stecken diese Pokémon ihre\neisigen Köpfe zusammen, um sich gegenseitig\nabzukühlen."
          violet: "Das Eis um seinen Kopf schmeckt leicht salzig.\nMithilfe von Meeresströmungen ist es aus einer\nweit entfernten, kalten Region hergekommen."
        es:
          scarlet: "En días calurosos, se reúne con sus congéneres\ny juntan el hielo de la cabeza para refrescarse\nlos unos a los otros."
          violet: "El hielo que le recubre la cara es ligeramente\nsalado. Llegó desde unas lejanas tierras gélidas\ntransportado por las corrientes marinas."
        ko:
          scarlet: "기온이 높은 날에는 동료들끼리\n머리의 얼음을 맞대어\n서로를 시원하게 하며 지낸다."
          violet: "얼굴의 얼음을 핥아 보면 살짝 짜다.\n멀리 떨어진 추운 땅에서\n해류를 타고 왔다."
        zh_simp:
          scarlet: "在高温的日子里，伙伴之间\n会互相紧贴着头上的冰块，\n借此来给彼此降温度日。"
          violet: "脸部的冰块舔起来略带咸味。\n它是乘着海流从遥远的\n寒冷地带来到这里的。"
        zh_trad:
          scarlet: "在氣溫高的日子裡，會把\n頭的冰塊和夥伴們的緊貼\n在一起，冰鎮彼此來度日。"
          violet: "臉的冰塊舔起來略帶鹹味。\n牠是乘著海流從遙遠的\n寒冷地帶來到這裡的。"
