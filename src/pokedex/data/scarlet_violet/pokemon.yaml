      descriptions:
        jp_kana:
          scarlet: "￹毒￺どく￻の　￹胞子￺ほうし￻を　ばらまき\n￹吸￺す￻いこんで　￹苦￺くる￻しむ　￹相手￺あいて￻に\n￹強烈￺きょうれつ￻な　パンチを　くらわせる。"
          violet: "￹尻尾￺しっぽ￻の　タネは　￹毒￺どく￻の　￹胞子￺ほうし￻で\nできている。　￹動￺うご￻きが　￹見￺み￻えないほど\n￹素早￺すばや￻い　パンチで　￹敵￺てき￻を　￹倒￺たお￻す。"
        jp_kanji:
          scarlet: "￹毒￺どく￻の　￹胞子￺ほうし￻を　ばらまき\n￹吸￺す￻いこんで　￹苦￺くる￻しむ　￹相手￺あいて￻に\n￹強烈￺きょうれつ￻な　パンチを　くらわせる。"
          violet: "￹尻尾￺しっぽ￻の　タネは　￹毒￺どく￻の　￹胞子￺ほうし￻で\nできている。　￹動￺うご￻きが　￹見￺み￻えないほど\n￹素早￺すばや￻い　パンチで　￹敵￺てき￻を　￹倒￺たお￻す。"
        en:
          scarlet: "It scatters poisonous spores and throws\npowerful punches while its foe is hampered\nby inhaled spores."
          violet: "The seeds on its tail are made of toxic spores.\nIt knocks out foes with quick, virtually invisible\npunches."
        fr:
          scarlet: "Il disperse des spores toxiques et frappe ses\nadversaires de toutes ses forces, alors qu’ils\nsouffrent déjà après avoir inhalé le poison."
          violet: "Il assomme ses adversaires avec des coups si\nrapides qu’ils sont invisibles à l’œil nu. Les graines\nsur sa queue sont constituées de spores toxiques."
        it:
          scarlet: "Dopo aver fatto respirare le sue spore tossiche\nal nemico, lo finisce con una violenta scarica\ndi pugni."
          violet: "I semi sulla coda sono costituiti da spore\ntossiche. Abbatte i nemici con pugni\nrapidissimi, praticamente invisibili."
        de:
          scarlet: "Erst lässt es den Gegner die giftigen Sporen\neinatmen, die es verstreut hat, dann traktiert\nes ihn mit heftigen Boxschlägen."
          violet: "Die Samen an seiner Rute bestehen aus giftigen\nSporen. Es besiegt Gegner mit schnellen, nahezu\nunsichtbaren Schlägen."
        es:
          scarlet: "Esparce esporas venenosas muy nocivas que\naturden a sus enemigos al inhalarlas y luego les\nasesta puñetazos de gran intensidad."
          violet: "Las semillas de la cola contienen esporas tóxicas.\nVence al rival dándole puñetazos tan rápidos que\nson casi invisibles."
        ko:
          scarlet: "독 포자를 뿌려\n들이마시고 괴로워하는 상대에게\n강렬한 펀치를 날린다."
          violet: "꼬리의 씨앗은 독 포자로 되어 있다.\n움직임이 보이지 않을 정도로\n재빠른 펀치로 상대를 쓰러뜨린다."
        zh_simp:
          scarlet: "会撒出毒孢子，然后再让\n因吸入孢子而苦痛不堪的\n对手吃上一记重拳。"
          violet: "尾巴上的种子是由毒孢子\n构成的。会以肉眼无法\n看清的速度出拳打倒敌人。"
        zh_trad:
          scarlet: "會撒出毒孢子，然後再讓\n因吸入孢子而痛苦不堪的\n對手吃上一記重拳。"
          violet: "尾巴上的種子是由毒孢子\n所構成的。會以肉眼無法\n看清的速度出拳打倒敵人。"
