        jp_kana:
          scarlet: "￹体内￺たいない￻で　￹圧縮￺あっしゅく￻させた\nガスを　￹勢￺いきお￻いよく　￹噴出￺ふんしゅつ￻させ\n￹飛￺と￻んで　￹暴￺あば￻れまわる　サナギだ。"
          violet: "￹岩盤￺がんばん￻のような　￹硬￺かた￻い　￹殻￺から￻に\n￹覆￺おお￻われているが　￹力￺ちから￻は　￹強￺つよ￻く\n￹暴￺あば￻れると　￹山￺やま￻も　￹崩￺くず￻れてしまう。"
        jp_kanji:
          scarlet: "￹体内￺たいない￻で　￹圧縮￺あっしゅく￻させた\nガスを　￹勢￺いきお￻いよく　￹噴出￺ふんしゅつ￻させ\n￹飛￺と￻んで　￹暴￺あば￻れまわる　サナギだ。"
          violet: "￹岩盤￺がんばん￻のような　￹硬￺かた￻い　￹殻￺から￻に\n￹覆￺おお￻われているが　￹力￺ちから￻は　￹強￺つよ￻く\n￹暴￺あば￻れると　￹山￺やま￻も　￹崩￺くず￻れてしまう。"
        en:
          scarlet: "This pupa flies around wildly by venting with\ngreat force the gas pressurized inside its body."
          violet: "Its shell is as hard as bedrock, and it is also very\nstrong. Its thrashing can topple a mountain."
        fr:
          scarlet: "Cette chrysalide file comme une fusée en\nexpulsant les gaz sous pression enfermés dans\nson corps, sans pouvoir contrôler sa trajectoire."
          violet: "Il est très fort, et sa carapace est aussi dure\nque la pierre. Lorsqu’il est furieux, ses coups\npeuvent raser une montagne."
        it:
          scarlet: "È una crisalide che vola furiosamente qua e là,\nespellendo con forza il gas compresso all’interno\ndel proprio corpo."
          violet: "Il suo corpo è ricoperto da un guscio duro come\nla roccia ed è molto forte. Quando si infuria,\nè capace di abbattere persino una montagna."
        de:
          scarlet: "Diese Puppe katapultiert sich in die Luft, indem\nsie Gas ausstößt, das sich in ihrem Körper\nangestaut hat, und sorgt so für Unruhe."
          violet: "Es ist sehr stark und hat einen steinharten Panzer.\nGerät es außer Kontrolle, kann es Berge dem\nErdboden gleichmachen."
        es:
          scarlet: "Esta pupa vuela propulsándose con los gases\nsometidos a altas presiones que encierra en\nel interior de su cuerpo."
          violet: "Su caparazón es duro como una piedra y muy\nresistente. Sus golpes pueden derribar montañas."
        ko:
          scarlet: "체내에서 압축한 가스를\n기세 좋게 분출시켜 날며\n난동을 피우는 번데기."
          violet: "암반 같은 단단한 껍질로\n둘러싸여 있지만 힘이 강해서\n난동을 부리면 산도 무너져 버린다."
        zh_simp:
          scarlet: "这种蛹会猛烈地喷出\n在体内压缩好的气体，\n让自己飞起来搞破坏。"
          violet: "虽然全身覆盖着岩盘一样的硬壳，\n但它力量强大，发狂后连山都会崩塌。"
        zh_trad:
          scarlet: "會以強勁的力道噴出在體內\n壓縮好的氣體，好讓自己\n能飛在空中大搞破壞的蛹。"
          violet: "雖然全身覆蓋著岩盤般的硬殼，\n但牠的力量十分強大，\n發狂時連山都會崩塌。"
