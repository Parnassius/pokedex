          violet: "￹大軍勢￺だいぐんぜい￻を　￹率￺ひき￻いて　￹戦￺たたか￻うが\n￹難￺むずか￻しい　￹作戦￺さくせん￻は　￹苦手￺にがて￻なので\n￹力￺ちから￻で　￹押￺お￻して　￹押￺お￻しまくるだけ。"
        jp_kanji:
          scarlet: "ドドゲザンに　￹進化￺しんか￻できるのは\n￹大軍勢￺だいぐんぜい￻の　￹頂点￺ちょうてん￻に　￹立￺た￻った\n１￹匹￺ぴき￻の　キリキザンだけなのだ。"
          violet: "￹大軍勢￺だいぐんぜい￻を　￹率￺ひき￻いて　￹戦￺たたか￻うが\n￹難￺むずか￻しい　￹作戦￺さくせん￻は　￹苦手￺にがて￻なので\n￹力￺ちから￻で　￹押￺お￻して　￹押￺お￻しまくるだけ。"
        en:
          scarlet: "Only a Bisharp that stands above all others in\nits vast army can evolve into Kingambit."
          violet: "Though it commands a massive army in battle,\nit’s not skilled at devising complex strategies.\nIt just uses brute strength to keep pushing."
        fr:
          scarlet: "Seul un Scalproie qui s’est hissé au plus haut\nrang d’une grande armée peut évoluer en\nScalpereur."
          violet: "Ce Pokémon commande une grande armée,\nmais c’est un piètre stratège. Il s’obstine donc\nà recourir à la force brute."
        it:
          scarlet: "Solo il Bisharp che si erge alla vetta\ndella propria armata può evolversi\nin Kingambit."
          violet: "Lotta al comando di un grande battaglione,\nma non è bravo a escogitare strategie sofisticate,\nperciò si limita a usare la forza bruta."
        de:
          scarlet: "Allein das Caesurio an der Spitze seiner riesigen\nArmee kann sich zu Gladimperio entwickeln."
          violet: "Es führt eine große Armee in den Kampf.\nDa es jedoch kein guter Stratege ist, muss es\nsich letztendlich auf rohe Gewalt verlassen."
        es:
          scarlet: "Solo el Bisharp más destacado entre las\nfilas de cada gran ejército tiene el honor\nde evolucionar a Kingambit."
          violet: "Cuenta con un enorme ejército a sus órdenes.\nSin embargo, debido a sus escasas dotes como\nestratega, termina recurriendo a la fuerza bruta."
        ko:
          scarlet: "큰 군세의 정점에 올라선\n단 한 마리의 절각참만이\n대도각참으로 진화할 수 있다."
          violet: "큰 군세를 이끌고 싸우나\n어려운 작전을 세우는 데는 재주가 없어서\n그저 힘으로 밀어붙이려고만 한다."
        zh_simp:
          scarlet: "在气势磅礴的军团中，只有\n站上顶点的那只劈斩司令\n才能进化成仆刀将军。"
          violet: "会引领大军来战斗，\n却不擅长困难的战术，\n只会用蛮力来压制对手。"
        zh_trad:
          scarlet: "在勢力浩大的軍團中，唯有\n站上頂點的那１隻劈斬司令，\n才能進化成仆斬將軍。"
          violet: "會引領大軍戰鬥，\n卻不擅長有難度的戰術，\n只會靠蠻力來壓制對手。"
