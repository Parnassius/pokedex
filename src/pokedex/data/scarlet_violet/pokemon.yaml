        jp_kanji:
          scarlet: "￹流￺なが￻れるような　￹連続攻撃￺れんぞくこうげき￻を\n￹繰￺く￻り￹出￺だ￻して　￹敵￺てき￻を　￹圧倒￺あっとう￻する。\n￹鋭￺するど￻い　ツメで　￹敵￺てき￻を　￹切￺き￻り￹裂￺さ￻く。"
          violet: "￹山奥￺やまおく￻に　こもり　￹群￺む￻れの　￹仲間￺なかま￻と\n￹修行￺しゅぎょう￻に　￹励￺はげ￻む。　￹群￺む￻れによって\nキックや　チョップの￹型￺かた￻が　￹違￺ちが￻う。"
        en:
          scarlet: "In fights, they dominate with onslaughts of\nflowing, continuous attacks. With their sharp\nclaws, they cut enemies."
          violet: "They seclude themselves in the mountains and\ndevote themselves to training. The form of their\nkicks and chops differs from pack to pack."
        fr:
          scarlet: "Il domine ses adversaires avec des enchaînements\nde coups fluides, et il les découpe à l’aide de ses\ngriffes acérées."
          violet: "Il se retire en montagne pour s’entraîner avec\nses congénères. Les techniques de coups de pied\nou de coups de poing varient selon les meutes."
        it:
          scarlet: "Soggioga il nemico con una raffica incessante\ndi attacchi e lo fa a brandelli con le unghie\naffilate."
          violet: "Si ritira sui monti per allenarsi assieme ai suoi\ncompagni. Ogni gruppo sviluppa tecniche\ndi calci e pugni diverse."
        de:
          scarlet: "Es überwältigt seine Feinde mit einer Serie aus\ngeschmeidigen Attacken und schlitzt sie mit\nseinen spitzen Klauen auf."
          violet: "Mit seiner Gruppe zieht es sich tief in die Berge\nzurück, um dort zu trainieren. Jede der Gruppen\nentwickelt eigene Schlag- und Tritt-Techniken."
        es:
          scarlet: "Abruma a sus enemigos encadenando ataques\nveloces y los hace trizas con sus afiladas garras."
          violet: "Suele recluirse con otros congéneres en las\nmontañas para entrenar. Según el grupo, la\ntécnica de sus patadas o puñetazos varía."
        ko:
          scarlet: "물 흐르는 듯한 연속 공격을\n펼쳐서 상대를 압도한다.\n날카로운 손톱으로 상대를 베어 가른다."
          violet: "산속에 들어가 무리의 동료와\n수행에 힘쓴다. 무리에 따라\n킥이나 촙의 방식이 다르다."
        zh_simp:
          scarlet: "使出行云流水般的\n连续攻击压倒敌人。\n用锋利的爪子将敌人撕裂。"
          violet: "在山中闭关，与群体的伙伴们潜心修行。\n根据群体的不同，\n踢和劈的技法也不一样。"
        zh_trad:
          scarlet: "使出行雲流水般的連續攻擊，\n壓制並打倒敵人。\n會用銳利的爪子將敵人撕裂。"
          violet: "與群體的夥伴們一起在深山裡\n閉關修行。不同的群體有著不同的\n踢腿和手刀技法。"
