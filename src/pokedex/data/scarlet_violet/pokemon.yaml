        jp_kana:
          scarlet: "￹大￺おお￻きな　￹葉￺は￻っぱの　￹下￺した￻に\n￹数匹￺すうひき￻の　ユキワラシが　￹集￺あつ￻まり\n￹仲良￺なかよ￻く　￹暮￺く￻らしているという。"
          violet: "ユキワラシが　￹訪￺おとず￻れた　￹家￺いえ￻は\nお￹金持￺かねも￻ちに　なると　￹言￺い￻われている。\nマイナス　１００￹度￺ど￻でも　へっちゃら。"
        jp_kanji:
          scarlet: "￹大￺おお￻きな　￹葉￺は￻っぱの　￹下￺した￻に\n￹数匹￺すうひき￻の　ユキワラシが　￹集￺あつ￻まり\n￹仲良￺なかよ￻く　￹暮￺く￻らしているという。"
          violet: "ユキワラシが　￹訪￺おとず￻れた　￹家￺いえ￻は\nお￹金持￺かねも￻ちに　なると　￹言￺い￻われている。\nマイナス　１００￹度￺ど￻でも　へっちゃら。"
        en:
          scarlet: "It is said that several Snorunt gather under giant\nleaves and live together in harmony."
          violet: "It is said that a home visited by a Snorunt will\nprosper. It can withstand cold of −150 degrees\nFahrenheit."
        fr:
          scarlet: "On dit qu’ils vivent en groupe et en harmonie\nsous des feuilles gigantesques."
          violet: "Stalgamin peut supporter une température de\n-100 °C. On raconte qu’il apporte la prospérité\naux maisons qu’il visite."
        it:
          scarlet: "Si dice che vivano in armonia riunendosi in gruppi\nall’ombra di enormi foglie."
          violet: "Si dice che Snorunt porti prosperità nelle case\nche visita. Può resistere a una temperatura\ndi -100 ºC."
        de:
          scarlet: "Gerüchten zufolge versammeln sich Schneppke\nunter riesigen Blättern und leben dort friedlich\nzusammen."
          violet: "Man sagt, dass Schneppke den Häusern, die es\nbesucht, Wohlstand bringt. Es kann Kälte von bis\nzu −100 ℃ ohne Weiteres überstehen."
        es:
          scarlet: "Se dice que se reúnen en grupos bajo hojas\ngigantescas y viven allí en total armonía."
          violet: "Dicen que los hogares que reciben la visita\nde un Snorunt prosperan. Puede soportar\ntemperaturas de -100 ºC."
        ko:
          scarlet: "커다란 잎사귀 아래서\n여러 마리의 눈꼬마가 모여\n사이좋게 살고 있다고 한다."
          violet: "눈꼬마가 찾아온 집은\n부자가 된다고 전해진다.\n영하 100도에도 끄떡없다."
        zh_simp:
          scarlet: "据说，好几只雪童子\n会聚集在大大的叶片底下，\n融洽地生活在一起。"
          violet: "据说雪童子造访过的\n家将会变得富裕。\n零下１００度也奈何不了它。"
        zh_trad:
          scarlet: "據說，好幾隻雪童子\n會聚集在大大的樹葉底下，\n融洽地生活在一起。"
          violet: "據說雪童子到訪過的家\n將會變得富有。對牠來說\n零下１００度根本不算什麼。"
