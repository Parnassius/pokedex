      descriptions:
        jp_kana:
          scarlet: "お￹腹￺なか￻の　ホタチを　￹小刀￺こがたな￻のように\n￹使￺つか￻って　￹敵￺てき￻の　￹技￺わざ￻を　￹受￺う￻けてから\n￹素早￺すばや￻く　￹切￺き￻り￹返￺かえ￻し　￹反撃￺はんげき￻する。"
          violet: "￹人￺ひと￻が　￹砥石￺といし￻を　￹使￺つか￻う　￹姿￺すがた￻を\n￹真似￺まね￻して　ホタチを　￹河原￺かわら￻の　￹石￺いし￻で\n￹手入￺てい￻れするようになったと　￹言￺い￻われる。"
        jp_kanji:
          scarlet: "お￹腹￺なか￻の　ホタチを　￹小刀￺こがたな￻のように\n￹使￺つか￻って　￹敵￺てき￻の　￹技￺わざ￻を　￹受￺う￻けてから\n￹素早￺すばや￻く　￹切￺き￻り￹返￺かえ￻し　￹反撃￺はんげき￻する。"
          violet: "￹人￺ひと￻が　￹砥石￺といし￻を　￹使￺つか￻う　￹姿￺すがた￻を\n￹真似￺まね￻して　ホタチを　￹河原￺かわら￻の　￹石￺いし￻で\n￹手入￺てい￻れするようになったと　￹言￺い￻われる。"
        en:
          scarlet: "It wields the scalchop on its stomach like a knife,\nblocking the moves of its enemies before slashing\nback at them in swift retaliation."
          violet: "It’s said that Oshawott learned to maintain its\nscalchop with riverbed stones by mimicking\nhumans it saw using whetstones."
        fr:
          scarlet: "Il manie le « coupillage » sur son ventre comme\nune petite lame et bloque les attaques avant de\nrépliquer en un éclair en tranchant l’adversaire."
          violet: "On dit que c’est pour imiter les gens utilisant une\npierre à aiguiser qu’il a commencé à affûter son\n« coupillage » sur les rochers le long des rivières."
        it:
          scarlet: "Usa la mollusciabola che ha sul ventre come una\npiccola spada: para le mosse degli avversari,\npoi li lacera con un rapido contrattacco."
          violet: "Si dice che abbia imparato ad affilare la sua\nmollusciabola con le pietre del greto dei fiumi\nosservando gli esseri umani usare una cote."
        de:
          scarlet: "Es setzt die Muschel an seinem Bauch als Messer\nein. Mit ihr wehrt es gegnerische Attacken ab und\nschlägt dann sofort zurück."
          violet: "Angeblich fing es an, seine Muschel mit Steinen\naus Flüssen in Stand zu halten, nachdem es sah,\nwie Menschen Wetzsteine nutzen."
        es:
          scarlet: "Blande la cuchilleira del vientre a modo de daga.\nTras bloquear con ella los movimientos del rival,\ncontraataca asestando ágiles cuchilladas."
          violet: "Se dice que aprendió a cuidar de su cuchilleira\nutilizando cantos de la orilla del río e imitando\na los humanos que usaban piedras de afilar."
        ko:
          scarlet: "배의 가리비칼을 작은 칼처럼 사용하여\n적의 기술을 받아낸 다음\n재빠르게 베어서 반격한다."
          violet: "사람이 숫돌을 사용하는 모습을 흉내 내어\n강가의 돌로 가리비칼을\n손질하게 되었다고 전해진다."
        zh_simp:
          scarlet: "会把腹部的扇贝贝如同\n小刀般使用，接了敌人的\n招式后会立马切斩反击。"
          violet: "据说它模仿了人类使用\n磨刀石的样子，变得会用\n河滩上的石头保养扇贝贝了。"
        zh_trad:
          scarlet: "會將腹部的扇貝貝如同\n小刀般使用，在接下敵方\n招式後迅速地切斬反擊。"
          violet: "據說牠是模仿了人類使用\n磨刀石的樣子，於是變得會用\n河灘上的石頭來保養扇貝貝。"
