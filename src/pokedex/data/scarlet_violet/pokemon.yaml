          scarlet: "￹暗￺くら￻い￹場所￺ばしょ￻に　￹迷路￺めいろ￻を　￹作￺つく￻る。\nだれかに　みられると　￹尻尾￺しっぽ￻で\n￹地面￺じめん￻を　￹掘￺ほ￻って　￹逃￺に￻げようとする。"
          violet: "だれかに　￹姿￺すがた￻を　￹見￺み￻られると\n￹尻尾￺しっぽ￻で　￹穴￺あな￻を￹掘￺ほ￻って　￹逃￺に￻げだす。\n￹羽￺ハネ￻で　￹少￺すこ￻しだけ　￹浮￺う￻かべる。"
        jp_kanji:
          scarlet: "￹暗￺くら￻い￹場所￺ばしょ￻に　￹迷路￺めいろ￻を　￹作￺つく￻る。\nだれかに　みられると　￹尻尾￺しっぽ￻で\n￹地面￺じめん￻を　￹掘￺ほ￻って　￹逃￺に￻げようとする。"
          violet: "だれかに　￹姿￺すがた￻を　￹見￺み￻られると\n￹尻尾￺しっぽ￻で　￹穴￺あな￻を￹掘￺ほ￻って　￹逃￺に￻げだす。\n￹羽￺ハネ￻で　￹少￺すこ￻しだけ　￹浮￺う￻かべる。"
        en:
          scarlet: "It creates mazes in dark locations. When spotted,\nit flees into the ground by digging with its tail."
          violet: "If spotted, it escapes by burrowing with its tail.\nIt can float just slightly using its wings."
        fr:
          scarlet: "Il construit des labyrinthes dans les endroits\nsombres. Si quelqu’un le repère, il fuit en\ncreusant le sol à l’aide de sa queue."
          violet: "S’il est repéré, il fuit en creusant un trou à l’aide\nde sa queue. Ses ailes lui permettent de léviter\npendant quelques instants."
        it:
          scarlet: "Costruisce labirinti in luoghi bui. Se qualcuno\nlo vede, si dà alla fuga scavando il terreno\ncon la coda."
          violet: "Se viene scoperto, fugge scavando con la coda.\nLe ali non gli permettono che brevi voli."
        de:
          scarlet: "Es baut an dunklen Orten Labyrinthe. Wird es\nvon jemandem entdeckt, gräbt es mit seinem\nSchwanz ein Loch und versucht so zu entkommen."
          violet: "Wird es entdeckt, gräbt es sich mit seinem\nSchwanz ins Erdreich, um zu fliehen. Setzt es\nseine Flügel ein, kann es ein bisschen schweben."
        es:
          scarlet: "Construye laberintos en lugares oscuros.\nSi alguien lo descubre, huye cavando un\nagujero con la cola."
          violet: "Si es descubierto, escapa cavando con la cola.\nPuede flotar ligeramente usando sus alas."
        ko:
          scarlet: "어두운 장소에 미로를 만든다.\n누군가에게 발견되면 꼬리로\n땅을 파서 도망가려 한다."
          violet: "누군가에게 모습을 보이면\n꼬리로 구멍을 파서 도망친다.\n날개로 약간은 공중에 뜰 수 있다."
        zh_simp:
          scarlet: "在阴暗的地方制造迷宫。\n一旦被发现，就用尾巴\n挖掘地面逃之夭夭。"
          violet: "一旦被谁看见了它的身影，\n就会用尾巴挖洞逃走。\n能用翅膀稍微浮在空中。"
        zh_trad:
          scarlet: "會在陰暗處做出迷宮。\n只要被誰看見就會\n用尾巴挖掘地面逃走。"
          violet: "一旦被誰看見了身影，\n就會用尾巴挖洞逃走。\n能用翅膀稍微浮在空中。"
