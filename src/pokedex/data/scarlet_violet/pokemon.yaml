          violet: "￹群￺む￻れを　￹統率￺とうそつ￻して　￹決￺き￻まりを\n￹守￺まも￻らない　ものは　￹容赦￺ようしゃ￻なく\n￹叩￺たた￻きのめす　￹厳格￺げんかく￻な　￹性質￺せいしつ￻。"
        jp_kanji:
          scarlet: "￹居合抜￺いあいぬ￻きの　￹手練￺てだ￻れ。　￹前脚￺まえあし￻の\n￹鎧￺よろい￻に　￹仕込￺しこ￻まれた　￹大太刀￺おおだち￻の\n￹一振￺ひとふ￻りで　￹勝負￺しょうぶ￻を　￹決￺き￻める。"
          violet: "￹群￺む￻れを　￹統率￺とうそつ￻して　￹決￺き￻まりを\n￹守￺まも￻らない　ものは　￹容赦￺ようしゃ￻なく\n￹叩￺たた￻きのめす　￹厳格￺げんかく￻な　￹性質￺せいしつ￻。"
        en:
          scarlet: "A master of a sword-drawing art called iaijutsu,\nSamurott settles its battles with a single swing of\neither large sword sheathed in its foreleg armor."
          violet: "Samurott leads its group strictly. Those who do\nnot follow its rules receive a merciless thrashing."
        fr:
          scarlet: "Ce virtuose de l’épée peut dégainer les lames\nplacées dans l’armure de ses pattes avant\net abattre ses adversaires d’un seul geste."
          violet: "Ce Pokémon dirige son groupe d’une main\nde fer. Il punit sans pitié quiconque ne respecte\npas ses règles."
        it:
          scarlet: "È un maestro nello sguainare la spada. Decide\nle sorti della lotta con un solo colpo delle grandi\nspade inserite nell’armatura degli arti anteriori."
          violet: "Ha un carattere intransigente e picchia senza\npietà chi non rispetta le regole del gruppo\nche comanda."
        de:
          scarlet: "Es kann die großen Klingen in der Panzerung\nseiner Vorderbeine meisterhaft schnell ziehen und\nentscheidet den Kampf mit nur einem Streich."
          violet: "Es ist ein strenger Anführer. Wer die Regeln der\nGruppe nicht befolgt, wird erbarmungslos\nniedergeschlagen."
        es:
          scarlet: "Un maestro en el arte del desenvaine. Zanja sus\ncombates con un tajo de los grandes sables que\nguarda en la coraza de las patas delanteras."
          violet: "Su personalidad estricta lo lleva a castigar sin\npiedad a todo aquel que ose infringir las reglas\nen el grupo que dirige."
        ko:
          scarlet: "발도술의 전문가다.\n앞발의 갑옷에 내장된 큰 검을\n단번에 휘둘러서 승부를 결정짓는다."
          violet: "무리를 통솔하며\n규율을 지키지 않는 이는\n자비 없이 응징하는 엄격한 성격을 가졌다."
        zh_simp:
          scarlet: "拔刀术的高手。\n会用收在前腿铠甲里的\n大刀一剑定胜负。"
          violet: "统率着群体，对不守规矩的家伙，\n会毫不手软地予以痛击，性情严格。"
        zh_trad:
          scarlet: "拔刀術的本領高強。\n會用藏在前腳鎧甲裡\n的大刀一劍定勝負。"
          violet: "統率群體且性情嚴格，\n會毫不留情地教訓\n不遵守規矩的傢伙。"
