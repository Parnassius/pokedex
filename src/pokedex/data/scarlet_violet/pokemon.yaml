        jp_kana:
          scarlet: "￹全身￺ぜんしん￻　￹粘液￺ねんえき￻で　べとべと。\n￹昔￺むかし￻は　この￹姿￺すがた￻の　ほうが\n￹圧倒的￺あっとうてき￻に　￹数￺かず￻が　￹多￺おお￻かった。"
          violet: "￹浅￺あさ￻い　￹磯辺￺いそべ￻に　￹現￺あらわ￻れる。\n￹獲物￺えもの￻を　￹捕￺と￻らえると　￹粘液￺ねんえき￻で\nゆっくりと　￹溶￺と￻かし　すするのだ。"
        jp_kanji:
          scarlet: "￹全身￺ぜんしん￻　￹粘液￺ねんえき￻で　べとべと。\n￹昔￺むかし￻は　この￹姿￺すがた￻の　ほうが\n￹圧倒的￺あっとうてき￻に　￹数￺かず￻が　￹多￺おお￻かった。"
          violet: "￹浅￺あさ￻い　￹磯辺￺いそべ￻に　￹現￺あらわ￻れる。\n￹獲物￺えもの￻を　￹捕￺と￻らえると　￹粘液￺ねんえき￻で\nゆっくりと　￹溶￺と￻かし　すするのだ。"
        en:
          scarlet: "Its whole body is sticky with mucus. In the past,\nthis form of Gastrodon was by far the more\nnumerous one."
          violet: "It appears on beaches where the waters are\nshallow. Once it catches prey, it will slowly melt\nthem with its mucus before slurping them up."
        fr:
          scarlet: "Son corps est couvert d’un liquide gluant.\nAutrefois, c’était cette forme que l’on trouvait\nen plus grand nombre."
          violet: "Il apparaît dans les eaux côtières peu profondes.\nLorsqu’il attrape une proie, il la dissout à l’aide\nde son liquide gluant avant de l’aspirer."
        it:
          scarlet: "Il suo corpo è ricoperto da una bava appiccicosa.\nIn passato questa era la forma di Gastrodon più\nnumerosa."
          violet: "Lo si trova spesso in riva al mare, in acque poco\nprofonde. Quando cattura una preda, la scioglie\ncon la sua bava e la ingerisce un po’ alla volta."
        de:
          scarlet: "Sein ganzer Körper ist von einem klebrigen\nSchleim überzogen. Vor langer Zeit war diese\nForm von Gastrodon deutlich in der Überzahl."
          violet: "Es taucht in flachen Küstengewässern auf.\nGefangene Beute löst es langsam mit seinem\nSchleim auf, bevor es sie aufschlürft."
        es:
          scarlet: "Tiene la totalidad del cuerpo recubierta de una\nsustancia viscosa. Antiguamente, esta había sido\ncon creces su forma más numerosa."
          violet: "Aparece en playas poco profundas. Cuando\natrapa a una presa, la disuelve lentamente con\nsu mucosidad pegajosa antes de sorberla."
        ko:
          scarlet: "온몸이 점액으로 끈적거린다.\n옛날에는 이 모습의 개체가\n압도적으로 더 많았다."
          violet: "얕은 바닷가에 나타난다.\n먹이를 잡으면 점액으로\n천천히 녹인 뒤 빨아먹는다."
        zh_simp:
          scarlet: "全身都是稠稠的黏液。\n过去这个样子的它，\n数量可谓压倒性地多。"
          violet: "能在岩岸发现它的踪影。\n会用黏液慢慢溶解\n并吸食捕捉到的猎物。"
        zh_trad:
          scarlet: "滿身黏液，濕濕稠稠。\n以前這個樣子的數量\n壓倒性地多。"
          violet: "能在水淺的岩岸發現牠。\n會用黏液慢慢溶解\n並吸食捕捉到的獵物。"
    gastrodon_east_sea:
      form_id: 1
      names:
        jp_kana: ひがしのうみ
        jp_kanji: ひがしのうみ
        en: East Sea
        fr: Mer Orient
        it: Mare Est
        de: Östliches Meer
        es: Mar Este
        ko: 동쪽바다
        zh_simp: 东海
        zh_trad: 東海
      base_stats:
        hp: 111
        attack: 83
        defense: 68
        special_attack: 92
        special_defense: 82
        speed: 39
      evs_yield:
        hp: 2
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - water
        - ground
      egg_groups:
        - water_1
        - amorphous
      abilities:
        - sticky_hold
        - storm_drain
      hidden_ability: sand_force
      descriptions:
        jp_kana:
          scarlet: "￹普段￺ふだん￻は　￹磯￺いそ￻に　いるが　￹雨￺あめ￻が　￹続￺つづ￻くと\n￹海￺うみ￻から　￹遠￺とお￻く￹離￺はな￻れた\n￹山￺やま￻で　￹見￺み￻つかることも　あるのだ。"
          violet: "￹昔￺むかし￻は　あまり　￹見￺み￻なかったが\n￹今￺いま￻は　この￹姿￺すがた￻の　トリトドンが\n￹増￺ふ￻えていると　￹漁師￺りょうし￻は　￹語￺かた￻る。"
        jp_kanji:
          scarlet: "￹普段￺ふだん￻は　￹磯￺いそ￻に　いるが　￹雨￺あめ￻が　￹続￺つづ￻くと\n￹海￺うみ￻から　￹遠￺とお￻く￹離￺はな￻れた\n￹山￺やま￻で　￹見￺み￻つかることも　あるのだ。"
          violet: "￹昔￺むかし￻は　あまり　￹見￺み￻なかったが\n￹今￺いま￻は　この￹姿￺すがた￻の　トリトドンが\n￹増￺ふ￻えていると　￹漁師￺りょうし￻は　￹語￺かた￻る。"
        en:
          scarlet: "They normally inhabit rocky seashores, but in\ntimes of continuous rain, they can sometimes be\nfound in the mountains, far from the sea."
          violet: "Fishers say that they didn’t see many of these\nPokémon in the past, but this form of Gastrodon\nis now increasing in number."
        fr:
          scarlet: "On le rencontre généralement sur les côtes, mais\nquand il pleut suffisamment longtemps, on peut\nl’apercevoir dans les montagnes, loin de la mer."
          violet: "Selon les pêcheurs, les Tritosor ayant cette\napparence étaient autrefois assez rares,\nmais ils semblent plus nombreux maintenant."
        it:
          scarlet: "Di solito vive sui litorali rocciosi, ma in periodi di\npiogge durature può capitare di trovarlo anche\nsu monti molto distanti dal mare."
          violet: "I pescatori dicono che in passato i Gastrodon\nin questa forma non si vedevano spesso, ma che\nultimamente stanno aumentando."
        de:
          scarlet: "Normalerweise hält es sich an der Küste auf,\ndoch bei fortdauerndem Regen trifft man es\nauch fernab vom Meer in den Bergen an."
          violet: "Fischer berichten, dass früher kaum Gastrodon in\ndieser Form auffindbar gewesen seien, es jedoch\ninzwischen immer mehr von ihnen gebe."
        es:
          scarlet: "Normalmente viven en la costa, pero también\nes posible encontrarlos en montañas alejadas\ndel mar cuando caen lluvias persistentes."
          violet: "Cuentan los pescadores que últimamente se ven\nmuchos ejemplares con esta forma, que había\nsido muy poco común en el pasado."
        ko:
          scarlet: "평소에는 물가에 있지만, 비가 오래 내리면\n바다에서 멀리 떨어진\n산에서 발견될 때도 있다."
          violet: "옛날에는 많이 보지 못했지만\n최근에 이 모습의 트리토돈이\n늘어났다는 것이 어부들의 증언."
        zh_simp:
          scarlet: "虽然平时都待在海岸，但如果\n雨下个不停，有时也会在离海\n很遥远的山里发现它的踪影。"
          violet: "渔夫说道，虽然曾经很少遇见\n这个样子的海兔兽，\n但现在它们有增加的倾向。"
        zh_trad:
          scarlet: "雖然平時都待在沿岸，但如果\n雨下個不停，有時也會在離海\n很遙遠的山裡發現牠的蹤影。"
          violet: "漁夫說，雖然以前很少遇見，\n但這個樣子的海兔獸\n現在有增加的傾向。"
ambipom:
