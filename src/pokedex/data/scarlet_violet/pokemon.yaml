      descriptions:
        jp_kana:
          scarlet: "￹汚￺よご￻れた　￹水￺みず￻を　￹飲￺の￻んでも　￹平気￺へいき￻。\n￹体内￺たいない￻の　￹器官￺きかん￻で　￹自分￺じぶん￻には\n￹無害￺むがい￻の　￹毒液￺どくえき￻に　ろ￹過￺か￻するぞ。"
          violet: "わがままで　とても　￹甘￺あま￻えん￹坊￺ぼう￻。\n￹体内￺たいない￻の　２つの　￹袋￺ふくろ￻に\n￹毒￺どく￻と　￹電気￺でんき￻を　それぞれ　￹溜￺た￻める。"
        jp_kanji:
          scarlet: "￹汚￺よご￻れた　￹水￺みず￻を　￹飲￺の￻んでも　￹平気￺へいき￻。\n￹体内￺たいない￻の　￹器官￺きかん￻で　￹自分￺じぶん￻には\n￹無害￺むがい￻の　￹毒液￺どくえき￻に　ろ￹過￺か￻するぞ。"
          violet: "わがままで　とても　￹甘￺あま￻えん￹坊￺ぼう￻。\n￹体内￺たいない￻の　２つの　￹袋￺ふくろ￻に\n￹毒￺どく￻と　￹電気￺でんき￻を　それぞれ　￹溜￺た￻める。"
        en:
          scarlet: "It has no problem drinking dirty water.\nAn organ inside Toxel’s body filters such water\ninto a poisonous liquid that is harmless to Toxel."
          violet: "This selfish, attention-seeking Pokémon stores\npoison and electricity in two different sacs inside\nits body."
        fr:
          scarlet: "Il peut boire de l’eau sale sans aucun problème\ngrâce à son organe filtrant, qui transforme\nles liquides en un poison sans danger pour lui."
          violet: "Ce Pokémon égoïste aime l’attention. Son\ncorps contient deux poches qui lui permettent\nd’emmagasiner du poison et de l’électricité."
        it:
          scarlet: "Dotato di un organo in grado di filtrare anche\nl’acqua più sporca, può berla e convertirla\nin un liquido tossico a lui innocuo."
          violet: "È un Pokémon egoista che pensa solo a se stesso.\nImmagazzina veleno ed elettricità in due sacche\ndistinte all’interno del suo corpo."
        de:
          scarlet: "Es kann problemlos Schmutzwasser trinken.\nEin Organ in seinem Körper filtert dieses zu einer\ngiftigen Flüssigkeit, die ihm nichts anhaben kann."
          violet: "Dieses selbstsüchtige und verzogene Pokémon\nspeichert Gift und Elektrizität in zwei separaten\nSäcken in seinem Körper."
        es:
          scarlet: "Puede beber aguas emponzoñadas sin problema.\nLas filtra mediante un órgano interno para crear\nun veneno al que él mismo es inmune."
          violet: "Es egoísta y caprichoso. Almacena veneno y\nelectricidad en dos bolsas internas distintas."
        ko:
          scarlet: "오염된 물을 마셔도 끄떡없다.\n체내의 기관에서 자신에게는 무해한\n독액으로 걸러 내기 때문이다."
          violet: "제멋대로에 엄청난 응석꾸러기다.\n체내에 있는 2개의 주머니에\n독과 전기를 나눠서 비축하고 있다."
        zh_simp:
          scarlet: "喝了污水也安然无恙。\n那是因为它能靠着体内的器官\n把污水过滤成对自己无害的毒液。"
          violet: "任性且非常爱撒娇。\n体内的两个囊袋\n分别储存毒和电。"
        zh_trad:
          scarlet: "就算喝下污水也能安然無恙。\n那是因為牠會靠著體內的器官\n把污水過濾成對自己無害的毒液。"
          violet: "任性且非常愛撒嬌。\n體內的兩個囊袋\n分別儲存著毒和電。"
