      descriptions:
        jp_kana:
          scarlet: "サイコパワーを　￹放￺はな￻ち　￹相手￺あいて￻に\n￹宇宙￺うちゅう￻が　￹終￺お￻わる　￹夢￺ゆめ￻を　￹見￺み￻せる。\nそれは　￹儚￺はかな￻く　￹美￺うつく￻しいらしい。"
          violet: "￹星￺ほし￻を　￹眺￺なが￻め　￹未来￺みらい￻を　￹予知￺よち￻する。\nどこか　￹冷￺さ￻めた　￹態度￺たいど￻を　とるのは\nすべての　￹終￺お￻わりを　￹知￺し￻っているから。"
        jp_kanji:
          scarlet: "サイコパワーを　￹放￺はな￻ち　￹相手￺あいて￻に\n￹宇宙￺うちゅう￻が　￹終￺お￻わる　￹夢￺ゆめ￻を　￹見￺み￻せる。\nそれは　￹儚￺はかな￻く　￹美￺うつく￻しいらしい。"
          violet: "￹星￺ほし￻を　￹眺￺なが￻め　￹未来￺みらい￻を　￹予知￺よち￻する。\nどこか　￹冷￺さ￻めた　￹態度￺たいど￻を　とるのは\nすべての　￹終￺お￻わりを　￹知￺し￻っているから。"
        en:
          scarlet: "Gothitelle unleashes psychic energy and shows\nopponents dreams of the universe’s end. These\ndreams are apparently ethereal and beautiful."
          violet: "It gazes at the stars to predict the future. It acts\nsomewhat detached because it has seen the end\nof all existence."
        fr:
          scarlet: "Il utilise ses pouvoirs psychiques pour faire voir\nà ses cibles la fin de l’univers dans leurs rêves.\nOn dit qu’ils sont aussi beaux qu’éphémères."
          violet: "Il observe les étoiles pour prédire l’avenir.\nSi son attitude est un peu froide, c’est\nparce qu’il a vu la fin de toutes choses."
        it:
          scarlet: "Quando libera i propri poteri psichici può far\nsognare all’avversario la fine dell’universo.\nSembra siano sogni effimeri e meravigliosi."
          violet: "Prevede il futuro osservando le stelle.\nSe ha un atteggiamento vagamente distaccato,\nè perché conosce la fine di ogni cosa."
        de:
          scarlet: "Es entfesselt Psycho-Kräfte und lässt Gegner so\nvom Ende des Universums träumen. Man sagt,\ndiese Träume seien ätherisch und wunderschön."
          violet: "Es betrachtet die Sterne, um in die Zukunft zu\nblicken. Da es das Ende aller Dinge kennt,\nverhält es sich etwas distanziert."
        es:
          scarlet: "Libera su poder psíquico e induce al rival a soñar\ncon el fin del universo, un espectáculo al parecer\ntan bello como efímero."
          violet: "Puede predecir el futuro observando las estrellas.\nSu actitud algo fría y distante se debe a que ha\nvisto el fin de todo lo existente."
        ko:
          scarlet: "사이코 파워를 발산하여\n상대에게 우주가 끝나는 꿈을 보여 준다.\n그 꿈은 허무하고도 아름답다고 한다."
          violet: "별을 보고 미래를 예지한다.\n어딘가 차가운 태도를 보이는 것은\n모든 것의 결말을 알고 있기 때문이다."
        zh_simp:
          scarlet: "释放强大的精神力量，\n让对手陷入宇宙终结的梦境。\n内容似乎既虚幻又美丽。"
          violet: "会眺望星星来预知未来。\n总是摆出看似冷淡的态度，\n是因为它知道万物的终结。"
        zh_trad:
          scarlet: "會釋放出精神力量，\n讓對手夢見宇宙終結的夢。\n內容似乎既虛幻又美麗。"
          violet: "會凝望星星預知未來。\n總是擺著看似冷淡的態度，\n是因為牠知道萬物的結局。"
