      descriptions:
        jp_kana:
          scarlet: "お￹腹￺なか￻の　ヒラヒラから　￹放射￺ほうしゃ￻する\nサイコパワーで　わずか　１センチだけ\nつま￹先￺さき￻が　￹地面￺じめん￻から　￹浮￺う￻いている。"
          violet: "￹荒￺あ￻れ￹地￺ち￻を　￹走￺はし￻りまわって　￹暮￺く￻らす。\n￹大好￺だいす￻きな　￹木￺き￻の￹実￺み￻を　￹取￺と￻られると\n￹追￺お￻いかけまわして　￹復讐￺ふくしゅう￻する。"
        jp_kanji:
          scarlet: "お￹腹￺なか￻の　ヒラヒラから　￹放射￺ほうしゃ￻する\nサイコパワーで　わずか　１センチだけ\nつま￹先￺さき￻が　￹地面￺じめん￻から　￹浮￺う￻いている。"
          violet: "￹荒￺あ￻れ￹地￺ち￻を　￹走￺はし￻りまわって　￹暮￺く￻らす。\n￹大好￺だいす￻きな　￹木￺き￻の￹実￺み￻を　￹取￺と￻られると\n￹追￺お￻いかけまわして　￹復讐￺ふくしゅう￻する。"
        en:
          scarlet: "Flittle’s toes levitate about half an inch above\nthe ground because of the psychic power\nemitted from the frills on the Pokémon’s belly."
          violet: "It spends its time running around wastelands.\nIf anyone steals its beloved berries, it will chase\nthem down and exact its revenge."
        fr:
          scarlet: "Il lévite à un centimètre du sol grâce à\nl’énergie psychique qui émane des volants\nde son abdomen."
          violet: "Ce Pokémon passe ses journées à courir dans les\nterres en friche. Il poursuivra quiconque lui vole\nses Baies adorées pour se venger."
        it:
          scarlet: "Il potere psichico che emette dalle balze\nsull’addome gli permette di sollevarsi da terra\ndi appena un centimetro e fluttuare nell’aria."
          violet: "Passa il tempo scorrazzando per lande brulle.\nSe qualcuno gli toglie le sue bacche preferite,\ngli corre dietro senza sosta per vendicarsi."
        de:
          scarlet: "Seine Fußspitzen schweben dank der Psycho-\nKräfte, die von den Rüschen an seinem Bauch\nausgehen, knapp 1 cm über dem Boden."
          violet: "Es verbringt seinen Alltag damit, durchs Ödland\nzu rennen. Wenn jemand seine geliebten Beeren\nstiehlt, setzt es dem Täter nach und nimmt Rache."
        es:
          scarlet: "La punta de sus extremidades levita a 1 cm del\nsuelo a causa del poder psíquico que emiten los\nvolantes de su abdomen."
          violet: "Pasa los días correteando por los páramos.\nSi alguien le roba sus adoradas bayas, lo\npersigue sin descanso para vengarse."
        ko:
          scarlet: "배의 하늘하늘한 부분에서 나오는\n사이코 파워를 통해, 겨우 1cm지만\n발끝이 지상에 떠 있다."
          violet: "황무지를 달리며 지낸다.\n좋아하는 나무열매를 빼앗기면\n쫓아와서 복수한다."
        zh_simp:
          scarlet: "由腹部的褶边放射出的精神力量\n能让它浮在脚尖距离地面\n仅有１厘米的空中。"
          violet: "会在荒地跑来跑去来度过时间。\n如果最喜欢的树果被拿走，\n就会穷追不舍地展开报复。"
        zh_trad:
          scarlet: "從肚子的褶邊放射出的精神力量，\n能夠讓牠浮在腳尖和地面\n距離僅有區區１公分的空中。"
          violet: "會在荒地跑來跑去生活。\n如果最喜歡的樹果被搶走，\n就會窮追不捨地展開報復。"
