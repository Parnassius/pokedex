          violet: "￹連結￺れんけつ￻した　タイプの　コイルは\n￹太陽￺たいよう￻の　￹黒点￺こくてん￻が　￹多￺おお￻いとき\nたくさん　￹現￺あらわ￻れると　￹言￺い￻われる。"
        jp_kanji:
          scarlet: "３つのコイルは　￹強￺つよ￻い　￹磁力￺じりょく￻で\n￹結￺むす￻びついている。　そばに￹寄￺よ￻ると\n￹強￺つよ￻い　￹耳鳴￺みみな￻りに　￹襲￺おそ￻われる。"
          violet: "￹連結￺れんけつ￻した　タイプの　コイルは\n￹太陽￺たいよう￻の　￹黒点￺こくてん￻が　￹多￺おお￻いとき\nたくさん　￹現￺あらわ￻れると　￹言￺い￻われる。"
        en:
          scarlet: "Three Magnemite are linked by a strong magnetic\nforce. Earaches will occur if you get too close."
          violet: "They’re formed by several Magnemite linked\ntogether. They frequently appear when sunspots\nflare up."
        fr:
          scarlet: "Le lien magnétique qui rattache ces trois Magnéti\nest si puissant qu’il fait mal aux oreilles si on s’en\napproche trop."
          violet: "Les Magnéton sont constitués de Magnéti reliés\nles uns aux autres et ils apparaissent souvent en\nmasse quand les taches solaires abondent."
        it:
          scarlet: "Tre Magnemite sono uniti da una potente forza\nmagnetica. Se ci si avvicina troppo, le orecchie\nfischiano."
          violet: "È formato dall’unione di più Magnemite.\nSi dice che i Magneton appaiano in gran numero\nquando ci sono molte macchie solari."
        de:
          scarlet: "Drei Magnetilo sind durch ein starkes Magnetfeld\nverbunden. In seiner Nähe bekommt man\nOhrensausen."
          violet: "Mehrere miteinander verbundene Magnetilo\nbilden dieses Pokémon. Es heißt, es erscheine in\nMassen, wenn vermehrt Sonnenflecken auftreten."
        es:
          scarlet: "Tres Magnemite se enlazan mediante una intensa\nfuerza magnética. Provoca un fuerte pitido en los\noídos a quien se le acerque."
          violet: "Están formados por Magnemite unidos.\nSe dice que aparecen en gran número cuando\nhay muchas manchas solares."
        ko:
          scarlet: "3개의 코일은 강한 자력으로\n연결되어 있다. 가까이 다가가면\n강한 귀울림에 시달리게 된다."
          violet: "연결된 타입의 코일은\n태양의 흑점이 많을 때\n많이 나타난다고 전해진다."
        zh_simp:
          scarlet: "３只小磁怪由强大的磁力\n结合在一起。一靠近它\n就会感到强烈的耳鸣。"
          violet: "听说这种连在一起的\n小磁怪会在太阳黑子\n多的时候大量地出现。"
        zh_trad:
          scarlet: "３隻小磁怪因著強烈的\n磁力而結合。只要靠近牠\n就會發生強烈的耳鳴。"
          violet: "據說太陽黑子多的時候，\n這類連結在一起的小磁怪\n會大量出現。"
