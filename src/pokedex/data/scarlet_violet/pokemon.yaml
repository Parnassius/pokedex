        jp_kanji:
          scarlet: "さらに　￹優￺すぐ￻れた　ポケモンを　￹目指￺めざ￻し\n￹追加￺ついか￻した　プログラムに　￹不具合￺ふぐあい￻が\nあったらしく　￹動￺うご￻きが　おかしい。"
          violet: "￹異次元￺いじげん￻でも　￹活躍￺かつやく￻できるよう\nプログラムを　￹修正￺しゅうせい￻したが\n￹狙￺ねら￻い￹通￺どお￻りには　いかなかった。"
        en:
          scarlet: "An additional program was installed to create a\nmore advanced Pokémon, but it was apparently\nflawed. Porygon-Z moves oddly as a result."
          violet: "Its programming was modified to enable it to\noperate in other dimensions. This did not work as\nplanned."
        fr:
          scarlet: "On lui a installé un logiciel afin de l’améliorer,\nmais cela a entraîné plusieurs bugs. Maintenant,\nil se conduit très bizarrement."
          violet: "Son programme a été modifié dans l’espoir\nqu’il soit capable de fonctionner dans d’autres\ndimensions, mais cela a échoué."
        it:
          scarlet: "Si muove in maniera bizzarra a causa di un bug\nnel software aggiuntivo, originariamente\ninstallato per migliorarne le prestazioni."
          violet: "È stato riprogrammato per poter funzionare\nanche in altre dimensioni, ma la modifica\nnon ha sortito i risultati sperati."
        de:
          scarlet: "Um das Pokémon zu verbessern, wurde eine\nzusätzliche Software installiert, die aber offenbar\nfehlerhaft war. Seitdem bewegt es sich seltsam."
          violet: "Es wurde umprogrammiert, um auch in anderen\nDimensionen einsatzfähig zu sein. Dies verlief\njedoch nicht so wie geplant."
        es:
          scarlet: "Se le instaló un software para convertirlo en un\nPokémon más avanzado. Sin embargo, algo salió\nmal y por eso se mueve de manera extraña."
          violet: "Se reprogramó su código para que también\npudiera funcionar en otras dimensiones, pero\nno salió como se esperaba."
        ko:
          scarlet: "더 우월한 포켓몬을 목표로\n추가한 프로그램에 문제가 있었는지\n움직임이 이상하다."
          violet: "다른 차원에서도 활약할 수 있도록\n프로그램을 수정했지만\n바라는 대로는 되지 않았다."
        zh_simp:
          scarlet: "以更优秀的宝可梦为目标，\n好像新追加的程序状况不佳，\n动作很奇怪。"
          violet: "为了让它在异次元也能\n大显身手而修改了程序，\n但没有达到预期目标。"
        zh_trad:
          scarlet: "以成為更優秀的寶可夢為目標\n所新追加的程式好像狀況不佳，\n使得動作變得很奇怪。"
          violet: "為了要在異次元空間也能\n大展身手而修正了程式，\n但結果卻不如預期。"
