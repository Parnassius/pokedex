      descriptions:
        jp_kana:
          scarlet: "のど￹袋￺ぶくろ￻を　ふくらませて　￹電気￺でんき￻を\n￹増幅￺ぞうふく￻させる。　￹風￺かぜ￻に　￹乗￺の￻って\n１￹日￺にち￻で　７００キロを　￹飛行￺ひこう￻する。"
          violet: "のど￹袋￺ぶくろ￻に　￹翼￺つばさ￻で　￹作￺つく￻った　￹電気￺でんき￻を\n￹溜￺た￻める。　￹羽￺はね￻の　￹油分￺ゆぶん￻が　とても\n￹少￺すく￻なく　￹泳￺およ￻ぎは　￹苦手￺にがて￻。"
        jp_kanji:
          scarlet: "のど￹袋￺ぶくろ￻を　ふくらませて　￹電気￺でんき￻を\n￹増幅￺ぞうふく￻させる。　￹風￺かぜ￻に　￹乗￺の￻って\n１￹日￺にち￻で　７００キロを　￹飛行￺ひこう￻する。"
          violet: "のど￹袋￺ぶくろ￻に　￹翼￺つばさ￻で　￹作￺つく￻った　￹電気￺でんき￻を\n￹溜￺た￻める。　￹羽￺はね￻の　￹油分￺ゆぶん￻が　とても\n￹少￺すく￻なく　￹泳￺およ￻ぎは　￹苦手￺にがて￻。"
        en:
          scarlet: "Kilowattrel inflates its throat sac to amplify its\nelectricity. By riding the wind, this Pokémon can\nfly over 430 miles in a day."
          violet: "It uses its throat sac to store electricity\ngenerated by its wings. There’s hardly any\noil in its feathers, so it is a poor swimmer."
        fr:
          scarlet: "Lorsqu’il gonfle son sac gulaire, l’intensité\ndu courant électrique qu’il produit augmente.\nIl peut parcourir 700 km par jour en planant."
          violet: "Il emmagasine l’électricité produite par ses ailes\ndans son sac gulaire. Il ne nage pas très bien,\ncar ses plumes sont peu huilées."
        it:
          scarlet: "Gonfia la sacca nella gola per amplificare la sua\nenergia elettrica. Quando vola sfrutta il vento,\narrivando a percorrere 700 km in un giorno."
          violet: "Immagazzina nella sacca giugulare l’elettricità\ngenerata con le ali. Non avendo molto olio\nsulle piume, è un pessimo nuotatore."
        de:
          scarlet: "Dieses Pokémon verstärkt seine Elektrizität durch\nAufblasen des Kehlsacks. Es nutzt den Wind,\num innerhalb eines Tages 700 km weit zu fliegen."
          violet: "Mit den Flügeln erzeugt es Strom, den es in\nseinem Kehlsack speichert. Da sein Gefieder\nkaum Öl enthält, kann es nicht gut schwimmen."
        es:
          scarlet: "Aumenta la intensidad de su electricidad al inflar\nsu saco gular. Es capaz de recorrer 700 km en un\ndía impulsado por las corrientes de aire."
          violet: "Almacena la electricidad generada por sus alas\nen el saco gular. Su plumaje apenas contiene\naceite, por lo que es un pésimo nadador."
        ko:
          scarlet: "목의 주머니를 부풀려서\n전기를 증폭시킨다. 바람을 타고\n하루에 700km를 비행할 수 있다."
          violet: "목의 주머니에 날개로 만든 전기를 저장한다.\n깃털에 유분이 매우 적어서\n헤엄치는 것은 서툴다."
        zh_simp:
          scarlet: "通过膨胀喉囊来增强电力。\n乘着风可以在１天内\n就飞上７００公里。"
          violet: "会把翅膀制造的电储存到喉囊里。\n由于羽毛所含的油脂非常少，\n因此它不是很擅长游泳。"
        zh_trad:
          scarlet: "會膨脹喉囊來增強電力。\n可以乘著風在１天內\n就飛上７００公里。"
          violet: "會把翅膀製造的電儲存到喉囊裡。\n由於羽毛含的油脂少之又少，\n導致牠不是很擅長游泳。"
