        jp_kanji:
          scarlet: "￹人￺ひと￻を　￹背中￺せなか￻に￹乗￺の￻せて　￹海￺うみ￻を￹行￺い￻く。\n￹機嫌￺きげん￻がいいと　きれいな　￹鳴￺な￻き￹声￺ごえ￻で\n￹歌￺うた￻うことも　あるらしい。"
          violet: "￹人￺ひと￻の　￹言葉￺ことば￻を　￹理解￺りかい￻する　￹高￺たか￻い\n￹知能￺ちのう￻を￹持￺も￻ち　￹背中￺せなか￻に　￹人￺ひと￻を￹乗￺の￻せて\n￹海￺うみ￻を￹泳￺およ￻ぐのが　￹好￺す￻きな　ポケモン。"
        en:
          scarlet: "It ferries people across the sea on its back. It may\nsing an enchanting cry if it is in a good mood."
          violet: "Able to understand human speech and very\nintelligent, it loves to swim in the sea with\npeople on its back."
        fr:
          scarlet: "Il traverse les mers en transportant les gens\nsur son dos. Il semblerait qu’il chante un air\nagréable quand il est de bonne humeur."
          violet: "Ce Pokémon très intelligent comprend\nle langage humain. Il adore parcourir\nles mers avec des gens sur le dos."
        it:
          scarlet: "Trasporta la gente per il mare sul suo dorso.\nSe è di buon umore emette un verso dolce\ne melodioso."
          violet: "La sua grande intelligenza gli permette di capire\nanche il linguaggio umano. Ama nuotare in mare\ntrasportando persone."
        de:
          scarlet: "Es trägt Menschen auf seinem Rücken übers\nMeer. Wenn es gut gelaunt ist, stimmt es\nanscheinend manchmal ein entzückendes Lied an."
          violet: "Dieses intelligente Pokémon versteht die Sprache\nder Menschen und liebt es, mit ihnen auf dem\nRücken über das Meer zu schwimmen."
        es:
          scarlet: "Surca los mares transportando gente sobre\nel lomo. Al parecer, a veces entona un\nmelodioso canto si está de buen humor."
          violet: "Dotado de una gran inteligencia y capaz de\ncomprender el lenguaje humano. Le gusta\nsurcar los mares llevando a gente sobre el lomo."
        ko:
          scarlet: "사람을 등에 태우고 바다를 건넌다.\n기분이 좋으면 아름다운 목소리로\n노래를 하기도 하는 듯하다."
          violet: "인간의 말을 이해하는\n높은 지능을 가졌으며 등에 사람을 태우고\n바다를 헤엄치는 것을 좋아하는 포켓몬."
        zh_simp:
          scarlet: "会让人坐在自己的背上畅游大海。\n据说当它心情好的时候，\n有时还会用悦耳的叫声来唱歌。"
          violet: "拥有能理解人类语言的\n高智商。是喜欢让人乘在\n背上畅游大海的宝可梦。"
        zh_trad:
          scarlet: "會把人類載在背上渡過大海。\n據說在牠心情好的時候，\n還會用美妙的叫聲來唱歌。"
          violet: "有著能夠理解人類語言的\n高度智慧，是喜歡在背上載著\n人類在大海游泳的寶可夢。"
