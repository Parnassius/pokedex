          violet: "￹頭￺あたま￻を　￹激￺はげ￻しく　ぶつけ￹合￺あ￻っても\n￹頭￺ず￻がい￹骨￺こつ￻は　￹厚￺あつ￻さ　３０センチも\nあるので　￹気絶￺きぜつ￻したりしない。"
        jp_kanji:
          scarlet: "どんな　￹衝撃￺しょうげき￻にも　￹耐￺た￻えられる\n￹分厚￺ぶあつ￻い　￹頭￺ず￻がい￹骨￺こつ￻に　￹押￺お￻さえられて\n￹脳￺のう￻みそは　￹大￺おお￻きく　ならなかった。"
          violet: "￹頭￺あたま￻を　￹激￺はげ￻しく　ぶつけ￹合￺あ￻っても\n￹頭￺ず￻がい￹骨￺こつ￻は　￹厚￺あつ￻さ　３０センチも\nあるので　￹気絶￺きぜつ￻したりしない。"
        en:
          scarlet: "Stifled by a thick skull that can withstand any\nimpact, this Pokémon’s brain never got very big."
          violet: "If two were to smash their heads together, their\nfoot-thick skulls would keep them from fainting."
        fr:
          scarlet: "Le crâne épais de Charkos peut résister\nà n’importe quel choc, mais il a entravé\nle développement de son cerveau."
          violet: "Si deux Charkos se percutent violemment,\nleurs solides crânes épais de 30 cm\nles empêchent de s’assommer."
        it:
          scarlet: "Il suo cervello non si è sviluppato perché limitato\ndalle dimensioni del cranio, che è così spesso\nda sopportare qualunque impatto."
          violet: "Poiché il loro cranio è spesso ben 30 cm,\nnon perdono i sensi nemmeno se si prendono\na forti testate tra di loro."
        de:
          scarlet: "Sein dicker Schädelknochen kann jedem Aufprall\nstandhalten. Gleichzeitig schränkt er jedoch das\nHirnwachstum ein."
          violet: "Selbst wenn sie mit den Köpfen heftig\nzusammenstoßen, verhindern ihre 30 cm\ndicken Schädel, dass sie ohnmächtig werden."
        es:
          scarlet: "Su cerebro no ha podido desarrollarse al verse\nlimitado por el espesor de su cráneo, capaz de\nsoportar cualquier golpe."
          violet: "Por más que se propinen violentos cabezazos\nentre ellos, no llegan a perder el conocimiento\ngracias a los 30 cm de grosor de sus cráneos."
        ko:
          scarlet: "어떤 충격에도 견딜 수 있는\n두꺼운 두개골에 눌려\n뇌가 자라지 않았다."
          violet: "머리로 격렬하게 치고받아도\n두개골의 두께가 30cm나 되기에\n기절하거나 하지 않는다."
        zh_simp:
          scarlet: "被能够经受任何冲击的\n极其厚实的头盖骨压着，\n因此大脑没能长大。"
          violet: "因为头盖骨厚达３０厘米，\n所以即使用头激烈对撞\n也绝对不会晕倒。"
        zh_trad:
          scarlet: "被能夠抵擋任何衝擊的\n厚實頭蓋骨壓著，\n所以大腦沒能長大。"
          violet: "由於頭蓋骨厚達３０公分，\n就算用頭部激烈互撞，\n也絕對不會昏倒。"
