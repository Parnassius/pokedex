        jp_kanji:
          scarlet: "￹特殊￺とくしゅ￻な　￹液体￺えきたい￻で　￹体￺からだ￻が\n￹包￺つつ￻まれているため\nどんな　￹環境￺かんきょう￻でも　￹生￺い￻きられる。"
          violet: "サイコパワーを　￹放出￺ほうしゅつ￻して\n￹襲￺おそ￻ってきた　￹敵￺てき￻を　￹撃退￺げきたい￻。\nテレパシーで　￹仲間￺なかま￻と　￹会話￺かいわ￻する。"
        en:
          scarlet: "Because their bodies are enveloped in a special\nliquid, they can survive in any environment."
          violet: "They drive away attackers by unleashing psychic\npower. They can use telepathy to talk with others."
        fr:
          scarlet: "Le fluide spécial qui entoure son corps\nlui permet de vivre dans n’importe quel\nenvironnement."
          violet: "Ils repoussent leurs adversaires à l’aide de\nleurs pouvoirs psychiques et communiquent\nentre eux par télépathie."
        it:
          scarlet: "Il suo corpo è avvolto in un liquido speciale, che\ngli permette di vivere in qualsiasi ambiente."
          violet: "Utilizza i suoi poteri psichici per respingere\ngli aggressori. Comunica con i compagni\nusando la telepatia."
        de:
          scarlet: "Da sein Körper von einer speziellen Flüssigkeit\numgeben ist, kann es in jedem Umfeld überleben."
          violet: "Es wehrt Angreifer ab, indem es Psycho-Kräfte\nfreisetzt. Mit Artgenossen kommuniziert es\ntelepathisch."
        es:
          scarlet: "Puede vivir en cualquier ambiente gracias\nal líquido especial que recubre su cuerpo."
          violet: "Desata su poder psíquico para ahuyentar al\nenemigo. Se comunica con sus compañeros\npor telepatía."
        ko:
          scarlet: "특수한 액체에\n몸이 둘러싸여 있어\n어떠한 환경에서도 살 수 있다."
          violet: "사이코 파워를 방출하여\n달려드는 상대를 물리친다.\n텔레파시로 동료와 대화한다."
        zh_simp:
          scarlet: "身体被特殊的液体包裹着，\n因此在任何环境下\n都能生存下去。"
          violet: "放出精神力量击退来袭的敌人。\n用心灵感应和伙伴对话。"
        zh_trad:
          scarlet: "身體被特殊的液體包裹著，\n因此無論處於任何環境\n都能存活下去。"
          violet: "放出精神力量\n以擊退來襲的敵人。\n會用心靈感應與夥伴交談。"
