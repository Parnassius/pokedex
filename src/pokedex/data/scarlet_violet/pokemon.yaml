      descriptions:
        jp_kana:
          scarlet: "￹成仏￺じょうぶつ￻できない　￹魂￺たましい￻が\n￹風￺かぜ￻に　￹吹￺ふ￻かれているうち　￹枯草￺かれくさ￻を\n￹巻￺ま￻き￹込￺こ￻んで　ポケモンになった。"
          violet: "￹風￺かぜ￻に￹吹￺ふ￻かれて　￹荒野￺こうや￻を　￹転￺ころ￻がり\n￹行￺ゆ￻き￹先￺さき￻は　￹自分￺じぶん￻でも　わからない。\n￹体￺からだ￻が　￹濡￺ぬ￻れるのが　￹大嫌￺だいきら￻い。"
        jp_kanji:
          scarlet: "￹成仏￺じょうぶつ￻できない　￹魂￺たましい￻が\n￹風￺かぜ￻に　￹吹￺ふ￻かれているうち　￹枯草￺かれくさ￻を\n￹巻￺ま￻き￹込￺こ￻んで　ポケモンになった。"
          violet: "￹風￺かぜ￻に￹吹￺ふ￻かれて　￹荒野￺こうや￻を　￹転￺ころ￻がり\n￹行￺ゆ￻き￹先￺さき￻は　￹自分￺じぶん￻でも　わからない。\n￹体￺からだ￻が　￹濡￺ぬ￻れるのが　￹大嫌￺だいきら￻い。"
        en:
          scarlet: "A soul unable to move on to the afterlife was\nblown around by the wind until it got tangled\nup with dried grass and became a Pokémon."
          violet: "Not even Bramblin knows where it is headed as\nit tumbles across the wilderness, blown by the\nwind. It loathes getting wet."
        fr:
          scarlet: "Ce Pokémon est né lorsque, portée par le vent,\nune âme incapable de trouver le repos s’est\nretrouvée empêtrée dans des herbes sèches."
          violet: "Ce Pokémon roule à travers les plaines arides,\nporté par le vent, sans savoir lui-même où cela\nva le mener. Il déteste être mouillé."
        it:
          scarlet: "Un’anima incapace di passare all’altro mondo,\nche trasportata via dal vento è rimasta impigliata\nin un arbusto secco, diventando un Pokémon."
          violet: "Spinto dal vento, rotola per distese brulle\nsenza sapere dove andrà a finire. Detesta\nbagnarsi."
        de:
          scarlet: "Weherba entstehen, wenn Seelen, die keinen\nFrieden finden, vom Wind fortgeweht werden\nund sich in verdorrtem Gras verheddern."
          violet: "Vom Wind getrieben rollt dieses Pokémon durch\ndie Ödnis, ohne zu wissen, wohin die Reise geht.\nEs verabscheut es, nass zu werden."
        es:
          scarlet: "Se dice que este Pokémon nace cuando las almas\nen pena terminan enredadas en la hierba seca\ntras ser arrastradas por el viento."
          violet: "Rueda por los páramos a merced del viento, sin\nque él mismo sepa dónde recalará. No soporta\nmojarse."
        ko:
          scarlet: "성불하지 못한 영혼이\n바람에 날리다가 마른 풀과 엉키면서\n포켓몬이 되었다."
          violet: "바람에 날려 황야를 구르며\n어디로 가는지는 자신도 모른다.\n몸이 젖는 것을 매우 싫어한다."
        zh_simp:
          scarlet: "无法升天的灵魂在风的\n吹拂下被卷进枯草里，\n变成了宝可梦。"
          violet: "随着风在荒野之间滚动，\n自己也不知道会滚到哪里去。\n最讨厌身体被弄得湿答答的。"
        zh_trad:
          scarlet: "無法升天的靈魂在風的\n吹拂下被捲進枯草裡，\n變成了寶可夢。"
          violet: "在風的吹拂下滾動於荒野間，\n就連自己也不知道會滾到哪裡去。\n最討厭身體被弄得濕答答的。"
