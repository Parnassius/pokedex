          violet: "￹矢羽￺やばね￻を　つがえ　￹相手￺あいて￻に　￹放￺はな￻つ。\n￹絶対￺ぜったい￻　￹外￺はず￻せないときは　￹頭￺あたま￻の\nツルを￹引￺ひ￻き　￹集中￺しゅうちゅう￻するのだ。"
        jp_kanji:
          scarlet: "￹翼￺つばさ￻に　￹仕込￺しこ￻まれた　￹矢羽￺やばね￻を\nつがえて　￹放￺はな￻つ。　１００メートル\n￹先￺さき￻の　￹小石￺こいし￻も　￹貫￺つらぬ￻く　￹精度￺せいど￻。"
          violet: "￹矢羽￺やばね￻を　つがえ　￹相手￺あいて￻に　￹放￺はな￻つ。\n￹絶対￺ぜったい￻　￹外￺はず￻せないときは　￹頭￺あたま￻の\nツルを￹引￺ひ￻き　￹集中￺しゅうちゅう￻するのだ。"
        en:
          scarlet: "It cunningly conceals arrow quills in its wings. It\nlaunches these quills with such precision that they\ncan pierce a pebble at over a hundred yards."
          violet: "It nocks its arrow quills and looses them at\nopponents. When it needs to hit, it pulls the\nvines on its hood to narrow its view and focus."
        fr:
          scarlet: "Il décoche les plumes de ses ailes comme\ndes flèches. Sa précision est telle qu’il peut\ntranspercer un petit caillou à 100 m."
          violet: "Les plumes de ses ailes lui servent de flèches.\nS’il veut s’assurer de toucher sa cible, il tire sur\nles lianes de son cou pour se concentrer."
        it:
          scarlet: "Scocca piume dalle sue ali come se fossero\nfrecce. È preciso al punto da riuscire a trafiggere\nuna piccola pietra a 100 m di distanza."
          violet: "Scocca piume come fossero frecce. Quando\nnon deve mancare il bersaglio, tira le liane del\ncappuccio per ridurne l’apertura e mirare meglio."
        de:
          scarlet: "Es feuert in seinen Flügeln versteckte Federpfeile\nso präzise ab, dass sie einen Kiesel auf 100 m\nDistanz durchbohren können."
          violet: "Es legt seine Federpfeile an, um sie auf Gegner\nzu schießen. Muss ein Schuss sitzen, zieht es zur\nFokussierung an den Ranken an seinem Hals."
        es:
          scarlet: "Las plumas de las alas le sirven de flechas que\ndispara con la precisión suficiente para perforar\nun guijarro a 100 m."
          violet: "Dispara plumas a sus rivales a modo de flechas.\nSi no puede permitirse fallar, tira de las lianas de\nsu capucha y la frunce para concentrarse mejor."
        ko:
          scarlet: "날개에 숨겨진 살깃을 시위에\n메겨서 날린다. 100m 앞의\n작은 돌도 관통하는 정밀함이다."
          violet: "살깃을 시위에 메겨서 상대에게 날린다.\n반드시 명중시켜야 할 때는\n머리의 시위를 더욱 당겨 집중한다."
        zh_simp:
          scarlet: "搭弦射出收藏在翅膀里的箭羽。\n有着连前方１００米的小石头\n也能穿透的精度。"
          violet: "会搭上箭羽射向对手。\n在绝对不想射偏时，\n会拉紧头上的藤蔓集中精神。"
        zh_trad:
          scarlet: "托弓拉弦射出藏在翅膀裡的箭羽。\n精準度高到連前方１００米遠的\n小石頭也能貫穿。"
          violet: "會搭上箭羽朝對手射出。\n在絕對必須射中的時候，\n會拉緊頭上的藤蔓來集中精神。"
