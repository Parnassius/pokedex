      descriptions:
        jp_kana:
          scarlet: "￹目￺め￻が　￹見￺み￻えないので　なんでも\nとりあえず　かじって　￹確￺たし￻かめる。\n￹懐￺なつ￻くまでは　￹傷￺きず￻だらけに　なるぞ。"
          violet: "￹棲￺す￻み￹処￺か￻は　￹洞窟￺どうくつ￻の　￹奥深￺おくふか￻く。\nエサも　￹少￺すく￻ないので　￹動￺うご￻くものは\nなんでも　￹食￺く￻いつき　￹食￺た￻べようとする。"
        jp_kanji:
          scarlet: "￹目￺め￻が　￹見￺み￻えないので　なんでも\nとりあえず　かじって　￹確￺たし￻かめる。\n￹懐￺なつ￻くまでは　￹傷￺きず￻だらけに　なるぞ。"
          violet: "￹棲￺す￻み￹処￺か￻は　￹洞窟￺どうくつ￻の　￹奥深￺おくふか￻く。\nエサも　￹少￺すく￻ないので　￹動￺うご￻くものは\nなんでも　￹食￺く￻いつき　￹食￺た￻べようとする。"
        en:
          scarlet: "It can’t see, so its first approach to examining\nthings is to bite them. You will be covered in\nwounds until a Deino warms up to you."
          violet: "It nests deep inside a cave. Food there is scarce,\nso Deino will sink its teeth into anything that\nmoves and attempt to eat it."
        fr:
          scarlet: "Comme il ne voit rien, il examine les choses\nen les mâchouillant. S’il n’est pas habitué à\nquelqu’un, il peut le recouvrir de blessures."
          violet: "Il vit au plus profond des cavernes. Comme\nla nourriture y est rare, il mord dans tout\nce qui bouge pour essayer de le manger."
        it:
          scarlet: "Essendo cieco, esamina le cose mordicchiandole.\nFinché non prende confidenza, bisogna\nrassegnarsi ad avere ferite ovunque!"
          violet: "Dimora nel profondo delle caverne. Non avendo\nmolto cibo a disposizione, si nutre cercando di\naddentare tutto ciò che si muove."
        de:
          scarlet: "Da es nichts sehen kann, beißt es in alles hinein,\num es zu untersuchen. Bis Kapuno Vertrauen zu\neinem fasst, wird man mit Wunden übersät sein."
          violet: "Kapuno lebt in den Tiefen von Höhlen. Da es\ndort kaum Nahrung gibt, beißt es alles, was sich\nbewegt, und versucht es zu fressen."
        es:
          scarlet: "Al no poder ver, su forma de percibir el entorno\nes mordisquear todo lo que encuentra, incluido\nsu Entrenador hasta que se familiariza con él."
          violet: "Habita en lo profundo de las cuevas. Debido a\nla escasez de alimento, muerde e intenta devorar\npor defecto cualquier cosa que se mueva."
        ko:
          scarlet: "눈이 보이지 않기 때문에\n무엇이든 일단 깨물어서 확인한다.\n길들여지기 전까지는 상처투성이가 된다."
          violet: "동굴 깊숙한 곳을 거처로 삼는다.\n먹이가 적기 때문에 움직이는 것이라면\n무작정 달려들어 먹으려고 한다."
        zh_simp:
          scarlet: "因为它的眼睛看不见，所以\n无论确认什么都是用咬的。\n在和它变亲密之前会浑身是伤。"
          violet: "它的栖息之处在洞窟深处。\n那里缺少食物，因此只要有\n会动的东西，它都想去咬来吃掉。"
        zh_trad:
          scarlet: "因為眼睛看不見，所以不管\n要確認什麼都是先咬再說。\n和牠變親密前會滿身是傷。"
          violet: "棲息的洞窟深處缺乏食糧，\n因此只要是會動的東西，\n牠都會想去咬住吃掉。"
