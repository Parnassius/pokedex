      hidden_ability: anger_point
      descriptions:
        jp_kana:
          scarlet: "￹砂￺すな￻の￹中￺なか￻に　￹潜￺もぐ￻り　￹泳￺およ￻ぐように　￹移動￺いどう￻。\n￹敵￺てき￻に　みつからないためと\n￹体温￺たいおん￻を　￹下￺さ￻げない　￹知恵￺ちえ￻　なのだ。"
          violet: "￹体温￺たいおん￻を　￹下￺さ￻げないように\n￹砂漠￺さばく￻の　￹熱￺あつ￻い　￹砂￺すな￻に　￹潜￺もぐ￻り\n￹隠￺かく￻れながら　￹生活￺せいかつ￻　している。"
        jp_kanji:
          scarlet: "￹砂￺すな￻の￹中￺なか￻に　￹潜￺もぐ￻り　￹泳￺およ￻ぐように　￹移動￺いどう￻。\n￹敵￺てき￻に　みつからないためと\n￹体温￺たいおん￻を　￹下￺さ￻げない　￹知恵￺ちえ￻　なのだ。"
          violet: "￹体温￺たいおん￻を　￹下￺さ￻げないように\n￹砂漠￺さばく￻の　￹熱￺あつ￻い　￹砂￺すな￻に　￹潜￺もぐ￻り\n￹隠￺かく￻れながら　￹生活￺せいかつ￻　している。"
        en:
          scarlet: "It submerges itself in sand and moves as if\nswimming. This wise behavior keeps its enemies\nfrom finding it and maintains its temperature."
          violet: "They live hidden under hot desert sands in\norder to keep their body temperature from\ndropping."
        fr:
          scarlet: "Ce Pokémon avance tapi dans le sable,\nce qui lui permet de se cacher des prédateurs\net de maintenir sa température corporelle."
          violet: "Il vit dans les sables des déserts, qui\nle réchauffent et le cachent à la fois."
        it:
          scarlet: "Si nasconde sotto la sabbia e si sposta come\nse nuotasse. In questo modo evita i nemici e\nmantiene alta la propria temperatura corporea."
          violet: "Vive nascosto tra le calde sabbie del deserto\nper evitare che la temperatura del suo corpo\ndiminuisca."
        de:
          scarlet: "Es bewegt sich verborgen im Sand mithilfe von\nSchwimmbewegungen fort. So versteckt es sich\nvor Gegnern und bleibt immer schön warm."
          violet: "Es vergräbt sich im heißen Wüstensand,\num nicht auszukühlen, und fristet sein Leben\nim Verborgenen."
        es:
          scarlet: "Se desplaza sumergido bajo la arena, como si\nnadase. Así se esconde de sus enemigos y evita\nque descienda su temperatura corporal."
          violet: "Viven en los desiertos y se sumergen en las\ncálidas arenas para que su temperatura corporal\nno se reduzca."
        ko:
          scarlet: "모래 속에 숨어서 헤엄치는 것처럼\n이동한다. 적에게 들키지 않으면서\n체온이 내려가지 않기 위한 지혜다."
          violet: "체온이 내려가지 않게\n사막의 뜨거운 모래에 들어가\n숨어 생활하고 있다."
        zh_simp:
          scarlet: "潜藏在沙中像游泳一样移动。\n是为了不被敌人发现和\n不让体温下降而采取的机智行为。"
          violet: "为了避免体温下降，\n会进入沙漠的热沙中，\n让自己隐藏起来生活。"
        zh_trad:
          scarlet: "潛藏在沙中像游泳一樣移動。\n這是種兼具不被敵人發現和\n保持體溫效果的生存智慧。"
          violet: "為了避免體溫下降，\n會潛進沙漠的熱沙中，\n過著隱居的生活。"
