          scarlet: "￹強敵￺きょうてき￻にも　￹恐￺おそ￻れず　￹挑￺いど￻む。\nいざとなると　￹相手￺あいて￻に　しがみつき\n￹体中￺からだじゅう￻の　￹刃￺やいば￻で　￹貫￺つらぬ￻く。"
          violet: "￹刃￺やいば￻の　￹刃￺は￻こぼれは　￹命取￺いのちと￻り。\n￹戦￺たたか￻いが　￹終￺お￻わると　お￹気￺き￻に￹入￺い￻りの\n￹砥石￺といし￻で　￹念入￺ねんい￻りに　￹手入￺てい￻れする。"
        jp_kanji:
          scarlet: "￹強敵￺きょうてき￻にも　￹恐￺おそ￻れず　￹挑￺いど￻む。\nいざとなると　￹相手￺あいて￻に　しがみつき\n￹体中￺からだじゅう￻の　￹刃￺やいば￻で　￹貫￺つらぬ￻く。"
          violet: "￹刃￺やいば￻の　￹刃￺は￻こぼれは　￹命取￺いのちと￻り。\n￹戦￺たたか￻いが　￹終￺お￻わると　お￹気￺き￻に￹入￺い￻りの\n￹砥石￺といし￻で　￹念入￺ねんい￻りに　￹手入￺てい￻れする。"
        en:
          scarlet: "Pawniard will fearlessly challenge even powerful\nfoes. In a pinch, it will cling to opponents and\npierce them with the blades all over its body."
          violet: "Any chips in its blades would prove fatal for it.\nAfter each battle, it diligently maintains its\nblades using its favorite sharpening stone."
        fr:
          scarlet: "Il n’hésite pas à s’attaquer à ses ennemis,\nmême les plus féroces. Il s’accroche à eux et les\ntransperce en utilisant les lames sur son corps."
          violet: "Toute brèche sur ses lames lui serait fatale. Après\nchaque combat, il les entretient scrupuleusement\nen utilisant sa pierre à aiguiser préférée."
        it:
          scarlet: "Sfida anche i nemici più potenti senza timore.\nSe necessario, si aggrappa all’avversario e lo\ntrafigge con le lame che ha sul corpo."
          violet: "Avere le lame smussate gli può essere fatale.\nAlla fine di ogni lotta se ne prende cura\nscrupolosamente con la sua cote preferita."
        de:
          scarlet: "Furchtlos stellt es sich selbst starken Gegnern.\nIm Ernstfall hält es sich an ihnen fest und sticht\nmit den vielen Klingen an seinem Körper zu."
          violet: "Nach jedem Kampf pflegt es seine Klingen\nsorgfältig mit seinem Lieblingswetzstein.\nSchartige Klingen könnten seinen Tod bedeuten."
        es:
          scarlet: "Desafía sin temor a enemigos poderosos. Si es\nnecesario, se aferra al rival y le clava las cuchillas\nque le recubren el cuerpo."
          violet: "Una mella en sus cuchillas podría resultar mortal.\nAl término del combate, las cuida con diligencia\nusando su piedra de afilar preferida."
        ko:
          scarlet: "강한 상대에게도 겁먹지 않고 덤빈다.\n여차하면 상대에게 달라붙어서\n몸에 달린 칼날로 찌른다."
          violet: "칼날의 이가 빠지는 것은 목숨과도 직결된다.\n싸움이 끝나면 마음에 드는 숫돌로\n정성스럽게 손질한다."
        zh_simp:
          scarlet: "即使面对强敌也不惧挑战。\n在紧要关头会紧紧抓住对手，\n然后用身上的刀刃将其刺穿。"
          violet: "刀刃的损伤可以致命。\n每当战斗结束后，就会用\n心爱的磨刀石来精心保养。"
        zh_trad:
          scarlet: "遇上強敵也是不畏挑戰。\n在緊要關頭時會緊緊抓住對手，\n以身上的刀刃將其刺穿。"
          violet: "刀刃的缺損可說是致命傷。\n每當戰鬥結束後，就會用\n最愛的磨刀石來精心保養。"
