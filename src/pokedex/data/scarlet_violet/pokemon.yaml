        jp_kanji:
          scarlet: "１￹日￺にち￻のうち　２０￹時間￺じかん￻　￹眠￺ねむ￻る。\n￹見￺み￻ている　￹相手￺あいて￻の　￹眠気￺ねむけ￻を\n￹誘￺さそ￻うのも　￹能力￺のうりょく￻の　ひとつ。"
          violet: "ナマケロの　￹怠￺なま￻けた　￹様子￺ようす￻は\n￹見￺み￻ている　￹人￺ひと￻の　￹怠￺なま￻け￹心￺ごころ￻を\n￹存分￺ぞんぶん￻に　￹刺激￺しげき￻するのだ。"
        en:
          scarlet: "It sleeps for 20 hours every day. Making drowsy\nthose that see it is one of its abilities."
          violet: "The way Slakoth lolls around makes anyone who\nwatches it feel like doing the same."
        fr:
          scarlet: "Parecool dort vingt heures par jour. Il suffit\nde le regarder pour avoir envie de piquer\nun somme."
          violet: "La paresse de Parecool donne aux personnes\nqui le voient l’envie de se laisser aller à ne rien\nfaire à leur tour."
        it:
          scarlet: "Dorme 20 ore al giorno. Una delle sue abilità è\nindurre sonnolenza in chi lo osserva."
          violet: "I movimenti di questo Pokémon sono talmente\nletargici da indurre alla pigrizia chiunque lo\nosservi."
        de:
          scarlet: "Es schläft 20 Stunden am Tag. Eines seiner\nTalente besteht darin, jeden, der es anschaut,\nschläfrig zu machen."
          violet: "Schon der bloße Anblick von Bummelz führt dazu,\ndass man ebenfalls von Trägheit überwältigt wird."
        es:
          scarlet: "Se pasa 20 horas al día durmiendo. Una de sus\nhabilidades es hacer que le entre sueño a quien\nlo mire."
          violet: "Slakoth se pasa todo el día holgazaneando y,\nsolo con verlo, a uno le entra mucha pereza."
        ko:
          scarlet: "하루 중 20시간을 잔다.\n보고 있는 상대의 졸음을 유도하는 것도\n가지고 있는 능력 중 하나."
          violet: "게을로의 게으른 모습은\n보고 있는 사람의 게으른 마음을\n충분히 자극한다."
        zh_simp:
          scarlet: "１天要睡２０个小时。\n它还有一种能力是\n让看着自己的对手睡意渐浓。"
          violet: "懒人獭慵懒的样子\n会深深地刺激\n看着它的人的懒惰之心。"
        zh_trad:
          scarlet: "１天會睡上２０個小時。\n使看著自己的對手睡意漸濃\n也是牠的能力之一。"
          violet: "懶人獺慵懶的樣子\n會深深地刺激\n看著牠的人的懶惰之心。"
