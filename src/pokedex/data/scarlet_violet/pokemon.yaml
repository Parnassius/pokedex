      descriptions:
        jp_kana:
          scarlet: "￹電気￺でんき￻を　￹溜￺た￻めこむのが　￹下手￺へた￻。\nなんらかの　ショックを　￹受￺う￻けると\nすぐに　￹放電￺ほうでん￻　してしまう。"
          violet: "￹可愛￺かわい￻いけど　￹一緒￺いっしょ￻に　￹暮￺く￻らすなら\n￹電気￺でんき￻ショックで　ビリビリに　される\n￹覚悟￺かくご￻を　しなければ　いけないのだ。"
        jp_kanji:
          scarlet: "￹電気￺でんき￻を　￹溜￺た￻めこむのが　￹下手￺へた￻。\nなんらかの　ショックを　￹受￺う￻けると\nすぐに　￹放電￺ほうでん￻　してしまう。"
          violet: "￹可愛￺かわい￻いけど　￹一緒￺いっしょ￻に　￹暮￺く￻らすなら\n￹電気￺でんき￻ショックで　ビリビリに　される\n￹覚悟￺かくご￻を　しなければ　いけないのだ。"
        en:
          scarlet: "It is unskilled at storing electric power.\nAny kind of shock causes it to discharge\nenergy spontaneously."
          violet: "Despite this Pokémon’s cute appearance, those\nwho want to live with one should prepare to be\non the receiving end of its electric jolts."
        fr:
          scarlet: "Il ne sait pas encore bien emmagasiner\nl’électricité. Au moindre choc, il envoie\ndes décharges sans le vouloir."
          violet: "C’est un Pokémon adorable, mais il faut supporter\nses décharges électriques répétées si l’on désire\nvivre avec lui."
        it:
          scarlet: "Non è ancora bravo a immagazzinare elettricità.\nBasta un minimo spavento per fargliela perdere\nimmediatamente."
          violet: "È molto carino, ma quando si sta con lui bisogna\nrassegnarsi a prendere la scossa a causa delle sue\nscariche elettriche."
        de:
          scarlet: "Dieses Pokémon ist ungeschickt im Umgang mit\nElektrizität. Erschrickt es, entlädt es sich sofort."
          violet: "Pichu sind sehr niedlich, aber wer mit einem\nzusammenleben will, sollte sich besser auf\nregelmäßige Stromschläge gefasst machen."
        es:
          scarlet: "No se le da muy bien el almacenamiento de\nelectricidad. A la mínima, descarga energía sin\ndarse cuenta."
          violet: "Es un Pokémon adorable, pero, cuando se\nconvive con él, uno tiene que estar preparado\npara recibir alguna que otra descarga eléctrica."
        ko:
          scarlet: "전기를 모으는 게 서툴다.\n조금만 충격을 받아도\n금방 방전해 버린다."
          violet: "귀엽지만 같이 산다면\n전기쇼크로 찌릿찌릿해질\n각오를 해야 한다."
        zh_simp:
          scarlet: "不擅长存储电力。\n只要受到什么惊吓，\n就会立马放电。"
          violet: "虽然很可爱，但如果一起\n生活的话，就必须有被电击\n电得麻麻的觉悟。"
        zh_trad:
          scarlet: "很不擅長蓄電。\n只要受到什麼驚嚇，\n就會馬上開始放電。"
          violet: "雖然很可愛，但如果一起\n生活的話，就必須有隨時\n被電擊電得麻麻的覺悟。"
