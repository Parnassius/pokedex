      descriptions:
        jp_kana:
          scarlet: "￹普段￺ふだん￻は　￹池￺いけ￻に　￹棲￺す￻んでいるが\n￹夕立￺ゆうだち￻の　￹後￺あと￻には　￹街中￺まちなか￻の\n￹水￺みず￻たまりに　￹姿￺すがた￻を　￹現￺あらわ￻す。"
          violet: "￹頭￺あたま￻の　￹先￺さき￻から　￹水飴￺みずあめ￻に　￹似￺に￻た\n￹甘￺あま￻い　￹匂￺にお￻いの　￹液体￺えきたい￻を　￹出￺だ￻す。\n￹水草￺みずくさ￻の　￹多￺おお￻い　￹池￺いけ￻に　￹棲￺す￻む。"
        jp_kanji:
          scarlet: "￹普段￺ふだん￻は　￹池￺いけ￻に　￹棲￺す￻んでいるが\n￹夕立￺ゆうだち￻の　￹後￺あと￻には　￹街中￺まちなか￻の\n￹水￺みず￻たまりに　￹姿￺すがた￻を　￹現￺あらわ￻す。"
          violet: "￹頭￺あたま￻の　￹先￺さき￻から　￹水飴￺みずあめ￻に　￹似￺に￻た\n￹甘￺あま￻い　￹匂￺にお￻いの　￹液体￺えきたい￻を　￹出￺だ￻す。\n￹水草￺みずくさ￻の　￹多￺おお￻い　￹池￺いけ￻に　￹棲￺す￻む。"
        en:
          scarlet: "They usually live on ponds, but after an evening\nshower, they may appear on puddles in towns."
          violet: "It secretes a thick, sweet-scented syrup from the\ntip of its head. It lives on weed-choked ponds."
        fr:
          scarlet: "Ils vivent généralement dans les étangs, mais\non peut en trouver dans les flaques d’eau\nen ville, après les averses."
          violet: "Ce Pokémon vit dans les étangs où prospèrent\nles plantes hydrophiles. Le sommet de sa tête\nsécrète un liquide au parfum sucré."
        it:
          scarlet: "Normalmente vivono negli stagni, ma dopo un\nacquazzone possono comparire persino nelle\npozzanghere delle città."
          violet: "Il suo capo secerne un liquido dal dolce\nprofumo simile a sciroppo. Vive negli\nstagni ricchi di piante acquatiche."
        de:
          scarlet: "Normalerweise leben sie in Teichen, aber nach\neinem Schauer am Abend kann man sie auch in\nPfützen in den Städten finden."
          violet: "Aus dem Fortsatz an seinem Kopf sondert es eine\nsüß duftende, sirupartige Flüssigkeit ab. Es lebt\nin Tümpeln, die reich an Wasserpflanzen sind."
        es:
          scarlet: "Vive en estanques, pero, cuando se desata una\ntormenta, puede aparecer en los charcos que\nse forman en las ciudades."
          violet: "Del extremo de su cabeza mana un líquido de\naroma almibarado. Vive en estanques repletos\nde plantas."
        ko:
          scarlet: "보통은 연못에서 살고 있지만\n소나기가 온 뒤에는 마을 안의\n물웅덩이에 모습을 드러낸다."
          violet: "머리 앞쪽에서 물엿과 비슷한\n달콤한 냄새의 액체를 내보낸다.\n수초가 많은 연못에 산다."
        zh_simp:
          scarlet: "平时住在池塘里，\n但傍晚下过雨后，\n就会出现在街上的小水塘中。"
          violet: "从头顶分泌出的液体\n有着如同麦芽糖浆的甜味。\n住在有大量水草的池塘里。"
        zh_trad:
          scarlet: "平時住在池塘裡，\n午後下過雷陣雨時，\n會出現在街上的小水窪中。"
          violet: "從頭頂分泌出的液體\n有著如同麥芽糖般的甜味。\n住在有大量水草的池塘裡。"
