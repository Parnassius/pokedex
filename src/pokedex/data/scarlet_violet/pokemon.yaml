          scarlet: "いつの￹間￺ま￻にか　２￹匹￺ひき￻の　￹子￺こ￻どもが\n￹増￺ふ￻えていた。　￹家族￺かぞく￻のようにも\n￹見￺み￻えるが　￹真相￺しんそう￻は　わからない。"
          violet: "￹大￺おお￻きな　２￹匹￺ひき￻が\n￹子￺こ￻どもたちを　￹守￺まも￻りながら　￹戦￺たたか￻う。\n￹強￺つよ￻い　￹相手￺あいて￻には　￹全員￺ぜんいん￻で　￹立￺た￻ち￹向￺む￻かう。"
        jp_kanji:
          scarlet: "いつの￹間￺ま￻にか　２￹匹￺ひき￻の　￹子￺こ￻どもが\n￹増￺ふ￻えていた。　￹家族￺かぞく￻のようにも\n￹見￺み￻えるが　￹真相￺しんそう￻は　わからない。"
          violet: "￹大￺おお￻きな　２￹匹￺ひき￻が\n￹子￺こ￻どもたちを　￹守￺まも￻りながら　￹戦￺たたか￻う。\n￹強￺つよ￻い　￹相手￺あいて￻には　￹全員￺ぜんいん￻で　￹立￺た￻ち￹向￺む￻かう。"
        en:
          scarlet: "The two little ones just appeared one day.\nThe group might be a family of related\nPokémon, but nobody knows for sure."
          violet: "The larger pair protects the little ones during\nbattles. When facing strong opponents, the\nwhole group will join the fight."
        fr:
          scarlet: "Deux petits sont soudainement apparus à\nleurs côtés. Ils forment peut-être une famille,\nmais on ne connaît pas leurs liens avec certitude."
          violet: "Les deux grands se battent et protègent\nles petits. Face à des adversaires puissants,\nils prennent tous part au combat."
        it:
          scarlet: "A un certo punto si sono aggiunti due\npiccoli. Potrebbero essere una famiglia,\nma non si sa con sicurezza."
          violet: "I due individui grandi lottano proteggendo\ni piccoli, ma in caso di avversari più forti\npartecipa l’intero gruppo."
        de:
          scarlet: "Auf einmal waren sie zu viert. Die Gruppe\nwirkt wie eine Familie, doch ob das wirklich\nder Wahrheit entspricht, ist unklar."
          violet: "In Kämpfen beschützt das größere Paar die\nKleinen. Um sich starken Gegnern zu stellen,\nschließen sich alle zusammen."
        es:
          scarlet: "Dos crías aparecieron de la noche a la\nmañana. Podrían ser familia, pero no se\nsabe a ciencia cierta."
          violet: "En combate, los dos más grandes luchan a la vez\nque defienden a las crías. Cuando se enfrentan\na adversarios fuertes, todos se unen a la refriega."
        ko:
          scarlet: "어느새 아이가 2마리로 늘었다.\n가족처럼 보이기도 하나\n진상은 밝혀지지 않았다."
          violet: "큰 두 마리가\n아이들을 지키며 싸운다.\n강한 상대에게는 모두가 맞서 싸운다."
        zh_simp:
          scarlet: "不知不觉之间多了２只小孩。\n它们看起来像是一家子，\n但真相如何没人知道。"
          violet: "身型大的２只会一边\n保护孩子一边战斗。\n对抗强大的对手时会集体出阵。"
        zh_trad:
          scarlet: "在不知不覺間多了２隻小孩。\n看起來像是一個家族，\n但真相如何無人知曉。"
          violet: "身型大的２隻會在戰鬥的\n同時保護著孩子。對抗實力\n強大的對手時會集體出陣。"
