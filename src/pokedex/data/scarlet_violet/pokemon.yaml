          scarlet: "Dati come il suo habitat o le sue abitudini sono\ndel tutto sconosciuti. Il nome Koraidon gli è stato\ndato dalla Professoressa che lo ha scoperto."
          violet: "Ha caratteristiche simili a quelle di un essere\nchiamato \"Realato\" descritto in un testo antico."
        de:
          scarlet: "Über seine Lebensweise ist nichts bekannt.\nDie Professorin, die es entdeckte, nannte es\nKoraidon."
          violet: "Es besitzt ähnliche Merkmale wie eine Kreatur,\ndie in einer alten Schrift als Schwingenkönig\nerwähnt wurde."
        es:
          scarlet: "Toda información relativa a su biología es\nun completo misterio. La profesora que lo\ndescubrió lo nombró Koraidon."
          violet: "Posee características semejantes a las de una\ncriatura descrita en textos antiguos a la que\ndenominaban Reyalado."
        ko:
          scarlet: "생태 등은 밝혀진 것이 전혀 없다.\n발견자인 박사에 의해\n코라이돈이라고 이름 붙여졌다."
          violet: "오래된 서적에 기록된\n“날개의왕”이라는 생물과\n비슷한 특징을 가지고 있다."
        zh_simp:
          scarlet: "生态等详情全都不明。\n故勒顿这个名字是\n由发现它的博士命名而来。"
          violet: "与古老的书籍所记载的\n名为翼大王的生物\n有着相似的特征。"
        zh_trad:
          scarlet: "生態等詳情仍然不明。\n故勒頓這個名字是\n發現牠的博士所命名的。"
          violet: "與古書裡記載的\n名為翼大王的生物\n有著相似的特徵。"
