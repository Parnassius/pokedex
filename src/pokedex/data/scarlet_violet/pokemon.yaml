        jp_kana:
          scarlet: "２￹本￺ほん￻のヒゲは　￹敏感￺びんかん￻なレーダー。\n￹泥￺どろ￻で　￹濁￺にご￻った　￹水￺みず￻の　￹中￺なか￻でも\n￹獲物￺えもの￻の　￹位置￺いち￻を　￹察知￺さっち￻するぞ。"
          violet: "２￹本￺ほん￻の　￹長￺なが￻い　ヒゲで　￹濁￺にご￻った\n￹川底￺かわぞこ￻を　￹探￺さぐ￻る。　ヌルヌルした\n￹粘膜￺ねんまく￻が　￹体￺からだ￻を　￹守￺まも￻っている。"
        jp_kanji:
          scarlet: "２￹本￺ほん￻のヒゲは　￹敏感￺びんかん￻なレーダー。\n￹泥￺どろ￻で　￹濁￺にご￻った　￹水￺みず￻の　￹中￺なか￻でも\n￹獲物￺えもの￻の　￹位置￺いち￻を　￹察知￺さっち￻するぞ。"
          violet: "２￹本￺ほん￻の　￹長￺なが￻い　ヒゲで　￹濁￺にご￻った\n￹川底￺かわぞこ￻を　￹探￺さぐ￻る。　ヌルヌルした\n￹粘膜￺ねんまく￻が　￹体￺からだ￻を　￹守￺まも￻っている。"
        en:
          scarlet: "Its two whiskers provide a sensitive radar. Even in\nmuddy waters, it can detect its prey’s location."
          violet: "It probes muddy riverbeds with its two long\nwhiskers. A slimy film protects its body."
        fr:
          scarlet: "Il se sert de ses barbillons comme d’un radar\nultrasophistiqué. Ils lui permettent de détecter\nses proies même dans l’eau boueuse."
          violet: "Barloche sonde les lits boueux des rivières\navec ses barbillons. Un film visqueux protège\ntout son corps."
        it:
          scarlet: "I suoi baffi sono un radar sensibilissimo in grado\ndi individuare la preda persino nelle acque\npiù torbide."
          violet: "Si serve dei lunghi baffi per saggiare i letti\nfangosi dei fiumi. Ha il corpo protetto da\nuna membrana viscida."
        de:
          scarlet: "Seine zwei Barteln dienen ihm als empfindliches\nRadarsystem. Selbst in schlammigem Wasser kann\nes so die Position seiner Beute ausmachen."
          violet: "Es untersucht schlammige Flussbetten mit seinen\nbeiden langen Barteln. Sein Körper wird von\neinem Schleimfilm geschützt."
        es:
          scarlet: "Sus bigotes son muy sensibles y le sirven de\nradar. Puede detectar la posición de su presa\nincluso en el agua turbia de los lodazales."
          violet: "Examina los lechos lodosos de los ríos con los\nlargos bigotes que tiene. Está protegido por una\ncapa viscosa."
        ko:
          scarlet: "2개의 수염은 민감한 레이더이다.\n진흙으로 탁해진 물속에서도\n먹이의 위치를 감지한다."
          violet: "2개의 긴 수염으로\n탁한 강바닥을 더듬는다.\n미끈미끈한 점막으로 몸을 보호한다."
        zh_simp:
          scarlet: "２根胡子是灵敏的雷达。\n即使在泥泞浑浊的水中，\n也能侦查到猎物的位置。"
          violet: "会用２根长长的胡须\n探索浑浊的河底。\n用湿滑的粘膜保护着身体。"
        zh_trad:
          scarlet: "２根鬍子是靈敏的雷達。\n即使在因為泥濘而渾濁的水中，\n也能偵查到獵物的位置。"
          violet: "會用２根長長的鬍鬚\n探索渾濁的河底。\n用濕滑的黏膜保護著身體。"
