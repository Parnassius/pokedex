        jp_kana:
          scarlet: "２０メートル￹先￺さき￻の　ミガルーサが　￹放￺はな￻つ\n￹匂￺にお￻いも　￹嗅￺か￻ぎとって\n￹砂￺すな￻の￹中￺なか￻に　￹身￺み￻を　￹隠￺かく￻すのだ。"
          violet: "ディグダに　￹似￺に￻るが　まるで　￹別￺べつ￻の\n￹種類￺しゅるい￻。　￹生息￺せいそく￻　￹環境￺かんきょう￻に　￹適応￺てきおう￻して\n￹偶然￺ぐうぜん￻　￹似￺に￻たらしい。"
        jp_kanji:
          scarlet: "２０メートル￹先￺さき￻の　ミガルーサが　￹放￺はな￻つ\n￹匂￺にお￻いも　￹嗅￺か￻ぎとって\n￹砂￺すな￻の￹中￺なか￻に　￹身￺み￻を　￹隠￺かく￻すのだ。"
          violet: "ディグダに　￹似￺に￻るが　まるで　￹別￺べつ￻の\n￹種類￺しゅるい￻。　￹生息￺せいそく￻　￹環境￺かんきょう￻に　￹適応￺てきおう￻して\n￹偶然￺ぐうぜん￻　￹似￺に￻たらしい。"
        en:
          scarlet: "This Pokémon can pick up the scent of a Veluza\njust over 65 feet away and will hide itself in\nthe sand."
          violet: "Though it looks like Diglett, Wiglett is an entirely\ndifferent species. The resemblance seems to be a\ncoincidental result of environmental adaptation."
        fr:
          scarlet: "Il détecte l’odeur de Délestin à plus de vingt\nmètres, ce qui lui donne le temps de s’enfouir\ndans le sable."
          violet: "Sa ressemblance fortuite avec Taupiqueur serait\nle fruit d’une adaptation à son milieu. Malgré leur\nsimilarité, ils ne sont pas de la même espèce."
        it:
          scarlet: "Fiuta l’odore di un Veluza da 20 metri\ndi distanza e si nasconde nella sabbia."
          violet: "Malgrado la sua somiglianza con i Diglett, fa in\nrealtà parte di una specie diversa che ha assunto\nquest’aspetto per adattarsi al proprio habitat."
        de:
          scarlet: "Es kann den Geruch eines Agiluza auf 20 m\nEntfernung wahrnehmen und versteckt sich\ndaraufhin flugs im Sand."
          violet: "Es erinnert an Digda, ist jedoch eine völlig andere\nArt. Offenbar ist durch die Anpassung an seine\nUmwelt eine zufällige Ähnlichkeit entstanden."
        es:
          scarlet: "Puede percibir el olor de los Veluza a 20 m\nde distancia, lo que le permite ocultarse bajo\nla arena a tiempo."
          violet: "Aunque se parezca a un Diglett, se trata de\nuna especie distinta. El parecido es el resultado\nfortuito de su adaptación al entorno."
        ko:
          scarlet: "20m 떨어진 가비루사에게서 나는\n냄새도 맡을 수 있어서\n모래 속에 몸을 숨긴다."
          violet: "디그다를 닮았지만 전혀 다른 종류다.\n서식하는 환경에 적응한 결과,\n우연히 닮게 되었다는 듯하다."
        zh_simp:
          scarlet: "就算身处２０米之外，\n它也能嗅出轻身鳕散发出的气味，\n然后躲进沙子里藏身。"
          violet: "虽与地鼠相似，却是完全\n不同的种类。据说是为了适应\n生活环境，才偶然变得相似。"
        zh_trad:
          scarlet: "就算身處於２０公尺外，\n牠都能嗅出輕身鱈散發出\n的氣味，躲進沙子裡面藏身。"
          violet: "雖然長得像地鼠，但卻是完全\n不同的種類。據說是為了適應\n生活環境，才偶然變得相像。"
