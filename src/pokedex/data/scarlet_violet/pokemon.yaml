          violet: "マグマのような　￹血液￺けつえき￻が\n￹体内￺たいない￻に　￹流￺なが￻れているため\n￹体温￺たいおん￻は　６００￹度￺ど￻にも　なる。"
        jp_kanji:
          scarlet: "￹息￺いき￻を　￹吸￺す￻ったり　￹吐￺は￻いたり\nするたびに　￹口￺くち￻と　￹鼻￺はな￻から\n￹火￺ひ￻の￹粉￺こ￻が　￹漏￺も￻れてしまう。"
          violet: "マグマのような　￹血液￺けつえき￻が\n￹体内￺たいない￻に　￹流￺なが￻れているため\n￹体温￺たいおん￻は　６００￹度￺ど￻にも　なる。"
        en:
          scarlet: "Each and every time it inhales and exhales,\nsparks leak from its mouth and nostrils."
          violet: "Magma-like blood circulates throughout this\nPokémon’s body, raising its body temperature\nas high as 1,100 degrees Fahrenheit."
        fr:
          scarlet: "Chaque fois qu’il respire, des étincelles sortent\nde sa bouche et de ses narines."
          violet: "Du sang comparable à du magma coule dans\nses veines. La température de son corps peut\nainsi atteindre les 600 °C."
        it:
          scarlet: "Ogni volta che inspira ed espira, dalla bocca\ne dalle narici fuoriescono scintille."
          violet: "Il liquido che gli scorre nelle vene è simile\nal magma. Per questo, la sua temperatura\ncorporea può raggiungere anche i 600 ºC."
        de:
          scarlet: "Bei jedem Atemzug springen Funken aus seinem\nMund und aus seinen Nasenlöchern."
          violet: "Durch seinen Körper fließt magmaartiges Blut,\nwelches seine Körpertemperatur auf ganze\n600 ℃ steigen lassen kann."
        es:
          scarlet: "Cada vez que inspira y espira, este Pokémon\ndeja escapar chispas por la boca y por las fosas\nnasales."
          violet: "La sangre que corre por sus venas es como el\nmagma, lo que eleva su temperatura corporal\nhasta los 600 ºC."
        ko:
          scarlet: "숨을 들이쉬거나 내쉴 때마다\n입과 코에서 불꽃이 새어 나온다."
          violet: "마그마 같은 혈액이\n체내에 흐르고 있기 때문에\n체온은 600도나 된다."
        zh_simp:
          scarlet: "每次吸气和呼气的时候，\n都会从嘴巴和鼻子里冒出火花。"
          violet: "由于体内流淌着熔岩一样的血液，\n因此体温可达６００度。"
        zh_trad:
          scarlet: "每次吸氣和呼氣的時候，\n都會從嘴巴和鼻子裡冒出火花。"
          violet: "由於體內流著熔岩般的血液，\n因此體溫高達６００度。"
