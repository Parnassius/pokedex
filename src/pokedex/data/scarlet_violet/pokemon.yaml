          violet: "￹縄張￺なわば￻りに　￹敵￺てき￻が　￹近￺ちか￻づかないよう\n￹刺激臭￺しげきしゅう￻がする　￹毒液￺どくえき￻で\n￹巣￺す￻の　まわりに　￹図形￺ずけい￻を　￹描￺えが￻く。"
        jp_kanji:
          scarlet: "￹温厚￺おんこう￻だが　￹怒￺おこ￻らせると　￹毒￺どく￻が\n￹染￺し￻みこんだ　￹鋭￺するど￻い　￹前歯￺まえば￻で\n￹咬￺か￻みつき　￹痺￺しび￻れさせてくるぞ。"
          violet: "￹縄張￺なわば￻りに　￹敵￺てき￻が　￹近￺ちか￻づかないよう\n￹刺激臭￺しげきしゅう￻がする　￹毒液￺どくえき￻で\n￹巣￺す￻の　まわりに　￹図形￺ずけい￻を　￹描￺えが￻く。"
        en:
          scarlet: "Though usually a mellow Pokémon, it will sink its\nsharp, poison-soaked front teeth into any that\nanger it, causing paralysis in the object of its ire."
          violet: "To keep enemies away from its territory, it paints\nmarkings around its nest using a poisonous liquid\nthat has an acrid odor."
        fr:
          scarlet: "Ce Pokémon est d’un naturel doux, mais lorsqu’il\nse met en colère, il mord à l’aide de ses incisives\nacérées et imprégnées de venin paralysant."
          violet: "Afin de maintenir ses adversaires hors de son\nterritoire, il dessine des symboles autour de\nson nid à l’aide d’une toxine à l’odeur irritante."
        it:
          scarlet: "È di natura mite, ma se qualcuno lo fa arrabbiare\nlo morde con gli incisivi impregnati di un veleno\nparalizzante."
          violet: "Per evitare che i nemici si avvicinino al suo\nterritorio, disegna figure intorno alla tana\ncon un liquido velenoso dall’odore pungente."
        de:
          scarlet: "Wer dieses friedfertige Pokémon verärgert,\nwird durch einen Biss mit seinen scharfen,\ngiftgetränkten Schneidezähnen gelähmt."
          violet: "Um Feinde von seinem Revier fernzuhalten,\nmalt es mit einer giftigen, stechend riechenden\nFlüssigkeit Markierungen um sein Nest herum."
        es:
          scarlet: "Es manso, pero muerde y paraliza a quien lo\nenfada con sus afilados incisivos impregnados\nde toxinas."
          violet: "Pinta marcas alrededor de su nido con un líquido\nvenenoso de fuerte olor acre para mantener a los\nenemigos alejados de su territorio."
        ko:
          scarlet: "온화하지만 화가 나게 하면\n독이 밴 날카로운 앞니로 물어서\n상대를 마비시킨다."
          violet: "영역에 적이 접근하지 못하게\n자극적인 냄새가 나는 독액으로\n보금자리 주변에 도형을 그린다."
        zh_simp:
          scarlet: "虽然性格温和，但一旦被谁激怒，\n就会用渗入了毒的锋利门牙\n咬住对方，使其全身麻痹。"
          violet: "为了不让敌人靠近地盘，\n会用带着刺鼻臭味的毒液\n在巢的周围画出图形。"
        zh_trad:
          scarlet: "雖然性情溫馴，但一旦被激怒，\n就會用滲入了毒素的尖銳門牙\n過來咬住你，讓你全身麻痺不已。"
          violet: "為了不讓敵人靠近地盤，\n會用有刺鼻臭味的毒液，\n在巢的周圍描繪圖形。"
