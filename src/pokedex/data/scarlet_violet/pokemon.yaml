      descriptions:
        jp_kana:
          scarlet: "￹丸￺まる￻い　￹模様￺もよう￻が　￹発電￺はつでん￻　￹器官￺きかん￻。\n￹相手￺あいて￻に　￹巻￺ま￻きついてから　￹模様￺もよう￻を\n￹押￺お￻しつけて　￹電気￺でんき￻を　￹流￺なが￻すのだ。"
          violet: "￹食欲￺しょくよく￻　￹旺盛￺おうせい￻な　ポケモン。\n￹獲物￺えもの￻を　￹見￺み￻つけると　￹襲￺おそ￻いかかり\n￹電気￺でんき￻で　しびれさせてから　￹食￺た￻べる。"
        jp_kanji:
          scarlet: "￹丸￺まる￻い　￹模様￺もよう￻が　￹発電￺はつでん￻　￹器官￺きかん￻。\n￹相手￺あいて￻に　￹巻￺ま￻きついてから　￹模様￺もよう￻を\n￹押￺お￻しつけて　￹電気￺でんき￻を　￹流￺なが￻すのだ。"
          violet: "￹食欲￺しょくよく￻　￹旺盛￺おうせい￻な　ポケモン。\n￹獲物￺えもの￻を　￹見￺み￻つけると　￹襲￺おそ￻いかかり\n￹電気￺でんき￻で　しびれさせてから　￹食￺た￻べる。"
        en:
          scarlet: "They coil around foes and shock them with\nelectricity-generating organs that seem simply\nto be circular patterns."
          violet: "These Pokémon have a big appetite. When they\nspot their prey, they attack it and paralyze it with\nelectricity."
        fr:
          scarlet: "Ses taches rondes sont des organes qui émettent\nde l’électricité. Il s’enroule autour de ses proies\net les électrocute."
          violet: "Ce Pokémon est doté d’un gros appétit.\nIl paralyse ses proies avec des décharges\nélectriques avant de les manger."
        it:
          scarlet: "I motivi circolari sono organi generatori di\ncorrente. Si avvolge al nemico premendoglieli\naddosso per poi rilasciare una scarica elettrica."
          violet: "Pokémon dal grande appetito. Quando scova\nuna preda, la assale e poi la mangia dopo averla\nparalizzata con l’elettricità."
        de:
          scarlet: "Die runden Flecken sind Organe, die Strom\nerzeugen. Es schlingt sich um seinen Gegner,\npresst sie gegen ihn und aktiviert sie."
          violet: "Dieses Pokémon besitzt einen großen Appetit.\nHat es seine Beute erspäht, lähmt es sie mit\nElektrizität und verspeist sie anschließend."
        es:
          scarlet: "Las motas redondas componen su aparato\nelectrificador. Enrolla a su rival y deja que\nla corriente fluya por ellas."
          violet: "Pokémon de apetito voraz. En cuanto encuentra\nuna presa, se abalanza sobre ella, la paraliza con\nelectricidad y la engulle."
        ko:
          scarlet: "둥근 무늬가 발전 기관이다.\n상대를 휘감은 후 무늬를\n딱 붙여서 전기를 흘려보낸다."
          violet: "식욕이 왕성한 포켓몬이다.\n먹이를 발견하면 덮쳐서\n전기로 마비시킨 후 먹는다."
        zh_simp:
          scarlet: "圆圆的花纹是发电器官。\n会先缠住对手，然后把花纹\n压在对手身上后放出电流。"
          violet: "是食欲旺盛的宝可梦。\n一旦发现猎物就会发动袭击，\n将对方用电麻痹后再吃掉。"
        zh_trad:
          scarlet: "圓圓的花紋是發電器官。\n會先纏住對手，然後把花紋\n壓在對手身上後放出電流。"
          violet: "食慾旺盛的寶可夢。\n一發現獵物就會發動襲擊，\n用電流使其麻痺後大快朵頤。"
