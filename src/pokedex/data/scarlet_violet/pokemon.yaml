      descriptions:
        jp_kana:
          scarlet: "￹世界一￺せかいいち￻の　ぐうたらだが　￹溜￺た￻まった\nエネルギーを　￹一気￺いっき￻に　￹出￺だ￻すことで\n￹恐￺おそ￻ろしい　パワーを　￹発揮￺はっき￻する。"
          violet: "￹寝転￺ねころ￻がったまま　￹生活￺せいかつ￻　する。\nまわりに　￹食￺た￻べる　￹草￺くさ￻が　なくなると\nようやく　￹寝返￺ねがえ￻りをして　￹動￺うご￻く。"
        jp_kanji:
          scarlet: "￹世界一￺せかいいち￻の　ぐうたらだが　￹溜￺た￻まった\nエネルギーを　￹一気￺いっき￻に　￹出￺だ￻すことで\n￹恐￺おそ￻ろしい　パワーを　￹発揮￺はっき￻する。"
          violet: "￹寝転￺ねころ￻がったまま　￹生活￺せいかつ￻　する。\nまわりに　￹食￺た￻べる　￹草￺くさ￻が　なくなると\nようやく　￹寝返￺ねがえ￻りをして　￹動￺うご￻く。"
        en:
          scarlet: "It is the world’s most slothful Pokémon.\nHowever, it can exert horrifying power by\nreleasing pent-up energy all at once."
          violet: "This Pokémon lives lying on its side.\nIt only rolls over and moves when\nthere is no more grass to eat."
        fr:
          scarlet: "C’est le Pokémon le plus paresseux du monde.\nIl est cependant capable de libérer une\npuissance phénoménale en une seule attaque."
          violet: "Il passe sa vie avachi. Lorsqu’il n’y a plus\nd’herbe à manger à proximité, il bouge\nenfin pour se tourner de l’autre côté."
        it:
          scarlet: "È il Pokémon più pigro del mondo, ma\npuò sprigionare di colpo una potenza\nspaventosa grazie all’energia accumulata."
          violet: "Vive perennemente sdraiato e si muove\nsolo per cambiare lato quando attorno\na lui non c’è più erba da mangiare."
        de:
          scarlet: "Es ist das faulste Pokémon der Welt, doch es\nkann eine fürchterliche Kraft freisetzen, wenn es\ndie angestaute Energie auf einmal einsetzt."
          violet: "Es verbringt sein Leben im Liegen und dreht\nsich nur dann mal um, wenn es in seinem Umfeld\nkein Gras mehr gibt, das es essen könnte."
        es:
          scarlet: "Es el Pokémon más vago que hay. Aun así,\npuede liberar de una vez una cantidad\ntremenda de energía acumulada."
          violet: "Vive tumbado todo el día, girándose\nexclusivamente de un lado a otro si no\nle queda más hierba para comer."
        ko:
          scarlet: "세계에서 제일 게으르지만\n쌓인 에너지를 한 번에 표출하면\n무서울 정도의 파워를 발휘한다."
          violet: "뒹굴면서 생활한다.\n주변에 먹을 풀이 없어지면\n그제야 뒤척여서 움직인다."
        zh_simp:
          scarlet: "虽然是世界上最吊儿郎当的宝可梦，\n但能通过把积蓄的能量一次放出，\n从而发挥出惊人的力量。"
          violet: "平时都是躺着生活。\n等到周围的草都吃光后，\n才会翻身移动到别处。"
        zh_trad:
          scarlet: "雖然是世界上最懶散的寶可夢，\n但能藉由把積蓄的能量一次釋放，\n發揮出驚人的力量。"
          violet: "平常都是躺著生活。\n會等到周圍的草都吃光後，\n才會翻身移動到別處。"
