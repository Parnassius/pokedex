      descriptions:
        jp_kana:
          scarlet: "しっとり　すべすべの　￹触￺さわ￻り￹心地￺ごこち￻。\n￹吐息￺といき￻に　￹含￺ふく￻まれている　￹酵母￺こうぼ￻で\nまわりのものを　￹発酵￺はっこう￻させる。"
          violet: "￹吐息￺といき￻に　￹含￺ふく￻まれている　￹酵母￺こうぼ￻が\n￹料理￺りょうり￻を　￹作￺つく￻るのに　￹役立￺やくだ￻つため\n￹古￺ふる￻くから　￹人￺ひと￻に　￹保護￺ほご￻されてきた。"
        jp_kanji:
          scarlet: "しっとり　すべすべの　￹触￺さわ￻り￹心地￺ごこち￻。\n￹吐息￺といき￻に　￹含￺ふく￻まれている　￹酵母￺こうぼ￻で\nまわりのものを　￹発酵￺はっこう￻させる。"
          violet: "￹吐息￺といき￻に　￹含￺ふく￻まれている　￹酵母￺こうぼ￻が\n￹料理￺りょうり￻を　￹作￺つく￻るのに　￹役立￺やくだ￻つため\n￹古￺ふる￻くから　￹人￺ひと￻に　￹保護￺ほご￻されてきた。"
        en:
          scarlet: "This Pokémon is smooth and moist to the touch.\nYeast in Fidough’s breath induces fermentation in\nthe Pokémon’s vicinity."
          violet: "The yeast in Fidough’s breath is useful for\ncooking, so this Pokémon has been protected\nby people since long ago."
        fr:
          scarlet: "Ce Pokémon est moite et lisse au toucher.\nIl fait fermenter ce qui se trouve à proximité\ngrâce à la levure que contient son souffle."
          violet: "Les êtres humains protègent ce Pokémon depuis\nlongtemps, car la levure que contient son souffle\nest utile pour cuisiner."
        it:
          scarlet: "È umido e liscio al tatto. Fa fermentare ciò che\nlo circonda grazie al lievito contenuto nel suo\nalito."
          violet: "Il lievito contenuto nel suo alito è utile\nin cucina, perciò questo Pokémon è stato\nprotetto dagli esseri umani fin dall’antichità."
        de:
          scarlet: "Dieses Pokémon fühlt sich glatt und feucht an.\nSein Atem enthält Hefe und bringt so alles in\nder Umgebung zum Gären."
          violet: "Seit jeher steht dieses Pokémon unter dem Schutz\nder Menschen, da die in seinem Atem enthaltene\nHefe nützlich für die Zubereitung von Speisen ist."
        es:
          scarlet: "Resulta húmedo y suave al tacto. Hace\nfermentar las cosas a su alrededor con\nla levadura de su aliento."
          violet: "La levadura de su aliento es muy útil en la\ncocina, por lo que la gente ha cuidado de\neste Pokémon desde hace mucho tiempo."
        ko:
          scarlet: "만지면 촉촉하고 매끈매끈하다.\n숨결에 포함되어 있는 효모로\n주위의 것들을 발효시킨다."
          violet: "숨결에 포함되어 있는 효모가\n요리를 만들 때 도움을 주기 때문에\n옛날부터 사람들의 보호를 받아 왔다."
        zh_simp:
          scarlet: "摸起来既湿润又光滑。\n吐息中包含的酵母\n可以让周围的东西发酵。"
          violet: "吐出的气息中所含有的酵母\n能在制作料理时派上用场，\n因此自古以来都受到人们的保护。"
        zh_trad:
          scarlet: "摸起來既濕潤又絲滑。\n吐出的氣息裡含有酵母，\n可以使周圍的東西發酵。"
          violet: "吐出的氣息中含有酵母，\n能在製作料理時派上用場，\n因此自古以來就受到人們保護。"
