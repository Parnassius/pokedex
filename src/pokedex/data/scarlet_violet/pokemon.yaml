          scarlet: "Poison oozes from all over its body. It catches\nsmall bug Pokémon at night that are attracted\nby light."
          violet: "Its eyes act as radar, enabling it to be active in\ndarkness. The eyes can also shoot powerful\nbeams."
        fr:
          scarlet: "Son corps sécrète un poison redoutable.\nLa nuit, il capture de petits Pokémon Insecte\nattirés par la lumière."
          violet: "Ses yeux fonctionnent comme des radars et lui\npermettent de voir dans l’obscurité. Ils peuvent\négalement envoyer des rayons très puissants."
        it:
          scarlet: "Da tutto il suo corpo trasuda veleno. Di notte\ncattura piccoli Pokémon Coleottero attratti\ndalla luce."
          violet: "Usa gli occhi come radar per spostarsi nel buio,\noltre a servirsene per lanciare potenti raggi."
        de:
          scarlet: "Aus seinem ganzen Körper tritt Gift aus. Es fängt\nund frisst nachts kleine Käfer-Pokémon, die von\nLicht angelockt wurden."
          violet: "Seine Augen setzt es als Radar ein, damit es im\nDunkeln aktiv sein kann. Aus ihnen kann Bluzuk\nauch Strahlen schießen."
        es:
          scarlet: "Rezuma veneno por todo su cuerpo.\nDe noche, atrapa y come pequeños Pokémon\ninsecto atraídos por la luz."
          violet: "Los ojos le funcionan como radar. Gracias a\nellos, puede moverse en la oscuridad y disparar\npotentes rayos."
        ko:
          scarlet: "전신에서 독이 스며 나온다.\n어두워지면 밝은 곳에 모인\n작은 벌레포켓몬을 잡아먹는다."
          violet: "어둠 속에서도 눈이\n레이더 역할을 해서 활동할 수 있다.\n눈에서 빔을 발사한다."
        zh_simp:
          scarlet: "全身上下都会渗出毒物。\n天黑后就会去捕捉聚在\n灯光处的小型虫宝可梦。"
          violet: "在黑暗中也能让眼睛\n发挥雷达的作用来活动。\n会从眼睛射出光束。"
        zh_trad:
          scarlet: "全身上下都會滲出毒素。\n天黑後就會去捕捉聚在\n燈光處的小型蟲寶可夢。"
          violet: "眼睛會發揮雷達的作用，\n使牠在黑暗中也能活動。\n會從眼睛發射出光束。"
venomoth:
