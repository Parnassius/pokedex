          violet: "￹悪￺わる￻さをする　￹鳥￺とり￻ポケモンが　￹神￺かみ￻の\n￹罰￺ばつ￻を　￹受￺う￻けて　クチバシと　￹翼￺つばさ￻を\n￹取￺と￻り￹換￺か￻えられた　￹伝説￺でんせつ￻が　￹残￺のこ￻る。"
        jp_kanji:
          scarlet: "￹老木￺ろうぼく￻の　てっぺんで　￹葉￺は￻っぱの\n￹団扇￺うちわ￻を　あおぐと　￹木枯￺こが￻らしが　￹吹￺ふ￻き\n￹季節￺きせつ￻が　￹冬￺ふゆ￻になると　いわれる。"
          violet: "￹悪￺わる￻さをする　￹鳥￺とり￻ポケモンが　￹神￺かみ￻の\n￹罰￺ばつ￻を　￹受￺う￻けて　クチバシと　￹翼￺つばさ￻を\n￹取￺と￻り￹換￺か￻えられた　￹伝説￺でんせつ￻が　￹残￺のこ￻る。"
        en:
          scarlet: "It is said that when Shiftry flaps its leafy fans\natop ancient trees, chilly winds blow and the\nseason rolls into winter."
          violet: "Legends tell of a bird Pokémon that received\ndivine punishment for its evil deeds and had its\nbeak and wings replaced."
        fr:
          scarlet: "On dit que lorsqu’il agite ses éventails de feuilles\nau sommet d’un arbre ancien, il déclenche\nun vent glacial qui entraîne l’arrivée de l’hiver."
          violet: "Selon la légende, il était autrefois un Pokémon\noiseau malfaisant qui perdit son bec et ses ailes\naprès avoir subi un châtiment divin."
        it:
          scarlet: "Si dice che, quando agita i suoi ventagli\ndi foglie sulla cima di vecchi alberi, crei\nun vento gelido che provoca l’arrivo dell’inverno."
          violet: "Secondo le leggende, un tempo era un Pokémon\nalato a cui vennero mutati becco e ali come\npunizione divina per le proprie cattive azioni."
        de:
          scarlet: "Man sagt, wenn es auf der Spitze eines alten\nBaumes seine Blätterfächer schwingt, soll ein\neisiger Wind wehen und der Winter einbrechen."
          violet: "Laut einer Legende war es ein Vogel-Pokémon,\ndas als göttliche Strafe für seine Missetaten seine\nFlügel und seinen Schnabel einbüßen musste."
        es:
          scarlet: "Se dice que, cuando agita sus abanicos de hojas\nsubido a la copa de algún árbol milenario, soplan\nvientos gélidos y da comienzo el invierno."
          violet: "Cuenta la leyenda que se trata de un Pokémon\npájaro cuyo pico y alas fueron transformados\ncomo castigo divino por cometer maldades."
        ko:
          scarlet: "고목 꼭대기에 올라\n잎사귀 부채를 부치면 찬 바람이 일어서\n계절이 겨울로 바뀐다고 전해진다."
          violet: "나쁜 짓을 일삼던 새포켓몬이\n신의 벌을 받아 부리와 날개가\n변한 것이라는 전설이 남아 있다."
        zh_simp:
          scarlet: "据说当它在老树的\n树顶扇动叶子团扇，\n就会刮起寒风，迎来冬季。"
          violet: "流传着做了坏事的鸟宝可梦\n受到了神明的惩罚，\n鸟嘴和翅膀被换掉了的传说。"
        zh_trad:
          scarlet: "據說當牠在老樹的頂上\n搧動葉片團扇，就會\n刮起寒風，迎來冬季。"
          violet: "自古流傳著若鳥寶可夢\n做了壞事，就會被神明\n換走鳥嘴和翅膀當作懲罰。"
