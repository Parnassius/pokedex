      abilities:
        - shield_dust
        - tinted_lens
      hidden_ability: wonder_skin
      descriptions:
        jp_kana:
          scarlet: "￹翅￺はね￻に　りんぷんが　ついていて\nヒラヒラと　￹羽￺は￻ばたくたびに\n￹猛毒￺もうどく￻の￹粉￺こな￻を　ばらまく。"
          violet: "￹攻撃￺こうげき￻するときは　￹激￺はげ￻しく\n￹大￺おお￻きな　￹翅￺はね￻を　￹羽￺は￻ばたかせ\n￹毒￺どく￻の￹粉￺こな￻を　￹振￺ふ￻りまく。"
        jp_kanji:
          scarlet: "￹翅￺はね￻に　りんぷんが　ついていて\nヒラヒラと　￹羽￺は￻ばたくたびに\n￹猛毒￺もうどく￻の￹粉￺こな￻を　ばらまく。"
          violet: "￹攻撃￺こうげき￻するときは　￹激￺はげ￻しく\n￹大￺おお￻きな　￹翅￺はね￻を　￹羽￺は￻ばたかせ\n￹毒￺どく￻の￹粉￺こな￻を　￹振￺ふ￻りまく。"
        en:
          scarlet: "The wings are covered with dustlike scales. Every\ntime it flaps its wings, it looses highly toxic dust."
          violet: "When it attacks, it flaps its large wings violently\nto scatter its poisonous powder all around."
        fr:
          scarlet: "Ses ailes sont couvertes d’écailles poudreuses.\nÀ chaque battement d’ailes, il laisse tomber\nde la poudre hautement toxique."
          violet: "Il bat des ailes violemment pour projeter\nde la poudre empoisonnée vers ses adversaires."
        it:
          scarlet: "Le ali sono ricoperte di scaglie. Ogni volta che\nle batte, viene liberata nell’aria una polvere\nvelenosa."
          violet: "Quando attacca, batte con forza le grandi ali\nspargendo ovunque la sua polvere velenosa."
        de:
          scarlet: "Seine Flügel sind mit staubähnlichen Schuppen\nüberzogen. Mit jedem Flügelschlag verstreut es\nhochgiftigen Puder."
          violet: "Beim Angriff schlägt es wild mit seinen großen\nFlügeln, um seinen Giftpuder überall zu\nverstreuen."
        es:
          scarlet: "Tiene las alas cubiertas de escamas. Cada vez\nque las bate, esparce un polvillo sumamente\nvenenoso."
          violet: "Cuando ataca, agita sus grandes alas\nviolentamente para esparcir polvo venenoso\na su alrededor."
        ko:
          scarlet: "날개에 가루가 묻어 있어\n팔락팔락 날갯짓을 할 때마다\n맹독 가루를 흩뿌린다."
          violet: "공격할 때는 커다란 날개로\n격한 날갯짓을 하여\n독 가루를 뿌린다."
        zh_simp:
          scarlet: "翅膀上附着着鳞粉，\n每次翩翩扇动翅膀，\n就会播撒剧毒的粉末。"
          violet: "会激烈地拍动大大的\n翅膀，并且撒下\n毒粉来发动攻击。"
        zh_trad:
          scarlet: "翅膀上附著鱗粉，\n每次翩翩拍動翅膀，\n就會散播劇毒的粉末。"
          violet: "會激烈地拍動大大的\n翅膀以及散播毒粉\n來發動攻擊。"
