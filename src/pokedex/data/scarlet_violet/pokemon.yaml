      egg_groups:
        - water_1
        - field
      abilities:
        - poison_point
        - water_absorb
      hidden_ability: unaware
      descriptions:
        jp_kana:
          scarlet: "￹縄張￺なわば￻り￹争￺あらそ￻いに　￹敗￺やぶ￻れて　￹陸￺りく￻で\n￹暮￺く￻らすうちに　￹毒￺どく￻の　￹粘膜￺ねんまく￻で\n￹体￺からだ￻を　￹保護￺ほご￻するように　￹変￺か￻わった。"
          violet: "￹単独行動￺たんどくこうどう￻は　￹危険￺きけん￻なので\n３、４￹匹￺ひき￻が　￹一列￺いちれつ￻に　￹並￺なら￻んで\n￹助￺たす￻け￹合￺あ￻いながら　￹沼地￺ぬまち￻を　￹歩￺ある￻く。"
        jp_kanji:
          scarlet: "￹縄張￺なわば￻り￹争￺あらそ￻いに　￹敗￺やぶ￻れて　￹陸￺りく￻で\n￹暮￺く￻らすうちに　￹毒￺どく￻の　￹粘膜￺ねんまく￻で\n￹体￺からだ￻を　￹保護￺ほご￻するように　￹変￺か￻わった。"
          violet: "￹単独行動￺たんどくこうどう￻は　￹危険￺きけん￻なので\n３、４￹匹￺ひき￻が　￹一列￺いちれつ￻に　￹並￺なら￻んで\n￹助￺たす￻け￹合￺あ￻いながら　￹沼地￺ぬまち￻を　￹歩￺ある￻く。"
        en:
          scarlet: "After losing a territorial struggle, Wooper began\nliving on land. The Pokémon changed over time,\ndeveloping a poisonous film to protect its body."
          violet: "It’s dangerous for Wooper to travel alone. They\nline up in groups of three or four and help each\nother as they walk around the wetlands."
        fr:
          scarlet: "Depuis qu’une dispute territoriale l’a contraint\nà vivre sur la terre ferme, il protège son corps\nen le recouvrant d’un fluide toxique."
          violet: "Comme il est dangereux pour eux de se déplacer\nseuls, les Axoloto forment des groupes de trois ou\nquatre et parcourent les marais à la queue leu leu."
        it:
          scarlet: "Vive sulla terraferma da quando perse una lotta\nterritoriale. Per proteggere il corpo ha sviluppato\nuna membrana mucosa tossica."
          violet: "Poiché da solo è più esposto ai pericoli, tre\no quattro esemplari si aiutano a vicenda,\npercorrendo le paludi in fila indiana."
        de:
          scarlet: "Ein verlorener Revierkampf zwang es, an Land\nzu leben. Um sich zu schützen, entwickelte es\neine giftige Schleimschicht auf seinem Körper."
          violet: "Da allein zu reisen für sie zu gefährlich ist,\ndurchstreifen sie Sümpfe in Reihen aus drei bis\nvier Exemplaren und helfen dabei einander."
        es:
          scarlet: "Tras perder una disputa territorial, se vio forzado\na vivir en tierra firme y desarrolló una membrana\nmucosa tóxica con la que proteger su cuerpo."
          violet: "Ante el riesgo que le supone desplazarse solo,\nforma filas de tres o cuatro individuos que cuidan\nunos de otros mientras recorren los pantanos."
        ko:
          scarlet: "영역 다툼에서 밀려 육지에 살게 되면서\n독성을 띠는 점막으로\n몸을 보호하도록 변화했다."
          violet: "단독 행동은 위험하기 때문에\n3, 4마리가 일렬로 서서\n협동하면서 늪지를 걷는다."
        zh_simp:
          scarlet: "在地盘的争夺中落败而到\n陆地生活，渐渐地就变成用\n有毒的粘膜来保护身体。"
          violet: "由于单独行动很危险，\n因此在沼地里行走时\n会３、４只排成一列来彼此协助。"
        zh_trad:
          scarlet: "因搶輸地盤而到陸地上\n生活，久而久之變成了是\n用帶毒的黏膜來保護身體。"
          violet: "由於單獨行動很危險，\n因此在沼地裡行走時\n會３、４隻排成一列來彼此扶持。"
