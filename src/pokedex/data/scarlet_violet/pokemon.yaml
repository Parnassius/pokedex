          scarlet: "ひと￹蹴￺け￻りで　トラックを　￹転￺ころ￻がす\n￹強靭￺きょうじん￻な　￹脚力￺きゃくりょく￻を　￹駆使￺くし￻し\nエキゾチックな　￹踊￺おど￻りを　みせる。"
          violet: "￹異国情緒￺いこくじょうちょ￻　￹溢￺あふ￻れる　ダンスで\n￹見￺み￻るものを　￹魅了￺みりょう￻し　￹水￺みず￻でできた\n￹飾￺かざ￻り￹羽根￺はね￻を　￹振￺ふ￻りまわし　￹切￺き￻り￹裂￺さ￻く。"
        jp_kanji:
          scarlet: "ひと￹蹴￺け￻りで　トラックを　￹転￺ころ￻がす\n￹強靭￺きょうじん￻な　￹脚力￺きゃくりょく￻を　￹駆使￺くし￻し\nエキゾチックな　￹踊￺おど￻りを　みせる。"
          violet: "￹異国情緒￺いこくじょうちょ￻　￹溢￺あふ￻れる　ダンスで\n￹見￺み￻るものを　￹魅了￺みりょう￻し　￹水￺みず￻でできた\n￹飾￺かざ￻り￹羽根￺はね￻を　￹振￺ふ￻りまわし　￹切￺き￻り￹裂￺さ￻く。"
        en:
          scarlet: "A single kick from a Quaquaval can send a truck\nrolling. This Pokémon uses its powerful legs to\nperform striking dances from far-off lands."
          violet: "Dancing in ways that evoke far-away places, this\nPokémon mesmerizes all that see it. Flourishes of\nits decorative water feathers slice into its foes."
        fr:
          scarlet: "Il peut propulser un camion dans les airs d’un\nsimple coup de pied. Ses puissantes pattes lui\npermettent aussi d’exécuter des danses insolites."
          violet: "Sa danse insolite est captivante. Il met ses\nadversaires en pièces à l’aide de ses plumes\nornementales composées d’eau."
        it:
          scarlet: "Si esibisce in danze esotiche sfruttando\nl’incredibile forza degli arti inferiori, capaci di\nfar rotolare via un camion con un solo colpo."
          violet: "Cattura lo sguardo dell’avversario con\nuna danza esotica e lo squarcia agitando\nle piume ornamentali fatte di acqua."
        de:
          scarlet: "Mit einem einzigen Tritt kann es Lastwagen\numwerfen. Es nutzt seine kräftigen Beine,\num Tänze aus fernen Ländern aufzuführen."
          violet: "Mit seinen ausgefallenen Tänzen betört es alle,\ndie ihm zuschauen. Es schlitzt Gegner mit einem\nSchwung seiner Schmuckfedern aus Wasser auf."
        es:
          scarlet: "Realiza una exótica danza mientras controla la\ntremenda fuerza de sus extremidades, capaces\nde hacer volcar un camión de una patada."
          violet: "Embelesa a quien lo ve con una danza que\nrebosa de exotismo y corta a sus rivales con\nsus plumas ornamentales hechas de agua."
        ko:
          scarlet: "발차기 한 번에 트럭을 굴려 버릴 정도로\n강한 다릿심을 활용하여\n이국적인 춤을 선보인다."
          violet: "이국적인 느낌이 강한 댄스로\n보는 이를 매료시킨 다음\n물로 만든 깃털 장식을 휘둘러 베어 버린다."
        zh_simp:
          scarlet: "活用只要一脚就能\n踢翻卡车的强韧脚力，\n展现充满异国风情的舞蹈。"
          violet: "会用充满异国风情的舞蹈\n来迷倒看者，然后挥舞\n以水构成的羽饰将其劈裂。"
        zh_trad:
          scarlet: "會善用只要一踢就能\n踢翻卡車的強韌腳力，\n展現充滿異國風情的舞蹈。"
          violet: "會用充滿異國情調的舞蹈\n迷倒看到的對手，然後揮舞\n以水構成的羽飾將其劈裂。"
