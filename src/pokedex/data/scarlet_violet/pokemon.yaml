      descriptions:
        jp_kana:
          scarlet: "￹強敵￺きょうてき￻に　￹出会￺であ￻うと　￹手首￺てくび￻から\n￹炎￺ほのお￻を　￹噴￺ふ￻き￹出￺だ￻す。　ジャンプで\nビルを　￹跳￺と￻び￹越￺こ￻す　￹脚力￺きゃくりょく￻。"
          violet: "３０￹階建￺かいだ￻ての　ビルを　ジャンプで\n￹跳￺と￻び￹越￺こ￻す　￹跳躍力￺ちょうやくりょく￻。\n￹敵￺てき￻を　￹炎￺ほのお￻のパンチで　￹焼￺や￻きつくす。"
        jp_kanji:
          scarlet: "￹強敵￺きょうてき￻に　￹出会￺であ￻うと　￹手首￺てくび￻から\n￹炎￺ほのお￻を　￹噴￺ふ￻き￹出￺だ￻す。　ジャンプで\nビルを　￹跳￺と￻び￹越￺こ￻す　￹脚力￺きゃくりょく￻。"
          violet: "３０￹階建￺かいだ￻ての　ビルを　ジャンプで\n￹跳￺と￻び￹越￺こ￻す　￹跳躍力￺ちょうやくりょく￻。\n￹敵￺てき￻を　￹炎￺ほのお￻のパンチで　￹焼￺や￻きつくす。"
        en:
          scarlet: "When facing a tough foe, it looses flames from\nits wrists. Its powerful legs let it jump clear over\nbuildings."
          violet: "It can jump powerfully, clearing a 30-story\nbuilding in a single leap. Its flaming punches\nscorch its opponents."
        fr:
          scarlet: "Quand il affronte un ennemi coriace, ses poignets\nprojettent des gerbes de flammes. Ses jambes lui\npermettent de sauter par-dessus les immeubles."
          violet: "Sa détente lui permet de bondir par-dessus\nun bâtiment de trente étages. Il carbonise\nses adversaires avec ses poings enflammés."
        it:
          scarlet: "Quando affronta un forte nemico lancia fiammate\ndai polsi. Le zampe poderose gli permettono\ndi scavalcare interi palazzi."
          violet: "Riesce a superare un edificio di 30 piani\ncon un salto. I suoi pugni di fuoco inceneriscono\nil nemico."
        de:
          scarlet: "Trifft es auf einen hartnäckigen Gegner, lässt es\nseine Handgelenke auflodern. Mit seinen starken\nBeinen springt es selbst über Hochhäuser."
          violet: "Es kann über 30-stöckige Häuser springen.\nSeine feurigen Schläge lassen seine Gegner\nin Flammen aufgehen."
        es:
          scarlet: "Ante un rival difícil, expulsa llamas por las\nmuñecas. Tiene mucha fuerza en las patas;\nhasta puede saltar edificios."
          violet: "Puede saltar edificios de 30 plantas. Reduce a\ncenizas a sus rivales con sus puñetazos de fuego."
        ko:
          scarlet: "강적을 만나면 손목에서\n불꽃을 내뿜는다. 점프로\n빌딩을 뛰어넘는 다릿심을 가졌다."
          violet: "30층 빌딩을 점프로\n뛰어넘을 수 있는 점프력을 가졌다.\n불꽃펀치로 상대를 태운다."
        zh_simp:
          scarlet: "遇到强敌时会从手腕喷出火焰。\n有着能够跃过大楼的脚力。"
          violet: "有着能跃过３０层大楼的弹跳力。\n会用火焰拳将敌人烧成灰烬。"
        zh_trad:
          scarlet: "遇到強敵時會從手腕噴出火焰。\n有著能夠躍過大樓的腳力。"
          violet: "有著能躍過３０層大樓的\n跳躍力。會用火焰拳\n將對手燒成灰燼。"
