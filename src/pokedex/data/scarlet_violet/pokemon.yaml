        jp_kanji:
          scarlet: "￹羽￺は￻ばたく　￹力￺ちから￻が　とても　￹強￺つよ￻く\n￹力強￺ちからづよ￻く　￹飛￺と￻び￹立￺た￻つときは\nまわりの　￹大木￺たいぼく￻を　なぎ￹倒￺たお￻す。"
          violet: "あごの　￹力￺ちから￻は　けたはずれ。\n￹高速￺こうそく￻で　￹飛￺と￻んで　すれ￹違￺ちが￻いざまに\n￹相手￺あいて￻を　かみちぎるのが　￹得意￺とくい￻。"
        en:
          scarlet: "Yanmega’s wingbeats are so powerful that\nthe Pokémon blows down huge trees nearby\nwhen it vigorously launches itself into flight."
          violet: "Its jaw power is incredible. It is adept at biting\napart foes while flying by at high speed."
        fr:
          scarlet: "Lorsque ce Pokémon prend son essor,\nle battement de ses ailes est si puissant\nqu’il déracine les arbres alentour."
          violet: "Doté de mandibules à la force colossale, il\nexcelle dans l’art de fondre sur ses adversaires\nà grande vitesse pour les déchiqueter en plein vol."
        it:
          scarlet: "Ha talmente tanta forza nelle ali che quando\nspicca il volo abbatte gli alberi a colpi d’ala."
          violet: "La forza della sua mascella è incredibile.\nLa sua specialità è fare a pezzi, mordendoli,\ni nemici che incrocia volando a grande velocità."
        de:
          scarlet: "Seine Flügel sind ungemein mächtig.\nErhebt es sich kraftvoll in die Höhe, reißt\nes dabei große Bäume im Umkreis um."
          violet: "Die Kraft seines Kiefers ist unglaublich.\nEs kann Gegner zerbeißen, während es mit\nhoher Geschwindigkeit an ihnen vorbeifliegt."
        es:
          scarlet: "Bate las alas con tal fuerza que,\ncuando alza el vuelo, es capaz de\nabatir los árboles a su alrededor."
          violet: "Pasa volando a gran velocidad\nal lado de sus enemigos y los\ndestroza con su potente mandíbula."
        ko:
          scarlet: "날개를 치는 힘이 매우 강해\n힘껏 날 때는\n주변의 큰 나무를 쓰러뜨린다."
          violet: "턱의 힘은 엄청나다.\n고속으로 날아서 스치는 순간\n상대를 물어뜯는 것이 특기다."
        zh_simp:
          scarlet: "拍动翅膀的力量极强，\n在用力起飞时，\n会掀倒周围的巨树。"
          violet: "颚部的力量异常强大。\n擅长在高速飞行中咬碎\n与自己擦身而过的对手。"
        zh_trad:
          scarlet: "拍動翅膀的力量非常強大，\n在牠使勁起飛時，\n會吹倒周圍的大樹。"
          violet: "顎部的力量異常強大。\n擅長在高速飛行中咬斷\n與自己擦身而過的對手"
