        jp_kana:
          scarlet: "ワシボンに　くちばしで　￹突￺つつ￻かれて\n￹襲￺おそ￻われると　￹鋭￺するど￻い　￹体毛￺たいもう￻と\n￹毒￺どく￻の　￹黒￺くろ￻い￹粉￺こな￻で　￹応戦￺おうせん￻する。"
          violet: "￹決￺き￻まった　￹棲￺す￻み￹処￺か￻を　￹持￺も￻たない。\n￹気￺き￻の￹向￺む￻くまま　￹野山￺のやま￻を　￹歩￺ある￻きまわり\n￹進化￺しんか￻の　エネルギーを　￹蓄￺たくわ￻える。"
        jp_kanji:
          scarlet: "ワシボンに　くちばしで　￹突￺つつ￻かれて\n￹襲￺おそ￻われると　￹鋭￺するど￻い　￹体毛￺たいもう￻と\n￹毒￺どく￻の　￹黒￺くろ￻い￹粉￺こな￻で　￹応戦￺おうせん￻する。"
          violet: "￹決￺き￻まった　￹棲￺す￻み￹処￺か￻を　￹持￺も￻たない。\n￹気￺き￻の￹向￺む￻くまま　￹野山￺のやま￻を　￹歩￺ある￻きまわり\n￹進化￺しんか￻の　エネルギーを　￹蓄￺たくわ￻える。"
        en:
          scarlet: "If Rufflet attacks this Pokémon by pecking at it,\nit will retaliate with its sharp fur and poisonous\nblack powder."
          violet: "Spewpa doesn’t live in a fixed location. It roams\nwhere it pleases across the fields and mountains,\nbuilding up the energy it needs to evolve."
        fr:
          scarlet: "Si un Furaiglon tente de l’attaquer à coups\nde bec, il riposte à l’aide de ses poils tranchants\net de sa poudre noire empoisonnée."
          violet: "Il ne vit pas dans un lieu fixe et va par monts\net par vaux, en accumulant au passage l’énergie\nnécessaire à son évolution."
        it:
          scarlet: "Quando viene aggredito e preso a beccate\ndai Rufflet, contrattacca con la sua pelliccia\npungente e con una polvere nera velenosa."
          violet: "Non ha una tana fissa. Gira per campi e\nmontagne senza una meta precisa, accumulando\nenergia per l’evoluzione."
        de:
          scarlet: "Wenn Geronimatz es mit seinem Schnabel\nangreift, schlägt Puponcho mit seinem spitzen\nFell und einem giftigen schwarzen Puder zurück."
          violet: "Puponcho hat kein festes Zuhause. Es zieht\nüber Wiesen und Berge, wie es ihm gefällt,\nund sammelt Energie für seine Entwicklung."
        es:
          scarlet: "Cuando los Rufflet lo atacan picoteándolo, se\ndefiende erizando su afilado pelaje y expulsando\nun polvo negro y venenoso."
          violet: "No vive en una zona determinada, sino que\nvaga a placer por campos y montañas mientras\nacumula la energía necesaria para evolucionar."
        ko:
          scarlet: "수리둥보에게 부리로 쪼이면\n뾰족한 털과 독성을 띠는\n검은 가루로 맞서 싸운다."
          violet: "정해진 거처를 가지지 않는다.\n마음 가는 대로 산과 들을 돌아다니며\n진화하기 위한 에너지를 비축한다."
        zh_simp:
          scarlet: "被毛头小鹰的鸟嘴袭击时，\n就会靠尖锐的体毛和带毒的\n黑色粉末来迎战。"
          violet: "没有固定的住处。\n会随心所欲地在山野漫步，\n储存进化时所需的能量。"
        zh_trad:
          scarlet: "遭毛頭小鷹用鳥嘴襲擊時，\n就會以尖銳的體毛\n和帶毒的黑色粉末迎戰。"
          violet: "沒有固定的住處。\n會隨心所欲地在山野走來走去，\n蓄積進化時所需的能量。"
