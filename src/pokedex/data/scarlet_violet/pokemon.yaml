      descriptions:
        jp_kana:
          scarlet: "￹相手￺あいて￻に　￹嘗￺な￻められないように　いつも\nしかめっ￹面￺つら￻をしているが　￹泣￺な￻いている\n￹子￺こ￻どもは　その￹顔￺かお￻で　￹笑￺わら￻いだす。"
          violet: "￹発達￺はったつ￻した　あごと　キバは\n￹岩￺いわ￻を　￹噛￺か￻み￹砕￺くだ￻く　￹力強￺ちからづよ￻さ。\n￹厚￺あつ￻い　￹脂肪￺しぼう￻は　￹防御力￺ぼうぎょりょく￻　￹抜群￺ばつぐん￻。"
        jp_kanji:
          scarlet: "￹相手￺あいて￻に　￹嘗￺な￻められないように　いつも\nしかめっ￹面￺つら￻をしているが　￹泣￺な￻いている\n￹子￺こ￻どもは　その￹顔￺かお￻で　￹笑￺わら￻いだす。"
          violet: "￹発達￺はったつ￻した　あごと　キバは\n￹岩￺いわ￻を　￹噛￺か￻み￹砕￺くだ￻く　￹力強￺ちからづよ￻さ。\n￹厚￺あつ￻い　￹脂肪￺しぼう￻は　￹防御力￺ぼうぎょりょく￻　￹抜群￺ばつぐん￻。"
        en:
          scarlet: "It always scowls in an attempt to make opponents\ntake it seriously, but even crying children will\nburst into laughter when they see Maschiff’s face."
          violet: "Its well-developed jaw and fangs are strong\nenough to crunch through boulders, and its thick\nfat makes for an excellent defense."
        fr:
          scarlet: "Il affiche toujours un air renfrogné pour qu’on\nle prenne au sérieux, mais même les enfants\nen pleurs éclatent de rire lorsqu’ils voient sa tête."
          violet: "Sa mâchoire et ses crocs bien développés sont\nassez puissants pour broyer des rochers. Sa graisse\népaisse lui octroie une excellente protection."
        it:
          scarlet: "Si mostra sempre accigliato per evitare di\nessere preso sottogamba, ma il suo buffo muso\nfa ridere persino i bambini in preda al pianto."
          violet: "La mandibola e le zanne sono così potenti e\nben sviluppate da poter sgretolare la pietra.\nLo spesso strato di grasso gli dà un’ottima difesa."
        de:
          scarlet: "Es blickt stets finster drein, um von anderen ernst\ngenommen zu werden, doch selbst weinende\nKinder fangen bei seinem Anblick an zu lachen."
          violet: "Kiefer und Fangzähne dieses Pokémon sind gut\nentwickelt und stark genug, Felsen zu zerbeißen.\nSeine dicke Fettschicht bietet optimalen Schutz."
        es:
          scarlet: "Mantiene el ceño fruncido para que sus rivales\nlo tomen en serio, pero hasta el niño más llorón\nestallaría en carcajadas al ver su mueca."
          violet: "Tanto su mandíbula como sus colmillos están tan\ndesarrollados que pueden triturar rocas. Su densa\ncapa de grasa le proporciona una buena defensa."
        ko:
          scarlet: "상대에게 얕보이지 않기 위해\n항상 얼굴을 찌푸리고 있지만\n우는 아이는 그 모습을 보고 웃게 된다."
          violet: "발달된 턱과 이빨은\n바위도 분쇄할 정도로 강하다.\n두꺼운 지방은 우수한 방어력을 자랑한다."
        zh_simp:
          scarlet: "为了不被对手看扁\n而总是皱着一张脸，却反而\n会让哭泣的孩子破涕为笑。"
          violet: "发达的颚部和獠牙拥有\n能咬碎岩石的强大威力。\n厚厚脂肪的防御力相当突出。"
        zh_trad:
          scarlet: "為了不被對手看扁而總是\n皺著的那張臉，卻反而會\n讓哭泣的孩子破涕為笑。"
          violet: "發達的顎部和獠牙擁有\n能咬碎岩石的強大威力。\n厚厚的脂肪使牠防禦力超群。"
