      descriptions:
        jp_kana:
          scarlet: "すばしっこく　￹走￺はし￻りまわり\n￹背中￺せなか￻の￹針￺はり￻と　￹鋭￺するど￻いツメでの\n￹攻撃￺こうげき￻が　￹得意￺とくい￻。"
          violet: "トゲは　￹皮膚￺ひふ￻が　￹硬￺かた￻くなったもの。\n￹体￺からだ￻を　￹丸￺まる￻めて　トゲトゲを\n￹刺￺さ￻すように　￹相手￺あいて￻を　￹攻撃￺こうげき￻する。"
        jp_kanji:
          scarlet: "すばしっこく　￹走￺はし￻りまわり\n￹背中￺せなか￻の￹針￺はり￻と　￹鋭￺するど￻いツメでの\n￹攻撃￺こうげき￻が　￹得意￺とくい￻。"
          violet: "トゲは　￹皮膚￺ひふ￻が　￹硬￺かた￻くなったもの。\n￹体￺からだ￻を　￹丸￺まる￻めて　トゲトゲを\n￹刺￺さ￻すように　￹相手￺あいて￻を　￹攻撃￺こうげき￻する。"
        en:
          scarlet: "It is adept at attacking with the spines on its back\nand its sharp claws while quickly scurrying about."
          violet: "The spikes on its body are made up of its\nhardened hide. It rolls up and attacks foes\nwith its spikes."
        fr:
          scarlet: "Il attaque en se déplaçant rapidement et blesse\nses adversaires à l’aide des piques sur son dos\net de ses griffes acérées."
          violet: "Il se roule en boule et attaque ses adversaires\nà l’aide de ses épines, qui sont constituées\nde peau durcie."
        it:
          scarlet: "La sua specialità è attaccare con gli aculei\ndorsali e gli artigli affilati, spostandosi qua\ne là con movimenti fulminei."
          violet: "Attacca appallottolandosi e infilzando\nil nemico con gli aculei fatti di pelle indurita."
        de:
          scarlet: "Es ist besonders geschickt darin, mit den Stacheln\nan seinem Rücken und seinen scharfen Klauen\nanzugreifen, während es flink umherrennt."
          violet: "Seine Stacheln sind erhärtete Haut. Im Kampf\nrollt es sich zusammen und greift den Gegner\nmit den Stacheln an."
        es:
          scarlet: "Corre de un lado a otro a toda velocidad al\ntiempo que ataca hábilmente con las púas que\ntiene en la espalda y con sus afiladas garras."
          violet: "Sus afiladas púas, con las que ataca al rival\ntras hacerse una bola, son partes endurecidas\nde su piel."
        ko:
          scarlet: "재빠르게 뛰어다니며\n등의 가시와 날카로운 발톱으로\n공격하는 것이 특기다."
          violet: "가시는 피부가 단단해진 것.\n몸을 말아 날카로운 가시로\n찌르듯 상대를 공격한다."
        zh_simp:
          scarlet: "会敏捷地跑来跑去，\n擅长用背上的针和\n尖锐的爪进行攻击。"
          violet: "身上的刺是皮肤硬化后变成的。\n会将身体蜷成一团，\n用刺刺向对手进行攻击。"
        zh_trad:
          scarlet: "擅長敏捷地跑來跑去，\n並且用背部的尖針和\n銳利的爪子進行攻擊。"
          violet: "身上的刺是皮膚硬化後形成的。\n會將身體蜷成一團，\n用尖刺刺向對手進行攻擊。"
    sandslash_alolan_form:
      form_id: 1
      names:
        jp_kana: アローラのすがた
        jp_kanji: アローラのすがた
        en: Alolan Form
        fr: Forme d’Alola
        it: Forma di Alola
        de: Alola-Form
        es: Forma de Alola
        ko: 알로라의 모습
        zh_simp: 阿罗拉的样子
        zh_trad: 阿羅拉的樣子
      base_stats:
        hp: 75
