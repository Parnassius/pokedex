          scarlet: "￹汚￺きたな￻い　￹水￺みず￻も　ぜんぜん　￹平気￺へいき￻な\nタフな　ポケモン。　でも　ボロボロで\nみすぼらしいため　￹人気￺にんき￻は　ない。"
          violet: "￹一番￺いちばん￻　みすぼらしい　ポケモン。\n￹水草￺みずくさ￻の　￹多￺おお￻い　￹川底￺かわぞこ￻で\n￹大勢￺おおぜい￻　￹集￺あつ￻まって　￹暮￺く￻らしている。"
        jp_kanji:
          scarlet: "￹汚￺きたな￻い　￹水￺みず￻も　ぜんぜん　￹平気￺へいき￻な\nタフな　ポケモン。　でも　ボロボロで\nみすぼらしいため　￹人気￺にんき￻は　ない。"
          violet: "￹一番￺いちばん￻　みすぼらしい　ポケモン。\n￹水草￺みずくさ￻の　￹多￺おお￻い　￹川底￺かわぞこ￻で\n￹大勢￺おおぜい￻　￹集￺あつ￻まって　￹暮￺く￻らしている。"
        en:
          scarlet: "This tough Pokémon is perfectly fine even in\ndirty water. However, due to its ragged, shabby\nappearance, it isn’t popular."
          violet: "It is the shabbiest Pokémon of all. It forms\nschools and lives at the bottom of rivers that\nteem with plant life."
        fr:
          scarlet: "Ce Pokémon n’est pas très populaire du fait\nde son air miteux. Il est pourtant robuste\net n’a pas peur de nager en eaux troubles."
          violet: "Ce Pokémon d’apparence miteuse vit en larges\nbancs, au fond des rivières qui abondent\nen plantes aquatiques."
        it:
          scarlet: "Non è molto popolare per via del suo misero\naspetto, ma è molto resistente e in grado\ndi vivere anche in acque inquinate."
          violet: "Il Pokémon dall’aspetto più misero. Vive\nin grandi gruppi nei letti dei fiumi ricchi\ndi piante acquatiche."
        de:
          scarlet: "Dieses robuste Pokémon fühlt sich selbst in\nverschmutztem Wasser wohl. So schäbig und\nzerfetzt es ist, so unbeliebt ist es auch."
          violet: "Das schäbigste Pokémon von allen. Es lebt in\ngroßen Gruppen auf dem Grund von Flüssen,\nwo viele Wasserpflanzen wachsen."
        es:
          scarlet: "Este Pokémon es tan resistente que puede vivir\nsin problema hasta en las aguas más sucias, pero\nno es muy popular a causa de su aspecto."
          violet: "Es el Pokémon con aspecto más penoso. Habitan\ny forman bancos en los lechos de los ríos con\nabundantes plantas acuáticas."
        ko:
          scarlet: "더러운 물이라도 아무렇지 않은\n터프한 포켓몬. 하지만 추레하고\n초라해서 인기는 없다."
          violet: "제일 볼품없는 포켓몬이다.\n수초가 많은 강바닥에\n한데 모여 살고 있다."
        zh_simp:
          scarlet: "即使在脏水里也完全不介意的\n强壮的宝可梦。但破破烂烂一副\n寒酸的样子，所以不受欢迎。"
          violet: "最寒酸的宝可梦。\n会大量聚集在\n水草众多的河底生活。"
        zh_trad:
          scarlet: "即使在髒水裡也毫不介意的\n堅強寶可夢。但那一副破破爛爛的\n寒酸樣子並不受到歡迎。"
          violet: "最寒酸的寶可夢。\n在有許多水草的河底\n群聚而居。"
