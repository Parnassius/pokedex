      descriptions:
        jp_kana:
          scarlet: "だるんと　のびた　￹皮￺かわ￻を　￹首￺くび￻まで\n￹引￺ひ￻っ￹張￺ぱ￻りあげて　ガード。　￹皮￺かわ￻が\nのびている　￹個体￺こたい￻ほど　￹偉￺えら￻いらしい。"
          violet: "￹視線￺しせん￻の　￹合￺あ￻った　￹相手￺あいて￻に　いきなり\n￹頭突￺ずつ￻き￹攻撃￺こうげき￻を　￹仕掛￺しか￻ける。\nとても　￹硬￺かた￻い　￹頭￺ず￻がい￹骨￺こつ￻を　￹持￺も￻つ。"
        jp_kanji:
          scarlet: "だるんと　のびた　￹皮￺かわ￻を　￹首￺くび￻まで\n￹引￺ひ￻っ￹張￺ぱ￻りあげて　ガード。　￹皮￺かわ￻が\nのびている　￹個体￺こたい￻ほど　￹偉￺えら￻いらしい。"
          violet: "￹視線￺しせん￻の　￹合￺あ￻った　￹相手￺あいて￻に　いきなり\n￹頭突￺ずつ￻き￹攻撃￺こうげき￻を　￹仕掛￺しか￻ける。\nとても　￹硬￺かた￻い　￹頭￺ず￻がい￹骨￺こつ￻を　￹持￺も￻つ。"
        en:
          scarlet: "It stretches its saggy skin up to its neck to\nprotect itself. Among Scraggy, individuals with\nsaggier skin apparently garner more respect."
          violet: "It will abruptly headbutt anyone that makes eye\ncontact with it. Its skull is extremely hard."
        fr:
          scarlet: "Pour se protéger, il remonte sa peau plissée\njusqu’à son cou. Plus sa peau s’étire, plus\nil semble inspirer le respect."
          violet: "Ce Pokémon attaque brusquement à coups\nde tête quiconque a le malheur de croiser\nson regard. Il a le crâne très dur."
        it:
          scarlet: "Si protegge tirando la pelle su fino al collo.\nSembra che gli esemplari dalla pelle più lunga\nsiano quelli più rispettati."
          violet: "Attacca a testate chiunque abbia la sfortuna\ndi incrociare il suo sguardo. Il suo cranio è\ndurissimo."
        de:
          scarlet: "Es zieht seine gummiartige Haut zum Schutz bis\nzum Hals hinauf. Je höher es sie ziehen kann,\ndesto mehr Ansehen genießt es."
          violet: "Es hat einen dicken Schädel und versetzt jedem,\nmit dem sich sein Blick kreuzt, unvermittelt eine\nKopfnuss."
        es:
          scarlet: "Se sube la piel arrugada hasta el cuello para\nprotegerse. Parece que los ejemplares con la\npiel más larga son los más respetados."
          violet: "Propina un cabezazo inmediato a todo aquel\nque lo mira a los ojos. Su cráneo es muy duro."
        ko:
          scarlet: "축 늘어난 가죽을 목까지\n끌어 올려서 가드한다.\n가죽이 늘어난 개체일수록 대단하다고 한다."
          violet: "눈이 마주친 상대에게 느닷없이\n박치기 공격을 한다.\n매우 단단한 두개골을 가지고 있다."
        zh_simp:
          scarlet: "会把松垮垮的皮使劲\n向上拉到脖子用来保护自己。\n好像皮拉得越厉害的个体，地位越高。"
          violet: "会突然向对上眼的\n对手使出头锤攻击。\n拥有非常坚硬的头盖骨。"
        zh_trad:
          scarlet: "會把鬆垮垮的皮拉到脖子上\n來保護自己。皮越是鬆垮的\n滑滑小子，地位似乎就越高。"
          violet: "會猛然給與牠視線交會的\n對手一記頭錘攻擊。\n擁有非常堅硬的頭蓋骨。"
