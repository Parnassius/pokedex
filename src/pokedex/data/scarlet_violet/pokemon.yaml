          violet: "￹太古￺たいこ￻から　￹生￺い￻き￹続￺つづ￻けていると\nオカルト￹雑誌￺ざっし￻が　￹紹介￺しょうかい￻した\n￹謎￺なぞ￻の　ポケモンに　￹似￺に￻ている。"
        jp_kanji:
          scarlet: "￹近年￺きんねん￻　￹目撃例￺もくげきれい￻が　ある。\nイダイナキバという　￹名￺な￻は　ある￹本￺ほん￻に\n￹記￺しる￻された　￹生物￺せいぶつ￻から　￹取￺と￻られた。"
          violet: "￹太古￺たいこ￻から　￹生￺い￻き￹続￺つづ￻けていると\nオカルト￹雑誌￺ざっし￻が　￹紹介￺しょうかい￻した\n￹謎￺なぞ￻の　ポケモンに　￹似￺に￻ている。"
        en:
          scarlet: "Sightings of this Pokémon have occurred\nin recent years. The name Great Tusk was\ntaken from a creature listed in a certain book."
          violet: "This creature resembles a mysterious\nPokémon that, according to a paranormal\nmagazine, has lived since ancient times."
        fr:
          scarlet: "Ce Pokémon a été aperçu à plusieurs reprises\nces dernières années. Son nom s’inspire d’une\ncréature évoquée dans un certain livre."
          violet: "Il ressemble à un Pokémon mystérieux\nqui, selon une revue consacrée aux phénomènes\nparanormaux, existerait depuis la nuit des temps."
        it:
          scarlet: "Alcuni riportano di averlo avvistato negli ultimi\nanni. Il nome \"Grandizanne\" deriva da quello di\nuna creatura descritta in un certo libro."
          violet: "Somiglia a un Pokémon enigmatico\nche, stando a una rivista di paranormale,\nesiste fin da tempi antichissimi."
        de:
          scarlet: "In den letzten Jahren gab es Sichtungen\ndieses Pokémon. Eine Kreatur aus einem gewissen\nBuch stand Pate für den Namen Riesenzahn."
          violet: "Es gleicht einem geheimnisvollen Pokémon,\ndas einer esoterischen Zeitschrift zufolge seit\ngrauer Vorzeit überdauert haben soll."
        es:
          scarlet: "Testigos afirman haberlo visto recientemente.\nEl nombre Colmilargo está tomado de\nuna criatura mencionada en cierto libro."
          violet: "Su aspecto recuerda al de un extraño\nPokémon de origen primitivo que apareció\nen un artículo de cierta revista esotérica."
        ko:
          scarlet: "근년에 목격된 사례가 있다.\n“위대한엄니”라는 이름은\n어떤 책에 기록된 생물에게서 따온 것이다."
          violet: "태곳적부터 살아 있었다며\n오컬트 잡지에 소개됐던\n정체불명의 포켓몬을 닮았다."
        zh_simp:
          scarlet: "近年有人目击到它。\n雄伟牙这个名字来自于\n某本书里记载的生物。"
          violet: "长得就像是超自然杂志\n曾介绍的自太古以来\n就存活至今的神秘宝可梦。"
        zh_trad:
          scarlet: "近年曾經有人目擊到牠。\n雄偉牙這個名字來自於\n某本書裡記載的生物。"
          violet: "長得就像是超自然雜誌\n曾介紹的自太古以來\n就存活至今的謎之寶可夢。"
