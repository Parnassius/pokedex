        jp_kana:
          scarlet: "￹右腕￺みぎうで￻の　ハサミの￹中￺なか￻で　ガスを\n￹爆発￺ばくはつ￻させて　￹水￺みず￻を　￹発射￺はっしゃ￻。\n￹飛￺と￻んでいる　ポケモンを　￹狙￺ねら￻い￹撃￺う￻つ。"
          violet: "ハサミは　￹取￺と￻れても　￹再生￺さいせい￻する。\n￹中￺なか￻の　￹身￺み￻は　￹食￺た￻べられるが　クセが\n￹強￺つよ￻いので　￹好￺この￻みは　￹分￺わ￻かれる。"
        jp_kanji:
          scarlet: "￹右腕￺みぎうで￻の　ハサミの￹中￺なか￻で　ガスを\n￹爆発￺ばくはつ￻させて　￹水￺みず￻を　￹発射￺はっしゃ￻。\n￹飛￺と￻んでいる　ポケモンを　￹狙￺ねら￻い￹撃￺う￻つ。"
          violet: "ハサミは　￹取￺と￻れても　￹再生￺さいせい￻する。\n￹中￺なか￻の　￹身￺み￻は　￹食￺た￻べられるが　クセが\n￹強￺つよ￻いので　￹好￺この￻みは　￹分￺わ￻かれる。"
        en:
          scarlet: "This Pokémon launches water by detonating gas\ninside its right claw. It snipes flying Pokémon."
          violet: "Clauncher’s claws will regrow if they fall off. The\nmeat inside the claws is edible, but it has a\ndistinct flavor that doesn’t appeal to all tastes."
        fr:
          scarlet: "Il projette de l’eau en faisant exploser du gaz\ndans sa pince droite et s’attaque aux Pokémon\nvolants."
          violet: "S’il perd une pince, celle-ci repousse.\nSa chair est comestible, mais son goût\ntrès particulier ne fait pas l’unanimité."
        it:
          scarlet: "Può sparare acqua facendo esplodere dei gas\nall’interno della sua chela destra. Questa tecnica\ngli permette di abbattere i Pokémon in volo."
          violet: "Anche se staccate, le sue chele ricrescono. La\nloro polpa è commestibile, ma ha un sapore\nparticolare: alcuni la amano, altri la odiano."
        de:
          scarlet: "Indem es Gas in seiner rechten Schere detonieren\nlässt, kann Scampisto Wassersalven abfeuern,\nmit denen es fliegende Pokémon ins Visier nimmt."
          violet: "Verliert es eine Schere, wächst diese wieder nach.\nDas Fleisch darin ist zwar essbar, doch an seinem\nspeziellen Geschmack scheiden sich die Geister."
        es:
          scarlet: "Dispara balas de agua a Pokémon voladores\nhaciendo estallar el gas de su pinza derecha."
          violet: "Aunque pierda una pinza, volverá a crecerle.\nLa carne del interior es comestible, pero su\nsabor distintivo no es para todos los gustos."
        ko:
          scarlet: "오른쪽 집게 안에서\n가스를 폭발시켜서 물을 발사한다.\n날아가는 포켓몬을 노려 맞힐 수 있다."
          violet: "집게는 떨어져도 재생한다.\n속살은 먹을 수 있지만\n맛이 너무 독특해서 호불호가 갈린다."
        zh_simp:
          scarlet: "从右侧的钳子里\n让气体爆炸来发射水。\n会狙击飞在空中的宝可梦。"
          violet: "钳子即使脱落也会再长出来，\n里面的肉虽然可以食用，\n但由于味道太独特因此很挑喜好。"
        zh_trad:
          scarlet: "在右臂的鉗子裡讓\n氣體爆炸來發射出水。\n會狙擊飛在空中的寶可夢。"
          violet: "鉗子即使脫落也會再長出來。\n裡面的肉雖然可以食用，\n但味道過於獨特而喜惡分明。"
