      descriptions:
        jp_kana:
          scarlet: "￹木￺き￻を　￹殴￺なぐ￻りつけ　￹木￺き￻の￹実￺み￻を　￹落￺お￻として\n￹食￺た￻べる。　トレーニングしつつ　エサも\n￹採￺と￻れて　￹一石二鳥￺いっせきにちょう￻　なのだ。"
          violet: "ハサミは　もげても　すぐに　￹生￺は￻える。\nカラから　￹良￺よ￻い　￹出汁￺だし￻が　でるので\nパエリアの　￹具材￺ぐざい￻として　￹人気￺にんき￻。"
        jp_kanji:
          scarlet: "￹木￺き￻を　￹殴￺なぐ￻りつけ　￹木￺き￻の￹実￺み￻を　￹落￺お￻として\n￹食￺た￻べる。　トレーニングしつつ　エサも\n￹採￺と￻れて　￹一石二鳥￺いっせきにちょう￻　なのだ。"
          violet: "ハサミは　もげても　すぐに　￹生￺は￻える。\nカラから　￹良￺よ￻い　￹出汁￺だし￻が　でるので\nパエリアの　￹具材￺ぐざい￻として　￹人気￺にんき￻。"
        en:
          scarlet: "This Pokémon punches trees and eats the\nberries that drop down, training itself\nand getting food at the same time."
          violet: "If it loses its pincers, they’ll quickly regrow.\nThe pincers are popular ingredients in paella\nsince their shells produce a tasty soup stock."
        fr:
          scarlet: "Il boxe les arbres et mange les Baies qui\nen tombent, ce qui lui permet de s’entraîner\net de se nourrir en même temps."
          violet: "S’il perd ses pinces, elles repoussent rapidement.\nOn s’en sert pour préparer de délicieux bouillons,\nce qui en fait un ingrédient idéal pour les paellas."
        it:
          scarlet: "Prende a pugni gli alberi, per poi cibarsi delle\nbacche che cadono dai rami. In questo modo,\nsi allena e si procaccia il cibo simultaneamente."
          violet: "Se perde le chele, queste ricrescono subito. Dal\nloro guscio si ricava un ottimo brodo, infatti sono\nun ingrediente molto apprezzato per la paella."
        de:
          scarlet: "Dieses Pokémon boxt Bäume und frisst dann die\nBeeren, die von ihnen herabfallen. So gelangt es\nan Nahrung und kann gleichzeitig trainieren."
          violet: "Verliert es seine Scheren, so wachsen diese sofort\nnach. Aus deren Schale lässt sich eine leckere\nBrühe herstellen, die gern für Paella genutzt wird."
        es:
          scarlet: "Propina puñetazos a los árboles y devora las\nbayas que caen al suelo tras el impacto. Esto le\npermite entrenar y alimentarse al mismo tiempo."
          violet: "Las pinzas que pierde se regeneran enseguida.\nSus cáscaras suelen usarse para preparar caldos\ny aportar mucho sabor a platos como la paella."
        ko:
          scarlet: "나무를 때려서 떨어진 나무열매를 먹는다.\n트레이닝도 되고 먹이도 구해져서\n그야말로 일석이조다."
          violet: "집게는 떨어져도 금방 다시 자란다.\n껍데기에서 좋은 육수가 나오기 때문에\n파에야의 재료로 인기가 좋다."
        zh_simp:
          scarlet: "会击落树上的树果来吃。\n同时进行训练和觅食，\n可谓是一举两得。"
          violet: "钳子即使脱落也会马上长出来。\n外壳可以提取出美味的汤头，\n是很受欢迎的海鲜炖饭食材。"
        zh_trad:
          scarlet: "會擊落樹上的樹果來吃。\n訓練和覓食都能同時達成，\n簡直可以說是一舉兩得。"
          violet: "鉗子就算脫落也會馬上長回來。\n其外殼可以萃取出美味的高湯，\n是很有人氣的海鮮燉飯材料。"
