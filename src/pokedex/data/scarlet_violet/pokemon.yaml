      descriptions:
        jp_kana:
          scarlet: "ダイヤモンドよりも　￹硬￺かた￻い￹殻￺から￻に\n￹覆￺おお￻われている。　しかし　￹中￺なか￻は\n￹意外￺いがい￻と　￹柔￺やわ￻らかい。"
          violet: "￹殻￺から￻で　￹挟￺はさ￻みこむのは\nやわらかい　￹中身￺なかみ￻を　さらけ￹出￺だ￻すので\n￹一￺いち￻か￹八￺ばち￻かの　￹手段￺しゅだん￻なのだ。"
        jp_kanji:
          scarlet: "ダイヤモンドよりも　￹硬￺かた￻い￹殻￺から￻に\n￹覆￺おお￻われている。　しかし　￹中￺なか￻は\n￹意外￺いがい￻と　￹柔￺やわ￻らかい。"
          violet: "￹殻￺から￻で　￹挟￺はさ￻みこむのは\nやわらかい　￹中身￺なかみ￻を　さらけ￹出￺だ￻すので\n￹一￺いち￻か￹八￺ばち￻かの　￹手段￺しゅだん￻なのだ。"
        en:
          scarlet: "It is encased in a shell that is harder than diamond.\nInside, however, it is surprisingly tender."
          violet: "Clamping on to an opponent reveals its\nvulnerable parts, so it uses this move only as\na last resort."
        fr:
          scarlet: "Une coquille plus dure que le diamant le protège.\nIl est toutefois étonnamment tendre à l’intérieur."
          violet: "Lorsqu’il attaque en refermant sa carapace sur\nl’ennemi, sa partie intérieure devient vulnérable.\nIl ne le fait donc qu’en dernier recours."
        it:
          scarlet: "La conchiglia esterna è più dura del diamante.\nL’interno, invece, è sorprendentemente morbido."
          violet: "Quando attanaglia il nemico con le due valve\nil molle interno rimane esposto, perciò usa\nquesta tecnica solo come ultima risorsa."
        de:
          scarlet: "Seine Schale ist härter als Diamant. Im Inneren ist\nes jedoch überraschend weich."
          violet: "Klammert es sich mit seiner Schale an einen\nGegner, so wird sein weiches Inneres freigelegt.\nEs tut dies daher nur im äußersten Notfall."
        es:
          scarlet: "Está metido en una concha más dura que el\ndiamante, pero tiene un cuerpo muy blando."
          violet: "Cuando atenaza a sus enemigos, se vuelve\nvulnerable. Por eso solo utiliza esta técnica\ncomo último recurso."
        ko:
          scarlet: "다이아몬드보다 단단한\n껍데기에 싸여 있지만\n속은 의외로 말랑하다."
          violet: "껍데기로 물어 공격하는 것은\n부드러운 안쪽이 드러나므로\n궁지에 몰렸을 때 쓰는 수단이다."
        zh_simp:
          scarlet: "被比钻石还坚硬的壳\n所包裹。不过内部\n却是超乎意料的柔软。"
          violet: "用贝壳夹击的时候，\n里面柔软的部分就会暴露出来，\n所以这也是孤注一掷的攻击方式。"
        zh_trad:
          scarlet: "包覆著身體的是比鑽石\n還硬的殼。不過殼裡面\n卻比想像中的還要柔軟。"
          violet: "用貝殼夾擊的時候，\n裡面柔軟的部分就會暴露出來，\n所以這算是孤注一擲的攻擊方式。"
