          scarlet: "￹少￺すこ￻しずつ　￹染￺し￻みだしてくるのは\nよだれではない。　￹蜜￺みつ￻のような￹汁￺しる￻で\n￹獲物￺えもの￻を　おびき￹寄￺よ￻せているのだ。"
          violet: "ねばねばした　よだれのような　￹蜜￺みつ￻。\nとても　￹甘￺あま￻いのだが　においが\n￹異常￺いじょう￻に　￹臭￺くさ￻くて　￹近寄￺ちかよ￻れない。"
        jp_kanji:
          scarlet: "￹少￺すこ￻しずつ　￹染￺し￻みだしてくるのは\nよだれではない。　￹蜜￺みつ￻のような￹汁￺しる￻で\n￹獲物￺えもの￻を　おびき￹寄￺よ￻せているのだ。"
          violet: "ねばねばした　よだれのような　￹蜜￺みつ￻。\nとても　￹甘￺あま￻いのだが　においが\n￹異常￺いじょう￻に　￹臭￺くさ￻くて　￹近寄￺ちかよ￻れない。"
        en:
          scarlet: "The fluid that oozes from its mouth isn’t drool.\nIt is a nectar that is used to attract prey."
          violet: "It secretes a sticky, drool-like nectar. Though\nsweet, it smells too repulsive to get very close."
        fr:
          scarlet: "Le liquide qui s’écoule lentement de sa bouche\nn’est pas de la bave, mais une sorte de nectar\nqu’il utilise pour appâter sa proie."
          violet: "Il sécrète un nectar gluant, semblable à\nde la bave. Ce nectar est sucré, mais sent bien\ntrop mauvais pour qu’on puisse s’en approcher."
        it:
          scarlet: "Il fluido che gli esce dalla bocca non è bava.\nÈ un nettare usato per attirare le prede."
          violet: "Secerne un nettare viscoso, simile a bava,\nche pur essendo dolce ha un odore così\ninsopportabile da non potercisi avvicinare."
        de:
          scarlet: "Was aus seinem Mund sickert, ist kein Speichel,\nsondern eine Art Nektar, mit dem es seine\nBeute anlockt."
          violet: "Es scheidet klebrigen, speichelähnlichen Nektar\naus. Obwohl dieser sehr süß ist, stinkt er so\nschlimm, dass man sich ihm nicht nähern kann."
        es:
          scarlet: "El fluido que le cae lentamente de la boca no\nes saliva, sino una especie de néctar que utiliza\npara atraer a sus presas."
          violet: "Segrega a modo de saliva un néctar\npegajoso. Aunque es dulce, su olor es\ndemasiado repulsivo como para acercarse."
        ko:
          scarlet: "조금씩 배어 나오는 것은\n침이 아니다. 꿀 같은 즙으로\n먹잇감을 유인하는 것이다."
          violet: "끈적거리는 침 같은 꿀.\n매우 달콤하지만 냄새가\n너무나 역겨워서 다가갈 수 없다."
        zh_simp:
          scarlet: "从口中渐渐渗出的不是口水，\n而是像蜜一样的汁液，\n被它用来引诱猎物接近。"
          violet: "黏稠如口水的蜜非常甜，\n但气味异常地臭，\n让人难以靠近。"
        zh_trad:
          scarlet: "從口中緩緩滲出的不是口水，\n而是類似花蜜的汁液，\n被牠用來引誘獵物接近。"
          violet: "猶如口水般的黏稠花蜜\n非常甜，但氣味異常地臭，\n任誰都難以靠近牠。"
