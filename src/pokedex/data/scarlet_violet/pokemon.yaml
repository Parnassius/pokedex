      descriptions:
        jp_kana:
          scarlet: "￹傷￺きず￻ついた　ポケモンや　￹人￺ひと￻がいると\n￹栄養満点￺えいようまんてん￻の　タマゴを￹産￺う￻み\n￹分￺わ￻け￹与￺あた￻える　￹優￺やさ￻しい　ポケモン。"
          violet: "￹持￺も￻っている　タマゴを　￹割￺わ￻らないように\n￹気￺き￻をつけて　￹歩￺ある￻く。\nでも　￹逃￺に￻げ￹足￺あし￻は　とても　￹速￺はや￻い。"
        jp_kanji:
          scarlet: "￹傷￺きず￻ついた　ポケモンや　￹人￺ひと￻がいると\n￹栄養満点￺えいようまんてん￻の　タマゴを￹産￺う￻み\n￹分￺わ￻け￹与￺あた￻える　￹優￺やさ￻しい　ポケモン。"
          violet: "￹持￺も￻っている　タマゴを　￹割￺わ￻らないように\n￹気￺き￻をつけて　￹歩￺ある￻く。\nでも　￹逃￺に￻げ￹足￺あし￻は　とても　￹速￺はや￻い。"
        en:
          scarlet: "This kindly Pokémon lays highly nutritious eggs\nand shares them with injured Pokémon or people."
          violet: "It walks carefully to prevent its egg from\nbreaking. However, it is extremely fast at\nrunning away."
        fr:
          scarlet: "Ce Pokémon très serviable distribue ses œufs\nhautement nutritifs aux êtres humains et aux\nPokémon blessés."
          violet: "Ce Pokémon marche lentement pour ne pas\nabîmer son œuf. Il est toutefois capable de\ns’enfuir très vite."
        it:
          scarlet: "Un Pokémon altruista che depone uova molto\nnutrienti e le condivide con persone o Pokémon\nferiti."
          violet: "Cammina con prudenza per non rompere\nil suo uovo. Tuttavia, può fuggire con estrema\nrapidità."
        de:
          scarlet: "Ein freundliches Pokémon, das nahrhafte Eier\nlegt, um diese mit verletzten Pokémon und\nMenschen zu teilen."
          violet: "Chaneira bewegt sich behutsam, damit sein Ei\nnicht zerbricht. Es kann jedoch sehr schnell\ndavonlaufen."
        es:
          scarlet: "Un generoso Pokémon que pone huevos muy\nnutritivos y se los da a personas o Pokémon\nheridos."
          violet: "Camina con cuidado para que no se rompa\nsu huevo. Sin embargo, este Pokémon es\nextremadamente rápido escapando."
        ko:
          scarlet: "상처 입은 포켓몬이나 사람이 있으면\n영양 만점의 알을 낳아\n나눠 주는 상냥한 포켓몬이다."
          violet: "지니고 있는 알을\n깨지 않도록 조심해서 걸어 다닌다.\n그러나 도망치는 것은 매우 빠르다."
        zh_simp:
          scarlet: "性格温柔的宝可梦，\n会生出营养丰富的蛋\n分给受伤的宝可梦和人类。"
          violet: "不想让自己带着的蛋被打破，\n走起路来小心谨慎。\n然而逃跑时却是极为快速。"
        zh_trad:
          scarlet: "心地很善良的寶可夢，\n會生出營養滿分的蛋\n分給受傷的寶可夢和人類。"
          violet: "為了避免蛋被打破，\n走起路來小心謹慎。\n然而逃跑速度卻是快之無比。"
