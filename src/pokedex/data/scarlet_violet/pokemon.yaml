      descriptions:
        jp_kana:
          scarlet: "￹体￺からだ￻が　￹小￺ちい￻さく　￹発電器官￺はつでんきかん￻が\n￹未熟￺みじゅく￻なので　￹人家￺じんか￻の　￹電気￺でんき￻を\n￹尻尾￺しっぽ￻で　￹吸￺す￻い￹取￺と￻り　￹充電￺じゅうでん￻する。"
          violet: "ほっぺの　ヒゲから　￹電波￺でんぱ￻を　￹飛￺と￻ばし\n￹仲間￺なかま￻と　￹連絡￺れんらく￻を　とりあう。\n￹電気￺でんき￻が　￹減￺へ￻ると　￹丸￺まる￻まり　￹眠￺ねむ￻る。"
        jp_kanji:
          scarlet: "￹体￺からだ￻が　￹小￺ちい￻さく　￹発電器官￺はつでんきかん￻が\n￹未熟￺みじゅく￻なので　￹人家￺じんか￻の　￹電気￺でんき￻を\n￹尻尾￺しっぽ￻で　￹吸￺す￻い￹取￺と￻り　￹充電￺じゅうでん￻する。"
          violet: "ほっぺの　ヒゲから　￹電波￺でんぱ￻を　￹飛￺と￻ばし\n￹仲間￺なかま￻と　￹連絡￺れんらく￻を　とりあう。\n￹電気￺でんき￻が　￹減￺へ￻ると　￹丸￺まる￻まり　￹眠￺ねむ￻る。"
        en:
          scarlet: "It’s small and its electricity-generating organ is\nnot fully developed, so it uses its tail to absorb\nelectricity from people’s homes and charge itself."
          violet: "Dedenne emit electrical waves from the whiskers\non their cheeks to communicate with each other.\nWhen low on electricity, they curl up and sleep."
        fr:
          scarlet: "Son corps étant petit et son organe générateur\nd’électricité peu développé, il se recharge en\naspirant l’électricité des maisons avec sa queue."
          violet: "Il communique avec les siens grâce aux ondes\némises par ses moustaches. Si son niveau\nd’électricité est trop bas, il se love pour dormir."
        it:
          scarlet: "A causa del corpo piccolo, l’organo che genera\nelettricità non è molto sviluppato. Si ricarica\nassorbendo l’elettricità dalle case con la coda."
          violet: "Usa i baffi che ha sulle guance per produrre onde\nradio con cui comunica con i suoi simili. Se finisce\nl’elettricità, si raggomitola e si addormenta."
        de:
          scarlet: "Da es klein ist und sein elektrisches Organ nicht\nstark ausgebildet ist, zapft es mit seinem Schwanz\nin Häusern Strom ab, um sich aufzuladen."
          violet: "Mit seinen Schnurrhaaren sendet es Wellen aus,\num sich mit Artgenossen zu verständigen. Geht\nihm der Strom aus, kugelt es sich ein und schläft."
        es:
          scarlet: "Como es menudo y su órgano electrógeno está\npoco desarrollado, absorbe electricidad de las\ncasas con la cola para recargar sus reservas."
          violet: "Se comunica con los suyos a través de las ondas\neléctricas que emite con los bigotes. Si su reserva\nde electricidad disminuye, se acurruca y duerme."
        ko:
          scarlet: "몸집이 작고 발전 기관이 미숙하기 때문에\n사람이 사는 집의 전기를\n꼬리를 통해 흡수해서 충전한다."
          violet: "볼에 난 수염에서 전파를 내보내어\n동료와 연락을 취한다.\n전기가 줄어들면 몸을 둥글게 말고 잔다."
        zh_simp:
          scarlet: "由于体型娇小，发电器官\n尚未发达，因此会用尾巴\n吸取人类住宅的电力来充电。"
          violet: "会从脸颊上的胡须发出电波\n来与伙伴互相联络。\n电力变少时会蜷缩起来睡觉。"
        zh_trad:
          scarlet: "由於體型嬌小，發電器官\n尚未發達，因此會用尾巴\n吸取住家的電力來充電。"
          violet: "會從雙頰上的鬍鬚發出電波\n來與同伴相互聯絡。\n電力變少時會蜷縮起來睡覺。"
