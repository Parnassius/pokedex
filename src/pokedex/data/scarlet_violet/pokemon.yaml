          scarlet: "￹発達￺はったつ￻した　￹太￺ふと￻ももの　￹筋肉￺きんにく￻が\n￹驚異的￺きょういてき￻な　￹瞬発力￺しゅんぱつりょく￻と\n￹跳躍力￺ちょうやくりょく￻を　￹生￺う￻み￹出￺だ￻すぞ。"
          violet: "￹大木￺たいぼく￻の　￹枝￺えだ￻から￹枝￺えだ￻へ\n￹身軽￺みがる￻に　￹飛￺と￻び￹移￺うつ￻り　￹移動￺いどう￻する。\n￹驚異的￺きょういてき￻な　￹瞬発力￺しゅんぱつりょく￻。"
        jp_kanji:
          scarlet: "￹発達￺はったつ￻した　￹太￺ふと￻ももの　￹筋肉￺きんにく￻が\n￹驚異的￺きょういてき￻な　￹瞬発力￺しゅんぱつりょく￻と\n￹跳躍力￺ちょうやくりょく￻を　￹生￺う￻み￹出￺だ￻すぞ。"
          violet: "￹大木￺たいぼく￻の　￹枝￺えだ￻から￹枝￺えだ￻へ\n￹身軽￺みがる￻に　￹飛￺と￻び￹移￺うつ￻り　￹移動￺いどう￻する。\n￹驚異的￺きょういてき￻な　￹瞬発力￺しゅんぱつりょく￻。"
        en:
          scarlet: "Its strongly developed thigh muscles give it\nastounding agility and jumping performance."
          violet: "Grovyle leaps from branch to branch in large\ntrees, moving with ease. It propels itself with\nastounding speed and force."
        fr:
          scarlet: "Les muscles développés de ses cuisses\nlui confèrent une vivacité et une détente\nincroyables."
          violet: "Il se déplace dans les grands arbres en sautant\navec agilité de branche en branche. Sa vivacité\nest extraordinaire."
        it:
          scarlet: "I muscoli delle cosce estremamente sviluppati\ngli conferiscono un’incredibile agilità e una\nprodigiosa capacità di salto."
          violet: "Si sposta saltando agilmente tra i rami di grandi\nalberi. È capace di scatti impressionanti."
        de:
          scarlet: "Seine stark entwickelten Oberschenkelmuskeln\nverleihen ihm außergewöhnliche Agilität und\nSprungkraft."
          violet: "Es verfügt über eine erstaunliche Sprungkraft\nund bewegt sich auf hohen Bäumen mit\nLeichtigkeit von Ast zu Ast fort."
        es:
          scarlet: "Los desarrollados músculos de sus extremidades\ninferiores le proporcionan una tremenda agilidad\ny una portentosa capacidad de salto."
          violet: "Se desplaza saltando grácilmente de rama en\nrama por los árboles más altos, haciendo gala\nde su tremenda agilidad."
        ko:
          scarlet: "발달한 넓적다리의 근육이\n경이로운 순발력과\n도약력을 만들어 낸다."
          violet: "큰 나뭇가지에서 다른 가지로\n가볍게 뛰어 이동한다.\n경이로운 순발력이다."
        zh_simp:
          scarlet: "发达的大腿肌肉会产生出\n惊人的爆发力和弹跳力。"
          violet: "会轻巧地在大树的\n树枝之间跳跃移动。\n爆发力十分惊人。"
        zh_trad:
          scarlet: "發達的大腿肌肉\n會產生出驚人的\n爆發力和跳躍力。"
          violet: "會在大樹的枝頭間\n輕巧地跳躍移動。\n爆發力十分驚人。"
