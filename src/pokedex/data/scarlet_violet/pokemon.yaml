        jp_kanji:
          scarlet: "つぶらな　￹瞳￺ひとみ￻が　￹揺￺ゆ￻れるとき\n￹眠￺ねむ￻たくなるような　￹不思議￺ふしぎ￻で\n￹気持￺きも￻ちのいい　￹歌￺うた￻を　￹歌￺うた￻う。"
          violet: "￹大￺おお￻きく　￹体￺からだ￻を　ふくらませてから\n￹歌￺うた￻う　￹子守歌￺こもりうた￻は　いつもより　￹長￺なが￻くて\nぜったいに　￹眠￺ねむ￻くなる。"
        en:
          scarlet: "When its huge eyes waver, it sings a mysteriously\nsoothing melody that lulls its enemies to sleep."
          violet: "If it inflates to sing a lullaby, it can perform\nlonger and cause sure drowsiness in its audience."
        fr:
          scarlet: "Quand ses grands yeux luisent, il chante\nune berceuse mystérieuse et agréable\nqui pousse ses ennemis à s’endormir."
          violet: "Lorsqu’il se gonfle, il peut chanter une longue\nberceuse qui endort inévitablement quiconque\nl’entend."
        it:
          scarlet: "Quando i suoi occhioni rotondi tremolano, canta\nuna misteriosa melodia che fa addormentare."
          violet: "Quando si gonfia prima di cantare, la sua\nninnananna dura più a lungo e fa addormentare\nimmancabilmente chi la ascolta."
        de:
          scarlet: "Wenn seine Kulleraugen zu flackern beginnen,\nsingt es ein mysteriöses, wohlklingendes Lied,\ndas Zuhörer in Schlaf versetzt."
          violet: "Wenn es tief einatmet und sich aufbläht, kann es\nein noch längeres Lied singen, das seine Zuhörer\nunweigerlich in Schlaf versetzt."
        es:
          scarlet: "Cuando le tiemblan sus redondos y adorables\nojos, entona una melodía agradable y misteriosa\ncon la que duerme a sus enemigos."
          violet: "Si se hincha para cantar una nana, cantará más\ntiempo y causará sopor en el público."
        ko:
          scarlet: "초롱초롱한 눈동자가 흔들릴 때\n졸음이 쏟아지게 하는 이상하고\n기분 좋은 노래를 부른다."
          violet: "크게 몸을 부풀리고 노래할 때의\n자장가는 평소보다 길어서\n반드시 잠이 온다."
        zh_simp:
          scarlet: "当它圆溜溜的大眼睛转动时\n就会唱起奇妙又令人惬意的歌曲，\n让人昏昏欲睡。"
          violet: "身体胀大后唱出的摇篮曲\n会比平时持续的时间更长，\n绝对会让对方变得昏昏欲睡。"
        zh_trad:
          scarlet: "當牠圓圓的大眼睛轉動時，\n就會唱起奇妙的歌曲，\n讓人舒服地昏昏欲睡。"
          violet: "身體脹大後唱出的搖籃曲\n會比平常持續更長的時間，\n絕對會讓對方變得昏昏欲睡。"
