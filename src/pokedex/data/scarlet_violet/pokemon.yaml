          violet: "￹感情￺かんじょう￻が　たかぶると　￹電気￺でんき￻を　￹帯￺お￻びて\n￹真￺ま￻っ￹直￺す￻ぐになった　￹体毛￺たいもう￻を\n￹何本￺なんぼん￻も　￹飛￺と￻ばす。"
        jp_kanji:
          scarlet: "￹細胞￺さいぼう￻が　￹出￺だ￻している　￹弱￺よわ￻い\n￹電気￺でんき￻を　ひとまとめにして\n￹強力￺きょうりょく￻な　￹電撃￺でんげき￻を　￹放￺はな￻つ。"
          violet: "￹感情￺かんじょう￻が　たかぶると　￹電気￺でんき￻を　￹帯￺お￻びて\n￹真￺ま￻っ￹直￺す￻ぐになった　￹体毛￺たいもう￻を\n￹何本￺なんぼん￻も　￹飛￺と￻ばす。"
        en:
          scarlet: "It concentrates the weak electric charges emitted\nby its cells and launches wicked lightning bolts."
          violet: "If agitated, it uses electricity to straighten out its\nfur and launch it in small bunches."
        fr:
          scarlet: "Il concentre la faible charge électrique générée\npar chacune de ses cellules pour projeter\nde puissants éclairs."
          violet: "Quand il est agité, sa fourrure chargée\nd’électricité se hérisse. Il lance alors des\ntouffes de poils acérés comme des piquants."
        it:
          scarlet: "Concentra la debole carica elettrica emessa\ndalle sue cellule per lanciare potenti scariche."
          violet: "Quando si agita, usa l’elettricità per rizzare i peli\ne scagliarli in piccoli nugoli."
        de:
          scarlet: "Es sammelt die schwache elektrische Energie,\ndie von seinen Zellen ausgeht, und feuert starke\nBlitze ab."
          violet: "Bringt man es aus der Ruhe, verwendet es\nElektrizität, um sein Fell aufzustellen und Teile\ndavon abzufeuern."
        es:
          scarlet: "Concentra la débil actividad eléctrica de sus\ncélulas para lanzar dañinas descargas."
          violet: "Si se agita, usa electricidad para convertir\nsu pelaje en afiladísimas púas y dispararlas\nen racimos."
        ko:
          scarlet: "세포가 내고 있는 약한\n전기를 하나로 모아서\n강력한 전기를 발산한다."
          violet: "감정이 날카로워지면\n전기를 띠고 곤두선 털을\n몇 가닥이든 날린다."
        zh_simp:
          scarlet: "细胞放出的微弱\n电流聚集到一起，\n便能释放强力的电击。"
          violet: "只要情绪激昂起来，\n就会发射出多根\n带电且竖立的体毛。"
        zh_trad:
          scarlet: "會把細胞發出的\n微弱電流都集中起來\n釋放強力的電擊。"
          violet: "情緒只要激昂了起來，\n就會發射出無數根\n因帶電而豎立的體毛。"
