        jp_kanji:
          scarlet: "￹翼￺つばさ￻の　￹骨￺ほね￻は　￹風￺かぜ￻を　￹受￺う￻けると\n￹電気￺でんき￻を　￹作￺つく￻る。　￹海￺うみ￻に　￹飛￺と￻び￹込￺こ￻み\n￹獲物￺えもの￻を　￹感電￺かんでん￻させて　￹捕￺と￻らえる。"
          violet: "￹海岸￺かいがん￻の　￹崖￺がけ￻に　￹巣￺す￻を　￹作￺つく￻る。\n￹巣￺す￻は　パチパチ　￹弾￺はじ￻ける\n￹不思議￺ふしぎ￻な　￹食感￺しょっかん￻で　￹人気￺にんき￻の　￹珍味￺ちんみ￻。"
