      types:
        - ghost
        - ground
      egg_groups:
        - amorphous
      abilities:
        - water_compaction
      hidden_ability: sand_veil
      descriptions:
        jp_kana:
          scarlet: "￹小￺ちい￻さな　ポケモンを　￹砂￺すな￻の￹体￺からだ￻に\n￹引￺ひ￻きずり￹込￺こ￻み　￹好￺す￻きなときに　￹生気￺せいき￻を\n￹吸￺す￻い￹取￺と￻る　￹恐￺おそ￻ろしい　ポケモン。"
          violet: "￹生命￺せいめい￻エネルギーを　￹吸￺す￻い￹取￺と￻り\n￹干￺ひ￻からびた　ものたちの　￹骨￺ほね￻を\n￹腕￺うで￻の　へこみから　￹発射￺はっしゃ￻する。"
        jp_kanji:
          scarlet: "￹小￺ちい￻さな　ポケモンを　￹砂￺すな￻の￹体￺からだ￻に\n￹引￺ひ￻きずり￹込￺こ￻み　￹好￺す￻きなときに　￹生気￺せいき￻を\n￹吸￺す￻い￹取￺と￻る　￹恐￺おそ￻ろしい　ポケモン。"
          violet: "￹生命￺せいめい￻エネルギーを　￹吸￺す￻い￹取￺と￻り\n￹干￺ひ￻からびた　ものたちの　￹骨￺ほね￻を\n￹腕￺うで￻の　へこみから　￹発射￺はっしゃ￻する。"
        en:
          scarlet: "The terrifying Palossand drags smaller Pokémon\ninto its sandy body. Once its victims are trapped,\nit drains them of their vitality whenever it pleases."
          violet: "From the hollows in its arms, it fires the\nbones of its victims, which are all dried up\nafter being drained of their vitality."
        fr:
          scarlet: "Trépassable est terrifiant. Il attire de petits\nPokémon à l’intérieur de son corps de sable\nafin d’aspirer leur énergie vitale à sa guise."
          violet: "Il aspire l’énergie vitale de ses victimes jusqu’à\nles dessécher, puis il expulse leurs ossements\npar les meurtrières de ses tours."
        it:
          scarlet: "Questo Pokémon spaventoso trascina nel suo\ncorpo sabbioso i Pokémon più piccoli e ne\nassorbe l’energia vitale quando gli pare."
          violet: "Dalle cavità nelle braccia espelle le ossa\ndelle sue vittime rinsecchite e ormai\nprosciugate di ogni energia vitale."
        de:
          scarlet: "Das furchterregende Colossand zieht kleinere\nPokémon in seinen Körper aus Sand und saugt\nihnen nach Belieben die Lebenskraft aus."
          violet: "Aus den Hohlräumen in seinen Armen feuert es\ndie Knochen seiner ausgetrockneten Opfer,\nderen Lebenskraft es ausgesaugt hat."
        es:
          scarlet: "Un Pokémon terrorífico que atrapa a Pokémon\npequeños dentro de su cuerpo arenoso y\nles absorbe la vitalidad cuando se le antoja."
          violet: "Dispara por los huecos que tiene en\nlos brazos los huesos de aquellos cuya\nenergía vital ha absorbido por completo."
        ko:
          scarlet: "작은 포켓몬을 모래로 된 몸 안으로\n끌어들인 뒤, 자신이 원할 때\n생기를 빨아들이는 무서운 포켓몬."
          violet: "생명 에너지를 흡수하여\n바싹 마른 자들의 뼈를\n팔의 움푹한 부분을 통해 발사한다."
        zh_simp:
          scarlet: "把小型宝可梦吸进由沙子构成的\n身体里，然后任意吸取对方的精气，\n是非常恐怖的宝可梦。"
          violet: "会把对手的生命能量\n吸个精光。然后从手臂的\n凹陷处把骸骨发射出去。"
        zh_trad:
          scarlet: "會把小型寶可夢吸進沙子\n構成的身體裡，任憑自己\n吸取精氣的恐怖寶可夢。"
          violet: "會把對手的生命能量\n吸得精光，然後把骨骸\n從臂上的凹洞發射出去。"
