        - psychic
      egg_groups:
        - monster
        - water_1
      abilities:
        - quick_draw
        - own_tempo
      hidden_ability: regenerator
      descriptions:
        jp_kana:
          scarlet: "￹腕￺うで￻に　￹噛￺か￻みつく　シェルダーは\n￹染￺し￻みでる　￹毒素￺どくそ￻で　￹気絶￺きぜつ￻しているが\nおいしさのあまり　￹夢心地￺ゆめごこち￻らしい。"
          violet: "￹腕￺うで￻の　￹毒素￺どくそ￻を　もっと　すすろうと\nシェルダーが　￹強￺つよ￻く　￹噛￺か￻みつくのが\nむず￹痒￺がゆ￻いらしく　たまに　￹暴￺あば￻れる。"
        jp_kanji:
          scarlet: "￹腕￺うで￻に　￹噛￺か￻みつく　シェルダーは\n￹染￺し￻みでる　￹毒素￺どくそ￻で　￹気絶￺きぜつ￻しているが\nおいしさのあまり　￹夢心地￺ゆめごこち￻らしい。"
          violet: "￹腕￺うで￻の　￹毒素￺どくそ￻を　もっと　すすろうと\nシェルダーが　￹強￺つよ￻く　￹噛￺か￻みつくのが\nむず￹痒￺がゆ￻いらしく　たまに　￹暴￺あば￻れる。"
        en:
          scarlet: "Shellder seems blissful over the taste of Slowbro\neven though the toxins seeping from the bite\nhave caused Shellder to faint."
          violet: "Shellder bites down hard on Slowbro’s arm\nto suck out more poison. This seems to cause\nitching, so Slowbro occasionally lashes out."
        fr:
          scarlet: "Le poison de ce Pokémon a assommé Kokiyas,\nmais ce dernier semble envoûté par la saveur\ndélicieuse du bras qu’il a mordu."
          violet: "Lorsque Kokiyas mord plus fort pour aspirer plus\nde poison, il provoque des démangeaisons sur\nle bras de Flagadoss, qui se met à se débattre."
        it:
          scarlet: "Lo Shellder che gli morde il braccio è svenuto a\ncausa delle tossine che Slowbro rilascia, ma pare\nanche che sia in estasi per il sapore delizioso."
          violet: "Lo Shellder che gli morde il braccio con forza\nper succhiarne le tossine sembra dargli prurito.\nPer questo, ogni tanto si infuria."
        de:
          scarlet: "Das am Arm festgebissene Muschas wurde wegen\ndes austretenden Gifts zwar bewusstlos, erscheint\naber ekstatisch durch Lahmus’ Geschmack."
          violet: "Muschas beißt kräftig in Lahmus’ Arm, um mehr\nGift aus ihm zu saugen. Dies erzeugt wohl einen\nJuckreiz, der Lahmus mitunter rasend macht."
        es:
          scarlet: "A pesar de haber perdido el conocimiento por\nel veneno, el Shellder que le muerde el brazo\nparece estar extasiado con su delicioso sabor."
          violet: "La fuerte mordedura del Shellder que trata de\nsuccionarle el veneno del brazo le ocasiona tal\npicor que a veces pierde el control."
        ko:
          scarlet: "팔을 물고 있는 셀러는\n배어 나오는 독소에 기절해 있지만\n너무나도 맛있어서 황홀한 상태라고 한다."
          violet: "팔의 독소를 더 많이 마시려는\n셀러가 강하게 무는 것이\n간지러운 것인지 가끔씩 날뛴다."
        zh_simp:
          scarlet: "咬在手臂上的大舌贝\n会因渗出的毒素而失去意识，\n但也会因味道太好而宛如做梦。"
          violet: "大舌贝为了吸取更多手臂的\n毒素会用力咬它，而这似乎会\n让它发痒，所以它偶尔会发狂。"
        zh_trad:
          scarlet: "咬住牠手臂的大舌貝雖然已\n因滲出的毒素而失去了意識，\n但也因太美味而彷彿置身夢境。"
          violet: "被想要吸取更多毒素的大舌貝\n狠咬手臂時，似乎會刺刺癢癢的。\n有時會因此而大鬧一番。"
