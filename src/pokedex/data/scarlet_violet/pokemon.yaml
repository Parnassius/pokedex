      hidden_ability: competitive
      descriptions:
        jp_kana:
          scarlet: "プライドを　￹傷￺きず￻つける￹者￺もの￻は\n￹流氷￺りゅうひょう￻をも　￹切断￺せつだん￻する　￹翼￺つばさ￻で\n￹真￺ま￻っ￹二￺ぷた￻つにする。"
          violet: "むだな　￹争￺あらそ￻いは　やらないが\n￹群￺む￻れの　￹安全￺あんぜん￻を　￹脅￺おびや￻かす\n￹敵￺てき￻は　￹容赦￺ようしゃ￻なく　￹叩￺たた￻きのめす。"
        jp_kanji:
          scarlet: "プライドを　￹傷￺きず￻つける￹者￺もの￻は\n￹流氷￺りゅうひょう￻をも　￹切断￺せつだん￻する　￹翼￺つばさ￻で\n￹真￺ま￻っ￹二￺ぷた￻つにする。"
          violet: "むだな　￹争￺あらそ￻いは　やらないが\n￹群￺む￻れの　￹安全￺あんぜん￻を　￹脅￺おびや￻かす\n￹敵￺てき￻は　￹容赦￺ようしゃ￻なく　￹叩￺たた￻きのめす。"
        en:
          scarlet: "If anyone were to hurt its pride, it would slash\nthem in two with wings that can cleave through\nan ice floe."
          violet: "It avoids unnecessary disputes, but it will\nmercilessly decimate anything that threatens\nthe safety of its colony."
        fr:
          scarlet: "Il découpe en deux quiconque blesse son orgueil\nà l’aide de ses ailes, qui sont capables de briser\nla banquise."
          violet: "Il évite les conflits inutiles, mais attaquera\nsans pitié tout ennemi qui menacerait\nla sécurité du groupe."
        it:
          scarlet: "Se qualcuno lo ferisce nell’orgoglio, lo trancia\ncon le sue ali capaci di fendere un banco\ndi ghiaccio."
          violet: "Non attacca briga senza motivo, ma se\nun nemico minaccia la pace del branco,\nlo pesta senza pietà."
        de:
          scarlet: "Verletzt jemand seine Ehre, so schlägt es diesen\nmit seinen Flügeln entzwei, die sogar Treibeis\ndurchschneiden können."
          violet: "Es vermeidet unnötige Kämpfe. Ist jedoch die\nSicherheit seiner Gruppe in Gefahr, zeigt es\nsich unerbittlich."
        es:
          scarlet: "Si alguien hiere su orgullo, lo desgarra con sus\nalas, capaces de cortar incluso témpanos de\nhielo."
          violet: "Nunca pelea en vano, pero, si un enemigo pone\nen peligro la seguridad de los suyos, lo golpeará\nsin miramientos hasta noquearlo."
        ko:
          scarlet: "프라이드를 건드리는 자는\n유빙까지도 절단하는\n날개로 두 동강을 낸다."
          violet: "쓸데없는 분쟁은 하지 않지만\n무리의 안전을 위협하는 적은\n가차 없이 때려눕힌다."
        zh_simp:
          scarlet: "伤害到它自尊心的家伙，\n会被它用能切断浮冰的\n翅膀一分为二。"
          violet: "虽然不会挑起无谓的争斗，\n但对于威胁到群体安全的敌人，\n会毫不留情地将其击垮。"
        zh_trad:
          scarlet: "會用連流冰都能劈斷的\n翅膀把傷了牠自尊心的\n傢伙劈成兩半。"
          violet: "不會參與無謂的紛爭，\n但若有威脅群體安全的敵人，\n就會毫不留情地將其擊潰。"
