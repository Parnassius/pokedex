          violet: "￹乾燥￺かんそう￻した　￹砂地￺すなち￻に　￹棲￺す￻んでいる。\n￹土￺つち￻の￹中￺なか￻の　￹鉄分￺てつぶん￻を　￹食￺た￻べて\n￹金属￺きんぞく￻の　￹体￺からだ￻を　￹保￺たも￻っている。"
        jp_kanji:
          scarlet: "￹敵￺てき￻に　￹襲￺おそ￻われると　￹体毛￺たいもう￻を\nこぶしのように　￹使￺つか￻い\nパンチの　￹嵐￺あらし￻を　お￹見舞￺みま￻いするのだ。"
          violet: "￹乾燥￺かんそう￻した　￹砂地￺すなち￻に　￹棲￺す￻んでいる。\n￹土￺つち￻の￹中￺なか￻の　￹鉄分￺てつぶん￻を　￹食￺た￻べて\n￹金属￺きんぞく￻の　￹体￺からだ￻を　￹保￺たも￻っている。"
        en:
          scarlet: "When attacked, this Pokémon will wield\nthe tendrils on its body like fists and pelt\nthe opponent with a storm of punches."
          violet: "This Pokémon lives in arid deserts.\nIt maintains its metal body by consuming\niron from the soil."
        fr:
          scarlet: "Lorsqu’on l’attaque, ce Pokémon se sert\nde ses poils comme de poings pour rouer\nde coups ses adversaires."
          violet: "Ce Pokémon vit dans les déserts arides.\nIl ingère le fer que contient le sol afin\nd’entretenir son corps de métal."
        it:
          scarlet: "Quando viene assalito da un nemico,\nfa vibrare le ciglia laterali per investirlo\ncon una tempesta di pugni."
          violet: "Vive in zone sabbiose dal clima secco.\nSi nutre del ferro contenuto nel terreno\nper sostentare il suo corpo metallico."
        de:
          scarlet: "Wird es angegriffen, setzt es seine Borsten\nwie Fäuste ein, um damit einen Sturm aus\nHieben zu entfesseln."
          violet: "Es lebt in trockenen Wüstengebieten, wo es den\nim Boden enthaltenen Eisenanteil konsumiert,\num seinen metallenen Körper instand zu halten."
        es:
          scarlet: "Cuando lo atacan, usa los pelos de su\ncuerpo a modo de puños y hace llover un\naluvión de puñetazos sobre sus enemigos."
          violet: "Habita en desiertos áridos. Se alimenta\ndel hierro del suelo para mantener su\ncuerpo férreo."
        ko:
          scarlet: "적에게 공격을 받으면\n털을 주먹처럼 사용하여\n폭풍 같은 기세로 펀치를 날린다."
          violet: "건조한 사막에 산다.\n땅속의 철분을 먹으며\n금속으로 된 몸을 유지하고 있다."
        zh_simp:
          scarlet: "遭到敌人攻击时，\n会把体毛当做拳头使用，\n朝着敌人大秀拳头风暴。"
          violet: "栖息在干燥的沙地上。\n会以土中铁质为食，\n来维持由金属构成的身体。"
        zh_trad:
          scarlet: "遭到攻擊的時候，\n會把體毛如拳頭般地使用，\n朝著敵人奉上拳擊風暴。"
          violet: "棲息在乾燥的沙地上。\n會以土中的鐵質為食，\n來維持由金屬構成的身體。"
