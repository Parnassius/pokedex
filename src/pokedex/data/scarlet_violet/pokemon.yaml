        jp_kanji:
          scarlet: "￹気難￺きむずか￻しくて　￹頑固￺がんこ￻。　￹機嫌￺きげん￻を\n￹損￺そこ￻ねると　￹全身￺ぜんしん￻から　￹放電￺ほうでん￻し\n￹雷鳴￺らいめい￻の　ような　￹声￺こえ￻で　ほえる。"
          violet: "￹電気￺でんき￻を￹帯￺お￻びた　￹岩￺いわ￻を　￹発射￺はっしゃ￻。\n￹命中￺めいちゅう￻　せずとも　かするだけで\n￹相手￺あいて￻は　￹痺￺しび￻れ　￹失神￺しっしん￻する。"
        en:
          scarlet: "It’s grumpy and stubborn. If you upset it, it\ndischarges electricity from the surface of its\nbody and growls with a voice like thunder."
          violet: "It fires rocks charged with electricity. Even if the\nrock isn’t fired that accurately, just grazing an\nopponent will cause numbness and fainting."
        fr:
          scarlet: "Ce Pokémon est buté et caractériel. Quand il\ns’énerve, tout son corps produit des décharges,\net ses cris évoquent les roulements du tonnerre."
          violet: "Il projette des rochers chargés d’électricité.\nIl suffit qu’ils effleurent leur cible pour que\ncelle-ci perde connaissance."
        it:
          scarlet: "Ha un carattere scontroso e testardo. Se viene\ncontrariato lancia scariche elettriche da tutto\nil corpo ed emette un verso simile a un tuono."
          violet: "Spara rocce elettrizzate. Basta che sfiorino\nil nemico perché questo riceva una scossa così\nforte da fargli perdere conoscenza."
        de:
          scarlet: "Wenn man dieses dickköpfige und mürrische\nPokémon verärgert, stößt es aus seinem Körper\nStrom aus und heult mit donnernder Stimme auf."
          violet: "Es feuert elektrisch geladene Felsen ab. Selbst\nwenn es nicht direkt trifft, genügt eine Schramme,\num Gegner zu lähmen und bewusstlos zu machen."
        es:
          scarlet: "Es de carácter cascarrabias y obstinado.\nCuando se harta, descarga electricidad por\ntodo el cuerpo y ruge con voz atronadora."
          violet: "Lanza rocas cargadas de electricidad. Basta con\nque rocen al enemigo para entumecerlo hasta el\npunto de hacerle perder la consciencia."
        ko:
          scarlet: "신경질적이며 완고하다. 기분이\n상하면 전신에서 전기를 방출하여\n우렛소리같이 큰 소리로 운다."
          violet: "전기를 띤 암석을 발사한다.\n명중하지 않고 스치기만 해도\n상대는 마비되어 실신한다."
        zh_simp:
          scarlet: "个性顽固且难以相处。\n如果它不高兴了，就会全身放电，\n并以雷鸣般的声音吼叫。"
          violet: "发射出带着电的岩石。\n哪怕没有命中，只是擦到，\n对手也会麻痹而失去意识。"
        zh_trad:
          scarlet: "個性頑固且難相處。\n心情不好的時候會從全身放電，\n並發出像雷鳴般的吼叫聲。"
          violet: "發射出帶著電的岩石。\n即使沒有擊中，只是擦到就能\n令對手因麻痺而失去意識。"
slowpoke:
