      descriptions:
        jp_kana:
          scarlet: "やまぶきのミツを　￹吸￺す￻った　￹姿￺すがた￻。\n￹軽快￺けいかい￻な　ステップで　￹相手￺あいて￻に\n￹近寄￺ちかよ￻り　￹電撃￺でんげき￻パンチで　KO。"
          violet: "￹元気￺げんき￻　かつ　￹陽気￺ようき￻な　ダンスが\n￹子￺こ￻どもたちに　￹人気￺にんき￻の　スタイルだが\nパルデアでは　あまり　￹見￺み￻かけない。"
        jp_kanji:
          scarlet: "やまぶきのミツを　￹吸￺す￻った　￹姿￺すがた￻。\n￹軽快￺けいかい￻な　ステップで　￹相手￺あいて￻に\n￹近寄￺ちかよ￻り　￹電撃￺でんげき￻パンチで　KO。"
          violet: "￹元気￺げんき￻　かつ　￹陽気￺ようき￻な　ダンスが\n￹子￺こ￻どもたちに　￹人気￺にんき￻の　スタイルだが\nパルデアでは　あまり　￹見￺み￻かけない。"
        en:
          scarlet: "This form of Oricorio has sipped yellow nectar.\nIt uses nimble steps to approach opponents,\nthen knocks them out with electric punches."
          violet: "The energetic, cheerful dance of these Oricorio\nis popular with children, but the Oricorio\nthemselves are hard to find in Paldea."
        fr:
          scarlet: "Ce Plumeline a bu du Nectar Jaune. Il s’approche\nprestement de ses adversaires en dansant et les\nmet K.O. en leur assénant des coups électriques."
          violet: "Ils doivent leur popularité à leur danse enjouée\net énergique, qui plaît particulièrement aux\nenfants. Toutefois, on en voit rarement à Paldea."
        it:
          scarlet: "Forma di un Oricorio che si è nutrito di Nettare\ngiallo. Si avvicina all’avversario con agili passi di\ndanza e lo manda KO con pugni elettrici."
          violet: "A Paldea non si vede quasi mai. La sua danza\nallegra e vivace ha un grande successo\ntra i bambini."
        de:
          scarlet: "Dieses Choreogel hat Gelben Nektar geschlürft.\nLeichten Schrittes nähert es sich Gegnern,\num sie mit Elektrohieben zu besiegen."
          violet: "Sein schwungvoller, heiterer Tanzstil macht dieses\nPokémon zwar bei Kindern beliebt, doch in\nPaldea trifft man es kaum an."
        es:
          scarlet: "Forma que toma Oricorio al libar Néctar\nAmarillo. Se acerca a sus rivales con ágiles pasos\nde baile y los noquea con puñetazos eléctricos."
          violet: "La enérgica y animada danza de este Oricorio\ngoza de gran popularidad entre los niños, pero\nes un Pokémon difícil de encontrar en Paldea."
        ko:
          scarlet: "진노랑꿀을 빨아들인 모습.\n경쾌한 스텝으로 상대에게 접근하여\n전격을 담은 펀치로 KO시킨다."
          violet: "기운차면서 쾌활한 댄스로\n아이들에게 인기 있는 스타일이나\n팔데아에서는 보기 드문 편이다."
        zh_simp:
          scarlet: "吸食了金黄色花蜜的样子。\n会以轻快的舞步靠近对手\n并用电击拳头将其KO。"
          violet: "充满活力与欢乐的舞蹈风格\n在孩子们当中很受欢迎，\n但在帕底亚却很少见。"
        zh_trad:
          scarlet: "吸食了金黃色花蜜的樣子。\n會以輕快的舞步接近，\n然後用電擊拳KO掉對手。"
          violet: "這個風格的舞蹈歡樂有活力，\n相當受到孩子們的歡迎，\n但在帕底亞卻很少見。"
