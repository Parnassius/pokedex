      descriptions:
        jp_kana:
          scarlet: "￹水辺￺みずべ￻に　￹棲￺す￻むが　￹尻尾￺しっぽ￻には\n￹魚￺さかな￻のような　ひれが　￹残￺のこ￻っていて\n￹人魚￺にんぎょ￻と　￹間違￺まちが￻う　￹人￺ひと￻もいる。"
          violet: "￹体￺からだ￻の　￹細胞￺さいぼう￻の　つくりが\n￹水￺みず￻の　￹分子￺ぶんし￻に　￹似￺に￻ているため\n￹水￺みず￻に　￹溶￺と￻けると　￹見￺み￻えなくなる。"
        jp_kanji:
          scarlet: "￹水辺￺みずべ￻に　￹棲￺す￻むが　￹尻尾￺しっぽ￻には\n￹魚￺さかな￻のような　ひれが　￹残￺のこ￻っていて\n￹人魚￺にんぎょ￻と　￹間違￺まちが￻う　￹人￺ひと￻もいる。"
          violet: "￹体￺からだ￻の　￹細胞￺さいぼう￻の　つくりが\n￹水￺みず￻の　￹分子￺ぶんし￻に　￹似￺に￻ているため\n￹水￺みず￻に　￹溶￺と￻けると　￹見￺み￻えなくなる。"
        en:
          scarlet: "It lives close to water. Its long tail is ridged with\na fin, which is often mistaken for a mermaid’s."
          violet: "Its cell composition is similar to water molecules.\nAs a result, it can’t be seen when it melts away\ninto water."
        fr:
          scarlet: "Il vit au bord de l’eau. Sa queue semblable à\ncelle d’un poisson lui donne l’apparence\nd’une sirène."
          violet: "Sa composition moléculaire est proche de\ncelle de l’eau, ce qui lui permet de s’y fondre\ncomplètement."
        it:
          scarlet: "Vive vicino all’acqua. Sulla punta della coda\nha una pinna, per questo alcuni lo scambiano\nper una sirena."
          violet: "La sua composizione cellulare è simile a quella\ndelle molecole d’acqua, in cui si può dissolvere\ndiventando invisibile."
        de:
          scarlet: "Dieses Pokémon lebt nahe an Gewässern.\nWegen seiner fischähnlichen Schwanzflosse wird\nes manchmal für eine Meerjungfrau gehalten."
          violet: "Seine Zellstruktur ist der von Wassermolekülen\nähnlich. Daher kann es mit Wasser verschmelzen\nund so unsichtbar werden."
        es:
          scarlet: "Vive cerca del agua. Su cola termina en una\naleta parecida a la de un pez, por lo que hay\ngente que lo confunde con una sirena."
          violet: "La composición celular de su cuerpo es tan\nsimilar a la estructura molecular del agua que\nse vuelve invisible al fundirse en ella."
        ko:
          scarlet: "물가에 살지만 꼬리에\n물고기처럼 지느러미가 남아 있어서\n인어로 착각하는 사람도 있다."
          violet: "몸의 세포 구조가\n물 분자와 닮았기 때문에\n물에 녹아들면 보이지 않는다."
        zh_simp:
          scarlet: "虽然栖息在水边，\n但由于尾巴上有像鱼的鳍，\n因此也有人会把它错认为人鱼。"
          violet: "身体细胞的结构与水分子相似，\n因此当它与水融为一体时，\n就会看不见它的身影。"
        zh_trad:
          scarlet: "雖然棲息在水邊，\n但由於尾巴上有像是魚的鰭，\n因此有的人會把牠誤認成人魚。"
          violet: "身體細胞的結構與水分子相似，\n因此當牠與水融為一體時\n將無法看見牠的身影。"
