      hidden_ability: aroma_veil
      descriptions:
        jp_kana:
          scarlet: "￹甘￺あま￻い　￹香￺かお￻りを　￹取￺と￻りこむほどに\n￹体￺からだ￻は　￹大￺おお￻きく　￹膨￺ふく￻らむが\nエネルギーが　￹減￺へ￻ると　しぼんでいく。"
          violet: "￹敵￺てき￻に　￹襲￺おそ￻われたら　たいあたり。\nクリームまみれにして　みえなくするか\nおいしさに　￹驚￺おどろ￻かせて　￹逃￺に￻げだす。"
        jp_kanji:
          scarlet: "￹甘￺あま￻い　￹香￺かお￻りを　￹取￺と￻りこむほどに\n￹体￺からだ￻は　￹大￺おお￻きく　￹膨￺ふく￻らむが\nエネルギーが　￹減￺へ￻ると　しぼんでいく。"
          violet: "￹敵￺てき￻に　￹襲￺おそ￻われたら　たいあたり。\nクリームまみれにして　みえなくするか\nおいしさに　￹驚￺おどろ￻かせて　￹逃￺に￻げだす。"
        en:
          scarlet: "The more sweet aromas it absorbs, the more its\nbody swells. Milcery will deflate when its energy\nlevel drops."
          violet: "When attacked, it tackles its foe and covers\nthem in cream. With its foe either blinded or\nastonished by deliciousness, Milcery flees."
        fr:
          scarlet: "Son corps gonfle à mesure qu’il absorbe des\narômes sucrés, mais il se rétrécit quand il perd\nde l’énergie."
          violet: "Si on l’attaque, il charge l’adversaire et s’enfuit\naprès l’avoir recouvert de crème pour l’aveugler\nou pour le surprendre avec sa saveur délicieuse."
        it:
          scarlet: "Quanto più assorbe profumi dolci, tanto più\nsi gonfia. Tuttavia, appena la sua energia\ndiminuisce, si affloscia."
          violet: "Se un nemico lo attacca, gli si lancia contro e lo\ncosparge di panna per impedirgli di vedere o lo\nsorprende con la sua bontà. Poi, scappa via."
        de:
          scarlet: "Je mehr süße Düfte es aufnimmt, desto weiter\ndehnt sich sein Körper aus. Jedoch schrumpft es\nzusammen, wenn sein Energielevel sinkt."
          violet: "Wenn es angegriffen wird, stürzt es sich auf den\nFeind. Ist dieser blind vor lauter Sahne oder\nverblüfft vom leckeren Geschmack, flieht es."
        es:
          scarlet: "Su cuerpo va aumentando de tamaño conforme\nabsorbe aromas dulces, pero se desinfla al\nperder energía."
          violet: "Si recibe un ataque, carga contra su rival y huye,\nya sea gracias a haberlo cegado al recubrirlo de\nnata o a haberlo abrumado con su suculencia."
        ko:
          scarlet: "달콤한 향기를 머금을수록\n몸이 크게 부풀어 오르나,\n에너지를 소모하면 줄어든다."
          violet: "적에게 공격을 받으면 몸통박치기를 한다.\n상대가 크림 범벅이 되어 앞이 보이지 않거나\n달콤한 맛에 놀란 틈을 타서 도망친다."
        zh_simp:
          scarlet: "吸取越多甜甜香气，\n身体就会胀得越大，\n可当能量减少时就会蔫掉。"
          violet: "遭到敌人袭击时会使出撞击，\n或是令敌人沾满奶油而封住视线，\n或是趁敌人惊叹美味时逃之夭夭。"
        zh_trad:
          scarlet: "吸取了越多的香甜氣味，\n身體就會膨脹得越大，\n但能量減少時就會逐漸縮小。"
          violet: "遭到襲擊時，會全身撞向對手，\n趁著對方沾滿鮮奶油而看不見前方，\n或因鮮奶油的美味而愣住時迅速逃跑。"
