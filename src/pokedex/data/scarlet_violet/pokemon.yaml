        jp_kana:
          scarlet: "￹抜群￺ばつぐん￻の　￹機動力￺きどうりょく￻で　￹木々￺きぎ￻の\n￹隙間￺すきま￻を　￹飛￺と￻びまわり　￹電磁￺でんじ￻ビームで\n￹鳥￺とり￻ポケモンを　￹撃￺う￻ち￹落￺お￻とす。"
          violet: "デンヂムシを　￹抱￺かか￻えて　￹電気￺でんき￻を\nもらい　￹大￺おお￻あごから　￹強力￺きょうりょく￻な\n￹電磁￺でんじ￻ビームを　￹連射￺れんしゃ￻する。"
        jp_kanji:
          scarlet: "￹抜群￺ばつぐん￻の　￹機動力￺きどうりょく￻で　￹木々￺きぎ￻の\n￹隙間￺すきま￻を　￹飛￺と￻びまわり　￹電磁￺でんじ￻ビームで\n￹鳥￺とり￻ポケモンを　￹撃￺う￻ち￹落￺お￻とす。"
          violet: "デンヂムシを　￹抱￺かか￻えて　￹電気￺でんき￻を\nもらい　￹大￺おお￻あごから　￹強力￺きょうりょく￻な\n￹電磁￺でんじ￻ビームを　￹連射￺れんしゃ￻する。"
        en:
          scarlet: "Displaying exceptional mobility, it weaves\nbetween trees and shoots down bird Pokémon\nwith its electromagnetic beams."
          violet: "When carrying a Charjabug, Vikavolt can receive\nelectricity from it and then rapidly fire powerful\nelectromagnetic beams from its large jaws."
        fr:
          scarlet: "Il se déplace entre les arbres de la forêt avec\nune agilité remarquable et abat les Pokémon\noiseaux à l’aide d’un rayon électromagnétique."
          violet: "Il transporte un Chrysapile pour se charger en\nélectricité. Ses grandes mandibules peuvent alors\ntirer une rafale de rayons électromagnétiques."
        it:
          scarlet: "Vola fra gli alberi con agilità impressionante\ne abbatte i Pokémon alati sparando raggi\nelettromagnetici."
          violet: "Porta con sé un Charjabug e ne sfrutta l’energia\nelettrica per sparare una raffica di potenti raggi\nelettromagnetici dalle grandi mandibole."
        de:
          scarlet: "Mit einer unglaublichen Wendigkeit fliegt es\nzwischen Bäumen hindurch und schießt mit seinen\nelektromagnetischen Strahlen Vogel-Pokémon ab."
          violet: "Trägt es ein Akkup, wird es von diesem mit Strom\nversorgt, den es als starke elektromagnetische\nStrahlen aus seinem großen Kiefer abfeuert."
        es:
          scarlet: "Vuela entre los árboles haciendo gala de una\nexcelente agilidad y abate Pokémon pájaro al\npropinarles una descarga electromagnética."
          violet: "Cargar con un Charjabug le confiere una energía\neléctrica que libera con sus grandes mandíbulas\nen forma de potentes rayos de alto voltaje."
        ko:
          scarlet: "뛰어난 기동력으로 나무 사이를\n날아다니며 전자 빔으로\n새포켓몬을 격추시킨다."
          violet: "전지충이를 들고 전기를 공급받으며\n큰턱을 통해 강력한 전자 빔을 발사한다."
        zh_simp:
          scarlet: "会以卓越的机动性\n来回盘旋于树木之间，\n并用电磁光束击落鸟宝可梦。"
          violet: "会抱住虫电宝吸收电能，\n并从巨大的颚部连续\n发射强力的电磁光束。"
        zh_trad:
          scarlet: "會以極高的機動性\n在樹木間來回盤旋，\n用電磁光束擊落鳥寶可夢。"
          violet: "會抱住蟲電寶獲取電能，\n然後從自己的大顎\n連續發射強力的電磁光束。"
