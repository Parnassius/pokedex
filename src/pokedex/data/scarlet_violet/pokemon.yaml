      descriptions:
        jp_kana:
          scarlet: "￹川辺￺かわべ￻に　￹巣穴￺すあな￻を　￹作￺つく￻り　￹暮￺く￻らす。\n￹泥遊￺どろあそ￻びをしたあとは　￹体￺からだ￻を\n￹洗￺あら￻わないと　￹落￺お￻ち￹着￺つ￻かないのだ。"
          violet: "￹見￺み￻た￹目￺め￻より　ずっと　￹力持￺ちからも￻ち。\n￹振￺ふ￻りまわす　￹鼻￺はな￻に　ぶつかると\n￹腕￺うで￻の　￹骨￺ほね￻が　もっていかれる。"
        jp_kanji:
          scarlet: "￹川辺￺かわべ￻に　￹巣穴￺すあな￻を　￹作￺つく￻り　￹暮￺く￻らす。\n￹泥遊￺どろあそ￻びをしたあとは　￹体￺からだ￻を\n￹洗￺あら￻わないと　￹落￺お￻ち￹着￺つ￻かないのだ。"
          violet: "￹見￺み￻た￹目￺め￻より　ずっと　￹力持￺ちからも￻ち。\n￹振￺ふ￻りまわす　￹鼻￺はな￻に　ぶつかると\n￹腕￺うで￻の　￹骨￺ほね￻が　もっていかれる。"
        en:
          scarlet: "This Pokémon lives and nests on a riverbank.\nAfter playing in the mud, it won’t be able to\nsettle down unless it washes its body."
          violet: "It is far stronger than it appears. If a Phanpy is\nswinging its trunk around and your arm gets hit\nby it, your arm bone will shatter."
        fr:
          scarlet: "Les Phanpy vivent dans les trous qu’ils creusent,\nprès des rivières. Après avoir joué dans la boue,\nils ont besoin de faire leur toilette pour se calmer."
          violet: "Ce Pokémon est beaucoup plus fort\nqu’il n’y paraît. Il peut casser le bras d’une\npersonne d’un simple mouvement de trompe."
        it:
          scarlet: "Vive in tane che costruisce in riva ai fiumi.\nDopo aver giocato nel fango, non riesce a star\ntranquillo finché non si è lavato."
          violet: "È molto più forte di quanto non sembri.\nSe si viene urtati dalla sua proboscide mentre\nla fa roteare, ci si può rimettere il braccio."
        de:
          scarlet: "Es lebt in Nestern, die es an Flussufern baut.\nNach dem Spielen im Schlamm muss es sich erst\nwaschen, um sich wohlzufühlen."
          violet: "Es ist viel stärker, als es aussieht. Wenn es seinen\nRüssel umherschwingt und einen dabei am Arm\nerwischt, ist dieser wahrscheinlich gebrochen."
        es:
          scarlet: "Vive en hoyos que cava en la ribera de los ríos.\nTras retozar en el lodo, no se queda tranquilo\nhasta haberse lavado bien el cuerpo."
          violet: "Es mucho más fuerte de lo que aparenta.\nUn trompazo accidental podría fracturarle\nlos huesos del brazo a una persona."
        ko:
          scarlet: "냇가에 굴을 파고 산다.\n흙장난을 한 뒤에 몸을 씻지 못하면\n안절부절못하기 때문이다."
          violet: "겉보기와는 다르게 힘이 장사다.\n휘두르는 코에 맞으면\n팔뼈가 나가 버린다."
        zh_simp:
          scarlet: "会在河边做出巢穴栖息。\n玩泥巴之后如果不把身体\n洗干净，就会感到不自在。"
          violet: "与外表不同，是个大力士。\n如果被它甩动的鼻子碰到，\n手臂的骨头就会支离破碎。"
        zh_trad:
          scarlet: "會在河邊做出巢穴棲息。\n玩完泥巴後如果不把身體\n洗乾淨，就會渾身不自在。"
          violet: "有別於外表的大力士。\n如果被牠甩動的鼻子揮中，\n手臂的骨頭就會支離破碎。"
