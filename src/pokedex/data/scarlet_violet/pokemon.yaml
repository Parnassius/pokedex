      descriptions:
        jp_kana:
          scarlet: "￹自分￺じぶん￻の　￹体￺からだ￻や　￹巣￺す￻の　￹掃除￺そうじ￻で\n￹汚￺よご￻れた　￹尻尾￺しっぽ￻は　￹綺麗￺きれい￻な\n￹湧￺わ￻き￹水￺みず￻で　１￹日￺にち￻　かけて　￹洗￺あら￻う。"
          violet: "きれい￹好￺ず￻きな　￹性格￺せいかく￻の　ポケモン。\n￹尻尾￺しっぽ￻を　ほうきがわりに　いつも\n￹棲￺す￻み￹処￺か￻の　ほこりを　￹払￺はら￻っている。"
        jp_kanji:
          scarlet: "￹自分￺じぶん￻の　￹体￺からだ￻や　￹巣￺す￻の　￹掃除￺そうじ￻で\n￹汚￺よご￻れた　￹尻尾￺しっぽ￻は　￹綺麗￺きれい￻な\n￹湧￺わ￻き￹水￺みず￻で　１￹日￺にち￻　かけて　￹洗￺あら￻う。"
          violet: "きれい￹好￺ず￻きな　￹性格￺せいかく￻の　ポケモン。\n￹尻尾￺しっぽ￻を　ほうきがわりに　いつも\n￹棲￺す￻み￹処￺か￻の　ほこりを　￹払￺はら￻っている。"
        en:
          scarlet: "When its tail has gotten dirty from self-cleaning\nor from cleaning its nest, Minccino spends a\nwhole day washing its tail in clean springwater."
          violet: "These Pokémon like things neat and tidy. They\nare always sweeping and dusting their habitat,\nusing their tails as brooms."
        fr:
          scarlet: "Il lui faut bien une journée entière pour laver\nsa queue à l’eau de source après s’en être servi\npour nettoyer son nid et épousseter son corps."
          violet: "Ce Pokémon aime la propreté. Il époussette\nsans cesse son habitat en utilisant sa queue\ncomme un plumeau."
        it:
          scarlet: "Dopo aver usato la coda per pulire la tana\no il proprio corpo, passa un giorno intero\na lavarla con acqua pura di sorgente."
          violet: "Di natura ama la pulizia. Spazza sempre\nla polvere dalla sua tana usando la coda\ncome scopa."
        de:
          scarlet: "Wird sein Schweif beim Putzen seines Baus oder\nKörpers schmutzig, verbringt es einen ganzen Tag\ndamit, ihn mit klarem Quellwasser zu reinigen."
          violet: "Dieses Pokémon hat einen Putzfimmel. Es benutzt\nseinen Schweif als Staubwedel und fegt seinen\nBau, bis alles picobello ist."
        es:
          scarlet: "Tras usar la cola para limpiar su madriguera o su\npropio cuerpo, se pasa un día entero lavándosela\ncon agua de manantial."
          violet: "Le encanta la limpieza. Usa la cola a modo\nde escoba y se pasa el día barriendo el polvo\nde su madriguera."
        ko:
          scarlet: "자신의 몸이나 보금자리를 청소하느라\n더러워진 꼬리는 깨끗한 샘물로\n하루에 걸쳐서 씻는다."
          violet: "깨끗한 것을 좋아하는 포켓몬이다.\n꼬리를 빗자루 대신 써서 항상\n거처의 먼지를 쓸어 낸다."
        zh_simp:
          scarlet: "因为清洁自己的身体和巢穴\n而弄脏的尾巴，会花上１天的时间\n用涌出的干净泉水清洗。"
          violet: "是喜爱干净的宝可梦。\n总是把尾巴当做扫帚，\n来清扫住所的灰尘。"
        zh_trad:
          scarlet: "當尾巴因為打掃自己的身體\n和巢穴而變髒時，會花一整天時間\n用乾淨的湧泉水把尾巴洗乾淨。"
          violet: "是愛乾淨的寶可夢。\n總是把尾巴當作掃把\n來除去居處的灰塵。"
