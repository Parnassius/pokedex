      descriptions:
        jp_kana:
          scarlet: "くちばしに　￹小￺ちい￻さな　ポケモンを\n￹入￺い￻れて　￹飛￺と￻ぶ　￹空￺そら￻の　￹配達屋￺はいたつや￻。\n￹海￺うみ￻に　￹浮￺う￻かんで　￹羽￺はね￻を　￹休￺やす￻める。"
          violet: "くちばしの　￹中￺なか￻に　￹子￺こ￻どもを　￹入￺い￻れて\n￹守￺まも￻っている。　￹波￺なみ￻の　￹穏￺おだ￻やかな　￹日￺ひ￻は\n￹海￺うみ￻に　￹浮￺う￻かんで　ひと￹休￺やす￻み。"
        jp_kanji:
          scarlet: "くちばしに　￹小￺ちい￻さな　ポケモンを\n￹入￺い￻れて　￹飛￺と￻ぶ　￹空￺そら￻の　￹配達屋￺はいたつや￻。\n￹海￺うみ￻に　￹浮￺う￻かんで　￹羽￺はね￻を　￹休￺やす￻める。"
          violet: "くちばしの　￹中￺なか￻に　￹子￺こ￻どもを　￹入￺い￻れて\n￹守￺まも￻っている。　￹波￺なみ￻の　￹穏￺おだ￻やかな　￹日￺ひ￻は\n￹海￺うみ￻に　￹浮￺う￻かんで　ひと￹休￺やす￻み。"
        en:
          scarlet: "It is a flying transporter that carries small\nPokémon in its beak. It bobs on the waves to\nrest its wings."
          violet: "It protects its young in its beak. It bobs on\nwaves, resting on them on days when the waters\nare calm."
        fr:
          scarlet: "Il transporte de petits Pokémon dans son bec.\nQuand il a besoin de reposer ses ailes, il se pose\nsur la mer."
          violet: "Il protège ses petits en les abritant dans son bec.\nQuand la mer est calme, il se repose sur l’eau."
        it:
          scarlet: "Un fattorino volante capace di trasportare\npiccoli Pokémon nel becco. Quando è stanco,\nscivola sulle onde per riposare le ali."
          violet: "Protegge i piccoli nascondendoli nel becco.\nNei giorni di mare calmo, si riposa galleggiando\nsulle onde."
        de:
          scarlet: "Es fungiert als fliegender Transporter, der kleine\nPokémon in seinem Schnabel trägt. Um seine\nFlügel zu schonen, treibt es auf den Wellen."
          violet: "Es trägt seine Jungen zum Schutz vor Feinden im\nSchnabel. Bei Windstille treibt es auf den Wellen,\num sich auszuruhen."
        es:
          scarlet: "Vuela transportando pequeños Pokémon en\nel pico. A veces, se queda flotando en el agua\npara descansar las alas."
          violet: "Protege a sus crías de los enemigos metiéndolas\nen su pico. En días de poco oleaje, reposa sobre\nel agua."
        ko:
          scarlet: "부리에 작은 포켓몬을 넣고 나는\n하늘의 배달부.\n바다 위에 떠서 날개를 쉬어 주기도 한다."
          violet: "부리 안에 새끼를 넣어서\n적으로부터 보호한다.\n파도가 조용한 날은 바다에 떠서 잠시 쉰다."
        zh_simp:
          scarlet: "把小型宝可梦放进鸟嘴里\n飞翔的空中快递员。\n会浮在海上让翅膀休息。"
          violet: "把孩子放进鸟嘴里保护。\n风平浪静的日子\n会浮在海面上小憩。"
        zh_trad:
          scarlet: "把小型寶可夢裝在鳥嘴裡\n飛翔的空中送貨員。\n會漂浮在海上讓翅膀休息。"
          violet: "會把孩子放進鳥嘴裡保護。\n風平浪靜的日子會漂浮在\n海面上稍作休息。"
