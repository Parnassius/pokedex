      egg_groups:
        - undiscovered
      abilities:
        - cute_charm
        - magic_guard
      hidden_ability: friend_guard
      descriptions:
        jp_kana:
          scarlet: "￹流星￺りゅうせい￻の　きらめく　￹深夜￺しんや￻に\nじっと　￹空￺そら￻を　￹眺￺なが￻める　￹姿￺すがた￻は\n￹故郷￺こきょう￻に　￹思￺おも￻いを　￹馳￺は￻せているよう。"
          violet: "￹流￺なが￻れ￹星￺ぼし￻の　￹多￺おお￻い　￹夜￺よる￻に　ピィを\n￹見￺み￻かけることが　￹多￺おお￻いので　￹星￺ほし￻に\n￹乗￺の￻って￹来￺く￻る　と￹言￺い￻われている。"
        jp_kanji:
          scarlet: "￹流星￺りゅうせい￻の　きらめく　￹深夜￺しんや￻に\nじっと　￹空￺そら￻を　￹眺￺なが￻める　￹姿￺すがた￻は\n￹故郷￺こきょう￻に　￹思￺おも￻いを　￹馳￺は￻せているよう。"
          violet: "￹流￺なが￻れ￹星￺ぼし￻の　￹多￺おお￻い　￹夜￺よる￻に　ピィを\n￹見￺み￻かけることが　￹多￺おお￻いので　￹星￺ほし￻に\n￹乗￺の￻って￹来￺く￻る　と￹言￺い￻われている。"
        en:
          scarlet: "On late nights illuminated by shooting stars, it\ngazes intently skyward, as if thinking of its home."
          violet: "Since it is often seen when shooting stars fill the\nnight skies, it’s said to come here by riding on a\nstar."
        fr:
          scarlet: "Ce Pokémon contemple les pluies d’étoiles\nfilantes au cœur de la nuit, comme si ce\nspectacle lui rappelait l’endroit où il est né."
          violet: "Les Mélo apparaissent en grand nombre les nuits\noù il y a beaucoup d’étoiles filantes. On dit qu’ils\ndescendent du ciel en les chevauchant."
        it:
          scarlet: "Nelle notti illuminate dalle stelle cadenti guarda\nintensamente il cielo, come se stesse pensando\nal suo luogo d’origine."
          violet: "Si avvista spesso nelle notti con tante stelle\ncadenti. Per questo, si dice che arrivi\ncavalcandone una."
        de:
          scarlet: "Sieht man es tief in der Nacht gebannt das\nFunkeln von Sternschnuppen beobachten,\nschwelgt es wohl in Gedanken an seine Heimat."
          violet: "Da man Pii oft in Nächten sieht, an denen viele\nSternschnuppen über den Himmel ziehen, sagt\nman, dass sie auf Sternen reitend hierherreisen."
        es:
          scarlet: "Se dice que, cuando este Pokémon observa\natentamente el cielo nocturno durante una lluvia\nde estrellas, está rememorando su hogar natal."
          violet: "Es muy común ver Cleffa en noches de lluvia de\nestrellas, por lo que se dice que llegan montados\nsobre estrellas fugaces."
        ko:
          scarlet: "유성이 반짝거리는 심야에\n지그시 하늘을 바라보는 모습은\n고향의 기억을 떠올리는 것 같다."
          violet: "별똥별이 많은 밤에\n곧잘 삐를 볼 수 있으므로\n별을 타고 온다고 전해진다."
        zh_simp:
          scarlet: "在流星闪耀的深夜里\n凝望着天空的样子，\n似乎是在怀念故乡。"
          violet: "因为在流星很多的夜晚经常\n能发现皮宝宝，所以人们说\n它们是乘着星星而来的。"
        zh_trad:
          scarlet: "在流星閃耀的深夜裡\n凝望著天空的樣子，\n似乎是在緬懷故鄉。"
          violet: "在流星很多的夜晚經常能\n看到皮寶寶，因此被認為\n牠們是乘著星星來的。"
