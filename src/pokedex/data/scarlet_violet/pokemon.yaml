        jp_kanji:
          scarlet: "１￹万年前￺まんねんまえ￻の　￹氷￺こおり￻の　￹下￺した￻から\n￹発見￺はっけん￻されたことも　あるほど\n￹大昔￺おおむかし￻から　いた　ポケモン。"
          violet: "１￹万年￺まんねん￻　￹前￺まえ￻の　￹地面￺じめん￻から\n￹氷漬￺こおりづ￻けの　マンムーが　￹見￺み￻つかり\nしかも　￹目覚￺めざ￻めたので　￹騒￺さわ￻がれた。"
        en:
          scarlet: "A frozen Mamoswine was dug from\nice dating back 10,000 years. This Pokémon\nhas been around a long, long, long time."
          violet: "A frozen one was dug up from\nsoil dating back 10,000 years.\nIt woke up, to much amazement."
        fr:
          scarlet: "Ce Pokémon est si ancien qu’on\nen a découvert un spécimen sous\ndes glaces vieilles de 10 000 ans."
          violet: "Un jour, un spécimen conservé\ndans la glace depuis 10 000 ans\nfut découvert. Son réveil inattendu créa la stupeur."
        it:
          scarlet: "Pokémon dalle origini così antiche\nche un esemplare è stato rinvenuto\nsotto ghiacci di addirittura 10.000 anni fa."
          violet: "Ne è stato rinvenuto un esemplare\ncongelato risalente a 10.000 anni fa.\nSi è poi risvegliato, destando grande scalpore."
        de:
          scarlet: "Es existiert schon seit Urzeiten.\nMamutel wurde sogar schon in\n10 000 Jahre altem Eis gefunden."
          violet: "Ein gefrorenes Exemplar wurde aus 10 000 Jahre\naltem Erdreich ausgegraben. Dass es obendrein\nerwachte, erregte viel Aufsehen."
        es:
          scarlet: "Existe desde tiempos tan\nremotos que incluso se halló uno\nbajo hielo formado hace diez mil años."
          violet: "Se encontró un ejemplar\npreservado en hielo datado de hace\ndiez mil años. Causó gran estupor al despertar."
        ko:
          scarlet: "1만 년 전의 얼음 밑에서\n발견된 적이 있을 정도로\n오랜 옛날부터 있었던 포켓몬이다."
          violet: "1만 년 전의 땅에서 얼어붙은\n맘모꾸리가 발견되었고\n눈까지 떴기에 소동이 벌어졌다."
        zh_simp:
          scarlet: "从遥远的过去就存在的宝可梦，\n甚至在１万年前的冰层中也发现过它。"
          violet: "在１万年前的地层发现了\n被冰封的象牙猪，而且\n还因苏醒过来而引发了骚动。"
        zh_trad:
          scarlet: "很久以前就存在的寶可夢。\n甚至連１萬年前的冰層裡\n都能發現牠的存在。"
          violet: "曾在１萬年前的地層裡發現過\n冰封狀態的象牙豬，而且還因\n牠甦醒過來而引起了一陣騷動。"
