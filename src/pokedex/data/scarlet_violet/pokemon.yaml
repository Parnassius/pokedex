        jp_kanji:
          scarlet: "￹体￺からだ￻の　ほとんどが　￹水分￺すいぶん￻。\n￹乾燥￺かんそう￻で　￹干乾￺ひから￻びないように\n￹粘膜￺ねんまく￻が　￹全身￺ぜんしん￻を　￹覆￺おお￻う。"
          violet: "ツノは　￹五感￺ごかん￻の　すべてを　まかなう\n￹優￺すぐ￻れた　￹感覚器官￺かんかくきかん￻。　￹空気￺くうき￻の\n￹動￺うご￻きで　￹危険￺きけん￻を　￹感￺かん￻じとる。"
        en:
          scarlet: "Most of a Goomy’s body is water. A membrane\ncovers the whole Pokémon to prevent it from\nshriveling up in dry weather."
          violet: "Goomy’s horns are excellent sensory organs that\ncover all five of Goomy’s senses. Goomy picks\nup on danger from the movement of the air."
        fr:
          scarlet: "Son corps est principalement composé d’eau.\nIl est entièrement recouvert d’une membrane\nqui l’empêche de sécher."
          violet: "Ses cornes sont des organes exceptionnels dotés\ndes cinq sens. Il est capable de détecter les\ndangers en analysant les déplacements de l’air."
        it:
          scarlet: "Il suo corpo è composto quasi esclusivamente\ndi acqua. È ricoperto da una membrana che non\nlo fa disidratare nei climi troppo secchi."
          violet: "I suoi corni sono organi straordinari che captano\ninformazioni relative a tutti e cinque i sensi.\nSente il pericolo grazie ai movimenti dell’aria."
        de:
          scarlet: "Sein Körper besteht vorwiegend aus Wasser.\nViscora ist von einer Schleimschicht überzogen,\ndie es vor dem Austrocknen schützt."
          violet: "Seine Fühler sind ein vortreffliches Organ, das\nalle fünf Sinne abdeckt. Es spürt Gefahr anhand\nvon Luftbewegungen."
        es:
          scarlet: "Una membrana mucosa recubre por completo\nsu cuerpo, compuesto casi exclusivamente de\nagua, para evitar que se seque y se deshidrate."
          violet: "Sus antenas son complejos órganos sensoriales\nque engloban los cinco sentidos. Puede detectar\namenazas a partir de las corrientes de aire."
        ko:
          scarlet: "몸의 대부분이 수분이다.\n건조해서 말라 버리지 않도록\n점막으로 전신을 뒤덮고 있다."
          violet: "뿔은 오감을 모두 담당하는\n뛰어난 감각 기관이다.\n공기의 흐름으로 위험을 감지한다."
        zh_simp:
          scarlet: "身体几乎都是水分。\n会用黏膜包裹全身，\n来避免随环境干燥而变干。"
          violet: "触角是优秀的感觉器官，\n足以代替五官的所有功能。\n能通过空气的流动来感知危险。"
        zh_trad:
          scarlet: "身體幾乎都是水分。\n會用黏膜包裹住全身，\n避免因環境乾燥而變乾。"
          violet: "觸角是優秀的感覺器官，\n足以代替五官的所有功能。\n能透過空氣的流動來感知危險。"
