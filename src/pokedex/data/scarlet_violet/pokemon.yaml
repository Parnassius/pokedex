        - limber
      hidden_ability: regenerator
      descriptions:
        jp_kana:
          scarlet: "エサを　￹探￺さが￻し　￹海辺￺うみべ￻を　うろつく。\n￹折￺お￻れた　バチンウニの　トゲを\n￹食￺た￻べようとして　よく　￹痺￺しび￻れている。"
          violet: "￹再生力￺さいせいりょく￻が　とても　￹強￺つよ￻い。\nちぎれた　￹脚￺あし￻は　￹苦味￺にがみ￻と　￹渋味￺しぶみ￻が\n￹強￺つよ￻く　￹食材￺しょくざい￻には　むかない。"
        jp_kanji:
          scarlet: "エサを　￹探￺さが￻し　￹海辺￺うみべ￻を　うろつく。\n￹折￺お￻れた　バチンウニの　トゲを\n￹食￺た￻べようとして　よく　￹痺￺しび￻れている。"
          violet: "￹再生力￺さいせいりょく￻が　とても　￹強￺つよ￻い。\nちぎれた　￹脚￺あし￻は　￹苦味￺にがみ￻と　￹渋味￺しぶみ￻が\n￹強￺つよ￻く　￹食材￺しょくざい￻には　むかない。"
        en:
          scarlet: "This Pokémon wanders the seaside looking for\nfood. It often gets electric shocks from broken\nPincurchin spines that it tries to eat."
          violet: "It has excellent regenerative capabilities. Legs\nthat a Mareanie has lost have a very bitter,\nastringent flavor—they’re not suitable as food."
        fr:
          scarlet: "Il erre en bord de mer en quête de nourriture.\nIl s’électrocute souvent en essayant de manger\ndes épines de Wattapik trouvées par terre."
          violet: "Sa capacité à se régénérer est impressionnante.\nL’amertume et l’âpreté de ses tentacules coupés\nles rendent impropres à la consommation."
        it:
          scarlet: "Vaga qua e là per le spiagge in cerca di prede.\nDi tanto in tanto cerca di mangiarsi un aculeo\ncaduto da un Pincurchin e prende la scossa."
          violet: "Ha eccellenti capacità rigenerative. I suoi\ntentacoli caduti hanno un sapore amaro\ne allappante, e non sono adatti alla cucina."
        de:
          scarlet: "Auf Futtersuche wandert es an Küsten entlang.\nVersucht es, abgebrochene Britzigel-Stacheln zu\nessen, bekommt es oft einen elektrischen Schlag."
          violet: "Es hat beeindruckende regenerative Kräfte. Von\nihm abgefallene Tentakel schmecken so bitter\nund herb, dass sie kulinarisch ungenießbar sind."
        es:
          scarlet: "Vaga por las orillas en busca de sustento. Suele\nllevarse calambrazos al intentar comerse las púas\nrotas de Pincurchin que encuentra."
          violet: "Tiene una gran capacidad de regeneración.\nEl sabor amargo y seco de sus tentáculos caídos\nhace que no sean apreciados como ingrediente."
        ko:
          scarlet: "먹이를 찾아 해변을 배회한다.\n부러진 찌르성게의 가시를 먹으려다\n마비되어 있는 경우가 많다."
          violet: "재생력이 매우 강하다.\n뜯어진 다리는 쓴맛과 떫은맛이 강해서\n식재료로는 적합하지 않다."
        zh_simp:
          scarlet: "会在海边徘徊觅食。\n时常会因为要吃啪嚓海胆\n断掉的刺而被电得发麻。"
          violet: "它的再生能力非常强大。\n断掉的脚有着强烈的\n苦味和涩味，不适合用作食材。"
        zh_trad:
          scarlet: "會在海邊徘徊覓食。\n不時都會因為要吃啪嚓海膽\n斷掉的刺而被電得發麻。"
          violet: "具備著很強的再生能力。\n斷掉的腳苦味和澀味很強烈，\n不適合當成食材使用。"
toxapex:
  species_id: 748
  names:
