        - water_1
      abilities:
        - strong_jaw
        - shell_armor
      hidden_ability: swift_swim
      descriptions:
        jp_kana:
          scarlet: "とても　￹大￺おお￻きな　ギザギザの　￹口￺くち￻は\nひと￹噛￺か￻みで　￹岩石￺がんせき￻を　￹砕￺くだ￻く。\n￹非常￺ひじょう￻に　￹凶暴￺きょうぼう￻な　￹性質￺せいしつ￻。"
          violet: "￹岸辺￺きしべ￻に　￹潜￺ひそ￻み　￹獲物￺えもの￻が　￹水￺みず￻を\n￹飲￺の￻みに　￹来￺き￻たところを　￹首￺くび￻を　￹長￺なが￻く\n￹伸￺の￻ばして　がぶりと　￹噛￺か￻みつく。"
        jp_kanji:
          scarlet: "とても　￹大￺おお￻きな　ギザギザの　￹口￺くち￻は\nひと￹噛￺か￻みで　￹岩石￺がんせき￻を　￹砕￺くだ￻く。\n￹非常￺ひじょう￻に　￹凶暴￺きょうぼう￻な　￹性質￺せいしつ￻。"
          violet: "￹岸辺￺きしべ￻に　￹潜￺ひそ￻み　￹獲物￺えもの￻が　￹水￺みず￻を\n￹飲￺の￻みに　￹来￺き￻たところを　￹首￺くび￻を　￹長￺なが￻く\n￹伸￺の￻ばして　がぶりと　￹噛￺か￻みつく。"
        en:
          scarlet: "Its massive, jagged teeth can crush a\nboulder in a single bite. This Pokémon\nhas an extremely vicious disposition."
          violet: "Drednaw lurks along the shoreline. When\nprey come to drink water, Drednaw stretches\nits neck out and chomps down on them."
        fr:
          scarlet: "Ce Pokémon très agressif peut facilement\nbroyer des rochers grâce à son énorme\nmâchoire en dents de scie."
          violet: "Ce Pokémon se cache au bord de l’eau. Lorsque\nses proies viennent s’abreuver, il étend son cou\net les mord profondément."
        it:
          scarlet: "Con la sua grande mascella frastagliata riesce\na frantumare una roccia con un morso. Ha un\ntemperamento estremamente aggressivo."
          violet: "Si nasconde vicino alla riva in attesa che\nle prede vadano ad abbeverarsi, per poi\nallungare il collo e azzannarle."
        de:
          scarlet: "Ein Biss mit seinem riesigen, gezackten Maul\nreicht aus, um einen Felsbrocken zu zermalmen.\nEs besitzt ein äußerst aggressives Temperament."
          violet: "Dieses Pokémon liegt an Ufern auf der Lauer.\nNähert sich Beute, um Wasser zu trinken, streckt\nes seinen Hals weit aus und beißt beherzt zu."
        es:
          scarlet: "Con sus fuertes mandíbulas serradas es capaz\nde destrozar rocas de un mordisco. Tiene un\ntemperamento extremadamente violento."
          violet: "Acecha a la orilla del agua. Cuando una\npresa se acerca a beber, estira el cuello\ny le pega un buen mordisco."
        ko:
          scarlet: "매우 크고 뾰족뾰족한 입은\n한 번 물기만 해도 암석을 부술 정도다.\n성질이 매우 흉포하다."
          violet: "물가에 숨어 있다가\n먹잇감이 물을 마시러 오면\n목을 길게 늘여서 덥석 물어 버린다."
        zh_simp:
          scarlet: "锯齿状的嘴巴非常巨大，\n能一口咬碎岩石。\n性格非常地凶暴。"
          violet: "会潜伏在岸边，\n趁猎物来喝水时伸长脖子，\n将其一口紧紧咬住。"
        zh_trad:
          scarlet: "鋸齒狀的超級大嘴\n一咬就能咬碎岩石。\n性格非常地凶暴。"
          violet: "這種寶可夢會潛伏在岸邊，\n趁獵物來喝水時伸長脖子，\n將其一口緊緊咬住。"
