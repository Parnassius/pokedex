        jp_kanji:
          scarlet: "￹体￺からだ￻から　￹出￺で￻ている　￹磁力￺じりょく￻と\n￹地上￺ちじょう￻の　￹磁力￺じりょく￻を　￹反発￺はんぱつ￻させて\n￹空￺そら￻に　￹浮￺う￻かぶのだ。"
          violet: "￹細胞￺さいぼう￻　すべてが　￹磁石￺じしゃく￻で\n￹体￺からだ￻から　￹磁力￺じりょく￻を　￹発信￺はっしん￻し\n￹仲間￺なかま￻と　￹会話￺かいわ￻　している。"
        en:
          scarlet: "The magnetic force generated by its body repels\nthe ground’s natural magnetism, letting it float."
          violet: "All its cells are magnets. It communicates with\nothers of its kind by transmitting magnetic forces\nfrom its body."
        fr:
          scarlet: "Il dégage une force magnétique qui repousse\ncelle du sol, ce qui lui permet de léviter."
          violet: "Toutes les cellules de son corps sont des aimants.\nIl communique avec les siens à l’aide d’impulsions\nmagnétiques."
        it:
          scarlet: "Riesce a fluttuare in aria grazie alla repulsione\ntra le proprie onde magnetiche e quelle\ndella terra."
          violet: "Le cellule del suo corpo sono calamite.\nIl suo corpo emette onde magnetiche,\ntramite le quali comunica con i suoi simili."
        de:
          scarlet: "Die magnetische Kraft aus seinem Körper und\ndie des Bodens stoßen sich gegenseitig ab,\nwodurch es in der Luft schwebt."
          violet: "Seine Zellen sind magnetisch geladen. Es setzt\nmagnetische Impulse frei, um mit Artgenossen\nzu kommunizieren."
        es:
          scarlet: "El magnetismo terrestre y el que emite su cuerpo\nse repelen, lo que le permite flotar en el aire."
          violet: "Todas sus células cuentan con carga magnética,\ny se comunica con los suyos a través de pulsos\nelectromagnéticos."
        ko:
          scarlet: "몸에서 나오는 자력과\n지상의 자력을\n충돌시켜 공중에 떠오른다."
          violet: "모든 세포가 자석이다.\n몸에서 자력을 발신하여\n동료와 대화한다."
        zh_simp:
          scarlet: "让身上放出的磁力和\n地上的磁力相互排斥，\n从而飘浮在空中。"
          violet: "所有的细胞都由磁铁构成。\n会从身体发出磁力与伙伴交流。"
        zh_trad:
          scarlet: "會讓身上發出的磁力和\n地上的磁力相互排斥，\n藉此飄浮在空中。"
          violet: "全身細胞都由磁鐵構成。\n會從身體放出磁力\n藉此和夥伴對話。"
