        jp_kanji:
          scarlet: "￹特殊￺とくしゅ￻な　￹金属￺きんぞく￻の　￹体￺からだ￻は\n￹鏡面加工￺きょうめんかこう￻のように　￹滑￺なめ￻らか。\nキズに　￹強￺つよ￻く　しかも　￹軽量￺けいりょう￻。"
          violet: "￹金属￺きんぞく￻の　ボディは　￹頑丈￺がんじょう￻だが\n￹熱￺ねつ￻が　こもってしまうので　￹尻尾￺しっぽ￻の\nスリットから　￹放熱￺ほうねつ￻している。"
        en:
          scarlet: "Duraludon’s body is comprised of a special metal\nthat’s lightweight and scratch resistant. It’s also\nsmooth, as though it was given a mirror finish."
          violet: "Its metal body is durable but prone to\nretaining heat. It vents this heat from the\nslits in its tail."
        fr:
          scarlet: "Son corps est composé d’un métal spécial\naussi lisse que la surface d’un miroir.\nIl est léger et résiste aux rayures."
          violet: "Ce Pokémon a un corps en métal robuste, mais\ncomme la chaleur reste piégée à l’intérieur,\nil doit la libérer par les fentes de sa queue."
        it:
          scarlet: "Il suo corpo fatto di un metallo speciale è liscio\ncome se fosse stato lucidato a specchio. Resiste\na graffi e ammaccature, e in più è anche leggero."
          violet: "Il suo corpo metallico è robusto ma ha\nlo svantaggio di accumulare calore, che viene\nperciò rilasciato dalle fessure sulla coda."
        de:
          scarlet: "Sein Körper, der aus einem speziellen\nMetall besteht, ist kratzfest, leicht und\nso glatt wie ein hochglanzpolierter Spiegel."
          violet: "Sein metallener Körper ist robust, aber heizt sich\nschnell auf. Um einen Hitzestau zu verhindern,\nleitet es Wärme durch Schlitze im Schwanz ab."
        es:
          scarlet: "Su cuerpo, compuesto de un metal especial,\nes tan liso como si tuviese un acabado de espejo.\nAdemás de ligero, es resistente a las rayaduras."
          violet: "Su cuerpo metálico es robusto, pero acumula\ncalor con tanta facilidad que se ve obligado a\nliberarlo a través de las rendijas de la cola."
        ko:
          scarlet: "특수한 금속으로 된 몸은\n경면 가공을 한 것처럼 매끈하다.\n흠집도 잘 안 나는 데다 가볍다."
          violet: "금속으로 된 몸은 튼튼하지만\n열을 잘 받기 때문에\n꼬리의 슬릿을 통해 열을 내보낸다."
        zh_simp:
          scarlet: "由特殊金属构成的身体\n如经过镜面加工般光滑，\n不易受损且重量轻。"
          violet: "金属的身体虽然坚固，\n但由于会封闭热量，\n因此会从尾巴缝隙排热。"
        zh_trad:
          scarlet: "由特殊金屬構成的身體\n如經過鏡面加工般光滑，\n不易受損且重量輕。"
          violet: "金屬構成的身體雖然堅固\n但無法散熱，因此牠會從\n尾巴上的縫隙排出熱氣。"
