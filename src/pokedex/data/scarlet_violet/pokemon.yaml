          violet: "￹暗闇￺くらやみ￻でも　￹目￺め￻が　レーダーの\n￹役割￺やくわり￻をして　￹活動￺かつどう￻できる。\n￹目￺め￻から　ビームを　￹発射￺はっしゃ￻する。"
