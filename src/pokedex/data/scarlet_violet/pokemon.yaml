      types:
        - flying
        - water
      egg_groups:
        - water_1
        - flying
      abilities:
        - gulp_missile
      descriptions:
        jp_kana:
          scarlet: "￹川辺￺かわべ￻で　つねに　エサを　￹探￺さが￻す。\n￹好物￺こうぶつ￻の　サシカマスを　￹見￺み￻つけると\nなにも　￹考￺かんが￻えず　￹丸飲￺まるの￻みにする。"
          violet: "￹喉￺のど￻に　￹詰￺つ￻まらせた　サシカマスの\nビチビチと　￹跳￺は￻ねまわる　￹力￺ちから￻を\n￹利用￺りよう￻して　￹高速￺こうそく￻で　￹吐￺は￻き￹出￺だ￻す。"
        jp_kanji:
          scarlet: "￹川辺￺かわべ￻で　つねに　エサを　￹探￺さが￻す。\n￹好物￺こうぶつ￻の　サシカマスを　￹見￺み￻つけると\nなにも　￹考￺かんが￻えず　￹丸飲￺まるの￻みにする。"
          violet: "￹喉￺のど￻に　￹詰￺つ￻まらせた　サシカマスの\nビチビチと　￹跳￺は￻ねまわる　￹力￺ちから￻を\n￹利用￺りよう￻して　￹高速￺こうそく￻で　￹吐￺は￻き￹出￺だ￻す。"
        en:
          scarlet: "Cramorant is constantly on the hunt for food\nalong riverbanks. It loves Arrokuda—when it finds\nthem, it swallows them whole without a thought."
          violet: "Cramorant takes advantage of Arrokuda’s frantic\nthrashing to help spit Arrokuda out at high speed."
        fr:
          scarlet: "Il passe son temps au bord des rivières, en quête\nde nourriture. Il adore les Embrochet, et lorsqu’il\nen trouve un, il le gobe sans réfléchir."
          violet: "L’Embrochet coincé dans sa gorge se débat.\nNigosier profite de l’énergie ainsi générée pour\nle propulser hors de son bec à grande vitesse."
        it:
          scarlet: "Cerca costantemente prede sulle rive dei fiumi.\nAdora gli Arrokuda e quando ne trova uno lo\ningoia intero senza stare tanto a pensarci."
          violet: "Sfrutta la forza dei guizzi dell’Arrokuda che\nha incastrato in gola per sputarlo via ad alta\nvelocità."
        de:
          scarlet: "Es sucht stets an Flussufern nach Nahrung.\nStößt es auf Pikuda, seine Leibspeise, verschlingt\nes sie im Ganzen, ohne nachzudenken."
          violet: "Urgl nutzt den Schwung vom Winden und\nZappeln des Pikuda, das in seinem Hals\nfeststeckt, um es pfeilschnell auszuspucken."
        es:
          scarlet: "Busca sustento en las riberas de los ríos de forma\nconstante. Los Arrokuda son su alimento favorito\ny los engulle enteros sin pensárselo dos veces."
          violet: "Aprovecha la fuerza de las sacudidas del\nArrokuda que se le ha atragantado para\nescupirlo a gran velocidad."
        ko:
          scarlet: "강가에서 수시로 먹이를 찾는다.\n좋아하는 찌로꼬치를 발견하면\n아무 생각 없이 통째로 삼켜 버린다."
          violet: "목에 걸린 찌로꼬치의\n팔딱팔딱 뛰는 힘을 이용해서\n고속으로 뱉어 낸다."
        zh_simp:
          scarlet: "会一直在河边觅食。\n当发现爱吃的刺梭鱼时，\n就会不假思索地一口吞下。"
          violet: "利用卡在喉咙中的刺梭鱼\n活蹦乱跳的力量将其高速吐出。"
        zh_trad:
          scarlet: "不論何時都在河邊找食物，\n一旦發現牠愛吃的刺梭魚\n就會不經思考地大口吞下。"
          violet: "會利用卡在喉嚨裡的\n刺梭魚活蹦亂跳的力量，\n將其高速吐出嘴外。"
    cramorant_gorging_form:
      form_id: 2
      names:
        jp_kana: まるのみのすがた
        jp_kanji: まるのみのすがた
        en: Gorging Form
        fr: Forme Gobe-Chu
        it: Forma Inghiottintero
        de: Stopfform
        es: Forma Engulletodo
        ko: 통째로 삼킨 모습
        zh_simp: 大口吞的样子
        zh_trad: 大口吞的樣子
      base_stats:
        hp: 70
        attack: 85
        defense: 55
        special_attack: 85
        special_defense: 95
        speed: 85
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 2
        speed: 0
      types:
        - flying
        - water
      egg_groups:
        - water_1
        - flying
      abilities:
        - gulp_missile
      descriptions:
        jp_kana:
          scarlet: "￹喉￺のど￻の　￹太￺ふと￻さを　￹考￺かんが￻えると\nピカチュウを　￹飲￺の￻みこめないのだが\n￹咥￺くわ￻えたまま　￹離￺はな￻そうとしない。"
          violet: "￹喉￺のど￻に　￹詰￺つ￻まらせた　ピカチュウの\nビリビリの　￹電気￺でんき￻を　￹拝借￺はいしゃく￻して\n￹相手￺あいて￻を　￹感電￺かんでん￻させてしまうのだ。"
        jp_kanji:
          scarlet: "￹喉￺のど￻の　￹太￺ふと￻さを　￹考￺かんが￻えると\nピカチュウを　￹飲￺の￻みこめないのだが\n￹咥￺くわ￻えたまま　￹離￺はな￻そうとしない。"
          violet: "￹喉￺のど￻に　￹詰￺つ￻まらせた　ピカチュウの\nビリビリの　￹電気￺でんき￻を　￹拝借￺はいしゃく￻して\n￹相手￺あいて￻を　￹感電￺かんでん￻させてしまうのだ。"
        en:
          scarlet: "Its throat is clearly not wide enough to swallow a\nPikachu, and yet Cramorant makes no move to\nrelease its catch."
          violet: "With a Pikachu stuck in its throat, Cramorant\ncan use Pikachu’s prickling electricity to give\nits opponents a shock."
        fr:
          scarlet: "En raison de la taille de sa gorge, il lui est\nimpossible d’avaler tout rond ce Pikachu.\nPourtant, il refuse de le recracher."
          violet: "L’électricité générée par le Pikachu coincé\ndans sa gorge lui permet de foudroyer\nses adversaires."
        it:
          scarlet: "La sua gola non è abbastanza grande\nda permettergli di inghiottire il Pikachu\nche ha in bocca, eppure si rifiuta di mollarlo."
          violet: "Fa uso delle scariche elettriche del Pikachu che\nha incastrato in gola per folgorare l’avversario."
        de:
          scarlet: "Seine Kehle ist eigentlich zu schmal, um das\nPikachu in seinem Schnabel hinunterzuschlingen,\naber Urgl macht keine Anstalten, es auszuspucken."
          violet: "Urgl nutzt die elektrische Ladung des in seinem\nHals stecken gebliebenen Pikachu, um Gegnern\nStromschläge zu versetzen."
        es:
          scarlet: "Aunque su garganta sea demasiado estrecha\npara tragarse al Pikachu, Cramorant se niega\na sacárselo del pico."
          violet: "Hace uso de la electricidad del Pikachu que se\nle ha atragantado para electrocutar a su rival."
        ko:
          scarlet: "목의 굵기를 감안하면\n피카츄를 삼킬 수 없는데도\n입에 넣은 채 놓아줄 생각이 없다."
          violet: "목에 걸린 피카츄의\n찌릿찌릿한 전기를 이용해서\n상대를 감전시킨다."
        zh_simp:
          scarlet: "想想它喉咙的大小就能知道\n它是不可能吞得下皮卡丘的，\n但它就是叼着不肯放。"
          violet: "借助卡在喉咙中的皮卡丘\n酥酥麻麻的电力让对手触电。"
        zh_trad:
          scarlet: "想想牠喉嚨的寬度，就知道\n要吞下皮卡丘是不可能的事，\n但牠就是要叼著皮卡丘不放。"
          violet: "會借用卡在喉嚨裡的\n皮卡丘酥酥麻麻的電力，\n讓對手觸電。"
arrokuda:
  species_id: 846
  names:
    jp_kana: サシカマス
    jp_kanji: サシカマス
    en: Arrokuda
    fr: Embrochet
    it: Arrokuda
    de: Pikuda
    es: Arrokuda
    ko: 찌로꼬치
    zh_simp: 刺梭鱼
    zh_trad: 刺梭魚
  forms:
    arrokuda:
      form_id: 0
      base_stats:
        hp: 41
        attack: 63
        defense: 40
        special_attack: 40
        special_defense: 30
        speed: 66
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - water
      egg_groups:
        - water_2
      abilities:
        - swift_swim
      hidden_ability: propeller_tail
      descriptions:
        jp_kana:
          scarlet: "￹真￺ま￻っ￹直￺す￻ぐにしか　￹速￺はや￻く　￹泳￺およ￻げない。\n￹食￺た￻べ￹過￺す￻ぎて　￹動￺うご￻きが　￹鈍￺にぶ￻いものから\nカイデンの　￹群￺む￻れに　￹狙￺ねら￻われる。"
          violet: "￹硬￺かた￻く　￹尖￺とが￻った　あごで　￹突撃￺とつげき￻し\n￹獲物￺えもの￻を　￹仕留￺しと￻める。\n￹視力￺しりょく￻が　￹悪￺わる￻いので　￹成功率￺せいこうりつ￻は　￹低￺ひく￻い。"
        jp_kanji:
          scarlet: "￹真￺ま￻っ￹直￺す￻ぐにしか　￹速￺はや￻く　￹泳￺およ￻げない。\n￹食￺た￻べ￹過￺す￻ぎて　￹動￺うご￻きが　￹鈍￺にぶ￻いものから\nカイデンの　￹群￺む￻れに　￹狙￺ねら￻われる。"
          violet: "￹硬￺かた￻く　￹尖￺とが￻った　あごで　￹突撃￺とつげき￻し\n￹獲物￺えもの￻を　￹仕留￺しと￻める。\n￹視力￺しりょく￻が　￹悪￺わる￻いので　￹成功率￺せいこうりつ￻は　￹低￺ひく￻い。"
        en:
          scarlet: "Arrokuda can swim quickly only in a straight line.\nThe ones that become sluggish from overeating\nare the first to be targeted by flocks of Wattrel."
          violet: "It takes down prey by charging into them with\nits hard, pointed jaw. But Arrokuda’s eyesight is\npoor, so this tactic has a low success rate."
        fr:
          scarlet: "Il ne nage vite qu’en ligne droite. Quand il\nmange trop, il devient maladroit et des volées\nde Zapétrel le prennent pour cible."
          violet: "Il charge ses proies puis les abat d’un coup de\nsa mâchoire aussi dure qu’effilée. Comme il a\nune mauvaise vue, son taux de réussite est faible."
        it:
          scarlet: "Riesce a nuotare velocemente solo in linea retta.\nQuando mangia troppo i suoi movimenti si fanno\nlenti e gli stormi di Wattrel lo prendono di mira."
          violet: "Carica le prede per abbatterle con la sua\nmandibola dura e appuntita, ma è debole di\nvista quindi non fa spesso centro."
        de:
          scarlet: "Es kann nur geradeaus schwimmend schnell sein.\nÜberfressene Pikuda sind träge und geraten so\nzuerst ins Visier von Voltrel-Schwärmen."
          violet: "Beute erlegt es durch Stoßangriffe mit seinem\nharten, spitzen Kiefer. Wegen seines schlechten\nSehvermögens ist die Erfolgsquote jedoch gering."
        es:
          scarlet: "Solo puede nadar rápido en línea recta. Las\nbandadas de Wattrel atacan primero a los que\nles cuesta moverse por haber comido de más."
          violet: "Carga contra sus presas con su dura y afilada\nmandíbula para acabar con ellas, pero es\nhabitual que falle debido a su mala visión."
        ko:
          scarlet: "직선으로만 빠르게 헤엄칠 수 있다.\n너무 많이 먹어 움직임이 둔해진 녀석부터\n찌리비 무리에게 노려진다."
          violet: "단단하고 뾰족한 턱으로 돌격하여\n먹잇감을 해치운다.\n시력이 좋지 않아서 성공률은 낮다."
        zh_simp:
          scarlet: "只能直线游泳。因吃太饱\n而动作变得迟缓的个体\n会先遭到电海燕的群体袭击。"
          violet: "会用又硬又尖的下巴\n发动突击捕杀猎物。\n视力很差，因此成功率很低。"
        zh_trad:
          scarlet: "游泳只能游直線。因吃太飽\n而行動變得遲緩的個體\n會先遭到電海燕的群體襲擊。"
          violet: "會用又尖又硬的下巴\n發動突擊來捕殺獵物。\n視力很差，因此成功率很低。"
