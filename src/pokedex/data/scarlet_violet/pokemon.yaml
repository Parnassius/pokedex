      descriptions:
        jp_kana:
          scarlet: "￹寒￺さむ￻い　￹土地￺とち￻の　￹水辺￺みずべ￻に　￹生息￺せいそく￻。\nほかの　￹地方￺ちほう￻の　ハリーセンよりも\n￹毒針￺どくばり￻は　￹太￺ふと￻く　￹短￺みじか￻い。"
          violet: "エサから　￹毒素￺どくそ￻を　￹摂取￺せっしゅ￻する。\n￹紫色￺むらさきいろ￻が　￹際立￺きわだ￻つ　￹針￺はり￻は\n￹猛毒￺もうどく￻を　たたえた　￹証拠￺しょうこ￻。"
        jp_kanji:
          scarlet: "￹寒￺さむ￻い　￹土地￺とち￻の　￹水辺￺みずべ￻に　￹生息￺せいそく￻。\nほかの　￹地方￺ちほう￻の　ハリーセンよりも\n￹毒針￺どくばり￻は　￹太￺ふと￻く　￹短￺みじか￻い。"
          violet: "エサから　￹毒素￺どくそ￻を　￹摂取￺せっしゅ￻する。\n￹紫色￺むらさきいろ￻が　￹際立￺きわだ￻つ　￹針￺はり￻は\n￹猛毒￺もうどく￻を　たたえた　￹証拠￺しょうこ￻。"
        en:
          scarlet: "It lives just offshore in cold parts of the world.\nIts poisonous spikes are thicker and shorter than\nthose of other regions’ Qwilfish."
          violet: "It absorbs toxins from the food it eats.\nThe distinct purple spikes on its body are\nevidence of its potent poison."
        fr:
          scarlet: "Il vit dans l’eau près des côtes froides. Ses épines\nempoisonnées sont plus épaisses et plus courtes\nque celles des Qwilfish des autres régions."
          violet: "Il absorbe les toxines de sa nourriture. La couleur\nviolette distinctive de certaines de ses épines\nindique qu’elles contiennent un poison virulent."
        it:
          scarlet: "Vive nelle acque di zone fredde, vicino\nalle sponde. I suoi aculei velenosi sono più corti\ne spessi di quelli dei Qwilfish di altre regioni."
          violet: "Assorbe tossine dal cibo. Il marcato colore\nviola dei suoi aculei indica che sono ricolmi di\nun veleno letale."
        de:
          scarlet: "Es lebt ufernah in Gewässern kalter Gefilde.\nVerglichen mit den Baldorfish anderer Regionen\nsind seine Giftstacheln dicker und kürzer."
          violet: "Es absorbiert die Toxine in seiner Nahrung. Seine\nauffällig lilafarbenen Stacheln sind ein Zeichen\ndafür, dass es voll von gefährlichem Gift steckt."
        es:
          scarlet: "Vive en las aguas cercanas a tierras frías.\nSus púas tóxicas son más gruesas y cortas\nque las de los Qwilfish de otras regiones."
          violet: "Absorbe toxinas de la comida que ingiere.\nEl ostensible color morado de algunas de sus\npúas indica que contienen un veneno letal."
        ko:
          scarlet: "추운 땅의 물가에 서식한다.\n다른 지방의 침바루보다\n독침이 굵고 짧다."
          violet: "먹이를 통해 독소를 섭취한다.\n보랏빛이 두드러지는 침은\n맹독으로 가득하다는 증거다."
        zh_simp:
          scarlet: "栖息在寒冷地区的水边。\n比起其他地区的千针鱼，\n它的毒针更粗更短。"
          violet: "会从食物摄取毒素。\n突显紫色的针\n是它充满剧毒的证据。"
        zh_trad:
          scarlet: "棲息在寒冷之地的水邊。\n比起其他地區的千針魚，\n牠的毒針較為粗短。"
          violet: "會從食物攝取毒素。\n紫色極為醒目的針\n是牠滿身劇毒的證據。"
