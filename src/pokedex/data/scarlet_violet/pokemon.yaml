          violet: "￹大￺おお￻きな　￹目玉￺めだま￻は　￹動￺うご￻かさなくても\nあらゆる　￹方向￺ほうこう￻を　￹見渡￺みわた￻せるので\n￹敵￺てき￻や　エサも　すぐ　￹見￺み￻つけられる。"
        jp_kanji:
          scarlet: "￹翅￺はね￻を　￹高速￺こうそく￻で　はためかせて\n￹空中￺くうちゅう￻で　￹停止￺ていし￻　しながら\n￹自分￺じぶん￻の　￹縄張￺なわば￻りを　￹見張￺みは￻っている。"
          violet: "￹大￺おお￻きな　￹目玉￺めだま￻は　￹動￺うご￻かさなくても\nあらゆる　￹方向￺ほうこう￻を　￹見渡￺みわた￻せるので\n￹敵￺てき￻や　エサも　すぐ　￹見￺み￻つけられる。"
        en:
          scarlet: "As Yanma surveys its territory, it periodically\nstops to hover in place by flapping its wings at\nhigh speeds."
          violet: "It can see in all directions without moving its big\neyes, helping it spot both attackers and prey\nright away."
        fr:
          scarlet: "La vitesse à laquelle il bat des ailes\nlui permet de rester en vol stationnaire.\nIl surveille ainsi tout son territoire."
          violet: "Ses grands yeux lui permettent de voir dans\ntoutes les directions sans bouger la tête. Il repère\nainsi ses adversaires et ses proies instantanément."
        it:
          scarlet: "Per sorvegliare il suo territorio, si ferma\na mezz’aria sbattendo velocemente le ali."
          violet: "I suoi grandi occhi possono guardare in ogni\ndirezione senza muoversi, permettendogli\ndi individuare facilmente i nemici e le prede."
        de:
          scarlet: "Yanma schlägt mit hoher Geschwindigkeit\nmit den Flügeln, um an einer Stelle schweben\nund so sein Revier überwachen zu können."
          violet: "Es kann in alle Richtungen sehen, ohne seine\ngroßen Augen zu bewegen. So nimmt es Feinde\nund Beute auf Anhieb wahr."
        es:
          scarlet: "Vigila su territorio deteniéndose de vez en\ncuando, batiendo las alas a gran velocidad\npara mantenerse suspendido en el aire."
          violet: "Puede ver en todas direcciones sin necesidad\nde mover los ojos. Así localiza al instante tanto\nrivales como posibles fuentes de sustento."
        ko:
          scarlet: "날개를 고속으로 퍼덕여\n공중에서 정지한 채로\n자신의 영역을 감시한다."
          violet: "커다란 눈알은 움직이지 않아도\n모든 방향을 살필 수 있어서\n적이나 먹이를 빠르게 찾아낸다."
        zh_simp:
          scarlet: "会高速扇动翅膀\n让自身停留在空中\n以监视自己的地盘。"
          violet: "因为它无需转动大大的眼珠\n就能环视各个方向，所以连\n敌人和食物也能马上发现。"
        zh_trad:
          scarlet: "會高速拍動翅膀\n讓自己靜止在空中，\n並監視自己的地盤。"
          violet: "就算不轉動大大的眼珠也可以\n全方位環視周遭，因此不管是\n敵人還是食物都能立刻發現。"
