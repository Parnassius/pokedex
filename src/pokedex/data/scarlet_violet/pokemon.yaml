        jp_kana:
          scarlet: "￹溶解液￺ようかいえき￻の　￹効￺き￻き￹目￺め￻を　なくす\n￹液体￺えきたい￻も　￹分泌￺ぶんぴつ￻しているので\n￹自分￺じぶん￻は　￹溶￺と￻けたりしないのだ。"
          violet: "￹葉￺は￻っぱの　￹部分￺ぶぶん￻は　カッターになって\n￹相手￺あいて￻を　￹切￺き￻り￹裂￺さ￻く。　￹口￺くち￻からは\nなんでも　￹溶￺と￻かす　￹液体￺えきたい￻を　￹吐￺は￻く。"
        jp_kanji:
          scarlet: "￹溶解液￺ようかいえき￻の　￹効￺き￻き￹目￺め￻を　なくす\n￹液体￺えきたい￻も　￹分泌￺ぶんぴつ￻しているので\n￹自分￺じぶん￻は　￹溶￺と￻けたりしないのだ。"
          violet: "￹葉￺は￻っぱの　￹部分￺ぶぶん￻は　カッターになって\n￹相手￺あいて￻を　￹切￺き￻り￹裂￺さ￻く。　￹口￺くち￻からは\nなんでも　￹溶￺と￻かす　￹液体￺えきたい￻を　￹吐￺は￻く。"
        en:
          scarlet: "Even though it is filled with acid, it does not\nmelt because it also oozes a protective fluid."
          violet: "The leafy parts act as cutters for slashing foes.\nIt spits a fluid that dissolves everything."
        fr:
          scarlet: "Il sécrète à la fois de l’acide et un liquide\nqui neutralise ce dernier. L’acide qu’il produit\nne le consume donc pas."
          violet: "Ses membres en forme de feuilles lui\npermettent de trancher ses adversaires.\nIl crache un fluide capable de tout dissoudre."
        it:
          scarlet: "Il liquido neutralizzante che secerne gli\npermette di non venir sciolto dal suo\nstesso acido."
          violet: "Si serve delle foglie laterali come lame contro\ni nemici. Il fluido che secerne dalla bocca scioglie\nqualsiasi cosa."
        de:
          scarlet: "Da es auch eine Flüssigkeit absondert, die es\ngegen Säure resistent macht, verätzt es sich\nnicht selbst."
          violet: "Seine Blätter dienen als Schneiden, mit denen\nes Gegner aufschlitzt. Es spuckt eine Flüssigkeit,\ndie alles auflöst."
        es:
          scarlet: "Rezuma un fluido neutralizante que impide\nque su propio ácido lo disuelva."
          violet: "Sus hojas actúan como cuchillas en combate.\nOtra de sus armas es el corrosivo fluido que\nexpulsa por la boca."
        ko:
          scarlet: "용해액의 효능을 없애는\n액체도 분비하고 있어서\n자신은 녹지 않는다."
          violet: "잎사귀 부분은 칼날이 되어\n상대를 베어 버린다. 입에서는\n무엇이든 녹이는 액체를 뿜어낸다."
        zh_simp:
          scarlet: "因为它也能分泌出\n让溶解液无效的液体，\n所以自身不会被溶解。"
          violet: "叶子部分会变成刀刃切割对手。\n嘴里会吐出可溶化万物的液体。"
        zh_trad:
          scarlet: "由於牠同時也會分泌\n消除溶解液效果的液體，\n因此自己不會被溶化。"
          violet: "葉子部分會變成刀刃\n斬斷對手。還會從口中\n吐出可融化萬物的液體。"
