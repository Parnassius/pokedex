      descriptions:
        jp_kana:
          scarlet: "￹木￺き￻の　￹皮￺かわ￻を　￹重￺かさ￻ね￹合￺あ￻わせて\n￹殻￺から￻を　￹分厚￺ぶあつ￻くするのが　￹大好￺だいす￻き。\n￹重￺おも￻くなっても　￹気￺き￻にしない。"
          violet: "￹口￺くち￻から　￹吐￺は￻き￹出￺だ￻す　￹液体￺えきたい￻は\n￹木￺き￻の￹皮￺かわ￻を　つける　￹接着剤￺せっちゃくざい￻。\n￹空気￺くうき￻に　￹触￺ふ￻れると　￹固￺かた￻まるのだ。"
        jp_kanji:
          scarlet: "￹木￺き￻の　￹皮￺かわ￻を　￹重￺かさ￻ね￹合￺あ￻わせて\n￹殻￺から￻を　￹分厚￺ぶあつ￻くするのが　￹大好￺だいす￻き。\n￹重￺おも￻くなっても　￹気￺き￻にしない。"
          violet: "￹口￺くち￻から　￹吐￺は￻き￹出￺だ￻す　￹液体￺えきたい￻は\n￹木￺き￻の￹皮￺かわ￻を　つける　￹接着剤￺せっちゃくざい￻。\n￹空気￺くうき￻に　￹触￺ふ￻れると　￹固￺かた￻まるのだ。"
        en:
          scarlet: "It likes to make its shell thicker by adding layers\nof tree bark. The additional weight doesn’t\nbother it."
          violet: "It spits out a fluid that it uses to glue tree bark to\nits body. The fluid hardens when it touches air."
        fr:
          scarlet: "Ce Pokémon renforce sa carapace en y ajoutant\ndes écorces d’arbre. Il devient alors plus lourd,\nmais cela ne le dérange pas."
          violet: "Il crache un liquide gluant pour coller de l’écorce\nsur son corps. Ce fluide durcit au contact de l’air."
        it:
          scarlet: "Gli piace ispessire il guscio aggiungendo strati\ndi corteccia. Non è impensierito dall’aumento\ndi peso."
          violet: "Sputa un liquido che gli serve per incollare\nla corteccia al proprio corpo. Con l’aria,\nil liquido si solidifica."
        de:
          scarlet: "Es erfreut sich daran, seine Schale mit Schichten\nvon Baumrinde dicker zu machen. Ihm ist es\ngleich, dass es dadurch schwerer wird."
          violet: "Mit der klebrigen Flüssigkeit, die es über den\nMund ausspeit, befestigt es Baumrinde an seinem\nKörper. An der Luft erhärtet dieser Klebstoff."
        es:
          scarlet: "Le gusta engrosar su coraza añadiendo cortezas\nde árbol. El aumento de peso no le molesta."
          violet: "Libera un fluido con el que se pega cortezas\nde árbol. Al contacto con el aire, este se\nsolidifica."
        ko:
          scarlet: "나무껍질을 짜 맞춰서\n껍질을 두껍게 하는 것을 좋아한다.\n무거워져도 신경 쓰지 않는다."
          violet: "입에서 내뿜는 액체는\n나무껍질을 붙이는 접착제 역할을 한다.\n공기에 닿으면 굳어 버린다."
        zh_simp:
          scarlet: "非常喜欢把树皮叠在身上加厚外壳。\n就算变重了也不会在意。"
          violet: "口中吐出的液体是\n它用来粘树皮的胶水。\n一接触到空气就会凝固。"
        zh_trad:
          scarlet: "最喜歡把樹皮\n疊在身上加厚外殼。\n就算因此變重也毫不在意。"
          violet: "口中吐出的液體是牠\n用來貼上樹皮的膠水，\n一接觸到空氣就會凝固。"
