      descriptions:
        jp_kana:
          scarlet: "￹翼￺つばさ￻を　￹使￺つか￻い　￹軽￺かろ￻やかに　￹跳￺と￻び\n￹相手￺あいて￻を　￹華麗￺かれい￻に　￹仕留￺しと￻める　￹技￺わざ￻は\n￹生￺う￻まれ￹育￺そだ￻った　￹森￺もり￻で　￹磨￺みが￻かれる。"
          violet: "￹群￺む￻れを　￹作￺つく￻らず　￹静￺しず￻かに　￹暮￺く￻らす。\n￹集団￺しゅうだん￻で　￹騒￺さわ￻ぐ　オコリザルは\n￹天敵￺てんてき￻で　いつも　￹争￺あらそ￻いになる。"
        jp_kanji:
          scarlet: "￹翼￺つばさ￻を　￹使￺つか￻い　￹軽￺かろ￻やかに　￹跳￺と￻び\n￹相手￺あいて￻を　￹華麗￺かれい￻に　￹仕留￺しと￻める　￹技￺わざ￻は\n￹生￺う￻まれ￹育￺そだ￻った　￹森￺もり￻で　￹磨￺みが￻かれる。"
          violet: "￹群￺む￻れを　￹作￺つく￻らず　￹静￺しず￻かに　￹暮￺く￻らす。\n￹集団￺しゅうだん￻で　￹騒￺さわ￻ぐ　オコリザルは\n￹天敵￺てんてき￻で　いつも　￹争￺あらそ￻いになる。"
        en:
          scarlet: "Its elegant finishing moves—performed by nimbly\nleaping around using its wings—are polished in\nthe forest where it was born and raised."
          violet: "Hawlucha live quietly without flocking together.\nThey fight constantly with their natural enemies:\nnoisy groups of Primeape."
        fr:
          scarlet: "Ce Pokémon sautille adroitement à l’aide de ses\nailes avant d’achever son adversaire en beauté. Il\nperfectionne cette technique dans sa forêt natale."
          violet: "Ce Pokémon mène une vie paisible et solitaire.\nIl est en conflit permanent avec de bruyants\ngroupes de Colossinge, ses ennemis jurés."
        it:
          scarlet: "Al momento di sferrare il suo elegante colpo\ndi grazia, si libra in volo grazie alle sue ali. Affina\nquesta tecnica nel bosco in cui è nato e cresciuto."
          violet: "Gli Hawlucha vivono in solitudine e tranquillità.\nSi scontrano spesso con i Primeape, loro acerrimi\nnemici, perché formano branchi chiassosi."
        de:
          scarlet: "Mithilfe seiner Flügel springt es behände umher\nund erledigt Gegner so mit eleganten Attacken.\nDiese Technik trainiert es in seinem Heimatwald."
          violet: "Resladero lebt friedlich für sich allein. Unentwegt\nkämpft es gegen seine natürlichen Feinde: Rasaff,\ndie in Gruppen randalieren."
        es:
          scarlet: "Remata a sus rivales con elegancia dando ágiles\nsaltos con la ayuda de las alas. Se trata de una\ntécnica que perfecciona en su bosque natal."
          violet: "Vive en solitario, disfrutando de la tranquilidad.\nLos Primeape, que forman ruidosas manadas,\nson su peor enemigo y no paran de enfrentarse."
        ko:
          scarlet: "날개를 사용해 가볍게 도약하여\n상대를 화려하게 마무리하는 기술은\n나고 자란 숲에서 다듬어진다."
          violet: "무리를 이루지 않고 조용히 지낸다.\n집단으로 떠드는 성원숭과는\n천적이라 언제나 싸움이 일어난다."
        zh_simp:
          scarlet: "利用翅膀轻盈起跳后华丽地\n给予对手致命一击，这种招式是\n在它生长的森林中磨炼出来的。"
          violet: "不集结成群，静静地生活。\n天敌是喜欢集体大闹的火暴猴，\n它们时不时就会起争执。"
        zh_trad:
          scarlet: "使用翅膀輕盈地跳起後，\n華麗地置對手於死地的招式\n是在出生的森林磨練出來的。"
          violet: "不集結成群，過著靜靜的生活。\n天敵是喜歡集體大鬧的火爆猴，\n時不時就會起爭執。"
