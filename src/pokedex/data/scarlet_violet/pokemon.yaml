          violet: "オーブンレンジに　￹入￺はい￻った　￹姿￺すがた￻。\n￹高温￺こうおん￻で　あたりを　￹焼￺や￻き￹焦￺こ￻がして\n￹楽￺たの￻しそうに　￹笑￺わら￻っている。"
        jp_kanji:
          scarlet: "オーブンレンジ　￹自体￺じたい￻の　￹調子￺ちょうし￻が\n￹悪￺わる￻いと　￹中￺なか￻に　￹入￺はい￻っている\nロトムも　￹元気￺げんき￻が　なくなるのだ。"
          violet: "オーブンレンジに　￹入￺はい￻った　￹姿￺すがた￻。\n￹高温￺こうおん￻で　あたりを　￹焼￺や￻き￹焦￺こ￻がして\n￹楽￺たの￻しそうに　￹笑￺わら￻っている。"
        en:
          scarlet: "If the convection microwave oven is not working\nproperly, then the Rotom inhabiting it will\nbecome lethargic."
          violet: "This Rotom has possessed a convection\nmicrowave oven. It will sear the surrounding\narea with its burning heat, then smile in delight."
        fr:
          scarlet: "Si le four dont il prend possession ne fonctionne\npas bien, Motisma perdra sa vitalité."
          violet: "Ce Motisma a pris possession d’un four.\nLe sourire aux lèvres, il s’amuse à brûler\ntout ce qui l’entoure."
        it:
          scarlet: "Se il forno elettrico dentro cui si trova è in\ncattive condizioni, anche Rotom ne risente."
          violet: "Ha assunto questa forma entrando in un forno\nelettrico. Carbonizza tutto ciò che ha intorno per\npoi ridere divertito."
        de:
          scarlet: "Funktioniert der Mikrowellenherd nicht richtig,\nso leidet auch das Rotom darin."
          violet: "Dieses Rotom ist in einen Mikrowellenherd\neingedrungen. Es versengt alles um sich herum\nmit Gluthitze und lacht dann vergnügt."
        es:
          scarlet: "Si el horno eléctrico se encuentra en mal estado,\nla salud del Rotom que reside en su interior se\ndeteriora también."
          violet: "Asume esta forma cuando toma posesión de un\nhorno eléctrico. Calcina los alrededores con el\ncalor abrasador que emite y luego ríe felizmente."
        ko:
          scarlet: "오븐레인지의 상태가 나쁘면\n안에 들어 있는 로토무도\n기운이 나지 않는다고 한다."
          violet: "오븐레인지에 들어간 모습.\n고열로 주위를 태워 놓고는\n재밌다는 듯이 웃는다."
        zh_simp:
          scarlet: "如果烤箱微波炉本身运转不良，\n钻进里边的洛托姆\n也会变得无精打采。"
          violet: "钻进了烤箱微波炉的样子。\n会用高温将周围烤得焦黑，\n然后开心地大笑。"
        zh_trad:
          scarlet: "如果烤箱微波爐本身運轉不良，\n鑽進裡面的洛托姆\n也會變得無精打采。"
          violet: "鑽進了烤箱微波爐的樣子。\n會用高溫將周圍燒得焦黑，\n然後開心地大笑。"
    rotom_wash:
      form_id: 2
      names:
        jp_kana: ウォッシュロトム
        jp_kanji: ウォッシュロトム
        en: Wash Rotom
        fr: Motisma Lavage
        it: Rotom Lavaggio
        de: Wasch-Rotom
        es: Rotom Lavado
        ko: 워시로토무
        zh_simp: 清洗洛托姆
        zh_trad: 清洗洛托姆
      base_stats:
        hp: 50
        attack: 65
        defense: 107
        special_attack: 105
        special_defense: 107
        speed: 86
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 1
        special_defense: 0
        speed: 1
      types:
        - electric
        - water
      egg_groups:
        - amorphous
      abilities:
        - levitate
      descriptions:
        jp_kana:
          scarlet: "￹洗濯機￺せんたくき￻に　￹入￺はい￻った　￹姿￺すがた￻。\nあたりを　￹水浸￺みずびた￻しにしては\n￹満足￺まんぞく￻そうに　うなずいている。"
          violet: "すでに　￹生産中止￺せいさんちゅうし￻のため\nロトムが　￹入￺はい￻れる　￹洗濯機￺せんたくき￻は\n￹高値￺たかね￻で　￹取引￺とりひき￻されているのだ。"
        jp_kanji:
          scarlet: "￹洗濯機￺せんたくき￻に　￹入￺はい￻った　￹姿￺すがた￻。\nあたりを　￹水浸￺みずびた￻しにしては\n￹満足￺まんぞく￻そうに　うなずいている。"
          violet: "すでに　￹生産中止￺せいさんちゅうし￻のため\nロトムが　￹入￺はい￻れる　￹洗濯機￺せんたくき￻は\n￹高値￺たかね￻で　￹取引￺とりひき￻されているのだ。"
        en:
          scarlet: "This Rotom has entered a washing machine.\nIt nods with satisfaction after it floods the\nsurrounding area."
          violet: "The model of washing machine that Rotom\ncan inspirit has been discontinued, so these\nappliances are now traded at high prices."
        fr:
          scarlet: "Ce Motisma a pris possession d’une machine\nà laver. Il provoque des inondations puis hoche\nla tête d’un air satisfait."
          violet: "Le modèle de machine à laver dont il peut\nprendre possession se revend à des prix\nélevés, car il n’est plus commercialisé."
        it:
          scarlet: "Ha assunto questa forma entrando in una\nlavatrice. Inonda i dintorni per poi annuire\nsoddisfatto."
          violet: "Le lavatrici in cui Rotom può entrare sono\normai fuori produzione, perciò si vendono\na prezzi molto alti."
        de:
          scarlet: "Dieses Rotom ist in eine Waschmaschine\neingedrungen. Es setzt alles um sich herum\nunter Wasser und nickt dann selbstgefällig."
          violet: "Das Waschmaschinenmodell, in das Rotom\neindringen kann, wird nicht mehr hergestellt\nund deshalb zu hohen Preisen gehandelt."
        es:
          scarlet: "Asume esta forma cuando toma posesión de\nuna lavadora. Inunda todo a su alrededor para\nacto seguido asentir con satisfacción."
          violet: "El modelo de lavadora del que Rotom\npuede tomar posesión ya no se fabrica,\npor lo que se cotiza a precios muy elevados."
        ko:
          scarlet: "세탁기에 들어간 모습.\n주변을 침수시키고는\n만족스러운 듯이 끄덕이고 있다."
          violet: "이미 생산이 중지된 상태이기에\n로토무가 들어가는 세탁기는\n비싼 값에 거래되고 있다."
        zh_simp:
          scarlet: "钻进洗衣机里的样子。\n会用水淹没四周，\n然后心满意足地点头。"
          violet: "由于已经停止生产，能让\n洛托姆钻进去的洗衣机\n在市场上被高价买卖。"
        zh_trad:
          scarlet: "鑽進了洗衣機裡的樣子。\n會讓周圍都淹沒在水裡，\n然後一副滿足地點著頭。"
          violet: "由於已經停止生產的關係，\n能讓洛托姆鑽進去的洗衣機\n在市場上被以高價買賣。"
    rotom_frost:
      form_id: 3
      names:
        jp_kana: フロストロトム
        jp_kanji: フロストロトム
        en: Frost Rotom
        fr: Motisma Froid
        it: Rotom Gelo
        de: Frost-Rotom
        es: Rotom Frío
        ko: 프로스트로토무
        zh_simp: 结冰洛托姆
        zh_trad: 結冰洛托姆
      base_stats:
        hp: 50
        attack: 65
        defense: 107
        special_attack: 105
        special_defense: 107
        speed: 86
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 1
        special_defense: 0
        speed: 1
      types:
        - electric
        - ice
      egg_groups:
        - amorphous
      abilities:
        - levitate
      descriptions:
        jp_kana:
          scarlet: "￹冷蔵庫￺れいぞうこ￻に　￹入￺はい￻った　￹姿￺すがた￻。\n￹冷気￺れいき￻で　あたりを　￹凍￺い￻てつかせ\n￹愉快￺ゆかい￻そうに　￹跳￺は￻ねまわっている。"
          violet: "￹冷蔵庫￺れいぞうこ￻の　￹中￺なか￻に　￹入￺はい￻った\n￹特殊￺とくしゅ￻な　モーターが　ロトムを\nフォルムチェンジさせる　カギだ。"
        jp_kanji:
          scarlet: "￹冷蔵庫￺れいぞうこ￻に　￹入￺はい￻った　￹姿￺すがた￻。\n￹冷気￺れいき￻で　あたりを　￹凍￺い￻てつかせ\n￹愉快￺ゆかい￻そうに　￹跳￺は￻ねまわっている。"
          violet: "￹冷蔵庫￺れいぞうこ￻の　￹中￺なか￻に　￹入￺はい￻った\n￹特殊￺とくしゅ￻な　モーターが　ロトムを\nフォルムチェンジさせる　カギだ。"
        en:
          scarlet: "This Rotom has entered a refrigerator. It leaps\naround gleefully after it uses cold air to freeze\nthe area around it."
          violet: "The special motor within the refrigerator is the\nkey to bringing about Rotom’s change in form."
        fr:
          scarlet: "Ce Motisma a pris possession d’un réfrigérateur.\nIl gèle les alentours grâce à l’air froid qu’il\nproduit, puis il saute gaiement dans tous les sens."
          violet: "C’est grâce au moteur spécial de ce réfrigérateur\nque Motisma peut changer de forme."
        it:
          scarlet: "Ha assunto questa forma entrando in un\nfrigorifero. Congela ciò che ha intorno con aria\nghiacciata per poi saltellare tutto contento."
          violet: "Il motore speciale del frigorifero in cui è entrato\nRotom è il segreto del suo cambio di forma."
        de:
          scarlet: "Dieses Rotom ist in einen Kühlschrank\neingedrungen. Mit eiskalter Luft friert es seine\nUmgebung ein und springt dann fröhlich umher."
          violet: "Der besondere Motor im Inneren des\nKühlschranks ist der Schlüssel zu Rotoms\nFormwechsel."
        es:
          scarlet: "Asume esta forma cuando toma posesión de un\nfrigorífico. Congela todo a su alrededor con aire\ngélido para acto seguido brincar de alegría."
          violet: "El motor especial que hay dentro del frigorífico\nes la clave para que Rotom cambie de forma."
        ko:
          scarlet: "냉장고에 들어간 모습.\n냉기로 주위를 얼려 놓고는\n유쾌하다는 듯이 통통 튄다."
          violet: "냉장고 안에 들어 있는\n특수한 모터가\n로토무를 폼체인지시키는 열쇠다."
        zh_simp:
          scarlet: "钻进冰箱里的样子。\n会用冷气冻结四周，\n然后愉快地跳来跳去。"
          violet: "装在冰箱里的特殊马达\n是让洛托姆发生\n形态变化的关键。"
        zh_trad:
          scarlet: "鑽進了冰箱裡的樣子。\n會用冷氣把周圍都凍成冰塊，\n然後愉快地到處跳來跳去。"
          violet: "裝在冰箱裡的特殊馬達，\n是使洛托姆\n發生形態變化的關鍵。"
    rotom_fan:
