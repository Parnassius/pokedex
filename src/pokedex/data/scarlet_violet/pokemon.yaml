      descriptions:
        jp_kana:
          scarlet: "￹極低温￺きょくていおん￻の　￹冷気￺れいき￻を　￹口￺くち￻から　￹噴射￺ふんしゃ￻。\n￹灼熱￺しゃくねつ￻の　マグマでも\n￹瞬時￺しゅんじ￻に　￹凍￺こお￻りつかせてしまう。"
          violet: "￹逆￺さか￻さまになり　￹口￺くち￻から　￹冷気￺れいき￻を\n￹吹￺ふ￻きだす　￹力￺ちから￻で　￹突進￺とっしん￻。\n￹背￺せ￻びれの￹剣￺つるぎ￻で　￹敵￺てき￻を　￹仕留￺しと￻める。"
        jp_kanji:
          scarlet: "￹極低温￺きょくていおん￻の　￹冷気￺れいき￻を　￹口￺くち￻から　￹噴射￺ふんしゃ￻。\n￹灼熱￺しゃくねつ￻の　マグマでも\n￹瞬時￺しゅんじ￻に　￹凍￺こお￻りつかせてしまう。"
          violet: "￹逆￺さか￻さまになり　￹口￺くち￻から　￹冷気￺れいき￻を\n￹吹￺ふ￻きだす　￹力￺ちから￻で　￹突進￺とっしん￻。\n￹背￺せ￻びれの￹剣￺つるぎ￻で　￹敵￺てき￻を　￹仕留￺しと￻める。"
        en:
          scarlet: "This Pokémon blasts cryogenic air out from\nits mouth. This air can instantly freeze even\nliquid-hot lava."
          violet: "It launches itself into battle by flipping upside\ndown and spewing frigid air from its mouth.\nIt finishes opponents off with its dorsal blade."
        fr:
          scarlet: "L’air qu’il crache est tellement froid qu’il peut\ngeler instantanément du magma en fusion."
          violet: "Il se met tête en bas et crache de l’air glacé pour\nse propulser dans les airs et charger ses ennemis,\nqu’il élimine avec sa crête dorsale acérée."
        it:
          scarlet: "Emette dalla bocca un getto d’aria glaciale con\ncui può congelare all’istante anche del magma\nincandescente."
          violet: "Si mette a testa in giù e soffia un vento gelido\ndalla bocca per spingersi contro il nemico e\ntrafiggerlo con la lama della sua cresta dorsale."
        de:
          scarlet: "Aus seinem Maul stößt es unfassbare Kälte aus,\ndie sogar glühendes Magma augenblicklich\ngefrieren lässt."
          violet: "Es stürzt sich kopfüber in den Kampf, indem es\neisigen Atem aus dem Maul stößt. Mit seiner\nRückenflossenklinge erledigt es Feinde."
        es:
          scarlet: "Exhala un aliento extremadamente frío por\nla boca que es capaz de congelar al instante\nincluso magma al rojo vivo."
          violet: "Se coloca boca abajo y se propulsa con su\naliento gélido para cargar contra sus rivales,\na los que remata con la hoja de su placa dorsal."
        ko:
          scarlet: "극저온의 냉기를 입에서 분사한다.\n작열하는 마그마조차도\n순식간에 얼려 버린다."
          violet: "물구나무선 채 입으로 냉기를 뿜어내서\n그 추진력으로 돌진하고는\n등지느러미의 검으로 적을 처치한다."
        zh_simp:
          scarlet: "从嘴里喷射极低温的冷气。\n即使是灼热的熔岩，\n也能使其在一瞬间变成冰块。"
          violet: "会倒转身体并从口中吐出冷气，\n然后靠吐气的作用力猛冲，\n用背鳍的剑给予敌人致命一击。"
        zh_trad:
          scarlet: "會從嘴裡噴射極低溫的冷氣。\n即使是灼熱的熔岩也能\n使其在一瞬間變成冰塊。"
          violet: "會倒轉身體並從口中吐出冷氣，\n然後利用其推力朝敵人猛衝，\n以背鰭的劍給予致命一擊。"
