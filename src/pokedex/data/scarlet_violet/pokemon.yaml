      descriptions:
        jp_kana:
          scarlet: "ドロドロに　ぬかるんだ　￹足場￺あしば￻で\n￹生活￺せいかつ￻する　うちに　￹鍛￺きた￻えられ\n￹強靭￺きょうじん￻な　￹足腰￺あしこし￻に　なった。"
          violet: "ドロドロの　￹足場￺あしば￻で　￹本領￺ほんりょう￻を\n￹発揮￺はっき￻する。　￹身動￺みうご￻きの　とれない\n￹相手￺あいて￻を　￹一気￺いっき￻に　￹追￺お￻い￹込￺こ￻むぞ。"
        jp_kanji:
          scarlet: "ドロドロに　ぬかるんだ　￹足場￺あしば￻で\n￹生活￺せいかつ￻する　うちに　￹鍛￺きた￻えられ\n￹強靭￺きょうじん￻な　￹足腰￺あしこし￻に　なった。"
          violet: "ドロドロの　￹足場￺あしば￻で　￹本領￺ほんりょう￻を\n￹発揮￺はっき￻する。　￹身動￺みうご￻きの　とれない\n￹相手￺あいて￻を　￹一気￺いっき￻に　￹追￺お￻い￹込￺こ￻むぞ。"
        en:
          scarlet: "Living on muddy ground that provides poor\nfooting has served to train its lower body\nand caused it to develop sturdy legs."
          violet: "It is at its best when on muddy ground that offers\npoor footing. It quickly overwhelms opponents\nthat are bogged down and unable to move."
        fr:
          scarlet: "Il vit sur des sols boueux et glissants, ce qui\na permis à son arrière-train de se renforcer et\nde devenir particulièrement robuste et flexible."
          violet: "En terrain boueux, il peut exprimer son plein\npotentiel et dominer rapidement les adversaires\nembourbés qui peinent à se mouvoir."
        it:
          scarlet: "Vivere in terreni molto fangosi e viscosi gli ha\npermesso di allenare col tempo gli arti inferiori,\nche sono diventati estremamente robusti."
          violet: "Dà il meglio di sé nei terreni fangosi, dove\napprofitta della mobilità ridotta degli avversari\nper sopraffarli in un attimo."
        de:
          scarlet: "Das Leben auf schlammigen Böden ohne festen\nHalt hat seine Beine gestählt und ihnen gewaltige\nKraft verliehen."
          violet: "Auf instabilem, schlammigem Untergrund kann es\nsein wahres Potenzial entfalten. Feststeckende\nGegner überwältigt es im Handumdrehen."
        es:
          scarlet: "Vive en terrenos cubiertos de lodo viscoso, lo\nque contribuye a que sus patas se fortalezcan\ny se vuelvan extremadamente robustas."
          violet: "Está en su salsa en terrenos lodosos, donde\naprovecha la reducida movilidad de sus rivales\npara someterlos en un abrir y cerrar de ojos."
        ko:
          scarlet: "걸쭉하게 질퍽거리는 땅을\n밟으며 생활하기 때문에\n팔다리가 단련되어 강인해졌다."
          violet: "질퍽거리는 곳에서 진가를 드러낸다.\n제대로 움직일 수 없는 상대를\n단숨에 몰아붙인다."
        zh_simp:
          scarlet: "生活在粘稠泥泞的地上，\n久而久之就锻炼出了强韧的腰腿。"
          violet: "在泥泞的场地上能\n发挥出真本领。会一口气把\n无法动弹的对手逼入绝境。"
        zh_trad:
          scarlet: "生活在黏稠泥濘的地上，\n久而久之鍛鍊出了\n強韌的下盤。"
          violet: "在泥濘的地上更能發揮\n真本事。會把無法動彈的\n對手一口氣逼入絕境。"
