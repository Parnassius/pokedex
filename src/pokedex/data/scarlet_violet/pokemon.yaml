      descriptions:
        jp_kana:
          scarlet: "￹眠￺ねむ￻っているときでも　￹動￺うご￻くものが\n￹近￺ちか￻づくと　￹毒針￺どくばり￻が　￹無意識￺むいしき￻に\n￹反応￺はんのう￻し　￹突￺つ￻き￹刺￺さ￻してくるぞ。"
          violet: "￹凶暴￺きょうぼう￻で　￹気性￺きしょう￻が　￹荒￺あら￻い。\n￹毒針￺どくばり￻の　￹先端￺せんたん￻は　ギザギザで\n￹刺￺さ￻さると　￹簡単￺かんたん￻には　￹抜￺ぬ￻けない。"
        jp_kanji:
          scarlet: "￹眠￺ねむ￻っているときでも　￹動￺うご￻くものが\n￹近￺ちか￻づくと　￹毒針￺どくばり￻が　￹無意識￺むいしき￻に\n￹反応￺はんのう￻し　￹突￺つ￻き￹刺￺さ￻してくるぞ。"
          violet: "￹凶暴￺きょうぼう￻で　￹気性￺きしょう￻が　￹荒￺あら￻い。\n￹毒針￺どくばり￻の　￹先端￺せんたん￻は　ギザギザで\n￹刺￺さ￻さると　￹簡単￺かんたん￻には　￹抜￺ぬ￻けない。"
        en:
          scarlet: "Overqwil’s poisonous spikes will reflexively react\neven while Overqwil sleeps, stabbing any moving\nthing that approaches."
          violet: "It’s ferocious and has a short temper. The ends of\nits spikes are barbed, and they can’t be easily\nremoved once they’ve punctured something."
        fr:
          scarlet: "Même quand il dort, ses épines empoisonnées\nréagissent par réflexe à tout ce qui bouge et\ntranspercent quiconque s’approche de trop près."
          violet: "Ce Pokémon est féroce et impulsif. Ses épines\nempoisonnées ont des extrémités dentelées.\nUne fois plantées, elles sont difficiles à retirer."
        it:
          scarlet: "Qualunque cosa gli si avvicini viene trafitta\ndai suoi aculei velenosi, che reagiscono\nper riflesso anche mentre dorme."
          violet: "Ha un carattere feroce e violento.\nLe punte seghettate dei suoi aculei velenosi\nrendono difficile estrarli una volta conficcati."
        de:
          scarlet: "Selbst im Schlaf reagieren Myriadors Giftstacheln\nvon allein und spießen alles auf, was sich ihm\nnähert."
          violet: "Es ist ungestüm und brutal. Die Spitzen seiner\nGiftstacheln sind gezackt, wodurch sie sich\nnach einem Stich nur schwer entfernen lassen."
        es:
          scarlet: "Sus púas tóxicas reaccionan como acto reflejo\nante cualquier movimiento, por lo que ensartará\ntodo lo que se acerque incluso mientras duerme."
          violet: "Posee un carácter feroz y agresivo. Las puntas\nde sus púas venenosas son dentadas, por lo que\nno resulta fácil extraerlas una vez que se clavan."
        ko:
          scarlet: "잠들어 있는 동안에도 움직이는 물체가\n접근하면 독침이 무의식적으로\n반응해서 꿰뚫어 버린다."
          violet: "흉포하고 성질이 사납다.\n독침 끝에는 톱니가 있어서\n찔리면 쉽게 뽑히지 않는다."
        zh_simp:
          scarlet: "即使在睡着的时候，\n只要有会动的东西接近，\n毒针就会无意识地作出反应刺过去。"
          violet: "个性凶悍，性情粗暴。\n毒针尖端呈锯齿状，\n被刺中时无法轻易拔出。"
        zh_trad:
          scarlet: "即使是在睡覺的時候，\n只要有會動的東西靠近，\n毒針就會反射性地刺向對方。"
          violet: "凶狠且性格粗暴。\n毒針的前端呈鋸齒狀，\n被刺中就無法輕易拔出來。"
