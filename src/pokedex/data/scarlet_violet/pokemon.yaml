      descriptions:
        jp_kana:
          scarlet: "￹心￺こころ￻が　￹通￺かよ￻い￹合￺あ￻った　￹人￺ひと￻がいると\n￹柔￺やわ￻らかく　￹美￺うつく￻しい　￹羽￺はね￻で\nそっと　￹包￺つつ￻み￹込￺こ￻み　ハミングする。"
          violet: "￹晴￺は￻れた￹日￺ひ￻　￹綿雲￺わたぐも￻に　まぎれながら\n￹大空￺おおぞら￻を　￹自由￺じゆう￻に　￹飛￺と￻びまわり\n￹美￺うつく￻しい　ソプラノで　￹歌￺うた￻う。"
        jp_kanji:
          scarlet: "￹心￺こころ￻が　￹通￺かよ￻い￹合￺あ￻った　￹人￺ひと￻がいると\n￹柔￺やわ￻らかく　￹美￺うつく￻しい　￹羽￺はね￻で\nそっと　￹包￺つつ￻み￹込￺こ￻み　ハミングする。"
          violet: "￹晴￺は￻れた￹日￺ひ￻　￹綿雲￺わたぐも￻に　まぎれながら\n￹大空￺おおぞら￻を　￹自由￺じゆう￻に　￹飛￺と￻びまわり\n￹美￺うつく￻しい　ソプラノで　￹歌￺うた￻う。"
        en:
          scarlet: "If it bonds with a person, it will gently\nenvelop the friend with its soft wings,\nthen hum."
          violet: "On sunny days, it flies freely through\nthe sky and blends into the clouds.\nIt sings in a beautiful soprano."
        fr:
          scarlet: "Il enlace de ses magnifiques ailes cotonneuses\nles personnes qui lui sont chères et leur fredonne\ndes mélodies."
          violet: "Les jours de beau temps, il vole librement\nen se cachant dans les nuages et en chantant\nd’une jolie voix de soprano."
        it:
          scarlet: "Quando si affeziona a una persona,\nla avvolge nelle sue soffici ali e inizia\na canticchiare."
          violet: "Nelle belle giornate, ama volare nel\ncielo confondendosi tra le nuvole.\nCanta con una bellissima voce da soprano."
        de:
          scarlet: "Spürt es eine enge Verbindung zu jemandem,\numschließt es ihn mit seinen schönen, weichen\nFlügeln und summt dabei."
          violet: "Bei gutem Wetter mischt es sich unter die Wolken\nund fliegt unbeschwert durch die Lüfte. Es singt\nmit einer entzückenden Sopranstimme."
        es:
          scarlet: "Si establece un vínculo con una\npersona, la envuelve con sus alas\nsuaves y bellas y le canta en susurros."
          violet: "En días soleados, le gusta mezclarse\ncon las nubes y disfrutar de la libertad\ndel cielo mientras trina con voz de soprano."
        ko:
          scarlet: "마음이 서로 통한 사람이 있으면\n부드럽고 아름다운 날개로\n살짝 감싸고 허밍을 한다."
          violet: "맑은 날 뭉게구름에 뒤섞인 채로\n넓은 하늘을 자유롭게 날아다니며\n아름다운 소프라노로 노래한다."
        zh_simp:
          scarlet: "当它有了心意相通的人时，\n会用柔软又美丽的翅膀\n轻轻包裹对方并哼唱。"
          violet: "在晴朗日子里会混在棉花云里\n自由地在空中飞来飞去，\n会用优美的高音歌唱。"
        zh_trad:
          scarlet: "只要與牠心意相通的人在場，\n牠就會用柔軟的美麗翅膀\n輕輕包住對方，哼唱起旋律。"
          violet: "在晴朗的日子會混在雲朵中，\n自在地在空中來回飛行。\n會用美妙的高音歌唱。"
