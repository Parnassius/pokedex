      descriptions:
        jp_kana:
          scarlet: "￹砂漠￺さばく￻などの　￹過酷￺かこく￻な　￹環境￺かんきょう￻を　￹好￺この￻む。\n￹体内￺たいない￻に　￹蓄￺たくわ￻えた　￹水￺みず￻で\n３０￹日間￺にちかん￻　￹生￺い￻きられる。"
          violet: "￹雨￺あめ￻が　￹少￺すく￻ない　￹乾燥￺かんそう￻した\n￹地域￺ちいき￻に　￹生息￺せいそく￻。　１￹年￺ねん￻に　１￹回￺かい￻\n￹黄色￺きいろ￻の　￹花￺はな￻を　￹咲￺さ￻かせる。"
        jp_kanji:
          scarlet: "￹砂漠￺さばく￻などの　￹過酷￺かこく￻な　￹環境￺かんきょう￻を　￹好￺この￻む。\n￹体内￺たいない￻に　￹蓄￺たくわ￻えた　￹水￺みず￻で\n３０￹日間￺にちかん￻　￹生￺い￻きられる。"
          violet: "￹雨￺あめ￻が　￹少￺すく￻ない　￹乾燥￺かんそう￻した\n￹地域￺ちいき￻に　￹生息￺せいそく￻。　１￹年￺ねん￻に　１￹回￺かい￻\n￹黄色￺きいろ￻の　￹花￺はな￻を　￹咲￺さ￻かせる。"
        en:
          scarlet: "It prefers harsh environments, such as deserts.\nIt can survive for 30 days on water stored in\nits body."
          violet: "It lives in arid locations. Its yellow flowers bloom\nonce a year."
        fr:
          scarlet: "Ce Pokémon préfère les endroits hostiles, comme\nle désert. Il peut survivre trente jours grâce à\nl’eau emmagasinée dans son corps."
          violet: "Cacnea vit dans les zones arides. Une fois par an,\nune fleur jaune éclot sur sa tête."
        it:
          scarlet: "Predilige ambienti ostili come i deserti.\nGrazie all’acqua immagazzinata nel corpo,\npuò resistere 30 giorni senza bere."
          violet: "Vive in zone aride, dove non piove quasi mai.\nIl suo fiore giallo sboccia una volta all’anno."
        de:
          scarlet: "Es bevorzugt unwirtliche Gebiete wie Wüsten.\nDer Wasserspeicher in seinem Körper reicht für\nbis zu 30 Tage."
          violet: "Dieses Pokémon lebt an trockenen Orten mit\nwenig Niederschlag. Seine gelbe Blume blüht\nein Mal im Jahr."
        es:
          scarlet: "Prefiere entornos inhóspitos, como los desiertos.\nPuede sobrevivir 30 días sin beber gracias al\nagua que almacena en el interior de su cuerpo."
          violet: "Vive en regiones secas y con pocas lluvias.\nUna vez al año, le brota una flor amarilla."
        ko:
          scarlet: "사막 같은 혹독한 환경을 좋아한다.\n몸속에 축적된 물로 30일간 살 수 있다."
          violet: "비가 적은 건조한 지역에 서식한다.\n1년에 1번 노란 꽃을 피운다."
        zh_simp:
          scarlet: "喜欢沙漠之类的严酷环境。\n靠体内储存的水分可以生存３０天。"
          violet: "栖息在少雨的干燥地方。\n黄色的花朵\n１年绽放１次。"
        zh_trad:
          scarlet: "喜歡沙漠等嚴酷環境。\n能靠體內儲存的水分\n存活３０天。"
          violet: "棲息在乾燥少雨的地方。\n黃色的花朵每年綻放１次。"
