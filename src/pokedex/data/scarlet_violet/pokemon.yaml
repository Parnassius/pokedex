      descriptions:
        jp_kana:
          scarlet: "まれに　￹脱皮￺だっぴ￻し　ウロコが　￹剥￺は￻げる。\nその￹成分￺せいぶん￻が　￹含￺ふく￻まれる　￹薬￺くすり￻は\n￹疲￺つか￻れた　￹体￺からだ￻を　ギンギンにする。"
          violet: "￹光￺ひか￻り￹輝￺かがや￻く　ものが　￹大好￺だいす￻きで\n￹洞窟￺どうくつ￻の　￹中￺なか￻で　￹見￺み￻つけた\n￹宝￺たから￻を　￹自分￺じぶん￻の　￹巣￺す￻に　￹溜￺た￻めこむ。"
        jp_kanji:
          scarlet: "まれに　￹脱皮￺だっぴ￻し　ウロコが　￹剥￺は￻げる。\nその￹成分￺せいぶん￻が　￹含￺ふく￻まれる　￹薬￺くすり￻は\n￹疲￺つか￻れた　￹体￺からだ￻を　ギンギンにする。"
          violet: "￹光￺ひか￻り￹輝￺かがや￻く　ものが　￹大好￺だいす￻きで\n￹洞窟￺どうくつ￻の　￹中￺なか￻で　￹見￺み￻つけた\n￹宝￺たから￻を　￹自分￺じぶん￻の　￹巣￺す￻に　￹溜￺た￻めこむ。"
        en:
          scarlet: "In rare cases, it molts and sheds its scales.\nMedicine containing its scales as an ingredient\nwill make a weary body feel invigorated."
          violet: "It loves sparkly things. It seeks treasures in\ncaves and hoards the loot in its nest."
        fr:
          scarlet: "Lorsqu’il mue, il perd parfois ses écailles.\nLes remèdes concoctés à partir de celles-ci\nsont de puissants toniques."
          violet: "Toujours à la recherche d’objets brillants,\nil arpente les grottes pour amasser son butin."
        it:
          scarlet: "Fa la muta molto di rado. Con le scaglie perse\nin questo modo si possono preparare tonici che\nalleviano la stanchezza e ripristinano le energie."
          violet: "Adora gli oggetti luccicanti. Va a caccia\ndi tesori nelle grotte e li trasporta nel\nsuo nido."
        de:
          scarlet: "Ab und zu häutet es sich und verliert Schuppen.\nMedizin, die solche Schuppen enthält, macht\nmüde Körper munter."
          violet: "Es liebt funkelnde Dinge und sucht in Höhlen\nnach Schätzen, die es dann in seinem Nest hortet."
        es:
          scarlet: "Muy ocasionalmente puede mudar la piel y\nperder las escamas. Las medicinas que las usan\ncomo ingrediente son muy reconstituyentes."
          violet: "Le gustan las cosas brillantes. Busca tesoros en\ncuevas y se lleva el botín a su nido."
        ko:
          scarlet: "드물게 탈피해서 비늘이 벗겨진다.\n그 성분이 들어 있는 약은\n피곤한 몸을 회복시켜 준다."
          violet: "반짝반짝 빛나는 것을\n아주 좋아하기에 동굴 안에서 발견한\n보물을 자신의 둥지에 모아 둔다."
        zh_simp:
          scarlet: "偶尔蜕皮，鳞片会脱落。\n其成分中所含的药物成分\n可以让疲劳的身体活力四射。"
          violet: "最喜欢闪闪发光的东西，\n所以会把在洞窟里找到的宝贝\n都积存到自己的巢穴中。"
        zh_trad:
          scarlet: "偶爾脫皮，鱗片會脫落。\n含有其成分的藥可以\n讓疲勞的身體活力四射。"
          violet: "最喜歡閃閃發光的東西，\n所以會把在洞窟裡找到的寶物\n積存到自己的巢穴裡。"
