        jp_kana:
          scarlet: "￹鋭￺するど￻い　ツメや　キバで　￹獲物￺えもの￻を　￹襲￺おそ￻う。\n￹信頼￺しんらい￻する　トレーナーの　￹指示￺しじ￻には\n￹忠実￺ちゅうじつ￻に　￹従￺したが￻う。"
          violet: "￹冷静￺れいせい￻で　￹落￺お￻ち￹着￺つ￻いた　￹気質￺きしつ￻。\n￹素早￺すばや￻く　￹獲物￺えもの￻に　￹近￺ちか￻づくと\nたてがみの　￹岩￺いわ￻で　￹切￺き￻り￹裂￺さ￻くのだ。"
        jp_kanji:
          scarlet: "￹鋭￺するど￻い　ツメや　キバで　￹獲物￺えもの￻を　￹襲￺おそ￻う。\n￹信頼￺しんらい￻する　トレーナーの　￹指示￺しじ￻には\n￹忠実￺ちゅうじつ￻に　￹従￺したが￻う。"
          violet: "￹冷静￺れいせい￻で　￹落￺お￻ち￹着￺つ￻いた　￹気質￺きしつ￻。\n￹素早￺すばや￻く　￹獲物￺えもの￻に　￹近￺ちか￻づくと\nたてがみの　￹岩￺いわ￻で　￹切￺き￻り￹裂￺さ￻くのだ。"
        en:
          scarlet: "Lycanroc attacks its prey with its sharp claws and\nfangs. It loyally obeys the instructions of a Trainer\nit trusts."
          violet: "It has a calm and collected demeanor. It swiftly\ncloses in on its prey, then slices them with the\nrocks in its mane."
        fr:
          scarlet: "Il attaque ses proies à l’aide de ses griffes\net de ses crocs acérés. Il obéira toujours\nà son Dresseur s’il lui fait confiance."
          violet: "Ce Pokémon est d’un tempérament calme et\nréfléchi. Il s’approche de sa proie à toute vitesse,\npuis il la lacère grâce aux rocs de sa crinière."
        it:
          scarlet: "Caccia la sua preda usando le zanne e gli artigli\naffilatissimi. Ascolta fedelmente le indicazioni\ndegli Allenatori di cui si fida."
          violet: "Un Pokémon dal temperamento calmo e sereno.\nSi avvicina rapidamente alla preda e la colpisce\ncon la sua criniera di pietra."
        de:
          scarlet: "Es greift seine Beute mit scharfen Fangzähnen\nund Krallen an. Vertraut es einem Trainer, befolgt\nes treu dessen Anweisungen."
          violet: "Es ist von Natur aus ruhig und geht stets mit\nBedacht vor. Flink nähert es sich seiner Beute\nund schlitzt sie mit der scharfen Steinmähne auf."
        es:
          scarlet: "Ataca a sus presas con sus afilados colmillos\ny garras. Solo obedece las órdenes de aquellos\nEntrenadores que logran ganarse su confianza."
          violet: "Un Pokémon tranquilo y con nervios de acero.\nSe acerca rápidamente a sus presas y las hace\ntrizas con su melena de piedra."
        ko:
          scarlet: "날카로운 발톱과 이빨로 먹이를 공격한다.\n신뢰하는 트레이너의 지시에는\n충실히 따른다."
          violet: "냉정하고 침착한 성격.\n재빠르게 먹잇감에 접근한 다음\n갈기의 바위로 베어 가른다."
        zh_simp:
          scarlet: "会用尖爪和利牙袭击猎物。\n只要是信赖的训练家所下的\n指令，它都会忠诚地听从。"
          violet: "性情沉着冷静。\n会迅速地接近猎物，\n然后用鬃毛岩石将其击碎。"
        zh_trad:
          scarlet: "會用尖牙和利爪襲擊獵物。\n只要是信賴的訓練家下的\n指令，牠都會忠實地聽從。"
          violet: "性情沉著冷靜。\n會迅速地接近獵物，然後\n用鬃毛的岩石將其斬碎。"
