          violet: "￹目玉￺めだま￻に　￹見￺み￻えるが　じつは　お￹腹￺なか￻の\nへそダイナモで　￹作￺つく￻った　￹電気￺でんき￻を\n￹撃￺う￻ちだす　￹放電器官￺ほうでんきかん￻なのだ。"
        jp_kanji:
          scarlet: "ブヨンブヨンの　￹体￺からだ￻を　￹伸￺の￻び￹縮￺ちぢ￻み\nさせると　お￹腹￺なか￻の　へそダイナモが\n￹大電力￺だいでんりょく￻を　￹発生￺はっせい￻させる。"
          violet: "￹目玉￺めだま￻に　￹見￺み￻えるが　じつは　お￹腹￺なか￻の\nへそダイナモで　￹作￺つく￻った　￹電気￺でんき￻を\n￹撃￺う￻ちだす　￹放電器官￺ほうでんきかん￻なのだ。"
        en:
          scarlet: "When this Pokémon expands and contracts its\nwobbly body, the belly-button dynamo in its\nstomach produces a huge amount of electricity."
          violet: "What appear to be eyeballs are actually organs\nfor discharging the electricity generated by\nBellibolt’s belly-button dynamo."
        fr:
          scarlet: "Lorsque ce Pokémon allonge et contracte son\ncorps élastique, son nombril-dynamo produit\nune quantité d’électricité colossale."
          violet: "Ses organes semblables à des yeux\nservent à projeter l’électricité produite\npar son nombril-dynamo."
        it:
          scarlet: "Allunga e comprime il proprio corpo elastico\nper generare una gran quantità di elettricità\ncon la dinamo dell’ombelico."
          violet: "Quelli che sembrano bulbi oculari sono in realtà\ndegli organi in grado di scaricare l’energia\ngenerata dalla dinamo dell’ombelico."
        de:
          scarlet: "Dehnt und kontrahiert es seinen elastischen\nKörper, erzeugt der Nabeldynamo in seinem\nBauch große Mengen an Elektrizität."
          violet: "Was aussieht wie Augen, sind eigentlich Organe,\ndurch die es die Elektrizität entlädt, die es mit\ndem Nabeldynamo in seinem Bauch erzeugt hat."
        es:
          scarlet: "Puede generar grandes cantidades de energía\nexpandiendo y contrayendo su elástico cuerpo\ngracias a la dinamo de su ombligo."
          violet: "Los órganos que parecen ojos sirven en\nrealidad para descargar toda la electricidad\ngenerada por la dinamo de su ombligo."
        ko:
          scarlet: "말랑말랑한 몸을 늘였다 줄였다 하면\n배에 달린 배꼽 발전기가\n큰 전력을 발생시킨다."
          violet: "눈알처럼 보이는 것은 사실,\n배에 달린 배꼽 발전기로 만들어 낸\n전기를 발사하는 방전 기관이다."
        zh_simp:
          scarlet: "只要伸缩胖嘟嘟的身体，\n就能让肚子上的发电脐\n产生大量的电气。"
          violet: "看似眼球的部位其实是\n放电器官，能够用来发射\n腹部的发电脐所制造的电力。"
        zh_trad:
          scarlet: "只要伸縮肥嘟嘟的身體，\n就能讓肚子上的發電臍\n產生大量的電氣。"
          violet: "看似眼球的部位其實是\n放電器官，能夠用來發射\n腹部的發電臍製造的電力。"
