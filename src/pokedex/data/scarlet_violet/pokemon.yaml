          scarlet: "￹胸￺むね￻の　￹羽毛￺うもう￻と　￹抜￺ぬ￻け￹落￺お￻ちた　￹羽根￺はね￻で\n￹作￺つく￻った　￹袋￺ふくろ￻に　￹物￺もの￻を　￹入￺い￻れて\n￹高￺たか￻いところから　￹落￺お￻として　￹遊￺あそ￻ぶ。"
          violet: "￹胸元￺むなもと￻の　￹袋￺ふくろ￻で　エサを　￹包￺つつ￻み\n￹巣￺す￻に　￹持￺も￻ち￹帰￺かえ￻る。　￹大￺おお￻きな　￹音￺おと￻の\nするものを　￹落￺お￻として　￹喜￺よろこ￻ぶ。"
        jp_kanji:
          scarlet: "￹胸￺むね￻の　￹羽毛￺うもう￻と　￹抜￺ぬ￻け￹落￺お￻ちた　￹羽根￺はね￻で\n￹作￺つく￻った　￹袋￺ふくろ￻に　￹物￺もの￻を　￹入￺い￻れて\n￹高￺たか￻いところから　￹落￺お￻として　￹遊￺あそ￻ぶ。"
          violet: "￹胸元￺むなもと￻の　￹袋￺ふくろ￻で　エサを　￹包￺つつ￻み\n￹巣￺す￻に　￹持￺も￻ち￹帰￺かえ￻る。　￹大￺おお￻きな　￹音￺おと￻の\nするものを　￹落￺お￻として　￹喜￺よろこ￻ぶ。"
        en:
          scarlet: "It gathers things up in an apron made from shed\nfeathers added to the Pokémon’s chest feathers,\nthen drops those things from high places for fun."
          violet: "Bombirdier uses the apron on its chest to\nbundle up food, which it carries back to its nest.\nIt enjoys dropping things that make loud noises."
        fr:
          scarlet: "Il aime mettre des objets dans le tablier formé\nde plumes qui orne son poitrail, avant de les\nlarguer depuis une altitude élevée."
          violet: "Ce Pokémon transporte sa nourriture jusqu’à\nson nid grâce à son tablier. Il aime larguer des\nobjets qui s’écrasent avec fracas."
        it:
          scarlet: "Intreccia le piume cadute a quelle\ndel petto per creare un grembiule in cui\nmettere oggetti, che fa poi precipitare dall’alto."
          violet: "Usa il grembiule pettorale per trasportare cibo\nal nido. Si diverte a far precipitare oggetti che,\nschiantandosi, fanno un gran fracasso."
        de:
          scarlet: "Zum Spaß füllt es seine Schürze aus Brustgefieder\nund ausgefallenen Federn mit allerlei Dingen, nur\num diese von hoch oben wieder fallen zu lassen."
          violet: "Es wickelt Futter in seine Brustschürze und trägt\nes so heim ins Nest. Liebend gern lässt es Dinge\nherabfallen, die beim Aufprall Lärm verursachen."
        es:
          scarlet: "Mete cosas en su bolsa, fabricada con el plumón\nde su pecho y con plumas mudadas, para luego\ndejarlas caer desde las alturas por diversión."
          violet: "Usa la bolsa del pecho para envolver comida\ny transportarla a su nido. Le encanta dejar caer\nobjetos que hacen mucho ruido."
        ko:
          scarlet: "가슴의 깃털과 떨어진 깃털로 만든\n주머니에 물건을 넣고는\n높은 곳에서 떨어뜨리며 논다."
          violet: "가슴팍의 주머니에 먹이를 담아서\n둥지로 가져간다. 큰 소리가 나는 물건을\n떨어뜨리는 것을 즐긴다."
        zh_simp:
          scarlet: "用胸部的绒毛和脱落的羽毛\n做成袋子，然后把东西放进去，\n并从高处往下丢着玩耍。"
          violet: "会用胸口的袋子包住食物，\n然后带回巢里。以弄掉会\n发出响亮声音的东西为乐。"
        zh_trad:
          scarlet: "會把東西裝在用胸部的絨羽\n和脫落的羽毛做成的袋子裡，\n然後從高處往下丟來玩耍。"
          violet: "會用胸口的袋子包住食物，\n然後帶回巢裡。以弄掉會\n發出響亮聲音的東西為樂。"
