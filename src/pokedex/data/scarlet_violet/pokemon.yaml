      descriptions:
        jp_kana:
          scarlet: "１￹日￺にち￻　ずっと　エサを￹運￺はこ￻んでる。\n￹遭難￺そうなん￻した　￹人￺ひと￻が　デリバードの\nエサで　￹助￺たす￻かった　￹話￺はなし￻もある。"
          violet: "いつも　エサを　￹持￺も￻ち￹運￺はこ￻んでいる。\n￹襲￺おそ￻われると　￹身￺み￻を　￹守￺まも￻ろうとして\n￹持￺も￻っている　エサを　￹投￺な￻げつける。"
        jp_kanji:
          scarlet: "１￹日￺にち￻　ずっと　エサを￹運￺はこ￻んでる。\n￹遭難￺そうなん￻した　￹人￺ひと￻が　デリバードの\nエサで　￹助￺たす￻かった　￹話￺はなし￻もある。"
          violet: "いつも　エサを　￹持￺も￻ち￹運￺はこ￻んでいる。\n￹襲￺おそ￻われると　￹身￺み￻を　￹守￺まも￻ろうとして\n￹持￺も￻っている　エサを　￹投￺な￻げつける。"
        en:
          scarlet: "It carries food all day long. There are tales about\nlost people who were saved by the food it had."
          violet: "It always carries its food with it, wherever it goes.\nIf attacked, it throws its food at the opponent."
        fr:
          scarlet: "Il transporte de la nourriture toute la journée.\nSes réserves de vivres auraient sauvé la vie\nde nombreuses personnes en péril."
          violet: "Il a toujours de la nourriture sur lui.\nLorsqu’on l’attaque, il la jette sur\nson agresseur pour se protéger."
        it:
          scarlet: "Trasporta cibo per tutto il giorno. Si racconta\nche persone disperse o in difficoltà si siano\nsalvate grazie ai suoi viveri."
          violet: "Porta sempre del cibo con sé. Quando viene\nattaccato, getta i viveri contro l’avversario\nper difendersi."
        de:
          scarlet: "Es trägt immer Nahrung bei sich. Man sagt,\ndass viele Menschen in Not nur dank seiner\nEssensration überlebt hätten."
          violet: "Es trägt immer Nahrung bei sich. Wird es\nattackiert, wirft es diese nach dem Angreifer,\num sich zu schützen."
        es:
          scarlet: "Transporta comida durante todo el día. Según\ndicen, muchos desaparecidos han sobrevivido\ngracias a ella."
          violet: "Siempre lleva la comida consigo, vaya donde\nvaya. Si lo atacan, se la tirará a su adversario."
        ko:
          scarlet: "온종일 먹이를 운반한다.\n조난당한 사람이 딜리버드의\n먹이로 살아났다는 이야기도 있다."
          violet: "언제나 먹이를 가지고 다닌다.\n공격받으면 몸을 지키기 위해\n가지고 있는 먹이를 집어던진다."
        zh_simp:
          scarlet: "一整天都在搬运食物。\n据说曾有遇险的人因为\n信使鸟的食物而得救。"
          violet: "总是在搬运食物，\n遇到袭击时，会丢出身上\n带着的食物来保护自己。"
        zh_trad:
          scarlet: "一整天都在搬運食物。\n據說曾經有遇難的人因為\n信使鳥的食物而得救。"
          violet: "總是在搬運著食物。\n遭到襲擊時，會丟出身上\n帶著的食物來保護自己。"
