      descriptions:
        jp_kana:
          scarlet: "クチバシの￹中￺なか￻で　￹圧縮￺あっしゅく￻させた\nガスを　￹使￺つか￻い　￹撃￺う￻ちだす　￹木￺き￻のタネは\n￹大￺おお￻きな　￹岩￺いわ￻も　￹砕￺くだ￻く　￹威力￺いりょく￻。"
          violet: "￹番￺つが￻いの　ドデカバシは　クチバシの\n￹温度￺おんど￻を　￹上￺あ￻げて　￹温￺あたた￻めあうので\n￹仲良￺なかよ￻しの　シンボルと　されている。"
        jp_kanji:
          scarlet: "クチバシの￹中￺なか￻で　￹圧縮￺あっしゅく￻させた\nガスを　￹使￺つか￻い　￹撃￺う￻ちだす　￹木￺き￻のタネは\n￹大￺おお￻きな　￹岩￺いわ￻も　￹砕￺くだ￻く　￹威力￺いりょく￻。"
          violet: "￹番￺つが￻いの　ドデカバシは　クチバシの\n￹温度￺おんど￻を　￹上￺あ￻げて　￹温￺あたた￻めあうので\n￹仲良￺なかよ￻しの　シンボルと　されている。"
        en:
          scarlet: "The compressed gas in Toucannon’s beak\nlaunches seeds with such force that they can\nshatter large boulders."
          violet: "Pairs of Toucannon are considered symbols of\ncompanionship, as these Pokémon will raise the\ntemperature of their beaks to warm each other."
        fr:
          scarlet: "Le gaz comprimé dans son bec lui permet\nde cracher des pépins avec une telle puissance\nque ces derniers peuvent briser de gros rochers."
          violet: "Les couples de Bazoucan se réchauffent en\nfaisant monter la température de leurs becs.\nIls incarnent la complicité."
        it:
          scarlet: "Sfruttando il gas compresso all’interno del becco,\nspara semi con una potenza tale da frantumare\nanche un macigno."
          violet: "Le coppie di Toucannon si scaldano a vicenda\naumentando la temperatura del becco, perciò\nsono considerate simbolo di intesa reciproca."
        de:
          scarlet: "Durch das komprimierte Gas in seinem Schnabel\nverschießt es Samen mit einer Wucht, die selbst\ngroße Felsen zerschmettern kann."
          violet: "Tukanon-Pärchen erhöhen die Temperatur ihrer\nSchnäbel, um sich gegenseitig zu wärmen.\nDaher gelten sie als Symbol für Harmonie."
        es:
          scarlet: "Usando el gas a presión del interior de su pico,\npuede disparar semillas con fuerza suficiente\ncomo para pulverizar rocas enormes."
          violet: "Las parejas de Toucannon son todo un símbolo\nde buena avenencia, pues se dan calor de forma\nrecíproca aumentando la temperatura del pico."
        ko:
          scarlet: "부리 안에 압축된 가스를 사용해서\n발사하는 씨앗은\n커다란 바위도 분쇄하는 위력을 자랑한다."
          violet: "짝을 이룬 왕큰부리는 부리의\n온도를 높여서 서로를 따뜻하게 하기에\n친화의 상징으로 여겨지고 있다."
        zh_simp:
          scarlet: "利用在鸟嘴中压缩的气体\n喷射出的树的种子，\n威力甚至能击碎巨大的岩石。"
          violet: "成双成对的铳嘴大鸟会通过\n提高鸟嘴的温度来互相取暖，\n因此被视为是感情好的象征。"
        zh_trad:
          scarlet: "會利用在鳥嘴裡壓縮的氣體\n發射出樹的種子，其威力甚至\n能把巨大的石頭弄得粉碎。"
          violet: "成對的銃嘴大鳥會提高\n鳥嘴的溫度來互相取暖，\n因此被視為是感情融洽的象徵。"
