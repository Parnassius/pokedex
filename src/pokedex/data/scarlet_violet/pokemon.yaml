        jp_kanji:
          scarlet: "ピカチュウが　かぶる　￹帽子￺ぼうし￻には\n￹相棒￺あいぼう￻と　たくさんの　￹地方￺ちほう￻を\n￹旅￺たび￻した　￹思￺おも￻い￹出￺で￻が　つまっている。"
          violet: "かぶっている　パートナーの　￹帽子￺ぼうし￻は\nたくさんの　￹地方￺ちほう￻を　￹冒険￺ぼうけん￻して\n￹深￺ふか￻めた　￹絆￺きずな￻の　あかしである。"
        en:
          scarlet: "The cap this Pikachu wears is filled with memories\nof this Pokémon and its partner traveling across\nlots of different regions together."
          violet: "This Pikachu wears its partner’s cap—proof of\nthe strong bond Pikachu and its partner formed\nduring adventures across many different regions."
        fr:
          scarlet: "La casquette que porte ce Pikachu est chargée\nde souvenirs de ses aventures dans de nombreuses\nrégions aux côtés de son partenaire."
          violet: "Ce Pikachu porte la casquette de son partenaire.\nElle symbolise les liens étroits qu’ils ont tissés\nlors de leurs aventures à travers diverses régions."
        it:
          scarlet: "Il cappello che Pikachu indossa gli ricorda\ni viaggi fatti con il suo inseparabile compagno\nin varie regioni."
          violet: "Il cappello che indossa è segno del profondo\nlegame instaurato con il suo inseparabile amico\ndurante le loro avventure in varie regioni."
        de:
          scarlet: "Die Kappe, die dieses Pikachu trägt, steckt voller\nErinnerungen an die gemeinsame Reise mit seinem\nPartner durch viele verschiedene Regionen."
          violet: "Es trägt die Kappe seines Partners. Sie zeugt von\nder Freundschaft, die sie auf ihren Abenteuern in\nvielen Regionen vertieft haben."
        es:
          scarlet: "La gorra que lleva este Pikachu está cargada de\ngratos recuerdos de los viajes que compartió con\nsu compañero por numerosas regiones."
          violet: "La gorra que lleva de su compañero simboliza\nlos lazos afectivos que estrecharon durante las\naventuras compartidas por numerosas regiones."
        ko:
          scarlet: "피카츄가 쓰고 있는 모자에는\n파트너와 함께 여러 지방을\n여행한 추억이 담겨 있다."
          violet: "쓰고 있는 파트너의 모자는\n여러 지방을 모험하며 깊어진\n유대의 증표이기도 하다."
        zh_simp:
          scarlet: "皮卡丘戴着的帽子\n承载着许许多多和搭档\n在许多地区冒险的回忆。"
          violet: "它所戴的这顶伙伴的帽子，\n是它与伙伴在许多地区\n冒险而加深了牵绊的证明。"
        zh_trad:
          scarlet: "皮卡丘戴著的帽子\n承載著許許多多和搭檔\n在各個地區冒險的回憶。"
          violet: "牠戴著的這頂夥伴的帽子，\n是與夥伴在許多地區冒險\n而加深了牽絆的證明。"
