      egg_groups:
        - field
      abilities:
        - aroma_veil
        - gluttony
      hidden_ability: thick_fat
      descriptions:
        jp_kana:
          scarlet: "￹花￺はな￻のような　￹香￺かお￻りを　￹振￺ふ￻りまく。\n￹筋肉￺きんにく￻が　￹発達￺はったつ￻した　￹脚￺あし￻は\n￹軽￺かる￻く　５メートルを　￹飛￺と￻び￹越￺こ￻える。"
          violet: "きれい￹好￺ず￻きで　￹几帳面￺きちょうめん￻。\nフローラルな　￹香￺かお￻りを　まとって\nまわりの　ポケモンたちを　￹癒￺いや￻す。"
        jp_kanji:
          scarlet: "￹花￺はな￻のような　￹香￺かお￻りを　￹振￺ふ￻りまく。\n￹筋肉￺きんにく￻が　￹発達￺はったつ￻した　￹脚￺あし￻は\n￹軽￺かる￻く　５メートルを　￹飛￺と￻び￹越￺こ￻える。"
          violet: "きれい￹好￺ず￻きで　￹几帳面￺きちょうめん￻。\nフローラルな　￹香￺かお￻りを　まとって\nまわりの　ポケモンたちを　￹癒￺いや￻す。"
        en:
          scarlet: "This Pokémon sends a flowerlike scent wafting\nabout. Well-developed muscles in its legs allow it\nto leap more than 16 feet with no trouble at all."
          violet: "This is a meticulous Pokémon that likes to keep\nthings tidy. It shrouds itself in a floral aroma that\nsoothes the Pokémon around it."
        fr:
          scarlet: "Il dégage un agréable parfum fleuri. Les muscles\nbien développés de ses jambes lui permettent de\nsauter des obstacles de cinq mètres avec aisance."
          violet: "Ce Pokémon méticuleux aime la propreté.\nIl est enveloppé d’un parfum floral qui rassérène\nles Pokémon alentour."
        it:
          scarlet: "Emana un profumo simile a quello dei fiori.\nPuò spiccare facilmente salti di oltre cinque metri\ngrazie alle zampe dai muscoli ben sviluppati."
          violet: "È un Pokémon metodico che ama la pulizia.\nSi avvolge nel suo profumo floreale che calma\ni Pokémon che ha intorno."
        de:
          scarlet: "Es verbreitet ein blumiges Aroma. Mit seinen gut\nausgebildeten Beinmuskeln kann es leicht über\n5 m weit springen."
          violet: "Dieses Pokémon ist penibel und liebt Sauberkeit.\nEs hüllt sich in einen blumigen Duft, der Pokémon\nin seiner Umgebung beruhigt."
        es:
          scarlet: "Desprende una fragancia floral. Puede saltar\nmás de 5 m fácilmente gracias a los músculos\ntan desarrollados de sus patas."
          violet: "Un Pokémon meticuloso que adora la\npulcritud. Se envuelve de una fragancia floral\nque calma a los Pokémon de su alrededor."
        ko:
          scarlet: "꽃향기 같은 향기를 흩뿌린다.\n근육이 발달한 다리는\n5m도 가볍게 뛰어넘을 수 있다."
          violet: "깔끔한 것을 좋아하고 꼼꼼하다.\n꽃향기 같은 향기를 풍기며\n주위의 포켓몬들을 치유한다."
        zh_simp:
          scarlet: "会释放出如花般的香气。\n肌肉发达的腿可以\n轻而易举地跳过５米高。"
          violet: "喜欢干净，个性一丝不苟。\n会让花香包裹全身\n来治愈周围的宝可梦们。"
        zh_trad:
          scarlet: "會釋放出如花般的香氣。\n腿部肌肉發達，要跳超過\n５公尺高也是輕而易舉。"
          violet: "喜好乾淨，個性一絲不苟。\n會讓花香包覆全身\n來療癒周圍的寶可夢們。"
