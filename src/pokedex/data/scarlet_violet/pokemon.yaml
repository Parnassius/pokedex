      descriptions:
        jp_kana:
          scarlet: "￹極寒￺ごっかん￻の　￹山岳地￺さんがくち￻で　￹暮￺く￻らすが\nまれに　クレベースの　￹背中￺せなか￻に　￹乗￺の￻り\n￹海￺うみ￻を　￹渡￺わた￻って　￹棲￺す￻み￹処￺か￻を　￹変￺か￻える。"
          violet: "マイナス１００￹度￺ど￻の　￹冷気￺れいき￻で　￹作￺つく￻る\n￹氷￺こおり￻で　￹体￺からだ￻を　￹覆￺おお￻い　￹守￺まも￻る。\nセビエと　￹出￺で￻くわすと　ケンカになる。"
        jp_kanji:
          scarlet: "￹極寒￺ごっかん￻の　￹山岳地￺さんがくち￻で　￹暮￺く￻らすが\nまれに　クレベースの　￹背中￺せなか￻に　￹乗￺の￻り\n￹海￺うみ￻を　￹渡￺わた￻って　￹棲￺す￻み￹処￺か￻を　￹変￺か￻える。"
          violet: "マイナス１００￹度￺ど￻の　￹冷気￺れいき￻で　￹作￺つく￻る\n￹氷￺こおり￻で　￹体￺からだ￻を　￹覆￺おお￻い　￹守￺まも￻る。\nセビエと　￹出￺で￻くわすと　ケンカになる。"
        en:
          scarlet: "They live in mountainous regions of frigid cold.\nOn rare occasions, they ride on the back of an\nAvalugg to cross seas and move to new habitats."
          violet: "Bergmite protects itself by coating its body in ice\nformed by frigid air of −148 degrees Fahrenheit.\nIt fights with Frigibax whenever they meet."
        fr:
          scarlet: "Ce Pokémon vit dans les régions montagneuses\nles plus froides, mais parfois, il traverse la mer\nà dos de Séracrawl pour changer d’habitat."
          violet: "Il recouvre son corps d’une couche de glace\nprotectrice créée par son souffle à -100 °C. S’il\ncroise un Frigodo, une bagarre éclate."
        it:
          scarlet: "Questo Pokémon vive in gelide regioni montane,\nma di tanto in tanto sale in groppa a un Avalugg\ne attraversa i mari per cambiare habitat."
          violet: "Si protegge coprendosi con il ghiaccio formato\ncon aria a -100 ºC. Se incappa in un Frigibax,\ni due si lanciano immediatamente in una zuffa."
        de:
          scarlet: "Es lebt in extrem kalten Berggebieten, überquert\naber manchmal auf dem Rücken von Arktilas das\nMeer, um den Lebensraum zu wechseln."
          violet: "Mit −100 ℃ kalter Luft erschafft es sich einen\nschützenden Eispanzer. Trifft es auf Frospino,\nkommt es zu Streit."
        es:
          scarlet: "Vive en zonas montañosas extremadamente frías,\npero en raras ocasiones migra cruzando el mar a\nlomos de un Avalugg."
          violet: "Exhala vaho a -100 ºC para envolver su cuerpo\ncon una capa de hielo protectora. Si se topa con\nun Frigibax, no dudará en pelear contra él."
        ko:
          scarlet: "혹한의 산악 지대에 살지만\n드물게 크레베이스의 등에 올라\n바다를 건너 거처를 옮기기도 한다."
          violet: "영하 100도의 냉기로 만든\n얼음으로 몸을 감싸서 보호한다.\n드니차와 마주치면 싸우게 된다."
        zh_simp:
          scarlet: "栖息在严寒的山岳地带。\n偶尔会乘坐在冰岩怪背上\n越过大海，更换居处。"
          violet: "会用零下１００度的寒气制冰\n来覆盖在身上保护自己。\n如果遇上凉脊龙就会大打出手。"
        zh_trad:
          scarlet: "棲息在嚴寒的山岳地帶，\n但偶爾會坐在冰岩怪的背上\n越過大海，換到其他地方住。"
          violet: "會用零下１００度的寒氣製冰\n來覆蓋在身上保護自己。\n如果遇上涼脊龍就會大打出手。"
