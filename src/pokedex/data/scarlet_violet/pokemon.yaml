      descriptions:
        jp_kana:
          scarlet: "￹胴体￺どうたい￻の　ほとんどが　￹胃袋￺いぶくろ￻。\n￹毎日￺まいにち￻　￹同￺おな￻じ　ルートを　うろつき\n￹新鮮￺しんせん￻な　エサを　￹探￺さが￻してまわる。"
          violet: "￹起￺お￻きている　あいだは　つねに　エサを\n￹探￺さが￻し￹続￺つづ￻ける。　￹腹￺はら￻が　￹減￺へ￻ると\n￹凶暴￺きょうぼう￻さに　￹磨￺みが￻きが　かかる。"
        jp_kanji:
          scarlet: "￹胴体￺どうたい￻の　ほとんどが　￹胃袋￺いぶくろ￻。\n￹毎日￺まいにち￻　￹同￺おな￻じ　ルートを　うろつき\n￹新鮮￺しんせん￻な　エサを　￹探￺さが￻してまわる。"
          violet: "￹起￺お￻きている　あいだは　つねに　エサを\n￹探￺さが￻し￹続￺つづ￻ける。　￹腹￺はら￻が　￹減￺へ￻ると\n￹凶暴￺きょうぼう￻さに　￹磨￺みが￻きが　かかる。"
        en:
          scarlet: "Its stomach fills most of its torso. It wanders the\nsame path every day, searching for fresh food."
          violet: "It spends its waking hours searching endlessly for\nfood. When Yungoos is hungry, its ferocity gains\na certain edge."
        fr:
          scarlet: "Son estomac occupe la plus grande partie de\nson corps. Chaque jour, il parcourt le même trajet\net déambule en quête de nourriture fraîche."
          violet: "Lorsqu’il est éveillé, il est constamment\nà la recherche de nourriture. Plus il a faim,\nplus il devient féroce."
        it:
          scarlet: "Lo stomaco occupa la maggior parte del suo\ncorpo. Segue ogni giorno lo stesso\npercorso in cerca di cibo fresco."
          violet: "Trascorre ogni ora della sua veglia in cerca di\ncibo. Quando ha fame, la sua ferocia diventa\nancora più terribile."
        de:
          scarlet: "Sein Magen füllt beinahe seinen ganzen Körper\naus. Auf der Suche nach frischem Futter schlägt\nes täglich denselben Pfad ein."
          violet: "Wenn es nicht gerade schläft, ist es ständig auf\nder Suche nach Nahrung. Hat es Hunger, nimmt\nseine Grausamkeit zu."
        es:
          scarlet: "El estómago le ocupa gran parte del cuerpo.\nSigue la misma ruta todos los días, deambulando\nsin cesar en busca de alimento fresco."
          violet: "Busca alimento sin cesar mientras está despierto.\nCuando tiene hambre, se vuelve aún más feroz."
        ko:
          scarlet: "몸의 대부분이 위장이다.\n매일 같은 경로를 배회하며\n신선한 먹이를 찾는다."
          violet: "일어나 있는 동안에는 계속해서\n먹이를 찾아다닌다.\n배가 고프면 흉포함이 더해진다."
        zh_simp:
          scarlet: "整个躯体几乎都是胃。\n每天都在固定的路线上\n四处寻找新鲜的食物。"
          violet: "醒着的时候总是在持续觅食。\n一旦肚子饿了就会\n变得更加地凶暴。"
        zh_trad:
          scarlet: "整個身體幾乎都是胃。\n每天都徘徊在固定的路線上，\n四處尋找新鮮的食物。"
          violet: "醒著的時候總是不停地\n在覓食。一旦肚子餓了\n就會變得更加地凶暴。"
