          violet: "￹死￺し￻んだ　￹子供￺こども￻の　￹魂￺たましい￻が\n￹切￺き￻り￹株￺かぶ￻に　￹宿￺やど￻った　ポケモン。\n￹森￺もり￻を　さまよい　￹仲間￺なかま￻を　￹探￺さが￻す。"
        jp_kanji:
          scarlet: "￹緑￺みどり￻の　￹葉￺は￻っぱは　￹万病￺まんびょう￻に\n￹効￺き￻くという　￹言￺い￻い￹伝￺つた￻えが　あるが\n￹摘￺つ￻みとれば　たちまち　￹枯￺か￻れてしまう。"
          violet: "￹死￺し￻んだ　￹子供￺こども￻の　￹魂￺たましい￻が\n￹切￺き￻り￹株￺かぶ￻に　￹宿￺やど￻った　ポケモン。\n￹森￺もり￻を　さまよい　￹仲間￺なかま￻を　￹探￺さが￻す。"
        en:
          scarlet: "Legend tells that its green leaves can cure any\nillness. When plucked, however, the leaves will\ninstantly wither away."
          violet: "This Pokémon came to be when the spirit of a\ndeceased child possessed a tree stump. It now\nwanders the forest searching for friends."
        fr:
          scarlet: "On raconte que ses feuilles vertes sont\nune panacée, mais celles-ci flétrissent\nsitôt cueillies."
          violet: "Ce Pokémon est une souche d’arbre possédée\npar l’âme d’un enfant mort. Il erre dans la forêt\nà la recherche d’amis."
        it:
          scarlet: "Si crede che le sue foglie verdi curino ogni\nmale ma, appena colte, queste si seccano."
          violet: "Pokémon nato quando il ceppo di un albero\nè stato posseduto dall’anima di un bambino\ndefunto. Vaga per i boschi in cerca di amici."
        de:
          scarlet: "Seine grünen Blätter sollen als Allheilmittel\nwirken, doch wenn man sie pflückt, verwelken\nsie sofort."
          violet: "Es entstand, als sich die Seele eines verstorbenen\nKindes in einem Baumstumpf einnistete. Auf der\nSuche nach Freunden durchstreift es den Wald."
        es:
          scarlet: "Se cree que las hojillas verdes que le crecen\npueden curar toda afección, pero se marchitan\nal instante si alguien las arranca."
          violet: "Este Pokémon nace cuando el alma de un niño\nfallecido pasa a habitar un tocón. Vaga por el\nbosque en busca de amigos."
        ko:
          scarlet: "녹색 잎사귀는\n만병에 듣는다는 전승이 있으나\n따자마자 금방 시들어 버린다."
          violet: "죽은 아이의 영혼이\n그루터기에 깃든 포켓몬.\n숲을 떠돌며 동료를 찾는다."
        zh_simp:
          scarlet: "传说它绿色的树叶能治百病。\n可一旦摘下来便会马上枯萎。"
          violet: "死去的孩子的魂魄附在\n树桩上，变成了宝可梦。\n会徘徊在森林中寻找伙伴。"
        zh_trad:
          scarlet: "傳說牠的綠色樹葉\n有治百病的效果，\n但摘下後會立刻枯萎。"
          violet: "死去的孩子的靈魂附在\n樹樁上，變成了寶可夢。\n會徘徊在森林裡尋找夥伴。"
