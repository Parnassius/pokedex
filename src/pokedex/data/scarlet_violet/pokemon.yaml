      descriptions:
        jp_kana:
          scarlet: "￹進化￺しんか￻するとき　￹体￺からだ￻の　￹細胞￺さいぼう￻に\n￹繊細￺せんさい￻な　￹揺￺ゆ￻れが　￹発生￺はっせい￻したため\n￹甘酸￺あまず￻っぱい　フレーバーと　なった。"
          violet: "￹敵￺てき￻に　￹襲￺おそ￻われると　￹甘酸￺あまず￻っぱい\nフレーバーが　アクセントの\nクリームを　￹投￺な￻げつけて　￹反撃￺はんげき￻。"
        jp_kanji:
          scarlet: "￹進化￺しんか￻するとき　￹体￺からだ￻の　￹細胞￺さいぼう￻に\n￹繊細￺せんさい￻な　￹揺￺ゆ￻れが　￹発生￺はっせい￻したため\n￹甘酸￺あまず￻っぱい　フレーバーと　なった。"
          violet: "￹敵￺てき￻に　￹襲￺おそ￻われると　￹甘酸￺あまず￻っぱい\nフレーバーが　アクセントの\nクリームを　￹投￺な￻げつけて　￹反撃￺はんげき￻。"
        en:
          scarlet: "Slight vibrations shook its cells when it evolved,\ngiving it a sweet and tart flavor."
          violet: "When attacked, it strikes back by throwing cream\naccented with sweet and tart flavors."
        fr:
          scarlet: "Lors de son évolution, les cellules de son corps\nont été délicatement secouées, ce qui lui a\ndonné une saveur à la fois sucrée et acide."
          violet: "Quand on l’attaque, ce Pokémon réplique\nen projetant une crème d’une saveur\nà la fois sucrée et acide."
        it:
          scarlet: "Al momento dell’evoluzione, si è generata\nnelle sue cellule una lieve vibrazione che gli\nha conferito un sapore agrodolce."
          violet: "Quando viene assalito da un nemico,\ncontrattacca lanciando della panna\ndalle note agrodolci."
        de:
          scarlet: "Bei der Entwicklung kam es zu einer subtilen\nDurchmischung seiner Körperzellen, wodurch es\neinen süßsauren Geschmack angenommen hat."
          violet: "Es wehrt sich gegen Angreifer, indem es sie mit\nseiner süßsauer schmeckenden Sahne bewirft."
        es:
          scarlet: "A causa de unas sutiles vibraciones en las células\nde su cuerpo en el momento de la evolución, ha\nadquirido un sabor agridulce."
          violet: "Cuando se ve amenazado, se defiende lanzando\na sus agresores una nata con un toque agridulce."
        ko:
          scarlet: "진화하는 순간 몸의 세포에\n미세한 떨림이 발생하여\n달콤새큼한 맛이 되었다."
          violet: "적에게 공격받으면\n달콤새큼한 맛이 도드라지는\n크림을 던져서 반격한다."
        zh_simp:
          scarlet: "因为进化时体内的细胞\n产生了细微的变化，\n所以形成了酸甜的风味。"
          violet: "一旦遭到敌人袭击，就会\n投掷突出了酸甜风味的\n鲜奶油进行反击。"
