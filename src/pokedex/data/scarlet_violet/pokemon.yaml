          scarlet: "￹尻尾￺しっぽ￻の　￹脳￺のう￻は　とても　￹小￺ちい￻さいが\n￹強力￺きょうりょく￻な　エスパーパワーを\n￹発揮￺はっき￻する　￹大事￺だいじ￻な　￹器官￺きかん￻なのだ。"
          violet: "￹尻尾￺しっぽ￻にも　￹小￺ちい￻さな　￹頭￺あたま￻がある。\n￹背後￺はいご￻から　￹近￺ちか￻づく　￹敵￺てき￻がいると\n￹本能的￺ほんのうてき￻に　￹噛￺か￻みついてくる。"
        jp_kanji:
          scarlet: "￹尻尾￺しっぽ￻の　￹脳￺のう￻は　とても　￹小￺ちい￻さいが\n￹強力￺きょうりょく￻な　エスパーパワーを\n￹発揮￺はっき￻する　￹大事￺だいじ￻な　￹器官￺きかん￻なのだ。"
          violet: "￹尻尾￺しっぽ￻にも　￹小￺ちい￻さな　￹頭￺あたま￻がある。\n￹背後￺はいご￻から　￹近￺ちか￻づく　￹敵￺てき￻がいると\n￹本能的￺ほんのうてき￻に　￹噛￺か￻みついてくる。"
        en:
          scarlet: "Though very small, the brain in its tail is still\nconsidered an important organ because it emits\npowerful psychic energy."
          violet: "Girafarig’s tail has a small head. It instinctively\nbites at any foe that approaches the Pokémon\nfrom behind."
        fr:
          scarlet: "Le cerveau de sa queue a beau être très petit,\nil n’en reste pas moins un organe vital doté\nd’immenses pouvoirs psychiques."
          violet: "Girafarig a une autre petite tête sur sa queue\nqui mord instinctivement les ennemis qui\ns’approchent par l’arrière."
        it:
          scarlet: "Il cervello nella coda è molto piccolo, ma è\nun organo importante dotato di forti poteri\npsichici."
          violet: "Ha una piccola testa anche sulla coda. Se un\nnemico gli si avvicina da dietro, lo prende\nistintivamente a morsi."
        de:
          scarlet: "Das Gehirn in seinem Schweif ist zwar winzig,\nstellt jedoch ein wichtiges Organ dar, da es\nmächtige Psycho-Kräfte freisetzt."
          violet: "An seinem Schweif befindet sich ein kleiner Kopf.\nDieser beißt instinktiv zu, wenn sich dem\nPokémon ein Feind von hinten nähert."
        es:
          scarlet: "El minúsculo cerebro que tiene en la cola es\nen realidad un órgano importante dotado de\npotentes poderes psíquicos."
          violet: "Tiene una cabeza pequeña en la cola que\nreacciona de forma instintiva mordiendo a los\nenemigos que intentan acercarse por la espalda."
        ko:
          scarlet: "꼬리의 뇌는 매우 작지만\n강력한 에스퍼 파워를 발휘하는\n중요한 장기다."
          violet: "꼬리에도 작은 머리가 있다.\n배후에서 접근하는 적이 있으면\n본능적으로 물어 버린다."
        zh_simp:
          scarlet: "尾巴上的脑袋虽然很小，\n但却是可以发挥出\n强大超能力的重要器官。"
          violet: "尾巴上有小小的头。\n如果有敌人从背后靠近，\n就会受本能驱使地咬过去。"
        zh_trad:
          scarlet: "尾巴上的腦雖然很小，\n但卻是可以發揮出\n強大超能力的重要器官。"
          violet: "尾巴上也有小小顆的頭。\n如果有敵人從背後靠近，\n就會受本能驅使一咬而上。"
