          scarlet: "￹巨大￺きょだい￻な　￹岩石￺がんせき￻も　￹粉々￺こなごな￻に　￹砕￺くだ￻く\n￹超音波￺ちょうおんぱ￻を　￹発￺はっ￻する。\n￹残忍￺ざんにん￻な　￹性質￺せいしつ￻の　ポケモン。"
          violet: "￹暗闇￺くらやみ￻の　￹中￺なか￻では　サザンドラすら\n￹恐￺おそ￻れる　￹存在￺そんざい￻。　￹明￺あか￻るいうちは\nオンバーンが　￹戦￺たたか￻いを　￹避￺さ￻ける。"
        jp_kanji:
          scarlet: "￹巨大￺きょだい￻な　￹岩石￺がんせき￻も　￹粉々￺こなごな￻に　￹砕￺くだ￻く\n￹超音波￺ちょうおんぱ￻を　￹発￺はっ￻する。\n￹残忍￺ざんにん￻な　￹性質￺せいしつ￻の　ポケモン。"
          violet: "￹暗闇￺くらやみ￻の　￹中￺なか￻では　サザンドラすら\n￹恐￺おそ￻れる　￹存在￺そんざい￻。　￹明￺あか￻るいうちは\nオンバーンが　￹戦￺たたか￻いを　￹避￺さ￻ける。"
        en:
          scarlet: "Ultrasonic waves emitted by a Noivern\ncan pulverize a large boulder. This\nPokémon has a cruel disposition."
          violet: "In the dark, even Hydreigon are terrified\nof this Pokémon. But in the light, Noivern\nis the one that avoids battle."
        fr:
          scarlet: "Ce Pokémon au tempérament cruel émet\ndes ultrasons capables de pulvériser\nd’imposants rochers."
          violet: "En pleine lumière, il fuit tout affrontement,\nmais quand l’obscurité règne, même Trioxhydre\nle craint."
        it:
          scarlet: "I suoi ultrasuoni riescono a frantumare\npersino enormi massi. Questo Pokémon\nha un temperamento crudele."
          violet: "Quando regna l’oscurità, persino gli Hydreigon\nhanno il terrore di questo Pokémon. Quando è\nchiaro, invece, rifugge le lotte."
        de:
          scarlet: "Die Ultraschallwellen, die dieses brutale\nPokémon freisetzt, können selbst riesige\nFelsen zermalmen."
          violet: "In der Dunkelheit wird es sogar von Trikephalo\ngefürchtet. Tagsüber geht es Kämpfen jedoch\naus dem Weg."
        es:
          scarlet: "Emite ondas ultrasónicas capaces de pulverizar\nrocas enormes. Posee un carácter cruel."
          violet: "Cuando reina la oscuridad, hace temblar incluso\na los Hydreigon. En cambio, evita luchar a plena\nluz."
        ko:
          scarlet: "거대한 암석도 가루로 만드는\n초음파를 발생시키는\n잔인한 성격의 포켓몬."
          violet: "어둠 속에서는 삼삼드래조차\n두려워하는 존재다.\n밝은 곳에서는 음번이 싸움을 피한다."
        zh_simp:
          scarlet: "发出的超音波连巨大的\n岩石都能碎成粉末。\n是性情残忍的宝可梦。"
          violet: "如果在黑暗中，就连\n三首恶龙也会惧怕它。\n在天色变暗之前会避开战斗。"
        zh_trad:
          scarlet: "會發出連巨大的岩石\n都能碎成粉狀的超音波。\n是性情殘忍的寶可夢。"
          violet: "如果是在黑暗中，音波龍是\n連三首惡龍都害怕的存在。\n在天色未暗前會避開戰鬥。"
