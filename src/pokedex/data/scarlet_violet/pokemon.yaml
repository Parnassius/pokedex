      descriptions:
        jp_kana:
          scarlet: "￹力仕事￺ちからしごと￻　だけでなく\n￹陶器￺とうき￻の　￹材料￺ざいりょう￻の　￹上質￺じょうしつ￻な　￹泥￺どろ￻を\n￹作￺つく￻り￹出￺だ￻すため　￹大事￺だいじ￻にされてきた。"
          violet: "￹泥￺どろ￻で　￹固￺かた￻めた　￹脚￺あし￻は　￹岩￺いわ￻よりも　￹硬￺かた￻く\nキック　いっぱつで　￹大型￺おおがた￻　トラックを\nスクラップにしてしまう。"
        jp_kanji:
          scarlet: "￹力仕事￺ちからしごと￻　だけでなく\n￹陶器￺とうき￻の　￹材料￺ざいりょう￻の　￹上質￺じょうしつ￻な　￹泥￺どろ￻を\n￹作￺つく￻り￹出￺だ￻すため　￹大事￺だいじ￻にされてきた。"
          violet: "￹泥￺どろ￻で　￹固￺かた￻めた　￹脚￺あし￻は　￹岩￺いわ￻よりも　￹硬￺かた￻く\nキック　いっぱつで　￹大型￺おおがた￻　トラックを\nスクラップにしてしまう。"
        en:
          scarlet: "This Pokémon has been treasured not just for\nits physical labor but also because it produces\nhigh-quality mud used for making pottery."
          violet: "Its legs are fortified with mud and harder than\nstone, and they can reduce a large truck to scrap\nwith one kick."
        fr:
          scarlet: "On l’apprécie aussi bien pour l’aide qu’il apporte\ndans les travaux physiques que pour l’excellente\nboue qu’il produit, idéale pour la poterie."
          violet: "Ses jambes fortifiées par la boue sont plus dures\nque le roc. Il peut mettre un gros camion en\nmiettes d’un seul coup de pied."
        it:
          scarlet: "È molto apprezzato sia per i lavori di fatica,\nsia per il fango che produce, così sopraffino\nda essere impiegato per realizzare vasellame."
          violet: "Le sue zampe, rinforzate con il fango, sono più\ndure della roccia. Gli basta un solo calcio per\nridurre in rottami un grosso camion."
        de:
          scarlet: "Es wird sehr für seine Schwerstarbeit und für das\nHerstellen von hochwertigem Schlamm geschätzt,\nder ein ideales Material für die Keramik darstellt."
          violet: "Durch Schlamm werden seine Beine härter als\nStein. Mit einem einzigen Tritt kann es selbst\ngroße Lastwagen verschrotten."
        es:
          scarlet: "Es muy apreciado por su utilidad en las labores\nfísicas y por la alta calidad del barro que\nproduce, que es ideal para fabricar cerámica."
          violet: "Sus patas recubiertas de lodo endurecido son\nmás duras que una roca. Es capaz de reducir\nun camión grande a chatarra de una sola coz."
        ko:
          scarlet: "힘쓰는 일뿐만 아니라\n도자기의 재료가 되는 질 좋은 진흙을\n만들기 때문에 소중히 여겨져 왔다."
          violet: "진흙이 굳어진 다리는 바위보다 단단하여\n발차기 한 방에 대형 트럭을\n고철더미로 만들어 버린다."
        zh_simp:
          scarlet: "不仅能胜任力气活，还能\n制造出陶器材料的优质泥土，\n因此一直以来都很受到重视。"
          violet: "泥巴使它的蹄子变得比岩石\n还要坚硬，只要一记踢击\n就能让大型卡车变成废铁。"
        zh_trad:
          scarlet: "除了能勝任粗重的工作，還能\n製造出陶器材料的優質泥土，\n所以一直以來都很受到珍視。"
          violet: "泥巴使牠的蹄變得比岩石\n還要堅硬，只需一記腳踢\n就能讓大卡車變成廢鐵。"
