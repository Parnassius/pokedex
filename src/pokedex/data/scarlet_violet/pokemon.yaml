          scarlet: "お￹腹￺なか￻に　￹溜￺た￻めた　エネルギーが\nくちばしから　￹漏￺も￻れないように\n￹首￺くび￻を　￹根元￺ねもと￻で　￹結￺むす￻んでいるらしい。"
          violet: "シンクロと￹呼￺よ￻ばれる　￹習性￺しゅうせい￻により\n￹群￺む￻れの　￹全員￺ぜんいん￻が　￹一糸乱￺いっしみだ￻れず\n￹一斉￺いっせい￻に　￹攻撃￺こうげき￻してくる。"
        jp_kanji:
          scarlet: "お￹腹￺なか￻に　￹溜￺た￻めた　エネルギーが\nくちばしから　￹漏￺も￻れないように\n￹首￺くび￻を　￹根元￺ねもと￻で　￹結￺むす￻んでいるらしい。"
          violet: "シンクロと￹呼￺よ￻ばれる　￹習性￺しゅうせい￻により\n￹群￺む￻れの　￹全員￺ぜんいん￻が　￹一糸乱￺いっしみだ￻れず\n￹一斉￺いっせい￻に　￹攻撃￺こうげき￻してくる。"
        en:
          scarlet: "This Pokémon apparently ties the base of its neck\ninto a knot so that energy stored in its belly does\nnot escape from its beak."
          violet: "Thanks to a behavior of theirs known as\n“synchronizing,” an entire flock of these Pokémon\ncan attack simultaneously in perfect harmony."
        fr:
          scarlet: "On pense qu’il fait un nœud à la base de son cou\nafin d’empêcher l’énergie qu’il accumule dans\nson ventre de s’échapper par son bec."
          violet: "Leur capacité à se synchroniser permet à toute\nune volée d’attaquer parfaitement à l’unisson."
        it:
          scarlet: "Sembra che il nodo che fa alla base del collo\nserva a evitare che l’energia accumulata nel suo\nstomaco fuoriesca dal becco."
          violet: "Ha l’abitudine di agire all’unisono con i membri\ndel suo gruppo per lanciare un attacco\nperfettamente sincronizzato."
        de:
          scarlet: "Dieses Pokémon verknotet offenbar seinen Hals\nam Ansatz, damit die im Bauch gespeicherte\nEnergie nicht über den Schnabel entweicht."
          violet: "Dank ihres synchronisierten Verhaltens können\nalle Mitglieder eines Schwarms perfekt\naufeinander abgestimmte Angriffe ausführen."
        es:
          scarlet: "Al parecer, se anudan la base del cuello para\nimpedir que la energía que tienen almacenada\nen el estómago escape por el pico."
          violet: "Este Pokémon presenta una conducta sincrónica\nque permite a la colonia entera atacar\nsimultáneamente como una única entidad."
        ko:
          scarlet: "배에 비축해 둔 에너지가\n부리를 통해 새어 나오지 않게 하기 위해\n목 아래쪽을 꼬아 놓은 듯하다."
          violet: "싱크로라 불리는 습성으로 인해\n무리 전체가 일사불란하게 움직여\n일제히 공격한다."
        zh_simp:
          scarlet: "为了避免积蓄在肚子里的\n能量流出，它似乎会把\n自己的脖子系在颈根部上。"
          violet: "拥有被称为同步的习性，\n因此会整个群体一起\n有条不紊地发动攻击。"
        zh_trad:
          scarlet: "為了避免積蓄在肚子裡\n的能量外流，似乎會把\n自己的脖子繫在頸根部上。"
          violet: "擁有被稱為同步的習性，\n因此攻擊時整個群體會\n有條不紊地一起衝過來。"
