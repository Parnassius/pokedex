          violet: "￹凄￺すさ￻まじい　ジャンプ￹力￺りょく￻を　￹持￺も￻つ。\n￹死￺し￻んでいった　￹仲間￺なかま￻たちの　￹怒￺いか￻りが\n￹体￺からだ￻を　￹赤￺あか￻く　￹染￺そ￻めあげている。"
        jp_kanji:
          scarlet: "￹生￺う￻まれた　￹川￺かわ￻を　￹目指￺めざ￻す　￹過酷￺かこく￻な\n￹道￺みち￻のりで　￹死￺し￻んでいった　￹仲間￺なかま￻の\n￹魂￺たましい￻を　￹体￺からだ￻に　まとっている。"
          violet: "￹凄￺すさ￻まじい　ジャンプ￹力￺りょく￻を　￹持￺も￻つ。\n￹死￺し￻んでいった　￹仲間￺なかま￻たちの　￹怒￺いか￻りが\n￹体￺からだ￻を　￹赤￺あか￻く　￹染￺そ￻めあげている。"
        en:
          scarlet: "This Pokémon is cloaked in the souls of its\ncomrades who perished during a punishing\njourney to the river of their birth."
          violet: "It can jump with incredible power. Parts of its\nbody are tinged red by the rage of its fallen\nfriends."
        fr:
          scarlet: "Son corps est enveloppé des âmes de ses\ncongénères qui ont perdu la vie sur le périlleux\nchemin menant à la rivière où ils sont nés."
          violet: "Ce Pokémon peut faire des bonds vertigineux.\nLa colère de ses défunts congénères a donné\nà son corps une teinte rouge."
        it:
          scarlet: "È avvolto dagli spiriti dei suoi simili, morti\nnell’estenuante viaggio verso il fiume in cui\nerano nati."
          violet: "Possiede un’incredibile potenza di salto.\nL’ira dei suoi compagni morti conferisce\nal suo corpo una colorazione rossa."
        de:
          scarlet: "Es hüllt seinen Körper in die Seelen von\nArtgenossen, die auf dem beschwerlichen Weg\nzum Fluss ihrer Geburt ihr Leben ließen."
          violet: "Es verfügt über eine nahezu unheimliche\nSprungkraft. Der Zorn von verstorbenen\nArtgenossen färbt seinen Körper rot."
        es:
          scarlet: "Su cuerpo está envuelto en las almas de los\ncompañeros que perecieron durante el arduo\nviaje para regresar al río que los vio nacer."
          violet: "Su capacidad de salto es asombrosa. La ira\nde sus camaradas caídos le confiere un tono\nrojizo a su cuerpo."
        ko:
          scarlet: "태어난 강으로 향하는\n가혹한 여정 중에 목숨을 잃은\n동료들의 영혼을 몸에 두르고 있다."
          violet: "가공할 만한 점프력을 가졌다.\n죽은 동료들의 분노가\n몸을 붉게 물들였다."
        zh_simp:
          scarlet: "在前往出生的河川的\n艰苦旅程中丧命的伙伴的灵魂\n时刻缠绕在它的身上。"
          violet: "拥有惊人的弹跳力。\n死去的伙伴的怒火\n染红了它的身体。"
        zh_trad:
          scarlet: "身上時刻纏繞著在回到\n出生河川的艱辛旅途中\n半途喪命的夥伴的靈魂。"
          violet: "擁有驚人的跳躍力。\n死去的夥伴們的怒火\n染紅了牠的身體。"
