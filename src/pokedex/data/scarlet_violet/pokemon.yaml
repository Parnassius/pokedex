      descriptions:
        jp_kana:
          scarlet: "￹毎日￺まいにち￻　￹自分￺じぶん￻の　￹体重￺たいじゅう￻と\n￹同￺おな￻じ　￹量￺りょう￻の　エサが　￹必要￺ひつよう￻。\n￹味￺あじ￻については　￹気￺き￻にしない。"
          violet: "￹必死￺ひっし￻に　エサを　￹食￺た￻べているうちに\n￹体￺からだ￻の　￹毛￺け￻の￹下￺した￻に　￹隠￺かく￻していた\nエサのことを　￹忘￺わす￻れてしまうのだ。"
        jp_kanji:
          scarlet: "￹毎日￺まいにち￻　￹自分￺じぶん￻の　￹体重￺たいじゅう￻と\n￹同￺おな￻じ　￹量￺りょう￻の　エサが　￹必要￺ひつよう￻。\n￹味￺あじ￻については　￹気￺き￻にしない。"
          violet: "￹必死￺ひっし￻に　エサを　￹食￺た￻べているうちに\n￹体￺からだ￻の　￹毛￺け￻の￹下￺した￻に　￹隠￺かく￻していた\nエサのことを　￹忘￺わす￻れてしまうのだ。"
        en:
          scarlet: "It needs to consume its own weight in food every\nday. As far as flavor is concerned, it’s indifferent."
          violet: "When it is voraciously gulping down food,\nit forgets about the food it has hidden under\nits fur."
        fr:
          scarlet: "Ce Pokémon a besoin de manger l’équivalent\nde son propre poids en nourriture chaque jour.\nIl se moque du goût des aliments."
          violet: "La frénésie qui s’empare de lui quand il mange\nest telle qu’il oublie la nourriture qu’il avait\ncachée dans sa fourrure."
        it:
          scarlet: "Ogni giorno deve mangiare una quantità di cibo\npari al suo peso corporeo. Non bada troppo\nal sapore di ciò che ingurgita."
          violet: "La foga con cui mangia è tale da fargli\ndimenticare di avere del cibo nascosto\nsotto il pelo."
        de:
          scarlet: "Es braucht eine tägliche Nahrungsmenge,\ndie seinem Körpergewicht entspricht.\nDer Geschmack ist ihm dabei egal."
          violet: "Wenn es damit beschäftigt ist, sein Futter\nhinunterzuschlingen, vergisst es glatt, dass es\nauch noch Futter unter seinem Fell versteckt hat."
        es:
          scarlet: "Necesita ingerir cada día el equivalente a su\npeso corporal en comida. Le importa poco\nel sabor que pueda tener."
          violet: "En su desesperación por engullir comida, se suele\nolvidar de la que esconde debajo de su pelaje."
        ko:
          scarlet: "매일 자신의 체중과\n같은 양의 먹이가 필요하다.\n맛에 대해서는 신경 쓰지 않는다."
          violet: "먹이를 먹는 데 열중한 나머지\n몸의 털 밑에 숨겨 놓은\n먹이에 대한 것은 잊어버리고 만다."
        zh_simp:
          scarlet: "每天必须要吃和自重\n同等分量的食物。\n味道的好坏并不在意。"
          violet: "会在拼命进食的途中\n忘记藏到体毛下的食物。"
        zh_trad:
          scarlet: "每天必須要吃和自身體重\n同等份量的食物。\n並不在意味道的好壞。"
          violet: "會埋頭拼命吃東西，\n吃著吃著就忘記了\n藏在體毛下的食物。"
