          violet: "￹溜￺た￻まった　￹電気￺でんき￻を　￹分￺わ￻け￹与￺あた￻えようと\n￹頬袋￺ほほぶくろ￻を　こすり￹合￺あ￻わせる\nパチリスを　￹見￺み￻かけることも　ある。"
        jp_kanji:
          scarlet: "ほっぺに　￹電気袋￺でんきぶくろ￻を　￹持￺も￻つ\nポケモンの　￹仲間￺なかま￻。　￹尻尾￺しっぽ￻から\n￹溜￺た￻まった　￹電気￺でんき￻を　￹放出￺ほうしゅつ￻する。"
          violet: "￹溜￺た￻まった　￹電気￺でんき￻を　￹分￺わ￻け￹与￺あた￻えようと\n￹頬袋￺ほほぶくろ￻を　こすり￹合￺あ￻わせる\nパチリスを　￹見￺み￻かけることも　ある。"
        en:
          scarlet: "It’s one of the kinds of Pokémon with electric\ncheek pouches. It shoots charges from its tail."
          violet: "A pair may be seen rubbing their cheek pouches\ntogether in an effort to share stored electricity."
        fr:
          scarlet: "Pachirisu fait partie des Pokémon aux joues\nélectriques. Il libère l’énergie qu’il accumule\npar la queue."
          violet: "Il arrive que deux Pachirisu se frottent les joues\npour partager l’électricité qu’ils ont accumulée."
        it:
          scarlet: "Appartiene alla tipologia di Pokémon muniti\ndi sacche elettriche sulle guance. Rilascia dalla\ncoda l’elettricità accumulata."
          violet: "A volte si possono osservare esemplari che si\nsfregano a vicenda le sacche sulle guance per\ncondividere l’elettricità immagazzinata."
        de:
          scarlet: "Pachirisu ist eines der Pokémon, die mit ihren\nBackentaschen Elektrizität erzeugen. Den so\ngesammelten Strom gibt es über den Schweif ab."
          violet: "Mitunter kann man beobachten, wie zwei\nPachirisu ihre Backentaschen aneinanderreiben,\num gespeicherte Elektrizität zu teilen."
        es:
          scarlet: "Forma parte del grupo de Pokémon que posee\nbolsas de electricidad en las mejillas. Descarga\npor la cola la electricidad que acumula."
          violet: "A veces se ve a dos frotándose las bolsas de las\nmejillas para compartir electricidad almacenada."
        ko:
          scarlet: "볼에 전기 주머니를 가진 포켓몬의 일종.\n꼬리에 모인 전기를 방출한다."
          violet: "모인 전기를 나눠 주려고\n뺨의 주머니를 서로 비비는\n파치리스가 발견되기도 한다."
        zh_simp:
          scarlet: "脸颊上拥有电囊的\n宝可梦的一员。储存的\n电力会从尾巴释放出去。"
          violet: "有时候也会发现\n为了将储存的电分给同伴\n而互相摩擦颊囊的帕奇利兹。"
        zh_trad:
          scarlet: "雙頰上有電囊的寶可夢\n的一員。儲存的電力\n會從尾巴釋放出去。"
          violet: "有時候可以見到\n為了將儲存的電力分給同伴\n而互相摩擦頰囊的帕奇利茲。"
