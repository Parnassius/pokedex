          scarlet: "￹見￺み￻かけによらず　￹気性￺きしょう￻が　￹荒￺あら￻い。\n￹長￺なが￻い　￹体￺からだ￻で　￹獲物￺えもの￻を　￹締￺し￻め￹上￺あ￻げ\n￹巣穴￺すあな￻に　￹引￺ひ￻きずりこむぞ。"
          violet: "￹魚￺さかな￻ポケモンの　￹一種￺いっしゅ￻。\nダグトリオの　リージョンフォームと\n￹考￺かんが￻えられていたことも　あった。"
        jp_kanji:
          scarlet: "￹見￺み￻かけによらず　￹気性￺きしょう￻が　￹荒￺あら￻い。\n￹長￺なが￻い　￹体￺からだ￻で　￹獲物￺えもの￻を　￹締￺し￻め￹上￺あ￻げ\n￹巣穴￺すあな￻に　￹引￺ひ￻きずりこむぞ。"
          violet: "￹魚￺さかな￻ポケモンの　￹一種￺いっしゅ￻。\nダグトリオの　リージョンフォームと\n￹考￺かんが￻えられていたことも　あった。"
        en:
          scarlet: "It has a vicious temperament, contrary to what its\nappearance may suggest. It wraps its long bodies\naround prey, then drags the prey into its den."
          violet: "A variety of fish Pokémon, Wugtrio was\nonce considered to be a regional form\nof Dugtrio."
        fr:
          scarlet: "Ce Pokémon est beaucoup plus violent qu’il\nn’y paraît. Il enroule son long corps autour\nde ses proies pour les attirer dans son nid."
          violet: "Par le passé, ce Pokémon poisson a parfois\nété considéré comme une forme régionale\nde Triopikeur."
        it:
          scarlet: "Dall’aspetto non si direbbe, ma ha un’indole\nferoce. Si stringe attorno alla preda col suo\nlungo corpo e la trascina nella sua tana."
          violet: "È un Pokémon acquatico. Per un periodo,\nin passato, si è anche pensato che fosse\nuna forma regionale di Dugtrio."
        de:
          scarlet: "Entgegen seinem Äußeren ist es von grober\nNatur. Mit seinen langen Körpern nimmt es\nBeute in die Mangel und zieht sie in sein Nest."
          violet: "Schligdri ist eine Art Fisch-Pokémon.\nEinst wurde es für eine Regionalform\nvon Digdri gehalten."
        es:
          scarlet: "Es de temperamento agresivo, aunque\nno lo parezca. Envuelve a sus presas con\nsus largos cuerpos y las arrastra a su nido."
          violet: "Una variedad de Pokémon pez. En el\npasado se creía erróneamente que podía\nser una forma regional de Dugtrio."
        ko:
          scarlet: "겉보기와 다르게 성질이 사납다.\n기다란 몸으로 먹잇감을 죄어서\n굴 안으로 끌고 들어간다."
          violet: "물고기포켓몬의 일종.\n닥트리오의 리전폼인 것으로\n여겨지던 시기도 있었다."
        zh_simp:
          scarlet: "不同于外表，它性格很粗暴。\n会用长长的身体勒住猎物，\n然后将其拖进自己的巢穴里。"
          violet: "鱼宝可梦的一种。\n曾经也有人认为它是\n三地鼠的地区形态。"
        zh_trad:
          scarlet: "有別於外表，性格非常粗暴。\n會用長長的身體勒緊獵物，\n然後拖進自己的巢穴裡。"
          violet: "魚寶可夢的一種。\n曾經也有人認為牠是\n三地鼠的地區形態。"
