      hidden_ability: heatproof
      descriptions:
        jp_kana:
          scarlet: "￹名￺な￻のある　￹焼￺や￻き￹物師￺ものし￻が　￹作￺つく￻った\n￹見事￺みごと￻な　￹茶碗￺ちゃわん￻に　￹棲￺す￻みつく。\nマニアには　たまらない　ポケモン。"
          violet: "￹頭￺あたま￻の　￹茶￺ちゃ￻せんで　かき￹混￺ま￻ぜるほど\nエネルギーが　￹充填￺じゅうてん￻される。\n￹戦￺たたか￻いに　￹挑￺いど￻む　￹準備￺じゅんび￻である。"
        jp_kanji:
          scarlet: "￹名￺な￻のある　￹焼￺や￻き￹物師￺ものし￻が　￹作￺つく￻った\n￹見事￺みごと￻な　￹茶碗￺ちゃわん￻に　￹棲￺す￻みつく。\nマニアには　たまらない　ポケモン。"
          violet: "￹頭￺あたま￻の　￹茶￺ちゃ￻せんで　かき￹混￺ま￻ぜるほど\nエネルギーが　￹充填￺じゅうてん￻される。\n￹戦￺たたか￻いに　￹挑￺いど￻む　￹準備￺じゅんび￻である。"
        en:
          scarlet: "It lives inside a superb teacup that was crafted\nby a potter of great renown. Collectors positively\nadore this Pokémon."
          violet: "The more stirring it does with the tea whisk on its\nhead, the more energy it builds up. It does this to\nprepare for battle."
        fr:
          scarlet: "Il vit dans un splendide bol à thé confectionné\npar un céramiste de renom. Les collectionneurs et\ncollectionneuses sont fascinés par ce Pokémon."
          violet: "Il fait le plein d’énergie en agitant le fouet\nsur sa tête. C’est son rituel pour se préparer\nau combat."
        it:
          scarlet: "Gli appassionati stravedono per questo Pokémon\nche prende dimora in tazze da tè realizzate\nda un rinomato ceramista."
          violet: "Si carica di energia mescolando se stesso\ncon la frusta che ha in testa. È così che\nsi prepara a lottare."
        de:
          scarlet: "Es lebt in einer exquisiten Teeschale, die von\neinem renommierten Töpfer hergestellt wurde.\nEnthusiasten reißen sich um dieses Pokémon."
          violet: "Je mehr es sich selbst mit dem Teebesen auf\nseinem Kopf umrührt, desto mehr Energie\ntankt es. So bereitet es sich auf Kämpfe vor."
        es:
          scarlet: "Vive en un exquisito cuenco de té elaborado por\nun alfarero de renombre. Los coleccionistas más\nacérrimos se desviven por este Pokémon."
          violet: "Cuanto más se mezcla con el batidor que\ntiene en la cabeza, más se carga de energía.\nEs su forma de prepararse para combatir."
        ko:
          scarlet: "저명한 도공이 만든\n훌륭한 찻잔에 깃들었다.\n마니아들을 흥분하게 하는 포켓몬이다."
          violet: "머리의 차선을 휘저을수록\n에너지가 충전된다.\n싸움에 임할 준비를 하는 것이다."
        zh_simp:
          scarlet: "会住到由著名烧制技艺大师\n所制作的精美茶碗中。\n是让爱好者痴迷不已的宝可梦。"
          violet: "越是搅拌头上的茶筅\n就越能补充更多能量。\n这是进行战斗前的准备。"
        zh_trad:
          scarlet: "會住進有名的陶藝大師\n所製作的精美茶碗中。\n是令愛好者著迷不已的寶可夢。"
          violet: "越是用頭部的茶筅攪拌，\n就越能累積起能量。\n這是牠面對戰鬥時的準備。"
