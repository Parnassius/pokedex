      descriptions:
        jp_kana:
          scarlet: "￹助￺たす￻けを　￹求￺もと￻める　￹仲間￺なかま￻の　￹声￺こえ￻を　￹聞￺き￻くと\n￹姿￺すがた￻を　￹変￺か￻える。\nその　￹瞬間￺しゅんかん￻は　だれにも　￹見￺み￻せない。"
          violet: "￹身体能力￺しんたいのうりょく￻は　ナミイルカと\n￹変￺か￻わらないが　￹仲間￺なかま￻の　ピンチには\n￹変身￺へんしん￻して　パワーアップするぞ。"
        jp_kanji:
          scarlet: "￹助￺たす￻けを　￹求￺もと￻める　￹仲間￺なかま￻の　￹声￺こえ￻を　￹聞￺き￻くと\n￹姿￺すがた￻を　￹変￺か￻える。\nその　￹瞬間￺しゅんかん￻は　だれにも　￹見￺み￻せない。"
          violet: "￹身体能力￺しんたいのうりょく￻は　ナミイルカと\n￹変￺か￻わらないが　￹仲間￺なかま￻の　ピンチには\n￹変身￺へんしん￻して　パワーアップするぞ。"
        en:
          scarlet: "This Pokémon changes its appearance if it hears\nits allies calling for help. Palafin will never show\nanybody its moment of transformation."
          violet: "Its physical capabilities are no different than\na Finizen’s, but when its allies are in danger,\nit transforms and powers itself up."
        fr:
          scarlet: "Il change de forme dès qu’il entend les cris de\ndétresse de ses congénères, mais il ne laissera\njamais personne assister à sa transformation."
          violet: "Il a les mêmes capacités physiques qu’avant son\névolution, mais quand ses congénères sont en\ndanger, il change de forme et devient plus fort."
        it:
          scarlet: "Cambia forma non appena sente i suoi compagni\nchiamare aiuto, assicurandosi di non essere mai\nvisto da nessuno."
          violet: "Ha la stessa forza fisica di Finizen, ma quando\nun suo compagno si trova in difficoltà, si\ntrasforma e la sua potenza aumenta."
        de:
          scarlet: "Hört es die Hilferufe von Artgenossen, ändert es\nseine Form. Den Moment seiner Verwandlung\nzeigt es jedoch niemandem."
          violet: "Seine körperliche Kraft unterscheidet sich nicht\nvon Normifin. Ist jedoch ein Artgenosse in Not,\nverwandelt es sich und wird viel stärker."
        es:
          scarlet: "Cambia de forma en cuanto recibe una señal de\nsocorro de sus compañeros. Nunca se transforma\ndelante de nadie."
          violet: "Posee la misma fortaleza física que un Finizen,\npero, cuando se transforma para ayudar a un\ncompañero en apuros, se vuelve más fuerte."
        ko:
          scarlet: "도움을 구하는 동료의 소리를 들으면\n모습을 바꾼다.\n그 순간은 누구에게도 보여 주지 않는다."
          violet: "신체 능력은 맨돌핀과\n차이가 없지만, 동료가 위기에 처하면\n변신해서 파워업한다."
        zh_simp:
          scarlet: "只要听见伙伴求助的声音，\n它就会改变自己的样子。\n那瞬间绝不会让谁看见。"
          violet: "体能与波普海豚差不多，\n可一旦伙伴陷入了危机，\n就会变身来提高自己的力量。"
        zh_trad:
          scarlet: "只要聽見夥伴求助的聲音，\n就會改變自己的樣子。\n那瞬間絕不會讓誰看見。"
          violet: "體能與波普海豚不相上下，\n但一旦夥伴陷入了危機，\n就會變身來提高自己的力量。"
    palafin_hero_form:
