      descriptions:
        jp_kana:
          scarlet: "￹体￺からだ￻から　￹火花￺ひばな￻を　￹散￺ち￻らして\n￹仲間￺なかま￻を　￹応援￺おうえん￻。　￹電柱￺でんちゅう￻に\n￹登￺のぼ￻り　￹電気￺でんき￻を　￹吸収￺きゅうしゅう￻する。"
          violet: "￹電柱￺でんちゅう￻から　￹電気￺でんき￻を　￹吸￺す￻い￹取￺と￻る。\n￹体￺からだ￻に　￹溜￺た￻めた　￹電気￺でんき￻を\nショートさせて　￹音￺おと￻を　￹出￺だ￻す。"
        jp_kanji:
          scarlet: "￹体￺からだ￻から　￹火花￺ひばな￻を　￹散￺ち￻らして\n￹仲間￺なかま￻を　￹応援￺おうえん￻。　￹電柱￺でんちゅう￻に\n￹登￺のぼ￻り　￹電気￺でんき￻を　￹吸収￺きゅうしゅう￻する。"
          violet: "￹電柱￺でんちゅう￻から　￹電気￺でんき￻を　￹吸￺す￻い￹取￺と￻る。\n￹体￺からだ￻に　￹溜￺た￻めた　￹電気￺でんき￻を\nショートさせて　￹音￺おと￻を　￹出￺だ￻す。"
        en:
          scarlet: "It cheers on partners while scattering sparks from\nits body. It climbs telephone poles to absorb\nelectricity."
          violet: "This Pokémon absorbs electricity from telephone\npoles. It shorts out the electricity stored inside its\nbody to create noises."
        fr:
          scarlet: "Ce Pokémon soutient ses camarades en lançant\ndes étincelles. Il grimpe sur les poteaux\nélectriques pour en absorber l’énergie."
          violet: "Il absorbe l’énergie des poteaux électriques\net court-circuite celle qui est emmagasinée\ndans son corps pour produire des sons."
        it:
          scarlet: "Fa il tifo per i suoi compagni emanando scintille\ndal corpo. Sale sui pali della luce per assorbire\nenergia elettrica."
          violet: "Assorbe elettricità dai pali della luce, la\naccumula e poi crea dei rumorosi cortocircuiti."
        de:
          scarlet: "Indem es Funken aus seinem Körper versprüht,\nfeuert es andere an. Es steigt auf Strommasten,\num Elektrizität zu absorbieren."
          violet: "Es saugt Elektrizität aus Strommasten. Erzeugt es\nmit dem im Körper gespeicherten Strom einen\nKurzschluss, erklingt ein Geräusch."
        es:
          scarlet: "Anima a sus compañeros con un alegre\nchisporroteo. Para absorber electricidad,\nse sube a los postes de teléfono."
          violet: "Absorbe electricidad de los postes de teléfono.\nLa almacena y crea cortocircuitos en su cuerpo\npara producir sonidos."
        ko:
          scarlet: "몸에서 스파크를 일으켜서\n동료를 응원한다.\n전신주에 올라가서 전기를 흡수한다."
          violet: "전신주에서 전기를 흡수한다.\n몸에 모은 전기를\n합선시켜 소리를 낸다."
        zh_simp:
          scarlet: "从身体撒出火花\n来为伙伴加油。\n会爬上电线杆吸取电力。"
          violet: "能从电线杆上吸取电力。\n会通过让体内储存的\n电流短路来发出声音。"
        zh_trad:
          scarlet: "會從體內迸發出火花\n來幫夥伴加油。\n會爬上電線桿吸取電力。"
          violet: "能從電線桿上吸取電力。\n會透過讓體內儲存的\n電流短路來發出聲音。"
