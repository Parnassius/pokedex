          violet: "￹小枝￺こえだ￻は　フォッコの　おやつ。\nポリポリ　かじると　￹強敵￺きょうてき￻に\n￹立￺た￻ち￹向￺む￻かう　￹勇気￺ゆうき￻が　￹湧￺わ￻いてくる。"
        jp_kanji:
          scarlet: "￹気持￺きも￻ちが　￹昂￺たかぶ￻りやすい　￹性格￺せいかく￻。\n￹体温￺たいおん￻も　￹上￺あ￻がり￹過￺す￻ぎるので　￹耳￺みみ￻で\n￹放熱￺ほうねつ￻して　￹冷静￺れいせい￻になるのだ。"
          violet: "￹小枝￺こえだ￻は　フォッコの　おやつ。\nポリポリ　かじると　￹強敵￺きょうてき￻に\n￹立￺た￻ち￹向￺む￻かう　￹勇気￺ゆうき￻が　￹湧￺わ￻いてくる。"
        en:
          scarlet: "This Pokémon gets worked up easily. Its body\ncan also overheat, so it uses its ears to dissipate\nthe heat and calm down."
          violet: "Twigs make for Fennekin’s snacks. When it\nnibbles on twigs, it finds the courage to face\nstrong foes."
        fr:
          scarlet: "Il a tendance à s’exciter facilement.\nComme son corps peut surchauffer, il évacue\nla chaleur par ses oreilles pour se calmer."
          violet: "Il adore manger des brindilles en guise de\ncollation. En grignoter une lui donne le courage\nd’affronter des adversaires redoutables."
        it:
          scarlet: "Si infervora facilmente e, quando capita, il suo\ncorpo si surriscalda, quindi rilascia calore dalle\norecchie per calmarsi."
          violet: "I ramoscelli sono il suo spuntino preferito.\nSgranocchiarli gli infonde il coraggio di\naffrontare i nemici più forti."
        de:
          scarlet: "Es regt sich sehr schnell auf. Da dabei auch sein\nKörper überhitzt, gibt es Wärme über seine\nOhren ab, um sich zu beruhigen."
          violet: "Zweige sind ein Snack für Fynx. Wenn es auf\nihnen herumkaut, fasst es den Mut, sich starken\nGegnern entgegenzustellen."
        es:
          scarlet: "Tiende a exaltarse con facilidad. Su temperatura\ncorporal también aumenta en exceso, por lo que\nexpulsa el calor por las orejas para calmarse."
          violet: "Las ramitas son como un aperitivo para Fennekin.\nAl mordisquearlas, se arma de valor para plantar\ncara a enemigos temibles."
        ko:
          scarlet: "흥분하기 쉬운 성격이다.\n체온도 과하게 오르기 때문에\n귀로 열을 내보내 냉정을 유지한다."
          violet: "잔가지는 푸호꼬의 간식이다.\n아작아작 먹다 보면\n강한 적에 맞설 용기가 솟아난다."
        zh_simp:
          scarlet: "拥有容易亢奋的性格。\n体温也很容易变得过高，\n因此会利用耳朵放热冷静下来。"
          violet: "小树枝是火狐狸的零食。\n当咬得嘎吱嘎吱响时，\n就会涌出对抗强敌的勇气。"
        zh_trad:
          scarlet: "擁有容易亢奮的性情。\n由於體溫也容易變得過高，\n因此會從耳朵散熱來冷靜下來。"
          violet: "小樹枝是火狐狸的零食。\n卡滋卡滋地啃著啃著\n就會湧出對抗強敵的勇氣。"
