          scarlet: "￹入￺はい￻っている　ティーポットによる\n￹違￺ちが￻いは　ないが　もとの　￹紅茶￺こうちゃ￻によって\n￹気質￺きしつ￻が　￹変￺か￻わるらしい。"
          violet: "￹飲￺の￻むと　￹危険￺きけん￻だが　￹美味￺うま￻い。\n￹危険￺きけん￻を　￹恐￺おそ￻れない　グルメたちは\n￹日々￺ひび￻　ポットデスを　￹飲￺の￻み￹続￺つづ￻ける。"
        jp_kanji:
          scarlet: "￹入￺はい￻っている　ティーポットによる\n￹違￺ちが￻いは　ないが　もとの　￹紅茶￺こうちゃ￻によって\n￹気質￺きしつ￻が　￹変￺か￻わるらしい。"
          violet: "￹飲￺の￻むと　￹危険￺きけん￻だが　￹美味￺うま￻い。\n￹危険￺きけん￻を　￹恐￺おそ￻れない　グルメたちは\n￹日々￺ひび￻　ポットデスを　￹飲￺の￻み￹続￺つづ￻ける。"
        en:
          scarlet: "Apparently a Polteageist’s disposition is affected\nby the type of tea the Pokémon came from.\nWhat teapot it inhabits makes no difference."
          violet: "Though risky to drink, this Pokémon’s tea tastes\ndelicious. Gourmets who have no fear of danger\ndrink Polteageist tea day after day."
        fr:
          scarlet: "La théière qu’il habite n’a aucune influence sur\nson caractère, mais celui-ci varierait en fonction\nde son thé d’origine."
          violet: "Le thé de ce Pokémon a un goût délicieux, mais\nen consommer est dangereux. Les gourmets\nintrépides en boivent tous les jours."
        it:
          scarlet: "La teiera in cui entra non lo influenza, ma pare\nche il tipo di tè da cui ha origine ne modifichi\nil carattere."
          violet: "È pericoloso da bere, ma ha un ottimo sapore.\nI buongustai che non temono il rischio bevono\nPolteageist ogni giorno."
        de:
          scarlet: "Die Teekanne, in der es haust, hat keinen Einfluss\nauf dieses Pokémon. Dafür ist sein Charakter je\nnach Art des Schwarztees ein anderer."
          violet: "Von diesem Pokémon zu trinken ist gefährlich,\naber köstlich. Furchtlose Feinschmecker führen\nsich Mortipot jeden Tag zu Gemüte."
        es:
          scarlet: "Su carácter varía en función de su té de origen\ny no de la tetera en la que se hospede."
          violet: "Tiene un sabor exquisito, pero beberlo es\narriesgado. Los sibaritas que no temen al\npeligro beben té de Polteageist a diario."
        ko:
          scarlet: "들어가는 찻주전자에 따른 차이는 없지만\n바탕이 되는 홍차에 따라\n성격이 달라진다고 한다."
          violet: "마시면 위험하지만 맛있다.\n위험을 두려워하지 않는 미식가들은\n매일같이 포트데스를 마신다."
        zh_simp:
          scarlet: "不管住在什么茶壶里，对它都\n不会有影响。但原本的红茶\n却似乎会给它的性情带来变化。"
          violet: "虽然喝下它会有危险，\n但味道很好。不怕危险的\n美食家们每天都喝怖思壶。"
        zh_trad:
          scarlet: "住在什麼茶壺裡都不會對牠\n帶來影響，但原本的紅茶卻\n似乎會使牠的性情產生變化。"
          violet: "雖然喝下牠很危險，但味道\n卻是相當美味。不怕危險的\n饕客們每天都會喝怖思壺。"
