    en: Ivysaur
    fr: Herbizarre
    it: Ivysaur
    de: Bisaknosp
    es: Ivysaur
    ko: 이상해풀
    zh_simp: 妙蛙草
    zh_trad: 妙蛙草
  forms:
    ivysaur:
      form_id: 0
      base_stats:
        hp: 60
        attack: 62
        defense: 63
        special_attack: 80
        special_defense: 80
        speed: 60
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 1
        special_defense: 1
        speed: 0
      types:
        - grass
        - poison
      egg_groups:
        - monster
        - grass
      abilities:
        - overgrow
      hidden_ability: chlorophyll
      descriptions:
        jp_kana:
          scarlet: "￹太陽￺たいよう￻の　￹光￺ひかり￻を　￹浴￺あ￻びるほど\n￹体￺からだ￻に　￹力￺ちから￻が　わいて　￹背中￺せなか￻の\nつぼみが　￹育￺そだ￻っていく。"
          violet: "￹背中￺せなか￻の　つぼみは　￹養分￺ようぶん￻を\n￹吸収￺きゅうしゅう￻して　ふくらむ。\n￹花￺はな￻の￹咲￺さ￻くころ　いい￹匂￺にお￻いが　する。"
        jp_kanji:
          scarlet: "￹太陽￺たいよう￻の　￹光￺ひかり￻を　￹浴￺あ￻びるほど\n￹体￺からだ￻に　￹力￺ちから￻が　わいて　￹背中￺せなか￻の\nつぼみが　￹育￺そだ￻っていく。"
          violet: "￹背中￺せなか￻の　つぼみは　￹養分￺ようぶん￻を\n￹吸収￺きゅうしゅう￻して　ふくらむ。\n￹花￺はな￻の￹咲￺さ￻くころ　いい￹匂￺にお￻いが　する。"
        en:
          scarlet: "The more sunlight Ivysaur bathes in, the more\nstrength wells up within it, allowing the bud\non its back to grow larger."
          violet: "The bulb on its back grows as it absorbs\nnutrients. The bulb gives off a pleasant aroma\nwhen it blooms."
        fr:
          scarlet: "Plus il s’expose au soleil, plus il emmagasine\nd’énergie, ce qui permet au bourgeon\nsur son dos de se développer."
          violet: "Le bourgeon sur son dos grandit en absorbant\ndes nutriments. Il dégage un doux parfum\nquand il éclot."
        it:
          scarlet: "Più si espone alla luce solare, più acquisisce\nenergie facendo crescere il bocciolo che ha\nsul dorso."
          violet: "Il bocciolo sul dorso cresce assorbendo sostanze\nnutritive. Quando è pronto per sbocciare, libera\nun piacevole profumo."
        de:
          scarlet: "Die Sonne macht es stärker. Die Knospe auf\nseinem Rücken wächst unter dem Einfluss von\nSonnenlicht."
          violet: "Nimmt es Nährstoffe zu sich, wächst die Knospe\nauf seinem Rücken. Blüht diese auf, verströmt sie\neinen angenehmen Duft."
        es:
          scarlet: "Cuanta más luz solar recibe, más aumenta su\nfuerza y más se desarrolla el capullo que tiene\nen el lomo."
          violet: "El capullo de la espalda crece al absorber\nnutrientes. Desprende un aroma delicioso\ncuando está a punto de florecer."
        ko:
          scarlet: "햇빛을 받을수록\n몸에 힘이 솟아나\n등의 꽃봉오리가 자라난다."
          violet: "등의 꽃봉오리는\n양분을 흡수하며 커진다.\n꽃이 필 때가 되면 좋은 향기가 난다."
        zh_simp:
          scarlet: "沐浴在阳光下越久，\n身体内会涌出越多力量，\n背上的花苞也会渐渐成长。"
          violet: "背上的花苞会在吸收\n养分后鼓起。快开花时\n会散发出很香的味道。"
        zh_trad:
          scarlet: "沐浴在陽光下越久，\n身體內會湧出越多力量，\n背上的花苞也會漸漸成長。"
          violet: "背上的花苞會吸收養分\n而鼓起。在即將開花時\n會散發出很美妙的香氣。"
