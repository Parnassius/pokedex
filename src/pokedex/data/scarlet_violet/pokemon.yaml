          violet: "￹長￺なが￻い　￹体毛￺たいもう￻に　￹覆￺おお￻われて\n￹目￺め￻の￹前￺まえ￻の　￹様子￺ようす￻が　わからず\nひたすらに　￹突進￺とっしん￻を　￹繰￺く￻り￹返￺かえ￻す。"
