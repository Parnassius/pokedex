      descriptions:
        jp_kana:
          scarlet: "￹進化￺しんか￻して　さらに　ずる￹賢￺がしこ￻くなり\nツメで　￹石￺いし￻に　サインをつけて\nコミュニケーションを　はかっている。"
          violet: "４～５￹匹￺ひき￻の　グループで　￹行動￺こうどう￻。\n￹岩￺いわ￻や　￹樹木￺じゅもく￻に　サインを　￹残￺のこ￻し\n￹連係￺れんけい￻して　￹獲物￺えもの￻を　￹仕留￺しと￻める。"
        jp_kanji:
          scarlet: "￹進化￺しんか￻して　さらに　ずる￹賢￺がしこ￻くなり\nツメで　￹石￺いし￻に　サインをつけて\nコミュニケーションを　はかっている。"
          violet: "４～５￹匹￺ひき￻の　グループで　￹行動￺こうどう￻。\n￹岩￺いわ￻や　￹樹木￺じゅもく￻に　サインを　￹残￺のこ￻し\n￹連係￺れんけい￻して　￹獲物￺えもの￻を　￹仕留￺しと￻める。"
        en:
          scarlet: "Evolution made it even more devious.\nIt communicates by clawing signs in boulders."
          violet: "They travel in groups of four or five, leaving signs\nfor one another on trees and rocks. They bring\ndown their prey with coordinated attacks."
        fr:
          scarlet: "L’évolution l’a rendu encore plus retors.\nIl communique en gravant des marques\ndans les pierres avec ses griffes."
          violet: "Ils voyagent en groupes de quatre ou cinq. Lors\nde la chasse, ils laissent des marques sur les arbres\nou les rochers pour coordonner leurs attaques."
        it:
          scarlet: "L’evoluzione lo ha reso ancora più subdolo.\nComunica incidendo segni sui massi con i suoi\nartigli."
          violet: "Si muove in gruppi di quattro o cinque individui.\nDurante la caccia, si coordina con i compagni\nlasciando dei segni sulle rocce e sugli alberi."
        de:
          scarlet: "Snibunna wurde durch seine Entwicklung noch\nverschlagener. Es kommuniziert durch in Felsen\ngekratzte Zeichen."
          violet: "Sie sind immer zu viert oder fünft unterwegs.\nBei der Jagd arbeiten sie zusammen, indem sie\nZeichen in Felsen und Bäume ritzen."
        es:
          scarlet: "Su carácter se volvió aún más vil con la evolución.\nSe comunica marcando rocas con sus garras."
          violet: "Siempre van en grupos de cuatro o cinco.\nDejan marcas en rocas y árboles al cazar para\ncoordinarse con sus compañeros."
        ko:
          scarlet: "진화한 후 더욱 약삭빨라져\n발톱으로 돌에 사인을 새겨\n커뮤니케이션을 시도한다."
          violet: "4~5마리의 그룹으로 행동한다.\n바위나 나무에 표시를 남겨\n연계 플레이로 먹이를 잡는다."
        zh_simp:
          scarlet: "进化后变得更加狡猾，\n会通过用爪子在石头上\n留下记号来与伙伴交流。"
          violet: "４～５只一组进行行动。\n在岩石和树木上留下记号，\n以团队合作捕杀猎物。"
        zh_trad:
          scarlet: "進化後變得更加狡詐，\n會用爪子在石頭上\n留下記號和夥伴交流。"
          violet: "４～５隻一組行動。\n在岩石和樹木上留下記號，\n以團隊合作捕殺獵物。"
