          violet: "フラージェスの　￹作￺つく￻った　￹花園￺はなぞの￻は\n￹心￺こころ￻と　￹体￺からだ￻を　￹癒￺いや￻す　パワーが\n￹絶￺た￻えず　￹降￺ふ￻り￹注￺そそ￻いでいるという。"
        jp_kanji:
          scarlet: "￹自分￺じぶん￻の　テリトリーに　￹見事￺みごと￻な\n￹花園￺はなぞの￻を　￹作￺つく￻る。　￹首￺くび￻まわりの\n￹赤￺あか￻い￹花￺はな￻の　パワーを　￹引￺ひ￻き￹出￺だ￻す。"
          violet: "フラージェスの　￹作￺つく￻った　￹花園￺はなぞの￻は\n￹心￺こころ￻と　￹体￺からだ￻を　￹癒￺いや￻す　パワーが\n￹絶￺た￻えず　￹降￺ふ￻り￹注￺そそ￻いでいるという。"
        en:
          scarlet: "This Pokémon creates an impressive flower\ngarden in its territory. It draws forth the power\nof the red flowers around its neck."
          violet: "They say that flower gardens created by Florges\nare constantly showered with a power that can\nheal both body and spirit."
        fr:
          scarlet: "Ce Pokémon transforme son territoire en\nmagnifique jardin fleuri. Il tire sa puissance\ndes fleurs rouges qui ornent son cou."
          violet: "On dit que les jardins fleuris qu’ils créent\ndégagent une énergie inépuisable qui a\nle pouvoir d’apaiser le corps et l’esprit."
        it:
          scarlet: "Questo Pokémon trasforma il proprio territorio\nin uno splendido giardino fiorito. I suoi poteri\nderivano dai fiori rossi che ha attorno al collo."
          violet: "Si dice che nei giardini fioriti realizzati dai\nFlorges si riversi costantemente un potere\ncapace di guarire il corpo e la mente."
        de:
          scarlet: "In seinem Revier legt Florges einen prächtigen\nBlumengarten an. Es schöpft seine Kraft aus den\nroten Blumen um seinen Hals."
          violet: "Es heißt, die von ihm angelegten Blumengärten\nsollen unablässig eine Energie verströmen,\ndie Körper und Geist heilt."
        es:
          scarlet: "Hace de su territorio un jardín esplendoroso.\nExtrae su poder de las flores rojas que lleva en\ntorno al cuello."
          violet: "Se dice que en los jardines creados por este\nPokémon fluye constantemente una energía que\nsana la mente y el cuerpo."
        ko:
          scarlet: "자신의 영역에 멋진 화원을 만든다.\n목을 감싸고 있는\n빨간 꽃의 파워를 끌어낸다."
          violet: "플라제스가 만든 화원은\n몸과 마음을 치유하는 힘이\n끊임없이 나온다고 전해진다."
        zh_simp:
          scarlet: "会在自己的地盘内\n打造出漂亮的花园。\n能激发颈部上红花的力量。"
          violet: "据说由花洁夫人打造的花园中\n会源源不断地倾注着\n能够治愈身心的力量。"
        zh_trad:
          scarlet: "會在自己的地盤內\n打造出漂亮的花園。\n能激發頸部上紅花的力量。"
          violet: "據說花潔夫人打造的花園裡\n會源源不絕地傾注著\n能夠治癒身心的力量。"
