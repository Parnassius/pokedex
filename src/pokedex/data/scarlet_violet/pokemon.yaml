      descriptions:
        jp_kana:
          scarlet: "￹夜￺よる￻　￹姿￺すがた￻を　￹見￺み￻かけると\n￹不吉￺ふきつ￻なことが　￹起￺お￻きると　￹信￺しん￻じられ\n￹忌￺い￻み￹嫌￺きら￻われている　ポケモン。"
          violet: "ヤミカラスを　￹見￺み￻かけて　￹不用意￺ふようい￻に\n￹後￺あと￻を　つけていくと　￹迷￺まよ￻わされ\n￹山道￺やまみち￻に　￹置￺お￻いてけぼりに　される。"
        jp_kanji:
          scarlet: "￹夜￺よる￻　￹姿￺すがた￻を　￹見￺み￻かけると\n￹不吉￺ふきつ￻なことが　￹起￺お￻きると　￹信￺しん￻じられ\n￹忌￺い￻み￹嫌￺きら￻われている　ポケモン。"
          violet: "ヤミカラスを　￹見￺み￻かけて　￹不用意￺ふようい￻に\n￹後￺あと￻を　つけていくと　￹迷￺まよ￻わされ\n￹山道￺やまみち￻に　￹置￺お￻いてけぼりに　される。"
        en:
          scarlet: "Feared and loathed by many, it is believed to\nbring misfortune to all those who see it at night."
          violet: "If spotted, it will lure an unwary person into\nchasing it, then lose the pursuer on mountain\ntrails."
        fr:
          scarlet: "Ce Pokémon redouté et peu aimé porterait\nmalheur à quiconque l’aperçoit la nuit."
          violet: "Cornèbre attire, puis abandonne dans les\nmontagnes quiconque l’aperçoit et tente\nde le suivre."
        it:
          scarlet: "Molti lo temono e lo detestano credendo che\nporti sfortuna a chiunque lo veda di notte."
          violet: "Se individuato, cerca di attirare il malcapitato\nche lo insegue su sentieri di montagna per farlo\nsmarrire."
        de:
          scarlet: "Viele verabscheuen und hassen es, da sie\nglauben, es bringe Unglück, wenn sie ihm\nnachts begegnen."
          violet: "Entdeckt man ein Kramurx und folgt ihm\nleichtsinnig, lockt es einen auf Bergpfade und\nbringt einen dazu, sich zu verlaufen."
        es:
          scarlet: "Temido y odiado por muchos, dicen que trae\nla desgracia a todos aquellos que lo ven por\nla noche."
          violet: "Si algún incauto logra detectarlo, se verá\nabocado a perseguirlo hasta perderse en\nlas montañas."
        ko:
          scarlet: "밤에 모습을 보게 되면\n불길한 일이 생긴다고 여겨져\n몹시 미움받는 포켓몬이다."
          violet: "니로우를 발견했을 때\n조심성 없이 따라가면\n길을 잃고 산중에 혼자 남게 된다."
        zh_simp:
          scarlet: "人们相信晚上看到它\n就会发生不吉利的事。\n因此，它是受人忌讳的宝可梦。"
          violet: "遇见黑暗鸦时，若是\n毫无提防地跟随其后就会\n受到迷惑，并被丢在山路上。"
        zh_trad:
          scarlet: "人們相信晚上看到牠\n就會發生不吉利的事，\n這讓牠成了人見人厭的寶可夢。"
          violet: "遇見黑暗鴉時，如果隨便就\n跟在牠後面走，反而會遭到\n迷惑而一個人被丟在山路上。"
