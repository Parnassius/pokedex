        - commander
      hidden_ability: storm_drain
      descriptions:
        jp_kana:
          scarlet: "￹鳥￺とり￻ポケモンが　おもな　￹獲物￺えもの￻だ。\n￹自分￺じぶん￻の　￹弱￺よわ￻さを　￹知￺し￻っており\n￹仲間￺なかま￻と　コンビで　￹狩￺か￻りをするぞ。"
          violet: "ドラゴンポケモンの　なかでも\n￹賢￺かしこ￻さは　トップクラス。\nのど￹袋￺ぶくろ￻を　ふくらませ　￹擬態￺ぎたい￻する。"
        jp_kanji:
          scarlet: "￹鳥￺とり￻ポケモンが　おもな　￹獲物￺えもの￻だ。\n￹自分￺じぶん￻の　￹弱￺よわ￻さを　￹知￺し￻っており\n￹仲間￺なかま￻と　コンビで　￹狩￺か￻りをするぞ。"
          violet: "ドラゴンポケモンの　なかでも\n￹賢￺かしこ￻さは　トップクラス。\nのど￹袋￺ぶくろ￻を　ふくらませ　￹擬態￺ぎたい￻する。"
        en:
          scarlet: "Bird Pokémon are its main prey. This Pokémon\nknows it’s weak, so it hunts with a partner."
          violet: "It’s one of the most intelligent dragon Pokémon.\nIt camouflages itself by inflating its throat sac."
        fr:
          scarlet: "Il se nourrit principalement de Pokémon oiseaux.\nConscient de sa faiblesse, il chasse accompagné\nd’un partenaire."
          violet: "C’est l’un des Pokémon Dragon les plus\nintelligents. Il se camoufle en faisant gonfler\nson sac gulaire."
        it:
          scarlet: "Le sue prede principali sono i Pokémon alati.\nSa di essere debole e per questo preferisce\navere un compagno di caccia."
          violet: "È uno dei Pokémon di tipo Drago più intelligenti.\nSi mimetizza gonfiando la sacca sulla gola."
        de:
          scarlet: "Seine Beute sind hauptsächlich Vogel-Pokémon.\nDa es sich seiner eigenen Schwäche bewusst ist,\njagt es zusammen mit einem Partner."
          violet: "Unter den Drachen-Pokémon ist es eines der\nintelligentesten. Es tarnt sich, indem es seinen\nKehlsack aufbläht."
        es:
          scarlet: "Se alimenta principalmente de Pokémon pájaro.\nEs consciente de que es débil, por lo que caza\njunto a un compañero."
          violet: "Uno de los Pokémon dragón más inteligentes que\nexisten. Hincha su saco gular para camuflarse."
        ko:
          scarlet: "새포켓몬이 주된 먹이다.\n자신이 약한 것을 알기 때문에\n동료와 콤비를 이뤄 사냥을 한다."
          violet: "드래곤포켓몬 중에서도\n현명함은 톱클래스다.\n목의 주머니를 부풀려서 위장한다."
        zh_simp:
          scarlet: "鸟宝可梦是它主要的猎物。\n对自己的弱小心知肚明，\n因此会和伙伴结伴狩猎。"
          violet: "即使在龙宝可梦当中，\n它的智商也是名列前茅。\n会膨胀喉囊来拟态。"
        zh_trad:
          scarlet: "鳥寶可夢是牠主要的獵物。\n對自己的弱小心知肚明，\n因此都會和夥伴結伴狩獵。"
          violet: "牠的智商即使在龍寶可夢中\n也可以說是數一數二。\n會鼓起喉囊來擬態。"
