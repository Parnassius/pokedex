          scarlet: "￹体￺からだ￻の　￹横側￺よこがわ￻にある　ラインは\n￹太陽￺たいよう￻の￹光￺ひかり￻を　￹溜￺た￻めておける。\n￹夜￺よる￻になると　￹鮮￺あざ￻やかに　￹輝￺かがや￻く。"
          violet: "ピンク￹色￺いろ￻の　￹皮￺かわ￻の　￹部分￺ぶぶん￻は\n￹太陽光￺たいようこう￻を　￹溜￺た￻めて　￹光￺ひか￻る。\nカモフラージュのためと　いわれる。"
        jp_kanji:
          scarlet: "￹体￺からだ￻の　￹横側￺よこがわ￻にある　ラインは\n￹太陽￺たいよう￻の￹光￺ひかり￻を　￹溜￺た￻めておける。\n￹夜￺よる￻になると　￹鮮￺あざ￻やかに　￹輝￺かがや￻く。"
          violet: "ピンク￹色￺いろ￻の　￹皮￺かわ￻の　￹部分￺ぶぶん￻は\n￹太陽光￺たいようこう￻を　￹溜￺た￻めて　￹光￺ひか￻る。\nカモフラージュのためと　いわれる。"
        en:
          scarlet: "The line running down its side can store sunlight.\nIt shines vividly at night."
          violet: "It absorbs sunlight with the pink areas of its skin,\nwhich then shine. This appears to be a form of\ncamouflage."
        fr:
          scarlet: "La ligne qui fait le tour de son corps emmagasine\nl’énergie solaire et brille intensément la nuit."
          violet: "Les parties roses de sa peau emmagasinent\nles rayons solaires, puis se mettent à briller.\nIl s’agirait d’une technique de camouflage."
        it:
          scarlet: "La linea che contorna il suo corpo immagazzina\nla luce solare. Di notte si illumina di una luce\nsplendente."
          violet: "I motivi rosa sul suo corpo brillano dopo aver\nimmagazzinato la luce solare. Pare che questa\nsia una forma di mimetismo."
        de:
          scarlet: "Die Linie an seiner Seite kann Sonnenlicht\nspeichern. Nachts leuchtet es sehr intensiv."
          violet: "Der rosafarbene Teil seiner Haut speichert\nSonnenlicht und leuchtet. Es wird angenommen,\ndass dies der Tarnung dient."
        es:
          scarlet: "La línea que le recorre el costado puede\nalmacenar luz solar. Brilla con mucha fuerza\npor la noche."
          violet: "Las marcas rosadas de su piel brillan con\nintensidad tras almacenar luz solar. Se cree\nque esta característica le permite camuflarse."
        ko:
          scarlet: "몸 옆쪽에 있는 줄에\n태양 빛을 모아 둘 수 있다.\n밤이 되면 아름답게 빛난다."
          violet: "핑크색의 가죽 부분은\n태양광을 모아서 빛을 낸다.\n위장하기 위해서라고 전해진다."
        zh_simp:
          scarlet: "身体侧面的线条会储存太阳光。\n到了夜里就会鲜亮闪烁。"
          violet: "粉红色的那部分皮肤\n会储存太阳光并发光。\n听说是用来做保护色的。"
        zh_trad:
          scarlet: "體側的線條會儲存陽光。\n一到晚上就會鮮明閃耀。"
          violet: "粉紅色的皮膚部分\n會儲存太陽光發光。\n聽說是用來做保護色的。"
