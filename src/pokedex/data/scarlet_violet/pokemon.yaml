        jp_kana:
          scarlet: "￹昼寝￺ひるね￻の　￹邪魔￺じゃま￻を　されるのが　￹大嫌￺だいきら￻い。\n￹日光浴￺にっこうよく￻で　￹溜￺た￻めた　エネルギーで\nビームを　￹撃￺う￻ち￹出￺だ￻す。"
          violet: "￹落￺お￻ち￹着￺つ￻いて　￹日光浴￺にっこうよく￻　できるよう\nカリキリ￹専用￺せんよう￻の　フラワーポットを\n￹与￺あた￻える　トレーナーも　￹多￺おお￻い。"
        jp_kanji:
          scarlet: "￹昼寝￺ひるね￻の　￹邪魔￺じゃま￻を　されるのが　￹大嫌￺だいきら￻い。\n￹日光浴￺にっこうよく￻で　￹溜￺た￻めた　エネルギーで\nビームを　￹撃￺う￻ち￹出￺だ￻す。"
          violet: "￹落￺お￻ち￹着￺つ￻いて　￹日光浴￺にっこうよく￻　できるよう\nカリキリ￹専用￺せんよう￻の　フラワーポットを\n￹与￺あた￻える　トレーナーも　￹多￺おお￻い。"
        en:
          scarlet: "Fomantis hates having its naps interrupted. It fires\noff beams using energy it gathers by bathing in\nthe sun."
          violet: "Many Trainers give their Fomantis their own\nflowerpots so they can sunbathe in peace\nand quiet."
        fr:
          scarlet: "Ce Pokémon déteste qu’on le dérange pendant\nsa sieste. Il projette des rayons grâce à l’énergie\nsolaire qu’il emmagasine."
          violet: "De nombreux Dresseurs leur donnent des pots\nde fleurs afin qu’ils puissent prendre des bains\nde soleil en toute tranquillité."
        it:
          scarlet: "Detesta chiunque disturbi le sue pennichelle\ndiurne. Standosene al sole accumula energia\nche poi rilascia in forma di potenti raggi."
          violet: "Molti Allenatori garantiscono a questo Pokémon\nl’uso esclusivo di un vaso, così che possa\nprendere il sole in tranquillità."
        de:
          scarlet: "Es wird nicht gern beim Mittagsschlaf gestört.\nMithilfe der Energie, die es beim Sonnenbaden\nsammelt, kann es Strahlen abfeuern."
          violet: "Viele Trainer geben Imantis einen eigenen\nBlumentopf, damit es ungestört sonnenbaden\nkann."
        es:
          scarlet: "Detesta que lo molesten cuando echa la siesta.\nDispara rayos empleando la energía que ha\nacumulado al tomar el sol."
          violet: "Muchos Entrenadores les preparan sus propias\nmacetas para que puedan tomar el sol tranquilos."
        ko:
          scarlet: "낮잠을 방해받는 것을 매우 싫어한다.\n일광욕으로 모은 에너지로\n빔을 발사할 수 있다."
          violet: "조용히 일광욕을 할 수 있도록\n짜랑랑 전용 화분을 마련하는\n트레이너도 많다."
        zh_simp:
          scarlet: "非常讨厌在睡午觉时被打扰。\n会用通过日光浴储存的\n能量放射出光束。"
          violet: "有很多训练家会给\n伪螳草它专用的花盆，\n好让它能平静地享受日光浴。"
        zh_trad:
          scarlet: "極度厭惡睡午覺的時候\n遭到打擾。會用日光浴\n儲存的能量放射出光束。"
          violet: "有很多訓練家會給牠\n偽螳草專用的花盆，\n好讓牠能平靜地享受日光浴。"
