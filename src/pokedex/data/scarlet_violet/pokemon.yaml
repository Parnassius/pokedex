      abilities:
        - technician
        - pickup
      hidden_ability: skill_link
      descriptions:
        jp_kana:
          scarlet: "￹大￺おお￻きな　￹木￺き￻の￹上￺うえ￻で　￹暮￺く￻らす。\n￹仲間￺なかま￻と　￹尻尾￺しっぽ￻を　つなぐことで\n￹気持￺きも￻ちを　￹伝￺つた￻え￹合￺あ￻うと　いわれる。"
          violet: "２￹本￺ほん￻に　￹分￺わ￻かれた　￹尻尾￺しっぽ￻は\nいろんなことが　￹器用￺きよう￻に　できるので\nほとんど　￹手￺て￻を　￹使￺つか￻わなくなった。"
        jp_kanji:
          scarlet: "￹大￺おお￻きな　￹木￺き￻の￹上￺うえ￻で　￹暮￺く￻らす。\n￹仲間￺なかま￻と　￹尻尾￺しっぽ￻を　つなぐことで\n￹気持￺きも￻ちを　￹伝￺つた￻え￹合￺あ￻うと　いわれる。"
          violet: "２￹本￺ほん￻に　￹分￺わ￻かれた　￹尻尾￺しっぽ￻は\nいろんなことが　￹器用￺きよう￻に　できるので\nほとんど　￹手￺て￻を　￹使￺つか￻わなくなった。"
        en:
          scarlet: "They live on large trees. They are said to\ncommunicate by connecting their tails to\nthose of others."
          violet: "Split into two, the tails are so adept at handling\nand doing things that Ambipom rarely uses its\nhands."
        fr:
          scarlet: "Les Capidextre vivent dans les grands arbres.\nOn dit qu’ils peuvent communiquer\nleurs émotions en reliant leurs queues."
          violet: "Ses queues jumelles sont si agiles et si efficaces\nque Capidextre ne se sert que très rarement\nde ses bras."
        it:
          scarlet: "Vivono su grandi alberi. Pare che si comunichino\nle emozioni a vicenda unendo le proprie code\na quelle degli altri."
          violet: "Con le sue due agili code riesce a fare di tutto,\nperciò usa le mani solo raramente."
        de:
          scarlet: "Sie leben auf hohen Bäumen. Man sagt, sie teilen\nsich ihre Gefühle mit, indem sie ihre Schweife\nmiteinander verbinden."
          violet: "Sein Schweif hat sich in zwei gespalten. Es kann\nso geschickt mit diesen Schweifen umgehen,\ndass es seine Hände nur noch selten gebraucht."
        es:
          scarlet: "Viven en los árboles más grandes. Se dice que\ncomunican sus emociones uniendo las colas\ncon sus congéneres."
          violet: "Tiene dos colas muy útiles y hábiles para\nmanejar cosas, así que rara vez utiliza las\nmanos."
        ko:
          scarlet: "큰 나무 위에서 산다.\n동료와 꼬리를 이으면\n기분을 전달할 수 있다고 전해진다."
          violet: "2개로 나뉜 꼬리를\n능숙하게 사용할 수 있어서\n손을 거의 쓰지 않게 됐다."
        zh_simp:
          scarlet: "在巨大的树木上生活。\n据说伙伴之间会通过\n连起尾巴来互相传达心情。"
          violet: "因为分成２条的尾巴\n能灵巧地处理各种事情，\n所以变得几乎不会使用手。"
        zh_trad:
          scarlet: "生活在巨大的樹木上。\n據說會透過與夥伴連起\n尾巴來互相傳達心情。"
          violet: "分叉成２根的尾巴非常靈活，\n能夠完成各式各樣的事情，\n因此變得幾乎不使用雙手了。"
