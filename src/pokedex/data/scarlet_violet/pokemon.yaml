        jp_kanji:
          scarlet: "￹頭￺あたま￻に　でっぱりが　あって\n￹非常￺ひじょう￻に　￹硬￺かた￻い。　￹頭突￺ずつ￻きで\n￹氷山￺ひょうざん￻を　￹割￺わ￻って　￹進￺すす￻む。"
          violet: "￹寒￺さむ￻くなるほど　￹元気￺げんき￻になって\n￹氷￺こおり￻の　￹浮￺う￻かぶ　￹冷￺つめ￻たい　￹海￺うみ￻を\nうれしそうに　￹泳￺およ￻ぎまわる。"
        en:
          scarlet: "The protrusion on its head is very hard. It is\nused for bashing through thick ice."
          violet: "The colder it gets, the better it feels. It joyfully\nswims around oceans so cold that they are filled\nwith floating ice."
        fr:
          scarlet: "La corne sur son front est très résistante.\nElle lui sert à se frayer un chemin à travers\nles icebergs."
          violet: "Il nage joyeusement dans les mers glacées.\nPlus il fait froid, mieux il se sent."
        it:
          scarlet: "La protuberanza che ha sulla testa è\nestremamente dura. Si fa strada tra\ngli iceberg spaccandoli a testate."
          violet: "Più fa freddo, più si sente a suo agio.\nSi diverte a nuotare tra i blocchi di ghiaccio\ndei mari più gelidi."
        de:
          scarlet: "Dieses Pokémon verfügt über ein sehr hartes\nHorn. Mit Kopfstößen durchbricht es Eismassen\nin seinem Weg."
          violet: "Je niedriger die Temperatur, desto wohler\nfühlt es sich. Es schwimmt vergnügt durch\nkalte Meere, auf denen Eisschollen treiben."
        es:
          scarlet: "La protuberancia que tiene en la cabeza es tan\ndura que la usa para abrirse paso a cabezazos\npor el hielo de los icebergs."
          violet: "Nada feliz de un lado para otro en los mares\nhelados donde flotan trozos de hielo. Cuanto\nmás frío hace, mejor se siente."
        ko:
          scarlet: "머리에 있는 뿔은 매우 단단하다.\n박치기로 빙산을 부수며 나아간다."
          violet: "추워질수록 기운이 나\n얼음이 떠 있는 차가운 바다를\n기쁜 듯이 헤엄친다."
        zh_simp:
          scarlet: "头上有非常坚硬的\n突起部分。会用头锤\n撞破冰山来开路前进。"
          violet: "温度越低它就会越有精神，\n并会在浮着冰块的寒冷大海\n看起来很快乐地游来游去。"
        zh_trad:
          scarlet: "頭上有著非常堅硬的\n突起部分。能夠用頭錘\n撞破冰山來開路前進。"
          violet: "天氣越冷就會越有精神，\n並且會開心地在有浮冰的\n寒冷大海游來游去。"
