      descriptions:
        jp_kana:
          scarlet: "￹枯￺か￻れている　￹草花￺くさばな￻を　￹見￺み￻つけると\n￹自分￺じぶん￻の　テリトリーへ　￹持￺も￻ち￹帰￺かえ￻り\n￹世話￺せわ￻をして　￹元気￺げんき￻にしてあげる。"
          violet: "￹色￺いろ￻の　￹波長￺はちょう￻を　￹通￺つう￻じて\n￹花￺はな￻と　パワーを　￹交換￺こうかん￻する。\n￹青色￺あおいろ￻の　￹波長￺はちょう￻と　￹合￺あ￻わせられる　￹個体￺こたい￻。"
        jp_kanji:
          scarlet: "￹枯￺か￻れている　￹草花￺くさばな￻を　￹見￺み￻つけると\n￹自分￺じぶん￻の　テリトリーへ　￹持￺も￻ち￹帰￺かえ￻り\n￹世話￺せわ￻をして　￹元気￺げんき￻にしてあげる。"
          violet: "￹色￺いろ￻の　￹波長￺はちょう￻を　￹通￺つう￻じて\n￹花￺はな￻と　パワーを　￹交換￺こうかん￻する。\n￹青色￺あおいろ￻の　￹波長￺はちょう￻と　￹合￺あ￻わせられる　￹個体￺こたい￻。"
        en:
          scarlet: "Whenever this Pokémon finds flowering plants\nthat are withering, it will bring them back to its\nterritory and care for them until they are healthy."
          violet: "It exchanges power with flowers via wavelengths\nof visible light. This form of Floette can sync with\nthe wavelength that produces the color blue."
        fr:
          scarlet: "Lorsqu’il trouve des fleurs fanées, il les rapporte\nsur son territoire et s’occupe d’elles afin qu’elles\nretrouvent leur éclat."
          violet: "Ce Pokémon échange de la puissance avec les\nfleurs grâce aux longueurs d’onde des couleurs.\nIl peut se synchroniser avec les fleurs bleues."
        it:
          scarlet: "Quando trova piante da fiore secche le porta\ncon sé nel suo territorio e se ne prende cura\nfinché non tornano in forze."
          violet: "Scambia potere con i fiori attraverso la lunghezza\nd’onda dei loro colori. Questo Floette può\nentrare in sintonia con il colore blu."
        de:
          scarlet: "Entdeckt es verwelkte Blumen, bringt es diese\nin sein Revier, wo es sie pflegt und wieder\naufpäppelt."
          violet: "Es tauscht mit Blumen über die Wellenlänge ihrer\nFarben Kraft aus. Dieses Exemplar ist mit der\nWellenlänge der Farbe Blau synchronisiert."
        es:
          scarlet: "Cuando encuentra plantas en flor marchitas,\nse las lleva a su territorio y cuida de ellas para\nque se recuperen."
          violet: "Intercambia poder con las flores sintonizando\ncon la longitud de onda de su color; en el caso\nde esta forma, con las flores azules."
        ko:
          scarlet: "시들어 가는 화초를 발견하면\n자신의 영역으로 가져와 돌보며\n기운이 나게 한다."
          violet: "색의 파장을 통해\n꽃과 파워를 교환한다.\n파란 꽃과 파장을 맞출 수 있는 개체."
        zh_simp:
          scarlet: "只要发现枯萎的花草\n就会带回自己的地盘\n照料，使其恢复活力。"
          violet: "能通过颜色的波长\n与花交换力量。这个样子\n是能与蓝色的波长结合的个体。"
        zh_trad:
          scarlet: "只要發現枯萎的花草，\n就會帶回自己的地盤\n照料，使其恢復活力。"
          violet: "能透過顏色的波長與花\n交換力量。這個樣子是能\n與藍色的波長結合的個體。"
    floette_white_flower:
      form_id: 4
      names:
        jp_kana: しろいはな
        jp_kanji: しろいはな
        en: White Flower
        fr: Fleur Blanche
        it: Fiore Bianco
        de: Weißblütler
