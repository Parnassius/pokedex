        jp_kana:
          scarlet: "ボンッという　￹音￺おと￻がして　つぼみが\n￹開￺ひら￻くと　アレルギーを　￹起￺お￻こす\n￹毒花粉￺どくかふん￻を　ばら￹撒￺ま￻きはじめる。"
          violet: "￹世界一￺せかいいち￻　￹大￺おお￻きい　￹花￺はな￻びらから\nアレルギーを　￹起￺お￻こす　￹花粉￺かふん￻を\n￹鬼￺おに￻のように　ばら￹撒￺ま￻く。"
        jp_kanji:
          scarlet: "ボンッという　￹音￺おと￻がして　つぼみが\n￹開￺ひら￻くと　アレルギーを　￹起￺お￻こす\n￹毒花粉￺どくかふん￻を　ばら￹撒￺ま￻きはじめる。"
          violet: "￹世界一￺せかいいち￻　￹大￺おお￻きい　￹花￺はな￻びらから\nアレルギーを　￹起￺お￻こす　￹花粉￺かふん￻を\n￹鬼￺おに￻のように　ばら￹撒￺ま￻く。"
        en:
          scarlet: "The bud bursts into bloom with a bang. It then\nstarts scattering allergenic, poisonous pollen."
          violet: "It fiendishly scatters allergenic pollen from its\npetals, which are the largest in the world."
        fr:
          scarlet: "Son bourgeon éclot en détonant. Il se met\nensuite à disperser du pollen empoisonné\nqui provoque des allergies."
          violet: "Il possède les plus grands pétales au monde.\nÀ cause du pollen qu’il libère, ce Pokémon\npeut causer de terribles allergies."
        it:
          scarlet: "Il bocciolo fiorisce con un botto e inizia\na rilasciare un polline velenoso che provoca\nreazioni allergiche."
          violet: "I suoi petali sono i più grandi al mondo e\ndiffondono un’enorme quantità di polline\nallergenico."
        de:
          scarlet: "Seine Knospe öffnet sich mit einem Knall.\nAnschließend beginnt es, seine allergenen,\ngiftigen Pollen zu verteilen."
          violet: "Es besitzt die größten Blütenblätter der Welt.\nAus ihnen verstreut es wie besessen Pollen,\ndie Allergien auslösen."
        es:
          scarlet: "El capullo florece de golpe con un chasquido,\ntras lo cual comienza a desprender un polen\nalergénico y venenoso."
          violet: "Posee los pétalos más grandes del mundo,\ndesde los que desprende una cantidad ingente\nde polen alergénico."
        ko:
          scarlet: "펑 하는 소리와 함께 꽃봉오리가\n열리면 알레르기를 일으키는\n독 꽃가루가 흩뿌려진다."
          violet: "세계에서 가장 큰 꽃잎으로\n알레르기를 일으키는 꽃가루를\n무섭게 흩뿌려 댄다."
        zh_simp:
          scarlet: "当花苞伴随“砰”的一声\n绽放时，就会开始散播\n能引起过敏的毒花粉。"
          violet: "会从世界上最大的花瓣\n疯狂散播能引起过敏的花粉。"
        zh_trad:
          scarlet: "當花苞隨著「砰！」的聲響\n綻放後，就會開始散播\n能引起過敏反應的毒花粉。"
          violet: "會從那全世界最大的\n花瓣瘋狂地散播能引起\n過敏反應的花粉。"
