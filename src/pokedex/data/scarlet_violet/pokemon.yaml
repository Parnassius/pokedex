        jp_kanji:
          scarlet: "￹手作￺てづく￻りの　ハンマーを　￹振￺ふ￻りまわして\n￹身￺み￻を　￹守￺まも￻るが　￹金属￺きんぞく￻を　￹食￺た￻べる\nポケモンには　よく　￹奪￺うば￻われる。"
          violet: "￹鉄￺てつ￻くずを　￹叩￺たた￻いて　ハンマーを\n￹作￺つく￻る。　￹納得￺なっとく￻がいく　ものが\nできるまで　￹何度￺なんど￻も　￹作￺つく￻り￹直￺なお￻す。"
        en:
          scarlet: "It swings its handmade hammer around to protect\nitself, but the hammer is often stolen by Pokémon\nthat eat metal."
          violet: "This Pokémon pounds iron scraps together to\nmake a hammer. It will remake the hammer again\nand again until it’s satisfied with the result."
        fr:
          scarlet: "Il se défend en brandissant un marteau qu’il a créé\nlui-même, mais les Pokémon qui se nourrissent\nde métaux ont tendance à le lui voler."
          violet: "Ce Pokémon frappe des copeaux de ferraille\nafin de se fabriquer un marteau. Il persévère\njusqu’à ce qu’il soit satisfait du résultat."
        it:
          scarlet: "Si difende adoperando un martello che ha\nforgiato personalmente, anche se spesso\ni Pokémon ghiotti di metallo glielo rubano."
          violet: "Forgia il suo martello colpendo ripetutamente\ndei pezzi di ferraglia. Se non è soddisfatto del\nrisultato, ricomincia più e più volte da capo."
        de:
          scarlet: "Es schwingt seinen handgeschmiedeten Hammer,\num sich zu schützen. Dieser wird ihm allerdings\noft von Pokémon gestohlen, die Metall fressen."
          violet: "Es stellt seinen Hammer her, indem es Eisenspäne\nzusammenstampft. Diesen Vorgang wiederholt es\nso oft, bis es mit dem Ergebnis zufrieden ist."
        es:
          scarlet: "Agita su martillo forjado a mano para ahuyentar\na posibles amenazas, pero los Pokémon que se\nalimentan a base de metal suelen robárselo."
          violet: "Forja su martillo golpeando residuos metálicos.\nRepite este proceso todas las veces que sean\nnecesarias hasta que le satisfaga el resultado."
        ko:
          scarlet: "손수 만든 해머를 휘둘러\n몸을 지키려 하나\n금속을 먹는 포켓몬에게 자주 빼앗기고 만다."
          violet: "쇠 부스러기를 두드려 해머를 만든다.\n만족스러운 물건이 나올 때까지\n몇 번이고 다시 만든다."
        zh_simp:
          scarlet: "挥动手工制造的锤子来\n保护自己，但却经常被\n会吃金属的宝可梦抢走锤子。"
          violet: "敲打铁屑来制作锤子。\n直到做出满意的作品前，\n会一遍又一遍地重做。"
        zh_trad:
          scarlet: "雖然會揮舞著手工打造的\n錘子來保護自己，但卻常被\n以金屬為食的寶可夢搶走。"
          violet: "敲打鐵屑來製作錘子。\n直到做出自己滿意的作品前，\n會一次又一次地重做。"
