      descriptions:
        jp_kana:
          scarlet: "７￹匹￺ひき￻の　オロチュが　￹蜜飴￺みつあめ￻で\n￹作￺つく￻った　りんごのなかで　￹暮￺く￻らす。\n￹真￺ま￻ん￹中￺なか￻の　オロチュが　￹司令塔￺しれいとう￻。"
          violet: "￹気￺き￻まぐれな　オロチュたちの　￹寄￺よ￻り￹合￺あ￻い\n￹所帯￺じょたい￻。　まれに　￹気持￺きも￻ちが　￹合￺あ￻うと\n￹本来￺ほんらい￻の　￹力￺ちから￻を　￹発揮￺はっき￻する。"
        jp_kanji:
          scarlet: "７￹匹￺ひき￻の　オロチュが　￹蜜飴￺みつあめ￻で\n￹作￺つく￻った　りんごのなかで　￹暮￺く￻らす。\n￹真￺ま￻ん￹中￺なか￻の　オロチュが　￹司令塔￺しれいとう￻。"
          violet: "￹気￺き￻まぐれな　オロチュたちの　￹寄￺よ￻り￹合￺あ￻い\n￹所帯￺じょたい￻。　まれに　￹気持￺きも￻ちが　￹合￺あ￻うと\n￹本来￺ほんらい￻の　￹力￺ちから￻を　￹発揮￺はっき￻する。"
        en:
          scarlet: "Seven syrpents live inside an apple made\nof syrup. The syrpent in the center is the\ncommander."
          violet: "These capricious syrpents have banded together.\nOn the rare occasion that their moods align,\ntheir true power is unleashed."
        fr:
          scarlet: "Sept « Verochi » vivent dans une pomme\ncomposée de nectar. Celui qui se trouve\nau centre est le chef du groupe."
          violet: "Ces « Verochi » capricieux vivent sous le même\n« toit ». En de rares occasions, ils parviennent\nà s’entendre et libèrent tout leur potentiel."
        it:
          scarlet: "Sette creature dette Appliserpi vivono\nin un pomo fatto di melassa.\nL’Appliserpe al centro fa da comandante."
          violet: "Un gruppo di Appliserpi capricciose che occupa\nun’unica dimora. Nelle rare occasioni in cui si\ntrovano d’accordo, sfoderano la loro vera forza."
        de:
          scarlet: "Sieben sogenannte „Schlangel“ leben in einem\nApfel aus Nektar. Das Exemplar in der Mitte ist\nder Anführer."
          violet: "Es entfaltet seine wahre Stärke, wenn sich die\nzusammenlebende launische Gruppe sogenannter\n„Schlangel“ ausnahmsweise mal einig ist."
        es:
          scarlet: "Se trata de siete seres llamados Viborappli que\nviven juntos en una manzana de caramelo.\nEl del centro es el líder del grupo."
          violet: "Unos Viborappli caprichosos que comparten\nmorada. En raras ocasiones se ponen de acuerdo\ny son capaces de mostrar su verdadera fuerza."
        ko:
          scarlet: "7마리의 미드라가 꿀엿으로 만든\n사과 안에서 지낸다.\n가운데에 있는 미드라가 사령탑이다."
          violet: "변덕이 심한 미드라들의 집합.\n드물게 마음이 맞으면\n본래의 힘을 발휘한다."
        zh_simp:
          scarlet: "７只蛇虫虫生活在由蜜糖\n制成的苹果中。由正中间的\n蛇虫虫负责发号施令。"
          violet: "由善变的蛇虫虫们聚集而成。\n当它们偶尔心意相通时，\n就会发挥出真正的力量。"
        zh_trad:
          scarlet: "７隻蛇蟲蟲住在\n蜜糖製成的蘋果裡。\n由正中央的蛇蟲蟲發號施令。"
          violet: "由善變的蛇蟲蟲們聚集同住\n在一起。偶爾心靈相通時，\n就會發揮出真正的力量。"
