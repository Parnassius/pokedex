      descriptions:
        jp_kana:
          scarlet: "￹高速￺こうそく￻で　￹駆￺か￻け￹抜￺ぬ￻けると　￹翼￺つばさ￻は\n￹空気￺くうき￻の　￹刃￺やいば￻を　￹生￺う￻み￹出￺だ￻し\nまわりの￹木￺き￻は　￹切断￺せつだん￻　されている。"
          violet: "￹頭￺あたま￻に　ついた　２つの　￹突起￺とっき￻は\nセンサーの　￹役目￺やくめ￻。　￹遥￺はる￻か　￹先￺さき￻の\n￹獲物￺えもの￻の　￹様子￺ようす￻も　わかる。"
        jp_kanji:
          scarlet: "￹高速￺こうそく￻で　￹駆￺か￻け￹抜￺ぬ￻けると　￹翼￺つばさ￻は\n￹空気￺くうき￻の　￹刃￺やいば￻を　￹生￺う￻み￹出￺だ￻し\nまわりの￹木￺き￻は　￹切断￺せつだん￻　されている。"
          violet: "￹頭￺あたま￻に　ついた　２つの　￹突起￺とっき￻は\nセンサーの　￹役目￺やくめ￻。　￹遥￺はる￻か　￹先￺さき￻の\n￹獲物￺えもの￻の　￹様子￺ようす￻も　わかる。"
        en:
          scarlet: "It is said that when one runs at high speed,\nits wings create blades of wind that can fell\nnearby trees."
          violet: "The protuberances on its head serve as\nsensors. It can even detect distant prey."
        fr:
          scarlet: "Lorsqu’il est lancé à pleine vitesse, ses ailes\ncréent des lames de vent capables de trancher\nles arbres autour de lui."
          violet: "Les deux protubérances sur sa tête lui servent de\ncapteurs. Il peut ainsi détecter les mouvements\ndes proies très éloignées."
        it:
          scarlet: "Si dice che, quando va a tutta velocità,\nle sue ali creino lame d’aria in grado\ndi abbattere gli alberi vicini."
          violet: "Le protuberanze che ha ai lati della testa\nhanno funzione di sensori e percepiscono\nle prede anche a grande distanza."
        de:
          scarlet: "Stürmt es schnell vorwärts, erzeugen seine Flügel\nKlingen aus Wind, die in der Nähe stehende\nBäume fällen."
          violet: "Die beiden Fortsätze an seinem Kopf haben\ndie Funktion eines Sensors. Mit ihnen kann es\nauch weit entfernte Beute aufspüren."
        es:
          scarlet: "Se dice que, cuando va a velocidad máxima,\nsus alas crean cuchillas de viento que talan\ncualquier árbol."
          violet: "Las dos protuberancias que tiene en la\ncabeza le sirven de sensores. Puede rastrear\npresas que se encuentren a gran distancia."
        ko:
          scarlet: "고속으로 달려나가면\n날개가 공기의 칼날을 만들어 내고\n이로 인해 주변의 나무는 절단된다."
          violet: "머리에 달린 2개의 돌기는\n센서 역할을 한다. 저 멀리 있는\n먹이의 모습도 알 수 있다."
        zh_simp:
          scarlet: "在高速穿梭时，\n翅膀会生成空气之刃，\n使周围的树木都被切断。"
          violet: "头上长着的２个突起物\n是起感应器作用的。\n前方很远处猎物的样子也能知道。"
        zh_trad:
          scarlet: "當牠以高速奔馳時，\n翅膀會生成空氣之刃，\n使周遭的樹木都被切斷。"
          violet: "頭上長著的２個突起物\n是作為感應器的用途。\n就連遠處獵物的狀況也能察覺。"
