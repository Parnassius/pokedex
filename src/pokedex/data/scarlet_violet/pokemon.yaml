      descriptions:
        jp_kana:
          scarlet: "￹氷雪地帯￺ひょうせつちたい￻を　￹回遊￺かいゆう￻する。\n￹強靭￺きょうじん￻な　￹筋肉￺きんにく￻と\nぶ￹厚￺あつ￻い　￹皮下脂肪￺ひかしぼう￻で　￹体￺からだ￻を　￹守￺まも￻る。"
          violet: "￹氷￺こおり￻エネルギーの　￹集中￺しゅうちゅう￻する\n￹上￺うわ￻あごの　ツノが　￹超低温￺ちょうていおん￻になって\n￹周囲￺しゅうい￻を　￹凍￺こお￻らせる。"
        jp_kanji:
          scarlet: "￹氷雪地帯￺ひょうせつちたい￻を　￹回遊￺かいゆう￻する。\n￹強靭￺きょうじん￻な　￹筋肉￺きんにく￻と\nぶ￹厚￺あつ￻い　￹皮下脂肪￺ひかしぼう￻で　￹体￺からだ￻を　￹守￺まも￻る。"
          violet: "￹氷￺こおり￻エネルギーの　￹集中￺しゅうちゅう￻する\n￹上￺うわ￻あごの　ツノが　￹超低温￺ちょうていおん￻になって\n￹周囲￺しゅうい￻を　￹凍￺こお￻らせる。"
        en:
          scarlet: "This Pokémon wanders around snowy,\nicy areas. It protects its body with powerful\nmuscles and a thick layer of fat under its skin."
          violet: "Ice energy builds up in the horn on its\nupper jaw, causing the horn to reach cryogenic\ntemperatures that freeze its surroundings."
        fr:
          scarlet: "Ce Pokémon arpente les étendues de neige et\nde glace. Ses muscles puissants et son épaisse\ncouche de graisse protègent son corps."
          violet: "Il emmagasine de l’énergie de type Glace\ndans la corne de sa mâchoire, qui est si froide\nqu’elle gèle tout ce qui se trouve alentour."
        it:
          scarlet: "Si aggira per le regioni più fredde. Il suo corpo è\nprotetto da poderosi muscoli e da uno spesso\nstrato di grasso sottocutaneo."
          violet: "Concentra l’energia Ghiaccio nel corno sulla\nmascella superiore, portandolo a temperature\ntalmente basse da congelare ciò che ha intorno."
        de:
          scarlet: "Es wandert in eisigen Schneegebieten umher. Mit\nden starken Muskeln und der dicken Fettschicht\nunter seiner Haut schützt es seinen Körper."
          violet: "Im Horn seines Oberkiefers speichert es\nEis-Energie, wodurch dieses eisige Temperaturen\nannimmt und sein Umfeld einfriert."
        es:
          scarlet: "Este Pokémon vive en áreas cubiertas de nieve\ny hielo. Se protege con su fuerte musculatura\ny una gruesa capa de grasa subcutánea."
          violet: "Acumula energía gélida en el cuerno del maxilar\nsuperior, que llega a alcanzar temperaturas\nmuy bajas y congelar sus alrededores."
        ko:
          scarlet: "빙설 지대를 떼 지어 다닌다.\n강인한 근육과 두꺼운 피하지방으로\n몸을 보호한다."
          violet: "얼음 에너지를 집중시키면\n위턱의 뿔이 초저온이 되어\n주위를 얼려 버린다."
        zh_simp:
          scarlet: "会在冰雪地带回游。\n以强韧的肌肉和厚实的\n皮下脂肪来保护身体。"
          violet: "上颚的角集中了冰之能量，\n会使其变得超低温，\n以此来将自己的周围冻结。"
        zh_trad:
          scarlet: "迴游在冰雪地帶的寶可夢。\n會用強韌的肌肉和厚實的\n皮下脂肪保護自己的身體。"
          violet: "會集中冰能量使上顎的角\n變得超低溫，然後將自己\n附近的一切都凍成冰塊。"
