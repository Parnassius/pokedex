      descriptions:
        jp_kana:
          scarlet: "￹胸￺むね￻の　￹封印￺ふういん￻が　￹解￺と￻けてしまうと\n￹見境￺みさかい￻なく　￹暴￺あば￻れまわって\n￹街￺まち￻を　がれきの　￹山￺やま￻に　￹変￺か￻える。"
          violet: "ポケモンや　￹人￺ひと￻を　￹守￺まも￻るために\n￹古代人￺こだいじん￻によって　￹生￺う￻みだされた。\n￹謎￺なぞ￻の　エネルギーで　￹活動￺かつどう￻する。"
        jp_kanji:
          scarlet: "￹胸￺むね￻の　￹封印￺ふういん￻が　￹解￺と￻けてしまうと\n￹見境￺みさかい￻なく　￹暴￺あば￻れまわって\n￹街￺まち￻を　がれきの　￹山￺やま￻に　￹変￺か￻える。"
          violet: "ポケモンや　￹人￺ひと￻を　￹守￺まも￻るために\n￹古代人￺こだいじん￻によって　￹生￺う￻みだされた。\n￹謎￺なぞ￻の　エネルギーで　￹活動￺かつどう￻する。"
        en:
          scarlet: "When the seal on its chest is removed, it rages\nindiscriminately. During such rampages, it can\nturn a whole town into a mountain of rubble."
          violet: "Golurk were created by ancient people to\nprotect both people and Pokémon. They run\non a mysterious energy."
        fr:
          scarlet: "Si on lui retire le sceau qu’il a sur la poitrine, il\nentre dans une rage aveugle et peut alors réduire\ndes villes entières en montagnes de débris."
          violet: "Il a été créé par une civilisation antique pour\nprotéger les Pokémon et les êtres humains.\nLa source de son énergie est inconnue."
        it:
          scarlet: "Se il sigillo che ha sul petto viene rimosso,\nperde il controllo e distrugge tutto ciò che\nincontra, riducendo intere città in macerie."
          violet: "È stato creato dagli antichi per proteggere\nle persone e i Pokémon. È mosso da un’energia\nmisteriosa."
        de:
          scarlet: "Löst sich das Siegel auf seiner Brust, gerät es\nvöllig außer Kontrolle und legt ganze Städte in\nSchutt und Asche."
          violet: "Ein uraltes Volk erschuf es als Hüter von\nPokémon und Menschen. Es wird durch eine\nrätselhafte Energie angetrieben."
        es:
          scarlet: "Si se le desprende el sello del pecho, pierde el\ncontrol y arrasa con todo sin miramientos: puede\nconvertir un pueblo en un montón de escombros."
          violet: "Los Golurk fueron creados antaño para\nproteger a humanos y a Pokémon.\nFuncionan gracias a una extraña energía."
        ko:
          scarlet: "가슴에 있는 봉인이 풀리면\n무작정 날뛰고 다니면서\n마을을 폐허로 만들어 버린다."
          violet: "포켓몬이나 사람을 지키기 위해\n고대인에 의해 만들어졌다.\n의문의 에너지로 활동한다."
        zh_simp:
          scarlet: "胸口的封印如果解开，\n就会不管不顾地横冲直撞，\n把街道都变成瓦砾堆。"
          violet: "古代人为了保护宝可梦\n和人类而创造了它。\n利用神秘的能量来活动。"
        zh_trad:
          scarlet: "胸口的封印一旦解開\n就會不顧一切地四處大鬧，\n把街道全都化成瓦礫堆。"
          violet: "古代人為了保護寶可夢\n和人類而創造了牠。\n靠著神秘的能量來活動。"
