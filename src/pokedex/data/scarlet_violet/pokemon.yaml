          scarlet: "ジッとしていると　￹石￺いし￻ころ　にしか\n￹見￺み￻えないので　つい　￹踏￺ふ￻みつけると\nゲンコツを　￹振￺ふ￻りまわして　￹怒￺おこ￻る。"
          violet: "￹多￺おお￻くの￹人￺ひと￻は　￹気￺き￻づかないだけ。\nあたりを　よく　￹見￺み￻てみれば\nイシツブテは　たくさん　いる。"
        jp_kanji:
          scarlet: "ジッとしていると　￹石￺いし￻ころ　にしか\n￹見￺み￻えないので　つい　￹踏￺ふ￻みつけると\nゲンコツを　￹振￺ふ￻りまわして　￹怒￺おこ￻る。"
          violet: "￹多￺おお￻くの￹人￺ひと￻は　￹気￺き￻づかないだけ。\nあたりを　よく　￹見￺み￻てみれば\nイシツブテは　たくさん　いる。"
        en:
          scarlet: "At rest, it looks just like a rock. Carelessly\nstepping on it will make it swing its fists angrily."
          violet: "Most people may not notice, but a closer\nlook should reveal that there are many\nGeodude around."
        fr:
          scarlet: "Au repos, rien ne le distingue d’un caillou,\nmais si on lui marche dessus par mégarde,\nil s’énerve et agite ses poings."
          violet: "Peu de gens remarquent que de nombreux\nRacaillou nous entourent, mais il suffit de bien\nobserver les environs pour s’en rendre compte."
        it:
          scarlet: "Quando sta fermo sembra un sasso.\nSe viene calpestato, si infuria e agita\ni pugni."
          violet: "All’occhio dei più passano inosservati,\nma se ci si guarda intorno con attenzione\nsi possono notare parecchi Geodude."
        de:
          scarlet: "Ruhend sieht es fast wie ein Felsen aus,\ndoch tritt man auf ein Kleinstein, schwingt\nes wütend die Fäuste."
          violet: "Viele Leute bemerken dieses Pokémon nicht.\nSieht man sich die Umgebung jedoch genauer\nan, kann man dort viele Kleinstein entdecken."
        es:
          scarlet: "En reposo parece una roca normal,\npero responde agitando los puños\ncon agresividad si se pisa por error."
          violet: "Mucha gente no se percata, pero,\nsi mirasen a su alrededor, verían\nque hay Geodude por todas partes."
        ko:
          scarlet: "움직이지 않고 있으면 돌멩이로\n착각하여 무심코 밟게 되는데\n그러면 주먹을 휘두르며 화를 낸다."
          violet: "많은 사람들이 눈치채지 못할 뿐.\n주위를 잘 살펴보면\n꼬마돌이 많이 있다."
        zh_simp:
          scarlet: "不动的时候怎么看都是颗小石头。\n要是因此不小心踩到它，\n它就会挥舞拳头大发雷霆。"
          violet: "很多人只是没注意到，\n其实只要细心观察周围，\n就能发现有很多小拳石。"
        zh_trad:
          scarlet: "不動的時候怎麼看都是個小石頭。\n要是因此不小心一腳踩上去，\n牠是會猛揮拳頭大發雷霆的。"
          violet: "大多數人只是沒注意到，\n但只要仔細觀察四周，\n就會發現許多小拳石。"
