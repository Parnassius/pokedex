          violet: "￹甲羅￺こうら￻に　￹噴射口￺ふんしゃこう￻が　あって\nロケットのような　￹勢￺いきお￻いで\n￹突￺つ￻っこんでくる　すごい　やつだ。"
        jp_kanji:
          scarlet: "￹噴射￺ふんしゃ￻した　￹水￺みず￻の　￹勢￺いきお￻いに\n￹負￺ま￻けないように　わざと　￹体重￺たいじゅう￻を\n￹重￺おも￻くしているのだ。"
          violet: "￹甲羅￺こうら￻に　￹噴射口￺ふんしゃこう￻が　あって\nロケットのような　￹勢￺いきお￻いで\n￹突￺つ￻っこんでくる　すごい　やつだ。"
        en:
          scarlet: "It deliberately increases its body weight so\nit can withstand the recoil of the water jets\nit fires."
          violet: "It has jet nozzles on its shell. This impressive\nPokémon uses these jets to charge toward foes\nwith all the force of a rocket."
        fr:
          scarlet: "Il augmente délibérément sa masse\ncorporelle pour contrer le recul\nde ses puissants jets d’eau."
          violet: "Sa carapace est armée de canons hydrauliques.\nGrâce à eux, cet impressionnant Pokémon peut\ncharger ses adversaires avec la force d’une fusée."
        it:
          scarlet: "Aumenta di proposito il suo peso corporeo\nper resistere al contraccolpo dei getti d’acqua\nche spara."
          violet: "Pokémon impressionante che si lancia sui nemici\ncon l’impeto di un razzo grazie ai cannoni che\nha sul guscio."
        de:
          scarlet: "Es macht sich absichtlich schwer, um den\nRückstoß seiner Wasserstrahlen abzufangen."
          violet: "Dieses mächtige Pokémon hat Wasserdüsen\nin seinem Panzer und nutzt sie, um sich mit der\nWucht einer Rakete auf seine Gegner zu stürzen."
        es:
          scarlet: "Aumenta de peso deliberadamente para\ncontrarrestar la fuerza de los chorros de\nagua que dispara."
          violet: "Un Pokémon imponente que usa los\ncañones que tiene en el caparazón para\npropulsarse con la potencia de un cohete."
        ko:
          scarlet: "분사한 물의 기세에\n밀리지 않도록 일부러\n체중을 무겁게 불리고 있다."
          violet: "등껍질에 분사구가 있어\n로켓 같은 기세로\n덤벼드는 굉장한 녀석이다."
        zh_simp:
          scarlet: "为了能抵挡住\n喷射水时的后坐力，\n它故意增加了体重。"
          violet: "甲壳上有喷射口，\n是个会以火箭般气势\n冲向对手的厉害家伙。"
        zh_trad:
          scarlet: "為了讓自己能夠抵擋\n噴射水流時的後座力，\n於是會刻意增加體重。"
          violet: "甲殼上有噴射口，\n是個會以火箭般的氣勢\n衝向對手的厲害傢伙。"
