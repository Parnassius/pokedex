      descriptions:
        jp_kana:
          scarlet: "￹昔￺むかし￻　￹遠￺とお￻い　￹土地￺とち￻から　やって￹来￺き￻て\n￹棲￺す￻みついた。　￹羽￺はね￻から　￹分泌￺ぶんぴつ￻する\nジェルは　￹水￺みず￻と　￹汚￺よご￻れを　￹弾￺はじ￻く。"
          violet: "￹流￺なが￻れが　￹急￺きゅう￻な　￹川￺かわ￻も\n￹自由￺じゆう￻に　￹泳￺およ￻ぎまわる　￹脚力￺きゃくりょく￻を　￹持￺も￻つ。\nきれい￹好￺ず￻きで　￹思￺おも￻い￹込￺こ￻みが　￹強￺つよ￻い。"
        jp_kanji:
          scarlet: "￹昔￺むかし￻　￹遠￺とお￻い　￹土地￺とち￻から　やって￹来￺き￻て\n￹棲￺す￻みついた。　￹羽￺はね￻から　￹分泌￺ぶんぴつ￻する\nジェルは　￹水￺みず￻と　￹汚￺よご￻れを　￹弾￺はじ￻く。"
          violet: "￹流￺なが￻れが　￹急￺きゅう￻な　￹川￺かわ￻も\n￹自由￺じゆう￻に　￹泳￺およ￻ぎまわる　￹脚力￺きゃくりょく￻を　￹持￺も￻つ。\nきれい￹好￺ず￻きで　￹思￺おも￻い￹込￺こ￻みが　￹強￺つよ￻い。"
        en:
          scarlet: "This Pokémon migrated to Paldea from distant\nlands long ago. The gel secreted by its feathers\nrepels water and grime."
          violet: "Its strong legs let it easily swim around in even\nfast-flowing rivers. It likes to keep things tidy and\nis prone to overthinking things."
        fr:
          scarlet: "Originaire d’une contrée lointaine, il est venu\ns’installer dans la région il y a longtemps. Ses ailes\nsécrètent un gel qui repousse l’eau et les saletés."
          violet: "Ce Pokémon perfectionniste aime la propreté.\nSes pattes puissantes lui permettent de nager\navec aisance, même lorsque le courant est fort."
        it:
          scarlet: "Giunto da lontano, si è stabilito nella regione\nin tempi antichi. Le sue piume secernono un gel\nche lo protegge dall’acqua e dallo sporco."
          violet: "Può nuotare tranquillamente persino nei fiumi più\nimpetuosi grazie ai potenti arti inferiori. Tiene\nmolto alla pulizia ed è incline a rimuginare."
        de:
          scarlet: "Vor langer Zeit kam es von weit her und ließ sich\nin Paldea nieder. Über sein Gefieder sondert es\nein Gel ab, das Wasser und Schmutz abweist."
          violet: "Seine Beine sind so kräftig, dass es auch in\nFlüssen mit starker Strömung frei schwimmen\nkann. Es ist ordnungsliebend und starrsinnig."
        es:
          scarlet: "Un Pokémon llegado hace tiempo desde tierras\nlejanas y ya establecido en la región. El gel que\nsecreta por las plumas repele el agua y la mugre."
          violet: "La fuerza de sus patas le permite nadar incluso\npor las más fuertes corrientes fluviales. Adora la\npulcritud y peca de inflexible en su actitud."
        ko:
          scarlet: "옛날에 머나먼 땅에서 찾아와 정착했다.\n날개에서 분비되는 젤은\n물과 먼지를 튕겨 낸다."
          violet: "유속이 빠른 강에서도\n자유롭게 헤엄칠 수 있는 다릿심을 가졌다.\n깔끔한 것을 좋아하며 집착이 강하다."
        zh_simp:
          scarlet: "很久以前从远方的土地来到\n这里栖息。羽毛分泌出的\n凝胶有防水和防污的效果。"
          violet: "脚力之强，即使在水流\n湍急的河川也能自在游动。\n爱干净，性格有些顽固。"
        zh_trad:
          scarlet: "很久以前從遠方來到了\n這裡棲息。羽毛分泌出的\n凝膠有防水和防污的效果。"
          violet: "擁有在水流湍急的河川\n也能自在游動的腳力。\n愛乾淨，個性不知變通。"
