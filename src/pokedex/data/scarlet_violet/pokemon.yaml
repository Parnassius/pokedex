        jp_kanji:
          scarlet: "￹胴体￺どうたい￻は　￹子￺こ￻どもたちの　￹巣穴￺すあな￻。\nいろんな　フェロモンを　￹出￺だ￻して\n￹子￺こ￻どもたちを　￹自由￺じゆう￻に　￹操￺あやつ￻る。"
          violet: "￹体￺からだ￻の　￹穴￺あな￻の　￹中￺なか￻で　￹子￺こ￻どもを\n￹育￺そだ￻てる。　ミツハニーを　￹操￺あやつ￻る\nフェロモンを　￹分泌￺ぶんぴつ￻する。"
        en:
          scarlet: "It houses its colony in cells in its body and\nreleases various pheromones to make those\ngrubs do its bidding."
          violet: "It raises grubs in the holes in its body.\nIt secretes pheromones to control Combee."
        fr:
          scarlet: "Son abdomen abrite ses petits, qu’il contrôle\ngrâce à des phéromones."
          violet: "Ce Pokémon élève ses petits dans les rayons\nde son corps et donne des ordres aux Apitrini\ngrâce à ses sécrétions de phéromones."
        it:
          scarlet: "Nell’addome ospita la sua progenie, sulla\nquale esercita un controllo assoluto tramite\ni feromoni che rilascia."
          violet: "Il suo addome funge da rifugio per le larve.\nSecerne i feromoni che regolano le attività\ndei Combee."
        de:
          scarlet: "Sein Rumpf fungiert als Wabe für die Larven,\ndie es mithilfe verschiedener Pheromone frei\nherumkommandieren kann."
          violet: "In den Hohlräumen seines Rumpfes zieht es\nLarven groß. Mithilfe der Pheromone, die es\nabsondert, kontrolliert es Wadribie."
        es:
          scarlet: "Cría larvas en los panales de su cuerpo y\nsegrega diversas feromonas para controlarlas."
          violet: "Cría larvas en los panales de su cuerpo.\nCon las feromonas que segrega, guía a\nlos Combee."
        ko:
          scarlet: "몸통은 새끼들의 둥지다.\n여러 페로몬을 내뿜어\n새끼들을 자유롭게 조종한다."
          violet: "몸의 구멍 안에 새끼를 키운다.\n세꿀버리를 조종하는\n페로몬을 분비한다."
        zh_simp:
          scarlet: "躯体是孩子们的巢穴。\n释放出各种各样的费洛蒙，\n自由地控制孩子们。"
          violet: "平常总是在身体的洞里\n养育孩子。会分泌出用来\n操控三蜜蜂的费洛蒙。"
        zh_trad:
          scarlet: "身體是孩子們的巢穴。\n會釋放出各式各樣的費洛蒙，\n自由自在地控制孩子們。"
          violet: "平時都在身體的洞裡\n養育孩子。會分泌出\n控制三蜜蜂的費洛蒙。"
