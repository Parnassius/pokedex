          scarlet: "￹穏￺おだ￻やかな　￹気性￺きしょう￻の　￹持￺も￻ち￹主￺ぬし￻だが\n￹調和￺ちょうわ￻を　￹乱￺みだ￻すものは　￹許￺ゆる￻さず\n￹反省￺はんせい￻するまで　￹厳￺きび￻しく　￹指導￺しどう￻。"
          violet: "ボスに　￹挑￺いど￻むものが　￹現￺あらわ￻れると\nドラミングバトルが　￹始￺はじ￻まり\n￹勝￺か￻った￹方￺ほう￻が　￹群￺む￻れの　ボスとなる。"
        jp_kanji:
          scarlet: "￹穏￺おだ￻やかな　￹気性￺きしょう￻の　￹持￺も￻ち￹主￺ぬし￻だが\n￹調和￺ちょうわ￻を　￹乱￺みだ￻すものは　￹許￺ゆる￻さず\n￹反省￺はんせい￻するまで　￹厳￺きび￻しく　￹指導￺しどう￻。"
          violet: "ボスに　￹挑￺いど￻むものが　￹現￺あらわ￻れると\nドラミングバトルが　￹始￺はじ￻まり\n￹勝￺か￻った￹方￺ほう￻が　￹群￺む￻れの　ボスとなる。"
        en:
          scarlet: "Though it has a calm disposition, it won’t tolerate\nthose who drum up discord. It strictly disciplines\noffenders until they learn their lesson."
          violet: "When one Rillaboom challenges another who\nleads a troop, a drumming battle commences.\nThe victor becomes the troop’s new boss."
        fr:
          scarlet: "Il est calme de nature, mais il ne tolère pas\nqu’on trouble l’harmonie. Il punit sévèrement les\ncoupables jusqu’à ce qu’ils retiennent la leçon."
          violet: "Quand un Gorythmic défie le chef d’un groupe,\nil doit l’affronter dans un duel de percussions.\nLe vainqueur devient le nouveau chef."
        it:
          scarlet: "È d’indole tranquilla ma, non tollerando chi\ndisturba la quiete, lo redarguisce fino a farlo\npentire delle proprie azioni."
          violet: "Se un esemplare vuole spodestare il capo di un\ngruppo, deve batterlo in una sfida di percussioni.\nIl vincitore viene eletto o riconfermato capo."
        de:
          scarlet: "Es besitzt ein ruhiges Gemüt. Doch wer es wagt,\ndie Harmonie zu stören, wird erbarmungslos von\nGortrom zurechtgewiesen, bis er Einsicht zeigt."
          violet: "Wenn ein Gortrom den Anführer einer Gruppe\nherausfordert, entbrennt ein Trommelwettkampf.\nDer Gewinner führt ab dann die Gruppe an."
        es:
          scarlet: "Es de carácter tranquilo, pero no tolera a\naquellos que quebrantan la armonía y los\ndisciplina hasta que aprenden la lección."
          violet: "Cuando el líder del grupo es desafiado por otro,\ncomienza una batalla de percusión tras la cual el\nvencedor se proclama líder."
        ko:
          scarlet: "온화한 성품을 가졌으나\n조화를 해치는 자는 용서하지 않으며\n반성할 때까지 엄격하게 지도한다."
          violet: "보스에게 도전하는 이가 나타나면\n드럼 배틀이 시작되며\n이긴 쪽이 무리의 보스가 된다."
        zh_simp:
          scarlet: "虽然拥有温和的性格，\n但绝不放过扰乱和谐者，\n会严格训导至其反省为止。"
          violet: "当首领遇到挑战者时，\n就会开始打鼓对决，\n胜者会成为族群的首领。"
        zh_trad:
          scarlet: "性情溫和，但對於擾亂\n和諧的傢伙是絕不輕饒，\n會嚴格指正直到對方反省為止。"
          violet: "當轟擂金剛猩挑戰首領時，\n雙方就會以擊鼓來對決，\n勝者會成為群體的新首領。"
