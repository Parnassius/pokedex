      descriptions:
        jp_kana:
          scarlet: "￹怒￺いか￻りのボルテージが　￹臨界点￺りんかいてん￻を\n￹超￺こ￻えたとき　￹肉体￺にくたい￻という　￹枠￺わく￻に\n￹縛￺しば￻られない　パワーを　￹手￺て￻に￹入￺い￻れた。"
          violet: "￹心￺こころ￻に　￹秘￺ひ￻めた　￹怒￺いか￻りのパワーを\nこぶしに　￹込￺こ￻めて　￹叩￺たた￻きつけると\n￹相手￺あいて￻を　￹骨￺ほね￻の￹髄￺ずい￻から　￹砕￺くだ￻く。"
        jp_kanji:
          scarlet: "￹怒￺いか￻りのボルテージが　￹臨界点￺りんかいてん￻を\n￹超￺こ￻えたとき　￹肉体￺にくたい￻という　￹枠￺わく￻に\n￹縛￺しば￻られない　パワーを　￹手￺て￻に￹入￺い￻れた。"
          violet: "￹心￺こころ￻に　￹秘￺ひ￻めた　￹怒￺いか￻りのパワーを\nこぶしに　￹込￺こ￻めて　￹叩￺たた￻きつけると\n￹相手￺あいて￻を　￹骨￺ほね￻の￹髄￺ずい￻から　￹砕￺くだ￻く。"
        en:
          scarlet: "When its anger rose beyond a critical point,\nthis Pokémon gained power that is unfettered\nby the limits of its physical body."
          violet: "It imbues its fists with the power of the rage that\nit kept hidden in its heart. Opponents struck by\nthese imbued fists will be shattered to their core."
        fr:
          scarlet: "Quand sa colère a franchi un seuil critique,\nil a acquis une puissance qui l’a émancipé\ndes limites de son corps."
          violet: "Il anéantit ses adversaires en leur assénant\ndes coups de poing animés par la rage enfouie\ntout au fond de lui."
        it:
          scarlet: "Superando i livelli critici di rabbia, ha\nottenuto il potere di andare oltre i vincoli\ndel suo corpo fisico."
          violet: "Carica i pugni con tutta la forza della sua ira\nrepressa e tempesta di colpi gli avversari\nriducendoli in poltiglia."
        de:
          scarlet: "Als sein geballter Zorn einen kritischen Punkt\nüberschritt, erlangte es Macht, die weit über die\nGrenzen seines physischen Körpers hinausgeht."
          violet: "Es leitet den geballten Zorn, den es tief im\nHerzen trägt, in seine Fäuste. Wenn es zuschlägt,\nerschüttert es seinen Gegner bis ins Mark."
        es:
          scarlet: "Cuando su ira explosiva rebasó el punto crítico,\nadquirió un poder que lo libró para siempre\nde las limitaciones de su cuerpo material."
          violet: "Machaca sin piedad a sus rivales\nconcentrando en los puños hasta el último\nápice de ira albergada en su corazón."
        ko:
          scarlet: "분노의 볼티지가 임계점을 돌파하면서\n육체라는 틀에 얽매이지 않는\n파워를 손에 넣게 되었다."
          violet: "마음속에 감춰 둔 분노의 파워를\n주먹에 담아 날려서\n상대를 뼛속까지 바스러뜨린다."
        zh_simp:
          scarlet: "当怒气突破临界点时，\n它获得了能够摆脱\n肉体束缚的力量。"
          violet: "会将隐藏在心里的愤怒之情\n凝聚在拳头里，其威力能\n深入对手骨髓，使其粉碎。"
        zh_trad:
          scarlet: "在怒氣突破臨界點時，\n獲得了能夠擺脫\n肉體束縛的力量。"
          violet: "會將隱藏在心中的憤怒之力\n注入拳頭發動攻擊，其威力\n會深入骨髓，將對手打個粉碎。"
