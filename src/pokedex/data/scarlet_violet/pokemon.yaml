        jp_kanji:
          scarlet: "￹切￺き￻り￹立￺た￻った　￹崖￺がけ￻に　￹巣￺す￻を￹作￺つく￻る。\n￹一度￺いちど￻　￹滑空￺かっくう￻したあとは\n￹跳￺と￻びはねながら　￹巣￺す￻に　￹戻￺もど￻る。"
          violet: "￹空￺そら￻を　￹滑￺すべ￻るように　￹飛￺と￻んできて\n￹顔￺かお￻に　はりつき　￹驚￺おどろ￻かせてから\n￹毒針￺どくばり￻で　￹攻撃￺こうげき￻してくる。"
        en:
          scarlet: "It builds its nest on a steep cliff. When it is\ndone gliding, it hops along the ground back\nto its nest."
          violet: "It glides as if sliding. It startles foes by clamping\non to their faces, then jabs with its poison stinger."
        fr:
          scarlet: "Il construit son nid sur des falaises escarpées.\nQuand il a fini de planer, il y retourne en\nsautillant."
          violet: "Il fend l’air et surprend sa proie en s’agrippant\nà son visage, puis il la pique avec son dard."
        it:
          scarlet: "Nidifica su ripide scogliere.\nDopo aver planato, torna al nido saltellando."
          violet: "Si avventa sulla vittima planando, la sorprende\naggrappandosi al suo volto e infine la attacca\ncon l’aculeo velenoso."
        de:
          scarlet: "Skorgla baut sein Nest an steilen Klippen.\nWenn es seinen Gleitflug beendet, hüpft es\nins Nest zurück."
          violet: "Es fliegt gleitend heran und erschreckt seine\nOpfer, indem es sich an ihr Gesicht klammert.\nDann greift es sie mit seinem Giftstachel an."
        es:
          scarlet: "Construyen sus nidos en precipicios escarpados,\na los que regresan dando pequeños saltos\nuna vez que han dado por concluido su planeo."
          violet: "Desciende planeando sobre sus víctimas y\nlas sorprende aferrándose a su rostro para\ndespués clavarles el aguijón venenoso."
        ko:
          scarlet: "깎아지른 듯한 절벽에 집을 짓는다.\n한번 활공하고 나면\n튀어 오르면서 집으로 돌아간다."
          violet: "하늘을 미끄러지듯 날아와서\n얼굴에 들러붙어 놀라게 한 뒤에\n독침으로 공격해 온다."
        zh_simp:
          scarlet: "在陡峭的岩壁上筑巢。\n每次滑翔之后，\n就要跳着回到巢里。"
          violet: "像在空中滑行一样飞向对手，\n贴到对手脸上让其大吃一惊后\n再用毒针进行攻击。"
        zh_trad:
          scarlet: "會在陡峭的崖壁上築巢。\n每次滑翔之後，\n都會跳著回到巢裡。"
          violet: "會用滑翔的方式撲到\n對手的臉上嚇唬對方，\n再用毒針進行攻擊。"
