      descriptions:
        jp_kana:
          scarlet: "￹鋼鉄並￺こうてつな￻みに　￹硬￺かた￻い　￹頭￺あたま￻は\n￹岩￺いわ￻も　￹粉々￺こなごな￻に　￹砕￺くだ￻く。\n￹翼￺つばさ￻が　￹生￺は￻えるのを　￹待￺ま￻ち￹続￺つづ￻ける。"
          violet: "いつか　￹飛￺と￻べると　￹信￺しん￻じているのは\n￹遺伝子￺いでんし￻の　￹中￺なか￻の　￹情報￺じょうほう￻が\n￹影響￺えいきょう￻　しているから　らしい。"
        jp_kanji:
          scarlet: "￹鋼鉄並￺こうてつな￻みに　￹硬￺かた￻い　￹頭￺あたま￻は\n￹岩￺いわ￻も　￹粉々￺こなごな￻に　￹砕￺くだ￻く。\n￹翼￺つばさ￻が　￹生￺は￻えるのを　￹待￺ま￻ち￹続￺つづ￻ける。"
          violet: "いつか　￹飛￺と￻べると　￹信￺しん￻じているのは\n￹遺伝子￺いでんし￻の　￹中￺なか￻の　￹情報￺じょうほう￻が\n￹影響￺えいきょう￻　しているから　らしい。"
        en:
          scarlet: "Its steel-hard head can shatter boulders.\nIt longingly hopes for wings to grow so it can fly."
          violet: "Its belief that it will be able to fly one day is\napparently the influence of information carried\nin its genes."
        fr:
          scarlet: "Sa tête dure comme de l’acier peut faire éclater\nde gros rochers. Il attend impatiemment que\nses ailes poussent pour enfin pouvoir voler."
          violet: "Ce Pokémon croit qu’il pourra voler un jour.\nCette lubie serait due à une information\ncontenue dans ses gènes."
        it:
          scarlet: "La sua testa dura come l’acciaio può frantumare\npersino i massi. Vive in attesa del giorno in cui\ngli spunteranno le ali."
          violet: "Pare che la sua convinzione di poter imparare a\nvolare sia dovuta a delle informazioni contenute\nnel suo codice genetico."
        de:
          scarlet: "Mit seinem stahlharten Schädel kann es Felsen\nzu Staub zertrümmern. Es wartet sehnsüchtig\ndarauf, dass ihm Flügel wachsen."
          violet: "Es liegt wohl an den Erbinformationen in seinen\nGenen, dass es glaubt, eines Tages fliegen zu\nkönnen."
        es:
          scarlet: "Tiene la cabeza dura como el acero y es capaz\nde destrozar rocas. Su sueño es que le crezcan\nalas para volar."
          violet: "Parece ser que la información genética de los\nBagon les impulsa a creer que algún día serán\ncapaces de volar."
        ko:
          scarlet: "강철에 비견될 정도로 단단한 머리는\n바위도 산산조각을 내 버린다.\n날개가 자라기를 계속해서 기다린다."
          violet: "언젠가 날 수 있다고 믿는 것은\n유전자 안의 정보가\n영향을 주고 있기 때문이라고 한다."
        zh_simp:
          scarlet: "如钢铁般坚硬的脑袋\n连岩石也能撞得粉碎。\n一直在等待长出翅膀的那一刻。"
          violet: "它相信自己早晚能飞，\n听说是因为受到\n遗传基因中信息的影响。"
        zh_trad:
          scarlet: "腦袋有如鋼鐵般堅硬，\n就連岩石都能撞得粉碎。\n會一直等待長出翅膀的那一刻。"
          violet: "牠之所以深信自己\n總有一天能飛，據說是因為\n受到基因中的資訊影響。"
