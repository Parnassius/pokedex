      descriptions:
        jp_kana:
          scarlet: "￹枯￺か￻れた　￹花￺はな￻に　￹残￺のこ￻った　￹力￺ちから￻を\n￹引￺ひ￻き￹出￺だ￻して　￹元気￺げんき￻にしてあげる。\n￹赤￺あか￻い￹花￺はな￻を　￹抱￺かか￻えた　フラエッテ。"
          violet: "￹自分￺じぶん￻の　エネルギーを　￹赤色￺あかいろ￻の\n￹波長￺はちょう￻に　￹乗￺の￻せて　￹花￺はな￻へ　￹送￺おく￻り\n￹潜在能力￺せんざいのうりょく￻を　￹引￺ひ￻き￹出￺だ￻すのだ。"
        jp_kanji:
          scarlet: "￹枯￺か￻れた　￹花￺はな￻に　￹残￺のこ￻った　￹力￺ちから￻を\n￹引￺ひ￻き￹出￺だ￻して　￹元気￺げんき￻にしてあげる。\n￹赤￺あか￻い￹花￺はな￻を　￹抱￺かか￻えた　フラエッテ。"
          violet: "￹自分￺じぶん￻の　エネルギーを　￹赤色￺あかいろ￻の\n￹波長￺はちょう￻に　￹乗￺の￻せて　￹花￺はな￻へ　￹送￺おく￻り\n￹潜在能力￺せんざいのうりょく￻を　￹引￺ひ￻き￹出￺だ￻すのだ。"
        en:
          scarlet: "This Pokémon draws forth what power is left in\nwithered flowers to make them healthy again.\nIt holds a red flower."
          violet: "This Pokémon uses red wavelengths of light to\npour its own energy into flowers and draw forth\ntheir latent potential."
        fr:
          scarlet: "Ce Pokémon parvient à canaliser le peu d’énergie\nencore présent dans les fleurs fanées pour leur\nredonner du tonus. Il tient une fleur rouge."
          violet: "Il concentre son énergie dans une onde de couleur\nrouge qu’il dirige vers les fleurs afin d’en extraire\nla puissance cachée."
        it:
          scarlet: "Riesce a tirare fuori l’energia rimasta nei fiori\normai secchi, rivitalizzandoli. Questo Floette\nstringe un fiore rosso."
          violet: "Utilizza le lunghezze d’onda del rosso\nper trasmettere la propria energia ai fiori,\nrisvegliando così il loro potenziale nascosto."
        de:
          scarlet: "Es entlockt verwelkten Blumen ihre letzte Kraft\nund nutzt diese, um sie wieder aufzupäppeln.\nDieses Exemplar trägt eine rote Blume."
          violet: "Über rote Farbwellenlängen lässt es Blumen\nseine Energie zukommen, um diesen so ihr\nvolles Potenzial zu entlocken."
        es:
          scarlet: "Puede extraer la fuerza que les resta a las flores\nmarchitas para reanimarlas. Lleva consigo una\nflor de color rojo."
          violet: "Concentra su propia energía en una onda de\ncolor rojo y la emplea para extraer todo el\npotencial de las flores."
        ko:
          scarlet: "시든 꽃의 남은 힘을\n끌어내어 건강해지게 한다.\n빨간 꽃을 들고 있는 플라엣테."
          violet: "자신의 에너지를 빨간 파장에 실어\n꽃에 보내는 것으로\n잠재 능력을 끌어올린다."
        zh_simp:
          scarlet: "抱着红花的花叶蒂。\n会将枯萎的花里剩余的能量\n激发出来，从而使其恢复生机。"
          violet: "会通过红色的波长\n把自己的能量传递给花，\n以激发花的潜在能力。"
        zh_trad:
          scarlet: "抱著紅花的花葉蒂。\n會激發出枯萎的花\n剩餘的力量使其恢復生氣。"
          violet: "會透過紅色的波長\n把自己的能量傳遞給花，\n以激發花的潛在能力。"
