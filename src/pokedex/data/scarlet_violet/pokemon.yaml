          scarlet: "まったく　￹同￺おな￻じ　￹遺伝子￺いでんし￻を　￹持￺も￻つ\nふたごの　￹頭￺あたま￻が　￹息￺いき￻ぴったりの\nコンビネーションで　￹戦￺たたか￻う。"
          violet: "￹頭￺あたま￻は　￹同時￺どうじ￻に　￹眠￺ねむ￻らない。\n￹約￺やく￻１￹時間￺じかん￻ごとに　￹代￺か￻わるがわる\n￹起￺お￻きて　￹見張￺みは￻り￹役￺やく￻を　￹交代￺こうたい￻する。"
        jp_kanji:
          scarlet: "まったく　￹同￺おな￻じ　￹遺伝子￺いでんし￻を　￹持￺も￻つ\nふたごの　￹頭￺あたま￻が　￹息￺いき￻ぴったりの\nコンビネーションで　￹戦￺たたか￻う。"
          violet: "￹頭￺あたま￻は　￹同時￺どうじ￻に　￹眠￺ねむ￻らない。\n￹約￺やく￻１￹時間￺じかん￻ごとに　￹代￺か￻わるがわる\n￹起￺お￻きて　￹見張￺みは￻り￹役￺やく￻を　￹交代￺こうたい￻する。"
        en:
          scarlet: "Its twin heads have exactly the same genes and\nbattle in perfect sync with each other."
          violet: "Its heads never sleep at the same time—each one\ntakes a turn keeping watch while the other sleeps,\nswitching every hour or so."
        fr:
          scarlet: "Ses deux têtes jumelles, dont les gènes sont\nstrictement identiques, se battent de façon\nparfaitement synchronisée."
          violet: "Ses deux têtes ne dorment pas en même temps.\nElles se relaient à peu près toutes les heures pour\nmonter la garde pendant que l’autre se repose."
        it:
          scarlet: "Le teste gemelle possiedono lo stesso patrimonio\ngenetico e per questo possono lottare in perfetta\nsincronia."
          violet: "Le teste non dormono mai nello stesso momento,\nma si danno il cambio ogni ora circa in modo che\nuna delle due sia sempre sveglia e di guardia."
        de:
          scarlet: "Die beiden Zwillingsköpfe haben die exakt\ngleiche DNS und vollziehen Attacken in\nperfektem Einklang."
          violet: "Seine beiden Köpfe schlafen nie gleichzeitig,\nsondern wechseln sich ungefähr jede Stunde\nmit der Wache ab."
        es:
          scarlet: "Sus cabezas gemelas comparten la misma\ninformación genética y combaten juntas al\nunísono."
          violet: "Sus cabezas nunca duermen al mismo tiempo,\nsino que se turnan para montar guardias de\naproximadamente una hora."
        ko:
          scarlet: "완전히 같은 유전자를 가진\n쌍둥이의 머리로 호흡이 척척 맞는\n콤비네이션을 구사하며 싸운다."
          violet: "머리는 동시에 잠들지 않는다.\n약 1시간마다 번갈아 일어나서\n불침번을 교대한다."
        zh_simp:
          scarlet: "拥有完全相同基因的\n两个脑袋会通过\n默契的合作进行战斗。"
          violet: "２个脑袋不会同时睡着。\n每隔约１小时就会交替醒来，\n轮流负责望风。"
        zh_trad:
          scarlet: "基因完全一致的兩顆頭\n在戰鬥時會展現出\n完美無缺的團隊默契。"
          violet: "２顆頭不會同時睡著。\n會每隔約１個小時就\n醒來，互相輪流放哨。"
