      descriptions:
        jp_kana:
          scarlet: "￹戦￺たたか￻いになると　ヒートアップ。\n￹体温￺たいおん￻が　￹急上昇￺きゅうじょうしょう￻して\n￹灼熱￺しゃくねつ￻の　￹火￺ひ￻の￹玉￺たま￻に　なるのだ。"
          violet: "￹仲間￺なかま￻を　￹助￺たす￻けるためなら　どんな\n￹強敵￺きょうてき￻にも　￹立￺た￻ち￹向￺む￻かう　￹強￺つよ￻さを\n￹持￺も￻つが　￹空腹￺くうふく￻には　￹勝￺か￻てない。"
        jp_kanji:
          scarlet: "￹戦￺たたか￻いになると　ヒートアップ。\n￹体温￺たいおん￻が　￹急上昇￺きゅうじょうしょう￻して\n￹灼熱￺しゃくねつ￻の　￹火￺ひ￻の￹玉￺たま￻に　なるのだ。"
          violet: "￹仲間￺なかま￻を　￹助￺たす￻けるためなら　どんな\n￹強敵￺きょうてき￻にも　￹立￺た￻ち￹向￺む￻かう　￹強￺つよ￻さを\n￹持￺も￻つが　￹空腹￺くうふく￻には　￹勝￺か￻てない。"
        en:
          scarlet: "When Pignite enters battle, its body temperature\nrapidly soars until Pignite itself is engulfed by a\nscorching fireball."
          violet: "When defending its friends, Pignite will stand\nup to any opponent, no matter how strong. But\nit’s powerless when faced with an empty stomach."
        fr:
          scarlet: "Il s’enflamme quand le combat commence.\nLa température de son corps monte brusquement\net il devient une boule de feu ardente."
          violet: "Ce Pokémon est suffisamment fort pour aider\nses camarades face à des adversaires de taille.\nIl l’est moins lorsqu’il s’agit de résister à la faim."
        it:
          scarlet: "Quando è il momento di lottare, la sua\ntemperatura corporea sale rapidamente fino a\ntrasformarlo in una sfera di fuoco incandescente."
          violet: "Quando c’è da proteggere i compagni ha una\nforza tale da poter contrastare ogni avversario,\nma la fame proprio non riesce a vincerla."
        de:
          scarlet: "Ferkokel heizt sich im Kampf auf. Seine\nKörpertemperatur steigt rapide an, bis es\nzu einem glühend heißen Feuerball wird."
          violet: "Es hat die Kraft, jedem noch so starken Gegner\nentgegenzutreten, um seine Freunde zu schützen.\nDoch gegen seinen leeren Magen ist es machtlos."
        es:
          scarlet: "En cuanto entra en combate, su temperatura\ncorporal se dispara hasta el punto de convertirse\nen una bola de fuego candente."
          violet: "Su fuerza le permite enfrentarse a cualquier rival,\npor temible que sea, para socorrer a los suyos,\npero ante el hambre le vence la impotencia."
        ko:
          scarlet: "싸움이 시작되면 몸을 가열한다.\n체온이 급상승해서\n작열하는 불덩이처럼 된다."
          violet: "동료를 지키기 위해서라면\n상대가 아무리 강해도 맞서 싸우는\n강함을 지녔지만, 배고픔에는 못 이긴다."
        zh_simp:
          scarlet: "战斗时会热血沸腾。\n体温会急速上升，\n然后变成灼热的火球。"
          violet: "虽然它拥有强大的实力，\n为了保护伙伴能面对任何强敌，\n但却战胜不了饥饿。"
        zh_trad:
          scarlet: "展開戰鬥時會熱血沸騰。\n急速上升的體溫\n會使牠變成灼熱的火球。"
          violet: "雖然擁有會為了保護夥伴\n而面對任何強敵的強大力量，\n但卻戰勝不了飢餓感。"
