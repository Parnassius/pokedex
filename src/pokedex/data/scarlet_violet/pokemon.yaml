          violet: "￹戦￺たたか￻いになると　￹火力￺かりょく￻が　￹上￺あ￻がり\n￹摂氏￺せっし￻１０００￹度￺ど￻に　￹達￺たっ￻する。\n￹油分￺ゆぶん￻の￹多￺おお￻い　￹木￺き￻の￹実￺み￻を　￹好￺この￻む。"
        jp_kanji:
          scarlet: "￹焼￺や￻けた　￹木炭￺もくたん￻に　￹命￺いのち￻が　￹宿￺やど￻り\nポケモンになった。　￹燃￺も￻える　￹闘志￺とうし￻で\n￹強敵￺きょうてき￻にも　￹戦￺たたか￻いを　￹挑￺いど￻む。"
          violet: "￹戦￺たたか￻いになると　￹火力￺かりょく￻が　￹上￺あ￻がり\n￹摂氏￺せっし￻１０００￹度￺ど￻に　￹達￺たっ￻する。\n￹油分￺ゆぶん￻の￹多￺おお￻い　￹木￺き￻の￹実￺み￻を　￹好￺この￻む。"
        en:
          scarlet: "Burnt charcoal came to life and became a\nPokémon. Possessing a fiery fighting spirit,\nCharcadet will battle even tough opponents."
          violet: "Its firepower increases when it fights, reaching\nover 1,800 degrees Fahrenheit. It likes berries\nthat are rich in fat."
        fr:
          scarlet: "Ce Pokémon est un charbon de bois consumé qui\na pris vie. Il est animé par un désir de combattre\nqui le pousse à défier des adversaires puissants."
          violet: "Ses puissantes flammes atteignent les 1 000 °C\nlorsqu’il se bat. Il aime les Baies riches en matières\ngrasses."
        it:
          scarlet: "Del carbone bruciato ha preso vita, divenendo\nun Pokémon. Sfida anche i nemici più temibili,\nmosso da un rovente spirito combattivo."
          violet: "La sua energia termica aumenta di intensità\ndurante le lotte, raggiungendo i 1.000 ºC.\nAdora le bacche ricche di grassi."
        de:
          scarlet: "Ein verbranntes Stück Holzkohle ist als Pokémon\nzum Leben erwacht. Es fordert selbst starke\nGegner heraus und hat einen feurigen Kampfgeist."
          violet: "Im Kampf erreichen seine Flammen Temperaturen\nvon bis zu 1000 ℃. Es hat eine Vorliebe für\nBeeren mit hohem Fettgehalt."
        es:
          scarlet: "Nació de unos restos de carbón consumidos por\nlas llamas. Reta a rivales poderosos para saciar su\nardiente espíritu combativo."
          violet: "Sus potentes llamas alcanzan los 1000 ºC cuando\ncombate. Siente predilección por las bayas con\nun alto contenido graso."
        ko:
          scarlet: "불탄 숯에 영혼이 깃들어서\n포켓몬이 되었다. 타오르는 투지로\n강한 상대에게도 싸움을 건다."
          violet: "싸움을 시작하면 화력이 상승하여\n섭씨 1000도에 이르게 된다.\n기름기가 많은 나무열매를 좋아한다."
        zh_simp:
          scarlet: "生命寄宿在燃烧的木炭上，\n变成了宝可梦。即使面对强敌，\n也会以燃烧的斗志来迎战。"
          violet: "一旦进入战斗状态，\n火力就会上升至摄氏１０００度。\n喜欢吃油脂含量高的树果。"
        zh_trad:
          scarlet: "生命寄宿在燃燒的木炭上\n變成了寶可夢。即使敵人再強，\n也會以燃燒的鬥志迎面而戰。"
          violet: "在進入戰鬥狀態後，\n火力會上升至攝氏１０００度。\n喜歡吃油脂含量高的樹果。"
