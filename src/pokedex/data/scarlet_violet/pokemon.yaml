      descriptions:
        jp_kana:
          scarlet: "￹湿￺しめ￻った　￹場所￺ばしょ￻を　￹好￺この￻み　￹昼間￺ひるま￻は\n￹森￺もり￻の　￹木陰￺こかげ￻で　じっと　している。\n￹頭￺あたま￻から　￹毒￺どく￻の　￹粉￺こな￻を　￹出￺だ￻す。"
          violet: "￹危険￺きけん￻を　￹感￺かん￻じると　￹頭￺あたま￻の\nてっぺんから　￹毒￺どく￻の　￹胞子￺ほうし￻を\nばらまき　￹身￺み￻を　￹守￺まも￻る　ポケモン。"
        jp_kanji:
          scarlet: "￹湿￺しめ￻った　￹場所￺ばしょ￻を　￹好￺この￻み　￹昼間￺ひるま￻は\n￹森￺もり￻の　￹木陰￺こかげ￻で　じっと　している。\n￹頭￺あたま￻から　￹毒￺どく￻の　￹粉￺こな￻を　￹出￺だ￻す。"
          violet: "￹危険￺きけん￻を　￹感￺かん￻じると　￹頭￺あたま￻の\nてっぺんから　￹毒￺どく￻の　￹胞子￺ほうし￻を\nばらまき　￹身￺み￻を　￹守￺まも￻る　ポケモン。"
        en:
          scarlet: "It prefers damp places. By day it remains still\nin the forest shade. It releases toxic powder\nfrom its head."
          violet: "If it senses danger, it scatters spores from the top\nof its head to protect itself."
        fr:
          scarlet: "Ce Pokémon préfère les endroits humides.\nLa journée, il reste à l’ombre, sous les arbres\ndes forêts. Sa tête libère de la poudre toxique."
          violet: "En cas de danger, ce Pokémon libère\ndes spores empoisonnées du sommet\nde sa tête pour se protéger."
        it:
          scarlet: "Predilige le aree umide. Di giorno resta immobile\nnell’ombra della foresta. Dal capo rilascia\nuna polvere tossica."
          violet: "Quando fiuta il pericolo, si difende spargendo\nspore tossiche dalla sommità del capo."
        de:
          scarlet: "Es bevorzugt feuchte Orte. Am Tag sitzt es\nregungslos im Schatten des Waldes. Über seinen\nKopf sondert es einen giftigen Puder ab."
          violet: "Bei Gefahr schützt es sich, indem es giftige\nSporen aus seiner Kopfspitze freisetzt."
        es:
          scarlet: "Prefiere los sitios húmedos. De día está\ntranquilamente en el bosque, a la sombra.\nExpulsa polvo tóxico por la cabeza."
          violet: "Si presiente peligro, se protege esparciendo\nesporas venenosas desde la parte superior de\nsu cabeza."
        ko:
          scarlet: "습한 장소를 좋아해서 낮에는\n숲의 그늘에서 가만히 있는다.\n머리에서 독 가루를 뿌린다."
          violet: "위험을 감지하면\n정수리에서 독 포자를 뿌려\n몸을 지키는 포켓몬이다."
        zh_simp:
          scarlet: "喜欢潮湿的地方，白天会呆在\n森林的树荫里一动不动。\n会从头上放出毒粉。"
          violet: "只要感知到了危险，\n就会从头顶撒出毒孢子\n来保护自身安全的宝可梦。"
        zh_trad:
          scarlet: "喜歡潮濕的地方，白天會\n動也不動地待在森林的樹蔭下。\n會從頭上放出毒粉。"
          violet: "一察覺到危險，\n就會從頭頂散播出毒孢子\n來保護自身安全的寶可夢。"
