      descriptions:
        jp_kana:
          scarlet: "かまどで　￹燃￺も￻えさかる　￹炎￺ほのお￻のように\n￹激￺はげ￻しく　￹敵￺てき￻を　￹攻￺せ￻めたてる\nもっとも　￹攻撃的￺こうげきてき￻な　￹姿￺すがた￻。"
          violet: "￹炎￺ほのお￻の￹力￺ちから￻を　￹引￺ひ￻き￹出￺だ￻す　￹姿￺すがた￻。\nトゲの　ついた　ツタを　￹槍￺やり￻のように\n￹操￺あやつ￻り　￹敵￺てき￻を　￹貫￺つらぬ￻く。"
        jp_kanji:
          scarlet: "かまどで　￹燃￺も￻えさかる　￹炎￺ほのお￻のように\n￹激￺はげ￻しく　￹敵￺てき￻を　￹攻￺せ￻めたてる\nもっとも　￹攻撃的￺こうげきてき￻な　￹姿￺すがた￻。"
          violet: "￹炎￺ほのお￻の￹力￺ちから￻を　￹引￺ひ￻き￹出￺だ￻す　￹姿￺すがた￻。\nトゲの　ついた　ツタを　￹槍￺やり￻のように\n￹操￺あやつ￻り　￹敵￺てき￻を　￹貫￺つらぬ￻く。"
        en:
          scarlet: "This form is the most aggressive, bombarding\nenemies with the intensity of flames blazing\nwithin a hearth."
          violet: "In this form, it draws on the power of fire.\nIt spears its enemies with thorn-covered ivy."
        fr:
          scarlet: "Sous cette forme spécialisée en attaque,\nil assaille ses adversaires avec autant d’ardeur\nque les flammes brûlantes d’un fourneau."
          violet: "Sous cette forme, il puise dans le pouvoir du feu.\nIl se sert de sa branche épineuse comme d’une\nlance pour transpercer ses adversaires."
        it:
          scarlet: "Forma dalla spiccata aggressività. Attacca\nfuriosamente il nemico con l’ardore di una\nfiamma che brucia in un focolare."
          violet: "Questa forma sfrutta la forza del fuoco.\nTrafigge il nemico manovrando la sua\nliana spinosa come una lancia."
        de:
          scarlet: "Diese Form ist äußerst offensiv und angriffslustig.\nWie eine wild lodernde Ofenflamme stürzt sich\ndieses Pokémon erbarmungslos auf seine Feinde."
          violet: "In dieser Form macht es sich die Kraft des Feuers\nzunutze. Es verwendet seine dornige Ranke wie\neinen Speer, um Feinde zu durchbohren."
        es:
          scarlet: "Esta forma se especializa en la ofensiva. Agrede\na sus enemigos con la violencia de las llamas que\narden con fuerza en un horno."
          violet: "Esta forma emplea el poder del fuego. Atraviesa\na sus enemigos con una rama llena de espinas\nque usa a modo de lanza."
        ko:
          scarlet: "화덕 안에서 타오르는 불꽃처럼\n격렬하게 상대를 몰아붙이는\n가장 공격적인 모습."
          violet: "불꽃의 힘을 끌어올린 모습.\n가시가 난 덩굴을 창을 다루듯\n조종하여 적을 꿰뚫는다."
        zh_simp:
          scarlet: "这是它最具攻击性的样子，\n能够如炉中熊熊燃烧的\n火焰般猛烈攻击敌人。"
          violet: "激发出火之力量的样子。\n会像挥动长枪一样操控\n带刺的藤蔓贯穿敌人。"
        zh_trad:
          scarlet: "這是牠最具攻擊性的樣子。\n會如熊熊燃燒的爐火一般，\n氣勢猛烈地攻擊敵人。"
          violet: "激發出火之力量的樣子。\n會自在操控帶刺的藤蔓，\n使其像長矛般地刺穿敵手。"
