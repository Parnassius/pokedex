      descriptions:
        jp_kana:
          scarlet: "￹変身￺へんしん￻は　￹完璧￺かんぺき￻なのだが\n￹笑￺わら￻わされて　￹力￺ちから￻が　￹抜￺ぬ￻けると\n￹変身￺へんしん￻は　￹解￺と￻けてしまう。"
          violet: "￹体￺からだ￻の　￹細胞￺さいぼう￻の　￹作￺つく￻りを\n￹自分￺じぶん￻で　￹組￺く￻み￹替￺か￻えて\nほかの　￹生命体￺せいめいたい￻に　￹変身￺へんしん￻する。"
        jp_kanji:
          scarlet: "￹変身￺へんしん￻は　￹完璧￺かんぺき￻なのだが\n￹笑￺わら￻わされて　￹力￺ちから￻が　￹抜￺ぬ￻けると\n￹変身￺へんしん￻は　￹解￺と￻けてしまう。"
          violet: "￹体￺からだ￻の　￹細胞￺さいぼう￻の　￹作￺つく￻りを\n￹自分￺じぶん￻で　￹組￺く￻み￹替￺か￻えて\nほかの　￹生命体￺せいめいたい￻に　￹変身￺へんしん￻する。"
        en:
          scarlet: "Its transformation ability is perfect. However,\nif made to laugh, it can’t maintain its disguise."
          violet: "It can freely recombine its own cellular structure\nto transform into other life-forms."
        fr:
          scarlet: "Il excelle dans l’art de la métamorphose, mais\nsi on le fait rire, il ne pourra rester déguisé."
          violet: "Métamorph peut modifier sa structure cellulaire\nà sa guise pour se transformer en n’importe\nquelle forme de vie."
        it:
          scarlet: "Sa trasformarsi in maniera perfetta, ma se\nlo si fa ridere perde subito il travestimento."
          violet: "Può ricombinare a piacere la propria struttura\ncellulare per trasformarsi in altre forme di vita."
        de:
          scarlet: "Seine Verwandlungskunst ist perfekt. Bringt man\nes jedoch zum Lachen, fliegt seine Tarnung auf."
          violet: "Es kann seine eigene Zellstruktur frei\nzusammensetzen und sich in jede andere\nLebensform verwandeln."
        es:
          scarlet: "Su habilidad para transformarse es perfecta,\npero, si se le hace reír, perderá la fuerza y no\npodrá mantenerse transformado."
          violet: "Tiene la capacidad de reorganizar su estructura\ncelular para convertirse en otras formas de vida."
        ko:
          scarlet: "변신은 완벽하지만\n웃는 바람에 힘이 빠지면\n변신이 풀려 버리고 만다."
          violet: "몸의 세포 구성을\n스스로 바꿔서\n다른 생명체로 변신한다."
        zh_simp:
          scarlet: "虽然可以变身得很完美，\n但一旦被逗笑，\n就会因松懈而解除变身。"
          violet: "会自己重组\n身体细胞的结构，\n变身成其他的生命体。"
        zh_trad:
          scarlet: "雖然可以變身得很完美，\n但一旦被逗笑，\n就會因鬆懈而解除變身。"
          violet: "會自己重組身體細胞的結構，\n變身成其他的生命體。"
