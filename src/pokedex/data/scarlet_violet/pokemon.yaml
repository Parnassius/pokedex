      descriptions:
        jp_kana:
          scarlet: "￹頭￺あたま￻の　￹枝￺えだ￻を　￹開￺ひら￻いて　￹獲物￺えもの￻を\n￹飲￺の￻みこむ。　￹生気￺せいき￻を　￹存分￺ぞんぶん￻に\n￹吸￺す￻い￹取￺と￻ると　￹吐￺は￻き￹出￺だ￻して　￹捨￺す￻てるのだ。"
          violet: "￹乾燥地帯￺かんそうちたい￻を　￹放浪￺ほうろう￻する。\nごくまれに　￹大量発生￺たいりょうはっせい￻して\n￹町￺まち￻ひとつを　￹埋￺う￻めつくしてしまう。"
        jp_kanji:
          scarlet: "￹頭￺あたま￻の　￹枝￺えだ￻を　￹開￺ひら￻いて　￹獲物￺えもの￻を\n￹飲￺の￻みこむ。　￹生気￺せいき￻を　￹存分￺ぞんぶん￻に\n￹吸￺す￻い￹取￺と￻ると　￹吐￺は￻き￹出￺だ￻して　￹捨￺す￻てるのだ。"
          violet: "￹乾燥地帯￺かんそうちたい￻を　￹放浪￺ほうろう￻する。\nごくまれに　￹大量発生￺たいりょうはっせい￻して\n￹町￺まち￻ひとつを　￹埋￺う￻めつくしてしまう。"
        en:
          scarlet: "It will open the branches of its head to envelop\nits prey. Once it absorbs all the life energy it\nneeds, it expels the prey and discards it."
          violet: "Brambleghast wanders around arid regions.\nOn rare occasions, mass outbreaks of these\nPokémon will bury an entire town."
        fr:
          scarlet: "Il déplie ses branches pour gober ses proies.\nUne fois qu’il a absorbé la quantité d’énergie\nvitale qu’il souhaitait, il les recrache."
          violet: "Ces Pokémon errent à travers les régions arides.\nEn de très rares occasions, ils apparaissent en\nmasse et peuvent engloutir une ville entière."
        it:
          scarlet: "Apre i rami del volto per ingoiare la preda.\nDopo averne assorbito forza vitale\na sufficienza, la sputa fuori."
          violet: "Vaga per zone aride. In rarissime occasioni,\nuna sua comparsa massiccia può seppellire\nuna città intera."
        de:
          scarlet: "Es öffnet die Zweige auf dem Kopf, um Beute zu\nverschlingen. Hat es dieser genug Lebensenergie\nentzogen, spuckt es sie aus und entsorgt sie so."
          violet: "Diese Pokémon durchstreifen Trockenzonen.\nIn sehr seltenen Fällen treten sie massenhaft auf\nund begraben eine ganze Stadt unter sich."
        es:
          scarlet: "Despliega las ramas para engullir a sus presas.\nCuando ha terminado de absorber su energía\nvital, las escupe."
          violet: "Suele deambular por zonas áridas. En muy\nraras ocasiones, aparecen en masa y llegan\na sepultar un pueblo entero."
        ko:
          scarlet: "머리의 가지를 열어서 먹이를 삼킨다.\n생기를 실컷 흡수한 다음\n그대로 뱉어 버린다."
          violet: "건조 지대를 떠돈다.\n매우 드물지만 대량발생하여\n마을 전체를 뒤덮어 버릴 때도 있다."
        zh_simp:
          scarlet: "张开头部的枝条来吞食猎物。\n在尽情吸食精气之后，\n就会把猎物吐出来扔掉。"
          violet: "会在干燥地带流浪。\n有极低的概率会大量出现，\n把一座城镇塞得满满当当。"
        zh_trad:
          scarlet: "會張開頭的樹枝吞沒獵物。\n把精氣吸得淋漓盡致後，\n就會吐出來丟掉。"
          violet: "會在乾燥地帶流浪。\n有極低的機率會大量出現，\n把一整座城鎮塞得滿滿滿。"
