          scarlet: "￹一日中￺いちにちじゅう￻　エサを　￹探￺さが￻す。\n￹優￺すぐ￻れた　￹嗅覚￺きゅうかく￻を　￹持￺も￻つが\nエサ￹探￺さが￻し　￹以外￺いがい￻に　￹使￺つか￻わない。"
          violet: "￹選￺え￻りすぐりの　エサしか　￹食￺た￻べない。\n￹体￺からだ￻から　￹虫￺むし￻ポケモンが　￹嫌￺きら￻う\nハーブのような　￹香￺かお￻りを　￹放￺はな￻つ。"
        jp_kanji:
          scarlet: "￹一日中￺いちにちじゅう￻　エサを　￹探￺さが￻す。\n￹優￺すぐ￻れた　￹嗅覚￺きゅうかく￻を　￹持￺も￻つが\nエサ￹探￺さが￻し　￹以外￺いがい￻に　￹使￺つか￻わない。"
          violet: "￹選￺え￻りすぐりの　エサしか　￹食￺た￻べない。\n￹体￺からだ￻から　￹虫￺むし￻ポケモンが　￹嫌￺きら￻う\nハーブのような　￹香￺かお￻りを　￹放￺はな￻つ。"
        en:
          scarlet: "It searches for food all day. It possesses a keen\nsense of smell but doesn’t use it for anything\nother than foraging."
          violet: "This Pokémon spurns all but the finest of foods.\nIts body gives off an herblike scent that bug\nPokémon detest."
        fr:
          scarlet: "Il possède un sens de l’odorat développé qu’il\nutilise uniquement pour chercher de la nourriture,\nce qu’il fait à longueur de journée."
          violet: "Il ne mange que des mets raffinés. Son corps\ndégage une odeur d’herbes que les Pokémon\nInsecte exècrent."
        it:
          scarlet: "Possiede un olfatto altamente sviluppato che usa\nsolo per cercare cibo tutto il giorno."
          violet: "Si nutre esclusivamente del cibo più pregiato.\nIl suo corpo emette un odore di erbe che\ni Pokémon Coleottero detestano."
        de:
          scarlet: "Es verfügt über einen fantastischen Geruchssinn,\nnutzt diesen aber ausschließlich zur Futtersuche,\nder es sich den lieben langen Tag widmet."
          violet: "Es nimmt nur erlesene Kost zu sich. Sein Körper\nsondert einen kräuterartigen Geruch ab, den\nKäfer-Pokémon abstoßend finden."
        es:
          scarlet: "Posee un olfato muy desarrollado que emplea\núnicamente para buscar comida, actividad a la\nque dedica el día entero."
          violet: "Se alimenta únicamente de los más selectos\nmanjares. Su cuerpo despide un olor herbáceo\nque los Pokémon de tipo Bicho detestan."
        ko:
          scarlet: "하루 종일 먹이를 찾는다.\n뛰어난 후각을 가졌지만\n먹이를 찾는 일 외에는 사용하지 않는다."
          violet: "엄선하고 또 엄선한 먹이만을 먹는다.\n몸에서 벌레포켓몬이 싫어하는\n허브 같은 향이 난다."
        zh_simp:
          scarlet: "一整天都在觅食。\n明明拥有优秀的嗅觉，\n却只用来寻找食物。"
          violet: "只吃精挑细选过的食物。\n虫宝可梦很讨厌它身上\n散发的那种仿佛香草的气味。"
        zh_trad:
          scarlet: "一整天都在覓食。\n雖然擁有優秀的嗅覺，\n但卻只被用在覓食上。"
          violet: "只吃精挑細選過的食物。\n蟲寶可夢很討厭牠身上散發的\n那種聞起來像是香草的氣味。"
