      descriptions:
        jp_kana:
          scarlet: "￹柔￺やわ￻らかい　￹体￺からだ￻で　￹相手￺あいて￻の\n￹攻撃￺こうげき￻を　かわしながら　ふところに\n￹飛￺と￻び￹込￺こ￻み　￹毒￺どく￻の　トゲを　￹突￺つ￻き￹刺￺さ￻す。"
          violet: "のど￹元￺もと￻に　￹毒袋￺どくぶくろ￻を　￹持￺も￻つ。\nのどを　￹鳴￺な￻らすと　￹溜￺た￻まった　￹毒￺どく￻は\n￹練￺ね￻りこまれ　￹強力￺きょうりょく￻になる。"
        jp_kanji:
          scarlet: "￹柔￺やわ￻らかい　￹体￺からだ￻で　￹相手￺あいて￻の\n￹攻撃￺こうげき￻を　かわしながら　ふところに\n￹飛￺と￻び￹込￺こ￻み　￹毒￺どく￻の　トゲを　￹突￺つ￻き￹刺￺さ￻す。"
          violet: "のど￹元￺もと￻に　￹毒袋￺どくぶくろ￻を　￹持￺も￻つ。\nのどを　￹鳴￺な￻らすと　￹溜￺た￻まった　￹毒￺どく￻は\n￹練￺ね￻りこまれ　￹強力￺きょうりょく￻になる。"
        en:
          scarlet: "Swaying and dodging the attacks of its foes, it\nweaves its flexible body in close, then lunges\nout with its poisonous claws."
          violet: "It has a poison sac at its throat. When it\ncroaks, the stored poison is churned for\ngreater potency."
        fr:
          scarlet: "Il esquive avec souplesse les attaques de ses\nadversaires tout en bondissant dans leur direction,\npuis il riposte de ses griffes empoisonnées."
          violet: "Lorsqu’il coasse, cela secoue le poison\nemmagasiné sous sa gorge, ce qui le rend\nplus efficace."
        it:
          scarlet: "Con il suo corpo flessibile schiva l’attacco\ndel nemico e lo trafigge al volo con spine\nvelenose."
          violet: "Ha una sacca di veleno sulla gola. Quando\ngracida il veleno si rimescola, diventando più\nefficace."
        de:
          scarlet: "Mit seinem geschmeidigen Körper weicht es\nAttacken aus und durchbricht die Deckung des\nGegners, um mit seinen Giftklauen zuzustechen."
          violet: "Toxiquak verfügt über einen Giftsack an seiner\nKehle. Quakt es, schäumt das Gift und wird so\nnoch stärker."
        es:
          scarlet: "Esquiva ágilmente los ataques de sus enemigos\nmientras va acortando distancias para\ncontraatacar con sus garras venenosas."
          violet: "Almacena veneno en una bolsa de la garganta.\nCuando croa, este se agita para lograr mayor\npotencia."
        ko:
          scarlet: "유연한 몸으로 상대의 공격을 피하며\n깊숙이 뛰어들어 독가시를 꿰찌른다."
          violet: "목 주변에 독주머니를 지녔다.\n목을 울리면 모아 둔 독이\n잘 섞여서 강력해진다."
        zh_simp:
          scarlet: "以柔软的身体闪避攻击，\n同时冲向对手的怀里，\n然后用带毒的尖刺猛戳。"
          violet: "喉咙里带有毒囊。\n如果从喉咙发出声响，\n储存的毒素会被炼制得更强劲。"
        zh_trad:
          scarlet: "會一邊靠柔軟的身體閃避攻擊，\n一邊往對手的懷裡衝過去，\n然後用帶毒的尖刺猛戳。"
          violet: "喉嚨處有著毒囊。\n從喉嚨發出鳴叫時，\n積存的毒素就會被煉製得更加強勁。"
