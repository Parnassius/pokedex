        jp_kanji:
          scarlet: "￹捕獲例￺ほかくれい￻は　ゼロ。　データ￹不足￺ぶそく￻。\nある　￹探検記￺たんけんき￻に　￹記￺しる￻された　￹生物￺せいぶつ￻と\n￹特徴￺とくちょう￻が　￹一致￺いっち￻する。"
          violet: "オカルト￹雑誌￺ざっし￻の　￹記事￺きじ￻にあった\n１￹万年￺まんねん￻　￹生￺い￻きた　レアコイルの　￹姿￺すがた￻に\nやや　￹似￺に￻ている。"
        en:
          scarlet: "No records exist of this Pokémon being caught.\nData is lacking, but the Pokémon’s traits match\nup with a creature shown in an expedition journal."
          violet: "It slightly resembles a Magneton that lived for\n10,000 years and was featured in an article in\na paranormal magazine."
        fr:
          scarlet: "Ses attributs correspondent à ceux d’une créature\névoquée dans un récit d’exploration. On manque\nde données sur lui, car nul n’en a jamais attrapé."
          violet: "Il ressemble vaguement à un Magnéton qui aurait\nvécu 10 000 ans, selon un article paru dans une\nrevue consacrée aux phénomènes paranormaux."
        it:
          scarlet: "Mancano dati su questo Pokémon, mai catturato\nin passato. La sua descrizione coincide con quella\ndi una creatura citata in un certo diario di viaggio."
          violet: "Somiglia vagamente a un Magneton vissuto\nper 10.000 anni di cui si parla in un articolo\ndi una rivista di paranormale."
        de:
          scarlet: "Da es noch nie gefangen wurde, ist die Datenlage\ndürftig. Seine Merkmale decken sich mit einer in\neinem Expeditionsbericht beschriebenen Kreatur."
          violet: "Es hat gewisse Ähnlichkeit mit einem Magneton,\ndas 10 000 Jahre lang lebte und in einem Artikel\neiner esoterischen Zeitschrift thematisiert wurde."
        es:
          scarlet: "Nunca se había capturado uno, ergo los datos al\nrespecto escasean. Su descripción coincide con\nla de una criatura mencionada en cierto diario."
          violet: "Su aspecto recuerda ligeramente a un supuesto\nMagneton que ha vivido 10 000 años y cuya\nimagen se publicó en una revista esotérica."
        ko:
          scarlet: "포획된 사례는 없으며 데이터도 부족하다.\n어느 탐험기에 기록된 생물과\n특징이 일치한다."
          violet: "오컬트 잡지 기사에 나왔던\n1만 년을 산 레어코일의 모습과\n약간 비슷하게 생겼다."
        zh_simp:
          scarlet: "没有捕获记录。资料不足。\n其特征与某本探险记中\n所记载的生物一致。"
          violet: "它与超自然杂志曾报道的\n活了１万年的三合一磁怪\n长得稍微有些相似。"
        zh_trad:
          scarlet: "無捕獲紀錄。資料不足。\n其特徵與某本探險記裡\n所記載的生物一致。"
          violet: "與超自然雜誌所報導的\n活了１萬年的三合一磁怪\n長得稍微有那麼一點相似。"
