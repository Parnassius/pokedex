        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - fire
      egg_groups:
        - field
      abilities:
        - blaze
      hidden_ability: intimidate
      descriptions:
        jp_kana:
          scarlet: "しつこく　つきまとわれると　￹心￺こころ￻を\n￹開￺ひら￻かなくなる。　￹懐￺なつ￻いてきても\n￹過剰￺かじょう￻な　スキンシップは　￹禁物￺きんもつ￻。"
          violet: "￹毛￺け￻づくろいで　お￹腹￺なか￻に　￹溜￺た￻まった\n￹抜￺ぬ￻け￹毛￺げ￻を　￹燃￺も￻やして　￹火￺ひ￻を　￹吹￺ふ￻く。\n￹毛￺け￻の　￹吐￺は￻きかたで　￹炎￺ほのお￻も　￹変化￺へんか￻。"
        jp_kanji:
          scarlet: "しつこく　つきまとわれると　￹心￺こころ￻を\n￹開￺ひら￻かなくなる。　￹懐￺なつ￻いてきても\n￹過剰￺かじょう￻な　スキンシップは　￹禁物￺きんもつ￻。"
          violet: "￹毛￺け￻づくろいで　お￹腹￺なか￻に　￹溜￺た￻まった\n￹抜￺ぬ￻け￹毛￺げ￻を　￹燃￺も￻やして　￹火￺ひ￻を　￹吹￺ふ￻く。\n￹毛￺け￻の　￹吐￺は￻きかたで　￹炎￺ほのお￻も　￹変化￺へんか￻。"
        en:
          scarlet: "If you try too hard to get close to it, it won’t\nopen up to you. Even if you do grow close,\ngiving it too much affection is still a no-no."
          violet: "While grooming itself, it builds up fur inside its\nstomach. It sets the fur alight and spews fiery\nattacks, which change based on how it coughs."
        fr:
          scarlet: "Il se renferme sur lui-même si on lui accorde\ntrop d’attention. Mieux vaut éviter de beaucoup\nle caresser, même s’il devient affectueux."
          violet: "Il crache du feu en brûlant les poils accumulés\ndans son ventre après sa toilette. Les flammes\nchangent selon sa manière de les recracher."
        it:
          scarlet: "Si chiude in se stesso se riceve attenzioni\nsoffocanti. Anche se si affeziona, preferisce\nmantenere una certa distanza."
          violet: "Incendia le palle di pelo accumulate nella pancia\ndurante la toeletta per sputare fiamme\nche plasma a suo piacimento."
        de:
          scarlet: "Gegenüber Menschen, die zu aufdringlich sind,\nverschließt es sich. Übermäßiger Körperkontakt\nist für Flamiau selbst bei guten Freunden tabu."
          violet: "Es speit Feuer, indem es die Haare verbrennt, die\nsich bei der Fellpflege in seinem Bauch anhäufen.\nDie Flammen variieren je nach Art des Speiens."
        es:
          scarlet: "Detesta el contacto físico excesivo, incluso de\naquellos por los que siente apego. En caso de\nsentirse agobiado, se recluye en sí mismo."
          violet: "Prende las bolas de pelo que se le forman en el\nestómago tras acicalarse. Las llamas resultantes\ncambian según la forma en la que escupe el pelo."
        ko:
          scarlet: "집요하게 따라다니면\n마음을 열지 않는다. 친밀해져도\n과도한 스킨십은 금물이다."
          violet: "혀로 털을 정리할 때 배 속에 쌓이는\n빠진 털을 태워서 불을 뿜는다.\n털을 뱉어 내는 방법에 따라 불꽃도 변한다."
        zh_simp:
          scarlet: "如果被纠缠不休，就不会\n再打开心扉。即使亲近起来，\n过多的亲密接触也是禁忌。"
          violet: "通过理毛然后将积在腹中的\n落毛燃烧，喷出火焰。\n根据吐毛的方式不同，火焰也会变化。"
        zh_trad:
          scarlet: "如果被糾纏不休，就會變得不肯\n打開心扉。就算和牠變得親近了，\n也嚴禁與牠有過度的親密接觸。"
          violet: "將理毛時屯積在肚子裡的\n落毛引燃並吐出火焰。\n火焰會隨著吐毛的方式不同而變化。"
