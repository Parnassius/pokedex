      types:
        - psychic
      egg_groups:
        - field
      abilities:
        - keen_eye
        - infiltrator
      hidden_ability: own_tempo
      descriptions:
        jp_kana:
          scarlet: "￹体内￺たいない￻の　￹強￺つよ￻い　サイコパワーが\n￹漏￺も￻れないよう　￹耳￺みみ￻を　ふさいでいるが\n￹溜￺た￻めこみすぎると　￹意識￺いしき￻が　￹飛￺と￻ぶ。"
          violet: "￹無表情￺むひょうじょう￻だが　￹内面￺ないめん￻では\nサイコパワーを　￹抑￺おさ￻えこむのに\n￹必死￺ひっし￻に　なっているのだ。"
        jp_kanji:
          scarlet: "￹体内￺たいない￻の　￹強￺つよ￻い　サイコパワーが\n￹漏￺も￻れないよう　￹耳￺みみ￻を　ふさいでいるが\n￹溜￺た￻めこみすぎると　￹意識￺いしき￻が　￹飛￺と￻ぶ。"
          violet: "￹無表情￺むひょうじょう￻だが　￹内面￺ないめん￻では\nサイコパワーを　￹抑￺おさ￻えこむのに\n￹必死￺ひっし￻に　なっているのだ。"
        en:
          scarlet: "It keeps its ears covered to prevent the intense\npsychic power in its body from escaping, but it\nfalls unconscious if this power builds too much."
          violet: "Behind an Espurr’s expressionless face is a frantic\nstruggle to contain psychic power."
        fr:
          scarlet: "Il rabat ses oreilles pour contenir ses puissants\npouvoirs psychiques. S’il en accumule trop,\nil peut perdre connaissance."
          violet: "Il a l’air inexpressif, mais en réalité, il lutte\nde toutes ses forces pour contenir ses pouvoirs\npsychiques."
        it:
          scarlet: "Tiene le orecchie chiuse per contenere i suoi\npotenti poteri psichici, ma se li accumula troppo\nperde conoscenza."
          violet: "Il suo volto è inespressivo, ma dentro di sé fa\nsforzi enormi per reprimere i propri poteri\npsichici."
        de:
          scarlet: "Es klappt die Ohren herunter, damit seine starken\nPsycho-Kräfte nicht aus seinem Körper dringen.\nStaut sich zu viel Energie an, fällt es in Ohnmacht."
          violet: "Sein Gesicht ist ausdruckslos, aber innerlich\nbringt es enorme Anstrengung auf, um seine\nPsycho-Kräfte unter Kontrolle zu halten."
        es:
          scarlet: "Pliega las orejas en un esfuerzo por contener\nel inmenso poder psíquico en su interior, pero,\nsi acumula demasiado, pierde la consciencia."
          violet: "Su semblante carece de expresión, pero en\nsu interior está librando una lucha titánica por\ncontener su poder psíquico."
        ko:
          scarlet: "체내의 강한 사이코 파워가\n새어 나가지 않게 귀를 덮고 있으나\n너무 오래 모아 두면 의식을 잃고 만다."
          violet: "무표정하지만 내면에서는\n사이코 파워를\n필사적으로 억누르고 있다."
        zh_simp:
          scarlet: "会捂住耳朵以防止\n体内强大的精神力量漏出，\n但若积累过度便会失去意识。"
          violet: "虽然面无表情，\n但其实内心正在努力\n抑制精神力量漏出。"
        zh_trad:
          scarlet: "會掩住耳朵來防止\n體內強大的精神力量漏出，\n但若過度累積就會失去意識。"
          violet: "雖然看起來面無表情，\n但其實內心正非常努力地\n在控制自己的精神力量。"
