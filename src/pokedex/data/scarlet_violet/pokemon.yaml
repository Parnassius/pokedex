      descriptions:
        jp_kana:
          scarlet: "￹半径￺はんけい￻１０キロメートルの　￹範囲￺はんい￻を\n￹縄張￺なわば￻りにしているが　￹走￺はし￻っていると\n￹縄張￺なわば￻りを　￹忘￺わす￻れてしまうらしい。"
          violet: "￹走￺はし￻りだすと　￹大岩￺おおいわ￻に　￹衝突￺しょうとつ￻しても\n￹止￺と￻まらない　￹性質￺せいしつ￻のため\n￹生息地￺せいそくち￻が　￹広￺ひろ￻がっていったのだ。"
        jp_kanji:
          scarlet: "￹半径￺はんけい￻１０キロメートルの　￹範囲￺はんい￻を\n￹縄張￺なわば￻りにしているが　￹走￺はし￻っていると\n￹縄張￺なわば￻りを　￹忘￺わす￻れてしまうらしい。"
          violet: "￹走￺はし￻りだすと　￹大岩￺おおいわ￻に　￹衝突￺しょうとつ￻しても\n￹止￺と￻まらない　￹性質￺せいしつ￻のため\n￹生息地￺せいそくち￻が　￹広￺ひろ￻がっていったのだ。"
        en:
          scarlet: "Rhyhorn claims an area with over a six mile radius\nas its territory. It apparently forgets where this\nterritory is when running, however."
          violet: "Once it starts running, it won’t stop—even if it\ncrashes through boulders. This disposition is\nwhat’s caused its habitat to expand."
        fr:
          scarlet: "Son territoire s’étend sur un rayon de 10 km,\nmais on raconte que lorsqu’il se met à courir,\nil oublie totalement où ce dernier se trouve."
          violet: "Par nature, il ne s’arrête jamais de courir une fois\nlancé, même s’il percute des rochers. C’est ainsi\nque son habitat s’est progressivement agrandi."
        it:
          scarlet: "Sceglie un’area di 10 km di raggio come suo\nterritorio, ma pare che quando corre finisca\nper dimenticare quale sia."
          violet: "Quando inizia a correre non si ferma neanche se\nva a sbattere contro un macigno. Per questo\nil suo habitat ha continuato a ingrandirsi."
        de:
          scarlet: "Das Revier dieses Pokémon hat einen Radius\nvon 10 km. Sobald es jedoch losrennt, scheint\nes zu vergessen, wo dieses anfängt und aufhört."
          violet: "Wenn es losstürmt, können selbst Felsbrocken es\nnicht mehr stoppen. Wegen dieser Veranlagung\nvergrößerte sich sein Lebensraum immer weiter."
        es:
          scarlet: "Puede controlar un territorio de hasta 10 km\nde radio, pero, cuando se pone a correr, parece\nolvidársele dónde empieza y dónde acaba."
          violet: "Cuando empieza a correr, no se detiene ni al\nchocarse contra una roca, por lo que el hábitat\nde esta especie no hace más que expandirse."
        ko:
          scarlet: "반경 10km의 범위를\n영역으로 삼고 있으나,\n달리다 보면 영역을 잊어버린다고 한다."
          violet: "달리기 시작하면 큰 바위와 충돌해도\n멈추지 않는 성질 덕분에\n서식지가 점점 더 넓어졌다."
        zh_simp:
          scarlet: "会把半径１０公里的范围作为\n自己的地盘，但当它跑着跑着，\n似乎就会忘记地盘的事。"
          violet: "一旦跑起来，即使撞到大石头\n也不会停下来。这种性情\n令它的栖息地变得越来越广阔。"
        zh_trad:
          scarlet: "雖然會把半徑１０公里的範圍\n當作地盤，但跑著跑著似乎\n就會忘記自己的地盤在哪裡。"
          violet: "一旦開始奔跑，即使撞上了\n大岩石也不會停下來。這性情\n使牠的棲息地變得越來越廣。"
rhydon:
  species_id: 112
  names:
    jp_kana: サイドン
    jp_kanji: サイドン
    en: Rhydon
