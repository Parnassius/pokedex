        en:
          scarlet: "Though usually compassionate, Florges will hunt\ndown anyone who vandalizes its flower garden,\nshowing no mercy even if they beg for their lives."
          violet: "Blue pigments were tremendously expensive\nin the past, so paintings of blue Florges are\nhighly valuable."
        fr:
          scarlet: "Généralement plein de compassion, ce Pokémon\nse montre impitoyable envers les personnes qui\nsaccagent les jardins de fleurs."
          violet: "Comme les pigments bleus étaient autrefois très\ncoûteux, les tableaux où figurent des Florges\nde cette couleur ont beaucoup de valeur."
        it:
          scarlet: "È di indole caritatevole, ma dà una caccia\nspietata a chiunque deturpi i suoi giardini.\nIgnora anche le suppliche di avere salva la vita."
          violet: "In passato il blu era un pigmento prezioso,\nperciò i dipinti che ritraggono esemplari di\nquesto colore valgono molto."
        de:
          scarlet: "Es besitzt ein gütiges Wesen, doch wer seine\nBlumengärten verwüstet, wird von ihm mitleidlos\ngejagt. Gnadengesuche stoßen auf taube Ohren."
          violet: "Da blauer Farbstoff einst äußerst kostbar war,\nsind Gemälde, die Florges von dieser Farbe\ndarstellen, sehr wertvoll."
        es:
          scarlet: "Aunque suele sentir compasión, atacará sin\nmiramientos a quienes estropeen su jardín de\nflores, por mucho que supliquen por su vida."
          violet: "El azul era un pigmento extremadamente caro\nen el pasado, por lo que los cuadros de Florges\nde este color alcanzan precios muy elevados."
        ko:
          scarlet: "자비로운 성격을 가졌지만\n화원을 어지럽히는 자는 살려 달라 빌어도\n절대 용서하지 않고 밀어붙인다."
          violet: "옛날에는 파란색 안료가\n매우 비쌌기 때문에\n파란 개체를 그린 그림은 가치가 높다."
        zh_simp:
          scarlet: "虽然性情慈悲为怀，但对于\n破坏花园的家伙也绝不留情，\n即使求饶也会被它穷追不舍。"
          violet: "过去蓝色的颜料价格十分昂贵，\n因此画有蓝色个体的绘画\n拥有极高的价值。"
        zh_trad:
          scarlet: "雖然性情慈悲為懷，但對\n破壞花園的傢伙絕不留情，\n即使求饒也會被牠逼向絕路。"
          violet: "過去藍色的顏料價格昂貴，\n因此畫有藍色個體的畫\n擁有極高的價值。"
    florges_white_flower:
      form_id: 4
      names:
        jp_kana: しろいはな
        jp_kanji: しろいはな
        en: White Flower
        fr: Fleur Blanche
        it: Fiore Bianco
        de: Weißblütler
        es: Flor Blanca
        ko: 하얀 꽃
        zh_simp: 白花
        zh_trad: 白花
      base_stats:
        hp: 78
        attack: 65
        defense: 68
        special_attack: 112
        special_defense: 154
        speed: 75
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 3
        speed: 0
      types:
        - fairy
      egg_groups:
        - fairy
      abilities:
        - flower_veil
      hidden_ability: symbiosis
      descriptions:
        jp_kana:
          scarlet: "￹白￺しろ￻い　￹花￺はな￻の　フラージェスが\n￹作￺つく￻った　￹花園￺はなぞの￻は　￹色￺いろ￻とりどりの\n￹草花￺くさばな￻で　￹彩￺いろど￻られ　￹美￺うつく￻しい。"
          violet: "￹白￺しろ￻い　￹花￺はな￻で　￹飾￺かざ￻られた　￹個体￺こたい￻は\nさまざまな　￹色￺いろ￻の　￹波長￺はちょう￻とも\n￹同期￺どうき￻して　パワーを　￹引￺ひ￻き￹出￺だ￻せる。"
        jp_kanji:
          scarlet: "￹白￺しろ￻い　￹花￺はな￻の　フラージェスが\n￹作￺つく￻った　￹花園￺はなぞの￻は　￹色￺いろ￻とりどりの\n￹草花￺くさばな￻で　￹彩￺いろど￻られ　￹美￺うつく￻しい。"
          violet: "￹白￺しろ￻い　￹花￺はな￻で　￹飾￺かざ￻られた　￹個体￺こたい￻は\nさまざまな　￹色￺いろ￻の　￹波長￺はちょう￻とも\n￹同期￺どうき￻して　パワーを　￹引￺ひ￻き￹出￺だ￻せる。"
        en:
          scarlet: "A flower garden made by a white-flowered\nFlorges will be beautifully decorated with\nflowering plants of many different colors."
          violet: "A Florges adorned with white flowers can sync\nwith the wavelengths of various colors to draw\nforth their power."
        fr:
          scarlet: "Les jardins créés par ces Florges sont\nparticulièrement beaux, avec leurs fleurs\naux mille couleurs."
          violet: "Les Florges parés de fleurs blanches peuvent\nse synchroniser avec les longueurs d’onde de\ndiverses couleurs et en extraire la puissance."
        it:
          scarlet: "I giardini creati dai Florges Fiore Bianco sono\nricchi di piante variopinte e perciò molto belli."
          violet: "Gli esemplari adornati con fiori bianchi riescono\na sincronizzarsi con le lunghezze d’onda di vari\ncolori e sfruttarne così il potere."
        de:
          scarlet: "Florges mit weißen Blumen legen Gärten an,\ndie in allen erdenklichen Farben erstrahlen und\ndaher wunderschön anzuschauen sind."
          violet: "Ein mit weißen Blumen verziertes Florges kann\nsich mit der Wellenlänge von Blumen in allerlei\nFarben synchronisieren und so Kraft gewinnen."
        es:
          scarlet: "Las coloridas plantas con las que los Florges\nde flores blancas ornamentan sus jardines les\nconfieren una belleza exuberante."
          violet: "Los Florges que se engalanan con flores blancas\npueden sintonizar con las ondas que emiten\nlas flores de diversos colores y extraer su poder."
        ko:
          scarlet: "하얀 꽃의 플라제스가 만든 화원은\n형형색색의 화초로 장식되어 있어 아름답다."
          violet: "하얀 꽃으로 장식한 개체는\n여러 색의 파장과도 맞춰서\n파워를 끌어낼 수 있다."
        zh_simp:
          scarlet: "白花的花洁夫人打造的\n花园由色彩缤纷的花草\n点缀，十分美丽动人。"
          violet: "由白花装饰的个体\n也能与各种不同的颜色\n同步波长，激发力量。"
        zh_trad:
          scarlet: "白花的花潔夫人打造的花園\n有著色彩繽紛的花草點綴，\n十分地美麗動人。"
          violet: "裝飾著白花的個體\n也能與各種不同的顏色\n同步波長，激發力量。"
skiddo:
