          scarlet: "￹薄￺うす￻い　￹膜￺まく￻で　￹被￺おお￻われている\n￹両目￺りょうめ￻は　￹真夜中￺まよなか￻でも　￹見￺み￻える。\n￹数匹￺すうひき￻の　￹群￺む￻れで　￹暮￺く￻らしている。"
          violet: "￹目￺め￻を　￹覆￺おお￻う　￹特殊￺とくしゅ￻な　￹膜￺まく￻の\nおかげで　￹真夜中￺まよなか￻でも　あたりを\nはっきり　￹見￺み￻ることが　できるぞ。"
        jp_kanji:
          scarlet: "￹薄￺うす￻い　￹膜￺まく￻で　￹被￺おお￻われている\n￹両目￺りょうめ￻は　￹真夜中￺まよなか￻でも　￹見￺み￻える。\n￹数匹￺すうひき￻の　￹群￺む￻れで　￹暮￺く￻らしている。"
          violet: "￹目￺め￻を　￹覆￺おお￻う　￹特殊￺とくしゅ￻な　￹膜￺まく￻の\nおかげで　￹真夜中￺まよなか￻でも　あたりを\nはっきり　￹見￺み￻ることが　できるぞ。"
        en:
          scarlet: "Protected by thin membranes, their eyes can see\neven in the dead of night. They live in groups of\na few individuals."
          violet: "Thanks to the special membrane covering its\neyes, it can see its surroundings clearly, even in\nthe middle of the night."
        fr:
          scarlet: "Leurs yeux sont recouverts d’une fine membrane\nqui leur permet de voir dans la nuit noire.\nIls vivent en petites bandes."
          violet: "Grâce à la membrane spéciale qui recouvre\nses yeux, il distingue parfaitement ses environs,\nmême en pleine nuit."
        it:
          scarlet: "I suoi occhi, coperti da una sottilissima\nmembrana, vedono anche in piena notte.\nVive con i suoi simili in piccoli branchi."
          violet: "La membrana speciale che ricopre i suoi occhi\ngli permette di vedere chiaramente l’ambiente\ncircostante anche in piena notte."
        de:
          scarlet: "Ihre Augen sind von einer dünnen Membran\numgeben und können auch nachts sehen.\nSie bilden kleine Rudel."
          violet: "Durch die spezielle Membran um seine Augen\nkann es seine Umgebung auch im Dunkeln\ndeutlich sehen."
        es:
          scarlet: "Gracias a la membrana que recubre sus ojos,\npueden ver incluso de noche. Viven en pequeñas\nmanadas."
          violet: "La membrana especial que le recubre los ojos le\npermite discernir con claridad lo que se halla a su\nalrededor, incluso en plena noche."
        ko:
          scarlet: "얇은 막으로 덮여 있는 두 눈은\n한밤중에도 잘 보인다.\n몇 마리가 무리 지어 생활한다."
          violet: "눈을 감싸는 특수한 막 덕분에\n한밤중에도 주변을 똑똑히 볼 수 있다."
        zh_simp:
          scarlet: "由于双眼覆盖着薄膜，\n因此在深夜也能看清周围。\n会和多只同类组成群体生活。"
          violet: "多亏了盖住眼睛的特殊膜，\n即使在深夜也能把周围\n看得一清二楚。"
        zh_trad:
          scarlet: "由於雙眼覆蓋著薄膜，\n在半夜中也能看見四周。\n會和多隻同類組成群體生活。"
          violet: "多虧蓋住眼睛的特殊膜，\n即使在深夜也能把周圍\n看得一清二楚。"
