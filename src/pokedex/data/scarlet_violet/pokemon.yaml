          violet: "￹勤勉￺きんべん￻で　ストイックな　￹性質￺せいしつ￻。\n￹地道￺じみち￻な　￹反復練習￺はんぷくれんしゅう￻により\nホタチ￹捌￺さば￻きを　￹自分￺じぶん￻のものにする。"
        jp_kanji:
          scarlet: "￹流￺なが￻れる　￹水￺みず￻の￹如￺ごと￻く　２￹枚￺まい￻の\nホタチを　￹扱￺あつか￻う　￹動￺うご￻きを　￹人￺ひと￻は\n￹剣術￺けんじゅつ￻の　￹手本￺てほん￻にしたという。"
          violet: "￹勤勉￺きんべん￻で　ストイックな　￹性質￺せいしつ￻。\n￹地道￺じみち￻な　￹反復練習￺はんぷくれんしゅう￻により\nホタチ￹捌￺さば￻きを　￹自分￺じぶん￻のものにする。"
        en:
          scarlet: "It’s said that people modeled swordplay after\nthe way Dewott’s movements flow like water\nwhile it’s wielding its two scalchops."
          violet: "Dewott has a studious and stern personality.\nIt masters the use of its scalchops through\ndedicated, repeated training."
        fr:
          scarlet: "On raconte que certains arts martiaux à l’épée\ns’inspirent des mouvements fluides de Mateloutre\nquand il manie ses deux « coupillages »."
          violet: "Grâce à un entraînement rigoureux et répété,\nce Pokémon consciencieux et assidu maîtrise\nl’usage de ses « coupillages »."
        it:
          scarlet: "Si dice che i movimenti con cui maneggia le due\nmollusciabole, fluidi come l’acqua, abbiano\nispirato l’arte della scherma."
          violet: "Ha un’indole coscienziosa e austera.\nPadroneggia l’uso delle sue mollusciabole\ngrazie a un costante e scrupoloso esercizio."
        de:
          scarlet: "Die fließenden Bewegungen, die es mit seinen\nbeiden Muscheln ausführt, sollen den Menschen\nals Vorlage für ihre Schwertkünste gedient haben."
          violet: "Es ist fleißig und diszipliniert. Durch regelmäßiges\nsowie hingebungsvolles Training hat es sich die\nHandhabung seiner Muscheln zu eigen gemacht."
        es:
          scarlet: "Se dice que sus movimientos al manejar las dos\ncuchilleiras, fluidos cual corriente de agua, se\ntomaron como modelo para el arte de la espada."
          violet: "Estoico y diligente, perfecciona el manejo de\nsus cuchilleiras mediante un entrenamiento\nbasado en la constancia y la repetición."
        ko:
          scarlet: "두 개의 가리비칼을\n물 흐르듯 다루는 모습을 본 사람들이\n검술의 본보기로 삼았다고 한다."
          violet: "근면하고 성실한 성격을 가졌다.\n착실한 반복 연습을 통해\n가리비칼을 다루는 기술을 체득한다."
        zh_simp:
          scarlet: "它将２枚扇贝贝运用得\n行云流水的动作，据说\n被人们当作了剑术的范本。"
          violet: "它性情勤勉，严以律己。\n会通过踏踏实实地反复练习\n来掌握运用扇贝贝的技巧。"
        zh_trad:
          scarlet: "據說那行雲流水般地運用\n兩枚扇貝貝的動作，\n被人們做為劍術的範本。"
          violet: "性情勤勉，嚴以律己。\n會透過紮實的反覆練習，\n學成運用扇貝貝的刀法。"
