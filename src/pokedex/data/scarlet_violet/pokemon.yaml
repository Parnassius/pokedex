      descriptions:
        jp_kana:
          scarlet: "￹遥￺はる￻か　￹昔￺むかし￻に　￹海￺うみ￻から　￹上￺あ￻がって\n￹陸地￺りくち￻で　￹暮￺く￻らすようになった。\nホエルコに　￹近￺ちか￻い　￹種類￺しゅるい￻らしい。"
          violet: "￹寒冷地￺かんれいち￻で　５￹匹￺ひき￻ほどの　￹群￺む￻れを\n￹作￺つく￻って　￹暮￺く￻らす。　￹雪￺ゆき￻や　￹氷￺こおり￻に\n￹含￺ふく￻まれる　ミネラルが　￹大好￺だいす￻き。"
        jp_kanji:
          scarlet: "￹遥￺はる￻か　￹昔￺むかし￻に　￹海￺うみ￻から　￹上￺あ￻がって\n￹陸地￺りくち￻で　￹暮￺く￻らすようになった。\nホエルコに　￹近￺ちか￻い　￹種類￺しゅるい￻らしい。"
          violet: "￹寒冷地￺かんれいち￻で　５￹匹￺ひき￻ほどの　￹群￺む￻れを\n￹作￺つく￻って　￹暮￺く￻らす。　￹雪￺ゆき￻や　￹氷￺こおり￻に\n￹含￺ふく￻まれる　ミネラルが　￹大好￺だいす￻き。"
        en:
          scarlet: "This species left the ocean and began living\non land a very long time ago. It seems to be\nclosely related to Wailmer."
          violet: "It lives in frigid regions in pods of five or so\nindividuals. It loves the minerals found in snow\nand ice."
        fr:
          scarlet: "Ce Pokémon a quitté le milieu marin il y a fort\nlongtemps pour s’installer sur la terre ferme. Il\nappartiendrait à une espèce proche des Wailmer."
          violet: "Ces Pokémon vivent généralement en groupes\nde cinq dans les régions froides. Ils raffolent des\nminéraux que contiennent la neige et la glace."
        it:
          scarlet: "Gli esemplari di questa specie, a quanto pare\nimparentata con i Wailmer, lasciarono il mare\nin tempi remoti per vivere sulla terraferma."
          violet: "Vive in regioni fredde in branchi di circa\ncinque esemplari. È ghiotto dei minerali\ncontenuti nella neve e nel ghiaccio."
        de:
          scarlet: "Vor sehr langer Zeit verließ es das Meer,\num an Land zu leben. Angeblich ist es eng\nmit Wailmer verwandt."
          violet: "In Herden aus circa fünf Artgenossen bewohnt\nes frostige Gebiete. Am liebsten frisst es\nMineralien, die in Schnee und Eis enthalten sind."
        es:
          scarlet: "Los miembros de esta especie, emparentada\nal parecer con los Wailmer, abandonaron hace\nya mucho tiempo el mar para vivir en tierra firme."
          violet: "Viven en manadas de unos cinco individuos\nen regiones gélidas. Les encantan los\nminerales presentes en la nieve y el hielo."
        ko:
          scarlet: "먼 옛날에 바다에서 올라와\n육지에 살게 되었다.\n고래왕자의 근연종이라고 한다."
          violet: "한랭지에서 5마리 정도가\n무리를 이루며 산다.\n눈과 얼음에 포함된 미네랄을 좋아한다."
        zh_simp:
          scarlet: "自远古时代由大海上岸后，\n就开始在陆地上生活。\n似乎与吼吼鲸是相近的物种。"
          violet: "在寒冷地带会组成\n约５只的群体来生活。\n喜欢雪或冰所包含的矿物质。"
        zh_trad:
          scarlet: "遠古時代自大海上岸後，\n就開始在陸地上生活。\n似乎與吼吼鯨是相近的物種。"
          violet: "在寒冷地帶會組成\n約５隻規模的群體來生活。\n喜歡雪或冰所含的礦物質。"
