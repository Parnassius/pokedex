      descriptions:
        jp_kana:
          scarlet: "￹頑丈￺がんじょう￻で　￹重￺おも￻そうな　￹鉄￺てつ￻の\n￹体￺からだ￻だが　￹薄￺うす￻くて　￹軽￺かる￻いので\n￹時速￺じそく￻３００キロで　とべる。"
          violet: "￹抜￺ぬ￻け￹落￺お￻ちた　￹羽根￺はね￻は　￹薄￺うす￻く\n￹鋭￺するど￻いので　￹刀￺かたな￻として\n￹使￺つか￻われていたことも　あったらしい。"
        jp_kanji:
          scarlet: "￹頑丈￺がんじょう￻で　￹重￺おも￻そうな　￹鉄￺てつ￻の\n￹体￺からだ￻だが　￹薄￺うす￻くて　￹軽￺かる￻いので\n￹時速￺じそく￻３００キロで　とべる。"
          violet: "￹抜￺ぬ￻け￹落￺お￻ちた　￹羽根￺はね￻は　￹薄￺うす￻く\n￹鋭￺するど￻いので　￹刀￺かたな￻として\n￹使￺つか￻われていたことも　あったらしい。"
        en:
          scarlet: "Its sturdy, heavy-looking iron body is actually thin\nand light, so it can fly at speeds over 180 mph."
          violet: "Since the feathers that it sheds are thin and\nsharp, people apparently once used them\nas swords."
        fr:
          scarlet: "Ce Pokémon peut voler à 300 km/h. Son corps\nest composé d’un métal résistant qui paraît\nlourd, mais qui est en fait très fin et léger."
          violet: "Les plumes qu’il perd étant légères et aiguisées,\nelles auraient autrefois servi de sabres."
        it:
          scarlet: "All’apparenza pesante, il suo resistente corpo\nmetallico è in realtà sottile e leggero, tanto\nda consentirgli di volare a 300 km/h."
          violet: "Le penne che perde sono sottili e affilate, e si\ndice che un tempo fossero usate come spade."
        de:
          scarlet: "Sein robuster, stählerner Körper wirkt schwer,\nist aber dünn und leicht, weshalb es mit einem\nTempo von bis zu 300 km/h fliegen kann."
          violet: "Seine ausgefallenen Federn sind dünn und scharf.\nEs heißt, dass sie einst auch als Schwerter benutzt\nwurden."
        es:
          scarlet: "Su robusto cuerpo metálico parece pesado,\npero en realidad es fino y ligero, lo que le\npermite volar a 300 km/h."
          violet: "Las plumas que se le desprenden son delgadas y\nafiladas, por lo que, según parece, antiguamente\nse usaban a modo de espadas."
        ko:
          scarlet: "튼튼한 철로 덮인 몸은\n무거워 보이지만 얇고 가벼워\n시속 300km로 날 수 있다."
          violet: "빠진 깃털은 얇고 날카로워서\n칼로 사용되던 적도 있다고 한다."
        zh_simp:
          scarlet: "铁的身体看上去既结实又沉重，\n但其实又薄又轻，所以能以\n时速３００公里的速度飞行。"
          violet: "掉落的羽毛又薄又锐利，\n据说曾经还被当成刀来使用。"
        zh_trad:
          scarlet: "鐵的身體雖然看起來結實沉重，\n但其實又薄又輕，因此牠的\n飛行速度可達時速３００公里。"
          violet: "由於脫落的羽毛又薄\n又銳利，據說以前曾\n被當成劍來使用。"
