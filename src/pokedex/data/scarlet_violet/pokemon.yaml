        it:
          scarlet: "È un Pokémon con tanti ammiratori. Più è intenso\nil rosso delle fronde che pendono dalle corna,\npiù l’esemplare è considerato elegante."
          violet: "Sawsbuck Forma Autunno è noto per il suo\ntemperamento aggressivo. Le zuffe tra maschi\nsono all’ordine del giorno."
        de:
          scarlet: "Dieses Pokémon hat viele Bewunderer. Es wird als\numso schicker empfunden, je tiefer das Rot der\nBlätter ist, die von seinem Geweih herabhängen."
          violet: "In seiner Herbstform ist es für sein besonders\nungestümes Temperament bekannt. Männliche\nKronjuwild liegen ständig miteinander im Zwist."
        es:
          scarlet: "Mucha gente admira a este Pokémon. Cuanto\nmás intenso es el rojo del follaje que cuelga de\nsu cornamenta, más elegante se lo considera."
          violet: "Los Sawsbuck en Forma Otoño son conocidos\npor su temperamento agresivo. Los machos se\npelean constantemente."
