          violet: "￹安全￺あんぜん￻な　￹場所￺ばしょ￻から　￹強烈￺きょうれつ￻な\nめまいを　￹引￺ひ￻き￹起￺お￻こす　￹念力￺ねんりき￻を\n￹放￺はな￻って　￹敵￺てき￻を　￹翻弄￺ほんろう￻する。"
        jp_kanji:
          scarlet: "￹能力￺のうりょく￻を　￹引￺ひ￻き￹出￺だ￻す　￹毒素￺どくそ￻で\nできた　￹鎖￺くさり￻に　￹脳￺のう￻を　￹刺激￺しげき￻され\nサイコパワーが　￹開花￺かいか￻した。"
          violet: "￹安全￺あんぜん￻な　￹場所￺ばしょ￻から　￹強烈￺きょうれつ￻な\nめまいを　￹引￺ひ￻き￹起￺お￻こす　￹念力￺ねんりき￻を\n￹放￺はな￻って　￹敵￺てき￻を　￹翻弄￺ほんろう￻する。"
        en:
          scarlet: "The chain is made from toxins that enhance\ncapabilities. It stimulated Munkidori’s brain and\ncaused the Pokémon’s psychic powers to bloom."
          violet: "Munkidori keeps itself somewhere safe while it\ntoys with its foes, using psychokinesis to induce\nintense dizziness."
        fr:
          scarlet: "Les toxines de sa chaîne sont capables de révéler\nun potentiel latent. En stimulant son cerveau,\nelles lui ont conféré des pouvoirs psychiques."
          violet: "Il se met en lieu sûr et il joue avec ses adversaires\nen provoquant chez eux de terribles vertiges\ngrâce à ses pouvoirs psychiques."
        it:
          scarlet: "La sua catena, composta di tossine che\naccrescono le sue capacità, gli ha stimolato\nil cervello, donandogli poteri psichici."
          violet: "Mette nel sacco i nemici emettendo da un luogo\nsicuro una forza psichica che causa fortissime\nvertigini."
        de:
          scarlet: "Die Potenzial entfaltenden Giftstoffe in der\nKette haben sein Gehirn stimuliert und seine\nPsycho-Kräfte aufblühen lassen."
          violet: "Es spielt mit seinen Feinden, indem es von einem\nsicheren Ort aus telekinetische Energie ausstrahlt,\ndie starken Schwindel verursacht."
        es:
          scarlet: "Las toxinas de la cadena, capaces de sacar a\nrelucir su potencial, le han estimulado el cerebro\ny le han hecho desarrollar poderes psíquicos."
          violet: "Utiliza sus poderes psíquicos desde un lugar\nseguro para provocar fuertes mareos a sus\nenemigos y divertirse a su costa."
        ko:
          scarlet: "능력을 끌어올리는\n독소로 된 사슬에 뇌가 자극을 받아\n사이코 파워가 개화했다."
          violet: "안전한 장소에서\n강한 현기증을 일으키는\n염력을 사용해 적을 농락한다."
        zh_simp:
          scarlet: "由能激发潜能的毒素\n构成的锁链刺激了脑部，\n开发出了精神力量。"
          violet: "会从安全的地方释放出\n能引起强烈头晕的念力，\n将敌人玩弄于股掌之间。"
        zh_trad:
          scarlet: "由能夠激發潛力的毒素所構成的\n鎖鏈刺激了牠的腦部，\n使牠的精神力量開竅了。"
          violet: "會從安全的地方釋放出\n能引起強烈頭暈的念力，\n把敵手戲弄得團團轉。"
