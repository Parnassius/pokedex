          scarlet: "￹街中￺まちなか￻で　￹暮￺く￻らす　バチュルは\n￹民家￺みんか￻の　コンセントから　￹電気￺でんき￻を\n￹吸￺す￻い￹取￺と￻る　￹術￺すべ￻を　￹覚￺おぼ￻えている。"
          violet: "￹自分￺じぶん￻では　￹電気￺でんき￻を　つくれないので\nほかの　￹大￺おお￻きな　ポケモンに\nとりつき　￹静電気￺せいでんき￻を　￹吸￺す￻いとる。"
        jp_kanji:
          scarlet: "￹街中￺まちなか￻で　￹暮￺く￻らす　バチュルは\n￹民家￺みんか￻の　コンセントから　￹電気￺でんき￻を\n￹吸￺す￻い￹取￺と￻る　￹術￺すべ￻を　￹覚￺おぼ￻えている。"
          violet: "￹自分￺じぶん￻では　￹電気￺でんき￻を　つくれないので\nほかの　￹大￺おお￻きな　ポケモンに\nとりつき　￹静電気￺せいでんき￻を　￹吸￺す￻いとる。"
        en:
          scarlet: "Joltik that live in cities have learned a technique\nfor sucking electricity from the outlets in houses."
          violet: "Since it can’t generate its own electricity, it sticks\nonto large-bodied Pokémon and absorbs static\nelectricity."
        fr:
          scarlet: "Les Statitik qui vivent en ville ont appris\nà aspirer le courant depuis les prises\nélectriques des maisons."
          violet: "Ne produisant pas lui-même d’électricité,\nil s’accroche aux Pokémon plus grands\net aspire leur électricité statique."
        it:
          scarlet: "I Joltik che vivono in città hanno imparato\nuna tecnica per succhiare l’elettricità\ndalle prese di corrente delle case."
          violet: "Non può produrre elettricità da sé, per cui si\nattacca a Pokémon più grandi per succhiarne\nl’energia elettrostatica."
        de:
          scarlet: "Wattzapf, die in der Stadt leben, haben gelernt,\naus den Steckdosen von Wohnhäusern Strom\nabzuzapfen."
          violet: "Da es selbst keinen Strom erzeugen kann, heftet\nes sich an größere Pokémon, um ihnen statische\nElektrizität abzusaugen."
        es:
          scarlet: "Los que viven en las ciudades han aprendido\na absorber electricidad de los enchufes de las\ncasas particulares."
          violet: "No puede generar electricidad por sí mismo, así\nque se encarama a Pokémon grandes y absorbe\nsu energía estática."
        ko:
          scarlet: "거리에서 사는 파쪼옥은\n민가의 콘센트에서 전기를\n빨아들이는 방법을 알고 있다."
          violet: "스스로 전기를 만들 수 없어\n다른 큰 포켓몬에\n달라붙어 정전기를 흡수한다."
        zh_simp:
          scarlet: "生活在街上的电电虫\n学会了从民宅的插座\n吸取电力的方法。"
          violet: "因为自己不能制造电，\n所以会附在其它大型宝可梦\n身上吸取静电。"
        zh_trad:
          scarlet: "在鎮裡生活的電電蟲\n懂得怎麼從民宅的\n插座吸取電力。"
          violet: "自己無法製造電力，\n會附在其他大型寶可夢身上\n吸取靜電。"
