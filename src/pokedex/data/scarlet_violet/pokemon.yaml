          scarlet: "￹雨￺あめ￻が　￹大好￺だいす￻き。　￹雨降￺あめふ￻る　￹日￺ひ￻には\n￹野山￺のやま￻を　￹歩￺ある￻く　￹姿￺すがた￻を　￹見￺み￻かける\n￹穏￺おだ￻やかな　￹性格￺せいかく￻の　ポケモン。"
          violet: "￹怒￺おこ￻りだすと　￹手￺て￻がつけられなくなる。\nダンプカーを　￹跳￺は￻ね￹飛￺と￻ばす　￹威力￺いりょく￻の\n￹尻尾￺しっぽ￻　￹攻撃￺こうげき￻で　￹暴￺あば￻れまくる。"
        jp_kanji:
          scarlet: "￹雨￺あめ￻が　￹大好￺だいす￻き。　￹雨降￺あめふ￻る　￹日￺ひ￻には\n￹野山￺のやま￻を　￹歩￺ある￻く　￹姿￺すがた￻を　￹見￺み￻かける\n￹穏￺おだ￻やかな　￹性格￺せいかく￻の　ポケモン。"
          violet: "￹怒￺おこ￻りだすと　￹手￺て￻がつけられなくなる。\nダンプカーを　￹跳￺は￻ね￹飛￺と￻ばす　￹威力￺いりょく￻の\n￹尻尾￺しっぽ￻　￹攻撃￺こうげき￻で　￹暴￺あば￻れまくる。"
        en:
          scarlet: "It loves the rain. This mellow Pokémon can be\nseen walking around on the plains and in the\nmountains on rainy days."
          violet: "This Pokémon is uncontrollable when enraged.\nIt rampages on and on, lashing its tail with\nenough power to send a dump truck flying."
        fr:
          scarlet: "Ce Pokémon au tempérament doux adore\nla pluie. Lorsqu’il se promène dans la nature,\nil savoure chaque averse."
          violet: "Lorsqu’il se met en colère, il perd le contrôle\net attaque frénétiquement avec sa queue,\nqui est capable de balayer un camion."
        it:
          scarlet: "Questo Pokémon mite adora i diluvi, tanto che\nspesso lo si vede camminare per monti e per valli\nsotto la pioggia scrosciante."
          violet: "Quando si arrabbia non c’è verso di calmarlo:\nsi scatena con colpi di coda capaci di rivoltare\npersino un autocarro."
        de:
          scarlet: "Es liebt den Regen. An regnerischen Tagen sieht\nman dieses friedliche Pokémon durch die Natur\nspazieren."
          violet: "Wird es zornig, gerät es außer Kontrolle. Es wütet\numher und schwingt seinen Schwanz, der kräftig\ngenug ist, einen Lastwagen wegzuschleudern."
        es:
          scarlet: "Es común verlo pasear por campos y montañas\nbajo su adorada lluvia. Posee un carácter sereno."
          violet: "Cuando se enfada, pierde el control y ataca con\nsu poderosa cola, capaz de lanzar por los aires\nun camión de un solo golpe."
        ko:
          scarlet: "비를 매우 좋아한다. 비가 내리는 날이면\n산과 들을 거니는 모습을 볼 수 있는\n온화한 성격의 포켓몬."
          violet: "화를 내면 손을 쓸 수 없게 된다.\n덤프트럭을 날려 버릴 정도의 위력을 가진\n꼬리로 공격하며 마구 날뛴다."
        zh_simp:
          scarlet: "热爱雨水。下雨时能看见\n它漫步在山野间的身姿，\n是性格温和的宝可梦。"
          violet: "一旦生气便会令人束手无措。\n它会用强到可以撞飞翻斗车的\n尾巴攻击来大闹特闹。"
        zh_trad:
          scarlet: "熱愛雨水。下雨天時\n能看見牠漫步在山野間，\n是性格很溫和的寶可夢。"
          violet: "一旦動怒就會一發不可收拾。\n牠會以威力足以撞飛砂石車\n的尾巴攻擊來大鬧特鬧。"
