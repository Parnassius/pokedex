      descriptions:
        jp_kana:
          scarlet: "￹海￺うみ￻を　￹渡￺わた￻り　￹流￺なが￻れ￹着￺つ￻いた　￹土地￺とち￻で\n￹生￺い￻き￹抜￺ぬ￻いた　￹結果￺けっか￻　￹特別￺とくべつ￻な\n￹姿￺すがた￻と　￹能力￺のうりょく￻に　￹変化￺へんか￻した。"
          violet: "￹鉄￺てつ￻のように　￹硬￺かた￻い　￹泥￺どろ￻で　￹身￺み￻を\n￹守￺まも￻り　￹闇￺やみ￻を　￹見通￺みとお￻す　￹左目￺ひだりめ￻を\n￹持￺も￻つ　￹特別￺とくべつ￻な　ガチグマ。"
        jp_kanji:
          scarlet: "￹海￺うみ￻を　￹渡￺わた￻り　￹流￺なが￻れ￹着￺つ￻いた　￹土地￺とち￻で\n￹生￺い￻き￹抜￺ぬ￻いた　￹結果￺けっか￻　￹特別￺とくべつ￻な\n￹姿￺すがた￻と　￹能力￺のうりょく￻に　￹変化￺へんか￻した。"
          violet: "￹鉄￺てつ￻のように　￹硬￺かた￻い　￹泥￺どろ￻で　￹身￺み￻を\n￹守￺まも￻り　￹闇￺やみ￻を　￹見通￺みとお￻す　￹左目￺ひだりめ￻を\n￹持￺も￻つ　￹特別￺とくべつ￻な　ガチグマ。"
        en:
          scarlet: "It crossed the sea and drifted ashore in a new\nland. Surviving in this place led it to take on a\nunique appearance and gain special powers."
          violet: "This special Ursaluna can see in the dark with\nits left eye and protects itself with mud that is\nas hard as iron."
        fr:
          scarlet: "Il a traversé la mer pour rejoindre un nouveau\nterritoire. Le fait d’avoir réussi à y survivre\na altéré son apparence et ses compétences."
          violet: "Cet Ursaking singulier peut voir dans\nl’obscurité grâce à son œil gauche. De la\nboue aussi dure que le fer protège son corps."
        it:
          scarlet: "Ha attraversato il mare approdando in una\nnuova terra dove, riuscendo a non soccombere,\nha sviluppato un aspetto e delle capacità insoliti."
          violet: "Questo insolito Ursaluna protegge il corpo\ncon del fango indurito, robusto come ferro. Il suo\nocchio sinistro è in grado di vedere nell’oscurità."
        de:
          scarlet: "Es überquerte den Ozean und erreichte fremdes\nLand, wo es ums Überleben kämpfte und dabei\nbesondere Fertigkeiten und Merkmale erlangte."
          violet: "Dieses besondere Ursaluna schützt seinen Körper\nmit Schlamm, der mit der Zeit stahlhart wurde.\nSein linkes Auge kann selbst im Dunkeln sehen."
        es:
          scarlet: "Ha desarrollado unas capacidades y un\naspecto especiales tras haber sobrevivido\nen la tierra donde recaló al atravesar el mar."
          violet: "Este Ursaluna tan particular se protege el cuerpo\ncon una capa de barro tan dura como el hierro.\nSu ojo izquierdo le permite ver en la oscuridad."
        ko:
          scarlet: "바다를 건너 표착한 땅에서\n살아온 결과,\n특별한 모습과 능력으로 변화했다."
          violet: "쇠처럼 단단해진 진흙으로\n몸을 보호하며 어둠 속도 내다보는\n왼쪽 눈을 가진 특별한 다투곰."
        zh_simp:
          scarlet: "在飘洋过海所到达的土地上\n存活下来的结果，让它的\n样子和能力起了特别的变化。"
          violet: "很特别的月月熊，会用\n如铁般坚硬的泥土保护身体，\n并拥有能看穿黑暗的左眼。"
        zh_trad:
          scarlet: "在飄洋過海到達的土地上\n努力生存下來的結果，使牠\n擁有了特別的樣子和能力。"
          violet: "會用堅硬如鐵的泥巴保護身體，\n且擁有能夠看穿黑暗的左眼。\n是特別的月月熊。"
