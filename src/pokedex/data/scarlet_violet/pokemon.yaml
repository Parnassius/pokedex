          scarlet: "お￹気￺き￻に￹入￺い￻りの　￹花￺はな￻を　￹見￺み￻つけると\n￹一生￺いっしょう￻　￹大切￺たいせつ￻にする。\n￹青￺あお￻い￹花￺はな￻に　￹乗￺の￻った　フラベベ。"
          violet: "￹青￺あお￻い￹花￺はな￻が　お￹気￺き￻に￹入￺い￻り。\n￹花￺はな￻から　￹発散￺はっさん￻される　パワーで\n￹浮￺う￻かび￹上￺あ￻がり　ふわふわと　￹漂￺ただよ￻う。"
        jp_kanji:
          scarlet: "お￹気￺き￻に￹入￺い￻りの　￹花￺はな￻を　￹見￺み￻つけると\n￹一生￺いっしょう￻　￹大切￺たいせつ￻にする。\n￹青￺あお￻い￹花￺はな￻に　￹乗￺の￻った　フラベベ。"
          violet: "￹青￺あお￻い￹花￺はな￻が　お￹気￺き￻に￹入￺い￻り。\n￹花￺はな￻から　￹発散￺はっさん￻される　パワーで\n￹浮￺う￻かび￹上￺あ￻がり　ふわふわと　￹漂￺ただよ￻う。"
        en:
          scarlet: "Once it finds a flower it likes, this Pokémon will\nspend the rest of its life taking care of its flower.\nThis Flabébé rides a blue flower."
          violet: "This Pokémon likes blue flowers best of all.\nIt floats upward using the power emanating from\nits flower and bobs along lightly through the air."
        fr:
          scarlet: "Ce Flabébé est perché sur une fleur bleue.\nLorsqu’il trouve une fleur qui lui plaît, il la\nchérit toute sa vie."
          violet: "Ce Pokémon préfère les fleurs bleues. Grâce à\nla puissance qui émane de sa fleur, il s’élève\ndans les airs et se laisse porter par le vent."
        it:
          scarlet: "Una volta trovato un fiore di suo gradimento,\nse ne prende cura per tutta la vita. Questo\nFlabébé è su un fiore blu."
          violet: "Preferisce i fiori blu. Fluttua dolcemente\nnell’aria usando il potere sprigionato dal\nsuo fiore."
        de:
          scarlet: "Dieses Flabébé umklammert eine blaue Blume.\nFindet es eine Blume, die ihm gefällt, kümmert es\nsich sein ganzes Leben lang um sie."
          violet: "Mit der Kraft, die von seiner Blume ausgeht,\nsteigt es in die Luft auf und lässt sich treiben.\nBlaue Blumen haben es ihm besonders angetan."
        es:
          scarlet: "Cabalga una flor azul. Cuando encuentra una\nflor de su agrado, la atesora de por vida."
          violet: "Las flores azules son sus preferidas. Asciende\nusando el poder que emana de su flor y se deja\narrastrar suavemente por el viento."
        ko:
          scarlet: "마음에 드는 꽃을 발견하면\n평생 소중히 여긴다.\n파란 꽃을 탄 플라베베."
          violet: "파란 꽃을 좋아한다.\n꽃에서 발산하는 파워로 떠올라\n둥실둥실 떠다닌다."
        zh_simp:
          scarlet: "乘着蓝花的花蓓蓓。\n如果找到了喜欢的花，\n就会珍惜它一辈子。"
          violet: "它最喜欢的是蓝花。\n靠由花朵散发出的力量\n浮在空中，轻轻地飘来飘去。"
        zh_trad:
          scarlet: "乘著藍花的花蓓蓓。\n如果找到了喜歡的花，\n就會珍惜它一輩子。"
          violet: "最喜歡的是藍花。\n會利用從花朵散發出的力量\n浮在空中，輕輕地飄來飄去。"
