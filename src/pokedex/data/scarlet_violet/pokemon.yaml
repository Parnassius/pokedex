      descriptions:
        jp_kana:
          scarlet: "￹獲物￺えもの￻に　￹狙￺ねら￻いを　つけると\n￹尻尾￺しっぽ￻で　￹体￺からだ￻を　￹叩￺たた￻きながら\nまっすぐ　￹突￺つ￻っ￹込￺こ￻んでくる。"
          violet: "ツノを　つきあわせて　￹戦￺たたか￻う。\n￹群￺む￻れを￹守￺まも￻る　￹強￺つよ￻い　ケンタロスは\nキズだらけの　ツノを　￹自慢￺じまん￻する。"
        jp_kanji:
          scarlet: "￹獲物￺えもの￻に　￹狙￺ねら￻いを　つけると\n￹尻尾￺しっぽ￻で　￹体￺からだ￻を　￹叩￺たた￻きながら\nまっすぐ　￹突￺つ￻っ￹込￺こ￻んでくる。"
          violet: "ツノを　つきあわせて　￹戦￺たたか￻う。\n￹群￺む￻れを￹守￺まも￻る　￹強￺つよ￻い　ケンタロスは\nキズだらけの　ツノを　￹自慢￺じまん￻する。"
        en:
          scarlet: "When it targets an enemy, it charges furiously\nwhile whipping its body with its long tails."
          violet: "They fight each other by locking horns.\nThe herd’s protectors take pride in their\nbattle-scarred horns."
        fr:
          scarlet: "Une fois qu’il a sa cible en vue, il la charge\nfurieusement en fouettant son propre corps\nde sa triple queue."
          violet: "Les Tauros se battent entre eux avec leurs cornes.\nCeux qui protègent leur troupeau sont fiers\nde leurs cornes couvertes d’éraflures."
        it:
          scarlet: "Quando punta una preda, carica furiosamente\nfrustando il proprio corpo con le lunghe code."
          violet: "Lottano tra loro incrociando le corna. I più forti\ndifendono la mandria e sfoggiano con fierezza\nle corna segnate dalle lotte."
        de:
          scarlet: "Wenn Tauros ein Ziel ins Visier genommen hat,\nstürmt es direkt auf es zu und benutzt seine\nSchweife als Peitsche, um sich anzutreiben."
          violet: "Sie kämpfen mit ihren Hörnern. Starke Tauros,\nwelche die Herde beschützen, sind stolz auf ihre\nmit vielen Kampfspuren versehenen Hörner."
        es:
          scarlet: "Cuando ve a un enemigo, se fustiga con las\ncolas y carga ferozmente contra él."
          violet: "Luchan entre sí con sus cuernos. Los miembros\nmás fuertes de la manada, a cargo de protegerla,\nalardean de las cicatrices de su cornamenta."
        ko:
          scarlet: "목표를 정하면\n꼬리로 몸을 채찍질하면서\n똑바로 돌진한다."
          violet: "뿔을 맞대고 싸운다.\n무리를 지키는 강한 켄타로스는\n상처투성이가 된 뿔을 자랑한다."
        zh_simp:
          scarlet: "锁定猎物之后，\n就会一边用尾巴抽打身体\n一边笔直地冲向对手。"
          violet: "战斗时会用角互相顶撞。\n保护群体的强大肯泰罗\n会以伤痕累累的角为傲。"
        zh_trad:
          scarlet: "鎖定了獵物之後，\n就會一邊用尾巴抽打身體，\n一邊筆直地衝向目標。"
          violet: "戰鬥時會用角來互相頂撞。\n保護群體的強大肯泰羅\n會以自己傷痕累累的角為傲。"
