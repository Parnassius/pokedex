      descriptions:
        jp_kana:
          scarlet: "￹心臓￺しんぞう￻の　￹鼓動￺こどう￻で　￹発電￺はつでん￻する。\n￹驚￺おどろ￻いて　￹心拍数￺しんぱくすう￻が　￹上￺あ￻がると\n￹電圧￺でんあつ￻も　￹上昇￺じょうしょう￻するぞ。"
          violet: "￹落雷￺らくらい￻の　￹多￺おお￻い　￹土地￺とち￻を　￹好￺この￻む。\nたてがみで　￹雷￺かみなり￻を　￹受￺う￻け￹止￺と￻め\n￹体￺からだ￻に　￹電気￺でんき￻を　￹溜￺た￻めこむのだ。"
        jp_kanji:
          scarlet: "￹心臓￺しんぞう￻の　￹鼓動￺こどう￻で　￹発電￺はつでん￻する。\n￹驚￺おどろ￻いて　￹心拍数￺しんぱくすう￻が　￹上￺あ￻がると\n￹電圧￺でんあつ￻も　￹上昇￺じょうしょう￻するぞ。"
          violet: "￹落雷￺らくらい￻の　￹多￺おお￻い　￹土地￺とち￻を　￹好￺この￻む。\nたてがみで　￹雷￺かみなり￻を　￹受￺う￻け￹止￺と￻め\n￹体￺からだ￻に　￹電気￺でんき￻を　￹溜￺た￻めこむのだ。"
        en:
          scarlet: "Its heartbeat generates electricity. When Blitzle is\nsurprised and its heart rate goes up, the voltage\nof its electricity also rises."
          violet: "This Pokémon prefers places with lots of lightning\nstrikes. It catches lightning with its mane and\nstores the electricity within its body."
        fr:
          scarlet: "Ses battements de cœur génèrent de l’électricité.\nS’il est surpris et que son rythme cardiaque\naugmente, sa tension électrique s’élève aussi."
          violet: "Ce Pokémon aime les zones où la foudre tombe\nsouvent. Il capte les éclairs à l’aide de sa crinière\net charge ainsi son corps d’électricité."
        it:
          scarlet: "Genera elettricità tramite il battito del cuore.\nLo spavento e la sorpresa fanno aumentare la sua\nfrequenza cardiaca, e così anche il voltaggio."
          violet: "Ama i luoghi colpiti di frequente dai fulmini,\nche intercetta con la criniera. In questo modo,\naccumula elettricità."
        de:
          scarlet: "Der Herzschlag dieses Pokémon generiert Strom.\nErschrickt es, steigt seine Herzfrequenz und\nsomit auch die elektrische Spannung."
          violet: "Es bevorzugt Gebiete, in denen häufig Blitze\neinschlagen. Diese fängt es mit seiner Mähne,\num ihre Energie in seinem Körper zu horten."
        es:
          scarlet: "El latido de su corazón genera electricidad,\ncuyo voltaje aumenta cuando se sobresalta\ny se acelera su ritmo cardíaco."
          violet: "Le gustan los lugares donde las tormentas son\nfrecuentes. Capta los rayos con la crin y acumula\nla electricidad en el interior del cuerpo."
        ko:
          scarlet: "심장의 고동으로 전기를 만든다.\n놀라서 심박수가 올라가면\n전압도 같이 올라간다."
          violet: "벼락이 많이 떨어지는 곳을 선호한다.\n갈기로 벼락을 받아 내서\n몸에 전기를 비축한다."
        zh_simp:
          scarlet: "用心跳来发电。\n受惊导致心跳加速时，\n电压也会随之上升。"
          violet: "喜欢经常发生落雷的地方。\n会用鬃毛接住雷电，\n将电力储存到身体中。"
        zh_trad:
          scarlet: "用心跳來發電。\n因受驚導致心跳加快時，\n電壓也會跟著上升。"
          violet: "喜歡經常發生落雷的土地。\n會用鬃毛接下雷電，\n把電力儲存到體內。"
