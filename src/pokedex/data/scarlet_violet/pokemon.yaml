          violet: "メノクラゲに　￹似￺に￻ているが　まったく\n￹別￺べつ￻の　￹種類￺しゅるい￻。　￹脚￺あし￻は　￹細￺ほそ￻いが\n￹走￺はし￻りだせば　￹時速￺じそく￻５０キロになる。"
        jp_kanji:
          scarlet: "じめじめした　￹森￺もり￻の￹中￺なか￻で　￹暮￺く￻らす。\n￹剥￺は￻がれ￹落￺お￻ちた　￹体￺からだ￻の　ヒラヒラは\n￹歯￺は￻ごたえがあって　とても　￹美味￺おい￻しい。"
          violet: "メノクラゲに　￹似￺に￻ているが　まったく\n￹別￺べつ￻の　￹種類￺しゅるい￻。　￹脚￺あし￻は　￹細￺ほそ￻いが\n￹走￺はし￻りだせば　￹時速￺じそく￻５０キロになる。"
        en:
          scarlet: "Toedscool lives in muggy forests. The flaps that\nfall from its body are chewy and very delicious."
          violet: "Though it looks like Tentacool, Toedscool is a\ncompletely different species. Its legs may be thin,\nbut it can run at a speed of 30 mph."
        fr:
          scarlet: "Il vit dans les forêts humides. La partie ondulée\nqui entoure son abdomen peut se détacher.\nElle est croquante et délicieuse."
          violet: "Il ressemble à un Tentacool, mais il n’en est pas\nun. Malgré leur finesse, ses pattes lui permettent\nde courir à une vitesse de 50 km/h."
        it:
          scarlet: "Vive in foreste umide. Le pieghe ondulate che\nsi staccano dal suo corpo hanno una consistenza\ngommosa e un ottimo sapore."
          violet: "Somiglia a Tentacool, ma in realtà si tratta di una\nspecie di Pokémon completamente diversa. Ha\ngambe sottili, ma può raggiungere i 50 km/h."
        de:
          scarlet: "Es lebt in feuchten Wäldern. Die Falten, die sich\nvon seinem Körper lösen, sind gummiartig und\nsehr schmackhaft."
          violet: "Obwohl es wie ein Tentacha aussieht, handelt es\nsich um eine völlig andere Art. Seine Beine sind\ndünn, aber es kann bis zu 50 km/h schnell laufen."
        es:
          scarlet: "Los pliegues ondulados que se desprenden de\nsu cuerpo cuentan con una textura curiosa y un\nsabor delicioso. Habita en bosques húmedos."
          violet: "Guarda cierto parecido con los Tentacool, pero\nson dos especies no relacionadas. Sus delgadas\nextremidades le permiten alcanzar los 50 km/h."
        ko:
          scarlet: "축축한 숲속에 산다.\n떨어져 나온 몸의 하늘하늘한 부분은\n쫄깃쫄깃하고 아주 맛있다."
          violet: "왕눈해를 닮았지만 전혀 다른 종류다.\n다리는 가늘지만 달리기 시작하면\n시속 50km에 이르게 된다."
        zh_simp:
          scarlet: "栖息在潮湿的森林里。\n它身上脱落的薄片\n富有嚼劲，非常美味。"
          violet: "看起来像玛瑙水母，其实是\n截然不同的种类。虽然脚很细，\n但是跑起来能达到时速５０公里。"
        zh_trad:
          scarlet: "棲息在潮濕的森林裡。\n從身體上剝落的薄片\n富有嚼勁，極為美味。"
          violet: "看起來像瑪瑙水母，其實是\n截然不同的種類。雖然腳很細，\n但跑起來能達到時速５０公里。"
