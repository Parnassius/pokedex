      descriptions:
        jp_kana:
          scarlet: "￹万年雪￺まんねんゆき￻が　￹積￺つ￻もる　￹山脈￺さんみゃく￻で\n￹静￺しず￻かに　￹暮￺く￻らす。　ブリザードを\n￹発生￺はっせい￻させて　￹姿￺すがた￻を　￹隠￺かく￻す。"
          violet: "￹雪￺ゆき￻の￹花￺はな￻が　￹咲￺さ￻くころ　どこからか\n￹姿￺すがた￻を　￹現￺あらわ￻し　￹花￺はな￻が　￹散￺ち￻ると\nまた　どこかに　￹姿￺すがた￻を　￹隠￺かく￻す。"
        jp_kanji:
          scarlet: "￹万年雪￺まんねんゆき￻が　￹積￺つ￻もる　￹山脈￺さんみゃく￻で\n￹静￺しず￻かに　￹暮￺く￻らす。　ブリザードを\n￹発生￺はっせい￻させて　￹姿￺すがた￻を　￹隠￺かく￻す。"
          violet: "￹雪￺ゆき￻の￹花￺はな￻が　￹咲￺さ￻くころ　どこからか\n￹姿￺すがた￻を　￹現￺あらわ￻し　￹花￺はな￻が　￹散￺ち￻ると\nまた　どこかに　￹姿￺すがた￻を　￹隠￺かく￻す。"
        en:
          scarlet: "It lives a quiet life on mountains that\nare perpetually covered in snow.\nIt hides itself by whipping up blizzards."
          violet: "They appear when the snow flowers\nbloom. When the petals fall, they\nretreat to places unknown again."
        fr:
          scarlet: "Il vit paisiblement dans les massifs où\ns’amoncellent les neiges éternelles, et\nil déclenche des blizzards pour se cacher."
          violet: "Il apparaît quand les fleurs des terres\nenneigées éclosent et se retire quand\nelles se fanent. Personne ne sait où il va."
        it:
          scarlet: "Vive nella pace delle cime montuose\ntra le nevi perenni. Si nasconde\nscatenando bufere di neve."
          violet: "Appare da chissà dove quando sbocciano i\nfiori invernali, e non appena i loro petali cadono\ntorna a nascondersi nel luogo da cui era venuto."
        de:
          scarlet: "Es führt ein ruhiges Leben im Gebirge,\nwo ewiger Schnee liegt, und löst Blizzards\naus, um sich zu verstecken."
          violet: "Sie erscheinen beim Blühen der Schneeblumen\nund verschwinden wieder, sobald diese verblüht\nsind. Niemand weiß, woher sie kommen."
        es:
          scarlet: "Vive en paz en cordilleras de nieves\neternas. Genera ventiscas para\nocultarse."
          violet: "Aparece con las flores de nieve y se\nretira cuando se les caen los pétalos.\nNo se sabe adónde va."
        ko:
          scarlet: "만년설이 쌓인 산맥에서 조용히 지낸다.\n블리자드를 발생시켜 모습을 감춘다."
          violet: "눈꽃이 필 무렵 어디선가\n나타나며 꽃이 지면\n또 어딘가로 모습을 감춘다."
        zh_simp:
          scarlet: "静静地生活在\n万年积雪的山脉。\n会引发暴风雪来隐藏自己。"
          violet: "雪花盛开之时会从某处现身，\n雪花凋零之时则会再度\n前往某处并隐藏自己的身影。"
        zh_trad:
          scarlet: "在萬年積雪的山脈\n靜靜生活。會引發\n暴風雪來隱藏自己。"
          violet: "雪花盛開之時會從某處現身，\n雪花凋零之際則會再度前往\n某處隱藏自己的身影。"
