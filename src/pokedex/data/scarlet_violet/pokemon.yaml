komala:
  species_id: 775
  names:
    jp_kana: ネッコアラ
    jp_kanji: ネッコアラ
    en: Komala
    fr: Dodoala
    it: Komala
    de: Koalelu
    es: Komala
    ko: 자말라
    zh_simp: 树枕尾熊
    zh_trad: 樹枕尾熊
  forms:
    komala:
      form_id: 0
      base_stats:
        hp: 65
        attack: 115
        defense: 65
        special_attack: 75
        special_defense: 95
        speed: 65
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - normal
      egg_groups:
        - field
      abilities:
        - comatose
      descriptions:
        jp_kana:
          scarlet: "￹一生￺いっしょう￻を　￹眠￺ねむ￻ったまま　￹過￺す￻ごす。\nネッコアラのみが　￹毒￺どく￻を　￹分解￺ぶんかい￻できる\n￹猛毒￺もうどく￻の　￹葉￺は￻っぱが　エサ。"
          violet: "ネッコアラの　よだれを　￹薄￺うす￻めると\n￹強力￺きょうりょく￻な　￹麻酔薬￺ますいやく￻になる。\n￹昔￺むかし￻の　￹手術￺しゅじゅつ￻に　￹使￺つか￻われた。"
        jp_kanji:
          scarlet: "￹一生￺いっしょう￻を　￹眠￺ねむ￻ったまま　￹過￺す￻ごす。\nネッコアラのみが　￹毒￺どく￻を　￹分解￺ぶんかい￻できる\n￹猛毒￺もうどく￻の　￹葉￺は￻っぱが　エサ。"
          violet: "ネッコアラの　よだれを　￹薄￺うす￻めると\n￹強力￺きょうりょく￻な　￹麻酔薬￺ますいやく￻になる。\n￹昔￺むかし￻の　￹手術￺しゅじゅつ￻に　￹使￺つか￻われた。"
        en:
          scarlet: "Komala spends its entire life sleeping. It feeds on\nleaves that contain a potent poison only Komala\ncan break down."
          violet: "A potent anesthetic can be made by diluting\nKomala’s drool. This anesthetic was used for\nsurgeries in the past."
        fr:
          scarlet: "Ce Pokémon passe sa vie à dormir. Il se nourrit\nde feuilles particulièrement toxiques que lui seul\nest capable d’assimiler sans danger."
          violet: "Diluée, la salive de Dodoala permet de fabriquer\nun puissant anesthésiant. On l’utilisait autrefois\nen chirurgie."
        it:
          scarlet: "Trascorre la sua intera vita addormentato.\nNelle foglie di cui si nutre è presente un veleno\nche solo questo Pokémon riesce a decomporre."
          violet: "Diluendo la saliva di Komala si può realizzare\nun potente anestetico, utilizzato in tempi antichi\nper le operazioni chirurgiche."
        de:
          scarlet: "Koalelu verbringt sein ganzes Leben schlafend\nund ernährt sich von hochgiftigen Blättern, deren\nToxine kein anderes Pokémon abbauen kann."
          violet: "Verdünnt man Koalelus Speichel, so erhält man\nein starkes Betäubungsmittel, das früher bei\nchirurgischen Eingriffen verwendet wurde."
        es:
          scarlet: "Pasan toda su vida durmiendo. Las hojas de las\nque se alimentan contienen un veneno que solo\nellos son capaces de descomponer."
          violet: "Diluida, su saliva sirve para preparar un potente\nanestésico que antiguamente se utilizaba en\noperaciones quirúrgicas."
        ko:
          scarlet: "일생을 잠든 채로 보낸다.\n자말라만이 분해할 수 있는\n맹독성의 잎사귀를 먹이로 삼는다."
          violet: "자말라의 침을 희석하면\n강력한 마취약이 된다.\n옛날에는 수술에 사용했다."
        zh_simp:
          scarlet: "它的一生都在睡觉。\n主食是带有剧毒的树叶，\n只有树枕尾熊能分解这种毒。"
          violet: "树枕尾熊的口水经过稀释后，\n就会变成强效的麻醉药。\n过去曾被用在手术上。"
        zh_trad:
          scarlet: "終其一生都在睡覺。\n作為主食的樹葉帶有劇毒，\n只有樹枕尾熊才能將毒分解。"
          violet: "樹枕尾熊的口水一經稀釋後，\n就會變成強效的麻醉藥。\n過去曾被用在手術上。"
