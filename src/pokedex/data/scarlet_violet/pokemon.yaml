      descriptions:
        jp_kana:
          scarlet: "￹取￺と￻り￹込￺こ￻んだ　￹毒素￺どくそ￻は　￹黒￺くろ￻い￹粉￺こな￻に\n￹変￺か￻えて　￹排出￺はいしゅつ￻されるので　￹毒￺どく￻の\n￹葉￺は￻っぱや　￹根￺ね￻っこを　￹食￺た￻べられるのだ。"
          violet: "￹毒￺どく￻の￹粉￺こな￻を　まき￹散￺ち￻らして　￹敵￺てき￻を\n￹追￺お￻い￹払￺はら￻う。　￹棲￺す￻んでいる　￹土地￺とち￻により\nエサにする　￹植物￺しょくぶつ￻が　￹違￺ちが￻う。"
        jp_kanji:
          scarlet: "￹取￺と￻り￹込￺こ￻んだ　￹毒素￺どくそ￻は　￹黒￺くろ￻い￹粉￺こな￻に\n￹変￺か￻えて　￹排出￺はいしゅつ￻されるので　￹毒￺どく￻の\n￹葉￺は￻っぱや　￹根￺ね￻っこを　￹食￺た￻べられるのだ。"
          violet: "￹毒￺どく￻の￹粉￺こな￻を　まき￹散￺ち￻らして　￹敵￺てき￻を\n￹追￺お￻い￹払￺はら￻う。　￹棲￺す￻んでいる　￹土地￺とち￻により\nエサにする　￹植物￺しょくぶつ￻が　￹違￺ちが￻う。"
        en:
          scarlet: "Any poison this Pokémon takes in is converted\ninto a black powder and secreted. That’s why\nScatterbug can eat poisonous leaves and roots."
          violet: "This Pokémon scatters poisonous powder\nto repel enemies. It will eat different plants\ndepending on where it lives."
        fr:
          scarlet: "Il peut manger des feuilles et des racines\nempoisonnées, car il transforme le poison qu’il\ningère en une poudre noire qu’il évacue ensuite."
          violet: "Il repousse ses adversaires en disséminant\nde la poudre empoisonnée et il se nourrit\nde plantes différentes selon l’endroit où il vit."
        it:
          scarlet: "Può mangiare foglie e radici velenose perché\nè in grado di trasformare le tossine che assorbe\nin una polvere nera, che poi espelle."
          violet: "Mette in fuga il nemico emettendo una polvere\nvelenosa. Le piante di cui si ciba variano\na seconda del luogo in cui vive."
        de:
          scarlet: "Giftstoffe, die es aufnimmt, werden in schwarzen\nPuder umgewandelt und ausgestoßen. Deshalb\nkann es giftige Blätter und Wurzeln fressen."
          violet: "Purmel verstreut giftigen Puder, um Gegner zu\nvertreiben. Welche Pflanzen es frisst, ist von der\nGegend abhängig, in der es lebt."
        es:
          scarlet: "Puede alimentarse de hojas y raíces venenosas,\nya que todo el veneno que ingiere lo expulsa\ntras haberlo transformado en un polvo negro."
          violet: "Esparce un polvo tóxico para repeler a los\nenemigos. Las plantas que constituyen su dieta\nvarían en función de la zona donde vive."
        ko:
          scarlet: "흡수한 독소는 검은 가루로 바꿔서\n배출하기 때문에 독성을 띠는\n잎이나 뿌리도 먹을 수 있다."
          violet: "독 가루를 흩뿌려서 적을 내쫓는다.\n사는 지역에 따라\n먹이로 삼는 식물이 다르다."
        zh_simp:
          scarlet: "吸入体内的毒素会变成\n黑色的粉末被排出体外，\n所以它可以吃毒叶和毒树根。"
          violet: "会撒出毒粉赶走敌人。\n依据栖息的土地不同，\n它吃的植物也会不同。"
        zh_trad:
          scarlet: "吸入體內的毒素會變成\n黑色的粉末後被排出體外，\n所以能夠吃下毒葉和毒樹根。"
          violet: "會灑出毒粉趕走敵人。\n棲息的土地不同，作為\n食糧的植物也就不同。"
