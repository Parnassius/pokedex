      descriptions:
        jp_kana:
          scarlet: "￹尖￺とが￻った　￹鼻先￺はなさき￻で　￹硬￺かた￻い　￹岩￺いわ￻を\n￹削￺けず￻り￹取￺と￻って　￹食￺た￻べる。\n￹温厚￺おんこう￻で　￹人￺ひと￻の　￹力仕事￺ちからしごと￻を　￹手伝￺てつだ￻う。"
          violet: "５トンの　￹荷物￺にもつ￻を　￹持￺も￻ち￹上￺あ￻げられる。\n￹朝￺あさ￻になると　￹群￺む￻れで　￹洞窟￺どうくつ￻へと\n￹向￺む￻かい　エサの　￹鉱石￺こうせき￻を　￹探￺さが￻す。"
        jp_kanji:
          scarlet: "￹尖￺とが￻った　￹鼻先￺はなさき￻で　￹硬￺かた￻い　￹岩￺いわ￻を\n￹削￺けず￻り￹取￺と￻って　￹食￺た￻べる。\n￹温厚￺おんこう￻で　￹人￺ひと￻の　￹力仕事￺ちからしごと￻を　￹手伝￺てつだ￻う。"
          violet: "５トンの　￹荷物￺にもつ￻を　￹持￺も￻ち￹上￺あ￻げられる。\n￹朝￺あさ￻になると　￹群￺む￻れで　￹洞窟￺どうくつ￻へと\n￹向￺む￻かい　エサの　￹鉱石￺こうせき￻を　￹探￺さが￻す。"
        en:
          scarlet: "Using the pointy tip of its trunk, it carves off\nchunks of hard rocks to eat. It is very docile\nand helps people with physical labor."
          violet: "Cufant can lift loads weighing five tons. In the\nmornings, it heads into caves with its herd, in\nsearch of the ore on which these Pokémon feed."
        fr:
          scarlet: "L’extrémité pointue de sa trompe lui permet de\ncasser les roches dont il se nourrit. Très docile,\nil aide les êtres humains dans les travaux pénibles."
          violet: "Il peut soulever des charges de cinq tonnes.\nLe matin, il se rend dans les grottes avec son\ntroupeau, en quête du minerai dont il se nourrit."
        it:
          scarlet: "Con la sua proboscide appuntita scava\nla dura pietra di cui si nutre. Di carattere\nmite, aiuta gli esseri umani nei lavori pesanti."
          violet: "Può sollevare carichi di cinque tonnellate. Al\nmattino si dirige in gruppo con i suoi simili verso\nle grotte, in cerca dei minerali di cui si nutre."
        de:
          scarlet: "Mit der scharfen Rüsselspitze schabt es an hartem\nGestein und frisst die Bruchstücke. Es ist gutmütig\nund hilft Menschen bei deren körperlicher Arbeit."
          violet: "Kupfanti kann ein Gewicht von 5 t stemmen.\nMorgens macht es sich mit seiner Herde auf den\nWeg zu Höhlen, wo es Erz zum Fressen sucht."
        es:
          scarlet: "Raspa con la trompa puntiaguda las rocas duras\npara alimentarse de ellas. Es dócil y presta ayuda\na los humanos con tareas que requieran fuerza."
          violet: "Puede levantar cargas de cinco toneladas. Al\namanecer, se dirigen en manada a las cuevas en\nbusca de los minerales de los que se alimentan."
        ko:
          scarlet: "뾰족한 코끝으로\n단단한 바위를 깎아서 먹는다.\n온화해서 사람들의 힘쓰는 일을 돕는다."
          violet: "5t의 짐을 들어 올릴 수 있다.\n아침이 되면 무리 지어 동굴에 가서\n먹이로 쓸 광석을 찾는다."
        zh_simp:
          scarlet: "尖尖的鼻尖能削断坚硬的\n岩石来当做粮食。性格温厚，\n会帮助人们做力气活。"
          violet: "能够举起５吨的货物。\n天一亮就会成群结队地\n去洞窟找矿石来吃。"
        zh_trad:
          scarlet: "尖尖的鼻尖能削斷堅硬的\n岩石來作為糧食。性情溫馴，\n會幫助人類做粗重的工作。"
          violet: "能夠舉起重達５噸的貨物。\n天一亮就會成群結隊\n前往洞窟找礦石來吃。"
