          violet: "￹怪￺あや￻しい　￹雑誌￺ざっし￻の　￹記事￺きじ￻によると\nある　￹地方￺ちほう￻で　￹起￺お￻こる　￹現象￺げんしょう￻に\n￹関連￺かんれん￻する　ポケモンらしい。"
        en:
          scarlet: "It is possible that this is the creature\nlisted as Roaring Moon in an expedition\njournal that still holds many mysteries."
          violet: "According to an article in a dubious magazine,\nthis Pokémon has some connection to a\nphenomenon that occurs in a certain region."
        fr:
          scarlet: "Il pourrait s’agir de la créature nommée\n« Rugit-Lune », qui apparaît dans un récit\nd’exploration très mystérieux."
          violet: "Selon un article paru dans une revue douteuse,\nce Pokémon serait lié à un phénomène qui se\nproduit dans certaines régions."
        it:
          scarlet: "È possibile che si tratti della creatura\ncatalogata come \"Lunaruggente\"\nin un diario di viaggio colmo di misteri."
          violet: "Secondo un articolo di una rivista di dubbia\nattendibilità, questo Pokémon sarebbe legato a\nun fenomeno che si verifica in una certa regione."
        de:
          scarlet: "Möglicherweise handelt es sich hierbei um jene\nKreatur, die in einem rätselhaften Expeditions-\nbericht als Donnersichel erwähnt wurde."
          violet: "Laut einem Artikel einer fragwürdigen Zeitschrift\nhat dieses Pokémon etwas mit einem Phänomen\nzu tun, das in einer bestimmten Region auftritt."
        es:
          scarlet: "Podría tratarse de la criatura que\naparece bajo el nombre de Bramaluna\nen cierto diario repleto de incógnitas."
          violet: "Según un artículo publicado en cierta revista de\ndudosa veracidad, este Pokémon guarda relación\ncon un fenómeno que tiene lugar en otra región."
        ko:
          scarlet: "수수께끼로 가득한 탐험기에\n“고동치는달”이라는 이름으로 기록된\n생물일 가능성이 있다."
          violet: "괴상한 잡지의 기사에 의하면\n어떤 지방에서 일어나는 현상과\n관련 있는 포켓몬이라고 한다."
        zh_simp:
          scarlet: "它有可能就是谜团重重的\n探险记中被记载为\n轰鸣月这个名字的生物。"
          violet: "根据可疑杂志的报道所说，\n这种宝可梦好像跟某个地区\n会发生的现象有关联。"
        zh_trad:
          scarlet: "牠有可能就是在謎團重重的\n探險記裡，以轟鳴月這個\n名字被記載下來的生物。"
          violet: "根據可疑雜誌的報導來看，\n這種寶可夢好像跟某個地區\n會發生的現象有關連。"
