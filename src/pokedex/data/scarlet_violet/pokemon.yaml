        jp_kana:
          scarlet: "￹硬￺かた￻い　￹尻尾￺しっぽ￻で　￹地中￺ちちゅう￻　￹深￺ふか￻くの\n￹岩盤￺がんばん￻を　くり￹抜￺ぬ￻き　￹巣￺す￻を　￹作￺つく￻る。\n￹巣穴￺すあな￻は　￹長￺なが￻さ１０キロに　およぶ。"
          violet: "￹細長￺ほそなが￻い　￹肺￺はい￻いっぱいに　￹空気￺くうき￻を\n￹吸￺す￻い￹込￺こ￻み　￹強烈￺きょうれつ￻な　￹爆風￺ばくふう￻を　￹起￺お￻こして\n￹敵￺てき￻を　￹巣￺す￻から　￹追￺お￻い￹出￺だ￻す。"
        jp_kanji:
          scarlet: "￹硬￺かた￻い　￹尻尾￺しっぽ￻で　￹地中￺ちちゅう￻　￹深￺ふか￻くの\n￹岩盤￺がんばん￻を　くり￹抜￺ぬ￻き　￹巣￺す￻を　￹作￺つく￻る。\n￹巣穴￺すあな￻は　￹長￺なが￻さ１０キロに　およぶ。"
          violet: "￹細長￺ほそなが￻い　￹肺￺はい￻いっぱいに　￹空気￺くうき￻を\n￹吸￺す￻い￹込￺こ￻み　￹強烈￺きょうれつ￻な　￹爆風￺ばくふう￻を　￹起￺お￻こして\n￹敵￺てき￻を　￹巣￺す￻から　￹追￺お￻い￹出￺だ￻す。"
        en:
          scarlet: "This Pokémon uses its hard tail to make its nest\nby boring holes into bedrock deep underground.\nThe nest can reach lengths of over six miles."
          violet: "It drives enemies out of its nest by sucking\nin enough air to fill its long, narrow lungs,\nthen releasing the air in an intense blast."
        fr:
          scarlet: "Il se sert de sa queue pour creuser son\nterrier dans les profondeurs rocheuses de la\nterre. Celui-ci peut faire jusqu’à 10 km de long."
          violet: "Il chasse ses adversaires de son nid avec\nde violentes bourrasques qu’il génère en expirant\nl’air accumulé dans ses poumons longs et fins."
        it:
          scarlet: "Con la dura coda perfora gli strati rocciosi\ndel sottosuolo per farne la sua tana, che\npuò raggiungere i 10 km di profondità."
          violet: "Scaccia i nemici che si intrufolano nella sua tana\ncon violente raffiche di vento che emette dai\nlunghi polmoni dopo averli riempiti d’aria."
        de:
          scarlet: "Mit seinem harten Schweif höhlt es tief unter der\nErde Felsgestein aus, um seinen Bau zu graben.\nDessen Gänge können bis zu 10 km lang werden."
          violet: "Es vertreibt Feinde aus seinem Nest, indem es\ngroße Mengen Luft in seine lange, schmale Lunge\nsaugt und eine mächtige Druckwelle ausstößt."
        es:
          scarlet: "Usa su dura cola para horadar el lecho rocoso\nen las profundidades de la tierra y establecer su\nmadriguera, cuyos túneles se extienden 10 km."
          violet: "Para expulsar a los intrusos de su madriguera,\ninfla sus largos y finos pulmones y luego libera el\naire de golpe en una intensa y explosiva ráfaga."
        ko:
          scarlet: "단단한 꼬리로 땅속 깊은 곳에 있는\n암반을 뚫어서 보금자리를 만든다.\n굴의 깊이는 무려 10km에 이른다."
          violet: "가늘고 긴 폐 안에 공기를 가득 채운 뒤\n강렬한 폭풍을 일으켜서\n상대를 굴에서 쫓아낸다."
        zh_simp:
          scarlet: "会用坚硬的尾巴来挖穿\n地下深处的岩盘来筑巢。\n巢穴长达１０公里。"
          violet: "会吸进空气充满细长的肺部，\n然后掀起强烈的爆炸气浪，\n将敌人赶出自己的巢穴。"
        zh_trad:
          scarlet: "會用堅硬的尾巴挖穿\n地下深處的岩盤來築巢。\n巢穴可以長達１０公里。"
          violet: "會吸進空氣充滿細長的肺部，\n然後掀起強烈的爆炸氣浪\n將敵人趕出自己的巢穴。"
