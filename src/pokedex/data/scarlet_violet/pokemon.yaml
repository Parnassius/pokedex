          scarlet: "￹太￺ふと￻い　￹木￺き￻の￹幹￺みき￻に　くっついている。\nなにかの　￹気配￺けはい￻を　￹感￺かん￻じるたび\n￹殻￺から￻の　￹破片￺はへん￻を　￹撃￺う￻ち￹出￺だ￻すのだ。"
          violet: "￹鋼鉄￺こうてつ￻のように　￹硬￺かた￻い　￹殻￺から￻で\n￹全身￺ぜんしん￻を　￹覆￺おお￻っている。\n￹中￺なか￻の　￹正体￺しょうたい￻は　￹不明￺ふめい￻。"
        jp_kanji:
          scarlet: "￹太￺ふと￻い　￹木￺き￻の￹幹￺みき￻に　くっついている。\nなにかの　￹気配￺けはい￻を　￹感￺かん￻じるたび\n￹殻￺から￻の　￹破片￺はへん￻を　￹撃￺う￻ち￹出￺だ￻すのだ。"
          violet: "￹鋼鉄￺こうてつ￻のように　￹硬￺かた￻い　￹殻￺から￻で\n￹全身￺ぜんしん￻を　￹覆￺おお￻っている。\n￹中￺なか￻の　￹正体￺しょうたい￻は　￹不明￺ふめい￻。"
        en:
          scarlet: "It’s usually found hanging on to a fat tree trunk.\nIt shoots out bits of its shell when it sees action."
          violet: "Its entire body is shielded by a steel-hard shell.\nWhat lurks inside this shell is a total mystery."
        fr:
          scarlet: "On le trouve accroché au tronc des gros arbres,\nd’où il crache des morceaux de sa carapace\nau moindre mouvement."
          violet: "Une énorme carapace aussi solide que l’acier\nprotège son corps. Ce qui se trouve sous cette\ncarapace est un mystère."
        it:
          scarlet: "Lo si vede spesso attaccato al tronco di qualche\ngrosso albero. Quando avverte una qualche\npresenza, scaglia frammenti del suo guscio."
          violet: "L’intero corpo è protetto da un guscio duro\ncome l’acciaio. Nessuno sa cosa ci sia all’interno."
        de:
          scarlet: "Es haftet an dicken Baumstämmen. Nimmt es\nirgendeine Bewegung wahr, feuert es mit Teilen\nseiner Schale um sich."
          violet: "Sein gesamter Körper steckt in einer stahlharten\nSchale. Ihr Inneres bleibt ein Geheimnis."
        es:
          scarlet: "Se le suele ver enganchado al tronco de un\nárbol grande. Cuando comienza la acción,\ndispara trozos de su coraza."
          violet: "Todo su cuerpo está protegido por una coraza\nde metal. Lo que se esconde en su interior es\nun misterio."
        ko:
          scarlet: "굵은 나무줄기에 달라붙어 있다.\n무언가의 기척을 느낄 때마다\n껍질 파편을 날려 댄다."
          violet: "강철 같은 단단한 껍질로\n전신을 싸고 있다.\n내용물의 정체는 수수께끼다."
        zh_simp:
          scarlet: "会贴在粗大的树干上。\n一旦察觉到了什么，\n就会射出外壳的碎片。"
          violet: "全身包裹着\n如钢铁般坚硬的壳。\n内部的真面目无人知晓。"
        zh_trad:
          scarlet: "總是貼著在粗大的樹幹上。\n一旦察覺到了什麼，\n就會射出外殼的碎片。"
          violet: "全身覆蓋著有如\n鋼鐵般堅硬的殼。\n殼裡的真面目至今不明。"
