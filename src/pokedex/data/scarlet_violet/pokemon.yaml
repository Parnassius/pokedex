        jp_kana:
          scarlet: "￹金色￺きんいろ￻に　￹光￺ひか￻る　￹髭￺ひげ￻は　￹高度￺こうど￻な\nセンサー。　￹数￺すう￻キロ￹先￺さき￻の　￹音￺おと￻も\n￹振動￺しんどう￻として　￹感知￺かんち￻　できるのだ。"
          violet: "￹金属質￺きんぞくしつ￻の　￹髭￺ひげ￻は　￹重￺おも￻いので\n￹素早￺すばや￻さは　いまいちだが　￹硬￺かた￻い\n￹岩盤￺がんばん￻も　￹掘￺ほ￻りぬくパワーを　￹持￺も￻つ。"
        jp_kanji:
          scarlet: "￹金色￺きんいろ￻に　￹光￺ひか￻る　￹髭￺ひげ￻は　￹高度￺こうど￻な\nセンサー。　￹数￺すう￻キロ￹先￺さき￻の　￹音￺おと￻も\n￹振動￺しんどう￻として　￹感知￺かんち￻　できるのだ。"
          violet: "￹金属質￺きんぞくしつ￻の　￹髭￺ひげ￻は　￹重￺おも￻いので\n￹素早￺すばや￻さは　いまいちだが　￹硬￺かた￻い\n￹岩盤￺がんばん￻も　￹掘￺ほ￻りぬくパワーを　￹持￺も￻つ。"
        en:
          scarlet: "Its shining gold whiskers are advanced sensors\nthat can detect vibrations from sounds several\nmiles away."
          violet: "Its metallic whiskers are heavy, so it’s not very\nfast, but it has the power to dig through even\nthe hardest bedrock."
        fr:
          scarlet: "Ses vibrisses dorées sont des capteurs\ntrès puissants qui lui permettent de repérer\ndes ondes sonores à plusieurs kilomètres."
          violet: "Ses vibrisses métalliques sont très lourdes\net le ralentissent, mais il est assez puissant\npour forer même la roche la plus dure."
        it:
          scarlet: "Le sue chiome dorate sono sensori accuratissimi\nin grado di rilevare le vibrazioni di un suono\nprodotto a diversi chilometri di distanza."
          violet: "Le sue pesanti chiome metalliche ne rallentano\ni movimenti, ma in compenso possiede una forza\ntale da perforare anche la dura roccia."
        de:
          scarlet: "Seine golden leuchtenden Haare sind sensible\nSensoren, die Geräusche in mehreren Kilometern\nEntfernung als Vibrationen wahrnehmen können."
          violet: "Da seine metallischen Haare schwer sind, ist es\nnicht besonders flink. Dafür hat es aber die Kraft,\nsich durch harte Felsschichten zu graben."
        es:
          scarlet: "Sus brillantes filamentos dorados son potentes\nsensores. Puede detectar las vibraciones de un\nsonido a varios kilómetros de distancia."
          violet: "El peso de sus filamentos metálicos limita su\nvelocidad, pero su fuerza le permite excavar\nincluso las capas de roca más duras."
        ko:
          scarlet: "금빛으로 빛나는 수염은 고도의 센서다.\n수 킬로미터 밖의 소리도\n진동으로 감지할 수 있다."
          violet: "금속질의 수염이 무거워서\n스피드는 별로지만 딱딱한 암반도\n깊이 파낼 정도의 파워를 가졌다."
        zh_simp:
          scarlet: "闪着金光的胡须是高灵敏的感应器。\n连数公里外的声音也能通过振动感知到。"
          violet: "金属材质的胡须很重，\n所以速度不怎么快，\n但有着能挖穿坚硬岩盘的力量。"
        zh_trad:
          scarlet: "閃著金光的鬍鬚是靈敏度極高的\n感應器。就連數公里外的聲音\n也能透過振動感應到。"
          violet: "金屬材質的鬍鬚很重，\n所以速度並不快，\n但擁有能夠挖穿堅硬岩盤的力量。"
