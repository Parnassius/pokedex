        jp_kana:
          scarlet: "￹毒素￺どくそ￻と　￹岩￺いわ￻の　￹成分￺せいぶん￻を　￹混￺ま￻ぜた　ガスを\n８つに　￹増￺ふ￻えた　シリンダーで\n￹爆発￺ばくはつ￻させ　エネルギーを　￹作￺つく￻る。"
          violet: "￹排気音￺はいきおん￻で　￹激￺はげ￻しく　￹威嚇￺いかく￻する。\n￹円筒形￺えんとうけい￻の　￹口￺くち￻から　べろを　￹出￺だ￻して\n￹毒液￺どくえき￻を　まき￹散￺ち￻らす。"
        jp_kanji:
          scarlet: "￹毒素￺どくそ￻と　￹岩￺いわ￻の　￹成分￺せいぶん￻を　￹混￺ま￻ぜた　ガスを\n８つに　￹増￺ふ￻えた　シリンダーで\n￹爆発￺ばくはつ￻させ　エネルギーを　￹作￺つく￻る。"
          violet: "￹排気音￺はいきおん￻で　￹激￺はげ￻しく　￹威嚇￺いかく￻する。\n￹円筒形￺えんとうけい￻の　￹口￺くち￻から　べろを　￹出￺だ￻して\n￹毒液￺どくえき￻を　まき￹散￺ち￻らす。"
        en:
          scarlet: "It creates a gas out of poison and minerals from\nrocks. It then detonates the gas in its cylinders—\nnow numbering eight—to generate energy."
          violet: "Revavroom viciously threatens others with the\nsound of its exhaust. It sticks its tongue out from\nits cylindrical mouth and sprays toxic fluids."
        fr:
          scarlet: "Il produit de l’énergie en faisant exploser dans\nses huit cylindres un mélange gazeux qui contient\nune substance toxique et des minéraux."
          violet: "Ce Pokémon intimide ses adversaires grâce\nau bruit de ses pots d’échappement et répand\ndu liquide empoisonné à l’aide de sa langue."
        it:
          scarlet: "Produce energia facendo esplodere nei suoi\notto cilindri un gas che forma mescolando\ntossine e minerali delle rocce."
          violet: "Intimidisce il nemico con il rumore assordante\ndei suoi scarichi. Spruzza liquido tossico dalla\nbocca cilindrica facendo pernacchie."
        de:
          scarlet: "Mit seinen nunmehr acht Zylindern lässt es ein\nGasgemisch aus Gift und Gesteinsmineralien\nexplodieren, um daraus Energie zu gewinnen."
          violet: "Den Auspufflärm nutzt es als starke Drohgebärde.\nEs streckt seine Zunge aus dem zylindrischen\nMund und verteilt dabei eine giftige Flüssigkeit."
        es:
          scarlet: "Posee ocho cilindros, con los que genera\nenergía haciendo estallar el gas que produce al\nmezclar los minerales de las rocas con su veneno."
          violet: "Produce un ruido estrepitoso por los tubos\nde escape para intimidar. Saca la lengua por su\nboca cilíndrica y esparce un líquido venenoso."
        ko:
          scarlet: "독소와 바위 성분이 섞인 가스를\n8개로 늘어난 실린더에서 폭발시켜\n에너지를 만들어 낸다."
          violet: "배기음을 내어 거세게 위협한다.\n원통형의 입을 통해 혀를 꺼내고는\n독액을 흩뿌린다."
        zh_simp:
          scarlet: "在增加到８个之多的汽缸里\n引爆混有毒素和岩石成分的\n气体来制造能量。"
          violet: "用排气的声音猛烈地威吓对手。\n会从圆筒形的嘴巴\n吐出舌头并喷洒毒液。"
        zh_trad:
          scarlet: "在增加到了８個的汽缸裡\n引爆混有毒素和岩石成分的\n氣體來製造能量。"
          violet: "用排氣聲猛烈威嚇對手。\n會從圓筒形的嘴巴\n吐出舌頭並噴灑毒液。"
