          scarlet: "ツノの　￹花￺はな￻が　￹多￺おお￻い　メブキジカは\n￹花￺はな￻に　￹栄養￺えいよう￻が　￹取￺と￻られるため\n￹成長￺せいちょう￻が　￹少￺すこ￻し　￹遅￺おそ￻いらしい。"
          violet: "￹愛好家￺あいこうか￻の　￹多￺おお￻い　ポケモン。\nツノに　￹咲￺さ￻く　￹薄紅色￺うすべにいろ￻の　￹花￺はな￻が\n￹淡￺あわ￻いほど　￹美￺うつく￻しいとされている。"
        jp_kanji:
          scarlet: "ツノの　￹花￺はな￻が　￹多￺おお￻い　メブキジカは\n￹花￺はな￻に　￹栄養￺えいよう￻が　￹取￺と￻られるため\n￹成長￺せいちょう￻が　￹少￺すこ￻し　￹遅￺おそ￻いらしい。"
          violet: "￹愛好家￺あいこうか￻の　￹多￺おお￻い　ポケモン。\nツノに　￹咲￺さ￻く　￹薄紅色￺うすべにいろ￻の　￹花￺はな￻が\n￹淡￺あわ￻いほど　￹美￺うつく￻しいとされている。"
        en:
          scarlet: "It seems that a Sawsbuck with many flowers on its\nantlers will grow at a slightly slower pace because\nthe flowers absorb the Pokémon’s nutrients."
          violet: "There are many Sawsbuck enthusiasts. The paler\nthe pink flowers that bloom on its antlers, the\nmore beautiful the Sawsbuck is considered to be."
        fr:
          scarlet: "Les fleurs sur ses bois absorbent les nutriments,\nce qui peut ralentir sa croissance si elles sont\nnombreuses."
          violet: "Ce Pokémon est apprécié par beaucoup de\nmonde. Plus les fleurs roses qui poussent sur\nses bois sont pâles, plus il suscite l’admiration."
        it:
          scarlet: "Gli esemplari che hanno più fiori sulle corna\ncrescono un po’ più lentamente, perché i fiori\nassorbono più sostanze nutritive."
          violet: "Questo Pokémon è molto ammirato. È ritenuto\ntanto più bello quanto più sono pallidi i fiori rosa\nche sbocciano sulle sue corna."
        de:
          scarlet: "Kronjuwild mit vielen Blüten auf ihren Hörnern\nscheinen etwas langsamer zu wachsen, weil die\nBlüten ihre Nährstoffe absorbieren."
          violet: "Dieses Pokémon hat viele Bewunderer. Es wird\nals umso schöner empfunden, je blasser die\nrosafarbenen Blüten auf seinen Hörnern blühen."
        es:
          scarlet: "Los ejemplares con la cornamenta más florida\npresentan un desarrollo ligeramente más lento\ndebido a los nutrientes que consumen las flores."
          violet: "Este Pokémon cuenta con muchos admiradores.\nCuanto más pálidas son las flores rosadas de\nsu cornamenta, más bellos se consideran."
        ko:
          scarlet: "뿔에 많은 꽃이 핀 바라철록은\n꽃에 영양분을 빼앗기기 때문에\n성장이 조금 늦다고 한다."
          violet: "애호가가 많은 포켓몬.\n뿔에 핀 분홍색 꽃의 색이 옅을수록\n아름다운 것으로 여겨진다."
        zh_simp:
          scarlet: "角上的花很多的萌芽鹿\n由于会被花抢走养分，\n从而成长速度略显缓慢。"
          violet: "拥有许多爱好者的宝可梦。\n人们认为它角上绽放的淡红色花朵\n颜色越淡就代表越美丽。"
        zh_trad:
          scarlet: "角上有很多花的萌芽鹿\n由於會被花搶走養分，\n而導致成長速度略顯緩慢。"
          violet: "有許多愛好者的寶可夢。\n愛好者們認為牠角上綻放的\n淡紅色花朵顏色越淡越是美麗。"
