      descriptions:
        jp_kana:
          scarlet: "￹満月￺まんげつ￻の　￹夜￺よる￻　どこから　ともなく\n￹集￺あつ￻まり　ピッピたちは　￹踊￺おど￻りだす。\n￹月￺つき￻の￹光￺ひかり￻を　￹浴￺あ￻びて　￹浮￺う￻かぶのだ。"
          violet: "￹満月￺まんげつ￻の　￹晩￺ばん￻に　￹集￺あつ￻まって\n￹仲間￺なかま￻と　ダンス。　その￹周囲￺しゅうい￻は\n￹異常￺いじょう￻な　￹磁場￺じば￻に　￹包￺つつ￻まれる。"
        jp_kanji:
          scarlet: "￹満月￺まんげつ￻の　￹夜￺よる￻　どこから　ともなく\n￹集￺あつ￻まり　ピッピたちは　￹踊￺おど￻りだす。\n￹月￺つき￻の￹光￺ひかり￻を　￹浴￺あ￻びて　￹浮￺う￻かぶのだ。"
          violet: "￹満月￺まんげつ￻の　￹晩￺ばん￻に　￹集￺あつ￻まって\n￹仲間￺なかま￻と　ダンス。　その￹周囲￺しゅうい￻は\n￹異常￺いじょう￻な　￹磁場￺じば￻に　￹包￺つつ￻まれる。"
        en:
          scarlet: "On nights with a full moon, Clefairy gather from\nall over and dance. Bathing in moonlight makes\nthem float."
          violet: "On nights with a full moon, they gather together\nand dance. The surrounding area is enveloped\nin an abnormal magnetic field."
        fr:
          scarlet: "Les Mélofée se rassemblent de toutes parts pour\ndanser les nuits de pleine lune. Ils flottent dans\nles airs après avoir absorbé la lumière lunaire."
          violet: "Les nuits de pleine lune, ils se rassemblent\npour danser, ce qui génère un mystérieux\nchamp magnétique autour d’eux."
        it:
          scarlet: "Nelle notti di luna piena saltano fuori da non si\nsa dove e si radunano per danzare insieme,\nfluttuando al chiaro di luna."
          violet: "Nelle notti di luna piena, i Clefairy si radunano\nper danzare. Intorno a loro si crea un misterioso\ncampo magnetico."
        de:
          scarlet: "Bei Vollmond kommen die Piepi von überall\nzusammen, um zu tanzen. Das Mondlicht lässt\nsie in der Luft schweben."
          violet: "Bei Vollmond versammeln sie sich und tanzen\ngemeinsam. Um sie herum entsteht dadurch ein\nungewöhnliches Magnetfeld."
        es:
          scarlet: "En las noches de luna llena, Clefairy de diversos\nlugares se reúnen para bailar bajo su luz, la cual\nlos hace flotar."
          violet: "Cuando hay luna llena, los Clefairy salen en\ngrupo a bailar. A su alrededor se genera un\nmisterioso campo magnético."
        ko:
          scarlet: "삐삐들은 보름달 밤에\n어디에서 왔는지도 모르게 모여 춤춘다.\n달빛을 받으면 떠오른다."
          violet: "보름달 밤에 모여서\n동료와 춤을 춘다. 그 주변은\n이상한 자기장으로 둘러싸인다."
        zh_simp:
          scarlet: "在满月的夜晚，不知从何处\n而来的皮皮们会聚集起来跳舞。\n沐浴到月光后会浮在空中。"
          violet: "在月圆之夜聚集，和伙伴一起跳舞。\n那周围也会被异常的磁场包围。"
        zh_trad:
          scarlet: "在滿月的夜晚，不知從何處\n出現的皮皮們會聚起來跳舞。\n沐浴到月光就會浮在空中。"
          violet: "在月圓之夜聚集，\n和夥伴一起跳舞。\n周圍被異常的磁場包圍著。"
