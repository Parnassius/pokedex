        jp_kana:
          scarlet: "￹大食￺おおぐ￻らいだが　エサを　￹取￺と￻るのは\n￹苦手￺にがて￻。　シャリタツと　コンビを\n￹組￺く￻んで　￹獲物￺えもの￻を　￹捕￺と￻らえるのだ。"
          violet: "シャリタツを　￹親分￺おやぶん￻のように\n￹慕￺した￻っている。　￹力持￺ちからも￻ちだが\n￹頭￺あたま￻は　あまり　￹良￺よ￻くないらしい。"
        jp_kanji:
          scarlet: "￹大食￺おおぐ￻らいだが　エサを　￹取￺と￻るのは\n￹苦手￺にがて￻。　シャリタツと　コンビを\n￹組￺く￻んで　￹獲物￺えもの￻を　￹捕￺と￻らえるのだ。"
          violet: "シャリタツを　￹親分￺おやぶん￻のように\n￹慕￺した￻っている。　￹力持￺ちからも￻ちだが\n￹頭￺あたま￻は　あまり　￹良￺よ￻くないらしい。"
        en:
          scarlet: "This Pokémon is a glutton, but it’s bad at\ngetting food. It teams up with a Tatsugiri\nto catch prey."
          violet: "It treats Tatsugiri like its boss and follows\nit loyally. Though powerful, Dondozo is\napparently not very smart."
        fr:
          scarlet: "Comme il n’est pas très doué pour attraper\nses proies, ce Pokémon vorace fait équipe\navec Nigirigon pour chasser."
          violet: "Il semblerait que ce puissant Pokémon ne\nse distingue pas par son intelligence. Il considère\nNigirigon comme son supérieur."
        it:
          scarlet: "È un Pokémon vorace, ma non è molto abile\nnel procacciarsi il cibo. Cattura le sue prede\ncollaborando con il Tatsugiri che è con lui."
          violet: "È molto forte, ma non sembra essere\nparticolarmente intelligente. Adora il Tatsugiri\nche è con lui e lo considera il suo capo."
        de:
          scarlet: "Es ist zwar ein Vielfraß, doch die Jagd liegt\nihm nicht. Deshalb schließt es sich mit\nNigiragi zusammen, um Beute zu fangen."
          violet: "Dieses Pokémon ist sehr stark, aber anscheinend\nnicht besonders schlau. Es ist Nigiragi treu\nergeben, so als wäre dieses sein Anführer."
        es:
          scarlet: "Le gusta mucho comer, pero no se le da\nbien cazar, por lo que aúna fuerzas con\nTatsugiri con el fin de capturar presas."
          violet: "Idolatra a Tatsugiri y lo trata como a un\nlíder. Posee una fuerza descomunal, pero\nno destaca precisamente por su gran intelecto."
        ko:
          scarlet: "대식가지만 먹이를 잡는 것이 서툴다.\n싸리용과 콤비를 이뤄\n먹이를 사냥한다."
          violet: "싸리용을 두목처럼 모신다.\n힘 하나는 천하장사지만\n머리는 그다지 좋지 못하다고 한다."
        zh_simp:
          scarlet: "虽然是个大胃王，\n却不怎么擅长捕食。\n会和米立龙联手捕捉猎物。"
          violet: "把米立龙当作头领般敬重。\n虽然是个大力士，\n但头脑似乎不是很聪明。"
        zh_trad:
          scarlet: "雖然是個大胃王，\n但不擅長捕食。\n會和米立龍聯手捕捉獵物。"
          violet: "將米立龍當成頭領般敬重。\n雖然是個大力士，\n但頭腦似乎不是很聰明。"
