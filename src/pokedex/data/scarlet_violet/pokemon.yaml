          scarlet: "￹大￺おお￻きな　￹瞳￺ひとみ￻から　サイコパワーを\n￹浴￺あ￻びせて　￹相手￺あいて￻を　￹動￺うご￻けなくする。\n￹見￺み￻かけによらず　￹気性￺きしょう￻は　￹荒￺あら￻い。"
          violet: "￹色￺いろ￻とりどりの　フリルの　￹隙間￺すきま￻から\nサイコパワーを　￹放出￺ほうしゅつ￻して\n￹時速￺じそく￻２００キロで　￹疾走￺しっそう￻する。"
        jp_kanji:
          scarlet: "￹大￺おお￻きな　￹瞳￺ひとみ￻から　サイコパワーを\n￹浴￺あ￻びせて　￹相手￺あいて￻を　￹動￺うご￻けなくする。\n￹見￺み￻かけによらず　￹気性￺きしょう￻は　￹荒￺あら￻い。"
          violet: "￹色￺いろ￻とりどりの　フリルの　￹隙間￺すきま￻から\nサイコパワーを　￹放出￺ほうしゅつ￻して\n￹時速￺じそく￻２００キロで　￹疾走￺しっそう￻する。"
        en:
          scarlet: "It immobilizes opponents by bathing them in\npsychic power from its large eyes. Despite its\nappearance, it has a vicious temperament."
          violet: "It emits psychic power from the gaps between its\nmulticolored frills and sprints at speeds greater\nthan 120 mph."
        fr:
          scarlet: "Ce Pokémon immobilise ses adversaires grâce\nà l’énergie psychique qui émane de ses grands\nyeux. Il est beaucoup plus violent qu’il n’en a l’air."
          violet: "Son énergie psychique émane des interstices\nsitués entre ses volants colorés. Il peut courir\nà une vitesse de 200 km/h."
        it:
          scarlet: "Immobilizza l’avversario con il potere psichico\nche emette dalle grandi pupille. Dall’aspetto\nnon si direbbe, ma ha un’indole violenta."
          violet: "Il potere psichico che emette dagli spazi tra le\nbalze colorate del corpo gli permette di correre\nalla velocità di 200 km/h."
        de:
          scarlet: "Es macht Gegner bewegungsunfähig, indem es\nPsycho-Kräfte über seine großen Augen freisetzt.\nEntgegen seinem Äußeren ist es ziemlich brutal."
          violet: "Über die Lücken zwischen seinen farbenfrohen\nRüschen setzt es Psycho-Kräfte frei. Es kann eine\nGeschwindigkeit von bis zu 200 km/h erreichen."
        es:
          scarlet: "Baña al rival con el poder psíquico que emana\nde sus grandes ojos y lo inmoviliza. A pesar de\nsu aspecto, posee un temperamento feroz."
          violet: "Emite energía psíquica por los huecos entre sus\nvolantes multicolor y alcanza los 200 km/h en\ncarrera."
        ko:
          scarlet: "커다란 눈동자에서 사이코 파워를\n발산하여 상대를 움직일 수 없게 한다.\n겉보기와 다르게 성질이 사납다."
          violet: "형형색색의 프릴 사이사이로\n사이코 파워를 방출하며\n시속 200km로 질주한다."
        zh_simp:
          scarlet: "大大的眼睛会放出\n精神力量使对手无法动弹。\n与外表不同，性格很凶暴。"
          violet: "会从彩色的褶边的缝隙间\n释放出精神力量，借此以\n时速２００公里的速度狂奔。"
        zh_trad:
          scarlet: "會從大大的眼睛放出\n精神力量讓對手無法動彈。\n有別外表，性格非常粗暴。"
          violet: "會從鮮豔褶邊的縫隙間\n釋放出精神力量，藉此以\n時速２００公里的速度狂奔。"
