          scarlet: "￹歌声￺うたごえ￻で　￹姿￺すがた￻かたちを　￹変￺か￻える\n￹炎￺ほのお￻の￹鳥￺とり￻は　￹頭上￺ずじょう￻の　￹火玉￺ひだま￻に\n￹魂￺たましい￻が　￹宿￺やど￻ったもの　だという。"
          violet: "￹優￺やさ￻しい　￹歌声￺うたごえ￻は　￹聴￺き￻いた￹者￺もの￻の\n￹魂￺たましい￻を　￹癒￺いや￻す。　３０００￹度￺ど￻の　￹炎￺ほのお￻で\n￹敵￺てき￻を　￹焼￺や￻き￹尽￺つ￻くす。"
        jp_kanji:
          scarlet: "￹歌声￺うたごえ￻で　￹姿￺すがた￻かたちを　￹変￺か￻える\n￹炎￺ほのお￻の￹鳥￺とり￻は　￹頭上￺ずじょう￻の　￹火玉￺ひだま￻に\n￹魂￺たましい￻が　￹宿￺やど￻ったもの　だという。"
          violet: "￹優￺やさ￻しい　￹歌声￺うたごえ￻は　￹聴￺き￻いた￹者￺もの￻の\n￹魂￺たましい￻を　￹癒￺いや￻す。　３０００￹度￺ど￻の　￹炎￺ほのお￻で\n￹敵￺てき￻を　￹焼￺や￻き￹尽￺つ￻くす。"
        en:
          scarlet: "The fiery bird changes shape when Skeledirge\nsings. Rumor has it that the bird was born when\nthe fireball on Skeledirge’s head gained a soul."
          violet: "Skeledirge’s gentle singing soothes the souls of\nall that hear it. It burns its enemies to a crisp\nwith flames of over 5,400 degrees Fahrenheit."
        fr:
          scarlet: "Quand il chante, son oiseau de feu change\nde forme. Cet oiseau serait né lorsqu’une\nâme a pris possession de sa boule de feu."
          violet: "Il est capable de carboniser ses adversaires\navec des flammes à 3 000 °C. Sa voix douce\npossède des vertus apaisantes pour l’âme."
        it:
          scarlet: "Si dice che l’uccello di fuoco, plasmato in\nvarie forme dal suo canto, sia uno spirito\nche ha preso dimora nella sua palla di fuoco."
          violet: "Il suo dolce canto placa l’animo di chiunque\nlo ascolti. Riduce in cenere il nemico con\nfiamme che raggiungono i 3.000 ºC."
        de:
          scarlet: "Der feurige Vogel, der durch Skelokroks Gesang\ndie Gestalt ändert, soll eine Seele sein, die sich\nin dem Feuerball auf seinem Kopf niederließ."
          violet: "Sein sanfter Gesang beruhigt die Seelen all\nderer, die ihm lauschen. Feinde verbrennt es\nmit 3000 ℃ heißen Flammen zu Asche."
        es:
          scarlet: "Se dice que el pájaro flamígero al que da\nforma su canto es un espíritu que moraba\nen la bola de fuego que le coronaba la cabeza."
          violet: "Su dulce canto calma el espíritu de quien\nlo oye. Achicharra a sus enemigos con\nllamas que llegan a alcanzar los 3000 ºC."
        ko:
          scarlet: "노랫소리에 따라 모습이 바뀌는\n불새는 머리 위에 있던 불덩이에\n영혼이 깃든 것이라고 한다."
          violet: "고운 노랫소리는\n듣는 이의 영혼을 치유한다.\n3000도의 불꽃으로 적을 불태운다."
        zh_simp:
          scarlet: "能以歌声改变外形的火鸟，\n据说是由灵魂寄宿在\n头上的火球所形成的。"
          violet: "温柔的歌声能治愈听者的灵魂。\n会使用３０００度的火焰\n将敌人烧成灰烬。"
        zh_trad:
          scarlet: "可以透過歌聲改變外形\n的火鳥，據說是靈魂寄宿\n在頭上的火球所形成的。"
          violet: "溫柔的歌聲能療癒聽者的靈魂。\n會使用３０００度的火焰\n將敵人燒成灰燼。"
