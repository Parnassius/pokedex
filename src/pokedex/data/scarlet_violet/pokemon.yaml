      descriptions:
        jp_kana:
          scarlet: "￹体￺からだ￻を　￹包￺つつ￻みこむ　￹糸玉￺いとだま￻は\n￹天敵￺てんてき￻の　ストライクの　カマを\nはね￹返￺かえ￻す　￹弾力性￺だんりょくせい￻を　￹持￺も￻つ。"
          violet: "お￹尻￺しり￻から　￹出￺だ￻す　￹糸￺いと￻は\nワイヤーに　￹匹敵￺ひってき￻する　￹強度￺きょうど￻。\n￹強￺つよ￻さの　￹秘密￺ひみつ￻が　￹研究￺けんきゅう￻されているのだ。"
        jp_kanji:
          scarlet: "￹体￺からだ￻を　￹包￺つつ￻みこむ　￹糸玉￺いとだま￻は\n￹天敵￺てんてき￻の　ストライクの　カマを\nはね￹返￺かえ￻す　￹弾力性￺だんりょくせい￻を　￹持￺も￻つ。"
          violet: "お￹尻￺しり￻から　￹出￺だ￻す　￹糸￺いと￻は\nワイヤーに　￹匹敵￺ひってき￻する　￹強度￺きょうど￻。\n￹強￺つよ￻さの　￹秘密￺ひみつ￻が　￹研究￺けんきゅう￻されているのだ。"
        en:
          scarlet: "The ball of threads wrapped around its body is\nelastic enough to deflect the scythes of Scyther,\nthis Pokémon’s natural enemy."
          violet: "The thread it secretes from its rear is as strong as\nwire. The secret behind the thread’s strength is\nthe topic of ongoing research."
        fr:
          scarlet: "La boule de fil qui entoure son corps est assez\nélastique pour repousser les faux d’Insécateur,\nson ennemi juré."
          violet: "Son postérieur sécrète un fil aussi résistant\nqu’un câble en fer. Cette solidité inexpliquée\nfait actuellement l’objet de recherches."
        it:
          scarlet: "Il gomitolo che avvolge il suo corpo è talmente\nelastico da far rimbalzare le falci di Scyther,\nsuo predatore naturale."
          violet: "Il filo che espelle dal didietro è resistente quanto\nun cavo metallico. Il segreto della sua robustezza\nè tuttora oggetto di studi."
        de:
          scarlet: "Die Fadenkugel, die seinen Körper umgibt,\nist sehr elastisch. Selbst die Sicheln seines\nnatürlichen Feindes Sichlor prallen an ihr ab."
          violet: "Der Faden, den Tarundel über seinen Hinterleib\nabsondert, ist so stark wie Draht. Das Geheimnis\ndieser Stärke wird noch erforscht."
        es:
          scarlet: "La bola de hilo que le rodea el cuerpo es lo\nbastante elástica como para repeler las guadañas\nde los Scyther, su enemigo natural."
          violet: "El hilo que secreta por la parte trasera es fuerte\ncomo el alambre. Su resistencia es un misterio\nque a día de hoy aún se sigue estudiando."
        ko:
          scarlet: "몸을 감싸고 있는 실타래는\n천적인 스라크의 낫을\n튕겨 낼 정도의 탄력을 자랑한다."
          violet: "엉덩이에서 나오는 실은\n와이어에 필적하는 강도를 자랑하며\n그 비밀에 대해서는 현재 연구 중이다."
        zh_simp:
          scarlet: "包裹着身体的丝线团\n具有十足的弹力，能把天敌\n飞天螳螂的镰刀反弹回去。"
          violet: "从臀部射出的丝线的\n强度可以匹敌金属丝。\n强度的秘密至今仍在被研究中。"
        zh_trad:
          scarlet: "包裹著身體的線球\n擁有足以把天敵飛天螳螂\n的鐮刀反彈回去的彈力。"
          violet: "從臀部射出的絲線，\n強度足以與金屬絲匹敵。\n強度的秘密仍在研究中。"
