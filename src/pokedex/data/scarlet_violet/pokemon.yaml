      descriptions:
        jp_kana:
          scarlet: "￹情￺なさ￻け￹容赦￺ようしゃ￻ない　￹性格￺せいかく￻。\n￹子分￺こぶん￻の　ヤミカラスの　￹失敗￺しっぱい￻は\n￹絶対￺ぜったい￻に　￹許￺ゆる￻さないと　￹言￺い￻われる。"
          violet: "￹夜行性￺やこうせい￻。　￹一声￺ひとこえ￻　￹鳴￺な￻けば\n１００￹匹￺ぴき￻を　￹超￺こ￻える　￹子分￺こぶん￻の\nヤミカラスが　￹集結￺しゅうけつ￻する。"
        jp_kanji:
          scarlet: "￹情￺なさ￻け￹容赦￺ようしゃ￻ない　￹性格￺せいかく￻。\n￹子分￺こぶん￻の　ヤミカラスの　￹失敗￺しっぱい￻は\n￹絶対￺ぜったい￻に　￹許￺ゆる￻さないと　￹言￺い￻われる。"
          violet: "￹夜行性￺やこうせい￻。　￹一声￺ひとこえ￻　￹鳴￺な￻けば\n１００￹匹￺ぴき￻を　￹超￺こ￻える　￹子分￺こぶん￻の\nヤミカラスが　￹集結￺しゅうけつ￻する。"
        en:
          scarlet: "It is merciless by nature. It is said\nthat it never forgives the mistakes\nof its Murkrow followers."
          violet: "A single cry from this nocturnal\nPokémon, and more than 100 of\nits Murkrow cronies will assemble."
        fr:
          scarlet: "Ce Pokémon impitoyable ne tolère aucun échec\nde la part de ses sbires, les Cornèbre."
          violet: "D’un simple croassement, ce Pokémon nocturne\npeut rassembler une centaine de ses sbires,\nles Cornèbre."
        it:
          scarlet: "Ha un carattere spietato. Pare che non\nperdoni il minimo errore commesso\ndai Murkrow suoi seguaci."
          violet: "È un Pokémon notturno. Basta un suo\nsolo verso per far accorrere all’istante\nun centinaio di Murkrow suoi seguaci."
        de:
          scarlet: "Kramshef kennt kein Erbarmen. Man sagt,\neinem untergebenen Kramurx verzeihe es\nniemals einen Fehler."
          violet: "Dieses nachtaktive Pokémon kann mit einem\neinzigen Ruf über 100 seiner untergebenen\nKramurx versammeln."
        es:
          scarlet: "No perdona ni se apiada nunca. No consiente\nfallos ni a los propios Murkrow que lo siguen."
          violet: "Es un Pokémon nocturno. Con un solo grito\npuede hacer que acudan más de cien de sus\nleales Murkrow."
        ko:
          scarlet: "인정사정 없는 성격.\n부하인 니로우의 실패는\n절대 용서하지 않는다고 전해진다."
          violet: "야행성이다.\n한번 울면 100마리를 넘는\n부하 니로우가 집결한다."
        zh_simp:
          scarlet: "性格冷酷，不留情面。\n据说绝对不会容许\n跟班黑暗鸦犯下失败。"
          violet: "夜行性。只要鸣叫一声，\n就会有超过１００只的\n黑暗鸦跟班聚集起来。"
        zh_trad:
          scarlet: "性格冷酷，不留情面。\n據說絕不會容許手下的\n黑暗鴉有任何的失敗。"
          violet: "夜行性。只要鳴叫一聲，\n就會有超過１００隻的\n黑暗鴉跟班聚集起來。"
