      descriptions:
        jp_kana:
          scarlet: "￹小￺ちい￻さいころは　よく　￹懐￺なつ￻く。\n￹育￺そだ￻つと　￹気性￺きしょう￻が　￹荒￺あら￻くなるが\n￹主￺あるじ￻への　￹恩￺おん￻は　￹忘￺わす￻れない。"
          violet: "￹大￺おお￻きくなるまで　￹群￺む￻れで　￹行動￺こうどう￻。\n￹機嫌￺きげん￻が　￹悪￺わる￻くなると　￹首￺くび￻の　￹岩￺いわ￻で\n￹地面￺じめん￻を　￹叩￺たた￻きはじめる。"
        jp_kanji:
          scarlet: "￹小￺ちい￻さいころは　よく　￹懐￺なつ￻く。\n￹育￺そだ￻つと　￹気性￺きしょう￻が　￹荒￺あら￻くなるが\n￹主￺あるじ￻への　￹恩￺おん￻は　￹忘￺わす￻れない。"
          violet: "￹大￺おお￻きくなるまで　￹群￺む￻れで　￹行動￺こうどう￻。\n￹機嫌￺きげん￻が　￹悪￺わる￻くなると　￹首￺くび￻の　￹岩￺いわ￻で\n￹地面￺じめん￻を　￹叩￺たた￻きはじめる。"
        en:
          scarlet: "This Pokémon is very friendly when it’s young. Its\ndisposition becomes vicious once it matures, but\nit never forgets the kindness of its master."
          violet: "This Pokémon travels in a pack with others until\nit grows up. When its mood turns sour, it starts\nstriking the ground with the rocks on its neck."
        fr:
          scarlet: "Ce Pokémon est très amical lorsqu’il est jeune.\nIl devient plus féroce avec le temps, mais\nsa loyauté envers son Dresseur reste infaillible."
          violet: "Il vit en meute jusqu’à ce qu’il grandisse.\nLorsqu’il est de mauvaise humeur, il frappe\nle sol avec les rochers qui ornent son cou."
        it:
          scarlet: "I cuccioli di Rockruff si affezionano subito.\nCrescendo diventano più feroci, ma provano\nper sempre gratitudine verso chi li ha allenati."
          violet: "I Rockruff rimangono nel branco fin quando non\ndiventano adulti. Quando sono di cattivo umore,\nbattono a terra le rocce che hanno sul collo."
        de:
          scarlet: "Wuffels ist sehr zutraulich, solange es jung ist.\nMit dem Alter wird es zunehmend wilder, doch es\nbleibt seinem Trainer auf ewig verbunden."
          violet: "Sie leben in Rudeln, bis sie ausgewachsen sind.\nWenn sie schlecht gelaunt sind, schlagen sie mit\nihrem steinernen Fellkragen auf den Boden."
        es:
          scarlet: "Cuando es pequeño es muy cariñoso. A medida\nque crece se vuelve más agresivo, pero la lealtad\nhacia su Entrenador perdura para siempre."
          violet: "Se mueven en manada hasta que son adultos.\nCuando están de mal humor, golpean el suelo\ncon las rocas que tienen en el cuello."
        ko:
          scarlet: "어렸을 때는 매우 잘 따른다.\n자라면서 성질이 사나워지지만\n주인에게 입은 은혜는 잊지 않는다."
          violet: "다 클 때까지 무리 지어 행동한다.\n기분이 나쁘면 목에 달린 바위로\n땅을 두드리기 시작한다."
        zh_simp:
          scarlet: "年幼时非常容易亲近。\n虽然长大后脾气变得粗暴，\n但绝不会忘记主人的恩情。"
          violet: "在长大之前会集体行动。\n一旦心情变差，就会开始\n用脖子上的岩石敲打地面。"
        zh_trad:
          scarlet: "年幼時期非常容易親近。\n雖然長大後脾氣會變得粗暴，\n卻絕不會忘記主人的恩情。"
          violet: "在長大前總是集體行動。\n心情變差時會用脖子上\n的岩石開始敲打地面。"
