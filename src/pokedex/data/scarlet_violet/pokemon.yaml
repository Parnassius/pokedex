      descriptions:
        jp_kana:
          scarlet: "￹蜜￺みつ￻のような　￹香￺かお￻りで　￹口￺くち￻の\n￹中￺なか￻に　￹誘￺さそ￻いこまれたら　￹最期￺さいご￻。\n￹溶解液￺ようかいえき￻で　￹溶￺と￻かされてしまう。"
          violet: "たくさんの　エサを　￹溶￺と￻かした\n￹溶解液￺ようかいえき￻は　￹甘￺あま￻さが　￹増￺ま￻して\nもっと　エサを　￹集￺あつ￻めやすくなる。"
        jp_kanji:
          scarlet: "￹蜜￺みつ￻のような　￹香￺かお￻りで　￹口￺くち￻の\n￹中￺なか￻に　￹誘￺さそ￻いこまれたら　￹最期￺さいご￻。\n￹溶解液￺ようかいえき￻で　￹溶￺と￻かされてしまう。"
          violet: "たくさんの　エサを　￹溶￺と￻かした\n￹溶解液￺ようかいえき￻は　￹甘￺あま￻さが　￹増￺ま￻して\nもっと　エサを　￹集￺あつ￻めやすくなる。"
        en:
          scarlet: "It lures prey into its mouth with a nectar-like\naroma. The helpless prey is melted with a\ndissolving fluid."
          violet: "After dissolving many prey, this Pokémon’s\nacid becomes sweeter. This makes it even\neasier to attract more prey."
        fr:
          scarlet: "Le parfum de nectar qu’il dégage lui permet\nd’attirer ses proies dans sa bouche. Ces dernières\nsont alors liquéfiées par un fluide acide."
          violet: "Plus Empiflor dissout de proies grâce à\nson acide, plus celui-ci devient sucré, ce qui\nlui permet d’attirer davantage de victimes."
        it:
          scarlet: "Servendosi di un aroma simile a quello\ndel nettare, attira inesorabilmente la preda\nnella bocca per poi scioglierla con un solvente."
          violet: "Dissolvendo una gran quantità di prede, il suo\nacido si fa più dolce. Ciò gli permette di\nattirarne altre con più facilità."
        de:
          scarlet: "Mit einem nektarartigen Aroma lockt es Beute\nin sein Maul. Dort wird diese in einer ätzenden\nFlüssigkeit rückstandslos aufgelöst."
          violet: "Wurde in seiner ätzenden Lösung bereits\nviel Beute zersetzt, ist diese Flüssigkeit\nsüßer und lockt leichter Beute an."
        es:
          scarlet: "Deja que sus presas se le acerquen a la boca,\natraídas por el aroma a néctar. Una vez dentro,\nlas disuelve con su ácido."
          violet: "A medida que disuelve presas con su ácido,\neste se vuelve más dulce y efectivo a la hora\nde atraer aún más presas."
        ko:
          scarlet: "꿀 같은 향기에 이끌려\n입안에 들어가면 끝장이다.\n용해액에 녹아 버리게 된다."
          violet: "많은 먹이를 녹인\n용해액은 단맛이 더해져서\n더욱 먹이를 모으기 쉽게 된다."
        zh_simp:
          scarlet: "一旦被像蜜一样的香味吸引到\n它的口中就会无法得救。\n只会被它的溶解液溶化掉。"
          violet: "溶掉了大量食物的溶解液\n会更加甜美，从而变得\n更容易吸引猎物上门。"
        zh_trad:
          scarlet: "一旦被如花蜜般的香氣吸引到\n牠的口中，便是死路一條。\n下場是被溶解液溶化掉。"
          violet: "溶化了大量獵物的溶解液\n甜味會更上一層樓，\n變得更容易捕獲獵物。"
