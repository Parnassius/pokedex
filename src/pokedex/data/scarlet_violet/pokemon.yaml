        jp_kana:
          scarlet: "￹筋肉￺きんにく￻を　すべて　￹使￺つか￻った\nダイナミックな　￹泳￺およ￻ぎが　￹得意￺とくい￻だが\nなぜか　￹地上￺ちじょう￻で　￹生活￺せいかつ￻する。"
          violet: "￹発達￺はったつ￻した　￹手足￺てあし￻を　￹使￺つか￻って\nほんの　￹一瞬￺いっしゅん￻だけなら\n￹水￺みず￻の￹上￺うえ￻を　￹走￺はし￻ることができる。"
        jp_kanji:
          scarlet: "￹筋肉￺きんにく￻を　すべて　￹使￺つか￻った\nダイナミックな　￹泳￺およ￻ぎが　￹得意￺とくい￻だが\nなぜか　￹地上￺ちじょう￻で　￹生活￺せいかつ￻する。"
          violet: "￹発達￺はったつ￻した　￹手足￺てあし￻を　￹使￺つか￻って\nほんの　￹一瞬￺いっしゅん￻だけなら\n￹水￺みず￻の￹上￺うえ￻を　￹走￺はし￻ることができる。"
        en:
          scarlet: "Although it’s skilled in a style of dynamic\nswimming that uses all its muscles, for some\nreason it lives on dry land."
          violet: "It can use its well-developed arms and\nlegs to run on the surface of the water\nfor a split second."
        fr:
          scarlet: "Ce Pokémon sait bien nager en mettant\ntous ses muscles à contribution, mais\nétrangement, il préfère vivre sur la terre ferme."
          violet: "Grâce à ses membres développés,\nil peut courir à la surface de l’eau\nl’espace d’un instant."
        it:
          scarlet: "Sebbene nuoti con potenza e abilità\nutilizzando tutti i suoi muscoli, preferisce\nvivere sulla terraferma."
          violet: "Con i suoi arti ben sviluppati può correre\nper un istante a pelo d’acqua."
        de:
          scarlet: "Obwohl es ein geschickter und\nausdauernder Schwimmer ist, der alle\nMuskeln einsetzt, lebt es an Land."
          violet: "Mittels seiner starken Arme und Beine\nkann es für den Bruchteil einer Sekunde\nüber Wasser laufen."
        es:
          scarlet: "Aunque puede nadar de forma hábil y\nenérgica utilizando todos sus músculos,\npor algún motivo prefiere vivir en tierra firme."
          violet: "Puede utilizar sus fornidos brazos y\npiernas para correr muy brevemente\npor la superficie del agua."
        ko:
          scarlet: "근육을 전부 사용하는\n역동적인 헤엄치기가 특기지만\n웬일인지 지상에서 생활한다."
          violet: "발달한 팔다리를 사용하여\n아주 잠깐이지만\n물 위를 달릴 수 있다."
        zh_simp:
          scarlet: "擅长运用全身肌肉来\n强而有力地游泳，\n但不知为何生活在陆地上。"
          violet: "如果只是一瞬间的话，\n它能够利用发达的\n四肢在水上奔跑。"
        zh_trad:
          scarlet: "擅長運用全身所有的肌肉\n展現躍動感十足的泳技，\n但不知為何卻生活在陸地上。"
          violet: "如果只是一瞬間的話，\n牠能夠用肌肉發達的\n四肢在水上奔跑。"
