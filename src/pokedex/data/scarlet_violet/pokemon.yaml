      hidden_ability: stench
      descriptions:
        jp_kana:
          scarlet: "￹薄￺うす￻い　バルーン￹状￺じょう￻の　￹体￺からだ￻に\n￹猛毒￺もうどく￻の　ガスが　￹詰￺つ￻まっているので\nときどき　￹大爆発￺だいばくはつ￻を　￹起￺お￻こす。"
          violet: "￹体内￺たいない￻の　￹毒￺どく￻ガスは　￹空気￺くうき￻より\n￹少￺すこ￻し　￹軽￺かる￻い　￹成分￺せいぶん￻。　だから\nいつも　￹少￺すこ￻しだけ　￹浮￺う￻かんでいる。"
        jp_kanji:
          scarlet: "￹薄￺うす￻い　バルーン￹状￺じょう￻の　￹体￺からだ￻に\n￹猛毒￺もうどく￻の　ガスが　￹詰￺つ￻まっているので\nときどき　￹大爆発￺だいばくはつ￻を　￹起￺お￻こす。"
          violet: "￹体内￺たいない￻の　￹毒￺どく￻ガスは　￹空気￺くうき￻より\n￹少￺すこ￻し　￹軽￺かる￻い　￹成分￺せいぶん￻。　だから\nいつも　￹少￺すこ￻しだけ　￹浮￺う￻かんでいる。"
        en:
          scarlet: "Toxic gas is held within its thin, balloon-shaped\nbody, so it can cause massive explosions."
          violet: "The poisonous gases it contains are a little bit\nlighter than air. That’s why it’s always slightly\nairborne."
        fr:
          scarlet: "Son corps très fin en forme de ballon est\nrempli de gaz toxiques qui provoquent\nparfois de violentes explosions."
          violet: "Les gaz toxiques qu’il contient sont un peu\nplus légers que l’air et le maintiennent\nen lévitation."
        it:
          scarlet: "Il suo corpo sottile come un palloncino contiene\nenormi quantità di gas altamente tossico, che\nogni tanto dà luogo a grandi esplosioni."
          violet: "I gas velenosi che contiene sono di poco più\nleggeri dell’aria, perciò resta sollevato da terra."
        de:
          scarlet: "Da sein dünner, ballonförmiger Körper mit\nsehr giftigem Gas angefüllt ist, verursacht es\nhin und wieder Explosionen."
          violet: "Das giftige Gas in seinem Inneren ist etwas\nleichter als Luft. Dadurch schwebt es stets\nin geringer Höhe."
        es:
          scarlet: "Su cuerpo, con forma de globo y poco grosor,\nencierra gases muy tóxicos que pueden ocasionar\nexplosiones espontáneas de gran magnitud."
          violet: "Los gases venenosos que contiene son\nligeramente menos pesados que el aire,\npor lo que siempre flota levemente."
        ko:
          scarlet: "얇은 풍선 상태의 몸에\n맹독의 가스가 채워져 있어\n가끔 대폭발을 일으킨다."
          violet: "체내의 독가스는 공기보다\n약간 가벼운 성분이다.\n그래서 항상 공중에 살짝 떠 있다."
        zh_simp:
          scarlet: "薄薄的气球状身体里\n贮满了剧毒的瓦斯，\n因此有时会发生大爆炸。"
          violet: "体内的毒瓦斯的成分\n比空气要轻一点，因此\n总是能够稍微飘在空中。"
        zh_trad:
          scarlet: "薄薄的氣球狀身體裡\n儲滿了劇毒的瓦斯，\n所以有時會發生大爆炸。"
          violet: "體內的毒瓦斯成分\n比空氣來得輕一點，\n所以總是微微浮在空中。"
