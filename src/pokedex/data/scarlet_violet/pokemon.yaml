        jp_kanji:
          scarlet: "￹鋭￺するど￻い　ツメの　￹先￺さき￻には　￹強￺つよ￻い　￹電気￺でんき￻が\n￹流￺なが￻れており　ほんの￹少￺すこ￻し　かするだけで\n￹敵￺てき￻を　￹気絶￺きぜつ￻させる。"
          violet: "￹仲間￺なかま￻と　￹尻尾￺しっぽ￻を　つなげると\nより　￹強力￺きょうりょく￻な　￹電撃￺でんげき￻を\nツメから　￹出￺だ￻すことが　できる。"
        en:
          scarlet: "Strong electricity courses through the tips of\nits sharp claws. A light scratch causes fainting\nin foes."
          violet: "By gathering their tails together, they collectively\ngenerate powerful electricity from their claws."
        fr:
          scarlet: "Le courant qui circule à la pointe de ses griffes\naiguisées est tellement puissant que ses ennemis\nperdent connaissance au moindre effleurement."
          violet: "Lorsqu’ils joignent leurs queues, leurs griffes\npeuvent libérer des décharges électriques\nencore plus fortes."
        it:
          scarlet: "Dalla punta degli artigli affilati rilascia\nuna corrente elettrica così intensa che\ngli basta sfiorare i nemici per metterli KO."
          violet: "Se due Luxio collegano le code, riescono a\nemettere dagli artigli una scarica elettrica\nancora più vigorosa."
        de:
          scarlet: "Durch die Spitzen seiner scharfen Krallen strömt\nElektrizität. Selbst kleine Kratzer verursachen\nOhnmacht."
          violet: "Verbindet es seinen Schweif mit dem eines\nArtgenossen, können seine Krallen noch\nheftigere Stromstöße austeilen."
        es:
          scarlet: "Por las puntas de sus garras pasa una fuerte\ncorriente eléctrica. El mínimo roce debilita al\nenemigo."
          violet: "Al unir su cola con la de otro Luxio, pueden\nemitir descargas eléctricas por las garras con\nuna potencia mayor de lo habitual."
        ko:
          scarlet: "날카로운 발톱의 끝에는\n강한 전기가 흐르고 있어서\n살짝 스치는 것만으로 상대를 기절시킨다."
          violet: "동료와 꼬리를 이으면\n더욱 강력한 전기를\n발톱에서 낼 수 있다."
        zh_simp:
          scarlet: "在锐利的爪子尖端有强烈的\n电流流过，只要稍稍碰擦到，\n就能让敌人晕厥。"
          violet: "当把尾巴和伙伴连接\n在一起时，就能从爪子\n释放出更为强大的电击。"
        zh_trad:
          scarlet: "在銳利的爪子尖端有強烈的\n電流流過，只要稍微擦到，\n就能讓敵人暈厥。"
          violet: "只要與夥伴的尾巴互相\n串聯，就能將更加強大\n的電擊從爪子釋放出去。"
