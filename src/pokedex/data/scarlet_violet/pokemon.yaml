          violet: "￹心￺こころ￻の　￹通￺かよ￻い￹合￺あ￻った　トレーナーを\n￹守￺まも￻るとき　￹最大￺さいだい￻　パワーの\nサイコエネルギーが　￹発揮￺はっき￻される。"
        jp_kanji:
          scarlet: "トレーナーを　￹守￺まも￻るためなら\nサイコパワーを　￹使￺つか￻いきり\n￹小￺ちい￻さな　ブラックホールを　￹作￺つく￻り￹出￺だ￻す。"
          violet: "￹心￺こころ￻の　￹通￺かよ￻い￹合￺あ￻った　トレーナーを\n￹守￺まも￻るとき　￹最大￺さいだい￻　パワーの\nサイコエネルギーが　￹発揮￺はっき￻される。"
        en:
          scarlet: "To protect its Trainer, it will expend all its psychic\npower to create a small black hole."
          violet: "It unleashes psychokinetic energy at full power\nwhen protecting a Trainer it has bonded closely\nwith."
        fr:
          scarlet: "Prêt à tout pour protéger son Dresseur, il peut\naller jusqu’à épuiser sa force mentale pour créer\nun mini trou noir."
          violet: "Pour protéger son Dresseur, il n’hésitera pas\nà libérer une puissante décharge d’énergie\ntélékinétique."
        it:
          scarlet: "Per proteggere l’Allenatrice o l’Allenatore dal\npericolo, utilizza tutti i poteri psichici di cui\ndispone per creare un piccolo buco nero."
          violet: "Quando si affeziona alla propria Allenatrice o al\nproprio Allenatore, è disposto a sfoderare tutta\nl’energia psichica di cui è capace in sua difesa."
        de:
          scarlet: "Wenn es seinen Trainer schützen will, nimmt es all\nseine Psycho-Kräfte zusammen, um so ein kleines\nschwarzes Loch zu erzeugen."
          violet: "Steht es mit seinem Trainer in Einklang, bringt es\nseine größtmöglichen Psycho-Kräfte auf, um ihn\nzu beschützen."
        es:
          scarlet: "Para proteger a su Entrenador, emplea todo\nsu poder psíquico en crear un pequeño agujero\nnegro."
          violet: "Si se siente muy unido a su Entrenador, utilizará\ntodo su poder psíquico para protegerlo."
        ko:
          scarlet: "트레이너를 지키기 위해서라면\n사이코 파워를 모두 써서\n작은 블랙홀을 만들어 낸다."
          violet: "마음이 서로 통한 트레이너를\n지킬 때 최대 파워의\n사이코 에너지가 발휘된다."
        zh_simp:
          scarlet: "如果是为了保护训练家，\n它就会用尽自己的精神力量\n制造出小型黑洞。"
          violet: "在保护心意相通的\n训练家时，会发挥出\n自身最强的精神能量。"
        zh_trad:
          scarlet: "如果是為了保護訓練家，\n牠會不惜用盡自己的精神力量\n製造出小型黑洞。"
          violet: "在保護心靈相通的\n訓練家時，會發揮出\n自身最強的精神能量。"
