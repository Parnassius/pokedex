          violet: "Ce Pikachu porte la casquette de son partenaire.\nElle symbolise les liens étroits qu’ils ont tissés\nen surmontant ensemble de nombreux obstacles."
        it:
          scarlet: "Il cappello che Pikachu indossa gli ricorda\ni viaggi fatti con il suo inseparabile compagno.\nIl loro incontro è stato voluto dal destino."
          violet: "Il cappello che indossa è segno del profondo\nlegame instaurato con il suo inseparabile amico\nsuperando insieme mille difficoltà."
        de:
          scarlet: "Die Kappe, die dieses Pikachu trägt, steckt voller\nErinnerungen an die gemeinsame Reise mit seinem\nPartner, dem es wie durch Schicksal begegnete."
          violet: "Es trägt die Kappe seines Partners. Sie zeugt von\nder Freundschaft, die sie durch das gemeinsame\nÜberwinden von Schwierigkeiten vertieft haben."
        es:
          scarlet: "La gorra que lleva este Pikachu está cargada de\ngratos recuerdos de los viajes que, por obra\ndel destino, compartió con su compañero."
          violet: "La gorra que lleva de su compañero simboliza\nlos lazos afectivos que estrecharon superando\njuntos toda clase de dificultades."
        ko:
          scarlet: "피카츄가 쓰고 있는 모자에는\n운명적으로 만난 파트너와 함께\n여행한 추억이 담겨 있다."
          violet: "쓰고 있는 파트너의 모자는\n함께 역경을 헤치며 깊어진\n유대의 증표이기도 하다."
        zh_simp:
          scarlet: "皮卡丘戴着的帽子\n承载着和命中注定的搭档\n一起冒险的回忆。"
          violet: "它所戴的这顶伙伴的帽子，\n是它与伙伴共同克服困难\n而加深了牵绊的证明。"
        zh_trad:
          scarlet: "皮卡丘戴著的帽子\n承載著和命中注定的搭檔\n一起冒險的回憶。"
          violet: "牠戴著的這頂夥伴的帽子，\n是與夥伴一同克服困難\n而加深了牽絆的證明。"
