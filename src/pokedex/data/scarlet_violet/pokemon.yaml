          scarlet: "￹長￺なが￻い　￹体毛￺たいもう￻の￹下￺した￻に　￹隠￺かく￻した　ツタを\n￹器用￺きよう￻に　￹操￺あやつ￻り\n￹硬￺かた￻い　つぼみを　￹敵￺てき￻に　￹叩￺たた￻きつける。"
          violet: "￹体毛￺たいもう￻の　￹硬￺かた￻さは　￹気分￺きぶん￻で　￹変￺か￻わる。\n￹臨戦態勢￺りんせんたいせい￻になると\n￹針￺ハリ￻のように　￹鋭利￺えいり￻に　￹尖￺とが￻るぞ。"
        jp_kanji:
          scarlet: "￹長￺なが￻い　￹体毛￺たいもう￻の￹下￺した￻に　￹隠￺かく￻した　ツタを\n￹器用￺きよう￻に　￹操￺あやつ￻り\n￹硬￺かた￻い　つぼみを　￹敵￺てき￻に　￹叩￺たた￻きつける。"
          violet: "￹体毛￺たいもう￻の　￹硬￺かた￻さは　￹気分￺きぶん￻で　￹変￺か￻わる。\n￹臨戦態勢￺りんせんたいせい￻になると\n￹針￺ハリ￻のように　￹鋭利￺えいり￻に　￹尖￺とが￻るぞ。"
        en:
          scarlet: "Floragato deftly wields the vine hidden beneath\nits long fur, slamming the hard flower bud against\nits opponents."
          violet: "The hardness of Floragato’s fur depends on the\nPokémon’s mood. When Floragato is prepared to\nbattle, its fur becomes pointed and needle sharp."
        fr:
          scarlet: "Il manie avec habileté la liane dissimulée\nsous ses longs poils et frappe ses adversaires\navec le bourgeon dur situé à son extrémité."
          violet: "La rigidité de ses poils dépend de son état\nd’esprit. Quand il se prépare au combat, ceux-ci\nse hérissent et sont acérés comme des aiguilles."
        it:
          scarlet: "Muove con agilità la liana nascosta sotto il lungo\npelo e sferza il nemico con il duro bocciolo\nsulla punta."
          violet: "La durezza della pelliccia cambia in base al suo\nstato d’animo. Quando si accinge alla lotta, il suo\npelo diventa irto di punte acuminate come aghi."
        de:
          scarlet: "Es lenkt geschickt die Ranke, die es unter seinem\nlangen Fell verbirgt, und schleudert die harte\nKnospe an ihrem Ende auf Gegner."
          violet: "Die Geschmeidigkeit seines Fells ändert sich je\nnach Laune des Pokémon. Macht es sich für den\nKampf bereit, wird das Fell so spitz wie Nadeln."
        es:
          scarlet: "Maneja diestramente la vid oculta bajo su largo\npelaje y propina latigazos al enemigo con el\ncapullo endurecido de la punta."
          violet: "La dureza de su pelaje cambia según su estado\nde ánimo. Cuando se prepara para combatir,\nse vuelve duro y punzante como agujas."
        ko:
          scarlet: "긴 털 아래 숨긴 덩굴을\n능숙하게 다뤄서\n단단한 꽃봉오리로 상대를 가격한다."
          violet: "털의 강도는 기분에 따라 변한다.\n전투태세에 들어가면\n바늘처럼 예리하고 뾰족해진다."
        zh_simp:
          scarlet: "灵巧地操控长长的体毛下\n隐藏着的藤蔓，接着\n把坚硬的花苞甩向敌人。"
          violet: "体毛的硬度随心情而变。\n进入迎战状态时，\n体毛会变得如针一般尖锐。"
        zh_trad:
          scarlet: "會靈巧操控長長的體毛下\n隱藏的藤蔓，將堅硬的\n花苞甩向敵人猛打。"
          violet: "體毛的硬度會隨心情而變。\n進入迎戰狀態時，\n體毛會變得如針般尖銳。"
