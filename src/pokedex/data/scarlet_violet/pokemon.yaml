      descriptions:
        jp_kana:
          scarlet: "どのような　￹相手￺あいて￻でも　￹吹￺ふ￻き￹飛￺と￻ばす\nサイコパワーを　￹持￺も￻つが　￹攻撃￺こうげき￻より\n￹仲間￺なかま￻を　￹守￺まも￻るために　￹使￺つか￻う。"
          violet: "￹強力￺きょうりょく￻な　サイコパワーを\n￹出￺だ￻し￹続￺つづ￻けていると　ニャオニクスの\n￹肉体￺にくたい￻にも　ダメージが　およぶ。"
        jp_kanji:
          scarlet: "どのような　￹相手￺あいて￻でも　￹吹￺ふ￻き￹飛￺と￻ばす\nサイコパワーを　￹持￺も￻つが　￹攻撃￺こうげき￻より\n￹仲間￺なかま￻を　￹守￺まも￻るために　￹使￺つか￻う。"
          violet: "￹強力￺きょうりょく￻な　サイコパワーを\n￹出￺だ￻し￹続￺つづ￻けていると　ニャオニクスの\n￹肉体￺にくたい￻にも　ダメージが　およぶ。"
        en:
          scarlet: "Though it has enough psychic power to blast\naway any opponent, Meowstic prefers to support\nits allies rather than attack."
          violet: "If Meowstic continuously emits its powerful\npsychic energy, it will damage its own body."
        fr:
          scarlet: "Il peut projeter ses adversaires dans les airs avec\nses pouvoirs psychiques, mais il préfère les utiliser\npour protéger ses alliés plutôt que pour attaquer."
          violet: "Ce Pokémon est doté de pouvoirs psychiques\nsi puissants qu’ils peuvent même le blesser\ns’il les utilise de manière prolongée."
        it:
          scarlet: "Ha poteri psichici in grado di scaraventare in aria\nqualunque avversario, ma li usa per difendere\ni suoi amici più che per attaccare."
          violet: "Quando rilascia i suoi enormi poteri psichici\nper un tempo prolungato, anche il suo corpo\nne subisce i danni."
        de:
          scarlet: "Mit seinen Psycho-Kräften kann es jede Art von\nGegner fortschleudern. Es setzt sie jedoch lieber\nzum Schutz von Artgenossen als zum Angriff ein."
          violet: "Lässt es seinen starken Psycho-Kräften für längere\nZeit freien Lauf, fügen diese auch seinem eigenen\nKörper Schaden zu."
        es:
          scarlet: "Su poder psíquico podría mandar volando a\ncualquier rival, pero prefiere emplearlo para\nproteger a los suyos antes que para atacar."
          violet: "Si libera su potente poder psíquico de forma\nprolongada, puede llegar a infligirse daño a sí\nmismo."
        ko:
          scarlet: "어떤 상대도 날려 버릴 수 있는\n사이코 파워를 가졌지만\n공격할 때보다는 동료를 지킬 때 사용한다."
          violet: "강력한 사이코 파워를\n계속해서 사용하면\n냐오닉스의 육체에도 손상이 간다."
        zh_simp:
          scarlet: "拥有能击飞任何对手的\n精神力量，但比起攻击敌人，\n它更愿意用于守护伙伴。"
          violet: "如果持续释放强大的\n精神力量，那么超能妙喵\n自身的肉体也会受到伤害。"
        zh_trad:
          scarlet: "擁有能擊飛任何對手的\n精神力量，但比起用在攻擊，\n牠更樂意將它用在守護夥伴上。"
          violet: "如果持續不斷釋放強大的\n精神力量，超能妙喵的\n肉體也會受到傷害。"
    meowstic_female:
