          scarlet: "￹縄張￺なわば￻りに　￹入￺はい￻ってきた　￹相手￺あいて￻を\n￹集団￺しゅうだん￻で　￹打￺う￻ちのめす。\n￹口￺くち￻から　￹酸性￺さんせい￻の　￹体液￺たいえき￻を　￹飛￺と￻ばす。"
          violet: "￹粗暴￺そぼう￻だが　￹自分￺じぶん￻の　￹家族￺かぞく￻や\n￹群￺む￻れの　￹仲間￺なかま￻や　￹縄張￺なわば￻りを\nとっても　￹大切￺たいせつ￻にしている。"
        jp_kanji:
          scarlet: "￹縄張￺なわば￻りに　￹入￺はい￻ってきた　￹相手￺あいて￻を\n￹集団￺しゅうだん￻で　￹打￺う￻ちのめす。\n￹口￺くち￻から　￹酸性￺さんせい￻の　￹体液￺たいえき￻を　￹飛￺と￻ばす。"
          violet: "￹粗暴￺そぼう￻だが　￹自分￺じぶん￻の　￹家族￺かぞく￻や\n￹群￺む￻れの　￹仲間￺なかま￻や　￹縄張￺なわば￻りを\nとっても　￹大切￺たいせつ￻にしている。"
        en:
          scarlet: "Groups of them beat up anything that enters\ntheir territory. Each can spit acidic liquid from\nits mouth."
          violet: "This Pokémon may be rude, but it takes very\ngood care of its family, its friends, and its turf."
        fr:
          scarlet: "Ces Pokémon se regroupent pour rosser tout être\nqui entre sur leur territoire. Ils crachent un liquide\ncorrosif."
          violet: "Ses airs de grosse brute cachent un grand cœur\ndévoué à sa famille, sa bande et son territoire."
        it:
          scarlet: "Attaccano in gruppo chi entra nel loro territorio.\nSputano acido dalla bocca."
          violet: "Ha un’indole violenta, ma al tempo stesso ha\nmolta cura della sua famiglia, dei membri\ndel proprio gruppo e del suo territorio."
        de:
          scarlet: "Es geht im Rudel gegen Eindringlinge in seinem\nRevier vor. Aus seinem Mund speit es eine\nätzende Flüssigkeit."
          violet: "Dieses Pokémon ist ungestüm, doch sein Rudel,\nseine Familie und sein Revier liegen ihm sehr am\nHerzen."
        es:
          scarlet: "Ataca en grupo con virulencia a todo aquel\nque se interne en su territorio. Lanza ácido\npor la boca."
          violet: "A pesar de su actitud chulesca, se preocupa\nmucho por los miembros de su familia, el resto\ndel grupo al que pertenece y su territorio."
        ko:
          scarlet: "영역을 침범한 상대를\n집단으로 때려눕힌다.\n입에서 산성 액체를 뱉는다."
          violet: "거칠고 난폭하지만,\n자신의 가족과 무리의 동료, 영역을\n매우 소중히 여기는 포켓몬이다."
        zh_simp:
          scarlet: "会成群结队地击垮\n进入自己地盘的对手。\n能从口中喷出酸性的体液。"
          violet: "性格粗鲁，但是对于自己的家族、\n群体的伙伴和领地，非常重视。"
        zh_trad:
          scarlet: "會成群結隊去擊垮\n進到地盤裡的對手。\n能從口中吐出酸性的體液。"
          violet: "性情很粗暴，但牠是一種\n對自己的家族、群體的夥伴\n以及地盤十分重視的寶可夢。"
