      descriptions:
        jp_kana:
          scarlet: "￹吹￺ふ￻き￹出￺だ￻す　￹毒￺どく￻の￹胞子￺ほうし￻に　￹注意￺ちゅうい￻。\n￹浴￺あ￻びた　￹部分￺ぶぶん￻から　モロバレルの\nカサに　￹似￺に￻た　キノコが　￹生￺は￻えてくる。"
          violet: "モンスターボールに　￹擬態￺ぎたい￻するが\nポケモンに　￹対￺たい￻して　￹効果￺こうか￻が\nあるのかは　よくわかっていない。"
        jp_kanji:
          scarlet: "￹吹￺ふ￻き￹出￺だ￻す　￹毒￺どく￻の￹胞子￺ほうし￻に　￹注意￺ちゅうい￻。\n￹浴￺あ￻びた　￹部分￺ぶぶん￻から　モロバレルの\nカサに　￹似￺に￻た　キノコが　￹生￺は￻えてくる。"
          violet: "モンスターボールに　￹擬態￺ぎたい￻するが\nポケモンに　￹対￺たい￻して　￹効果￺こうか￻が\nあるのかは　よくわかっていない。"
        en:
          scarlet: "Be wary of the poisonous spores it releases.\nMushrooms resembling Amoonguss’s caps will\ngrow out of anywhere the spores touch."
          violet: "Amoonguss mimics Poké Balls. It is not yet\nclear whether this mimicry is effective against\nother Pokémon."
        fr:
          scarlet: "Gare aux spores toxiques qu’il libère dans l’air.\nDes champignons similaires au chapeau de\nGaulet poussent partout où elles se posent."
          violet: "Il se fait passer pour une Poké Ball, mais on\nignore s’il parvient à duper les autres Pokémon."
        it:
          scarlet: "Attenzione alle spore velenose che rilascia\nnell’aria. Ovunque si posano cresceranno funghi\ndall’aspetto simile al cappello di Amoonguss."
          violet: "Si mimetizza fingendosi una Poké Ball, ma non\nsi sa quanto questo lo aiuti a nascondersi dagli\naltri Pokémon."
        de:
          scarlet: "Vorsicht vor den Giftsporen, die Hutsassa\nversprüht! Wo auch immer diese landen,\nwachsen Pilze, die seinen Hüten ähneln."
          violet: "Hutsassa imitiert Pokébälle, aber ob es damit\nauch andere Pokémon täuschen kann, ist unklar."
        es:
          scarlet: "Las esporas tóxicas que libera son peligrosas, ya\nque allí donde caen acaban creciendo unas setas\nparecidas a los sombreros de los Amoonguss."
          violet: "Intenta hacerse pasar por una Poké Ball, aunque\nse desconoce si logra engañar a otros Pokémon."
        ko:
          scarlet: "내뿜는 독 포자를 조심해야 한다.\n포자에 닿은 부분에서\n뽀록나의 갓을 닮은 버섯이 자라기 때문이다."
          violet: "몬스터볼로 위장하고 있지만\n포켓몬에게 효과가 있는지에 대해서는\n알려진 것이 없다."
        zh_simp:
          scarlet: "小心它喷出的带毒的孢子。\n被喷到的地方会长出蘑菇，\n就像是败露球菇的菌伞。"
          violet: "会拟态成精灵球，\n但对宝可梦是否有效，\n目前尚不明确。"
        zh_trad:
          scarlet: "小心牠噴出的毒孢子。\n因為被噴到的地方會長出蘑菇，\n形狀像是敗露球菇的菌傘。"
          violet: "雖然會擬態成精靈球，\n但目前還不是很清楚\n對寶可夢是否有效果，"
