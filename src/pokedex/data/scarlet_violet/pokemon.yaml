      descriptions:
        jp_kana:
          scarlet: "ノズパスの　￹鼻￺はな￻の　￹磁石￺じしゃく￻は\n￹絶対￺ぜったい￻に　￹狂￺くる￻わないので　￹旅￺たび￻する\nトレーナーの　￹良￺よ￻き　パートナーだ。"
          violet: "ピンチになると　￹磁力￺じりょく￻を　￹強￺つよ￻め\nまわりにある　￹鉄￺てつ￻の　￹塊￺かたまり￻を　￹引￺ひ￻き￹寄￺よ￻せて\n￹身￺み￻を￹守￺まも￻ることも　ある。"
        jp_kanji:
          scarlet: "ノズパスの　￹鼻￺はな￻の　￹磁石￺じしゃく￻は\n￹絶対￺ぜったい￻に　￹狂￺くる￻わないので　￹旅￺たび￻する\nトレーナーの　￹良￺よ￻き　パートナーだ。"
          violet: "ピンチになると　￹磁力￺じりょく￻を　￹強￺つよ￻め\nまわりにある　￹鉄￺てつ￻の　￹塊￺かたまり￻を　￹引￺ひ￻き￹寄￺よ￻せて\n￹身￺み￻を￹守￺まも￻ることも　ある。"
        en:
          scarlet: "The magnet in Nosepass’s nose provides an\nunerring compass, making this Pokémon an\nexcellent partner for Trainers going on a journey."
          violet: "When endangered, it may protect itself by\nincreasing its magnetism and drawing nearby\niron objects to its body."
        fr:
          scarlet: "Le nez de Tarinor, qui est une boussole\ninfaillible, fait de lui un Pokémon partenaire\nde choix lors des voyages."
          violet: "Face au danger, il augmente parfois son\nmagnétisme, ce qui attire vers lui les objets\nmétalliques alentour et le protège."
        it:
          scarlet: "Il naso magnetico di Nosepass è una bussola\ninfallibile e questo lo rende il compagno\ndi viaggio ideale per gli Allenatori."
          violet: "Quando è in pericolo può aumentare la propria\nforza magnetica e attirare a sé oggetti di ferro\ncon cui proteggersi."
        de:
          scarlet: "Seine magnetische Nase funktioniert wie ein\nunbeirrbarer Kompass. Das macht es zu einem\nhervorragenden Partner für Trainer auf Reisen."
          violet: "Es schützt sich bei Gefahr durch Gegenstände\naus Eisen, die es mit erhöhtem Magnetismus\nan sich zieht."
        es:
          scarlet: "Los Nosepass tienen una nariz brújula infalible,\npor lo que los Entrenadores viajeros suelen\nllevar uno consigo."
          violet: "En caso de apuro, potencia su magnetismo\ny atrae hacia sí objetos de hierro para\nprotegerse."
        ko:
          scarlet: "코코파스의 코의 자석은\n절대로 고장 나지 않아서 여행하는\n트레이너의 좋은 파트너이다."
          violet: "궁지에 몰리면 자력을 강화해서\n주변에 있는 쇠뭉치를 끌어모아\n몸을 방어하기도 한다."
        zh_simp:
          scarlet: "朝北鼻鼻子上的磁铁绝对不会失灵，\n所以是训练家旅行时的良伴。"
          violet: "遇到危机时，它有时\n会增强磁力吸引周围的\n铁块来保护自身。"
        zh_trad:
          scarlet: "朝北鼻鼻子上的磁鐵\n絕對不會失靈，所以是\n訓練家旅行時的良伴。"
          violet: "陷入危機時，有時會\n增強磁力將附近的鐵塊\n吸引過來保護身體。"
