      descriptions:
        jp_kana:
          scarlet: "ツルを　￹使￺つか￻って　￹花￺はな￻を　￹摘￺つ￻みとる。\n￹体￺からだ￻に　つけた　￹花￺はな￻からは\n￹癒￺いや￻しの　￹効果￺こうか￻が　￹現￺あらわ￻れる。"
          violet: "￹花￺はな￻を　つけていると　￹嬉￺うれ￻しくなって\n￹癒￺いや￻しの　￹効果￺こうか￻を　￹発揮￺はっき￻する。\n￹花￺はな￻が　￹多￺おお￻い　￹土地￺とち￻を　￹好￺この￻む。"
        jp_kanji:
          scarlet: "ツルを　￹使￺つか￻って　￹花￺はな￻を　￹摘￺つ￻みとる。\n￹体￺からだ￻に　つけた　￹花￺はな￻からは\n￹癒￺いや￻しの　￹効果￺こうか￻が　￹現￺あらわ￻れる。"
          violet: "￹花￺はな￻を　つけていると　￹嬉￺うれ￻しくなって\n￹癒￺いや￻しの　￹効果￺こうか￻を　￹発揮￺はっき￻する。\n￹花￺はな￻が　￹多￺おお￻い　￹土地￺とち￻を　￹好￺この￻む。"
        en:
          scarlet: "It uses its vine to pick flowers. The flowers that\nComfey attaches to itself develop healing\nproperties."
          violet: "It prefers areas with lots of flowers. A Comfey\nadorned with flowers is a happy Comfey, and the\nflowers gain healing effects."
        fr:
          scarlet: "Il cueille des fleurs à l’aide de sa liane.\nCelles dont il s’orne le corps développent\ndes vertus apaisantes."
          violet: "Se parer de fleurs l’emplit de joie et lui permet\nde dégager une aura apaisante. Il se plaît dans\nles endroits où les fleurs poussent en abondance."
        it:
          scarlet: "Coglie fiori con la sua liana. Quelli che ha\naddosso hanno proprietà rilassanti."
          violet: "Quando si adorna di fiori è felice, e tramite\nessi manifesta un potere rigenerante. Predilige\ni luoghi molto fioriti."
        de:
          scarlet: "Mit seiner Ranke pflückt es Blumen. Von den\nBlüten, die es an seinem Körper trägt, geht eine\nheilsame Wirkung aus."
          violet: "Wenn es Blüten an sich trägt, ist es glücklich\nund strahlt mit diesen eine heilsame Wirkung aus.\nEs bevorzugt Gebiete mit vielen Blumen."
        es:
          scarlet: "Usa el tallo para recoger flores. Las que prende\nen su cuerpo producen un efecto reconfortante."
          violet: "Cuando se adorna con flores, se llena de alegría\ny las flores desprenden un efecto reconfortante.\nSiente predilección por los lugares muy floridos."
        ko:
          scarlet: "덩굴을 사용해서 꽃을 딴다.\n몸에 장식한 꽃에서는\n치유 효과가 나타난다."
          violet: "꽃을 달고 있으면 기뻐져서\n치유 효과를 발휘한다.\n꽃이 많은 곳을 선호한다."
        zh_simp:
          scarlet: "会用藤蔓摘花。\n附在它身上的花\n会产生治愈的效果。"
          violet: "身上附着花时会很开心，\n并发挥出治愈的效果。\n喜欢有很多花的地方。"
        zh_trad:
          scarlet: "會用藤蔓來摘花。\n黏在身上的花會\n產生療癒的效果。"
          violet: "如果身上黏著花就會很開心，\n並且發揮出治癒的效果。\n喜歡有很多花的地方。"
