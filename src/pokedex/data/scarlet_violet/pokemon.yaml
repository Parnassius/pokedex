        jp_kanji:
          scarlet: "￹広￺ひろ￻い　￹海￺うみ￻の　どこかには\nカイリューだけが　￹集￺あつ￻まって　￹暮￺く￻らす\n￹島￺しま￻が　あるらしい。"
          violet: "￹大￺おお￻きな　￹体格￺たいかく￻で　￹空￺そら￻を　￹飛￺と￻ぶ。\n￹地球￺ちきゅう￻を　￹約￺やく￻１６￹時間￺じかん￻で\n１￹周￺しゅう￻してしまう。"
        en:
          scarlet: "It is said that somewhere in the ocean lies an\nisland where these gather. Only they live there."
          violet: "It can fly in spite of its big and bulky physique.\nIt circles the globe in just 16 hours."
        fr:
          scarlet: "On dit qu’il existe une île quelque part dans\nl’océan où ces Pokémon se réunissent pour\nvivre paisiblement."
          violet: "Malgré son poids et son physique imposant,\nDracolosse est capable de voler. Il peut faire\nle tour du monde en seize heures."
        it:
          scarlet: "Si dice che questi Pokémon si riuniscano\nsu un’isola in mezzo all’oceano dove\nvivono solo loro."
          violet: "Nonostante la stazza, è in grado di volare.\nPuò compiere il giro del mondo in 16 ore."
        de:
          scarlet: "Man sagt, dass es irgendwo im Meer eine Insel\ngibt, auf der sie sich versammeln. Nur sie leben\ndort."
          violet: "Trotz seines wuchtigen und massiven Körpers\nkann es fliegen. Es ist in der Lage, die Welt\nin nur 16 Stunden zu umrunden."
        es:
          scarlet: "Dicen que viven en una isla en algún lugar del\nocéano que solo ellos habitan."
          violet: "A pesar del tamaño que tiene y de lo pesado\nque es, puede volar. Es capaz de dar la vuelta\nal mundo en solo 16 horas."
        ko:
          scarlet: "드넓은 바다 어딘가에는\n망나뇽만이 모여 사는\n섬이 있다고 한다."
          violet: "커다란 몸집으로 하늘을 난다.\n지구를 약 16시간 만에\n일주한다."
        zh_simp:
          scarlet: "在广阔大海的某处，\n似乎存在着只有\n快龙群居的岛。"
          violet: "体型很大，能在空中飞行。\n大约只需１６小时\n就能绕地球１周。"
        zh_trad:
          scarlet: "在廣大海洋的某處，\n似乎存在著只群居著\n快龍的島。"
          violet: "體型很大，能在空中飛行。\n只需大約１６小時\n就能繞地球１週。"
