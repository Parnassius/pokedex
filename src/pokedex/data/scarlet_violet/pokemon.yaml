      descriptions:
        jp_kana:
          scarlet: "リーダーの　￹命令￺めいれい￻に　￹忠実￺ちゅうじつ￻。\n￹抜群￺ばつぐん￻の　チームワークで　￹狙￺ねら￻った\n￹獲物￺えもの￻は　￹絶対￺ぜったい￻に　￹逃￺に￻がさない。"
          violet: "￹遠￺とお￻くにいる　￹獲物￺えもの￻の　においを\n￹嗅￺か￻ぎつけると　リーダーの　￹指示￺しじ￻で\n￹群￺む￻れが　いっせいに　￹動￺うご￻きはじめる。"
        jp_kanji:
          scarlet: "リーダーの　￹命令￺めいれい￻に　￹忠実￺ちゅうじつ￻。\n￹抜群￺ばつぐん￻の　チームワークで　￹狙￺ねら￻った\n￹獲物￺えもの￻は　￹絶対￺ぜったい￻に　￹逃￺に￻がさない。"
          violet: "￹遠￺とお￻くにいる　￹獲物￺えもの￻の　においを\n￹嗅￺か￻ぎつけると　リーダーの　￹指示￺しじ￻で\n￹群￺む￻れが　いっせいに　￹動￺うご￻きはじめる。"
        en:
          scarlet: "They faithfully follow the orders of their leader.\nPrey targeted by Mightyena is never allowed to\nescape the outstanding teamwork of its pursuers."
          violet: "Once it’s caught the scent of faraway prey,\nthe leader gives a signal, and the whole pack\nmoves out."
        fr:
          scarlet: "Ils obéissent scrupuleusement aux ordres de leur\nchef de meute. Face à leur remarquable travail\nd’équipe, leurs proies n’ont aucune chance."
          violet: "Quand des Grahyèna flairent l’odeur d’une proie\nlointaine, toute leur meute se met en mouvement\nsous les ordres du chef."
        it:
          scarlet: "Segue fedelmente gli ordini del capobranco.\nGrazie a un perfetto lavoro di squadra,\nle prede prese di mira non hanno scampo."
          violet: "Quando fiuta l’odore di una preda in lontananza,\nil branco si muove unito seguendo gli ordini\ndel capobranco."
        de:
          scarlet: "Diese Pokémon folgen treu den Befehlen ihres\nAnführers. Haben sie Beute im Visier, lassen sie\ndiese dank perfektem Teamwork nie entwischen."
          violet: "Sobald es Beute in großer Entfernung wittert,\nsetzt sich das gesamte Rudel auf Befehl des\nAnführers hin sofort in Bewegung."
        es:
          scarlet: "Siguen las órdenes del líder al pie de la letra.\nGracias a la eficacia de su trabajo en equipo,\nninguna presa se les escapa."
          violet: "Cuando detectan el olor de una presa lejana,\ntoda la jauría se pone en movimiento a las\nórdenes del líder."
        ko:
          scarlet: "리더의 명령을 충실히 따른다.\n뛰어난 팀워크로 노린 먹잇감을\n절대 놓치지 않는다."
          violet: "멀리 있는 먹잇감의 냄새를 맡으면\n리더의 지시를 따라\n무리가 일제히 움직이기 시작한다."
        zh_simp:
          scarlet: "会忠实听从首领的命令。\n通过超群的团队合作，\n绝不会让盯上的猎物逃掉。"
          violet: "当嗅到远处有猎物的味道时，\n就会遵从首领的指示，\n成群结队地一齐出动。"
        zh_trad:
          scarlet: "忠實聽從首領的命令。\n會發揮優秀的團隊默契，\n絕對不讓盯上的獵物逃走。"
          violet: "當嗅到遠處有獵物的氣味，\n群體就會遵從首領的指示，\n一起展開行動。"
