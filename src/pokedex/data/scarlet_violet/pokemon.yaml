      descriptions:
        jp_kana:
          scarlet: "￹姿￺すがた￻を　￹見￺み￻られることを　￹好￺この￻まない\n￹妖精￺ようせい￻の　￹仲間￺なかま￻。\n￹静￺しず￻かな　￹山奥￺やまおく￻に￹棲￺す￻む　という。"
          violet: "￹耳￺みみ￻が　￹良￺よ￻くて　１キロ　￹離￺はな￻れた\nところで　￹落￺お￻とした　￹針￺はり￻の￹音￺おと￻を\n￹見事￺みごと￻に　￹聞￺き￻き￹分￺わ￻けられる。"
        jp_kanji:
          scarlet: "￹姿￺すがた￻を　￹見￺み￻られることを　￹好￺この￻まない\n￹妖精￺ようせい￻の　￹仲間￺なかま￻。\n￹静￺しず￻かな　￹山奥￺やまおく￻に￹棲￺す￻む　という。"
          violet: "￹耳￺みみ￻が　￹良￺よ￻くて　１キロ　￹離￺はな￻れた\nところで　￹落￺お￻とした　￹針￺はり￻の￹音￺おと￻を\n￹見事￺みごと￻に　￹聞￺き￻き￹分￺わ￻けられる。"
        en:
          scarlet: "Said to live in quiet, remote mountains, this type\nof fairy has a strong aversion to being seen."
          violet: "It has an acute sense of hearing. It can easily hear\na pin being dropped nearly 1,100 yards away."
        fr:
          scarlet: "Ce Pokémon qui s’apparente à une fée\ndéteste être vu. On dit qu’il vit dans\nle calme des montagnes reculées."
          violet: "Ce Pokémon possède une ouïe très\ndéveloppée. Il peut facilement entendre\nune épingle tomber à 1 km de distance."
        it:
          scarlet: "Pare che questo essere fatato viva in remote,\nplacide aree montuose. Non ama farsi vedere."
          violet: "Dotato di un udito particolarmente sviluppato,\nè in grado di sentir cadere uno spillo\na un chilometro di distanza."
        de:
          scarlet: "Man sagt, es lebe in ruhigen, abgelegenen\nBergregionen. Dieses feenhafte Pokémon zeigt\nsich nur ungern."
          violet: "Es besitzt ein exzellentes Hörvermögen.\nDarum kann es eine Nadel fallen hören,\nselbst wenn sie 1 km entfernt ist."
        es:
          scarlet: "Se dice que este Pokémon emparentado con\nlas hadas vive en zonas tranquilas en lo profundo\nde las montañas, ya que odia que lo vean."
          violet: "Tiene un agudísimo sentido del oído. Es capaz\nde oír la caída de una aguja a 1 km de distancia."
        ko:
          scarlet: "요정의 일종으로\n모습을 드러내는 것을 좋아하지 않는다.\n조용한 산속 깊은 곳에 산다고 전해진다."
          violet: "귀가 밝아서 1km 거리에서\n떨어뜨린 바늘 소리도\n기가 막히게 들을 수 있다."
        zh_simp:
          scarlet: "妖精的一种，不喜欢\n被人看见自己的身影。\n据说生活在幽静的深山里。"
          violet: "耳朵非常好，\n连１公里外针落地的声音\n都能听得一清二楚。"
        zh_trad:
          scarlet: "妖精的一種。\n不喜歡被看見身影。\n據說是住在寧靜的深山裡。"
          violet: "聽覺靈敏，連１公里以外\n針落地的聲音都能夠\n分辨得一清二楚。"
