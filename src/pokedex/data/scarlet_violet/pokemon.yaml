      descriptions:
        jp_kana:
          scarlet: "￹太古￺たいこ￻の　￹遺伝子￺いでんし￻が　￹覚醒￺かくせい￻。\n￹片￺かた￻ヒレで　クルーズ￹船￺せん￻を　￹軽々￺かるがる￻\n￹持￺も￻ち￹上￺あ￻げる　￹怪力￺かいりき￻の　￹持￺も￻ち￹主￺ぬし￻。"
          violet: "５０ノットの　￹速￺はや￻さで　￹泳￺およ￻ぎ\n￹溺￺おぼ￻れている　￹人￺ひと￻や　ポケモンを\n￹助￺たす￻ける　￹海￺うみ￻の　ヒーロー。"
        jp_kanji:
          scarlet: "￹太古￺たいこ￻の　￹遺伝子￺いでんし￻が　￹覚醒￺かくせい￻。\n￹片￺かた￻ヒレで　クルーズ￹船￺せん￻を　￹軽々￺かるがる￻\n￹持￺も￻ち￹上￺あ￻げる　￹怪力￺かいりき￻の　￹持￺も￻ち￹主￺ぬし￻。"
          violet: "５０ノットの　￹速￺はや￻さで　￹泳￺およ￻ぎ\n￹溺￺おぼ￻れている　￹人￺ひと￻や　ポケモンを\n￹助￺たす￻ける　￹海￺うみ￻の　ヒーロー。"
        en:
          scarlet: "This Pokémon’s ancient genes have awakened.\nIt is now so extraordinarily strong that it can\neasily lift a cruise ship with one fin."
          violet: "This hero of the ocean swims at a speed of 50\nknots and saves drowning people and Pokémon."
        fr:
          scarlet: "Ses gènes anciens se sont réveillés. Sa force\nextraordinaire lui permet de soulever facilement\nun bateau de croisière d’une seule nageoire."
          violet: "Ce héros des mers part à la rescousse des êtres\nhumains et des Pokémon en train de se noyer\nen nageant à une vitesse de 50 nœuds."
        it:
          scarlet: "I suoi geni primordiali si sono risvegliati. Ha una\nforza talmente prodigiosa da sollevare una nave\nda crociera con una sola pinna senza difficoltà."
          violet: "È un eroe dei mari che nuota a una velocità\ndi 50 nodi per salvare persone e Pokémon\nche stanno per annegare."
        de:
          scarlet: "Die uralten Gene dieses Pokémon sind erwacht.\nEs ist so übernatürlich stark, dass es mühelos mit\neiner Flosse ein Kreuzfahrtschiff anheben kann."
          violet: "Dieser Superheld der Meere schwimmt mit einer\nGeschwindigkeit von 50 Knoten und rettet\nMenschen und Pokémon vor dem Ertrinken."
        es:
          scarlet: "Sus genes primigenios han despertado y lo han\ndotado de tal fuerza que es capaz de acarrear\nun crucero con una sola aleta sin problema."
          violet: "Es el héroe de los mares. Acude al rescate de la\ngente y de los Pokémon que se estén ahogando\nnadando a velocidades de 50 nudos."
        ko:
          scarlet: "태고의 유전자가 각성했다.\n한쪽 지느러미로 크루즈선도\n가볍게 들어 올리는 괴력의 소유자."
          violet: "50노트의 속도로 헤엄치며\n물에 빠진 사람이나 포켓몬을 구해 주는\n바다의 히어로."
        zh_simp:
          scarlet: "太古基因觉醒之后的样子。\n力气之大，用单边的鳍\n就能轻松举起游轮。"
          violet: "会以５０节的游泳速度\n去救助溺水的人类和宝可梦。\n是大海的英雄。"
        zh_trad:
          scarlet: "太古基因覺醒之後的樣子。\n力氣很大，只用單邊的鰭\n也可以輕輕鬆鬆舉起遊輪。"
          violet: "會以５０節的泳速來救助\n溺水的人類和寶可夢，\n可以說是大海英雄。"
