        jp_kana:
          scarlet: "￹森￺もり￻の￹奥￺おく￻に　￹集団￺しゅうだん￻で　￹暮￺く￻らす\nコロニーを　￹作￺つく￻る。　よそ￹者￺もの￻が\n￹近寄￺ちかよ￻ることを　ひどく　￹嫌￺きら￻う。"
          violet: "１０￹本￺ぽん￻の　￹触手￺しょくしゅ￻で　￹絡￺から￻みつき\n￹養分￺ようぶん￻を　￹吸￺す￻い￹取￺と￻って　￹苦￺くる￻しめる。\n￹裾￺すそ￻の　ヒダは　￹珍味￺ちんみ￻で　￹人気￺にんき￻。"
        jp_kanji:
          scarlet: "￹森￺もり￻の￹奥￺おく￻に　￹集団￺しゅうだん￻で　￹暮￺く￻らす\nコロニーを　￹作￺つく￻る。　よそ￹者￺もの￻が\n￹近寄￺ちかよ￻ることを　ひどく　￹嫌￺きら￻う。"
          violet: "１０￹本￺ぽん￻の　￹触手￺しょくしゅ￻で　￹絡￺から￻みつき\n￹養分￺ようぶん￻を　￹吸￺す￻い￹取￺と￻って　￹苦￺くる￻しめる。\n￹裾￺すそ￻の　ヒダは　￹珍味￺ちんみ￻で　￹人気￺にんき￻。"
        en:
          scarlet: "These Pokémon gather into groups and form\ncolonies deep within forests. They absolutely\nhate it when strangers approach."
          violet: "It coils its 10 tentacles around prey and sucks out\ntheir nutrients, causing the prey pain. The folds\nalong the rim of its head are a popular delicacy."
        fr:
          scarlet: "Ces Pokémon vivent en colonies au fin fond\ndes bois. Ils détestent au plus haut point que\ndes personnes inconnues s’approchent d’eux."
          violet: "Il enserre sa proie de ses dix tentacules et lui vole\nses nutriments, ce qui est douloureux. Les plis au-\ndessus de ses yeux sont appréciés pour leur goût."
        it:
          scarlet: "Vive in colonie nel cuore dei boschi. Detesta\nterribilmente le visite di chi non conosce."
          violet: "Avvolge la preda coi dieci tentacoli e ne succhia\nle sostanze nutritive in un processo doloroso.\nLe pieghe della testa sono una prelibatezza."
        de:
          scarlet: "Diese Pokémon gründen Kolonien, die tief im\nWald leben. Sie können es nicht ausstehen, wenn\nihnen Fremde zu nahe kommen."
          violet: "Mit den zehn Tentakeln umschlingt es Beute und\nsaugt ihr auf schmerzhafte Weise die Nährstoffe\naus. Die Falten am Hutsaum sind eine Delikatesse."
        es:
          scarlet: "Forma colonias de varios ejemplares en lo más\nprofundo de los bosques. No soporta las visitas\nindeseadas de extraños."
          violet: "Constriñe a sus víctimas con sus diez tentáculos\ny les absorbe los nutrientes. Los pliegues en\ntorno al sombrero son un manjar muy preciado."
        ko:
          scarlet: "깊은 숲속에 집단으로 살며\n군체를 형성한다.\n외부인이 접근하는 것을 극도로 싫어한다."
          violet: "10개의 촉수로 휘감은 다음\n양분을 흡수해서 괴롭힌다.\n갓의 주름은 별미로 인기가 높다."
        zh_simp:
          scarlet: "会在森林深处建造\n集体生活用的聚落。\n非常厌恶有外来者靠近。"
          violet: "会用１０根触手缠住敌人\n并吸取养分来折磨对方。\n下摆的褶皱是很受欢迎的珍味佳肴。"
        zh_trad:
          scarlet: "會在森林深處建造\n集體生活用的聚落。\n極為厭惡有外來者靠近。"
          violet: "會用自己的１０根觸手纏住敵人，\n並吸取養分來折磨對方。\n下擺的摺皺是很受歡迎的珍味佳餚。"
