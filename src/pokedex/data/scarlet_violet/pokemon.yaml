          violet: "２つに　￹分裂￺ぶんれつ￻した　￹脳￺のう￻みそが\n￹同￺おな￻じことを　￹考￺かんが￻えたとき\n￹最大￺さいだい￻パワーが　￹発揮￺はっき￻される。"
        jp_kanji:
          scarlet: "２つに　￹分裂￺ぶんれつ￻した　￹脳￺のう￻みそを\n￹持￺も￻っているため　いきなり　￹違￺ちが￻う\n￹行動￺こうどう￻を　とることが　あるのだ。"
          violet: "２つに　￹分裂￺ぶんれつ￻した　￹脳￺のう￻みそが\n￹同￺おな￻じことを　￹考￺かんが￻えたとき\n￹最大￺さいだい￻パワーが　￹発揮￺はっき￻される。"
        en:
          scarlet: "Since they have two divided brains, at times\nthey suddenly try to take two different actions\nat once."
          violet: "When their brains, now divided in two, are\nthinking the same thoughts, these Pokémon\nexhibit their maximum power."
        fr:
          scarlet: "Il possède deux cerveaux séparés.\nC’est pourquoi il essaie parfois subitement\nde faire deux choses différentes à la fois."
          violet: "Quand les deux parties de son cerveau, à présent\ndivisé, pensent à la même chose, ce Pokémon\ndéploie le maximum de sa puissance."
        it:
          scarlet: "Poiché le due parti in cui è diviso il suo cervello\nsono indipendenti, può capitare che si comporti\nin modo del tutto incoerente."
          violet: "Libera la sua massima potenza quando le due\nparti in cui è diviso il suo cervello pensano\nla stessa cosa."
        de:
          scarlet: "Wegen seines gespaltenen Denkapparates kann\nes vorkommen, dass es sich abrupt einer anderen\nTätigkeit zuwendet."
          violet: "Kommen beide Hälften seines gespaltenen\nDenkapparates auf dieselbe Idee, entfesselt sich\nseine volle Kraft."
        es:
          scarlet: "Dado que su cerebro está dividido en dos,\na veces tiene conflictos a la hora de decidir\nqué hacer."
          violet: "Cuando las dos partes de su cerebro piensan\nlo mismo, saca todo su poder a relucir."
        ko:
          scarlet: "둘로 분열된 뇌를\n가지고 있어서 갑자기\n다른 행동을 취할 때가 있다."
          violet: "둘로 분열된 뇌가\n같은 것을 생각했을 때\n최대 파워가 발휘된다."
        zh_simp:
          scarlet: "因为有着一分为二的大脑，\n所以有时会突然采取不同的行动。"
          violet: "当它一分为二的大脑\n在思考同一件事时，\n就能发挥出最大的力量。"
        zh_trad:
          scarlet: "有著一分為二的大腦，\n有時候會突然做出\n不同的舉動。"
          violet: "當一分為二的大腦\n思考相同的事情時，\n就會發揮最大的力量。"
