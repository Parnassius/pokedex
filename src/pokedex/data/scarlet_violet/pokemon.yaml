    ko: 주리비얀
    zh_simp: 藤藤蛇
    zh_trad: 藤藤蛇
  forms:
    snivy:
      form_id: 0
      base_stats:
        hp: 45
        attack: 45
        defense: 55
        special_attack: 45
        special_defense: 55
        speed: 63
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - grass
      egg_groups:
        - field
        - grass
      abilities:
        - overgrow
      hidden_ability: contrary
      descriptions:
        jp_kana:
          scarlet: "￹尻尾￺しっぽ￻の　￹葉￺は￻っぱで　￹日差￺ひざ￻しを　￹受￺う￻けて\nエネルギーを　￹作￺つく￻りだすと　￹動￺うご￻きが\n￹素早￺すばや￻くなり　￹技￺わざ￻の　きれも　￹増￺ま￻す。"
          violet: "￹群￺む￻れることを　￹好￺この￻まない　￹性質￺せいしつ￻。\n￹短￺みじか￻い　￹腕￺うで￻の　￹代￺か￻わりに　ツルを\n￹器用￺きよう￻に　￹操￺あやつ￻り　￹暮￺く￻らしている。"
        jp_kanji:
          scarlet: "￹尻尾￺しっぽ￻の　￹葉￺は￻っぱで　￹日差￺ひざ￻しを　￹受￺う￻けて\nエネルギーを　￹作￺つく￻りだすと　￹動￺うご￻きが\n￹素早￺すばや￻くなり　￹技￺わざ￻の　きれも　￹増￺ま￻す。"
          violet: "￹群￺む￻れることを　￹好￺この￻まない　￹性質￺せいしつ￻。\n￹短￺みじか￻い　￹腕￺うで￻の　￹代￺か￻わりに　ツルを\n￹器用￺きよう￻に　￹操￺あやつ￻り　￹暮￺く￻らしている。"
        en:
          scarlet: "The leaf on Snivy’s tail generates energy when\nexposed to sunlight, making Snivy swifter and\nadding an edge to its moves."
          violet: "It prefers to avoid groups. In its day-to-day life,\nit dexterously controls its vines to compensate\nfor its short arms."
        fr:
          scarlet: "Il génère de l’énergie en exposant la feuille sur\nsa queue au soleil, ce qui le rend plus agile et\nplus habile dans l’exécution de ses capacités."
          violet: "Il n’aime pas la vie de groupe. Ses bras\nétant courts, il se sert plutôt de ses lianes\navec dextérité dans sa vie quotidienne."
        it:
          scarlet: "Assorbe i raggi solari tramite la foglia sulla coda,\ngenerando un’energia che aumenta di molto\nla sua agilità e l’efficacia delle sue mosse."
          violet: "Per sua natura non ama vivere in gruppo.\nNelle attività quotidiane, usa con maestria\nle sue liane al posto delle braccia corte."
        de:
          scarlet: "Wenn es über das Blatt an seinem Schwanz\nSonnenlicht aufnimmt und Energie erzeugt,\nwird es schneller und greift präziser an."
          violet: "Es schließt sich nicht gern zu Gruppen zusammen.\nStatt seiner kurzen Arme nutzt es im Alltag seine\nRanken, die es geschickt kontrollieren kann."
        es:
          scarlet: "Cuando genera energía exponiendo la hoja de\nla cola a la luz solar, su agilidad aumenta y sus\nmovimientos se vuelven más precisos."
          violet: "Debido a su carácter, prefiere no formar grupos.\nEn vez de sus cortos brazos, utiliza las lianas con\ngran habilidad en su día a día."
        ko:
          scarlet: "꼬리의 잎사귀로 햇빛을 받아서\n에너지를 만들면 움직임이 재빨라지고\n기술도 더욱 예리해진다."
          violet: "무리를 짓는 것을 선호하지 않는다.\n짧은 팔 대신 덩굴을\n능숙하게 다뤄서 생활하고 있다."
        zh_simp:
          scarlet: "当尾巴的叶子受到日照\n制造出能量后，动作就会\n变得敏捷，招式也会更加强劲。"
          violet: "性情上不喜欢聚在一起。\n在生活中能灵活运用\n藤蔓来代替短短的手臂。"
        zh_trad:
          scarlet: "當尾巴的葉子沐浴日光而\n製造出能量後，動作就會\n變得敏捷，招式也會更帶勁。"
          violet: "生性不愛群體行動。\n在生活中會靈巧操縱\n藤蔓來代替短短的手臂。"
servine:
  species_id: 496
  names:
    jp_kana: ジャノビー
    jp_kanji: ジャノビー
    en: Servine
    fr: Lianaja
    it: Servine
    de: Efoserp
    es: Servine
    ko: 샤비
    zh_simp: 青藤蛇
    zh_trad: 青藤蛇
  forms:
    servine:
      form_id: 0
      base_stats:
        hp: 60
        attack: 60
        defense: 75
        special_attack: 60
        special_defense: 75
        speed: 83
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 2
      types:
        - grass
      egg_groups:
        - field
        - grass
      abilities:
        - overgrow
      hidden_ability: contrary
      descriptions:
        jp_kana:
          scarlet: "￹低￺ひく￻い　￹姿勢￺しせい￻で　￹草￺くさ￻の￹中￺なか￻を\n￹縫￺ぬ￻うように　￹走￺はし￻り￹抜￺ぬ￻け　つるのムチで\n￹容赦￺ようしゃ￻なく　￹叩￺たた￻きのめす。"
          violet: "￹高￺たか￻すぎる　プライドが　￹玉￺たま￻にきず。\nほかの　ポケモンと　￹連携￺れんけい￻できる\nようになるまで　￹時間￺じかん￻が　かかる。"
        jp_kanji:
          scarlet: "￹低￺ひく￻い　￹姿勢￺しせい￻で　￹草￺くさ￻の￹中￺なか￻を\n￹縫￺ぬ￻うように　￹走￺はし￻り￹抜￺ぬ￻け　つるのムチで\n￹容赦￺ようしゃ￻なく　￹叩￺たた￻きのめす。"
          violet: "￹高￺たか￻すぎる　プライドが　￹玉￺たま￻にきず。\nほかの　ポケモンと　￹連携￺れんけい￻できる\nようになるまで　￹時間￺じかん￻が　かかる。"
        en:
          scarlet: "It runs low to the ground, weaving through the\ngrass, then mercilessly pummels its target by\nwhipping them with its vines."
          violet: "Servine’s one weakness is its inflated sense of\npride. It takes a while for Servine to be able to\ncooperate with other Pokémon."
        fr:
          scarlet: "Il se faufile dans les hautes herbes au pas de\ncourse, en restant près du sol. Il en surgit ensuite\npour fouetter cruellement sa cible avec ses lianes."
          violet: "Son seul défaut est son orgueil démesuré.\nIl lui faut beaucoup de temps pour accepter\nde coopérer avec d’autres Pokémon."
        it:
          scarlet: "Si accovaccia e guizza veloce tra l’erba,\npoi colpisce senza pietà con le sue fruste\nfatte di liane."
          violet: "Il suo unico difetto è l’essere molto orgoglioso.\nGli ci vuole tempo per imparare a collaborare\ncon altri Pokémon."
        de:
          scarlet: "Es schlängelt sich geduckt durchs Gras und\nschlägt dann erbarmungslos mit seinen Ranken zu."
          violet: "Sein übermäßiger Stolz ist sein einziger Makel.\nEs braucht Zeit, bis es mit anderen Pokémon\nzusammenarbeiten kann."
        es:
          scarlet: "Se mantiene agachado para abrirse camino\nentre la hierba mientras corre y, luego, fustiga\nsin piedad al objetivo con sus látigos de lianas."
          violet: "Su único defecto es el orgullo excesivo del que\nhace gala. Le lleva algo de tiempo aprender a\ncooperar con otros Pokémon."
        ko:
          scarlet: "낮은 자세로 풀 사이를\n미끄러지듯 내달린 다음\n덩굴채찍으로 자비 없이 때려눕힌다."
          violet: "지나치게 높은 자존심이 옥에 티다.\n다른 포켓몬과 연계하기까지\n많은 시간이 걸린다."
        zh_simp:
          scarlet: "会低下身子飞快穿过草丛，\n用藤鞭毫不留情地打垮对手。"
          violet: "过高的自尊心是它的\n美中不足之处。需要花上不少\n时间才能和其他宝可梦合作。"
        zh_trad:
          scarlet: "會壓低身體飛快穿過\n草叢，用藤鞭絲毫\n不留情地擊倒對手。"
          violet: "小缺點是自尊心過高。\n需要不少時間才能\n與其他寶可夢合作。"
serperior:
