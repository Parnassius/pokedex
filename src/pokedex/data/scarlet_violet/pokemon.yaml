      descriptions:
        jp_kana:
          scarlet: "￹寂￺さび￻しく　￹死￺し￻んだ￹者￺もの￻の　￹魂￺たましい￻が\n￹飲￺の￻み￹残￺のこ￻しの　￹紅茶￺こうちゃ￻に　￹取￺と￻り￹憑￺つ￻いた。\nホテルや　￹民家￺みんか￻に　￹現￺あらわ￻れる。"
          violet: "￹飲￺の￻まれることで　￹体￺からだ￻に　￹入￺はい￻り￹込￺こ￻み\n￹内側￺うちがわ￻から　￹生体￺せいたい￻エネルギーを\n￹奪￺うば￻うのだ。　その￹味￺あじ￻は　￹不味￺まず￻い。"
        jp_kanji:
          scarlet: "￹寂￺さび￻しく　￹死￺し￻んだ￹者￺もの￻の　￹魂￺たましい￻が\n￹飲￺の￻み￹残￺のこ￻しの　￹紅茶￺こうちゃ￻に　￹取￺と￻り￹憑￺つ￻いた。\nホテルや　￹民家￺みんか￻に　￹現￺あらわ￻れる。"
          violet: "￹飲￺の￻まれることで　￹体￺からだ￻に　￹入￺はい￻り￹込￺こ￻み\n￹内側￺うちがわ￻から　￹生体￺せいたい￻エネルギーを\n￹奪￺うば￻うのだ。　その￹味￺あじ￻は　￹不味￺まず￻い。"
        en:
          scarlet: "The soul of someone who died alone possessed\nsome leftover tea. This Pokémon appears in\nhotels and houses."
          violet: "Sinistea gets into your body when you drink it,\nand then it steals your vitality from within. It also\ntastes awful."
        fr:
          scarlet: "Ce Pokémon naît quand l’âme d’une personne\nesseulée prend possession des restes de thé\nnoir. Il apparaît dans les hôtels et les maisons."
          violet: "Ce Pokémon s’infiltre dans le corps de quiconque\nle boit et lui dérobe son énergie vitale. Il a très\nmauvais goût."
        it:
          scarlet: "Nasce quando l’anima di una persona morta\nin solitudine prende possesso di una tazza di tè\nlasciata a metà. Si palesa spesso in case e hotel."
          violet: "Si infiltra nel corpo di chi lo beve, rubando le sue\nenergie vitali dall’interno. Ha un sapore davvero\npessimo."
        de:
          scarlet: "Die Seele eines einsam Verstorbenen hat von\nhalb ausgetrunkenem Schwarztee Besitz ergriffen.\nFatalitee zeigt sich in Hotels und Wohnhäusern."
          violet: "Dieses Pokémon dringt in den Körper derjenigen\nein, die von ihm trinken, und raubt ihnen von\ninnen Lebensenergie. Es schmeckt scheußlich."
        es:
          scarlet: "Surgen cuando el alma de alguien que haya\nmuerto en soledad posee un té a medio beber.\nAparecen en hoteles y residencias."
          violet: "Si alguien lo bebe, entra en su cuerpo y le\narrebata la energía vital desde dentro. Posee,\nademás, un sabor espantoso."
        ko:
          scarlet: "외롭게 죽은 자의 영혼이\n마시다 남은 홍차에 깃들었다.\n호텔이나 민가에 나타난다."
          violet: "마시면 몸 안으로 침투하여\n안에서부터 생체 에너지를 빼앗는다.\n맛은 없는 편이다."
        zh_simp:
          scarlet: "死于孤独的死者之魂\n附在了喝剩的红茶上。\n会在旅馆或民宅出现。"
          violet: "趁着自己被喝掉时进入\n对方身体里，从内部夺走\n对方的生物能量。味道很糟糕。"
        zh_trad:
          scarlet: "死於孤獨的死者之魂\n附在了喝剩的紅茶上。\n會在旅館或民宅出現。"
          violet: "會趁著自己被喝掉時進到\n對方身體裡，從內部奪走\n其生物能量。喝起來很難喝。"
