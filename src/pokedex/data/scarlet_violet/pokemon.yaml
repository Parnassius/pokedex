          violet: "￹古￺ふる￻びた　￹宝箱￺たからばこ￻の￹中￺なか￻に　￹棲￺す￻む。\nポケモンと　￹気￺き￻づかれず　￹道具屋￺どうぐや￻の\n￹片隅￺かたすみ￻に　￹置￺お￻かれていることがある。"
        jp_kanji:
          scarlet: "およそ１５００￹年前￺ねんまえ￻　￹宝箱￺たからばこ￻の￹中￺なか￻で\n￹生￺う￻まれた。　￹宝￺たから￻を　￹盗￺ぬす￻む\n￹不埒者￺ふらちもの￻の　￹生気￺せいき￻を　￹吸￺す￻い￹取￺と￻る。"
          violet: "￹古￺ふる￻びた　￹宝箱￺たからばこ￻の￹中￺なか￻に　￹棲￺す￻む。\nポケモンと　￹気￺き￻づかれず　￹道具屋￺どうぐや￻の\n￹片隅￺かたすみ￻に　￹置￺お￻かれていることがある。"
        en:
          scarlet: "This Pokémon was born inside a treasure chest\nabout 1,500 years ago. It sucks the life-force\nout of scoundrels who try to steal the treasure."
          violet: "It lives inside an old treasure chest. Sometimes it\ngets left in shop corners since no one realizes\nit’s actually a Pokémon."
        fr:
          scarlet: "Ce Pokémon est né dans un coffre au trésor, il y a\nenviron 1 500 ans. Il absorbe l’énergie vitale des\nvoyous qui osent voler son magot."
          violet: "Il vit dans un vieux coffre au trésor. On le trouve\nparfois dans un coin chez l’antiquaire, quand\npersonne ne s’est aperçu que c’était un Pokémon."
        it:
          scarlet: "Nacque all’interno di un forziere circa 1.500\nanni fa. Assorbe l’energia vitale dei furfanti\nche provano a rubare il suo tesoro."
          violet: "Vive dentro un vecchio forziere. Non sembrando\naffatto un Pokémon, a volte finisce in un angolo\nnei negozi di strumenti."
        de:
          scarlet: "Es entstand vor etwa 1500 Jahren in einer\nSchatztruhe. Wenn Diebe versuchen, den Schatz\nzu stehlen, saugt es ihnen die Lebensenergie aus."
          violet: "Es haust in einer alten Schatztruhe und landet\nmanchmal bei Antiquitätenhändlern in der\nLadenecke, da man es nicht als Pokémon erkennt."
        es:
          scarlet: "El cofre en el que nació data de hace 1500 años\naproximadamente. Absorbe la energía vital de\nlos granujas que intentan hacerse con su tesoro."
          violet: "Vive en el interior de un viejo cofre desgastado.\nAl no tomarlo por un Pokémon, a veces termina\na la venta por error en tiendas de antigüedades."
        ko:
          scarlet: "약 1500년 전의 보물 상자 안에서 태어났다.\n보물을 훔치려 드는\n괘씸한 자의 생기를 흡수한다."
          violet: "낡은 보물 상자 안에 산다.\n아무도 포켓몬인 것을 눈치채지 못해\n상점 구석에 전시되는 경우도 있다."
        zh_simp:
          scarlet: "大约１５００年前在宝箱里出生。\n若有坏蛋打算偷走宝藏，\n就会被它吸走精气。"
          violet: "栖息在老旧的宝箱中。\n有时会因没人注意到自己是宝可梦，\n而被搁置在道具店的角落。"
        zh_trad:
          scarlet: "約１５００年前出生在寶箱裡。\n如果有惡棍打算偷走寶藏，\n就會被牠吸走精氣。"
          violet: "棲息在老舊的寶箱中。有時會\n因沒人注意到自己是寶可夢，\n而被擱置在道具店的角落。"
