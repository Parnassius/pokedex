      descriptions:
        jp_kana:
          scarlet: "￹茶￺ちゃ￻の￹道￺みち￻を　￹極￺きわ￻めきれず　￹死￺し￻んだ\n￹茶道家￺さどうか￻の　￹無念￺むねん￻が　￹抹茶￺まっちゃ￻に　￹宿￺やど￻り\nポケモンになったらしい。"
          violet: "ヤバチャの　リージョンフォームに\n￹見￺み￻えるが　まったく　￹関係￺かんけい￻のない\nポケモンと　￹最近￺さいきん￻　￹判明￺はんめい￻した。"
        jp_kanji:
          scarlet: "￹茶￺ちゃ￻の￹道￺みち￻を　￹極￺きわ￻めきれず　￹死￺し￻んだ\n￹茶道家￺さどうか￻の　￹無念￺むねん￻が　￹抹茶￺まっちゃ￻に　￹宿￺やど￻り\nポケモンになったらしい。"
          violet: "ヤバチャの　リージョンフォームに\n￹見￺み￻えるが　まったく　￹関係￺かんけい￻のない\nポケモンと　￹最近￺さいきん￻　￹判明￺はんめい￻した。"
        en:
          scarlet: "Supposedly, the regrets of a tea ceremony master\nwho died before perfecting his craft lingered in\nsome matcha and became a Pokémon."
          violet: "Poltchageist looks like a regional form of\nSinistea, but it was recently discovered that\nthe two Pokémon are entirely unrelated."
        fr:
          scarlet: "Ce Pokémon serait l’incarnation, sous la forme\nd’un pot de matcha, des regrets d’une personne\ndécédée avant d’avoir maîtrisé l’art du thé."
          violet: "On pourrait le prendre pour une forme régionale\nde Théffroi, mais des recherches ont récemment\ndémontré l’absence de lien entre ces Pokémon."
        it:
          scarlet: "Pare sia nato quando un barattolo di matcha è\nstato posseduto dal dolore di un cultore della\ncerimonia del tè morto senza padroneggiarla."
          violet: "Può sembrare una forma regionale di Sinistea,\nma di recente si è scoperto che non c’è alcuna\nrelazione fra questi due Pokémon."
        de:
          scarlet: "Es soll entstanden sein, als ein Teemeister starb,\nbevor er sein Handwerk perfektioniert hatte, und\nsein Gram von einer Tasse Matcha Besitz ergriff."
          violet: "Es sieht aus wie eine Regionalform von Fatalitee,\ndoch vor Kurzem fand man heraus, dass zwischen\nden beiden Pokémon keine Verbindung besteht."
        es:
          scarlet: "Según se dice, el resquemor de un practicante de\nla ceremonia del té que murió sin perfeccionar el\narte poseyó el matcha y dio lugar a un Pokémon."
          violet: "Si bien parece una forma regional de Sinistea,\nrecientemente se ha demostrado que ambos\nPokémon no guardan ninguna relación entre sí."
        ko:
          scarlet: "다도의 길을 통달하지 못한 채 죽은\n다도가의 원통함이 말차에 깃들어서\n포켓몬이 되었다고 한다."
          violet: "데인차의 리전폼처럼 보이지만\n최근 전혀 상관없는 포켓몬이라고 밝혀졌다."
        zh_simp:
          scarlet: "据说是死前未能在茶道上\n登峰造极的茶道家的遗恨\n附到抹茶上所变成的宝可梦。"
          violet: "看似是来悲茶的地区形态，\n但最近被发现其实\n两者之间毫无关系。"
        zh_trad:
          scarlet: "據說是未能將茶道鑽研到極致就\n死去的茶道家的悔恨附在抹茶上，\n於是就成為了寶可夢。"
          violet: "雖然這種寶可夢看起來像是\n來悲茶的地區型態，但最近\n被發現其實兩者毫無關係。"
