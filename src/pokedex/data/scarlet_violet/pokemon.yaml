      descriptions:
        jp_kana:
          scarlet: "￹殻￺から￻の　￹中￺なか￻では　￹爆発的￺ばくはつてき￻な\nスピードで　￹細胞￺さいぼう￻が　￹変化￺へんか￻し\n￹進化￺しんか￻の　￹準備￺じゅんび￻を　しているぞ。"
          violet: "あらゆる　￹攻撃￺こうげき￻を　￹跳￺は￻ね￹返￺かえ￻す。\n￹丈夫￺じょうぶ￻すぎて　￹体￺からだ￻が　￹重￺おも￻いため\n￹少￺すこ￻し　￹動￺うご￻きが　￹鈍￺にぶ￻い。"
        jp_kanji:
          scarlet: "￹殻￺から￻の　￹中￺なか￻では　￹爆発的￺ばくはつてき￻な\nスピードで　￹細胞￺さいぼう￻が　￹変化￺へんか￻し\n￹進化￺しんか￻の　￹準備￺じゅんび￻を　しているぞ。"
          violet: "あらゆる　￹攻撃￺こうげき￻を　￹跳￺は￻ね￹返￺かえ￻す。\n￹丈夫￺じょうぶ￻すぎて　￹体￺からだ￻が　￹重￺おも￻いため\n￹少￺すこ￻し　￹動￺うご￻きが　￹鈍￺にぶ￻い。"
        en:
          scarlet: "The cells within its shell transform with explosive\nspeed, preparing it for evolution."
          violet: "Its armored body makes all attacks bounce off.\nThe armor is too tough, however, making it heavy\nand somewhat sluggish."
        fr:
          scarlet: "À l’intérieur de sa carapace, ses cellules\nchangent à une vitesse vertigineuse.\nIl se prépare ainsi à son évolution."
          violet: "Le corps renforcé de Drackhaus repousse toutes\nles attaques. Cependant, le poids considérable\nde cette armure rend ses mouvements malhabiles."
        it:
          scarlet: "Le cellule all’interno della sua corazza mutano\na velocità vertiginosa in vista dell’evoluzione."
          violet: "La sua corazza è capace di respingere qualsiasi\nattacco ma lo appesantisce, rallentandone\nun po’ i movimenti."
        de:
          scarlet: "In Draschels Schale vollziehen seine Zellen in\nVorbereitung auf seine Entwicklung eine rasante\nTransformation."
          violet: "Von ihm prallen jegliche Angriffe ab. Sein Körper\nist allerdings derart solide und schwer, dass seine\nBewegungen dadurch etwas träge werden."
        es:
          scarlet: "En el interior de su coraza, las células se\ntransforman a una velocidad vertiginosa para\npreparar su evolución."
          violet: "La robusta capa que lo rodea repele los\nataques. Aunque es una buena protección,\nlo hace lento y pesado."
        ko:
          scarlet: "껍질 안에서는 폭발적인\n스피드로 세포가 변화하며\n진화의 준비를 하고 있다."
          violet: "모든 공격을 튕겨 낸다.\n너무 튼튼해서 몸이 무겁기 때문에\n약간 움직임이 둔하다."
        zh_simp:
          scarlet: "细胞在壳中\n以爆发般的速度变化，\n为进化做准备。"
          violet: "能反弹任何攻击。\n因为太结实，身体很重，\n所以动作有点迟缓。"
        zh_trad:
          scarlet: "細胞在殼中\n以爆發般的速度變化，\n正在為進化做準備。"
          violet: "能反彈任何攻擊。\n太過結實的身體非常沉重，\n所以動作有點遲緩。"
