        fr:
          scarlet: "Chaque fois qu’il capte l’aura joyeuse d’un être\nhumain ou d’un Pokémon, il s’en approche\net le pique de sa longue trompe."
          violet: "Ce Pokémon récolte le pollen et le nectar en les\naspirant avec sa longue trompe. Il stocke dans\nses poils le pollen qu’il ne parvient pas à manger."
        it:
          scarlet: "Se percepisce l’aura allegra di un essere umano\no di un Pokémon, gli si avvicina e lo punge con\nla sua lunga bocca, causando un certo dolore."
          violet: "Succhia il nettare e il polline dei fiori con la sua\nlunga bocca e conserva il polline che non riesce\na mangiare fra la sua peluria."
        de:
          scarlet: "Nimmt es die fröhliche Aura von Menschen oder\nPokémon wahr, nähert es sich ihnen und teilt mit\nseinem langen Rüssel schmerzhafte Stiche aus."
          violet: "Mit seinem langen Rüssel saugt es Blütenstaub\nund Nektar auf. Wenn es satt ist, lagert es den\nrestlichen Blütenstaub in seinem Fell."
        es:
          scarlet: "Si percibe el aura de un ser humano o Pokémon\nque transmite alegría, se le acerca y, con su larga\nprobóscide, le asesta un pinchazo doloroso."
          violet: "Absorbe tanto néctar como polen a través de su\nlarga probóscide. El polen que no logra ingerir\nse almacena en los intersticios entre sus pelillos."
        ko:
          scarlet: "사람이나 포켓몬의\n즐거워 보이는 오라를 감지하면\n접근해서 긴 주둥이로 아프게 찔러 댄다."
          violet: "긴 주둥이로 꽃가루나 꿀을 빨아들인다.\n먹다 남은 꽃가루는\n털 사이사이에 비축해 둔다."
        zh_simp:
          scarlet: "感受到人和宝可梦身上有\n似乎很快乐的气场，便会用\n长长的嘴巴刺过来，十分痛。"
          violet: "会用长长的嘴吸取花粉和蜜。\n吃不完的花粉则会被它\n储蓄在体毛的缝隙间。"
        zh_trad:
          scarlet: "只要感覺到人類或寶可夢\n發出的快樂氣場，就會靠過去\n用長長的嘴戳對方。被戳會很痛。"
          violet: "會用長長的嘴吸取花粉\n與花蜜。吃不完的花粉會\n被儲存在體毛間的縫裡。"
