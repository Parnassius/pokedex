        jp_kana:
          scarlet: "￹粉￺こな￻で　できた　￹体￺からだ￻の　￹一部￺いちぶ￻を\n￹食￺た￻べものに　￹振￺ふ￻りかけて　なめた\n￹相手￺あいて￻の　￹生気￺せいき￻を　￹吸￺す￻いとるのだ。"
          violet: "たいへん　￹高価￺こうか￻な　￹茶入￺ちゃいれ￻に\n￹棲￺す￻みついた　￹姿￺すがた￻。　￹安物￺やすもの￻とは\n￹違￺ちが￻うが　￹素人￺しろうと￻には　わからない。"
        jp_kanji:
          scarlet: "￹粉￺こな￻で　できた　￹体￺からだ￻の　￹一部￺いちぶ￻を\n￹食￺た￻べものに　￹振￺ふ￻りかけて　なめた\n￹相手￺あいて￻の　￹生気￺せいき￻を　￹吸￺す￻いとるのだ。"
          violet: "たいへん　￹高価￺こうか￻な　￹茶入￺ちゃいれ￻に\n￹棲￺す￻みついた　￹姿￺すがた￻。　￹安物￺やすもの￻とは\n￹違￺ちが￻うが　￹素人￺しろうと￻には　わからない。"
        en:
          scarlet: "It sprinkles some of its powdery body onto food\nand drains the life-force from those who so much\nas lick it."
          violet: "It has taken up residence in a very expensive\ntea caddy. It takes an expert to distinguish the\nexpensive tea caddies from the cheap ones."
        fr:
          scarlet: "Il incorpore à la nourriture un peu de la poudre\nqui compose son corps, puis aspire l’énergie\nvitale de tout être qui l’ingère."
          violet: "Il a élu domicile dans un pot à thé extrêmement\ncher. Les novices n’arrivent pas à distinguer\nce dernier des pots de piètre qualité."
        it:
          scarlet: "Cosparge il cibo con un po’ della polvere che\ncompone il suo corpo per assorbire l’energia\nvitale di chi lo ingerisce."
          violet: "Forma che assume quando entra in un barattolo\nda tè estremamente costoso, che i profani, però,\nnon riescono a distinguere da uno economico."
        de:
          scarlet: "Es streut eine Prise seines pulverförmigen Körpers\nüber Essen und saugt jenen die Lebenskraft aus,\ndie dieses zu sich nehmen."
          violet: "Diese Form lebt in einer außergewöhnlich teuren\nTeedose. Ein Laie kann den Unterschied zu\nBilligware jedoch nicht erkennen."
        es:
          scarlet: "Absorbe la energía vital de aquellos que prueban\nun bocado de cualquier comida condimentada\ncon el polvo que conforma su cuerpo."
          violet: "Adopta esta forma cuando habita una vasija de\nté carísima. Los aficionados no saben distinguirla\nde una mucho más barata, aunque no haya color."
        ko:
          scarlet: "가루로 이뤄진 몸의 일부를\n먹을 것에 뿌린 다음\n이것을 핥은 상대의 생기를 빨아들인다."
          violet: "상당한 고가의 차통에 깃든 모습.\n저렴한 차통과는 차이가 있지만\n아마추어는 구분할 수 없다."
        zh_simp:
          scarlet: "会将由粉末构成的身体中的\n一部分洒到食物上，然后吸取\n舔了粉末的对手的精气。"
          violet: "住在昂贵茶罐中的样子。\n虽然与便宜货不同，\n但外行人分辨不出来。"
        zh_trad:
          scarlet: "會將由粉末構成的\n身體的一部分灑在食物上，\n藉此吸取舔了粉末的對象的精氣。"
          violet: "住進極為昂貴的茶罐裡的樣子。\n雖然長得與便宜貨不同，\n但外行人無法分辨出來。"
