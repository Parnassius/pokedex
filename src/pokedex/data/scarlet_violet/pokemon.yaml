          violet: "￹艶￺つや￻やか　かつ　￹雅￺みやび￻な　ダンスで\n￹大人￺おとな￻に　￹人気￺にんき￻の　スタイルだが\nパルデアでは　あまり　￹見￺み￻かけない。"
        jp_kanji:
          scarlet: "むらさきのミツを　￹吸￺す￻った　￹姿￺すがた￻。\n￹幻想的￺げんそうてき￻な　ステップで\n￹死者￺ししゃ￻の　￹魂￺たましい￻を　￹呼￺よ￻び￹出￺だ￻す。"
          violet: "￹艶￺つや￻やか　かつ　￹雅￺みやび￻な　ダンスで\n￹大人￺おとな￻に　￹人気￺にんき￻の　スタイルだが\nパルデアでは　あまり　￹見￺み￻かけない。"
        en:
          scarlet: "This form of Oricorio has sipped purple nectar.\nIt uses ethereal dance steps to call forth the\nspirits of the dead."
          violet: "The elegant, attractive dance of these Oricorio is\npopular with adults, but the Oricorio themselves\nare hard to find in Paldea."
        fr:
          scarlet: "Ce Plumeline a bu du Nectar Mauve. Ses pas\nde danse éthérés invoquent les âmes de l’au-delà."
          violet: "Ils doivent leur popularité à leur danse raffinée,\nqui plaît particulièrement aux adultes. Toutefois,\non en trouve rarement à Paldea."
        it:
          scarlet: "Forma di un Oricorio che si è nutrito di Nettare\nviola. Chiama a sé le anime dei morti con eterei\npassi di danza."
          violet: "A Paldea non si vede quasi mai. La sua danza\naffascinante e raffinata ha un grande successo\ntra gli adulti."
        de:
          scarlet: "Dieses Choreogel hat Purpurnen Nektar\ngeschlürft. Mit anmutigen Tanzschritten\nbeschwört es die Seelen Verstorbener."
          violet: "Sein faszinierender, eleganter Tanzstil macht\ndieses Pokémon zwar bei Erwachsenen beliebt,\ndoch in Paldea trifft man es kaum an."
        es:
          scarlet: "Forma que toma Oricorio al libar Néctar Violeta.\nInvoca a los espíritus de los difuntos con su\ndanza hechizante."
          violet: "A pesar de lo popular que es su seductora y\nelegante danza entre la población adulta, este\nPokémon no es muy común en Paldea."
        ko:
          scarlet: "보라꿀을 빨아들인 모습.\n환상적인 스텝으로\n죽은 자의 영혼을 불러낸다."
          violet: "기품 있으면서도 우아한 댄스로\n어른들에게 인기 있는 스타일이나\n팔데아에서는 보기 드문 편이다."
        zh_simp:
          scarlet: "吸食了兰紫色花蜜的样子。\n会通过奇幻的舞步\n召唤出死者的灵魂。"
          violet: "美艳又高雅的舞蹈风格\n在大人们当中很受欢迎，\n但在帕底亚却很少见。"
        zh_trad:
          scarlet: "吸食了蘭紫色花蜜的樣子。\n會透過奇幻的舞步\n召喚出死者的靈魂。"
          violet: "這個風格的舞蹈豔麗高雅，\n相當受到大人的歡迎，\n但在帕底亞卻很少見。"
