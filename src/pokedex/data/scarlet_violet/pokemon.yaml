          scarlet: "￹地底￺ちてい￻の　￹岩塩層￺がんえんそう￻で　￹生￺う￻まれた。\n￹貴重￺きちょう￻な　￹塩￺しお￻を　￹分￺わ￻けてくれるため\n￹昔￺むかし￻は　とくに　￹大事￺だいじ￻にされた。"
          violet: "￹歩￺ある￻くと　￹地面￺じめん￻で　￹体￺からだ￻が　￹削￺けず￻れ\n￹塩￺しお￻を　￹残￺のこ￻す。　￹体内￺たいない￻で　￹塩￺しお￻が\nつねに　￹作￺つく￻られて　￹補充￺ほじゅう￻される。"
        jp_kanji:
          scarlet: "￹地底￺ちてい￻の　￹岩塩層￺がんえんそう￻で　￹生￺う￻まれた。\n￹貴重￺きちょう￻な　￹塩￺しお￻を　￹分￺わ￻けてくれるため\n￹昔￺むかし￻は　とくに　￹大事￺だいじ￻にされた。"
          violet: "￹歩￺ある￻くと　￹地面￺じめん￻で　￹体￺からだ￻が　￹削￺けず￻れ\n￹塩￺しお￻を　￹残￺のこ￻す。　￹体内￺たいない￻で　￹塩￺しお￻が\nつねに　￹作￺つく￻られて　￹補充￺ほじゅう￻される。"
        en:
          scarlet: "It was born in a layer of rock salt deep under the\nearth. This species was particularly treasured in\nthe old days, as they would share precious salt."
          violet: "The ground scrapes its body as it travels, causing\nit to leave salt behind. Salt is constantly being\ncreated and replenished inside Nacli’s body."
        fr:
          scarlet: "Ce Pokémon est né dans des couches souterraines\nde sel gemme. Connu pour partager son précieux\nsel, il était très apprécié autrefois."
          violet: "Son corps s’effrite au contact du sol et laisse du\nsel dans son sillage, mais comme son organisme\nen produit constamment, il se régénère sans mal."
        it:
          scarlet: "È nato nei giacimenti sotterranei di salgemma.\nIn passato era tenuto in grande considerazione\npoiché condivideva il suo prezioso sale."
          violet: "Muovendosi struscia contro il terreno, lasciando\nuna scia di sale. Produce continuamente sale\nnel corpo per sostituire quello che perde."
        de:
          scarlet: "Es entstand in unterirdischen Salzschichten.\nDa es kostbares Salz mit den Menschen teilt,\nwurde es früher ganz besonders geschätzt."
          violet: "Mit jedem Schritt schabt sein Körper am Boden\nund hinterlässt dabei Salz. Sein Körper stellt\njedoch kontinuierlich neues Salz her."
        es:
          scarlet: "Surgen de estratos salinos subterráneos. Antaño\nse los tenía en alta estima, pues compartían su\nsal, un mineral por entonces muy preciado."
          violet: "Arrastra el cuerpo por el suelo al desplazarse,\npor lo que deja un rastro de sal. La fabrica y\nrepone continuamente en su interior."
        ko:
          scarlet: "땅속의 암염층에서 태어났다.\n귀한 소금을 나눠 주기 때문에\n옛날에는 특히 더 귀하게 여겨졌다."
          violet: "걸으면 땅바닥에 의해 몸이 깎여\n소금을 남긴다. 항상 체내에서 소금을\n만들고 있기 때문에 금방 보충된다."
        zh_simp:
          scarlet: "出生在地底的岩盐层。\n原意分享贵重的盐巴，\n因此在过去非常受到重视。"
          violet: "身体会受到地面磨损，\n因此只要走过就会留下盐迹。\n体内会随时制造出盐来补充。"
        zh_trad:
          scarlet: "出生在地底的岩鹽層。\n會願意分享貴重的鹽巴，\n因此在過去更是受到重視。"
          violet: "身體會受到地面磨損，因此\n凡走過必留下鹽跡。鹽隨時\n都會在體內被製造出來補充。"
