      descriptions:
        jp_kana:
          scarlet: "￹鉄骨￺てっこつ￻を　￹担￺かつ￻いで　￹体￺からだ￻を　￹鍛￺きた￻えている。\n￹鍛￺きた￻えた　￹筋肉￺きんにく￻を　￹仲間￺なかま￻と\n￹見￺み￻せ￹合￺あ￻い　￹自慢￺じまん￻する。"
          violet: "￹鍛￺きた￻え￹上￺あ￻げられた　￹筋肉￺きんにく￻の　￹体￺からだ￻は\nプロレスラーが　￹束￺たば￻になって\n￹攻撃￺こうげき￻しても　びくともしない。"
        jp_kanji:
          scarlet: "￹鉄骨￺てっこつ￻を　￹担￺かつ￻いで　￹体￺からだ￻を　￹鍛￺きた￻えている。\n￹鍛￺きた￻えた　￹筋肉￺きんにく￻を　￹仲間￺なかま￻と\n￹見￺み￻せ￹合￺あ￻い　￹自慢￺じまん￻する。"
          violet: "￹鍛￺きた￻え￹上￺あ￻げられた　￹筋肉￺きんにく￻の　￹体￺からだ￻は\nプロレスラーが　￹束￺たば￻になって\n￹攻撃￺こうげき￻しても　びくともしない。"
        en:
          scarlet: "They strengthen their bodies by carrying steel\nbeams. They show off their big muscles to their\nfriends."
          violet: "This Pokémon is so muscular and strongly built\nthat even a group of wrestlers could not make it\nbudge an inch."
        fr:
          scarlet: "Il entretient sa forme en transportant une poutre\nen acier et aime exhiber ses gros muscles auprès\nde ses congénères."
          violet: "Son corps est tellement musclé que même si\ntous les membres d’un club de catch se jetaient\nsur lui, ils ne parviendraient pas à le faire ciller."
        it:
          scarlet: "Allena il corpo portando sulle spalle travi\nd’acciaio. Si mostrano a vicenda i muscoli\nper fare a gara a chi li ha più possenti."
          violet: "Grazie al suo corpo muscolosissimo, resisterebbe\nsenza battere ciglio persino all’assalto di un\ngruppo di lottatori di wrestling."
        de:
          scarlet: "Zu Trainingszwecken trägt es immer einen\nStahlträger bei sich. Unter Artgenossen gibt es\nnur zu gern mit seinen Muskeln an."
          violet: "Selbst wenn es von mehreren Profi-Wrestlern auf\neinmal angegriffen wird, lässt es dies dank seiner\ngestählten Muskeln kalt."
        es:
          scarlet: "Ejercita el cuerpo cargando vigas de acero.\nPresume de lo grandes que son sus músculos\ncomparándolos con los de sus congéneres."
          violet: "Sus músculos están tan desarrollados que no se\ninmutaría aunque lo atacaran varios luchadores\nprofesionales al mismo tiempo."
        ko:
          scarlet: "철골을 짊어진 채\n몸을 단련하고 있다. 단련한 근육을\n동료와 서로 보여 주며 자랑한다."
          violet: "단련을 거듭한 근육덩어리 몸은\n프로레슬러가 단체로 공격해도\n꿈쩍도 하지 않는다."
        zh_simp:
          scarlet: "扛着工字钢锻炼身体。\n会和伙伴互相炫耀\n经过锻炼的肌肉。"
          violet: "身体经过锻炼充满了肌肉，\n即使是职业摔角手一拥而上\n进行攻击，也是纹丝不动。"
        zh_trad:
          scarlet: "扛著鋼骨鍛鍊身體。\n會亮出鍛鍊的肌肉\n與夥伴互相炫耀。"
          violet: "身體的肌肉經過完美鍛鍊。\n即使是職業摔角手一擁而上\n進行攻擊，也能毫髮無傷。"
