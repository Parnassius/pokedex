          violet: "￹腕￺うで￻を　ぐるぐる￹回￺まわ￻して　￹電気￺でんき￻を\n￹発生￺はっせい￻させるが　すぐ　￹疲￺つか￻れるので\n￹少￺すこ￻ししか　￹電気￺でんき￻が　￹溜￺た￻められない。"
        jp_kanji:
          scarlet: "￹激￺はげ￻しい　￹雷￺かみなり￻が　￹大好￺だいす￻き。\n￹体￺からだ￻に　￹電気￺でんき￻を　￹溜￺た￻めるとき\nツノのあいだが　￹青白￺あおじろ￻く　￹光￺ひか￻る。"
          violet: "￹腕￺うで￻を　ぐるぐる￹回￺まわ￻して　￹電気￺でんき￻を\n￹発生￺はっせい￻させるが　すぐ　￹疲￺つか￻れるので\n￹少￺すこ￻ししか　￹電気￺でんき￻が　￹溜￺た￻められない。"
        en:
          scarlet: "It loves violent thunder. The space between its\nhorns flickers bluish white when it is charging\nenergy."
          violet: "It rotates its arms to generate electricity, but it\ntires easily, so it only charges up a little bit."
        fr:
          scarlet: "Il aime quand la foudre tombe avec fracas.\nUne lueur bleu clair apparaît entre ses cornes\nquand il emmagasine de l’électricité."
          violet: "Il fait pivoter ses bras pour générer de\nl’électricité, mais comme il se fatigue vite,\nil ne peut en stocker qu’une petite quantité."
        it:
          scarlet: "Adora i tuoni più fragorosi. Quando carica\nil corpo di elettricità, fra le due corna brilla\nuna luce di colore blu pallido."
          violet: "Genera elettricità ruotando le braccia, ma dato\nche si stanca subito non riesce ad accumularne\nmolta."
        de:
          scarlet: "Es mag gewaltige Gewitter. Der Bereich zwischen\nseinen Hörnern leuchtet hellblau, wenn es in\nseinem Körper Elektrizität speichert."
          violet: "Es lässt seine Arme kreisen, um Elektrizität zu\ngenerieren, doch da es schnell müde wird,\nerzeugt es nur eine kleine Menge."
        es:
          scarlet: "Adora los rayos más violentos. Cuando se\ncarga de electricidad, la cavidad entre sus\ncuernos emite una luz blanquecina."
          violet: "Gira los brazos para generar electricidad, pero\nse cansa enseguida, así que almacena muy poca."
        ko:
          scarlet: "격렬한 벼락을 매우 좋아한다.\n몸에 전기를 비축할 때\n뿔 사이가 푸르스름하게 빛난다."
          violet: "팔을 빙글빙글 돌려서 전기를\n발생시키지만 금방 지쳐서\n전기를 조금밖에 모을 수 없다."
        zh_simp:
          scarlet: "非常喜欢暴雷。\n将电力储存到身体里时，\n角与角之间会发出青白色的光。"
          violet: "会一圈圈抡动双臂产生电力，\n但很快就会感到疲惫，\n因此只能储存少量电力。"
        zh_trad:
          scarlet: "非常喜歡激烈的雷電。\n在將電力儲存到身體裡時，\n兩隻角中間會發出藍白色的亮光。"
          violet: "會一圈圈轉動雙臂製造電力，\n但沒兩三下就會感到疲累，\n因此只能儲存少量的電力。"
