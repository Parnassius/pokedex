      descriptions:
        jp_kana:
          scarlet: "￹感情￺かんじょう￻が　￹昂￺たかぶ￻ると\n￹体内￺たいない￻の　￹温度￺おんど￻が　￹上昇￺じょうしょう￻。\n￹炎￺ほのお￻を　￹吹￺ふ￻きながら　￹忙￺せわ￻しなく　￹走￺はし￻る。"
          violet: "￹背中￺せなか￻の　￹石炭￺せきたん￻の　￹山￺やま￻は　￹中￺なか￻で\nコールタールが　￹作￺つく￻られているため\n￹高速￺こうそく￻で　￹走￺はし￻っても　￹崩￺くず￻れない。"
        jp_kanji:
          scarlet: "￹感情￺かんじょう￻が　￹昂￺たかぶ￻ると\n￹体内￺たいない￻の　￹温度￺おんど￻が　￹上昇￺じょうしょう￻。\n￹炎￺ほのお￻を　￹吹￺ふ￻きながら　￹忙￺せわ￻しなく　￹走￺はし￻る。"
          violet: "￹背中￺せなか￻の　￹石炭￺せきたん￻の　￹山￺やま￻は　￹中￺なか￻で\nコールタールが　￹作￺つく￻られているため\n￹高速￺こうそく￻で　￹走￺はし￻っても　￹崩￺くず￻れない。"
        en:
          scarlet: "The temperature inside its body increases when\nit experiences strong emotions. It rolls around\nfrantically while spewing flames."
          violet: "Due to the coal tar created inside it, the heap\nof coal on Carkol’s back never falls apart, even\nwhen the Pokémon rolls around at high speeds."
        fr:
          scarlet: "Lorsqu’il est en proie à d’intenses émotions,\nsa température augmente et il se met à courir\nfrénétiquement en crachant des flammes."
          violet: "Grâce au goudron qu’il produit dans son tas\nde charbon, il peut avancer très rapidement\nsans que ce dernier s’affaisse."
        it:
          scarlet: "Se si emoziona, la sua temperatura interna\nsale. Corre freneticamente qua e là\nsputando fiamme."
          violet: "Genera catrame all’interno della montagna di\ncarbone che porta sulla schiena, in modo da\npotersi muovere rapidamente senza farla crollare."
        de:
          scarlet: "Wird dieses Pokémon von starken Emotionen\nerfasst, steigt seine Körpertemperatur und es\nrollt hektisch umher, während es Flammen speit."
          violet: "Der Kohlehaufen auf seinem Rücken zerfällt\nselbst bei sehr schneller Fortbewegung nicht,\nwas an dem Teer liegt, den es darin produziert."
        es:
          scarlet: "Su temperatura corporal asciende cuando\nse emociona. Corre de un lado a otro\nfrenéticamente escupiendo fuego."
          violet: "La montaña de carbón que lleva a lomos no\nse derrumba por mucho que corra debido al\nalquitrán que produce dentro de ella."
        ko:
          scarlet: "흥분하게 되면\n체내의 온도가 상승하여\n불꽃을 뿜으며 정신없이 달린다."
          violet: "등의 석탄 더미 안에는\n콜타르가 만들어져 있어서\n고속으로 달려도 무너지지 않는다."
        zh_simp:
          scarlet: "只要情绪激昂起来，\n体内的温度就会上升，\n会一喷出火焰一边匆忙地奔跑。"
          violet: "由于内部在制造煤焦油，\n因此就算它跑得再快，\n背上的煤炭山也不会崩塌。"
        zh_trad:
          scarlet: "情緒只要激昂起來，\n體內的溫度就會上升。\n會噴著火焰忙碌地奔跑。"
          violet: "由於內部製造著柏油，\n因此就算牠跑得再快，\n背上的煤炭山也不會崩塌。"
