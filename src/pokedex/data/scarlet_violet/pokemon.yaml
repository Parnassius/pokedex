      descriptions:
        jp_kana:
          scarlet: "￹波動￺はどう￻を　キャッチすることで\n￹見￺み￻えない　￹相手￺あいて￻の　￹姿￺すがた￻でも\n￹見￺み￻えると　￹言￺い￻われている。"
          violet: "￹鍛￺きた￻えられた　ルカリオは　￹波動￺はどう￻を　￹使￺つか￻い\n１キロ￹先￺さき￻に　だれがいるのか\nどんな￹気持￺きも￻ちか　さえも　わかる。"
        jp_kanji:
          scarlet: "￹波動￺はどう￻を　キャッチすることで\n￹見￺み￻えない　￹相手￺あいて￻の　￹姿￺すがた￻でも\n￹見￺み￻えると　￹言￺い￻われている。"
          violet: "￹鍛￺きた￻えられた　ルカリオは　￹波動￺はどう￻を　￹使￺つか￻い\n１キロ￹先￺さき￻に　だれがいるのか\nどんな￹気持￺きも￻ちか　さえも　わかる。"
        en:
          scarlet: "It’s said that no foe can remain invisible to\nLucario, since it can detect auras—even those\nof foes it could not otherwise see."
          violet: "A well-trained one can use its aura to identify\nand take in the feelings of creatures over half a\nmile away."
        fr:
          scarlet: "On dit qu’il peut repérer ses ennemis, même\nlorsqu’ils sont invisibles, car il ressent leur aura."
          violet: "Un spécimen bien entraîné peut sentir\net identifier les émotions d’une personne\nà plus d’un kilomètre grâce à son aura."
        it:
          scarlet: "Si dice che riesca a individuare anche\ngli avversari invisibili percependone l’aura."
          violet: "Se ben allenato, Lucario riesce a percepire e\na identificare le emozioni di creature lontane\nun chilometro."
        de:
          scarlet: "Man sagt, es könne sogar unsichtbare Gegner\nausmachen, weil es dazu fähig ist, Auren\nwahrzunehmen."
          violet: "Ein trainiertes Lucario kann mithilfe seiner Aura\nspüren, welche Lebewesen sich in 1 km\nEntfernung aufhalten und was sie empfinden."
        es:
          scarlet: "Dicen que, como es capaz de detectar auras,\npuede percibir a sus rivales aunque no los vea."
          violet: "Un Lucario bien entrenado es capaz de emitir\nondas que le permiten percibir la presencia y\nlos sentimientos de un individuo incluso a 1 km."
        ko:
          scarlet: "파동을 포착하여\n보이지 않는 상대의 모습도\n볼 수 있다고 전해진다."
          violet: "단련된 루카리오는 파동을 써서\n1km 앞에 누가 있는지\n어떤 기분인지까지도 안다."
        zh_simp:
          scarlet: "据说通过捕捉波导，\n就能看见原本无法\n见其身影的对手。"
          violet: "经过锻炼的路卡利欧能使用波导\n来探测出１公里之外有谁在，\n还能知道对方的心情。"
        zh_trad:
          scarlet: "只要透過捕捉波導，\n據說就能夠看見原本\n看不見身影的對手。"
          violet: "經過鍛鍊的路卡利歐能使用波導\n探測出１公里之外有誰在，\n還能知道對方當下的心情。"
