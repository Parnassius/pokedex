          violet: "りんごの　￹中￺なか￻で　￹暮￺く￻らしている。\nりんごが　なくなると\n￹体￺からだ￻の　￹水分￺すいぶん￻が　￹抜￺ぬ￻けて　￹弱￺よわ￻ってしまう。"
        jp_kanji:
          scarlet: "りんごの　￹果肉￺かにく￻を　￹食￺た￻べて　￹育￺そだ￻つ。\n￹体液￺たいえき￻で　￹皮￺かわ￻の　￹強度￺きょうど￻を　￹高￺たか￻めつつ\n￹腐￺くさ￻らないようにする。"
          violet: "りんごの　￹中￺なか￻で　￹暮￺く￻らしている。\nりんごが　なくなると\n￹体￺からだ￻の　￹水分￺すいぶん￻が　￹抜￺ぬ￻けて　￹弱￺よわ￻ってしまう。"
        en:
          scarlet: "It grows by eating the flesh of an apple.\nApplin uses its own body fluid to strengthen\nthe apple’s skin and prevent it from rotting."
          violet: "Applin lives inside an apple. When an Applin is\nseparated from its apple, its body loses moisture\nand the Pokémon grows weak."
        fr:
          scarlet: "Il grandit en mangeant la chair d’une pomme.\nGrâce à une substance qu’il sécrète, il solidifie\nla peau de cette pomme et l’empêche de pourrir."
          violet: "Ce Pokémon vit à l’intérieur d’une pomme.\nS’il se retrouve sans elle, son corps se dessèche\net il s’affaiblit."
        it:
          scarlet: "Cresce alimentandosi della polpa di una mela.\nSecerne un liquido capace di rinforzarne la\nbuccia, impedendo che ammuffisca."
          violet: "Vive all’interno di una mela. In mancanza di\nquest’ultima, Applin si disidrata e si indebolisce."
        de:
          scarlet: "Es wächst, indem es sich vom Inneren eines\nApfels ernährt. Um Fäulnis vorzubeugen, stärkt es\nmit seiner Körperflüssigkeit dessen Schale."
          violet: "Dieses Pokémon lebt im Inneren eines Apfels.\nOhne diesen verliert sein Körper Flüssigkeit,\nwodurch es schwächer wird."
        es:
          scarlet: "Crece alimentándose de la carne de una\nmanzana, cuya piel refuerza con sus propios\nfluidos corporales para que no se pudra."
          violet: "Vive dentro de una manzana. Si se separa de\nella, su cuerpo se deshidrata y se queda sin\nfuerzas."
        ko:
          scarlet: "사과의 과육을 먹으며 성장한다.\n체액으로 껍질의 강도를 보강하면서\n썩지 않게 한다."
          violet: "사과 안에 살고 있다.\n사과가 없어지면\n몸의 수분이 빠져나와 약해진다."
        zh_simp:
          scarlet: "吃苹果的果肉长大。\n会用体液提高苹果外皮的\n强度，同时避免苹果腐烂。"
          violet: "平时生活在苹果中。\n如果失去了苹果，身体的\n水分就会流失，从而逐渐虚弱。"
        zh_trad:
          scarlet: "吃蘋果的果肉長大。\n會用體液增加蘋果外皮的\n強度，同時避免蘋果腐爛。"
          violet: "平時都在蘋果中生活。\n如果失去了蘋果，身體的\n水分就會流失而變得虛弱。"
