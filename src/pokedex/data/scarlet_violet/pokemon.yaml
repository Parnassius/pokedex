        jp_kanji:
          scarlet: "￹花￺はな￻の　￹甘￺あま￻い　￹香￺かお￻りに　￹誘￺さそ￻われて\n￹寄￺よ￻ってきた　￹虫￺むし￻ポケモンを　￹仲間￺なかま￻と\n￹油断￺ゆだん￻させ　カマで　￹仕留￺しと￻める。"
          violet: "￹鮮￺あざ￻やかな　￹花色￺はないろ￻を　￹保￺たも￻つには\n￹手間￺てま￻が　かかる。　トレーナーの\n￹細￺こま￻やかさが　￹問￺と￻われる　ポケモン。"
        en:
          scarlet: "By masquerading as a bug Pokémon, it lowers the\nguard of actual bug Pokémon lured in by a scent\nof sweet flowers. Its sickles bring them down."
          violet: "A lot of time and effort is required to maintain\nthe vivid colors of its petals. This Pokémon puts\nits Trainer’s attentiveness to the test."
        fr:
          scarlet: "Floramantis attire les Pokémon Insecte grâce à\nson doux parfum floral et se fait passer pour l’un\nd’eux. Il les élimine ensuite à l’aide de ses faux."
          violet: "Préserver ses couleurs éclatantes requiert\nbeaucoup de travail. Ce Pokémon met donc\nà l’épreuve le dévouement de son Dresseur."
        it:
          scarlet: "Sfrutta il suo dolce profumo floreale per attrarre\ni Pokémon Coleottero e li inganna fingendosi uno\ndi loro. Dopodiché, li abbatte con le sue falci."
          violet: "Per mantenere vividi i suoi colori servono molte\ncure. È un Pokémon che richiede una dedizione\ntotale da parte del suo Allenatore."
        de:
          scarlet: "Es täuscht die von süßem Blumenduft angelockten\nKäfer-Pokémon, indem es sich als eines von ihnen\nausgibt, und erlegt sie dann mit seinen Sicheln."
          violet: "Es ist äußerst zeitaufwendig, seine strahlende\nBlütenfarbe aufrechtzuerhalten. Dieses Pokémon\nerfordert daher viel Hingabe von seinem Trainer."
        es:
          scarlet: "Si los Pokémon de tipo Bicho se acercan atraídos\npor el aroma de las flores, finge ser uno más para\nque no desconfíen y los ataca con sus guadañas."
          violet: "Este Pokémon precisa de mucha atención por\nparte de su Entrenador, pues mantener sus vivos\ncolores requiere tiempo y esfuerzo."
        ko:
          scarlet: "꽃의 달콤한 향기에 이끌려 찾아온\n벌레포켓몬을 동료인 척 방심시키고는\n낫으로 마무리한다."
          violet: "꽃의 선명함을 유지하려면\n많은 수고가 들기 때문에\n트레이너의 세심함이 요구되는 포켓몬이다."
        zh_simp:
          scarlet: "会用甜甜花香吸引虫宝可梦靠近，\n趁它们把自己当做同伴而大意时，\n利用镰刀夺取对方的性命。"
          violet: "为保存它鲜艳的花色，\n需要下很多工夫。是很考验\n训练家细心程度的宝可梦。"
        zh_trad:
          scarlet: "會用甜甜花香吸引蟲寶可夢接近，\n然後趁著牠們誤以為自己是夥伴\n而掉以輕心時用鐮刀奪取性命。"
          violet: "要維持牠鮮豔的花色，\n需下很多工夫，是很考驗\n訓練家細膩程度的寶可夢。"
