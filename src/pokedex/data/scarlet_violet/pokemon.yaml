          violet: "￹愛好家￺あいこうか￻の　￹多￺おお￻い　ポケモンだが\nこの￹季節￺きせつ￻の　￹姿￺すがた￻にかぎっては\n￹好￺この￻む　￹者￺もの￻は　あまり　いないのだ。"
        en:
          scarlet: "It’s said that Sawsbuck are calm and easy to tame\nduring the season when they take on this form,\nso it’s the perfect time to make one your partner."
          violet: "Though there are many enthusiasts for Sawsbuck\nas a species, this seasonal form in particular is\nnot very popular."
        fr:
          scarlet: "On dit que quand il prend cette forme, Haydaim\nest docile et facile à apprivoiser. C’est le moment\nidéal pour en faire son partenaire."
          violet: "Beaucoup de gens aiment ce Pokémon,\nmais la forme qu’il prend l’hiver n’est pas\ntrès populaire."
        it:
          scarlet: "Si dice che nel periodo in cui assume questa\nforma sia docile e molto facile da istruire.\nÈ la stagione perfetta per chi ne vuole uno."
          violet: "È un Pokémon con tanti ammiratori, ma gli\nesemplari in questa forma sono i soli a non\nessere molto amati."
        de:
          scarlet: "In dieser Form gilt es als besonders sanft und\nleicht zu zähmen. Diese Jahreszeit eignet sich\nbestens, um es als Partner zu gewinnen."
          violet: "Dieses Pokémon hat viele Bewunderer, doch seine\nForm zu dieser Jahreszeit erfreut sich keiner allzu\ngroßen Beliebtheit."
        es:
          scarlet: "Se dice que la época en la que asume esta forma\nes cuando más dócil se muestra y, por lo tanto,\nel momento idóneo para ganarse su lealtad."
          violet: "Este Pokémon cuenta con muchos admiradores,\npero la forma que adopta en esta época no es\nmuy popular."
        ko:
          scarlet: "이 모습인 시기에는 얌전하고\n매우 길들이기 쉬운 것으로 알려져 있어\n파트너로 만들 절호의 기회다."
          violet: "애호가가 많은 포켓몬이지만\n이 계절의 모습만큼은\n좋아하는 사람이 별로 없다고 한다."
        zh_simp:
          scarlet: "当它是这个样子时\n会比较稳重，容易驯化，\n是与它成为同伴的好机会。"
          violet: "这种宝可梦虽然拥有很多\n爱好者，但唯独这个季节的\n样子却没什么人喜欢。"
        zh_trad:
          scarlet: "據說變成這個樣子的時期\n性情較為穩重、極易馴化，\n是與牠成為夥伴的好機會。"
          violet: "有許多愛好者的寶可夢。\n但唯獨這個季節的樣子\n卻偏偏沒什麼人喜歡。"
