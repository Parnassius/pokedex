      descriptions:
        jp_kana:
          scarlet: "￹仲間￺なかま￻が　ピンチのときは　￹腕￺うで￻の\nシールドを　￹広￺ひろ￻げて　￹自￺みずか￻ら\n￹盾￺たて￻となり　￹攻撃￺こうげき￻を　￹防￺ふせ￻ぐ。"
          violet: "￹争￺あらそ￻いを　￹避￺さ￻ける　￹穏￺おだ￻やかな\n￹性格￺せいかく￻だが　いざとなると　トゲの\nこぶしで　￹相手￺あいて￻を　￹叩￺たた￻きのめす。"
        jp_kanji:
          scarlet: "￹仲間￺なかま￻が　ピンチのときは　￹腕￺うで￻の\nシールドを　￹広￺ひろ￻げて　￹自￺みずか￻ら\n￹盾￺たて￻となり　￹攻撃￺こうげき￻を　￹防￺ふせ￻ぐ。"
          violet: "￹争￺あらそ￻いを　￹避￺さ￻ける　￹穏￺おだ￻やかな\n￹性格￺せいかく￻だが　いざとなると　トゲの\nこぶしで　￹相手￺あいて￻を　￹叩￺たた￻きのめす。"
        en:
          scarlet: "When its allies are in trouble, Chesnaught\ncreates a shield with its arms and uses its\nown body to block attacks."
          violet: "Its gentle disposition would have it avoid\nconflict, but it gives opponents a thrashing with\nits thorned fists when the situation calls for it."
        fr:
          scarlet: "Quand ses compagnons sont en danger,\nil déploie ses bras pour former des boucliers et\ndevient lui-même un rempart face aux attaques."
          violet: "De nature calme, il préfère éviter\nles conflits. Mais si nécessaire, il martèle\nses adversaires avec ses poings dotés d’épines."
        it:
          scarlet: "Quando i suoi compagni sono in pericolo,\nallarga le braccia corazzate e blocca gli attacchi\nfacendo loro scudo con tutto il corpo."
          violet: "È mite di natura ed evita i conflitti, ma se\nnecessario può annientare gli avversari\ncon i suoi pugni dotati di aculei."
        de:
          scarlet: "Sind seine Freunde in Gefahr, schützt es\nsie vor Angriffen, indem es mit seinen\nArmen einen Schild bildet."
          violet: "Dieses friedliche Pokémon geht Streit aus\ndem Weg, doch wenn es sein muss, schlägt es\nGegner mit seinen stacheligen Fäusten nieder."
        es:
          scarlet: "Cuando sus aliados se encuentran en apuros,\ndespliega un escudo con los brazos y bloquea\nlos ataques utilizando su propio cuerpo."
          violet: "Evita las riñas por su carácter tranquilo, pero, si\nla situación lo requiere, es capaz de noquear al\nrival con sus puños dotados de púas."
        ko:
          scarlet: "동료가 위기에 처했을 때는\n팔의 실드를 펼침으로써\n직접 방패가 되어 공격을 막는다."
          violet: "싸움을 피하는 온화한 성격을 가졌으나\n중요한 순간에는 가시가 달린 주먹으로\n상대를 때려눕힌다."
        zh_simp:
          scarlet: "当伙伴遇到危机时，\n就会展开手臂上的盾牌，\n把自身当成护盾来抵挡攻击。"
          violet: "性格温和，不爱争斗，\n但只要到了紧要关头，\n就会用带刺的拳头击溃对手。"
        zh_trad:
          scarlet: "當夥伴陷入危機時，\n會展開手臂的盾牌，\n把自己當成護盾來抵擋攻擊。"
          violet: "性情溫和，會避免鬥爭，\n但遇到逼不得已的時候，\n就會用帶刺的拳頭擊潰對手。"
