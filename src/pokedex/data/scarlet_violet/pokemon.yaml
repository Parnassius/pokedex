        jp_kanji:
          scarlet: "￹元気￺げんき￻な　￹気持￺きも￻ちになれる　￹甘￺あま￻い\n￹香￺かお￻りを　￹振￺ふ￻りまく。　￹制汗剤￺せいかんざい￻の\nフレーバーとして　￹人気￺にんき￻が　￹高￺たか￻い。"
          violet: "￹森￺もり￻を　￹元気￺げんき￻いっぱい　￹跳￺と￻びはねる。\n￹剥￺は￻がれ￹落￺お￻ちた　￹皮￺かわ￻は　すり￹潰￺つぶ￻すと\n￹腹痛￺ふくつう￻を　￹治￺なお￻す　￹薬￺くすり￻になる。"
        en:
          scarlet: "Steenee spreads a sweet scent that makes others\nfeel invigorated. This same scent is popular for\nantiperspirants."
          violet: "Steenee bounces energetically through forests.\nIf the rind that peels off its body is pulverized,\nit can be used to treat stomach pains."
        fr:
          scarlet: "Il dégage un doux parfum qui a le pouvoir\nde redonner du tonus, et qui est très\npopulaire en odeur de déodorant."
          violet: "Ce Pokémon traverse les forêts en bondissant\ngaiement. On fabrique des remèdes contre les\nmaux de ventre grâce à sa peau, qui se détache."
        it:
          scarlet: "Sparge attorno a sé un dolce profumo che può\ndonare il buonumore e che è molto apprezzato\nnei deodoranti."
          violet: "Saltella felicemente per la foresta. Una volta\nstaccatasi, la sua pelle può essere polverizzata\nper creare un rimedio contro il mal di pancia."
        de:
          scarlet: "Es verströmt ein süßes Aroma, das für gute Laune\nsorgt und auch als Duftnote für Deodorants sehr\nbeliebt ist."
          violet: "Es hüpft fröhlich durch den Wald. Zerreibt man\ndie von ihm abgefallene Schale, kann man daraus\nMedizin gewinnen, die Bauchschmerzen lindert."
        es:
          scarlet: "Desprende un olor dulce que reanima a\ncualquiera y que es popular como aroma\nde desodorante."
          violet: "Recorre los bosques a base de enérgicos saltos.\nLa cáscara que se le desprende se puede\npulverizar para tratar dolores estomacales."
        ko:
          scarlet: "기운이 솟을 것만 같은\n달콤한 향기를 흩뿌린다.\n땀 억제제의 향료로 인기가 좋다."
          violet: "숲을 활기차게 뛰어다닌다.\n떨어진 껍질을 갈아 으깨면\n복통을 치료하는 약이 된다."
        zh_simp:
          scarlet: "会散发出能振奋心情的\n香甜气味。这种香味\n作为止汗剂非常受欢迎。"
          violet: "在森林里活力四射地蹦跳。\n磨碎它脱落的皮，就可以\n用来当作治疗肚子疼的药。"
        zh_trad:
          scarlet: "會散發出能振奮心情的\n香甜氣味。作為止汗劑\n的香味擁有極高的人氣。"
          violet: "會活力滿滿地在森林裡\n蹦蹦跳跳。剝落的皮可經由\n磨碎變成治療肚子痛的藥。"
