        jp_kanji:
          scarlet: "￹愛好家￺あいこうか￻の　￹多￺おお￻い　ポケモン。\nツノに　￹繁￺しげ￻る　￹枝葉￺えだは￻が　ぶ￹厚￺あつ￻く\n￹大￺おお￻きいほど　￹見事￺みごと￻と　されている。"
          violet: "￹葉￺は￻っぱから　￹紅茶￺こうちゃ￻が　￹作￺つく￻られる。\n￹産地￺さんち￻によって　￹味￺あじ￻は　￹異￺こと￻なり\nパルデア￹産￺さん￻は　￹香￺かお￻りが　￹強￺つよ￻い。"
        en:
          scarlet: "There are many Sawsbuck enthusiasts. The thicker\nand larger the branches and leaves on its antlers,\nthe more majestic the Sawsbuck is thought to be."
          violet: "This Pokémon’s leaves can be made into a black\ntea, the taste of which varies depending on the\nregion of origin. Paldea’s is especially aromatic."
        fr:
          scarlet: "Ce Pokémon est très populaire. Plus les branches\net le feuillage de ses bois sont épais, plus on le\ntrouve majestueux."
          violet: "On peut préparer du thé noir avec les feuilles\nde ce Pokémon. Son goût varie selon la région.\nÀ Paldea, il possède un arôme puissant."
        it:
          scarlet: "È un Pokémon con tanti ammiratori. Più grandi\ne fitte sono le fronde che crescono sulle corna,\npiù l’esemplare è considerato eccezionale."
          violet: "Con le sue foglie si prepara del tè nero il cui\ngusto varia a seconda del luogo d’origine.\nQuello di Paldea ha un profumo intenso."
        de:
          scarlet: "Dieses Pokémon hat viele Bewunderer. Es wird\nals umso prächtiger empfunden, je dichter und\ngrößer die Äste und Blätter seines Geweihs sind."
          violet: "Aus Kronjuwilds Blättern kann man Schwarztee\nzubereiten, dessen Geschmack je nach Region\nvariiert. Tee aus Paldea ist besonders aromatisch."
        es:
          scarlet: "Mucha gente admira a este Pokémon. Cuanto\nmás grandes y gruesas son las ramas y hojas de\nsu cornamenta, más majestuoso se lo considera."
          violet: "Con sus hojas se puede preparar té negro, que\nvaría en sabor según su lugar de origen. El de\nPaldea es especialmente aromático."
        ko:
          scarlet: "애호가가 많은 포켓몬.\n뿔에 무성하게 자란 가지와 잎이\n굵고 클수록 훌륭한 것으로 여겨진다."
          violet: "잎으로 홍차를 만들 수 있다.\n태어난 곳에 따라 맛이 다르며\n팔데아 출신은 향이 강하다."
        zh_simp:
          scarlet: "拥有很多爱好者的宝可梦。\n人们认为它角上的枝叶\n越厚越大就代表越雄伟。"
          violet: "它的叶子能用来做成红茶。\n根据产地会有不同的风味，\n产自帕底亚的叶子香气浓郁。"
        zh_trad:
          scarlet: "有許多愛好者的寶可夢。\n愛好者們認為牠角上的枝葉\n越厚大越是美麗。"
          violet: "牠的葉子能用來做成紅茶。\n其風味根據產地而不同，\n產自帕底亞的帶有濃濃香氣。"
