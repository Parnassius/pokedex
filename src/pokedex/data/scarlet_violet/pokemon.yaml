      descriptions:
        jp_kana:
          scarlet: "￹風船￺ふうせん￻と　￹間違￺まちが￻えて　フワンテを\n￹持￺も￻っていた　￹小￺ちい￻さな　￹子￺こ￻どもが\n￹消￺き￻えてしまうことが　あるという。"
          violet: "あてもなく　￹浮￺う￻かぶ　￹様子￺ようす￻から\n￹迷￺まよ￻える　￹魂￺たましい￻の￹道￺みち￻しるべ　と　￹伝￺つた￻える\n￹昔話￺むかしばなし￻も　ある。"
        jp_kanji:
          scarlet: "￹風船￺ふうせん￻と　￹間違￺まちが￻えて　フワンテを\n￹持￺も￻っていた　￹小￺ちい￻さな　￹子￺こ￻どもが\n￹消￺き￻えてしまうことが　あるという。"
          violet: "あてもなく　￹浮￺う￻かぶ　￹様子￺ようす￻から\n￹迷￺まよ￻える　￹魂￺たましい￻の￹道￺みち￻しるべ　と　￹伝￺つた￻える\n￹昔話￺むかしばなし￻も　ある。"
        en:
          scarlet: "It is whispered that any child who mistakes\nDrifloon for a balloon and holds on to it could\nwind up missing."
          violet: "Because of the way it floats aimlessly, an old\nfolktale calls it a “signpost for wandering spirits.”"
        fr:
          scarlet: "On dit que les jeunes enfants qui agrippent\nBaudrive après l’avoir pris pour un ballon\ndisparaissent sans laisser de traces."
          violet: "Sa façon de flotter dans les airs sans but,\nau gré du vent, lui a valu le surnom de\n« bouée des esprits égarés »."
        it:
          scarlet: "Si dice che i bambini piccoli possano scomparire\nnel nulla se tengono un Drifloon scambiandolo\nper un palloncino."
          violet: "Fluttua qua e là senza meta. Per questo motivo\nuna leggenda lo definisce \"guida degli spiriti\nvaganti\"."
        de:
          scarlet: "So manches kleine Kind soll schon verschwunden\nsein, weil es ein Driftlon festhielt, das es mit\neinem Ballon verwechselt hatte."
          violet: "Aufgrund seines ziellosen Herumschwebens wird\nes in einer alten Volkssage als „Wegweiser für\numherstreifende Geister“ bezeichnet."
        es:
          scarlet: "Se dice que a veces desaparecen niños que\nagarran un Drifloon pensando que es un globo."
          violet: "Por la forma que tiene de flotar sin rumbo,\nalgunas antiguas leyendas lo consideran el\nguía de las almas perdidas."
        ko:
          scarlet: "풍선으로 착각해 흔들풍손을\n가지고 있었던 어린아이가\n사라지는 경우가 있다고 한다."
          violet: "정처 없이 떠 있는 모습에서\n길 잃은 영혼의 이정표라고\n전해지는 옛날이야기도 있다."
        zh_simp:
          scarlet: "据说把它误认成气球\n而拿在手上的小孩，\n有的会就此消失无踪。"
          violet: "漫无目的地浮在空中的样子，\n使它在某些民间故事里\n被相传为迷途灵魂的路标。"
        zh_trad:
          scarlet: "據說有些因為誤認成氣球，\n而把牠拿在手上的小孩，\n會就此消失無蹤。"
          violet: "漫無目的浮在空中的樣子，\n使牠在某些民間故事裡\n被相傳為迷途靈魂的路標。"
