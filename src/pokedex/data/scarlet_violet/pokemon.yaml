      descriptions:
        jp_kana:
          scarlet: "ほかの　￹色￺いろ￻よりも　オレンジ￹色￺いろ￻の\n￹花￺はな￻と　￹波長￺はちょう￻を　￹合￺あ￻わせたときが\nいちばん　￹力￺ちから￻を　￹引￺ひ￻き￹出￺だ￻せるのだ。"
          violet: "￹自分￺じぶん￻だけでは　￹技￺わざ￻を　￹出￺だ￻せない。\n￹花￺はな￻と　￹波長￺はちょう￻を　￹合￺あ￻わせることで\n￹草￺くさ￻の　￹技￺わざ￻を　￹出￺だ￻せるようになる。"
        jp_kanji:
          scarlet: "ほかの　￹色￺いろ￻よりも　オレンジ￹色￺いろ￻の\n￹花￺はな￻と　￹波長￺はちょう￻を　￹合￺あ￻わせたときが\nいちばん　￹力￺ちから￻を　￹引￺ひ￻き￹出￺だ￻せるのだ。"
          violet: "￹自分￺じぶん￻だけでは　￹技￺わざ￻を　￹出￺だ￻せない。\n￹花￺はな￻と　￹波長￺はちょう￻を　￹合￺あ￻わせることで\n￹草￺くさ￻の　￹技￺わざ￻を　￹出￺だ￻せるようになる。"
        en:
          scarlet: "This Pokémon can draw forth the most power\nwhen in sync with orange flowers, compared to\nflowers of other colors."
          violet: "This Pokémon cannot use moves on its own.\nWhen it syncs with flowers, it becomes able\nto use Grass-type moves."
        fr:
          scarlet: "Lorsqu’il se synchronise avec des fleurs orange,\nil extrait davantage de puissance que lorsqu’il\nse synchronise avec des fleurs d’autres couleurs."
          violet: "Il est incapable de lancer des capacités par\nlui-même, mais il peut utiliser des capacités de\ntype Plante lorsqu’il se synchronise avec les fleurs."
        it:
          scarlet: "Riesce a trarre maggior forza dai fiori arancioni,\ncon cui riesce a entrare più in sintonia rispetto a\nquelli di altri colori."
          violet: "Da solo non sa sferrare alcuna mossa, ma\nentrando in sintonia con i fiori diventa capace\ndi usare mosse di tipo Erba."
        de:
          scarlet: "Wenn es sich mit der Farbwellenlänge von\norangen Blumen synchronisiert, gewinnt es\ndeutlich mehr Kraft als mit andersfarbigen."
          violet: "Floette kann von alleine keine Attacken nutzen.\nSynchronisiert es sich mit der Farbwellenlänge von\nBlumen, kann es Pflanzen-Attacken einsetzen."
        es:
          scarlet: "En comparación con las flores de otros colores,\nlas naranjas son de las que puede extraer más\nenergía al entrar en sintonía con ellas."
          violet: "Solo puede usar movimientos de tipo Planta si\nsus ondas están en consonancia con las de las\nflores, y no por cuenta propia."
        ko:
          scarlet: "다른 색보다 오렌지색 꽃과\n파장을 맞추었을 때\n가장 많은 힘을 끌어낼 수 있다."
          violet: "혼자서는 기술을 쓸 수 없다.\n꽃과 파장을 맞춰야\n풀타입 기술을 쓸 수 있게 된다."
        zh_simp:
          scarlet: "与其他颜色的花相比，\n还是和橙花搭配时\n最能激发出力量来。"
          violet: "单靠自己无法使出招式。\n通过与花同步波长，\n就能使出草属性的招式。"
        zh_trad:
          scarlet: "比起其他顏色的花，\n與橙花結合波長時，\n最能激發出力量來。"
          violet: "單靠自己無法使出招式。\n透過與花同步波長，\n就能使出草屬性的招式。"
    floette_blue_flower:
      form_id: 3
      names:
