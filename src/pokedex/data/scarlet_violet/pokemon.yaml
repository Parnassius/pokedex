          violet: "ダンスのような　￹優雅￺ゆうが￻な　￹動￺うご￻きで\n￹攻撃￺こうげき￻を　かわして　￹強烈￺きょうれつ￻な　￹一撃￺いちげき￻を\n￹相手￺あいて￻に　お￹見舞￺みま￻いする。"
        jp_kanji:
          scarlet: "ヨガの　￹修行￺しゅぎょう￻で　￹鍛￺きた￻えられた\nサイコパワーで　￹相手￺あいて￻の　￹動￺うご￻きを\n￹予測￺よそく￻する　ことが　できるのだ。"
          violet: "ダンスのような　￹優雅￺ゆうが￻な　￹動￺うご￻きで\n￹攻撃￺こうげき￻を　かわして　￹強烈￺きょうれつ￻な　￹一撃￺いちげき￻を\n￹相手￺あいて￻に　お￹見舞￺みま￻いする。"
        en:
          scarlet: "Through yoga training, it gained the psychic\npower to predict its foe’s next move."
          violet: "It elegantly avoids attacks with dance-like\nsteps, then launches a devastating blow in\nthe same motion."
        fr:
          scarlet: "Ses pouvoirs psychiques, renforcés par la\npratique du yoga, lui permettent de prédire\nles mouvements de ses adversaires."
          violet: "Charmina évite les attaques avec grâce,\ncomme s’il dansait, avant de lancer\nune capacité dévastatrice dans son élan."
        it:
          scarlet: "È in grado di conoscere in anticipo le mosse del\nnemico grazie ai poteri di preveggenza ottenuti\ncon le pratiche yoga."
          violet: "Evita gli attacchi con la grazia di un ballerino\ne controbatte lanciando devastanti colpi\naltrettanto elegantemente."
        de:
          scarlet: "Mit Yogaübungen hat es seine Psycho-Kräfte\ngeschärft und ahnt so die Attacken seiner Gegner\nvoraus."
          violet: "Es weicht Angriffen mit tänzerischer Eleganz aus,\num anschließend aus derselben Bewegung heraus\nmit einer verheerenden Attacke zuzuschlagen."
        es:
          scarlet: "Puede prever los movimientos de su rival usando\nsus poderes psíquicos, fortalecidos por el yoga."
          violet: "Evita los ataques moviéndose de forma\nelegante, como si bailara. Ataca dando\nun golpe devastador mientras se mueve así."
        ko:
          scarlet: "요가 수행으로 단련된\n사이코 파워로 상대의 움직임을\n예상할 수 있다."
          violet: "춤추는 듯한 우아한 움직임으로\n공격을 피하며 상대에게\n강력한 일격을 선사한다."
        zh_simp:
          scarlet: "能够使用通过瑜伽修行\n锻炼出来的精神力量\n来预测对手的行动。"
          violet: "会用跳舞一般的优雅动作\n一边躲避攻击，一边向对手\n施展强烈的一击。"
        zh_trad:
          scarlet: "可以用藉由瑜珈修行\n鍛鍊出來的精神力量，\n來預測對手的行動。"
          violet: "會用跳舞般的優雅動作\n在躲避攻擊的同時\n用強烈的一擊招呼對手。"
