          violet: "￹毒成分￺どくせいぶん￻の　￹結晶￺けっしょう￻が　まるで\n￹花￺はな￻びらに　￹見￺み￻える。　￹花粉￺かふん￻のように\n￹毒￺どく￻の￹粉￺こな￻を　ばらまき　￹身￺み￻を￹守￺まも￻る。"
        jp_kanji:
          scarlet: "￹洞窟￺どうくつ￻の　￹壁￺かべ￻から　￹栄養分￺えいようぶん￻を　￹吸収￺きゅうしゅう￻。\n￹毒￺どく￻の　￹結晶￺けっしょう￻で　できた\n￹花￺はな￻びらを　￹身￺み￻にまとう。"
          violet: "￹毒成分￺どくせいぶん￻の　￹結晶￺けっしょう￻が　まるで\n￹花￺はな￻びらに　￹見￺み￻える。　￹花粉￺かふん￻のように\n￹毒￺どく￻の￹粉￺こな￻を　ばらまき　￹身￺み￻を￹守￺まも￻る。"
        en:
          scarlet: "It absorbs nutrients from cave walls. The petals\nit wears are made of crystallized poison."
          violet: "Glimmet’s toxic mineral crystals look just like\nflower petals. This Pokémon scatters poisonous\npowder like pollen to protect itself."
        fr:
          scarlet: "Il absorbe les nutriments qui se trouvent dans\nles parois des grottes. Les pétales qui recouvrent\nson corps sont constitués de poison cristallisé."
          violet: "Ses cristaux nocifs ressemblent en tout point\nà des pétales. Il répand une poudre toxique\nsemblable à du pollen pour se défendre."
        it:
          scarlet: "Assorbe sostanze nutritive dalle pareti\ndelle caverne. Il suo corpo è avvolto\nda petali composti da cristalli velenosi."
          violet: "I suoi cristalli di veleno sembrano in tutto e per\ntutto dei petali. Per proteggersi sparge polvere\ntossica come se fosse polline."
        de:
          scarlet: "Es absorbiert Nährstoffe von Höhlenwänden\nund bedeckt seinen Körper mit Blütenblättern,\ndie aus kristallisiertem Gift bestehen."
          violet: "Die giftigen Kristalle sehen echten Blütenblättern\nzum Verwechseln ähnlich. Es schützt sich, indem\nes einen pollenartigen Giftpuder verstreut."
        es:
          scarlet: "Absorbe nutrientes de las paredes de las cuevas.\nCubre su cuerpo con pétalos hechos de energía\nvenenosa cristalizada."
          violet: "Sus cristales tóxicos se asemejan a los pétalos\nde una flor. Se protege esparciendo un polvo\nvenenoso como si de polen se tratara."
        ko:
          scarlet: "동굴의 벽에서 영양분을 흡수한다.\n독의 결정으로 만들어진 꽃잎을\n몸에 두르고 있다."
          violet: "독성분의 결정은 마치 꽃잎처럼 생겼다.\n꽃가루처럼 독 가루를 흩뿌려서\n몸을 보호한다."
        zh_simp:
          scarlet: "从洞窟的壁上吸取营养。\n包覆在身上的花瓣\n是用毒所凝聚的结晶做成的。"
          violet: "成分为毒的结晶看起来\n就像是花瓣。会像撒花粉一样\n撒出毒粉来保护自身安全。"
        zh_trad:
          scarlet: "會從洞窟的壁上吸取養分。\n包覆在身上的花瓣\n是用毒的結晶做成的。"
          violet: "以毒構成的結晶看似花瓣。\n會如灑花粉般地灑出毒粉\n來保護自身安全。"
