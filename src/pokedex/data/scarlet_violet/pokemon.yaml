          scarlet: "まれに　￹大量発生￺たいりょうはっせい￻すると\nあたりの　￹海￺うみ￻から　￹魚￺さかな￻ポケモンが\n￹一切￺いっさい￻　いなくなってしまう。"
          violet: "￹戦￺たたか￻いのとき　８０￹本￺ぽん￻の\n￹触手￺しょくしゅ￻を　すべて　￹伸￺の￻ばして\n￹毒￺どく￻の　￹包囲網￺ほういもう￻を　￹作￺つく￻り￹上￺あ￻げる。"
        jp_kanji:
          scarlet: "まれに　￹大量発生￺たいりょうはっせい￻すると\nあたりの　￹海￺うみ￻から　￹魚￺さかな￻ポケモンが\n￹一切￺いっさい￻　いなくなってしまう。"
          violet: "￹戦￺たたか￻いのとき　８０￹本￺ぽん￻の\n￹触手￺しょくしゅ￻を　すべて　￹伸￺の￻ばして\n￹毒￺どく￻の　￹包囲網￺ほういもう￻を　￹作￺つく￻り￹上￺あ￻げる。"
        en:
          scarlet: "On the rare occasions that large outbreaks of\nTentacruel occur, all fish Pokémon disappear\nfrom the surrounding sea."
          violet: "In battle, it extends all 80 of its tentacles to\nentrap its opponent inside a poisonous net."
        fr:
          scarlet: "Les Tentacruel se regroupent rarement en masse\ndans la mer, mais lorsque cela arrive, tous\nles Pokémon poissons alentour disparaissent."
          violet: "En combat, il se sert de ses quatre-vingts\ntentacules pour tisser un filet venimeux\nqui emprisonne ses adversaires."
        it:
          scarlet: "Accade di rado, ma durante una comparsa\nmassiccia di Tentacruel tutti i Pokémon\nacquatici nel mare circostante spariscono."
          violet: "Nella lotta estende gli ottanta tentacoli\nper intrappolare il nemico in una rete velenosa."
        de:
          scarlet: "In äußerst seltenen Fällen bilden sie einen\nSchwarm, woraufhin alle Fisch-Pokémon in\nder näheren Umgebung verschwinden."
          violet: "Im Kampf breitet es all seine 80 Tentakel aus\nund bildet mit ihnen ein giftiges Netz, um seine\nGegner darin zu fangen."
        es:
          scarlet: "En muy raras ocasiones, cuando se produce una\naparición masiva de Tentacruel, los Pokémon pez\nde los alrededores se esfuman sin dejar rastro."
          violet: "Cuando combate, extiende sus 80 tentáculos\npara atrapar al enemigo en una red venenosa."
        ko:
          scarlet: "드물게 대량 발생하면\n주변 바다에서 물고기포켓몬이\n모두 사라져 버리고 만다."
          violet: "싸울 때 80개의\n촉수를 모두 뻗어서\n독의 포위망을 펼친다."
        zh_simp:
          scarlet: "很罕见地大量出现时，\n周围海域的鱼宝可梦\n会变得一只都不剩。"
          violet: "战斗时会将８０根\n触手全部伸出，\n制成有毒的包围网。"
        zh_trad:
          scarlet: "罕見地大量出現時，\n周圍海域的魚寶可夢\n會一隻不剩地全部消失。"
          violet: "戰鬥時會將身上的\n８０根觸手全都伸出，\n做成帶毒的包圍網。"
