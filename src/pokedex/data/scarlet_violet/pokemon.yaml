        jp_kanji:
          scarlet: "￹体毛￺たいもう￻から　￹放￺はな￻つ　￹雷￺いかずち￻で\nあたりを　￹焼￺や￻きつくすと　いわれる。\n￹詳￺くわ￻しいことは　わかっていない。"
          violet: "オカルト￹雑誌￺ざっし￻が　￹取￺と￻り￹上￺あ￻げて\n￹短￺みじか￻い　あいだ　￹話題￺わだい￻になった\nライコウの　￹祖先￺そせん￻に　￹似￺に￻ている。"
        en:
          scarlet: "It’s said to incinerate everything around it with\nlightning launched from its fur. Very little is\nknown about this creature."
          violet: "It bears resemblance to a Pokémon that became\na hot topic for a short while after a paranormal\nmagazine touted it as Raikou’s ancestor."
        fr:
          scarlet: "On raconte que la foudre qui s’échappe\nde sa fourrure peut brûler tout ce qui\nl’entoure, mais on en sait peu sur lui."
          violet: "Il rappelle un ancêtre de Raikou qui a brièvement\nfait parler de lui quand il a été mentionné dans\nune revue sur les phénomènes paranormaux."
        it:
          scarlet: "Si dice che incenerisca i dintorni con i fulmini che\nerompono dalla sua pelliccia. Questo è tutto ciò\nche si sa su questo Pokémon."
          violet: "Ricorda un antenato di Raikou che per qualche\ntempo fece scalpore dopo essere apparso\nin una rivista di paranormale."
        de:
          scarlet: "Man sagt, dass es mit den Blitzen, die es aus\nseinem Fell abfeuert, alles in seiner Umgebung\nzu Asche verbrennt. Genaueres ist nicht bekannt."
          violet: "Es ähnelt einem Vorfahren von Raikou, der kurz\nGesprächsthema Nummer eins war, nachdem eine\nesoterische Zeitschrift über ihn berichtet hatte."
        es:
          scarlet: "Se dice que calcina todo cuanto lo rodea con\nlos rayos que libera su pelaje. Aparte de eso,\nse sabe muy poco sobre esta criatura."
          violet: "Recuerda a un presunto antepasado de Raikou\nque dio bastante que hablar durante un tiempo\ntras aparecer en una revista esotérica."
        ko:
          scarlet: "털에서 내뿜는 벼락으로\n주변을 모조리 태워 버린다고 전해진다.\n자세한 정보는 밝혀진 것이 없다."
          violet: "오컬트 잡지에 나와\n한동안 화제였던\n라이코의 선조를 닮았다."
        zh_simp:
          scarlet: "据说会从体毛释放出\n雷电将周围烧毁。\n具体详情不明。"
          violet: "与超自然杂志报道的\n曾短暂引起一阵话题的\n雷公的祖先长得很像。"
        zh_trad:
          scarlet: "據說會從體毛釋放出\n雷電將周圍燒成焦土。\n具體詳情不明。"
          violet: "與超自然雜誌曾報導\n且掀起了短暫話題的\n雷公的祖先長得很像。"
