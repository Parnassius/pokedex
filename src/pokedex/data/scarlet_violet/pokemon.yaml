      descriptions:
        jp_kana:
          scarlet: "￹人見知￺ひとみし￻りしない　￹性格￺せいかく￻なので\n￹人間￺にんげん￻の　￹前￺まえ￻でも　マイペース。\nエサを　あげると　すぐ　￹懐￺なつ￻くよ。"
          violet: "￹季節￺きせつ￻で　￹匂￺にお￻いも　￹変化￺へんか￻する。\nこの￹姿￺すがた￻の　シキジカは　しっとり\n￹甘￺あま￻く　￹鼻￺はな￻に　￹残￺のこ￻る　￹香￺かお￻りだ。"
        jp_kanji:
          scarlet: "￹人見知￺ひとみし￻りしない　￹性格￺せいかく￻なので\n￹人間￺にんげん￻の　￹前￺まえ￻でも　マイペース。\nエサを　あげると　すぐ　￹懐￺なつ￻くよ。"
          violet: "￹季節￺きせつ￻で　￹匂￺にお￻いも　￹変化￺へんか￻する。\nこの￹姿￺すがた￻の　シキジカは　しっとり\n￹甘￺あま￻く　￹鼻￺はな￻に　￹残￺のこ￻る　￹香￺かお￻りだ。"
        en:
          scarlet: "These Pokémon are not shy—they will behave as\nthey please, even in front of people. If you feed\none of them, it will quickly take a liking to you."
          violet: "Deerling have different scents depending on the\nseason. In this form, Deerling have a softly sweet\nscent that lingers in the nose."
        fr:
          scarlet: "Peu farouche, il n’hésite pas à faire ce qui\nlui plaît, même en présence d’êtres humains.\nIl s’attache à quiconque le nourrit."
          violet: "Son odeur varie selon les saisons. Le parfum\nd’un spécimen sous sa Forme Automne est\nlégèrement sucré et reste longtemps dans le nez."
        it:
          scarlet: "Non è timido e si trova a suo agio anche davanti\nagli esseri umani. Basta dargli da mangiare\nperché si affezioni."
          violet: "Il suo odore cambia con le stagioni. In questa\nforma, Deerling ha un profumo dolciastro e\npersistente."
        de:
          scarlet: "Da es nicht schüchtern ist, fühlt es sich auch in\nGegenwart von Menschen wohl. Wenn man es\nfüttert, freundet es sich sofort mit einem an."
          violet: "Sein Geruch ändert sich mit der Jahreszeit.\nDer Duft eines Sesokitz in dieser Form ist\nangenehm süß und verweilt in der Nase."
        es:
          scarlet: "No es nada tímido y hace lo que quiere incluso\ndelante de la gente. Se encariña enseguida con\nquien le da de comer."
          violet: "Su fragancia cambia según la estación. En esta\nforma, Deerling emite una fragancia tenue y\ndulce que persiste en la nariz."
        ko:
          scarlet: "낯을 가리지 않는 성격이라\n인간이 앞에 있어도 눈치 보지 않는다.\n먹이를 주면 금방 친해질 수 있다."
          violet: "계절에 따라 냄새도 변한다.\n이 모습의 사철록은 촉촉하면서도\n달콤하게 코를 감도는 냄새가 난다."
        zh_simp:
          scarlet: "它拥有毫不怕生的性格，\n因此在人类面前也是我行我素。\n只要给它食物就能立刻拉近关系。"
          violet: "随着季节流动，气味也会变化。\n这个样子的四季鹿散发的气味\n柔和香甜，会残留在鼻腔中。"
        zh_trad:
          scarlet: "毫不怕生的性格使牠在人類\n面前也是我行我素。只要給牠\n食物，就能立刻與牠拉近關係。"
          violet: "隨著季節，氣味也會有變化。\n這個樣子的四季鹿散發的氣味\n香甜濃郁，會持續蔓延在鼻內。"
    deerling_winter_form:
