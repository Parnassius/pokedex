      hidden_ability: plus
      descriptions:
        jp_kana:
          scarlet: "￹尻尾￺しっぽ￻の　￹灯￺あか￻りは　￹遠￺とお￻くまで\n￹届￺とど￻くので　￹昔￺むかし￻より　かがり￹火￺び￻として\n￹大事￺だいじ￻に　されている。"
          violet: "￹暗￺くら￻くなると　￹眩￺まぶ￻しく　￹輝￺かがや￻く\n￹尻尾￺しっぽ￻の　￹灯￺あか￻りは　￹遠￺とお￻く　￹離￺はな￻れた\n￹海￺うみ￻の￹上￺うえ￻からでも　￹見￺み￻つけられる。"
        jp_kanji:
          scarlet: "￹尻尾￺しっぽ￻の　￹灯￺あか￻りは　￹遠￺とお￻くまで\n￹届￺とど￻くので　￹昔￺むかし￻より　かがり￹火￺び￻として\n￹大事￺だいじ￻に　されている。"
          violet: "￹暗￺くら￻くなると　￹眩￺まぶ￻しく　￹輝￺かがや￻く\n￹尻尾￺しっぽ￻の　￹灯￺あか￻りは　￹遠￺とお￻く　￹離￺はな￻れた\n￹海￺うみ￻の￹上￺うえ￻からでも　￹見￺み￻つけられる。"
        en:
          scarlet: "The bright light on its tail can be seen far\naway. It has been treasured since ancient\ntimes as a beacon."
          violet: "When it gets dark, the light from its bright,\nshiny tail can be seen from far away on the\nocean’s surface."
        fr:
          scarlet: "La lumière vive sur sa queue est visible de loin.\nLes êtres humains le tiennent en haute estime,\ncar sa lumière les guide depuis les temps anciens."
          violet: "Quand la nuit tombe, on peut voir le bout\nde sa queue briller intensément, même loin\nau large des côtes."
        it:
          scarlet: "La luce che ha sulla coda è visibile da molto\nlontano. Da sempre funge da faro."
          violet: "Di notte, la luce intensa e lampeggiante\ndella coda si può vedere sull’oceano da\nmolto lontano."
        de:
          scarlet: "Das helle Licht an seiner Schwanzspitze ist von\nWeitem zu sehen. Es wird daher von alters her\nals Leuchtfeuer geschätzt."
          violet: "Bei Dunkelheit sieht man das helle Licht an\nseinem Schwanz von Weitem über das Meer\nscheinen."
        es:
          scarlet: "El brillo de su cola es visible desde lejos. En la\nantigüedad, se usaba mucho como faro."
          violet: "Al anochecer, la luz intensa que se desprende\ndel extremo de su cola puede apreciarse desde\nmuy lejos en la superficie del océano."
        ko:
          scarlet: "꼬리의 빛은 멀리까지\n전해지기 때문에 예전부터\n봉화 역할로서 중요하게 여겨지고 있다."
          violet: "어두워지면 눈부시게 빛나는\n꼬리의 빛은 멀리 떨어진\n바다 위에서도 볼 수 있다."
        zh_simp:
          scarlet: "尾巴上的光能传到远处，\n因此从很早以前就被\n当作篝火而受到重视。"
          violet: "每当天色变暗，尾巴就会\n发出耀眼的光辉，即使是\n从遥远的海上也能被发现。"
        zh_trad:
          scarlet: "尾巴的亮光能傳得很遠，\n一直以來都被當成篝火，\n受到人們的重視。"
          violet: "每當天色一暗，尾巴就會\n發出刺眼的光輝，即使是\n從遙遠的海上也能發現到。"
