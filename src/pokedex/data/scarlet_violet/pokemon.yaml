      descriptions:
        jp_kana:
          scarlet: "￹毒￺どく￻の　￹汗￺あせ￻を　ほとばしらせながら\n￹電気￺でんき￻を　￹放￺はな￻つとき　あたりに\nギターのような　メロディが　￹響￺ひび￻く。"
          violet: "￹荒々￺あらあら￻しく　￹胸￺むな￻もとの　￹突起￺とっき￻を\nかき￹鳴￺な￻らして　￹放￺はな￻つ　￹電撃￺でんげき￻は\n１５０００ボルトを　￹軽￺かる￻く　￹超￺こ￻える。"
        jp_kanji:
          scarlet: "￹毒￺どく￻の　￹汗￺あせ￻を　ほとばしらせながら\n￹電気￺でんき￻を　￹放￺はな￻つとき　あたりに\nギターのような　メロディが　￹響￺ひび￻く。"
          violet: "￹荒々￺あらあら￻しく　￹胸￺むな￻もとの　￹突起￺とっき￻を\nかき￹鳴￺な￻らして　￹放￺はな￻つ　￹電撃￺でんげき￻は\n１５０００ボルトを　￹軽￺かる￻く　￹超￺こ￻える。"
        en:
          scarlet: "As it scatters toxic sweat and emits electricity,\na melody that sounds like it came from a guitar\nreverberates through the surrounding area."
          violet: "The jolts of electricity it launches by violently\nstrumming the protrusions on its chest easily\nexceed 15,000 volts."
        fr:
          scarlet: "Lorsqu’il génère de l’électricité tout en projetant\nsa sueur toxique, on entend une mélodie qui\nressemble à celle d’une guitare."
          violet: "Les décharges électriques qu’il envoie lorsqu’il\ngratte furieusement les excroissances sur son torse\ndépassent sans problème les 15 000 volts."
        it:
          scarlet: "Quando secerne il suo sudore velenoso mentre\nrilascia elettricità, diffonde intorno una melodia\nche ricorda il suono di una chitarra."
          violet: "Le scariche elettriche che genera sfregando\nviolentemente le protuberanze che ha sul petto\npossono superare facilmente i 15.000 volt."
        de:
          scarlet: "Wenn es Elektrizität absondert und dabei giftigen\nSchweiß verspritzt, so erklingt in der Umgebung\neine Melodie wie von einer Gitarre."
          violet: "Durch wildes Kratzen an seinem Brustfortsatz\nerzeugt es Stromstöße, die mit Leichtigkeit eine\nStärke von 15 000 Volt übersteigen."
        es:
          scarlet: "Cuando segrega su sudor venenoso a la vez que\nlibera electricidad, reverbera a su alrededor un\nsonido que recuerda al de una guitarra."
          violet: "Cuando rasga con fuerza las protuberancias\nque tiene en el pecho, libera unas descargas\nque superan con facilidad los 15 000 V."
        ko:
          scarlet: "독성을 띠는 땀을 흘리면서\n전기를 방출할 때\n주위에 기타 소리 같은 멜로디가 들린다."
          violet: "거칠게 가슴팍의 돌기를 긁어서\n발산하는 전격은\n15000볼트를 가볍게 뛰어넘는다."
        zh_simp:
          scarlet: "当它一边排出带毒的汗水\n一边放电时，周围会响起\n仿佛吉他般的旋律。"
          violet: "会凶暴地弹奏胸部的突起物。\n弹奏时释放出的电击\n可轻易超过１５０００伏特。"
        zh_trad:
          scarlet: "當牠一邊排出毒汗一邊\n放電的時候，周圍會響起\n如同吉他般的旋律。"
          violet: "會激烈地彈奏胸部的突起物。\n彈奏時釋放出的電擊，\n可以輕易超過１５０００伏特。"
    toxtricity_low_key_form:
