      descriptions:
        jp_kana:
          scarlet: "￹日差￺ひざ￻しを　￹浴￺あ￻びるのが　￹大好￺だいす￻き。\n￹頭￺あたま￻の　￹葉￺は￻っぱを　￹使￺つか￻って\n￹暖￺あたた￻かい　￹場所￺ばしょ￻を　￹探￺さが￻す。"
          violet: "いい　￹香￺かお￻りの　￹葉￺は￻っぱは\nまわりの　￹湿度￺しつど￻や　￹温度￺おんど￻を\n￹探￺さぐ￻る　￹能力￺のうりょく￻を　￹持￺も￻っている。"
        jp_kanji:
          scarlet: "￹日差￺ひざ￻しを　￹浴￺あ￻びるのが　￹大好￺だいす￻き。\n￹頭￺あたま￻の　￹葉￺は￻っぱを　￹使￺つか￻って\n￹暖￺あたた￻かい　￹場所￺ばしょ￻を　￹探￺さが￻す。"
          violet: "いい　￹香￺かお￻りの　￹葉￺は￻っぱは\nまわりの　￹湿度￺しつど￻や　￹温度￺おんど￻を\n￹探￺さぐ￻る　￹能力￺のうりょく￻を　￹持￺も￻っている。"
        en:
          scarlet: "It loves to bask in the sunlight. It uses the leaf on\nits head to seek out warm places."
          violet: "Its pleasantly aromatic leaf has the ability to\ncheck the humidity and temperature of the\narea around it."
        fr:
          scarlet: "Il aime prendre des bains de soleil, et il se sert\nde la feuille sur sa tête pour repérer les endroits\nchauds."
          violet: "Sa feuille à l’arôme agréable a le pouvoir\nde déterminer la température et l’humidité\nde son environnement."
        it:
          scarlet: "Ama crogiolarsi al sole. Usa la foglia che\nha sulla testa per cercare luoghi tiepidi."
          violet: "La sua foglia piacevolmente profumata può\nrilevare l’umidità e la temperatura circostanti."
        de:
          scarlet: "Es liegt gerne in der Sonne. Mithilfe des Blattes\nauf seinem Kopf findet es warme Orte."
          violet: "Mit seinem aromatischen Blatt ist es in der Lage,\ndie Temperatur und die Luftfeuchtigkeit seiner\nUmgebung zu messen."
        es:
          scarlet: "Le encanta tomar el sol. Usa la hoja que tiene en\nla cabeza para localizar sitios cálidos."
          violet: "Su hoja aromática puede medir la humedad\ny la temperatura a su alrededor."
        ko:
          scarlet: "햇볕을 쬐는 것을 매우 좋아한다.\n머리의 잎사귀를 사용해서\n따뜻한 장소를 찾아낸다."
          violet: "좋은 향기가 나는 잎사귀는\n주변의 습도나 온도를\n탐지하는 능력을 지니고 있다."
        zh_simp:
          scarlet: "非常喜欢沐浴阳光。\n会用头上的叶子来\n寻找温暖的地方。"
          violet: "带有香味的叶子\n拥有能感知周围的\n湿度和温度的能力。"
        zh_trad:
          scarlet: "最喜歡沐浴在陽光下。\n會用頭上的葉子\n尋找溫暖的地方。"
          violet: "帶有香氣的葉子\n具有能夠感知周圍\n濕度與溫度的能力。"
