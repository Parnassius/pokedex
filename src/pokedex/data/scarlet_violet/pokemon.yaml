      descriptions:
        jp_kana:
          scarlet: "￹口￺くち￻に　￹入￺はい￻る　￹大￺おお￻きさの　ものなら\nなんでも　￹丸呑￺まるの￻み。　￹特殊￺とくしゅ￻な\n￹胃液￺いえき￻で　なんでも　￹消化￺しょうか￻する。"
          violet: "タイヤも　ひと￹口￺くち￻で　￹丸呑￺まるの￻み。\n￹体￺からだ￻の　￹毛穴￺けあな￻から　￹猛毒￺もうどく￻の\n￹体液￺たいえき￻を　￹分泌￺ぶんぴつ￻する。"
        jp_kanji:
          scarlet: "￹口￺くち￻に　￹入￺はい￻る　￹大￺おお￻きさの　ものなら\nなんでも　￹丸呑￺まるの￻み。　￹特殊￺とくしゅ￻な\n￹胃液￺いえき￻で　なんでも　￹消化￺しょうか￻する。"
          violet: "タイヤも　ひと￹口￺くち￻で　￹丸呑￺まるの￻み。\n￹体￺からだ￻の　￹毛穴￺けあな￻から　￹猛毒￺もうどく￻の\n￹体液￺たいえき￻を　￹分泌￺ぶんぴつ￻する。"
        en:
          scarlet: "It gulps anything that fits in its mouth.\nIts special enzymes can dissolve anything."
          violet: "It can swallow a tire whole in one gulp.\nIt secretes a horribly toxic fluid from the\npores on its body."
        fr:
          scarlet: "Il avale en une bouchée tout ce qui rentre dans\nsa bouche. Ses sucs digestifs spéciaux peuvent\ndissoudre n’importe quoi."
          violet: "Ce Pokémon est capable d’avaler un pneu\nentier d’une seule bouchée. Ses pores sécrètent\nun horrible fluide toxique."
        it:
          scarlet: "Inghiotte qualunque cosa che possa infilarsi\nin bocca. Non c’è nulla che i suoi succhi\ngastrici speciali non riescano a digerire."
          violet: "Può ingoiare uno pneumatico in un sol\nboccone. Secerne un liquido incredibilmente\ntossico da tutti i pori del corpo."
        de:
          scarlet: "Es verschluckt, was in sein Maul passt, und\nverdaut es mit seiner alles zersetzenden\nMagensäure."
          violet: "Es kann einen ganzen Reifen auf einmal\nverschlingen. Seine Poren sondern eine äußerst\ngiftige Flüssigkeit ab."
        es:
          scarlet: "Se traga todo lo que le quepa en su enorme\nboca. Sus jugos gástricos pueden digerir\ncualquier cosa."
          violet: "Es capaz de tragarse un neumático sin\nmasticarlo. Segrega un fluido tremendamente\ntóxico por los poros."
        ko:
          scarlet: "입에 들어가는 크기의 것이라면\n무엇이든 통째로 삼킨다.\n특수한 위액으로 무엇이든 소화한다."
          violet: "타이어도 한입에 꿀꺽 삼켜 버린다.\n모공에서 맹독성의 액체를 분비한다."
        zh_simp:
          scarlet: "只要是大小可以放进嘴里的东西，\n不管是什么都会整个吞下。\n能靠特殊的胃液消化任何东西。"
          violet: "即使是轮胎也能整个吞掉。\n会从身上的毛孔分泌出\n带有剧毒的体液。"
        zh_trad:
          scarlet: "只要是可以放進嘴裡的大小，\n不管是什麼都會整個吞下。\n能靠特殊的胃液消化任何東西。"
          violet: "就連輪胎都是整個吞掉。\n會從身上的毛孔分泌出\n帶有劇毒的體液。"
