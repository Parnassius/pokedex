          scarlet: "￹古￺ふる￻い　￹本￺ほん￻で　チヲハウハネと\n￹紹介￺しょうかい￻されている　￹生物￺せいぶつ￻に\n￹似￺に￻た￹点￺てん￻が　ある　￹謎￺なぞ￻のポケモン。"
          violet: "￹怪￺あや￻しい　￹雑誌￺ざっし￻が　￹紹介￺しょうかい￻した\nウルガモスの　￹太古￺たいこ￻の　￹姿￺すがた￻と\n￹若干￺じゃっかん￻　￹似￺に￻ている　ポケモンだ。"
        en:
          scarlet: "This mysterious Pokémon has some similarities\nto a creature that an old book introduced as\nSlither Wing."
          violet: "This Pokémon somewhat resembles an ancient\nform of Volcarona that was introduced in a\ndubious magazine."
        fr:
          scarlet: "Ce Pokémon mystérieux présente des similitudes\navec Rampe-Ailes, une créature évoquée dans\nun livre ancien."
          violet: "Il ressemble vaguement à une forme de Pyrax\ntrès ancienne évoquée dans une revue douteuse."
        it:
          scarlet: "Un Pokémon enigmatico che ha degli aspetti\nin comune con una creatura presentata come\n\"Alirasenti\" in un vecchio libro."
          violet: "Ha una leggera somiglianza con un’antichissima\nforma di Volcarona presentata in una rivista\ndi dubbia attendibilità."
        de:
          scarlet: "Dieses rätselhafte Pokémon weist Ähnlichkeit\nmit einer Kreatur auf, die in einem alten Buch\nals Kriechflügel vorgestellt wurde."
          violet: "Dieses Pokémon hat eine gewisse Ähnlichkeit\nmit einer uralten Form von Ramoth, die in einer\nfragwürdigen Zeitschrift vorgestellt wurde."
        es:
          scarlet: "Un misterioso Pokémon que presenta ciertas\nsimilitudes con Reptalada, una criatura descrita\nen un tomo antiguo."
          violet: "Guarda un ligero parecido con un supuesto\nantepasado de Volcarona publicado en cierta\nrevista de dudosa veracidad."
        ko:
          scarlet: "오래된 책에 “땅을기는날개”라는 이름으로\n소개된 생물과 닮은 점이 있는\n정체불명의 포켓몬."
          violet: "괴상한 잡지에서 소개했던\n불카모스의 태곳적 모습과\n약간 비슷하게 생긴 포켓몬이다."
        zh_simp:
          scarlet: "这只神秘的宝可梦\n与古老的书中介绍的\n名为爬地翅的生物有相似点。"
          violet: "这只宝可梦与可疑的杂志\n曾介绍的火神蛾太古时代的\n样子长得有点像。"
        zh_trad:
          scarlet: "與古老書籍裡介紹的一種\n叫做爬地翅的生物有著\n相似點的神秘寶可夢。"
          violet: "與可疑的雜誌介紹的\n火神蛾太古時代的樣子\n長得有點像的寶可夢。"
