          scarlet: "￹勇敢￺ゆうかん￻で　￹向￺む￻こう￹見￺み￻ずな　￹気質￺きしつ￻。\n￹目￺め￻の　まわりの　￹白￺しろ￻い　￹模様￺もよう￻は\n￹気弱￺きよわ￻な　ポケモンを　￹怯￺ひる￻ませる。"
          violet: "メスは　オスより　￹神経質￺しんけいしつ￻。\n￹羽￺はね￻を　￹汚￺よご￻されると　￹烈火￺れっか￻のごとく\n￹怒￺おこ￻り　くちばしで　つつきまくる。"
        jp_kanji:
          scarlet: "￹勇敢￺ゆうかん￻で　￹向￺む￻こう￹見￺み￻ずな　￹気質￺きしつ￻。\n￹目￺め￻の　まわりの　￹白￺しろ￻い　￹模様￺もよう￻は\n￹気弱￺きよわ￻な　ポケモンを　￹怯￺ひる￻ませる。"
          violet: "メスは　オスより　￹神経質￺しんけいしつ￻。\n￹羽￺はね￻を　￹汚￺よご￻されると　￹烈火￺れっか￻のごとく\n￹怒￺おこ￻り　くちばしで　つつきまくる。"
        en:
          scarlet: "This Pokémon is brave and reckless. The white\nmarkings around a Rookidee’s eyes intimidate\nfainthearted Pokémon."
          violet: "The females are fussier than the males. If another\ncreature dirties a female Rookidee’s wings, it’ll\npeck the offender relentlessly in a burning rage."
        fr:
          scarlet: "Ce Pokémon est aussi courageux que téméraire.\nLe motif blanc autour de ses yeux a pour but\nd’intimider ses adversaires les plus craintifs."
          violet: "Les femelles sont plus susceptibles que les mâles.\nSi l’on salit leurs ailes, elles se mettent dans une\ncolère noire et donnent de furieux coups de bec."
        it:
          scarlet: "È un Pokémon coraggioso e temerario.\nIl motivo bianco che ha sotto gli occhi intimorisce\ni Pokémon più paurosi."
          violet: "Le femmine sono molto più pignole dei maschi.\nSe qualcuno osa sporcare le loro ali perdono il\ncontrollo e beccano furiosamente il responsabile."
        de:
          scarlet: "Dieses Pokémon ist ebenso tapfer wie tollkühn.\nDie weiße Musterung um seine Augen schüchtert\nängstliche Pokémon ein."
          violet: "Weibliche Meikro sind deutlich empfindlicher als\nmännliche. Beschmutzt jemand ihre Flügel, picken\nsie ihn wutentbrannt mit dem Schnabel nieder."
        es:
          scarlet: "Es de carácter valiente y temerario. Las marcas\nblancas que tiene alrededor de los ojos le sirven\npara espantar a los Pokémon más miedosos."
          violet: "Las hembras son más susceptibles que los\nmachos y acribillarán a picotazos en un arrebato\nde furia a todo aquel que les manche las alas."
        ko:
          scarlet: "용감하고 저돌적인 성질을 가졌다.\n눈가의 하얀 무늬는\n마음 약한 포켓몬을 기죽게 한다."
          violet: "암컷은 수컷보다 신경질적이다.\n깃털이 더러워지면 불같이 화를 내며\n부리로 쪼고 다닌다."
        zh_simp:
          scarlet: "性格勇敢，冒失莽撞。\n眼睛周围的白色花纹\n会让懦弱的宝可梦感到畏惧。"
          violet: "雌性比雄性更加神经质。\n一旦羽毛被弄脏了，就会\n怒火中烧地用鸟嘴猛啄。"
        zh_trad:
          scarlet: "性情勇敢，魯莽衝動。\n眼睛周圍的白色花紋\n會讓懦弱的寶可夢感到畏懼。"
          violet: "雌性比雄性還要神經質。\n一旦羽毛被弄髒了，\n就會滿腔怒火地用鳥嘴猛啄。"
