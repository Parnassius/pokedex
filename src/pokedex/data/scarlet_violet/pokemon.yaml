          scarlet: "ふかふかの　￹体毛￺たいもう￻の　おかげで\n￹炎￺ほのお￻エネルギーを　￹温￺あたた￻めやすく\nさらに　￹強￺つよ￻い　￹炎￺ほのお￻を　￹出￺だ￻せる。"
          violet: "￹多彩￺たさい￻な　キック￹技￺わざ￻が　￹自慢￺じまん￻だが\n￹炎￺ほのお￻で　￹熱￺あつ￻くなった　￹額￺ひたい￻で\n￹繰￺く￻り￹出￺だ￻す　￹頭突￺ずつ￻きも　￹強力￺きょうりょく￻。"
        jp_kanji:
          scarlet: "ふかふかの　￹体毛￺たいもう￻の　おかげで\n￹炎￺ほのお￻エネルギーを　￹温￺あたた￻めやすく\nさらに　￹強￺つよ￻い　￹炎￺ほのお￻を　￹出￺だ￻せる。"
          violet: "￹多彩￺たさい￻な　キック￹技￺わざ￻が　￹自慢￺じまん￻だが\n￹炎￺ほのお￻で　￹熱￺あつ￻くなった　￹額￺ひたい￻で\n￹繰￺く￻り￹出￺だ￻す　￹頭突￺ずつ￻きも　￹強力￺きょうりょく￻。"
        en:
          scarlet: "Thanks to its soft and fluffy fur, Raboot can easily\nheat up its fire energy and produce flames with\nmore power."
          violet: "While it prides itself on its varied kicking moves,\nit can also deliver powerful headbutts once its\nflames have heated up its forehead."
        fr:
          scarlet: "Son pelage doux et épais lui permet de mobiliser\nfacilement son énergie incandescente, et ainsi de\nproduire des flammes encore plus puissantes."
          violet: "Sa maîtrise des différents types de coups de pied\nfait sa fierté, mais les coups de tête qu’il assène\nquand son front est brûlant sont aussi ravageurs."
        it:
          scarlet: "Grazie alla folta pelliccia, riesce a scaldare\nfacilmente l’energia Fuoco e quindi a sprigionare\nfiamme ancora più potenti."
          violet: "Va fiero del suo ricco repertorio di mosse basate\nsui calci, ma le testate che sferra con la fronte\narroventata sono altrettanto temibili."
        de:
          scarlet: "Dank seines flauschigen Fells kann es leichter\nFeuer-Energie aufbauen und dadurch noch\nheißere Flammen ausstoßen."
          violet: "Vielfältige Tritt-Attacken sind sein ganzer Stolz,\naber ein Stoß mit seiner Stirn, die durch sein\nFeuer erhitzt wurde, hat es ebenfalls in sich."
        es:
          scarlet: "Su suave pelaje le permite calentar energía ígnea\ncon mayor facilidad y así expulsar llamas todavía\nmás potentes."
          violet: "Se enorgullece de sus variadas técnicas con los\npies, pero, cuando su frente se calienta por las\nllamas, también propina tremendos cabezazos."
        ko:
          scarlet: "푹신푹신한 털 덕분에\n불꽃 에너지의 온도를 올리기 쉬워져서\n더욱 강한 불꽃을 내보낼 수 있다."
          violet: "다채로운 킥 기술을 자랑하지만\n불꽃에 의해 뜨거워진 이마로 부딪치는\n박치기도 상당히 강력하다."
        zh_simp:
          scarlet: "蓬松的体毛让它更容易\n提升火之能量的温度，\n放出更强的火焰。"
          violet: "擅长丰富多彩的踢技，\n但利用因火焰而变热的额头\n使出的头锤也十分强劲。"
        zh_trad:
          scarlet: "蓬鬆的體毛幫助牠更容易\n提升火之能量的溫度，\n釋放出更強的火焰。"
          violet: "以自己多彩多姿的踢技為傲，\n但利用因火焰而變熱的額頭\n使出的頭錘也十分強勁。"
