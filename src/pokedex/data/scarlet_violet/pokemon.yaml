      descriptions:
        jp_kana:
          scarlet: "アシレーヌにとって　￹戦￺たたか￻いは\nステージ。　￹華麗￺かれい￻に　￹歌￺うた￻って\n￹舞￺ま￻い￹踊￺おど￻り　￹獲物￺えもの￻を　￹仕留￺しと￻める。"
          violet: "￹歌姫￺うたひめ￻の　￹異名￺いみょう￻を　￹持￺も￻つ。\n￹月夜￺つきよ￻の　￹晩￺ばん￻に　￹群￺む￻れを　￹率￺ひき￻いて\n￹歌￺うた￻う　￹姿￺すがた￻は　￹幻想的￺げんそうてき￻。"
        jp_kanji:
          scarlet: "アシレーヌにとって　￹戦￺たたか￻いは\nステージ。　￹華麗￺かれい￻に　￹歌￺うた￻って\n￹舞￺ま￻い￹踊￺おど￻り　￹獲物￺えもの￻を　￹仕留￺しと￻める。"
          violet: "￹歌姫￺うたひめ￻の　￹異名￺いみょう￻を　￹持￺も￻つ。\n￹月夜￺つきよ￻の　￹晩￺ばん￻に　￹群￺む￻れを　￹率￺ひき￻いて\n￹歌￺うた￻う　￹姿￺すがた￻は　￹幻想的￺げんそうてき￻。"
        en:
          scarlet: "To Primarina, every battle is a stage. It takes\ndown its prey with beautiful singing and dancing."
          violet: "Also known as a songstress, it is a sight to\nbehold on moonlit nights when it sings in\nfront of the colony it leads."
        fr:
          scarlet: "Pour Oratoria, le combat est une performance\nartistique. Ce Pokémon chante et danse avec\nprestance pour abattre ses proies."
          violet: "On surnomme ce Pokémon « la diva ». Il dirige\nles siens en chantant à la lumière de la lune,\noffrant ainsi un spectacle enchanteur."
        it:
          scarlet: "Per Primarina la lotta è uno show.\nDà il colpo di grazia alla sua preda\ncantando e piroettando con eleganza."
          violet: "Il suo soprannome è \"principessa del canto\". Lo\nspettacolo canoro in cui si esibisce conducendo il\nsuo gruppo al chiaro di luna è da sogno."
        de:
          scarlet: "Für Primarene ist jeder Kampf wie eine\nAufführung. Es erlegt seine Beute durch\nanmutiges Singen und Tanzen."
          violet: "Der Anblick, wenn es in mondhellen Nächten\nsingt und seine Kolonie anführt, ist magisch.\nEs wird auch Primadonna genannt."
        es:
          scarlet: "Primarina considera los combates como un\nescenario ideal donde abatir a su presa con\nun canto y baile que derrochan elegancia."
          violet: "Recibe el sobrenombre de Diva. El espectáculo\nque ofrece al liderar a la colonia con su canto a\nla luz de la luna es absolutamente primoroso."
        ko:
          scarlet: "누리레느에게 싸움은 스테이지다.\n화려하게 노래하고 춤을 추며\n먹이의 숨통을 끊는다."
          violet: "가희라는 별명을 가졌다.\n달이 뜨는 밤에 무리를 이끌고\n노래하는 모습은 환상적이다."
        zh_simp:
          scarlet: "对于西狮海壬来说，战斗就是舞台。\n华丽地唱着歌跳着舞，给猎物致命一击。"
          violet: "拥有歌姬这个别名。\n在月夜率领群体唱歌的样子\n充满了幻想色彩。"
        zh_trad:
          scarlet: "對西獅海壬來說，戰鬥就是\n表演的舞台，牠會在華麗地\n唱歌跳舞的同時給予獵物致命一擊。"
          violet: "擁有歌姬的別名。\n在月夜裡率領群體歌唱\n的樣子充滿了幻想色彩。"
