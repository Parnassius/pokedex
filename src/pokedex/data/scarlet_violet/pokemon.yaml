          violet: "サイコパワーで　￹小石￺こいし￻を　￹並￺なら￻べて\n￹星座￺せいざ￻を　￹作￺つく￻る。　￹宇宙￺うちゅう￻から\n￹来￺き￻たと　￹考￺かんが￻える　￹人￺ひと￻も　いる。"
        jp_kanji:
          scarlet: "￹催眠術￺さいみんじゅつ￻で　￹子￺こ￻どもを　￹眠￺ねむ￻らせ\n￹連￺つ￻れ￹去￺さ￻ってしまう。　￹星明￺ほしあか￻りが\nきらめく　￹夜￺よる￻には　￹注意￺ちゅうい￻しろ。"
          violet: "サイコパワーで　￹小石￺こいし￻を　￹並￺なら￻べて\n￹星座￺せいざ￻を　￹作￺つく￻る。　￹宇宙￺うちゅう￻から\n￹来￺き￻たと　￹考￺かんが￻える　￹人￺ひと￻も　いる。"
        en:
          scarlet: "This Pokémon will hypnotize children to put them\nto sleep before carrying them away. Be wary of\nnights when the starlight is bright."
          violet: "Using its psychic power, it arranges pebbles to\nform the shapes of constellations. Some people\nbelieve this Pokémon came from outer space."
        fr:
          scarlet: "Il hypnotise les enfants avant de les emporter.\nIl est recommandé de bien faire attention\nlors des nuits étoilées."
          violet: "Il aligne de petits cailloux avec ses pouvoirs\npsychiques pour recréer des constellations.\nCertains pensent qu’il vient d’un autre monde."
        it:
          scarlet: "Addormenta i bambini con l’ipnosi e li porta via\ncon sé. Quando le stelle del cielo rischiarano\nla notte, la prudenza non è mai troppa."
          violet: "Allinea dei sassi con i suoi poteri psichici per\nricreare le costellazioni. Alcuni pensano che\nvenga dallo spazio."
        de:
          scarlet: "Es lullt Kinder mittels Hypnose in den Schlaf und\nentführt sie. In sternklaren Nächten ist besondere\nVorsicht geboten."
          violet: "Mit seinen Psycho-Kräften ordnet es Kieselsteine\nzu Sternbildern an. Manche Menschen glauben,\nes sei aus dem Weltall gekommen."
        es:
          scarlet: "Adormece a los niños mediante hipnosis y se\nlos lleva consigo. Conviene tener cuidado en\nlas noches estrelladas."
          violet: "Usa su poder psíquico para disponer pequeños\nguijarros en forma de constelaciones. Algunos\ncreen que procede del espacio exterior."
        ko:
          scarlet: "아이를 최면술로 재우고는\n데려가 버리기 때문에\n별이 빛나는 밤에는 주의해야 한다."
          violet: "사이코 파워로 조약돌을 움직여서\n별자리를 만든다.\n우주에서 왔다고 여기는 사람도 있다."
        zh_simp:
          scarlet: "一定要当心星光闪耀的夜晚。\n因为它会使用催眠术\n让小孩睡着并把对方带走。"
          violet: "会使用精神力量把小石子\n排列成星座的形状。\n有些人认为它是从宇宙来的。"
        zh_trad:
          scarlet: "一定要小心星光閃閃的夜晚。\n因為牠會帶走被牠施了\n催眠術而睡著的小孩。"
          violet: "會使用精神力量把小石子\n排列成星座的形狀。\n有些人認為牠是從宇宙來的。"
gothitelle:
  species_id: 576
