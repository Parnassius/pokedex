          scarlet: "￹生￺う￻まれてから　￹数億年￺すうおくねん￻の￹間￺あいだ￻\n￹地底￺ちてい￻で　￹眠￺ねむ￻っていた。\n￹洞窟￺どうくつ￻を　￹掘￺ほ￻ると　たまに　￹出￺で￻てくる。"
          violet: "￹高温￺こうおん￻　￹高圧￺こうあつ￻の　￹地下深￺ちかふか￻くで\n￹生￺う￻まれる。　￹宝石￺ほうせき￻の　￹部分￺ぶぶん￻から\nビームを　￹放￺はな￻ち　￹身￺み￻を　￹守￺まも￻るぞ。"
        jp_kanji:
          scarlet: "￹生￺う￻まれてから　￹数億年￺すうおくねん￻の￹間￺あいだ￻\n￹地底￺ちてい￻で　￹眠￺ねむ￻っていた。\n￹洞窟￺どうくつ￻を　￹掘￺ほ￻ると　たまに　￹出￺で￻てくる。"
          violet: "￹高温￺こうおん￻　￹高圧￺こうあつ￻の　￹地下深￺ちかふか￻くで\n￹生￺う￻まれる。　￹宝石￺ほうせき￻の　￹部分￺ぶぶん￻から\nビームを　￹放￺はな￻ち　￹身￺み￻を　￹守￺まも￻るぞ。"
        en:
          scarlet: "It has slept underground for hundreds of millions\nof years since its birth. It’s occasionally found\nduring the excavation of caves."
          violet: "Born from the high temperatures and pressures\ndeep underground, it defends itself by firing\nbeams from the jewel part of its body."
        fr:
          scarlet: "Ils sommeillent sous terre pendant des centaines\nde millions d’années après leur naissance.\nOn en trouve parfois en creusant des cavernes."
          violet: "Les Strassie naissent sous terre, où la pression et\nla chaleur sont élevées. Ils se défendent grâce à\nleurs gemmes, qui peuvent tirer des rayons laser."
        it:
          scarlet: "Dopo la nascita, dorme nelle viscere della terra\nper centinaia di milioni di anni. A volte se ne\ntrova qualche esemplare scavando nelle caverne."
          violet: "Nasce sottoterra in condizioni di pressione\ne temperatura estreme. Si difende emettendo\nraggi dalle gemme."
        de:
          scarlet: "Nach seiner Geburt brachte es hunderte Millionen\nvon Jahren tief unter der Erde schlafend zu.\nEs tritt gelegentlich bei Höhlengrabungen zutage."
          violet: "Druck und Hitze tiefster Erdschichten erzeugten\ndieses Pokémon. Zur Verteidigung schießt es\nStrahlen aus den Edelsteinen an seinem Körper."
        es:
          scarlet: "Aparece a veces al excavar en cuevas. Desde su\nnacimiento, lleva cientos de millones de años\ndurmiendo en las profundidades subterráneas."
          violet: "Nace en las profundidades subterráneas, a altas\ntemperaturas y a gran presión. Lanza rayos por\nsus gemas a modo de defensa."
        ko:
          scarlet: "태어나서 수억 년 동안\n땅속에 잠들어 있었다.\n동굴을 파면 가끔 나오곤 한다."
          violet: "고온 고압의 지하 깊은 곳에서\n태어난다. 보석 부분에서\n빔을 발사하여 몸을 지킨다."
        zh_simp:
          scarlet: "从出生开始，数亿年间\n一直都沉睡在地底。\n挖掘洞窟的话，偶尔会挖出它。"
          violet: "诞生于高温高压的地下深处。\n会从宝石的部分\n发射光线保护自身。"
        zh_trad:
          scarlet: "出生後的幾億年之間\n一直在地底下沉睡。\n挖掘洞窟時偶爾會挖到。"
          violet: "出生在高溫高壓的地底深處。\n從寶石的部分釋放光束\n保護身體。"
