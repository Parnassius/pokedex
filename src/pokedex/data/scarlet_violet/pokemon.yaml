          scarlet: "ある￹朝￺あさ￻　￹突然￺とつぜん￻　￹降￺ふ￻ってくる。\n￹弱￺よわ￻いのを　￹知￺し￻っており　￹進化￺しんか￻まで\nひたすら　￹栄養￺えいよう￻を　ためこむ。"
          violet: "とても　ひ￹弱￺よわ￻。　￹襲￺おそ￻われても\n￹葉￺は￻っぱを　￹必死￺ひっし￻に　￹振￺ふ￻りまわして\n￹追￺お￻い￹払￺はら￻うのが　やっとだ。"
        jp_kanji:
          scarlet: "ある￹朝￺あさ￻　￹突然￺とつぜん￻　￹降￺ふ￻ってくる。\n￹弱￺よわ￻いのを　￹知￺し￻っており　￹進化￺しんか￻まで\nひたすら　￹栄養￺えいよう￻を　ためこむ。"
          violet: "とても　ひ￹弱￺よわ￻。　￹襲￺おそ￻われても\n￹葉￺は￻っぱを　￹必死￺ひっし￻に　￹振￺ふ￻りまわして\n￹追￺お￻い￹払￺はら￻うのが　やっとだ。"
        en:
          scarlet: "It suddenly falls out of the sky in the morning.\nKnowing it’s weak, it simply feeds until it evolves."
          violet: "It is very weak. Its only means of defense is to\nshake its leaves desperately at its attacker."
        fr:
          scarlet: "Ce Pokémon tombe soudainement du ciel\nle matin. Conscient de sa faible constitution,\nil ne fait que se nourrir jusqu’à ce qu’il évolue."
          violet: "Il est très faible. Sa seule façon de se défendre\nest d’agiter désespérément ses feuilles."
        it:
          scarlet: "Cade improvvisamente giù dal cielo al mattino.\nSa di essere debole e cerca di nutrirsi al meglio\nin attesa di evolversi."
          violet: "È debolissimo. Se viene attaccato, non può fare\naltro che agitare disperatamente le foglie\nnel tentativo di scacciare via il nemico."
        de:
          scarlet: "Es fällt morgens plötzlich vom Himmel. Da es\nweiß, wie schwach es ist, sammelt es bis zu seiner\nEntwicklung nur Nährstoffe."
          violet: "Es ist sehr schwach und kann sich nur gegen\nFeinde verteidigen, indem es verzweifelt seine\nBlätter schüttelt."
        es:
          scarlet: "Cae de repente del cielo por las mañanas. Como\nsabe que es débil, solo se dedica a nutrirse hasta\nque evoluciona."
          violet: "Es débil. La única forma que tiene de defenderse\nes agitar las hojas con desesperación frente a su\nrival."
        ko:
          scarlet: "어느 날 아침 갑자기 떨어진다.\n약한 것을 알고 있어 진화까지\n한결같이 영양을 모은다."
          violet: "매우 약하다. 공격을 받아도\n잎사귀를 필사적으로 휘둘러서\n쫓아내는 것이 고작이다."
        zh_simp:
          scarlet: "会在某日清晨突然掉下来。\n对自己的弱小心知肚明，\n所以直到进化为止会不断积存养分。"
          violet: "非常弱小。即使受到攻击，\n也只能拼命挥动着叶子\n来勉强赶走敌人。"
        zh_trad:
          scarlet: "會在某個早晨突然掉下來。\n對自己的弱小心知肚明，所以會\n不停儲存養分直到進化為止。"
          violet: "十分弱小。即使遭到攻擊，\n也只能勉勉強強地靠著\n拼命揮舞葉子來趕走敵人。"
