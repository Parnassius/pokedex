          violet: "￹流￺なが￻れの　￹静￺しず￻かな　￹川￺かわ￻や\n￹湖￺みずうみ￻を　￹好￺この￻んでいる。\n￹泳￺およ￻ぐ　￹姿￺すがた￻は　とても　￹優雅￺ゆうが￻。"
        jp_kanji:
          scarlet: "￹水￺みず￻かきのついた　￹長￺なが￻い　￹手足￺てあし￻を\n￹使￺つか￻い　￹全力￺ぜんりょく￻で　￹泳￺およ￻ぎだすと\nなぜか　￹額￺ひたい￻が　￹光￺ひか￻り￹輝￺かがや￻く。"
          violet: "￹流￺なが￻れの　￹静￺しず￻かな　￹川￺かわ￻や\n￹湖￺みずうみ￻を　￹好￺この￻んでいる。\n￹泳￺およ￻ぐ　￹姿￺すがた￻は　とても　￹優雅￺ゆうが￻。"
        en:
          scarlet: "When it swims at full speed using its long,\nwebbed limbs, its forehead somehow begins\nto glow."
          violet: "It swims gracefully along on the quiet, slow-\nmoving rivers and lakes of which it is so fond."
        fr:
          scarlet: "Quand il nage à vitesse maximale grâce à\nses pattes palmées, son front se met à luire\npour une raison inconnue."
          violet: "Il nage avec une grande grâce dans les eaux\ndes lacs ou des rivières calmes, qu’il apprécie\ntout particulièrement."
        it:
          scarlet: "Quando nuota a tutta velocità con i suoi lunghi\narti palmati, la fronte gli si illumina."
          violet: "Predilige i laghi e i corsi d’acqua dalla corrente\nplacida. Quando nuota è molto aggraziato."
        de:
          scarlet: "Wenn es mit den Schwimmflossen an seinen\nlangen Gliedmaßen schnell durchs Wasser\nschwimmt, beginnt seine Stirn zu glühen."
          violet: "Entoron mag stille, langsam fließende Flüsse und\nSeen. Es ist ein sehr anmutiger Schwimmer."
        es:
          scarlet: "Cuando nada a toda velocidad usando sus largas\nextremidades palmeadas, su frente comienza\na brillar."
          violet: "Nada con elegancia por las tranquilas aguas\nde ríos y lagos, donde se siente como pez\nen el agua."
        ko:
          scarlet: "물갈퀴가 달린 긴 손발을 써서\n전력으로 헤엄치면\n왠지 이마에서 빛이 반짝인다."
          violet: "잔잔하게 흐르는 강이나\n호수를 좋아한다.\n헤엄치는 모습이 아주 우아하다."
        zh_simp:
          scarlet: "当它靠着带有蹼的\n修长手脚全力游泳时，\n不知为何额头会闪闪发光。"
          violet: "喜欢水流平稳的河川\n与湖泊。它游泳的\n姿态非常优雅。"
        zh_trad:
          scarlet: "當牠用帶有水蹼的\n修長手腳全力游泳時，\n不知為何額頭會閃閃發光。"
          violet: "喜歡水流平穩的\n河川和湖泊。\n泳姿相當地優雅。"
