      descriptions:
        jp_kana:
          scarlet: "なんでも　￹消化￺しょうか￻する　￹胃袋￺いぶくろ￻。\n￹消化￺しょうか￻するときに　￹発生￺はっせい￻する　ガスは\n￹強烈￺きょうれつ￻な　￹悪臭￺あくしゅう￻だ。"
          violet: "￹心臓￺しんぞう￻や　￹脳￺のう￻みそは　￹小￺ちい￻さく\n￹体￺からだ￻の　￹大部分￺だいぶぶん￻が　￹胃袋￺いぶくろ￻。\nなんでも　￹溶￺と￻かす　￹胃液￺いえき￻を　￹出￺だ￻す。"
        jp_kanji:
          scarlet: "なんでも　￹消化￺しょうか￻する　￹胃袋￺いぶくろ￻。\n￹消化￺しょうか￻するときに　￹発生￺はっせい￻する　ガスは\n￹強烈￺きょうれつ￻な　￹悪臭￺あくしゅう￻だ。"
          violet: "￹心臓￺しんぞう￻や　￹脳￺のう￻みそは　￹小￺ちい￻さく\n￹体￺からだ￻の　￹大部分￺だいぶぶん￻が　￹胃袋￺いぶくろ￻。\nなんでも　￹溶￺と￻かす　￹胃液￺いえき￻を　￹出￺だ￻す。"
        en:
          scarlet: "There is nothing its stomach can’t digest.\nWhile it is digesting, vile, overpowering gases\nare expelled."
          violet: "It has a small heart and brain. Its stomach\ncomprises most of its body, with enzymes to\ndissolve anything."
        fr:
          scarlet: "Il n’y a rien que son estomac ne puisse digérer.\nPendant sa digestion, il laisse échapper des gaz\ntrès nauséabonds."
          violet: "Il a un cœur et un cerveau de petite taille.\nSon corps est principalement constitué d’un\nestomac dont les sucs digestifs dissolvent tout."
        it:
          scarlet: "Non c’è nulla che il suo stomaco non possa\ndigerire. Durante la digestione espelle gas\ninsopportabilmente fetidi."
          violet: "Lo stomaco occupa gran parte del corpo, mentre\ncuore e cervello sono minuscoli. Secerne succhi\ngastrici capaci di sciogliere qualunque cosa."
        de:
          scarlet: "Es gibt nichts, was sein Magen nicht verdauen\nkönnte. Während des Verdauungsvorgangs\nwerden eklige, penetrante Gase freigesetzt."
          violet: "Sein Herz und Hirn sind winzig, während der\nMagen den Großteil seines Körpers einnimmt.\nSein Magensaft ist in der Lage, alles zu verdauen."
        es:
          scarlet: "Su estómago es capaz de digerir cualquier cosa.\nAl hacerlo, produce gases de una pestilencia\nnauseabunda."
          violet: "Sus sesos y corazón son diminutos; es casi todo\nestómago. Sus jugos gástricos disuelven lo que\nsea."
        ko:
          scarlet: "무엇이든 소화하는 위를 가졌다.\n소화할 때 발생하는 가스는\n강렬한 악취가 난다."
          violet: "심장과 뇌가 작고\n몸 대부분이 위다.\n무엇이든 녹이는 위액을 만들어 낸다."
        zh_simp:
          scarlet: "它的胃能消化任何东西。\n消化时产生的气体带有强烈的恶臭。"
          violet: "心脏和大脑都很小，\n身体的大部分是胃。\n会分泌出什么都能溶解的胃液。"
        zh_trad:
          scarlet: "牠的胃能消化任何東西。\n消化時產生的氣體\n帶有強烈的惡臭。"
          violet: "心臟和大腦都很小，\n身體的大部分是胃。\n會分泌出什麼都能溶解的胃液。"
