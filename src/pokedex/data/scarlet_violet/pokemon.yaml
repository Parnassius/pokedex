      descriptions:
        jp_kana:
          scarlet: "￹腕￺うで￻の　ウロコが　￹剥￺は￻がれ￹落￺お￻ちるほど\n￹激￺はげ￻しい　￹殴￺なぐ￻り￹合￺あ￻いを　￹仕掛￺しか￻ける。\n￹剥￺は￻げた　￹腕￺うで￻は　￹勇者￺ゆうしゃ￻の￹証￺あかし￻。"
          violet: "ウロコを　￹力強￺ちからづよ￻く　￹叩￺たた￻きながら\n￹踊￺おど￻り　￹自￺みずか￻らを　ふるい￹立￺た￻たせる。\n￹雄叫￺おたけ￻びは　￹戦￺たたか￻いの　￹合図￺あいず￻。"
        jp_kanji:
          scarlet: "￹腕￺うで￻の　ウロコが　￹剥￺は￻がれ￹落￺お￻ちるほど\n￹激￺はげ￻しい　￹殴￺なぐ￻り￹合￺あ￻いを　￹仕掛￺しか￻ける。\n￹剥￺は￻げた　￹腕￺うで￻は　￹勇者￺ゆうしゃ￻の￹証￺あかし￻。"
          violet: "ウロコを　￹力強￺ちからづよ￻く　￹叩￺たた￻きながら\n￹踊￺おど￻り　￹自￺みずか￻らを　ふるい￹立￺た￻たせる。\n￹雄叫￺おたけ￻びは　￹戦￺たたか￻いの　￹合図￺あいず￻。"
        en:
          scarlet: "It gets into fistfights so intense that the scales\non its arms peel off. Bare arms are a sign of\nvaliance."
          violet: "It fires itself up by striking its scales with force as\nit dances. Its roar is a battle cry."
        fr:
          scarlet: "Il échange des coups de poing si violents avec ses\ncongénères qu’il s’en arrache les écailles des bras.\nUn bras sans écailles est un signe de bravoure."
          violet: "Il danse en frappant violemment ses écailles,\nce qui le galvanise. Son cri de guerre signale\nqu’il est sur le point d’engager le combat."
        it:
          scarlet: "Fa lotte così violente da perdere le squame\nsulle braccia. Braccia prive di squame sono\nprova del suo valore."
          violet: "Danza battendo con forza le squame per darsi\nla carica. Le sue urla possenti sono un segnale\nbellicoso."
        de:
          scarlet: "Sie liefern sich so heftige Schlägereien, dass sich\ndie Schuppen ihrer Arme ablösen. Schuppenlose\nArme gelten bei ihnen als ein Tapferkeitsbeweis."
          violet: "Es spornt sich selbst mit einem Tanz an, bei dem\nes kraftvoll mit den Schuppen rasselt. Mit einem\nSchrei signalisiert es den Kampfbeginn."
        es:
          scarlet: "Se enzarza en peleas tan violentas que incluso se\nle desprenden las escamas de los brazos. Esta\ndesnudez constituye una prueba de su valor."
          violet: "Danza golpeando con fuerza las escamas para\ninsuflarse ánimos. Cuando profiere su grito de\nguerra, es señal de un combate inminente."
        ko:
          scarlet: "팔의 비늘이 떨어질수록\n격렬하게 싸움을 걸어온다.\n비늘이 벗겨진 팔은 용기의 증표다."
          violet: "비늘을 힘차게 두들기며 춤을 춰서\n자신의 기운을 북돋는다.\n우렁찬 외침은 싸움을 알리는 신호다."
        zh_simp:
          scarlet: "会发起激烈得连手臂的\n鳞片也会脱落的搏斗。\n脱落鳞片的手臂是勇者的证明。"
          violet: "会大力敲打鳞片\n并跳起舞来鼓舞自己。\n战吼是战斗的信号。"
        zh_trad:
          scarlet: "會挑起激烈得甚至讓\n手臂鱗片脫落的互毆戰。\n鱗片斑剝的手臂是勇者的證明。"
          violet: "會強而有勁地敲擊鱗片\n並且跳起舞來激勵自己。\n戰吼聲是牠開戰的信號。"
