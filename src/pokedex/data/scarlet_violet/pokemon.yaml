          violet: "ハサミから　￹撃￺う￻ちだす　￹海水￺かいすい￻の\n￹砲弾￺ほうだん￻の　￹威力￺いりょく￻は　タンカーの\n￹船体￺せんたい￻を　￹貫￺つらぬ￻くほどだ。"
        en:
          scarlet: "Clawitzer can move through the water at\na speed of 60 knots by using gas inside its\nbody to expel water from the back of its claw."
          violet: "The cannonballs of seawater that Clawitzer\nlaunches from its claw are powerful\nenough to punch through tanker hulls."
        fr:
          scarlet: "Grâce au gaz que son corps contient, il expulse\nde l’eau par l’arrière de sa pince, ce qui lui\npermet de nager à une vitesse de 60 nœuds."
          violet: "Les obus d’eau qu’il projette grâce à sa pince\nsont si puissants qu’ils peuvent transpercer\nla coque d’un pétrolier."
        it:
          scarlet: "Usando i gas nel suo corpo riesce a\nespellere acqua dal retro della sua chela\ne nuotare a una velocità di 60 nodi."
          violet: "I proiettili di acqua marina sparati dalla\nsua chela sono talmente potenti da riuscire\na perforare lo scafo di una nave cisterna."
        de:
          scarlet: "Wenn es mit körpereigenem Gas Wasser über das\nhintere Ende seiner Schere ausstößt, kann es mit\neiner Geschwindigkeit von 60 Knoten schwimmen."
          violet: "Die Geschosse aus Meerwasser, die es aus\nseiner Schere abfeuert, sind stark genug, um\nden Rumpf von Tankschiffen zu durchbohren."
        es:
          scarlet: "Emplea el gas de su cuerpo para lanzar chorros\nde agua por la parte trasera de su pinza que\nle permiten nadar a una velocidad de 60 nudos."
          violet: "Los proyectiles de agua marina que\ndispara por la pinza poseen tal potencia\nque pueden perforar el casco de un petrolero."
        ko:
          scarlet: "체내 가스의 힘으로\n집게의 꽁지에서 물을 분사하여\n60노트의 스피드로 헤엄친다."
          violet: "집게에서 발사하는\n해수 포탄의 위력은\n유조선의 선체를 관통할 정도다."
        zh_simp:
          scarlet: "会利用体内气体的力量\n从钳子后部喷出水，使它\n能够以６０节的速度游泳。"
          violet: "从它的钳子发射出的\n海水炮弹威力之强，\n足以贯穿油轮的船体。"
        zh_trad:
          scarlet: "會利用體內氣體的力量\n從鉗子後部噴出水，使牠\n能夠以６０節的速度游泳。"
          violet: "從牠的鉗子發射出的\n海水砲彈，威力大到\n足以貫穿油輪的船體。"
