          scarlet: "Parece tratarse de Reyalado, la criatura que,\nsegún lo narrado en un antiguo diario, fue\ncapaz de dividir la tierra con sus puños."
          violet: "Pese a sus similitudes con los Cyclizar, es mucho\nmás violento y fornido. Se desconoce totalmente\nsu relación con el entorno y otros seres vivos."
        ko:
          scarlet: "주먹으로 대지를 갈랐다고\n오래된 탐험기에 기록된\n“날개의왕”의 정체인 듯하다."
          violet: "모토마를 닮았지만\n그보다 훨씬 튼튼하고 흉포하다.\n생태 등은 밝혀진 것이 전혀 없다."
