          scarlet: "レッドヘッドは　￹辛￺から￻み￹成分￺せいぶん￻を\n￹炎￺ほのお￻エネルギーに　￹変￺か￻え\n￹激辛￺げきから￻の　￹火炎放射￺かえんほうしゃ￻を　まき￹散￺ち￻らす。"
          violet: "グリーンヘッドは　￹辛￺から￻み￹成分￺せいぶん￻に\n￹脳￺のう￻が　￹刺激￺しげき￻されて　￹凶暴化￺きょうぼうか￻。\n￹暴￺あば￻れだすと　￹手￺て￻がつけられない。"
        jp_kanji:
          scarlet: "レッドヘッドは　￹辛￺から￻み￹成分￺せいぶん￻を\n￹炎￺ほのお￻エネルギーに　￹変￺か￻え\n￹激辛￺げきから￻の　￹火炎放射￺かえんほうしゃ￻を　まき￹散￺ち￻らす。"
          violet: "グリーンヘッドは　￹辛￺から￻み￹成分￺せいぶん￻に\n￹脳￺のう￻が　￹刺激￺しげき￻されて　￹凶暴化￺きょうぼうか￻。\n￹暴￺あば￻れだすと　￹手￺て￻がつけられない。"
        en:
          scarlet: "The red head converts spicy chemicals into fire\nenergy and blasts the surrounding area with a\nsuper spicy stream of flame."
          violet: "The green head has turned vicious due to the\nspicy chemicals stimulating its brain. Once it goes\non a rampage, there is no stopping it."
        fr:
          scarlet: "Sa tête rouge convertit la substance piquante\nproduite par son corps en énergie de type Feu\net crache des flammes brûlantes."
          violet: "Sa tête verte est agressive à cause des substances\népicées qui stimulent son cerveau. Quand elle\ns’énerve, rien ne peut l’arrêter."
        it:
          scarlet: "La testa rossa trasforma le proprie sostanze\npungenti in energia Fuoco che usa per lanciare\nfiammate superpiccanti."
          violet: "Le sue sostanze piccanti influiscono sul cervello\ndella testa verde, rendendola feroce. Quando va\nfuori di senno, non c’è modo di fermarla."
        de:
          scarlet: "Sein roter Kopf wandelt Scharfstoffe in Feuer-\nEnergie um und kann so feurig scharfe Flammen\nvon sich geben."
          violet: "Der grüne Kopf hat eine brutale Veranlagung,\nda Scharfstoffe sein Gehirn stimulieren. Wütet er\nerst einmal, ist er nicht mehr aufzuhalten."
        es:
          scarlet: "La cabeza roja transforma los capsaicinoides de\nsu cuerpo en energía flamígera, lo que le permite\narrojar llamaradas extremadamente abrasadoras."
          violet: "La cabeza verde es mucho más despiadada por\nel efecto de los capsaicinoides sobre su cerebro.\nCuando enloquece, no hay forma de detenerla."
        ko:
          scarlet: "레드 헤드가 매운 성분을\n불꽃 에너지로 변환시켜\n불같이 매운 화염방사를 사방에 흩뿌린다."
          violet: "그린 헤드는 매운 성분에\n뇌를 자극받아 흉포해졌다.\n날뛰기 시작하면 손쓸 도리가 없다."
        zh_simp:
          scarlet: "把辣味成分转换成火之能量，\n然后从红色的头朝四周\n发射出辣到爆炸的火焰。"
          violet: "绿色的头会变得凶暴，是因为\n脑部受到了辣味成分的刺激。\n一旦暴怒起来就会一发不可收拾。"
        zh_trad:
          scarlet: "會把辣味成分轉換成火之能量，\n然後從紅色的頭朝著四周\n噴灑出辣到爆炸的火焰。"
          violet: "綠色的頭因為腦部受到了\n辣味成分的刺激而變得凶暴。\n一旦暴怒起來就會一發不可收拾。"
