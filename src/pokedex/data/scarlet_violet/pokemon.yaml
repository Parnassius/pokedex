        jp_kana:
          scarlet: "￹寝床￺ねどこ￻や　エサを　￹食￺た￻べる　￹場所￺ばしょ￻など\n￹用途￺ようと￻に　￹合￺あ￻わせて　いくつも　￹部屋￺へや￻が\n￹分￺わ￻かれた　￹大￺おお￻きな　￹巣￺す￻を　￹作￺つく￻る。"
          violet: "いつの￹間￺ま￻にか　￹子￺こ￻どもが　￹増￺ふ￻えていた。\n￹家族￺かぞく￻のように　￹暮￺く￻らすが　３￹匹￺びき￻の\n￹関係￺かんけい￻は　￹解明￺かいめい￻されていない。"
        jp_kanji:
          scarlet: "￹寝床￺ねどこ￻や　エサを　￹食￺た￻べる　￹場所￺ばしょ￻など\n￹用途￺ようと￻に　￹合￺あ￻わせて　いくつも　￹部屋￺へや￻が\n￹分￺わ￻かれた　￹大￺おお￻きな　￹巣￺す￻を　￹作￺つく￻る。"
          violet: "いつの￹間￺ま￻にか　￹子￺こ￻どもが　￹増￺ふ￻えていた。\n￹家族￺かぞく￻のように　￹暮￺く￻らすが　３￹匹￺びき￻の\n￹関係￺かんけい￻は　￹解明￺かいめい￻されていない。"
        en:
          scarlet: "They build huge nests with many rooms that\nare used for different purposes, such as eating\nand sleeping."
          violet: "The little one just appeared one day. They all\nlive together like a family, but the relationship\nbetween the three is still unclear."
        fr:
          scarlet: "Ils construisent des nids gigantesques divisés\nen espaces distincts qui répondent à différents\nbesoins, comme dormir ou s’alimenter."
          violet: "Leur nombre a soudainement augmenté.\nIls vivent ensemble comme une famille, mais\non ignore la véritable nature de leurs liens."
        it:
          scarlet: "Costruiscono una grande tana divisa in più\nstanze a seconda dell’uso: una per dormire,\nuna per mangiare e così via."
          violet: "Il più piccolo è comparso dal nulla da un giorno\nall’altro. Vivono assieme come una famiglia, ma\nla relazione tra i tre componenti non è chiara."
        de:
          scarlet: "Sie bauen große Nester mit diversen Räumen,\ndie alle unterschiedlichen Zwecken dienen,\nwie etwa dem Schlafen oder Essen."
          violet: "Auf einmal waren sie zu dritt. Obgleich diese\nGruppe wie eine Familie zusammenlebt, ist das\nVerhältnis der drei untereinander unbekannt."
        es:
          scarlet: "Construyen grandes nidos que dividen\nen varias cámaras destinadas a distintas\nfunciones, como dormir o comer."
          violet: "Una cría apareció de la noche a la mañana.\nConviven como si fuesen una familia, aunque\nse desconocen los lazos que los unen."
        ko:
          scarlet: "잠을 자는 곳이나 먹이를 먹는 곳 등,\n용도에 따라 나눈 여러 개의 방으로\n구성된 커다란 집을 만든다."
          violet: "어느새 아이가 늘었다.\n가족같이 지내지만, 세 마리의 관계는\n제대로 밝혀진 것이 없다."
        zh_simp:
          scarlet: "会制造巨大的巢穴，\n并根据用途来分出多个房间，\n包含寝室、餐厅等等。"
          violet: "不知不觉之间多了个小孩。\n虽然像一家子一样生活，\n但３只的关系仍是个迷。"
        zh_trad:
          scarlet: "在自己所建的巨大巢穴裡，\n會有配合睡眠和用餐等用途\n所分出的多個房間。"
          violet: "不知不覺間多了個小孩。\n雖然像家族一樣生活，\n但３隻的關係仍然是個謎。"
