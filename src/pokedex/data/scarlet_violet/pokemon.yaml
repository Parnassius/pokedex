        jp_kana:
          scarlet: "￹温厚￺おんこう￻で　￹庇護欲￺ひごよく￻が　￹強￺つよ￻い。\n￹葉￺は￻っぱの　￹腕￺うで￻は　￹大木￺たいぼく￻を\n￹一刀両断￺いっとうりょうだん￻する　￹切￺き￻れ￹味￺あじ￻だ。"
          violet: "￹葉￺は￻っぱを　￹縫￺ぬ￻って　￹服￺ふく￻を　￹作￺つく￻る。\n￹穏￺おだ￻やかだが　￹幼￺おさな￻い　ポケモンを\n￹狙￺ねら￻う　￹敵￺てき￻には　￹容赦￺ようしゃ￻しない。"
        jp_kanji:
          scarlet: "￹温厚￺おんこう￻で　￹庇護欲￺ひごよく￻が　￹強￺つよ￻い。\n￹葉￺は￻っぱの　￹腕￺うで￻は　￹大木￺たいぼく￻を\n￹一刀両断￺いっとうりょうだん￻する　￹切￺き￻れ￹味￺あじ￻だ。"
          violet: "￹葉￺は￻っぱを　￹縫￺ぬ￻って　￹服￺ふく￻を　￹作￺つく￻る。\n￹穏￺おだ￻やかだが　￹幼￺おさな￻い　ポケモンを\n￹狙￺ねら￻う　￹敵￺てき￻には　￹容赦￺ようしゃ￻しない。"
        en:
          scarlet: "This gentle Pokémon has strong protective\ninstincts. The leaves on its arms are sharp enough\nto slice a thick tree in half with one stroke."
          violet: "It fashions clothing from woven leaves. Though\ngentle in disposition, it will show no mercy to\nfoes who target young Pokémon."
        fr:
          scarlet: "Il est gentil et très protecteur. Ses bras faits\nde feuilles sont si affûtés qu’ils peuvent\ntrancher un grand arbre d’un seul coup."
          violet: "De nature calme, il fabrique des vêtements en\ntressant des feuilles. Il est impitoyable envers\nceux qui s’attaquent aux jeunes Pokémon."
        it:
          scarlet: "È gentile e ha un forte istinto di protezione.\nGli arti fatti di foglie sono così affilati da poter\ntagliare in due il tronco di un grosso albero."
          violet: "Cuce foglie per farne dei vestiti. Ha un’indole\npacifica, ma non ha pietà dei nemici che\nprendono di mira i Pokémon più giovani."
        de:
          scarlet: "Dieses sanftmütige Pokémon hat einen starken\nBeschützerinstinkt. Ein Hieb seiner scharfen\nBlattarme genügt, um riesige Bäume zweizuteilen."
          violet: "Matrifol schneidert Kleidung aus Blättern. Es ist\nfriedfertig, doch wenn jemand es auf jüngere\nPokémon abgesehen hat, kennt es kein Erbarmen."
        es:
          scarlet: "De carácter afable y marcado instinto protector.\nLas hojas de sus brazos son tan afiladas que\npueden rebanar un gran árbol con un solo corte."
          violet: "Elabora vestimentas tejiendo hojas. Posee un\ncarácter afable, pero se muestra implacable con\nlos enemigos que atacan a los Pokémon jóvenes."
        ko:
          scarlet: "온화하고 보호 본능이 강하다.\n잎사귀로 된 팔은\n거목을 일도양단할 정도로 예리하다."
          violet: "잎사귀를 꿰매서 옷을 만든다.\n온화하지만 어린 포켓몬을\n노리는 적에게는 자비가 없다."
        zh_simp:
          scarlet: "性格温厚且保护欲强。\n叶子般的手臂锋利得\n能将大树一刀两断。"
          violet: "会将叶子缝制成衣服。\n虽然性格温驯，但对盯上了\n幼小的宝可梦的敌人绝不手软。"
        zh_trad:
          scarlet: "性情溫厚，保護慾強。\n葉子狀的手臂十分鋒利，\n足以將大樹一刀兩斷。"
          violet: "會拿葉子來縫製成衣服。\n雖然性情溫和，但絕不輕饒\n盯上幼小的寶可夢的傢伙。"
