      descriptions:
        jp_kana:
          scarlet: "￹環境￺かんきょう￻の　￹変化￺へんか￻に　すぐさま\n￹合￺あ￻わせられるよう　いくつもの\n￹進化￺しんか￻の　￹可能性￺かのうせい￻を　￹秘￺ひ￻めている。"
          violet: "￹不規則￺ふきそく￻な　￹遺伝子￺いでんし￻を　￹持￺も￻つ。\n￹石￺いし￻から￹出￺で￻る　￹放射線￺ほうしゃせん￻によって\n￹体￺からだ￻が　￹突然変異￺とつぜんへんい￻を　￹起￺お￻こす。"
        jp_kanji:
          scarlet: "￹環境￺かんきょう￻の　￹変化￺へんか￻に　すぐさま\n￹合￺あ￻わせられるよう　いくつもの\n￹進化￺しんか￻の　￹可能性￺かのうせい￻を　￹秘￺ひ￻めている。"
          violet: "￹不規則￺ふきそく￻な　￹遺伝子￺いでんし￻を　￹持￺も￻つ。\n￹石￺いし￻から￹出￺で￻る　￹放射線￺ほうしゃせん￻によって\n￹体￺からだ￻が　￹突然変異￺とつぜんへんい￻を　￹起￺お￻こす。"
        en:
          scarlet: "Its ability to evolve into many forms allows it to\nadapt smoothly and perfectly to any environment."
          violet: "Its genetic code is irregular. It may mutate if it is\nexposed to radiation from element stones."
        fr:
          scarlet: "Ses multiples évolutions lui permettent\nde s’adapter à tout type de milieu naturel."
          violet: "Ses gènes atypiques lui permettent de muter\ns’il est exposé aux radiations d’une pierre."
        it:
          scarlet: "La capacità di evolversi in diverse specie gli\npermette di adattarsi perfettamente a qualsiasi\ntipo di ambiente."
          violet: "A causa del suo codice genetico anomalo, può\ntrasformarsi improvvisamente se esposto\nalle radiazioni emesse dalle pietre."
        de:
          scarlet: "Um sich jeder Umgebung perfekt anpassen zu\nkönnen, ist es in der Lage, sich zu verschiedenen\nPokémon zu entwickeln."
          violet: "Das Erbmaterial von Evoli ist anomal.\nDie Strahlung von besonderen Steinen\nlässt es mutieren."
        es:
          scarlet: "Es capaz de evolucionar de muchas maneras para\nadaptarse sin problemas a cualquier medio."
          violet: "De código genético irregular, puede mutar si se\nle expone a la radiación de piedras evolutivas."
        ko:
          scarlet: "환경 변화에 곧바로 적응할 수 있도록\n여러 형태로 진화할 수 있는\n가능성을 가지고 있다."
          violet: "불규칙한 유전자를 가졌다.\n돌에서 나오는 방사선에 의해\n몸이 돌연변이를 일으킨다."
        zh_simp:
          scarlet: "为了能立刻适应环境的变化，\n这种宝可梦蕴含着\n多种进化的可能性。"
          violet: "拥有不规则的基因。\n石头散发出的射线\n会让它的身体发生突变。"
        zh_trad:
          scarlet: "為了能瞬即適應環境的變化，\n這種寶可夢蘊含著\n許多種進化的可能性。"
          violet: "有著不規則的基因。\n石頭散發出的放射線，\n會使牠的身體發生突變。"
