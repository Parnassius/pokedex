      descriptions:
        jp_kana:
          scarlet: "￹恨￺うら￻みや　￹妬￺ねた￻みの　￹感情￺かんじょう￻が　￹大好物￺だいこうぶつ￻。\nピンと￹立￺た￻った　ツノが\n￹人間￺にんげん￻の　￹気持￺きも￻ちを　キャッチする。"
          violet: "だれかが　だれかを　￹恨￺うら￻む\n￹暗￺くら￻く　￹哀￺かな￻しい　￹気持￺きも￻ちを\n￹吸￺す￻い￹取￺と￻って　じわじわ　￹強￺つよ￻くなる。"
        jp_kanji:
          scarlet: "￹恨￺うら￻みや　￹妬￺ねた￻みの　￹感情￺かんじょう￻が　￹大好物￺だいこうぶつ￻。\nピンと￹立￺た￻った　ツノが\n￹人間￺にんげん￻の　￹気持￺きも￻ちを　キャッチする。"
          violet: "だれかが　だれかを　￹恨￺うら￻む\n￹暗￺くら￻く　￹哀￺かな￻しい　￹気持￺きも￻ちを\n￹吸￺す￻い￹取￺と￻って　じわじわ　￹強￺つよ￻くなる。"
        en:
          scarlet: "It loves to feed on feelings like envy and malice.\nIts upright horn catches the emotions of people."
          violet: "It feeds on the dark emotions of sadness and\nhatred, which make it grow steadily stronger."
        fr:
          scarlet: "Sa corne capte les émotions des êtres humains.\nIl adore se nourrir de sentiments tels que\nla jalousie et la rancune."
          violet: "Il développe sa force en absorbant la rancune,\nla tristesse et les autres sentiments négatifs\ndes êtres humains."
        it:
          scarlet: "Ama cibarsi di invidia e odio. Il corno ritto\nsul capo gli permette di percepire le emozioni\ndella gente."
          violet: "Si rinvigorisce assorbendo i tristi e cupi\nsentimenti di vendetta degli esseri umani."
        de:
          scarlet: "Es verspeist am liebsten Gefühle wie Neid und\nBosheit. Sein aufrechtes Horn fängt die\nEmotionen der Menschen ein."
          violet: "Es gewinnt an Stärke, indem es sich an den\ntraurigen und hasserfüllten Gefühlen der\nMenschen labt."
        es:
          scarlet: "Se alimenta de sentimientos como la envidia y\nel rencor, que capta a través del cuerno de la\ncabeza."
          violet: "Absorbe los sentimientos de celos y tristeza\nque albergan los humanos, y se hace más fuerte\npaulatinamente."
        ko:
          scarlet: "원한이나 질투 같은 감정이\n좋아하는 먹이다. 뾰족하게 솟은 뿔이\n인간의 기분을 감지해 낸다."
          violet: "누군가가 누군가를 원망하는\n어둡고 슬픈 마음을\n흡수해 서서히 강해진다."
        zh_simp:
          scarlet: "最喜欢怨恨和嫉妒\n之类的感情。竖起的角\n能够捕捉到人类的心情。"
          violet: "吸收他人对谁心存\n怨恨时的阴沉悲伤之情，\n来让自己一点一点地变强。"
        zh_trad:
          scarlet: "最愛吃像是怨恨和嫉妒\n這類的感情。會用豎立\n的角來察覺人類的心情。"
          violet: "會吸取他人在怨恨著誰時\n散發出的黯淡悲傷之情，\n讓自己一點一點地變強。"
