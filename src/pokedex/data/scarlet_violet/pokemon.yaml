        jp_kanji:
          scarlet: "ガス￹状￺じょう￻の　￹体￺からだ￻で　まとわりつき\n￹獲物￺えもの￻の　￹皮膚￺ひふ￻から　￹少￺すこ￻しずつ\n￹毒￺どく￻を　￹送￺おく￻り￹込￺こ￻んで　￹弱￺よわ￻らせる。"
          violet: "ガスでできた　￹薄￺うす￻い　￹体￺からだ￻は\nどんな　￹大￺おお￻きさの　￹相手￺あいて￻も\n￹包￺つつ￻みこみ　￹息￺いき￻の￹根￺ね￻を　￹止￺と￻める。"
        en:
          scarlet: "It wraps its opponent in its gas-like body,\nslowly weakening its prey by poisoning it\nthrough the skin."
          violet: "Its body is made of gas. Despite lacking\nsubstance, it can envelop an opponent of\nany size and cause suffocation."
        fr:
          scarlet: "Il enveloppe ses proies dans le nuage de gaz que\nforme son corps et les empoisonne à travers leur\npeau afin de les affaiblir petit à petit."
          violet: "Son corps est composé de gaz. Il peut ainsi\nenvelopper un adversaire de n’importe quelle\ntaille et le faire suffoquer."
        it:
          scarlet: "Avvolge le prede nel corpo gassoso e le\nindebolisce lentamente facendo penetrare\nil veleno nella loro pelle."
          violet: "Il suo corpo impalpabile è fatto di gas. Avvolge\nnemici di ogni dimensione, soffocandoli."
        de:
          scarlet: "Es hüllt seine Beute in seinen Gaskörper ein\nund schwächt sie, indem es sie nach und nach\nüber die Haut vergiftet."
          violet: "Mit seinem gasförmigen Körper kann es Gegner\njeder Größe einhüllen und ersticken."
        es:
          scarlet: "Su estrategia consiste en envolver al rival con\nsu cuerpo gaseoso y envenenarlo a través de\nla piel."
          violet: "Su etéreo cuerpo está hecho de gas. Puede\nenvolver a un oponente de cualquier tamaño\nhasta ahogarlo."
        ko:
          scarlet: "가스로 된 몸으로 휘감은 다음\n먹이의 피부를 통해 조금씩\n독을 흘려보내어 약하게 만든다."
          violet: "가스로 만들어진 몸은\n어떠한 크기의 상대라도\n둘러싸서 숨을 못 쉬게 한다."
        zh_simp:
          scarlet: "利用气体状的身体缠住猎物，\n从皮肤缓缓注入毒素，\n使猎物变得虚弱。"
          violet: "不管对手的体型多大，\n由气体构成的轻盈身体都可以\n将其裹住并结束它的性命。"
        zh_trad:
          scarlet: "會用氣體狀的身體纏住獵物，\n再從皮膚緩緩地注入毒素，\n使對手變得虛弱。"
          violet: "不管對手的體型多大，\n由氣體構成的輕薄身體都能\n裹住對手並結束其性命。"
