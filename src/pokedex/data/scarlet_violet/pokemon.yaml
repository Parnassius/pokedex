        jp_kanji:
          scarlet: "￹口￺くち￻から　￹吹￺ふ￻き￹出￺だ￻す　￹水￺みず￻の￹弾￺たま￻で\n￹木￺き￻の￹実￺み￻を　￹撃￺う￻ち￹落￺お￻として　￹食￺た￻べる。\n￹狙￺ねら￻いは　￹百発百中￺ひゃっぱつひゃくちゅう￻だ。"
