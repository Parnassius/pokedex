      types:
        - grass
      egg_groups:
        - field
      abilities:
        - overgrow
      hidden_ability: bulletproof
      descriptions:
        jp_kana:
          scarlet: "￹頑丈￺がんじょう￻な　￹殻￺から￻で　￹守￺まも￻られるが\nずっしりと　￹重￺おも￻たいので　￹自然￺しぜん￻と\n￹足腰￺あしこし￻が　￹鍛￺きた￻えられるのだ。"
          violet: "￹体当￺たいあ￻たり　いっぱつで　トレーラーを\nふっとばす。　￹激￺はげ￻しく　ぶつかっても\n￹痛￺いた￻みに　￹鈍感￺どんかん￻なので　￹平気￺へいき￻。"
        jp_kanji:
          scarlet: "￹頑丈￺がんじょう￻な　￹殻￺から￻で　￹守￺まも￻られるが\nずっしりと　￹重￺おも￻たいので　￹自然￺しぜん￻と\n￹足腰￺あしこし￻が　￹鍛￺きた￻えられるのだ。"
          violet: "￹体当￺たいあ￻たり　いっぱつで　トレーラーを\nふっとばす。　￹激￺はげ￻しく　ぶつかっても\n￹痛￺いた￻みに　￹鈍感￺どんかん￻なので　￹平気￺へいき￻。"
        en:
          scarlet: "It’s protected by a sturdy shell. The shell is\nalso very heavy, which naturally strengthens\nQuilladin’s lower body."
          violet: "It can send a trailer flying with a tackle. It’s numb\nto pain, so even violent collisions don’t faze it."
        fr:
          scarlet: "Une carapace solide le protège. Elle est\nsi lourde qu’elle a permis à ses membres\ninférieurs de se muscler naturellement."
          violet: "Il peut projeter un camion dans les airs en\nle heurtant de tout son poids. Insensible à la\ndouleur, il ne craint pas les collisions violentes."
        it:
          scarlet: "Il suo robusto guscio è molto pesante e,\noltre a proteggerlo, sottopone la parte inferiore\ndel suo corpo a un costante allenamento."
          violet: "Può far volare via un tir caricandolo una volta\nsola con tutto il corpo. Gli scontri violenti non\nlo preoccupano, perché è insensibile al dolore."
        de:
          scarlet: "Sein robuster Panzer bietet ihm Schutz. Da er\nauch enorm schwer ist, sind Igastarnishs Beine\nvon Natur aus gut trainiert."
          violet: "Selbst ein starker Zusammenprall macht ihm nichts\naus, da es schmerzunempfindlich ist. Es kann mit\nnur einem Stoß Fahrzeuganhänger wegschleudern."
        es:
          scarlet: "Lo protege una robusta coraza que, al ser tan\npesada, le proporciona al mismo tiempo una\nforma natural de fortalecer las piernas."
          violet: "Es capaz de hacer volar un tráiler con tan solo un\nplacaje. Permanece impertérrito por muy violento\nque sea el impacto, al ser casi insensible al dolor."
        ko:
          scarlet: "몸을 보호하는 튼튼한 껍질은\n상당히 무겁기 때문에\n자연스럽게 하체가 단련된다."
          violet: "몸통박치기 한 번에 트레일러를\n날려 버린다. 거칠게 부딪쳐도\n고통에 둔감하기 때문에 아무렇지도 않다."
        zh_simp:
          scarlet: "被坚固的外壳所保护着，\n但因为外壳十分沉重，所以\n腰腿自然而然地受到了锻炼。"
          violet: "一记撞击就能撞飞拖车。\n由于它的痛觉很迟钝，\n因此撞得很猛也没问题。"
        zh_trad:
          scarlet: "受到了結實外殼的保護，\n但因為外殼極為沉重，\n自然而然也鍛鍊了下盤。"
          violet: "一記撞擊就能撞飛拖車。\n對痛覺很遲鈍，因此就算\n撞得再猛也能若無其事。"
