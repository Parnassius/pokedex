      descriptions:
        jp_kana:
          scarlet: "￹塩￺しお￻を　￹噴￺ふ￻き￹出￺だ￻して　￹獲物￺えもの￻に　￹浴￺あ￻びせ\n￹塩漬￺しおづ￻けにしてしまう。　￹体内￺たいない￻の\n￹水分￺すいぶん￻を　￹奪￺うば￻ってしまうのだ。"
          violet: "￹体内￺たいない￻で　￹岩塩￺がんえん￻を　￹圧縮￺あっしゅく￻。\n￹固￺かた￻めた　￹塩￺しお￻の￹弾￺たま￻を　￹撃￺う￻ちだすと\n￹鉄板￺てっぱん￻も　￹貫￺つらぬ￻く　￹威力￺いりょく￻。"
        jp_kanji:
          scarlet: "￹塩￺しお￻を　￹噴￺ふ￻き￹出￺だ￻して　￹獲物￺えもの￻に　￹浴￺あ￻びせ\n￹塩漬￺しおづ￻けにしてしまう。　￹体内￺たいない￻の\n￹水分￺すいぶん￻を　￹奪￺うば￻ってしまうのだ。"
          violet: "￹体内￺たいない￻で　￹岩塩￺がんえん￻を　￹圧縮￺あっしゅく￻。\n￹固￺かた￻めた　￹塩￺しお￻の￹弾￺たま￻を　￹撃￺う￻ちだすと\n￹鉄板￺てっぱん￻も　￹貫￺つらぬ￻く　￹威力￺いりょく￻。"
        en:
          scarlet: "This Pokémon dry cures its prey by spraying salt\nover them. The curing process steals away the\nwater in the prey’s body."
          violet: "It compresses rock salt inside its body and shoots\nout hardened salt pellets with enough force to\nperforate an iron sheet."
        fr:
          scarlet: "Il projette du sel pour en recouvrir ses proies.\nCelles-ci subissent alors un processus de salaison\net se déshydratent."
          violet: "Il compresse du sel gemme à l’intérieur\nde son corps et tire des balles de sel durci\ncapables de transpercer des plaques de fer."
        it:
          scarlet: "Spruzza sale addosso alla preda fino a ricoprirla\ndel tutto per estrarne i liquidi corporei."
          violet: "Comprime salgemma all’interno del corpo\nper creare proiettili salini, che spara con\nuna potenza tale da trafiggere lastre di ferro."
        de:
          scarlet: "Um seine Beute einzupökeln, überschüttet es sie\nmit Salz, das es auf sie spuckt. Dieser Prozess\nentzieht dem Körper der Beute Wasser."
          violet: "In seinem Körper komprimiert es Steinsalz zu\nharten Salzgeschossen. Wenn es diese abfeuert,\ndurchdringen sie selbst Eisenplatten."
        es:
          scarlet: "Escupe sal para recubrir con ella a sus presas y\nsometerlas a un proceso de salazón que extrae\nla humedad de sus cuerpos."
          violet: "Comprime sal de roca en el interior del cuerpo\ny crea unos proyectiles salinos capaces de\nperforar placas de metal."
        ko:
          scarlet: "분출한 소금을 먹이에게 끼얹어서\n소금절이로 만들어 버린다.\n체내의 수분을 빼앗는 것이다."
          violet: "몸속에서 암염을 압축시킨다.\n이렇게 굳혀진 소금 탄환을 발사하면\n철판도 관통하는 위력을 보인다."
        zh_simp:
          scarlet: "朝着猎物喷出盐，并将其\n做成盐腌物。猎物体内的\n水分会在此过程中被夺走。"
          violet: "在体内压缩岩盐，\n以此形成坚硬的盐弹，\n发射后的威力连铁板都能贯穿。"
        zh_trad:
          scarlet: "會將鹽噴向獵物，將其做成\n醃漬物。獵物體內的水分\n會在醃漬過程中被奪走。"
          violet: "會在體內壓縮岩鹽形成\n硬梆梆的鹽彈。一旦發射，\n其威力就連鐵板都能貫穿。"
