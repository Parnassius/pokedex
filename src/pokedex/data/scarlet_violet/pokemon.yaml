          scarlet: "￹厳￺きび￻しい　￹稽古￺けいこ￻を　￹繰￺く￻り￹返￺かえ￻して\n￹強￺つよ￻くなる。　どんな　￹攻撃￺こうげき￻にも\n￹耐￺た￻える　￹根性￺こんじょう￻の　ポケモン。"
          violet: "￹大木￺たいぼく￻に　￹何度￺なんど￻も　￹体当￺たいあ￻たりして\n￹強靭￺きょうじん￻な　￹体￺からだ￻と　くじけない　￹心￺こころ￻を\n￹鍛￺きた￻え￹上￺あ￻げるのだ。"
        jp_kanji:
          scarlet: "￹厳￺きび￻しい　￹稽古￺けいこ￻を　￹繰￺く￻り￹返￺かえ￻して\n￹強￺つよ￻くなる。　どんな　￹攻撃￺こうげき￻にも\n￹耐￺た￻える　￹根性￺こんじょう￻の　ポケモン。"
          violet: "￹大木￺たいぼく￻に　￹何度￺なんど￻も　￹体当￺たいあ￻たりして\n￹強靭￺きょうじん￻な　￹体￺からだ￻と　くじけない　￹心￺こころ￻を\n￹鍛￺きた￻え￹上￺あ￻げるのだ。"
        en:
          scarlet: "It grows stronger by enduring harsh training.\nIt is a gutsy Pokémon that can withstand any\nattack."
          violet: "It toughens up by slamming into thick trees\nover and over. It gains a sturdy body and\ndauntless spirit."
        fr:
          scarlet: "Il suit un entraînement drastique pour renforcer\nson corps. C’est un Pokémon plein de volonté,\ncapable de faire face à toutes les attaques."
          violet: "Il fonce sur de grands arbres pour fortifier\nson corps robuste et son cœur vaillant."
        it:
          scarlet: "Si rafforza allenandosi duramente.\nLa sua grande forza di volontà gli permette\ndi resistere a qualsiasi attacco."
          violet: "Si scaraventa più e più volte contro enormi\nalberi. Così facendo rafforza il corpo e\ntempra lo spirito."
        de:
          scarlet: "Sein hartes Training macht es stärker. Es ist ein\nwillensstarkes Pokémon, das jedem Angriff\ntrotzen kann."
          violet: "Indem es immer wieder große Bäume rammt,\nerhält es einen zähen Körper und einen\nstahlharten Willen."
        es:
          scarlet: "A base de duro entrenamiento se hace cada\nvez más fuerte. Es tan resistente que puede\nsoportar cualquier ataque."
          violet: "Golpea grandes árboles para fortalecer su\ncuerpo y forjar un espíritu inquebrantable."
        ko:
          scarlet: "힘든 수행을 반복하며 강해진다.\n어떤 공격도 참아 내는\n근성의 포켓몬이다."
          violet: "큰 나무에 몇 번이나 몸통박치기를 하며\n강인한 몸과 굴하지 않는 마음을 단련한다."
        zh_simp:
          scarlet: "在反复进行严格训练的\n过程中会逐渐变强。\n该宝可梦很有毅力，能承受任何攻击。"
          violet: "会不断地撞击大树\n来锻炼强韧的身躯\n和不气馁的心。"
        zh_trad:
          scarlet: "會在不斷的嚴格訓練中逐漸變強。\n能夠承受任何攻擊，\n是很有毅力的寶可夢。"
          violet: "會不斷撞擊大樹\n來鍛鍊強韌的身軀\n和不氣餒的心。"
