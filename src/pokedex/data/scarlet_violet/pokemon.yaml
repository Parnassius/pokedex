    ko: 시마사리
    zh_simp: 好坏星
    zh_trad: 好壞星
  forms:
    mareanie:
      form_id: 0
      base_stats:
        hp: 50
        attack: 53
        defense: 62
        special_attack: 43
        special_defense: 52
        speed: 45
      evs_yield:
        hp: 0
        attack: 0
