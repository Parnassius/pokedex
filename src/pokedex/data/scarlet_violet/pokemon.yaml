      descriptions:
        jp_kana:
          scarlet: "じつは　￹臆病￺おくびょう￻な　￹性格￺せいかく￻。\n￹怯￺おび￻えているのが　ばれないように\n￹必死￺ひっし￻に　￹唸￺うな￻り￹声￺ごえ￻を　あげる。"
          violet: "￹唸￺うな￻り￹声￺ごえ￻は　￹相手￺あいて￻を　￹不安￺ふあん￻に\nさせる。　￹普段￺ふだん￻は　のんびり￹屋￺や￻で\n１￹日￺にち￻の　￹半分￺はんぶん￻は　￹寝￺ね￻ているよ。"
        jp_kanji:
          scarlet: "じつは　￹臆病￺おくびょう￻な　￹性格￺せいかく￻。\n￹怯￺おび￻えているのが　ばれないように\n￹必死￺ひっし￻に　￹唸￺うな￻り￹声￺ごえ￻を　あげる。"
          violet: "￹唸￺うな￻り￹声￺ごえ￻は　￹相手￺あいて￻を　￹不安￺ふあん￻に\nさせる。　￹普段￺ふだん￻は　のんびり￹屋￺や￻で\n１￹日￺にち￻の　￹半分￺はんぶん￻は　￹寝￺ね￻ているよ。"
        en:
          scarlet: "In truth, it is a cowardly Pokémon. It growls\neagerly in order to hide its fear from its\nopponent."
          violet: "Its growls make its opponents uneasy. This\nlaid-back Pokémon tends to sleep half the day."
        fr:
          scarlet: "En dépit des apparences, c’est un Pokémon\ncraintif. Il grogne de toutes ses forces pour\ndissimuler sa peur."
          violet: "Ses grognements inspirent la peur chez ses\nadversaires. D’ordinaire, il aime la tranquillité\net passe la moitié de ses journées à dormir."
        it:
          scarlet: "È piuttosto codardo, ma ringhia\na più non posso per nascondere la paura."
          violet: "Emette versi inquietanti, ma di solito è tranquillo\ne passa metà della giornata a dormire."
        de:
          scarlet: "Snubbull ist eigentlich ein feiges Pokémon.\nEs knurrt lautstark, um so seine Angst zu\nverbergen."
          violet: "Snubbulls Knurren jagt Gegnern Angst ein.\nNormalerweise geht es die Dinge gemütlich an\nund schläft den halben Tag."
        es:
          scarlet: "En realidad es muy cobarde. Gruñe con desaforo\nen un intento por disimular su miedo."
          violet: "Sus gruñidos inquietan a sus adversarios.\nNormalmente tiene una personalidad afable\ny se pasa la mitad del día durmiendo."
        ko:
          scarlet: "실은 겁이 많은 성격이다.\n겁먹은 것을 들키지 않기 위해\n필사적으로 으르렁거린다."
          violet: "으르렁거리는 소리는 상대를 불안하게\n만든다. 평소에는 느긋한 성격으로\n하루의 절반은 자고 있다."
        zh_simp:
          scarlet: "其实性格很胆小。\n为了掩饰害怕的样子，\n会拼命发出呜呜声。"
          violet: "呜呜声让对手不安。\n平时是很悠闲的家伙，\n１天中有一半时间都在睡觉哦。"
        zh_trad:
          scarlet: "其實個性相當膽小。\n會拼命地發出低吼聲，\n以防被察覺自己很害怕。"
          violet: "發出的低吼聲讓對手不安。\n平時是很悠閒的傢伙，\n１天中有一半時間都在睡覺。"
