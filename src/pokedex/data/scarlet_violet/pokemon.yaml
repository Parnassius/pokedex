        jp_kanji:
          scarlet: "つねに　お￹尻￺しり￻から　￹出￺で￻ている\n￹特別￺とくべつ￻な　￹一本￺いっぽん￻の　￹糸￺いと￻を\n￹辿￺たど￻っていくと　￹巣￺す￻につながっている。"
          violet: "￹決￺き￻まった　￹場所￺ばしょ￻に　￹巣￺す￻を￹作￺つく￻らず\nあたりが　￹暗￺くら￻くなってから\nエサを　￹探￺さが￻し￹求￺もと￻め　うろつく。"
        en:
          scarlet: "A single strand of a special thread is endlessly\nspun out of its rear. The thread leads back to\nits nest."
          violet: "It wanders in search of food after darkness falls,\nnever nesting in a specific place."
        fr:
          scarlet: "À l’aide de son postérieur, ce Pokémon\ntisse en permanence un fil spécial\nqui mène à son nid."
          violet: "Plutôt que de tisser une toile à un endroit\nprécis, il rôde sur son territoire en quête\nde proies à la nuit tombée."
        it:
          scarlet: "Tesse un filo ininterrotto dalla sua parte\nposteriore. Seguendo il filo si giunge\nal suo nido."
          violet: "Non fa il nido in un luogo specifico. Quando\ncala la notte, va in giro in cerca di cibo."
        de:
          scarlet: "Aus seinem Hinterleib sondert es fortlaufend\neinen speziellen Faden ab. Folgt man diesem,\nso gelangt man zu Ariados’ Nest."
          violet: "Anstatt sein Netz an einem festen Ort\nzu spinnen, wandert es nach Einbruch der\nDunkelheit auf der Suche nach Beute umher."
        es:
          scarlet: "Segrega de forma continua por el abdomen\nuna hebra de un hilo especial cuyo extremo\nconecta con el nido."
          violet: "No acostumbra a anidar en un lugar\ndeterminado. Al caer la noche, ronda\nlos alrededores en busca de sustento."
        ko:
          scarlet: "항상 엉덩이에서 나오는\n특별한 한 가닥의 실을 더듬어 가면\n둥지와 연결되어 있다."
          violet: "일정한 장소에 둥지를 짓지 않으며\n주위가 어두워지고 나서야\n먹이를 찾아 돌아다닌다."
        zh_simp:
          scarlet: "总会从屁股放出一根\n特别的丝，沿着这根丝\n就能到达它的巢。"
          violet: "不会在固定的地方筑巢。\n会等周围都暗下来了，\n再开始四处寻找食物。"
        zh_trad:
          scarlet: "總是從屁股放出一條特別的絲。\n沿著這條絲，就能抵達牠的巢穴。"
          violet: "不會在固定的地方築巢，\n會在周圍都暗下來之後，\n才開始四處尋找食物。"
