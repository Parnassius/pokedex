        - overgrow
      hidden_ability: bulletproof
      descriptions:
        jp_kana:
          scarlet: "￹頭突￺ずつ￻きを　￹当￺あ￻てる　￹寸前￺すんぜん￻　￹力￺ちから￻を\n￹込￺こ￻めると　￹頭￺あたま￻の　トゲが　￹鋭￺するど￻く\n￹尖￺とが￻り　￹敵￺てき￻の　￹体￺からだ￻を　￹貫￺つらぬ￻く。"
          violet: "エサの　￹木￺き￻の￹実￺み￻を　たくさん　￹食￺た￻べると\n￹頭￺あたま￻と　￹体￺からだ￻を　￹覆￺おお￻う　￹樹皮￺じゅひ￻の　￹殻￺から￻が\n￹頑丈￺がんじょう￻に　￹育￺そだ￻つのだ。"
        jp_kanji:
          scarlet: "￹頭突￺ずつ￻きを　￹当￺あ￻てる　￹寸前￺すんぜん￻　￹力￺ちから￻を\n￹込￺こ￻めると　￹頭￺あたま￻の　トゲが　￹鋭￺するど￻く\n￹尖￺とが￻り　￹敵￺てき￻の　￹体￺からだ￻を　￹貫￺つらぬ￻く。"
          violet: "エサの　￹木￺き￻の￹実￺み￻を　たくさん　￹食￺た￻べると\n￹頭￺あたま￻と　￹体￺からだ￻を　￹覆￺おお￻う　￹樹皮￺じゅひ￻の　￹殻￺から￻が\n￹頑丈￺がんじょう￻に　￹育￺そだ￻つのだ。"
        en:
          scarlet: "When Chespin tenses up just before landing a\nheadbutt, the spikes on its head sharpen to\npoints, piercing the enemy’s body on contact."
          violet: "Eating lots of berries makes the bark shell that\ncovers Chespin’s head and body grow sturdier."
        fr:
          scarlet: "Quand il concentre ses forces juste avant l’impact\nde son coup de tête, ses piquants deviennent\nacérés et transpercent le corps de son adversaire."
          violet: "La carapace en écorce qui protège sa tête et\nson corps devient plus solide quand il mange\nbeaucoup de Baies."
        it:
          scarlet: "Quando raccoglie le forze subito prima di tirare\nuna testata, le punte sulla testa diventano aguzze\ne affilate per trapassare il corpo del nemico."
          violet: "Se mangia tante bacche, la corteccia del guscio\nche gli ricopre la testa e il corpo diventa più\nresistente."
        de:
          scarlet: "Nimmt es kurz vor einem Kopfstoß all seine Kraft\nzusammen, werden die Stacheln auf seinem Kopf\nscharf und spitz, um den Gegner zu durchbohren."
          violet: "Wenn es viele Beeren frisst, wird die Baumrinde,\ndie seinen Kopf und Körper bedeckt, dadurch\nrobuster."
        es:
          scarlet: "Cuando acumula energía antes de propinar un\ncabezazo, las púas de su cabeza se vuelven tan\nafiladas que atraviesan el cuerpo del enemigo."
          violet: "Al ingerir muchas bayas, la coraza de corteza\nde árbol que le recubre la cabeza y el cuerpo\nse vuelve más resistente."
        ko:
          scarlet: "박치기가 명중하기 직전에 힘을 주면\n머리의 가시가 뾰족하게 날이 서\n적의 몸을 꿰뚫는다."
          violet: "먹이인 나무열매를 실컷 먹으면\n머리와 몸을 감싸는 나무껍질이\n더욱 튼튼하게 자란다."
        zh_simp:
          scarlet: "若在头锤快命中前注入力量，\n就能让头上的刺变得尖锐，\n并贯穿敌人的身体。"
          violet: "吃下大量树果后，\n覆盖头和身体的树皮壳\n就会结实地成长。"
        zh_trad:
          scarlet: "若在頭錘快命中前集中力量，\n就能讓頭上的刺變得尖銳，\n並貫穿對手的身體。"
          violet: "如果吃下大量的樹果，\n包覆著頭和身體的樹皮殼\n就會長得結實堅固。"
