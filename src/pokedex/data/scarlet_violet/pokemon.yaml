        jp_kanji:
          scarlet: "￹転￺ころ￻がって　￹移動￺いどう￻するので\n￹地面￺じめん￻が　デコボコだと\nショックで　￹爆発￺ばくはつ￻してしまう。"
          violet: "￹発電所￺はつでんしょ￻などに　￹現￺あらわ￻れる。\nモンスターボールと　￹間違￺まちが￻えて\n￹触￺さわ￻って　しびれる　￹人￺ひと￻が　￹多￺おお￻い。"
        en:
          scarlet: "It rolls to move. If the ground is uneven, a sudden\njolt from hitting a bump can cause it to explode."
          violet: "It’s usually found in power plants. Easily mistaken\nfor a Poké Ball, it has zapped many people."
        fr:
          scarlet: "Il se déplace en roulant. Si le sol est cabossé,\nles chocs le font exploser."
          violet: "On le trouve dans des centrales électriques.\nDe nombreuses personnes ont reçu une décharge\naprès l’avoir confondu avec une Poké Ball."
        it:
          scarlet: "Rotola per spostarsi. Se il terreno è irregolare,\npuò esplodere all’improvviso a causa dell’urto\ncontro un dosso."
          violet: "Solitamente si aggira nelle centrali elettriche e\nluoghi simili. Molti lo confondono con una\nPoké Ball, finendo folgorati."
        de:
          scarlet: "Es bewegt sich rollend fort. Rollt es über\nunebenen Boden, kann es plötzlich explodieren."
          violet: "Viele Menschen verwechseln Voltobal mit einem\nPokéball und erhalten beim Anfassen einen\nStromschlag. Es lebt vorwiegend in Kraftwerken."
        es:
          scarlet: "Se mueve rodando. Si el terreno es irregular,\nuna chispa provocada por algún bache lo hará\nexplotar."
          violet: "Suele vivir en centrales de energía. Mucha gente\nacaba muy mal al confundirlo con una Poké Ball."
        ko:
          scarlet: "굴러서 이동하기 때문에\n땅이 울퉁불퉁하면\n충격으로 폭발해 버린다."
          violet: "발전소 등에서 나타난다.\n몬스터볼과 헷갈려서\n만지고 마비되는 사람이 많다."
        zh_simp:
          scarlet: "靠翻滚身体来移动，\n如果地面凹凸不平，\n就会受到冲击而爆炸。"
          violet: "会出现在发电厂等地方。\n很多人都会把它错当成\n精灵球去触碰而被电麻。"
        zh_trad:
          scarlet: "靠著翻滾身體來移動，\n如果地面凹凸不平，\n就會受到衝擊而爆炸。"
          violet: "會出現在發電廠等地方。\n很多人會把牠錯當成\n精靈球去觸碰而被電麻。"
