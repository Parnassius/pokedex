          scarlet: "This Pokémon normally is slow to react, but once\nit enters battle, it will strike down its enemies\nwith lightning-fast movements."
          violet: "Pawmot’s fluffy fur acts as a battery. It can store\nthe same amount of electricity as an electric car."
        fr:
          scarlet: "D’ordinaire, ce Pokémon est plutôt calme,\nmais lorsqu’il se bat, il élimine ses adversaires\navec des mouvements rapides comme l’éclair."
          violet: "Sa fourrure soyeuse fait office de batterie.\nElle peut emmagasiner autant d’énergie\nqu’une voiture électrique."
        it:
          scarlet: "Di solito è piuttosto flemmatico, ma quando si\ntrova a lottare atterra il nemico con movimenti\nfulminei."
          violet: "La sua pelliccia soffice funge da batteria.\nPuò immagazzinare tanta elettricità quanto\nun’automobile elettrica."
        de:
          scarlet: "Dieses Pokémon ist für gewöhnlich sehr gelassen,\ndoch sobald ein Kampf beginnt, streckt es den\nGegner mit blitzschnellen Bewegungen zu Boden."
          violet: "Sein flauschiges Fell dient ihm als Batterie.\nDarin kann es dieselbe Menge an Strom\nspeichern wie ein Elektroauto."
        es:
          scarlet: "Este Pokémon es normalmente bastante calmado,\npero, una vez en combate, derriba a sus rivales\ncon movimientos de una velocidad vertiginosa."
          violet: "Su mullido pelaje actúa como una batería.\nEs capaz de almacenar tanta electricidad como\nun coche eléctrico."
        ko:
          scarlet: "평소에는 느긋하지만\n싸움이 시작되면 전광석화와도 같은\n몸놀림으로 적을 때려눕힌다."
          violet: "복슬복슬한 털이 배터리 역할을 한다.\n전기 자동차에 맞먹는 양의\n전기를 비축할 수 있다."
        zh_simp:
          scarlet: "虽然平时动作慢吞吞的，\n但在不得不面对战斗时，\n会以迅雷不及掩耳的身手击溃敌人。"
          violet: "蓬松的体毛是蓄电池。\n可以储存与电动汽车\n等量的电力。"
        zh_trad:
          scarlet: "雖然平時動作慢吞吞的，但在\n逼不得已要面對戰鬥時，會用\n迅雷不及掩耳的身手擊潰敵人。"
          violet: "膨鬆的體毛是蓄電池，\n可以積蓄與電動汽車\n等量的電力。"
