        - soundproof
      hidden_ability: overcoat
      descriptions:
        jp_kana:
          scarlet: "￹頭￺あたま￻の　ウロコは　￹攻￺せ￻めと　￹守￺まも￻りで\n￹活躍￺かつやく￻。　￹強敵￺きょうてき￻に　￹対￺たい￻しても\n￹背￺せ￻を　￹見￺み￻せず　￹果敢￺かかん￻に　￹立￺た￻ち￹向￺む￻かう。"
          violet: "ウロコを　￹叩￺たた￻く　￹音￺おと￻で　￹仲間￺なかま￻と\nコミュニケーションを　とる。\n￹群￺む￻れで　いると　とても　うるさい。"
        jp_kanji:
          scarlet: "￹頭￺あたま￻の　ウロコは　￹攻￺せ￻めと　￹守￺まも￻りで\n￹活躍￺かつやく￻。　￹強敵￺きょうてき￻に　￹対￺たい￻しても\n￹背￺せ￻を　￹見￺み￻せず　￹果敢￺かかん￻に　￹立￺た￻ち￹向￺む￻かう。"
          violet: "ウロコを　￹叩￺たた￻く　￹音￺おと￻で　￹仲間￺なかま￻と\nコミュニケーションを　とる。\n￹群￺む￻れで　いると　とても　うるさい。"
        en:
          scarlet: "The scale atop its head is useful for both offense\nand defense. It bravely stands and faces its foes\nrather than turning tail, even if its foes are strong."
          violet: "They communicate with their allies using the\nsounds their scales make when struck. A group\nof these Pokémon causes quite a racket."
        fr:
          scarlet: "L’écaille sur sa tête lui sert aussi bien à attaquer\nqu’à se défendre. Il ne s’enfuit jamais et affronte\navec témérité les adversaires les plus redoutables."
          violet: "Il communique avec ses congénères en faisant\ncliqueter ses écailles. Un rassemblement de\nBébécaille est un spectacle extrêmement bruyant."
        it:
          scarlet: "Non fugge neanche davanti ai nemici più forti,\nma li affronta con decisione usando la squama\nsulla testa per attaccare e per difendersi."
          violet: "Comunica con i suoi simili battendo le squame.\nQuando sono in gruppo sono molto rumorosi."
        de:
          scarlet: "Seine Kopfschuppe eignet sich zur Offensive und\nDefensive. Selbst starken Feinden kehrt es nicht\nden Rücken zu, sondern stellt sich ihnen mutig."
          violet: "Miniras kommunizieren durch das Rasseln ihrer\nSchuppen miteinander. Herden von ihnen sind\nsehr laut."
        es:
          scarlet: "No da la espalda ni al enemigo más poderoso,\nsino que lo afronta con osadía. Usa la escama\nde la cabeza con fines ofensivos y defensivos."
          violet: "Se comunica con sus congéneres mediante los\nsonidos que produce al chocar sus escamas.\nCuando forman grupos son muy ruidosos."
        ko:
          scarlet: "머리의 비늘은 공수 양면에서 활약한다.\n강한 적을 상대할 때도\n등을 보이지 않고 과감하게 맞선다."
          violet: "비늘을 두들기는 소리로\n동료와 커뮤니케이션을 취한다.\n무리 지어 있으면 매우 시끄럽다."
        zh_simp:
          scarlet: "头上的鳞片攻守兼备，\n即使面对强敌也会\n正面迎上，勇敢对抗。"
          violet: "通过敲击鳞片的声音\n来和伙伴交流。\n聚在一起时就会非常吵。"
        zh_trad:
          scarlet: "頭部的鱗片能攻亦能守。\n面對強敵也是勇敢迎戰，\n不會讓對手看見自己背後。"
          violet: "會透過敲擊鱗片的聲音\n來與夥伴溝通。\n成群在一起時非常吵。"
