      descriptions:
        jp_kana:
          scarlet: "￹玉￺たま￻を　￹支￺ささ￻える　￹体￺からだ￻は\nほとんど　￹動￺うご￻かないため　￹本体￺ほんたい￻は\n￹玉￺たま￻の￹中￺なか￻にいると　￹考￺かんが￻えられている。"
          violet: "￹玉￺たま￻の￹中￺なか￻に　￹赤￺あか￻ん￹坊￺ぼう￻が　￹眠￺ねむ￻る。\n￹心地￺ここち￻よく　￹眠￺ねむ￻れるように　￹脚￺あし￻で\n￹玉￺たま￻を　まわして　あやしているのだ。"
        jp_kanji:
          scarlet: "￹玉￺たま￻を　￹支￺ささ￻える　￹体￺からだ￻は\nほとんど　￹動￺うご￻かないため　￹本体￺ほんたい￻は\n￹玉￺たま￻の￹中￺なか￻にいると　￹考￺かんが￻えられている。"
          violet: "￹玉￺たま￻の￹中￺なか￻に　￹赤￺あか￻ん￹坊￺ぼう￻が　￹眠￺ねむ￻る。\n￹心地￺ここち￻よく　￹眠￺ねむ￻れるように　￹脚￺あし￻で\n￹玉￺たま￻を　まわして　あやしているのだ。"
        en:
          scarlet: "The body that supports the ball barely moves.\nTherefore, it is thought that the true body of this\nPokémon is actually inside the ball."
          violet: "An infant sleeps inside the ball. Rabsca rolls\nthe ball soothingly with its legs to ensure the\ninfant sleeps comfortably."
        fr:
          scarlet: "Le corps qui porte la sphère bouge à peine.\nOn se demande donc si c’est bien lui\nqui contrôle les actions de ce Pokémon."
          violet: "Il fait doucement tourner sa sphère avec ses\npattes afin d’assurer le confort du nouveau-né\nqui dort à l’intérieur."
        it:
          scarlet: "La parte del corpo che sostiene la sfera si muove\npochissimo. C’è chi ritiene che il suo vero corpo\nsia quello all’interno della sfera stessa."
          violet: "Con le zampe ruota la sfera per cullare e fare\ndormire serenamente il piccolo che si trova\nal suo interno."
        de:
          scarlet: "Der Körper, der die Kugel stützt, regt sich kaum.\nDaher nimmt man an, dass sich der wahre Körper\ndes Pokémon im Inneren der Kugel befindet."
          violet: "Im Inneren seiner Kugel schläft ein Junges.\nSkarabaks dreht die Kugel besänftigend mit\nseinen Beinen, damit dieses gemütlich schläft."
        es:
          scarlet: "El cuerpo que sostiene la bola apenas se mueve,\npor lo que se cree que el cuerpo en el interior\nde esta es quien controla sus acciones."
          violet: "Mece la bola suavemente con las patas para\nasegurar el plácido sueño de la crisálida que\nduerme en su interior."
        ko:
          scarlet: "구슬을 지탱하는 몸은\n거의 움직이지 않기 때문에, 구슬 안에\n본체가 있는 것으로 여겨지고 있다."
          violet: "구슬 안에는 아이가 잠들어 있다.\n편하게 잠들 수 있게\n다리로 구슬을 굴려서 달랜다."
        zh_simp:
          scarlet: "支撑着球的身体几乎不动，\n因此人们认为它的本体\n其实是在球里面。"
          violet: "为了能让睡在球里面的\n宝宝睡得更香甜，会用脚\n转动球，让宝宝感到安心。"
        zh_trad:
          scarlet: "支撐球的身體幾乎不動，\n因此人們認為牠的本體\n其實是在球裡面。"
          violet: "為了讓在球裡睡覺的寶寶\n可以睡得更加香甜，會用腳\n轉著球，讓寶寶感到安穩。"
