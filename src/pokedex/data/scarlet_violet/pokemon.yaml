      descriptions:
        jp_kana:
          scarlet: "￹手￺て￻ごろな　ガイコツを　￹見￺み￻つけて\nお￹尻￺しり￻を　￹防御￺ぼうぎょ￻する　￹習性￺しゅうせい￻。\n￹弱￺よわ￻い　ポケモンを　￹追￺お￻いかけまわす。"
          violet: "￹食￺た￻べ￹盛￺ざか￻りの　￹育￺そだ￻ち￹盛￺ざか￻り。\n￹体￺からだ￻の　￹成長￺せいちょう￻に　あわせて\nガイコツを　￹何度￺なんど￻も　￹履￺は￻き￹替￺か￻えるよ。"
        jp_kanji:
          scarlet: "￹手￺て￻ごろな　ガイコツを　￹見￺み￻つけて\nお￹尻￺しり￻を　￹防御￺ぼうぎょ￻する　￹習性￺しゅうせい￻。\n￹弱￺よわ￻い　ポケモンを　￹追￺お￻いかけまわす。"
          violet: "￹食￺た￻べ￹盛￺ざか￻りの　￹育￺そだ￻ち￹盛￺ざか￻り。\n￹体￺からだ￻の　￹成長￺せいちょう￻に　あわせて\nガイコツを　￹何度￺なんど￻も　￹履￺は￻き￹替￺か￻えるよ。"
        en:
          scarlet: "They tend to guard their posteriors with suitable\nbones they have found. They pursue weak\nPokémon."
          violet: "Its healthy appetite leads to visible growth spurts.\nIt often has to replace the bones it wears as its\nsize increases."
        fr:
          scarlet: "Son instinct le pousse à trouver un crâne adéquat\npour protéger son postérieur. Il a tendance\nà pourchasser les Pokémon les plus faibles."
          violet: "Son gros appétit entraîne des poussées de\ncroissance rapides. Il doit donc régulièrement\nchanger le crâne qui lui sert de couche."
        it:
          scarlet: "Ha l’abitudine di ripararsi il didietro con le ossa\nadatte allo scopo che trova in giro. Dà la caccia\nai Pokémon più deboli."
          violet: "Ha un grande appetito e cresce a vista d’occhio.\nMan mano che la sua taglia aumenta, deve\ncambiare le ossa di cui si veste."
        de:
          scarlet: "Es schlüpft in einen passenden Schädel, um sein\nHinterteil zu schützen, und scheucht schwache\nPokémon umher."
          violet: "Durch seinen ständigen Appetit hat Skallyk\nfortlaufend Wachstumsschübe. Deshalb muss es\nseine Schädelwindel immerzu auswechseln."
        es:
          scarlet: "Usa una calavera del tamaño apropiado para\nproteger sus posaderas. Es proclive a perseguir\nPokémon débiles."
          violet: "Demuestra un voraz apetito y aumenta de\ntamaño a ojos vistas. Su continuo crecimiento\nlo obliga a cambiar varias veces de calavera."
        ko:
          scarlet: "적당한 해골을 찾아내서\n엉덩이를 방어하는 습성이 있다.\n약한 포켓몬을 쫓아 돌아다닌다."
          violet: "한창 먹고 자랄 때다.\n몸의 성장에 맞춰서\n해골을 몇 번이고 갈아입는다."
        zh_simp:
          scarlet: "拥有会寻找合适的骸骨\n来保护屁股的习性。\n会追赶着弱小的宝可梦到处跑。"
          violet: "正处于食欲旺盛的发育期。\n为了配合身体的成长，\n会多次更换所穿的骸骨哦。"
        zh_trad:
          scarlet: "有著會去尋找合適的骸骨\n來保護屁股的習性。\n會追著弱小的寶可夢到處跑。"
          violet: "正處於食慾旺盛的發育期。\n為了配合身體的成長，\n會多次更換所穿的骨頭。"
