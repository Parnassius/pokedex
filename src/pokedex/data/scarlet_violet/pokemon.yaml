      types:
        - ghost
        - fairy
      egg_groups:
        - amorphous
      abilities:
        - disguise
      descriptions:
        jp_kana:
          scarlet: "ピカチュウの　ふりを　￹続￺つづ￻けながら\n￹折￺お￻れてしまった　￹首￺くび￻を　￹直￺なお￻そうと\n￹布￺ぬの￻の　￹中￺なか￻で　もがいている。"
          violet: "ダメージを　￹受￺う￻けて　￹布￺ぬの￻の　￹頭￺あたま￻を\n￹支￺ささ￻えられなくなった。　￹攻撃￺こうげき￻した\n￹相手￺あいて￻は　￹一生￺いっしょう￻　￹忘￺わす￻れない。"
        jp_kanji:
          scarlet: "ピカチュウの　ふりを　￹続￺つづ￻けながら\n￹折￺お￻れてしまった　￹首￺くび￻を　￹直￺なお￻そうと\n￹布￺ぬの￻の　￹中￺なか￻で　もがいている。"
          violet: "ダメージを　￹受￺う￻けて　￹布￺ぬの￻の　￹頭￺あたま￻を\n￹支￺ささ￻えられなくなった。　￹攻撃￺こうげき￻した\n￹相手￺あいて￻は　￹一生￺いっしょう￻　￹忘￺わす￻れない。"
        en:
          scarlet: "Even as it struggles beneath the cloth to repair\nthe broken neck of its disguise, Mimikyu keeps\nup its impersonation of Pikachu."
          violet: "It has taken damage and can no longer hold the\nhead of its cloth disguise upright. For as long as\nit lives, Mimikyu will never forget its attacker."
        fr:
          scarlet: "Tout en continuant à se faire passer pour\nun Pikachu, il s’agite sous son déguisement,\ncar il essaie d’en réparer le cou cassé."
          violet: "Ce Pokémon a subi des dégâts et ne parvient\nplus à garder la tête de son déguisement droite.\nIl n’oubliera jamais la personne qui l’a attaqué."
        it:
          scarlet: "Continua a fingersi un Pikachu mentre si affanna\nall’interno del panno per riparare il collo rotto\ndel suo travestimento."
          violet: "Il danno subito ha tolto il sostegno alla testa\nfatta di panno. Non dimenticherà l’avversario\nche lo ha attaccato finché avrà vita."
        de:
          scarlet: "Während es weiterhin vorgibt, Pikachu zu sein,\nversucht es unter seinem Lumpen unentwegt,\nden umgeknickten Hals des Kostüms zu richten."
          violet: "Erlittener Schaden nahm dem Kopf seines aus\nLumpen gefertigten Kostüms den Halt. Den\nAngreifer vergisst es bis ans Lebensende nicht."
        es:
          scarlet: "Sigue fingiendo ser un Pikachu mientras, dentro\ndel saco, se las ve y se las desea para reparar\nel cuello roto del disfraz."
          violet: "No puede mantener firme la cabeza del disfraz\ntras haber recibido daño. Jamás olvida a quien\nlo ha herido."
        ko:
          scarlet: "계속 피카츄를 흉내 내면서\n부러진 목을 고치기 위해\n천 안에서 발버둥 치고 있다."
          violet: "데미지를 입어서 천의 머리 부분을\n지탱할 수 없게 되었다.\n자신을 공격한 상대를 평생 잊지 않는다."
        zh_simp:
          scarlet: "一边假装自己是皮卡丘，\n一边在布里挣扎着，\n试图摆正折断的脖子。"
          violet: "受到伤害而无法再支撑起\n布料的头。它一辈子都不会\n忘记攻击了自己的对手。"
        zh_trad:
          scarlet: "會一邊假裝自己是皮卡丘，\n一邊拼命地在布裡面\n試圖擺正折斷的脖子。"
          violet: "受到傷害而變得支撐不起\n破布的頭。一輩子都不會\n忘記攻擊了自己的對手。"
