        jp_kana:
          scarlet: "￹大￺おお￻きな　￹前歯￺まえば￻は　まだ　￹生￺は￻えかけ。\n￹歯￺は￻が　かゆいときは　￹仲間￺なかま￻の　ツノに\nパクリと　￹噛￺か￻みつき　じゃれあう。"
          violet: "カムカメが　￹噛￺か￻みついた　￹枝￺えだ￻を\n￹持￺も￻ち￹上￺あ￻げ　￹食￺く￻いついている　￹時間￺じかん￻を\n￹競￺きそ￻う　￹遊￺あそ￻びが　￹子￺こ￻どもに　￹人気￺にんき￻。"
        jp_kanji:
          scarlet: "￹大￺おお￻きな　￹前歯￺まえば￻は　まだ　￹生￺は￻えかけ。\n￹歯￺は￻が　かゆいときは　￹仲間￺なかま￻の　ツノに\nパクリと　￹噛￺か￻みつき　じゃれあう。"
          violet: "カムカメが　￹噛￺か￻みついた　￹枝￺えだ￻を\n￹持￺も￻ち￹上￺あ￻げ　￹食￺く￻いついている　￹時間￺じかん￻を\n￹競￺きそ￻う　￹遊￺あそ￻びが　￹子￺こ￻どもに　￹人気￺にんき￻。"
        en:
          scarlet: "Its large front tooth is still growing in. When the\ntooth itches, this Pokémon will bite another\nChewtle’s horn, and the two Pokémon will tussle."
          violet: "A popular game among children is to lift up sticks\nthat Chewtle have bitten onto to see whose\nChewtle can hang on the longest."
        fr:
          scarlet: "Son incisive continue à pousser. Lorsqu’elle\nle démange, il joue avec un de ses congénères\net lui mord la corne."
          violet: "Les enfants s’amusent à brandir les branches\nque des Khélocrok sont en train de mordre pour\nvoir lequel restera accroché le plus longtemps."
        it:
          scarlet: "Il suo grande incisivo sta ancora crescendo e,\nquando gli causa prurito, questo Pokémon gioca\na mordicchiare il corno dei suoi simili."
          violet: "Un gioco popolare tra i bambini consiste nel\nsollevare rami che i Chewtle stanno mordendo\ne vedere quale di loro molla la presa più tardi."
        de:
          scarlet: "Juckt sein noch im Wachstum befindlicher großer\nVorderzahn, schnappt es nach dem Horn eines\nArtgenossen und tobt mit diesem herum."
          violet: "Bei einem beliebten Kinderspiel hebt man Äste\nhoch, in die sich Kamehaps verbissen haben, und\nvergleicht, welches am längsten hängen bleibt."
        es:
          scarlet: "Su gran incisivo no le ha terminado de salir.\nCuando le molesta, juguetea con uno de sus\ncompañeros mordisqueándole el cuerno."
          violet: "Un juego popular entre los niños consiste en\nlevantar las ramas que estén mordiendo los\nChewtle y ver cuál aguanta más en el aire."
        ko:
          scarlet: "커다란 앞니는 난 지 얼마 되지 않았다.\n이빨이 가려울 때는 동료의 뿔을\n덥석 물면서 장난을 친다."
          violet: "깨물부기가 물고 있는 나뭇가지를 들어 올려\n버티는 시간을 겨루는 놀이가\n아이들 사이에서 인기다."
        zh_simp:
          scarlet: "大大的门牙还未长全。\n牙齿发痒的时候会和伙伴们\n大口咬住彼此的角来玩。"
          violet: "拿起咬咬龟咬着的树枝，\n比赛哪只咬咬龟咬住不放的时间最久，\n是种在孩童之间很流行的游戏。"
        zh_trad:
          scarlet: "大大的門牙還未長全。\n牙齒癢的時候會和夥伴們\n大口咬住彼此的角來玩。"
          violet: "拿起咬咬龜咬著的樹枝，\n比賽誰的能咬住不放最久，\n是種在孩童間很流行的遊戲。"
