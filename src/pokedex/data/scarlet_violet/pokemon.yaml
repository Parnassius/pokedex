      descriptions:
        jp_kana:
          scarlet: "￹臨終￺りんじゅう￻の　￹際￺さい￻に　￹現￺あらわ￻れて\n￹魂￺たましい￻が　￹肉体￺にくたい￻を　￹離￺はな￻れると\nすかさず　￹吸￺す￻い￹取￺と￻ってしまうのだ。"
          violet: "￹魂￺たましい￻を　￹吸￺す￻いとり　￹火￺ひ￻を￹灯￺とも￻す。\n￹人￺ひと￻が　￹死￺し￻ぬのを　￹待￺ま￻つため\n￹病院￺びょういん￻を　うろつくようになった。"
        jp_kanji:
          scarlet: "￹臨終￺りんじゅう￻の　￹際￺さい￻に　￹現￺あらわ￻れて\n￹魂￺たましい￻が　￹肉体￺にくたい￻を　￹離￺はな￻れると\nすかさず　￹吸￺す￻い￹取￺と￻ってしまうのだ。"
          violet: "￹魂￺たましい￻を　￹吸￺す￻いとり　￹火￺ひ￻を￹灯￺とも￻す。\n￹人￺ひと￻が　￹死￺し￻ぬのを　￹待￺ま￻つため\n￹病院￺びょういん￻を　うろつくようになった。"
        en:
          scarlet: "Lampent appears at the moment of death and\npromptly absorbs the spirit as it leaves the body."
          violet: "The spirits it absorbs fuel its baleful fire. It hangs\naround hospitals waiting for people to pass on."
        fr:
          scarlet: "Il apparaît au moment du trépas\net aspire l’âme à l’instant même\noù elle quitte le corps."
          violet: "Ce Pokémon doit aspirer des âmes pour\nentretenir sa flamme. Il erre donc dans\nles hôpitaux dans l’attente d’un trépas."
        it:
          scarlet: "Appare quando qualcuno è prossimo alla morte\nper risucchiarne l’anima non appena questa\nabbandona il corpo."
          violet: "La sua fiamma è alimentata dalle anime che\nrisucchia. Si aggira per gli ospedali in attesa\ndi decessi."
        de:
          scarlet: "Es erscheint im Augenblick des Todes und\nverschlingt die Seele des Verblichenen sofort,\nnachdem sie den Körper verlassen hat."
          violet: "Laternecto verschlingt Seelen, um seine Flamme\nzu nähren. Es streift durch Krankenhäuser und\nwartet darauf, dass Menschen verscheiden."
        es:
          scarlet: "Aparece en los instantes previos al\nfallecimiento de alguien y absorbe el\nalma en cuanto esta se separa del cuerpo."
          violet: "Absorbe almas para mantener viva su llama.\nSuele deambular por los hospitales mientras\nespera a que la gente fallezca."
        ko:
          scarlet: "임종 때 나타나서\n영혼이 육체를 떠나면\n재빨리 빨아들여 버린다."
          violet: "영혼을 빨아들여 불을 밝힌다.\n사람이 죽는 것을 기다리기 위해\n병원을 서성거리게 되었다."
        zh_simp:
          scarlet: "在人类的临终时刻出现。\n当人的魂魄离开肉体的瞬间，\n它就会立即吸取。"
          violet: "吸取灵魂来点亮灯火。\n为了等待人类死去，\n而在医院里彷徨游荡。"
        zh_trad:
          scarlet: "在人臨死之際現身，\n當靈魂離開肉體的瞬間，\n就會立刻吸取。"
          violet: "吸取靈魂來點亮燈火。\n為了等待人類死去，\n而在醫院裡徘徊遊蕩。"
