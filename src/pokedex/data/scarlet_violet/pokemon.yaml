          scarlet: "１０００￹枚￺まい￻の　コインで　￹体￺からだ￻が\nできているらしい。　￹人懐￺ひとなつ￻こく\nだれとでも　すぐに　￹仲良￺なかよ￻くなれる。"
          violet: "コインが　￹積￺つ￻みあがって　￹作￺つく￻られた\n￹体￺からだ￻は　￹頑丈￺がんじょう￻。　コインを　￹連射￺れんしゃ￻して\n￹敵￺てき￻を　￹圧倒￺あっとう￻する。"
        jp_kanji:
          scarlet: "１０００￹枚￺まい￻の　コインで　￹体￺からだ￻が\nできているらしい。　￹人懐￺ひとなつ￻こく\nだれとでも　すぐに　￹仲良￺なかよ￻くなれる。"
          violet: "コインが　￹積￺つ￻みあがって　￹作￺つく￻られた\n￹体￺からだ￻は　￹頑丈￺がんじょう￻。　コインを　￹連射￺れんしゃ￻して\n￹敵￺てき￻を　￹圧倒￺あっとう￻する。"
        en:
          scarlet: "Its body seems to be made up of 1,000 coins.\nThis Pokémon gets along well with others and is\nquick to make friends with anybody."
          violet: "It has a sturdy body made up of stacked coins.\nGholdengo overwhelms its enemies by firing coin\nafter coin at them in quick succession."
        fr:
          scarlet: "Son corps serait composé de 1 000 pièces.\nSociable, il peut se lier d’amitié très rapidement\navec n’importe qui."
          violet: "Son corps robuste est composé de pièces\nempilées. Il accable ses adversaires en leur\nlançant des rafales de pièces."
        it:
          scarlet: "Pare che il suo corpo sia formato da 1.000\nmonete. È molto socievole e fa subito amicizia\ncon chiunque."
          violet: "Il suo corpo, formato da pile di monete, è molto\nrobusto. Annienta i nemici lanciando raffiche di\nmonete."
        de:
          scarlet: "Sein Körper soll aus 1000 Münzen bestehen.\nEs ist sehr umgänglich und schließt mit jedem\nrasch Freundschaft."
          violet: "Sein robuster Körper besteht aus gestapelten\nMünzen, die es in rascher Folge auf Feinde\nschießt, um sie zu überwältigen."
        es:
          scarlet: "Se dice que su cuerpo está formado por 1000\nmonedas. Es capaz de hacer buenas migas con\ncualquiera rápidamente por su sociabilidad."
          violet: "Su cuerpo está compuesto de monedas unidas\nentre sí, por lo que es muy resistente. Abruma\na sus enemigos disparándolas en ráfagas."
        ko:
          scarlet: "몸은 1000개의 코인으로\n이뤄져 있다고 한다. 붙임성이 좋아서\n누구와도 금방 친해진다."
          violet: "코인이 쌓여서 만들어진 몸은\n상당히 튼튼하다.\n코인을 연속으로 발사해서 상대를 압도한다."
        zh_simp:
          scarlet: "据说它的身体是由１０００枚\n硬币组成的。喜欢与人亲近，\n不管与谁都能立刻处好关系。"
          violet: "硬币堆叠起来而形成的\n身体非常结实。会连续\n发射硬币来压制敌人。"
        zh_trad:
          scarlet: "據說身體是由１０００枚硬幣\n所組成的。喜歡與人親近，\n不管與誰都能馬上變得融洽。"
          violet: "堆疊硬幣而形成的身體\n結實堅固。會連續發射\n硬幣來壓制敵人。"
