        jp_kana:
          scarlet: "￹紅茶￺こうちゃ￻で　できた　￹体￺からだ￻は\nクセは　あるものの　￹美味￺おい￻しいが\n￹飲￺の￻みすぎると　￹死￺し￻んでしまうことも。"
          violet: "ティーポットに　￹忍￺しの￻びこんで\n￹飲￺の￻みかけの　￹紅茶￺こうちゃ￻の　￹中￺なか￻に\n￹自分￺じぶん￻を　￹注￺そそ￻いで　￹増￺ふ￻えていく。"
        jp_kanji:
          scarlet: "￹紅茶￺こうちゃ￻で　できた　￹体￺からだ￻は\nクセは　あるものの　￹美味￺おい￻しいが\n￹飲￺の￻みすぎると　￹死￺し￻んでしまうことも。"
          violet: "ティーポットに　￹忍￺しの￻びこんで\n￹飲￺の￻みかけの　￹紅茶￺こうちゃ￻の　￹中￺なか￻に\n￹自分￺じぶん￻を　￹注￺そそ￻いで　￹増￺ふ￻えていく。"
        en:
          scarlet: "The tea that composes Polteageist’s body has a\ndistinct and enjoyable flavor. Drinking too much,\nhowever, can be fatal."
          violet: "These Pokémon multiply by creeping into teapots\nand pouring themselves into leftover tea."
        fr:
          scarlet: "Son corps constitué de thé noir a un goût assez\nparticulier, mais délicieux. Néanmoins, en boire\ntrop peut être fatal."
          violet: "Il s’introduit dans des théières et se verse\nsur des restes de thé noir pour créer des\nThéffroi et ainsi faire perdurer l’espèce."
        it:
          scarlet: "Il suo corpo, costituito di tè, ha un sapore\npeculiare ma piacevole. Tuttavia, berne\ntroppo può essere fatale."
          violet: "Si introduce furtivamente nelle teiere e versa\nparte del suo corpo nel tè avanzato, creando\ncosì nuovi Sinistea."
        de:
          scarlet: "Sein aus Schwarztee bestehender Körper hat\nein markantes, doch angenehmes Aroma.\nÜbermäßiger Genuss kann aber zum Tod führen."
          violet: "Es kriecht in Teekannen und ergießt sich über\nnicht ausgetrunkenen Schwarztee, um sich zu\nvermehren."
        es:
          scarlet: "Su cuerpo, hecho de té, tiene un sabor particular\npero agradable. Sin embargo, beber demasiado\npuede resultar mortal."
          violet: "Se esconde dentro de teteras y se vierte en\ntés a medio beber para generar un Sinistea\ny así propagar la especie."
        ko:
          scarlet: "홍차로 된 몸은\n독특하면서도 맛있지만\n너무 마시면 죽을 수도 있다."
          violet: "찻주전자에 숨어들고는\n마시다 만 홍차 안에\n자신을 주입해서 수를 늘린다."
        zh_simp:
          scarlet: "由红茶组成的身体\n风味独特又不失美味，\n但饮用过量可能会致死。"
          violet: "会潜入茶壶里，然后把\n自己倒进喝到一半的\n红茶里来增加份量。"
        zh_trad:
          scarlet: "以紅茶構成的身體\n風味獨特卻不失美味，\n但飲用過量可能致死。"
          violet: "會潛入茶壺裡，然後把\n自己倒進喝到一半的\n紅茶裡來使茶量變多。"
