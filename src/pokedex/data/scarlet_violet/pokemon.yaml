        jp_kanji:
          scarlet: "カチコールを　￹乗￺の￻せて　￹歩￺ある￻いていると\nハルクジラの　￹群￺む￻れと　￹出￺で￻くわすが\n￹争￺あらそ￻わないように　やり￹過￺す￻ごす。"
          violet: "￹氷￺こおり￻の　￹巨体￺きょたい￻で　￹邪魔者￺じゃまもの￻は\nすべて　￹圧￺お￻し￹潰￺つぶ￻す。　￹海￺うみ￻に　￹浮￺う￻かぶ\n￹姿￺すがた￻は　￹流氷￺りゅうひょう￻　そっくり。"
        en:
          scarlet: "As Avalugg walks along with Bergmite\non its back, it comes across pods of\nCetitan. It lets them pass to avoid conflict."
          violet: "This Pokémon uses its massive icy body to flatten\nanything that gets in its way. When it’s floating\nout on the ocean, it looks exactly like drift ice."
        fr:
          scarlet: "Il se déplace avec des Grelaçon sur le dos.\nS’il croise des groupes de Balbalèze,\nil les laisse passer pour éviter tout conflit."
          violet: "Ce géant de glace écrase tous les obstacles\nsans distinction. Lorsqu’il flotte sur la\nmer, il ressemble à s’y méprendre à un iceberg."
        it:
          scarlet: "Quando cammina con dei Bergmite sul dorso,\nspesso incontra branchi di Cetitan, ma li lascia\npassare per evitare conflitti."
          violet: "Schiaccia qualsiasi cosa lo intralci con il\nsuo enorme corpo di ghiaccio. Quando galleggia\nnel mare, è tale e quale a un pezzo di banchisa."
        de:
          scarlet: "Trägt es Arktip auf dem Rücken und begegnet\ndann einer Gruppe Kolowal, lässt es sie\nvorbeiziehen, damit es nicht zu Streit kommt."
          violet: "Sein gigantischer Eiskörper zerschmettert alles,\nwas ihm in die Quere kommt. Treibt es im Meer,\nsieht es einer Eisscholle zum Verwechseln ähnlich."
        es:
          scarlet: "Suele toparse con manadas de Cetitan mientras\ncamina con algún Bergmite en el lomo, pero\nprefiere pasar de largo para evitar disputas."
          violet: "Usa su gigantesco cuerpo helado para aplastar\ntodo obstáculo que se cruce. Es fácil confundirlo\ncon hielo a la deriva cuando flota en el mar."
        ko:
          scarlet: "꽁어름을 태우고 걷다가\n우락고래 무리를 만나면\n싸움이 일어나지 않게 지나간다."
          violet: "얼음으로 된 거대한 몸으로\n방해되는 것은 모조리 뭉개 버린다.\n바다에 떠 있는 모습은 유빙과 똑 닮았다."
        zh_simp:
          scarlet: "把冰宝驮在背上走动时，\n即使碰上浩大鲸的群体也会\n为了避免争斗而让它们先通过。"
          violet: "会用巨大的冰之身躯\n压扁所有碍事的家伙。\n它漂在海上的样子就像浮冰一样。"
        zh_trad:
          scarlet: "把冰寶馱在背上走動時，\n即使碰上浩大鯨的群體，\n也會避免爭鬥而讓牠們先通過。"
          violet: "會用巨大的冰之身軀\n壓扁所有礙事的傢伙。\n漂在海上的樣子和浮冰沒兩樣。"
