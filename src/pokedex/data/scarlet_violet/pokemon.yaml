      descriptions:
        jp_kana:
          scarlet: "ロトム￹図鑑￺ずかん￻が　￹誕生￺たんじょう￻する\nきっかけとなった　￹家電製品￺かでんせいひん￻の\nひとつが　￹芝刈￺しばか￻り￹機￺き￻なのだ。"
          violet: "￹芝刈￺しばか￻り￹機￺き￻に　￹入￺はい￻った　￹姿￺すがた￻。\n￹花￺はな￻や　￹草￺くさ￻を　なぎ￹払￺はら￻うと\n￹自信満々￺じしんまんまん￻に　￹威張￺いば￻っている。"
        jp_kanji:
          scarlet: "ロトム￹図鑑￺ずかん￻が　￹誕生￺たんじょう￻する\nきっかけとなった　￹家電製品￺かでんせいひん￻の\nひとつが　￹芝刈￺しばか￻り￹機￺き￻なのだ。"
          violet: "￹芝刈￺しばか￻り￹機￺き￻に　￹入￺はい￻った　￹姿￺すがた￻。\n￹花￺はな￻や　￹草￺くさ￻を　なぎ￹払￺はら￻うと\n￹自信満々￺じしんまんまん￻に　￹威張￺いば￻っている。"
        en:
          scarlet: "The lawn mower is one of the household\nappliances that led to the development of\nthe Rotom Dex."
          violet: "This Rotom has possessed a lawn mower. It will\nmow down grass and flowers, then swagger\naround with pride at its accomplishments."
        fr:
          scarlet: "La tondeuse à gazon est l’un des appareils\nélectroménagers qui ont permis la création\ndu Motisma-Dex."
          violet: "Ce Motisma a pris possession d’une tondeuse à\ngazon. Lorsqu’il coupe de l’herbe ou des fleurs,\nil se pavane."
        it:
          scarlet: "Il tagliaerba è uno degli elettrodomestici che\nhanno reso possibile la creazione del Pokédex\nRotom."
          violet: "Ha assunto questa forma entrando in un\ntagliaerba. Falcia fiori e piante per poi darsi\ngrandi arie."
        de:
          scarlet: "Der Rasenmäher ist eines der elektrischen\nHaushaltsgeräte, die zur Entwicklung des\nRotom-Pokédex führten."
          violet: "Dieses Rotom ist in einen Rasenmäher\neingedrungen. Es mäht Gras und Blumen\nnieder und prahlt dann selbstbewusst damit."
        es:
          scarlet: "El cortacésped es uno de los aparatos que\nimpulsaron el desarrollo de la RotomDex."
          violet: "Asume esta forma cuando toma posesión de\nun cortacésped. Corta las flores y el césped\ny luego se pavonea con orgullo de su trabajo."
        ko:
          scarlet: "로토무도감이 만들어진\n계기가 된 가전제품 중 하나가\n바로 잔디깎이였다."
          violet: "잔디깎이에 들어간 모습.\n꽃이나 풀을 베어 버리고는\n자신만만하다는 듯이 으스댄다."
        zh_simp:
          scarlet: "成为了洛托姆图鉴的\n诞生契机的其中一个\n家电产品就是割草机。"
          violet: "钻进割草机的样子。\n砍倒花草后，它会\n自信满满地耀武扬威。"
        zh_trad:
          scarlet: "成為洛托姆圖鑑\n誕生契機的其中一樣\n家電用品就是割草機。"
          violet: "鑽進了割草機的樣子。\n砍倒花草後會耀武揚威，\n一副自信滿滿的樣子。"
