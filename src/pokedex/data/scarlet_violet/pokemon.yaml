      descriptions:
        jp_kana:
          scarlet: "￹激￺はげ￻しく　￹流￺なが￻れ￹落￺お￻ちる　￹滝￺たき￻に\n￹守￺まも￻られながら　￹脱皮￺だっぴ￻を　￹繰￺く￻り￹返￺かえ￻し\nどんどん　￹大￺おお￻きくなる。"
          violet: "￹生￺う￻まれたときから　すでに　￹大￺おお￻きい。\n￹脱皮￺だっぴ￻を　￹繰￺く￻り￹返￺かえ￻しては\nどんどん　￹育￺そだ￻って　￹長￺なが￻くなる。"
        jp_kanji:
          scarlet: "￹激￺はげ￻しく　￹流￺なが￻れ￹落￺お￻ちる　￹滝￺たき￻に\n￹守￺まも￻られながら　￹脱皮￺だっぴ￻を　￹繰￺く￻り￹返￺かえ￻し\nどんどん　￹大￺おお￻きくなる。"
          violet: "￹生￺う￻まれたときから　すでに　￹大￺おお￻きい。\n￹脱皮￺だっぴ￻を　￹繰￺く￻り￹返￺かえ￻しては\nどんどん　￹育￺そだ￻って　￹長￺なが￻くなる。"
        en:
          scarlet: "It sheds many layers of skin as it grows larger.\nDuring this process, it is protected by a rapid\nwaterfall."
          violet: "It is born large to start with. It repeatedly sheds\nits skin as it steadily grows longer."
        fr:
          scarlet: "Ce Pokémon grandit en muant à répétition.\nLors de ce processus, il s’abrite derrière\nune puissante cascade."
          violet: "Déjà grand dès sa naissance, il devient encore\nplus long à chacune de ses fréquentes mues."
        it:
          scarlet: "Cresce cambiando ripetutamente la pelle.\nDurante la muta, si protegge tra le acque\nimpetuose di una cascata."
          violet: "Già grande alla nascita, continua poi a crescere,\ncambiando ripetutamente la pelle."
        de:
          scarlet: "Es häutet sich, um zu wachsen. Dabei wird es von\neinem tosenden Wasserfall beschützt."
          violet: "Es ist bereits bei Geburt sehr groß. Durch\npermanentes Häuten wächst es schnell und wird\nnoch länger."
        es:
          scarlet: "Durante la etapa de crecimiento, muda muchas\nveces de piel y se protege mediante una\ncascada."
          violet: "Al nacer ya tiene un tamaño considerable.\nMuda continuamente de piel a la vez que crece."
        ko:
          scarlet: "세차게 떨어지는 폭포의 보호를 받으며\n탈피를 거듭해 점점 크게 자란다."
          violet: "태어났을 때부터 이미 크다.\n탈피를 반복해서\n점점 자라나 길어진다."
        zh_simp:
          scarlet: "在飞流直下的瀑布的\n保护下反复蜕皮，\n逐渐变得越来越大。"
          violet: "出生的时候就已经很大了。\n在反复蜕皮的成长过程中，\n身体会变得越来越长。"
        zh_trad:
          scarlet: "會在直瀉而下的瀑布\n保護下反覆蛻皮，\n使身體變得越來越大。"
          violet: "從出生開始就已經很大一隻。\n在反覆蛻皮的成長過程中，\n身體會變得越來越長。"
