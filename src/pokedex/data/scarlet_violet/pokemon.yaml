      descriptions:
        jp_kana:
          scarlet: "ナルシストで　￹綺麗好￺きれいず￻き。\nマメに　お￹手入￺てい￻れ　してあげないと\nいうことを　￹聞￺き￻かなく　なることも。"
          violet: "￹刃羽根￺はばね￻と　￹呼￺よ￻ばれる　￹鋭￺するど￻い　￹羽根￺はね￻を\n￹敵￺てき￻や　￹獲物￺えもの￻に　￹投￺な￻げつける。\nほぼ　￹百発百中￺ひゃっぱつひゃくちゅう￻　だ。"
        jp_kanji:
          scarlet: "ナルシストで　￹綺麗好￺きれいず￻き。\nマメに　お￹手入￺てい￻れ　してあげないと\nいうことを　￹聞￺き￻かなく　なることも。"
          violet: "￹刃羽根￺はばね￻と　￹呼￺よ￻ばれる　￹鋭￺するど￻い　￹羽根￺はね￻を\n￹敵￺てき￻や　￹獲物￺えもの￻に　￹投￺な￻げつける。\nほぼ　￹百発百中￺ひゃっぱつひゃくちゅう￻　だ。"
        en:
          scarlet: "This narcissistic Pokémon is a clean freak.\nIf you don’t groom it diligently, it may stop\nlistening to you."
          violet: "It throws sharp feathers called blade quills at\nenemies or prey. It seldom misses."
        fr:
          scarlet: "Ce Pokémon narcissique accorde énormément\nd’importance à la propreté. Il refuse parfois\nd’obéir si l’on ne prend pas grand soin de lui."
          violet: "Il lance des plumes aussi affilées que des lames\nde rasoir sur ses adversaires et ses proies. Il ne\nrate quasiment jamais sa cible."
        it:
          scarlet: "È un narciso e ama la pulizia al punto di smettere\ndi obbedire se non ci si prende cura di lui come\nsi deve."
          violet: "Bersaglia nemici e prede con le sue piume\naffilate. Non manca quasi mai il bersaglio."
        de:
          scarlet: "Es ist selbstverliebt und legt großen Wert auf\nSauberkeit. Wenn man es nicht ordentlich pflegt,\nwidersetzt es sich manchmal sogar Befehlen."
          violet: "Es wirft „Flügelklingen“ genannte messerscharfe\nFedern nach Feind und Beute. Dabei erreicht es\neine nahezu hundertprozentige Trefferquote."
        es:
          scarlet: "Es narcisista y bastante pulcro, por lo que, si\nno se le dedica suficiente atención a su aseo,\nse niega a obedecer cualquier orden."
          violet: "Ataca a sus presas y enemigos lanzándoles\nplumas sorprendentemente afiladas. Acierta\nprácticamente siempre."
        ko:
          scarlet: "나르시시스트로 깔끔한 걸 좋아한다.\n자주 관리해 주지 않으면\n말을 안 듣기도 한다."
          violet: "칼날깃이라고 불리는 날카로운\n깃털을 적이나 먹잇감에 날린다.\n거의 백발백중이다."
        zh_simp:
          scarlet: "非常自恋，又爱美。\n如果不勤快地给它打理，\n或许会不听话。"
          violet: "将被称为刃羽的锐利羽毛\n投向敌人和猎物。\n基本上百发百中。"
        zh_trad:
          scarlet: "個性自戀又愛美，\n如果不勤快地為牠打理外表，\n牠有可能會因此變得不聽話。"
          violet: "將被稱為刃羽的銳利羽毛\n射向敵人或獵物。\n基本上百發百中。"
