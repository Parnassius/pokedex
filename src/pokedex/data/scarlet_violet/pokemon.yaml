          violet: "￹浴￺あ￻びた　￹日差￺ひざ￻しを　エネルギーに\n￹変換￺へんかん￻するため　￹昼間￺ひるま￻は　ずっと\n￹太陽￺たいよう￻の￹方￺ほう￻を　￹向￺む￻いている。"
        jp_kanji:
          scarlet: "￹昼間￺ひるま￻は　むやみやたらと　￹元気￺げんき￻に\n￹動￺うご￻きまわるが　￹日￺ひ￻が　￹沈￺しず￻むと\nばったり　￹動￺うご￻かなくなる。"
          violet: "￹浴￺あ￻びた　￹日差￺ひざ￻しを　エネルギーに\n￹変換￺へんかん￻するため　￹昼間￺ひるま￻は　ずっと\n￹太陽￺たいよう￻の￹方￺ほう￻を　￹向￺む￻いている。"
        en:
          scarlet: "In the daytime, it rushes about in a hectic\nmanner, but it comes to a complete stop when\nthe sun sets."
          violet: "Since it converts sunlight into energy, it is always\nlooking in the direction of the sun."
        fr:
          scarlet: "En journée, il court énergiquement dans\ntous les sens, mais il s’arrête net dès que\nla nuit tombe."
          violet: "Les rayons du soleil lui donnant de l’énergie,\nil s’oriente toujours dans la direction de l’astre\ndu jour."
        it:
          scarlet: "Di giorno si muove freneticamente, ma quando\ncala il sole si ferma e interrompe ogni attività."
          violet: "Durante il giorno è sempre rivolto verso il sole\nper assorbirne i raggi e trasformarli in energia."
        de:
          scarlet: "Tagsüber rennt es rastlos umher, aber sobald\ndie Sonne untergegangen ist, stellt es jegliche\nAktivität ein."
          violet: "Tagsüber richtet es sich stets auf die Sonne aus,\num ihr Licht aufzufangen und in Energie\numzuwandeln."
        es:
          scarlet: "De día, corre histérico de un lado a otro, pero,\ncuando se pone el sol, se detiene por completo."
          violet: "Durante el día, está constantemente orientado\nhacia el sol para convertir sus rayos en energía."
        ko:
          scarlet: "낮에는 지나칠 정도로 활발히\n돌아다니지만 해가 저물면\n돌연 움직이지 않게 된다."
          violet: "쬔 햇볕을 에너지로 변환하기 위해\n낮에는 계속 태양 쪽을 바라본다."
        zh_simp:
          scarlet: "白天总是精力充沛，\n随心所欲地到处活动，\n但太阳下山后却一动不动。"
          violet: "由于要把沐浴到的阳光\n转换成能量，因此白天\n总是面朝着太阳的方向。"
        zh_trad:
          scarlet: "白天時總是充滿精神，\n隨心所欲地四處行動，\n但太陽下山後卻是一動也不動。"
          violet: "由於會將沐浴到的陽光\n轉換成能量，因此白天\n總是一直面向著太陽。"
