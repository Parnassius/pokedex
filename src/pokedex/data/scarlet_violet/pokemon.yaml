        jp_kana:
          scarlet: "￹高￺たか￻い　￹知能￺ちのう￻を　￹有￺ゆう￻するのは\n￹脳￺のう￻みそが　ほかの　￹鳥￺とり￻ポケモンに\n￹比￺くら￻べて　￹大￺おお￻きいためと　￹言￺い￻われる。"
          violet: "￹頭￺あたま￻が　￹良￺よ￻く　くちばしと　￹足￺あし￻で\n￹扱￺あつか￻える　￹道具￺どうぐ￻なら\n￹簡単￺かんたん￻に　￹使￺つか￻い￹方￺かた￻を　￹覚￺おぼ￻えてしまうぞ。"
        jp_kanji:
          scarlet: "￹高￺たか￻い　￹知能￺ちのう￻を　￹有￺ゆう￻するのは\n￹脳￺のう￻みそが　ほかの　￹鳥￺とり￻ポケモンに\n￹比￺くら￻べて　￹大￺おお￻きいためと　￹言￺い￻われる。"
          violet: "￹頭￺あたま￻が　￹良￺よ￻く　くちばしと　￹足￺あし￻で\n￹扱￺あつか￻える　￹道具￺どうぐ￻なら\n￹簡単￺かんたん￻に　￹使￺つか￻い￹方￺かた￻を　￹覚￺おぼ￻えてしまうぞ。"
        en:
          scarlet: "It’s said that the reason behind Corvisquire’s\nhigh level of intelligence is the large size of its\nbrain relative to those of other bird Pokémon."
          violet: "This intelligent Pokémon will quickly learn\nhow to use any tool it can hold in its beak\nor its talons."
        fr:
          scarlet: "On raconte qu’il doit sa grande intelligence\nà la taille de son cerveau. En effet, celui-ci est\nplus gros que celui des autres Pokémon oiseaux."
          violet: "Ce Pokémon très intelligent apprend facilement\nà se servir des objets qu’il peut tenir dans son\nbec ou ses pattes."
        it:
          scarlet: "Si dice che il suo elevato intelletto sia dovuto\nalle dimensioni del suo cervello, più grosso\nrispetto a quello degli altri Pokémon alati."
          violet: "È un Pokémon molto intelligente: può imparare\nfacilmente a utilizzare vari oggetti con il becco\no con le zampe."
        de:
          scarlet: "Seine hohe Intelligenz ist angeblich darauf\nzurückzuführen, dass es über ein größeres Gehirn\nverfügt als andere Vogel-Pokémon."
          violet: "Es ist sehr klug und erlernt mit Leichtigkeit die\nHandhabung von Werkzeug, das es mit seinem\nSchnabel oder den Krallen bedienen kann."
        es:
          scarlet: "Dicen que su inteligencia superior se debe a\nque posee un cerebro más grande que el de\notros Pokémon pájaro."
          violet: "Gracias a su inteligencia, aprenderá a utilizar\nenseguida cualquier herramienta que sea capaz\nde manejar con el pico o con las patas."
        ko:
          scarlet: "높은 지능을 가진 이유는\n뇌가 다른 새포켓몬에 비해\n크기 때문이라고 전해지고 있다."
          violet: "머리가 좋아서 부리와 발로\n다룰 수 있는 도구라면\n간단하게 사용법을 익힌다."
        zh_simp:
          scarlet: "据说它拥有高级的智慧，\n是因为相较于其他鸟宝可梦，\n它的大脑体积更大。"
          violet: "头脑聪明，凡是靠鸟嘴\n和爪子能够操控的工具，\n它都可以轻易地学会用法。"
        zh_trad:
          scarlet: "人們認為牠會擁有高度智慧，\n是因為相較於其他鳥寶可夢，\n牠的腦子是比較大的。"
          violet: "頭腦聰明，凡是靠鳥嘴\n和爪子能夠操控的工具，\n牠都可以輕易地學會用法。"
