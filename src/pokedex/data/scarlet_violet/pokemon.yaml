      descriptions:
        jp_kana:
          scarlet: "かまれたとき　￹頭￺あたま￻に　￹染￺し￻みこんだ\n￹毒素￺どくそ￻によって　ただならない\n￹能力￺のうりょく￻に　￹目覚￺めざ￻めた　ヤドン。"
          violet: "すごい　￹知性￺ちせい￻と　ひらめきを\n￹持￺も￻っている。　どんなときも　あわてず\n￹騒￺さわ￻がず　のんびりとしている。"
        jp_kanji:
          scarlet: "かまれたとき　￹頭￺あたま￻に　￹染￺し￻みこんだ\n￹毒素￺どくそ￻によって　ただならない\n￹能力￺のうりょく￻に　￹目覚￺めざ￻めた　ヤドン。"
          violet: "すごい　￹知性￺ちせい￻と　ひらめきを\n￹持￺も￻っている。　どんなときも　あわてず\n￹騒￺さわ￻がず　のんびりとしている。"
        en:
          scarlet: "When its head was bitten, toxins entered\nSlowpoke’s head and unlocked an extraordinary\npower."
          violet: "It has incredible intellect and intuition. Whatever\nthe situation, it remains calm and collected."
        fr:
          scarlet: "Quand la tête de Ramoloss a été mordue,\ndes toxines l’ont pénétrée et ont éveillé\nen lui des pouvoirs immenses."
          violet: "D’une grande intelligence, il possède\nune excellente intuition et sait rester\ncalme en toutes situations."
        it:
          scarlet: "Uno Slowpoke il cui straordinario potere si è\nrisvegliato per via delle tossine penetrate\nin lui dopo essere stato morso alla testa."
          violet: "Dotato di incredibile intelligenza e intuito,\nsa restare calmo e rilassato in ogni situazione."
        de:
          scarlet: "Als Flegmon in den Kopf gebissen wurde,\nfloss Gift in seinen Kopf und setzte eine\ngewaltige Kraft frei."
          violet: "Sein scharfer Intellekt und sein feines Gespür\nzeichnen es aus. Es bleibt in jeder Situation\ngelassen und besonnen."
        es:
          scarlet: "Al ser mordido en la cabeza, Slowpoke absorbió\nunas toxinas que liberaron su poder oculto."
          violet: "Su intelecto e intuición son increíbles. No pierde\nla compostura en ninguna situación."
        ko:
          scarlet: "물렸을 때 머리에 깊게 스며든\n독소에 의해 심상치 않은\n능력에 눈을 뜬 야돈이다."
          violet: "대단한 지성과 번뜩이는 재치를\n가지고 있다. 어떤 때라도 당황하거나\n소란 피우지 않고 느긋하게 있다."
        zh_simp:
          scarlet: "因被咬时渗入大脑的毒素\n而令非凡能力觉醒的呆呆兽。"
          violet: "有着非凡的智慧和灵感。\n不论何时都会不慌不忙，\n一副悠然自得的样子。"
        zh_trad:
          scarlet: "受到被咬時滲入大腦的\n毒素影響，使得非凡能力\n覺醒的呆呆獸。"
          violet: "有著非凡的智慧和靈感。\n不論何時都不慌不忙，\n一副悠然自得的樣子。"
