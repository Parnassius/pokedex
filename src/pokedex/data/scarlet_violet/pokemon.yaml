      hidden_ability: inner_focus
      descriptions:
        jp_kana:
          scarlet: "￹食￺た￻べた￹夢￺ゆめ￻は　￹全部￺ぜんぶ￻　￹覚￺おぼ￻えている。\n￹子￺こ￻どもの　￹夢￺ゆめ￻のほうが　￹美味￺おい￻しいので\nめったに　￹大人￺おとな￻の　￹夢￺ゆめ￻は￹食￺た￻べない。"
          violet: "￹突￺つ￻き￹出￺で￻た　￹鼻￺はな￻を　ひくひくさせると\nどこの　だれが　どんな　￹夢￺ゆめ￻を\n￹見￺み￻ているのか　￹全部￺ぜんぶ￻　わかるという。"
        jp_kanji:
          scarlet: "￹食￺た￻べた￹夢￺ゆめ￻は　￹全部￺ぜんぶ￻　￹覚￺おぼ￻えている。\n￹子￺こ￻どもの　￹夢￺ゆめ￻のほうが　￹美味￺おい￻しいので\nめったに　￹大人￺おとな￻の　￹夢￺ゆめ￻は￹食￺た￻べない。"
          violet: "￹突￺つ￻き￹出￺で￻た　￹鼻￺はな￻を　ひくひくさせると\nどこの　だれが　どんな　￹夢￺ゆめ￻を\n￹見￺み￻ているのか　￹全部￺ぜんぶ￻　わかるという。"
        en:
          scarlet: "It remembers every dream it eats. It rarely eats\nthe dreams of adults because children’s are much\ntastier."
          violet: "When it twitches its nose, it can tell where\nsomeone is sleeping and what that person is\ndreaming about."
        fr:
          scarlet: "Ce Pokémon se souvient de tous les rêves\nqu’il a avalés. Il mange rarement les songes\nd’adultes, car ceux des enfants ont meilleur goût."
          violet: "Quand il remue son nez, il devine où sont\nles personnes endormies et de quoi elles rêvent."
        it:
          scarlet: "Ricorda ogni singolo sogno che mangia.\nMangia raramente i sogni degli adulti, perché\nquelli dei bambini sono più buoni."
          violet: "Quando fiuta con il suo grande naso, riesce\na localizzare chi dorme e a capire che sogni\nsta facendo."
        de:
          scarlet: "Es kann sich an jeden gefressenen Traum erinnern.\nDie Träume von Kindern schmecken ihm besser,\nweshalb es die von Erwachsenen nur selten frisst."
          violet: "Wenn es mit seiner großen Nase zuckt, kann es\nfeststellen, wo jemand schläft und was er gerade\nträumt."
        es:
          scarlet: "Recuerda todos los sueños que engulle.\nRaramente come sueños de adultos porque\nlos de los niños están más ricos."
          violet: "Cuando tuerce su protuberante nariz, puede\nsaber dónde hay alguien dormido y con qué\nestá soñando en ese momento."
        ko:
          scarlet: "먹어 치운 꿈은 모두 기억하고 있다.\n아이들의 꿈이 맛있기 때문에\n어른들의 꿈은 거의 먹지 않는다."
          violet: "튀어나온 코를 실룩샐룩거리면\n어디에 있는 누가 어떤 꿈을 꾸고 있는지\n전부 알 수 있다고 한다."
        zh_simp:
          scarlet: "记得所有自己吃过的梦。\n由于小孩子的梦比较美味，\n因此几乎不吃大人的梦。"
          violet: "据说它那突出的鼻子在抽动时，\n无论是谁在哪里做着怎样的梦，\n都会被它知道得一清二楚。"
        zh_trad:
          scarlet: "能記住所有自己吃下的夢。\n由於小孩的夢更加美味，\n因此幾乎不吃大人的夢。"
          violet: "據說當牠抽動凸出的鼻子，\n無論是誰在哪裡做著什麼夢，\n都會被牠知道得一清二楚。"
