        jp_kanji:
          scarlet: "￹野￺の￻に￹咲￺さ￻く　￹花￺はな￻の　￹秘￺ひ￻めた　￹力￺ちから￻を\n￹引￺ひ￻き￹出￺だ￻す　￹能力￺のうりょく￻を　￹持￺も￻っている。\nとくに　￹赤￺あか￻い￹花￺はな￻が　￹好￺す￻き。"
          violet: "￹赤￺あか￻い￹花￺はな￻に　￹乗￺の￻った　フラベベ。\n￹生￺う￻まれると　すぐに　お￹気￺き￻に￹入￺い￻りの\n￹花￺はな￻を　￹探￺さが￻すために　￹飛￺と￻びまわる。"
        en:
          scarlet: "This Pokémon can draw forth the power hidden\nwithin blooming wild flowers. It is particularly\nfond of red flowers."
          violet: "This Flabébé rides a red flower. Immediately\nafter birth, this Pokémon begins flying around in\nsearch of a flower it likes."
        fr:
          scarlet: "Ce Pokémon parvient à extraire l’énergie cachée\ndes fleurs sauvages. Il aime particulièrement\nles fleurs rouges."
          violet: "Il est perché sur une fleur rouge. À peine est-il\nné qu’il part à la recherche de la fleur qui fera\nson bonheur."
        it:
          scarlet: "Possiede il dono di estrarre la forza\nnascosta dei fiori che sbocciano nei campi.\nAma in particolar modo i fiori rossi."
          violet: "Un Flabébé sopra a un fiore rosso. Appena\nnato, questo Pokémon si lancia subito in volo\nalla ricerca di un fiore che gli vada a genio."
        de:
          scarlet: "Dieses Pokémon ist in der Lage, Wildblumen ihre\ngeheimen Kräfte zu entlocken. Rote Blumen\nhaben es ihm besonders angetan."
          violet: "Dieses Flabébé umklammert eine rote Blume.\nSofort nach der Geburt fliegt Flabébé umher,\num eine Blume zu finden, die ihm zusagt."
        es:
          scarlet: "Posee el don de extraer el poder oculto de las\nflores silvestres. Siente una predilección especial\npor las flores rojas."
          violet: "Cabalga una flor roja. En cuanto nace,\nrevolotea en busca de una flor de su agrado."
        ko:
          scarlet: "들판에 핀 꽃에 숨겨진 힘을\n끌어내는 능력을 가지고 있다.\n특히 빨간 꽃을 좋아한다."
          violet: "빨간 꽃을 탄 플라베베.\n태어나면 곧바로\n마음에 드는 꽃을 찾으러 날아다닌다."
        zh_simp:
          scarlet: "它所拥有的能力可以\n激发出野花潜藏的力量。\n尤其喜欢红花。"
          violet: "乘着红花的花蓓蓓。\n从出生那一刻起就会为了\n寻找喜欢的花而四处飞行。"
        zh_trad:
          scarlet: "牠所擁有的能力可以\n激發出野花潛藏的力量。\n對紅花最為鍾愛。"
          violet: "乘著紅花的花蓓蓓。\n從出生那刻開始就會為了\n尋找喜歡的花而四處飛行。"
    flabebe_yellow_flower:
