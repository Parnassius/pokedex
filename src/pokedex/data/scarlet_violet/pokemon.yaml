          scarlet: "エサによって　￹色￺いろ￻が　￹変化￺へんか￻する\n￹毒￺どく￻の　￹唾液￺だえき￻を　￹指￺ゆび￻に　￹塗￺まぶ￻して\n￹森￺もり￻の　￹木々￺きぎ￻に　￹模様￺もよう￻を　￹描￺えが￻く。"
          violet: "タギングルが　￹描￺えが￻く　￹模様￺もよう￻は\n￹個体￺こたい￻によって　￹異￺こと￻なり\n￹生涯￺しょうがい￻　￹同￺おな￻じ　￹模様￺もよう￻を　￹描￺えが￻き￹続￺つづ￻ける。"
        jp_kanji:
          scarlet: "エサによって　￹色￺いろ￻が　￹変化￺へんか￻する\n￹毒￺どく￻の　￹唾液￺だえき￻を　￹指￺ゆび￻に　￹塗￺まぶ￻して\n￹森￺もり￻の　￹木々￺きぎ￻に　￹模様￺もよう￻を　￹描￺えが￻く。"
          violet: "タギングルが　￹描￺えが￻く　￹模様￺もよう￻は\n￹個体￺こたい￻によって　￹異￺こと￻なり\n￹生涯￺しょうがい￻　￹同￺おな￻じ　￹模様￺もよう￻を　￹描￺えが￻き￹続￺つづ￻ける。"
        en:
          scarlet: "The color of the poisonous saliva depends on\nwhat the Pokémon eats. Grafaiai covers its fingers\nin its saliva and draws patterns on trees in forests."
          violet: "Each Grafaiai paints its own individual pattern,\nand it will paint that same pattern over and over\nagain throughout its life."
        fr:
          scarlet: "Sa salive toxique change de couleur selon\nson alimentation. Il en enduit ses doigts pour\ndessiner des motifs sur les arbres de la forêt."
          violet: "Les Tag-Tag passent leur vie à peindre toujours\nle même motif, qui varie selon l’individu."
        it:
          scarlet: "Traccia dei motivi sugli alberi della foresta con\nle dita imbrattate di saliva velenosa, il cui colore\ncambia in base all’alimentazione."
          violet: "I motivi che disegnano variano da esemplare\na esemplare, e ogni individuo traccia lo stesso\nmotivo per tutta la vita."
        de:
          scarlet: "Es beschmiert seine Finger mit giftigem Speichel,\nder je nach Futter anders gefärbt ist, und malt\ndamit Muster auf die Bäume im Wald."
          violet: "Jedes Affiti malt sein eigenes individuelles\nMuster, das es sein Leben lang immer wieder\nreproduziert."
        es:
          scarlet: "El color de su saliva venenosa varía según su\nalimentación. Se embadurna los dedos con ella\npara pintar motivos en los árboles del bosque."
          violet: "Cada individuo pinta un patrón único\ny distintivo que irá replicando de forma\nconstante a lo largo de toda su vida."
        ko:
          scarlet: "먹이에 따라 색이 변하는\n독성의 침을 손가락에 묻혀서\n숲의 나무들에 무늬를 그린다."
          violet: "태깅구르가 그리는 무늬는\n개체마다 다르며\n평생 같은 무늬만을 그린다."
        zh_simp:
          scarlet: "它会把随着自己所吃食物\n而变色的毒唾液涂在指头上，\n然后在森林的树木上画图案。"
          violet: "涂标客画出的图案\n会随个体而有所不同。\n一生都持续画着相同的图案。"
        zh_trad:
          scarlet: "會將能隨著吃下的食物\n而變色的毒唾液塗在指頭上，\n在森林的樹木描繪上圖案。"
          violet: "塗標客畫的圖案\n會依個體而有所不同。\n一生不斷畫著相同圖案。"
