      descriptions:
        jp_kana:
          scarlet: "ミツハニーを　こっそり　￹追￺お￻いかけて\n￹巣￺す￻を　￹見￺み￻つける。　たっぷりの　￹蜜￺みつ￻を\n￹手￺て￻のひらで　すくって　いただくのだ。"
          violet: "￹手￺て￻のひらに　￹甘￺あま￻い　￹蜜￺みつ￻が　たっぷり\n￹染￺し￻み￹込￺こ￻んでいる。　￹不安￺ふあん￻なときは\n￹手￺て￻のひらを　￹舐￺な￻めると　￹笑顔￺えがお￻になる。"
        jp_kanji:
          scarlet: "ミツハニーを　こっそり　￹追￺お￻いかけて\n￹巣￺す￻を　￹見￺み￻つける。　たっぷりの　￹蜜￺みつ￻を\n￹手￺て￻のひらで　すくって　いただくのだ。"
          violet: "￹手￺て￻のひらに　￹甘￺あま￻い　￹蜜￺みつ￻が　たっぷり\n￹染￺し￻み￹込￺こ￻んでいる。　￹不安￺ふあん￻なときは\n￹手￺て￻のひらを　￹舐￺な￻めると　￹笑顔￺えがお￻になる。"
        en:
          scarlet: "This Pokémon discreetly follows Combee to find\ntheir hive. It scoops up big dollops of honey in its\npalms to eat."
          violet: "Its paws are soaked in oodles of honey. When\nnervous, Teddiursa will lick its paws and soon\nhave a smile back on its face."
        fr:
          scarlet: "Il suit discrètement les Apitrini jusqu’à leur ruche,\npuis il y plonge ses pattes pour recueillir du miel,\nqu’il déguste ensuite."
          violet: "Quand il est anxieux, il lèche ses pattes qui sont\nconstamment couvertes de miel, et retrouve\nle sourire."
        it:
          scarlet: "Segue di nascosto i Combee per scovare il loro\nnido. Mangia abbondanti quantità di miele che\nraccoglie con le zampe anteriori."
          violet: "Le sue zampe anteriori sono sempre intrise\ndi un dolce miele, e quando è inquieto\nle lecca per recuperare il buonumore."
        de:
          scarlet: "Es folgt Wadribie klammheimlich bis zu ihrem\nBienenstock, aus dem es mit seinen Pranken\nreichlich Honig schöpft und verzehrt."
          violet: "Seine Pranken sind durchtränkt von Honig.\nIst es besorgt, schleckt es sie ab und strahlt\nim Nu wieder über das ganze Gesicht."
        es:
          scarlet: "Sigue con sigilo a los Combee para localizar su\ncolmena. Consume abundantes cantidades de\nmiel, que recoge impregnando las zarpas."
          violet: "Cuando está intranquilo, le basta lamerse las\nzarpas impregnadas en miel para recuperar la\nsonrisa."
        ko:
          scarlet: "세꿀버리를 몰래 뒤쫓아서\n벌집을 찾아내고는 손바닥으로\n꿀을 한가득 퍼먹는다."
          violet: "손바닥에는 달콤한 꿀이\n잔뜩 배어들어 있다.\n불안할 때 손바닥을 핥으면 웃게 된다."
        zh_simp:
          scarlet: "会偷偷跟踪三蜜蜂找出\n它们的巢，然后用手掌\n挖起大量蜜汁来享用。"
          violet: "手掌里渗入了满满的蜜汁。\n感到不安时只要舔舔手掌，\n就会喜笑颜开。"
        zh_trad:
          scarlet: "會偷偷跟蹤三蜜蜂找出\n牠們的巢，然後用手掌\n挖起大量的蜜汁來享用。"
          violet: "手掌裡滲入了滿滿的蜜糖。\n感到不安時只要舔舔手掌，\n就會笑逐顏開。"
ursaring:
  species_id: 217
  names:
    jp_kana: リングマ
    jp_kanji: リングマ
    en: Ursaring
    fr: Ursaring
