          violet: "￹体￺からだ￻を　￹覆￺おお￻う　￹毛皮￺けがわ￻は\nぜったいに　￹燃￺も￻えたりしない。\nどんな　￹炎攻撃￺ほのおこうげき￻も　￹平気￺へいき￻だ。"
        jp_kanji:
          scarlet: "￹戦￺たたか￻いの￹前￺まえ￻　￹背中￺せなか￻を　￹向￺む￻けて\n￹自分￺じぶん￻の　￹炎￺ほのお￻が　どれくらい\nすごいかを　￹相手￺あいて￻に　￹見￺み￻せつける。"
          violet: "￹体￺からだ￻を　￹覆￺おお￻う　￹毛皮￺けがわ￻は\nぜったいに　￹燃￺も￻えたりしない。\nどんな　￹炎攻撃￺ほのおこうげき￻も　￹平気￺へいき￻だ。"
        en:
          scarlet: "Before battle, it turns its back on its opponent\nto demonstrate how ferociously its fire blazes."
          violet: "The fur covering this Pokémon’s body never\nburns, no matter what. It can shrug off any\nkind of fire attack."
        fr:
          scarlet: "Avant chaque combat, il tourne le dos à\nl’adversaire pour lui montrer ses flammes\ndans toute leur splendeur."
          violet: "La fourrure qui recouvre ce Pokémon est\nincombustible et peut résister à n’importe\nquelle attaque de feu."
        it:
          scarlet: "Prima di lottare mostra il dorso al nemico per\nimpressionarlo con la potenza delle sue fiamme."
          violet: "La pelliccia che ricopre il suo corpo è\ncompletamente ignifuga. Può resistere\na qualsiasi attacco di fuoco."
        de:
          scarlet: "Vor dem Kampf dreht es dem Feind den Rücken\nzu, um ihm zu zeigen, wie beeindruckend sein\nFeuer lodert."
          violet: "Das Fell dieses Pokémon ist nicht entflammbar.\nFeuer-Angriffe jeglicher Art machen ihm\nnichts aus."
        es:
          scarlet: "Antes de empezar a luchar, le da la espalda al\nrival para alardear del alcance y la fuerza de sus\nllamas."
          violet: "El pelaje de este Pokémon es ignífugo.\nPuede soportar cualquier ataque con fuego."
        ko:
          scarlet: "싸우기 전에 등을 돌려\n자신의 불꽃이 얼마나 대단한지\n상대에게 일부러 보여 준다."
          violet: "몸을 뒤덮은 털가죽은\n절대로 불에 타지 않는다.\n어떠한 불꽃 공격에도 끄떡없다."
        zh_simp:
          scarlet: "战斗前会背过身去向对手展示\n自己的火焰有多么厉害。"
          violet: "覆盖身体的皮毛\n绝不会被点燃。受到任何\n火焰攻击它都能安然无恙。"
        zh_trad:
          scarlet: "戰鬥前會轉身背向對手，\n向對手展示自己的火焰\n有多麼厲害。"
          violet: "一身的毛皮絕不會被點燃。\n遭受任何火焰攻擊\n都能安然無恙。"
