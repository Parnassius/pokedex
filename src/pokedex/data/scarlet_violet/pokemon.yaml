      descriptions:
        jp_kana:
          scarlet: "ヤドンが　￹海￺うみ￻へ　エサを\n￹取￺と￻りにいったとき　シェルダーに\n￹尻尾￺しっぽ￻を　かまれ　ヤドランになった。"
          violet: "￹激￺はげ￻しい　￹戦￺たたか￻いで　￹尻尾￺しっぽ￻に\n￹噛￺か￻みついた　シェルダーが　￹外￺はず￻れると\nもとの　ヤドンに　￹戻￺もど￻ってしまう。"
        jp_kanji:
          scarlet: "ヤドンが　￹海￺うみ￻へ　エサを\n￹取￺と￻りにいったとき　シェルダーに\n￹尻尾￺しっぽ￻を　かまれ　ヤドランになった。"
          violet: "￹激￺はげ￻しい　￹戦￺たたか￻いで　￹尻尾￺しっぽ￻に\n￹噛￺か￻みついた　シェルダーが　￹外￺はず￻れると\nもとの　ヤドンに　￹戻￺もど￻ってしまう。"
        en:
          scarlet: "When a Slowpoke went hunting in the sea, its tail\nwas bitten by a Shellder. That made it evolve\ninto Slowbro."
          violet: "If the tail-biting Shellder is thrown off in a harsh\nbattle, this Pokémon reverts to being an ordinary\nSlowpoke."
        fr:
          scarlet: "Un jour, alors qu’un Ramoloss pêchait,\nun Kokiyas s’est accroché à sa queue\net l’a fait évoluer en Flagadoss."
          violet: "S’il perd le Kokiyas accroché au bout de sa queue\npendant un combat, il redevient un Ramoloss."
        it:
          scarlet: "Uno Slowpoke che si trovava in mare in cerca\ndi cibo fu morso da uno Shellder, evolvendosi\nin Slowbro."
          violet: "Se durante l’impeto di una lotta perde\nlo Shellder che gli morde la coda, torna\na essere uno Slowpoke."
        de:
          scarlet: "Als Flegmon im Meer jagen ging, biss ein\nMuschas in seine Rute. Dadurch entwickelte es\nsich zu Lahmus."
          violet: "Wenn das Muschas an seiner Rute in einem\nharten Kampf abfällt, wird Lahmus wieder zu\nFlegmon."
        es:
          scarlet: "Según parece, cuando Slowpoke fue a pescar\nal mar, un Shellder le mordió la cola y así\nevolucionó a Slowbro."
          violet: "Si el Shellder que muerde su cola se desprende\ndurante una lucha, se convertirá en un simple\nSlowpoke."
        ko:
          scarlet: "야돈이 바다로 먹이를\n잡으러 갔다가 셀러에게\n꼬리를 물려 야도란이 되었다."
          violet: "격한 싸움에서 꼬리를 물고 있는\n셀러가 떨어지면\n원래의 야돈으로 돌아간다."
        zh_simp:
          scarlet: "呆呆兽去海里捕食时，\n由于被大舌贝咬住尾巴\n而变成了呆壳兽。"
          violet: "如果咬着自己尾巴的大舌贝\n在激烈的战斗中脱落，\n它就会变回呆呆兽。"
        zh_trad:
          scarlet: "呆呆獸去海裡捕食時，\n被大舌貝咬住了尾巴，\n於是就變成了呆殼獸。"
          violet: "在激烈的戰鬥中，如果\n咬著自己尾巴的大舌貝\n脫落，就會變回呆呆獸。"
    slowbro_galarian_form:
