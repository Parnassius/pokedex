          violet: "ネバネバの　￹糸￺いと￻を　￹吐￺は￻いて　￹枝￺えだ￻に\n￹巻￺ま￻きつけ　￹振￺ふ￻り￹子￺こ￻の　￹動￺うご￻きで　￹木￺き￻から\n￹木￺き￻へと　￹身軽￺みがる￻に　￹飛￺と￻び￹移￺うつ￻る。"
        jp_kanji:
          scarlet: "￹普段￺ふだん￻は　￹土￺つち￻の￹中￺なか￻で　￹暮￺く￻らすが\nホーホーに　￹掘￺ほ￻り￹出￺だ￻されるので\n￹電気￺でんき￻ポケモンの　￹近￺ちか￻くに　￹集￺あつ￻まるのだ。"
          violet: "ネバネバの　￹糸￺いと￻を　￹吐￺は￻いて　￹枝￺えだ￻に\n￹巻￺ま￻きつけ　￹振￺ふ￻り￹子￺こ￻の　￹動￺うご￻きで　￹木￺き￻から\n￹木￺き￻へと　￹身軽￺みがる￻に　￹飛￺と￻び￹移￺うつ￻る。"
        en:
          scarlet: "Grubbin normally live underground, but if they\nget unearthed by Hoothoot, they may be found\ngathered around electric Pokémon."
          violet: "It spits sticky threads and winds them around\nbranches, then swings nimbly from tree to tree\nin a pendulum-like motion."
        fr:
          scarlet: "Ils vivent généralement sous terre, mais lorsque\nles Hoothoot les déterrent, ils cherchent refuge\nprès de Pokémon Électrik."
          violet: "Il sécrète un fil gluant qu’il enroule autour\ndes branches, ce qui lui permet de se déplacer\nd’un arbre à l’autre à la manière d’un balancier."
        it:
          scarlet: "Sebbene di solito vivano sottoterra, quando\nvengono snidati dagli Hoothoot si radunano\nvicino a Pokémon di tipo Elettro."
          violet: "Secerne un filo appiccicoso e lo avvolge ai rami,\nper poi lanciarsi agilmente di albero in albero\ncon un movimento a pendolo."
        de:
          scarlet: "Eigentlich leben sie im Erdreich. Von Hoothoot\nausgegrabene Exemplare versammeln sich oft\nin der Nähe von Elektro-Pokémon."
          violet: "Es spuckt klebrige Fäden, die es um Äste wickelt,\num sich dann mit pendelnden Bewegungen\ngeschickt von Baum zu Baum zu schwingen."
        es:
          scarlet: "Por lo general, viven bajo tierra, pero, cuando\nlos Hoothoot los desentierran, suelen refugiarse\njunto a Pokémon de tipo Eléctrico."
          violet: "Se cuelga de las ramas con el hilo viscoso que\nsecreta y se mece para desplazarse ágilmente\nde árbol en árbol."
        ko:
          scarlet: "평소에는 땅속에서 지내지만\n부우부가 파헤치기 때문에\n전기포켓몬 근처에 모이기도 한다."
          violet: "끈적끈적한 실을 뿜어서 나뭇가지에\n휘감은 다음, 진자 운동으로\n나무 사이를 가볍게 날아다닌다."
        zh_simp:
          scarlet: "虽然平时生活在土中，\n但由于会被咕咕挖出来，\n因此会聚集到电气宝可梦附近。"
          violet: "会吐出黏黏的丝缠住树枝，\n并摇摆身躯在树木之间\n轻巧地飞跃移动。"
        zh_trad:
          scarlet: "雖然平時生活在土裡面，\n但由於會被咕咕挖出來，\n因此會聚集在電屬性寶可夢附近。"
          violet: "會吐出黏糊糊的絲纏住樹枝\n並猶如擺錘般地晃動身體，\n藉此在樹木之間輕巧地移動。"
