        jp_kana:
          scarlet: "￹黄色￺きいろ￻の　￹花￺はな￻の　￹力￺ちから￻を　￹引￺ひ￻き￹出￺だ￻す\n￹能力￺のうりょく￻を　￹持￺も￻つ。　その　￹力￺ちから￻は\nフラエッテを　￹守￺まも￻る　￹技￺わざ￻となる。"
          violet: "￹草￺くさ￻タイプの　ポケモンの\n￹潜在能力￺せんざいのうりょく￻を　￹引￺ひ￻き￹出￺だ￻すことができる。\n￹黄色￺きいろ￻の￹花￺はな￻と　￹波長￺はちょう￻が　￹合￺あ￻う。"
        jp_kanji:
          scarlet: "￹黄色￺きいろ￻の　￹花￺はな￻の　￹力￺ちから￻を　￹引￺ひ￻き￹出￺だ￻す\n￹能力￺のうりょく￻を　￹持￺も￻つ。　その　￹力￺ちから￻は\nフラエッテを　￹守￺まも￻る　￹技￺わざ￻となる。"
          violet: "￹草￺くさ￻タイプの　ポケモンの\n￹潜在能力￺せんざいのうりょく￻を　￹引￺ひ￻き￹出￺だ￻すことができる。\n￹黄色￺きいろ￻の￹花￺はな￻と　￹波長￺はちょう￻が　￹合￺あ￻う。"
        en:
          scarlet: "This Pokémon can draw forth the power hidden\nwithin yellow flowers. This power then becomes\nthe moves Floette uses to protect itself."
          violet: "Floette can draw forth the latent capabilities of\nGrass-type Pokémon. It syncs with yellow flowers."
        fr:
          scarlet: "Ce Pokémon est capable d’extraire la puissance\ndes fleurs jaunes, ce qui lui permet d’utiliser\nles capacités grâce auxquelles il se protège."
          violet: "Il est capable d’extraire la puissance cachée\ndes Pokémon de type Plante et il se synchronise\navec les fleurs jaunes."
        it:
          scarlet: "Ha la capacità di sfruttare la forza dei fiori gialli,\nincanalandola in mosse protettive."
          violet: "È in grado di sviluppare il potenziale latente dei\nPokémon di tipo Erba. Entra particolarmente in\nsintonia con i fiori gialli."
        de:
          scarlet: "Floette ist in der Lage, aus gelben Blumen Kraft\nzu schöpfen. Diese wandelt es in Attacken um,\ndie seinem Schutz dienen."
          violet: "Floette kann Pokémon vom Typ Pflanze ihr volles\nPotenzial entlocken. Es synchronisiert sich mit\nder Farbwellenlänge gelber Blumen."
        es:
          scarlet: "Su destreza le permite extraer el poder de las\nflores amarillas, que emplea en movimientos\ndefensivos."
          violet: "Puede hacer que las capacidades latentes de los\nPokémon de tipo Planta afloren. Está en perfecta\nsintonía con las flores amarillas."
        ko:
          scarlet: "노란 꽃의 힘을 끌어내는 능력을 가졌다.\n그 힘은 플라엣테를 지키는 기술이 된다."
          violet: "풀타입 포켓몬의\n잠재 능력을 끌어올릴 수 있다.\n노란 꽃과 파장이 맞는다."
        zh_simp:
          scarlet: "能够激发出黄花的力量。\n那种力量会成为花叶蒂\n保护自己的招式。"
          violet: "能够激发草属性的\n宝可梦的潜在能力。\n与黄花的波长很契合。"
        zh_trad:
          scarlet: "能夠激發出黃花的力量。\n那種力量將會變成\n花葉蒂保護自己的招式。"
          violet: "能夠激發出草屬性\n寶可夢的潛在能力。\n與黃花的波長很契合。"
    floette_orange_flower:
