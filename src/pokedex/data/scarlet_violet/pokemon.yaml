        jp_kanji:
          scarlet: "￹頭￺あたま￻の　￹花飾￺はなかざ￻りから　￹発￺はっ￻する\n￹香￺かお￻りを　かぐと　リラックスできるが\n￹手入￺てい￻れが　とても　￹難￺むずか￻しい。"
          violet: "どんなに　￹手間￺てま￻と　お￹金￺かね￻を　かけても\n￹人￺ひと￻の￹手￺て￻で　￹咲￺さ￻かせるよりも　￹野生￺やせい￻で\n￹咲￺さ￻く　￹花￺はな￻の　ほうが　￹美￺うつく￻しい。"
        en:
          scarlet: "The fragrance of the garland on its head has\na relaxing effect, but taking care of it is very\ndifficult."
          violet: "No matter how much time and money is spent\nraising it, its flowers are the most beautiful when\nthey bloom in the wild."
        fr:
          scarlet: "La fleur sur sa tête émet un parfum qui apaise\ninstantanément, mais elle est très difficile\nà entretenir."
          violet: "La main la plus verte au monde ne saurait faire\néclore une fleur de Fragilady aussi belle que\ncelles qui s’épanouissent à l’état sauvage."
        it:
          scarlet: "Il fiore che ha sulla testa emette un profumo\ndavvero rilassante, ma è molto difficile\nprendersene cura."
          violet: "Per quanto si possano impiegare tempo, denaro\ne fatica nella cura di questo Pokémon, il suo fiore\nsarà sempre più bello se sboccia in natura."
        de:
          scarlet: "Der Blumenschmuck auf seinem Kopf sondert\neinen beruhigenden Duft ab, ist jedoch nicht\ngerade pflegeleicht."
          violet: "Egal, wie viel Mühe und Geld investiert wird,\nsein Blumenschmuck ist wild gewachsen immer\nschöner als von Menschenhand gezüchtet."
        es:
          scarlet: "El aroma que despide la flor de su tocado\ntiene efectos tranquilizantes, pero este Pokémon\nrequiere muchos cuidados."
          violet: "Por muchos esfuerzos o dinero que destine la\ngente para hacerla florecer, siempre es más bella\nla flor que brota en un ejemplar salvaje."
        ko:
          scarlet: "머리의 꽃 장식에서 나는\n향기를 맡으면 편안해지나\n손질이 아주 까다롭다."
          violet: "아무리 시간과 돈을 들여도\n사람 손으로 피우는 것보다\n야생에서 피는 꽃이 더 아름답다."
        zh_simp:
          scarlet: "只要闻了它头上花饰所散发出的\n香气就能感到精神舒缓，\n但却非常难以打理。"
          violet: "无论花多少工夫和金钱，\n比起借助人工手段让它开放，\n在野外绽放的花更美。"
        zh_trad:
          scarlet: "頭上的花飾會散發出\n聞了就能舒緩情緒的香氣，\n但卻極為難以照料。"
          violet: "無論花多少功夫和金錢，\n比起借助人工手段培育出的花，\n在野外綻放的花更美。"
