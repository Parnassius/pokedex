        jp_kana:
          scarlet: "￹本当￺ほんとう￻は　￹臆病￺おくびょう￻で　￹怖￺こわ￻がり。\n￹襲￺おそ￻われると　￹必死￺ひっし￻に　￹手足￺てあし￻を\n￹振￺ふ￻って　￹敵￺てき￻を　￹追￺お￻い￹払￺はら￻おうとする。"
          violet: "￹大￺おお￻きな　￹口￺くち￻を　￹開￺ひら￻いて\n￹太￺ふと￻い　キバを　￹見￺み￻せつければ\nたいていの　ポケモンは　￹逃￺に￻げ￹出￺だ￻す。"
        jp_kanji:
          scarlet: "￹本当￺ほんとう￻は　￹臆病￺おくびょう￻で　￹怖￺こわ￻がり。\n￹襲￺おそ￻われると　￹必死￺ひっし￻に　￹手足￺てあし￻を\n￹振￺ふ￻って　￹敵￺てき￻を　￹追￺お￻い￹払￺はら￻おうとする。"
          violet: "￹大￺おお￻きな　￹口￺くち￻を　￹開￺ひら￻いて\n￹太￺ふと￻い　キバを　￹見￺み￻せつければ\nたいていの　ポケモンは　￹逃￺に￻げ￹出￺だ￻す。"
        en:
          scarlet: "It is actually timid and easily spooked.\nIf attacked, it desperately flails its limbs\nabout in an attempt to repel its opponent."
          violet: "It can make most any Pokémon run away\nby opening its big mouth to reveal its\nthick fangs."
        fr:
          scarlet: "Il est en fait timide et assez peureux. Lorsque des\nadversaires l’attaquent, il tente de les repousser\nen agitant ses pattes de toutes ses forces."
          violet: "Quand il ouvre sa gueule imposante et montre\nses énormes crocs, la majorité des Pokémon\nprennent la fuite."
        it:
          scarlet: "Timido e pauroso, se viene attaccato cerca\ndi scacciare il nemico agitando forsennatamente\nle zampe."
          violet: "Se spalanca la bocca mostrando i grandi denti,\nquasi tutti i Pokémon fuggono spaventati."
        de:
          scarlet: "Granbull ist in Wahrheit ängstlich und scheu.\nWird es angegriffen, fuchtelt es wild mit den\nArmen und Beinen, um Gegner zu verscheuchen."
          violet: "Wenn es sein großes Maul öffnet und seine\ndicken Fangzähne zeigt, nimmt fast jedes\nPokémon Reißaus."
        es:
          scarlet: "En el fondo es muy tímido y asustadizo. Cuando\nlo atacan, agita las extremidades frenéticamente\ncon la intención de ahuyentar al enemigo."
          violet: "Le basta con abrir su enorme boca y mostrar sus\ngruesos colmillos para ahuyentar prácticamente\na cualquier Pokémon."
        ko:
          scarlet: "사실은 겁쟁이다.\n습격당하면 필사적으로 손발을\n흔들어 적을 쫓아내려 한다."
          violet: "커다란 입을 벌리고\n두꺼운 송곳니를 드러내면\n대부분의 포켓몬이 도망친다."
        zh_simp:
          scarlet: "其实既胆小又怕事。\n遭到袭击时会拼命挥动\n手脚来试图赶走敌人。"
          violet: "看到它张开大嘴，\n露出粗大的牙齿后，\n大多数宝可梦都会逃走。"
        zh_trad:
          scarlet: "其實既膽小又怯懦。\n一旦遭到襲擊，就會拼命\n揮舞手腳來試圖趕走對手。"
          violet: "當牠張開大嘴，\n露出粗壯的獠牙時，\n大多數的寶可夢都會逃走。"
