      descriptions:
        jp_kana:
          scarlet: "￹体￺からだ￻の￹色￺いろ￻や　￹模様￺もよう￻の　￹違￺ちが￻いは\nおびき￹寄￺よ￻せる　￹獲物￺えもの￻の　￹好￺この￻みに\n￹合￺あ￻わせて　￹変化￺へんか￻した　￹結果￺けっか￻らしい。"
          violet: "￹死￺し￻んだふりで　￹相手￺あいて￻を　だます。\n￹小￺ちい￻さく　￹力￺ちから￻も　￹弱￺よわ￻いが\n￹知恵￺ちえ￻を　￹働￺はたら￻かせて　￹生￺い￻きている。"
        jp_kanji:
          scarlet: "￹体￺からだ￻の￹色￺いろ￻や　￹模様￺もよう￻の　￹違￺ちが￻いは\nおびき￹寄￺よ￻せる　￹獲物￺えもの￻の　￹好￺この￻みに\n￹合￺あ￻わせて　￹変化￺へんか￻した　￹結果￺けっか￻らしい。"
          violet: "￹死￺し￻んだふりで　￹相手￺あいて￻を　だます。\n￹小￺ちい￻さく　￹力￺ちから￻も　￹弱￺よわ￻いが\n￹知恵￺ちえ￻を　￹働￺はたら￻かせて　￹生￺い￻きている。"
        en:
          scarlet: "This species’ differing colors and patterns are\napparently the result of Tatsugiri changing itself\nto suit the preferences of the prey it lures in."
          violet: "This Pokémon tricks its opponents by playing\ndead. It is small and weak, but it uses its smarts\nto survive."
        fr:
          scarlet: "Les différents motifs et couleurs de cette espèce\nseraient une adaptation aux préférences des\nproies qu’elle souhaite attirer."
          violet: "Ce Pokémon trompe ses adversaires en faisant\nle mort. Malgré sa petite taille et sa faiblesse,\nil parvient à survivre grâce à son intelligence."
        it:
          scarlet: "Pare che le differenze nei colori e nei motivi sul\nsuo corpo siano il risultato di mutazioni avvenute\nper adeguarsi ai gusti delle prede che attira."
          violet: "Inganna l’avversario fingendosi morto.\nÈ piccolo e debole, ma sopravvive grazie alla\nsua intelligenza."
        de:
          scarlet: "Seine unterschiedlichen Körperfarben und Muster\nsind offenbar als Anpassung an die Vorlieben der\nBeute entstanden, die es anlocken will."
          violet: "Es stellt sich tot, um seine Gegner zu täuschen.\nZwar ist es klein und schwach, aber es nutzt\nseinen Verstand, um zu überleben."
        es:
          scarlet: "Al parecer, tanto los motivos como el color de\nsu cuerpo cambian para adaptarse a los gustos\nde la presa a la que quiere atraer."
          violet: "Se hace el muerto para engañar a sus oponentes.\nEs pequeño y débil, pero se vale de su astucia\npara sobrevivir."
        ko:
          scarlet: "몸의 색과 무늬가 다른 것은\n유인하려는 먹이의 취향에 맞춰\n변화한 결과라는 듯하다."
          violet: "죽은 척을 하여 상대를 속인다.\n몸집이 작고 힘도 약하지만\n지혜를 발휘하여 생존하고 있다."
        zh_simp:
          scarlet: "身体的颜色和花纹会有差异，\n似乎是为了便于引诱猎物，\n而配合其喜好产生的变化。"
          violet: "会装死来欺骗对手。\n虽然体型小又没力气，\n却懂得运用智慧来求生。"
        zh_trad:
          scarlet: "體色和模樣會有差異，\n似乎是為了便於引誘獵物，\n而配合了其喜好的結果。"
          violet: "會裝死來欺騙對手。\n雖然體型小又沒力氣，\n卻懂得運用智慧來求生。"
    tatsugiri_stretchy_form:
      form_id: 2
      names:
        jp_kana: のびたすがた
