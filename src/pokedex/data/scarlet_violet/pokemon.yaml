      descriptions:
        jp_kana:
          scarlet: "￹白￺しろ￻い　￹体毛￺たいもう￻は　￹特別￺とくべつ￻な　￹油￺あぶら￻で\nコーティングされているので\n￹敵￺てき￻の　￹攻撃￺こうげき￻を　￹受￺う￻け￹流￺なが￻すのだ。"
          violet: "￹全身￺ぜんしん￻から　￹染￺し￻み￹出￺だ￻す　￹油￺あぶら￻は\nとても　なめらか。　￹肌荒￺はだあ￻れに\n￹悩￺なや￻む　￹人￺ひと￻にも　￹効果的￺こうかてき￻なのだ。"
        jp_kanji:
          scarlet: "￹白￺しろ￻い　￹体毛￺たいもう￻は　￹特別￺とくべつ￻な　￹油￺あぶら￻で\nコーティングされているので\n￹敵￺てき￻の　￹攻撃￺こうげき￻を　￹受￺う￻け￹流￺なが￻すのだ。"
          violet: "￹全身￺ぜんしん￻から　￹染￺し￻み￹出￺だ￻す　￹油￺あぶら￻は\nとても　なめらか。　￹肌荒￺はだあ￻れに\n￹悩￺なや￻む　￹人￺ひと￻にも　￹効果的￺こうかてき￻なのだ。"
        en:
          scarlet: "Their white fur is coated in a special oil that\nmakes it easy for them to deflect attacks."
          violet: "The oil that seeps from its body is really smooth.\nFor people troubled by bad skin, this oil is an\neffective treatment."
        fr:
          scarlet: "Son pelage blanc est enduit d’une huile spéciale\nqui lui permet de se dérober facilement\naux attaques."
          violet: "Son corps entier sécrète une huile extrêmement\nonctueuse. Cette dernière est un remède efficace\ncontre la peau sèche."
        it:
          scarlet: "La parte bianca della sua pelliccia è ricoperta\ndi un olio speciale che lo aiuta a evitare i colpi\ndei nemici."
          violet: "L’olio particolarmente fluido prodotto dal suo\ncorpo è molto efficace contro le irritazioni\ncutanee."
        de:
          scarlet: "Sein weißer Flaum ist mit einem speziellen Öl\nüberzogen. Gegnerische Angriffe gleiten daran\neinfach ab."
          violet: "Aus seinem Körper tritt besonders schmieriges Öl\naus, das für Menschen, die unter trockener Haut\nleiden, von großem Nutzen ist."
        es:
          scarlet: "Su pelaje blanco está recubierto por un aceite\nespecial que hace resbalar los ataques enemigos."
          violet: "El aceite que exuda por todo el cuerpo es muy\nlubrificante y supone un tratamiento eficaz para\nlas personas con problemas de piel."
        ko:
          scarlet: "하얀 털은 특별한 기름으로\n코팅되어 있어서\n상대의 공격을 흘려 버린다."
          violet: "전신에서 배어 나오는 기름은\n매우 부드럽다. 거친 피부가\n고민인 사람에게도 효과적이다."
        zh_simp:
          scarlet: "白色的体毛上\n覆盖着特别的油脂，\n因此能让敌人的攻击落空。"
          violet: "从全身渗出的油非常滑。\n对于因肌肤干燥而烦恼的人\n也很有效果。"
        zh_trad:
          scarlet: "由於白色的體毛上有\n特別的油脂形成覆膜，\n因此能卸開對手的攻擊。"
          violet: "從全身滲出的油非常滑。\n對於因為肌膚乾燥而\n煩惱的人也很有效果。"
