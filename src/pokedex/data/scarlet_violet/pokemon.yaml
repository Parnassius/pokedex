        jp_kana:
          scarlet: "マイナンと　プラスルの　￹電気￺でんき￻は\n￹血液￺けつえき￻の　￹流￺なが￻れを　￹良￺よ￻くして\nこりを　ほぐす　￹効果￺こうか￻が　ある。"
          violet: "￹水￺みず￻が　￹苦手￺にがて￻。　￹雨￺あめ￻が　￹降￺ふ￻りだすと\n￹軒下￺のきした￻で　￹雨宿￺あまやど￻り。　￹火花￺ひばな￻の\nボンボンで　￹仲間￺なかま￻を　￹励￺はげ￻ます。"
        jp_kanji:
          scarlet: "マイナンと　プラスルの　￹電気￺でんき￻は\n￹血液￺けつえき￻の　￹流￺なが￻れを　￹良￺よ￻くして\nこりを　ほぐす　￹効果￺こうか￻が　ある。"
          violet: "￹水￺みず￻が　￹苦手￺にがて￻。　￹雨￺あめ￻が　￹降￺ふ￻りだすと\n￹軒下￺のきした￻で　￹雨宿￺あまやど￻り。　￹火花￺ひばな￻の\nボンボンで　￹仲間￺なかま￻を　￹励￺はげ￻ます。"
        en:
          scarlet: "Exposure to electricity from Minun and Plusle\npromotes blood circulation and relaxes muscles."
          violet: "Its dislike of water makes it take shelter under\nthe eaves of houses in rain. It uses pom-poms\nmade of sparks for cheering."
        fr:
          scarlet: "L’électricité de Posipi et Négapi favorise\nla circulation sanguine et soulage les tensions\nmusculaires."
          violet: "Il déteste tellement l’eau qu’il se réfugie sous\nles porches à la moindre averse. Il soutient\nses camarades avec des pompons d’étincelles."
        it:
          scarlet: "L’elettricità di Plusle e Minun favorisce\nla circolazione sanguigna e aiuta\na sciogliere la tensione muscolare."
          violet: "Poiché odia l’acqua, quando piove si rifugia\nsotto i cornicioni. Incita i compagni con pompon\ndi scintille."
        de:
          scarlet: "Die Elektrizität von Minun und Plusle regt den\nBlutkreislauf an und löst so Verspannungen."
          violet: "Da es Wasser verabscheut, versteckt es sich bei\nRegen unter Dachvorsprüngen. Es setzt Pompons\naus Funken zum Anfeuern ein."
        es:
          scarlet: "La electricidad de Minun y Plusle es buena para\nla circulación y para desentumecer los músculos."
          violet: "Como odia el agua, se protege bajo los aleros\nde las casas si llueve. Anima a sus compañeros\ncon pompones de chispas."
        ko:
          scarlet: "마이농과 플러시의 전기는\n혈액의 흐름을 좋게 하여\n근육 결림을 푸는 효과가 있다."
          violet: "물을 싫어한다. 비가 내리면\n처마 밑에서 비를 피한다.\n스파크를 톡톡 튀겨서 동료를 응원한다."
        zh_simp:
          scarlet: "负电拍拍和正电拍拍放出的电流\n有促进血液流动，缓解酸痛的功效。"
          violet: "很讨厌水，一旦下起雨来\n就会躲到屋檐下避雨。\n会用火花拉拉球给伙伴加油。"
        zh_trad:
          scarlet: "負電拍拍和正電拍拍放出的\n電流有促進血液流動，\n緩解酸痛的功效。"
          violet: "討厭碰到水，一旦下起雨\n就會到屋簷下避雨。\n會用火花彩球幫夥伴加油。"
