      descriptions:
        jp_kana:
          scarlet: "エサの　￹石￺いし￻を　￹求￺もと￻めて　ケンカ。\nゴローン￹同士￺どうし￻が　ぶつかるたびに\n￹爆音￺ばくおん￻と　￹光￺ひかり￻が　ほとばしる。"
          violet: "￹好物￺こうぶつ￻の　￹石￺いし￻の　￹影響￺えいきょう￻で\n￹全身￺ぜんしん￻が　￹電気￺でんき￻を　￹帯￺お￻びている。\nとても　￹喧嘩￺けんか￻っ￹早￺ぱや￻い　￹性格￺せいかく￻。"
        jp_kanji:
          scarlet: "エサの　￹石￺いし￻を　￹求￺もと￻めて　ケンカ。\nゴローン￹同士￺どうし￻が　ぶつかるたびに\n￹爆音￺ばくおん￻と　￹光￺ひかり￻が　ほとばしる。"
          violet: "￹好物￺こうぶつ￻の　￹石￺いし￻の　￹影響￺えいきょう￻で\n￹全身￺ぜんしん￻が　￹電気￺でんき￻を　￹帯￺お￻びている。\nとても　￹喧嘩￺けんか￻っ￹早￺ぱや￻い　￹性格￺せいかく￻。"
        en:
          scarlet: "They eat rocks and often get into a scrap over\nthem. The impact of Graveler smashing together\ncauses a flash of light and a booming noise."
          violet: "Graveler’s entire body is electrically charged\ndue to the stones it likes to eat. It is a very\nquick-tempered Pokémon."
        fr:
          scarlet: "Ils se disputent les cailloux qu’ils mangent. Quand\ndeux Gravalanch s’entrechoquent, cela provoque\ndes bruits d’explosion et des flashs lumineux."
          violet: "Il possède un tempérament belliqueux.\nSon corps est chargé en électricité\ngrâce aux pierres dont il raffole."
        it:
          scarlet: "Litigano per le pietre di cui si nutrono.\nQuando cozzano l’uno contro l’altro,\nproducono suoni esplosivi e lampi di luce."
          violet: "Per effetto delle rocce di cui è ghiotto,\nil suo corpo è interamente pervaso\ndall’elettricità. Ha un carattere molto litigioso."
        de:
          scarlet: "Georok streiten sich um ihre Gesteinsnahrung.\nWenn sie kollidieren, erzeugt das einen lauten\nKnall sowie einen Lichtblitz."
          violet: "Durch seine bevorzugte Gesteinsnahrung\nist sein Körper von Elektrizität erfüllt.\nAußerdem ist es sehr streitlustig."
        es:
          scarlet: "Se pelean por las rocas de las que se alimentan.\nCuando chocan entre sí, se oyen estallidos y se\nven destellos de luz."
          violet: "Su cuerpo rebosa electricidad debido al tipo de\nrocas de las que se alimenta. Es muy propenso a\npelearse."
        ko:
          scarlet: "먹이인 돌을 두고 싸운다.\n데구리끼리 부딪칠 때마다\n폭음과 빛을 내뿜는다."
          violet: "좋아하는 돌의 영향으로\n전신에 전기를 띠고 있다.\n매우 쉽게 싸우려 드는 성격이다."
        zh_simp:
          scarlet: "为寻找吃的石头而打架。\n每次隆隆石之间互相碰撞\n都会迸发出爆炸声和光芒。"
          violet: "受到喜欢吃的石头影响，\n它全身都带着电。\n性格非常好斗。"
        zh_trad:
          scarlet: "為尋找吃的石頭而打架。\n隆隆石們每次互相碰撞\n都會發出爆炸聲和耀眼的光芒。"
          violet: "受到愛吃的石頭影響，\n牠的全身都帶著電。\n性格非常好鬥。"
