          scarlet: "ある　￹地域￺ちいき￻だけで　￹栽培￺さいばい￻される\n￹特別￺とくべつ￻な　りんごで　￹進化￺しんか￻した。\n２￹匹￺ひき￻で　１￹匹￺ひき￻の　ポケモンなのだ。"
          violet: "￹頭￺あたま￻を　￹出￺だ￻している　そとッチュと\n￹尻尾￺しっぽ￻を　￹出￺だ￻している　なかッチュが\n￹助￺たす￻け￹合￺あ￻い　りんごのなかで　￹暮￺く￻らす。"
        jp_kanji:
          scarlet: "ある　￹地域￺ちいき￻だけで　￹栽培￺さいばい￻される\n￹特別￺とくべつ￻な　りんごで　￹進化￺しんか￻した。\n２￹匹￺ひき￻で　１￹匹￺ひき￻の　ポケモンなのだ。"
          violet: "￹頭￺あたま￻を　￹出￺だ￻している　そとッチュと\n￹尻尾￺しっぽ￻を　￹出￺だ￻している　なかッチュが\n￹助￺たす￻け￹合￺あ￻い　りんごのなかで　￹暮￺く￻らす。"
        en:
          scarlet: "Dipplin is two creatures in one Pokémon.\nIts evolution was triggered by a special apple\ngrown only in one place."
          violet: "The head sticking out belongs to the fore-wyrm,\nwhile the tail belongs to the core-wyrm. The two\nshare one apple and help each other out."
        fr:
          scarlet: "Ce Pokémon est composé de deux individus.\nIl a évolué grâce à une pomme spéciale qui n’est\ncultivée que dans une certaine région."
          violet: "À l’intérieur de la pomme vivent « Ver-dehors »\net « Ver-dedans ». La tête du premier\net la queue du second sortent du fruit."
        it:
          scarlet: "Pokémon formato da due individui.\nSi è evoluto grazie a un pomo speciale\ncoltivato solo in una certa zona."
          violet: "L’Applitesta, che fa capolino, e l’Applicoda,\ndi cui invece sbuca solo la parte posteriore,\nvivono nel pomo aiutandosi a vicenda."
        de:
          scarlet: "Dieses Pokémon besteht aus zwei Individuen.\nEs hat sich mithilfe eines Apfels entwickelt, der\nnur in einer bestimmten Gegend angebaut wird."
          violet: "Im Apfel leben die sich gegenseitig helfenden\n„Kopfel“ und „Schwanzel“. Beim Ersten ragt der\nKopf heraus, beim Zweiten der Schwanz."
        es:
          scarlet: "Ha evolucionado gracias a una manzana especial\nque solo se cultiva en cierta zona. Este Pokémon\nestá formado por dos individuos."
          violet: "Exterappli, el que saca la cabeza, e Interappli,\nel que saca la cola, viven juntos dentro de la\nmanzana y se ayudan el uno al otro."
        ko:
          scarlet: "어떤 지역에서만 재배되는\n특별한 사과에 의해 진화했다.\n두 마리가 하나인 포켓몬이다."
          violet: "머리를 내밀고 있는 외미르와\n꼬리를 내밀고 있는 내미르가\n사과 안에서 서로 도우며 지낸다."
        zh_simp:
          scarlet: "以仅能在某地区栽培的\n特殊苹果进化而成。\n是２只为一体的宝可梦。"
          violet: "露出脑袋的外头虫与\n露出尾巴的里头虫互相帮助，\n一起生活在苹果里面。"
        zh_trad:
          scarlet: "用只會在某個地區栽培的\n特別的蘋果進化而來。\n是２隻等於１隻的寶可夢。"
          violet: "由露出了頭部的外頭蟲與\n露出了尾巴的裡頭蟲相扶相持，\n一起在蘋果裡面生活。"
