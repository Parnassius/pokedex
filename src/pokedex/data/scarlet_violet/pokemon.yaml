        jp_kanji:
          scarlet: "￹肺￺はい￻と　￹心臓￺しんぞう￻が　３つに　￹増￺ふ￻えた。\nドードーよりも　￹足￺あし￻は　￹遅￺おそ￻いが\n￹長時間￺ちょうじかん￻　￹走￺はし￻り￹続￺つづ￻けられるぞ。"
          violet: "いちばん　￹首￺くび￻が　￹太￺ふと￻く　￹力￺ちから￻の\n￹強￺つよ￻い　￹頭￺あたま￻が　リーダーとして\n￹体￺からだ￻の　￹主導権￺しゅどうけん￻を　￹握￺にぎ￻る。"
        en:
          scarlet: "It now has three hearts and three sets of lungs.\nThough it can’t run as fast as Doduo, Dodrio can\nkeep running for longer stretches of time."
          violet: "The strongest head with the thickest neck\nbecomes the leader and gains primary control\nof the body."
        fr:
          scarlet: "Ce Pokémon possède à présent six poumons\net trois cœurs. Il est plus lent que Doduo, mais\nil peut courir sur de plus longues distances."
          violet: "La tête dont le cou est le plus épais et le plus\nmusclé devient la cheffe et s’arroge le droit\nde diriger le corps."
        it:
          scarlet: "Ora ha tre coppie di polmoni e tre cuori.\nÈ più lento di Doduo, ma può correre molto\na lungo."
          violet: "La testa più forte e dal collo più grosso assume\nil ruolo di capo e prende il controllo del corpo."
        de:
          scarlet: "Diesem Pokémon sind drei Lungen und drei\nHerzen gewachsen. Es ist langsamer als Dodu,\nhat beim Rennen aber eine hohe Ausdauer."
          violet: "Der stärkste Kopf mit dem dicksten Hals\nübernimmt als Anführer die Kontrolle über\nden Körper."
        es:
          scarlet: "Ahora cuenta con tres corazones y tres pares de\npulmones. No alcanza las velocidades de Doduo,\npero es capaz de correr durante más tiempo."
          violet: "La cabeza más fuerte y con el cuello más grueso\nhace las veces de líder y toma las riendas del\ncuerpo."
        ko:
          scarlet: "폐와 심장이 3개로 늘어났다.\n두두보다 다리는 느리지만\n장시간을 계속 달릴 수 있다."
          violet: "가장 목이 굵고 힘센 머리가\n리더로서 몸의 주도권을 갖는다."
        zh_simp:
          scarlet: "肺和心脏增加至３个。\n虽然比嘟嘟跑得慢，\n但能够长时间持续奔跑。"
          violet: "脖子最粗，力量最强的\n脑袋会作为首领\n掌握身体的主导权。"
        zh_trad:
          scarlet: "肺和心臟都增加為３個。\n雖然跑起來比嘟嘟慢，\n但卻能長時間持續奔跑。"
          violet: "頸部最粗且力量最強的\n那顆頭會成為首領，\n掌握身體的主導權。"
