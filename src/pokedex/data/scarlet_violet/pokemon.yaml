      hidden_ability: sand_force
      descriptions:
        jp_kana:
          scarlet: "￹地下￺ちか￻１メートルくらいを　￹掘￺ほ￻りすすみ\n￹木￺き￻の￹根￺ね￻っこなどを　かじって　￹生￺い￻きる。\nたまに　￹地上￺ちじょう￻に　￹顔￺かお￻を￹出￺だ￻す。"
          violet: "￹皮膚￺ひふ￻が　とても　￹薄￺うす￻いので\n￹光￺ひかり￻に　￹照￺て￻らされると　￹血液￺けつえき￻が\n￹温￺あたた￻められて　￹弱￺よわ￻ってしまう。"
        jp_kanji:
          scarlet: "￹地下￺ちか￻１メートルくらいを　￹掘￺ほ￻りすすみ\n￹木￺き￻の￹根￺ね￻っこなどを　かじって　￹生￺い￻きる。\nたまに　￹地上￺ちじょう￻に　￹顔￺かお￻を￹出￺だ￻す。"
          violet: "￹皮膚￺ひふ￻が　とても　￹薄￺うす￻いので\n￹光￺ひかり￻に　￹照￺て￻らされると　￹血液￺けつえき￻が\n￹温￺あたた￻められて　￹弱￺よわ￻ってしまう。"
        en:
          scarlet: "It lives about one yard underground, where it\nfeeds on plant roots. It sometimes appears\naboveground."
          violet: "Its skin is very thin. If it is exposed to light,\nits blood heats up, causing it to grow weak."
        fr:
          scarlet: "Ce Pokémon vit un mètre sous terre et se nourrit\nde racines. Il apparaît parfois à la surface."
          violet: "Son épiderme est très fin. S’il est exposé au\nsoleil, son sang se réchauffe, ce qui l’affaiblit."
        it:
          scarlet: "Vive un metro sottoterra, dove si nutre di radici.\nTalvolta compare in superficie."
          violet: "La sua pelle è sottilissima. Se si espone alla luce,\nsi indebolisce poiché il suo sangue si riscalda."
        de:
          scarlet: "Dieses Pokémon lebt 1 m unter der Erde.\nEs frisst Wurzeln und kommt hin und wieder\nan die Oberfläche."
          violet: "Seine Haut ist sehr dünn. Wird es Licht\nausgesetzt, erhitzt sich sein Blut und es wird\nschwach."
        es:
          scarlet: "Vive 1 m por debajo del suelo, donde se\nalimenta de raíces. A veces también aparece\nen la superficie."
          violet: "Su piel es muy fina. Si se expone a la luz,\nsu sangre se calienta y se queda sin fuerzas."
        ko:
          scarlet: "지하 1m 정도를 파고들어 가서\n나무뿌리 등을 씹어 먹고 산다.\n가끔 지상으로 얼굴을 내민다."
          violet: "피부가 매우 얇아서\n빛을 쪼이게 되면\n혈액이 데워져 약해진다."
        zh_simp:
          scarlet: "在地下１米左右的地方挖洞前进，\n靠啃食树根之类的东西生存。\n偶尔会到地面上露个脸。"
          violet: "皮肤非常薄，\n所以被光照射后，\n就会因血液升温而变得虚弱。"
        zh_trad:
          scarlet: "在大約１公尺深的地底挖洞前進，\n靠啃食樹根之類的東西生存。\n偶爾會到地面上露個臉。"
          violet: "皮膚非常薄，\n所以被光照到時，\n會因為血液溫度升高而變得虛弱。"
    diglett_alolan_form:
      form_id: 1
      names:
        jp_kana: アローラのすがた
        jp_kanji: アローラのすがた
        en: Alolan Form
