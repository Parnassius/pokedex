        jp_kanji:
          scarlet: "￹第￺だい￻３の￹脚￺あし￻が　￹畳￺たた￻まれている。\nピンチになると　１０メートル￹以上￺いじょう￻\nジャンプする　￹脚力￺きゃくりょく￻を　￹持￺も￻つ。"
          violet: "ジャンプ￹力￺りょく￻を　￹活￺い￻かして\n￹相手￺あいて￻の　￹攻撃￺こうげき￻を　かわしながら\nダメージを　￹与￺あた￻える　￹戦￺たたか￻い￹方￺かた￻が　￹得意￺とくい￻。"
        en:
          scarlet: "It has its third set of legs folded up. When it’s in\na tough spot, this Pokémon jumps over 30 feet\nusing the strength of its legs."
          violet: "It’s highly skilled at a fighting style in which it\nuses its jumping capabilities to dodge incoming\nattacks while also dealing damage to opponents."
        fr:
          scarlet: "Sa troisième paire de pattes est repliée.\nIl possède assez de force pour sauter à plus\nde dix mètres lorsqu’il est en difficulté."
          violet: "En combat, sa capacité à bondir lui permet\nd’infliger des dégâts tout en évitant les attaques."
        it:
          scarlet: "Di solito tiene ripiegato su di sé un terzo paio\ndi zampe, la cui potenza gli permette di spiccare\nsalti di oltre 10 metri nei momenti di pericolo."
          violet: "È molto abile nello sfruttare le proprie capacità\ndi salto per schivare gli attacchi avversari\ne infliggere danni allo stesso tempo."
        de:
          scarlet: "Sein drittes Beinpaar ist eingeklappt. In einer\nNotlage kann es dank dessen Kraft mehr als\n10 m weit springen."
          violet: "Im Kampf ist es darauf spezialisiert, mithilfe seiner\nSprungkraft gegnerischen Angriffen auszuweichen\nund gleichzeitig Schaden auszuteilen."
        es:
          scarlet: "Mantiene plegado su tercer par de patas, cuya\nfuerza le permite saltar a más de 10 m de altura\npara huir en caso de apuro."
          violet: "Su estilo de lucha característico aprovecha su\nformidable capacidad de salto para esquivar\nlos ataques del rival mientras lo va dañando."
        ko:
          scarlet: "제3의 다리가 접혀 있다.\n위기에 처하면 10m 이상을 점프하는\n다릿심을 가지고 있다."
          violet: "점프력을 이용하여\n상대의 공격을 피하며\n데미지를 주는 전법이 특기다."
        zh_simp:
          scarlet: "总是将第３双脚折起来。\n拥有陷入危机时能够\n跳跃１０米以上的脚力。"
          violet: "活用跳跃力来闪避攻击，\n并同时给予对手伤害，\n是它很擅长的战斗方式。"
        zh_trad:
          scarlet: "總是將第３對腳折起來。\n擁有在遇到危機時能夠\n跳超過１０公尺的跳躍力。"
          violet: "活用跳躍力閃避攻擊\n並同時給予對手傷害，\n是牠很擅長的戰鬥方式。"
