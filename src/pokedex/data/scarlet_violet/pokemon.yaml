      descriptions:
        jp_kana:
          scarlet: "￹生息地￺せいそくち￻を　￹広￺ひろ￻げるため　￹木￺き￻の￹実￺み￻の\n￹振￺ふ￻りをして　￹鳥￺とり￻ポケモンに　つかまり\n￹遠￺とお￻くまで　￹運￺はこ￻んでもらうのだ。"
          violet: "￹木￺き￻の￹枝￺えだ￻に　ぶら￹下￺さ￻がり　￹水分￺すいぶん￻を\n￹吸￺す￻いとり　￹暮￺く￻らす。　￹若￺わか￻くて　￹大￺おお￻きな\n￹樹木￺じゅもく￻に　タネボーが　￹連￺つら￻なる。"
        jp_kanji:
          scarlet: "￹生息地￺せいそくち￻を　￹広￺ひろ￻げるため　￹木￺き￻の￹実￺み￻の\n￹振￺ふ￻りをして　￹鳥￺とり￻ポケモンに　つかまり\n￹遠￺とお￻くまで　￹運￺はこ￻んでもらうのだ。"
          violet: "￹木￺き￻の￹枝￺えだ￻に　ぶら￹下￺さ￻がり　￹水分￺すいぶん￻を\n￹吸￺す￻いとり　￹暮￺く￻らす。　￹若￺わか￻くて　￹大￺おお￻きな\n￹樹木￺じゅもく￻に　タネボーが　￹連￺つら￻なる。"
        en:
          scarlet: "To expand its habitat, it pretends to be a nut so\nthat bird Pokémon will pick it up and carry it far\naway."
          violet: "Seedot live in trees, hanging from the branches\nand leeching moisture. Rows of them can be\nfound dangling from large, young trees."
        fr:
          scarlet: "Pour étendre son habitat, il se fait passer pour\nune Baie et se laisse transporter sur de longues\ndistances par des Pokémon oiseaux."
          violet: "Il se suspend aux branches des arbres et\nen absorbe l’eau. On trouve parfois plusieurs\nGrainipiot alignés sur les jeunes arbres imposants."
        it:
          scarlet: "Per espandere il suo habitat, finge di essere\nuna ghianda e si fa afferrare dai Pokémon alati\nper essere trasportato lontano."
          violet: "Vive appeso ai rami degli alberi, assorbendone\nl’umidità. Gli alberi giovani e grandi attraggono\nun maggior numero di Seedot."
        de:
          scarlet: "Zur Erweiterung seines Habitats gibt es vor,\neine Eichel zu sein, damit Vogel-Pokémon es\naufpicken und in die Ferne tragen."
          violet: "Es hängt von Ästen herab und lebt dort, indem es\nihnen Feuchtigkeit entzieht. An großen, jungen\nBäumen finden sich reihenweise Samurzel."
        es:
          scarlet: "Pretenden ser una bellota para que los Pokémon\npájaro se los lleven volando de un lado a otro\ny así expandir su hábitat."
          violet: "Viven colgados de las ramas de los árboles y\nabsorben su humedad. Los árboles más grandes\ny jóvenes atraen mayor cantidad de Seedot."
        ko:
          scarlet: "서식지를 넓히기 위해 나무열매를 흉내 내어\n새포켓몬에게 붙잡히는 방식으로\n먼 곳까지 이동한다."
          violet: "나뭇가지에 매달려서\n수분을 흡수하며 지낸다.\n어리고 큰 나무일수록 도토링이 줄지어 있다."
        zh_simp:
          scarlet: "为了扩大栖息地，\n会假装成树果，让鸟宝可梦\n把自己抓到远方去。"
          violet: "悬挂在树枝下吸收水分生活。\n在年轻且巨大的树木上，\n会有成排的橡实果。"
        zh_trad:
          scarlet: "會假裝成樹果，讓鳥寶可夢\n將牠抓住並運到遙遠的地方，\n藉此拓展棲息地。"
          violet: "懸掛在樹枝上吸收水分生活。\n在年輕又巨大的樹木上，\n會有成排的橡實果。"
