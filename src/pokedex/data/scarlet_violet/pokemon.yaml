        jp_kanji:
          scarlet: "￹暗闇￺くらやみ￻にまぎれ　ガスの￹手￺て￻を　￹伸￺の￻ばし\n￹人￺ひと￻の￹肩￺かた￻を　￹叩￺たた￻くのが　￹好￺す￻き。\n￹触￺さわ￻られると　￹震￺ふる￻えが　￹止￺と￻まらない。"
          violet: "￹本当￺ほんとう￻に　なにも　￹見￺み￻えない\n￹暗闇￺くらやみ￻で　ゴーストは　￹静￺しず￻かに\n￹獲物￺えもの￻を　￹狙￺ねら￻っているのだ。"
        en:
          scarlet: "It likes to lurk in the dark and tap shoulders\nwith a gaseous hand. Its touch causes endless\nshuddering."
          violet: "In total darkness, where nothing is visible,\nHaunter lurks, silently stalking its next victim."
        fr:
          scarlet: "Il adore se tapir dans l’ombre et faire frissonner\nses proies pour l’éternité en leur touchant\nl’épaule."
          violet: "Dans les ténèbres impénétrables, là où on ne voit\nrien, il se déplace en silence à l’affût de sa proie."
        it:
          scarlet: "Adora stare in agguato nei luoghi bui e\ntoccare le spalle delle vittime con le sue mani\ngassose. Il suo tocco causa brividi incontenibili."
          violet: "Attende in silenzio la preda, celandosi\nnell’oscurità più totale, dove non si vede\nnulla."
        de:
          scarlet: "Es lauert gern im Dunkeln und tippt Leuten mit\nseiner gasförmigen Hand auf die Schulter.\nSeine Berührung erzeugt endloses Schaudern."
          violet: "Alpollo wartet in absoluter Finsternis auf seine\nOpfer. Es lauert ihnen auf und stellt ihnen nach."
        es:
          scarlet: "Le gusta acechar en la oscuridad y tocarles\nel hombro a sus víctimas con su mano gaseosa.\nEstas se quedan temblando para siempre."
          violet: "En la oscuridad total, donde no se\nve nada, Haunter acecha a su próxima\nvíctima."
        ko:
          scarlet: "어둠을 틈타 가스로 된 손을 뻗쳐\n사람의 어깨를 두드리기 좋아한다.\n그 손에 닿으면 떨림이 멈추지 않는다."
          violet: "정말 아무것도 보이지 않는\n어둠 속에서 고우스트는\n조용히 먹이를 노리고 있다."
        zh_simp:
          scarlet: "喜欢隐匿在黑暗中伸出\n气体状的手去拍人的肩膀。\n若被它碰到，身体就会抖个不停。"
          violet: "在伸手不见五指的\n黑暗之中，鬼斯通会\n静悄悄地锁定猎物。"
        zh_trad:
          scarlet: "喜歡躲在黑暗中伸出氣體\n構成的手去拍人的肩膀。\n一旦被接觸到，身體便會抖個不停。"
          violet: "鬼斯通會在伸手不見五指\n的黑暗中伺機捕捉獵物，\n不發一點聲響。"
