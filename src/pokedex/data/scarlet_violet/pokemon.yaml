          violet: "とても　￹重￺おも￻たい　￹頭￺あたま￻を　ゆっくり\n￹振￺ふ￻り￹下￺お￻ろし　￹深￺ふか￻さ５０メートルの\n￹長大￺ちょうだい￻な　￹地割￺じわ￻れを　￹引￺ひ￻き￹起￺お￻こす。"
        jp_kanji:
          scarlet: "￹古￺いにしえ￻の　￹儀式￺ぎしき￻で　￹使￺つか￻われた　￹器￺うつわ￻に\n￹注￺そそ￻がれた　￹恐怖￺きょうふ￻が\n￹土石￺どせき￻を　まとい　ポケモンとなった。"
          violet: "とても　￹重￺おも￻たい　￹頭￺あたま￻を　ゆっくり\n￹振￺ふ￻り￹下￺お￻ろし　￹深￺ふか￻さ５０メートルの\n￹長大￺ちょうだい￻な　￹地割￺じわ￻れを　￹引￺ひ￻き￹起￺お￻こす。"
        en:
          scarlet: "The fear poured into an ancient ritual vessel\nhas clad itself in rocks and dirt to become\na Pokémon."
          violet: "It slowly brings its exceedingly heavy head down\nupon the ground, splitting the earth open with\nhuge fissures that run over 160 feet deep."
        fr:
          scarlet: "La peur déversée dans un réceptacle utilisé\nlors de rites anciens s’est mêlée à de la terre et\nà des pierres et a pris vie."
          violet: "Sa tête est si lourde que quand il la pose en\ndouceur sur le sol, celui-ci se fend et une faille\nde 50 mètres de profondeur se forme."
        it:
          scarlet: "Prese vita quando le angosce riversate\nin un antico vaso cerimoniale si fusero\ncon roccia e terra."
          violet: "La sua testa è talmente pesante che anche solo\nappoggiandola delicatamente a terra può\ncausare spaccature profonde fino a 50 metri."
        de:
          scarlet: "Die Angst, die in ein Gefäß für uralte Rituale\ngegossen wurde, hüllte sich in Steine und Erde\nund wurde zu diesem Pokémon."
          violet: "Schwingt es seinen außerordentlich schweren\nKopf langsam zu Boden, kann es gewaltige\nErdspalten von 50 m Tiefe verursachen."
        es:
          scarlet: "Este Pokémon nació al imbuirse en tierra y\nrocas el miedo vertido en un caldero que\nse utilizaba en rituales antiguos."
          violet: "Su cabeza es tan pesada que es capaz de crear\nenormes grietas de 50 m de profundidad\nal blandirla lentamente contra el suelo."
        ko:
          scarlet: "옛날 의식에 사용되었던 그릇에\n공포가 깃들게 되었고\n이것이 흙과 돌을 둘러 포켓몬이 되었다."
          violet: "매우 무거운 머리를 천천히 내리쳐서\n땅에 50m 깊이의\n거대한 균열을 일으킨다."
        zh_simp:
          scarlet: "注入在古老仪式中使用的\n器皿里的恐惧之心周围\n凝聚起土石，变成了宝可梦。"
          violet: "当它缓缓挥下自己笨重的\n头部时，会让地面出现\n深度达５０米的巨大裂缝。"
        zh_trad:
          scarlet: "古老儀式用的容器中注入的\n恐懼把土石裹在自己身上，\n變成了寶可夢。"
          violet: "當牠緩緩揮下自己笨重的\n頭部時，會造成地面出現\n深度達５０公尺的巨大裂縫。"
