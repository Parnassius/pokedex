        jp_kanji:
          scarlet: "￹最新科学￺さいしんかがく￻で　￹進化￺しんか￻した\n￹人工￺じんこう￻の　ポケモン。　ときどき\nプログラムにない　￹反応￺はんのう￻をみせる。"
          violet: "￹惑星開発￺わくせいかいはつ￻が　できるよう\nポリゴンを　バージョンアップしたが\nまだ　￹空￺そら￻も　￹飛￺と￻べない。"
        en:
          scarlet: "This artificial Pokémon evolved thanks to cutting-\nedge science. It sometimes displays behavior that\nis not in its programming."
          violet: "Porygon was upgraded to become capable\nof planetary development. However, this\nupgraded version cannot even fly yet."
        fr:
          scarlet: "Ce Pokémon artificiel a évolué grâce aux derniers\nprogrès scientifiques. Il a parfois des réactions\nqui ne font pas partie de sa programmation."
          violet: "Cette version améliorée de Porygon a été\ncréée pour le développement planétaire,\nmais elle ne peut toujours pas voler."
        it:
          scarlet: "Un Pokémon artificiale realizzato con tecnologia\nd’avanguardia. Di tanto in tanto mostra reazioni\nnon programmate."
          violet: "Questa versione aggiornata di Porygon è adatta\nallo sviluppo planetario, anche se non è ancora\nin grado di volare."
        de:
          scarlet: "Dieses künstliche Pokémon entwickelte sich\nmithilfe neuester Technologie. Manchmal zeigt\nes Reaktionen, die nicht einprogrammiert sind."
          violet: "Diese verbesserte Version von Porygon wurde\nfür die Erschließung anderer Planeten gebaut,\njedoch kann sie noch nicht einmal fliegen."
        es:
          scarlet: "Pokémon artificial evolucionado con tecnología\nde vanguardia. En ocasiones muestra reacciones\nque no forman parte de su código."
          violet: "Esta versión mejorada de Porygon se creó para\nposibilitar la exploración de otros planetas, pero\nni siquiera es capaz de volar aún."
        ko:
          scarlet: "최신 과학에 의해 진화한 인공 포켓몬.\n가끔씩 프로그래밍되어 있지 않은\n반응을 보인다."
          violet: "행성 개발을 할 수 있도록\n폴리곤을 버전 업했지만\n아직 하늘도 날지 못한다."
        zh_simp:
          scarlet: "利用最新科技进化而成的\n人工宝可梦。有时会作出\n不存在于程序里的反应。"
          violet: "为了能够开发行星而\n将多边兽升级而成，\n但连飞上空中都还做不到。"
        zh_trad:
          scarlet: "利用最新科技進化的\n人工寶可夢。有時會\n表現出程式裡沒有的反應。"
          violet: "為了要能開發行星\n而升級了多邊獸，\n但根本還不會飛。"
