      descriptions:
        jp_kana:
          scarlet: "￹群￺む￻れの　リーダーを　￹中心￺ちゅうしん￻に\n￹一糸乱￺いっしみだ￻れぬ　ダンスを　￹踊￺おど￻って\n￹団結力￺だんけつりょく￻を　￹高￺たか￻めているぞ。"
          violet: "￹薄明￺はくめい￻の￹中￺なか￻で　￹踊￺おど￻る　￹美￺うつく￻しい\nダンスから　￹多￺おお￻くの　￹芸術家￺げいじゅつか￻が\nインスピレーションを　￹受￺う￻けたという。"
        jp_kanji:
          scarlet: "￹群￺む￻れの　リーダーを　￹中心￺ちゅうしん￻に\n￹一糸乱￺いっしみだ￻れぬ　ダンスを　￹踊￺おど￻って\n￹団結力￺だんけつりょく￻を　￹高￺たか￻めているぞ。"
          violet: "￹薄明￺はくめい￻の￹中￺なか￻で　￹踊￺おど￻る　￹美￺うつく￻しい\nダンスから　￹多￺おお￻くの　￹芸術家￺げいじゅつか￻が\nインスピレーションを　￹受￺う￻けたという。"
        en:
          scarlet: "Centered around its leader, the flock dances in\nperfect sync to strengthen its unity."
          violet: "It’s said that many artists have taken inspiration\nfrom the sight of a Swanna performing a beautiful\ndance in the light of dawn."
        fr:
          scarlet: "Pour renforcer l’unité de leur troupe,\nils se réunissent et dansent en parfaite\nharmonie autour de leur chef."
          violet: "On dit qu’un grand nombre d’artistes tirent\nleur inspiration de la danse gracieuse que\nce Pokémon exécute au crépuscule."
        it:
          scarlet: "Per rafforzare la coesione di gruppo, danzano\nin perfetta sincronia con il loro capo situato\nal centro dello stormo."
          violet: "Pare che numerosi artisti abbiano tratto\nispirazione dalla danza aggraziata che questo\nPokémon esegue al sorgere del sole."
        de:
          scarlet: "Mit ihrem Anführer im Zentrum bieten sie einen\nperfekt synchronisierten Tanz dar, der den\nZusammenhalt innerhalb des Schwarms erhöht."
          violet: "Der bezaubernde Tanz, den dieses Pokémon\nbei Dämmerung aufführt, soll schon vielen\nKünstlern als Inspiration gedient haben."
        es:
          scarlet: "Danzan en perfecta sincronía con el líder de la\nbandada, situado en el centro, para reforzar su\nvínculo grupal."
          violet: "Se dice que muchos artistas han encontrado la\ninspiración para su obra en las exquisitas danzas\nque ejecutan al amanecer."
        ko:
          scarlet: "무리의 리더를 중심으로\n일사불란하게 춤을 추며\n단결력을 높인다."
          violet: "새벽녘에 추는 아름다운 춤에\n많은 예술가들이\n영감을 얻었다고 전해진다."
        zh_simp:
          scarlet: "会以群体的首领为中心，\n跳出丝丝入扣的舞蹈\n来提升凝聚力哦。"
          violet: "会在黎明时分跳起\n优美的舞蹈，据说许多\n艺术家从中得到过灵感。"
        zh_trad:
          scarlet: "會以群體的首領為中心，\n跳出整齊劃一的舞蹈\n來提升群體的凝聚力。"
          violet: "據說許多藝術家都是從牠在\n晨曦暮色的微光中舞出的\n優美舞蹈獲得過靈感。"
