          scarlet: "￹火山￺かざん￻の　￹火口付近￺かこうふきん￻で　￹暮￺く￻らす。\nマグマが　￹冷￺ひ￻えて　￹固￺かた￻まった　￹殻￺から￻に\n￹炎￺ほのお￻エネルギーを　￹蓄￺たくわ￻えている。"
          violet: "￹野生￺やせい￻の　マグカルゴが　￹突然￺とつぜん￻\n￹増￺ふ￻えたときは　￹火山￺かざん￻が　￹噴火￺ふんか￻する\n￹前触￺まえぶ￻れという　￹伝承￺でんしょう￻がある。"
        jp_kanji:
          scarlet: "￹火山￺かざん￻の　￹火口付近￺かこうふきん￻で　￹暮￺く￻らす。\nマグマが　￹冷￺ひ￻えて　￹固￺かた￻まった　￹殻￺から￻に\n￹炎￺ほのお￻エネルギーを　￹蓄￺たくわ￻えている。"
          violet: "￹野生￺やせい￻の　マグカルゴが　￹突然￺とつぜん￻\n￹増￺ふ￻えたときは　￹火山￺かざん￻が　￹噴火￺ふんか￻する\n￹前触￺まえぶ￻れという　￹伝承￺でんしょう￻がある。"
        en:
          scarlet: "This Pokémon lives near the craters of volcanoes.\nIt stores fire energy in its shell of cooled and\nhardened magma."
          violet: "According to folklore, a sudden increase in the\nwild Magcargo population heralds a volcanic\neruption."
        fr:
          scarlet: "Il vit à proximité des cratères volcaniques.\nIl emmagasine de l’énergie thermique dans\nsa coquille faite de magma refroidi puis durci."
          violet: "Selon une légende, une prolifération soudaine de\nVolcaropod sauvages serait le signe annonciateur\nd’une éruption volcanique."
        it:
          scarlet: "Vive nei pressi dei crateri vulcanici.\nAccumula energia Fuoco nel guscio\nfatto di magma raffreddato e indurito."
          violet: "Secondo alcune leggende, un aumento\nimprovviso di Magcargo selvatici indica\nun’eruzione vulcanica imminente."
        de:
          scarlet: "Es lebt in der Nähe von Vulkankratern. In seiner\nSchale aus ausgekühltem und erhärtetem Magma\nspeichert es Feuer-Energie."
          violet: "Überlieferungen zufolge steht ein Vulkanausbruch\nkurz bevor, wenn plötzlich vermehrt wilde\nMagcargo auftauchen."
        es:
          scarlet: "Habita cerca de cráteres volcánicos. Almacena\nenergía ígnea en el interior de la coraza, la cual\nestá formada por magma enfriado y solidificado."
          violet: "Se dice que, si de repente aparecen más\nMagcargo salvajes de lo habitual, es una señal\nde que un volcán entrará en erupción pronto."
        ko:
          scarlet: "화산 분화구 근처에 산다.\n마그마가 식어서 딱딱해진 껍데기에\n불꽃 에너지를 비축하고 있다."
          violet: "야생 마그카르고가 갑자기 늘어나는 것은\n화산이 분화할 징조라는 전승이 있다."
        zh_simp:
          scarlet: "生活在火山口附近。\n由熔岩冷却凝固而成的\n壳里积蓄着火之能量。"
          violet: "传说野生的熔岩蜗牛\n数量突然增加是\n火山爆发的前兆。"
        zh_trad:
          scarlet: "生活在火山口附近。\n在熔岩冷卻後凝固而成的\n殼裡面儲存火之能量。"
          violet: "自古相傳如果野生的\n熔岩蝸牛突然變多了，\n那就是火山爆發的前兆。"
