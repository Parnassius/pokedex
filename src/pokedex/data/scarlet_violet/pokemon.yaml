        jp_kana:
          scarlet: "￹暗￺くら￻い　￹洞窟￺どうくつ￻に　￹棲￺す￻み￹処￺か￻を　￹作￺つく￻り\n￹鋭￺するど￻い　ツメを　￹使￺つか￻って\n￹宝石￺ほうせき￻を　￹掘￺ほ￻り￹出￺だ￻しては　￹食￺た￻べる。"
          violet: "￹体￺からだ￻の　￹表面￺ひょうめん￻に　￹食￺く￻った\n￹宝石￺ほうせき￻の　￹成分￺せいぶん￻が　￹浮￺う￻きだす。\nその　パターンは　￹無限大￺むげんだい￻だ。"
        jp_kanji:
          scarlet: "￹暗￺くら￻い　￹洞窟￺どうくつ￻に　￹棲￺す￻み￹処￺か￻を　￹作￺つく￻り\n￹鋭￺するど￻い　ツメを　￹使￺つか￻って\n￹宝石￺ほうせき￻を　￹掘￺ほ￻り￹出￺だ￻しては　￹食￺た￻べる。"
          violet: "￹体￺からだ￻の　￹表面￺ひょうめん￻に　￹食￺く￻った\n￹宝石￺ほうせき￻の　￹成分￺せいぶん￻が　￹浮￺う￻きだす。\nその　パターンは　￹無限大￺むげんだい￻だ。"
        en:
          scarlet: "It dwells in the darkness of caves. It uses its sharp\nclaws to dig up gems to nourish itself."
          violet: "Materials from gems it has eaten float to the\nsurface of its body and can form an infinite\nnumber of patterns among individuals."
        fr:
          scarlet: "Ce Pokémon vit dans les grottes obscures et\nmange des pierres précieuses qu’il déterre\nà l’aide de ses griffes acérées."
          violet: "Les éléments présents dans les gemmes qu’il\nmange remontent à la surface de son corps,\nformant des motifs d’une infinie variété."
        it:
          scarlet: "Si costruisce la tana in grotte oscure e utilizza\ngli artigli affilati per estrarre le gemme di cui\nsi nutre."
          violet: "Le sostanze contenute nelle gemme che ingerisce\nemergono a livello epidermico e formano i motivi\npiù disparati."
        de:
          scarlet: "Es haust in düsteren Höhlen, wo es mit seinen\nspitzen Klauen Edelsteine ausgräbt und verspeist."
          violet: "Die Substanzen der Edelsteine, die es frisst,\nverfestigen sich an seiner Körperoberfläche,\nwobei unendlich viele Musterungen entstehen."
        es:
          scarlet: "Hace su guarida en cuevas oscuras. Usa sus\nafiladas garras para desenterrar las gemas que\nse come."
          violet: "Algunos de los elementos de las gemas con\nlas que se alimenta emergen en su piel creando\npatrones variopintos."
        ko:
          scarlet: "어두운 동굴에 거처를 만들고\n예리한 손톱을 써서\n보석을 파내어 먹는다."
          violet: "신체의 표면에\n먹은 보석의 성분이 떠오른다.\n그 패턴은 무한대다."
        zh_simp:
          scarlet: "会在阴暗的洞窟建造住所，\n并用锋利的爪子挖宝石吃。"
          violet: "身体的表面会浮现出\n它所吃下的宝石成分。\n其花纹有无数的类型。"
        zh_trad:
          scarlet: "會在陰暗的洞窟裡建造住所，\n並用鋒利的爪子挖寶石吃。"
          violet: "吃下的寶石成分會在身體\n表面浮現出來。所形成的\n花紋有無限多種變化。"
