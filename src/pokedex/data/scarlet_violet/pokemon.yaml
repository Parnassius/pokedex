          violet: "￹綿胞子￺わたほうし￻には　￹注意￺ちゅうい￻しよう。\nうっかり　￹吸￺す￻ってしまうと　￹咳￺せき￻や\n￹痒￺かゆ￻みに　￹苦￺くる￻しむことになるぞ。"
        jp_kanji:
          scarlet: "￹季節風￺きせつふう￻に　￹乗￺の￻り　￹旅￺たび￻をする。\n￹綿胞子￺わたほうし￻が　￹尽￺つ￻きるとき　￹旅￺たび￻と\nワタッコの　￹一生￺いっしょう￻は　￹終￺お￻わる。"
          violet: "￹綿胞子￺わたほうし￻には　￹注意￺ちゅうい￻しよう。\nうっかり　￹吸￺す￻ってしまうと　￹咳￺せき￻や\n￹痒￺かゆ￻みに　￹苦￺くる￻しむことになるぞ。"
        en:
          scarlet: "Jumpluff travels on seasonal winds. Once its\ncotton spores run out, its journey ends, as does\nits life."
          violet: "Beware its cotton spores. If you accidentally\nbreathe them in, you’ll be racked with coughs\nand itchiness."
        fr:
          scarlet: "Il voyage au gré des vents saisonniers. Quand\nil arrive à court de spores de coton, cela marque\nla fin de son périple, mais aussi de sa vie."
          violet: "Attention à ne pas inhaler ses spores de coton\npar inadvertance, car elles provoquent de la toux\net des démangeaisons."
        it:
          scarlet: "Viaggia facendosi trasportare dai venti stagionali.\nQuando le spore simili al cotone si esauriscono,\nterminano anche il suo viaggio e la sua vita."
          violet: "Bisogna fare attenzione ai suoi semi simili al\ncotone. Se inalati provocano tosse e prurito\nmolto fastidiosi."
        de:
          scarlet: "Es reist getragen von saisonalen Winden umher.\nHat es all seine Baumwollsamen verbraucht,\nendet damit seine Reise und auch sein Leben."
          violet: "Man hüte sich vor den Baumwollsamen dieses\nPokémon. Werden diese nämlich versehentlich\neingeatmet, lösen sie Husten und Juckreiz aus."
        es:
          scarlet: "Viaja arrastrado por los vientos estacionales\nhasta agotar sus esporas de algodón, momento\nque marca el final de su viaje y de su ciclo vital."
          violet: "Conviene tener cuidado con sus esporas de\nalgodón, ya que, en caso de inhalarse, provocan\ndesagradables picores y accesos de tos."
        ko:
          scarlet: "계절풍을 타고 여행한다.\n솜 포자가 다 떨어지면\n여행과 함께 솜솜코의 일생도 끝난다."
          violet: "솜 포자는 주의해야 한다.\n깜빡하고 들이마시기라도 하면\n기침과 가려움에 고통받게 된다."
        zh_simp:
          scarlet: "会随季风到处旅行。\n当毽子棉的棉孢子掉光的时候，\n就是它的旅行和生命终结之时。"
          violet: "要当心它的棉孢子。\n如果不小心吸进去了，\n就会深受发痒及咳嗽之苦。"
        zh_trad:
          scarlet: "會乘著季風到處旅行。\n當毽子棉的棉花孢子掉光時，\n牠的旅行和生命也會隨之結束。"
          violet: "要注意牠的棉花孢子。\n如果不小心吸了進去，\n就會全身發癢，還會咳個半死。"
