      descriptions:
        jp_kana:
          scarlet: "￹肉食￺にくしょく￻で　￹獰猛￺どうもう￻な　ポケモン。\n￹獲物￺えもの￻を　￹捕￺つか￻まえると　￹冷気￺れいき￻を\n￹吐￺は￻きかけ　￹凍￺こお￻らせて　￹保存￺ほぞん￻する。"
          violet: "￹北国￺きたぐに￻では　￹白￺しろ￻い￹悪魔￺あくま￻　と\n￹恐￺おそ￻れられる。　￹冷気￺れいき￻を　まとった\nツメと　キバで　￹獲物￺えもの￻を　￹襲￺おそ￻う。"
        jp_kanji:
          scarlet: "￹肉食￺にくしょく￻で　￹獰猛￺どうもう￻な　ポケモン。\n￹獲物￺えもの￻を　￹捕￺つか￻まえると　￹冷気￺れいき￻を\n￹吐￺は￻きかけ　￹凍￺こお￻らせて　￹保存￺ほぞん￻する。"
          violet: "￹北国￺きたぐに￻では　￹白￺しろ￻い￹悪魔￺あくま￻　と\n￹恐￺おそ￻れられる。　￹冷気￺れいき￻を　まとった\nツメと　キバで　￹獲物￺えもの￻を　￹襲￺おそ￻う。"
        en:
          scarlet: "It is a ferocious, carnivorous Pokémon.\nOnce it captures its prey, it will breathe cold\nair onto the prey to freeze and preserve it."
          violet: "Feared as the Snow-White Demon in\nnorthern lands, Beartic uses its frosty\nclaws and fangs to attack prey."
        fr:
          scarlet: "Ce Pokémon est un carnivore féroce.\nLorsqu’il attrape une proie, il la gèle grâce\nà son souffle glacé afin de la conserver."
          violet: "Il inspire la crainte dans les terres au nord, ce qui\nlui vaut le surnom de « démon blanc ». Il attaque\nses proies de ses griffes et de ses crocs de glace."
        it:
          scarlet: "Pokémon carnivoro e feroce, usa il suo\nrespiro gelido per congelare le prede\ncatturate e conservarle."
          violet: "Nelle terre del nord è temuto e chiamato\n\"demone bianco\". Assale la preda con artigli\ne zanne avvolti da aria gelida."
        de:
          scarlet: "Dieses grimmige, fleischfressende Pokémon\nbläst eisigen Atem auf gefangene Beute,\num sie einzufrieren und so zu konservieren."
          violet: "Im Norden wird es als der „Weiße Dämon“\ngefürchtet. Mit seinen eisigen Klauen und\nFangzähnen fällt es seine Beute an."
        es:
          scarlet: "Un fiero Pokémon carnívoro. Cuando atrapa\na una presa, exhala un vaho gélido con el fin\nde congelarla y conservarla."
          violet: "Temido y apodado el Demonio Blanco en las\ntierras del norte, ataca a sus presas con colmillos\ny garras creados a partir de aliento congelado."
        ko:
          scarlet: "육식을 하는 영악한 포켓몬.\n먹이를 잡으면 냉기를 뿜어서\n얼린 뒤 보관한다."
          violet: "북쪽 나라에서는 하얀 악마라 불리며\n공포의 대상으로 여겨진다.\n냉기를 두른 손톱과 이빨로 먹이를 공격한다."
        zh_simp:
          scarlet: "性情凶猛的肉食性宝可梦。\n一旦捕到猎物就会吐出寒气\n来把猎物冻结起来保存。"
          violet: "在北国拥有白色恶魔之称，\n被当地人畏惧。会用带有\n寒气的爪和牙来袭击猎物。"
        zh_trad:
          scarlet: "性情殘暴的肉食性寶可夢。\n會吐出寒氣把捕獲的獵物\n凍結起來保存。"
          violet: "在北國有白色惡魔之稱，\n深受當地人們的畏懼。\n會用帶有寒氣的爪牙襲擊獵物。"
