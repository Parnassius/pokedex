          violet: "￹明￺あ￻かりを　￹灯￺とも￻して　￹道案内￺みちあんない￻を\nするように　￹見￺み￻せかけながら\n￹生命力￺せいめいりょく￻を　￹吸￺す￻い￹取￺と￻っている。"
        jp_kanji:
          scarlet: "￹普段￺ふだん￻　￹炎￺ほのお￻は　￹消￺き￻えているが\n￹人￺ひと￻や　ポケモンの　￹生命力￺せいめいりょく￻を\n￹吸￺す￻いとると　￹炎￺ほのお￻は　きらめく。"
          violet: "￹明￺あ￻かりを　￹灯￺とも￻して　￹道案内￺みちあんない￻を\nするように　￹見￺み￻せかけながら\n￹生命力￺せいめいりょく￻を　￹吸￺す￻い￹取￺と￻っている。"
        en:
          scarlet: "Its flame is usually out, but it starts shining\nwhen Litwick absorbs life-force from people\nor Pokémon."
          violet: "While shining a light and pretending to be a\nguide, it leeches off the life-force of any who\nfollow it."
        fr:
          scarlet: "Sa flamme ne s’allume que lorsqu’il aspire\nl’énergie vitale des êtres humains et des\nautres Pokémon."
          violet: "Il fait semblant de guider ses victimes à la lueur\nde sa flamme, mais c’est pour mieux aspirer leur\nénergie vitale."
        it:
          scarlet: "Di solito la sua fiamma è spenta, ma si riaccende\nquando succhia l’energia vitale di Pokémon\ned esseri umani."
          violet: "Inganna le sue vittime col pretesto di voler\nilluminare loro il cammino, ma in realtà\nne assorbe l’energia vitale."
        de:
          scarlet: "Seine Flamme entzündet sich erst, wenn es\neinem Menschen oder einem Pokémon die\nLebensenergie aussaugt."
          violet: "Es entzündet ein Licht und gibt vor, anderen den\nWeg zu weisen, doch eigentlich saugt es ihnen\ndabei die Lebensenergie aus."
        es:
          scarlet: "Su llama suele estar apagada, pero puede\nprenderla absorbiendo la energía vital tanto\nde humanos como de Pokémon."
          violet: "Finge ser una luz guía en el camino, pero en\nrealidad solo quiere absorber la energía vital\nde quien lo sigue."
        ko:
          scarlet: "평소 불꽃은 꺼져 있지만\n사람이나 포켓몬의 생명력을\n흡수하면 불꽃이 반짝인다."
          violet: "빛을 밝혀 길 안내를\n하는 것처럼 가장하여\n생명력을 빨아들이고 있다."
        zh_simp:
          scarlet: "火焰在平时是熄灭的，但只要\n吸收了人或宝可梦的生命力，\n火焰就会闪闪发光。"
          violet: "假装点亮烛光，指引道路，\n实际上是在吸取对方的生命力。"
        zh_trad:
          scarlet: "平時燭火是熄滅的狀態，\n但只要吸取了人或寶可夢的\n生命力，火焰就會開始閃耀。"
          violet: "點亮頭上的燭火，\n假裝在指引道路。\n但其實是在吸取對方的生命力。"
