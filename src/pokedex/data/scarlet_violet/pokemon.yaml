        jp_kanji:
          scarlet: "￹壁￺かべ￻の￹向￺む￻こうも　￹見￺み￻える　￹力￺ちから￻で\n￹逃￺に￻げた　￹獲物￺えもの￻を　￹追￺お￻いつめるほかにも\n￹迷子￺まいご￻の　￹子￺こ￻どもを　￹捜￺さが￻したりする。"
          violet: "レントラーの　￹透視能力￺とうしのうりょく￻は\n￹危険￺きけん￻な　ものを　￹発見￺はっけん￻するとき\nとても　￹役￺やく￻に￹立￺た￻つのだ。"
        en:
          scarlet: "It can see clearly through walls to track down its\nprey and seek its lost young."
          violet: "Luxray’s ability to see through objects comes in\nhandy when it’s scouting for danger."
        fr:
          scarlet: "Il est capable de voir à travers les murs pour\nchasser des proies ou retrouver ses petits\ns’ils s’égarent."
          violet: "Il est capable de voir à travers tout ce qui existe,\nce qui lui est très utile pour détecter le moindre\ndanger."
        it:
          scarlet: "La sua capacità di vedere attraverso le pareti\nè utile non solo quando incalza la preda in fuga,\nma anche per trovare i suoi cuccioli smarriti."
          violet: "L’abilità radioscopica di Luxray si rivela molto\nutile quando si vuole rilevare la presenza di\noggetti pericolosi."
        de:
          scarlet: "Es kann durch Wände sehen und spürt auf diese\nWeise Beute und verloren gegangene Junge auf."
          violet: "Beim Aufspüren von Gefahren ist Luxtras\nRöntgenblick äußerst hilfreich."
        es:
          scarlet: "Puede ver claramente a través de las paredes\npara buscar a las presas huidas o a sus crías si\nse pierden."
          violet: "Tiene la capacidad de ver a través de todo,\nalgo que resulta extremadamente valioso\ncuando acecha el peligro."
        ko:
          scarlet: "벽 저편까지 볼 수 있는 힘으로\n도망친 먹이를 쫓는 것 이외에도\n미아가 된 아이를 찾기도 한다."
          violet: "렌트라의 투시 능력은\n위험한 것을 발견할 때\n매우 도움이 된다."
        zh_simp:
          scarlet: "拥有能看见墙壁另一边的力量，\n不仅可以用来追捕逃跑的猎物，\n还可以用来寻找迷路的孩子。"
          violet: "伦琴猫的透视能力\n对于发现危险的事物\n非常有帮助。"
        zh_trad:
          scarlet: "擁有能看見牆壁另一側的力量，\n除了可以用來追捕逃跑的獵物，\n還可以用來尋找迷路的孩子。"
          violet: "倫琴貓的透視能力\n在發現危險事物時\n非常有幫助。"
