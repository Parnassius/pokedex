          violet: "ナマズンの　￹群￺む￻れが　￹水面￺すいめん￻を\n￹跳￺は￻ねる　￹光景￺こうけい￻は　￹地震￺じしん￻の\n￹前触￺まえぶ￻れと　￹信￺しん￻じられている。"
        jp_kanji:
          scarlet: "￹縄張￺なわば￻り￹意識￺いしき￻が　とても　￹強￺つよ￻く\n￹外敵￺がいてき￻が　￹近￺ちか￻づくと　￹激￺はげ￻しく\n￹地面￺じめん￻を　￹揺￺ゆ￻らして　￹襲￺おそ￻いかかる。"
          violet: "ナマズンの　￹群￺む￻れが　￹水面￺すいめん￻を\n￹跳￺は￻ねる　￹光景￺こうけい￻は　￹地震￺じしん￻の\n￹前触￺まえぶ￻れと　￹信￺しん￻じられている。"
        en:
          scarlet: "It is extremely protective of its territory. If any\nfoe approaches, it attacks using vicious tremors."
          violet: "Sighting Whiscash leaping from the water is\nbelieved to herald an earthquake."
        fr:
          scarlet: "Il est très protecteur vis-à-vis de son territoire.\nSi des ennemis approchent, il le défend\nen déclenchant des secousses terribles."
          violet: "On dit que lorsqu’un banc de Barbicha jaillit hors\nde l’eau, cela signifie qu’un tremblement de terre\nest sur le point de se produire."
        it:
          scarlet: "È molto protettivo del suo territorio e, se\nun nemico si avvicina, reagisce facendo\ntremare violentemente la terra."
          violet: "Si dice che se si vedono gruppi di Whiscash\nsaltare fuori dall’acqua, un terremoto è\nimminente."
        de:
          scarlet: "Es hat ein ausgeprägtes Revierverhalten.\nNähert sich ein Feind, greift es diesen an,\nindem es die Erde heftig beben lässt."
          violet: "Man glaubt, der Anblick eines über die\nWasseroberfläche springenden Welsar-Schwarms\nsei ein Vorbote für ein Erdbeben."
        es:
          scarlet: "Protege su territorio por encima de todo.\nSi se acerca un enemigo, lo ataca con violentos\ntemblores de tierra."
          violet: "Se cree que, cuando los bancos de Whiscash\nsaltan sobre la superficie del agua, es señal\npremonitoria de un terremoto."
        ko:
          scarlet: "영역 의식이 매우 강하여\n외부의 적이 다가오면 격렬하게\n지면을 울리며 덤벼든다."
          violet: "메깅 무리가\n수면을 튀어 오르는 광경은\n지진의 전조로 여겨진다."
        zh_simp:
          scarlet: "领地意识非常强烈。\n如果有外敌接近，就会\n剧烈摇晃地面并发动袭击。"
          violet: "成群的鲶鱼王\n在水面上跳跃的景象\n被认为是地震的前兆。"
        zh_trad:
          scarlet: "地盤意識非常強烈，\n如果有外敵靠近，就會\n劇烈搖晃地面發動襲擊。"
          violet: "成群的鯰魚王\n在水面上跳躍的景象\n被認為是地震的先兆。"
