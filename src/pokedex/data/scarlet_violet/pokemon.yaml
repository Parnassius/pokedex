      descriptions:
        jp_kana:
          scarlet: "ついに　￹生￺は￻えた　￹翼￺つばさ￻で　￹大空￺おおぞら￻を\n￹駆￺か￻け￹廻￺まわ￻る。　うれしくて　￹火炎￺かえん￻を\n￹吐￺は￻いて　￹一面￺いちめん￻を　￹焼￺や￻き￹尽￺つ￻くす。"
          violet: "￹怒￺おこ￻らせると　￹手￺て￻が　つけられない。\nすべての　ものを　ツメで　￹切￺き￻り￹裂￺さ￻き\n￹炎￺ほのお￻で　￹燃￺も￻やして　￹破壊￺はかい￻する。"
        jp_kanji:
          scarlet: "ついに　￹生￺は￻えた　￹翼￺つばさ￻で　￹大空￺おおぞら￻を\n￹駆￺か￻け￹廻￺まわ￻る。　うれしくて　￹火炎￺かえん￻を\n￹吐￺は￻いて　￹一面￺いちめん￻を　￹焼￺や￻き￹尽￺つ￻くす。"
          violet: "￹怒￺おこ￻らせると　￹手￺て￻が　つけられない。\nすべての　ものを　ツメで　￹切￺き￻り￹裂￺さ￻き\n￹炎￺ほのお￻で　￹燃￺も￻やして　￹破壊￺はかい￻する。"
        en:
          scarlet: "It flies around on its wings, which have grown in\nat last. In its happiness, it gushes hot flames,\nburning up everything it passes over."
          violet: "It becomes uncontrollable if it is enraged.\nIt destroys everything with shredding claws\nand fire."
        fr:
          scarlet: "Il fend l’air et virevolte dans le ciel grâce à ses\nailes fraîchement formées. De bonheur, il crache\ndu feu et dévaste tout sur son passage."
          violet: "Lorsque Drattak devient furieux, plus rien ne\npeut l’arrêter. Il détruit tout ce qu’il voit à l’aide\nde ses griffes ou en crachant des flammes."
        it:
          scarlet: "Volteggia nel cielo con le grandi ali\ncresciutegli con l’evoluzione, sputando\nfuoco dalla gioia e incenerendo ogni cosa."
          violet: "Quando è adirato diventa inarrestabile e\ndistrugge qualunque cosa, lacerandola\ncon gli artigli e bruciandola a fiammate."
        de:
          scarlet: "Nun, da ihm Flügel gewachsen sind, zieht es\nam Himmel seine Kreise. Vor Freude spuckt es\nFlammen und hinterlässt überall Brandspuren."
          violet: "Wenn es wütend ist, gerät es außer Kontrolle.\nEs zerstört alles mit seinen Klauen und mit Feuer."
        es:
          scarlet: "Feliz de haber desarrollado al fin sus alas y de\npoder volar por el cielo, calcina con sus llamas\ntodos los campos que sobrevuela."
          violet: "Si se enfada, no hay forma de calmarlo;\nlo destruye todo lanzando arañazos y llamas."
        ko:
          scarlet: "드디어 자라난 날개로\n넓은 하늘을 날아다닌다. 기쁜 마음에\n화염을 뿜어 일대를 불태워 버린다."
          violet: "화나게 하면 어쩔 도리가 없다.\n모든 것을 발톱으로 갈기갈기 찢고\n불꽃으로 태워서 파괴한다."
        zh_simp:
          scarlet: "用最后终于长出来的翅膀在浩瀚的\n天空翱翔。兴奋地喷出火焰，\n将大地变成一片燃烧的原野。"
          violet: "一旦惹怒了它，就会一发不可收拾。\n用爪子将所有东西都撕裂，\n用火燃烧，大肆破坏。"
        zh_trad:
          scarlet: "用終於長出來的翅膀在浩瀚的\n天空翱翔。高興地噴出火焰，\n將大地變成一片火海。"
          violet: "一旦被激怒就會一發不可收拾。\n會用爪子撕裂一切，\n再用烈火將所有東西徹底焚燬。"
