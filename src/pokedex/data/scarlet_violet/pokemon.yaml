      descriptions:
        jp_kana:
          scarlet: "￹毎日￺まいにち￻　ヨガの　￹修行￺しゅぎょう￻を　￹欠￺か￻かさない。\n￹瞑想￺めいそう￻を　することで\n￹精神力￺せいしんりょく￻を　￹高￺たか￻めている。"
          violet: "￹瞑想￺めいそう￻で　￹精神￺せいしん￻エネルギーを\n￹高￺たか￻めて　￹空中￺くうちゅう￻に　￹浮￺う￻かぶ。\n１￹日￺にち￻に　１￹個￺こ￻　￹木￺き￻の￹実￺み￻を　￹食￺た￻べる。"
        jp_kanji:
          scarlet: "￹毎日￺まいにち￻　ヨガの　￹修行￺しゅぎょう￻を　￹欠￺か￻かさない。\n￹瞑想￺めいそう￻を　することで\n￹精神力￺せいしんりょく￻を　￹高￺たか￻めている。"
          violet: "￹瞑想￺めいそう￻で　￹精神￺せいしん￻エネルギーを\n￹高￺たか￻めて　￹空中￺くうちゅう￻に　￹浮￺う￻かぶ。\n１￹日￺にち￻に　１￹個￺こ￻　￹木￺き￻の￹実￺み￻を　￹食￺た￻べる。"
        en:
          scarlet: "It never skips its daily yoga training. It heightens\nits inner strength through meditation."
          violet: "It meditates to heighten its inner energy and to\nfloat in the air. It eats one berry a day."
        fr:
          scarlet: "Méditikka ne rate jamais une séance de yoga.\nIl augmente sa force intérieure par la méditation."
          violet: "La méditation renforce son esprit et lui permet\nde léviter. Il ne mange qu’une Baie par jour."
        it:
          scarlet: "Non rinuncia mai alla sua ora di yoga quotidiana.\nLa meditazione gli permette di aumentare la sua\nforza interiore."
          violet: "Levita grazie all’energia interiore ricavata\ndalla meditazione. Si nutre di una sola bacca\nal giorno."
        de:
          scarlet: "Es vergisst nie sein tägliches Yogatraining.\nDurch Meditation erhöht es seine innere Stärke."
          violet: "Durch Meditation erhöht es seine geistige Kraft,\num in der Luft zu schweben. Es isst bloß eine\nBeere am Tag."
        es:
          scarlet: "Practica yoga a diario y no se pierde ni una\nsesión. Mediante la meditación, aumenta su\nfuerza interior."
          violet: "Solo come una baya al día. Medita para\nfortalecer su espíritu y llegar a levitar."
        ko:
          scarlet: "매일 요가 수행을 거르지 않는다.\n명상을 통해서 정신력을 높인다."
          violet: "명상으로 정신력을 높여 공중에 뜬다.\n하루에 나무열매 하나만 먹는다."
        zh_simp:
          scarlet: "对它来说每天的瑜伽修行\n是不可或缺的，会通过\n冥想来提高精神力。"
          violet: "通过冥想提高精神力量后，\n就能让自己浮在空中。\n１天吃１个树果。"
        zh_trad:
          scarlet: "每天都少不了瑜珈的修行。\n會藉著冥想提高\n自身的精神力。"
          violet: "用冥想提高精神能量後，\n就可以浮在空中。\n１天會吃下１個樹果。"
