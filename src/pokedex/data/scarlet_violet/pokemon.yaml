          violet: "ドダイトスの　￹背中￺せなか￻で　￹生￺う￻まれて\nドダイトスの　￹背中￺せなか￻で　￹一生￺いっしょう￻を\nまっとうする　ポケモンも　いる。"
        jp_kanji:
          scarlet: "￹大昔￺おおむかし￻の　￹人々￺ひとびと￻は　￹大地￺だいち￻の　￹下￺した￻には\n￹巨大￺きょだい￻な　ドダイトスが　いると\n￹空想￺くうそう￻していた。"
          violet: "ドダイトスの　￹背中￺せなか￻で　￹生￺う￻まれて\nドダイトスの　￹背中￺せなか￻で　￹一生￺いっしょう￻を\nまっとうする　ポケモンも　いる。"
        en:
          scarlet: "Ancient people imagined that beneath the\nground dwelt a gigantic Torterra."
          violet: "Some Pokémon are born on a Torterra’s back\nand spend their entire life there."
        fr:
          scarlet: "Autrefois, les gens croyaient que le monde\nreposait sur le dos d’un gigantesque Torterra."
          violet: "Certains Pokémon naissent sur son dos\net y passent toute leur vie."
        it:
          scarlet: "In tempi antichissimi si credeva che sottoterra\ndimorasse un gigantesco Torterra."
          violet: "Ci sono Pokémon che nascono sul dorso\ndi Torterra e vi trascorrono tutta la vita."
        de:
          scarlet: "In alten Zeiten malten die Menschen sich\naus, dass sich ein riesiges Chelterrar unter\nder Erde befinde."
          violet: "Manche Pokémon werden auf dem Rücken\neines Chelterrar geboren und verbringen\nihr ganzes Leben dort."
        es:
          scarlet: "Las gentes de antaño creían que la superficie\nterrestre se encontraba sobre un gran Torterra."
          violet: "Algunos Pokémon nacen en la espalda de un\nTorterra y pasan allí toda su vida."
        ko:
          scarlet: "오랜 옛날 사람들은 대지 밑에\n거대한 토대부기가 있다고 공상했었다."
          violet: "토대부기의 등에서 태어나\n토대부기의 등에서 일생을\n다하는 포켓몬도 있다."
        zh_simp:
          scarlet: "在遥远的过去，人们曾假想过，\n在大地的下面存在着巨大土台龟。"
          violet: "有的宝可梦会在\n土台龟背上出生，\n并在此度过一生。"
        zh_trad:
          scarlet: "古時候的人們曾經想像過，\n在大地的底下存在著\n巨大的土台龜。"
          violet: "有些寶可夢會在\n土台龜背上出生，\n並在此度過一生。"
