      descriptions:
        jp_kana:
          scarlet: "￹金属￺きんぞく￻イオンを　￹吸￺す￻い￹取￺と￻った　カギは\nあっさり　￹捨￺す￻てるが　お￹気￺き￻に￹入￺い￻りは\n￹何十年￺なんじゅうねん￻も　￹持￺も￻ち￹続￺つづ￻けている。"
          violet: "￹昔￺むかし￻の　￹貴族￺きぞく￻は　￹金庫￺きんこ￻の　カギを\n￹管理￺かんり￻させる　クレッフィを　￹代々￺だいだい￻\n￹引￺ひ￻き￹継￺つ￻ぎ　￹大切￺たいせつ￻に　￹扱￺あつか￻った。"
        jp_kanji:
          scarlet: "￹金属￺きんぞく￻イオンを　￹吸￺す￻い￹取￺と￻った　カギは\nあっさり　￹捨￺す￻てるが　お￹気￺き￻に￹入￺い￻りは\n￹何十年￺なんじゅうねん￻も　￹持￺も￻ち￹続￺つづ￻けている。"
          violet: "￹昔￺むかし￻の　￹貴族￺きぞく￻は　￹金庫￺きんこ￻の　カギを\n￹管理￺かんり￻させる　クレッフィを　￹代々￺だいだい￻\n￹引￺ひ￻き￹継￺つ￻ぎ　￹大切￺たいせつ￻に　￹扱￺あつか￻った。"
        en:
          scarlet: "Once it absorbs a key’s metal ions, it discards the\nkey without a second thought. However, it will\nhang on to keys it favors for decades."
          violet: "In the past, noble families entrusted their vault\nkeys to a Klefki. They passed the Klefki down\nthrough the generations, taking good care of it."
        fr:
          scarlet: "Dès qu’il a absorbé les ions métalliques d’une clé,\nil s’en débarrasse. Néanmoins, s’il en trouve une\nqui lui plaît, il la gardera pendant des années."
          violet: "Autrefois, les familles nobles lui confiaient\nles clés de leurs coffres-forts et prenaient\ngrand soin de lui de génération en génération."
        it:
          scarlet: "Quando ha finito di assorbire gli ioni metallici da\nuna chiave la getta via subito, ma se una gli va\ndavvero a genio la conserva per decenni."
          violet: "Tempo fa, le famiglie nobili affidavano ai Klefki\nle chiavi delle loro casseforti e si prendevano\ncura di questi Pokémon per generazioni."
        de:
          scarlet: "Sobald es die Metall-Ionen eines Schlüssels\neingesaugt hat, wirft es ihn einfach weg. Seine\nLieblingsschlüssel behält es jedoch viele Jahre."
          violet: "Früher wurden Clavion von Adelsfamilien als\nWächter für Tresorschlüssel geschätzt und über\nGenerationen hinweg weitergegeben und umhegt."
        es:
          scarlet: "No duda en deshacerse de las llaves una vez\nabsorbidos sus iones metálicos, aunque, si una le\ngusta de verdad, la atesorará durante décadas."
          violet: "En el pasado, las familias pudientes confiaban\nlas llaves de sus cajas fuertes a un Klefki y lo\ncuidaban de generación en generación."
        ko:
          scarlet: "금속 이온을 모두 흡수한 열쇠는\n보통 미련 없이 버려 버리지만\n마음에 들면 몇십 년이고 가지고 다닌다."
          violet: "옛날 귀족은 금고 열쇠를 관리하는\n클레피를 대대손손\n소중하게 여겼다."
        zh_simp:
          scarlet: "会轻易丢掉吸取金属离子的\n钥匙，而自己中意的钥匙\n则会带在身边好几十年。"
          violet: "过去的贵族会将掌管金库\n钥匙的钥圈儿一代代地\n传承下去，好好珍惜。"
        zh_trad:
          scarlet: "會二話不說就丟掉吸光\n金屬離子的鑰匙，但屬意的\n鑰匙卻會帶在身邊好幾十年。"
          violet: "過去的貴族會將掌管金庫\n鑰匙的鑰圈兒一代代地\n傳承下去，並對其呵護備至。"
